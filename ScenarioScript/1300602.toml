[translation]
1300602-1 = "ปีศาจน้อยชอบเล่นซุกซน"
1300602-2 = "ก็เพราะอย่างนั้นล่ะนะ~!"
1300602-3 = "แต่นแต๊น~ มุสึกิจังแวะมาเล่นด้วยแล้วนะคุณครู~"
1300602-4 = "[s] \"แวะมาเล่นงั้นสินะ....\""
1300602-5 = "ฉันมาช่วยคุณครูที่ตั้งใจทำงานหนักต่างหากล่ะ"
1300602-6 = "เอาละ ถ้างั้น...~"
1300602-8 = "มาเล่นกันเถอะคุณครู!"
1300602-9 = "[s] \"มุสึกิ ตอนนี้ครูมีงานที่ต้องจัดการเยอะมากเลย...\""
1300602-10 = "ไม่ต้องห่วง ฉันรอได้อยู่แล้ว"
1300602-12 = "ฉันจะนั่งรอเงียบๆ จนกว่าคุณครูจะทำงานเสร็จเอง"
1300602-13 = "ตกลงมั้ย~ หืม?"
1300602-14 = "[s] \"ถ้ามุสึกิว่าอย่างนั้นล่ะก็ตกลง....\""
1300602-15 = "ขอบคุณนะคุณครู!"
1300602-17 = "(คุณครูตั้งใจทำงานต่อโดยมีมุสึกิค่อยนั่งดูอยู่)"
1300602-19 = "(จ้อง)"
1300602-20 = "[s] \"....\""
1300602-22 = "(จ้องเขม็ง)"
1300602-23 = "[s] \"เอ่อ...มุสึกิ....?\""
1300602-24 = "หืม? คุณครู งานเสร็จแล้วเหรอ?"
1300602-25 = "[s] \"คงใช้เวลาอีกพักใหญ่กว่าจะเสร็จน่ะ....\""
1300602-26 = "ชิส์ นั่งรอแบบนี้น่าเบื่อจริงๆ เลย"
1300602-27 = "เลิกทำงานแล้วมาเล่นกับฉันเถอะคุณครู"
1300602-28 = "วันนี้ฉันเอาของเล่นมาเล่นกับคุณครูด้วยน้า~"
1300602-29 = "[s] \"ของเล่นเหรอ?\""
1300602-31 = "วันนี้ฉันจะใช้สร้อยข้อมืออันนี้เล่นอะไรสนุกๆ กับคุณครู"
1300602-32 = "[s] \"อืม.. แต่ว่างานครูยังไม่เสร็จ....\""
1300602-33 = "ตอนทำงานต้องพักเบรกบ้างนะรู้รึเปล่า?"
1300602-34 = "ตอนฉันยังไม่มาคุณครูก็เอาแต่ทำงานตลอดทั้งวันแล้ว...."
1300602-35 = "ฉันอุตส่าห์คิดว่าเราจะใช้เวลาสนุกๆ ด้วยกันตอนช่วงพักเบรกได้..."
1300602-36 = "เพราะงั้นพวกเรา...."
1300602-40 = "...มาเล่นกันไม่ได้เหรอ?"
1300602-42 = "[s] \"ได้สิ ทำงานแบบนี้ต้องพักสายตากันบ้าง!\""
1300602-43 = "ย้าฮู่ว~ มาเล่นกันเถอะคุณครู!"
1300602-45 = "[ns] \"แล้วสร้อยนี่เอาไว้ทำอะไรเหรอ?\""
1300602-46 = "ฮี่ฮี่ฮี่ นี่คือเครื่องวัดอัตราการเต้นของหัวใจ"
1300602-47 = "ถ้าใส่ไว้ที่ข้อมือและเวลาที่หัวใจเต้นแรงเกินอัตราที่กำหนด มันก็จะปล่อยไฟฟ้าเปรี๊ยะๆ ใส่เลย"
1300602-48 = "[s] \"แล้วเอามาเล่นยังไงน่ะ?\""
1300602-49 = "ฮิฮิ ถามได้ดีเลยคุณครู"
1300602-50 = "กฎของเกมก็ง่ายๆ เราจะผลัดกันทำให้อีกฝ่ายรู้สึกอายให้ได้ เริ่มตั้งแต่ตอนนี้เลยนะ"
1300602-51 = "ใครทำให้อีกฝ่ายอายและถูกไฟช็อตเปรี๊ยะๆ ได้ก่อนจะเป็นฝ่ายชนะ"
1300602-52 = "คนที่แพ้จะต้องฟังคำขอของคนที่ชนะหนึ่งข้อ"
1300602-53 = "[s] \"ครูไม่เห็นเคยได้ยินกฎแบบนี้เลย...\""
1300602-54 = "ไม่เอาน่า อย่ามางอแงสิ"
1300602-57 = "เอาล่ะคุณครู!"
1300602-60 = "ถ้างั้นเรามาเริ่มกันเลย เกม~สตาร์ท!"
1300602-62 = "คุณครูเพิ่งเคยเล่นเกมนี้ครั้งแรก ฉันจะยอมให้คุณครูเริ่มก่อนก็แล้วกัน ยอมอ่อนให้มือใหม่ก่อนก็ได้"
1300602-63 = "(จะทำให้มุสึกิอายได้ยังไง....)"
1300602-64 = "[ns1] (จั๊กจี้มุสึกิ)\n[ns2] (ทำหน้าตาตลกๆ ให้มุสึกิดู)"
1300602-65 = "อะฮ่ะฮ่ะฮ่า!! คุณครู~! มันจั๊กจี้นะ~!"
1300602-66 = "(คุณครูจั๊กจี้มุสึกิไปแล้ว แต่ว่าสร้อยข้อมือของเธอยังไม่มีปฏิกิริยาอะไรเลย)"
1300602-67 = "ฮ่าฮ่าฮ่า! ฮะฮะๆ ฮู่ว...... คุณครูทำได้แค่นี้เองเหรอ?"
1300602-68 = "แย่จังเลยน้า! คว้าน้ำเหลวซะแล้ว"
1300602-69 = "ว้า... คุณครู..... ขายหน้าจริงๆ..."
1300602-70 = "......."
1300602-71 = "ฮึ...ฮึฮึฮึฮึ ฮ่ะฮ่ะฮ่ะฮ่าา!!!! ตลกชะมัดเลย~!"
1300602-72 = "ฮะๆ ฮ่าฮ่าฮ่า! ฮ่าฮ่า! อะฮ่ะฮ่า! ตลกสุดๆ ไปเลย~!"
1300602-73 = "อื้อ! น่าเสียดายจัง~ ไม่ได้ผลเลยสักนิดเดียว~ คุณครูเสียแรงเปล่าแล้วล่ะ"
1300602-74 = "แย่จุงเบย~ หมดเวลาของคุณครูแล้วล่ะ!"
1300602-75 = "คราวนี้ตาฉันบ้าง เตรียมตัวไว้ได้เลย!"
1300602-78 = "[s3] \"คือว่า... มุสึกิจัง...?\"\n[s4] \"ทำไมถึงมาเกาะแขนครูล่ะ?\""
1300602-79 = "เอียงคอของครูลงมาสิ..."
1300602-80 = "เอียงคอของครูลงมาสิ..."
1300602-81 = "ฟู่วววว~ จู่โจมด้วยการเป่าหู~!"
1300602-82 = "[s] \"อะ...อะไรเนี่ย?!\""
1300602-85 = "[ns] \"อ๊ะ มันจั๊กจี้นะ!\""
1300602-87 = "[ns] \"ตะ... ตกใจหมดเลย\""
1300602-88 = "อะฮ่ะฮ่า!! หน้าแดงแจ๋เลย! ดูเหมือนเกมนี้ฉันจะชนะแล้วล่ะ!"
1300602-89 = "ในเมื่อฉันชนะแล้ว...จะขออะไรคุณครูดีน้า~?"
1300602-90 = "คิคิคิ~"
1300602-93 = "(หลังจากแพ้ให้กับมุสึกิ คุณครูก็ถอนหายใจอย่างยอมรับชะตากรรม)"
1300602-94 = "[s5] \"หืม? มุสึกิ เดี๋ยวก่อน สร้อยข้อมือมัน....\"\n[s6] \"เธอไม่ได้เปิดไฟนี่นา?\""
1300602-98 = "......."
1300602-99 = "[s] \"อย่าบอกนะว่าเธอ... หลอกครูงั้นเหรอ!\""
1300602-100 = "แหะๆ ถูกจับได้ซะแล้ว ♪"
1300602-101 = "ไหนๆ ก็ถูกจับได้แล้ว ฉันเพ่นดีกว่า~!"
1300602-103 = "[s] \"ดะ...เดี๋ยวก่อนสิมุสึกิ....!\""
1300602-106 = "(มุสึกิวิ่งหายไปทันทีราวกับสายลมโดยที่คุณครูไม่ทันได้พูดอะไร)"

[translation]
1300602-1 = "The Party Imp"
1300602-2 = "I'm here!"
1300602-3 = "So, Sensei, what do you want to do today?!"
1300602-4 = "[s] \"You just came here to hang out, didn't you?\""
1300602-5 = "I came to stand by my hardworking sensei, and help out as best I can!"
1300602-6 = "And what better way to help than by keeping you loose?"
1300602-8 = "Let's play together, Sensei!"
1300602-9 = "[s] \"Sorry, Mutsuki. I have too much on my plate to play...\""
1300602-10 = "Don't worry. I can wait."
1300602-12 = "I'll just stay here and behave myself until your work is done."
1300602-13 = "How does that sound?"
1300602-14 = "[s] \"Well, if you say so, Mutsuki...\""
1300602-15 = "Thanks, Sensei!"
1300602-17 = "(So I finished up my work while Mutsuki watched me.)"
1300602-19 = "(stare)"
1300602-20 = "[s] \"...\""
1300602-22 = "(stare)"
1300602-23 = "[s] \"Umm, Mutsuki?\""
1300602-24 = "Huh? Are you done, Sensei?"
1300602-25 = "[s] \"I still need more time to finish up, so...\""
1300602-26 = "Ugh, waiting here is so boring."
1300602-27 = "Stop working and play with me, Sensei!"
1300602-28 = "I even brought something for us to play with together!"
1300602-29 = "[s] \"Is that a toy?\""
1300602-31 = "See this? I had fun plans for us today using this bracelet."
1300602-32 = "[s] \"Hmm, but I still have some tasks to do...\""
1300602-33 = "Taking a break every now and then is important when you're working, right?"
1300602-34 = "You're always working when I'm not around..."
1300602-35 = "So I thought we could have some fun and take a break together..."
1300602-36 = "Can we..."
1300602-40 = "...play?"
1300602-42 = "[s] \"Yeah, taking a break is just as important as working!\""
1300602-43 = "Woohoo! Let's have some fun, Sensei!"
1300602-45 = "[ns] \"So what's this bracelet for?\""
1300602-46 = "Heeheehee! It's a heart rate sensor."
1300602-47 = "You wear this on your wrist, and it will go \"zap\" if our heartbeats go too high!"
1300602-48 = "[s] \"And what kind of game can we play with that?\""
1300602-49 = "Heehee! Good question, Sensei."
1300602-50 = "Okay, the rules are simple. We'll take turns trying to embarrass each other."
1300602-51 = "Whoever gets embarrassed and zapped first loses."
1300602-52 = "And the loser, obviously, should grant the winner one wish."
1300602-53 = "[s] \"Here comes yet another rule that I didn't agree to...\""
1300602-54 = "Come on, don't be a drag."
1300602-57 = "Here you go, Sensei!"
1300602-60 = "The game starts now!"
1300602-62 = "Since this is your first time playing, you can make the first move. Consider it mercy for a beginner."
1300602-63 = "(Let's see. How can I make Mutsuki feel embarrassed?)"
1300602-64 = "[ns1] (Tickle Mutsuki.)\n[ns2] (Make a funny face.)"
1300602-65 = "Ahahaha! Sensei! That tickles!"
1300602-66 = "(I tickled Mutsuki, but her bracelet showed no activity.)"
1300602-67 = "Ahahaha! Heehee...ha. Phew... Is that all you got?"
1300602-68 = "Too bad! All your effort was for naught."
1300602-69 = "Wow, Sensei... That was almost desperate..."
1300602-70 = "..."
1300602-71 = "Hahahaha! That's so funny!"
1300602-72 = "Hahaha! You're hilarious!"
1300602-73 = "What a shame! It didn't work, and your attack was a failure."
1300602-74 = "Too bad! Your turn is over!"
1300602-75 = "Now's my turn. All right, brace yourself."
1300602-78 = "[s3] \"Um, Mutsuki...?\n[s4] \"Why are you so close?\""
1300602-79 = "Lend me your ears..."
1300602-80 = "Lend me your ears..."
1300602-81 = "(It's a whisper attack!)"
1300602-82 = "[s] \"Wh-Wha...?!\""
1300602-85 = "[ns] \"Owww, it stings!\""
1300602-87 = "[ns] \"Th-That surprised me.\""
1300602-88 = "Ahaha! Look how flustered you are! Looks like I smoked you this round!"
1300602-89 = "The loser wants to know what kind of favor the winner requests?"
1300602-90 = "Heh heh heh..."
1300602-93 = "(I lost to Mutsuki. While dwelling on my failure, something catches my eye.)"
1300602-94 = "[s5] \"Huh? Hold on, Mutsuki. That bracelet...\n[s6] \"Isn't it...turned off?\""
1300602-98 = "..."
1300602-99 = "[s] \"Don't tell me... Mutsuki, you cheated!\""
1300602-100 = "Ahaha, you caught me! ♪"
1300602-101 = "Since I've been caught, it's time for me to go!"
1300602-103 = "[s] \"S-Stop, Mutsuki...!\""
1300602-106 = "(Without giving me a second to stop her, Mutsuki vanished like the wind.)"

[translation]
1300602-1 = "小惡魔就是愛玩"
1300602-2 = "所以啊～！"
1300602-3 = "鏘──！親愛的無月來玩了唷～老師！"
1300602-4 = "[s] 「結果是直接來玩的啊……」"
1300602-5 = "我是為了陪在努力不懈的老師身邊才來的。"
1300602-6 = "吶吶，你看你看～"
1300602-8 = "老師！抱抱！"
1300602-9 = "[s] 「抱歉，我現在很忙，你去別的地方玩……」"
1300602-10 = "沒關係，我可以等！"
1300602-12 = "我會在一旁乖乖待著，直到老師工作結束！"
1300602-13 = "所以說～嗯？"
1300602-14 = "[s] 「嗯，既然無月都說到這個份上了……」"
1300602-15 = "謝謝你，老師！"
1300602-17 = "（就這樣在無月的關注下，開始處理剩下的工作）"
1300602-19 = "盯──"
1300602-20 = "[s] 「……」"
1300602-22 = "盯──"
1300602-23 = "[s]「無月，聽我說……」"
1300602-24 = "哦？老師，已經做完了嗎？"
1300602-25 = "[s] 「我還需要一點時間才能完成工作……」"
1300602-26 = "咦～繼續在這裡等好無聊～"
1300602-27 = "工作什麼的無所謂啦，一起玩吧。老師，"
1300602-28 = "為了跟老師一起玩，我還特地帶了好東西來～"
1300602-29 = "[s] 「好東西？」"
1300602-31 = "這個這個，我今天想跟老師一起玩這個手環。"
1300602-32 = "[s]「嗯，但是我還有工作沒完成…」"
1300602-33 = "雖然該工作的時候好好工作很重要，但休息也是很重要的吧？"
1300602-34 = "我說老師啊，你已經成天都在工作了……"
1300602-35 = "雖然我是真的想和老師一起玩，但也希望老師可以休息一下……"
1300602-36 = "所以來玩吧……？"
1300602-40 = "可以嗎，老師……？"
1300602-42 = "[s] 「也是呢，休息跟工作一樣重要！」"
1300602-43 = "太好了～！來玩吧！"
1300602-45 = "[ns] 「所以這手環是做什麼用的？」"
1300602-46 = "呼呼呼，這是心率手環。"
1300602-47 = "把這個套到各自的手腕上，要是心跳超過一定的速度就會被電擊。"
1300602-48 = "[s] 「原來如此，怎麼玩？」"
1300602-49 = "呵呵呵，問得好。老師，"
1300602-50 = "遊戲規則很簡單唷。從現在起，輪流想辦法嚇對方。"
1300602-51 = "誰先嚇到，被電擊的話就輸了。"
1300602-52 = "而且，輸的人要答應贏的人任何一項要求！"
1300602-53 = "[s] 「還有懲罰阿……」"
1300602-54 = "不要在意那種小細節啦～"
1300602-57 = "來，老師！"
1300602-60 = "那麼，遊戲開始！"
1300602-62 = "因為老師是第一次玩這個遊戲，就讓你先攻吧。"
1300602-63 = "（那麼，為了讓無月嚇到……）"
1300602-64 = "[ns1] （對無月搔癢）\n[ns2] （在無月面前做鬼臉）"
1300602-65 = "啊哈哈哈！老師～！好癢～！"
1300602-66 = "（明明很癢，但無月的手環卻毫無動靜）"
1300602-67 = "哈嘻！哈哈，哈嘻，呼……！呼……啊，結束了？"
1300602-68 = "很遺憾！老師的攻擊失敗了。"
1300602-69 = "……嗚哇啊，老師……竟然那麼拼命……"
1300602-70 = "……"
1300602-71 = "噗，噗噗，啊哈哈哈哈！！！！仔細一看也太好笑了～！"
1300602-72 = "啊哈，啊哈哈！噗嗤！啊哈哈！肚子好痛～！"
1300602-73 = "嗯～，但很遺憾！沒有通電呢～老師的攻擊失敗了。"
1300602-74 = "那，老師的回合結束了！ "
1300602-75 = "這次輪到我了。做好覺悟了吧，老師？"
1300602-78 = "[s3] 「那個，無月醬……？」\n[s4] 「為何突然勾著我……？」"
1300602-79 = "在老師的耳邊……"
1300602-80 = "在老師的耳邊……"
1300602-81 = "呼嗚……♪"
1300602-82 = "[s] 「嗚，嗚哇啊啊啊！？」"
1300602-85 = "[ns] 「啊好痛──！？」"
1300602-87 = "[ns] 「嚇，嚇我一跳……」"
1300602-88 = "啊哈哈！！大成功！看來這場比賽是我贏了呢？"
1300602-89 = "那麼既然我贏了～要拜託老師什麼事好呢～？"
1300602-90 = "咯呵呵～！"
1300602-93 = "（就在我因敗給了無月而嘆氣時……突然看到了某樣東西）"
1300602-94 = "[s5] 「咦，無月。難道那個手環……」\n[s6] 「電源……沒有開……？」"
1300602-98 = "……"
1300602-99 = "[s] 「無月……你作弊啊！？」"
1300602-100 = "啊哈，被發現了♪"
1300602-101 = "既然被拆穿了，我就告辭了～！"
1300602-103 = "[s] 「等，等等……！」"
1300602-106 = "（就這樣，無月以迅雷不及掩耳的速度，像風一般地消失了）"

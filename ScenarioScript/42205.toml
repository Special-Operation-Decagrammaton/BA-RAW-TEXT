[translation]
42205-5 = "CHARGE!"
42205-11 = "...FOX 3. I do believe that's your junior running around like a chicken with its head cut off."
42205-12 = "Hahaha! She's really just running out in the open knowing I'm here! She really is your mini-me."
42205-14 = "...Even I wasn't that dumb as a freshman!"
42205-15 = "I've got eyes. Want me to give her a little lesson?"
42205-16 = "Hold off. FOX 1 said they were planning for you being here and how to handle you."
42205-17 = "And I think I'd like to have a little talk with my junior, point woman to point woman."
42205-18 = "Just watch my back, FOX 4."
42205-20 = "Copy."
42205-32 = "Huh, what a coincidence. Do you come here often?"
42205-34 = "...How many times have I told you? Keep a low profile in enemy territory. Information is your best weapon on the field, and you just handed it over to us."
42205-35 = "Seems like you need a refresher course, Saki!"
42205-44 = "Because I was really going to sneak down this narrow hallway knowing you guys were watching every inch of it."
42205-45 = "I'd rather take the fight against your .45 caliber pistol than Otogi's sniping."
42205-47 = "Right, fine. You needed to close the distance one way or another."
42205-48 = "But today, I'm our squad's shield. Let's see who the better point woman is, Saki."
42205-49 = "Don't get caught off guard though!"
42205-76 = "...Your close combat improved quite a bit in a short time."
42205-77 = "Smart move using the butt of your gun instead of pulling out a secondary while dodging threats."
42205-78 = "Yeah... One of my old seniors taught that to me."
42205-79 = "Write down all my lessons, did you? There never was anyone who could top you when it came to academics."
42205-80 = "I'm a bit disappointed to be saying goodbye to such a promising protege."
42205-81 = "That's fine, because you've disappointed me plenty."
42205-82 = "How could you, Kurumi? The revival of SRT means nothing if it's built on the blood of the civilians we're supposed to protect!"
42205-83 = "...Tools don't question the user's intent."
42205-84 = "You're in battle, focus! If you're going to point that gun at someone, you had better be ready to shoot it."
42205-88 = "(I don't need to engage here... I'll keep my distance and have her use up as much ammo as I can.)"
42205-89 = "Hey, Saki! Look here please!"
42205-94 = "Cheese!"
42205-100 = "Seriously?!"
42205-111 = "You're too honest, Saki..."
42205-112 = "Every move, every stance, it's all textbook. You're too easy to read."
42205-113 = "Some people's dispositions just aren't meant for this line of work."
42205-115 = "I think you might just have the wrong impression of me."
42205-116 = "Unfounded confidence doesn't suit you, Saki. What makes you think you could..."
42205-117 = "Ah. Your g-g-greenhorn sniper? That one's gonna save you all?"
42205-118 = "She'll get one lucky shot off, at most."
42205-119 = "She might get me with that one shot, but Otogi'll locate and take her down faster than you can say 'rabbit.'"
42205-125 = "You seem to trust your squadmates a lot, huh?"
42205-126 = "Where are you going with this?"
42205-127 = "I wouldn't underestimate our sniper."
42205-128 = "Sure, she's probably not going to win in a hand-to-hand fight. And to you she might look weak or timid, but she's the best damn sniper in Kivotos."
42205-129 = "Hm... Now that I think about it, why hasn't Otogi given you any cover fire yet? That's not very like her..."
42205-130 = "I will say, Miyu did score first place in infiltration and stealth. Every. Single. Time."
42205-132 = "...!"
42205-136 = "FOX 4, come in! FOX 4!"
42205-140 = "What's up? I'm just chilling."
42205-141 = "You told me to hold my fire, didn't ya?"
42205-142 = "I had to confirm. For a second there, I thought..."
42205-151 = "Oh."
42205-155 = "What was it you said again... Oh, yeah. If you're going to point that gun at someone, you had better be ready to shoot it."
42205-156 = "Looks like FOX Squad's bonds aren't all that they're chalked up to be, huh?"
42205-164 = "FOX 3 is down."
42205-165 = "Kurumi tries too hard to look good in front of the rabbits. It always backfires..."
42205-166 = "Welp. Guess I'm on clean up duty then!"
42205-171 = "Decoy drone deployed. ECCM prep, check. No sniper's sneaking up on this girl."
42205-172 = "Now, then. Where's that crazy little point woman..."
42205-173 = "Hm... I haven't seen or heard anything about RABBIT's sniper in a while..."
42205-180 = "W-Well... I'm actually right here..."
42205-181 = "Wh-Wh-What the—"
42205-186 = "Since when? How?!"
42205-188 = "I...actually came up here to find a spot too..."
42205-189 = "But then I got here, and you were here f-first..."
42205-190 = "I was trying to figure out how to tell you I was here, but you seemed really focused..."
42205-191 = "It'd be one thing if you had snuck your way over here somehow... But you were just...standing behind me? And I didn't notice you?"
42205-192 = "Are you a ghost? Do you need someone to fulfill your last wish so you can move on or something?"
42205-194 = "I kind of fade into the background a lot... I'm sure one day even my squad mates won't notice if I'm there or not... They actually did once...in the middle of a mission... "
42205-195 = "But, well... Sometimes it's a good thing."
42205-196 = "Sometimes, it lets me be useful to my squad mates. Like this..."
42205-200 = "I-I'm really sorry."
42205-206 = "L-L-Let's talk about this!"
42205-212 = "...FOX 3 and 4 are down."
42205-213 = "I didn't expect them to put up this much of a fight..."
42205-214 = "Taking the central elevator controls offline was the right call."
42205-220 = "I can't get a signal..."
42205-221 = "Did... Did she turn the dang thing off?!"
42205-222 = "Heehee. Looks like it's out of service."
42205-223 = "After all, a good operation plan expects the unexpected!"
42205-224 = "...Niko? You're behind this, aren't you?"
42205-225 = "You can sneak your way past any security system if you have the time to do it."
42205-226 = "I figured the best defense would be to stop you before you could even try. Heehee."
42205-227 = "That's just...crafty."
42205-228 = "It's the only way down to the operations room, and you can't hack your way in for once."
42205-229 = "What'll you do, Moe? The longer you dilly-dally here, the closer and closer Kaiser reinforcements get."
42205-230 = "In other words, it's time for my darling underclassmen to go home."
42205-235 = "So, you're saying it's a no-go electronically?"
42205-236 = "Heeheehee! You're not crafty enough, Niko. You tunnel visioned on my computer skills and forgot the rest of my file!"
42205-241 = "You can bluff all you want, Moe. There's no way for you to get through."
42205-243 = "Busting through a stubborn door? Forcing its reinforced material to bend to my will?"
42205-244 = "Gives me a thrill just thinking about it... *pant* *pant*"
42205-245 = "I don't know what you're thinking, but the doors are fully electronic. There's no way you can punch through it with the power offline."
42205-246 = "If something doesn't blow up the first time, blow it up again! And again! And again! Hahaha!"
42205-251 = "No way I can punch through? No way my little babies can blow up one little door?!"
42205-252 = "Let's begin! I have ten pounds of semtex..."
42205-253 = "Heeheehee. I've never set off that much semtex at once! It's time for a show!"
42205-255 = "Whoa, whoa, whoa! That's gonna blow more than the door!"
42205-256 = "It'll hit everything and everyone around it!"
42205-257 = "Meh, my team's tough. They'll deal."
42205-258 = "You have to be bluffing. There's no way you would make such a risky maneuver here!"
42205-259 = "That's the most illogical—"
42205-272 = "*cough* *cough* Boom goes the dynamite!"
42205-274 = "That overshot opening the door by a bit..."
42205-275 = "'Obliterated' may be a better way to say it..."
42205-276 = "I did give her free reign, so I guess I should've seen that coming..."
42205-278 = "Well, if WE'RE surprised, imagine how the FOX Squad probably feels right now."
42205-279 = "I guess Moe's utter need for chaos and destruction can have its benefits..."
42205-280 = "Are you really sassing the one who just single-handedly saved this mission."
42205-281 = "I meant it in a good way, all right?"
42205-285 = "Seriously, good one."
42205-286 = "You pulled through too, RABBIT 2."
42205-288 = "Elevator's clear. I'm rappelling down to the control room!"
42205-289 = "Secure yourself to the cable and follow me!"
42205-296 = "Going in!"
42205-303 = "Next Episode; Caerbannog's Cave 2"

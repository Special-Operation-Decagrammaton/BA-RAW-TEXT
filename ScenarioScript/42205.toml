[translation]
42205-5 = "ย้ากกกกก—!"
42205-11 = "FOX 3 จู่ๆ รุ่นน้องของเธอก็วิ่งออกมายังพื้นที่โล่งเลยแฮะ"
42205-12 = "รู้อยู่แท้ๆ ว่ามีสไนเปอร์ดักอยู่ แต่ก็ยังดาหน้าวิ่งกันเข้ามา... พลังล้นเหลือกันจริงๆ เลยนะ!"
42205-14 = "... เด็กโง่คนนั้นกำลังคิดอะไรอยู่กันแน่?"
42205-15 = "ยิงเลยไหม?"
42205-16 = "ไม่ รอก่อน หัวหน้ากองบอกไว้นี่นาว่าฝ่ายตรงข้ามอาจเตรียมแผนรับมือการลอบยิงไว้ก็ได้"
42205-17 = "อีกอย่าง... พลชี้เป้าก็ต้องเผชิญหน้ากับพลชี้เป้าสิ"
42205-18 = "FOX 4 ฉันจัดการตรงนี้เอง ช่วยสนับสนุนทางข้างหลังทีนะ"
42205-20 = "รับทราบ"
42205-32 = "ได้เจอกันอีกแล้วนะ 'รุ่นพี่'"
42205-34 = "... ฉันย้ำไปตั้งหลายรอบแล้วไม่ใช่เหรอว่าพอเข้าไปในค่ายของศัตรู ให้เข้าไปอย่างลับๆ ไม่ให้ฝ่ายตรง#nข้ามรู้ตัวน่ะ"
42205-35 = "ดูแล้วน่าจะต้องไปฝึกเพิ่มกันอีกนะ!"
42205-44 = "ในสถานการณ์ที่เส้นทางถูกจำกัด การเข้าไปในพื้นที่แห่งทัศนวิสัยของศัตรูอย่างลับๆ มันไม่มีความ#nหมายทั้งนั้นแหละ..."
42205-45 = "อีกอย่าง ปืนพกขนาด 11 มม. ที่รุ่นพี่ใช้น่ะ ยิงอุปกรณ์กันกระสุนของฉันไม่เข้าหรอก"
42205-47 = "มันก็ใช่อยู่หรอกนะ เตรียมรับมือกับอาวุธของอีกฝ่ายและลดระยะทางก็ถือว่าเป็นการตัดสินใจที่ดี"
42205-48 = "แต่เธอคงยังไม่รู้สินะว่าตอนนี้ฉันไม่ใช่ค้อน แต่เป็นทั่งตีเหล็กแล้วต่างหาก"
42205-49 = "ระวังหัวไว้ให้ดีๆ เถอะ จะได้ไม่ถูกซุ่มยิงไปซะก่อน!"
42205-76 = "... ฝีมือ CQC พัฒนาขึ้นเยอะเลยนี่"
42205-77 = "ที่เธอหลบหลีกช่วงวิกฤต แล้ววิ่งเข้าไปมาในเขตของฝ่ายตรงข้ามและกวัดแกว่งพานท้ายปืนแทน#nที่จะใช้อาวุธรองน่ะ มันไม่ได้ทำกันได้ง่ายๆ เลยนะ"
42205-78 = "ก็รุ่นพี่เคยสอนเอาไว้นี่นา"
42205-79 = "เธอไม่เคยลืมสิ่งที่ฉันสอนเลยสักครั้งสินะ สมแล้วที่เป็นนักเรียนดีเด่นที่สอบข้อเขียนได้คะแนนเต็ม"
42205-80 = "แต่ก็น่าเสียดายนะ... ที่จะไม่ได้อยู่กับรุ่นน้องที่ยอดเยี่ยมอีกแล้ว"
42205-81 = "ฉันเองก็เสียดายไม่แพ้กันหรอก"
42205-82 = "ถึงจะบอกว่าทำเพื่อฟื้นฟู SRT แต่ก็ไม่อยากเชื่อเลยนะว่าพวกรุ่นพี่เลือกที่จะคุกคามความปลอดภัยของ#nชาวเมืองซะเอง"
42205-83 = "... ไม่ต้องมามัวคิดแล้วหรอกว่าจะทุบด้วยค้อนหรือทั่ง"
42205-84 = "พอหันปากกระบอกปืนไปทางฝ่ายตรงข้ามแล้วก็อย่าลังเล!"
42205-88 = "(... ดีละ ถ่วงเวลาไว้แล้วโน้มน้าวให้ยิงจนลูกปืนหมด จากนั้นก็...)"
42205-89 = "เอ้า มองทางนี้!"
42205-94 = "ชีส!"
42205-100 = "อึก...!"
42205-111 = "... ซากิ เธอซื่อเกินไปแล้วนะ"
42205-112 = "ทั้งกลเม็ดการยิงปืน ทั้งสถานที่ซ่อนตัว ถ้าทำตามหนังสือคู่มือทั้งหมด ฝ่ายตรงข้ามที่เรียนมาเหมือนๆ กันก็เดาออกง่ายน่ะสิ"
42205-113 = "เพราะแบบนี้ไง หนทางแห่งการเป็นผู้เชี่ยวชาญถึงไม่ใช่เรื่องง่ายๆ เลย"
42205-115 = "... อย่าพูดเหมือนชนะแล้วเลยน่า รุ่นพี่"
42205-116 = "หืม? ยังคิดเหรอว่าจะชนะพวกเราได้?"
42205-117 = "อ๋อ หรือว่ายังหวังว่ารุ่นน้องสไนเปอร์ที่บอบบางคนนั้นจะมาช่วยยิงเสริมให้น่ะ?"
42205-118 = "ถ้าจะยิงให้ฉันบาดเจ็บก็อาจจะพอเป็นไปได้อยู่หรอกนะ แต่อย่าคิดเลยว่าจะทำให้สถานการณ์มัน#nกลับตาลปัตรได้"
42205-119 = "ตรงกันข้าม ถ้าสไนเปอร์ฝั่งเธอพยายามลอบยิง เผลอๆ ตำแหน่งอาจถูกเปิดเผยจนโดนยิงสวนได้นะ..."
42205-125 = "... รุ่นพี่ไว้ใจเพื่อนร่วมรบในกองมากแค่ไหนล่ะ?"
42205-126 = "ทำไมจู่ๆ ถึงได้ถามอะไรโง่ๆ แบบนั้น?"
42205-127 = "สไนเปอร์มิยุของพวกฉันน่ะ ถ้าเธอตั้งใจซ่อนตัวขึ้นมา ไม่ว่าใครก็หาไม่เจอหรอก"
42205-128 = "ถ้าเป็น CQB หรือกลยุทธ์ส่วนตัวก็ไม่แน่ แต่ถ้าเป็นการลอบยิงแล้วละก็ ฉันมั่นใจว่ามิยุไม่พลาดแน่นอน"
42205-129 = "...ไม่คิดว่ามันแปลกบ้างเลยเหรอ? ตรงจุดนี้ ทางรุ่นพี่โอโทกิก็น่าจะยิงสนับสนุนแล้วสิ"
42205-130 = "หรือว่ามือสังหารลับของกองหทารเราจะสอยรุ่นพี่โอโทกิร่วงไปแล้วกันนะ?"
42205-132 = ".........!"
42205-136 = "FOX 4 ปลอดภัยดีหรือเปล่า? FOX 4!"
42205-140 = "... หืม? ฉันไม่ได้เป็นอะไรนี่?"
42205-141 = "เธอบอกว่าให้รอก่อน แล้วก็อย่าเพิ่งยิง เพราะทางนั้นอาจเตรียมรับมือไว้นี่?"
42205-142 = "โล่งอกไปที นึกว่าเธอจะโดนเล่นงานไปแล้วซะอีก..."
42205-151 = "อ่า..."
42205-155 = "เมื่อกี้รุ่นพี่ก็พูดไว้เนอะ ว่าพอหันปากกระบอกปืนไปทางฝ่ายตรงข้ามก็อย่าได้ลังเล"
42205-156 = "... คนที่ไม่เชื่อใจสมาชิกในกองน่าจะเป็นรุ่นพี่มากกว่านะ"
42205-164 = "FOX 3 ดาวน์"
42205-165 = "เก๊กใส่รุ่นน้องมากเกินไปหรือเปล่า คุรุมิ? ตอนสุดท้ายหันหลังใส่เชิดๆ แบบนั้นเลยเหรอ"
42205-166 = "... ช่วยไม่ได้สินะ งั้นฉันคงต้องจัดการเป้าหมายที่เหลือให้แล้วสิ"
42205-171 = "ติดตั้งโดรนเป้าหลอกสำเร็จ เตรียมแผนรับมือ ECCM เรียบร้อย... แบบนี้ก็ไม่ต้องกังวลว่าจะโดนยิงสวน#nกลับแล้ว"
42205-172 = "งั้นเริ่มจัดการตั้งแต่พลชี้เป้าเลยไหม?"
42205-173 = "... จะว่าไป สไนเปอร์ของกองทหาร RABBIT อยู่ตรงไหนนะ?"
42205-180 = "ฉัน... อยู่ข้างบนนี้ค่ะ..."
42205-181 = "วะ... หวาาาา...!"
42205-186 = "มะ... มาตั้งแต่ตอนไหนเนี่ย...? แล้วทำไมถึงมาตรงนี้ได้..?!"
42205-188 = "เรื่องนั้น... ฉันขึ้นมาบนนี้เพราะอยากหาตำแหน่งดีๆ เอาไว้ลอบยิงเหมือนกันน่ะค่ะ..."
42205-189 = "แต่พอเห็นว่ารุ่นพี่มาจับจองที่นี่ก่อนแล้ว... ฉันก็เลยรออยู่ข้างหลังค่ะ..."
42205-190 = "ก็ว่าจะทักทายก่อนแล้วละค่ะ... แต่รุ่นพี่ดูยุ่งๆ กับหลายอย่างอยู่..."
42205-191 = "นี่เธอไม่ได้เข้าใกล้เพื่อหลีกเลี่ยงการมองเห็นของสไนเปอร์ฝ่ายศัตรู แต่มารออยู่ข้างหลังเลยเนี่ยนะ...?"
42205-192 = "มิยุ เธอนี่น่ากลัวจริงๆ..."
42205-194 = "ไม่มีใครจดจำหรือมองเห็นตัวตนของฉันได้จริงด้วย... แบบนี้สักวันฉันคงถูกลืมเลือนจากความทรงจำ#nของทุกคนแน่ๆ ค่ะ..."
42205-195 = "แต่ถึงอย่างนั้นก็เถอะ... วันนี้ฉันคิดว่าตัวเองโชคดีที่เป็นแบบนี้ค่ะ"
42205-196 = "พอไม่มีใครสังเกตเห็น... ฉันก็เลยเป็นประโยชน์กับสมาชิกกองไงคะ"
42205-200 = "... ขอโทษด้วยนะคะ รุ่นพี่"
42205-206 = "ดะ... เดี๋ยวก่อน...!"
42205-212 = "... FOX 3, FOX 4 ดาวน์"
42205-213 = "ไม่คิดเลยนะว่าพวกรุ่นน้องจะไล่ต้อนพวกเราได้ขนาดนี้"
42205-214 = "ดีนะที่เราไปจัดการลิฟต์กลางไว้ล่วงหน้าแล้ว พวกรุ่นน้องจะได้ควบคุมคอนโซลไม่ได้"
42205-220 = "อะไรเนี่ย ไม่เห็นมีโหนดอันไหนตอบสนองเลย?"
42205-221 = "หรือว่ามีใครมาบังคับเปลี่ยนโหมดให้เป็นออฟไลน์ไว้?!"
42205-222 = "ขอโทษนะ โมเอะจัง ตอนนี้เธอใช้ลิฟต์นี้ไม่ได้หรอก"
42205-223 = "พวกรุ่นพี่จองเอาไว้ก่อนแล้วน่ะ"
42205-224 = "... รุ่นพี่นิโกะ? นี่ฝีมือรุ่นพี่นิโกะงั้นเหรอ?!"
42205-225 = "ก็ฉันรู้ดีไงว่าโมเอะจังแฮ็กเก่งแค่ไหน ถ้ามีเวลาพอ เธอคงหาช่องโหว่ด้านความปลอดภัยของคอนโซล#nควบคุมนี้เจอ..."
42205-226 = "ฉันตัดสายวงจรให้เชื่อมต่อจากด้านนอกไม่ได้เอาไว้แล้วน่ะ ขอโทษที่ทำให้ต้องเสียเวลานะ"
42205-227 = "ใช้วิธีร้ายกาจแบบนี้งั้นเหรอ..."
42205-228 = "...ทางเดียวที่จะพาไปสู่ห้องปฏิบัติการน่ะ หากปฏิบัติการฝั่งพวกฉันยังไม่สำเร็จ รุ่นน้องก็ไม่สามารถใช้#nวิธีไหนแฮ็กเพื่อเปิดห้องได้หรอก"
42205-229 = "และยิ่งนานเข้า กองกำลังเสริมจากไคเซอร์ ซิเคียวริตี้ก็อาจจะมาเมื่อไรก็ได้..."
42205-230 = "ขอโทษด้วยนะ แต่กลับไปกับรุ่นน้องคนอื่นเสียเถอะ"
42205-235 = "... ถ้าเป็นไปตามที่รุ่นพี่บอก ประตูนี้ก็เปิดด้วยวิธีทางอิเล็กทรอนิกส์ไม่ได้ใช่ไหม?"
42205-236 = "ฮุฮุฮุ... แบบนี้แหละถูกใจฉัน เป็นไปอย่างที่หวังเลย"
42205-241 = "นี่ โมเอะจัง...? คิดจะทำอะไรน่ะ..."
42205-243 = "ประตูบานแกร่งที่เปิดออกไม่ได้ไม่ว่าจะด้วยคำสั่งอะไร... แต่ก็ยังกระชากเปิดได้ด้วยพลังที่เหนือกว่า..."
42205-244 = "พอคิดว่ามันจะป่นปี้ไม่มีชิ้นดี ก็รู้สึกขนลุกไปหมดแล้ว... แฮ่ก... แฮ่ก..."
42205-245 = "ประตูลิฟต์เป็นประตูอิเล็กทรอนิกส์นะ มันไม่น่าเปิดได้ด้วยการใช้กำลังสิ?"
42205-246 = "ก็ถ้าใช้กำลังไม่ได้ผล ก็ต้องฝืนใช้ต่อไปเรื่อยๆ จนกว่าจะได้ผลสิ"
42205-251 = "ไม่รู้ซะแล้วละสิว่าฉันพกวัตถุระเบิดมาเต็มกระเป๋า!"
42205-252 = "ไหนดูซิ... ตอนนี้มีระเบิดเซ็มเท็กซ์ขนาด 1 ปอนด์อยู่ราวๆ 10 ก้อน..."
42205-253 = "เอาไปติดที่ประตูแล้วให้ระเบิดพร้อมกันไปเลย!"
42205-255 = "ถะ... ถ้าใช้ดินระเบิดมากขนาดนั้น ประตูก็อาจจะเสียหายได้อยู่หรอกนะ..."
42205-256 = "แต่ปัญหาไม่ได้อยู่ที่ประตู แต่เป็นพวกเธอที่อยู่ข้างหน้าตรงนั้นต่างหากที่จะโดนระเบิดเอาน่ะ?!"
42205-257 = "ไม่เป็นไรหรอก! สมาชิกกองของเราคุ้นเคยกับเรื่องแบบนี้อยู่แล้ว!"
42205-258 = "ถึงจะบอกว่าคุ้นเคยก็เถอะ แต่กล้าเจาะทั้งๆ ที่รู้ว่าตัวเองจะอันตรายเนี่ยนะ..."
42205-259 = "แบบนี้มันไม่เข้าท่าเลย..."
42205-272 = "แค่กๆ แค่กๆ... เปิดได้แล้ว!"
42205-274 = "อ่า... ฉันว่าต้องบอกว่า..."
42205-275 = "ระเบิดได้แล้ว! มากกว่านะคะ..."
42205-276 = "ฉันก็เชื่อใจอยู่หรอกค่ะ แต่คิดไม่ถึงเลยนะคะว่าจะใช้ระเบิดพลาสติกทั้งหมดที่นี่"
42205-278 = "เอาเถอะ ยังไงพวกรุ่นพี่ FOX ก็คงได้เห็นการเจาะประตูแบบสุดโต่งแบบนี้เป็นครั้งแรกแหละเนอะ"
42205-279 = "ไม่คิดเลยนะว่าความบ้าบิ่นที่ไม่กลัวความวินาศสันตะโรของโมเอะ มันจะเป็นประโยชน์ในสถานการณ์#nแบบนี้ได้..."
42205-280 = "อะไรเนี่ย จะชมหรือประชดกันแน่?"
42205-281 = "ชมจ้า นี่ชมแล้ว"
42205-285 = "...ทำได้ดีมาก RABBIT 3"
42205-286 = "ก็นะ เธอเองก็ยอดเยี่ยมเหมือนกัน RABBIT 2"
42205-288 = "ในเมื่อเปิดเส้นทางได้แล้ว งั้นเราจะไต่ลงไปถึงหน้าห้องปฏิบัติการเดี๋ยวนี้เลยค่ะ!"
42205-289 = "ทุกคนผูกเข็มขัดโรยตัวกับสายเคเบิ้ลกันด้วยนะคะ"
42205-296 = "ถ้างั้นก็... รีบเข้าไปกันเลยค่ะ!"
42205-303 = "ตอนต่อไป;ในถ้ำแคร์บานอร์ก 2"

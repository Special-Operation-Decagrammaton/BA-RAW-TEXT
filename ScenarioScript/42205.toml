[translation]
42205-5 = "うりゃああああ――！！"
42205-11 = "FOX3、君の後輩、急に飛び出してきたよ？"
42205-12 = "狙撃手がいるのを知っていながら突撃するなんて……元気いっぱいでいいねぇ！"
42205-14 = "……あのバカ、一体何のつもり？"
42205-15 = "狙撃する？"
42205-16 = "いや、待って。相手が狙撃対策を講じているかもしれないと言ってたわよね。"
42205-17 = "それに……ポイントマンにはポイントマンが相手してあげないと。"
42205-18 = "FOX4、ここは私が引き受けるわ。後方支援をお願い。"
42205-20 = "承知。"
42205-32 = "また会ったな、「先輩」。"
42205-34 = "……敵陣に進入する時は、相手に気づかれないよう隠れて突入しろって何回も言ったわよね。"
42205-35 = "はぁ……追加訓練が必要みたいね！"
42205-44 = "進路が制限された状況下で敵の視野に入る場合、隠密行動は意味がない上に……"
42205-45 = "先輩が使う45口径の拳銃では、私の防弾装備を貫通できないからな。"
42205-47 = "そうね。多少の被弾を覚悟して距離を縮めたのはいい判断よ。"
42205-48 = "でも、今の私は[ruby=つち]鎚[/ruby]じゃなくて、[ruby=かなとこ]鉄床[/ruby]なの。"
42205-49 = "狙撃にやられないよう、後頭部に気をつけることね！"
42205-76 = "……CQC、結構上達したわね。"
42205-77 = "懐に入って、副武装の代わりにストックを振るなんて……なかなかやるじゃない。"
42205-78 = "先輩が教えてくれた事だからな。"
42205-79 = "一度教えたことは忘れないのね。さすが筆記満点の模範生。"
42205-80 = "こんなに優秀な後輩と一緒にいられないなんて……残念ね……"
42205-81 = "それはこっちのセリフだ。"
42205-82 = "SRTの復活のためとはいえ、先輩が市民の安全を脅かす選択をとるなんて……信じられない。"
42205-83 = "――鉄床や鎚が何を叩いているのか、考える必要なんてないわ。"
42205-84 = "銃口を向ける時は迷っちゃダメよ！"
42205-88 = "（……よし、このまま時間を稼いで弾丸の枯渇を誘導してからの――）"
42205-89 = "ほら、こっちを見なさい――"
42205-94 = "はいっ、チーズ！"
42205-100 = "くっ……！"
42205-111 = "……サキ、あんたは真面目すぎる。"
42205-112 = "射撃も、隠れる場所も教範通りだから、#nあんたが次に打つ手は手にとるように分かるわ。"
42205-113 = "そういうヤツが多いから、ベテランになるのは容易じゃないって言われてるわけ。"
42205-115 = "……これで勝ったとでも？"
42205-116 = "へぇ……まだアテがあるの？"
42205-117 = "あ、もしかして……あの気弱な狙撃手の支援射撃を期待してるの？"
42205-118 = "私に怪我を負わせるくらいはできると思うけど、狙撃で戦況を覆すのは難しいわよ。"
42205-119 = "むしろ、そんな事したら逆狙撃されるかもしれないわけだし……"
42205-125 = "……先輩は、同じ小隊の戦友をどの程度信頼しているんだ？"
42205-126 = "急に何？"
42205-127 = "うちのミユは、本気で隠れたら誰にも見つけられないんだ。"
42205-128 = "CQBとか対人戦術ならともかく、狙撃は絶対に失敗しないという確信がある。"
42205-129 = "……本当に何とも思わないのか？#n今頃、オトギ先輩が支援射撃をしていてもおかしくないはずなのに。"
42205-130 = "ああ、もしかしたら――うちの暗殺者が、もうオトギ先輩を始末し終えたのかもな。"
42205-132 = "………！"
42205-136 = "FOX4、無事なの？FOX4！"
42205-140 = "……ん？なんともないよ？"
42205-141 = "狙撃対策があるかもしれないから発砲しないで待機、だよね？"
42205-142 = "よかった、オトギがやられたのかもと思って……"
42205-151 = "あ。"
42205-155 = "さっき先輩が教えてくれた言葉、そのまま返す。#n銃口を向ける時は迷わない――"
42205-156 = "……隊員を最後まで信頼できなかったのは、先輩の方みたいだな。"
42205-164 = "FOX3、ダウン。"
42205-165 = "クルミ、後輩の前だからってカッコつけすぎたんじゃない？#nこんな簡単にやられちゃうなんて。"
42205-166 = "……ま、仕方ないか。#n残りのターゲットは、バックアップの私が処理しますよっと。"
42205-171 = "デコイドローン、設置完了。ECCM対策も万全……#nこれで逆狙撃される心配はない。"
42205-172 = "さて、と。#nとりあえず、ポイントマンから処理しよっかな。"
42205-173 = "……そういや、RABBIT小隊の狙撃手はどこだろ？"
42205-180 = "あの……ここです……"
42205-181 = "う、うわっ……？"
42205-186 = "い、いつの間に……？というか、どうしてここに……！？"
42205-188 = "その……私も支援射撃のために狙撃ポイントを探してて……"
42205-189 = "先輩が先に来ていたので……後ろで話しかけるタイミングをずっと伺ってました……。"
42205-190 = "でも……色々とお取り込み中でしたので……なかなか話しかけられなくて……"
42205-191 = "敵の視界を避けて接近するとかでもなく、ずっと背後で待っていたの……？"
42205-192 = "ミユ、恐ろしい子……"
42205-194 = "やっぱり、私なんて誰にも気づかれないから……いつかはみんなの記憶から消えてしまうんです……"
42205-195 = "でも……この体質で良かったと思っています。"
42205-196 = "誰にも気づかれなかったおかげで……小隊のみんなを、助けられました。"
42205-200 = "……ごめんなさい、先輩。"
42205-206 = "ちょ、ちょっと待って……！"
42205-212 = "……FOX3、FOX4、ダウン。"
42205-213 = "まさかここまで後輩たちに追い詰められるなんて思わなかった。"
42205-214 = "事前に中央エレベーターの制御コンソールを止めておいて良かった……"
42205-220 = "うわ、何これ。反応するノードが一個もないんだけど？"
42205-221 = "まさか、オフラインモードに強制的に切り替えてる！？"
42205-222 = "ごめんね、モエちゃん。このエレベーターは使用禁止なんだ。"
42205-223 = "今日は先約があるからね。"
42205-224 = "……ニコ先輩？これ、先輩の仕業だよね？"
42205-225 = "モエちゃんのハッキングの腕は私もよく知ってるよ。時間さえあれば、このコンソールのセキュリティホールを見つけちゃうだろうから……"
42205-226 = "外部から接続できないよう、物理的に回線を切らせてもらったの。ごめんね。"
42205-227 = "こんな卑怯な手を使うなんて……"
42205-228 = "……オペレーションルームに向かうこの通路は、ハッキングじゃどんな手を使っても開けられないよ。"
42205-229 = "それと……そこにいたらカイザーセキュリティの増援がやってくる。"
42205-230 = "悪い事は言わないから、その前に他の後輩と一緒に帰って。"
42205-235 = "……先輩の言う通りなら、このドアは電子的な方法では絶対に開かないってことだよね？"
42205-236 = "くひひ……最高じゃん。むしろ望むところだよ。"
42205-241 = "あの、モエちゃん……？いったい何を考えて……"
42205-243 = "どんなに命令しても開かない堅牢なドアを……圧倒的な力で無理矢理こじ開けるとか……"
42205-244 = "めちゃくちゃになっちゃいそうで……想像するだけでゾクゾクする……はぁ、はぁ……"
42205-245 = "このエレベーターは電子ドアだから、物理的な方法では開かないよ？"
42205-246 = "物理的な方法が通じないっていうのはさ……通じるまでぶち込めばいいってことだよね？"
42205-251 = "爆薬なら山ほどあるからさぁ！"
42205-252 = "どれどれぇ……今1ポンドのセムテックスが10個くらいあるから……"
42205-253 = "これ、ぜーんぶドアに貼って爆発させちゃお！"
42205-255 = "そ、そんなに爆薬をいっぱい使ったら……ドアにダメージは入るかもだけど……"
42205-256 = "その前に、君たちまで爆発に巻き込まれるかもしれないよ！？"
42205-257 = "大丈夫！うちの隊員はこういうの、慣れてるし！"
42205-258 = "慣れているとしても、自分が危険に晒されるかもしれないのにブリーチングを試みるなんて……"
42205-259 = "常識的に考えてあり得な――"
42205-272 = "けほ、けほっ……開いたぁ♪"
42205-274 = "あ……開いたというより……"
42205-275 = "無理やりこじ開けたというのが、正しいですが……"
42205-276 = "信じて任せるとは言いましたが……ありったけのプラスチック爆薬をここで全部使ってしまうなんて思いませんでした。"
42205-278 = "まあ、FOXの先輩もこんなバカみたいなブリーチングは初めて見ただろうな。"
42205-279 = "まさか破滅を恐れないモエの気質がこんなところで役に立つとは……"
42205-280 = "何それ、バカにしてるの？"
42205-281 = "褒め言葉だよ、褒め言葉。"
42205-285 = "……グッジョブ、RABBIT3。"
42205-286 = "ま、そっちもすごかったよ。RABBIT2。"
42205-288 = "エレベーターへの道が確保されましたので、ラペルリングでオペレーションルームの前まで降下します！"
42205-289 = "みなさん、ケーブルにハーネスを結んでください。"
42205-296 = "それでは……引き続き進入します！"
42205-303 = "次回;カルバノグの洞窟（２）"

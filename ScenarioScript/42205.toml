[translation]
42205-5 = "哈啊啊啊啊啊──！"
42205-11 = "FOX3，你的後輩突然衝出來了哦！？"
42205-12 = "明明知道有狙擊手竟然還進行突擊……膽子挺大的嘛！"
42205-14 = "……那個笨蛋到底有什麼打算？"
42205-15 = "要狙擊嗎？"
42205-16 = "不，先等等。#n剛才不是說過對方可能有應對狙擊的對策嗎？"
42205-17 = "而且……先鋒就該由先鋒來對付。"
42205-18 = "FOX4，這裡交給我就行了。#n麻煩進行後方支援。"
42205-20 = "收到。"
42205-32 = "又見面了呢，「前輩」。"
42205-34 = "……進入敵陣時要隱密地突入，以免被對方發現，我說過很多次了吧。"
42205-35 = "看來有必要進行追加訓練呢！"
42205-44 = "在路線受限的情況下進入敵方視野時，進行隱密行動沒有意義……"
42205-45 = "況且前輩使用的45口徑手槍根本射不穿我的防彈裝備。"
42205-47 = "也對。做好多少承受一點子彈的覺悟，縮短與對方的距離是個不錯的判斷。"
42205-48 = "不過現在的我不是鐵鎚，而是鐵砧。"
42205-49 = "注意你的後腦勺，小心別被狙擊命中了啊！"
42205-76 = "……你的CQC進步了不少嘛。"
42205-77 = "朝敵方懷裡鑽，再用槍托代替副武器攻擊……挺有兩下子的。"
42205-78 = "畢竟是前輩教我的啊。"
42205-79 = "只要教過一次就不會忘啊。#n不愧是筆試滿分的模範生。"
42205-80 = "竟然沒辦法和這麼優秀的後輩並肩作戰……真是遺憾。"
42205-81 = "這是我該說的台詞。"
42205-82 = "就算是為了SRT的復活，前輩們竟然會做出威脅市民安全的選擇……真是無法相信。"
42205-83 = "──鐵鎚或鐵砧不需要思考自己在鍛造什麼。"
42205-84 = "只需要知道槍口指向敵人時不要猶豫！"
42205-88 = "（……很好，就這樣繼續拖延時間，引誘他用光彈藥之後──）"
42205-89 = "來，看這裡──"
42205-94 = "笑一個！"
42205-100 = "唔……！"
42205-111 = "……咲希，你實在太老實了。"
42205-112 = "不管是射擊還是藏匿地點都和教戰手冊如出一轍，我對你的行動簡直是瞭若指掌。"
42205-113 = "就因為像你這樣的人很多，我才會說要成為一個老手沒有那麼容易。"
42205-115 = "……你以為這樣就贏了嗎？"
42205-116 = "嘿……你還有其他招數嗎？"
42205-117 = "啊，莫非……是在期待那個軟弱狙擊手的支援射擊？"
42205-118 = "我想他確實能讓我負傷沒錯，不過光靠狙擊是很難推翻戰況的。"
42205-119 = "更何況他那麼做還有可能會導致自己反而遭到狙擊……"
42205-125 = "……前輩，你有多信任同一小隊的戰友呢？"
42205-126 = "為何突然這麼問？"
42205-127 = "我們美優只要認真躲起來，絕對沒有人能找得到。"
42205-128 = "CQB或對人戰術姑且不論，在狙擊上，我確信美優絕對不會失敗。"
42205-129 = "……你難道都不覺得奇怪嗎？#n明明現在御伽前輩就算進行支援射擊也不奇怪的說。"
42205-130 = "啊啊，說不定──我們的暗殺者早就把御伽前輩解決掉了呢。"
42205-132 = "……！"
42205-136 = "FOX4，你沒事吧？FOX4！"
42205-140 = "……嗯？我沒事啊？"
42205-141 = "對方可能有狙擊對策，所以先別開槍不是嗎？"
42205-142 = "那就好，我還以為御伽被打倒了……"
42205-151 = "啊。"
42205-155 = "前輩剛才說過的話，在此奉還給你。#n槍口指向敵人時不要猶豫──"
42205-156 = "……看來沒能完全信任隊員的人是你呢，前輩。"
42205-164 = "FOX3遭到擊倒。"
42205-165 = "胡桃，你是不是太愛在後輩面前耍帥了啊？#n竟然這麼容易就被打倒。"
42205-166 = "……沒辦法了。#n剩下的目標就由負責後援的我來處理吧。"
42205-171 = "誘餌無人機設定完成。[ruby=ECCM]電子作戰[/ruby]對策也很萬全……#n這樣就不用擔心被反向狙擊了。"
42205-172 = "接下來，就先從先鋒開始處理吧。"
42205-173 = "……話說回來，RABBIT小隊的狙擊手在哪裡呢？"
42205-180 = "那個……我在這裡……"
42205-181 = "嗚，嗚啊……？"
42205-186 = "你，你是什麼時候……？#n不對，應該說你怎麼會在這裡……！？"
42205-188 = "那個……我也在尋找適合進行支援射擊的狙擊點……"
42205-189 = "可是前輩已經先來了……所以我一直在找時機搭話……"
42205-190 = "但是……前輩看起來很忙……因此一直搭不上話……"
42205-191 = "竟然不是設法避開敵方的視野加以接近，而是一直在背後等著……？"
42205-192 = "美優，多麼可怕的孩子……"
42205-194 = "果然，誰也不會注意到我這種人……我總有一天會從大家的記憶中消失吧……"
42205-195 = "不過……我覺得這種體質也不錯。"
42205-196 = "多虧誰也不會注意到我……才能幫上小隊的忙。"
42205-200 = "……抱歉了，前輩。"
42205-206 = "先，先等一下……！"
42205-212 = "……FOX3、FOX4，遭到擊倒。"
42205-213 = "沒想到會被後輩們逼到這個地步。"
42205-214 = "看來有事先停止中央電梯的控制台是正確的……"
42205-220 = "嗚哇，這是怎麼回事？#n為什麼每個節點都沒反應啊？"
42205-221 = "難道強制把控制台切換成離線模式了嗎！？"
42205-222 = "抱歉囉，萌醬。這台電梯禁止使用。"
42205-223 = "今天已經被我包下來了。"
42205-224 = "……仁子前輩？#n這是仁子前輩做的嗎？"
42205-225 = "萌醬的駭客技術我也很清楚。#n只要有足夠的時間，你遲早會找到這個控制台的保全系統的弱點吧……"
42205-226 = "所以為了防止來自外部的連接，只能在物理上切斷連線了。抱歉囉。"
42205-227 = "竟然用這麼卑鄙的手段……"
42205-228 = "……這條通往控制室的道路，無論你用什麼方法駭入都打不開的哦。"
42205-229 = "而且……凱薩保全的增援很快就會抵達。"
42205-230 = "我不會說你們的壞話的，在他們抵達前和其他後輩一起回去吧。"
42205-235 = "……照前輩所說，這扇門絕對無法用電子方法打開對吧？"
42205-236 = "咯嘻嘻……那不是太好了嗎。反而正合我意。"
42205-241 = "那個，萌醬……？#n你想做什麼……"
42205-243 = "把無論怎麼命令都無法打開的門……用壓倒性的力量強行打開……"
42205-244 = "好像會變得亂七八糟……光是想像就讓我興奮地發抖……哈啊，哈啊……"
42205-245 = "這個電梯的門是電子門，所以用物理手段是打不開的哦？"
42205-246 = "用物理手段打不開的話……試到打開為止不就行了嗎？"
42205-251 = "我可是有堆積如山的炸藥啊！"
42205-252 = "我看看……現在手邊有十個一磅左右的塞姆汀炸藥……"
42205-253 = "把這些全～部貼到門上引爆吧！"
42205-255 = "用，用那麼多炸藥的話……確實可能對門造成傷害……"
42205-256 = "不過在那之前，你們也可能會被爆炸波及的哦！？"
42205-257 = "安啦！我們隊員早就習慣這種事了！"
42205-258 = "就算已經習慣了，不惜把自己暴露在危險之中也要嘗試破門什麼的……"
42205-259 = "以常識來思考是不可能──"
42205-272 = "咳咳，咳咳……打開了♪"
42205-274 = "與……與其說是打開……"
42205-275 = "說是強行撬開比較正確吧……"
42205-276 = "雖然是出於信任才交給你……沒想到會把所有塑膠炸藥在這裡全部用光。"
42205-278 = "嘛，我想FOX的前輩應該也是第一次看到這麼荒唐的破門吧。"
42205-279 = "想不到萌那不畏懼毀滅的個性會在這種地方派上用場……"
42205-280 = "什麼嘛，是在挖苦我嗎？"
42205-281 = "是稱讚啦，稱讚。"
42205-285 = "……做的很好，RABBIT3。"
42205-286 = "嘛，你也不賴哦，RABBIT2。"
42205-288 = "既然已確保通往電梯的道路，利用繩索垂降的方式降落到控制室前吧！"
42205-289 = "各位，請將背帶綁在纜線上。"
42205-296 = "那麼……繼續前進！"
42205-303 = "下一話;卡班諾的洞窟（２）"

2003805-19 = "3;토모에 치파오;09;(사장님의 기색이…… 어딘가 심상치 않네요?)\n#3;em;…"
2003805-20 = "3;토모에 치파오;09;(목소리에 기운이 없고, 얼굴이 어딘가 어두워 보여요.)"

2003805-34 = "[ns] \"우아. 배부르다.\""
2003805-35 = "3;토모에 치파오;03;정말 맛있게 드시던데요, 선생님?"
2003805-36 = "3;토모에 치파오;02;그러는 저도 말수가 줄어들지 않았냐고요?\n#3;em;[?]"
2003805-37 = "3;토모에 치파오;07;우후후. 그만큼 맛있는 식사였다는 뜻도 되지 않을까요?\n#3;jump"
2003805-38 = "[s] \"그러면…… 계산 부탁합니다. 잘 먹었습니다.\""
2003805-39 = "3;가게 사장;09;맛있게 드셨나요? 그렇다면 다행입니다……."
2003805-40 = "3;가게 사장;09\n4;토모에 치파오;02;조금 전부터 느낀 것입니다만…….\n#3;m2\n#4;al\n#4;em;…"
2003805-41 = "4;토모에 치파오;09;무슨 걱정이라도 있으신가요. 사장님?"
2003805-42 = "3;가게 사장;09;네? 아닙니다, 아닙니다. 걱정은요. 손님분들께서 맛있게 드셨다면 그것으로 충분합니다.\n#3;em;[한숨]"
2003805-43 = "4;토모에 치파오;06;그런 것 치고는 활기가 너무 없으시네요. 이따금 한숨도 내쉬시고 말이죠."
2003805-44 = "3;가게 사장;09;……."
2003805-45 = "3;가게 사장;09;사실은…… 요즘 여러모로 가게 운영에 문제가 생겨서 말이지요……."
2003805-46 = "4;토모에 치파오;02;원인이라도 있을까요?\n#4;em;[?]"
2003805-47 = "3;가게 사장;09;말하자면, 이런 겁니다. 지금도 TV에서 방송이 나오고 있군요…….\n#3;em;…"
2003805-48 = "#all;hide"
2003805-49 = "#na;건강 채널;오늘도~ 건강 채널입니다! 알고 계시나요, 시청자 여러분?"
2003805-50 = "#na;건강 채널;맛있게 밥을 먹었는데, 이럴 수가! 갑자기 심장이 뛰고 노곤해지거나, 속이 쓰리고 기분이 불쾌해지는 경우, 없으셨는지요!"
2003805-51 = "#na;건강 채널;저희 건강 채널에서는! 그 이유가 무엇일까 심층 취재를 해 보았는데요!"
2003805-52 = "#na;건강 채널;세상에 이런 일이! 중화요리가 그 원인일 수 있다는 연구 결과가 나왔습니다!"
2003805-53 = "#na;건강 채널;심지어 이 현상의 이름도 이미 붙여져 있었는데요! 바로 '중화요리 증후군' 이라고 합니다!"
2003805-54 = "#na;건강 채널;이 증후군의 원인은, 다량의 소금과 돼지기름, 조미료와 향신료를 사용하는 중화요리의 조리법에서 유래될 수 있다고도 하는데요!"
2003805-55 = "#na;건강 채널;이건 어디까지나 가설에 지나지 않지만! 중화요리를 먹는 것만으로도 혈관에 기름이 쌓이고, 피로가 풀리지 않게 되고, 근육통이 생겨나며."
2003805-56 = "#na;건강 채널;나아가 가정이 무너지고, 사회가 무너지고, 사회가 황폐화되고! 이러한 현실 속에서–"

[translation]
2003805-1 = "#title;간판 소녀"
2003805-2 = "3;토모에 치파오;00;맛있는 식당을 소개해 주시는 것으로도 모자라, 사 주시기까지 한다니…….\n#3;a"
2003805-3 = "3;토모에 치파오;08;이렇게 선생님께 대접받기만 하면, 나중에 빚이 너무 많이 쌓이는 것 아닐까요?\n#3;em;[땀]"
2003805-4 = "[s1] \"그걸 빚이라고 생각해 버리면 내가 오히려 부담스러워.\"\n[s2] \"아직은 산해경에 대해서는 토모에보단 내가 잘 아니까!\""
2003805-5 = "#wait;100"
2003805-6 = "#wait;100"
2003805-7 = "3;토모에 치파오;00;그렇군요?"
2003805-8 = "3;토모에 치파오;99;그렇다면 여기에서는, 솔직하게 선생님의 호의를 받아들이도록 하죠. 감사합니다. 선생님.\n#3;greeting"
2003805-9 = "3;토모에 치파오;03;실례합니다. 메뉴판 좀 주시겠어요?\n#3;em;[반응]"

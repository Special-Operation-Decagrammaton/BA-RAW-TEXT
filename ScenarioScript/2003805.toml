2003805-61 = "3;가게 사장;09;……에잉. 꺼 버려야지…….\n#3;em;[한숨]"
2003805-62 = "3;가게 사장;09;죄송합니다. 손님. 좋지 않은 모습을 보여드린 것 같군요. \n#3;greeting"

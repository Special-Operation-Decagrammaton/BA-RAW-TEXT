2003805-84 = "3;토모에 치파오;07;네. 사람이 오가는 광장 한가운데에서 '진실'을 이야기한다면.\n#3;closeup"
2003805-85 = "3;토모에 치파오;03;보다 많은 사람이 귀를 기울여 줄 테고, 중화요리에 대한 '소문' 역시…… 사라지겠지요.\n#3;closeup"

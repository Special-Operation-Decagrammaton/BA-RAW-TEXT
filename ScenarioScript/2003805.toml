[translation]
2003805-1 = "看板少女"
2003805-2 = "不僅為我介紹餐廳，甚至還讓您破費……"
2003805-3 = "一直受到老師的照顧，我是不是欠了您太多人情了呢？"
2003805-4 = "[s1]「如果讓你這麼認為，我反而會覺得有壓力。」\n[s2]「畢竟我比智惠更了解山海經呀！」"
2003805-7 = "原來如此……？"
2003805-8 = "那麼在此停留的期間，我就坦率地接受老師的好意吧。#n非常謝謝您，老師。"
2003805-9 = "不好意思，可以麻煩給我菜單嗎？"
2003805-14 = "好……謝謝。菜單在這裡。"
2003805-15 = "……？"
2003805-19 = "（老闆的臉色……看起來好像不太對勁？）"
2003805-20 = "（聲音有氣無力，臉色也很黯淡）"
2003805-21 = "（這麼說來，現在明明是午餐時間，餐廳裡卻沒什麼客人……？）"
2003805-25 = "[ns]「智惠你想吃什麼？」"
2003805-29 = "啊，是。那我……"
2003805-34 = "[ns]「呼，吃得真飽。」"
2003805-35 = "吃得還開心嗎，老師？"
2003805-36 = "感覺我的話也變少了？"
2003805-37 = "呵呵呵。那就代表餐點有多麼美味吧？"
2003805-38 = "[s]「那麼……麻煩幫我結帳。感謝招待。」"
2003805-39 = "用餐還滿意嗎？那真是太好了……"
2003805-40 = "我從剛才就一直覺得……"
2003805-41 = "請問您是不是有什麼煩惱呢？老闆？"
2003805-42 = "嗯？沒有，沒事。#n不用擔心，只要客人吃得開心就夠了。"
2003805-43 = "但是您看起來很沒精神……偶爾還會聽見您唉聲嘆氣的。"
2003805-44 = "……"
2003805-45 = "其實……最近餐廳發生了很多經營方面的問題……"
2003805-46 = "有什麼原因嗎？"
2003805-47 = "真要說的話是因為這個吧。#n現在電視上也在播……"
2003805-49 = "每天都要收看～健康頻道！#n各位觀眾知道嗎？"
2003805-50 = "明明吃飯吃得很開心，結果卻突然出現心悸、疲累……#n或者胃不舒服、心情不佳的情況！大家有遇過這樣的經驗嗎？"
2003805-51 = "我們健康頻道！對這種現象的原因進行了深度探訪！"
2003805-52 = "結果令人萬萬沒想到的是……！#n研究結果顯示，這種現象的起因竟然有可能是中華料理！"
2003805-53 = "而且甚至已經有人替這個現象取了名字！那就是「中華料理症候群」！"
2003805-54 = "這種症狀的起因，源自於中華料理大量使用鹽、豬油、調味料和香辛料的烹飪方法。"
2003805-55 = "雖然這還只是假設！#n不過吃中華料理將有造成脂肪堆積在血管內壁、無法消除疲勞、肌肉痠痛的風險！"
2003805-56 = "最終還可能導致健康亮紅燈、社會瓦解荒廢！在這樣的現實中──"
2003805-61 = "……唉。還是關了吧……"
2003805-62 = "不好意思，兩位客人。#n讓你們見笑了。"
2003805-63 = "因為近期健康節目一直那樣宣傳中華料理對身體不好……"
2003805-64 = "所以客人與營收才會大幅減少，#n就連街上的人潮都受到影響，導致所有餐廳都很辛苦啊……"
2003805-65 = "[s]「……我們去街上看看吧？」"
2003805-67 = "的確相當冷清呢。"
2003805-68 = "午餐和晚餐時段，應該是餐廳最熱鬧的時候才對啊……"
2003805-69 = "……"
2003805-70 = "我決定了，老師。"
2003805-71 = "[s]「決，決定什麼！？」"
2003805-72 = "我原本是想盡量避免干涉其他學園的問題……"
2003805-73 = "但是在山海經的期間，我享用了許多美味的中華料理……"
2003805-74 = "如果就這麼視而不見的話，會讓我很過意不去的。"
2003805-75 = "您很好奇我有什麼打算？"
2003805-76 = "首先……我們先到廣場去吧？"
2003805-78 = "[ns3]「已經來到廣場了……」\n[ns4]「但你具體打算做什麼呢，智惠？」"
2003805-81 = "呵呵呵。那就是……"
2003805-82 = "要進行街頭演說！"
2003805-83 = "[s]「街頭演說……！？」"
2003805-84 = "是的。只要在人來人往的廣場中央述說「真相」……讓更多的人願意傾聽的話……"
2003805-85 = "我想有關中華料理的「謠言」也會隨之消失吧。"
2003805-86 = "那麼接下來，我要進行有關中華料理的演說了！"
2003805-92 = "（於是智惠便在廣場中央開始演說）"
2003805-94 = "各位山海經的學生，午安。#n大家都吃過飯了嗎？"
2003805-95 = "今天我想在此，向各位傳達一個不為人知的真相。"
2003805-96 = "最近似乎謠傳中華料理對身體不好。"
2003805-97 = "說是會突然心悸、疲累，或是胃不舒服，心情不佳等等……"
2003805-98 = "但實際上，那一切都是毫無根據的謠言！"
2003805-103 = "咦……可是豬油對身體不好是事實吧？"
2003805-104 = "我聽說豬油會堵住血管……"
2003805-106 = "我明白了。那麼我們就從豬油開始，一步一步解開誤會吧！"
2003805-107 = "首先，豬油含有豐富的維他命B和礦物質，#n而且飽和脂肪的含量低於羊肉與牛肉，不飽和脂肪也較高，所以有益於血管健康！"
2003805-108 = "最重要的是，豬油十分美味！#n膽固醇含量也顯著較低，大約只有奶油的三分之一，因此也是奶油很棒的替代品！"
2003805-109 = "月餅不也是用豬油做成的嗎？#n而我們赤冬會將鹽醃豬油夾在麵包裡一起食用，可說是撐過寒冷天氣的珍貴食品！"
2003805-110 = "豬油明明有這麼多優點，結果卻有人說大量使用豬油的中華料理對健康不好，#n這簡直是天大的誤解與誹謗──"
2003805-112 = "（……智惠就這樣熟練地解釋使用豬油並不壞，#n　並進一步說明中華料理不會危害健康的原因）"
2003805-114 = "……因此，那個陰險的健康頻道說中華料理對健康不好，#n都是他們想獨占美味中華料理的邪惡陰謀！"
2003805-115 = "各位，你們更願意相信哪邊的說法呢？#n是陳述事實的我嗎？還是欺騙大眾獲得好處的健康頻道謠言呢？"
2003805-120 = "這，這個嘛……#n所以這麼說來，中華料理反而有益於健康嗎？"
2003805-121 = "應該是吧？畢竟裡面用了很多豬油……"
2003805-122 = "而且話又說回來，中華料理不是我們至今吃過最多的食物嗎？"
2003805-123 = "有道理！如果真的有問題的話早就出事了！"
2003805-124 = "好久沒去中華料理街了，一起去看看吧？"
2003805-125 = "好！我要久違地大吃一頓！"
2003805-131 = "[ns5]「大家就像融為一體一樣……」\n[ns6]「跑去中華料理街了……！」"
2003805-135 = "呵呵呵。看來我的話術還沒退步呢。"
2003805-136 = "[s]「但是你說中華料理有益於身體健康，會不會引起另一個誤會？」"
2003805-137 = "這個嘛……"
2003805-138 = "用謊言來掩蓋另一個謊言，這不就是宣傳的基本手段嗎？"
2003805-140 = "（於是中華料理街的銷售額節節攀升，連同之前的損失都賺了回來……）"
2003805-141 = "（消息漸漸傳開之後，甚至還在奇普托斯掀起了一股中華料理的熱潮……）"

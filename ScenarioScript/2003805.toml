[translation]
2003805-1 = "Billboard Girl"
2003805-2 = "Not only did you bring me to a delicious, new restaurant, you're even insisting on paying..."
2003805-3 = "I fear my debts may be piling up too high, Sensei."
2003805-4 = "[s1] \"The real burden is if you think of it as a debt.\"\n[s2] \"I still know more about Shanhaijing than you, Tomoe!\""
2003805-7 = "I see."
2003805-8 = "In that case, I shall gracefully accept your goodwill. Thank you, Sensei."
2003805-9 = "Excuse me. May I have a menu?"
2003805-14 = "Yes... Thank you. Here it is."
2003805-15 = "...?"
2003805-19 = "(The boss' face...something's not right.)"
2003805-20 = "(Their voice is weak, expression dark.)"
2003805-21 = "(Upon further observation, it would appear this restaurant is rather empty, despite it being peak lunch hours.)"
2003805-25 = "[ns] \"What do you want, Tomoe?\""
2003805-29 = "Oh, yes. I'd like to order..."
2003805-34 = "[ns] \"Wow. I'm full.\""
2003805-35 = "You truly enjoyed your meal, Sensei."
2003805-36 = "I didn't speak a word, either?"
2003805-37 = "Teeheehee. I suppose that means it was a truly delicious meal, yes?"
2003805-38 = "[s] \"Check, please. Thanks for a great meal.\""
2003805-39 = "Did you enjoy the food? That's a relief..."
2003805-40 = "I couldn't help but think this, since we came here, but..."
2003805-41 = "Sir, is there something troubling you?"
2003805-42 = "Huh? No, no. Not at all. All that matters is that you enjoyed your food."
2003805-43 = "Your deep sighs and subdued manner seem contrary to that statement."
2003805-44 = "..."
2003805-45 = "Okay, well, if I'll be honest...we've been having a lot of problems, here at the restaurant, recently."
2003805-46 = "Why would that be?"
2003805-47 = "Just look over at the television. That'll answer your questions."
2003805-49 = "Welcome back to the Health Channel! Tell us, have you ever felt this way?"
2003805-50 = "You just enjoyed a delicious meal, but your heart suddenly starts pounding, and your body is sluggish! Your stomach is burning! You feel...unwell!"
2003805-51 = "We, at the Health Channel, went in-depth to find out why, just for you!"
2003805-52 = "Oh my goodness! Study results show that Chinese food may be the cause!"
2003805-53 = "This phenomenon even has a name! It's the \"Chinese Cuisine Syndrome\"!"
2003805-54 = "This syndrome comes from the massive amount of salt, pork fat, MSG, and spices that are used in the cooking process of Chinese cuisine!"
2003805-55 = "This is just a hypothetical, but it's believed that eating Chinese food can build up grease in your arteries, cause exhaustion, and create muscle pain."
2003805-56 = "Furthermore, it destroys families! It could be the cause of the destruction of society itself! In such a reality—"
2003805-61 = "...Ugh. I can't watch anymore of that."
2003805-62 = "I'm sorry. I shouldn't have shown you something so awful. "
2003805-63 = "Lately, health segments have been portraying Chinese cuisine as unhealthy..."
2003805-64 = "So customers started dwindling, and I'd assume sales have gone down considerably. All the stores must be struggling."
2003805-65 = "[s] \"...Should we go take a look outside?\""
2003805-67 = "It's true. There is barely anyone out there."
2003805-68 = "Restaurants should be at their busiest during the lunch and dinner rushes."
2003805-69 = "..."
2003805-70 = "I've made a decision, Sensei."
2003805-71 = "[s] \"Wh-What's that?!\""
2003805-72 = "If possible, I didn't want to interfere with another academy's matters..."
2003805-73 = "...but, while in Shanhaijing, I've been treated to such delicious Chinese food."
2003805-74 = "It simply doesn't sit right with me. Ignoring such an important issue..."
2003805-75 = "What do I intend to do?"
2003805-76 = "First, let us relocate to the plaza."
2003805-78 = "[ns3] \"Well, we're here at the plaza.\"\n[ns4] \"What exactly are you trying to do, Tomoe?\""
2003805-81 = "Teeheehee. Well."
2003805-82 = "It's our right to assemble, Sensei!"
2003805-83 = "[s] \"Right to assemble?!\""
2003805-84 = "Yes! I'm going to give a speech, right here in the plaza. People passing by will hear my truth!"
2003805-85 = "More and more people will listen, and these rumors about Chinese cuisine will disappear."
2003805-86 = "So now, allow me to begin my speech about delicious Chinese cuisine!"
2003805-92 = "Tomoe began her impassioned speech in the middle of the plaza."
2003805-94 = "Good afternoon, students of Shanhaijing. Have you eaten yet, today?"
2003805-95 = "I come today to speak to you about a devastating truth! One that the people in power have attempted to hide from you!"
2003805-96 = "There have been many rumors circulating about the negative effects of Chinese cuisine."
2003805-97 = "They say it's bad for your body and heart. One bite, and you'll feel sluggish. Your stomach will burn."
2003805-98 = "Well, these are all meaningless, baseless rumors!"
2003805-103 = "Um...but isn't it true that pork fat is bad for you?"
2003805-104 = "Yeah, they say it clogs your arteries..."
2003805-106 = "I know what has been said! However, I will break down the misinformation around pork fat, piece by piece!"
2003805-107 = "To begin, pork fat is a good source of vitamin B and minerals. In fact, it has less saturated fat than lamb or beef, actually making it healthier for your arteries!"
2003805-108 = "Most of all, pork fat is delicious! It can even be used as a butter substitute, while containing a third of the cholesterol!"
2003805-109 = "Your beloved moon cakes are made with pork fat as well, aren't they? At Red Winter, we salt the pork fat and eat it with slices of bread. It's a great source of food to survive the cold winter!"
2003805-110 = "To say Chinese food, which uses high-quality pork fat more than any other cuisine, is bad for your health is utterly facetious! It is slander, and..."
2003805-112 = "...Tomoe debunked the many misconceptions of pork fat and Chinese cuisine overall, one by one."
2003805-114 = "...This is why saying Chinese cuisine is bad for your health is a conspiracy, concocted by the Health Channel! They're working against you to keep this amazing cuisine all for themselves!"
2003805-115 = "Everyone, which side are you on? Are you on the side of truth, with me? Or are you on the side of the Health Channel, who lies to you for their own gain?!"
2003805-120 = "Th-Then...does that mean Chinese cuisine isn't bad for us and can actually benefit our health?"
2003805-121 = "I guess so? It uses a lot of the pork fat that she said is really good for us..."
2003805-122 = "Besides, we've been eating Chinese food our whole lives."
2003805-123 = "That's right! If it were to cause problems, we'd have experienced them by now!"
2003805-124 = "It's been a while, but do you want to go to the Chinese cuisine street?"
2003805-125 = "Yeah! Let's eat to our hearts' content!"
2003805-131 = "[ns5] \"Like one hive mind... \"\n[ns6] \"They all ran to the Chinese cuisine street...!\""
2003805-135 = "Teeheehee. It seems I haven't lost my public speaking skills."
2003805-136 = "[s] \"But isn't saying that Chinese food is good for you a little disingenuous, too?\""
2003805-137 = "Well."
2003805-138 = "Covering a lie with another lie is the very foundation of propaganda."
2003805-140 = "After that, the Chinese cuisine street recovered all the revenue they lost and more..."
2003805-141 = "The news kept spreading, and there was a small Chinese cuisine boom in Kivotos..."

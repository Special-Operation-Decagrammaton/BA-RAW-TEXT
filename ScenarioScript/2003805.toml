2003805-64 = "3;토모에 치파오;09;손님도 크게 줄었고, 매출도 감소하고 있는 데다, 거리에 드나드는 사람 자체가 적어져 모든 가게들이 힘들어하고 있다고요……."
2003805-65 = "[s] \"……거리 모습을 확인해 볼까?\""
2003805-66 = "3;토모에 치파오;09\n#3;a"
2003805-67 = "3;토모에 치파오;11;정말이네요. 오가는 사람의 숫자가 거의 없어요.\n#3;em;[땀]"
2003805-68 = "3;토모에 치파오;06;점심 시간과 저녁 시간이야말로 가장 열심히 식당이 영업해야 하는 때일 텐데……."
2003805-69 = "3;토모에 치파오;09;…….\n#3;em;…"
2003805-70 = "3;토모에 치파오;05;결심했습니다, 선생님.\n#3;jump"
2003805-71 = "[s] \"뭐, 뭘?!\""
2003805-72 = "3;토모에 치파오;09;가능한 한 다른 학원의 일에는 간섭하지 않으려 했습니다만……."
2003805-73 = "3;토모에 치파오;05;산해경에 있는 동안 계속해서 맛있는 중화요리를 대접받았는데."
2003805-74 = "3;토모에 치파오;11;그걸 그냥 모른 척한다는 것도, 어딘가 신경이 쓰이는 일이니까요."

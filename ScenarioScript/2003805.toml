2003805-105 = "#all;hide"
2003805-106 = "3;토모에 치파오;05;그렇습니다. 바로 그 돼지기름에 대한 오해부터, 우리는 차근차근히 풀어 나가야 할 것입니다!\n#3;jump\n#3;em;[!]"
2003805-107 = "3;토모에 치파오;09;우선 돼지기름은 비타민 B와 미네랄의 좋은 공급원으로, 양고기나 쇠고기 지방보다 포화 지방이 적고 불포화 지수가 높아 혈관 건강에 좋습니다!"
2003805-108 = "3;토모에 치파오;11;무엇보다 돼지기름은 맛있습니다! 버터의 약 3분의 1 정도로 현저히 적은 콜레스테롤을 함유하고 있기 때문에, 훌륭한 버터 대체품이 될 수도 있고요!\n#3;hophop"
2003805-109 = "3;토모에 치파오;09;월병 역시 돼지기름으로 만들지 않습니까? 저희 붉은겨울에서는 돼지 비계를 소금에 절여, 빵 사이에 끼워 먹기도 합니다. 추운 날씨를 버티기 위한 소중한 식품이죠!"
2003805-110 = "3;토모에 치파오;05;이렇게 장점밖에 없는 돼지기름을, 다른 어떤 요리보다도 마음껏 사용하는 중화요리가 건강에 나쁘다고 하는 것은, 그야말로 완전한 오해이자 음해로–\n#3;em;[반응]"
2003805-111 = "#all;hide"
2003805-112 = "#na;(……그렇게 토모에는, 돼지기름이 나쁘지 않은 이유, 나아가 중화요리가 건강을 해치지 않는 이유에 대해 능숙하게 설명을 이어갔다.)"
2003805-113 = "3;토모에 치파오;09\n#3;a"
2003805-114 = "3;토모에 치파오;05;……그렇기 때문에 중화요리가 건강에 나쁘다는 것은, 자기들만 이 좋은 중화요리를 독점하려는 저 간악한 건강 채널의 사악한 음모인 것입니다!\n#3;jump\n#3;em;[!]"
2003805-115 = "3;토모에 치파오;09;여러분, 어느 쪽이십니까? 진실만을 이야기하는 저의 말입니까, 아니면 사람을 속이는 것으로 이득을 취하는 건강 채널의 찌라시입니까!\n#3;closeup"

[translation]
2003805-1 = "ใช้ความสามารถพิเศษ"
2003805-2 = "นอกจากจะแนะนำร้านอาหารอร่อยๆ ให้แล้ว ยังเลี้ยงอาหารฉันอีกด้วย..."
2003805-3 = "ถ้าเอาแต่ให้คุณครูเลี้ยงแบบนี้ละก็ ต่อไปฉันอาจจะตอบแทนคุณครูไม่ไหวก็ได้นะคะ"
2003805-4 = "[s1] \"ถ้าคิดว่าเป็นหนี้บุญคุณละก็ ครูจะลำบากใจนะ\"\n[s2] \"ครูทำแบบนี้เพราะรู้เรื่องซานไห่จิงเยอะกว่าโทโมเอะน่ะ!\""
2003805-7 = "งั้นเหรอคะ?"
2003805-8 = "ถ้างั้นฉันจะรับความหวังดีของคุณครูไว้เองค่ะ ขอบคุณนะคะ คุณครู"
2003805-9 = "ขอโทษนะคะ รบกวนขอเมนูหน่อยได้มั้ยคะ?"
2003805-14 = "ครับ... นี่เมนูครับ"
2003805-15 = "...?"
2003805-19 = "(สีหน้าของเจ้าของร้าน... ดูแปลกๆ ชอบกลนะ?)"
2003805-20 = "(เสียงก็ดูไม่ค่อยมีแรง ใบหน้าก็ดูมืดมนด้วย)"
2003805-21 = "(พอคิดดูแล้ว ทั้งๆ ที่เป็นเวลามื้อเที่ยง แต่ในร้านกลับไม่มีลูกค้าเลย...?)"
2003805-25 = "[ns] \"โทโมเอะจะสั่งอะไรเหรอ?\""
2003805-29 = "อ๊ะ ค่ะ ถ้างั้นฉัน..."
2003805-34 = "[ns] \"ว้าว อิ่มมากเลย\""
2003805-35 = "คุณครูทานอาหารน่าอร่อยมากเลยนะคะ?"
2003805-36 = "ฉันพูดน้อยลงงั้นเหรอคะ?"
2003805-37 = "ฮุฮุฮุ ที่เป็นอย่างนั้นเพราะอาหารอร่อยยังไงล่ะคะ"
2003805-38 = "[s] \"ถ้างั้น... รบกวนคิดเงินด้วย อาหารอร่อยมากเลย\""
2003805-39 = "อาหารถูกปากรึเปล่าครับ? ถ้าอาหารถูกปากก็ค่อยยังชั่วหน่อยครับ..."
2003805-40 = "ฉันรู้สึกมาตั้งแต่เมื่อกี้นี้แล้วค่ะ..."
2003805-41 = "มีเรื่องไม่สบายใจอะไรรึเปล่าคะ คุณเจ้าของร้าน?"
2003805-42 = "ครับ? เปล่าครับ ไม่มีอะไรหรอกครับ กังวลอะไรกันครับ แค่ลูกค้าทานอาหารอย่างเอร็ดอร่อยก็พอแล้วครับ"
2003805-43 = "แต่ดูเหมือนคุณจะไม่ค่อยมีเรี่ยวแรงเลยนะคะ แถมบางครั้งก็ถอนหายใจด้วยค่ะ"
2003805-44 = "......"
2003805-45 = "อันที่จริง... ช่วงนี้ร้านของเรามีปัญหาหลายๆ อย่างเลยครับ..."
2003805-46 = "พอจะรู้สาเหตุรึเปล่าคะ?"
2003805-47 = "ถ้าให้สรุปสั้นๆ ละก็... นี่ครับ ตอนนี้รายการทีวีกำลังออกอากาศอยู่เลยครับ..."
2003805-49 = "และวันนี้ก็กลับมาพบกับช่องรักสุขภาพกันอีกแล้วนะคะ! ดูกันอยู่ใช่มั้ยคะ ชาวช่อง?"
2003805-50 = "เคยพบปัญหาว่ากินอาหารอร่อยๆ อยู่ แต่จู่ๆ ก็รู้สึกหัวใจเต้นแรงและรู้สึกเหนื่อย หรือไม่ก็ปวดท้อง#nจนไม่สบายตัวกันมั้ยคะ!"
2003805-51 = "เพราะงั้นช่องของเรา เลยทำการศึกษาเชิงลึกเกี่ยวกับสาเหตุของอาการเหล่านั้นค่ะ!"
2003805-52 = "แล้วก็พบเรื่องที่น่าตกใจมาก! ผลการศึกษาแสดงให้เห็นว่าสาเหตุของอาหารเหล่านั้นคืออาหารจีนค่ะ!"
2003805-53 = "แถมอาการเหล่านี้ยังมีชื่อเรียกด้วยนะคะ! นั่นก็คือ 'โรคภัตตาคารจีน' ค่ะ!"
2003805-54 = "ว่ากันว่าสาเหตุของอาการเหล่านี้อาจเกิดขึ้นจากกรรมวิธีการปรุงอาหารแบบจีนที่ใช้น้ำมันหมู เครื่องปรุงรส เครื่องเทศ และเกลือในปริมาณมากในการปรุงอาหารค่ะ!"
2003805-55 = "ถึงนี่จะเป็นเพียงแค่สมมติฐานเท่านั้น! เพียงแค่กินอาหารจีนก็ทำให้เกิดการสะสมไขมันในเส้นเลือด ทำให้ร่างกายเหนื่อยล้า และรู้สึกปวดเมื่อยกล้ามเนื้อได้"
2003805-56 = "นอกจากนี้ยังทำให้สถาบันครอบครัวแตกแยก ทำให้สถาบันสังคมล่มสลาย และทำให้สังคมของเรา#nเสื่อมโทรมด้วยค่ะ...! "
2003805-61 = "เอ๋... โดนตัดไปซะแล้ว..."
2003805-62 = "ต้องขอโทษคุณลูกค้าด้วยนะครับ ดันทำให้คุณลูกค้าเห็นภาพลักษณ์ที่ไม่น่าดูซะแล้ว"
2003805-63 = "เมื่อเร็วๆ นี้ มีโฆษณาชวนเชื่อว่าอาหารจีนไม่ดีต่อสุขภาพออกมาครับ..."
2003805-64 = "เลยทำให้ลูกค้าที่ร้านลดลงอย่างมาก ยอดขายก็ตกลง ร้านค้าหลายๆ ร้านประสบปัญหา เพราะมีลูกค้า#nแวะเวียนมาบางตาสินะคะ..."
2003805-65 = "[s] \"ไปดูแถวๆ นี้กันมั้ย...?\""
2003805-67 = "จริงด้วยนะคะ แทบไม่มีคนเดินผ่านไปมาเลยค่ะ"
2003805-68 = "ทั้งที่ช่วงกลางวันและช่วงเย็นเป็นเวลาที่ร้านอาหารจะคึกคักมากที่สุด..."
2003805-69 = "......"
2003805-70 = "ฉันตัดสินใจแล้วค่ะ คุณครู"
2003805-71 = "[s] \"หืม อะไรเหรอ?!\""
2003805-72 = "ฉันพยายามไม่เข้าไปยุ่งเกี่ยวกับเรื่องของสถาบันอื่นแล้วนะคะ แต่ว่า..."
2003805-73 = "ช่วงที่อยู่ที่ซานไห่จิง ฉันได้รับการต้อนรับและเลี้ยงอาหารจีนอร่อยๆ อยู่ตลอด"
2003805-74 = "คงจะให้ฉันทำเป็นไม่สนใจเรื่องนี้คงไม่ได้หรอกค่ะ"
2003805-75 = "แล้วฉันคิดจะทำยังไงน่ะเหรอคะ?"
2003805-76 = "ก่อนอื่น... เอาละค่ะ เราไปที่จัตุรัสกันก่อนดีมั้ยคะ?"
2003805-78 = "[ns3] \"มาถึงจัตุรัสแล้วจะทำอะไรต่อเหรอ?\"\n[ns4] \"คิดจะทำอะไรเหรอ โทโมเอะ?\""
2003805-81 = "ฮุฮุฮุ เรื่องนั้นน่ะเหรอคะ"
2003805-82 = "แน่นอนว่าฉันจะกล่าวปราศรัยไงล่ะคะ คุณครู!"
2003805-83 = "[s] \"ถ้าเรื่องปราศรัยละก็...?!\""
2003805-84 = "ค่ะ ถ้าบอกเล่า 'ความจริง' ที่จัตุรัสที่มีคนเดินผ่านไปมาพลุกพล่านละก็"
2003805-85 = "จะมีคนจำนวนมากที่ได้ฟังความจริงนั้น และ 'ข่าวลือ' เกี่ยวกับอาหารจีน... ก็จะหายไปค่ะ"
2003805-86 = "เพราะงั้นตั้งแต่นี้ไป ฉันจะเริ่มการปราศรัยเกี่ยวกับอาหารจีนแล้วค่ะ!"
2003805-92 = "(โทโมเอะเริ่มกล่าวสุนทรพจน์ที่กลางจัตุรัส)"
2003805-94 = "สวัสดีตอนบ่ายค่ะ นักเรียนของโรงเรียนซานไห่จิงทุกคน เพลิดเพลินกับการรับประทานอาหารกันหรือ#nเปล่าคะ?"
2003805-95 = "ที่ฉันมาที่นี่ในวันนี้ก็เพื่อบอกเล่าความจริงที่ทุกๆ คนอาจไม่เคยรู้ค่ะ"
2003805-96 = "ไม่นานนี้ดูเหมือนจะมีข่าวลือแพร่สะพัดไปว่าอาหารจีนเป็นสิ่งไม่ดีต่อสุขภาพ"
2003805-97 = "อาจทำให้หัวใจเต้นเร็วกะทันหัน เหนื่อยง่าย หรือปวดท้อง และรู้สึกไม่สบายตัว..."
2003805-98 = "แท้จริงแล้วเรื่องเหล่านี้เป็นเพียงแค่ข่าวลือที่ไม่ควรค่าแก่การรับฟังเลยค่ะ!"
2003805-103 = "เอ่อ... แต่เรื่องที่น้ำมันหมูไม่ดีต่อสุขภาพเป็นเรื่องจริงไม่ใช่เหรอคะ?"
2003805-104 = "ได้ยินว่าจะทำให้เกิดไขมันอุดตันในเส้นเลือดด้วย..."
2003805-106 = "นั่นน่ะสิคะ... เราจะเริ่มจากการแก้ไขความเข้าใจผิดเกี่ยวกับน้ำมันหมูไปทีละอย่างก่อนนะคะ!"
2003805-107 = "อันดับแรก น้ำมันหมูอุดมไปด้วยวิตามินบี และแร่ธาตุที่ดีต่อร่างกาย มีไขมันอิ่มตัวน้อยกว่าไขมันจาก#nเนื้อแกะหรือเนื้อวัว อีกทั้งมีไขมันไม่อิ่มตัวที่ดีต่อหลอดเลือดสูงกว่าด้วยค่ะ!"
2003805-108 = "และยิ่งกว่านั้นน้ำมันหมูก็อร่อยด้วยค่ะ! เราสามารถนำมาใช้ทดแทนเนยได้ด้วย เพราะมีคอเลสเตอรอล#nน้อยกว่าเนยประมาณ 1 ใน 3 เลยค่ะ!"
2003805-109 = "ขนมไหว้พระจันทร์ก็ทำมาจากน้ำมันหมูใช่มั้ยล่ะคะ? ที่สถาบันเรดวินเทอร์เราจะนำมันหมูหมักกับเกลือ และก็เอามากินกับขนมปังค่ะ เป็นอาหารที่สำคัญมากในการเอาตัวรอดท่ามกลางอากาศหนาวๆ เลยค่ะ!"
2003805-110 = "ดังนั้นการกล่าวว่าอาหารจีนที่ใช้น้ำมันหมูทำเป็นอาหารที่ไม่ดีต่อสุขภาพ ก็เลยเป็นการเข้าใจผิด และเป็นการใส่ร้ายอย่างรุนแรงค่ะ..."
2003805-112 = "(โทโมเอะอธิบายเหตุผลเรื่องที่น้ำมันหมูไม่ใช่ของที่ไม่ดีต่อสุขภาพ รวมถึงอาหารจีนไม่เป็นอันตราย#nต่อสุขภาพต่ออย่างชำนาญ...)"
2003805-114 = "ดังนั้นการกล่าวว่าอาหารจีนเป็นสิ่งที่ไม่ดีต่อสุขภาพ จึงอาจเป็นแผนร้ายของช่องอาหารสุขภาพที่คิด#nจะผูกขาดอาหารจีนไว้แต่เจ้าเดียวก็ได้ค่ะ!"
2003805-115 = "แล้วทุกคนอยู่ฝ่ายไหนกันคะ? อยู่ฝ่ายฉันที่บอกเล่าความจริง หรืออยู่ฝ่ายของช่องอาหารสุขภาพที่#nหลอกลวงผู้คนเพื่อผลประโยชน์ของตัวเองคะ?!"
2003805-120 = "ถะ... ถ้างั้น... แสดงว่าอาหารจีนไม่ได้ส่งผลเสียต่อสุขภาพ แต่เป็นอาหารที่ดีต่อสุขภาพไม่ใช่รึไง?"
2003805-121 = "นั่นน่ะสิ? เพราะใช้น้ำมันหมูที่อุดมด้วยสารอาหารด้วย..."
2003805-122 = "แถมพวกเราก็กินกันมาตลอดเลยด้วยนี่นา?"
2003805-123 = "ใช่แล้ว! เพราะงั้นถ้ามันไม่ดีและมีปัญหาจริงๆ ก็คงเกิดปัญหาไปนานแล้วละ!"
2003805-124 = "ไม่ได้ไปย่านอาหารจีนนานแล้วนะ ไปกันมั้ย?"
2003805-125 = "เอาสิ! ไปกินให้พุงกางกันเลย!"
2003805-131 = "[ns5] \"ทุกคนเห็นด้วยกันหมดเลย...\"\n[ns6] \"ทุกคนวิ่งไปที่ย่านอาหารจีนกันหมดเลย...!\""
2003805-135 = "ฮุฮุฮุ ดูเหมือนฝีปากของฉันยังใช้ได้อยู่นะคะ"
2003805-136 = "[s] \"แต่คนอาจเข้าใจผิดว่าอาหารจีนดีต่อสุขภาพก็ได้นะ\""
2003805-137 = "ก็..."
2003805-138 = "การปกปิดเรื่องโกหกด้วยเรื่องโกหกอีกเรื่องหนึ่งเป็นพื้นฐานของการพูดโฆษณาชวนเชื่อค่ะ"
2003805-140 = "(หลังจากนั้นย่านอาหารจีนก็กลับมาคึกคัก และมีรายได้มากพอที่จะฟื้นฟูกิจการจากการขาดทุนที่ผ่าน#nมาได้...)"
2003805-141 = "(ข่าวลือค่อยๆ กระจายไป และอาหารจีนก็กลายเป็นอาหารยอดฮิตในคิโวทอสอยู่ระยะหนึ่ง...)"

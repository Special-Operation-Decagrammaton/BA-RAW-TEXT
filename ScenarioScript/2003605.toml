[translation]
2003605-1 = "無數的回憶"
2003605-2 = "（為了幫忙茜香打掃部室而前往了阿拜多斯）"
2003605-10 = "唔嗯……"
2003605-11 = "結果你還是來了啊。#n我明明都說過不用來的。"
2003605-12 = "其實真的沒關係……這點小事我一個人也能做……"
2003605-13 = "你就坐在那裡等吧。#n要不要吃點心？"
2003605-14 = "沒關係……？"
2003605-15 = "真的只是來幫忙打掃的……？"
2003605-16 = "唉，老師……"
2003605-17 = "不能這樣啦。#n這樣不就變成……我是想叫老師做事才傳MomoTalk的嗎……"
2003605-18 = "我真的沒有那個意思。"
2003605-19 = "你也不想把我變成那種學生吧？#n還是你希望之後我每次傳MomoTalk都要擔心這種情況？"
2003605-20 = "……嗯？還是想幫忙？"
2003605-21 = "如果在意的話……之後給一點小小的回報就行了？"
2003605-22 = "唉……"
2003605-26 = "……算了。#n老師任性到這個地步，我也很難拒絕。"
2003605-27 = "好吧，既然我總是跟老師討吃的，這次就換我請老師吃拉麵吧。"
2003605-28 = "不過既然說要幫忙，勸你最好有所覺悟哦！因為我不能容許敷衍了事！"
2003605-29 = "那麼……"
2003605-30 = "開始打掃吧！！"
2003605-33 = "（之後便開始和茜香一起打掃部室）"
2003605-34 = "（因為東西已經整理得差不多，所以主要是做一些擦拭灰塵的工作）"
2003605-36 = "我看看，這樣應該差不多了……"
2003605-37 = "嗯……好！就打掃到這裡吧！！辛苦你了，老師！！"
2003605-38 = "[s1]「茜香你才辛苦。」\n[s2]「感覺很舒暢，挺令人開心的。」"
2003605-41 = "話說回來，不知道是不是兩人一起打掃的關係，感覺一下就完成了耶。"
2003605-42 = "這都多虧了老師……"
2003605-46 = "……？"
2003605-47 = "[s3]「那邊好像有個箱子……？」\n[s4]「有個沒看過的箱子耶？」"
2003605-50 = "啊啊，這個是……"
2003605-51 = "怎麼擺得這麼理所當然呢。得處理掉才行。"
2003605-52 = "明明連平常看不見的地方都擦得這麼認真，結果卻漏掉了這麼明顯的東西……"
2003605-56 = "……先等一下。#n老師怎麼會知道原本沒有這個箱子？"
2003605-57 = "該不會把我們部室的東西全都記起來了吧……"
2003605-58 = "[s5]「那是因為……這裡基本上都沒什麼改變。」\n[s6]「來了幾次之後就漸漸記起來了。」"
2003605-61 = "那，那還真抱歉哦！這個部室就是那麼寒酸！！"
2003605-62 = "總之，這真的不是什麼特別的東西……"
2003605-66 = "[ns7]「泳裝……？」\n[ns8]「啊，是上次去渡假勝地時的……」"
2003605-69 = "反正也沒有其他地方能放。"
2003605-70 = "當時一時衝動就買了漂亮的泳裝，後來仔細想想才發現其實沒什麼機會穿……"
2003605-71 = "結果就只能放著長灰塵了。"
2003605-72 = "但是丟掉又有點……"
2003605-76 = "嗯？老師，你剛才說什麼？"
2003605-77 = "……咦？"
2003605-78 = "要我現在穿穿看……？"
2003605-79 = "……現在嗎！？！？"
2003605-80 = "[s9]「偶爾穿一下就不算只能長灰塵了吧？」\n[s10]「反正泳裝也不一定只能在海邊穿。」"
2003605-83 = "老師又在胡說什麼啊！？泳裝就是要到海邊才能穿！這是常識！！"
2003605-84 = "真是的，老師就是喜歡胡說八道。"
2003605-85 = "唉……"
2003605-86 = "不用這麼配合我沒關係，我不會丟掉的。"
2003605-87 = "因為……那個……該怎麼說……"
2003605-88 = "這是大家一起去海邊時……穿過的……"
2003605-89 = "是老師每天掛在嘴邊的……"
2003605-93 = "回，回……"
2003605-94 = "回憶……之類的東西……當然要留著。嗯……"
2003605-95 = "…………"
2003605-96 = "…………"
2003605-97 = "怎，怎樣啦……"
2003605-98 = "那是什麼表情……！！笑得好討厭！！"
2003605-99 = "[s11]「嗚嗚嗚……我好感動，茜香醬……」\n[s12]「你變懂事了呢，茜香醬……」"
2003605-102 = "啊啊啊啊啊啊啊──！！"
2003605-103 = "別說那種很像我爸爸會說的話！！"
2003605-104 = "果然就不該叫你來的！！拉麵的事當我沒說！你連湯都別想喝！！"
2003605-105 = "別，別笑了……！！"
2003605-107 = "就說別笑了啦～～～！！！"

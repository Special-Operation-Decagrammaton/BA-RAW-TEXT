[translation]
2003605-1 = "ความทรงจำที่ประเมินค่าไม่ได้"
2003605-2 = "(คุณครูมุ่งหน้าไปยังอะบิดอสเพื่อช่วยเซริกะทำความสะอาดห้องชมรม)"
2003605-10 = "อืม..."
2003605-11 = "มาจนได้สินะ อุตส่าห์บอกไปแล้วว่าไม่ต้องมาช่วยกันก็ได้"
2003605-12 = "ฉันไม่เป็นไรจริงๆ นะ... งานแค่นี้ฉันทำคนเดียวได้อยู่แล้ว..."
2003605-13 = "ไปนั่งรอตรงนั้นมั้ย? หรือให้ฉันเอาขนมมาให้มั้ย?"
2003605-14 = "ไม่เป็นไรงั้นเหรอ?"
2003605-15 = "ที่มาก็เพราะจะมาช่วยทำความสะอาดจริงๆ...?"
2003605-16 = "เฮ้อ... คุณครู"
2003605-17 = "ไม่ได้หรอก แบบนี้ก็เหมือนว่าฉันส่ง MOMOTALK ไปเพื่อจะสั่งงานคุณครูน่ะสิ"
2003605-18 = "ฉันไม่ได้ชวนคุยเพราะจะให้มาช่วยงานเลยนะ"
2003605-19 = "คุณครูไม่ได้อยากทำให้ฉันเป็นนักเรียนแบบนั้นหรอกใช่มั้ย? หรือคุณครูอยากให้ฉันใส่ใจ#nมากกว่านี้เวลาส่ง MOMOTALK ให้ในครั้งต่อไปน่ะ? "
2003605-20 = "หืม...? ไม่ได้คิดแบบนั้นเหรอ? "
2003605-21 = "ถ้ารู้สึกผิด... ไว้ฉันตอบแทนอะไรให้ทีหลังก็ได้งั้นเหรอ?"
2003605-22 = "ตอบแทนอะไร..."
2003605-26 = "ช่างเถอะ... ถ้าคุณครูจะรั้นขนาดนี้ จะปฏิเสธต่อก็คงไม่มีประโยชน์"
2003605-27 = "ก็ได้ ที่ผ่านมาคุณครูเลี้ยงข้าวฉันมาตลอดเลย งั้นครั้งนี้ฉันจะเลี้ยงราเม็งแล้วกัน"
2003605-28 = "แต่ถ้าจะช่วยทำความสะอาด ก็เตรียมใจเอาไว้ด้วยล่ะ! ถ้าทำมาแบบลวกๆ ฉันจะไม่ให้ผ่านแน่!"
2003605-29 = "ถ้างั้นก็..."
2003605-30 = "เริ่มทำความสะอาดได้!! "
2003605-33 = "(หลังจากนั้นคุณครูก็ช่วยเซริกะทำความสะอาดห้องชมรม)"
2003605-34 = "(ข้าวของถูกจัดไว้เป็นระเบียบดีแล้ว งานที่ทำจึงเป็นแค่การเช็ดฝุ่นในส่วนที่มองไม่เห็น)"
2003605-36 = "ไหนดูซิ... ประมาณนี้ก็น่าจะใช้ได้แล้วนะ..."
2003605-37 = "อื้ม...! ดีมาก! ปิดจ๊อบได้!! ขอบคุณที่เหน็ดเหนื่อยนะคุณครู!! "
2003605-38 = "[s1] \"เซริกะต่างหากที่เหน็ดเหนื่อย\"\n[s2] \"พอห้องสะอาดก็รู้สึกดีขึ้นมาเลยนะ\""
2003605-41 = "จะว่าไปพอมาช่วยกันทำสองคน มันก็เสร็จเร็วอยู่เนอะ"
2003605-42 = "ทั้งหมดนี้ต้องขอบคุณคุณครูเลยนะ..."
2003605-46 = "หืม...?"
2003605-47 = "[s3] \"ทำไมมีลังอะไรด้วย...\"\n[s4] \"ลังนั่นไม่เคยเห็นมาก่อนเลยนะ?\""
2003605-50 = "อ่า... ลังอันนั้นน่ะเหรอ... "
2003605-51 = "ตั้งไว้หราเลยแฮะ ต้องเก็บไปทิ้งแล้วละ"
2003605-52 = "พอเลือกไปเช็ดฝุ่นในจุดที่มองไม่เห็น ก็กลายเป็นว่าเราเมินสิ่งที่วางอยู่ตรงหน้าไปเลย..."
2003605-56 = "เดี๋ยวนะ... ว่าแต่ทำไมคุณครูถึงรู้ล่ะว่าปกติลังนี้ไม่ได้อยู่ในห้องชมรมเรา"
2003605-57 = "อย่าบอกนะว่าที่ผ่านมาครูจำได้หมดเลยว่าอะไรอยู่ตรงไหน?"
2003605-58 = "[s5] \"ก็... ของในห้องเป็นของเดิมๆ ตลอดเลยนี่นา\"\n[s6] \"ถึงจะไม่ได้ตั้งใจจำ แต่ครูก็มาบ่อยจนจำได้ไปเองน่ะ\""
2003605-61 = "งะ... งั้นก็ต้องขอโทษด้วยนะที่ห้องชมรมเราไม่ค่อยมีอะไรน่ะ!! "
2003605-62 = "เอาเถอะ แต่ของนั่นก็ไม่ใช่อะไรยอดเยี่ยมอะไรหรอก..."
2003605-66 = "[ns7] \"ชุดว่ายน้ำนี่นา...?\n[ns8] \"อ๋อ ที่ใส่ตอนไปรีสอร์ต...\""
2003605-69 = "ฉันไม่รู้จะเอาไปไว้ไหนน่ะ"
2003605-70 = "อุตส่าห์ซื้อชุดสวยๆ มาแท้ๆ แต่พอมาคิดดูแล้ว หลังจากตอนนั้นแล้วฉันก็ไม่มีโอกาสได้ใส่อีกเลย..."
2003605-71 = "สุดท้ายก็กลายเป็นของที่เห็นแล้วเสียดายเงินซะอย่างนั้น"
2003605-72 = "แต่จะให้ทิ้งก็..."
2003605-76 = "หืม? เมื่อกี้คุณครูว่าไงนะ?"
2003605-77 = "หา...?"
2003605-78 = "ให้ฉันใส่ดูงั้นเหรอ...? ตอนนี้?"
2003605-79 = "ตอนนี้เนี่ยนะ!?!?"
2003605-80 = "[s9] \"หยิบมาใส่บ่อยๆ ก็จะไม่เสียดายเงินไง\"\n[s10] \"ใช่ว่าจะต้องใส่ที่ทะเลอย่างเดียวสักหน่อย\""
2003605-83 = "พูดอะไรออกมาอีกแล้วเนี่ย!? ชุดว่ายน้ำเขาให้ใส่ตอนลงน้ำเถอะ! เรื่องแค่นี้ไม่รู้เหรอ?! "
2003605-84 = "จริงๆ เลยเชียว คุณครูเป็นคนที่นึกจะพูดอะไรก็พูดเลยจริงๆ นะ"
2003605-85 = "เฮ้อ..."
2003605-86 = "ไม่ต้องพูดให้ฉันรู้สึกดีขึ้นหรอก แล้วก็ไม่ต้องกลัวว่าฉันจะทิ้งชุดด้วย"
2003605-87 = "เพราะว่ามัน... เอ่อ... เรียกว่าอะไรนะ..."
2003605-88 = "มันเป็นชุดที่ฉันใส่ในสถานที่ที่เราไปด้วยกัน... ก็เลยเป็น..."
2003605-89 = "เป็นสิ่งที่คุณครูพูดอยู่ประจำน่ะ..."
2003605-93 = "คะ... คะ..."
2003605-94 = "ความทรงจำ... อะไรเทือกนั้นน่ะ... ฉันก็ต้องเก็บไว้สิ อืม..."
2003605-95 = "..."
2003605-96 = "..."
2003605-97 = "อะ... อะไรน่ะ..."
2003605-98 = "ทำไมทำหน้าแบบนั้น...!! อย่ายิ้มแบบนั้นสิ มันน่าหงุดหงิดนะ!!"
2003605-99 = "[s11] \"ฮือๆ... ครูประทับใจมากเลย เซริกะจัง...\"\n[s12] \"เซริกะจังของเราไม่ใช่เด็กน้อยแล้วนะเนี่ย...\""
2003605-102 = "เดี๋ยวเหอะ!!"
2003605-103 = "อย่ามาพูดอะไรแบบนี้นะ!!"
2003605-104 = "ฉันผิดเองละ! ไม่น่าเรียกคุณครูมาเลย!! ที่บอกว่าจะเลี้ยงราเม็ง ฉันไม่เลี้ยงแล้วนะ! ไม่ต้องกงต้องกินมันแล้ว!! "
2003605-105 = "ยะ... หยุดยิ้มได้แล้ว...!!"
2003605-107 = "บอกให้หยุดยิ้มไงเล่า~~~!!!"

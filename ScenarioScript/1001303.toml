1001303-80 = "ฉะ...ฉันพร้อมแล้วค่ะ"
1001303-81 = "[s] \"เอาล่ะ! ลองนึกว่าตัวเองเป็นสาวน้อยวิ่งในทุ่งลาเวนเดอร์ดูนะ!\""
1001303-82 = "(ตุ้บๆๆๆ!)"
1001303-86 = "(แชะ!)"
1001303-89 = "ปะ...เป็นยังไงบ้างคะ?"
1001303-100 = "[ns17] (แบบนี้ก็ใช้ไม่ได้...)\n[s18] \"มาลองวิธีอื่นกันดีกว่า...\""
1001303-101 = "กะ...ก็ได้ค่ะ"
1001303-102 = "กะ...ก็ได้ค่ะ"
1001303-104 = "ลานสวนสนุก ชานเมืองทรีนิตี้"
1001303-105 = "ทะ...ที่นี่คือ...."
1001303-106 = "[s] \"ถ้าถ่ายตอนกลางคืนก็จะมองเห็นหน้าไม่ชัดยังไงล่ะ!\""
1001303-107 = "หะ...เห็นหน้าไม่ชัดเหรอคะ?!"
1001303-108 = "ถะ...ถึงฉันจะไม่ค่อยรู้เรื่องเท่าไร แต่รูปถ่ายควรเห็นหน้าไม่ใช่เหรอคะ?"
1001303-109 = "[s19] \"ไม่เป็นไรหรอก!!\"\n[s20] \"เดี๋ยวครูจะถ่ายรูปซึรุกิออกมาให้สวยๆ เลย!\""
1001303-110 = "งะ...งั้นเหรอคะ การถ่ายรูปนี่น่าทึ่งมากๆ เลยนะคะ..."
1001303-111 = "งะ...งั้นเหรอคะ การถ่ายรูปนี่น่าทึ่งมากๆ เลยนะคะ..."
1001303-113 = "[s21] (รู้สึกไม่เหมือนการถ่ายรูปติดบัตรเข้าไปทุกที)\n[s22] (อาจจะใช้ได้ก็ได้นะ)"
1001303-114 = "ฉะ...ฉันจะพยายามค่ะ!"
1001303-115 = "ฉะ...ฉันจะพยายามค่ะ!"
1001303-120 = "(รูปที่ถ่ายออกมาทั้งหมดดูเหมือนรูปภาพถ่ายแสงเบลอๆ เท่านั้น)"

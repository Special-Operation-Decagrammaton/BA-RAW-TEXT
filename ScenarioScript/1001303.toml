1001303-67 = "ขะ...ขอโทษด้วยค่ะ ฉันไม่รู้ว่าการยิ้มแบบธรรมชาติเป็นยังไง..."
1001303-68 = "ขะ...ขอโทษด้วยค่ะ ฉันไม่รู้ว่าการยิ้มแบบธรรมชาติเป็นยังไง..."

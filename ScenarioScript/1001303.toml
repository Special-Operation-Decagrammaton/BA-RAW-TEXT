[translation]
1001303-1 = "โลกแห่งการถ่ายภาพเซลฟี่"
1001303-5 = "[ns1] \"ว่าไง~ ซึรุกิ\"\n[ns2] \"มีอะไรเหรอ?\""
1001303-6 = "สะ.. สะ.. สะ....สวัสดีค่ะคุณครู"
1001303-7 = "สะ.. สะ.. สะ....สวัสดีค่ะคุณครู"
1001303-8 = "อะ...อากาศดีจังเลยนะคะ! คะ...คือว่า....."
1001303-9 = "คือว่าเหตุผลที่ฉันเรียกคุณครูมา... "
1001303-10 = "[s] ฟังเรื่องราวของเธอ"
1001303-14 = "คือ...คือว่าเรา...ต้องใช้รูปถ่ายของคุณเพื่อออกเอกสารสำคัญฉบับใหม่ครับ!"
1001303-15 = "...รูปเหรอ?"
1001303-16 = "ครับ ใช่แล้วครับ! ใช้โทรศัพท์ถ่ายรูปก็ได้นะครับ ตะ...แต่ช่วยรบกวนขอเป็นรูปหน้าตรงแบบดีๆ ให้เรา...."
1001303-17 = "อ๋อ...."
1001303-18 = "ฮะ...ฮึ่ก! น่ากลัวจัง! ยังไงก็รบกวนเรื่องรูปด้วยนะครับ!"
1001303-21 = "รูปถ่ายงั้นเหรอ...\n"
1001303-23 = "[ns] \"เธอถ่ายเซลฟี่ไม่เป็นสินะ\""
1001303-24 = "ชะ...ใช่แล้วค่ะ"
1001303-25 = "ฉะ...ฉันไม่ค่อยชินกับการถ่ายรูปเท่าไร..."
1001303-26 = "ตอนที่ไปถ่ายรูปติดบัตรนักเรียน ฉันก็เผลอถล่มตึกที่ใช้ถ่ายรูปไป..."
1001303-27 = "[s] \"อืม... ที่จริงแล้ว...\""
1001303-28 = "คะ...คือว่า... ถ้าเป็นคุณครูคงอาจจะสอนวิธีให้ฉันได้..."
1001303-29 = "[s3] \"ก็ได้ เชื่อมือครูได้เลย!\"\n[s4] \"เดี๋ยวจะสอนเทคนิคเซลฟี่ให้เอง!\""
1001303-30 = "ขะ...ขอบคุณมากค่ะ"
1001303-31 = "ขะ...ขอบคุณมากค่ะ"
1001303-33 = "[ns5] \"แสงคือพื้นฐานการถ่ายรูป!\"\n[ns6] \"ต้องเลือกถ่ายตรงที่ที่สว่าง\""
1001303-34 = "แสง..."
1001303-35 = "แสง..."
1001303-36 = "หันหน้าไปทางพระอาทิตย์..."
1001303-37 = "ถ้างั้นจะถ่ายแล้วนะคะ..."
1001303-40 = "(แสยะยิ้ม)"
1001303-41 = "แบบนี้ใช้ได้มั้ยคะ?"
1001303-42 = "[s7] (รูปนี้คงไม่เวิร์คละมั้ง)\n[s8] \"ปัญหาคือการแสดงสีหน้าสินะ\""
1001303-43 = "งั้นเหรอคะ สีหน้าฉันนี่เองที่เป็นปัญหา..."
1001303-44 = "งั้นเหรอคะ สีหน้าฉันนี่เองที่เป็นปัญหา..."
1001303-46 = "[s] \"ทำไมไม่ยิ้มหน่อยล่ะ?\""
1001303-47 = "ยิ้ม... เข้าใจแล้วค่ะ"
1001303-48 = "คือ... แบบนี้เหรอคะ...?"
1001303-51 = "(แสยะยิ้ม)"
1001303-52 = "[s9] (ดูยังไงก็ยังน่ากลัวอยู่ดี...)\n[s10] \"ลองยิ้มแบบเป็นธรรมชาติหน่อยสิ\""

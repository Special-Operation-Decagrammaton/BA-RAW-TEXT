[translation]
1001303-1 = "自拍的世界"
1001303-5 = "[ns1] 「早安～弦生。」\n[ns2] 「有什麼事嗎？」"
1001303-6 = "早，早，早安，老師。"
1001303-7 = "早，早，早安，老師。"
1001303-8 = "今，今天天氣真好呢！那，那個……"
1001303-9 = "我今天斗膽把老師找來這裡，為了不是別的…… "
1001303-10 = "[s] 聽取緣由"
1001303-14 = "其，其實……是，是，是因為弦生同學的學生資料需要更新，所，所以須要證件照！"
1001303-15 = "……照片？"
1001303-16 = "啊，是！最近用手機APP拍照也很方面，所，所以請妳一定要傳一張拍得比較好的照片，請一定要……"
1001303-17 = "啊啊……"
1001303-18 = "噫，噫噫！好可怕！總之拜託妳了！"
1001303-21 = "照片……"
1001303-23 = "[ns] 「……也就是說，妳不知道自拍的方法呀。」"
1001303-24 = "是，是，是的。 "
1001303-25 = "無論如何，都沒辦法習慣拍照……"
1001303-26 = "以前我拍學生證的時候，也不小心毀掉了一棟大樓……"
1001303-27 = "[s] 「還有那種事……」"
1001303-28 = "所，所，所以……我想老師搞不好可以教教我……"
1001303-29 = "[s3] 「好，包在我身上！」\n[s4] 「來進行自拍特訓吧！」"
1001303-30 = "非，非常感謝！"
1001303-31 = "非，非常感謝！"
1001303-33 = "[ns5] 「拍照的基本是光線！」\n[ns6] 「必須在光線充足的地方拍照！」"
1001303-34 = "光……"
1001303-35 = "光……"
1001303-36 = "對著太陽……"
1001303-37 = "那麼，我拍拍看。"
1001303-40 = "（喀嚓）"
1001303-41 = "這樣就，可以了嗎？"
1001303-42 = "[s7] （……有點微妙）\n[s8] 「……是表情的問題嗎。」"
1001303-43 = "……原來如此，表情嗎。"
1001303-44 = "……原來如此，表情嗎。"
1001303-46 = "[s] 「再露出一點笑容看看如何？」"
1001303-47 = "笑容……我知道了。"
1001303-48 = "那個……這樣……？"
1001303-51 = "（喀嚓）"
1001303-52 = "[s9] （……不管怎麼看，表情都很可怕）\n[s10] 「再笑得自然一點？」"
1001303-53 = "自然……"
1001303-54 = "自然……"
1001303-55 = "像這樣……嗎？"
1001303-58 = "（喀嚓）"
1001303-59 = "[s11] （……變得更可怕了）\n[s12] 「……例如，想像一下幸福的事如何？」"
1001303-60 = "……唔，呣，好難啊。幸福的事……"
1001303-61 = "……唔，呣，好難啊。幸福的事……"
1001303-62 = "那個……那……這樣呢？"
1001303-65 = "（喀嚓）"
1001303-66 = "[s13] （……這樣不行）\n[s14] 「……找其他辦法吧。」"
1001303-67 = "……對，對不起。不管我怎麼努力，自然的表情對我來說……"
1001303-68 = "……對，對不起。不管我怎麼努力，自然的表情對我來說……"
1001303-69 = "不，不太能理解。"
1001303-71 = "這裡是……"
1001303-72 = "[s15] 「我想以夕陽為背景拍照就行了！……大概吧。」\n[s16] （適度遮住臉應該沒問題）"
1001303-73 = "是，是嗎？"
1001303-74 = "是，是嗎？"
1001303-75 = "既然老師都這麼說了，那應該沒錯吧。"
1001303-76 = "那麼這次我該怎麼……？"
1001303-77 = "[s] 「這次用有活力的感覺！」"
1001303-78 = "有，有活力的感覺？"
1001303-80 = "我，我準備好了。"
1001303-81 = "[s] 「好！像在花園裡奔跑的大小姐一樣！」"
1001303-82 = "（噠噠噠噠噠噠──！）"
1001303-86 = "（喀嚓！）"
1001303-89 = "如，如何呢？"
1001303-100 = "[ns17] （……這也不行）\n[ns18] 「……找其他辦法吧。」"
1001303-101 = "這，這樣啊……"
1001303-102 = "這，這樣啊……"
1001303-104 = "三一外圍．小遊樂園"
1001303-105 = "這，這裡是……"
1001303-106 = "[s] 「乾脆用夜景當背景，不讓臉出現就行了！」"
1001303-107 = "臉，臉嗎……！？"
1001303-108 = "雖，雖然我不太清楚，但是那樣的照片也可以嗎？"
1001303-109 = "[s19] 「沒問題！！」\n[s20] 「我一定會讓弦生拍出好看的照片！！」"
1001303-110 = "原，原來如此，照片的世界真是奇妙……"
1001303-111 = "原，原來如此，照片的世界真是奇妙……"
1001303-113 = "[s21] （感覺距離證件照越來越遠了）\n[s22] （嘛，無所謂吧）"
1001303-114 = "我，我會加油的！"
1001303-115 = "我，我會加油的！"
1001303-120 = "（拍了一堆，不管怎麼看都像是靈異照片的東西）"
1001303-122 = "[ns] 「抱歉……沒幫上忙。」"
1001303-123 = "不，不敢當！"
1001303-124 = "多，多虧了老師，我好像稍微懂了什麼叫做成年人的玩樂……"
1001303-125 = "今，今天很謝謝您！！"
1001303-127 = "（弦生帶著意外開朗的表情回去了）"

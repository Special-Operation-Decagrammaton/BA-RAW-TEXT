1001303-123 = "มะ...ไม่เป็นไรค่ะ! \n\n"
1001303-124 = "วะ...วันนี้ฉันรู้สึกเข้าใจเรื่องงานอดิเรกของผู้ใหญ่ขึ้นมานิดหน่อยแล้วค่ะ..."
1001303-125 = "วะ...วันนี้ขอบคุณมากค่ะ!!\n\n"

[translation]
10008040-1 = "ตอนที่ 4;กลุ่มผู้ขัดขวาง"
10008040-6 = "วะฮะฮ่า! ตู้บริจาคเป็นของพวกเราแล้ว!"
10008040-7 = "แค่มีตู้บริจาคนี่ละก็...!"
10008040-8 = "ความฝันที่พวกเราได้แต่เก็บมาไว้ในใจตลอดก็จะเป็นจริง...!"
10008040-10 = "น่ารำคาญ หลีกไปให้พ้น!!"
10008040-14 = "จะ...จัดการได้โดยที่มะ...ไม่ต้องต่อสู้เลยแบบนี้... อึก!"
10008040-22 = "อ๊ะ เจอแล้ว! เจ้าพวกที่ไล่ตามตู้บริจาค!"
10008040-23 = "คิกคิกคิก... ถ้าแย่งตู้บริจาคมาได้ละก็ คราวนี้จะได้ไปซื้อ....!!"
10008040-27 = "ยะ...ยังไม่ทันได้สู้เลย..."
10008040-32 = "แฮ่ก... แฮ่ก..."
10008040-33 = "ประธาน บรรยากาศมันดูแปลกๆ นะ นี่มัน..."
10008040-37 = "เอ๋? นี่มันอะไรกันเนี่ย?"
10008040-38 = "อยู่นั่นไง!"
10008040-39 = "คิดว่าจะหนีพ้นเรอะ!"
10008040-40 = "ทุกคนบุกเลย!!"
10008040-42 = "ดะ...เดี๋ยวก่อนเซ่! คราวนี้เล่นบุกเข้ามาพร้อมๆ กันเลยเหรอ?!"
10008040-43 = "อีกแล้วเหรอ?!"

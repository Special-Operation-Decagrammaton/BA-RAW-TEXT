[translation]
10008040-1 = "第4話;蜂擁而至的礙事者"
10008040-6 = "呀哈哈！賽錢箱是我們的！"
10008040-7 = "只要能拿到賽錢箱……！"
10008040-8 = "平時藏在內心深處的夢想總算能……！"
10008040-10 = "少礙事！！"
10008040-14 = "怎，怎麼會，居然連戰鬥環節都沒有就輕易被……咕哈！"
10008040-22 = "找到了！只要搞定那些傢伙就能把賽錢箱……！"
10008040-23 = "我要把賽錢箱搶過來，拿去買這次新出的槍械……！"
10008040-27 = "至，至少讓我把話，把槍械說完……"
10008040-32 = "哈啊，哈啊……"
10008040-33 = "果然這個情況有點不太對勁……"
10008040-37 = "嗯？這次又是誰？"
10008040-38 = "在那裡！"
10008040-39 = "別想逃！"
10008040-40 = "上吧，全員突擊！！"
10008040-42 = "好，好像突然全都集結過來了！？"
10008040-43 = "啊啊真是的，到底怎麼回事啊！？"

[translation]
1300306-1 = "สาเหตุของความเครียด"
1300306-2 = "ย่านการค้า ชานเมืองทรีนิตี้"
1300306-3 = "สวัสดีค่ะคุณครู"
1300306-4 = "บังเอิญเจอกันอีกแล้วนะคะ"
1300306-5 = "[s] \"ฮาสุมิ...? มาทำอะไรเหรอ?\""
1300306-6 = "คะ? ไม่ได้มีธุระอะไรพิเศษหรอกค่ะ... ทำไมเหรอคะ?"
1300306-7 = "ฉะ...ฉันดูเหมือนกำลังโกรธเหรอคะ?"
1300306-8 = "อ่า... ขอโทษด้วยค่ะ ช่วงนี้ฉันกำลังพยายามลดของหวานอยู่..."
1300306-9 = "เลยรู้สึกเครียด..."
1300306-10 = "อีกอย่างที่ชมรมทวงความยุติธรรมก็มีเรื่องที่ทำให้เครียดด้วย..."
1300306-11 = "ช่วงนี้ฉันมีอาการปวดหัวบ่อยๆ..."
1300306-12 = "......."
1300306-13 = "แต่ไม่ต้องห่วงหรอกค่ะ"
1300306-14 = "[s] \"ฮาสุมิดูไม่โอเคเลยสักนิดนะ\""
1300306-15 = "งะ...งั้นเหรอคะ..."
1300306-16 = "ถ้าทำให้ทุกคนเป็นห่วงแบบนี้... การลดน้ำหนักคงไม่มีความหมาย..."
1300306-17 = "[s] \"อย่าฝืนตัวเองเกินไปจะดีกว่านะ\""
1300306-18 = "คะ? คุณครูคิดอย่างนั้นเหรอคะ?"
1300306-19 = "แต่ว่าฉัน..."
1300306-20 = "ถึงจะดูน่าอายอยู่สักหน่อย แต่ฉันยอมรับว่าเวลาที่เห็นเด็กผู้หญิงคนอื่นใส่ชุดที่ดูพริ้วไหว ฉันจะ#nรู้สึกไม่มั่นใจในตัวเอง...."
1300306-21 = "เอ่อ... อืม..."
1300306-22 = "คุณครูไม่อยากให้ฉันลดน้ำหนักเหรอคะ?"
1300306-23 = "[s1] \"ฮาสุมิเป็นแบบนี้ก็ดีอยู่แล้ว\"\n[s2] \"ตอนนี้ก็ดีอยู่แล้วนะ\""
1300306-24 = "......."
1300306-25 = "......."
1300306-26 = "อย่างนั้นเหรอคะ"
1300306-27 = "คุณครูคิดอย่างนั้นเหรอคะ"
1300306-28 = "ฮิฮิ... จู่ๆ ฉันก็หายปวดหัวแล้วค่ะ"
1300306-29 = "ไปกันเถอะค่ะ ใกล้ๆ นี้มีร้านเบเกอรี่อร่อยๆ อยู่ด้วย..."
1300306-32 = "คุณครูสนับสนุนให้ฉันเลิกลดน้ำหนัก เพราะงั้นวันนี้ต้องรับผิดชอบโดยไปกินขนมกับฉันนะคะ"
1300306-34 = "(หลังจากนั้นคุณครูกับฮาสุมิก็กินขนมปังทุกชนิดที่ร้านเบเกอรี่)"

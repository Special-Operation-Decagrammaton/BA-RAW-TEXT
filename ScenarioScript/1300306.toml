[translation]
1300306-1 = "The Root of Stress"
1300306-2 = "Trinity Suburban Shop"
1300306-3 = "Hey, Sensei."
1300306-4 = "We have to stop meeting like this."
1300306-5 = "[s] \"Hasumi...? What are you doing here?\""
1300306-6 = "Isn't it obvious? Am I not allowed to shop here too?"
1300306-7 = "...Did you upset me?"
1300306-8 = "Oh... I'm sorry. I've been weaning myself off of desserts."
1300306-9 = "It's making me very stressed and high strung."
1300306-10 = "The Justice Task Force's current workload isn't helping matters..."
1300306-11 = "I've even begun to develop headaches."
1300306-12 = "..."
1300306-13 = "...But I'm fine."
1300306-14 = "[s] \"You don't look fine to me.\""
1300306-15 = "Do I not...?"
1300306-16 = "If I keep worrying the people around me, then what's the point of my diet?"
1300306-17 = "[s] \"Why not drop the diet if you're so stressed out?\""
1300306-18 = "Do you think I should?"
1300306-19 = "But, I..."
1300306-20 = "I'm a little embarrassed to admit it, but I lose confidence when I see other ladies with their dainty uniforms..."
1300306-21 = "Um... If I may ask... "
1300306-22 = "Do you not want me to go on a diet, Sensei?"
1300306-23 = "[s1] \"I like you as you are, Hasumi.\"\n[s2] \"You're fine the way you are.\""
1300306-24 = "..."
1300306-25 = "..."
1300306-26 = "I see."
1300306-27 = "...That's how you feel?"
1300306-28 = "Heehee. My headache suddenly went away."
1300306-29 = "Let's go. I know of a delicious bakery nearby."
1300306-32 = "You're the one who told me to quit my diet. Therefore, you have a responsibility to tag along and try desserts with me."
1300306-34 = "We then went and stuffed ourselves at the bakery."

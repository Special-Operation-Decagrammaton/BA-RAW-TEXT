[translation]
1300306-1 = "壓力的原因"
1300306-2 = "三一外圍．商店街"
1300306-3 = "早安，老師。"
1300306-4 = "又偶然，遇到了呢。"
1300306-5 = "[s] 「蓮實……？有什麼事嗎？」"
1300306-6 = "咦？我沒事啊……老師怎麼這麼問？"
1300306-7 = "……因為我看起來在生氣，是嗎？"
1300306-8 = "啊啊……對不起。可能是因為我最近在限制自己吃甜食……"
1300306-9 = "所以有點壓力……"
1300306-10 = "而且實現正義部最近，也頻頻發生一些備感壓力的狀況……"
1300306-11 = "最近甚至還有些頭痛……"
1300306-12 = "……"
1300306-13 = "……不過，我沒事的。"
1300306-14 = "[s] 「看起來很有事啊。」"
1300306-15 = "是，是嗎……"
1300306-16 = "如果會讓別人擔心的話……那我減肥也沒有意義了……"
1300306-17 = "[s] 「我覺得不需要勉強自己減肥喔。」"
1300306-18 = "咦？是，是嗎？ "
1300306-19 = "可是……我……"
1300306-20 = "說來慚愧，最近一看到和自己穿著相同制服的女生，就會莫名失去自信……"
1300306-21 = "我到底該怎麼辦才好呢……"
1300306-22 = "……老師覺得我不要減肥比較好嗎？"
1300306-23 = "[s1] 「我喜歡現在的蓮實。」\n[s2] 「你現在已經夠好了。」"
1300306-24 = "……"
1300306-25 = "……"
1300306-26 = "這，這樣啊。"
1300306-27 = "……說的也是。"
1300306-28 = "……呵呵。感覺連頭痛都消失了呢。"
1300306-29 = "請跟我來。這附近有間很好吃的麵包店……"
1300306-32 = "既然老師都向我保證了，那老師今天可要負起責任陪我唷。"
1300306-34 = "（之後一起去了麵包店，買了很多麵包吃）"

[translation]
52280-1 = "Episode 28; Waiting for the Bloom Together"
52280-2 = "Hospital Inpatient Ward"
52280-5 = "Yes, please come in."
52280-9 = "Oh, [USERNAME] Sensei?"
52280-10 = "I didn't know you were coming..."
52280-11 = "[s1] \"I heard you were still hospitalized, so I came to see you.\" \n[s2] \"How are you feeling?\""
52280-14 = "Nyahaha... My apologies for the unnecessary concern."
52280-15 = "You can inspect me yourself. I'm in tip-top shape already."
52280-16 = "But...Kaho insisted that there could be unforeseen effects from the Hundred Ghost Stories, so..."
52280-17 = "I was forced here for testing and light treatment. So there's no need to worry yourself."
52280-18 = "[s] \"If you mean that, I'm relieved.\""
52280-19 = "Between you and me, Sensei, it's a tad bit embarrassing to be the only one still hospitalized."
52280-20 = "The Hyakkaryouran and other clubs fought their heart and souls out on the battlefield, and have already returned to normal life. Yet, here I am, lounging about in bed."
52280-21 = "But at least I have an irrefutable excuse to slack off. Fufu..."
52280-22 = "[s] \"Then what's that mountain of paperwork right there?\""
52280-26 = "...Ack. Well, you see, Sensei..."
52280-27 = "Naturally, I'd prefer to laze my days away, but certain rumors and circumstances require immediate treatment. Otherwise, they'll balloon out of our control."
52280-28 = "And after an incident as dramatic as this one was, haters and chatterboxes always squirm through the cracks."
52280-29 = "So some of these high-priority documents needed IMMEDIATE attention."
52280-30 = "It is absolutely, definitely not because I secretly enjoy the work, okay?"
52280-31 = "[s3] \"Whatever you say, Niya.\" \n[s4] \"It is good to see you back to normal.\""
52280-34 = "To summarize the most important items I've encountered so far..."
52280-35 = "The Waraku Festival was a success!"
52280-39 = "[ns] \"That's...the MOST important?\""
52280-40 = "Yes? Naturally? How often does one get graced with the opportunity to witness Chise's adorable performance live?"
52280-41 = "And even more importantly, it would seem that Chise's song has gone a bit viral on social media."
52280-42 = "Kaho is seriously considering if the timing is ripe for Chise's idol debut."
52280-43 = "On the other hand, she's concerned that it'll severely cut into their time together if Chise gets too popular. What a conundrum."
52280-44 = "[s] \"Speaking of, I did have a question about the festival.\""
52280-45 = "Ask away."
52280-46 = "[s5] \"The Waraku Festival weakened Hitotsume's power, right?\" \n[s6] \"Were Hyakkiyako's festivals a ritual to combat the Hundred Ghost Stories?\""
52280-52 = "Ai-yah, absolutely not."
52280-53 = "I'm rather good at blustering when I need to, and I was only trying to unsettle Azami. A festival is simply that, a festival."
52280-54 = "They do say that, in the distant past, festivals began as rituals to commune with the heavens... In the present day, however, no one remembers, or practices, these rites anymore."
52280-55 = "...But imagine the collective devastation if we had cancelled such a highly-anticipated festival?"
52280-56 = "You soothe a sad child with candy, and meet tantrums with discipline."
52280-57 = "It had nothing to do with yin or yang or anything of the sort. That's simply a rule of life."
52280-58 = "[s7] \"So you were bluffing the whole time?\" \n[s8] \"It's a good thing Nature's Beauty believed you.\""
52280-64 = "That reminds me, Habu Azami claimed she was from Ebisu Satellite School."
52280-65 = "We've only ever communicated through letters, so I sent someone to investigate the situation there."
52280-66 = "According to them, Ebisu's Self-Government Committee disbanded many a decade ago."
52280-67 = "Moreover, none of the locals even remember Azami, and there was no one who had actually received the official notices I'd been sending..."
52280-68 = "[s] \"Which is another way to say...\""
52280-69 = " ...Yes. Exactly."
52280-73 = "We'll have to take over the Ebisu district's administrative duties."
52280-77 = "[ns] \"That's what you were worried about?!\""
52280-78 = "Of course! An entire system that had been running independently is now in need of a manager."
52280-79 = "All this time, Nature's Beauty had been hiding behind the Self-Government Committee to carry out their evil deeds."
52280-80 = "Sure, it's unforgivable that they deceived students for their own gain, but they did handle the district's administrative work quite well..."
52280-81 = "And now it all falls on me... I can see my life of leisure...slipping through my fingers... Poor me..."
52280-82 = "[s] \"And there hasn't been any trace of them?\""
52280-83 = "Yes. Just like last time, as soon as the incident ended, any trace of Nature's Beauty vanished like smoke."
52280-84 = "President Kokuriko, Azami, and even Shuro, who was with us, all disappeared."
52280-85 = "The look on Shuro's face when she realized what she'd done... If only I could have taken a picture."
52280-86 = "[s] \"You're so mean...\""
52280-87 = "Nyahaha... Her novel-writing account is still up, so maybe she'll be inspired to start a new series one day."
52280-88 = "I actually wasn't lying about having read all her stories. It's a pleasant pastime, so I'll look forward to more of her work."
52280-89 = "...Of course, the plot was an utter mess."
52280-90 = "[s] \"That's not what you said to her...\""
52280-91 = "It can't be helped. Writers are such delicate souls that even the most trivial comment can crush their will."
52280-92 = "If I coax and comfort her, maybe her next story will have a little more hope."
52280-93 = "[s] \"Yeah. May the next story be a peaceful one.\""
52280-97 = "[ns] \"What about Ayame...?\""
52280-98 = "Ah, you mean President Ayame."
52280-102 = "Wouldn't it be better to ask her friends instead of me?"
52280-104 = "Hyakkiyako Festival Street"
52280-106 = "Hyakkiyako's streets were bustling, as always."
52280-107 = "Some people were running around making preparations, others enjoying the festivities."
52280-108 = "As if they were celebrating an eternal festival..."
52280-115 = "Oh, my lord!"
52280-119 = "Sensei! You're okay!"
52280-120 = "We didn't hear back from you...after the festival ended... I got really worried!"
52280-121 = "[s9] \"Sorry, I've had a lot to attend to since then...\" \n[s10] \"I should've caught up with you all sooner.\""
52280-124 = "Don't apologize, my lord! Izuna is just happy that you're safe!"
52280-125 = "Were you trying to find the Yin-Yang Club room, Sensei? It's in the other direction..."
52280-126 = "[s11] \"Actually, I was going to visit the Hyakkaryouran.\" \n[s12] \"I wanted to check on Ayame and Nagusa.\""
52280-129 = "Ayame... The Hyakkaryouran president?"
52280-130 = "I heard...that she's officially back now."
52280-135 = "The Yin-Yang Club and the Hyakkaryouran made an official statement that the Ayame we all saw was actually fake, created by Nature's Beauty."
52280-136 = "I mean, I was having a hard time believing Ayame would do something like that, but..."
52280-137 = "That Ayame...the one we faced... She seemed so real, didn't she?"
52280-138 = "Do you...know anything? Sensei?"
52280-139 = "[s] \"Well...\""
52280-141 = "Th-There's no way! It definitely wasn't her!"
52280-142 = "...Izuna?"
52280-143 = "Some bad adults also tricked Izuna once...and she almost ruined a festival too. But it was because Izuna didn't have the friends she has now, ones she could open her heart to, about ninjas, and everything else."
52280-144 = "If Izuna had her friends then, they wouldn't have let her stray down a bad path!"
52280-145 = "Izuna heard that Ayame is Nagusa's really good friend."
52280-146 = "So there's no way Ayame would've done that stuff! Not with Nagusa by her side!"
52280-147 = "I-I agree! I've heard that President Ayame is very, very kind...and has always upheld the Hyakkaryouran's sense of justice!"
52280-148 = "It had to have been...a rumor!"
52280-150 = "I see... I guess rumors are just rumors!"
52280-151 = "[s] \"Exactly. It's dangerous to blindly believe everything you hear.\""
52280-155 = "[ns13] \"I heard something happened to the Ninjutsu Research Club too...\" \n[ns14] \"Are you all okay now?\""
52280-158 = "Ah, that's right! Sensei, listen up!"
52280-159 = "When the monsters attacked the stage at the Waraku Festival, we all felt an incredible power well up within us!"
52280-160 = "It was so strong that it was like we unlocked some kind of forbidden ninjutsu!"
52280-161 = "Y-Yes! Exactly as she described it! A ninjutsu...that increased our speed!"
52280-162 = "I didn't get a chance to try, but I probably could have run across a wet paper screen."
52280-163 = "Running across wet paper screens..."
52280-164 = "The climax scene in \"The Lonely 77 Wandering Ninjas\", right? Izuna's always wanted to try that for real!"
52280-168 = "[ns] \"Michiru, are you sad you lost your power?\""
52280-169 = "No? Not really."
52280-170 = "Hm... Well, if I think about it...I bet I could've done some pretty cool stuff for the \"Michiruchi\" channel."
52280-171 = "On the other hand, weird power like that wouldn't do much for spreading the ninja way."
52280-172 = "A ninja's true worth doesn't come from powerful techniques, but from our bonds, after all."
52280-173 = "I'd rather be an ordinary ninja, surrounded by my comrades, than a lonely one that possesses some legendary power."
52280-177 = "That's what they said in \"The Lonely 77 Wandering Ninjas!\""
52280-178 = "Izuna agrees!"
52280-179 = "Yeah! Me too!"
52280-181 = "[ns] \"I feel the same way.\""
52280-183 = "[ns15] \"Then next time let's all watch that movie at Schale.\" \n[ns16] \"We've got a fantastic surround sound speaker in the theater room.\""
52280-186 = "Oh, oh! Let's go right now!"
52280-187 = "B-But we have to go help them clean up after the Waraku Festival, remember?"
52280-188 = "Gah! I forgot! Next time, then!"
52280-189 = "Yes! We'll all watch together next time, my lord!"
52280-190 = "P-Please take care of yourself...Sensei!"
52280-194 = "Hyakkaryouran Training Grounds"
52280-198 = "Stop, Renge. Is that not a hydrangea in your hands?"
52280-199 = "And you intend to plant it beside the camellia saplings? I beg of you to consider the aesthetics of planting a summer flower among winter plants."
52280-200 = "I know what I'm doing! If you mix a bunch of seasons together like this, then you can enjoy blossoms year-round!"
52280-201 = "...You could always stop nagging me and come down here and help me!"
52280-202 = "I cannot. I must manage this operation from this vantage point. One cannot see the forest from within the trees."
52280-203 = "It sounds to me like you just don't want to get your hands dirty!"
52280-207 = "...That's not it."
52280-208 = "Then switch with me! This isn't fair!"
52280-215 = "Oh my, Sensei!"
52280-216 = "...Welcome, Sensei."
52280-218 = "[ns17] \"Hi, everyone!\" \n[ns18] \"Is this a bad time?\""
52280-221 = "Not at all. We are not currently conducting official Hyakkaryouran business."
52280-222 = "Look! I am planting flowers with my seniors today!"
52280-223 = "[s] \"Planting flowers...?\""
52280-224 = "Yes. According to my intel, now that the Waraku Festival is over, the Flower Festival will be held soon. It will be a showcase of the gardens cultivated throughout Hyakkiyako."
52280-225 = "So we acquired leftover flower seeds from the festival staff..."
52280-226 = "And we decided to plant them in front of the training grounds, so we may all tend to them together!"
52280-227 = "Watching the flowers bloom beautifully each season will surely make us look forward to coming to the training ground every day!"
52280-228 = "Although people should be immersed in their training, not taking in the scenery..."
52280-232 = "Yukari, could you please pass that sack to me?"
52280-233 = "It's rather heavy. Take care to not injure yourself."
52280-234 = "Yes, ma'am!"
52280-238 = "[ns] \"How's your arm been feeling?\""
52280-239 = "Perfect. Everything is as it was. Both my right arm...and Ayame."
52280-240 = "The things left behind on the Snowfield that day have returned to their rightful place."
52280-241 = "To an extent, at least... Since that day, Ayame has yet to awake."
52280-242 = "While there doesn't seem to be any serious physical ailments, she lies unmoving, as if in a deep sleep."
52280-243 = "[s] \"Could it be an after-effect of being trapped in the spirit realm?\""
52280-244 = "We can't be certain. The doctor implies her current state is of a psychological nature."
52280-245 = "Her body is simply refusing to wake up."
52280-246 = "And here I was looking forward to giving her an earful for worrying us so much! But I can hardly do that when she's still asleep..."
52280-247 = "I really thought about just giving her a good shake, but Nagusa wouldn't let me."
52280-248 = "It is Ayame's choice to remain asleep and reflect. And it is her choice when she will awaken."
52280-249 = "We know not what dream land Ayame is traveling through right now."
52280-250 = "...All we can do is wait by her side until she emerges from it."
52280-255 = "Kikyou, Kikyou! What kind of plant is this?"
52280-256 = "This...? A cherry blossom sapling."
52280-257 = "Since it will grow into a tree, provide it enough room to grow from the other shrubs."
52280-258 = "Oh my! Do you mean to say we'll have our very own cherry blossoms? How exciting!"
52280-259 = "Well... It might take a while for it to grow big enough for blossoms."
52280-260 = "Probably not while we're still at the academy, at the least."
52280-264 = "...That's okay."
52280-265 = "We may not see it, but far in the future, someone will watch its flowers bloom."
52280-268 = "Just like those who came before us..."
52280-277 = "One day, this place will be filled with a hundred blossoms all at once."
52280-278 = "Until then, I'll be waiting for you."
52280-283 = "I'll wait for you to awake, my friend."

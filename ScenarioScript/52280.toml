[translation]
52280-1 = "ตอนที่ 28;รอวันผลิบานพร้อมกัน"
52280-2 = "หอผู้ป่วยในโรงพยาบาล"
52280-5 = "ค่ะ เชิญเข้ามาได้เลยค่ะ~"
52280-9 = "อุ้ยตาย คุณครู [USERNAME] เหรอคะ?"
52280-10 = "มาแบบไม่บอกกล่าวกันเลย..."
52280-11 = "[s1] \"ได้ยินว่านิยะเข้าโรงพยาบาล ครูเลยมาเยี่ยมน่ะ\"\n[s2] \"ร่างกายเป็นยังไงบ้าง?\""
52280-14 = "อะฮะฮ่า... ขอบคุณที่มานะคะ ขอโทษที่ข่าวของฉันทำให้คุณครูต้องเป็นห่วงด้วยค่ะ"
52280-15 = "แต่ก็อย่างที่เห็น ตอนนี้ฉันกลับมาร่างกายแข็งแรงแล้วค่ะ แผลที่ได้จากเหตุการณ์ครั้งล่าสุด ก็แทบจะหายสนิทดีแล้วค่ะ"
52280-16 = "แต่ว่า... ถึงจะบอกว่าเป็นรอยขีดข่วนเล็กน้อย แต่มันก็เป็นแผลที่เกิดจากตำนานร้อยเรื่องราว คาโฮะก็เลยโกรธมากเพราะกลัวว่าจะมีผลข้างเคียงบางอย่างตามมาค่ะ"
52280-17 = "ฉันแค่มานอนโรงพยาบาลเพราะต้องรับการรักษาและตรวจนู่นนี่เพิ่ม ไม่ใช่เพราะได้รับบาดเจ็บสาหัส#nหรอกค่ะ คุณครูวางใจได้เลยค่ะ "
52280-18 = "[s] \"ได้ยินแบบนั้นก็ค่อยโล่งใจหน่อยนะ\""
52280-19 = "อืม... พูดตามตรงว่าการมานอนโรงพยาบาลคนเดียวแบบนี้ก็น่าอายนิดหน่อยนะคะ"
52280-20 = "ทั้งเฮียกกะเรียวรัน ทั้งนักเรียนจากชมรมอื่นๆ ที่ร่วมกันต่อสู้อย่างแข็งขันต่างก็กลับไปใช้ชีวิตประจำวัน#nกันแล้ว แต่ฉันยังต้องมาอยู่ในหอผู้ป่วยอยู่แบบนี้"
52280-21 = "แต่ในที่สุดฉันก็มีเหตุผลที่เอามาเป็นข้ออ้างบังหน้าได้ ฉันก็เลยขี้เกียจได้โดยไม่ต้องกังวลว่าจะมีใคร#nตำหนิค่ะ ฮุฮุ..."
52280-22 = "[s] \"แต่โต๊ะข้างเตียงมีเอกสารวางเป็นกองเลยนะ...\""
52280-26 = "อึก... เอกสารพวกนั้นมัน..."
52280-27 = "ฉันยอมรับว่าฉันก็อยากขี้เกียจตลอดเวลาเหมือนกัน... แต่เรื่องบางเรื่องเมื่อเวลาผ่านไปแล้วจะควบคุม#nไม่ได้จนกลายเป็นเรื่องใหญ่และจัดการไม่ได้น่ะค่ะ"
52280-28 = "ยิ่งไปกว่านั้น เมื่อเหตุการณ์ใหญ่ๆ แบบนี้จบลง พวกคนที่ชอบสอดรู้สอดเห็นเรื่องของคนอื่นก็จะออก#nมาจับกลุ่มคุยกัน"
52280-29 = "ฉันก็เลยต้องเคลียร์งานเอกสารที่สำคัญมากๆ พวกนี้ทันทีค่ะ"
52280-30 = "เห็นฉันขยันแบบนี้ ใช่ว่าฉันจะชอบทำงานหรอกนะคะ ไม่เลยสักนิดค่ะ~"
52280-31 = "[s3] \"รู้แล้วละ ครูเข้าใจแล้ว\"\n[s4] \"โล่งอกไปทีนะที่ยังเป็นนิยะคนเดิมอยู่\""
52280-34 = "ก่อนอื่นฉันขอสรุปประเด็นสำคัญที่สุดจากเรื่องที่ฉันได้ทบทวนมานะคะ..."
52280-35 = "เทศกาลวาราคุจบลงด้วยดีค่ะ...!"
52280-39 = "[ns] \"นั่นคือ... ประเด็นสำคัญเหรอ?\""
52280-40 = "ก็ใช่น่ะสิคะ โอกาสที่จะได้ดูการแสดงที่น่ารักจากแมวเหมียวชิเซะไม่ได้มีบ่อยๆ หรอกนะคะ"
52280-41 = "นอกจากนี้เพลงใหม่ของชิเซะที่ร้องเป็นครั้งแรกในงานก็เป็นประเด็นร้อนในโซเชียลมีเดียด้วยค่ะ"
52280-42 = "คาโฮะถึงกับมาปรึกษากับฉันจริงจังว่าเราใช้โอกาสนี้ในการเปิดตัวแมวเหมียวชิเซะเป็นไอดอล#nอย่างเป็นทางการดีหรือเปล่าเชียวนะคะ"
52280-43 = "แต่ก็แน่นอนว่าถ้าชิเซะงานยุ่งขึ้น เวลาที่จะได้อยู่เคียงข้างชิเซะก็จะน้อยลงไปด้วย คาโฮะก็เลยกังวลน่ะค่ะ"
52280-44 = "[s] \"จะว่าไป ครูมีเรื่องอยากถามเกี่ยวกับเทศกาลอยู่พอดี...\""
52280-45 = "ค่ะ ถามได้เลยค่ะ"
52280-46 = "[s5] \"เทศกาลในเฮียกคิยาโคเป็นพิธีเพื่อขับไล่ตำนานร้อยเรื่องราวเหรอ?\"\n[s6] \"เทศกาลในเฮียกคิยาโคมีขึ้นเพื่อขับไล่ตำนานร้อยเรื่องราวเหรอ?\""
52280-52 = "อะไรกันคะ~"
52280-53 = "คุณครูสงสัยเพราะเห็นว่าพลังของฮิโตสึเมะอ่อนลงทันทีที่เริ่มเทศกาลวาราคุใช่มั้ยคะ? แน่นอนว่าฉันก็คุยโวให้อาซามิหวั่นใจอยู่บ้าง แต่เทศกาลก็เป็นแค่เทศกาลค่ะ"
52280-54 = "กล่าวกันว่าเทศกาลในอดีตมีต้นกำเนิดมาจากมัตสึริที่เป็นพิธีบูชาสรวงสวรรค์... แต่ปัจจุบันนี้ไม่มีใคร#nจดจำหรือทำพิธีนี้อีกต่อไปแล้วค่ะ"
52280-55 = "แต่ถึงยังไง... ถ้างานเทศกาลที่เตรียมตัวมาเป็นเวลานานต้องถูกยกเลิกไป ผู้คนก็น่าจะเสียดายกัน#nไม่น้อยเลย ว่ามั้ยล่ะคะ?"
52280-56 = "ให้ขนมเด็กที่กำลังเศร้าโศก และตักเตือนเด็กที่กำลังดื้อรั้น"
52280-57 = "นี่คือหลักง่ายๆ ในชีวิตที่ไม่ต้องพิจารณาหลักหยินหยางด้วยซ้ำค่ะ~"
52280-58 = "[s7] \"ตกลงว่าแค่จะคุยโวกับชมรมความงามของธรรมชาติเหรอ...\"\n[s8] \"โชคดีที่ชมรมความงามของธรรมชาติเชื่อและถอยไปทันทีนะ\""
52280-64 = "พอคุณครูเอ่ยถึงชมรมความงามของธรรมชาติ ฉันก็นึกถึงฮาบุ อาซามิ จากโรงเรียนสาขาเอบิสุขึ้นมา#nเลยละค่ะ"
52280-65 = "ฉันเองก็รับรู้ถึงการมีอยู่ของโรงเรียนสาขาเอบิสุจากทางจดหมายเท่านั้น ฉันเลยใช้โอกาสนี้ส่งคนไป#nต่างหากเพื่อตรวจสอบความจริงค่ะ"
52280-66 = "จากการตรวจสอบ คณะกรรมการปกครองตนเองของโรงเรียนสาขาเอบิสุไม่ได้ดำเนินงานมา เป็นเวลาหลายสิบปีแล้วค่ะ"
52280-67 = "นอกจากนี้แล้วก็ยังไม่มีชาวเมืองคนไหนที่จดจำคนที่ชื่ออาซามิได้ และที่ผ่านมาก็ไม่มีใครได้รับ#nเอกสารที่ฉันส่งไปเลย..."
52280-68 = "[s] \"งั้นก็หมายความว่า...\""
52280-69 = "ใช่ค่ะ..."
52280-73 = "จากนี้พวกฉันต้องรับผิดชอบงานบริหารของเขตปกครองตนเองเอบิสุด้วยค่ะ"
52280-77 = "[ns] \"แล้วนั่นคือปัญหาเหรอ?!\""
52280-78 = "ก็ใช่น่ะสิคะ! จู่ๆ ระบบที่ไม่เคยต้องเข้าไปจัดการเลย ตอนนี้กลับต้องเข้าไปดูแลเพิ่ม..."
52280-79 = "ที่ผ่านมาชมรมความงามของธรรมชาติคงจะแอบใช้ชื่อคณะกรรมการปกครองตนเองเพื่อปกปิดตัวตน#nเอาไว้น่ะค่ะ"
52280-80 = "การปกปิดตัวตนแล้วหลอกนักเรียนคนอื่นเพื่อผลประโยชน์ส่วนตนเป็นเรื่องน่าตำหนิอย่างไม่ต้องสงสัย แต่ยังไงพวกนั้นก็ช่วยจัดการงานบริหารของเขตปกครองตนเองได้อย่างไร้ปัญหา..."
52280-81 = "แต่ตอนนี้ฉันต้องทำงานเอกสารเพิ่มขึ้นอีกเป็นกอง... จากนี้ฉันคงมีชีวิตที่เวิร์กไร้บาลานซ์แน่ๆ ค่ะ... ฮือ..."
52280-82 = "[s] \"แล้วไม่พบร่องรอยของชมรมความงามของธรรมชาติเลยเหรอ?\""
52280-83 = "ใช่ค่ะ ทันทีที่เหตุการณ์จบลง ชมรมความงามของธรรมชาติก็หายไปอย่างไร้ร่องรอยเหมือนกันกับครั้ง#nก่อนค่ะ ราวกับทุกอย่างระเหยไปในอากาศเลยละค่ะ"
52280-84 = "ทั้งหัวหน้าโคคุริโกะ อาซามิ... แล้วก็แม่หนูชูโระที่เคยอยู่กับพวกเราด้วย"
52280-85 = "ตอนที่แม่หนูชูโระรู้ตัวว่าตัวเองทำเรื่องอะไรลงไป ฉันละอยากถ่ายรูปสีหน้าของเธอเก็บไว้เลยละค่ะ น่าเสียดายนะคะที่เธอไม่อยู่แล้ว"
52280-86 = "[s] \"ใจร้ายจังเลยนะ...\""
52280-87 = "อะฮะฮ่า... แต่บัญชีอัปโหลดนิยายของแม่หนูชูโระยังอยู่ค่ะ ถ้ารู้สึกดีขึ้นแล้วก็น่าจะเขียนและอัปโหลด#nต่อนะคะ"
52280-88 = "งานเขียนของเธอใช้อ่านฆ่าเวลาได้ดีเลยค่ะ ส่วนตัวฉันก็ตั้งตารอผลงานใหม่ของเธออยู่เหมือนกัน"
52280-89 = "ถึงแม้ว่าการดำเนินเรื่องมันออกจะยุ่งเหยิงไปหน่อยก็เถอะค่ะ..."
52280-90 = "[s] \"ประเมินเข้มงวดไปหรือเปล่า? ไม่เห็นเหมือนตอนนั้นเลย\""
52280-91 = "ก็ช่วยไม่ได้นี่คะ นักเล่าเรื่องเป็นคนอ่อนแอที่ท้อแท้ได้ง่ายด้วยเรื่องเล็กๆ น้อยๆ อยู่แล้ว ตอนนั้นฉันเลยชมเธอไปค่ะ"
52280-92 = "ถ้าเราปลอบใจและให้กำลังใจ ต่อไปจะได้เขียนเรื่องราวที่มีความหวังมากขึ้นยังไงล่ะคะ"
52280-93 = "[s] \"นั่นสินะ ขอให้เรื่องต่อไปมีแต่ความสงบสุขนะ\""
52280-97 = "[ns] \"จะว่าไป แล้วอายาเมะล่ะเป็นยังไงบ้าง...\""
52280-98 = "อ้อ หัวหน้าอายาเมะน่ะเหรอคะ?"
52280-102 = "ฉันว่าคุณครูไปฟังจากเพื่อนๆ ของเธอจะดีกว่านะคะ"
52280-104 = "ถนนสายเทศกาล เฮียกคิยาโค"
52280-106 = "(ถนนในเฮียกคิยาโคเนืองแน่นไปด้วยผู้คนเหมือนทุกครั้ง)"
52280-107 = "(ทั้งผู้คนที่อยากสนุกกับงานเทศกาล และผู้คนที่เตรียมงานเทศกาลที่จะมาถึง...)"
52280-108 = "(ราวกับว่าถนนสายนี้ไม่เคยมีตอนไหนเลยที่งานเทศกาลจบลง)"
52280-115 = "อ๊ะ นายท่าน!"
52280-119 = "ท่านอาจารย์ ปลอดภัยดีสินะ!"
52280-120 = "หลังงานเทศกาลจบฉันก็ติดต่อคุณครูไม่ได้... ก็เลยเป็นห่วงน่ะค่ะ!"
52280-121 = "[s9] \"ขอโทษนะ ครูโดนเรียกไปตรงนู้นที ตรงนี้ทีเยอะน่ะ...\"\n[s10] \"ครูมัวแต่จัดการนู่นนี่จนไม่ได้ติดต่อมาเลย ขอโทษนะ\""
52280-124 = "ไม่เป็นไรค่ะ แค่นายท่านปลอดภัยดี อิซุนะก็โล่งใจแล้วค่ะ!"
52280-125 = "ว่าแต่ท่านอาจารย์กำลังจะไปไหนเหรอ? ห้องชมรมหยินหยางอยู่อีกทางหนึ่งนะ..."
52280-126 = "[s11] \"ครูกำลังไปหาอายาเมะที่ห้องชมรมเฮียกกะเรียวรันน่ะ\"\n[s12] \"ครูว่าจะไปดูอายาเมะกับนางุสะหน่อยน่ะ\""
52280-129 = "อายาเมะ... หมายถึงหัวหน้าเฮียกกะเรียวรันใช่มั้ยคะ?"
52280-130 = "ฉันได้ยินว่าหลังจากเหตุการณ์จบลง เธอก็กลับมาเฮียกกะเรียวรันอย่างเป็นทางการแล้ว..."
52280-135 = "ชมรมหยินหยางกับเฮียกกะเรียวรันบอกว่าหัวหน้าอายาเมะที่ปรากฏตัวในตอนนั้นคือตัวปลอมที่ชมรม#nความงามของธรรมชาติสร้างขึ้นมาด้วยละ"
52280-136 = "ข้าน้อยเองก็ไม่เชื่อเหมือนกันว่าหัวหน้าอายาเมะจะทำเรื่องอะไรแบบนั้น..."
52280-137 = "แต่ว่าสายตาของหัวหน้าอายาเมะที่ข้าน้อยเห็นในตอนนั้นก็ดูเหมือนจริงมาก จนยากที่จะเชื่อว่าเป็นตัวปลอมเลย..."
52280-138 = "ท่านอาจารย์รู้อะไรมาบ้างหรือเปล่า?"
52280-139 = "[s] \"เรื่องนั้นน่ะ...\""
52280-141 = "มะ... ไม่มีทางเป็นตัวจริงหรอกค่ะ!"
52280-142 = "อิซุนะ...?"
52280-143 = "อิซุนะเองก็เคยโดนผู้ใหญ่นิสัยไม่ดีหลอกจนเกือบไปขัดขวางงานเทศกาลเข้า... แต่ตอนนั้นอิซุนะยัง#nไม่มีเหล่าสหายที่ร่วมแบ่งปันความรู้สึกที่แท้จริงเกี่ยวกับการเป็นนินจาได้ค่ะ"
52280-144 = "ถ้ามีเพื่อนที่คอยบอกว่าอะไรผิดอะไรถูกอยู่ข้างๆ กันละก็... เพื่อนก็คงช่วยห้ามไม่ให้เราหลงไปในทาง#nที่ผิดได้ค่ะ"
52280-145 = "อิซุนะได้ยินมาว่าท่านอายาเมะเป็นเพื่อนกับท่านนางุสะมานานแล้วค่ะ"
52280-146 = "ตราบใดที่มีท่านนางุสะอยู่เคียงข้าง... ท่านอายาเมะไม่มีทางทำเรื่องไม่ดีแบบนั้นหรอกค่ะ!"
52280-147 = "ชะ... ใช่ค่ะ! ฉันได้ยินมาว่าหัวหน้าอายาเมะทั้งยุติธรรมและเป็นมิตรกับทุกคนด้วยค่ะ"
52280-148 = "เรื่องการทำอะไรไม่ดีต้องเป็นข่าวลือที่เชื่อถือไม่ได้แน่นอนค่ะ"
52280-150 = "งั้นเหรอ... งั้นก็คงเป็นแค่ข่าวลือสินะ~"
52280-151 = "[s] \"อื้อ การเชื่อข่าวลืออย่างงมงายเป็นเรื่องอันตรายนะ\""
52280-155 = "[ns13] \"จะว่าไปชมรมวิจัยศาสตร์นินจาก็เหมือนมีการเปลี่ยนแปลงแปลกๆ นะ...\"\n[ns14] \"แล้วชมรมวิจัยศาสตร์นินจากลับมาเป็นเหมือนเดิมแล้วเหรอ?\""
52280-158 = "อ้อ จริงสิ จริงด้วย ข้าน้อยจะบอกท่านอาจารย์ให้เอง!"
52280-159 = "ตอนที่พวกปีศาจมาโจมตีเวทีการแสดงในเทศกาลวาราคุ จู่ๆ พลังของพวกเราก็พุ่งพรวดเลยละ!"
52280-160 = "เป็นพลังที่น่าเหลือเชื่อเลย... เหมือนกับเวทมนตร์อย่างนั้นละ!"
52280-161 = "ชะ... ใช่ค่ะ! ฉันวิ่งได้เร็วจนไม่อยากเชื่อฝีเท้าตัวเอง รู้สึกเหมือนกับใช้ศาสตร์นินจาในชีวิตจริงเลยค่ะ!"
52280-162 = "ถึงจะยังไม่เคยลอง แต่ข้าน้อยน่าจะวิ่งบนตาข่ายกระดาษเปียกๆ ได้เลยละนะ?"
52280-163 = "ถ้าเป็นฉากวิ่งบนกระดาษเปียกๆ ละก็..."
52280-164 = "งั้นก็เหมือนฉากไคลแม็กซ์ของ <นินจาพเนจรผู้โดดเดี่ยว 77 คน> เลยละค่ะ! อิซุนะเองก็อยากลองทำ#nแบบนั้นในชีวิตจริงบ้างเหมือนกันค่ะ!"
52280-168 = "[ns] \"ส่วนมิจิรุ... เสียดายเหรอที่สูญเสียพลังนั้นไป?\""
52280-169 = "ก็ไม่นะ?"
52280-170 = "อืม... หรือว่าเสียดายนะ? พอมาคิดดูแล้ว ถ้าข้าน้อยมีพลังนั้นขึ้นมาจริงๆ ก็จะน่าถ่ายคอนเทนต์ใหม่ๆ ลงช่องมิจิรุจจี้ได้..."
52280-171 = "แต่ต่อให้มีพลังปริศนาแบบนั้น ก็ไม่ได้รับประกันว่าจะทำให้คนอื่นสนใจเกี่ยวกับนินจามากขึ้นหรอก"
52280-172 = "คุณค่าของนินจาไม่ได้มาจากพลังที่ล้นเหลือ แต่มาจากความผูกพัน"
52280-173 = "แทนที่ข้าน้อยจะเป็นนินจาที่มีพลังพิเศษในตำนาน ข้าน้อยขอเป็นนินจาธรรมดาๆ ที่มีสหายเยอะๆ ดีกว่า..."
52280-177 = "ในเรื่อง <นินจาพเนจรผู้โดดเดี่ยว 77 คน> ก็บอกไว้อย่างนี้เหมือนกันน่ะ!"
52280-178 = "อิซุนะก็คิดเหมือนกันค่ะ!"
52280-179 = "ฉะ... ฉันก็คิดแบบนั้นเหมือนกันค่ะ...!"
52280-181 = "[ns] \"ครูก็เห็นด้วยนะ...\""
52280-183 = "[ns15] \"ไว้คราวหน้าเราไปดูหนังเรื่องนั้นด้วยกันที่ชาเล่ต์มั้ย?\"\n[ns16] \"ไว้พวกเราไปดูหนังเรื่องนั้นด้วยกันที่ชาเล่ต์นะ\""
52280-186 = "โอ้... ดีเลย ไปกันตอนนี้เลยมั้ยล่ะ!"
52280-187 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ หัวหน้า ตอนนี้พวกเรากำลังจะไปช่วยจัดเครื่องไม้เครื่องมือที่ใช้ใน#nเทศกาลวาราคุไม่ใช่เหรอคะ...?"
52280-188 = "อ้อ จริงสิ... จริงด้วยสินะ งั้นก็เอาไว้คราวหน้าแล้วกัน!"
52280-189 = "ค่ะ! ไว้พวกเราไปหานะคะ นายท่าน!"
52280-190 = "ดะ... เดินทางดีๆ นะคะ... คุณครู!"
52280-194 = "ลานฝึกซ้อมหน้าห้องชมรมเฮียกกะเรียวรัน"
52280-198 = "เดี๋ยวก่อน เรนเกะ ที่เธอถืออยู่คือต้นอ่อนไฮเดรนเยียนะ"
52280-199 = "แล้วตอนนี้แปลงที่เธอขุดอยู่ก็คือแปลงข้างๆ ต้นอ่อนคามิลเลีย ถ้าปลูกดอกไม้ฤดูหนาวไว้กับดอกไม้#nฤดูร้อน แล้วเราจะเห็นมันบานพร้อมกันได้เหรอ?"
52280-200 = "เรื่องแบบนั้นฉันรู้น่า! ถ้าเราปลูกดอกไม้ต่างฤดูกาลไว้ด้วยกัน เราจะได้ชมดอกไม้ได้ทั้งปีเลยไง"
52280-201 = "แต่ถ้าเธอมีเวลามาพูดจู้จี้อยู่ ทำไมไม่ลงมาช่วยกันตรงนี้ล่ะ...?"
52280-202 = "ไม่ได้หรอก ต้องมีคนยืนมองจากข้างบนคนหนึ่งสิ เหมือนคำที่บอกว่าเมื่ออยู่ในป่า เราย่อมไม่เห็นต้นไม้ยังไงล่ะ"
52280-203 = "ถึงจะพูดอย่างนั้น แต่ที่จริงเป็นเพราะไม่อยากให้มือเปื้อนดินมากกว่าหรือเปล่า?"
52280-207 = "ไม่ใช่นะ..."
52280-208 = "ถ้างั้นก็มาเปลี่ยนหน้าที่กัน! แบบนี้มันไม่ยุติธรรมนะ..."
52280-215 = "อ๊ะ ท่านอาจารย์มาแล้วเหรอเจ้าคะ!"
52280-216 = "เข้ามาสิ คุณครู..."
52280-218 = "[ns17] \"สวัสดีทุกคน กำลังยุ่งกันหรือเปล่า?\"\n[ns18] \"นี่ครูแวะมาหาตอนกำลังยุ่งกันหรือเปล่า...?\""
52280-221 = "ไม่หรอก พวกเราก็ไม่ได้ยุ่งกับงานของเฮียกกะเรียวรันด้วย ก็แค่..."
52280-222 = "เรากำลังปลูกดอกไม้ด้วยกันอยู่เจ้าค่ะ!"
52280-223 = "[s] \"ดอกไม้เหรอ...?\""
52280-224 = "อื้อ ได้ยินมาว่าหลังจากจบเทศกาลวาราคุ เทศกาลต่อไปจะเป็นเทศกาลดอกไม้ที่เราจะได้ชื่นชม#nสวนดอกไม้ที่เรียงรายอยู่ทุกที่น่ะ"
52280-225 = "แล้วพวกเราก็ได้เมล็ดดอกไม้ที่เหลือมาจากการเตรียมงานเทศกาลมาเป็นกำเลย..."
52280-226 = "ข้าก็เลยเสนอให้ปลูกไว้ในแปลงหน้าลานฝึกซ้อมแล้วช่วยกันดูแลเจ้าค่ะ!"
52280-227 = "ถ้าได้เห็นดอกไม้ที่ผลิบานอย่างงดงามในแต่ละฤดูกาล พวกเราจะต้องอยากมาลานฝึกซ้อมทุกวัน#nแน่นอนเจ้าค่ะ!"
52280-228 = "ถ้าเราจดจ่อกับการฝึกซ้อม เราก็คงไม่สังเกตเห็นทิวทัศน์รอบข้างหรอก แต่ก็นะ..."
52280-232 = "ยูคาริ ช่วยส่งกระสอบที่อยู่ข้างบนนั้นให้หน่อยได้มั้ย?"
52280-233 = "มันค่อนข้างหนัก ระวังอย่าให้เจ็บตัวด้วยล่ะ"
52280-234 = "เจ้าค่ะ~"
52280-238 = "[ns] \"ตอนนี้แขนหายดีแล้วเหรอ?\""
52280-239 = "อื้อ ทุกอย่างกลับมาที่เดิมแล้ว ทั้งแขนขวาของฉัน... แล้วก็อายาเมะด้วย"
52280-240 = "ทุกสิ่งที่ฉันทิ้งไว้ในทุ่งหิมะในวันนั้นกลับคืนสู่ที่เดิมแล้ว"
52280-241 = "แต่หลังจากวันนั้น อายาเมะก็ไม่ตื่นขึ้นมาอีกเลย"
52280-242 = "ถึงร่างกายจะดูไม่มีอะไรผิดปกติมาก... แต่อายาเมะก็นอนแน่นิ่ง ไม่ลืมตา ราวกับกำลังหลับสนิทตลอด#nเวลาเลยน่ะ"
52280-243 = "[s] \"เป็นผลจากการถูกดึงเข้าไปในห้วงอัสดงหรือเปล่า?\""
52280-244 = "ฉันก็ไม่แน่ใจ แต่หมอบอกว่าน่าจะเป็นปัญหาทางจิตใจมากกว่า"
52280-245 = "เห็นว่าจิตใจและร่างกายปฏิเสธที่จะตื่นขึ้นมาน่ะ"
52280-246 = "ชิ... กะว่าฟื้นขึ้นมาแล้วจะบ่นชุดใหญ่สักหน่อย... แต่หลังจากวันนั้นก็นอนหลับสนิทเลย"
52280-247 = "ฉันก็พยายามปลุกดูแล้ว แต่รุ่นพี่นางุสะก็บอกว่าให้ปล่อยไว้แบบนั้นน่ะสิ"
52280-248 = "การเลือกที่จะนอนอยู่อย่างนั้นคือความตั้งใจของอายาเมะเองน่ะ"
52280-249 = "พวกเราไม่อาจเข้าใจได้หรอกว่าอายาเมะที่อยู่ในความฝันกำลังคิดอะไรอยู่"
52280-250 = "แต่สิ่งที่ฉันทำได้คือการเฝ้ารออยู่ข้างๆ จนกว่าอายาเมะจะตื่นขึ้นมา..."
52280-255 = "รุ่นพี่ นี่คือเมล็ดดอกอะไรเหรอเจ้าคะ?"
52280-256 = "นี่มัน... เมล็ดซากุระนี่นา"
52280-257 = "ถ้าปลูกก็คงโตเป็นต้นซากุระต้นใหญ่ งั้นก็คงต้องเว้นระยะห่างจากต้นอื่นหน่อย"
52280-258 = "คุณพระ แบบนี้เราจะได้เห็นดอกซากุระกันอีกครั้งเหรอเจ้าคะ? ข้ารอไม่ไหวแล้วเจ้าค่ะ~"
52280-259 = "แต่มันจะไม่เป็นไรเหรอ? ต้นซากุระน่าจะใช้เวลาหลายปีเลยนะกว่าจะออกดอก"
52280-260 = "ต่อให้เริ่มปลูกตอนนี้ เราก็คงไม่ได้เห็นดอกของมันตอนยังเรียนอยู่ที่นี่อยู่ดี"
52280-264 = "ไม่เป็นไรหรอก..."
52280-265 = "ต่อให้พวกเราจะไม่เห็น แต่ใครสักคนในภายหน้าจะได้เห็นดอกไม้ที่ผลิบานจากต้นนี้แน่นอน"
52280-268 = "เหมือนกับที่เหล่ารุ่นพี่ของเราในสมัยก่อนทำไว้ยังไงล่ะ"
52280-277 = "สักวันหนึ่งจะมีดอกไม้ร้อยชนิดบานสะพรั่งพร้อมกันที่นี่"
52280-278 = "ฉันจะรอเธอจนกว่าจะถึงวันนั้น"
52280-283 = "รอให้เพื่อนตื่นขึ้นมาในสักวันข้างหน้า"

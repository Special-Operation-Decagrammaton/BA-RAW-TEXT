52280-143 = "5;이즈나;06;이즈나도 나쁜 어른에게 속아 축제를 방해할 뻔한 적이 있었지만…… 그 때의 이즈나에게는 닌자에 대한 진심을 터놓을 수 있는 동료들이 없었으니까요.\n#3;m1\n#5;al"

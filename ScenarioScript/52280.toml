52280-133 = "5;츠쿠요;06\n1;미치루;06\n3;이즈나;06\n#1;h\n#3;h\n#5;h"
52280-134 = "5;츠쿠요;06\n1;미치루;06\n3;이즈나;06\n#1;em;…\n#3;em;…\n#5;em;…\n#1;h\n#3;h\n#5;h\n#wait;2500"
52280-135 = "1;미치루;02;공식적으로 음양부와 백화요란에서는 그때 모습을 드러냈던 아야메 부장이 화조풍월부가 만들어 낸 가짜라고 말했단 말이지.\n#1;m3\n#3;dr\n#5;dr"

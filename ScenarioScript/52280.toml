52280-64 = "3;니야;01;화조풍월부라 하니 떠올랐는데, 에비스 분교의 하부 아자미 양 말이지요."
52280-65 = "3;니야;10;저 역시 에비스 분교의 현황은 서신을 통해서만 존재를 인지하고 있었기에, 이번 기회에 사람을 따로 보내 진상을 조사해 보았습니다만."
52280-66 = "3;니야;09;조사 결과, 에비스 분교의 자치위원회는 수십 년 전부터 운영되지 않았다고 합니다."
52280-67 = "3;니야;09;게다가 아자미 양의 이름을 기억하는 주민도 없었고, 그동안 제가 보냈던 공문을 수신한 사람도 없다고 하니……"
52280-68 = "[s] \"그 말인즉……\""

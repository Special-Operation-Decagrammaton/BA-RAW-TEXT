52280-77 = "[ns] \"그쪽이 문제인 거야?!\""
52280-78 = "3;니야;10;당연하지요! 그동안 손대지 않고도 돌아가고 있던 행정 업무 하나가 공석이 되었다는데……\n#3;hophop\n#3;em;[스팀]"
52280-79 = "3;니야;10;아무래도 화조풍월부는 그동안 자치위원회의 이름을 은밀히 빌려 신분을 감추는 데 사용했던 모양입니다."
52280-80 = "3;니야;06;신분을 숨기고 학생들을 속여 사익을 편취하려 한 점은 괘씸하지만, 자치구의 행정 업무만큼은 문제없이 처리해 주었는데……"
52280-81 = "3;니야;06;늘어난 서류 업무가…… 멀어지는 안한자적의 삶이…… 으으……\n#3;em;[세로선]\n#3;stiff"
52280-82 = "[s] \"그 후로 화조풍월부의 흔적은 찾지 못한 거야?\""
52280-83 = "3;니야;06;네. 지난번과 마찬가지로 사건이 끝나자마자 증발이라도 한 것처럼 화조풍월부의 흔적은 완전히 사라져 버리고 말았답니다.\n#3;em;[한숨]"
52280-84 = "3;니야;06;코쿠리코 부장도, 아자미 양도…… 저희와 함께 있던 슈로 양도."
52280-85 = "3;니야;01;그때, 자신이 무슨 짓을 했는지 깨달았을 때 슈로 양이 지었던 표정은 사진으로 찍어 기록으로 남기고 싶었을 정도였는데, 아쉽게 되었네요."
52280-86 = "[s] \"성격이 나쁘다니까……\""
52280-87 = "3;니야;03;냐하하…… 다만 슈로 양의 소설 계정은 여전히 남아 있으니, 변화가 생긴다면 새로운 연재가 올라오지 않을까요?\n#3;em;[재잘]"
52280-88 = "3;니야;01;슈로 양의 글. 시간 때우며 읽기에는 나쁘지 않아서 개인적으로는 신작을 기대하고 있었거든요."
52280-89 = "3;니야;06;……물론 전개만큼은 지리멸렬했지만.\n#3;em;…"
52280-90 = "[s] \"그때와는 달리 평가가 박하지 않아?\""
52280-91 = "3;니야;03;어쩔 수 없지요. 이야기꾼이란 본래 사소한 일로도 의지가 꺾여버리는 나약한 사람들이니까요.\n#3;em;[재잘]"

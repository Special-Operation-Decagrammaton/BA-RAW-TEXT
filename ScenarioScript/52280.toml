52280-5 = "3;니야;03;네, 들어오셔요~\n#3;em;[재잘]"
52280-6 = "#st;[0,0];instant;1;"
52280-7 = "#clearST"
52280-8 = "#wait;1500"
52280-9 = "3;니야;02;어머나, [USERNAME] 선생님?\n#3;em;[반응]"
52280-10 = "3;니야;02;기별도 없이 갑작스럽게……"
52280-11 = "[s1] \"니야가 입원을 했다고 해서, 병문안을 왔어.\"\n[s2] \"몸은 좀 괜찮아?\""
52280-12 = "#wait;10"
52280-13 = "#wait;10"
52280-14 = "3;니야;04;냐하하…… 아무래도 괜한 소식으로 걱정을 끼쳐드린 것 같아 죄송스럽네요."
52280-15 = "3;니야;01;보시다시피 저는 완벽하게 건강하답니다. 지난 사건 때 다친 상처도 거의 다 나았고요.\n#3;em;[음표]"
52280-16 = "3;니야;06;다만…… 가벼운 찰과상이라 하더라도 백물어에게 입은 것이니, 혹시라도 모를 후유증이 있을지도 모른다며 카호가 하도 성화를 부려서요."
52280-17 = "3;니야;03;치료와 더불어 여러가지 검사를 받기 위해 입원을 했을 뿐, 큰 부상을 입은 것은 아니니 안심하셔도 괜찮답니다.\n#3;em;[재잘]"
52280-18 = "[s] \"그렇다면 다행이지만.\""
52280-19 = "3;니야;04;이야…… 솔직히 말씀드리자면, 저 홀로 이렇게 입원해 있으려니 조금 면목이 없긴 하네요.\n#3;stiff\n#3;em;[땀]"
52280-20 = "3;니야;02;정작 현장에서 치열하게 싸운 백화요란과 다른 동아리의 부원 여러분은 벌써 일상으로 돌아가신 모양인데 저만 이렇게 병상에 누워 있으니."
52280-21 = "3;니야;03;하지만 모처럼 명분도 생겼으니, 이번에야말로 게으름을 부려도 아무도 뭐라 하지 못하겠지요. 후후……"
52280-22 = "[s] \"그런 것 치고는 침대 옆 탁자에 서류가 가득 쌓여 있는데……\""
52280-23 = "#st;[0,0];instant;1;"
52280-24 = "#clearST"
52280-25 = "3;니야;04\n#3;em;[!]\n#wait;1000"
52280-26 = "3;니야;12;……윽. 이건 그러니까……\n#3;em;[///]\n#3;stiff"
52280-27 = "3;니야;06;물론 저도 하염없이 게으름을 부리고 싶었지만…… 풍문 중에는 시일이 지나면 걷잡을 수 없이 커져 나중에는 대처할 수 없는 성질의 이야기가 제법 많으니까요."
52280-28 = "3;니야;04;더욱이 이런 큰 사건이 끝난 직후에는 말을 얹기 좋아하는 호사가들이 몰려드는 법이라.\n#3;em;[재잘]"
52280-29 = "3;니야;04;급한대로 우선도가 높은 서류부터 살펴보고 있었답니다."
52280-30 = "3;니야;10;절대~로 일하는 게 좋아서 이러고 있는 게 아니라고요?"
52280-31 = "[s3] \"알겠어, 알겠어.\"\n[s4] \"평소의 니야 다운 것 같아 다행이네.\""
52280-32 = "#wait;10"
52280-33 = "#wait;10"
52280-34 = "3;니야;02;우선 검토한 내용 중 가장 중요한 안건을 몇 가지 정리해 말씀드리자면……\n#3;greeting"
52280-35 = "3;니야;01;……와라쿠 축제가 무사히 성료되었답니다!"
52280-36 = "#st;[0,0];instant;1;"
52280-37 = "#clearST"
52280-38 = "#wait;1500"
52280-39 = "[ns] \"그게…… 중요한 안건이야?\""
52280-40 = "3;니야;01;물론이고 말고요. 치세 냥의 귀여운 공연을 직관할 수 있는 기회는 흔치 않다고요?\n#3;em;[음표]"
52280-41 = "3;니야;02;더욱이 이번 공연에서 발표한 치세의 신곡이 SNS에서 소소하게 화제가 된 모양이라."
52280-42 = "3;니야;06;카호는 이 기회에 치세 냥을 정식으로 아이돌 데뷔시키는 게 좋을지, 진지하게 상담을 해 오더군요."
52280-43 = "3;니야;03;물론 치세가 바빠지면 그만큼 치세를 곁에 두고 지켜볼 시간도 줄어들 테니. 고민이 크다나, 뭐라나~\n#3;em;[재잘]"
52280-44 = "[s] \"그러고 보니 축제에 대해 묻고 싶은 게 있었는데……\""
52280-45 = "3;니야;01;네, 부디.\n#3;em;[음표]"
52280-46 = "[s5] \"와라쿠 축제가 시작되자마자 히토츠메의 힘이 약화되었잖아?\"\n[s6] \"역시 백귀야행의 축제는 백물어를 몰아내는 제의를 겸하고 있었나?\""

52280-48 = "#wait;10"
52280-49 = "#st;[0,0];instant;1;"
52280-50 = "#clearST"
52280-51 = "3;니야;10\n#wait;1000"
52280-52 = "3;니야;03;에이, 설마요~\n#3;em;[재잘]"
52280-53 = "3;니야;02;아자미 양을 동요시키기 위해 허풍을 떨긴 했지만, 축제는 축제일 뿐이랍니다."
52280-54 = "3;니야;06;먼 옛 축제의 기원이 하늘을 맞이하는 제사, 마츠리에 있다고는 하지만…… 지금에 와서는 이를 기억하는 사람도, 행하는 사람도 없으니까요.\n#3;em;[한숨]"
52280-55 = "3;니야;01;……다만, 오랫동안 준비한 축제가 중단된다면 슬퍼하는 사람이 많지 않겠어요?"
52280-56 = "3;니야;01;슬퍼하는 아이에게는 사탕을 주고, 떼를 쓰는 아이에게는 주의를 준다."
52280-57 = "3;니야;03;이는 음양의 원리까지 따질 필요도 없는 단순한 삶의 이치랍니다~\n#3;em;[음표]"
52280-58 = "[s7] \"……그 자신만만한 선언이 허풍이었다니.\"\n[s8] \"화조풍월부가 그 말을 믿고 바로 물러가서 다행이었네.\""

[translation]
31050-1 = "第5話;補課部的學生們（２）"
31050-4 = "……原來如此，我明白了。#n老師成為了補課部的負責老師……"
31050-5 = "……真遺憾，如果可以的話真想幫老師的忙。"
31050-6 = "[s] 「那兩個人可以由我接手嗎？」"
31050-7 = "啊！？那怎麼可以！？絕對不行，他們是重刑犯耶！"
31050-8 = "小春。老師是以夏萊的身分，受茶會的委託來到這裡的。"
31050-9 = "在規定上，擔任補課部顧問的老師要帶走他們並沒有問題。"
31050-10 = "可，可是……#n好吧，既然前輩都這麼說了……"
31050-11 = "哼，哼！不過也好！這樣我們就不用和重刑犯待在一起了！#n而且居然還是補課部什麼的！真是丟臉又可憐！"
31050-12 = "啊哈哈！惡徒和變態的組合挺不錯的嘛！如果是我光是待在一起就會羞恥至死了！"
31050-13 = "小春……唉……"
31050-15 = "啊嗚……"
31050-16 = "[s]「這樣就剩下最後一個人了吧？」"
31050-17 = "啊……是的。#n那個……雖然非常難以啟齒……"
31050-18 = "最後一位就是……下江小春……同學。"
31050-19 = "……"
31050-20 = "……咦，我！？"
31050-26 = "下"
31050-28 = "江"
31050-32 = "小"
31050-34 = "春"
31050-38 = "補課部的1年級生，下江小春。"
31050-39 = "已經連續3次不及格，留級近在眼前。"
31050-40 = "補充事項：成績上升之前，無法回歸實現正義部。"
31050-44 = "那麼，聚集在這裡的就是補課部的成員嗎？"
31050-45 = "（呼，呼……）"
31050-46 = "…… "
31050-49 = "啊，啊哈哈哈……補課部的大家總算是到齊了呢……"
31050-50 = "接，接下來才是真正的問題……"
31050-51 = "呵呵，該做什麼呢？阿慈谷部長？"
31050-52 = "女高中生和老師，能在放學後人跡罕至的教室做的……#n嗯，果然只有那種事了吧……"
31050-53 = "（呼……）那種事……？是什麼都無所謂。#n順帶一提，要我蹲在這間教室一個月都沒問題。"
31050-54 = "好想死……"
31050-56 = "……"
31050-57 = "老師……那個，拜託你了……"
31050-58 = "[s]「……嗯，我會努力試試的。」"
31050-59 = "非常感謝……我也會努力的……"
31050-61 = "下一話;來自我介紹吧！"

[translation]
31050-1 = "第5話;補習授業部の生徒たち（２）"
31050-4 = "……なるほど、お話は理解しました。先生が、補習授業部の担任の先生になられると。"
31050-5 = "……残念です、できればお手伝いをしたかったのですが。"
31050-6 = "[s] \"あの二人、連れて行ってもいいかな？\""
31050-7 = "はぁ！？ダメに決まってるでしょ！？絶対ダメ、凶悪犯なのよ！？"
31050-8 = "コハル。先生はシャーレの方として、ティーパーティーからの依頼を受けてこちらにいらっしゃったのです。"
31050-9 = "規定上は何の問題もありません。補習授業部の顧問、担任の先生になるのですから。"
31050-10 = "え、えぇ……まあでも、先輩がそう言うなら……。"
31050-11 = "ふ、ふん！まあでも良いザマよ！こっちはこんな凶悪犯たちと一緒にいなくて済むし、そもそも補習授業部だなんて！恥ずかしい！"
31050-12 = "あははっ！良いんじゃない、悪党と変態の組み合わせ！そこに「バカ」の称号だなんて、私なら一緒にいるだけで羞恥心で死んじゃいそう！"
31050-13 = "……ふぅ、コハル……。"
31050-15 = "あぅ……。"
31050-16 = "[s] \"あと残りは……。\""
31050-17 = "……はい。その、非常に言いにくいのですが……"
31050-18 = "最後の一人は……[ruby=しもえ]下江[/ruby]コハルさん、です。"
31050-19 = "……。"
31050-20 = "……え、私っ！？"
31050-26 = "下"
31050-28 = "江"
31050-32 = "コ"
31050-34 = "ハ"
31050-36 = "ル"
31050-38 = "補習授業部の1年生、[ruby=しもえ]下江[/ruby]コハル。"
31050-39 = "すでに3回連続で赤点を叩き出し、留年目前。"
31050-40 = "補足事項：成績が向上するまで、正義実現委員会には復帰できないものとする。"
31050-44 = "では、ここに揃っているのが補習授業部のメンバーということですか？"
31050-45 = "（シューッ、シューッ……）"
31050-46 = "……。"
31050-49 = "は、はい……えっと、これで何とかみんな集まりましたね。補習授業部……。"
31050-50 = "こ、ここからが本当の問題なのですが……。"
31050-51 = "ふふ、何をすれば良いのでしょうか？[ruby=あじたに]阿慈谷[/ruby]部長？"
31050-52 = "放課後にひと気のない教室で、素行の悪い女子高生と大人が集まって……ふふ、始まってしまいそうですね。"
31050-53 = "始まる……？まあ、何だって構わない。ちなみに私は本気を出せば、この教室で一ヵ月は立てこもれる。"
31050-54 = "死にたい……本当に死にたい……。"
31050-56 = "え、っと……。"
31050-57 = "先生……その、よろしくお願いします……。"
31050-58 = "[s] \"……うん、頑張ってみるね。\""
31050-59 = "ありがとうございます……私も、出来るだけ頑張りますので……。"
31050-61 = "次回;自己紹介をしましょう！"

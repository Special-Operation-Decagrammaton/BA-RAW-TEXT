31050-4 = "3;하스미;01;……이야기는 들었습니다. 선생님께서 기간 한정으로 보충수업부를 맡으신다고…….\n#3;a"
31050-5 = "3;하스미;99;아쉽네요. 여러 모로 바쁘시겠지만 저희는 그쪽으로는 도움을 드릴 수가 없어서…….\n#3;em;…"
31050-6 = "[s] \"저 둘의 신병을 인도받고 싶은데.\""
31050-7 = "5;코하루 정의실현부;07;뭐?! 무슨 권리로?! 절대 안 돼! 흉악범들이야!\n#5;em;[반응]\n#5;al\n#5;hophop\n#3;m1"
31050-8 = "3;하스미;05;코하루. 선생님은 샬레의 담당이시자 티파티의 의뢰를 받고 오신 분이에요."
31050-9 = "3;하스미;01;선생님은 규정상 이들을 데리고 가는 게 가능합니다. 보충수업부의 담당이시니까요."
31050-10 = "5;코하루 정의실현부;05;그, 그치만……. 서, 선배가 그렇다면 뭐……. \n#5;stiff"

31050-12 = "5;코하루 정의실현부;03;아하하하하! 꼴 좋다! 악당에 바보 조합이잖아? 나같았으면 같이 있는 것만으로도 수치심을 못견디고 죽어버렸을 거야! \n#5;em;[재잘]"

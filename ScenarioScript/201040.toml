[translation]
201040-1 = "第4話;空色の懐かしさ"
201040-2 = "（カヤとの面会が終わったあと、リンを連邦生徒会まで送った）"
201040-7 = "……見送りは大丈夫だと言ったはずですが。"
201040-8 = "私のせいで先生の帰宅時間が遅くなっては――"
201040-9 = "[s1] \"気にしないで。私が好きでやってるんだから。\"\n[s2] \"むしろこんな時間に一人じゃ危ないでしょ？\""
201040-12 = "いくら事務作業が得意だとはいえ、私も連邦生徒会の一員です。#nそこらのスケバンであれば問題にもなりません。"
201040-13 = "むしろ危ないのは[USERNAME]先生のほうでは……。"
201040-17 = "……こんなことを言っても今更ですね。"
201040-18 = "それより、せっかく連邦生徒会まで来たのですから。#n少し寄っていかれてはいかがですか？"
201040-19 = "[s3] \"お誘いは嬉しいけど……。\"\n[s4] \"生徒の家に上がるのはちょっと……。\""
201040-22 = "何を考えているんですか！"
201040-23 = "私はただ確認をお願いしたかっただけです。#n……先ほどカヤが話していた「シャーケードの杖」。"
201040-24 = "カヤには普通のスマートウォッチに見えたとしても、「シッテムの箱」のように、#n先生であればその価値が分かるかもしれません。"
201040-25 = "あれが本当に連邦生徒会長が残したオーパーツなのだとしたら、#nキヴォトスの混乱を収める一助となるか、あるいは――"
201040-26 = "連邦生徒会長の行方を掴む、鍵となりうる可能性があります。"
201040-27 = "一刻も早く調査に取りかかりたいのです。"
201040-28 = "[s5] \"そこまで急ぐ必要はないと思うよ？\"\n[s6] \"今はもっと大事なことがあるからね。\""
201040-31 = "連邦生徒会長を探すより大事なことなど――"
201040-32 = "[s] \"リンの休暇だよ。\""
201040-36 = "[ns7] \"今日はお休みでしょ？\"\n[ns8] \"だから、仕事に関係することはやめておこう。\""
201040-39 = "……分かりました。"
201040-40 = "1日お付き合いいただきありがとうございました。先生もゆっくりとお休みください。"
201040-41 = "では、お先に失礼します。"
201040-46 = "連邦生徒会長室内の倉庫"
201040-50 = "これが……聖櫃。"
201040-55 = "「シャーケードの杖」はこの中に……。"
201040-56 = "見た目には問題なさそうですが……鍵がかかっていますね。"
201040-57 = "……これは？"
201040-58 = "見たことのないマークが……連邦生徒会長が残したものではありません。#nどうして……。"
201040-59 = "刻まれている文字は……。"
201040-61 = "この者は――汝らを楽園から導きし者だ。"
201040-63 = "パスワード承認。#nアクセス者、現連邦生徒会長代行、七神リン行政官。"
201040-64 = "アクセス権限確認。声紋照合――99％一致。"
201040-65 = "……確認完了。聖櫃の封印を解除します。"
201040-70 = "こんなに簡単に開くとは……。"
201040-71 = "これが……「シャーケードの杖」……。"
201040-75 = "普通のスマートウォッチにしか見えませんが……。"
201040-76 = "やはり、先生にお願いしましょう。"
201040-80 = "しかし……「シッテムの箱」といい、会長はどのような用途でこれを使っていたのでしょうか。"
201040-81 = "世界を完璧に制御できるのは、あなたのような超人だけなのでしょうけれど……。"
201040-82 = "それでも……先生のような大人でなければ、#nあなたが残した片鱗に近づくことすら許されないのでしょうか。"
201040-83 = "……会長。"
201040-84 = "あなたのいない世界で……私は、あなたの役割を果たせる自信がありません。"
201040-85 = "この声が聞こえたら、嘘でもいいですから――"
201040-86 = "――大丈夫だよ、と。言ってください。"
201040-87 = "私は……。"
201040-95 = "……リンちゃん。"
201040-96 = "もしも私が消えたら、リンちゃんはどうする？"
201040-97 = "長期休暇をお考えでしたら、2週間前までに申請してください。"
201040-98 = "違うよ！もしもの話！"
201040-99 = "私が怪我とか病気で連邦生徒会に来れなくなったら――"
201040-100 = "いきなり事故に巻き込まれて失踪しちゃったら、リンちゃんはどうする？"
201040-101 = "想像しがたいですが、そのようなことが起きたら……。"
201040-102 = "……少し、困りますね。"
201040-103 = "会長が急にいなくなると、私のタスクが2倍になってしまいますので。"
201040-104 = "ひどい！そんな状況でも仕事の話なの！？"
201040-105 = "当然です。会長が処理している業務量を考えると――"
201040-106 = "キヴォトスの誰であろうと、代わりは務まりません。"
201040-107 = "……そんなことないよ。#n努力すれば、誰だって、何でも叶えられるんだから。#nちょっと、時間はかかるだろうけど。"
201040-108 = "私の役割なんて、そんなに大したことじゃないよ。"
201040-109 = "でも……どんなに優秀な人でも代われないものが、1つだけあるの。"
201040-110 = "それは……。"
201040-113 = "……リン。"
201040-114 = "……リン、起きてください。"
201040-115 = "[ruby=なながみ]七神[/ruby]リン行政官！！"
201040-116 = "……。"
201040-117 = "この声は……。"
201040-119 = "……おはようございます。"
201040-120 = "昨日は遅くまでお仕事をされていたんですか？"
201040-121 = "頑張るのもいいですが、あまり無理をしては本末転倒だと何度もお伝えしていますよ。"
201040-126 = "あなたは……。"
201040-127 = "……誰ですか？"
201040-128 = "どうやってここに……？"
201040-129 = "もう……私のことを忘れてしまったんですか？寂しいことを言わないでください。"
201040-130 = "それとも、寝ぼけているんですか？"
201040-132 = "では、改めて自己紹介をしましょう。"
201040-133 = "私はあなたの古い友人であり――"
201040-134 = "この学園都市、キヴォトスを管理する連邦生徒会の長。"
201040-135 = "連邦生徒会長です。"
201040-137 = "次回;記憶の誤り"

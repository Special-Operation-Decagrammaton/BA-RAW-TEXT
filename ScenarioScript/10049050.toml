[translation]
10049050-1 = "ตอนที่ 5;ตามหาแก๊งหมวกกันน็อก 1"
10049050-2 = "......"
10049050-3 = "แฮ่ก... แฮ่ก..."
10049050-7 = "จากบนเวที มองออกไปยังที่นั่งผู้ชม ตำแหน่ง 2 นาฬิกา เห็นมั้ยคะ?"
10049050-8 = "พบเห็นแก๊งหมวกกันน็อกป๋อมแป๋มกับคนที่คาดว่าเป็นโคะมาคาเสะ ราบุ รวมทั้งหมด 3 คนค่ะ"
10049050-10 = "!!"
10049050-11 = "ช่วยยืนยันตัวเป้าหมายและตรวจสอบว่าเป็นอันตรายหรือเปล่าจากหน้างานด้วยค่ะ"
10049050-12 = "ตอนนี้เหมือนพวกนั้นกำลังลากรถเข็นไป..."
10049050-13 = "สิ่งที่อยู่ข้างในดูเหมือนจะเป็น... ป๊อปคอร์นกับมัดระเบิดมือค่ะ!"
10049050-15 = "[ns] \"ระเบิดมือ?!\""
10049050-16 = "ฉันมองเป็นอย่างนั้นค่ะ..."
10049050-17 = "แต่ด้วยปัญหาด้านระยะทาง ฉันเลยระบุข้อมูลที่แน่ชัดจากตรงนี้ไม่ได้ น่าจะต้องให้คนที่อยู่ตรงนั้น#nช่วยยืนยันให้..."
10049050-21 = "หัวหน้า ทั้งหมดมีแค่นี้เหรอคะ?"
10049050-22 = "จะเป็นแบบนั้นได้ยังไงกัน ถ้าคิดจะทำแล้วก็ต้องเอาให้เยอะๆ เลยสิ"
10049050-23 = "สมกับที่เป็นหัวหน้าเลย! ต้องระเบิดเปรี้ยงปร้างแน่ๆ ค่ะ!"
10049050-24 = "เห็นบอกว่าอยู่แถวนี้นี่นา... อึก... ทำไมจู่ๆ คนก็เยอะแบบนี้เนี่ย?"
10049050-25 = "นั่นน่ะสิคะ เฮ้! หลบไปนะ หลบไป!"
10049050-30 = "อ่า..."
10049050-31 = "อ่า...?"
10049050-32 = "หัวหน้า? มีเรื่องอะไรเหรอคะ?"
10049050-33 = "เปล่าหรอก ก็แค่..."
10049050-34 = "คนที่ใส่ชุดสีชมพูบนเวทีนั่นน่ะ"
10049050-35 = "ทำไมเหรอคะ? ก็แค่นักแสดงจากการ์ตูนที่เด็กๆ ดูไม่ใช่เหรอคะ?"
10049050-36 = "ไม่เคยเห็นคนคนนั้นมาก่อนเลยแฮะ..."
10049050-37 = "แต่เห็นแล้วขนลุกชะมัดเลย"
10049050-38 = "แข็งแกร่งไม่ใช่เล่นเลยนะ ยัยนั่น..."
10049050-45 = "เผ่นเร็ว!!!"
10049050-49 = "คะ?!"
10049050-59 = "รายงานจากเวที! พบโคะมาคาเสะ ราบุกับแก๊งหมวกกันน็อกป๋อมแป๋ม รวม 3 คน!"
10049050-60 = "กำลังหนีไปทางเกเฮนน่าค่ะ จะไล่ตามไปเดี๋ยวนี้ค่ะ!"
10049050-64 = "คุณสึซึ... เทอร์ไมต์ ไวต์! จะไปไหนคะ!"
10049050-66 = "อะไรน่ะ?! จู่ๆ ก็โดดลงจากเวทีเลยเหรอ!"
10049050-67 = "นี่มันเรื่องอะไรเนี่ย?"
10049050-69 = "เทอร์ไมต์ ไวต์!!"
10049050-70 = "เล่นนอกบท... หรือว่าเกิดความผิดพลาดอะไรน่ะ?"
10049050-75 = "[ns] \"ตามไปเร็วเข้า!\""
10049050-76 = "ค่ะ!"
10049050-78 = "คุณสึซึมิ! แค่ยืนยันให้ก็พอค่ะ!"
10049050-79 = "ถ้าเข้าไปในเขตเกเฮนน่า ชมรมทวงความยุติธรรมจะช่วยอะไรต่อไม่ได้นะคะ!"
10049050-80 = "ขอโทษค่ะ นี่เป็นสถานการณ์เร่งด่วนค่ะ"
10049050-81 = "คนพวกนั้นพกพาวัตถุระเบิดจำนวนมากเลยค่ะ"
10049050-82 = "ไม่ต้องสนับสนุนก็ได้ค่ะ"
10049050-83 = "ฉันจะหาทางจัดการดูค่ะ"
10049050-84 = "พิงค์จะตามไปด้วยค่ะ!"
10049050-88 = "แฮ่ก... แฮ่ก...!"
10049050-89 = "หัวหน้า!! คนพวกนั้นคือใครคะ?!"
10049050-90 = "ฉันจะไปรู้เหรอ?! ถ้าไล่ตามเรามา ก็น่าจะเป็นศัตรูนั่นละ!"
10049050-91 = "แต่จู่ๆ ก็โดดลงมาจากเวทีแล้ววิ่งไล่มา"
10049050-92 = "น่าจะเป็นส่วนหนึ่งของการแสดงมากกว่านะคะ? ฉากตัวเอกกระโดดลงจากเวทีไง...?"
10049050-93 = "นี่ไม่ใช่การแสดงเพลงร็อกสักหน่อย! แล้วยังใส่ชุดอะไรแบบนั้นด้วย?"
10049050-94 = "หยุดตรงนั้นเลยนะคะ"
10049050-100 = "ว้าก วิ่งมาถึงตรงนี้ตั้งแต่เมื่อไรเนี่ย?!"
10049050-101 = "เร็วสุดปรอทเลยนะคะ เราแค่หยุดคุยกันแป๊บเดียวเอง..."
10049050-103 = "เทอร์ไมต์ พิงค์ขวางเส้นทางหนีไว้แล้วค่ะ! ยอมจำนนต่อเฮฟวี่ แคลิเบอร์เถอะค่ะ!"
10049050-105 = "เฮฟวี่... อะไรนะ? เฮฟวี่ แคลิเบอร์?"
10049050-106 = "นั่นไม่ใช่ของเล่นที่เด็กๆ ข้างถนนเล่นกันหรอกเหรอ?"
10049050-107 = "พวกเธอ... เป็นพวกนั้นเหรอ? พวก... โอตาคุ...?"
10049050-109 = "น่าจะเป็นคนที่ชื่นชอบอะไรแบบนี้นะคะ?"
10049050-110 = "ว่าแต่ทำไมถึงชื่อพิงค์ล่ะ? ชุดสีม่วงก็ต้องชื่อ 'เพอร์เพิล' ไม่ใช่เหรอ?"
10049050-112 = "ถ้าจะบอกเหตุผล เกรงว่าจะเป็นการสปอยล์ค่ะ ฉันแนะนำให้ไปดูแอนิเมชันภาคหลักนะคะ!"
10049050-113 = "(เหมือนพวกนี้จะยังไม่รู้ตัวตนที่แท้จริงของเรานะ โล่งอกไปที...)"
10049050-117 = "โอ้ เป็นพาเหรดโชว์แน่เลย!"
10049050-118 = "มันคืออะไรเหรอ?"
10049050-119 = "การแสดงที่ไม่ได้อยู่แต่บนเวที แต่ลงมาใช้พื้นที่ทั้งหมดของงานเป็นเวทียังไงล่ะ"
10049050-120 = "อยู่ตรงนี้นี่เอง! พิงค์กับไวต์!"
10049050-121 = "เหมือนกำลังต่อสู้กับวายร้ายอยู่นะ!"
10049050-125 = "(เป็นเรื่องแล้วสิ... ผู้ชมเริ่มแห่กันมาทางนี้แล้ว...)"
10049050-126 = "(มีเด็กเล็กด้วย งั้นแค่ระเบิดแสงก็อาจเป็นอันตรายได้เลย...)"
10049050-127 = "(งั้นคงต้องเจรจาเพื่อความปลอดภัยก่อน...)"
10049050-128 = "ฉันต้องตรวจสอบอะไรหน่อย รบกวนไปกับฉันสักเดี๋ยวนะคะ"
10049050-129 = "[s] \"ทุกคน เรามาคุยกันก่อนดีมั้ย?!\""
10049050-131 = "ว้าก ครูจากชาเล่ต์ก็มาเหรอ?"
10049050-132 = "ถ้าเป็นคนอื่นคงไม่เป็นไร แต่ถ้าถึงกับพาครูมาด้วยละก็..."
10049050-133 = "ทุกคน นี่เราถูกรบกวนอยู่นะ"
10049050-135 = "จะให้ทำอย่างนี้ไม่ได้หรอกค่ะ หัวหน้า!"
10049050-136 = "เราไม่ได้หางานนี้ได้ง่ายๆ ด้วย!"
10049050-138 = "ใช่..."
10049050-139 = "จัดการให้สิ้นซากเลย!"

[translation]
10049050-1 = "第5話;尋找頭盔團"
10049050-2 = "……"
10049050-3 = "哈啊……哈啊……"
10049050-7 = "現場，從舞台看向觀眾席的2點鐘方向，看得見嗎？"
10049050-8 = "觀測到疑似嘩啦嘩啦頭盔團與河駒風良舞的三人組。"
10049050-10 = "！！"
10049050-11 = "請於現場確認身分與威脅程度。"
10049050-12 = "目前他們正拉著一台手推車……"
10049050-13 = "裡面看起來像是爆米花桶……與一捆手榴彈！"
10049050-15 = "[ns]「手榴彈！？」"
10049050-16 = "看起來是那樣沒錯……"
10049050-17 = "不過因為距離問題難以確認，必須依靠現場的判斷……"
10049050-21 = "隊長，這就是全部了嗎？"
10049050-22 = "怎麼可能，要做就要徹底撈一筆才行。"
10049050-23 = "不愧是隊長！馬上就要發大財了呢！"
10049050-24 = "應該是在這附近沒錯……#n呃，怎麼突然這麼多人？"
10049050-25 = "真的耶。#n那邊的人！讓開讓開！"
10049050-30 = "啊……"
10049050-31 = "咦……？"
10049050-32 = "隊長？發生什麼事了？"
10049050-33 = "不是，那個……"
10049050-34 = "舞台上那個穿粉紅衣服的人。"
10049050-35 = "怎麼了？不就是給小孩看的卡通秀演員嗎？"
10049050-36 = "雖然應該是第一次見到……"
10049050-37 = "突然感覺有點腿軟。"
10049050-38 = "那傢伙……很強。"
10049050-45 = "快逃吧！！！"
10049050-49 = "什麼！？"
10049050-59 = "現場已確認！是河駒風良舞與嘩啦嘩啦頭盔團的三人組！"
10049050-60 = "目前正往格黑娜方向逃走，開始追擊！"
10049050-64 = "鈴……Thermite White！你要去哪裡！"
10049050-66 = "怎麼回事！？突然從舞台跳下去了！"
10049050-67 = "怎麼了？"
10049050-69 = "Thermite White！！"
10049050-70 = "這是……直播事故？還是舞台事故？"
10049050-75 = "[ns]「快跟上去吧！」"
10049050-76 = "是！"
10049050-78 = "鈴美同學！只要確認就夠了！"
10049050-79 = "一旦進入格黑娜區域，我們實現正義部就不能支援了！"
10049050-80 = "抱歉。現在情況緊急。"
10049050-81 = "那些人還攜帶了大量疑似手榴彈的爆炸物。"
10049050-82 = "支援就不必了。"
10049050-83 = "我會想辦法解決。"
10049050-84 = "Pink也會跟上的！"
10049050-88 = "哈啊，哈啊──！！"
10049050-89 = "隊長！！那些傢伙到底是什麼人啊！？"
10049050-90 = "我哪知道啊！？反正既然都追過來了就是敵人吧！"
10049050-91 = "突然從舞台跳下來追我們……"
10049050-92 = "會不會只是表演的一部分？從舞台上跳下來的那種……？"
10049050-93 = "你以為這是搖滾樂的演唱會啊？而且還穿成那樣？"
10049050-94 = "請你們停下來。"
10049050-100 = "哇啊！？什麼時候衝到我們前面的！？"
10049050-101 = "速度好快，才一眨眼就……"
10049050-103 = "退路已經被Thermite Pink封住了！乖乖向Heavy Calibers投降吧！"
10049050-105 = "Heavy……什麼？Heavy Calibers？"
10049050-106 = "那不是街上的小孩玩的玩具嗎？"
10049050-107 = "你們……是那個吧？#n就是那種……過度沉迷的……"
10049050-109 = "看起來像是某種狂熱粉絲耶？"
10049050-110 = "而且為什麼是Pink啊？#n穿著紫色衣服不是應該叫Purple嗎？"
10049050-112 = "理由說出來會劇透，建議直接去看本篇！"
10049050-113 = "（看來對方完全不知道我們的真實身分……這倒是值得慶幸……）"
10049050-117 = "哦哦，是遊行表演吧！"
10049050-118 = "那是什麼？"
10049050-119 = "不只在舞台上，而是把整個場地都當成舞台的真實互動演出。"
10049050-120 = "在這裡！Pink跟White！"
10049050-121 = "好像要跟壞人打架了！"
10049050-125 = "（糟糕……觀眾越來越多了……）"
10049050-126 = "（現在有小孩在場，如果用閃光彈會有危險……）"
10049050-127 = "（先用說的設法控制住情況吧……）"
10049050-128 = "我們有幾件事情想確認，麻煩三位跟我們走一趟吧。"
10049050-129 = "[s]「孩子們，先聽我們說幾句！」"
10049050-131 = "嘖，連夏萊的老師也來了？"
10049050-132 = "無論他們是誰，竟然連老師都帶來了……"
10049050-133 = "小子們，他們好像想來礙事耶？"
10049050-135 = "那怎麼行呢，隊長！"
10049050-136 = "這可是好不容易才抓到的機會啊！"
10049050-138 = "既然如此……"
10049050-139 = "給我上！"

[translation]
83304600200-9 = "Prefect Team! Stop right there!"
83304600200-16 = "...Makoto? What's the problem?"
83304600200-17 = "I would ask you the same thing! What are you doing here?"
83304600200-18 = "We just completed our anti-terrorism drill and were returning to headquarters, Chairman Makoto."
83304600200-19 = "Done with your drill? Returning? Already?"
83304600200-20 = "...What do you mean by already?"
83304600200-21 = "It's not enough! It's nowhere near enough!"
83304600200-22 = "This isn't a holiday weekend!"
83304600200-24 = "..."
83304600200-25 = "Do you have any notion how important the upcoming Gehenna Party is?"
83304600200-26 = "There's no way to predict what kind of trouble might pop up during an event like this!"
83304600200-27 = "So, to compensate for your lack of foresight, you need to prepare yourselves by training!"
83304600200-28 = "Which means that this pitiful drill isn't enough! You need to train twice, no, three times as long as you have so far!"
83304600200-29 = "Thanks to your lack of preparation, our Ibuki was hurt! I'll never let anyone get away with causing a tragedy like that again!"
83304600200-30 = "What is this nonsense?!"
83304600200-31 = "First of all, Ibuki only got hurt because of you...!"
83304600200-32 = "Enough finger-pointing! By the authority vested in me by the Pandemonium Society, I order you to extend your training!"
83304600200-34 = "Very well."
83304600200-35 = "H-Head Prefect?!"
83304600200-36 = "I have no desire to waste time arguing about this."
83304600200-37 = "We'll resume our training at an increased intensity, as you request."
83304600200-38 = "Hah! You should've said that from the get-go—"
83304600200-39 = "But that's it. And if you complain about one more thing..."
83304600200-45 = "You and I will share some words."
83304600200-46 = "T-Tch! O-Okay, h-have it your way! Just don't disappoint the Great Makoto!"

83304600200-16 = "3;히나;05;마코토……? 무슨 일이지?\n#3;em;[?]"
83304600200-17 = "3;마코토;00;그건 오히려 이 몸이 묻고 싶은 말이야. 너흰 지금 뭘 하는 거지?"
83304600200-18 = "1;아코;09;저희는 지금 막 훈련을 마치고 복귀하는 중이었는데요. 마코토 의장.\n#1;ar\n#3;m5"
83304600200-19 = "3;마코토;02;훈련을 마치고? 복귀를? 벌써?\n#3;em;[?]"
83304600200-20 = "1;아코;04;……벌써라니, 무슨 의미죠?\n#1;stiff"
83304600200-21 = "3;마코토;99;그 정도 훈련량으로는 턱없이. 터무니없이.\n#3;m3\n#1;dl"
83304600200-22 = "3;마코토;05;너무나도 부족하단 말이다!\n#3;closeup\n#fontsize;80"

[translation]
83304600200-9 = "那邊的風紀委員會！都給我站住！"
83304600200-16 = "真琴……？有什麼事嗎？"
83304600200-17 = "那是我想問的吧。你們在做什麼？"
83304600200-18 = "我們剛完成訓練準備回去，真琴議長。"
83304600200-19 = "完成訓練？這麼快？"
83304600200-20 = "……這麼快是什麼意思？"
83304600200-21 = "那種程度的訓練完全不夠。"
83304600200-22 = "根本是嚴重不足！"
83304600200-24 = "…………"
83304600200-25 = "你們知道即將舉辦的格黑娜派對有多重要嗎！？"
83304600200-26 = "因為是重要的派對，誰也無法預測何時會發生狀況！"
83304600200-27 = "你們難道不該透過充分的訓練，做好萬全的應對措施嗎？"
83304600200-28 = "也就是說！這樣還遠遠不夠！#n必須提升為先前訓練量的2倍……不，是3倍才行！"
83304600200-29 = "就是你們的訓練嚴重不足……才會導致我們的伊吹受傷！#n那種意外不能再發生第二次！"
83304600200-30 = "唉，那番言論未免也太牽強了……！"
83304600200-31 = "伊吹之所以會受傷，明明全都是因為你……！"
83304600200-32 = "廢話還是省省吧！我會用萬魔殿的權限提高你們的訓練量，先跟你們說一聲啊！"
83304600200-34 = "嗯，我知道了。"
83304600200-35 = "委員長！！"
83304600200-36 = "我不打算在這邊跟你鬥嘴浪費時間。"
83304600200-37 = "我會依照你的要求提高訓練量，重新開始訓練。"
83304600200-38 = "哈！早該這麼做了……"
83304600200-39 = "但這次是最後一次。如果還繼續有意見……"
83304600200-45 = "我絕不會善罷甘休。"
83304600200-46 = "呃！？隨，隨便你愛怎麼說！總之可別讓我真琴大人失望啊！"

[translation]
83304600200-9 = "คณะกรรมการวินัย! หยุดอยู่ตรงนั้นเลยนะ!"
83304600200-16 = "มาโคโตะ...? มีเรื่องอะไรน่ะ?"
83304600200-17 = "เราต่างหากที่อยากถามแบบนั้น นี่พวกเธอกำลังทำอะไรกันอยู่?"
83304600200-18 = "พวกเราเพิ่งฝึกเสร็จกันมา และตอนนี้ก็กำลังเดินทางกลับค่ะ ประธานมาโคโตะ"
83304600200-19 = "เพิ่งฝึกเสร็จ? กำลังกลับ? ทำไมเร็วกันจัง?"
83304600200-20 = "หมายความว่ายังไงคะ...?"
83304600200-21 = "ก็หมายความว่าการฝึกฝนแค่ในระยะเวลาเท่านั้น!"
83304600200-22 = "มันยังไม่เพียงพอน่ะสิ!"
83304600200-24 = "......"
83304600200-25 = "รู้กันรึเปล่าว่าปาร์ตี้เกเฮนน่าที่จะมีน่ะเป็นงานที่สำคัญแค่ไหน!!"
83304600200-26 = "และเพราะมันเป็นปาร์ตี้ที่สำคัญ เราเลยคาดเดาไม่ได้เลยว่าจะมีเหตุร้ายเกิดขึ้นตอนไหน!"
83304600200-27 = "เพราะงั้นพวกเธอก็ควรเตรียมพร้อมด้วยการฝึกฝนที่เข้มข้นกว่านี้สิถึงจะถูก!"
83304600200-28 = "สรุปก็คือ! แค่นี้มันยังไม่พอ! เราต้องการให้พวกเธอไปฝึกในสิ่งที่ฝึกมาแล้วอีก 2 เท่า#nไม่สิ อีก 3 เท่าไปเลย!"
83304600200-29 = "เพราะพวกเธอฝึกฝนกันน้อยไป... อิบูกิของเราก็เลยได้แผลมายังไงล่ะ! เราจะยอมให้เกิดเหตุร้ายแบบนั้นอีกไม่ได้!"
83304600200-30 = "เดี๋ยวก่อน ทำไมถึงมากล่าวหากันแบบนี้...!"
83304600200-31 = "ที่อิบูกิได้รับบาดเจ็บก็เพราะคุณต่างหาก...!"
83304600200-32 = "เลิกพูดมากได้แล้ว! เราจะใช้สิทธิของแพนเดโมเนียม โซไซตี้ สั่งเพิ่มการฝึกฝนของพวกเธอ!"
83304600200-34 = "อืม ก็เอาสิ"
83304600200-35 = "ท่านประธาน?!"
83304600200-36 = "ฉันไม่อยากจะเสียเวลาไปกับการโต้เถียงอะไรนี่"
83304600200-37 = "เอาเป็นว่าจะไปฝึกกันเพิ่มตามที่เธอขอแล้วกัน"
83304600200-38 = "เฮอะ! มันก็ควรจะเป็นอย่างนั้นตั้งแต่แรกแล้ว..."
83304600200-39 = "แต่นี่จะเป็นครั้งสุดท้าย เพราะถ้าเธอจะมาพูดอะไรเพิ่มอีก"
83304600200-45 = "พวกฉันก็จะไม่อยู่เฉยๆ แล้วเหมือนกัน"
83304600200-46 = "หืม?!  กะ... ก็ได้! จะ...จะทำอะไรก็เชิญเลย! แต่อย่าทำให้ท่านมาโคโตะผู้นี้ผิดหวังก็พอ!"

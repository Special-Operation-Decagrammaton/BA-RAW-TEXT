83304600200-24 = "3;히나;01;……….\n#3;em;[…]"
83304600200-25 = "3;마코토;00;지금부터 시작될 게헨나 파티가 얼마나 중요한지는 알고 있는 게냐?!"
83304600200-26 = "3;마코토;00;중요한 파티인 만큼, 어느 때, 어떤 순간에 불상사가 일어날지 아무도 예측할 수 없어!"
83304600200-27 = "3;마코토;03;그러니 거기에 맞춰 충분한 훈련을 통해 대비를 하는 게 맞지 않겠냐. 이 말씀이시지!"
83304600200-28 = "3;마코토;05;즉! 부족해! 아직 부족하다! 지금까지 훈련한 것의 2배, 아니 3배는 더 훈련을 해줘야겠어!\n#3;em;[!]\n#3;jump"
83304600200-29 = "3;마코토;99;너희의 훈련이 충분하지 않은 나머지…… 우리의 이부키마저 상처를 입었단 말이다! 그런 불상사가 다시 일어나도록 내버려둘 순 없지!"
83304600200-30 = "3;아코;16;아니, 그 무슨 말도 안 되는 억지를……!\n#3;stiff"
83304600200-31 = "3;아코;15;애당초 이부키 양이 다친 건 순전히 당신 때문……!\n#3;em;[빠직]\n#3;jump"
83304600200-32 = "3;마코토;03;잔말은 됐다! 만마전의 권한으로 네 녀석들의 훈련량을 늘릴 테니 그리 알아두도록!\n#3;em;[음표]"

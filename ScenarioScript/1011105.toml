[translation]
1011105-1 = "寧瑠與遊樂園"
1011105-4 = "唷，老師。我來了。"
1011105-5 = "夏萊還是老樣子呢。#n就跟上次來的時候一樣。"
1011105-6 = "[s]「雖然寧瑠的衣服變了。」"
1011105-7 = "哈哈哈！是啊！"
1011105-8 = "穿著這種衣服，沒穿絲卡將來到夏萊也是第一次！"
1011105-9 = "不，只穿制服就到千年外面，應該也是第一次吧？"
1011105-10 = "在來的路上誰也沒認出我！這種感覺還是好有趣啊！"
1011105-11 = "[s]「不過你也說今天是最後一天了吧？」"
1011105-12 = "嗯，畢竟我也不能一直不去C&C啊。"
1011105-13 = "所以就像在MomoTalk裡說的一樣，我想來找找有沒有值得當作最後紀念的活動。"
1011105-14 = "老師有什麼好點子嗎？"
1011105-15 = "[s]「值得紀念的活動啊……」"
1011105-17 = "[ns]「……這個怎麼樣？」"
1011105-23 = "傳單？"
1011105-27 = "「千年遊樂園……與親朋好友或戀人一同蒞臨」……？"
1011105-28 = "遊樂園嗎？我之前去過。"
1011105-29 = "但穿著制服去遊樂園……"
1011105-33 = "感覺還挺有趣的嘛！"
1011105-34 = "[s]「那我們立刻出發吧？」"
1011105-35 = "真是爽快！"
1011105-36 = "我就喜歡老師這點！"
1011105-38 = "好像沒什麼人，感覺挺適合好好享受的嘛！"
1011105-39 = "那個旋轉木馬翻新過，所以閃閃發亮的。#n聽說雲霄飛車也剛翻修過沒多久哦！"
1011105-40 = "[s]「不過寧瑠之前不是已經來過這裡了嗎？」"
1011105-41 = "啊，那個時候啊？我是來執行任務的。"
1011105-42 = "當時是在這附近追捕犯人，結果場面稍微有點失控了。"
1011105-46 = "[ns]（難道設施翻新的原因就是……）"
1011105-47 = "話說回來，老師，該先玩哪個好呢？"
1011105-48 = "果然是雲霄飛車嗎！？"
1011105-49 = "很好很好！帶著魄力上吧！"
1011105-56 = "（於是跟寧瑠連續搭了三次雲霄飛車）"
1011105-58 = "這個真的太厲害了！超刺激的耶，對吧老師！？"
1011105-59 = "[ns]「我的頭還在暈……」"
1011105-60 = "哈哈！看來搭第四遍可能太勉強了！"
1011105-61 = "那接下來去玩那個吧？"
1011105-62 = "[s]「旋轉木馬……？」"
1011105-63 = "我從來沒有騎過馬耶！#n雖然只是假的，但感覺應該差不多吧？"
1011105-64 = "如果老師不舒服的話，不用搭也沒關係！"
1011105-65 = "[s]「我就在外面休息一下吧。」"
1011105-66 = "那我去去就回！"
1011105-72 = "噗哈！這個也好好玩！"
1011105-73 = "怎麼樣啊，老師？有看到我騎上最大隻的馬嗎？"
1011105-74 = "嗯？你剛才去了其他地方？#n是去洗手間嗎？"
1011105-75 = "你說不是？#n不然去了哪裡呢？"
1011105-76 = "[s]「我買了一個禮物要給寧瑠。」"
1011105-77 = "禮物？"
1011105-82 = "這個是……髮帶？還有零食？"
1011105-83 = "不，不管怎麼說，這種髮帶對我來說有點……！"
1011105-84 = "唔嗯……"
1011105-88 = "算了，雖然平常的我應該不會戴……"
1011105-89 = "但我現在既不是C&C的部長，也不是代號Double O……"
1011105-90 = "哈哈！那我就感激地收下了！"
1011105-93 = "― [log=네루 교복]哦！你看，老師！有好多東西耶！[/log][wa:2850] "
1011105-96 = "― [log=네루 교복]嗯？怎麼了嗎？[/log][wa:1020] "
1011105-99 = "[ns1]「沒什麼，只是你看起來真的很自在。」\n[ns2]「今天的寧瑠，感覺跟平常不太一樣。」"
1011105-102 = "― [log=네루 교복]啊～這個嘛……畢竟……[/log][wa:3270] "
1011105-105 = "― [log=네루 교복]現在又不是C&C，跟老師也不是前輩後輩的關係。[/log][wa:2910] "
1011105-108 = "― [log=네루 교복]這裡也沒有認識的人嘛。[/log][wa:1390] "
1011105-111 = "― [log=네루 교복]至少這種時候，你就網開一面吧？[/log][wa:720] "
1011105-114 = "― [log=네루 교복]還是說，你果然……[/log][wa:2240] "
1011105-116 = "― [log=네루 교복]比較喜歡平常那樣嗎？[/log]"
1011105-119 = "[ns3]「現在這樣就很好了。」\n[ns4]「監護人的位置我沒辦法讓出去。今天盡情地玩吧。」"
1011105-122 = "― [log=네루 교복]哈哈！就知道你會這麼說！[/log][wa:2080] "
1011105-125 = "― [log=네루 교복]那麼，既然時間也不是那麼充裕……[/log][wa:1700] "
1011105-128 = "― [log=네루 교복]差不多該走囉！接下來是那邊！[/log][wa:1510] "
1011105-131 = "（跟興奮的寧瑠在遊樂園玩了一整天）"
1011105-133 = "噗哈！怎麼這麼快就到關門時間了啊。"
1011105-134 = "今天真的玩得很開心。"
1011105-135 = "[s]「寧瑠能開心就好。」"
1011105-137 = "[ns]「話說，最後的休假紀念感覺怎麼樣？」"
1011105-138 = "啊啊！那當然是超級滿足！非常痛快囉！"
1011105-139 = "那麼在回到日常生活──"
1011105-143 = "──之前。"
1011105-144 = "[USERNAME]老師覺得怎麼樣呢？"
1011105-145 = "[s]「嗯？什麼意思？」"
1011105-146 = "因為這幾天我都穿著制服……"
1011105-147 = "而且用這副模樣見面的人就只有老師……"
1011105-148 = "我是覺得比想像中還好啦……老師你，你覺得……"
1011105-152 = "啊啊啊啊！說不下去了！"
1011105-156 = "[ns]「這麼突然！？」"
1011105-157 = "我只說一次，所以你要仔細聽哦！"
1011105-158 = "就是，穿著制服到處玩比想像中有趣！"
1011105-159 = "所，所以我以後也會常常穿這樣出門！"
1011105-160 = "到時候你記得要配合我一下！"
1011105-161 = "聽懂了吧！？"
1011105-162 = "[s]「嗯，嗯。」"
1011105-163 = "咳哼，聽懂了就好！"
1011105-167 = "那我們回去吧。"
1011105-168 = "休假已經結束，從明天起就得回到原本的日常囉？"

[translation]
1011105-1 = "เนรุกับสวนสนุก"
1011105-4 = "เฮ้ ครู ฉันมาแล้ว"
1011105-5 = "ชาเล่ต์ยังเป็นเหมือนเดิมเลยนะ ไม่มีอะไรเปลี่ยนไปจากคราวก่อนที่ฉันมาเลย"
1011105-6 = "[s] \"แต่ว่าชุดของเนรุเปลี่ยนไปนะ\""
1011105-7 = "ฮ่าฮ่าฮ่า! ก็จริงน่ะนะ!"
1011105-8 = "นี่อาจจะเป็นครั้งแรกเลยนะที่ฉันมาชาเล่ต์แบบไม่ได้ใส่ซูคาจันน่ะ!"
1011105-9 = "ไม่สิ นี่น่าจะเป็นครั้งแรกด้วยที่ฉันออกมานอกมิลเลเนียมโดยใส่แค่ชุดนักเรียน"
1011105-10 = "ระหว่างทางมาที่นี่ก็ไม่มีใครจำฉันได้ด้วยนะ! ชุดนี้ยังทำให้สนุกเหมือนเดิมเลยละ!"
1011105-11 = "[s] \"แต่วันนี้วันสุดท้ายแล้วไม่ใช่เหรอ?\""
1011105-12 = "อืม ฉันคงปล่อยให้ C&C ว่างอยู่ไม่ได้น่ะ"
1011105-13 = "ก็อย่างที่ฉันบอกไปใน MOMOTALK ว่าอยากหากิจกรรมอะไรทำเพื่อส่งท้ายสักหน่อย~ ก็เลยมาที่นี่น่ะ"
1011105-14 = "ครูมีไอเดียอะไรดีๆ บ้างมั้ยล่ะ?"
1011105-15 = "[s] \"กิจกรรมส่งท้ายที่น่าจดจำงั้นเหรอ...\""
1011105-17 = "[ns] \"เอาแบบนี้มั้ยล่ะ...?\""
1011105-23 = "ใบปลิวเหรอ?"
1011105-27 = "<สวนสนุกมิลเลเนียม... มาสนุกกับครอบครัว เพื่อน และคนที่คุณรักสิคะ>...?"
1011105-28 = "ใบปลิวสวนสนุกนี่นา? ที่นั่นฉันเคยไปมาก่อนด้วยนะ"
1011105-29 = "แต่ว่าการใส่ชุดนักเรียนไปสวนสนุก..."
1011105-33 = "มันก็น่าสนุกดีนะ!"
1011105-34 = "[s] \"งั้นก็ไปกันเลยมั้ย?\""
1011105-35 = "ตามใจนักเรียนจังเลยนะ!"
1011105-36 = "เพราะแบบนี้ฉันถึงได้ถูกใจครูไงล่ะ!"
1011105-38 = "ตอนนี้ไม่ค่อยมีคน งั้นก็เหมาะกับการไปเล่นสนุกดีนะ?"
1011105-39 = "ม้าหมุนอันใหม่ตรงนั้นยังแวววาวอยู่เลย ส่วนรถไฟเหาะก็เห็นว่าเพิ่งปรับปรุงใหม่ไปไม่นานด้วยนะ!"
1011105-40 = "[s] \"เนรุบอกว่าเคยมาที่นี่มาก่อนใช่มั้ย?\""
1011105-41 = "อ้อ ตอนนั้นน่ะเหรอ? มาเพราะภารกิจน่ะ"
1011105-42 = "ตอนนั้นฉันไล่ตามคนร้ายที่หนีมาถึงที่นี่ ก็เลยได้จับตัวกันอย่างวุ่นวายกลางสวนสนุกเลย"
1011105-46 = "[ns] (แบบนี้สินะถึงต้องเปลี่ยนม้าหมุนชุดใหม่...)"
1011105-47 = "ว่าแต่ครูอยากเล่นเครื่องเล่นไหนก่อนล่ะ?"
1011105-48 = "คงเป็นรถไฟเหาะใช่มั้ยล่ะ?!"
1011105-49 = "ดีละ! งั้นก็ไปลุยกันเลย!"
1011105-56 = "(แล้วคุณครูก็นั่งรถไฟเหาะกับเนรุสามรอบติด)"
1011105-58 = "เจ๋งสุดๆ ไปเลย! ตื่นเต้นจนลืมหายใจเลยละ ว่ามั้ยครู?!"
1011105-59 = "[ns] \"ครูยังเวียนหัวอยู่เลย...\""
1011105-60 = "ฮ่าฮ่า! เล่นสี่รอบติดคงไม่ไหวเนอะ!"
1011105-61 = "งั้นต่อไปไปนั่งอันนั้นมั้ยล่ะ?"
1011105-62 = "[s] \"ม้าหมุนเหรอ...?\""
1011105-63 = "อื้อ ฉันไม่เคยขี่ม้ามาก่อนเลย! ถึงจะเป็นม้าปลอม แต่มันก็น่าจะให้ความรู้สึกคล้ายๆ กันมั้ยนะ?"
1011105-64 = "แต่ถ้าครูยังเวียนหัวอยู่ก็ไม่ต้องนั่งก็ได้นะ!"
1011105-65 = "[s] \"งั้นครูขอพักอยู่ข้างนอกสักพักแล้วกัน\""
1011105-66 = "งั้นเดี๋ยวฉันกลับมานะ!"
1011105-72 = "ฮ่าฮ่า! ม้าหมุนก็สนุกใช่ย่อยเลยละ!"
1011105-73 = "ว่าไงล่ะครู เมื่อกี้เห็นฉันขี่ม้าตัวที่ใหญ่ที่สุดเลยหรือเปล่า?"
1011105-74 = "หืม? เมื่อกี้แวะไปที่อื่นมางั้นเหรอ? ไปห้องน้ำมาเหรอ?"
1011105-75 = "ไม่ได้ไปเข้าห้องน้ำ? แล้วไปไหนมาล่ะ?"
1011105-76 = "[s] \"ครูไปซื้อของขวัญมาให้เนรุน่ะ\""
1011105-77 = "ของขวัญ?"
1011105-82 = "นี่มัน... ที่คาดผมนี่นา? แล้วก็ขนมด้วย?"
1011105-83 = "ตะ... แต่ว่าที่คาดผมแบบนี้กับฉันมัน...!"
1011105-84 = "อืม..."
1011105-88 = "ถ้าเป็นฉันในปกติคงไม่ใส่ที่คาดผมแบบนี้หรอก"
1011105-89 = "แต่ว่าฉันในตอนนี้ก็ไม่ได้เป็นทั้งหัวหน้า C&C แล้วก็ไม่ได้มีโค้ดเนมดับเบิ้ลโอด้วย..."
1011105-90 = "ฮ่าฮ่า! งั้นก็ขอรับไว้ละนะ!"
1011105-93 = "― [log=네루 교복]อะฮ่าฮ่าฮ่า! ที่นี่มีทุกอย่างเลยแฮะ! ฉันถูกใจที่นี่จังเลยละ ครู![/log][wa:890] "
1011105-96 = "― [log=네루 교복]หืม? อะไรกัน? ทำไมจ้องกันขนาดนั้นเลย?[/log][wa:10] "
1011105-99 = "[ns1] \"ไม่มีอะไรหรอก แค่เนรุดูชิลมากๆ เลยน่ะ\"\n[ns2] \"เนรุในวันนี้ต่างจากปกติเลยนะ\""
1011105-102 = "― [log=네루 교복]อ๋อ~ ฉันก็นึกว่าเรื่องอะไร มันก็แน่อยู่แล้วละ[/log][wa:1910] "
1011105-105 = "― [log=네루 교복]ก็ตอนนี้ ฉันไม่ใช่ทั้ง C&C แล้วก็ไม่ใช่รุ่นพี่ในโรงเรียนด้วยนี่นา[/log][wa:1230] "
1011105-108 = "― [log=네루 교복]ที่นี่ก็ไม่มีใครที่รู้จักด้วย[/log][wa:670] "
1011105-111 = "― [log=네루 교복]ไหนจะยังไม่มีเด็กๆ ที่ฉันต้องคอยดูแลอีก แบบนี้ถือว่าดีเลยไม่ใช่เหรอ? ว่ามั้ย?[/log][wa:10] "
1011105-114 = "― [log=네루 교복]หรือว่า ครูคิดว่า...[/log][wa:1800] "
1011105-116 = "― [log=네루 교복]ฉันคนเดิมดีกว่าเหรอ?[/log]"
1011105-119 = "[ns3] \"วันนี้เป็นเนรุแบบนี้ละดีแล้ว\"\n[ns4] \"ครูเป็นผู้ปกครองให้เอง วันนี้เล่นให้สนุกเลยนะ\""
1011105-122 = "― [log=네루 교복]ฮ่าฮ่า! อื้อ กะไว้แล้วละว่าต้องพูดแบบนั้น![/log][wa:880] "
1011105-125 = "― [log=네루 교복]ถ้างั้น จะมาพูดอย่างนี้อยู่ ก็เสียดายเวลา... [/log][wa:540] "
1011105-128 = "― [log=네루 교복]งั้นเราไปต่อกันเถอะ! ต่อไปเราไปตรงโน้นกันนะ![/log][wa:310] "
1011105-131 = "(แล้วคุณครูก็เพลิดเพลินในสวนสนุกกับเนรุที่ตื่นเต้นทั้งวัน)"
1011105-133 = "ฮ่าฮ่า! หมดเวลาเล่นแล้วเหรอเนี่ย ไม่อยากจะเชื่อเลย"
1011105-134 = "วันนี้สนุกทั้งวันเลยละ"
1011105-135 = "[s] \"ถ้าเนรุสนุกครูก็ดีใจนะ\""
1011105-137 = "[ns] \"ส่งท้ายวันหยุดที่น่าจดจำครั้งนี้เป็นยังไงบ้างล่ะ?\""
1011105-138 = "อ้อ! จริงสิเนอะ! ฉันมาส่งท้ายวันหยุดนี่นา! วันนี้สนุกสุดเหวี่ยงไปเลยละ! ตอนนี้รู้สึกโล่งใจแล้ว!"
1011105-139 = "งั้นจากนี้ก็คงต้องกลับไปสู่ชีวิตปกติ..."
1011105-143 = "แต่ก่อนจะกลับไป..."
1011105-144 = "แล้วครู [USERNAME] ล่ะ เป็นยังไงบ้าง?"
1011105-145 = "[s] \"หืม? อะไรเหรอ?\""
1011105-146 = "ก็ 2-3 วันมานี้ฉันอยู่แต่ในชุดนักเรียน..."
1011105-147 = "แล้วก็มีแต่ครูคนเดียวที่ได้เจอฉันในชุดนักเรียนแบบนี้..."
1011105-148 = "ฉันว่ามันก็ไม่ได้แย่อย่างที่คิด แล้วครูล่ะ คิดว่า..."
1011105-152 = "อ๊ากกกก! พูดต่อไม่ได้แล้ว!"
1011105-156 = "[ns] \"จู่ๆ เป็นอะไรไปน่ะ?!\""
1011105-157 = "ฉันจะบอกแค่ครั้งเดียวนะ ตั้งใจฟังให้ดีล่ะ!"
1011105-158 = "ที่ฉันจะบอกก็คือ การได้ใส่ชุดนักเรียนออกมาเที่ยวเล่นมันสนุกกว่าที่คิดเยอะเลย!"
1011105-159 = "ตะ... ต่อไปฉันจะหาโอกาสใส่ชุดนี้มาอีก!"
1011105-160 = "ตอนนั้นก็จำฉันให้ได้ แล้วมาเที่ยวเล่นด้วยกันแบบนี้อีกล่ะ!"
1011105-161 = "เข้าใจมั้ย?!"
1011105-162 = "[s] \"จ้า เข้าใจแล้วจ้า\""
1011105-163 = "อะแฮ่ม งั้นก็เป็นอันตกลง!"
1011105-167 = "งั้นเราก็กลับกันเถอะ"
1011105-168 = "วันหยุดก็หมดแค่นี้แล้ว ตั้งแต่พรุ่งนี้ไปฉันต้องกลับไปเป็นเนรุหัวหน้า C&C คนเดิมแล้วละ"

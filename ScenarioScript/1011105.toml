[translation]
1011105-1 = "Amusement Park With Neru"
1011105-4 = "Yo, Sensei. I'm here."
1011105-5 = "Schale looks like the same old, same old."
1011105-6 = "[s] \"True, but you look different.\""
1011105-7 = "Hahaha! I guess you're right!"
1011105-8 = "This is my first time coming here without the jacket, isn't it?"
1011105-9 = "In fact, I think it's the first time I've worn my school uniform this far away from Millennium."
1011105-10 = "And nobody recognized me on the way over! That's still a lot of fun."
1011105-11 = "[s] \"But did I hear you say today's the last day for that?\""
1011105-12 = "Mmm, since I can't neglect C&C."
1011105-13 = "So, like I mentioned in MomoTalk, I'm trying to think of a way to make the last day memorable."
1011105-14 = "Got any good ideas, Sensei?"
1011105-15 = "[s] \"Something to make it memorable...\""
1011105-17 = "[ns] \"...How about this?\""
1011105-23 = "A flyer?"
1011105-27 = "\"Millennium Theme Park\"? \"Bring your friends, family, or significant other\"?"
1011105-28 = "Well, I've been to the amusement park before..."
1011105-29 = "But going there in my school uniform..."
1011105-33 = "THAT sounds like fun."
1011105-34 = "[s] \"All right, let's get a move on!\""
1011105-35 = "Now that's enthusiasm!"
1011105-36 = "This is why I like you, Sensei!"
1011105-38 = "Ah, we came at the perfect time. There's not too many people here."
1011105-39 = "That merry-go-round is new and shiny, and the roller coaster's all fixed up!"
1011105-40 = "[s] \"That reminds me, you said you'd been here before.\""
1011105-41 = "Right, yeah, I was on a mission last time."
1011105-42 = "I was chasing after a criminal, who ran into the park, and I had to cause a bit of a scene to make the arrest."
1011105-46 = "[ns] \"(I bet that's why the roller coaster had to be fixed up.)\""
1011105-47 = "Anyways, Sensei, what do you want to ride first?"
1011105-48 = "Has to be that one, right? The roller coaster?!"
1011105-49 = "Nice, nice! That's the spirit!"
1011105-56 = "Neru and I rode three roller coasters in a row."
1011105-58 = "Woo, that was a rush! Right, Sensei!"
1011105-59 = "[ns] \"My head is still spinning...\""
1011105-60 = "Haha! Well, I guess the fourth one's not happening, then."
1011105-61 = "So how about next, we do..."
1011105-62 = "[s] \"The merry-go-round...?\""
1011105-63 = "Yeah! I always wanted to ride a horse. I mean, these ones are fake, but it's probably similar, right?"
1011105-64 = "Of course, if you're still dizzy, feel free to take a breather."
1011105-65 = "[s] \"I think I'll take you up on that, yeah.\""
1011105-66 = "All right, see you in a bit!"
1011105-72 = "Hah! That was fun!"
1011105-73 = "Did you see me, Sensei? I was on the biggest horse they had!"
1011105-74 = "Huh? You stepped away for a bit? Like, for a bathroom break or something?"
1011105-75 = "No? Then...where'd you go?"
1011105-76 = "[s] \"To get you a little something.\""
1011105-77 = "Like a present?"
1011105-82 = "Ooh, ice cream, and...is this a hair bow?"
1011105-83 = "I-I mean, thanks... I don't usually wear bows, but..."
1011105-84 = "Mmm..."
1011105-88 = "Well, I don't USUALLY wear them."
1011105-89 = "But since I'm not C&C's president, or Call Sign Double O today..."
1011105-90 = "Haha! Sure, why not? Thanks!"
1011105-93 = "― [log=네루 교복]Oh! Look at this, Sensei! There's so much good stuff around![/log][wa:1050] "
1011105-96 = "― [log=네루 교복]Huh? What's with that look?[/log][wa:220] "
1011105-99 = "[ns1] \"Nothing, you just seem like you're really relaxed.\"\n[ns2] \"You seem like a whole different you today, Neru.\""
1011105-102 = "― [log=네루 교복]Ah. I see. Well, of course.[/log][wa:2630] "
1011105-105 = "― [log=네루 교복]I'm not C&C, or anyone's senior, right now.[/log][wa:2110] "
1011105-108 = "― [log=네루 교복]And there's no one I know here.[/log][wa:590] "
1011105-111 = "― [log=네루 교복]I don't have anyone to look after, so this much should be fine. Right?[/log][wa:10] "
1011105-114 = "― [log=네루 교복]Unless Sensei, by any chance...[/log][wa:1360] "
1011105-116 = "― [log=네루 교복]Do you prefer the usual?[/log]"
1011105-119 = "[ns3] \"This way is good for today.\"\n[ns4] \"I'll handle the guardian role today. You have all the fun you want.\""
1011105-122 = "― [log=네루 교복]Haha! Yeah, I knew you'd say that![/log][wa:1200] "
1011105-125 = "― [log=네루 교복]Well, it's not like there's much time to spare...[/log][wa:380] "
1011105-128 = "― [log=네루 교복]Let's get going! Over there next![/log][wa:750] "
1011105-131 = "I enjoyed the amusement park with a cheerful, fun-loving Neru."
1011105-133 = "Phew! I can't believe it's already closing time."
1011105-134 = "I had so much fun today."
1011105-135 = "[s] \"I'm glad.\""
1011105-137 = "[ns] \"So how was that for a memorable last day off?\""
1011105-138 = "Ahh! Yeah, I feel great about it!"
1011105-139 = "And before I..."
1011105-143 = "...go back to normal..."
1011105-144 = "[USERNAME] Sensei, what do you think?"
1011105-145 = "[s] \"Hm? About what?\""
1011105-146 = "Well, I spent the past few days in my school uniform..."
1011105-147 = "...and you're the only person I know who's seen me like this..."
1011105-148 = "It wasn't half bad for me, but what did y-you..."
1011105-152 = "Aaaaugh, this is hard to say!"
1011105-156 = "[ns] \"Whoa, you okay?!\""
1011105-157 = "I'm going to only say this once, so listen closely!"
1011105-158 = "So, going outside in my school uniform was more fun than I expected!"
1011105-159 = "A-And I'll be doing it again sometime!"
1011105-160 = "So...read the room and hang out with me when that happens!"
1011105-161 = "Got it?!"
1011105-162 = "[s] \"G-Got it.\""
1011105-163 = "Ahem, well, good!"
1011105-167 = "Now let's get back."
1011105-168 = "The day off is over, so it's back to the routine tomorrow, yeah?"

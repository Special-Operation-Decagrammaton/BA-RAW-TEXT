[translation]
1005006-1 = "……只有這次而已。真的哦？"
1005006-2 = "白天的街道"
1005006-3 = "（帶著心菜來到了紅蘿蔔料理專賣餐廳）"
1005006-4 = "沒想到……我竟然真的來了……"
1005006-5 = "原來……真的有這種餐廳……真是太衝擊了。"
1005006-6 = "從店門口開始就是滿滿的紅蘿蔔……"
1005006-7 = "不僅窗簾畫著紅蘿蔔，樓梯也畫著紅蘿蔔……"
1005006-8 = "最過分的是招牌！本身就是一個巨大的胡蘿蔔！"
1005006-9 = "老師，現在還不遲，我們趕快離開這可怕的地方吧。"
1005006-10 = "老師一定是被邪惡的紅蘿蔔協會用怪電波還是什麼東西給洗腦了！"
1005006-11 = "我會保護你的，老師！請相信我！"
1005006-15 = "（帶著微笑抓住心菜的手臂，走進餐廳）"
1005006-16 = "放開我！請放開我！你要把淑女抓去哪裡！"
1005006-17 = "護送？我才不要這種護送！"
1005006-18 = "嗚哇啊啊啊！"
1005006-20 = "餐廳內"
1005006-21 = "沒想到……真的所有料理都有加紅蘿蔔……"
1005006-22 = "請問兩位要點什麼呢？"
1005006-23 = "點什麼？唔……"
1005006-24 = "請問他吧。"
1005006-25 = "[s]「由我來點嗎？」"
1005006-26 = "是你把我帶到這裡來的。"
1005006-27 = "所以要吃什麼就交給老師決定。"
1005006-28 = "……反正不管點哪道都會有紅蘿蔔，一定都不好吃。"
1005006-30 = "（一邊笑著一邊點了最推薦的餐點）"
1005006-31 = "（沒等多久，料理就送上來了）"
1005006-33 = "[ns]「我要開動了！」"
1005006-34 = "我要開動了……唔唔……"
1005006-35 = "（心菜一臉不情願地將紅蘿蔔塞入口中）"
1005006-36 = "（接著……！）"
1005006-37 = "咦……？這個味道……？"
1005006-38 = "好甜！而且……好軟、好香！"
1005006-39 = "這是怎麼回事？這真的是紅蘿蔔嗎？"
1005006-40 = "原來如此……是先透過蒸煮的方式引出紅蘿蔔的甜味，然後再用奶油拌炒。"
1005006-41 = "你說這次叫我沾醬汁吃吃看？……我知道了。"
1005006-42 = "好像變得更香醇了！怎麼會這樣……"
1005006-45 = "― 那個……[wa:1440] "
1005006-47 = "― 這不代表我已經喜歡上紅蘿蔔了哦。[wa:2460] "
1005006-50 = "― 只是既然都跟老師一起來了，[wa:2320] "
1005006-52 = "― 身為一名優秀的教官，不得不吃而已。[wa:2180] "
1005006-55 = "― 明白了嗎？"
1005006-57 = "― 真是的，老師總是愛強迫人……[wa:1480] "
1005006-60 = "― 如果碰到無論如何[wa:1120] "
1005006-62 = "― 都得吃紅蘿蔔的情況……[wa:1340] "
1005006-65 = "― 從下次開始，"
1005006-67 = "― 我會到這裡來。"
1005006-70 = "― 畢竟是和老師一起來過的店，[wa:1990] "
1005006-72 = "― 這也是一部分原因……[wa:520] "
1005006-75 = "― 聽懂了嗎？沒有喜歡上哦？[wa:1800] "
1005006-77 = "― 明白嗎？"
1005006-80 = "― 不過……[wa:1450] "
1005006-82 = "― 紅蘿蔔，或許也沒有那麼糟。[wa:2480] "
1005006-85 = "好不容易全部吃完了……"
1005006-86 = "[s]「有滿足嗎？」"
1005006-87 = "雖然不想承認……但真的很好吃。"
1005006-88 = "請給我記住，這次是老師讓我中計的。"
1005006-89 = "我下次一定會加倍奉還的！"
1005006-90 = "所以……請你下次也要陪我出來。"
1005006-91 = "知道了嗎？"

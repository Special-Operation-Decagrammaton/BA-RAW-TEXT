[translation]
1005006-1 = "...Just This Once, Really!"
1005006-2 = "Downtown"
1005006-3 = "Kokona and I arrived at the carrot restaurant."
1005006-4 = "I can't believe you actually brought me here."
1005006-5 = "Or that a carrot restaurant is even a thing..."
1005006-6 = "Whoa. They REALLY like carrots, don't they? "
1005006-7 = "They have carrots on the curtains, the stairs..."
1005006-8 = "Even the sign is a giant carrot!"
1005006-9 = "Sensei, we don't have to do this. It's not too late to leave."
1005006-10 = "In fact, you're so determined that I'm starting to worry you've been brainwashed by Big Carrot!"
1005006-11 = "That's it! You've been brainwashed! Don't worry, Sensei! I'll save you!"
1005006-15 = "I laughed and reassured Kokona as we entered the restaurant together."
1005006-16 = "Wait! Wait!!! Please don't make me go in there! You can't do this to a proper lady!"
1005006-17 = "I know you're trying to be nice, but really—"
1005006-18 = "Waaaahhhh!"
1005006-20 = "Carrotopia"
1005006-21 = "Ugh. Literally EVERY dish has carrots in it."
1005006-22 = "What would you like?"
1005006-23 = "Umm..."
1005006-24 = "You should order, Sensei."
1005006-25 = "[s] \"Who, me?\""
1005006-26 = "You brought me here, which means you know what's good."
1005006-27 = "So you should order for both of us."
1005006-28 = "I'll hate it no matter what, but at least I'd only kind of hate it."
1005006-30 = "I smiled to myself and then ordered from the secret menu."
1005006-31 = "The food came out quickly."
1005006-33 = "[s] \"Dig in!\""
1005006-34 = "Okay... Ugh..."
1005006-35 = "Kokona reluctantly raised her fork to her mouth."
1005006-36 = "She chewed for a moment. Then..."
1005006-37 = "It's so..."
1005006-38 = "Sweet! And somehow savory at the same time? And it's soft!"
1005006-39 = "There's no way this is a carrot!"
1005006-40 = "So they steamed them to maintain the sweetness and fried them in butter... Huh!"
1005006-41 = "You want me to try this sauce? Okay..."
1005006-42 = "Oooh! It's so tasty!"
1005006-45 = "― But...[wa:1360] "
1005006-47 = "― Just so you know...I still hate carrots.[wa:1500] "
1005006-50 = "― I'm just eating them for you...[wa:1600] "
1005006-52 = "― ...and because I'm an instructor. It's not because I want to.[wa:420] "
1005006-55 = "― Understand?"
1005006-57 = "― It's not my fault you're so stubborn.[wa:560] "
1005006-60 = "― I guess...[wa:1040] "
1005006-62 = "― If I absolutely have to eat them—[wa:460] "
1005006-65 = "― Carrots, I mean..."
1005006-67 = "― I'll come here."
1005006-70 = "― This is the first place I ever visited with you.[wa:590] "
1005006-72 = "― So it's special now.[wa:120] "
1005006-75 = "― Know what I mean? It's not the carrots. It's the company.[wa:10] "
1005006-77 = "― Okay?"
1005006-80 = "― Anyway...[wa:1250] "
1005006-82 = "― I guess... Carrots aren't as bad as I thought.[wa:1160] "
1005006-85 = "I ate the whole serving!"
1005006-86 = "[s] \"And? How was it?\""
1005006-87 = "It was...good."
1005006-88 = "I guess you proved me wrong...this time."
1005006-89 = "But someday I'll get you back for making me eat carrots."
1005006-90 = "Which means you have to hang out with me again."
1005006-91 = "Okay?"

[translation]
1005006-1 = "แค่ครั้งนี้ครั้งเดียวจริงๆ นะคะ?"
1005006-2 = "ในตัวเมือง"
1005006-3 = "(มาถึงร้านอาหารแคร์รอตชื่อดังกับโคโคน่า)"
1005006-4 = "มาถึงซะแล้ว... เหลือจะเชื่อเลย..."
1005006-5 = "มีร้านอาหารแบบนี้อยู่จริงๆ ด้วยสินะคะ... ช็อกโลกสุดๆ เลยค่ะ"
1005006-6 = "ดูตกแต่งเป็นงานฉลองแคร์รอตตั้งแต่ทางเข้าเลย... "
1005006-7 = "ลวดลายบนผ้าม่านหน้าต่างก็เป็นลายแคร์รอต บันไดก็ยังวาดเป็นลายแคร์รอตอีก..."
1005006-8 = "แถมยังมีป้ายแคร์รอตยักษ์ตรงทางเข้าอีกด้วยค่ะ!"
1005006-9 = "คุณครูคะ ตอนนี้ยังไม่สายนะคะ เรารีบออกไปจากที่ที่น่ากลัวนี้กันเถอะค่ะ"
1005006-10 = "คุณครูจะต้องถูกพวกลัทธิบูชาแคร์รอตจอมชั่วร้ายล้างสมองมาแน่ๆ เลยสินะคะ!"
1005006-11 = "ฉันจะปกป้องคุณครูเองค่ะ เชื่อที่ฉันบอกเถอะนะคะ!"
1005006-15 = "(คุณครูอดขำกับสิ่งที่โคโคน่าพูดไม่ได้ และจากนั้นก็คว้าแขนเธอให้เดินตามเข้าไปในร้านอาหาร)"
1005006-16 = "ปล่อยนะคะ ปล่อยฉันสิคะ! จะมาลากผู้หญิงน่ารักๆ อย่างฉันไปไหนคะ!"
1005006-17 = "หวังดีงั้นเหรอคะ? แบบนี้มันไม่เรียกว่าหวังดีแล้วค่ะ!"
1005006-18 = "มุแงงงง~!"
1005006-20 = "ร้านอาหารแครอเปีย"
1005006-21 = "ทุกเมนูมีแคร์รอตผสมอยู่ด้วย..."
1005006-22 = "จะสั่งอาหารเลยมั้ยครับ?"
1005006-23 = "สั่งอาหารเหรอคะ อืม..."
1005006-24 = "เดี๋ยวให้ทางนั้นสั่งก็แล้วกันค่ะ"
1005006-25 = "[s] \"ครูน่ะเหรอ?\""
1005006-26 = "ก็คุณครูลากฉันมาที่นี่นี่คะ"
1005006-27 = "เพราะงั้นคุณครูก็สั่งอาหารให้ด้วยนะคะ"
1005006-28 = "ไม่ว่าจะสั่งเมนูไหนก็เป็นแคร์รอตอยู่ดี... มันคงจะไม่อร่อยอยู่แล้วละค่ะ"
1005006-30 = "(คุณครูขำเบาๆ และเลือกสั่งเมนูลับของทางร้าน)"
1005006-31 = "(ไม่นานนักเมนูที่สั่งก็มาเสิร์ฟ)"
1005006-33 = "[ns] \"จะกินให้อร่อยเลยนะ!\""
1005006-34 = "จะกินให้อร่อยเลยนะคะ... ฮือ..."
1005006-35 = "(โคโคน่าตักแคร์รอตเข้าปากอย่างไม่เต็มใจ)"
1005006-36 = "(และแล้ว...!)"
1005006-37 = "เอ๋...? รสชาติมัน...?"
1005006-38 = "หวานจังเลยค่ะ! แถมยังนุ่มมาก กลมกล่อมมากเลยค่ะ!"
1005006-39 = "ทำไมถึงเป็นแบบนี้ได้คะ? นี่แคร์รอตจริงๆ เหรอคะ?"
1005006-40 = "อ๋า... เอาแคร์รอตไปนึ่งอย่างถูกวิธีเพื่อรักษารสหวานเอาไว้ แล้วก็เอาไปผัดกับเนยงั้นเหรอคะ?"
1005006-41 = "คราวนี้ให้ลองจิ้มซอสกินดูเหรอคะ?"
1005006-42 = "อร่อยละลายในปากเลยค่ะ! ไม่อยากเชื่อเลย..."
1005006-45 = "― แต่ถึงยังไง...[wa:1040] "
1005006-47 = "― เรื่องที่ฉันไม่ชอบแคร์รอตก็ไม่เปลี่ยนไปหรอกนะคะ[wa:1220] "
1005006-50 = "― แต่เพราะว่าวันนี้มากับคุณครู[wa:1720] "
1005006-52 = "― และฉันก็เป็นผู้ฝึกสอน เลยต้องกินอย่างหลีกเลี่ยงไม่ได้ค่ะ[wa:620] "
1005006-55 = "― เข้าใจมั้ยคะ?"
1005006-57 = "― คุณครูนี่จริงๆ เลย ชอบบังคับกันอยู่เรื่อย...[wa:280] "
1005006-60 = "― ถ้าหากว่า...[wa:960] "
1005006-62 = "― ถ้าเกิดต้องกินแคร์รอตละก็...[wa:660] "
1005006-65 = "― คราวหน้า..."
1005006-67 = "― ฉันจะมาที่นี่ค่ะ"
1005006-70 = "― ก็ที่นี่เป็นที่แรกที่ฉัน...[wa:1430] "
1005006-72 = "― ได้มากับคุณครูนี่นา...[wa:40] "
1005006-75 = "― เข้าใจมั้ยคะ? ไม่ใช่เพราะว่าชอบหรอกนะคะ[wa:720] "
1005006-77 = "― เข้าใจใช่มั้ยคะ?"
1005006-80 = "― แต่ก็นะ...[wa:1210] "
1005006-82 = "― แคร์รอต...มันก็ไม่ได้เลวร้ายเท่าไรหรอกค่ะ แฮะๆ[wa:1160] "
1005006-85 = "สุดท้ายก็กินหมดจนได้นะคะ..."
1005006-86 = "[s] \"แล้วเป็นไงบ้าง ชอบรึเปล่า?\""
1005006-87 = "ถึงจะโกรธนิดๆ... แต่มันก็อร่อยดีค่ะ "
1005006-88 = "ครั้งนี้มันเรื่องสุดวิสัยที่เลี่ยงไม่ได้ จำไว้ด้วยนะคะ"
1005006-89 = "คราวหน้าฉันจะเอาคืนจากคุณครูให้ดูเลยค่ะ!"
1005006-90 = "เพราะงั้นคราวหน้า... ช่วยมาด้วยกันอีกนะคะ"
1005006-91 = "เข้าใจมั้ยคะ?"

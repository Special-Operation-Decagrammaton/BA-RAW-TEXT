[translation]
10009010-1 = "ตอนที่ 1;การจู่โจมครั้งที่ 1!"
10009010-2 = "ใกล้ถนนใหญ่ในย่านการค้าเขต D.U."
10009010-4 = "อืม... ถึงจะลาดตระเวนอยู่แต่ไม่รู้สึกว่าจะมีศพ..."
10009010-5 = "ไม่สิ ไม่พบผู้บาดเจ็บเลยนะคะ"
10009010-6 = "[s] \"คือ...เซนะไม่ได้รู้สึกเสียดายอยู่ใช่มั้ย?\""
10009010-7 = "คะ? เข้าใจผิดแล้วค่ะ คุณครู ฉันไม่เคยเห็นศพ..."
10009010-8 = "เอ่อ... ไม่เคยเห็นผู้บาดเจ็บเป็นเรื่องสนุกหรอกนะคะ ฉันไม่เคยคิดแบบนั้นเลยค่ะ..."
10009010-9 = "ไม่สิ อาจมีเคยคิดบ้างนิดหน่อยก็เถอะ"
10009010-10 = "[s] \"เคยคิดบ้างงั้นเรอะ!!\""
10009010-11 = "แต่ว่า... การที่ไม่เกิดเหตุวุ่นวายอะไรขี้นอีกในงานเทศกาลแบบนี้ก็นับว่าโชคดีนะคะ#nฉันคิดแบบนั้นจริงๆ ค่ะ"
10009010-12 = "พอคิดถึงรายละเอียดภารกิจของชมรมฉันแล้ว การไม่มีภารกิจให้ทำอาจเรียกได้ว่าขณะนี้บริเวณ#nรอบๆ อยู่ในความสงบสุขอยู่ค่ะ"
10009010-13 = "[s] \"เซนะนี่ขยันจริงๆ เลยนะ...\""
10009010-14 = "ค่ะ ถึงจะแอบเสียดายอยู่นิดๆ ก็เถอะค่ะ"
10009010-15 = "[s] \"ว่าแล้วเชียว เสียดายอยู่จริงๆ ด้วย!\""
10009010-17 = "(คุณครูพูดคุยกับเซนะไปเรื่อยๆ จนเดินมาถึงสุดเขตบริเวณริมถนนใหญ่)"
10009010-22 = "ค่ะ เท่านี้การรีบูตระบบความปลอดภัยในงานก็เสร็จเรียบร้อยแล้วค่ะ"
10009010-23 = "ต่อให้เกิดเรื่องวุ่นวายในภายหลัง ระบบก็จะทำงานได้ เพราะงั้นหายห่วงได้เลยค่ะ"
10009010-24 = "ขอบคุณมากครับ! สมกับเป็นทางเวอริทัสจริงๆ เลย! เท่านี้ก็คงไม่ต้องห่วงเรื่องเหตุการณ์ต่างๆ ไปได้อีกสักระยะแล้วล่ะครับ!"
10009010-25 = "อา... ไม่เป็นไรหรอกค่ะ"
10009010-29 = "ถ้างั้นขอตัวก่อนนะคะ"
10009010-30 = "[s] \"อ๊ะ จิฮิโระ\""
10009010-31 = "หืม? คุณครู...?"
10009010-32 = "นั่นเด็กจากโรงเรียนเกเฮนน่าเหรอ? "
10009010-33 = "ดูเป็นกลุ่มที่หาได้ยากจริงๆ นะ แล้วมีอะไรเหรอ? ถึงมาอยู่กันสองต่อสองในวันวาเลนไทน์แบบนี้..."
10009010-34 = "อา... จริงๆ ก็พอจะเดาได้อยู่ล่ะนะ"
10009010-35 = "ฉันมาลาดตระเวนกับคุณครูค่ะ"
10009010-36 = "หลักๆ ก็เพื่อตรวจสอบศพ"
10009010-37 = "ศะ...ศพ? ตรวจสอบ? นี่กำลังทำเรื่องผิดกฎหมายอยู่รึไง?"
10009010-38 = "[s] \"เปล่าสักหน่อย! แค่มาลาดตระเวนงานเทศกาลเฉยๆ! แล้วจิฮิโระล่ะ?!\" "
10009010-39 = "ข้ออ้างข้างๆ คูๆ..."
10009010-40 = "ถึงจะไม่รู้ว่าเพราะอะไร แต่ก็คงจะมีเหตุผลอยู่สินะ "
10009010-41 = "ส่วนฉัน... ก็ไม่มีอะไรมากหรอก แค่มาตรวจสอบระบบกับอุปกรณ์รักษาความปลอดภัยของงาน#nเทศกาลตามที่ทางโรงเรียนวัลคิรี่ขอมาน่ะ"
10009010-42 = "ฉันมาตรวจสอบว่าอุปกรณ์สื่อสารที่ติดตั้งอยู่ที่งานเทศกาลมมีการเสื่อมสภาพรึเปล่า แล้วก็ตรวจ#nสอบว่าเซ็นเซอร์รักษาความปลอดภัยกับพวกสปริงเคิลที่ใช้ระบบควบคุมมีปัญหาอะไรบ้างรึเปล่า... "
10009010-43 = "เนื่องจากเป็นงานเทศกาลที่มีคนพลุกพล่าน เลยมีหลายอย่างที่ต้องตรวจสอบให้ดีน่ะ"
10009010-44 = "[s] \"จิฮิโระก็ทำงานหนักมากเลยนะ\""
10009010-45 = "ไม่ได้หนักหนาอะไรหรอก..."
10009010-46 = "งานนี้เป็นคำขออย่างเป็นทางการมาให้เวอริทัส และในตอนที่หัวหน้าฮิมาริไม่อยู่แบบนี้ ฉันก็จะทำงานแบบขอไปทีไม่ได้ยังไงล่ะ"
10009010-47 = "แล้วอีกอย่างวันนี้น่ะ... เป็นวันวาเลนไทน์ด้วยนี่นา"
10009010-48 = "วันพิเศษแบบนี้ ฉันก็แค่พยายามเต็มที่เพื่อให้ผ่านวันแบบนี้ไปได้อย่างปลอดภัยก็เท่านั้น ไม่มีอะไรหรอก"
10009010-49 = "[s] \"อื้อ แต่ยังไงจิฮิโระก็สุดยอดอยู่ดีล่ะนะ\""
10009010-50 = "จริงๆ เลย... ไม่ใช่แบบนั้นสักหน่อย..."
10009010-51 = "แต่ไหนๆ ก็เป็นแบบนี้แล้ว เมื่อกี้คุณครูบอกว่าอยู่ระหว่างลาดตระเวนใช่มั้ย?"
10009010-55 = "ถ้างั้นเดินไปจนถึงจุดที่ต้องตรวจสอบอุปกรณ์ความปลอดภัยจุดถัดไปด้วยกันหน่อยได้รึเปล่าล่ะ?"
10009010-56 = "ค่ะ ศพต่อไป..."
10009010-57 = "ไม่สิ อาจมีผู้บาดเจ็บอยู่ก็ได้ พวกเรารีบไปตรวจสอบกันต่อเถอะค่ะ"
10009010-58 = "คือว่า... ไม่ได้ทำเรื่องอะไรที่ผิดกฎหมายอยู่จริงๆ ใช่มั้ย?"
10009010-59 = "[s] \"เข้าใจผิดแล้วล่ะ!\""
10009010-62 = "หาววว... การคุมตัวคนร้ายไปส่งนี่น่าเบื่อจริงๆ เลย"
10009010-63 = "ฟุบุกิ! ถ้าเอื่อยเฉื่อยแบบนี้แล้วถูกหัวหน้ากรมฯ จับได้อาจถูกบ่นจนหูชาอีกก็ได้นะคะ"
10009010-64 = "ช่างเหอะน่า~ คิริโนะนั่นล่ะที่จริงจังเกินไปแล้วนะ"
10009010-65 = "อะ...อืม แต่ว่า... พอคิดว่าคนที่ถูกคุมตัวไปส่งตอนนี้เป็นใคร มันก็อดไม่ได้..."
10009010-66 = "กังวลมากเกินไปรึเปล่า?"
10009010-67 = "อาจจะกังวลน้อยเกินไปด้วยซ้ำค่ะ"
10009010-68 = "ยังไงก็เป็นหนึ่งในเจ็ดอาชญากรที่หลบหนีจากห้องคุมขัง แถมยังเป็นคนที่ร้ายกาจที่สุด..."
10009010-70 = "<จิ้งจอกแห่งความพินาศ> เลยนะคะ!"
10009010-71 = "ฉันยังได้ยินมาอีกนะคะว่าเธอยุยงปลุกปั่นพวกเด็กเกเร และยังสร้างความโกลาหลให้กับทาง#nองค์การนักเรียนได้ด้วยตัวคนเดียวด้วยนะคะ!"
10009010-73 = "ก็นะ ตอนนั้นทางองค์การนักเรียนเองก็กำลังวุ่นวายอยู่เพราะเรื่องที่ประธานหายตัวไปด้วย เรื่องนั้นมันช่วยไม่ได้นี่นา"
10009010-74 = "อืม แต่ก็วางใจไม่ได้หรอกนะคะ ก็เคยได้ยินข่าวลือแบบนี้มาเยอะแยะเลยนี่นา"
10009010-75 = "ข่าวลืองั้นเหรอ?"
10009010-76 = "เรื่องที่จิ้งจอกแห่งความพินาศน่ะเจ้าเล่ห์และโหดร้ายมากๆ...!"
10009010-77 = "เธอมีพรสวรรค์อันร้ายกาจ อย่างการทำให้คนที่เข้าไปพูดคุยด้วยหลงเสน่ห์ และทำตามคำพูดของเธอด้วยค่ะ!"
10009010-81 = "เดี๋ยวนะ... นี่ดูการ์ตูนมากไปรึเปล่า"
10009010-82 = "ใจเย็นๆ ก่อนเถอะ คิริโนะ ไม่ต้องไปกังวลเรื่องไร้สาระพวกนั้นหรอก"
10009010-83 = "คะ?"
10009010-84 = "นอกจากคนของสำนักรักษาความปลอดภัยของเราแล้ว ที่นี่ยังมีพวกคนจากสำนักความมั่นคงมา#nลาดตระเวนอยู่ด้วยไม่ใช่เหรอ?"
10009010-85 = "หลังจากจับกุมตัวได้แล้ว คงถูกยึดทุกอย่างนอกจากเสื้อผ้าสวยๆ กับหน้ากากนั่นไปแล้วล่ะมั้ง ถึงจะเป็นจิ้งจอกแห่งความพินาศก็เถอะ แต่ก็คงจะหนีไปจากที่นี่ไม่ได้หรอกนะ"
10009010-86 = "ฮ่าฮ่า... นอกจากจะใช้เวทมนตร์ได้ ก็คงเป็นไปไม่ได้หรอก..."
10009010-90 = "เอ๋...?"
10009010-91 = "ปะ...เป็นอย่างที่พูดแล้วละค่ะ! ฟุบุกิ!"
10009010-97 = "เกิดอุบัติเหตุอีกแล้วเหรอ?"
10009010-98 = "อะไรนะ จู่ๆ ก็เกิดเหตุระเบิดงั้นเหรอ มีท่อแก๊สระเบิดที่ไหนน่ะ?"
10009010-99 = "[s] \"เดี๋ยวก่อนนะ นี่มันไม่ใช่ระเบิดธรรมดาๆ แล้ว...\""
10009010-103 = "รายงานข่าวด่วนค่ะ! รถบัสที่ใช้เป็นพาหนะส่งตัวอาชญากรไปยังห้องคุมขังเกิดระเบิดขึ้น!"
10009010-104 = "นอกจากนี้เรายังได้รับแจ้งว่ามีกลุ่มเด็กมีปัญหาจำนวนมากกำลังก่อความวุ่นวายอยู่ในขณะนี้ค่ะ!"
10009010-110 = "คุณครู? ตอนนี้อยู่ไหนน่ะ? "
10009010-111 = "[s] \"ฟุบุกิ...?\""
10009010-112 = "จิ้งจอกแห่งความพินาศหนีไปแล้ว! นอกจากนี้พวกกลุ่มเด็กมีปัญหาได้ยึดเอาอุปกรณ์#nและรถหุ้มเกราะของสถาบันฝึกตำรวจวัลคิรี่ไปแล้วด้วย...!"
10009010-113 = "เพราะงั้น... มาช่วยหน่อยสิ! คุณครู!"
10009010-114 = "ถ้าปล่อยให้เหตุการณ์ลุกลามโดยไม่ทำอะไร คงไม่จบแค่เขียนหนังสือขอโทษแน่ๆ อาจถึงขั้นถูกตัดวันหยุดเลยก็ได้นะ...!"
10009010-115 = "อ๊ะ! อีกอย่างทิศทางที่จิ้งจอกแห่งความพินาศหนีไปน่ะ...!"
10009010-121 = "[ns] \"ไม่ต้องบอกก็รู้แล้วล่ะ...\""
10009010-123 = "ฮุฮุฮุ... กลิ่น... ค่ะ... ได้กลิ่นแล้วละค่ะ..."
10009010-127 = "เหยื่อที่เคยเล็งเอาไว้แล้ว... ฉันไม่มีทางปล่อยให้หลุดรอดไปได้เด็ดขาดค่ะ!"

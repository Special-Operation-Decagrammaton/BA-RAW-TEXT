10009010-32 = "3;치히로;00;그 아이는 게헨나의 학생? \n#3;m3\n#1;dl"
10009010-33 = "3;치히로;99;……이건 또 보기 드문 조합이네. 무슨 일이야? 발렌타인 데이에 단둘이라니…….\n#3;em;…"

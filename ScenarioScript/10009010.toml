10009010-4 = "4;세나;99;흐음, 순찰은 하고 있습니다만 좀처럼 시체…….\n#4;a\n#4;em;…"
10009010-5 = "4;세나;01;아니, 부상자가 나올 낌새는 없는 듯하군요."
10009010-6 = "[s] \"저기, 세나, 방금 아쉬워한 거 아니지?\""
10009010-7 = "4;세나;02;네? 오해입니다. 선생님. 결코 흥미 본위로 시체……\n#4;em;[?]\n#4;m3"

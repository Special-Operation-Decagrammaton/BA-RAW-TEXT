10009010-36 = "1;세나;99;주로 시체의 확보를 위해."
10009010-37 = "3;치히로;02;……시, 시체? 확보? 대체 무슨 불법적인 일을 하고 있는 거야?\n#3;em;[땀]\n#3;stiff"
10009010-38 = "[s] \"아냐! 축제 순찰을 돌고 있었을 뿐이야! 그보다 치히로는?!\""
10009010-39 = "3;치히로;99;필사적인 변명……."
10009010-40 = "3;치히로;01;뭔지는 몰라도 사연이 있단 거네."
10009010-41 = "3;치히로;02;나는……. 뭐, 별건 아니고. 발키리 학원의 의뢰로 축제 현장의 시스템 장비나 시큐리티를 체크 및 보수하고 있었어.\n#3;em;[반응]\n#3;m3\n#1;dl"
10009010-42 = "3;치히로;01;현장에 설치된 통신 중계기 중에 노후화된 장비는 없는지. 시스템으로 제어되는 경비 센서나 스프링클러 같은 안전장치엔 문제가 없는지-"
10009010-43 = "3;치히로;02;사람이 복작거리는 시끄러운 축제인 만큼, 체크해두지 않으면 안 될 게 산더미니까."

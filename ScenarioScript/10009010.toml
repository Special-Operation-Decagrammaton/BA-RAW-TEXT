10009010-10 = "[s] \"한 거냐!!\""
10009010-11 = "4;세나;02;……하지만, 축제의 열기 속에서 별다른 소동이 없다면, 그 자체로 다행이구나. 하고 생각하는 것도 사실입니다.\n#4;em;…"

[translation]
10009010-1 = "Episode 1;The First Assault!"
10009010-2 = "D.U. Central Street"
10009010-4 = "Hmm. We've been patrolling for a while now, but have yet to spot any dead bodies."
10009010-5 = "Sorry. I meant to say wounded."
10009010-6 = "[s] \"Why do you sound so disappointed?\""
10009010-7 = "Please don't misunderstand. Naturally, I don't wish to see any dead bodies."
10009010-8 = "I mean, I don't want to see anyone be harmed..."
10009010-9 = "Well. Perhaps I do have a morbid curiosity."
10009010-10 = "[s] \"See! I was right!\""
10009010-11 = "However, I'm being sincere when I say I don't want anyone to be harmed."
10009010-12 = "After all, the nature of our club means that when there's no work,#nthere's peace."
10009010-13 = "[s] \"It sounds like you've put a lot of thought into this.\""
10009010-14 = "Yes, but that doesn't mean I cannot still be disappointed."
10009010-15 = "[s] \"We're right back to square one!\""
10009010-17 = "Sena and I kept chatting as we reached the end of the street."
10009010-22 = "Security system reboot complete."
10009010-23 = "There shouldn't be any issues now."
10009010-24 = "Thank you so much! You Veritas students are the best.#nNow we'll be ready for anything."
10009010-25 = "You're welcome..."
10009010-29 = "I'll be going, then."
10009010-30 = "[s] \"Hey, Chihiro.\""
10009010-31 = "Hmm? Sensei?"
10009010-32 = "Who's this you're with? A student from Gehenna? "
10009010-33 = "The two of you make for an unexpected combination on Valentine's Day."
10009010-34 = "That must mean..."
10009010-35 = "I'm patrolling the festivities with Sensei."
10009010-36 = "My duty is to keep an eye out for dead bodies."
10009010-37 = "Dead bodies...? Is this patrol sanctioned?"
10009010-38 = "[s] \"It's just a regular security patrol...! What about you, Chihiro?\""
10009010-39 = "Denying it so vehemently only makes you sound all the more suspicious..."
10009010-40 = "...but if you say so. "
10009010-41 = "As for me, I was asked to check security systems around the festival at Valkyrie's request."
10009010-42 = "I'll be updating any out-of-date equipment and making sure things such as sensors and sprinkler systems are still compliant. "
10009010-43 = "A lot of work goes into making sure large gatherings like this are safe for everyone involved."
10009010-44 = "[s] \"Sounds like you have a lot on your plate.\""
10009010-45 = "It's nothing I can't handle."
10009010-46 = "Besides, it was a formal request made directly to Veritas.#nI have to pick up the slack now that President Himari has taken a leave of absence."
10009010-47 = "Besides, it's Valentine's Day, isn't it?"
10009010-48 = "It's only natural I would want everyone to enjoy it."
10009010-49 = "[s] \"You're something else, Chihiro.\""
10009010-50 = "You don't have to flatter me..."
10009010-51 = "So, you said you're on some kind of patrol?"
10009010-55 = "I have more security systems I still need to check.#nWould you like to come with?"
10009010-56 = "I don't see why not. There could be dead bodies waiting to be discovered."
10009010-57 = "I mean, injured people who need our help."
10009010-58 = "Right... Are you sure you two aren't up to something illegal?"
10009010-59 = "[s] \"I swear!\""
10009010-62 = "*yawn* Escorting criminals is as boring as it gets."
10009010-63 = "Fubuki! You're going to get chewed out if the captain catches you yawning like that!"
10009010-64 = "You worry too much. Try to loosen up a little."
10009010-65 = "I-I do not...and try to remember just who it is we're escorting."
10009010-66 = "See? Worrying too much, just like I said."
10009010-67 = "I'm just being cautious, like I should be."
10009010-68 = "I mean, we're dealing with one of the infamous seven criminals who managed to escape from the Corrections Bureau..."
10009010-70 = "...the Fox of Calamity!"
10009010-71 = "I heard she even rounded up other troublemakers after she escaped to launch an attack on the General Student Council! Even they had trouble dealing with her."
10009010-73 = "Wasn't that just because they were preoccupied after the General Student Council president went missing?"
10009010-74 = "Still, we shouldn't let our guard down—not if the rumor I heard the other day is true."
10009010-75 = "What rumor?"
10009010-76 = "They say the Fox of Calamity is so wicked and vicious..."
10009010-77 = "...that she can bewitch anyone she comes in contact with and make them do as she says!"
10009010-81 = "You've been watching too much anime."
10009010-82 = "Try relaxing a little. You really ARE a worrywart."
10009010-83 = "Am I?"
10009010-84 = "Think about it. Not only are we here, but so is the Security Bureau."
10009010-85 = "After she was arrested, she was relieved of everything in her possession except for the clothes on her back and that mask of hers.#nEven the Fox of Calamity can't escape without a weapon."
10009010-86 = "It'd be totally impossible unless she was made of magic or someth—"
10009010-90 = "What was that?"
10009010-91 = "You and your big mouth!"
10009010-97 = "Was that an explosion...?"
10009010-98 = "Maybe a pipe burst somewhere?"
10009010-99 = "[s] \"Something tells me we're not that lucky...\""
10009010-103 = "This just in! Moments ago, a Valkyrie police van escorting a criminal to the Corrections Bureau suddenly exploded!"
10009010-104 = "As we speak, a number of gangs have taken advantage of the situation to cause chaos!"
10009010-110 = "Sensei, come in! "
10009010-111 = "[s] \"Fubuki?\""
10009010-112 = "That was the Fox of Calamity escaping just now. She's mobilized the gangs to steal an armored car and weapons from Valkyrie Police School!"
10009010-113 = "We need your help, Sensei!"
10009010-114 = "If we don't catch her, then it'll be a lot worse than having to write an apology letter—I might have my vacation days cut!"
10009010-115 = "She was last seen heading toward—"
10009010-121 = "[ns] \"I think I found her.\""
10009010-123 = "Heehee... I know this scent."
10009010-127 = "I never let my prey get away once I've set my eyes on it!"

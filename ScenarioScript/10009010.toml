[translation]
10009010-1 = "第1話;襲擊之一"
10009010-2 = "D.U.中心大道邊"
10009010-4 = "嗯。看來似乎不會出現屍……"
10009010-5 = "不，是不會出現傷患呢。"
10009010-6 = "[s]「真是件好事呢……」"
10009010-7 = "……是呢，確實如此。#n姑且向老師說一聲，我絕對不是出於興趣而想見到屍……"
10009010-8 = "想見到傷患……"
10009010-9 = "不，其實有點想見到。"
10009010-10 = "[s]「真率直啊……」"
10009010-11 = "……但是，難得的活動裡沒有什麼比無事發生更好，這個想法也是真的。"
10009010-12 = "以我們社團的性質來看，沒有發揮的機會就代表著和平。"
10009010-13 = "[s]「瀬奈真認真呢。」"
10009010-14 = "……雖然還是覺得有點可惜。"
10009010-15 = "[s]「這樣啊……」"
10009010-17 = "（就這樣和瀬奈你一言我一語，到了大道盡頭時……）"
10009010-22 = "……安全系統重新啟動，OK。"
10009010-23 = "這樣應該就能順利運作了。"
10009010-24 = "謝謝你！動作真快呢，不愧是貝里塔斯！這樣我就放心了……！"
10009010-25 = "不用客氣。"
10009010-29 = "那我就先告辭了。"
10009010-30 = "[s]「啊，千尋。」"
10009010-31 = "咦，老師？"
10009010-32 = "那孩子是……格黑娜的？"
10009010-33 = "在做什麼呢？在情人節兩人獨處就代表……"
10009010-34 = "啊，該怎麼說才好呢。那個……"
10009010-35 = "我和老師正在巡邏。"
10009010-36 = "為了獲得屍體。"
10009010-37 = "獲，獲得屍體……？到底在做什麼不法行為？"
10009010-38 = "[s]「只是普通的巡邏而已……千尋你呢？」"
10009010-39 = "雖然有點可疑……"
10009010-40 = "不過是有什麼原因的吧。"
10009010-41 = "我的話……受女武神警察學園所託，進行各種系統的整備和安全系統的檢查。"
10009010-42 = "像是這附近設置的通訊機器有沒有出現老化，#n或者灑水器之類系統控制的部分有沒有問題等等，這一類的檢查。"
10009010-43 = "畢竟這裡這麼熱鬧，需要注意的地方也很多。"
10009010-44 = "[s]「千尋也很忙碌呢，辛苦了。」"
10009010-45 = "……這倒不至於。"
10009010-46 = "畢竟是貝里塔斯收到的正式委託。#n既然陽葵暫時不在，我們更應該努力才對。"
10009010-47 = "況且，今天是情人節。"
10009010-48 = "是特別的日子對吧。像今天這種日子，只要能平安順利地度過，這點辛苦不算什麼。"
10009010-49 = "[s]「千尋果然很厲害呢。」"
10009010-50 = "都說沒有那種事了……"
10009010-51 = "呼。那，難得見一面……老師也在巡邏中對吧？"
10009010-55 = "我要前往下一個地點，如果方向一樣的話要不要一起走啊？"
10009010-56 = "嗯。無論何時何地屍……"
10009010-57 = "不，傷患都可能會出現。趕緊開始吧。"
10009010-58 = "……你們真的沒有在做什麼危險的事吧？"
10009010-59 = "[s]「別，別擔心……」"
10009010-62 = "哎呀……護送真無聊呢。"
10009010-63 = "吹雪，這麼鬆懈的話會被警備局長罵的唷……！"
10009010-64 = "別擔心別擔心，是桐乃太一板一眼了唷。"
10009010-65 = "但，但是一想到護送中的對象是誰就……！"
10009010-66 = "咦，擔心過頭了吧？"
10009010-67 = "當然要擔心啊……"
10009010-68 = "畢竟對方可是據說在七罪人之中也最為兇惡的……"
10009010-70 = "那個「災厄之狐」同學耶！？"
10009010-71 = "聽說他僅憑一己之力就煽動許多問題學生，#n還曾經引起將聯邦學生會的成員玩弄於股掌之間的騷動……！"
10009010-73 = "不過當時因為聯邦學生會長失蹤亂成一團，這也沒辦法。"
10009010-74 = "就算如此也不能大意。而且，我之前聽過一個傳聞。"
10009010-75 = "傳聞……？"
10009010-76 = "「災厄之狐」同學非常邪惡，同時還異常狡猾……！"
10009010-77 = "好像還有跟他說幾句話就會被附身的恐怖能力之類的！？"
10009010-81 = "……那是哪部漫畫？"
10009010-82 = "總之先冷靜點吧，桐乃。不用擔心的。"
10009010-83 = "為，為何吹雪可以這麼冷靜啊……"
10009010-84 = "要是只有我們生活安全局就算了，這裡可是有那麼多警備局的傢伙哦？"
10009010-85 = "雖然要連那個漂亮的面具和衣服都脫掉的話還是讓人有點猶豫，#n但被逮捕之後不管是武器還是什麼全部都沒收了。#n就算是災厄之狐，那種狀態要怎麼逃跑啊？"
10009010-86 = "除非他會使用什麼魔法，不然想在這種情況下逃跑什麼的──"
10009010-90 = "咦……？"
10009010-91 = "這不就逃跑了嗎！？"
10009010-97 = "……爆炸？"
10009010-98 = "怎麼這麼突然，是哪裡的管線爆炸了嗎？"
10009010-99 = "[s]「這不是單純的爆炸……」"
10009010-103 = "緊急速報！就在剛才，正在前往矯正局的女武神的車輛爆炸了！"
10009010-104 = "同時還收到了大量問題兒童集團正在作亂的情報！"
10009010-110 = "老師，你現在在哪裡！？"
10009010-111 = "[s]「吹雪！？」"
10009010-112 = "移送中的車輛發生爆炸，「災厄之狐」逃走了！#n同時還有各種傢伙襲擊了過來，奪走了女武神的裝甲車和裝備……！"
10009010-113 = "老師，幫幫我們！再這樣下去的話……！"
10009010-114 = "別說是寫報告書，就連我的休假都要被砍光了！！"
10009010-115 = "「災厄之狐」逃跑的方向是……！"
10009010-121 = "[ns]「……方向，似乎是這裡呢。」"
10009010-123 = "呵呵呵……聞到味道了呢。"
10009010-127 = "絕對，絕對不會讓您逃走……！"

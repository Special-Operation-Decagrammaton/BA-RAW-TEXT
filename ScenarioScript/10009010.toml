10009010-45 = "3;치히로;99;……고생이라고 할 정도는 아니야.\n#3;em;…"
10009010-46 = "3;치히로;01;일단은 베리타스에게 정식으로 들어온 의뢰고, 히마리 부장이 자리를 비운 만큼 허투루 할 순 없는 법이니까."
10009010-47 = "3;치히로;02;더군다나 오늘은, 그게……. 발렌타인 데이잖아?\n#3;em;[?]"
10009010-48 = "3;치히로;03;특별한 날. 오늘 같은 날을 무사히 보낼 수 있도록 이 정도 수고스러운 것쯤이야. 아무것도 아니지.\n#1;hide"

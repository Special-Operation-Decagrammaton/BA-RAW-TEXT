[translation]
34220-1 = "ตอนที่ 22;AGNUS DEI"
34220-2 = "แต่ว่า... ช่างน่าเสียดายนะคะ พิธีเริ่มไปแล้วละค่ะ"
34220-3 = "......!!"
34220-5 = "ฉันใช้ประโยชน์จากความลึกลับของสายเลือดของราชวงศ์ และยืมพลังที่มาจากภายนอกคิโวทอส#nในการยกระดับตัวของฉันอยู่ค่ะ"
34220-7 = "ครูเอ๋ย ผู้ใหญ่ที่ไม่อาจเข้าใจได้ ศัตรูตัวฉกาจของฉัน"
34220-8 = "คุณอาจจะกำลังเข้าใจฉันผิดอยู่ก็เป็นได้ค่ะ"
34220-9 = "พวกฉันก็แค่แสวงหาสิ่งที่ตัวเองต้องการผ่านการเผชิญหน้ากับโลกใบนี้ค่ะ คุณเองก็สามารถเป็น#nอะไรก็ได้ และรับรู้อะไรก็ได้"
34220-10 = "การดำรงตนให้สูงขึ้น และใช้มันเพื่อให้ได้มาซึ่งทุกสิ่งอย่างคือหน้าที่ของผู้ใหญ่ค่ะ"
34220-11 = "ใช่แล้วค่ะ พิธีกรรมนี้ก็คือการใช้พลังจากภายนอกคิโวทอสเพื่อทำให้ฉันยิ่งใหญ่ขึ้น!"
34220-12 = "ฉันจะมีอำนาจมากขึ้นมีเกียรติภูมิสูงขึ้น และช่วยโลกใบนี้ไว้!!  นี่คือขอบเขตที่ผู้ใหญ่ควรไปถึง!"
34220-13 = "และก็ช่วยไม่ได้นะคะที่ต้องมี[ruby=Agnus Dei]การเสียสละเล็กๆ น้อยๆ[/ruby] ในกระบวนการนี้"
34220-14 = "โดยสรุปก็คือ... การเสียสละนี้จะเป็นประโยชน์ส่วนรวมอย่างสูงสุด!!"
34220-15 = "นี่แหละค่ะ สิ่งที่เรียกว่า <ความสูงส่ง>!"
34220-16 = "ฉันว่าถ้าเป็นคุณคงจะเข้าใจคุณค่านี้นะคะ คุณเป็นคนที่มีอำนาจเด็ดขาดที่สามารถตัดสิน และช่วยเหลือนักเรียนทุกคนได้...!!"
34220-17 = "[s] \"เปล่าเลย\""
34220-18 = "......!?"
34220-19 = "[s1] \"พวกเธอต่างหากที่เข้าใจฉันผิด\"\n[s2] \"ฉันไม่ได้เป็นคนเลิศเลอขนาดนั้น\""
34220-20 = "ว่าไงนะ...?"
34220-21 = "ว่าไงนะ...?"
34220-26 = "[ns] \"ฉันไม่ใช่ผู้ตัดสิน ฉันไม่มีสิทธิ์ตัดสินใครทั้งนั้น\""
34220-29 = "[ns] \"ฉันไม่ใช่ผู้ช่วยชีวิต ฉันลบล้างความเจ็บปวดของโลกใบนี้ไม่ได้\""
34220-32 = "[ns] \"ฉันไม่ใช่ผู้เผด็จการ ฉันกำจัดความชั่วช้าของโลกใบนี้ไม่ได้\""
34220-34 = "......!!"
34220-35 = "[s] \"ฉันไม่ได้เป็นคนสูงส่งขนาดนั้นหรอก\""
34220-36 = "แล้วถ้างั้น... คุณเป็นอะไรล่ะคะ!!!"
34220-37 = "ความสามารถและคุณค่าในการมีอยู่ของคุณคืออะไรคะ!!"
34220-38 = "[s] \"ฉันก็แค่ครูของนักเรียนเท่านั้น\""
34220-39 = "......!!"
34220-41 = "[ns]\"ฉันแค่พยายามอยู่เคียงข้างเด็กๆ ที่ถูกลืมและทุกข์ทรมานก็เท่านั้น\""
34220-45 = "งั้นลองพิสูจน์ให้เห็นสิคะ...!!"
34220-49 = "......!!"
34220-50 = "นั่นมันอะไรกัน..."
34220-51 = "อ่า... "
34220-52 = "นี่ไง เห็นหรือยังคะ? นี่แหละความยิ่งใหญ่ของฉัน คุณค่าที่สูงส่งของฉัน...!!"
34220-53 = "นี่คือตัวตนจริงๆ ของฉัน ตัวตนของผู้ใหญ่ที่ยิ่งใหญ่ขึ้นอย่างแท้จริงค่ะ...!!"
34220-54 = "[s] \"นั่นคือตัวตนของเธอเหรอเบียทริซ?\""
34220-55 = "นั่นมัน... ตัวตนที่แท้จริง... ของมาดาม..."
34220-56 = "ปีศาจดีๆ นี่เอง..."
34220-57 = "นั่นสินะ... แต่พวกเรา... น่าจะถูกปีศาจนั่น..."
34220-58 = "[s] \"ซาโอริ ฮิโยริ มิซากิ\"  "
34220-59 = "อื้ม"
34220-60 = "ค่ะ!"
34220-61 = "อืม..."
34220-62 = "[s] \"ไม่ต้องกลัวนะ เราจะชนะไปด้วยกัน\" "
34220-64 = "....... อืม "
34220-65 = "งั้นก็ไปกันเลย ไปกำจัดปีศาจนั่นกัน"
34220-66 = "ค่ะ!!  เราจะช่วยองค์หญิงให้ได้...!!"
34220-67 = "[ns] \"ลุยเลย!!!\""

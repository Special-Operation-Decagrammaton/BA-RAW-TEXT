34220-8 = "3;베아트리체;01;당신은 어쩌면 절 오해하고 있을지도 모르겠군요."
34220-9 = "3;베아트리체;01;우리는 이 세계를 직시함으로써 각자가 원하는 것을 추구합니다. 당신 또한 무엇이든 될 수 있고, 무엇이든 알 수 있습니다."
34220-10 = "3;베아트리체;01;더 높은 존재가 되는 것. 그걸 통해 모든 것을 구하는 것이 바로 어른의 의무입니다."
34220-11 = "3;베아트리체;02;네, 이 의식의 목적은 바로, 키보토스 외부의 힘을 이용해서 제가 더 위대해지는 것입니다!!\n#3;closeup"

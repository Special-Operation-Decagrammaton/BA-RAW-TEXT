[translation]
34220-1 = "第22話;[ruby=神の子羊]Agnus dei[/ruby]"
34220-2 = "……ですが、遅かったですね。#n儀式は既に進行しています。"
34220-3 = "……！！"
34220-5 = "ロイヤルブラッドの神秘を搾取し、キヴォトス外から到来する力を借りて……私は自分の存在をより高位のものへと昇華しています。"
34220-7 = "さあ、先生。#n――不可解な大人、私の敵対者よ。"
34220-8 = "あなたは、もしかしたら私を誤解しているのかもしれませんね。"
34220-9 = "私たちはこの世界を通じて各自が望むことを追求しています。#nあなただって、同じ。何に成る事もできるし、全てを識ることができます。"
34220-10 = "より高位の存在になること――それを通じて全てを救うことが大人の義務なのです。"
34220-11 = "ええ、この儀式はキヴォトス外の力を利用し、私がより高位の存在になるために用意されたのです。"
34220-12 = "そうして高みに登り、この世界を救う――それこそ大人が到達すべき境地！"
34220-13 = "その過程での小さな[ruby=Agnus dei]犠牲[/ruby]は、仕方のないことです。"
34220-14 = "そう……この犠牲は必要な事。"
34220-15 = "これこそが「崇高」へと至る道。"
34220-16 = "あなたなら、この価値を理解しているでしょう？#nすべての生徒を審判することも、救うこともできる絶対的な力を有すあなたなら……！！"
34220-17 = "[s] \"それは違うよ。\""
34220-18 = "……！？"
34220-19 = "[s1] \"私を誤解している。\"\n[s2] \"私は大した存在じゃない。\""
34220-20 = "なに……？"
34220-21 = "なに……？"
34220-26 = "[ns] \"私は審判者ではない。誰かを審判する権利は、私にない。\""
34220-29 = "[ns] \"私は救済者ではない。この世界の苦痛を消し去ることはできない。\""
34220-32 = "[ns] \"私は絶対者ではない。この世界の罪悪をなくすことはできない。\""
34220-34 = "……！！"
34220-35 = "[s] \"私はそんな存在ではないよ。\""
34220-36 = "では……あなたは一体何だと言うのですか！！"
34220-37 = "あなたの能力は、存在価値は何だというのですか！"
34220-38 = "[s] \"生徒たちのための先生だよ。\""
34220-39 = "……！！"
34220-41 = "[ns] \"忘れられ、苦しむ生徒に寄り添いたいだけ。\""
34220-45 = "ならば、それを証明してみせなさい……！！"
34220-49 = "……！！"
34220-50 = "なっ……。"
34220-51 = "あ、あうう……。"
34220-52 = "さあ、その目にしかと映しなさい！#nこれが私……高位の存在となった姿です！"
34220-53 = "これこそが本来の姿――偉大なる大人の姿なのです………！！"
34220-54 = "[s] \"それが正体なんだね、ベアトリーチェ。\""
34220-55 = "あれが……本物のマダム……。"
34220-56 = "ただの怪物にしか見えませんが……。"
34220-57 = "そう……私たちはあんなものに、ずっと……。"
34220-58 = "[s] \"――サオリ、ヒヨリ、ミサキ。\""
34220-59 = "……ああ。"
34220-60 = "……はい！"
34220-61 = "……うん。"
34220-62 = "[s] \"怖がらないで……私がついてるから。一緒に頑張ろう。\""
34220-64 = "……ああ。"
34220-65 = "うん――あの怪物を倒そう。"
34220-66 = "はい！！姫ちゃんを救うのです……！！"
34220-67 = "[ns] \"行こう！！！\""

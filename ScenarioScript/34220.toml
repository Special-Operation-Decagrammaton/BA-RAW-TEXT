[translation]
34220-1 = "第22話;[ruby=神的羔羊]Agnus Dei[/ruby]"
34220-2 = "……不過，你們來的真慢呢。#n儀式已經開始了。"
34220-3 = "……！！"
34220-5 = "榨取皇家血統的神祕，借助從奇普托斯外部到來的力量……我將把自己的存在昇華成更高位的東西。"
34220-7 = "來吧，老師#n──無法理解的大人，我的敵對者啊。"
34220-8 = "你似乎對我有什麼誤解。"
34220-9 = "我們都是藉由這個世界追求各自的願望。#n就連你也是一樣。能夠成就一切，能夠認知一切。"
34220-10 = "成為更高位的存在──藉此拯救一切才是大人的義務。"
34220-11 = "沒錯，這個儀式就是為了利用奇普托斯外部的力量，讓我成為更高位的存在而準備的。"
34220-12 = "我將會登上高峰，拯救這個世界──這才是大人應該抵達的境界！"
34220-13 = "就算在過程中會出現小小的[ruby=Agnus Dei]犧牲[/ruby]，那也是沒辦法的。"
34220-14 = "沒錯……這個犧牲是必要的。"
34220-15 = "這正是通往「崇高」的道路。"
34220-16 = "你應該能夠理解這其中的價值吧？#n擁有能夠審判所有學生、拯救所有學生的絕對力量的你……！！"
34220-17 = "[s] 「你錯了。」"
34220-18 = "……！？"
34220-19 = "[s1] 「你誤會我了。」\n[s2] 「我才不是什麼了不起的存在。」"
34220-20 = "什麼……？"
34220-21 = "什麼……？"
34220-26 = "[ns] 「我不是審判者。沒有審判他人的權利。」"
34220-29 = "[ns] 「我不是救濟者。無法消除這個世界的苦痛。」"
34220-32 = "[ns] 「我不是絕對者。無法去除這個世界的罪惡。」"
34220-34 = "……！！"
34220-35 = "[s] 「我並不是那種存在。」"
34220-36 = "那……你到底是什麼！！"
34220-37 = "你的能力、你的存在價值又是什麼！"
34220-38 = "[s] 「我是學生們的老師哦。」"
34220-39 = "……！！"
34220-41 = "[ns] 「只是想陪伴在被眾人遺忘，活在痛苦中的學生身邊而已。」"
34220-45 = "那麼，就證明給我看吧……！！"
34220-49 = "……！！"
34220-50 = "什……"
34220-51 = "啊，啊嗚嗚……"
34220-52 = "來，好好看清楚吧！#n這就是我……成為高位存在之後的姿態！"
34220-53 = "這正是我原來的姿態──偉大的大人的姿態……！！"
34220-54 = "[s] 「這才是你的真面目啊，貝雅特里榭。」"
34220-55 = "那個是……真正的夫人……"
34220-56 = "看起來只像是個怪物啊……"
34220-57 = "這樣啊……我們一直都被那種東西……"
34220-58 = "[s] 「──沙織、日和、美咲。」"
34220-59 = "……啊啊。"
34220-60 = "……是！"
34220-61 = "……嗯。"
34220-62 = "[s] 「別害怕……我會陪著你們的。一起加油吧。」"
34220-64 = "……啊啊。"
34220-65 = "嗯──打倒那個怪物吧。"
34220-66 = "是的！！要把公主醬救出來……！！"
34220-67 = "[ns] 「上吧！！！」"

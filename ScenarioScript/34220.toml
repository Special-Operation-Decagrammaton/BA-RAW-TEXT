[translation]
34220-1 = "Episode 22; Agnus Dei"
34220-2 = "Have you come to save your precious student? What a pity. It's too late."
34220-3 = "...!"
34220-5 = "With this ritual, I will harness the powers lurking outside Kivotos and elevate my existence! Of course, it wouldn't have been possible without the royal blood's sacrifice."
34220-7 = "Sensei, Sensei. You peculiar adversary."
34220-8 = "I do still believe you and I can come to an understanding."
34220-9 = "We're not so different. Each of us pursuing what we want, using the knowledge we have garnered in our lifetimes."
34220-10 = "Is it not an adult's duty to save this world? The more power you amass, the more capable you are of performing that duty."
34220-11 = "Yes! This ritual will make me into something greater than Kivotos has ever experienced!"
34220-12 = "I will become the highest authority of this land and at last save this useless world! That is my duty as an adult!"
34220-13 = "Who cares for the sacrifice of one little girl in the process?"
34220-14 = "It is nothing in the face of the greater good!"
34220-15 = "This is sublime purpose! This is existence!"
34220-16 = "Sensei, do you not relate to me? As their teacher, you too hold the absolute power to absolve or punish the students."
34220-17 = "[s] \"You're wrong.\""
34220-18 = "...?!"
34220-19 = "[s1] \"You've misunderstood entirely.\"\n[s2] \"I don't have such power.\""
34220-20 = "What are you saying?"
34220-21 = "What are you saying?"
34220-26 = "[ns] \"I'm not a judge. I've never had the right to judge anyone.\""
34220-29 = "[ns] \"I'm not a savior. I can't shield my students from pain.\""
34220-32 = "[ns] \"I'm not an absolute. I can't scrub their sins from this world.\""
34220-34 = "...!"
34220-35 = "[s] \"I'm not some higher authority.\""
34220-36 = "If not...then what are you?!"
34220-37 = "How can you explain your power? Your influence? The value your mere existence seems to bring?"
34220-38 = "[s] \"I'm just a humble teacher.\""
34220-39 = "...!"
34220-41 = "[ns] \"I only hold the power to believe in my students when they need it the most.\""
34220-45 = "Then prove it!"
34220-49 = "...!"
34220-50 = "What..."
34220-51 = "Oh... Oh, no... "
34220-52 = "Behold! This is my greatness! I am the highest authority!"
34220-53 = "I am a sublime being, meant to rule this world!"
34220-54 = "[s] \"This is who you really are, Beatrice?\""
34220-55 = "Madame's real identity..."
34220-56 = "...is just a monster..."
34220-57 = "So that's...what we've been obeying all this time..."
34220-58 = "[s] \"Saori. Hiyori. Misaki.\""
34220-59 = "Yes."
34220-60 = "Yeah!"
34220-61 = "...Okay."
34220-62 = "[s] \"Don't be afraid. I'm right here.\""
34220-64 = "...I'm not scared of her.  "
34220-65 = "Me neither. Let's go."
34220-66 = "Y-Yeah! We're gonna save Hime!"
34220-67 = "[ns] \"It's our last mission, Squad!\""

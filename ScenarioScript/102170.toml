[translation]
102170-1 = "ตอนที่ 17;ปฏิบัติการบุกยึดหอคอยแห่งที่ 5 - ชานเมืองแห่งปราการเอริดู"
102170-2 = "เอาละๆ พร้อมกันหรือยัง?"
102170-3 = "ค่า~"
102170-4 = "หยุดก่อน!!"
102170-5 = "มีอะไรเหรอ โคยูกิ?"
102170-6 = "แล้วทำไมถึงต้องตอบว่า ค่า~ ด้วยล่ะ?"
102170-7 = "ทำไมฉันถึงมาอยู่ที่นี่? แล้วทำไมถึงมาถามความพร้อมจากฉันด้วยล่ะคะ?"
102170-8 = "เป็นอะไรขึ้นมาคะ โคยูกิจัง เราต้องไปโจมตี <ผู้พิทักษ์> กันไงคะ"
102170-9 = "ไม่สิ ทำไมต้องไปอีกล่ะ! ฉันช่วยปลดระบบรักษาความปลอดภัยของประธานริโอะให้แล้วนี่คะ!"
102170-10 = "ก็ใช่ค่ะ โคยูกิจังทำได้ดีแล้วละค่ะ"
102170-11 = "เห็นทีไรก็อดคิดไม่ได้ทุกทีเลยละว่ามีความสามารถเหนือมนุษย์..."
102170-12 = "งั้นก็แปลว่าหน้าที่ของฉันเสร็จสิ้นแล้วสิคะ! ขอกลับห้องสำนึกผิดไปไม่ได้เหรอคะ? ฉันจะได้ไปยืนมองกำแพงแล้วสำนึกผิด..."
102170-13 = "ไม่ได้ เราต้องหลอกล่อให้ HOD ขึ้นมาบนดินเพื่อโจมตีหอคอยที่ 5 ด้วยสิ"
102170-14 = "แล้วไงคะ!!  แล้วทำไมต้องให้ฉันไปทำด้วยล่ะคะ!!  คนมีตั้งเยอะตั้งแยะไม่ใช่เหรอ?"
102170-15 = "ที่ต้องให้ช่วยต่อ เพราะเมืองแห่งปราการมีกำแพงที่ประธานริโอะสร้างไว้ทุกที่เลยค่ะ เราต้องหลอกล่อ HOD แล้วทำลายกำแพงที่ขวางทางข้างหน้าไปด้วย..."
102170-16 = "และนั่นมีแต่โคยูกิจังเท่านั้นที่ทำได้ค่ะ"
102170-17 = "เลิกบ่นพึมพำแล้วไปกันเถอะ มีแต่พวกเราเท่านั้นแหละที่ทำได้"
102170-18 = "ไปกันเลย~!!"
102170-19 = "แง๊งงงงง-!"
102170-29 = "ตรงนี้ ตอกเสาเข็มตรงนี้เลย!"
102170-30 = "โอเค!!"
102170-35 = "ระเบิดสำเร็จ! วะฮ่าฮ่าฮ่า!! ถล่มทางด่วนสายนี้ให้หมด!!"
102170-36 = "วู้ว รู้สึกดีชะมัด! เริ่มเห็นพื้นที่เป็นรูปเป็นร่างขึ้นมาแล้ว แบบนี้แหละที่เหมาะกับการพัฒนา"
102170-37 = "หัวหน้าคาสุมิ ตรงนี้เสร็จสมบูรณ์แล้วละ! ฉันจะไปที่ต่อไปเลยนะ!"
102170-38 = "ดีละ! รื้อเสาที่ตั้งตระหง่านอยู่ให้หมดเลย!"
102170-39 = "โอเค~! วางใจได้เลย"
102170-41 = "พัฒนาเลยยย!!!"
102170-47 = "วะฮ่าฮ่าฮ่าา! เราจะระเบิดและทำลายละแวกนี้ให้ราบคาบ จนกว่าจะเจอน้ำพุร้อนใต้ดินของมิลเลเนียม!"
102170-50 = "ไม่นะ... ทั้งเมือง... ทั้งตึก..."
102170-52 = "ขอถามเผื่อไว้นะ พวกเธอไม่ได้แสร้งรื้อถอนเสากัดกร่อนเพื่อจะทำลายเขตปกครองตนเองมิลเลเนียม#nกันหรอกใช่ไหม...?"
102170-55 = "หืม? ทำลายมิลเลเนียมงั้นเหรอ? พูดอะไรเพ้อเจ้อ เราทำเพื่อออนเซ็นกันต่างหาก! แล้วก็ใช้โอกาสนี้#nรื้อถอน <หอคอย> ไปด้วยเลย! พัฒนาอย่างมีประสิทธิภาพ! ยิงปืนนัดเดียวได้นกสองตัวไงล่ะ!"
102170-58 = "......"
102170-63 = "เขตปกครองตนเองของเราไม่มีออนเซ็นอยู่ใต้ดินหรอกนะ... แต่ถ้าลองวิเคราะห์ชั้นดินดูสักหน่อย ก็ไม่น่าจะเสียหายอะไร..."
102170-65 = "ยัยทึ่มพวกนี้นี่! แค่วิเคราะห์และดูแค่ชั้นดินก็รู้แล้วเหรอ? จะพัฒนาออนเซ็นด้วยหัวใจที่อ่อนแอแบบนั้น#nได้ยังไง!"
102170-66 = "เชื่อในสิ่งที่ระเบิด ระเบิดในสิ่งที่เชื่อ! ออนเซ็นต้องมีอยู่จริง! วะฮ่าฮ่าฮ่า!!!"
102170-69 = "......"
102170-71 = "......"

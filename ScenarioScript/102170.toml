[translation]
102170-1 = "第17話;第5聖所「要塞都市埃里都近郊」"
102170-2 = "好，都準備好了嗎？"
102170-3 = "好了～"
102170-4 = "先等一下！！"
102170-5 = "怎麼啦？小雪。"
102170-6 = "該說的不是「好了～」吧！"
102170-7 = "為什麼我會在這裡啊！#n為什麼要若無其事地問我準備好了沒啊！"
102170-8 = "你問為什麼，小雪醬。#n因為要去打倒「守護者」呀？"
102170-9 = "不，我是說！#n破解莉央會長的安全系統這件事，我不是已經解決了嗎！"
102170-10 = "是啊，說得沒錯。辛苦你了，小雪醬。"
102170-11 = "真的是，無論見識幾次都覺得是超人一樣的才能呢……"
102170-12 = "也就是說，我的任務結束了對吧！？#n我不能乖乖回到反省室去嗎？我會面壁思過的！"
102170-13 = "不行唷。想要攻略第5聖所，就必須把霍德引誘到地面上才行。"
102170-14 = "所～以～說！！這種事為何要我們來做呢！！#n不是還有其他人嗎！？"
102170-15 = "這是因為……這座要塞城市有莉央會長設置的防壁。#n在引誘霍德的同時，還必須解除擋在前面的防壁才行──"
102170-16 = "而這，是只有小雪醬能辦到的事哦。"
102170-17 = "別再嘀嘀咕咕的了。#n能完成這個任務的就只有我們而已。"
102170-18 = "出發～"
102170-19 = "嗚啊啊啊啊啊──為什麼──！"
102170-29 = "在這裡打下木樁！"
102170-30 = "了解！！"
102170-35 = "粉碎完成！嘎哈哈哈！！#n這樣一來這條高速道路也能華麗地拆除了！！"
102170-36 = "哦哦～！感覺不錯！#n外觀越來越讚了呢～"
102170-37 = "佳澄部長，這裡大致完成了唷！#n準備移動到下個地區囉！"
102170-38 = "哈～哈哈哈，很好！把建築全都拆除吧！"
102170-39 = "OK，交給我吧！"
102170-41 = "開發！開發囉──！！"
102170-47 = "哈哈哈！很好很好！#n在發現千年地下的溫泉之前，盡情引爆、盡情開挖吧！"
102170-50 = "啊啊，都市啊……建築物啊……"
102170-52 = "以防萬一，我姑且還是問一下……#n你們沒有假裝在拆除入侵之柱，其實上只是想破壞千年自治區吧？"
102170-55 = "哈～哈哈哈，你在說什麼！這一切都是為了溫泉！只是也會順便拆除「聖所」而已，簡直是一石二鳥對吧！開發就要講求效率啊！"
102170-58 = "……"
102170-63 = "溫泉……？我們的自治區的地下並沒有溫泉……#n只要稍微分析一下地層不就知道了嗎……"
102170-65 = "說什麼傻話！所謂的溫泉，是存在於大家的心裡的呀！"
102170-66 = "去相信吧！只要相信，溫泉就會在那裡！#n哈～哈哈哈哈哈！"
102170-69 = "……"
102170-71 = "……"

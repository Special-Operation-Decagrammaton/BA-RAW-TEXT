[translation]
102170-1 = "Episode 17; Fifth Sanctum - Outskirts of the City of Eridu"
102170-2 = "Now, are you ready?"
102170-3 = "Yes, ma'am~"
102170-4 = "W-Wait, stop!"
102170-5 = "Is something wrong, Koyuki?"
102170-6 = "Do you expect me to just smile and say \"Yes, Yuuka!\" in this situation?!"
102170-7 = "What is going on? What am I even doing here?! Before you ask someone if they're ready to do something, you should really get their consent first!"
102170-8 = "Hm? I thought we explained it, Koyuki. We're going to defeat the guardian."
102170-9 = "B-But that's what I'm saying! I already disabled President Rio's stupid security system."
102170-10 = "Yes, yes. Good girl, Koyuki. You did very well."
102170-11 = "Honestly, your talent is so mind boggling it should be studied as a scientific marvel."
102170-12 = "Great! So I did what you asked me to! Can't you take me back to the Self-Reflection Room now? I should be, like, staring at the wall and reflecting on my wrongdoings, right?!"
102170-13 = "No. We need to lure Hod to the ground to clear the fifth sanctum."
102170-14 = "That's what I'm trying to say!!! What do you mean WE?! Get anyone else, please!"
102170-15 = "President Rio erected barriers all over the Fortress City. We have to dismantle the barriers blocking the way while luring out Hod..."
102170-16 = "And you're the only one in this entire world who can do that, Koyuki."
102170-17 = "There is no \"anyone else.\" We're wasting precious time with your complaining."
102170-18 = "Off we go~"
102170-19 = "WAHHHHHH!!!"
102170-29 = "Here, drive a stake here!"
102170-30 = "Okay!"
102170-35 = "Detonation complete! Hahahaha! The freeway is collapsing!"
102170-36 = "Oh, this is great. It feels like the place is really under development now."
102170-37 = "President Kasumi, I think we're pretty much done here! We'll move to the next area!"
102170-38 = "Okay! Demolish every last building!"
102170-39 = "Understood! Demolish the buildings! Burn everything!"
102170-41 = "Development! Development!"
102170-47 = "Wahahaha! Yeah! Until we find hot springs beneath Millennium, we'll explode, demolish, and dig up this town to our heart's content!"
102170-50 = "The city... The buildings..."
102170-52 = "I'm sorry, but I have to ask... You didn't come to destroy the Millennium district under the guise of demolishing the Erosion Tower, did you...?"
102170-55 = "Heeheehee! Destroy Millennium? What are you saying? All of this is for the hot springs! And we might as well demolish the sanctum too! Kill two birds with one stone! Development is all about efficiency!"
102170-58 = "..."
102170-63 = "Hot springs...? There's absolutely no chance of there being hot springs in our district... I'm sure you could have figured that out by analyzing the strata a little..."
102170-65 = "Analysis? Look at the strata? You scholarly folks! You'll never develop hot springs with that kind of a mindset! You feel it! You smell it!"
102170-66 = "You must believe that the hot springs exist! Then the hot springs will answer! Hahaha!"
102170-69 = "..."
102170-71 = "..."

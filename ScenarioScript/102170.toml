102170-7 = "1;유우카;02\n5;코유키;11;뭔가요? 왜 제가 여기 있는 거죠? 왜 당연하다는 듯 준비됐냐고 묻는 거죠?\n#5;m3\n#5;em;[속상함]\n#5;hophop\n#1;dl"
102170-8 = "#5;hide\n3;노아;02;왜라니요, 코유키 쨩. <수호자>를 공략하러 가야 하잖아요.\n#3;em;[?]\n#3;a"
102170-9 = "3;코유키;04;아니, 그러니까! 리오 회장의 보안 시스템을 제가 해제해 드렸잖아요!\n#3;hophop"
102170-10 = "3;노아;03;네, 그렇죠. 수고하셨어요, 코유키 쨩.\n#3;em;[반짝]\n#3;greeting"
102170-11 = "3;유우카;06;정말 볼 때마다 신기에 가까운 재능이라니까…….\n#3;em;[땀]"
102170-12 = "3;코유키;11;아니, 그러면 제 역할은 그걸로 끝이잖아요! 이제 얌전히 반성실로 돌아가면 안 될까요? 가서 벽보면서 반성하고 있을 테니까…….\n#3;em;[훌쩍]\n#3;stiff"
102170-13 = "3;유우카;05;안 돼. 5성소의 공략을 위해서는 호드를 지상으로 유인할 필요가 있다고.\n#3;em;[!]"

102170-15 = "3;노아;99;왜냐하면 이 요새도시의 곳곳에는 리오 회장이 만든 방벽이 있거든요. 호드를 유인하면서 앞을 가로막는 방벽을 해체해야 하는데…….\n#3;em;[...]"
102170-16 = "3;노아;01;그건 코유키 쨩만이 할 수 있는 일이거든요."
102170-17 = "3;코유키;07\n1;유우카;06;그만 투덜거리고, 가자. 이걸 할 수 있는 건 우리뿐이니까.\n#1;em;[반응]\n#1;ar\n#3;h\n#3;m5"

[translation]
32050-1 = "第5話;深夜的大騷動（１）"
32050-2 = "呵呵……♡"
32050-3 = "啊哈哈……真，真的來了呢。"
32050-4 = "怎麼樣呀？已經開心起來了對吧？#n做出禁止行為的背德感，以及和大家一起違規的安全感，兩種感覺結合在一起……！"
32050-5 = "原來如此，深夜的街道是這種感覺啊……比想像中更有活力。"
32050-6 = "沒錯唷，24小時營業的店也不少呢。"
32050-7 = "那是甜點店嗎？還有24小時營業的啊……啊，還有咖啡廳也開著。"
32050-8 = "從這裡再往前一點的話，還有Momo好友的店唷。#n在對面還有只賣限定產品的隱藏商店……"
32050-9 = "呵呵，不愧是日步美醬，了解的真詳細呢。"
32050-10 = "啊，啊哈哈哈……"
32050-14 = "嗚……結果還是跟過來了。#n萬一在這種地方被蓮實前輩發現的話一定會被臭罵一頓的……"
32050-15 = "哎呀，是這樣嗎？我聽說蓮實同學是個對後輩們很溫柔的人呀……？"
32050-16 = "當，當然很溫柔呀！而且還是文武雙全、才色兼備……？還很有品味的厲害前輩！"
32050-17 = "可，可是生氣的時候真的很可怕……"
32050-18 = "[s] 「這麼說來，我之前也聽說過蓮實生氣的時候非常可怕……」"
32050-19 = "嗯，嗯……之前有過一次，我當時也在現場……"
32050-21 = "實現正義部．教室"
32050-26 = "……"
32050-27 = "……"
32050-28 = "蓮，蓮實前輩，請冷靜──"
32050-32 = "絕對，絕對不能原諒！！萬魔殿！！格黑娜！！為什麼要做出那種事……！！"
32050-33 = "噫……！"
32050-35 = "哎呀……那還真是激動呢。到底是為什麼呢……？"
32050-36 = "因為伊甸園條約的事情在跟格黑娜的高層開會的時候……"
32050-38 = "哈啊，哈啊……"
32050-39 = "……請大家仔細聽。我現在在這裡宣誓。"
32050-40 = "從今以後，我……！"
32050-41 = "一定要減肥！！"
32050-43 = "……！？"
32050-44 = "……！？"
32050-45 = "減，減肥……是嗎？"
32050-47 = "沒錯，就是減肥！"
32050-48 = "今後我要是一天吃超過兩餐、或是打算要吃點心的話，請立刻制止及批評我！"
32050-49 = "聽說減肥只靠自己很難達成，像這樣公開宣言比較容易成功！我需要大家的幫忙！"
32050-50 = "蓮，蓮實前輩……和格黑娜的會議上究竟發生了什麼……？"
32050-51 = "……"
32050-52 = "不可原諒……！竟然，竟然做出那種事……！"
32050-55 = "……原來如此，你就是被稱為「三一戰略兵器」的劍先弦生啊。"
32050-56 = "……咦？啊，不，我是──"
32050-57 = "這樣啊，比我想像的還要誇張啊，都要讓人不開心了。"
32050-58 = "嘻嘻！但是那種戰術對我真琴大人是沒有用的！#n想靠剛見面時的下馬威就贏過我們真是太天真了！"
32050-59 = "……什麼？"
32050-60 = "伊呂波，去把臯月叫來！我要向三一的傢伙們證明我們沒有輸！！"
32050-62 = "真琴前輩，這位不是部長弦生同學而是副部長蓮實同學。#n事前的文件上應該也有寫吧。"
32050-63 = "還有，如果你剛才說的是胸部的大小，我想就算臯月前輩來也是贏不了的哦。"
32050-67 = "什，什麼！？竟然不是弦生！？#n原來如此，是代理人嗎……我們真是被看扁了啊，這種時候還耍小手段……！"
32050-68 = "哈！也就是說這個會議本身就是假的嗎！？#n之所以叫我們過來，也只是為了用身高和胸部的魄力來挫挫我們的銳氣……！"
32050-69 = "不是，本來就是蓮實同學會來。你有在聽我說話嗎？沒有在聽對吧？"
32050-70 = "可惡，讓我看到這簡直讓人不愉快的胸部……！#n是想和[ruby=Pandemonium Society]我萬魔殿的[/ruby]真琴大人吵架是吧！！"
32050-71 = "請冷靜一點，還有請別再說胸部的話題了。#n我都快要因為身為萬魔殿的成員而感到羞恥了。"
32050-72 = "伊呂波，既然這樣就去準備那個！怎麼能就這樣輸給這個女巨人！"
32050-77 = "女巨人……？"
32050-81 = "雖然我完全不明白你說的「那個」是什麼，但我很清楚這次會議已經搞砸了。#n我們快逃吧。"
32050-82 = "……嗯？"
32050-86 = "啊啊……啊啊啊啊啊啊啊啊啊啊！！"
32050-94 = "……"
32050-95 = "……"
32050-96 = "[s] 「…………」"
32050-97 = "於是那個會議就這麼搞砸了……#n從那之後蓮實前輩就沒怎麼吃飯，真令人擔心……"
32050-98 = "原來還發生了那種事啊……會對格黑娜的人們那麼生氣也能理解呢，這也難怪……"
32050-99 = "[s] 「蓮實他還好吧……」"
32050-100 = "不過，蓮實前輩在各種意義上都很強，所以沒事的！"
32050-101 = "從那之後一直都努力遵守著和自己的約定……！"
32050-105 = "啊，這裡也有甜點店。"
32050-106 = "總覺得一聊到食物的話題肚子就餓了呢，要不要在這裡吃點東西呢？"
32050-107 = "啊，這裡的限定聖代很好吃的唷！我還不知道這裡是24小時營業的呢。"
32050-108 = "聖代啊……嗯，感覺不錯。走吧。"
32050-114 = "咦，咦……！？"
32050-115 = "嗚……沒，沒有人會發現吧……？"
32050-122 = "歡迎光臨。"
32050-123 = "啊哈哈，大半夜的跑來甜點店……雖然有點緊張，不過總覺得莫名的興奮呢。"
32050-124 = "確實。"
32050-125 = "是5位客人嗎？歡迎點餐。"
32050-126 = "那個……啊，還有限定聖代嗎？"
32050-127 = "啊啊，非常不好意思……正好剛才有位客人把最後三個限定聖代都買走了……"
32050-128 = "啊，這樣啊……"
32050-129 = "慢了一步嗎……竟然連這種時候都有人會買，真是不容小覷。"
32050-130 = "……咦？"
32050-131 = "老，老師……？"
32050-132 = "[s] 「蓮實……！？」"
32050-133 = "蓮，蓮實前輩！？"
32050-134 = "哎呀，那是限定聖代嗎？怎麼好像很多……"
32050-136 = "（看見了眼前擺著三個聖代，正美味的享用著的蓮實）"
32050-138 = "老師，還有補課部的大家……"
32050-139 = "啊，啊啊啊啊啊啊……！"
32050-140 = "蓮實同學，真巧呢♡哎呀，竟然在大半夜吃三個聖代……我聽說你正在減肥的呀？"
32050-141 = "這，這是因為，那個……"
32050-142 = "嗯，我都了解的。是被深夜襲來的邪惡慾望引導到這裡來的對吧？"
32050-143 = "呃……！？不，不是那個……"
32050-144 = "就這麼遵循著慾望飽餐一頓之後，#n等到恢復理智才發現已經無可挽回而陷入慌亂……"
32050-145 = "[s] 「晚上肚子餓了呢。」"
32050-146 = "老，老師……我的事情先放一邊。#n補課部的各位正在合宿中，應該是禁止外出的才對吧……"
32050-150 = "……各位，我們就當作今天沒有見過彼此吧。"
32050-151 = "蓮，蓮實前輩……"
32050-152 = "小春，有在努力唸書嗎？"
32050-153 = "啊，呃，那個，這個……"
32050-154 = "[s] 「小春最近的成績進步了很多對吧。」"
32050-156 = "沒，沒錯……！小春醬只要繼續維持下去的話一定會及格，他很努力的……"
32050-158 = "是嗎？"
32050-159 = "嗚……"
32050-160 = "那真是太好了。#n我之前也說過吧？小春一定能做到的。"
32050-161 = "和那個時候說的一樣……"
32050-163 = "我會幫你加油的唷，小春。"
32050-164 = "請不要忘記本來的目標，我指的並不只有眼前的唸書這件事哦。"
32050-165 = "但是那種事……我實在做不到……"
32050-166 = "這麼短的時間內就要提升成績什麼的……#n雖然我很想跟前輩在一起，但對我來說真的太難了……"
32050-167 = "不！你做得到！一定得做到才行！"
32050-171 = "突然這麼大聲很抱歉……#n但是小春，為了之後能一直在一起，現在不努力可不行喔。"
32050-172 = "而且這也是為了報答老師的辛勞……再努力一下，好嗎？"
32050-173 = "……嗯。我會努力加油的。"
32050-175 = "……耶嘿嘿。因，因為我不想要辜負蓮實前輩的期待嘛。"
32050-176 = "嗯，我會繼續幫你加油的，小春。#n我很期待你回到實現正義部，繼續和我們執行任務的那天哦。"
32050-177 = "好，我會加油的……！"
32050-178 = "[s] 「真是段佳話……」"
32050-179 = "（嘟嘟嘟嘟……）"
32050-180 = "……？這種時候還有聯絡……？"
32050-181 = "嗯……一花？怎麼了嗎？"
32050-182 = "蓮實前輩，發生了一點問題，你現在在哪呢？"
32050-183 = "問題……？可以說的詳細一點嗎？"
32050-184 = "剛才收到了學園的近郊有推測是格黑娜的學生擅自闖入，#n而且正在對三一的設施進行無差別攻擊的消息。"
32050-185 = "襲擊……是格黑娜的風紀委員會嗎？還是說萬魔殿的人終於露出本性了……！？"
32050-186 = "啊，不，那是……"
32050-187 = "不管對方是誰，肯定是要來妨礙伊甸園條約的沒錯……！#n規模有幾個中隊？地點呢？那個設施在哪！？"
32050-188 = "請先冷靜，前輩。#n首先對方並不是格黑娜的風紀委員會，兵力也非常少，目前確認到的人數只有4人。"
32050-189 = "不是風紀委員會……4個人……？"
32050-190 = "是的。至於被襲擊的地方……似乎是水族館。"
32050-191 = "水，水族館……？為什麼要對那種地方……？"
32050-192 = "我也不太清楚，但他們好像搶走了展示中的稀有種「黃金鮪魚」後就逃走了。"
32050-193 = "黃金鮪魚……？"
32050-194 = "似乎是種非常貴的魚，大概是想要賣到哪裡去吧……啊，又傳來了一些情報。"
32050-195 = "呃……看來犯人的身分是格黑娜的恐怖分子集團「美食研究會」的樣子。"
32050-198 = "主謀是會長黑舘羽留奈，就算是在格黑娜也是被當成需要特別注意的人物呢。#n該怎麼做呢前輩？"
32050-200 = "喂！！為什麼要到這種地方來啊！？這不是三一的正中心嗎！？"
32050-201 = "那也沒辦法，既然都聽到「黃金鮪魚」的消息了，怎麼可能就這麼袖手旁觀呢★"
32050-202 = "呵呵。那個傳說中的鮪魚竟然只用來觀賞……那種事對美食來說也太失禮了。"
32050-203 = "所謂美食雖然必須孤高，卻也必須帶有普遍性才行……"
32050-204 = "那隻「黃金鮪魚」肯定也不希望就這麼一直被當作觀賞的對象和賺錢的手段才對。"
32050-205 = "我們只是去達成他的願望而已！沒錯吧，風華同學？"
32050-206 = "嗯！嗯嗯！！"
32050-207 = "看吧，我們格黑娜的供給部部長同意到簡直要流淚了！"
32050-208 = "雖然因為嘴巴被堵住了不知道在說什麼就是了★"
32050-209 = "哇，鮪魚還活蹦亂跳的呢！還用魚鰭在打我巴掌！？"
32050-210 = "泉，把牠抓好！那可是非常貴的！"
32050-211 = "話說什麼時候才能吃牠呢？#n一直被牠賞巴掌，還被黑色水手服的孩子們追著跑，害我都餓了！"
32050-212 = "黑色的水手服，不就是實現正義部嗎！？#n那可是跟我們的風紀委員會一樣不妙啊！怎麼辦羽留奈，能逃的掉嗎！？"
32050-213 = "呵呵……能不能逃掉並不重要。"
32050-214 = "重要的是能不能吃掉！"
32050-215 = "[ruby=eat or die]「是吃？還是死？」[/ruby]！只有這兩種選擇而已！#n這才是我們美食家該走的孤高之路啊！"
32050-216 = "果然還是會變成這樣呢★"
32050-220 = "別再發表演說了，趕快逃吧！！"
32050-221 = "來，突破包圍網撤退囉！得盡快讓風華同學好好料理這隻新鮮的鮪魚才行！！"
32050-222 = "唔嗯！！嗯嗯嗯──！！！"
32050-224 = "下一話;深夜的大騷動（２）"

[translation]
32050-1 = "第5話;真夜中の大騒ぎ（１）"
32050-2 = "うふふ……♡"
32050-3 = "あはは……き、来ちゃいましたね。"
32050-4 = "どうですか？もうすでに楽しくないですか？禁じられた行為をしているというこの背徳感、そして同時にみんなで一緒にしているからこその安心感、この二つが合わさって……！"
32050-5 = "なるほど、深夜の街はこんな感じなのか……思ったより活気がある。"
32050-6 = "そうなんですよ、24時間営業の店も多いですし。"
32050-7 = "あれはスイーツショップ？24時間開いてるところがあるのか……あ、喫茶店も開いてる。"
32050-8 = "ここからもう少し行くと、モモフレンズのグッズショップもあるんですよ。その向かいには限定グッズだけを取り扱う隠れたお店もありまして……。"
32050-9 = "ふふっ、さすがはヒフミちゃん、詳しいですね。"
32050-10 = "あ、あははは……。"
32050-14 = "うぅ……結局乗っちゃったけど、こんなところ万が一ハスミ先輩に見られたりしたら、すっごい怒られそう……。"
32050-15 = "あら、そうなのですか？ハスミさんは後輩たちに優しい方だと聞いていましたが……？"
32050-16 = "も、もちろん優しいわよ！それに文武両道、さいしょくけんび……？で、品もあってすっごい先輩なんだから！"
32050-17 = "で、でも怒る時はほんとに怖くて……。"
32050-18 = "[s] \"そういえば、前にハスミが本気で怒るとすごかったって……。\""
32050-19 = "う、うん……前に一回あって、私もその場にいたんだけど……。"
32050-21 = "正義実現委員会・教室"
32050-26 = "……。"
32050-27 = "……。"
32050-28 = "ハ、ハスミ先輩、落ち着いてくださ――"
32050-32 = "絶対に、絶対に許しません！！万魔殿！！ゲヘナっ！！どうして、どうしてあそこまで……！！"
32050-33 = "ひっ……！"
32050-35 = "あら……それは激しいですね。一体何が……？"
32050-36 = "エデン条約の件で、ゲヘナの首脳部と会議をした時で……。"
32050-38 = "はぁ、はぁ……。"
32050-39 = "……よく、よく聞いておいてください。私は今ここに、宣言します。"
32050-40 = "これから私は……私は……っ！"
32050-41 = "今度こそダイエットをします！！"
32050-43 = "……！？"
32050-44 = "……っ！？"
32050-45 = "だ、ダイエット……ですか？"
32050-47 = "はい、ダイエットです！"
32050-48 = "これから私が一日に二回以上食事をしたり、おやつを口にするところを発見したらその場で指摘してどうか叱ってください！"
32050-49 = "こういったことは自分だけの力では難しいので、宣言しておく方が良いと聞きました！みなさんの助けが必要なんです！"
32050-50 = "は、ハスミ先輩……ゲヘナとの会議で一体何が……？"
32050-51 = "……。"
32050-52 = "許せません……！なんて、なんてことを……！"
32050-55 = "……なるほど、お前が「トリニティの戦略兵器」と呼ばれる[ruby=けんざき]剣先[/ruby]ツルギか。"
32050-56 = "……え？あ、いえ、私は――"
32050-57 = "そうか、想定以上に規格外だな。不愉快になるくらいに。"
32050-58 = "キキッ！だがそんな戦略、このマコト様には通用しない！出会い頭のインパクトで我々に勝とうなど甘いわ！"
32050-59 = "……はい？"
32050-60 = "イロハ、サツキを連れてこい！トリニティのやつらに負けてなどいないことを示してやるぞ！！"
32050-62 = "マコト先輩、この方は委員長のツルギさんではなく副委員長のハスミさんです。あらかじめ書類にもあったと思いますが。"
32050-63 = "それと、今もし胸の大きさの話をされているのであれば、多分サツキ先輩が来ても勝てないと思いますが。"
32050-67 = "な、なにぃっ！？ツルギじゃないだと！？なるほど、代役か……舐められたものだ、この期に及んで小細工とは……！"
32050-68 = "はっ！つまりそもそも、この会議はフェイクということか！？我々を呼び出しておいて、身長と胸の迫力でこちらの出鼻をくじいておこうだなんて……！"
32050-69 = "いえ、ですから元々ハスミさんです。私の話聞いてますか？聞いてませんね？"
32050-70 = "くっ、不愉快なぐらい大きな胸を見せつけおって……！喧嘩を売ってるのか、[ruby=パンデモニウム・ソサエティー]この万魔殿のマ[/ruby]コト様に対して！！"
32050-71 = "落ち着いてください、あともう胸の話やめてください。そろそろ万魔殿として恥ずかしいです。"
32050-72 = "イロハ、こうなったらあれを用意しろ！このままこのデカ女に負けてたまるか！"
32050-77 = "デカ女…………？"
32050-81 = "「あれ」と言われても何のことかさっぱりですが、とりあえずこの会議がおじゃんなのはよく分かりました。もう逃げましょう。"
32050-82 = "……ん？"
32050-86 = "ああ……あああぁぁぁぁぁぁぁっ！！"
32050-94 = "……。"
32050-95 = "……。"
32050-96 = "[s] \"…………。\""
32050-97 = "それで、その会議自体ダメになって……それ以来ハスミ先輩、あんまりご飯も食べないから心配で……。"
32050-98 = "そんなことがあったのですね……ゲヘナの方々に怒るのも分かります、無理もありません……。"
32050-99 = "[s] \"ハスミ、大丈夫かな……\""
32050-100 = "でも、ハスミ先輩は色んな意味で強いから大丈夫！"
32050-101 = "あれからずっと、自分との約束を守って頑張ってるし……！"
32050-105 = "あ、ここにもスイーツ屋が。"
32050-106 = "なんだか食べ物の話をしていたらお腹が減ってきましたし、ここで何か食べましょうか？"
32050-107 = "あ、ここの限定パフェすっごい美味しいんですよ！24時間やってるとは知りませんでした。"
32050-108 = "パフェか……うん、悪くない。行こう。"
32050-114 = "え、えっ……！？"
32050-115 = "うぅっ……だ、誰も見てないよね……？"
32050-122 = "いらっしゃいませ。"
32050-123 = "あはは、真夜中にスイーツ屋さんだなんて……緊張もありますが、何だかすごくワクワクしますね。"
32050-124 = "確かに。"
32050-125 = "5名様でしょうか？ご注文をどうぞ。"
32050-126 = "えっと……あ、限定パフェってまだありますか？"
32050-127 = "ああ、申し訳ございません……限定パフェはちょうど先ほど、別のお客様が三つ購入されたのが最後でして……。"
32050-128 = "あ、そうでしたか……。"
32050-129 = "一歩遅かったか……こんな時間まで狙われているなんて、侮れないな。"
32050-130 = "……あら？"
32050-131 = "せ、先生……？"
32050-132 = "[s] \"ハスミ……！？\""
32050-133 = "は、ハスミ先輩！？"
32050-134 = "あら、それが限定パフェですか？何やらたくさん……。"
32050-136 = "（パフェを三つ目の前にして、美味しそうに食べているハスミの姿があった。）"
32050-138 = "先生、それに補習授業部のみなさん……。"
32050-139 = "あ、あぁあぁぁぁ……！"
32050-140 = "ハスミさん、奇遇ですね♡あら、真夜中にパフェを三個も……たしか、ダイエット中だと伺いましたが？"
32050-141 = "こ、これはですね、その……。"
32050-142 = "はい、心中お察しいたします。真夜中に襲ってきた悪しき欲望に導かれて、ここまで来てしまったのですよね？"
32050-143 = "え……！？い、いえその……。"
32050-144 = "そうして欲望のままめちゃくちゃにしてしまった後、理性を取り戻した頃にはもう取り返しがつかないほどに乱れて……。"
32050-145 = "[s] \"夜中ってお腹が空くよね。\""
32050-146 = "せ、先生……こほん。その、自分のことを棚上げするようですが、補習授業部のみなさんはそもそも、合宿中の外出が禁じられていたはずでは……？"
32050-150 = "……ここはお互いに、見なかったことにするとしましょうか。"
32050-151 = "は、ハスミ先輩……。"
32050-152 = "コハル、お勉強頑張っていますか？"
32050-153 = "あ、えっと、それは、その……。"
32050-154 = "[s] \"コハルは最近、成績がすごく上がってるよね。\" "
32050-156 = "は、はい、そうです……！コハルちゃんはこのままいけば全然合格できるくらい、頑張っていて……！"
32050-158 = "なるほど、そうでしたか。"
32050-159 = "うぅ……その、えっと……。"
32050-160 = "それは何よりです。言ったではありませんか、コハルはやればできると。"
32050-161 = "あの時も言った通り……"
32050-163 = "応援してますよ、コハル。お勉強、頑張ってください。"
32050-164 = "本来の目標を忘れないでください、ただ目の前の勉強の話だけをしているわけではないのです。"
32050-165 = "でも、そんな……私には、とうてい無理です……。"
32050-166 = "そんなすぐ成績を上げるなんて……先輩と一緒にいたい気持ちは本当ですが、私にはあまりにも難しいことで……。"
32050-167 = "それではダメなんです！"
32050-171 = "ごめんなさい、急に大声を出してしまって……ですがコハル、私たちがこれからもずっと一緒にいるためには、今頑張ってもらわないとダメなのです。"
32050-172 = "それに先生も、必ず手助けしてくれます。そんな先生のためにも、勉強を頑張るのが今コハルがやるべきことです。"
32050-173 = "……はい。私、精一杯頑張ります。"
32050-175 = "……えへへっ。は、ハスミ先輩の期待を裏切りたくないですから。"
32050-176 = "はい。引き続き応援していますよ、コハル。早く正義実現委員会に戻ってきて、一緒に任務が遂行できる時を心待ちにしていますから。"
32050-177 = "はい、頑張ります……！"
32050-178 = "[s] \"良い話だ……。\""
32050-179 = "（ヴヴヴヴ……）"
32050-180 = "……？こんな時間に、連絡……？"
32050-181 = "はい……イチカ？どうかしましたか？"
32050-182 = "ハスミ先輩、ちょっと問題が発生しちゃいまして。今どちらに？"
32050-183 = "問題……？詳しく聞かせていただけますか？"
32050-184 = "どうやら学園の近郊にゲヘナと推測される生徒たちが無断で侵入、さらに無差別に銃撃を行いつつトリニティの施設を襲撃している、との情報が。"
32050-185 = "襲撃……ゲヘナの風紀委員会ですか！？それとも万魔殿がついに本性を……！？"
32050-186 = "あ、いえ、それが……"
32050-187 = "誰であれ、きっとエデン条約を邪魔しようとする意図に違いありません……！規模は何個中隊ですか？場所は、その施設はどこですか！？"
32050-188 = "落ち着いてほしいっす先輩。とりあえずゲヘナの風紀委員会ではなく、兵力も全然少なくて、確認されてるのは4名だけっすね。"
32050-189 = "風紀委員会ではなく……4名……？"
32050-190 = "はい。それで襲撃されたのは……アクアリウムみたいっすね。"
32050-191 = "あ、アクアリウム……？どうして、そんなところを……？"
32050-192 = "さあ。あたしもよく分からないっすけど、何だか展示中だった稀少種の「ゴールドマグロ」を強奪して逃げてるとかで。"
32050-193 = "「ゴールドマグロ」……？"
32050-194 = "すげー高い魚らしくって、多分どこかに売り飛ばそうと……あ、追加で幾つか情報が送られてきたっすね。"
32050-195 = "えーっと……どうやら正体はゲヘナのテロリスト集団、「美食研究会」らしいっす。"
32050-198 = "主謀者は会長の[ruby=くろだて]黒舘[/ruby]ハルナ、ゲヘナの中でも要注意人物とされてる例のやつっすね。で、どうします先輩？"
32050-200 = "ねぇぇぇぇ！！何でこんなとこまで来ちゃったの！？トリニティのど真ん中じゃん！？"
32050-201 = "仕方ありません、あの「ゴールドマグロ」と聞いては黙って見ているわけにはいきませんし★"
32050-202 = "ふふっ。あの伝説のマグロを、ただ観賞用として扱うだなんて……そんなこと、美食に対する礼儀がなっていないというものですわ。"
32050-203 = "美食というのは孤高でありながら、普遍的でなくてはなりません……"
32050-204 = "ただ見せ物としてお金稼ぎの手段に終わるなど、この「ゴールドマグロ」さんも望んでいないはず。"
32050-205 = "私たちはただ、その声に共鳴しただけ！そうですよね、フウカさん？"
32050-206 = "んんっ！？んーーーっ！んんんんんっ！？"
32050-207 = "御覧なさい。このゲヘナの給食部部長の、感涙にむせび泣くほどの同意を！"
32050-208 = "猿ぐつわのせいで、何を言ってるのかさっぱりですけどね★"
32050-209 = "うわっ、マグロがまだビチビチ跳ねてる！ひれでビンタされてるっ！？"
32050-210 = "イズミ、ちゃんと捕まえてて！それすっごい高いんだから！"
32050-211 = "ところでこれいつ食べられるの？マグロにはビンタされるし、黒いセーラー服の子たちに追いかけられるし、そろそろお腹空いたんだけど！"
32050-212 = "黒いセーラー服って、それ正義実現委員会じゃん！？こっちの風紀委員会と同じくらいヤバいよ！どうするのハルナ、逃げ切れるの！？"
32050-213 = "ふふっ……逃げ切れるのかどうかなんて、大した問題ではありませんわ。"
32050-214 = "大事なのは食べられるか、否か！"
32050-215 = "つまりは[ruby=eat or die]「食べるか、死ぬか」[/ruby]！ただその二択のみ！それこそが、私たち美食家が歩むべき孤高な道なのです！"
32050-216 = "結局、こういうことですね★"
32050-220 = "そんな高らかに喋ってないで、適度に戦って早く逃げないと！！"
32050-221 = "さあ、包囲網を破って退却です！一刻も早くフウカさんに、新鮮なマグロのお造りを作っていただかねば！！"
32050-222 = "んんんん－ーーーっ！！！？"
32050-224 = "次回;真夜中の大騒ぎ（２）"

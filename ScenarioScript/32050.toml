[translation]
32050-1 = "ตอนที่ 5;โกลาหลกลางดึก (1)"
32050-2 = "อุฮุฮุ♡ "
32050-3 = "อ่า แหะๆๆๆ... ในที่สุดก็ออกมาจนได้นะคะ"
32050-4 = "เป็นยังไงบ้างคะ? สนุกใช่ไหมล่ะคะ? ถึงจะรู้สึกผิดที่ฝ่าฝืนข้อห้าม แต่ยังไงก็เบาใจได้#nเพราะเราทำด้วยกันทั้งหมด..."
32050-5 = "ถนนตอนกลางคืนเป็นแบบนี้เองเหรอ? มีชีวิตชีวามากกว่าที่คิดอีกนะ"
32050-6 = "ใช่ไหมคะ? มีร้านที่เปิด 24 ชั่วโมงด้วยนะคะ"
32050-7 = "นั่นร้านขายของหวานหรือเปล่า? ร้านเค้ก 24 ชั่วโมงเหรอ? มีร้านชาแดงด้วย..."
32050-8 = "ถ้าไปอีกหน่อยจะเจอร้านขายสินค้า MOMO FRIENDS ด้วยค่ะ#nส่วนฝั่งตรงข้ามจะมีร้านสินค้าลิมิเต็ดเอดิชั่นมือสอง..."
32050-9 = "ตายแล้วฮิฟุมิจัง ข้อมูลแน่นจังเลยนะคะ"
32050-10 = "อ่า แหะๆๆๆ..."
32050-14 = "ระ... เราออกมาแบบนี้... ถ้าโดนรุ่นพี่ฮาสุมิจับได้ล่ะก็... ฉันต้องโดนรุ่นพี่กินหัวเอาแน่ๆ..."
32050-15 = "โอ๊ะ? คุณฮาสุมิเค้าเข้มงวดกับรุ่นน้องเหรอคะ? ฉันเข้าใจว่าเป็นคนอ่อนโยนซะอีก..."
32050-16 = "ก็... ก็อ่อนโยนอยู่! แถมมีความรู้ทางวิชาการและกลอุบาย และมีศักดิ์ศรีด้วย!"
32050-17 = "แต่ว่า... พอโกรธขึ้นมาจะน่ากลัวมาก..."
32050-18 = "[s] \"จะว่าไป คุณฮาสุมิเคยโกรธมากอยู่ครั้งหนึ่งใช่ไหม?\""
32050-19 = "เอ่อ... อื้ม เคยครั้งหนึ่งเมื่อนานมาแล้วน่ะ... ตอนนั้นฉันเองก็อยู่ตรงนั้นด้วย..."
32050-21 = "ห้องชมรมทวงความยุติธรรม"
32050-26 = "..."
32050-27 = "..."
32050-28 = "ระ...รุ่นพี่ฮาสุมิ... ใจเย็นๆ นะคะ"
32050-32 = "ฉันไม่มีทางยกโทษให้เด็ดขาด! พวกแพนเดโมเนียมโซไซตี้! เกเฮนน่า! ทำไมถึงทำเรื่องแบบนี้…!!"
32050-33 = "ฮึ่ก…!"
32050-35 = "อุ๊ยตาย... ตอนนั้นเกิดเรื่องอะไรเหรอคะ..."
32050-36 = "หลังจากไปประชุมกับผู้นำของเกเฮนน่าเรื่องสนธิสัญญาเอเดน... จู่ๆ พี่เค้าก็..."
32050-38 = "แฮ่ก... แฮ่ก... "
32050-39 = "ได้ยินชัดรึเปล่าคะ ฉันจะประกาศแล้วนะคะ"
32050-40 = "ตั้งแต่นี้ฉัน..."
32050-41 = "ฉันจะเริ่มไดเอตค่ะ!!"
32050-43 = "…?!"
32050-44 = "…?!"
32050-45 = "ดะ... ไดเอตเหรอคะ?"
32050-47 = "ใช่ค่ะ! ไดเอต! การควบคุมอาหารนั่นแหละค่ะ!"
32050-48 = "ถ้าเห็นฉันกินมากกว่า 2 มื้อต่อวัน หรือเห็นว่าหยิบของว่างเข้าปากล่ะก็ ตัดสินลงโทษได้เลยทันทีค่ะ!"
32050-49 = "ถ้าไม่บอกกับทุกคนว่ากำลังไดเอตก็จะไดเอตไม่สำเร็จค่ะ! ฉันต้องการความช่วยเหลือจากทุกคนนะคะ!!"
32050-50 = "ระ... รุ่นพี่ฮาสุมิ... เกิดอะไรขึ้นในการประชุมกับเกเฮนน่านะ..."
32050-51 = "…"
32050-52 = "ให้อภัยไม่ได้เด็ดขาดค่ะ!!  กล้ามาก!!  กล้าดียังไง...!!"
32050-55 = "เธอคือเคนซากิ ซึรุกิ อาวุธยุทธศาสตร์อย่างเป็นทางการของทรีนิตี้ใช่ไหม? "
32050-56 = "คะ...? ไม่ใช่ค่ะ ฉันคือ..."
32050-57 = "หลักเกณฑ์อยู่นอกเหนือกว่าที่เคยเสนอมากเลยนะ ไม่น่าพอใจเลย"
32050-58 = "หึหึหึหึ! แต่ท่านมาโคโตะผู้นี้ก็มองทะลุปรุโปร่งว่าจริงๆ แล้วคิดอะไรอยู่! ก็แค่แผนการตื้นๆ#nที่ทำให้อีกฝ่ายหมดพลังตั้งแต่แรกพบ!"
32050-59 = "คะ...?"
32050-60 = "อิโรฮะ! ไปพาตัวซัตสึกิมา เราไม่ยอมให้พวกทรีนิตี้มาหยามกันหรอกนะ!!"
32050-62 = "รุ่นพี่มาโคโตะคะ คนนี้ไม่ใช่คุณซึรุกิ แต่เป็นรองหัวหน้าที่ชื่อคุณฮาสุมิต่างหากค่ะ#nมีเขียนไว้ในเอกสารแล้วนี่คะ"
32050-63 = "และถ้าพูดเรื่องหน้าอกขึ้นมาตอนนี้ ถึงรุ่นพี่ซัตสึกิจะมาก็ไม่มีประโยชน์หรอกค่ะ..."
32050-67 = "อะ... อะไรเนี่ย?!  ไม่ใช่ซึรุกิหรอกรึ?! มะ... มาเป็นตัวแสดงแทนตั้งแต่ตอนไหนกัน!#nมาไม้นี้เพราะดูถูกเรางั้นเรอะ?!"
32050-68 = "โดนจนได้...! นี่คือกับดักสินะ!!  เธอเรียกเรามาที่นี่แล้วทำให้เราเสียขวัญด้วยส่วนสูง#nและหน้าอกหน้าใจที่ใหญ่แบบนั้น! แผนการนี้มัน...!!"
32050-69 = "ก็บอกตั้งหลายครั้งแล้วว่านี่คือคุณฮาสุมิ... ไม่ได้ฟังที่ฉันพูดใช่ไหมคะ? ไม่ได้สนใจจะฟังจริงๆ ด้วยสินะคะ"
32050-70 = "อารมณ์เสียชะมัด หน้าอกมันจะใหญ่อะไรขนาดนั้น...! เหมือนถูกหยามกันเลย...!!#nท่านมาโคโตะแห่งแพนเดโมเนียม โซไซตี้กำลังถูกเหยียดหยาม!!"
32050-71 = "เพ้อเจ้อไปกันใหญ่แล้วค่ะ แล้วก็เลิกพูดถึงเรื่องหน้าอกเถอะค่ะ ฉันก็ขายหน้าในฐานะแพนเดโมเนียม โซไซตี้เหมือนกันนะคะ"
32050-72 = "ฮึ่ม เราจะยอมแพ้ให้สาวคือลือไซซ์ XL คนนั้นไม่ได้ อิโรฮะ! ไปเตรียมของพวกนั้นมา!"
32050-77 = "ไซซ์ XL... งั้นเหรอคะ?"
32050-81 = "ฉันไม่รู้หรอกนะคะว่าให้ไปเตรียมอะไรมา แต่ที่รู้ๆ คือการประชุมครั้งนี้พังไม่เป็นท่าแล้วค่ะ#nสงสัยจะต้องหนีแล้วล่ะค่ะ"
32050-82 = "หืม...?"
32050-86 = "ย้าาาาาก!"
32050-94 = "..."
32050-95 = "..."
32050-96 = "[s] \"........\""
32050-97 = "เห็นว่าการประชุมเละไม่เป็นท่า... และหลังจากนั้นรุ่นพี่ฮาสุมิก็ไม่ค่อยทานข้าวด้วย... "
32050-98 = "เกิดเรื่องแบบนั้นเองสินะคะ... ไม่แปลกใจเลยค่ะที่โมโหพวกเกเฮนน่าขนาดนั้น..."
32050-99 = "[s] \"เป็นห่วงฮาสุมิจัง...\""
32050-100 = "ไม่เป็นไรหรอกค่ะ รุ่นพี่ฮาสุมิน่ะเป็นคนเข้มแข็งออกนะ! หลังจากที่เกิดเรื่อง#nรุ่นพี่เค้าก็รักษาสัญญากับตัวเองอย่างเคร่งครัดเลยด้วย"
32050-101 = "เพราะงั้นไม่เป็นไรหรอก!"
32050-105 = "อ๊ะ! ร้านของหวาน!"
32050-106 = "จริงด้วยค่ะ พอพูดถึงเรื่องกินก็รู้สึกหิวขึ้นมาเลย เราไปกินอะไรที่นั่นกันไหมคะ?"
32050-107 = "พาร์เฟต์ลิมิเต็ดเอดิชั่นที่นี่อร่อยนะคะ! แต่ไม่รู้มาก่อนเลยว่าเปิดขาย 24 ชั่วโมง..."
32050-108 = "พาร์เฟต์... ฟังดูไม่เลวเลยนะ ไปกันเถอะ"
32050-114 = "อะไรนะ?!  อะ... เอาจริงเหรอ?! "
32050-115 = "เอ่อ... คะ... คงไม่มีใครใช่ไหม?"
32050-122 = "เชิญเลยครับ"
32050-123 = "แหะๆๆ ร้านขนมหวานกลางดึก... น่าตื่นเต้นจังเลยนะคะ"
32050-124 = "อืม"
32050-125 = "มาทั้งหมดกี่ท่านครับ? จะรับอะไรดีครับผม?"
32050-126 = "เอ่อ... พาร์เฟต์ลิมิเต็ดเอดิชั่นเหลือกี่ที่เหรอคะ?"
32050-127 = "ขอโทษด้วยนะครับ เรามีพาร์เฟต์นาทีเหลืออยู่ 3 ที่ แต่ลูกค้าคนก่อนหน้าเหมาไปหมดแล้วล่ะครับ..."
32050-128 = "คะ? เหมาทั้ง 3 ชิ้นเลยเหรอคะ... "
32050-129 = "เราช้าไปก้าวเดียว... ดึกดื่นป่านนี้ยังมีคนเหมาของลิมิเต็ดเอดิชั่นกินด้วยเหรอเนี่ย#nจะยอมถูกเหยียดหยามกันไม่ได้"
32050-130 = "โอ๊ะ...?"
32050-131 = "คะ... คุณครู...?"
32050-132 = "[s] \"ฮาสุมิ....?!\""
32050-133 = "ระ... รุ่นพี่ฮาสุมิ...?!"
32050-134 = "โอ๊ะ นั่นมันพาร์เฟต์ลิมิเต็ดเอดิชั่น..."
32050-136 = "(ฮาสุมิกำลังนั่งกินพาร์เฟต์ 3 ถ้วยตรงหน้าอย่างเอร็ดอร่อย)"
32050-138 = "คุณครู... และชมรมชั้นเรียนเสริมทุกคน..."
32050-139 = "อะ... อึ่ก..."
32050-140 = "อุ๊ยตาย♡ คุณฮาสุมิ... มาทานพาร์เฟต์ตั้ง 3 ถ้วยกลางดึกแบบนี้... ฉันก็เข้าใจว่ากำลังไดเอตอยู่ซะอีกนะคะ"
32050-141 = "นะ... นี่น่ะ... คือว่า... อืม..."
32050-142 = "อื้อ ฉันเข้าใจนะคะ ก็คุณฮาสุมิมาที่นี่เพราะถูกดึงดูดจากความปรารถนาที่ไม่อาจต้านทานได้#nในตอนกลางดึกนี่คะ"
32050-143 = "คะ?!  คือว่า..."
32050-144 = "หลังจากที่ทำไปแล้วอย่างสะเปะสะปะ ก็เลยไม่อาจย้อนกลับได้แม้จะได้สติแล้วก็ตาม..."
32050-145 = "[s] \"ฮาสุมิหิวสินะ\""
32050-146 = "คุณครู... ชมรมชั้นเรียนเสริมกำลังออกแคมป์ฝึกฝน ออกมาแบบนี้น่าจะผิดกฎนะคะ..."
32050-150 = "ทุกคนคะ... เราไม่เคยเจอกันที่นี่ ตกลงนะคะ?"
32050-151 = "ระ... รุ่นพี่ฮาสุมิ..."
32050-152 = "โคฮารุ ช่วงนี้ตั้งใจเรียนอยู่ใช่ไหมคะ?"
32050-153 = "เอ่อ คือ... คือว่า..."
32050-154 = "[s] \"โคฮารุคะแนนดีขึ้นเยอะเลยล่ะ\""
32050-156 = "ใช่ค่ะ... ใช่แล้วค่ะ ถ้าโคฮารุจังทำคะแนนได้ดีแบบนี้ ต่อไปก็คงไม่สอบตก..."
32050-158 = "งั้นเหรอคะ?"
32050-159 = "เอ่อ..."
32050-160 = "โล่งอกไปทีค่ะ ฉันก็บอกไปแล้วนี่คะว่าโคฮารุน่ะทำได้ "
32050-161 = "ถึงตอนนั้นฉันจะเอะอะใส่เสียงดัง แต่สุดท้ายแล้วฉันก็รู้ดีค่ะว่าโคฮารุทำได้"
32050-163 = "ตั้งใจเรียนนะคะโคฮารุ"
32050-164 = "อย่าลืมเป้าหมายของเรานะคะ"
32050-165 = "แต่เรื่องแบบนั้นมันหนักเกินไปสำหรับฉันนะ..."
32050-166 = "การหลีกเลี่ยงไม่ให้สอบตก... ภารกิจนี้มันยากเกินไปสำหรับฉันค่ะ..."
32050-167 = "ไม่ค่ะ! ทำได้สิคะ! ต้องทำให้ได้ค่ะ!"
32050-171 = "ขอโทษที่ตวาดใส่นะคะโคฮารุ... แต่หากอยากจะอยู่ด้วยกันต่อ จะสอบตกอีกไม่ได้ค่ะ"
32050-172 = "และเหนือสิ่งอื่นใด เราต้องทำเพื่อคุณครูที่ทุ่มเทให้พวกเราค่ะ สู้ๆ นะคะ เข้าใจไหมคะ?"
32050-173 = "ค่ะ... ฉันจะพยายามค่ะ"
32050-175 = "แหะๆๆ... ฉันจะไม่ทรยศต่อความคาดหวังของรุ่นพี่ฮาสุมิหรอก..."
32050-176 = "ค่ะ ฉันเป็นกำลังใจให้เสมอนะคะโคฮารุ รีบกลับมาที่ชมรมทวงความยุติธรรม#nแล้วไปทำภารกิจด้วยกันนะคะ"
32050-177 = "อื้ม...! รับทราบค่ะ"
32050-178 = "[s] \"บรรยากาศดูอบอุ่นจังนะ...\""
32050-179 = "(ตี๊ดดดดดด)"
32050-180 = "หืม...? ใครติดต่อมา..."
32050-181 = "ค่ะ มีเรื่องอะไรเหรอคะอิจิกะ?"
32050-182 = "อ่า รุ่นพี่ฮาสุมิ รุ่นพี่อยู่ไหนคะ? เกิดปัญหาแล้วล่ะค่ะ"
32050-183 = "ปัญหา... เหรอคะ? อธิบายให้ชัดเจนหน่อย"
32050-184 = "กลุ่มนักเรียนที่คาดว่าเป็นเด็กเกเฮนน่าบุกมาแถวๆ โรงเรียนโดยไม่ได้รับอนุญาตค่ะ พวกนั้นยิงจู่โจม#nแบบไม่เลือกหน้า แล้วก็มาบุกรุกอาคารอำนวยความสะดวกในความดูแลของทรีนิตี้ด้วยค่ะ"
32050-185 = "บุกรุกเหรอคะ...? คณะกรรมการวินัยเกเฮนน่าหรือเปล่า?! ในที่สุดก็แสดงตัวตนที่แท้จริง#nออกมาแล้วสินะ เจ้าพวกแพนเดโมเนียม โซไซตี้...!!"
32050-186 = "อ่า... คือว่า"
32050-187 = "ต้องมาเพื่อขัดขวางสนธิสัญญาเอเดนแน่นอนค่ะ! พวกนั้นมากันกี่กองร้อยคะ?!#nพิกัดอยู่ตรงไหนคะ?!  แล้วอาคารไหนบ้างคะที่ถูกบุกรุก?"
32050-188 = "ใจเย็นก่อนนะคะรุ่นพี่ พวกนั้นไม่ใช่คณะกรรมการวินัยของเกเฮนน่าค่ะ#nแล้วก็ไม่ได้มีกองกำลังเป็นกองร้อย แต่มาแค่ 4 คนค่ะ"
32050-189 = "ไม่ใช่คณะกรรมการวินัย... และมีแค่ 4 คนเหรอคะ?"
32050-190 = "ค่ะ ส่วนอาคารที่ถูกบุกรุกคือ... อควาเรียมที่อยู่ใกล้ๆ ค่ะ"
32050-191 = "อควาเรียม...? พะ... พิพิธภัณฑ์สัตว์น้ำเหรอคะ? ไปที่นั่นทำไม..."
32050-192 = "ฉันเองก็ไม่รู้ค่ะ แต่พวกนั้นปล้นปลามากุโร่สีทองหายากที่กำลังจัดโชว์อยู่ไป แล้วก็กำลังหลบหนีอยู่ค่ะ"
32050-193 = "มากุโร่สีทอง...?"
32050-194 = "เห็นว่าเป็นปลาที่มีมูลค่ามากเลย น่าจะเป็นอาชญากรที่ต้องการของมีค่า... สักครู่นะคะ#nเราได้ข้อมูลของกลุ่มนั้นมาแล้วค่ะ"
32050-195 = "กลุ่มก่อการร้ายของเกเฮนน่าที่ได้ชื่อว่า <ชมรมชิมอาหาร> ค่ะ"
32050-198 = "ผู้นำก็คือคุโรดาเตะ ฮารุนะ ได้ชื่อว่าเป็นบุคคลอันตรายที่เฝ้าระวังเป็นพิเศษของเกเฮนน่าค่ะ รีบสั่งการเถอะค่ะรุ่นพี่!"
32050-200 = "อ๊าาา! ทำไมมาถึงที่นี่ล่ะเนี่ย! นี่มันใจกลางทรีนิตี้เลยนะ!"
32050-201 = "แต่เราได้ข่าวของปลามากุโร่สีทองมาทั้งที จะให้ทำยังไงได้ล่ะคะ? ใครล่ะจะไปอดใจไหว★"
32050-202 = "ฮุฮุฮุ เอาปลาทูน่าในตำนานมาไว้ดูเล่นเฉยๆ งั้นเหรอ? แบบนี้ถือว่าเสียมารยาทให้กับอาหารรสเลิศนะคะ"
32050-203 = "อาหารรสเลิศต้องเลิศเลออีกนิด และเข้าถึงได้ง่ายอีกหน่อย..."
32050-204 = "ฉันว่าปลามากุโร่สีทองตัวนี้ก็คงไม่อยากเป็นสิ่งดึงดูดความสนใจ#nแล้วตกเป็นเหยื่อของการหาเงินหรอกค่ะ"
32050-205 = "ฉันก็แค่ฟังเสียงในใจของเจ้าปลาตัวนี้! คุณฟูกะก็ด้วยใช่ไหมคะ?"
32050-206 = "อื้อ! อื้อ อื้ออ!!"
32050-207 = "เห็นไหมคะ? หัวหน้าชมรมโภชนาการของเกเฮนน่าก็เห็นด้วยนะคะ!"
32050-208 = "ฉันได้ยินไม่ถนัดก็เลยไม่รู้ว่าพูดอะไร แต่ก็เอาเถอะค่ะ★"
32050-209 = "อ๊าก ปลาสะบัดตัวใหญ่แล้ว! ครีบมันกำลังตบแก้มอยู่นะ!!"
32050-210 = "จับให้แน่นนะอิซุมิ!!  มันแพงมากเลยนะ!"
32050-211 = "แล้วเราจะได้กินเมื่อไหร่เหรอ? ปลากำลังตบแก้มตัวเองอยู่ ส่วนเราก็ถูกเด็กในชุดกะลาสี#nสีดำตามไล่อยู่นะ!"
32050-212 = "ชมรมทวงความยุติธรรมของทรีนิตี้นี่นา!!  โดนจับได้จนได้ พวกนั้นน่ากลัว#nเหมือนคณะกรรมการวินัยเลยนะ! เราจะหนีได้เหรอฮารุนะ?"
32050-213 = "ฮุฮุฮุ เรื่องหนีได้หรือไม่ได้ มันไม่สำคัญหรอกค่ะ "
32050-214 = "เพราะสิ่งที่สำคัญคือ กินได้หรือไม่ได้ไงล่ะ!"
32050-215 = "เราต้องเลือกแล้วล่ะ เลือกระหว่าง[ruby=eat or die]จะกินหรือจะยอมตาย[/ruby]! นี่คือหนทางอันสูงส่งที่นักชิมจะต้องเดินค่ะ!"
32050-216 = "สรุปก็คือ ต้องเจอความโกลาหล★ ยังไงล่ะคะ "
32050-220 = "เลิกพูดสุนทรพจน์ได้แล้ว รีบเผ่นเร็วเข้า!! "
32050-221 = "เอาล่ะ รีบฝ่าวงล้อมแล้วล่าถอยกันเถอะค่ะ! เราจะไปกินซาชิมิมากุโร่ของคุณฟูกะกัน!!"

[translation]
32050-1 = "Episode 5;Midnight Commotion Part 1"
32050-2 = "Heeheehee. ♥ "
32050-3 = "Well...here we are."
32050-4 = "See? Isn't this fun? There's nothing like the guilty pleasure of doing something you're not supposed to, mixed with the elation of doing it with others."
32050-5 = "So this is what the district is like at this hour. It's much more vibrant than I expected."
32050-6 = "That's right. A lot of stores stay open 24 hours a day."
32050-7 = "That bakery is still open? And that cafe over there too..."
32050-8 = "A little further up the road is a Momo Friends merch store that's fully automated. And across the street from that is a secondhand shop that only sells limited-edition collectibles."
32050-9 = "Well, well. You sure know your way around the neighborhood."
32050-10 = "A-Ahaha..."
32050-14 = "Ugh. Why did I have to tag along? I'll be in for a world of hurt if Hasumi catches me out here."
32050-15 = "Really? She must be pretty strict with her underclassmen. I always thought she seemed like a kind girl."
32050-16 = "Th-That's because she is! Hasumi is kind, intelligent, strong, and carries herself with dignity and grace!"
32050-17 = "Her temper is...just as peerless as her other aspects."
32050-18 = "[s] \"She doesn't get mad often, but when she does... Right?\""
32050-19 = "Yeah. There was that one time..."
32050-21 = "JTF Club Room"
32050-26 = "..."
32050-27 = "..."
32050-28 = "V-Vice President Hasumi, please calm down..."
32050-32 = "How dare they?! Pandemonium Society! Gehenna! Do they think they'll get away with this?!"
32050-33 = "Ahhhhhh!"
32050-35 = "Goodness. What caused her to be so upset?"
32050-36 = "She was returning from a meeting with Gehenna's leaders about the Eden Treaty when suddenly..."
32050-38 = "*pant* *pant*..."
32050-39 = "Listen carefully."
32050-40 = "This isn't over..."
32050-41 = "From this point on, I'll be going on a diet!"
32050-43 = "...?!"
32050-44 = "...?!"
32050-45 = "Did you say...diet?"
32050-47 = "Yes, a diet! I'm going to lose weight! "
32050-48 = "From this moment on, if you catch me eating more than two meals a day or snacking, you have every right to slap the food out of my hand and give me a piece of your mind!"
32050-49 = "Dieting can be hard if you're doing it by yourself, so that's why I'm allowing you all to keep me accountable. I need your help!"
32050-50 = "Wh-What exactly happened in that meeting with Gehenna...?"
32050-51 = "..."
32050-52 = "Unforgivable... She went way over the line!"
32050-55 = "So you must be the one they call Trinity's secret weapon, Kenzaki Tsurugi. "
32050-56 = "Pardon? No, I'm..."
32050-57 = "You're much more of a woman than I was expecting. Almost offensively so."
32050-58 = "Heh heh! So, that's how Trinity wants to play it, eh? Trying to break our morale at the start of our first meeting?! How shallow!"
32050-59 = "Huh?"
32050-60 = "Iroha! Go get Satsuki. I won't allow Trinity to look down upon us!"
32050-62 = "Makoto, this isn't President Tsurugi—this is their vice president, Hasumi. I told you she'd be coming in the documentation I handed you."
32050-63 = "And if you're referring to her bust, then I don't know what good bringing Satsuki here will do."
32050-67 = "WH-WHAT?! They sent a stand-in?! How insulting! Are they mocking us?!"
32050-68 = "We've been had! This meeting is nothing but a ploy! Did they only wish to demoralize us with their tall heights and large busts?!"
32050-69 = "No, this is why I tried to inform you that we were expecting Hasumi. Are you even listening to me? You're not, are you?"
32050-70 = "How DARE you underestimate me! Do you think you can intimidate me with your unflatteringly large chest?!"
32050-71 = "Please calm down. And please stop mentioning her bust. You're embarrassing the Pandemonium Society."
32050-72 = "I refuse to surrender to this giantess, Iroha. Prepare you-know-what!"
32050-77 = "Giant...?"
32050-81 = "I don't know what you're talking about, but I think it's safe to say that the meeting is a failure. I advise that we secure an escape route."
32050-82 = "Huh?"
32050-86 = "AHHHHHH!!!"
32050-94 = "..."
32050-95 = "..."
32050-96 = "[s] \"...\""
32050-97 = "I heard Hasumi hasn't been eating very well ever since that meeting went south."
32050-98 = "No wonder she holds a grudge against Gehenna."
32050-99 = "[s] \"Now I'm worried about her too.\""
32050-100 = "Hasumi is a strong person, though! She's still keeping the vow she made, even after all she went through."
32050-101 = "I'm sure she'll be all right."
32050-105 = "Look. There's another bakery here too."
32050-106 = "My sweet tooth is starting to get a craving after that story. Should we pop in and see what they have?"
32050-107 = "Oh, the special parfaits they have here are amazing! I didn't know they stayed open 24 hours a day..."
32050-108 = "Parfaits? That sounds perfect. Let's go."
32050-114 = "Wh-Why the rush?! "
32050-115 = "Um... I hope nobody sees me here."
32050-122 = "Welcome."
32050-123 = "Wow, we're really out in the middle of the night getting dessert. This is so exciting!"
32050-124 = "Hmm."
32050-125 = "Party of five? What can I get for you?"
32050-126 = "Um...do you still have that special parfait on the menu?"
32050-127 = "I'm sorry. We do, but we just sold the final three we had tonight to our last customer."
32050-128 = "Oh, that's too bad... "
32050-129 = "Beat to the punch. I didn't expect such fierce competition at this hour. How naive of me."
32050-130 = "Oh?"
32050-131 = "S-Sensei?"
32050-132 = "[s] \"Hasumi?!\""
32050-133 = "H-Hasumi?!"
32050-134 = "Those wouldn't happen to be parfaits you're carrying, are they?"
32050-136 = "Hasumi was in fact holding three special parfaits."
32050-138 = "I didn't expect to run into the Make-Up Work Club and Sensei here."
32050-139 = "Uh-oh..."
32050-140 = "Fancy meeting you here, Hasumi. I'm even more surprised to see you eating three parfaits. Aren't you on a diet?"
32050-141 = "Y-Yes. About that..."
32050-142 = "Let me guess. You had a craving you just couldn't curb, so you came all the way here for some of your favorite desserts."
32050-143 = "N-No! I-I mean..."
32050-144 = "You gave in to your delectable desires and before you knew it, it was too late. There was no turning back."
32050-145 = "[s] \"I can't say I blame you.\""
32050-146 = "Sensei. I don't believe the Make-Up Work Club is permitted to leave the school grounds during boot camp."
32050-150 = "So if you'll keep my secret, then I'll keep yours."
32050-151 = "H-Hasumi..."
32050-152 = "How are your studies going, Koharu?"
32050-153 = "Well, um..."
32050-154 = "[s] \"Her scores keep going up.\""
32050-156 = "That's right! Koharu will be passing in no time at this rate."
32050-158 = "You don't say?"
32050-159 = "Uh..."
32050-160 = "That's good to hear. I told you you could do it."
32050-161 = "Don't you remember?"
32050-163 = "Please keep studying hard, Koharu."
32050-164 = "Don't lose sight of your goal."
32050-165 = "But I don't think I can do it..."
32050-166 = "How am I supposed to cram all of this in and get my grades up? I'm not cut out for this mission..."
32050-167 = "There's no other choice! It must be done!"
32050-171 = "Forgive me for raising my voice, but the only way you'll be able to stay with us is by passing your exams."
32050-172 = "If not for me, then do it for Sensei and all the effort that's been made to help us. Okay?"
32050-173 = "All right. I'll try."
32050-175 = "Heehee. I wouldn't want to let you down, Hasumi. "
32050-176 = "And I'm always rooting for you. I look forward to you returning to the Justice Task Force soon and joining us on our missions."
32050-177 = "It's a promise!"
32050-178 = "[s] \"So pure.\""
32050-179 = "*beep* *beep* *beep* *beep* *beep*"
32050-180 = "Encrypted communication? At this hour?"
32050-181 = "Yes, Ichika? What's going on?"
32050-182 = "We have a problem, Hasumi. What's your location?"
32050-183 = "A problem? Please explain."
32050-184 = "Students presumed to be from Gehenna are trespassing near the academy. They've opened fire and are attacking Trinity facilities."
32050-185 = "Is it the Gehenna Prefect Team? So, they've finally played their hand. Those Pandemonium Society scum!"
32050-186 = "Well, the thing is..."
32050-187 = "They must be trying to interfere with the Eden Treaty! What's the size of their forces? How many squadrons, and what facilities have they targeted?!"
32050-188 = "Calm down. First of all, it's not the Prefect Team, and there are zero squadrons. There's only four of them."
32050-189 = "Just four...? And it's not the Prefect Team?"
32050-190 = "Yes. The attacked facility has been confirmed as...the nearby aquarium."
32050-191 = "Why would they attack there?"
32050-192 = "They've stolen the Gold Maguro, a rare fish that was on display, and are now on the run."
32050-193 = "The Gold Maguro?"
32050-194 = "It's said to be a very expensive fish, so they may aim to sell it. We just confirmed this organization's identity."
32050-195 = "The Gourmet Research Society, a terrorist group from Gehenna."
32050-198 = "Their leader is Kurodate Haruna, someone considered very dangerous by Gehenna! Please hurry and give us your orders, Vice President!"
32050-200 = "Hey! Why the heck did we decide to hit a place like this?! We're in the middle of Trinity's district!"
32050-201 = "What other choice did we have? We needed to secure the Gold Maguro no matter what! ★"
32050-202 = "How could they keep a legendary tuna fish under lock and key, only to be admired through a fish tank? Have they no respect for the gourmet?"
32050-203 = "Fine food is something more noble and ubiquitous."
32050-204 = "The Gold Maguro wouldn't want to be on display just to make the rich richer."
32050-205 = "We're merely doing what must be done! Isn't that right, Fuuka?"
32050-206 = "Hnnngh! Hnnnnnngh!"
32050-207 = "See? The School Lunch Club president agrees so vehemently that she's been moved to tears."
32050-208 = "I think that has more to do with the gag in her mouth. ★"
32050-209 = "Ack! The tuna keeps flapping around! It's hitting me with its fins!"
32050-210 = "Don't you dare drop that fish, Izumi! It's priceless!"
32050-211 = "Can't we just eat it already?! It's hard enough to hold on to it but now we have those girls in black sailor uniforms chasing us!"
32050-212 = "That's the Trinity Justice Task Force! They're just as scary as the Prefect Team. How are we gonna get out of here, Haruna?"
32050-213 = "Whether we escape or not isn't important. "
32050-214 = "The only thing that matters is who has the last bite!"
32050-215 = "That is our club's motto: Eat or Die! It's the dignified path all gourmands must accept!"
32050-216 = "And that's all that matters! ★ "
32050-220 = "We're a lot closer to dying than eating, so get a move on! "
32050-221 = "Let us break through this siege and make our retreat! Then we'll have our dearest Fuuka here prepare her famous sashimi for us!"
32050-222 = "Hnnngh! Hnnnnnngh!"
32050-224 = "Next Episode;Midnight Commotion Part 2"

[translation]
31020-1 = "第2話;補課部"
31020-2 = "我受夠了！！"
31020-3 = "這種事我受夠了！搞不懂！好無聊！好麻煩！！"
31020-4 = "這全都是老師的錯！！"
31020-5 = "[s]「我……？」"
31020-8 = "真是的，小春醬。說那種不合理的話，老師會很困擾的哦？"
31020-9 = "老師終究只是來幫我們的而已……#n考試之所以不及格，原則上也是小春醬自己的錯……"
31020-10 = "唔……！！"
31020-11 = "因，因為我是實現正義部的一員！#n所以才會常常沒辦法出席課程……沒錯！就是因為這樣！"
31020-12 = "這點其他實現正義部的成員也是一樣。#n但是來這裡的人只有小春。"
31020-13 = "……"
31020-14 = "哎呀？梓醬想表達的意思是小春醬是個小笨蛋嗎？"
31020-15 = "不，雖然要這麼解釋也不是不行……但我的意思是人生往往就是這樣的。"
31020-16 = "活著就是受苦……真是意味深長的話呢。"
31020-17 = "在，在，在說什麼啊！！你們不是也都不及格嗎！為什麼只有我是笨蛋！#n如果我是笨蛋的話這裡所有人都是笨蛋吧笨──蛋！！！！"
31020-18 = "啊，啊哈哈……那個，大家…… "
31020-19 = "因為是笨蛋才會在補課部不是嗎！所有人都是笨蛋！"
31020-20 = "你！"
31020-21 = "和你！！"
31020-22 = "你也是！！！"
31020-26 = "你也一樣！！！！"
31020-27 = "[s]「咦！？怎麼連我也算進來了？」"
31020-28 = "啊嗚……小，小春醬，稍微冷靜一點……"
31020-29 = "怎麼可能冷靜得下來啊！在這個大家就快要手牽手一起被退學的狀況下……！"
31020-30 = "要是被退學的話……就，就不再是實現正義部的成員了……嗚……"
31020-31 = "當然我也沒有要被退學的打算。#n不管要做什麼……就算留下悲慘的回憶，我也會努力克服。"
31020-32 = "哎呀哎呀，就算被退學也不代表人生就結束了嘛。不如說……"
31020-33 = "那，那個！！"
31020-34 = "……"
31020-35 = "……"
31020-36 = "……"
31020-41 = "啊，啊嗚……之所以像這樣聚在一起，也是為了避免被退學……"
31020-42 = "現在應該要集合大家的智慧，找找看有沒有什麼好辦法才對……"
31020-43 = "不然的話，一週後我們真的就會相親相愛地全員退學的……"
31020-44 = "集合大家的智慧……這種說法好像有點搔不到癢處呢？#n該說是有點曖昧，還是略顯保守……"
31020-45 = "我想想……改成「把柔弱敏感的地方緊密相連」如何？"
31020-50 = "突，突然在說什麼啊！？下流哏是不行的！禁止！死刑！！#n說，說什麼敏感的部分，是要把什麼東西怎麼樣緊密相連啊！？"
31020-51 = "哎呀？果然不實際體驗一下是沒辦法想像的嗎……小春醬？"
31020-55 = "……咦？咦！？ "
31020-58 = "不，不要！別靠近我！我不知道也不想知道還太早了啦！！ "
31020-59 = "嘿咿♡"
31020-63 = "不，不要……！不要啊！救，救救我老師……！"
31020-64 = "是，是我錯了面對前輩還亂講話非常對不起！#n拜託停下來──！！！！"
31020-65 = "原來如此，還有這種壓制方式。近身戰的時候似乎能派上用場……受教了。"
31020-66 = "不過多餘的動作有點多。#n換作是我會在那一步折斷關節。"
31020-68 = "…… "
31020-69 = "老，老師……"
31020-70 = "[s]「……嗯，我會加油的，日步美。」"
31020-71 = "非，非常感謝……"
31020-72 = "不然再這樣下去……我們真的會一起被退學的……啊嗚嗚……"
31020-74 = "（事情的開端，要追溯到數週前……）"
31020-76 = "三一．露臺"
31020-78 = "您好，[USERNAME]老師。初次見面。"
31020-79 = "我是茶會的主席桐藤渚。"
31020-81 = "而這位是同屬茶會的聖園彌香同學。"
31020-82 = "三一的[ruby=TeaParty]茶會[/ruby]，在此向夏萊的老師問好。"
31020-84 = "下一話;茶會"

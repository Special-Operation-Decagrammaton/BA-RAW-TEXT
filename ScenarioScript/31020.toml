[translation]
31020-1 = "第2話;補習授業部"
31020-2 = "もう嫌っ！！"
31020-3 = "こんなことやってらんない！分かんない！つまんない！めんどくさい！！"
31020-4 = "それもこれも、全部先生のせい！！"
31020-5 = "[s] \"えぇ、私……？\""
31020-8 = "もう、コハルちゃん。そんな無茶苦茶なことを言ったら、先生が困ってしまうでしょう？"
31020-9 = "あくまで先生は私たちを助けるために来てくださってるんですし……そもそも勉強が分からないのも試験に落ちたのも、先生ではなくコハルちゃん自身のせいで……。"
31020-10 = "うっ……！！"
31020-11 = "わ、私は正義実現委員会の一員だから！それで、授業に出られないことが多くて……そう！そのせいなの！"
31020-12 = "それは他の正義実現委員会のメンバーも同じだ。でもここに来てるのはコハルだけ。"
31020-13 = "……。"
31020-14 = "なるほど。つまりアズサちゃんが言おうとしているのは、ただただコハルちゃんがおバカさんだからですよ、ということで合ってますか？"
31020-15 = "まあ、それも強ち間違ってはいない。仕方のないものは仕方ない、人生は往々にして虚しいものだ。"
31020-16 = "確かに人生は苦痛の連続ですからね……そういうこともあります。"
31020-17 = "ああもう、うるさいなぁっ！？そんなこといったらあんたたちもみんな一緒じゃん！私がバカならここにいる全員バカでしょバーカ！！！！"
31020-18 = "あ、あはは……えっと、それはその……。"
31020-19 = "な、何も間違ってないでしょ？バカだからここにいるんでしょ！？"
31020-20 = "あんたも！"
31020-21 = "あんたも！！"
31020-22 = "あんたも！！！"
31020-26 = "あんたもっ！！！！"
31020-27 = "[s] \"私は一応、先生なんだけどな……？\""
31020-28 = "あう……こ、コハルちゃん、ちょっと落ち着いて……。"
31020-29 = "落ち着いてなんていられないわよ！みんな仲良く退学になりそうな、こんな状況で……！"
31020-30 = "もし退学になったら……せ、正義実現委員会のメンバーじゃ、なくなっちゃう……うぅ……。"
31020-31 = "もちろん私も、退学になるつもりはない。何をしてでも、例え惨めな思いをしてでも、乗り越えてみせる。"
31020-32 = "まあまあ、退学になったからといって何もかもが終わりというわけではありませんから、気楽に行きましょう。むしろ……"
31020-33 = "あ、あのっっっ！！"
31020-34 = "……。"
31020-35 = "……。"
31020-36 = "……。"
31020-41 = "あ、えっと、その……こうして集まっているのは、そもそも退学せずに済むようにするためですし……。"
31020-42 = "取り合えずその、今はみんなで知恵を寄せ合って、何か良い方法を探さないと……。"
31020-43 = "そうしないと、一週間後には本当に仲良く全員退学、なんてことに……。"
31020-44 = "「知恵を寄せ合う」……なるほど。悪くないのですが、あまりグッと来る感じではありませんね。もう少しこう、何か……。"
31020-45 = "ここは例えば、そうですね……「弱くて敏感な部分を寄せ合う」、という形でいかがでしょう？"
31020-50 = "い、いきなり何言ってんの！？下ネタはダメ！禁止！死刑！！び、敏感な部分って、何をどう寄せ合おうっていうわけ！？"
31020-51 = "ああ、ちょっと分かりにくかったですか？では、実際にやってみせましょうか。もう少しこう、脚を開いていただいて……"
31020-55 = "……え？えっ！？"
31020-58 = "や、やめて！近づかないで！知らないし分かりたくもないしまだ早いからっ！！"
31020-59 = "えいっ♡"
31020-63 = "や、やめっ……！やめてぇっ！たっ、助けて先生……！"
31020-64 = "わっ、私が悪かったです先輩相手にタメ口ですみませんでした！もう許してやめてっ、それはまだ嫌ぁーーー！！！！"
31020-65 = "なるほど、そういう制圧術もあるのか。白兵戦で使えそうだ……勉強になった。"
31020-66 = "ただ、無駄な動作が多い気がするな。私ならあと2テンポ前の段階で、関節をきめてる。"
31020-68 = "……。"
31020-69 = "せ、先生ぇ……。"
31020-70 = "[s] \"……うん、私も頑張るね。\""
31020-71 = "よ、よろしくお願いします……。"
31020-72 = "このままだと、本当に……私たちみんな、退学に……。"
31020-74 = "（話の発端は、数週間前にさかのぼる……）"
31020-76 = "トリニティ・テラス"
31020-78 = "こんにちは、[USERNAME]先生。こうしてお会いするのは初めまして、ですね。"
31020-79 = "ティーパーティーのホスト、[ruby=きりふじ]桐藤[/ruby]ナギサと申します。"
31020-81 = "そしてこちらは、同じくティーパーティーのメンバー、[ruby=みその]聖園[/ruby]ミカさんです。"
31020-82 = "あらためまして、お初にお目にかかります。私たちがトリニティの生徒会、ティーパーティーです。"
31020-84 = "次回;ティーパーティー"

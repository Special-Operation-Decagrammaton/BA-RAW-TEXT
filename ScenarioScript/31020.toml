[translation]
31020-1 = "Episode 2;Make-Up Work Club"
31020-2 = "I can't stand this anymore!"
31020-3 = "I'm in agony! Torment! Misery!"
31020-4 = "A-And it's all your fault, Sensei!"
31020-5 = "[s] \"Me?\""
31020-8 = "You're going to hurt Sensei's feelings if you keep saying things like that, Koharu."
31020-9 = "Remember, they're only here to help us... Besides, Sensei only came to help after you'd already failed your past exams, right?"
31020-10 = "...!"
31020-11 = "I-I'm a member of the Justice Task Force! It's not my fault I have to miss so many classes!"
31020-12 = "Strange. The same applies to the other Justice Task Force members, yet you're the only one who failed, Koharu."
31020-13 = "..."
31020-14 = "Goodness, Azusa. Are you trying to tell Koharu she isn't intelligent?"
31020-15 = "You can interpret it that way, but the reality is that sometimes life is just like this."
31020-16 = "You mean that life is agony, torment, and misery like she said? That's deep."
31020-17 = "Wh-Why am I the one being singled out?! You all failed too! If I'm dumb, then so are all of you!"
31020-18 = "A-Ahaha... You guys..."
31020-19 = "Idiots—the whole lot of you! That's why you're all in the Make-Up Work Club to begin with!"
31020-20 = "You!"
31020-21 = "And you!"
31020-22 = "And YOU!"
31020-26 = "And you too!"
31020-27 = "[s] \"What did I do?!\""
31020-28 = "Okay, Koharu. Deep breaths. Calm down."
31020-29 = "Calm down?! We're all going to be expelled!"
31020-30 = "And if I'm expelled, I'll be kicked out of the Justice Task Force. Anything but that..."
31020-31 = "I can at least sympathize on that front. Expulsion is not an option. I won't go down without a fight, no matter how futile it may seem."
31020-32 = "Haha. I dunno. Getting expelled doesn't seem like the end of the world. Rather..."
31020-33 = "Excuse me?!"
31020-34 = "..."
31020-35 = "..."
31020-36 = "..."
31020-41 = "S-Sorry for yelling. What I mean to say is, the whole reason we're here is to avoid being expelled."
31020-42 = "But if we don't start putting our heads together..."
31020-43 = "...we'll all be expelled in a week."
31020-44 = "I think this needs something more than a cliché like \"put our heads together\" to solve. What if we thought outside the box instead? "
31020-45 = "Like...\"Let's put our bodies together!\" How does that sound?"
31020-50 = "Get your head out of the gutter unless you want the death penalty, you perv! Can you even hear yourself? That doesn't even make sense!"
31020-51 = "My, you don't have a very active imagination, do you, Koharu? We could always try it out together."
31020-55 = "Wh... WHAT?!"
31020-58 = "Back it up! P-Personal space! I don't wanna know!"
31020-59 = "Here I come! ♥"
31020-63 = "No, let me go! Save me, Sensei! I'm sorry! I'm sorry...!"
31020-64 = "I'm sorry I snapped at you, Hanako! Please let me go!"
31020-65 = "Fascinating. I've never seen such an effective restraining method in close-quarters combat. This will prove most useful."
31020-66 = "But I would've twisted her joints first. You made too many unnecessary moves with your hands."
31020-68 = "..."
31020-69 = "Sensei... Please..."
31020-70 = "[s] \"I'll try, Hifumi, but no promises.\""
31020-71 = "Thank you, Sensei."
31020-72 = "We're all going to be expelled at this rate..."
31020-74 = "(A few weeks earlier.) "
31020-76 = "Trinity Tea Party Room"
31020-78 = "Hello, [USERNAME] Sensei. It's good to meet you."
31020-79 = "I'm Kirifuji Nagisa, the host of the Tea Party. "
31020-81 = "And this is Misono Mika, a member of the Tea Party like myself."
31020-82 = "Trinity's Tea Party hereby welcomes Schale's Sensei."
31020-84 = "Next Episode;Tea Party"

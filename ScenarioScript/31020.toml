[translation]
31020-1 = "ตอนที่ 2;ชมรมชั้นเรียนเสริม"
31020-2 = "มันน่าเศร้านัก!!"
31020-3 = "ทั้งเศร้า หม่นหมอง เจ็บปวด!"
31020-4 = "ทั้งหมดนี้เป็นเพราะคุณครูเลย!"
31020-5 = "[s] \"ครูเหรอ?\""
31020-8 = "ตายจริง โคฮารุจัง ถ้าพูดแบบนั้น คุณครูก็ลำบากแย่สิคะ"
31020-9 = "คุณครูอุตส่าห์มาช่วยพวกเราเลยนะ... การที่สอบไม่ผ่าน มันไม่ใช่เพราะคุณครู#nแต่เป็นเพราะโคฮารุเอง..."
31020-10 = "!!"
31020-11 = "ฉัน.. ฉันอยู่ในชมรมทวงความยุติธรรมนะ! ไม่แปลกที่ต้องโดดเรียนอยู่หลายครั้ง...#nก็... ก็เลยออกมาเป็นแบบนั้นไงล่ะ!"
31020-12 = "แต่คนอื่นในชมรมทวงความยุติธรรมก็ไม่เข้าเรียนเหมือนกันนี่ แต่ในชมรม..#nมีโคฮารุคนเดียวเท่านั้นที่สอบไม่ผ่าน"
31020-13 = "......"
31020-14 = "ตายจริง? อาซึสะจังกำลังบอกว่าโคฮารุจังเป็นคนหัวไม่ดีงั้นเหรอคะ?"
31020-15 = "เปล่า... ถึงมันจะเป็นเรื่องจริงก็เถอะ แต่ที่ฉันจะบอกคือ ชีวิตมันก็เป็นแบบนี้แหละ"
31020-16 = "ชีวิตคือ... ความเจ็บปวดเหรอคะ? ช่างลึกซึ้งอะไรแบบนี้กันนะคะ"
31020-17 = "พะ.. พูดอะไรของพวกเธอกันน่ะ!! พวกเธอก็สอบไม่ผ่านกันหมดไม่ใช่เหรอ?!#nแล้วทำไมถึงว่าฉันโง่อยู่คนเดียวล่ะ? ถ้างั้นทุกคนที่อยู่ที่นี่ก็โง่กันหมดนั่นแหละ!"
31020-18 = "อ่า... แหะๆ... คือว่าทุกคน..."
31020-19 = "ทุกคนหัวไม่ดี ก็เลยมาเข้าชมรมชั้นเรียนเสริมกันยังไงล่ะ! ก็โง่ด้วยกันหมดนั่นแหละ!"
31020-20 = "เธอด้วย!"
31020-21 = "เธอด้วย!"
31020-22 = "เธอก็ด้วย!"
31020-26 = "นี่ก็อีกคน!"
31020-27 = "[s] \"หืม?! ครูด้วยเหรอ?\""
31020-28 = "อ่า... โคฮารุจัง... ใจเย็นๆ ก่อนนะ..."
31020-29 = "จะให้ใจเย็นๆ อยู่ได้ไงล่ะ! ทุกคนจะโดนไล่ออกจากโรงเรียนอยู่แล้วนะ!"
31020-30 = "ถ้าถูกไล่ออก... ก็ต้องออกจากชมรมทวงความยุติธรรมด้วย... ใครจะไปยอมกันล่ะ..."
31020-31 = "ใช่ ฉันไม่อยากโดนไล่ออก ฉันจะดิ้นรนทำทุกวิถีทาง แม้จะต้องทนทุกข์ยากก็ตาม"
31020-32 = "ฮุฮุ แต่ถึงโดนไล่ออกก็ไม่ใช่ว่าชีวิตจะสิ้นสุดนี่คะ ดีไม่ดีอาจจะ..."
31020-33 = "คือว่า.. ทุกคนคะ!!"
31020-34 = "......"
31020-35 = "......"
31020-36 = "......"
31020-41 = "คือว่า... คือ... ฉันจะบอกว่า... ที่เรามารวมกันอยู่ที่นี่... ก็เพื่อป้องกันไม่ให้ถูกไล่ออกจากโรงเรียน..."
31020-42 = "เพราะฉะนั้นถ้าเราไม่ระดมสมองแล้วช่วยกันคิดหาทางออกล่ะก็..."
31020-43 = "มีหวังทุกคนได้ถูกไล่ออกภายในหนึ่งสัปดาห์แน่ค่ะ..."
31020-44 = "ระดมสมอง... เหมือนที่บอกว่าเอาหัวมาชนกันงั้นเหรอคะ? คำนี้มัน... มันก็ไม่ได้แย่นะคะ#nแต่มันก็ฟังดูกำกวม... สำหรับพวกเรา..."
31020-45 = "พูดว่าเอาท้องมาชนกัน น่าจะเหมาะมากกว่า... นะ..."
31020-50 = "หยุดเลย! อย่ามาพูดสองแง่สองง่ามนะ! ห้ามเด็ดขาด! จะเอาท้องมาชนกันทำไมล่ะ?#nต้องทำยังไงถึงจะอยู่ในท่าที่ชนกันได้เหรอ?"
31020-51 = "ตายจริง? ถ้ายังไม่เคยลองทำ ก็น่าจะจินตนาการลำบากนะคะ โคฮารุจัง....?"
31020-55 = "ฮะ? วะ.. ว่าไงนะ?"
31020-58 = "ยะ... หยุดเลย! อย่าเข้ามานะ! มะ.. ไม่อยากรู้แล้ว!"
31020-59 = "อ๊าา ♡"
31020-63 = "อึ้ยยยย! หยุดนะ! ช่วยด้วยค่ะคุณครู รุ่นพี่คะ! ฉันผิดไปแล้วค่ะ...! ฉันผิดเอง...!"
31020-64 = "ขอโทษที่พูดแบบไม่มีหางเสียงค่ะ! ฮืออออ ยกโทษให้ฉันเถอะค่ะ...!"
31020-65 = "อืม นี่มันเทคนิคการกดขี่ศัตรูในสนามรบสินะ ได้เรียนรู้อะไรใหม่ๆ แล้ว"
31020-66 = "แต่ถ้าเป็นฉันคงข้อต่อหักไปแล้วล่ะ ทำไมต้องใช้มือเยอะขนาดนั้นด้วย"
31020-68 = "......"
31020-69 = "คุณครูคะ... ได้โปรด..."
31020-70 = "[s] \"อื้ม ครูจะพยายามนะฮิฟุมิ\""
31020-71 = "ขอบคุณนะคะ..."
31020-72 = "ถ้าขืนปล่อยให้เป็นแบบนี้... พวกเราโดนไล่ออกกันหมดแน่ค่ะ... อ่า..."
31020-74 = "(ไม่กี่สัปดาห์ก่อนเกิดเรื่อง)"
31020-76 = "ห้องชงชาทรีนิตี้"
31020-78 = "สวัสดีค่ะคุณครู [USERNAME] ยินดีที่ได้พบค่ะ"
31020-79 = "ฉันคือคิริฟุจิ นางิสะ เป็นโฮสต์ของสภาน้ำชาในครั้งนี้ค่ะ"
31020-81 = "และทางนี้คือคุณมิโซโนะ มิกะ สมาชิกสภาน้ำชา"
31020-82 = "นี่เป็นครั้งแรกที่สภาน้ำชาของทรีนิตี้ได้พบกับคุณครูจากชาเล่ต์ค่ะ"
31020-84 = "ตอนต่อไป;สภาน้ำชา"

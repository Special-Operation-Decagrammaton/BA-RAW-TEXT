2004608-22 = "3;니야;08\n#wait;1000"
2004608-23 = "3;니야;08;검집을 숨기면 사람은 오히려 보이지 않는 검을 경계하니.\n#3;em;[반응]"
2004608-24 = "3;니야;09;차라리 검집을 보이면, 품속의 단검을 더욱 깊이 숨길 수 있죠."
2004608-25 = "3;니야;09;덕분에 그 누구도, 심지어 샬레의 선생님조차 알지 못한 사이에 힘을 길렀습니다."
2004608-26 = "3;니야;11;이제 백귀야행의 힘이 한데 모였으니, 그 끝에 무엇이 있다 한들 막힐쏘냐. 누가 있다 한들 막을쏘냐."

2004608-1 = "#title;하늘이 굽어보고 땅이 우러르는"
2004608-2 = "3;니야;01\n#3;black"
2004608-3 = "3;니야;01;선생님.\n#3;black"
2004608-4 = "3;니야;01;반드시 오실 줄 알았습니다.\n#3;a\n#3;em;[반응]"
2004608-5 = "3;니야;01;우리들의 백귀야행에."
2004608-6 = "[s] \"무슨 속셈이야?\""
2004608-7 = "3;니야;02;딱히. 속셈이랄 것은 없네요. 기회가 찾아왔고, 응당 그럴 능력이 있으니 행할 뿐."
2004608-8 = "3;니야;07;직접 말하는 것은 풍류가 없지만…… 굳이 말하자면, 그렇네요."
2004608-9 = "3;니야;08;천하를 가지러 가렵니다~♪\n#3;em;[음표]"
2004608-10 = "#st;[0,0];instant;1;"
2004608-11 = "#clearST"
2004608-12 = "#wait;2000"
2004608-13 = "3;니야;02;비현실적으로 들리시나요? 하지만 꽤 단단히 준비했다고요?\n#3;em;[한숨]"
2004608-14 = "3;니야;07;예를 들어…… 음양부는 백귀야행을 이끌 수 없다."
2004608-15 = "3;니야;07;음양부에는 실권이 없다……."
2004608-16 = "3;니야;01;그 철두철미한 게헨나 선도부조차 이렇게 믿어 의심치 않고 있죠.\n#3;em;[...]"
2004608-17 = "3;니야;02;그런데 이 모든 말이 어디서 시작했을까요~? 누가 처음 말했을까요~?"
2004608-18 = "3;니야;03;냐하~ 저네요?\n#3;em;[재잘]"

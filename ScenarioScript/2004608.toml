2004608-94 = "3;니야;03;……짜잔~\n#3;em;[음표]"
2004608-95 = "3;니야;03;선생님을 위해 준비한 깜짝 공연은 마음에 드셨을까요~? 냐하하~"
2004608-96 = "#st;[0,0];instant;1;"
2004608-97 = "#clearST"
2004608-98 = "3;니야;01\n#3;em;[...]\n#wait;2500"
2004608-99 = "3;니야;06;……같은 느낌으로 어물쩍~ 넘어가기는 조금 힘들겠죠?"
2004608-100 = "3;니야;01;일단, 사실만 고하자면, 전부 거짓말이네요."
2004608-101 = "3;니야;01;키보토스 정복 계획은 물론이고, 조금 전에 보여 드린 영상도 전부 합성한 페이크예요."
2004608-102 = "3;니야;02;애초에 전쟁으로 얻을 것도 없고요. 백귀야행의 주 수입원은 관광업, 누가 전쟁터로 관광 오고 싶어 할까요?\n#3;em;[한숨]"
2004608-103 = "3;니야;07;그러면, 왜 모든 거짓말을 했는지, 인가요……."
2004608-104 = "3;니야;01;간단합니다. 선생님이 무척이나 알기 쉬운 분이기 때문입니다."
2004608-105 = "3;니야;02;저는 몇 번이고 선생님을 불러냈습니다. 그때마다 선생님께서는 성실히 응하셨죠. 다행히 그것들은 실제로 쓸데없는 요청이었습니다만~\n#3;em;[반응]"
2004608-106 = "3;니야;03;만에 하나 제가 악의를 품고 사정을 모르는 선생님을 이용했다면~ 이야기가 조금 달라지겠죠~?"
2004608-107 = "3;니야;08;만약 마음먹었다면, 조금 전의 모든 대화가 실제였을 수도 있습니다."
2004608-108 = "[s] \"하지만 니야는 안 그랬잖아.\""
2004608-109 = "3;니야;03;냐하핫~! 그랬죠. 하지만 이건 가정법이니까요.\n#3;em;[음표]"
2004608-110 = "3;니야;02;아니면, 선생님께서는 제가 하는 말이 단순한 허언으로 들리시는 걸까요?"
2004608-111 = "3;니야;08;저 아마치 니야에게는, 그럴 만한 역량이 없다, 라고~?"
2004608-112 = "[s7] \"니야라면 가능할지도.\"\n[s8] \"그래도 그러지 않았잖아?\""
2004608-113 = "#wait;10"
2004608-114 = "#wait;10"
2004608-115 = "3;니야;05;……그러니까, 가정법이라니까요?\n#3;em;[땀]"
2004608-116 = "3;니야;09;그럴 마음만 먹었다면, 음양부는 정말로 실권을 쥐었을 겁니다."
2004608-117 = "3;니야;09;키보토스에 위협이 될지는 몰라도, 적어도 백귀야행의 크고 작은 동아리 정도는 마음대로 휘두를 수 있었겠죠."
2004608-118 = "3;니야;14;가능하냐 불가능하냐 따졌을 때, 가능했다는 게 가장 큰 문제입니다."
2004608-119 = "[s9] \"괜찮아, 그건 불가능했어.\"\n[s10] \"니야는 백귀야행을 좋아하니까.\""
2004608-120 = "#wait;10"
2004608-121 = "#wait;10"
2004608-122 = "3;니야;05;냐하……?\n#3;em;[?]"
2004608-123 = "3;니야;09;……제가 백귀야행을 좋아하기에, 백귀야행에 해를 입히는 일은 할 수 없었다……?"
2004608-124 = "3;니야;09;애초에 불가능한 전제라……?"
2004608-125 = "3;니야;10;……."
2004608-126 = "3;니야;03;냐하하핫! 그렇네요. 그건, 확실히 맹점입니다!\n#3;em;[재잘]\n#3;hophop"
2004608-127 = "3;니야;01;정말 시원스럽네요. 선생님 상대로 조금이라도 우위에 서려 꾀부리는 제가 바보처럼 느껴집니다."
2004608-128 = "3;니야;07;대답이요? 네, 대답은…… 충분히 얻은 거 같습니다."
2004608-129 = "3;니야;01;저는 조금 더 저를, 그리고 선생님을 믿어보는 게 좋겠네요."
2004608-130 = "3;니야;06;하아…… 정말, 송구스럽기 짝에 없습니다. 이 늦은 시간까지 선생님을 불러내서 저 혼자 의심하고, 저 혼자 해소하고…….\n#3;em;[한숨]"
2004608-131 = "3;니야;01;음양의 조화니, 중심이니 하지만, 저는 보다시피 이렇게 음에 치우쳐진 몸이라서요."
2004608-132 = "3;니야;03;평소에는 냐하핫~ 하고 웃고 있지만, 주변에 양기를 지닌 이들을 둬서 간신히 균형을 유지하고 있을 뿐이랍니다~ 제 귀엽디귀여운 후배들이나~ 친구처럼요~"
2004608-133 = "3;니야;07;그리고…….\n#3;em;[...]"
2004608-134 = "3;니야;02;……아까 드린 제안은, 아직 유효하답니다? 어떤가요, 저희 음양부에 들어오심이~?"
2004608-135 = "[s11] \"선생님은 언제나 학생 편이라.\"\n[s12] \"균형이나, 조화처럼 어려운 건 좀…….\""
2004608-136 = "#wait;10"
2004608-137 = "#wait;10"
2004608-138 = "3;니야;03;냐하하핫~ 역시 선생님, 기대를 저버리지 않는 반응이시네요~\n#3;em;[음표]"
2004608-139 = "3;니야;03;선생님은 그걸로 좋습니다, 그걸로 좋아요~\n#3;greeting"
2004608-140 = "#all;hide"

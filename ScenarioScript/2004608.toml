2004608-56 = "3;니야;08;어머나, 샬레의 [USERNAME] 선생님뿐이네요?\n#3;closeup\n#3;em;[음표]"
2004608-57 = "[ns] \"니야.\""
2004608-58 = "3;니야;03;어머~ 또 무서운 표정을 지으시네요~ 하지만 염려 마시길, 불초 소녀도 감히 싸우고자 하는 것은 아닙니다.\n#3;em;[재잘]"
2004608-59 = "3;니야;07;적과 싸워서 이기는 것은 하책이고, 적과 싸우지 않고 이기는 것이 상책이니."
2004608-60 = "3;니야;07;선생님의 능력은 오랫동안 가까이서 보아 알고 있습니다. 굳이 맞상대하고 싶지는 않아요."
2004608-61 = "3;니야;02;진부한 제안이지만, 어떠신가요? 저희와 함께하심이? 섭섭하게 대우해 드리지는 않을게요?\n#3;em;[?]"
2004608-62 = "[ns1] \"니야, 진지하게 할 말이 있어.\"\n[ns2] \"이번에는 짧게 안 끝날 거야.\""
2004608-63 = "#wait;10"
2004608-64 = "#wait;10"
2004608-65 = "3;니야;02;……설교 말인가요? 이 지경에 와서요?"
2004608-66 = "3;니야;06;너무 갑작스러워서 이해가 잘 안되었나요?\n#3;em;[한숨]"
2004608-67 = "#st;[0,0];instant;1;"
2004608-68 = "#clearST"
2004608-69 = "3;니야;01\n#3;greeting\n#wait;1500"
2004608-70 = "3;니야;08;지금 저와 선생님의 관계는, 이미 학생과 선생의 관계를 넘었습니다.\n#3;closeup\n#3;em;[반응]"
2004608-71 = "3;니야;08;이제 저희는 대등한 파트너가 되거나, 혹은 적수가 될 수밖에 없습니다.\n#3;closeup"
2004608-72 = "3;니야;09;그리고 선생님이 적이라면…….\n#3;closeup"
2004608-73 = "3;니야;14;망설임 없이 이 총을 쏠 겁니다. 이제 조금 현실감이 드시나요?\n#3;closeup"
2004608-74 = "[s3] \"그래도 바뀌는 건 없어.\"\n[s4] \"니야는 내 학생이고, 난 선생이야.\""
2004608-75 = "#wait;10"
2004608-76 = "#wait;10"
2004608-77 = "#st;[0,0];instant;1;"
2004608-78 = "#clearST"
2004608-79 = "#wait;1000"
2004608-80 = "[ns5] \"그리고 학생이 길을 잘못 들었다면.\"\n[ns6] \"가르쳐주는 게 내 역할이고.\""
2004608-81 = "#wait;10"
2004608-82 = "#wait;10"
2004608-83 = "3;니야;09;……딱히 거짓말하는 모습은 아니고, 그게 선생님의 진심인가요."

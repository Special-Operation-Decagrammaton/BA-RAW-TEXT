[translation]
10049090-1 = "ตอนที่ 9;ปฏิบัติการแฟลชแบง"
10049090-2 = "คุณมาชิโระ เห็นอะไรบ้างหรือเปล่าคะ?"
10049090-3 = "ฉันกำลังเฝ้าสังเกตอยู่ แต่พอตกเย็นทัศนวิสัยก็เลยไม่ดีค่ะ น่าจะต้องใช้เวลาสักพักกว่าจะหาเจอค่ะ"
10049090-4 = "หาคนที่ขายลูกโป่งกับถังป๊อปคอร์นก็พอค่ะ!"
10049090-5 = "ร้านอยู่แถวเวทีแรกที่พวกฉันทำการแสดงไปค่ะ"
10049090-6 = "คุณสึซึมิรู้ได้ยังไงเหรอคะ?"
10049090-7 = "ก่อนขึ้นเวที ฉันเห็นเด็กๆ ร้องไห้เพราะซื้อของพวกนั้นไปค่ะ"
10049090-8 = "เด็กๆ พวกนั้นกำลังขอให้แม่ค้าที่ขายของพวกนั้นเปลี่ยนสินค้าชิ้นใหม่ให้ค่ะ"
10049090-9 = "งั้นแม่ค้าก็น่าจะเปลี่ยนที่แล้วหรือเปล่า?"
10049090-10 = "ไม่ค่ะ ฉันว่าไม่น่าเป็นแบบนั้นค่ะ"
10049090-11 = "จุดนี้อยู่ใกล้กับเส้นเขตแดนระหว่างทรีนิตี้กับเกเฮนน่า"
10049090-12 = "นั่นหมายความว่านี่เป็นตำแหน่งที่เหมาะสมที่สุดสำหรับการหลบหนี ไม่ว่าจะหนีไปทางไหนก็ตามค่ะ"
10049090-13 = "ที่สำคัญคือมันอยู่ใกล้เวทีและมีผู้คนสัญจรไปมามากที่สุด"
10049090-14 = "ถ้าอยากมาขายของ ตรงนี้คือทำเลที่ดีที่สุดค่ะ"
10049090-15 = "[s] \"สึซึมิวิเคราะห์ได้เฉียบเลย!\""
10049090-16 = "เป็นสัญชาตญาณของกลุ่มรักษาความสงบน่ะค่ะ แต่ที่สำคัญกว่านั้นคือ..."
10049090-17 = "ถ้าเวลาล่วงเลยไปกว่านี้ พาเหรดจะจบลง และพวกเราก็ต้องกลับกันค่ะ"
10049090-18 = "ไม่ได้สิ! พวกฉันต้องลำบากแทบตายกว่าจะเข้ามาที่นี่ได้!"
10049090-19 = "เกือบถูกจระเข้กัดแล้วด้วย!"
10049090-21 = "จะ... จระเข้เหรอคะ...?"
10049090-22 = "เห็นเป้าหมายแล้วค่ะ! ถ้ามองจากที่นั่งผู้ชม เป้าหมายอยู่ทางซ้ายของเวทีค่ะ!"
10049090-26 = "จะไปเดี๋ยวนี้ค่ะ!"
10049090-30 = "เฮ้ๆ เด็กๆ ทุกคน~ ลูกโป่งไม่ได้ลมรั่วหรอกนะจ๊ะ~"
10049090-31 = "พลังงานลบที่สะสมในร่างกายของทุกคนไปรวมกับไอออนลบเข้มข้นที่อยู่ในลูกโป่งต่างหากจ้ะ!"
10049090-32 = "ถ้าลมออกมาก็ถือว่าดีแล้ว! พวกหนูจะได้แข็งแรงขึ้นยังไงล่ะจ๊ะ!"
10049090-34 = "พี่คนนี้ใช้คำอะไรเข้าใจยากจัง"
10049090-35 = "จะแข็งแรงขึ้นเหรอ? งั้นก็ไม่ต้องไปฉีดยาที่โรงพยาบาลแล้วน่ะสิ?"
10049090-37 = "ตะ... แต่ถ้าไม่สบาย ก็ต้องไปฉีดยาสิจ๊ะ!"
10049090-38 = "แล้วถ้ากินยาตรงเวลาและไปติดตามอาการตามกำหนด ก็จะยิ่งได้ผลดีเลยละ!"
10049090-39 = "หยุดอยู่แค่นั้นเลยนะคะ!"
10049090-40 = "คะ... คะ?!"
10049090-41 = "ฉันขอถามอะไรสักเดี๋ยวค่ะ"
10049090-42 = "ขอความร่วมมือหน่อยได้มั้ยคะ?"
10049090-43 = "อ๊ะ~ อ้อ! ได้สิคะ~"
10049090-44 = "เดี๋ยวก่อนค่ะ~ แหะๆๆ! มีเรื่องน่าสงสัยงั้นเหรอคะ อะไรกัน~! แป๊บหนึ่งนะคะ ขอฉันเอายางกั้นล้อรถเข็น..."
10049090-49 = "เอาออก! แล้วก็ปิดร้านเลย! ไปก่อนนะคะทุกคน บ๊ายบายค่ะ~!!!!"
10049090-50 = "พิงค์ ยิงได้เลยค่ะ!"
10049090-51 = "ขอบคุณที่เรียกฉันว่าพิงค์นะคะ!!"
10049090-60 = "อ๊าย!!!"
10049090-61 = "ได้ตัวยัยแม่ค้าหัวใสแล้ว!!"
10049090-62 = "อึก... พวกคุณเป็นหน่วยปราบปรามหรอกเหรอคะ?!"
10049090-63 = "ทุกคน! หน่วยปราบปรามลงพื้นที่แล้วค่ะ! รีบปิดร้านแล้วไปรวมตัวกันค่ะ!!"
10049090-65 = "พวกนี้กำลังเรียกพันธมิตรค่ะ!!"
10049090-70 = "หัวหน้า มาทางนี้! ฉันจะยิงคุ้มกันให้เอง!"
10049090-71 = "ยิงเลย! คุ้มกันหัวหน้าไว้!!"
10049090-79 = "นั่นอะไรน่ะ? การแสดงชุดสุดท้ายของวันนี้เหรอ?"
10049090-80 = "นั่นน่ะสิ นักแสดงออกมากันหมดเลยแฮะ"
10049090-82 = "แก๊งหมวกกันน็อกป๋อมแป๋ม! พร้อมกันหรือยัง! ถ้าพลาดเงินรางวัลไป วันนี้เราอดกินเนื้อย่างกันแน่!"
10049090-86 = "ถ้าไม่อยากให้เป็นอย่างนั้นละก็..."
10049090-91 = "จับยัยแม่ค้านั่นให้ได้เลย!!!"

[translation]
10049090-1 = "Episode 9;Operation Flashbang"
10049090-2 = "See anything new up there, Mashiro?"
10049090-3 = "I'm looking, but it's slower going in the dark."
10049090-4 = "We know the target is selling balloons and popcorn buckets."
10049090-5 = "They're near the stage from earlier."
10049090-6 = "How do you know that, Suzumi?"
10049090-7 = "Before we went on, I saw disappointed children."
10049090-8 = "They were asking for exchanges on those specific products."
10049090-9 = "The perp could have moved since then."
10049090-10 = "I doubt it."
10049090-11 = "That spot is close to the border between Trinity and Gehenna."
10049090-12 = "From there, they could make an escape in either direction."
10049090-13 = "Also, being close to the stage, they have more foot traffic there than anyplace else."
10049090-14 = "The perfect place to do business."
10049090-15 = "[s] \"You're sharp, Suzumi!\""
10049090-16 = "Mmm, call it a vigilante's instinct. ...But we're short on time."
10049090-17 = "If we don't move now, before the parade wraps up, we might miss them."
10049090-18 = "Not a chance! We worked hard to get here!"
10049090-19 = "I almost got bitten by a gator!"
10049090-21 = "A-A gator...?"
10049090-22 = "Update. I have eyes on the target. Stage left."
10049090-26 = "On it!"
10049090-30 = "Listen, that balloon isn't \"leaking.\""
10049090-31 = "It's reacting to your hypodermic ions, your negative energy."
10049090-32 = "The positronium inside the balloon is canceling out the ions, and making you balanced and healthy!"
10049090-34 = "I don't know all those words."
10049090-35 = "Healthy? Does that mean we don't have to get shots at the doctor's office anymore?"
10049090-37 = "Y-You should still get shots when you need them!"
10049090-38 = "And make sure you take your medicine and get checkups too!"
10049090-39 = "Hold it right there!"
10049090-40 = "H-Huh?                                                                                      "
10049090-41 = "We have questions for you."
10049090-42 = "Are you willing to cooperate?"
10049090-43 = "Ah, yes! Of course!"
10049090-44 = "Just give me a minute, heh, heh! Let me just adjust my cart a little..."
10049090-49 = "...and we're closed for today! Pleasure doing business, everyone!!"
10049090-50 = "Shoot her, Pink!"
10049090-51 = "You called me \"Pink\"! Thank you!"
10049090-60 = "Owww!"
10049090-61 = "Gotcha, bounty girl!"
10049090-62 = "Ugh, what're you, freelance security?"
10049090-63 = "Everyone! Security's here! Close up shop and help me out!"
10049090-65 = "She's calling for reinforcements!"
10049090-70 = "Over here, President! We'll cover you!"
10049090-71 = "Fire! Protect the president!"
10049090-79 = "Hm? I guess they're having one more show today."
10049090-80 = "Yeah, they've got the whole cast and everything."
10049090-82 = "Splash Helmet Gang! You ready?! If she gets away, the barbecue's canceled!"
10049090-86 = "So if you don't want to go hungry..."
10049090-91 = "Get her!!"

10049090-6 = "3;레이사 매지컬;02;스즈미 씨는 어떻게 아시는 건가요?\n#3;em;[?]"
10049090-7 = "3;스즈미 매지컬;05;아까, 무대에 오르기 전에 어린아이들이 속상해하는 것을 보았습니다."

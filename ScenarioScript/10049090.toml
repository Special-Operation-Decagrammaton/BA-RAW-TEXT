[translation]
10049090-1 = "第9話;閃光彈作戰 "
10049090-2 = "麻白同學，你那邊有看到什麼嗎？"
10049090-3 = "目前正在觀測。#n不過傍晚的視野相對較窄，可能還需要一點時間。"
10049090-4 = "只要找到在賣東西的人就行了。#n販賣的物品是氣球跟爆米花桶！"
10049090-5 = "位置就在第一個舞台的附近。"
10049090-6 = "鈴美同學是怎麼知道的呢？"
10049090-7 = "當時我在上台之前，看見了一些難過的孩子。"
10049090-8 = "他們正在拜託賣東西的商人更換劣質品。"
10049090-9 = "可是他應該已經移動位置了吧？"
10049090-10 = "不，我想他應該還留在附近才對。"
10049090-11 = "這一帶靠近格黑娜與三一的交界。"
10049090-12 = "也就是說，無論要往哪裡逃，都是最理想的地點。"
10049090-13 = "而且靠近舞台的位置，是人最多的地方。"
10049090-14 = "如果要做生意的話，這裡就是最佳的地點。"
10049090-15 = "[s]「真敏銳啊，鈴美！」"
10049090-16 = "只是自衛隊的直覺而已。#n比起這個……時間所剩不多了。"
10049090-17 = "遊行不久之後就會結束，到時候大家就要散場了。"
10049090-18 = "那怎麼行！我們可是好不容易才進來這裡的耶！"
10049090-19 = "我還差點被鱷魚咬耶！"
10049090-21 = "鱷，鱷魚……？"
10049090-22 = "現場，發現目標！從觀眾席的方向來看，大約在舞台左側！"
10049090-26 = "出發吧！"
10049090-30 = "來來來，小朋友們～#n氣球變小並不是因為氣漏掉了哦～"
10049090-31 = "只是大家身體裡的負面能量，跟氣球裡的「超級負離子」結合了而已～"
10049090-32 = "漏氣越快反而越幸運哦！#n這樣就代表你變得更健康了！"
10049090-34 = "這個姐姐一直在說一些很難懂的話耶。"
10049090-35 = "健康？那是不是就不用去醫院打針了呀？"
10049090-37 = "啊，那個，生病的時候還是得打針唷！"
10049090-38 = "還要乖乖吃藥、乖乖看醫生，這樣效果才會更好！"
10049090-39 = "到此為止了！"
10049090-40 = "咦，咦咦！？"
10049090-41 = "我要問你幾個問題。"
10049090-42 = "可以請你配合一下嗎？"
10049090-43 = "啊～啊！當然可以～！"
10049090-44 = "麻煩稍等一下哦～哈哈哈！#n可疑的事？怎麼會呢～！先等我把推車的輪檔……"
10049090-49 = "……拔掉之後就可以打烊了！各位再見～～！！"
10049090-50 = "Pink，開火！"
10049090-51 = "謝謝你叫我Pink──！！"
10049090-60 = "哎喲！！！"
10049090-61 = "抓到行走獎金了！！"
10049090-62 = "唔，你們是糾察隊嗎！？"
10049090-63 = "大家！！糾察隊來了！！立刻收攤集合！！"
10049090-65 = "他在呼叫同夥！"
10049090-70 = "部長！這邊！我來進行掩護射擊！"
10049090-71 = "開火！保護部長！！"
10049090-79 = "怎麼回事？是今天最後一場表演嗎？"
10049090-80 = "真的耶，所有演員好像都上場了？"
10049090-82 = "嘩啦嘩啦頭盔團，都準備好了嗎？#n要是讓那筆獎金逃走，今天可就沒有燒肉大餐能吃了啊！"
10049090-86 = "不想那樣的話──"
10049090-91 = "就盡全力抓住他們吧！！！"

10049090-1 = "#title;제9화;플래쉬뱅 오퍼레이션"
10049090-2 = "3;스즈미 매지컬;02;마시로 씨, 뭔가 보이는 게 있으신가요?\n#3;a\n#3;em;[반응]"
10049090-3 = "3;스즈미 매지컬;02\n#na;마시로;관측은 하고 있습니다만, 저녁이라 시야가 좁아서 찾는 데 시간이 좀 걸립니다."
10049090-4 = "3;스즈미 매지컬;08;물건을 판매하는 사람을 찾으면 됩니다, 풍선에 팝콘 통을 팔고 있어요!"

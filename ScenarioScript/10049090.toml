10049090-9 = "3;라브;02;그러면 이동하지 않았을까?\n#3;em;[?]"
10049090-10 = "3;스즈미 매지컬;08;아뇨, 아마도 그렇지 않을 겁니다."
10049090-11 = "3;스즈미 매지컬;08;이곳은 게헨나와 트리니티의 경계선에 가깝습니다."

[translation]
80000078-1 = "ช็อกโกแลตกิดีวา"
80000078-2 = "ที่แห่งหนึ่งในตลาดมืด"
80000078-3 = "(คุณครูรีบร้อนรนออกมายังสถานที่นัดหมาย หลังจากได้รับข้อความจากซาโอริ)"
80000078-4 = "อ่า คุณครู มาแล้วสินะ"
80000078-5 = "ดีแล้วละที่ได้เจอกันก่อนที่ \"วันนี้\" จะผ่านไป"
80000078-6 = "[s] \"ซาโอริ? เกิดอะไรขึ้นน่ะ? แล้วทำไมสภาพถึงเป็นแบบนี้!\""
80000078-7 = "อ่า... ไม่ใช่เรื่องใหญ่อะไรหรอก"
80000078-8 = "...ถึงจะพูดแบบนั้น แต่สภาพแบบนี้คงทำให้เชื่อไม่ได้สินะ"
80000078-9 = "เอาเป็นว่าที่อยู่ในสภาพนี้ก็เพราะไปทำภารกิจของวันนี้มาก็แล้วกัน"
80000078-10 = "[s] \"พูดอะไรน่ะ! ภารกิจงั้นเหรอ?!\""
80000078-11 = "ก็ตามนั้นแหละ"
80000078-12 = "นี่ไง รับไปสิ"
80000078-17 = "[ns] \"นี่มัน...ช็อกโกแลต? แถมยังเป็นช็อกโกแลตสุดหรูด้วย?\""
80000078-18 = "อ่า... ได้ยินว่าวันนี้เป็น \"วันนั้น\" น่ะ"
80000078-19 = "วันที่ใช้ช็อกโกแลตส่งความรู้สึกขอบคุณไปให้กับคนที่เคยช่วยเหลือบ่อยๆ..."
80000078-20 = "เห็นเรียกกันว่าวันวาเลนไทน์น่ะ"
80000078-21 = "[s1] \"ที่ได้ยินมามันก็ไม่ผิดหรอก แต่ว่าทำไมถึงบาดเจ็บล่ะ\"\n[s2] \"แต่ว่า... ทำไมถึงสะบักสะบอมแบบนี้ล่ะ...?\""
80000078-22 = "ฉันฝืนทำภารกิจเกินไป สภาพก็เลยดูไม่ได้นิดหน่อยน่ะ"
80000078-23 = "ฉันฝืนทำภารกิจเกินไป สภาพก็เลยดูไม่ได้นิดหน่อยน่ะ"
80000078-24 = "นึกไม่ถึงด้วยว่าช็อกโกแลตจะแพงขนาดนี้"
80000078-25 = "ได้ยินว่าถ้าไม่ให้ช็อกโกแลตที่ดีที่สุด แพงที่สุดเท่าที่จะหาซื้อได้"
80000078-26 = "จะไม่ถือว่าเป็นการตอบแทนคนคนนั้นน่ะ"
80000078-27 = "ได้ยินว่าถ้าคิดจะตอบแทนน้ำใจด้วยของครึ่งๆ กลางๆ มันจะกลายเป็นว่าเราคิดจะตัดสัมพันธ์กับคนคน#nนั้นแทน"
80000078-28 = "ได้ยินว่าถ้าให้ช็อกโกแลตราคาถูกเป็นของขวัญ จะเป็นการดูถูกคนที่ให้ของขวัญ และก็มักจะใช้วิธีนั้น#nเป็นการประกาศสงคราม..."
80000078-29 = "น่าแปลกดีนะ ไม่อยากเชื่อเลยว่า \"คนของโลกภายนอก\" มีความเชื่อแบบนี้กันด้วย"
80000078-30 = "ตอนนี้ฉันก็มีชีวิตในฐานะ \"คนของโลกภายนอก\" แล้ว ถ้าไม่ทำตามธรรมเนียมก็คงดูไม่ดีเท่าไร"
80000078-31 = "ว่าไงคุณครู?"
80000078-32 = "ช็อกโกแลตพวกนี้ยังดีไม่พอเหรอ?"
80000078-33 = "ทำไมทำหน้า...แบบนั้นล่ะ?"
80000078-34 = "[s] \"ใครกัน...\""
80000078-35 = "หะ... หืม?"
80000078-36 = "[s] \"ใครเป็นคนพูดเรื่องเหลวไหลแบบนั้นกับซาโอริกันน่ะ!!\""
80000078-37 = "คะ...คุณครู?!"
80000078-39 = "งะ...งั้นหรอกเหรอ... ท่าทางฉันจะเข้าใจผิดอะไรอีกแล้วสินะ"
80000078-40 = "สร้างเรื่องวุ่นวายให้อีกแล้วสินะ ขอโทษ..."
80000078-41 = "[s3] \"ไม่หรอก ไม่ใช่เรื่องที่ซาโอริต้องขอโทษเลย...\"\n[s4] \"คนไม่ดีน่ะ คือพวกพ่อค้าที่หลอกซาโอริมากกว่านะ\""
80000078-42 = "ว่าแต่ว่าทำช็อกโกแลตโฮมเมดแล้วให้เป็นของขวัญได้ด้วยงั้นเหรอ"
80000078-43 = "เรื่องนั้นน่ะช่างเถอะ ทำช็อกโกแลตโฮมเมดแล้วให้เป็นของขวัญได้ด้วยงั้นเหรอ"
80000078-44 = "แถมยังได้ยินว่าบางคนก็ชอบช็อกโกแลตโฮมเมดมากกว่า..."
80000078-45 = "ดีละ ถ้างั้นคราวหน้าฉันจะลองทำช็อกโกแลตเองดูบ้าง"
80000078-46 = "[s5] \"เดี๋ยวสิ ครูว่าไม่ต้องทำแบบนั้นก็ได้นะ!\"\n[s6] \"แค่ความรู้สึกของซาโอริน่ะ ครูก็ดีใจมากแล้วละ!\""
80000078-47 = "งะ...งั้นเหรอ?"
80000078-48 = "งะ...งั้นเหรอ?"
80000078-49 = "ยากจัง... ธรรมเนียมวันวาเลนไทน์น่ะ"
80000078-50 = "หืม? ไหนๆ ก็เป็นแบบนี้แล้ว... ให้แบ่งช็อกโกแลตกินด้วยกันงั้นเหรอ?"
80000078-51 = "ตะ... แต่ว่า นั่นเป็นของที่ฉันให้คุณครูนะ..."
80000078-52 = "[s] \"แต่ครูอยากกินช็อกโกแลตกับซาโอรินะ\""
80000078-53 = "อะ...อื้ม..."
80000078-54 = "ช่วยไม่ได้นะ คุณครูพูดถึงขนาดนี้แล้วทั้งที..."
80000078-55 = "ถ้างั้น... ขอรบกวนหน่อยนะคุณครู"
80000078-57 = "(คุณครูกับซาโอริแบ่งช็อกโกแลตกินด้วยกัน จากนั้นก็ใช้เวลาว่างไปอย่างสบายๆ...)"

[translation]
80000078-1 = "#title;키디바 초콜릿"
80000078-2 = "#place;블랙마켓 어딘가"
80000078-3 = "#na;(사오리의 연락을 받고 헐레벌떡 약속 장소로 나왔다.)"
80000078-4 = "3;사오리 부상;S2_02;아, 선생. 와 주었군.\n#3;em;[반응]\n#3;a"
80000078-5 = "3;사오리 부상;S2_11;다행이야. '오늘'이 지나가기 전에 만날 수 있어서."
80000078-6 = "[s] \"사오리? 무슨 일이야! 상태가 왜 그래!\""
80000078-7 = "3;사오리 부상;S2_02;아…… 별일은 아니다."
80000078-8 = "3;사오리 부상;S2_04;……라고는 해도, 꼴이 이래서야 설득이 안 되겠군.\n#3;em;[속상함]"
80000078-9 = "3;사오리 부상;S2_02;일단, 오늘의 의무를 실행하기 위해서였다고만 말해 두지."
80000078-10 = "[s] \"무슨 소리야, 의무라니?!\""
80000078-11 = "3;사오리 부상;S2_01;말 그대로다."
80000078-12 = "3;사오리 부상;S2_00;이거야. 받아 줘.\n#3;greeting"
80000078-13 = "#st;[0,0];instant;1;"
80000078-14 = "#clearST"
80000078-15 = "3;사오리 부상;S2_00\n#3;m5\n#wait;1000"
80000078-16 = "#wait;2500"
80000078-17 = "[ns] \"이건…… 초콜릿? 그것도 엄청 고급 초콜릿이잖아?\""
80000078-18 = "3;사오리 부상;S2_00;아아. 오늘은 그런 날이라고 들어서.\n#3;m3"
80000078-19 = "3;사오리 부상;S2_99;평소에 신세 지고 있는 사람에게, 초콜릿으로 마음을 전해야 한다는 날……\n#3;em;…"
80000078-20 = "3;사오리 부상;S2_02;발렌타인 데이라고 하던데."
80000078-21 = "[s1] \"그렇게까지 틀린 말은 아니긴 한데. 그래도……\"\n[s2] \"하지만…… 왜 그렇게 다친 거야……?\""
80000078-22 = "3;사오리 부상;S2_05;평소보다 조금 무리해서 의뢰를 해결했더니, 약간 지저분해진 것뿐이야."
80000078-23 = "3;사오리 부상;S2_05;평소보다 조금 무리해서 의뢰를 해결했더니, 약간 지저분해진 것뿐이야."
80000078-24 = "3;사오리 부상;S2_06;초콜릿이라는 게 이렇게까지 비쌌을 줄은.\n#3;em;[속상함]"
80000078-25 = "3;사오리 부상;S2_02;구할 수 있는 한 가장 비싸고, 최고급의 초콜릿이 아니면."
80000078-26 = "3;사오리 부상;S2_18;그 사람에 대한 보답이 되지 않는다고 하더군."
80000078-27 = "3;사오리 부상;S2_05;어중간한 물건으로 대체하려다간, 오히려 그 사람과의 인연을 끊겠다는 선언이 된다고."
80000078-28 = "3;사오리 부상;S2_17;심지어 일부러 싸구려 초콜릿을 선물해서, 선물을 준 사람을 모욕하고, 선전 포고를 하는 수단으로 사용하기도 한다고……\n#3;em;…"
80000078-29 = "3;사오리 부상;S2_18;신기한 일이야. 그것이 이 '바깥세상'의 상식이라니."
80000078-30 = "3;사오리 부상;S2_06;나도 '바깥세상'에서 살아가기로 한 이상, 그 생활 양식을 따르지 않으면 안 되겠지."
80000078-31 = "3;사오리 부상;S2_01;어때, 선생?\n#3;em;[반응]"
80000078-32 = "3;사오리 부상;S2_02;혹시 이 정도로는 안 되는 건가?\n#3;stiff"
80000078-33 = "3;사오리 부상;S2_04;표정이…… 왜 그렇지?\n#3;em;[땀]"
80000078-34 = "[s] \"누가……\""
80000078-35 = "3;사오리 부상;S2_22;으, 응?\n#3;em;[?]"
80000078-36 = "[s] \"누가 우리 사오리한테 그런 헛소리를 한 거냐!!!\""
80000078-37 = "3;사오리 부상;S2_20;서, 선생?!\n#3;em;[?!]"
80000078-38 = "#all;hide"
80000078-39 = "3;사오리 부상;S2_04;그, 그렇군…… 내가 또 무언가를 착각한 모양이다.\n#3;a"
80000078-40 = "3;사오리 부상;S2_18;폐를 끼친 것 같군. 사과하지.\n#3;em;[땀]"
80000078-41 = "[s3] \"아니, 사오리가 사과할 일은 아니야……\"\n[s4] \"나쁜 건 사오리를 이용한 악덕 업자들이니까……\""
80000078-42 = "3;사오리 부상;S2_13;그건 그렇고, 손수 만들어서 선물하는 것도 가능하다니.\n#3;em;…"
80000078-43 = "3;사오리 부상;S2_13;그건 그렇고, 손수 만들어서 선물하는 것도 가능하다니.\n#3;em;…"
80000078-44 = "3;사오리 부상;S2_13;거기에 사람에 따라서는 그 편을 더 기뻐하기도 한다고……"
80000078-45 = "3;사오리 부상;S2_14;좋아. 다음에는 내가 직접 만들어 보겠어."
80000078-46 = "[s5] \"아니, 꼭 그러지 않아도 좋으니까!\"\n[s6] \"마음만으로도 이미 충분히 넘칠 만큼 기쁘니까 말이지!\""
80000078-47 = "3;사오리 부상;S2_22;그, 그런가?\n#3;em;[땀]\n#3;stiff"
80000078-48 = "3;사오리 부상;S2_22;그, 그런가?\n#3;em;[땀]\n#3;stiff"
80000078-49 = "3;사오리 부상;S2_04;어렵군…… 이 발렌타인 데이라는 풍습은."
80000078-50 = "3;사오리 부상;S2_02;응? 이렇게 된 거, 초콜릿을 같이 먹자고……?\n#3;em;[?]"
80000078-51 = "3;사오리 부상;S2_13;하, 하지만 그건 내가 선생님에게……"
80000078-52 = "[s] \"그래도 나는 사오리와 같이 초콜릿을 먹고 싶어.\""
80000078-53 = "3;사오리 부상;S2_04;으, 으음……\n#3;em;[땀]\n#3;stiff"
80000078-54 = "3;사오리 부상;S2_28;어쩔 수 없지. 선생이 그렇게까지 말한다면……"
80000078-55 = "3;사오리 부상;S2_03;그러면, 앞으로도 잘 부탁하지. 선생."
80000078-56 = "#all;hide"
80000078-57 = "#na;(사오리와 함께 초콜릿을 나눠 먹으며, 오랜만에 한가한 시간을 가졌다.)"

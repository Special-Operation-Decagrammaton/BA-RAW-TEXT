[translation]
80000078-1 = "奇帝梵巧克力"
80000078-2 = "黑市某處"
80000078-3 = "（收到沙織的聯絡後，連忙趕到了他指定的地方）"
80000078-4 = "老師，你來了啊。"
80000078-5 = "太好了，能在「今天」結束前見到你。"
80000078-6 = "[s]「沙織，你還好嗎！？」"
80000078-7 = "啊啊……這不算什麼。"
80000078-8 = "……就算這麼說，我這副模樣也毫無說服力吧。"
80000078-9 = "不過為了達成目標，這也沒辦法。"
80000078-10 = "[s]「目標……！？」"
80000078-11 = "就是字面上的意思。"
80000078-12 = "……來，收下吧。"
80000078-17 = "[ns]「……巧克力？而且是非常高級的那種……」"
80000078-18 = "沒錯，今天是情人節對吧？"
80000078-19 = "我聽說是藉由巧克力，"
80000078-20 = "向平時照顧自己的人傳達心意的日子。"
80000078-21 = "[s1]「是這麼說沒錯……」\n[s2]「但是，為什麼會傷成這樣……？」"
80000078-22 = "……因為接下了比平時更難的委託，所以受了點傷。"
80000078-23 = "……因為接下了比平時更難的委託，所以受了點傷。"
80000078-24 = "沒想到世界上還有這麼貴的巧克力啊。"
80000078-25 = "要表達感謝，就應該送最高級的巧克力……"
80000078-26 = "否則就不能算是回禮，我是這麼聽說的。"
80000078-27 = "還有，如果送不上不下的東西，就會變成與對方「不相往來」的宣言。"
80000078-28 = "我還聽說可以故意送便宜的巧克力，作為與對方宣戰的手段。"
80000078-29 = "「外面世界」的常識，真是困難啊……"
80000078-30 = "不過我既然已經決定要在這裡活下去，#n就必須遵守這裡的規矩才行。"
80000078-31 = "就是這樣，老師。"
80000078-32 = "如何，我的心意有傳……"
80000078-33 = "……為，為什麼要露出那種表情？"
80000078-34 = "[s]「是誰──」"
80000078-35 = "？"
80000078-36 = "[s]「是誰對我們沙織說那種亂七八糟的話啊！？」"
80000078-37 = "老，老師……！？"
80000078-39 = "這，這樣呀……看來我又誤會了。"
80000078-40 = "給你添麻煩了，我向你道歉。"
80000078-41 = "[s3]「不，沙織不需要道歉……」\n[s4]「有錯的是那些欺騙沙織的人……」"
80000078-42 = "謝謝你能這麼說。#n不過原來還有送親手做的巧克力這種方法啊。"
80000078-43 = "謝謝你能這麼說。#n不過原來還有送親手做的巧克力這種方法啊。"
80000078-44 = "而且對某些人來說，這麼做也許會讓他們更開心……是嗎。"
80000078-45 = "既然如此，下次我就試著自己做吧。"
80000078-46 = "[s5]「那個，不是一定要那麼做的哦……？」\n[s6]「光是那份心意我就覺得非常開心了！」"
80000078-47 = "……是嗎？"
80000078-48 = "……是嗎？"
80000078-49 = "真複雜啊……情人節這個習俗。"
80000078-50 = "嗯？機會難得，要不要一起吃……？"
80000078-51 = "可，可是那是我要送給老師的──"
80000078-52 = "[s]「正因為這樣，我才想和沙織一起吃。」"
80000078-53 = "……"
80000078-54 = "……我知道了，既然你都這麼說了。"
80000078-55 = "老師。雖然今後我也可能給你添許多麻煩……不過，未來也請多指教。"
80000078-57 = "（和沙織一起享用巧克力，度過了悠閒的時光）"

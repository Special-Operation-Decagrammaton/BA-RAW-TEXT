[translation]
3603-1 = "รสหวานและความคิดถึง 3"
3603-2 = "(บรื้นนนนน...)"
3603-4 = "......"
3603-5 = "......"
3603-6 = "......"
3603-11 = "นางิจัง เป็นอะไรรึเปล่า?"
3603-13 = "ฉันไม่เป็นไรค่ะ..."
3603-14 = "ขอบคุณทั้งสองคนเลยนะคะวันนี้ฉันสนุกมากเลย......"
3603-15 = "เดี๋ยวสิ พูดแบบนั้นทั้งๆ ที่ยังตาลอยอยู่แบบนี้น่ะ มันเชื่อไม่ลงหรอกนะ"
3603-16 = "อืม..."
3603-17 = "บางทีพาไปสวนสนุกจะดีกว่ามั้ยนะ..."
3603-18 = "หืม?"
3603-22 = "อืม... ที่แบบนั้นมีสวนสนุกด้วยเหรอ?"
3603-23 = "นางิจัง นางิจังนึกถึงเรื่องสมัยก่อนมั้ย?"
3603-24 = "ตอนเด็กๆ ไม่ว่าจะมีเรื่องกังวลอะไร พอได้ไปที่สนามเด็กเล่นก็จะลืมไปได้หมด..."
3603-25 = "สนามเด็กเล่น..."
3603-29 = "ค่ะ ก็เป็นแบบนั้นจริงๆ"
3603-33 = "(เอี๊ยดดดด!)"
3603-34 = "?!"
3603-35 = "ว้าว เซอาจัง จู่ๆ ก็ดริฟต์เบรกเลยเหรอ?!"
3603-36 = "ก็ขับตอนง่วงๆ มันไม่ดีนี่คะ"
3603-37 = "แวะพักที่สนามเด็กเล่นนี่สักครู่ก็แล้วกันค่ะ"
3603-38 = "......"
3603-39 = "อืม แบบนี้เองสินะ เซอาจัง"
3603-40 = "เข้าใจแล้วละ"
3603-41 = "......?"
3603-45 = "คล้ายกับสนามเด็กเล่นที่พวกเราเคยไปตอนเด็กๆ เลยนะ"
3603-46 = "ยกเว้นเรื่องที่ไม่มีคนเลย แถมหญ้าก็ขึ้นรกมาก..."
3603-52 = "นางิจัง! นางิจังก็มาทางนี้สิ!"
3603-53 = "ฉัน... ขออยู่... ที่รถ..."
3603-54 = "ไม่ได้น้า☆"
3603-55 = "คะ?"
3603-64 = "(สุดท้ายนางิสะก็ถูกมิกะลากเข้าไปในสนามเด็กเล่น)"
3603-67 = "......"
3603-69 = "(นั่งตรงไหนได้บ้างนะ...)"
3603-70 = "(อ๊ะ สไลเดอร์)"
3603-75 = "ร้อนจี๋......!"
3603-76 = "ว้ายยย?!"
3603-78 = "อ๊ะ ร้อนจัง...!"
3603-79 = "อะฮ่าฮ่า! อย่างที่คิดไว้เลยว่านางิจังจะต้องไปนั่งบนสไลเดอร์!"
3603-80 = "หัวเราะอะไรกันคะ! สไลเดอร์นี่ตากแดดจนร้อนไปหมดแล้วนะคะ?!"
3603-81 = "ก้นฉันเกือบไหม้แล้วค่ะ?!"
3603-85 = "แต่ถึงอย่างนั้นนางิจังก็ดูสดใสขึ้นบ้างแล้วนี่นา?"
3603-86 = "คะ? เอ่อ คือ..."
3603-87 = "นั่นสิ... นะคะ"
3603-88 = "ค่อยยังชั่วหน่อยนะ นางิจัง"
3603-89 = "ที่ผ่านมาฉันเป็นห่วงมากเลยนะที่นางิจังเอาแต่นอนซึมหางลู่หูตกเป็นลูกกวางโดนทิ้งเลยน่ะ"
3603-90 = "เดี๋ยวนะ เปรียบเทียบอะไรแบบนั้น..."
3603-91 = "แต่ก็เอาเถอะ ยังไงสนามเด็กเล่นก็เป็นสถานที่ที่แค่เข้ามาก็ฟื้นฟูพลังใจได้แล้วนี่นา"
3603-92 = "ถ้าจะให้มีแรงต่อไปก็ต้องกินอาหารให้เหมาะสมด้วยนะคะ"
3603-93 = "เพราะงั้นรับไปสิคะ นางิสะ"
3603-98 = "......?"
3603-99 = "นี่มัน... ขนมขบเคี้ยว?"
3603-100 = "ระหว่างที่ทั้งสองคนกำลังเถียงกันอยู่ ฉันก็ไปซื้อขนมขบเคี้ยวมาจากร้านค้าใกล้ๆ นี้น่ะค่ะ"
3603-101 = "กินสิคะ วันนี้เพิ่งจะกินแค่ชาแดงไปเองนี่คะ"
3603-102 = "ถะ... ถ้างั้น..."
3603-108 = "หวานมากเลยค่ะ..."
3603-109 = "ทำให้ขนมมีรสหวานแล้วก็เคลือบด้านนอกให้หวานๆ อีกทีแบบนี้"
3603-110 = "และก็ขนมอันอื่นๆ... เค็มมากเลยค่ะ"
3603-114 = "บางอย่างก็มีรสเค็มที่โดดจนเกินไป"
3603-115 = "รสชาติทื่อๆ และเรียบง่ายแบบนี้..."
3603-116 = "แต่ฉันคิดว่าตอนเด็กๆ คุณคงเพลิดเพลินกับรสชาติพวกนี้นะคะ นางิสะ"
3603-117 = "ไม่ใช่เหรอคะ?"
3603-118 = "ใช่ค่ะ... ขนมพวกนี้น่ะดีที่สุดแล้วในตอนนั้น"
3603-120 = "พอพูดถึงแล้วก็นึกถึงสมัยก่อนเลยเนอะ"
3603-121 = "อ่า... เมื่อก่อนนางิจังน่ารักกว่านี้เยอะเลย☆"
3603-122 = "พะ... พูดอะไรคะเนี่ย?!"
3603-124 = "นางิสะ รสชาติของขนมขบเคี้ยวมันยังเหมือนเดิมนะคะ"
3603-125 = "แต่นางิสะต่างหากที่เปลี่ยนไปค่ะ "
3603-126 = "ด้วยรสชาติที่หรูหราและละเอียดอ่อน"
3603-127 = "......?"
3603-128 = "มันก็เป็นแบบนี้แหละ ความทรงจำดีๆ ในอดีตก็อาจเปลี่ยนไปเป็นเรื่องที่ไม่ดีได้เมื่อหวนนึกถึงอีกครั้ง#nในภายหลัง"
3603-129 = "ก็เหมือนกับขนมขบเคี้ยวพวกนี้แหละ"
3603-130 = "......"
3603-131 = "ในทางกลับกัน ความทรงจำที่ยากลำบากในตอนนี้ก็อาจเปลี่ยนเป็นเรื่องที่สวยงามในภายหลังก็ได้นะ"
3603-132 = "ทั้งนางิจังและพวกเรายังต้องเติบโตและเปลี่ยนแปลงไปเรื่อยๆ"
3603-133 = "อืม หมายถึงอะไรเหรอคะคุณมิกะ"
3603-134 = "สรุปก็คือเป็นคำแนะนำให้มีกำลังใจเพราะเรื่องที่ยากลำบากในตอนนี้อาจกลายเป็นเรื่องที่มีประโยชน์#nในอนาคตก็ได้งั้นเหรอคะ?"
3603-135 = "เป็นอะไรที่ซ้ำซากจำเจมากเลยนะคะ"
3603-136 = "ว้าว นางิจัง คมจัดเลยแฮะ"
3603-137 = "ฮุฮุ แต่ความจริงมันก็เป็นเรื่องซ้ำซากจำเจเสมอๆ เลยนี่คะ"
3603-138 = "ฉันเลยมักจะลืมไปบ่อยๆ"
3603-139 = "เพราะงั้นฉันขอพูดไว้ก่อนที่จะลืมก็แล้วกันค่ะ"
3603-141 = "ขอบคุณนะคะทุกคน"
3603-143 = "......"
3603-144 = "ฮะฮ่า ถ้างั้นคราวหน้าไว้เรามาเที่ยวแบบนี้กันอีกนะ! "
3603-148 = "จริงด้วย มีหาดส่วนตัวที่ทางสภาน้ำชาเป็นเจ้าของอยู่นี่นา! คราวหน้าไปเที่ยวที่นั่นกันเถอะ!"
3603-149 = "ฮุฮุ... ดีเลยค่ะ"
3603-150 = "ใช่มั้ยล่ะ? ถือว่าสัญญาแล้วนะ นางิจัง"
3603-151 = "ค่ะ งั้นตอนนี้ก็กลับกันเลยดีมั้ยคะ"
3603-152 = "กลับไปยังบ้าน (ทรีนิตี้) ของพวกเรา"
3603-153 = "ฉันไม่ได้ตั้งใจเตรียมไว้หรอกนะคะ แต่พอดีมีใบชาคุณภาพดีอยู่บ้าง เพราะงั้นกลับไปชงชาดื่ม พร้อมกับกินขนมอร่อยๆ กันเถอะค่ะ"
3603-161 = "ดูเหมือนจะคลี่คลายไปได้ด้วยดีนะ?"
3603-162 = "นั่นสิคะ"
3603-163 = "แต่ว่า..."
3603-164 = "จะบอกว่าวันนี้เป็นเพียงการแก้ปัญหาเฉพาะหน้าใช่มั้ยล่ะ?"
3603-165 = "เข้าใจอะไรเร็วดีจังเลยนะคะ มิกะ"
3603-166 = "มันก็แน่อยู่แล้ว ความเครียดจากการทำงานที่สะสมมานานคงไม่หายไปภายในวันเดียวหรอก"
3603-167 = "พอกลับไปแล้วก็คงมีงานรออยู่อีกเป็นกองภูเขา"
3603-168 = "แต่ก็ไม่ใช่ว่าทุกอย่างจะคงอยู่ตลอดไปหรอกใช่มั้ยล่ะ?"
3603-169 = "และถ้านางิจังทำงานเหนื่อยมากๆ แบบนี้อีก ก็อาจจะไปพักร้อนกันยาวๆ ก็ได้ "
3603-170 = "อย่างเช่น ไปเที่ยวที่หาดส่วนตัวที่ฉันเพิ่งพูดถึงเมื่อกี้..."
3603-171 = "สุดท้ายถ้ามองในระยะยาวแล้ว ทุกอย่างก็เป็นเพียงการแก้ปัญหาเฉพาะหน้าไม่ใช่เหรอคะ"
3603-172 = "อื้อ เพราะงั้นพวกเราก็มาพยายามกันให้เต็มที่เถอะ"
3603-173 = "เหมือนในวันนี้น่ะ"
3603-174 = "......"
3603-175 = "อะไรกัน ทำไมถึงมองด้วยสายตาแบบนั้นล่ะ?"
3603-176 = "ทำไมจู่ๆ ถึงพูดอะไรดีๆ แบบนี้ได้กันนะคะ ไม่เหมือนมิกะเลย"
3603-177 = "ทำไมล่ะ? ฉันเองก็โตขึ้นแล้วเหมือนกันนะ?!"
3603-181 = "ค่อยๆ ตามมาแล้วกันนะคะ ฉันจะไปสตาร์ทรถรอ"
3603-190 = "รสหวานและความคิดถึง"

[translation]
3603-1 = "Sweetness and Nostalgia 3"
3603-2 = "*vroom*"
3603-4 = "..."
3603-5 = "..."
3603-6 = "..."
3603-11 = "You okay, Nagi?"
3603-13 = "I'm okay... Optimal, frankly."
3603-14 = "I partook in so much recreational relaxation today due to your sincere efforts..."
3603-15 = "Yeah... I don't buy it. She's still out of it."
3603-16 = "Hmm..."
3603-17 = "Maybe we should've tried the amusement park..."
3603-18 = "Oh?"
3603-22 = "Hey... Is that a playground all the way out here?"
3603-23 = "Nagi, Nagi, doesn't this remind you of old times?"
3603-24 = "When we were younger, and we used to love goofing off and swinging around in the playground?!"
3603-25 = "Playground..."
3603-29 = "Perfect."
3603-33 = "*screech*"
3603-34 = "?!"
3603-35 = "Whoa, Seia, why did you slam on the brakes?!"
3603-36 = "It is dangerous to drive while drowsy."
3603-37 = "Let's take a break at this park."
3603-38 = "..."
3603-39 = "Hmm, I see, Seia."
3603-40 = "I think that's a great idea."
3603-41 = "...?"
3603-45 = "This reminds me of the playground we used to play in when we were little."
3603-46 = "Except it's empty and full of weeds..."
3603-52 = "Nagi! Nagi! Over here!"
3603-53 = "I'm...going to...stay in..."
3603-54 = "Nope! ☆"
3603-55 = "Eh?"
3603-64 = "Mika dragged Nagisa into the playground."
3603-67 = "..."
3603-69 = "(Need to sit...)"
3603-70 = "(Ah, a slide.)"
3603-75 = "*sizzle*"
3603-76 = "Aaaah?!"
3603-78 = "It's hot...!"
3603-79 = "Ahaha! Classic Nagi, always hogging the slide!"
3603-80 = "Why are you laughing? Do you have any idea how hot the sun made this metal? Such a hazard should be...outlawed!"
3603-81 = "To think such a conveyance is designed for children! They would be roasted and seared. Outrageous!"
3603-85 = "Well, Nagi, at least you seem to be doing better!"
3603-86 = "What? Uh, um..."
3603-87 = "I am marginally recovered... I suppose?"
3603-88 = "I'm glad, Nagi."
3603-89 = "I was so worried. You were confused and languishing like an abandoned fawn."
3603-90 = "What kind of absurd analogy is that...?"
3603-91 = "...Nevertheless, I suppose it's difficult to feel lethargic upon entering a playground."
3603-92 = "Precisely. Let's keep your energy up."
3603-93 = "Eat this, Nagisa."
3603-98 = "...?"
3603-99 = "Isn't this...highly-processed junk food?"
3603-100 = "I bought it from that convenience store while you two were bickering."
3603-101 = "You should eat. You've only had black tea all day."
3603-102 = "V-Very well..."
3603-108 = "...It's dreadfully sweet."
3603-109 = "They already made the inside too sweet, then coated it in more sugar."
3603-110 = "And this one is quite saline...like the ocean."
3603-114 = "This last one reeks of artificial smoke and tastes overwhelmingly savory."
3603-115 = "How utterly unsophisticated..."
3603-116 = "But I'm sure you enjoyed them as a child, Nagisa."
3603-117 = "Am I wrong?"
3603-118 = "...Of course not. I loved these...things."
3603-120 = "This truly takes me back to the easy days. Life was simple."
3603-121 = "Nagi was so much cuter back then. ☆"
3603-122 = "Wh-Whatever are you talking about?"
3603-124 = "Nagisa, the taste of the junk food hasn't changed."
3603-125 = "But you've changed."
3603-126 = "You've grown and developed a more delicate and sophisticated palate."
3603-127 = "...?"
3603-128 = "So that's the lesson. Even fond memories of the past can prove disappointing when revisited."
3603-129 = "Just like junk food."
3603-130 = "..."
3603-131 = "Or the opposite. We may look back on the harsh times we have now and actually laugh."
3603-132 = "You, Seia, and I are growing and changing all the time!"
3603-133 = "What are you trying to say, Mika?"
3603-134 = "Are you advising me to acquiesce to the weight of responsibility? Are you suggesting that today's difficulties shall be outweighed by tomorrow's benefits?"
3603-135 = "What a dismissive platitude."
3603-136 = "Ooh, Nagi, that was harsh."
3603-137 = "Fufu, indeed. Nevertheless, the truth sometimes IS dismissive. And trite."
3603-138 = "And that is why we are known to take it for granted."
3603-139 = "So, please let me say this before I forget..."
3603-141 = "Thank you both. For everything."
3603-143 = "..."
3603-144 = "Haha, in that case, we should plan more outings like this! "
3603-148 = "Like maybe to the Tea Party's private beach! Let's go there next time!"
3603-149 = "...Hmm, that sounds pleasant."
3603-150 = "Right? Then it's a date, Nagi!"
3603-151 = "Yes. Let us head back..."
3603-152 = "...Back home."
3603-153 = "...And, while this is uncharacteristically spontaneous, we happen to have these top-quality tea leaves, so I propose we brew them and share these...fascinating snacks. Let's have a tea party at Trinity."
3603-161 = "I think that worked out!"
3603-162 = "You're right."
3603-163 = "However..."
3603-164 = "You're going to say that it's temporary, ephemeral, something like that?"
3603-165 = "...You've gotten better at reading the room, Mika."
3603-166 = "Well, it's only logical. Her years of stress aren't just going to disappear because of a one-day trip."
3603-167 = "And I'm sure the work's piling up for when she gets back."
3603-168 = "But nothing stays perfect forever, right?"
3603-169 = "And if Nagi starts getting stressed out, we can intervene with another vacation. "
3603-170 = "I still think that the private beach is a great idea!"
3603-171 = "...A series of temporary fixes. Like everything else in life."
3603-172 = "Yeah. Nothing lasts, so we just have to try our best, right?"
3603-173 = "Just like today."
3603-174 = "..."
3603-175 = "Why are you looking at me like that?"
3603-176 = "Mika, you're acting so unusually kind and wise. It's unnerving."
3603-177 = "Huh? What, I'm not allowed to mature as a person?"
3603-181 = "Take your time. I'll warm up the scooter."
3603-190 = "Sweetness and Nostalgia"

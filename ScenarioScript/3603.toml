[translation]
3603-1 = "甜蜜與懷舊（３）"
3603-2 = "（嗡嗡嗡……）"
3603-4 = "……"
3603-5 = "……"
3603-6 = "……"
3603-11 = "渚醬，你還好嗎？"
3603-13 = "我沒事……"
3603-14 = "今天多虧了你們，真的很開心……"
3603-15 = "兩眼無神地說那種話，根本完全沒有說服力嘛。"
3603-16 = "唔嗯……"
3603-17 = "難道應該帶你去遊樂園的嗎……"
3603-18 = "嗯？"
3603-22 = "咦，那邊有個遊樂場耶？"
3603-23 = "渚醬渚醬，有沒有想起以前的事？"
3603-24 = "小時候不管有什麼煩惱，只要去遊樂場玩一玩就能忘得差不多了……"
3603-25 = "遊樂場……"
3603-29 = "沒錯，就是那個。"
3603-33 = "（吱──！）"
3603-34 = "！？"
3603-35 = "哇啊！聖亞醬，你怎麼突然急煞！？"
3603-36 = "因為開車時要是打瞌睡就不妙了。"
3603-37 = "就在這個遊樂場稍微休息一下吧。"
3603-38 = "……"
3603-39 = "哼嗯～原來如此啊，聖亞醬。"
3603-40 = "我明白了☆"
3603-41 = "……？"
3603-45 = "這裡跟我們小時候玩的遊樂場好像哦。"
3603-46 = "除了完全沒人，還長了雜草之外……"
3603-52 = "渚醬！渚醬也過來看看吧！"
3603-53 = "我還是……待在車上……"
3603-54 = "不行☆"
3603-55 = "咦？"
3603-64 = "（最後渚還是被彌香拉進了遊樂場）"
3603-67 = "……"
3603-69 = "（有沒有可以坐的地方呢……）"
3603-70 = "（啊，溜滑梯）"
3603-75 = "嘶──！"
3603-76 = "哇啊啊！？"
3603-78 = "好燙……！"
3603-79 = "哈哈哈！渚醬果然會坐在溜滑梯上！"
3603-80 = "有什麼好笑的！溜滑梯被太陽曬得燙得要命……！"
3603-81 = "差點就把我的屁股烤熟了耶！？"
3603-85 = "不過渚醬，你好像稍微恢復精神了呢？"
3603-86 = "咦？啊，嗯……"
3603-87 = "好像……是呢？"
3603-88 = "太好了，渚醬。"
3603-89 = "你之前都像被丟掉的小鹿一樣無精打采，害我超擔心的。"
3603-90 = "那是什麼奇怪的比喻……"
3603-91 = "不過……好像只要進到遊樂場，確實就會湧出一點活力呢。"
3603-92 = "想維持體力的話，還需要補充營養才行。"
3603-93 = "所以……拿去吧，渚。"
3603-98 = "……？"
3603-99 = "這是……零食？"
3603-100 = "是你們剛才在吵鬧的時候，我去附近的零食攤買的。"
3603-101 = "趕緊吃吧。#n今天一整天，你不是只喝了試喝的紅茶嗎？"
3603-102 = "那，那就……"
3603-108 = "……太甜了。"
3603-109 = "外層都已經裹上糖衣了，餅乾本身居然還是做得這麼甜。"
3603-110 = "然後這個……好鹹。"
3603-114 = "這個則是調味料放過頭了。"
3603-115 = "都是一些單純又粗糙的味道……"
3603-116 = "不過你小時候應該覺得很好吃吧，渚。"
3603-117 = "我有說錯嗎？"
3603-118 = "……是啊。對那時的我來說，這些就是最棒的零食。"
3603-120 = "聽你這麼一說，讓人想起了以前的事呢。"
3603-121 = "啊～啊，那時候的渚醬明明更可愛的說☆"
3603-122 = "你，你在說什麼啊！？"
3603-124 = "渚，零食的味道並沒有改變。"
3603-125 = "有所改變的是你才對。"
3603-126 = "變得更優雅，味覺也更細膩了。"
3603-127 = "……？"
3603-128 = "所以意思是說……#n曾經覺得美好的東西，日後回味起來可能就沒有那麼好了。"
3603-129 = "就像這些零食一樣。"
3603-130 = "……"
3603-131 = "不過反過來說，現在覺得痛苦的事情，將來也可能變成美好的回憶。"
3603-132 = "因為無論渚醬還是我們，都會不斷成長、不斷改變。"
3603-133 = "哼嗯，所以彌香同學……"
3603-134 = "最後想說「現在的困難也會對將來有幫助，所以要振作起來」這種老掉牙的勸勉嗎？"
3603-135 = "真老套呢。"
3603-136 = "哇，渚醬嘴巴真壞。"
3603-137 = "呵呵，不過真理往往是人們老生常談的東西。"
3603-138 = "所以才會經常被忘記吧。"
3603-139 = "因此我想在忘記之前趕緊說出來。"
3603-141 = "謝謝你們兩位。"
3603-143 = "……"
3603-144 = "哈哈，那以後也要常常這樣出來玩唷！"
3603-148 = "對了，我們不是還有茶會的私人海灘嗎！#n下次就去那裡玩吧！"
3603-149 = "……呵呵，聽起來不錯呢。"
3603-150 = "對吧？那我們說好囉，渚醬？"
3603-151 = "嗯。那麼也差不多該回去了。"
3603-152 = "回到我們[ruby=三一]的家。[/ruby]"
3603-153 = "剛好有這些最高級的茶葉……回去搭配這些零食，來開個小茶會吧。"
3603-161 = "看起來算是圓滿解決了吧？"
3603-162 = "是啊。"
3603-163 = "不過……"
3603-164 = "你想說「今天的事只是暫時的」對吧？"
3603-165 = "……你察言觀色的能力進步了不少呢，彌香。"
3603-166 = "這不是理所當然的嗎？#n長時間累積的工作壓力，不可能只花一天就消失。"
3603-167 = "回去之後，工作還是會繼續堆積下去。"
3603-168 = "不過也沒有什麼是能永遠保持完美的吧？"
3603-169 = "如果渚醬的疲勞又累積起來，搞不好還能來個長期渡假也說不定。"
3603-170 = "比如剛剛提到的私人海灘之類的……"
3603-171 = "……從長遠來看，一切都只是暫時的。"
3603-172 = "嗯。所以才要努力活在每個當下。"
3603-173 = "就像今天一樣。"
3603-174 = "……"
3603-175 = "怎麼了？為什麼要用那種眼神看我？"
3603-176 = "沒什麼，只是覺得彌香難得說了句好話而已。"
3603-177 = "什麼啦！我也是會成長的好嗎！？"
3603-181 = "我先去發動車子。你慢慢過來吧。"
3603-190 = "甜蜜與懷舊"

[translation]
10036095-5 = "อึกก..."
10036095-11 = "ว้าย! เจ็บนะคะ!"
10036095-12 = "มันจบแล้วละ แยงกี้สาวในตำนาน"
10036095-13 = "สมุนของเธอก็ร่วงกันหมดแล้ว สู้กันต่อไปก็ไม่มีความหมายหรอก"
10036095-14 = "หรือว่า... เธอจะอยากลุยเดี่ยว?"
10036095-15 = "คุณบอกว่า... การแก้แค้นของดิฉันมันจบแล้วงั้นเหรอคะ...!"
10036095-16 = "ฮึ่ม พวกคุณเป็นใครมาจากไหนกันแน่คะ? ดูทรงแล้วไม่น่าจะใช่พวกแก๊งหมวกกันน็อกด้วย..."
10036095-20 = "พวกเรา..."
10036095-26 = "พอแค่นี้เถอะค่ะ อาเคมิ"
10036095-27 = "[ns] (ใครติดต่อเข้ามาน่ะ...?)"
10036095-29 = "ฉันว่าคุณเตรียมตัวออกจากชายหาดนั่นดีกว่าค่ะ"
10036095-30 = "คะ? แต่ดิฉันยังสู้ไหวนะคะ?"
10036095-32 = "ฮุฮุ แสร้งทำเป็นสู้ไหวหรือเปล่าคะ?"
10036095-33 = "คนที่ถูกคุมขังอยู่เป็นเวลานานน่ะ ร่างกายคงไม่อยู่ในสภาพสมบูรณ์หรอกค่ะ"
10036095-34 = "และถ้ายังขืนสู้ต่อไปละก็..."
10036095-35 = "คุณอาจจะต้องกลับไปสำนักควบคุมก่อนที่จะได้ลงมือแก้แค้นก็ได้นะคะ แล้วฉันก็ไม่อยากแนะนำให้ทำ#nอย่างนั้นด้วยค่ะ"
10036095-36 = "นั่นก็เพราะ... ในหมู่อาชญากรที่ฉันลงมือช่วยให้แหกคุกออกมาได้"
10036095-37 = "คุณเป็นคนที่ตรงใจฉันมากที่สุด และฉันก็ไม่อยากเสียคุณไปทั้งๆ แบบนี้ด้วยค่ะ"
10036095-38 = "ฉันขอแนะนำให้คุณแยกตัวออกมาจากสมุนของคุณในตอนที่ยังหนีได้อยู่ค่ะ"
10036095-40 = "อ่า... ศาสตราจารย์ยิ้มหวาน... นี่คุณ..."
10036095-41 = "[s] (ศาสตราจารย์ยิ้มหวาน... งั้นเหรอ?)"
10036095-47 = "ฉันพูดอะไรไปเยอะแล้วค่ะ การให้คำแนะนำของฉันคงจบแค่เท่านี้ค่ะ"
10036095-53 = "ฮึ่ม..."
10036095-54 = "เข้าใจแล้วค่ะ คำแนะนำของคุณน่ะ ครั้งนี้ดิฉันก็จะจดจำใส่ใจไว้ค่ะ"
10036095-55 = "ทุกคนคะ! ถึงจะน่าเสียดาย แต่ครั้งนี้ดิฉันจะยอมถอยให้"
10036095-56 = "แก๊งหมวกกันน็อก แม่หนูกระรอกบิน แล้วก็พวกคุณตรงนั้นน่ะ! ดิฉันจำหน้าพวกคุณไว้หมดแล้วค่ะ!"
10036095-57 = "หวังว่าเราจะไม่บังเอิญเจอกันตามท้องถนนนะคะ เพราะถ้าเจอกัน วันนั้นจะเป็นวันซวยของพวกคุณเลย#nละ!"
10036095-58 = "ดิฉันไม่รับประกันด้วยค่ะว่าจะยอมถอยให้แบบวันนี้อีกหรือเปล่า"
10036095-59 = "เอาละ แยงกี้สาวทุกคน คนที่ยังขยับไหว ให้ไปช่วยประคองเพื่อนๆ แล้วล่าถอยกันค่ะ!"
10036095-60 = "ค่ะ ค่ะ! ลูกพี่ใหญ่! รับคำสั่งค่ะ!"
10036095-64 = "อ๊ะ เจ้าพวกนั้น! คิดจะหนีเหรอ! ตามไปเร็ว!"
10036095-65 = "หยุดเดี๋ยวนี้นะ!!"
10036095-72 = "ผะ... เผ่นกันเร็วจังเลยค่ะ..."
10036095-73 = "[s1] \"เกิดเรื่องแบบไม่ทันได้ตั้งตัวเลยนะ...\"\n[s2] \"เราคงไม่ต้องตามไปหรอกเนอะ\""
10036095-78 = "[ns] \"เรื่องนั้นน่ะช่างเถอะ ที่สำคัญกว่านั้นคือ...\""
10036095-81 = "..."
10036095-82 = "..."
10036095-83 = "หัวหน้า"
10036095-84 = "พี่ซาโอริ..."
10036095-88 = "อะ... เอ่อ!"
10036095-93 = "สนุกกับงานเทศกาลมั้ย อาสึโกะ?"
10036095-94 = "อื้ม สนุกดี..."
10036095-95 = "แล้วซัตจังล่ะ?"
10036095-96 = "ฉันก็สนุกเหมือนกัน..."
10036095-98 = "ไม่คิดเลยนะว่าเราจะจับตาดูกันและกันอยู่แบบนี้..."
10036095-99 = "นึกไม่ถึงเลยนะว่าพฤติกรรมที่เปลี่ยนไปของดีเจ B.o.B และที่ฉันชนะในการแข่งขันปืนฉีดน้ำจะมาจาก#nฝีมือของพวกเธอ"
10036095-100 = "พี่ซาโอริคือคนที่แอบซื้ออาหารกลางวันเลี้ยงพวกเราเหรอคะเนี่ย... แถมยังมาช่วยจัดการพวกแยงกี้#nให้ตอนพวกเราเล่นสนุกกันอยู่อีก... ฉันนึกไม่ถึงเลยละค่ะ"
10036095-101 = "แล้วก็... คุณครูรู้เรื่องพวกนี้ทั้งหมด แต่ก็ไม่บอกใครเลย"
10036095-102 = "[s3] \"ซะ... เซอร์ไพรส์...?\"\n[s4] \"ก็... ต่างฝ่ายต่างมีเหตุผลกันไง...\""
10036095-105 = "จะโทษครู [USERNAME] ไม่ได้หรอก"
10036095-106 = "ทั้งฉันกับพวกเธอต่างก็ขอให้ครูเก็บเรื่องนี้เป็นความลับนี่นา"
10036095-107 = "ครูก็แค่รักษาสัญญาที่ให้ไว้กับพวกเราน่ะ"
10036095-108 = "จะว่าอย่างนั้นมันก็ถูกหรอกนะ... แต่มันก็รู้สึกเหมือนถูกหลอกอยู่ดี"
10036095-109 = "ถ้างั้นก็เท่ากับว่าคุณครูช่วยให้เราทุกคนได้สนุกกับงานเทศกาลน่ะสิ?"
10036095-110 = "[s] \"จะมองอย่างนั้น... ก็ได้นะ...?\""
10036095-111 = "ขอบคุณนะครู"
10036095-112 = "ขอบคุณนะ คุณครู"
10036095-114 = "ขอบคุณที่ช่วยทำให้พวกเรามีความทรงจำดีๆ ในฤดูร้อนนะ"

[translation]
10036095-5 = "呃啊……"
10036095-11 = "哎呀！好痛！"
10036095-12 = "到此為止了，傳說的太妹。"
10036095-13 = "你的手下已經全部倒下了。#n繼續戰鬥下去也沒有意義。"
10036095-14 = "還是說……你打算一個人繼續戰鬥？"
10036095-15 = "小女子的復仇……只能到此為止了嗎……！"
10036095-16 = "嘖，你們到底是什麼人？#n看起來並不像普通的頭盔團啊……"
10036095-20 = "我們是……"
10036095-26 = "到此為止吧，明美。"
10036095-27 = "[ns]（……通訊？對方是誰？）"
10036095-29 = "是時候該從那個海灘撤退了。"
10036095-30 = "什麼？小女子還能戰鬥啊？"
10036095-32 = "呵呵，別逞強了。"
10036095-33 = "我知道你因為長期被關在矯正局的關係，身體尚未恢復到最佳狀態。"
10036095-34 = "要是在這種狀態下繼續戰鬥……"
10036095-35 = "恐怕還沒完成復仇就會被抓回矯正局的。#n我並不推薦你這麼做。"
10036095-36 = "──畢竟我可是好不容易才幫你們[ruby= ・     ・     ・ ]七罪人[/ruby]逃獄的啊。"
10036095-37 = "在這種場合失去跟我最合得來的你，是我最不樂見的情況。"
10036095-38 = "趁現在還能逃，趕緊帶著手下撤退吧。"
10036095-40 = "啊……笑咪咪教授，你……"
10036095-41 = "[s]（他剛才說……笑咪咪教授？）"
10036095-47 = "……話似乎說太多了呢。#n我的建議就到此為止。"
10036095-53 = "……哼。"
10036095-54 = "好吧。你的建議，小女子這次也會銘記於心。"
10036095-55 = "各位！雖然實屬遺憾，但小女子這次就先放你們一馬吧！"
10036095-56 = "頭盔團，以及那邊的飛鼠小姐們……你們的臉我都記住了！"
10036095-57 = "希望各位將來不會在路上碰到我！"
10036095-58 = "到時候，小女子可不保證你們能像這次一樣全身而退。"
10036095-59 = "那麼姐妹們，還能動的就去扶著其他同伴一起撤退吧！"
10036095-60 = "是，是！大姐頭！我們跟您一起走！"
10036095-64 = "啊，那，那些傢伙搞什麼啊！快追上去！"
10036095-65 = "給我站住！！"
10036095-72 = "他，他們逃得還真快……"
10036095-73 = "[s1]「還真是峰迴路轉啊……」\n[s2]「我們就別追過去了吧。」"
10036095-78 = "[ns]「話說回來，我們這邊……」"
10036095-81 = "……"
10036095-82 = "……"
10036095-83 = "隊長。"
10036095-84 = "沙織姐……"
10036095-88 = "那，那個……！"
10036095-93 = "覺得慶典怎麼樣啊，敦子？"
10036095-94 = "……嗯，很開心。"
10036095-95 = "沙醬呢？"
10036095-96 = "……我也很開心。"
10036095-98 = "……沒想到我們居然一直在暗中觀察著彼此啊。"
10036095-99 = "DJ B.o.B的態度之所以突然改變……#n還有莫名在水槍大賽中獲勝，原來都是因為你們啊。真是出乎我的意料。"
10036095-100 = "原來攤販的食物其實是沙織姐請的……#n而且在玩的時候還有太妹跑來襲擊，我們完全沒發現……"
10036095-101 = "……老師其實全都知道吧。"
10036095-102 = "[s3]「驚，驚不驚喜呀……？」\n[s4]「畢竟……大家各有各的苦衷嘛……」"
10036095-105 = "這件事不該責怪[USERNAME]老師。"
10036095-106 = "畢竟我們雙方都請老師保密了啊。"
10036095-107 = "老師也只是遵守約定罷了。"
10036095-108 = "話是這麼說沒錯……但還是有點不爽。"
10036095-109 = "這麼說來，其實老師才是讓我們都能享受慶典的功臣對吧？"
10036095-110 = "[s]「好像也不能這麼說……？」"
10036095-111 = "謝謝你，老師。"
10036095-112 = "老師，謝謝你。"
10036095-114 = "謝謝你守護了我們的夏天。"

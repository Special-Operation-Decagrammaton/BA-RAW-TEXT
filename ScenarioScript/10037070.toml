[translation]
10037070-1 = "Episode 7;Deep in the Yuzhou Forest"
10037070-4 = "Ugh...!"
10037070-16 = "..."
10037070-17 = "(I'm so confused. What happened...?)"
10037070-18 = "(Right... Red Winter's visitors were at the bamboo forest... We were going to see the pandas, and then...)"
10037070-22 = "(And then...?)"
10037070-23 = "[ns] \"Are you awake now, Kisaki?\""
10037070-27 = "Sensei? Why are you here...?"
10037070-28 = "No, wait a moment. I need to organize my thoughts..."
10037070-32 = "..."
10037070-33 = "Could you turn on some more lights? The room is a bit dark."
10037070-44 = "Augh!"
10037070-45 = "[s] \"...Should I turn them off again?\""
10037070-46 = "...Please..."
10037070-48 = "What happened at the bamboo forest?"
10037070-49 = "I see. So the visitors watched the pandas for a while and went back...?"
10037070-50 = "Chairman Marina kept trying to hug the pandas? Fufufu... Mina must have had a hard time trying to stop her..."
10037070-51 = "I guess Chairman Marina really does love bears a lot. But no matter how cute they are, pandas are still bears."
10037070-52 = "She could have gotten really hurt if something went wrong. I'm sure it was no easy feat for Mina to keep her safe."
10037070-53 = "What kind of president am I that I can't even welcome guests properly? I'm completely unqualified to be president. Don't you agree, Sensei?"
10037070-54 = "[s] \"...\""
10037070-55 = "Those students are amusing—the visitors from Red Winter."
10037070-58 = "And Great Leader Cherino, inscrutable as she is, seems to be very strong willed."
10037070-59 = "Chief Secretary Tomoe tries to hide it, but you can see her wisdom beneath that facade of hers."
10037070-60 = "And Chairman Marina, well... Fufufu! It's refreshing to see someone with her status be so delightful."
10037070-61 = "All the students are great. Everyone..."
10037070-62 = "[s] \"...\""
10037070-66 = "..."
10037070-67 = "Are you surprised, Sensei?"
10037070-68 = "[s1] \"...You can't keep worrying about the others, not in this state...\"\n[s2] \"I wish you would take care of yourself now.\""
10037070-71 = "That's what you have to say, Sensei?"
10037070-72 = "Do the other students know about my condition? And what about the visitors from Red Winter?"
10037070-73 = "[s] \"Saya handled everything well. Mina hasn't even noticed.\""
10037070-74 = "Is that so? Then I feel reassured."
10037070-75 = "[s] \"I wish you would tell me what happened to you.\""
10037070-76 = "It's nothing remarkable."
10037070-77 = "It's just...my body has become so weak that I can only function normally for a small amount of time per day."
10037070-78 = "[s] \"Isn't that really bad?!\""
10037070-79 = "It's okay. After all, I haven't entirely lost my mobility. So there are still plenty of things I can do, and that is enough for me. Really..."
10037070-80 = "Who else knows?"
10037070-81 = "As far as I understand it, no one except for Saya."
10037070-82 = "Even Rumi doesn't know. I did my best to ensure my secret wouldn't be revealed to anyone."
10037070-83 = "It's true. I've known Rumi for a very long time."
10037070-84 = "But I wasn't this weak when I was younger—when we were growing up together."
10037070-85 = "[s] \"You mean this came on suddenly?\""
10037070-89 = "..."
10037070-90 = "It all started when I made the unprecendented move to become the president of Genryumon in my second year."
10037070-93 = "The role of president customarily went to third-years, but that third-year student fell into disgrace and lost her position."
10037070-94 = "So everyone made the unanimous decision to select me."
10037070-95 = "Even now, it seems peculiar. Students who vehemently defended tradition broke it to designate me, a second-year, as the president of Genryumon..."
10037070-96 = "[s3] \"Could that be...\"\n[s4] \"Maybe that's because being president of Genryumon is demanding?\""
10037070-101 = "...Fufu..."
10037070-102 = "Sometimes it's good not to get too close to the truth, Sensei."
10037070-103 = "One of my first acts as a second-year president was to expel a third-year."
10037070-104 = "Everyone objected. A punishment that harsh usually requires one to follow very strict procedures."
10037070-105 = "...It was quite the paradox. The same people who bucked tradition to install a second-year as president clung to tradition for that decision."
10037070-106 = "Oh, dear... I've gotten off-track. Let's get back to the point."
10037070-107 = "Right after that, my body started exhibiting some unusual signs of illness."
10037070-108 = "But, well... Fufu. They could just as easily have been signs of stress from a demanding job as president."
10037070-109 = "[s] \"...\""
10037070-110 = "Why do you look so downcast, Sensei? Didn't I do a good job fooling the others?"
10037070-111 = "If neither you nor Rumi could tell, I must have."
10037070-112 = "In fact, I think my acting talents could earn me a spot in a theater company or movie club at a different academy."
10037070-113 = "Fufufu! Kivotos's acting world might be missing out on massive talent. Don't you think so, Sensei?"
10037070-114 = "[s5] \"If it's that exhausting, don't you think...\"\n[s6] \"Maybe you should give up this undercover stuff?\""
10037070-117 = "...Yes. That would probably be the right thing to do."
10037070-118 = "Someone who's lost control of her own body should be recuperating in the old palace."
10037070-119 = "You must be wondering why I keep changing my appearance and wandering around seemingly with no purpose..."
10037070-120 = "[s] \"...\""
10037070-121 = "Well, Sensei, this may be my selfishness and greed talking..."
10037070-122 = "But... Before it's too late..."
10037070-123 = "I want to see as much as I can while I still have time."
10037070-124 = "[s7] \"Why...are you hiding your illness from the other students?\"\n[s8] \"If you told them the truth, they might be able to help you.\""
10037070-129 = "..."
10037070-130 = "Because this is what being the president of Genryumon is."
10037070-141 = "If you show the slightest bit of weakness—of imperfection—they'll eat you alive from the inside."
10037070-142 = "That's how the president before me lost her position."
10037070-145 = "You think I take my role as president too seriously... If only I didn't, maybe I would be more at ease."
10037070-146 = "But, Sensei, you saw what Shanhaijing's students—Genryumon kids did..."
10037070-147 = "When I told them to welcome our guests according to the traditions of Genryumon, they took them to the interrogation room."
10037070-148 = "They interpreted my instructions as an order to uncover any conspiracies...!"
10037070-149 = "[s9] \"Plenty of students in other academies misbehave!\"\n[s10] \"The Gourmet Research Society or the Hot Springs Department, for example!\"\n[s11] \"Even the Engineering Department kids from Millennium... They're good-natured, but...!\""
10037070-153 = "...Is that so?"
10037070-154 = "..."
10037070-155 = "But, Sensei."
10037070-156 = "It still seems like... I'm having a hard time letting Shanhaijing be."
10037070-160 = "Kisaki slowly rose into a sitting position..."
10037070-167 = "Then she leaned toward me to rest her forehead against my chest."
10037070-168 = "Moonlight shone into the room from a nearby window."
10037070-171 = "I have a request to make of you."
10037070-172 = "I don't want anyone except you and Saya to know about my condition. Please."
10037070-173 = "Saya promised me that she would always keep my secret. So, if word gets around...I'll know who shared it."
10037070-174 = "[s] \"...Okay.\""
10037070-175 = "What's wrong, Sensei? You look distressed."
10037070-176 = "It's okay. I'm still alive and moving around, aren't I?"
10037070-180 = "I reached up and gently patted the back of Kisaki's hair."
10037070-181 = "Fufu... This is nice. I feel more at ease, and my pain feels like it's subsiding, even if it's just a little bit."
10037070-182 = "Don't worry so much, Sensei. Who else could I ask of for a favor like this if not you?"
10037070-187 = "Kisaki glanced up at me with bright eyes and a soft smile."
10037070-188 = "I couldn't bear to see that expression on her face, so I reluctantly closed my eyes..."
10037070-195 = "...Are you feeling okay, President?"
10037070-196 = "Yes, I feel a lot better. Don't worry."
10037070-197 = "This is so strange. I'm positive I took my immortality elixir today."
10037070-198 = "Yes. That's exactly why I'm here."
10037070-204 = "...Listen carefully, Madam. I discovered that someone swapped your elixir."
10037070-205 = "...?!"
10037070-206 = "I'm sure you understand the implications of such an act..."
10037070-212 = "Well first, I should reprimand you right here and now for your incompetence in managing the Eastern Alchemy Society human resources!"
10037070-213 = "Yes, I deserve to be chastised... But there is an even bigger problem!"
10037070-214 = "This means there's a mole in a key position in the Eastern Alchemy Society."
10037070-215 = "Yes, that is the only way to interpret it..."
10037070-216 = "I thought trouble rode in on the cold wind of the north, but perhaps it is from somewhere else."
10037070-217 = "Starting tomorrow, I will personally craft your immortality elixir, Madam. Then I'll begin investigating every member of the entire Eastern Alchemy Society."
10037070-218 = "It's a sad day when the president of the Eastern Alchemy Society can't trust her own people..."
10037070-219 = "It's rare, but it does happen occasionally."
10037070-220 = "Madam, you should start exercising a greater level of caution. And I'll accept the consequences of my failures once this is all sorted out."
10037070-221 = "Yes. Let's do that. You be careful as well."
10037070-222 = "I am sorry... If only I could make a more perfect elixir... "
10037070-223 = "If I could find a medicinal herb that would improve the president's condition even the slightest bit..."
10037070-224 = "But the results are always temporary, come with side effects, or do nothing to improve her situation..."
10037070-225 = "What are you saying? If it wasn't for your elixir, nothing would have worked out the way it did."
10037070-229 = "Madam, I beg you. Please cancel all your plans for tomorrow at least and get some rest."
10037070-230 = "Fufu... I'm afraid you are asking too much. We have valued guests visiting."
10037070-231 = "Perhaps, when our guests have returned home, I'll get some rest. But for now, please be forgiving of your terrible patient."
10037070-232 = "...I understand..."
10037070-238 = "A phone call...?"
10037070-242 = "It's a call for me. Who's this...Kaguya?"
10037070-249 = "It's so late... What's wrong?"
10037070-253 = "Please accept my sincerest apologies for calling at such a late hour, Madam! But I had to tell you that we just finished working on a new idea for the Peking opera!"
10037070-254 = "If possible, I'd like to perform it for the Red Winter visitors tomorrow before their tour ends. Would that be okay?"
10037070-255 = "A new Peking opera performance... First, I must compliment you on your efforts."
10037070-256 = "I will allow the performance, since it seems Great Leader Cherino really likes you."
10037070-257 = "I extend my gratitude for your generous decision, Madam! "
10037070-258 = "I'm obliged to inform you—since it's a new Peking opera, we would like to invite all of Genryumon members. Would that be okay?"
10037070-259 = "Hmm... Please do. White Tiger Park is spacious, and a good number of Genryumon members enjoy Peking opera."
10037070-260 = "Thank you, Madam! I will put my entire heart and soul into preparing for it!"
10037070-265 = "A new Peking opera in these times...?"
10037070-266 = "She seemed quite enthusiastic. It's a good quality in an artist."
10037070-267 = "And considering morale has been somewhat...downcast lately, this may be the perfect opportunity to lift spirits."
10037070-268 = "Will the Eastern Alchemy Society also participate? I'll prepare a spot for them for now."
10037070-269 = "Hmm... The Eastern Alchemy Society should be reflecting on their actions right now..."
10037070-270 = "However, trying to suppress them further may cause the pot to boil over, so to speak."
10037070-271 = "I'm sure you already have a tight grip on the Eastern Alchemy Society's discipline today. Is that right?"
10037070-272 = "...You already knew that..."
10037070-273 = "Of course. It's exactly the type of thing you would do. Fufu! I'm looking forward to tomorrow. "

[translation]
10037070-1 = "ตอนที่ 7;ในป่าของราชาเยาว์วัย"
10037070-4 = "อึก...!"
10037070-16 = "..."
10037070-17 = "(ทำไมจำอะไรไม่ได้ เกิดเรื่องอะไรขึ้นอย่างนั้นหรือ...)"
10037070-18 = "(ใช่... เราอยู่ในป่าไผ่กับคณะผู้มาเยือนจากเรดวินเทอร์... แล้วก็ชวนไปดูแพนด้า แล้วก็...)"
10037070-22 = "(แล้วก็...?)"
10037070-23 = "[ns] \"รู้สึกตัวแล้วเหรอ คิซากิ?\""
10037070-27 = "ครู? เหตุใดครูถึงมาอยู่ที่นี่..."
10037070-28 = "เดี๋ยวนะ รอเดี๋ยว เราขอจัดระเบียบความคิดหน่อย..."
10037070-32 = "..."
10037070-33 = "ช่วยเปิดไฟให้เราหน่อยสิ ห้องมันมืดไปหน่อยน่ะ"
10037070-44 = "อึก...!"
10037070-45 = "[s] \"ให้ปิดอีกรอบมั้ย...?\""
10037070-46 = "รบกวนด้วย..."
10037070-48 = "เหตุการณ์ในป่าไผ่เป็นเช่นไรบ้าง?"
10037070-49 = "อย่างนั้นสินะ คณะผู้มาเยือนดูแพนด้าแล้วกลับไปพักกันแล้วหรือ...?"
10037070-50 = "หัวหน้าคณะฯ มารินะอยากเข้าไปกอดแพนด้าจนมินะต้องห้ามไว้ด้วยหรือ? ฮุฮุ..."
10037070-51 = "ท่าทางหัวหน้าคณะฯ มารินะจะชื่นชอบหมีเอามากๆ เลยนะ แต่ถึงแพนด้าจะน่ารักแค่ไหน พวกมันก็ยังเป็นหมี"
10037070-52 = "หากไม่ระวังก็อาจเกิดอันตรายได้ มินะคงต้องเหนื่อยน่าดูเลยนะ"
10037070-53 = "เราเป็นถึงประมุขแท้ๆ แต่กลับต้อนรับแขกบ้านแขกเรือนไม่ได้ แบบนี้จะเรียกว่ามีคุณสมบัติของประมุข#nไม่ได้แล้วละ ครูเองก็คิดเช่นนั้นไหมเล่า?"
10037070-54 = "[s] \"...\""
10037070-55 = "ผู้มาเยือนจากเรดวินเทอร์เป็นนักเรียนที่น่าสนใจนะ"
10037070-58 = "ถึงเราจะยังไม่รู้จิตใจของเลขาธิการเชริโน่นัก แต่เธอก็ดูมีความหนักแน่นพอสมควรเลย"
10037070-59 = "ส่วนหัวหน้าเลขานุการโทโมเอะ ถึงเธอจะพยายามซ่อนตัวตนไว้ แต่ก็แสดงสติปัญญาออกมาให้เห็น#nโดยที่ไม่รู้ตัว"
10037070-60 = "แล้วก็หัวหน้าคณะฯ มารินะ... ฮุฮุ ถึงจะอยู่ในตำแหน่งนั้น แต่กลับเป็นคนที่ทำให้หายเครียดได้ แค่ได้เห็นเธอก็สนุกตามไปด้วยแล้วละ"
10037070-61 = "ทุกคนเป็นนักเรียนที่ดีจริงๆ... ทุกคนเลย..."
10037070-62 = "[s] \"...\""
10037070-66 = "..."
10037070-67 = "ตกใจมากเลยหรือครู?"
10037070-68 = "[s1] \"ตอนนี้ไม่ต้องห่วงคนอื่นหรอก ห่วงตัวเองก่อนเถอะนะ...\"\n[s2] \"เวลาแบบนี้ไม่ต้องใส่ใจคนอื่นก็ได้ ใส่ใจตัวเองก่อนนะ...\""
10037070-71 = "นี่สินะที่ครูอยากบอกเรา"
10037070-72 = "ว่าแต่นักเรียนคนอื่น... รวมถึงผู้มาเยือนจากเรดวินเทอร์รู้หรือไม่ว่าเราเป็นเช่นนี้?"
10037070-73 = "[s] \"ซายะช่วยจัดการไว้ได้น่ะ แม้แต่มินะเองก็ยังไม่รู้เรื่องเลย\""
10037070-74 = "เช่นนั้นหรือ? งั้นเราก็เบาใจได้หน่อย"
10037070-75 = "[s] \"ว่าแต่นี่มันเรื่องอะไรเหรอ บอกครูได้หรือเปล่า?\""
10037070-76 = "ไม่ได้มีเรื่องอะไรใหญ่โตหรอก"
10037070-77 = "ก็แค่... เราอ่อนแอจนขนาดที่ร่างกายเคลื่อนไหวได้อย่างจำกัดในแต่ละวันน่ะ"
10037070-78 = "[s] \"แบบนั้นมันเรื่องใหญ่เลยนะ!\""
10037070-79 = "ไม่เป็นไรหรอก ถึงอย่างไรก็ยังใช้ร่างกายได้ และนั่นก็หมายความว่าเรายังทำงานได้อยู่ แค่นั้นก็เพียงพอแล้วละ..."
10037070-80 = "มีนักเรียนคนไหนที่รู้ความจริงนี้อีกหรือเปล่าน่ะหรือ?"
10037070-81 = "ตามที่เรารู้ นอกจากซายะก็ไม่มีใครรู้แล้วนะ"
10037070-82 = "ใช่แล้วละ แม้แต่รูมิเองก็ไม่รู้ เราเป็นคนกำชับไว้ว่าอย่าบอกให้ใครรู้น่ะ"
10037070-83 = "สงสัยว่าเรากับรูมิรู้จักกันมานานแล้วหรือเปล่าน่ะหรือ? ใช่แล้วละ"
10037070-84 = "ทว่าตอนที่เราเติบโตมากับรูมิ เรายังไม่ได้อ่อนแอถึงเพียงนี้"
10037070-85 = "[s] \"แล้วจู่ๆ ร่างกายก็แย่ลงตั้งแต่ตอนไหนเหรอ?\""
10037070-89 = "..."
10037070-90 = "ทุกอย่างเริ่มขึ้นตั้งแต่เราขึ้นมาอยู่ในตำแหน่งประมุขแห่งมังกรดำในวิถีที่แตกต่างออกไปตอนเราอยู่ชั้น#nปีที่ 2 น่ะ"
10037070-93 = "ตามธรรมเนียมปฏิบัติแล้ว คนที่รับตำแหน่งประมุขได้ต้องเป็นนักเรียนที่อยู่ชั้นปีที่ 3 แต่นักเรียนชั้นปีที่ 3 คนนั้นถูกปลดออกเพราะมีเรื่องไม่สู้ดีนัก"
10037070-94 = "และด้วยเหตุผลบางอย่าง ทุกคนก็เสนอชื่อเราอย่างเป็นเอกฉันท์"
10037070-95 = "ถึงจะกลับมาคิดตอนนี้ก็ยังเป็นเรื่องน่าแปลก เพราะเหล่านักเรียนที่ให้ความสำคัญกับประเพณีถึงกับฝืน#nธรรมเนียมปฏิบัติและเลือกให้นักเรียนชั้นที่ปี 2 เป็นประมุขแห่งมังกรดำ..."
10037070-96 = "[s3] \"เพราะตำแหน่งนี้ไม่ใช่ว่าใครก็เป็นได้หรือเปล่า...?\"\n[s4] \"เพราะประมุขแห่งมังกรดำเป็นตำแหน่งที่ต้องเจองานหนักหรือเปล่า...?\""
10037070-101 = "ฮุฮุ..."
10037070-102 = "บางครั้งเราก็ไม่ควรเข้าใกล้เสี้ยวหนึ่งของความจริงมากเกินไปนะ ครู"
10037070-103 = "การตัดสินใจแรกของเราในฐานะประมุขที่เป็นนักเรียนชั้นปีที่ 2 ก็คือการใช้อำนาจไล่นักเรียนชั้นปีที่ 3 บางคนออกจากโรงเรียนน่ะ"
10037070-104 = "แน่นอนว่าทุกคนต่างก็ประท้วง และบอกว่าการจะลงโทษสถานหนักเช่นนั้นกับนักเรียนซานไห่จิง จะต้องทำตามขั้นตอนและกระบวนการตามประเพณีของโรงเรียน"
10037070-105 = "แต่เราว่ามันย้อนแย้งกันน่ะ ตอนยกย่องให้นักเรียนชั้นปีที่ 2 ขึ้นเป็นประมุขกลับไม่พูดอะไรถึงเรื่อง#nประเพณีเลย แต่พอเราตัดสินใจอะไร ก็ยกประเพณีหรือธรรมเนียมอะไรนั่นมาอ้าง"
10037070-106 = "แย่ละสิ เราชวนครูคุยออกทะเลแล้วสินะ กลับมาที่เรื่องเดิมของเราเถอะ"
10037070-107 = "ที่ร่างกายของเราเริ่มผิดปกติ... ก็หลังจากตอนนั้นนั่นละ"
10037070-108 = "ฮุฮุ บางทีนั่นอาจจะเป็นน้ำหนักของตำแหน่งประมุข หรือไม่ก็น้ำหนักของบัลลังก์ก็ได้"
10037070-109 = "[s] \"...\""
10037070-110 = "อะไรกัน ทำไมครูทำหน้าหม่นหมองเช่นนั้นเล่า ที่ผ่านมาก็ถือว่าเราปกปิดเรื่องนี้ได้ดีเลยมิใช่หรือ?"
10037070-111 = "เราคงแสดงละครใช้ได้เลยนะ เพราะกระทั่งรูมิหรือครูเองก็ไม่รู้เลยด้วย"
10037070-112 = "แบบนี้เราคงเข้าชมรมละครเวทีหรือภาพยนตร์ของโรงเรียนอื่นได้สบายๆ เลยละ"
10037070-113 = "ฮุฮุฮุ บางทีวงการละครของคิโวทอสอาจจะกำลังสูญเสียบุคลากรชั้นยอดอยู่ก็ได้นะ ครูเองก็คิดเช่นนั้น#nไหมเล่า?"
10037070-114 = "[s5] \"ถ้าเหนื่อยขนาดนั้น ก็เลิกปลอมตัวเพื่อทำงานมั้ย...?\"\n[s6] \"ถ้าร่างกายไม่ไหว ก็หยุดปลอมตัวเพื่อตรวจงานอย่างลับๆ ดีมั้ย?\""
10037070-117 = "อืม... ที่ครูพูดมามันก็ถูก"
10037070-118 = "คนที่ควบคุมร่างกายของตัวเองไม่ได้ ก็ควรจะอยู่อย่างสงบเสงี่ยมหรือได้รับการดูแลอยู่ในราชสำนัก"
10037070-119 = "เหตุใดจึงต้องปลอมตัวแล้วออกไปเดินเตร็ดเตร่ข้างนอกอย่างไร้ประโยชน์ด้วยก็ไม่รู้ คิดว่าจะมีอะไรให้#nดูเช่นนั้นหรือ"
10037070-120 = "[s] \"...\""
10037070-121 = "แต่ถึงกระนั้น ครู เรารู้ดีว่านี่เป็นความโลภที่เห็นแก่ตัวและโง่เขลาของเรา"
10037070-122 = "แต่ว่า... ก่อนที่ทุกอย่างจะสายเกินแก้"
10037070-123 = "เราก็อยากเห็นสิ่งต่างๆ ด้วยตาของเราเองให้มากกว่านี้น่ะ..."
10037070-124 = "[s7] \"ทำไมต้องปกปิดเรื่องที่ไม่สบายกับนักเรียนคนอื่นด้วยล่ะ?\"\n[s8] \"ทำไมไม่ขอความช่วยเหลือจากคนอื่นล่ะ บางทีอาจจะมีวิธีก็ได้นะ?\""
10037070-129 = "..."
10037070-130 = "เป็นเพราะตำแหน่งของประมุขมังกรดำน่ะ"
10037070-141 = "หากเราไม่แสดงภาพลักษณ์ที่แข็งแกร่งและสมบูรณ์แบบอยู่เสมอ เราก็จะถูกกัดกินจากข้างใน"
10037070-142 = "คนที่เป็นประมุขก่อนหน้าเราก็ถูกปลดออกด้วยเหตุผลนั้นละ"
10037070-145 = "เราจำเป็นต้องยึดติดกับตำแหน่งประมุขถึงเพียงนั้นเลยหรือเปล่าน่ะหรือ? ถ้าคิดแบบนั้นได้ อะไรๆ ก็คง#nง่ายขึ้นบ้างละนะ ทว่า..."
10037070-146 = "คะ... ครูยังจำได้ไหมเล่า? เหล่านักเรียนซานไห่จิง... และเด็กๆ ในมังกรดำ..."
10037070-147 = "พวกเธอส่งตัวคนจากเรดวินเทอร์ไปยังห้องสอบสวนเพราะได้รับคำสั่งให้ปฏิบัติกับผู้มาเยือนอย่างจริง#nใจตามธรรมเนียมของมังกรดำ"
10037070-148 = "แล้วยังเค้นถามว่ากำลังคิดแผนร้ายอะไรอยู่ในใจด้วย..."
10037070-149 = "[s9] \"เพราะนักเรียนโรงเรียนอื่นบางคนก็ทำพฤติกรรมแปลกๆ น่ะ\"\n[s10] \"เพราะมีเด็กอย่างพวกชมรมชิมอาหารหรือชมรมพัฒนาออนเซ็นน่ะ\"\n[s11] \"เพราะในคิโวทอสก็มีเด็กอย่างชมรมวิศวกรรมของมิลเลเนียมน่ะ\""
10037070-153 = "เป็นเพราะเหตุนั้นหรือ...?"
10037070-154 = "..."
10037070-155 = "ถึงกระนั้นก็ตามเถอะ ครู"
10037070-156 = "ยังไงเราก็คง... ทอดทิ้งซานไห่จิงไม่ได้หรอก"
10037070-160 = "(คิซากิค่อยๆ พยุงตัวเองขึ้นจากที่นอน)"
10037070-167 = "(คิซากิเอาหน้าผากมาชนตรงช่วงอกของคุณครูเบาๆ)"
10037070-168 = "(พร้อมกับแสงจันทร์ด้านนอกหน้าต่างที่สาดส่องเข้ามายังภายในห้อง)"
10037070-171 = "เรามีเรื่องขอร้องน่ะ ครู"
10037070-172 = "ช่วยอย่าบอกให้ใครอื่นรู้ได้หรือไม่ว่าเราเป็นเช่นนี้ นอกจากซายะกับครูแล้ว เราไม่อยากให้คนอื่นรู้ไปด้วย"
10037070-173 = "ซายะให้คำมั่นกับเราไว้แล้วว่าจะไม่บอกใคร ดังนั้นหากเรื่องนี้แพร่งพรายออกไป... เราก็จะรู้ได้ว่าต้นตอมาจากไหน"
10037070-174 = "[s] \"อืม...\""
10037070-175 = "ทำไมเหรอ ครู? ทำไมถึงทำสีหน้าเจ็บปวดเช่นนั้นเล่า?"
10037070-176 = "เราไม่เป็นไรหรอก เรายังมีชีวิตอยู่ ยังขยับตัวได้อยู่เลยไม่ใช่หรือไง?"
10037070-180 = "(คุณครูลูบท้ายทอยของคิซากิเบาๆ)"
10037070-181 = "ฮุฮุ... ดีจังเลยนะ เราสบายใจขึ้นมากเลย เหมือนว่าความเจ็บปวดจะบรรเทาลงเลยละ ถึงจะแค่เล็กน้อยก็เถอะ"
10037070-182 = "ไม่ต้องเป็นทุกข์ขนาดนั้นหรอกนะ อีกอย่าง ถ้าไม่ใช่ครู เราก็ไม่รู้จะรบกวนเรื่องแบบนี้กับใครแล้วละ"
10037070-187 = "(คิซากิเงยหน้าขึ้นจนเห็นดวงตาอันสดใสและรอยยิ้มที่แสนจะอ่อนโยน)"
10037070-188 = "(คุณครูไม่กล้าสบตาสิ่งที่เห็นตรงหน้า จึงหลับตาลงอย่างไม่รู้ตัว...)"
10037070-195 = "อาการเป็นยังไงบ้าง ประมุข?"
10037070-196 = "ดีขึ้นเยอะแล้วละ ไม่ต้องกังวลหรอก"
10037070-197 = "แต่นี่ก็เป็นเรื่องแปลกนะ วันนี้เราก็กินยาลูกกลอนที่เธอทำมาให้ไปแล้วแท้ๆ"
10037070-198 = "อื้อ เรามาหาเพราะเรื่องนั้นนั่นละ"
10037070-204 = "ตั้งใจฟังให้ดีล่ะ... ประมุข เราไปตรวจสอบจนเจอมาว่ามีการแอบสับเปลี่ยนยาลูกกลอนน่ะ"
10037070-205 = "...?!"
10037070-206 = "หากเป็นประมุขที่เฉลียวฉลาด ก็คงคาดเดาได้ว่าการทำแบบนั้นหมายความว่าอะไร"
10037070-212 = "เช่นนั้นเราต้องตำหนิเรื่องการจัดการคนในชมรมวิจัยศาสตร์การปรุงยาก่อนหรือเปล่า?"
10037070-213 = "ท่านซายะพร้อมยอมรับคำตำหนิแบบนั้นอยู่แล้วละ... แต่ว่ามันยังมีปัญหาที่ใหญ่กว่านั้นน่ะสิ...!"
10037070-214 = "หมายความว่าในชมรมวิจัยศาสตร์การปรุงยามีเกลือเป็นหนอนสินะ"
10037070-215 = "คงวิเคราะห์เป็นอย่างอื่นไม่ได้แล้วละ..."
10037070-216 = "นึกว่าลมหนาวพัดมาจากทางเหนือเสียอีก แต่ที่จริงแล้วลมพัดมาจากทางอื่นเช่นนั้นหรอกหรือ..."
10037070-217 = "ตั้งแต่พรุ่งนี้เป็นต้นไป ท่านซายะจะทำยาลูกกลอนแล้วเอามาส่งให้ประมุขด้วยตัวเอง แล้วก็จะตรวจสอบการจัดบุคลากรทั้งหมดในชมรมวิจัยศาสตร์การปรุงยาด้วย"
10037070-218 = "น่าเศร้าอยู่เหมือนกันนะ ไม่คิดเลยว่าจะมีเหตุให้หัวหน้าชมรมวิจัยศาสตร์การปรุงยาไม่ไว้เนื้อเชื่อใจ#nสมาชิกชมรมตัวเอง..."
10037070-219 = "เรื่องแบบนี้ไม่ควรเกิดขึ้นบ่อยๆ แต่ก็ใช่ว่าจะเกิดขึ้นไม่ได้หรอกนะ"
10037070-220 = "ประมุขเองก็เพิ่มความระมัดระวังเอาไว้ด้วยล่ะ ส่วนเรื่องการรับผิดชอบและการลงโทษ เอาไว้จบเรื่องนี้#nแล้วออกคำสั่งมาได้เลย"
10037070-221 = "อืม ให้เป็นไปตามที่ว่าแล้วกัน เธอเองก็ระมัดระวังด้วยเล่า"
10037070-222 = "ขอโทษนะ... ถ้าท่านซายะทำยาลูกกลอนได้สมบูรณ์แบบกว่านี้... "
10037070-223 = "ถ้าหาสมุนไพรที่ทำให้อาการของประมุขทุเลาลงได้มากกว่านี้ก็คงจะดี..."
10037070-224 = "แต่ที่ทำได้มีเพียงทำยาที่ออกฤทธิ์แค่ชั่วคราว ไหนจะยังมีผลข้างเคียง และได้แค่ประคับประคอง#nอาการเท่านั้น..."
10037070-225 = "พูดเรื่องอะไรอยู่น่ะ ถ้าเราไม่ได้ยาลูกกลอนจากเธอ ป่านนี้เราคงทำอะไรไม่ได้เลยก็ได้"
10037070-229 = "ประมุข... ถือว่าขอร้องละ ยกเลิกตารางงานสัก 1 สัปดาห์ ไม่สิ อย่างน้อยก็แค่ของวันพรุ่งนี้ก็ได้ แล้วนอนพักผ่อนบ้างเถอะนะ"
10037070-230 = "ฮุฮุ เช่นนั้นคงไม่ได้หรอก เรามีแขกคนสำคัญอยู่ที่นี่น่ะ"
10037070-231 = "ไว้ถ้าส่งแขกกลับแล้ว เราจะยกเลิกตารางงานสักระยะตามที่เธอแนะนำ เพราะงั้นก็ช่วยเข้าใจคนไข้ที่#nไม่เอาไหนคนนี้ด้วยนะ"
10037070-232 = "เข้าใจแล้ว..."
10037070-238 = "มีโทรศัพท์เข้ามาเหรอ...?"
10037070-242 = "มีคนโทรฯ ตามตัวเราสินะ มาจาก... คางุยะงั้นเหรอ?"
10037070-249 = "มีเรื่องอะไรหรือ? นี่ก็ดึกมากแล้วนะ"
10037070-253 = "ค่ะ ขออภัยที่ติดต่อมายามดึกค่ะ ท่านประมุข! แต่ว่าฉันเพิ่งแต่งการแสดงงิ้วเรื่องใหม่เสร็จพอดีน่ะค่ะ!  "
10037070-254 = "ถ้าเป็นไปได้ ฉันอยากเชิญให้ท่านกับคณะผู้มาเยือนจากเรดวินเทอร์มารับชมการแสดงงิ้วชุดใหม่ก่อน#nกลับน่ะค่ะ จะได้มั้ยคะ?"
10037070-255 = "การแสดงงิ้วชุดใหม่งั้นหรือ... ก่อนอื่นเราคงต้องขอบใจที่เธอทำงานหนักเพื่อโรงเรียนนะ"
10037070-256 = "เราอนุญาตให้จัดการแสดงได้ อย่างไรเสียเลขาธิการเชริโน่ก็ถูกใจพวกเธอไม่น้อยเลยด้วย"
10037070-257 = "ขอบคุณสำหรับความเมตตาที่มากมายดุจดั่งแม่น้ำและทะเลค่ะ ท่านประมุข!"
10037070-258 = "นี่เป็นการแสดงงิ้วชุดใหม่ ฉันกับทางชมรมจึงอยากเชิญมังกรดำทุกคนมาร่วมชมด้วย ถ้าเป็นแบบนั้นจะ#nเป็นอะไรหรือเปล่าคะ?"
10037070-259 = "ฮืม... เอาสิ จัดการแสดงที่สวนพยัคฆ์ขาวได้เลย ที่นั่นเป็นที่ที่กว้างขวาง ในบรรดาสมาชิกมังกรดำก็มี#nคนที่ชื่นชอบการแสดงงิ้วเป็นทุนอยู่แล้วด้วย"
10037070-260 = "ขอบคุณค่ะ ท่านประมุข! ฉันจะเตรียมงานอย่างสุดหัวใจเลยค่ะ!"
10037070-265 = "จะจัดการแสดงงิ้วในเวลาแบบนี้เนี่ยนะ...?"
10037070-266 = "ดูเหมือนทางนั้นจะตื่นเต้นมากเลย คนเป็นศิลปินก็คงจะมีมุมอย่างนั้นนั่นละ"
10037070-267 = "ไหนๆ อาการของเราก็ดีขึ้นแล้ว เช่นนั้นก็ควรหาโอกาสทำให้ตัวเองสดใสขึ้นหน่อยสิ"
10037070-268 = "ชมรมวิจัยศาสตร์การปรุงยาก็มาชมการแสดงด้วยกันสิ เราจะเตรียมที่นั่งไว้ให้"
10037070-269 = "อืม... ตอนนี้ชมรมวิจัยศาสตร์การปรุงยาควรจะอยู่เฉยๆ และสงบปากสงบคำน่ะ..."
10037070-270 = "ว่ากันว่าหากบังคับกันมากเกินไป แม้แต่น้ำก็เดือดเป็นไอได้นะ"
10037070-271 = "วันนี้เธอเองก็ลงโทษชมรมวิจัยศาสตร์การปรุงยามาอย่างเข้มงวดแล้วมิใช่หรือ?"
10037070-272 = "อ่านใจกันได้หรือยังไงน่ะ..."
10037070-273 = "แน่นอนอยู่แล้ว เราพอรู้นิสัยของเธอนะ ฮุฮุ... ชักจะตื่นเต้นกับพรุ่งนี้แล้วละสิ "

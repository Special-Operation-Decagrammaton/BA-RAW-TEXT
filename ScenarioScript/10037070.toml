[translation]
10037070-1 = "第7話;於蓊鬱森林之中"
10037070-4 = "唔……！"
10037070-16 = "……"
10037070-17 = "（記憶好混亂。到底發生了什麼事……）"
10037070-18 = "（對了……記得是和赤冬的訪問團……到竹林觀賞熊貓，然後……）"
10037070-22 = "（然後呢……？）"
10037070-23 = "[ns]「你醒了嗎，妃姬？」"
10037070-27 = "老師？老師為何於此……"
10037070-28 = "不，請稍微讓妾身整理一下思緒……"
10037070-32 = "……"
10037070-33 = "能麻煩汝幫妾身開燈嗎？房內有些昏暗。"
10037070-44 = "唔……！"
10037070-45 = "[s]「……還是關掉比較好嗎？」"
10037070-46 = "麻煩了……"
10037070-48 = "竹林的事，後來怎麼樣了？"
10037070-49 = "原來如此，訪問團看完熊貓後順利回去了……？"
10037070-50 = "瑪麗娜委員長老是想把熊貓抱在懷裡，美奈為了勸阻而吃了苦頭？呵呵……"
10037070-51 = "看來瑪麗娜委員長是真的很喜歡熊啊。#n不過即便熊貓看起來再怎麼可愛，其本質依然是熊。"
10037070-52 = "要是有什麼萬一可能會受重傷的。#n也真是辛苦美奈了。"
10037070-53 = "唉，連客人都無法好好迎接，實在沒資格擔任門主……老師不這麼認為嗎？"
10037070-54 = "[s] 「……」"
10037070-55 = "赤冬的訪問團真是一群有趣的學生。"
10037070-58 = "雖然對潔莉諾書記長內心想法的瞭解相對有限，不過他看起來相當果斷。"
10037070-59 = "智惠秘書室長儘管深藏不露，卻還是能隱約窺見他流露出的睿智。"
10037070-60 = "至於瑪麗娜委員長……呵呵，以其所處的地位而言，給人的感覺相當清新。#n光是看著就能感受到快樂。"
10037070-61 = "大家都是好學生呢……"
10037070-62 = "[s] 「……」"
10037070-66 = "……"
10037070-67 = "是否讓汝感到驚訝了呢，老師？"
10037070-68 = "[s1]「沒必要連這種時候還想著照顧別人哦……」\n[s2]「我希望妃姬現在能多照顧自己。」"
10037070-71 = "這便是老師的回答嗎。"
10037070-72 = "其他學生……赤冬的訪問團也知曉妾身的狀態了嗎？"
10037070-73 = "[s]「因為沙耶處理得當，所以連美奈都沒察覺。」"
10037070-74 = "這樣啊。那妾身就放心了。"
10037070-75 = "[s]「希望你能告訴我真實的情況。」"
10037070-76 = "沒什麼大不了的。"
10037070-77 = "只是……妾身的身體變得很虛弱，每日僅能在有限的時間內正常活動。"
10037070-78 = "[s]「那不是很糟糕嗎！？」"
10037070-79 = "無須擔心。身體還能動就代表妾身還有能做的事。#n這樣已經夠了……"
10037070-80 = "是否有其他學生知道此事？"
10037070-81 = "就妾身所知，除了沙耶之外沒有任何人知道。"
10037070-82 = "沒錯，這件事連瑠美也不清楚。#n因為妾身對外封鎖了一切消息。"
10037070-83 = "妾身不是與瑠美相識已久？#n確實如汝所說。"
10037070-84 = "然而妾身與瑠美一同成長的時期，身體尚未衰弱至如今的程度。"
10037070-85 = "[s]「你是從什麼時候開始變成這樣的？」"
10037070-89 = "……"
10037070-90 = "一切都是在妾身破例以二年級學生的身份，接下玄龍門門主之位時開始的。"
10037070-93 = "門主之位過往皆是由三年級擔任，然而當年的門主由於一些醜聞而提早下台……"
10037070-94 = "而後又不知為何，眾人一致推舉由妾身接任門主。"
10037070-95 = "現在想來這也奇怪──#n最重視傳統的他們居然願意打破慣例，推舉當時的二年級學生成為門主……"
10037070-96 = "[s3]「我想這或許……」\n[s4]「是因為玄龍門門主是個吃力不討好的職位吧……？」"
10037070-101 = "……呵呵。"
10037070-102 = "有時對真相敬而遠之才是最明智的做法，老師。"
10037070-103 = "總之，在妾身於二年級就任門主後下達的第一道命令，就是讓一名三年級生退學。"
10037070-104 = "當然，這個命令遭到了眾人的反對。#n因為要對山海經的學生施以此等嚴懲，照例是必須經過一些流程和手續的。"
10037070-105 = "……這可真是自相矛盾。明明在推舉二年級生擔任門主之時對規矩視若無睹──#n然而當妾身要懲罰學生之時，卻又開始講究慣例。"
10037070-106 = "……話題似乎扯遠了。"
10037070-107 = "總之妾身的身體就是在那之後……開始產生異狀的。"
10037070-108 = "呵呵，或許這就是門主必須承擔的責任，抑或是坐上這張龍椅的代價吧。"
10037070-109 = "[s] 「……」"
10037070-110 = "表情為何如此沉重呢，老師？#n汝不覺得妾身一直以來都隱藏得很好嗎？"
10037070-111 = "既然連瑠美和老師都沒能察覺，就代表妾身的演技還算不錯吧？"
10037070-112 = "若是在其他學園，也許妾身會加入話劇部或電影部也說不定。"
10037070-113 = "呵呵呵。或許奇普托斯的演藝圈失去了一名優秀的演員……對吧，老師？"
10037070-114 = "[s5]「既然你身體這麼差的話……」\n[s6]「還是不要暗地出外查訪比較好吧？」"
10037070-117 = "……老師所言甚是。"
10037070-118 = "一個連站都站不穩的人，老實待在九重宮闕裡調養身體才是上策。"
10037070-119 = "何必特意花費時間變裝……親自到外頭查訪呢。"
10037070-120 = "[s] 「……」"
10037070-121 = "話雖如此，老師。#n雖然這只是妾身愚蠢的私欲……"
10037070-122 = "不過……妾身希望能在一切為時已晚之前……"
10037070-123 = "用自己的雙眼見證更多的風景……"
10037070-124 = "[s7]「為什麼……不告訴其他學生生病的事呢？」\n[s8]「如果坦承地向他們尋求幫助的話，說不定會有辦法能解決。」"
10037070-129 = "……"
10037070-130 = "因為玄龍門的門主之位就是如此。"
10037070-141 = "若不隨時展現出強大而完美的一面，便會從內部遭到吞噬。"
10037070-142 = "在妾身之前的那位門主，就是因此而黯然退位的。"
10037070-145 = "如此執著於門主之位的必要？#n倘若妾身能像老師一般豁達，也許現在就不必活得這麼辛苦了吧……"
10037070-146 = "此外……老師還記得嗎？#n山海經的學生……或者說玄龍門的學生們……"
10037070-147 = "聽聞妾身說要用「玄龍門的方式」款待，便把賓客送到了審訊室。"
10037070-148 = "一心認定是要查明對方策劃著何種陰謀……"
10037070-149 = "[s9]「其，其他學園也有很多想法奇特的學生呀！」\n[s10]「例如美食研究會或溫泉開發部之類的！」\n[s11]「還有千年的工程師部也是，雖然他們的本性都不壞……！」"
10037070-153 = "是嗎……"
10037070-154 = "……"
10037070-155 = "但即便如此……老師。"
10037070-156 = "妾身……可能還是無法放下山海經。"
10037070-160 = "（躺在床鋪上的妃姬緩緩地坐起身來）"
10037070-167 = "（妃姬無聲地將額頭朝胸口靠了過來）"
10037070-168 = "（從窗戶透進來的月光，悄悄窺視著房裡的一切）"
10037070-171 = "拜託了，老師。"
10037070-172 = "知曉此事之人僅有老師和沙耶，請千萬別將妾身的病情告訴其他人。"
10037070-173 = "沙耶已向妾身承諾絕不會透露此事。#n假如此事走漏了風聲……來源便可想而知。"
10037070-174 = "[s]「……嗯。」"
10037070-175 = "怎麼了，老師？#n為何露出如此痛苦的表情？"
10037070-176 = "無須擔心，妾身依然還活著。而且現在也還能走動。"
10037070-180 = "（輕輕地撫摸著妃姬的後腦杓）"
10037070-181 = "呵呵……真好。#n不僅心裡平靜了不少，頭痛似乎也減輕了一些。"
10037070-182 = "別那麼愁眉苦臉的。#n換作是其他人的話，妾身可不會拜託他們這種事。"
10037070-187 = "（妃姬帶著清澈的眼眸和柔和的微笑，靜靜地望了過來）"
10037070-188 = "（由於實在沒自信面對妃姬的表情，不由得閉上了雙眼……）"
10037070-195 = "……你身體好點了嗎，門主？"
10037070-196 = "現已改善許多，無須擔心。"
10037070-197 = "不過這還真奇怪。#n妾身今日明明確實服用了汝提供的丹藥……"
10037070-198 = "嗯，我就是為了這件事而來的。"
10037070-204 = "……你仔細聽我說，門主。#n我已經確認過那枚丹藥被人調包了。"
10037070-205 = "……！？"
10037070-206 = "而這代表什麼意思，我相信以門主的聰穎智慧想必已經猜到了才對。"
10037070-212 = "汝希望妾身就煉丹術研究會疏於藥品管理一事究責嗎？"
10037070-213 = "如果你有這個打算的話，我已經做好覺悟了……#n不過，現在還有個更嚴重的問題……！"
10037070-214 = "鍊丹術研究會的核心成員裡出了內鬼。"
10037070-215 = "目前也只能這麼推論了吧……？"
10037070-216 = "還以為是北方的寒風吹進了山海經，沒想到真正的風是從別處吹來的啊……"
10037070-217 = "我會交代底下的人，從明天開始由我親自為門主煉製丹藥。#n同時也會重新檢視鍊丹術研究會的成員結構。"
10037070-218 = "真是淒涼……明明身為鍊丹術研究會的會長，現在竟然連自己的會員都無法相信……"
10037070-219 = "儘管此類情況不應時常發生，但有時這也莫可奈何。"
10037070-220 = "門主最好也小心一點。#n至於這件事的責任歸屬與懲罰，等事情告一段落之後，門主想怎麼追究都行……"
10037070-221 = "就這麼辦吧。汝也記得多加留意。"
10037070-222 = "真抱歉……如果我能煉製出更完美的丹藥……"
10037070-223 = "或者能找到有助於治療門主病情的藥材的話……"
10037070-224 = "我現在煉製的丹藥都只是治標不治本，#n除了只能讓病情不至於惡化之外，甚至還有一些副作用……"
10037070-225 = "不必妄自菲薄。#n若是沒有汝的丹藥，妾身早已不在這個位置上了。"
10037070-229 = "門主……我想拜託你一件事。#n請把這一星期……不，至少把明天一天的行程通通取消，好好靜養一天吧。"
10037070-230 = "呵呵，此事妾身恐怕無法答應。#n畢竟山海經現在有群遠道而來的貴客啊。"
10037070-231 = "不過妾身向汝保證，等接待完貴客後一定會好好靜養一段時日。#n汝就稍微體諒體諒妾身這個不聽話的病人吧。"
10037070-232 = "……我明白了。"
10037070-238 = "電話……？"
10037070-242 = "應該是找妾身的。#n這是……輝夜？"
10037070-249 = "找妾身有何事？#n時候不早了吧？"
10037070-253 = "是，這麼晚叨擾您非常抱歉，門主大人！#n我剛剛構思出了一齣新的京劇！"
10037070-254 = "如果方便的話，#n我希望能在明天赤冬的賓客打道回府之前為他們表演，不知您意下如何？"
10037070-255 = "新的京劇啊……首先真是有勞汝了。"
10037070-256 = "至於表演的事，汝就著手去辦吧。#n畢竟潔莉諾書記長似乎很中意汝等的京劇。"
10037070-257 = "非常感謝您！您的胸襟果然如山海一般寬廣，門主大人！"
10037070-258 = "此外我還有一個不情之請。這畢竟是新京劇的初次公演，#n因此希望能邀請玄龍門的所有成員一同前來觀賞，不知門主能否成全？"
10037070-259 = "嗯……就這麼辦吧。#n反正白虎公園幅員廣闊，玄龍門之中也不乏喜愛京劇的成員。"
10037070-260 = "非常感謝您，門主大人！我會為明日的公演卯足全力！"
10037070-265 = "竟然在這種時候寫了一齣新的京劇……？"
10037070-266 = "輝夜聽起來似乎十分雀躍。#n或許這就是身為一名藝術家應當具備的熱誠吧。"
10037070-267 = "如今山海經的氣氛有些消沉，正好需要一個能夠轉換氣氛的契機。"
10037070-268 = "鍊丹術研究會是否要一同共襄盛舉？妾身會安排好座位的。"
10037070-269 = "唔……可是我認為鍊丹術研究會，現在正是需要反省及自律的時候……"
10037070-270 = "正所謂揠苗助長。#n若是壓抑過度恐將適得其反。"
10037070-271 = "何況汝今日不也整治過鍊丹術研究會的綱紀了嗎？"
10037070-272 = "原來門主早就知道了嗎……"
10037070-273 = "當然。畢竟汝本就有那樣的能力啊。#n呵呵……真期待明天的到來。"

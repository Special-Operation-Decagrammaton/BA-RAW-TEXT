10037070-52 = "3;키사키;18;자칫하면 큰 해를 입을 수도 있었을 터인데. 미나가 고생이 많았구나."
10037070-53 = "3;키사키;08;이거야 원. 손님맞이도 제대로 해 내지 못하는 문주라니, 그야말로 문주 자격이 없구나. 그렇게 생각하지 않는가, 선생?\n#3;em;[속상함]\n#3;stiff"

[translation]
1003702-1 = "Security Committee Chair's Interrogation"
1003702-2 = "Outside Red Winter Academy"
1003702-3 = "A spy is an agent from an opposing organization tasked with secretly obtaining information and infiltration."
1003702-4 = "Many other small academies in Kivotos are jealous of Red Winter Federal Academy, so we must always be vigilant of spies."
1003702-5 = "Spies are masters at hiding their identities, so anyone can be suspect."
1003702-6 = "At this very moment, spies could be scattered throughout our ranks, scheming to overthrow Red Winter Academy!"
1003702-7 = "[s] \"That would be terrible.\""
1003702-8 = "Yes, and treason as well."
1003702-9 = "The Security Council is compiling profiles of suspicious individuals to stymie their efforts."
1003702-10 = "We have identified someone of great suspicion. In fact, perhaps the utmost threat to Red Winter Academy at this time."
1003702-11 = "You, Sensei!"
1003702-12 = "[s] \"You've been talking about me this whole time?!\""
1003702-13 = "There is no one better situated than you to carry out such an operation."
1003702-14 = "Not only have you gained President Cherino's trust, you also have the absolute freedom to travel between academies."
1003702-15 = "You have the access, the authority, and the wits to access our darkest secrets and sabotage our very organization."
1003702-16 = "You would be the perfect target to bribe for information on the great Red Winter if I were Trinity or Gehenna."
1003702-17 = "Therefore, you are our number one suspect!"
1003702-18 = "[s] \"But I'm not a spy...\""
1003702-19 = "Exactly what a spy would say!"
1003702-20 = "However, I am benevolent just as our great President Cherino.#nYou may have a stay of exile, IF you prove yourself."
1003702-21 = "You will pass my test easily if you truly are a loyal follower of the president."
1003702-22 = "[s] \"A test?\""
1003702-23 = "Yes. A special test on Red Winter Academy's ideology and general knowledge."
1003702-24 = "Any Red Winter Academy student could answer these questions in their sleep."
1003702-25 = "Fail even one question, however..."
1003702-26 = "...and you can prepare to live out the rest of your days in the Former Institute, Spec Ops!"
1003702-27 = "[s1] \"You can't exile your sensei!\"\n[s2] \"But I hate pop quizzes!\""
1003702-28 = "Only a spy would complain! Prepare yourself!"
1003702-29 = "Only a spy would complain! Prepare yourself!"
1003702-33 = "First question. What animal symbolizes Red Winter Federal Academy?"
1003702-34 = "[s3] \"A bear.\"\n[s4] \"A dragon.\""
1003702-35 = "Correct!"
1003702-36 = "Hmph. Anyone could have answered that."
1003702-37 = "The symbol is right there on the emblem! How could you get this wrong?!"
1003702-38 = "But a dragon...is one of my favorite animals, so I'll let this one go."
1003702-42 = "Next. What is Red Winter Academy's symbol of authority?#nIt's also a physical characteristic that the president is proud of."
1003702-43 = "[s5] \"A mustache.\"\n[s6] \"A beard.\""
1003702-44 = "Correct! The mustache affords us the great authority our President Cherino wields."
1003702-45 = "Excellent, Sensei. You are proving yourself to be an ally of Red Winter."
1003702-46 = "Hmm... I suppose the mustache can constitute part of the beard."
1003702-47 = "I-It's a gray area, but not technically incorrect!"
1003702-51 = "Last question. What's the name of the honorable ally who is the Great Leader, Beautifier of Lands, Athletics Club Captain, and Chief of Sanitation?"
1003702-52 = "[s7] \"President Cherino.\"\n[s8] \"President Cherino.\"\n[s9] \"President Cherino.\""
1003702-53 = "Correct! Excellent!"
1003702-54 = "Correct! Excellent!"
1003702-55 = "Correct! Excellent!"
1003702-56 = "I'm relieved I will not have to purge President Cherino's trusted ally.#nYou've proved yourself trustworthy."
1003702-57 = "I suppose I must go to the next suspect on my list."
1003702-58 = "[s] \"Hold up. I think it's my turn to ask questions.\""
1003702-59 = "Huh? What questions?"
1003702-60 = "S-So now that you're cleared, you want to confirm that I'M not the spy?"
1003702-61 = "Hmm... I suppose by my own logic, even the most loyal officer could be a spy."
1003702-62 = "Hah! Okay! I accept your interrogation. I'm confident in my knowledge of my beloved academy."
1003702-63 = "[s] \"How tall is President Cherino?\""
1003702-64 = "Ha. That's easy: 5'11\"!"
1003702-65 = "It's written in every Red Bear Newsletter, so naturally I memorized it!"
1003702-66 = "[s] \"But President Cherino is shorter than you, Marina.\""
1003702-67 = "Y-You're right."
1003702-68 = "And I'm 5'5\"... I don't understand!"
1003702-69 = "Okay, fine! You won't get me again though, Sensei."
1003702-70 = "[s] \"How old is President Cherino?\""
1003702-71 = "The president is in her third year...so she's 17!"
1003702-75 = "Or perhaps 18...? Right?"
1003702-76 = "Why won't you answer me? How old is she?!"
1003702-77 = "[ns] \"So, Marina...\""
1003702-79 = "[ns] \"You don't know much about Red Winter Academy, do you?\""
1003702-80 = "Th-That's untrue! I know everything there is to know about Red Winter!"
1003702-81 = "I'm the Security Committee's chair, and yet I failed your test?!#nDoes that mean...I'm truly the spy?"
1003702-82 = "I'm...a spy? What do I do, Sensei?!"
1003702-83 = "M-Must I turn myself in?! Sentence myself to execution?!"
1003702-85 = "Marina was distraught, so I comforted her and sent her back to the Secretariat."

[translation]
1003702-1 = "#title;보안위원장의 심문"
1003702-2 = "#place;붉은겨울 학원 앞"
1003702-3 = "3;마리나;02;스파이란, 다른 적대 조직에 고용되어 비밀리에 정보를 취득하거나 공작을 하는 요원을 이르는바.\n#3;a\n#3;em;[반응]"
1003702-4 = "3;마리나;01;키보토스의 여러 군소 학원들로부터 질투 어린 시기를 받는 우리 붉은겨울 연방학원도 당연히 스파이의 위협에서 자유로울 수는 없다."
1003702-5 = "3;마리나;99;게다가 스파이들은 정체를 감추는 데 뛰어나기 때문에 외양만으로는 구분할 수 없는지라…….\n#3;em;[속상함]"
1003702-6 = "3;마리나;05;지금 이 순간에도 학생으로 위장한 학생들이 붉은겨울 학원의 요직에 숨어들어 음모를 꾸미고 있을지도 모르는 일이다!\n#3;hophop"
1003702-7 = "[s] \"그것 참 큰일이네.\""
1003702-8 = "3;마리나;01;암, 큰일이고 말고."
1003702-9 = "3;마리나;02;그래서 우리 보안위원회는 지난 수일간의 탐문 끝에 스파이로 의심되는 사람들의 명단을 소상히 정리했다."
1003702-10 = "3;마리나;99;그 결과, 현재 붉은겨울 학원에서 가장 의심스러운 사람은 다름 아닌……\n#3;em;…"
1003702-11 = "3;마리나;05;바로 선생이다!\n#3;closeup"
1003702-12 = "[s] \"내가 스파이라고?!\""
1003702-13 = "3;마리나;01;음, 선생만큼 스파이 역할에 적합한 인재도 또 없으니까.\n#3;greeting"
1003702-14 = "3;마리나;99;선생은 여러 학원을 자유롭게 오갈 수 있는 데다가, 체리노 회장님으로부터 무한한 신뢰를 받고 있으니—\n#3;em;…"
1003702-15 = "3;마리나;01;붉은겨울 학원의 주요 시설에 의심 없이 접근하여 사보타주를 할 수 있지."
1003702-16 = "3;마리나;03;만일 내가 트리니티나 게헨나의 요원이었다면, 분명 선생을 매수해서 붉은겨울의 기밀을 빼 오라고 지시했을 거다."
1003702-17 = "3;마리나;01;그러니 선생이야말로 이번 사건의 가장 유력한 용의자인 셈이지!\n#3;em;[!]"
1003702-18 = "[s] \"하지만 나는 스파이가 아닌데…….\""
1003702-19 = "3;마리나;05;부정하지 마! 스파이는 다 그렇게 말하니까!\n#3;hophop\n#3;em;[반응]"
1003702-20 = "3;마리나;99;하지만 나도 그렇게까지 냉혹한 인간은 아니니까. 선생에게는 특별히 기회를 주도록 하지."
1003702-21 = "3;마리나;11;선생이 만일 진짜 스파이가 아니라면, 내가 준비한 테스트 정도는 무사히 통과할 수 있겠지?"
1003702-22 = "[s] \"테스트?\""
1003702-23 = "3;마리나;03;음. 우리 붉은겨울 학원의 이념과 상식을 시험하는 특별 테스트다.\n#3;em;[반짝]\n#3;greeting"
1003702-24 = "3;마리나;99;붉은겨울 학원의 학생이라면 누구나 알 수 있는 내용으로 구성되어 있지."
1003702-25 = "3;마리나;01;선생이 이 테스트를 훌륭히 통과한다면 내가 직접 스파이 혐의를 벗겨주겠지만, 만약 한 문제라도 틀린다면……\n#3;em;…"
1003702-26 = "3;마리나;05;구교사의 특별반으로 유배를 보낼 테니 각오해!\n#3;hophop"
1003702-27 = "[s1] \"불합리해…….\"\n[s2] \"나는 선생인데?\""
1003702-28 = "3;마리나;05;불평하지 마! 지금부터 문제를 낼 테니 잘 듣도록!\n#3;em;[!]"
1003702-29 = "3;마리나;05;불평하지 마! 지금부터 문제를 낼 테니 잘 듣도록!\n#3;em;[!]"
1003702-30 = "#st;[0,0];instant;1;"
1003702-31 = "#clearST"
1003702-32 = "3;마리나;01\n#3;greeting\n#wait;1500"
1003702-33 = "3;마리나;02;첫 번째 질문, 붉은겨울 연방학원을 상징하는 동물은 무엇이지?\n#3;em;[반응]"
1003702-34 = "[s3] \"곰\"\n[s4] \"용\""
1003702-35 = "3;마리나;11;정답이다!\n#3;em;[!]\n#3;hophop"
1003702-36 = "3;마리나;03;후후, 이 정도로 간단한 문제라면 누구라도 간단히 맞출 수 있겠지."
1003702-37 = "3;마리나;08;아니야! 붉은겨울 학원의 상징은 곰이라고! 교표를 보면 알 수 있잖나!\n#3;hophop"
1003702-38 = "3;마리나;03;하지만 용이라…… 제법 멋진 동물을 제시했으니, 한 번은 특별히 넘어가 주지."
1003702-39 = "#st;[0,0];instant;1;"
1003702-40 = "#clearST"
1003702-41 = "3;마리나;01\n#3;greeting\n#wait;1500"
1003702-42 = "3;마리나;02;이어서 두 번째 질문. 붉은겨울 학원의 권위를 나타내는 상징이자, 붉은겨울 학원의 회장이 자랑스럽게 여기는 신체적 특징은 무엇이지?\n#3;em;[반응]"
1003702-43 = "[s5] \"콧수염\"\n[s6] \"턱수염\""
1003702-44 = "3;마리나;11;정답이다! 붉은겨울 학원의 권위는 그 콧수염에서 나오지.\n#3;em;[!]\n#3;jump"
1003702-45 = "3;마리나;03;역시 선생이야. 우리 붉은겨울 학원에 대해서는 속속들이 잘 알고 있군."
1003702-46 = "3;마리나;10;어…… 체리노 회장의 권위를 상징하는 수염에 턱수염도 포함이 되었던가?\n#3;em;…"
1003702-47 = "3;마리나;08;애, 애매하니 이 문제는 패스다!\n#3;hophop"
1003702-48 = "#st;[0,0];instant;1;"
1003702-49 = "#clearST"
1003702-50 = "3;마리나;01\n#3;greeting\n#wait;1500"
1003702-51 = "3;마리나;02;마지막 질문이다. 붉은겨울 학원의 서기장이자 미화부장이자, 체육부장이자, 청소부장이신 위대한 동지의 이름은 무엇이지?\n#3;em;[반응]"
1003702-52 = "[s7] \"체리노 회장\"\n[s8] \"체리노 회장\"\n[s9] \"체리노 회장\""
1003702-53 = "3;마리나;11;정답이다! 훌륭해!\n#3;em;[!]"
1003702-54 = "3;마리나;11;정답이다! 훌륭해!\n#3;em;[!]"
1003702-55 = "3;마리나;11;정답이다! 훌륭해!\n#3;em;[!]"
1003702-56 = "3;마리나;09;과연 선생은 스파이가 아니었군. 체리노 회장이 신뢰하는 동지를 내 손으로 숙청하지 않게 되어서 다행이야."
1003702-57 = "3;마리나;03;자, 그럼 나는 이제 다른 스파이를 찾으러…….\n#3;m4"
1003702-58 = "[s] \"이번에는 내가 문제를 내도 괜찮을까?\""
1003702-59 = "3;마리나;04;응? 어째서 선생이 문제를 내는 건데?\n#3;em;[?]"
1003702-60 = "3;마리나;08;스파이는 어떤 모습으로도 위장할 수 있으니, 내가 스파이일 가능성도 배제할 수 없다고?"
1003702-61 = "3;마리나;06;으음…… 분하긴 하지만 일리가 있는 주장이야. 고도로 훈련된 스파이는 가장 충성스러운 간부와 구분할 수 없으니…….\n#3;em;…"
1003702-62 = "3;마리나;11;좋아. 하지만 쓸모없는 시도로 끝날걸. 나는 붉은겨울 학원에 관한 일이라면 모르는 게 없으니까!\n#3;m3"
1003702-63 = "[s] \"체리노 회장의 키는?\""
1003702-64 = "3;마리나;03;후후, 간단한 문제로군. 181cm다!\n#3;em;[반응]"
1003702-65 = "3;마리나;11;<붉은 곰>의 프로파간다 기사에 늘 크게 적혀 있기 때문에 확실하게 외우고 있지!\n#3;hophop"
1003702-66 = "[s] \"하지만 체리노 회장의 키는 마리나보다 작잖아?\""
1003702-67 = "3;마리나;08;어, 어라? 그런가?\n#3;em;[?]"
1003702-68 = "3;마리나;10;내 키가 166cm니까, 회장님은 이보다 더 클 수 없는데…… 어째서지?"
1003702-69 = "3;마리나;08;으윽…… 이건 실수다! 다음! 빨리 다음 문제를 내!\n#3;stiff"
1003702-70 = "[s] \"체리노 회장의 나이는?\""
1003702-71 = "3;마리나;07;회장님은 3학년이시니…… 17살이다!\n#3;em;[반응]"
1003702-72 = "#st;[0,0];instant;1;"
1003702-73 = "#clearST"
1003702-74 = "#wait;2500"
1003702-75 = "3;마리나;08;……내 말 맞지? 아니야?"
1003702-76 = "3;마리나;12;잠깐, 어째서 바로 대답하지 않는 거야! 혹시 내가 틀린 거야?\n#3;em;[?!]\n#3;shake"
1003702-77 = "[ns] \"혹시 마리나…….\""
1003702-78 = "#wait;1500"
1003702-79 = "[ns] \"붉은겨울 학원에 대해 아는 게 거의 없는 거 아냐?\""
1003702-80 = "3;마리나;10;아니, 그럴 리가 없는데…… 붉은겨울 학원에 관한 일이라면 완벽하게 숙지하고 있었을 텐데……!\n#3;em;[땀]"
1003702-81 = "3;마리나;08;정작 보안위원장인 내가 테스트를 통과하지 못하다니, 그렇다면 붉은겨울 학원에 잠입한 스파이는 설마 나였던 건가?"
1003702-82 = "3;마리나;12;어, 어떻게 하지, 선생? 내가 스파이일지도 모른다니!\n#3;hophop\n#3;closeup"
1003702-83 = "3;마리나;12;이래서는 나 스스로를 숙청하는 수밖에 없어…….\n#3;em;[속상함]\n#3;stiff\n#3;closeup"
1003702-84 = "#all;hide"
1003702-85 = "#na;(이후, 혼란스러워하는 마리나를 잘 달래 사무국으로 돌려보냈다.)"

[translation]
1003702-1 = "การสอบสวนของหัวหน้าคณะฯ"
1003702-2 = "หน้าสหภาพเรดวินเทอร์"
1003702-3 = "สายลับคือเจ้าหน้าที่ที่ได้รับการว่าจ้างจากองค์กรที่เป็นศัตรู เพื่อสืบหาข้อมูลหรือปฏิบัติการอย่างลับๆ"
1003702-4 = "สถาบันสหภาพเรดวินเทอร์ที่โรงเรียนอื่นๆ ในคิโวทอสอิจฉาก็ไม่สามารถเป็นอิสระจากภัยคุกคาม#nของสายลับได้"
1003702-5 = "แถมพวกสายลับยังปกปิดตัวตนได้อย่างแนบเนียน ดังนั้นจะมองจากรูปลักษณ์ภายนอกไม่ได้..."
1003702-6 = "ตอนนี้อาจจะมีคนที่ปลอมตัวเป็นนักเรียนแล้วแฝงเข้ามาดำรงตำแหน่งสำคัญๆ ของสหภาพ#nเรดวินเทอร์พร้อมกับวางแผนร้ายอะไรอยู่ก็ได้!"
1003702-7 = "[s] \"ถ้าเป็นแบบนั้นก็เรื่องใหญ่เลยนะ\""
1003702-8 = "เรื่องใหญ่เลยล่ะ"
1003702-9 = "คณะความมั่นคงของเราได้ทำการสอบสวนตลอดหลายวันที่ผ่านมา และได้รวบรวมรายชื่อของ#nผู้ต้องสงสัยที่จะเป็นสายลับ"
1003702-10 = "และคนที่น่าสงสัยที่สุดของสหภาพเรดวินเทอร์ก็ไม่ใช่ใครอื่น..."
1003702-11 = "แต่เป็นครูไงล่ะ!"
1003702-12 = "[s] \"ครูเนี่ยนะ?!\""
1003702-13 = "ใช่ ไม่มีใครที่เหมาะกับบทบาทสายลับมากไปกว่าครูแล้ว"
1003702-14 = "ทั้งเข้าออกโรงเรียนต่างๆ ได้อย่างอิสระ และได้รับความไว้วางใจจากท่านประธานเชริโน่อย่างถึงที่สุด"
1003702-15 = "ถือว่าเป็นคนที่เข้าถึงอาคารของสหภาพเรดวินเทอร์ได้โดยไร้ข้อกังขาและยังสามารถทำลายได้ทุกเมื่อ"
1003702-16 = "หากว่าฉันเป็นเจ้าหน้าที่ของทรีนิตี้หรือเกเฮนน่า ฉันคงซื้อตัวครูแล้วสั่งการให้ไปสืบความลับ#nของเรดวินเทอร์มาแล้วละ"
1003702-17 = "เพราะฉะนั้นครูคือผู้ต้องสงสัยอันดับหนึ่ง!"
1003702-18 = "[s] \"แต่ครูไม่ใช่สายลับนะ...\""
1003702-19 = "อย่ามาปฏิเสธ! คนเป็นสายลับก็พูดอย่างนี้กันทั้งนั้น!"
1003702-20 = "แต่ฉันก็ไม่ใช่คนโหดร้ายขนาดนั้น จะให้โอกาสกับครูเป็นกรณีพิเศษแล้วกัน"
1003702-21 = "หากครูไม่ใช่สายลับจริงๆ ก็น่าจะต้องผ่านการทดสอบที่ฉันเตรียมไว้"
1003702-22 = "[s] \"ทดสอบเหรอ?\""
1003702-23 = "ใช่ การทดสอบพิเศษเพื่อวัดอุดมการณ์และสามัญสำนึกของสหภาพเรดวินเทอร์"
1003702-24 = "และเนื้อหาทั้งหมดเป็นสิ่งที่นักเรียนสหภาพเรดวินเทอร์รู้กันเป็นอย่างดี"
1003702-25 = "หากครูผ่านการทดสอบได้อย่างยอดเยี่ยม ฉันจะถอนข้อกล่าวหาว่าเป็นสายลับ แต่ถ้าหากทำผิด#nแม้สักข้อเดียวละก็..."
1003702-26 = "เตรียมตัวถูกส่งไปลงโทษที่อาคารเรียนเก่าได้เลย!"
1003702-27 = "[s1] \"ไม่ยุติธรรมเลย...\"\n[s2] \"แต่ว่าครูเป็นครูนะ..?\""
1003702-28 = "เลิกบ่นได้แล้ว! ฉันจะเริ่มถามคำถามแล้ว ตั้งใจฟังให้ดีล่ะ!"
1003702-29 = "เลิกบ่นได้แล้ว! ฉันจะเริ่มถามคำถามแล้ว ตั้งใจฟังให้ดีล่ะ!"
1003702-33 = "คำถามแรก สัตว์ที่เป็นสัญลักษณ์ของสถาบันสหภาพเรดวินเทอร์คืออะไร?"
1003702-34 = "[s3] \"หมี\"\n[s4] \"มังกร\""
1003702-35 = "ถูกต้อง!"
1003702-36 = "หึหึ แต่คำถามพื้นๆ แค่นี้ไม่ว่าใครก็ต้องตอบถูกอยู่แล้ว"
1003702-37 = "ไม่ใช่! สัญลักษณ์ของสถาบันสหภาพเรดวินเทอร์คือหมีต่างหาก! ดูที่เครื่องหมายก็รู้แล้วนี่!"
1003702-38 = "แต่มังกรก็เป็นสัตว์ที่เยี่ยมยอดเลย งั้นฉันจะอนุโลมให้ครั้งหนึ่ง!"
1003702-42 = "คำถามข้อต่อไป สิ่งใดในร่างกายที่ท่านประธานเชริโน่ภาคภูมิใจ และยังถือเป็นอำนาจของ#nสหภาพเรดวินเทอร์ด้วย?"
1003702-43 = "[s5] \"หนวด\"\n[s6] \"เครา\""
1003702-44 = "ถูกต้อง! อำนาจของสหภาพเรดวินเทอร์มาจากหนวดนั่นน่ะแหละ"
1003702-45 = "สมที่เป็นครูจริงๆ รู้ทุกอย่างของสหภาพเรดวินเทอร์เป็นอย่างดีเลย"
1003702-46 = "อืม... หนวดที่แสดงอำนาจของประธานเชริโน่ก็น่าจะครอบคลุมถึงเคราด้วยมั้ยนะ?"
1003702-47 = "ข้อนี้ค่อนข้างกำกวม ขอข้ามไปแล้วกัน!"
1003702-51 = "ต่อไปเป็นคำถามข้อสุดท้าย ชื่อของสหายผู้ยิ่งใหญ่ที่เป็นทั้งเลขาธิการ หัวหน้าฝ่ายตกแต่ง หัวหน้าฝ่ายกีฬา และหัวหน้าฝ่ายทำความสะอาดของสหภาพเรดวินเทอร์คืออะไร?"
1003702-52 = "[s7] \"ประธานเชริโน่\"\n[s8] \"ประธานเชริโน่\"\n[s9] \"ประธานเชริโน่\""
1003702-53 = "ถูกต้อง! เก่งมาก!"
1003702-54 = "ถูกต้อง! เก่งมาก!"
1003702-55 = "ถูกต้อง! เก่งมาก!"
1003702-56 = "ครูไม่ใช่สายลับสินะ โชคดีที่ฉันไม่จำเป็นต้องลงโทษสหายที่ประธานเชริโน่ไว้วางใจด้วยมือของฉันเอง"
1003702-57 = "เอาละ งั้นฉันจะไปหาสายลับคนอื่น..."
1003702-58 = "[s] \"ขอครูถามคำถามบ้างได้มั้ย?\""
1003702-59 = "หืม? ทำไมครูถึงจะมาถามฉันล่ะ?"
1003702-60 = "มีความเป็นไปได้ว่าฉันจะเป็นสายลับ เพราะสายลับสามารถปลอมตัวเข้ามาในตำแหน่งใดก็ได้งั้นเหรอ?"
1003702-61 = "อืม... ถึงฟังแล้วจะหัวร้อน แต่ก็เป็นข้อโต้แย้งที่มีเหตุผล เพราะคงยากที่จะแยกระหว่างสายลับที่#nผ่านการฝึกฝนมาอย่างดีกับผู้บริหารระดับสูงที่จงรักภักดี..."
1003702-62 = "ก็ได้ แต่บอกไว้ก่อนว่าความพยายามของครูคงไร้ประโยชน์ เพราะไม่มีอะไรที่ฉันไม่รู้เกี่ยวกับ#nสหภาพเรดวินเทอร์หรอก!"
1003702-63 = "[s] \"ประธานเชริโน่สูงเท่าไร?\""
1003702-64 = "หึหึ คำถามกล้วยๆ 181 เซน!"
1003702-65 = "ฉันจำได้แม่น เพราะมีเขียนไว้ตัวเบ้อเร่อในข่าวประชาสัมพันธ์ของ <เรดแบร์>"
1003702-66 = "[s] \"แต่ประธานเชริโน่ตัวเตี้ยกว่ามารินะอีกนะ?\""
1003702-67 = "อะ... เอ๋? งั้นเหรอ?"
1003702-68 = "ฉันสูง 166 เซน แสดงว่าท่านประธานจะสูงไปกว่านี้ไม่ได้..."
1003702-69 = "อึ่กกก... ตอบพลาดเหรอเนี่ย! ขอข้อต่อไป! ถามมาเร็วๆ เลย!"
1003702-70 = "[s] \"ประธานเชริโน่อายุเท่าไร?\""
1003702-71 = "ท่านประธานอยู่ชั้นปีที่ 3 แล้ว... ก็ต้องอายุ 17 สิ!"
1003702-75 = "ถูกต้องใช่มั้ยล่ะ? หรือไม่ใช่?"
1003702-76 = "ทำไมไม่รีบเฉลยล่ะ! หรือว่าฉันตอบผิด?"
1003702-77 = "[ns] \"กะแล้วเชียว มารินะ...\""
1003702-79 = "[ns] \"แทบจะไม่รู้อะไรเกี่ยวกับสหภาพเรดวินเทอร์เลยไม่ใช่เหรอ?\""
1003702-80 = "เป็นไปไม่ได้... ฉันจำข้อมูลของสหภาพเรดวินเทอร์ได้อย่างแม่นยำนี่นา..."
1003702-81 = "ฉันเป็นถึงหัวหน้าคณะความมั่นคง แต่กลับไม่ผ่านการทดสอบเหรอเนี่ย... หรือว่าสายลับที่ลักลอบ#nเข้ามาในสหภาพเรดวินเทอร์คือฉันเอง?"
1003702-82 = "ทะ... ทำยังไงดีล่ะครู? ฉันอาจจะเป็นสายลับก็ได้!"
1003702-83 = "แบบนี้ฉันต้องลงโทษตัวเองน่ะสิ..."
1003702-85 = "(จากนั้นครูก็ปลอบมารินะที่กำลังสับสนหนักและพากลับไปที่สำนักเลขาธิการ)"

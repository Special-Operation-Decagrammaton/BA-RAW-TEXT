[translation]
1003702-1 = "保安委員長的審問"
1003702-2 = "赤冬聯邦學園的正門前"
1003702-3 = "雖然已經說過了……所謂「間諜」指的是受到敵對組織雇用，暗中進行情報取得和妨害，擾亂等等的工作員。"
1003702-4 = "我們赤冬聯邦學園，被奇普托斯各地的小學園投以忌妒的視線。當然有間諜潛入進來也不奇怪。"
1003702-5 = "再加上間諜這種人，大多擅長變裝……也就是只以外表判別幾乎不可能。"
1003702-6 = "這樣的話在我們不知情之下，也許這個瞬間也有偽裝成我校學生的間諜們，在計劃著顛覆赤冬聯邦學園的陰謀也說不定！"
1003702-7 = "[s]「那真是不妙呢。」"
1003702-8 = "啊啊，當然不妙。"
1003702-9 = "所以我們保安委員這幾天，進行了縝密的探聽。因此成功整理了疑似間諜的人物清單。"
1003702-10 = "根據結果，現在於赤冬聯邦學園最可疑的人物……"
1003702-11 = "那就是，老師你！"
1003702-12 = "[s]「……我？」"
1003702-13 = "嗯呣，你思考看看。"
1003702-14 = "老師在可以自由進入各種學園之上，也受到了潔莉諾會長龐大的信賴──"
1003702-15 = "就連赤冬聯邦學園的重要設施，也能輕易入侵。"
1003702-16 = "如果我是三一或格黑娜的重要人物，肯定會收買老師將赤冬聯邦學園的機密情報偷過來……這樣指示不會錯。"
1003702-17 = "沒錯，所以老師正是這次的事件，最有力的嫌疑人！"
1003702-18 = "[s]「但是，我又不是間諜……」"
1003702-19 = "就算說那種台詞也沒用！因為每個間諜都那麼說啊！"
1003702-20 = "不過老師，我也不是那麼冷酷的人。讓我來給予老師機會吧。"
1003702-21 = "老師真的不是間諜的話，應該能通過我準備的特別測驗才對。"
1003702-22 = "[s]「測驗？」"
1003702-23 = "啊啊，是為了調查對於赤冬聯邦學園的理念和常識知道多少，理解多少並有多少同感的測驗。"
1003702-24 = "出題的問題全部都是由，只要是我校學生不管是誰都知道的內容而構成的。"
1003702-25 = "在這個測驗出色的合格的話，我就以我保安委員長的名義確實地否定老師間諜的嫌疑吧。不過，如果只要答錯一題的話……"
1003702-26 = "就流放到舊校舍的特別班級，給我做好覺悟！"
1003702-27 = "[s1]「這樣啊……」\n[s2]「我姑且，是老師耶……」"
1003702-28 = "不要抱怨！好了，要開始囉！"
1003702-29 = "不要抱怨！好了，要開始囉！"
1003702-33 = "第1題，說到象徵赤冬聯邦學園的動物是？"
1003702-34 = "[s3]「熊。」\n[s4]「龍。」"
1003702-35 = "正確！"
1003702-36 = "哼哼，這果然太簡單了呢。"
1003702-37 = "不對！赤冬聯邦學園的象徵是「熊」！看校徽就知道了吧！？"
1003702-38 = "不過，龍嗎……龍很帥呢。看在這一點僅只一次，特別放過你吧。"
1003702-42 = "接下來第2題。同時象徵表示著赤冬聯邦學園的權威，也是赤冬的學生會長自身引以為傲的特徵是什麼？"
1003702-43 = "[s5]「小鬍子。」\n[s6]「落腮鬍。」"
1003702-44 = "正確！赤冬聯邦學園的權威，可以說是由那個小鬍子表現出來的。"
1003702-45 = "不愧是老師。果然很清楚知道關於我校的事呢。"
1003702-46 = "……突然想到，所謂的「鬍子」，「落腮鬍」也包含在內嗎？"
1003702-47 = "真，真是曖昧啊這個！這個問題當作沒有吧！"
1003702-51 = "好了，這是最後的問題了。既是赤冬聯邦學園的書記長，也是環境美化部部長，還是運動部代表，又是整潔部部長，高呼那個偉大同志的名字吧。"
1003702-52 = "[s7]「潔莉諾會長。」\n[s8]「潔莉諾會長。」\n[s9]「潔莉諾會長。」"
1003702-53 = "正確！真出色！"
1003702-54 = "正確！真出色！"
1003702-55 = "正確！真出色！"
1003702-56 = "原來如此，老師並不是間諜嗎……差點就把潔莉諾會長信賴的同志，因為失誤而親手肅清了。"
1003702-57 = "好了，那麼我必須去找其他……"
1003702-58 = "[s]「稍微當作嘗試，瑪麗娜要不要也回答看看？」"
1003702-59 = "……呣？意思是由老師出題嗎？"
1003702-60 = "你說如果間諜可以偽裝成任何樣子，也沒辦法排除我是間諜的可能性……？"
1003702-61 = "唔呣……雖然不甘心，不過有道理呢。「被高度訓練的間諜」和，「以忠誠為榮的部下」確實很難做出區別……"
1003702-62 = "好吧。不過最好做著無謂嘗試的覺悟。因為我掌握著，關於赤冬聯邦學園的所有事物啊！"
1003702-63 = "[s]「潔莉諾的身高是？」"
1003702-64 = "呵呵，真簡單的問題呢。是181cm！"
1003702-65 = "「赤熊」的宣傳報導上，總是大大的寫著啊。我確實的記著！"
1003702-66 = "[s]「但是潔莉諾她，比瑪麗娜還小隻吧？」"
1003702-67 = "……嗯嗯？"
1003702-68 = "我的身高是166cm，確實會長平常的視線比我還低。然而，會長的身高是181cm……這是，怎麼回事啊？"
1003702-69 = "唔，我的頭……這，這一定是有什麼誤會！下一題！快點出下一題！"
1003702-70 = "[s]「潔莉諾的年齡是？」"
1003702-71 = "會長是3年級所以……大概是17歲！"
1003702-75 = "……沒錯吧？咦，不對嗎？"
1003702-76 = "等等，為什麼不馬上回答！為何要看下面！難道我搞錯了嗎！？"
1003702-77 = "[ns]「該不會瑪麗娜妳……」"
1003702-79 = "[ns]「關於赤冬聯邦學園的知識，有點那個……？」"
1003702-80 = "怎，怎麼可能有那種……！只要是關於赤冬的事，應該都完美的掌握了才對……！"
1003702-81 = "身為保安委員長的我，竟然沒辦法通過測驗……難，難道，潛入赤冬聯邦學園的間諜……是我！？"
1003702-82 = "該，該怎麼辦才好老師！？間諜可能是我！"
1003702-83 = "這樣的話，只能自己肅清自己……！？"
1003702-85 = "（這之後，讓混亂的瑪麗娜冷靜下來的同時將其送到了事務局）"

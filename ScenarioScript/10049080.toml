[translation]
10049080-1 = "第8話;問問頭盔團！ "
10049080-2 = "嗚哇啊啊，是我錯了！！！"
10049080-3 = "拜，拜託饒了我吧！！我會把隊長的弱點全部說出來的！！！"
10049080-4 = "隊長的握力很弱，就連果醬罐的蓋子都打不開！！"
10049080-5 = "啊！還有他因為害怕而不敢睡在上下舖的上鋪！"
10049080-6 = "喂──！！！"
10049080-14 = "哦哦──！"
10049080-15 = "呼……"
10049080-16 = "幸好有汽車的電瓶。"
10049080-17 = "這間倉庫的電源被切斷了，所以只能用電瓶來開燈。"
10049080-18 = "……話說回來，他剛才在說什麼？"
10049080-19 = "[s1]「他說良舞害怕上下鋪的上鋪。」\n[s2]「他說良舞打不開果醬罐的蓋子。」"
10049080-22 = "老師！！！"
10049080-23 = "這樣啊。其實那也不是什麼稀奇的事。"
10049080-24 = "總之，我想先把事情一一釐清……"
10049080-25 = "首先，志美子同學。#n請問你的這身打扮是……？"
10049080-26 = "啊，是！我扮演的是《魔法少女 Heavy Caliber》的惡之幹部「艾拉」。"
10049080-27 = "這……看起來確實是這樣沒錯……"
10049080-28 = "那麼你在這之前到哪裡去了呢？"
10049080-29 = "那個……兩位不是拜託我扮演惡之幹部嗎？"
10049080-30 = "嗯？是這樣沒錯……？"
10049080-31 = "如果惡之幹部一開始就跟魔法少女一起行動……不是很奇怪嗎？"
10049080-33 = "邏輯上確實是這樣沒錯，鈴美同學！"
10049080-34 = "[ns]「仔細想想好像有道理耶！」"
10049080-36 = "……"
10049080-37 = "最終能造成奇襲的效果，倒也值得慶幸……"
10049080-38 = "志美子同學，謝謝你在最關鍵的時機出現了。"
10049080-42 = "那麼，接下來是河駒風良舞同學。"
10049080-43 = "我從剛才就想跟你好好聊聊了……"
10049080-44 = "這裡有幾件事想請教你。"
10049080-45 = "你們到底打算在這個遊樂園裡做什麼？"
10049080-46 = "啊？什麼意思啊？"
10049080-48 = "三天前，你們在舊圖書館後面的談話都被我聽見了！"
10049080-49 = "你們確實說過「遊樂園會被打個稀巴爛，還會有人受傷」之類的話！"
10049080-50 = "而且現在還帶著一堆像是手榴彈的東西！"
10049080-52 = "嘖，居然被你聽到了啊？"
10049080-53 = "就跟你說這種事要在MomoTalk上講嘛！"
10049080-55 = "喂，這話是什麼意思？"
10049080-56 = "你們打算毀掉遊樂園，還讓人受傷嗎？"
10049080-57 = "我有教過你們做這種事嗎！！"
10049080-59 = "不，不是啦隊長！！我們怎麼會做那種事呢！？"
10049080-60 = "要是我們有能讓人受傷或搞破壞的炸彈跟力量的話，早就去做拆除的打工了啦！"
10049080-61 = "而且那種工作也得先吃飽才有辦法做啊！"
10049080-63 = "那剛才這些人說的又是什麼？"
10049080-65 = "我有點不記得了……是不是在說「那傢伙」的事啊？"
10049080-66 = "好像是說……萬一那傢伙反抗或逃跑的話，可能會打起來之類的……"
10049080-68 = "等等，麻煩先等一下。#n「那傢伙」指的是誰？"
10049080-69 = "請慢慢地、一件一件解釋清楚。"
10049080-71 = "說出來之後，你們就不會再來妨礙我們了吧？"
10049080-72 = "當然。不過……前提是你們沒有在做壞事。"
10049080-74 = "[ns]「鈴美說的話，我可以擔保。」"
10049080-75 = "呿，居然連老師也這樣……"
10049080-76 = "知道了知道了。唉……"
10049080-77 = "我們現在正在做類似「糾察隊」的工作。"
10049080-78 = "頭盔團在做糾察工作？你們有那種權限嗎？"
10049080-79 = "怎樣，不行嗎？做好事還需要權限是不是？"
10049080-83 = "好事就是好事嘛。我們也希望能用正當的方式賺錢啊。"
10049080-84 = "這樣女武神啊，風紀委員會啊，實現正義部之類的人也不會來煩我們。"
10049080-85 = "至於內容嘛……簡單來說，最近有一些奇怪的假貨在到處流通。"
10049080-86 = "聽說只要抓到流通那些東西的人，就能拿到受害的公司提供的獎金。"
10049080-87 = "所以我們才會在得知這件事之後，打算抓住犯人大賺一筆。"
10049080-89 = "假貨……是嗎？"
10049080-90 = "沒錯，就是那些像手榴彈一樣的東西。"
10049080-91 = "而且那傢伙還說了一些很奇怪的話。#n像是稱呼那是「鍺手榴彈」、「三角形安全插銷的『三角之力』能保健」之類的……"
10049080-92 = "除此之外，他還賣了一堆廉價的劣質品。"
10049080-93 = "比如會漏氣的氣球，或者品質很差的爆米花桶等等。"
10049080-94 = "那些手榴彈跟爆米花桶就是我們偷偷沒收來的，不過卻沒有找到負責販賣的傢伙。"
10049080-95 = "這間遊樂園這麼大，我看八成是逮不到他了吧……嘖。"
10049080-96 = "會漏氣的氣球……品質很差的爆米花桶……？"
10049080-98 = "這顆氣球我才剛買沒多久，怎麼已經漏氣了啊！"
10049080-99 = "爆米花桶的蓋子掉了！嗚哇哇──"
10049080-100 = "嗚哇哇哇──"
10049080-101 = "幫我換新的！換新的嘛──！"
10049080-109 = "為什麼要幫我們鬆綁？要放我們回去了是嗎？"
10049080-110 = "……首先，良舞同學，還有各位頭盔團的成員。"
10049080-111 = "由於我的重大誤會而妨礙了你們的行動，真的很抱歉。"
10049080-113 = "什麼？哈！#n妨礙了別人的工作，只靠一句道歉就想──"
10049080-118 = "我真的……感到非常抱歉。"
10049080-122 = "咦，咦咦！？#n……這，這樣啊？"
10049080-123 = "好，好吧……每個人都會遇到搞錯的時候嘛？"
10049080-124 = "既然你已經好好道歉就夠了！事情到此為止！"
10049080-126 = "我也很抱歉。是我誤會了……"
10049080-127 = "我，我也要道歉……！#n該怎麼補償你們好呢……！"
10049080-129 = "就說沒事了啦！！！"
10049080-130 = "情況我瞭解了，良舞同學。"
10049080-131 = "剛才說的那件事，可以讓我們也一起幫忙嗎？"
10049080-132 = "啊！？為什麼突然要幫忙啊？#n你們該不會有什麼陰謀吧？"
10049080-133 = "我只是希望能以行動的方式，作為妨礙你們工作的補償而已。"
10049080-134 = "在良舞同學眼中，那些人是不正義的嗎？"
10049080-135 = "雖然這種話由我來說可能有點奇怪，不過那些傢伙至少稱不上是什麼好人。"
10049080-136 = "除此之外，他們也確實傷害了想買東西的善良民眾對吧？"
10049080-137 = "如果遇到這種詐騙，不管是誰都會很火大吧？"
10049080-138 = "我明白了。"
10049080-139 = "他們的位置我大致清楚。應該還沒走遠才對。"
10049080-140 = "自衛隊將會協助你們。"
10049080-142 = "……！"
10049080-143 = "我準備好了！"
10049080-144 = "圖書委員會也會盡全力幫忙！"
10049080-146 = "[ns3]「我也準備好了！」\n[ns4]「『夏萊的行走老師』也準備好了！」"
10049080-150 = "哈！既然你們願意免費幫忙，要是不答應就太傻了吧？"
10049080-151 = "況且也還沒搞清楚對方的人數有多少。"
10049080-155 = "你們居然是自衛隊跟圖書委員會嗎！？"

[translation]
10049080-1 = "Episode 8;Just Ask the Helmet Gang!"
10049080-2 = "Waaaaah! I'm sorry!!"
10049080-3 = "S-Spare me, please!! I'll tell you all of our captain's weaknesses!!"
10049080-4 = "She has weak grip strength and can't open a pickle jar!"
10049080-5 = "Ah! Also! She's scared of sleeping in top bunk of a bunk bed!"
10049080-6 = "Hey!!"
10049080-14 = "Ah!"
10049080-15 = "Phew..."
10049080-16 = "Good thing we found this battery, huh?"
10049080-17 = "Couldn't have turned on the lights in here without it."
10049080-18 = "...Anyway, what were we talking about?"
10049080-19 = "[s1] \"She's scared of bunk beds.\"\n[s2] \"She can't open a pickle jar.\""
10049080-22 = "Ugh, seriously?! Sensei!!"
10049080-23 = "I can relate."
10049080-24 = "But first, let's just review what we know here."
10049080-25 = "First question: Shimiko, what's with your outfit?"
10049080-26 = "I'm \"Era,\" the evil officer from Magical Girl Heavy Caliber, remember?"
10049080-27 = "Okay, right..."
10049080-28 = "But then where have you been all this time?"
10049080-29 = "Well, you ASKED me to be the villain, right?"
10049080-30 = "Yes, and...?"
10049080-31 = "Wouldn't it be weird if the villain were hanging around with the heroes the whole time?"
10049080-33 = "That's actually a very good point!"
10049080-34 = "[ns] \"Yeah, now that I think about it, she's right!\""
10049080-36 = "..."
10049080-37 = "Anyway, I'm glad we pulled off the ambush."
10049080-38 = "You came at the perfect time, Shimiko."
10049080-42 = "Next up, Komakaze Rabu."
10049080-43 = "We've been trying to talk to you all day."
10049080-44 = "Got a few questions."
10049080-45 = "What are you plotting here at the amusement park?"
10049080-46 = "Huh? What are you talking about?"
10049080-48 = "I heard your conversation three days ago, in the back of the old library!"
10049080-49 = "You said the amusement park was going to turn into a total mess, and people were going to get hurt!"
10049080-50 = "Plus you were carrying GRENADES!"
10049080-52 = "She heard us say that, huh?"
10049080-53 = "I told you we should've used MomoTalk!"
10049080-55 = "Wait, you two said WHAT?"
10049080-56 = "You were planning to blow up the park?!"
10049080-57 = "Is that what I taught you?!"
10049080-59 = "N-No way, Captain!! We'd never do that!"
10049080-60 = "If we had explosives, we'd go out and do some part-time demolition work or something!"
10049080-61 = "You know, if we had enough food to work on a full stomach..."
10049080-63 = "Then what did she hear you talking about?"
10049080-65 = "I have no idea. ...Oh, maybe she heard us talking about \"you-know-who.\""
10049080-66 = "I meant, like, if they resist, there could be a fight in the amusement park, and people could get hurt then."
10049080-68 = "Who is \"you-know-who\"?"
10049080-69 = "Tell us everything. One step at a time."
10049080-71 = "If we tell you, will you back off? Huh?"
10049080-72 = "Of course. Unless you're up to something malicious."
10049080-74 = "[ns] \"I'll vouch for that.\""
10049080-75 = "Tch, even Sensei..."
10049080-76 = "Fine, whatever. *sigh*"
10049080-77 = "Right now, we're on the job. It's... It's kind of a private security gig."
10049080-78 = "Helmet Gangsters doing security work? Do you have permission to do that here?"
10049080-79 = "Why can't we? Do we need permission to do something good?"
10049080-83 = "What's good is good. We're not above being decent, if it pays all right."
10049080-84 = "Especially if there's no one around from Valkyrie, or the Prefect Team, OR the Justice Task Force to get in our way."
10049080-85 = "Anyway...someone around here has been selling knock-offs."
10049080-86 = "That's been cutting into company profits, so they've put a bounty on the seller."
10049080-87 = "We heard about it on the news, so here we are, looking for a payday."
10049080-89 = "Knock-offs? Like, bootleg merch, or what?"
10049080-90 = "Well, you saw those grenades earlier."
10049080-91 = "They're \"germanium grenades.\" The safety pin is triangular, which is supposed to be \"good\" for your health."
10049080-92 = "Other stuff, too. Defective stuff, mostly."
10049080-93 = "Leaky balloons, popcorn buckets that don't close..."
10049080-94 = "We've seized a lot of that merch, but we haven't found the person selling it yet."
10049080-95 = "And this is a big place, so we're probably not going to. Bah."
10049080-96 = "Leaky balloons? Defective popcorn containers...?"
10049080-98 = "Aw, I just bought this balloon, and it's already out of air!"
10049080-99 = "My popcorn bucket lid fell off somewhere! Waah!"
10049080-100 = "Waaah!"
10049080-101 = "Can I have another one? Please?"
10049080-109 = "You're untying us? Are we free to go, or what?"
10049080-110 = "...Let me say this first, to all three of you."
10049080-111 = "My apologies for disturbing you over a huge misunderstanding, on my part."
10049080-113 = "What? Hah! You think you can just go, \"Oops, my bad!\" and..."
10049080-118 = "I am truly, deeply sorry."
10049080-122 = "H-Huh?! ...Y-You really are?"
10049080-123 = "W-Well... I guess anyone can make mistakes, right?"
10049080-124 = "All right, well, I guess we're good, then. Let's just call this over and done with, huh?"
10049080-126 = "I'm sorry too."
10049080-127 = "As am I. How can I ever make up for—"
10049080-129 = "I said we're good!!"
10049080-130 = "Rabu, now that I understand the situation..."
10049080-131 = "Is there anything we can do to help you with your work?"
10049080-132 = "Huh?! Why? You're not setting us up, are you?"
10049080-133 = "No, no. But I disrupted your work, and I want to make it up to you."
10049080-134 = "Listen, this knock-off salesperson, or persons, would you say they're unjust?"
10049080-135 = "Well, I wouldn't say they're GOOD people. Heh, and that's coming from me."
10049080-136 = "And they've caused harm to innocents, haven't they?"
10049080-137 = "They harmed their wallets, at least. I'd be pissed if someone scammed me like that."
10049080-138 = "Of course."
10049080-139 = "I believe I know their location. Not far from here."
10049080-140 = "And the Vigilante Crew is at your service."
10049080-142 = "...!"
10049080-143 = "Yeah, we are!"
10049080-144 = "And the Library Committee is with you as well, to the best of our abilities!"
10049080-146 = "[ns3] \"Same here.\"\n[ns4] \"'Schale's Running Teacher' is standing by!\""
10049080-150 = "Heh. All right, I'd be dumb to turn down free help."
10049080-151 = "Plus we don't know how many we're up against."
10049080-155 = "So yeah, sure, we could use some vigilantes. ...And a librarian, I guess."

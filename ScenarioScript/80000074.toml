[translation]
80000074-1 = "不曾做過的事"
80000074-2 = "（收到千紗的聯絡後，來到了下課後空蕩蕩的教室）"
80000074-3 = "老師，你真準時呢。"
80000074-4 = "啊，不……不是因為有事想拜託你……"
80000074-5 = "……一，一定要讓我說出來嗎？#n你也知道今天是情人節吧。"
80000074-6 = "所以，想把這個給老師……來，收下吧。"
80000074-11 = "[ns1]「草莓巧克力蛋糕？」\n[ns2]「謝謝，看起來真好吃呢。」"
80000074-12 = "畢竟，那個……明明是這種日子卻沒送禮物，反而更會讓人在意不是嗎……"
80000074-13 = "畢竟，那個……明明是這種日子卻沒送禮物，反而更會讓人在意不是嗎……"
80000074-14 = "就，就只是這樣而已。#n反正老師肯定也從其他人手上收到很多了吧。#n所以就算你不要……也無所謂。"
80000074-15 = "……有，有讓你這麼開心嗎？"
80000074-16 = "……咦？不是，我當然也很開心……要盡快吃唷。不然會壞掉的。"
80000074-20 = "……唉，又隨便說出那種話……"
80000074-21 = "……沒什麼。#n老師的花言巧語也不是一兩天的事了。"
80000074-22 = "話說回來……口味只是我隨意選的，如果不喜歡的話──"
80000074-23 = "……嗯？"
80000074-24 = "不選巧克力而選蛋糕的理由……？"
80000074-25 = "唔嗯，沒什麼特別的理由。"
80000074-26 = "我平時就會吃草莓蛋糕……#n因為是情人節，所以店家推出了巧克力版本。"
80000074-27 = "……什麼？"
80000074-28 = "我，我又不是那個意思。"
80000074-29 = "我，我看起來有那麼貪吃嗎？"
80000074-30 = "真是的，你要這麼說的話我就自己吃了哦！？#n難得買禮物給老師的說……"
80000074-31 = "……平時也沒送你禮物，或是一起吃東西不是嗎？#n所以我也是煩惱了……"
80000074-32 = "……我也知道這不太適合我。可是，可是……！"
80000074-33 = "……咦，之前去的蛋糕店？"
80000074-34 = "我記得啊……？#n嗯，更之前送甜點的時候也……"
80000074-35 = "那又怎──"
80000074-36 = "……"
80000074-37 = "……？"
80000074-38 = "……咦？"
80000074-39 = "……我們意外的常送禮物，也常一起吃東西？"
80000074-40 = "[s3]「對呀，還挺常的。」\n[s4]「因為已經習以為常，所以不會特別意識到對吧。」"
80000074-46 = "那個……"
80000074-47 = "……老師。"
80000074-48 = "難道說，那個……我只是問一下而已……"
80000074-49 = "我是不是，其實……"
80000074-50 = "還挺難搞的啊……？"
80000074-51 = "[s5]「完全不會唷。」\n[s6]「總之，要不要一起吃蛋糕？」"
80000074-52 = "…………"
80000074-53 = "…………"
80000074-54 = "……唉。"
80000074-55 = "我就知道……"
80000074-57 = "（之後，千紗像是要掃除羞恥感一般，以驚人的速度將叉子刺向了蛋糕上的草莓）"
80000074-58 = "（兩人一起吃完蛋糕後，千紗的臉上仍然泛著紅暈）"

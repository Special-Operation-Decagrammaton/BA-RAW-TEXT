[translation]
80000074-1 = "A Brand New Experience"
80000074-2 = "After getting Kazusa's message, I went to the empty classroom after school."
80000074-3 = "Oh, Sensei. You're here on time."
80000074-4 = "Hmm? Oh, it's nothing, really. I'm not going to ask for a favor or anything..."
80000074-5 = "U-Uh... Don't ask questions you already know the answer to! The reason's obvious, right?"
80000074-6 = "I called you because of the holiday, so... Here."
80000074-11 = "[ns1] \"A chocolate strawberry cake.\"\n[ns2] \"Because it's Valentine's Day, I see.\""
80000074-12 = "Well, yeah... Days like this don't happen all the time, so..."
80000074-13 = "Well, yeah... Days like this don't happen all the time, so..."
80000074-14 = "W-Well, that's it. I'm sure you've gotten a lot of chocolate from all sorts of people. I don't expect mine to be special or anything..."
80000074-15 = "...I'm wrong? You're happy?"
80000074-16 = "You're saying you'll always remember...?"
80000074-20 = "Ugh, Sensei, you can't just say things like that... Not when you don't know..."
80000074-21 = "*sigh* Never mind. I don't want to waste my energy on stuff like that. Let's just move on."
80000074-22 = "Anyway. I don't know what you like, so I just picked something... Sorry if it's not what you wanted."
80000074-23 = "...Huh?"
80000074-24 = "Oh, the reason I got a cake and not just chocolate?"
80000074-25 = "U-Uh. I'm not sure... I wasn't thinking that hard about it."
80000074-26 = "I guess it's pretty similar to the strawberry cake I usually get. Did I just get a different flavor...?"
80000074-27 = "What?"
80000074-28 = "You think I just got it as an afterthought while I was picking out my own dessert?"
80000074-29 = "H-How could you say that?!"
80000074-30 = "Ugh, I...I'm speechless! You've got a lot of complaints for someone receiving a gift! Here, give it back if you don't want it. I'll eat it myself."
80000074-31 = "It took a lot of time to pick this out, okay? Have you ever seen me give a gift or buy something to share?"
80000074-32 = "I don't do things like this! Like, ever! I can't believe you're just here teasing me after I—"
80000074-33 = "What?"
80000074-34 = "What are you talking about? I share a lot of desserts?"
80000074-35 = "We've eaten together before?"
80000074-36 = "That's...ridiculous..."
80000074-37 = "Um..."
80000074-38 = "...?"
80000074-39 = "Hm. Actually, Sensei, is this not the first time we've done this?"
80000074-40 = "[s3] \"Yeah, we share food all the time.\"\n[s4] \"I guess you didn't realize you were doing it...\""
80000074-46 = "Um... Well, uh..."
80000074-47 = "Sensei."
80000074-48 = "Am I maybe...just maybe. It's just a thought, okay?"
80000074-49 = "Am I... actually..."
80000074-50 = "Am I a flirt...?"
80000074-51 = "[s5] \"You're getting too in your head about this. \"\n[s6] \"Stop talking and eat some cake.\""
80000074-52 = "..."
80000074-53 = "..."
80000074-54 = "O-Okay..."
80000074-55 = "Yeah. Okay."
80000074-57 = "Kazusa and I spent the rest of our time together sharing the chocolate cake."
80000074-58 = "And, forgetting that it was meant to be a Valentine's Day gift, Kazusa grabbed the strawberry part for herself."

[translation]
80000074-1 = "เรื่องไม่เคยทำ"
80000074-2 = "(หลังได้รับข้อความจากคาซึสะ คุณครูก็มาที่ห้องเรียนหลังหมดคาบเรียนแล้ว)"
80000074-3 = "อ๊ะ คุณครู มาตรงเวลาเลยนะ"
80000074-4 = "หืม? มีเรื่องอะไรน่ะเหรอ? อืม เปล่าหรอก ไม่ได้มีเรื่องขอให้ช่วยอะไรหรอก..."
80000074-5 = "จะ... จะมีเหตุผลอะไรอีกล่ะ? ก็รู้อยู่แก่ใจอยู่แล้ว ยังจะมาตีหน้าซื่ออีก"
80000074-6 = "ฉันเรียกคุณครูมา... ก็เพราะ \"วันนี้\" นั่นแหละ เอ้า..."
80000074-11 = "[ns1] \"เค้กช็อกโกแลตสตรอว์เบอร์รีนี่นา\"\n[ns2] \"เรียกมาเพราะวันวาเลนไทน์นี่เอง\""
80000074-12 = "ก็นั่นแหละ... วันให้ขนมแบบนี้น่ะ... นานๆ ทีปีหนนี่นา"
80000074-13 = "ก็นั่นแหละ... วันแบบนี้น่ะ... นานๆ ทีปีหนนี่นา"
80000074-14 = "กะ...ก็แค่นั้นแหละ ยังไงก็ได้จากเด็กคนอื่นๆ เยอะแล้วนี่นา ฉันก็รู้อยู่ว่าเรื่องแบบนี้ไม่ใช่เรื่องพิเศษ#nอะไรสำหรับคุณครู"
80000074-15 = "...หืม? ไม่ใช่แบบนั้นงั้นเหรอ?"
80000074-16 = "ดีใจมาก...? จะไม่ลืมเลยงั้นเหรอ?"
80000074-20 = "...เฮ้อ คุณครูนี่จริงๆ เลยนะ พูดอะไรแบบนี้ออกมาได้หน้าตาเฉยเลย..."
80000074-21 = "...เฮ้อ ช่างเถอะ ตอนนี้แล้วจะมาบ่นแบบนั้นให้เมื่อยปากก็ใช่ที่ ช่างมันก็แล้วกัน"
80000074-22 = "ยังไงก็เถอะ ฉันไม่รู้ว่าคุณครูชอบรสไหน ก็เลยเลือกมากลางๆ ไม่รู้ว่าจะถูกใจรึเปล่านะ..."
80000074-23 = "...หืม?"
80000074-24 = "ทำไมถึงไม่ให้ช็อกโกแลต แต่ให้ช็อกโกแลตเค้กแทนน่ะเหรอ?"
80000074-25 = "นะ...นั่นสินะ ตอนที่เลือกไม่ได้คิดอะไรเลยน่ะ?"
80000074-26 = "แต่พอคิดดูแล้ว มันก็เหมือนเค้กสตรอว์เบอร์รีที่ฉันซื้อกินประจำเหมือนกันนะ... ที่ต่างก็คงมีแค่รส#nช็อกโกแลต..."
80000074-27 = "...อะไรนะ?"
80000074-28 = "บังเอิญหยิบติดมาระหว่างเลือกขนมของตัวเองรึเปล่าน่ะเหรอ...?"
80000074-29 = "พะ...พูดอะไรแบบนั้นกันเล่า!!"
80000074-30 = "ไร้สาระจริงๆ เลย! คนเขาซื้อมาให้แล้วยังหาเรื่องกันอีก! ถ้าไม่ชอบก็เอาคืนมาเลย ฉันกินเอง!"
80000074-31 = "เค้กชิ้นนี้น่ะ ฉันตั้งใจเลือกซื้อมาเลยนะ เข้าใจมั้ย? อะไรกัน ปกติฉันเคยให้ของขวัญคุณครูรึไง เคยซื้อขนมมากินด้วยกันรึไง?"
80000074-32 = "ฉันอุตส่าห์รวบรวมความกล้าทำเรื่องที่ไม่เคยทำเลยนะ ยังจะมีหน้ามาล้อเล่นแบบนี้อีก!"
80000074-33 = "...ว่าไงนะ?"
80000074-34 = "ปกติก็ซื้อขนมมาให้เยอะแล้วงั้นเหรอ? ปกติก็แบ่งกันกินบ่อยๆ งั้นเรอะ?"
80000074-35 = "พูดอะไร...!"
80000074-36 = "เรื่อยเปื่อย... อยู่ได้..."
80000074-37 = "เอ๋...?"
80000074-38 = "...?"
80000074-39 = "เอ๋? พอนึกดูแล้ว... คุณครู พวกเราไม่ได้ทำแบบนี้ครั้งแรกนี่นา...?"
80000074-40 = "[s3] \"อื้อ เคยกินขนมด้วยกันตั้งหลายอย่าง\"\n[s4] \"คนที่ลืมคิดเรื่องนี้คือคาซึสะจังรึเปล่า~\""
80000074-46 = "อ่า... เอ่อ... อืม..."
80000074-47 = "...คุณครู"
80000074-48 = "บางที... บางทีน่ะ... ฉันก็แค่พูดเผื่อไว้นะ..."
80000074-49 = "....ที่จริง ฉันน่ะ..."
80000074-50 = "...เป็นพวก... เป็นพวกประเภทชอบหว่านเสน่ห์ไปทั่วรึเปล่านะ..."
80000074-51 = "[s5] \"ไม่ถึงขนาดนั้นสักหน่อย\"\n[s6] \"เลิกคิดอะไรแปลกๆ แล้วมากินเค้กกันเถอะ\""
80000074-52 = "...."
80000074-53 = "...."
80000074-54 = "อะ... อื้ม..."
80000074-55 = "ก็นั่นน่ะสินะ..."
80000074-57 = "(หลังจากนั้นคุณครูก็แบ่งเค้กกับคาซึสะและใช้เวลาอยู่ด้วยกัน)"
80000074-58 = "(คาซึสะลืมไปว่าเป็นของขวัญวาเลนไทน์ และแอบกินส่วนที่มีสตรอว์เบอร์รีจนหมด)"

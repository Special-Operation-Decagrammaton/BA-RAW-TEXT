[translation]
80000074-1 = "#title;해본 적 없는 일"
80000074-2 = "#na;(카즈사의 연락을 받고, 방과 후 비어 있는 교실로 찾아갔다.)"
80000074-3 = "3;카즈사;03;아, 선생님. 시간 맞춰 왔네.\n#3;a\n#3;em;[음표]"
80000074-4 = "3;카즈사;01;응? 무슨 일 있냐고? 아아. 아냐. 딱히 부탁할 게 있다거나 그런 건 아니고……."
80000074-5 = "3;카즈사;06;벼, 별……. 다른 이유 있겠어? 알면서 모른척하지 말라고.\n#3;stiff\n#3;em;[///]"
80000074-6 = "3;카즈사;99;오늘 같은 날이니까……. 당연히 이거 때문에 부른 거지. ……자."

[translation]
2601106-1 = "厲害之處"
2601106-2 = "（接到佐天的聯絡後，前往了射擊場）"
2601106-7 = "（才剛走進去，就看見佐天正在射擊間裡練習射擊）"
2601106-11 = "……好，這次一定要……"
2601106-16 = "……嗯？咦……？"
2601106-17 = "奇怪，怎麼會跟剛剛一樣？我明明就……"
2601106-21 = "……唉，不過這也是當然的吧。"
2601106-22 = "[s1]「在練習射擊嗎？」\n[s2]「為什麼嘆氣？」"
2601106-25 = "……嗯？老師？你怎麼會來這裡……"
2601106-26 = "咦？是我先聯絡你的？#n……是嗎？"
2601106-30 = "……哎呀，真的耶。#n唔嗯，都怪我漫不經心地發訊息才會……"
2601106-31 = "真不好意思，明明沒什麼特別的事還讓你跑一趟。"
2601106-32 = "……嗯？你說沒關係？"
2601106-33 = "問我怎麼在做射擊訓練……？唔嗯，怎麼說呢……"
2601106-34 = "其實真的沒什麼……事情好像莫名鬧大了呢……"
2601106-35 = "…………唉。"
2601106-36 = "我其實只是抱著姑且一試的心情嘗試射擊而已。是真的！"
2601106-37 = "畢竟誰也不知道對吧？#n說不定我有連自己都不知道的那種，與生俱來的射擊天分哦！"
2601106-38 = "平常實在沒有這種隨身攜帶槍隻的機會，所以我才想在這裡測試一下！"
2601106-39 = "結果……如你所見，非常普通。"
2601106-40 = "雖然本來就沒抱太大的期望，但還是有點……"
2601106-41 = "有一～～～點點遺憾……！"
2601106-42 = "我在原本的世界裡，也為了開發類似才能的東西付出了各種努力……"
2601106-43 = "但到目前為止都還一無所獲。"
2601106-44 = "不，不過就算是這樣，還是得勇於嘗試對吧？反正又沒什麼損失！"
2601106-45 = "[s3]「當然，真是太了不起了！」\n[s4]「我覺得你的心態很值得敬佩哦！」"
2601106-52 = "咦……？"
2601106-53 = "……這，這麼誇張！？"
2601106-54 = "這是值得特別拿出來稱讚的事嗎？"
2601106-55 = "……當然值得？#n為，為什麼呢？我不太明白……"
2601106-56 = "[s5]「這真的是件很了不起的事。」\n[s6]「佐天這樣的心態是很難得一見的。」"
2601106-59 = "是，是這樣嗎？#n突然受到意外的稱讚，有點不知道該說什麼……"
2601106-60 = "而且老師還一臉認真……"
2601106-64 = "嗯……不過我並不討厭！#n雖然不是很清楚，但得到稱讚不是什麼壞事吧？"
2601106-65 = "只要繼續進行各種嘗試，也許某天就找到什麼也說不定！"
2601106-66 = "所以……"
2601106-67 = "為了以防萬一，最後我要再嘗試一下！"
2601106-75 = "（雖然佐天嘴上說是「最後」，結果卻練習了十幾次）"
2601106-82 = "（不過最後一次射擊的成績，確實比第一次有所進步）"

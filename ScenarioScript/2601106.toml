2601106-25 = "3;사텐;10;……? 음? 선생님? 여기는 어쩐 일로…….\n#3;em;[?!]\n#3;jump"
2601106-26 = "3;사텐;04;네? 제가 먼저 연락을 보냈었다고요? ……그랬나? 어……."
2601106-27 = "#st;[0,0];instant;1;"

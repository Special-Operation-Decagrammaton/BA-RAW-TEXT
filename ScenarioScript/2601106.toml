2601106-29 = "3;사텐;09\n#3;greeting\n#wait;1000"
2601106-30 = "3;사텐;10;……어라. 정말이네요. 으음. 생각 없이 메시지를 막 쓰다 보니 저도 모르게 그만……."
2601106-31 = "3;사텐;06;죄송해요. 별다른 일이 있는 건 아닌데, 괜한 발걸음을 시켜 드린 것 같네요. 하하.\n#3;em;[땀]"
2601106-32 = "3;사텐;02;……네? 괜찮으시다고요?"
2601106-33 = "3;사텐;09;그나저나 웬 사격 연습……이냐고요? 으음. 그건……."
2601106-34 = "3;사텐;06;진짜 별거 아닌데……. 뭔가 이야기가 괜히 커지는 느낌이……."
2601106-35 = "3;사텐;06;…………하아.\n#3;greeting\n#3;em;[한숨]"
2601106-36 = "3;사텐;12;정말로 그냥 좀, 혹시-하는 마음에 쏴 본 거였어요. 진짜예요!\n#3;jump"
2601106-37 = "3;사텐;05;또 모르잖아요? 저한테 저도 모르던, 사격의 뛰어난 재능이, 천부적인 소질이 있었을지!"
2601106-38 = "3;사텐;99;평소에는 이렇게 총 들고 다닐 일도 없으니까요. 이런 데에서라도 테스트해 보자는 생각이던 거죠!\n#3;greeting"
2601106-39 = "3;사텐;06;결과는 뭐……. 보시다시피 평범하지만요.\n#3;em;[속상함]"
2601106-40 = "3;사텐;06;크게 기대한 것까지는 아니었지만, 조금……."
2601106-41 = "3;사텐;12;아주 조오오오오금은 아쉽다……! 라고 생각했네요!\n#3;jump"
2601106-42 = "3;사텐;12;원래 있던 곳에서도, 뭔가 재능 비슷한 걸 개발하려고 이런저런 노력을 하곤 했지만…….\n#3;em;…"
2601106-43 = "3;사텐;06;아직까지는 별 소득이 없었고."
2601106-44 = "3;사텐;05;그, 그래도 시도 정도는 언제든 해 볼 수 있는 거잖아요? 달리 손해 보는 것도 아닌데!\n#3;jump\n#3;em;[!]"
2601106-45 = "[s3] \"물론이지. 대단하잖아!\"\n[s4] \"훌륭한 마음가짐이라고 생각해!\""

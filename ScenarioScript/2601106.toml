[translation]
2601106-1 = "An Amazing Trait"
2601106-2 = "Saten asked me to come see her at the shooting range."
2601106-7 = "As I stepped inside, I saw that she was already practicing."
2601106-11 = "Okay. This time for sure..."
2601106-16 = "...? What?"
2601106-17 = "What the... It was just like last time..."
2601106-21 = "*sigh* I should have known."
2601106-22 = "[s1] \"Getting some shooting practice in?\"\n[s2] \"Why the sigh?\""
2601106-25 = "Oh, Sensei? What are you doing here?"
2601106-26 = "Wait, I invited you here? Really?"
2601106-30 = "So I did... I guess I was on auto pilot. I totally forgot that I sent you this message."
2601106-31 = "Sorry about that. I feel like I called you here for no reason. Haha..."
2601106-32 = "Oh? Are you sure you don't mind?"
2601106-33 = "You want to know why I'm suddenly so interested in shooting. Well..."
2601106-34 = "It's nothing... Really..."
2601106-35 = "...*sigh*"
2601106-36 = "I wanted to try it out. That's all. Just in case, you know?"
2601106-37 = "You never know, right? Maybe I have some hidden talent for marksmanship!"
2601106-38 = "I mean, when will I ever have to carry a gun like this around again? I thought I should make the most of this opportunity."
2601106-39 = "The result is... Well... It's about what you would expect."
2601106-40 = "Not that I had high expectations to begin with, but..."
2601106-41 = "I guess it's just a real big shame!"
2601106-42 = "I mean, I tried my best to become an esper back in my world as well..."
2601106-43 = "...but that never went anywhere."
2601106-44 = "B-But it doesn't hurt to try, right? It's not like I'm losing anything by trying!"
2601106-45 = "[s3] \"You're absolutely right! You're amazing!\"\n[s4] \"You have an absolutely perfect mindset!\""
2601106-52 = "Huh...?"
2601106-53 = "Um... Well, I didn't think it's THAT great."
2601106-54 = "I think you're laying it on a little thick with the praise."
2601106-55 = "...Huh? You really mean it? I don't understand..."
2601106-56 = "[s5] \"You're more amazing than you realize.\"\n[s6] \"Not many people have a strong mind like you, Saten.\""
2601106-59 = "R-Really? I didn't expect you to react like this..."
2601106-60 = "And you're taking it really seriously too..."
2601106-64 = "Well... I don't mind! I don't really get it, but praise is praise, right?"
2601106-65 = "You never know! If I keep trying different things, I'm sure I'll find a hidden talent of some kind!"
2601106-66 = "And on that note..."
2601106-67 = "I'm getting back to my shooting practice, just in case!"
2601106-75 = "With an enthusiastic outlook, Saten went back to the shooting range a good dozen more times."
2601106-82 = "In the end, her aim was undeniably more accurate than when she started."

[translation]
2601106-1 = "ส่วนสำคัญ"
2601106-2 = "(คุณครูได้รับข้อความจากซาเต็น จึงมุ่งหน้าไปยังห้องซ้อมยิงเป้า)"
2601106-7 = "(เมื่อเข้ามาก็เห็นซาเต็นกำลังซ้อมยิงปืนอยู่)"
2601106-11 = "...ก็ได้ งั้นครั้งนี้ต้อง..."
2601106-16 = "...? หืม? เอ๋..."
2601106-17 = "อะ... อะไรเนี่ย เหมือนเมื่อกี้เลย แต่ว่าครั้งนี้ฉัน..."
2601106-21 = "...เฮ้อ หรือมันก็ถูกต้องแล้วนะ"
2601106-22 = "[s1] \"กำลังซ้อมยิงปืนสินะ\"\n[s2] \"ทำไมจู่ๆ ถึงถอนหายใจล่ะ?\""
2601106-25 = "...? หืม? คุณครู? มาทำอะไรที่นี่..."
2601106-26 = "คะ? ฉันเป็นคนติดต่อเข้าไปก่อนงั้นเหรอคะ? ...งั้นเหรอ? อ่า..."
2601106-30 = "...เอ๋ จริงด้วยสินะคะ อืม ฉันพิมพ์ข้อความโดยที่ไม่ได้ไตร่ตรอง แล้วก็เผลอกดส่งไป..."
2601106-31 = "ขอโทษนะคะ ฉันไม่ได้มีเรื่องอะไรเป็นพิเศษ แต่กลับทำให้คุณครูต้องเสียเวลามาถึงนี่เลยค่ะ แหะๆ"
2601106-32 = "...คะ? ไม่เป็นไรงั้นเหรอคะ?"
2601106-33 = "สงสัยว่าทำไมฉันถึงมาซ้อมยิงปืนเหรอคะ? อืม เรื่องนั้น..."
2601106-34 = "จริงๆ ก็ไม่ได้มีเหตุผลอะไรเป็นพิเศษหรอกค่ะ..."
2601106-35 = "...เฮ้อ"
2601106-36 = "จริงๆ ก็แค่อยากลองมายิงดูน่ะค่ะ แค่อยากรู้ว่าจะเป็นยังไง จริงๆ นะคะ!"
2601106-37 = "ใครจะไปรู้ล่ะคะ? บางทีฉันอาจจะมีพรสวรรค์เรื่องการยิงปืนที่ยอดเยี่ยมมาตั้งแต่เกิดโดยที่ฉันเองก็#nไม่รู้ตัวก็ได้!"
2601106-38 = "ปกติแล้วฉันไม่มีเรื่องให้ต้องถือปืนแบบนี้ แต่ในเมื่อมาอยู่ที่นี่แล้ว ฉันก็เลยคิดว่างั้นก็มาทดสอบยิงปืน#nเลยดีกว่าน่ะค่ะ!"
2601106-39 = "และผลลัพธ์... ก็อย่างที่เห็นเลยว่าความสามารถฉันมันก็ธรรมดาๆ ค่ะ"
2601106-40 = "ถึงจะไม่ได้เก่งกาจอะไรมากมาย แต่ก็..."
2601106-41 = "ก็คิดว่า... น่าเสียดายอยู่นิดดดดดหนึ่งน่ะค่ะ...!"
2601106-42 = "ฉันเคยพยายามพัฒนาความสามารถหรืออะไรทำนองนั้นจากที่ที่ฉันอยู่..."
2601106-43 = "แต่ก็ยังไม่ได้ผลอะไรค่ะ"
2601106-44 = "ตะ... แต่อย่างน้อยมันก็ลองทำได้ตลอดเวลานี่คะ ยังไงก็ไม่มีอะไรเสียหายอยู่แล้ว!"
2601106-45 = "[s3] \"ถูกต้องเลย แค่นี่ก็เยี่ยมยอดแล้ว!\"\n[s4] \"นี่เป็นความตั้งใจจริงที่น่าชื่นชมเลย!\""
2601106-52 = "เอ๋...?"
2601106-53 = "อืม... หะ... หืม? ขนาดนั้นเลยเหรอคะ!?"
2601106-54 = "นี่เป็นเรื่องที่ต้องถึงกับชมเลยเหรอคะเนี่ย?"
2601106-55 = "...คะ? ใช่แล้วเหรอคะ? งะ... งั้นเหรอคะ? ฉันไม่ค่อยเข้าใจเลย..."
2601106-56 = "[s5] \"นี่เป็นเรื่องเยี่ยมยอดจริงๆ เลยนะ\"\n[s6] \"ความตั้งใจแบบซาเต็นไม่ได้หาได้บ่อยๆ นะ\""
2601106-59 = "งะ... งั้นเหรอคะ? อืม... พอได้คำชมที่คาดไม่ถึงก็ทำตัวไม่ถูกนะคะเนี่ย..."
2601106-60 = "แถมคุณครูยังทำหน้าจริงจังขนาดนั้นอีก..."
2601106-64 = "แต่ก็... ไม่ใช่ว่าฉันจะไม่ชอบนะคะ! ถึงจะไม่ค่อยเข้าใจเท่าไร แต่การได้รับคำชมก็ไม่ใช่เรื่องแย่อะไร#nอยู่แล้วใช่ไหมล่ะคะ?"
2601106-65 = "ถ้าได้ลองทำนู่นทำนี่เยอะๆ สักวันฉันก็คงค้นพบว่าตัวเองเหมาะกับอะไรน่ะค่ะ!"
2601106-66 = "เพราะงั้น..."
2601106-67 = "ฉันขอลองไปยิงปืนดูอีกรอบนะคะ รอบสุดท้ายแล้ว! บางทีฉันอาจจะทำได้ดีขึ้นก็ได้!"
2601106-75 = "(ถึงจะพูดว่าเป็น 'รอบสุดท้าย' แต่ซาเต็นก็ยืนซ้อมยิงปืนอีกเป็นสิบรอบ)"
2601106-82 = "(และในครั้งสุดท้ายที่ยิง ซาเต็นก็ทำคะแนนได้ออกมาดีกว่าครั้งแรกอย่างเห็นได้ชัด)"

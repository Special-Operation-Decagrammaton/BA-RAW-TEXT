[translation]
10051020-1 = "ตอนที่ 2;คุณสมบัติในการทำภารกิจ"
10051020-2 = "ห้องเรียนแห่งหนึ่งในอาคารเรียนเก่าที่ 38 เฮียกคิยาโค"
10051020-3 = "และด้วยเหตุผลนั้น พวกเราชมรมวิจัยศาสตร์นินจาก็เลยจะได้ไปทำภารกิจรักษาความปลอดภัยให้#nคุณดีไซเนอร์ไชน์แคท...!"
10051020-4 = "โอ้ว!!"
10051020-5 = "ยอดไปเลยค่ะ หัวหน้า!"
10051020-6 = "ขะ... ขอบคุณนะคะ ท่านหัวหน้า!"
10051020-7 = "(สะอื้น)... อุตส่าห์ไปรับคำขอแสนพิเศษแบบนี้มาให้พวกเราเลย..."
10051020-8 = "เอ่อ... ว่าแต่ทุกคนโอเคเหรอ?"
10051020-9 = "ข้าน้อยคิดว่าจะโดนดุที่ไปรับงานน่ารำคาญมาให้ทำซะอีก...!"
10051020-10 = "ไม่เลยค่ะ หัวหน้า!"
10051020-11 = "นี่คือโอกาสที่จะสร้างชื่อเสียงของเราในฐานะผู้พิทักษ์บุคคลสำคัญเลยนะคะ...!"
10051020-12 = "ไม่มีเหตุผลให้ปฏิเสธงานนี้เลยค่ะ!"
10051020-13 = "ฉะ... ฉันก็คิดแบบนั้นเหมือนกันค่ะ...!"
10051020-14 = "แต่ว่า ข้าน้อยขอถามเพราะความสงสัยหน่อยนะ"
10051020-15 = "ทุกคนเคยได้ยินชื่อ <ไชน์แคท> กันมาหมดแล้วเหรอ?"
10051020-16 = "ไม่เคยค่ะ!"
10051020-17 = "ตอบไวอะไรแบบนี้!"
10051020-18 = "เอ๋ เดี๋ยวก่อนสิ ถ้างั้นอิซุนะรู้ได้ยังไงว่าดีไซเนอร์คนนั้นเป็นคนมีชื่อเสียงน่ะ?"
10051020-19 = "ก็หัวหน้าเพิ่งบอกพวกเราไปเองนี่คะ!"
10051020-20 = "อ๊ะ?"
10051020-21 = "ก็นะ ข้าน้อยเองก็เพิ่งจะเคยได้ยินชื่อนี้จากนิยะเหมือนกัน..."
10051020-23 = "เอ่อ... ท่านหัวหน้าคะ..."
10051020-24 = "ฉะ... ฉันเคยได้ยินชื่อนั้นมาก่อนค่ะ..."
10051020-25 = "โอ้ จริงเหรอ?"
10051020-26 = "ค่ะ จากการตีความหมายความงดงามแบบคลาสสิกในสมัยใหม่ในรูปแบบที่ต่างออกไป...!"
10051020-27 = "ได้ยินว่าเขาคนนั้นถึงกับปะ... เปลี่ยนกระบวนทัศน์ของวงการแฟชั่นไปเลยละค่ะ...!"
10051020-28 = "เขาก็เลยกลายเป็นโรลโมเดลของเหล่าดีไซเนอร์เครื่องแต่งกายทุกคนในยุคนี้ด้วยค่ะ..."
10051020-29 = "ละเอียดมากเลย เหมือนได้ข้อมูลจากวงในเลยนะเนี่ย...!"
10051020-30 = "งะ... งั้นเหรอคะ...?"
10051020-31 = "เอาเถอะ! เอาเป็นว่าขอบใจในความร่วมมือนะ สหายนินจา"
10051020-32 = "แต่ว่า!"
10051020-33 = "นินจาคือมืออาชีพ! และมืออาชีพจะไม่ทำงานหากไร้ค่าตอบแทน!"
10051020-34 = "และเพราะอย่างนั้น... ท้าดา!"
10051020-35 = "เราได้รับกล้องตัวใหม่มาเป็นค่าตอบแทนของภารกิจนี้!"
10051020-36 = "ในที่สุดข้าน้อยก็จะกลับมาถ่ายทำ <วิถีนินจาสาว มิจิรุจจี้> ได้อีกครั้ง!"
10051020-37 = "โอ้ว!"
10051020-38 = "ยอดไปเลยค่ะ ท่านหัวหน้า...!"
10051020-39 = "กะ... กะ... กะ... กล้องตัวนี้ดีกว่าที่เราเคยใช้กันอีกนี่คะ...!"
10051020-40 = "ถ้าใช้กล้องตัวนี้ละก็ เราถ่ายวิชานินจาของท่านหัวหน้าด้วยความคมชัดระดับสูงได้เลยค่ะ!"
10051020-41 = "ไม่ใช่แค่เท่านั้นหรอกนะคะ ท่านสึคุโยะ! กล้องตัวนี้กันน้ำได้ด้วยค่ะ!"
10051020-42 = "จะ... จริงด้วยนะคะ...!"
10051020-43 = "แบบนี้ต่อให้ถ่ายท่ามกลางน้ำซุปราเม็งเดือดๆ ก็น่าจะไร้ปัญหาค่ะ! นินนิน!"
10051020-44 = "ฮุฮุ ดีจังเลยนะที่ทุกคนมีความสุข"
10051020-45 = "แต่นินจาโดยแท้ ต้องรู้จักอดทนอดกลั้น...!"
10051020-46 = "เอาละ พักเรื่องความสุขไว้ก่อน แล้วมาสรุปเรื่องภารกิจรักษาความปลอดภัยที่สมบูรณ์แบบของเรากัน!"
10051020-47 = "โอ้ว!"
10051020-48 = "ท่านหัวหน้า...!"
10051020-49 = "เริ่มจากของที่ชมรมหยินหยางให้มา!"
10051020-54 = "กระเป๋าเหรอคะ...?"
10051020-55 = "โอ้ว! อิซุนะตื่นเต้นจังเลยค่ะ!"
10051020-56 = "ข้างในนั้นมีอะไรเหรอคะ?"
10051020-57 = "หรือจะเป็นม้วนคัมภีร์วิชานินจาใหม่?"
10051020-58 = "ฮุฮุ ข้างในนี้คือของจำเป็นสำหรับภารกิจนี้"
10051020-59 = "และมันก็คือ..."
10051020-61 = "ชุดเดรส!"
10051020-62 = "ชุดเดรส...?"
10051020-63 = "ชุดเดรส... เหรอคะ?"
10051020-69 = "ว้าว! เป็นครั้งแรกเลยค่ะที่อิซุนะได้เห็นเสื้อผ้าที่หรูหราแบบนี้!"
10051020-70 = "ชะ... ชุดสวยจังเลยค่ะ..."
10051020-71 = "ถึงมันน่าจะไม่พอดีกับรูปร่างใหญ่ๆ ของฉันก็เถอะ..."
10051020-72 = "อ่า... ก็ค่อยยังชั่วนะที่ทุกคนถูกใจชุดกัน"
10051020-73 = "พอดีว่า... พวกเราต้องใส่ชุดพวกนี้ตอนทำภารกิจน่ะ"
10051020-77 = "ว่าไงนะคะ?!"
10051020-78 = "ตะ... แต่ถ้าใส่ชุดเดรส เราน่าจะเคลื่อนไหวไม่สะดวกนะคะ?!"
10051020-79 = "ยะ... อย่าบอกนะคะว่าท่านหัวหน้าจะให้พวกฉันขึ้นรันเวย์แฟชั่นโชว์น่ะ?"
10051020-80 = "กะ... การทนเสียงโห่จากผู้ชมนับไม่ถ้วนก็เป็นหนึ่งในภารกิจของเราเหรอคะ?!"
10051020-81 = "นะ... แน่นอนว่าถ้านั่นคือวิถีของนินจาละก็..."
10051020-82 = "ฉะ... ฉัน สึคุโยะคนนี้... ก็จะ..."
10051020-83 = "ไม่ใช่ๆ ภารกิจของพวกเราก็แค่การรักษาความปลอดภัยเฉยๆ!"
10051020-84 = "เราแค่ต้องกลมกลืนไปกับฝูงชน แล้วถ้าพบการเคลื่อนไหวที่น่าสงสัยก็เข้าควบคุมก่อนเท่านั้นเอง!"
10051020-85 = "แต่ถ้าจะทำแบบนั้นได้ เราก็ต้องเดินไปเดินมาในงานได้อย่างอิสระใช่มั้ยล่ะ?"
10051020-86 = "กะ... ก็ใช่ค่ะ...?"
10051020-87 = "ถ้าเราแต่งตัวไม่เหมาะสมกับงาน เห็นว่าเราอาจจะไม่ได้รับอนุญาตให้เข้าไปในบางพื้นที่ของงานน่ะ"
10051020-88 = "อย่างเช่นที่ที่... มันเรียกว่าอะไรนะ ที่ที่มีคนสำคัญมารวมตัวกัน... "
10051020-89 = "หะ... ห้องบอลรูมน่ะเหรอคะ?"
10051020-90 = "ใช่! ห้องบอลรูม!"
10051020-91 = "มีการกำหนดเดรสโค้ดสำหรับพื้นที่อย่างห้องบอลรูมสินะคะ..."
10051020-92 = "อื้อ ชมรมหยินหยางก็เลยไปหาชุดแบบนี้มาให้น่ะ"
10051020-93 = "แต่ชุดแบบนี้จำกัดการเคลื่อนไหวเยอะไปหรือเปล่าคะ...?"
10051020-94 = "ความคล่องตัวและความรวดเร็วคือพื้นฐานของนินจาแท้ๆ..."
10051020-95 = "และที่สำคัญ ฉันคิดว่ามันไม่เหมาะกับฉันเลยสักนิดค่ะ...!"
10051020-96 = "ต่อให้ใส่ได้ แต่ถ้าขยับตัวมากเกินไป ชุดก็จะขาดหมดแน่ๆ ค่ะ...!"
10051020-97 = "อืม! งั้นเรามาลองใส่ด้วยกันตอนนี้เลยค่ะ! นินนิน!"
10051020-98 = "หืม?"
10051020-99 = "...!"
10051020-100 = "ก็หัวหน้าพูดแบบนี้เสมอนี่คะ"
10051020-101 = "นินจาน่ะ! ไม่ว่าจะอยู่ในสถานการณ์ที่จนมุมหรือต้องเผชิญกับความยากลำบากแค่ไหน ก็จะไม่มีวันยอมแพ้เด็ดขาด!"
10051020-102 = "เพราะงั้นเราก็ไม่ควรท้อแท้กับแค่ชุดเดรสที่ต้องใส่สิคะ!"
10051020-103 = "ถ้าเราลองใส่และฝึกเคลื่อนไหวให้ชินตั้งแต่ตอนนี้ละก็..."
10051020-104 = "ตอนอยู่ในสถานที่จัดงานในวันจริง ก็จะเคลื่อนไหวไปมาได้สะดวกสบายยิ่งขึ้นค่ะ!"
10051020-105 = "ก็จริงอย่างที่ว่านะ ถ้าเราเตรียมพร้อมไว้ก่อน การปฏิบัติภารกิจจะง่ายขึ้น..."
10051020-106 = "และนินจาก็ย่อมต้องกลมกลืนไปกับทุกสถานการณ์อยู่แล้ว!"
10051020-107 = "งั้นเราจะมาท้อแท้กับแค่ชุดเดรสไม่ได้! อย่างที่อิซุนะว่าไว้เลย!"
10051020-108 = "ใช่ค่ะ! นินนิน!"
10051020-109 = "ถ้างั้นอิซุนะจะไปลองใส่เป็นคนแรกค่ะ!"
10051020-112 = "หัวหน้า! นี่คือชุดที่อิซุนะจะได้ใส่ใช่มั้ยคะ?"
10051020-113 = "อื้อ ชุดนี้ของอิซุนะ ส่วนชุดนี้ก็ของสึคุโยะ..."
10051020-114 = "ฮะ... เฮือกก...!"
10051020-116 = "มาแล้ว~! อิซุนะในชุดเดรส ปรากฏตัวค่ะ!"
10051020-122 = "โอ้ว...!"
10051020-123 = "ว้าว...!"
10051020-124 = "อะไรเนี่ย ใส่แล้วสวยไม่ใช่เล่นเลยนะ!"
10051020-125 = "สวยจังเลยค่ะ...!"
10051020-126 = "แหะๆ... งั้นเหรอคะ?"
10051020-127 = "พอชมกันแบบนี้แล้ว อิซุนะก็เขินอยู่หน่อยเหมือนกันนะคะ!"
10051020-128 = "แล้วขยับตัวสะดวกมั้ย?"
10051020-129 = "ชุดมีส่วนที่รัด แล้วก็ส่วนที่ฟูฟ่องจนไม่สบายตัวนิดหน่อย..."
10051020-130 = "แต่ถ้าชินแล้วก็ไม่น่ามีปัญหาค่ะ!"
10051020-131 = "ที่สำคัญก็คือ นี่เป็นครั้งแรกที่อิซุนะได้ใส่เสื้อผ้าที่สวยงามและหรูหราแบบนี้..."
10051020-133 = "อิซุนะยิ่งตื่นเต้นเลยละค่ะ!"
10051020-134 = "โอ้ว งั้นก็ดีเลยนะ"
10051020-135 = "เอาละ ถ้างั้น..."
10051020-136 = "ต่อไปก็..."
10051020-137 = "ทะ... ท่านหัวหน้าลองไปใส่เป็นคนต่อไปดีมั้ยคะ?"
10051020-138 = "ฉันว่าชุดต้องเข้ากับท่านหัวหน้าแน่นอนค่ะ!"
10051020-139 = "อ่า... คะ... คิดงั้นเหรอ?"
10051020-140 = "งั้นไหนดูซิ ชุดที่ข้าน้อยจะต้องใส่..."
10051020-142 = "ชุดนี้... ใส่แบบนี้ถูกมั้ยนะ?"
10051020-143 = "ใส่กลับด้านแล้วค่ะ หัวหน้า!"
10051020-144 = "เฮือก!"
10051020-145 = "อะไรกัน! ทำไมชุดข้าน้อยถึงใส่ยากแบบนี้!"
10051020-146 = "ท่านหัวหน้า ค่อยๆ ใส่นะคะ เริ่มจากตรงนี้ก่อนค่ะ..."
10051020-147 = "เสร็จแล้วก็รัดตรงนี้ให้แน่น..."
10051020-148 = "โอ้ว!"
10051020-149 = "ได้ใส่ชุดเดรสทั้งที งั้นลองแกะผมที่มัดไว้ดีมั้ยคะ หัวหน้า?"
10051020-150 = "อิซุนะว่าถ้าปล่อยผม น่าจะเข้ากับชุดนี้มากกว่านะคะ!"
10051020-151 = "หา? ถึงกับต้องเปลี่ยนทรงผมเลยเหรอ?!"
10051020-152 = "มะ... ไม่ต้องขนาดนั้นก็ได้มั้ง..."
10051020-153 = "ไม่ได้ค่ะ ท่านหัวหน้า!"
10051020-154 = "ฉะ... ฉันมีที่หนีบผมอยู่พอดี ลองปล่อยผมดูเถอะนะคะ!"
10051020-155 = "มีอุปกรณ์อะไรแบบนั้นด้วยเหรอ?!"
10051020-157 = "ปะ... เป็นยังไงบ้าง...?"
10051020-158 = "โอ้ว! เหมือนเป็นคนละคนเลยค่ะ หัวหน้า!"
10051020-159 = "ใช่ค่ะ ลุคนี้ท่านหัวหน้าทั้งดูน่ารัก ทั้งน่าทะนุถนอม...!"
10051020-160 = "นินจาเป็นอะไรที่ไร้ขีดจำกัดแบบนี้สินะคะ...!"
10051020-161 = "ยะ... อย่าชมกันจนเกินไปเลย...!"
10051020-162 = "ขะ... ข้าน้อยก็เขินเป็นนะ...!"
10051020-163 = "อะ... อีกอย่างนะ ที่จริงชุดแบบนี้น่าจะเหมาะกับสึคุโยะมากกว่าใครด้วยซ้ำ...!"
10051020-164 = "คะ... คะ?!"
10051020-165 = "ใช่ค่ะ ท่านสึคุโยะ!"
10051020-166 = "ท่านสึคุโยะก็ไปลองใส่มาด้วยสิคะ!"
10051020-167 = "ฮะ... เฮือกก...!"
10051020-168 = "ถะ... ถ้างั้นฉันจะ..."
10051020-172 = "เอ่อ... ชุดนี้เป็นไซซ์พอดีตัวฉันแล้วเหรอคะ...?"
10051020-173 = "ฉันใส่แทบไม่เข้าเลยค่ะ...!"
10051020-174 = "ไม่หรอก ตอนแรกๆ ก็จะรู้สึกว่าชุดคับอย่างนี้ละ"
10051020-175 = "เฮือกก...!"
10051020-176 = "แล้วชายกระโปรงก็... สั้นเกินไปหรือเปล่าคะ?"
10051020-177 = "อืม... ข้าน้อยว่ามันก็ยาวพอดีแล้วนะ?"
10051020-178 = "งั้นเหรอคะ...? ระ... หรือเป็นเพราะฉันรูปร่างใหญ่เองคะ!"
10051020-179 = "คนอย่างฉันทั้งตัวสูง รูปร่างใหญ่... แล้วก็ไม่ได้หน้าตาสะสวย..."
10051020-180 = "ตอนนี้ชุดเดรสดีๆ สำหรับฉันสักชุดยังไม่มีเลยค่ะ...!"
10051020-181 = "ฮือออ...!"
10051020-182 = "ไม่หรอกค่ะ ท่านสึคุโยะ! ลองพยายามอีกหน่อยนะคะ!"
10051020-183 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ...!"
10051020-184 = "ดะ... เดี๋ยวก่อนสิคะ ถ้ายัดเข้าไปเลยแบบนั้นละก็...!"
10051020-188 = "แคว่กกก!"
10051020-191 = "อ่า..."
10051020-192 = "ชุดขาดแล้วค่ะ...!"
10051020-193 = "กะ... กระดุมก็หลุดหมดเลยค่ะ...!"
10051020-194 = "เฮือกกก..."
10051020-195 = "ฉันไม่คู่ควรที่จะใส่ชุดสวยๆ แบบนี้จริงด้วยค่ะ!"
10051020-196 = "ฉันเกิดมาตัวใหญ่เทอะทะขนาดนี้...!"
10051020-197 = "ไม่หรอก! นี่เป็นความผิดของพวกเราเอง...! พวกเราไม่น่าบังคับให้ใส่เลย...!"
10051020-198 = "ท่านสึคุโยะ เป็นยังไงบ้างคะ?"
10051020-199 = "มะ... ไม่ใช่ความผิดของทุกคนหรอกค่ะ..."
10051020-200 = "ชุดนี้ทางชมรมหยินหยางเป็นคนจัดหาให้ไม่ใช่เหรอคะ...?"
10051020-201 = "ถ้าชมรมหยินหยางข่มขู่พวกเราด้วยเรื่องนี้ล่ะคะ?!"
10051020-202 = "แล้วถ้าพวกนั้นมายึดกล้องของพวกเราไป เราจะทำยังไงกันดีคะ?!"
10051020-203 = "ถ้าแบบนั้นก็ถ่ายและอัปโหลด <วิถีนินจาสาว มิจิรุจจี้> ไม่ได้ด้วย...!"
10051020-204 = "[s] \"ไม่ต้องห่วงนะ ชุดที่ขาดเดี๋ยวค่อยเอาไปเย็บก็ได้\""
10051020-205 = "ใช่ๆ แล้วเราค่อยเอาไปคืนชมรมหยินหยางไง"
10051020-206 = "เดี๋ยวนี้เทคโนโลยีพัฒนาไปมาก เย็บแล้วอาจไม่ทิ้งร่องรอยที่ขาดไว้เลยก็ได้"
10051020-207 = "เพราะงั้นก็ไม่ต้องกังวลมากเกินไปหรอกนะ..."
10051020-211 = "เดี๋ยวนะ แล้วทำไมท่านอาจารย์ถึงมาอยู่ตรงนี้ได้...?"
10051020-212 = "[s] \"อ้อ ครูมาธุระแถวนี้ เสร็จแล้วก็เลยแวะมาหาน่ะ\""
10051020-213 = "ไม่ใช่... ข้าน้อยไม่ได้อยากรู้ว่ามาทำอะไรที่นี่..."
10051020-214 = "แต่อยากรู้ว่าอยู่มานานแค่ไหนแล้วต่างหาก...?!"
10051020-215 = "คะ... คุณครู...?!"
10051020-216 = "นายท่าน?!"
10051020-217 = "ยะ... อย่าบอกนะว่ามาตั้งแต่ตอนเปลี่ยนเสื้อผ้า... เมื่อกี้แล้ว..."
10051020-222 = "วะ... วิชานินจา! กำจัดคนร้าย!! ทำลายคนโรคจิต!"
10051020-223 = "[s] \"ดะ... เดี๋ยวก่อนสิ...!\""

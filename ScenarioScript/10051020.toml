[translation]
10051020-1 = "第2話;任務的資格"
10051020-2 = "百鬼夜行．第38舊校舍的某間教室"
10051020-3 = "……因此我們忍術研究部，將會負責擔任設計師Shine Cat的護衛！"
10051020-4 = "哦哦！！"
10051020-5 = "好厲害，部長！"
10051020-6 = "辛，辛苦了，部長！"
10051020-7 = "嗚嗚……居然為了我們，接下了這麼重大的委託……"
10051020-8 = "咦……大家居然都沒意見嗎？"
10051020-9 = "我還以為大家會抱怨我接了麻煩的工作的說……！"
10051020-10 = "怎麼會呢，部長！"
10051020-11 = "這可是藉由護衛知名人物，提高社團名聲的大好機會……！"
10051020-12 = "沒有任何理由拒絕！"
10051020-13 = "我，我也是這麼想的……！"
10051020-14 = "話說我其實有點好奇……"
10051020-15 = "大家有聽說過Shine Cat這個名字嗎？"
10051020-16 = "沒有！"
10051020-17 = "回答得真快！"
10051020-18 = "等等，那伊樹菜怎麼知道那個人很有名呢？"
10051020-19 = "因為剛才部長是這麼說的！"
10051020-20 = "啊？"
10051020-21 = "其實我也是聽仁耶說才知道這個人的……"
10051020-23 = "那個，部長……"
10051020-24 = "我，我有聽說過……"
10051020-25 = "哦，真的嗎？"
10051020-26 = "是的。他以嶄新的形式，將古典美學進行了現代化詮釋……"
10051020-27 = "是顛覆了時尚界的典，典範……！"
10051020-28 = "因此被稱為，現存所有服裝設計師的楷模……"
10051020-29 = "了解得好詳細……！"
10051020-30 = "是，是嗎……？"
10051020-31 = "總之！謝謝大家願意配合。"
10051020-32 = "可是……！"
10051020-33 = "忍者本來就是一門專業！而專業人士絕對不會不收酬勞就行動！"
10051020-34 = "所以……鏘鏘！"
10051020-35 = "作為工作的報酬，我們拿到了這台新的攝影機！"
10051020-36 = "這樣終於可以繼續拍「少女忍法帖小小三千留」了！"
10051020-37 = "哦哦！"
10051020-38 = "好厲害，部長……！"
10051020-39 = "這，這這，這台攝影機，比我們原本那台好非常多……！"
10051020-40 = "只要有這台攝影機，就可以用更清晰的畫質拍下部長的忍術了！"
10051020-41 = "而且你看，月夜！這台攝影機還有防水功能哦！"
10051020-42 = "真，真的耶……！"
10051020-43 = "這樣一來，就算要在沸騰的拉麵湯頭裡攝影也沒問題！忍忍！"
10051020-44 = "呵呵，很高興見到大家都這麼開心。"
10051020-45 = "不過忍者本來就是能「忍」之人……！"
10051020-46 = "所以還是先把喜悅放在一邊，開始完美達成護衛任務的簡報吧！"
10051020-47 = "哦哦！"
10051020-48 = "部長……！"
10051020-49 = "首先就來看看陰陽部給我們的東西吧！"
10051020-54 = "手提箱……？"
10051020-55 = "哦哦！伊樹菜好期待！"
10051020-56 = "裡面裝著什麼呢？"
10051020-57 = "記載著新忍術的卷軸？"
10051020-58 = "呵呵，裡面裝的是這次任務的必需品。"
10051020-59 = "也就是……"
10051020-61 = "禮服！"
10051020-62 = "禮服……？"
10051020-63 = "禮服……是嗎？"
10051020-69 = "哇！伊樹菜第一次見到這麼華麗的衣服！"
10051020-70 = "真，真的好漂亮……"
10051020-71 = "雖然我這麼高大，完全不適合就是了……"
10051020-72 = "唔嗯……總之大家喜歡這些衣服就好。"
10051020-73 = "因為這些，是要給我們穿的。"
10051020-77 = "咦咦咦──！？"
10051020-78 = "穿，穿著這種衣服不會很難活動嗎！？"
10051020-79 = "難，難道我，我們要登上時裝秀的伸展台嗎？"
10051020-80 = "忍，忍受觀眾席傳來的無數噓聲，也是我們必須執行的任務嗎！？"
10051020-81 = "如，如果那是忍者必須走的路……"
10051020-82 = "月夜我，會努力的……"
10051020-83 = "不是不是！我們的任務終究只是護衛而已！"
10051020-84 = "混進會場的人群之中，發現可疑的動靜就及時制伏！"
10051020-85 = "如果要做到這一點，首先就必須能在會場內自由走動吧？"
10051020-86 = "是，是這樣沒錯……？"
10051020-87 = "如果不穿上這種正式的服裝，有些區域是沒辦法進去的。"
10051020-88 = "比方說那個……會有一堆大人物聚集的……叫什麼來著…… "
10051020-89 = "宴，宴會場嗎？"
10051020-90 = "沒錯！宴會場！"
10051020-91 = "那一類的地方，都會要求符合Dress code呢……"
10051020-92 = "嗯，所以陰陽部才會幫我們準備了這些衣服。"
10051020-93 = "可是穿著這種衣服，行動起來不是很不方便嗎……？"
10051020-94 = "柔軟度和敏捷性，是忍者的基本……"
10051020-95 = "尤其，這個尺寸好像完全不適合我……！"
10051020-96 = "就算能勉強套上……感覺只要動作稍微大一點，衣服就會全部裂開……！"
10051020-97 = "既然如此！大家現在就來一起試穿看看吧！忍忍！"
10051020-98 = "嗯？"
10051020-99 = "……！"
10051020-100 = "部長不是經常這麼說嗎？"
10051020-101 = "「忍者無論陷入何種絕境，都不能輕言放棄！」……"
10051020-102 = "所以，不能因為一件禮服就感到氣餒！"
10051020-103 = "只要現在先試穿，提前適應一下……"
10051020-104 = "到會場的時候應該就能活動得更自在了！"
10051020-105 = "……事先適應好的話，確實能讓任務執行得更順利。"
10051020-106 = "而且忍者本來就要能自然地融入任何情況！"
10051020-107 = "伊樹菜說的對！我們不能被區區的禮服打敗！"
10051020-108 = "沒錯！忍忍！"
10051020-109 = "那麼伊樹菜就先去試穿了！"
10051020-112 = "部長！我要穿的禮服是這件嗎？"
10051020-113 = "嗯，這是伊樹菜的，這是月夜的……"
10051020-114 = "噫，噫噫……！"
10051020-116 = "鏘鏘！禮服伊樹菜，登場！"
10051020-122 = "哦哦……！"
10051020-123 = "哇……！"
10051020-124 = "什麼什麼，很適合你嘛！"
10051020-125 = "好漂亮……！"
10051020-126 = "嘿嘿，還可以嗎？"
10051020-127 = "被這樣誇獎，伊樹菜有點害羞呢！"
10051020-128 = "活動起來感覺如何？"
10051020-129 = "某些地方有點緊繃，所以不是很舒服……"
10051020-130 = "不過適應一下之後應該沒問題！"
10051020-131 = "而且第一次穿上這麼華麗的衣服……"
10051020-133 = "伊樹菜，感覺非常興奮！"
10051020-134 = "哦哦，很好很好。"
10051020-135 = "那麼……"
10051020-136 = "接下來是……"
10051020-137 = "部，部長要不要先試穿？"
10051020-138 = "我想部長一定也很適合的！"
10051020-139 = "咦，是，是嗎？"
10051020-140 = "我看看，這件是分配給我的衣服……"
10051020-142 = "把這個……像這樣穿進去就行了嗎……？"
10051020-143 = "穿反了，部長！"
10051020-144 = "噫噫！"
10051020-145 = "什麼嘛！為什麼要把衣服弄得這麼複雜啊！"
10051020-146 = "部長，先，先從這裡慢慢穿好……"
10051020-147 = "然後再把這邊仔細綁緊……"
10051020-148 = "哦哦！"
10051020-149 = "換上這套衣服的時候，要不要試著把頭髮放下來呢，部長？"
10051020-150 = "感覺長直髮會更適合哦！"
10051020-151 = "咦，連髮型都要換嗎！？"
10051020-152 = "好，好像也沒必要做到那種程度……"
10051020-153 = "不，部長！"
10051020-154 = "我，我正好有離子夾，就來試試看吧！"
10051020-155 = "你連那種裝備都有！？"
10051020-157 = "怎，怎麼樣呢……？"
10051020-158 = "哦哦！完全是不同的感覺呢，部長！"
10051020-159 = "既清純，又充滿了少女感……！"
10051020-160 = "原來忍者的可能性，是這麼無窮無盡的啊……！"
10051020-161 = "不，不要那麼抬舉我啦……！"
10051020-162 = "我會有點害羞……！"
10051020-163 = "而，而且老實說，這種衣服感覺還是月夜最適合……！"
10051020-164 = "咦，咦咦！？"
10051020-165 = "沒錯，月夜閣下！"
10051020-166 = "月夜閣下也趕快試穿看看吧！"
10051020-167 = "噫，噫噫……！"
10051020-168 = "那，那我也……"
10051020-172 = "這，這套衣服，真的是我的尺寸嗎……？"
10051020-173 = "完全穿不進去……！"
10051020-174 = "別擔心，只是第一次穿會有點緊而已。"
10051020-175 = "嗚嗚……！"
10051020-176 = "而且這個下擺，是不是有點太短了？"
10051020-177 = "那……那樣應該夠長了吧？"
10051020-178 = "是嗎……？果，果然是因為我太高大的關係！"
10051020-179 = "像我這種只有塊頭大……又不漂亮的人……"
10051020-180 = "就連一件像樣的衣服都穿不上……！"
10051020-181 = "嗚嗚嗚……！"
10051020-182 = "不是的，月夜閣下！再加油一下試試看！"
10051020-183 = "可，可是……！"
10051020-184 = "那，那個，像這樣硬塞的話……！"
10051020-188 = "（啪唰──！）"
10051020-191 = "啊……"
10051020-192 = "衣服裂開了……！"
10051020-193 = "扣，扣子也全都……！"
10051020-194 = "嗚嗚嗚……"
10051020-195 = "我果然沒有資格穿這麼漂亮的衣服！"
10051020-196 = "空有高大的身材卻派不上用場……！"
10051020-197 = "不是的！是我們不好……！不該硬要你穿上的……！"
10051020-198 = "月夜閣下，你還好嗎？"
10051020-199 = "我，我倒是還好……"
10051020-200 = "可是這件衣服，是跟陰陽部借來的吧……？"
10051020-201 = "要是陰陽部拿這件事威脅我們怎麼辦！？"
10051020-202 = "萬一他們把攝影機從我們這裡要回去怎麼辦！？"
10051020-203 = "那樣就無法更新「少女忍法帖小小三千留」的影片了……！"
10051020-204 = "[s]「沒事的。破掉的衣服只要補一補就行了。」"
10051020-205 = "沒錯沒錯，只要修補好再還他們就沒問題了。"
10051020-206 = "現在的技術這麼好，那種程度可以修補得很漂亮。"
10051020-207 = "所以不用想得太嚴重……"
10051020-211 = "……等一下，老師大人怎麼會在這裡？"
10051020-212 = "[s]「啊，我剛好到這附近辦事，所以順路繞過來看看。」"
10051020-213 = "不是……我想問的不是老師為什麼來這裡……"
10051020-214 = "……而是老師是什麼時候來的！？"
10051020-215 = "老，老師……！？"
10051020-216 = "主公！？"
10051020-217 = "該，該不會……從剛才換衣服的時候就……"
10051020-222 = "忍，忍法！色狼退散之術！！#n受死吧，變態！"
10051020-223 = "[s]「先，先等一下……！」"

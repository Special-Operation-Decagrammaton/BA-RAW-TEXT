[translation]
2000305-1 = "狙擊手的試煉（１）"
2000305-2 = "某個建築的屋頂"
2000305-3 = "就像「狙擊就是與等待的戰鬥」這句話說的一樣，對狙擊手來說，最重要的修養就是「忍耐」。"
2000305-4 = "只要確定了目標，直到敵人進入射程為止，狙擊手都需要保持一動也不動才行。"
2000305-5 = "不管受到怎樣的誘惑，或是遇到怎樣的折磨都絕對……！"
2000305-6 = "[s] 「肚子餓了也是嗎？」"
2000305-7 = "那是當然的。#n也是因為這樣，在執行狙擊任務的時候，常常會錯過用餐的時機。"
2000305-8 = "[s] 「那還真是辛苦。麻白真厲害呢。」"
2000305-9 = "這也沒什麼。#n其他的狙擊手們也都是這樣的。"
2000305-10 = "況且，我也還沒有達到完美的境界。"
2000305-11 = "其實我在狙擊時總是有件非常在意的事……"
2000305-12 = "[s] 「在意的事？」"
2000305-13 = "就是……蟲子……"
2000305-14 = "[s] 「蟲子？」"
2000305-15 = "或許是因為天氣越來越熱的關係，校園和屋頂上的蟲子也變多了。在狙擊的姿勢就位後，總會有蟲子跑到身體上。"
2000305-16 = "……那種噁心的觸感，總是會讓我無法好好瞄準。"
2000305-17 = "[s] 「用手趕走不行嗎？」"
2000305-18 = "當然不行啊！#n就連呼吸都得要小心翼翼了，因為蟲子而改變姿勢這種事……"
2000305-19 = "對狙擊手來說是絕對不能發生的事！"
2000305-20 = "嗚嗚……但是再這樣下去的話，就連好好訓練都沒辦法了。"
2000305-21 = "就是因為這樣，想請老師幫個忙，不知道可不可以呢？"
2000305-22 = "[s] 「要我幫忙？該怎麼幫忙呢？」"
2000305-23 = "我會一直保持站著不動的姿勢，老師就模擬蟲子爬上來那樣來搔癢我。"
2000305-24 = "來吧！我準備好了。"
2000305-25 = "呼……"
2000305-28 = "[s] 搔癢麻白的手臂"
2000305-31 = "嗯……這種程度還在意料之內。#n我可不會因為這種等級的刺激就改變姿勢。"
2000305-32 = "[s] 搔癢麻白的臉頰"
2000305-35 = "嗚，嗚嗚……竟然連那種地方也不放過……但，但是我沒問題的。#n為了達到完美的狙擊，這種程度我還……"
2000305-36 = "[s] 搔癢麻白的後頸"
2000305-39 = "呀，呀啊？！#n你，你在摸哪裡啊，老師！"
2000305-42 = "就算是在訓練，也不代表想摸哪裡都可以！"
2000305-43 = "真是的……虧我還一直以為老師是正義的夥伴！"
2000305-45 = "（之後花了一點時間來安慰生氣的麻白）"

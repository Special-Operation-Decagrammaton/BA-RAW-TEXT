[translation]
2000305-1 = "ความยากลำบากของสไนเปอร์ 1"
2000305-2 = "บนดาดฟ้าของอาคารแห่งหนึ่ง"
2000305-3 = "การลอบยิงคือ <การต่อสู้กับการรอคอย> และข้อปฏิบัติที่จำเป็นที่สุดสำหรับสไนเปอร์#nคือ <ความอดทน> ค่ะ"
2000305-4 = "สไนเปอร์จะล็อกเป้าหมายและรอจนกว่าศัตรูจะเข้ามาในแนวยิง โดยที่ห้ามขยับตัวเด็ดขาดค่ะ"
2000305-5 = "ไม่ว่าจะมีสิ่งล่อใจหรือลำบากมากแค่ไหนก็ห้ามขยับเด็ดขาด...!"
2000305-6 = "[s] \"แม้ว่าจะหิวน่ะเหรอ?\""
2000305-7 = "ใช่แล้วค่ะ เวลาที่ทำภารกิจลอบยิง ฉันมักกินอาหารไม่ตรงเวลาบ่อยๆ..."
2000305-8 = "[s] \"คงลำบากแย่เลย มาชิโระนี่น่าทึ่งมาก\""
2000305-9 = "ไม่หรอกค่ะ สไนเปอร์คนอื่นๆ ก็ทำแบบนี้เหมือนกันค่ะ"
2000305-10 = "และฉันเองก็ยังทำได้ไม่สมบูรณ์แบบค่ะ"
2000305-11 = "ที่จริงแล้วมีเรื่องหนึ่งที่ฉันกังวลทุกครั้งที่ลอบยิง..."
2000305-12 = "[s] \"มีเรื่องกังวลอะไรเหรอ?\""
2000305-13 = "มันคือ... แมลง... ค่ะ..."
2000305-14 = "[s] \"แมลง?\""
2000305-15 = "พออากาศเริ่มร้อนขึ้น พวกแมลงที่อยู่ตามดาดฟ้าและสนามหญ้าก็มีเพิ่มมากขึ้น และพวกมันก็#nชอบแอบไต่ขึ้นไปบนตัวเมื่อทำท่าสไนเปอร์......"
2000305-16 = "สัมผัสที่น่าขนลุกพวกนั้น... ทำให้ฉันเล็งพลาดค่ะ\n"
2000305-17 = "[s] \"เอามือปัดไล่ไปไม่ได้เหรอ?\""
2000305-18 = "ไม่ได้แน่นอนค่ะ! แม้แต่หายใจยังต้องระวังเลยค่ะ จะให้เปลี่ยนท่าเพราะแมลง…"
2000305-19 = "สไนเปอร์ห้ามทำเด็ดขาดค่ะ!"
2000305-20 = "ตะ... แต่ถ้ายังปล่อยให้เป็นแบบนี้ต่อไปก็จะฝึกไม่ได้นี่สิคะ..."
2000305-21 = "ถ้าอย่างนั้นคุณครูจะช่วยฉันได้มั้ยคะ?"
2000305-22 = "[s] \"ครูเหรอ? ทำยังไงล่ะ?\""
2000305-23 = "ฉันจะยืนนิ่งอยู่เฉยๆ แล้วให้คุณครูมาจั๊กจี้ฉันเหมือนกับเวลาที่แมลงบินไต่ขึ้นมาค่ะ"
2000305-24 = "เอาล่ะ ฉันพร้อมแล้วค่ะ"
2000305-25 = "ฮู่ว..."
2000305-28 = "[s] จั๊กจี้แขนของมาชิโระ"
2000305-31 = "อึ่ก... แบบนี้แหละค่ะ การจั๊กจี้ระดับนี้ทำลายความนิ่งของฉันไม่ได้หรอกค่ะ"
2000305-32 = "[s] จั๊กจี้แก้มของมาชิโระ"
2000305-35 = "อะ อึ่ก... ตรงนั้น... อ๊ะ แต่ไม่เป็นไรค่ะ เพื่อการลอบยิงที่สมบูรณ์แบบ..."
2000305-36 = "[s] จั๊กจี้ต้นคอของมาชิโระ"
2000305-39 = "อะ อ๊ะ! แตะตรงไหนกันคะเนี่ย คุณครู!"
2000305-42 = "ถึงจะเป็นการฝึก แต่ไม่ได้หมายความว่าจะแตะได้ทุกที่นะคะ!"
2000305-43 = "จริงๆ เลย... ฉันก็คิดว่าคุณครูอยู่ข้างความยุติธรรมมาตลอด!"
2000305-45 = "(หลังจากนั้นคุณครูก็ปลอบใจมาชิโระที่โกรธอยู่พักหนึ่ง)"

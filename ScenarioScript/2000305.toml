[translation]
2000305-1 = "The Sniper's Ordeal Part 1"
2000305-2 = "Building Rooftop"
2000305-3 = "It's said snipers are soldiers of opportunity. Patience being a virtue is no truer for anyone than it is for a sniper."
2000305-4 = "Once you have your target, you can't move a centimeter until the enemy enters the line of fire."
2000305-5 = "No matter what temptations or aches you may face!"
2000305-6 = "[s] \"Even if you get hungry?\""
2000305-7 = "Of course. I've had to skip several meals before due to being on a mission."
2000305-8 = "[s] \"I can't even imagine. You're incredible, Mashiro.\""
2000305-9 = "I hardly think so. It simply comes with the territory."
2000305-10 = "I also wouldn't go so far as to call myself \"incredible\"."
2000305-11 = "In fact, there is one thing that tests even my patience when I'm on a mission."
2000305-12 = "[s] \"What is it?\""
2000305-13 = "The, um...bugs."
2000305-14 = "[s] \"Bugs?\""
2000305-15 = "Now that the weather is warmer, there are more bugs on campus and on the roof. They crawl up my arms when I'm in position."
2000305-16 = "It's a creepy feeling, and they affect my aim."
2000305-17 = "[s] \"Can't you shoo them away?\""
2000305-18 = "Of course not! You have to control every action you take when you're in position—even your breathing. A few bugs is no excuse to break concentration."
2000305-19 = "It would be a disgrace to any good sniper!"
2000305-20 = "But I haven't trained myself well enough to not have them bother me."
2000305-21 = "That's why I wanted to ask you for help."
2000305-22 = "[s] \"Me? What can I do?\""
2000305-23 = "I'm going to stand still and try to maintain my composure. I'd like for you to tickle me the way the bugs do."
2000305-24 = "All right. I'm ready whenever."
2000305-25 = "*breathes in*"
2000305-28 = "[s] Tickle Mashiro's arm."
2000305-31 = "This is nothing. It will take more to break my composure."
2000305-32 = "[s] Tickle Mashiro's cheek."
2000305-35 = "Gah. My face? No. An elite sniper would not let this faze her..."
2000305-36 = "[s] Tickle Mashiro's neck."
2000305-39 = "Ahhh! Wh-What are you doing, Sensei?!"
2000305-42 = "You can't just tickle my neck for the sake of training!"
2000305-43 = "I thought...you stood for justice, Sensei!"
2000305-45 = "I spent the better part of the day trying to calm Mashiro down."

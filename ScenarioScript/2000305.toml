[translation]
2000305-1 = "#title;저격수의 시련 1"
2000305-2 = "#place;어느 건물 옥상 위"
2000305-3 = "3;마시로;05;저격은 <기다림의 싸움> 이라는 말이 있을 정도로 저격수에게 있어 가장 필요한 덕목은 <인내>입니다.\n#3;a"
2000305-4 = "3;마시로;99;목표를 고정하고, 사선에 적이 들어오기 전까지 저격수는 절대로 몸을 움직여서는 안 됩니다.\n#3;em;[...]"
2000305-5 = "3;마시로;05;그 어떤 유혹이나, 괴로움이 있더라도, 절대로……!\n#3;closeup\n#fontsize;80"
2000305-6 = "[s] \"배가 고파지더라도?\""
2000305-7 = "3;마시로;05;당연하지요. #n때문에 저격 임무를 수행하다 보면 끼니 때를 놓치는 일이 허다합니다.\n#3;em;[반응]"
2000305-8 = "[s] \"그것 참 힘들겠는 걸. 마시로는 대단하네.\""
2000305-9 = "3;마시로;99;그렇지도 않습니다. #n이는 다른 저격수들도 마찬가지니까요."
2000305-10 = "3;마시로;02;게다가 저도 아직은 완벽하지 않습니다."
2000305-11 = "3;마시로;04;실은 저격을 할 때마다 신경 쓰이는 것이 하나 있어서……\n#3;stiff\n#3;em;[...]"
2000305-12 = "[s] \"신경 쓰이는 것?\""
2000305-13 = "3;마시로;04;그게…… 벌레가……\n#3;em;[속상함]"
2000305-14 = "[s] \"벌레?\""
2000305-15 = "3;마시로;02;날이 더워지면서 교정이나 옥상에 벌레가 늘었는데, 저격 자세를 취하고 있노라면 자꾸 피부 위로 벌레가 슬금슬금 지나가서……"
2000305-16 = "3;마시로;04;……그 소름끼치는 감촉 때문에 자꾸만 조준점이 흐트러지고 맙니다.\n#3;stiff"
2000305-17 = "[s] \"손으로 내쫓으면 안 되는 거야?\""
2000305-18 = "3;마시로;05;당연히 안 됩니다! #n숨을 쉬는 것 조차도 주의해야 하는데, 고작 벌레 때문에 자세를 바꾼다니…….\n#3;hophop"
2000305-19 = "3;마시로;05;저격수에게는 있을 수 없는 일입니다!\n#3;em;[!]"
2000305-20 = "3;마시로;99;으으…… 하지만 이대로 가다가는 제대로 된 훈련을 할 수 없겠지요……"
2000305-21 = "3;마시로;02;그런 의미에서 선생님께서 도와 주시면 어떻겠습니까?\n#3;em;[?]"
2000305-22 = "[s] \"내가? 어떻게?\""
2000305-23 = "3;마시로;00;제가 가만히 서서 평정을 유지하고 있을 테니, 선생님께서 벌레가 날아들었을 때처럼 제게 간지럼을 태우시는 겁니다."
2000305-24 = "3;마시로;01;자, 저는 준비가 되었습니다.\n#3;greeting"
2000305-25 = "3;마시로;99;후우…….\n#3;em;[...]"
2000305-26 = "3;마시로;99\n#3;d\n#wait;1000"
2000305-27 = "3;마시로;01\n#3;a\n#3;closeup\n#wait;1000"
2000305-28 = "[s] 마시로의 팔뚝을 간지럽힌다."
2000305-29 = "#wait;1000"
2000305-30 = "#wait;1000"
2000305-31 = "3;마시로;01;읏…… 이 정도는 예상하고 있었습니다. #n이 정도의 자극으로 제 평정을 깰 수는 없습니다.\n#3;closeup\n#3;stiff"
2000305-32 = "[s] 마시로의 뺨을 간지럽힌다."
2000305-33 = "#wait;800"
2000305-34 = "#wait;800"
2000305-35 = "3;마시로;01;으, 으읏…… 그런 곳까지…… 하, 하지만 괜찮습니다. #n완벽한 저격을 위해서는 이 정도라면……\n#3;closeup\n#3;stiff"
2000305-36 = "[s] 마시로의 목덜미를 간지럽힌다."
2000305-37 = "#wait;600"
2000305-38 = "#wait;600"
2000305-39 = "3;마시로;04;히, 히익?! #n도, 도대체 어디에 손을 대시는 겁니까, 선생님!\n#3;closeup\n#3;shake\n#3;em;[?!]"
2000305-40 = "3;마시로;05\n#3;closeup\n#3;h\n#3;stiff\n#wait;500"
2000305-41 = "3;마시로;05\n#3;h\n#bgshake\n#wait;1500"
2000305-42 = "3;마시로;05;아무리 훈련이라 했지만, 아무 곳이나 만져도 좋다는 뜻은 아니었습니다!\n#3;hophop"
2000305-43 = "3;마시로;05;정말…… 선생님은 언제나 정의의 편이라고 생각했는데!\n#3;em;[속상함]"
2000305-44 = "#all;hide"
2000305-45 = "#na;이후 한동안 화가 난 마시로를 달래 주었다."

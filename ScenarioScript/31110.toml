[translation]
31110-1 = "第11話;大掃除！"
31110-2 = "それではまず、建物周辺の雑草から抜いていきましょう！"
31110-3 = "今日は日差しも強いですし、熱中症には気を付けてくださいね。"
31110-8 = "は～い♪"
31110-9 = "草を、抜く……ま、まあ別に……。"
31110-10 = "なるほど。確かに本陣の周囲で、敵が隠れられそうなポイントから取り除くのは理に適ってる。"
31110-15 = "えっと……と、とにかくまず建物の周りを整えたら、その後はそれぞれ一か所ずつお掃除をしていくという順番でお願いします！"
31110-16 = "さあ、始めましょうか！"
31110-20 = "合宿所周辺の雑草を一通り抜き取り、放置されていたガラクタなどを片付けた。"
31110-22 = "居住区・廊下"
31110-23 = "ここはまず箒でホコリを掃いて、その後にモップが良さそうですね。"
31110-24 = "埃の溜まりやすいところですので、一度では終わらないかもしれませんが……。"
31110-25 = "大丈夫、問題無い。"
31110-26 = "アズサちゃんにはこの廊下が終わったら、シャワー室とお手洗いの辺りをお願いしても良いですか？"
31110-27 = "うん、了解。任せて。"
31110-30 = "掃いて拭いてを何度か繰り返し……"
31110-31 = "他の場所も、順番に掃除を始めていく。"
31110-33 = "合宿所・ロビー"
31110-34 = "けほっ、けほっ……！何ここ、すごいほこり……。"
31110-35 = "そうですね、家具が多いからでしょうか……えっと、ではここも埃を掃いて――"
31110-36 = "やっ、やり方くらい知ってる！正義実現委員会でずっとやってるし！"
31110-37 = "マスクを着けてほこりを払ってから、水拭きすれば良いんでしょ！バカにしないで！"
31110-38 = "ば、バカにしたつもりは無いですよ……？では、ここはコハルちゃんにお任せしますね！"
31110-41 = "ロビーの埃がたちまち掃われていき、家具も綺麗になっていった。"
31110-43 = "えっと、ここは……。"
31110-44 = "ヒフミちゃん、ここは私に任せてください。"
31110-45 = "これから色々とお世話になる場所ですし、きちんとお掃除しておかないとですよね。"
31110-46 = "寝具類は今洗って干しておけば、午後には乾くでしょうし……。"
31110-47 = "他の部屋にもマットレスがあったので、古そうなものは交換して……あとは換気を……。"
31110-48 = "すごい、詳しいですね！ではお願いしますね、ハナコちゃん。"
31110-49 = "うふふ、はい♡"
31110-53 = "合宿所・教室"
31110-56 = "合宿所・体育館"
31110-59 = "合宿所・簡易キッチン兼食堂"
31110-62 = "[ns] \"こんなところかな……？\""
31110-63 = "良いんじゃない？ずいぶんキレイになった気がする。うん、気持ち良い。"
31110-64 = "……うん、悪くない。"
31110-65 = "そうですね、お疲れ様でした！"
31110-69 = "あ、まだ一か所だけ残ってますよ？"
31110-70 = "あれ、そうでしたっけ……？"
31110-71 = "はい、屋外プールが♡"
31110-72 = "ぷ、プール……？あ、そういえばさっき……"
31110-75 = "これは……。"
31110-76 = "だいぶ大きいな、どこから取り掛かれば良いのか……いやそもそも、補習授業に水泳の科目は無かったはずだけど？"
31110-77 = "試験に関係無いなら、別にこのままでも良いじゃん。掃除する必要ある？"
31110-81 = "いえいえ、よく考えてみてください、コハルちゃん。"
31110-82 = "キラキラと輝く水で満たされたプール、楽しい合宿、はしゃぎ回る生徒たち……"
31110-87 = "……楽しくなってきませんか？"
31110-88 = "……！？え、何！？分かんない、何か私に分からない高度な話してる！？"
31110-89 = "ですが確かに、こうして放置されてしまったプールを見ていると……何だか寂しい気持ちになりますね。"
31110-90 = "このサイズだったし、昔はきっと使われていた時期もあったんだろう。元々は、にぎやかな声が響き渡っていた場所なのかもしれない。"
31110-91 = "それでも、こんな風に変わってしまう。「vanitas vanitatum」……それが、この世界の真実。"
31110-95 = "えっと……？"
31110-96 = "古代の言葉ですね、[ruby=vanitas vanitatum]「全ては虚しいものである」[/ruby]……確かに、そうなのかもしれません。"
31110-97 = "……。"
31110-98 = "……アズサちゃん、ヒフミちゃん、コハルちゃん！"
31110-103 = "今から遊びましょう！"
31110-104 = "え、えぇっ！？"
31110-105 = "今から掃除して、プールに水を入れて、みんなで飛び込んだりしましょう！"
31110-106 = "明日からは頑張ってお勉強をし続けないといけませんし、となると今日が最後のチャンスかもしれないじゃないですか。"
31110-107 = "今のうちにここで楽しく遊んでおかないと！途中からはまた別のことで、色々と疲れてしまうかもしれませんし……！"
31110-108 = "さあさあ、早く濡れても良い格好に着替えてきてください！プール掃除を始めましょう！"
31110-109 = "……うん。たとえ全てが虚しいことだとしても、それは今日最善を尽くさない理由にはならない。"
31110-110 = "問題無い、ちゃんと水着も持ってきてる。待ってて。"
31110-115 = "あ、アズサちゃん！？早っ……！？"
31110-116 = "さあヒフミちゃんも！コハルちゃんも早く水着……いえ、何でも良いので濡れても良い格好に！"
31110-117 = "[s] \"何だかハナコの目が怖い……。\""
31110-118 = "うーん、でも確かにここだけ掃除しないのも何だか気持ち悪いですし……私も、着替えてきます！"
31110-119 = "え、えぇっ！？補習授業とは全然関係ないじゃん……うぅ、何で……。"
31110-120 = "ふふっ、コハルちゃん♡"
31110-127 = "わっ、分かった！分かったから！！無言で近寄らないで！"
31110-129 = "……。"
31110-130 = "……。"
31110-131 = "……。"
31110-135 = "さあ、これでびしょびしょになっても構わないということですね♡"
31110-136 = "うん、問題ない。"
31110-137 = "ま、まあ一応……。"
31110-138 = "では、みんなでお掃除を始めましょうか？"
31110-142 = "待て待て待てっ！！"
31110-143 = "コハルちゃん？どうかしましたか？"
31110-144 = "あんた掃除の時は水着でどうして今度は制服なの！？本当にバカなの！？「濡れても良い服」ってあんたが言ったんじゃん！？"
31110-145 = "これが「濡れても良い格好」ですよ？"
31110-146 = "もうあんたが何言ってるか分かんない！制服が濡れても良いの！？"
31110-147 = "コハルちゃん、これは各々の美学の問題かもしれませんが……"
31110-148 = "え、美学……？"
31110-149 = "水着と制服、どちらの方が濡れた時に「良い感じ」になると思いますか？"
31110-150 = "は、はぁっ！？「良い感じ」って何よ！？何の話！？"
31110-151 = "ふふっ、まあ半分は冗談ですよ。ほら、実は中に着てるんです。お小遣いで買ったビキニの水着♡"
31110-152 = "え、え……？"
31110-153 = "先ほどコハルちゃんに「水着の着用禁止」と言われてしまいましたし、確かに学校ではスクール水着の方が鉄板ですが……今日はこれで許していただけませんか？"
31110-154 = "スクール水着は今洗濯中でして、これがダメだとすると私、下に何も……"
31110-155 = "な、何で私に判断を託すのさ……！べっ、別に勝手にすれば良いじゃん……！？"
31110-157 = "うふふ、ではそういうことで♪"
31110-158 = "あらためて、お掃除始めましょうか！"
31110-171 = "見てください、虹ですよ！虹！"
31110-172 = "ひゃっ！？ちょっ、ハナコちゃん冷たいですよぉ！"
31110-173 = "ふふっ、トリニティの湖から引っ張ってきている水みたいですので、そのまま口を開けて飲んでも大丈夫ですよ？"
31110-174 = "ど、どうしてこんなことに……。"
31110-175 = "こちらのブロックは完遂した。続けて速やかにそちらへ向かう。"
31110-177 = "そうしてみんなで掃除を終えた後、プールに水を入れ始めたものの……。"
31110-178 = "想像以上に時間がかかり、プールに水が溜まった頃には、すでに日が暮れてしまった。"
31110-180 = "次回;合宿初日の夜"

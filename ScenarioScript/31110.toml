[translation]
31110-1 = "ตอนที่ 11;ทำความสะอาดครั้งใหญ่"
31110-2 = "เอาล่ะ งั้นเรามาเริ่มจากการกำจัดวัชพืชที่ขึ้นมารกเต็มรอบๆ อาคารกันเลยค่ะ! "
31110-3 = "แดดแรงๆ แบบนี้ระวังเป็นลมแดดด้วยนะคะ"
31110-8 = "ค่า~!"
31110-9 = "ถอนวัชพืชเหรอ... งานกล้วยๆ..."
31110-10 = "เข้าใจแล้ว เราต้องกำจัดจุดที่ศัตรูอาจมาซ่อนตัวอยู่แถวๆ ค่ายด้วย"
31110-15 = "ทำความสะอาดเรื่อยๆ จากรอบอาคารก่อนแล้วค่อยเข้าไปข้างในทีละนิดนะคะ!"
31110-16 = "เอาล่ะ เริ่มได้เลยค่ะ!"
31110-20 = "ทุกคนช่วยกันถอนวัชพืชรอบอาคารแล้วจัดระเบียบของจิปาถะที่ถูกทิ้งไว้เป็นเวลานาน"
31110-22 = "ทางเดินในตึกที่พัก"
31110-23 = "ส่วนทางเดินตรงนี้ เราต้องกวาดฝุ่นออกให้หมดแล้วค่อยเช็ดด้วยผ้าถูพื้นค่ะ "
31110-24 = "นี่เป็นส่วนที่ฝุ่นเยอะที่สุด เราต้องทำซ้ำๆ หลายๆ ครั้งจนสะอาดนะคะ!"
31110-25 = "อื้ม สบายมาก"
31110-26 = "ต่อไปก็ถึงตาของห้องอาบน้ำ ห้องน้ำ และห้องสำหรับซักผ้าค่ะ"
31110-27 = "เข้าใจแล้ว วางใจได้เลย"
31110-30 = "อาซึสะปัดกวาดเช็ดถูทางเดินตึกที่พักจนสะอาด"
31110-31 = "และทำความสะอาดสิ่งอำนวยความสะดวกที่จะได้ใช้ในอนาคต"
31110-33 = "ล็อบบี้ส่วนกลาง อาคารย่อย"
31110-34 = "แค่กๆ แค่กๆ... ตรงนี้ฝุ่นเยอะมากเลย..."
31110-35 = "จริงด้วยค่ะ ที่ล็อบบี้ส่วนกลางมีเฟอร์นิเจอร์เยอะด้วย ถ้าเราไม่ปัดฝุ่นหนาๆ พวกนี้ไปให้หมดล่ะก็..."
31110-36 = "เรื่องแค่นี้ฉันรู้น่า! ตอนอยู่ชมรมทวงความยุติธรรมฉันทำอะไรแบบนี้บ่อยเลยล่ะ!"
31110-37 = "ก็แค่ใช้ไม้ขนไก่ปัดแล้วเอาผ้าขี้ริ้วมาถู! แล้วก็ต้องใส่หน้ากากกันฝุ่นด้วย เพราะมันจะฟุ้งไปทั่วเลย!"
31110-38 = "งั้นฉันจะฝากให้โคฮารุจังดูแลนะคะ!"
31110-41 = "(ปัดฝุ่นในล็อบบี้ส่วนกลางแล้วเช็ดเฟอร์นิเจอร์ทุกซอกทุกมุมจนสะอาด)"
31110-43 = "ส่วนที่นี่..."
31110-44 = "อ๊ะ ฮิฟุมิจัง ตรงนี้เดี๋ยวฉันจัดการเองค่ะ"
31110-45 = "นี่เป็นห้องที่พวกเราต้องใช้ ก็เลยต้องใส่ใจเป็นพิเศษค่ะ"
31110-46 = "ถ้ารีบซักเครื่องนอนตั้งแต่ตอนนี้ ช่วงเย็นๆ ก็น่าจะแห้งทัน ส่วนฟูกเก่าๆ ก็ต้องเอา#nไปเปลี่ยนกับฟูกของห้องอื่นที่ไม่ได้ใช้..."
31110-47 = "การระบายอากาศในห้องนอนก็เป็นเรื่องที่สำคัญมากด้วยค่ะ"
31110-48 = "ค่ะ งั้นฝากด้วยนะคะฮานาโกะจัง"
31110-49 = "อุฮุฮุ ได้เลยค่า♡"
31110-53 = "ห้องเรียนอาคารย่อย"
31110-56 = "โรงยิมอาคารย่อย"
31110-59 = "โรงอาหารที่ใช้ทำอาหารง่ายๆ ได้"
31110-62 = "[ns] \"น่าจะเสร็จแล้วไหม...?\""
31110-63 = "อื้ม เสร็จแล้ว~ ดูสะอาดตาขึ้นเยอะเลย  ฮ่ะฮ่าฮ่า สดชื่นดีจัง"
31110-64 = "อืม... โล่งมากเลย "
31110-65 = "อื้ม เท่านี้ก็น่าจะใช้ได้แล้ว... ขอบคุณทุกคนที่พยายามนะคะ! "
31110-69 = "โอ๊ะ? ฮิฟุมิจัง! ยังมีอีกที่หนึ่งที่ยังไม่ได้ทำนะคะ"
31110-70 = "คะ? ทะ... ที่ไหนเหรอคะ? "
31110-71 = "อุฮุฮุ สระว่ายน้ำกลางแจ้งไงคะ "
31110-72 = "สระ... สระว่ายน้ำกลางแจ้ง...?"
31110-75 = "ที่นี่..."
31110-76 = "แบบว่า... มันกว้างมากจนฉันไม่กล้าแม้แต่จะคิดน่ะ อีกอย่าง... ไม่น่าจะมีการสอบว่ายน้ำ#nในชั้นเรียนเสริมนะ"
31110-77 = "ชะ... ใช่แล้ว! เราไม่ได้จะใช้สระว่ายน้ำสักหน่อย! แล้วต้องไปทำความสะอาดด้วยเหรอ?"
31110-81 = "โอ๊ะ? ถึงจะไม่ได้ใช้ก็เถอะค่ะ#nแต่สิ่งสำคัญคือในสระว่ายน้ำกลางแจ้งมีน้ำหรือเปล่าไม่ใช่เหรอคะ?"
31110-82 = "ลองนึกภาพตามนะคะ แคมป์ฝึกฝนที่สดใสเพราะมีน้ำเต็มสระว่ายน้ำ#nและเหล่านักเรียนสาวที่เที่ยววิ่งเล่นอยู่..."
31110-87 = "แค่นั้นก็ทำให้เรารู้สึกดีขึ้นมาแล้วไม่ใช่เหรอคะ?"
31110-88 = "พะ... พูดอะไรเนี่ย?! ไม่เห็นจะเข้าใจเลย ไม่เก็ทเลยสักนิด!"
31110-89 = "แต่ก็จริงนะ... พอมองไปยังสระที่แห้งขอดเพราะถูกละเลยมาตลอด มันก็รู้สึกเหงาๆ ยังไงไม่รู้..."
31110-90 = "ครั้งหนึ่งที่นี่คงเต็มไปด้วยน้ำและเป็นที่ที่สดชื่น... และตอนนั้นคงมีเสียงหัวเราะสนุกสนาน#nก้องกังวานจากที่นี่ด้วย"
31110-91 = "แต่ก็ช่วยไม่ได้ที่ต้องเจอจุดจบแบบนี้ Vanitas Vanitatum... นี่แหละความจริงของโลกใบนี้"
31110-95 = "อ่า...?"
31110-96 = "[ruby=Vanitas Vanitatum]ว่างเปล่าและไร้ประโยชน์[/ruby]... ใช่ค่ะ มีคำกล่าวโบราณแบบนั้นอยู่..."
31110-97 = "..."
31110-98 = "อื้ม อาซึสะจัง ฮิฟุมิจัง โคฮารุจัง"
31110-103 = "เราไปเล่นน้ำกันเถอะค่ะ! "
31110-104 = "คะ?! อ่า... เอ่อ... ละ... เล่นน้ำเหรอคะ?!"
31110-105 = "ใช่ค่ะ! ใช่แล้วค่ะ! เราจะไปทำความสะอาดสระว่ายน้ำแล้วใส่น้ำให้เต็ม แล้วก็เล่นสนุกด้วยกันค่ะ!"
31110-106 = "ก็เราต้องเริ่มเรียนหนังสือตั้งแต่พรุ่งนี้แล้วไม่ใช่เหรอคะ?#nเพราะฉะนั้นวันนี้คือวันสุดท้ายที่เราจะได้พักผ่อนกันนะคะ"
31110-107 = "ถ้าไม่เล่นสนุกให้สุดเหวี่ยงไปเลยล่ะก็ ต่อไปอาจจะเหนื่อยระหว่างทางก็ได้นะคะ!"
31110-108 = "เอาล่ะ เอาล่ะ! ทุกคนรีบไปเปลี่ยนชุดเป็นชุดว่ายน้ำที่เปียกได้มานะคะ!#nได้เวลาทำความสะอาดสระว่ายน้ำแล้วค่ะ!"
31110-109 = "อื้ม เข้าใจแล้ว ถึงทุกอย่างจะไร้ประโยชน์ แต่เราก็ต้องทำวันนี้ให้ดีที่สุด"
31110-110 = "เมื่อกี๊บอกว่าชุดว่ายน้ำใช่ไหม? ไม่มีปัญหา ฉันเอามาด้วยอยู่แล้ว"
31110-115 = "คะ? อาซึสะจัง... จะไปเอาชุดว่ายน้ำเหรอคะ?!  อ่า... ว้าว..."
31110-116 = "เอาล่ะ เอาล่ะ! ทั้งฮิฟุมิจังแล้วก็โคฮารุจัง... รีบไปใส่ชุดว่ายน้ำ... ไม่สิ ชุดอะไรก็ได้#nที่ถึงเปียกก็ไม่เป็นไรเถอะค่ะ!"
31110-117 = "[s] \"ฮานาโกะมีไหวพริบดีมาก...\""
31110-118 = "ถ้าไม่ทำความสะอาดแค่ที่นี่ที่เดียวมันก็ทะแม่งๆ ยังไงๆ อยู่นี่คะ...#nฉันเองก็จะไปเปลี่ยนชุดเหมือนกันค่ะ!"
31110-119 = "...?! งะ... งั้นเหรอ?! แต่มันไม่เกี่ยวอะไรกับชั้นเรียนเสริมนี่นา..."
31110-120 = "ฮุฮุ โคฮารุจัง♡"
31110-127 = "ขะ... เข้าใจแล้ว! เข้าใจแล้ว!!"
31110-129 = "..."
31110-130 = "..."
31110-131 = "..."
31110-135 = "ว้าวว ทุกคนถึงจะเปียกแต่ก็ไม่มีปัญหาเรื่องเสื้อผ้าเลยนะคะ♡"
31110-136 = "อื้ม สบายมาก"
31110-137 = "อ่ะฮ่ะฮ่า... ถึงจะเป็นชุดว่ายน้ำของโรงเรียนก็เถอะ...#nแต่มันก็เหมาะกับการใส่ทำความสะอาดสระว่ายน้ำ..."
31110-138 = "ฮุฮุฮุ♡ ดีจังเลยค่ะ งั้นเราไปเริ่มทำความสะอาดด้วยกันเลยไหมคะ?"
31110-142 = "เดี๋ยวๆๆๆ หยุดก่อน!!"
31110-143 = "คะ? มีอะไรเหรอคะโคฮารุจัง?"
31110-144 = "แล้วทำไมเธอถึงใส่ชุดนักเรียนอยู่คนเดียวล่ะ?!  ไหนบอกให้ใส่ชุดที่เปียกได้มาไงล่ะ!!"
31110-145 = "ก็ถูกแล้วนี่คะ?"
31110-146 = "อ้าว! แล้วทำไมถึงเป็นชุดนักเรียนล่ะ?!  ทำไมทีนี้ไม่ใส่ชุดว่ายน้ำมาแล้วล่ะ?!"
31110-147 = "อืม... นี่เป็นเรื่องทางสุนทรียศาสตร์แล้วค่ะโคฮารุจัง "
31110-148 = "สุนทรียศาสตร์...?"
31110-149 = "ระหว่างชุดว่ายน้ำกับชุดนักเรียน ชุดอะไรเปียกแล้วรู้สึกดีกว่ากันเหรอคะ?"
31110-150 = "ระ... เรื่องแบบนั้นฉันจะไปรู้ได้ไงล่ะ! แล้วทำไมถึงต้องรู้สึกดีด้วยล่ะ?! แล้วใครกันที่ต้องรู้สึกดี?!"
31110-151 = "ฮุฮุฮุ ฉันล้อเล่นค่ะ ฉันใส่ไว้ข้างในแล้วล่ะ ถึงจะเป็นบิกินีที่เก็บเงินซื้อเองก็เถอะ..."
31110-152 = "หืม...? ถะ... ถ้างั้น..."
31110-153 = "ถ้าอยู่ในโรงเรียนเราต้องใส่ชุดว่ายน้ำที่ถูกระเบียบก็จริง แต่ก็ยอมๆ ให้ฉันหน่อยไม่ได้เหรอคะ?"
31110-154 = "พอดีฉันเพิ่งเอาชุดว่ายน้ำของโรงเรียนไปซัก... ก็เลยมีแค่ชุดนี้ชุดเดียวน่ะค่ะ"
31110-155 = "เอ่อ... คือว่า มันก็... จริงๆ ก็... มะ... มันก็ได้อยู่หรอกนะ..."
31110-157 = "ฮุฮุฮุ ทุกคนพร้อมแล้วใช่ไหมคะ?"
31110-158 = "มาเริ่มทำความสะอาดกันค่ะ!"
31110-171 = "ว้าว ดูสิคะ! สายรุ้งล่ะค่ะ!"
31110-172 = "อ๊ะ?!  ดะ... เดี๋ยวสิคะ มันเย็นนะฮานาโกะจัง!"
31110-173 = "ฮุฮุฮุ เย็นใช่ไหมคะ? น้ำนี้มาจากทะเลสาบแถวๆ ทรีนิตี้ค่ะ สะอาดจนดื่มได้เลยนะคะ!"
31110-174 = "ทะ... ทะ... ทำไมถึงเป็นแบบนี้นะ..."
31110-175 = "ทางนี้ใกล้จะเสร็จแล้ว ฉันจะรีบเร่งให้เลย"
31110-177 = "(ทุกคนช่วยกันทำความสะอาดจนเสร็จแล้วเติมน้ำใส่สระว่ายน้ำ)"
31110-178 = "(แต่กว่าน้ำจะเต็มสระก็ปาเข้าไปถึงกลางดึก)"
31110-180 = "ตอนต่อไป;คืนแรกในแคมป์ฝึกฝน"

[translation]
31110-1 = "Episode 11;Spring Cleaning!"
31110-2 = "Let's start off by clearing the weeds growing around the building! "
31110-3 = "Also, don't forget to hydrate. Heat stroke is no joke."
31110-8 = "Okie dokie!"
31110-9 = "Picking weeds? That shouldn't be too hard."
31110-10 = "Understood. It would be wise to remove the brush around our encampment and give the enemy nowhere to hide."
31110-15 = "We'll move on to cleaning inside once we're done with the grounds around the buildings."
31110-16 = "Let's go, people!"
31110-20 = "We then picked all the weeds surrounding the annex and put away all the junk lying around."
31110-22 = "Dorm Hallway"
31110-23 = "I think we should give this hallway a quick sweep before we pull the mops out. "
31110-24 = "It's one of the most traveled parts of the building, so naturally it's going to get pretty dirty. We'll have to work hard to keep it clean!"
31110-25 = "Roger that."
31110-26 = "Would you mind cleaning the showers, restroom, and laundry room once we're done here too?"
31110-27 = "Of course not. Can do."
31110-30 = "The dorm hallway was then swept and mopped clean."
31110-31 = "Followed closely by the other facilities the girls would eventually use."
31110-33 = "Annex Lobby"
31110-34 = "*cough* *cough* There's so much dust."
31110-35 = "You're right. There's a lot of furniture here, so I'm not surprised it's easy for dust to accumulate. We'll have to do a lot of cleaning to keep it maintained."
31110-36 = "I know that much! I'm used to taking care of rooms like this for the Justice Task Force!"
31110-37 = "Put on a mask, use the duster, and wipe the rest away with a mop! I know how to handle myself!"
31110-38 = "S-Sorry. Okay, I'll leave it in your hands, Koharu."
31110-41 = "Koharu got to dusting every nook and cranny of the lobby."
31110-43 = "This place..."
31110-44 = "Don't worry, Hifumi. I'll take care of the bedroom."
31110-45 = "We'll be spending a lot of time here, so it needs some extra tender love and care."
31110-46 = "The bedding should be dry by this afternoon if we wash and hang it now. And we should replace the old mattresses with unused ones from other rooms."
31110-47 = "Ventilation is also of the utmost importance since we're sleeping here."
31110-48 = "Sounds like you know what you're doing, so I'll trust the bedroom to you, Hanako."
31110-49 = "Heeheehee. Of course. ♥"
31110-53 = "Annex Classroom"
31110-56 = "Annex Gym"
31110-59 = "Cafeteria"
31110-62 = "[ns] \"I think that pretty much covers it.\""
31110-63 = "Yup, we're done! Everything is squeaky clean and feels so much more refreshing."
31110-64 = "Yes. I have to agree. "
31110-65 = "So do I. Thanks for all of your help, everyone! "
31110-69 = "Hold on, Hifumi. It looks like we still missed a spot."
31110-70 = "What? Where? "
31110-71 = "The outdoor pool. "
31110-72 = "O-Oh. Yeah, now that you mention it..."
31110-75 = "This place... "
31110-76 = "...is rather large. It hadn't even crossed my mind that we would need it for our make-up work studies."
31110-77 = "That's because we don't! Why should we have to clean something we're never going to use?!"
31110-81 = "Are you sure? We may not have use for it, but seeing a pool properly filled with water is important regardless."
31110-82 = "Imagine it. Our camp grounds glittering from a full pool, girls running around and playing outside..."
31110-87 = "Wouldn't that image alone lift our spirits?"
31110-88 = "Wh-What are you talking about?! What girls?! You're not making any sense!"
31110-89 = "No, I sorta get it. Seeing it left dry and neglected like this doesn't feel quite right..."
31110-90 = "A pool this size wasn't built to be left empty. At some point it was filled with water and people laughing, enjoying this place as well."
31110-91 = "But this end was inevitable. Vanitas vanitatum. That is the truth of the world."
31110-95 = "Uh...huh."
31110-96 = "Vanitas vanitatum. It's an expression that means the vanity of vanities—all is in vain, in other words. There was an ancient, wise saying like that..."
31110-97 = "..."
31110-98 = "Listen up, Azusa! You too, Hifumi and Koharu!"
31110-103 = "We're going to swim and play in the water together! "
31110-104 = "S-Swim?! And in what water?!"
31110-105 = "Obviously, we're going to clean the pool, fill it up, and jump in!"
31110-106 = "We can start studying tomorrow, can't we? We've worked hard enough today, so let's take some time to relax."
31110-107 = "We're sure to burn out studying if we just keep pushing ourselves!"
31110-108 = "Come on, ladies! It's time to start the pool cleaning. So go get changed and prepare to get wet!"
31110-109 = "Yes. Even if everything is in vain, there's no reason we shouldn't give life our all."
31110-110 = "I also remembered to pack my swimsuit just in case. I'll return shortly."
31110-115 = "Azusa! She's already gone... That's just great."
31110-116 = "Well, don't just stand there! You too, Koharu. Go after her and get changed. It can be your swimsuits or anything. Like I said, as long as you're ready to get wet."
31110-117 = "[s] \"I really don't like the way you keep saying that...\""
31110-118 = "Well, okay. But only because it wouldn't feel right to leave this as the one place we didn't get cleaned."
31110-119 = "Are we really doing this?! It doesn't have anything to do with our make-up work classes. Ugh."
31110-120 = "Don't be like that, Koharu. ♥"
31110-127 = "A-All right already! Just keep out of my personal space!!!"
31110-129 = "..."
31110-130 = "..."
31110-131 = "..."
31110-135 = "I love it! You all did exactly as I asked. ♥"
31110-136 = "Yes. I'm prepared for water activities."
31110-137 = "All we did was put on our school swimsuits. It's pretty standard for cleaning a pool after all..."
31110-138 = "Great! Are we all ready to get down and dirty? ♥"
31110-142 = "Hold on just a minute!"
31110-143 = "What's wrong, Koharu?"
31110-144 = "Why are you the only one still in a school uniform?! You told us to go get changed into something we wouldn't mind getting wet in!"
31110-145 = "Yes. I fail to see the contradiction."
31110-146 = "What are you talking about?! You're still in your uniform! Why is this the ONE time you choose not to put on that stupid swimsuit you always wear?!"
31110-147 = "Hmm. That's difficult to answer. Some people like different things. I suppose you could say this is my...preference. "
31110-148 = "Preference...?"
31110-149 = "What do you think feels better to get wet in? A swimsuit or a schoolgirl uniform?"
31110-150 = "What do you mean \"feels better\"?! And for who?!"
31110-151 = "I'm only teasing you. And I am wearing a swimsuit underneath my uniform. It's a bikini I bought with some spare pocket change."
31110-152 = "Huh? You are...?"
31110-153 = "Don't you remember? You forbade me from wearing my school swimsuit earlier, but I figured this personal one would be a loophole."
31110-154 = "And besides, my school-issued one is already in the laundry, so this is all I have. Think you can let it slide?"
31110-155 = "Wh-Why are you asking me? Do whatever you want..."
31110-157 = "Heehee. Now, then. Is everyone ready?"
31110-158 = "Let's get to cleaning!"
31110-171 = "Look! I can make a rainbow with the hose!"
31110-172 = "Wh-Whoa! Hey, that's cold!"
31110-173 = "That's because this water comes straight from the lake next to Trinity. It should even be clean enough to drink from!"
31110-174 = "Why did we have to do this again...?"
31110-175 = "This section is nearly finished. Advancing soon."
31110-177 = "Everyone finished cleaning the pool and soon began to fill it with water."
31110-178 = "It took longer than expected, and the sun had already set by the time it was finished."
31110-180 = "Next Episode;First Night of Boot Camp"

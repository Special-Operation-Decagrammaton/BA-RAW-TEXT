[translation]
31110-1 = "第11話;大掃除！"
31110-2 = "那麼首先，我們來把建築周邊的雜草拔乾淨吧！"
31110-3 = "今天陽光也很強，請小心不要中暑了哦。"
31110-8 = "是～"
31110-9 = "嗯……只是拔草的話……"
31110-10 = "原來如此。清除敵人在本陣周圍可能的藏身處確實很合理。"
31110-15 = "先把周圍整理好之後，再依序把建築裡面清理乾淨吧，拜託大家了！"
31110-16 = "好，開始吧！"
31110-20 = "（於是一行人便把合宿處周邊的雜草全部拔除，將被放置的雜物收拾乾淨）"
31110-22 = "居住區．走廊"
31110-23 = "這裡可能需要先用掃把掃除灰塵，接著再用拖把拖乾淨呢。"
31110-24 = "因為是容易堆積灰塵的地方，只清理一次是很難清乾淨的！"
31110-25 = "嗯，我知道了。"
31110-26 = "清理完走廊之後，可以再麻煩梓醬打掃淋浴室和洗手間嗎？"
31110-27 = "沒問題，交給我吧。"
31110-30 = "（就這樣重複地進行清掃和擦拭……）"
31110-31 = "（整理接下來要使用的各個設施）"
31110-33 = "合宿處．大廳"
31110-34 = "咳咳，咳咳……！這裡是怎樣，好多灰塵……"
31110-35 = "就是說啊，是因為家具很多的關係嗎……得把這裡的灰塵清理乾淨才行……"
31110-36 = "我，我知道怎麼做！畢竟在實現正義部做過很多次了！"
31110-37 = "戴上口罩除掉灰塵之後，再用濕布擦過就好了吧！不要把我當笨蛋！"
31110-38 = "嗯，那這裡就交給小春醬囉！"
31110-41 = "（大廳的灰塵很快就被掃除，同時也把家具清理乾淨）"
31110-43 = "這裡的話……"
31110-44 = "日步美醬，這裡請交給我吧。"
31110-45 = "畢竟是接下來要使用的地方，必須好好打掃乾淨才行呢。"
31110-46 = "寢具類的東西只要現在洗好拿去曬，應該下午就會乾了……#n而舊的床墊可以拿其他房間裡沒用過的來交換……"
31110-47 = "還有這裡是睡覺的地方，換氣也是很重要的。"
31110-48 = "沒錯！那這裡就拜託你囉，花子醬。"
31110-49 = "唔呵呵，好的♡"
31110-53 = "合宿處．教室"
31110-56 = "合宿處．體育館"
31110-59 = "合宿處．簡易廚房兼食堂"
31110-62 = "[ns]「這樣就差不多了吧……？」"
31110-63 = "嗯～這樣就結束了。#n感覺舒服多了。"
31110-64 = "……嗯，還不錯。"
31110-65 = "是，大家都辛苦了！"
31110-69 = "哎呀，日步美醬，好像還剩下一個地方唷？"
31110-70 = "咦，是嗎……？"
31110-71 = "沒錯，那就是戶外泳池。"
31110-72 = "戶，戶外泳池……？"
31110-75 = "這是……"
31110-76 = "對了，剛才因為太大而暫時擱置了這裡……#n不過補課的內容應該不包含游泳吧？"
31110-77 = "就，就是說啊！既然我們用不到，沒必要特地連這裡都打掃吧？"
31110-81 = "是嗎？我覺得不管用不用的到，戶外泳池裡有沒有放滿水還是很重要的哦。"
31110-82 = "各位試著想像一下……裝滿水的泳池、被水光照亮的宿舍，以及在此嬉鬧的學生……"
31110-87 = "不覺得光是這樣就能讓人感到開心嗎？"
31110-88 = "你，你在說什麼！？什麼意思？完全聽不懂！？"
31110-89 = "也對……看著泳池就這樣被放置而乾涸……總覺得好像有點寂寞。"
31110-90 = "這裡應該也曾經充滿乾淨的水和學生的歡笑聲吧。"
31110-91 = "然而最終還是迎接了這種結局。#n「vanitas vanitatum」……那就是這個世界的真相。"
31110-95 = "那個……？"
31110-96 = "[ruby=vanitas vanitatum]「一切皆為徒勞」[/ruby]……確實有這麼一句古代的格言呢。"
31110-97 = "……"
31110-98 = "……梓醬、日步美醬、小春醬！"
31110-103 = "一起來玩水吧！"
31110-104 = "咦！？玩，玩水！？"
31110-105 = "沒錯！把泳池打掃乾淨，放滿水後一起跳進去吧！"
31110-106 = "我們從明天開始就必須努力念書了不是嗎？#n換句話說，今天就是休息的最後機會。"
31110-107 = "不趁現在好好玩個過癮的話，之後可能就沒體力玩了哦！"
31110-108 = "來來來，大家趕快換上弄濕也沒關係的衣服，開始打掃泳池吧！"
31110-109 = "嗯，我知道了。#n就算一切都是徒勞，今天也該全力以赴。"
31110-110 = "泳裝我也有帶來，沒問題。"
31110-115 = "梓，梓醬！？已經跑去換泳裝了嗎！？啊嗚嗚……"
31110-116 = "來吧來吧！日步美醬和小春醬也快點換上泳裝……不，只要是可以弄濕的服裝都行！"
31110-117 = "[s]「總覺得花子的眼神很可怕……」"
31110-118 = "只有這裡沒掃乾淨的話，確實有種功虧一簣的感覺……我也去換衣服！"
31110-119 = "咦，咦咦！？明明和補課完全沒關係的說……嗚嗚……"
31110-120 = "呵呵，小春醬也一起來吧♡"
31110-127 = "知，知道了！我知道了啦！！"
31110-129 = "……"
31110-130 = "……"
31110-131 = "……"
31110-135 = "嗯，大家都換上弄濕也沒關係的衣服了呢♡"
31110-136 = "嗯，沒問題。"
31110-137 = "啊哈哈……雖然只是普通的學校泳裝……#n不過感覺打掃泳池就得穿這個呢……"
31110-138 = "唔呵呵，真不錯♡#n那麼大家一起開始打掃吧？"
31110-142 = "等等等等等等！！"
31110-143 = "嗯？怎麼了嗎，小春醬？"
31110-144 = "為什麼你穿著制服啊！？#n說要穿「弄濕也沒關係的衣服」的人不是你嗎！？"
31110-145 = "這就是「弄濕也沒關係的衣服」呀？"
31110-146 = "聽不懂你在說什麼！為什麼穿制服啊！？這種時候反而又不穿泳裝了！？"
31110-147 = "嗯……這是個關乎各自美學的問題呢，小春醬。"
31110-148 = "美，美學……？"
31110-149 = "泳裝和制服──你覺得哪邊濕透的感覺更好呢？"
31110-150 = "那，那種事我怎麼會知道！#n而且為什麼選擇的標準是「感覺好」啊！是誰的感覺啦！"
31110-151 = "呵呵，只是開個玩笑而已。#n其實我有穿在裡面哦。是用零用錢買的比基尼♡"
31110-152 = "咦……？這樣啊……"
31110-153 = "雖然在校內規定要穿學校指定的泳裝……今天可以原諒我嗎？"
31110-154 = "因為我的泳裝正在清洗，如果不能穿這個就……"
31110-155 = "如，如果是這樣的話……也，也沒別的辦法了……"
31110-157 = "唔呵呵，那麼大家都準備好了嗎？"
31110-158 = "開始打掃囉！"
31110-171 = "哇～大家看！是彩虹唷！"
31110-172 = "呀啊！？等一下，這樣很冰耶，花子醬──！"
31110-173 = "呵呵，這似乎是從三一附近的湖泊引來的水，#n聽說乾淨到可以直接張開嘴喝也沒關係唷？"
31110-174 = "嗚嗚……為什麼會變成這樣……"
31110-175 = "這邊清乾淨了。看來很快就能搞定。"
31110-177 = "（於是大家一起將泳池清掃乾淨，開始將水注入泳池……）"
31110-178 = "（不過等到泳池裝滿水時，夜幕卻已經降臨）"
31110-180 = "下一話;合宿初日的夜晚"

[translation]
103040-1 = "第4話;位於阿拜多斯的某物（１）"
103040-2 = "坐鎮於天上遙遠彼方的那座要塞，名為「阿特拉哈西斯的方舟」。"
103040-6 = "[ns1]「阿特拉哈西斯的方舟？」\n[ns2]「……是我聽過的名字。」"
103040-9 = "沒錯。不久之前，有著相同名稱的方舟曾在千年顯現。#n雖然你應該已經知道了──"
103040-10 = "它的真面目是──#n被埋葬於這片大地的，奇普托斯古代居民「無名之神」的遺產。"
103040-11 = "也就是……所謂古代文明的造物──可以這麼理解。"
103040-12 = "你們所發現的AL-1S，以及被十字神名駭入前的預言者等等，就是那樣的存在之一。"
103040-13 = "對我們來說，那些都是已經被淘汰的存在，所以稱不上是威脅──"
103040-14 = "沒想到卻落入降臨於奇普托斯的「色彩」手中……"
103040-15 = "「色彩的嚮導者」似乎打算將所有顯現於奇普托斯的「神祕」都據為己有。"
103040-16 = "獲得「阿特拉哈西斯的方舟」或許也是出於相同的理由吧。#n就像透過聖所出現的「十字神名」、「[ruby=Mimesis]複製[/ruby]」、「人造天使」一樣。"
103040-21 = "如果方舟是「無名之神」的遺產，#n那麼目前的奇普托斯就不存在能對抗它的技術。"
103040-25 = "──除了能與方舟匹敵的[ruby=  ・     ・     ・     ・     ・     ・  ]古代文明遺產[/ruby]之外。"
103040-26 = "[ns3]「也就是說，」\n[ns4]「在阿拜多斯的就是……」"
103040-29 = "……沒錯，正如你所說。"
103040-30 = "能對抗「阿特拉哈西斯的方舟」的古代兵器正在那裡沉睡著。"
103040-33 = "那就是我透過凱薩公司在阿拜多斯沙漠尋找的東西──"
103040-34 = "埋藏於奇普托斯地下的「超古代兵器」。#n──以現存的技術無法加以解析的太古的「恐怖」。"
103040-35 = "但是──當時，它並非我感興趣的對象。"
103040-38 = "我當時的目標是與奇普托斯最強大的「神祕」締結契約──#n將其據為己有。"
103040-41 = "對我來說，位於阿拜多斯地下的寶物只不過是不確定的情報罷了──"
103040-42 = "能利用凱薩將其挖掘出來固然不錯──#n但即使沒找到也無所謂，就只是那種程度的存在。"
103040-45 = "然而對凱薩的總裁來說，我的提案相當有魅力吧。"
103040-46 = "能勝過奇普托斯現存任何武力的「超古代兵器」──#n如果能獲得那種東西……"
103040-47 = "自己就能支配奇普托斯──他是這麼認為的。"
103040-50 = "於是他們總算是成功了──完成「超古代兵器」的挖掘。"
103040-53 = "在那之後，總裁便不再猶豫。#n他也許認為只要獲得了那個兵器，就算與奇普托斯所有自治區為敵也不會輸吧。"
103040-54 = "所以才襲擊了聯邦學生會、綁架夏萊的老師──#n咯咯咯，如果事情就這麼發展下去，說不定奇普托斯真的會落入總裁的手中。"
103040-56 = "沒錯──如果當時「虛假的聖所」沒有出現的話。"
103040-59 = "總裁在「聖所之塔」被破壞的瞬間，#n判斷發生了自己無法掌控的狀況，隨即選擇了撤退。"
103040-60 = "以企業家來說這是很明智的判斷。#n畢竟沒有「聖所之塔」是無法使用「超古代兵器」的。"
103040-62 = "沒錯──#n在聖所之塔遭到破壞的現在，沒有人能使用那個「超古代兵器」。"
103040-63 = "除了能與「聖所之塔」匹敵的歐帕茲「[ruby=  ・     ・     ・     ・     ・     ・  ]希迪姆的箱子[/ruby]」的持有者之外。"
103040-67 = "[ns]「………………」"
103040-69 = "[ns]「『超古代兵器』究竟是什麼？」"
103040-70 = "咯咯……請別那麼著急。#n起初，我以為埋在阿拜多斯的也許就是「方舟」。"
103040-71 = "然而那並非方舟……而是與其極度相似的其他存在。"
103040-77 = "沒錯，那是──「船」。"
103040-78 = "與「阿特拉哈西斯的方舟」同樣蘊含奇普托斯起源之名的──「兵器」的最終形態。"
103040-81 = "──「[ruby=Utnapishtim]生命守護者[/ruby]主艦」。"
103040-85 = "沒錯──就是[ruby= ・     ・     ・     ・ ]宇宙戰艦[/ruby]。"
103040-87 = "下一話;位於阿拜多斯的某物（２）"

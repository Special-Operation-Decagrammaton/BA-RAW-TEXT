[translation]
103040-1 = "Episode 4; What's Hidden in Abydos 1"
103040-2 = "The fortress above the sky you seek to board is a kind of Ark of Atrahasis."
103040-6 = "[ns1] \"Ark of Atrahasis?\"\n[ns2] \"...I'm familiar with the name.\""
103040-9 = "Yes. Some time ago, an ark bearing that name appeared for a brief moment in Millennium and then disappeared."
103040-10 = "It's a legacy left behind by the Nameless Gods, the old masters of Kivotos buried deep beneath the earth's strata."
103040-11 = "It's an ancient civilization, so to speak."
103040-12 = "The AL-1S you found, and some prophets prior to being hacked by Decagrammaton, are such legacies."
103040-13 = "We didn't think they would pose a particular threat since they were already culled, but..."
103040-14 = "I would never have thought the Chroma arriving from outside of Kivotos would seek to secure them..."
103040-15 = "It seems as long as it's a mystery that's manifested even once in Kivotos, the Guide of Chroma can make it its own."
103040-16 = "The Ark of Atrahasis must have been secured that way too, like the Chroma Decagrammaton that appeared through the sanctum, the Mimesis, and the artificial angels."
103040-21 = "If that ark is the legacy of the Nameless Gods, there's no technology that can deal with it in Kivotos."
103040-25 = "...Unless you fight fire with fire. You need to acquire the technology of the Nameless Gods for yourself."
103040-26 = "[ns3] \"That means...\"\n[ns4] \"Is that what's in Abydos...?\""
103040-29 = "Correct."
103040-30 = "An ancient weapon capable of dealing with the Ark of Atrahasis waits there."
103040-33 = "That was exactly what I was looking for in the Abydos Desert via the Kaiser Corporation."
103040-34 = "The ancient weapon buried in a stratum of Kivotos, a pre-enlightenment terror that cannot be understood with existing technology..."
103040-35 = "But I wasn't interested in that at the time."
103040-38 = "My goal at the time was to possess the most powerful mystery of Kivotos through a contract."
103040-41 = "Back then, the treasure buried in Abydos was...a fanciful whim."
103040-42 = "It would have been convenient to have found it using Kaiser...but it didn't matter if I didn't. That's how I felt about it."
103040-45 = "But to Kaiser's president...my explanation must have sounded enticing."
103040-46 = "An ancient weapon more powerful than anything in Kivotos... What if something like that came into your possession...?"
103040-47 = "The president thought it'd be possible to rule all of Kivotos."
103040-50 = "And finally...the excavation of the super ancient weapon buried in the Abydos Desert was successful..."
103040-53 = "The president had no reason to hesitate anymore. With that weapon, the president must have felt Kaiser could overtake any and every district in Kivotos."
103040-54 = "So the General Student Council was attacked and Schale's Sensei was kidnapped... *chuckle* If things had gone according to plan, Kivotos truly could have fallen into the hands of the president."
103040-56 = "...But that's when the False Sanctums appeared."
103040-59 = "When Sanctum Tower was destroyed, the cautious president realized he was in over his head and retreated."
103040-60 = "You could say he's a savvy businessman. He knew he'd need Sanctum Tower to use the ancient weapon."
103040-62 = "Since Sanctum Tower has been destroyed, there's no way and no person who can handle the ancient weapon. "
103040-63 = "Except for just one person. The owner of the Shittim Chest, an artifact on par with Sanctum Tower."
103040-67 = "[ns] \"...\""
103040-69 = "[ns] \"What's the ancient weapon?\""
103040-70 = "...At first, I thought what was buried in Abydos could be an ark."
103040-71 = "It wasn't an ark, but something similar. Something just as great."
103040-77 = "...It was a ship."
103040-78 = "The final form of the weapon, which is comparable to the Ark of Atrahasis, is known by a name born from the origins of Kivotos."
103040-81 = "It's Utnapishtim's Ship."
103040-85 = "...An intergalactic battleship."
103040-87 = "Next Episode; What's Hidden in Abydos 2"

103040-76 = "#wait;1000"
103040-77 = "3;검은 양복 부상;01;……그것은 <배>입니다. \n#3;closeup"
103040-78 = "3;검은 양복 부상;01;방주 아트라하시스와 비견되는, 키보토스의 기원이 담긴 이름으로 불리고 있는 <병기>의 최종 형태.\n#3;closeup"

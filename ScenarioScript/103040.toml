[translation]
103040-1 = "#title;제4화;아비도스에 있는 것 1"
103040-2 = "3;검은 양복 부상;01;저 하늘 위에 있는 요새의 정체는 일종의 <아트라하시스의 방주>입니다.\n#3;a"
103040-3 = "#all;hide"
103040-4 = "#wait;600"
103040-5 = "#all;hide"
103040-6 = "[ns1] \"아트라하시스의 방주……?\"\n[ns2] \"……익숙한 이름이야.\""
103040-7 = "#wait;10"
103040-8 = "#wait;10"
103040-9 = "3;검은 양복 부상;01;그렇습니다. 얼마 전에 밀레니엄에서 그 이름을 한 방주가 잠깐 나타났다 사라졌었죠. 잘 알고 계시겠지만…….\n#3;a"
103040-10 = "3;검은 양복 부상;01;그것의 정체는…… 이 땅의 지층 아래 묻혀 있는 키보토스의 옛 주인들인 <이름 없는 신들>이 남긴 유산."
103040-11 = "3;검은 양복 부상;01;그렇군요. 말하자면 고대 문명…… 그런 느낌으로 이해하시면 편하겠군요.\n#3;em;…"
103040-12 = "3;검은 양복 부상;01;당신이 발견한 AL-1S나, 데카그라마톤에게 해킹당하기 전의 몇몇 예언자들이 그러한 존재들입니다."
103040-13 = "3;검은 양복 부상;01;저희는 그들이 이미 도태된 존재이기에 딱히 위협이 될 거라 생각하진 않았습니다만……."
103040-14 = "3;검은 양복 부상;01;설마 키보토스 외부에서 도래하는 <색채>가 그것들을 확보할 줄이야……."
103040-15 = "3;검은 양복 부상;01;그 색채의 인도자는 키보토스에 한 번이라도 현현한 <신비>라면 자신의 것으로 만들어 버리는 것 같습니다."
103040-16 = "3;검은 양복 부상;01;저 <아트라하시스의 방주> 또한 그렇게 확보한 것이겠죠. 성소를 통해 나타난 색채의 데카그라마톤이나, 미메시스, 인공천사들처럼요."
103040-17 = "#st;[0,0];instant;1;"
103040-18 = "#clearST"
103040-19 = "3;검은 양복 부상;01\n#3;em;…\n#wait;2500"
103040-20 = "#all;hide"
103040-21 = "#na;검은 양복 부상;저 방주가 <이름 없는 신들>의 유산이라면, 현재 키보토스에는 저것을 상대할 수 있는 기술은 존재하지 않습니다."
103040-22 = "#st;[0,0];instant;1;"
103040-23 = "#clearST"
103040-24 = "#wait;1500"
103040-25 = "#na;검은 양복 부상;……똑같은 고대 문명의 유산 말고는 말이죠."
103040-26 = "[ns3] \"……그렇다는 건?\"\n[ns4] \"아비도스에 있다는 게 바로……?\""
103040-27 = "#wait;10"
103040-28 = "#wait;10"
103040-29 = "3;검은 양복 부상;01;……네. 그렇습니다."
103040-30 = "3;검은 양복 부상;01;거기에 아트라하시스의 방주를 상대할 수 있는 고대의 병기가 잠들어 있습니다."
103040-31 = "#all;hide"
103040-32 = "#wait;500"
103040-33 = "#na;검은 양복 부상;카이저 코퍼레이션을 통해 제가 아비도스 사막에서 찾고 있었던 것이 바로 그것이었죠."
103040-34 = "#na;검은 양복 부상;키보토스 지층에 묻혀 있는 <초고대 병기>, 현존하는 기술로는 이해할 수 없는 계몽 이전의 공포……"
103040-35 = "#na;검은 양복 부상;하지만 그 당시 저의 관심사는 그것이 아니었습니다."
103040-36 = "#all;hide"
103040-37 = "#wait;500"
103040-38 = "#na;검은 양복 부상;당시의 제 목표는 어디까지나 키보토스의 가장 강력한 신비를 계약으로 소유하는 것."
103040-39 = "1;검은 양복;00\n5;카이저 PMC 이사;00\n#1;a\n#5;a\n#1;h\n#5;h"
103040-40 = "#wait;500"
103040-41 = "#na;검은 양복 부상;그 당시 저에게 아비도스에 묻혀 있는 <보물>은 어디까지나 불확실한 정보일 뿐."
103040-42 = "#na;검은 양복 부상;카이저를 이용해서 그걸 찾을 수 있으면 좋겠지만…… 굳이 아니어도 상관없는, 저에겐 그런 존재일 뿐이었습니다."
103040-43 = "#all;hide"
103040-44 = "3;카이저 프레지던트;00\n#3;a\n#wait;1000"
103040-45 = "#na;검은 양복 부상;하지만 카이저의 프레지던트에게는…… 제 설명이 매력적으로 들렸겠죠."
103040-46 = "#na;검은 양복 부상;키보토스에 현존하는 어떤 무력보다도 강력한 <초고대 병기>…… 그런 게 자신의 손에 들어온다면……."
103040-47 = "#na;검은 양복 부상;자신이 키보토스를 지배할 수 있을 거라고 생각했으니까요."
103040-48 = "#all;hide"
103040-49 = "#wait;500"
103040-50 = "#na;검은 양복 부상;그리고 마침내…… 발굴에 성공한 것입니다. 아비도스의 사막에 묻혀 있는 그 <초고대 병기>를 말이죠……."
103040-51 = "5;PMC 병사 A;00\n1;PMC 병사 A;00\n3;PMC 병사 A;00\n#1;h\n#3;h\n#5;h"
103040-52 = "#wait;500"
103040-53 = "#na;검은 양복 부상;프레지던트는 더 이상 망설일 게 없었을 겁니다. 이게 손에 들어온 이상, 키보토스의 모든 자치구와 싸워도 지지 않을 거라 생각했겠죠."
103040-54 = "#na;검은 양복 부상;그래서 총학생회를 습격하고 샬레의 선생을 납치…… 큭큭. 이대로 갔다면 정말로 키보토스는 프레지던트의 손에 넘어갔을지도 모르겠군요."
103040-55 = "#all;hide"
103040-56 = "#na;검은 양복 부상;……하필 그때 <거짓된 성소>가 나타나지만 않았다면 말이죠."
103040-57 = "#all;hide"
103040-58 = "3;카이저 프레지던트;00\n#3;a\n#wait;1000"
103040-59 = "#na;검은 양복 부상;신중한 프레지던트는 <생텀 타워>가 파괴되자 자신이 이해할 수 없는 상황이 발생했다고 판단, 그 즉시 물러났습니다."
103040-60 = "#na;검은 양복 부상;사업가로서 현명하다고 봐야겠죠. 그 고대 병기를 사용하려면 <생텀 타워>가 있어야 하니까요."
103040-61 = "#all;hide"
103040-62 = "3;검은 양복 부상;01;<생텀 타워>가 파괴된 이상, 그 <초고대 병기>를 다룰 수 있는 자는 현재 아무도 없습니다. \n#3;a"
103040-63 = "3;검은 양복 부상;01;<생텀 타워>에 맞먹는 오파츠 <싯딤의 상자>의 소유자 외엔 말이죠."
103040-64 = "#st;[0,0];instant;1;"
103040-65 = "#clearST"
103040-66 = "#wait;2500"
103040-67 = "[ns] \"……………………………….\""
103040-68 = "#wait;1000"
103040-69 = "[ns] \"그 <초고대 병기>의 정체는 뭐지?\""
103040-70 = "3;검은 양복 부상;01;……저는 처음에 아비도스에 묻혀 있는 게 바로 <방주>일지도 모른다고 생각했습니다."
103040-71 = "3;검은 양복 부상;01;하지만 그 정체는 <방주>가 아닌, 비슷하지만 다른 것이었습니다."
103040-72 = "#st;[0,0];instant;1;"

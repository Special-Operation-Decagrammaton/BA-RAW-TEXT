[translation]
103040-1 = "ตอนที่ 4;สิ่งที่อยู่ในอะบิดอส 1"
103040-2 = "ตัวตนของปราการที่ลอยอยู่บนฟ้านั่นคือ <เรืออะทราฮาซิส> ชนิดหนึ่งครับ"
103040-6 = "[ns1] \"<เรืออะทราฮาซิส>...?\"\n[ns2] \"ชื่อนี้คุ้นๆ...\""
103040-9 = "ใช่ครับ เมื่อไม่นานมานี้ เรือลำที่มีชื่อดังกล่าวได้ปรากฏขึ้นในมิลเลเนียมและหายไปครับ"
103040-10 = "คุณก็อาจจะรู้ดีอยู่แล้วว่ามันคือมรดกที่ทิ้งไว้โดย <ทวยเทพไร้นาม> ที่เป็นเจ้าของคนเก่าของ#nคิโวทอสที่ถูกฝังอยู่ใต้พื้นดินแห่งนี้"
103040-11 = "นั่นสินะครับ ถ้าบอกว่ามัน... เป็นอารยธรรมโบราณก็น่าจะเข้าใจขึ้นง่ายหน่อยนะครับ"
103040-12 = "AL-1S ที่คุณพบ และผู้เลื่อมใสก่อนที่จะถูกเดคาแกรมมาทอนแฮ็กได้ ก็เป็นหนึ่งในอารยธรรมนั้นครับ"
103040-13 = "พวกผมไม่คิดว่าพวกนั้นจะเป็นภัยคุกคาม เพราะพวกเขาถูกคัดกรองออกไปแล้ว......"
103040-14 = "แต่ก็ไม่คิดเลยว่า <สีสัน> จากนอกคิโวทอสจะได้ตัวพวกนั้นไป......"
103040-15 = "ดูเหมือนผู้นำทางสีสันคนนั้นจะทำให้ <ความลึกลับ> ที่เกิดขึ้นในคิโวทอสกลายเป็นของตัวเองนะครับ"
103040-16 = "<เรืออะทราฮาซิส> ก็น่าจะได้มาด้วยวิธีเดียวกัน เหมือนกับเทวทูตประดิษฐ์ มิเมซิส และเดคาแกรมมาทอนของสีสันที่แสดงออกผ่านหอคอยครับ"
103040-21 = "ถ้าเรือนั้นเป็นมรดกของ <ทวยเทพไร้นาม> ตอนนี้ในคิโวทอสก็ไม่มีเทคโนโลยีใดที่สามารถต่อกรกับ#nมันได้ครับ"
103040-25 = "เว้นแต่ว่าจะเป็นมรดกอารยธรรมโบราณเดียวกัน..."
103040-26 = "[ns3] \"...... งั้นก็แปลว่า?\"\n[ns4] \"ที่บอกว่าอยู่ในอะบิดอสก็คือ......?\""
103040-29 = "...... ครับ ใช่ครับ"
103040-30 = "ที่นั่นมีอาวุธโบราณที่สามารถใช้ต่อกรกับเรืออะทราฮาซิสได้ครับ"
103040-33 = "สิ่งที่ผมตามหาในทะเลทรายอะบิดอสผ่านไคเซอร์ คอร์เปอเรชั่นก็คือสิ่งนี้แหละครับ"
103040-34 = "<อาวุธยุทโธปกรณ์โบราณ> ที่ฝังอยู่ใต้คิโวทอส... ความน่ากลัวแห่งยุคดึกดำบรรพ์ที่ไม่อาจตีความ#nได้ด้วยเทคโนโลยีในปัจจุบัน......"
103040-35 = "แต่นี่ไม่ใช่สิ่งที่ผมสนใจในตอนนั้นหรอกนะครับ"
103040-38 = "เป้าหมายของผมในตอนนั้นคือการเป็นเจ้าของความลึกลับที่ทรงพลังที่สุดในคิโวทอส"
103040-41 = "สำหรับผมแล้ว ในตอนนั้น <สมบัติ> ที่ฝังอยู่ในอะบิดอสเป็นเพียงข้อมูลที่ไม่ชัดเจน"
103040-42 = "ผมหวังว่าจะหาสิ่งนั้นผ่านไคเซอร์... แต่ถึงจะไม่เจอก็ไม่เป็นไร ใช่ครับ สิ่งนั้นมันไม่ได้มีค่าสำหรับผม#nเท่าไรน่ะครับ"
103040-45 = "แต่ประธานใหญ่ของไคเซอร์... น่าจะสนใจสิ่งที่ผมอธิบายให้เขาฟังน่ะครับ"
103040-46 = "เพราะเขาคิดว่าหาก <อาวุธยุทโธปกรณ์โบราณ> ที่ทรงพลังยิ่งกว่าอาวุธใดๆ ในคิโวทอส... ได้ตกมาอยู่ในมือของตัวเอง......"
103040-47 = "เขาก็จะครอบครองคิโวทอสได้ยังไงล่ะครับ"
103040-50 = "และในที่สุด... การขุดค้นก็ประสบความสำเร็จ ใช่แล้วครับ มันคือการค้นพบ <อาวุธยุทโธปกรณ์โบราณ> ที่ฝังอยู่ใต้ทะเลทรายอะบิดอส......"
103040-53 = "ประธานใหญ่ไม่มีอะไรให้ลังเลอีกต่อไปครับ เขาคงคิดว่าตราบใดที่ได้สิ่งนี้มาอยู่ในมือ ถึงจะต้องเปิดศึกกับทุกเขตปกครองตนเองในคิโวทอส ตัวเองก็จะไม่มีวันแพ้"
103040-54 = "เขาเลยทำการบุกรุกองค์การนักเรียน และจับตัวครูจากชาเล่ต์มา...... หึหึ หากเป็นแบบนั้น คิโวทอสก็#nอาจจะตกอยู่ในเงื้อมมือของประธานใหญ่ได้จริงๆ นะครับ"
103040-56 = "..... เพียงแต่ตอนนั้น ถ้าหาก <หอคอยแห่งคำลวง> ไม่ปรากฏออกมาเสียก่อนน่ะครับ"
103040-59 = "ทันทีที่ <แซงค์ทัมทาวเวอร์> ถูกทำลาย ประธานใหญ่ก็มองอย่างสุขุมว่านี่ไม่ใช่สถานการณ์ที่เขาจะ#nเข้าใจได้ ก็เลยถอนกำลังกลับไปในทันทีครับ"
103040-60 = "ในฐานะนักธุรกิจก็ถือว่าเป็นการตัดสินใจที่ฉลาดครับ เพราะหากจะใช้งานอาวุธโบราณนั้น ก็ต้องมี <แซงค์ทัมทาวเวอร์> ยังไงล่ะครับ"
103040-62 = "แต่ในเมื่อตอนนี้ <แซงค์ทัมทาวเวอร์> ถูกทำลายไปแล้ว ตอนนี้ก็เลยไม่มีใครที่ควบคุม <อาวุธยุทโธปกรณ์โบราณ> ได้ครับ "
103040-63 = "เว้นแต่ว่าจะเป็นผู้เป็นเจ้าของวัตถุหลงยุคที่เทียบกับ <แซงค์ทัมทาวเวอร์> ได้ครับ"
103040-67 = "[ns] \"......................\""
103040-69 = "[ns] \"อาวุธโบราณนั่นคืออะไรกันแน่?\""
103040-70 = "...... ตอนแรกผมคิดว่ามันอาจจะเป็น <เรือ> ที่ถูกฝังอยู่ใต้อะบิดอสครับ"
103040-71 = "แต่ที่จริงแล้วตัวตนของมันนั้นไม่ใช่ <เรือ> แต่เป็นอะไรที่คล้ายกันน่ะครับ"
103040-77 = "...... มันคือ <ยาน> ครับ "
103040-78 = "รูปแบบสุดท้ายของ <อาวุธ> ที่เทียบเคียงกับเรืออะทราฮาซิสได้ อาวุธที่ถูกเรียกด้วยชื่อที่มีต้นกำเนิด#nของคิโวทอส"
103040-81 = "มันคือ <เรือรบอุตนาพิชทิม>"
103040-85 = "หรือก็คือ... เรือรบอวกาศครับ"
103040-87 = "ตอนต่อไป;สิ่งที่อยู่ในอะบิดอส 2"

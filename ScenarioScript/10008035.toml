[translation]
10008035-3 = "อ๊าาาาาา ดะ...โดนซะ...แล้ว…"
10008035-4 = "ฝะ...ฝันที่ยิ่งใหญ่...ขะ...ของเรา…"
10008035-10 = "ฮึ่ม แม้แต่เจ้าตัวกระจอกพวกนี้ก็วางแผนเอาไว้ด้วยงั้นเหรอ"
10008035-11 = "(พวกแก๊งหมวกกันน็อกก็เล็งตู้บริจาคไว้ด้วยงั้นเหรอ? ว่าแต่เจ้าพวกนี้รู้เส้นทางหนีของพวกไคเทนเจอร์ ได้ยังไงกันนะ...?)"
10008035-12 = "(ดูเหมือนเรื่องนี้จะไม่ง่ายซะแล้วสิ...)"
10008035-13 = "มันจะไม่เป็นอะไรเหรอ? มัวแต่จัดการลูกกระจ๊อกระหว่างทางแบบนี้ พวกไคเทนเจอร์ก็หนีไปไกลแล้วนะ"
10008035-14 = "เฮือก!"
10008035-15 = "นะ...นั่นสิ! ไม่ใช่เวลาที่จะมาชักช้าอยู่นะ! รีบไปกันได้แล้ว! เร็วเข้าเถอะ!"
10008035-17 = "คะ...ค่ะ!"

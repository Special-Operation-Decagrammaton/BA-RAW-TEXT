[translation]
10008025-1 = "第2話;混亂總是突如其來"
10008025-3 = "喂！我聽見有爆炸聲，發生什麼事了！？"
10008025-4 = "啊，打工醬辛苦了～#n這些傢伙啊……"
10008025-8 = "哈哈哈！"
10008025-10 = "那，那是……！？"
10008025-11 = "……看你的反應，果然不是準備好的活動啊。"
10008025-12 = "絕對不是！我從來沒聽過新年英雄秀之類的東西！"
10008025-14 = "那些人是凱坦澤……！"
10008025-15 = "「一旦出現就會將四周化為焦土」的那個！？"
10008025-16 = "為，為什麼會出現在這裡……！？"
10008025-18 = "他們會不會其實是打工醬的夥伴？#n還是那是泳裝蒙面團的新制服？"
10008025-19 = "絕對不是好嗎！？我才不要那種人當夥伴！"
10008025-20 = "還有拜託你忘了那件事吧！那是我的黑歷史啊！！"
10008025-21 = "[s]「凱坦澤……！？」"
10008025-22 = "咦，老師認識他們嗎？"
10008025-23 = "[s1]「不，應該是第一次見到才對……」\n[s2]「BD、技術筆記……！唔，我的頭……！」"
10008025-26 = "哼哈哈哈，有兩把刷子嘛！"
10008025-27 = "Red，小看他們的話會有苦頭吃的哦！"
10008025-28 = "哼，就算那樣也無所謂。"
10008025-29 = "沒錯。"
10008025-30 = "我們的目的並不是戰鬥！"
10008025-31 = "喝啊！"
10008025-44 = "賽，賽錢箱被……！？"
10008025-45 = "……咦？"
10008025-46 = "喂！？"
10008025-48 = "Red，已完成賽錢箱的奪取。#n請反映在績效獎金上。"
10008025-49 = "不愧是你，只要能賺到薪水就很有一手啊！Green！"
10008025-50 = "這樣第一個目標就完成了。"
10008025-51 = "哈哈哈！很好，這些錢就由我們凱坦澤光明正大地使用吧！"
10008025-52 = "這個賽錢箱，我們就收下了！"
10008025-54 = "等一下，你們在做什麼啊！？"
10008025-55 = "那麼，Adios！"
10008025-60 = "[ns3]「賽錢箱……」\n[ns4]「被偷走了……？」"
10008025-63 = "咦咦──────！？"
10008025-64 = "先等一下，這不會是我的責任吧！？#n我不會因此領不到打工費之類的吧！？"
10008025-65 = "咯咯，呵呵呵……！"
10008025-66 = "啊哈哈哈哈！完全搞不懂那些傢伙！#n居然把賽錢箱拿走了，啊哈哈哈哈哈哈！"
10008025-67 = "這是什麼情況……"
10008025-69 = "亞，亞瑠大人！？#n該，該該該該該怎麼辦！？"
10008025-70 = "還能怎麼辦！趕快追上去吧！"
10008025-71 = "沒錯，得把賽錢箱拿回來才行！"
10008025-72 = "唔嗯……"
10008025-73 = "……有必要去追他們嗎？"
10008025-74 = "咦咦！？"
10008025-75 = "反正被偷的是賽錢箱，就算搶回來也不會變成我們的錢。"
10008025-76 = "況且那些傢伙還挺難對付的。#n畢竟是被懸賞通緝的壞蛋，想對抗他們也有一定的風險。"
10008025-77 = "……！無，無所謂！#n反正就算不靠你們，我也會自己想辦法！"
10008025-78 = "我會靠自己的力量解決！不管是阿拜多斯還是這次的事件都一樣！"
10008025-79 = "那我要走了！"
10008025-80 = "[s]「茜香。」"
10008025-81 = "別阻止我，老師！不趕快去的話……！"
10008025-86 = "……我們也一起去。"
10008025-87 = "咦！？"
10008025-88 = "為，為什麼……！？"
10008025-89 = "……佳世子說的確實沒錯。"
10008025-90 = "反正我們已經許完願了，沒必要多此一舉承擔風險。"
10008025-91 = "不過……我們便利屋68什麼時候是會計算利益得失的集團了？"
10008025-92 = "呼……"
10008025-93 = "根本沒有計算的必要。"
10008025-94 = "這只不過是單純的心情問題……"
10008025-96 = "我無法容許我們投的錢才剛過年就被偷走，就這麼簡單！！"
10008025-102 = "嘿……"
10008025-103 = "亞，亞瑠大人……！！"
10008025-104 = "……嘛，我就知道你會這麼說。"
10008025-105 = "他們的逃跑路線我已經大致掌握了。#n現在趕緊追上去的話，應該能在15分鐘內追上。"
10008025-106 = "而且因為老師也在，說不定還能更快。"
10008025-107 = "哼嗯，原來如此～？"
10008025-108 = "佳世子醬，你一開始就知道亞瑠醬會這麼說，所以先調查過了對吧？"
10008025-109 = "……畢竟一直都是這種模式。"
10008025-111 = "雖，雖然有股令人生氣的感覺……"
10008025-112 = "我不會現在就道謝的哦。#n等到拿回賽錢箱，一切都結束再說！"
10008025-113 = "[s]「那麼大家一起追上去吧！」"
10008025-115 = "不，不愧是亞瑠大人！#n這就是真正的不法之徒的作風嗎！我又上了一課……！"
10008025-116 = "嘛，亞瑠醬本來就有衝動的一面嘛～"
10008025-117 = "呵呵……與其說「衝動」，可以形容那是「不法之徒的氣質」嗎？"
10008025-120 = "（拜託公司不要倒閉，拜託公司不要倒閉，拜託公司不要倒閉，#n　拜託公司不要倒閉，拜託公司不要倒閉，拜託公司不要倒閉……！！）"
10008025-125 = "如果沾染「汙穢」的話……？"
10008025-126 = "累積下來的願望就會反噬，引發不得了的事……！"
10008025-129 = "（要是沒有拿回賽錢箱的話，那個願望就會反噬……！）"
10008025-130 = "（絕，絕對，無論如何也要搶回來！！！）"

[translation]
10008025-1 = "ตอนที่ 2; ความสับสนมักเกิดขึ้นอย่างกะทันหัน"
10008025-3 = "อะไรกันเนี่ย?! เหมือนได้ยินเสียงระเบิดเลย เกิดอะไรขึ้นน่ะ?!"
10008025-4 = "เด็กพาร์ทไทม์~ มาพอดีเลย เจ้าพวกนี้น่ะ..."
10008025-8 = "ฮ่าฮ่าฮ่า!"
10008025-10 = "อะ... อะไรเนี่ย...? เจ้าพวกนั้นเป็นใครน่ะ?!"
10008025-11 = "ท่าทางจะไม่ใช่การแสดงที่ผู้จัดงานเตรียมไว้สินะ"
10008025-12 = "โชว์ฮีโร่ในงานเทศกาลปีใหม่เนี่ยนะ?! จะไปมีอะไรแบบนั้นอยู่ในกำหนดการได้ยังไงเล่า?!"
10008025-14 = "เจ้าพวกนั้น... ไคเทนเจอร์นี่นา! "
10008025-15 = "จอมวายร้ายที่แค่ปรากฏตัวขึ้นมาก็ทำให้ที่นั่นมอดไหม้เป็นจุณน่ะเหรอ?"
10008025-16 = "อึก! เกิดอะไรขึ้นกันเนี่ย?!"
10008025-18 = "เจ้าพวกนั้นคือเพื่อนๆ ของเด็กพาร์ทไทม์รึเปล่า? หรือว่านั่นคือชุดคอสตูมใหม่ของกองกำลังหน้ากาก#nมิสึกิอะไรนั่น...?"
10008025-19 = "ไม่ใช่สักหน่อย! ฉันไม่เคยร่วมงานกับเจ้าพวกประหลาดนั่นเลยนะ!"
10008025-20 = "แล้วก็ลืมเรื่องกองกำลังหน้ากากไปซะทีเถอะ! ประวัติด่างพร้อยสุดๆ!"
10008025-21 = "[s] \"เค้าก็บอกอยู่ว่าไคเทนเจอร์นะ...!\""
10008025-22 = "อ๊ะ?! คุณครูรู้จักเจ้าพวกนี้ด้วยเหรอ?"
10008025-23 = "[s1] \"ไม่รู้จักหรอก เพิ่งเคยเห็นนี่ละ\"\n[s2] \"B...BD...! ตะ...ตำราสกิล...! อึก! ปวดหัวจัง!\""
10008025-26 = "อื้มมม! ก็ต้องเป็นแบบนั้นอยู่แล้วสิ! เจ้าพวกจอมวายร้าย!"
10008025-27 = "เรด! ดูแล้วเจ้าพวกนี้จะเป็นคู่ต่อสู้ที่ประมาทไม่ได้เด็ดขาดเลย!"
10008025-28 = "วะฮะฮ่า! ถ้างั้นตอนนี้จะทำยังไงล่ะ?"
10008025-29 = "ไม่เป็นไร!"
10008025-30 = "ถึงยังไงเป้าหมายของพวกเราก็ไม่ใช่การต่อสู้ แต่เป็นอย่างอื่นต่างหาก!"
10008025-31 = "ฮะฮ่า!"
10008025-44 = "ตะ... ตู้บริจาคเงินหายไปแล้ว!"
10008025-45 = "เอ๋...?"
10008025-46 = "ว่าไงนะ?!"
10008025-48 = "เรด ได้ตู้บริจาคมาแล้วค่ะ รบกวนจัดการเรื่องเงินค่าตอบแทนงานพาร์ทไทม์ของเราด้วยค่ะ"
10008025-49 = "โอ้วววว จัดการงานได้รวดเร็วสมกับค่าจ้างจริงๆ เลยนะ กรีน!"
10008025-50 = "เป้าหมายแรกสำเร็จแล้วละ!"
10008025-51 = "ฮะฮะฮ่า! ใช่แล้ว! พวกเรา \"ไคเทนเจอร์\" จะใช้เงินนี้อย่างยุติธรรมเอง!"
10008025-52 = "ตู้บริจาคนี่... พวกเราขอรับไปละนะ!"
10008025-54 = "ห๊าาา?!! ว่าไงนะ?!"
10008025-55 = "ถ้างั้นก็... อาดิโอสสสส!"
10008025-60 = "[ns3] \"กล่องบริจาคเงิน...\"\n[ns4] \"โดนขโมยไปซะแล้ว...\""
10008025-63 = "อะ... อ๊าาาาาา! รอเดี่ยวเซ่!!"
10008025-64 = "วะ... ว่ายังไงนะ?! คงไม่ใช่ว่าฉันต้องรับผิดชอบเรื่องนี้ด้วยใช่ไหมเนี่ย!? แบบนี้ฉันก็ชวดเงินค่าจ้าง#nน่ะสิ?!"
10008025-65 = "ฮะฮะฮ่า ฮ่าฮ่า ฮ่าฮ่าฮ่าฮ่า...!"
10008025-66 = "ฮ่ะฮ่ะฮ่ะฮ่าา! กะ...กล่องเงินหายวับ! หายไปต่อหน้าต่อตาเลย! ฮ่ะฮ่ะฮ่า! อ๊ะ! ขะ...ขำจนปวดท้องแล้ว!"
10008025-67 = "นี่มันเรื่องอะไรกันเนี่ย..."
10008025-69 = "ท่านอารุ ทะ...ทำยังไงดีคะ?!"
10008025-70 = "จะทำยังไงเล่า!! รีบตามไปเดี๋ยวนี้เลยสิ! ตามเจ้าพวกนั้นไป!!"
10008025-71 = "ใช่แล้ว! ต้องไปชิงกล่องบริจาคคืนมา!!"
10008025-72 = "..."
10008025-73 = "อืม... ถึงจะรู้สึกผิดกับพวกอะบิดอสอยู่สักหน่อย แต่เรื่องนี้ไม่เกี่ยวกับพวกเราเลย"
10008025-74 = "ว่าไงนะ?!"
10008025-75 = "สิ่งที่ถูกขโมยไปคือเงินที่บริจาคไปตอนขอพร ถึงจะไปชิงกล่องบริจาคคืนมาได้ แต่สุดท้ายก็ไม่มี#nประโยชน์กับเราอยู่ดี"
10008025-76 = "อีกอย่างเจ้าพวกนั้น ยังเป็นพวกวายร้ายตัวแสบที่ถูกประกาศจับอยู่อีกด้วย พวกเราที่ไม่เกี่ยวข้องอะไร#nคงไม่ต้องเข้าไปเสี่ยงโดยไม่จำเป็นหรอก"
10008025-77 = "ก็ได้...! ถึงยังไงฉันก็ไม่ได้คิดจะพึ่งพวกเธออยู่แล้ว ฉันว่าจะหาทางแก้ไขเองตั้งแต่แรกแล้วละ!"
10008025-78 = "ฉันต้องแก้ไขด้วยตัวเองอยู่แล้ว! ทั้งเรื่องการฟื้นฟูโรงเรียน แล้วก็เรื่องค่าจ้างงานพาร์ทไทม์นี้ด้วย!"
10008025-79 = "ฉันจะตามเจ้าพวกนั้นไป พวกเธอจะทำอะไรก็เชิญ!"
10008025-80 = "[s] \"เซริกะ! รอเดี๋ยวสิ...!\""
10008025-81 = "คุณครูไม่ต้องมาห้ามเลย! ตอนนี้จะเสียเวลาไปแม้แต่วินาทีเดียวก็ไม่ได้แล้ว...!"
10008025-86 = "พวกเราก็จะไปด้วย"
10008025-87 = "หืม?!"
10008025-88 = "อะ...อะไรนะ?!"
10008025-89 = "ใช่แล้ว... ที่หัวหน้าฝ่ายคาโยโกะพูดมาก็ถูก หลังจากใส่เงินลงไปในกล่อง ธุระของพวกเราก็จบลงแล้ว"
10008025-90 = "ไม่ว่ากล่องบริจาคจะถูกขโมยไปหรือไม่ก็ตาม พวกเราไม่มีเหตุผลที่จะต้องเอาตัวเองเข้าไปเสี่ยง#nอันตรายโดยไม่ได้ประโยชน์อะไรเลย"
10008025-91 = "ฮุฮุฮุ... แต่ว่าหน่วยรับจ้างสารพัด 68 ของเราเคลื่อนไหวโดยคิดถึงแต่เรื่องกำไรหรือผลประโยชน์ อย่างเดียวเท่านั้นรึไง?"
10008025-92 = "เฮ้อ..."
10008025-93 = "เพราะงั้นนี่เป็นปัญหาที่เกี่ยวกับเรื่องความรู้สึก"
10008025-94 = "หรือก็คือ..."
10008025-96 = "ฉันยกโทษให้เจ้าพวกนั้นไม่ได้ที่เงินบริจาคของเราถูกขโมยไปตั้งแต่วันแรกของปีใหม่แบบนี้!#nก็แค่เท่านั้นเอง!!"
10008025-102 = "เอ๋..."
10008025-103 = "ทะ...ท่านอารุ...!! "
10008025-104 = "เฮ้อ... คิดแล้วว่าจะต้องพูดแบบนี้ "
10008025-105 = "ถ้าแบกกล่องบริจาคใหญ่ขนาดนั้นหนีไป แสดงว่ามีเส้นทางล่าถอยที่กำหนดเอาไว้แล้ว ถ้ารีบตามไป#nตอนนี้ น่าจะตามทันได้ภายใน 15 นาทีนะ"
10008025-106 = "อีกอย่างคุณครูก็อยู่กับเราด้วย อาจจะย่นระยะเวลาได้อีก"
10008025-107 = "อืมมม~ จริงๆ เลยน้า~ "
10008025-108 = "คาโยโกะจัง คิดตั้งแต่แรกแล้วใช่มั้ยว่าอารุจังจะพูดแบบนี้ก็เลยไปสืบหาเส้นทางมาไว้ล่วงหน้าน่ะ?"
10008025-109 = "ก็นะ... มันก็พล็อตเดิมๆ ไม่ใช่รึไง"
10008025-111 = "ชะ...ชิส์ เอาเถอะ... "
10008025-112 = "เรื่องคำขอบคุณ รอให้ได้กล่องบริจาคคืนมาก่อนก็แล้วกัน!"
10008025-113 = "[s] \"ดีละ! ถ้างั้นก็ไล่ตามไปด้วยกันเลย!\""
10008025-115 = "สะ...สมกับเป็นท่านอารุจริงๆ ค่ะ! นี่คือจิตวิญญาณของพวกวายร้ายสินะคะ! ฉันได้เรียนรู้เพิ่มเติมอีกแล้ว#nละค่ะ!"
10008025-116 = "อืม... อารุจังเป็นพวกของขึ้นง่ายนี่นะ"
10008025-117 = "ฮุฮุ... ไม่ใช่ของขึ้นง่าย แต่ช่วยเรียกว่าเป็นคุณสมบัติของจอมวายร้ายจะดีกว่านะ"
10008025-120 = "(ขอให้ธุรกิจไม่ล้มละลาย! ขอให้ธุรกิจไม่ล่มจมด้วยเถิด! ขอให้ธุรกิจไม่ล้มละลาย ขอให้ไม่ล่มจมด้วยเถอะค่า---!!!)"
10008025-125 = "ถ้ามีสิ่งไม่ดีหรือลางร้ายทำให้กล่องบริจาคเงินมัวหมองก่อนความปรารถนาจะสำเร็จ..."
10008025-126 = "พรที่ขอก็จะกลับตาลปัตรหมดน่ะสิ!"
10008025-129 = "(ถ้าเอากล่องบริจาคคืนมาไม่ได้ ระ...หรือว่า ไม่สิ... ถึงจะเป็นอย่างนั้น...) "
10008025-130 = "(ยะ...ยังไงก็ต้องเอากลับมาให้ได้!!)"

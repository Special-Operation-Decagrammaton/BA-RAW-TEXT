[translation]
10008025-1 = "Episode 2;Confusion Is Always Sudden"
10008025-3 = "Was that an explosion?! What's going on here?!"
10008025-4 = "Hey, Little Miss Part-Timer! You got here at just the right time. So, these weirdos showed up out of nowhere and..."
10008025-8 = "Hahaha!"
10008025-10 = "Who are they supposed to be?!"
10008025-11 = "Huh. So they really aren't part of the event."
10008025-12 = "Of course not! This is is a shrine! Why would we book a sentai group?!"
10008025-14 = "It's the Kaitengers! "
10008025-15 = "You mean that group of ne'er-do-wells that brings trouble with them wherever they go?!"
10008025-16 = "What are THEY doing here?!"
10008025-18 = "So they're not friends of yours or anything? It's not the masked swimsuit gang wearing new costumes?"
10008025-19 = "I said no! I'd never be friends with these weirdos!"
10008025-20 = "And don't bring that up again! Leave it in the past!"
10008025-21 = "[s] \"The Kaitengers!\""
10008025-22 = "Huh? You know them, Sensei?"
10008025-23 = "[s1] \"This should be the first time I've seen them, but...\"\n[s2] \"Training Blu-rays... Tech Notes... Argh! My head!\""
10008025-26 = "Hah! Those villains managed to hold their own!"
10008025-27 = "You mustn't underestimate them, Red!"
10008025-28 = "So, what should we do now?"
10008025-29 = "Don't worry!"
10008025-30 = "We didn't come here to fight. We're here with a different objective!"
10008025-31 = "Hiyah!"
10008025-44 = "The offering box is gone!"
10008025-45 = "Huh?"
10008025-46 = "What?!"
10008025-48 = "Hey, Red. I swiped the box. Make sure to comp this on my time sheet."
10008025-49 = "Job well done, Green! Way to earn that paycheck!"
10008025-50 = "Our first objective is complete!"
10008025-51 = "Hahaha! Yes! We, the Kaitengers, will see to it that this money is used for right and just causes!"
10008025-52 = "This offering box belongs to us now!"
10008025-54 = "What did they just say?!"
10008025-55 = "Adios!"
10008025-60 = "[ns3] \"They took it...\"\n[ns4] \"Did that just happen?\""
10008025-63 = "Noooooo! Wait! "
10008025-64 = "Th-This is bad! I might get held responsible for this! I might not get paid!"
10008025-65 = "Heeheehee..."
10008025-66 = "They got us good! They swiped it right from under our noses!"
10008025-67 = "You've got to be kidding me..."
10008025-69 = "Wh-What should we do, Aru?!"
10008025-70 = "What kind of a question is that?! We go after them, of course!"
10008025-71 = "Right! We have to get the offering box back!"
10008025-72 = "..."
10008025-73 = "Uh. I get why you'd care, but it really doesn't have anything to do with the rest of us."
10008025-74 = "What?!"
10008025-75 = "It's an offering box. Even if we get it back, there's nothing in it for us. The money's not ours."
10008025-76 = "Besides, aren't they wanted criminals or something? What good would confronting them do for a business like ours?"
10008025-77 = "Fine! Who needs you guys anyway?!"
10008025-78 = "I'll deal with this myself! Getting that money back is my responsibility—just like saving Abydos! "
10008025-79 = "I'm outta here!"
10008025-80 = "[s] \"Serika, wait!\""
10008025-81 = "Don't try to stop me, Sensei! There's no time to waste!"
10008025-86 = "We're coming too."
10008025-87 = "Huh?!"
10008025-88 = "Y-You are?!"
10008025-89 = "Kayoko was right. That offering box doesn't concern us now that we've made our offerings. "
10008025-90 = "We have nothing to gain by retrieving stolen property that doesn't belong to us."
10008025-91 = "But...Problem Solver 68 has never been only about gains."
10008025-92 = "*sigh*"
10008025-93 = "This comes down to how we feel in our hearts."
10008025-94 = "And my heart is telling me..."
10008025-96 = "...that I can't overlook that the money we invested was stolen on the first day of the fiscal year! They'll pay for this!"
10008025-102 = "Heh heh."
10008025-103 = "A-Aru! "
10008025-104 = "*sigh* I knew you were gonna say that. "
10008025-105 = "There's only one route I could see them taking while lugging around that huge safe. We should catch up with them in about 15 minutes if we hurry."
10008025-106 = "Maybe even less since we have Sensei with us."
10008025-107 = "Oh, good point! "
10008025-108 = "Say, Kayoko. Did you already analyze their escape route because you knew this is how Aru was going to react?"
10008025-109 = "Well, this is usually how things go."
10008025-111 = "F-Fine. Have it your way. "
10008025-112 = "I'll save the thanks for after we find that offering box!"
10008025-113 = "[s] \"Let the chase begin!\""
10008025-115 = "I should have known Aru would approach this like a true outlaw! I have so much more to learn!"
10008025-116 = "That's one way of looking at it. Another is that Aru always jumps without thinking."
10008025-117 = "Please. Outlaws are meant to be impulsive. It's called instinct."
10008025-120 = "(Please don't let my business fail! Please don't let my business fail! Please don't let my business fail! Please don't let my business fail!)"
10008025-125 = "What if an evil spirit were to pollute those wishes?"
10008025-126 = "It could very well wish that the opposite of everyone else's wishes come true!"
10008025-129 = "(What's going to happen if we don't get that safe back?!) "
10008025-130 = "(W-We have to find them before that happens!)"

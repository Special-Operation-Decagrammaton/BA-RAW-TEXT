[translation]
102110-1 = "ตอนที่ 11;ปฏิบัติการป้องกันเขตปกครองตนเอง - เกเฮนน่า"
102110-2 = "ต่อไปถึงตาพวกเราแล้วค่ะ เตรียมพร้อมเรียบร้อยหรือยังคะ?"
102110-11 = "ค่ะ เราพร้อมเริ่มศึกแล้ว ตอนนี้ขอแค่สั่งมาค่ะ"
102110-12 = "ว่าแต่ อาโกะจัง ประธานหายไปไหนเหรอ?"
102110-13 = "ตอนนี้ท่านประธานฮินะไปร่วมปฏิบัติการโจมตีหอคอยในฐานะตัวแทนของคณะกรรมการวินัยค่ะ"
102110-14 = "ตัวแทนของคณะกรรมการวินัย...? แต่ที่เหลืออยู่นี่กันหมดเลยนะ?"
102110-15 = "ก็เราเอาแต่จะพึ่งพาท่านประธานกันนี่คะ! ให้ท่านประธานแบกทุกอย่างจนคนข้างนอกบอกว่า#nคณะกรรมการวินัยเกเฮนน่าที่ไร้ฮินะ ก็เป็นแค่ฝูงชนกิ๊กก๊อก แถมบอกว่าสู้ยังไงก็ไม่ชนะอีก!"
102110-17 = "อะ... อะไรกัน? ฉันแค่ถามว่าประธานไปไหนเองนะ...?"
102110-18 = "ก็เอาแต่ทำตัวน่ารำคาญแบบนี้ ท่านประธานก็เลยพลอยประสาทเสียไปด้วยไงคะ! ครั้งนี้ฉันจะ#nพิสูจน์ให้ทุกๆ คนเห็นเลยค่ะว่าเราไม่ใช่แค่ฝูงชนต๊อกต๋อย อิโอริก็ด้วยนะคะ เข้าใจไหม?"
102110-19 = "อึ๋ย... "
102110-20 = "(นั่นไม่ใช่เพราะเราอ่อนกันสักหน่อย ท่านประธานต่างหากล่ะคะที่เก่งเกินไป)"
102110-21 = "เฮ้อ... ว่าแต่ในสถานการณ์แบบนี้ ประธานมาโคโตะแห่งแพนเดโมเนียม โซไซตี้ไปทำอะไรอยู่นะคะ?"
102110-29 = "ฮุฮุฮุ... ลำบากกันมากเลยสินะ คณะกรรมการวินัย"
102110-30 = "คะ... คุณคือ... ซัตสึกิแห่งแพนเดโมเนียม โซไซตี้?"
102110-31 = "เจ้าพวกนั้น..."
102110-32 = "เอาละๆ ตั้งสติก่อน"
102110-33 = "เราไม่ควรจะมาสู้กันในสถานการณ์แบบนี้สิ?"
102110-35 = "อึก... "
102110-36 = "แพนเดโมเนียม โซไซตี้มัวไปทำอะไรอยู่ ทำไมเพิ่งมาเอาป่านนี้คะ? แล้วประธานมาโคโตะล่ะคะ? "
102110-37 = "อื้อ มาโคโตะจังไม่อยู่น่ะ พอดีมีเรื่องสำคัญมากๆ ต้องไปทำ ก็นะ ไม่ต้องไปใส่ใจหรอก"
102110-38 = "นี่พวกคุณ... มีแผนจะทำอะไรกันอีกคะ? จะขัดขวางอะไรหรือเปล่า...?"
102110-39 = "เฮ้อ เชื่อเขาเลย... เห็นพวกฉันเป็นอะไรกันไม่ทราบ? เรื่องสำคัญที่สุดของพวกเราแพนเดโมเนียม โซไซตี้จะเป็นอะไรไปได้ล่ะ?"
102110-40 = "ใช้ชีวิตเรื่อยเปื่อยไปวันๆ...?"
102110-41 = "การเป็นผู้มีอำนาจต่างหากเล่า! ที่ผ่านมาพวกเราพยายามอย่างเต็มที่เพื่อความปลอดภัยของนักเรียน#nเกเฮนน่านะ!"
102110-42 = "...... พูดอะไรเหลวไหลอีกแล้ว..."
102110-44 = "เป็นความจริงค่ะ"
102110-45 = "หัวหน้าเซนะ...?"
102110-47 = "ซัตสึกิกับสมาชิกแพนเดโมเนียม โซไซตี้คนอื่นช่วยทำให้พวกนักเรียนมายังที่หลบภัยกันค่ะ ถือว่าช่วยประหยัดเวลาไว้ได้เยอะเลยค่ะ"
102110-48 = "แต่ว่า วิธีที่ใช้มันค่อนข้าง..."
102110-50 = "คิราระจัง เมื่อกี้เห็นหรือเปล่า? อันนั้นน่ะ"
102110-51 = "อื้ม ที่เอาด้ายไปห้อยกับเหรียญแล้วแกว่งไปมาน่ะเหรอ? เพิ่งเคยเห็นเป็นครั้งแรกเลย นั่นเรียกว่าการ#nสะกดจิตใช่ไหม?"
102110-52 = "ฮ่าฮ่าฮ่าฮ่าฮ่า อื้ม น่าจะทำนองนั้น ตลกมากเลยละ ถึงจะไม่ได้ประโยชน์อะไรเลยก็เถอะ"
102110-53 = "ฮุฮุฮุ ฉันสนุกก็เลยตามมาน่ะ"
102110-55 = "สะกดจิตเหรอ...? ใช้คำลึกลับแปลกๆ อะไรอีกแล้ว..."
102110-56 = "ลึกลับอะไรกันล่ะ นี่มันวิทยาศาสตร์ต่างหาก มันเป็นโปรเจกต์อัลตร้า NK ของฉันเลยนะ!"
102110-57 = "เอาเถอะ ตอนนี้พวกเธออาจจะยังไม่เข้าใจ ฮุฮุฮุ... แต่ถ้ามันสมบูรณ์เมื่อไหร่ละก็... ทุกคนก็จะ..."
102110-58 = "พอๆ เลิกพูดอะไรไร้สาระได้แล้ว!"
102110-62 = "...สรุปว่าเหตุผลที่แพนเดโมเนียม โซไซตี้มาที่นี่ ก็เพื่อจะมาต่อสู้เคียงบ่าเคียงไหล่พวกเรา ถูกไหมคะ?"
102110-63 = "อะฮ่าฮ่าฮ่า! ไม่มีทางซะหรอก พวกฉันแค่เดินผ่านมา ก็เลยแวะมาให้กำลังใจก็เท่านั้นน่ะ"
102110-72 = "เอาละ รู้สึกเหมือนจะแข็งแกร่งขึ้นแล้ว~ แล้วก็รู้สึกอยากจงรักภักดีกับแพนเดโมเนียม โซไซตี้ด้วย~"
102110-76 = "เอาละ~ เอาละ~"
102110-85 = "ชิ... ไม่ได้ผลเหรอเนี่ย"
102110-86 = "เฮ้อ..."
102110-90 = "เริ่มปฏิบัติการปกป้องเขตปกครองตนเองเกเฮนน่าค่ะ"

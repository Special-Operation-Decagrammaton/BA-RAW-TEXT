[translation]
102110-1 = "第11話;「格黑娜」自治區防衛"
102110-2 = "輪到我們了呢。#n大家，都準備好了嗎？"
102110-11 = "是。隨時都能開始。"
102110-12 = "話說亞子醬，委員長在哪裡？"
102110-13 = "陽奈委員長正以風紀委員會代表的身分，參加聖所攻略戰。"
102110-14 = "風紀委員會的代表……？#n什麼意思？大家都在這裡不是嗎？"
102110-15 = "就是因為你們總是依賴委員長，風紀委員才會被說是一群烏合之眾，只要委員長不在根本不足為懼的哦！"
102110-17 = "咦，咦？那個……我只是想知道委員長在哪裡而已……"
102110-18 = "就是因為你們每次都這樣撒嬌，委員長才會嫌麻煩的！#n這次一定要證明我們不是一群烏合之眾。知道了嗎，伊織！"
102110-19 = "嗯，嗯……"
102110-20 = "（……會有那種印象，一定不是因為我們很弱，而是委員長太強的關係吧）"
102110-21 = "唉……話說回來，現在明明是這種情況，萬魔殿的真琴議長到底在做什麼呢……？"
102110-29 = "唔呵呵……風紀委員會的各位，還真是辛苦你們了。"
102110-30 = "你，你是……萬魔殿的皐月議員？"
102110-31 = "你這傢伙……"
102110-32 = "哎呀哎呀～先冷靜點吧？"
102110-33 = "在這種時候起爭議，也只會造成你們的困擾吧？"
102110-35 = "唔……"
102110-36 = "萬魔殿至今為止都在做什麼呢？#n還有，真琴議長人呢？"
102110-37 = "真琴醬他啊，有件有～點重要的事要處理。#n嘛，請別在意。"
102110-38 = "……你們又有什麼企圖了是嗎？#n這次又想策畫什麼──！"
102110-39 = "你就饒了我吧。你把我們當成什麼了？#n對萬魔殿來說最重要是什麼，你知道嗎？"
102110-40 = "不就是尸位素餐嗎……？"
102110-41 = "唉……是「選民」唷。#n即使是現在，我們也在為了格黑娜的學生們努力哦？"
102110-42 = "你在開什麼玩笑──"
102110-44 = "行政官，那是事實。"
102110-45 = "瀬奈部長……？"
102110-47 = "皐月議員與萬魔殿的各位，將市民引導到了避難所。#n我們也因而得以節省引導避難的時間。"
102110-48 = "雖然方法有點奇妙就是了──"
102110-50 = "綺羅羅醬，你剛剛有看見那個嗎？"
102110-51 = "你是說用線綁著硬幣晃來晃去的傢伙對吧？#n我還是第一次見到～！那是催眠術對吧？"
102110-52 = "沒錯沒錯！那根本完全沒有意義。真是笑死我了。"
102110-53 = "啊哈哈！只是因為覺得很有趣才配合他而已～"
102110-55 = "……催眠？這次又是什麼超自然的東西……"
102110-56 = "我的NK-ULTRA計畫才不是什麼超自然，是科學啊！#n唉，所以我才討厭外行人。"
102110-57 = "算了，現在的你們是難以理解的吧，啊哈……！#n但是等到完成的時候──"
102110-58 = "閒聊就不必了。"
102110-62 = "所以呢……萬魔殿之所以來這裡──#n是願意協助我們的意思嗎？"
102110-63 = "啊哈！那怎麼可能呢。只是剛好路過就來幫你們加油而已唷。"
102110-72 = "你們會覺得自己變得越來越強～#n會想對萬魔殿宣誓效忠～"
102110-76 = "看招……！"
102110-85 = "……哼。看來沒有效果呢。"
102110-86 = "唉……"
102110-90 = "格黑娜自治區防禦戰，現在開始。"

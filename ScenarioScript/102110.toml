[translation]
102110-1 = "Episode 11; District Defense Operation - Gehenna"
102110-2 = "It's our turn now. Has everyone prepared themselves?"
102110-11 = "Waiting on your command, operations manager."
102110-12 = "Ako, is the president not fighting with us?"
102110-13 = "President Hina joined the assault team as a representative of the Prefect Team."
102110-14 = "A representative of the Prefect Team? But we're all here..."
102110-15 = "We rely on the president too much! This is exactly why people say that the Gehenna Prefect Team is nothing without Hina!"
102110-17 = "Wh-What? I was just wondering where she went!"
102110-18 = "The president doesn't want us to bother her! We're going to prove to her we're capable without her. Got that, Iori?!"
102110-19 = "*sigh*"
102110-20 = "(...People only think that because the president is so ridiculously strong, not because we're weak.)"
102110-21 = "*sigh* ...What's Chair Makoto of the Pandemonium Society doing in a situation like this?"
102110-29 = "Heeheehee. You're working hard, Prefect Team."
102110-30 = "Y-You're...Satsuki of the Pandemonium Society?"
102110-31 = "You bastards..."
102110-32 = "Now, now. Let's all calm down."
102110-33 = "Fighting here will only cause everyone more trouble in a situation like this, won't it?"
102110-35 = "Tch."
102110-36 = "What took the Pandemonium Society so long? Where's Chair Makoto?"
102110-37 = "Makoto is away on a very important matter. Don't worry about her."
102110-38 = "...What are you up to now? What are you sabotaging?!"
102110-39 = "Is that truly how you view us? C'mon, let's use our brains. What do you think the most important thing is to the Pandemonium Society?"
102110-40 = "An idle life...?"
102110-41 = "It's the voters! We've been working hard to keep the Gehenna students safe!"
102110-42 = "...Th-That's ridiculous."
102110-44 = "It's true, Administrator."
102110-45 = "President Sena...?"
102110-47 = "Satsuki and the Pandemonium Society members led the students to the shelter. We were able to evacuate quickly thanks to their work."
102110-48 = "But their methods were a bit..."
102110-50 = "Kirara, did you see me earlier?"
102110-51 = "Yeah! The coin dangling on the thread? It was my first time seeing that in person. That's how hypnosis works, right?"
102110-52 = "Yeah, I think so. It was even funnier because it didn't work at all."
102110-53 = "Heeheehee. Anyway, I followed along because it was fun."
102110-55 = "...Hypnosis? Another strange occult word..."
102110-56 = "It's not occult! My NK Ultra project is pure science!"
102110-57 = "Well, I guess you don't understand yet. Heehee. But when it's completed, everyone who scoffed at me will..."
102110-58 = "We don't have time for this nonsense!"
102110-62 = "So why is the Pandemonium Society here? Are you picking a fight?"
102110-63 = "Hahaha! No way. We were just passing by and came to cheer you on."
102110-72 = "You feel like you're stronger now...and you sense a strong urge to be loyal to the Pandemonium Society..."
102110-76 = "And with a snap of my fingers...!"
102110-85 = "...Hmph. I guess it didn't work."
102110-86 = "*sigh*"
102110-90 = "The Gehenna district defense battle has begun."

[translation]
10034150-1 = "4 Days Ago: The Club's Identity"
10034150-3 = "...I'm hungry."
10034150-4 = "How are you hungry when you just got here? We haven't even started yet."
10034150-5 = "I'm hungry when I'm hungry. Is there a time and place to be hungry?"
10034150-6 = "There ought to be, around here..."
10034150-10 = "It's a fair point. Since our training began, our fuel intake has been...less than ideal."
10034150-11 = "Just as a car needs oil and gasoline, so too do we need sustenance."
10034150-12 = "Hard as we train, we mustn't forget what our club stands for."
10034150-13 = "I don't think our club's identity is on the line here..."
10034150-14 = "You eat everywhere else you go. It's like you forget that whenever you're here, or pretend to."
10034150-15 = "And I think we know why..."
10034150-20 = "Ahaha..."
10034150-21 = "...Maybe we could all have a snack while we practice today."

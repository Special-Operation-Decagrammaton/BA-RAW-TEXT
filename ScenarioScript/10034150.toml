[translation]
10034150-1 = "[D-4]: ตัวตนของชมรม"
10034150-3 = "หิวจัง..."
10034150-4 = "เพิ่งจะมาถึงเอง หิวแล้วเหรอเนี่ย... เรายังไม่ได้เริ่มซ้อมกันเลยนะ"
10034150-5 = "ความหิวคือการเรียกร้องของกระเพาะนะ เรื่องแบบนี้มีการกำหนดเวลากับสถานที่ด้วยรึไง?"
10034150-6 = "ตอนนี้เราควรจะซ้อมกันก่อนรึเปล่า..."
10034150-10 = "แต่ต้องยอมรับว่าหมู่นี้เราเอาแต่จดจ่อกับการฝึกซ้อมจนขาดแหล่งพลังงานนะ"
10034150-11 = "พวกเราก็เหมือนรถยนต์นั่นแหละ เราก็ต้องการน้ำมันเครื่องให้เคลื่อนไหวได้ดีเหมือนกัน"
10034150-12 = "ต่อให้เป็นช่วงที่ต้องซ้อมอย่างเอาเป็นเอาตาย แต่เราก็จะลืมตัวตนของชมรมเราไม่ได้สิ"
10034150-13 = "เชื่อมโยงเก่ง... ฉันไม่ว่าต้องถึงกับต้องเอาเรื่องตัวตนชมรมมาอ้างก็ได้นะ"
10034150-14 = "แหม แต่ตอนซ้อมก็เห็นกินอยู่ตลอดไม่ใช่เหรอ ทำมาพูดเหมือนจำไม่ได้งั้นแหละ"
10034150-15 = "ก็เป็นซะอย่างนี้อยู่เรื่อย..."
10034150-20 = "อะฮ่าฮ่า..."
10034150-21 = "งั้นวันนี้เรากินไปด้วยซ้อมไปด้วยมั้ย?"

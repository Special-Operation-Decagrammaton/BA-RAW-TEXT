[translation]
10034150-1 = "4天前：社團的本質"
10034150-3 = "……肚子餓了。"
10034150-4 = "你怎麼一來就喊餓啊……都還沒開始練習耶。"
10034150-5 = "餓了就是餓了啊，難道餓還有分時間場合嗎？"
10034150-6 = "現在就稍微忍一下吧……"
10034150-10 = "不過最近確實太過專注於練習，有點缺乏補給。"
10034150-11 = "就像車子需要有燃料才能跑一樣，我們也需要一些潤滑劑才行。"
10034150-12 = "總不能因為現在是密集訓練期間，就忘了我們社團的本質吧？"
10034150-13 = "我是覺得沒有嚴重到這種程度啦。"
10034150-14 = "不對啊，你們平時沒練習的時候不也一直吃個不停嗎？怎麼裝作沒這回事一樣？"
10034150-15 = "每次都……"
10034150-20 = "啊哈哈……"
10034150-21 = "……那我們今天就邊吃邊練習吧。"

10034150-3 = "3;요시미 밴드;99;……출출한데.\n#3;em;…\n#3;a"
10034150-4 = "3;요시미 밴드;99\n4;카즈사 밴드;02;어떻게 오자마자 출출할 수가 있냐……. 아직 시작도 안 했잖아.\n#4;em;[땀]\n#4;a\n#3;m2"
10034150-5 = "3;요시미 밴드;01;출출한 건 출출한 거지, 출출한 데에 때와 장소가 있어?\n#3;em;[빠직]"
10034150-6 = "4;카즈사 밴드;04;지금은 좀 있어야 하지 않을까……."
10034150-7 = "#st;[0,0];instant;1;"
10034150-8 = "#clearST"
10034150-9 = "3;요시미 밴드;01\n4;카즈사 밴드;04\n#3;d\n#4;d\n#wait;1500"
10034150-10 = "3;나츠 밴드;99;하지만 최근 수련에 집중하느라 연료 공급이 적었던 것은 또한 사실.\n#3;a"
10034150-11 = "3;나츠 밴드;05;차가 달리기 위해서도 엔진오일이 필요하듯, 우리에게도 윤활유 정도는 있어야 하겠지.\n#3;em;[반짝]"
10034150-12 = "3;나츠 밴드;02;아무리 맹훈련 기간이라지만, 동아리의 정체성까지 잃지는 말아야 하지 않겠어?"
10034150-13 = "3;요시미 밴드;08;정체성까지 끌고 올 정도의 일은 아니라고 생각하는데.\n#3;em;[땀]"
10034150-14 = "3;카즈사 밴드;04;아니, 연습 안 할 때는 줄 창 먹어대고 있잖아. 왜 기억 못 한다는 듯이 구는 거냐고.\n#3;em;[세로선]"
10034150-15 = "3;카즈사 밴드;05;맨날 그런 식이니까……."
10034150-16 = "#st;[0,0];instant;1;"

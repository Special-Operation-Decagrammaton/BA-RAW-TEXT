[translation]
2402-1 = "拍攝修行部的介紹影片吧！（２）"
2402-2 = "那個，相機的測試測試……"
2402-3 = "順便麥克風也測試～！看得清楚聽得清楚嗎～？"
2402-4 = "嗯，似乎OK！那就，開始介紹哦！"
2402-7 = "這裡是修行部常常活動的地方，百鬼夜行的小熊貓川！"
2402-8 = "之所以來這裡不為別的……"
2402-9 = "就是為了介紹我們修行部的部長，椿前輩的活動！"
2402-10 = "她常常在這裡修行的……啊，剛說完就找到了！"
2402-13 = "呼，呼……"
2402-15 = "我來介紹！"
2402-16 = "這位是春日椿前輩！百鬼夜行學園的2年級16歲！擔任修行部的部長，人稱「睡美人」！"
2402-17 = "要說椿前輩有多麼厲害的話……"
2402-18 = "嗯？"
2402-20 = "啊，椿前輩的身邊有隻貓……"
2402-22 = "又來了一隻！？"
2402-24 = "啊，連不知哪來的狗也……呃，還有兔子、鴿子，連鹿也！？"
2402-25 = "好像越來越多了！？"
2402-26 = "原來如此，大家肯定是被椿前輩美麗的睡姿給魅惑了！"
2402-27 = "呼，呼……"
2402-28 = "明明聚集了那麼多的動物，也毫無所動繼續睡眠的椿前輩……！"
2402-29 = "這個無論何時都不為所動的身姿，正是出色淑女的典範！"
2402-30 = "好～，我也不能輸！"
2402-31 = "作為夢想著成為出色淑女，修行部的可愛吉祥物！要向椿前輩學習進行修行……！"
2402-32 = "那麼那麼，稍微失禮了～"
2402-38 = "原來如此……"
2402-39 = "這就是，椿前輩所看見的景色……"
2402-40 = "像這樣睡覺，肯定，會有什麼厲害的效果不會錯。"
2402-41 = "雖然我還不清楚，不過只要這麼做一定可以成為出色的淑女……！"
2402-42 = "那麼，我也要正式的像椿前輩一樣睡……"
2402-44 = "……"
2402-47 = "呀！？等，很癢啦～！"
2402-48 = "等，不要那樣舔～！會睡不著啦～！？"
2402-49 = "呃嗯，啊啊真是！"
2402-51 = "真是的～！"
2402-52 = "你看，要舔的話這裡有椿前輩可以舔呀！"
2402-56 = "嗯嗯……？"
2402-57 = "嗯，真是個好修行！那麼去下一個吧～！"
2402-61 = "嗯，嗯嗯～……？"
2402-63 = "那麼下一個要介紹的是，既是我們修行部的副部長，"
2402-64 = "也是個無論由誰來看都是美麗淑女典範的，三森前輩唷！"
2402-65 = "雖然這個時間的話，三森前輩都在做晚飯……"
2402-66 = "啊啦，楓醬。怎麼了嗎？"
2402-67 = "啊，三森前輩！"
2402-68 = "那個，是相機……嗎？"
2402-69 = "嗯！我在拍修行部平常的樣子！"
2402-70 = "修行部的日常……？ "
2402-71 = "雖然不太清楚，不過這也是楓醬修行的一環吧？"
2402-72 = "沒錯！藉此成為出色的淑女，將陰陽部打倒！"
2402-73 = "那個，原來如此……？"
2402-74 = "總之，我會幫妳加油哦。順帶一提今天的晚飯是咖哩唷。"
2402-75 = "要在晚餐時間前回來社辦哦？"
2402-76 = "嗯，我知道了！我很期待咖哩！"
2402-78 = "看到了嗎看到了嗎？三森前輩是修行部的副部長，從我們的用餐開始，在各方面都有照顧到我們。"
2402-79 = "這樣的三森前輩的夢想是「出色的大和撫子」，然後是成為「美麗的新娘」！雖然是和我很像又不一樣的夢想，不過也在為此修行！"
2402-80 = "三前輩也是，不輸給椿前輩出色的淑女……"
2402-81 = "我也不能輸。為了成為像三森前輩一樣，必須進行和三森前輩一樣的修行……！"
2402-82 = "……啊！我想到好方法了！"
2402-85 = "三森前輩做的咖哩，味道好香！"
2402-86 = "稍微嚐嚐看……舔。"
2402-88 = "──！好好吃！"
2402-89 = "不過，只是吃了三森前輩做的料理，並不能變得和前輩一樣……！"
2402-90 = "所以，畫面前的大家！仔細看好了！"
2402-91 = "為了變得和三森前輩一樣……我從現在開始，要將咖哩改造變得更好吃！"
2402-92 = "雖然現在這樣就很好吃了，不過用我的力量變得更好吃的話……！"
2402-94 = "楓醬，好厲害！比我自己做的時候，變得更美味了！"
2402-95 = "好厲害呢～。楓，再來一碗～"
2402-97 = "欸嘿，欸嘿嘿嘿……！"
2402-98 = "嗯，我想想～……雖然好吃，不過總覺得有點不夠甜！"
2402-99 = "那就稍微加一點砂糖……"
2402-103 = "唔哇哇，蓋子它！？加了好多！？"
2402-104 = "怎，怎麼辦……！"
2402-105 = "啊！"
2402-106 = "要中和甜味的話就是……鹽！"
2402-107 = "卡牌遊戲也是，將傷害像這樣相殺計算的！"
2402-108 = "稍微加一點鹽……！"
2402-110 = "嗯！好，OK！"
2402-111 = "這樣學習三森前輩的修行也完成了！"
2402-113 = "像這樣的感覺，介紹影片完成了唷！老師！"
2402-114 = "這裡，集結了修行部的全部！"
2402-115 = "[s]「真的……？」"
2402-116 = "只要拿出這個的話就確實可以在大賽獲得優勝！搞不好還能在奇普托斯中廣為流傳……作為出色的淑女一口氣知名度變得很厲害！？"
2402-117 = "啊，也就是說把這個公開的話，人氣就會突然上升……"
2402-118 = "然後，如果殺來一堆想入部的人怎麼辦！？"
2402-119 = "嗯……！不過那也沒辦法呢！嗯，只能成為率領後輩們出色的淑女「前輩」了！欸嘿！"
2402-120 = "[s1]「樂觀是很好……」\n[s2]「不過偶爾回頭看看後面也許會比較好。」"
2402-121 = "咦，後面？為什麼？"
2402-122 = "咦，後面？為什麼？"
2402-125 = "貓咪……小狗……舔舔地獄……"
2402-127 = "楓～……？"
2402-130 = "在社辦廚房裡的咖哩加料的，是楓醬沒錯吧？"
2402-132 = "請坐在這裡。因為我，這次真的有點生氣了呢。"
2402-133 = "椿，椿前輩和三森前輩，擺著真的生氣時的臉！？"
2402-134 = "這，這樣下去的話就只能面對「魔鬼說教地獄～5小時全套餐～」了！"
2402-135 = "噫噫！老師救救我～！"
2402-136 = "[s]「自作自受。」"
2402-138 = "唔，唔哇啊啊啊～！！"
2402-140 = "（來自修行部前輩們的說教地獄，從那之後起持續了好一段時間……）"
2402-141 = "拍攝修行部介紹動畫吧！"

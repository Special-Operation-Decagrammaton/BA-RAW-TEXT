[translation]
2402-1 = "มาถ่ายวิดีโอโปรโมตชมรมฝึกฝนกันเถอะ! 2"
2402-2 = "อืม... ทดสอบกล้อง"
2402-3 = "ถ้างั้นก็ทดสอบไมค์ด้วยเลยแล้วกัน~! สัญญาณภาพกับเสียงชัดดีไหมค๊าาา~?"
2402-4 = "มาเริ่มกันเลยดีกว่า!"
2402-7 = "สวัสดีค่า ชมรมฝึกฝนค่ะ ตรงนั้นคือริมแม่น้ำเรดแพนด้าที่หัวหน้าของชมรมฝึกฝนทำกิจกรรมอยู่!"
2402-8 = "และที่ฉันมาที่นี่วันนี้..."
2402-9 = "เพราะที่นี่คือสถานที่ฝึกฝนที่รุ่นพี่สึบากิ หัวหน้าชมรมของเราใช้ฝึกฝนยังไงล่ะคะ!"
2402-10 = "อ๊ะ พูดถึงเสือเสือก็มา!"
2402-13 = "คร่อก..."
2402-15 = "ฉันจะแนะนำให้รู้จักนะคะ!"
2402-16 = "รุ่นพี่คาซึกะ สึบากิค่ะ! ชั้นปีที่ 2! อายุ 16 ปี เจ้าของฉายา องค์หญิงขี้เซา ประธานของชมรมฝึกฝนค่ะ!"
2402-17 = "และความเก่งกาจของรุ่นพี่สึบากิน่ะเหรอคะ....!"
2402-18 = "หือ?"
2402-20 = "อ๊ะ เมื่อกี้มีแมวตัวนึงอยู่ข้างๆ รุ่นพี่สึบากิด้วยค่ะ!"
2402-22 = "สะ... สองตัว!"
2402-24 = "แถมยังมีสุนัข... กระต่าย นกพิราบ กวาง แล้วก็สัตว์อื่นๆ ด้วยค่ะ"
2402-25 = "มีมาเพิ่มเรื่อยๆ แล้วค่ะ~!"
2402-26 = "สัตว์ทุกตัวคงจะตกหลุมรักท่าทางการนอนของรุ่นพี่สึบากิแน่นอนเลยค่ะ!"
2402-27 = "คร่อกกกก..."
2402-28 = "สะ...สุดยอด! ถึงจะมีสัตว์จำนวนมากมารวมตัวกันอยู่ แต่รุ่นพี่ก็ยังนอนหลับได้อย่างไม่หวั่นไหว!"
2402-29 = "ความมุ่งมั่นอยู่ตลอดเวลาแบบนี้ คือพื้นฐานของเลดี้ที่เพียบพร้อม!"
2402-30 = "ดีล่ะ ฉันเองก็จะยอมแพ้ไม่ได้!"
2402-31 = "ในฐานะมาสคอตผู้น่ารักของชมรมฝึกฝนที่มีความฝันอยากจะเป็นเลดี้ที่เพียบพร้อม! ฉันจะฝึกตามวิธีของรุ่นพี่สึบากิบ้าง!"
2402-32 = "ถ้างั้นก็... ขอรบกวนหน่อยนะค๊า~"
2402-38 = "ว้าว..."
2402-39 = "นี่คือภาพวิวที่รุ่นพี่สึบากิเห็นทุกครั้งเวลาที่มานอนตรงนี้งั้นเหรอ..."
2402-40 = "การนอนแล้วได้เห็นภาพวิวแบบนี้..."
2402-41 = "นี่คือการฝึกฝนเพื่อเป็นเลดี้ที่เพียบพร้อมอย่างแท้จริง..."
2402-42 = "ถ้างั้นฉันก็จะนอนหลับตาเหมือนรุ่นพี่สึบากิบ้าง..."
2402-44 = "…"
2402-47 = "อ๊ะ จั๊กจี้นะ~"
2402-48 = "เดี๋ยวก่อนนน~ อย่าเลียแก้มฉันแบบนั้นสิ~ ฉันนอนไม่ได้~!"
2402-49 = "อะ...อื้ออออ!"
2402-51 = "อ๊ะ จริงๆ เลย~!"
2402-52 = "นี่ ถ้าอยากเลียหน้าใครล่ะก็ไปเลียหน้ารุ่นพี่สึบากิสิ!"
2402-56 = "อืม..."
2402-57 = "ฮู่ว! เป็นการฝึกที่คุ้มค่าจริงๆ! ถ้างั้นต่อไปก็มากล่าวแนะนำกันเถอะค่ะ!"
2402-61 = "คร่อกกกก...?"
2402-63 = "ต่อไปฉันจะแนะนำรองหัวหน้าชมรมฝึกฝนของเราให้รู้จัก"
2402-64 = "รุ่นพี่มิโมริผู้เป็นแบบอย่างของเลดี้ผู้งดงาม!"
2402-65 = "ถ้าเป็นตอนนี้ล่ะก็... รุ่นพี่มิโมริคงจะกำลังเตรียมมื้อค่ำอยู่แน่ๆ"
2402-66 = "อ๊ะ คาเอเดะจัง? มีอะไรเหรอคะ?"
2402-67 = "รุ่นพี่มิโมริ!"
2402-68 = "นั่นมันกล้อง... ใช่ไหมคะ?"
2402-69 = "อื้อ! ฉันกำลังถ่ายวิดีโอชีวิตประจำวันของชมรมฝึกฝนอยู่!"
2402-70 = "ชีวิตประจำวันของชมรมฝึกฝน...? "
2402-71 = "ถึงจะไม่ค่อยเข้าใจก็เถอะ แต่นี่คงเป็นวิธีฝึกฝนอีกวิธีหนึ่งของคาเอเดะจังใช่ไหมคะ?"
2402-72 = "ใช่แล้ว! ฉันจะใช้เจ้านี่ทำให้ตัวเองได้เป็นเลดี้ที่เพียบพร้อม และไปถล่มพวกชมรมหยินหยางให้ราบคาบเลย!"
2402-73 = "คะ...? "
2402-74 = "ยังไงก็พยายามฝึกฝนให้เต็มที่นะคะ แล้วก็... มื้อเย็นวันนี้มีแกงกะหรี่ค่ะ"
2402-75 = "กลับมาที่ห้องชมรมให้ทันมื้อเย็นด้วยนะคะ"
2402-76 = "อื้อ!"
2402-78 = "เห็นไหม? ในฐานะที่รุ่นพี่มิโมริเป็นรองหัวหน้าชมรม เธอมักจะเตรียมอาหารให้พวกเราและคอยดูแลเรื่องอื่นๆ อีกด้วย!"
2402-79 = "ความฝันของรุ่นพี่มิโมริก็คือการได้เป็นกุลสตรีที่เพียบพร้อมยังไงล่ะ! รุ่นพี่ก็เลยตั้งใจฝึกฝนตัวเองอยู่!"
2402-80 = "ทั้งรุ่นพี่มิโมริและรุ่นพี่สึบากิก็เป็นเลดี้ที่เพียบพร้อมไม่แพ้กันเลย..."
2402-81 = "ฉันเองก็จะยอมแพ้ไม่ได้แล้ว ถ้าอยากเป็นให้ได้แบบรุ่นพี่มิโมริก็ต้องใช้วิธีฝึกฝนเดียวกัน..."
2402-82 = "อ๊ะ! คิดอะไรดีๆ ออกแล้วล่ะ!"
2402-85 = "นี่คือแกงกะหรี่ฝีมือรุ่นพี่มิโมริ! กลิ่นหอมสุดๆ ไปเลย!"
2402-86 = "ก่อนอื่นก็ลองชิมสักคำนึง...ซู้ดดดด ง่ำๆๆ"
2402-88 = "อร่อยเหาะไปเลย!!"
2402-89 = "แต่ว่าถ้าเอาแต่กินอาหารที่รุ่นพี่มิโมริทำให้อย่างเดียวก็จะเป็นเหมือนรุ่นพี่มิโมริไม่ได้หรอกนะ!"
2402-90 = "เพราะงั้นคุณผู้ชมทุกท่านคะ! คอยดูให้ดีนะ!"
2402-91 = "เพื่อเป็นเลดี้แบบรุ่นพี่มิโมริให้ได้ จากนี้ฉันจะลองเตรียมแกงกะหรี่ค่ะ!"
2402-92 = "แกงกะหรี่ตอนนี้ก็อร่อยดีอยู่แล้ว แต่ว่าถ้าเป็นแกงกะหรี่ที่ทำเองล่ะก็คงจะยิ่งอร่อย...!"
2402-94 = "คาเอเดะจัง! สุดยอดเลยค่ะ! แกงกะหรี่ของฉันอร่อยขึ้นอีก 200 เปอร์เซ็นต์เลย!"
2402-95 = "คาเอเดะ เก่งสุดยอด... ขออีกจาน..."
2402-97 = "ฮุฮิ ฮิฮิฮิฮิ"
2402-98 = "อืม จากที่เห็นฉันคิดว่าแกงกะหรี่อร่อยแล้วก็จริง แต่เหมือนจะขาดรสหวานอยู่นิดหน่อย!"
2402-99 = "เพราะงั้นฉันจะเติมน้ำตาลลงไป..."
2402-103 = "อ๊ะ ฝาขวดโหลน้ำตาลมัน...?! น้ำตาลหกลงไปหมดเลย!"
2402-104 = "ทะ...ทำยังไงดี!"
2402-105 = "อ๊ะ!"
2402-106 = "ถ้าจะกลบรสหวานล่ะก็... ต้องเติมรสเค็มลงไปไงล่ะ! "
2402-107 = "ปกติเวลาเล่นการ์ดเกม ถ้าเจอดาเมจหนักๆ ก็ต้องเพิ่มค่าป้องกันเพื่อหักล้างกัน!"
2402-108 = "ถ้างั้นก็ใส่เกลือลงไปนิดหน่อย...!"
2402-110 = "อื้อ! ใช้ได้! อร่อยเหาะ!"
2402-111 = "ขอจบการฝึกฝนแบบรุ่นพี่มิโมริเพียงเท่านี้ค่ะ!"
2402-113 = "เพราะงั้น... วิดีโอโปรโมตก็ถ่ายเสร็จแล้วล่ะ! คุณครู!"
2402-114 = "ในวิดีโอนี้มีหัวใจสำคัญของชมรมเราอยู่ทั้งหมดแล้ว!"
2402-115 = "[s] \"อย่างนั้นเหรอ?\""
2402-116 = "ถ้าใช้วิดีโออันนี้ ฉันแน่ใจว่าชัยชนะต้องเป็นของชมรมฝึกฝน...#nแน่นอน! นี่คือการเปิดตัวของเลดี้ที่เพียบพร้อมยังไงล่ะ!"
2402-117 = "อ๊ะ?! ถ้าเกิดโพสต์วิดีโอนี่ไปแล้วชมรมเราเกิดดังขึ้นมาล่ะก็..."
2402-118 = "ถ้ามีคนแห่มาสมัครเข้าชมรมเราเยอะแยะจะทำยังไงล่ะ?!"
2402-119 = "อืมมม...! แบบนั้นก็คงช่วยไม่ได้นะ เอาละ! ฉันก็คงจะต้องทำตัวให้สมกับเป็นรุ่นพี่#nเลดี้ที่เพียบพร้อมให้พวกรุ่นน้องได้เห็นสินะ! ฮิฮิฮิ"
2402-120 = "[s1] \"ดีทุกอย่างเลยนะ\"\n[s2] \"ข้างหลัง คาเอเดะ...\""
2402-121 = "หือ? ข้างหลัง ทำไมเหรอคะ?"
2402-122 = "หือ? ข้างหลัง ทำไมเหรอคะ?"
2402-125 = "(งึมงำ) น้องแมว... น้องหมา... โดนพวกสัตว์รุมเลียแก้ม..."
2402-127 = "คา~ เอ~ เดะ~~~"
2402-130 = "คาเอเดะจัง คนที่เข้ามาวุ่นวายกับแกงกะหรี่ในครัวห้องชมรมคือคาเอเดะจังใช่ไหมคะ?"
2402-132 = "มานั่งตรงนี้หน่อยค่ะ ฉันโกรธจริงๆ นะคะ"
2402-133 = "นะ...นี่มันสีหน้าที่โกรธจัดของรุ่นพี่มิโมริและรุ่นพี่สึบากิ!"
2402-134 = "ถ้าเป็นแบบนี้ล่ะก็ฉันจะต้องเจอ... การเทศนานรกสุดโหดแบบฟูลคอร์สห้าชั่วโมงเต็มแน่...!"
2402-135 = "ฮือ...~ ชะ...ช่วยด้วย คุณครู~!"
2402-136 = "[s] \"กรรมใดใครก่อกรรมนั้นย่อมคืนสนอง...\""
2402-138 = "อะ... อ๊ายยย~!"
2402-140 = "(การเทศนานรกสุดโหดของชมรมฝึกฝนได้เริ่มขึ้น)"
2402-141 = "มาถ่ายวิดีโอโปรโมตชมรมฝึกฝนกันเถอะ!"

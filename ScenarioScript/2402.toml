[translation]
2402-1 = "Filming a Club Promo! Part 2"
2402-2 = "Okay, testing the camera. Testing... One, two... "
2402-3 = "Let's test the mic while we're at it! Can you see me? Can you hear me?"
2402-4 = "All right, let's get this promo rolling!"
2402-7 = "This is the Inner Discipline Club! And right now we're at the side of Red Panda River, the club president's favorite spot!"
2402-8 = "We're here because..."
2402-9 = "Tsubaki, the president of the Inner Discipline Club, loves to train here!"
2402-10 = "Ah, speak of the devil!"
2402-13 = "*snoring*"
2402-15 = "Allow me to introduce her!"
2402-16 = "This is Kasuga Tsubaki! Second-year student! Sixteen years old! Also known as the Sleeping Beauty and president of the Inner Discipline Club!"
2402-17 = "Now, to help you understand how amazing Tsubaki is..."
2402-18 = "Huh?"
2402-20 = "Wait... A cat just showed up right by Tsubaki!"
2402-22 = "Make that two!"
2402-24 = "Now there's a puppy...and a rabbit? ...And now a pigeon, a deer, and even more animals?"
2402-25 = "They just keep coming!"
2402-26 = "I bet all of them are mesmerized by the sight of Tsubaki sleeping so peacefully!"
2402-27 = "*snoring*"
2402-28 = "Amazing! Look at her sleep, undisturbed by the huge flock of animals around her!"
2402-29 = "She didn't falter even the slightest bit. Such is the beauty of an exemplary lady!"
2402-30 = "Right, I can't fall behind!"
2402-31 = "As the adorable mascot of the Inner Discipline Club and such an aspiring awesome lady, I will hone my skills to reach her level of greatness!"
2402-32 = "Um, excuse me!"
2402-38 = "Whoa..."
2402-39 = "So this is what Tsubaki sees when she's lying down..."
2402-40 = "Falling asleep with this kind of view..."
2402-41 = "This must be the kind of training that awesome ladies do..."
2402-42 = "In that case, I'm gonna close my eyes, just like Tsubaki..."
2402-44 = "..."
2402-47 = "Ah, it tickles!"
2402-48 = "Stop it! Don't lick my cheek like that! I can't sleep!"
2402-49 = "Mmm!"
2402-51 = "Ugh! Seriously!"
2402-52 = "Here, have Tsubaki to lick!"
2402-56 = "..."
2402-57 = "Whew! That was some rewarding training! On to the next bit!"
2402-61 = "*still snoring*"
2402-63 = "Next up is the vice president of the Inner Discipline Club..."
2402-64 = "...the living example of a beautiful lady, Mimori!"
2402-65 = "At this hour, Mimori must be making dinner..."
2402-66 = "Oh, Kaede? What's going on?"
2402-67 = "Mimori!"
2402-68 = "Is that...a camera?"
2402-69 = "Yup! I'm recording a day in the life of the Inner Discipline Club!"
2402-70 = "A day in the life of the Inner Discipline Club? "
2402-71 = "I'm not so sure what's going on... Is this part of the training you mentioned?"
2402-72 = "That's right! With this training, I'll become an amazing lady and take down the Yin-Yang Club!"
2402-73 = "I beg your pardon? "
2402-74 = "Anyways, good luck with your training. Tonight's dinner is curry!"
2402-75 = "Make sure to come back to the club room for dinner before it gets cold, okay?"
2402-76 = "Sure thing!"
2402-78 = "See that? Mimori is the vice president of the Inner Discipline Club. She takes care of many things for us, not just our meals!"
2402-79 = "Mimori's dream is to become a fine and elegant lady! That's what she's training for!"
2402-80 = "Mimori is no less of an elegant lady than Tsubaki..."
2402-81 = "So I can't fall behind! If I want to be like Mimori, I should be doing the same kinds of training as her..."
2402-82 = "Ah! I got an idea!"
2402-85 = "Mmm... That's the smell of Mimori's famous curry! Yummy!"
2402-86 = "Let me have just a bit... Nom, nom. *slurp*"
2402-88 = "Mmm! So tasty!"
2402-89 = "But I can't be like Mimori if I just keep on eating her cooking!"
2402-90 = "So, watch me carefully, dear viewer!"
2402-91 = "I think I'll improve the curry myself to be just like Mimori!"
2402-92 = "The curry already tastes amazing, but if I can make it even better with my own cooking skills somehow..."
2402-94 = "Kaede! This is brilliant! I can't believe you made my curry twice as delicious! "
2402-95 = "You're amazing, Kaede! I'm going to have seconds..."
2402-97 = "Heehee."
2402-98 = "Mmm, this curry tastes pretty great, but I think it could be a touch sweeter..."
2402-99 = "So, I'll just add some sugar..."
2402-103 = "Oh no, the lid fell off! I put in way too much sugar!"
2402-104 = "What do I do?!"
2402-105 = "Ah!"
2402-106 = "Okay! Well, if I wanna tone down some of this sweetness... I guess should make it saltier!"
2402-107 = "I mean, that's how you offset damage in most card games, right?"
2402-108 = "Let's add some more salt..."
2402-110 = "Yup! That's perfect! I feel like I accomplished something today!"
2402-111 = "And that concludes my Mimori training!"
2402-113 = "There, I finished it, Sensei! The promo video is done!"
2402-114 = "The entirety of the Inner Discipline Club, its very essence, is captured here!"
2402-115 = "[s] \"Ah... Is that so?\""
2402-116 = "Once I submit this, the Inner Discipline Club's victory is likely...no, it's guaranteed! This will mark my debut as a true lady!"
2402-117 = "*gasp* But what if the video goes viral after the reveal...?!"
2402-118 = "...and we get a tidal wave of new people hoping to join the club?!"
2402-119 = "Hmm... No matter! It's already decided! I have no choice but to take on the role of an elegant lady and guide the young new recruits! Heeheehee!"
2402-120 = "[s1] \"That all sounds great, but, uh...\"\n[s2] \"Kaede, look behind you.\""
2402-121 = "What? Behind me? Why?"
2402-122 = "What? Behind me? Why?"
2402-125 = "*licking* *slurping* *lap* Cats... Puppies... I feel like I've been in some sort of licking hell..."
2402-127 = "Oh, Kaede!"
2402-130 = "Kaede, are you the one who touched the curry in our club room kitchen?"
2402-132 = "Come over here and take a seat. It goes without saying that I'm a little mad..."
2402-133 = "Uh-oh! That's the face that Tsubaki and Mimori make when they're really mad!"
2402-134 = "At this rate, I'm in for a difficult five-hour lecture!"
2402-135 = "Ugh. H-Help me, Sensei!"
2402-136 = "[s] \"Well, you brought this on yourself.\""
2402-138 = "A-Aaagh!"
2402-140 = "(So begins the five-hour lecture of the Inner Discipline Club.)"
2402-141 = "Filming a Club Promo!"

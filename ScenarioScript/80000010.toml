[translation]
80000010-1 = "#title;불행한 미식가"
80000010-2 = "#place;백귀야행 학원 인근의 화과자집"
80000010-3 = "#wait;150"
80000010-4 = "#wait;2000"
80000010-5 = "3;준코;01;선생님이 말한 화과자집이 바로 여기야? 초콜릿을 묻힌 경단을 판다는 그 가게가?\n#3;em;[반응]\n#3;a"
80000010-6 = "3;준코;02;선생이 내가 모르는 경단 맛집을 알고 있다고 했을 때는 조금 의심스러웠는데……"
80000010-7 = "3;준코;03;이렇게 외진 곳에 있다면 다른 학생들이 모르는 이유를 알 것 같기도 하네. 새로운 맛집을 소개시켜 줘서 고마워.\n#3;greeting\n#3;em;[음표]"
80000010-8 = "3;준코;12;어디 보자. 선생의 말처럼 신기한 맛의 경단이 가득 있네."
80000010-9 = "3;준코;02;이건 블루베리 가루를 쓴 것 같고……\n#3;em;[...]\n#3;m4"
80000010-10 = "3;준코;02;저건 커스타드 크림인가?\n#3;m2\n#3;hophop"
80000010-11 = "3;준코;03;모든 메뉴가 하나같이 흥미로워 보여서, 전부 먹어보고 싶을 정도야!\n#3;em;[반짝]\n#3;m3"
80000010-12 = "[s] \"그럼 모두 먹어보면 되잖아?\""
80000010-13 = "3;준코;05;그건 안 돼! 이번 달에는 비싼 요리를 자주 먹으러 다녀서 지갑 사정이 아슬아슬하다고!\n#3;em;[!]\n#3;jump"
80000010-14 = "3;준코;11;게다가 나는 아카리가 아니니까. 먹을 수 있는 음식의 개수에도 한계가 있으니……"
80000010-15 = "3;준코;13;아아— 나도 선생님처럼 지갑도 위장도 튼튼한 어른이 되고 싶어—"
80000010-16 = "[s] \"어른이라고 해서 다 그런 건 아니지만.\""
80000010-17 = "3;준코;02;그런가? 여하튼 먹을 수 있는 경단의 수에는 한계가 있으니 신중하게 선택을 하는 게 좋겠어.\n#3;em;[반응]"
80000010-18 = "3;준코;01;일단은 이곳의 시그니처 메뉴라는 초콜릿 경단을 먹어볼까?\n#3;m2"
80000010-19 = "3;준코;12;단맛과 쓴맛이 섞인 소스라고 생각하면, 미타라시 당고에 가까울지도…… 어쨌든 먹어 보면 알겠지.\n#3;em;[음표]\n#3;hophop"
80000010-20 = "3;준코;00\n#3;m1\n#wait;1000"
80000010-21 = "3;준코;00;여기, 초콜릿 경단 2인분 주세요!\n#3;em;[반응]"
80000010-22 = "[s] \"다른 메뉴를 섞어서 주문하는 게 좋지 않겠어?\""
80000010-23 = "3;준코;02;응? 나 혼자 다 먹으려고 주문한 거 아닌데?\n#3;m3"
80000010-24 = "3;준코;03;다른 하나는 선생님을 위해 내가 특별히 주문하는 거야."
80000010-25 = "3;준코;12;선생님이 아니었더라면 이곳에 맛집이 있다는 것도 몰랐을 테고, 여기까지 안내해 준 답례를 하고 싶기도 하고……"
80000010-26 = "3;준코;11;또 마침 오늘이 발렌타인 데이이기도 하고……\n#3;stiff\n#3;em;[///]\n#fontsize;55"
80000010-27 = "3;준코;05;여하튼 내가 특별히 한턱 내는 거니, 감사히 여기라고!\n#3;hophop"
80000010-28 = "#st;[0,0];instant;1;"
80000010-29 = "#clearST"
80000010-30 = "3;준코;05\n#3;d\n#wait;1000"
80000010-31 = "#wait;1500"
80000010-32 = "#na;종업원;주문하신 초콜릿 경단 2인분 나왔습니다."
80000010-33 = "3;준코;01;아, 드디어 나왔다.\n#3;a"
80000010-34 = "3;준코;03;자, 그럼 잘 먹겠습니다—\n#3;closeup\n#3;em;[반짝]"
80000010-35 = "#st;[0,0];instant;1;"
80000010-36 = "#clearST"
80000010-37 = "3;준코;10\n#3;closeup\n#3;shake\n#wait;1000"
80000010-38 = "3;준코;10\n#3;closeup\n#3;d\n#wait;1000"
80000010-39 = "#all;hide"
80000010-40 = "#wait;1500\n#bgshake"
80000010-41 = "#wait;1500"
80000010-42 = "4;모찌모찌 헬멧단원 B;01\n2;모찌모찌 헬멧단원 A;01;여기가 그 초콜릿 경단을 판다는 그 괘씸한 화과자집이냐?\n#2;em;[빠직]\n#4;ar\n#2;ar"
80000010-43 = "4;모찌모찌 헬멧단원 B;01;경단에 그런 사도를 행하다니…… 우리 모찌모찌 헬멧단이 가만두지 않겠다!\n#4;em;[반응]\n#4;stiff"
80000010-44 = "2;모찌모찌 헬멧단원 A;01;맞아! 경단에 뿌려도 좋은 건 콩가루와 간장 정도밖에 없다고!\n#2;jump"
80000010-45 = "4;모찌모찌 헬멧단원 B;01;우선은 여기에 있는 경단을 몽땅 내다 버려야—\n#4;em;[재잘]"
80000010-46 = "2;모찌모찌 헬멧단원 A;01\n4;모찌모찌 헬멧단원 B;01\n#2;d\n#4;d\n#wait;1000"
80000010-47 = "3;준코;06;내 경단……\n#3;black\n#3;a"
80000010-48 = "3;준코;06;내 경단이 바닥에 떨어졌잖아…… 한 입도 먹지 못한 건데……."
80000010-49 = "3;준코;06\n1;모찌모찌 헬멧단원 A;01;너, 너, 넌 누구야?\n#1;ar\n#1;em;[?!]\n#3;m5"
80000010-50 = "3;준코;07;나는 그저…… 느긋하게 경단을 즐기고 싶었을 뿐인데……\n#3;stiff"
80000010-51 = "3;준코;05;왜 다들 내가 경단을 먹을 때만 나타나서 방해하는 건데!\n#3;em;[빠직]"
80000010-52 = "3;준코;05\n5;모찌모찌 헬멧단원 B;01;뭐, 뭔가 오해를 한 것 같은데 우리는 너를 처음 본다고!\n#1;dl\n#3;m1\n#5;al\n#5;stiff\n#5;em;[반응]"
80000010-53 = "5;모찌모찌 헬멧단원 B;01\n3;준코;06;이제 초콜릿 경단은 아무래도 상관없어…….\n#3;stiff\n#3;m3\n#5;dr"
80000010-54 = "3;준코;05;너희들 전부 가만두지 않겠어!\n#3;closeup"

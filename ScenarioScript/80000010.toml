[translation]
80000010-1 = "นักชิมผู้อับโชค"
80000010-2 = "ร้านขนมดังโงะใกล้สหพันธ์เฮียกคิยาโค"
80000010-5 = "นี่ใช่ร้านขนมดังโงะที่คุณครูบอกรึเปล่านะ? ร้านที่ขายดังโงะเคลือบช็อกโกแลตนั่นน่ะ?"
80000010-6 = "ตอนที่คุณครูบอกว่ารู้จักร้านขนมดังโงะที่ฉันไม่รู้จักอยู่ ก็รู้สึกแปลกใจนิดหน่อย..."
80000010-7 = "แต่ถ้าร้านอยู่ห่างไกลเมืองขนาดนี้ คนอื่นๆ จะไม่รู้จักก็ไม่แปลกใจหรอก ขอบคุณที่แนะนำร้านอร่อยๆ ร้านใหม่ให้นะ"
80000010-8 = "ไหนดูซิ... มีขนมดังโงะรสใหม่ๆ เหมือนที่คุณครูบอกเลยแฮะ"
80000010-9 = "อันนี้เหมือนจะทำจากผงบลูเบอร์รี่..."
80000010-10 = "ส่วนอันนั้นก็เหมือนจะเป็นคัสตาร์ดครีมสินะ?"
80000010-11 = "น่าสนใจทุกเมนูเลยนะเนี่ย อยากกินทุกอันเลย!"
80000010-12 = "[s] \"ถ้างั้นก็ลองให้หมดเลยก็ได้นี่?\""
80000010-13 = "ไม่ได้หรอก! เดือนนี้ฉันตระเวนกินของแพงๆ บ่อยมากจนตอนนี้กระเป๋าแฟบแล้วล่ะ!"
80000010-14 = "อีกอย่าง ฉันไม่ใช่อาคาริสักหน่อย กินเยอะขนาดนั้นไม่ไหวหรอก..."
80000010-15 = "เฮ้อ ฉันอยากเป็นผู้ใหญ่ที่กินได้เยอะ แล้วก็มีเงินเยอะเหมือนคุณครูจัง—"
80000010-16 = "[s] \"ผู้ใหญ่ไม่ได้เป็นแบบนั้นทุกคนหรอกนะ\""
80000010-17 = "งั้นเหรอ? แต่ยังไงเราก็กินดังโงะได้ไม่เยอะ เพราะงั้นต้องเลือกให้ดีๆ ล่ะ"
80000010-18 = "งั้นเราลองชิม \"ดังโงะช็อกโกแลต\" ที่เป็นเมนูซิกเนเจอร์ของร้านกันก่อนดีมั้ย?"
80000010-19 = "พอคิดว่าเป็นซอสที่มีรสหวานและขมผสมกัน ก็อาจใกล้เคียงกับมิตาราชิ ดังโงะก็ได้... ช่างเถอะ เดี๋ยวกินก็คงรู้เองแหละ"
80000010-21 = "สวัสดีค่า ขอดังโงะช็อกโกแลตสองที่ค่ะ!"
80000010-22 = "[s] \"สั่งเมนูอื่นมาด้วยไม่ดีกว่าเหรอ?\""
80000010-23 = "หืม? ที่สั่งนี่ไม่ได้กะจะกินเองทั้งหมดสักหน่อย?"
80000010-24 = "อีกไม้หนึ่งฉันสั่งมาให้คุณครูต่างหากล่ะ"
80000010-25 = "ถ้าไม่มีคุณครูล่ะก็ ฉันคงไม่รู้ว่ามีร้านดีๆ แบบนี้อยู่ แล้วก็อยากขอบคุณที่พามาที่นี่ด้วย..."
80000010-26 = "อีกอย่างวันนี้ก็เป็นวันวาเลนไทน์..."
80000010-27 = "เพราะงั้นวันนี้ฉันจะเลี้ยงคุณครูเอง!"
80000010-32 = "ดังโงะช็อกโกแลต 2 ที่ได้แล้วครับ"
80000010-33 = "อ๊ะ มาแล้วล่ะ!"
80000010-34 = "จะทานแล้วนะคะ~"
80000010-42 = "นี่มันร้านขนมดังโงะน่ารังเกียจที่ขายดังโงะช็อกโกแลตนั่นไม่ใช่เหรอ?"
80000010-43 = "ทำเรื่องน่าสยองแบบนั้นกับขนมดังโงะ... แก๊งหมวกกันน็อกโมจิโมจิอย่างพวกเราคงปล่อยผ่านไป#nไม่ได้เด็ดขาด!"
80000010-44 = "ถูกต้อง! สิ่งที่ควรเอามาทาดังโงะมันต้องมีแค่ผงถั่วบดกับซีอิ๊วเท่านั้น!"
80000010-45 = "อย่างแรกเราจะต้องกำจัดดังโงะที่ร้านนี้ไปให้มะ—"
80000010-47 = "ดังโงะของฉัน..."
80000010-48 = "ดังโงะของฉันตกลงไปบนพื้น... ฉันยังไม่ได้กินสักคำเลยแท้ๆ..."
80000010-49 = "ธะ...เธอเป็นใครน่ะ?"
80000010-50 = "ฉันก็แค่... อยากมานั่งกินดังโงะอย่างสบายใจ แค่นั้นเองนะ..."
80000010-51 = "ทำไมทุกคนต้องโผล่มาก่อเรื่องตอนฉันกินดังโงะทุกทีเลย!"
80000010-52 = "ขะ...เข้าใจผิดรึเปล่า พวกเราเพิ่งเคยเจอเธอเองนะ!"
80000010-53 = "ตอนนี้ดังโงะช็อกโกแลตมันไม่สำคัญแล้วล่ะ..."
80000010-54 = "ฉันจะจัดการพวกเธอให้เละเลย!"
80000010-61 = "(หลังจากนั้น แก๊งหมวกกันน็อกที่โจมตีร้านขนมดังโงะก็ถูกจุนโกะจัดการด้วยความโมโห)"
80000010-62 = "(แต่จากความวุ่นวายที่เกิดขึ้น อาหารและขนมทั้งหมดเลยถูกทำลายไป ทำให้สุดท้ายจุนโกะก็ไม่#nได้ลิ้มรสชาติขนมดังโงะนั้น...)"

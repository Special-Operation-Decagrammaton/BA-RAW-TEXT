[translation]
80000010-1 = "不幸的美食家"
80000010-2 = "百鬼夜行聯合學園．和菓子店"
80000010-5 = "這裡就是老師所說的和菓子店？似乎是最近新開的……"
80000010-6 = "哇，確實是間沒看過的店呢……"
80000010-7 = "沒想到會在這種地方，啊，而且價格比想像中還實惠！#n居然能找到這麼棒的店，不愧是老師！謝謝你告訴我！"
80000010-8 = "啊，有好多少見的口味……！"
80000010-9 = "這個糰子是藍莓口味……"
80000010-10 = "那個是卡士達奶油？"
80000010-11 = "去裡面吃吃看吧！好吃的話之後也可以再來。#n我看看～該選哪種呢……嗯～好猶豫……"
80000010-12 = "[s]「要不要乾脆全部都吃一遍？」"
80000010-13 = "那可不行！最近荷包岌岌可危！"
80000010-14 = "而且我和亞伽里不同，食量是有限的，得好好想想該點哪種才行……"
80000010-15 = "啊啊～我也好想像老師一樣，成為錢包跟胃口都大的大人哦～"
80000010-16 = "[s]「不見得每個大人都一樣就是了。」"
80000010-17 = "是嗎？總之，現在必須慎重地抉擇……"
80000010-18 = "決定了！首先還是嚐嚐招牌上寫著的巧克力糰子吧。"
80000010-19 = "從苦中帶甜的醬汁來看，說不定味道和醬油糰子很類似？總之，吃了就知道對吧。"
80000010-21 = "請給我兩份巧克力糰子！"
80000010-22 = "[s]「要不要點些別的口味？」"
80000010-23 = "嗯？我沒打算要一個人吃兩人份哦？"
80000010-24 = "一份是要給老師的。既然一起來了就一起吃吧。"
80000010-25 = "要不是老師告訴我，我也不會知道這間店，也想答謝老師帶我到這裡來……"
80000010-26 = "還有，今天剛好是情人節……"
80000010-27 = "總而言之，這可是我特別請老師吃的，要心懷感謝唷！"
80000010-32 = "這是您點的巧克力糰子，請慢用。"
80000010-33 = "啊，終於來了。"
80000010-34 = "我要開動了──"
80000010-42 = "這裡就是那間有賣巧克力糰子的噁心和菓子店？"
80000010-43 = "竟然敢做出那種邪門歪道的糰子……只要我們軟綿綿頭盔團還在就絕不允許！"
80000010-44 = "沒錯！能加在糰子上的只有黃豆粉跟醬油！"
80000010-45 = "必須把這裡的糰子全部銷毀──"
80000010-47 = "我的，糰子……"
80000010-48 = "我的糰子掉在地上了……明明一口都還沒吃……"
80000010-49 = "你，你是哪位？"
80000010-50 = "我只是想……悠悠哉哉地享用糰子而已……"
80000010-51 = "為什麼每次，每次，每次都要在我吃糰子的時候妨礙我……！"
80000010-52 = "你，你是不是有什麼誤會！？我們應該是第一次見面吧！？"
80000010-53 = "那種事我才不在乎……！"
80000010-54 = "嘗嘗我日積月累的悔恨吧────！！"
80000010-61 = "（之後，軟綿綿頭盔團的學生被憤怒的淳子全數逮捕了）"
80000010-62 = "（然而食物在騷動中被全數燒毀，淳子仍然沒有嚐到糰子……）"

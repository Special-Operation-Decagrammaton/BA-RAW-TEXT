[translation]
80000010-1 = "The Unfortunate Gourmet"
80000010-2 = "Hyakkiyako District Candy Shop"
80000010-5 = "This the traditional candy shop you mentioned? The one that sells chocolate-covered dango?"
80000010-6 = "I was pretty skeptical when you said you knew of a place I've never even heard of."
80000010-7 = "It's pretty out of the way, though. I guess it makes sense that a lot of students don't know about it. Thanks for the tip."
80000010-8 = "Let's see... They do have a lot of interesting dango like you said."
80000010-9 = "Looks like this one is made with blueberry powder."
80000010-10 = "And is that one filled with custard cream?"
80000010-11 = "Everything on their menu looks so interesting.#nI wish I could try them all!"
80000010-12 = "[s] \"Then why don't you?\""
80000010-13 = "No way! I've already been out to eat too many times this month.#nMy wallet is taking a real beating!"
80000010-14 = "Besides, I'm not like Akari. There are some things that even I can't eat."
80000010-15 = "If only I had an adult-sized stomach and budget like you!"
80000010-16 = "[s] \"That doesn't apply to everyone my age.\""
80000010-17 = "Yeah? Well, whatever. The point is I can't have all the dango I want,#nso this calls for being selective."
80000010-18 = "First, I'll try their signature chocolate dumpling."
80000010-19 = "Maybe it'll be similar to mitarashi dango since the sauce is bitter and sweet... I guess I'll know when I try it."
80000010-21 = "Excuse me. Can we get two chocolate dango, please?"
80000010-22 = "[s] \"Two? I thought you were being selective.\""
80000010-23 = "Huh? I'm not ordering them both for me."
80000010-24 = "The other's for you. My treat."
80000010-25 = "I wouldn't know about this place if not for you, so this is my way of saying thanks."
80000010-26 = "Besides, today is Valentine's Day..."
80000010-27 = "So...whatever. Just shut up and enjoy it!"
80000010-32 = "Here you are. Two sets of our chocolate dango."
80000010-33 = "Ah! Finally!"
80000010-34 = "Let's dig in!"
80000010-42 = "Is this the shop selling that abomination they're calling chocolate dango?"
80000010-43 = "How DARE they sully dango's good name like that?!#nThe Mochi Mochi Helmet Gang won't stand for it!"
80000010-44 = "All good dango needs is bean flour and soy sauce!"
80000010-45 = "Let's start by disposing of these crimes against nature they're calling dango."
80000010-47 = "My dango..."
80000010-48 = "It fell on the floor. I didn't even get a single bite..."
80000010-49 = "Wh-Who are you?"
80000010-50 = "Is it too much to ask for a girl to enjoy her dango in peace?"
80000010-51 = "Nothing pisses me off more than when punks like you get in between me and my dango!"
80000010-52 = "Wh-What are you talking about?! We don't even know you!"
80000010-53 = "Forget about the chocolate dango..."
80000010-54 = "I'll gorge myself on your tears!"
80000010-61 = "Junko then proceeded to beat the helmet gangsters into submission."
80000010-62 = "Sadly, all of the dango was destroyed in the crossfire, so Junko never did get to taste that dango..."

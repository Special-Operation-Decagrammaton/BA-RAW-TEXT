80000010-61 = "#na;(이후, 화과자집을 습격한 헬멧단 학생들은 분노한 준코에 의해 모두 체포되었다.)"
80000010-62 = "#na;(다만 소동으로 인해 음식이 모두 불타버린 탓에, 준코는 끝끝내 경단을 맛보지 못했다…….)"

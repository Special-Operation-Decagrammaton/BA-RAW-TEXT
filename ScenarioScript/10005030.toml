[translation]
10005030-1 = "第3話;殘酷的審問"
10005030-2 = "（回到當成據點的客房，接近了依然昏迷不醒的兔女郎保鑣）"
10005030-7 = "唔……嗯……？"
10005030-9 = "……！？好痛！？"
10005030-10 = "嘴巴附近火辣辣的……呃，咦……？#n這是，怎麼回事……？"
10005030-12 = "哦，還活跳跳的啊。比看起來還有毅力嘛？"
10005030-13 = "確實，看起來還有在審問後回答我們的餘力呢。"
10005030-14 = "也不用馬上就說「審問」什麼的……"
10005030-15 = "不用太擔心。只要回答我們的問題，就不會讓你受苦的。"
10005030-17 = "都把我打昏並綁起來監禁了還敢說那種話！？#n已經受夠多苦了吧！？"
10005030-18 = "再說了你們到底是誰啊！有什麼目的！"
10005030-19 = "竟敢做出這種事，別以為能就這麼算了！#n反正你們之後也會被──"
10005030-20 = "啊啊？"
10005030-21 = "之後也會被……怎樣？#n會被怎麼樣啊？你說說看啊？"
10005030-22 = "噫……！？"
10005030-23 = "想，想要錢的話就算威脅我也是沒用的！#n我只是個警備員而已……和那種事沒什麼關係！"
10005030-25 = "這樣啊，不過這也不是什麼大問題。"
10005030-26 = "畢竟我們的目的並不是錢。"
10005030-27 = "我們是為了找出某人而來的。"
10005030-29 = "找人……？究竟是誰……？"
10005030-30 = "白……"
10005030-31 = "不對，是黑崎小雪。#n應該才剛來到這艘船上而已，你知道他嗎？"
10005030-32 = "黑崎小雪……？"
10005030-33 = "別想假裝不認識啊。"
10005030-34 = "為了你自己著想。"
10005030-35 = "不不不！"
10005030-36 = "我真的不知道！我沒有騙你們！"
10005030-37 = "你們知道這艘船有多少乘客嗎！？"
10005030-38 = "超過數千人啊，我怎麼可能詳細記住每個人的名字！"
10005030-39 = "萬一說謊的話，你……"
10005030-40 = "噫！"
10005030-41 = "是真的啦，真的！"
10005030-42 = "[s1]「看來是真的不知道呢。」\n[s2]「寧瑠，這樣就夠了吧？」"
10005030-43 = "呿……！"
10005030-44 = "呿……！"
10005030-45 = "唉……你這傢伙，算你運氣好。"
10005030-46 = "今天的運氣已經夠糟了吧……嗚嗚……"
10005030-48 = "原來如此，那該怎麼辦呢……#n他似乎沒有任何權限。"
10005030-49 = "再抓其他人，而那個人剛好記得所有乘客的名字……#n應該也不會有那麼巧的事吧。"
10005030-50 = "……這下麻煩了。"
10005030-51 = "[s3]「如果不問名字，改問外表呢？」\n[s4]「畢竟是個引人注目的孩子，說不定他有看過。」"
10005030-52 = "確實……有道理。"
10005030-53 = "確實……有道理。"
10005030-54 = "不愧是老師，這個主意聽起來不錯。#n就算不知道名字，說不定也能想到一些可能的人物。"
10005030-55 = "畢竟很難想像白兔會安靜老實地待著，他到哪應該都會是很顯眼的存在才對。"
10005030-56 = "原來如此。等我一下。"
10005030-57 = "別想耍什麼花招。#n而且我再說一次，要是敢裝作不知道的話……"
10005030-59 = "噫噫……！？"
10005030-60 = "在威脅他之前，先讓他看一眼吧。"
10005030-64 = "就是這孩子，你有印象嗎？"
10005030-65 = "他又聒噪又喜歡華麗浮誇的事情，我想只要有見過的話一定會有印象的。"
10005030-66 = "是個相當失禮又輕浮的孩子。#n要是有被做了什麼無理舉動的印象，說不定就是他。"
10005030-70 = "……？"
10005030-71 = "失禮又輕浮……"
10005030-75 = "……啊。"
10005030-76 = "……「啊」？"
10005030-77 = "呃……！"
10005030-78 = "喂。"
10005030-79 = "你剛才「啊」了一聲吧？"
10005030-80 = "沒，沒有，是你的錯覺！#n就算知道，我也不能透露顧客的情報！"
10005030-81 = "哈哈，果然知道些什麼嘛！！"
10005030-82 = "從他的反應來看，似乎是呢。"
10005030-83 = "那麼，接下來只要讓他說出來就好……"
10005030-88 = "……！"
10005030-89 = "住，住手！反對暴力！我不喜歡痛啊！"
10005030-90 = "接～下來，終於可以開始了啊。"
10005030-91 = "啊，其實你也沒必要馬上就鬆口哦。這樣很無趣的。"
10005030-92 = "好好加油，接著就恨你自己吧。#n等到累了再開口，OK？"
10005030-97 = "……老師。"
10005030-98 = "[s5]「寧瑠，要用不會痛的方法哦。」\n[s6]「要不要努力試著說服他看看？」"
10005030-99 = "……啊？"
10005030-100 = "……啊？"
10005030-101 = "不是，說要問這傢伙話的不是老師嗎？"
10005030-102 = "而且，這個方法已經很和平了。"
10005030-103 = "除此之外也沒有其他方法了吧？"
10005030-104 = "現在時間所剩不多……這點你應該也同意吧？"
10005030-105 = "……等等。"
10005030-106 = "既然如此……能讓我來試試看嗎？"
10005030-107 = "……啊？"
10005030-108 = "……咦？"
10005030-109 = "[s7]「花凛？」\n[s8]「有什麼好辦法嗎？」"
10005030-110 = "嗯，是我之前想到的。"
10005030-111 = "嗯，是我之前想到的。"
10005030-112 = "交給我吧，我會用笑容解決給你們看的。"
10005030-113 = "啊？用笑容……？"
10005030-114 = "那是什麼意思？"
10005030-115 = "……老師，可以嗎？"
10005030-116 = "[s9]「不會痛的話請務必那麼做。」\n[s10]「那就用笑容解決吧。」"
10005030-117 = "我知道了。"
10005030-118 = "我知道了。"
10005030-123 = "怎，怎麼了！你想做什麼！？"
10005030-125 = "不，不要靠近我啊！"
10005030-126 = "不管你們怎麼做……"
10005030-127 = "我也不會說出任何……！"
10005030-128 = "……"
10005030-129 = "……噫！？"
10005030-132 = "你，你做什麼……！嗯，啊啊！？"
10005030-133 = "等，住手……！啊，不要……！？不，不行！"
10005030-134 = "住手，求你了！啊哈哈哈哈哈哈！！噫，噫噫……！？"
10005030-135 = "啊，不行不行不行！啊！？嗯嗯！等，噫，噫！？"
10005030-136 = "……還沒完呢。"
10005030-137 = "呼嘻嘻嘻嘻嘻嘻嘻嘻！？等，那裡……！？#n啊，哈嗚……！？啊哈，啊哈哈哈哈哈哈！！"
10005030-142 = "……哎呀哎呀。"
10005030-143 = "原來如此，還有這種手段啊。"
10005030-144 = "確實，看來能用笑容解決呢……"
10005030-145 = "在做什麼……"
10005030-147 = "住，住手！再這樣下去的話……！啊，啊哈哈哈哈哈哈！！"
10005030-148 = "……聲音這麼大的話，不太妙啊。"
10005030-149 = "被外面的人聽到也不好，那就……"
10005030-153 = "哈，哈，哈……等等，這次又想怎樣！？#n咦，等……唔唔！唔呣呣呣！？"
10005030-154 = "嗯，這樣就沒問題了。"
10005030-155 = "……喂。"
10005030-156 = "那個，花凛……？"
10005030-157 = "唔唔！唔唔唔──！！唔，呣，唔唔唔！"
10005030-158 = "唔！？"
10005030-159 = "唔哼哼哼哼哼哼哼哼！唔唔唔，唔唔──！唔！唔唔唔唔！？"
10005030-160 = "唔呣，唔唔唔唔唔──！？唔，唔唔唔！！"
10005030-165 = "……等等。"
10005030-166 = "不是，為什麼明明在審問卻把他的嘴給堵住了啊。#n這樣是為了什麼啊。"
10005030-167 = "這已經算是某種暴力了吧……？"
10005030-168 = "話說……"
10005030-169 = "放任他這樣下去沒問題嗎？那傢伙是不是快昏過去了？"
10005030-171 = "說的也對，差不多該阻止他了。"
10005030-172 = "花凛，花凛……？#n感覺是時候該放過他了……"
10005030-176 = "花凛……？"
10005030-177 = "已經專心到聽不見我們說話了啊……得制止他才行。"
10005030-181 = "喂，花凛。差不多該住手了，他的眼睛看起來不妙。"
10005030-182 = "唔，唔唔……！唔唔唔唔唔唔──！？#n唔唔！唔呣！唔唔唔唔！？"
10005030-187 = "唔唔唔唔唔！？唔唔，唔唔唔唔唔！？唔唔唔唔──！！！？"
10005030-188 = "喂，花凛。"
10005030-189 = "花凜！"
10005030-190 = "……！？"
10005030-191 = "……隊長，你有叫我嗎？"
10005030-192 = "叫你好幾次了。"
10005030-193 = "把他的嘴堵起來進行審問是在做什麼，這樣想問什麼都問不出來吧。"
10005030-194 = "要是他就這麼昏過去的話──"
10005030-195 = "啊，說的也是……"
10005030-199 = "哎呀，難道已經……"
10005030-200 = "[s]「……」"
10005030-204 = "呃……"
10005030-205 = "做過頭了嗎……"

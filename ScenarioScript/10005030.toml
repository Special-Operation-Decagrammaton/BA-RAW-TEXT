[translation]
10005030-1 = "ตอนที่ 3;การสอบสวนสุดหฤโหด"
10005030-2 = "(คุณครูกับสมาชิกคนอื่นๆ กลับมาที่ห้องพักแขก และตรงไปหาการ์ดบันนี่เกิร์ลที่หมดสติ#nและถูกจับมัดไว้เมื่อก่อนหน้านี้)"
10005030-7 = "อื้อ... อื้ออออ...?"
10005030-9 = "...!! อ๊ากกก!!"
10005030-10 = "อะ... อะไรกันน่ะ?"
10005030-12 = "อะไรกันเนี่ย ฟื้นเร็วกว่าที่คิดอีกนะ"
10005030-13 = "ค่อยยังชั่วหน่อยนะคะ ดูท่าทางจะแข็งแรงกว่าที่เห็นด้วย ถ้าสอบสวนเธอคงจะได้อะไรบ้างแน่ๆ เลยค่ะ"
10005030-14 = "อย่าพูดอะไรให้เธอกลัวตั้งแต่ยังไม่เริ่มสิ"
10005030-15 = "ไม่ต้องห่วงนะ แค่ตอบคำถามมาเร็วๆ พวกเราก็จะไม่ทำอะไรทั้งนั้นละ"
10005030-17 = "ทำไปแล้วต่างหากล่ะ! พวกเธอฟาดฉันซะสลบ แถมยังจับมัดไว้ด้วยไม่ใช่รึไง!?"
10005030-18 = "พวกเธอเป็นใครกันแน่? ทำไมถึงทำแบบนี้? เพราะเงินเหรอ... ต้องการเงินงั้นเรอะ?"
10005030-19 = "คิดว่าทำแบบนี้แล้วจะรอดไปได้รึไง..."
10005030-20 = "หา ว่าไงนะ...?"
10005030-21 = "รอดไม่รอดแล้วยังไง? เธอจะทำอะไรได้?"
10005030-22 = "ฮะ... เฮือก!?"
10005030-23 = "ถะ... ถ้าอยากได้เงินละก็ฉันไม่มีหรอกนะ! ฉันก็แค่การ์ดคนหนึ่งเอง! จะเข้าถึงเรื่องการเงินได้ยังไง#nกันเล่า!"
10005030-25 = "ฮิฮิ เรื่องนั้นมันก็แน่อยู่แล้ว พวกเรารู้อยู่แล้วละค่ะ"
10005030-26 = "แต่ไม่ต้องห่วงเรื่องนั้นนะคะ พวกเราไม่ได้มาที่นี่เพราะต้องการเงินหรอกค่ะ"
10005030-27 = "พวกเราแค่มาตามหาคนคนหนึ่งเท่านั้นเอง"
10005030-29 = "มาหาคน...? ใครกัน?"
10005030-30 = "ชิโระ..."
10005030-31 = "ไม่สิ คนที่ชื่อคุโรซากิ โคยูกิน่ะ เพิ่งมาที่นี่ได้ไม่นาน เธอรู้จักรึเปล่า?"
10005030-32 = "หืม? ไม่เคยได้ยินชื่อนั้นมาก่อนเลย..."
10005030-33 = "คิดจะแกล้งทำเป็นไม่รู้เพื่อเอาตัวรอดรึไง?"
10005030-34 = "ถ้าคิดจะทำแบบนั้นละก็..."
10005030-35 = "ดะ... เดี๋ยวก่อน! เดี๋ยว หยุดก่อน!!"
10005030-36 = "พะ... พวกเธอทำแบบนี้ไปก็ไม่มีประโยชน์หรอกนะ ฉันไม่รู้จักเลย ไม่รู้จักจริงๆ นะ!"
10005030-37 = "ไม่รู้รึไงว่ามีแขกมาเสี่ยงล็อตโต้ที่นี่ตั้งกี่คนน่ะ?! ตั้งหลายพันคนเลยนะ!"
10005030-38 = "จะให้ไปจำหน้าทุกคนหมดได้ยังไงกันเล่า!? แถมยังมาถามชื่อกันอีก ใครจะไปรู้จักชื่อกันล่ะ?"
10005030-39 = "ยัยกระต่ายนี่..."
10005030-40 = "เฮือกก!"
10005030-41 = "ฉะ... ฉันพูดจริงๆ นะ... คะ!!"
10005030-42 = "[s1] \"ดูเหมือนเธอจะไม่รู้จริงๆ นะ\"\n[s2] \"เนรุ ห้ามใช้ความรุนแรงนะ\""
10005030-43 = "อะ... อึก!"
10005030-44 = "อะ... อึก!"
10005030-45 = "เฮ้อ... วันนี้เธอดวงดีนะ รู้ไว้ซะด้วย"
10005030-46 = "สถานการณ์แบบนี้จะให้คิดว่าโชคดีได้ยังไงเล่า..."
10005030-48 = "อืม... แต่ว่าพอคิดดูแล้วคุณครูก็พูดถูกนะคะ เธอคงไม่รู้เพราะเธอไม่ใช่ผู้จัดงานค่ะ"
10005030-49 = "อีกอย่าง ถึงเธอจะเป็นผู้จัดงาน แต่ก็คงจะจำชื่อของแขกทุกคนที่มาไม่ได้หรอกค่ะ"
10005030-50 = "หมายความว่าสอบสวนไปก็ไม่มีประโยชน์งั้นสินะ น่าหนักใจจริงๆ"
10005030-51 = "[s3] \"ลองถามเรื่องการแต่งกายดูมั้ย?\"\n[s4] \"ถ้าเป็นคนที่ชอบก่อเรื่อง ก็น่าจะมีอะไรโดดเด่นบ้างนะ\""
10005030-52 = "ใช่แล้ว! จริงด้วยสิ ที่คุณครูพูดมาก็ดูสมเหตุสมผลดีนะ"
10005030-53 = "ใช่แล้ว! จริงด้วยสิ ที่คุณครูพูดมาก็ดูสมเหตุสมผลดีนะ"
10005030-54 = "สมกับเป็นคุณครูจริงๆ เป็นความเห็นที่ใช้ได้เลย ถึงจะไม่รู้ชื่อแต่ก็คงจะพอเดาได้บ้างสินะ"
10005030-55 = "เพราะถึงยังไง... ยัยชิโระอุซางิก็เป็นคนที่โดดเด่นอยู่ทีเดียว"
10005030-56 = "นี่! ได้ยินแล้วใช่มั้ย? เราจะอธิบายลักษณะของยัยนั่นให้ฟัง ตั้งใจฟังดีๆ ล่ะ"
10005030-57 = "อย่าคิดจะเล่นตุกติกอะไรเชียว เข้าใจมั้ย?!"
10005030-59 = "เฮือกกก...!"
10005030-60 = "เอารูปให้ดูน่าจะดีกว่าอธิบายเป็นคำพูดนะคะ นี่ค่ะ..."
10005030-64 = "ดูรูปนี้สิคะ เธอหน้าตาเป็นแบบนี้ค่ะ"
10005030-65 = "เธอเป็นเด็กที่ชอบทำเสียงดัง เห็นแล้วน่าจะจำได้นะคะ ดูรูปแล้วลองนึกให้หน่อยนะคะ"
10005030-66 = "เป็นเด็กที่ชอบทำอะไรอ๊องๆ แล้วก็ชอบพูดไม่มีมารยาท ไร้สาระ... ลองนึกดูสิว่าเคยเจอใครทำนองนี้#nบ้างมั้ย"
10005030-70 = "อืม... คนหน้าตาอย่างนี้น่ะเหรอ...?"
10005030-71 = "พูดจาไร้สาระ... แถมดูไม่มีมารยาท...?"
10005030-75 = "...อ๊ะ!"
10005030-76 = "อ๊ะ...?"
10005030-77 = "...! เฮือก!"
10005030-78 = "เมื่อกี้ร้องว่า \"อ๊ะ\" ใช่มั้ย?"
10005030-79 = "ฮะฮ่าฮ่า จำได้แล้วละสิ"
10005030-80 = "ปะ... เปล่านะ ไม่ใช่แบบนั้นซะหน่อย! ฉันไม่รู้ ไม่รู้จริงๆ! ถึงจะรู้ก็บอกข้อมูลของแขกไม่ได้หรอก!"
10005030-81 = "วะฮ่ะฮ่ะฮ่า! คิดแล้วเชียวว่ายัยนี่ต้องรู้จัก"
10005030-82 = "ค่ะ ดูจากปฏิกิริยาแล้ว เธอคงนึกออกจริงๆ แล้วค่ะ"
10005030-83 = "ถ้างั้นก็เหลือแค่เค้นข้อมูลออกมา..."
10005030-88 = "...! เฮือก!"
10005030-89 = "ยะ...หยุดนะ...! พอได้แล้ว! อย่าใช้ความรุนแรงนะ! ห้ามใช้ความรุนแรงงง!!"
10005030-90 = "อา~ ที่ผ่านมาฉันหงุดหงิดจะตายอยู่แล้ว คงได้ระบายสักทีสินะ"
10005030-91 = "อย่าเพิ่งรีบหมดสติซะล่ะ แบบนั้นคงน่าเสียดายแย่"
10005030-92 = "แล้วถ้าจะโกรธละก็... โกรธตัวเองที่ดื้อด้านไม่ยอมพูดซะเถอะ เข้าใจไว้ซะ"
10005030-97 = "คุณครู..."
10005030-98 = "[s5] \"เนรุ... ห้ามใช้ความรุนแรงเด็ดขาดนะ\"\n[s6] \"มันต้องมีวิธีโน้มน้าววิธีอื่นอยู่สิ\""
10005030-99 = "โธ่เอ๊ย"
10005030-100 = "โธ่เอ๊ย"
10005030-101 = "ครูมาที่นี่เพื่อขัดขวางฉันรึไง? จะมาบอกให้คุยดีๆ กับยัยนี่เนี่ยนะ?"
10005030-102 = "ปกติแล้วงานที่พวกเราทำน่ะ แค่นี้ถือว่าเป็น \"การสนทนากันแบบราบรื่น\" หรอกนะ"
10005030-103 = "หรือว่ามีวิธีอื่นอีก? ฉันว่ายัยนี่ไม่น่าปริปากบอกอะไรเราแล้วนะ"
10005030-104 = "แถมพวกเราก็ไม่มีเวลาแล้วด้วย เรื่องนั้นครูก็เห็นด้วยใช่มั้ยล่ะ?"
10005030-105 = "เดี๋ยวก่อน..."
10005030-106 = "ถ้างั้นเรื่องเค้นข้อมูล ให้ฉันทำได้มั้ย?"
10005030-107 = "ว่าไงนะ...?"
10005030-108 = "คะ...?"
10005030-109 = "[s7] \"คารินเหรอ?\"\n[s8] \"มีวิธีอะไรดีๆ อยู่เหรอ?\""
10005030-110 = "อื้อ ฉันมีวิธีที่คิดเอาไว้อยู่น่ะ"
10005030-111 = "อื้อ ฉันมีวิธีที่คิดเอาไว้อยู่น่ะ"
10005030-112 = "ให้ฉันจัดการเอง ฉันมีวิธีแก้ปัญหาด้วยเสียงหัวเราะที่ไม่ทำให้เจ็บตัวอยู่ด้วย"
10005030-113 = "หา? แก้ปัญหาด้วยเสียงหัวเราะเหรอ? ทำยังไง...?"
10005030-114 = "ในสถานการณ์แบบนี้มีวิธีดีๆ แบบนั้นด้วยเหรอคะ?"
10005030-115 = "ได้ใช่มั้ยคุณครู?"
10005030-116 = "[s9] \"ถ้าแก้ปัญหาด้วยเสียงหัวเราะก็ดีน่ะสิ\"\n[s10] \"แน่นอน มาแก้ปัญหาด้วยเสียงหัวเราะกันเถอะ\""
10005030-117 = "เข้าใจแล้ว ถ้างั้น..."
10005030-118 = "เข้าใจแล้ว ถ้างั้น..."
10005030-123 = "...! อะ...อะไรเนี่ย คิดจะทำอะไรของเธอ...?"
10005030-125 = "อะ...ออกไปห่างๆ เลยนะ"
10005030-126 = "ถึงจะใช้วิธีไหน ฉันก็ไม่มีทางบอกข้อมูลของแขก..."
10005030-127 = "อย่าง... เด็ด... ขาด...!"
10005030-128 = "...."
10005030-129 = "เฮือกกก!?"
10005030-132 = "ทำอะไรของเธอน่ะ... นี่...! พรืดดดด ฮ่าฮ่าฮ่า!!"
10005030-133 = "ยะ...หยุดนะ...! มันจั๊กจี้...! หยุดที!"
10005030-134 = "พอได้แล้ว! ขอร้องล่ะ...! ฮ่าฮ่า! วะฮะฮะฮ่าฮ่าฮ่า! ฮ่าฮ่า...! ฮะฮะฮ่าฮ่า...!!"
10005030-135 = "ฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!! ยะ...อย่านะ! หะ...ห้ามจี้ตรงนั้นนะ...!! หยุดนะ...! หยุด...! ฮะฮะฮ่าฮ่า...!!"
10005030-136 = "ยังสินะ..."
10005030-137 = "ฮืออ ฮะฮะฮะ! ฮะฮ่าฮ่า...!! ยะ...อย่า! ตรงนั้นไม่ได้...! ฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!!!"
10005030-142 = "ตายจริง..."
10005030-143 = "นี่มัน... ถ้าทำแบบนี้อาจจะได้ผลก็ได้นะคะ คารินนี่สุดยอดไปเลยนะคะ"
10005030-144 = "คิดไม่ถึงเลยว่า \"แก้ปัญหาด้วยเสียงหัวเราะ\" จะหมายถึงแบบนี้..."
10005030-145 = "..."
10005030-147 = "อ๊าาาาาา! ยะ...หยุดน้าาาา...! หยุดดดด! ฮะฮ่าฮ่า...!!"
10005030-148 = "หัวเราะดังเกินไปมั้ยเนี่ย"
10005030-149 = "แบบนี้เดี๋ยวก็โดนจับได้กันพอดี คงต้องจัดการขั้นเด็ดขาดแล้ว"
10005030-153 = "...!? อะ...อะไร...ฮ่ะฮะฮ่า! อุ๊บส์?!! อึ่ก!"
10005030-154 = "อืม... ตอนนี้ค่อยเงียบหน่อย ถ้างั้นจะเริ่มเค้นข้อมูลอีกรอบ..."
10005030-155 = "...? หา?"
10005030-156 = "ตายจริง คาริน...?"
10005030-157 = "อึ่ก! อุ๊บส์?! ฮึ่ก! อื้ออออ! อู้อู้...!"
10005030-158 = "อื้ออออ!"
10005030-159 = "อู้อู้...! อื้ออออ!"
10005030-160 = "อุ๊บส์?!"
10005030-165 = "ดะ...เดี๋ยวก่อน!"
10005030-166 = "แบบนี้มันแปลกๆ นะ เราต้องสอบสวนเอาข้อมูลแท้ๆ แล้วจะปิดปากทำไม?"
10005030-167 = "เราไม่ได้ใช้ความรุนแรงก็จริง แต่ฉันคิดว่าแบบนี้มันไม่ต่างจากการใช้ความรุนแรงเลยค่ะ"
10005030-168 = "นี่!"
10005030-169 = "แบบนี้มันอันตรายกว่าอีกไม่ใช่รึไง? ถ้าทำแบบนี้ไปเรื่อยๆ ยัยนี่อาจจะหมดสติไปเลยก็ได้นะ"
10005030-171 = "นั่นน่ะสิคะ ถ้างั้นก็ควรห้ามเธอนะคะ"
10005030-172 = "คาริน คาริน...? ฉันคิดว่าพอเท่านี้ดีกว่านะคะ..."
10005030-176 = "คาริน...?"
10005030-177 = "น่าจะไม่ได้ยินเพราะกำลังใช้สมาธิอยู่สินะ เดี๋ยวฉันไปห้ามเอง"
10005030-181 = "นี่ คาริน พอได้แล้ว เดี๋ยวก็เป็นลมไปพอดีหรอก"
10005030-182 = "อุ๊บส์?! อู้วววววว! อู้ๆๆ อู้วววว!"
10005030-187 = "อู้วววว~~~!!!!"
10005030-188 = "นี่ คาริน!"
10005030-189 = "นี่...!!"
10005030-190 = "...!? หะ...หืม!? อะไรน่ะ?"
10005030-191 = "เรียกฉันเหรอรุ่นพี่...?"
10005030-192 = "ใช่ ก็เรียกน่ะสิ เรียกตั้งหลายครั้งแล้วนะ"
10005030-193 = "ไปปิดปากแบบนั้นได้ไง แบบนี้ก็เค้นข้อมูลไม่ได้น่ะสิ"
10005030-194 = "แล้วถ้าแล้วยัยนั่นสลบไปละก็..."
10005030-195 = "เอ่อ... เอ๋...?"
10005030-199 = "ตายจริง..."
10005030-200 = "[s] \"...\""
10005030-204 = "อา..."
10005030-205 = "สลบไปแล้ว..."

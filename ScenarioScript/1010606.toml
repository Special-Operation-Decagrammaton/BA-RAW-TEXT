[translation]
1010606-1 = "I Heard You Like This"
1010606-2 = "Trinity Cathedral"
1010606-3 = "After talking to Sakurako on MomoTalk, I headed over to the Trinity Cathedral."
1010606-4 = "Kyaaah! Oh no, Sensei? You're here already?"
1010606-5 = "Emergency, emergency! Sakurako isn't ready yet!"
1010606-6 = "[s1] \"...Sakurako?\"\n[s2] \"The way you're speaking...\""
1010606-10 = "Ta-da! Idol Sakurako's here!"
1010606-11 = "As Sensei's idol, Sakurako cleared out the schedule for whole day, just for Sensei!"
1010606-12 = "What does Sensei want to do? Idol Sakurako wanna do anything with you!"
1010606-13 = "Just say the word, 'kay? Ah, but still..."
1010606-18 = "Sakurako"
1010606-19 = "[7cd0ff]   The Sisterhood[-]"
1010606-20 = "No!"
1010606-22 = "No! Lewd!"
1010606-24 = "No! Lewd! Things!"
1010606-26 = "No! Lewd! Things! Allowed! ♡"
1010606-29 = "[ns3] \"Wh-What the...?\"\n[ns4] \"T-Tell me what's going on first, Sakurako!\""
1010606-33 = "...?"
1010606-34 = "Hm... How strange."
1010606-35 = "The others assured me this would be effective. Was my methodology incorrect?"
1010606-36 = "After all, I didn't receive the desired response. There must have been something wrong..."
1010606-37 = "Hm?"
1010606-38 = "You'd like to hear what the others told me, in detail?"
1010606-39 = "Mm..."
1010606-40 = "*sigh* I suppose it can't be helped. Reflecting upon the events, until now..."
1010606-41 = "I'll tell you the truth, before the situation gets too out of hand."
1010606-42 = "Although, the truth is nothing too fantastical. We wanted you to have fun, Sensei."
1010606-43 = "[s5] \"Me...?\"\n[s6] \"Have...fun?\""
1010606-46 = "Yes. That's correct."
1010606-47 = "In recent events, you were a great help to both the Sisterhood and myself."
1010606-48 = "Which is why we all came to the agreement that we must repay you, in some way."
1010606-49 = "But we couldn't agree on how. After all, none of us know much about you as a person, Sensei."
1010606-50 = "What would you like? What brings you joy?"
1010606-51 = "There were some suggestions to help you with your work or do volunteer work together, as a sister would usually do."
1010606-52 = "But this was a special occasion. It seemed to require a fresh experience. And the result...well, you saw it yourself."
1010606-53 = "[s7] \"I see, so that's how you ended up there...\"\n[s8] \"And that's why you were waiting for me alone, Sakurako.\""
1010606-56 = "Yes. That's correct. The Sisters all collaborated and gave their own ideas."
1010606-57 = "So we prepared the scene, which included my costume, script, and courses of action. We even prepared an \"Idol Date Course\" for you."
1010606-61 = "Which would have included a few, teeny-tiny things I found in my online research."
1010606-62 = "[s9] \"(...Of course.)\"\n[s10] \"(Teeny-tiny...?)\""
1010606-65 = "Anyways, the Sisters all agreed, \"Sensei would definitely enjoy spending a day with an idol girl.\""
1010606-66 = "And, for some reason, I was chosen to carry out the plan."
1010606-67 = "I suppose it made sense for me be the one to thank you, as I'm the one who represents the Sisterhood."
1010606-68 = "But...it seems like I wasn't enough. My apologies."
1010606-69 = "[s11] \"...That's not the case at all. I really liked it.\"\n[s12] \"...Thank you, Sakurako. I'm really happy.\""
1010606-72 = "...Sensei? You truly don't need to force your enthusiasm."
1010606-73 = "...What? You're not forcing yourself? You mean it?"
1010606-74 = "I'm afraid I don't understand. You seemed rather troubled when you first saw me, so what part is it that brought you joy...?"
1010606-75 = "...The intent?"
1010606-76 = "Ah. The intent to show our gratitude."
1010606-77 = "Is that not something we express constantly? Don't we say that rather often?"
1010606-78 = "That's the only part of this entire situation that is business as usual."
1010606-79 = "I can only conclude that it's due to this costume."
1010606-80 = "Hm?"
1010606-81 = "The costume may be new, but the main point isn't quite that? What do you mean?"
1010606-82 = "...An event like this one is always a fresh experience? I'm not quite following."
1010606-83 = "[s13] \"It's okay that you don't understand now.\"\n[s14] \"It's something that adults feel.\""
1010606-86 = "Umm... Is that so...?"
1010606-90 = "Heehee. Well, fine. I see no reason to challenge your sentiment. And I do feel rather relieved, hearing that."
1010606-91 = "Heehee... Heehee..."
1010606-92 = "Heeheeheehee..."
1010606-93 = "[s15] \"...Sakurako?\"\n[s16] \"Your face suddenly...?\""
1010606-96 = "Then... I'll take your words honestly and..."
1010606-97 = "...Sensei?"
1010606-98 = "From now on, it's your special time with Idol Sakurako!"
1010606-99 = "We're gonna burn up so hot that you can't think of anything else, so brace yourself! ♡"
1010606-101 = "Afterwards, I enjoyed the special idol date course(?) that Sakurako and the Sisterhood prepared together."
1010606-102 = "Although most of it was a bit strange for a supposed date with an idol, we still had a really fun time."

[translation]
1010606-1 = "ได้ยินมาว่าชอบแบบนี้ค่ะ"
1010606-2 = "มหาวิหารทรีนิตี้"
1010606-3 = "(คุณครูได้รับการติดต่อจากซากุระโกะ จึงไปหาที่มหาวิหารทรีนิตี้)"
1010606-4 = "อ๊ะ คุณครู~! มาแล้วเหรอคะเนี่ย?"
1010606-5 = "เป็นเรื่องแล้วสิ เรื่องใหญ่ด้วย! ก็ซากุระโกะจังยังเตรียมตัวไม่เสร็จเลย!"
1010606-6 = "[s1] \"คุณซากุระโกะ... แปลกๆ ไปหรือเปล่า?\"\"\n[s2] \"ทำไมพูดไม่เหมือนเดิมล่ะ...\""
1010606-10 = "แต่นแต๊น~! ไอดอลซากุระโกะจัง มาแล้ว!!"
1010606-11 = "วันนี้ฉันเคลียร์ตารางงานทั้งหมด~ เพื่อมาเป็นไอดอลของคุณครูโดยเฉพาะ!"
1010606-12 = "คุณครูอยากทำอะไรเหรอ~? ไอดอลซากุระโกะจะทำด้วยทุกอย่างเลย!"
1010606-13 = "บอกมาได้เลย~ อ๊ะ แต่ว่า..."
1010606-18 = "ซากุระโกะ"
1010606-19 = "[7cd0ff]ชมรมซิสเตอร์[-]"
1010606-20 = "อะไรที่มีลับลมคมในน่ะ~"
1010606-22 = "อะไรที่มีลับลมคมในน่ะ~ ไม่~"
1010606-24 = "อะไรที่มีลับลมคมในน่ะ~ ไม่~ ได้~"
1010606-26 = "อะไรที่มีลับลมคมในน่ะ~ ไม่~ ได้~ นะคะ~♡"
1010606-29 = "[ns3] \"อะ... อะไรกันน่ะ...?\"\n[ns4] \"ชะ... ช่วยอธิบายสถานการณ์ก่อนได้มั้ย ซากุระโกะจัง!\""
1010606-33 = "...?"
1010606-34 = "อืม... น่าแปลกจังเลยค่ะ"
1010606-35 = "ทุกคนบอกว่าทำแบบนี้จะโอเคแล้วแท้ๆ... หรือว่าฉันทำอะไรผิดไปคะ?"
1010606-36 = "คุณครูไม่ควรมีปฏิกิริยาแบบนี้สิ ฉันทำอะไรผิดตั้งแต่ตรงไหนนะ..."
1010606-37 = "คะ...?"
1010606-38 = "อยากรู้ว่าทุกคนมีความคิดเห็นยังไงเหรอคะ? อยากรู้อย่างละเอียดด้วย?"
1010606-39 = "อืม..."
1010606-40 = "ฮู่ว งั้นก็ช่วยไม่ได้นะคะ ถ้าให้คิดถึงเรื่องที่ผ่านมาจนถึงตอนนี้..."
1010606-41 = "ในเมื่อเป็นอย่างนี้แล้ว ฉันก็ควรบอกคุณครูตามตรงก่อนที่เรื่องมันจะเลวร้ายไปกว่านี้ค่ะ ฉันบอกก็ได้ค่ะ"
1010606-42 = "นี่ไม่ใช่เรื่องพิเศษอะไรมากหรอกค่ะ ฉันก็แค่อยากทำให้คุณครูสนุกน่ะค่ะ"
1010606-43 = "[s5] \"ทำเพื่อครูเหรอ...?\"\n[s6] \"ให้ครูสนุกงั้นเหรอ?\""
1010606-46 = "ค่ะ ใช่ค่ะ"
1010606-47 = "ก็ที่ผ่านมา คุณครูช่วยเหลือฉันและชมรมซิสเตอร์อย่างสุดกำลังเลยนี่คะ"
1010606-48 = "ทุกคนมีความเห็นเป็นเอกฉันท์ว่าเราควรต้องทำอะไรเพื่อเป็นการตอบแทนคุณครูบ้าง..."
1010606-49 = "แต่ปัญหาก็คือ 'เราควรทำอะไรดี' ค่ะ เพราะพวกเราทุกคนก็ไม่ได้รู้จักคุณครูดีนี่คะ"
1010606-50 = "พวกเราเลยไม่รู้ว่าคุณครูชอบอะไร และไม่รู้ว่าต้องทำอะไรให้ คุณครูถึงจะดีใจ..."
1010606-51 = "ที่จริงฉันก็อาจจะไปช่วยงานคุณครูเหมือนอย่างที่ซิสเตอร์คนอื่นทำ หรือว่าไปชวนกันทำงานจิตอาสา#nด้วยกันให้รู้สึกสดชื่น..."
1010606-52 = "แต่ครั้งนี้ฉันอยากทำอะไรใหม่ๆ ที่เข้ากับงานที่เพิ่งผ่านมามากกว่าค่ะ และผลลัพธ์ที่ได้ก็คือ..."
1010606-53 = "[s7] \"ก็เลยมาเป็นซากุระโกะจังอย่างนี้สินะ...\"\n[s8] \"ที่นี่ก็เลยมีแค่ซากุระโกะคนเดียวสินะ\""
1010606-56 = "ค่ะ ใช่ค่ะ ฉันรวบรวมความคิดเห็นจากซิสเตอร์ทุกคน แล้วก็ขอความร่วมมือจากคุณครูในวันนี้ค่ะ"
1010606-57 = "ทั้งอีเวนต์ ชุดที่ฉันใส่ การกระทำและคำพูดของฉัน รวมถึง 'คอร์สการเดตกับไอดอล' ที่พวกฉันเตรียม#nมาไว้ให้ซึ่งคุณครูจะได้พบหลังจากนี้"
1010606-61 = "บางส่วนฉันไปหาข้อมูลจากในอินเทอร์เน็ตมานิดหน่อยด้วยค่ะ..."
1010606-62 = "[s9] (กะไว้แล้วเชียว...)\n[s10] (นิดหน่อยแน่นะ...?)"
1010606-65 = "ซิสเตอร์ทุกคนสรุปความคิดเห็นกันว่า \"ถ้าได้อยู่กับเด็กสาวไอดอลทั้งวัน คุณครูจะต้องดีใจแน่นอน\""
1010606-66 = "และหลังจากนั้น ฉันก็ได้รับเลือกให้มาเป็นตัวแทนของวันนี้ค่ะ..."
1010606-67 = "บางทีที่ฉันถูกเลือก อาจเป็นเพราะนี่คือการแสดงความขอบคุณคุณครูในนามของชมรมซิสเตอร์ ฉันจึงต้องเป็นตัวแทน..."
1010606-68 = "แต่ว่า... ฉันคงยังไม่ดีพอสินะคะ... ขอโทษด้วยค่ะ"
1010606-69 = "[s11] \"ไม่ใช่อย่างนั้นหรอก ครูชอบมากเลยนะ\"\n[s12] \"ขอบใจนะ ซากุระโกะจัง ครูดีใจมากเลยละ\""
1010606-72 = "คุณครู...? ไม่ต้องแสร้งทำเป็นมีความสุขให้ฉันดีใจก็ได้ค่ะ..."
1010606-73 = "คะ...? ไม่ได้แสร้งทำ... แต่มาจากใจจริงงั้นเหรอคะ?"
1010606-74 = "อืม ไม่เห็นเข้าใจเลยค่ะ เมื่อกี้คุณครูยังทำท่าทีเหมือนลำบากใจอยู่เลย แต่จู่ๆ ก็เปลี่ยนมาดีใจซะงั้น..."
1010606-75 = "เจตนาเหรอคะ..."
1010606-76 = "อ่อ.. อ้อ... หมายถึงซาบซึ้งในเจตนาที่พวกเราอยากขอบคุณสินะคะ"
1010606-77 = "แต่นั่นเป็นสิ่งที่พวกเรารู้สึกอยู่ตลอดค่ะ... ฉันไม่ได้บอกคุณครูบ่อยๆ เหรอคะ?"
1010606-78 = "สำหรับเรื่องนั้นน่ะ ฉันรู้สึกว่าไม่มีอะไรแปลกใหม่ค่ะ"
1010606-79 = "แต่คงเป็นเพราะชุดนี้จริงๆ สินะ..."
1010606-80 = "คะ...?"
1010606-81 = "ชุดก็เรื่องหนึ่ง แต่สิ่งสำคัญคือความตั้งใจเหรอคะ...? หมายความว่ายังไงคะ...?"
1010606-82 = "อีเวนต์แบบนี้เป็นเรื่องแปลกใหม่อยู่เสมองั้นเหรอคะ...? ยังไงนะ... ฉันไม่เห็นเข้าใจเลยค่ะ..."
1010606-83 = "[s13] \"ตอนนี้ยังไม่ต้องเข้าใจก็ได้\"\n[s14] \"มันก็แค่ความแปลกใหม่ที่ผู้ใหญ่รู้สึกน่ะ\""
1010606-86 = "อืม... งั้นเหรอคะ..."
1010606-90 = "ฮุฮุ ก็ได้ค่ะ ฉันไม่ควรสงสัยในสิ่งที่คุณครูพูด และถ้าคุณครูพูดอย่างนั้นฉันก็โล่งใจค่ะ"
1010606-91 = "ฮุฮุ... ฮุฮุฮุ..."
1010606-92 = "ฮุฮุฮุฮุ..."
1010606-93 = "[s15] \"คุณซากุระโกะ...?\"\n[s16] \"ทำไมทำหน้าแบบนั้นล่ะ...?\""
1010606-96 = "ถ้างั้น... ฉันจะยอมรับสิ่งที่คุณครูพูด และจากนี้ไป..."
1010606-97 = "นี่คือ..."
1010606-98 = "เวลาที่คุณครูจะได้อยู่กับไอดอลซากุระโกะจัง!"
1010606-99 = "ฉันจะทำให้คุณครูสนุกจนลืมคิดเรื่องอื่นไปเลยละ เตรียมตัวไว้ได้เลย~!♡"
1010606-101 = "(หลังจากนั้นคุณครูก็เพลิดเพลินกับคอร์สเดตกับไอดอลสุดพิเศษที่ซากุระโกะกับชมรมซิสเตอร์เตรียม#nเอาไว้ให้)"
1010606-102 = "(ถึงมันจะดูไม่เหมือนเป็นการเดตกับไอดอลเท่าไร แต่คุณครูก็ได้มีช่วงเวลาที่เพลิดเพลิน)"

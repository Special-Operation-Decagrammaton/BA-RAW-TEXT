[translation]
1010606-1 = "聽說這是您的喜好"
1010606-2 = "三一大教堂"
1010606-3 = "（接到櫻子的聯絡後，出發前往了三一大教堂）"
1010606-4 = "啊啊～老師～？這麼快就來了嗎？"
1010606-5 = "真糟糕！櫻子醬還沒有準備好耶！"
1010606-6 = "[s1]「……櫻子同學？」\n[s2]「你的語氣怎麼跟平時不太一樣……」"
1010606-10 = "鏘～！偶像櫻子醬，登場！！"
1010606-11 = "為了當老師的專屬偶像，我特地把一整天的行程通通都排開了唷！"
1010606-12 = "老師想做什麼呀～？#n偶像櫻子醬什麼都願意做哦！"
1010606-13 = "請儘管開口吧～#n啊，不過……"
1010606-18 = "櫻子"
1010606-19 = "[7cd0ff]修女會[-]"
1010606-20 = "壞壞的事情～"
1010606-22 = "壞壞的事情～不"
1010606-24 = "壞壞的事情～不，行"
1010606-26 = "壞壞的事情～不，行，唷♡"
1010606-29 = "[ns3]「什，什麼……？」\n[ns4]「可，可以麻煩你先解釋一下情況嗎，櫻子醬！」"
1010606-33 = "……？"
1010606-34 = "唔嗯……真奇怪。"
1010606-35 = "大家明明說這樣還不錯的……是我哪裡做錯了嗎？"
1010606-36 = "老師怎麼會是這種反應呢？#n究竟是哪裡出了問題……"
1010606-37 = "……咦？"
1010606-38 = "您想知道大家具體提供了什麼意見？"
1010606-39 = "嗯……"
1010606-40 = "呼，沒辦法了。#n考慮到之前發生過的情況……"
1010606-41 = "既然事已至此，我看還是在事情變得更複雜之前，老實跟您交代清楚吧。"
1010606-42 = "其實也不是什麼大不了的事。#n我們只是想讓老師開心而已。"
1010606-43 = "[s5]「我……？」\n[s6]「想讓我開心？」"
1010606-46 = "沒錯，正是如此。"
1010606-47 = "畢竟在這次的活動中，包含我在內，連修女會的大家也受了老師不少的幫助。"
1010606-48 = "雖然大家都同意要報答老師……"
1010606-49 = "但問題在於「究竟該怎麼做」。#n畢竟我們對老師的了解終究有限……"
1010606-50 = "不清楚您究竟喜歡什麼，或者該怎麼做才能讓您高興……"
1010606-51 = "雖然也可以像其他修女們一樣，#n偶爾去協助您處理工作，或者陪您一起做義工等等……"
1010606-52 = "不過這畢竟是個難得的機會，我希望能用符合這次活動主題的方式來答謝您。#n所以才……"
1010606-53 = "[s7]「原來是這麼回事啊……」\n[s8]「所以這裡才只有你一個人啊。」"
1010606-56 = "沒錯，正是如此。#n我負責收集修女們的意見，而他們則幫我準備了這些。"
1010606-57 = "場地、服裝、台詞，還有動作……包括待會為老師準備的「偶像約會環節」也是。"
1010606-61 = "雖然只有一小部分，但我在網路上搜尋到的知識也幫上了一點忙……"
1010606-62 = "[s9]（……我想也是）\n[s10]（真的只有一點嗎……？）"
1010606-65 = "大家都說「如果能和少女偶像共度一天，老師肯定也會很高興」……"
1010606-66 = "……於是在得出了這樣的結論之後，我又不知為何被大家推選為代表。"
1010606-67 = "雖然大家之所以這麼做，或許是希望我代表整個修女會向您道謝……"
1010606-68 = "但是……我果然還是沒能做到。非常抱歉。"
1010606-69 = "[s11]「……別這麼說。我很喜歡哦。」\n[s12]「……謝謝你，櫻子醬。我真的很開心。」"
1010606-72 = "老師……？#n您不必刻意表現出開心的樣子……"
1010606-73 = "……嗯？#n這不是刻意表現出來的？是真的覺得很開心？"
1010606-74 = "唔嗯，我其實並不是很明白。#n您剛才明明還一臉困擾，究竟是什麼原因讓您突然感到開心呢……"
1010606-75 = "……目的？"
1010606-76 = "啊，啊啊……是指為了感謝您嗎？"
1010606-77 = "可是我們其實一直都很感謝您……也經常向您道謝不是嗎？"
1010606-78 = "這點應該跟平時沒什麼差別才對……"
1010606-79 = "所以果然是因為這套衣服……"
1010606-80 = "……嗯？"
1010606-81 = "服裝確實不一樣沒錯，但關注的焦點也有所不同……？#n這是什麼意思……"
1010606-82 = "……這種活動總是能讓人感到驚喜？#n為什麼呢……我實在不太理解……"
1010606-83 = "[s13]「你現在不理解也沒關係。」\n[s14]「因為這是只有大人才能體會到的新鮮感。」"
1010606-86 = "唔……這樣啊……"
1010606-90 = "呵呵，好吧，我也沒有理由懷疑老師說的話。#n既然您都這麼說了，那我就放心了。"
1010606-91 = "呵呵……呵呵呵……"
1010606-92 = "呵呵呵呵……"
1010606-93 = "[s15]「……櫻子同學？」\n[s16]「你的表情怎麼突然……？」"
1010606-96 = "那麼……我就接受老師的說法……"
1010606-97 = "……老師？"
1010606-98 = "從現在開始，就是老師跟偶像櫻子醬的時間囉！"
1010606-99 = "我會讓老師著迷到無法思考其他事情，要做好覺悟唷～♡"
1010606-101 = "（之後便和櫻子一起，度過了修女會準備的特別偶像約會(？)環節……）"
1010606-102 = "（雖然其中被硬塞了許多奇怪的要素，#n　導致不太符合偶像約會原本的立意，不過依然是一段非常快樂的時光）"

[translation]
11434010-1 = "Normal Ending;\"Looking Back\""
11434010-2 = "...And that's pretty much what happened."
11434010-3 = "So, did they post the results yet? Seems like they should have by now..."
11434010-4 = "Hm. Hold on, I'll check. It's loading..."
11434010-5 = "Um..."
11434010-6 = "Hey, you can't just say \"Um...\" and leave it at that! That's illegal! Haven't you heard of the \"Um\" ban?!"
11434010-7 = "Ahahaha..."
11434010-11 = "...Huh?"
11434010-13 = "*gasp*"
11434010-14 = "Everybody, look! Our names are on the board!"
11434010-15 = "What?! Really?! Then we did it? It means we did it, right?!"
11434010-16 = "Wow, we really did it. I wasn't sure if..."
11434010-17 = "Had we failed at the end, it would've been poor storytelling."
11434010-18 = "And there you go again."
11434010-20 = "Regardless: on your feet, everyone. This is no time to be idle."
11434010-21 = "Natsu? Where are you headed all of a sudden...?"
11434010-22 = "You ask where? Isn't it obvious?"
11434010-27 = "...Yeah. No more stealth, we can march on in like we own the place."
11434010-28 = "Ah, yeah."
11434010-30 = "H-Huh...? March in where...? Hey, everybody?"
11434010-36 = "For semla!!"

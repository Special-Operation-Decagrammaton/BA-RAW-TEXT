[translation]
11434010-1 = "ตอนจบแสนธรรมดา;\"ถ้ามองย้อนกลับไป...\""
11434010-2 = "รู้สึกเดจาวูจัง..."
11434010-3 = "เป็นยังไงบ้าง? ประกาศผลรึยัง? นี่ก็น่าจะถึงเวลาแล้วนะ..."
11434010-4 = "อืม... รอเดี๋ยวนะ หน้านี้โหลดนานชะมัด..."
11434010-5 = "ไม่นะ..."
11434010-6 = "จริงๆ เลย! สถานการณ์แบบนี้ควรจะพูดคำว่า 'ไม่นะ' รึไง! ห้ามพูดคำว่า 'ไม่นะ' ออกมานะ ห้ามเด็ดขาด!?"
11434010-7 = "อะฮ่าฮ่าฮ่า..."
11434010-11 = "ไม่นะ...?"
11434010-13 = "......!!"
11434010-14 = "ทุกคนมาดูนี่สิ! นี่มันชื่อของพวกเรา!!"
11434010-15 = "ว่าไงนะ!? จริงเหรอ?? แปลว่าเราผ่านการคัดเลือกเหรอ? เป็นแบบนั้นใช่มั้ย!?"
11434010-16 = "จริงด้วยแฮะ... บอกตามตรงว่าตอนแรกฉันเชื่อครึ่งไม่เชื่อครึ่งด้วย..."
11434010-17 = "ก็ถ้าไม่จบแบบนี้ เรื่องราวที่ผ่านมาก็ไร้ค่าน่ะสิ"
11434010-18 = "พูดอะไรแปลกๆ อีกแล้ว..."
11434010-20 = "แต่ถ้าเราผ่านการคัดเลือกจริง นี่ก็ไม่ใช่เวลามาอยู่อย่างนี้นะ ทุกคนลุกขึ้นเดี๋ยวนี้"
11434010-21 = "นัตสึ...? จะไปไหนเหรอ...?"
11434010-22 = "ถามมาได้ ลืมสโลแกนของพวกเราแล้วรึไง?"
11434010-27 = "จริงสิ ตอนนี้เราคงบุกไปที่นั่นอย่างสง่าผ่าเผยได้แล้ว"
11434010-28 = "เป็นเรื่องนั้นสินะ"
11434010-30 = "หะ... หืม...? บุกไปงั้นเหรอ? บุกไปไหน?"
11434010-36 = "ไปเอาเซมล่าน่ะสิ!!"

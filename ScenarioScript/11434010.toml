[translation]
11434010-1 = "普通結局;「……回頭一看。」"
11434010-2 = "……以前也發生過類似的事呢。"
11434010-3 = "所以怎麼樣？結果出爐了嗎？應該差不多了吧……"
11434010-4 = "唔嗯……先等一下，我馬上確認。現在還在載入……"
11434010-5 = "咦……"
11434010-6 = "吼，真是的！怎麼能在這種情況下說「咦」呢。#n你不知道這種時候「咦」是禁語嗎？禁語！"
11434010-7 = "啊哈哈哈……"
11434010-11 = "……咦？"
11434010-13 = "……！！"
11434010-14 = "大家快看！名字，是我們的名字！！"
11434010-15 = "什麼！？真的嗎！？所以我們通過了嗎？這是通過的意思吧！？"
11434010-16 = "居然真的通過了。#n老實說我本來還有點半信半疑……"
11434010-17 = "要是走到這一步還沒通過，故事可就要爛尾了。"
11434010-18 = "又在講一些奇怪的話……"
11434010-20 = "總之如果這上面寫的是真的，那我們可不能繼續坐在這裡。#n大家快起來吧。"
11434010-21 = "……夏醬？這麼突然要去哪裡……？"
11434010-22 = "我們的目的地……應該不必我多說了吧。"
11434010-27 = "……也對。現在終於能名正言順地闖進去了。"
11434010-28 = "原來如此。我明白了。"
11434010-30 = "咦，咦……闖進去？#n大家是要闖進哪裡呢……？"
11434010-36 = "……去拿女王泡芙吧！！"

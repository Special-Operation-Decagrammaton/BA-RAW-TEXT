[translation]
1007203-1 = "ปฏิบัติการหาเสบียงในทะเล 2"
1007203-2 = "(คุณครูมาที่ท่าเรือหลังได้รับข้อความจากซากิ)"
1007203-6 = "ฮุฮุ... ฮุฮุฮุ..."
1007203-10 = "อ๊ะ มาแล้วเหรอคุณครู"
1007203-11 = "[s] \"ดูอารมณ์ดีจังเลยนะ\""
1007203-12 = "อืม ตอนเช้าฉันไปช่วยพวกชาวบ้านเก็บของในโกดังเก่ามา แล้วก็เจอของดีๆ เข้าน่ะ"
1007203-13 = "นั่นก็คือ..."
1007203-18 = "เจ้าลันจ์ไมน์ไงล่ะ!"
1007203-19 = "[s] \"อะไรเนี่ย...?\""
1007203-20 = "หืม? คุณครูเพิ่งเคยเห็นอาวุธแบบนี้เหรอ?"
1007203-24 = "มันคืออาวุธติดรถถังที่สหพันธ์เฮียกคิยาโคเคยใช้ในสมัยก่อนน่ะ เป็นแท่งไม้ยาวติดระเบิดทำลายรถ#nถังไว้ที่ปลาย เพื่อทำลายรถถังที่เข้ามาใกล้น่ะ"
1007203-25 = "ได้ยินว่าเป็นอาวุธที่ใช้กันอย่างแพร่หลายทั่วทั้งเขตเฮียกคิยาโคในช่วงยุคแห่งความโกลาหล เพราะ#nราคาถูกและทำขึ้นมาไม่ยาก..."
1007203-26 = "แต่ก็อย่างที่เห็นแหละ อาวุธชนิดนี้จะใช้ได้มีประสิทธิภาพสูงสูดในตอนที่เข้าใกล้รถถังเท่านั้น เพราะ#nงั้นเลยเป็นอาวุธที่มีข้อด้อยอยู่หลายๆ อย่าง"
1007203-27 = "แต่ถึงยังไง มันก็เป็นอาวุธที่พอแทงไปแล้วก็ระเบิดเลย นับว่าเป็นอาวุธที่บ้าระห่ำมากชนิดหนึ่งเลยละ"
1007203-28 = "นึกไม่ถึงเลยว่าอาวุธล้ำค่าแบบนี้จะถูกทิ้งไว้ในโกดังของหมู่บ้านชาวประมง..."
1007203-29 = "แถมพวกชาวบ้านก็บอกว่าเป็นของที่คิดจะเอาไปทิ้งอยู่แล้ว ก็เลยให้มาแบบฟรีๆ เลย วันนี้โชคดีจริงๆ#nเลย!"
1007203-30 = "[s] \"ว่าแต่ว่าคิดจะเอาไปใช้ที่ไหนเหรอ?\""
1007203-31 = "คุณครู เคยได้ยินคำว่า 'แบงสติ๊ก' หรือ 'พาวเวอร์เฮด' มั้ย?"
1007203-32 = "แบงสติ๊กเป็นปืนที่มีรูปร่างคล้ายกับฉมวกยาวๆ ที่นักประดาน้ำมักจะใช้กัน เพราะงั้นถ้าใช้เจ้านี่ละก็#nไม่ว่าจะเป็นปลาตัวใหญ่ๆ อย่างฉลาม หรือวาฬ ก็เอาชนะได้ในนัดเดียวแน่นอน"
1007203-33 = "เพราะลันจ์ไมน์กับแบงสติ๊กเป็นอาวุธที่ทำงานคล้ายๆ กัน..."
1007203-34 = "[s] \"อย่าบอกนะ...\""
1007203-35 = "อื้อ! ฉันจะใช้ลันจ์ไมน์ช็อตปลาที่อยู่ในรัศมีรอบตัวน่ะ!"
1007203-36 = "ตอนไปดำน้ำครั้งก่อน ฉันลองว่ายดูรอบๆ แล้ว ตรงแถวๆ พื้นทะเลมีปลาตัวใหญ่เท่าท่อนซุงอยู่เต็มไป#nหมดเลย"
1007203-37 = "การจับปลาด้วยมือเปล่าอาจเป็นเรื่องยากก็จริง แต่ว่า... ถ้าใช้ดินปืนแค่นิดหน่อยละก็ คงจะทำให้ปลา#nตัวใหญ่ๆ แบบนั้นสลบเหมือดไปได้ง่ายๆ เลยละ"
1007203-38 = "[s1] \"ถ้าไปได้สวยก็ดีสิ...\"\n[s2] \"มันอันตรายเกินไปรึเปล่า?\""
1007203-41 = "ไม่เป็นไรหรอก เดียวฉันจะต้องปรับปริมาณดินระเบิดที่ใช้เอาน่ะ..."
1007203-42 = "สำหรับนักเรียนของ SRT ที่ฝึกฝนการปฏิบัติภารกิจการระเบิดใต้น้ำมานับไม่ถ้วนแล้ว เรื่องแค่นี้น่ะ#nสบายมาก"
1007203-47 = "ถ้างั้น... เดี๋ยวฉันมานะ!"
1007203-57 = "(หลังจากนั้นครู่หนึ่ง...)"
1007203-62 = "ตู้ม ตู้มมม ตู้มมมมม!"
1007203-77 = "[ns] \"ซะ...ซากิ เป็นอะไรรึเปล่า?\""
1007203-78 = "ฉันไม่เป็นไร..."
1007203-79 = "แต่พวกปลาที่จะจับมัน..."
1007203-83 = "ปลาโดนแรงอัดระเบิดจนกลายเป็นชิ้นเล็กชิ้นน้อยไปแล้ว..."
1007203-84 = "...แบบนี้คงเอามากินไม่ได้แล้วละ"
1007203-85 = "ปัญหามันคืออะไรกันแน่? ฉันคำนวณระยะห่างได้สมบูรณ์แบบแล้วแท้ๆ...!"
1007203-86 = "[s] \"ระเบิดมันแรงไปรึเปล่า?\""
1007203-87 = "ดูเหมือนจะเป็นแบบนั้น ถึงจะลดปริมาณดินปืนที่ใช้ไปแล้ว แต่ยังไงมันก็เป็นอาวุธที่ทำมาเพื่อระเบิด#nเจาะเกราะรถถังนี่นะ..."
1007203-88 = "คงไม่เหมาะกับการเอาไปแทงปลาตรงๆ แบบนี้..."
1007203-89 = "[s3] \"ถ้าจะเอาไปแทงปลา... ใช้ฉมวกดีมั้ย?\"\n[s4] \"ครูว่าใช้ฉมวกธรรมดาแทนดีกว่ามั้ย?\""
1007203-94 = "เรื่องนั้น...!"
1007203-95 = "แบบนั้น..."
1007203-96 = "มันก็คง... จะดีกว่าแหละเนอะ"
1007203-97 = "ถ้ายืมฉมวกมาตั้งแต่แรกก็คงจับปลามากินได้จนอิ่มแล้วแท้ๆ แต่ฉันมัวแต่ทุ่มความสนใจไปที่ระเบิด จนมองข้ามวิธีพื้นฐานไป..."
1007203-98 = "ทำไมฉันถึงได้งี่เง่าแบบนี้เนี่ย!"
1007203-100 = "(...หลังจากนั้นคุณครูก็พาซากิที่ดูห่อเหี่ยวไปที่ตลาด และซื้อข้าวหน้าปลาดิบให้เป็นการปลอบใจ)"
1007203-101 = "(ถึงซากิจะดูไม่ค่อยอยากอาหารเท่าไร แต่ก็กินข้าวหน้าปลาดิบจนหมดจาน...)"

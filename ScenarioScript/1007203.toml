[translation]
1007203-1 = "水中補給作戰（２）"
1007203-2 = "（收到咲希的聯絡後，前往了之前去過的碼頭）"
1007203-6 = "呵呵，呵呵呵……"
1007203-10 = "啊，老師。歡迎你來。"
1007203-11 = "[s]「你看起來心情不錯。」"
1007203-12 = "今天早上，我幫忙整理了一個老舊的倉庫，結果發現了一個厲害的東西。"
1007203-13 = "那就是……"
1007203-18 = "這個刺突爆雷！"
1007203-19 = "[s]「……刺突，爆雷？」"
1007203-20 = "什麼嘛老師，你不知道嗎？"
1007203-24 = "這是以前百鬼夜行聯合學園使用過的反戰車武器，在長竿上加裝了反戰車高爆彈。#n能夠在近距離刺向對方的戰車使其爆炸。"
1007203-25 = "因為操作簡單且成本低廉，所以在百鬼夜行混亂的戰國時代似乎經常使用……"
1007203-26 = "不過要接近戰車本來就很困難，因此據說並沒有獲得多大的成果。"
1007203-27 = "但是「刺了就會爆炸」這種單純明快的設計，獲得了部分愛好者的心。"
1007203-28 = "話又說回來，這麼貴重的武器居然會沉睡在漁村的倉庫裡……"
1007203-29 = "而且似乎是打算丟掉的東西，所以村民們就免費讓給我了……今天真走運！"
1007203-30 = "[s]「但這個武器要用在哪裡呢？」"
1007203-31 = "老師，你聽說過獵鱷爆杆嗎？"
1007203-32 = "是一種潛水員用的魚叉型槍。#n只要在水中發射，就連鯊魚或鯨魚這種大型生物都能一擊搞定。"
1007203-33 = "而刺突爆雷的原理和獵鱷爆杆是一樣的。"
1007203-34 = "[s]「該不會……」"
1007203-35 = "沒錯！我要用這個刺突爆雷的衝擊力來炸暈那些魚！"
1007203-36 = "上次潛水的時候，我發現了像樹幹那麼大的魚。"
1007203-37 = "那麼大的魚用普通的魚叉是很難制服的……#n不過只要借助火藥的力量，無論尺寸有多大都不成問題。"
1007203-38 = "[s1]「會那麼順利嗎……？」\n[s2]「感覺有點危險……」"
1007203-41 = "沒事。當然炸藥的量會有所調整。"
1007203-42 = "我已經經歷過無數次水中的爆破訓練了。#n身為SRT的特殊幹員，不可能會抓不到魚吧！"
1007203-47 = "……我去去就回！"
1007203-57 = "（不久後……）"
1007203-62 = "（咚哐──！）"
1007203-77 = "[ns]「咲，咲希……你沒事吧！？」"
1007203-78 = "我沒事……"
1007203-79 = "但魚……"
1007203-83 = "被捲入了爆炸……變得支離破碎……"
1007203-84 = "……這樣不能吃了吧。"
1007203-85 = "問題到底出在哪裡？炸藥應該計算得很完美才對啊……！"
1007203-86 = "[s]「可能是武器本來的威力就……」"
1007203-87 = "……原來如此。#n雖然已經經過調整，但它本來就是為了貫穿戰車裝甲而製造的武器……"
1007203-88 = "用在魚身上是個錯誤的決定啊……"
1007203-89 = "[s3]「要叉魚的話……」\n[s4]「用普通的魚叉不就行了嗎……？」"
1007203-94 = "唔呃……！"
1007203-95 = "這，這個嘛……"
1007203-96 = "你說的……是，是沒錯啦……"
1007203-97 = "一開始就借魚叉來用的話，現在抓到的魚早就多到兩個人都吃不完了……#n居然會因為被稀有的武器吸引注意力，反而忽略了最基本的事情……"
1007203-98 = "我這個笨蛋……！！"
1007203-100 = "（……之後，帶著垂頭喪氣的咲希到魚市場，請他吃了海鮮丼飯）"
1007203-101 = "（雖然咲希起初看起來沒什麼食慾，最終卻吃得一粒米都不剩）"

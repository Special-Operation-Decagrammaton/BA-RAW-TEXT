[translation]
1007203-1 = "Underwater Supply Operation 2"
1007203-2 = "I met with Saki at the same dock from the other day..."
1007203-6 = "Ha. Haha... Hahaha..."
1007203-10 = "Ah, Sensei! There you are."
1007203-11 = "[s] \"You're in a good mood today.\""
1007203-12 = "Well, I was foraging through an old storage shed this morning, and I found something I can use."
1007203-13 = "May I present..."
1007203-18 = "A lunge mine!"
1007203-19 = "[s] \"A lunge who?\""
1007203-20 = "Oh, is this your first time seeing one, Sensei?"
1007203-24 = "This is an old anti-tank weapon. You put a bomb on the end of this pole, then you stick it into an enemy tank and explode it at close range."
1007203-25 = "They're easy to use and cheap to make, so they were popular during Hyakkiyako's Warring States Period."
1007203-26 = "As you can see, you need to get close to the tank to use it, so it has a lot of downsides as a weapon..."
1007203-27 = "But due to its spear-like design, it has an odd kind of fan base."
1007203-28 = "Why would an obscure weapon like this be left in a shed in a fishing village...?"
1007203-29 = "The shed's owner said they were going to toss it, so they let me keep it for free. It's my lucky day!"
1007203-30 = "[s] \"But what are you going to use it for?\""
1007203-31 = "Sensei, have you ever heard of a bangstick?"
1007203-32 = "It's a long, harpoon-like gun used by divers. It's powerful enough to take down sharks and whales."
1007203-33 = "The principle behind the bangstick is basically the same as a lunge mine..."
1007203-34 = "[s] \"You don't mean...\""
1007203-35 = "I'll use the lunge mine to stun the fish at close range!"
1007203-36 = "The other day, I saw lots of fish that were as big as logs down near the sea bottom."
1007203-37 = "It would be difficult to catch a fish like that by hand, but a little gunpowder should stun it in a pinch!"
1007203-38 = "[s1] \"I'm not so sure about this...\"\n[s2] \"Your plan is too dangerous.\""
1007203-41 = "It's fine! I just need to get the gunpowder load juuust right..."
1007203-42 = "I've gone on countless underwater demolition missions. This will be a snap for me."
1007203-47 = "I'll be back soon!"
1007203-57 = "And soon enough..."
1007203-62 = "*BOOM*"
1007203-77 = "[ns] \"Saki! Are you okay?!\""
1007203-78 = "I'm fine..."
1007203-79 = "But the fish I was after..."
1007203-83 = "...was completely obliterated."
1007203-84 = "There isn't anything left to eat..."
1007203-85 = "What went wrong here? My spacing was perfect..."
1007203-86 = "[s] \"Did you use too much firepower?\""
1007203-87 = "I guess so. I reduced the gunpowder, but this was designed to blow through a tank's armor, after all..."
1007203-88 = "I stabbed into the fish, but the explosion was too much for it..."
1007203-89 = "[s3] \"You STABBED into the fish...\"\n[s4] \"Can't you just use a regular harpoon?\""
1007203-94 = "I mean...!"
1007203-95 = "Ah..."
1007203-96 = "You're...right..."
1007203-97 = "I could have caught so many fish by now with a harpoon, but I was so focused on firepower that I didn't think of it..."
1007203-98 = "How could I be so stupid?"
1007203-100 = "Afterward, I took Saki to the fish market and bought her a sashimi bowl."
1007203-101 = "She said she wasn't hungry, but there wasn't even a grain of rice left when she was done eating..."

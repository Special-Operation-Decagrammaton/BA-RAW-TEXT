1007203-23 = "3;사키 수영복;01\n#3;m4\n#wait;1200"
1007203-24 = "3;사키 수영복;03;이건 말이지. 아주 오래전에 백귀야행 학원에서 사용하던 대전차병기로, 긴 막대 끝에 대전차 고폭탄을 달아서 근접한 전차를 격파할 수 있도록 만든 물건이야."
1007203-25 = "3;사키 수영복;02;조작이 간편하고 제작 단가가 저렴하기 때문에 혼란이 지속되던 백귀야행 학원의 전국시대에 종종 사용되었다고 하는데……"
1007203-26 = "3;사키 수영복;01;보다시피 전차에 근접해야만 효과를 볼 수 있기 때문에, 큰 성과는 거두지 못한 모양이야.\n#3;em;[반응]\n#3;m3"
1007203-27 = "3;사키 수영복;03;그래도 찌르면 폭발한다는 단순 명쾌한 구조 덕분에 묘한 마니아층이 있는 편이지."
1007203-28 = "3;사키 수영복;99;그런데 이런 귀한 무기가 어촌 마을의 창고에 버려져 있었다니……"
1007203-29 = "3;사키 수영복;07;게다가 주민 여러분도 버리려 했던 물건이라며, 공짜로 가져가라고 내주셨어. 오늘은 정말 운이 좋네!\n#3;em;[재잘]\n#3;hophop"
1007203-30 = "[s] \"그런데 이 무기는 어디에 쓰려고?\""
1007203-31 = "3;사키 수영복;03;선생님, 혹시 뱅스틱이라고 들어 본 적 있어?\n#3;em;[?]"
1007203-32 = "3;사키 수영복;02;뱅스틱은 잠수부들이 사용하는 긴 작살 모양의 총인데, 이 뱅스틱을 수중에서 격발하면 상어나 고래처럼 아무리 큰 어류라 하더라도 일발에 제압할 수 있어."
1007203-33 = "3;사키 수영복;99;자돌폭뢰도 뱅스틱도 그 원리는 동일하니까……"
1007203-34 = "[s] \"설마……\""
1007203-35 = "3;사키 수영복;03;응! 이 자돌폭뢰로 물고기를 근거리에서 기절시키는 거야!\n#3;em;[반짝]\n#3;greeting"
1007203-36 = "3;사키 수영복;02;저번에 잠수를 하며 둘러봤는데, 바닥에 통나무만 한 크기의 물고기가 여럿 돌아다니더라고."
1007203-37 = "3;사키 수영복;03;수중에서 손으로 그만한 크기의 물고기를 제압하는 건 어렵겠지만…… 화약의 힘을 빌린다면 그런 커다란 물고기도 쉽게 기절시킬 수 있을 거야."
1007203-38 = "[s1] \"잘 되면 좋겠지만……\"\n[s2] \"너무 위험하지 않을까?\""
1007203-39 = "#wait;10"
1007203-40 = "#wait;10"
1007203-41 = "3;사키 수영복;07;괜찮아. 물론 폭약의 양은 조금 덜어내긴 해야겠지만……\n#3;em;[재잘]\n#3;hophop"
1007203-42 = "3;사키 수영복;03;수중에서의 폭발 임무를 수도 없이 훈련해 온 SRT의 특수 요원에게 물고기를 제압하는 것 정도야 식은 죽 먹기지."

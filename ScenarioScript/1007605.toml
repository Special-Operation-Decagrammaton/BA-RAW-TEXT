[translation]
1007605-1 = "เรื่องนั้นกับเรื่องนี้ไม่เหมือนกันนะคะ"
1007605-2 = "(คุณครูได้รับการติดต่อจากโคโทริ จึงไปยังห้องรับรองที่เธอพักผ่อนอยู่)"
1007605-6 = "(ห้องทั้งห้องเงียบมาก จนคุณครูเกือบคิดว่ามาผิดห้อง...)"
1007605-7 = "อ่า... คะ...คุณครู..."
1007605-8 = "ทางนี้... อยู่ทางนี้ค่ะ..."
1007605-9 = "[s1] \"...โคโทริ?\"\n[s2] เดินไปยังทางที่ได้ยินเสียง"
1007605-15 = "คุณครูมักหาฉันเจอในสถานการณ์ที่คาดไม่ถึงเสมอเลยนะคะ... แหะๆ"
1007605-16 = "ก็... ไม่ได้มีอะไรเป็นพิเศษหรอก..."
1007605-17 = "กะ...ก็แค่... คือ... จู่ๆ ก็รู้สึกแรงฮึดมันพลุ่งพล่านจนรู้สึกเวียนหัว...นิดหน่อย แหะๆ..."
1007605-18 = "..."
1007605-19 = "...คือ..."
1007605-20 = "...พอมาคิดดูแล้ว..."
1007605-21 = "...เวียนหัว..."
1007605-22 = "...อาการ...แบบนี้น่ะค่ะ... มัน... ทำให้รับรู้ได้เพียงบางส่วน และรู้สึกสับสนไม่มั่นคง..."
1007605-23 = "[s3] \"เป็นแบบนี้แล้วยังอธิบายอีก...!?\"\n[s4] \"มีแค่เรื่องอธิบายที่ดูจะไม่ยอมแพ้ใครเลยนะ...\""
1007605-26 = "หะ...แหะๆ... นะ...นั่นสิคะ..."
1007605-27 = "คงเป็นนิสัยไปแล้วละมั้งคะ... รู้สึกอดไม่ได้ที่จะไม่อธิบาย... และเรื่องนั้นมันก็..."
1007605-28 = "ที่ฉันทำไปเมื่อกี้... คิดดูแล้วมันก็... อาจจะทำเกินไปก็ได้ค่ะ..."
1007605-32 = "[ns] \"...\""
1007605-34 = "[ns5] \"อาการเวียนหัวคืออาการสับสนและการรับรู้ไม่มั่นคง\"\n[ns6] \"อาการที่รู้สึกเหมือนร่างกายเคลื่อนไหว ทั้งที่ไม่ได้เคลื่อนไหวจริงๆ\"\n[ns7] \"อาการพวกนี้เกิดจากการใจไม่ทัน ความเครียด เลือดจาง ความดันต่ำ...\""
1007605-38 = "...?"
1007605-39 = "อะ...เอ๋?... คุณครู...? อืม...?"
1007605-40 = "อะไรคะเนี่ย...? รู้สึกเหมือนคุณครูพูดคำที่ฉันคิดจะพูดแทนเลย..."
1007605-41 = "[s8] \"ทำแบบนี้แล้วรู้สึกเหมือนโคโทริจะสบายใจขึ้นน่ะ\"\n[s9] \"ถ้าทำแบบนี้ โคโทริจะได้ไม่ต้องเหนื่อยอธิบายไง\""
1007605-46 = "...ฮ่าฮ่า..."
1007605-47 = "...ที่จริง..."
1007605-48 = "เป็นอย่างนี้เองหรอกเหรอคะ น่าแปลกใจจังเลยนะคะ..."
1007605-49 = "คือแบบว่า..."
1007605-50 = "การได้แบ่งปันความรู้กันแบบนี้ ทำให้รู้สึกสบายใจขึ้นยังไงก็ไม่รู้..."
1007605-51 = "คุณครู... ไม่เห็นต้องทำขนาดนี้เพื่อให้ฉัน...สบายใจ..."
1007605-52 = "คุณครู... ใจดีจริงๆ เลยนะคะ แถมอ่านใจฉันได้หมดอีกด้วย..."
1007605-53 = "ฉันไม่คิดเลยว่า...จะได้รับความช่วยเหลือถึงขนาดนี้เลยค่ะ..."
1007605-54 = "...แหะๆ"
1007605-55 = "...คุณครู..."
1007605-56 = "ฉัน...ขอบคุณ...คุณครู...เสมอๆ เลย...นะคะ... อืม..."
1007605-57 = "งืม...งือ..."
1007605-58 = "งืมๆ..."
1007605-59 = "[ns10] วางผ้าเช็ดตัวไว้บนหัวโคโทริที่หลับสนิท\n[ns11] ช่วยปรับท่านอนให้โคโทริหลับสบาย"
1007605-64 = "(หลังจากนั้น คุณครูก็ใช้เวลาไปกับการนั่งดูโคโทริที่หลับสนิท)"
1007605-65 = "(เมื่อโคโทริตื่นขึ้นมา เธอก็กลับมามีเรี่ยวแรงเหมือนเดิม และกลับไปด้วยท่าทีที่ร่าเริงเช่นเคย)"

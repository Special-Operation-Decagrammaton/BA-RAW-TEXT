[translation]
1007605-1 = "一碼歸一碼"
1007605-2 = "（接到亞都梨的聯絡後，前往了他所在的休息室）"
1007605-6 = "（因為實在太過安靜，就在懷疑自己來錯地方時……）"
1007605-7 = "啊啊，老，老師……"
1007605-8 = "我在這裡，請進……"
1007605-9 = "[s1]「……亞都梨？」\n[s2] 往聲音傳來的方向走去"
1007605-15 = "用意想不到的方式……又見到老師了呢……哈哈……"
1007605-16 = "那個……其實不是什麼特別的事……"
1007605-17 = "只，只是……因為活動量突然暴增，所以有點頭暈……嘿嘿……"
1007605-18 = "…………"
1007605-19 = "……那個……"
1007605-20 = "……我想想，這裡應該做個補充……"
1007605-21 = "……所謂的……"
1007605-22 = "……「暈眩」……指的是……部分的知覺，與平衡感發生混亂……"
1007605-23 = "[s3]「都已經這樣了還要說明……！？」\n[s4]「亞都梨在這方面還真是不屈不撓啊……」"
1007605-26 = "啊……啊哈哈……就是，說啊……"
1007605-27 = "已經變成一種習慣了……感覺非得說明一下才行……"
1007605-28 = "不過剛才那樣……連我自己都覺得好像有點……太誇張了……"
1007605-32 = "[ns] 「……」"
1007605-34 = "[ns5]「……『暈眩』指的是部分知覺與平衡感發生混亂的現象。」\n[ns6]「是一種明明實際上沒有移動卻感覺在移動的症狀。」\n[ns7]「原因有過度換氣症候群、壓力、貧血、低血糖……」"
1007605-38 = "…………？"
1007605-39 = "那個……老師……？#n嗯……？"
1007605-40 = "什麼情況……？#n怎麼覺得老師好像把我想說的話都說出來了……"
1007605-41 = "[s8]「我覺得這樣亞都梨心裡會比較舒服。」\n[s9]「這樣你就不必辛苦說明了。」"
1007605-46 = "……哈哈……"
1007605-47 = "……這樣啊……"
1007605-48 = "原來如此。#n真不可思議……"
1007605-49 = "感覺……"
1007605-50 = "能用言語分享彼此知道的事，真的是件能讓人感到欣慰的事……"
1007605-51 = "老師居然為了讓我放心……特意這麼做……"
1007605-52 = "真是……太溫柔體貼了。#n而且還完全看穿了我的想法……"
1007605-53 = "我從來沒想過，竟然能受到這種幫助……"
1007605-54 = "……嘿嘿。"
1007605-55 = "……老師……"
1007605-56 = "我一直都……很感謝老師哦……嗯……"
1007605-57 = "……嗯……呣……"
1007605-58 = "呣喵……"
1007605-59 = "[ns10] 在睡著的亞都梨頭上蓋上毛巾\n[ns11] 扶著亞都梨，讓他用舒服的姿勢入睡"
1007605-64 = "（之後，在亞都梨身旁看著他入睡）"
1007605-65 = "（再次醒來的亞都梨經過充分休息後，恢復了平常的元氣）"

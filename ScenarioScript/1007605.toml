[translation]
1007605-1 = "This and That Are Different"
1007605-2 = "After Kotori's messages, I went to check the room she was resting in."
1007605-6 = "It was deathly silent in there, and I almost thought I'd walked into the wrong room."
1007605-7 = "Oh, S-Sensei..."
1007605-8 = "Here... Over here..."
1007605-9 = "[s1] \"...Kotori?\"\n[s2] Follow the sound of her voice."
1007605-15 = "You always seem to find me in the most unexpected circumstances... Haha..."
1007605-16 = "It's not a huge deal... but..."
1007605-17 = "I'm not very used to...physical activity. I started feeling a bit...lightheaded... Heehee."
1007605-18 = "..."
1007605-19 = "...Um..."
1007605-20 = "...Now that I think about it..."
1007605-21 = "...Dizziness..."
1007605-22 = "...comes from...limited sensory awareness and instability..."
1007605-23 = "[s3] \"You're going to explain this right now...?!\"\n[s4] \"You're really unstoppable in a way...\""
1007605-26 = "Hah... Haha... Right?"
1007605-27 = "It's like...a compulsion... I just needed to tell you..."
1007605-28 = "But that may have been...too much for me..."
1007605-32 = "[ns] \"...\""
1007605-34 = "[ns5] \"...Dizziness is a limitation of sensory awareness or the sense of instability.\"\n[ns6] \"Symptoms include the feeling of moving despite no actual physical movement.\"\n[ns7] \"The main causes are hyperventilation, stress, anemia, low blood sugar...\""
1007605-38 = "...?!"
1007605-39 = "H-Huh...? Sensei...? Wha...?"
1007605-40 = "Y-You took the words right out of my mouth..."
1007605-41 = "[s8] \"I thought it would help with your compulsion.\"\n[s9] \"I thought that this way you won't have to explain anything.\""
1007605-46 = "...Haha..."
1007605-47 = "...I see..."
1007605-48 = "Of course. How amazing..."
1007605-49 = "This makes me feel..."
1007605-50 = "I like the idea of you sharing your knowledge with me, that does put me at ease..."
1007605-51 = "You really...didn't have to do all that for me..."
1007605-52 = "You're so...kind... Always seeing...right through me."
1007605-53 = "I never expected this kind of help..."
1007605-54 = "...Haha."
1007605-55 = "...Sensei."
1007605-56 = "I'm always...thankful for...you..."
1007605-57 = "...Mmm... Zzz..."
1007605-58 = "*yawn*"
1007605-59 = "[ns10] Place a warm towel on Kotori's head.\n[ns11] Position Kotori in a more comfortable position."
1007605-64 = "I stayed with Kotori as she slept, making sure her condition didn't worsen."
1007605-65 = "After her nap, she was already back to her usual energetic self."

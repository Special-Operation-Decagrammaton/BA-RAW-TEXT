[translation]
80000060-1 = "補充教材：巧克力"
80000060-2 = "（收到夏的聯絡後，前往夏所在的教室）"
80000060-6 = "不愧是老師，時間剛剛好。"
80000060-7 = "今天找老師來的原因……不用我說也知道吧？"
80000060-8 = "特別的日子賦予人們動機和採取行動的機會。"
80000060-9 = "有些話平時無法輕易說出口。但是在這種日子裡，#n就有了將自己從這些看似毫無意義，卻又有所意義的制約中解放的理由……"
80000060-10 = "簡單來說，是各種意義上都很令人開心的日子。"
80000060-11 = "如果每天都能像這種日子一樣，世界或許會比現在更加美好吧？"
80000060-12 = "不過即便如此，人們又會用別的理由創造出別的「特別的日子」吧……"
80000060-13 = "然而「特別的日子」正是因為稀少才有價值。"
80000060-14 = "要是特別的日子越來越多，總有一天會流於平凡，接著又誕生出新的特別的日子。"
80000060-19 = "……那麼如今，這個已經成為習慣的「情人節」究竟還有多少價值呢？"
80000060-20 = "被各種企業與活動掩蓋光彩的這個日子，如今又有多特別呢？"
80000060-21 = "不過既然身處這個漩渦之中，#n或許就連這麼思考著的我，也依然被侷限在某種框架裡也說不定。"
80000060-22 = "即便談論這個話題，也不知道是否真的有意義……"
80000060-23 = "[s1]「確實也有這種觀點呢。」\n[s2]「感覺夏好像不怎麼喜歡情人節是嗎？」"
80000060-24 = "……我很喜歡情人節唷。說是愛著也不為過。"
80000060-25 = "……我很喜歡情人節唷。說是愛著也不為過。"
80000060-26 = "再怎麼說我也是「放學後的甜點部」的一員，#n是經常體會「以甜點交流感情」這件事的價值的存在唷？"
80000060-27 = "我所說的話聽起來之所以有點奇怪……#n還有我的說話方式似乎比平常更自由奔放是因為……"
80000060-33 = "[ns]「這是親手做的巧克力？」"
80000060-34 = "……呵呵。"
80000060-35 = "居然尋求這個問題的答案，是否有點缺乏浪漫了呢？"
80000060-36 = "不過以這個觀點來看，在這種日子裡說個不停的我也好不到哪去。"
80000060-37 = "……情人節是用甜點交流心意的日子。"
80000060-38 = "在那之中想必蘊含著各種情感。愛情、好感……抑或是無法加以概括的某種情感。"
80000060-39 = "至少在這一天，無論是誰都有資格保持沉默吧。"
80000060-40 = "今天是情人節。一個賦予平時不善言辭的大家理由的甜蜜節日。"
80000060-41 = "然而，對於我這種樂於尋找喜歡各種詞彙的人來說，#n反而是個庸俗且令人不耐煩的日子。"
80000060-42 = "……正因為是今天這個「特別的日子」。"
80000060-47 = "……所以，請老師默默地收下吧。"
80000060-51 = "這樣就足夠了。"
80000060-55 = "嗯，非常完美，對吧？"
80000060-57 = "（鄭重收下夏的巧克力後，兩人一起離開了教室）"

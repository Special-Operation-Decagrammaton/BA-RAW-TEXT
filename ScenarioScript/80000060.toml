[translation]
80000060-1 = "#title;교보재: 초콜릿"
80000060-2 = "#na;(나츠의 연락을 받고, 기다리고 있다는 교실로 찾아갔다.)"
80000060-3 = "#all;hide"
80000060-4 = "#wait;500"
80000060-5 = "#wait;2000"
80000060-6 = "#na;나츠;음. 역시 선생님이야. 제시간에 딱 맞춰서 도착했네."
80000060-7 = "3;나츠;02;오늘 부른 이유는……. 뭐, 사실 선생님도 알고 있겠지? 숨길 것 없이 바로 그 이유야.\n#3;a"
80000060-8 = "3;나츠;01;특별한 날은 그 존재 자체만으로도 사람들에게 목적과 행동을 제시해 주는 법이니까 말이지."
80000060-9 = "3;나츠;05;평소에는 할 수 없었던 말과 행동들, 수많은 무의미하지만 강한 제약들로부터 해방시켜주는 날이기도 하고…….\n#3;m2"
80000060-10 = "3;나츠;99;……그래. 바로 마음을 표현한다는 것.\n#3;em;[...]"
80000060-11 = "3;나츠;04;모든 사람에게 매일매일이 오늘처럼 특별한 날이라면, 세상은 지금보다 훨씬 아름다울 텐데.\n#3;greeting"
80000060-12 = "3;나츠;99;사람들 또한 그것을 모르지 않기에, 온갖 이유를 대서 별거 없는 날마저 다 의미를 부여하지만……."
80000060-13 = "3;나츠;05;슬프게도 '특별한 것'이란, 오직 희귀할 때에만 그 가치를 유지할 수 있는 법…….\n#3;m3"
80000060-14 = "3;나츠;02;특별한 날들이 많아지면 당연히 그중에서 더욱 특별한 날이 생기고, 나머지는 평범한 날들로 전락하게 마련이지.\n#3;em;[재잘]"
80000060-15 = "#st;[0,0];instant;1;"
80000060-16 = "#clearST"
80000060-17 = "3;나츠;02\n#3;d\n#wait;1000"
80000060-18 = "#wait;2000"
80000060-19 = "3;나츠;01;……그렇다면 과연 오늘. 이 '발렌타인 데이'라는 것은 그것들 중 얼마나 깊은 가치를 지키고 있을까?\n#3;em;[반응]\n#3;closeup\n#3;greeting\n#3;a"
80000060-20 = "3;나츠;99;어느샌가 제과 회사들의 각축장이나 한탕 성수기로 변질돼 버린 지금의 발렌타인 데이가, 과연 살아 있다고 할 수 있을까?\n#3;closeup"
80000060-21 = "3;나츠;05;그것은 이미 '나는 이렇게 생각해' 정도로 소심하게 말할 수밖에 없을 만큼 어려운 문제.\n#3;closeup"
80000060-22 = "3;나츠;02;그리고 바로 지금 내가 선생님께 하고 있는 이 잡담처럼 무의미한 이야기…….\n#3;em;[...]\n#3;closeup"
80000060-23 = "[s1] \"나츠 답지 않게 회의적인 이야기네.\"\n[s2] \"나츠는 발렌타인 데이가 싫은 거야?\""
80000060-24 = "3;나츠;05;아니. 결코 그렇지 않아. 오히려 사랑하지.\n#3;em;[반응]"
80000060-25 = "3;나츠;05;아니. 결코 그렇지 않아. 오히려 사랑하지.\n#3;em;[반응]"
80000060-26 = "3;나츠;01;방과후 디저트부의 일원인 내가, 디저트로 서로의 마음을 주고받는 이런 날을 싫어할 리 없잖아?\n#3;greeting"
80000060-27 = "3;나츠;04;그렇지만 지금의 내 말에서 그런 주저함이 느껴진다면. 어쩌면……. 아마도 내 말이 이렇게 길어지고 있다는 건…….\n#3;stiff"
80000060-28 = "#st;[0,0];instant;1;"
80000060-29 = "#clearST"
80000060-30 = "3;나츠;04\n#3;d\n#wait;1000"
80000060-31 = "#wait;2000"
80000060-32 = "#wait;2500"
80000060-33 = "[ns] \"직접 만든 초콜릿이야?\""
80000060-34 = "3;나츠;99;……후후.\n#3;em;[음표]\n#3;a"
80000060-35 = "3;나츠;05;그걸 물어보는 건, 여기까지 와서 조금 세련되지 못한 일이라고 생각하는데."
80000060-36 = "3;나츠;99;물론 이런 날 길게 말을 늘어놓고 있는 나도 요령이 부족한 건 매한가지겠지만…….\n#3;em;[...]"
80000060-37 = "3;나츠;02;……발렌타인 데이는 디저트로 마음을 교류하는 날이라고 했지.\n#3;m4"
80000060-38 = "3;나츠;99;그 안에 든 감정이 어떤 것인지, 애정인지 호의인지, 어쩌면 그 이상의 무언가인지는……."
80000060-39 = "3;나츠;05;분명 오늘만큼은, 절대로 말로 표현하면 안 되는 걸 거야.\n#3;em;[반응]"
80000060-40 = "3;나츠;02;그게 바로 발렌타인 데이. 평소 말이라는 걸 조리 있게 잘 못 하는 이들에게는 더없이 편한 날.\n#3;m3"
80000060-41 = "3;나츠;99;반대로 나처럼 늘 담소 나누길 좋아하는 이들에게는 그것을 틀어막는 답답한 날.\n#3;em;[...]"
80000060-42 = "3;나츠;05;……그게 바로, 오늘이라는 '특별한 날'이 제시한 목적과 행동일 테니까.\n#3;em;[반짝]\n#3;greeting"
80000060-43 = "#st;[0,0];instant;1;"
80000060-44 = "#clearST"
80000060-45 = "3;나츠;05\n#3;d\n#wait;1200"
80000060-46 = "3;나츠;99\n#3;a\n#3;closeup"
80000060-47 = "3;나츠;99;……그러니 그냥, 아무 말 하지 말고 받아줘. 선생님.\n#3;em;[...]\n#3;closeup"
80000060-48 = "#st;[0,0];instant;1;"
80000060-49 = "#clearST"
80000060-50 = "3;나츠;01\n#3;greeting\n#3;closeup\n#wait;1500"
80000060-51 = "3;나츠;02;오늘만큼은…….\n#3;closeup"
80000060-52 = "#st;[0,0];instant;1;"
80000060-53 = "#clearST"
80000060-54 = "3;나츠;02\n#3;em;…\n#3;closeup\n#wait;2500"
80000060-55 = "3;나츠;03;이걸로, 그 모든 것들을 대신하자.\n#3;em;[하트]\n#3;greeting\n#3;closeup"
80000060-56 = "#all;hide"
80000060-57 = "#na;(나츠에게서 받은 초콜릿을 챙기고 교실을 빠져나왔다.)"

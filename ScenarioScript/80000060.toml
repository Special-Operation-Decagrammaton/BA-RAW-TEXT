[translation]
80000060-1 = "Training Aids: Chocolate"
80000060-2 = "I got Natsu's message and went to the classroom."
80000060-6 = "Punctual as usual, Sensei!"
80000060-7 = "I've invited you here today because... Well, I hardly need to remind you what an important day today is."
80000060-8 = "This romantic day is about people acting upon their heart's desire."
80000060-9 = "The meaningless restrictions that usually represses people are lifted and they can speak their true feelings!"
80000060-10 = "Today is about emotions, expressions, gestures..."
80000060-11 = "Imagine how beautiful, how inspiring the world would be if every day was like this."
80000060-12 = "Alas, it cannot be. So people make these special days up as sad excuses."
80000060-13 = "Unfortunately, in this world, only rarity begets attention."
80000060-14 = "We add more and more special days to the calendars, so much so that some become more ordinary."
80000060-19 = "Now, among these special days, how special is Valentine's Day?"
80000060-20 = "Once a declaration of romance, Valentine's day is now one of consumerism—#na competition between confectionery companies to make profit.#nIs Valentine's Day still truly special?"
80000060-21 = "The best we can do is express our heartfelt opinions on such important matters."
80000060-22 = "But perhaps even such expression is meaningless."
80000060-23 = "[s1] \"It's unlike you to doubt romance.\"\n[s2] \"Do you not like Valentine's Day?\""
80000060-24 = "Actually, I love Valentine's Day."
80000060-25 = "Actually, I love Valentine's Day."
80000060-26 = "I'm a member of the After-School Sweets Club. Why would I not love a day where you exchange desserts to express feelings?"
80000060-27 = "I guess you could sense my hesitation as I said that. Perhaps I've been talking your ear off..."
80000060-33 = "[ns] \"Did you make this yourself?\""
80000060-34 = "Heehee."
80000060-35 = "Isn't it a bit awkward to ask me that?"
80000060-36 = "Well, me rambling to you on a day like today shows how awkward I am too."
80000060-37 = "Valentine's Day is when people find romance in desserts."
80000060-38 = "Whether the emotion contained in the dessert is romantic love or friendship..."
80000060-39 = "It isn't meant to be expressed with words. Not today."
80000060-40 = "That's the whole point. It's a convenient day for people who aren't good with words."
80000060-41 = "On the other hand, it's frustrating for someone like me who likes to talk."
80000060-42 = "But I think I understand the purpose of this special day."
80000060-47 = "So please don't say anything. Just accept it, Sensei."
80000060-51 = "Just for today..."
80000060-55 = "I'll express everything with this."
80000060-57 = "I left the classroom with Natsu's heartfelt chocolate."

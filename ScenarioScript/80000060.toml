[translation]
80000060-1 = "อุปกรณ์การเรียน: ช็อกโกแลต"
80000060-2 = "(คุณครูได้รับข้อความจากนัตสึ เลยมารอที่ห้องเรียน)"
80000060-6 = "อืม สมกับเป็นคุณครูจริงๆ มาตรงเวลาพอดีเลยนะ"
80000060-7 = "ที่ฉันเรียกคุณครูมาวันนี้... ที่จริงคุณครูก็คงรู้อยู่แล้วใช่มั้ยล่ะ? อันที่จริงก็ไม่เห็นจะต้องปิดบังอะไร#nเลยนี่เนอะ นี่ไงล่ะ"
80000060-8 = "วันพิเศษ... เพียงแค่การมีอยู่ของมันก็มีความสำคัญต่อการกระทำของผู้คนแล้ว"
80000060-9 = "นอกจากนี้ยังเป็นวันที่ทำให้ผู้คนได้เปิดเผยคำพูดหรือการกระทำที่ทำในวันทั่วๆ ไปไม่ได้ออกมา..."
80000060-10 = "ใช่แล้ว... นั่นก็คือการแสดงความรู้สึกในใจยังไงล่ะ"
80000060-11 = "ถ้าทุกๆ วันเป็นวันพิเศษสำหรับทุกคนเหมือนกับวันนี้ โลกของเราก็คงสวยงามขึ้นกว่านี้มาก"
80000060-12 = "แต่เพราะมนุษย์เราไม่ตระหนักถึงเรื่องนั้น เลยมักจะสร้างความหมายให้กับวันไร้สาระด้วย#nเหตุผลต่างๆ นานา..."
80000060-13 = "น่าเศร้าที่คำว่า \"พิเศษ\" หรือสิ่งที่หายากเท่านั้นที่จะดึงดูดความสนใจคนได้"
80000060-14 = "พอวันพิเศษต่างๆ มีจำนวนเพิ่มขึ้น เลยทำให้วันบางวันถูกลดความสำคัญลงกลายเป็นวันธรรมดาแทน"
80000060-19 = "แล้ว \"วันวาเลนไทน์\" มันพิเศษกว่าวันพิเศษอื่นๆ ยังไงล่ะ?"
80000060-20 = "วันที่ครั้งหนึ่งเคยเป็นวันแห่งความรัก แต่ตอนนี้กลับกลายเป็นส่วนหนึ่งของกระแสบริโภคนิยม ทำให้เกิดการแข่งขันระหว่างบริษัทยักษ์ใหญ่เพื่อหากำไร แบบนี้วันวาเลนไทน์จะยังเป็นวันพิเศษอยู่อีกจริงๆ เหรอ?"
80000060-21 = "และสิ่งที่เราทำได้ก็มีแค่เพียงการแสดงความคิดเห็นว่า \"ฉันคิดแบบนี้\" เท่านั้น"
80000060-22 = "แต่มันก็อาจจะไร้ความหมายก็ได้..."
80000060-23 = "[s1] \"การสงสัยในเรื่องความโรแมนติก ไม่สมกับเป็นนัตสึเลยนะ\"\n[s2] \"นัตสึไม่ชอบวันวาเลนไทน์เหรอ?\""
80000060-24 = "ที่จริงฉันชอบวันวาเลนไทน์มากนะ"
80000060-25 = "เปล่าหรอก ที่จริงฉันชอบวันวาเลนไทน์มากนะ"
80000060-26 = "สมาชิกชมรมของหวานหลังเลิกเรียนอย่างฉันจะไม่ชอบวันที่มอบขนมให้กันเพื่อสื่อความรู้สึกได้ยังไง?"
80000060-27 = "แต่คิดว่าคุณครูคงจะสัมผัสได้ถึงความสงสัย หรือความลังเลในคำพูดของฉันสินะ บางที... การที่ฉันพูดเยอะเกินไปแบบนี้..."
80000060-33 = "[ns] \"ช็อกโกแลตโฮมเมดเหรอ?\""
80000060-34 = "ฮุฮุ..."
80000060-35 = "มาถามเอาตอนนี้มันไม่แปลกไปหน่อยเหรอ"
80000060-36 = "การที่ฉันพูดอะไรยืดยาวกับคุณครูในวันแบบนี้ก็แสดงให้เห็นว่าฉันเองก็ประหม่าอยู่เหมือนกัน..."
80000060-37 = "วาเลนไทน์เป็นวันที่เรามอบขนมหวานแทนความรู้สึกในใจให้กันยังไงล่ะ"
80000060-38 = "ความรู้สึกที่อยู่ในขนมที่มอบให้ ไม่ว่าจะเป็นความรัก มิตรภาพ ความผูกพัน หรือความรู้สึกอื่นๆ..."
80000060-39 = "ก็เป็นสิ่งที่อธิบายออกมาเป็นคำพูดไม่ได้"
80000060-40 = "นั่นละวันวาเลนไทน์ เป็นวันที่เหมาะกับคนที่ใช้คำพูดไม่เก่ง"
80000060-41 = "แต่ในทางกลับกันสำหรับคนที่ชอบพูดคุยแลกเปลี่ยนความรู้สึก คงจะเป็นวันที่น่าอึดอัดมากทีเดียว"
80000060-42 = "แต่ฉันคิดว่าเริ่มเข้าใจจุดประสงค์ของ \"วันพิเศษ\" แบบนี้ขึ้นมาหน่อยแล้ว"
80000060-47 = "เพราะงั้น... ช่วยรับไปแล้วก็ไม่ต้องพูดอะไรด้วยนะ คุณครู"
80000060-51 = "ขอแค่วันนี้..."
80000060-55 = "ให้ช็อกโกแลตเป็นสิ่งที่แทนคำพูดทุกๆ อย่างเถอะ"
80000060-57 = "(คุณครูรับช็อกโกแลตมาจากนัตสึและเดินออกมาจากห้องเรียน)"

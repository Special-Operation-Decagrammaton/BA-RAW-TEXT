[translation]
1003806-1 = "SRT, Descend!"
1003806-4 = "Are you sure about this, Sensei? This mission is a dangerous one."
1003806-5 = "You're worried we'll raid the wrong building again?"
1003806-6 = "Th-The report was missing a lot of details..."
1003806-7 = "Also, you had strange books!"
1003806-8 = "But, in all seriousness, are you sure you'll be okay?"
1003806-9 = "[s] \"I'll be fine since you're with me, Miyako.\""
1003806-10 = "With you..."
1003806-11 = "Correct. My directive will be to keep you safe."
1003806-12 = "Then, shall we?"
1003806-15 = "― How pretty...[wa:40] "
1003806-18 = "― The night view is so beautiful."
1003806-20 = "― I almost forgot we were on a mission.[wa:180] "
1003806-23 = "― Heehee,[wa:40] "
1003806-25 = "― I shouldn't be letting my guard down during a mission.[wa:460] "
1003806-28 = "― Well, um...[wa:60] "
1003806-30 = "― This is out of nowhere, but, Sensei...[wa:260] "
1003806-33 = "― Umm... Thank you for...[wa:2560] "
1003806-35 = "― always being there.[wa:10] "
1003806-38 = "― If you hadn't been...[wa:420] "
1003806-41 = "― I...and the rest of the RABBIT Squad...[wa:10] "
1003806-43 = "― would never have come this far.[wa:820] "
1003806-46 = "― So, from now on, if you're okay with it...please...[wa:1420] "
1003806-49 = "― Huh? A message...[wa:1280] "
1003806-51 = "― Understood. Five hundred meters out...[wa:540] "
1003806-54 = "― Yes, I received the signal to commence the raid.[wa:1530] "
1003806-56 = "― Sensei, please put on your rappel ring and harness.[wa:280] "
1003806-59 = "― Huh? You don't know how to?[wa:2600] "
1003806-61 = "― I...see...[wa:820] "
1003806-64 = "― That's okay. Then, please wait here.[wa:2540] "
1003806-66 = "― I'll finish and come back to you soon.[wa:10] "
1003806-69 = "― And when I do..."
1003806-71 = "― Let's take in this view, together.[wa:10] "
1003806-74 = "Miyako looked so cool as she rappelled down the building."
1003806-78 = "After Miyako successfully completed her mission, we went back to Schale."

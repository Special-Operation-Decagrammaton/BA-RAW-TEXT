[translation]
1003806-1 = "SRT，降落！"
1003806-4 = "我想會是個有點危險的任務……老師，真的沒問題嗎？"
1003806-5 = "咦？你說擔心會不會跟之前一樣襲擊到完全不同的建築……？"
1003806-6 = "那，那時是因為沒有好好確認情報……"
1003806-7 = "而且老師持有可疑的書也是事實……"
1003806-8 = "……真的沒關係嗎？"
1003806-9 = "[s] 「和都子在一起的話沒問題的。」"
1003806-10 = "在一起的話……"
1003806-11 = "確實是這樣呢。一定沒問題的。"
1003806-12 = "那麼就開始移動吧？"
1003806-15 = "— 真漂亮……[wa:320] "
1003806-18 = "— 因為夜景實在太美，"
1003806-20 = "— 差點就把目的忘得一乾二淨了。[wa:1060] "
1003806-23 = "— 呵呵，[wa:160] "
1003806-25 = "— 在作戰中分心什麼的可是大忌啊……[wa:1940] "
1003806-28 = "— ……那個，[wa:260] "
1003806-30 = "— ……雖然很突然，但是老師……[wa:1180] "
1003806-33 = "— 就是……謝謝你總是……[wa:3000] "
1003806-35 = "— 和我們在一起。[wa:20] "
1003806-38 = "— 如果老師不在的話……[wa:820] "
1003806-41 = "— 不管是我，還是RABBIT小隊，[wa:680] "
1003806-43 = "— 我想都無法成長到現在的程度。[wa:1460] "
1003806-46 = "— 所以下次，如果你願意的話，那個──[wa:2740] "
1003806-49 = "— ……？有聯絡……[wa:1600] "
1003806-51 = "— 原來如此，就在前方500m的地點……[wa:1300] "
1003806-54 = "— 沒錯。是告知立即準備突擊的通知。[wa:2770] "
1003806-56 = "— 老師，請裝備好垂降繩和安全帶。[wa:1680] "
1003806-59 = "— 咦？不知道怎麼使用……是嗎？[wa:3080] "
1003806-61 = "— 這，這樣啊……[wa:900] "
1003806-64 = "— ……沒關係。那麼請在這裡稍等一會。[wa:3260] "
1003806-66 = "— 我會盡快結束任務，趕快回來的。[wa:610] "
1003806-69 = "— 然後，我想要和老師一起，"
1003806-71 = "— 悠閒地欣賞這片夜景。[wa:840] "
1003806-74 = "（都子帥氣地利用垂降繩降了下去）"
1003806-78 = "（過了一會，和順利完成任務回來的都子一起回到了夏萊）"

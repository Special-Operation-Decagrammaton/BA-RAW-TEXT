[translation]
1003806-1 = "SRT ปฏิบัติการโดดร่ม!"
1003806-4 = "ภารกิจนี้อาจเกิดอันตรายขึ้นก็ได้นะคะ... ไม่เป็นไรจริงๆ เหรอคะ คุณครู?"
1003806-5 = "คะ? คุณครูเป็นห่วงว่าจะไปบุกโจมตีผิดที่เหมือนคราวที่แล้วงั้นเหรอคะ?"
1003806-6 = "ตะ... ตอนนั้นเรามีข้อมูลไม่เพียงพอก็เลย..."
1003806-7 = "แต่ยิ่งกว่านั้น คุณครูก็มีหนังสือที่น่าสงสัยอยู่นี่คะ...!"
1003806-8 = "แต่ว่าไม่เป็นไรแน่จริงๆ เหรอคะ?"
1003806-9 = "[s] \"ถ้าอยู่กับมิยาโกะละก็ไม่เป็นไรหรอก\""
1003806-10 = "อยู่ด้วยกันกับคุณครู..."
1003806-11 = "นั่นสินะคะ ถ้าอยู่ด้วยกันพวกเราคงไม่มีปัญหาอะไรแน่ค่ะ"
1003806-12 = "เอาละ ถ้างั้นไปกันเลยไหมคะ?"
1003806-15 = "― สวยจังเลย...[wa:80] "
1003806-18 = "― วิวตอนกลางคืนสวยมาก"
1003806-20 = "― จนฉันเกือบจะลืม... เรื่องภารกิจไปเลยค่ะ[wa:100] "
1003806-23 = "― ฮิฮิ...[wa:40] "
1003806-25 = "― ถึงการเผลอลืมตัวระหว่างปฏิบัติภารกิจ...จะเป็นสิ่งที่ไม่ควรทำก็ตาม...[wa:10] "
1003806-28 = "― อา... คือฉัน...[wa:10] "
1003806-30 = "― ถึงจะกะทันหันไปสักหน่อยนะคะแต่ว่า... คุณครู...[wa:10] "
1003806-33 = "― คือว่า...คุณครูคอยอยู่กับฉันเสมอ...[wa:2080] "
1003806-35 = "― ขอบคุณนะคะ[wa:10] "
1003806-38 = "― ถ้าเกิดว่า... ไม่มีคุณครูละก็...[wa:10] "
1003806-41 = "― ทั้งฉัน และกองทหาร RABBIT...[wa:240] "
1003806-43 = "― คงพัฒนามาถึงขั้นนี้ไม่ได้หรอกค่ะ [wa:740] "
1003806-46 = "― เพราะงั้นคราวหน้า... ถ้าคุณครูไม่ว่าอะไร...ก็ขอให้...[wa:1340] "
1003806-49 = "― เอ๊ะ...? มีสายเข้า...[wa:1120] "
1003806-51 = "― อย่างนั้นเหรอคะ จากตรงนี้อีก 500 เมตร...[wa:460] "
1003806-54 = "― ค่ะ มีสายแจ้งเตือนเข้ามา ให้เตรียมพร้อมสำหรับปฏิบัติการค่ะ[wa:1130] "
1003806-56 = "― คุณครูคะ กรุณาสวมสายรัด...และเข็มขัดโรยตัวด้วยค่ะ[wa:360] "
1003806-59 = "― คะ...? ไม่รู้วิธีใช้งานงั้นเหรอคะ...?[wa:2200] "
1003806-61 = "― งะ... งั้นเหรอคะ...[wa:460] "
1003806-64 = "― ไม่เป็นไรค่ะ ถ้าอย่างนั้น รบกวนรออยู่ที่นี่นะคะ[wa:2100] "
1003806-66 = "― ฉันจะรีบจัดการให้เสร็จ แล้วรีบกลับมาค่ะ[wa:10] "
1003806-69 = "― พอกลับมาแล้ว ฉันอยากจะ..."
1003806-71 = "― นั่งชมวิวสวยๆ แบบนี้ พร้อมกับคุณครูอีกค่ะ[wa:10] "
1003806-74 = "(และจากนั้นมิยาโกะก็ใช้เชือกโรยตัวลงไปบนตึกอย่างเท่ๆ...)"
1003806-78 = "(ไม่นานนัก หลังจากมิยาโกะทำภารกิจเสร็จแล้ว ทั้งสองคนก็กลับมาที่ชาเล่ต์ด้วยกัน)"

[translation]
10007005-1 = "序幕;227號特別班的某一天"
10007005-2 = "舊校舍227號特別班附近的廢墟"
10007005-4 = "唔，拔不出來……"
10007005-8 = "哼嗯嗯……！明明感覺就差一點，了……！"
10007005-13 = "和香，要不要休息一下，來杯熱可可？"
10007005-14 = "啊，時雨醬。"
10007005-15 = "我正好覺得手腳發冷呢……謝謝！我要開動囉！"
10007005-21 = "哈啊，活過來了……"
10007005-22 = "這股溫暖流遍全身的幸福……"
10007005-23 = "在主校舍的時候明明隨時都可以輕鬆地喝到，#n現在卻處於連熱水都難以入手的狀態……"
10007005-24 = "……我們什麼時候才能回到主校舍啊。"
10007005-25 = "別擔心，和香。#n之前慶典的時候，潔莉諾會長也承諾會解除我們的停學處分了。"
10007005-26 = "只要再忍耐一下，潔莉諾會長肯定會來迎接我們的唷。"
10007005-27 = "但是！在那之後明明已經好幾個月了！"
10007005-28 = "那個任性的小鬼會長現在一定早就把我們的事給忘了，#n正在舒舒服服地睡他的午覺，肯定是這樣！"
10007005-29 = "早知道上次他來舊校舍的時候，就說得更過分一點……！"
10007005-30 = "沒辦法，和香那個時候輸給會長了嘛……"
10007005-31 = "……話說回來，你在做什麼呢？"
10007005-32 = "我想把這個埋得很奇怪的木樁拔出來。"
10007005-33 = "因為最近又變冷的關係，柴火不太夠了……"
10007005-34 = "順便也整理一下這附近，收拾這些用不到的木樁。"
10007005-35 = "這樣啊，我來幫忙吧。"
10007005-36 = "那我們一起合力……！"
10007005-41 = "我數到「一，二，三」的「三」的時候就一起用力哦！"
10007005-43 = "一，二……"
10007005-49 = "三！"
10007005-56 = "（咚哐──！）"
10007005-58 = "爆，爆炸！？"
10007005-59 = "是埋在地底下的地雷嗎！？還是巨大鼴鼠的襲擊！？"
10007005-60 = "冷靜點，和香。再怎麼說也不會是鼴鼠……吧。"
10007005-61 = "那，那剛才的爆炸到底是……？"
10007005-65 = "那是……"
10007005-72 = "咦，咦！？"
10007005-73 = "水從地面湧出來了……！？"
10007005-74 = "難道剛才的木樁是地下水脈的塞子嗎？"
10007005-75 = "噴，噴的真壯觀……"
10007005-78 = "怎，怎麼辦……就這樣一直噴水的話，會很不妙的吧……？"
10007005-79 = "有，有沒有什麼能堵住它的材料……！？"
10007005-85 = "不對，本來就是因為沒有材料才來拔木樁的啊……"
10007005-86 = "嗚嗚，居然會在這種地方完蛋……#n我們只不過是想過個溫暖的冬天而已……"
10007005-87 = "就這樣被所有人遺忘，在舊校舍裡孤獨地凍死……"
10007005-88 = "好了好了，別一下就那麼消沉啊和香。#n說不定這不是什麼壞事唷？"
10007005-89 = "這個情況哪裡不壞了啊！？"
10007005-90 = "你看，這不是普通的地下水唷？"
10007005-91 = "……？"
10007005-95 = "咦，這個味道……而且好像有點溫暖……"
10007005-96 = "這該不會是……溫泉？"
10007005-97 = "看來是幸運地湧出了溫泉呢。"
10007005-98 = "這樣我們洗澡的時候，就不用每次都燒熱水了。"
10007005-99 = "是，是沒錯啦……"
10007005-100 = "該說在這種地方湧出溫泉很浪費嗎……#n之後該怎麼辦啊……？"
10007005-102 = "剛才有人提到溫泉嗎！？"
10007005-103 = "是，是誰！？熊！？"
10007005-111 = "咦，熊？赤冬有熊嗎？"
10007005-112 = "在哪在哪？好想看！"
10007005-114 = "那個，你們是……？"
10007005-116 = "哎呀，還沒打招呼呢！"
10007005-117 = "今天也是適合開發的日子呢！"
10007005-118 = "我們是只要聽說有溫泉就無處不在的──"
10007005-119 = "格黑娜學園的，溫泉開發部唷！"
10007005-125 = "格黑娜……？"
10007005-126 = "格黑娜的學生為什麼會來這裡……？"
10007005-127 = "就算我們現在處於停學狀態，也不會容忍其他學校的學生入侵我們赤冬的領域唷！"
10007005-128 = "啊哈哈♪別在意那種事，我們也不是來惹事的。"
10007005-129 = "只是聽說這裡有溫泉，所以才來看看而已！"
10007005-130 = "呃，雖然有新的溫泉是事實……"
10007005-131 = "這個溫泉可是剛剛才湧出來啊……？"
10007005-132 = "這樣啊，時機正好呢！"
10007005-133 = "雖然已經見怪不怪了，但不愧是佳澄部長，情報果然沒錯！"
10007005-134 = "比起那個，嗅嗅……嗯，是濃郁的好氣味呢！"
10007005-135 = "我可以確認一下溫泉的狀態嗎？#n啊，就算你們說不行我也會自己確認就是了！"
10007005-136 = "嗯，只是這樣的話……話說已經在確認了……"
10007005-137 = "呼呣呼呣，嗯嗯……"
10007005-143 = "原來如此，這個溫泉……"
10007005-144 = "雖然不太懂，不過是個好溫泉呢！"
10007005-145 = "看得這麼認真，感想還真隨便呢……"
10007005-146 = "嗯～算是吧！#n反正什麼含量啊數值之類的，那種複雜的東西我也不太理解！"
10007005-147 = "不過感覺不錯這點是真的唷。我都想立刻脫光跳進去了！"
10007005-148 = "……咦？部長已經下達建設許可了嗎？"
10007005-149 = "OK！那就趕快開始建造溫泉設施吧！"
10007005-155 = "大，大型挖掘機和鑽孔機……！？"
10007005-156 = "請，請等一下！你們到底想做什麼！？"
10007005-157 = "嗯？就像剛才說的一樣，建造能活用這個溫泉的溫泉設施啊。"
10007005-158 = "不不不！這裡是我們227號特別班管理的舊校舍唷！"
10007005-159 = "怎麼能允許其他學校擅自開發……！"
10007005-160 = "但是這附近只有森林跟老舊的建築物而已不是嗎？"
10007005-161 = "啊，還是你們想蓋的不是溫泉浴場而是其他建築？"
10007005-162 = "不，倒也不是那樣……"
10007005-163 = "那把這裡蓋成溫泉浴場也沒問題對吧♪"
10007005-164 = "就算你們反對還是會硬蓋就是了！"
10007005-165 = "哪有人這樣的……"
10007005-166 = "來吧，大家！"
10007005-167 = "把這附近的森林全部燒光，拆掉那些老舊的建築吧！"
10007005-168 = "其實我一直都很想把積雪的樹木全部燒光看看呢。#n來，開發時間到囉！！"
10007005-177 = "那個……這究竟是什麼狀況……"
10007005-178 = "算了，也沒什麼不好吧？反正這些廢墟本來也預定要拆除了。#n既然他們說要幫我們重建，就隨他們去吧。"
10007005-179 = "總之就先喝個熱可可看看狀況吧。"
10007005-180 = "是沒錯啦……總覺得非常不安……"
10007005-185 = "這，這……！"
10007005-186 = "這是什麼啊！？"
10007005-187 = "如你所見，是溫泉浴場唷！"
10007005-188 = "呵呵，蓋起來的感覺比想像中還好，真滿足真滿足♪"
10007005-189 = "這可是規模相當大的溫泉浴場啊！？#n甚至連旅館都有，究竟是怎麼做到的！？"
10007005-190 = "雖然是我們放任你們進行建設，沒想到會建成這種規模……！"
10007005-191 = "唔嗯，因為在施工過程又挖到了幾座新的溫泉啊。#n重複幾次之後就變成這麼宏偉的溫泉浴場了……"
10007005-192 = "但是OKOK！畢竟浪漫和溫泉就是要越大越好啊！"
10007005-193 = "咦，咦……"
10007005-194 = "啊，因為這裡本來就是你們的管理區域，你們想怎麼使用都沒問題唷。"
10007005-195 = "要獨占這個溫泉也可以，要和大家一起享受溫泉也可以。#n嗯～光是想像就很開心呢！"
10007005-196 = "我，我不是那個意思……"
10007005-197 = "咦，部長傳來的聯絡？附近又有其他溫泉的氣息？"
10007005-198 = "那可就沒時間在這裡休息了！"
10007005-199 = "更多的溫泉！更多的開發！！目標．一人一個溫泉！"
10007005-200 = "那我們要去附近開發其他溫泉了，#n有什麼問題的話，隨時可以叫我們哦！"
10007005-206 = "真是來去一陣風啊……"
10007005-207 = "沒想到，舊校舍一瞬間就變成了度假區…… "
10007005-208 = "雖然變成漂亮的新建築是件好事，但這麼大的地方該怎麼管理……"
10007005-212 = "總之，先泡個溫泉吧……？"

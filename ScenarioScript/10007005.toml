[translation]
10007005-1 = "บทเริ่มต้น;วันธรรมดาๆ ของห้องพิเศษ No.227"
10007005-2 = "พื้นที่รกร้างใกล้อาคารเรียนเก่า No.227"
10007005-4 = "ฮืออออ ทำไมถึงไม่ตกสักทีนะ..."
10007005-8 = "อีกนิดเดียว... อีกนิดเดียว..."
10007005-13 = "มาแล้วโนโดกะจ๋า~ โกโก้ลาวาที่โนโดกะอยากได้~"
10007005-14 = "อ๊ะ ชิกุเระจัง"
10007005-15 = "ตอนนี้หนาวจนมือแข็งแล้วกำลังอยากได้เครื่องดื่มร้อนๆ อยู่พอดีเลย... ขอบคุณนะ!"
10007005-21 = "ฮ่า... อุ่นจังเลย..."
10007005-22 = "ดื่มโกโก้แล้วรู้สึกอุ่นวาบไปทั้งตัวเลย มีความสุขจัง~"
10007005-23 = "ตอนอยู่ที่อาคารหลัก การดื่มโกโก้ร้อนสักแก้วเป็นเรื่องที่ง่ายมากเลย แต่พอมาอยู่ที่นี่แล้ว#nกลับหายากมากเลยนะ..."
10007005-24 = "เมื่อไรพวกเราจะได้กลับไปที่อาคารหลักกันนะ?"
10007005-25 = "ไม่ต้องห่วงหรอกโนโดกะ เมื่องานเทศกาลครั้งก่อน ประธานเชริโน่สัญญาแล้วนี่ว่าจะยกเลิก#nการพักการเรียนน่ะ?"
10007005-26 = "ถ้าอดทนรอละก็ ประธานเชริโน่จะต้องมารับพวกเรากลับไปแน่นอน"
10007005-27 = "เป็นไปไม่ได้หรอกค่ะ! เรารอมาตั้งหลายเดือนแล้วนะ!"
10007005-28 = "ยัยประธานตัวกะเปี๊ยกขี้อวดนั่นต้องลืมว่ามีพวกเราอยู่ แล้วนอนกลางวันอย่างสบายใจเฉิบอยู่แน่"
10007005-29 = "ถ้ารู้ว่าจะเป็นแบบนี้ละก็ คราวก่อนตอนที่มาที่อาคารเรียนเก่าน่าจะจัดการต่อว่าให้เข็ดหลาบไปเลย!"
10007005-30 = "ถึงคนที่แพ้คราวนั้นจะเป็นโนโดกะก็เถอะ..."
10007005-31 = "แล้วตอนนี้เธอทำอะไรอยู่เหรอ...?"
10007005-32 = "ฉันกำลังพยายามงัดเสาผุๆ ที่ติดอยู่ตรงนี้ออกไปน่ะ"
10007005-33 = "ช่วงสองสามวันนี้อากาศหนาวขึ้นมาก เลยมีฟืนไม่พอจะใช้ก่อกองไฟ"
10007005-34 = "ระหว่างที่เก็บกวาดพื้นที่แถวนี้ ฉันก็เลยมาจัดการเสาไม้ที่ถูกทิ้งไว้พวกนี้น่ะ"
10007005-35 = "ให้ฉันช่วยมั้ย?"
10007005-36 = "อื้อ มารวมพลังงัดเสานี่ขึ้นมากันเถอะ!"
10007005-41 = "เอาละ เดี๋ยวฉันจะให้สัญญาณนับสามแล้วก็ค่อยๆ ดึงพร้อมกันนะ!"
10007005-43 = "หนึ่ง... สอง..."
10007005-49 = "สาม!"
10007005-56 = "ตึงงงงงง!"
10007005-58 = "อะ...อะไรน่ะ? เมื่อกี้เสียงระเบิดเหรอ?"
10007005-59 = "มีกับระเบิดที่ฝังอยู่ใต้ดินเหรอ? หรือว่าถูกตุ่นยักษ์ใต้ดินโจมตีกันนะ?"
10007005-60 = "ใจเย็นๆ ก่อนโนโดกะ ที่สหภาพเรดวินเทอร์ไม่มีพวกตุ่นยักษ์อยู่หรอกนะ"
10007005-61 = "ถะ...ถ้างั้นแล้วที่ระเบิดเมื่อกี้คืออะไรล่ะ?"
10007005-65 = "ดูนั่นสิ..."
10007005-72 = "นะ...นี่มันอะไรกันน่ะ!?"
10007005-73 = "มีน้ำพุ่งขึ้นมาจากใต้ดินด้วย!"
10007005-74 = "เหมือนว่าตอนดึงเสาไม้ขึ้นมาจะไปโดนสายน้ำใต้ดินเข้าน่ะ"
10007005-75 = "มะ...มันพุ่งออกมาแรงมากเลยนะ..."
10007005-78 = "ทะ...ทำยังไงดีล่ะคะ ถ้าน้ำยังพุ่งขึ้นมาไม่หยุดแบบนี้ แถวนี้จะต้องกลายเป็นบึงน้ำแข็งแน่ๆ เลย..."
10007005-79 = "จะมีอะไรที่ใช้กั้นไม่ให้น้ำไหลได้บ้างมั้ยนะ...?"
10007005-85 = "ไม้ที่ใช้ทำฟืนยังมีไม่พอเลย แล้วจะหาวัสดุแบบนั้นมาจากที่ไหนกัน..."
10007005-86 = "ฮือ... ชีวิตฉันจบสิ้นแล้วละ พวกเราก็แค่อยากใช้ช่วงเวลาในฤดูหนาวอย่างอบอุ่นก็เท่านั้นเอง..."
10007005-87 = "สุดท้ายพวกเราก็จะถูกลืมเลือนไปและต้องหนาวตายอยู่ในอาคารเรียนเก่านี่สินะ"
10007005-88 = "อย่าเพิ่งท้อแท้แบบนั้นสิโนโดกะ อาจจะไม่ได้มีแต่เรื่องร้ายๆ ก็ได้นะ"
10007005-89 = "น้ำบาดาลเกิดปะทุขึ้นในดินแดนที่มีแต่น้ำแข็งแบบนี้ มันมีข้อดีตรงไหนกัน!"
10007005-90 = "ดูให้ดีๆ สิ นี่ไม่ใช่น้ำบาดาลธรรมดาหรอกนะ"
10007005-91 = "ไม่ใช่น้ำบาดาลธรรมดา... หมายความว่ายังไงน่ะ?"
10007005-95 = "เอ๊ะ? รู้สึกเหมือนได้กลิ่นกำมะถันจางๆ จากน้ำด้วย..."
10007005-96 = "หรือว่านี่คือ... ออนเซ็น?"
10007005-97 = "ฮุฮุ คงโชคดีที่ไปโดนตาน้ำของออนเซ็นเข้าน่ะ"
10007005-98 = "ทีนี้เวลาอาบน้ำก็ไม่ต้องต้มน้ำร้อนแล้วละนะ"
10007005-99 = "นั่นมันก็จริงอยู่หรอก แต่ว่า..."
10007005-100 = "แต่ว่าออนเซ็นจะมีประโยชน์อะไรกับพวกเราล่ะ!"
10007005-102 = "\"ออนเซ็นจะมีประโยชน์อะไร\" งั้นเหรอ... พูดแบบนั้นยกโทษให้ไม่ได้!"
10007005-103 = "คะ...ใครน่ะ? ระ...หรือว่าหมี?"
10007005-111 = "หมีเหรอ? ที่สหภาพเรดวินเทอร์มีหมีด้วยเหรอ?"
10007005-112 = "ไหนๆ อยู่ไหนน่ะ?"
10007005-114 = "พวกคุณ..."
10007005-116 = "อ๊ะ แนะนำตัวช้าไปสินะ"
10007005-117 = "ว่าไงล่ะสหาย~ วันนี้อากาศแจ่มใสเหมาะกับการพัฒนาเลยว่ามั้ย?"
10007005-118 = "พวกเราจะไปทุกที่ทุกแห่งที่มีออนเซ็น--"
10007005-119 = "ชมรมพัฒนาออนเซ็นแห่งสถาบันเกเฮนน่าไงล่ะ!"
10007005-125 = "เกเฮนน่า...?"
10007005-126 = "นักเรียนของสถาบันเกเฮนน่ามาทำอะไรที่นี่กันคะ?"
10007005-127 = "ถึงพวกเราจะเป็นนักเรียนที่โดนพักการเรียนอยู่ แต่การที่มีนักเรียนโรงเรียนอื่นบุกเข้ามาในเขต#nของสหภาพเรดวินเทอร์แบบนี้ พวกเรายอมไม่ได้เด็ดขาดค่ะ!"
10007005-128 = "ฮ่าฮ่าฮ่า~! ♪ ไม่ต้องห่วง ไม่ต้องห่วงหรอก พวกเราไม่สนใจเรื่องน่าปวดหัวพวกนั้นหรอกนะ!"
10007005-129 = "เรามาที่นี่เพราะได้ยินว่ามีการค้นพบตาน้ำออนเซ็นที่นี่ก็แค่นั้นเอง"
10007005-130 = "เรื่องที่มีออนเซ็นผุดขึ้นมามันก็จริงอยู่หรอก..."
10007005-131 = "ตะ...แต่ว่าพวกเราเพิ่งเจอออนเซ็นกันเมื่อกี้เองนะคะ?"
10007005-132 = "ฮ่าฮ่าฮ่า! ถ้างั้นก็เหมาะเลย!"
10007005-133 = "ข้อมูลของหัวหน้าคาสุมินี่ไม่ผิดเลยสักนิดเดียว"
10007005-134 = "ฟุดฟิด... ถ้ามีกลิ่นกำมะถันรุนแรง แสดงว่าเป็นออนเซ็นคุณภาพดี"
10007005-135 = "ขอพวกเราตรวจสอบสภาพของออนเซ็นหน่อยได้มั้ย?"
10007005-136 = "ถ้าเรื่องนั้น เชิญได้เลยค่ะ"
10007005-137 = "ฮึ่ม ฮึ่ม ไหนดูซิ..."
10007005-143 = "อืม ออนเซ็นนี่..."
10007005-144 = "ดูไม่ออกเท่าไร แต่ก็คงจะเป็นออนเซ็นคุณภาพดีเลยละ!"
10007005-145 = "อุตส่าห์นั่งดูตั้งนาน สุดท้ายก็พูดแค่นี้เองเหรอ?"
10007005-146 = "ฉันไม่รู้พวกเรื่องค่าสถิติหรือปริมาณส่วนประกอบอะไรนั่นหรอก ก็ฉันหัวทึบนี่นา"
10007005-147 = "แต่จากกลิ่นหอมๆ ที่แตะจมูกแบบนี้แล้วทำเอาอยากถอดเสื้อแล้วโดดตู้มลงน้ำแบบนี้น่ะ...#nทำให้ฉันมั่นใจเลยว่านี่เป็นออนเซ็นที่ดีมาก ฟันธง! ♪"
10007005-148 = "หืม? หัวหน้าอนุญาตให้ก่อสร้างได้แล้วเหรอ?"
10007005-149 = "ยอดเลย! ถ้างั้นก็เริ่มการก่อสร้างกันเถอะ!"
10007005-155 = "อุปกรณ์ก่อสร้างแถมยังมีรถขุดเจาะขนาดใหญ่ด้วย...?"
10007005-156 = "ดะ...ดะ เดี๋ยวก่อนค่ะ! คิดจะทำอะไรกันคะ?"
10007005-157 = "หืม? ก็บอกแล้วไงว่าจะก่อสร้างบ่อออนเซ็นขึ้นมาน่ะ?"
10007005-158 = "แต่ว่าที่นี่น่ะ เป็นอาคารเรียนเรียนเก่าที่ห้องพิเศษ 227 ของเรารับผิดชอบอยู่นะคะ!"
10007005-159 = "ฉันไม่ยอมให้นักเรียนต่างชมรมของโรงเรียนอื่นมาทำตามอำเภอใจในเขตนี้หรอกค่ะ!"
10007005-160 = "แต่แถวนี้ก็ไม่มีอะไรนอกจากป่ากับอาคารโทรมๆ นี่นา"
10007005-161 = "หรือว่าคิดจะสร้างอาคารอื่นนอกจากออนเซ็นรึไง?"
10007005-162 = "เปล่าค่ะ ไม่ใช่แบบนั้นค่ะ..."
10007005-163 = "ฮุฮุ ถ้างั้นก็ไม่มีปัญหาถ้าเราจะสร้างบ่อออนเซ็นขึ้นที่นี่ใช่มะ?"
10007005-164 = "ถึงขัดขืนก็จะบังคับอยู่ดีนั่นแหละ...!"
10007005-165 = "ถ้าจะบังคับกันแบบนั้น..."
10007005-166 = "เอาละทุกคน!"
10007005-167 = "ถ้างั้นก็จัดการเผาป่าแถวนี้ให้ราบแล้วก็ถล่มตึกโทรมๆ นั่นทิ้งไปให้หมดเลย! "
10007005-168 = "ฉันอยากจะเผาป่าที่มีหิมะปกคลุมอยู่มานานแล้ว... ไทม์มิ่งดีจริงๆ เลยแฮะ! ♪ "
10007005-177 = "พวกเด็กนักเรียนจากชมรมพัฒนาออนเซ็นตรงนั้นคิดจะทำอะไรกันแน่...?"
10007005-178 = "ยังไงเราก็มีแผนจะรื้อถอนตึกเก่าๆ ที่นี่อยู่แล้วนี่ ถ้าพวกนั้นจะสร้างตึกใหม่ให้ตอนนี้ พวกเราก็ได้ประโยชน์ไม่ใช่รึไง?"
10007005-179 = "ถ้างั้นเราก็ไปดื่มโกโก้ร้อนกันอีกสักแก้วแล้วนั่งรอกันเฉยๆ เถอะ"
10007005-180 = "เรื่องนั้นมันก็ใช่ค่ะแต่ว่า... ฉันรู้สึกไม่ค่อยดีเท่าไรเลย"
10007005-185 = "นะ...นี่มัน..."
10007005-186 = "นี่มันอะไรกันคะ?!"
10007005-187 = "ก็อย่างที่เห็นน่ะ นี่คือออนเซ็นแห่งใหม่ที่เราสร้างยังไงล่ะ!"
10007005-188 = "ฮุฮุ สร้างได้สุดยอดกว่าที่คิดไว้อีก น่าพอใจสุดๆ ♪"
10007005-189 = "นี่ไม่ใช่บ่อออนเซ็นธรรมดานะ แต่เป็นเรียวกังที่รวมเอาอุปกรณ์ออนเซ็นขนาดใหญ่เอาไว้ด้วยนี่นา?!"
10007005-190 = "ถึงเราจะบอกว่าสร้างออนเซ็นที่นี่ได้... แต่ไม่คิดว่าจะสร้างใหญ่ขนาดนี้เลยนะคะ!"
10007005-191 = "ระหว่างก่อสร้างเราเจอตาน้ำใหม่อีก เพราะงั้นขนาดมันก็เลยใหญ่ขึ้นน่ะ..."
10007005-192 = "เป็นยังไงบ้าง? ออนเซ็นกับความโรแมนติก... ถ้ายิ่งใหญ่ก็จะยิ่งดีน่ะสิ!"
10007005-193 = "แต่ว่า..."
10007005-194 = "ไม่เป็นไรน่า ยังไงออนเซ็นแห่งนี้ก็สร้างขึ้นในเขตของพวกเธอ เพราะงั้นก็ใช้ได้ตามสบายเลยนะ"
10007005-195 = "จะลงแช่บ่อออนเซ็นคนเดียวดื่มด่ำกับบรรยากาศสบายๆ ก็ได้ แต่มันก็คงน่าเสียดายถ้าไม่ได้#nลิ้มรสชาติของการชวนนักเรียนมาหลายๆ คนแล้วมาแช่น้ำร่วมกัน"
10007005-196 = "ถึงจะพูดแบบนั้นก็เถอะ..."
10007005-197 = "หืม? ถ้าตามที่หัวหน้าบอกมาละก็... แถวๆ นี้ยังมีออนเซ็นที่อื่นอีกใช่มั้ยน่ะ?"
10007005-198 = "ถ้างั้นเราก็ไม่มีเวลาพักแล้วละ"
10007005-199 = "เพื่อการสร้างออนเซ็นให้มากขึ้น! เพื่อพัฒนาให้ได้มากขึ้น!"
10007005-200 = "พวกเราจะไปสร้างออนเซ็นที่ใหม่อยู่ใกล้ๆ นี้ ถ้าเกิดอุปกรณ์มีปัญหาขึ้นมาก็เรียกได้ตลอดนะ!"
10007005-206 = "เป็นคนที่ไปๆ มาๆ เหมือนพายุจริงๆ เลยนะคะ..."
10007005-207 = "แถมอุปกรณ์อำนวยความสะดวกของอาคารเรียนเก่าก็กลายเป็นรีสอร์ตไปแล้ว..."
10007005-208 = "ก็โชคดีอยู่นะที่ได้อุปกรณ์อำนวยความสะดวกใหม่ แต่ฉันไม่รู้ว่าจะดูแลยังไงดีนี่สิ..."
10007005-212 = "ก่อนอื่นก็... ไปแช่น้ำกันก่อนดีมั้ยคะ?"

[translation]
10007005-1 = "Prologue;A Day in the Life of Spec Ops No. 227"
10007005-2 = "Ruins Near Spec Ops No. 227"
10007005-4 = "Ugh. Why won't it come out?!"
10007005-8 = "I'm so...darn close!"
10007005-13 = "Nodoka, I brought you some hot cocoa."
10007005-14 = "Oh, Shigure!"
10007005-15 = "I was just thinking about a hot drink to warm up my frozen hands and feet... Thanks!"
10007005-21 = "I thought my hands were gonna freeze off."
10007005-22 = "The sweet, sweet warmth of cocoa spreading throughout my body..."
10007005-23 = "It reminds me of our blissful lives at the main institute. Remember when we could have cocoa whenever we wanted?"
10007005-24 = "When will we be able to return to the main building?"
10007005-25 = "You worry too much. President Cherino lifted our suspension at the last festival, remember?"
10007005-26 = "Just be patient, she'll come get us eventually."
10007005-27 = "No! I won't be! It's been months I say, months!"
10007005-28 = "I bet that arrogant shorty doesn't even remember we exist! I-I bet she's eating pudding in the lap of luxury right now! With unlimited hot cocoa!"
10007005-29 = "I was obviously too nice to her the last time she was here. Next time, I'm really gonna get her..."
10007005-30 = "I'm going to resist the urge to point out you're the one who lost last time..."
10007005-31 = "What are you doing out here, besides freezing to death?"
10007005-32 = "I'm glad you asked! I was just pulling out these rotten pillars."
10007005-33 = "We're running out of wood for campfires and the snow's piling up."
10007005-34 = "So, I figured I could kill two birds with one stone: clean up a little and get us some firewood!"
10007005-35 = "You want help?"
10007005-36 = "Yes, we'll combine our strengths to pull out the pillar!"
10007005-41 = "Okay, pull with me on three!"
10007005-43 = "One, two..."
10007005-49 = "THREE!"
10007005-56 = "*boom*"
10007005-58 = "What in the heck was that?!"
10007005-59 = "A bomb? Oh my god, no, it's a giant mole. Shigure, hold me! We're done for!"
10007005-60 = "I'll hold you if you want, but there are no giant moles in these areas."
10007005-61 = "If it wasn't a mole, then it was a bomb! We're under attack!"
10007005-65 = "...Use your eyes, please."
10007005-72 = "Wh-What is this?!"
10007005-73 = "Mother nature is attacking us!"
10007005-74 = "I think we just hit a water vein."
10007005-75 = "It's so big."
10007005-78 = "What if all the water freezes and this area turns into a giant ice skating rink? Shigure, we can't let that happen. We live here!"
10007005-79 = "We have to stop the current, immediately!"
10007005-85 = "What can we possibly block it with? I don't even have enough wood to make a fire."
10007005-86 = "All I wanted was to enjoy the smallest inkling of happiness around a warm campfire."
10007005-87 = "And for that small desire, I'll be punished. We'll freeze to death inside this ice skating rink, forgotten and abandoned."
10007005-88 = "Chin up, Nodoka. Things are never as bad as they seem."
10007005-89 = "Do you not see the gigantic upside-down waterfall bursting out of the ground?! Tell me how this isn't bad!"
10007005-90 = "Look a little closer. It's not just normal groundwater."
10007005-91 = "What do you mean?"
10007005-95 = "Huh? Wait! The water's kinda warm, and it smells like sulfur..."
10007005-96 = "A hot spring?!"
10007005-97 = "I told you it wasn't all bad."
10007005-98 = "Imagine the possibilities. I can be lazy and not have to heat up water to bathe anymore."
10007005-99 = "You're right but..."
10007005-100 = "A stupid hot spring isn't going to help our sorry situation!"
10007005-102 = "Hot springs? Stupid?!"
10007005-103 = "Wh-Who's there? Shigure, a bear's attacking!"
10007005-111 = "Oh? Are there bears in Red Winter Academy? Fascinating!"
10007005-112 = "I wanna see, show me!"
10007005-114 = "Who're you...?"
10007005-116 = "Silly me! Wanting to see bears before even introducing myself."
10007005-117 = "Where a hot spring can be found, so can we!"
10007005-118 = "And here we are, on a bright, shiny day perfect for development!"
10007005-119 = "We are Gehenna Academy's Hot Springs Department!"
10007005-125 = "Gehenna Academy?"
10007005-126 = "What are Gehenna students doing here?"
10007005-127 = "We might be suspended, but that won't stop us from protecting Red Winter Academy from intruders!"
10007005-128 = "Hahaha! ♪ How adorable! If you worry too much, that cute little forehead of yours might get wrinkles."
10007005-129 = "We're only here to investigate information of a new hot spring here."
10007005-130 = "I mean, she isn't wrong..."
10007005-131 = "But how in the heck did you find out about it so fast?"
10007005-132 = "Hahaha! How seriously awesome!"
10007005-133 = "As expected, President Kasumi is always right!"
10007005-134 = "*sniff sniff* Ahh, that sweet, comforting smell of sulfur. I feel right at home."
10007005-135 = "You don't mind if I check out the spring, do you?"
10007005-136 = "I-I guess not. Just a little peek, though."
10007005-137 = "Ahem. Let's see."
10007005-143 = "Hmm, this hot spring..."
10007005-144 = "Honestly, I don't know! It looks pretty cool to me though!"
10007005-145 = "Why did you pretend you were such an expert?!"
10007005-146 = "I don't worry my little brain about the boring stuff like quality or contents."
10007005-147 = "My gauge of a good hot spring is if it makes you want to take your clothes off and jump in!"
10007005-148 = "What? The president approved the construction permit?"
10007005-149 = "Great! Then let the hot springs development begin!"
10007005-155 = "Those are rather large machines... Excuse me, is that a giant drill?"
10007005-156 = "W-Wait a second. I only said you could take a peek! What's happening here?!"
10007005-157 = "Do you need to clean out your ears? I already told you. Hot springs development is what's happening!"
10007005-158 = "But this is the Former Institute managed by the Spec Ops No. 227!"
10007005-159 = "Like I said, I won't allow other schools to just trample on Red Winter Academy property!"
10007005-160 = "It's not like there's really anything happening here, though."
10007005-161 = "Ooh, do you cuties already have development plans in progress?"
10007005-162 = "W-Well, I wouldn't say that exactly."
10007005-163 = "Hmm, then I don't really see the problem here."
10007005-164 = "Well, anyway, we're gonna get started."
10007005-165 = "She's worse than a bear!"
10007005-166 = "Okay, friends!"
10007005-167 = "Let's burn the forest and demolish all the old buildings! "
10007005-168 = "I wonder what happens when you burn down snowy branches... How exciting! ♪ "
10007005-177 = "What are they doing to our home, Shigure?"
10007005-178 = "Thinking about it logically, the ruins were scheduled to be demolished anyway. Might as well get something out of it."
10007005-179 = "Come, sit next to me and watch. I have hot cocoa too."
10007005-180 = "O-Okay...but I'm still a little worried."
10007005-185 = "Wh-Wh-Wh-"
10007005-186 = "What is happening?!"
10007005-187 = "As you can see, it's a new hot springs resort that we built!"
10007005-188 = "Heehee, isn't it just grand? ♪"
10007005-189 = "Th-This is a whole operation! A huge hot spring facility, with a ryokan too?!"
10007005-190 = "I didn't think you were gonna make such a gigantic resort!"
10007005-191 = "Oh, you know how it goes. A new hot spring bursts here, one bursts there, you increase budget, the scale goes up, and voila!"
10007005-192 = "Isn't it awe-inspiring? As I always say, the bigger the better!"
10007005-193 = "B-But, something this—"
10007005-194 = "Oh, of course since this is on Red Winter Academy grounds, it's yours to do with as you wish."
10007005-195 = "Hog it and treat yourself, invite some rich guests, or throw a party for the other students! The only limit is your imagination."
10007005-196 = "Will you listen to me?"
10007005-197 = "What? According to the president, there are other hot springs areas nearby?!"
10007005-198 = "Then there's no time to rest!"
10007005-199 = "More hot springs! More development!!"
10007005-200 = "We'll be developing a new hot spring nearby, so if there's a problem with the facility, call me anytime!"
10007005-206 = "They’re like a storm that comes and goes."
10007005-207 = "A storm that turned our home into a hot springs resort! "
10007005-208 = "I get that it's a nice, new facility, but how in the heck are we supposed to manage something this big?"
10007005-212 = "Well... it'd be a shame to let it go to waste though, right?"

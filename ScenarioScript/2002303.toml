2002303-21 = "3;칸나;04;알아차리는 게 늦었습니다. 여기는 무슨 일로 오셨습니까?\n#3;closeup\n#3;greeting"
2002303-22 = "[s1] \"칸나가 잠복근무를 한다고 해서.\"\n[s2] \"응원하러 왔어!\""
2002303-23 = "#wait;100"
2002303-24 = "#wait;100"
2002303-25 = "3;칸나;07;……마음은 감사합니다만.\n#3;closeup\n#3;em;[땀]"
2002303-26 = "3;칸나;01;잠복근무는 응원이 필요한 업무가 아닙니다. 날이 늦었으니 오늘은 이만 돌아가 주시지요.\n#3;closeup"
2002303-27 = "[s] \"혹시…… 내가 있으면 방해돼?\""
2002303-28 = "3;칸나;04;방해되는 건 아닙니다만……\n#3;stiff"
2002303-29 = "3;칸나;01;용의자가 언제 나타날지 확신할 수 없는 잠복근무에 공사가 다망하신 선생님을 끌어들이는 것도 죄송하니까요."
2002303-30 = "3;칸나;99;혹 늦은 시간까지 제 업무를 도와주시느라 컨디션을 해치지는 않으실지 걱정이 됩니다."
2002303-31 = "[ns] \"피곤하면 돌아갈 테니 걱정하지 마.\""
2002303-32 = "#wait;1000"
2002303-33 = "[ns3] \"그리고 감시하는 눈은 많으면 많을수록 좋잖아?\"\n[ns4] \"수상한 사람이 지나가지 않는지 함께 지켜볼게.\""

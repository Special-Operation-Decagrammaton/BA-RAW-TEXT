2002303-5 = "4;칸나;05\n#4;a\n#wait;1000"
2002303-6 = "4;칸나;05;이번 잠복 수사의 용의자는 주차된 경비국의 순찰 차량을 뒤져 내부에 있던 현금과 보안 문서를 훔쳐 달아났다는 혐의를 받고 있다."
2002303-7 = "4;칸나;07;도둑맞은 현금과 보안 문서 자체는 그리 대단한 물건이 아니지만……"
2002303-8 = "4;칸나;04;일개 좀도둑이 경비국의 차량을 대놓고 뒤졌다는 사실이 세간에 알려진다면 우리 발키리 경찰학교의 위신이 땅에 떨어지게 되겠지."
2002303-9 = "4;칸나;99;겨우 이런 일로 공안국의 인력이 투입될 줄은 몰랐지만……\n#4;em;[한숨]\n#fontsize;50"
2002303-10 = "4;칸나;01;이 사건은 시민들의 신뢰와 직결되는 중대한 문제이므로, 보안 문서와 범행 경위가 유출되기 전에 녀석을 반드시 검거해야 한다."
2002303-11 = "4;칸나;01;공안국의 내부 첩보에 따르면 녀석은 이 주변, 스나오마치 거리 일대에 거점을 두고 신분을 위장한 채 활동 중이라고 한다."
2002303-12 = "4;칸나;05;용의자의 인상착의는 짧은 수염에 접힌 귀를 가지고 있으며, 눈가에 큰 흉터가 있는 삼색 고양이……"

2002303-51 = "[s] \"칸나는 괜찮아?\""
2002303-52 = "3;칸나;01;저는 본래 잠복근무 중에는 식사를 거의 하지 않는 편입니다."
2002303-53 = "3;칸나;01;잠복근무 중에 부식비가 제공되긴 하지만, 식사 때문에 감시를 소홀히 할 수는 없으니까요."
2002303-54 = "3;칸나;99;기껏해야 가끔씩 잠을 깨우기 위해 진하게 탄 블랙커피를 한두 잔 마실 뿐입니다."

[translation]
2002303-1 = "The Director's Duties"
2002303-6 = "*chhhk* The aim of this operation is to apprehend a suspect accused of breaking into a parked Security Bureau vehicle, and stealing cash and classified documents from it."
2002303-7 = "The amount of cash stolen was low, and the documents were relatively unimportant, but..."
2002303-8 = "If word gets out that a burglar can steal Security Bureau property and get away with it, the public's trust in Valkyrie Police School will be damaged."
2002303-9 = "It's unusual for members of the Public Peace Bureau to be deployed for an incident like this."
2002303-10 = "However, with a case that could affect the faith of the citizenry, it's essential to apprehend the suspect and recover the stolen goods before the public learns of the crime."
2002303-11 = "The Public Peace Bureau has obtained intel that the suspect has a base around Sunaomachi St. We expect them to be using a false identity."
2002303-12 = "The suspect is a calico cat with short whiskers, folded ears, a large scar across one eye— *chhk*"
2002303-20 = "[USERNAME] Sensei...?"
2002303-21 = "What brings you here so late at night?"
2002303-22 = "[s1] \"I heard you were deployed on a stakeout.\"\n[s2] \"I came to support you!\""
2002303-25 = "Thank you, but..."
2002303-26 = "Stakeouts don't require direct support. Given the time, it'd be best if you returned home."
2002303-27 = "[s] \"Would I...be in the way?\""
2002303-28 = "Not directly, no."
2002303-29 = "However, your workload is large enough as it is. I wouldn't presume to drag you into a stakeout with no end in sight."
2002303-30 = "I don't want to be liable for you falling ill."
2002303-31 = "[ns] \"I promise to go home if I get too tired.\""
2002303-33 = "[ns3] \"Also, two heads are better than one, right?\"\n[ns4] \"I can help you spot anything suspicious.\""
2002303-36 = "...If you insist."
2002303-37 = "As long as you don't push yourself too hard, you can stay."
2002303-39 = "*chhk* The current time is 12:30AM. Visibility is clear. So far, no sightings of suspicious individuals in the area."
2002303-40 = "Maintaining current position. Remaining alert— *chhk*"
2002303-47 = "[ns] \"...Sorry. I haven't had dinner...\""
2002303-48 = "It's fine. I haven't had dinner either."
2002303-49 = "If you're hungry, there are several convenience stores in the immediate area."
2002303-50 = "Or, since nothing else is open this late, you could go back to Schale—"
2002303-51 = "[s] \"Do you need anything?\""
2002303-52 = "No. I never eat during a stakeout."
2002303-53 = "We are given a budget for provisions, but I can't let a meal get in the way of proper surveillance."
2002303-54 = "I have two cups of strong black coffee to keep me awake, and that's all I need."
2002303-55 = "So don't worry about me. And take your time. If you need to rest—"
2002303-56 = "[s] \"I'll be right back.\""
2002303-57 = "Of course."
2002303-66 = "...You're back sooner than expected."
2002303-67 = "I'm certain you have a lot of work to do tomorrow. Why are you so insistent on helping?"
2002303-68 = "And what's with the plastic bag?"
2002303-69 = "[s5] \"I bought enough to share.\"\n[s6] \"Red bean buns and milk for both of us!\""
2002303-72 = "Haha... Red bean buns?"
2002303-73 = "That is a classic stakeout food..."
2002303-74 = "But I'll decline. Help yourself."
2002303-75 = "[s7] \"Why?!\"\n[s8] \"Do you not like red bean buns?\""
2002303-78 = "They're fine. It's not about personal preference."
2002303-79 = "At this time of day, if I have a full stomach, I risk falling asleep."
2002303-80 = "If I, a student of Valkyrie Police School, were to overeat, fall asleep, and lose a criminal, I'd be the laughingstock of Kivotos."
2002303-81 = "So, while the gesture is appreciated, I'm still going to refuse."
2002303-87 = "I decided to try again, but..."
2002303-89 = "Sensei? I thought you were going home this time..."
2002303-90 = "What did you bring this time? Donuts, in case I get hungry?"
2002303-91 = "As I said, I don't eat during stakeouts."
2002303-92 = "So I'm not going to accept that either."
2002303-94 = "That smell... Did you buy something else?"
2002303-95 = "...A hamburger? Just... Why?"
2002303-96 = "A movie? You saw a movie where detectives ate hamburgers on a stakeout?"
2002303-97 = "But that's fiction. Obviously. And, as I've said multiple times—"
2002303-98 = "I don't know what you're trying to accomplish, but please stop. If the suspect notices you coming and going too often, they could find it suspicious and flee."
2002303-100 = "What is it this time?"
2002303-101 = "[s9] \"It's yakisoba!\"\n[s10] \"You can't have a stakeout without noodles!\""
2002303-108 = "No way."
2002303-109 = "There's no way I could eat something that greasy and fragrant on a stakeout."
2002303-111 = "Every single response was a resounding no."
2002303-113 = "Sensei. Why do you persist in being a nuisance?"
2002303-114 = "If you continue to get in the way of this operation..."
2002303-115 = "I'll have no choice but to arrest you for obstruction of justice."
2002303-116 = "[s11] \"I-I never meant to get in your way!\"\n[s12] \"I just didn't want you to skip meals because of work.\""
2002303-119 = "It's one meal. It's not that important."
2002303-120 = "Of course I understand the health detriments of not having regular meals, but once in a while, I must prioritize otherwise."
2002303-121 = "As a police officer, there's nothing more important than making an arrest."
2002303-122 = "[s] \"Your health is more important!\""
2002303-123 = "Really?"
2002303-124 = "[s13] \"If your health fails, you can't catch any criminals.\"\n[s14] \"Meals should always be a priority.\""
2002303-127 = "*sigh*"
2002303-128 = "As you're clearly not going to give up, I'll have a red bean bun."
2002303-129 = "You truly are irritating, in more ways than one."
2002303-130 = "Where did you even find all this food?"
2002303-131 = "This logo isn't from any of the nearby convenience stores. And the food looks like restaurant take-out."
2002303-132 = "But at this time of night, none of the restaurants in the area should be open."
2002303-133 = "[s] \"I bought it from a food stall down the street.\""
2002303-134 = "A food stall, in the middle of the night, on a street with this little foot traffic?"
2002303-135 = "I wonder..."
2002303-136 = "Sensei, do you remember what the food stall worker looked like?"
2002303-137 = "[s] \"A calico cat with a scar across one eye. Oh, and folded ears.\""
2002303-142 = "That's the suspect!"
2002303-143 = "Sensei, take me to this food stall!"
2002303-147 = "Kanna found the criminal at the fake food stall and made an immediate arrest."
2002303-148 = "But, even after the operation ended successfully, she wouldn't take any of the food."
2002303-149 = "Luckily, since I ended up with a truly huge amount, the other Police School students on duty were happy to have it."

[translation]
2002303-1 = "งานของหัวหน้า"
2002303-6 = "ผู้ต้องสงสัยในการสืบสวนนี้ถูกกล่าวหาว่าปล้นรถลาดตระเวนของสำนักความมั่นคงที่จอดไว้ แล้วขโมยเอาเงินสดและเอกสารด้านความปลอดภัยที่อยู่ในรถไป"
2002303-7 = "ถึงเงินสดและเอกสารด้านความปลอดภัยที่ถูกขโมยไปจะไม่ใช่เรื่องใหญ่อะไร......"
2002303-8 = "แต่หากมีข่าวหลุดออกไปว่าหัวขโมยพวกนั้นมาปล้นรถของสำนักความมั่นคงละก็ สถาบันฝึกตำรวจ#nวัลคิรี่ของเราก็คงเสียศักดิ์ศรีน่าดูเลยละ"
2002303-9 = "ฉันไม่คิดเลยว่าเรื่องแบบนี้จะทำให้กรมความมั่นคงสาธารณะต้องมาข้องเกี่ยวด้วย......"
2002303-10 = "เนื่องจากเหตุการณ์นี้เป็นปัญหาใหญ่ที่เกี่ยวข้องโดยตรงกับความไว้วางใจของชาวเมือง ดังนั้นเราเลย#nต้องจับกุมคนร้ายให้ได้ก่อนที่เอกสารด้านความปลอดภัยและข้อมูลอาชญากรรมนี้จะหลุดออกไป"
2002303-11 = "จากแหล่งข่าวภายในของกรมความมั่นคงสาธารณะ คนร้ายมีฐานอยู่รอบๆ ถนนซึนาโอมาชิ และกำลังปลอมตัวเพื่อปกปิดรูปลักษณ์ภายนอก"
2002303-12 = "ผู้ต้องสงสัยเป็นแมวสามสี หูพับ ไว้เคราสั้นๆ และมีรอยแผลเป็นขนาดใหญ่ที่ขอบตา..."
2002303-20 = "คุณครู [USERNAME]......?"
2002303-21 = "ฉันไม่ทันสังเกตเห็นค่ะ มีธุระอะไรที่นี่เหรอคะ?"
2002303-22 = "[s1] \"ได้ยินมาว่าคันนะออกมาซุ่มจับคนร้าย\"\n[s2] \"ครูมาให้กำลังใจน่ะ!\""
2002303-25 = "...ยังไงก็ขอบคุณนะคะ"
2002303-26 = "แต่งานแฝงตัวซุ่มโจมตีแบบนี้ไม่จำเป็นต้องมีกำลังใจหรอกค่ะ นี่ก็ดึกแล้ว คุณครูกลับไปเถอะค่ะ"
2002303-27 = "[s] \"หรือว่า... ครูมารบกวนเหรอ?\""
2002303-28 = "ไม่ได้รบกวนหรอกค่ะ..."
2002303-29 = "แต่นี่คือการแฝงตัวซุ่มโจมตีที่ไม่รู้ว่าผู้ต้องสงสัยจะปรากฏตัวเมื่อไร ฉันไม่อยากดึงคุณครูที่มีเรื่องส่วน#nตัวให้ทำมากแล้วมาเสียเวลากับตรงนี้ค่ะ"
2002303-30 = "อีกอย่าง ฉันก็กังวลว่าถ้าคุณครูมาอยู่ช่วยงานฉันถึงดึกดื่น ร่างกายของคุณครูจะแย่เอานะคะ"
2002303-31 = "[ns] \"ไม่ต้องห่วงนะ ถ้าเหนื่อยเดี๋ยวครูกลับเอง\""
2002303-33 = "[ns3] \"อีกอย่าง ยิ่งมีคนช่วยจับตาดูหลายคนก็ยิ่งดีไม่ใช่เหรอ?\"\n[ns4] \"ครูจะช่วยดูให้อีกแรงว่ามีคนท่าทางน่าสงสัยผ่านมาหรือเปล่า\""
2002303-36 = "...ถ้าพูดอย่างนี้ก็ช่วยไม่ได้นะคะ"
2002303-37 = "ยังไงก็อย่าหักโหมมากเกินไปด้วยนะคะ"
2002303-39 = "ปัจจุบันเวลา 00:30 น. ทัศนวิสัยดี ถึงขณะนี้ยังไม่มีรายงานบุคคลน่าสงสัยในบริเวณใกล้เคียง"
2002303-40 = "รออยู่ในตำแหน่งปัจจุบันด้วยความระมัดระวัง"
2002303-47 = "[ns] \"...ขอโทษนะ ครูยังไม่ได้กินข้าวเย็นน่ะ...\""
2002303-48 = "ไม่เป็นไรค่ะ จะว่าไปแล้ว ฉันก็มัวแต่ปฏิบัติหน้าที่จนยังไม่ได้กินข้าวเย็นเหมือนกัน"
2002303-49 = "คุณครูคะ ถ้าหิวก็ซื้อข้าวจากร้านสะดวกซื้อใกล้ๆ แถวนี้ทานก่อนมั้ยคะ?"
2002303-50 = "หรือไม่ก็กลับไปที่ชาเล่ต์ก่อนก็ได้นะคะ ยังไงมันก็ดึกมากแล้ว—"
2002303-51 = "[s] \"แล้วคันนะล่ะ?\""
2002303-52 = "ปกติฉันไม่ค่อยทานอะไรระหว่างปฏิบัติหน้าที่ค่ะ"
2002303-53 = "ถึงจะมีงบสนับสนุนค่าอาหารระหว่างปฏิบัติงานแฝงตัว แต่ฉันก็ไม่อาจละทิ้งหน้าที่ไปทานอาหารได้#nหรอกค่ะ"
2002303-54 = "อย่างมากก็แค่ดื่มกาแฟดำเข้มๆ สักแก้วสองแก้วเพื่อทำให้ไม่ง่วงค่ะ"
2002303-55 = "เพราะงั้นไม่ต้องสนใจฉันหรอกค่ะ คุณครูไปพักเถอะนะคะ"
2002303-56 = "[s] \"งั้นเดี๋ยวครูมานะ\""
2002303-57 = "ค่ะ"
2002303-66 = "...กลับมาเร็วกว่าที่คิดนะคะ"
2002303-67 = "พรุ่งนี้คุณครูก็น่าจะยุ่งกับงานของชาเล่ต์นะคะ แล้วทำไมถึง......"
2002303-68 = "ว่าแต่...ถุงในมือคืออะไรคะ?"
2002303-69 = "[s5] \"ครูซื้อมากินกับคันนะไง\"\n[s6] \"ขนมปังไส้ถั่วแดงกับนมน่ะ!\""
2002303-72 = "ฮุฮุ...ขนมปังไส้ถั่วแดงเหรอคะ"
2002303-73 = "มันคือสิ่งแรกที่ฉันคิดถึงเวลาพูดถึงการแฝงตัวซุ่มโจมตีของตำรวจเลย......"
2002303-74 = "แต่ฉันไม่เป็นไรหรอกค่ะ คุณครูทานคนเดียวเถอะค่ะ"
2002303-75 = "[s7] \"ทำไมล่ะ?!\"\n[s8] \"ไม่ชอบขนมปังไส้ถั่วแดงเหรอ?\""
2002303-78 = "คือว่า... มันไม่เกี่ยวกับความชอบหรอกค่ะ"
2002303-79 = "แต่ตอนนี้มันก็ดึกแล้ว ถ้ากินอะไรจนอิ่มมันก็อาจจะทำให้ง่วงได้น่ะค่ะ"
2002303-80 = "หากนักเรียนของสถาบันฝึกตำรวจวัลคิรี่จับตัวคนร้ายไม่ได้เพราะง่วงหลังจากมื้ออาหาร ก็คงเป็นเรื่อง#nขบขันในคิโวทอสเลยละค่ะ"
2002303-81 = "ฉันขอบคุณสำหรับน้ำใจนะคะ แต่ตอนนี้ขอปฏิเสธค่ะ"
2002303-87 = "(ต่อมาคุณครูก็ชวนคันนะกินอาหารอื่นๆ แต่ก็.....)"
2002303-89 = "คุณครูคะ ฉันนึกว่าครั้งนี้คุณครูจะกลับไปแล้วเสียอีก......"
2002303-90 = "ซื้อโดนัทมา... เพราะกลัวว่าฉันจะหิวงั้นเหรอคะ...?"
2002303-91 = "ฉันก็บอกไปแล้วไม่ใช่เหรอคะ ว่าปกติแล้วฉันไม่ค่อยกินอะไรระหว่างปฏิบัติหน้าที่"
2002303-92 = "ขอโทษนะคะ แต่ครั้งนี้ฉันก็ต้องขอปฏิเสธค่ะ"
2002303-94 = "กลิ่นนี้มัน... รอบนี้ซื้ออะไรมาอีกคะ?"
2002303-95 = "...แฮมเบอร์เกอร์? ซื้อมาทำไมคะ...?"
2002303-96 = "เคยเห็นในหนังว่าสายสืบกินแฮมเบอร์เกอร์ระหว่างปฏิบัติหน้าที่งั้นเหรอคะ?"
2002303-97 = "หนังมันก็แค่หนังค่ะ และก็อย่างที่ฉันบอกคุณครูไปก่อนหน้านี้แล้วว่า—"
2002303-98 = "...คุณครูจะช่วยหยุดแค่นี้ได้มั้ยคะ? ถ้าคนร้ายสังเกตเห็นอะไรที่น่าสงสัยจากตรงนี้แล้วหนีไปจะทำยังไงคะ"
2002303-100 = "...นี่มัน?"
2002303-101 = "[s9] \"ยากิโซบะ!\"\n[s10] \"ระหว่างปฏิบัติหน้าที่ต้องกินอาหารเส้นนี่แหละ!\""
2002303-108 = "เราอยู่ระหว่างภารกิจเร่งด่วนในการตามล่าอาชญากรนะคะ......"
2002303-109 = "จะมากินอาหารมันๆ กลิ่นแรงแบบนี้ได้ยังไงกันคะ!"
2002303-111 = "(อาหารที่ซื้อมาโดนปฏิเสธทั้งหมด......)"
2002303-113 = "คุณครูคะ ทำไมถึงมากวนฉันอยู่ตั้งแต่เมื่อกี้แล้วคะ?"
2002303-114 = "ถ้ายังซื้ออะไรมาให้ฉันกินและยังรบกวนการทำงานของฉันอีกละก็......"
2002303-115 = "ฉันจะจับกุมคุณครูในฐานขัดขวางการปฏิบัติหน้าที่นะคะ!"
2002303-116 = "[s11] \"คะ... ครูไม่ได้มาขัดขวางนะ!\"\n[s12] \"ครูก็แค่ไม่อยากให้อดข้าวเพราะงานน่ะ...\""
2002303-119 = "อดข้าวแค่มื้อเดียว ไม่ใช่ปัญหาใหญ่อะไรหรอกค่ะ"
2002303-120 = "ฉันรู้ดีค่ะว่าการกินอาหารให้ตรงเวลาจะทำให้มีสุขภาพดี แต่ทุกเรื่องในชีวิตล้วนมีลำดับความสำคัญกัน#nทั้งนั้นนะคะ"
2002303-121 = "สำหรับตำรวจแล้ว ไม่มีอะไรสำคัญไปกว่าการจับกุมคนร้ายหรอกค่ะ"
2002303-122 = "[s] \"สุขภาพของคันนะสำคัญกว่าการจับกุมคนร้ายนะ\""
2002303-123 = "...คุณครูพูดจริงเหรอคะ?"
2002303-124 = "[s13] \"ก็ถ้าไม่มีเรี่ยวแรง จะไปจับคนร้ายได้ยังไงล่ะ?\"\n[s14] \"เพราะงั้นต้องกินอะไรให้มีแรงก่อนนะ\""
2002303-127 = "เฮ้อ..."
2002303-128 = "ก็ได้ค่ะ ถ้างั้นฉันขอขนมปังไส้ถั่วแดงชิ้นเดียวก็พอค่ะ"
2002303-129 = "คุณครูเนี่ย มาทำให้ฉันรำคาญใจหลายๆ เรื่องเลย......"
2002303-130 = "จะว่าไป คุณครูไปเอาอาหารพวกนี้มาจากไหนเหรอคะ?"
2002303-131 = "ดูจากดีไซน์กล่องและถุงแล้ว ไม่น่าจะใช่ของร้านสะดวกซื้อแถวนี้นะคะ มันเหมือนกับว่าให้ร้านอาหาร#nห่อมาให้เลย......"
2002303-132 = "ดึกแบบนี้ ร้านอาหารแถวนี้ก็น่าจะปิดหมดแล้วนี่คะ"
2002303-133 = "[s] \"มีร้านข้างทางยังขายอยู่ข้างหน้านี้น่ะ\""
2002303-134 = "มีร้านข้างทางในหมู่บ้านกลางดึกแบบนี้ด้วยเหรอคะ? แต่เวลานี้ไม่ค่อยมีคนสัญจรแล้วนะ?"
2002303-135 = "หรือว่า......"
2002303-136 = "คุณครูคะ จำหน้าตาพนักงานร้านข้างทางนั้นได้มั้ยคะ?"
2002303-137 = "[s] \"เป็นแมวสามสี หูตก แล้วก็มีแผลอยู่ที่ตาด้วย......\""
2002303-142 = "เจ้านั่นแน่เลย!"
2002303-143 = "คุณครูคะ ช่วยพาฉันไปที่ร้านนั้นหน่อยค่ะ เดี๋ยวนี้เลยค่ะ!"
2002303-147 = "(ต่อมาคันนะก็เจอคนร้ายที่ปลอมตัวอยู่ในร้านข้างทางและจับตัวเขาได้สำเร็จ)"
2002303-148 = "(แต่เมื่อจบปฏิบัติการแล้ว คันนะก็ยังไม่ยอมกินอะไรเพิ่ม......)"
2002303-149 = "(คุณครูก็เลยเอาอาหารกองโตที่ซื้อมาไปแบ่งให้นักเรียนสถาบันฝึกตำรวจกิน)"

[translation]
2002303-1 = "埋伏的慣例"
2002303-6 = "本案的嫌犯涉嫌闖入並竊取警備局車輛上的現金與保安文件。"
2002303-7 = "遭到竊取的現金與保安文件本身並不是特別重要……"
2002303-8 = "不過警備局的車輛被區區一個竊賊闖入，這件事如果傳出去的話，#n我們女武神警察學園的威信將會掃地。"
2002303-9 = "沒想到會因為那些蠢蛋們的失態，使公安局不得不出動啊……"
2002303-10 = "你們聽好了。本案是與市民的信賴有密切關係的重要案件。#n避免保安文件的外流應該不需要我再次提醒，一定要在驚動媒體之前把嫌犯逮捕歸案！"
2002303-11 = "公安局內部的情報顯示，嫌犯集團以砂尾町一帶為據點，#n偽裝身分進行活動。"
2002303-12 = "嫌犯的特徵是短鬍鬚、摺耳，#n並且眼睛旁邊有個巨大傷疤的三花貓……"
2002303-20 = "[USERNAME]老師……？"
2002303-21 = "您是什麼時候來的？#n不，應該問您為何會在這裡……"
2002303-22 = "[s1]「因為聽說環奈正在進行埋伏行動。」\n[s2]「所以就來幫忙了。」"
2002303-25 = "……您的好意我非常感激。"
2002303-26 = "但是埋伏並不需要那麼多人。#n時間也不早了，請您交給我們，回夏萊去吧。"
2002303-27 = "[s]「難道……我在這裡會妨礙到你們嗎？」"
2002303-28 = "這倒不至於……"
2002303-29 = "但即便在這裡埋伏，也無法確定嫌犯何時會現身。#n而且，把公務繁忙的老師牽扯進來會讓我覺得過意不去。"
2002303-30 = "我擔心您若是協助我們的業務直到深夜，會造成您身體的負擔。"
2002303-31 = "[ns]「如果我累了會在造成你們困擾之前回去的，不用擔心。」"
2002303-33 = "[ns3]「而且監視的人越多越好不是嗎？」\n[ns4]「我很擅長找出可疑人物的哦。」"
2002303-36 = "……既然您都這麼說了，那就沒辦法了。"
2002303-37 = "那麼……還請您不要勉強。"
2002303-39 = "現在時間上午0點30分，視野良好。#n目前為止周圍並沒有可疑人士的目擊情報。"
2002303-40 = "在可能的嫌犯出現之前，在此待……"
2002303-47 = "[ns]「……抱歉，我沒有吃晚餐……」"
2002303-48 = "不……這麼說來，我也忘記吃晚餐了。"
2002303-49 = "老師，如果您覺得餓的話，到附近的便利商店吃點東西也沒問題。"
2002303-50 = "現在也過12點了，如果您要回夏萊也──"
2002303-51 = "[s]「環奈沒關係嗎？」"
2002303-52 = "我平時在任務中就不會進食。"
2002303-53 = "雖然任務中的餐費日後會以經費結算，#n但如果因為用餐而疏於監視的話，就得不償失了。"
2002303-54 = "不過為了保持清醒會喝點咖啡就是了……"
2002303-55 = "所以請不必擔心，老師自己去吧。"
2002303-56 = "[s]「那我就離開一下囉。」"
2002303-57 = "好的。"
2002303-66 = "……比預期中還快回來呢。"
2002303-67 = "明明聽說明天也有工作，為什麼要做到這種程度……"
2002303-68 = "……您手上的袋子是？"
2002303-69 = "[s5]「我想和環奈一起吃。」\n[s6]「是紅豆麵包和牛奶唷！」"
2002303-72 = "呵呵……#n是紅豆麵包啊。"
2002303-73 = "說到埋伏，大部分的人都會想到這個呢。"
2002303-74 = "我沒關係的，請老師自己享用吧。"
2002303-75 = "[s7]「咦！？為什麼！？」\n[s8]「你討厭紅豆麵包嗎？」"
2002303-78 = "不是的……並不是喜好的問題。"
2002303-79 = "現在這個時間……如果吃太飽很容易想睡覺的。"
2002303-80 = "女武神警察學園的學生如果因為吃飽打瞌睡而讓嫌犯逃跑，會淪為整個奇普托斯的笑柄。"
2002303-81 = "所以您的好意我心領了。"
2002303-87 = "（之後雖然向環奈推薦了各種食物……）"
2002303-89 = "老師？我還以為您這次真的要回去了……"
2002303-90 = "您買了甜甜圈？#n因為覺得我會餓……？"
2002303-91 = "剛剛已經和您說過，我在埋伏時是不會吃東西的。"
2002303-92 = "非常抱歉，感謝您的好意。"
2002303-94 = "這個味道是……#n您又買了什麼嗎？"
2002303-95 = "……漢堡？#n可以請問您理由是什麼嗎……？"
2002303-96 = "之前在警匪電影裡看過埋伏時吃漢堡的場景……是嗎？"
2002303-97 = "老師，電影是電影。#n而且我已經跟您說過很多次了，我在──"
2002303-98 = "……比起這個，希望您可以適可而止。#n嫌犯可能會發現我們的行動而逃走的。"
2002303-100 = "……這是？"
2002303-101 = "[s9]「是炒麵唷！」\n[s10]「紅豆麵包是慣例沒錯，不過偶爾也會吃炒麵對吧！」"
2002303-108 = "在這種不知道能不能逮捕嫌犯的重要狀況下……"
2002303-109 = "不是吃炒麵的時候吧！"
2002303-111 = "（又被拒絕了……）"
2002303-113 = "老師……為什麼您要一直妨礙我呢？"
2002303-114 = "如果您依然打算一再重複相同的事……"
2002303-115 = "我就以妨害公務的罪名逮捕老師！"
2002303-116 = "[s11]「我，我沒有要妨礙你的意思！」\n[s12]「只是不希望環奈因為重要的任務而不好好吃飯……」"
2002303-119 = "少吃一餐並不是什麼嚴重的問題。"
2002303-120 = "我很清楚規律飲食對維持健康的重要性，#n但任何事情都存在優先順序。"
2002303-121 = "對警察來說，沒有什麼是比解決事件更重要的。"
2002303-122 = "[s]「環奈的健康比事件更重要哦。」"
2002303-123 = "……您是認真的嗎？"
2002303-124 = "[s13]「我很擔心環奈。」\n[s14]「關鍵時刻如果體力不支就無法逮捕犯人了對吧？」"
2002303-127 = "唉……"
2002303-128 = "我知道了。#n那我就吃一個紅豆麵包吧。"
2002303-129 = "老師的這種地方，真的是……"
2002303-130 = "話說回來，這是在哪裡買的呢？"
2002303-131 = "從袋子和容器的設計來看應該不是便利商店……"
2002303-132 = "不過，這個時間附近的餐廳應該都關門了才對。"
2002303-133 = "[s]「那邊的路邊攤還有在營業唷。」"
2002303-134 = "在這種人煙稀少的時間還有路邊攤？"
2002303-135 = "難道說……"
2002303-136 = "老師，那個路邊攤店員的長相是什麼樣子？"
2002303-137 = "[s]「是摺耳、眼睛旁有疤痕……啊，感覺像三花貓一樣哦。」"
2002303-142 = "就是那傢伙！"
2002303-143 = "老師，請帶我到路邊攤所在的地方！"
2002303-147 = "（在那之後，環奈在路邊攤發現了裝作若無其事的犯人，並立即將其逮捕）"
2002303-148 = "（但是埋伏結束後，環奈依然不想收下食物……）"
2002303-149 = "（只好把買來的大量食物分給其他學生一起享用）"

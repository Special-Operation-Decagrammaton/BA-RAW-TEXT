[translation]
1300606-1 = "Someone's Special Request"
1300606-2 = "Yoohoo, Sensei! Over here!"
1300606-3 = "[s] \"What did you mean by a 'special request'?\""
1300606-4 = "Hahaha! This is incredible!"
1300606-5 = "Umm, it's nothing..."
1300606-6 = "It's just that we have a whole bunch of commissions, and I could desperately use your help with them."
1300606-7 = "[s1] \"For you to call it 'special'...\"\n[s2] \"For you to desperately need help...\""
1300606-8 = "Heh heh! Well? How about it?"
1300606-9 = "Heh heh! Well? How about it?"
1300606-10 = "You wouldn't leave a poor, helpless student in her moment of need, would you? You have to help me out!"
1300606-11 = "[s] \"By the way, why are you here alone if the commissions were for the entire Problem Solver...?\""
1300606-14 = "You. Will. Help. Me. Out."
1300606-15 = "Right, Sensei?!"
1300606-16 = "You already came all this way, so you can't back out now!"
1300606-17 = "[s3] \"...Mmm, I see that I don't have a say in this matter.\"\n[s4] \"Well, I guess I have to, then...\""
1300606-18 = "Ahaha! I knew you'd cooperate, Sensei!"
1300606-19 = "Ahaha! I knew you'd cooperate, Sensei!"
1300606-20 = "[s] \"So, which commission should we start with?\""
1300606-21 = "Thankfully, I wrote down the list of commissions here."
1300606-22 = "[s] \"Cool, can I see it?\""
1300606-25 = "Sorry, Sensei. No can do!"
1300606-26 = "I can't go giving out the clients' personal information, can I?"
1300606-27 = "Ooh, no can do. I can't show this to anyone, not even you."
1300606-28 = "[s] \"I see. You're a real professional, Mutsuki.\""
1300606-29 = "Yeah, that's right. Real professional!"
1300606-30 = "Ahem. All right, without further ado, here's the first commission!"
1300606-31 = "It's about..."
1300606-33 = "Sugar Sweet, Homemade Desserts Shop"
1300606-34 = "[ns] \"...Are you sure that's a real commission?\""
1300606-35 = "Yup! According to the client, we must \"try out every crepe sold at this dessert cafe...\""
1300606-36 = "\"...and determine which is the best\"!"
1300606-37 = "[s5] \"The best of all the crepes...!\"\n[s6] \"But there are more than ten of them on the menu.\""
1300606-38 = "Haha! Finding the best is important! The only problem is the budget. "
1300606-39 = "Hmm... I wonder if this will work."
1300606-40 = "Well, no worries. We can finish them without a problem. More importantly..."
1300606-41 = "...we can leave the expenses to you, Sensei! ♪"
1300606-42 = "[s] \"Uh...\""
1300606-43 = "Right? You can't turn down a student's request, can you, Sensei?"
1300606-44 = "Especially when your precious student is working so hard to fulfill a client's commission."
1300606-45 = "Or..."
1300606-46 = "Are you going to say no?"
1300606-48 = "[s] \"H-Hey! I'm not your personal wallet!\""
1300606-49 = "Ahahaha! Thanks, Sensei!"
1300606-51 = "Mmm. You just can't go wrong with strawberries! ♪"
1300606-52 = "Bananas are so nice and sweet!"
1300606-53 = "How are you doing, Sensei?"
1300606-54 = "[s7] \"Strawberry, banana, chocolate, caramel... There are crepes everywhere...\"\n[s8] \"My mouth is coated with sugar. I think I'm slipping into a coma...\""
1300606-55 = "Cheer up, Sensei. There aren't too many left now, so stay strong!"
1300606-56 = "Cheer up, Sensei. There aren't too many left now, so stay strong!"
1300606-57 = "[s] \"O-Ohhh...!\""
1300606-59 = "(Mutsuki and I devour a bunch of crepes.)"
1300606-61 = "Ahaha! This might be the best crepe ever! But it's so hard to decide..."
1300606-62 = "[s] \"Ugh, my mouth still feels gross.\""
1300606-63 = "Well, that's enough of that. Let's move on to the next commission!"
1300606-64 = "[s] \"Is it something we can do here at the theme park?\""
1300606-65 = "The second commission is simple!"
1300606-66 = "Yeah, so... "
1300606-67 = "The client wants us to \"investigate which horse on the merry-go-round at this theme park is the fastest!\""
1300606-68 = "[ns9] \"...Merry-go-round?\"\n[ns10] \"The fastest horse?\""
1300606-73 = "[ns] \"Aren't they...all the same?\""
1300606-74 = "Come on, Sensei, don't be like that. Just pick one. I'm going with that red horse over there!"
1300606-75 = "I bet it's about three times faster than the other horses!"
1300606-76 = "Ah! It's starting to move!"
1300606-77 = "[s] \"Umm...?\""
1300606-79 = "(Of course, every horse on the merry-go-round moved at the same speed.)"
1300606-81 = "Hahaha! They're all the same speed! Well, I guess there's nothing we can do about that."
1300606-82 = "Keeheehee! Let's move on to our third commission, Sensei!"
1300606-83 = "[s] \"Y-Yeah...\""
1300606-85 = "Gehenna Library 13"
1300606-86 = "(Our next commission is here at the library.)"
1300606-87 = "[s] \"*whisper* What's the commission?\""
1300606-88 = "This one says..."
1300606-89 = "\"Please place every book on a bookshelf upside down without anyone noticing.\""
1300606-90 = "[s] \"Wait, that just sounds like a simple prank...\""
1300606-91 = "A job's a job. And there's no rule saying we can't just put them all back the way they were. Right, Sensei?"
1300606-92 = "[s11] \"It's a commission nonetheless, and we can put them back afterwards...\"\n[s12] \"Well...I guess we've gotta do it...\""
1300606-93 = "Haha! Thanks, Sensei! ♥"
1300606-94 = "Haha! Thanks, Sensei! ♥"
1300606-96 = "(Even after that, I performed many more tasks following Mutsuki's lead.)"
1300606-97 = "(After some time passed...)"
1300606-99 = "[ns] \"We finished quite a few commissions.\""
1300606-100 = "Keeheehee, you're right. "
1300606-101 = "[s] \"How many more do we have left?\""
1300606-102 = "Ah, that's..."
1300606-104 = "The remaining commissions are..."
1300606-106 = "Oops, my paper..."
1300606-107 = "Mutsuki's commission sheet flew off into the sky."
1300606-111 = "[ns13] \"No worries, Mutsuki! I got it!\"\n[ns14] \"Let's see, the commissions we have left are..."
1300606-112 = "Oh, Sensei! Don't worry about that, just hand it back to me..."
1300606-113 = "Oh, Sensei! Don't worry about that, just hand it back to me..."
1300606-114 = "[ns] \"Huh? The name of the client is...\""
1300606-116 = "[ns] \"Client name: Mutsuki...?\""
1300606-119 = "Nuts...!"
1300606-123 = "[ns] \"Wait... Mutsuki?!\""
1300606-128 = "― Ah, what a shame.[wa:830] "
1300606-130 = "― Looks like I've finally been caught! ♪[wa:200] "
1300606-133 = "― Sensei. Today's cute client was[wa:3570] "
1300606-135 = "― none other than me!"
1300606-138 = "― Honestly, though...[wa:200] "
1300606-140 = "― I can't take care of a Problem Solver mission all by myself.[wa:790] "
1300606-143 = "― What do you think, Sensei?[wa:880] "
1300606-145 = "― My prank worked flawlessly, didn't it?[wa:530] "
1300606-148 = "― What's up with that dumbfounded look?[wa:1920] "
1300606-150 = "― It's so funny! Ahaha! ♪[wa:410] "
1300606-153 = "― We did a lot of fun stuff today.[wa:1530] "
1300606-156 = "― We ate crepes, stopped by a theme park,[wa:400] "
1300606-158 = "― and we were partners in crime at the library![wa:200] "
1300606-161 = "― Ah... I could've had you tricked the whole time. What a shame![wa:2410] "
1300606-164 = "― But next time, I'll be sure to keep you fooled until the end![wa:500] "
1300606-166 = "― Look forward to it![wa:10] "
1300606-169 = "― Ah, I had so much fun today![wa:2890] "
1300606-172 = "Since you caught me, it's time for me to go!"
1300606-174 = "[ns] \"I fell for it...\""
1300606-176 = "(Mutsuki, giggling and waving, disappeared into the distance while I stood there dumbstruck.)"

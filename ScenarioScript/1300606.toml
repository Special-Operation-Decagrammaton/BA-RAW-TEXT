[translation]
1300606-1 = "คำขอพิเศษของใครบางคน"
1300606-2 = "ยะฮู้ว คุณครู! ทางนี้ ทางนี้!"
1300606-3 = "[s] \"คำขอสุดพิเศษที่บอกคืออะไรเหรอ?\""
1300606-4 = "ฮ่ะฮ่ะฮ่า! จะว่ายังไงดีน้า~"
1300606-5 = "อืม... เปล่าหรอก..."
1300606-6 = "เรียกว่าเป็นคำขอที่ต้องให้คุณครูช่วยน่าจะดีกว่านะ?"
1300606-7 = "[s1] \"ถ้าเป็นเรื่องที่มุสึกิบอกว่าพิเศษแล้วล่ะก็...\"\n[s2] \"ถ้าเป็นเรื่องที่มุสึกิบอกว่าอยากให้ช่วยล่ะก็...\""
1300606-8 = "คิคิคิ~ นั่นสิ เรื่องอะไรกันน้า~?"
1300606-9 = "คิคิคิ~ นั่นสิ เรื่องอะไรกันน้า~?"
1300606-10 = "คุณครูคงจะไม่ปล่อยนักเรียนที่แสนน่ารักและต้องการความช่วยเหลือเอาไว้หรอกใช่ม้า?#nคุณครูจะช่วยฉันใช่มั้ย~?"
1300606-11 = "[s] \"แต่ว่าถ้าเป็นงานว่าจ้างของหน่วยแล้วทำไมเธอถึงมาคนเดียว...\""
1300606-14 = "คุณ ครู จะ ช่วย ฉัน ใช่ มั้ย?"
1300606-15 = "คุณครู?!"
1300606-16 = "โธ่~ ไหนๆ ก็มาถึงนี่แล้วอย่าเพิ่งกลับเลยน้า~!"
1300606-17 = "[s3] \"...อืม คงปฏิเสธไม่ได้แล้วสินะ\"\n[s4] \"ก็...ช่วยไม่ได้นะ...\""
1300606-18 = "ฮ่ะฮ่ะฮ่า คิดแล้วเชียวว่าคุณครูจะต้องช่วย!"
1300606-19 = "ฮ่ะฮ่ะฮ่า คิดแล้วเชียวว่าคุณครูจะต้องช่วย!"
1300606-20 = "[s] \"ถ้างั้นเราจะเริ่มจากงานไหนก่อนดีล่ะ?\""
1300606-21 = "ฉันจดรายการงานภารกิจทั้งหมดมาแล้วล่ะ"
1300606-22 = "[s] \"ดีล่ะ ไหนขอดูหน่อยสิ?\""
1300606-25 = "ฮิฮิ ให้ดูไม่ได้หรอก~!\n"
1300606-26 = "ถ้าให้ข้อมูลลูกค้าหลุดออกไปก็คงไม่ดีใช่มั้ยล่ะ~?"
1300606-27 = "ถึงจะเป็นคุณครูก็เถอะ แต่ฉันก็คงให้ดูไม่ได้จริงๆ"
1300606-28 = "[s] \"งั้นเหรอ... สมกับเป็นมือโปรจริงๆ เลยนะ\""
1300606-29 = "คิคิคิคิ.... ใช่แล้ว เห็นแบบนี้แต่ฉันก็เป็นมือโปรน้า~"
1300606-30 = "อ่ะแฮ่ม เอาล่ะ เริ่มภารกิจแรกกันเลยดีกว่า"
1300606-31 = "ภารกิจก็คือ......."
1300606-33 = "ร้านขนมหวานโฮมเมด"
1300606-34 = "[ns] \"...แน่ใจนะว่ารายละเอียดภารกิจถูกต้องน่ะ?\""
1300606-35 = "อื้อ ผู้ว่าจ้างเขียนเอาไว้ว่า 'ให้ลองชิมขนมหวานทุกอย่างที่อยู่คาเฟ่นี้....’"
1300606-36 = "และให้เลือกว่าขนมชนิดไหนอร่อยที่สุด' "
1300606-37 = "[s5] \"เครปอร่อยสุดๆ เลย.....!\"\n[s6] \"แต่ว่าที่นี่มีขนมกว่าสิบชนิดเลยนะ?\""
1300606-38 = "อ่ะฮ่า!~ เราต้องหาขนมที่อร่อยที่สุด แต่ว่าปัญหาก็คือเงินค่าขนม..."
1300606-39 = "อืม~ คงไม่เป็นไรหรอกมั้ง?"
1300606-40 = "ไม่ต้องห่วงๆ เรากินได้หมดอยู่แล้ว และยิ่งกว่านั้น..."
1300606-41 = "เรื่องค่าขนมให้คุณครูจัดการแล้วกัน~♪"
1300606-42 = "[s] \"เอ่อ......\""
1300606-43 = "ใช่ม้า~? นักเรียนสุดแสนน่ารักขอร้องเองเลยนะ คงจะยอมช่วยใช่ไหมคะ คุณครู~?"
1300606-44 = "นักเรียนคนสำคัญกำลังทำภารกิจอย่างมุ่งมั่นอยู่เลยน้า~"
1300606-45 = "ถ้าคุณครูไม่ช่วยล่ะก็..."
1300606-46 = "ไม่ได้เหรอ.....?"
1300606-48 = "[s] \"คะ... ครูไม่ใช่กระเป๋าเงินเดินได้ของเธอนะ~!\""
1300606-49 = "อะฮ่ะฮ่ะฮ่า!! ขอบคุณนะคุณครู!"
1300606-51 = "ลัลลั่นล้า~♪ สตรอว์เบอร์รี่อร่อยจังเลย~"
1300606-52 = "ง่ำๆ กล้วยนี่หวานอร่อยมากเลย~"
1300606-53 = "คุณครูเป็นยังไงบ้างคะ?"
1300606-54 = "[s7] \"เครปสตรอว์เบอร์รี่ กล้วย ช็อกโกแลต คาราเมลเน้นๆ เลย...\"\n[s8] \"ตอนนี้ปากเลอะน้ำตาลไปหมดแล้ว คิดว่าน้ำตาลขึ้นแน่ๆ\""
1300606-55 = "คิคิคิ คุณครู... สู้ๆ นะ เหลืออีกไม่กี่ชิ้นแล้วล่ะ สู้ๆ~!"
1300606-56 = "คิคิคิ คุณครู... สู้ๆ นะ เหลืออีกไม่กี่ชิ้นแล้วล่ะ สู้ๆ~!"
1300606-57 = "[s] \"อะ... อึ่ก...!\""
1300606-59 = "(คุณครูกับมุสึกิช่วยกันตะลุยกองเครปกันอย่างมุ่งมั่น)"
1300606-61 = "ฮ่ะฮ่ะฮ่า นี่เป็นเครปที่อร่อยสุดๆ! ตัดสินใจยากเลยน้า~?"
1300606-62 = "[s] \"อึ่ก ยังรู้สึกเลี่ยนลิ้นไม่หายเลย\""
1300606-63 = "ช่างเถอะ~ ไปภารกิจต่อไปกันเถอะ!"
1300606-64 = "[s] \"ภารกิจต่อไป... ที่สวนสนุกเหรอ?\""
1300606-65 = "ภารกิจที่สองง่ายนิดเดียวเองนะ~"
1300606-66 = "ก็คือ....."
1300606-67 = "ผู้ว่าจ้างอยากให้พวกเรา... 'ตรวจสอบว่าม้าหมุนตัวไหนหมุนเร็วที่สุด?'"
1300606-68 = "[ns9] \"....ม้าหมุนเหรอ?\"\n[ns10] \"ม้าหมุนที่เร็วที่สุด?\""
1300606-73 = "[ns] \"เรื่องนั้นมัน... จะตรวจสอบได้เหรอ?\""
1300606-74 = "เอาล่ะคุณครู อย่ามัวโอ้เอ้อยู่เลย รีบๆ เลือกเร็วเข้า ส่วนฉันจะขี่ม้าตัวสีแดง!"
1300606-75 = "พนันเลยว่าตัวนี้จะต้องเร็วกว่าม้าหมุนตัวอื่นๆ 3 เท่าแน่นอน!"
1300606-76 = "อ๊ะ มันขยับแล้วล่ะ!"
1300606-77 = "[s] \"อ่ะ...อืม......?\""
1300606-79 = "(ม้าหมุนทุกตัวก็น่าจะหมุนด้วยความเร็วเท่าๆ กันนะ...)"
1300606-81 = "ฮ่ะฮ่ะฮ่า ฮ่าฮ่าฮ่า~ ความเร็วเท่ากันหมดเลยเหรอเนี่ย! ช่วยไม่ได้น้า~"
1300606-82 = "คิคิคิคิ.... ถ้างั้นไปภารกิจต่อไปกันเถอะคุณครู!"
1300606-83 = "[s] \"อื้อ...\""
1300606-85 = "ห้องสมุด 17 เกเฮนน่า"
1300606-86 = "เอาล่ะ~ ภารกิจต่อไปของเราคือที่ห้องสมุด (กระซิบกระซาบ)"
1300606-87 = "[s] \"แล้วเราต้องทำอะไร? (กระซิบกระซาบ)\""
1300606-88 = "เขียนไว้ว่า..."
1300606-89 = "ช่วยกลับหัวหนังสือทุกเล่มบนชั้นหนังสือโดยไม่มีใครเห็น"
1300606-90 = "[s] \"เดี๋ยวสิ แบบนั้นมันเหมือนแกล้งกันเล่นชัดๆ เลยนะ...\""
1300606-91 = "ภารกิจต่างหากล่ะ เราค่อยไปทำให้เป็นเหมือนเดิมทีหลังก็ได้นี่นา? ฮื้อ? คุณครู~"
1300606-92 = "[s11] \"ทำภารกิจให้เสร็จแล้วก็ต้องทำให้เป็นแบบเดิมนะ...\"\n[s12] \"ฮ่า... ช่วยไม่ได้นะ...\""
1300606-93 = "อ่ะฮ่า~♡ แต้งกิ้ววว~ คุณครู!"
1300606-94 = "อ่ะฮ่า~♡ แต้งกิ้ววว~ คุณครู!"
1300606-96 = "(หลังจากนั้นคุณครูกับมุสึกิก็ไปทำภารกิจอื่นๆ ด้วยกัน)"
1300606-97 = "(เวลาผ่านไปครู่ใหญ่)"
1300606-99 = "[ns] \"เราทำภารกิจเสร็จไปเยอะแล้วนะ\""
1300606-100 = "คิคิคิ ใช่แล้วล่ะ"
1300606-101 = "[s] \"ยังเหลือภารกิจอีกเยอะไหม?\""
1300606-102 = "อ๊ะ เรื่องนั้น...."
1300606-104 = "ภารกิจที่เหลือก็คือ…"
1300606-106 = "อ๊ะ กระดาษโน้ตของฉัน…"
1300606-107 = "(กระดาษโน้ตภารกิจของมุสึกิปลิวไปบนท้องฟ้า)"
1300606-111 = "[ns13] \"ไม่ต้องห่วง! ครูจับมันไว้ได้แล้วล่ะ!\"\n[ns14] \"เอาล่ะ ไหนดูภารกิจที่เหลือหน่อยซิ...\""
1300606-112 = "อ๊ะ คุณครู.... อย่าเปิดดูนะ....!"
1300606-113 = "อ๊ะ คุณครู.... อย่าเปิดดูนะ....!"
1300606-114 = "[ns] \"หืม? ชื่อผู้ว่าจ้างนี่....\""

[translation]
1300606-1 = "來自某人的特別委託"
1300606-2 = "呀呼──，老師！這裡。這裡～"
1300606-3 = "[s] 「你說的特別的委託是指什麼？」"
1300606-4 = "啊哈哈，這個啊，該說是很特殊嗎～"
1300606-5 = "怎麼說呢，唔嗯……"
1300606-6 = "應該是說，無論如何都希望老師幫忙？"
1300606-7 = "[s1] 「連無月都說很特殊的任務，到底……」\n[s2] 「連無月都說需要幫忙的任務，到底……」"
1300606-8 = "咯呵呵。那麼，怎麼辦呢～？"
1300606-9 = "咯呵呵。那麼，怎麼辦呢～？"
1300606-10 = "你看你看，學生都這麼為難了，身為老師當然不會坐視不管吧？只能配合了吧？"
1300606-11 = "[s] 「但明明是便利屋的委託，為什麼無月要一個人……」"
1300606-14 = "老．師．會．來．陪．我．的．吧．？"
1300606-15 = "吶．？"
1300606-16 = "嘛，都特地來了，而且說到底，老師從一開始就沒有拒絕的權利～！"
1300606-17 = "[s3] 「……拒絕權，原來沒有嗎。」\n[s4] 「嘛，沒辦法了嗎……」"
1300606-18 = "啊哈哈，嗯！果然無論如何，老師都會幫我的，對吧？"
1300606-19 = "啊哈哈，嗯！果然無論如何，老師都會幫我的，對吧？"
1300606-20 = "[s] 「唔嗯……話說回來，委託是要做什麼？」"
1300606-21 = "委託事項全部寫在這張委託書上了，照這個做就好了吧。"
1300606-22 = "[s] 「這樣啊，可以讓我看看嗎？」"
1300606-25 = "啊哈，這可不行～！"
1300606-26 = "顧客的個人資訊是很重要的，不是嗎～？"
1300606-27 = "就算是老師，我也不能隨便給你看。"
1300606-28 = "[s] 「無月……不愧是專家。」"
1300606-29 = "咯呵呵。沒錯沒錯，別看我這樣，我好歹也是專家～"
1300606-30 = "讓你久等了，第一項委託呢。咳咳……"
1300606-31 = "內容是～……"
1300606-33 = "手工甜點店．甜滋滋"
1300606-34 = "[ns] 「……那項委託的內容是真的嗎？」"
1300606-35 = "嗯！根據委託內容，「請把這間店賣的所有可麗餅都品嘗過後……」"
1300606-36 = "「從中選出第一名，『最棒』的可麗餅。」上面是這麼說的！ "
1300606-37 = "[s5] 「最棒的可麗餅……！」\n[s6] 「但菜單上，可麗餅有超過10種耶……？」"
1300606-38 = "啊哈。畢竟選出第一名是重點～但問題在於預算……"
1300606-39 = "唔──嗯。嘛，應該沒問題吧？"
1300606-40 = "沒問題沒問題，全部都吃得完唷。而且……"
1300606-41 = "錢的部分，就請老師當作經費核銷吧～～♪"
1300606-42 = "[s] 「咦……」"
1300606-43 = "嗯～？畢竟是學生拜託的事，當然會答應吧？老師～？"
1300606-44 = "因為重要的學生為了完成委託，這～麼地努力。"
1300606-45 = "難道說……"
1300606-46 = "不行，嗎……？"
1300606-48 = "[s] 「可……！可別小看大人的錢包！」"
1300606-49 = "啊哈哈哈！謝謝你！老師！"
1300606-51 = "哈呣，嗯～♪草莓果然好吃～！"
1300606-52 = "（嚼嚼）香蕉溫柔的甜度也好棒～！"
1300606-53 = "老師覺得如何？"
1300606-54 = "[s7] 「草莓、香蕉、巧克力……可麗餅竟然有這麼多種……」\n[s8] 「口中充斥著甜味，再嚐下去味覺就要麻痺了……」"
1300606-55 = "咯呵呵，老師加油！沒剩幾個了唷！FIGHT～！"
1300606-56 = "咯呵呵，老師加油！沒剩幾個了唷！FIGHT～！"
1300606-57 = "[s] 「唔，唔嗯……！」"
1300606-59 = "（就這樣和無月一起把可麗餅一掃而空）"
1300606-61 = "啊哈哈，最棒的可麗餅～唔～嗯，果然無法輕易決定呢～？"
1300606-62 = "[s] 「唔……嘴裡還甜甜的……」"
1300606-63 = "嘛，暫時別管這個了～去執行下一個委託吧！"
1300606-64 = "[s] 「下一個委託，和這個遊樂園有關係嗎？」"
1300606-65 = "第二項委託內容也很簡單～"
1300606-66 = "我看看……"
1300606-67 = "「請調查這個遊樂園的旋轉木馬上，那匹馬是跑得最快的」！"
1300606-68 = "[ns9] 「……旋轉木馬？」\n[ns10] 「……哪匹馬跑得最快？」"
1300606-73 = "[ns] 「那個……有速度之分嗎？」"
1300606-74 = "好了好了，老師。別這麼說，總之先選選看吧。我選那匹紅色的馬！"
1300606-75 = "肯定比其他馬快三倍！"
1300606-76 = "啊！開始動了！"
1300606-77 = "[s] 「唔，唔嗯嗯……？」"
1300606-79 = "（理所當然的，旋轉木馬的馬每一隻速度都一樣）"
1300606-81 = "啊哈哈。速度全都一樣！嘛，說的也是呢～ "
1300606-82 = "咯呵呵。再來去執行第三項委託吧，老師！"
1300606-83 = "[s] 「唔，嗯……」"
1300606-85 = "格黑娜．第13圖書館"
1300606-86 = "好。這次的委託地點是這裡，圖書館。（輕聲細語）"
1300606-87 = "[s] 「下個委託內容是什麼？（輕聲細語）」"
1300606-88 = "那是，我看看……"
1300606-89 = "「請將書架上的書全部倒過來放，不要被任何人發現」。"
1300606-90 = "[s] 「那個，這只是單純造成別人的困擾吧……」"
1300606-91 = "畢竟是委託嘛，吶？全部結束了再復原就好了吧？吶，老師拜託？"
1300606-92 = "[s11] 「畢竟是委託，之後再恢復原狀的話……」\n[s12] 「唉，沒辦法了……」"
1300606-93 = "啊哈♡謝謝你～老師！"
1300606-94 = "啊哈♡謝謝你～老師！"
1300606-96 = "（在那之後也在無月的帶領下四處行動，執行各項委託）"
1300606-97 = "（就這樣不知道奔波了多久）"
1300606-99 = "[ns] 「已經解決了不少的委託呢。」"
1300606-100 = "咯呵呵，就是說啊～"
1300606-101 = "[s] 「現在剩下多少？」"
1300606-102 = "唔嗯，我看看……"
1300606-104 = "剩下的委託，我記得是……"
1300606-106 = "啊！紙……！"
1300606-107 = "（脫離無月手中的紙，飛上了天空）"
1300606-111 = "[ns13] 「沒事的！這種高度的話……！」\n[ns14] 「……呼，有拿回來真是太好了。我看看，剩下的委託是……」"
1300606-112 = "啊，老師，不能看……！"
1300606-113 = "啊，老師，不能看……！"
1300606-114 = "[ns] 「嗯？這個，委託人的名字……」"
1300606-116 = "[ns] 「委託人的名字是，無月……？」"
1300606-119 = "真是的～不可以看！"
1300606-123 = "[ns] 「啊，啊咧！？無月！？」"
1300606-128 = "― 啊～啊，真～可惜。[wa:1150] "
1300606-130 = "― 咯呵呵，被發現了啊～♪[wa:1280] "
1300606-133 = "― 老實說吧，今天可愛的委託人的真實身份並非他人，[wa:3890] "
1300606-135 = "― 正是我無月醬哦～"
1300606-138 = "― 仔細想想啊老師～[wa:640] "
1300606-140 = "― 便利屋的委託，本來就不可能只靠我一個人去解決吧？[wa:2230] "
1300606-143 = "― 啊哈，怎麼樣？老師？[wa:1520] "
1300606-145 = "― 我的惡作劇，幾乎很完美吧？[wa:1530] "
1300606-148 = "― 呀哈，怎麼啦老師，那副呆頭呆腦的臉。[wa:2680] "
1300606-150 = "― 真好笑！啊哈哈～♪[wa:970] "
1300606-153 = "― 今天和老師，做了很多事呢～[wa:2290] "
1300606-156 = "― 吃了可麗餅，也去了遊樂園，[wa:1440] "
1300606-158 = "― 啊，還在圖書館成為了共犯……！[wa:1400] "
1300606-161 = "― 啊～啊，還以為可以完美地騙到最後的，好可惜啊～[wa:3970] "
1300606-164 = "― 下次絕對會騙到最後的，[wa:2500] "
1300606-166 = "― 敬請期待吧～！"
1300606-169 = "― 啊～，今天真的是，好開心！[wa:3490] "
1300606-172 = "那麼，既然今天的惡作劇已經暴露了～那我就告辭了！"
1300606-174 = "[ns] 「被騙了……」"
1300606-176 = "（無月一邊咯咯笑一邊揮著手，直到她的身影消失在遠處，我都在原地無法動彈）"

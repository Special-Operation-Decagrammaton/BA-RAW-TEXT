[translation]
10020020-5 = "เรามาถึง <เครื่องทะลุมิติ> เครื่องที่ 2 ในเขตพื้นที่ที่ 2 แล้วค่ะ"
10020020-7 = "อืม... ถ้าเป็นไปตามแพทเทิร์นนี้ละก็อีกไม่ช้า..."
10020020-8 = "อีกไม่ช้า...?"
10020020-18 = "ผะ...โผล่ออกมาแล้วแฮะ...!!"
10020020-19 = "คะ...คุณชิโรโกะปรากฏตัวมาอีกแล้วค่ะ!"
10020020-21 = "กำลังรออยู่เลย!!"
10020020-22 = "วะ...ว้ากกก?! ตกใจหมดเลย!"
10020020-23 = "ตรวจสอบพิกัดเรียบร้อยค่ะ!! ตรงด้านหน้า <เครื่องทะลุมิติ> พื้นที่ที่ 2!!"
10020020-24 = "ฉันจะรีบไปที่นั่นนะ คุณครู! ช่วยถ่วงเวลาไว้จนกว่าพวกเราจะไปถึงทีนะ!!"
10020020-25 = "อื้อ!! ไม่ว่ายังไงก็ต้องไปเจอชิโรโกะจังให้ได้เลยค่ะ!"
10020020-33 = "เตรียมพร้อมเข้าต่อสู้ค่ะ คุณครู! รบกวนขอคำสั่งด้วยค่ะ!"

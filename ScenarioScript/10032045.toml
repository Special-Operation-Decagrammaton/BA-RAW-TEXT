[translation]
10032045-9 = "แฮ่ก... แฮ่ก... แฮ่ก..."
10032045-10 = "นะ... นี่มันอะไรกัน... เกิดอะไรขึ้นเนี่ย...!?"
10032045-11 = "ก็คิดไว้อยู่หรอกนะว่าจะมีเจ้าพวกคนที่หมายหัวฉันไว้..."
10032045-12 = "แต่คิดไม่ถึงเลยว่าจะเป็นทุกคนที่นี่เลย...!!"
10032045-13 = "พวกบอดี้การ์ดที่พามาก็หายไปไหนหมดแล้ว..."
10032045-18 = "นี่! ตอนนี้ <เด็กนั่น> อยู่ที่ไหน? สถานการณ์ฉุกเฉิน! รีบมาช่วยฉันตรงนี้เร็วเข้า!!"
10032045-19 = "ตอนนี้ฉันอยู่ฝั่งห้องพักนักแสดง! ได้ ไปที่นั่นเลย! ฉันก็จะไปที่นั่นด้วย!"
10032045-23 = "ชิ... ห้องพักนักแสดง... ไปห้องพักนักแสดงก่อนแล้วกัน แล้วที่นั่น... ฉันจะได้เจอ..."
10032045-24 = "'แผนรับมือ' ของฉัน...!"
10032045-28 = "บ้าจริง มาถึงที่นี่เลยเหรอ...!!"
10032045-33 = "อีกนิดเดียว... ไปต่ออีกนิดเดียว...!!"
10032045-37 = "ฉันกำลังรออยู่เลย เหมือนว่าจะเกิดเรื่องแล้วสินะ"
10032045-38 = "...!? เสียงนี้มัน...!?"
10032045-42 = "เอาไว้อธิบายทีหลังแล้วกัน รีบเข้ามาในนี้ก่อนเถอะ"
10032045-55 = "ปะ... ไปไหนแล้วน่ะ? เมื่อกี้ยังเห็นอยู่เลยนี่นา...!"
10032045-56 = "ทะ... ทางห้องพักนักแสดงค่ะ! มีร่องรอยของกระสุนและระเบิดที่เกิดใหม่อยู่ทั่วเลยค่ะ...!!"
10032045-57 = "ในนั้นก็มีการต่อสู้ด้วยเหรอ? หรือว่าสถานการณ์จบไปแล้ว?"
10032045-58 = "ฉันไม่รู้ว่าเป็นห้องไหน แต่มั่นใจว่ามีคนเข้าไปในนั้น หวังว่าจะไม่สายไปนะ"
10032045-62 = "[ns] \"คาโยโกะ...?\""
10032045-63 = "เปล่าหรอก ฉันแค่รู้สึกมีอะไรกวนใจน่ะ"
10032045-64 = "ห้องนั้น... เป็นห้องที่ไม่มีทางออกอยู่เลย แล้วทำไมถึง..."
10032045-65 = "[s1] \"ทำไมถึงเลือกเข้าไปในห้องนั้น...?\"\n[s2] \"แค่หนีอะไรมาเลยเข้าไปผิดรึเปล่า?\""
10032045-68 = "เรื่องนั้นฉันก็ไม่รู้หรอก ถึงคนนั้นจะไม่น่าใช่คนสะเพร่าขนาดนั้นก็เถอะ"
10032045-69 = "ที่เรารู้มาคือ \"เขาใส่อุปกรณ์คุ้มครองความปลอดภัย 2 หรือ 3 อย่าง\"..."
10032045-73 = "เดี๋ยวนะ งั้นก็แปลว่าข้างในอาจมีกับดักอะไรก็ได้..."
10032045-78 = "มาให้ท่านอารุจับตัวเสียดีๆ นะ!!"
10032045-85 = "ฮะ... ฮารุกะ! รอเดี๋ยว!"
10032045-86 = "อย่าเข้าไปคนเดียวสิ ไปด้วยกัน...!!"
10032045-105 = "ฮะ... ฮารุกะ...!?"
10032045-107 = "[ns3] \"ฮารุกะ... ระเบิดเหรอ?\"\n[ns4] \"ปะ... เป็นอะไรรึเปล่า? ฮารุกะ!?\""
10032045-110 = "ยุ่งยากแล้วสินะ..."
10032045-111 = "ถึงจะได้ยินมาบ้างว่าผู้ว่าจ้างคนนี้มีตัวท็อปในวงการตามล่าอยู่มากมาย..."
10032045-112 = "แต่ก็ไม่คิดเลยนะว่าสุดท้ายแล้วเราต้องมาเจอกัน หน่วยรับจ้างสารพัด 68..."
10032045-115 = "[ns5] \"หืม...!?\"\n[ns6] \"เสียงนี้มัน...\""
10032045-119 = "อะ... อะไรกันน่ะ...!?"
10032045-120 = "น่าจะเป็น 'แผนรับมือ' ที่อารันซิโนพูดถึงนะ"
10032045-121 = "แต่เสียงคุ้นๆ เหมือนเคยได้ยินจากที่ไหนมาก่อนเลย..."
10032045-126 = "[ns] \"อ่า...\""
10032045-132 = "......"
10032045-134 = "โจมาเอะ ซาโอริ...?"

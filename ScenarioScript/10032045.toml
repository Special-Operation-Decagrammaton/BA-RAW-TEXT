[translation]
10032045-9 = "哈啊……哈啊……呼……"
10032045-10 = "這，這到底……到底是怎麼回事……！？"
10032045-11 = "雖然有預想到會被人盯上……"
10032045-12 = "但對方竟然會是在場的所有人……！！"
10032045-13 = "帶來的保鑣也全都被擊退了……"
10032045-18 = "喂！「那個人」現在在哪裡？#n情況緊急！快來這裡幫我！！"
10032045-19 = "我嗎？我現在在演員準備室附近！#n沒錯，在那裡會合吧！"
10032045-23 = "嘖，總之先到演員準備室……到演員準備室去吧，只要到達那裡……！"
10032045-24 = "我的「對策」就……！"
10032045-28 = "可惡，居然已經追到這裡了……！！"
10032045-33 = "只要……只要再往前一點……！！"
10032045-37 = "我等你很久了，看來情況還是發生了啊。"
10032045-38 = "……！？#n這個聲音是……！？"
10032045-42 = "待會再說明，先進來這裡吧。"
10032045-55 = "跑，跑哪去了？剛剛明明還在這裡的……！"
10032045-56 = "往，往演員準備室的方向！#n那裡跟剛才不同，到處都是槍彈和爆炸的痕跡……！！"
10032045-57 = "裡面也亂成一團了嗎？還是已經結束了？"
10032045-58 = "……無論如何，至少我們能確定的是他已經進到裡面去了。#n希望現在還不算太遲。"
10032045-62 = "[ns]「……佳世子？」"
10032045-63 = "沒什麼，我只是覺得有點奇怪。"
10032045-64 = "那裡……明明是個沒有其他出口的房間，為什麼偏偏選了那裡……"
10032045-65 = "[s1]「為什麼要選那裡……？」\n[s2]「是不是逃跑的時候跑錯地方了？」"
10032045-68 = "……這我就不清楚了。#n不過我認為他並不是那麼草率的人。"
10032045-69 = "根據情報，他應該是個「會設置2重甚至3重保險的人物」才對……"
10032045-73 = "等等。既然如此，裡面有可能有陷阱……"
10032045-78 = "乖乖讓亞瑠大人抓住吧────！！"
10032045-85 = "遙，遙香！等等！"
10032045-86 = "不要自己進去，我們一起……！！"
10032045-105 = "……遙，遙香……！？"
10032045-107 = "[ns3]「遙香他……飛出去了？」\n[ns4]「沒，沒事吧，遙香！？」"
10032045-110 = "……這下麻煩了。"
10032045-111 = "雖然事前已經聽說過，這次覬覦委託人安全的傢伙之中有很多大人物……"
10032045-112 = "……結果還是必須交手嗎，便利屋68。"
10032045-115 = "[ns5]「……嗯！？」\n[ns6]「這個聲音是……」"
10032045-119 = "……！？#n怎，怎麼回事……！？"
10032045-120 = "這就是阿蘭奇諾提過的「對策」嗎。"
10032045-121 = "不過聲音好像在哪裡聽過……"
10032045-126 = "[ns]「……啊……」"
10032045-132 = "…………"
10032045-134 = "……錠前沙織？"

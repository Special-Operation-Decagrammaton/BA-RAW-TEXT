[translation]
2601303-1 = "向花田逃去"
2601303-2 = "（接到敦子的聯絡後，出發前往了約定的地點）"
2601303-4 = "啊，是老師。"
2601303-8 = "[ns]「怎麼突然拿相機拍我！？」"
2601303-9 = "呵呵，抱歉。#n因為我也想把老師的樣子紀錄在相機裡。"
2601303-10 = "……你會覺得不高興嗎？"
2601303-11 = "[s]「不會，剛才只是有點被嚇到而已，別擔心。」"
2601303-12 = "呵呵，原來是這樣啊。"
2601303-13 = "嗯？非拍不可的東西是不是就是老師你？"
2601303-14 = "呵呵，沒錯。#n多虧你答應過來，我才能這麼快拍到其中的一樣。"
2601303-15 = "剩下的東西在其他地方。#n我們一起走吧，老師。"
2601303-17 = "就是那邊，老師。"
2601303-18 = "這是我昨天在逛慶典的時候發現的。"
2601303-19 = "是個用花裝飾的拍照區，旁邊還放了椅子供人拍照呢。"
2601303-20 = "可惜那些花的狀態好像沒有昨天那麼好。"
2601303-21 = "[s1]「這也沒辦法。畢竟用來裝飾的花本來就會慢慢枯萎。」\n[s2]「不過現在看起來還是很漂亮的哦。」"
2601303-24 = "嗯，就是說啊。"
2601303-25 = "那麼我來拍照。#n老師，可以請你坐在那邊的椅子上嗎？"
2601303-26 = "[s]「剛才不是已經拍過我了嗎？」"
2601303-27 = "那我就先拍花吧……"
2601303-28 = "空著的椅子和周圍的花……感覺很不錯呢。"
2601303-32 = "好，這邊也拍一下……"
2601303-38 = "嗯，拍到好照片了。"
2601303-39 = "接下來──"
2601303-40 = "你們是什麼人？"
2601303-42 = "是誰准你們隨便在這裡拍照的？"
2601303-43 = "在這裡拍照要取得同意嗎？"
2601303-44 = "那還用說！#n這裡可是我們打造出來的拍照區耶！"
2601303-45 = "[s]「抱歉，我們不該擅自拍照的。」"
2601303-46 = "哼，我不需要你們的道歉。"
2601303-47 = "你們瞞著我偷拍了幾張照片？#n通通給我從實招來！"
2601303-48 = "那個……大概八張左右？"
2601303-49 = "拍了不少張嘛。#n很好，每張算你一萬元的話，總共就是八萬元。"
2601303-50 = "來，快點付錢吧。"
2601303-54 = "這，這也太貴了。#n我沒有那麼多錢。"
2601303-55 = "[s3]「再怎麼說，一張一萬也太誇張了吧……！」\n[s4]「這個價格根本不合理！」"
2601303-58 = "哼，合不合理我才不管。"
2601303-59 = "這可是我們打造的拍照區，想怎麼定價你管得著嗎？"
2601303-60 = "誰叫你們要擅自偷跑進來亂拍照，要怪就怪你們自己吧！"
2601303-61 = "沒有經過同意就拍照的事，我願意向你們道歉。#n不過能請你們網開一面嗎？我現在真的沒帶那麼多錢……"
2601303-62 = "辦不到！趕快給我付錢！"
2601303-63 = "否則我們也只能好好教訓你們一頓，讓你們再也不敢踏入慶典會場了！"
2601303-64 = "好過分……"
2601303-68 = "老師，請抓住我的手。"
2601303-69 = "[s5]「嗯？像這樣嗎？」\n[s6]「你打算做什麼？」"
2601303-72 = "快逃吧！"
2601303-78 = "哈啊……哈啊……呼。"
2601303-79 = "雖然已經看不見人影，但他們說不定還沒放棄。#n我們先蹲低一點吧，老師。"
2601303-80 = "只要躲在這裡，他們肯定找不到我們的。"
2601303-81 = "[s]「幸好這裡有個可以躲的地方……」"
2601303-82 = "就是說啊。沒想到沙灘上竟然會有個草叢。"
2601303-83 = "嗯？老師你說這裡不是草叢？"
2601303-84 = "……花？"
2601303-88 = "真的耶，是剛才裝飾拍照區的那些花。"
2601303-89 = "[s]「比被摘去那邊裝飾的花還豔麗呢。」"
2601303-90 = "嗯，這些花更漂亮。"
2601303-91 = "我都不知道原來沙灘上也能長出花。"
2601303-92 = "你知道這種花的名字嗎，老師？"
2601303-93 = "濱薔薇……是嗎？#n原來如此，我又學到了一課。"
2601303-94 = "[s]「敦子，要不要我幫你拍照？」"
2601303-95 = "拍照？我嗎？"
2601303-96 = "因為我剛才幫你拍過，所以這次反過來……"
2601303-97 = "……嗯，如果是老師的話，我願意。"
2601303-100 = "― [log=아츠코 수영복]照片，雖然拍了很多……[/log][wa:2845] "
2601303-102 = "― [log=아츠코 수영복]像這樣被拍還是第一次呢。[/log]"
2601303-105 = "― [log=아츠코 수영복]這種時候，我不知道該怎麼做才好……[/log][wa:1920] "
2601303-108 = "― [log=아츠코 수영복]像這樣，笑就行了嗎？[/log][wa:2290] "
2601303-111 = "― [log=아츠코 수영복]再靠近花一點……？我知道了。[/log][wa:2900] "
2601303-114 = "― [log=아츠코 수영복]濱薔薇……味道真香。[/log][wa:3200] "
2601303-117 = "― [log=아츠코 수영복]雖然是偶然發現的地點……不過也是多虧了老師才能來到這裡。[/log][wa:5270] "
2601303-120 = "― [log=아츠코 수영복]謝謝你，老師。這是個美好的回憶唷。[/log][wa:3030] "
2601303-123 = "我可以看看照片嗎？"
2601303-124 = "檢查自己的照片，真是件令人害羞的事呢。"
2601303-131 = "奇怪！剛才明明看他們往這邊跑的啊，人咧？"
2601303-132 = "呿，本來可以大賺一筆的，真可惜。"
2601303-139 = "……對方好像走了呢。#n幸好沒被發現。"
2601303-140 = "下次拍照之前一定要仔細觀察四周，以免再遇到這種麻煩的情況。"
2601303-141 = "謝謝你今天來幫我，老師。"
2601303-142 = "[s]「只要你想的話，之後也可以陪你哦。」"
2601303-146 = "嗯，那就拜託你了。"
2601303-147 = "多虧有老師在，我才能拍到好照片。"
2601303-148 = "那就下次見囉，老師。"

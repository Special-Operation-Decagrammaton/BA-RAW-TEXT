[translation]
2601303-1 = "สวนดอกไม้ที่บังเอิญมาเจอ"
2601303-2 = "(คุณครูได้รับข้อความจากอาสึโกะและไปหาเธอตามนัด)"
2601303-4 = "อ๊ะ คุณครูนี่นา"
2601303-8 = "[ns] \"จู่ๆ ก็จะถ่ายรูปเหรอ?!\""
2601303-9 = "ฮุฮุ ขอโทษนะ พอดีฉันอยากมีรูปคุณครูไว้ในกล้องนี้ด้วยน่ะ"
2601303-10 = "หรือนี่จะเป็นการเสียมารยาทนะ...?"
2601303-11 = "[s] \"เปล่า ครูแค่ตกใจนิดหน่อยน่ะ ไม่เป็นไร\""
2601303-12 = "ฮุฮุ อย่างนั้นสินะ"
2601303-13 = "หืม? สงสัยว่าฉันอยากถ่ายรูปคุณครูให้ได้เลยหรือเปล่างั้นเหรอ?"
2601303-14 = "ฮุฮุ ใช่แล้วละ ฉันถ่ายแบบเร็วๆ ไปรูปหนึ่งแล้วด้วย"
2601303-15 = "อีกรูปหนึ่งว่าจะไปถ่ายที่อื่นน่ะ ไปด้วยกันเถอะ คุณครู"
2601303-17 = "ตรงโน้นไง คุณครู"
2601303-18 = "ฉันบังเอิญเจอเมื่อวานตอนเดินเที่ยวงานเทศกาลน่ะ"
2601303-19 = "ตรงนี้เป็นโซนถ่ายรูปที่ตกแต่งด้วยดอกไม้ มีเก้าอี้ให้นั่งถ่ายรูปด้วยนะ"
2601303-20 = "แต่ว่าดอกไม้มันเริ่มเหี่ยวแล้วน่ะ"
2601303-21 = "[s1] \"โดนเด็ดมาก็เหี่ยวเป็นธรรมดา แต่ก็ยังสวยอยู่นะ\"\n[s2] \"แต่ครูว่ายังสวยอยู่นะ เรามาถ่ายรูปกันมั้ย?\""
2601303-24 = "อื้อ นั่นสินะ"
2601303-25 = "งั้นฉันจะถ่ายรูปละนะ คุณครูไปนั่งที่เก้าอี้ตรงนั้นสิ"
2601303-26 = "[s] \"แต่เมื่อกี้ก็ถ่ายครูไปแล้วนะ?\""
2601303-27 = "งั้นถ่ายแต่ดอกไม้ก่อนก็ได้..."
2601303-28 = "เก้าอี้ว่างๆ กับดอกไม้สวยๆ ก็ให้บรรยากาศดีไปอีกแบบนะ"
2601303-32 = "ไหนดูซิ ลองถ่ายจากมุมนี้ด้วย..."
2601303-38 = "อื้อ ได้รูปสวยๆ แล้ว"
2601303-39 = "งั้นต่อไปก็..."
2601303-40 = "พวกเธอเป็นใครน่ะ?"
2601303-42 = "ทำไมถึงเข้ามาถ่ายรูปที่นี่ตามอำเภอใจ?"
2601303-43 = "ต้องขออนุญาตด้วยเหรอ?"
2601303-44 = "ก็ใช่น่ะสิ! ก็นี่เป็นโซนถ่ายรูปที่พวกฉันทำกันไว้นี่!"
2601303-45 = "[s] \"ขอโทษที่เข้ามาถ่ายโดยไม่ได้รับอนุญาตนะ\""
2601303-46 = "ฮึ่ม ไม่ต้องขอโทษหรอก"
2601303-47 = "บอกฉันมานะว่าแอบถ่ายไปทั้งหมดกี่รูป!"
2601303-48 = "ก็... ประมาณ 8 รูป?"
2601303-49 = "ถ่ายไปซะเยอะเลยนะ ดีละ รูปละ 10,000 เยน ทั้งหมดก็ 80,000 เยน"
2601303-50 = "เอาละ รีบจ่ายมาซะดีๆ"
2601303-54 = "พะ... แพงจัง ฉันไม่มีเงินจ่ายหรอกนะ"
2601303-55 = "[s3] \"คิดรูปละ 10,000 เยนเลยเหรอ...!\"\n[s4] \"ไม่มีที่ไหนเขาคิดเงินแพงๆ แบบนี้หรอกนะ!\""
2601303-58 = "เฮอะ แล้วมันจะทำไมล่ะ"
2601303-59 = "พวกเราเป็นคนสร้างโซนถ่ายรูปตรงนี้กัน งั้นเราก็มีสิทธิ์จะกำหนดราคาเองสิ"
2601303-60 = "คนที่แอบเข้ามาถ่ายรูปต่างหากที่เป็นฝ่ายผิด!"
2601303-61 = "ขอโทษที่ถ่ายรูปโดยไม่ได้รับอนุญาตนะ หยวนๆ ให้ฉันสักครั้งไม่ได้เหรอ? ตอนนี้ฉันไม่มีเงินมาก#nขนาดนั้นหรอก..."
2601303-62 = "ไม่ได้! จ่ายมาซะดีๆ!"
2601303-63 = "ถ้าไม่จ่าย ฉันจะลากเธอออกไปจากงานเทศกาลเลยนะ!"
2601303-64 = "เกินไปแล้วนะ..."
2601303-68 = "คุณครู จับมือฉันไว้นะ"
2601303-69 = "[s5] \"หะ... หืม? ทำไมเหรอ?\"\n[s6] \"จะทำอะไรเหรอ?\""
2601303-72 = "ก็วิ่งหนีไง!"
2601303-78 = "แฮ่ก... แฮ่ก... ฮู่ว..."
2601303-79 = "ถึงจะไม่เห็นพวกนั้นแล้ว แต่ก็อาจจะยังตามมาอยู่ก็ได้ ก้มตัวไว้ก่อน คุณครู"
2601303-80 = "ถ้าเราแอบอยู่ตรงนี้ ฉันว่าพวกนั้นน่าจะหาเราไม่เจอนะ"
2601303-81 = "[s] \"โล่งอกไปทีนะที่มีที่ให้ซ่อนตัว...\""
2601303-82 = "นั่นสินะ ไม่นึกเลยว่าจะมีพงหญ้าแถวๆ ชายหาดด้วย"
2601303-83 = "หืม? หมายความว่ายังไงเหรอคุณครู? ตรงนี้ไม่ใช่พงหญ้างั้นเหรอ?"
2601303-84 = "ดอกไม้...?"
2601303-88 = "จริงด้วยแฮะ ดอกไม้ที่อยู่ตรงโซนถ่ายรูปเมื่อกี้นี่นา"
2601303-89 = "[s] \"สวยกว่าดอกไม้ที่ถูกเด็ดไปเยอะเลยนะ\""
2601303-90 = "อื้อ บานสะพรั่งกว่ากันเยอะเลย"
2601303-91 = "ถึงจะอยู่บนหาดทรายก็เติบโตได้ดีเลยนะ"
2601303-92 = "นี่ชื่อว่าดอกอะไรเหรอคุณครู?"
2601303-93 = "กุหลาบป่า... งั้นเหรอ? อย่างนี้สินะ ฉันได้รู้อะไรเพิ่มอีกแล้ว"
2601303-94 = "[s] \"อาสึโกะ ให้ครูถ่ายรูปให้มั้ย?\""
2601303-95 = "ถ่ายฉันเหรอ? "
2601303-96 = "เมื่อกี้ฉันถ่ายคุณครูไปแล้ว ครั้งนี้เลยจะถ่ายให้ฉันบ้างเหรอ..."
2601303-97 = "อื้อ... ถ้าเป็นคุณครูที่ถ่ายให้ ก็คงดีเลยนะ"
2601303-100 = "― [log=아츠코 수영복]ฉันถ่ายรูปมาก็เยอะ... [/log][wa:2405] "
2601303-102 = "― [log=아츠코 수영복]แต่นี่เป็นครั้งแรกเลยที่โดนถ่าย[/log]"
2601303-105 = "― [log=아츠코 수영복]ตอนโดนถ่ายแบบนี้ ไม่รู้เลยว่าต้องทำตัวยังไง...[/log][wa:760] "
2601303-108 = "― [log=아츠코 수영복]ยิ้มแบบนี้จะได้มั้ยนะ? [/log][wa:1770] "
2601303-111 = "― [log=아츠코 수영복]ให้เข้าไปใกล้ดอกไม้อีกหน่อยเหรอ...? เข้าใจแล้วละ [/log][wa:1500] "
2601303-114 = "― [log=아츠코 수영복]กุหลาบป่า... กลิ่นหอมจัง[/log][wa:2640] "
2601303-117 = "― [log=아츠코 수영복]ถึงจะเป็นที่ที่เจอโดยบังเอิญ... แต่ก็ขอบคุณคุณครูนะ ที่ทำให้ฉันได้มาที่นี่น่ะ[/log][wa:3310] "
2601303-120 = "― [log=아츠코 수영복]ขอบคุณนะ คุณครู เป็นความทรงจำที่ยอดเยี่ยมเลยละ[/log][wa:1870] "
2601303-123 = "ฉันขอดูรูปหน่อยได้มั้ย?"
2601303-124 = "ขอดูรูปที่ตัวเองถูกถ่าย... แบบนี้ก็แอบเขินอยู่หน่อยนะ"
2601303-131 = "ฮึ่ย! เหมือนจะมาทางนี้นี่นา หายไปไหนซะแล้ว?"
2601303-132 = "ชิ เกือบได้เงินมาแล้วเชียว น่าเสียดายชะมัด"
2601303-139 = "สงสัยจะกลับกันไปแล้วละ โล่งอกไปทีนะที่รอดมาได้..."
2601303-140 = "ต่อไปก่อนถ่ายรูปคงต้องดูให้ดีๆ แล้วละ จะตกอยู่ในสถานการณ์แบบวันนี้อีกไม่ได้"
2601303-141 = "วันนี้ขอบคุณที่มาหาฉันนะ"
2601303-142 = "[s] \"ไว้ครั้งหน้าครูจะมาเป็นเพื่อนถ่ายรูปให้อีกนะ\""
2601303-146 = "อื้อ งั้นต่อไปก็รบกวนด้วยนะ"
2601303-147 = "พออยู่กับคุณครู ฉันก็ได้รูปสวยๆ กลับไปเยอะเลยละ"
2601303-148 = "งั้นไว้เจอกันนะ คุณครู"

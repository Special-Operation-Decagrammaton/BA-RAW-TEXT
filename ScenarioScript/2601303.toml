[translation]
2601303-1 = "The Runaways' Flower Field"
2601303-2 = "After receiving Atsuko's message, I headed to the agreed-upon spot."
2601303-4 = "Ah, Sensei!"
2601303-8 = "[ns] \"A paparazzi shot?!\""
2601303-9 = "Heehee. Apologies. I wanted to take a picture of you too."
2601303-10 = "...Was that, by chance, rude of me?"
2601303-11 = "[s] \"No, it's okay. I was just caught off-guard.\""
2601303-12 = "Heehee. I see."
2601303-13 = "Huh? Were you the subject I was hoping to capture?"
2601303-14 = "Heehee. You caught me. And I was able to take my first one right away."
2601303-15 = "The other one is at a different location. Shall we, Sensei?"
2601303-17 = "Over there, Sensei."
2601303-18 = "I discovered this place while wandering around the festival yesterday."
2601303-19 = "They've decorated it with flowers to create a \"photo zone.\" There's even a chair to sit on while you take your picture."
2601303-20 = "...Although the flowers do appear a bit wilted, compared to yesterday."
2601303-21 = "[s1] \"That's only natural for decorations like this.\"\n[s2] \"It still looks pretty, though.\""
2601303-24 = "Yes. That's true."
2601303-25 = "I'll take the picture now. Would you sit on the chair please, Sensei?"
2601303-26 = "[s] \"Didn't you already take a picture of me?\""
2601303-27 = "Then, I'll capture just the flowers first..."
2601303-28 = "The flowers with the empty chair look nice as well."
2601303-32 = "From this side now..."
2601303-38 = "I think I took a great picture."
2601303-39 = "This time—"
2601303-40 = "Who're you guys?"
2601303-42 = "Who gave you permission to take pictures here?"
2601303-43 = "Did we need permission?"
2601303-44 = "Duh! We're the ones who set up this photo zone!"
2601303-45 = "[s] \"I'm sorry about that.\""
2601303-46 = "Hmph! Your apologies don't do nothing!"
2601303-47 = "Be honest, how many did you take?!"
2601303-48 = "Around...eight?"
2601303-49 = "That's a whole lot. All right, at 10,000 yen a piece, that'll be 80,000 yen."
2601303-50 = "Now, pay up."
2601303-54 = "Th-That's a bit expensive. I don't have that kind of money."
2601303-55 = "[s3] \"C'mon. 10,000 yen a picture?\"\n[s4] \"That's ridiculously unreasonable!\""
2601303-58 = "Hmph. Not a single thing unreasonable about that."
2601303-59 = "We made the photo zone, so we get to set the prices. I don't see any issue."
2601303-60 = "In fact, you're the unreasonable one for tryna take pictures without paying!"
2601303-61 = "I do apologize for what I did, but I really didn't know. Could you please forgive me, this once? I can't afford that amount..."
2601303-62 = "No way! Pay up!"
2601303-63 = "Otherwise, you'll never set foot in this festival again! I'll make sure of it!"
2601303-64 = "How cruel..."
2601303-68 = "Take my hand, Sensei."
2601303-69 = "[s5] \"H-Huh? Like this?\"\n[s6] \"What're we doing?\""
2601303-72 = "Now, run!"
2601303-78 = "*pant* *pant*..."
2601303-79 = "Please crouch down, Sensei. I don't see them, but they may not have given up on the chase yet."
2601303-80 = "They won't be able to find us as long as we stay low."
2601303-81 = "[s] \"It's a good thing there was somewhere for us to hide...\""
2601303-82 = "Yes. I wouldn't have expected this thicket of grass in the middle of the beach to be here."
2601303-83 = "Hm? Sensei? This isn't grass..."
2601303-84 = "...Flowers?"
2601303-88 = "They are! These appear to be the same flowers that were used to decorate the photo zone."
2601303-89 = "[s] \"And there's a lot more here than they had.\""
2601303-90 = "Yes. They've bloomed very beautifully here."
2601303-91 = "So flowers can grow in sandy environments like this as well... I had no idea."
2601303-92 = "Do you know the name of these flowers, Sensei?"
2601303-93 = "Rosa Rugosa...? I learned something new."
2601303-94 = "[s] \"Atsuko, would you like me to take a picture of you?\""
2601303-95 = "A picture? Of me?"
2601303-96 = "Since I took a picture of you earlier, it's my turn now...?"
2601303-97 = "...Then, yes please. Would you take a picture of me, Sensei?"
2601303-100 = "― [log=아츠코 수영복]I've taken a lot of photos, but... [/log][wa:1885] "
2601303-102 = "― [log=아츠코 수영복]this is the first time I've been photographed like this.[/log]"
2601303-105 = "― [log=아츠코 수영복]I'm a little unsure of how I should pose...[/log][wa:880] "
2601303-108 = "― [log=아츠코 수영복]Is it okay if I smile like this? [/log][wa:1370] "
2601303-111 = "― [log=아츠코 수영복]Get closer to the flowers? Okay. [/log][wa:2140] "
2601303-114 = "― [log=아츠코 수영복]Rosa Rugosa... What a pleasant scent.[/log][wa:2120] "
2601303-117 = "― [log=아츠코 수영복]We just happened upon this place, but...it was thanks to you that I got to see it, Sensei.[/log][wa:2790] "
2601303-120 = "― [log=아츠코 수영복]Thank you, Sensei. You've helped me make another wonderful memory.[/log][wa:1070] "
2601303-123 = "May I see the picture?"
2601303-124 = "It's...a bit embarrassing, actually. Looking at a picture of myself."
2601303-131 = "Huh?! I swear they ran in this direction! Where are they?!"
2601303-132 = "Drat. We could've made some good money."
2601303-139 = "...We lost them. They probably left."
2601303-140 = "I'll be sure to be more aware of my surroundings the next time I'm taking photos. I wouldn't want something like this to happen again."
2601303-141 = "Thank you. For your assistance today."
2601303-142 = "[s] \"I'll accompany you whenever you'd like.\""
2601303-146 = "That would be wonderful."
2601303-147 = "Thanks to you, I captured some great memories today."
2601303-148 = "I'll see you next time, Sensei."

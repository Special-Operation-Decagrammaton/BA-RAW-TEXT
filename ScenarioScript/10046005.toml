[translation]
10046005-1 = "序幕;So Bad Hard Sad Story"
10046005-21 = "[log]＜前情提要＞[/log]"
10046005-25 = "只需要在今天之內，將一個重要的公文包送去茶會就行了。"
10046005-26 = "只是那個公文包，目前在離三一自治區很遠的地方……"
10046005-32 = "哈～哈哈哈哈！"
10046005-37 = "好久不見，老師。#n來這裡有什麼事嗎？"
10046005-38 = "鬼怒川佳澄……？"
10046005-42 = "不正是格黑娜的懸賞通緝犯嗎……？"
10046005-45 = "（然而在因緣際會之下，公文包落入了溫泉開發部部長──#n　同時也是通緝犯的鬼怒川佳澄手中）"
10046005-49 = "有沒有搞錯！？這組合是怎麼回事！？！？"
10046005-50 = "這不是開往格黑娜的列車嗎！？為什麼三一的實現正義部會在這裡？"
10046005-51 = "還有佳澄……！？"
10046005-52 = "佳澄……佳澄！？#n老師，你該不會一直都和這傢伙待在一起吧？快跟我說不是！！"
10046005-55 = "（隨著格黑娜風紀委員會的介入，情況變得更加錯綜複雜……）"
10046005-59 = "那麼三一的人和老師也只能乖乖聽我的話～對吧，小姑娘～？"
10046005-60 = "是是是。那你就好好看清楚這位朋友會怎麼選擇吧？#n他肯定會為了這個茶壺還是尿壺而對你開槍的。"
10046005-61 = "對吧？我們實現正義部的……什麼來著？"
10046005-62 = "……二花醬？"
10046005-63 = "總之這東西無論如何都不能損壞對吧？"
10046005-69 = "…………"
10046005-70 = "啊──！！真是夠了！！#n從剛才就一直公文包公文包的說個不停！"
10046005-71 = "…………"
10046005-72 = "那個公文包到底有什麼了不起的……！！"
10046005-82 = "……哦！"
10046005-83 = "啊哈！啊哈哈哈！！"
10046005-84 = "哈～哈哈哈！！！！"
10046005-85 = "看吧，看吧！我剛才不是說過很多次了嗎？"
10046005-86 = "因為那個人啊～"
10046005-87 = "在拿到這個公文包之前，絕對只能對我言聽計從──"
10046005-95 = "唔唔……！？"
10046005-102 = "…………啊。"
10046005-103 = "……還是開槍了。"
10046005-105 = "（……最終，橫跨三一與格黑娜的列車事件以悲劇收場）"
10046005-113 = "哎呀哎呀。#n聽老師說是一定要見的人，我還在想是誰呢～"
10046005-114 = "原來是無人不知無人不曉的[ruby=・]一[/ruby][ruby=・]花[/ruby][ruby=・]醬[/ruby]大駕光臨啊。"
10046005-115 = "…………"
10046005-116 = "不愧是實現正義部的菁英，居然連老師都叫得動呢。"
10046005-117 = "這麼勞師動眾不可能只為了抓我吧……#n難道是發生了什麼不得了的大事嗎？嗯？"
10046005-118 = "…………"
10046005-119 = "……請幫幫我。"
10046005-123 = "嗯～？"
10046005-127 = "就幫我這一次吧。拜託你了。"
10046005-133 = "哦？"
10046005-134 = "哈，哈哈！哈～哈哈哈哈！！"
10046005-135 = "唷～居然能從我們一花醬口中聽見這種話，難道天要下紅雨了嗎？"
10046005-136 = "幫，當然幫。#n我們又不是外人，對吧？"
10046005-137 = "…………"
10046005-138 = "不過話又說回來～我們可愛的小姑娘不是挺能幹的嗎？嗯？#n列車事件的時候，不也是你一個人擺平了一切嗎？"
10046005-139 = "相較之下，我只是個善良的百姓。#n究竟能不能幫上忙～恐怕還不好說呢？"
10046005-140 = "那次的事──"
10046005-141 = "──是我的錯。"
10046005-142 = "希望你再給我一次機會。"
10046005-143 = "……啊啊。原來是這麼回事啊。"
10046005-144 = "還記得我之前說過……你跟我很像嗎？"
10046005-148 = "而我……是連一點小小的仇恨都絕不會忘記的人。"
10046005-149 = "你不是應該討厭我才對嗎？是什麼讓你變成這樣的？"
10046005-150 = "…………"
10046005-151 = "哦？你看你看，這不是一點都沒變嗎！#n對我的恨完全表露無遺。"
10046005-152 = "…………"
10046005-153 = "有趣……真是有趣。#n究竟是什麼讓你願意向我低頭呢？"
10046005-157 = "不妨娓娓道來吧？"

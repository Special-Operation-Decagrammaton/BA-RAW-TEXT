[translation]
10046005-1 = "Prologue;Too Bad, So Sad"
10046005-21 = "[log]Previously, on Blue Archive...[/log]"
10046005-25 = "It's a simple delivery mission. You need to retrieve and deliver an extremely important bag to the Tea Party. Today."
10046005-26 = "The only real concern is the pick-up is a bit further than expected..."
10046005-32 = "Wahaha!"
10046005-37 = "Why're you all the way out here in the sticks?"
10046005-38 = "Kinugawa Kasumi...?"
10046005-42 = "High-profile, wanted criminal from Gehenna Academy, Kinugawa Kasumi?"
10046005-45 = "Kinugawa Kasumi, president of the Hot Springs Department, somehow had our briefcase in her hands."
10046005-49 = "What am I looking at here?! What's with this group?"
10046005-50 = "Why is Trinity's Justice Task Force on a train that's bound for Gehenna?"
10046005-51 = "And...Kasumi?"
10046005-52 = "Kasumi, Sensei?! I swear if I find out this is the company you've been keeping..."
10046005-55 = "We unexpectedly ran into Iori coming on the train. And then..."
10046005-59 = "Trinity Girl and Sensei have to listen to me. Isn't that right, Cutie Pie?"
10046005-60 = "You're really focusing on the wrong things here. I'm awaiting her decision with bated breath. In a few moments' time, she's going to shoot you for the sake of this teacup...? Chamber pot? Thingy, whatever."
10046005-61 = "Isn't that right? Our friend from the Justice Task Force... What was your name again?"
10046005-62 = "...Nika?"
10046005-63 = "Anyways, you need this intact, right?"
10046005-69 = "..."
10046005-70 = "Enough about the bag! Teapot this! Bag that! Seriously!!"
10046005-71 = "..."
10046005-72 = "Who cares about a stupid bag?!"
10046005-82 = "...Wow!"
10046005-83 = "...Haha..."
10046005-84 = "WAHAHAHA!"
10046005-85 = "I tried to warn you! I tried to warn you, and you didn't believe me!"
10046005-86 = "Not like my adorable, obedient Cutie Pie over here. Until I hand over this bag..."
10046005-87 = "There's nothing she can—"
10046005-95 = "Kyaaah...?!"
10046005-102 = "...Huh."
10046005-103 = "...I shot her."
10046005-105 = "And so, our little train trip to Gehenna ended in disaster."
10046005-113 = "My, my. So this is who Sensei brought! Their little friend!"
10046005-114 = "Who knew that THE Ichika would show up personally? And looking so lovely!"
10046005-115 = "..."
10046005-116 = "Hmm, so what brings you here, Cutie Pie? Wanted some \"personal\" time?"
10046005-117 = "Surely you didn't join the mission for little old me... What \"important\" business do you have planned? Hm?"
10046005-118 = "..."
10046005-119 = "...elp."
10046005-123 = "Hm?"
10046005-127 = "Help us. Please help, just this once. I beg you."
10046005-133 = "Oh?"
10046005-134 = "Ha, haha! ...Wahaha!"
10046005-135 = "Oh me, oh my! What could possibly make pretty words like that come out of my dear Ichika's mouth?"
10046005-136 = "Of course I'll help. No need to ask. We're friends, right?"
10046005-137 = "..."
10046005-138 = "But first—Sensei, aren't you proud of our Cutie Pie? She really took charge on that train."
10046005-139 = "However, I must warn you: I'm just an innocent little civilian. There's only so much I can help with!"
10046005-140 = "...What happened then..."
10046005-141 = "...was my fault."
10046005-142 = "Please forgive me."
10046005-143 = "...Ah, ah. I see. Is that what you learned?"
10046005-144 = "Do you remember what I said last time? You and I are so alike."
10046005-148 = "...And I don't forget even the smallest grudge."
10046005-149 = "So why don't you hate me? What's changed?"
10046005-150 = "..."
10046005-151 = "Oh? Look at that. I got chills! The same as ever. That roiling, boiling hatred!"
10046005-152 = "..."
10046005-153 = "And yet you are still kneeling before me. So why exactly are you here?"
10046005-157 = "Spill every...little...detail."

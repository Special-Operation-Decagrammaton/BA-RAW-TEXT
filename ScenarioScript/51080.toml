[translation]
51080-1 = "Episode 8;A Girl's Devotion to Youth(?) 2"
51080-5 = "Um... Sensei? Who are they?"
51080-6 = "[s] \"Ah, they're from the Inner Discipline Club. And this is Yukari from the Hyakkaryouran.\""
51080-8 = "...Oh! The Hyakkaryouran!"
51080-9 = "I've been hearing that name a lot lately..."
51080-10 = "Heehee, it's a pleasure to meet you! I'm Mimori."
51080-11 = "Oh, right!"
51080-12 = "Hello! I'm Kaede! My goal is to become a proper lady!"
51080-13 = "Hello..."
51080-15 = "Hello! I, Yukari, am pleased to meet you all!"
51080-16 = "I've heard many stories of the Inner Discipline Club..."
51080-17 = "I was told that you patrol the districts and keep innocents safe."
51080-18 = "We manage, though Tsubaki and Kaede like to keep me on my toes."
51080-19 = "Ahaha. But I'm sure we can't compare to the Hyakkaryouran..."
51080-20 = "No! You do great work!"
51080-21 = "Is that so? Heehee, what a relief."
51080-22 = "[s] \"What brings the Inner Discipline Club here?\""
51080-24 = "Ah, about that! We are assisting with the festival preparations!"
51080-25 = "We've been commissioned...by the Festival Department..."
51080-26 = "They have us doing everything from facility maintenance to street patrols for the Hyakkiyako Lantern Festival."
51080-27 = "The president of the Festival Department insisted that we help them! She kept saying this is a veeeeeeeery important festival!"
51080-29 = "Their story was very similar to what the Yin-Yang Club had told me."
51080-31 = "As you might expect from a \"lantern\" festival, bright lanterns fill the sky when the festival begins..."
51080-33 = "And when we reach the end of the festival..."
51080-34 = "We entrust the lanterns with our hopes for the future, as well as the burdens of the past, and send them down the river."
51080-35 = "Shizuko said it was a festival to soothe people's hearts."
51080-36 = "Sensei, you remember, right? The day the sky turned red..."
51080-40 = "Things have been tense around the academy since then."
51080-41 = "I think it's been...on Shizuko's mind."
51080-43 = "So we'll overthrow that oppressive atmosphere with a joyful festival! The President of the Festival Department is working hard to pull this off!"
51080-44 = "Everyone can enjoy the festival and let go of their bad memories with their lanterns! Isn't that great?"
51080-45 = "And I heard there will be an amazing miko performing a song and dance on stage! "
51080-46 = "I'm jealous! I want to do that too!"
51080-47 = "[s] \"The miko... Will it be Chise again?\""
51080-48 = "No, I heard the miko will be a member of the same family that traditionally performed at each Lantern Festival. At least until the festival was closed 20 years ago."
51080-49 = "It has to be someone great, right? I can't wait to see how pretty she is, Sensei!"
51080-55 = "Shizuko, Pina, and Umika are doing their utmost, even as we talk here now."
51080-56 = "We, the Inner Discipline Club, should work as hard as we can to help them."
51080-57 = "[s] \"You're all doing your best.\""
51080-63 = "I see...so that's what's going on."
51080-64 = "That's...very...very..."
51080-70 = "Impressive! No, it's astounding!"
51080-72 = "H-Huh?"
51080-73 = "Throwing a festival to ease the academy's burdens..."
51080-74 = "Amazing... And you said her name is Shizuko? "
51080-75 = "She must possess a warrior's spirit!"
51080-77 = "Ah, yes. She truly does. "
51080-78 = "But... Yukari."
51080-79 = "Yes?"
51080-80 = "...Have we met before? Something about you feels familiar..."
51080-84 = "Ah, w-well...!"
51080-85 = "It's very hot today! Scorching!"
51080-86 = "We better make sure we stay hydrated!"
51080-87 = "Huh? I-I suppose you're right...?"
51080-92 = "Anyway, Sensei!"
51080-93 = "If you could forget something by sending the memory off in a lantern... What would you want to let go?"
51080-99 = "Distracted by Kaede's question, everyone became lost in a lively discussion of which memories and hopes they wanted to release at the end of the festival."
51080-107 = "I found them! The Hyakkaryourans are right here!"
51080-108 = "I hope you're ready to pay for the mess you made of us last time!"
51080-114 = "...Who are you?"
51080-117 = "W-Wait, Boss, I don't think this is the same person."
51080-118 = "Uh, umm, i-it doesn't matter! Look at that sky blue haori—she's gotta be from the same club!"
51080-119 = "We can get our revenge by makin' her pay for her comrade's insult!"
51080-121 = "Great idea, Boss!"
51080-126 = "Oh, it's the Mouryo again..."
51080-127 = "I suppose no festival is complete without them causing a ruckus."
51080-128 = "Trying to cause trouble again? I'll kick your butts!"
51080-137 = "...Watch out!"
51080-149 = "[ns] \"Is everyone okay?!\""
51080-151 = "Heh! You're in our way, so get lost!"
51080-159 = "...Intolerable."
51080-161 = "Hm?"
51080-163 = "Interfering with the festival preparations... Attacking the Inner Discipline Club, who are doing their best to help everyone!"
51080-168 = "I will not tolerate your violence!"
51080-170 = "Oh? Then bring it on!"
51080-172 = "Yes! I, Yukari, as the Hyakkaryouran's elite thus vow:"
51080-179 = "None of you shall remain standing!"
51080-181 = "Ha! You've got guts!"
51080-183 = "But we are the Mouryo!"
51080-192 = "How are you gonna fight all of us by yourself?"
51080-194 = "Ugh...!"
51080-218 = "Wh-What was that?!"
51080-220 = "Wh-Who're you?!"
51080-222 = "...I step away for a moment and suddenly there's a huge mess."
51080-229 = "Well, if you're looking for trouble, it looks like you've found it."
51080-234 = "...That voice!"
51080-241 = "The next time you dream of casting a shadow over someone's blossoming youth, you'll remember the lesson Fuwa Renge taught you today!"
51080-246 = "...Renge?!"
51080-248 = "Urgh! A-Attack!"

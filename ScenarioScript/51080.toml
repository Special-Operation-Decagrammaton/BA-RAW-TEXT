[translation]
51080-1 = "第8話;朝青春(?)邁進的少女（２）"
51080-5 = "那個……老師？#n這幾位是……？"
51080-6 = "[s]「啊，他們是修行部的成員。這是百花繚亂的紫。」"
51080-8 = "哦哦！百花繚亂……！"
51080-9 = "嗯，好像有聽說過……"
51080-10 = "呵呵，幸會，我叫做三森。"
51080-11 = "啊！對了！"
51080-12 = "你好！我是楓！目標是成為完美淑女！"
51080-13 = "哈囉～"
51080-15 = "是，各位好。小女子名叫紫，很高興見到各位！"
51080-16 = "修行部各位的事，我也時有所聞……"
51080-17 = "聽說各位平時經常在街上進行自衛隊活動……"
51080-18 = "是的，我偶爾會和椿醬和楓醬一起……"
51080-19 = "啊哈哈，不知道百花繚亂的人看到會怎麼想……"
51080-20 = "別這麼說！這真的是很棒的活動！"
51080-21 = "是這樣嗎？呵呵，那真是太好了。"
51080-22 = "[s]「話說修行部為什麼會來這裡呢？」"
51080-24 = "啊！老師，是這樣的！#n我們是來幫忙準備慶典的！"
51080-25 = "嗯，因為這次我們也接到節慶營運管理部的委託～"
51080-26 = "為了讓「百鬼夜行燈籠祭」順利舉辦，想請我們事先完成設施檢查之類的必要準備。"
51080-27 = "尤其是這次的慶典非～常重要，所以節慶營運管理部的部長希望我們一定要幫忙！"
51080-29 = "（之後聽到的事就和在陰陽部聽到的大致相同）"
51080-31 = "聽說慶典開始後，街道就會像「燈籠祭」的名稱一樣充滿點亮的燈籠……"
51080-33 = "而在慶典尾聲將會進行送舊迎新……"
51080-34 = "嗯，會把對未來的期許和過去不好的記憶裝進燈籠，並放入河水中任其漂流。"
51080-35 = "藉由這個過程讓心靈得到慰藉──靜子醬是這麼說的。"
51080-36 = "老師也還記得吧……？天空變紅那天的事。"
51080-40 = "在那之後，學園就充滿了不安的氣氛。"
51080-41 = "靜子他……似乎相當在意這件事。"
51080-43 = "所以為了逆轉那種氣氛！用熱鬧的慶典戰勝那種感覺！#n節慶營運管理部的部長說會努力重辦這次的慶典哦！老師！"
51080-44 = "大家一起享受慶典，把不好的回憶？之類的通通塞進燈籠裡放水流！很厲害吧？"
51080-45 = "還有啊，我聽說在慶典最後會有非常厲害的巫女在舞台上唱歌跳舞！"
51080-46 = "真羨慕～我也好想試試看哦～"
51080-47 = "[s]「巫女……難道這次也是知世……？」"
51080-48 = "不，聽說巫女與20年前的「燈籠祭」相同，是由某個歷史悠久的家族的人負責擔任。"
51080-49 = "一定是個很厲害的人吧～？#n而且一定很美！真想趕快看到他呢！老師！"
51080-55 = "即使是現在，靜子醬、菲娜醬和海花醬他們也在努力準備……"
51080-56 = "所以我們修行部也應該全力幫忙。"
51080-57 = "[s]「大家都很努力呢。」"
51080-63 = "……原來是這樣啊。"
51080-64 = "這……真是……真是……"
51080-70 = "多麼美妙的心態！實在太Excellent了！"
51080-72 = "咦，咦？"
51080-73 = "為了抱有痛苦回憶的大家重新舉辦慶典的行為！"
51080-74 = "記得是……靜子同學是嗎？"
51080-75 = "真是個有著不凡心態和想法的人呢！"
51080-77 = "啊，沒錯，就像你說的一樣。"
51080-78 = "但是……紫同學。"
51080-79 = "請說？"
51080-80 = "……我們之前有在哪裡見過嗎？#n總覺得紫同學有點面熟……"
51080-84 = "啊，這，這個……！"
51080-85 = "今，今天天氣真是莫名悶熱呢！"
51080-86 = "請多留意身體健康哦！"
51080-87 = "咦？啊，是，是嗎？"
51080-92 = "話說老師！"
51080-93 = "如果要在這次慶典中送走痛苦的回憶……老師想送走什麼呢！？"
51080-99 = "（就在和興奮的楓與大家一起說笑的時候……）"
51080-107 = "找到了！是百花繚亂的傢伙……！"
51080-108 = "上次竟敢對我們為所欲為！"
51080-114 = "請問是……哪位？"
51080-117 = "隊長！他不是當時那個傢伙耶……？"
51080-118 = "不重要！無所謂！#n反正既然都穿著那件水藍色羽織，那他們就是同一個社團的人！"
51080-119 = "以牙還牙，找他報仇就行了！"
51080-121 = "真是好方法！隊長！"
51080-126 = "是妖怪劇團……"
51080-127 = "雖然不清楚原因，但他們每到慶典時期都會四處鬧事！"
51080-128 = "又想來惹事嗎？我絕對不會放過他們的！"
51080-137 = "……危險！"
51080-149 = "[ns]「大家沒事吧……！？」"
51080-151 = "嘿嘿！礙事的人都閃邊去吧！"
51080-159 = "……容許。"
51080-161 = "嗯？"
51080-163 = "竟敢在這種地方鬧事……還對無辜的修行部動手！"
51080-168 = "那種惡行！我絕不容許！"
51080-170 = "哦！想來硬的嗎！"
51080-172 = "沒錯！小女子我──！"
51080-179 = "身為百花繚亂的菁英！一定要打倒你們！"
51080-181 = "真是個不知死活的傢伙啊，雖然勇氣可嘉！"
51080-183 = "但我們可是妖怪劇團！"
51080-192 = "你一個人有辦法招架這麼多人嗎！"
51080-194 = "唔……！"
51080-218 = "這，這難道是……！"
51080-220 = "是，是誰！？"
51080-222 = "想不到我才離開一下就有人鬧事……"
51080-229 = "還想繼續鬧的話就試試看吧。"
51080-234 = "……這個聲音，難道是！"
51080-241 = "既然有人想妨礙我的青春活動，就由我不破蓮華親自對付你們。"
51080-246 = "……蓮華前輩！？"
51080-248 = "哎！動，動手……！"

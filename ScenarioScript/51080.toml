[translation]
51080-1 = "ตอนที่ 8;เด็กสาวผู้ตามหาชีวิตวัยรุ่น(?) 2"
51080-5 = "เอ่อ... ท่านอาจารย์? คนพวกนี้คือ?"
51080-6 = "[s] \"อ้อ นี่คือชมรมฝึกฝน ส่วนนี่ก็ยูคาริจากเฮียกกะเรียวรันนะทุกคน\""
51080-8 = "โอ้ว! เฮียกกะเรียวรัน...!"
51080-9 = "เหมือนจะเคยได้ยินชื่อนี้มาก่อนนะ..."
51080-10 = "ฮุฮุ ดีใจที่ได้เจอนะคะ ฉันชื่อมิโมริค่ะ"
51080-11 = "เฮือก! จริงสิ!"
51080-12 = "สวัสดี! ฉันชื่อคาเอเดะ! ฉันฝันจะเป็นเลดี้ที่เพียบพร้อมน่ะ!"
51080-13 = "สวัสดี~"
51080-15 = "อ่า สวัสดีเจ้าค่ะ ข้ามีนามว่ายูคาริ ยินดีที่ได้พบทุกคนเจ้าค่ะ!"
51080-16 = "จะว่าไป ข้าก็ได้ยินข่าวลือเกี่ยวกับชมรมฝึกฝนมาเจ้าค่ะ..."
51080-17 = "เห็นว่าปกติก็ทำกิจกรรมรักษาความสงบกันตามท้องถนนด้วย..."
51080-18 = "ใช่ค่ะ สึบากิจังกับคาเอเดะจังทำกิจกรรมนี้ด้วยกันอยู่..."
51080-19 = "แหะๆๆ ไม่รู้เลยนะคะว่าคนจากเฮียกกะเรียวรันจะมองว่ายังไง..."
51080-20 = "ไม่เจ้าค่ะ! ข้าว่ามันเป็นกิจกรรมที่ยอดเยี่ยมมาก!"
51080-21 = "งั้นเหรอคะ? ฮุฮุ ถ้างั้นก็โล่งอกไปทีค่ะ"
51080-22 = "[s] \"ว่าแต่ ชมรมฝึกฝนมาทำอะไรที่นี่เหรอ?\""
51080-24 = "อ๊ะ! สงสัยเรื่องนั้นเหรอคุณครู? พวกเราก็มาช่วยเตรียมงานเทศกาลน่ะสิ!"
51080-25 = "อืม พอดีครั้งนี้ชมรมเทศกาลมีภารกิจ~ ให้พวกเราทำน่ะ~"
51080-26 = "เราได้รับการขอร้องให้ช่วยเตรียมการที่จำเป็น อย่างเช่นตรวจสอบอาคารหรือสิ่งอำนวยความสะดวก#nต่างๆ ล่วงหน้าเพื่อให้สามารถเปิด <เทศกาลโคมไฟเฮียกคิยาโค> ได้อย่างราบรื่นค่ะ"
51080-27 = "โดยเฉพาะงานเทศกาลครั้งนี้ที่สำคัญมากกกก~ แล้วด้วย ยังมีอีกเรื่องที่หัวหน้าชมรมเทศกาลขอให้เรา#nช่วยอีกด้วยนะ!"
51080-29 = "(เรื่องที่คุณครูได้ยินหลังจากนั้นเป็นเรื่องราวคล้ายๆ กับที่ได้ยินจากชมรมหยินหยางมา)"
51080-31 = "เมื่อเริ่มงานเทศกาล ถนนก็จะเต็มไปด้วยโคมระย้าที่จุดไฟไว้อย่างสวยงามสมกับชื่องาน <เทศกาลโคมไฟ>..."
51080-33 = "และเมื่อมาถึงช่วงสุดท้ายของงานเทศกาล ก็จะมีการส่งท้ายปีเก่าต้อนรับปีใหม่..."
51080-34 = "ใช่ค่ะ เราจะใส่ความหวังที่มีต่ออนาคตอันสดใส และทิ้งความทรงจำของอดีตที่ทุกข์ใจลงในโคม แล้วเอาไปลอยบนแม่น้ำ"
51080-35 = "ชิซุโกะจังบอกไว้ว่าเทศกาลนี้คือเทศกาลปลอบโยนหัวใจผ่านการกระทำเหล่านั้นค่ะ"
51080-36 = "คุณครู? ยังจำได้ใช่มั้ย...? เหตุการณ์ที่ท้องฟ้าเคยเป็นสีแดงน่ะ"
51080-40 = "หลังจากเหตุการณ์นั้น โรงเรียนเราก็อยู่ท่ามกลางความสับสนวุ่นวายเลยละ"
51080-41 = "ชิซุโกะน่าจะใส่ใจเรื่องนั้นเป็นพิเศษ..."
51080-43 = "ก็เลยจะเปลี่ยนบรรยากาศ! เพื่อให้เราเอาชนะความอึมครึมนั้นด้วยเทศกาลที่สนุกสนาน! หัวหน้าชมรม#nเทศกาลก็เลยพยายามที่จะเอาเทศกาลนั้นกลับมาเปิดอีกครั้งยังไงล่ะคุณครู!"
51080-44 = "มาเพลิดเพลินกับเทศกาลไปด้วยกัน ลอยโคมทิ้งความทรงจำที่ไม่ดีไปให้หมด! สุดยอดเลยใช่มั้ยล่ะ?"
51080-45 = "ไม่ใช่แค่เท่านั้นนะ ฉันได้ยินมาว่าตอนสุดท้ายของงานเทศกาลจะมีมิโกะที่โด่งดังมาขับร้อง และเต้นระบำบนเวทีด้วย! "
51080-46 = "อิจฉาจัง~ ฉันก็อยากทำแบบนั้นบ้าง~"
51080-47 = "[s] \"มิโกะงั้นเหรอ... หรือว่าครั้งนี้ชิเซะก็...?\""
51080-48 = "ไม่ใช่ค่ะ ได้ยินมาว่าเป็นคนจากตระกูลที่มีประวัติยาวนานที่เคยมาประกอบพิธีกรรมใน <เทศกาลโคมไฟ> เมื่อ 20 ปีก่อนค่ะ"
51080-49 = "ต้องเป็นคนที่ยอดเยี่ยมมากเลยว่ามั้ย~? ต้องสวยมากๆ แน่ๆ! อยากเจอไวๆ แล้วละคุณครู!"
51080-55 = "ตอนนี้ทั้งชิซุโกะจัง พีน่าจัง แล้วก็อุมิกะจังต่างก็ตั้งใจฝึกซ้อมกันอยู่"
51080-56 = "พวกเราชาวชมรมฝึกฝนก็ต้องมาช่วยอย่างสุดฝีมือสิคะ"
51080-57 = "[s] \"เหนื่อยกันน่าดูเลยนะ\""
51080-63 = "...เป็นอย่างนี้นี่เองสินะเจ้าคะ"
51080-64 = "นี่มันช่าง... ช่าง..."
51080-70 = "ช่างเป็นความตั้งใจที่น่ายกย่อง! เอ็กซัล~ เล้นทึ~ มากเลยเจ้าค่ะ!"
51080-72 = "คะ... คะ?"
51080-73 = "การจัดงานเทศกาลสำหรับทุกคนที่มีความทรงจำอันแสนเจ็บปวดน่ะเจ้าค่ะ!"
51080-74 = "เมื่อกี้พูดถึง... ชิซุโกะใช่ไหมเจ้าคะ? "
51080-75 = "เธอเป็นคนที่มีความตั้งใจและความพยายามที่น่าชื่นชมมากเลยเจ้าค่ะ!"
51080-77 = "อ่า ค่ะ อย่างที่ว่าเลยค่ะ "
51080-78 = "ว่าแต่... ยูคาริ"
51080-79 = "เจ้าคะ?"
51080-80 = "...ไม่ทราบว่าพวกเราเคยเจอกันที่ไหนมาก่อนรึเปล่าคะ? ฉันคุ้นๆ หน้ายูคาริยังไงไม่รู้..."
51080-84 = "อ๊ะ ถะ... ถ้าเป็นเรื่องนั้น...!"
51080-85 = "วันนี้! จริงด้วยเจ้าค่ะ! วันนี้อากาศร้อนอบอ้าวจังเลยนะเจ้าคะ!"
51080-86 = "ต้องรักษาสุขภาพให้ดีแล้ว!"
51080-87 = "คะ? อะ... เอ่อ... งั้นเหรอคะ?"
51080-92 = "นี่ๆ! คุณครู!"
51080-93 = "ถ้าลอยความทรงจำที่เจ็บปวดทิ้งไปกับโคมในงานเทศกาลครั้งนี้ได้... คุณครูอยากจะทิ้งอะไรเหรอ?!"
51080-99 = "(คาเอเดะที่ดูตื่นเต้นมาก เธอชวนคุณครูและทุกคนพูดคุยกันอย่างสนุกสนาน)"
51080-107 = "เจอแล้ว! พวกเฮียกกะเรียวรันตัวดี...!"
51080-108 = "คราวก่อนเล่นงานพวกเราไว้ซะอ่วมเลยนะ!"
51080-114 = "...ใครเหรอ... เจ้าคะ?"
51080-117 = "หัวหน้า! นี่ไม่ใช่คนที่เราเจอคราวก่อนนี่คะ...?"
51080-118 = "ฮึ่ม! ช่างประไร! ถ้าใส่เสื้อฮาโอริสีคราม ก็ถือว่าเป็นชมรมเดียวกันไม่ใช่รึไง!"
51080-119 = "ถ้าเราแก้แค้นอย่างสาสม ต่อให้ไม่ถูกคน แต่ก็ถือว่าเราได้แก้แค้นต่อคนที่เคยมาจัดการเราได้เหมือนๆ กันนั่นแหละ!"
51080-121 = "เป็นความคิดที่สุดยอดไปเลย หัวหน้า!"
51080-126 = "อีกฝ่ายคือปีศาจงั้นเหรอ..."
51080-127 = "ฉันเองก็ไม่รู้เหตุผลหรอกนะคะ แต่พอจะจัดงานเทศกาลทีไร เจ้าพวกนี้ก็ออกมาก่อความวุ่นวายตลอด#nเลยค่ะ!"
51080-128 = "จะมาสร้างปัญหาอีกแล้วเหรอ? ฉันไม่ปล่อยไปหรอกนะ!"
51080-137 = "...อันตราย!"
51080-149 = "[ns] \"ทุกคนไม่เป็นไรใช่ไหม...?!\""
51080-151 = "หึหึ! ใครคิดจะเข้ามาขวางก็ไสหัวไปซะ!"
51080-159 = "...เจ้าคะ?"
51080-161 = "หืม?"
51080-163 = "มาก่อความวุ่นวายในที่แบบนี้... แล้วก็ยังทำเรื่องโหดร้ายกับชมรมฝึกฝนที่ไม่เกี่ยวอะไรด้วยอีก!"
51080-168 = "การกระทำที่โหดร้ายทารุณแบบนั้น! ข้าไม่มีทางยกโทษให้หรอกเจ้าค่ะ!"
51080-170 = "หึ! จะเอาใช่มั้ยล่ะหา!?"
51080-172 = "เจ้าค่ะ! ข้า ยูคาริ!"
51080-179 = "ในฐานะอิล~ ลีทแห่งเฮียกกะเรียวรัน! จะจัดการพวกเจ้าให้หงายหลังเลยเจ้าค่ะ!"
51080-181 = "ความกล้าหาญนั่นก็ดูน่าชื่นชมหรอกนะ!"
51080-183 = "แต่พวกเราน่ะเป็นปีศาจ!"
51080-192 = "คิดว่าเธอคนเดียวจะรับมือพวกเราทั้งหมดนี้ได้เรอะ!"
51080-194 = "อึก...!"
51080-218 = "ระ... หรือว่า...!"
51080-220 = "คะ... ใครน่ะ?!!"
51080-222 = "นึกว่าเรื่องอะไรซะอีก แค่ฉันหายไปแป๊บเดียวก็เกิดเรื่องวุ่นวายเลยสินะ"
51080-229 = "ถ้าคิดจะก่อเรื่องโกลาหลอะไรอีกก็ลองดูสิ"
51080-234 = "...เสียงนี้มัน!"
51080-241 = "ถ้ามีใครหน้าไหนมาขัดขวางกิจกรรมตามหาชีวิตวัยรุ่นของฟูวะ เรนเกะละก็ มาเจอกันสักตั้งดูสิ"
51080-246 = "...รุ่นพี่เรนเกะ?!"
51080-248 = "หน็อยแน่! อะ... เอาเลยสิ...!"

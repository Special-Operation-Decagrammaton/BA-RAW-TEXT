[translation]
10051080-1 = "第8話;在各自的位子上"
10051080-2 = "海報攝影棚"
10051080-4 = "（嗚……不知道多久沒有休息了呢……）"
10051080-5 = "（好累哦……）"
10051080-6 = "（照片到底什麼時候才會拍完……）"
10051080-7 = "（燈光強到會讓皮膚產生刺痛……鞋子雖然漂亮，但一直穿著腳也好痛……）"
10051080-8 = "（尤其是這個妝……厚得我皮膚好悶……）"
10051080-9 = "（我……到底什麼時候才能回去……？）"
10051080-17 = "哦，都還順利嗎？"
10051080-18 = "咦！？"
10051080-19 = "嗯，表現得不錯就好。"
10051080-20 = "咦？那個……請問我真的有做好嗎？"
10051080-21 = "我好像只是照著指示去做而已……"
10051080-22 = "能跟得上就代表做得很不錯了。"
10051080-23 = "能跟得上就代表……"
10051080-24 = "那，那個，請問……"
10051080-25 = "嗯？"
10051080-26 = "我……現在可以回去了嗎？"
10051080-27 = "回去？回哪裡去？"
10051080-28 = "是那個什麼忍者部之類的地方嗎？ "
10051080-29 = "是的，是忍術研究部……"
10051080-30 = "意思是你想回到原本待的地方對吧？"
10051080-31 = "那我問你──你在那裡是什麼？"
10051080-32 = "咦……？"
10051080-33 = "在那裡的你是個什麼樣的存在？有什麼用處？能為那個組織帶來什麼？"
10051080-34 = "咦！？那，那個……"
10051080-38 = "你看，這些是你今天拍的照片。"
10051080-39 = "……！"
10051080-40 = "怎麼樣？即使是一點美感都沒有的人，看到這些照片也會給出一樣的答案。"
10051080-41 = "──很美。"
10051080-42 = "……"
10051080-43 = "月夜，你對我們來說是最棒的模特兒。"
10051080-44 = "而這，就是你應該待在這裡的理由。#n你真正的價值，在這裡才最耀眼動人。"
10051080-48 = "我只是把衣服，轉移到能發揮它真正價值的地方而已！ "
10051080-51 = "真正的……價值……"
10051080-52 = "當然，要怎麼選擇是你的自由。#n看你是想待在只能帶給你舒適感的地方，還是要待在能發揮最大價值的地方。"
10051080-53 = "那，那個……"
10051080-54 = "而且，其實我們已經在規劃以你為主角的時裝秀了。"
10051080-55 = "咦！？"
10051080-56 = "地點一樣選在百鬼夜行自治區。#n預計將會舉辦慶祝新年的時裝秀。"
10051080-57 = "那，那，那麼大型的活動，要讓我上場！？"
10051080-58 = "那當然。沒有比你更合適的模特兒了。"
10051080-59 = "總之你先記著，其他事情我會繼續安排的。"
10051080-63 = "那，那個，可是……！"
10051080-70 = "設計師，餐點送到了。"
10051080-71 = "怎麼現在才來啊？為什麼會這麼慢？"
10051080-72 = "非常抱歉。因為外送員在路上遇到妖怪劇團的襲擊……"
10051080-73 = "真是的，這些不良學生…… "
10051080-74 = "不過你不覺得，最近我的外送好像特別容易被襲擊嗎？"
10051080-75 = "是啊，確實有這種感覺……"
10051080-76 = "算了。也可能只是我反應過度了吧。"
10051080-77 = "話說今天點了什麼餐？"
10051080-78 = "是拉麵、炒飯，還有餃子。"
10051080-79 = "很好。辛苦之後就該好好補給一下。#n我們走吧。"
10051080-85 = "啊，你要吃的東西我另外準備在隔壁房間了。"
10051080-86 = "咦……？"
10051080-87 = "有什麼好驚訝的？#n你現在已經是模特兒了，注意飲食也是理所當然的事。"
10051080-88 = "我準備了零卡蒟蒻麵和沙拉，你就吃那些吧。#n不用跟上來沒關係。"
10051080-89 = "咦咦！？剛剛不是才說「能跟上就代表做得很不錯」嗎！"
10051080-90 = "那句話的意思不是要你連這種時候都跟！"
10051080-91 = "祝你用餐愉快囉。"
10051080-92 = "啊，經紀人，你叫了什麼拉麵？"
10051080-93 = "是照您平常的要求選的。#n麵條細麵，不加背脂，湯頭不辣。"
10051080-94 = "相當完美。"
10051080-95 = "請，請等一下！？"
10051080-100 = "攝影棚隔壁房間"
10051080-101 = "嗚嗚嗚……"
10051080-102 = "太過分了……晚餐竟然只有蒟蒻麵和沙拉……"
10051080-103 = "他們自己卻在吃拉麵跟炒飯，而且還加了餃子……"
10051080-104 = "就連沒收的手機也不還給我……"
10051080-105 = "……"
10051080-106 = "好想吃拉麵……"
10051080-107 = "跟部長……伊樹菜醬……還有老師一起……"
10051080-108 = "麵條極粗，追加背脂，最後還要淋上辣油……嘿嘿。"
10051080-109 = "因為忍者就是要吃這種拉麵……"
10051080-110 = "……"
10051080-116 = "模特兒……還有忍者……"
10051080-117 = "跟忍者相比……做模特兒真的更適合我嗎？"
10051080-118 = "選擇模特兒這條路，才能成為更有價值的人嗎？"
10051080-119 = "……我在忍術研究部，真的是毫無價值的存在嗎？"
10051080-121 = "嗚嗚……我不知道……"
10051080-122 = "誰能來……告訴我答案呢……"
10051080-124 = "百鬼夜行某處的拉麵店"
10051080-126 = "（過了幾個小時，在結束拍攝之後和三千留與伊樹菜一起去了拉麵店）"
10051080-130 = "嘶……這濃厚的豚骨香味……"
10051080-131 = "果然拍完影片之後就是要吃拉麵啊。"
10051080-132 = "伊樹菜也這麼認為！"
10051080-133 = "[s]「今天我請客，大家盡情吃吧。」"
10051080-134 = "呵呵，既然老師大人都這麼說了，我就比平常稍微奢侈一點囉！"
10051080-135 = "不好意思！這裡要點餐！"
10051080-136 = "好的！請問要點什麼呢？"
10051080-137 = "唔嗯，我要四碗拉麵，還有一盤餃子。"
10051080-138 = "然後拉麵的搭配是──"
10051080-139 = "麵條極粗、追加背脂、辣油收尾──對吧？"
10051080-140 = "咦！？你怎麼知道！？"
10051080-141 = "哈哈！畢竟幾位忍者客人，每次來的時候都是這樣點的嘛！"
10051080-142 = "而且為了感謝各位上次幫忙趕走那些奧客，#n我們決定以「忍者套餐」的名稱，把這個組合加入固定菜單裡！"
10051080-143 = "之後點餐的時候直接說「忍者套餐」就可以囉！"
10051080-145 = "哇……！"
10051080-146 = "這個世界終於開始認可忍者了嗎……！"
10051080-147 = "不過話說回來，平時總是一起來的客人……今天好像少了一位呢？#n是晚點才會過來嗎？"
10051080-148 = "嗯？什麼意思……"
10051080-149 = "對耶，月夜現在不在……！"
10051080-150 = "請幫我把四碗拉麵改成三碗！"
10051080-152 = "好的！感謝您的點餐！"
10051080-157 = "不知不覺就連月夜的份也一起點了。"
10051080-158 = "伊樹菜也完全沒注意到……"
10051080-159 = "好想你哦，月夜……"
10051080-160 = "說到這個，伊樹菜剛才就想跟你說……"
10051080-161 = "部長有看過這個了嗎？"
10051080-162 = "是什麼？"
10051080-163 = "月夜閣下拍攝過程的影片，在幾分鐘前上傳到網路上了！"
10051080-164 = "……！"
10051080-165 = "在哪在哪？我們一起看吧！"
10051080-166 = "是！"
10051080-171 = "（於是三千留與伊樹菜在接下來一段時間內，都一起看著月夜拍攝的花絮影片）"
10051080-173 = "……"
10051080-174 = "哎呀……沒想到月夜居然還有這麼大膽的一面。"
10051080-175 = "不過先等一下，這部影片的觀看次數……"
10051080-179 = "我的天，這種觀看次數是有可能達到的嗎！？"
10051080-180 = "應該不是我看錯了吧？"
10051080-181 = "才上傳幾分鐘就有這麼高的觀看次數！？"
10051080-182 = "我們頻道所有影片的觀看數加起來，都比不上月夜這一部影片呢……"
10051080-183 = "……"
10051080-184 = "感覺……真的就像另一個世界的事一樣……"
10051080-185 = "另一個世界啊……"
10051080-192 = "……"
10051080-193 = "我問你哦，伊樹菜。"
10051080-194 = "是，部長？"
10051080-195 = "月夜他會不會已經……不打算回來了呢？"
10051080-196 = "咦！？"
10051080-197 = "讓您久等了！"
10051080-198 = "來，請慢用！"
10051080-202 = "「忍者套餐」終於來了……"
10051080-203 = "那個，部長剛才……"
10051080-204 = "來，先開動吧！#n剛才說的那些不用放在心上！"
10051080-206 = "我要開動囉，老師！"
10051080-207 = "伊樹菜要開動了，主公！"
10051080-209 = "（於是那天一如往常地，在吃完拉麵後就各自解散了）"
10051080-210 = "（然而幾天後……）"
10051080-217 = "主公，主公！"
10051080-218 = "[s]「怎麼了，伊樹菜？」"
10051080-219 = "那……那個……"
10051080-220 = "部長的情況不太對勁……！"

[translation]
10051080-1 = "Episode 8;In Their Respective Places"
10051080-2 = "Photo Studio"
10051080-4 = "(Augh... It's my first break in hours...)"
10051080-5 = "(I'm beat...)"
10051080-6 = "(When will this photoshoot end...?)"
10051080-7 = "(The lighting is so intense that my skin stings... And the heels are pretty, but they're squeezing my feet. It hurts to stand...)"
10051080-8 = "(Above all, this makeup... It's so thick that my skin is suffocating...)"
10051080-9 = "(I...wonder when I can go back to...)"
10051080-17 = "Everything going well?"
10051080-18 = "Yes?!"
10051080-19 = "Fabulous. I'm glad to hear it. You look good."
10051080-20 = "Oh? I mean, um, am I actually doing well?"
10051080-21 = "I'm just doing what I'm told..."
10051080-22 = "If you're following along and keeping up, you're doing well."
10051080-23 = "Following along..."
10051080-24 = "U-Um, by the way..."
10051080-25 = "Hm?"
10051080-26 = "Can I...go back now?"
10051080-27 = "Go back? Back to where?"
10051080-28 = "Back to that \"Shinobi Squad\" or something? "
10051080-29 = "Yes, the Ninjutsu Research Club..."
10051080-30 = "So you're saying you want to go back to where you were."
10051080-31 = "Then let me ask you this. What WERE you back there?"
10051080-32 = "What...?"
10051080-33 = "Ask yourself. Really think. What kind of person were you back there? What was your purpose? What did you provide to that organization?"
10051080-34 = "What?! Th-That's..."
10051080-38 = "Look. These are the photos of you today."
10051080-39 = "...!"
10051080-40 = "What do you think? Even someone with absolutely no aesthetic awareness would see the truth staring at them in the face."
10051080-41 = "They'd say that these pictures are beautiful. YOU are beautiful."
10051080-42 = "..."
10051080-43 = "Tsukuyo, you're the best model that we have."
10051080-44 = "And that's why you must stay here. This is where you belong. This is where you embrace your true potential and can shine like the star you are."
10051080-48 = "...We're merely RELOCATING this dress to a place where it can fully embrace its potential!"
10051080-51 = "Embrace... potential..."
10051080-52 = "Of course, the choice is yours. You can stay in your comfort zone, hiding from life, or you can step into the light and find your true value."
10051080-53 = "Th-That's..."
10051080-54 = "But it'd be a shame to lose you. I'm already planning a show starring you as the main model."
10051080-55 = "What?!"
10051080-56 = "It'll be in Hyakkiyako again. We're planning a fashion show to celebrate the new year there. There's some sort of festival going on."
10051080-57 = "A-A-And you want to feature ME during a big event like that?!"
10051080-58 = "Of course. No model could do it better."
10051080-59 = "So let's just say that you agreed to it. I need to get the process started, and we're running out of time."
10051080-63 = "U-Um, I...!"
10051080-70 = "Shinecat, your food is ready for you."
10051080-71 = "Huh? Only now? What was the holdup?"
10051080-72 = "My apologies. The delivery person got ambushed by the Mouryo on their way here..."
10051080-73 = "Those damn troublemakers... "
10051080-74 = "By the way, doesn't it feel like my orders are getting ambushed a LOT lately?"
10051080-75 = "Yes, I've also noticed that."
10051080-76 = "Whatever. Perhaps I'm overreacting. It's that \"charming\" Hyakkiyako culture, I suppose."
10051080-77 = "It's been so long that I forgot what I ordered. Remind me."
10051080-78 = "You ordered ramen, fried rice, and gyoza."
10051080-79 = "Delectable. Hard work should be rewarded with a good meal. Let's go."
10051080-85 = "Tut. Your meal's in THAT room. It's been waiting for you."
10051080-86 = "What...?"
10051080-87 = "Why so shocked? You're a model now, so of course you need to watch your diet."
10051080-88 = "You can help yourself to the zero-calorie konjac noodles and salad. Easy on the dressing, all right? And don't follow us."
10051080-89 = "What?! But didn't you say that \"following along\" is how I know I'm doing well?"
10051080-90 = "Obviously that doesn't include following us here!"
10051080-91 = "Enjoy your meal, Tsukuyo."
10051080-92 = "Ay, what kind of ramen is it again?"
10051080-93 = "Your usual, sir. Thin noodles, no pork belly, and extra-mild broth."
10051080-94 = "Delectable."
10051080-95 = "W-Wait?!"
10051080-100 = "Storeroom"
10051080-101 = "Ugh..."
10051080-102 = "So cruel... I can't believe they're only giving me konjac noodles and salad. Some dinner..."
10051080-103 = "And they get purposely-bland ramen, fried rice, and gyoza on top of that..."
10051080-104 = "AND they STILL have my phone..."
10051080-105 = "..."
10051080-106 = "I want to eat...ramen..."
10051080-107 = "...with the president...and Izuna...and Sensei..."
10051080-108 = "Thick noodles, pork belly, drizzled with chili oil... Heehee."
10051080-109 = "That's the ninja's ramen..."
10051080-110 = "..."
10051080-116 = "Model...and ninja..."
10051080-117 = "But am I really...better as a model than a ninja?"
10051080-118 = "Does being a model grant me worth? Value? People seem to think so."
10051080-119 = "...Was I really so worthless in the Ninjutsu Research Club? Did it even matter?"
10051080-121 = "Ugh... I don't know..."
10051080-122 = "Please... Someone have mercy and give me the answer..."
10051080-124 = "Ramen Shop in Hyakkiyako"
10051080-126 = "Michiru, Izuna, and I finished filming. We headed to the ramen shop."
10051080-130 = "*sniff* The wonderful aroma of tonkotsu..."
10051080-131 = "What a wonderful reward for our efforts. We earned this!"
10051080-132 = "Izuna agrees!"
10051080-133 = "[s] \"It's my treat, so make sure to eat as much as you want.\""
10051080-134 = "Fufu, if Honorable Sensei insists, perhaps I'll...treat myself to something special!"
10051080-135 = "We'd like to order!"
10051080-136 = "Yes! What can I get for you?"
10051080-137 = "Four bowls of ramen and a plate of gyoza, please."
10051080-138 = "And for the ramen..."
10051080-139 = "Thick noodles, pork belly, drizzled with chili oil. Right?"
10051080-140 = "*gasp* How did you know?!"
10051080-141 = "Haha! It's what you ninja girls always order!"
10051080-142 = "And, to thank you for stepping in last time, I added THAT special bowl to the menu. See? It's the \"Ninja Meal\"!"
10051080-143 = "You can save yourself the hassle and just order the \"Ninja Meal\" from now on!"
10051080-145 = "*gasp*"
10051080-146 = "The world has finally begun to recognize the legitimacy of ninjas...!"
10051080-147 = "By the way, is the other ninja running late? I don't see her...and she's kind of hard to miss."
10051080-148 = "Eh? What do you mean—"
10051080-149 = "Ah, right. Tsukuyo...couldn't make it."
10051080-150 = "Please change that to three bowls, not four!"
10051080-152 = "Coming right up!"
10051080-157 = "I ordered for Tsukuyo out of habit."
10051080-158 = "Izuna didn't realize, either..."
10051080-159 = "I miss Tsukuyo..."
10051080-160 = "President, Izuna wanted to ask you..."
10051080-161 = "Do you want to watch this?"
10051080-162 = "What is it?"
10051080-163 = "Tsukuyo's photoshoot video was uploaded a few minutes ago!"
10051080-164 = "...!"
10051080-165 = "Really? Let's all watch together!"
10051080-166 = "Understood!"
10051080-171 = "I watched Tsukuyo's photoshoot video with Michiru and Izuna."
10051080-173 = "..."
10051080-174 = "Wow... I didn't know Tsukuyo could be so bold."
10051080-175 = "But wait, the views on this video... Oh, this must be a glitch."
10051080-179 = "Hold on, you're saying a video can get this many views?!"
10051080-180 = "Really? Let me count the commas again."
10051080-181 = "It just premiered, and it already has this high of a count?!"
10051080-182 = "...This one video from Tsukuyo has more views than our total channel, President."
10051080-183 = "..."
10051080-184 = "It really feels like looking into another world, President."
10051080-185 = "Another world..."
10051080-192 = "..."
10051080-193 = "Hey, Izuna."
10051080-194 = "Yes, President?"
10051080-195 = "Tsukuyo...probably...doesn't want to come back, right?"
10051080-196 = "What?!"
10051080-197 = "Thank you for waiting!"
10051080-198 = "Please enjoy!"
10051080-202 = "The \"Ninja Meals\" are finally here..."
10051080-203 = "Um, President, what were you saying...?"
10051080-204 = "I say we should dig in, ninjas! Don't worry about it. I was just tired from all the filming."
10051080-206 = "Thank you, Honorable Sensei!"
10051080-207 = "Th-Thank you, my lord!"
10051080-209 = "We ate the ramen and parted ways. Everything seemed normal."
10051080-210 = "But a few days later..."
10051080-217 = "My lord, my lord!"
10051080-218 = "[s] \"What's wrong, Izuna?\""
10051080-219 = "It's... It's..."
10051080-220 = "The president is acting weird...!"

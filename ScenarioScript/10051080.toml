[translation]
10051080-1 = "ตอนที่ 8;ในจุดของแต่ละคน"
10051080-2 = "สถานที่ถ่ายแบบแฟชั่น"
10051080-4 = "(ฮือ... นานแค่ไหนแล้วนะที่ฉันไม่ได้พักเลย...)"
10051080-5 = "(เหนื่อยจัง...)"
10051080-6 = "(การถ่ายแบบจะเสร็จเมื่อไรกันแน่นะ...)"
10051080-7 = "(แสงไฟก็แรงจนแสบผิวไปหมด... ส่วนรองเท้าส้นสูง ต่อให้สวยแค่ไหน แต่ว่าพอใส่นานๆ ก็เจ็บเท้าสุดๆ...)"
10051080-8 = "(ที่สำคัญก็คือเครื่องสำอางพวกนี้... มันหนาเกินไปจนผิวแทบหายใจไม่ออกเลย...)"
10051080-9 = "(นี่ฉัน... จะได้กลับตอนไหนนะ...?)"
10051080-17 = "โอ้ นางแบบของเราตั้งใจทำงานอยู่หรือเปล่า?"
10051080-18 = "คะ?!"
10051080-19 = "อื้อ โล่งอกไปทีนะที่ทำออกมาได้ดี"
10051080-20 = "คะ? เดี๋ยวนะคะ แบบนี้เรียกว่าทำออกมาได้ดีแล้วเหรอคะ?"
10051080-21 = "ฉันก็แค่ทำตามที่ได้รับคำสั่ง..."
10051080-22 = "ถ้าตั้งใจทำตาม ก็ถือว่าทำได้ดีแล้วละ"
10051080-23 = "ถ้าตั้งใจทำตาม..."
10051080-24 = "อะ... เอ่อ... คือว่า..."
10051080-25 = "หืม?"
10051080-26 = "ฉัน... ขอกลับแล้วได้มั้ยคะ?"
10051080-27 = "จะกลับงั้นเหรอ? กลับไปไหน?"
10051080-28 = "พูดถึงชมรมนินจาหรืออะไรนั่นหรือเปล่า? "
10051080-29 = "ค่ะ กลับชมรมวิจัยศาสตร์นินจาค่ะ..."
10051080-30 = "หมายความว่าอยากกลับไปยังที่ที่เคยอยู่สินะ"
10051080-31 = "ถ้างั้นฉันขอถามอะไรหน่อย อยู่ที่นั่นแล้วเธอได้เป็นอะไรงั้นเหรอ?"
10051080-32 = "คะ...?"
10051080-33 = "ตอนอยู่ที่นั่น เธอมีตัวตนแบบไหนกันล่ะ? มีประโยชน์อะไร? แล้วชมรมนั้นเคยให้อะไรกับเธอบ้าง?"
10051080-34 = "คะ?! ระ... เรื่องนั้น..."
10051080-38 = "ดูนี่นะ นี่คือรูปที่เธอถ่ายวันนี้"
10051080-39 = "...!"
10051080-40 = "เป็นยังไงล่ะ? ต่อให้เป็นคนที่ไม่มีรสนิยมทางศิลปะ แต่ถ้าได้เห็นรูปพวกนี้ก็น่าจะพูดเป็นเสียงเดียวกันนะ"
10051080-41 = "พูดว่างดงาม... ยังไงล่ะ"
10051080-42 = "..."
10051080-43 = "สึคุโยะ เธอคือนางแบบที่ดีที่สุดของเรานะ"
10051080-44 = "และนั่นก็คือเหตุผลที่เธอควรอยู่ตรงนี้ คุณค่าที่แท้จริงของเธอจะเปล่งประกายที่สุดที่นี่ยังไงล่ะ"
10051080-48 = "พวกฉันแค่จะย้ายชุดพวกนั้นไปในที่ที่แสดงคุณค่าที่แท้จริงของมันได้ต่างหาก!"
10051080-51 = "คุณค่า... ที่แท้จริง..."
10051080-52 = "แน่นอนว่าเธอมีสิทธิ์ในการตัดสินใจ ว่าจะเลือกอยู่แต่ในที่ที่รู้สึกสบายใจ หรือจะเลือกอยู่แต่ในที่ที่ตัวเองมีคุณค่ามากที่สุด"
10051080-53 = "ระ... เรื่องนั้น..."
10051080-54 = "อีกอย่างนะ ที่จริงตอนนี้พวกเรากำลังวางแผนจัดแฟชั่นโชว์ให้เธอเป็นนางแบบหลักด้วย"
10051080-55 = "คะ?!"
10051080-56 = "เราจะไปจัดแฟชั่นโชว์ฉลองปีใหม่ในเขตปกครองตนเองเฮียกคิยาโคกัน"
10051080-57 = "จะ... จะ... จะให้ฉันเป็นนางแบบหลักในงานที่ยิ่งใหญ่ขนาดนั้นเลยเหรอคะ?!"
10051080-58 = "แน่นอนอยู่แล้ว ไม่มีนางแบบคนไหนที่เหมาะไปกว่าเธออีกแล้วละ"
10051080-59 = "ฉันจะคิดว่าเธอรับทราบแล้วนะ งั้นฉันจะดำเนินการต่อเลย"
10051080-63 = "ดะ... เดี๋ยวก่อนค่ะ คือว่า ฉัน...!"
10051080-70 = "คุณดีไซเนอร์ครับ อาหารมาถึงแล้วครับ"
10051080-71 = "อะไรกัน เพิ่งมาเหรอ? ทำไมถึงได้ช้าแบบนี้?"
10051080-72 = "ต้องขอโทษด้วยครับ พอดีพนักงานส่งของถูกพวกปีศาจจู่โจมระหว่างทาง..."
10051080-73 = "เด็กเกเรพวกนี้... "
10051080-74 = "ว่าแต่ช่วงนี้พอฉันสั่งอะไร พนักงานส่งของก็จะโดนจู่โจมเยอะเป็นพิเศษเลยนะ?"
10051080-75 = "ครับ ผมก็รู้สึกแบบนั้นเหมือนกัน..."
10051080-76 = "ช่างเถอะ ฉันอาจจะคิดมากเกินไปก็ได้"
10051080-77 = "ว่าแต่ฉันสั่งเมนูอะไรไปนะ?"
10051080-78 = "ราเม็ง ข้าวผัด แล้วก็เกี๊ยวซ่าครับ"
10051080-79 = "เยี่ยมเลย เหนื่อยมาขนาดนี้ ต้องเติมพลังให้ท้องหน่อยแล้วละ"
10051080-85 = "อ้อ ส่วนอาหารของเธอ ฉันเตรียมไว้ให้ที่ห้องข้างๆ แล้ว"
10051080-86 = "คะ...?"
10051080-87 = "ตกใจอะไรขนาดนั้นน่ะ? ตอนนี้เธอเป็นนางแบบแล้วนะ งั้นก็ต้องใส่ใจเรื่องอาหารการกินสิ"
10051080-88 = "ฉันเตรียมราเม็งเส้นบุกศูนย์แคลอรี่กับสลัดไว้ให้แล้ว เธอไปกินของพวกนั้นนะ ไม่ต้องตามพวกฉันมา"
10051080-89 = "คะ?! ไหนเมื่อกี้ยังบอกให้ทำตามอยู่เลยล่ะคะ?!"
10051080-90 = "ฉันไม่ได้หมายความว่าให้กินอาหารตามด้วยสักหน่อย!"
10051080-91 = "กินอาหารนางแบบของเธอให้อร่อยล่ะ"
10051080-92 = "นี่ผู้จัดการ แล้วราเม็งนั่นเป็นราเม็งแบบไหนนะ?"
10051080-93 = "เป็นราเม็งแบบที่ทานเป็นประจำครับ ราเม็งเส้นเล็ก ไม่มีท็อปปิ้งมันหมู น้ำซุปแบบไม่เผ็ดครับ"
10051080-94 = "เยี่ยมเลย"
10051080-95 = "ดะ... เดี๋ยวก่อนสิคะ?!"
10051080-100 = "ห้องข้างๆ สถานที่ถ่ายทำ"
10051080-101 = "อึก..."
10051080-102 = "ทำเกินไปแล้ว... ให้กินราเม็งเส้นบุกกับสลัดเป็นอาหารเย็นแบบนี้..."
10051080-103 = "ทีตัวเองละได้กินราเม็ง ข้าวผัด ไหนจะมีเกี๊ยวซ่าด้วยอีก..."
10051080-104 = "ที่แย่ไปกว่านั้น พวกเขายังไม่คืนโทรศัพท์มือถือที่ยึดไปเลย..."
10051080-105 = "..."
10051080-106 = "อยากกิน... ราเม็งร้านประจำ..."
10051080-107 = "กับท่านหัวหน้า... อิซุนะจัง... แล้วก็คุณครูด้วย..."
10051080-108 = "เส้นใหญ่พิเศษ เพิ่มมันหมู แล้วราดน้ำมันคั่วพริกตอนท้าย... แหะๆ"
10051080-109 = "ราเม็งของนินจาต้องเป็นแบบนั้นละ..."
10051080-110 = "......"
10051080-116 = "นางแบบ... กับนินจา..."
10051080-117 = "แต่จริงๆ แล้ว... ฉันเหมาะกับการเป็นนางแบบมากกว่านินจาหรือเปล่านะ?"
10051080-118 = "การเลือกเส้นทางอาชีพนางแบบจะทำให้ฉันเป็นคนที่มีคุณค่ามากกว่าเดิมหรือเปล่า?"
10051080-119 = "แล้วตอนอยู่ในชมรมวิจัยศาสตร์นินจา... ฉันเป็นคนไม่มีคุณค่าอะไรเลยจริงๆ เหรอ?"
10051080-121 = "ฮือ... ไม่รู้เลย..."
10051080-122 = "ใครก็ได้... ช่วยบอกคำตอบกับฉันที..."
10051080-124 = "ร้านราเม็งแห่งหนึ่งในเฮียกคิยาโค"
10051080-126 = "(หลังจากถ่ายทำเสร็จในไม่กี่ชั่วโมง มิจิรุกับอิซุนะก็ไปร้านราเม็งด้วยกัน)"
10051080-130 = "ฮื้มม... กลิ่นหอมอบอวลของซุปทงคตสึ..."
10051080-131 = "ถ่ายทำเสร็จก็ต้องกินราเม็งนี่ละถึงจะถูก"
10051080-132 = "อิซุนะก็คิดเหมือนกันค่ะ!"
10051080-133 = "[s] \"วันนี้ครูเป็นเจ้ามือเอง ทุกคนกินให้อิ่มเลยนะ\""
10051080-134 = "ฮุฮุ ถ้าท่านอาจารย์ว่าอย่างนั้นละก็ วันนี้ข้าน้อยจะกินให้พุงกางไปเลย!"
10051080-135 = "โต๊ะนี้! ขอสั่งอาหาร!"
10051080-136 = "ครับ! รับอะไรดีครับ?"
10051080-137 = "อืม เอาราเม็งสี่ชาม แล้วก็เกี๊ยวซ่าจานหนึ่ง"
10051080-138 = "ราเม็งขอเป็น..."
10051080-139 = "เส้นใหญ่พิเศษ เพิ่มมันหมู แล้วราดน้ำมันคั่วพริกตอนท้าย ใช่มั้ยครับ?"
10051080-140 = "เฮือก?! รู้ได้ยังไงน่ะ?!"
10051080-141 = "ฮ่าฮ่า! ก็นินจากลุ่มนี้สั่งแบบนั้นทุกครั้งที่มาเลยนี่ครับ!"
10051080-142 = "และเพื่อขอบคุณที่ช่วยไล่ลูกค้าจอมป่วนครั้งก่อน ร้านของเราก็เลยเอาเมนูที่พวกคุณสั่งทานกัน#nเป็นประจำมาตั้งชื่อว่า <เซ็ตนินจา> แล้วขายในร้านเลยครับ!"
10051080-143 = "ไว้มาครั้งหน้า สั่งว่า <เซ็ตนินจา> ได้เลยนะครับ!"
10051080-145 = "เฮือก...!"
10051080-146 = "ในที่สุดโลกใบนี้ก็เริ่มยอมรับนินจาแล้วเหรอ...!"
10051080-147 = "ว่าแต่ แล้วนินจาอีกคนที่มาด้วยกันทุกครั้งล่ะครับ วันนี้ไม่ได้มาด้วยเหรอครับ หรือว่าจะมาสาย?"
10051080-148 = "เอ๋? หมายความว่ายังไง..."
10051080-149 = "อ้อ จริงสิ ตอนนี้สึคุโยะไม่อยู่นี่เนอะ...!"
10051080-150 = "ราเม็งสี่ชามที่สั่งไป ขอเปลี่ยนเป็นสามชามพอค่ะ!"
10051080-152 = "ครับ! รับออเดอร์ครับ!"
10051080-157 = "ข้าน้อยสั่งของสึคุโยะไปด้วยโดยไม่รู้ตัวเลยแฮะ"
10051080-158 = "อิซุนะเองก็ลืมคิดไปเลยค่ะ..."
10051080-159 = "คิดถึงสึคุโยะจัง..."
10051080-160 = "จะว่าไป เมื่อกี้อิซุนะก็ว่าจะถามอยู่พอดีเลยค่ะ หัวหน้า..."
10051080-161 = "หัวหน้าเห็นอันนี้หรือยังคะ?"
10051080-162 = "อะไรเหรอ?"
10051080-163 = "วิดีโอถ่ายแบบของท่านสึคุโยะที่เพิ่งอัปโหลดเมื่อไม่กี่นาทีก่อนค่ะ!"
10051080-164 = "...!"
10051080-165 = "ไหน? ขอดูหน่อย! "
10051080-166 = "ค่ะ!"
10051080-171 = "(แล้วคุณครู มิจิรุ และอิซุนะก็ดูวิดีโอถ่ายแบบของสึคุโยะอยู่นานสองนาน)"
10051080-173 = "..."
10051080-174 = "ว้าว... ข้าน้อยไม่คิดมาก่อนเลยว่าสึคุโยะจะกล้าหาญกับงานนางแบบขนาดนี้"
10051080-175 = "แต่เดี๋ยวก่อนนะ ยอดวิวของวิดีโอนี้..."
10051080-179 = "เดี๋ยวนะ ยอดวิวทะลุถึงขนาดนี้เลยเหรอ?!"
10051080-180 = "นี่ข้าน้อยไม่ได้นับเลขผิดใช่มั้ย?"
10051080-181 = "เพิ่งอัปโหลดได้แค่ไม่กี่นาทีเอง แต่มีคนเข้ามาดูเยอะขนาดนี้เลย?!"
10051080-182 = "วิดีโอนี้ของสึคุโยะวิดีโอเดียว มียอดวิวมากกว่าทุกวิดีโอในช่องของเรารวมกันอีกค่ะ หัวหน้า..."
10051080-183 = "..."
10051080-184 = "เหมือนเราอยู่คนละโลกกันจริงๆ นะคะ หัวหน้า..."
10051080-185 = "คนละโลกงั้นเหรอ..."
10051080-192 = "..."
10051080-193 = "นี่ อิซุนะจัง"
10051080-194 = "ค่ะ หัวหน้า?"
10051080-195 = "สึคุโยะ... คงไม่คิด... จะกลับมาหรอกใช่มั้ย?"
10051080-196 = "คะ?!"
10051080-197 = "ราเม็งที่สั่งได้แล้วครับ!"
10051080-198 = "ทานให้อร่อยนะครับ!"
10051080-202 = "<เซ็ตนินจา> มาเสิร์ฟแล้วสินะ..."
10051080-203 = "เอ่อ เมื่อกี้ที่หัวหน้าพูด..."
10051080-204 = "เอาละ มากินกันก่อน! ไม่ต้องใส่ใจที่ข้าน้อยพูดให้มากนักหรอก!"
10051080-206 = "ข้าน้อยจะกินให้อร่อยเลยละ ท่านอาจารย์!"
10051080-207 = "จะ... จะกินให้อร่อยเลยค่ะ นายท่าน!"
10051080-209 = "(แล้วคุณครูก็กินราเม็งกับทุกคน และแยกย้ายกลับกันตามปกติ)"
10051080-210 = "(แต่ไม่กี่วันหลังจากนั้น...)"
10051080-217 = "นายท่าน นายท่าน!"
10051080-218 = "[s] \"มีเรื่องอะไรเหรอ อิซุนะ?\""
10051080-219 = "คะ... คือว่า..."
10051080-220 = "ก็หัวหน้าน่ะสิคะ หัวหน้าแปลกๆ ไปค่ะ...!"

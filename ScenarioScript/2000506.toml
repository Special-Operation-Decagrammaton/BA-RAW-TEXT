[translation]
2000506-1 = "Exclusive Summer Peroro Merch!"
2000506-2 = "In Front of the Beach Shack"
2000506-3 = "Hifumi and I are just leaving the Beach Shack after a satisfying meal."
2000506-4 = "Wow, that was so good!"
2000506-5 = "I thought it would be just like any other yakisoba, but it was so much better than the stuff you can get around school."
2000506-6 = "I wonder if this shop's sauce has some sort of secret recipe."
2000506-7 = "[s] \"Maybe it tasted better because we were eating by the beach?\""
2000506-8 = "Maybe. I guess anything would taste better when you're in a good mood."
2000506-9 = "Maybe that yakisoba is like a special summer tradition that can only really be enjoyed during this time of year."
2000506-10 = "So where should we head next now that our bellies are full?"
2000506-11 = "Do you still have room for dessert?"
2000506-12 = "Hello, miss! How about some Morimorikun popsicles for dessert after your meal?"
2000506-13 = "If you buy now, you'll have a chance to win a Momo Friends' Peroro plush in a drawing!"
2000506-14 = "D-Did you say Peroro plush?!"
2000506-15 = "It's a limited-edition collaboration design... I must have it!"
2000506-16 = "[s] \"I dunno. The design looks a little suspect...\""
2000506-17 = "On the contrary. Low-cost collaboration merchandise is always made in small volumes and sells out quickly. That gives it much higher value among enthusiasts."
2000506-19 = "We must make these popsicles our dessert for today, Sensei!"
2000506-20 = "[s1] \"A single popsicle, sure...\"\n[s2] \"All right. I'm buying.\""
2000506-21 = "Two soda-flavored Morimorikun please!"
2000506-22 = "Two soda-flavored Morimorikun please!"
2000506-23 = "Sure thing!"
2000506-26 = "It's so sweet and refreshing..."
2000506-27 = "Event or not, nothing beats a popsicle on the beach."
2000506-28 = "All right, let's check the text on the sticks now that we're done with them."
2000506-31 = "Congratulations! You've won two free Morimorikun popsicles!"
2000506-32 = "Huh? More popsicles?"
2000506-33 = "That's right. You have a 50 percent chance of winning another popsicle or the Peroro plush."
2000506-34 = "Naturally, the free popsicles are also eligible to be winners, so if you don't win the Peroro plush, you can keep trying!"
2000506-35 = "Oh, okay. I'll try again, then!"
2000506-37 = "Think you have room for another popsicle, Sensei?"
2000506-38 = "[s] \"Yeah, I think I can do one more...\""
2000506-41 = "Here goes nothing!"
2000506-44 = "But we still didn't win the Peroro plush."
2000506-46 = "C-Congratulations. You've won two more Morimorikun popsicles..."
2000506-47 = "How is this happening? This is already my tenth one. Why haven't I won yet?"
2000506-48 = "And now I have a brain freeze from eating so many popsicles..."
2000506-49 = "[s3] \"My head hurts...\"\n[s4] \"My stomach is a block of ice.\""
2000506-50 = "It's so strange. The chances of winning extra ice candies and winning the Peroro doll should be the same..."
2000506-51 = "It's so strange. The chances of winning extra ice candies and winning the Peroro doll should be the same..."
2000506-53 = "(Uh, miss. I can just give you a Peroro plush later, so don't force yourself to continue this challenge.)"
2000506-54 = "No way! I made a promise to Peroro!"
2000506-55 = "I would never be able to look that plush in the eye if I didn't win it fair and square!"
2000506-57 = "You can fit just one more popsicle...right, Sensei?"
2000506-58 = "[s] \"I'll try.\""
2000506-59 = "Yes..."
2000506-61 = "Here we go!"
2000506-65 = "C-Congratulations! You've won the limited-edition Peroro plush!"
2000506-66 = "We did it! We finally did it!"
2000506-67 = "I couldn't have done it without you eating all those popsicles, Sensei. Thanks for everything."
2000506-68 = "Wait a minute. Why does it suddenly feel like everything is spinning? I feel so dizzy..."
2000506-72 = "A-Are you okay, miss?! Please try to get ahold of yourself!"
2000506-73 = "You must have gotten a dizzy spell from eating so much cold food. We need to get you to a doctor."
2000506-74 = "[s] \"Make that two doctors.\""
2000506-79 = "You too?!"
2000506-80 = "Please stay with me! It's going to be all right!"
2000506-82 = "..."
2000506-83 = "The Peroro plush was secure at last, but I would need to have my stomach pumped and would be in bed for three whole days."

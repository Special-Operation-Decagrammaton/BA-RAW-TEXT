2000506-72 = "2;이벤트 점원;04;어, 어라? 손님! 정신 차리세요!\n#2;ar\n#2;hophop"
2000506-73 = "2;이벤트 점원;07;차가운 걸 너무 많이 드셔서 현기증이 나셨나 보네요. 빨리 의무실로 옮겨야…….\n#2;stiff\n#2;em;[땀]"

2000506-45 = "#all;hide"
2000506-46 = "3;이벤트 점원;04;추, 축하드립니다. 모리모리군 아이스 캔디 2개 추가 증정을…….\n#3;em;[땀]\n#3;stiff\n#3;a"
2000506-47 = "3;히후미 수영복ND;07;어째서…… 벌써 10개째인데…… 어째서 당첨이 되질 않는 거죠……."
2000506-48 = "3;히후미 수영복ND;10;게다가 아이스크림을 너무 먹었더니 머리가 아파요…….\n#3;em;[속상함]\n#3;stiff"
2000506-49 = "[s3] \"나도 머리가 아파…….\"\n[s4] \"뱃속이 차가워…….\""
2000506-50 = "3;이벤트 점원;09;이상하네요. 아이스 캔디 추가 증정과 페로로 인형 증정의 확률은 동일할텐데……."
2000506-51 = "3;이벤트 점원;09;이상하네요. 아이스 캔디 추가 증정과 페로로 인형 증정의 확률은 동일할텐데……."
2000506-52 = "5;히후미 수영복ND;10\n3;이벤트 점원;01\n#3;m1\n#5;al"
2000506-53 = "3;이벤트 점원;04;(소근) 저, 손님. 괜찮으시다면 제가 따로 페로로 인형을 챙겨드릴 테니 도전은 이만 포기하시는 게…….\n#3;em;…\n#fontsize;50"
2000506-54 = "5;히후미 수영복ND;06;그건 안 돼요! 이건 페로로 님과의 약속이나 다름없다고요!\n#5;hophop\n#fontsize;90"
2000506-55 = "5;히후미 수영복ND;05;부정한 방법으로 인형을 얻을 수 있는 방법이 있다고 하더라도…… 정정당당하게 도전하지 않으면 페로로 님을 볼 면목이 없어요!\n#5;em;[!]"
2000506-56 = "5;히후미 수영복ND;05\n#5;m3\n#3;dl\n#wait;1500"
2000506-57 = "5;히후미 수영복ND;04;선생님, 아이스 캔디 하나 더…… 괜찮으시죠?\n#5;em;…\n#5;stiff"
2000506-58 = "[s] \"……해보겠습니다.\""
2000506-59 = "5;히후미 수영복ND;05;그럼……"
2000506-60 = "#all;hide"
2000506-61 = "3;히후미 수영복ND;06;갑니다!\n#3;em;[!]\n#3;closeup"
2000506-62 = "#wait;100"
2000506-63 = "#all;hide"
2000506-64 = "#wait;1500"
2000506-65 = "3;이벤트 점원;03;추, 축하합니다! 한정 콜라보 페로로 인형, 당첨입니다!\n#3;em;[반짝]\n#3;closeup\n#3;a\n#3;greeting"
2000506-66 = "3;히후미 수영복ND;03;만세! 마침내 해냈어요!\n#3;hophop\n#3;em;[반짝]"
2000506-67 = "3;히후미 수영복ND;00;선생님이 같이 아이스크림을 드셔주신 덕분이에요. 감사합니다, 에헤헤……."
2000506-68 = "3;히후미 수영복ND;09;……어라? 어쩐지 갑자기 눈 앞이 어지럽고, 머리가 멍한 게…… 현기증이……\n#3;stiff"

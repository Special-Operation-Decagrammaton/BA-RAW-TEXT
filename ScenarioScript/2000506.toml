[translation]
2000506-1 = "夏季限定的佩洛洛大人周邊"
2000506-2 = "海之家"
2000506-3 = "（和日步美一起享用了各種美食）"
2000506-4 = "吃得好飽喔～"
2000506-5 = "明明看起來是很一般的炒麵，卻比平常吃到的還要好吃呢……！"
2000506-6 = "難道這間店的醬料，和平常吃的店家不一樣嗎？"
2000506-7 = "[s] 「在海邊吃東西就是會覺得特別好吃呢。就像去祭典一樣。」"
2000506-8 = "確實，或許是因為快樂的心情，而讓食物變得更美味了。"
2000506-9 = "但我也非常喜歡這些，真的很好吃的當季產品。"
2000506-10 = "好了，接下來要做什麼呢？"
2000506-11 = "要不要找個甜點之類的……"
2000506-12 = "那位同學！想吃飯後甜點，要不要選擇我們「咯哩咯哩君」的冰棒呢？"
2000506-13 = "現在購買「咯哩咯哩君」的冰棒，#n就有機會獲得Momo好友人氣角色「佩洛洛」的玩偶哦！"
2000506-14 = "佩，佩洛洛大人的玩偶！？"
2000506-15 = "而且是限定設計款……！我一定要拿到！"
2000506-16 = "[s] 「這設計一如既往的驚人……」"
2000506-17 = "這類聯名商品可不是隨時都能買到的，對部分狂熱粉絲來說，可能還比一般商品更有價值……！"
2000506-19 = "老師，飯後甜點就吃這個冰棒吧！"
2000506-20 = "[s1] 「好呀，而且看起來不錯吃。」\n[s2] 「那就買兩個。」"
2000506-21 = "請給我「咯哩咯哩君」蘇打口味兩個！"
2000506-22 = "請給我「咯哩咯哩君」蘇打口味兩個！"
2000506-23 = "好的，謝謝惠顧！"
2000506-26 = "唔～～嗯……！好甜好冰涼，真好吃！"
2000506-27 = "夏天在海邊吃的冰棒特別有風味呢。"
2000506-28 = "好了，中獎結果應該是要依據木片上寫的內容對吧……？"
2000506-31 = "恭喜抽到特別獎！可以額外獲得「咯哩咯哩君」冰棒！"
2000506-32 = "咦？可以再拿一支冰棒嗎……？"
2000506-33 = "是。本次抽獎活動沒有「摃龜」，有50%的機率能獲得「佩洛洛玩偶」，或是「再一支咯哩咯哩君冰棒」。"
2000506-34 = "當然，贈送的冰棒上也會寫有中獎內容，敬請享用！"
2000506-35 = "原來如此……那我要再挑戰一次！"
2000506-37 = "老師，還吃得下去嗎……？"
2000506-38 = "[s] 「應該還沒問題……」"
2000506-41 = "這次一定要抽到……！"
2000506-44 = "（……然而，之後也一直沒抽中佩洛洛玩偶）"
2000506-46 = "恭，恭喜！抽到特別獎，額外獲得「咯哩咯哩君」冰棒……"
2000506-47 = "為什麼……已經是第10支了……為什麼都沒抽中呢……？"
2000506-48 = "而且吃了太多冰棒，頭開始痛起來了……"
2000506-49 = "[s3] 「我的頭也好痛……」\n[s4] 「肚子好冰……」"
2000506-50 = "真，真奇怪。機率基本上就是二分之一，其他客人也沒有抽歪到這種程度啊……"
2000506-51 = "真，真奇怪。機率基本上就是二分之一，其他客人也沒有抽歪到這種程度啊……"
2000506-53 = "（竊竊私語）那個，客人……如果不介意的話，我私下送您佩洛洛玩偶，您就別再勉強了……"
2000506-54 = "謝謝您的好意……但不行！#n要是在這裡放棄，會讓佩洛洛大人傷心的！"
2000506-55 = "若不能堂堂正正面對挑戰……我就沒有臉見佩洛洛大人了！"
2000506-57 = "老師，你還可以嗎……？"
2000506-58 = "[s] 「……我努力。」"
2000506-59 = "……"
2000506-61 = "這次一定……！"
2000506-65 = "恭，恭喜客人！終於抽到了聯名限定版佩洛洛玩偶……！"
2000506-66 = "終於成功了……！"
2000506-67 = "這都要多虧老師，謝謝老師……！嘿嘿嘿，太好了……！"
2000506-68 = "……哎，哎呀？突然覺得好暈喔……？"
2000506-72 = "客，客人！？您還好吧！？"
2000506-73 = "快，快去醫務室……！"
2000506-74 = "[s] 「不好意思……我的學生，就拜託你了……」"
2000506-79 = "嗚，嗚哇？連這位客人也……！？"
2000506-80 = "兩位振作一點，客人！客人！！"
2000506-82 = "…………"
2000506-83 = "（之後雖然持續腹痛了一段時間，但至少日步美的表情看起來非常開心）"

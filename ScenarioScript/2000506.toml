[translation]
2000506-1 = "#title;여름 한정 페로로 굿즈!"
2000506-2 = "#place;바다의 집 앞"
2000506-3 = "#na;(히후미와 바다의 집에서 만족스러운 식사를 하고 나왔다.)"
2000506-4 = "3;히후미 수영복ND;03;아아, 정말 맛있었어요~.\n#3;a\n#3;em;[반짝]\n#3;hophop"
2000506-5 = "3;히후미 수영복ND;00;보기에는 평범한 야키소바처럼 보였는데…… 학교 근처에서 먹는 것보다 훨씬 맛있었어요!"
2000506-6 = "3;히후미 수영복ND;02;뭔가 이 가게만의 특별 비법 소스라도 있는 걸까요?\n#3;em;[?]"
2000506-7 = "[s] \"해변에서 먹으니 더 맛있게 느껴졌던 게 아닐까?\""
2000506-8 = "3;히후미 수영복ND;99;……그렇네요. 즐거운 기분에 취한 채로 먹으면 뭐든지 맛있게 느껴지니까요."
2000506-9 = "3;히후미 수영복ND;00;이 특제 야키소바도 이 시기에만 즐길 수 있는 여름의 풍물시일지도 모르겠네요~."
2000506-10 = "3;히후미 수영복ND;02;배불리 식사도 마쳤으니, 다음에는 어디로 갈까요?\n#3;em;[반응]"
2000506-11 = "3;히후미 수영복ND;01;뭔가 달콤한 디저트를 먹을 만한 장소가……."
2000506-12 = "1;이벤트 점원;01;거기 학생 여러분! 식후 디저트로 저희 <모리모리군>의 아이스 캔디는 어떠신가요?\n#3;m5\n#1;ar\n#1;em;[반응]"
2000506-13 = "1;이벤트 점원;03;지금 모리모리군의 아이스 캔디를 구매하시면 추첨을 통해 모모프렌즈의 인기 캐릭터, '페로로' 인형을 증정해드리고 있답니다!\n#1;em;[반짝]\n#1;greeting"
2000506-14 = "3;히후미 수영복ND;06;페, 페로로 님의 인형이요?!\n#3;shake\n#3;em;[?!]"
2000506-15 = "3;히후미 수영복ND;05;심지어 콜라보 전용의 한정 디자인이라니…… 이건 꼭 구해야해요!"
2000506-16 = "[s] \"뭔가 디자인이 조악해보이는데…….\""
2000506-17 = "3;히후미 수영복ND;06;아뇨. 오히려 이런 저가 콜라보 제품들은 일찍 소진되기 때문에 매니아들에게는 정식 제품들보다 훨씬 높은 가치가 있어요.\n#3;em;[반응]"
2000506-18 = "#all;hide"
2000506-19 = "3;히후미 수영복ND;05;선생님, 오늘 식후 디저트는 이 아이스 캔디로 하죠!\n#3;em;[!]\n#3;closeup"
2000506-20 = "[s1] \"아이스 캔디 한 개 정도라면…….\"\n[s2] \"좋아. 내가 살게.\""
2000506-21 = "#3;hide\n1;이벤트 점원;01\n5;히후미 수영복ND;03;<모리모리군> 소다 맛 두 개 주세요!\n#5;em;[반짝]"
2000506-22 = "#3;hide\n1;이벤트 점원;01\n5;히후미 수영복ND;03;<모리모리군> 소다 맛 두 개 주세요!\n#5;em;[반짝]"
2000506-23 = "1;이벤트 점원;03;네, 감사합니다!"
2000506-24 = "#wait;150"
2000506-25 = "#all;hide"
2000506-26 = "3;히후미 수영복ND;03;음~ 달고 시원해~.\n#3;a\n#3;em;[음표]"
2000506-27 = "3;히후미 수영복ND;00;꼭 이벤트가 아니더라도 여름 해변에서 먹는 아이스 캔디의 맛은 각별하네요."
2000506-28 = "3;히후미 수영복ND;01;자. 그럼 아이스 캔디도 다 먹었으니, 막대에 적혀있는 추첨 문구를 한 번 확인해 볼까요……."
2000506-29 = "#st;[0,0];instant;1;"
2000506-30 = "#clearST\n#wait;1500"
2000506-31 = "1;이벤트 점원;03;축하합니다! 모리모리군 아이스 캔디 2개 추가 증정에 당첨되셨습니다!\n#3;m5\n#1;ar\n#1;em;[반짝]"
2000506-32 = "3;히후미 수영복ND;02;네? 추가 아이스 캔디요?\n#3;em;[?]"
2000506-33 = "1;이벤트 점원;01;네. 이번 추첨 이벤트에서는 50%의 확률로 페로로 인형 대신 추가 아이스 캔디를 증정하고 있습니다.\n#1;greeting"
2000506-34 = "1;이벤트 점원;08;물론 증정된 아이스 캔디에도 추첨 문구는 적혀 있으니, 페로로 인형을 얻고 싶으시다면 계속 도전해 주세요!"
2000506-35 = "3;히후미 수영복ND;06;……그럼 어쩔 수 없죠. 다시 재도전이에요!\n#3;em;[반응]"
2000506-36 = "3;히후미 수영복ND;05\n#3;m3\n#1;dl\n#wait;1000"
2000506-37 = "3;히후미 수영복ND;02;선생님, 아이스 캔디 한 개 더…… 괜찮으신가요?\n#3;em;[?]"
2000506-38 = "[s] \"두 개까지는 괜찮을 것 같아…….\""
2000506-39 = "#st;[0,0];instant;1;"
2000506-40 = "#clearST\n3;히후미 수영복ND;03\n#3;em;[반짝]\n#wait;1500"
2000506-41 = "3;히후미 수영복ND;06;그럼…… 갑니다!\n#3;em;[!]\n#3;closeup"

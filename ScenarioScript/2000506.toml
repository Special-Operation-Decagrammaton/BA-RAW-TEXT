[translation]
2000506-1 = "ของสะสมเพโรโร่ลิมิเต็ดเอดิชั่นประจำฤดูร้อน!"
2000506-2 = "ณ หน้าร้านริมทะเล"
2000506-3 = "(คุณครูออกมาหน้าร้านหลังจากทานอาหารในร้านริมทะเลกับฮิฟุมิอย่างเอร็ดอร่อย)"
2000506-4 = "อ่า เมื่อกี๊นี้มันอร่อยสุดยอดไปเลยล่ะค่ะ~"
2000506-5 = "ถึงจะดูเหมือนยากิโซบะธรรมดาๆ แต่ว่ามันอร่อยมากกว่าเจ้าที่เคยกินหน้าโรงเรียนอีกค่ะ"
2000506-6 = "หรือว่าร้านนี้จะมีซอสสูตรเด็ดที่เป็นความลับของความอร่อยกันนะคะ?"
2000506-7 = "[s] \"เราแค่รู้สึกว่าอร่อยเพราะได้กินที่ชายหาดหรือเปล่า?\""
2000506-8 = "สงสัยจะอย่างนั้นค่ะ... เวลาที่อารมณ์ดี ไม่ว่าจะกินอะไรก็อร่อยไปหมดเลยละค่ะ"
2000506-9 = "แต่ยากิโซบะจานพิเศษนี้อาจจะเป็นของขึ้นชื่อที่หาทานได้ในช่วงฤดูร้อนเท่านั้นก็ได้นะคะ~"
2000506-10 = "เรากินกันอิ่มแล้ว ต่อไปไปไหนกันดีล่ะคะ?"
2000506-11 = "มีที่ไหนขายของหวานอร่อยๆ มั้ยนะ..."
2000506-12 = "นักเรียนที่อยู่ตรงนั้นน่ะ! ลองทานไอติมแท่ง <โมริโมริคุง> เป็นของหวานดูมั้ยล่ะครับ?"
2000506-13 = "ถ้าซื้อไอติมแท่งโมริโมริคุงตอนนี้ จะได้สิทธิ์ชิงโชคตุ๊กตาเพโรโร่ที่เป็นตัวละครฮิต#nจาก MOMO FRIENDS ด้วยนะครับ!"
2000506-14 = "ตะ... ตุ๊กตาเพโรโร่เหรอคะ?!"
2000506-15 = "แถมยังเป็นของลิมิเต็ดเอดิชั่นด้วยอีก... ของมันต้องมีแล้วค่ะ!"
2000506-16 = "[s] \"แต่มันดู... ไม่มีคุณภาพเลยนะ...\""
2000506-17 = "ไม่หรอกค่ะคุณครู สินค้าคอลแลปส์แบบนี้จะขายหมดก่อนทุกทีค่ะ#nสำหรับแฟนคลับอย่างฉัน มันถือว่าเป็นของที่มีคุณค่ามากเลยค่ะ"
2000506-19 = "คุณครูคะ ของหวานวันนี้ฉันต้องขอเป็นไอติมแท่งแล้วละค่ะ!"
2000506-20 = "[s1] \"ไอติมหนึ่งแท่งครูให้ได้อยู่แล้ว...\"\n[s2] \"เอาสิ เดี๋ยวครูเลี้ยงเอง\""
2000506-21 = "ขอโมริโมริคุง รสโซดาสองแท่งค่ะ!"
2000506-22 = "ขอโมริโมริคุง รสโซดาสองแท่งค่ะ!"
2000506-23 = "ครับผม ขอบคุณมากเลยครับ!"
2000506-26 = "อื้ม~ ทั้งหวานทั้งเย็นเลย~"
2000506-27 = "ได้มากินไอติมแท่งที่ชายหาดแบบนี้มันพิเศษจังเลยนะคะ ถึงจะไม่มีกิจกรรมแบบนี้ก็ไม่เป็นไรเลยค่ะ"
2000506-28 = "เอาล่ะ ในเมื่อเรากินไอติมแท่งกันหมดแล้ว ทีนี้มาลุ้นข้อความที่อยู่บนแท่งไอติมกันเถอะค่ะ"
2000506-31 = "ยินดีด้วยครับ! ได้รางวัลไอติมโมริโมริคุงสองแท่งครับผม!"
2000506-32 = "คะ? ได้ไอติมแท่งเพิ่มเหรอคะ?"
2000506-33 = "ใช่ครับ กิจกรรมนี้มีโอกาส 50% ที่จะได้ไอติมแท่งแทนตุ๊กตาเพโรโร่ครับ"
2000506-34 = "แต่ไอติมแท่งที่แจกก็มีข้อความที่ไม้เหมือนกัน เพราะฉะนั้นจะกินแล้วลุ้นอีกรอบก็ได้นะครับ!"
2000506-35 = "งั้นก็ไม่มีทางเลือกอื่น... ขอลุ้นอีกรอบแล้วกันค่ะ!"
2000506-37 = "คุณครูคะ อีกแท่ง... ไหวมั้ยคะ?"
2000506-38 = "[s] \"ถ้าแค่สองแท่ง... ก็น่าจะได้นะ\""
2000506-41 = "ถ้างั้นก็... ลุยเลยค่า!"
2000506-44 = "(ถึงจะลุ้นจากไม้อื่นเพิ่ม แต่ตุ๊กตาเพโรโร่ก็ยังไม่ออกสักที)"
2000506-46 = "ยะ... ยินดีด้วยครับ ได้รางวัลไอติมโมริโมริคุง... อีก 2 แท่ง..."
2000506-47 = "นี่พวกเรากินไป 10 แท่งแล้วนะคะ ทำไมยังไม่ได้รางวัลสักทีล่ะคะ?"
2000506-48 = "อีกอย่าง ฉันกินไปเยอะจนเย็นขึ้นสมองหมดแล้วด้วยค่ะ..."
2000506-49 = "[s3] \"ครูก็เหมือนกัน...\"\n[s4] \"รู้สึกว่าท้องเย็นหมดแล้ว...\""
2000506-50 = "แปลกจังเลยครับ ทั้งไอติมและตุ๊กตาเพโรโร่ก็มีเรทออกเท่ากันนี่นา..."
2000506-51 = "แปลกจังเลยครับ ทั้งไอติมและตุ๊กตาเพโรโร่ก็มีเรทออกเท่ากันนี่นา..."
2000506-53 = "เอ่อ... คุณลูกค้า... เดี๋ยวผมจะให้รางวัลตุ๊กตาเพโรโร่เอง เลิกลุ้นกับไม้ใหม่ได้แล้วล่ะ..."
2000506-54 = "แบบนั้นไม่ได้เด็ดขาดค่ะ ฉันสัญญากับท่านเพโรโร่ไว้แล้วค่ะ!"
2000506-55 = "ถึงจะมีวิธีสกปรกที่ทำให้ได้ตุ๊กตามาก็เถอะ แต่ถ้าฉันไม่พยายามอย่างยุติธรรม ฉันก็คงไม่มีหน้าไปเจอ#nท่านเพโรโร่หรอกค่ะ!"
2000506-57 = "คุณครูคะ อีกแท่งนึง... ไหวใช่มั้ยคะ?"
2000506-58 = "[s] \"ก็ได้...\""
2000506-59 = "ถ้างั้นก็..."
2000506-61 = "ลุยล่ะนะคะ!"
2000506-65 = "ยะ... ยินดีด้วยครับ! ได้ตุ๊กตาคอลแลปส์ เพโรโร่ลิมิเต็ดเอดิชั่นครับ!"
2000506-66 = "เย้! ทำได้แล้วล่ะค่ะ!"
2000506-67 = "ต้องเป็นเพราะคุณครูมาช่วยกินแน่ๆ เลยค่ะ ขอบคุณนะคะ อ่าแหะๆๆ..."
2000506-68 = "เอ๋? ทำไมจู่ๆ ก็ตาพร่าๆ แล้วก็... เวียนหัว..."
2000506-72 = "เอะ.. เอ๋? คุณลูกค้า! ทำใจดีๆ ไว้ครับ!"
2000506-73 = "น่าจะเวียนหัวเพราะกินของเย็นเยอะเกินไปน่ะครับ ต้องรีบไปห้องปฐมพยาบาล..."
2000506-74 = "[s] \"ทางนี้ก็ไม่ไหวแล้ว...\""
2000506-79 = "หา? ทางนี้ก็ด้วยเหรอ?!"
2000506-80 = "ทั้งคู่ทำใจดีๆ เอาไว้นะครับ! คุณลูกค้า!!"
2000506-82 = "......"
2000506-83 = "(ถึงจะได้ตุ๊กตาเพโรโร่กลับมา แต่ก็ท้องเสียอยู่ถึง 4 วันเต็ม)"

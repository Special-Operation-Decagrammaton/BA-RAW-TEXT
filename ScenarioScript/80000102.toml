80000102-28 = "1;모미지;07;아, 이건……! 축하드려요, 선생님!\n#1;em;[반응]\n#1;a"
80000102-29 = "1;모미지;07;주인공 모양의 열쇠고리와 초콜릿을 함께 주는 당첨 상품이네요!"
80000102-30 = "1;모미지;03;헤헤. 선생님도 운이 정말 좋으시네요. 아뇨. 처음에 이 만화책을 산 건 저니까, 저 역시 운이 좋은 걸지도요?\n#1;em;[음표]\n#1;m3"
80000102-31 = "1;모미지;02;네? 이건 제가 사 온 책에서 나온 거니까…… 제게 돌려주고 싶으시다고요?"
80000102-32 = "1;모미지;04;아, 안 돼요! 그래도 그건 선생님 거예요! 돌려주지 않으셔도 괜찮아요! 오히려 받아 주세요!\n#1;em;[!]\n#1;jump"
80000102-33 = "1;모미지;04;왜, 왜 그렇게 당황하느냐고요? 그건, 그러니까……"
80000102-34 = "1;모미지;05;아무튼! 선생님이 받아 주세요! 꼭이에요?\n#1;hophop"

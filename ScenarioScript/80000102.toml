80000102-66 = "1;모미지;03;애초에 책상 위가 지금처럼 너무 휑하기만 하면, 정서에도 안 좋고, 일하는 데 효율도 안 좋을 거고…… 아무튼 좋지 않으니까요! 네!\n#1;hophop"

[translation]
80000102-1 = "想一起做的事"
80000102-2 = "（等待著突然說要來夏萊的紅葉……）"
80000102-3 = "老師！讓你久等了嗎？#n真對不起……"
80000102-4 = "你說沒關係？#n我，我知道老師當然會這麼說……"
80000102-5 = "咦？你說我比約好的時間提早了20分鐘？"
80000102-6 = "真的耶……這，這樣好像反而有點抱歉，怎麼辦……？"
80000102-7 = "[s1]「你先冷靜點，紅葉。」\n[s2]「所以……找我有什麼事嗎？」"
80000102-10 = "啊，是的！就是啊，這次……我好不容易將特別復刻的漫畫書弄到手了！"
80000102-11 = "這是一部以巧克力甜點師為題材的浪漫漫畫……最近讓我非常著迷。"
80000102-12 = "嘿嘿……雖然不太容易，但我還是把收集3冊的目標達成了。"
80000102-13 = "咦？你說看起來不是1、2、3冊，而是3本一樣的書？"
80000102-14 = "那是當然的呀！#n一本是收藏用，一本是觀賞用……最後一本是用來傳教的！"
80000102-15 = "啊，可不能把收藏用那本的塑膠封膜撕掉哦？那是很重要的。"
80000102-16 = "請老師先讀這本傳教用的書！"
80000102-17 = "[s]「呃，嗯。謝謝……？」"
80000102-21 = "（從帶著開朗笑容遞出漫畫的紅葉手中接過了書，並將其翻開……）"
80000102-22 = "（就在這時……！）"
80000102-27 = "[ns]「咦？」"
80000102-28 = "啊，這是……！恭喜你，老師！"
80000102-29 = "這是附贈以主角為概念設計的鑰匙圈，以及巧克力的中獎獎品！"
80000102-30 = "嘿嘿，老師的運氣真好呢。#n不，一開始買這本漫畫的人是我，說不定運氣好的人是我哦？"
80000102-31 = "咦？因為這本書是我買的……所以要還給我？"
80000102-32 = "不，不行！這還是屬於老師的東西！不用還給我沒關係！請收下吧！"
80000102-33 = "問，問我為什麼那麼慌張？#n那個，就是……"
80000102-34 = "總之請老師收下吧！一定要收下哦？"
80000102-35 = "[s]「嗯，嗯。我知道了……」"
80000102-36 = "……"
80000102-37 = "太好了……"
80000102-38 = "那我也來讀一下觀賞用的這本吧……？"
80000102-42 = "（就在紅葉以莫名高興的表情，翻開「觀賞用」的漫畫時……）"
80000102-47 = "……"
80000102-48 = "[s]「……？」"
80000102-49 = "咦，咦咦咦咦！這，這個是……老師！那個……"
80000102-50 = "我，我絕對沒有想跟老師湊成套的意思！#n硬要說的話……硬要說的話！"
80000102-51 = "嗚咦咦咦……該怎麼解釋才好……就是……！"
80000102-52 = "[s]「太好了，紅葉。」"
80000102-53 = "什，什麼……？"
80000102-54 = "[s]「這樣紅葉也得到中獎獎品了，不是嗎？」"
80000102-55 = "……"
80000102-56 = "嗯，確實是這樣呢。"
80000102-57 = "嘿嘿……耶嘿嘿……"
80000102-58 = "……"
80000102-59 = "那個，老師。"
80000102-60 = "既然這樣，我可以用這個鑰匙圈……來裝飾老師的書桌嗎？"
80000102-61 = "那，那個，可以的話……跟老師的靠在一起。"
80000102-62 = "[s]「嗯？感覺不錯耶？」"
80000102-63 = "真，真的嗎！？老師喜歡嗎？"
80000102-64 = "啊……是因為書桌上的小裝飾增加了吧……？"
80000102-65 = "嗯！一定是這樣沒錯！！"
80000102-66 = "如果書桌上太過空曠的話，#n不只會影響情緒，還會降低做事的效率……總之就是不太好！嗯！"
80000102-67 = "……"
80000102-68 = "那麼，老師。#n鑰匙圈就先留在老師這邊……"
80000102-69 = "至於巧克力……放著也可惜，要不要一起吃呢？"
80000102-70 = "[s]「嗯，一起吃吧。」"
80000102-71 = "……！"
80000102-72 = "嗯，一起吃吧！"
80000102-73 = "漫畫也要一起看？#n真的……真的可以一起看嗎？確定可以嗎！？"
80000102-74 = "耶嘿嘿……今天來夏萊真是來對了。"
80000102-76 = "（於是便跟莫名高興的紅葉一起讀著漫畫，享用了巧克力）"

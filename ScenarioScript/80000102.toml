[translation]
80000102-1 = "#title;함께하고 싶은 것"
80000102-2 = "#na;(갑자기 샬레로 찾아오겠다고 연락한 모미지를 기다리고 있었다……)"
80000102-3 = "3;모미지;06;선생님! 오래 기다리셨나요? 죄송해요……\n#3;a\n#3;em;[!]"
80000102-4 = "3;모미지;02;괜찮으시다고요? 무, 물론 선생님은 그렇게 말씀하실 것 같긴 했지만요……\n#3;stiff"
80000102-5 = "3;모미지;04;네? 제가 약속 시간보다 20분이나 먼저 도착했다고요?\n#3;em;[땀]"
80000102-6 = "3;모미지;06;정말이네…… 오, 오히려 다른 의미로 죄송한 일을 해 버린 것 같은데, 어쩌죠……?"
80000102-7 = "[s1] \"일단 진정해, 모미지.\"\n[s2] \"그래서…… 무슨 일이야?\""
80000102-8 = "#wait;10"
80000102-9 = "#wait;10"
80000102-10 = "3;모미지;02;아, 네! 그게요. 이번에…… 특별 복간하는 만화책을 간신히 손에 넣었거든요!\n#3;em;[반응]"
80000102-11 = "3;모미지;07;초콜릿 파티쉐를 소재로 한 로맨스 만화인데…… 요즘 제가 완전히 빠져 있거든요."
80000102-12 = "3;모미지;03;헤헤…… 쉽지는 않았지만, 무사히 목표로 했던 세 권을 전부 구했어요.\n#3;em;[음표]"
80000102-13 = "3;모미지;02;네? 1, 2, 3권이 아니라 똑같은 책이 세 권 있는 것처럼 보이신다고요?"
80000102-14 = "3;모미지;05;그거야 당연하죠! 하나는 소장용, 하나는 감상용…… 마지막 하나는 포교용이니까요!"
80000102-15 = "3;모미지;02;아, 소장용은 비닐 뜯으시면 안 돼요? 중요한 거니까요.\n#3;em;[반응]"
80000102-16 = "3;모미지;03;선생님께는 여기, 포교용 책을 먼저 읽게 해 드릴게요!"
80000102-17 = "[s] \"으, 응. 고마워……?\""

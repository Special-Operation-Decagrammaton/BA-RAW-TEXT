80000102-19 = "#clearST"
80000102-20 = "3;모미지;03\n#3;greeting\n#wait;1500"
80000102-21 = "#na;(해맑게 웃으며 만화책을 내미는 모미지로부터, 책을 받아 펼쳤다……)"

[translation]
80000102-1 = "สิ่งที่อยากทำด้วยกัน"
80000102-2 = "(คุณครูกำลังรอโมมิจิอยู่ หลังได้รับข้อความติดต่อว่าจะมาหาที่ชาเล่ต์อย่างกะทันหัน...)"
80000102-3 = "คุณครู! รอนานรึเปล่าคะ? ขอโทษด้วยค่ะ..."
80000102-4 = "มะ... ไม่เป็นไรใช่ไหมคะ? ถะ... ถึงคุณครูคงจะบอกว่าไม่เป็นไรแน่ๆ ก็เถอะค่ะ"
80000102-5 = "คะ? ฉันมาถึงก่อนเวลานัด 20 นาทีงั้นเหรอคะ?"
80000102-6 = "จริงด้วยค่ะ... ดะ... ดันขอโทษเรื่องที่ไม่ได้ทำไปซะแล้ว ทำยังไงดีคะ...?"
80000102-7 = "[s1] \"ใจเย็นๆ ก่อนนะ โมมิจิ\"\n[s2] \"แล้ว... มาหาครูมีอะไรเหรอ?\""
80000102-10 = "อ้อ จริงด้วยค่ะ! ฉันได้หนังสือการ์ตูนเล่มพิเศษฉบับตีพิมพ์ซ้ำมาแล้วค่ะ!"
80000102-11 = "มันเป็นการ์ตูนโรแมนติกเกี่ยวกับเชฟทำช็อกโกแลต... ช่วงนี้ฉันติดงอมแงมเลยค่ะ"
80000102-12 = "แหะๆ... ถึงจะลำบากอยู่นิดหน่อย แต่ก็หามาได้ครบ 3 เล่มตามที่ตั้งใจไว้เลยค่ะ "
80000102-13 = "คะ? ดูเหมือนจะเป็นเล่มเดียวกัน 3 เล่มมากกว่าเล่ม 1-3 เลยงั้นเหรอคะ?"
80000102-14 = "แน่นอนอยู่แล้วค่ะ! หนึ่งเล่มเอาไว้สะสม หนึ่งเล่มเอาไว้อ่าน ส่วนเล่มสุดท้ายก็เอาไว้บอกต่อค่ะ!"
80000102-15 = "อ้อ เล่มที่เอาไว้สะสมห้ามแกะพลาสติกออกนะคะ เพราะมันสำคัญมากค่ะ"
80000102-16 = "ส่วนของคุณครู เล่มนี้ค่ะ อ่านเล่มสำหรับเอาไว้บอกต่อเล่มนี้ได้เลยค่ะ!"
80000102-17 = "[s] \"อะ... อื้อ ขอบคุณนะ\""
80000102-21 = "(คุณครูรับหนังสือที่โมมิจิยื่นมาให้ด้วยรอยยิ้มสดใส แล้วเปิดออกดู...)"
80000102-22 = "(และแล้ว...!)"
80000102-27 = "[ns] \"เอ๊ะ?\""
80000102-28 = "นะ... นี่มัน...! ยินดีด้วยนะคะคุณครู!"
80000102-29 = "คุณครูแจ็กพ็อตได้รับรางวัลเป็นช็อกโกแลตกับพวงกุญแจรูปตัวละครหลักค่ะ!"
80000102-30 = "แหะๆ คุณครูนี่ก็โชคดีเหมือนกันนะคะ ไม่สิ ฉันเป็นคนซื้อหนังสือเล่มนี้มาก่อน คนที่โชคดีต้องเป็นฉัน#nใช่ไหมคะ?"
80000102-31 = "คะ? นี่เป็นของที่เจอในหนังสือที่ฉันซื้อมา เลยอยากคืนให้ฉันงั้นเหรอคะ?"
80000102-32 = "มะ... ไม่ได้นะคะ! ยังไงมันก็เป็นของคุณครูแล้วค่ะ! ไม่ต้องคืนก็ได้ค่ะ รับไว้เถอะนะคะ!"
80000102-33 = "ทะ... ทำไมฉันต้องตกใจขนาดนี้น่ะเหรอคะ? คะ... คือว่าเรื่องนั้น..."
80000102-34 = "ยังไงคุณครูก็รับไว้เถอะนะคะ ต้องรับไว้นะคะ!"
80000102-35 = "[s] \"อะ... อื้อ เข้าใจแล้ว...\""
80000102-36 = "....."
80000102-37 = "ดีจังเลย..."
80000102-38 = "ถ้างั้นฉันก็จะขอนั่งอ่านเล่มที่เก็บไว้อ่านด้วยได้ไหมคะ...?"
80000102-42 = "(โมมิจิหยิบหนังสือการ์ตูนเล่ม 'สำหรับอ่าน' ออกมาด้วยสีหน้ามีความสุข)"
80000102-47 = "....."
80000102-48 = "[s] \"......?\""
80000102-49 = "อะ...อ๊ายยย! นะ... นี่มัน คะ... คือว่าคุณครู! คือว่า..."
80000102-50 = "ฉันไม่ได้ซื้อมาเพื่อใช้คู่กับคุณครูนะคะ! คือว่า... คือว่ามัน...!"
80000102-51 = "มุแงงง... พูดอะไรหน่อยสิคะ...? คือว่า... คือว่ามัน...!"
80000102-52 = "[s] \"ดีจังที่โมมิจิได้เหมือนกัน\""
80000102-53 = "คะ...?"
80000102-54 = "[s] \"ครูได้พวงกุญแจที่โมมิจิซื้อมาแล้ว ก็พอดีเลยใช่ไหมล่ะ?\""
80000102-55 = "....."
80000102-56 = "ค่ะ ใช่แล้วค่ะ จริงด้วยค่ะ"
80000102-57 = "แหะๆ... แหะๆๆ..."
80000102-58 = "....."
80000102-59 = "คือ... คุณครูคะ"
80000102-60 = "ในเมื่อเป็นแบบนี้แล้ว ถ้างั้นพวงกุญแจอันนี้... ขอห้อยไว้ที่โต๊ะทำงานคุณครูได้ไหมคะ?"
80000102-61 = "เอ่อ คือ... ถ้าเป็นไปได้ ก็อยากวางไว้คู่กันน่ะค่ะ"
80000102-62 = "[s] \"หืม? ได้สิ ทำไมจะไม่ได้ล่ะ?\""
80000102-63 = "จะ... จริงเหรอคะ? วางไว้ได้จริงๆ เหรอคะ?"
80000102-64 = "อ่า... เพราะของตกแต่งกระจุกกระจิกบนโต๊ะมันจะเพิ่มขึ้นมาน่ะค่ะ..."
80000102-65 = "ค่ะ! ใช่แล้วค่ะ จริงด้วยค่ะ!"
80000102-66 = "ถ้าปล่อยให้พื้นที่โต๊ะทำงานโล่งเกินไป มันก็จะดูไม่ดี แล้วบรรยากาศการทำงานก็จะไม่ดีด้วย... เอาเป็นว่าโต๊ะโล่งเกินไปก็ไม่ดีค่ะ! ใช่แล้วค่ะ!"
80000102-67 = "....."
80000102-68 = "เอ่อ ถ้าอย่างนั้น คุณครูคะ เรื่องพวงกุญแจก็เคลียร์ได้แล้ว..."
80000102-69 = "ช็อกโกแลต... มันน่าเสียดายออกนะค่ะ งั้นเรามากินด้วยกันไหมดีคะ?"
80000102-70 = "[s] \"อื้อ เอาสิ\""
80000102-71 = "...!"
80000102-72 = "ค่ะ มากินด้วยกันนะคะ!"
80000102-73 = "ให้อ่านหนังสือการ์ตูนด้วยกันเหรอคะ? จะ... จริงเหรอคะ? ได้จริงๆ เหรอคะ? มะ... ไม่เป็นไรจริงๆ เหรอคะคุณครู?!"
80000102-74 = "แหะๆ... รู้สึกโชคดีจริงๆ เลยที่แวะมาที่ชาเล่ต์ค่ะ"
80000102-76 = "(หลังจากนั้นคุณครูก็กินช็อกโกแลตและอ่านหนังสือการ์ตูนกับโมมิจิ...)"

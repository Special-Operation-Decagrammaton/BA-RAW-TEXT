[translation]
80000102-1 = "Consultation Subject"
80000102-2 = "I was waiting for Momiji to arrive at Schale after she had suddenly contacted me..."
80000102-3 = "Sensei! Did you have to wait long? Sorry about that..."
80000102-4 = "It's okay? F-Figures you'd say something like that..."
80000102-5 = "Huh? I got here 20 minutes before I said I would?"
80000102-6 = "Oh, right... I-I'm sorry for a different reason then. What should I do?"
80000102-7 = "[s1] \"Start by calming down, Momiji.\"\n[s2] \"So... What's up?\""
80000102-10 = "Ah, yes! Well... I managed to get my hands on a manga that just got reprinted!"
80000102-11 = "It's a romance manga about a chocolate patissier... It's my latest obsession!"
80000102-12 = "Hehe... It wasn't easy, but I nabbed all three of the books I was hoping to get."
80000102-13 = "Huh? Its not three different volumes, but three copies of the same book?"
80000102-14 = "Well, of course! I got one for my collection, one to appreciate...and the last one's for proselytizing!"
80000102-15 = "Ah, hold it! You can't rip the vinyl on the one for appreciating. It's too important, okay?"
80000102-16 = "Here, I'll let you read the one for proselytizing!"
80000102-17 = "[s] \"G-Great. Thanks?\""
80000102-21 = "I took the book from the brightly smiling Momiji and opened it..."
80000102-22 = "It was at that moment..."
80000102-27 = "[ns] \"Huh?\""
80000102-28 = "Oh, this is... Congratulations, Sensei!"
80000102-29 = "It's a raffle prize! You got a keychain plus a chocolate shaped like the main character!"
80000102-30 = "Heehee. You sure are lucky, Sensei. Wait. I bought the manga, so maybe it's me who's lucky."
80000102-31 = "Huh? Since I bought the book... They should be mine?"
80000102-32 = "N-No! They're yours, Sensei! It's okay if you don't give them back! In fact, you should definitely take them!"
80000102-33 = "Wh-Why am I so flustered? Well, you see..."
80000102-34 = "Forget that! You definitely have to take them! Okay?"
80000102-35 = "[s] \"O-Okay. I'll take them...\""
80000102-36 = "..."
80000102-37 = "That's a relief..."
80000102-38 = "Now then, mind if I enjoy my appreciation manga?"
80000102-42 = "As Momiji opened the manga she had bought for appreciation, something incredible happened."
80000102-47 = "..."
80000102-48 = "[s] \"...?\""
80000102-49 = "U-Uwahhh?! Th-This is— Sensei, I...!"
80000102-50 = "...definitely didn't buy these as a matching set for myself and Sensei! I can...explain!"
80000102-51 = "Ummm... What do I say? In the end...!"
80000102-52 = "[s] \"It's okay, Momiji.\""
80000102-53 = "Wh-What?"
80000102-54 = "[s] \"Because you won the raffle prize too, right?\""
80000102-55 = "..."
80000102-56 = "Yup. That's right. Really."
80000102-57 = "Heehee... Heeheehee..."
80000102-58 = "..."
80000102-59 = "Um, Sensei?"
80000102-60 = "Now that we have these keychains... Do you think we could decorate your desk with them?"
80000102-61 = "And, um, keep them paired together? Since they came that way."
80000102-62 = "[s] \"Hm? Sure. Why not.\""
80000102-63 = "R-Really? You're okay with it?"
80000102-64 = "Oh... Of course! Having little decorations will definitely liven up your desk."
80000102-65 = "Y-Yes! Right! I couldn't have said it better myself!"
80000102-66 = "If a desk is too empty, it's not fun to look at. You might not even be able to work effectively... It's definitely not good, yeah!"
80000102-67 = "..."
80000102-68 = "Well. Sensei. That's that for the keychains..."
80000102-69 = "About the chocolates... It'd be a waste not to, so do you want to eat them together?"
80000102-70 = "[s] \"Sure. Let's.\""
80000102-71 = "*gasp*"
80000102-72 = "Yes! I can't wait!"
80000102-73 = "We can read the manga together too? R-Really? That's okay?!"
80000102-74 = "Ehehe... I'm really happy I came to Schale today."
80000102-76 = "Afterwards, I ate chocolate and read a quirky little manga with a strangely happy Momiji..."

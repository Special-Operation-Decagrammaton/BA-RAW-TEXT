[translation]
83300100200-6 = "耐寒訓練辛苦了，委員長。"
83300100200-7 = "不會，亞子你才辛苦。"
83300100200-8 = "因為萬魔殿突然介入的關係，訓練量比去年增加了200%。"
83300100200-9 = "多虧有大家的努力才能圓滿結束。"
83300100200-10 = "真受不了。#n既然我們都做到這個地步了，就算是萬魔殿，短時間內應該也會安分一點吧。"
83300100200-17 = "……嗯？好像吵吵鬧鬧的。"
83300100200-18 = "就是說呀……發生什麼事了嗎？"
83300100200-19 = "……明明才剛回來，現在正想休息的說。"
83300100200-20 = "亞子，我去附近看看。"
83300100200-26 = "啊，是……！那我也一起去！"

[translation]
83300100200-6 = "Thank you for your hard work during our cold weather training, Head Prefect."
83300100200-7 = "None of it would have been possible without your hard work. Thank you, Ako."
83300100200-8 = "We completed twice as much training as last year, after the Pandemonium Society barged their way in."
83300100200-9 = "But thanks to everyone's diligence, we were able to bring the matter to a safe resolution."
83300100200-10 = "Seriously. Even the Pandemonium Society will be forced to keep their heads down after all that."
83300100200-17 = "...Hm? There's a commotion outside."
83300100200-18 = "You're right... Is something going on?"
83300100200-19 = "I had wished to rest for a while, since we only just returned, but..."
83300100200-20 = "Ako, I'll look into the matter. I shall return shortly. "
83300100200-26 = "Ah, yes...! I'll investigate the situation as well, then!"

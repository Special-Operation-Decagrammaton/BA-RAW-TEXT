[translation]
83300100200-6 = "ท่านประธานต้องเหนื่อยกับการฝึกฤดูหนาวนี้มากเลยนะคะ"
83300100200-7 = "ไม่หรอก คนที่เหนื่อยคืออาโกะต่างหาก"
83300100200-8 = "ถึงการแทรกแซงอย่างกะทันหันของแพนเดโมเนียม โซไซตี้จะทำให้เราต้องฝึกมากกว่าปีที่แล้วถึง 200% ก็เถอะ"
83300100200-9 = "แต่ก็ต้องขอบคุณในความพยายามของทุกๆ คนด้วยนะ เราเลยฝึกจนจบกันได้ด้วยดี"
83300100200-10 = "จริงๆ เลยค่ะ ถ้าเราฝึกหนักกันขนาดนี้ ต่อให้เป็นแพนเดโมเนียม โซไซตี้ก็น่าจะสงบเสงี่ยมกันไปสักพัก#nหนึ่งนะคะ"
83300100200-17 = "หืม? ทำไมบรรยากาศถึงวุ่นวายจัง"
83300100200-18 = "นั่นน่ะสิคะ... มีเรื่องอะไรรึเปล่านะคะ?"
83300100200-19 = "เราเพิ่งกลับมากันเมื่อกี้นี้เอง... ฉันก็คิดว่าอยากจะพักสักหน่อยหรอกนะ"
83300100200-20 = "อาโกะ ฉันว่าจะไปดูรอบๆ สักหน่อย "
83300100200-26 = "อ๊ะ ค่ะ...! ถ้างั้นฉันเองก็จะไปสืบหาข่าวจากแถวนี้มาค่ะ!"

[translation]
2300606-1 = "Recharge Day"
2300606-2 = "(I was greeted by a sign at Momoyodou's front door.)"
2300606-3 = "(\"Momoyodou will open at 1 PM today.\")"
2300606-4 = "[s] \"That's right. She told me to use the back door.\""
2300606-8 = "(The inside of the store is unusually quiet.)"
2300606-9 = "(In the midst of the stillness...)"
2300606-10 = "Oh! Sensei, you're here."
2300606-14 = "― Heehee. Welcome back, Master.[wa:3260] "
2300606-17 = "[ns] \"You seem a lot more relaxed.\""
2300606-18 = "— You bet I am![wa:190] "
2300606-20 = "― I'm slacking off as we speak![wa:2480] "
2300606-23 = "― It's a little funny.[wa:830] "
2300606-25 = "― Technically,[wa:600] "
2300606-28 = "― this is[wa:430] "
2300606-30 = "― against the rules.[wa:260] "
2300606-33 = "― But when I'm with you...[wa:80] "
2300606-35 = "― ...I feel so comfortable.[wa:590] "
2300606-38 = "― Come sit next to me, Sensei.[wa:2130] "
2300606-40 = "― It's your fault I've changed so much, so it's time you own up to it."
2300606-43 = "All right. Now I feel recharged."
2300606-44 = "Shizuko is back!"
2300606-45 = "I have all the energy I need to get through today's shift because of you."
2300606-46 = "Thank you, Sensei."
2300606-47 = "[s] \"It was nothing.\""
2300606-48 = "So, can I count on you for the rest of today?"
2300606-49 = "Heehee."
2300606-51 = "(I spent the afternoon helping Shizuko with her Momoyodou work.)"

[translation]
2300606-1 = "元氣再充電中"
2300606-2 = "（一到百夜堂門口，就看到門前好像寫了些什麼）"
2300606-3 = "「今天百夜堂上午將暫停營業，營業時間由下午1點開始」"
2300606-4 = "[s] 「請從後門進來，不要走正門……對吧？」"
2300606-8 = "（沒有客人的百夜堂，顯得格外的安靜）"
2300606-9 = "（在這片寂靜中──）"
2300606-10 = "……啊，您來了啊。"
2300606-14 = "― 呵呵，歡迎回來～主人～？[wa:3940] "
2300606-17 = "[ns] 「真難得，靜子竟然會擺出這種樣子。」"
2300606-18 = "― 就是說呀～[wa:550] "
2300606-20 = "― 就跟老師看到的一樣，我正在偷懶ING喔～[wa:2840] "
2300606-23 = "― ……真是不可思議呢。[wa:1230] "
2300606-25 = "― 明明不能做這種事，[wa:720] "
2300606-28 = "― 應該要打起精神才行，"
2300606-30 = "― 我一直都是這麼想的說……[wa:500] "
2300606-33 = "― 只要和老師待在一起……[wa:600] "
2300606-35 = "― 總覺得力氣都不見了……[wa:1150] "
2300606-38 = "― 來吧，老師？請到這邊來。[wa:2770] "
2300606-40 = "― ……把我變成這樣的責任，你會承擔的吧？[wa:2860] "
2300606-43 = "好了，充電完成！"
2300606-44 = "靜子，完全復活了！"
2300606-45 = "託你的福，下午可以跟以前一樣努力工作了。"
2300606-46 = "非常感謝，老師。"
2300606-47 = "[s] 「不客氣。」"
2300606-48 = "那麼今天，也請您多多指教囉？"
2300606-49 = "耶嘿嘿。"
2300606-51 = "（那天下午，就這麼在百夜堂幫靜子的忙）"

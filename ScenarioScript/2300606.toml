[translation]
2300606-1 = "เติมพลังใจวันนี้"
2300606-2 = "(เมื่อมาถึงหน้าร้านเฮียกคิยาโคก็มองเห็นป้ายที่ติดอยู่ตรงประตู)"
2300606-3 = "<วันนี้ร้านเฮียกคิยาโคเปิดเวลาบ่ายโมง>"
2300606-4 = "[s] \"เธอบอกให้ฉันไปทางประตูด้านหลังนี่นา\""
2300606-8 = "(ภายในร้านเฮียกคิยาโคเงียบมาก)"
2300606-9 = "(ท่ามกลางความเงียบสงบ)"
2300606-10 = "อ๊ะ คุณครูมาแล้วเหรอคะ"
2300606-14 = "― ฮุฮุฮุ กลับมาแล้วเหรอคะ นายท่าน~[wa:3140] "
2300606-17 = "[ns] \"ชิซุโกะดูผ่อนคลายกว่าปกตินะ...\""
2300606-18 = "― ค่าาา~[wa:510] "
2300606-20 = "― อย่างที่เห็นตอนนี้...ตอนนี้ฉันกำลังโดดงานอยู่~[wa:1800] "
2300606-23 = "― อืม น่าแปลกนะคะ[wa:1030] "
2300606-25 = "― เรื่องแบบนี้มัน...[wa:360] "
2300606-28 = "― ปกติแล้ว... [wa:230] "
2300606-30 = "― ไม่ควรทำแท้ๆ...[wa:380] "
2300606-33 = "― พอได้อยู่กับคุณครูแล้ว….[wa:80] "
2300606-35 = "― ฉันก็รู้สึก...สบายใจมากๆ...[wa:510] "
2300606-38 = "― คือว่า ช่วยมานั่งข้างๆ ฉันหน่อยสิคะ คุณครู[wa:1570] "
2300606-40 = "― มาทำให้ฉันกลายเป็นแบบนี้... ต้องรับผิดชอบด้วยนะคะ?[wa:1620] "
2300606-43 = "เอาล่ะ เติมพลังเสร็จแล้วค่ะ!"
2300606-44 = "ชิซุโกะฟื้นคืนชีพแล้วค่า!"
2300606-45 = "เพราะได้คุณครูช่วยไว้ ฉันมีแรงที่จะลุยงานช่วงบ่ายวันนี้อย่างเต็มที่แล้วค่ะ"
2300606-46 = "ขอบคุณนะคะคุณครู"
2300606-47 = "[s] \"ด้วยความยินดี\""
2300606-48 = "ถ้างั้นวันนี้ก็รบกวนด้วยทั้งวันเลยได้มั้ยคะ?"
2300606-49 = "ฮิฮิ"
2300606-51 = "(บ่ายวันนั้น คุณครูก็ได้ช่วยชิซุโกะอยู่ที่ร้านเฮียกคิยาโค)"

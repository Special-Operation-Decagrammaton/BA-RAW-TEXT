10029025-30 = "3;미사카;11;아하. 그렇다는 건……. 쇼쿠호, 혹시 너도……!\n#3;em;…"
10029025-31 = "3;쇼쿠호 비무장;07;그러니까 왜 그런 이야기를 자꾸 다른 사람들에게 계속 알려주는 걸까?\n#3;em;[빠직]\n#3;stiff"
10029025-32 = "3;쇼쿠호 비무장;05;거기다가 나까지 걸고넘어지면서? 사람이 기껏 태연한 척 숨기고 있었는데……?"

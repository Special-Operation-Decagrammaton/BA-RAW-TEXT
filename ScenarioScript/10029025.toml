[translation]
10029025-2 = "...I see. So that's the story."
10029025-3 = "I suppose I should have expected nothing less from you, Misaka. Naive to a fault..."
10029025-4 = "But as you can see... Nothing untoward has happened, right?"
10029025-5 = "Unlike Misaka, I don't go around picking fights willy-nilly."
10029025-9 = "[ns1] \"Misaka? Is this Shokuhou?\"\n[ns2] \"She's more calm than you described.\""
10029025-12 = "Ah... Um... Yes, this is her, but..."
10029025-13 = "Wait just a minute here! She's making it look like I'M the weird one!"
10029025-14 = "What are you up to, Shokuhou?! This isn't like you! Why aren't you stirring up trouble?!"
10029025-16 = "Oh my. Now you're raising your voice? Just because things aren't going how you expected? Of course, that's just the type of person you are."
10029025-17 = "Honestly, you can't just paint people as troublemakers... Don't you think these accusations are a bit over the top?"
10029025-18 = "Not to mention that you came to a place like this and told complete strangers all about your powers and abilities..."
10029025-19 = "Haha. I'm a little shocked. I knew you were simple, but I didn't think you were this simple..."
10029025-20 = "What did you call me...?"
10029025-21 = "Ah... What? Not again."
10029025-22 = "...Mmph... My electricity..."
10029025-23 = "[s3] \"Is something wrong?\"\n[s4] \"You look uncomfortable...\""
10029025-26 = "Ahh. Well, it's just... It's not a big deal."
10029025-27 = "It's just that since I've been here, I've been a little... I can't concentrate. I get dizzy when I try to generate a charge, and I can't focus..."
10029025-28 = "I can do it if I really wanted to, but it's a little uncomfortable. That's all."
10029025-29 = "...Wait."
10029025-30 = "Aha! I can see it in your eyes... Shokuhou, it's happening to you too...!"
10029025-31 = "Was I not clear that you shouldn't tell complete strangers every little detail about your powers?"
10029025-32 = "And now you're dragging me into your foolishness as well. I was trying to remain calm and keep it to myself...!"
10029025-33 = "We are outsiders here, no matter how you look at it. We should have a little discretion, hm? Misaka?"
10029025-34 = "[s5] \"Are you two friends?\"\n[s6] \"I can tell that you're very close.\""
10029025-38 = "No, we're definitely not! / No, of course we aren't."
10029025-39 = "[s] \"...Excuse me. I apologize.\""
10029025-41 = "*sigh*"
10029025-42 = "This is why you sought me out? To hand me this \"local custom\"?"
10029025-43 = "And you... You're Sensei...?"
10029025-44 = "[s7] Hand over the gun from the Engineering Department.\n[s8] \"That's right. I came to give you this.\""
10029025-47 = "Hmm..."
10029025-52 = "It's light."
10029025-53 = "I wouldn't exactly call this my style, but... Well, I suppose it's more eye-catching to be without one in this place."
10029025-54 = "Thank you for this, but... I do hope you'll forgive me if I'm not ready to make you my new best friend."
10029025-55 = "Perhaps I can show my gratitude by offering you a hand if you ever need my help in the future?"
10029025-56 = "Wow, you're being uncharacteristically cooperative. How straightforward of you."
10029025-57 = "And who do I have to thank for being in this position...?"
10029025-58 = "I'm beginning to wonder if you're doing this on purpose, Miss Misaka."
10029025-59 = "...?! You're saying this is my fault?"
10029025-61 = "Either way, it's more efficient for us to work together right now. Let's set our personal issues aside."
10029025-62 = "As for the last remaining person..."
10029025-66 = "...Ah."
10029025-71 = "[ns9] \"Eimi?\"\n[ns10] \"Did someone contact you?\""
10029025-74 = "I received a call from the president. She's finished her research and wants us to rejoin her."
10029025-75 = "Oh, and she also says not to worry about the third person."
10029025-76 = "The president has already collected her."

[translation]
10029025-2 = "……原來是這樣啊。"
10029025-3 = "真不知道該說這很像御坂同學的作風，#n還是該說你總是在一些奇怪的事情上過於天真……"
10029025-4 = "總之就像你現在看到的一樣……到目前為止，我完全沒有碰到任何事件。"
10029025-5 = "畢竟我和御坂同學不同，不會隨便挑起紛爭。"
10029025-9 = "[ns1]「……御坂？他就是『食蜂』嗎？」\n[ns2]「跟你形容得不太一樣，看起來挺老實的啊？」"
10029025-12 = "啊，呃，的確是這樣……"
10029025-13 = "不對，先等一下！為什麼現在好像變成我才是奇怪的人了啊！！"
10029025-14 = "搞什麼啊，食蜂！？這也太奇怪了吧！#n你本來明明不是這樣的人！！為什麼突然變得這麼老實啊！？"
10029025-16 = "哎呀哎呀，現在是因為我的行為沒有如你所願就要大聲斥責我嗎？#n也對，御坂同學本來就是這樣的人。"
10029025-17 = "不過這樣隨便把別人說成是問題學生……是不是有點過分了呢？"
10029025-18 = "況且我們現在人在異鄉，你卻隨便把我的能力告訴這些來路不明的人……"
10029025-19 = "唉，真是令人無言以對。#n雖然多少有所預期，沒想到你竟然這麼少根筋……"
10029025-20 = "你說什麼……？"
10029025-21 = "……嗯？哎呀，又來了。"
10029025-22 = "……唔……電力又……"
10029025-23 = "[s3]「怎麼了嗎？」\n[s4]「你看起來好像不太舒服……」"
10029025-26 = "啊啊，嗯，只是有點……不是什麼大事。"
10029025-27 = "不過總覺得來到這裡以後……注意力有點難集中。#n而且每次發射電擊的時候都會感到頭暈，所以不是很順利……"
10029025-28 = "雖然真的想發動能力也不是辦不到，就是會比平常更費力一點而已。"
10029025-29 = "……等等。"
10029025-30 = "啊哈，如果是這樣的話……食蜂，你該不會也……！"
10029025-31 = "我說～你為什麼老是要把這種事通通告訴別人啊？"
10029025-32 = "而且還把我一起拖下水……我可是很努力在隱藏自己的身份耶……？"
10029025-33 = "你難道看不出來我們兩個在這裡是異類嗎？#n麻煩請你稍微有點防人之心好嗎，御坂同學？"
10029025-34 = "[s5]「你們兩個是朋友嗎？」\n[s6]「關係看起來挺不錯的。」"
10029025-38 = "才不是！！／並不是好嗎？"
10029025-39 = "[s]「……抱歉。」"
10029025-41 = "……唉。"
10029025-42 = "所以呢？你們像這樣一窩蜂地跑來找我，就是為了給我你們口中的那個「常識」？"
10029025-43 = "這位……是「老師」……是嗎？"
10029025-44 = "[s7] 遞出工程師部給的槍\n[s8]「沒錯，我是來把這個交給你的。」"
10029025-47 = "哼嗯……"
10029025-52 = "……真輕巧呢。"
10029025-53 = "我本來不是會隨身攜帶這種東西的人……#n不過這裡沒帶槍的人的確更顯眼。"
10029025-54 = "照理來說，這種時候我應該要感謝你才對……#n但是很遺憾，我並不是那種個性圓融的人。"
10029025-55 = "雖然不能說是補償，假如以後需要我幫忙的話，我會盡力報答你的。"
10029025-56 = "……這麼老實真不像你。"
10029025-57 = "還不是多虧了某人做的好事……？"
10029025-58 = "事到如今，我都開始懷疑你是不是故意這麼做的了，御坂同學。"
10029025-59 = "……你想說這是我的錯嗎？？？"
10029025-61 = "無論如何，現在互相幫助比較有效率。#n私人的恩怨之後再個別處理吧。"
10029025-62 = "接下來就往最後一個人的位置……"
10029025-66 = "……咦。"
10029025-71 = "[ns9]「……英美？」\n[ns10]「收到什麼聯絡了嗎？」"
10029025-74 = "嗯，部長說「設施」的調查工作已經告一段落，要我們先回去一趟。"
10029025-75 = "還告訴我們不用擔心第三個人的事。"
10029025-76 = "……部長好像已經聯絡上對方，並且跟對方見過面了。"

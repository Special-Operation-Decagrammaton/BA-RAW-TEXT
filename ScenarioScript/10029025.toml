10029025-16 = "3;쇼쿠호 비무장;02;어머나. 이제는 자기 생각과 다르니 언성을 올리고 있네? 물론 미사카 씨가 그런 타입이기는 하지만?\n#3;em;[반응]"
10029025-17 = "3;쇼쿠호 비무장;05;그렇다고 사람을 다짜고짜 문제아로 몰아가다니……. 모함이 조금 지나친 게 아닐까?"
10029025-18 = "3;쇼쿠호 비무장;05;게다가 이런 곳에 와서, 신변도 모르는 사람에게 다짜고짜 능력까지 다 말해줘 버리고……."
10029025-19 = "3;쇼쿠호 비무장;08;하아. 조금 충격이랄까? 어느 정도 예상은 했지만, 그래도 이렇게까지 단순한 사람일 거라고는 생각지 않았는데…….\n#3;em;[한숨]"

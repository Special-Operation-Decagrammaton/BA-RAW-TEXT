[translation]
10029025-2 = "... เรื่องมันเป็นแบบนี้เองสินะ"
10029025-3 = "สมกับที่เป็นคุณมิซากะเลย ช่างไร้เดียงสาอะไรอย่างนี้..."
10029025-4 = "แต่ว่า ก็อย่างที่เห็นว่า... ยังไม่มีเรื่องอะไรเกิดขึ้นเลย"
10029025-5 = "ฉันไม่เหมือนกับคุณมิซากะหรอกนะ ฉันไม่ชวนใครทะเลาะแบบไม่มีปี่ไม่มีขลุ่ยหรอก"
10029025-9 = "[ns1] \"...มิซากะ? คนนี้คือ 'โชคุโฮว' เหรอ?\"\n[ns2] \"ดูเรียบร้อยดีนะ ไม่เหมือนที่ได้ยินมาเลย\""
10029025-12 = "อ่า เอ่อ อื้ม ใช่ ก็จริงอยู่หรอก..."
10029025-13 = "ไม่สิ เดี๋ยว เดี๋ยวก่อน! พูดแบบนี้ ก็แปลว่าฉันเป็นคนแปลกอยู่คนเดียวน่ะสิ!!"
10029025-14 = "อะไรกัน โชคุโฮว!?  แบบนี้มันแปลกๆ นะ! ปกติเธอไม่ใช่เด็กแบบนี้ไม่ใช่เหรอ!?  ทำไมอยู่ๆ ก็เรียบร้อยขึ้นมาล่ะ!?"
10029025-16 = "ตายจริง ถึงปกติคุณมิซากะจะเป็นคนประเภทนี้อยู่แล้วก็เถอะ แต่พออะไรๆ ต่างจากสิ่งที่ตัวเองคิด ก็พูดเสียงดังขึ้นมางั้นเหรอ?"
10029025-17 = "แล้วก็มาพูดให้คนอื่นดูเป็นเด็กเจ้าปัญหา... แบบนี้ถือว่าใส่ร้ายป้ายสีกันเกินไปหรือเปล่า?"
10029025-18 = "แถมยังมาในที่แบบนี้ แล้วก็ไปบอกเรื่องพลังจิตให้คนแปลกหน้าฟังเฉยเลยด้วย..."
10029025-19 = "เฮ้อ แบบนี้มันน่าช็อกนิดหน่อยนะ ที่จริงฉันก็พอคาดเดาไว้บ้างแล้ว แต่คิดไม่ถึงเลยว่าจะเป็นคนที่#nคิดตื้นๆ ได้ถึงขนาดนี้..."
10029025-20 = "ว่าไงนะ...?"
10029025-21 = "... หืม? เอ๋ เป็นอย่างนี้อีกแล้ว"
10029025-22 = "... อืม... ไฟฟ้ามัน..."
10029025-23 = "[s3] \"มีปัญหาอะไรเหรอ?\"\n[s4] \"ดูเหมือนไม่สบายตรงไหนเลย...\""
10029025-26 = "อ้อ ก็ คือว่า... ไม่ใช่เรื่องใหญ่อะไรหรอก"
10029025-27 = "ก็แค่หลังจากมาที่นี่ ฉัน... โฟกัสกับพลังไม่ค่อยจะได้น่ะ พอจะปล่อยพลังไฟฟ้า ก็รู้สึกเวียนหัว และใช้พลังได้ไม่เต็มที่..."
10029025-28 = "ปกติถ้าฉันตั้งใจจะทำ ก็ไม่มีอะไรที่ทำไม่ได้ แต่ตอนนี้มันติดขัดไม่เหมือนปกติ อะไรประมาณนี้น่ะ"
10029025-29 = "... เดี๋ยวก่อน"
10029025-30 = "อ้อ ถ้าเป็นแบบนี้... โชคุโฮว หรือว่าเธอเองก็...!"
10029025-31 = "ทำไมถึงชอบบอกเรื่องแบบนั้นให้คนอื่นรู้อยู่เรื่อยเลยนะ?"
10029025-32 = "แล้วก็เอาฉันมาเกี่ยวด้วยอีก คนอุตส่าห์ซ่อนเรื่องนี้ไว้เงียบๆ แท้ๆ..."
10029025-33 = "ดูเอาก็รู้แล้วนี่ว่าเราเป็นคนแปลกหน้าของที่นี่ ลองระมัดระวังตัวดูหน่อยไม่ดีกว่าเหรอ? ว่าไง คุณมิซากะ?"
10029025-34 = "[s5] \"ทั้งสองคนเป็นเพื่อนกันเหรอ?\"\n[s6] \"คงจะสนิทกันน่าดูสินะ\""
10029025-38 = "เพื่อนเพิ่นอะไรล่ะ!! / สนิทกันกับผีน่ะสิ!"
10029025-39 = "[s] \"... ขอโทษที\""
10029025-41 = "... เฮ้อ"
10029025-42 = "แล้วยังไงล่ะ? เหตุผลที่ทุกคนแห่มาหาฉันแบบนี้ก็เพราะจะเอา 'ของพื้นๆ' อะไรนั่นมาให้เหรอ?"
10029025-43 = "ส่วนคุณ... เมื่อกี้บอกว่าเป็น 'คุณครู'... ใช่มั้ย?"
10029025-44 = "[s7] ส่งปืนจากชมรมวิศวกรรมให้\n[s8] \"ใช่ ครูเอาสิ่งนี้มาให้\""
10029025-47 = "ฮึ่ม..."
10029025-52 = "... น้ำหนักเบาดีนะเนี่ย"
10029025-53 = "ฉันไม่ใช่คนประเภทที่จะพกของแบบนี้ติดตัวหรอกนะ... แต่ถ้าอยู่ที่นี่แล้ว ถ้าไม่มีของแบบนี้ก็คงเป็น#nจุดสนใจมากขึ้น"
10029025-54 = "งั้นก็ควรต้องขอบคุณไว้ก่อน... แต่น่าเสียดายนะที่ฉันไม่ใช่คนที่พูดเสริมเติมแต่งได้เก่ง"
10029025-55 = "จะบอกว่าเป็นการตอบแทนก็ยังไงอยู่ เอาเป็นว่าต่อไปถ้าต้องการความช่วยเหลืออะไร ฉันจะให้ความร่วมมือแล้วกัน"
10029025-56 = "... อะไรเนี่ย ทำไมกลายเป็นคนไม่เรื่องมากซะงั้น ปกติไม่ได้เป็นคนแบบนี้นี่ ตรงไปตรงมาไม่สมกับ#nเป็นเธอเลยนะ"
10029025-57 = "แล้วใครกันล่ะที่ทำให้เรื่องมันเป็นแบบนี้...?"
10029025-58 = "ณ จุดนี้ ฉันคิดเลยนะว่าคุณมิซากะตั้งใจทำอะไรแบบนี้เองหรือเปล่า"
10029025-59 = "......???  จะบอกว่านี่คือความผิดของฉันงั้นเหรอ?"
10029025-61 = "ไม่ว่าจะเป็นยังไง แต่ตอนนี้ให้ความร่วมมือกันก็น่าจะดีกว่านะ ส่วนความสัมพันธ์ส่วนตัวน่ะ เอาไว้ไปเคลียร์กันต่างหากเถอะ"
10029025-62 = "เพราะอีกคนที่เหลือก็..."
10029025-66 = "... เอ๋"
10029025-71 = "[ns9] \"... เอมิ?\"\n[ns10] \"มีใครติดต่อมาเหรอ?\""
10029025-74 = "หัวหน้าติดต่อมาว่าตรวจหาเกี่ยวกับ 'เครื่องมือ' เสร็จแล้ว แล้วก็ให้กลับไปหาก่อนน่ะ"
10029025-75 = "อ่า แล้วก็บอกด้วยว่าไม่ต้องห่วงเรื่องคนที่สามก็ได้"
10029025-76 = "...หัวหน้าติดต่อไป และก็พบเธอแล้วละ"

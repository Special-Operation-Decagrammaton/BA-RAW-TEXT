[translation]
1300315-1 = "#title;그녀의 비밀 수첩"
1300315-2 = "#wait;1500"
1300315-3 = "#wait;2000"
1300315-4 = "3;하스미;08;아, 맞습니다. 제 수첩입니다.\n#3;a\n#3;em;[반응]"
1300315-5 = "3;하스미;07;감사합니다. 저의 부주의로 신세 졌습니다.\n#3;greeting"
1300315-6 = "[s1] \"나도 도움이 되어서 기뻐.\"\n[s2] \"그렇게 과장할 것까지야.\""
1300315-7 = "#wait;10"
1300315-8 = "#wait;10"
1300315-9 = "#st;[0,0];instant;1;"
1300315-10 = "#clearST"
1300315-11 = "3;하스미;99\n#3;em;[한숨]\n#wait;1200"
1300315-12 = "3;하스미;03;정말이지, 한때는 완전히 잃어버린 줄 알고 어떻게 되나 했네요."
1300315-13 = "3;하스미;08;네?\n#3;em;[?]"
1300315-14 = "3;하스미;04;수첩의 내용이 궁금하다고요? 갑자기요?"
1300315-15 = "[s3] \"찾으니까 굉장히 안도하길래.\"\n[s4] \"그렇게 소중히 여기는 물건은 처음 보는 것 같아. \""
1300315-16 = "#wait;10"
1300315-17 = "#wait;10"
1300315-18 = "3;하스미;08;……아아. 그렇군요."
1300315-19 = "3;하스미;05;확실히 제가 물건에 애착을 갖는 경우는, 분명 드물지도 모르겠네요."
1300315-20 = "3;하스미;01;저 자신도 별로 물욕이 있는 편은 아니다 보니."
1300315-21 = "3;하스미;08;평범한 명부입니다. 정의실현부 부원 전원의 이름과 연락처가 담겨 있지요."
1300315-22 = "3;하스미;99;그러다 보니 아무래도 외부인 손에 들어가면 곤란한 물건이라. 늘 보안을 당부하고 있는데, 정작 제가 분실하고 말았네요.\n#3;em;[세로선]"
1300315-23 = "#st;[0,0];instant;1;"
1300315-24 = "#clearST"
1300315-25 = "#wait;2500"
1300315-26 = "3;하스미;04;……뭔가, 조금 실망하신 기색이네요.\n#3;em;[땀]"
1300315-27 = "3;하스미;01;뭐, 제 수첩은, 조금 특별한 사연이 있긴 합니다. 1학년 때 받은 이후, 쭉 수기로 갱신해 왔으니까요."
1300315-28 = "3;하스미;08;네? 아, 재고 문제는 아닙니다. 명부는 매년 넉넉한 양으로 간행하고 있으니까요.\n#3;em;[?]"
1300315-29 = "3;하스미;99;다만…… 저는 메모를 남기는 게 습관이 되어서, 매년 교체하는 것보다 직접 쓰는 것이 편해서요."
1300315-30 = "3;하스미;08;선생님? 어째서 갑자기 사과를?"
1300315-31 = "[s5] \"미안, 훔쳐볼 생각은 아니었는데.\"\n[s6] (수첩과 함께 떨어져 있던 메모지들을 건넨다.)"
1300315-32 = "#wait;10"
1300315-33 = "#wait;10"
1300315-34 = "#st;[0,0];instant;1;"
1300315-35 = "#clearST"
1300315-36 = "3;하스미;08\n#3;em;[반응]\n#wait;1000"
1300315-37 = "3;하스미;01\n#3;greeting\n#wait;1000"
1300315-38 = "3;하스미;01\n#3;m5\n#wait;1000"
1300315-39 = "3;하스미;07;아, 과연…… 수첩을 흘리면서 떨어졌나 보군요.\n#3;em;…"
1300315-40 = "3;하스미;03;괜찮습니다. 일부러 주워 주시기까지 했는데, 이 정도는 불가항력이지요."
1300315-41 = "3;하스미;08;……네? 메모 말인가요?"
1300315-42 = "3;하스미;01;전부 제가 쓴 것입니다만. 혹시 무슨 문제라도?"
1300315-43 = "3;하스미;04;……대단하다고요?\n#3;m3\n#3;em;[?]"
1300315-44 = "3;하스미;03;선생님께서도 참, 과찬이십니다."
1300315-45 = "3;하스미;99;일단, 저는 부부장으로서 정의실현부의 인사를 도맡고 있습니다."
1300315-46 = "3;하스미;01;그러니 적재적소에 인재를 배치하기 위해, 부원들의 장단점을 파악하고 있어야 하지요."
1300315-47 = "3;하스미;01;어려운 일도 아닙니다. 그저 평소에 조금씩 관심 두고 관찰하면 될 뿐이니까요."
1300315-48 = "3;하스미;08;3년간 꾸준히 적어왔으니, 사실 양이 많은 편도 아니죠."
1300315-49 = "[s7] \"하지만 단순히 인사 배치 용도라기에는…….\"\n[s8] \"좋아하는 음식, 알레르기, 기념일…….\""
1300315-50 = "#wait;10"
1300315-51 = "#wait;10"
1300315-52 = "3;하스미;05;물론 좋아하는 것, 서툰 것, 취미와 습관, 기념일, 음식 취향과 알레르기 유무……."
1300315-53 = "3;하스미;01;업무 분장만을 위해서는, 굳이 의미 없는 정보죠."
1300315-54 = "3;하스미;99;하지만 정의실현 같은 딱딱한 이름을 쓰고 있지만, 저희도 결국에는 학생들이니까요."
1300315-55 = "3;하스미;03;좀 더 편하고 즐거운 동아리를 선택할 수도 있었는데, 굳이 어려운 길을 골라준 고마운 아이들입니다."
1300315-56 = "3;하스미;02;그런 아이들이 조금이라도 즐겁게 학창 시절을 보내도록 돕는 것이, 저의 소박한 욕심이네요."
1300315-57 = "3;하스미;04;아, 이런 결례를…… 당연히 이런 내용은 저보다 선생님께서 잘 아실 텐데.\n#3;em;[반응]"
1300315-58 = "3;하스미;99;조금 주제넘게 설명한 모양이 되었네요. 죄송합니다.\n#3;greeting"
1300315-59 = "[s9] \"아니야! 엄청 감동했어!\"\n[s10] \"하스미……! 훌륭한 아이로 자랐구나……!\""
1300315-60 = "#wait;10"
1300315-61 = "#wait;10"
1300315-62 = "3;하스미;02;정말…… 자꾸 부끄럽게 하시네요."
1300315-63 = "3;하스미;01;네? 수첩에 있는 사람은 전부 정의실현부원이냐고요?\n#3;em;[?]"
1300315-64 = "3;하스미;99;그야 아무래도, 정의실현부 명부이니까요. 외부인 정보를 기재해서는 본 용도를 흐리는 것이 되겠죠."
1300315-65 = "3;하스미;07;……그렇게, 당당히 말하고 싶은 대목입니다만."
1300315-66 = "3;하스미;03;후후. 솔직히 말하면, 부 활동으로 바빠 사적으로 친분을 쌓기 어려워서요.\n#3;em;[재잘]"
1300315-67 = "3;하스미;01;저에게 소중한 사람들을 모두 적고 보니, 부원들 이름밖에 없었다는 쪽에 가깝네요."
1300315-68 = "3;하스미;08;……네? 그렇다면, 굉장히 신기한 우연이라고요?\n#3;em;[반응]"
1300315-69 = "3;하스미;08;정의실현부 부원 중에, 선생님과 생일이 같고, 취향이 똑같은 학생이 있었다고요……?"
1300315-70 = "#st;[0,0];instant;1;"
1300315-71 = "#clearST"
1300315-72 = "3;하스미;08\n#3;em;…\n#wait;2500"
1300315-73 = "3;하스미;04\n#3;em;[///]\n#3;stiff\n#wait;1500"
1300315-74 = "3;하스미;04;선생님, 한담은 여기까지 나누도록 하시죠."
1300315-75 = "3;하스미;99;제가 무심결에 바쁘신 선생님을 너무 오래 붙잡은 듯합니다."
1300315-76 = "[s] \"응? 아니, 딱히 그 정도는…….\""
1300315-77 = "3;하스미;06;아니요! 그렇다 해도, 제 분실물 건으로 이 이상 선생님 시간을 빼앗을 수는 없습니다!\n#3;em;[!]"
1300315-78 = "3;하스미;05;그리고, 저도 지금 막 바쁜 일이 떠오른 참이라!\n#3;stiff"
1300315-79 = "3;하스미;99;이만 실례하겠습니다!\n#3;greeting"

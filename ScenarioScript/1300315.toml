[translation]
1300315-1 = "สมุดบันทึกลับของเธอคนนั้น"
1300315-4 = "อ่า ใช่แล้วค่ะ นี่สมุดบันทึกของฉันเองค่ะ"
1300315-5 = "ขอบคุณมากเลยนะคะ เพราะความเลินเล่อของฉันทำให้ต้องรบกวนคุณครูอีกแล้ว"
1300315-6 = "[s1] \"ครูดีใจที่ช่วยฮาสุมิได้นะ\"\n[s2] \"ไม่ต้องพูดขนาดนั้นหรอก\""
1300315-12 = "จริงๆ แล้วฉันคิดว่าคงไม่ได้มันคืนและคิดว่าจะเกิดอะไรขึ้นกับสมุดเล่มนี้บ้างอยู่เหมือนกันค่ะ"
1300315-13 = "คะ?"
1300315-14 = "คุณครูอยากรู้เกี่ยวกับเนื้อหาในสมุดบันทึกเหรอคะ? จู่ๆ ก็สงสัยขึ้นมาเหรอคะ?"
1300315-15 = "[s3] \"ตอนนี้ก็หาเจอแล้ว คงโล่งใจมากเลยสินะ\"\n[s4] \"ครั้งแรกเลยนะที่ครูได้เห็นของสำคัญขนาดนั้นน่ะ\" "
1300315-18 = "อ่า... อย่างนั้นเหรอคะ"
1300315-19 = "ฉันไม่ค่อยยึดติดหรือรู้สึกผูกพันกับสิ่งของบ่อยนักหรอกค่ะ"
1300315-20 = "เพราะฉันเองก็ไม่ใช่พวกวัตถุนิยมสักเท่าไร"
1300315-21 = "ก็แค่สมุดรายชื่อธรรมดาน่ะค่ะ ในนั้นมีชื่อสมาชิกกับเบอร์ติดต่อของสมาชิกทุกคนในชมรมทวงความ#nยุติธรรมค่ะ"
1300315-22 = "เพราะงั้นเลยเป็นของที่ถ้าตกไปอยู่ในมือของคนนอกคงจะลำบาก ฉันกำชับให้คนอื่นเก็บไว้อย่างดีมา#nตลอด แต่สุดท้ายฉันดันเป็นคนทำหายเอง"
1300315-26 = "ก็เลย... สีหน้าดูผิดหวังนิดหน่อยน่ะค่ะ"
1300315-27 = "เอาเถอะค่ะ สมุดโน้ตของฉันก็มีเรื่องราวพิเศษๆ อยู่เหมือนกันค่ะ หลังได้รับสมุดโน้ตเล่มนี้มาตอนปี 1 ฉันก็บันทึกเรื่องราวไว้ตลอดค่ะ"
1300315-28 = "คะ? อ๋อ ไม่มีปัญหาเรื่องการจัดเก็บหรอกค่ะ เพราะในแต่ละปีจะพิมพ์รายชื่อออกมาอยู่แล้วค่ะ"
1300315-29 = "แต่ว่า... ฉันติดนิสัยชอบเขียนโน้ตไว้ เพราะงั้นเลยชอบเขียนเองแทนที่จะเปลี่ยนเล่มน่ะค่ะ"
1300315-30 = "คุณครู? ทำไมจู่ๆ ถึงมาขอโทษฉันล่ะคะ?"
1300315-31 = "[s5] \"ขอโทษนะ ครูไม่ได้คิดจะแอบดูเลย\"\n[s6] (ยื่นโน้ตที่เก็บมาพร้อมสมุดให้)"
1300315-39 = "อ่า... คงจะหล่นไปตอนที่สมุดโน้ตตกสินะคะ"
1300315-40 = "ไม่เป็นไรหรอกค่ะ คุณครูอุตส่าห์เก็บมาให้ แถมมันก็เป็นเหตุสุดวิสัยด้วยนี่คะ"
1300315-41 = "คะ...? หมายถึงกระดาษโน้ตนี่เหรอคะ?"
1300315-42 = "ฉันเขียนเองทั้งหมดค่ะ มีอะไรหรือเปล่าคะ?"
1300315-43 = "สุดยอดงั้นเหรอคะ...?"
1300315-44 = "คุณครูชมเกินไปแล้วนะคะ"
1300315-45 = "ในฐานะรองหัวหน้า ฉันรับผิดชอบงานด้านบุคคลากรของทางชมรมทวงความยุติธรรมด้วยค่ะ"
1300315-46 = "ดังนั้นฉันก็เลยต้องเข้าใจจุดแข็งและจุดอ่อนของสมาชิกในชมรมเพื่อที่จะจัดวางบุคลากรให้เหมาะสม#nกับในแต่ละตำแหน่งได้"
1300315-47 = "มันไม่ใช่งานยากอะไรเลยค่ะ แค่ต้องใส่ใจและสังเกตสมาชิกในชมรมทีละเล็กทีละน้อยก็เท่านั้น"
1300315-48 = "ฉันจดบันทึกมาตลอดสามปี แต่จริงๆ แล้วมันก็ไม่ได้เยอะอะไรมากหรอกค่ะ"
1300315-49 = "[s7] \"แต่มันก็ไม่ใช่แค่เพื่อจัดตำแหน่งงานไม่ใช่เหรอ...\"\n[s8] \"จดทั้งเรื่องอาหารที่ชอบ อาหารที่แพ้ วันเกิดไว้ด้วยนี่...\""
1300315-52 = "ส่วนเรื่องสิ่งที่ชอบ สิ่งที่ไม่ถนัด งานอดิเรกและนิสัย วันเกิด อาหารที่ชอบและอาหารที่แพ้..."
1300315-53 = "ฉันจดไว้เพื่อเป็นข้อมูลในการมอบหมายงานค่ะ ไม่ได้มีจุดประสงค์อื่นอะไร"
1300315-54 = "ถึงชมรมทวงความยุติธรรมจะเป็นชื่อที่ฟังดูเฉียบขาด แต่ถึงยังไงพวกเราก็ยังเป็นนักเรียนอยู่ดีค่ะ"
1300315-55 = "พวกเธอจะเลือกเข้าชมรมที่สบายและสนุกกว่านี้ก็ได้ แต่กลับเลือกเส้นทางที่ยากลำบากแบบนี้ ฉันเลยรู้สึกขอบคุณพวกเธออยู่เสมอๆ เลยค่ะ"
1300315-56 = "เพราะงั้นความปรารถนาเล็กๆ ของฉันก็คือการช่วยให้พวกเด็กๆ เหล่านั้นได้มีช่วงวัยเรียนที่สนุกสนาน#nสักหน่อย ถึงจะแค่เล็กน้อยก็ตามค่ะ"
1300315-57 = "อ่า... ฉันนี่เสียมารยาทจริงๆ เลย แน่นอนว่าคุณครูย่อมรู้เรื่องนี้ดีกว่าฉันอยู่แล้ว"
1300315-58 = "ดูเหมือนฉันจะพูดอะไรมากเกินไปหน่อยสินะคะ ขอโทษด้วยค่ะ"
1300315-59 = "[s9] \"ไม่เลย ครูประทับใจมากเลยนะ!\"\n[s10] \"ฮาสุมิ...! เติบโตเป็นคนที่ยอดเยี่ยมเลยนะ...!\""
1300315-62 = "จริงๆ เลยนะคะ... ชอบทำให้ฉันเขินอยู่เรื่อยเลยนะคะ"
1300315-63 = "คะ? รายชื่อคนที่อยู่ในสมุดโน้ตมีแต่สมาชิกชมรมทวงความยุติธรรมเท่านั้นรึเปล่างั้นเหรอคะ?"
1300315-64 = "ก็แน่นอนสิคะ… นี่เป็นรายชื่อของชมรมทวงความยุติธรรมนี่คะ การบันทึกข้อมูลภายนอกจะทำให้#nวัตถุประสงค์หลักสั่นคลอนได้ค่ะ"
1300315-65 = "นั่นคือสิ่งที่ฉันพูดได้อย่างมั่นใจเลยค่ะ"
1300315-66 = "ฮุฮุ บอกตามตรงว่าฉันเองก็ยุ่งกับการทำงานของชมรมจนไม่ได้ทำความรู้จักกับคนอื่นเท่าไรเลยค่ะ"
1300315-67 = "พอลองเขียนชื่อเหล่าคนสำคัญสำหรับฉันลงไปก็เหมือนจะมีแค่ชื่อสมาชิกในชมรมเท่านั้นเองค่ะ"
1300315-68 = "คะ...? คงเป็นเรื่องบังเอิญที่แปลกมากเลยงั้นเหรอคะ?"
1300315-69 = "มีนักเรียนในสมาชิกชมรมทวงความยุติธรรมที่มีวันเกิดวันเดียวกันและมีของที่ชอบเหมือนคุณครูอยู่#nงั้นเหรอคะ...?"
1300315-74 = "คุณครูคะ ฉันว่าเราพูดคุยกันเพียงเท่านี้เถอะค่ะ"
1300315-75 = "ฉันรู้สึกเหมือนว่าทำให้คุณครูเสียเวลามากเกินไปแล้วค่ะ"
1300315-76 = "[s] \"หืม? ไม่นะ ไม่ถึงขนาดนั้นหรอก...\""
1300315-77 = "ไม่ค่ะ! ถึงอย่างนั้นฉันก็ไม่อยากให้คุณครูมาเสียเวลากับของที่ฉันทำหายอีกแล้วละค่ะ!"
1300315-78 = "แถมฉันก็นึกได้พอดีเลยค่ะว่ามีงานที่ต้องไปจัดการ!"
1300315-79 = "ขอเสียมารยาทนะคะ ขอตัวก่อนค่ะ!"
1300315-88 = "(จากนั้นฮาสุมิก็หายตัวไปทันที)"

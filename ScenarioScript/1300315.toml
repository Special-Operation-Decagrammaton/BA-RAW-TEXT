[translation]
1300315-1 = "他的祕密筆記本"
1300315-4 = "啊，沒錯。這的確是我的筆記本。"
1300315-5 = "非常感謝。#n抱歉因為我的疏忽讓您費心了。"
1300315-6 = "[s1]「我很高興能幫上忙。」\n[s2]「沒那麼誇張啦。」"
1300315-12 = "一度以為弄丟了的時候，真是不知道該怎麼辦呢。"
1300315-13 = "嗯？"
1300315-14 = "好奇筆記本的內容？#n為何這麼突然？"
1300315-15 = "[s3]「因為看你找到之後鬆了一大口氣。」\n[s4]「好像第一次看見你這麼珍惜一樣東西。」"
1300315-18 = "……啊啊，原來如此。"
1300315-19 = "我對物品產生執著的情況，確實相對少見也說不定呢。"
1300315-20 = "畢竟我本身並不是特別有物慾的人。"
1300315-21 = "這只是本普通的名簿，裡面記載了實現正義部全體成員的姓名與聯絡方式。"
1300315-22 = "因為落到外人手裡會很麻煩，所以我一直提醒大家務必留意……結果自己卻弄丟了。"
1300315-26 = "……您看起來好像有點失望呢。"
1300315-27 = "不過，其實這本筆記本還是有點特別的。#n從一年級拿到它之後，我就一直以手寫的方式更新到現在。"
1300315-28 = "嗯？啊，並不是缺貨造成的。#n名簿每年都會印製足夠的數量。"
1300315-29 = "只是……因為我個人習慣做筆記的關係，#n與其每年都換成新的筆記本，直接寫在同一本上比較方便。"
1300315-30 = "老師？您為什麼突然道歉？"
1300315-31 = "[s5]「抱歉，我不是故意偷看的。」\n[s6] 遞上與筆記本一起掉落的便條紙"
1300315-39 = "啊，原來如此……應該是和筆記本一起掉出來的吧。"
1300315-40 = "請您不用在意。#n謝謝您還特地幫我撿起來，這也算是不可抗力吧。"
1300315-41 = "……那些便條？"
1300315-42 = "都是我親手寫的，怎麼了嗎？"
1300315-43 = "……很厲害？"
1300315-44 = "老師您過獎了。"
1300315-45 = "其實身為副部長的我，也負責實現正義部的人事安排。"
1300315-46 = "為求將所有人安排在適合的位置，就必須得掌握成員們的優缺點才行。"
1300315-47 = "其實這並沒有那麼困難，只要平時稍微留意觀察就行了。"
1300315-48 = "因為是在三年間持續記錄，其實量也不算特別多。"
1300315-49 = "[s7]「不過看起來不像只是用來做人事安排而已……」\n[s8]「比如喜歡的食物、對什麼過敏，還有紀念日之類的……」"
1300315-52 = "沒錯。喜好、弱項、興趣、習慣、紀念日、飲食偏好與過敏……"
1300315-53 = "如果只是為了分配工作的話，這些資訊確實並沒有這麼必要。"
1300315-54 = "然而，雖然掛著「實現正義」這麼嚴肅的名字，我們說到底也只是學生。"
1300315-55 = "因此，我很感謝明明能進入更輕鬆有趣的社團，卻選擇了這條艱難的路的孩子們。"
1300315-56 = "能讓孩子們度過更開心的學園生活，是我個人小小的心願。"
1300315-57 = "啊，我真是太失禮了……這種事情，老師一定比我更清楚才對。"
1300315-58 = "好像有種在班門弄斧的感覺，真的很抱歉。"
1300315-59 = "[s9]「別這麼說！我超感動的！」\n[s10]「蓮實……！你真是個了不起的孩子……！」"
1300315-62 = "老師您也真是的……總是說這些令人害羞的話。"
1300315-63 = "嗯？寫在筆記本裡的，是不是全都是實現正義部的成員？"
1300315-64 = "畢竟這是部員的名簿，如果寫下外人資料的話就偏離原本的用途了吧。"
1300315-65 = "……雖然我很想這麼說。"
1300315-66 = "呵呵，老實說，因為社團活動太忙的關係，我能夠私下交友的時間並不多。"
1300315-67 = "結果在把覺得重要的人都寫上去之後，才碰巧發現裡頭只有部員的名字。"
1300315-68 = "……嗯？您說那還真是有個奇妙的巧合？"
1300315-69 = "在實現正義部裡，居然有個生日和喜好都跟老師一模一樣的學生……？"
1300315-74 = "老師，閒聊就先到此為止吧。"
1300315-75 = "我似乎不小心耽誤您太多時間了。"
1300315-76 = "[s]「咦？不會啦，其實也沒有……」"
1300315-77 = "不行！即便如此，我也不能因為自己的失物再占用老師的時間！"
1300315-78 = "而且我剛好也想起還有件急事要辦！"
1300315-79 = "那麼我先失陪了！"
1300315-88 = "（於是蓮實就這樣像箭一般跑走了）"

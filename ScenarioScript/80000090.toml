[translation]
80000090-1 = "#title;보안위원장의 훈장"
80000090-2 = "3;마리나;01\n#3;a\n#3;em;…\n#wait;2500"
80000090-3 = "3;마리나;02;아, 선생. 갑자기 불러내서 미안하군.\n#3;em;[반응]"
80000090-4 = "3;마리나;06;도저히 내 능력으로는 해결하기 어려운 문제가 생겨서 말이야."
80000090-5 = "3;마리나;01;부디 선생의 지혜를 빌려주었으면 해서."
80000090-6 = "[s1] \"괜찮아. 문제 없어.\"\n[s2] \"그보다 갑자기 그게 무슨 일이야?\""
80000090-7 = "3;마리나;02;선생은 <체룐카>라는 초콜릿을 알고 있나?\n#3;em;[?]"
80000090-8 = "3;마리나;02;선생은 <체룐카>라는 초콜릿을 알고 있나?\n#3;em;[?]"
80000090-9 = "3;마리나;01;붉은겨울 학원에서 생산되는 이 밀크 초콜릿은 특유의 달콤한 맛 덕분에 학원 밖에서도 일부 매니아층이 생길 정도로 큰 인기를 끌고 있지."
80000090-10 = "3;마리나;99;다만 재료 수급이 불안정한 탓에 생산량이 일정하지 않다는 단점이 있는데……"
80000090-11 = "3;마리나;06;이번에 체리노 회장님의 지시로 내가 체룐카 공장의 관리 감독을 맡게 된 후, 평균 생산량의 200%를 초과 달성하게 되었다……\n#3;stiff\n#3;em;[속상함]"
80000090-12 = "[s] \"그건 좋은 일이네!\""
80000090-13 = "#wait;1500"
80000090-14 = "[ns] \"그런데 어째서 그렇게 표정이 어두워?\""
80000090-15 = "3;마리나;04;음…… 생산량 초과 달성 직후, 체리노 회장님께서 체룐카 초콜릿의 생산에 기여한 공로를 치하하여 내게 특별히 제작한 훈장을 주셨는데……\n#3;em;…"
80000090-16 = "3;마리나;02;……바로 이것이다."
80000090-17 = "#st;[0,0];instant;1;"
80000090-18 = "#clearST"
80000090-19 = "3;마리나;02\n#3;m1\n#wait;1000"
80000090-20 = "#wait;2500"
80000090-21 = "[ns] \"이건…… 초콜릿?\""
80000090-22 = "3;마리나;01;음. 이 <특별 초콜릿 공로 훈장>은 다른 금속제의 훈장들과는 달리, 체룐카에 들어가는 밀크 초콜릿과 같은 성분으로 이루어져 있는 특제 훈장이야.\n#3;em;[반응]"
80000090-23 = "3;마리나;99;초콜릿을 만드는 일에서 성과를 올렸으니, 이를 기념하여 훈장에도 초콜릿을 넣은 그 의도는 알겠다만……"
80000090-24 = "3;마리나;06;이 공로 훈장은 따듯한 곳에 가면 녹아 모양이 변할 우려도 있는데다가, 체룐카는 우유가 듬뿍 들어간 밀크 초콜릿이니 오래 두면 상할 위험도 있어서 말이지."
80000090-25 = "3;마리나;06;이 훈장을 어찌 보관해야 좋을지 고민중이었다.\n#3;m3\n#3;em;[속상함]"
80000090-26 = "3;마리나;04;선생, 무슨 묘수가 없을까?"
80000090-27 = "[s3] \"초콜릿이 들어간 훈장이라면……\"\n[s4] \"그냥 먹으면 안 되는 거야?\""
80000090-28 = "3;마리나;12;후, 훈장을 먹으라고? 그럼 훈장이 사라져 버리질 않나!\n#3;em;[?!]"
80000090-29 = "3;마리나;12;후, 훈장을 먹으라고? 그럼 훈장이 사라져 버리질 않나!\n#3;em;[?!]"
80000090-30 = "3;마리나;08;이 훈장은 지난 몇 달간 체룐카 공장에서 고생한 끝에 얻어낸 내 성과를 상징하는 물건인 바."
80000090-31 = "3;마리나;06;이를 먹어 없애 버린다면 내 노력과 긍지를 증명해 줄 수단도 사라지는 셈이니……\n#3;stiff"
80000090-32 = "3;마리나;05;그런 아까운 짓은 할 수 없어!\n#3;em;[!]"
80000090-33 = "[s] \"꼭 훈장이 없어도 마리나의 노력은 증명할 수 있어.\""
80000090-34 = "3;마리나;04;으응……? 무슨 수로 노력을 증명하지?\n#3;em;[?]"
80000090-35 = "3;마리나;08;이번 감독 업무를 마치고 나서 훈장 이외의 상장이나 포상증 같은 건 받지 못했다만……"
80000090-36 = "[s] \"마리나가 열심히 노력한 걸 다른 학생들이 기억하고 있으니까.\""
80000090-37 = "#wait;1500"
80000090-38 = "[ns] \"훈장도 그 가치를 기억하는 사람이 있어야 빛이 나는 법이지.\""
80000090-39 = "3;마리나;04\n#3;em;…\n#wait;2500"
80000090-40 = "3;마리나;06;……선생. 역시 이 훈장은 선생이 먹어줬으면 좋겠어."
80000090-41 = "[s5] \"이걸 내게 주어도 괜찮아……?\"\n[s6] \"마리나에게 귀한 물건 아니었어……?\""
80000090-42 = "3;마리나;99;물론 이 훈장이 내게 귀한 물건이라는 것은 틀림없지만, 선생의 조언이 없었더라면 나는 이 훈장이 사라지는 것을 아까워하다가 결국 상한 상태로 버리고 말았을 거야.\n#3;em;…"
80000090-43 = "3;마리나;99;물론 이 훈장이 내게 귀한 물건이라는 것은 틀림없지만, 선생의 조언이 없었더라면 나는 이 훈장이 사라지는 것을 아까워하다가 결국 상한 상태로 버리고 말았을 거야.\n#3;em;…"
80000090-44 = "3;마리나;01;그것이야말로 훈장의 가치를 더욱 욕되게 만드는 행동이었겠지."
80000090-45 = "3;마리나;06;귀중한 가르침을 준 선생에게 무언가 보답을 하고 싶지만, 지금 내가 갖고 있는 것은 이 훈장 뿐이라서……"
80000090-46 = "3;마리나;03;노력과 긍지의 가치가 사람의 기억 속에 남아 있다면, 이 훈장을 선생님이 먹는다 해도 특별히 그 가치가 변하지도 않을 거야."
80000090-47 = "3;마리나;03;그러니까……"
80000090-48 = "3;마리나;09;선생이 내 명예를 받아줬으면 좋겠어.\n#3;em;[반짝]"

[translation]
80000090-1 = "เหรียญของหัวหน้าคณะความมั่นคง"
80000090-3 = "อ๊ะ คุณครู ขอโทษที่เรียกออกมากะทันหันนะ"
80000090-4 = "พอดีมีปัญหาที่เกินกำลังของฉันนิดหน่อยน่ะ"
80000090-5 = "เลยต้องขอยืมมันสมองของคุณครูหน่อย"
80000090-6 = "[s1] \"ได้เลย ไม่มีปัญหา เรื่องอะไรล่ะ?\"\n[s2] \"มีเรื่องอะไรเหรอ?\""
80000090-7 = "คุณครูรู้จักช็อกโกแลตที่ชื่อ <ช็อกเชริโน่> มั้ย?"
80000090-8 = "คุณครูรู้จักช็อกโกแลตที่ชื่อ <ช็อกเชริโน่> มั้ย?"
80000090-9 = "ช็อกโกแลตนมที่มีรสหวานเฉพาะตัวที่ผลิตภายในสหภาพเรดวินเทอร์ และตอนนี้มันก็กำลัง#nเป็นที่นิยมที่นอกเขตสหภาพเรดวินเทอร์ด้วยน่ะ"
80000090-10 = "แต่โชคไม่ดีที่เรามีวัตถุดิบไม่เพียงพอ ทำให้ปริมาณช็อกโกแลตที่ผลิตได้ไม่คงที่"
80000090-11 = "แต่หลังจากที่ฉันได้รับมอบหมายจากท่านประธานเชริโน่ให้ไปควบคุมดูแลโรงงานผลิตช็อกเชริโน่ ปริมาณผลิตโดยเฉลี่ยเพิ่มขึ้นมาเกินกว่า 200%..."
80000090-12 = "[s] \"ถือว่าเป็นข่าวดีนี่นา!\""
80000090-14 = "[ns] \"แล้วทำไมทำหน้าหนักใจแบบนั้นล่ะ?\""
80000090-15 = "อืม... พอผลิตช็อกโกแลตได้เพิ่มขึ้น ท่านประธานเชริโน่ก็มอบเหรียญตราพิเศษให้ ตอบแทน#nที่มีส่วนร่วมในการผลิตช็อกเชริโน่..."
80000090-16 = "...นี่ไง"
80000090-21 = "[ns] \"นี่มัน...ช็อกโกแลตนี่นา?\""
80000090-22 = "อืม <เหรียญตราผลงานช็อกโกแลตแบบพิเศษ> ไม่เหมือนกับเหรียญตราโลหะอื่นๆ เพราะเหรียญชิ้นนี้ทำมาจากช็อกโกแลตนมที่เป็นส่วนผสมของช็อกเชริโน่น่ะ"
80000090-23 = "ฉันเข้าใจดีว่าที่ใช้ช็อกโกแลตมาทำเหรียญตรานี้ก็เพื่อฉลองที่เพิ่มปริมาณการผลิต#nช็อกโกแลตได้สำเร็จ"
80000090-24 = "แต่ถ้าติดเหรียญตรานี้ไว้แล้วไปในที่ที่อากาศร้อนละก็ มันคงจะละลายแน่ๆ แถมช็อกเชริโน่#nเป็นช็อกโกแลตที่มีนมเป็นส่วนผสมเยอะมาก ถ้าเก็บไว้นานก็อาจจะเสียได้"
80000090-25 = "เพราะงั้นฉันเลยกังวลว่าจะเก็บรักษาช็อกโกแลตนี้ยังไงดี"
80000090-26 = "คุณครู มีวิธีอะไรดีๆ บ้างมั้ย?"
80000090-27 = "[s3] \"เหรียญตราที่มีส่วนผสมของช็อกโกแลต กินไม่ได้เหรอ...?\"\n[s4] \"กินเข้าไปเลยไม่ได้เหรอ?\""
80000090-28 = "กะ...กินเหรียญตราช็อกโกแลตงั้นเหรอ? ถ้างั้นเหรียญตราก็จะหายไปน่ะสิ!"
80000090-29 = "กะ...กินเหรอ? ถ้างั้นเหรียญตราก็จะหายไปน่ะสิ!"
80000090-30 = "เหรียญตรานี่เป็นสัญลักษณ์แทนความสำเร็จของฉัน หลังจากตรากตรำทำงานที่โรงงาน#nช็อกเชริโน่มาตั้งหลายเดือน"
80000090-31 = "ถ้ากินเข้าไปละก็ เครื่องพิสูจน์ความภาคภูมิใจและความพยายามของฉันก็หายไปน่ะสิ..."
80000090-32 = "จะทำเรื่องน่าเสียดายแบบนั้นได้ยังไง!"
80000090-33 = "[s] \"ถึงไม่มีเหรียญตราก็พิสูจน์ความพยายามของมารินะได้นะ\""
80000090-34 = "หืม...? แล้วจะพิสูจน์ได้ยังไง?"
80000090-35 = "หลังทำภารกิจนี้เสร็จ ฉันไม่เคยได้รางวัลอะไรอีกเลย..."
80000090-36 = "[s] \"เพราะนักเรียนคนอื่นๆ จำภาพมารินะที่พยายามอย่างหนักได้ไงล่ะ\""
80000090-38 = "[ns] \"ที่เหรียญตรามีความหมาย ก็เพราะคนจดจำความหมายของเหรียญได้\""
80000090-40 = "...คุณครู ฉันอยากให้คุณครูเป็นคนกินเหรียญตราอันนี้น่ะ"
80000090-41 = "[s5] \"ให้ครูได้จริงๆ เหรอ...?\"\n[s6] \"นี่มันของสำคัญของมารินะไม่ใช่เหรอ...?\""
80000090-42 = "อืม เหรียญตรานี่เป็นของมีค่ามากสำหรับฉันก็จริง แต่ถ้าไม่ได้คำแนะนำจากคุณครูละก็ ฉันคง#nต้องมานั่งเสียใจที่เหรียญตรานี้หายไป หรือต้องทิ้งไปเพราะมันเสียน่ะ"
80000090-43 = "เหรียญตรานี่เป็นของมีค่ามากสำหรับฉันก็จริง แต่ถ้าไม่ได้คำแนะนำจากคุณครูละก็ ฉันคงต้อง#nมานั่งเสียใจที่เหรียญตรานี้หายไป หรือต้องทิ้งไปเพราะมันเสียน่ะ"
80000090-44 = "ถ้าเป็นแบบนั้น คงทำให้คุณค่าของเหรียญตรานี้หายไป"
80000090-45 = "คำแนะนำของคุณครูวันนี้มีค่ากับฉันมาก เพราะงั้นฉันเลยอยากตอบแทนคุณครูบ้าง แต่ว่าตอนนี้#nฉันมีแค่เหรียญตราอันนี้เท่านั้น..."
80000090-46 = "คุณค่าของความพยายาม และความภาคภูมิใจของฉันจะยังคงอยู่ในความทรงจำของคนอื่นๆ เพราะงั้นถ้าคุณครูกินช็อกโกแลตอันนี้ ก็คงจะจดจำคุณค่านั้นไว้ได้เหมือนกัน"
80000090-47 = "เพราะงั้น..."
80000090-48 = "ฉันเลยอยากให้คุณครูเป็นคนกินเหรียญตราเกียรติยศของฉันน่ะ"

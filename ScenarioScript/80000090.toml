[translation]
80000090-1 = "保安委員長的勳章"
80000090-3 = "老師，抱歉突然請你出來。"
80000090-4 = "發生了我一個人似乎無法解決的問題。"
80000090-5 = "所以希望能借用老師的智慧。"
80000090-6 = "[s1]「嗯，沒關係。」\n[s2]「發生什麼問題了呢？」"
80000090-7 = "老師知道「潔蓮卡」這種巧克力嗎？"
80000090-8 = "老師知道「潔蓮卡」這種巧克力嗎？"
80000090-9 = "雖然是在赤冬聯邦學園生產，#n以其因牛奶比例產生的甜味聞名，在學園外也很受人喜愛。"
80000090-10 = "但是因為原料供給並不穩定……存在無法如願提高產量的問題。"
80000090-11 = "於是我被潔莉諾會長任命為潔蓮卡工廠的管理監督者。#n到了這個月，總算是達到了往年200%的生產量……"
80000090-12 = "[s]「真厲害，居然能達到200%！？」"
80000090-14 = "[ns]「不過，總覺得你的表情有點黯淡……？」"
80000090-15 = "認可我功績的潔莉諾會長，特別賜予了我勳章……"
80000090-16 = "……就是這個。"
80000090-21 = "[ns]「……巧克力？」"
80000090-22 = "沒錯。這個「特殊功勞勳章巧克力」和其他勳章不同，#n是用與潔蓮卡相同成分的巧克力製作而成。"
80000090-23 = "既然提高了產量，不如就用巧克力來製作勳章的這種心情，我雖然非常能夠理解……"
80000090-24 = "不過這樣下去，遲早有一天會腐壞吧。#n但是，把從潔莉諾會長手中得到的勳章一直冰在冰箱也有點……"
80000090-25 = "簡單來說，我正煩惱該如何保存這個勳章。"
80000090-26 = "老師，你有什麼好方法嗎？"
80000090-27 = "[s3]「反正是巧克力……」\n[s4]「要不要直接吃掉？」"
80000090-28 = "要，要我吃掉勳章！？#n這樣勳章不就沒了嗎！"
80000090-29 = "要，要我吃掉勳章！？#n這樣勳章不就沒了嗎！"
80000090-30 = "在獲得這個勳章之前，我可是付出了數個月的辛勞。"
80000090-31 = "把它吃掉的話，就無法證明我的努力與榮耀了……"
80000090-32 = "那種事，我怎麼可能做得出來！"
80000090-33 = "[s]「就算沒有勳章，還是能證明瑪麗娜的努力唷。」"
80000090-34 = "哦……有那種方法嗎？"
80000090-35 = "我得到的獎勵，就只有這個勳章而已……"
80000090-36 = "[s]「瑪麗娜的努力，大家都會記住的。」"
80000090-38 = "[ns]「就算沒有留下有形的東西，也會留在記憶裡面。」"
80000090-40 = "……既然如此，我希望老師能吃掉這個勳章。"
80000090-41 = "[s5]「要給我……？」\n[s6]「對瑪麗娜來說這麼珍貴的東西……？」"
80000090-42 = "當然，這依然是很重要的東西。#n但是，如果沒有老師的建議，我也只會因為捨不得而讓它腐壞吧。"
80000090-43 = "當然，這依然是很重要的東西。#n但是，如果沒有老師的建議，我也只會因為捨不得而讓它腐壞吧。"
80000090-44 = "這樣才真的是……辜負了這枚勳章和潔莉諾會長的好意。"
80000090-45 = "雖然很想報答為我提供建議的老師……不巧我現在身上有的就只有這個勳章了。"
80000090-46 = "我的努力和榮耀，將會被其他學生們記住。#n值得慶幸的是，它的價值並不會改變。"
80000090-47 = "那麼即使這枚勳章會消失……"
80000090-48 = "我也希望讓我查覺到這點的老師能夠收下它。"

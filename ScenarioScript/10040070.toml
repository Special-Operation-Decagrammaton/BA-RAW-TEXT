10040070-17 = "3;노아 파자마;99;농담이에요. 선생님의 그런 표정을 보는 것도 여기서는 저뿐이네요.\n#3;em;[음표]"
10040070-18 = "3;노아 파자마;01;뭔가 다른 사람들에게는 조금 미안해지는걸요? 저 혼자 이렇게 선생님을 에스코트하며 모시고 간다니."
10040070-19 = "3;노아 파자마;02;그래도 음……."
10040070-20 = "3;노아 파자마;03;뭐, 이것도 다 선생님을 잡은 술래의 특권……이라고 해 둘까요? 괜찮겠지요?\n#3;jump"

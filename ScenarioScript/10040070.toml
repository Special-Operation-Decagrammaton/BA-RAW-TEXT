[translation]
10040070-1 = "第7話;鬼的特權"
10040070-3 = "…………"
10040070-4 = "老……師……"
10040070-5 = "……………………"
10040070-6 = "…………老……師……"
10040070-7 = "…………老師……"
10040070-8 = "老師？你在想什麼嗎？"
10040070-9 = "[ns1]「沒，沒有，沒什麼。」\n[ns2]「我只是在回想今天發生的事情。」"
10040070-12 = "呵呵，原來如此。"
10040070-13 = "不過這裡畢竟有點黑，這樣一邊沉思一邊走路很危險的哦。"
10040070-14 = "再走一段路就到了，大家應該都在等我們了。"
10040070-15 = "還是說，老師需要我牽著你走嗎？#n反正我很熟這個地方。"
10040070-16 = "來，牽著我吧……"
10040070-17 = "開玩笑的。#n沒想到竟然能看見老師露出這種表情……"
10040070-18 = "突然覺得對其他人有點抱歉呢，因為只有我一個人能當老師的保鏢。"
10040070-19 = "不過……"
10040070-20 = "畢竟老師是被我這個鬼抓住的，所以這應該可以算是……我的特權吧？#n他們應該不會介意吧？"
10040070-21 = "我看起來好像很興奮？#n……是嗎？如果老師這麼認為的話，就姑且當作是這樣吧。"
10040070-22 = "……嗯？"
10040070-23 = "問我是什麼時候開始盯著你們的？#n呵呵……老師很好奇這件事嗎？"
10040070-24 = "這個問題該怎麼回答才好呢……"
10040070-25 = "應該是從小雪醬留下老師一個人，自己從反省室裡逃跑的瞬間……開始的吧？"
10040070-26 = "[s3]「那不就幾乎是最一開始嗎……！！」\n[s4]「所以你其實都知道！明明全都知道還……！！」"
10040070-29 = "哼嗯……？關於這點，我想老師恐怕沒辦法指責我哦？#n不如我們就互相睜一隻眼閉一隻眼吧？"
10040070-30 = "畢竟老師也同樣對我們有所隱瞞。雖然應該是為了保護小雪醬……"
10040070-31 = "……但老師也沒有把事情真相一五一十地告訴我們，不是嗎？"
10040070-36 = "呵呵。抱歉，我剛才只是想捉弄一下老師而已，請你別放在心上。"
10040070-37 = "這一點我當然早就預料到了。#n其他人姑且不論，我相信老師肯定有自己的理由。"
10040070-38 = "其實我之所以這麼做……"
10040070-39 = "是因為看見老師和小雪醬似乎逃得相當愉快……"
10040070-40 = "所以我並不想破壞這樣的氣氛，更不想澆你們冷水。"
10040070-41 = "而且其實在抓住小雪醬之後，優香醬也多少察覺了事情的來龍去脈。"
10040070-42 = "呵呵，雖然不清楚老師的想法……"
10040070-43 = "不過我玩得很開心。#n這是我們和你們兩人之間的捉迷藏。"
10040070-44 = "沒想到你們竟然那麼有默契。#n看見你們合作得手忙腳亂的樣子也很有趣。"
10040070-45 = "老實說，如果不是剛好發生這件事的話，我們真的很久沒有好好放鬆一下了。"
10040070-46 = "沒錯，或許正是因為如此……"
10040070-47 = "就是因為難得碰上這種有趣的情況，所以我才會不自覺地想延長這場遊戲。"
10040070-48 = "啊，請別說「想玩的時候隨時都可以叫我」……老師應該也知道這是不一樣的。"
10040070-49 = "……我好像只顧著說我自己的想法呢。"
10040070-50 = "老師的感想如何呢？#n雖然這種話由我來問有點奇怪，不過今晚發生的事，老師覺得有趣嗎？"
10040070-51 = "[s5]「……唔，其實我也覺得很刺激。」\n[s6]「我很久沒有感受到這種感覺了。」"
10040070-54 = "那真是太好了。#n雖然我也懷疑自己是不是想太多了，但坦白說我確實有點擔心會讓老師覺得不高興。"
10040070-55 = "……嗯？"
10040070-56 = "突然想到小雪醬剛才說了奇怪的話？"
10040070-57 = "……我可以問問他說了些什麼嗎？"
10040070-58 = "[s7]「好像是說覺得有人在看著他。」\n[s8]「他似乎有感覺到你暗中在觀察他。」"
10040070-61 = "唔嗯……"
10040070-62 = "原來小雪醬說過那種話啊……"
10040070-63 = "我還以為自己已經很謹慎了，看來他的直覺真的很準呢。"
10040070-64 = "也對，仔細想想這也是理所當然的。#n畢竟小雪醬的這種特質……"
10040070-68 = "……哎呀。"
10040070-69 = "呵呵，我好像說錯話了呢。#n差一點就說溜嘴了。"
10040070-70 = "[s9]「……說錯話？」\n[s10]「嗯？那是什麼意思？」"
10040070-73 = "沒什麼。#n話說我們快到了呢，一起進去吧。"
10040070-74 = "……大家都在等老師呢。"
10040070-84 = "這裡？確定嗎？#n你確定是這裡嗎？你真的確定？？"
10040070-85 = "不，按照目前劍的分布狀態來看，我覺得應該不是那裡……"
10040070-86 = "機率是獨立事件，#n雖然看起來可能會覺得某個地方特別危險，但其實不管插哪裡都是一樣的……"
10040070-87 = "[ns11]「……玩得還挺嗨的呢。」\n[ns12]「他們玩得還真起勁。」"
10040070-90 = "吼唷～！！拜託你們先安靜一點！#n明明是輪到我，旁邊的人吵什麼啦！！"
10040070-91 = "要插哪裡都行，總之快點。"
10040070-92 = "好了～好了～！！我要插了哦～！#n只要順利挺過這回合，基本上就等於是勝券在握了……！"
10040070-93 = "看我的～～！！！"
10040070-98 = "啊～～～！！！怎麼可能──！！#n這到底是什麼爛遊戲！！"
10040070-103 = "（從下一輪開始加入他們一起玩遊戲）"
10040070-104 = "……啊，糟了。"
10040070-105 = "啊～！！我們這隊到底在幹嘛啦～！！"
10040070-111 = "啊，啊啊！！啊！！啊！！啊啊啊啊啊！！"
10040070-112 = "（小雪在三連敗後，含淚退出了遊戲）"
10040070-114 = "（……幾小時後）"
10040070-117 = "時間很晚了呢，差不多快十二點了。"
10040070-118 = "呵呵，小雪醬竟然已經睡得不省人事了……"
10040070-119 = "之前明明還嚷嚷著要看新年倒數的，沒想到才講完沒多久就睡著了。"
10040070-120 = "算了，硬把他叫醒好像也不太好。"
10040070-121 = "所以從現在起，就是我們這些存活者的時間了……"
10040070-122 = "……嗯？"
10040070-123 = "哎呀……"
10040070-130 = "[ns13]「……根本沒有人還醒著。」\n[ns14]「幾乎全滅了呢。」"
10040070-133 = "哎呀呀……"
10040070-134 = "真是意外。#n雖然我有預料到小雪醬和真紀醬可能會睡著……"
10040070-135 = "沒想到優香醬和貝里塔斯的大家也都這麼早就睡著了。"
10040070-136 = "是因為大家玩得太起勁了嗎？#n雖然他們剛才的確玩得很興奮。"
10040070-137 = "[s15]「畢竟他們平時都工作到很晚嘛。」\n[s16]「就是因為平常睡得少，這種日子才容易撐不住。」"
10040070-140 = "確實……也許就像老師說的那樣吧。"
10040070-141 = "不過老師你還好嗎？#n如果要說誰平時操勞過度的話，老師的情況應該比我們更嚴重吧？"
10040070-142 = "……啊。"
10040070-143 = "難道是因為我還沒有睡，所以老師才不敢睡的嗎？"
10040070-144 = "這麼說來，的確有這種可能性。#n如果我是老師的話……可能也會撐到最後才睡。"
10040070-145 = "……嗯？"
10040070-146 = "你說不是那樣？呵呵……真的嗎？"
10040070-147 = "你說真的不是？#n哼嗯……聽你回答得那麼堅決，我反而覺得更可疑了……"
10040070-151 = "……開玩笑的。#n那我就相信老師剛才說的話吧。"
10040070-152 = "我相信你之所以還沒睡，真的不是因為我的緣故。"
10040070-153 = "那麼就當作是在睡覺之前透透氣……"
10040070-157 = "[ns17]「……乃愛？」\n[ns18]「為什麼突然站起來？」"
10040070-160 = "已經快要十二點了唷？#n我剛才也說過，今年我想來進行新年倒數。"
10040070-161 = "但是在這裡倒數的話，肯定會把大家吵醒……"
10040070-162 = "所以應該換個地方比較好吧？呵呵。"
10040070-170 = "……老師你，應該不會讓我自己一個人去倒數吧？"

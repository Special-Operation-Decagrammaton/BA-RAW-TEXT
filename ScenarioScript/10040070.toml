[translation]
10040070-1 = "ตอนที่ 7;สิทธิพิเศษของคนหา"
10040070-3 = "..."
10040070-4 = "คุณ... ครู..."
10040070-5 = "........."
10040070-6 = "คุณ... ครู..."
10040070-7 = "คุณครู..."
10040070-8 = "คุณครู? คิดอะไรอยู่เหรอคะ?"
10040070-9 = "[ns1] \"มะ... ไม่มีอะไรมากหรอก ครูแค่คิดอะไรเรื่อยเปื่อยน่ะ...\"\n[ns2] \"ครูแค่พยายามนึกถึงเรื่องที่เกิดขึ้นในวันนี้น่ะ\""
10040070-12 = "ฮุฮุ อย่างนั้นสินะคะ"
10040070-13 = "แต่การเดินไปด้วยคิดอะไรไปด้วยมันอันตรายนะคะ ตรงนี้มันมืดจนมองไม่เห็นพื้นเลยนะ"
10040070-14 = "เดินต่อไปอีกหน่อยก็จะถึงแล้วละ ทุกคนกำลังรออยู่ด้วยค่ะ"
10040070-15 = "หรือว่าให้ฉันช่วยจับมือไว้มั้ยคะ? ฉันคุ้นเคยกับทางที่นี่แล้วน่ะค่ะ"
10040070-16 = "เอาละ ยื่นมือมาสิคะ..."
10040070-17 = "ล้อเล่นค่ะ คนที่ได้เห็นสีหน้าเมื่อกี้ของคุณครูคงมีแค่ฉันคนเดียวนะคะ"
10040070-18 = "พอฉันได้มาคุ้มกันคุณครูอยู่คนเดียวแบบนี้ ก็รู้สึกผิดกับคนอื่นขึ้นมานิดหน่อยนะคะ"
10040070-19 = "แต่ถึงยังไงก็ อืม..."
10040070-20 = "ถือว่านี่เป็นสิทธิพิเศษของคนหา... เอาเป็นแบบนี้ดีมั้ย? น่าจะได้ใช่มั้ยคะ?"
10040070-21 = "ฉันดูตื่นเต้นนิดหน่อยอย่างนั้นเหรอคะ? งั้นเหรอคะ...? แต่ถ้าคุณครูคิดอย่างนั้น การปล่อยให้เป็นไป#nตามที่คุณครูคิดก็ถือว่าไม่เลวนะคะ"
10040070-22 = "คะ...?"
10040070-23 = "ฉันเห็นคุณครูตั้งแต่เมื่อไรน่ะเหรอคะ? ฮุฮุ... สงสัยเรื่องนั้นสินะคะ"
10040070-24 = "นั่นสินะ ฉันต้องตอบว่ายังไงดีนะ..."
10040070-25 = "ตั้งแต่ตอนที่โคยูกิจังทิ้งคุณครูไว้ในห้อง... แล้ววิ่งหนีออกมา... หรือเปล่านะ?"
10040070-26 = "[s3] \"งั้นก็ตั้งแต่แรกเลยนี่...!!\"\n[s4] \"รู้มาตลอดเลยเหรอ! รู้ทั้งรู้แล้วแต่ก็ยัง...!!\""
10040070-29 = "หืม...? เรื่องนั้นเราก็เหมือนกันทั้งคู่ละค่ะ งั้นเราถือว่าหายกันดีมั้ยคะ?"
10040070-30 = "คุณครูเองก็มีเรื่องที่ไม่ได้บอกฉันตามตรงด้วยนี่คะ? ถึงจะบอกว่านั่นเป็นการทำเพื่อโคยูกิจังก็เถอะ..."
10040070-31 = "แต่คุณครูก็ไม่ได้มาบอกอะไรพวกฉันต่างหากเหมือนกัน..."
10040070-36 = "ฮุฮุ ขอโทษนะคะ ที่ฉันเพิ่งพูดไปมาจากความเอาแต่ใจตัวเองของฉันเอง คุณครูไม่ต้องใส่ใจก็ได้ค่ะ"
10040070-37 = "ที่ฉันทำเป็นไม่รู้เรื่องอะไร เพราะฉันคาดไว้อยู่แล้วน่ะค่ะ คนที่มาข้องเกี่ยวกับเรื่องนี้ไม่ใช่ใครที่ไหน แต่เป็นถึงคุณครู ถ้างั้นก็คงจะมีเหตุผลอะไรแน่นอนค่ะ"
10040070-38 = "แต่ฉันก็ยังมีเหตุผลที่แท้จริงต่างหากนะคะ..."
10040070-39 = "ก็โคยูกิจังกับคุณครูจะได้เล่นซ่อนหาด้วยกันนี่คะ อีกอย่าง ฉันว่านั่นน่าจะเป็นเรื่องสนุกดี..."
10040070-40 = "แล้วฉันก็ไม่อยากทำให้เสียบรรยากาศด้วยค่ะ"
10040070-41 = "ส่วนยูกะจังเอง หลังจากจับโคยูกิจังได้ก็เหมือนจะพอเดาสถานการณ์คร่าวๆ ได้ด้วยค่ะ"
10040070-42 = "ฮุฮุ ไม่รู้เหมือนกันนะคะว่าคุณครูจะรู้สึกยังไง..."
10040070-43 = "แต่ว่าฉันน่ะสนุกกับการได้เล่นซ่อนหากับทั้งสองคนมากเลยค่ะ"
10040070-44 = "ทั้งสองคนดูเข้ากันได้เป็นปี่เป็นขลุ่ย แต่ตอนที่ลุกลี้ลุกลนกันฉันก็ว่าตลกดี ส่วนตอนที่ผนึกกำลังกันก็#nน่าสนุกด้วยค่ะ"
10040070-45 = "ที่จริงแล้ว ถ้ามันไม่ได้บังเอิญเกิดขึ้น ก็คงไม่มีสถานการณ์ให้สนุกกันแบบนี้ใช่มั้ยล่ะคะ?"
10040070-46 = "ใช่ค่ะ เพราะแบบนั้น..."
10040070-47 = "พอมันเป็นสถานการณ์ที่ไม่ได้เกิดขึ้นง่ายๆ ก็เลยกลับกลายเป็นว่าฉันเองก็ยื้อเวลาไปเรื่อยๆ โดยไม่รู้ตัวค่ะ"
10040070-48 = "อ้อ ใช่ว่าฉันจะอยากให้คุณครูบอกว่า \"ถ้าอยากเล่นสนุกละก็ เรียกหาครูได้ตลอดเลยนะ\" หรอกนะคะ อย่าพูดแบบนั้นกับฉันเลยค่ะ อย่างที่คุณครูก็รู้ว่านั่นมันคนละเรื่องกันค่ะ"
10040070-49 = "เหมือนว่าฉันจะพูดอยู่ฝ่ายเดียวเลยนะคะ..."
10040070-50 = "แล้วคุณครูล่ะคะ เป็นยังไงบ้างคะ? ถึงมันจะฟังดูแปลกๆ ที่ฉันถามคำถามนี้ด้วยปากของตัวเอง แต่ว่าเรื่องทั้งหมดในคืนนี้น่ะ คุณครูสนุกมั้ยคะ?"
10040070-51 = "[s5] \"ครูก็ตื่นเต้นไม่แพ้กันเลยละ...\"\n[s6] \"ครูไม่ได้รู้สึกแบบนี้มานานเลยละ\""
10040070-54 = "โล่งอกไปทีนะคะ ถึงจะคิดว่าคุณครูคงไม่คิดแบบนี้ แต่ฉันก็แอบกังวลอยู่ค่ะว่าถ้าเกิดคุณครูไม่พอใจ#nขึ้นมาจะทำยังไง"
10040070-55 = "คะ...?"
10040070-56 = "จะว่าไปแล้ว โคยูกิจังเหมือนจะพูดอะไรแปลกๆ ขึ้นมาระหว่างนั้นด้วยเหรอคะ?"
10040070-57 = "ฉันขอถามได้มั้ยคะว่าเธอพูดอะไร...?"
10040070-58 = "[s7] \"พูดว่าเหมือนมีใครจ้องมองอยู่น่ะ\"\n[s8] \"พูดว่ารู้สึกได้ถึงสายตาของโนอาน่ะ\""
10040070-61 = "ฮืม..."
10040070-62 = "โคยูกิจังพูดแบบนั้นเหรอคะ..."
10040070-63 = "ฉันคิดว่าตัวเองเคลื่อนไหวอย่างระมัดระวังแล้วเสียอีก โคยูกิจังเป็นรุ่นน้องที่มีสัญชาตญาณดีจริงๆ เลยนะคะ"
10040070-64 = "แต่ก็... พอมาคิดดูแล้วก็ไม่แปลกใจนะคะ ก็โคยูกิจังมีลักษณะเฉพาะแบบนั้นอยู่แล้ว..."
10040070-68 = "เอ๋..."
10040070-69 = "ฮุฮุ ฉันเผลอพูดอะไรไปเนี่ย เกือบพูดอะไรยืดยาวโดยเปล่าประโยชน์แล้วค่ะ"
10040070-70 = "[s9] \"เผลอพูดงั้นเหรอ...?\"\n[s10] \"เผลอพูด? หมายถึงอะไรเหรอ?\""
10040070-73 = "ไม่มีอะไรหรอกค่ะ เราใกล้จะถึงแล้วค่ะคุณครู เข้าไปพร้อมกันเลยมั้ยคะ?"
10040070-74 = "ทุกคนกำลังรอคุณครูอยู่นะคะ..."
10040070-84 = "เอาตรงนั้นเหรอ? จริงนะ? ตรงนั้นแน่นะ? ชัวร์ใช่มั้ย??"
10040070-85 = "แต่ดูจากสถิติแล้ว ฉันว่าตรงนั้นดูไม่ปลอดภัยนะ..."
10040070-86 = "แต่ความน่าจะเป็นมันก็เท่าๆ กันหมด งั้นจะเสียบตรงไหนก็เหมือนกันนั่นละ..."
10040070-87 = "[ns11] \"กำลังเพลินกันเลยนะ...\"\n[ns12] \"ทุกคนกำลังสนุกกันอยู่สินะ\""
10040070-90 = "ฮึ่ย~!! อยู่เฉยๆ กันหน่อยสิคะทุกคน! นี่เป็นตาฉันนะ แต่ทุกคนก็ออกความเห็นเหมือนประชุมอะไรกัน#nอย่างนั้นแหละ!!"
10040070-91 = "รีบๆ เลือกเข้าเถอะ คนอื่นจะได้เล่นต่อ"
10040070-92 = "เอาละๆ~!! จะเสียบละนะ~! ถ้าอันนี้ฉันรอด ชัยชนะก็อยู่ไม่ไกลแล้ว...!"
10040070-93 = "เข้าไปเลยยยย~~!!!"
10040070-98 = "อ๊าย~~~!!! เป็นไปได้ยังไง!! นี่มันเกมวัดดวงบ้าบออะไรกันเนี่ย!!"
10040070-103 = "(จากนั้นคุณครูก็เข้ามาเล่นเกมด้วยในรอบต่อไป)"
10040070-104 = "อ่า... โดนเข้าให้แล้วไง"
10040070-105 = "อ๊าย~!! ทำไมทีมเราเป็นแบบนี้คะเนี่ย~!!"
10040070-111 = "ดะ... เดี๋ยวสิ!! โอ๊ย!! โอ๊ย!! โอ๊ยยยย!!"
10040070-112 = "(หลังจากเล่นเกมแพ้สามเกมรวด โคยูกิก็ร้องห่มร้องไห้และขอวางมือ...)"
10040070-114 = "(ไม่กี่ชั่วโมงต่อมา...)"
10040070-117 = "นี่ก็ดึกแล้วนะคะ เกือบถึงเที่ยงคืนแล้วด้วย"
10040070-118 = "ฮุฮุ โคยูกิจังก็หลับปุ๋ยไปแล้ว..."
10040070-119 = "เมื่อกี้ยังตั้งปณิธานอยู่เลยว่าจะเคาท์ดาวน์ปีใหม่"
10040070-120 = "งั้นก็ช่วยไม่ได้นะคะ จะปลุกคนที่นอนหลับอยู่ก็ไม่ได้"
10040070-121 = "งั้นคงต้องส่งท้ายปีเก่ากับคนที่ยังตื่นอยู่เท่านั้น..."
10040070-122 = "เอ๋...?"
10040070-123 = "อ้าว..."
10040070-130 = "[ns13] \"ไม่มีใครตื่นอยู่เลยแฮะ...\"\n[ns14] \"หลับกันหมดเลย...\""
10040070-133 = "ตายจริง..."
10040070-134 = "คาดไม่ถึงเลยนะคะเนี่ย ถ้าเป็นโคยูกิจังกับมากิจังฉันก็ไม่แปลกใจ..."
10040070-135 = "แต่ไม่คิดเลยนะคะว่าคนอื่นในเวอริทัสกับยูกะจังก็จะหลับไปไวขนาดนี้"
10040070-136 = "หรือว่าทุกคนเล่นสนุกกันจนเหนื่อยนะ? ก็ดูจะเป็นอย่างนั้นจริงๆ นะคะ"
10040070-137 = "[s15] \"ปกติทุกคนทำงานกันดึกดื่น ให้นอนพักผ่อนแบบนี้ละดีแล้ว\"\n[s16] \"ให้นอนชดเชยที่พักผ่อนไม่เพียงพอมาทั้งปีแบบนี้ละ\""
10040070-140 = "นั่นสิคะ... ที่ผ่านมาทุกคนคงจะเหนื่อยกันมากจริงๆ"
10040070-141 = "แล้วคุณครูไม่เป็นไรเหรอคะ? ปกติคุณครูก็มีเรื่องให้เหนื่อยเยอะแยะเลย คุณครูน่าจะต้องพักผ่อน#nมากกว่าพวกฉันอีกไม่ใช่เหรอคะ?"
10040070-142 = "อ่า..."
10040070-143 = "หรือว่าคุณครูคิดว่าฉันจะยังไม่หลับ ก็เลยสละเวลานอนอันมีค่าของตัวเองเพื่อฉันอยู่คะ?"
10040070-144 = "อาจจะเป็นอย่างนั้นก็ได้นะคะ เพราะถ้าเป็นคุณครูละก็... น่าจะไปเข้านอนเป็นคนสุดท้าย ว่ามั้ยล่ะคะ?"
10040070-145 = "คะ...?"
10040070-146 = "ไม่ใช่อย่างนั้นหรอกเหรอคะ? ฮุฮุ... จริงหรือเปล่าคะ?"
10040070-147 = "ไม่ใช่อย่างนั้นจริงๆ งั้นเหรอคะ? ฮืม ยืนกรานถึงขนาดนั้นเชียว ทำเอาฉันเริ่มสงสัยขึ้นมาแล้วนะคะ..."
10040070-151 = "ฉันล้อเล่นค่ะ... ฉันจะเชื่อคำพูดของคุณครูดูค่ะ"
10040070-152 = "ฉันจะเชื่อว่าที่คุณครูยังไม่ไปนอนตอนนี้ ไม่ใช่ว่าเป็นเพราะฉันค่ะ"
10040070-153 = "ถ้างั้นก็ถือว่าเป็นการเปลี่ยนบรรยากาศก่อนนอนสักหน่อย..."
10040070-157 = "[ns17] \"โนอา... มีอะไรเหรอ?\"\n[ns18] \"โนอา... ลุกขึ้นมาทำไมเหรอ?\""
10040070-160 = "ใกล้จะถึงเที่ยงคืนแล้วนี่คะ ฉันเองก็อยากเคาท์ดาวน์ปีใหม่บ้างเหมือนกันค่ะ"
10040070-161 = "แต่ว่าถ้าเคาท์ดาวน์ตรงนี้ ก็จะเป็นการปลุกทุกคนที่กำลังหลับสบายอยู่..."
10040070-162 = "งั้นฉันก็ควรเปลี่ยนสถานที่เคาท์ดาวน์สักหน่อยว่ามั้ยคะ? ฮุฮุ"
10040070-170 = "คุณครูคงไม่ปล่อยให้ฉันไปคนเดียวหรอกใช่มั้ยคะ...?"

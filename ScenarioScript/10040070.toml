[translation]
10040070-1 = "Episode 7;Privileges of the Seeker"
10040070-3 = "..."
10040070-4 = "Se...n...se...i..."
10040070-5 = "..."
10040070-6 = "...Se...n...sei..."
10040070-7 = "...Sensei..."
10040070-8 = "What's on your mind, Sensei?"
10040070-9 = "[ns1] \"Ah, no. I'm just...\"\n[ns2] \"I'm just thinking about everything that happened today.\""
10040070-12 = "Heehee. I see."
10040070-13 = "Well, don't think too hard and trip. It's dark in here, after all."
10040070-14 = "We're nearly there. Everyone's waiting at the end."
10040070-15 = "Would you like me to hold your hand? I'm quite familiar with this path."
10040070-16 = "Now, here..."
10040070-17 = "I'm just kidding, Sensei. It's nice that I'm the only one who gets to see that expression, though."
10040070-18 = "It almost makes me feel bad for the others. Here I am, escorting the esteemed Sensei, just the two of us."
10040070-19 = "Hm..."
10040070-20 = "Shall we consider these the privileges of the seeker who won this game of hide-and-seek against you?"
10040070-21 = "...I seem a little too excited? Is that so? I don't mind you thinking that."
10040070-22 = "...What?"
10040070-23 = "...Since when did I know? Heehee. I suppose you would wonder that."
10040070-24 = "Let's see. Since when...?"
10040070-25 = "Ah. From the moment Koyuki ran out of the Self-Reflection Room and left you in the closet."
10040070-26 = "[s3] \"That was the very start!\"\n[s4] \"You knew this whole time?!\""
10040070-29 = "It makes no difference either way, so why don't we let that one slide?"
10040070-30 = "You weren't completely honest with us either, were you? Even if it was for Koyuki's sake..."
10040070-31 = "...You really were going to hide all this from us."
10040070-36 = "Fufu. I'm sorry, it looks like my jealousy slipped out a little bit. How about we let that slide as well?"
10040070-37 = "Well, it's in line with how you are. I believed you had a reason of some sort."
10040070-38 = "...But my personal justification was a little different."
10040070-39 = "You and Koyuki were having quite the time running away and escaping. It looked fun."
10040070-40 = "I didn't want to be the one to rain on your parade."
10040070-41 = "I believe Yuuka more or less caught on sometime after she caught Koyuki."
10040070-42 = "Fufu. I can't speak for you, Sensei, but..."
10040070-43 = "...I truly enjoyed playing hide-and-seek with you two."
10040070-44 = "You were really the perfect duo. It was fun watching you flounder, and maybe even more fun watching you succeed."
10040070-45 = "And if this series of coincidences hadn't occurred, our little game would've never happened."
10040070-46 = "Maybe that's why..."
10040070-47 = "Mhm. Maybe that's why I subconsciously wanted to drag it out. This once-in-a-lifetime situation."
10040070-48 = "Ah. I think your usual response here would be, \"You can call me whenever you want to have fun,\" but you and I both know this was a little different."
10040070-49 = "...I've been rambling about myself a little too long now."
10040070-50 = "How was it for you, Sensei? It may seem like a strange question, but did you enjoy yourself this evening?"
10040070-51 = "[s5] \"I have to agree. It was pretty thrilling.\"\n[s6] \"I haven't felt like this in a long time.\""
10040070-54 = "I believed that's how you felt, but it's a relief to hear it. After all, I didn't want to make you uncomfortable."
10040070-55 = "...What?"
10040070-56 = "...You said Koyuki said a few strange things?"
10040070-57 = "Can I ask what they were?"
10040070-58 = "[s7] \"She kept saying she felt like someone was watching her.\"\n[s8] \"Maybe she was talking about you.\""
10040070-61 = "Hm..."
10040070-62 = "I see. Koyuki sensed me...?"
10040070-63 = "I was operating carefully, in my own way, but she has good instincts."
10040070-64 = "I'm not surprised to hear it, though. That's just Koyuki's ability."
10040070-68 = "...Huh?"
10040070-69 = "Fufu. Please don't mind that. A slip of the tongue. The late hour has me talking a little too much."
10040070-70 = "[s9] \"...A slip of the tongue?\"\n[s10] \"Hm? What are you talking about?\""
10040070-73 = "Don't mind me. More importantly, Sensei, we've arrived. Shall we go inside?"
10040070-74 = "...Everyone's been waiting for you."
10040070-84 = "There? Really? Are you suuure? Is that really the spot?"
10040070-85 = "No, no. That can't be right. Consider the current distribution of the pieces..."
10040070-86 = "The probabilities are independent, so it's really the same no matter where you pick."
10040070-87 = "[ns11] \"...The party's in full swing.\"\n[ns12] \"Everyone's enjoying themselves.\""
10040070-90 = "GAH! Hey! It's MY turn, so I'M gonna do what I wanna do! Stop trying to tell me what to do!"
10040070-91 = "Okay, okay. Just put it wherever you want."
10040070-92 = "That's right! If I just overcome this last obstacle, it's my win for sure!"
10040070-93 = "Let's GOOO!"
10040070-98 = "Ack!! Are you serious right now?! This game sucks! It's a stupid game!"
10040070-103 = "I joined in on the next round, and we played all sorts of games together."
10040070-104 = "Ah. I got caught..."
10040070-105 = "GAH! What the heck is our team doing?!"
10040070-111 = "AH! AHHH! UWAAAH!"
10040070-112 = "...Koyuki burst into tears and gave up after a three-game losing streak."
10040070-114 = "A few hours later..."
10040070-117 = "It's gotten quite late. It's almost midnight."
10040070-118 = "Fufu. Look at Koyuki, already sound asleep."
10040070-119 = "Wasn't she just saying she was going to stay up for the New Year's countdown?"
10040070-120 = "Nothing to be done about it. We should let her sleep."
10040070-121 = "For now, it's time for those who stayed up to—"
10040070-122 = "...Huh?"
10040070-123 = "Ah..."
10040070-130 = "[ns13] \"...Not a single soul survived.\"\n[ns14] \"This is a complete annihilation.\""
10040070-133 = "Oh dear."
10040070-134 = "Even I couldn't have predicted this. I didn't expect Koyuki and Maki to make it, but..."
10040070-135 = "Well, I hardly thought the other Veritas members and Yuuka would fall asleep."
10040070-136 = "Did they expend too much energy playing? They were certainly having a good time."
10040070-137 = "[s15] \"These kids usually work late into the night.\"\n[s16] \"Maybe they're making up for it tonight.\""
10040070-140 = "That seems to be the case."
10040070-141 = "What about you, Sensei? You're the most overworked one of us all..."
10040070-142 = "...Ah."
10040070-143 = "Am I keeping you from what precious little time you have to sleep?"
10040070-144 = "I am, aren't I? Knowing you, you would do your utmost to be the last to fall asleep."
10040070-145 = "...What?"
10040070-146 = "...Fufu. Are you sure that's not why?"
10040070-147 = "Absolutely not? Hm... It almost makes me more suspicious, how adamant you are."
10040070-151 = "...I'm kidding. I'll believe you."
10040070-152 = "I'll believe that you're not sleeping because you're not tired, not to accommodate me."
10040070-153 = "Then, if that is the truth, let's go get some air."
10040070-157 = "[ns17] \"...Noa?\"\n[ns18] \"You're not feeling tired?\""
10040070-160 = "Not in the slightest. And it's almost midnight, isn't it? I'd like to have a New Year's countdown."
10040070-161 = "We can hardly do it here and wake up all these sleeping students."
10040070-162 = "So shall we relocate? Fufu."
10040070-170 = "...You don't want me to be alone on New Year's Eve, do you?"

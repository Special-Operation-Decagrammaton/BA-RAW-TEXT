10028070-59 = "3;이치카;03;……에이. 뭐, 좋아요. 어차피 이렇게 돼 버린 거. 저도 더는 모르겠슴다."
10028070-60 = "3;이치카;07;어차피 더는 숨길 것도 없겠다, 이제부터 선생님께는 그냥 대놓고 떼쓸 테니까요. 각오하시라고요."
10028070-61 = "3;이치카;01;아침에는 선생님께 먼저 연락드려서 귀찮게 해 드릴 일 없을 거라고 했지만……."
10028070-62 = "3;이치카;03;지금은 또 상황이 많이 바뀌었잖아요?"
10028070-63 = "3;이치카;07;종종 연락드리겠슴다. 말하자면 이건 일종의 '선전포고'예요."
10028070-64 = "3;이치카;01;그렇지만 선생님께서 그렇게 하라고 하신 거니까요! 먼저 공격하신 건 선생님 쪽이니까요!\n#3;jump"
10028070-65 = "3;이치카;03;자업자득이랄까……. 합당한 보복이라고 생각하거든요. 그러니 이해해 주셔야죠?"

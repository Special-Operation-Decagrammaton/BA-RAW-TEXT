[translation]
10028070-1 = "Episode 7;Declaration of War"
10028070-3 = "I'm so, so, very sorry!"
10028070-4 = "[ns1] \"I'm sorry! I'm really ashamed!\"\n[ns2] Bow to apologize."
10028070-7 = "Tea Party Venue"
10028070-10 = "Wh-What do you mean?"
10028070-11 = "Just what is it you're attempting to apologize for right now?  "
10028070-17 = "...?"
10028070-18 = "...What?"
10028070-19 = "[s3] \"We shattered the teacup set...into a million pieces...\"\n[s4] \"Y-You haven't seen the relic yet?\""
10028070-22 = "Oh, that's..."
10028070-23 = "That's not... Ah. I believe I understand the situation now."
10028070-24 = "You see..."
10028070-28 = "I must apologize. It seems I may have put undue pressure on the both of you."
10028070-29 = "To make things simple, it's quite all right if it's broken.  "
10028070-33 = "[ns5] \"...Come again?\"\n[ns6] \"What if it's...completely shattered?\""
10028070-36 = "My concern was the implications of the relic being lost. Its current state has no bearing."
10028070-37 = "It's a rather simple solution. As long as we're in possession of it, any breakage can be restored."
10028070-38 = "With the right craftsman, you can even restore a pulverized ancient tome to its original state. Something like this is actually easy."
10028070-39 = "Your presence at the excavation authenticated our search and the teacup set itself."
10028070-40 = "Thank you again, Sensei. And the Justice Task Force member..."
10028070-41 = "Y-Yes. My name is Ichika!  "
10028070-42 = "Yes. Ichika."
10028070-43 = "Heehee..."
10028070-44 = "Thank you for your help, Ichika."
10028070-47 = "That was actually a little anticlimactic."
10028070-48 = "Here I was preparing a dramatic speech on why I deserved to keep my job at the Justice Task Force."
10028070-49 = "This ending makes me feel a little silly. I was so worried during that train ride. And for what?"
10028070-50 = "[s7] \"I found it was still very meaningful.\"\n[s8] \"Getting to know you was enough for me, Ichika.\""
10028070-53 = "What did I say about your way with words?"
10028070-54 = "You can't go around disarming people like that, Sensei."
10028070-55 = "It's funny, how I can feel like a little kid around you. Although, I guess to you, that's all I am."
10028070-59 = "Well, fine! I give in. Things have spiraled out of control, and I just don't know anymore either..."
10028070-60 = "I'm not holding back anymore! When I'm being a spoiled brat, you better remember you're the one who said it was okay!"
10028070-61 = "I said I didn't want to be a bother and contact you willy-nilly."
10028070-62 = "But things are different now! Per your request!"
10028070-63 = "Consider this my declaration of war! I'm going to contact you whenever I feel like it."
10028070-64 = "Remember that you brought this upon yourself! You attacked first!"
10028070-65 = "So I think this is a pretty fitting punishment! I don't want to hear any complaints!"
10028070-66 = "...Th-That is okay, right?"
10028070-67 = "[s9] \"Of course. I'll look forward to you reaching out.\"\n[s10] \"Reach out any time, about anything at all.\""
10028070-70 = "Heehee. Of course."
10028070-71 = "Even if you find it cumbersome, please take responsibility for your actions."
10028070-72 = "...Haha."
10028070-73 = "I'm going to become your number one most cumbersome student! I can't wait!"
10028070-74 = "Well, I think we could both use some rest after today."
10028070-75 = "I'll be seeing you for personal business, Sensei."
10028070-82 = "...Until next time."

10028070-53 = "3;이치카;17;또, 또. 그런 식으로 말씀하시고……. 그만 좀 하세요."
10028070-54 = "3;이치카;99;정말이지……. 계속해서 사람을 무방비하게 만드시는 분이네요, 선생님은."
10028070-55 = "3;이치카;04;같이 있으면 점점 어린애가 돼 버리는 느낌이라고요. 그야 물론 선생님에 비하면 애긴 하겠지만……."

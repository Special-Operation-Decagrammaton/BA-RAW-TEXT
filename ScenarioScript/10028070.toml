[translation]
10028070-1 = "第7話;宣戰"
10028070-3 = "……非常抱歉！！"
10028070-4 = "[ns1]「對不起！真的很抱歉！」\n[ns2] 低頭道歉"
10028070-7 = "茶會會場"
10028070-10 = "怎，怎麼了嗎？"
10028070-11 = "為什麼突然道歉……？"
10028070-17 = "……？"
10028070-18 = "……咦？"
10028070-19 = "[s3]「因為……茶具套組破了。」\n[s4]「還沒確認公文包裡的文物嗎？」"
10028070-22 = "啊……這樣啊……"
10028070-23 = "原來如此……我明白了。"
10028070-24 = "嗯……"
10028070-28 = "看來我似乎在無意間增加了事情的嚴重性，應該道歉的反而是我才對。"
10028070-29 = "從結論來說，那個就算破了也沒關係。"
10028070-33 = "[ns5]「……什麼？」\n[ns6]「破了也……沒關係？」"
10028070-36 = "我原先擔心的是文物的「遺失」而非「破損」。"
10028070-37 = "簡單來說，只要東西還在，即便損壞也只要加以修復就行了。"
10028070-38 = "若是委託這方面的專家，就算是碎成粉末狀的古書也能恢復原狀。#n這種程度對他來說或許還算容易的呢。"
10028070-39 = "況且挖掘工作有老師在一旁陪同，想必不會有人懷疑茶具的真偽吧。"
10028070-40 = "再次感謝您的幫助，老師。#n當然還有這位實現正義部的……"
10028070-41 = "我，我叫一花。 "
10028070-42 = "嗯，一花同學。"
10028070-43 = "呵呵……"
10028070-44 = "……那麼，祝兩位有美好的一天。"
10028070-47 = "……事情結束得比想像中還無趣呢。"
10028070-48 = "我本來都做好要脫下實現正義部制服的覺悟了。"
10028070-49 = "這樣我一路上到底在唉聲嘆氣、忐忑不安個什麼勁……"
10028070-50 = "[s7]「不過我還是覺得很有意義。」\n[s8]「光是能認識一花就已經很棒了。」"
10028070-53 = "又，又在說這種話了……還請老師適可而止哦。"
10028070-54 = "真的……是個會漸漸讓人放下戒心的人呢。"
10028070-55 = "只要和老師待在一起，感覺自己就會像個孩子一樣……#n雖然在老師面前，我確實是個孩子沒錯……"
10028070-59 = "……算了，事到如今我也不管那麼多了。"
10028070-60 = "反正也已經沒什麼好隱瞞的……#n從現在起，我會明目張膽地向老師撒嬌，請做好覺悟哦。"
10028070-61 = "雖然早上才說過不想給老師添麻煩……"
10028070-62 = "但現在情況已經大不相同了對吧？"
10028070-63 = "今後我會時常聯絡老師的。#n這是我對老師的「宣戰」。"
10028070-64 = "但這也是老師要我這麼做的！#n先發動攻擊的可是老師哦！"
10028070-65 = "這就叫自作自受嗎……我認為這是很合理的報復。#n老師應該理解吧？"
10028070-66 = "……沒問題吧？"
10028070-67 = "[s9]「當然，歡迎隨時聯絡我。」\n[s10]「再小的事也沒關係。」"
10028070-70 = "呵呵，那當然。"
10028070-71 = "就算之後覺得麻煩，也請老師自行負責哦！"
10028070-72 = "……嘿嘿。"
10028070-73 = "已經開始期待時不時就麻煩老師……成為「煩人孩子」的那一天了。"
10028070-74 = "那麼今天就先說到這邊……"
10028070-75 = "之後我會經常……「私下」來找老師的。"
10028070-82 = "……請多指教。"

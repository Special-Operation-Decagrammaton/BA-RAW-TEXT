10028070-36 = "3;나기사;02;제가 걱정했던 부분은 유물의 '분실' 쪽이지 파손 쪽은 아니었거든요."
10028070-37 = "3;나기사;01;간단한 이야기입니다. 존재하기만 하면, 부서진 건 복원하면 그만이니까요."
10028070-38 = "3;나기사;99;전문가만 찾으면 가루가 된 고서도 원상 복구시킬 수 있는 마당에, 이 정도는 오히려 쉽죠.\n#3;em;…"
10028070-39 = "3;나기사;01;어차피 발굴 작업도 선생님께서 함께해 주셨는데, 찻잔의 진위를 의심할 사람은 없을 거고요."
10028070-40 = "3;나기사;99;다시 한번 도움에 감사드립니다, 선생님. 그리고 정의실현부의……."

[translation]
10028070-1 = "ตอนที่ 7;ประกาศสงคราม"
10028070-3 = "...ขอโทษค่ะ!!"
10028070-4 = "[ns1] \"ขอโทษนะ! ครูไม่มีอะไรจะแก้ตัวเลย!\"\n[ns2] ก้มหัวขอโทษ"
10028070-7 = "ที่ประชุม สภาน้ำชา"
10028070-10 = "คะ... คะ? อะ... อะไรคะเนี่ย?"
10028070-11 = "ทำไมจู่ๆ ถึงมาขอโทษคะ...?"
10028070-17 = "......?"
10028070-18 = "...คะ?"
10028070-19 = "[s3] \"ก็ชุดถ้วยชามัน... แตกหมดเลยนี่นา\"\n[s4] \"ยังไม่ได้ตรวจสอบวัตถุโบราณเหรอ?\""
10028070-22 = "อ่า... เรื่องนั้น..."
10028070-23 = "อ๋อ เกิดเรื่องแบบนั้นขึ้นนี่เอง ค่ะ ฉันเข้าใจแล้วค่ะ"
10028070-24 = "อืม..."
10028070-28 = "ฉันเองที่ต้องเป็นฝ่ายขอโทษค่ะ เพราะฉันเหมือนเป็นสาเหตุที่ทำให้งานนี้เป็นเรื่องตึงเครียดขึ้นมา#nโดยที่ไม่ได้ตั้งใจ"
10028070-29 = "ถ้าจะให้สรุปเลยก็คือ ถึงชุดชานั้นจะแตกก็ไม่เป็นไรค่ะ "
10028070-33 = "[ns5] \"...หืม?\"\n[ns6] \"ถึงจะแตก... ก็ไม่เป็นไรเหรอ?\""
10028070-36 = "ที่ฉันกังวลคือวัตถุโบราณนั่นจะ 'หายไป' มากกว่า 'เสียหาย' น่ะค่ะ"
10028070-37 = "ไม่ได้มีอะไรซับซ้อนหรอกค่ะ เพราะตราบใดที่ยังมีอยู่ ต่อให้เสียหายไปก็แค่ฟื้นฟูขึ้นมาก็สิ้นเรื่องแล้ว#nละค่ะ"
10028070-38 = "เพียงแค่ได้ผู้เชี่ยวชาญ ต่อให้อยู่ในสภาพเศษผงก็ฟื้นฟูได้ แต่นี่ยังถือว่าเสียหายไม่เยอะมาก ยังฟื้นฟูกลับมาได้ง่ายๆ ค่ะ"
10028070-39 = "และยังไงคุณครูก็เป็นคนไปช่วยเรื่องขุดค้น คงไม่มีใครสงสัยในความแท้จริงของชุดถ้วยชาหรอกค่ะ"
10028070-40 = "ต้องขอบคุณสำหรับความช่วยเหลืออีกครั้งนะคะคุณครู ส่วนจากทางชมรมทวงความยุติธรรม..."
10028070-41 = "ฉะ... ฉันชื่ออิจิกะค่ะ "
10028070-42 = "ค่ะ คุณอิจิกะ"
10028070-43 = "ฮุฮุ..."
10028070-44 = "...ถ้างั้นก็ ขอให้วันนี้เป็นวันที่ดีนะคะ"
10028070-47 = "...เรื่องจบลงอย่างไร้ความหมายกว่าที่คิดเยอะเลยนะคะ"
10028070-48 = "ฉันอุตส่าห์เตรียมใจมาถอดชุดชมรมทวงความยุติธรรมแล้วด้วย"
10028070-49 = "เพราะงี้ฉันถึงได้เอาแต่ถอนหายใจและกังวลว่าจะเกิดอะไรขึ้นระหว่างทางที่มาค่ะ"
10028070-50 = "[s7] \"แต่ครูคิดว่านี่เป็นเรื่องมีความหมายนะ\"\n[s8] \"แค่ได้รู้เกี่ยวกับเรื่องของอิจิกะก็ถือว่าดีแล้วละ\""
10028070-53 = "เอาอีกแล้วนะ อย่ามาพูดดีๆ แบบนี้สิคะ... หยุดเลยค่ะ"
10028070-54 = "จริงๆ เลย... คุณครูเนี่ย ทำให้ฉันอยู่ในสภาพไม่พร้อมรับมืออยู่เรื่อย"
10028070-55 = "พออยู่ด้วยกันแล้วรู้สึกเหมือนเป็นเด็กเข้าไปทุกทีๆ เลยค่ะ ถึงจะถือว่ายังเป็นเด็กเมื่อเทียบกับคุณครูก็#nเถอะ..."
10028070-59 = "...แต่ว่ามันก็ดีแล้วละค่ะ ในเมื่อเป็นแบบนี้แล้ว ฉันก็ไม่รู้ด้วยแล้ว"
10028070-60 = "ยังไงซะจากนี้ไปฉันก็ไม่มีอะไรต้องปิดบังอยู่แล้ว จากนี้ฉันจะเปิดเผยทุกอย่างกับคุณครูเลยค่ะ เตรียมตัวไว้ได้เลย"
10028070-61 = "เมื่อเช้าฉันบอกไปว่าจะไม่ติดต่อไปรบกวนคุณครูก่อนก็จริง..."
10028070-62 = "แต่ตอนนี้สถานการณ์มันเปลี่ยนไปแล้วนี่คะ?"
10028070-63 = "งั้นฉันจะติดต่อไปเรื่อยๆ นะคะ นี่ถือเป็นการ 'ประกาศสงคราม' อย่างหนึ่งเลยละค่ะ"
10028070-64 = "ก็คุณครูบอกให้ฉันทำอย่างนั้นเองนี่คะ! ฝ่ายที่โจมตีฉันก่อนคือคุณครูค่ะ!"
10028070-65 = "นี่แหละกรรมตามสนอง... ฉันว่านี่คือการแก้แค้นที่สมเหตุสมผลค่ะ เพราะงั้นก็ช่วยเข้าใจด้วยนะคะ"
10028070-66 = "...คะ? ไม่เป็นไรใช่มั้ยคะ?"
10028070-67 = "[s9] \"แน่นอน ติดต่อมาได้ตลอดเลย\"\n[s10] \"ต่อให้เป็นเรื่องเล็กน้อยก็ไม่เป็นไร\""
10028070-70 = "ฮุฮุ แน่นอนค่ะ"
10028070-71 = "จากนี้ต่อให้รู้สึกว่าน่ารำคาญ แต่ก็รับผิดชอบตัวเองเอานะคะ"
10028070-72 = "...แหะๆ"
10028070-73 = "ฉันเริ่มตั้งตารอวันนั้นแล้วละค่ะ วันที่จะได้เป็น 'เด็กที่กวนใจ' คุณครู"
10028070-74 = "ฮุฮุ... งั้นวันนี้ฉันขอตัวกลับก่อนนะคะ..."
10028070-75 = "ไว้ต่อไป... มาเจอกันด้วย 'เรื่องส่วนตัว' บ่อยๆ นะคะคุณครู"
10028070-82 = "...ขอฝากตัวด้วยนะคะ"

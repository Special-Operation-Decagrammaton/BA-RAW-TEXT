10028070-47 = "3;이치카;17;……뭔가 생각보다 훨씬 더 실없이 끝나 버렸슴다."
10028070-48 = "3;이치카;16;경우에 따라서는, 진짜로 정의실현부 옷 벗을 각오까지도 했는데 말이죠."
10028070-49 = "3;이치카;04;이래서야 오는 내내 계속 한숨 쉬며 걱정한 것들이 다 뭐가 되는지…….\n#3;em;[땀]"
10028070-50 = "[s7] \"그래도 나는 꽤 의미 있었다고 생각해.\"\n[s8] \"이치카에 대해 알게 된 것만 해도 좋았어.\""

[translation]
10019070-9 = "อาซึสะจัง... ที่เรากำลังเห็นอยู่... มะ...มันใช่สิ่งนั้นใช่มั้ยคะ...?"
10019070-10 = "อื้อ ไม่ผิดแน่นอน นั่นมัน..."
10019070-11 = "เพโรโร่ซิลล่า...!!"
10019070-13 = "ฮิฟุมิ ที่บอกว่าเพโรโร่ซิลล่ามีชีวิตอยู่ในหัวใจของเราทุกคนน่ะ หมายถึงแบบนี้เหรอ?"
10019070-14 = "คะ? มะ...ไม่ใช่นะคะ ไม่ได้หมายถึงแบบนี้..."
10019070-19 = "พวกเราเองก็ตรวจสอบพบเช่นกันค่ะ พบสัตว์ประหลาดยักษ์ที่เขตชิราโทริ D.U. ค่ะ"
10019070-26 = "หวาาาา-!? เจ้านั่นมันตัวอะไรน่ะ?!"
10019070-27 = "สุดยอด-!! ยิงเลเซอร์จากตาได้ด้วย!!"
10019070-28 = "จะลองเข้าไปใกล้ๆ จากทางนั้นดูนะคะ จับให้แน่นๆ ค่ะ!"
10019070-29 = "จะรีบรวบรวมกำลังคนที่ต่อสู้ได้มาให้ได้มากที่สุดและเข้าสกัดกั้นค่ะ"
10019070-31 = "พะ...พวกเราเองก็จะไปสมทบด้วยค่ะ! อาซึสะจัง จับให้แน่นๆ นะคะ!"
10019070-32 = "อื้อ!"

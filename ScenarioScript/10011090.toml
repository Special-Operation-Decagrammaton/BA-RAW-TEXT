[translation]
10011090-1 = "ตอนที่ 9; กฎเหล็กของ[ruby=สาว]นินจา[/ruby]"
10011090-7 = "อ๊ากกกก ทุกอย่างพังไม่เป็นท่าหมดแล้ว!"
10011090-8 = "แผนการของศาสตราจารย์ยิ้มหวานอะไรนี่ มันเกิดอะไรขึ้นกันแน่!"
10011090-14 = "อะฮะฮ่ะ~ ทุกคนกำลังพยายามกันอย่างหนักเลยสินะคะ~?"
10011090-15 = "การไล่ล่าเริ่มจะเข้มข้นขึ้นเรื่อยๆ แล้วค่ะ~"
10011090-16 = "บทสรุปจะเป็นยังไงกันน้า~! ชักจะอยากรู้แล้วละค่ะ~!"
10011090-21 = "เอาอีกแล้ว... จู่ๆ ก็ถ่ายทอดสดอย่างอวดดีแบบนั้น...!"
10011090-22 = "ตอนแรกก็แค่... ตั้งใจว่าจะทำให้งานแลกเปลี่ยนวุ่นวาย และทำให้พวกนั้นยอมรับข้อเสนอก็แค่นั้น!"
10011090-23 = "แต่ดันกลายเป็นแบบนี้ไปซะได้...! ไปตามหาแล้วจัดการด้วยตัวเองเลยดีกว่า!"
10011090-24 = "ต่อจากนี้เราจะบุกเข้าไปหาหัวหน้าชมรมหยินหยาง...!"
10011090-25 = "มะ... หมายความว่าไงน่ะ?! เอาจริงเหรอ?!"
10011090-26 = "ใช่! ต้องอย่างนี้สิถึงจะสมกับที่เป็นหัวหน้าของเรา!"
10011090-31 = "นั่นไง! พวกปีศาจอยู่ตรงนั้น!"
10011090-34 = "เจ้าพวกนั้น?! ถึงขั้นต้องเอารถถังมาเลยเหรอ?!"
10011090-35 = "ทะ... ทำยังไงดีล่ะทีนี้?!"
10011090-39 = "ใช้ระเบิดพังสะพานทางเข้าทิ้งซะ..."
10011090-41 = "อะฮะฮ่า! ดีเลย! นั่นแหละ!"
10011090-42 = "ระเบิดโลด!"
10011090-49 = "ระ... ระเบิดเมื่อกี้นี้มันอะไรน่ะ?!"
10011090-50 = "เจ้าพวกนั้น...! ระเบิดสะพานสำหรับข้ามไปฝั่งนั้นงั้นเหรอ?! บ้าไปแล้วรึไง?!"
10011090-51 = "ว้าว! อิซุนะ เคยเห็นอะไรแบบนี้ในละครค่ะ! เคล็ดลับในการไล่ล่าคนร้ายสินะคะ! นินนิน!"
10011090-55 = "[ns] \"เคล็ดลับรึเปล่าครูก็ไม่รู้หรอกนะ... อิโรฮะ จะเอายังไงต่อล่ะ?!\""
10011090-56 = "ฮ่า! สะพานโดนตัดขาดแล้ว ตั้งใจจะขัดขวางการไล่ล่าสินะ?"
10011090-57 = "พังจนไม่เหลือชิ้นดีเลยนะคะ!"
10011090-58 = "หะ... หืมม?!"
10011090-59 = "คุณครู แล้วก็ทุกคนจับให้แน่นๆ นะคะ"
10011090-60 = "[s] \"ดะ... เดี๋ยวสิ จะทำอะไรน่ะ?!\""
10011090-78 = "ก็แค่กระโดดข้ามไปก็ได้แล้ว แค่สะพานพังเอง"
10011090-79 = "ถ้าแค่นี้ละก็ข้ามไปได้อยู่แล้วค่ะ"
10011090-84 = "มันจะไปข้ามได้ยังไงกันเล่า...!"
10011090-87 = "เราก็แค่ต้องเร่งความเร็ว..."
10011090-88 = "หันกระบอกปืนใหญ่ไปด้านหลังแล้วยิง แรงกระแทกจะทำให้เราข้ามไปได้!"
10011090-89 = "ใช่แล้วค่ะ! นั่นคือแผนการของเรา!"
10011090-92 = "เอาจริงเหรอ?! แบบนั้นจะได้ผลเหรอ?!"
10011090-95 = "ฉันเคยเห็นในหนัง! เป็นไปได้อยู่แล้วค่ะ!"
10011090-96 = "เอาละ! ต่อจากนี้ต้องรวมพลังกันแล้วค่ะ...!!"
10011090-102 = "อ๊ากกกก?!"

[translation]
10011090-1 = "第9話;[ruby=少女]忍者[/ruby]的鐵則"
10011090-7 = "這是什麼情況，全都變得亂七八糟了嘛！"
10011090-8 = "笑咪咪教授的作戰怎麼會……！"
10011090-14 = "喵哈哈～大家都在努力嗎～？"
10011090-15 = "越演越烈的追擊戰～"
10011090-16 = "也即將接近尾聲～！結果究竟會如何呢～！"
10011090-21 = "可惡……該死的陰陽部！"
10011090-22 = "呿，打從一開始「讓交流會陷入混亂，逼他們接受要求」的想法就太天真了嗎！"
10011090-23 = "既然如此……！就直接讓他們嘗嘗子彈的厲害！"
10011090-24 = "出發吧，向陰陽部突擊！"
10011090-25 = "真，真的假的！？"
10011090-26 = "原來如此，不愧是隊長的說！"
10011090-31 = "發現妖怪劇團了！"
10011090-34 = "什麼，竟然是戰車！？"
10011090-35 = "該，該怎麼辦才好！？"
10011090-39 = "……用炸彈炸斷城門前的橋樑。"
10011090-41 = "哦～真是個好主意！這樣他們就追不過來了！"
10011090-42 = "來場華麗的爆炸吧～！"
10011090-49 = "剛，剛才的爆炸是……！？"
10011090-50 = "糟糕！橋是不是被炸飛了！？"
10011090-51 = "哦哦哦！伊樹菜有在電視劇裡看過！是追擊戰的王道劇情對吧！"
10011090-55 = "[ns]「雖然不知道是不是王道……伊呂波，該怎麼辦？」"
10011090-56 = "將橋炸毀，試圖阻斷追擊啊……"
10011090-57 = "……太天真了。"
10011090-58 = "咦，為什麼一派輕鬆！？"
10011090-59 = "老師，還有其他人請好好抓緊了。"
10011090-60 = "[s]「該不會……」"
10011090-78 = "沒有立足點又如何。"
10011090-79 = "怎麼可能因為這點程度的小事就放棄呢。"
10011090-84 = "你在說什麼啊！？喂！？"
10011090-87 = "需要的是速度──"
10011090-88 = "請把砲管向後轉，做好發射準備。"
10011090-89 = "利用發射的衝擊飛過去。"
10011090-92 = "真的沒問題嗎！？"
10011090-95 = "沒問題的，我有在電影裡看過。"
10011090-96 = "請做好準備……！！"
10011090-102 = "哇啊啊啊啊啊啊────！！？！？"

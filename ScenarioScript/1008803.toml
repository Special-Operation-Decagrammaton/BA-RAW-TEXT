[translation]
1008803-1 = "ชุดที่เหมาะกับบรรยากาศ"
1008803-4 = "(คุณครูไปที่สำนักงานหน่วยรับจ้างสารพัดตามเวลาที่นัดกับคาโยโกะไว้)"
1008803-8 = "อ้อ... มาแล้วเหรอครู"
1008803-9 = "ประตูไม่ได้ล็อก เข้ามาสิ"
1008803-10 = "[ns1] \"ขอเสียมารยาทหน่อยนะ~\"\n[ns2] เปิดประตูแล้วเข้าไปข้างใน"
1008803-17 = "ฉันกำลังรออยู่เลย"
1008803-18 = "ถือเป็นเรื่องพิเศษนะที่ครูแวะมาในเวลาแบบนี้"
1008803-22 = "สมาชิกคนอื่นน่ะเหรอ...?"
1008803-23 = "ตอนนี้ไม่อยู่กันหรอก คนอื่นมีงานของตัวเองที่ต้องทำน่ะ"
1008803-24 = "พอบอกว่าครูจะมา ก็พากันบอกว่าเสียดายที่ไม่อยู่ เอาไว้แวะเข้ามาตอนที่คนอื่นอยู่กันด้วยนะครู"
1008803-25 = "ทักทายกันเท่านี้ก็พอ..."
1008803-29 = "ครูบอกว่ามาหาข้อมูลบางอย่างใช่มั้ย? พอดีทางเราก็มีหาข้อมูลไว้บ้าง หวังว่าจะเป็นประโยชน์นะ"
1008803-30 = "รอแป๊บหนึ่งนะ แล้วฉันจะไปเอามาให้"
1008803-34 = "อืม น่าจะอยู่แถวๆ นี้นะ"
1008803-38 = "นี่มันแฟ้มเอกสาร... ส่วนนี่ก็กระสุนปืน..."
1008803-39 = "แล้วก็..."
1008803-43 = "[ns3] \"หืม? คาโยโกะ ในกล่องอันนั้นมัน...\"\n[ns4] \"ชุดเดรสที่ใส่ตอนทำภารกิจครั้งก่อนนี่นา\""
1008803-46 = "หืม...?"
1008803-47 = "อ่า... ชุดนี้..."
1008803-48 = "ก็... มันไม่ใช่ชุดที่ฉันใส่เวลาปกติอยู่แล้ว และต่อให้ใส่ก็มีแค่ตอนทำภารกิจของหน่วยรับจ้างสารพัด"
1008803-49 = "ฉันก็เลยคิดว่าเป็นชุดของหน่วย ก็เลยเอามาไว้ที่นี่น่ะ"
1008803-50 = "[s5] \"ฝุ่นเกาะหมดแล้วนะ\"\n[s6] \"ปล่อยทิ้งไว้แบบนี้น่าเสียดายแย่เลย\""
1008803-53 = "งั้นเหรอ? ฉันไม่เคยคิดแบบนั้นมาก่อนเลย..."
1008803-54 = "คิดแค่ว่ามันไม่เหมาะกับฉันสักเท่าไรน่ะ..."
1008803-58 = "ไม่ใช่แบบนั้นงั้นเหรอ...? มันเข้ากับฉันเหรอ...?"
1008803-62 = "อ่า..."
1008803-63 = "ถึงจะพูดตามมารยาท แต่ยังไงก็ถือว่าเป็นคำชม งั้นฉันจะรับไว้แล้วกันนะ"
1008803-64 = "แต่ว่าเรื่องแบบนี้ไม่จำเป็นต้องพูดตามมารยาทก็ได้"
1008803-65 = "ฉันรู้ดีกว่าใครอยู่แล้วน่ะว่าพอใส่แล้วตัวเองดูเป็นยังไง"
1008803-66 = "ไม่ได้แค่พูดตามมารยาทงั้นเหรอ? ที่พูดก็เพราะ... คิดอย่างนั้นจริงๆ เหรอ?"
1008803-69 = "ครูนี่เป็นคนดีจังเลยนะ"
1008803-70 = "เข้าใจแล้ว ฉันรู้แล้วละ งั้นก็เลิกพูดได้แล้ว ครูมาที่นี่เพราะมีงานที่ต้องทำไม่ใช่หรือไง"
1008803-74 = "ไปนั่งรอตรงนั้นก่อนนะ แล้วฉันจะรีบไปหามาให้"
1008803-81 = "(ไม่นานหลังจากนั้น คาโยโกะก็เอาเอกสารที่คุณครูต้องการมาให้)"
1008803-85 = "หาเจอแล้ว"
1008803-89 = "นี่ไงครู หวังว่าจะเป็นประโยชน์นะ"
1008803-90 = "ไม่ต้องขอบใจหรอก ปกติฉันได้ความช่วยเหลือจากครูไม่น้อยเลย ถือว่านี่เป็นการตอบแทน..."
1008803-94 = "ว่าไงนะ...?"
1008803-95 = "ฉันต้องเหนื่อยกับการหาของให้ เลยจะเลี้ยงข้าวเย็นตอบแทนเหรอ?"
1008803-99 = "อ่า..."
1008803-100 = "เมื่อกี้ฉันเพิ่งบอกไปเองว่าไม่ต้องทำแบบนั้นก็ได้"
1008803-101 = "[s7] \"ถ้าไม่ได้เลี้ยงข้าว ครูจะไม่สบายใจน่ะ\"\n[s8] \"ผู้ใหญ่ก็เป็นกันอย่างนี้ละ คาโยโกะ\""
1008803-106 = "เฮ้อ..."
1008803-107 = "หวังว่าต่อไปจะไม่ใช้คำแก้ตัวแบบนี้อีกบ่อยๆ นะ"
1008803-108 = "แต่ก็เอาเถอะ... ก็ช่วยไม่ได้... ถ้าครูพูดถึงขนาดนั้น ฉันก็คงปฏิเสธไม่ได้..."
1008803-109 = "งั้นก็ได้ ฉันจะยอมให้เลี้ยงข้าวก็แล้วกัน"
1008803-110 = "งั้นวันนี้กลับไปก่อนเถอะ ไว้คราวหน้ามีเวลาก็บอกฉันนะ แล้วฉันจะไปหา"
1008803-116 = "งั้นก็... ไว้เจอกันตอนนั้นนะครู"
1008803-119 = "(จากนั้นคุณครูก็เอาเอกสารที่ได้รับมาจากคาโยโกะกลับไปทำงานต่อที่ชาเล่ต์)"
1008803-123 = "(หลังจากนั้นก็จองร้านอาหาร และติดต่อคาโยโกะเพื่อบอกวันเวลาและสถานที่)"
1008803-133 = "(ร้านอาหารที่คุณครูจองไว้คือร้านพาสต้าร้านดังที่อยู่ในละแวกนี้)"
1008803-138 = "ฉันว่าฉันออกมาล่วงหน้าแล้ว แต่ครูมาถึงก่อนอีกนะ"
1008803-145 = "[ns9] \"อ๊ะ... คาโยโกะ\"\n[ns10] \"ทางนี้ คาโย...\""
1008803-150 = "[ns11] \"คาโยโกะ...?!\"\n[ns12] \"ใช่ชุดเดรสมาเหรอเนี่ย?\""
1008803-153 = "กะแล้วเชียวว่าต้องตกใจ ฉันคิดอยู่แล้วละว่าต้องเป็นแบบนี้"
1008803-154 = "แต่ครูเป็นคนบอกเองนี่นาว่าปล่อยชุดทิ้งไว้มันก็เสียดายแย่ แล้วฉันก็คิดว่าน่าจะเหมาะกับบรรยากาศ#nร้านอาหาร..."
1008803-155 = "และถ้าไม่ได้ใส่ในวันนี้ ก็คงไม่มีโอกาสอื่นได้ใส่"
1008803-156 = "หรือว่า... ตอนนั้นครูแค่พูดออกไปเฉยๆ น่ะ?"
1008803-157 = "[s13] \"ไม่เลย ไม่ใช่แบบนั้นนะ\"\n[s14] \"ที่ครูตกใจเพราะคาโยโกะสวยมากต่างหาก...!\""
1008803-160 = "ฮุฮุ... ฉันล้อเล่นหรอกน่า"
1008803-161 = "ครูอุตส่าห์จะเลี้ยงข้าวทั้งที ฉันเลยไม่อยากออกมาแบบกิ๊กก๊อกน่ะ"
1008803-168 = "ถ้างั้นก็..."
1008803-169 = "ขอบคุณนะครู... ฉันจะกินให้อร่อยเลย"

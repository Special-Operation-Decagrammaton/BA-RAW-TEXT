[translation]
1011806-1 = "Unexpected Sleep"
1011806-2 = "Hey! Sensei!"
1011806-3 = "[s1] \"Hi, Nozomi.\"\n[s2] \"You're here early.\""
1011806-6 = "I'm a student rep. I should be here early."
1011806-10 = "*yawn*"
1011806-11 = "[ns3] \"Careful you don't tear your mouth with that yawn.\"\n[ns4] \"You tired?\""
1011806-14 = "Ugh, I had the night shift yesterday. "
1011806-15 = "Feeling kind of stiff this morning..."
1011806-16 = "[s] \"You worked late? You should've rested up, then!\""
1011806-17 = "Pahyahya, it's fine! It's fine!"
1011806-18 = "It's worth being tired to hang out with you."
1011806-19 = "So what should I do?"
1011806-21 = "Despite my worries, Nozomi kept on smiling, saying she was fine."
1011806-42 = "[ns] \"You...should get some sleep.\""
1011806-44 = "No, no! I'm fine!"
1011806-45 = "I'm completely fine, pahyahya!"
1011806-46 = "[s5] \"At least go lie down on that sofa for a bit.\"\n[s6] \"You can do that much, right?\""
1011806-49 = "Mm, all right, just for a little while..."
1011806-56 = "Mmm..."
1011806-57 = "Whoa... I feel like I'm melting..."
1011806-58 = "[ns] \"You can nod off. I'm almost done with work.\""
1011806-59 = "No, no. I shouldn't."
1011806-61 = "It'd be a shame to fall asleep after coming...all the way here..."
1011806-62 = "..."
1011806-67 = "As she drifted off, I put a blanket over her."
1011806-68 = "She woke up late in the evening, laughing about how much time she'd wasted."

[translation]
1011806-1 = "意外的睡眠"
1011806-2 = "哈～囉～！老師！"
1011806-3 = "[s1]「嗨，希望。」\n[s2]「你今天來得很早耶。」"
1011806-6 = "當值日生總是得早點來嘛。"
1011806-10 = "呼啊～～～"
1011806-11 = "[ns3]「好大的哈欠！」\n[ns4]「你現在很累嗎？」"
1011806-14 = "啊～因為我昨天開夜班的車。 "
1011806-15 = "所以現在還有點累累的。"
1011806-16 = "[s]「工作到很晚嗎？那在這裡休息吧！」"
1011806-17 = "噗哈哈，沒關係！我沒事啦！"
1011806-18 = "畢竟是來看老師的，稍微累一點也沒關係。"
1011806-19 = "好！那我該做什麼呢？"
1011806-21 = "（雖然很擔心，但希望一直笑著說沒事）"
1011806-42 = "[ns]「……希望，要不要睡一下？」"
1011806-44 = "不用不用！我沒事啦！"
1011806-45 = "完全沒問題，噗哈哈！"
1011806-46 = "[s5]「去沙發那邊稍微躺一下吧。」\n[s6]「這樣總可以吧？」"
1011806-49 = "唔嗯，那我就稍微靠一下……"
1011806-56 = "嗯……"
1011806-57 = "哇……身體快融化了……"
1011806-58 = "[ns]「放心睡吧，工作幾乎都做完了。」"
1011806-59 = "不不不，那怎麼行呢。"
1011806-61 = "難得能到夏萊……睡著太可惜了……所以……"
1011806-62 = "……"
1011806-67 = "（幫睡著的希望蓋上毯子）"
1011806-68 = "（很久後才醒來的希望，笑著表示睡太久了實在很可惜）"

[translation]
1011806-1 = "การนอนที่คาดไม่ถึง"
1011806-2 = "สวัส~ ดี~! คุณครู!"
1011806-3 = "[s1] \"สวัสดี โนโซมิ มาเร็วจังเลยนะ\"\n[s2] \"สวัสดี โนโซมิ วันนี้มาเร็วเลยนะ\""
1011806-6 = "วันนี้เวรฉันนี่นา ก็ต้องรีบมาสิ"
1011806-10 = "ฮ้าวว~"
1011806-11 = "[ns3] \"หาวอะไรขนาดนั้นน่ะ\"\n[ns4] \"ง่วงเหรอ?\""
1011806-14 = "พอดีเมื่อวานฉันทำงานกะดึกมาน่ะ "
1011806-15 = "ก็เลยปวดเนื้อเมื่อยตัวอยู่หน่อยๆ"
1011806-16 = "[s] \"ทำงานมาจนถึงดึกดื่นเลยเหรอ? งั้นก็ควรพักผ่อนสิ!\""
1011806-17 = "วะฮะฮ่า ไม่เป็นไรหรอก! ฉันยังไหว!"
1011806-18 = "ได้มาเจอคุณครูทั้งที ต่อให้เหนื่อยก็ไม่เป็นไรหรอก"
1011806-19 = "เอาละ! งั้นให้ฉันช่วยทำอะไรล่ะ?"
1011806-21 = "(ถึงคุณครูจะกังวล แต่โนโซมิก็ยิ้มให้และบอกว่าเธอสบายดี)"
1011806-42 = "[ns] \"โนโซมิ... พักผ่อนสายตาสักหน่อยมั้ย?\""
1011806-44 = "ไม่หรอก ไม่เป็นไร!"
1011806-45 = "ฉันไม่หวั่นหรอกน่า วะฮะฮ่า!"
1011806-46 = "[s5] \"งั้นช่วยไปนอนพักที่โซฟาตรงโน้นหน่อยนะ\"\n[s6] \"งั้นไปนอนเล่นที่โซฟาตรงโน้นก่อนนะ\""
1011806-49 = "อืม งั้นทำตามคำสั่งดูหน่อยแล้วกัน..."
1011806-56 = "อืม..."
1011806-57 = "ว้าว... เหมือนตัวจะละลายไปกับโซฟาเลย..."
1011806-58 = "[ns] \"หลับเลยก็ได้นะ ครูทำงานเกือบเสร็จแล้ว\""
1011806-59 = "มะ... ไม่ได้หรอก ให้ฉันทำแบบนั้นได้ยังไง"
1011806-61 = "ได้มาชาเล่ต์ทั้งที ถ้ามาหลับอยู่ก็น่า... เสียดาย..."
1011806-62 = "..."
1011806-67 = "(คุณครูห่มผ้าให้โนโซมิที่นอนหลับปุ๋ย)"
1011806-68 = "(กว่าโนโซมิจะตื่นก็เป็นเวลาค่ำแล้ว และเมื่อตื่นก็หัวเราะและบอกว่าไม่น่าเผลอหลับไปเลย)"

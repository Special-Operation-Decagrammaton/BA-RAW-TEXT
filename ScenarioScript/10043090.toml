10043090-34 = "2;레이;13;저는 새로 태어났다고요! 어제 일로 확실히 깨달았어요!\n#2;em;[한숨]"
10043090-35 = "2;레이;14;말하자면 마침내 잠재력을 터트린 진격의 샛별! 각성하고야 만 유망주가 되고야 만 것이죠!"

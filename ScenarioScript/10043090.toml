10043090-21 = "2;레이;05;무슨 말씀이세요, 선생님? 저는 밀레니엄 야구부의 4번 타자, 노마사 레이라고요!"
10043090-22 = "2;레이;11;이제부터 밀레니엄 야구부를 중흥으로 이끌 중책을 맡은 몸으로, 다른 데에 시선을 돌려서는 안 되잖아요!\n#2;em;[한숨]"
10043090-23 = "[s] \"아, 그런 이야기였구나. 응…….\""
10043090-24 = "2;레이;10;하지만 사은품으로 보내 주신 이 야구용품들은, 감사히 밀레니엄 야구부의 장비로 사용하도록 하겠습니다."
10043090-25 = "2;레이;99;……야구의 얼마 안 되는 단점이라고 해야 할지, 장비가 조금 비싸거든요."
10043090-26 = "2;레이;13;그보다, 정말로 믿기지 않네요. 제가 그 자리에서……\n#2;stiff"
10043090-27 = "2;레이;03;진짜로! 홈런을 쳤다니요!\n#2;em;[반짝]\n#2;hophop\n#2;closeup\n#fontsize;100"
10043090-28 = "2;레이;14;연습 경기나 시범 경기에서는 물론, 훈련 중에서도 홈런을 친 적은 없었는데 말이죠!\n#2;closeup"

[translation]
10043090-1 = "ตอนที่ 9;ออกกำลังกายปิดจบ"
10043090-2 = "(แล้ววันแห่งชัยชนะที่ร้อนแรงก็ผ่านไป)"
10043090-3 = "(เมื่อเวลาล่วงเลยไป วันใหม่ก็มาถึง)"
10043090-9 = "ลู่แข่งกรีฑา มิลเลเนียม"
10043090-12 = "อ๊ะ คุณครู! สวัสดีค่ะ!"
10043090-13 = "[s] \"อะไรกันเนี่ย... อุปกรณ์เบสบอลกองเท่าภูเขาเลย?!\""
10043090-14 = "อ้อ ของพวกนี้น่ะเหรอคะ? ทีมคอร์กี้ เบรฟส์ส่งอุปกรณ์เบสบอลมาให้เป็นของขวัญค่ะ!"
10043090-15 = "พวกเขายังบอกด้วยว่าถ้าฉันสนใจ ก็อยากทำสัญญาให้ฉันเป็นแบตเตอร์สำรองของทีมด้วย..."
10043090-16 = "แต่ว่าฉันปฏิเสธไปค่ะ!"
10043090-17 = "[s] \"คงลำบากใจน่าดูเลยสินะ ครูเข้าใจ\""
10043090-21 = "หมายความว่ายังไงเหรอคะ คุณครู? ฉันคือโนมาสะ เรย์ แบตเตอร์ลำดับที่ 4 ของชมรมเบสบอล#nมิลเลเนียมนะคะ"
10043090-22 = "ตั้งแต่นี้ไปฉันมีหน้าที่รับผิดชอบอันยิ่งใหญ่ที่จะฟื้นฟูชมรมเบสบอลมิลเลเนียมให้กลับมา ฉันจะไปอุทิศตัวกับเรื่องอื่นไม่ได้หรอกค่ะ!"
10043090-23 = "[s] \"อ๋อ เป็นอย่างนี้เองเหรอ อืม...\""
10043090-24 = "ฉันจะเอาอุปกรณ์เบสบอลที่ทางนั้นส่งมาให้ชมรมเบสบอลมิลเลเนียมใช้ด้วยความขอบคุณเลยค่ะ"
10043090-25 = "อุปกรณ์เบสบอลเป็นของที่ราคาสูงน่ะค่ะ ถ้าจะบอกว่าเบสบอลมีข้อด้อย ก็คงเป็นเรื่องนี้ค่ะ"
10043090-26 = "แต่จะว่าไป ฉันยังไม่อยากเชื่อเลยนะคะ ว่าฉันได้ไปอยู่ตรงนั้น..."
10043090-27 = "แล้วก็! ตีลูกโฮมรันได้ด้วย!"
10043090-28 = "ที่ผ่านมาฉันไม่เคยตีโฮมรันได้เลยค่ะ ไม่ว่าจะในเกมฝึกซ้อม เกมอุ่นเครื่อง หรือในการฝึกซ้อมของตัวเองก็ตาม!"
10043090-29 = "[s] \"อย่างนั้นสินะ...\""
10043090-33 = "คุณครู? ทำไมถึงจ้องฉันด้วยสีหน้าน่าเวทนาแบบนั้นล่ะคะ?"
10043090-34 = "ฉันเกิดใหม่แล้วนะคะ! เรื่องเมื่อวานทำให้ฉันรู้แล้วค่ะ!"
10043090-35 = "ดาวดวงใหม่ระเบิดศักยภาพออกมาแล้ว! ฉันจะพัฒนาตัวเองแล้วเป็นผู้เล่นดาวรุ่งให้ได้เลยค่ะ!"
10043090-36 = "คอยเฝ้าดูฉันด้วยนะคะ คุณครู! วันนี้จะแตกต่างจากเมื่อวานแน่นอนค่ะ!"
10043090-40 = "รอฉันก่อนนะ หุ่นยนต์พิชเชอร์ & แบตเตอร์ฝึกซ้อมจากชมรมวิศวกรรม!"
10043090-41 = "ต่อให้ขว้างลูกด้วยแพทเทิร์นตามบิ๊กดาต้า และต่อให้ขว้างลูกแบบเปลี่ยนทิศทางที่แยกแยะได้ยากทั้ง 15 แบบได้อย่างอิสระ!"
10043090-42 = "แต่วันนี้ฉันจะหวดให้ข้ามกำแพงไปให้หมดเลย!!!"
10043090-47 = "(แล้วเรย์ก็เดินเข้าสนามซ้อมไปด้วยความมั่นใจ...)"
10043090-65 = "(และพ่ายแพ้ให้หุ่นยนต์ฝึกซ้อมอย่างอาจหาญ)"
10043090-69 = "ไหงเป็นงี้ล่ะ?!?!?!"
10043090-74 = "มันก็ย่อมมีบ้างที่จะตีไม่ดี! ฉันก็ไม่ปฏิเสธหรอกนะ!"
10043090-75 = "แต่ทำไมเปอร์เซ็นต์ของฉันตกจาก 8% ไปอยู่ที่ 0.79% เฉยเลย? ทำไมสถิติถึงแย่ลงล่ะ!"
10043090-76 = "[s] \"อืม... เพราะออกแรงที่ไหล่มากเกินไปหรือเปล่า?\""
10043090-77 = "นั่นมันเป็นคำที่โค้ชพูดส่งๆ กับนักกีฬาที่ตัวเองไม่ได้สนใจเท่าไรไม่ใช่เหรอคะ!!!"
10043090-82 = "อยู่ตรงนี้สินะคะ เทรนเนอร์ เรย์ก็อยู่ด้วยเหรอ สวัสดีค่ะ"
10043090-83 = "รุ่นพี่...?"
10043090-85 = "[ns1] \"สวัสดี สึมิเระ ทำไมถึงยังใส่ชุดนี้ล่ะ...?\"\n[ns2] \"สวัสดี สึมิเระ ว่าแต่ทำไมชุดถึง...?\""
10043090-88 = "อ้อ หมายถึงชุดนี้เหรอคะ เทรนเนอร์"
10043090-89 = "ถ้าจะตอบเรื่องชุด ฉันก็อดไม่ได้ที่จะพูดถึงเกมเมื่อวานนี้ค่ะ"
10043090-93 = "ความร้อนแรงและความประทับใจจากเกมการแข่งขันเมื่อวานนี้... ยังดังก้องอยู่ในโสตประสาทของฉัน#nอยู่เลยค่ะ"
10043090-94 = "ฉันประทับใจและได้รับแพชชั่นมาโดยที่ตัวเองก็ไม่รู้ตัวเลยด้วย"
10043090-95 = "และที่ฉันใส่ชุดนี้ออกมาที่นี่ในวันนี้ ก็เพราะฉันยังไม่อยากลืมความรู้สึกนั้นค่ะ"
10043090-96 = "แน่นอนว่ามันก็ไม่สะดวกบ้างเมื่อเทียบกับชุดที่ฉันใส่ออกกำลังกาย 7 วันต่อสัปดาห์..."
10043090-97 = "แต่บางครั้ง บางอย่างมันก็สำคัญกว่าตัวเลขหรือสถิติไม่ใช่เหรอคะ?"
10043090-98 = "[s] \"ก็จริงอย่างที่ว่านะ\""
10043090-99 = "ค่ะ เทรนเนอร์"
10043090-100 = "ฉันคิดว่าตัวเองได้เรียนรู้บางอย่างที่สำคัญจากเรื่องเมื่อวานค่ะ"
10043090-105 = "การชอบการออกกำลังกายมากๆ บางครั้งก็อาจเป็นยาพิษได้ค่ะ"
10043090-109 = "[ns] \"ใครเนี่ย! เอาสึมิเระของครูคืนมานะ!\""
10043090-113 = "ใครที่ไหนล่ะคะ... ฉันก็โอโทฮานะ สึมิเระของเทรนเนอร์นี่ละค่ะ..."
10043090-114 = "แต่ความวุ่นวายทั้งหมดเมื่อวานนี้เกิดขึ้นจากความคลั่งไคล้ที่มากเกินไปจนบิดเบือนของแฟนเบสบอล#nไม่ใช่เหรอคะ?"
10043090-115 = "ถ้าจะเปรียบเทียบ ก็ต้องบอกว่าเหมือนโอเวอร์เทรนนิ่งค่ะ"
10043090-116 = "ถึงบางครั้งเราจะมองข้ามไป แต่โอเวอร์เทรนนิ่งที่หักโหมเกินไปก็เป็นหนึ่งในปัจจัยหลักที่ทำให้เกิด#nการสูญเสียกล้ามเนื้อได้ค่ะ"
10043090-117 = "ฉันเพิ่งจะมาตระหนักในเรื่องนี้ได้เอาตอนนี้... จะบอกว่าไม่สมกับที่เป็นฉันก็ไม่ผิดนะคะ"
10043090-118 = "[s3] \"อืม... คนนี้คือสึมิเระคนเดิมของครูจริงด้วยสินะ\"\n[s4] \"แต่ถึงยังไงก็สมกับที่เป็นสึมิเระแล้วละ\""
10043090-121 = "ฮุฮุ ค่ะ ขอบคุณนะคะ เทรนเนอร์"
10043090-125 = "ว้ากกกก ฉันเผลอหลับไปเหรอคะเนี่ย!!!"
10043090-126 = "ตื่นแล้วเหรอคะ เรย์? ค่อยยังชั่วนะคะที่กลับมามีแรงแล้ว"
10043090-127 = "ค่ะ ใช่ค่ะ! ฉันมีพลังล้นเหลือเลยค่ะรุ่นพี่!"
10043090-128 = "ในฐานะแบตเตอร์หมายเลข 4 ของมิลเลเนียม! ในฐานะของผู้ฟื้นฟูชมรมเบสบอลมิลเลเนียม!"
10043090-129 = "ฉันจะอยู่เฉยๆ ตลอดไปไม่ได้หรอกค่ะ!"
10043090-130 = "ดีเลยค่ะ เรย์ ต้องแบบนี้ละ"
10043090-131 = "เพื่อเป็นการให้กำลังใจเรย์เหมือนเมื่อวาน ฉันจะ..."
10043090-136 = "เอ๋...?"
10043090-137 = "รุ่นพี่คะ ฉันหวังว่านี่จะเป็นแค่การเข้าใจผิดของฉัน แต่ลางสังหรณ์ฉันไม่ค่อยดีเลยค่ะ"
10043090-138 = "ไม่หรอกค่ะ ไม่มีอะไรให้ต้องรู้สึกลางสังหรณ์ไม่ดีหรอก ฉันไม่มีทางทำอะไรที่จะไม่เป็นประโยชน์ต่อ#nเรย์หรอกค่ะ"
10043090-143 = "เพราะอย่างนั้นแล้ว ตั้งแต่วันนี้เป็นต้นไป ฉันจะจัดโปรแกรมพาวเวอร์เทรนนิ่งกับสตามิน่าเทรนนิ่งให้#nเรย์เป็นพิเศษเลยค่ะ!"
10043090-148 = "คะ...?"
10043090-149 = "เดี๋ยวสิ ทำไมมันโยงมาเรื่องนี้ได้..."
10043090-150 = "ไม่สิ พอมาคิดดูแล้ว รุ่นพี่ก็โยงทุกเรื่องเข้ากับการออกกำลังกายได้อยู่แล้ว..."
10043090-154 = "...!"
10043090-163 = "จะไปไหนคะ เรย์?"
10043090-164 = "ไม่สิ 'คุณสมาชิก'?"
10043090-165 = "......"
10043090-170 = "แงงงงง!"
10043090-171 = "ไม่ชอบชมรมออกกำลังกายเลยยยย!!!"
10043090-174 = "[ns5] \"งั้นครูขอหลบไป... เชียร์สึมิเระจากข้างหลังดีกว่า\"\n[ns6] \"งั้นครูขอคืนพื้นที่... ให้สึมิเระไปเทรนเรย์ดีกว่า\""
10043090-179 = "พูดอะไรแบบนั้นคะ เทรนเนอร์?"
10043090-180 = "ไม่สิ 'คุณสมาชิก'?"
10043090-181 = "คุณสมาชิกก็มากับเราด้วยสิคะ"
10043090-182 = "[s] \"!!!!\""
10043090-184 = "[ns] \"ชมรมออกกำลังกาย...\""
10043090-187 = "เป็นแบบนี้ทุกทีเลยยยย!!!!!"
10043090-188 = "PRAY-BALL!~ ยอดนักหวดแกรนด์สแลม~"

[translation]
10043090-1 = "Episode 9;Workout Wrap-Up"
10043090-2 = "After that glorious victory..."
10043090-3 = "...the world kept turning, and the next day arrived before we knew it."
10043090-9 = "Millennium Race Track"
10043090-12 = "Oh! Hello, Sensei."
10043090-13 = "[s] \"What's this...mountain of baseball equipment?!\""
10043090-14 = "Oh, this? The Heroes sent it as a gift!"
10043090-15 = "They also offered me a spot on the team..."
10043090-16 = "...but I turned them down."
10043090-17 = "[s] \"That WOULD be lot of pressure, yeah.\""
10043090-21 = "No, that's not the reason. I'm already ON a team! I'm Nomasa Rei, the cleanup hitter of the Millennium Baseball Club!"
10043090-22 = "If I want to lead the club's big comeback, I can't get distracted!"
10043090-23 = "[s] \"Ah, that's what you meant. I see.\""
10043090-24 = "But I did make sure to thank them for all the equipment. It'll really help the club out a lot."
10043090-25 = "One of few downsides of baseball is that the equipment can get too expensive."
10043090-26 = "...It's still hard to believe, you know."
10043090-27 = "I really hit a home run!"
10043090-28 = "I've never done it before. Not in games, or exhibitions, not even in practice!"
10043090-29 = "[s] \"Yeah...\""
10043090-33 = "Sensei, is that pity you're giving me?"
10043090-34 = "No need. After yesterday, I feel like a whole new person!"
10043090-35 = "Like a rising star!"
10043090-36 = "Just watch, Sensei. I'll show you what's new!"
10043090-40 = "Watch out, Millennium Pitching & Hitting Machine, Engineering Department Edition! "
10043090-41 = "Even if you freely alternate between 15 kinds of barely distinguishable changeups and pitching patterns, based on all the data you can crunch..."
10043090-42 = "The \"me\" of today will hit them all over the fence!!"
10043090-47 = "With that, Rei strode onto the training field..."
10043090-65 = "...and struck out spectacularly."
10043090-69 = "Why?!"
10043090-74 = "I mean, okay, SOMETIMES I'm gonna miss..."
10043090-75 = "But how'd my batting average drop from oh-eight-zero to oh-seven-nine? I had some wiggle room there, didn't I?"
10043090-76 = "[s] \"Hm... Maybe you were too stiff in the shoulders?\""
10043090-77 = "I mean, that's the go-to tip coaches usually give out, but..."
10043090-82 = "There you are, Trainer. Hello, Rei."
10043090-83 = "Sumire?"
10043090-85 = "[ns1] \"Hey, Sumire. Um...\"\n[ns2] \"Why are you still wearing that?\""
10043090-88 = "Oh, why am I still wearing these? "
10043090-89 = "Short answer, because of yesterday's game."
10043090-93 = "Long answer, all that passion and excitement really resonated with me."
10043090-94 = "I didn't even realize, at the time, how deeply into it I felt."
10043090-95 = "I didn't want to let go of that excitement, so I stuck with the outfit for now."
10043090-96 = "It's not as easy to move in as my usual training gear..."
10043090-97 = "...but there's more to athletics than optimized stats sometimes, right?"
10043090-98 = "[s] \"I think so.\""
10043090-99 = "Yes, Trainer."
10043090-100 = "Also, I think I learned something important yesterday."
10043090-105 = "Getting TOO into athletic events, that can be toxic sometimes."
10043090-109 = "[ns] \"Who are you, and what have you done to the real Sumire?\""
10043090-113 = "No, uh, it's definitely still me..."
10043090-114 = "...but yesterday's whole fiasco was all because of a fan who liked baseball just that little bit too much."
10043090-115 = "You could say it's like over-training."
10043090-116 = "People don't always acknowledge it, but over-training can cause muscle loss."
10043090-117 = "...I don't always acknowledge it either, actually."
10043090-118 = "[s3] \"Ah... You're definitely our Sumire.\"\n[s4] \"Yep, that's you, all right.\""
10043090-121 = "Heh heh. I'll take that as a compliment."
10043090-125 = "All right, I'm going in for more!"
10043090-126 = "That's the spirit, Rei!"
10043090-127 = "Well, yeah, of course!"
10043090-128 = "I'm Millennium's cleanup hitter! If I'm going to lead the Millennium Baseball Club back to where it should be..."
10043090-129 = "...I can't just sit around!"
10043090-130 = "Go for it!"
10043090-131 = "And to support you, I'll..."
10043090-136 = "...You'll what?"
10043090-137 = "Sumire, I hope it's just my paranoia speaking, but I had a really bad feeling just now."
10043090-138 = "Why? There's nothing to worry about. I'd never do anything that didn't help you."
10043090-143 = "So starting today, I'll run a special course for your stamina and power training."
10043090-148 = "...Huh?"
10043090-149 = "Wait, how did you get to..."
10043090-150 = "I mean, I guess ALL your thoughts eventually get to..."
10043090-154 = "...!"
10043090-163 = "Where are you going, Rei?"
10043090-164 = "I mean, \"Trainee\"?"
10043090-165 = "..."
10043090-170 = "Ahhh!"
10043090-171 = "I hate the Athletics Training Club!!"
10043090-174 = "[ns5] \"I'll cheer you on...\"\n[ns6] \"...from all the way back here!\""
10043090-179 = "What are you saying, Trainer?"
10043090-180 = "Or should I call you \"Trainee\" too?"
10043090-181 = "You're going to be practicing with her!"
10043090-182 = "[s] \"Wait, what?!\""
10043090-184 = "[ns] \"Gotta love the Athletics Training Club...\""
10043090-187 = "No, you're terrible!!"
10043090-188 = "Pray-Ball! Swing for the Grand Slam!"

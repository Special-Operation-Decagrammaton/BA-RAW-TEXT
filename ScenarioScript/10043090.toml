[translation]
10043090-1 = "第9話;收尾運動"
10043090-2 = "（熱血無比的首勝之日過去了）"
10043090-3 = "（時間依舊流逝，隔天一如往常地到來）"
10043090-9 = "千年田徑跑道"
10043090-12 = "啊，老師！老師好！"
10043090-13 = "[s]「這堆積如山的棒球用品……是怎麼回事！？」"
10043090-14 = "啊，你說這些嗎？#n是柯基勇士隊送來的，說是比賽的謝禮！"
10043090-15 = "而且他們還說只要我願意，也可以簽下我當專屬代打或正式球員……"
10043090-16 = "不過我拒絕了！"
10043090-17 = "[s]「畢竟那樣壓力會很大吧。」"
10043090-21 = "你在說什麼啊，老師？#n我可是千年棒球部的第四棒，野正莉耶！"
10043090-22 = "身為肩負振興千年棒球部的重責大任的人，怎麼能心有旁騖呢！"
10043090-23 = "[s]「原來是因為這個啊……」"
10043090-24 = "不過作為謝禮送來的這些棒球用品，我會心懷感激地用來幫千年棒球部補充裝備的。"
10043090-25 = "……畢竟棒球為數不多的缺點之一，就是裝備有點貴呢。"
10043090-26 = "話說回來，我到現在都還難以置信。#n我竟然……"
10043090-27 = "真的！在那裡打出了全壘打！"
10043090-28 = "明明別說是練習賽或表演賽，就連平常訓練也完全沒有打出過全壘打的說！"
10043090-29 = "[s]「這樣啊……」"
10043090-33 = "老師？為什麼要用那種帶有一絲憐憫的眼神看著我？"
10043090-34 = "我現在已經重生了！昨天的那一戰讓我徹底覺醒了！"
10043090-35 = "現在的我，就是潛力終於爆發的進擊新星！我終於覺醒為超級新秀了！"
10043090-36 = "請拭目以待吧，老師！#n我今天一定會帶來跟以往不同的表現！"
10043090-40 = "等著瞧吧，工程師部版本的千年製投球&擊球機！"
10043090-41 = "就算你能自由自在地使用所有的投球模式，投出難以分辨的15種變化球……"
10043090-42 = "今天的我也會把每顆球都送去牆的另一端！！！"
10043090-47 = "（於是莉滿懷自信地走向訓練場……）"
10043090-65 = "（理所當然地壯烈落敗了）"
10043090-69 = "為什麼啊！？"
10043090-74 = "不是，打不到球當然是有可能的！這點我也不否認！"
10043090-75 = "但為什麼連綜合打擊率都從零成八掉到零成七九了啊！#n沒有最低只有更低嗎？"
10043090-76 = "[s]「唔嗯……是肩膀太用力了嗎？」"
10043090-77 = "那是對選手沒興趣的教練會用來敷衍球員的標準話術！！！"
10043090-82 = "你在這裡啊，指導員。#n莉同學，你好啊。"
10043090-83 = "前輩……"
10043090-85 = "[ns1]「嗨，堇。話說……」\n[ns2]「你怎麼還穿著那套衣服？」"
10043090-88 = "啊，你說這套衣服嗎？指導員。"
10043090-89 = "要回答這個問題的話，就得從昨天的比賽開始說起了。"
10043090-93 = "昨天那場比賽的熱情和感動……確實帶給了我某種強烈的震撼。"
10043090-94 = "那股熱血沸騰的氣氛，在不知不覺間深深感動了我。"
10043090-95 = "我不想太快忘記那份熱情，所以今天才會穿著這套服裝過來。"
10043090-96 = "當然和平時的訓練服相比，難免有些不太方便的部分……"
10043090-97 = "不過有時候比起數據或統計，某些無法量化的東西才是更重要的，不是嗎？"
10043090-98 = "[s]「確實有這種可能。」"
10043090-99 = "嗯，指導員。"
10043090-100 = "除此之外，我昨天還領悟到了一件很重要的事。"
10043090-105 = "那就是過於熱愛運動，有時也可能產生負面的影響。"
10043090-109 = "[ns]「你是誰！把我們家堇還來！」"
10043090-113 = "不是，我真的是指導員乙花堇沒錯……"
10043090-114 = "不過昨天的那場騷動，不就是因為球迷們過於熱愛棒球，導致心態變質所造成的嗎？"
10043090-115 = "如果要打個比方的話，就像是過度訓練一樣。"
10043090-116 = "雖然偶爾會被忽略，但這也是引起肌肉流失的主要因素之一。"
10043090-117 = "我竟然現在才意識到這一點……這確實不像平時的我啊。"
10043090-118 = "[s3]「嗯……確實是我們家堇沒錯。」\n[s4]「不過這也很有堇的風格呢。」"
10043090-121 = "呵呵。謝謝你，指導員。"
10043090-125 = "呃啊啊啊啊！"
10043090-126 = "莉同學，你起來了嗎？#n看起來已經恢復精神，真是太好了。"
10043090-127 = "是，前輩！"
10043090-128 = "身為千年的第四棒，肩負振興千年棒球部的重責大任之人……"
10043090-129 = "我可不能止步不前！"
10043090-130 = "很好，莉同學。這個態度就對了！"
10043090-131 = "我也會像昨天一樣，繼續為莉同學加油！"
10043090-136 = "……咦？"
10043090-137 = "前輩，希望這只是我的錯覺……#n我現在有種非常不妙的預感耶？"
10043090-138 = "不不不，怎麼可能會是不妙的預感呢。#n我對莉同學做的每件事都會對你有所幫助。"
10043090-143 = "所以從今天開始，我會為莉同學安排力量及耐力特訓！"
10043090-148 = "……嗯？"
10043090-149 = "不是，為什麼會得出那種結論……"
10043090-150 = "但仔細想想，前輩本來就是會把所有結論都會歸納到訓練上的人……"
10043090-154 = "……！"
10043090-163 = "你要去哪裡，莉同學。"
10043090-164 = "啊不，是「會員」才對。"
10043090-165 = "……"
10043090-170 = "啊啊啊啊！"
10043090-171 = "我真的受夠訓練部了啦！"
10043090-174 = "[ns5]「那我就退後兩步……不，還是三步好了。」\n[ns6]「我會在遠方真心為莉和堇應援的！」"
10043090-179 = "怎麼這麼說呢，指導員。"
10043090-180 = "不，「會員」。"
10043090-181 = "所有會員都要一起來哦。"
10043090-182 = "[s]「！！！！」"
10043090-184 = "[ns]「訓練什麼的──」"
10043090-187 = "──我受夠了啦！！！！！"
10043090-188 = "Pray-Ball！～瞄準滿壘全壘打！～"

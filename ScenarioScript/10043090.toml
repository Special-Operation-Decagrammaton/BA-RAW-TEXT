10043090-13 = "[s] \"이 산더미 같은 야구용품들은……. 다 뭐야?!\""
10043090-14 = "2;레이;02;아, 이거요? 코기 브레이브스에서, 온갖 야구용품을 사은품으로 보내 줬더라고요!"
10043090-15 = "2;레이;99;그리고 제가 바라기만 한다면, 전속 대타나 선수로 계약을 추진하고 싶다고도 이야기해 주셨지만……."
10043090-16 = "2;레이;10;그건 거절했습니다!\n#2;em;[반응]"

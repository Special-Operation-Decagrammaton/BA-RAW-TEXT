10003045-70 = "3;호텔 지배인;02;아! 나중에 기회가 된다면, 모쪼록 당점에서 오픈하는 온천의 이용권을 선물로 드릴 테니, 부디 이용해주시길 바랍니다!\n#3;em;[!]"

[translation]
10003045-1 = "ตอนที่ 4;เรื่องที่เกิดขึ้นได้บ่อยที่ชายหาด"
10003045-2 = "(หลังจากนั้นทุกคนก็ร่วมมือกันต่อสู้อย่างสุดความสามารถเพื่อปกป้องวันหยุดพักผ่อนของฮินะ)"
10003045-4 = "เฮ้อ... ถึงจะบอกว่าให้รอจนถึงเวลาฝึกซ้อมก็เถอะ แต่แบบนี้มันก็น่าเบื่อนิดหน่อยนะ..."
10003045-5 = "คุณครู... ถ้าคุณครูไม่ว่าอะไรก็ล่ะ... มาเล่นบอร์ดเกมฆ่าเวลาจนกว่าจะถึงเวลาซ้อม...ดีมั้ย?"
10003045-8 = "คุณครู?! ตอนนี้แนวหน้าที่ชายหาดถอยร่นมาจะสุดแล้ว! ขอคำสั่งจากคุณครูด้วย! ช่วยฉันที!"
10003045-11 = "[ns] \"ระ...รอเดี๋ยวนะ! พะ...พอดีครูมีงานด่วนเข้ามาน่ะ...!\""
10003045-12 = "อะ... อื้อ..."
10003045-15 = "(คุณครูกลับมาหลังจากจัดการกลุ่มแยงกี้สาวที่ชายหาดเสร็จแล้ว)"
10003045-16 = "อ๊ะ คุณครู กลับมาแล้วเหรอ? เหมือนฉันจะได้ยินเสียงระเบิดดังมาจากข้างนอกเลยนะ"
10003045-17 = "พวกนั้นฝึกเข้มกันขนาดนี้เลยเหรอ...?"
10003045-18 = "อืม... ยังไงก็เถอะ ดีแล้วล่ะที่ทุกคนตั้งใจกัน... มีแค่ฉันที่มานั่งเฉยๆ แบบนี้ รู้สึกผิดยังไงก็ไม่รู้..."
10003045-19 = "จริงสิ... คือว่าอากาศมันค่อนข้างร้อน... อยากลงไปกินไอศกรีมข้างล่างด้วย..."
10003045-22 = "คุณครูคะ ชินัตสึนะคะ ตอนนี้การต่อสู้กับแก๊งหมวกกันน็อกที่ย่านแออัดกำลังดุเดือดมากเลยค่ะ!"
10003045-23 = "พลังทำลายล้างของรถถังของพวกนั้นรุนแรงกว่าที่เราคาดการณ์ไว้#nลำพังแค่พวกเราคงจะตอบโต้กลับลำบากค่ะ!"
10003045-24 = "คุณครูช่วยมาที่นี่ด้วยนะคะ..."
10003045-27 = "[ns1] \"ฮะ...ฮินะ ขอโทษนะ... เดี๋ยวครูกลับมานะ!\"\n[ns2] \"ครูเพิ่งคิดเรื่องคำใบ้ของเกมทายปริศนาที่แก้ค้างไว้ออกน่ะ!\""
10003045-28 = "คะ...คุณครู...! ดะ...เดี๋ยวสิ!"
10003045-29 = "คะ...คุณครู...! ดะ...เดี๋ยวสิ!"
10003045-31 = "คุณครูคะ! สถานการณ์ของอิโอริกับชินัตสึถึงขั้นวิกฤตแล้วค่ะ! รบกวนคุณครูรับหน้าที่ออกคำสั่ง#nให้กับสมาชิกคณะกรรมการวินัยด้วยค่ะ! อ๊ะ! ห้ามบอกท่านประธานเด็ดขาดนะคะ!"
10003045-32 = "คุณครู..."
10003045-34 = "เดี๋ยวสิ! ทำไมเจ้าพวกนั้นถึงโผล่มาจากกลางทะเลด้วยล่ะ! เป็นพรายน้ำกันรึไงเนี่ย! คุณครู ช่วยด้วย!"
10003045-35 = "คุณครู..."
10003045-37 = "ตอนนี้พวกแก๊งหมวกกันน็อกติดอาวุธเต็มรูปแบบแล้วค่ะ มีทั้งรถถัง หุ่นจักรกล แถมยังมีเฮลิคอปเตอร์อีกด้วย! คุณครูคะ! ต้องการความช่วยเหลือค่ะ...!"
10003045-38 = "คุณ..."
10003045-40 = "อ่า คุณครู..."
10003045-41 = "คือ... เป็นอะไรรึเปล่า? สีหน้าคุณครูดูไม่ดีเลย"
10003045-42 = "[s] \"มะ... ไม่เป็นไร คือว่าฮินะ... คือ...\""
10003045-43 = "เฮ้อ... รู้แล้วล่ะ มีงานด่วนเข้ามาสินะ? "
10003045-44 = "อื้อ... ไปเถอะ ฉันจะรออยู่ที่ห้องแล้วกัน"
10003045-45 = "[s] \"อะ...อื้อ... เดี๋ยวครูมานะ...\""
10003045-49 = "(หลังจากนั้นการต่อสู้ก็ดำเนินไปอย่างดุเดือดอีกตลอดสองชั่วโมง)"
10003045-51 = "ห้องควบคุมปฏิบัติการฝึกภาคฤดูร้อน"
10003045-52 = "แฮ่ก... แฮ่ก..."
10003045-53 = "เฮ้อ..."
10003045-54 = "ทุกคน... ยังมีชีวิตอยู่ใช่ไหมคะ?"
10003045-55 = "[s] \"ยะ...ยังครบ 32 อยู่...\""
10003045-56 = "ถึงจะบาดเจ็บไปทั้งตัว แล้วชุดว่ายน้ำก็ขาดรุ่งริ่งด้วย แต่ว่าก็รอดมาได้น่ะ... อาโกะจัง"
10003045-57 = "ฉันไม่นึกเลยว่าพวกนั้นจะรับมือได้ขนาดนี้ค่ะ"
10003045-58 = "แต่ยังไงก็ขอบคุณทุกคน..."
10003045-59 = "อื้อ..."
10003045-60 = "ค่ะ..."
10003045-61 = "พวกแยงกี้สาวจอมวุ่นวายกับแก๊งหมวกกันน็อก... ยืนยันแล้วค่ะว่าทั้งสองกลุ่มล่าถอยไปแล้ว#nอีกทั้งยังมีประกาศยกเลิกสงครามว่อนไปทั่วอินเทอร์เน็ตแล้วด้วยค่ะ"
10003045-62 = "ยืนยันการดำเนินการตามเป้าหมายสำเร็จค่ะ ขอประกาศว่าแผนการสำเร็จแล้วค่ะ"
10003045-63 = "อ๊าาา! ในที่สุดก็จบสักที!"
10003045-64 = "จริงๆ เชียว... มาที่นี่แล้วยังต้องเหนื่อยอีกนะคะ"
10003045-68 = "ขอบคุณครับ... ขอบคุณมากครับ! คณะกรรมการวินัยทุกท่าน! "
10003045-69 = "เพราะได้พวกคุณช่วยไว้ โรงแรมของเราและร้านค้าต่างๆ ในพื้นที่เลยกลับมาให้บริการตามปกติได้!"
10003045-70 = "อ๊ะ! เราขอมอบบัตรกำนัลบ่อน้ำพุร้อนที่กำลังจะเปิดในพื้นที่ของเราให้เป็นของขวัญครับ#nถ้ามีโอกาส... กรุณามาใช้บริการด้วยนะครับ!"
10003045-71 = "พวกเราแค่ทำหน้าที่ของพวกเราค่ะ ขอบคุณสมาชิกคณะกรรมการวินัยทุกคนมากๆ เลยนะคะ"
10003045-72 = "เหลือเวลาอีกประมาณ 1 ชั่วโมงก่อนการฝึกวิ่ง... ขอให้ทุกคนไปพักผ่อนตามอัธยาศัยก่อน#nแล้วเดี๋ยวเราค่อยมาหารือเรื่องกำหนดการต่อไปกันนะคะ"
10003045-73 = "[s] \"ตอนนี้คงไปเดินเล่นกับฮินะที่ชายหาดได้แล้วสินะ\""
10003045-74 = "ค่ะ ว่าแต่คุณครู... ฉันเข้าใจว่าคุณครูคงจะเหนื่อยมาก แต่ยังไงก็รบกวนช่วยไปอยู่เคียงข้าง#nท่านประธาน เพื่อให้ท่านประธานได้สนุกกับวันหยุดพัก..."
10003045-78 = "สวัสดีค่ะ เจ้าหน้าที่อาวุโสอาโกะ ฉันมีข้อความจากทางแพนเดโมเนียม โซไซตี้มาแจ้งให้ทราบค่ะ"
10003045-79 = "\"ขณะนี้การฝึกดำเนินไปได้อย่างราบรื่นหรือเปล่าคะ? คงไม่ได้ลอบวางแผนอะไรนอกเหนือจากการฝึกเอาไว้ใช่ไหมคะ?\""
10003045-80 = "ดะ...เดี๋ยวก่อนนะคะ! ฉันติดภารกิจอยู่คงคุยด้วยไม่ได้..."
10003045-81 = "หืม...? จากภาพตอนนี้ เหมือนฉันจะเห็นสมาชิกคณะกรรมการวินัย คุณอิโอริอยู่ด้วย... นั่นเหมือนชุดว่ายน้ำ..."
10003045-82 = "อ๊าาาา! จู่ๆ มือฉันก็เผลอกดพลาดไปค่ะ!"
10003045-86 = "แม้แต่ตอนนี้ทางแพนเดโมเนียม โซไซตี้ก็จับตาดูอยู่ด้วยงั้นเหรอเนี่ย... เกือบเป็นเรื่องแล้วนะคะ อิโอริ"
10003045-87 = "เดี๋ยวสิ... ทำไมถึงพูดเหมือนฉันเป็นคนผิดเลยล่ะ?!"
10003045-88 = "แต่ถึงอย่างนั้นการที่พวกเธอติดต่อมาก็ไม่ได้เกินความคาดหมายอะไรค่ะ ฉันว่าครั้งนี้พวกเธอคง#nคิดจะขัดขวางพวกเราตั้งแต่แรกแล้ว ก็...เป็นเรื่องปกติของพวกแพนเดโมเนียม โซไซตี้นี่คะ"
10003045-89 = "ถ้าเป็นอาโกะจังล่ะก็คงจะจัดการได้อยู่หรอก"
10003045-90 = "[s] \"ถ้างั้นครูกลับไปหาฮินะก่อนนะ\""
10003045-91 = "ค่ะ เดี๋ยวก็จะถึงเวลาฝึกแล้ว อย่าให้ท่านประธานสังเกตเห็นเรื่องวุ่นวายพวกนี้นะคะ รบกวนด้วยนะคะ คุณครู"
10003045-92 = "แต่ว่าเจ้าพวกนั้นล่าถอยไปแบบนี้แล้ว แบบนี้คงวางใจได้แล้วใช่มั้ย?"
10003045-93 = "ระหว่างที่อาโกะจังไม่อยู่แบบนี้ อาจจะเป็นโอกาสเหมาะที่จะพาประธานไปที่ชายหาด..."
10003045-94 = "เดี๋ยวก่อนนะคะ อิโอริ... เวลาแบบนี้ถ้าพูดอะไรที่เป็นลางอีก..."
10003045-97 = "[ns] \"อืม...\""
10003045-98 = "อ๊ะ…! อึ่ก"
10003045-99 = "อิโอริ ถึงจะยกมือปิดปากตอนนี้ก็ไม่ช่วยอะไรหรอกค่ะ  เฮ้อ... ในเมื่อไม่มีใครพูดขึ้นมา...#nถ้างั้นฉันจะพูดเองค่ะ"
10003045-103 = "คราวนี้เรื่องอะไรอีกล่ะคะ?!"
10003045-108 = "มะ...มีศัตรูกลุ่มใหม่บุกเข้ามาโจมตีค่ะ!"
10003045-110 = "อ๊าาา!!! อะไรกันเนี่ย! ทำไมถึงไม่มีใครเลยล่ะ! ไหนบอกว่าจะมีงานเทศกาลที่นี่ไง!"
10003045-111 = "ไม่ใช่งานเทศกาลนะคะ สงครามระหว่างแก๊งต่างหากค่ะ แต่ก็นะ... มันก็คล้ายๆ กันนั่นแหละค่ะ☆"
10003045-112 = "จะอะไรก็ช่างเถอะน่า!"
10003045-113 = "ถ้าเป็นอย่างนี้ เราก็คงจะวิจัยเรื่อง <ทำไมข้าวโพดย่างที่กินที่งานเทศกาลฤดูร้อนหรือที่ชายหาดถึงมี#nรสชาติอร่อย?> ไม่ได้สินะคะ..."
10003045-114 = "อะไรกัน~! เมื่อไหร่จะได้กินข้าวโพดอ่ะ?!"
10003045-115 = "เราไม่ได้มาเพื่อ \"กิน\" นะ แต่มาเพื่อ \"ขาย\" ต่างหากเล่า! "
10003045-116 = "อุตส่าห์แบกของทุกอย่างมาถึงที่นี่แล้วแท้ๆ...! ไม่เห็นแม้แต่เงาของพวกแยงกี้สาว#nกับแก๊งหมวกกันน็อกเลยสักคนเดียว!"
10003045-117 = "เดี๋ยวนะ... ไม่มีใครอยู่เลยสักกะคน! นี่มันเกิดอะไรขึ้นกันเนี่ย!"
10003045-118 = "[s] \"ทำไมชมรมชิมอาหารถึงมาอยู่ที่นี่ล่ะ...?!\""

[translation]
10003045-1 = "第4話;海邊罕見又常見的事"
10003045-2 = "（之後，風紀委員們和老師團結一心，繼續為委員長奮鬥）"
10003045-4 = "呼……待在房間果然有點無聊啊。"
10003045-5 = "所以……老師，可以的話，一起玩這個桌遊吧……"
10003045-8 = "老師，目前海岸的狀況不太妙！快來幫忙！不能讓委員長發現唷！"
10003045-11 = "[ns]「抱，抱歉，陽奈！突然有點急事，等我回來後就來玩吧！」"
10003045-12 = "啊，唔，嗯。我等著。"
10003045-15 = "（終於將海邊的太妹收拾完回來後……）"
10003045-16 = "歡迎回來，老師。辛苦了。"
10003045-17 = "不過，這次外面傳來了爆炸聲呢……真的是在進行戰術訓練嗎？"
10003045-18 = "嘛，無論如何，有在努力就好了……總覺得只有我在這裡，有點過意不去。"
10003045-19 = "……對了，老師。天氣有點熱，可以的話，一起下樓吃冰淇淋吧──"
10003045-22 = "老師，我是千夏。目前正在貧民窟附近和頭盔團展開激烈的戰鬥……！"
10003045-23 = "重型戰車的數量比預想的還要多，再這樣下去，情況會難以收拾……"
10003045-24 = "我找不到突破口，能請您來幫忙嗎……！？"
10003045-27 = "[ns1]「抱歉，陽奈，又有點急事……！」\n[ns2]「有了！」"
10003045-28 = "老，老師……！？請，請等一下！"
10003045-29 = "老，老師……！？請，請等一下！"
10003045-31 = "老師！伊織和千夏的戰線都出了些問題，能請您指揮嗎！啊，要對委員長保密喔！"
10003045-32 = "老師……？"
10003045-34 = "為什麼那些傢伙會從海裡冒出來！？是妖怪嗎！？老師，想想辦法！"
10003045-35 = "老師……"
10003045-37 = "繼戰車之後，頭盔團連自動機軍團和直升機都搬出來了！到底該怎麼辦才好……！"
10003045-38 = "老──"
10003045-40 = "那個，老師……"
10003045-41 = "……沒事吧？感覺你臉色不太好……"
10003045-42 = "[s]「沒，沒事……比起那個，抱歉，陽奈，我……」"
10003045-43 = "我沒關係的……是夏萊的工作，對吧？"
10003045-44 = "路上小心。我會乖乖地等著……"
10003045-45 = "[s]「嗯。我會盡力早點回來的……！」"
10003045-49 = "（隨後，經歷了長達約2小時的死鬥）"
10003045-51 = "夏季集訓用指揮室"
10003045-52 = "呼，呼……"
10003045-53 = "唉……"
10003045-54 = "大家，都還活著嗎……？"
10003045-55 = "[s]「勉強……」"
10003045-56 = "身體和泳裝都已經殘破不堪了……嘛，該怎麼說……"
10003045-57 = "……到目前為止的情勢真是出乎意料啊。"
10003045-58 = "不過，這下就──"
10003045-59 = "唔。"
10003045-60 = "……說的也是呢。"
10003045-61 = "太妹集團「罪i搗亂」和「溼答答頭盔團」都已經被徹底擊退。#n網路上也流傳著全面戰爭中止的消息。"
10003045-62 = "作戰順利結束，辛苦了。"
10003045-63 = "啊啊，總算結束了──！"
10003045-64 = "真是的……難得來到海邊卻這麼辛苦。"
10003045-68 = "風紀委員會的各位！非常感謝，真的非常感謝……！"
10003045-69 = "這樣一來，不光是我們飯店，周邊的店家也都會回來了吧！"
10003045-70 = "為了表示感謝，這是我們飯店之後預計將開放的溫泉券。#n日後還請務必來使用……！"
10003045-71 = "別客氣，我們只是做了該做的事而已。#n風紀委員會的大家都辛苦了。"
10003045-72 = "距離步行訓練的預定時間還有約1個小時，請大家好好休息吧。"
10003045-73 = "[s]「終於可以和陽奈一起在海邊散步了。」"
10003045-74 = "是呢。雖然對已經疲憊的老師感到抱歉，但請您去委員長的身邊……"
10003045-78 = "你好，亞子行政官。#n這裡[ruby=Pandemonium Society]是萬魔殿。[/ruby]"
10003045-79 = "大家有在海邊好好訓練嗎？應該沒有做完全不相干的事吧？"
10003045-80 = "請，請等一下……！我現在正忙於訓練，不太方便──"
10003045-81 = "嗯……？在你身後的伊織同學為什麼穿著泳──"
10003045-82 = "哎呀！手指突然自己動起來了！"
10003045-86 = "萬魔殿真會選時間……真是的，差點釀出大禍了呢，伊織。"
10003045-87 = "怎麼說的好像是我的錯一樣！？"
10003045-88 = "嘛，話雖如此，還是一如既往地愛找麻煩呢……"
10003045-89 = "這種事稀鬆平常，亞子醬會看著辦的。"
10003045-90 = "[s]「那我就先回陽奈的房間了。」"
10003045-91 = "好的，離步行訓練只剩下一些時間，#n再麻煩您避免讓委員長察覺這裡的動靜了，老師。"
10003045-92 = "不過事情都已經解決，應該也沒必要那麼擔心了吧？"
10003045-93 = "說不定亞子醬暫時不在的這個時間點，反而更適合帶委員長去海邊走走……#n畢竟已經不太可能再……"
10003045-94 = "伊織，知道什麼是「立旗」嗎……？"
10003045-97 = "[ns]「啊……」"
10003045-98 = "……"
10003045-99 = "現在閉嘴已經太晚了，伊織……"
10003045-103 = "唉……這次又怎麼了！？"
10003045-108 = "是，是襲擊……！對方是──"
10003045-110 = "吶，為什麼一個人都沒有啊！不是說這裡要舉行慶典嗎！"
10003045-111 = "雖然說是慶典，實際上是全面戰爭就是了。不過也很類似啦★"
10003045-112 = "都一樣啦！！"
10003045-113 = "這樣這次的研究目標「為什麼海邊和慶典的烤玉米那麼好吃？」就無法研究了呢……"
10003045-114 = "吶吶～什麼時候才能吃烤玉米──！？"
10003045-115 = "我們不是來吃玉米，是來賣玉米的！！"
10003045-116 = "我都特地揹著那麼重的行李跑來這裡了！太妹集團和頭盔團都跑哪去了啊！？"
10003045-117 = "而且根本連一個人影都沒有嘛！？到底是怎麼回事！！"
10003045-118 = "[s]「為什麼，美食研究會會在這裡……！？」"

[translation]
10003045-1 = "Episode 4;An Average Day at the Beach"
10003045-2 = "With the two delinquent sides about to fight, we regathered and started our heroic struggle to protect Hina's vacation."
10003045-4 = "*sigh* I understand my orders were to wait here until training begins, but I still find it boring."
10003045-5 = "I know. Would you like to play a board game to pass the time?"
10003045-8 = "Sensei, we're in real trouble over here! We need your commands!"
10003045-11 = "[ns] \"S-Sure, Hina! But let me go do something important first...!\""
10003045-12 = "O-Oh. Okay..."
10003045-15 = "I just made it back after we narrowly defeated the thugs at the beach."
10003045-16 = "Welcome back, Sensei. Is everything all right? I could hear explosions outside."
10003045-17 = "Has the training intensified again?"
10003045-18 = "I'm glad our members are training so hard, but I feel guilty simply enjoying myself up here."
10003045-19 = "Also, it is getting a little stuffy. Would you like to go downstairs with me and get some ice cream?"
10003045-22 = "Sensei, this is Chinatsu. We're locked in an intense battle with the Splashy Helmet Gang in the slums!"
10003045-23 = "Their tanks' firepower is greater than we calculated. It's going to be difficult to hold up on our own!"
10003045-24 = "Requesting your direct command, Sensei."
10003045-27 = "[ns1] \"S-Sorry, Hina, but something came up again...!\"\n[ns2] \"Uh, gotta go—I left the oven on!\""
10003045-28 = "S-Sensei! Wait!"
10003045-29 = "S-Sensei! Wait!"
10003045-31 = "Sensei, both Chinatsu's and Iori's units are struggling! Could I ask you to take direct command? But you must keep it a secret from the president!"
10003045-32 = "Sensei..."
10003045-34 = "What the...? Are they coming out of the ocean?! What are they, sirens?! We need your help, Sensei!"
10003045-35 = "Sens—"
10003045-37 = "The gangsters also brought automata and choppers! We require your assistance, Sensei!"
10003045-38 = "Sen—"
10003045-40 = "Um, Sensei..."
10003045-41 = "Is everything all right? You don't seem well."
10003045-42 = "[s] \"I-I'm fine, Hina, but...I, uh...\""
10003045-43 = "*sigh* I know. You have somewhere else to be, right?"
10003045-44 = "Go ahead and take your time. I'll be waiting."
10003045-45 = "[s] \"Th-Thanks. Be right back...\""
10003045-49 = "The battling raged on for another two hours."
10003045-51 = "Summer Camp Control Room"
10003045-52 = "*pant* *pant*..."
10003045-53 = "Phew..."
10003045-54 = "Is everyone still alive?"
10003045-55 = "[s] \"Somehow...\""
10003045-56 = "Everything hurts and my swimsuit is falling apart, but I'm still breathing."
10003045-57 = "I never expected them to put up such a resistance."
10003045-58 = "But thanks to all of our work..."
10003045-59 = "Yes."
10003045-60 = "Right."
10003045-61 = "We've confirmed the Fubar Beach Thugs and Splashy Helmet Gang have both retreated. Word has spread online that their all-out war has been called off."
10003045-62 = "That means our mission is complete."
10003045-63 = "It's finally over!"
10003045-64 = "Indeed. We've worked hard enough for one day."
10003045-68 = "I can't thank you enough, Gehenna Prefect Team! "
10003045-69 = "Not only is my hotel saved, but the local business owners can open up shop again!"
10003045-70 = "I know! How about I provide you all with free tickets to our hot springs? They're open, so feel free to enjoy yourselves."
10003045-71 = "We were only doing what was right, though we won't turn down your offer. Good work, everyone."
10003045-72 = "There's still about an hour until the running training. Everyone rest up, and we'll discuss the further schedule then."
10003045-73 = "[s] \"I'll finally be able to have my walk on the beach with Hina.\""
10003045-74 = "That's right. I know you must be tired, but please stay by the president's side and see to it she enjoys her vacation."
10003045-78 = "Senior Administrator Ako? I have a message from the Pandemonium Society."
10003045-79 = "Is everything going as planned? I hope you're not handling business somewhere completely different right now."
10003045-80 = "Wh-What? No, I was just..."
10003045-81 = "Hmm? Is that Iori from the Prefect Team? That swimsuit is rather..."
10003045-82 = "Oh, no! My finger slipped!"
10003045-86 = "The Pandemonium Society is keeping her on a short leash. That was a close call, Iori."
10003045-87 = "Hey! Don't make it sound like it was MY fault!"
10003045-88 = "Well, it's not as though their interruption was unexpected. They've always been a thorn in our side."
10003045-89 = "Yeah, but I'm sure Ako can handle it."
10003045-90 = "[s] \"I'm gonna go check on Hina now.\""
10003045-91 = "Okay. There isn't much time until training begins, so make sure the president doesn't suspect anything about what happened, Sensei."
10003045-92 = "They've already retreated, so we should be in the clear, right?"
10003045-93 = "Honestly, this is probably your best chance to take the president to the beach with Ako not here. What's the worst that could happen?"
10003045-94 = "Iori, have you learned nothing about jinxing it?"
10003045-97 = "[ns] \"Welp.\""
10003045-98 = "Me and my big mouth."
10003045-99 = "There's no point in trying to take it back now. Since Ako isn't here, I'll go ahead and ask it."
10003045-103 = "What is it this time?!"
10003045-108 = "We're under enemy attack! But this time, it's...!"
10003045-110 = "Ahhh! Where is everyone?! They said there was going to be a festival!"
10003045-111 = "It was more like gang war than a festival. Well, what is a war to gangs if not a festival? ☆"
10003045-112 = "Never mind that! What's going on?!"
10003045-113 = "How are we supposed to conduct our research into why grilled corn on the beach is so delicious?"
10003045-114 = "Yeah! When are we going to eat grilled corn?!"
10003045-115 = "You moron! We're here to SELL grilled corn, not eat it! "
10003045-116 = "That's why we were dragging all of that heavy luggage here, but now none of those delinquents are here to buy it!"
10003045-117 = "There's no one here! What's going on?!"
10003045-118 = "[s] \"The Gourmet Research Society? What are you doing here?\""

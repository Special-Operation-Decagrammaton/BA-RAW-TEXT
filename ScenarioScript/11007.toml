[translation]
11007-2 = "หมดหน้าที่ของฉันแล้ว ที่เหลือก็ฝากด้วยนะคะ"
11007-5 = "หนีไปแล้ว! ตามไปเร็ว!"
11007-6 = "ไม่ได้นะคะ อย่าเปลี่ยนเป้าหมายสิ สิ่งที่เราต้องทำคือชิงชาเล่ต์กลับมานะคะ"
11007-7 = "เราต้องบุกไปให้ถึงอาคารชาเล่ต์"
11007-8 = "รู้แล้วน่า ตกลงพวกเราไม่ต้องตามเจ้าพวกนั้นไปใช่ไหม?"
11007-9 = "เพราะนั่นอาจเป็นกับดักก็ได้ค่ะ"
11007-10 = "ใช่แล้ว อันดับแรกเราต้องชิงอาคารมาให้ได้ ไปกันต่อเถอะ"

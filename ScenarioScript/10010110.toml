[translation]
10010110-1 = "ตอนที่ 11;หว่านพืชเช่นไร ย่อมได้ผลเช่นนั้น 1"
10010110-2 = "ขะ... ขอ..."
10010110-3 = "ขอโทษนะคะคุณอุย..."
10010110-4 = "อุตส่าห์เหน็ดเหนื่อยช่วยฉันแท้ๆ แต่สถานการณ์กลับเป็นแบบนี้..."
10010110-5 = "[s1] \"เลื่อนงานเข้ามางั้นเหรอ...\"\n[s2] \"ทำไมจู่ๆ ถึงได้เป็นแบบนี้นะ...\""
10010110-6 = "ทำไมกันนะ ทำไมกัน..."
10010110-7 = "ทำไมกันนะ ทำไมกัน..."
10010110-8 = "จู่ๆ ก็มาเปลี่ยนกำหนดการแบบนี้ แกล้งกันหรือเปล่า..."
10010110-9 = "ฉันยังฟื้นฟูคัมภีร์ไม่เสร็จเลย..."
10010110-10 = "บางทีที่ได้รับแจ้งช้าแบบนี้ คงเพราะชื่อฉันไม่ได้อยู่ในชื่อคนที่เข้าร่วมงานน่ะค่ะ แค่ข้อความบอกว่าแจ้งให้ทราบเฉยๆ..."
10010110-11 = "ฉันว่าป่านนี้... คนที่ได้เข้าร่วมงานคงมาถึงกันหมดแล้วค่ะ"
10010110-20 = "เหลือเวลาแค่ชั่วโมงเดียวแบบนี้ การเตรียมการทุกอย่างคงเสร็จหมดแล้วด้วยค่ะ"
10010110-31 = "สถานที่จัดงานน่าจะปิด และก็คงมีการคุ้มกันอย่างแน่นหนา"
10010110-32 = "ถึงตอนนี้จะฟื้นฟูพระคัมภีร์เสร็จแล้ว... แต่การขนย้ายก็ต้องใช้เวลา..."
10010110-43 = "และคนที่เปิดหีบไม้และเปิดเผยพระคีมภีร์... ก็คงเป็น... คุณซากุระโกะ..."
10010110-47 = "ได้ยินว่าชมรมทวงความยุติธรรมจะเข้าไปสังเกตการณ์ด้วยค่ะ..."
10010110-62 = "ถึงจะไปไม่ครบทุกคนเพราะสัปดาห์นี้เป็นสัปดาห์ลาดตระเวนก็เถอะ... แต่ว่า... ก็เป็นถึงชมรมทวงความยุติธรรมเลย..."
10010110-63 = "การจะให้ซิสเตอร์ธรรมดาๆ อย่างฉันแอบเข้าไป... หรือบุกเข้าไปในงานคงเป็นเรื่องที่เป็นไปไม่ได้ เลยละค่ะ..."
10010110-65 = "อีกหนึ่งชั่วโมงหลังจากนี้... ท่ามกลางคนมากมายในงาน... ท่านซากุระโกะคงได้อ่าน..."
10010110-66 = "[s3] \"คัมภีร์... 108 ท่าลับ...\"\n[s4] \"แค่คิดก็... โอ้ว...\""
10010110-69 = "ฮือ... ฮือๆ... ฮือ..."
10010110-70 = "ขออภัยค่ะ... ขออภัยค่ะทุกคน ต้องขออภัยทั้งคุณซากุระโกะ... และทุกคนที่นี่ด้วยค่ะ..."
10010110-71 = "คนอื่นในงานน่าจะแก้ไขสถานการณ์เฉพาะหน้าได้... แต่สุดท้ายทุกคนก็ต้องเดือดร้อนเพราะฉัน..."
10010110-72 = "สุดท้ายแล้ว... ฉันคงต้องรับผลของการกระทำของตัวเองค่ะ... นี่คือเรื่องที่ต้องยอมรับ..."
10010110-73 = "คุณฮินาตะ..."
10010110-74 = "......"
10010110-78 = "[ns5] \"ทำไมถึงลุกขึ้นล่ะ?\"\n[ns6] \"จะไปไหนเหรอ?\""
10010110-79 = "ฉันอยู่แบบนี้ต่อไปไม่ได้ค่ะ..."
10010110-80 = "ฉันอยู่แบบนี้ต่อไปไม่ได้ค่ะ..."
10010110-81 = "ฉันต้องไปที่สถานที่จัดงาน... ด้วยตัวเองค่ะ..."
10010110-82 = "ถึงฉันจะไม่ได้อยู่ในรายชื่อ... แต่เมื่อเกิดเรื่องขึ้น... ฉันก็ต้องเข้าไปอธิบายตามความจริงค่ะ..."
10010110-84 = "คุณครูคะ... วันนี้ขอบคุณมากเลยนะคะ"
10010110-86 = "ถึงตอนจบจะเป็นแบบนี้ แต่ที่ผ่านมาฉันก็ได้คุณครูช่วยเยอะเลย... ฉันดีใจมากค่ะ"
10010110-88 = "คุณอุยเองก็บอกว่าขอบคุณที่ฉันช่วยงาน... แต่ฉันไม่คิดว่าเป็นงานหรอกนะคะ ก็มันสนุกมากเลยน่ะค่ะ"
10010110-90 = "ฉันต้องขอบคุณอีกครั้งนะคะ"
10010110-91 = "ขอบคุณคุณอุย... ที่ช่วยฟื้นฟูหนังสือเล่มนั้น..."
10010110-92 = "อืม..."
10010110-97 = "ที่ช่วย 'รักษาเด็กคนนั้น'?"
10010110-98 = "...?"
10010110-99 = "ฉันขอฝากด้วยนะคะ ถึงจะไปแสดงตัวที่งานไม่ได้ แต่ยังไงก็เป็นหนังสือที่แสนสำคัญไม่เคยเปลี่ยนค่ะ"
10010110-100 = "......"
10010110-101 = "เดี๋ยวก่อนค่ะคุณฮินาตะ เมื่อกี๊ว่ายังไงนะคะ?"
10010110-102 = "ฉันต้องขอตัวก่อนนะคะ..."
10010110-103 = "ไปละค่ะ..."
10010110-104 = "[s7] \"เดี๋ยวก่อนฮินาตะ\"\n[s8] \"นี่เป็นความรับผิดชอบของครูเหมือนกัน...\""
10010110-105 = "ไม่หรอกค่ะ คุณครู..."
10010110-106 = "ไม่หรอกค่ะ คุณครู..."
10010110-107 = "นี่เป็นเรื่องที่ฉันก่อขึ้นเอง และคุณครูก็แค่เข้ามาช่วยเท่านั้น..."
10010110-108 = "อย่างน้อยก็... ขอให้ฉันได้... แก้ปัญหาด้วยตัวเองเถอะค่ะ"
10010110-109 = "ขอร้องละค่ะ"
10010110-114 = "[ns] \"......\""

[translation]
10010110-1 = "第11話;It Serves You Right（１）"
10010110-2 = "嗚，嗚嗚……"
10010110-3 = "對不起，老師，憂同學。"
10010110-4 = "明明都請兩位幫忙了，沒想到居然會變成這樣……"
10010110-5 = "[s1]「居然會把開始時間提前……」\n[s2]「為什麼會突然這樣……」"
10010110-6 = "什，什麼跟什麼啊……"
10010110-7 = "什，什麼跟什麼啊……"
10010110-8 = "這次的典禮從頭到尾都奇怪到不行。居然會突然更改時間……"
10010110-9 = "明，明明經典的修復都還沒完成……"
10010110-10 = "之所以現在才收到聯絡，也許是因為我本來是不會參加的吧……#n其他會出席的人應該早就收到通知了。"
10010110-11 = "而且……即使能在典禮開始前完成修復，也已經……"
10010110-20 = "……如果典禮會在一個小時後開始，現在會場的來賓應該都已經入座了。"
10010110-31 = "出席的人員到齊之後，會場就會關閉，周邊的警備也會加強。"
10010110-32 = "就算現在準備好經典，從這裡運到會場也需要時間……"
10010110-43 = "即使能夠到達會場也一樣。"
10010110-47 = "我聽說會場的警備是由實現正義部的大家負責。"
10010110-62 = "即便因為定期巡迴的關係，並不會全員到齊……"
10010110-63 = "像我這種平凡的修女，想偷偷把經典調包什麼的……那種事根本……"
10010110-65 = "嗚，對不起，櫻子大人……這樣下去的話，就要在大家面前……"
10010110-66 = "[s3]「朗讀慾經……」\n[s4]「得，得想想其他方法……」"
10010110-69 = "嗚，嗚嗚……！"
10010110-70 = "對不起，都是……都是我的錯……"
10010110-71 = "不只是櫻子大人，還給大家添了這麼大的麻煩……"
10010110-72 = "全都是，因為我……"
10010110-73 = "日向同學……"
10010110-74 = "……"
10010110-78 = "[ns5]「……日向？」\n[ns6]「該不會……」"
10010110-79 = "得，得避免最壞的情況發生才行……"
10010110-80 = "得，得避免最壞的情況發生才行……"
10010110-81 = "只要到會場去，應該還會有什麼辦法才對。#n設法穿過警備……到教堂裡阻止櫻子大人……"
10010110-82 = "或者至少要親口把事實告訴大家……"
10010110-84 = "……老師。今天一整天真的非常感謝您。"
10010110-86 = "儘管事情最後變成這樣……不過能獲得老師的幫忙，我真的很高興。"
10010110-88 = "雖然很累是事實，但同時也感受到了快樂。"
10010110-90 = "……真的很謝謝您。"
10010110-91 = "憂同學也是，非常謝謝你。願意修復這本書──"
10010110-92 = "……不。"
10010110-97 = "……是「治療這個孩子」。"
10010110-98 = "……？"
10010110-99 = "如果願意的話，還請繼續完成作業。#n即使與典禮無關，也依然是個重要的孩子。"
10010110-100 = "……"
10010110-101 = "請，請等一下日向同學。你剛才說什麼……"
10010110-102 = "不好意思，我得趕快出發。"
10010110-103 = "先告辭了。"
10010110-104 = "[s7]「等等，日向。」\n[s8]「這件事我也有責任，我們一起……」"
10010110-105 = "……不。"
10010110-106 = "……不。"
10010110-107 = "雖然老師幫了我的忙，但這終究是我該承擔的責任。"
10010110-108 = "至少最後的工作請讓我來完成吧。"
10010110-109 = "拜託您了。"
10010110-114 = "[ns]「……」"

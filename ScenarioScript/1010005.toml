[translation]
1010005-1 = "หน้ากากไรเดอร์"
1010005-3 = "(ระหว่างที่คุณครูรออยู่ที่สถานที่ที่นัดพบกับชิโรโกะ...)"
1010005-9 = "หลบไป... หลบบบบ!! "
1010005-12 = "[ns1] \"ว้าก รถบรรทุก?!\"\n[ns2] รีบหนีไปยังบริเวณที่ปลอดภัย"
1010005-19 = "ชะ...ช่วยหยุดรถบรรทุกคันนั้นไว้ทีครับ!! ขโมย!! มีโจรขโมยรถบรรทุก!!"
1010005-20 = "ในรถมีกะหล่ำปลีที่ราคาแพงมากๆ อยู่...!!"
1010005-21 = "[s3] (รู้สึกเหมือนช่วงนี้ความปลอดภัยในอะบิดอสจะลดลงแฮะ...)\n[s4] (ค่อยคิดเรื่องอื่นทีหลังแล้วกัน...)"
1010005-27 = "คุณครู หลีกทางไปก่อน"
1010005-34 = "สัตว์ประหลาดนักปั่น?!"
1010005-35 = "นั่นมัน... หน้ากากไรเดอร์!! "
1010005-37 = "วะ... ว้ากกกก-!?"
1010005-38 = "ปั่นจักรยานแซงรถบรรทุกได้ด้วย?!"
1010005-52 = "[ns] \"......\""
1010005-55 = "[ns] \"......\""
1010005-60 = "ขอบคุณนะหน้ากากไรเดอร์!"
1010005-61 = "นี่เป็นครั้งแรกที่ได้เจอตัวเป็นๆ แบบนี้เลย! คิดว่าเป็นแค่ตำนานซะอีก!"
1010005-66 = "คุณครู เราย้ายที่กันมั้ย..."
1010005-67 = "[s] \"นั่นสิ...\""
1010005-74 = "อื้อ แค่นี้น่าจะไม่เป็นไรแล้วละ"
1010005-75 = "[s5] \"ไม่ละ เป็นสุดๆ เลย\"\n[s6] \"เตะตาสุดๆ เลย\""
1010005-81 = "อืม..."
1010005-82 = "[ns] \"หน้ากากไรเดอร์งั้นเหรอ...\""
1010005-83 = "อื้อ... ใส่หน้ากากปิดหน้าไว้เพราะอาจมีข่าวลือแปลกๆ น่ะ"
1010005-84 = "[s] \"แบบนี้เหมือนจะยิ่งมีแต่ข่าวลือแปลกๆ นะ...\""
1010005-85 = "อื้อ ดูเหมือนจะได้ผลกลับกันสินะ..."
1010005-86 = "[s] \"ว่าแต่ว่านั่นจักรยานคันใหม่เหรอ?\""
1010005-87 = "อื้อ รุ่นสีดำน่ะ แต่ว่ามันยังประกอบไม่เสร็จสมบูรณ์ดี แล้วก็ยังไม่ได้เตรียมชุดปั่นจักรยานเลยด้วย... "
1010005-88 = "เพราะงั้นเอาไว้เตรียมเสร็จเมื่อไร ฉันจะให้ดูอีกทีนะ"
1010005-89 = "[s] \"แล้วเรื่องที่กังวลคืออะไรเหรอ?\""
1010005-90 = "อื้อ"
1010005-91 = "ทางคณะกรรมการแผนงานบอกมาว่าอยากให้ฉันรับช่วงชื่อของ <สภานักเรียนอะบิดอส> ต่อน่ะ..."
1010005-92 = "ถึงจะเป็นแค่ชื่อ แต่ฉันก็รู้ดีว่าชื่อของสภานักเรียนหมายถึงอะไร... ก็เลยไม่รู้ว่าจะตอบยังไงดี..."
1010005-93 = "[s] \"อืม...\""
1010005-94 = "ฉันควรตอบยังไงดีล่ะ คุณครู...?"
1010005-95 = "[s7] \"หน้ากากมิสึกิเหรอ...\"\n[s8] \"หน้ากากไรเดอร์งั้นเหรอ...\""
1010005-100 = "[ns9] \"ไม่ว่าจะหน้ากากมิสึกิหรือหน้ากากไรเดอร์ก็ไม่เวิร์กเลย\"\n[ns10] \"อนาคตของอะบิดอสจะเป็นยังไงต่อนะ...\""
1010005-103 = "[ns] \"ครูคงตัดสินใจปัญหานี้ไม่ได้หรอก\""
1010005-104 = "อืม..."
1010005-105 = "[ns] \"แต่สิ่งที่ยืนยันได้ก็คือทุกๆ คนเป็นห่วงเธออยู่นะ\""
1010005-109 = "......"
1010005-110 = "อืม... ฉันรู้"
1010005-111 = "กะไว้แล้วเชียว คงไม่มีทางเลือกอื่นนอกจากต้องยอมรับข้อเสนอสินะ"
1010005-112 = "งั้นฉันจะส่งข้อความไปบอกทางนั้นก่อน"
1010005-117 = "อืม..."
1010005-118 = "[ns] \"ส่งไปว่าอะไรน่ะ?\""
1010005-119 = "อืม... เรื่องนั้นเป็นความลับ เอาไว้จะบอกทีหลังนะ"
1010005-120 = "[s] \"ความลับเหรอ...!\""
1010005-125 = "เร็วจัง"
1010005-130 = "[ns] \"ว่ายังไงบ้าง?\""
1010005-137 = "บอกว่า \"อื้ม จะรับข้อเสนอ ดีล หน้ากากไรเดอร์ <ขบวนการหน้ากากมิสึกิ>\""
1010005-141 = "[ns] \"ดูข้อความแล้วรู้เลยว่าใครส่งมา...\""
1010005-142 = "อื้อ... "
1010005-143 = "นั่นสินะ"

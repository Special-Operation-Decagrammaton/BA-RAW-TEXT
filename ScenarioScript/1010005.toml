[translation]
1010005-1 = "Masked Rider"
1010005-3 = "I was waiting at the spot Shiroko and I had arranged to meet up..."
1010005-9 = "Watch it! Get out of my way! "
1010005-12 = "[ns1] \"Whoa, a truck?!\"\n[ns2] Get to safety."
1010005-19 = "P-Please stop that thief! They're stealing my truck!"
1010005-20 = "They're after my lettuce! Prices have been skyrocketing lately!"
1010005-21 = "[s3] \"(It seems like security in Abydos is getting worse these days...)\"\n[s4] \"(But more importantly, right now...)\""
1010005-27 = "Please step aside, Sensei."
1010005-34 = "A monster on a b-bike?!"
1010005-35 = "That's... It's the Masked Rider! "
1010005-37 = "A-Aaahhh!"
1010005-38 = "The bicycle overtook the truck?!"
1010005-52 = "[ns] \"...\""
1010005-55 = "[ns] \"...\""
1010005-60 = "Thank you, Masked Rider!"
1010005-61 = "To think I got to see the Masked Rider with my own two eyes! I thought you were just a legend!"
1010005-66 = "Should we relocate, Sensei?"
1010005-67 = "[s] \"Let's do that...\""
1010005-74 = "Yes. This should do."
1010005-75 = "[s5] \"No, not at all!\"\n[s6] \"You stick out like a sore thumb!\""
1010005-81 = "Um..."
1010005-82 = "[ns] \"Are you the Masked Rider...?\""
1010005-83 = "Ummm... I've been covering my face, to avoid instigating any strange rumors..."
1010005-84 = "[s] \"It's had the opposite effect!\""
1010005-85 = "Yes... My plan has backfired, ever so slightly."
1010005-86 = "[s] \"Anyway, is that your new bicycle?\""
1010005-87 = "Yes. It's the black edition. Although it's unfinished...and I still haven't gotten a riding suit... "
1010005-88 = "I'll show it to you once it's complete."
1010005-89 = "[s] \"So what's the issue you mentioned?\""
1010005-90 = "Yes."
1010005-91 = "The Foreclosure Task Force has asked me to become a member of the Abydos Student Council..."
1010005-92 = "It may just be a title, but I'm fully aware of that title's significance. I'm unsure of how to respond."
1010005-93 = "[s] \"Hmm...\""
1010005-94 = "What do I say, Sensei?"
1010005-95 = "[s7] \"The Masked Swimsuit Gang...\"\n[s8] \"The Masked Rider...\""
1010005-100 = "[ns9] \"The future's bleak either way...\"\n[ns10] \"Is Abydos going to be okay...?\""
1010005-103 = "[ns] \"I can't answer that for you.\""
1010005-104 = "Well..."
1010005-105 = "[ns] \"What I can say, though, is that everyone's worried about you.\""
1010005-109 = "..."
1010005-110 = "Yes...I know."
1010005-111 = "I suppose I have no other choice but to accept."
1010005-112 = "I'll send them a MomoTalk right now..."
1010005-117 = "Um..."
1010005-118 = "[ns] \"What did you tell them?\""
1010005-119 = "...It's a secret. I'll tell you later."
1010005-120 = "[s] \"A secret...?\""
1010005-125 = "They responded quickly..."
1010005-130 = "[ns] \"What'd they say?\""
1010005-137 = "\"Yeah. We accept your challenge. Bring it on, Masked Rider. -The Masked Swimsuit Gang\""
1010005-141 = "[ns] \"...I think I know who sent it.\""
1010005-142 = "...Yes. "
1010005-143 = "I do too."

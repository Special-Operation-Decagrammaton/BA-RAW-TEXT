[translation]
1010005-1 = "蒙面騎士"
1010005-3 = "（在約定的地點等著白子的到來……）"
1010005-9 = "閃啦閃啦，撞到不負責哦──！！"
1010005-12 = "[ns1]「哇，是卡車！？」\n[ns2] 趕緊躲到安全的地方"
1010005-19 = "搶，搶劫啊！快攔下那台卡車！！有人搶了我的卡車！！"
1010005-20 = "卡車裡可是裝了很多最近瘋狂漲價的高麗菜啊！"
1010005-21 = "[s3]（總覺得最近阿拜多斯的治安越來越差了……）\n[s4]（不過，比起那個……）"
1010005-27 = "老師，抱歉借過一下。"
1010005-34 = "騎，騎自行車的怪人！？"
1010005-35 = "那是……蒙面騎士！！"
1010005-37 = "呃，呃啊啊啊啊──！？"
1010005-38 = "自行車竟然能追過卡車！？"
1010005-52 = "[ns]「……………………」"
1010005-55 = "[ns]「……」"
1010005-60 = "謝謝你，蒙面騎士！"
1010005-61 = "我第一次遇見你本人！原本還以為你只是傳說中的人物呢！"
1010005-66 = "老師，我們還是換個地方吧……"
1010005-67 = "[s]「說的也是……」"
1010005-74 = "嗯，這裡應該沒問題了。"
1010005-75 = "[s5]「不是，這哪裡沒問題！？」\n[s6]「根本超級顯眼的吧？」"
1010005-81 = "唔嗯……"
1010005-82 = "[ns]「他們剛才說的蒙面騎士……」"
1010005-83 = "唔嗯……我本來是為了防止奇怪的傳聞散播，才把臉遮起來的……"
1010005-84 = "[s]「沒想到反而造就了更不得了的傳聞……」"
1010005-85 = "嗯，這就是所謂的反效果吧……"
1010005-86 = "[s]「這是你的新自行車嗎？」"
1010005-87 = "嗯，這次是黑色的。#n不過這只是半成品，還需要再改造一下……就連車衣也還沒……"
1010005-88 = "等之後全都準備好再給你看。"
1010005-89 = "[s]「話說你所謂的煩惱是什麼呢？」"
1010005-90 = "嗯。"
1010005-91 = "對策委員會希望我繼承「阿拜多斯學生會」……"
1010005-92 = "雖然這表面上只是個名號，但我很清楚學生會的名號背後代表了什麼意義……#n所以一直在煩惱該怎麼答覆他們……"
1010005-93 = "[s]「這樣啊……」"
1010005-94 = "你覺得我該怎麼回答好呢，老師……？"
1010005-95 = "[s7]「泳裝蒙面團……」\n[s8]「還有蒙面騎士啊……」"
1010005-100 = "[ns9]「怎麼聽起來都不是很妙……」\n[ns10]「阿拜多斯的未來真的沒問題嗎……」"
1010005-103 = "[ns]「關於這件事情，我恐怕無法給你答案。」"
1010005-104 = "嗯……"
1010005-105 = "[ns]「不過可以確定的是，大家都很擔心你。」"
1010005-109 = "……"
1010005-110 = "嗯……我知道。"
1010005-111 = "正是因為如此，我才更沒有拒絕的權利吧？"
1010005-112 = "那我現在就傳訊息回覆他們。"
1010005-117 = "嗯……"
1010005-118 = "[ns]「你是怎麼回答的呢？」"
1010005-119 = "嗯……這是祕密。#n之後再告訴你。"
1010005-120 = "[s]「竟然是祕密嗎……！」"
1010005-125 = "回覆得還真快。"
1010005-130 = "[ns]「能讓我一起看嗎？」"
1010005-137 = "「嗯，我們接受挑戰。一決勝負吧，蒙面騎士。#n　　　　　　　　　　　　──『泳裝蒙面團』」"
1010005-141 = "[ns]「……一看就知道這是誰傳的。」"
1010005-142 = "……嗯。"
1010005-143 = "就是說啊。"

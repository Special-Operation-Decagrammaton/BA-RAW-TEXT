[translation]
1007505-1 = "ความเจ็บปวดแห่งศิลปะ 2"
1007505-3 = "ฉันมีแผนจะทำอะไรงั้นเหรอ? ถามเรื่องนั้นมาก็ดีแล้วละ!"
1007505-4 = "ฮิฮิฮิ... คราวก่อน ครูลากฉันไปที่พื้นที่ของครูตามใจชอบใช่มั้ยล่ะ?"
1007505-5 = "เพราะงั้นคราวนี้... ฉันจะฉุดกระชากลากถูครูเข้ามาในพื้นที่ของฉันบ้างยังไงล่ะ!"
1007505-6 = "[s] \"ศาลที่เคารพ ขอค้าน ข้าพเจ้าขอใช้สิทธิ์ปฏิเสธทุกอย่าง\""
1007505-7 = "ไม่รับค้าน! แล้วก็ไม่มีสิทธิ์ที่จะนิ่งเงียบ หรือดื้อแพ่งไม่ยอมทำตามด้วย!"
1007505-8 = "ศาลอะไรไม่ให้ใช้สิทธิพื้นฐานเลยงั้นเหรอ? ก็ศาลของฉันนี่ไง ไม่มีสิทธิอะไรพวกนั้นหรอก วะฮะฮะฮ่า!"
1007505-10 = "(เมรุคว้าแขนคุณครูไปจับไว้แน่น และลากคุณครูให้ตามไปที่ไหนสักแห่ง...)"
1007505-11 = "ร้านเกม"
1007505-12 = "[ns] \"ที่นี่มัน..?\""
1007505-13 = "ฮุ...ฮุ...ฮุ... ถ้าดูแค่ภายนอกก็คงเหมือนร้านเกมทั่วๆ ไป..."
1007505-14 = "แต่ว่าด้านหลังตู้คีบตุ๊กตาตรงนั้นมีบันไดอยู่ ถ้าเดินลงบันไดนั่นไปละก็..."
1007505-15 = "[s] \"อ้อ มีร้านโมเดลลับๆ อยู่สินะ\""
1007505-16 = "หืม? ครู... รู้จักพวกโมเดลด้วยเหรอ?"
1007505-17 = "คิดไม่ถึงเลยแฮะ... ไม่รู้เลยว่าครูจะสนใจ 'เรื่องพวกนี้' ด้วย"
1007505-18 = "ถ้างั้นค่อยๆ เดินดูกันเถอะ เดิมทีแล้วที่นี่เป็นพื้นที่สำหรับซื้อขายหรือแลกเปลี่ยนพวกการ์ตูนมือสองน่ะ"
1007505-19 = "วงการนี้ก็แบบนี้แหละ พอเริ่มสะสมของในวงการนี้สักชิ้นสองชิ้น สักพักก็จะเริ่มแตกไลน์ของสะสม#nไปเรื่อยๆ"
1007505-20 = "กันพลา โมเดล ของเล่น หนังสือบทละครฉบับไลฟ์แอคชัน ของสะสมอนิเมะ บทภาพยนตร์ หรือแม้แต่#nหนังสือภาพสตอรี่บอร์ดการ์ตูน..."
1007505-21 = "และในบรรดาร้านทั้งหมดที่ขยับขยายใหญ่โตขึ้นที่สุดก็คือที่นี่... ฟิกเกอร์โซนไงล่ะ"
1007505-22 = "[s] \"งั้นเหรอ โอ้ววว เดรสชุดนี้มัน...!\""
1007505-23 = "...เก็บทรงสักหน่อยก็ดี อย่าตื่นเต้นเกินไปล่ะ"
1007505-24 = "ห้างสรรพสินค้า"
1007505-25 = "[ns1] \"อืม ที่นี่เหมือนที่ที่ข้าน้อยพาท่านอาจารย์เมรุมาเมื่อครั้งก่อนเลย...\"\n[ns2] \"ดูไม่เห็นต่างกันเลย...\""
1007505-28 = "หัดเลียนแบบการใช้คำพูดของฉันด้วยแล้วเหรอเนี่ย...! ความเร็วในการเรียนรู้ของผู้ใหญ่นี่น่ากลัวจริงๆ"
1007505-29 = "แต่ที่นี่ไม่เหมือนห้างทั่วๆ ไปหรอกนะ! นั่นก็เพราะ..."
1007505-30 = "ที่นี่มี 'ป็อปอัปสโตร์' อยู่ยังไงเล่า!"
1007505-31 = "[s] \"ครูเป็นพวกไม่ค่อยได้ตามเทรนด์เท่าไรเลย...\""
1007505-32 = "ก็นะ มันเป็นร้านออฟไลน์ที่เปิดในระยะเวลาจำกัดน่ะ"
1007505-33 = "เป็นร้านที่จู่ๆ ก็เปิดขึ้นมาแล้วพอหมดช่วงเวลาหนึ่งก็ปิดไป ก็เลยเรียกว่า 'ป็อปอัป' ยังไงล่ะ"
1007505-34 = "มีร้านป็อปอัปสโตร์ที่ขายพวกสินค้าแฟนซี ดนตรี หรือละคร ที่คนทั่วไปชื่นชอบเปิดอยู่หลายๆ ที่เลย แต่ว่า..."
1007505-35 = "ที่นี่...! ร้านที่ขายเฉพาะสินค้าลิมิเต็ด สถานที่ที่พวกพ้องหรือกลุ่มคนที่มีความชอบแบบเดียวกัน#nอย่างเราจะร่วมสัมผัสประสบการณ์เดียวกันได้...!"
1007505-36 = "[s] \"มิน่าล่ะ คนมาใช้บริการถึงเงียบและเรียบร้อยกันดีแบบนี้\""
1007505-37 = "สายตาเฉียบแหลมมากจริงๆ นะ ครู!"
1007505-38 = "แต่ละคนจะซื้อสินค้าที่ตัวเองต้องการ และถ้าสนใจอะไรก็จะเดินดูรอบๆ อย่างเงียบๆ ไม่ทำเรื่องที่เสีย#nพลังงานโดยเปล่าประโยชน์!"
1007505-39 = "นั่นคือการปฏิบัติตัวขั้นพื้นฐานของเหล่าโอตาคุยังไงเล่า!"
1007505-40 = "[s] \"อ๊ะ ตรงนั้นมีลูกค้าที่ซื้อสินค้าลิมิเต็ดจำนวนเยอะๆ ด้วย\""
1007505-41 = "ฮุฮุฮุ... สินค้าลิมิเต็ดพวกนี้น่ะถ้าเอาไปขายอัปราคาสัก 1.5 เท่าในเว็บประมูลละก็... ไม่สิ แบบนี้ถึงจะ#nอัปราคาขึ้นสัก 2.5 เท่า ก็ยังขายได้อยู่ดี... กำไรเป็นกอบเป็นกำเลยทีเดียว...!"
1007505-45 = "......"
1007505-46 = "เจอพวกคนขายอัปราคาล่ะ! จับตัวไว้เร็ว!"
1007505-47 = "คาเฟ่"
1007505-50 = "[ns] \"ปิดท้ายด้วยคาเฟ่จริงๆ สินะ...\""
1007505-52 = "ถึงจะเป็นคาเฟ่ แต่ถ้าเป็นคาเฟ่ในแบบของพวกเราละก็ ไม่เหมือนกันหรอกนะ"
1007505-53 = "จะว่ายังไงดีล่ะ... บรรยากาศมันแตกต่างอย่างเห็นได้ชัดเลยไม่ใช่รึไง?"
1007505-54 = "[s] \"การตกแต่งร้านมัน... สมกับเป็นคาเฟ่ของ 'คนสายนี้' จริงๆ\""
1007505-55 = "ใช่มั้ยล่ะ! ตอนนี้กำลังมีอีเวนต์คอลแลปอยู่ด้วยนะ!"
1007505-56 = "ทั้งขายสินค้าพิเศษ วิดีโอตัวอย่างอนิเมะฉบับฉายโรงภาพยนตร์ การ์ดที่ระลึกพิเศษ แล้วก็สแตนดี้..."
1007505-57 = "อ่า... แน่นอนว่าต้องมีเมนูพิเศษที่คอลแลปกับคาเฟ่ด้วย! ครูจะสั่งเมนูไหนล่ะ?"
1007505-58 = "[s] \"ถ้างั้นครูขอ... 'เซ็ตอเมริกาโน่เติมพลังของฝ่ายบริหาร' แล้วกัน\""
1007505-59 = "ถ้างั้นฉันขอเป็น... 'มอนสเตอร์แม็กซ์ เอเนอร์ไจเซอร์ พิงค์สูตรพิเศษ'"
1007505-62 = "ฮู่ว สบายจริงๆ"
1007505-63 = "[s] \"เงียบจังเลยแฮะ\""
1007505-64 = "ก็ต้องเงียบแบบนี้แหละ ส่วนใหญ่คนที่มาก็มักจะเป็นพวกคนเงียบๆ กันอยู่แล้ว"
1007505-65 = "......"
1007505-66 = "ฉันพูดเรื่องนี้ก็เพราะว่าเป็นคุณครูหรอกนะ"
1007505-67 = "หนึ่งในความฝันของฉันน่ะ... คือการที่ได้เอาผลงานของตัวเองมาคอลแลปกับคาเฟ่แบบนี้ในสักวันหนึ่ง"
1007505-68 = "ตอนนี้ส่วนใหญ่ฉันวาดรูปแฟนอาร์ตอยู่ก็จริง แต่สักวันหนึ่งฉันจะต้องมีชื่อเสียงด้วยผลงานออริจินอล#nของตัวเองให้ได้!"
1007505-69 = "[s] \"เป็นความฝันที่ยิ่งใหญ่ดีจริงๆ เลยนะ\""
1007505-70 = "...ใช่แล้วละ แต่การจะไปถึงจุดจุดนั้นได้... ก็จะต้องก้าวข้ามผ่านอะไรหลายๆ อย่างไปให้ได้ก่อน"
1007505-71 = "อ่า... ถ้าแค่วาดรูปอยู่เงียบๆ แล้วทุกอย่างเป็นไปได้ด้วยดีได้ของมันเองก็คงดีไม่น้อยเลยนะ"
1007505-72 = "ฉันรู้แล้วน่า เรื่องที่ควรรู้ฉันก็รู้อยู่เหมือนกันนะ อย่ามองกันแบบนั้นสิ... คิดว่าฉันวาดรูปเพราะชอบ#nผลงานคนอื่นรึไง?"
1007505-73 = "[s] \"เป็นคำตอบที่คาดไม่ถึงเลยทีเดียวแฮะ\""
1007505-74 = "......"
1007505-75 = "กรณีของฉัน แทนที่จะเรียกว่าวาดรูปเพราะชอบ เรียกว่าถ้าไม่วาดจะอดใจไม่ไหวดีกว่าละมั้ง"
1007505-76 = "หมายถึงยังไงน่ะเหรอ? อืมมม..."
1007505-81 = "จะยกตัวอย่างก็แล้วกัน จู่ๆ ก็มีภาพฉากหนึ่งโผล่ขึ้นมาในหัว"
1007505-83 = "ไม่ว่าจะเป็นฉากที่ดี หรือว่าจะเป็นฉากไม่ดีก็ตาม แต่ก็มีอะไรบางอย่างที่ทำให้ภาพฉากฉากนั้นปรากฏ#nขึ้นมาในหัวของฉัน อาจจะเป็นเพราะอ่านหนังสือ อ่านมังงะ หรือดูหนังอะไรมาก็ตาม"
1007505-85 = "จากนั้นก็จะมีพวกเรื่องราวหรือฉากต่อจากนั้นโผล่เข้ามาในหัวไม่หยุดเลยละ แน่นอนว่าถ้าปล่อยไว้#nเฉยๆ ภาพพวกนั้นก็คงจะค่อยๆ หายไปเอง..."
1007505-87 = "แต่จะว่ายังไงดีล่ะ มันน่าเสียดายจนอดใจไม่ไหวน่ะ"
1007505-89 = "สมมุติว่าครูเจอนกกระจอกตัวหนึ่งที่หัวของมันติดอยู่ในกระป๋องเล็กๆ แต่หาวิธีเอาออกไม่ได้ละก็... ครูจะทำยังไง?"
1007505-90 = "[s] \"ก่อนอื่นก็คงเข้าไปช่วยน่ะ\""
1007505-91 = "ใช่มั้ยล่ะ? ฉันเองก็เหมือนกันนั่นแหละ ภาพที่ผุดขึ้นมาในหัวของฉันพวกนั้นน่ะ สำหรับฉันก็เหมือน#nนกกระจอกที่หัวติดอยู่ในกระป๋องเล็กๆ นั่นละ"
1007505-92 = "แล้วก็คงจะยังไม่สบายใจจนกว่าจะได้เข้าไปช่วย และเห็นมันโบยบินขึ้นไปบนท้องฟ้าอีกครั้ง"
1007505-96 = "หืม? เรื่องราวหรือฉากพวกนั้น มันผุดขึ้นมาเรื่อยๆ ไม่มีวันหยุดเลยไม่ใช่งั้นเหรอ? "
1007505-97 = "...ใช่แล้ว และมันก็เป็นเหตุผลที่ทำให้ฉันวาดรูปมาเรื่อยๆ แบบนี้ไงล่ะ "
1007505-98 = "ฉันน่ะ ถ้าไม่ถ่ายทอดสิ่งที่ผุดขึ้นในหัวออกมาละก็ ฉันคงจะกลายเป็นบ้าไปแน่ๆ"
1007505-99 = "แถมช่วงนี้ในหัวฉันมักจะมีภาพอะไรหลายๆ อย่างโผล่ขึ้นมาเยอะแยะเลย เพราะงั้นก็เลยรู้สึกลำบาก#nในหลายๆ อย่างน่ะ..."
1007505-103 = "......"
1007505-104 = "เดี๋ยวนะ ฉันกำลังพูดอะไรอยู่เนี่ย..."
1007505-105 = "......!"
1007505-106 = "พะ...พวกเรา มะ...เหมือนจะนั่งอยู่คาเฟ่นานเกินไปแล้วเนอะ?! ออกไปกันมั้ย?!"
1007505-107 = "[s] \"หืม? แต่เข้ามายังไม่ถึงชั่วโมงเลยนะ...\""
1007505-108 = "หนึ่งชั่วโมงก็นานเกินไปสำหรับโอตาคุตัวจริงแล้ว! เอาเป็นว่ารีบออกไปกันก่อนเถอะ"
1007505-111 = "ฮู่ว ใจเย็นขึ้นบ้างแล้วละ"
1007505-112 = "โอเคหรือเปล่าน่ะเหรอ? ก็นะ... นะ...แน่นอน! มีครูอยู่ด้วย ต้องโอเคอยู่แล้ว!"
1007505-113 = "หรือว่า... ไม่โอเคนะ..."
1007505-114 = "[s3] \"อืม... ครูไม่ค่อยเข้าใจเท่าไร แต่เดี๋ยวไปส่งแล้วกัน\"\n[s4] \"เอาเป็นว่าเดี๋ยวครูไปส่งที่ชมรมแล้วกัน\""
1007505-117 = "......!"
1007505-118 = "มะ...ไม่เป็นไร! ถ้ามาถึงตรงนี้แล้ว ฉันกลับคนเดียวได้สบายมาก!"
1007505-119 = "อะ...เอ๋? อย่าพูดอะไรเย็นชาแบบนั้นสิงั้นเหรอ? ช่างเหอะน่า! วันนี้ฉันอยากกลับคนเดียวน่ะ!"
1007505-120 = "ครั้งที่แล้วฉันก็ทำแบบนี้งั้นเหรอ? ที่ทำแบบนั้น... เป็นเพราะคุณครูรึเปล่าน่ะเหรอ?"
1007505-121 = "เปล่าสักหน่อย! ไม่ใช่เพราะครูสักหน่อย! คือว่าเรื่องนี้มัน... เป็นปัญหาของฉัน ใช่แล้ว ฉันมีปัญหาอยู่#nนิดหน่อยน่ะ"
1007505-125 = "เอาเป็นว่าฉันไปละ! ไว้เจอกันใหม่นะ ครู!"
1007505-130 = "(สุดท้าย คุณครูก็ได้แค่ยืนส่งเมรุที่ดูรีบร้อนแปลกๆ จนกระทั่งเธอเดินไปจนลับตา...)"

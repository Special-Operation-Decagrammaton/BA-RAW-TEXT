[translation]
1007505-1 = "#Title;창작의 고통 2"
1007505-2 = "3;메루;00\n#3;a\n#wait;1000"
1007505-3 = "3;메루;00;뭘 할 작정이었냐고? 말 잘했어!\n#3;em;[재잘]\n#3;jump"
1007505-4 = "3;메루;99;후후후…… 이전에는 선생이, 선생의 영역에 날 멋대로 이끌고 들어갔잖아?\n#3;greeting"
1007505-5 = "3;메루;03;그러니까 이번에는, 내 영역에 선생님을 끌고 들어가 마구 집어넣는 거지!"
1007505-6 = "[s] \"거부권을 행사하고 싶소. 재판관.\""
1007505-7 = "3;메루;05;기각! 덧붙여 묵비권도 몰수다!\n#3;jump"
1007505-8 = "3;메루;03;기본권을 보장하라고? 본 법정에서 그런 건 없어! 와하하하!\n#3;em;[음표]\n#3;jump"
1007505-9 = "#all;hide"
1007505-10 = "#na;(그대로 메루에게 팔을 붙잡힌 뒤, 어딘가로 날아가듯 끌려갔다……)"
1007505-11 = "#place;오락실\n3;메루;01\n#3;a\n#3;h"
1007505-12 = "[ns] \"여기는……?\""
1007505-13 = "3;메루;99;훗. 훗. 훗. 겉보기에는 그저 평범한 오락실로 보이겠지……"
1007505-14 = "3;메루;01;하지만 여기, 인형 뽑기 기계 뒤의 계단으로 걸어 내려가면……!\n#3;greeting"
1007505-15 = "[s] \"이해했어. 비밀 피규어 샵이었군.\""
1007505-16 = "3;메루;02;음? 선생. 피규어라는 단어를 알고 있었던 건가?\n#3;em;[?]"
1007505-17 = "3;메루;03;의외로군…… 선생에게 '이쪽'의 소양이 있었을 줄은."
1007505-18 = "3;메루;00;그러면 천천히 둘러보게나. 이곳은 원래 중고 만화책을 주로 거래하고 교환하는 장소였지만……"
1007505-19 = "3;메루;01;이 분야가 다 그렇듯, 관련 상품을 하나둘 취급하다 보니 온갖 오타쿠 상품 전반을 취급하게 되었지."
1007505-20 = "3;메루;99;프라모델, 피규어, 완구, 특촬 드라마 대본, 애니메이션 셀화, 각본, 만화 콘티……"
1007505-21 = "3;메루;01;그중에서 가장 영역이 커지게 된 곳이, 여기 피규어 에어리어야.\n#3;em;[반응]"
1007505-22 = "[s] \"과연 그렇군. 오오, 이 드레스의 조형은……!\""
1007505-23 = "3;메루;04;……너무 과하게 몰두하지는 말아 달라고.\n#3;em;[땀]"
1007505-24 = "3;메루;01\n#3;a\n#place;쇼핑몰"
1007505-25 = "[ns1] \"흐음. 이곳은 예전 소인이 메루 공을 데려갔던 곳과.\"\n[ns2] \"그다지 다르지 않아 보이오만……\""
1007505-26 = "#wait;100"
1007505-27 = "#wait;100"
1007505-28 = "3;메루;04;어느새 말투까지 습득한 것인가……! 어른의 학습력이란 무섭구만.\n#3;stiff\n#3;em;[땀]"
1007505-29 = "3;메루;03;하지만 이곳은 일반적인 쇼핑몰과는 다르다! 왜냐하면, 무엇보다……\n#3;jump"
1007505-30 = "3;메루;00;'팝업 스토어'가 있는 곳이니까!\n#3;closeup"
1007505-31 = "[s] \"선생님은 그런 최신 유행에 약하단다……\""
1007505-32 = "3;메루;01;뭐, 그러니까 제한적으로 운영되는 오프라인 테마 매장이야."
1007505-33 = "3;메루;99;잠깐 나타났다가 사라진다고 해서 '팝업'인 거지.\n#3;greeting"
1007505-34 = "3;메루;02;일반인들이 좋아하는 드라마나 음악, 팬시상품 같은 팝업 스토어도 제법 여기저기에서 열리지만……"
1007505-35 = "3;메루;03;이곳은! 우리 동지들만이 공감할 수 있는! 그런 한정판 상품만을 취급하는 스토어인 것이다!\n#3;em;[재잘]\n#3;jump"
1007505-36 = "[s] \"과연. 어딘가 이용객들이 얌전하고 조용하더라니.\""
1007505-37 = "3;메루;00;눈썰미가 좋군, 선생!"
1007505-38 = "3;메루;02;각자 자기 살 것만 사고, 흥미가 있으면 말없이 둘러보고! 쓸데없이 떠들면서 에너지를 낭비하지 않는 자세!"
1007505-39 = "3;메루;03;그야말로 오타쿠의 기본적인 태도라고 할 수 있지!\n#3;greeting"
1007505-40 = "[s] \"아, 저기 똑같은 한정판을 대량으로 사는 손님이 있어.\""
1007505-41 = "#na;대량 구입한 손님;후후후…… 이 한정판을 인터넷 경매 사이트에 1.5배의 가격으로 올리면…… 아니야. 이 정도면 2배나 2.5배까지 올려도 충분히 팔릴 터…… 그렇게 되면 수익률이……!"
1007505-42 = "#st;[0,0];instant;1;"
1007505-43 = "#clearST"
1007505-44 = "3;메루;02;\n#3;em;…\n#wait;2500"
1007505-45 = "3;메루;02;……"
1007505-46 = "3;메루;04;한정판 되팔이다! 잡아라!\n#3;closeup"
1007505-47 = "#place;카페\n#all;hide"
1007505-48 = "#wait;1000"
1007505-49 = "#wait;2500"
1007505-50 = "[ns] \"역시 마지막은 카페인가.\""
1007505-51 = "3;메루;99\n#3;a\n#wait;1000"
1007505-52 = "3;메루;03;카페라고 해도, 우리 영역의 카페는 조금 다르지."
1007505-53 = "3;메루;00;그렇다고 할까, 딱 봐도 분위기가 다르지 않아?"
1007505-54 = "[s] \"내부 인테리어가…… 완전히 '이쪽'이네.\""
1007505-55 = "3;메루;03;그렇지! 마침 콜라보 이벤트를 진행 중이거든!\n#3;em;[음표]"
1007505-56 = "3;메루;01;등신대 판넬, 특전 기프트 카드, 극장판 예고편 상영, 굿즈 판매……"
1007505-57 = "3;메루;03;아, 콜라보 카페 특별 메뉴도 당연히 있어! 선생은 뭘로 할래?\n#3;em;[전구]"
1007505-58 = "[s] \"그렇다면 나는…… 여기, '기운충전 행보관의 아메리카노 세트'.\""
1007505-59 = "3;메루;03;그러면 나는 '핑크빛 에너자이저 요괴 MAX 특별판'!\n#3;hophop"
1007505-60 = "#all;hide"
1007505-61 = "3;메루;01\n#3;a\n#wait;1000"
1007505-62 = "3;메루;03;후우, 편안하다.\n#3;greeting\n#3;em;[한숨]"
1007505-63 = "[s] \"뭔가, 조용하네.\""
1007505-64 = "3;메루;02;그야 그렇겠지. 어쨌든 다들 기본적으로는 조용한 사람들이니까.\n#3;em;[반응]"
1007505-65 = "3;메루;99;……\n#3;em;…"
1007505-66 = "3;메루;01;이런 자리에서, 선생이니까 이야기하는 거지만."
1007505-67 = "3;메루;02;내 꿈 중 하나는…… 언젠가 이런 카페에서, 내 창작물로 콜라보를 해 보는 거야."
1007505-68 = "3;메루;03;지금은 2차 창작 위주로 활동하고 있지만, 언젠가 나만의 작품으로 인기를 얻게 되면 말이지!\n#3;jump"
1007505-69 = "[s] \"그건 뭔가, 대단한 꿈이네.\""
1007505-70 = "3;메루;01;……확실히 그렇지. 거기까지 가는 데에만 해도…… 이래저래, 많은 걸 뛰어넘어야 할 거고."
1007505-71 = "3;메루;99;아아, 그냥 창작만 조용히 하고 있으면, 알아서 모든 게 척척 해결되면 좋을 텐데 말이야.\n#3;em;[한숨]\n#3;greeting"
1007505-72 = "3;메루;02;알아, 알아. 나도 알 거 다 아니까 그런 시선으로 바라보지 말라고…… 누군 창작하는 게 좋아서 하는 줄 알아?"
1007505-73 = "[s] \"그건 조금 의외인 대답인데.\""
1007505-74 = "3;메루;99;……"
1007505-75 = "3;메루;99;내 경우는, 창작이 하고 싶어서 한다기보다는, 그걸 하지 않으면 참을 수 없기 때문에 창작을 한다고 봐야 하려나."
1007505-76 = "3;메루;01;무슨 의미냐고? 으음……\n#3;em;[?]"
1007505-77 = "#st;[0,0];instant;1;"
1007505-78 = "#clearST"
1007505-79 = "3;메루;01\n#3;em;…\n#wait;2500"
1007505-80 = "#all;hide"
1007505-81 = "#na;메루;가령 이런 거야. 어떤 장면을 우연히 떠올리게 돼."
1007505-82 = "#all;hide"
1007505-83 = "#na;메루;그게 좋아 보이는 장면이든, 무언가 나빠 보이는 장면이든. 아무튼 무언가가 어떤 계기로 내 머릿속에 떠오른단 말이야. 책을 읽었기 때문이든, 무슨 영화나 만화를 봤기 때문이든, 하여튼간에. "
1007505-84 = "#all;hide"
1007505-85 = "#na;메루;그러면 내 안에서는…… 자동적으로 그다음의 이야기나 장면 같은 게 불쑥, 솟아올라. 물론 그걸 그대로 내버려 두면 알아서 사그라들고 없어지겠지만……"
1007505-86 = "#all;hide"
1007505-87 = "#na;메루;그게, 뭔가, 참을 수 없이 아까운 거지."
1007505-88 = "3;메루;99\n#3;a"
1007505-89 = "3;메루;01;선생은, 가령 참새가 머리에 작은 깡통 같은 게 끼어서 어쩔 줄 몰라 하고 있다면, 어떻게 할 거야?"
1007505-90 = "[s] \"일단…… 도와주겠지?\""
1007505-91 = "3;메루;03;그렇겠지? 나도 마찬가지야. 내 안에서 솟아오른 그거, 내가 보기엔 머리에 깡통이 껴서 낑낑대는 참새처럼 느껴지거든.\n#3;em;[반응]\n#3;jump"
1007505-92 = "3;메루;00;그 깡통에서 참새를 빼내고, 참새가 다시 날아가는 걸 볼 때까지는 왠지 마음이 편안해지지 않는단 말이지."
1007505-93 = "#st;[0,0];instant;1;"
1007505-94 = "#clearST"
1007505-95 = "#wait;2500"
1007505-96 = "3;메루;02;응? 그런 이야기나 장면 같은 건, 결국 끝없이 생겨나는 거 아니냐고?\n#3;em;[?]"
1007505-97 = "3;메루;01;……그렇지. 그래서 내가 창작을 계속하는 이유가 거기에 있어. \n#3;greeting"
1007505-98 = "3;메루;02;난 내 안에서 생겨나는 것들을, 어떻게든 밖으로 표현하지 않으면 머리가 이상해질 것 같단 말이야."
1007505-99 = "3;메루;03;거기에 요샌 또 다른 무언가가 내 안에서 자꾸 솟아나려고 하고 있어서, 여러모로 곤란하단 말이지……\n#3;em;[재잘]"
1007505-100 = "#st;[0,0];instant;1;"
1007505-101 = "#clearST"
1007505-102 = "3;메루;03\n#3;em;…\n#wait;2500"
1007505-103 = "3;메루;04;……"
1007505-104 = "3;메루;04;잠깐, 나 지금 무슨 소리를 한 거……"
1007505-105 = "3;메루;10;……!\n#3;em;[///]"
1007505-106 = "3;메루;07;우, 우리! 너무 오래 카페에 있었던 것 같지? 이만 나갈까?!"
1007505-107 = "[s] \"응? 하지만 들어온 지 1시간도 안 지난 것 같은데……\""
1007505-108 = "3;메루;09;1시간이면 충분히 길어! 오타쿠라면 더 그래! 아무튼 나가는 거야, 알았어?\n#3;em;[!]\n#3;jump"
1007505-109 = "#all;hide"
1007505-110 = "3;메루;99\n#3;a\n#wait;1000"
1007505-111 = "3;메루;99;후아…… 이제 열이 좀 내리네.\n#3;jump"
1007505-112 = "3;메루;04;괜찮냐고? 그야…… 무, 물론! 선생이 있는데 괜찮지!\n#3;em;[?!]"
1007505-113 = "3;메루;09;아니면…… 그 반대이거나……\n#fontsize;50"
1007505-114 = "[s3] \"으음…… 잘 모르겠지만.\"\n[s4] \"일단 지식해방전선까지 데려다줄게.\""
1007505-115 = "#wait;100"
1007505-116 = "#wait;100"
1007505-117 = "3;메루;10;……!\n#3;em;[!]\n#3;shake"
1007505-118 = "3;메루;07;괘, 괜찮아! 여기까지 왔는데. 나 혼자 충분히 찾아갈 수 있어!\n#3;jump"
1007505-119 = "3;메루;10;어, 어? 정 없게 또 그러지 말라고? 됐으니까! 오늘은 혼자 좀 돌아가고 싶으니까!\n#3;shake"
1007505-120 = "3;메루;10;예전에도 그러지 않았냐고? 그게…… 선생 때문이냐고?"
1007505-121 = "3;메루;07;아니야! 선생 때문은 절대 아니고! 그러니까 이건…… 내 문제, 내 문제야!\n#3;jump\n#3;em;[!]"
1007505-122 = "#st;[0,0];instant;1;"
1007505-123 = "#clearST"
1007505-124 = "3;메루;07\n#3;m2\n#wait;1000"
1007505-125 = "3;메루;09;아무튼 간다! 또 보자고, 선생!\n#3;em;[반응]"
1007505-126 = "#st;[0,0];instant;1;"
1007505-127 = "#clearST"

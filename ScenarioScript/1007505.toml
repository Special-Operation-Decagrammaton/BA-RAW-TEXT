[translation]
1007505-1 = "Creative Anguish 2"
1007505-3 = "What is my evil plan? Good question!"
1007505-4 = "Heeheehee... Last time, you showed me a glimpse of your world."
1007505-5 = "So this time, I'll be bringing you into my world!"
1007505-6 = "[s] \"I'd like to invoke my right of refusal, your honor.\""
1007505-7 = "Overruled! No right to remain silent either!"
1007505-8 = "Your normal rights won't be recognized in my court! Hahaha!"
1007505-10 = "Despite my protests, Meru grabbed ahold of my arm and pulled me along into \"her world.\""
1007505-11 = "Arcade"
1007505-12 = "[ns] \"This is...?\""
1007505-13 = "Heh. Heh heh. It may seem like an average arcade..."
1007505-14 = "But if we walk down the stairs hidden behind the crane game...!"
1007505-15 = "[s] \"I see. A secret figurine shop.\""
1007505-16 = "Huh? You know what figurines are, Sensei?"
1007505-17 = "How unexpected... I didn't know you had these kinds of interests."
1007505-18 = "Take your time and peruse the shop! This place was originally used for trading or selling used manga."
1007505-19 = "But over time, people started trading other, similar items. Eventually, it just became a general place for otaku-related goods."
1007505-20 = "Plastic models, figurines, toys, tokusatsu scripts, animation stills, manga drafts..."
1007505-21 = "But the area that really gained popularity was the figurines section."
1007505-22 = "[s] \"That's cool, actually... Wow, look at the modeling of this dress...!\""
1007505-23 = "...Don't have too much fun now."
1007505-24 = "Shopping Mall"
1007505-25 = "[ns1] \"Hm. I daresay that this place feels familiar.\"\n[ns2] \"Somehow, it feels like we've been somewhere like this before.\""
1007505-28 = "Sensei! You're beginning to imitate my mannerisms. Adults really are fast learners."
1007505-29 = "But this isn't just any mall! It's different from other malls!"
1007505-30 = "It has a pop-up store!"
1007505-31 = "[s] \"I'm not well-versed in the latest trends like that...\""
1007505-32 = "It's a limited-time, brick-and-mortar shop that sells specialized goods!"
1007505-33 = "They're called \"pop-ups\" because they're only around for a limited time."
1007505-34 = "Pop-up stores for tv shows, music, and other fancy goods have been...popping up all over the place!"
1007505-35 = "But this one is the good stuff! It handles limited time goods that only us and those like us can truly appreciate!"
1007505-36 = "[s] \"I see. I noticed that the customers are all very well-mannered.\""
1007505-37 = "Good eye, Sensei!"
1007505-38 = "Everyone is here to purchase what they want, and get out! They don't want to waste energy or time talking to others!"
1007505-39 = "Such behavior is the cornerstone of otaku culture!"
1007505-40 = "[s] \"Oh. That person is buying a lot at once.\""
1007505-41 = "Heh heh... I can probably list this item online for one-point-five... No! Maybe even twice the retail price! My profits will skyrocket!"
1007505-45 = "..."
1007505-46 = "It's a scalper! Get 'em!"
1007505-47 = "Cafe"
1007505-50 = "[ns] \"Haven't we been here before?\""
1007505-52 = "It is indeed a cafe, but this one is different from the last one we went to."
1007505-53 = "You can feel the difference, can't you?"
1007505-54 = "[s] \"The interior design is...made for otakus?\""
1007505-55 = "Indeed! They're doing a collaboration event!"
1007505-56 = "They have life-sized stands, special gift cards, a sneak preview of the upcoming movie, merch..."
1007505-57 = "Oh, and the menu also has special collaboration items! What would you like?"
1007505-58 = "[s] \"Let's see... I'll have the 'Recharging Officer's Americano Set.'\""
1007505-59 = "Then I'll have the \"Pink Energizer Frenzy MAX Special!\""
1007505-62 = "Whew, I feel so at home."
1007505-63 = "[s] \"Quiet, isn't it?\""
1007505-64 = "Of course. These kinds of places tend to attract more introverted, quiet types."
1007505-65 = "..."
1007505-66 = "Okay. I have something to tell you, Sensei. But I'm only telling you!"
1007505-67 = "One of my dreams...is creating something and getting to collaborate with a cafe, just like this."
1007505-68 = "Most of my works are derivatives right now, but one day an original work of mine will be flying off the stands!"
1007505-69 = "[s] \"That's an amazing dream.\""
1007505-70 = "...It absolutely is! Although I know the path there will be treacherous to navigate."
1007505-71 = "I wish art was as easy as just sitting down and creating something every once in a while."
1007505-72 = "I know, I know. Life isn't that easy, so you don't have to give me that look... It's not like every act of creation can always be fun."
1007505-73 = "[s] \"That was an unexpected answer.\""
1007505-74 = "..."
1007505-75 = "In my case, no matter how many obstacles I face, it's harder for me to not create an idea I've had, than to just let it go. It's not always because I like doing it."
1007505-76 = "What does that mean? Hm..."
1007505-81 = "Think of it this way. Sometimes, a scene or an idea will blossom in my brain."
1007505-83 = "Like the sketchable moments! Something will trigger an idea: a book, an anime, anything really, and that moment becomes a scene in my head!  "
1007505-85 = "I can't help but to then start building the next scene, or even the entire plot! I suppose letting the idea go would be an option..."
1007505-87 = "But it feels almost impossible to just set them free, you know?"
1007505-89 = "Let's say you come across a small bird with its head stuck in a tin can. What would you do?"
1007505-90 = "[s] \"I guess... I'd help it?\""
1007505-91 = "Exactly! That's how I feel about my sketchable moments! They're just like the bird with the tin can."
1007505-92 = "I can't just walk by and let it go! I have to rescue the bird, and see it take glorious flight."
1007505-96 = "Huh? Don't stories and scenes pop up in my head all the time?"
1007505-97 = "Duh. That's the point Sensei! That's why my artist's soul can never stop burning!  "
1007505-98 = "If I can't express these sketchable moments, these scenes that play in my head, I'll go insane!"
1007505-99 = "But lately, I've been feeling something strange... Like something new, stronger than a sketchable moment, is trying to burst forth in my mind. It's been a real struggle to..."
1007505-103 = "..."
1007505-104 = "Wait, what am I saying...?!"
1007505-105 = "...!"
1007505-106 = "W-We've been here for way too long! Let's get out of here!"
1007505-107 = "[s] \"What? But we haven't even been here an hour...\""
1007505-108 = "An hour is way too long for an otaku! We're leaving! Now!"
1007505-111 = "Whew... I can finally cool down."
1007505-112 = "Am I doing all right? Well... O-Of course! I'm with you, after all!"
1007505-113 = "...M-Maybe it's the other way around, actually..."
1007505-114 = "[s3] \"I'm confused, but let's head out.\"\n[s4] \"For now I'll take you back to the Knowledge Liberation Front.\""
1007505-117 = "...!"
1007505-118 = "Th-That's okay! I found my way here so I can get back by myself too!"
1007505-119 = "Wh-What? Don't be so distant? It's fine! I just want to be by myself for a bit!"
1007505-120 = "I did this last time as well? And you think...it may be your fault?"
1007505-121 = "No! It's definitely not your fault, Sensei! This is...um... It's none of your business! I mean! Not like that!"
1007505-125 = "Anyways, I gotta go! Bye, Sensei!"
1007505-130 = "Despite being entertained by the rare sight of Meru being flustered, I let her go and waved until her quickly receding back disappeared from sight."

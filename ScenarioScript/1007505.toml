[translation]
1007505-1 = "創作的痛苦（２）"
1007505-3 = "問我今天想做什麼？#n這個問題問得真好！"
1007505-4 = "哼哼哼……之前老師不是把我拉進了你的領域嗎？"
1007505-5 = "所以這次我要強迫老師進入我的領域！"
1007505-6 = "[s]「報告法官，我想行使否決權。」"
1007505-7 = "駁回！緘默權也駁回！"
1007505-8 = "要我保障基本權利？#n本法庭沒有那種東西！哇哈哈哈！"
1007505-10 = "（就這樣被愛瑠抓著手，帶到了某個地方……）"
1007505-11 = "遊戲中心"
1007505-12 = "[ns]「這裡是……？」"
1007505-13 = "哼哼哼，看起來是普通的遊戲中心對吧……"
1007505-14 = "但是，從這個夾娃娃機後面的樓梯往下走就會發現……！"
1007505-15 = "[s]「原來有間隱藏的公仔店。」"
1007505-16 = "嗯？老師，原來你知道公仔這個詞啊？"
1007505-17 = "真意外……沒想到老師有「這方面」的素養。"
1007505-18 = "我們慢慢逛吧。#n這裡本來是交易漫畫這類二手書的地方……"
1007505-19 = "後來漸漸開始經手漫畫相關的商品，最後就變成販售各種御宅族商品的地方了。#n這個領域時常會有這種情況。"
1007505-20 = "模型、公仔、玩具、特攝劇的劇本、賽璐珞動畫的透明畫片、腳本、分鏡劇本……"
1007505-21 = "其中變得最大的就是這個公仔區。"
1007505-22 = "[s]「原來如此。哦哦，這套連衣裙的造型……！」"
1007505-23 = "……別一下就著迷了。"
1007505-24 = "購物中心"
1007505-25 = "[ns1]「唔嗯，這裡和先前帶愛瑠姊去的地方……」\n[ns2]「看起來沒有太大的不同……」"
1007505-28 = "什麼時候連語氣都學會了……！#n大人的學習能力真可怕。"
1007505-29 = "但是這裡和一般的購物中心不一樣！#n因為……"
1007505-30 = "這裡有「快閃店」！"
1007505-31 = "[s]「抱歉，老師對最新的流行很不在行……」"
1007505-32 = "這個嘛，簡單來說就是期間限定的主題賣場啦。"
1007505-33 = "因為時間到了就會消失，所以才叫「快閃」。"
1007505-34 = "雖然最近一般人會喜歡的連續劇、音樂、流行商品等等也會有快閃店……"
1007505-35 = "但這裡！是只有我等的同志才能產生共鳴的那種！販售限定商品的商店啊！"
1007505-36 = "[s]「原來是這樣，怪不得店裡的客人都這麼安靜。」"
1007505-37 = "觀察力很不錯嘛，老師！"
1007505-38 = "專注於自己想買的東西，有興趣的話就靜靜地逛！#n絕不引發無謂爭吵浪費能量的模樣……！"
1007505-39 = "這才是御宅族應有的態度！"
1007505-40 = "[s]「啊，那裡有個買了一大堆限定商品的人……」"
1007505-41 = "唔嘻嘻……只要把這款限量商品放到網拍上賣個1.5倍價……#n不，就算賣2倍，甚至2.5倍價也賣得掉……這樣就能賺到……！"
1007505-45 = "……"
1007505-46 = "是轉賣仔！快抓住他！"
1007505-47 = "咖啡廳"
1007505-50 = "[ns]「最後果然還是要來咖啡廳啊。」"
1007505-52 = "雖然都是咖啡廳，但我們領域的咖啡廳可是不一樣的哦。"
1007505-53 = "或者該這麼說吧，氣氛有所不同？"
1007505-54 = "[s]「店裡的裝潢……完全是為『這個族群』設計的呢。」"
1007505-55 = "說的沒錯！因為這裡剛好在進行聯名活動！"
1007505-56 = "人形立牌、特典禮品卡、劇場版預告片、周邊商品……"
1007505-57 = "啊，當然少不了聯名咖啡廳的限定菜單！#n老師要點什麼呢？"
1007505-58 = "[s]「既然這樣，我要……這個『行政官的黑咖啡套餐』。」"
1007505-59 = "那我要「粉紅能量妖怪MAX聯名版」！"
1007505-62 = "呼，真舒服。"
1007505-63 = "[s]「還挺安靜的呢。」"
1007505-64 = "這也很正常吧。#n大家基本上還是很守規矩的。"
1007505-65 = "……"
1007505-66 = "因為是在這種地方，因為是老師才特別告訴你……"
1007505-67 = "我的其中一個夢想……#n就是希望有一天能在這樣的咖啡廳，用我的原創作品推出聯名活動。"
1007505-68 = "雖然現在的活動還以二次創作為主……#n但是有朝一日，我一定會挑戰推出自己的作品，試著讓它出名的！"
1007505-69 = "[s]「真是個了不起的夢想。」"
1007505-70 = "……嗯。#n但想要走到那一步……就必須克服重重難關。"
1007505-71 = "啊啊～要是只要埋頭創作，一切就能水到渠成就好了～"
1007505-72 = "我知道我知道，不必用那種眼神看我……沒有人是因為喜歡才創作的吧？"
1007505-73 = "[s]「這倒是讓我有點意外。」"
1007505-74 = "……"
1007505-75 = "就我的情況來說，與其說是因為想創作而創作……#n應該更接近不創作就無法忍受才對。"
1007505-76 = "這是什麼意思？#n嗯……"
1007505-81 = "舉例來說，有時我會突然想到某個場景。"
1007505-83 = "無論看起來是好是壞，又是因為什麼樣的契機而浮現……#n是看了書也好，看了電影或漫畫也罷。 "
1007505-85 = "總之我的腦海中……就會自動湧現接下來的劇情或場景。#n當然如果置之不理，它就會漸漸消失、遭到遺忘……"
1007505-87 = "而我……就會因此感到遺憾與浪費。"
1007505-89 = "老師，如果你看見一隻麻雀的頭卡在小罐子裡動彈不得……會怎麼做呢？"
1007505-90 = "[s]「應該……會幫忙脫困吧？」"
1007505-91 = "對吧？我也一樣。#n我認為從我心裡湧現的故事，和頭卡在罐子裡的麻雀是一樣的。"
1007505-92 = "在幫助麻雀掙脫束縛，再次展翅高飛之前……心裡總會覺得不踏實。"
1007505-96 = "嗯？你說那種劇情和場景是不是會不斷上演？"
1007505-97 = "……沒錯。#n所以我才會持續創作。"
1007505-98 = "如果不把心裡湧現的東西表現出來，我的腦袋就會亂成一團。"
1007505-99 = "再加上最近老是有某些其他的東西想在我的心裡萌芽，實在很傷腦筋……"
1007505-103 = "……"
1007505-104 = "等等！我剛才說了什麼……"
1007505-105 = "……！"
1007505-106 = "我，我們是不是待太久了？差，差不多該走了吧！？"
1007505-107 = "[s]「嗯？可是才待不到1小時吧……」"
1007505-108 = "1小時已經夠久了！尤其是對御宅族來說！#n總之我們該走了，知道了嗎？"
1007505-111 = "呼……終於冷靜下來了。"
1007505-112 = "我還好嗎？#n那……那當然！畢竟有老師在嘛！"
1007505-113 = "呃……還是該說就是因為有老師在呢……"
1007505-114 = "[s3]「這個嘛……我也不太清楚。」\n[s4]「先送你回知識解放戰線吧。」"
1007505-117 = "……！"
1007505-118 = "沒，沒關係！#n反正都已經到這裡了，我一個人也可以回去！"
1007505-119 = "嗯？要我別說這麼無情的話？#n就，就說沒關係了！我今天想一個人回去嘛！"
1007505-120 = "之前好像也這樣？#n是不是因為……老師的關係？"
1007505-121 = "才不是！不是因為老師！這……這是我自己的問題！"
1007505-125 = "總之我先走了！下次見，老師！"
1007505-130 = "（目送難得驚慌失措的愛瑠離開，直到他的身影徹底消失……）"

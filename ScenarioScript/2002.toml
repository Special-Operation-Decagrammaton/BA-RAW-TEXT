[translation]
2002-1 = "ก็เป็นแบบนี้อยู่เรื่อย"
2002-2 = "(สมาชิกชมรมของหวานหลังเลิกเรียนเดินเล่นอยู่ริมแม่น้ำในเวลาหลังเลิกเรียน)"
2002-7 = "จริงสิ อีกไม่กี่วันก็จะถึงวันหยุดยาวแล้วนี่นา เราได้หยุดติดต่อกันตั้ง 4 วัน คิดกันไว้รึยังว่าจะทำอะไรดี?"
2002-8 = "ไม่ได้คิดอ่ะ ฉันว่าจะอยู่เฉยๆ วันหยุดยาวไม่ได้มีไว้เพื่อให้นอนโง่ๆ หรอกเหรอ? "
2002-9 = "อืม... ก็นะ คิดไว้แล้วล่ะว่าเธอต้องเป็นแบบนี้"
2002-10 = "...? หมายความว่ายังไงน่ะ?"
2002-11 = "ก็... ก็อย่างที่พูดนั่นแหละ"
2002-12 = "ยะ... โยชิมิจังมีแพลนจะทำอย่างอื่นเหรอ?"
2002-13 = "ฉันว่าจะตามเก็บเนื้อหาของคาบเรียนที่ไม่ได้เข้าสักหน่อย..."
2002-14 = "ฉันน่ะเหรอ? ฉันก็ไม่ได้คิดจะทำอะไรมากมายหรอก แค่ช่วงวันหยุดยาวมีจัดงานอะไรตั้งเยอะแยะ#nก็เลยว่าจะออกไปสำรวจของหวานสักหน่อย..."
2002-20 = "เฮือก...!"
2002-22 = "…?"
2002-24 = "ฮะ... เฮือก!!"
2002-25 = "…?"
2002-26 = "...? นะ... นัตสึจัง? ทำไมจู่ๆ ก็เป็นแบบนี้ไปล่ะ?"
2002-30 = "อยากกินอะไรหวานๆ จัง"
2002-32 = "ตกใจหมดเลย! นึกว่าเกิดเรื่องอะไรซะอีก!!"
2002-34 = "นะ... นัตสึจัง แต่เราเพิ่งไปกินขนมที่คาเฟ่มิลเฟยด้วยกันมานะ... เมื่อกี๊เลย..."
2002-35 = "NO! นั่นมันคนละกระเพาะกัน อีกอย่าง ฉันเป็นเด็กมัธยมที่กำลังโตนะ#nร่างกายฉันต้องการน้ำตาลอยู่เรื่อยๆ เลย"
2002-36 = "ไปเอาคำพูดแปลกๆ แบบนี้มาจากที่ไหนอีกล่ะเนี่ย..."
2002-37 = "พูดมาได้~ ตัวเองนั่นแหละพูดแปลกกว่าตั้งหลายเท่า~"
2002-38 = "…"
2002-40 = "ช่างเถอะ ตกลงจะเอายังไงกันล่ะ? ไปต่อเหรอ? ถ้าจะไป ฉันไปด้วย"
2002-41 = "โยชิมิจัง ทำไมพูดอะไรเหมือนลุงข้างบ้านเลย..."
2002-42 = "คะ... ใครเป็นลุงกันเล่า!? ฮึ่ม!"
2002-43 = "ไปต่อเหรอ... อืม..."
2002-44 = "เป็นไอเดียที่ดีนะ แต่มันดูธรรมดาไปหน่อย"
2002-45 = "ไม่มีอะไรที่เร้าใจกว่านี้บ้างเลยเหรอ?"
2002-46 = "เร้าใจ...?"
2002-47 = "ใช่แล้ว"
2002-48 = "อย่างเช่น..."
2002-50 = "การผจญภัยตามหาของหวานในตำนาน!!"
2002-56 = "พอๆๆ แยกย้าย~ จบกิจกรรมของชมรมในวันนี้แต่เพียงเท่านี้~"
2002-57 = "โยชิมิจัง เราไปต่อด้วยกันไหม?"
2002-58 = "หืม!? แล้วเมื่อกี๊ยังมาว่าฉันอยู่เลย...!"
2002-60 = "…"
2002-61 = "อะไรกัน... คนอุตส่าห์ออกความคิดเห็น ทำไมไม่ให้ความร่วมมือกันเลยล่ะ?"
2002-62 = "จะขอความร่วมมือก็พูดให้มันดีๆ เซ่!"
2002-63 = "ฉันหาข้อมูลมาได้แล้วล่ะ ลองไปดูสักหน่อยก็ไม่น่าเสียหายนะ ว่าไหม?"
2002-64 = "ไม่อะ ไม่เป็นไร..."
2002-65 = "มีถ้ำที่หนึ่งแถวเนินเขาที่ห่างออกไปจากเขตปกครองตนเองทรีนิตี้...!"
2002-66 = "เริ่มแล้วไง..."
2002-67 = "ว่ากันว่าในถ้ำจะยังคงอุณหภูมิติดลบแม้จะเป็นฤดูร้อน ก็เลยมีเสาน้ำแข็งอยู่ตลอดทั้งปีด้วยนะ  "
2002-68 = "แต่ว่าจริงๆ แล้ว... เสาน้ำแข็งนั่นน่ะ... "
2002-69 = "ว่ากันว่าเป็นเสาของน้ำจากรากต้นชูการ์เมเปิลที่เติบโตอยู่ด้านบนของถ้ำ!"
2002-70 = "ลองคิดดูสิ เท่ากับว่ามันคือเสาเมเปิลไซรัปแท้ๆ จากธรรมชาติเลยนะ! ไม่สงสัยกันบ้างเหรอ?"
2002-71 = "ไปเอาเรื่องแปลกๆ แบบนี้มาจากไหนอีกแล้ว..."
2002-72 = "เรื่องแปลกๆ งั้นเหรอ? มันลงในคอลัมน์เรื่องลึกลับของ 'สวีท & กัน รายเดือน' เลยนะ จะดูไหมล่ะ?"
2002-73 = "ได้ลงในนั้นเลยเหรอ!?"
2002-74 = "ก็ใช่น่ะสิ ไปดูกันเถอะ! นี่คือการไปตามหาไอศกรีมเมเปิลที่ธรรมชาติสร้างขึ้น! นี่เพื่อนๆ? ไม่สงสัยกันเลยเหรอ?"
2002-75 = "ไม่อ่ะ ไม่ไป! ได้หยุดยาวทั้งที ใครจะไปทำอะไรแบบนั้นกันล่ะ!?"
2002-76 = "พูดจริงเหรอ? มะ... ไม่อยากไปจริงๆ เหรอ? นี่ฉันอุตส่าห์เล่าเรื่องให้อยากไปแล้วนะ... "
2002-77 = "ก็บอกไปแล้วนี่! ฉันมีเรื่องอื่นที่ต้องทำ ส่วนไอริก็ต้องตามบทเรียนให้ทัน..."
2002-78 = "งั้นเหลือแค่เราสินะ..."
2002-82 = "เดี๋ยวๆ อย่ามาเนียนนะ"
2002-83 = "ฉันบอกไปชัดเจนแล้วว่าจะ 'อยู่เฉยๆ ไม่ทำอะไรเลย'"
2002-84 = "ได้ยินแล้วใช่ไหม?"
2002-85 = "ก็บอกแล้วว่าไม่มีใครไป"
2002-86 = "ไม่จริง... ไม่มีใครสนใจเรื่องนี้กันเลยเหรอ?"
2002-87 = "เสาเมเปิลไซรัปเลยนะ? นี่มันสิ่งมหัศจรรย์นะ! นี่พวกเธอไม่เก็ทความเพ้อฝันแบบนี้เหรอ?"
2002-88 = "มหัศจรรย์อะไรกัน... ถ้าอยากได้เมเปิลไซรัปก็ไปร้านสะดวกซื้อก็ได้"
2002-89 = "เป็นไปได้ยังไง...!"
2002-90 = "นี่มัน..."
2002-91 = "นี่มันเป็นเรื่องจริงที่ฉันต้องเผชิญเหรอ...!?"
2002-92 = "ไม่ได้การแล้ว! นักเรียนหญิง ม.ปลายวัยกำลังโต กำลังมีใจให้กับอีเวนต์ของกลุ่มธุรกิจและการ#nเตรียมสอบ ฉันไม่เข้าใจสิ่งนี้เลย!"
2002-93 = "เดี๋ยวนะ นั่นมันสิ่งที่นักเรียนหญิง ม.ปลายต้องทำไม่ใช่เหรอ?"
2002-94 = "จะว่าไป ฉันว่าที่นัตสึเป็นแบบนี้เพราะโยชิมิชอบยั่วให้โมโหแน่เลย..."
2002-95 = "เอ่อ... งั้นเหรอ เป็นแบบนี้เองสินะ... ฉันไม่รู้เลยว่าทุกคนไม่ได้สนใจ..."
2002-96 = "ฮือๆ... ฮือ..."
2002-97 = "..."
2002-103 = "อืม... นะ... นัตสึจัง ถ้างั้น..."
2002-104 = "เดี๋ยวก่อน...!!  แข็งใจไว้!"
2002-105 = "ห้ามหวั่นไหวนะทุกคน! พวกเรารู้กันดีนี่ว่ามันคือแผนการล่อลวง! "
2002-106 = "ครั้งนี้มันเป็นไปไม่ได้หรอกนัตสึ! ถ้าเธอคิดว่าพวกเราจะยอมเออออให้อีกล่ะก็ เธอคิดผิดแล้ว"
2002-108 = "ฮือๆ... ฮือ..."
2002-109 = "…"
2002-113 = "ฮึ่ม... น่าเสียดายจัง คิดว่าทำแบบนี้แล้วจะตกได้แล้วแท้ๆ"
2002-115 = "ฮะฮะฮ่า..."
2002-116 = "ดูเข้าสิ! บอกแล้วว่าต้องเป็นแบบนี้!"
2002-117 = "เอาล่ะ! งั้นวันนี้พอแค่นี้ก่อน แยกย้ายได้!"
2002-118 = "อื้ม~ งั้นไว้เจอกันใหม่นะ~"
2002-119 = "งั้นฉันก็ไปละนะ บ๊ายบาย"
2002-127 = "อืม..."
2002-128 = "..."
2002-130 = "(คืนนั้น)"
2002-134 = "อะ... อะไรกันเนี่ย เกิดอะไรขึ้นกลางดึกแบบนี้เนี่ย! ทำไมจู่ๆ ก็เรียกตัวล่ะ...?"
2002-135 = "ฉะ... ฉันก็ไม่รู้"
2002-136 = "ว่าจะนอนสักหน่อย แต่ไอริก็เรียกฉุกเฉินขึ้นมา..."
2002-140 = "ยะ... โยชิมิจัง คาซึสะจัง! นัตสึจัง... นะ... นัตสึจัง...!"
2002-141 = "นัตสึจัง...!!!"
2002-147 = "ฮือ... ฮือๆ... ทุกคน...!!"
2002-149 = "อะ... อะไรกันเนี่ย นัตสึ ร้องไห้ทำไม!?"
2002-150 = "แล้วตอนนี้อยู่ที่ไหน!?"
2002-152 = "อยู่ที่... ถ้ำเมเปิล..."
2002-153 = "ก็ไม่มีใครมาด้วย ฉันเลยมาคนเดียว..."
2002-154 = "แต่ฉันว่า... ฉันต้องหลงทางแน่เลย..."
2002-156 = "หา...?"
2002-157 = "…"
2002-158 = "…"
2002-160 = "ช่วยด้วย... ช่วยฉันด้วยนะเพื่อนๆ..."
2002-161 = "ฮือออ~~ ที่นี่มันที่ไหนก็ไม่รู้..."
2002-165 = "พวกเธอจะไม่ทิ้งเพื่อนไว้อย่างนี้ใช่ไหม...?"
2002-166 = "หืม?"
2002-171 = "เฮ้อ..."
2002-172 = "..."
2002-173 = "สงสัยต้องไปซะแล้ว ว่าไหม...?"
2002-174 = "ก็เป็นแบบนี้อยู่เรื่อย จริงๆ เล้ย..."
2002-176 = "(ทุกคนออกไปยังถ้ำที่นัตสึบอกไว้เพื่อช่วยนัตสึ)"
2002-177 = "(มีเสาเมเปิลไซรัปอยู่ในถ้ำจริงๆ)"
2002-178 = "(สมาชิกชมรมของหวานหลังเลิกเรียนชิมไซรัปจากเสานั้นด้วยกัน และปวดท้องจนไม่ได้ทำอะไรอีกเลย#nในวันหยุดยาว)"
2002-179 = "ก็เป็นแบบนี้อยู่เรื่อย"

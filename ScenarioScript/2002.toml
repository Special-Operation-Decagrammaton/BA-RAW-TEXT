[translation]
2002-1 = "It's Always Like This"
2002-2 = "(After school. The After-School Sweets Club members were walking side by side along the river.)"
2002-7 = "Come to think of it, we have four days off for the holiday. Do you all have plans yet?"
2002-8 = "Not really. I'm doing what you're supposed to do on a holiday:#nAbsolutely nothing. "
2002-9 = "Oh, well, I guess I should've expected that."
2002-10 = "What's that supposed to mean?"
2002-11 = "Nothing, just an observation! Heehee."
2002-12 = "Uh, anyway! Wh-What about you, Yoshimi? Do you have plans?"
2002-13 = "I have to catch up on my missed classes..."
2002-14 = "I don't really have anything grand planned either. I bet there's lots of holiday events, so I was thinking about finding a dessert tour..."
2002-20 = "Hey!"
2002-22 = "...?"
2002-24 = "I... I-I...!"
2002-25 = "...?"
2002-26 = "N-Natsu? What's wrong, Natsu?!"
2002-30 = "I want to eat sweets."
2002-32 = "You scared me! I thought something horrible happened!"
2002-34 = "N-Natsu, weren't we just eating at Cafe Mille-Feuille together?"
2002-35 = "NO! That's separate from this. I am at the prime of my growth, and a continuous dosage of sugar is necessary."
2002-36 = "Where did she learn to speak like that...?"
2002-37 = "You're one to talk! You're the weird-talking queen!"
2002-38 = "..."
2002-40 = "Anyways. You want to go for round two? If you're up for it, so am I!"
2002-41 = "Yoshimi, what do you mean, \"round two\"? You sound like an old man again..."
2002-42 = "Wh-Who talks like an old man?! Take that back!"
2002-43 = "Round two, hm..."
2002-44 = "It's not the worst, but it could be better."
2002-45 = "You want something with more flair! More romance!"
2002-46 = "Romance...? For dessert?"
2002-47 = "Of course!"
2002-48 = "Allow me to educate you."
2002-50 = "The Adventure to Find the Legendary Dessert!"
2002-56 = "Now, now, break it up. Let's call it here for today's club activities."
2002-57 = "Yoshimi, shall we go for that round two you mentioned earlier?"
2002-58 = "H-Huh?! Weren't you just telling me how that sounded old and whatnot?!"
2002-60 = "..."
2002-61 = "Bummer... It's been a long time since people offered their opinions, but not everyone was cooperative."
2002-62 = "You were expecting cooperation?! After saying all of that just now?!"
2002-63 = "We're already done with the investigation. Hearing them out wasn't a bad idea, right?"
2002-64 = "Ehh..."
2002-65 = "There's a cave in the hills a ways from Trinity district!"
2002-66 = "Here we go..."
2002-67 = "It has subzero temperatures even during the summer, so they say you can see icicles all year long."
2002-68 = "But the truth is..."
2002-69 = "the icicles are actually frozen sap from the roots of the maple tree growing above the cave!"
2002-70 = "It's basically thousand-year-old maple syrup! Aren't you super curious?"
2002-71 = "Where did you hear such nonsense this time?"
2002-72 = "What do you mean, nonsense? It was properly posted in the mystery section of Monthly Sweet & Gun. Do you want to see?"
2002-73 = "No! It was posted in the mystery section, Natsu! Think about it!"
2002-74 = "That's why we should go! It's a thousand-year-old maple ice cream adventure!"
2002-75 = "Nope, not going! Who would go along with that for their holiday?!"
2002-76 = "You really, really don't want to go? You're not the least bit curious? "
2002-77 = "I just told you! I have other events to attend, and Airi said she has to catch up with classes."
2002-78 = "Well, the only one left..."
2002-82 = "Hey, don't include me in this."
2002-83 = "I, too, have a busy schedule of doing absolutely nothing."
2002-84 = "...She really means it."
2002-85 = "See! Nobody can go."
2002-86 = "No way... Really? No one is interested at all?"
2002-87 = "But there's maple syrup icicles? That's amazing! How can you ignore this call to adventure?"
2002-88 = "Well... If you want maple syrup, there's always the convenience store right over there."
2002-89 = "I'm in shock!"
2002-90 = "Could it be..."
2002-91 = "Can this really be happening?"
2002-92 = "It can't be! How can high school girls in their prime be so absorbed in corporate events and...exams?!"
2002-93 = "Well, they are part of a high school girl's responsibilities, after all."
2002-94 = "You know, I used to think Natsu was dramatic, but I'm realizing Yoshimi is just good at pushing her buttons."
2002-95 = "I-I see... I see... Nobody cares and I didn't even realize..."
2002-96 = "*sniffle* *sniffle*"
2002-97 = "..."
2002-103 = "W-Well... Natsu, if it's that important to you..."
2002-104 = "W-Wait! No! Don't fall victim to her trap!"
2002-105 = "Hold your resolve! You know she does this every time! "
2002-106 = "Not this time, Natsu! You've miscalculated if you think we'll fall for your same old tricks!"
2002-108 = "*sniffle* *sniffle*"
2002-109 = "..."
2002-113 = "Hm, that's unfortunate. I really thought that would work."
2002-115 = "Aha...haha..."
2002-116 = "See, look! She's always like this!!"
2002-117 = "Well, since things ended up like this, let's disband for today!!"
2002-118 = "Okay. I'll see you later, then."
2002-119 = "Then, I'm off too. Bye."
2002-127 = "...Hmm."
2002-128 = "..."
2002-130 = "(That night.)"
2002-134 = "Wh-What is this? Why is she calling us in the middle of the night?"
2002-135 = "I-I don't know either."
2002-136 = "I was about to go to sleep, but I got the call from Airi too..."
2002-140 = "Y-Yoshimi, Kazusa! Natsu... Natsu is...!"
2002-141 = "Natsu is...!!!"
2002-147 = "*sniffle* *sob* Help!!"
2002-149 = "Wh-What's wrong? Why are you crying, Natsu?!"
2002-150 = "Where are you right now?"
2002-152 = "That...maple cave..."
2002-153 = "Since nobody would come with me, I came alone."
2002-154 = "I think I may have gotten a little lost, though."
2002-156 = "Huh?"
2002-157 = "..."
2002-158 = "..."
2002-160 = "Help me... Help me, please!"
2002-161 = "Waaah! I don't know where I am!"
2002-165 = "Surely you wouldn't abandon your friend, would you?"
2002-166 = "Huh?"
2002-171 = "*sigh*"
2002-172 = "..."
2002-173 = "I guess we don't have much of a choice..."
2002-174 = "...You're killing me, seriously."
2002-176 = "(Afterward, everyone went to the cave Natsu described to save her.)"
2002-177 = "(To my surprise, icicles made of maple syrup were actually hanging in the cave.)"
2002-178 = "(The After-School Sweets Club members tasted the icicles but then lost the rest of their holiday to a stomachache.)"
2002-179 = "It's Always Like This"

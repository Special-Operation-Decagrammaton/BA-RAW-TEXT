[translation]
2002-1 = "她們往常的放學時光"
2002-2 = "（放學回家的路上，放學後的甜點部成員們並肩在河邊走著）"
2002-7 = "話說很快就要放連假了，好像是4天來著？#n大家有什麼計畫嗎？"
2002-8 = "沒什麼特別的。難得有連假可放，還是什麼都不做最好了。 "
2002-9 = "……是哦，我也覺得你八成會這麼說。"
2002-10 = "……你什麼意思？"
2002-11 = "沒啊～？就只是字面上的意思～"
2002-12 = "喜，喜美醬有什麼計畫嗎？"
2002-13 = "我的話則是有想過要不要複習一下最近課程裡不太懂的部分……"
2002-14 = "唔嗯，其實也沒什麼特別的……#n不過各地在連假應該都會舉辦很多活動，所以有想過要不要來場美食之旅之類的。"
2002-20 = "……！"
2002-22 = "……？"
2002-24 = "啊……啊啊……！"
2002-25 = "……？"
2002-26 = "……？夏，夏醬？怎麼了……？"
2002-30 = "……我想吃甜食。"
2002-32 = "這種話有必要醞釀這麼久嗎！？"
2002-34 = "夏，夏醬，我們不是才剛吃完甜點嗎……？"
2002-35 = "NO，這是兩回事。畢竟我們可是還在成長期且正值青春期的女高中生。#n糖分永遠不會有攝取過多的一天。"
2002-36 = "又變成奇怪的口氣了……"
2002-37 = "是錯覺啦錯覺～"
2002-38 = "……"
2002-40 = "算了，所以你的意思是要去續攤嗎？#n是的話我也可以+1哦？"
2002-41 = "喜美醬，「續攤」這個詞彙好像不太像是女高中生會用的……"
2002-42 = "咦，是，是嗎……！？"
2002-43 = "續攤啊……嗯……"
2002-44 = "雖然那也不賴，但感覺……"
2002-45 = "好像有點不夠刺激。"
2002-46 = "……刺激？"
2002-47 = "嗯。"
2002-48 = "舉例來說……"
2002-50 = "……像是「尋找傳奇甜點的冒險」之類的！！！！"
2002-56 = "好的好的～那麼今天就在這邊解散～"
2002-57 = "喜美醬，要不要一起去續攤？"
2002-58 = "呃，嗯……等等，你剛才不也說了「續攤」嗎！？"
2002-60 = "……"
2002-61 = "真令人難過……#n明明提供了讓人躍躍欲試的意見，大家卻不願意合作……"
2002-62 = "說什麼合作不合作的，#n你以為我們聽到剛才那些話就會說「走吧走吧！」嗎！？"
2002-63 = "人家可是特地事先做好了調查和準備唷？#n不覺得至少也該聽聽看嗎？"
2002-64 = "不覺得啊……"
2002-65 = "其實在距離三一自治區有段距離的山崗上，有某個洞穴……！"
2002-66 = "開始了……"
2002-67 = "那個洞窟即使在夏天也會維持零下的溫度，#n似乎一整年都處於能讓「冰柱」凝結的環境哦。"
2002-68 = "不僅如此，據說那裡的「冰柱」可不只是普通的「冰柱」……"
2002-69 = "而是「天然的楓糖漿凝結而成的冰柱」哦！"
2002-70 = "好像是有糖楓生長在洞窟裡，由它的樹汁凝結而成……怎麼樣，不覺得很好奇嗎？"
2002-71 = "那種奇怪的傳聞……是從哪裡聽來的？"
2002-72 = "奇怪的傳聞？這是在《月刊甜點&機關槍》的神祕專欄中刊登的內容！#n在這邊，要看嗎？"
2002-73 = "既然都說是「神祕專欄」了不就代表八成是騙人的嗎！？"
2002-74 = "總之去看看嘛～說不定能找到天然的楓糖冰淇淋哦？#n很吸引人吧？"
2002-75 = "誰要去啊！到底誰會不惜浪費難得的連假去驗證那種荒唐的東西啊！？"
2002-76 = "騙人的吧……？認真？#n真的不去……？ "
2002-77 = "我不是說過不去了嗎？#n我要去美食之旅，愛莉也要念自己的書……"
2002-78 = "那麼就剩下……（偷瞄）"
2002-82 = "一臉無辜地看向我也是沒用的。"
2002-83 = "我也有名為「什麼都不做」的重要行程。"
2002-84 = "……情況就是這樣。"
2002-85 = "這個話題到此結束。"
2002-86 = "那可不是普通的冰柱，而是楓糖漿冰柱哦……？#n你們都不想看嗎？"
2002-87 = "如此充滿浪漫情懷的甜點，不親眼見證會遺憾終生的吧……！？"
2002-88 = "不是……楓糖的話那邊的便利商店也有賣啊。"
2002-89 = "怎麼會這樣……！"
2002-90 = "這樣的現實……"
2002-91 = "這樣的現實真的沒問題嗎……？"
2002-92 = "正值青春的女高中生們竟然沉迷於活動或考試……#n你們真的能接受嗎！？"
2002-93 = "等等，這是非常健全的青春吧！"
2002-94 = "……你其實是在享受被吐槽的快感吧？"
2002-95 = "這，這樣啊……#n原來大家是真的都沒興趣……對不起，好像，是我自作多情……"
2002-96 = "可是……嗚……嗚嗚……"
2002-97 = "……"
2002-103 = "……那個……夏，夏醬。#n我，其實……"
2002-104 = "……慢著！！#n不能輕易動搖！"
2002-105 = "類似的情節已經出現過多少次，你們也知道吧！？#n每次都是差不多的劇情！"
2002-106 = "夏，你以為我們每次都會上當那就大錯特錯了！"
2002-108 = "……嗚嗚……嗚……"
2002-109 = "……"
2002-113 = "不行啊……真可惜。"
2002-115 = "啊，啊哈哈哈……"
2002-116 = "我就知道！"
2002-117 = "總之今天就在這裡解散！各位再見！"
2002-118 = "嗯，嗯。大家再見囉。"
2002-119 = "……今天我也先回去了，掰掰。"
2002-127 = "……呼呣……"
2002-128 = "……"
2002-130 = "（當天晚上）"
2002-134 = "這麼晚找我們出來，有什麼事……？"
2002-135 = "我也不知道。"
2002-136 = "正打算睡覺的時候，愛莉突然急急忙忙地聯絡我……"
2002-140 = "喜，喜美醬，千紗醬！"
2002-141 = "夏醬他，夏醬他……！！！"
2002-147 = "嗚嗚……嗚嗚……大家……"
2002-149 = "咦，怎麼了，為什麼在哭！？"
2002-150 = "話說夏，你現在人在哪！？"
2002-152 = "我人在……白天跟你們說過的楓糖漿洞窟……"
2002-153 = "因為果然還是想來看看、拍點照片之類的，所以就自己一個人來了……"
2002-154 = "卻在洞窟裡……迷路了……"
2002-156 = "……哈啊？"
2002-157 = "……"
2002-158 = "……"
2002-160 = "朋友們……救救我～……"
2002-161 = "這裡又黑又恐怖，什麼都看不見～……"
2002-165 = "我，我說……你們不會對朋友見死不救的吧……？"
2002-166 = "對吧……？"
2002-171 = "……呼……"
2002-172 = "……"
2002-173 = "果，果然還是得去一趟，吧……？"
2002-174 = "……唉，真受不了……！"
2002-176 = "（之後為了救夏，喜美、千紗和愛莉一起前往了夏所說的洞穴）"
2002-177 = "（在抵達洞窟後，沒想到那裡竟然真的有楓糖漿凝結成的冰柱……）"
2002-178 = "（儘管成功救出了夏，但放學後的甜點部一行人卻因為吃了那個冰柱而腹瀉，#n　導致難得的連假全都泡湯了）"
2002-179 = "她們往常的放學時光"

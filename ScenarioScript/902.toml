[translation]
902-1 = "#title;호크마, 왕국을 지키는 고대의 수호자"
902-2 = "3;린;99;안녕하십니까. 선생님.\n#3;a\n#3;greeting"
902-3 = "3;린;01;급한 상황이므로, 빠르게 요점만 브리핑 드리도록 하겠습니다.\n#3;em;[반응]"
902-4 = "3;린;02;키보토스의 극지방에 위치한 화산에, 수수께끼의 선박이 나타났다고 합니다."
902-5 = "3;린;99;……네. 알고 있습니다. 화산과 선박이라니, 이토록 연관되지 않는 단어의 조합도 찾아보기 힘들겠지요."
902-6 = "3;린;01;저도 보고를 들었을 때는 무언가 착오가 있는 게 아닌지 의심했습니다만……"
902-7 = "3;린;01;그 수수께끼의 선박은 현재도 화산의 용암을 거슬러 오르며 항해를 계속하고 있다고 합니다."
902-8 = "3;린;01;거기에 더해, 그 선박이 화산에 접근하는 것과 동시에 화산의 활동 징후가 폭발적으로 증가하고 있습니다."
902-9 = "3;린;05;이유는 알 수 없지만, 그 수수께끼의 선박이 화산의 폭발을 유도하고 있는 것이 분명합니다."
902-10 = "3;린;99;……사실 이번 사태를 파악하는 데에는 정체를 알 수 없는 조력자의 도움이 있었습니다.\n#3;em;[...]"
902-11 = "3;린;01;그게 누구냐고 물으셔도 저희 역시 곤란합니다. 모든 방면으로 조사해 보았지만, 정말로 정체를 알 수 없었으니까요."
902-12 = "3;린;01;거기에 그 조력자의 이야기는 한층 더 알기 힘든 것들뿐이었습니다."
902-13 = "3;린;99;스스로 일컬어질 수 없는 성스러운 10개의 말이라느니, 신성으로 향하는 길path을 개척하는 예언자들이라느니……."
902-14 = "3;린;01;아무튼, 그런 알 수 없는 말들은 제쳐두더라도, 현재 화산의 상황은 시일을 지체할 수 없는 급박한 상태입니다.\n#3;em;[반응]"
902-15 = "3;린;01;과거의 기록과 화산의 규모를 산정하였을 때, 화산이 폭발적으로 분출한다면 전 키보토스에 화산 겨울을 불러일으킬지도 모른다는 분석이 있었습니다."
902-16 = "3;린;02;네. 가능하시다면 선생님께서 그 수수께끼의 선박을 조사하여…… 화산이 분출하는 사태를 저지해 주셨으면 합니다."
902-17 = "3;린;01;어떻게 보더라도 그 선박과 화산의 활동 사이에는, 밀접한 상관관계가 있는 듯하니까요."
902-18 = "3;린;01;……덧붙여서, 그 조력자의 이야기에 따르면 현지의 화산에 일종의 대응책을 마련해 두었다는 것 같습니다."
902-19 = "3;린;01;조력자가 전해온 선박의 명칭은…… <호크마CHOKMAH> 이며, 그 이명은 <왕국을 지키는 고대의 수호자> 라고 합니다."
902-20 = "3;린;99;이게 무슨 뜻인지는, 여전히 조금도 모르겠지만요.\n#3;em;[...]"
902-21 = "3;린;01;그럼, 부탁드리겠습니다. 선생님."

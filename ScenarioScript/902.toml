[translation]
902-1 = "Chokmah, Realm's Ancient Guardian"
902-2 = "Hello, Sensei."
902-3 = "Since it's an emergency, we'll need to cut straight to the chase with this briefing."
902-4 = "A mysterious ship has appeared near a volcano located in the polar regions of Kivotos."
902-5 = "...Yes. It'd be difficult to name any two things that have less apparent connection than a volcano and a ship."
902-6 = "I questioned the report when I first received it as well..."
902-7 = "However, as we speak, this mysterious ship is sailing through the volcano's lava."
902-8 = "And it appears that the closer the ship gets to it, the more active the volcano becomes."
902-9 = "While we have yet to identify how this is happening, we are certain that the ship is directly affecting the volcano's eruptions."
902-10 = "...We received help from an unknown informant as we were attempting to analyze the situation."
902-11 = "We've been unable to confirm the informant's identity. Despite many separate investigations, we've been unsuccessful in uncovering anything about them."
902-12 = "On top of that, the intel we received from said informant seemed rather fantastical."
902-13 = "They referred to themselves as one of the \"ten unspeakable, sacred pieces,\" and spoke of prophets pioneering the path to divinity."
902-14 = "Setting aside the strangeness of the report, the reality is that this volcano is very real and requires urgent action."
902-15 = "Upon analyzing previous records and the scale of the volcano, we believe that a complete eruption could cause a volcanic winter all throughout Kivotos."
902-16 = "That is why, if possible, we need you to investigate this mysterious ship...and stop the volcano's eruptions."
902-17 = "Despite studying the situation from many angles, we cannot overlook the correlation between the ship and the volcanic activity."
902-18 = "...Additionally, according to the informant, there seem to be countermeasures put in place to protect the volcano."
902-19 = "The informant told us that the ship is called Chokmah, Realm's Ancient Guardian."
902-20 = "Its meaning and significance... We're still determining that."
902-21 = "Now then, we'll leave the rest to you, Sensei."

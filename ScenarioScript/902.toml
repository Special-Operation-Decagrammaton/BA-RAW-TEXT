[translation]
902-1 = "霍刻瑪：守護王國的古代守護者"
902-2 = "您好，老師。"
902-3 = "由於情況緊急，我只針對重點進行報告。"
902-4 = "在奇普托斯極地的火山附近，出現了一艘來路不明的船隻。"
902-5 = "……我明白您的意思。#n火山與船隻……如此突兀的組合簡直是前所未聞。"
902-6 = "我剛接到報告的時候，也曾懷疑這其中是不是發生了什麼誤會……"
902-7 = "但是據說那艘來路不明的船隻，如今依然在火山的岩漿上逆流航行。"
902-8 = "不僅如此，那艘船越是靠近，火山的活動就變得越活躍。"
902-9 = "雖然目前尚未查明原因，但那艘神祕的船隻很可能在誘使火山爆發。"
902-10 = "……其實我們之所以能掌握這起事件，還得歸功於某位不具名的情報提供者。"
902-11 = "至於對方的身份，我們也跟您同樣感到困惑。#n雖然已經從各方面進行了調查，只可惜依舊無法查出對方的真實身份。"
902-12 = "而那名情報提供者所說的話，更是令人摸不著頭緒。"
902-13 = "比如「無法言喻的神聖十文字」、「開拓神聖道路『Path』的預言者」等等……"
902-14 = "那些莫名其妙的話姑且不論，現在火山的狀況相當危急。"
902-15 = "從它的規模與過往的紀錄來推算，#n一旦火山噴發，整個奇普托斯都有可能會陷入[ruby=Volcanic winter]「火山冬天」[/ruby]。"
902-16 = "如果可以的話，希望老師您能夠調查那艘來路不明的船隻……並阻止火山的噴發。"
902-17 = "畢竟就目前的情況而言，那艘船隻與火山的活動存在非常密切的關係。"
902-18 = "……此外那名情報提供者也表示，已經在火山做了一些臨時處置。"
902-19 = "根據對方提供的情報……#n那艘船名叫「[ruby=CHOKMAH]霍刻瑪[/ruby]」──別名為「守護王國的古代守護者」。"
902-20 = "至於這究竟代表什麼涵義，我們現在依舊不得而知。"
902-21 = "那麼，萬事拜託了。老師。"

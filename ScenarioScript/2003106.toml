[translation]
2003106-1 = "อย่างกะทันหัน"
2003106-2 = "(หลังจากไปถึงอาคารเรียนเก่า คุณครูก็ไปดูบ่อออนเซ็นที่ชิกุเระปรับปรุงขึ้นใหม่ และระหว่างนั้นเอง...)"
2003106-6 = "จะว่าไป คุณครูชอบ..."
2003106-7 = "ชอบอาบน้ำคนเดียว หรืออาบกับคนอื่นเหรอ?"
2003106-8 = "[s] \"ทำไมอยู่ๆ ถึงถามอะไรแบบนั้นล่ะ...?\""
2003106-9 = "อ้อ... ไม่ได้มีอะไรมากมายหรอก พอดีฉันคิดถึงเรื่องที่เคยเกิดก่อนหน้านี้น่ะ"
2003106-10 = "ถ้าเป็นการแช่ตัวอาบน้ำ ฉันชอบการอาบที่ได้สนุกสนานไปพร้อมกับคนอื่นๆ น่ะ"
2003106-11 = "การนั่งแช่น้ำร้อนแล้วพูดคุยกันอย่างเปิดอกมันทั้งผ่อนคลายและก็สนุกดีนะ"
2003106-12 = "แต่ว่าในหมู่นักเรียนของอาคารเรียนเก่า ก็มีหลายคนเลยที่ชอบอาบน้ำคนเดียวมากกว่าอาบน้ำรวมกับ#nคนอื่น"
2003106-13 = "ครั้งก่อนฉันเห็นโนโดกะอาบน้ำอยู่คนเดียว ก็เลยแอบลงไปในบ่อด้วย สุดท้ายก็โดนบ่นว่าอย่ามารบกวน#nเวลาที่อยู่คนเดียว"
2003106-14 = "[s1] \"ทั้งสองแบบก็มีทั้งข้อดีข้อเสียนะ...\"\n[s2] \"แต่ถ้าเราอาบน้ำอยู่แล้วมีคนอื่นเข้ามามันก็น่าจะทำอะไรไม่ถูก\""
2003106-17 = "อืม จะคิดแบบนั้นก็ได้สินะ..."
2003106-18 = "[s3] \"...ครูแค่บอกเผื่อไว้ก่อนนะ\"\n[s4] \"ตอนครูอาบน้ำอยู่ ห้ามแอบเข้ามาเด็ดขาดนะ\""
2003106-21 = "...หืม? เข้าไปไม่ได้เหรอ?"
2003106-22 = "อดใช้โอกาสที่จะทำให้รู้จักคุณครูมากขึ้นอีกนิดเลย น่าเสียดายจัง"
2003106-23 = "ถ้าเราไม่ได้ใส่อะไร เราก็น่าจะคุยกันได้อย่างเปิดเผยมากกว่าปกติแท้ๆ เชียว..."
2003106-24 = "[s5] \"ถ้าอยากคุยแบบเปิดเผย ครูก็คุยด้วยได้ตลอดอยู่แล้ว...\"\n[s6] \"แต่ตอนอาบน้ำ ครูขอสนุกคนเดียวเถอะนะ\""
2003106-27 = "ชิ..."
2003106-32 = "อ้อ จะว่าไป ฉันเตรียมกัมปอตไว้ดื่มตอนอาบน้ำตั้ง 2 ขวด แต่ดันลืมหยิบมาซะได้"
2003106-33 = "คุณครูลงไปแช่ตัวในบ่อออนเซ็นก่อนมั้ย? พอดีฉันมีของที่ลืมไว้ที่อาคารเรียนเก่า..."
2003106-34 = "ลงไปแช่ตัวอาบน้ำก่อนได้เลย แล้วฉันจะรีบกลับมาแล้วลงไปอาบด้วย"
2003106-35 = "[s] \"ก็บอกว่าอย่าลงมาด้วยไง...\""
2003106-37 = "(หลังจากบอกลาชิกุเระที่จะกลับไปยังอาคารเรียนเก่าเสร็จ คุณครูก็ลงไปในบ่อออนเซ็น)"
2003106-40 = "(โชคดีที่บ่อออนเซ็นถูกดูแลไว้สะอาดสะอ้าน จึงไม่มีกลิ่นอะไรแปลกๆ นอกจากกลิ่นสมุนไพรอ่อนๆ ออกมา)"
2003106-41 = "(ระหว่างที่คุณครูกำลังเพลิดเพลินกับการแช่ตัวท่ามกลางไอน้ำอุ่นๆ...)"
2003106-49 = "[ns7] \"....ชิกุเระ? กลับมาเร็วนะเนี่ย\"\n[ns8] \"แต่ครูบอกแล้วนี่นาว่าตอนอาบน้ำอยู่อย่าเข้ามา\""
2003106-52 = "......"
2003106-53 = "[ns] (...ไอน้ำเยอะมากจนมองไม่ค่อยเห็นเลย...)"
2003106-55 = "[ns] \"เอาเถอะ แต่ยังไงมันก็อันตรายนะ ห้ามมาแกล้งอะไรในนี้ละ\""
2003106-56 = "(...ชิกุเระนั่งจ้องคุณครูอยู่อย่างนั้นโดยไม่พูดอะไรสักคำ)"
2003106-57 = "(เพราะไอน้ำที่หนา รูปร่างของชิกุเระจึงเหมือนคนที่สวมเสื้อคลุมหนาหลายๆ ชั้น...)"
2003106-61 = "[ns9] \"...ชิกุเระ ลงมาในบ่อทั้งๆ ที่ยังใส่เสื้อผ้าอยู่เหรอ?\"\n[ns10] \"ทำไมดูไม่กระฉับกระเฉงเหมือนอย่างเคยเลย...\""
2003106-64 = "......"
2003106-69 = "[ns11] \"ดะ... ดื่มน้ำในบ่อนี้อยู่เหรอ?\"\n[ns12] \"มันไม่ถูกสุขอนามัยนะ ห้ามดื่มน้ำในบ่อ!\""
2003106-72 = "ฮู่ว..."
2003106-73 = "[ns] (รู้สึกว่าชิกุเระหายใจดังฟืดฟาดจนผิดปกติ)"
2003106-75 = "[ns] \"ครูออกไปก่อนดีกว่า ล้างตัวให้สะอาดแล้วออกมานะ\""
2003106-78 = "(คุณครูรีบออกมาจากบ่อออนเซ็น)"
2003106-81 = "เอ๋ คุณครู อาบน้ำเสร็จแล้วเหรอ?"
2003106-82 = "ฉันว่าจะรีบลงไปในบ่อก่อนที่คุณครูจะอาบเสร็จแท้ๆ เลย น่าเสียดายจัง..."
2003106-83 = "[s13] \"อ้าว ชิกุเระ? ยังไม่ได้ลงบ่อไปหรอกเหรอ?\"\n[s14] \"ถ้างั้นคนที่อยู่ในบ่อเมื่อกี้...\""
2003106-86 = "มีคนอื่นในบ่อออนเซ็นนอกจากคุณครูด้วยเหรอ?"
2003106-87 = "อ้อ นั่นคงเป็น..."
2003106-88 = "หมีที่อยู่แถวๆ นี้น่ะ"
2003106-92 = "[ns] \"...หมี?!\""
2003106-93 = "อื้ม บางครั้งพวกหมีที่อาศัยอยู่ตามภูเขาหิมะแถวนี้ก็จะมาแช่บ่อออนเซ็นกลางแจ้ง ฉันเห็นอยู่บ่อยๆ ตั้งแต่เราเปิดกิจการออนเซ็น No.227 แล้ว"
2003106-94 = "พวกมันน่าจะชอบน้ำอุ่นนะ เพราะหลังจากออนเซ็นของเราหายไป บางครั้งมันก็จะมาแช่ตัวกันที่นี่แทน"
2003106-95 = "แต่ว่าหมีได้อาบน้ำกับคุณครูก่อนเหรอเนี่ย... นี่เป็นครั้งแรกเลยนะที่ฉันรู้สึกอิจฉาหมีขึ้นมา"
2003106-96 = "[s] \"งั้นก็แปลว่าเมื่อกี้ครูนั่งคุยอยู่กับหมี...\""
2003106-97 = "คุณครูจะไม่ลงไปอาบต่อแล้วใช่มั้ย?"
2003106-98 = "ถ้างั้นฉันจะลงไปอาบบ้างละนะ ฝากดูของข้างนอกด้วยล่ะ"
2003106-103 = "(หลังจากนั้นคุณครูก็นั่งกลัวหมีต่อไป จนกว่าชิกุเระจะอาบน้ำเสร็จ)"

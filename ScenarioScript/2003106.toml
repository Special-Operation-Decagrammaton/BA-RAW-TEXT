2003106-9 = "3;시구레 온천ND;03;아아…… 큰 이유는 아니고, 전에 있었던 일이 갑자기 떠올라서."
2003106-10 = "3;시구레 온천ND;01;나는 목욕만큼은 다른 사람들과 함께 떠들썩하게 즐기는 걸 좋아하거든."
2003106-11 = "3;시구레 온천ND;02;뜨거운 탕에 앉아서 숨기는 것 없이 함께 이야기를 나누면 즐겁고 좋잖아?"
2003106-12 = "3;시구레 온천ND;99;그런데 구교사의 학생들 중에서는 여럿이 목욕하는 것보다 혼자 목욕하는 걸 선호하는 친구들이 많은 것 같아서."
2003106-13 = "3;시구레 온천ND;01;지난번에도 노도카가 목욕을 하고 있을 때 몰래 탕에 같이 들어갔다가, 혼자만의 시간을 방해하지 말아 달라고 잔소리를 들었다니까."
2003106-14 = "[s1] \"두 가지 모두 장단점이 있지만……\"\n[s2] \"그래도 목욕을 하고 있을 때 다른 사람이 난입하면 당혹스러우니까.\""

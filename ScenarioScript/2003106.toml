[translation]
2003106-1 = "突然地"
2003106-2 = "（抵達舊校舍後，在前往時雨重新整修的溫泉途中……）"
2003106-6 = "話說，老師……"
2003106-7 = "你喜歡一個人泡澡還是跟別人一起呢？"
2003106-8 = "[s]「為什麼突然問這個……？」"
2003106-9 = "啊……沒什麼特別的原因。#n只是突然想起之前發生的事而已。"
2003106-10 = "因為我喜歡跟其他人一起熱熱鬧鬧地泡澡。"
2003106-11 = "坐在熱呼呼的溫泉裡毫無隱藏地一起聊天不是很開心嗎？"
2003106-12 = "可是舊校舍的學生中，喜歡自己泡澡的人好像比較多。"
2003106-13 = "上次和香洗澡的時候我偷偷跟著一起進去，結果就被唸了一頓……#n說「不要妨礙我享受一個人的時光」。"
2003106-14 = "[s1]「各有優缺點吧……」\n[s2]「但是洗澡的時候有人亂闖進來會讓人不知所措。」"
2003106-17 = "嗯嗯，原來也可以這麼想啊……"
2003106-18 = "[s3]「……以防萬一我先提醒你。」\n[s4]「我洗澡的時候也不能偷偷跑進來哦？」"
2003106-21 = "……嗯？不行嗎？"
2003106-22 = "不能藉著這個機會更深入了解老師，好像有點可惜。"
2003106-23 = "在一絲不掛的狀態下應該能聊得比平常更坦誠……"
2003106-24 = "[s5]「那些話我平常也能聽你說……」\n[s6]「泡澡的時候還是讓我獨自享受吧。」"
2003106-27 = "…………真可惜。"
2003106-32 = "啊，對了。#n為了讓老師能邊泡澡邊喝，我事先準備了一瓶康波特，不過不小心忘了帶來。"
2003106-33 = "老師要不要先去泡澡？#n我回舊校舍拿一下……"
2003106-34 = "先進去沒關係，我馬上就來。"
2003106-35 = "[s]「不是才說別進來嗎……」"
2003106-37 = "（目送時雨回舊校舍後，先行進入了溫泉）"
2003106-40 = "（幸好溫泉整理得很乾淨，除了淡淡的草香味之外並沒有奇怪的味道）"
2003106-41 = "（在霧騰騰的水蒸氣中泡澡時……）"
2003106-49 = "[ns7]「……時雨？這麼快就回來啦。」\n[ns8]「而且我不是說過泡澡的時候不能進來嗎。」"
2003106-52 = "…………"
2003106-53 = "[ns] （……因為濃厚的水蒸氣而看太不清楚……）"
2003106-55 = "[ns]「總之別在溫泉裡開玩笑哦，這樣很危險的。」"
2003106-56 = "（……時雨不發一語地坐在地上望著這裡）"
2003106-57 = "（可能是因為水蒸氣的關係，時雨的身影看起來相當寬大，#n　就像披著厚外套的人……）"
2003106-61 = "[ns9]「……時雨，你是穿著衣服進來的嗎？」\n[ns10]「你的動作跟平常不一樣，看起來有點遲鈍耶……」"
2003106-64 = "……"
2003106-69 = "[ns11]「你，你在喝溫泉水嗎！？」\n[ns12]「那樣很不衛生，不能喝溫泉水啦！」"
2003106-72 = "呼……"
2003106-73 = "[ns]（時雨的呼吸聲聽起來比平常更加低沉……）"
2003106-75 = "[ns]「我要先出去了，你慢慢洗吧。」"
2003106-78 = "（說完便匆匆離開了溫泉）"
2003106-81 = "哎呀，老師，這麼快就泡完了嗎？"
2003106-82 = "本來想趕在老師出來之前進去的，真可惜……"
2003106-83 = "[s13]「咦，時雨？你剛才沒進來泡澡嗎？」\n[s14]「那剛才在溫泉裡的是……」"
2003106-86 = "你說溫泉裡除了老師之外還有別人？"
2003106-87 = "啊啊，那應該……"
2003106-88 = "是棲息在這附近的熊吧。"
2003106-92 = "[ns]「……熊！？」"
2003106-93 = "嗯，從之前經營227號溫泉浴場的時候開始，#n就不時會看到棲息在附近雪山的熊進入露天溫泉。"
2003106-94 = "不知道牠們是不是喜歡熱水，在溫泉浴場消失之後偶爾也會跑進來。"
2003106-95 = "但是居然能比我先和老師混浴……#n羨慕的對象不是其他學生而是熊，這還是第一次呢。"
2003106-96 = "[s]「那我剛才是在跟野生的熊說話……！？」"
2003106-97 = "老師，你現在不會再進去泡澡了吧？"
2003106-98 = "那這次換我進去泡澡，麻煩在外面幫我看一下行李哦。"
2003106-103 = "（之後，直到時雨泡完澡出來之前，一直回想著熊的可怕）"

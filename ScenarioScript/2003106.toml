[translation]
2003106-1 = "Suddenly"
2003106-2 = "I dropped by the Former Institute to check out Shigure's newly renovated baths..."
2003106-6 = "Sensei, I was wondering..."
2003106-7 = "Do you prefer bathing alone or with other people?"
2003106-8 = "[s] \"Why do you suddenly want to know?\""
2003106-9 = "Oh... No reason. I was just thinking about what happened before."
2003106-10 = "Me, I like to bathe with a big group of people because it feels more lively."
2003106-11 = "Isn't it fun to just sit in a hot tub together? Nobody has anything to hide."
2003106-12 = "But I've found out that many of the students in the Former Institute would rather bathe alone."
2003106-13 = "Last time, I snuck into the bath while Nodoka was in there, and she got mad that I interrupted her alone time."
2003106-14 = "[s1] \"There are pros and cons to both...\"\n[s2] \"But you should probably ask before joining someone in the bath.\""
2003106-17 = "Hmm... So some people really do feel that way..."
2003106-18 = "[s3] \"...You know you're not supposed to follow me, right?.\"\n[s4] \"You are not allowed to join me while I'm bathing.\""
2003106-21 = "...Huh? I'm not?"
2003106-22 = "But it'd be a shame to miss this opportunity to get to know you better, Sensei."
2003106-23 = "Think of the deep conversations we could have when we're totally uncovered..."
2003106-24 = "[s5] \"We can have deep conversations in lots of other places.\"\n[s6] \"Please let me enjoy my bath alone, at least.\""
2003106-27 = "...Tsk."
2003106-32 = "Oh, silly me. I forgot to bring the kompot I made to enjoy during my bath."
2003106-33 = "Sensei, do you want to go first? I need to go get something..."
2003106-34 = "Go ahead and enjoy a nice soak. I'll go after you."
2003106-35 = "[s] \"Okay, but please stay out until I'm done...\""
2003106-37 = "After walking Shigure back to the Former Institute building, I entered the bath first."
2003106-40 = "The bath had been cleaned out perfectly. None of the strange fragrances from before were left."
2003106-41 = "As I soaked in the steaming water..."
2003106-49 = "[ns7] \"...Shigure? That was fast.\"\n[ns8] \"I thought I asked you not to join me.\""
2003106-52 = "..."
2003106-53 = "[ns] \"(I can't really see anything through the steam...)\""
2003106-55 = "[ns] \"Be careful. No horsing around by the bath.\""
2003106-56 = "Shigure simply sat in the water and stared at me in complete silence."
2003106-57 = "Maybe it was because of the thick steam, but it almost looked like she was wearing a thick fur coat..."
2003106-61 = "[ns9] \"...Shigure, did you come into the water with your clothes on?\"\n[ns10] \"You seem a little...slow...\""
2003106-64 = "..."
2003106-69 = "[ns11] \"A-Are you drinking the hot spring water?\"\n[ns12] \"That's unsanitary! Spit it out!\""
2003106-72 = "*sigh*"
2003106-73 = "[ns] \"(Shigure's breath sounds rougher than usual...)\""
2003106-75 = "[ns] \"I'm going to get out now. Please take your time.\""
2003106-78 = "I quickly left the hot spring."
2003106-81 = "Oh, Sensei. You're finished already?"
2003106-82 = "I was just about to join you. What a shame..."
2003106-83 = "[s13] \"Shigure? You're still out here?\"\n[s14] \"Then who joined me in the water...?\""
2003106-86 = "Someone else was in the hot spring with you?"
2003106-87 = "Of course. It must have been..."
2003106-88 = "...a bear."
2003106-92 = "[ns] \"...A bear?!\""
2003106-93 = "Yes. Bears sometimes came down from the mountain and soaked in the water when we were running Hot Springs Resort No. 227."
2003106-94 = "The resort may be closed, but we still see them come down for a soak from time to time."
2003106-95 = "But to enjoy a bath with Sensei before me... I can't believe I'm jealous of a bear."
2003106-96 = "[s] \"So I've been talking to a bear this whole time...\""
2003106-97 = "I don't suppose you're going back in the water after this experience...?"
2003106-98 = "All right. I'll go bathe by myself, then. Please keep an eye on my things."
2003106-103 = "As I waited for Shigure to finish, I relived the terror of my bathing bear encounter over and over in my head."

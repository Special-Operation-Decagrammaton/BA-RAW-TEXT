2003106-6 = "3;시구레 온천ND;01;그러고 보니 선생님은……"
2003106-7 = "3;시구레 온천ND;00;혼자 하는 목욕이 좋아, 아니면 다른 사람들과 함께하는 목욕이 좋아?\n#3;em;[?]"

[translation]
2601305-1 = "最後想拍的事物"
2601305-2 = "（收到敦子尋找拍攝對象的邀約後，動身前往了慶典會場）"
2601305-4 = "嗨，老師。"
2601305-5 = "謝謝你答應幫忙。"
2601305-6 = "相機的電池就快沒電了，但我實在無法決定最後該拍什麼才好。"
2601305-7 = "所以希望你能給我一些建議。"
2601305-8 = "[s1]「唔……就算你這麼說，我也不知道該給你什麼樣的建議……」\n[s2]「這個看起來不錯，那個看起來也不賴……」"
2601305-11 = "那要不要先一起逛逛慶典會場？"
2601305-12 = "說不定走著走著就會發現值得拍的東西了。"
2601305-13 = "你覺得怎麼樣？"
2601305-14 = "[s]「好，我一定會幫你找出史上最厲害的拍照地點。」"
2601305-15 = "呵呵，我也不會輸給你的哦。"
2601305-17 = "撈金魚！快來撈可愛的金魚吧！"
2601305-18 = "哇，那個大魚缸裡面有好多魚……"
2601305-19 = "游來游去的樣子真美呢。"
2601305-20 = "[s]「要不要拍這個？」"
2601305-21 = "沒關係，我相信一定還有更好的素材。"
2601305-22 = "去別的地方看看吧。"
2601305-26 = "頭盔團舞蹈表演即將開始！"
2601305-27 = "快來觀賞成員們充滿力與美的舞姿吧！"
2601305-32 = "[ns]「拍戶外表演怎麼樣呢，敦子？」"
2601305-33 = "聽起來是個好主意。#n要是相機還有電的話，我應該會想拍……"
2601305-34 = "不過這說不定是最後一張照片，用在這種地方……"
2601305-35 = "好像有點可惜。"
2601305-36 = "再去別的地方看看吧。"
2601305-38 = "有人堆了一座很酷的沙堡耶。"
2601305-39 = "高度都快跟人一樣高了……真厲害。"
2601305-40 = "不過好像還是缺了點什麼。"
2601305-41 = "[s]「唔嗯，那我們再找找吧。」"
2601305-43 = "（之後也和敦子一起，四處尋找值得成為最後一張照片的對象）"
2601305-44 = "（只可惜還是沒能讓敦子滿意）"
2601305-46 = "……太陽都下山了呢。"
2601305-47 = "結果到現在還是沒決定好要拍什麼。"
2601305-48 = "[s3]「要不要在夜晚的慶典會場找找看？」\n[s4]「如果太黑的話，開閃光燈就好了。」"
2601305-51 = "雖然我也很想那麼做……#n可惜這台相機是便宜貨，所以閃光燈原本就是壞的。"
2601305-52 = "晚上可能很難拍到東西，就算拍了應該也只是一團黑影。"
2601305-53 = "看來今天只能以失敗收場了……"
2601305-59 = "咦？"
2601305-64 = "是煙火……"
2601305-65 = "[s]「是煙火呢……」"
2601305-66 = "對了，我都忘了晚上有煙火表演。"
2601305-67 = "啊，如果是這個的話……"
2601305-72 = "[ns]「照片……？終於拍下最後一張了嗎？」"
2601305-73 = "嗯，沒錯。我終於找到想拍的東西了。"
2601305-74 = "呵呵，不可以，這張照片不能給你看。"
2601305-75 = "……嗯？你說我剛才的鏡頭好像對著你？"
2601305-79 = "[ns]「真的不能讓我看嗎？」"
2601305-80 = "不行，這是祕密。"
2601305-81 = "但是我很肯定自己拍到了真正想拍的東西。"
2601305-82 = "多虧了老師，我才能找到想拍的東西。#n謝謝你一直陪著我哦，老師。"

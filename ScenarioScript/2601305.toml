[translation]
2601305-1 = "สิ่งสุดท้ายที่อยากถ่าย"
2601305-2 = "(อาสึโกะติดต่อมาชวนคุณครูไปถ่ายรูป คุณครูจึงไปหาเธอที่สถานที่จัดงานเทศกาล)"
2601305-4 = "สวัสดี คุณครู"
2601305-5 = "ขอบคุณที่มาหานะ"
2601305-6 = "แบตเตอรี่กล้องฉันจะหมดแล้วน่ะ แต่ฉันก็ตัดสินใจไม่ได้ว่าจะไปถ่ายรูปอะไรดี"
2601305-7 = "ฉันเลยอยากได้คำแนะนำจากคุณครู"
2601305-8 = "[s1] \"อืม... ครูก็ไม่รู้เหมือนกันแฮะ\"\n[s2] \"ทุกอย่างที่นี่น่าถ่ายจนเลือกไม่ถูกเลย\""
2601305-11 = "ถ้างั้นเราไปเดินรอบๆ งานเทศกาลกันมั้ย?"
2601305-12 = "ระหว่างนั้นอาจเจออะไรดีๆ ก็ได้นะ"
2601305-13 = "ว่าไงล่ะ?"
2601305-14 = "[s] \"ดีเลย ครูจะช่วยหาจุดถ่ายรูปสวยๆ ให้เอง\""
2601305-15 = "ฮุฮุ ฉันเองก็จะไม่ยอมแพ้หรอกนะ"
2601305-17 = "เกมตักปลาทองค่ะ! มาตักปลาทองน่ารักๆ กันไปสิคะ!"
2601305-18 = "ว้าว มีปลาเต็มตู้เลย..."
2601305-19 = "ตอนปลาว่ายน้ำไปมาก็สวยดีนะ"
2601305-20 = "[s] \"ถ่ายรูปปลามั้ยล่ะ?\""
2601305-21 = "ไม่ดีกว่า ฉันว่าต้องมีอะไรที่สวยกว่านี้แน่ๆ"
2601305-22 = "ไปที่อื่นกันเถอะ"
2601305-26 = "ใกล้จะเริ่มการแสดงระบำแก๊งหมวกกันน็อกแล้ว!"
2601305-27 = "มาดูการเคลื่อนไหวที่ทรงพลังของพวกพ้องกันเลย!"
2601305-32 = "[ns] \"ไปถ่ายการแสดงกลางแจ้งกันมั้ย อาสึโกะ?\""
2601305-33 = "อืม ถ้ากล้องเหลือแบตเตอรี่มากกว่านี้ ฉันคงจะไปถ่ายแล้วละ"
2601305-34 = "แต่นี่อาจจะเป็นรูปสุดท้ายที่ได้ถ่ายก็ได้ ถ้ามาถ่ายอะไรแบบนี้..."
2601305-35 = "มันก็ดูน่าเสียดายนะ"
2601305-36 = "เราไปที่อื่นกันเถอะ"
2601305-38 = "เห็นว่ามีคนก่อปราสาททรายสวยๆ ไว้ด้วย"
2601305-39 = "ขนาดเกือบใหญ่เท่าตัวคนเลย ฝีมือดีจังเลยนะ"
2601305-40 = "แต่ก็ยังไม่เหมาะจะเป็นรูปสุดท้าย"
2601305-41 = "[s] \"อืม งั้นไปหาอย่างอื่นต่อกัน\""
2601305-43 = "(คุณครูกับอาสึโกะเดินไปทั่วเพื่อหาสิ่งที่จะถ่ายรูป)"
2601305-44 = "(แต่ก็ไม่เจออะไรที่ถูกใจเลย)"
2601305-46 = "พระอาทิตย์ตกแล้วสินะ..."
2601305-47 = "สุดท้ายก็ตัดสินใจไม่ได้ว่าจะถ่ายอะไรดี"
2601305-48 = "[s3] \"เปิดแฟลชถ่ายอะไรในงานตอนกลางคืนดูมั้ย?\"\n[s4] \"ถ่ายตอนกลางคืนก็ได้นี่ ก็แค่เปิดแฟลชเอา\""
2601305-51 = "ฉันก็อยากทำแบบนั้นหรอกนะ... แต่ว่านี่เป็นกล้องรุ่นเก่า มันไม่มีแฟลชหรอก"
2601305-52 = "ตอนกลางคืนน่ะถ่ายรูปยาก ไม่ว่าจะถ่ายอะไรก็ออกมามืดหมดเลย"
2601305-53 = "สุดท้ายวันนี้ก็ไม่สำเร็จสินะ..."
2601305-59 = "เอ๋?"
2601305-64 = "ดอกไม้ไฟนี่นา..."
2601305-65 = "[s] \"ดอกไม้ไฟจริงด้วย...\""
2601305-66 = "อืม ฉันลืมไปเลยว่าตอนกลางคืนจะมีจุดดอกไม้ไฟ"
2601305-67 = "อ๊ะ ถ้าเป็นสิ่งนี้ละก็..."
2601305-72 = "[ns] \"ได้ถ่ายรูปสุดท้ายแล้วสินะ?\""
2601305-73 = "อื้อ ใช่แล้ว ในที่สุดฉันก็เจอสิ่งที่อยากถ่ายแล้วละ"
2601305-74 = "ฮุฮุ ไม่เอา ไม่ให้ดูหรอก"
2601305-75 = "หืม...? รู้สึกเหมือนฉันหันเลนส์กล้องไปทางคุณครูงั้นเหรอ?"
2601305-79 = "[ns] \"ขอครูดูรูปบ้างได้มั้ย?\""
2601305-80 = "ไม่ได้หรอก นี่เป็นความลับ"
2601305-81 = "แต่ฉันก็ได้ถ่ายในสิ่งที่อยากถ่ายจริงๆ นะ"
2601305-82 = "ฉันหาสิ่งนั้นเจอเพราะคุณครูแท้ๆ เลย ขอบคุณที่ช่วยนะ คุณครู"

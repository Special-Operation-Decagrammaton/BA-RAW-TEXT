[translation]
22080-1 = "ตอนที่ 8;วันดีๆ ที่พังลง"
22080-20 = "......"
22080-21 = "[s] \"โมโมอิ...\""
22080-34 = "(โมโมอิสลบไป)"
22080-35 = "(ในวันที่อาริสึคุ้มคลั่งขึ้นมาอย่างกะทันหัน)"
22080-36 = "(โมโมอิที่อยู่ในเหตุการณ์อลหม่านนั้นด้วยถูกลูกหลงได้รับบาดเจ็บจนหมดสติไป)"
22080-37 = "(ท่ามกลางสถานการณ์คับขัน และความวุ่นวายที่เกิดขึ้น คุณครูรีบพาโมโมอิมายังห้องปฐมพยาบาลของ#nชาเล่ต์...)"
22080-38 = "(แต่ก็เป็นเวลากว่าสองวันแล้ว)"
22080-39 = "(ที่โมโมอิยังคงนอนนิ่งไม่ได้สติ)"
22080-47 = "(ไหนจะหุ่นยนต์ปริศนาที่เริ่มทำงานอย่างกะทันหันในขณะที่อาริสึเริ่มมีอาการแปลกๆ... ความโกลาหลนี้#nเกิดขึ้นในพริบตาเดียว...)"
22080-51 = "(โชคดีที่เนรุและสมาชิก C&C มาปรากฏตัว เลยทำให้สถานการณ์สงบลงได้...)"
22080-55 = "[ns] (แต่ว่า... ที่อาริสึเป็นในตอนนั้นมันคืออะไรกันแน่...)"
22080-56 = "(ถึงจะควบคุมสถานการณ์ไว้ได้ แต่ก็ไม่ได้หมายความว่าทุกอย่างจะจบลง หลายๆ เรื่องยังคงเต็มไปด้วย#nปริศนาที่ไม่มีคำตอบ)"
22080-60 = "(ตามที่ฮาเระบอกมา...)"
22080-61 = "(อาริสึมีอาการผิดปกติแบบนั้นหลังจาก <แตะต้อง> หุ่นยนต์ประหลาดพวกนั้น)"
22080-66 = "(และมิโดริก็เล่าให้ฟังว่า...)"
22080-67 = "(ในตอนที่อาริสึดูเปลี่ยนไป และหุ่นยนต์เริ่มเคลื่อนไหว)"
22080-73 = "(<เครื่องเล่นเกม> ของโมโมอิก็ทำงานขึ้นมาอย่างกะทันหัน)"
22080-74 = "[ns] \"เครื่องเล่นเกมของโมโมอิ... ที่ได้มาจากพื้นที่รกร้าง...\""
22080-79 = "......"
22080-80 = "(ติ๊ด)"
22080-81 = "[ ขอต้อนรับเข้าสู่ Divi:Sion System กรุณากรอกหัวข้อที่ต้องการความช่วยเหลือ ]"
22080-84 = "[56cd7b]<คุณคือ AL-1S ใช่หรือไม่?>"
22080-87 = "[ns] \"พื้นที่รกร้าง...  คอมพิวเตอร์... และก็... Divi:Sion System...\""
22080-88 = "(อะไรทำให้อาริสึควบคุมตัวเองไม่ได้ แล้วหุ่นยนต์พวกนั้นคืออะไร ทำไมอาริสึถึงมีอาการแบบนั้น?)"
22080-89 = "(แล้วเครื่องเล่นเกมของโมโมอิที่ทำงานในตอนที่อาริสึคุ้มคลั่งล่ะ?)"
22080-90 = "(ทุกอย่างเกี่ยวข้องกับไฟล์ <Key> ที่เจอในพื้นที่รกร้างหรือเปล่า?)"
22080-91 = "[ns] \"ถึงจะตรวจสอบเครื่องเล่นเกมของโมโมอิไปแล้วก็เถอะ...\""
22080-95 = "(แต่ตอนนี้เครื่องมันเปิดไม่ติด ราวกับว่ามันไม่เคยเปิดใช้งานมาก่อน)"
22080-96 = "(หรือไม่ก็ ราวกับว่าข้อมูลข้างในนั้นมันหายไปหมด)"
22080-100 = "(คุณครูจมอยู่กับความคิด และปริศนาที่ทำยังไงก็หาคำตอบไม่ได้...)"
22080-110 = "คุณครู... อาริสึจังน่ะ..."
22080-117 = "อ๊ะ... คุณครู..."
22080-121 = "[ns] \"อาริสึล่ะ?\""
22080-123 = "อาริสึจัง... คือว่า... ยัง..."
22080-124 = "ยังเก็บตัวเงียบคนเดียว ไม่ยอมออกมาจากห้องชมรมเลยค่ะ"
22080-125 = "[s] \"งั้นเหรอ...\""
22080-126 = "ฉันตะโกนเรียกข้ามประตูไปตั้งหลายครั้งแล้ว... แต่ก็..."
22080-127 = "ในเวลาแบบนี้... ควรจะทำยังไงดี..."
22080-128 = "ฮือ..."
22080-129 = "[s] \"ไม่เป็นไรหรอก\""
22080-130 = "คุณครู...?"
22080-131 = "......!"
22080-132 = "[s] \"ไม่เป็นไรนะ จากนี้ให้ครูช่วยเอง\""
22080-138 = "[ns] \"...... ฮู่ว\""
22080-142 = "[ns] \"อาริสึ? อยู่ข้างในใช่ไหม? ขอครูเข้าไปหน่อยได้รึเปล่า?\""
22080-144 = "[ns] \"ครูจะคิดว่าเธออนุญาตแล้วก็แล้วกันนะ\""
22080-148 = "[ns] \"อาริสึ\""
22080-150 = "[ns] \"อาริสึ เป็นยังไงบ้าง?\""
22080-153 = "............"
22080-154 = "[s] \"เห็นว่าไม่ยอมกินข้าวแล้วก็เอาแต่ขังตัวเองอยู่ในห้อง ทุกคนเค้าเป็นห่วงนะ\""
22080-155 = "คะ... คุณครู"
22080-156 = "[s] \"ทุกคนกำลังรออยู่นะ อย่าขังตัวเองไว้คนเดียวเลย ไปกันเถอะ...\""
22080-158 = "อาริสึทำแบบนั้นไม่ได้ค่ะ"
22080-159 = "[s] \"หืม...?\""
22080-160 = "มันเป็นเพราะ... อาริสึ..."
22080-161 = "โมโมอิเลยต้องมาบาดเจ็บเพราะอาริสึค่ะ..."
22080-162 = "[s] \"อาริสึ...\""
22080-163 = "ทั้งหมดนี้เป็นเพราะ... อาริสึเองค่ะ"
22080-164 = "แต่ว่าอาริสึ... ก็ไม่รู้เลยค่ะ... ว่าทำไมมันถึงได้เป็นแบบนี้"
22080-165 = "ในตอนนั้น... มันมีบางอย่าง..."
22080-166 = "ราวกับว่า... อาริสึมี 'ข้อมูลที่บันทึกไว้' อยู่กับตัว แต่เป็นข้อมูลที่อาริสึไม่รู้จัก..."
22080-167 = "[s] \"อ่า...\""
22080-170 = "อาริสึไม่มีความทรงจำเกี่ยวกับที่แห่งนี้เลยค่ะ แต่ว่ามันเหมือนจะมี 'ข้อมูลที่บันทึกไว้' เก็บอยู่ที่ไหนสักแห่ง#nในความทรงจำ"
22080-171 = "และร่างกายของอาริสึก็กำลังตอบสนองอยู่ค่ะ"
22080-174 = "เหมือนกำลังเล่นเกมในแมพที่คุ้นเคยโดยไม่ต้องมีโหมดฝึกสอนหรือคำอธิบายก็ได้"
22080-176 = "ร่างกายของอาริสึตอบสนอง ร่างกายของอาริสึเคลื่อนไหวไป..."
22080-177 = "แต่จำไม่ได้เลยค่ะว่าตอนนั้นทำอะไรลงไป... และทำไปเพราะอะไร..."
22080-182 = "แต่ที่แน่ๆ คือ... อาริสึ... อาริสึ..."
22080-183 = "อาริสึทำให้โมโมอิต้องบาดเจ็บ..."
22080-184 = "[s] \"เดี๋ยวก่อน อาริสึ! ใจเย็นๆ ก่อนนะ...\""
22080-185 = "คุณครูคะ... อาริสึ... อาริสึต้องทำยังไง...!"
22080-186 = "ถูกต้อง เธอทำให้ผู้คนบาดเจ็บ นี่คือความจริงที่ปฏิเสธไม่ได้"
22080-188 = "[ns] \"ใครน่ะ?!\""
22080-194 = "คุณครู!"
22080-195 = "ปะ... ประธาน...!"
22080-202 = "ในที่สุดเรื่องที่ฉันกังวลก็เกิดขึ้นจนได้สินะ"
22080-203 = "[s] \"เธอคือ...?\""
22080-204 = "คุณคือครูชาเล่ต์คนนั้นสินะ?"
22080-205 = "...น่าเสียใจอย่างสุดซึ้งเลยจริงๆ ที่การพบกันครั้งแรกของเรามันเป็นแบบนี้"
22080-206 = "ฉันจะขอแนะนำตัวก่อน ชื่อของฉันคือ สึคัตสึกิ ริโอะ"
22080-207 = "ที่ฉันมาหาคุณแบบนี้ ก็เพื่อที่จะ..."
22080-211 = "บอก <ความจริง> ให้คุณและเด็กๆ ที่อยู่ตรงนั้นฟังน่ะ"
22080-213 = "ตอนต่อไป;ความจริงอันน่าโหดร้าย 1"

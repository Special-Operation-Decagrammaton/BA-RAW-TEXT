[translation]
22080-1 = "第8話;崩壞的日常"
22080-20 = "……"
22080-21 = "[s]「桃井……」"
22080-34 = "（──桃井倒下了）"
22080-35 = "（在愛麗絲暴走的那天）"
22080-36 = "（桃井被捲入那場騷動而失去了意識）"
22080-37 = "（雖然趕緊將倒下的桃井帶到夏萊的醫務室……）"
22080-38 = "（但在那之後過了整整兩天）"
22080-39 = "（桃井依然沒有恢復意識──）"
22080-47 = "（在愛麗絲暴走的同時啟動的那些不知名的機器人……#n　轉眼之間就將社辦化為火海……）"
22080-51 = "（幸好有及時趕來的C&C，事態才能告一段落……）"
22080-55 = "[ns]（那時愛麗絲的模樣究竟是……）"
22080-56 = "（雖然狀況有所收束，並不代表一切都已結束。那個事件留下了許多疑問和傷痕）"
22080-60 = "（晴這麼說了）"
22080-61 = "（「愛麗絲之所以採取那些行動，是因為『接觸』了那個奇怪的機器人吧」）"
22080-66 = "（綠這麼說了）"
22080-67 = "（「愛麗絲的氛圍改變的時候，）"
22080-73 = "（桃井帶著的『遊戲機』突然啟動了」）"
22080-74 = "[ns]「桃井的遊戲機……記得是從廢墟……」"
22080-79 = "……"
22080-80 = "（嗶嗶）"
22080-81 = "［歡迎進入Divi:Sion System，請輸入要搜尋的項目］"
22080-84 = "[56cd7b]＜你是AL-1S嗎？＞"
22080-87 = "[ns]「廢墟……電腦……還有……Divi:Sion System……」"
22080-88 = "（愛麗絲會暴走的理由是什麼？機器人和愛麗絲的關係究竟是……）"
22080-89 = "（那時，突然啟動的桃井的遊戲機到底……）"
22080-90 = "（會跟在廢墟發現的那名為＜Key＞的資料夾有關嗎？）"
22080-91 = "[ns]「雖然確認了桃井的遊戲機……」"
22080-95 = "（卻連電源都開不了。彷彿一開始就是這樣一般──）"
22080-96 = "（簡直，就像那裡面變得空無一物一樣──）"
22080-100 = "（就在找不到任何答案，陷入思考的漩渦時）"
22080-110 = "老師……愛麗絲醬她……"
22080-117 = "啊……老師……"
22080-121 = "[ns]「愛麗絲怎麼了？」"
22080-123 = "那個……愛麗絲醬……她……"
22080-124 = "不願意從，社辦裡出來。"
22080-125 = "[s]「……這樣啊。」"
22080-126 = "雖然叫了她好幾次……但總是……"
22080-127 = "這，這種時候……不知道該，怎麼做才好……"
22080-128 = "嗚……"
22080-129 = "[s]「別擔心。」"
22080-130 = "……老師？"
22080-131 = "……！"
22080-132 = "[s]「別擔心。這裡就交給我吧。」"
22080-138 = "[ns]「……呼。」"
22080-142 = "[ns]「愛麗絲，我可以進來嗎？」"
22080-144 = "[ns]「我要進去了唷。」"
22080-148 = "[ns]「愛麗絲。」"
22080-150 = "[ns]「……還好嗎？」"
22080-153 = "………………"
22080-154 = "[s]「聽說妳飯也不吃一直待在這裡。」"
22080-155 = "老，老師……"
22080-156 = "[s]「大家都在擔心妳唷。一起走吧……？」"
22080-158 = "愛麗絲，沒辦法那麼做。"
22080-159 = "[s]「……為什麼呢？」"
22080-160 = "愛麗絲……都怪……愛麗絲……"
22080-161 = "因為……愛麗絲……讓桃井受傷了……"
22080-162 = "[s]「愛麗絲……」"
22080-163 = "全部，都是……愛麗絲做的。"
22080-164 = "為什麼，會變成那樣……愛麗絲也……不清楚。"
22080-165 = "那個時候……某個東西……"
22080-166 = "簡直就像……#n簡直就像某個愛麗絲不知道的「存檔」，在愛麗絲的身體裡一樣……"
22080-167 = "[s]「……啊。」"
22080-170 = "愛麗絲雖然沒有記憶……卻像是有著「存檔」一樣。"
22080-171 = "身體自己做出了反應。"
22080-174 = "舉例來說，對，就像是不用新手教學和說明依然能推進遊戲……#n或者是，像是在玩已經玩過很多次的遊戲一樣……"
22080-176 = "……愛麗絲的身體，做出了反應。#n然後動了起來。"
22080-177 = "那時，愛麗絲做了什麼……完全，想不起來……"
22080-182 = "但是唯一，可以肯定的是……愛麗絲……愛麗絲…………"
22080-183 = "愛麗絲把桃井給……！"
22080-184 = "[s]「愛麗絲，冷靜一點……！」"
22080-185 = "老師，愛麗絲……愛麗絲究竟該怎麼辦……！"
22080-186 = "沒錯，妳讓她受傷了。#n──那是無法逃避的事實。"
22080-188 = "[ns]「是誰……！？」"
22080-194 = "老師！"
22080-195 = "會，會長她……！"
22080-202 = "啊啊，果然──變成和我害怕的情況一樣了啊。"
22080-203 = "[s]「會長……？」"
22080-204 = "──你就是傳聞中夏萊的老師？"
22080-205 = "……和老師在紀錄上的第一次見面居然會是這樣，真是非常遺憾。"
22080-206 = "我的名字是調月莉央。"
22080-207 = "是為了告訴你──還有她們……"
22080-211 = "「真相」而來的。"
22080-213 = "下一話;殘酷的真相（１）"

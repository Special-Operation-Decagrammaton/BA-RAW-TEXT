[translation]
22080-1 = "Episode 8; Daily Life Destroyed"
22080-20 = "..."
22080-21 = "[s] \"Momoi...\""
22080-34 = "Momoi collapsed on that fateful day..."
22080-35 = "It was the day Aris went into an unexplained frenzy."
22080-36 = "Momoi was caught up in the commotion and was knocked unconscious."
22080-37 = "We rushed Momoi to the Schale infirmary as quickly as possible."
22080-38 = "But two days had passed already..."
22080-39 = "...and Momoi showed no signs of waking up."
22080-47 = "The strange robots turned on out of nowhere, and Aris suddenly lost control. Everything unfolded in an instant."
22080-51 = "Fortunately, we got the situation under control thanks to Neru and the C&C members who showed up later, but..."
22080-55 = "[ns] \"(Why did Aris react like that...?)\""
22080-56 = "It was the calm before the storm. And we were all left with many questions."
22080-60 = "According to Hare..."
22080-61 = "...the behavior Aris displayed was clearly abnormal and caused by being in contact with those strange robots."
22080-66 = "And according to Midori..."
22080-67 = "When Aris changed, and the robots began to activate..."
22080-73 = "...The broken console Momoi had been holding onto also powered on, after all this time."
22080-74 = "[ns] \"Momoi's game console...has the data from the ruins...\""
22080-79 = "..."
22080-80 = "*beep*"
22080-81 = "Welcome to the Divi:Sion System. Please enter the item you need help with."
22080-84 = "[56cd7b]Identity check: Are you AL-1S?"
22080-87 = "[ns] \"A computer...from the ruins...and the Divi:Sion System...\""
22080-88 = "Why did Aris lose control? And what were those robots?"
22080-89 = "Also, what about Momoi's game console powering on at that exact moment?"
22080-90 = "Does this have something to do with the folder labeled \"key\" from the ruins?"
22080-91 = "[ns] \"I checked Momoi's game console right away, but...\""
22080-95 = "It wouldn't turn on. It was as if it never worked."
22080-96 = "Like there wasn't any data on there to begin with."
22080-100 = "My head was spinning with so many questions."
22080-110 = "Sensei... Aris..."
22080-117 = "Sensei...!"
22080-121 = "[ns] \"How's Aris?\""
22080-123 = "Aris is... Um... She's still..."
22080-124 = "She's still in the club room by herself."
22080-125 = "[s] \"...Okay.\""
22080-126 = "I tried to talk to her through the door a few times, but..."
22080-127 = "I-I don't know what to do..."
22080-128 = "*sob*"
22080-129 = "[s] \"It's okay. It'll be okay\""
22080-130 = "...Sensei?"
22080-131 = "...!"
22080-132 = "[s] \"It's okay, let me handle it.\""
22080-138 = "[ns] \"...Okay.\""
22080-142 = "[ns] \"Aris? Are you in here? Can I come in?\""
22080-144 = "[ns] \"I'll take that as yes. I'm coming in.\""
22080-148 = "[ns] \"Aris.\""
22080-150 = "[ns] \"Aris, are you okay? Talk to me, please.\""
22080-153 = "..."
22080-154 = "[s] \"Everyone is worried. You haven't eaten anything, and you haven't left the club room.\""
22080-155 = "S-Sensei..."
22080-156 = "[s] \"We're all waiting for you to come back. Let's go, together.\""
22080-158 = "I cannot...do that."
22080-159 = "[s] \"...Why not?\""
22080-160 = "Because...of me..."
22080-161 = "Momoi was hurt..."
22080-162 = "[s] \"Aris...\""
22080-163 = "I know it is all my fault."
22080-164 = "I do not know why. I do not know what happened."
22080-165 = "D-During the...incident..."
22080-166 = "Something came over me. As if someone booted up a save file I did not know was on my memory card."
22080-167 = "[s] \"...Ah.\""
22080-170 = "I cannot find it anywhere on my memory card. But it seems to be...in my body, somewhere."
22080-171 = "It was like I was playing an old video game I had not played for many years."
22080-174 = "Without a tutorial or explanation, I still had a sense of where to go."
22080-176 = "...That is how my body responded and acted."
22080-177 = "For some reason, I cannot remember what I did..."
22080-182 = "But it is obvious that...I...I..."
22080-183 = "I hurt Momoi...!"
22080-184 = "[s] \"Wait, Aris! Let's not overreact...\""
22080-185 = "But, Sensei... What do I do?"
22080-186 = "Right, you've hurt her, and that's the truth."
22080-188 = "[ns] \"Who's that?!\""
22080-194 = "Sensei!"
22080-195 = "Th-The president...!"
22080-202 = "It seems my worst fears were realized."
22080-203 = "[ns] \"You're...?\""
22080-204 = "Are you Schale's Sensei?"
22080-205 = "...It's a shame that our monumental first meeting had to happen like this."
22080-206 = "My name is Tsukatsuki Rio."
22080-207 = "I've come here to tell you all something."
22080-211 = "The truth about Aris."
22080-213 = "Next Episode; The Harsh Truth 1"

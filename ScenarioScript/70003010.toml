[translation]
70003010-1 = "高地人運行日誌（１）"
70003010-7 = "大家好～！我是高地人鐵道學園的駕駛員。"
70003010-8 = "今天奇普托斯內環線也預計將照常行駛！"
70003010-9 = "大家應該都知道，這條內環線是全年事故最多的路線。"
70003010-10 = "因為就算在行駛中發生特殊情況，也只能靠內部人力來應對，不禁讓人有點緊張……"
70003010-11 = "當然在問題擴大的時候也會請求支援，只是等他們抵達現場也需要時間……"
70003010-12 = "總之有些事情無法立即處理，所以會有點辛苦。"
70003010-13 = "……"
70003010-14 = "唔嗯……應該說挺辛苦的才對……"
70003010-18 = "啊哈哈，總之呢～！"
70003010-19 = "在做好車輛的全面管理、應對行駛中的各種事故的過程中，#n時間總是咻～一下就過去了！"
70003010-20 = "雖然不知道這算不算好事，但大概就是這樣！"
70003010-21 = "你在做什麼？跟人家視訊？"
70003010-22 = "啊，不是……"
70003010-23 = "那個……"
70003010-27 = "我，我在錄Vlog……"
70003010-28 = "Vlog？"
70003010-29 = "沒錯……！#n因，因為我想讓更多人認識高地人鐵道學園真實的樣貌……"
70003010-30 = "嘿……"
70003010-31 = "想，想說如果能讓乘客知道我們的工作內容，說不定會比較願意配合……"
70003010-32 = "有道理，確實有不少人以為我們只是坐在列車上繞圈圈而已。"
70003010-33 = "不久前還有個乘客大喊「你們到底在做什麼！」，然後不停鬧事呢……"
70003010-34 = "就是說啊……"
70003010-35 = "這種人實在太多了。#n如果那麼做能減少奧客數量的話，感覺還挺不錯的。"
70003010-36 = "總之快出發了，趕緊做好準備吧。"
70003010-37 = "是，是！"
70003010-41 = "呼……"
70003010-42 = "那麼今天的行駛，我也會加油的！#n目標是成為這個月的優秀學生……！"
70003010-45 = "列車駕駛室"
70003010-46 = "呼……目前為止還沒出什麼大問題。"
70003010-47 = "車廂的情況怎麼樣？"
70003010-48 = "啊～車廂也一切正常。"
70003010-49 = "雖然剛才3號車廂有發生乘客坐錯位置的小問題，不過已經順利解決了。"
70003010-50 = "那就好。#n希望能繼續維持下去……"
70003010-55 = "啊，話才剛說完就……"
70003010-56 = "5號車廂有乘客抱怨太冷，要求關掉空調？"
70003010-57 = "那就稍微把溫度調高一點吧。"
70003010-59 = "（幾分鐘後……）"
70003010-62 = "咦……又是5號車廂？"
70003010-63 = "說車裡太熱了，要我們把空調開強一點……？"
70003010-64 = "跟剛才是同一個人嗎？"
70003010-65 = "不，是另一位乘客。"
70003010-66 = "唉……這種情況最麻煩了。#n到底該聽誰的好呢？"
70003010-67 = "這也沒辦法。#n畢竟乘客們也是覺得不舒服才反應的……"
70003010-72 = "啊，啊啊……！#n車廂，車廂人員聽到請回答！"
70003010-73 = "怎麼了？發生什麼事了嗎？"
70003010-74 = "5，5號車廂又有報告說……有乘客因為太熱而開始脫衣服……"
70003010-75 = "真是的……我馬上過去處理。"
70003010-76 = "至於空調溫度的問題，我先拿毯子給會冷的乘客吧？"
70003010-77 = "至少比讓乘客在車廂內脫衣服好……嗎？"
70003010-78 = "那就麻煩你了……"
70003010-80 = "7號車廂"
70003010-84 = "唉～最近的年輕人實在是……"
70003010-88 = "看到長輩都不會主動讓座嗎？"
70003010-89 = "什麼？"
70003010-90 = "這節是對號座的車廂耶……"
70003010-91 = "哎，管你什麼對號不對號的！#n還不快點讓座！我腳已經在痛了你知道嗎！"
70003010-92 = "你手上拿的是什麼？棍子？"
70003010-93 = "喂，老頭！別拿尺八亂揮好不好！"
70003010-95 = "懂不懂得敬老尊賢啊！#n我在你們這個年紀的時候──！！"
70003010-96 = "這什麼奧客啊！？"
70003010-106 = "唉……那個，老先生？#n麻煩您先把東西放下，大家有話好說。"
70003010-107 = "啊？你又是誰？"
70003010-108 = "喂！是那個老頭先來找碴的！"
70003010-109 = "在這裡起爭議會影響到其他乘客的，麻煩先移駕到車廂外的走廊……"
70003010-110 = "別笑死人了！「顧客至上」你懂不懂啊！#n竟然好意思對我指手畫腳？"
70003010-111 = "我沒有這個意思，#n只是這樣會造成其他人的困擾……所以才請各位先移動到其他地方……"
70003010-112 = "這座位是我們花錢買的耶！"
70003010-113 = "有問題的明明是那個老頭！憑什麼要我們離開這裡！！"
70003010-114 = "不是，那個……"
70003010-115 = "什麼，老頭？？#n這些說話不經大腦的臭小鬼！竟敢對長輩這麼口無遮攔！"
70003010-119 = "……"
70003010-120 = "為什麼老是會發生這種事呢……？"
70003010-123 = "那個……你是高地人的乘務員對吧？"
70003010-124 = "啊，是的。"
70003010-125 = "能麻煩你趕快處理一下那些人嗎？他們實在太吵了。"
70003010-126 = "我，我正在努力……"
70003010-127 = "哎呦，把他們全部趕出去不就好了。#n怎麼會搞到現在亂成一團……"
70003010-128 = "是，是……"
70003010-130 = "很抱歉造成你的不便……"
70003010-134 = "7號車廂有騷動？#n唔嗯，我知道了。"
70003010-135 = "你先在現場盡量處理，如果有困難我再過去支援。"
70003010-136 = "嗯……嗯……麻煩你辛苦一下了。"
70003010-140 = "唉……"
70003010-141 = "才想說怎麼這麼安靜，果然不出意外地出意外了。"
70003010-145 = "什麼？這次連8號跟3號車廂都……？"
70003010-147 = "8號車廂"
70003010-154 = "喂！先下後上有沒有聽過啊！小心點好不好！"
70003010-155 = "怎樣？啊你是不會靠邊走哦！"
70003010-156 = "不然你先讓路啊！"
70003010-157 = "啊？想吵架是不是！？"
70003010-159 = "3號車廂"
70003010-161 = "來來來！車廂裡的各位乘客～！麻煩注意一下我這邊～！"
70003010-165 = "我是誰？那種事不重要！"
70003010-166 = "重要的是──"
70003010-167 = "各位有機會能把超級好物帶回家！"
70003010-168 = "到底是什麼呢～！大家一定很好奇對吧！"
70003010-169 = "搞什麼，原來是來推銷的啊。#n快檢舉他。"
70003010-170 = "這東西釋放出的遠紅外線和負離子，將有助於改善血液循環哦！#n同時還能減少槍管的火藥碎屑，只要帶在身上就能解決卡彈問題！"
70003010-171 = "為各位介紹席捲奇普托斯的熱門商品──「無所不能的鍺手環」～！！！"
70003010-172 = "就是賣到供不應求的那款手環哦！這千載難逢的機會，可不是天天都有的～"
70003010-173 = "原本的定價是5千元，但搭乘這班列車的幸運乘客只要1千元就能帶回家！#n簡直是破盤大特價～！！"
70003010-174 = "哦，真的假的……#n居然賣這麼便宜，也許值得買買看……？"
70003010-175 = "就，就是說啊……而且還能解決卡彈問題，真是太厲害了……"
70003010-179 = "啊，這位客人！既然摸了就得把它買回家囉～！"
70003010-180 = "什，什麼？#n我只是因為好奇摸了一下而已耶……"
70003010-181 = "這是我們千年疑似科學部的特製商品，一旦被人摸到就會立刻留下紀錄！"
70003010-182 = "怎，怎麼這樣……"
70003010-183 = "唉，真拿你沒辦法。"
70003010-185 = "我算你便宜一點吧～！#n本來是不能這樣的，就當作是特別服務。"
70003010-186 = "5個一組只收3千元就好！哎呀～簡直太划算了～！！"
70003010-188 = "咦……那不就等於能免費拿2個嗎？"
70003010-189 = "這，這價格不買就虧大了吧？"
70003010-190 = "啊～今天我心情不錯！！"
70003010-192 = "就破例把這個價格開放給這節車廂的所有客人吧！！"
70003010-193 = "前三名購買的客人～！！再額外加送好不容易從百鬼夜行空運來的護身符哦！"
70003010-194 = "我，我要買！"
70003010-195 = "我也要我也要！！"
70003010-197 = "6號車廂"
70003010-198 = "那邊的客人！！#n不可以爬到行李架上！請趕緊下來！"
70003010-199 = "為什麼啊？這裡躺起來很舒服耶！"
70003010-200 = "爬上去很危險的！請您趕快下來！"
70003010-204 = "哎唷！啊我就沒有位置坐嘛！#n車廂裡的座位不夠，難道不是你們的問題嗎？"
70003010-205 = "咦？"
70003010-206 = "這位乘客，可以讓我看一下您的車票嗎？"
70003010-207 = "那是什麼？搭火車還需要車票嗎？"
70003010-212 = "這位乘客，請您在下一站下車！！"
70003010-213 = "什麼──？你憑什麼要我下車啊？叫你們負責人過來！！"
70003010-215 = "4號車廂"
70003010-216 = "哈啊，哈啊……是這裡嗎？"
70003010-217 = "那個，各位乘客！#n這樣在路中間打麻將的話，會造成其他乘客的不便！"
70003010-218 = "啊，你是這裡的職員嗎？來得正好！#n跟我們一起打麻將吧！現在剛好三缺一！"
70003010-219 = "嗯？你說什麼……"
70003010-220 = "現在人不夠！趕快坐下吧！"
70003010-221 = "我，我不懂規則……！#n不對，重點是不能在這裡打麻將！"
70003010-222 = "哎呀，我們會教你的，你先坐下就對了！！"
70003010-225 = "是，是！這裡是駕駛員……！"
70003010-226 = "支援是嗎！？請問哪裡需要支援……"
70003010-230 = "什麼！？全部車廂……？？"

[translation]
70003010-1 = "บันทึกการเดินรถไฟไฮแลนเดอร์ 1"
70003010-7 = "สวัสดีค่ะ! ฉันคือพนักงานขับรถไฟไฮแลนเดอร์แห่งสถาบันการรถไฟไฮแลนเดอร์ค่ะ"
70003010-8 = "วันนี้จะมีการเปิดให้บริการรถไฟสายวงกลมที่วิ่งรอบเมืองคิโวทอสค่ะ!"
70003010-9 = "อย่างที่ทราบกันค่ะว่ารถไฟสายวงกลมเป็นสายที่เกิดอุบัติเหตุบ่อยที่สุดของปี"
70003010-10 = "หากเกิดเหตุการณ์ผิดปกติระหว่างการเดินรถ ปกติแล้วบุคลากรภายในที่อยู่ในขบวนนั้นๆ จะต้องรับมือกันให้ได้ ฉันก็เลยประหม่านิดหน่อยค่ะ"
70003010-11 = "ถ้าเหตุการณ์ลุกลามใหญ่โตขึ้น เราก็ขอกองกำลังสนับสนุนได้ แต่กว่ากองกำลังสนับสนุนจะเดินทาง#nมาถึงก็ใช้เวลาพอสมควร..."
70003010-12 = "บ่อยครั้งที่มีปัญหาที่พวกเราจัดการกันเองในทันทีไม่ได้ พวกเราก็เลยค่อนข้างลำบากค่ะ"
70003010-13 = "..."
70003010-14 = "ค่ะ... เรื่องแบบนี้มีค่อนข้างบ่อยเลยค่ะ..."
70003010-18 = "แหะๆๆ สรุปเลยดีกว่า~!"
70003010-19 = "ถ้าพวกเรารับมือกับปัญหาหรืออุบัติเหตุที่เกิดระหว่างเดินรถไฟ เวลาก็จะผ่านไปไวฉิว~ โดยไม่รู้ตัวเลยค่ะ!"
70003010-20 = "ไม่รู้ว่าถือเป็นเรื่องดีหรือเปล่านะคะ แต่ก็เอาเถอะค่ะ!"
70003010-21 = "ทำอะไรน่ะ? วิดีโอคอลเหรอ?"
70003010-22 = "อ๊ะ ไม่ใช่ค่ะ..."
70003010-23 = "คือว่า..."
70003010-27 = "ฉันกำลังถ่าย Vlog อยู่น่ะค่ะ..."
70003010-28 = "Vlog?"
70003010-29 = "ค่ะ...! ฉันอยากให้ทุกคนได้รู้จักแง่มุมที่แท้จริงของสถาบันการรถไฟไฮแลนเดอร์ให้มากขึ้น..."
70003010-30 = "หา...?"
70003010-31 = "ฉะ... ฉันคิดว่าถ้าผู้โดยสารได้รู้ว่าเราต้องทำงานอะไรบ้าง ก็น่าจะให้ความร่วมมือระหว่างการโดยสาร#nกับพวกเรามากขึ้นน่ะค่ะ..."
70003010-32 = "ก็นะ ก็มันมีหลายคนเลยที่คิดว่าถ้าได้ขึ้นรถไฟแล้วจะเดินวนไปวนมาตามใจชอบได้"
70003010-33 = "ไม่นานมานี้ก็มีผู้โดยสารที่ตะโกนว่า \"พวกแกเป็นใคร รู้มั้ยแถวนี้ใครใหญ่!\" แล้วก็เอะอะโวยวายใหญ่#nโตด้วย"
70003010-34 = "ก็เพราะอย่างนั้นละค่ะ..."
70003010-35 = "คนแบบนั้นก็มีอยู่มาก งั้นถ้าทำอะไรเพื่อเป็นการลดจำนวนผู้โดยสารไม่มีมารยาทได้บ้างก็คงดีนะ"
70003010-36 = "แต่เราใกล้จะออกเดินทางกันแล้ว รีบไปเตรียมตัวกันเถอะ"
70003010-37 = "ค่ะ ค่ะ!"
70003010-41 = "ฮู่ว..."
70003010-42 = "เอาเป็นว่าการเดินรถไฟในวันนี้ ฉันก็จะพยายามเต็มที่ค่ะ! เพื่อการเป็นนักเรียนดีเด่นประจำเดือน...!"
70003010-45 = "ห้องเครื่องรถไฟ"
70003010-46 = "ฮึ่ม... โชคดีที่เราเดินรถกันได้อย่างราบรื่นโดยไม่มีปัญหาใหญ่ใดๆ นะคะ"
70003010-47 = "สถานการณ์ในห้องโดยสารเป็นยังไงบ้างคะ?"
70003010-48 = "อ่า ในห้องโดยสารก็ไม่มีปัญหา"
70003010-49 = "เมื่อกี้มีผู้โดยสารในตู้โดยสารที่ 3 นั่งผิดที่ แต่ก็คลี่คลายได้ ไม่มีปัญหาใหญ่อะไร"
70003010-50 = "ค่อยยังชั่วนะคะ อยากให้การเดินรถวันนี้ราบรื่นแบบนี้ตลอดจัง..."
70003010-55 = "อ๊ะ พูดยังไม่ทันขาดคำ..."
70003010-56 = "มีคำขอจากผู้โดยสารในตู้โดยสารที่ 5 ที่บอกว่าแอร์หนาว ขอให้ปิดแอร์ให้หน่อยค่ะ"
70003010-57 = "คงต้องเพิ่มอุณหภูมิแอร์แล้วสินะคะ"
70003010-59 = "(ครู่ต่อมา...)"
70003010-62 = "อ๊ะ... มีคำขอจากตู้โดยสารที่ 5 อีกแล้ว..."
70003010-63 = "บอกว่าร้อนไป ขอให้เพิ่มแอร์ให้งั้นเหรอ..."
70003010-64 = "ใช่คนเดียวกับเมื่อกี้หรือเปล่า?"
70003010-65 = "ไม่ค่ะ เป็นคนละคนกันค่ะ"
70003010-66 = "ฮึ่ม... เรื่องแบบนี้ตัดสินใจยากที่สุดเลย นี่ฉันต้องทำตามใจใครเนี่ย?"
70003010-67 = "ช่วยไม่ได้ค่ะ ก็ผู้โดยสารไม่ได้รับความสะดวกนี่นา..."
70003010-72 = "อ๊ะ อ่า...! พนักงานรถไฟ มาที่ห้องโดยสารด่วนค่ะ"
70003010-73 = "ทำไม? มีอะไรเหรอ?"
70003010-74 = "ฉะ... ฉันได้รับแจ้งจากตู้โดยสารที่ 5 อีกแล้วค่ะ... ตอนนี้ในห้องโดยสารร้อนจนผู้โดยสารบางคนเริ่ม#nถอดเสื้อผ้าแล้วค่ะ..."
70003010-75 = "เฮ้อ... จะรีบไปเดี๋ยวนี้ละ"
70003010-76 = "ฉันว่าเราควรหาข้อตกลงเรื่องอุณหภูมิแอร์นะ เราปรับแอร์แล้วเอาผ้าห่มไปให้ผู้โดยสารที่หนาวดีมั้ย?"
70003010-77 = "แบบนั้นก็น่าจะดีกว่าให้มีผู้โดยสารถอดเสื้อผ้าบนรถไฟค่ะ..."
70003010-78 = "งั้นก็ฝากด้วยนะคะ..."
70003010-80 = "ตู้โดยสารที่ 7"
70003010-84 = "เฮ้อ~ วัยรุ่นสมัยนี้นี่นะ"
70003010-88 = "เห็นผู้ใหญ่แล้วทำไมถึงไม่ยอมลุกให้นั่งล่ะ?"
70003010-89 = "อะไรกัน?"
70003010-90 = "นี่ลุงคะ ที่นั่งมันกำหนดไว้แล้วต่างหากค่ะ"
70003010-91 = "เฮอะ พูดอะไรไม่เห็นรู้เรื่อง! รีบๆ ลุกให้ฉันนั่งได้แล้ว! ฉันเจ็บขานะ!"
70003010-92 = "แล้วนั่นถืออะไรอยู่ในมือน่ะ? ไม้เท้าเหรอ?"
70003010-93 = "นี่ลุง! วางขลุ่ยชาคุฮาจิลงเลยนะ จะทำอะไรพวกฉันหรือไง?"
70003010-95 = "เด็กนิสัยเสียพวกนี้!! รู้มั้ย สมัยที่ฉันอายุเท่าพวกเธอน่ะ~!!"
70003010-96 = "ทำไม ตอนนั้นมันเป็นยังไง? ตอนนั้นรู้หรือเปล่าว่าจะโตมาเป็นมนุษย์ลุงบนรถไฟน่ะ?!"
70003010-106 = "เฮ้อ... เอ่อ คุณลุงคะ? วางไม้นั่นก่อนเถอะค่ะ ทุกคนใจเย็นๆ ก่อนนะคะ"
70003010-107 = "หืม? ใครอีกล่ะเนี่ย?"
70003010-108 = "นี่! ลุงคนนั้นมาหาเรื่องพวกเราก่อนนะ!"
70003010-109 = "ห้ามทะเลาะกันตรงนี้นะคะ เชิญไปที่ทางเดินนอกห้องโดยสารก่อนค่ะ..."
70003010-110 = "ฉันจะต้องไปทำไม! ลูกค้าคือพระเจ้าไม่ใช่เหรอ จะมาสั่งให้ทำนู่นทำนี่ได้ไง?"
70003010-111 = "เอ่อ พวกคุณกำลังรบกวนผู้โดยสารคนอื่นอยู่น่ะค่ะ... ออกมาจากตรงนี้ก่อนนะคะ..."
70003010-112 = "แต่เราจ่ายเงินซื้อตั๋วมานะ ที่นั่งตรงนี้ก็ระบุไว้ในตั๋วด้วย!"
70003010-113 = "ตาแก่คนนั้นต่างหากที่เป็นปัญหา พวกเราไม่ลุกไปไหนด้วยหรอก!!"
70003010-114 = "เอ่อ แต่ว่า..."
70003010-115 = "ว่าไงนะ ตาแก่งั้นเรอะ?? เด็กเมื่อวานซืนพวกนี้! พูดจาแบบนี้กับผู้หลักผู้ใหญ่ได้ยังไง!"
70003010-119 = "..."
70003010-120 = "ทำไมถึงมีแต่เรื่องแบบนี้นะ...?"
70003010-123 = "ขอโทษนะคะ คุณเป็นพนักงานรถไฟไฮแลนเดอร์ใช่มั้ยคะ?"
70003010-124 = "ค่ะ ใช่ค่ะ"
70003010-125 = "ช่วยจัดการคนพวกนั้นเร็วๆ เถอะค่ะ มันน่าหนวกหูนะคะ"
70003010-126 = "ฉะ... ฉันก็พยายามอยู่ค่ะ..."
70003010-127 = "พาพวกเขาออกไปจากตรงนี้เถอะค่ะ จะลากไปหรือเอาตัวไปยังไงก็ได้ แบบนี้มันรบกวนคนอื่นนะคะ"
70003010-128 = "ขะ... เข้าใจแล้วค่ะ..."
70003010-130 = "ขออภัยในความไม่สะดวกนะคะ..."
70003010-134 = "เกิดเรื่องวุ่นวายในตู้โดยสารที่ 7 เหรอคะ? อืม เข้าใจแล้วค่ะ"
70003010-135 = "พยายามจัดการหน้างานให้ดีก่อน ถ้าจัดการไม่ได้ ฉันจะสนับสนุนอีกทีค่ะ"
70003010-136 = "ค่ะ ค่ะ เหนื่อยหน่อยนะคะ"
70003010-140 = "เฮ้อ..."
70003010-141 = "ก็ว่าอยู่ว่าราบรื่นแปลกๆ สุดท้ายก็เกิดปัญหาจนได้นะคะ"
70003010-145 = "หืม? รอบนี้เป็นปัญหาจากตู้โดยสารที่ 3 กับ 8 เหรอ...?"
70003010-147 = "ตู้โดยสารที่ 8"
70003010-154 = "นี่! ระวังหน่อย! หลบให้คนที่จะออกก่อนสิ!"
70003010-155 = "อะไรกัน? คุณต่างหากล่ะครับที่ต้องหลบให้คนที่เดินเข้ามา!"
70003010-156 = "ที่เดินชนกันก็เพราะตัวเองเดินไม่หลบไม่ใช่เหรอ!"
70003010-157 = "ว่าไงนะ? พูดแบบนั้นออกมาได้ยังไง?!"
70003010-159 = "ตู้โดยสารที่ 3"
70003010-161 = "เอาละๆ! ผู้โดยสารทุกคนบนรถไฟ~! ช่วยให้ความสนใจทางนี้หน่อยนะคะ~!"
70003010-165 = "ฉันเป็นใครน่ะเหรอคะ? ฉันเป็นใครไม่สำคัญหรอกค่ะ!"
70003010-166 = "เพราะสิ่งที่สำคัญก็คือ!"
70003010-167 = "ตอนนี้ทุกคนมีสิทธิ์เป็นเจ้าของสินค้าที่ดีมากๆ เลยละค่ะ!"
70003010-168 = "มันคืออะไรนะ~! ทุกคนสงสัยกันแล้วใช่มั้ยคะ?"
70003010-169 = "อะไรกัน คนขายของนี่นา รีบแจ้งพนักงานรถไฟเร็วเข้า"
70003010-170 = "ของสิ่งนี้ปล่อยรังสีอินฟราเรดและไอออนลบที่ดีต่อการไหลเวียนเลือด! นอกจากนี้ยังช่วยลดคราบเขม่าปืน แค่พกติดตัวไว้ก็ไม่ต้องกังวลเรื่องโหลดกระสุนติดๆ ขัดๆ!"
70003010-171 = "มันก็คือกำไล เจอร์ เจอร์ เจอร์เมเนียม~!! เป็นสินค้าฮอตฮิตติดกระแสในคิโวทอสตอนนี้เลยละค่ะ!"
70003010-172 = "กำไลนี้กำลังขาดตลาดเพราะกำลังเป็นที่นิยม! แต่วันนี้ฉันมีมาให้ทุกคนได้ซื้อกันถึงที่นี่เลยค่ะ โอกาสแบบนี้ไม่ได้มีบ่อยๆ นะคะ~!!"
70003010-173 = "ปกติราคาอยู่ที่เส้นละห้าพันเยน แต่สำหรับลูกค้าผู้โชคดีที่โดยสารรถไฟขบวนนี้อยู่ ฉันจะขายให้ใน#nราคาพิเศษแค่พันเยนเท่านั้นค่ะ!!"
70003010-174 = "อะไรกัน... ขายถูกๆ แบบนั้นเลยเหรอ งั้นก็น่าซื้อมาลองใส่อยู่นะ...?"
70003010-175 = "นะ... นั่นสินะ... ไหนจะช่วยทำให้โหลดกระสุนไม่ติดขัดด้วย สุดยอดไปเลย..."
70003010-179 = "อ๊ะ คุณลูกค้า! ถ้าจับแล้วก็ต้องซื้อนะคะ~!"
70003010-180 = "อะ... อะไรกัน? ฉันแค่ลองแตะดูด้วยความอยากรู้อยากเห็นนิดหน่อยเอง..."
70003010-181 = "นี่คือสินค้าพิเศษจากชมรมวิทยาศาสตร์เทียมของมิลเลเนียม ถ้าแตะต้องไปแล้ว มันก็จะจดจำเจ้าของทันทีเลยค่ะ!"
70003010-182 = "ดะ... ได้ยังไงกัน..."
70003010-183 = "เฮ้อ งั้นก็ช่วยไม่ได้นะคะ"
70003010-185 = "งั้นฉันจะหยวนๆ ให้เป็นกรณีพิเศษ~! ปกติแล้วฉันไม่ทำแบบนี้หรอกนะคะ แต่กับคุณลูกค้าที่มา#nแตะต้องด้วยความสนใจ ฉันจะขายให้ในราคาย่อมเยาเลยค่ะ"
70003010-186 = "เซ็ตห้าเส้น สามพันเยน! โอ้โห~ แบบนี้ไม่รู้ว่าจะได้กำไรหรือเปล่านะคะเนี่ย~!!"
70003010-188 = "อ๊ะ... งั้นก็เท่ากับว่าได้ฟรีสองเส้นเลยสิ?"
70003010-189 = "ถะ... ถ้าแบบนี้ไม่ซื้อก็บ้าแล้ว?"
70003010-190 = "เอาละ วันนี้ยอมทุนหายกำไรหดเลย!!"
70003010-192 = "พิเศษสำหรับตู้รถไฟนี้เท่านั้น!! ฉันจะขายในราคานี้ให้ทุกคนในตู้โดยสารนี้เลยค่ะ!!"
70003010-193 = "และสามคนแรกที่เข้ามาซื้อก่อน~!! จะได้รับของแถมเป็นเครื่องรางไล่สิ่งชั่วร้ายที่ส่งตรงมาจาก#nเฮียกคิยาโคด้วยค่ะ!"
70003010-194 = "ฉันค่ะ ฉันขอซื้อค่ะ!"
70003010-195 = "ฉันด้วย ฉันก็ด้วย!!"
70003010-197 = "ตู้โดยสารที่ 6"
70003010-198 = "ตรงนั้นน่ะ!! อย่าปีนขึ้นไปบนช่องสัมภาระสิคะ! ลงมาเถอะค่ะ!"
70003010-199 = "หืม? ฉันจะนอนสบายๆ ตรงนี้ไม่ได้หรือไง!"
70003010-200 = "ไปนอนข้างบนนั้นมันอันตรายนะคะ! ลงมาเถอะค่ะ!"
70003010-204 = "แล้วจะให้ฉันทำยังไงล่ะ! ฉันไม่มีที่นั่งนี่นา! พวกเธอผิดเองไม่ใช่เหรอที่จัดที่นั่งไม่พอน่ะ?"
70003010-205 = "คะ?"
70003010-206 = "ผู้โดยสารคะ ฉันขอดูตั๋วโดยสารหน่อยได้มั้ยคะ?"
70003010-207 = "ตั๋วอะไรกัน มีด้วยเหรอ? แค่จะขึ้นรถไฟ ทำไมต้องมีตั๋วโดยสารอะไรด้วย?"
70003010-212 = "ผู้โดยสารคะ ถ้าไม่มีตั๋วมาก็ขอเชิญลงที่สถานีหน้าเลยค่ะ!!"
70003010-213 = "ว่าไงนะ? เธอเป็นใคร?? ไปเรียกคนรับผิดชอบมาเลยนะ!!"
70003010-215 = "ตู้โดยสารที่ 4"
70003010-216 = "แฮ่ก แฮ่ก... ใช่ตรงนี้มั้ยนะ?"
70003010-217 = "ผู้โดยสารกลุ่มนั้นน่ะ! มาขวางทางแล้วเล่นไพ่นกกระจอกกันได้ยังไง แบบนี้เป็นการรบกวนผู้โดยสาร#nคนอื่นนะ!"
70003010-218 = "อ๊ะ พนักงานรถไฟเหรอ? มาก็ดีเลย! นี่ มาเล่นด้วยกันสิ! เมื่อกี้มีคนลงไปคนหนึ่งพอดี!"
70003010-219 = "หืม? หมายความว่ายังไง..."
70003010-220 = "เรากำลังขาขาดยังไงล่ะ! เอาละ มานั่งตรงนี้!"
70003010-221 = "ตะ... แต่ฉันเล่นไม่เป็นนะ...! ไม่สิ เราไม่ควรเล่นไพ่นกกระจอกบนรถไฟตั้งแต่แรกมากกว่า!"
70003010-222 = "เอาน่า เดี๋ยวพวกเราสอนให้เอง มานั่งก่อนเถอะ!!"
70003010-225 = "ค่ะ ค่ะ! พนักงานขับรถไฟไฮแลนเดอร์ค่ะ...!"
70003010-226 = "ขอรับการสนับสนุนเหรอคะ?! ที่ไหนคะ..."
70003010-230 = "คะ?! ทุกห้องโดยสารเลยเหรอคะ...??"

[translation]
70003010-1 = "ハイランダー鉄道学園の運行日誌（１）"
70003010-7 = "こんにちは、私はハイランダー鉄道学園で運転士をしています！"
70003010-8 = "本日も「循環線内回り」は平常通り運転予定です。"
70003010-9 = "ご存じの通り、年間で最も事故や事件が起きている路線ですが……。"
70003010-10 = "応援を要請しても、なかなか応援が来ないので……。"
70003010-11 = "何かあっても、基本的に自分たちで解決してるんです。"
70003010-12 = "結構大変な……。"
70003010-13 = "……。"
70003010-14 = "……いや、結構どころじゃないかも。"
70003010-18 = "あはは……！まあ！"
70003010-19 = "車両の管理やトラブルの対応をしていると、#n毎日があっという間に過ぎていくんですよね～！"
70003010-20 = "良いような、悪いような……あはは。"
70003010-21 = "何してるの？"
70003010-22 = "あっ。"
70003010-23 = "いや、これは……。"
70003010-27 = "ちょっと、Vlogを撮ろうと思って……。"
70003010-28 = "そうなんだ？"
70003010-29 = "いや、その……なんというかハイランダーのリアルな姿を、たくさんの人に見てもらおうかなと……。"
70003010-30 = "すごい、面白そう。"
70003010-31 = "乗客も私たちの仕事を知ったら、協力してくれるようになるかもしれないし……。"
70003010-32 = "ただ立ってるだけだと思ってる人もいそうだよね。"
70003010-33 = "この前なんて、「良いご身分だな」って言われたなぁ。"
70003010-34 = "……私もです。"
70003010-35 = "いろんな人に見てもらえると良いね。"
70003010-36 = "じゃ、そろそろ準備しよっか。"
70003010-37 = "は、はい！"
70003010-41 = "ふぅ……。"
70003010-42 = "とにかく今日の運行も頑張ります！#n目指せ、今月の優秀生徒賞……！"
70003010-45 = "列車の機関室"
70003010-46 = "……今のところは異常ありませんね。"
70003010-47 = "客室はどうなってますか？"
70003010-48 = "異常なし。"
70003010-49 = "3号車で座席を間違えてるお客様がいたくらいかな。"
70003010-50 = "良かった、このまま平和に運行できますように……。"
70003010-55 = "さっそく5号車から連絡が……。"
70003010-56 = "ええっと……車両が寒すぎる？"
70003010-57 = "少し温度を上げましょうか。"
70003010-59 = "（しばらくして）"
70003010-62 = "……また5号車からですね。"
70003010-63 = "今度は暑すぎる……？"
70003010-64 = "さっきと同じお客様？"
70003010-65 = "いえ、違いました。"
70003010-66 = "んー、困ったね。"
70003010-67 = "こればかりは、人それぞれですから……。"
70003010-72 = "至急、応答してください！"
70003010-73 = "どうしました？"
70003010-74 = "5号車のお客様が服を……！"
70003010-75 = "はぁ……ちょっと行ってきます。"
70003010-76 = "ひとまず、寒くて困ってるお客様には毛布を渡そう。"
70003010-77 = "それが良さそうですね。"
70003010-78 = "はい、お願いします……。"
70003010-80 = "7号車"
70003010-84 = "まったく、最近の若者は。"
70003010-88 = "目上の者には席を譲るべきじゃろ？"
70003010-89 = "……？"
70003010-90 = "ここ、指定席なんですけど……。"
70003010-91 = "そんなの知らん！#n私は疲れているんだ！さっさと退きたまえ！"
70003010-92 = "うお、危なっ！#n棒……！？"
70003010-93 = "そんなの振り回したら怪我するだろ！"
70003010-95 = "ええい、礼儀がなっておらん！#nワシが若かった頃はな――"
70003010-96 = "うっせえなクソじじい！"
70003010-106 = "お、お客様……落ち着いてください。"
70003010-107 = "まったく、君は誰だね？"
70003010-108 = "このじじいが先に喧嘩売ってきたんだぞ！"
70003010-109 = "他のお客様の迷惑になりますから、まずはあちらに……。"
70003010-110 = "ふざけおって！#nワシもお客様じゃろうが！"
70003010-111 = "いえ、ですからあちらに移動してからお話を……。"
70003010-112 = "こっちは指定席を取ったのに、なんでだよ！"
70003010-113 = "移動なんてするもんか！"
70003010-114 = "ええっと……。"
70003010-115 = "さっきから人をじじい呼ばわりして、失礼甚だしい！"
70003010-119 = "……。"
70003010-120 = "……はぁ、平和すぎると思ったんだよね。"
70003010-123 = "すみません、乗務員さん……。"
70003010-124 = "はい、どうされましたか？"
70003010-125 = "あの人たち、なんとかなりませんか？#nさっきからうるさいんですけど……。"
70003010-126 = "申し訳ありません……。"
70003010-127 = "さっさと大人しくさせてください。#nはぁ、まったく使えない。"
70003010-128 = "は、はい……。"
70003010-130 = "ご迷惑をおかけし、申し訳ございません……。"
70003010-134 = "……7号車でトラブルですか？"
70003010-135 = "なるほど……。"
70003010-136 = "対応が難しければ、私も向かいます。"
70003010-140 = "はぁ……。"
70003010-141 = "毎日毎日、どうしてこう……。"
70003010-145 = "今度は8号車……？#n3号車も！？"
70003010-147 = "8号車"
70003010-154 = "おい、出るほうが先だろ！"
70003010-155 = "は？避ければ済む話じゃないか！"
70003010-156 = "そっちが譲ってもいいんじゃないのか？"
70003010-157 = "うっせえな、文句あんのか？"
70003010-159 = "3号車"
70003010-161 = "みなさーん、少しお時間をください！"
70003010-165 = "私が誰かは気にするところではありません！"
70003010-166 = "それよりも……"
70003010-167 = "今から、とっておきの商品をご紹介します！"
70003010-168 = "ここにいる人たちだけの特別プライスです！"
70003010-169 = "なんか、怪しい生徒がいるんだけど……。"
70003010-170 = "こちらの商品を着けると、遠赤外線とマイナスイオンで血行が良くなるんです！#nしかもお持ちの銃の汚れを減らす効果まであり、弾詰まりもなくなる優れもの！"
70003010-171 = "その名も「げるげるゲルマニウム・ブレスレット」！"
70003010-172 = "皆さんにだけ特別、50％オフでご提供します！"
70003010-173 = "こんなチャンス、滅多にございません！"
70003010-174 = "安いな……。"
70003010-175 = "弾が詰まらなくなるなんて、すごい……。"
70003010-179 = "あっ、お客様！手を触れてしまいましたね？#nご購入していただかなくては！"
70003010-180 = "え、ちょっと見てみようと思っただけなんだけど……。"
70003010-181 = "ミレニアムの疑似科学部特製でして、触れた人のデータが記憶されてしまうんですよ！"
70003010-182 = "そ、そんな……。"
70003010-183 = "仕方ありませんね……。"
70003010-185 = "さらに特別プライスでご提供しましょう！"
70003010-186 = "……なんと、5個購入した方には70％オフ！"
70003010-188 = "70％オフ！？"
70003010-189 = "実質無料じゃん！"
70003010-190 = "よーし！大出血サービスです！"
70003010-192 = "この車両限定で！他の皆さんにもこちらのお値段でご提供いたします！"
70003010-193 = "さらに先着三名様には……百鬼夜行の厄除けもお付けしちゃいます！"
70003010-194 = "買います！"
70003010-195 = "私も！"
70003010-197 = "6号車"
70003010-198 = "そこのお客様、荷物棚に登らないでください！"
70003010-199 = "うっせえな、良いだろ！"
70003010-200 = "危険ですから、席にお戻りください！"
70003010-204 = "座る場所がないんだから仕方ねぇだろ！"
70003010-205 = "……えっ？"
70003010-206 = "乗車券を拝見してもよろしいですか？"
70003010-207 = "なんだ、乗車券って？#n必要なのか？"
70003010-212 = "……次の駅で降りていただきます！"
70003010-213 = "はぁ？#n俺はお客様だぞ！"
70003010-215 = "4号車"
70003010-216 = "……ん？"
70003010-217 = "通路のド真ん中で麻雀！？"
70003010-218 = "お、ちょうど良いとこに！#nひとり抜けちゃったんだよ。"
70003010-219 = "なら、さっさと片付け……。"
70003010-220 = "人が足りなくなっちゃってさ！早く座って座って！"
70003010-221 = "あんまりルール知らないんだけど……って、早く片付けろ！"
70003010-222 = "まあまあ、教えてやるから。"
70003010-225 = "こちら機関室です、またトラブルですね？"
70003010-226 = "今度は何号車ですか？"
70003010-230 = "……全車両！？"

[translation]
70003010-1 = "Highlander Logs 1"
70003010-7 = "Hello! I'm a locomotive driver from the Highlander Railroad Academy."
70003010-8 = "Today, we have our usual, scheduled operation of the Kivotos Inner Loop Line!"
70003010-9 = "As you may well know, the Inner Loop Line has the highest incident rate throughout the year."
70003010-10 = "During operating hours, our internal crew is the only one on board to handle any usual incidents, so I'm naturally a little nervous."
70003010-11 = "If the problem escalates, we do ask for reinforcements, but it usually takes some time for them to arrive..."
70003010-12 = "Therefore, we handle whatever we can on our own. It can be taxing at times."
70003010-13 = "..."
70003010-14 = "Yes... Things like that...happen rather often..."
70003010-18 = "Hahaha, anyway!"
70003010-19 = "From dealing with overall cabin management to responding to various incidents, our work days tend to fly by!"
70003010-20 = "I'm not sure that's a good thing, but anyway!"
70003010-21 = "What are you doing? A video call?"
70003010-22 = "Oh, ah..."
70003010-23 = "Well..."
70003010-27 = "I was filming a vlog..."
70003010-28 = "Vlog?"
70003010-29 = "Yeah...! Um, so that I can hopefully show the good aspects of Highlander Railroad Academy too..."
70003010-30 = "Oh...?"
70003010-31 = "A-And I thought passengers might be more cooperative if they better understood what we do...!"
70003010-32 = "You're right. Some people think we just ride the train around and around in circles."
70003010-33 = "Not too long ago, a passenger was causing a ruckus and yelled at me, \"What do you even do?!\""
70003010-34 = "Tell me about it..."
70003010-35 = "Well, that is an ongoing issue, so sure, if you can inspire even one customer to be a little less rude, then go for it."
70003010-36 = "Anyway, we're about to get moving, so we should all get ready."
70003010-37 = "R-Right."
70003010-41 = "Phew..."
70003010-42 = "Anyway, I'm going to give my all to operations again! I'll definitely make Student of the Month!"
70003010-45 = "Train Engine Room"
70003010-46 = "Hm... Thankfully, we're running without a hitch. So far."
70003010-47 = "How are things in the cabins?"
70003010-48 = "Ah... Nothing to note in the cabins."
70003010-49 = "In Cabin 3, there was one passenger who was in the wrong seat, but they didn't put up a fuss when we informed them."
70003010-50 = "Good. I hope it stays like this..."
70003010-55 = "Ah, I jinxed it."
70003010-56 = "Cabin 5 is requesting we turn off the AC. It's too cold for them."
70003010-57 = "I'll just raise the thermostat a little."
70003010-59 = "A little while later..."
70003010-62 = "Ah, it's another complaint from Cabin 5..."
70003010-63 = "Now they'd like for us to turn up the AC because it's too hot."
70003010-64 = "Is it the same person?"
70003010-65 = "No, another passenger."
70003010-66 = "Ah. This is the worst case scenario. Who are we supposed to please?"
70003010-67 = "Well, what can you do? They wouldn't have sent in a complaint if they weren't uncomfortable."
70003010-72 = "Ah, ah...! Cabin crew, cabin crew, please respond."
70003010-73 = "What? What is it?"
70003010-74 = "I've got another complaint from Cabin 5... Apparently there's a passenger who's taking her clothes off because it's too hot..."
70003010-75 = "Ah... I'll head over there immediately."
70003010-76 = "There needs to be some kind of compromise on the thermostat. Maybe I can get blankets for the cold passenger?"
70003010-77 = "Surely that'd be better than the alternative of a nude passenger?"
70003010-78 = "Please take care of it..."
70003010-80 = "Cabin 7"
70003010-84 = "Tsk, tsk... Young people these days."
70003010-88 = "They don't have enough respect for their elders to give up their seats anymore."
70003010-89 = "Huh?"
70003010-90 = "Excuse me, these are our assigned seats."
70003010-91 = "Ah, I don't care! Get up right now! My legs hurt!"
70003010-92 = "What's that you got there? A stick?!"
70003010-93 = "No, it's a flute! Gah, put that down, Gramps!"
70003010-95 = "You insolent brat!! When I was your age—!"
70003010-96 = "Who's this boor think he is, huh?!"
70003010-106 = "*sigh* Uh, sir? Please lower that...thing. Let's all take a deep breath."
70003010-107 = "Huh? Who are you?"
70003010-108 = "Hey! That gramps is the one who started it!"
70003010-109 = "Regardless of who's at fault, this is inappropriate. If you could just please follow me out of the cabin..."
70003010-110 = "Hah, as if! Customer is always right! Who are you to tell me what to do?"
70003010-111 = "Well, you are disturbing the other passengers...so please follow..."
70003010-112 = "We bought these seats fair and square!"
70003010-113 = "That old man is the problem, so we're not taking a single step!"
70003010-114 = "Well, uh..."
70003010-115 = "What? Old man?! You little brat! Show respect to your elders!"
70003010-119 = "..."
70003010-120 = "Why does this always happen...?"
70003010-123 = "Hello, you're Highlander, right? Part of the train crew?"
70003010-124 = "Ah, yes."
70003010-125 = "Can you do something about those people? They're being too loud."
70003010-126 = "Ah, we are doing the best we can..."
70003010-127 = "Seriously? Drag them out of here if you have to. Just get them out. What kind of policy is this?"
70003010-128 = "Yes, absolutely..."
70003010-130 = "We apologize for the inconvenience..."
70003010-134 = "A disturbance in Cabin 7? Um, understood."
70003010-135 = "Please do as much as you can on your own, but I'll send someone else to help if it gets to be too much."
70003010-136 = "Yes, yes. Please hold on just a little longer."
70003010-140 = "*sigh*"
70003010-141 = "I was hoping we would finally have a quiet day, but alas..."
70003010-145 = "Eh? Cabins 8 and 3 as well?"
70003010-147 = "Cabin 8"
70003010-154 = "Hey! Don't you know people exiting have the right of way?! Watch it!"
70003010-155 = "Huh?! Maybe you should just watch where you're going!"
70003010-156 = "Or just let people in first!"
70003010-157 = "What? Are you kidding me?!"
70003010-159 = "Cabin 3"
70003010-161 = "Hello, everyone! Please direct your attention this way for just a moment!"
70003010-165 = "Who am I? That doesn't matter!"
70003010-166 = "The only thing that matters right now..."
70003010-167 = "...is that you, my lucky fellow passengers, have received a once-in-a-lifetime opportunity to get a really good deal!"
70003010-168 = "\"What is that,\" you may ask?"
70003010-169 = "Hey, it's a peddler. Someone report them."
70003010-170 = "This product right here emits infrared and negative ions, so it's good for blood circulation! Not only that, it'll keep your gun barrel clean of grime, and even just carrying it on your body will reduce bullet jamming!"
70003010-171 = "I'm talking about the hit jewelry that's taking Kivotos by storm! Ger...ger...GERMANIUM BRACELETS!!"
70003010-172 = "I'm bringing this exclusive item right to your train seat! You can't get them anywhere else! That's right. Like I said, once in a lifetime!"
70003010-173 = "I'd normally charge 5,000 yen, but every passenger of this train should consider themselves lucky! Just for today, you can get a special! Shocking! Price! Of just 1,000 yen!!"
70003010-174 = "Wow... That cheap? Should I get one?"
70003010-175 = "R-Right? Especially if it prevents bullet jamming... That's pretty amazing."
70003010-179 = "Ah, ma'am! You touch it, then you buy it!"
70003010-180 = "Wh-What? I was just curious what it felt like..."
70003010-181 = "This is a special product from the Millennium Pseudoscience Club! It instantly imprints on the first person that touches it!"
70003010-182 = "B-But..."
70003010-183 = "*sigh* I guess I have no choice."
70003010-185 = "I really don't normally do this, but just for you, okay? I'll offer you a very, very special discount!"
70003010-186 = "3,000 yen for a set of five! It's highway robbery!!"
70003010-188 = "Ah... I'd get two free then, right?"
70003010-189 = "I...I'd almost feel dumb if I DIDN'T get it."
70003010-190 = "Aw, heck, why not?!"
70003010-192 = "Just for this once, anyone in this cabin can take advantage of this special price!!"
70003010-193 = "On top of that, the first three customers will get a special lucky amulet that I managed to acquire from Hyakkiyako!"
70003010-194 = "I-I want one!"
70003010-195 = "Me too! Me too!!"
70003010-197 = "Cabin No. 6"
70003010-198 = "Excuse me!! Please don't climb into the overhead storage! Come down immediately!"
70003010-199 = "Huuuh? I'm trying to find a comfortable position to lay down in!"
70003010-200 = "Please get down! It's dangerous if you stay up there."
70003010-204 = "Hey, hey! There's nowhere to sit! Isn't it your fault for not having seats?"
70003010-205 = "Huh?"
70003010-206 = "Excuse me, can I see your ticket please?"
70003010-207 = "What's that? Why do I need a ticket to get on the train?"
70003010-212 = "Pardon me, but you need to get off at the next station!!"
70003010-213 = "What? Who are you to tell me that?! I want to speak to a manager!"
70003010-215 = "Cabin No. 4"
70003010-216 = "*pant* *pant*...Is it this one?"
70003010-217 = "It's them! They're blocking the path, playing mahjong! It's inconveniencing the rest of us!"
70003010-218 = "Oh, an employee! Perfect time! Join us! Someone just left the game!"
70003010-219 = "Huh? Wait, what is...?"
70003010-220 = "We don't have enough people! Come on, and sit down!"
70003010-221 = "I-I don't even know the rules...! Wait, more importantly, you can't play mahjong here!"
70003010-222 = "Heeheehee. We'll teach you, so sit down!!"
70003010-225 = "Y-Yes! Highlander locomotive driver here!"
70003010-226 = "Support?! Where...?"
70003010-230 = "Huh?! Every single cabin...?!"

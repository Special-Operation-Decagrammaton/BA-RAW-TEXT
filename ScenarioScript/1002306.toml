1002306-3 = "3;이오리 수영복ND;02;뭐하고 있는 거야?\n#3;a\n#3;em;[?]"
1002306-4 = "[s1] \"보시는 대로.\"\n[s2] \"모래 찜질을 하고 있어.\""
1002306-5 = "3;이오리 수영복ND;06;……어휴.\n#3;stiff\n#3;em;[땀]"
1002306-6 = "3;이오리 수영복ND;06;……어휴.\n#3;stiff\n#3;em;[땀]"
1002306-7 = "3;이오리 수영복ND;02;나는 선생님이 모래사장에 누워 있다기에 분명 지나가는 학생들의 치마 속을 들여다보기 위해 뭔가 꿍꿍이를 꾸미고 있다고 생각했는데……."
1002306-8 = "3;이오리 수영복ND;01;평범하게 모래찜질을 하고 있었다니, 다른 의미로 안심했어."
1002306-9 = "[s3] \"나를 그동안 어떻게 생각하고 있었던 거야?\"\n[s4] \"애초에 수영복에는 들여다 볼 치마가 없잖아!\""
1002306-10 = "3;이오리 수영복ND;02;생각해보니 그렇네. 이 근처에는 수영복 차림의 학생들만 오고 가니까.\n#3;em;[반응]"
1002306-11 = "3;이오리 수영복ND;02;생각해보니 그렇네. 이 근처에는 수영복 차림의 학생들만 오고 가니까.\n#3;em;[반응]"
1002306-12 = "3;이오리 수영복ND;05;……그래도 수상한 건 마찬가지야."
1002306-13 = "3;이오리 수영복ND;05;이렇게 더운 날씨에 달궈진 모래 속에 들어가 있다니……"
1002306-14 = "3;이오리 수영복ND;02;혹시 선생님은 고통받는 걸 즐기는 변태야?\n#3;em;[?]"
1002306-15 = "[s] \"이오리도 한 번 해볼래?\""
1002306-16 = "3;이오리 수영복ND;05;싫어. 뜨거운 모래가 맨살에 닿기만 해도 아플 것 같단 말이야.\n#3;em;[반응]"
1002306-17 = "[s5] \"생각만큼 뜨겁지는 않아.\"\n[s6] \"오히려 모래 안에 있으면 시원해.\""
1002306-18 = "3;이오리 수영복ND;02;뭔가 수상한데……."
1002306-19 = "3;이오리 수영복ND;02;뭔가 수상한데……."
1002306-20 = "3;이오리 수영복ND;01;하지만 선생님의 표정을 보아하니 고통을 참고 있는 것처럼 보이지는 않고……."
1002306-21 = "3;이오리 수영복ND;99;뭐, 잠깐이라면 괜찮겠지.\n#3;em;…"

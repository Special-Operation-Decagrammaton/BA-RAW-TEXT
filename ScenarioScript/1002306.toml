[translation]
1002306-1 = "沙浴"
1002306-3 = "你在做什麼？"
1002306-4 = "[s1] 「如你所見」\n[s2] 「我在享受沙浴。」"
1002306-5 = "……唉。"
1002306-6 = "……唉。"
1002306-7 = "我本來以為老師說要躺在沙灘上，是為了偷看路過學生的裙底……"
1002306-8 = "結果只是在做沙浴啊，一放心突然覺得好不自在。"
1002306-9 = "[s3] 「你到底是怎麼看我的？」 \n[s4] 「何況大家幾乎都穿泳裝，沒有裙子可以偷窺吧！」"
1002306-10 = "仔細想想也確實，這附近幾乎只有穿泳裝的學生。"
1002306-11 = "仔細想想也確實，這附近幾乎只有穿泳裝的學生。"
1002306-12 = "但話又說回來……"
1002306-13 = "這麼熱的天氣竟然還把自己埋進沙子裡動彈不得……"
1002306-14 = "老師該不會是喜歡痛苦的變態吧？"
1002306-15 = "[s] 「伊織要不要試試看呢？試過一次應該就能體會我的感受唷？」"
1002306-16 = "我不要。刻意讓全身被熱沙包覆，感覺就會燙傷。"
1002306-17 = "[s5] 「其實沒有想像中的燙。」\n[s6] 「反而這樣待在沙子還比較涼爽。」"
1002306-18 = "真的假的……？怪可疑的……"
1002306-19 = "真的假的……？怪可疑的……"
1002306-20 = "但從老師的表情來看，的確不像是在忍受疼痛的樣子……"
1002306-21 = "那我稍微試試看吧……"
1002306-22 = "[s] 「好，那請躺在這邊。」"
1002306-28 = "[ns] 把沙子慢慢鋪在伊織身上"
1002306-30 = "唔，有點癢……#n哦？真的耶，沒有想像中的燙。"
1002306-31 = "而且因為沙子擋住了太陽光直射……反而會覺得涼爽。"
1002306-32 = "[s] 「就這樣直接睡午覺會更享受唷。」"
1002306-33 = "確實是個誘人的提議，但那可不行。#n堂堂風紀委員如果在沙灘上睡午覺，可沒辦法給其他學生做榜樣。"
1002306-34 = "話說原本待在大熱天底下就很耗體力了，加上我這幾天都忙到很晚睡眠不足……"
1002306-35 = "再不出來可就糟……了……"
1002306-36 = "………"
1002306-38 = "嗯，呼啊～……奇怪？我睡著了嗎……？"
1002306-39 = "啊～沙子的觸感實在太舒服，不知不覺就睡著了……"
1002306-40 = "必須趁別人看見之前快起來……"
1002306-45 = "……！怎，怎麼回事！？身體無法動彈……！？"
1002306-46 = "而且總覺得……身體明顯受到比剛才更大的壓迫感……"
1002306-52 = "這　是　什　麼　鬼　啊　？！"
1002306-54 = "[ns] 「啊，醒來了嗎？早安。」"
1002306-55 = "早，早安……個頭啊！老師你到底在我身體上面搞這什麼東西！？"
1002306-56 = "[s7] 「很漂亮吧？誇我誇我。」\n[s8] 「這很難做呢。」"
1002306-57 = "誰問你那種東西了！你趁人家睡覺的時候，搞這什麼沒節操的惡作劇！"
1002306-58 = "誰問你那種東西了！你趁人家睡覺的時候，搞這什麼沒節操的惡作劇！"
1002306-60 = "呃呃……！而且，這不就是個沙雕嗎，怎麼會這麼硬……！？"
1002306-61 = "[s] 「為了讓它不被輕易破壞，我加了一點水泥。」"
1002306-62 = "哈啊！？水泥！？你這已經不是惡作劇的範疇了！？"
1002306-63 = "為什麼要做這種事……！"
1002306-64 = "[s] 「好不容易才做好的，被弄壞會很可惜呀……」"
1002306-65 = "跟小孩子一樣的動機！？而且為什麼要把那種東西弄在我身上啊！"
1002306-66 = "可惡……！得找個手榴彈或槍……！？"
1002306-67 = "[s] 拿起手機拍下伊織的照片"
1002306-74 = "你，你幹什麼！夠了！"
1002306-76 = "不准拍！我叫你不准拍！"
1002306-77 = "呃呃……你給我記住！等我離開這裡！我絕不會放過你！"
1002306-79 = "（看著伊織掙扎了好一會才弄壞沙雕協助他脫身）"
1002306-84 = "（……並吃了伊織相當認真的一拳）"

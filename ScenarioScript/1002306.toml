[translation]
1002306-1 = "Buried in the Sand"
1002306-3 = "What are you doing?"
1002306-4 = "[s1] \"Exactly what it looks like.\"\n[s2] \"I'm taking a sand bath.\""
1002306-5 = "*sigh*"
1002306-6 = "*sigh*"
1002306-7 = "I expected you to be scheming up ways to look up girls' skirts when I heard you were lying around on the beach."
1002306-8 = "It's a relief to see you're doing something normal for once."

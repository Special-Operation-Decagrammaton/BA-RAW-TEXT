[translation]
1002306-1 = "การอบทรายร้อน"
1002306-3 = "กำลังทำอะไรอยู่น่ะ?"
1002306-4 = "[s1] \"ก็อย่างที่เห็นไง\"\n[s2] \"อบทรายร้อนอยู่\""
1002306-5 = "งั้นเหรอ...?"
1002306-6 = "งั้นเหรอ...?"
1002306-7 = "ฉันก็นึกว่าครูมานอนบนหาดทรายเพื่อวางแผนแอบดูใต้กระโปรงของเด็กนักเรียนที่เดินผ่าน#nไปมาซะอีก..."
1002306-8 = "แต่ถ้าแค่อบทรายร้อนอยู่แบบนี้ก็ค่อยโล่งใจหน่อย"
1002306-9 = "[s3] \"ที่ผ่านมาคิดว่าครูเป็นคนยังไงน่ะ?\"\n[s4] \"คนที่นี่ใส่ชุดว่ายน้ำกันหมด จะให้ไปดูใต้กระโปรงทำไมล่ะ!\""
1002306-10 = "มาคิดๆ ดูแล้ว ที่นี่มีแต่เด็กนักเรียนใส่ชุดว่ายน้ำนี่นา"
1002306-11 = "จริงด้วยแฮะ ที่นี่มีแต่เด็กนักเรียนใส่ชุดว่ายน้ำนี่นา"
1002306-12 = "แต่ยังไงมันก็น่าสงสัยอยู่ดีนั่นแหละ"
1002306-13 = "ก็มาอยู่ในทรายร้อนๆ ท่ามกลางอากาศร้อนอบอ้าวทำไมล่ะ..."
1002306-14 = "อย่าบอกนะว่าคุณครูคือโรคจิตที่ชอบความเจ็บปวด?"
1002306-15 = "[s] \"อิโอริก็ลองดูบ้างมั้ยล่ะ?\""
1002306-16 = "ไม่เอาหรอก แค่คิดว่าผิวต้องโดนทรายร้อนๆ ก็แสบแล้ว"
1002306-17 = "[s5] \"ไม่แสบอย่างที่คิดหรอก\"\n[s6] \"พออยู่ในทรายมันกลับเย็นด้วยซ้ำนะ\""
1002306-18 = "น่าแปลกอีกแล้วนะ..."
1002306-19 = "น่าแปลกอีกแล้วนะ..."
1002306-20 = "แต่ดูสีหน้าคุณครูแล้วก็ไม่เหมือนว่ากำลังอดทนต่อความเจ็บปวดอยู่เลย"
1002306-21 = "ลองดูสักหน่อยคงไม่เป็นไรหรอกเนอะ?"
1002306-22 = "[s] \"งั้นก็มานอนตรงนี้สิ\""
1002306-28 = "[ns] เอาทรายกลบตัวอิโอริ"
1002306-30 = "เอ๋? จริงด้วยแฮะ ไม่แสบอย่างที่คิดเลย"
1002306-31 = "ทรายที่อยู่บนตัวช่วยบังรังสีตรงจากดวงอาทิตย์... ก็เลยไม่ร้อนแถมยังเย็นอีกด้วย"
1002306-32 = "[s] \"นอนกลางวันทั้งแบบนี้ก็ทำให้อารมณ์ดีนะ\""
1002306-33 = "ทำแบบนั้นไม่ได้หรอก ถ้าคณะกรรมการวินัยมานอนกลางวันบนหาดทราย นักเรียนคนอื่นจะคิดยังไง?"
1002306-34 = "อืม... แต่ร่างกายก็ล้า แถมยังง่วงๆ แล้วด้วย..."
1002306-35 = "จะว่าไป เมื่อคืนก็โหมทำงานดึกดื่นจนนอนไม่พอด้วย..."
1002306-36 = "......"
1002306-38 = "หืม...? ฉันเผลอหลับไปตอนไหนเนี่ย?"
1002306-39 = "ทรายที่เย็นสบายทำให้ฉันรู้สึกผ่อนคลายจนเผลอหลับไปซะได้..."
1002306-40 = "ต้องรีบลุกขึ้นก่อนใครจะเห็น..."
1002306-45 = ".....?! เกิดอะไรขึ้นน่ะ? ทำไมขยับตัวไม่ได้!?"
1002306-46 = "แถมยังรู้สึกเหมือนมีก้อนหินหนักๆ มาทับตัวมากกว่าจะเป็นทรายอีก..."
1002306-52 = "อะ ไร กัน เนี้ย!"
1002306-54 = "[ns] \"อ้าว ตื่นแล้วเหรอ?\""
1002306-55 = "คุณครู! มาทำอะไรไว้บนตัวฉันเนี่ย?"
1002306-56 = "[s7] \"สวยใช่มั้ยล่ะ?\"\n[s8] \"งานละเอียดเลยล่ะ\""
1002306-57 = "ไม่ได้ถามว่าสวยมั้ยสักหน่อย! ทำอะไรสกปรกในตอนที่คนอื่นนอนหลับอยู่น่ะ!?"
1002306-58 = "ไม่ได้ถามว่าสวยมั้ยสักหน่อย! ทำอะไรสกปรกในตอนที่คนอื่นนอนหลับอยู่น่ะ!?"
1002306-60 = "อึ้ก... รูปปั้นทรายอะไรนี่ ทำไมมันถึงไม่พังล่ะ?!"
1002306-61 = "[s] \"ครูใช้ทรายผสมปูนซีเมนต์น่ะ จะได้ไม่พังง่ายๆ\""
1002306-62 = "ผงปูนซีเมนต์เหรอ? นั่นมันของที่เอาไว้เล่นสนุกหรือไง?!"
1002306-63 = "เอามาผสมกับทรายเล่นแบบนี้ทำไมน่ะ!"
1002306-64 = "[s] \"ก็ไม่อยากให้รูปปั้นพังนี่นา...\""
1002306-65 = "จะทำรูปปั้นก็ไปทำที่อื่นสิ ไม่ใช่บนตัวคนแบบนี้!"
1002306-66 = "อึ่ก... โธ่เอ๊ย! ถ้ามีระเบิดอยู่แถวๆ นี้ล่ะก็..."
1002306-67 = "[s] หยิบโทรศัพท์มือถือขึ้นมาถ่ายรูปอิโอริ"
1002306-74 = "ทะ...ทำอะไรน่ะ?! หยุดเลยนะ!"
1002306-76 = "ห้ามถ่าย! บอกว่าห้ามถ่ายไง!"
1002306-77 = "อึ่ก... อย่าให้ฉันออกจากตรงนี้ไปได้นะ! ฉันไม่ปล่อยเอาไว้แน่!!"
1002306-79 = "(คุณครูนั่งดูอิโอริที่พยายามดิ้นออกมาอยู่ครู่หนึ่งแล้วจึงค่อยช่วยดึงเธอออกมา)"
1002306-84 = "(แล้วก็โดนอิโอริต่อยทันทีที่ออกมาจากรูปปั้นทรายได้...)"

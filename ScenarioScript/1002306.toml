1002306-16 = "No, thanks. Stepping on hot sand is enough for me."
1002306-17 = "[s5] \"You'd be surprised. It's not as hot as you think.\"\n[s6] \"It's actually cooler when you're under the sand.\""
1002306-18 = "Something feels off about this..."
1002306-19 = "Something feels off about this..."
1002306-20 = "...but I suppose you don't seem to be in pain or look overheated."
1002306-21 = "I guess it would be fine to try for just a little while."

1002306-36 = "..."
1002306-38 = "Huh? When did I fall asleep?"
1002306-39 = "Being under the cool sand was so relaxing that I fell asleep without even trying."
1002306-40 = "I better get up before someone sees."
1002306-45 = "What's going on?! I can't move at all!"
1002306-46 = "I was only covered in sand. Why does the lower half of my body feel like it's buried under rubble?!"
1002306-52 = "What. The. Hell. Is. THIS?!"
1002306-54 = "[ns] \"Oh, are you up?\""
1002306-55 = "Sensei! What in the world did you do to me?!"
1002306-56 = "[s7] \"It's pretty isn't it?\"\n[s8] \"It wasn't easy getting all the fine details right.\""

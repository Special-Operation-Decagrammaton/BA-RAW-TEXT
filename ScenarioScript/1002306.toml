1002306-30 = "3;이오리 수영복ND;04;……어라? 정말이네. 생각만큼 뜨겁지 않아.\n#3;stiff\n#3;em;[땀]\n#3;closeup"
1002306-31 = "3;이오리 수영복ND;07;몸 위에 덮힌 모래가 태양의 직사광선을 막아줘서…… 오히려 시원한 느낌이야\n#3;closeup"
1002306-32 = "[s] \"그대로 낮잠을 자도 기분 좋다고.\""
1002306-33 = "3;이오리 수영복ND;02;그럴 수는 없어. 선도부원이 대놓고 모래사장에서 낮잠을 자고 있다면 다른 학생들이 뭐라고 생각하겠어?\n#3;em;[반응]\n#3;closeup"

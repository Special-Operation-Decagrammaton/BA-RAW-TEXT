1002306-10 = "I suppose you have a point. Everyone would be wearing bathing suits here..."
1002306-11 = "I suppose you have a point. Everyone would be wearing bathing suits here..."
1002306-12 = "...but that doesn't make you any less suspicious."
1002306-13 = "Seriously, burying yourself in sand on a scorching hot day like this."
1002306-14 = "Are you some kind of masochist?"

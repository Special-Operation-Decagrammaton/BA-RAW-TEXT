32150-55 = "3;나기사;05;……."
32150-56 = "5;하나코;06;보충수업부 얘기예요. 나기사 씨의 걱정은 알겠지만, 이런 식으로 <샬레>까지 동원해서 편법을 쓸 필요까진 없었잖아요."
32150-57 = "3;나기사;04;……. 그건."
32150-58 = "5;하나코;05;처음부터 수상쩍었던 저나 아즈사 쨩은 그렇다고 해도…… 히후미 쨩과 코하루 쨩은 너무했다고 생각하지 않나요?\n#5;em;[?]"

[translation]
32150-1 = "Episode 15;Lighting the Fuse"
32150-6 = "Squad IV confirming arrival."
32150-7 = "Conditions as expected. No additional security spotted."
32150-11 = "Units V, VI, and VII are all on standby."
32150-12 = "Target's location confirmed. Operation will proceed as scheduled."
32150-13 = "Move out."
32150-20 = "*sigh*"
32150-24 = "No. I've had my fill of tea."
32150-29 = "Huh?"
32150-30 = "Having trouble sleeping?"
32150-31 = "...?!"
32150-37 = "You must be anxious. Understandable, since you had the entire Justice Task Force deployed away from here."
32150-38 = "U-Urawa Hanako?! What are you doing here?"
32150-39 = "Are you asking how I knew you'd be at this particular safe house? That's because I know the rotation order of all 87 panic rooms used by the Tea Party."
32150-40 = "...?!"
32150-41 = "I also know about the measures that fall just outside of the regulations too—like how you like to hide in this secret penthouse of yours when you're especially nervous."
32150-42 = "Wh-What is the meaning of this?!"
32150-46 = "Don't move. "
32150-47 = "...!"
32150-48 = "By the way, we already met your minimal security detail on our way here. They're going to be indisposed for a little while."
32150-49 = "Both Urawa Hanako and Shirasu Azusa. It couldn't be..."
32150-50 = "To think there wasn't just one traitor, but two."
32150-51 = "No, not quite. Besides, Azusa and I are just the meeting party. Someone else here is calling the shots."
32150-52 = "...!"
32150-53 = "Who?! I demand to know who it is!"
32150-54 = "Answer my question first. Did you truly need to go this far, Nagisa?"
32150-55 = "..."
32150-56 = "I'm referring to how you've handled our club. I understand why you would be so concerned, but did you really need to involve Schale and its authority as well?"
32150-57 = "Well...."
32150-58 = "I can even see why you would find Azusa and myself to be so suspicious, but why cast doubt on someone like Hifumi too? Why involve an innocent bystander like Koharu?"
32150-59 = "..."
32150-60 = "Especially Hifumi. She thought you were her friend."
32150-61 = "How could you be so cruel? Did you ever consider how much it would hurt her?!"
32150-62 = "..."
32150-63 = "I recognize what I put Hifumi through wasn't right, even if I had the greater good in mind."
32150-64 = "Part of me hoped we could still be friends when all of this was over...but I have no regrets."
32150-65 = "Heehee. ♥"
32150-66 = "Then I should deliver a message to you from our commander."
32150-68 = "She says, \"It was a funny fantasy, thinking we were ever really friends.\""
32150-69 = "What? Then the one leading you is...?"
32150-74 = "Target secured."
32150-75 = "She took an entire 5.56mm round magazine point blank. She'll be out for at least another hour."
32150-76 = "Excellent work, Azusa. Would you mind playing decoy from here on like we planned?"
32150-77 = "Understood. This should allow the false intel to reach Trinity's true traitor."
32150-78 = "Arius will have no choice but to hasten their attack if your theory is correct."
32150-79 = "That's right. There are some questions still to be answered..."
32150-80 = "...but I'm convinced that there really is a traitor, at the very least."
32150-81 = "By the way. Was the last thing you said to her really necessary?"
32150-82 = "Oh, that was just my little way of repaying Hifumi. Nagisa had that one coming."
32150-83 = "Besides, I'm sure that little misunderstanding will be cleared up sooner or later. ♥"
32150-84 = "..."
32150-85 = "Never mind that. Can you tell me how many soldiers Arius will be sending? Will you be able to hold them off by yourself?"
32150-86 = "I don't know the exact number, but I've been preparing for this."
32150-87 = "I set traps and dug trenches around the academy every night. I'll lure them there and use the terrain to my advantage to buy time."
32150-88 = "I'll meet you at the rendezvous point."
32150-89 = "All right. See you soon! "
32150-95 = "Panic room clear! Target not found!"
32150-96 = "Someone else has been here. The intel was credible."
32150-97 = "Search the perimeter! Make sure not to be seen! "
32150-98 = "Where is the spy we were supposed to make contact with?! We need an update!"
32150-99 = "This is Unit IV! I-It's an ambush!"
32150-100 = "What?!"
32150-103 = "Our contact! We've been had!"
32150-104 = "*huff puff*"
32150-106 = "Ahhhhhh!"
32150-107 = "Wh-What's happening?! The spy betrayed us?!"
32150-112 = "Yes. I have."
32150-113 = "...?!"
32150-114 = "Your target has been intercepted."
32150-115 = "Wh-Why?! Why would you do something like this?!"
32150-116 = "Because I have an exam to take in a few hours."
32150-117 = "Huh?!"
32150-118 = "Also, the Justice Task Force has been informed of the situation. If you're going to retreat, I would suggest you do it now."
32150-119 = "*click*"
32150-120 = "..."
32150-121 = "What are we going to do? Should we retreat?"
32150-122 = "No, she's bluffing. According to the intel we received, the Justice Task Force won't be going anywhere."
32150-123 = "It's psychological warfare. She wants us to retreat. Chase after her!"
32150-124 = "Yes!"
32150-126 = "Next Episode;A Fearsome Clash"

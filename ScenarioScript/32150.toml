32150-50 = "3;나기사;06;<배신자>는 한 명이 아니라 두 명이었다는……?"
32150-51 = "5;하나코;01;……후후후후♡ 단순하네요. 저도, 아즈사 쨩도 한낱 장기말에 불과해요. 진짜 우리들을 지휘하는 분은 따로 있거든요."

[translation]
32150-1 = "ตอนที่ 15;เริ่มบุกรุก"
32150-6 = "ทีม IV... ถึงแล้ว"
32150-7 = "ไม่พบการป้องกันอะไร"
32150-11 = "ทีม V ทีม VI และทีม VIII แจ้งว่าสแตนด์บายพร้อมแล้วค่ะ"
32150-12 = "ยืนยันตำแหน่งเป้าหมาย เริ่มยุทธศาสตร์ตามแผน"
32150-13 = "ทุกคนเคลื่อนไหวได้"
32150-20 = "เฮ้อ..."
32150-24 = "ไม่เอาค่ะ... ฉันไม่เอาชาแดงแล้วค่ะ"
32150-29 = "หืม...?"
32150-30 = "นอนไม่หลับสินะคะ"
32150-31 = "?!"
32150-37 = "ไม่สบายใจเพราะส่งชมรมทวงความยุติธรรมไปนอกโรงเรียนหมดเลยใช่ไหมคะ... คุณนางิสะ?"
32150-38 = "คะ... คุณอุราวะ ฮานาโกะ?! ทะ... ทำไมถึง...?!"
32150-39 = "ทำไมถึงรู้ว่ามีห้องนิรภัยนี้เหรอคะ? ฉันรู้ลำดับการหมุนเวียนห้องนิรภัยทั้ง 87 ห้องของสภาน้ำชาหมดแหละค่ะ... ฮุฮุ♡"
32150-40 = "...?!"
32150-41 = "แล้วก็พอรู้ด้วยค่ะว่ามันถูกใช้งานอย่างไม่ถูกกฎเกณฑ์อย่างไรบ้าง แถมยังรู้ด้วยว่า#nหากไม่สบายใจมากๆ อย่างตอนนี้ก็จะมาซ่อนตัวอยู่ในที่ลับห้องใต้หลังคานี้♡"
32150-42 = "ยะ...หยุดนะ!!"
32150-46 = "อย่าขยับ "
32150-47 = "...!!"
32150-48 = "อ้อ เรากำจัดบอดี้การ์ดที่อยู่แถวนี้ทุกคนแล้วล่ะค่ะ ฉันก็เลยมาแสดงตัวแบบนี้ได้ยังไงล่ะคะ"
32150-49 = "ชิราสึ อาซึสะ... คุณอุราวะ ฮานาโกะ... อย่าบอกนะว่า..."
32150-50 = "<คนทรยศ> ไม่ได้มีคนเดียว แต่มีสองคน...?"
32150-51 = "ฮุฮุฮุฮุ♡ ง่ายจังเลยนะคะ ทั้งฉันและอาซึสะจังเป็นเพียงแค่หุ่นเชิดเท่านั้น#nเพราะมีคนที่สั่งการพวกเราอยู่ต่างหากน่ะค่ะ"
32150-52 = "...!!"
32150-53 = "เอ่อ... แล้วคนนั้น... คือใครเหรอคะ?!"
32150-54 = "... อืม... แต่ว่าคุณนางิสะคะ จำเป็นต้องทำถึงขนาดนี้เลยเหรอคะ?"
32150-55 = "......."
32150-56 = "ฉันหมายถึงชมรมชั้นเรียนเสริมน่ะค่ะ ฉันรู้ถึงความกังวลของคุณนางิสะนะคะ#nแต่มันก็ไม่เห็นจะต้องดึง <ชาเล่ต์> เข้ามาใช้ง่ายๆ แบบนี้เลยนี่คะ?"
32150-57 = "เรื่องนั้นมัน... "
32150-58 = "ถึงจะส่งฉันกับอาซึสะจังเข้าชมรมชั้นเรียนเสริมเพราะความสงสัยก็เถอะค่ะ#nแต่กับฮิฟุมิจังและโคฮารุจังแล้ว ไม่คิดว่ามันเกินไปหน่อยเหรอคะ?"
32150-59 = "......."
32150-60 = "โดยเฉพาะฮิฟุมิจัง... เธอเป็นคนที่สนิทกับคุณนางิสะเลยนะคะ"
32150-61 = "ทำไมถึงได้โหดร้ายอะไรขนาดนั้นเหรอคะ? ไม่เคยคิดถึงบาดแผลที่ฮิฟุมิจังจะได้รับบ้างเลยเหรอคะ?"
32150-62 = "......."
32150-63 = "ค่ะ... เพื่อความเที่ยงธรรมแล้ว... ฉันไม่ควรทำอย่างนั้นกับคุณฮิฟุมิ..."
32150-64 = "ฉันไม่เสียใจกับสิ่งที่ได้ทำไปหรอกค่ะ แต่ฉันก็อยากจะรักษามิตรภาพกับเธอไว้จนถึงที่สุด... ฉันน่ะ..."
32150-65 = "...ฮุฮุฮุฮุ♡"
32150-66 = "งั้นพวกเราจะส่งสารที่ผู้สั่งการของเราฝากมาให้คุณนางิสะแล้วกันค่ะ"
32150-68 = "ผู้สั่งการฝากมาบอกว่า 'อ่ะฮ่ะฮ่า... ฉันนึกว่ามิตรภาพของเราจะเป็นของจริงซะอีกค่ะ... ตลกดีเหมือนกันนะคะ' ♡"
32150-69 = "คะ...?!  ยะ... อย่าบอกนะว่า... ถ้างั้น...?!"
32150-74 = "ได้ตัวเป้าหมายแล้ว ตอนนี้กำลังพรางตัวแล้วพาไปสนามสังหาร"
32150-75 = "คาดว่าจะสลบไป 1 ชั่วโมงเพราะถูกกระสุนขนาด 5.56 มม. ยิงในระยะใกล้จนหมดแม็ก"
32150-76 = "ฮุฮุฮุ♡ ดีเลยค่ะ จากนี้อาซึสะจังก็ล่อพวกศัตรูไปตามแผนการได้เลยค่ะ"
32150-77 = "อืม... ฉันเข้าใจการรั่วไหลข้อมูลเท็จให้กับ <คนทรยศในทรีนิตี้ตัวจริง> ที่ยังคงอยู่ที่ไหนสักแห่งแล้วล่ะ"
32150-78 = "และหากฉันคิดถูก อาเรียสก็คงไม่มีทางเลือกนอกจากรีบโจมตี"
32150-79 = "อื้ม ใช่ค่ะอาซึสะจัง ตามการคาดเดาของฉันแล้ว ยังมีบางอย่างที่ยังไม่ถูกสะสางค่ะ..."
32150-80 = "ถึงจะยังไม่มีหลักฐานของการมีอยู่ของ <คนทรยศตัวจริง> แต่ฉันก็ค่อนข้างมั่นใจว่ามีอยู่จริงค่ะ..."
32150-81 = "จะว่าไป ทำไมถึงต้องพูดประโยคสุดท้ายแบบนั้นด้วยล่ะ?"
32150-82 = "อ่อ... เรื่องนั้น... ฉันอยากจะโมโหใส่คุณนางิสะ... จะเรียกว่าเป็นการแก้แค้น ตามอำเภอใจของฉันก็ได้ค่ะ..."
32150-83 = "แต่เรื่องเข้าใจผิดเดี๋ยวก็คลี่คลายได้ค่ะ♡"
32150-84 = "......."
32150-85 = "อะ... อาซึสะจัง... กองกำลังของอาเรียสมีแค่ไหนเหรอคะ?#nคิดว่าจะรับมือคนเดียวได้นานแค่ไหนคะ?"
32150-86 = "ฉันเองก็ไม่รู้ว่ามากันเท่าไหร่ แต่ก็เตรียมตั้งรับมาตั้งนานแล้ว คงถ่วงเวลาได้อยู่"
32150-87 = "เพราะฉันไปวางกับดักและขุดสนามเพลาะไว้รอบๆ โรงเรียนอยู่ทุกคืนเลย#nฉันจะซื้อเวลาโดยการหลอกล่อพวกนั้นไปทางนั้นแล้วรบแบบซุ่มโจมตีให้"
32150-88 = "ส่วนจุดนัดพบคือสนามสังหาร"
32150-89 = "ค่ะ! งั้นเราแยกกันตรงนี้นะคะ! "
32150-95 = "เคลียร์ห้องนิรภัย! ไม่เห็นเป้าหมายเลยค่ะ!"
32150-96 = "มีคนมาที่นี่ก่อนหน้านี้... คงจะจริงที่บอกว่ามีหน่วยข่าวกรอง "
32150-97 = "ไปค้นหารอบๆ! อย่าก่อความวุ่นวายมากนักล่ะ! "
32150-98 = "<สายลับ> ที่จะติดต่อด้วยอยู่ที่ไหน?! เราต้องการความช่วยเหลือจากเขานะ!"
32150-99 = "นี่คือทีม IV! เกิดการซุ่มโจมตี!"
32150-100 = "อะไรนะ?"
32150-103 = "<สายลับ> ค่ะ! ทะ.. ทรยศงั้นเหรอ? <สายลับ> ทรยศพวกเราค่ะ!"
32150-104 = "(แฮ่ก แฮ่ก)"
32150-106 = "อ๊ากกกกก!!"
32150-107 = "เกิดเรื่องอะไรขึ้นเนี่ย...!! <สายลับ> ทรยศเรางั้นเหรอ...?"
32150-112 = "อืม ถูกต้อง"
32150-113 = "?!"
32150-114 = "ฉันแย่งเป้าหมายมาแล้ว"
32150-115 = "ฮะ? ว่าไงนะ?!! ทำไมถึงทำแบบนี้?!"
32150-116 = "พอดีต้องจัดการเรื่องนี้ให้ไวๆ แล้วไปสอบน่ะ"
32150-117 = "ว่าไงนะ...?"
32150-118 = "อ้อ ฉันรายงานสถานการณ์ให้ชมรมทวงความยุติธรรมรู้แล้วล่ะ ถ้าจะหนีก็มีเวลาแค่ตอนนี้เท่านั้น"
32150-119 = "(แกรก)"
32150-120 = "......."
32150-121 = "เอายังไงดีคะ? ถอยก่อนไหมคะ?"
32150-122 = "ไม่ นี่มันเป็นการบลัฟ ข่าวกรองบอกเราว่าชมรมทวงความยุติธรรมจะไม่เคลื่อนไหวเด็ดขาด"
32150-123 = "นี่คือสงครามประสาทที่จะทำให้เราล่าถอย ไล่ตามไปเลย!"
32150-124 = "ค่ะ!"
32150-126 = "ตอนต่อไป;การทะเลาะอย่างรุนแรง"

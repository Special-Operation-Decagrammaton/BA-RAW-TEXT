[translation]
32150-1 = "第15話;火蓋は切られて"
32150-6 = "……チームIV、到着。"
32150-7 = "特段変わった様子は無し、警戒も予想通り。"
32150-11 = "チームV、チームVI、チームVIII、全て準備完了とのことです。"
32150-12 = "ターゲットの位置は確認済み。予定通り作戦を開始する。"
32150-13 = "総員、前へ。"
32150-20 = "……ふぅ。"
32150-24 = "……紅茶でしたらもう結構です。"
32150-29 = "……？"
32150-30 = "……可哀そうに、眠れないのですね。"
32150-31 = "っ！？"
32150-37 = "それもそうですよね、正義実現委員会がほとんど傍にいない状態……不安にもなりますよね、ナギサさん？"
32150-38 = "う、[ruby=うらわ]浦和[/ruby]ハナコさん……！？あなたがどうして、ここに……！？"
32150-39 = "それはこのセーフハウスをどうやって知ったのか、という意味ですか？それはもちろん、全て把握しているからですよ。合計87個のセーフハウス、そしてそのローテーションまで……ふふっ♡"
32150-40 = "……！？"
32150-41 = "変則的な運用もおおよそ把握しています。例えば……今のように心から不安な時は、ここの秘密の屋根裏部屋に隠れるということも♡"
32150-42 = "なっ……！"
32150-46 = "動くな。"
32150-47 = "……！"
32150-48 = "あぁ、もちろんここまでの間に警護の方々は全員片付けさせていただきました。だからこそこうやって堂々と来たわけですが。"
32150-49 = "[ruby=しらす]白洲[/ruby]アズサさん、[ruby=うらわ]浦和[/ruby]ハナコさん……まさか……！"
32150-50 = "「裏切り者」はひとりではなく、ふたり……！？"
32150-51 = "……ふふっ、単純な思考回路ですねぇ♡私もアズサちゃんも、ただの駒に過ぎませんよ。指揮官は別にいます。"
32150-52 = "……！！"
32150-53 = "それは、誰ですか……！"
32150-54 = "そのお話の前にナギサさん……ここまでやる必要、ありましたか？"
32150-55 = "……。"
32150-56 = "補習授業部のことです。ナギサさんの心労は、よく分かります。ですがこうして「シャーレ」まで動員して、何もここまでやる必要は無かったのではありませんか？"
32150-57 = "それは……。"
32150-58 = "最初から怪しかった私や、アズサちゃんは仕方ありません。ですが……ヒフミちゃんとコハルちゃんに対しては、あんまりだと思いませんか？"
32150-59 = "……。"
32150-60 = "特にヒフミちゃんは……ナギサさんと、仲が良かったじゃないですか。"
32150-61 = "どうしてこんなことをしてしまったのですか？ヒフミちゃんがどれだけ傷ついてしまうのか、考えなかったのですか？"
32150-62 = "……。"
32150-63 = "……そう、ですね。ヒフミさんには悪い事をしたかもしれません……。"
32150-64 = "ですが、後悔はしていません。全ては大義のため。確かに彼女との間柄だけは、守れればと思っていましたが……私は……。"
32150-65 = "……ふふっ♡"
32150-66 = "ではあらためて私たちの指揮官からナギサさんへ、メッセージをお伝えしますね。"
32150-68 = "「あはは……えっと、それなりに楽しかったですよ。ナギサ様とのお友達ごっこ」……とのことです♡"
32150-69 = "……っ！？ま、まさか、ということは……！？"
32150-74 = "目標を確保。"
32150-75 = "近距離で5.56mm弾を丸々一弾倉分当てたから、1時間くらいはこのまま気を失っているはず。"
32150-76 = "ふふっ♡ではアズサちゃん、ここからは敵の誘導をお願いできますか？"
32150-77 = "了解。これで、まだどこかにいる「本当のトリニティの裏切り者」に嘘の情報が流れるはず……？"
32150-78 = "そのハナコの仮説の通りであれば、確かにアリウスも襲撃を急ぐに違いない。"
32150-79 = "はい。私の推測通りなら、まだ分かっていないこともいくつかあるものの……。"
32150-80 = "まだはっきりした証拠は無い状態ですが……「本当の裏切り者」については、個人的にはほぼ確信がありますし。"
32150-81 = "……ところで、さっきの最後のあのセリフ、必要だった？"
32150-82 = "あぁ、あれはヒフミちゃんの頑張りの分、勝手な仕返しと言いますか……ちょっとくらいはショックを受けてもらおうかと。"
32150-83 = "まあ全てが終われば、すぐに誤解は解けるでしょう。"
32150-84 = "……。"
32150-85 = "ところでアズサちゃん、アリウスの兵力はどれぐらいか分かりますか？正確に言うと、ひとりでどれぐらい持つかを把握したいのですが。"
32150-86 = "詳細は分からない。けど備えはもうずいぶん前からしてきたから、どれほどの相手だったとしてもかなり時間は稼げるはず。"
32150-87 = "このために毎晩、学園の周辺にトラップやら塹壕やらを作っておいたから。そこに誘導しつつ、ゲリラ戦で時間を稼ぐ。"
32150-88 = "じゃあ、一旦ここで。後でまた、合流地点で会おう。"
32150-89 = "はい、また後ほど！"
32150-95 = "セーフハウスを発見！ターゲットは見当たりません！"
32150-96 = "……先客があったか。[ruby=・   ・   ・   ・]あの情報[/ruby]が本当だったとはな。"
32150-97 = "周辺を捜索しろ！できるだけ静かに！"
32150-98 = "合流するはずの「スパイ」はどこだ？！あいつを早く探せ！"
32150-99 = "こちらチームIV、奇襲に遭遇！"
32150-100 = "何っ！？"
32150-103 = "「スパイ」です！「スパイ」が裏切りました！"
32150-104 = "（シューッ、シューッ……）"
32150-106 = "うわあぁぁっ！？"
32150-107 = "「スパイ」が裏切っただと！？な、何が起きてるんだ！！"
32150-112 = "裏切り、それ以上でもそれ以下でもない。"
32150-113 = "！？"
32150-114 = "目標は私が先に貰った。"
32150-115 = "な、何故だ！どうしてそんなことを……！"
32150-116 = "早く終わらせて、試験を受けなきゃいけないから。"
32150-117 = "……え？"
32150-118 = "ちなみにもう正義実現委員会に報告は届いてる、逃げるなら今のうち。"
32150-119 = "（ピッ）"
32150-120 = "……。"
32150-121 = "……退却しますか？"
32150-122 = "いや、ブラフだ。[ruby=・]情[/ruby][ruby=・]報[/ruby]が正しければ、正義実現委員会は絶対に動かないはず。"
32150-123 = "気にすることは無い、行け！"
32150-124 = "了解！"
32150-126 = "次回;激戦"

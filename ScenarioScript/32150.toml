[translation]
32150-1 = "第15話;全面開戰"
32150-6 = "……小組Ⅳ到達現場。"
32150-7 = "沒有發現異常，警備也和預期的一樣。"
32150-11 = "小組Ⅴ、小組Ⅵ、小組Ⅷ，全員準備完畢。"
32150-12 = "目標位置已確認。依照預定計畫開始作戰。"
32150-13 = "所有人，向前。"
32150-20 = "……呼。"
32150-24 = "……紅茶的話已經夠了。"
32150-29 = "……嗯？"
32150-30 = "看來你似乎睡不著呢。"
32150-31 = "！？"
32150-37 = "這也難怪，實現正義部幾乎不在身邊的情況下……多少會不安的對吧，渚同學？"
32150-38 = "浦，浦和花子同學……！？你為什麼會在這裡……！？"
32150-39 = "你是指我怎麼會知道這個藏身處的意思嗎？#n那當然是因為我已經掌握了茶會共87個藏身處的位置，以及輪換的模式囉……呵呵♡"
32150-40 = "……！？"
32150-41 = "就連例外的情況我也大致了解。#n比方說……像現在這種打從感到心底不安的時候，就會選擇躲在這個屋頂的密室♡"
32150-42 = "什麼……！"
32150-46 = "不准動。"
32150-47 = "……！"
32150-48 = "啊，當然一路上的警衛我們也都收拾好了。所以才能這樣光明正大地進來。"
32150-49 = "白洲梓、浦和花子……難道說……"
32150-50 = "「叛徒」不是一個人，而是兩個人……！？"
32150-51 = "……呵呵，思考迴路真是單純呢♡我跟梓醬不過只是棋子而已。指揮官另有其人。"
32150-52 = "……！！"
32150-53 = "那個人到底是誰……！"
32150-54 = "在說這些之前，渚同學……真的有必要做到這個地步嗎？"
32150-55 = "……"
32150-56 = "我指的是補課部的事。#n渚同學的擔憂我能理解，但是竟然不惜動用「夏萊」……再怎麼說都沒必要這樣吧？"
32150-57 = "那是……"
32150-58 = "對一開始就很可疑的我或梓醬姑且不論……#n對日步美醬和小春醬做出這種事，你不覺得太過分了嗎？"
32150-59 = "……"
32150-60 = "尤其是日步美醬……他和渚同學不是很要好的嗎？"
32150-61 = "為什麼要做這種事呢？你有想過日步美醬會有多傷心嗎？"
32150-62 = "……"
32150-63 = "……嗯，我或許對日步美同學做了不對的事……"
32150-64 = "不過我並不後悔，這全都是為了大義。#n即便如此，我依舊很想維護與他之間的友誼……但是……"
32150-65 = "……呵呵♡"
32150-66 = "那麼我就來轉達一下我們的指揮官對渚同學的留言囉。"
32150-68 = "「啊哈哈……那個，其實還挺開心的唷。和渚大人裝朋友的遊戲」……就是這樣♡"
32150-69 = "……什麼！？難，難道，也就是說……！？"
32150-74 = "已確保目標，正在趕往現場。"
32150-75 = "因為近距離挨了一管5.56mm子彈，應該1小時內都不會醒過來吧。"
32150-76 = "呵呵♡那麼梓醬，接下來能麻煩你引誘敵人嗎？"
32150-77 = "我知道了。#n這麼一來就能向躲在某個地方的「三一真正的叛徒」傳達假的情報了吧……"
32150-78 = "如果花子的假設正確，奧利斯的襲擊應該會加快才對。"
32150-79 = "沒錯，梓醬。雖然我的推理還有一些地方不夠明確……"
32150-80 = "儘管還沒發現「真正的叛徒」存在的證據……#n他的存在對我而言幾乎已經能夠確信了。"
32150-81 = "話說回來，剛才最後那句台詞真的有必要嗎？"
32150-82 = "啊……其實硬要說的話，那只是我個人擅自進行的一點小小報復……#n因為實在想斥責一下渚同學……"
32150-83 = "反正一切結束之後，很快就能解開誤會了吧♡"
32150-84 = "……"
32150-85 = "話說梓醬，你對奧利斯的兵力了解到什麼程度呢？#n更準確來說，我想知道你一個人能夠牽制住多少兵力。"
32150-86 = "我知道的並不詳細。#n不過準備工作很久之前就已經開始了，應該能爭取不少時間才對。"
32150-87 = "我就是為了這個，才會每天晚上在學園周圍布置陷阱和戰壕。#n我會把敵人引誘到那裡，用游擊戰爭取時間。"
32150-88 = "之後在會合地點再見吧。"
32150-89 = "嗯，待會見！"
32150-95 = "發現藏身處！沒有發現目標！"
32150-96 = "……被人搶先一步了嗎。#n看來那個[ruby= ・     ・ ]情報[/ruby]確實沒錯。"
32150-97 = "快去搜索周圍！盡可能保持安靜！"
32150-98 = "應該要來會合的「間諜」在哪裡！？快把他找出來！"
32150-99 = "這裡是小隊Ⅳ，遭遇奇襲！"
32150-100 = "什麼！？"
32150-103 = "是「間諜」！「間諜」背叛了！"
32150-104 = "（呼，呼……）"
32150-106 = "嗚啊──！？"
32150-107 = "怎，怎麼回事……！！你說「間諜」背叛了……！？"
32150-112 = "沒錯，就是這樣。"
32150-113 = "！？"
32150-114 = "目標我已經收下了。"
32150-115 = "為，為什麼！為什麼要這麼做……！"
32150-116 = "因為得早點結束，趕快去考試才行。"
32150-117 = "……咦？"
32150-118 = "順帶一提，我已經跟實現正義部報告了，要逃就趁現在吧。"
32150-119 = "（嗶）"
32150-120 = "……"
32150-121 = "該怎麼做？要撤退嗎？"
32150-122 = "不，那是在虛張聲勢。#n如果[ruby= ・     ・ ]情報[/ruby]正確，實現正義部應該絕對不會出動才對。"
32150-123 = "那只是為了誘導我們撤退的心理戰而已，不用在意。#n立刻展開追擊！"
32150-124 = "了解！"
32150-126 = "下一話;激戰"

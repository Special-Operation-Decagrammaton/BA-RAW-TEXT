[translation]
10025070-1 = "ตอนที่ 7;คืนแห่งบาร์บีคิว"
10025070-5 = "เพราะแบบนี้..."
10025070-6 = "นักตกปลาน่าสงสัยคนนั้นก็เลยขอให้เธอสอนตกปลาเหรอมิยุ?"
10025070-7 = "นะ... น่าสงสัยอะไรกันล่ะ! ฉันไม่ใช่คนน่าสงสัยนะ!"
10025070-8 = "เป็นนักตกปลา แต่ไม่รู้วิธีตกปลาเนี่ยนะ แบบนี้น่าสงสัยชะมัด..."
10025070-9 = "เอ่อ คือว่าเรื่องนั้น......"
10025070-11 = "ฉันก็ไม่เคยเห็นเขาตกปลามาก่อนเลยด้วยเหมือนกัน..."
10025070-13 = "เรื่องนั้น... มันก็จริงอยู่หรอก..."
10025070-15 = "แถมเมื่อวานยังไปท่องจำคาถาแปลกๆ อะไรไม่รู้ที่ชายหาดอีก..."
10025070-17 = "..."
10025070-18 = "...คงปกปิดต่อไปไม่ได้แล้วสินะ"
10025070-19 = "ที่จริงแล้ว... ฉันไม่ใช่นักตกปลาหรอก ฉันคือโปรดิวเซอร์จากแชนแนลตกปลาในอินเทอร์เน็ตน่ะ"
10025070-20 = "พวกเธอเคยได้ยินแชนแนลชื่อ <หมีขาวตกปลา TV> ในอินเทอร์เน็ตกันไหมล่ะ?"
10025070-25 = "ไม่เคยได้ยินมาก่อนเลยค่ะ..."
10025070-31 = "ลองหาดูแล้ว มีคนกดติดตามประมาณ 1,000 คนเลยแฮะ"
10025070-32 = "... 1,000 คนนี่ถือว่าเยอะเหรอ?"
10025070-33 = "ก่อนที่สถาบันพิเศษ SRT จะถูกยุบ แชนแนลทางการที่เอาไว้ประชาสัมพันธ์สถาบันก็มีคนติดตามราวๆ นั้นนะ..."
10025070-35 = "ถะ... ถึงตอนนี้จะยังเป็นแชนแนลเล็กๆ แต่เดี๋ยวอัลกอริทึมก็ช่วยให้โด่งดังขึ้นมาเองแหละ...!"
10025070-36 = "ว่าแต่ในเมื่อไม่รู้วิธีตกปลา แล้วทำช่องตกปลาได้ยังไงกันล่ะ?"
10025070-37 = "เอ่อ คือว่า... หมู่นี้อินเทอร์เน็ตมันพัฒนาไปมาก ถึงจะไม่ได้ออกไปตกปลาด้วยตัวเอง แต่ก็สนุกกับเรื่อง#nนี้ผ่านคอนเทนต์ต่างๆ แทนได้น่ะ"
10025070-38 = "ทั้งคอนเทนต์เปิดกล่องอุปกรณ์ตกปลา ดูเกมตกปลาแบบสดๆ หรือไม่ก็เที่ยวชมอควาเรียม..."
10025070-39 = "แบบนี้ก็เรียกว่าแชลแนลตกปลาไม่ได้น่ะสิ..."
10025070-40 = "อ่า จริงๆ ก็มีผู้ชมหลายคนเข้ามาพูดเรื่องนี้ตอนฉันไลฟ์อยู่เหมือนกัน..."
10025070-41 = "พวกเขาทะเลาะกันเรื่องความสามารถในการตกปลาของฉัน ฉันก็เลยเผลอสัญญาปากเปล่าไปว่าจะไป#nทะเลแล้วตกปลาตัวใหญ่ๆ ให้ดูให้ได้"
10025070-42 = "แต่อย่าว่าแต่ปลาตัวใหญ่เลย แค่ปลาตัวเล็กๆ ฉันยังไม่เคยตกได้ด้วยซ้ำ... ฉันก็เลยหาวิธีตกปลาตัว#nใหญ่ๆ ให้ได้ในเวลาสั้นๆ จนได้มาที่หมู่บ้านยาโตอูระนี่แหละ"
10025070-43 = "ที่หมู่บ้านยาโตอูระมีเคล็ดลับในการตกปลาด้วยเหรอคะ...?"
10025070-44 = "คือว่า... ฉันไปอ่านเจอมาจากเว็บไซต์แปลกๆ ว่าที่หมู่บ้านนี้มีสิ่งมีชีวิตลึกลับที่จับปลาได้ตามใจสั่ง และมันก็อยู่ในทะเลนั่น"
10025070-45 = "และในเมื่อลองไปก็ไม่มีอะไรเสียหาย ฉันก็เลยคิดว่าถ้ามาให้เครื่องสังเวยหรือสวดคาถาอะไรแก่สิ่งมี#nชีวิตเหล่านั้น บางทีมือใหม่อย่างฉันก็อาจจะจับปลาตัวใหญ่ได้"
10025070-52 = "...คาถาเมื่อวานเหมือนเป็นการอธิษฐานให้มีปลาอุดมสมบูรณ์สินะคะ"
10025070-53 = "แต่ถึงสิ่งมีชีวิตลึกลับจะบันดาลให้มีปลาเยอะๆ แต่ถ้าตกปลาไม่เป็นก็ไม่มีประโยชน์หรือเปล่า? เรื่องตกปลาคงต้องช่วยตัวเองเอาแล้วแหละ"
10025070-55 = "ฉะ... ฉันก็เลยขอให้ชาวประมงคนอื่นสอนตกปลา แต่ก็โดนปฏิเสธหมด..."
10025070-56 = "ขอร้องละ ฉันไม่อยากกลับไปโดนคนอื่นหัวเราะเยาะใส่ ช่วยสอนวิธีตกปลาฉันเถอะนะ...!"
10025070-57 = "ถ้าเป็นปลาตัวใหญ่ก็น่าจะยาก แต่ถ้าจะตกปลาอาจิก็ถือว่าเป็นงานง่ายอยู่..."
10025070-58 = "ถ้าโอเคกับการตกปลาอาจิละก็ ฉันจะช่วยสอนให้ค่ะ"
10025070-59 = "ขอบใจนะ! ...ไม่สิ ขอบคุณมากท่านอาจารย์!"
10025070-60 = "ทะ... ท่านอาจารย์เหรอ...?"
10025070-62 = "ว่าแต่ ทำไมถึงต้องมารวมตัวกันตอนกลางคืนด้วยล่ะ?"
10025070-63 = "ตารางมันเปลี่ยนโดยกะทันหันแบบนี้ ฉันก็เลยยังไม่ได้กินอาหารเย็นเลยนะ..."
10025070-64 = "ขะ... ขอโทษนะ... แต่ถ้าจะตกปลาอาจิ ก็ต้องมาตกเวลานี้น่ะ..."
10025070-65 = "เพราะหลังจากพระอาทิตย์ตก พวกปลาอาจิจะมารวมตัวกันที่ชายฝั่งเพื่อพุ่งเป้าไปที่พวกปลาตัวเล็กๆ ก็เลยตกปลาอาจิได้มากกว่าตอนกลางวันน่ะ"
10025070-66 = "แบบนี้นี่เอง...! งั้นต้องใช้สายเบ็ดยาวแค่ไหนเหรอ?"
10025070-67 = "เอ่อ... อืม... มันก็ขึ้นอยู่กับความลึกของน้ำ แต่เอาแค่สามารถล่อปลาอาจิได้ก็พอ..."
10025070-68 = "แล้วถ้าจะล่อปลาอาจิ ต้องจับคันเบ็ดท่าไหนเหรอ?"
10025070-69 = "จับแล้วส่ายๆ ให้พอดี ให้เหมือนกับว่าเหยื่อที่เกี่ยวไว้ยังมีชีวิตอยู่..."
10025070-71 = "แล้วถ้าปลากินเบ็ดแล้ว ต้องทำยังไงกับรอกเหรอ?"
10025070-72 = "กะ... ก็น่าจะต้องหมุนเข้ามาแค่ให้สายเบ็ดไม่ขาด...?"
10025070-79 = "...มิยุเนี่ย ไม่ค่อยมีพรสวรรค์ในการสอนอะไรคนอื่นเลยนะ"
10025070-80 = "ก็นอกจากจะเป็นคนเก็บตัวเอาเสียมากๆ แล้วก็ยังเป็นคนที่เรียนรู้ทักษะโดยสัญชาตญาณอีกนี่นะ..."
10025070-81 = "การอธิบายเรื่องยากๆ ให้มือใหม่รู้ไม่ใช่เรื่องง่ายๆ เลยนะ"
10025070-82 = "แบบนี้จะจับได้สักตัวไหมเนี่ย...?"
10025070-87 = "...ฉันก็ว่าจะไม่สนใจแล้วนะ แต่ก็ทนเห็นสภาพแบบนี้ต่อไปอีกไม่ไหวแล้ว"
10025070-93 = "ผู้อาวุโส...?"
10025070-100 = "ถ้าไม่ได้อยากจะให้ข้าวปลาฟรีๆ โดยจับไม่ได้สักตัวละก็ ส่งคันเบ็ดมาให้ฉันนี่"
10025070-101 = "เดี๋ยวฉันคนนี้จะสอนวิธีตกปลาให้เอง"
10025070-102 = "ตะ... แต่ว่าครั้งก่อนผู้อาวุโสบอกว่าจะไม่สอนวิธีตกปลาให้คนนอกนี่..."
10025070-103 = "ฮึ่ม... ก็มีคนนอกที่ไหนไม่รู้มาจัดการเรื่องน่ารำคาญให้หมดแล้ว ฉันก็เลยแค่มาสอดส่องเรื่องชาวบ้าน#nตอนที่ตัวเองว่างน่ะ"
10025070-104 = "เอาละ วางคันเบ็ดแพงๆ นั่นไว้ แล้วเอาคันนี้ไปใช้แทนซะสิ"
10025070-105 = "เอ๋ แต่คันเบ็ดคันนี้ไม่มีรอกนะ? แล้วมันก็เบาหวิวเลยด้วย..."
10025070-106 = "สำหรับพวกมือใหม่แล้ว ไม่มีอะไรเหมาะไปกว่าคันเบ็ดที่โครงสร้างเรียบง่ายแบบนี้หรอก เอาละ ลองเหวี่ยงเบ็ดดูสิ"
10025070-111 = "พอตะกั่วเริ่มจม ก็ให้ขยับเบ็ดตกปลาช้าๆ ตามกระแสน้ำ ให้เหมือนกับว่าเหยื่อที่เกี่ยวไว้มีชีวิตอยู่..."
10025070-116 = "ตอนนี้แหละ ดึงเลย!"
10025070-121 = "โห ปลากระชากกลับอย่างแรงเลย!"
10025070-122 = "หันคันเบ็ดไปทางเดียวกัน ตะขอจะได้ไม่หลุด! เราต้องยื้อไว้จนกว่าปลาจะเหนื่อยไปเอง!"
10025070-123 = "มาข้างหน้าอีกนิด..."
10025070-130 = "...ได้แล้ว!"
10025070-132 = "ว้าว ได้ตัวใหญ่ไม่ใช่เล่นเลยนะนั่น"
10025070-133 = "ไม่เคยเห็นปลาตัวใหญ่แบบนี้มาก่อนเลย..."
10025070-135 = "สะ... สุดยอดเลย... ฉันตกปลาเองได้แล้ว...!"
10025070-137 = "ขอบคุณนะผู้อาวุโส!"
10025070-138 = "ก็แค่ปลาอาจิเอง ไม่ต้องทำเป็นตื่นเต้นขนาดนั้นหรอก..."
10025070-139 = "เอาเถอะ ในอนาคตก็ต้องรับรู้ข้อจำกัดของตัวเองและสู้ต่อไปแบบนี้แหละ"
10025070-141 = "การตกปลาไม่ใช่การต่อสู้กับท้องทะเล แต่เป็นการต่อสู้กับตัวเองต่างหาก"
10025070-147 = "(ท้องร้อง) จ๊อกๆ..."
10025070-148 = "อะไรของเธอน่ะ ซากิ!"
10025070-149 = "บรรยากาศกำลังดีแท้ๆ ทำไมต้องส่งเสียงแบบนั้นออกมาด้วย?"
10025070-150 = "กะ... ก็มันออกมาของมันเองนี่! นี่เราก็กินมื้อกลางวันกันไปเกินครึ่งวันแล้วด้วย..."
10025070-152 = "จะว่าไป นี่มันเลยเวลาอาหารเย็นไปเยอะแล้วนะคะ"
10025070-153 = "เอาปลาอาจิที่จับได้เมื่อกี้มารวมกันแล้วทำอาหารกันดีไหมคะ?"
10025070-154 = "ฉันเห็นด้วย!"
10025070-156 = "ฉันก็... เห็นด้วยคน"
10025070-158 = "ฮุฮุ ต้องเอาปลาอาจิไปทำอะไรนะ ถึงจะสร้างข่าวลือว่าปลาอร่อยได้?"
10025070-159 = "กินแบบซาชิมิก็น่าจะอร่อยนะ แต่เอาไปย่างก็คงไม่เลว..."
10025070-161 = "...กินแต่ปลาอาจิย่าง พวกเธอจะไปอิ่มกันเหรอ?"
10025070-167 = "เอ้า เอานี่ไปกินกันด้วย"
10025070-169 = "......นี่มัน?"
10025070-170 = "พวกปลาที่จับได้ตอนเช้ามืดน่ะ ถึงจะตัวเล็ก แต่รสชาติก็ไม่เลวอยู่นะ"
10025070-171 = "ขะ... ขอบคุณค่ะ......"
10025070-172 = "ว้าว... มีทั้งปลาซาบะ ปลากระพง หอย แล้วก็ปลาหมึกยักษ์ด้วย...?"
10025070-173 = "พะ... พวกฉันรับอาหารทะเลราคาแพงๆ แบบนี้ไว้ได้เหรอคะ...?"
10025070-175 = "มันแพงเพราะพวกเธอไปซื้อกินข้างนอกต่างหากล่ะ อาหารทะเลจากหมู่บ้านเราน่ะมีเยอะจนต้องหาคน#nช่วยกินไม่หวาดไม่ไหวเลย"
10025070-176 = "เพราะงั้นก็ไม่ต้องเกรงใจนะ เอาไปกินให้เต็มที่ซะสิ"
10025070-178 = "ขอบคุณนะคะ!"
10025070-187 = "ว้าว... แค่เอาวางบนตะแกรงก็ส่งกลิ่นหอมแล้ว..."
10025070-188 = "กลิ่นหอมที่เป็นเอกลักษณ์ของปลาแบบนี้... ใครจะไปทนไหวล่ะ!"
10025070-197 = "เดี๋ยวนะ จะมาจุดไฟตามอำเภอใจกันตรงนี้ไม่ได้นะคะ..."
10025070-198 = "[s] \"ได้กลิ่นอะไรอร่อยๆ แฮะ\""
10025070-200 = "อ๊ะ นักเรียนวัลคิรี่ที่เจอตอนเช้ากับคุณครูนี่นา..."
10025070-201 = "จะว่าไป ทำไมถึงจุดไฟตรงนี้ไม่ได้ล่ะ?"
10025070-202 = "ถ้าได้รับอนุญาตจากหมู่บ้านประมงก็ไม่มีปัญหาหรอก... อ้อ ผู้อาวุโสก็อยู่ด้วยเหรอคะเนี่ย? งั้นก็ไม่มีปัญหาค่ะ"
10025070-209 = "[ns1] \"ครูเดาว่าทุกคนน่าจะปิ้งอะไรกินกันน่ะ\"\n[ns2] \"ครูก็เลยไปเอาวัตถุดิบอื่นจากร้านค้ามาด้วย\""
10025070-212 = "วัตถุดิบอื่นเหรอ?"
10025070-213 = "ไหนขอดูซิ อืม... มะเขือยาว เห็ด เนย กระเทียม.. แล้วก็มะนาว?"
10025070-214 = "เอาเนยและกระเทียมที่เผ็ดร้อนมาปรุงรสปลา... แล้วก็บีบมะนาวปิดท้าย..."
10025070-215 = "แบบนี้ต้องออกมาอร่อยมากๆ แน่เลย!"
10025070-216 = "ทำอะไรอยู่น่ะ โมเอะ? รีบเอาเนยมาวางบนปลาเร็วเข้า!"
10025070-217 = "ไม่ต้องบอกฉันก็กำลังรีบอยู่น่า! อย่ามาเร้าหรือกันนักสิ!"
10025070-219 = "ฮุฮุ บรรยากาศเริ่มคึกคักแล้วสินะ งั้นฉันคงต้องหยิบกับแกล้มลับออกมาแล้วละ"
10025070-220 = "กับแกล้มลับ...? มันคืออะไรเหรอ?"
10025070-221 = "มันก็คือ... คูซายะตากแห้งไงล่ะ"
10025070-223 = "แหวะ... ผู้อาวุโสคะ เอาคูซายะกลิ่นแรงๆ มาทำไมคะเนี่ย?"
10025070-224 = "คูซายะมันผิดตรงไหน? ถ้าเป็นปลาย่างแล้วละก็ ไม่มีอะไรอร่อยเกินคูซายะหรอก"
10025070-225 = "แต่ว่าคูซายะมันกลิ่นแรง... แล้วก็ถ้าเทียบกับปลาหมักเกลืออื่นๆ ก็ไม่เห็นจะอร่อยเลยนี่คะ?"
10025070-226 = "...ว่าไงนะ? ถ้าบอกว่าคูซายะไม่อร่อย แสดงว่าเธอยังไม่ได้กินอย่างถูกต้องต่างหาก!"
10025070-227 = "ฉันจะย่างให้กินอย่างอร่อยๆ เลย ครั้งนี้เธอลองกินดูใหม่อีกที"
10025070-232 = "อึ้ก กลิ่นมัน... ยิ่งย่างยิ่งกลิ่นแรงนะคะเนี่ย!"
10025070-233 = "ได้กลิ่นนี้ไปนานๆ เดี๋ยวก็ชินเองแหละน่า ทำเป็นเวอร์ไปได้..."
10025070-239 = "อึก... กลิ่นของคูซายะแรงจนจะทำให้ผักอื่นๆ มีกลิ่นคาวไปด้วยเลย..."
10025070-240 = "กลิ่นทำลายจมูกขนาดนี้... ฉันว่ากินคำเดียวตัวก็น่าจะมีกลิ่นคาวติดตัวไปหลายวันแน่ๆ..."
10025070-241 = "แต่ว่าแบบนั้นมันยิ่งวินาศสันตะโรแน่เลยละ... แฮ่ก... แฮ่ก..."
10025070-242 = "...ถ้าเธอกินคูซายะละก็ วันนี้อย่าหวังว่าจะมานอนบนเตียงด้วยกันเชียวนะ"
10025070-243 = "ใจร้ายชะมัดเลย... ถ้าจะอ่อนไหวกับกลิ่นขนาดนั้น ก็แค่ต้องทำตัวให้คุ้นเคยไปกับกลิ่นก็พอแล้วนี่?"
10025070-245 = "เอ้า ซากิก็ลองกินดูสิ"
10025070-246 = "ว้ากก เอาคืนไปเลย!"
10025070-248 = "(หลังจากนั้นทุกคนก็ย่างปลากินด้วยกันที่ชายหาดและมีเวลาที่สนุกสนานด้วยกัน)"

[translation]
10025070-1 = "第7話;深夜的烤肉大會"
10025070-5 = "所以……"
10025070-6 = "這個可疑份子請美優教他釣魚？"
10025070-7 = "可，可疑份子……是，是在說我嗎！？"
10025070-8 = "你明明自稱釣客，卻連釣魚都不會不是嗎？"
10025070-9 = "那，那是因為……"
10025070-11 = "畢竟也幾乎沒看過你在釣魚嘛。"
10025070-13 = "雖，雖然是這樣沒錯……"
10025070-15 = "還，還有，你昨天在海邊吟唱奇怪的咒語……"
10025070-17 = "…………"
10025070-18 = "……看來是瞞不下去了。"
10025070-19 = "其實……我並不是釣客，而是在網路上經營釣魚頻道的影片創作者。"
10025070-20 = "各位有聽說過「白熊Channel」這個頻道嗎？"
10025070-25 = "好像沒什麼印象呢……"
10025070-31 = "我剛才搜尋了一下，訂閱人數大概有1000左右。"
10025070-32 = "……1000算多嗎？"
10025070-33 = "SRT在廢校前使用的官方頻道，好像差不多也是這個數字……"
10025070-35 = "雖，雖然目前還只是個小頻道，#n只要能受到演算法的青睞，肯定很快就會迅速起飛的……！"
10025070-36 = "不過你明明連釣魚都不會，又是怎麼拍釣魚影片的？"
10025070-37 = "這個嘛……託最近網路發達的福，就算不自己釣魚也能拍很多題材。"
10025070-38 = "像是開箱釣魚裝備、釣魚遊戲實況、拍水族館的Vlog之類的……"
10025070-39 = "這樣能算的上是釣魚頻道嗎……"
10025070-40 = "……正如你所說，類似的評論漸漸增加了。"
10025070-41 = "大家對我的釣魚實力爭論不休，於是我就不小心脫口而出了……#n說下部影片會到海邊釣隻大魚。"
10025070-42 = "不過實際上別說是大魚，我連小魚都沒釣過……怎麼樣才能在短時間內釣到大魚呢？#n我想了又想，最終來到了夜戶浦村。"
10025070-43 = "夜戶浦村有什麼釣魚的祕訣嗎？"
10025070-44 = "這……我在某個網站上看過，#n這個村子的海裡似乎有某種能自由操縱魚的神祕存在。"
10025070-45 = "反正不試白不試，只要向他們獻上祭品或祈禱，#n說不定像我這種新手也能釣到大魚。"
10025070-52 = "果然，昨天的咒語是祈求滿載而歸……之類的東西啊。"
10025070-53 = "不過就算聚集了大量的魚，不自己釣起來的話終究沒有意義不是嗎？"
10025070-55 = "所，所以我才拜託村裡的漁夫教我釣魚，結果所有人都拒絕我……"
10025070-56 = "拜託了……！就這樣空手而歸的話，我會變成網路上的笑柄的。#n能請你告訴我釣魚的訣竅嗎……！"
10025070-57 = "大魚可能有點困難，不過竹莢魚還算是容易釣……"
10025070-58 = "如果能接受的話，我可以教你……"
10025070-59 = "真的嗎！？幫大忙了！！#n……不，感激不盡，師父！！！"
10025070-60 = "師，師父……？"
10025070-62 = "我說，為什麼又要在晚上集合啊……？"
10025070-63 = "都怪行程突然改變，我們連晚餐都還沒吃啊。"
10025070-64 = "抱，抱歉……不過要釣竹莢魚的話，這個時間是最適合的……"
10025070-65 = "白天雖然也釣的到，但竹莢魚因為視力不佳，#n在晚上會更容易對氣味有反應，同時警戒心也會降低而容易上鉤……"
10025070-66 = "原來如此！那麼釣線的長度多長才是最適合的呢？"
10025070-67 = "這，這要視環境而定……大約是竹莢魚游動的深度……？"
10025070-68 = "想讓竹筴魚咬餌的話，該怎麼晃動釣餌比較好呢？"
10025070-69 = "用餌好像還活著的感覺……"
10025070-71 = "魚咬住餌後，要用什麼樣的速度收線才好呢？"
10025070-72 = "大，大概是不會讓釣線斷掉的力道……？"
10025070-79 = "……美優果然是不適合當指導員的類型啊。"
10025070-80 = "個性本來就內向，技巧也是憑感覺學會的。"
10025070-81 = "本身是感覺派的話，要用理論說明該注意的重點也沒那麼容易。"
10025070-82 = "照這個狀態來看，能釣到一隻就算幸運了吧？"
10025070-87 = "……雖然不是很想多管閒事，但實在是看不下去了。"
10025070-93 = "您是……"
10025070-100 = "不想白白浪費釣餌的話，就把釣竿借給老夫一會吧。"
10025070-101 = "老夫親自教你。"
10025070-102 = "不，不過老先生之前不是說沒時間教外地人釣魚……"
10025070-103 = "哼……誰叫有不知打哪來的[ruby= ・     ・     ・ ]外地人[/ruby]把麻煩事都做完了。#n老夫只是在利用多餘的時間罷了。"
10025070-104 = "來，把那根看起來很貴的釣竿放一邊去，用這把吧。"
10025070-105 = "……咦，這把釣竿沒有捲線器？#n……而，而且超輕的！"
10025070-106 = "新手最適合用磯釣竿了啊。畢竟構造簡單，很容易抓住感覺。#n試著拋一次竿吧。"
10025070-111 = "前端沉入水中後，讓魚餌像生物般游動。順著海流緩緩地──"
10025070-116 = "就是現在！！"
10025070-121 = "嗚哇！？拉得真用力啊！！？"
10025070-122 = "藉由魚鉤感受到魚的重量後就把魚拉上來，注意別讓釣竿被拉走了！"
10025070-123 = "還差，一點……！"
10025070-130 = "……釣到了！"
10025070-132 = "唔哦，還真大啊。"
10025070-133 = "這麼大的竹莢魚，我還是第一次看見……"
10025070-135 = "太，太厲害了……我第一次釣到魚了……！"
10025070-137 = "非常感謝！！"
10025070-138 = "不過是隻竹莢魚而已，這麼大驚小怪……"
10025070-139 = "這樣就明白了吧。#n今後就靠自己努力了。"
10025070-141 = "人們總說釣魚不是與大海的戰鬥，而是與自我的對抗──"
10025070-147 = "唔……"
10025070-148 = "咲希真不會看氣氛啊。"
10025070-149 = "明明氣氛這麼好的說～？"
10025070-150 = "剛，剛才那是不可抗力吧！#n誰叫我從中午之後就什麼都沒吃了……"
10025070-152 = "這麼說來，都已經這個時間了啊。"
10025070-153 = "大家一起吃剛才釣到的竹筴魚怎麼樣？"
10025070-154 = "贊成！"
10025070-156 = "我也……贊成。"
10025070-158 = "咯嘻嘻。這尾竹莢魚該怎麼料理才好呢？"
10025070-159 = "果然還是要鹽烤……？不，做成生魚片也不錯……"
10025070-161 = "……只吃竹莢魚就太冷清了吧？"
10025070-167 = "拿去，這些也配著吃吧。"
10025070-169 = "這是……？"
10025070-170 = "是凌晨捕來的魚。#n因為尺寸太小所以賣相不好，不過味道不成問題。"
10025070-171 = "非，非常感謝……"
10025070-172 = "哦哦……鯖魚、鱸魚、貝類，甚至還有章魚……？"
10025070-173 = "這，這麼昂貴的海鮮，我們真的可以收下嗎……？"
10025070-175 = "已經說過是賣不出去的東西了吧。#n在這村子裡多到吃不完。"
10025070-176 = "儘管拿去吧。"
10025070-178 = "非常感謝！！！"
10025070-187 = "哇……才剛開始烤就散發出可口的香味……"
10025070-188 = "這股烤魚特有的香氣……真讓人受不了！"
10025070-197 = "那個，這邊是不能生火的喔……？"
10025070-198 = "[s]「有股很香的味道呢。」"
10025070-200 = "啊，是老師……和女武神的學生啊。"
10025070-201 = "話說原來這裡是不能生火的嗎？"
10025070-202 = "有事先取得漁會許可的話就沒問題……#n呃，啊啊，原來會長也在這裡啊。"
10025070-209 = "[ns1]「我在附近就注意到這邊好像在烤東西吃……」\n[ns2]「所以就去買了一些食材。」"
10025070-212 = "食材？"
10025070-213 = "我看看……茄子、蘑菇、奶油、蒜頭……還有檸檬？"
10025070-214 = "用奶油和蒜頭增加風味……最後再加上檸檬提鮮的話……"
10025070-215 = "肯定會很好吃！！"
10025070-216 = "你還在做什麼，萌！還不快點把奶油放上去！"
10025070-217 = "不用你說我也知道，別那麼急啊！"
10025070-219 = "哈哈哈，看氣氛這麼熱鬧，是時候輪到[ruby= ・     ・     ・ ]這傢伙[/ruby]出場了啊。"
10025070-220 = "這傢伙是……？"
10025070-221 = "那當然……是「臭魚乾」囉！"
10025070-223 = "喂喂，等等！#n怎麼能把臭魚乾拿到這裡呢！"
10025070-224 = "臭魚乾有什麼不好？#n還有比臭魚乾更適合拿來烤的魚嗎！"
10025070-225 = "可是，臭魚乾味道很重……味道比起其他鹽漬魚也只是普普通通不是嗎？"
10025070-226 = "……什麼！會說臭魚乾不好吃的人，都是因為沒有吃對方法！"
10025070-227 = "老夫就趁這個機會親自烤給你們吃。"
10025070-232 = "唔……加熱之後味道就更重了……！"
10025070-233 = "這點程度習慣之後根本不算什麼。#n真是少見多怪……"
10025070-239 = "唔……臭魚乾的臭味太重，連其他魚也……"
10025070-240 = "這種毀滅性的氣味……竟然如此強烈，看來會久久揮之不去啊……"
10025070-241 = "不過也正因如此，它才會成為更具毀滅性的誘惑……哈啊，哈啊……！"
10025070-242 = "……萌，你要是吃了臭魚乾的話，今晚別想跟我睡同一張床。"
10025070-243 = "……真無情啊～既然這麼在意的話，和我一起習慣它不就好了？"
10025070-245 = "來～咲希也吃吃看吧。"
10025070-246 = "唔哇，住，住手！"
10025070-248 = "（繼續在深夜的海邊開著烤魚派對，度過了愉快的時光）"

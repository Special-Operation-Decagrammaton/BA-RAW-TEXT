[translation]
10025070-1 = "Episode 7;Midnight Barbecue"
10025070-5 = "...So."
10025070-6 = "This suspicious individual wants you to teach him how to fish?"
10025070-7 = "Suspicious?! I'm not suspicious!"
10025070-8 = "You're a fisherman who doesn't know how to fish."
10025070-9 = "Right, about that..."
10025070-11 = "I've seen you walking around with that gear, but you never use it..."
10025070-13 = "Sure, maybe not, but..."
10025070-15 = "And we heard you reciting some weird spell on the beach last night..."
10025070-17 = "..."
10025070-18 = "Okay. It's clear I can't hide it anymore."
10025070-19 = "The truth is, I'm not a professional fisherman. I'm an influencer."
10025070-20 = "Maybe you've heard of my streaming channel, Polar Bear Fishing?"
10025070-25 = "I don't think I have..."
10025070-31 = "I just looked it up. He has about 1,000 subscribers."
10025070-32 = "Is 1,000 subscribers a lot?"
10025070-33 = "Th-The official channel for SRT Academy had around that many subscribers just before it was shut down..."
10025070-35 = "Maybe it's a small channel now, but I'm riding the algorithm. You'll see, I'll blow up any day now...!"
10025070-36 = "How exactly are you running a fishing channel when you don't even know how to fish?"
10025070-37 = "Oh, there's all kinds of content you can make that doesn't involve actual...fishing..."
10025070-38 = "For example, I do fishing gear unboxing videos, and fishing game reviews, and aquarium travelogs..."
10025070-39 = "That doesn't sound like a fishing channel to me..."
10025070-40 = "Yeah, well, more and more of my viewers have been saying the same thing during live streams..."
10025070-41 = "I was arguing with them about my fishing skills, and, well, I may have promised I'd go to the sea and catch a big one..."
10025070-42 = "But forget the big one... I couldn't even catch a minnow. I was searching online for ways to catch a big fish quickly, and I wound up here."
10025070-43 = "Why would your search take you to Yatoura Village...?"
10025070-44 = "Well... I read online that there are these creatures that live under the water here, and that they can control the fish..."
10025070-45 = "It sounded shady, but hey, I was desperate. I figured if I gave them an offering, they might help me out."
10025070-52 = "So that spell from yesterday was actually a prayer to the Deep Ones."
10025070-53 = "But even if the Deep Ones sent the fish to you, you'd still have to actually catch it, wouldn't you?"
10025070-55 = "That's why I was begging the locals to teach me, but they all refused..."
10025070-56 = "Please! If I go back like this, my career is over. Please please PLEASE teach me to fish...!"
10025070-57 = "I don't know about catching a \"big one,\" but I can help you catch a mackerel..."
10025070-58 = "If that's good enough, I can teach you."
10025070-59 = "Thanks! I mean, thank you, Master!"
10025070-60 = "M-Master...?"
10025070-62 = "But why did we have to come out here at night?"
10025070-63 = "I haven't even had time to eat dinner..."
10025070-64 = "S-Sorry... This is the best time to catch mackerel..."
10025070-65 = "After sunset, the mackerel swim to the shore to chase smaller fish."
10025070-66 = "I should write this down! Okay, how much line should I throw out?"
10025070-67 = "W-Well... It depends on the depth... Just cast out enough to lure the mackerel..."
10025070-68 = "Okaaay... Should I shake the lure around?"
10025070-69 = "Shake it just enough to make it look like the bait is alive..."
10025070-71 = "Right. And how do I reel it in if I get a bite?"
10025070-72 = "E-Enough so that you don't break the line...?"
10025070-79 = "I had a feeling Miyu would be this kind of teacher..."
10025070-80 = "She's the type of person to rely on intuition more than anything. Doesn't help that she's so shy, too."
10025070-81 = "She probably can't even tell which parts are easy and which parts are hard..."
10025070-82 = "Are they going to catch anything at this rate...?"
10025070-87 = "I didn't want to get involved, but I can't take much more of this."
10025070-93 = "That's...!"
10025070-100 = "Unless you want to feed the fish all your bait, hand over that fishing rod."
10025070-101 = "I'll show you how it's done."
10025070-102 = "B-But you said you were too busy to teach me before..."
10025070-103 = "Hmph... Some annoying tourists took care of my chores, so now I've got time to kill."
10025070-104 = "First thing, we're getting rid of your fancy shmancy rod and using this, instead."
10025070-105 = "Uh... This fishing pole doesn't even have a reel, though? And it's so...light..."
10025070-106 = "You're not ready for a reel. Simple is best when you're starting out. Now go ahead and cast."
10025070-111 = "When the weight starts to sink, slowly move the pole along with the current, so it looks like the bait is alive..."
10025070-116 = "Now! Pull!"
10025070-121 = "Oh! Something's fighting back!"
10025070-122 = "Hold 'er steady, or the needle will slip! It's between you and the fish now: who'll give out first?"
10025070-123 = "Forward just a little..."
10025070-130 = "Got it!"
10025070-132 = "Wow! It's huge!"
10025070-133 = "I've never seen such a big mackerel..."
10025070-135 = "A-Amazing... I caught a fish with my own two hands...!"
10025070-137 = "Thank you!"
10025070-138 = "It's just a mackerel. You city folk are amazed by anything..."
10025070-139 = "Anyway, there's the basics for you. Keep practicing, and you'll be a decent fisher in no time."
10025070-141 = "In fishing, it's not you versus the sea, but yourself—"
10025070-147 = "*gurgle* *gurgle*"
10025070-148 = "Classic Saki."
10025070-149 = "Always ruining the mood with your weird, stupid noises."
10025070-150 = "I can't help it! I haven't eaten anything since lunch..."
10025070-152 = "It is pretty late, now that I think of it."
10025070-153 = "Why don't we have the mackerel Miyu caught earlier?"
10025070-154 = "Agreed!"
10025070-156 = "Sounds...good..."
10025070-158 = "Fresh mackerel... The possibilities are endless...!"
10025070-159 = "We could chop it up into sashimi! Or maybe we should grill it..."
10025070-161 = "You think a single mackerel's gonna fill you up?"
10025070-167 = "Here, take this."
10025070-169 = "What's this...?"
10025070-170 = "Fresh from this morning's catch. These aren't fit for market, but they're still tasty."
10025070-171 = "Th-Thank you..."
10025070-172 = "Wow... We went from mackerel to sea bass, clams, and...is that an octopus...?"
10025070-173 = "C-Can we really accept all this expensive seafood...?"
10025070-175 = "Maybe it's expensive where you're from, but we catch so much here we can't get rid of it all."
10025070-176 = "So just dig in and enjoy."
10025070-178 = "Thank you!"
10025070-187 = "Wow... It's just hit the grill and I can already smell it..."
10025070-188 = "Get a load of that umami scent... I can't wait!"
10025070-197 = "Excuse me! You got a permit for that fire...?"
10025070-198 = "[s] \"Something smells good...\""
10025070-200 = "Ah, Sensei...and the Valkyrie student from this morning."
10025070-201 = "Wait... We need a permit for this fire?"
10025070-202 = "I mean, it's no big deal if the locals don't mind, but... Ah, I see you've got a villager with you. I guess it's fine, then."
10025070-209 = "[ns1] \"I had a feeling you'd be grilling out here...\"\n[ns2] \"So I brought a few more morsels for the grill.\""
10025070-212 = "Morsels, you say?"
10025070-213 = "Let's see... Eggplant, mushroom, butter, garlic...and lemon?"
10025070-214 = "Fish seasoned with garlicy butter...finished off with a squeeze of lemon..."
10025070-215 = "This is going to be amazing!"
10025070-216 = "C'mon, Moe, hurry it up! Get that butter on the fish!"
10025070-217 = "I'm hurrying, I'm hurrying! You can't rush these things! Geez!"
10025070-219 = "Heehee... If you really want to make this a meal to remember, I'd better get my secret weapon..."
10025070-220 = "A...secret weapon...?"
10025070-221 = "Here... Dried kusaya!"
10025070-223 = "Argh! You just had to ruin it, didn't you?!"
10025070-224 = "Drop the attitude, kid. You can't have grilled fish without kusaya. Not really."
10025070-225 = "But that smell...and it's not even that good...!"
10025070-226 = "That just means you haven't tried REAL kusaya!"
10025070-227 = "Here, I'll grill it up right for you. Then you'll know real flavor!"
10025070-232 = "Gwah...! The smell...it's spreading...!"
10025070-233 = "If you think this is bad, try spending years getting the brine just right. You wimps..."
10025070-239 = "Aah... The smell of the kusaya is spreading to the vegetables..."
10025070-240 = "It's...pervasive. I feel like if I take a single bite, the smell will stick to me for years..."
10025070-241 = "Imagine cracking open a jar of this in a packed cafeteria... Hahaha..."
10025070-242 = "Hey. If you have some, you are NOT allowed to share my bedroll."
10025070-243 = "Oh, I'm hurt. If it really bugs you, then you should get used to it now, all in one go."
10025070-245 = "C'mon, Saki. Have a bite!"
10025070-246 = "Aah! Stay away!"
10025070-248 = "We had a great time grilling fish on the beach that night..."

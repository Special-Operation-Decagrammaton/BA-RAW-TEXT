42190-22 = "3;미야코;05;여기, 다 쓴 적외선 케미컬 라이트가 바닥에 버려져 있습니다."
42190-23 = "3;미야코;11;아마 선배들도 이 통로를 따라 지하 시설에 진입한 모양입니다.\n#3;em;…"

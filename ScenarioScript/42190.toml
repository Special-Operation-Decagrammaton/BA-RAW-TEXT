[translation]
42190-1 = "第19話;深淵"
42190-5 = "老師，請往這邊。"
42190-6 = "桐乃同學告訴我們的樓梯就是通往這個通道。"
42190-7 = "坡度有點陡，請留心腳步以免跌倒。"
42190-15 = "……是個奇怪的空間呢。"
42190-16 = "是臨時趕工的工程嗎，圍欄和表面加工的處理都很粗糙，#n然而卻連接了供電和通訊的線路……"
42190-22 = "這是……地上有幾根用過的紅外線螢光棒。"
42190-23 = "前輩們很可能也是利用這條通道進入地下設施的。"
42190-24 = "[s]「紅外線螢光棒？」"
42190-25 = "是的。是特殊部隊員在暗處執行作戰時，用來分辨敵我和是否能進入的一種標示……"
42190-26 = "換句話說……FOX小隊很可能在前方埋伏。"
42190-27 = "為了確保安全的進入路線，我將進行破門。"
42190-28 = "請老師離遠一點，以免被流彈波及而受傷。"
42190-34 = "那麼……要開始了！"
42190-44 = "[ns]「這個設施究竟是……」"
42190-45 = "……是軍用機庫呢。"
42190-49 = "有軍用裝備和搬運用的軌道……裡面還能看見電梯。"
42190-50 = "有著如此規模的機庫……應該至少能供應一個大隊的武裝。"
42190-51 = "[s]「為什麼車站地下會有這樣的軍事設施……？」"
42190-52 = "雖然我也不是很肯定……"
42190-53 = "一般來說，軍事設施會被市民敬而遠之，因此大多會建造在郊外。"
42190-54 = "但如果能夠在市內建造大型機庫的話……理論上能大幅降低運送和營運產生的費用。"
42190-55 = "特別是這個設施與車站相連，#n「需要」的時候，還能夠利用鐵路將兵力派遣到D.U.各地……"
42190-60 = "……我總算稍微能夠明白凱薩集團為何這麼執著於兔寶寶鎮的再開發計畫了。"
42190-61 = "[s]「不過若是被炸毀，一切就都白費了。」"
42190-62 = "……是的。"
42190-63 = "一旦空爆燃燒彈引爆，這裡就會像不曾存在過一樣，徹底化為烏有。"
42190-64 = "這裡──是連那些徬徨於社會陰影之人也不得而知的祕密場所。"
42190-65 = "也正因如此，當權者們才能在此袒露自己醜惡的本性吧。"
42190-66 = "因為這裡對他們來說，或許是唯一能夠滿足慾望和自尊心的地方。"
42190-67 = "此外──不惜放棄此等規模的設施也要給予的恐懼，究竟是多麼駭人……"
42190-68 = "[s]「……會緊張嗎？」"
42190-69 = "……不。"
42190-70 = "就像不被任何人認可、不敢向任何人訴說的正義不具備任何力量一樣。"
42190-71 = "不被任何人所見的恐懼──比過期的報廢便當還不值一提。"
42190-72 = "……事到如今我才察覺。"
42190-73 = "從他人身上繼承的[ruby=SRT]權威之名[/ruby]──是多麼沒有價值。"
42190-74 = "現在時間1130。#n距離彈頭引爆沒剩多少時間。"
42190-75 = "我們現在應該做的是──"
42190-82 = "請稍等一下，老師。"
42190-83 = "這裡是前輩們先行進入的地區，貿然前進過於危險。"
42190-84 = "我先派無人機去偵察情況。"
42190-88 = "無人機，啟動。"
42190-102 = "……果然被狙擊了呢。"
42190-103 = "從彈痕的深度和彈速來看……#n狙擊手使用的應該是12.7mm的反器材狙擊用子彈……是御伽前輩呢。"
42190-104 = "如果對方是一般的敵人或許還可以強行突擊……#n但對方是御伽前輩，下一發子彈肯定會瞄準要害的吧。"
42190-105 = "就算是我，也無法承受瞄準要害的狙擊。"
42190-106 = "要是有個穿著防彈裝備的先鋒的話……"
42190-108 = "……看來總算是想起我們了啊？"
42190-112 = "這個聲音是……"
42190-122 = "……哪有小隊長會拋下自己隊員的啊？"
42190-123 = "好過分哦，都子醬……"
42190-124 = "真不夠意思。#n至少也該問我們一聲吧？"
42190-126 = "這，該怎麼說呢……"
42190-127 = "……對，對不起。#n我以為這會讓大家感到為難……"
42190-128 = "哪裡為難了？"
42190-129 = "那個……因為會強迫大家為了我而犧牲。"
42190-130 = "我所前進的道路上──沒有規律的生活、強大的武器，也沒有溫暖的住所。"
42190-131 = "只能滿足我所相信的正義……只會過著崎嶇而痛苦的人生……"
42190-132 = "為了我個人的正義而要大家放棄夢寐以求的人生這種話……我說不出口。"
42190-139 = "……好痛。"
42190-140 = "真是不知變通……"
42190-142 = "什麼叫我的正義啊。#n那是屬於SRT所有人的不是嗎？"
42190-143 = "……因，因為憧憬前輩們的英姿而加入SRT，這點我們也是一樣的……"
42190-145 = "即使面對嚴苛的狀況也絕不挫折的──嚴格規律。"
42190-146 = "無論什麼樣的惡人也能一擊壓制的──壓倒性的力量！"
42190-147 = "面，面對駭人的敵人也決不動搖的──堅強勇氣……"
42190-148 = "與陌生的敵人戰鬥雖然有點可怕……但只要和大家一起就不怕了。"
42190-150 = "如果輕鬆就能取勝，一齊發射的彈藥的毀滅氣息也會變淡的。"
42190-151 = "世上也是有沒寫在教戰手冊裡的真理的啊……"
42190-158 = "我們──相信都子的正義！"
42190-164 = "……"
42190-165 = "……我明白了。"
42190-166 = "那麼各位，請在突入之前清點裝備。#n準備結束後將開始作戰。"
42190-168 = "與FOX小隊的實戰……好像有點緊張。"
42190-169 = "就是啊。#n有種在洞穴中跟看不見的怪物戰鬥的感覺。"
42190-170 = "這麼說來，你之前提過的那本三一的古老小說裡不就有類似的橋段嗎？"
42190-171 = "嗯，在野生的兔子和騎士團戰鬥的小說裡的確有那樣的描寫。"
42190-172 = "寫在那個洞窟裡的訊息，我記得是──"
42190-174 = "「唯有具備勇敢而單純內心之人──才能在卡班諾的洞窟裡找到道路」"
42190-181 = "……那個故事，我也很喜歡。"
42190-182 = "[s]「作戰名稱已經決定好了嗎？」"
42190-183 = "這麼說來，還沒決定作戰名稱呢……"
42190-184 = "那麼既然如此，這次的作戰名稱就借用那本小說的書名吧。"
42190-185 = "好！"
42190-186 = "贊成～"
42190-188 = "好的，那麼……"
42190-194 = "「卡班諾的兔子」作戰──開始！"

[translation]
42190-1 = "ตอนที่ 19;เหวนรก"
42190-5 = "ทางนี้ค่ะคุณครู"
42190-6 = "บันไดแนวดิ่งที่คุณคิริโนะบอกมันเชื่อมกับเส้นทางตรงนี้ค่ะ"
42190-7 = "บันไดมันชันมาก ระวังฝีเท้ากันให้ดีนะคะ จะได้ไม่ล้มกันไปค่ะ"
42190-15 = "... ดูเป็นพื้นที่ที่น่าสงสัยจริงๆ ด้วยค่ะ"
42190-16 = "ข้างในนี้ดูเป็นงานก่อสร้างเร่งด่วนเลยทีเดียวค่ะ ราวจับเพื่อความปลอดภัยกับการปิดงานก่อสร้างยังไม่#nสมบูรณ์เลย แต่ก็มีการเดินสายไฟไว้จ่ายไฟและสื่อสารอย่างเพียบพร้อมเลยค่ะ..."
42190-22 = "มีแท่งเรืองแสงรังสีอินฟราเรดที่ใช้หมดแล้วทิ้งไว้บนพื้นตรงนี้ด้วยค่ะ"
42190-23 = "พวกรุ่นพี่ก็น่าจะเข้าไปในชั้นใต้ดินผ่านเส้นทางนี้นะคะ"
42190-24 = "[s] \"แท่งเรืองแสงที่ว่าคืออะไรเหรอ?\""
42190-25 = "แท่งเรืองแสงนี้เป็นสัญลักษณ์อย่างหนึ่งที่หน่วยรบพิเศษใช้บ่งบอกการบุกเข้าและเพื่อระบุตัวตนเมื่อ#nปฏิบัติการในที่มืดค่ะ"
42190-26 = "และนั่นแปลว่า... มีความเป็นไปได้สูงที่สมาชิกกองทหาร FOX กำลังซุ่มโจมตีอยู่ข้างในนั้นค่ะ"
42190-27 = "คุณครูคะ ฉันจะเจาะประตูเข้าไปเพื่อความปลอดภัยในการเข้าค่ะ"
42190-28 = "ช่วยออกไปอยู่ไกลๆ หน่อยนะคะ จะได้ไม่โดนสะเก็ดระเบิดจนบาดเจ็บเอา"
42190-34 = "เอาละ... เข้าไปได้เลยค่ะ!"
42190-44 = "[ns] \"ที่นี่มัน...\""
42190-45 = "...โรงเก็บเครื่องบินทหารนี่เองนะคะ"
42190-49 = "มีอุปกรณ์ทางทหารเตรียมไว้ทั่วเลย แล้วก็มีลิฟต์และรางขนส่งด้วยค่ะ"
42190-50 = "ถ้าเป็นโรงเก็บเครื่องบินขนาดเท่านี้ละก็ อย่างน้อยก็น่าจะสั่งติดอาวุธกองกำลังได้ 1 กองพันเลยนะคะ"
42190-51 = "[s] \"ทำไมถึงมีด่านทหารในสถานีรถไฟที่ชาวเมืองใช้ด้วยล่ะ...?\""
42190-52 = "ฉันก็ยังฟันธงไม่ได้เหมือนกันค่ะ..."
42190-53 = "ปกติด่านทหารจะอยู่ในตำแหน่งที่หลีกเลี่ยงประชาชน ส่วนมากก็เลยจะไปสร้างในชานเมืองที่อยู่ห่าง#nไกลออกไปจากตัวเมืองค่ะ"
42190-54 = "แต่ถ้าสร้างโรงเก็บเครื่องบินไว้ใจกลางเมือง ก็จะลดค่าใช้จ่ายที่จำเป็นในการดำเนินงานของหน่วยและ#nการขนส่งอุปกรณ์ได้มากเลยค่ะ"
42190-55 = "แถมที่ตรงนี้ยังเชื่อมกับชั้นใต้ดินของสถานีด้วย ใน 'กรณีฉุกเฉิน' ก็คงส่งกำลังทหารผ่านทางรถไฟไป#nยังส่วนต่างๆ ของ D.U. ได้อย่างง่ายดาย..."
42190-60 = "ฉันเริ่มรู้เหตุผลที่ไคเซอร์กรุ๊ปหมกมุ่นกับการพัฒนาโคะอุซางิ ทาวน์แล้วละค่ะ"
42190-61 = "[s] \"แต่ถ้าเกิดระเบิด ทุกอย่างก็ไร้ประโยชน์\""
42190-62 = "... ใช่ค่ะ"
42190-63 = "ถ้าเกิดระเบิด ทุกอย่างก็จะหายไปหมด เหมือนกับว่ามันไม่เคยมีมาตั้งแต่แรกค่ะ"
42190-64 = "ที่แห่งนี้เป็นสถานที่ลับที่แม้แต่ผู้ที่เดินเตร่ในเงามืดของสังคมก็ยังไม่รู้จักค่ะ"
42190-65 = "เพราะแบบนี้ พวกนั้นถึงได้เผยแผนร้ายที่น่าเกลียดได้แค่ในชั้นใต้ดินเท่านั้นค่ะ"
42190-66 = "สถานที่ที่พวกนั้นตอบสนองความต้องการและเกียรติภูมิของตัวเองได้ ที่แห่งนี้จะมีค่าแค่ไหนสำหรับ#nพวกนั้นนะคะ"
42190-67 = "และความหวาดกลัวที่จะตามมาจากการทำลายสถานที่ที่มีค่านี้จะมหาศาลแค่ไหนกันนะคะ"
42190-68 = "[s] \"... รู้สึกประหม่าเหรอ?\""
42190-69 = "... ไม่หรอกค่ะ ไม่เลยสักนิด"
42190-70 = "ความยุติธรรมที่ไม่มีใครยอมรับและไม่อาจบอกกับใครได้ มันจะไม่มีวันมีอำนาจ"
42190-71 = "ความหวาดกลัวที่ไม่มีใครเห็น มันไร้ค่ายิ่งกว่าข้าวกล่องเหลือทิ้งที่หมดอายุไปแล้วอีกค่ะ"
42190-72 = "... ฉันเองก็เพิ่งมาตระหนักได้ในวันที่ละทิ้งทุกอย่างนี่ละค่ะ"
42190-73 = "ว่าชื่อของอำนาจที่ได้รับมาจากคนอื่นมันมีค่าแค่ไหน"
42190-74 = "ขณะนี้เวลา 11:30 น. เหลือเวลาอีกไม่นานก่อนที่หัวรบจะระเบิดค่ะ"
42190-75 = "สิ่งที่พวกเราต้องทำเป็นอันดับแรกก็คือ..."
42190-82 = "รอเดี๋ยวนะคะคุณครู"
42190-83 = "ที่นี่เป็นเขตปฏิบัติการที่พวกรุ่นพี่เข้าไปเตรียมการไว้ล่วงหน้าแล้ว ถ้าเราบุ่มบ่ามเข้าไปมันน่าอันตราย#nนะคะ"
42190-84 = "เอาเป็นว่าฉันจะส่งโดรนไปลาดตระเวนสถานการณ์ข้างหน้าก่อนค่ะ"
42190-88 = "ปล่อยโดรนออกบิน"
42190-102 = "... มีสไนเปอร์อยู่จริงๆ ด้วยค่ะ"
42190-103 = "ดูจากความลึกและการเร่งความเร็วของรอยกระสุนแล้ว นี่คือกระสุนปืนสำหรับลอบยิงขนาด 12.7 มม. เป็นฝีมือของรุ่นพี่โอโทกิสินะคะ"
42190-104 = "ถ้าสู้กับศัตรูธรรมดาก็คงบุกจู่โจมไปเรื่อยๆ แต่หากเป็นรุ่นพี่โอโทกิแล้วละก็ รุ่นพี่จะเล็งไปที่จุดสำคัญ#nเลยค่ะ"
42190-105 = "ถ้าถูกยิงด้วยกระสุนปืนสำหรับลอบยิงขนาดใหญ่ตรงจุดสำคัญ ต่อให้เป็นฉันก็คงทนไม่ไหวค่ะ"
42190-106 = "อย่างน้อยถ้าเรามีพลชี้เป้าติดอาวุธและอุปกรณ์กันกระสุนบ้างละก็..."
42190-108 = "... เพิ่งจะมานึกถึงพวกเราเอาป่านนี้เหรอ?"
42190-112 = "เสียงนี้มัน..."
42190-122 = "... หัวหน้ากองที่ไหนกันที่ทิ้งสมาชิกกองเอาไว้น่ะ?"
42190-123 = "แบบนี้มันเกินไปแล้วนะ มิยาโกะจัง..."
42190-124 = "น่าน้อยใจนะเนี่ย อย่างน้อยก็ถามกันก่อนสักคำสิว่าอยากมาร่วมวงด้วยคนหรือเปล่า"
42190-126 = "อ่า... เรื่องนั้น... คือว่า..."
42190-127 = "ขะ... ขอโทษด้วยนะคะ ฉันคิดว่ามันน่าจะเป็นการร้องขอที่มากเกินไปสำหรับทุกคนน่ะ..."
42190-128 = "มันเกินไปยังไงไม่ทราบ?"
42190-129 = "... ก็มันเป็นการบังคับให้ทุกคนเสียสละยังไงล่ะคะ"
42190-130 = "ทางที่ฉันจะไปไม่ใช่เส้นทางแห่งชีวิตที่มีวินัย นอกจากนี้ยังไม่มีอาวุธทรงพลังหรือสิ่งอำนวยความ#nสะดวกสบายด้วยนะคะ"
42190-131 = "ทางของฉันน่าจะมีแต่ชีวิตอันแสนปวดร้าวที่เต็มไปด้วยความยุติธรรมในอุดมคติของฉัน..."
42190-132 = "แล้วฉันจะไปขอร้องให้ทุกคนล้มเลิกการใช้ชีวิตในแบบที่ตัวเองต้องการ เพียงเพื่อความยุติธรรมใน#nอุดมคติของฉันได้ยังไงกันล่ะคะ?"
42190-139 = "โอ๊ย..."
42190-140 = "เธอนี่เป็นหัวหน้าที่พูดไม่รู้เรื่องเหมือนเดิมเลยนะ"
42190-142 = "ความยุติธรรมมันมีแค่ในอุดมคติของเธอหรือไง? มันเป็นของ SRT ทุกคนต่างหากเล่า"
42190-143 = "... พวกฉันก็เข้ามาใน SRT เพราะชื่นชมรุ่นพี่เหมือนกันนั่นแหละ"
42190-145 = "กฎระเบียบที่เข้มงวดและไม่สั่นไหว แม้ว่าจะต้องอยู่ในสถานการณ์ที่ยากลำบาก"
42190-146 = "พลังอันยิ่งใหญ่ที่กำราบศัตรูได้อยู่หมัดในการโจมตีเพียงครั้งเดียว ไม่ว่าจะเป็นศัตรูแบบไหนก็ตาม"
42190-147 = "ความกล้าหาญที่ไม่สั่นคลอน แม้จะอยู่ต่อหน้าศัตรูที่น่ากลัว..."
42190-148 = "ถึงฉันจะกลัวการสู้กับคนแปลกหน้า แต่หากอยู่กับสมาชิกทุกคน ฉันก็ไม่มีอะไรให้กลัว"
42190-150 = "รสชาติของการยิงปืนฉลองชัยชนะในสถานการณ์ที่รู้อยู่แล้วว่าจะชนะน่ะ ฉันว่ามันไม่เห็นจะน่าพิสมัย#nอะไรเลย"
42190-151 = "และโลกนี้ก็มีสัจธรรมบางอย่างที่ไม่ได้เขียนไว้ในตำราเรียนด้วย..."
42190-158 = "พวกเราจะเชื่อในความยุติธรรมของมิยาโกะเอง!"
42190-164 = "......"
42190-165 = "... เข้าใจแล้วค่ะ"
42190-166 = "ถ้างั้นทุกคนช่วยตรวจสอบอาวุธกับอุปกรณ์ก่อนเข้าไปกันด้วยนะคะ ถ้าเตรียมเสร็จแล้ว ฉันจะเริ่มปฏิบัติ#nการทันทีค่ะ"
42190-168 = "นี่จะเป็นการต่อสู้จริงกับพวกรุ่นพี่ FOX... มันก็น่าประหม่าอยู่หรอก"
42190-169 = "นั่นสิ รู้สึกเหมือนจะเข้าไปในถ้ำมืดเพื่อต่อสู้กับสัตว์ประหลาดสีดำที่มองไม่เห็นเลย"
42190-170 = "จะว่าไปแล้ว ในนิยายโบราณของทรีนิตี้ที่เคยพูดถึงก่อนหน้านี้ก็มีฉากคล้ายๆ แบบนี้ใช่ไหม?"
42190-171 = "อื้อ ในนิยายมีฉากการต่อสู้ระหว่างกระต่ายป่ากับอัศวินน่ะ"
42190-172 = "อัศวินที่เข้าไปในถ้ำมืดที่กระต่ายเฝ้าอยู่ สุดท้ายแล้วก็ได้พบกับข้อความที่ว่า..."
42190-174 = "<เฉพาะผู้ที่กล้าหาญและมีจิตใจบริสุทธิ์เท่านั้นที่สามารถหาเส้นทางในถ้ำแคร์บาน็อกได้>"
42190-181 = "... ฉันก็ชอบเรื่องนั้นเหมือนกันค่ะ"
42190-182 = "[s] \"จะว่าไป เราตั้งชื่อปฏิบัติการนี้กันหรือยังนะ?\""
42190-183 = "นั่นสิคะ เราลืมตั้งชื่อปฏิบัติการนี้กันไปเลยนะคะ..."
42190-184 = "ไหนๆ ก็พูดถึงนิยายเรื่องนั้นแล้ว งั้นชื่อปฏิบัติการนี้เอาเป็นชื่อเรื่องนั้นดีไหมคะ?"
42190-185 = "ดีเลย!"
42190-186 = "ฉันเห็นด้วย"
42190-188 = "ค่ะ ถ้างั้นก็..."
42190-194 = "เริ่มปฏิบัติการ <กระต่ายแห่งแคร์บาน็อก> ได้เลยค่ะ!"

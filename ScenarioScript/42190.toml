42190-49 = "3;미야코;05;곳곳에 적재된 군용 장비와 이를 운반하기 위한 레일과 엘리베이터가 보입니다."
42190-50 = "3;미야코;10;이만한 규모의 격납고라면…… 최소 1개 대대 규모의 병력 정도는 무장시킬 수 있겠군요."
42190-51 = "[s] \"시민들이 이용하는 역 아래에 어째서 이런 군사 시설을……?\""
42190-52 = "3;미야코;02;확신하기는 어렵습니다만……\n#3;em;…\n#3;m3"
42190-53 = "3;미야코;10;보통 군사 시설은 시민들에게는 기피되는지라, 시내에서 멀리 떨어진 교외에 건설되는 것이 일반적이니까요."
42190-54 = "3;미야코;11;이렇게 시내 한 가운데에 격납고를 건설할 수 있다면, 부대 운용 및 장비 운송에 필요한 비용을 크게 아낄 수 있겠지요."
42190-55 = "3;미야코;99;더군다나 이 시설은 역 아래에 연결되어 있으니 '유사시'에는 철로를 통해 D.U. 각지에 손쉽게 군사력을 투사할 수도 있으니……"

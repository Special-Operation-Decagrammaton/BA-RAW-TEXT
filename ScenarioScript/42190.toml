[translation]
42190-1 = "Episode 19; Abyss"
42190-5 = "Sensei, this way."
42190-6 = "The vertical stairs Kirino described lead to this hallway."
42190-7 = "The incline is steep, so watch your step."
42190-15 = "...This place feels off."
42190-16 = "Shoddy railing and finishings seem to indicate an unfinished or rushed construction job, but the building has fully functioning utilities."
42190-22 = "Look. It's a used infrared chemical light."
42190-23 = "They must have entered the underground facility through here."
42190-24 = "[s] \"What's a chemical light for?\""
42190-25 = "It's used by special ops in dark areas for identification and signaling."
42190-26 = "In other words, our FOX counterparts have likely set up a trap for us ahead."
42190-27 = "I'm setting up a breach charge on the door to secure our entry, Sensei."
42190-28 = "Stand clear."
42190-34 = "Okay... Take cover, Sensei!"
42190-44 = "[ns] \"What is this?\""
42190-45 = "...A military hangar."
42190-49 = "The elevators and rail systems are made for transporting military gear."
42190-50 = "A hangar of this scale... It could support a sizable military force."
42190-51 = "[s] \"Why here though? Underneath a popular, well-frequented subway station?\""
42190-52 = "I've been trying to figure that out too..."
42190-53 = "Typically, military outposts are built far away from cities or residential areas. Usually in undeveloped areas outside of the city limits."
42190-54 = "But technically, if you built one in the middle of a city, like this hangar, you would save a fortune in management and transportation costs."
42190-55 = "And being under a station, they could easily deploy troops to every corner of D.U. in a state of emergency."
42190-60 = "I finally understand why Kaiser Group had such a vested interest in Kousagi Town's development."
42190-61 = "[s] \"And setting off a bomb here would wipe out all of that investment.\""
42190-62 = "...You're right."
42190-63 = "The bomb's explosion would wipe this place off the map entirely."
42190-64 = "And it really would be like it never existed. I doubt even those who dwell in the city's underworld have caught a whiff of it, so no one knows it's here."
42190-65 = "They had to dig deeper than anyone else was willing to go to build this place."
42190-66 = "The idea of a place where they could freely pursue their corporate ambition must have been very appealing to them."
42190-67 = "And they're willing to give all of that up, just to strike fear into the hearts of the public. That almost scares me more."
42190-68 = "[s] \"...Any second thoughts?\""
42190-69 = "...No, not at all."
42190-70 = "It's like how justice only has power if you speak up for it."
42190-71 = "Hiding away your fear out of pride is as useless as an old bento in the garbage."
42190-72 = "...It took getting discarded myself to learn that lesson."
42190-73 = "I won't let SRT be built with this authority that they've mooched off of Kaya."
42190-74 = "The current time is 1130. Not much time left until the detonation."
42190-75 = "Our next move should be–"
42190-82 = "Sensei, wait."
42190-83 = "This is hostile territory. Rushing in blindly would be deadly."
42190-84 = "I'll send a drone ahead of us to do some scouting."
42190-88 = "Activating the drone now..."
42190-102 = "Typical. Sniper."
42190-103 = "Based on the depth of the bullet hole and the speed of the projectile, the sniper is equipped with a 12.7mm anti-materiel rifle... Otogi's specialty."
42190-104 = "Against anyone else, I might take the risk of moving forward. But against Otogi that would be suicide."
42190-105 = "Even I wouldn't be able to take a direct hit from an anti-materiel rifle."
42190-106 = "If we had a point woman who had some ballistic armor at least..."
42190-108 = "...Oh, so now that you need us, you remember us?"
42190-112 = "That can't be..."
42190-122 = "At least when I was leader, I only left Miyu behind! Who forgets all three of their squad members?"
42190-123 = "I-I can't believe you just left, Miyako..."
42190-124 = "Way to leave us out of the loop. You could've at least asked if we wanted to come."
42190-126 = "I... I didn't think..."
42190-127 = "...I-I'm sorry, everyone. I couldn't ask more of you. I've already asked too much."
42190-128 = "...Too much. How?"
42190-129 = "You all have made sacrifices for our squad over and over and over. I couldn't ask you to do it again."
42190-130 = "I would've been asking you to give up your regimented schedules, unlimited access to firepower, to every kind of creature comfort you enjoy."
42190-131 = "I couldn't do it."
42190-132 = "After everything we've already been through, I couldn't ask you to abandon your lives for my vision of justice."
42190-139 = "...Really now?"
42190-140 = "You really are a stubborn squad leader."
42190-142 = "M-Miyako... It's not just your sense of justice. We all feel the same way. "
42190-143 = "We were all enchanted by the FOX Squad."
42190-145 = "Their rigid discipline never swayed no matter the situation."
42190-146 = "The way criminals fell before them, one after the other!"
42190-147 = "And the c-courage that never wavered no matter how daunting the obstacle."
42190-148 = "I-I'm scared of everything...but not when I'm with you guys."
42190-150 = "Fireworks start to get boring after a couple nights, honestly. I need the thrill of cutting into our limited supplies. Heehee."
42190-151 = "I've learned recently there's a lot to learn about the world that isn't in my textbooks."
42190-158 = "We'll fight for SRT's justice by your side, Miyako!"
42190-164 = "..."
42190-165 = "...Thank you."
42190-166 = "Final gear check. Once everyone's ready, follow my lead."
42190-168 = "Going toe-to-toe with the FOX Squad... O-Oh, geez."
42190-169 = "I get you. It's like we're about to dive into a pitch-black cave and we know Cthulhu's in there somewhere."
42190-170 = "There was a scene like that, in that novel."
42190-171 = "Yeah. That Trinity one about the rabbit who faced a group of knights."
42190-172 = "Those knights saw a message upon entering the rabbit's shadowy lair."
42190-174 = "\"Only the brave and true shall find their way in Caerbannog's cave.\""
42190-181 = "...I've always liked that story."
42190-182 = "[s] \"Have you decided on an operation name yet?\""
42190-183 = "Oh, I didn't think of one at all..."
42190-184 = "Well, it seems rather timely to me. Why don't we name the operation after the story then?"
42190-185 = "I like it!"
42190-186 = "Me too."
42190-188 = "In that case..."
42190-194 = "Operation Rabbit of Caerbannog, commence!"

42190-61 = "[s] \"폭탄이 터진다면 모두 쓸모없어지겠지만.\""
42190-62 = "3;미야코;03;……네."
42190-63 = "3;미야코;99;폭탄이 터지고 나면 처음부터 존재하지 않았던 것처럼 없었던 일이 되어버리겠지요."
42190-64 = "3;미야코;11;그도 그럴 것이 이 장소는 사회의 그림자 속에서 살아가던 자존감 낮은 시민들조차 알지 못했던, 비밀스러운 장소니까요."
42190-65 = "3;미야코;05;이렇게 깊은 지하에서만 그들은 추악한 속내를 솔직하게 드러낼 수 있었을 겁니다."
42190-66 = "3;미야코;10;자존심조차 꺾지 못한 욕망을 투기할 수 있는 이 장소는, 그들에게 얼마나 값진 곳이었을까요."

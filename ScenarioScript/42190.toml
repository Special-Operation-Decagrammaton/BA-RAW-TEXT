42190-70 = "3;미야코;10;그 누구도 인정해 주지 않는, 그 누구에게도 말할 수 없는 정의가 힘을 가질 수 없는 것처럼."
42190-71 = "3;미야코;03;아무에게도 보이지 않는 공포는 유통기한이 끝난 폐기 도시락보다 더 무가치하거든요."

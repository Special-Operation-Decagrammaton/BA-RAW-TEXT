[translation]
52240-1 = "ตอนที่ 24;เสียงร้องแห่งความโล่งใจ"
52240-2 = "อะฮะฮ่า~ เกือบเป็นเรื่องใหญ่จริงๆ แล้วสิคะ"
52240-3 = "ฉันแกล้งทำเป็นไม่สะทกสะท้านแล้วพูดให้ฝ่ายตรงข้ามชะล่าใจก็จริง แต่ก็เล่นเอาเหงื่อแตกพลั่ก แล้วคิดในใจว่าถ้าพวกคุณไม่มาจริงๆ ล่ะจะทำยังไง... "
52240-4 = "ไม่มีทางที่ฉันจะไม่สังเกตเห็นสัญญาณนั่นอยู่แล้ว"
52240-5 = "ก็การยิงดอกไม้ไฟสีขาวจากหอสูงเป็นธรรมเนียมการส่งสัญญาณเวลาเกิดปัญหาที่ใช้กันภายในชมรม#nหยินหยางนี่นะ"
52240-6 = "เป็นไทม์มิง~ ที่สมบูรณ์แบบเลยเจ้าค่ะ!"
52240-7 = "ชิ... ชมรมความงามของธรรมชาตินี่ไวเป็นบ้าเลย พอรู้ว่าจะโดนเล่นงานก็หนีไปเร็วเหมือนงูไม่มีผิด"
52240-8 = "ทำไมถึงมาจ้องฉันล่ะ...?"
52240-9 = "เอ๋ มีเพื่อนร่วมทางที่ไม่คาดคิดติดมาด้วยสินะคะ"
52240-10 = "พอมีการรวมกลุ่มแปลกๆ กลับมากันแบบนี้ ท่าทางจะมีเรื่องเกิดขึ้นเยอะเลยสินะคะ"
52240-11 = "[s1] \"เป็นยังไงบ้าง นิยะ?\"\n[s2] \"ไม่ได้บาดเจ็บมากใช่มั้ย นิยะ?\""
52240-14 = "ค่ะ เห็นอย่างนี้แต่ฉันก็แข็งแรงพอตัวอยู่เหมือนกันนะคะ"
52240-15 = "ต้องขอบคุณคุณครู [USERNAME] ที่ช่วยสนับสนุนการคุ้มกันที่แข็งแกร่งให้ด้วยค่ะ ฉันเลยสั่งการให้จัดเทศกาลวาราคุได้อย่างปลอดภัย"
52240-16 = "[s] \"โล่งอกไปทีนะที่ครูช่วยได้\""
52240-17 = "ค่ะ ช่วยได้มากเลยทีเดียวค่ะ"
52240-18 = "เมื่อเทียบกับสิ่งที่คุณครูช่วยแล้ว สิ่งที่ฉันทำก็แค่การดูว่าสิ่งใดถูกสิ่งใดผิด แล้วก็คอยรักษาความสงบ#nเหมือนอย่างที่ทำเป็นปกติเท่านั้นค่ะ"
52240-19 = "เมื่ออยู่ต่อหน้าความไม่ถูกต้องอย่างตำนานร้อยเรื่องราว ฉันก็ทำอะไรไม่ได้เลยละค่ะ"
52240-20 = "คงใกล้ถึงคราที่ฉันต้องลงจากตำแหน่งหัวหน้าชมรมหยินหยางแล้วละ..."
52240-26 = "วะ... ว้ายย?!"
52240-27 = "อย่าเพิ่งขยับนะเจ้าคะ! อยู่เฉยๆ ข้าจะได้ล้างแผลให้เจ้าค่ะ!"
52240-28 = "ระ... เรื่องเล็กน้อยแบบนั้นเอาไว้ทำทีหลังก็ได้..."
52240-29 = "ถ้าไม่รีบรักษาตอนนี้ ต่อไปอาจเป็นแผลเป็นขนาดใหญ่บนหน้าได้นะ"
52240-30 = "ไม่ว่าจะเป็นเรื่องสำคัญหรือเรื่องเล็กน้อย ถ้าพลาดโอกาสไปแล้วก็จะกลับไปแก้ไขไม่ได้"
52240-31 = "นางุสะ..."
52240-32 = "[s3] \"ไม่มีใครในโลกที่ทำทุกอย่างได้โดยลำพังหรอกนะ\"\n[s4] \"ถ้านิยะทำอะไรไม่ได้โดยไม่ได้รับความช่วยเหลือจากครูละก็...\""
52240-37 = "[ns] \"ครูเองก็ทำอะไรเพียงลำพังไม่ได้ถ้าไม่มีนักเรียนเหมือนกัน\""
52240-38 = "ถ้าคุณครูว่าอย่างนั้นละก็..."
52240-43 = "งั้นนี่ก็ไม่ใช่เวลามาร้องไห้สินะคะ"
52240-44 = "ก่อนอื่น ฉันขอยินดีต้อนรับที่กลับมาได้อย่างปลอดภัยค่ะ คุณครู [USERNAME] แล้วก็เฮียกกะเรียวรันทุกคนด้วย"
52240-45 = "นักเล่าเรื่องลึกลับตัวกะเปี๊ยกจากชมรมความงามของธรรมชาติด้วยค่ะ..."
52240-49 = "เรียกใครว่าตัวกะเปี๊ยกน่ะ!"
52240-50 = "ฉันจะแชร์ข้อมูลที่ชมรมหยินหยางรวบรวมมาได้จนถึงตอนนี้เพื่อสรุปสถานการณ์ที่เกิดขึ้นก่อนค่ะ"
52240-51 = "ถ้าเราจะทำความเข้าใจสถานการณ์และกำหนดมาตรการรับมือ เราต้องแยกแยะระหว่างบันทึก ข่าวลือ ตัวตนที่แท้จริง และภาพลวงตากันก่อนค่ะ"
52240-52 = "อื้อ ฉันเห็นด้วย ไม่มีอะไรอันตรายไปกว่าข้อมูลที่ไม่ผ่านการกลั่นกรองแล้วละ"
52240-54 = "เป็นอย่างนี้เองสินะคะ สุดท้ายแล้วอายาเมะก็ตัดสินใจแบบนั้นสินะ..."
52240-55 = "ฉันคิดอยู่บ่อยๆ ว่าอายาเมะเป็นคนที่ดูสมบูรณ์แบบแต่ก็ดูน่าเป็นห่วง แต่ก็ไม่คิดเลยนะว่าจะเป็นหนัก#nถึงขนาดนี้"
52240-56 = "เป็นความผิดของฉันเองค่ะที่มองไม่เห็นความเป็นจริงที่ว่าหัวหน้าเฮียกกะเรียวรันงานเยอะมากจนล้น#nมือไปหมด"
52240-57 = "ไม่หรอก มันเป็นความผิดของฉันต่างหากที่ไม่รู้ว่าเพื่อนกำลังทุกข์ใจ ถ้าฉันเข้าใจอายาเมะมากกว่านี้ละก็..."
52240-58 = "เป็นความผิดของพวกเราทุกคนนั่นละ..."
52240-59 = "ฉันน่าจะเคยบอกไปแล้วนะว่าการพยายามแบกรับความรับผิดชอบด้วยตัวคนเดียวมันเป็นนิสัยที่ไม่ดี#nของรุ่นพี่นางุสะ"
52240-60 = "ใช่เจ้าค่ะ พวกเราก็เสียใจกับความเจ็บปวดของรุ่นพี่อายาเมะเหมือนกันเจ้าค่ะ!"
52240-61 = "ครั้งนี้พวกเราต้องจับมือหัวหน้าอายาเมะไว้แน่นๆ จะได้ไม่เกิดความคิดแบบนั้นอีกซ้ำสองยังไงล่ะ!"
52240-65 = "ใช่... การปกป้องอายาเมะคือเป้าหมายของพวกเราทุกคน"
52240-69 = "ฉันอยากถามอะไรบางอย่างน่ะ หัวหน้านิยะ"
52240-70 = "เพียงแค่จัดงานเทศกาลต่อ ก็ระงับพลังของตำนานร้อยเรื่องราวของหัวหน้าอายาเมะ... หรือฮิโตสึเมะนั่นได้แล้วเหรอ?"
52240-71 = "ถ้าจะพูดให้ชัดๆ เลยละก็ นี่เป็นมาตรการชั่วคราวอย่างที่นักเล่าเรื่องพรั่นพรึงคนนั้นพูดไว้ค่ะ"
52240-72 = "จริงอยู่ที่ความคึกคักของผู้คนจากงานเทศกาลทำให้ผู้คนเหล่านั้นลืมความกลัวไปได้ พลังของตำนานร้อยเรื่องราวก็เลยอ่อนลงด้วย..."
52240-73 = "แต่อารมณ์ของผู้คนก็ไม่ได้คงที่อยู่ที่สถานะเดียวเสมอไปหรอกค่ะ"
52240-74 = "เมื่อบรรยากาศของงานเทศกาลเริ่มสงบลง ฮิโตสึเมะก็จะเริ่มส่องสายตามาที่เฮียกคิยาโคอีกครั้ง"
52240-75 = "นอกจากนั้นปัญหาใหญ่ที่สุดก็อยู่ที่ตัวอายาเมะเอง..."
52240-76 = "หัวหน้าอายาเมะมีปัญหาอะไรอื่นอีกเหรอเจ้าคะ?"
52240-77 = "ปัญหาที่ว่าก็คือ..."
52240-78 = "หัวหน้าอายาเมะเป็นคนเก่งเกินไป ก็เลยไม่มีใครอื่นในเฮียกกะเรียวรันที่สู้กับอายาเมะแบบตัวต่อตัวได้#nน่ะสิคะ"
52240-79 = "ระ... เรื่องนั้นมันก็จริง..."
52240-80 = "แม้แต่ฉันก็ไม่เคยเอาชนะอายาเมะในการดวลได้เลย"
52240-81 = "หัวหน้าอายาเมะคือรากฐานของฮิโตสึเมะ ตราบใดที่หัวหน้าอายาเมะยังอยู่ดี ต่อให้เราพยายามกำจัด#nฮิโตสึเมะแค่ไหน มันก็จะยังยึดมั่นในความหวาดกลัวของผู้คนแล้วเติบโตต่อไปค่ะ"
52240-82 = "ฮึ่ย... ตอนอยู่ฝ่ายเดียวกันฉันรู้สึกมั่นใจมาก แต่พอเป็นศัตรูกันฉันก็คิดหาแผนรับมือไม่ได้เลย"
52240-83 = "แต่ก็ใช่ว่าจะไม่มีวิธีหรอกค่ะ"
52240-84 = "เพราะตอนนี้เฮียกกะเรียวรันทุกคนอยู่ด้วยกันที่นี่ และเฮียกกะเรียวรันก็มีเฮียกกุเร็น ปืนปีศาจในตำนาน#nที่ใช้ยิงหนังสือลึกลับได้นี่คะ"
52240-85 = "ถ้าพวกคุณเอาชนะเรื่องลึกลับที่เพ่นพ่านตามท้องถนนได้ทีละเรื่องๆ แล้วเข้าหาอายาเมะได้ ก็อาจมีโอกาสทำลายหนังสือลึกลับได้ค่ะ"
52240-86 = "แต่ว่าพวกเรามีเฮียกกุเร็นแค่กระบอกเดียวนะ แล้วจะไปจัดการสิ่งลึกลับน่าขนลุกมากมายขนาดนั้นใน#nครั้งเดียวได้ยังไงล่ะ?"
52240-87 = "และอีกวิธีก็คือ... การใช้พลังของหนังสือลึกลับตอบโต้จากทางนี้ค่ะ"
52240-88 = "มีคำพูดที่ว่า 'หนามยอกต้องเอาหนามบ่ง' ใช่มั้ยล่ะคะ?"
52240-89 = "เราต้องตอบโต้พลังของหนังสือลึกลับด้วยพลังของหนังสือลึกลับด้วยกันค่ะ นี่ละกลยุทธ์ที่ดีที่สุด"
52240-90 = "พลังของหนังสือลึกลับ...? แล้วเรามีหนังสือลึกลับเหรอไง?"
52240-91 = "ก็..."
52240-96 = "เฮอะ ก็ว่าพูดเรื่องอะไรกันอยู่..."
52240-97 = "จะตอบโต้พลังของหนังสือลึกลับด้วยพลังของหนังสือลึกลับงั้นเหรอ? ถ้าหนังสือลึกลับมันหาได้ง่ายๆ ขนาดนั้น ฉันก็คงไม่ต้องมาลำบากอยู่อย่างนี้หรอก!"
52240-98 = "ต่อให้เป็นนักเล่าเรื่องลึกลับของชมรมความงามของธรรมชาติอย่างฉัน ก็ยังต้องใช้เวลานานมากกว่า#nจะใช้ <อิโนะ โมโนโนเคะ โรคุ> ได้ เพราะงั้นต่อให้พวกเธอมีหนังสือลึกลับเล่มใหม่ในมือในตอนนี้..."
52240-99 = "ค่ะ ใช่แล้วค่ะ ฉันหมายถึง <อิโนะ โมโนโนเคะ โรคุ> นั่นละค่ะ"
52240-100 = "ว่าไงนะ...?"
52240-104 = "เอ้า รับไปสิคะ"
52240-106 = "นี่มัน <อิโนะ โมโนโนเคะ โรคุ>...?"
52240-107 = "ปะ... เป็นไปไม่ได้ <อิโนะ โมโนโนเคะ โรคุ> มันขาดและก็โดนไฟไหม้จนหายไปตั้งแต่เหตุการณ์ครั้งก่อน#nแล้วนี่นา..."
52240-108 = "มันก็เป็นอย่างนั้นค่ะ ตอนพวกฉันไปเก็บกวาดพื้นที่แล้วเจอหนังสือเล่มนี้เข้า มันก็อยู่ในสภาพที่ปกไหม้เกรียมและเหลือแค่กระดาษขาดๆ ไม่กี่แผ่นเท่านั้น"
52240-109 = "การจะฟื้นฟูหนังสือลึกลับที่อยู่ในสภาพนั้นน่าจะเป็นเรื่องที่เป็นไปไม่ได้เลย..."
52240-110 = "แต่บังเอิญว่าโรงเรียนที่มีการแลกเปลี่ยนกับเราเป็นประจำมี 'จอมเวท' คนหนึ่งที่ซ่อมแซมหนังสือได้#nต่อให้เหลือหนังสืออยู่แค่บางส่วน..."
52240-119 = "จะบอกว่ามนุษย์ธรรมดาซ่อม <อิโนะ โมโนโนเคะ โรคุ> ได้งั้นเหรอ...?"
52240-120 = "ไม่มีทาง เรื่องแบบนั้นมันเป็นไปไม่ได้..."
52240-126 = "แต่ว่าหนังสือเล่มนี้ไม่มีอะไรเขียนไว้เลยนะ...!"
52240-127 = "ใช่ค่ะ ต่อให้เป็นจอมเวทที่ซ่อมรูปเล่มของหนังสือที่ถูกเผาไปได้ แต่ก็อนุมานเนื้อหาที่ถูกเผาไปแล้ว#nไม่ได้หรอกค่ะ"
52240-132 = "ถ้างั้นก็ไม่มีประโยชน์น่ะสิ? พลังจากหนังสือลึกลับมาจากเรื่องลึกลับที่เขียนไว้ข้างในนั้นนะ!"
52240-133 = "ต่อให้มีหนังสือเก่าๆ ที่ภายนอกดูเหมือนกันเปี๊ยบ แต่ยังไงก็..."
52240-136 = "อ้อ หมายถึงหนังสือรวมเรื่องลึกลับเก่าๆ เล่มนั้นน่ะหรือ? กับอีแค่หนังสือเก่าๆ จะไปมีความหมายอะไร"
52240-139 = "ไม่มีค่าอะไรหรอก..."
52240-143 = "ค่ะ ใช่แล้วค่ะ หนังสือลึกลับที่ไม่มีเนื้อหาอะไรเขียนไว้เลยก็ไม่ต่างจากห่อกระดาษเก่าๆ หรอกค่ะ"
52240-144 = "แต่ถ้าเขียนเรื่องราวใหม่ลงไปในหนังสือว่างๆ เล่มนี้เอง มันจะไม่ดีกว่าเหรอคะ"
52240-145 = "คุณนักประพันธ์ชื่อดัง 'คุจิกิ ชูระ'?"
52240-146 = "คุจิกิ ชูระ...?"
52240-147 = "คุจิกิ ชูระ... คือ..."
52240-148 = "[s] \"นามปากกาของชูโระงั้นเหรอ...?\""
52240-149 = "ธะ... เธอรู้จักชื่อนั้นได้ยังไงน่ะ!"
52240-150 = "ตายจริง จะไม่รู้ได้ยังไงล่ะคะ ก็คุณอัปโหลดนิยายของตัวเองในเว็บไซต์นิยายออนไลน์ <เขียนนิยายกัน> เป็นประจำทุกสัปดาห์เลยนี่คะ"
52240-151 = "ส่วนตัวแล้วฉันชอบซีรีส์ <นักเล่าเรื่องลึกลับเลเวลลิ่ง> มากเลยละค่ะ~"
52240-153 = "วะ... หวาาา!"
52240-154 = "แน่นอนว่าเรื่องนั้นเป็นผลงานชิ้นเอกที่เนื้อเรื่องพัฒนาอย่างรวดเร็วและตัวเอกมีความสามารถในการ#nโกงที่ดึงดูดรสนิยมผู้อ่าน ทุกครั้งที่อัปโหลดตอนใหม่ก็เลยมีคอมเมนต์เดือดๆ มากมายนับไม่ถ้วน..."
52240-155 = "ตะ... แต่ยังไงก็...!"
52240-156 = "ฉันรู้ค่ะว่าสิ่งที่คุณอยากพูดไม่ใช่เรื่องเล็กๆ น้อยๆ แบบนั้น แต่น่าจะเป็นเรื่องที่ลึกซึ้งกว่านั้นมาก"
52240-157 = "ถ้ามีใครไม่เห็นคุณค่าของงานเขียนนั้น คุณก็น่าจะรู้สึกไม่ยุติธรรมเอามากๆ เลยนะคะ"
52240-161 = "เธอก็... อ่านนิยายของฉันด้วยเหรอ?"
52240-162 = "ใช่ค่ะ ฉันบอกไปแล้วนี่คะว่าชอบ"
52240-163 = "ว่ายังไงล่ะคะ แม่หนูชูโระ?"
52240-164 = "ไม่สงสัยบ้างเหรอคะว่าถ้างานเขียนของคุณได้พลังของหนังสือลึกลับแล้วปรากฏเป็นความจริงขึ้นมา ผู้อ่านที่เคยเยาะเย้ยงานเขียนของคุณว่า 'โครงเรื่องไม่สมจริง' จะทำหน้ายังไงกัน?"
52240-165 = "คุณไม่อยากถ่ายทอดความรู้สึกไม่ยุติธรรมและทุกข์ทรมานที่ไม่มีใครอ่านงานของคุณอย่างจริงใจ#nให้ทุกคนได้รู้เหรอคะ?"
52240-166 = "คุณไม่คิดอยากให้คนอื่นได้รับรู้ความรู้สึกนั้นเหรอคะ?"
52240-170 = "เฮือก..."
52240-171 = "ถึงจะหลอกล่อฉันด้วยการยกยอปอปั้นแบบนั้น ฉันก็ไม่คิดจะร่วมมือกับพวกเธอหรอกนะ"
52240-172 = "นอกจากการสร้างตำนานร้อยเรื่องราวตามเจตนารมณ์ของท่านโคคุริโกะแล้ว ฉันก็ไม่สนใจเรื่องอื่น..."
52240-173 = "แต่คุณจะลองสร้างตำนานร้อยเรื่องราวใหม่ๆ ในเฮียกคิยาโคก็ได้นะคะ"
52240-174 = "วะ... ว่าไงนะ? พูดจริงเหรอ?"
52240-175 = "ค่ะ เพราะฉันเองก็สงสัยว่าผู้คนจะคลั่งไคล้อะไรมากกว่ากัน ระหว่างเรื่องราวของนักเล่าเรื่องพรั่นพรึง#nคนนั้นกับเรื่องราวของคุณ"
52240-176 = "เดี๋ยวก่อน หัวหน้านิยะ ถ้าทำแบบนั้น ความโกลาหลมันจะเพิ่มเป็นสองเท่าเลยนะ..."
52240-177 = "ชู่ว"

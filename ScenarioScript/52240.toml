52240-69 = "3;키쿄;02;그래서 한 가지 묻고 싶은데, 니야 부장.\n#3;a"
52240-70 = "3;키쿄;05;축제를 계속하는 것만으로 아야메 부장의 백물어— 그, 히토츠메의 힘을 억제할 수 있는 거야?\n#3;em;[?]"
52240-71 = "3;니야;03;정확히 말씀드리자면 그 괴예가의 말처럼 미봉책인 것은 사실입니다."
52240-72 = "3;니야;02;축제를 통해 한껏 달아오른 사람들의 열기가 공포를 잊게 하여 백물어의 힘을 약화시킨 것은 사실이지만……\n#3;em;…"
52240-73 = "3;니야;03;사람의 감정이란 언제나 한 가지 상태로 고정되지 않으니까요."
52240-74 = "3;니야;10;축제의 분위기가 가라앉으면 다시금 히토츠메가 백귀야행의 전역에 시선을 비추기 시작할 겁니다."
52240-75 = "3;니야;06;게다가 가장 큰 문제는, 백화요란의 부장 아야메 그 자체라……"
52240-76 = "3;유카리;04;아야메 부장에게 무슨 또 다른 문제라도 있는 건가요?\n#3;em;[?]"
52240-77 = "3;니야;06;문제가 있다면……\n#3;stiff\n#3;em;[땀]"
52240-78 = "3;니야;12;아야메 부장이 너무 강한 탓에, 백화요란 내에서 그녀를 일대일로 상대할 수 있는 학생이 존재하지 않는다는 점이 문제입니다."
52240-79 = "3;유카리;08;화, 확실히 그건……\n#3;stiff"
52240-80 = "3;유카리;08\n2;나구사ND;08;나조차도 대련에서 아야메를 이겨본 적은 단 한 번도 없었으니까.\n#3;m4\n#2;a"
52240-81 = "3;니야;10;그리고 아야메 부장이 건재한 이상, 히토츠메는 아무리 해치운다 하더라도 사람의 공포를 머금으며 계속 세를 불려 나갈 테지요.\n#2;hide"

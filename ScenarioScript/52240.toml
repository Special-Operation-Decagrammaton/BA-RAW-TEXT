[translation]
52240-1 = "Episode 24;The Cry of Relief"
52240-2 = "Nyahaha! Now that's what they call a \"close call.\""
52240-3 = "I played it cool as a cucumber, so they wouldn't expect anything, but what would I have done if you actually didn't show up? Nyahaha!"
52240-4 = "How could we fail to respond?"
52240-5 = "It is our tradition, after all. A single white firework launched from the Tenshukaku is the Yin-Yang Club's signal for aid."
52240-6 = "It was perfect timing!"
52240-7 = "Tch... Those Nature's Beauty guys sure are quick on their feet, though. Every time I think I've got them by the tail, they slip away like the snakes they are."
52240-8 = "...What're you looking at, huh?"
52240-9 = "Oh? Now this is unexpected."
52240-10 = "An unusual menagerie, to be sure. You all must have had quite the adventure."
52240-11 = "[s1] \"Are YOU okay, Niya?\" \n[s2] \"Do you have any serious injuries?\""
52240-14 = "Yes, yes. I'm hardier than I look, you know."
52240-15 = "And thanks to your trusty guards, the Waraku Festival wasn't shut down."
52240-16 = "[s] \"I'm just glad it worked out.\""
52240-17 = "Your assistance was invaluable, as a matter of fact."
52240-18 = "On the other hand, I can only achieve so much with my power."
52240-19 = "What an absurdity...the Hundred Ghost Stories... It rendered me useless."
52240-20 = "Perhaps the time has come for me to step down from the Yin-Yang Club presidency..."
52240-26 = "N-Nyaaah?!"
52240-27 = "Please stay still! You're getting in the way of disinfecting the wound!"
52240-28 = "Th-This little scrape can wait until later..."
52240-29 = "If we don't treat it now, it might leave a big scar on your face."
52240-30 = "Whether it's something big or small, if you miss the right moment, you can't take it back."
52240-31 = "...Nagusa."
52240-32 = "[s3] \"Everyone needs help sometimes.\" \n[s4] \"You think you can't do anything without my help...\""
52240-37 = "[ns] \"...but I would be nothing without each of you.\""
52240-38 = "...As you say, Sensei."
52240-43 = "You're right. This is no time for despair and complaints."
52240-44 = "To begin, I would like to welcome each of you back to the safety of our district, [USERNAME] Sensei, Hyakkaryouran."
52240-45 = "...As well as the little bard from Nature's Beauty."
52240-49 = "Who are you calling little?!"
52240-50 = "Let's get on the same page. I'll begin with what information the Yin-Yang Club has gathered so far."
52240-51 = "We can't form a plan until we have a thorough understanding of the situation. Separate fact from fiction, reality from illusion."
52240-52 = "Yes. Rumors and whispers will be our undoing."
52240-54 = "I see. That's where Ayame's path took her..."
52240-55 = "I'd sensed, but always overlooked, her internal fragility. She seemed to fortify it with that perfectly curated image of hers, after all."
52240-56 = "That was negligence on my part. The pressure of the Hyakkaryouran presidency had been crushing her all along."
52240-57 = "I... I didn't even see it. Of all people, I should've understood her suffering."
52240-58 = "...We cannot lay the blame upon one person."
52240-59 = "How many times must I repeat myself, Nagusa? Your proclivity for shouldering all the world's burdens on your own is a terrible habit."
52240-60 = "Exactly! Each and every one of us feel Ayame's pain deep within our souls!"
52240-61 = "And next time, we're gonna grab her and hold her so tight that she never feels this way again!"
52240-65 = "...Yes. We all, collectively, are fervently wishing for her safe return."
52240-69 = "May I pose a question, President Niya?"
52240-70 = "Will this festival truly be enough to suppress President Ayame's Phantom Fable, Hitotsume's power?"
52240-71 = "Not at all. As that ghost artist said, it's a temporary fix."
52240-72 = "The cheer and fervor of a festival amongst chaos did help temper the Phantom Fable's power..."
52240-73 = "...but emotions are a fickle thing."
52240-74 = "Let the novelty and excitement fade, and it won't be long before Hitotsume's gaze will grip Hyakkiyako again."
52240-75 = "But the biggest obstacle is Ayame..."
52240-76 = "Is there more which ails President Ayame?"
52240-77 = "More so that she, herself, is the problem."
52240-78 = "Who can possibly take her on? Ayame has always reigned as the strongest of the Hyakkaryouran."
52240-79 = "Th-That is undeniably true..."
52240-80 = "Even I have never bested Ayame in a spar, not a single time."
52240-81 = "And as long as President Ayame remains, so does the Hitotsume. It will use the people's fear to regenerate again and again."
52240-82 = "Damn... She was our most reliable ally...which makes her our most threatening enemy."
52240-83 = "We're not completely out of options, though."
52240-84 = "Your legendary gun, the Hundred Lotus, can pierce through their tomes and monsters. And we have all you lovely members of the Hyakkaryouran as well."
52240-85 = "Dispel the Artifact Spirits littering the streets one by one, and we'll find our opportunity to destroy the tome."
52240-86 = "There's one of the Hundred Lotus, and about a million monsters out there, though. How are we supposed to fight all of them?"
52240-87 = "Well, we could also...counter them with the power of another tome."
52240-88 = "As they say, fight fire with fire."
52240-89 = "The best strategy to fight an unbeatable power is to use the same power against it."
52240-90 = "You possess a tome of your own?"
52240-91 = "Well—"
52240-96 = "Huh? What is this you're blathering about?"
52240-97 = "Fight tome with tome? You think I'd be twiddling my thumbs here if a tome was that easy to come by?"
52240-98 = "Even I, the Nature's Beauty's bard, took a really long time to learn how to control Inou's Phantom Records! Even if you somehow got your hands on one—"
52240-99 = "Yes. That's the one. Inou's Phantom Records."
52240-100 = "What...?"
52240-104 = "Here, take it."
52240-106 = "This is the Phantom Records...?"
52240-107 = "N-No way. It can't be. You guys messed it up and burned it last time, didn't you...?"
52240-108 = "You're exactly right. All we could recover was the charred cover, and a few torn-up pages."
52240-109 = "With such scarce remnants, it should've been hopelessly impossible for us to restore any book, let alone a cursed tome."
52240-110 = "But lucky us! We happen to have a very good relationship with an academy who claims a magician of their own. They can restore whole books from scraps and pieces."
52240-119 = "You mean to say...some ordinary old human restored Inou's Phantom Records?"
52240-120 = "There's no way! I won't believe it!"
52240-126 = "...It's completely blank?! There's nothing in here!"
52240-127 = "Well, naturally, even the magician couldn't pull its contents out of thin air. The pages themselves were completely burned, after all."
52240-132 = "Then it's useless! A tome's power comes from the stories written inside it!"
52240-133 = "Even if you have a pretty cover that looks the same..."
52240-136 = "Oh, that tattered ghost story book? What could you possibly need with that old thing?"
52240-139 = "...it's worthless without its stories."
52240-143 = "You're right. Without them, a tome is no better than a stack of papers, isn't it?"
52240-144 = "In that case, why don't we just write our own stories?"
52240-145 = "Hm, renowned novelist, Kuchiki Shura?"
52240-146 = "...Kuchiki Shura?"
52240-147 = "Kuchiki Shura, as in..."
52240-148 = "[s] \"That was Shuro's pen name, wasn't it?\""
52240-149 = "H-How do you know that?!"
52240-150 = "Oh my, how could I not? You post your stories online at \"Let's Write Novels\" every week, don't you?"
52240-151 = "I personally was a huge fan of \"I Became a Ghost Bard and Solo-Leveled in a New World!\""
52240-153 = "Wh-Whoaaa! WHOAAA!"
52240-154 = "Of course, its breakneck pacing and cheat-level skills made it a polarizing masterpiece, so the comments turned into a complete warzone with every new update..."
52240-155 = "Th‑That's because...!"
52240-156 = "You don't even have to explain. The point of your work wasn't those trivial tropes, but an exploration of the profound themes behind them, wasn't it?"
52240-157 = "I truly feel for you. How unbearable for people to not see and understand your artistic decisions."
52240-161 = "You... You really read my stuff?"
52240-162 = "I told you I liked it, didn't I?"
52240-163 = "So what do you think, Author Shuro?"
52240-164 = "This tome could manifest your stories in reality. Just imagine the looks on all your doubters' faces. The ones who scoffed at your unrealistic plot twists."
52240-165 = "How did you feel when no one understood your writing? Frustrated? Miserable? So angry you could barely breathe?"
52240-166 = "Don't you want to...make them feel that too?"
52240-170 = "*gasp*"
52240-171 = "D-Don't even try to flatter me! I won't help you!"
52240-172 = "I do what Kokuriko wants! I want to create a new Hundred Ghost Stories for her! That's it!"
52240-173 = "And that's okay. Even if you spread new ghost stories through Hyakkiyako, that's okay."
52240-174 = "Wh-What? Seriously?"
52240-175 = "Have I lied to you yet? In fact, there's something I'm quite curious about. To whose stories will the people flock, yours? Or that ghost artist?"
52240-176 = "Hold on, President Niya. I don't think that's going to help the situation—"
52240-177 = "Shush."
52240-178 = "For now, let this play out."
52240-182 = "My own...Hundred Ghost Stories..."
52240-185 = "Understand that, and you'll one day have a tome of your own."
52240-188 = "My own tome..."
52240-192 = "Well then, what say you?"
52240-200 = "I can really write...whatever I want?"
52240-202 = "Then... The next song...is..."
52240-206 = "Keep it up, Chise! You can do it!"
52240-224 = "Flanking us, Pina!"
52240-225 = "From the front too! We are thoroughly outnumbered!"
52240-226 = "Ugh... It seemed like we had the upper hand for a little bit, but they just started multiplying again out of nowhere."
52240-227 = "We're not going to be able to hold out for much longer..."
52240-232 = "Huh? Is someone...screaming?"
52240-233 = "Or maybe a cat crying?"
52240-234 = "Augh! It could be that monster from last—"
52240-246 = "NYAAAAAAH!"
52240-250 = "...What is that pathetic thing?"
52240-251 = "It's...nothing like the monster cat that attacked us last festival."
52240-252 = "Did some kid draw this thing?"
52240-259 = "[log=슈로]\"In the hands of the greatest ghost bard to ever exist, Myouki Kurokage was reborn...[/log]"
52240-261 = "[log=슈로]All you had to do was look at it to see how strong it was...[/log]"
52240-263 = "[log=슈로]Anyway, it was so scary, that everyone trembled before it...\"[/log]"
52240-266 = "[log=슈로]\"So... [wa:1000]It was ginormous,[wa:1000] with long whiskers, and its big horn could pierce through anything...[/log]"
52240-268 = "[log=슈로]It was super-evil looking.\"[/log]"
52240-271 = "[log=슈로]\"It roared like a big cat... [wa:1000]No, a noble and powerful beast...[/log]"
52240-273 = "[log=슈로]Right, it looked like a huge lion...\"[/log]"
52240-277 = "Ahahaha! What the heck is that?"
52240-278 = "Maybe it's a part of the Waraku Festival?"
52240-279 = "It's kinda cute, isn't it?"
52240-280 = "President, Tsukuyo! The monsters have been thrown off-guard!"
52240-281 = "Now is our chance to turn things around! Surprise attack!"
52240-282 = "H-How? We can't shoot them...or bomb them..."
52240-283 = "And barricading them or tricking them hasn't been working either..."
52240-286 = "Eek?! Wh-When did you get so close...?"
52240-289 = "Tsukuyo, look out!"
52240-297 = "Did our attack...just land?"
52240-298 = "What is happening right now?"
52240-302 = "Hold it! Even if this is fiction, isn't that way over the top?"
52240-303 = "No matter how strong the opponent is, you still have to follow the rules! You're undermining your own plot!"
52240-304 = "Amateur readers like you are exactly what hold back literature! There's only one trope for a situation like this!"
52240-309 = "[log=슈로]\"At that moment...[wa:1000]an insanely powerful ninja appeared.\"[/log]"
52240-318 = "Wah?! Izuna feels...incredible power surging within her!"
52240-319 = "What is happening, President?"
52240-320 = "I have...no idea... This is too scary for me..."
52240-321 = "W-Well...at least we can fight the monsters now! We should protect...the stage!"
52240-326 = "Ninjutsu Research Club! Charge!"

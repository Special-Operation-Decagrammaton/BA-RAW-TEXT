52240-59 = "3;키쿄;05;모든 책임을 홀로 짊어지려는 건 당신의 나쁜 습관이라고 했을텐데, 나구사 선배."
52240-60 = "2;렌게;01\n4;유카리;05;맞사와요. 아야메 선배의 고통에 가슴 아파하는 건 저희 모두 마찬가지라고요!\n#4;em;[!]\n#3;hide"

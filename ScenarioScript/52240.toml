52240-54 = "3;니야;06;과연, 그렇군요. 아야메 양이 결국 그런 결정을……\n#3;a\n#3;em;…"
52240-55 = "3;니야;10;어딘가 완벽하면서도 위태로워 보이는 사람이라는 생각은 자주 했지만, 그 정도로 곪아 있었을 줄이야."
52240-56 = "3;니야;06;백화요란의 부장이 그토록 몰려 있었다는 것을 간과했다니, 제 불찰이로군요.\n#3;em;[한숨]"
52240-57 = "3;나구사ND;12;아니, 친구의 고통을 이해하지 못한 것은 오히려 내 불찰이야. 좀 더 아야메를 이해했더라면—\n#3;em;…"

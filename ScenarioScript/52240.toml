52240-202 = "ถ้างั้นก็... เพลงต่อไป..."
52240-206 = "ชิเซะจัง สู้ๆ นะ! ฉันเชียร์อยู่ค่ะ!"
52240-224 = "ท่านพีน่า พวกนั้นแห่มาทางข้างหลังอีกแล้วค่ะ!"
52240-225 = "มาข้างหน้าพร้อมกันด้วย... มากันมากเกินไปจนรับมือพร้อมกันไม่ได้เลยค่ะ!"

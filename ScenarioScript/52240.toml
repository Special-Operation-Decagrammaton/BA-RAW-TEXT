[translation]
52240-1 = "第24話;驅散不安的鬼哭聲"
52240-2 = "喵哈哈～差點就倒大楣了呢。"
52240-3 = "雖然為了讓對方放鬆警惕而裝作若無其事的樣子，#n其實我心裡正為你們會不會來而擔心得直冒冷汗呢……"
52240-4 = "我們怎麼可能會沒注意到那個信號呢。"
52240-5 = "從天守閣放出的白色煙火，是象徵陰陽部內部出現問題的傳統信號。"
52240-6 = "真是完美的時～機！"
52240-7 = "嘖……花鳥風月部的傢伙怎麼都跑得那麼快啊？#n好不容易才抓到他們的尾巴，結果又像蛇一樣溜走了。"
52240-8 = "……為什麼要看著我說啊？"
52240-9 = "哎呀，沒想到各位還帶了意外的同伴回來呢。"
52240-10 = "從這奇妙的組合來看，一路上想必發生了不少事吧。"
52240-11 = "[s1]「你沒事吧，仁耶？」\n[s2]「傷勢沒有太嚴重吧？」"
52240-14 = "是的，我自認身體還算結實。"
52240-15 = "多虧[USERNAME]老師為我安排了可靠的護衛，才能讓和樂祭順利繼續舉行。"
52240-16 = "[s]「能幫上忙就好。」"
52240-17 = "是的，您真是幫了大忙。"
52240-18 = "相較之下，我能做的也就僅有像往常一樣分辨是非、維持現狀而已。"
52240-19 = "面對像百物語這種巨大的荒謬，我一個人實在無能為力。"
52240-20 = "看來我離卸下陰陽部部長之位的那天也不遠──"
52240-26 = "──喵，喵啊！？"
52240-27 = "請您先別亂動！小女子正在為傷口消毒！"
52240-28 = "這，這種小傷之後再處理也沒關係的……"
52240-29 = "現在不處理的話，臉上可能會留下很大的疤痕哦。"
52240-30 = "無論事情是大還是小……一旦錯過時機，就再也無法挽回了。"
52240-31 = "……名草同學。"
52240-32 = "[s3]「世上沒有能獨自完成一切的人。」\n[s4]「如果仁耶說缺少我的幫助就什麼也做不了……」"
52240-37 = "[ns]「那麼我也和你一樣，沒有學生根本什麼也不是。」"
52240-38 = "既然老師您都這麼說了……"
52240-43 = "現在的確不是洩氣的時候呢。"
52240-44 = "首先，歡迎各位平安回到本館。#n[USERNAME]老師，還有百花繚亂的各位。"
52240-45 = "……以及花鳥風月部的小小怪談家。"
52240-49 = "你說誰小啊！"
52240-50 = "為了整理狀況，我先向各位分享陰陽部這段時間收集到的情報。"
52240-51 = "要想掌握現狀並制定對策，就必須分辨記錄與流言、實體與虛像才行。"
52240-52 = "嗯，我也同意。#n沒有比未經整理的情報更危險的敵人了。"
52240-54 = "原來如此，菖蒲同學最後做出了那樣的決定啊……"
52240-55 = "雖然我一直認為他是個完美卻危險的人，沒想到內心居然已經腐爛到了這種程度。"
52240-56 = "沒能留意百花繚亂委員長承受的壓力，是我的疏失。"
52240-57 = "不，真正有錯的，是沒能理解朋友痛苦的我。#n如果我能更了解菖蒲的話──"
52240-58 = "……應該說我們大家都有錯吧。"
52240-59 = "總是獨自扛下所有責任是你的壞習慣……我應該說過了吧，名草前輩？"
52240-60 = "是啊！為菖蒲前輩的痛苦而感到心痛的不只有前輩，我們大家都一樣！"
52240-61 = "這次一定要緊緊抓住他，絕不再讓菖蒲前輩有那種想法！"
52240-65 = "……嗯。守護菖蒲，是我們所有人的目標。"
52240-69 = "我想請教你一件事，仁耶部長。"
52240-70 = "真的只要繼續舉辦祭典，就能壓制菖蒲的百物語──那個「一目」的力量嗎？"
52240-71 = "其實那個怪藝家說的沒錯，這的確只是權宜之計而已。"
52240-72 = "透過祭典讓人們的熱情暫時高漲、忘卻恐懼，確實能削弱百物語的力量……"
52240-73 = "不過人的情緒，不可能永遠維持在相同的狀態。"
52240-74 = "一旦祭典的氣氛冷卻下來，一目就會再次將視線投向整個百鬼夜行。"
52240-75 = "最大的問題，就出在百花繚亂的委員長……菖蒲本人身上。"
52240-76 = "菖蒲委員長有什麼問題嗎？"
52240-77 = "這個嘛……"
52240-78 = "問題就是菖蒲委員長實在太強，以至於百花繚亂根本沒有能單獨對抗他的學生存在。"
52240-79 = "確，確實如此呢……"
52240-80 = "我也從來沒有在對練中贏過菖蒲任何一次。"
52240-81 = "只要菖蒲委員長還在，一目即使被打倒也會吸收恐懼持續壯大。"
52240-82 = "可惡……明明當同伴的時候那麼可靠，成為敵人之後卻完全無計可施。"
52240-83 = "不過也不是完全沒有辦法。"
52240-84 = "至少我們這裡有能狙擊怪書的傳說魔槍「百蓮」，還有百花繚亂的各位。"
52240-85 = "只要一路擊退街上的怪談並接近菖蒲，也許就能找到摧毀怪書的機會。"
52240-86 = "話是這麼說沒錯啦……#n可是百蓮只有一把，我們要怎麼同時對付這麼多怪異啊？"
52240-87 = "還有另一個方法……就是用怪書的力量來對抗。"
52240-88 = "不是有句話叫「以毒攻毒」嗎？"
52240-89 = "要對付怪書的話，用怪書的力量反擊才是最有效的上策。"
52240-90 = "怪書的力量……？#n你的意思是我們也有怪書嗎？"
52240-91 = "這個嘛──"
52240-96 = "哈，聽你說了半天……"
52240-97 = "要用怪書的力量對抗怪書？#n如果怪書那麼容易就能弄到的話，我還會落得這副德性嗎！"
52240-98 = "而且就連我這個花鳥風月部的怪談家，都花了很久才有辦法駕馭《稻生物怪錄》。#n就算你們現在拿到新的怪書──"
52240-99 = "沒錯，就是那本《稻生物怪錄》。"
52240-100 = "什麼……？"
52240-104 = "來，拿去吧。"
52240-106 = "這是《稻生物怪錄》……？"
52240-107 = "怎，怎麼可能……#n《稻生物怪錄》明明已經在上次事件中被撕碎、燒毀了才對……"
52240-108 = "確實如此。#n我們後來在清理現場時，也只找到燒焦的封面和幾張破碎的書頁而已。"
52240-109 = "光憑那些殘骸就想復原怪書的內容，可說是不可能的事……"
52240-110 = "不過在我們定期交流的某所學園裡，#n正好有位僅需部分書頁就能復原書籍的「魔術師」存在……"
52240-119 = "一個普通人，竟然能把《稻生物怪錄》給復原……？"
52240-120 = "不可能。這種事根本不可能……"
52240-126 = "……而且這本書裡根本什麼都沒寫啊！"
52240-127 = "即便是那位魔術師，也只能復原被燒毀的書本材質，而無法推測被燒毀的內容。"
52240-132 = "這樣不就一點意義也沒有了嗎？#n怪書的力量，可是源自於書裡記載的怪談啊！"
52240-133 = "就算拿著這本外觀一模一樣的──"
52240-136 = "啊，那本破舊的怪談集嗎？#n那種破書有什麼意義。"
52240-139 = "也一點意義……都沒有。"
52240-143 = "沒錯。沒有任何內容的怪書，不過是疊破舊的紙罷了。"
52240-144 = "既然如此──直接在這本空白的書裡寫下新的故事不就行了嗎？"
52240-145 = "由人氣小說家「朽木修羅」老師親筆撰寫。"
52240-146 = "……朽木修羅？"
52240-147 = "朽木修羅不就是……"
52240-148 = "[s]「棕櫚的筆名嗎……？」"
52240-149 = "你，你怎麼會知道這個名字啦！"
52240-150 = "哎呀，我怎麼會不知道呢？#n老師的作品不是每週都在小說投稿網站「來寫小說吧」上連載嗎？"
52240-151 = "我個人最喜歡《在異世界成為怪談家並超速練等》系列呢～"
52240-153 = "嗚哇哇……嗚哇哇哇！"
52240-154 = "雖然因為峰迴路轉的劇情和作弊般的能力，#n成為了每次新章節更新都會導致評論區炎上的另類名作……"
52240-155 = "那，那是因為……！"
52240-156 = "我當然明白。#n朽木修羅老師真正想傳達的並非那些瑣碎的劇情，而是深刻的主題對吧。"
52240-157 = "沒人能明白作品真正的價值，想必讓人無比委屈又難以忍受吧。"
52240-161 = "你……讀過我的小說嗎？"
52240-162 = "是的。我剛才也說過自己很喜歡。"
52240-163 = "棕櫚同學，你不妨試著想想看。"
52240-164 = "如果自己的作品能藉由怪書的力量化為現實……#n你難道不好奇那些曾經嘲笑劇情「不現實」的讀者會露出什麼表情嗎？"
52240-165 = "沒有人願意認真閱讀自己作品的那股委屈、那股悲慘……#n你難道不想讓所有人親眼見證嗎？"
52240-166 = "你難道不想將那份感情……原封不動地奉還給他們嗎？"
52240-170 = "……哈。"
52240-171 = "就，就算用這種好聽話來誘惑我，我也不會幫你們的！"
52240-172 = "除了遵從雛罌粟大人的意志創造百物語之外，我什麼都不──"
52240-173 = "沒關係，就算要在百鬼夜行創造新的百物語也無妨。"
52240-174 = "什，什麼？你是認真的嗎？"
52240-175 = "是啊。你和那位怪藝家的故事，究竟哪邊更引人入勝……我實在很好奇呢。"
52240-176 = "等一下，仁耶部長！#n要是這麼做的話，混亂可是會加倍……"
52240-177 = "噓。"
52240-178 = "先觀察一下情況吧。"
52240-182 = "我的故事……我的百物語……"
52240-185 = "等你真正明白這個道理之後，你也將擁有屬於自己的怪書。"
52240-188 = "屬於我的怪書……"
52240-192 = "如何，差不多該下定決心了吧？"
52240-200 = "……真的想寫什麼都可以嗎？"
52240-202 = "那麼……接下來是下一首曲子……"
52240-206 = "知世醬，加油！Fighting！"
52240-224 = "菲娜閣下，後方又有敵人湧現！"
52240-225 = "前方也……數量太多，無法同時應對！"
52240-226 = "唔唔……怪物的數量才剛減少一點，結果又開始增加了……"
52240-227 = "這樣下去，不知道還能撐多久……"
52240-232 = "咦？這個叫聲是……"
52240-233 = "貓？"
52240-234 = "難道是上次那隻怪貓──"
52240-246 = "喵～～～～～！"
52240-250 = "……那副寒酸的模樣是怎麼回事。"
52240-251 = "總覺得不像之前那隻怪貓……"
52240-252 = "更像是小孩子畫出來的貓咪……"
52240-259 = "[log=슈로]「在最強怪談家手中重生的妖貓『黑影』的模樣是……[/log]"
52240-261 = "[log=슈로]　光看一眼就能感受到強大……[/log]"
52240-263 = "[log=슈로]　總之看起來非常恐怖的驚人模樣。」[/log]"
52240-266 = "[log=슈로]「身形……[wa:1000]非常巨大……[wa:1000]還有長長的鬍鬚和能貫穿一切的角……[/log]"
52240-268 = "[log=슈로]　反正就是極度邪惡的外表……」[/log]"
52240-271 = "[log=슈로]「那咆哮的姿態是貓……[wa:1000]不，是高貴而強大的猛獸……[/log]"
52240-273 = "[log=슈로]　對，就像一頭巨大的獅子……」[/log]"
52240-277 = "啊哈哈，那是什麼東西啊？"
52240-278 = "那也是和樂祭的娛樂項目之一嗎？"
52240-279 = "看起來軟綿綿的，好可愛哦～"
52240-280 = "部長、月夜閣下！怪物們開始動搖了！"
52240-281 = "趁現在發動奇襲吧！"
52240-282 = "可，可是……那些怪物已經不怕我們的槍和炸彈了……"
52240-283 = "挖陷阱阻擋去路或引誘到別的地方，也都不再管用……"
52240-286 = "咦？什麼時候到這裡來了……"
52240-289 = "月夜閣下，危險！"
52240-297 = "攻擊……命中了？"
52240-298 = "為什麼突然……"
52240-302 = "等一下，就算是小說也太離譜了吧？"
52240-303 = "如果因為敵人很強就不顧前後劇情亂寫一通，後續該怎麼收拾啊……？"
52240-304 = "那種外行人的擔心大可不必。#n這種時候的套路早就決定好了！"
52240-309 = "[log=슈로]「就在這時……[wa:1000]一群超強的忍者現身了。」[/log]"
52240-318 = "嗚哇啊啊！？突然湧出了一股驚人的力量！"
52240-319 = "部長，這到底是……"
52240-320 = "我也不知道……這股力量真可怕……"
52240-321 = "總，總之現在似乎能阻止怪物了，我們快行動吧！"
52240-326 = "忍術研究部，突擊！"

52240-84 = "5;니야;03;일단은 이 자리에 괴서를 저격할 수 있는 전설의 마총, 백련과 백화요란 여러분이 있으니까요."
52240-85 = "5;니야;03;거리를 거니는 괴담을 하나씩 물리치며 아야메에게 접근한다면 괴서를 파괴할 기회가 있을지도 모릅니다."

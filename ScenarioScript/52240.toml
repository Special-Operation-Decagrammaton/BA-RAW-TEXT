52240-182 = "เรื่องราวของฉัน... ตำนานร้อยเรื่องราวของฉัน..."
52240-185 = "เมื่อเจ้าเข้าใจความจริงนี้ เมื่อนั้นเจ้าก็จะมีหนังสือลึกลับของตัวเอง"
52240-188 = "หนังสือลึกลับของฉัน..."

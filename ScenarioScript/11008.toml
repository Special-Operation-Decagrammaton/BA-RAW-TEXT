11008-70 = "えっと……その……あっ、そうだ！まず自己紹介から！"
11008-71 = "私はアロナ！"
11008-72 = "この「シッテムの箱」に常駐しているシステム管理者であり、メインOS、そしてこれから先生をアシストする秘書です！"
11008-73 = "やっと会うことができました！私はここで先生をずっと、ずーっと待っていました！"
11008-74 = "[s] \"寝てたわけではなくて？\""
11008-75 = "あ、あうう……も、もちろんたまに居眠りしたりしたこともあるけど……。"
11008-76 = "[s] \"よろしくね。\""
11008-77 = "はい！よろしくお願いします！"
11008-78 = "まだ身体のバージョンが低い状態でして、特に声帯周りの調整が必要なのですが……。"
11008-79 = "これから先、頑張って色々な面で先生のことをサポートしていきますね！"
11008-80 = "あ、そうだ！ではまず、形式的ではありますが、生体認証を行います♪"
11008-81 = "うう……少し恥ずかしいですが、手続きだから仕方ないんです。こちらの方に来てください。"
11008-84 = "もう少しです。"
11008-88 = "さあ、この私の指に、先生の指を当ててください。"
11008-92 = "うふふ。まるで指切りして約束するみたいでしょう？"
11008-93 = "はい？宇宙人の映画のワンシーンみたいですって？"
11008-94 = "実は、これで生体情報の指紋を確認するんです！"
11008-95 = "画面に残った指紋を目視で確認するのですが……すぐ終わります！#nこう見えて目は良いので。"
11008-98 = "どれどれ……。"
11008-99 = "うう……。"
11008-100 = "（うーん……よく見えないかも……）"
11008-101 = "（……まあ、これでいいですかね？）"
11008-103 = "……はい！確認終わりました♪"
11008-104 = "え？真面目にやって、って？て、手抜きしてるみたいですって？#nえっと……そんなことありません！"
11008-105 = "……。"
11008-106 = "最近の機械は指紋認識ぐらいは自動、ですって？え、1秒もかからないんですか？#nわ、私にはそんな最先端の機能はないですが……。"
11008-107 = "そ、そんな能力なくてもアロナは役に立ちますから！？目でも十分確認できますから！"
11008-108 = "……全然信じてないって顔ですね……。"
11008-109 = "……。"
11008-110 = "うう……。"
11008-111 = "（ウルッ）"
11008-112 = "だったらその最先端のナントカさんのところに行ってしまったらどうですか！"
11008-113 = "[s] 冗談だったと慰める。"
11008-114 = "くすん……。"
11008-116 = "（いっぱい慰めてあげた）"
11008-118 = "……。"
11008-119 = "なるほど……先生の事情は大体わかりました。"
11008-120 = "連邦生徒会長が行方不明になって、そのせいでキヴォトスのタワーを制御する手段がなくなった……。"
11008-121 = "[s5] \"連邦生徒会長について知ってる？\"\n[s6] \"連邦生徒会長って誰？\""
11008-122 = "私はキヴォトスの情報の多くを知ってはいますが……連邦生徒会長についてはほとんど知りません。#n彼女が何者なのか、どうしていなくなったのかも……。"
11008-123 = "私はキヴォトスの情報の多くを知ってはいますが……連邦生徒会長についてはほとんど知りません。#n彼女が何者なのか、どうしていなくなったのかも……。"
11008-124 = "お役に立てず、すみません。"
11008-125 = "……ですが、サンクトゥムタワーの問題は私が何とか解決できそうです。"
11008-126 = "[s] \"じゃあお願い、アロナ。\""
11008-127 = "はい！分かりました。 それでは、サンクトゥムタワーのアクセス権を修復します！"
11008-128 = "少々お待ちください！"
11008-130 = "（ウイィィィィィィン――――）"
11008-138 = "……。"
11008-139 = "サンクトゥムタワーのadmin権限を取得完了……。"
11008-140 = "先生。サンクトゥムタワーの制御権を無事に回収できました。#n今サンクトゥムタワーは、私アロナの統制下にあります。"
11008-141 = "今のキヴォトスは、先生の支配下にあるも同然です！"
11008-142 = "先生が承認さえしてくだされば、サンクトゥムタワーの制御権を連邦生徒会に移管できます。"
11008-143 = "でも……大丈夫ですか？連邦生徒会に制御権を渡しても……。"
11008-144 = "[s7] \"大丈夫。\"\n[s8] \"承認する。\""
11008-145 = "分かりました。これよりサンクトゥムタワーの制御権を連邦生徒会に移管します！"
11008-146 = "分かりました。これよりサンクトゥムタワーの制御権を連邦生徒会に移管します！"
11008-148 = "……はい。分かりました。"
11008-149 = "（カチャッ）サンクトゥムタワーの制御権の確保が確認できました。"
11008-150 = "これからは連邦生徒会長がいた頃と同じように、行政管理を進められますね。"
11008-151 = "お疲れ様でした、先生。#nキヴォトスの混乱を防いでくれたことに、連邦生徒会を代表して深く感謝いたします。"
11008-152 = "ここを攻撃した不良たちと停学中の生徒たちについては、これから追跡して討伐いたしますので、ご心配なく。"
11008-153 = "それでは「シッテムの箱」は渡しましたし、私の役目は終わったようですね。"
11008-154 = "……あ、もう一つありました。"
11008-155 = "ついてきてください。連邦捜査部「シャーレ」をご紹介いたします。"
11008-158 = "ここがシャーレのメインロビーです。"
11008-159 = "長い間空っぽでしたけど、ようやく主人を迎えることになりましたね。"
11008-160 = "（ガチャッ、バタン）"
11008-164 = "そして、ここがシャーレの部室です。"
11008-165 = "ここで先生のお仕事を始めると良いでしょう。"
11008-166 = "[s] \"私はこれから何をすればいい？\""
11008-167 = "……シャーレは、権限だけはありますが目標のない組織なので、#n特に何かをやらなきゃいけない……という強制力は存在しません。"
11008-168 = "キヴォトスのどんな学園の自治区にも自由に出入りでき、所属に関係なく、先生が希望する生徒たちを部員として加入させることも可能です……。"
11008-169 = "面白いですよね。#n捜査部とは呼んでいますが、その部分に関しては、連邦生徒会長も特に触れていませんでした。"
11008-170 = "つまり、何でも先生がやりたいことをやって良い……ということですね。"
11008-171 = "……。"
11008-172 = "……本人に聞いてみたくても、連邦生徒会長は相変わらず行方不明のまま。"
11008-173 = "私たちは彼女を探すのに全力を尽くしているため、キヴォトスのあちこちで起きる問題に対応できるほどの余力がありません。"
11008-174 = "今も連邦生徒会に寄せられてくるあらゆる苦情……#n支援物資の要請、環境改善、落第生への特別授業、部の支援要請などなど……。"
11008-175 = "……もしかしたら、時間が有り余っている「シャーレ」なら、この面倒な苦情の数々を解決できるかもしれませんね。"
11008-176 = "その辺りに関する書類は、先生の机の上にたくさん置いておきました。気が向いたらお読みください。"
11008-177 = "すべては、先生の自由ですので。"
11008-178 = "それではごゆっくり。必要な時には、またご連絡いたします。"
11008-181 = "ええ。サンクトゥムタワーの制御権を連邦生徒会が取り戻したことを確認したわ。"
11008-182 = "ワカモは自治区に逃げてしまったのですけど……すぐ捕まるでしょう。私たちはここまで。"
11008-183 = "あとは、担当者に任せます。"
11008-184 = "お疲れ様でした、先生。先生の活躍はキヴォトス全域に広がるでしょう。すぐにSNSで話題になってしまうかもしれませんね？"
11008-185 = "[s] \"みんなお疲れ様。\""
11008-186 = "これでお別れですが、近いうちにぜひ、トリニティ総合学園に立ち寄ってください。先生。"
11008-188 = "（ぺこり）"
11008-189 = "私も、風紀委員長に今日のことを報告しに戻ります。ゲヘナ学園にいらっしゃった時は、ぜひ訪ねてください。"
11008-190 = "ミレニアムサイエンススクールに来てくだされば、またお会いできるかも？先生、ではまた！"
11008-192 = "[ns] シャーレのオフィスに戻る。"
11008-194 = "……。"
11008-195 = "ああ……これは困りましたね……。"
11008-196 = "フフ……フフフ。"
11008-198 = "……ウフフフフフフ♡"
11008-200 = "あはは……なんだか慌ただしい感じでしたが……#nある程度、落ち着いたみたいですね。お疲れ様でした。"
11008-201 = "[s] \"アロナもお疲れ様。\""
11008-202 = "はい！でも、本当に大変なのは、これからですよ？"
11008-203 = "これから先生と一緒に、キヴォトスの生徒たちが直面している問題を解決していくのです……！"
11008-204 = "単純に見えても決して簡単ではない……とっても重要なことです。"
11008-205 = "それではキヴォトスを、シャーレをよろしくお願いします、先生。"
11008-206 = "[s9] \"よろしくね、アロナ。\"\n[s10] \"こちらこそ。\""
11008-207 = "それではこれより、連邦捜査部「シャーレ」として、最初の公式任務を始めましょう！"
11008-208 = "それではこれより、連邦捜査部「シャーレ」として、最初の公式任務を始めましょう！"

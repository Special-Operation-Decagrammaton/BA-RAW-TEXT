11008-65 = "この空間に入ってきたっていうことは、ま、ま、まさか[USERNAME]先生……？！"
11008-66 = "[s3] \"そうだよ。\"\n[s4] \"君は誰？\""
11008-67 = "う、うわああ！？そ、そうですね！？もうこんな時間！？"
11008-68 = "う、うわああ！？そ、そうですね！？もうこんな時間！？"

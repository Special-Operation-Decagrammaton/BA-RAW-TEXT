11008-28 = "歡迎來到「希迪姆的箱子」，[USERNAME]老師。"
11008-29 = "為了進行生物識別以及製作認證書，切換為主作業系統A.R.O.N.A。"
11008-35 = "？？？"
11008-36 = "（在從未見過的教室裡，有個女孩趴在桌子上打瞌睡）"
11008-37 = "呼嗚嗚……Zzzz"
11008-38 = "呼嗚嗚……Zzzz"
11008-39 = "唔喵，蜂蜜蛋糕的話……比起草莓牛奶……香蕉牛奶更……"
11008-40 = "呼嗚嗚……Zzzz"
11008-43 = "耶嘿……還有很多唷……"
11008-44 = "[s1] 搖醒\n[s2] 戳臉頰"
11008-45 = "（搖搖晃晃）"
11008-46 = "嗚嘿……"
11008-47 = "……嗚嘿……嘻嘿！？"
11008-48 = "（喀噹）"
11008-49 = "（戳）"
11008-50 = "唔喵……還不夠唷……不好好咀嚼的話……"
11008-52 = "（戳戳）"
11008-53 = "啊嗚，但是……"
11008-56 = "（戳戳戳）"
11008-57 = "……嗚嗯。"
11008-58 = "（喀噹）"
11008-60 = "（驚醒）"
11008-61 = "唔喵……嗯哞……啊呀？"
11008-62 = "啊呀，啊呀啊呀……？"
11008-63 = "耶？啊咧？啊咧咧？"
11008-64 = "老，老師！？"
11008-65 = "能進入這個空間就表示，難，難，難道是[USERNAME]老師……？！"
11008-66 = "[s3]「沒錯唷。」\n[s4]「你是誰？」"
11008-67 = "嗚，嗚哇啊啊！？這，這樣啊！？已經這個時間了！？"
11008-68 = "嗚，嗚哇啊啊！？這，這樣啊！？已經這個時間了！？"
11008-69 = "嗚哇，哇啊啊？冷靜下來，冷靜下來……"
11008-70 = "那個……這個……啊，對了！先從自我介紹開始！"
11008-71 = "我是彩奈！"
11008-72 = "是常駐在這個「希迪姆的箱子」的系統管理者和主OS，也是今後協助老師的秘書！"
11008-73 = "終於能見面了！我在這裡等老師很久很──久了！"
11008-74 = "[s]「不是在睡覺嗎？」"
11008-75 = "啊，啊嗚……當，當然偶爾也會打瞌睡……"
11008-76 = "[s]「請多指教。」"
11008-77 = "是！請多多指教！"
11008-78 = "雖然身體的版本還處於較低的狀態，特別是聲帶周圍還有必要進行調整……"
11008-79 = "今後，我會努力在各方面支援老師的！"
11008-80 = "啊，對了！那麼首先，雖然只是個形式，來進行生物識別吧♪"
11008-81 = "唔……雖然有點難為情，但因為是手續所以沒辦法。請到這邊來。"
11008-84 = "請再靠近一點。"
11008-88 = "來，請老師用手指對準我的手指。"
11008-92 = "呵呵呵。就像在打勾勾約定對吧？"
11008-93 = "嗯？像是外星人電影裡的一幕？"
11008-94 = "事實上，這是在確認生物資訊的指紋！"
11008-95 = "要用眼睛確認殘留在畫面上的指紋……馬上就結束了！#n別看我這樣，我的眼睛很好的。"
11008-98 = "讓我看看……"
11008-99 = "唔……"
11008-100 = "（唔嗯……好像看不清楚……）"
11008-101 = "（……算了，這樣就可以了吧？）"
11008-103 = "……好！確認完畢了♪ "
11008-104 = "咦？認真點？好像在偷懶？ #n那個……才沒有那種事！"
11008-105 = "……"
11008-106 = "你說最近的機器都是自動指紋識別？咦，連一秒都不用？ #n我，我沒有那種最先進的功能……"
11008-107 = "不，不過就算沒有那種能力，彩奈也能派上用場的！用眼睛也能充分確認！"
11008-108 = "……是完全不相信的表情呢……"
11008-109 = "……"
11008-110 = "嗚嗚……"
11008-111 = "（哭泣）"
11008-112 = "那你不如去找那個最先進的虛擬助理怎麼樣啊！"
11008-113 = "[s] 安慰她說是開玩笑的"
11008-114 = "嗚嗚……"
11008-116 = "（安慰了很久）"
11008-118 = "……"
11008-119 = "原來如此……老師的情況我大致上了解了。"
11008-120 = "聯邦學生會長下落不明，因此失去了控制奇普托斯的塔的手段……"
11008-121 = "[s5]「你知道聯邦學生會長的事嗎？」\n[s6]「聯邦學生會長是誰？」"
11008-122 = "雖然我知道很多奇普托斯的資訊……但對聯邦學生會長幾乎一無所知。 #n她是什麼人，又為何而失去了蹤影……"
11008-123 = "雖然我知道很多奇普托斯的資訊……但對聯邦學生會長幾乎一無所知。 #n她是什麼人，又為何而失去了蹤影……"
11008-124 = "沒能幫上忙，對不起。"
11008-125 = "……但是，聖所之塔的問題我應該能解決。 "
11008-126 = "[s]「那就拜託你了，彩奈。」"
11008-127 = "是！我明白了。那麼，修復聖所之塔的訪問權限！"
11008-128 = "請稍等一下！"
11008-130 = "（嗚噫──）"
11008-138 = "……"
11008-139 = "已取得聖所之塔的admin權限…… "
11008-140 = "老師，順利收回聖所之塔的控制權了。 #n現在聖所之塔在我彩奈的控制之下。"
11008-141 = "現在的奇普托斯就像在老師的支配底下一樣！"
11008-142 = "只要老師批准，就可以將聖所之塔的控制權移交給聯邦學生會。"
11008-143 = "但是……沒關係嗎？把控制權移交給聯邦學生會……"
11008-144 = "[s7]「沒關係。」\n[s8]「我同意。」"
11008-145 = "我明白了。從現在起將聖所之塔的控制權移交給聯邦學生會！"
11008-146 = "我明白了。從現在起將聖所之塔的控制權移交給聯邦學生會！"
11008-148 = "……好的。我知道了。"
11008-149 = "（喀嚓）已確認確保了聖所之塔的控制權。"
11008-150 = "現在可以像聯邦學生會長在的時候一樣，進行行政管理了。"
11008-151 = "辛苦了，老師。 #n對於阻止了奇普托斯的混亂，我代表聯邦學生會致上衷心的感謝。"
11008-152 = "至於攻擊這裡的不良份子和停學學生，今後將會追蹤及討伐，請不用擔心。"
11008-153 = "既然「希迪姆的箱子」已經交給你，看來我的任務已經結束了呢。"
11008-154 = "……啊，還有一件事。"
11008-155 = "請跟我來。我來介紹一下聯邦搜查部「夏萊」。"
11008-158 = "這裡是夏萊的主大廳。"
11008-159 = "雖然閒置了很長一段時間，總算能迎接主人了。"
11008-160 = "（喀嚓，碰）"
11008-164 = "然後，這裡是夏萊的社團辦公室。"
11008-165 = "可以在這裡開始老師的工作。"
11008-166 = "[s]「我接下來該做什麼？」"
11008-167 = "……夏萊是只有權限但沒有目標的組織， #n所以不存在必須特別做點什麼……這樣的強制力。"
11008-168 = "可以自由進出奇普托斯任何學園的自治區，無論其所屬單位，可以讓老師希望的學生作為成員加入……"
11008-169 = "很有趣吧。 #n雖然被稱為聯邦搜查部，但聯邦學生會長沒有特別提及這件事。"
11008-170 = "也就是說，做任何老師想做的事都可以……就是這個意思。"
11008-171 = "……"
11008-172 = "……即使想詢問本人，但聯邦學生會長依然下落不明。"
11008-173 = "我們正在全力尋找她，因此沒有餘力應付奇普托斯各地發生的問題。"
11008-174 = "現在也不斷傳向聯邦學生會的各種陳情…… #n支援物資的請求、環境的改善、不及格學生的特別課程、社團的支援請求等等……"
11008-175 = "……或許，如果是時間充裕的「夏萊」，也許能夠解決這些麻煩的陳請也說不定。"
11008-176 = "與其相關的文件已經擺滿老師的桌子了。有興趣的話請讀一讀。"
11008-177 = "一切都是老師的自由。"
11008-178 = "那麼請自便。必要的時候會再聯絡你的。"
11008-181 = "是的。已確認聯邦學生會重新取得了聖所之塔的控制權。"
11008-182 = "若藻逃到自治區去了……應該很快就會被逮捕吧。我們就先告辭了。"
11008-183 = "之後就交給負責人了。"
11008-184 = "辛苦了，老師。老師的活躍表現將會傳遍整個奇普托斯吧。說不定很快就會成為社交媒體上的話題哦？"
11008-185 = "[s]「大家辛苦了。」"
11008-186 = "雖然得告辭了，不過近期請務必來三一綜合學園看看。老師。"
11008-188 = "（行禮） "
11008-189 = "我也要回去向風紀委員長報告今天的事。來格黑娜學園的時候請務必來拜訪。"
11008-190 = "如果來千年科學學園的話，也許還能再見面吧？老師，下次見！"
11008-192 = "[ns] 回到夏萊的辦公室"
11008-194 = "……"
11008-195 = "啊啊……這下麻煩了呢……"
11008-196 = "呵呵……呵呵呵 。"
11008-198 = "……嗯呵呵呵呵呵呵♡"
11008-200 = "啊哈哈……總覺得有點倉促…… #n但某種程度上似乎告一段落了呢。辛苦了。"
11008-201 = "[s]「彩奈也辛苦了。」"
11008-202 = "是！不過，真正辛苦的事現在才開始唷？"
11008-203 = "接下來要和老師一起去解決奇普托斯的學生們面臨的問題……！"
11008-204 = "看似單純卻是一點也不簡單……非常重要的事。"
11008-205 = "那麼奇普托斯還有夏萊就拜託你了，老師。"
11008-206 = "[s9]「請多關照，彩奈。」\n[s10]「彼此彼此。」"
11008-207 = "那麼接下來，開始聯邦搜查部「夏萊」第一個正式的任務吧！"
11008-208 = "那麼接下來，開始聯邦搜查部「夏萊」第一個正式的任務吧！"

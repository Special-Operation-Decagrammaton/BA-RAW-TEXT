[translation]
1000205-1 = "The Raging Epicure"
1000205-2 = "Glitzy Downtown Street"
1000205-3 = "*rumble*"
1000205-4 = "What happened? The building exploded!"
1000205-5 = "That's where that famous restaurant is..."
1000205-6 = "What's going on?"
1000205-7 = "*rumble*"
1000205-15 = "...Heh. Sensei! I didn't expect to see you here."
1000205-16 = "[s1] \"Haruna! Is that smoke coming off of you?\"\n[s2] \"You have soot all over you!\""
1000205-17 = "Oh, yeah. It's a long story. "
1000205-18 = "Oh, yeah. It's a long story. "
1000205-21 = "(*shaking off the soot*)"
1000205-22 = "Let's get out of here."
1000205-24 = "Phew. We should be fine here."
1000205-25 = "[s] \"What happened?\""
1000205-26 = "Like I said, it's kind of a long story... But..."
1000205-29 = "Pierre Garnish, Restaurant"
1000205-30 = "Welcome to Pierre Garnish. Do you have a reservation?"
1000205-31 = "Yes. Table for Kurodate Haruna."
1000205-32 = "Very well. Right this way. "
1000205-33 = "Allow us to take your bag."
1000205-34 = "Oh, thank you."
1000205-37 = "(sneaks)"
1000205-38 = "There's something you must know. Our restaurant specializes in full multi-course meals, so we don't accept single customers."
1000205-39 = "Huh. I didn't know that was your policy. I reserved a table for one, though..."
1000205-40 = "It was implemented just yesterday."
1000205-41 = "..."
1000205-42 = "But as you said, you made the reservation before the policy changed, so we'll make an exception."
1000205-43 = "Wow, thank you! In that case, what should I order...?"
1000205-44 = "I recommend the Pierre. It's the best set on our menu."
1000205-45 = "Oh... Okay. I'll get that."
1000205-46 = "Please wait a moment."
1000205-49 = "...Hmm."
1000205-51 = "Here's your bread, served with a foie gras appetizer."
1000205-52 = "Hmm..."
1000205-54 = "And here is the oyster salad, part of your entree."
1000205-55 = "Mmm..."
1000205-57 = "Here's your main course, the chateaubriand steak."
1000205-58 = "..."
1000205-60 = "And for dessert, the fruit sorbet."
1000205-61 = "..."
1000205-63 = "...Yes. Here is your receipt. Thank you."
1000205-64 = "..."
1000205-65 = "How was your dinner? Did you enjoy each dish?"
1000205-66 = "The dishes... "
1000205-67 = "...Heh heh heh heh heh heh."
1000205-68 = "...?"
1000205-69 = "We'll bring you a to-go box."
1000205-70 = "Heh. You don't need to do that."
1000205-71 = "Pardon?"
1000205-72 = "*strains*"
1000205-73 = "A d-detonator?"
1000205-74 = "*baaaaaang*"
1000205-76 = "..."
1000205-77 = "[s] \"Are you telling me you blew that place up because you didn't like their food?!\""
1000205-78 = "It wasn't just because of that, Sensei."
1000205-79 = "When you serve food, it's not just about the taste."
1000205-80 = "Their arrogance when they said they didn't accept reservations for one."
1000205-81 = "Their audacity when they didn't allow me, the customer, to choose my own meal."
1000205-82 = "There was no aperitif—no cocktail before my meal. There wasn't even an amuse-bouche. A meal NEEDS a bite-sized appetizer."
1000205-83 = "They didn't even ask how I'd like my steak cooked. How rude!"
1000205-84 = "Everyone knows chateaubriand has to be cooked medium rare!"
1000205-85 = "I expect the service AND food to be luxurious at a gourmet restaurant."
1000205-86 = "[s3] \"I'm not sure I follow any of this...\"\n[s4] \"I can tell you're super upset about this.\""
1000205-87 = "..."
1000205-88 = "..."
1000205-89 = "But I'll give them one thing. I don't enjoy eating good food alone."
1000205-90 = "Heh heh. "
1000205-91 = "I should go back and take a shower. I smell like smoke... "
1000205-92 = "I feel like overcooked yakitori!"
1000205-93 = "Okay, then...Sensei. I'll be a new me next time we meet."
1000205-100 = "(Haruna staggered away, looking a little lonely.)"

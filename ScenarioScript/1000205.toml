[translation]
1000205-1 = "憤怒的美食家"
1000205-2 = "市中心．高級街道"
1000205-3 = "（人聲嘈雜）"
1000205-4 = "咦？建築物爆炸了！？"
1000205-5 = "那邊不是，那間知名餐廳的位置嗎……"
1000205-6 = "發生了什麼事嗎？"
1000205-7 = "（人聲嘈雜）"
1000205-15 = "……唔哼哼。哎呀，這不是老師嗎？沒想到能在這裡遇到你。"
1000205-16 = "[s1] 「羽留奈？妳的身體在冒煙耶？」\n[s2] 「身上都是煤灰唷？」"
1000205-17 = "啊啊，稍微遇到了一些麻煩事。"
1000205-18 = "啊啊，稍微遇到了一些麻煩事。"
1000205-21 = "（抱住）"
1000205-22 = "總之，我們先離開這裡吧。"
1000205-24 = "呼，來到這裡應該就沒問題了。"
1000205-25 = "[s]「發生什麼事？」"
1000205-26 = "說起來有點複雜……"
1000205-29 = "餐廳．PierreGarnish"
1000205-30 = "歡迎光臨PierreGarnish。請問您有預約嗎？"
1000205-31 = "是，預約的名字是黑館羽留奈。"
1000205-32 = "我明白了，這邊請。"
1000205-33 = "看起來很重呢，背包請交給我們保管吧。"
1000205-34 = "哎呀，謝謝你。"
1000205-37 = "（咻）"
1000205-38 = "啊啊，有件事必須告知您……本店是為兩位以上的客人提供套餐料理的專門店，無法服務兩位以下的客人。"
1000205-39 = "……哎呀，我不曉得還有那種規定。不過我確實是以一位預約完成的……"
1000205-40 = "是，正好是昨天改變的政策。"
1000205-41 = "……"
1000205-42 = "但如您所說，這是在預約時沒有的政策，所以這次特別讓您破例。"
1000205-43 = "是這樣啊，謝謝你。那麼點餐……"
1000205-44 = "我推薦您我們店裡最棒的餐點，皮耶爾套餐。"
1000205-45 = "啊……是。那麼，就請給我一份。"
1000205-46 = "請您稍候。"
1000205-49 = "……"
1000205-51 = "這道是，前菜的麵包佐鵝肝醬。"
1000205-52 = "……呼嗯。"
1000205-54 = "這道是，牡蠣沙拉。"
1000205-55 = "唔──嗯……"
1000205-57 = "這道是主餐，夏多布里昂牛排。"
1000205-58 = "……"
1000205-60 = "這道是甜點，水果雪酪。"
1000205-61 = "……"
1000205-63 = "……是，收到付款了。謝謝您的光臨。"
1000205-64 = "……"
1000205-65 = "請問今天的用餐還滿意嗎？料理有合您的胃口嗎？"
1000205-66 = "料理…… "
1000205-67 = "……呵呵呵呵呵。"
1000205-68 = "……？"
1000205-69 = "我幫您把行李拿過來，請稍等一下。"
1000205-70 = "哼哼，沒有那個必要。"
1000205-71 = "……是？"
1000205-72 = "（按下）"
1000205-73 = "引，引爆裝置！？"
1000205-74 = "（咚哐──！！）"
1000205-76 = "……"
1000205-77 = "[s] 「也就是說，因為不滿意料理所以就把餐廳炸掉嗎！？」"
1000205-78 = "不只是因為那個原因呢，老師。"
1000205-79 = "所謂料理，不只是以食物款待，還應當蘊含味道以外的意義。"
1000205-80 = "明明已經預約了，後來卻說不接受一位客人光顧的傲慢。 "
1000205-81 = "強硬推銷阻礙客人選擇餐點。"
1000205-82 = "沒有[ruby=Aperitifu]餐前酒[/ruby]，還跳過了[ruby=Amuse Bouche]開胃菜[/ruby]的套餐構成。"
1000205-83 = "牛排熟度也沒有詢問，不謙的態度。"
1000205-84 = "你知道嗎？再說了夏多布里昂牛排一定得是三分熟才行的。"
1000205-85 = "對於高級的料理，必須同時提供與料理同等高級的服務品質。"
1000205-86 = "[s3] 「有些有點聽不懂……」\n[s4] 「我能理解妳很生氣了。」"
1000205-87 = "…… "
1000205-88 = "…… "
1000205-89 = "更重要的是，我現在才意識到，一個人吃飯時並沒有想像中那麼好吃。"
1000205-90 = "唔呵呵。"
1000205-91 = "不回去沖澡不行呢，而且也變得有點散發著燒焦味……"
1000205-92 = "感覺就像烤過頭的雞肉串一樣呢。"
1000205-93 = "那麼……老師，下次我會用更乾淨的模樣跟你見面的。"
1000205-100 = "（羽留奈不知為何散發著寂寞的氣息，步履蹣跚地離開了）"

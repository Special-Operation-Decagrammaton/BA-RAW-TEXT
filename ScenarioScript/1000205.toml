[translation]
1000205-1 = "นักชิมแห่งความเกรี้ยวกราด"
1000205-2 = "ถนนย่านดาวน์ทาวน์หรู"
1000205-3 = "(เสียงพูดคุยจอแจ)"
1000205-4 = "เกิดอะไรขึ้นน่ะ? อาคารระเบิดงั้นเหรอ?"
1000205-5 = "นั่นมันร้านอาหารชื่อดังไม่ใช่เหรอ...."
1000205-6 = "เกิดอะไรขึ้นน่ะ?"
1000205-7 = "(เสียงพูดคุยจอแจ)"
1000205-15 = ".....ฮุฮุ คุณครูเองเหรอคะ? บังเอิญจังเลยที่เจอกันที่นี่"
1000205-16 = "[s1] \"ฮารุนะ? ทำไมถึงควันลอยออกมาแบบนั้นล่ะ?\"\n[s2] \"ทำไมถึงมีเขม่าควันติดตัวแบบนั้นล่ะ?\""
1000205-17 = "อ่อ.... มีเรื่องน่ารำคาญใจเกิดขึ้นนิดหน่อยค่ะ"
1000205-18 = "อ่อ.... มีเรื่องน่ารำคาญใจเกิดขึ้นนิดหน่อยค่ะ"
1000205-21 = "(ปัดเขม่าออก)"
1000205-22 = "เรารีบไปจากตรงนี้ก่อนเถอะค่ะ"
1000205-24 = "ฮุฮุ มาถึงตรงนี้คงไม่เป็นไรแล้วค่ะ"
1000205-25 = "[s] \"เกิดอะไรขึ้นเหรอ?\""
1000205-26 = "ถ้าให้เล่าทั้งหมดเรื่องมันยาวค่ะ.... เพราะงั้น...."
1000205-29 = "ร้านอาหาร เพอร์รี การ์นิช"
1000205-30 = "ยินดีต้อนรับครับ ร้านเพอร์รี การ์นิชครับ ได้จองไว้รึเปล่าครับ?"
1000205-31 = "ค่ะ จองไว้ในชื่อคุโรดาเตะ ฮารุนะค่ะ"
1000205-32 = "ครับ เชิญทางนี้ได้เลยครับ"
1000205-33 = "กระเป๋าดูเหมือนจะหนักมากนะครับ เดี๋ยวทางเราถือให้นะครับ"
1000205-34 = "อ๊ะ ขอบคุณมากค่ะ"
1000205-37 = "(แอบมอง)"
1000205-38 = "ทางเราขอแจ้งให้ทราบก่อนนะครับ ร้านของเราเป็นร้านที่เสิร์ฟอาหารแบบฟูลคอร์ส#nดังนั้นจึงจะไม่รับลูกค้าที่มาแค่ท่านเดียว"
1000205-39 = "....อืม ฉันไม่ทราบเงื่อนไขข้อนี้มาก่อนเลยค่ะ ฉันเลยจองโต๊ะเอาไว้สำหรับหนึ่งคน...."
1000205-40 = "ครับ ร้านของเราเพิ่งเปลี่ยนกฎเมื่อวานน่ะครับ"
1000205-41 = "......"
1000205-42 = "แต่ว่าคุณลูกค้าได้ทำการจองเอาไว้ก่อนที่ทางร้านจะเปลี่ยนกฎ ดังนั้นเราจะถือเป็นกรณียกเว้นครับ"
1000205-43 = "ขอบคุณมากค่ะ ถ้างั้นเมนู...."
1000205-44 = "ผมขอแนะนำเมนูชื่อดังของร้านเรา \"เพอร์รี\" ครับ"
1000205-45 = "..... ค่ะ เอาเมนูนั้นก็ได้ค่ะ"
1000205-46 = "รอสักครู่นะครับ"
1000205-49 = "....อืม"
1000205-51 = "ขออนุญาตเสิร์ฟของว่าง ฟัวกราส์เสิร์ฟพร้อมขนมปังครับ"
1000205-52 = "อืมมมม...."
1000205-54 = "สลัดหอยนางรมครับ"
1000205-55 = "อืม...."
1000205-57 = "ขออนุญาตเสิร์ฟอาหารจานหลัก สเต๊กชาโตบริยองครับ"
1000205-58 = "......"
1000205-60 = "ขออนุญาตเสิร์ฟของหวาน ผลไม้เชอร์เบ็ตครับ"
1000205-61 = "......\n"
1000205-63 = ".....ครับ ชำระเงินเรียบร้อยแล้วครับ ขอบคุณครับ"
1000205-64 = "......"
1000205-65 = "อาหารเป็นยังไงบ้างครับ? รสชาติถูกปากคุณลูกค้ารึเปล่าครับ?"
1000205-66 = "อาหาร...."
1000205-67 = "หึหึหึหึหึหึ...."
1000205-68 = "......?"
1000205-69 = "รอสักครู่นะครับ เราจะนำกระเป๋าที่ฝากไว้มาให้ครับ"
1000205-70 = "หึหึ.... เรื่องนั้นไม่จำเป็นหรอกค่ะ"
1000205-71 = "....ครับ?"
1000205-72 = "(กึ่ก)"
1000205-73 = "ชะ...ชนวนระเบิด?"
1000205-74 = "(ตู้มมมมมมม!!!!!)"
1000205-76 = "....."
1000205-77 = "[s] \"ไม่ถูกใจอาหารเลยระเบิดร้านทิ้งเลยงั้นเหรอ?!\""
1000205-78 = "ไม่ใช่แบบนั้นนะคะคุณครู"
1000205-79 = "การทำอาหารไม่ได้หมายถึงแค่รสชาติที่ดีเท่านั้นนะคะ"
1000205-80 = "แต่ร้านนั้นทั้งหยิ่งเรื่องการรับจองโต๊ะ"
1000205-81 = "ทั้งเรื่องที่ไม่ยอมให้ลูกค้าเลือกเมนูที่ต้องการอีก"
1000205-82 = "ไม่มีไวน์เสิร์ฟก่อนอาหาร แถมยังข้ามอามูส บุชไปอีกด้วย"
1000205-83 = "ที่สำคัญพวกเขาไม่ได้ถามเลยว่าฉันชอบสเต๊กที่สุกประมาณไหน"
1000205-84 = "แล้วรู้ไหมคะ? ชาโตบริยองน่ะจะต้องย่างแค่สุกปานกลางเท่านั้นค่ะ!"
1000205-85 = "ร้านอาหารระดับสูงนอกจากอาหารที่เลิศรสแล้วก็ควรมีบริการระดับสูงด้วยค่ะ"
1000205-86 = "[s3] \"ไม่เห็นเข้าใจเลย....\"\n[s4] \"ดูเหมือนเธอจะโกรธมากเลยนะ\""
1000205-87 = "...... \n"
1000205-88 = "...... \n"
1000205-89 = "ยิ่งกว่านั้น ฉันเพิ่งรู้ว่าการกินอาหารคนเดียวมันไม่อร่อยเลยค่ะ"
1000205-90 = "ฮุฮุ"
1000205-91 = "ฉันขอตัวกลับไปอาบน้ำก่อนนะคะ ทั้งตัวมีแต่กลิ่นควันเต็มไปหมดเลย..."
1000205-92 = "รู้สึกเหมือนตัวเองเป็นยากิโทริที่โดนย่างจนไหม้เลยค่ะ"
1000205-93 = "ไว้เจอกันใหม่นะคะคุณครู คราวหน้าเจอกันฉันจะไม่ตัวเลอะอีกเด็ดขาดค่ะ"
1000205-100 = "(ฮารุนะเดินห่างออกไปอย่างเงียบๆ)"

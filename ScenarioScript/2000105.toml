[translation]
2000105-1 = "Studying Is Hard Part 2"
2000105-2 = "Library"
2000105-3 = "..."
2000105-4 = "I'm sorry, Sensei. Even after you helped me study..."
2000105-5 = "Now I have more make-up tests to do. It's hopeless."
2000105-6 = "I'll be held back at this rate."
2000105-7 = "Fortunately, they gave me credit for my activities with Schale and the Maid Club, so I just need to take care of some make-up work."
2000105-8 = "But if I don't get a passing grade for it...I'm finished."
2000105-9 = "They might change my call sign from Zero-Two to Zero-Brains."
2000105-10 = "That's why I'm putting my part-time job and Maid Club activities on hold!"
2000105-11 = "I have to focus on my assignments and nothing else."
2000105-12 = "[s] \"Why did you join the Maid Club if you're so busy?\""
2000105-13 = "Oh, that's because..."
2000105-14 = "...the uniform is cute."
2000105-15 = "[s1] \"That's it?\"\n[s2] \"Can't deny that.\""
2000105-16 = "Wh-What do you mean, \"That's it\"?!"
2000105-17 = "R-Right? You get it, Sensei."
2000105-18 = "It's a crucial point."
2000105-19 = "Originally, I was Seminar's..."
2000105-20 = "...security guard, more or less."
2000105-21 = "My role was to keep critical assets out of the hands of other academies' spies or outside organizations after Millennium's advanced tech."
2000105-22 = "Such as the ones we defeated together recently."
2000105-23 = "Anyway, I got tired of all the combat and espionage, so I decided to look for a new club."
2000105-24 = "That's when I came across the Maid Club."
2000105-25 = "I thought it would be a good opportunity to learn housekeeping skills, such as cleaning and cooking."
2000105-26 = "We would decorate the school together, spend the afternoons enjoying black tea and sweet biscuits..."
2000105-27 = "Not to mention the adorable outfits."
2000105-28 = "..."
2000105-29 = "*sigh* If only it were that simple."
2000105-30 = "[s] \"Why not quit if you joined based on a misunderstanding in the first place?"
2000105-32 = "Because I've grown to like it here."
2000105-33 = "My joining may have come from a misunderstanding. "
2000105-34 = "Still, I'm grateful for the memories and colleagues I've gained since then."
2000105-35 = "In the beginning, I only saw our uniform as cute, but it means so much more to me now."
2000105-36 = "It symbolizes the pride I have in serving Millennium."
2000105-38 = "Good grief. How did we get so off topic?"
2000105-39 = "Sensei, can you stick around until I finish this make-up assignment?"
2000105-40 = "I would have already flunked if not for you, so I'll treat you to dinner once we leave."

[translation]
2000105-1 = "#title;공부는 어려워 2"
2000105-2 = "#place;도서관"
2000105-3 = "3;카린;06;……\n#3;em;[속상함]\n#3;stiff\n#3;a"
2000105-4 = "3;카린;04;미안. 선생님. 그렇게 도와줬는데……."
2000105-5 = "3;카린;04;추가 시험은…… 절망적이다.\n#3;em;[땀]"
2000105-6 = "3;카린;06;이대로 유급할 뻔했는데……."
2000105-7 = "3;카린;01;다행히 샬레와 메이드부 활동을 한 게 점수로 인정돼서, #n보충과제만 처리하면 될 것 같아."
2000105-8 = "3;카린;06;하지만 보충과제도 통과 못 하면…… 그땐 끝이야.\n#3;em;[...]"
2000105-9 = "3;카린;06;그렇게 되면 내 콜사인이 <제로투>에서 <바보>로 바뀔지도 몰라."
2000105-10 = "3;카린;05;때문에 당분간은 아르바이트건 메이드부 활동이건 전부 보류!"
2000105-11 = "3;카린;06;꼼짝없이 과제에만 집중해야 해."
2000105-12 = "[s] \"그렇게 바쁜데 메이드부에는 왜 들어간 거야?\""
2000105-13 = "3;카린;04;아 그야……"
2000105-14 = "3;카린;03;메이드복이 예쁘니까.\n#3;em;[반짝]\n#3;greeting"
2000105-15 = "[s1] \"고작 그런 이유로?\"\n[s2] \"그건 부정할 수 없지.\""
2000105-16 = "3;카린;05;고, 고작 그런 이유라니!\n#3;em;[빠직]\n#3;hophop"
2000105-17 = "3;카린;03;그, 그렇지? #n이해해주는구나 선생님.\n#3;em;[하트]"
2000105-18 = "3;카린;02;중대사항이란 말이야."
2000105-19 = "3;카린;99;애초에 나는, 밀레니엄 학생회 세미나의……"
2000105-20 = "3;카린;01;보안요원이었어."
2000105-21 = "3;카린;02;밀레니엄의 기술력을 탐내는 다른 학원의 공작원이나 외부 조직의 첩보원으로부터 무형의 재산을 지키는 역할이야.\n#3;em;[반응]"
2000105-22 = "3;카린;02;얼마 전 선생님과 함께 물리친 녀석들도 그랬고."
2000105-23 = "3;카린;02;어쨌든 전투니 첩보니 그런 것에 지쳐서, 퇴부를 결심하고 다른 동아리 활동을 결심하고 있었지.\n#3;em;[...]"
2000105-24 = "3;카린;01;그러다…… 메이드부를 보았어."
2000105-25 = "3;카린;03;뭔가 가사라던가 청소라던가 요리 같은 곳을 배우는 곳 같았지.\n#3;em;[반짝]"
2000105-26 = "3;카린;99;함께 학교를 아름답게 가꾸고, 오후에는 따뜻한 홍차와 달콤한 과자로 티타임을 하며"
2000105-27 = "3;카린;99;귀여운 옷을 입을 수 있는…….\n#3;em;[///]"
2000105-28 = "3;카린;99;……"
2000105-29 = "3;카린;06;하아. 그런 곳인 줄 알았는데.\n#3;em;[속상함]\n#3;stiff"
2000105-30 = "[s] \"오해가 있었는데, 어째서 아직도 메이드부 활동을 계속 하는 거야?\""
2000105-31 = "3;카린;01;……"
2000105-32 = "3;카린;02;나는 이미, 이 부활동을 좋아하게 되었으니까."
2000105-33 = "3;카린;02;비록 오해로 시작된 인연이라 해도……"
2000105-34 = "3;카린;03;그 동안 쌓아온 추억과, 동료들에는 감사하고 있어.\n#3;em;…"
2000105-35 = "3;카린;99;단순히 옷이 예뻐서 들어간 곳이었지만, 이제 나에게 메이드복은 그저 예쁜 옷이 아니야."
2000105-36 = "3;카린;03;이 옷은 내가 밀레니엄을 위해 봉사하고 있다는 자부심 같은 거니까.\n#3;em;[반짝]"
2000105-37 = "3;카린;03\n#3;em;…\n#wait;2500"
2000105-38 = "3;카린;04;나 참, 어쩌다 이런 얘기까지 했지.\n#3;em;[///]\n#3;stiff"
2000105-39 = "3;카린;03;선생님. 이거 보충 과제 끝날 때까지 곁에 있어 주지 않겠어?"
2000105-40 = "3;카린;03;어쨌든 선생님 덕분에 낙제를 면했으니 가는 길에 밥이라도 살 테니.\n#3;greeting\n#3;em;[음표]"

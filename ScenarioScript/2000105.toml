[translation]
2000105-1 = "การเรียนหนังสือมันยากจัง 2"
2000105-2 = "ห้องสมุด"
2000105-3 = "......"
2000105-4 = "ขอโทษนะคุณครู อุตส่าห์ช่วยฉันไว้แท้ๆ..."
2000105-5 = "การสอบซ่อม... ดูหมดหวังยังไงก็ไม่รู้"
2000105-6 = "เกือบได้ซ้ำชั้นแล้ว..."
2000105-7 = "ยังดีที่ฉันยังได้คะแนนจากการทำกิจกรรมของชาเล่ต์และชมรมเมด จากนี้ก็คงต้องทำงานซ่อม#nเพิ่มแทนเอา"
2000105-8 = "แต่ถ้าทำงานซ่อมไม่ผ่าน... ก็จบ"
2000105-9 = "ถ้าเป็นอย่างนั้นขึ้นมา รหัสประจำตัวฉันคงเปลี่ยนจาก <ซีโร่ทู> เป็น <จอมโง่>"
2000105-10 = "เพราะฉะนั้นฉันต้องพักงานพาร์ทไทม์และกิจกรรมของชมรมเมดไว้สักพัก!"
2000105-11 = "ต้องโฟกัสกับการทำงานซ่อมเท่านั้น"
2000105-12 = "[s] \"ถ้ายุ่งขนาดนี้จะเข้าชมรมเมดตั้งแต่แรกทำไมล่ะ?\""
2000105-13 = "อ่า นั่นก็..."
2000105-14 = "ก็ชุดเมดมันสวยนี่นา"
2000105-15 = "[s1] \"เหตุผลแค่นี้น่ะเหรอ?\"\n[s2] \"อันนั้นครูก็เห็นด้วย\""
2000105-16 = "เหตุผล... คะ... แค่นี้งั้นเหรอ?"
2000105-17 = "ใช่มั้ยล่ะ? ตาถึงนะเนี่ยคุณครู"
2000105-18 = "นี่คือจุดสำคัญเลยล่ะ"
2000105-19 = "ตอนแรกฉันคือสมาชิกความมั่นคงของ..."
2000105-20 = "สภานักเรียนเซมิน่าของมิลเลเนียม"
2000105-21 = "หน้าที่ของฉันคือการปกป้องทรัพย์สินสำคัญจากนักสืบของโรงเรียนอื่นหรือหน่วยข่าวกรอง#nขององค์กรภายนอกที่อยากได้เทคโนโลยีของมิลเลเนียม"
2000105-22 = "อย่างพวกที่ฉันไล่ไปกับคุณครูเมื่อก่อนหน้านี้ยังไงล่ะ"
2000105-23 = "แต่ฉันก็เบื่อการต่อสู้กับการตามแหล่งข่าว ก็เลยลาออกและตัดสินใจจะทำกิจกรรมของชมรมอื่น"
2000105-24 = "แล้วก็... ได้เจอกับชมรมเมด"
2000105-25 = "ตอนแรกฉันคิดว่าเป็นที่ที่เอาไว้ฝึกแม่บ้าน ฝึกทำความสะอาด และเรียนทำอาหารอะไรทำนองนั้น"
2000105-26 = "ตอนเช้าช่วยกันตกแต่งโรงเรียน ตกเย็นนั่งดื่มชาร้อนๆ กินขนมแล้วนั่งพูดคุยกัน"
2000105-27 = "แถมยังได้ใส่ชุดเมดสวยๆ อีก"
2000105-28 = "......"
2000105-29 = "เฮ้อ คิดว่าจะเป็นแบบนั้นเสียอีก"
2000105-30 = "[s] \"เข้าใจเรื่องชมรมผิด แต่ทำไมยังทำกิจกรรมของชมรมเมดอยู่ล่ะ?\""
2000105-32 = "ก็เพราะฉันชอบที่นี่เข้าแล้วยังไงล่ะ"
2000105-33 = "ถึงมันจะเริ่มจากการเข้าใจผิดก็เถอะ..."
2000105-34 = "แต่ฉันก็รู้สึกประทับใจกับความทรงจำและเพื่อนๆ ในชมรม"
2000105-35 = "ถึงจะเข้าชมรมมาเพราะชุดสวย แต่สำหรับฉัน ตอนนี้ชุดเมดไม่ใช่แค่ชุดที่สวยอย่างเดียวแค่นั้น"
2000105-36 = "มันคือความภาคภูมิที่ฉันทำงานรับใช้มิลเลเนียม"
2000105-38 = "อ่า จริงๆ เลยฉันนี่ ทำไมถึงมาพูดเรื่องนี้อยู่นะ"
2000105-39 = "คุณครู ช่วยอยู่ด้วยกันจนกว่างานซ่อมของฉันจะเสร็จได้มั้ย?"
2000105-40 = "ถ้าไม่ได้คุณครูช่วยไว้ฉันคงสอบตกไปอีกรอบแล้ว ขากลับจะเลี้ยงข้าวแล้วกัน"

[translation]
2000105-1 = "學習很困難（２）"
2000105-2 = "圖書館"
2000105-3 = "……"
2000105-4 = "抱歉，老師。明明你都這麼努力幫我了……"
2000105-5 = "我的補考成績卻……慘不忍睹。"
2000105-6 = "再這樣下去可能得要……留級了。"
2000105-7 = "幸好，在夏萊和女僕部的活動有被認可，#n只要把追加的課題認真完成的話，應該就沒問題了。"
2000105-8 = "但是，要是連追加的課題都沒有完成的話……就真的完蛋了。"
2000105-9 = "如果真的變成那樣的話，我的代號搞不好就要從「02」變成「笨蛋」了。"
2000105-10 = "所以說，我要先把打工和女僕部的活動，全部都暫停！"
2000105-11 = "全心全意地把課題給搞定，沒有別的辦法了。"
2000105-12 = "[s] 「你明明這麼忙，為什麼還要加入女僕部呢？」"
2000105-13 = "那是因為……"
2000105-14 = "……女僕裝，很可愛。"
2000105-15 = "[s1] 「就因為這種理由？」\n[s2] 「這倒是沒說錯。」"
2000105-16 = "什，什麼叫這種理由！"
2000105-17 = "對吧？#n你也能理解我的吧，老師。"
2000105-18 = "……這可是很重要的事。"
2000105-19 = "原本我是千年學生會，研討會的……"
2000105-20 = "保安部成員。"
2000105-21 = "負責從覬覦千年技術力的其他學校的情報員手中，保護資料之類的無形資產。"
2000105-22 = "就像之前和老師一起對抗的傢伙們一樣。"
2000105-23 = "總之後來我漸漸對戰鬥和諜報之類的感到疲累，於是就決定要退出研討會，加入別的社團。"
2000105-24 = "這個時候……我遇到了女僕部。"
2000105-25 = "看起來是個學習如何處理家事、清掃環境、製作料理的地方。"
2000105-26 = "可以一起把學校整理乾淨，或是在午後來點熱騰騰的紅茶和甜點，享受下午茶的時光。"
2000105-27 = "……還可以穿可愛的衣服。"
2000105-28 = "……"
2000105-29 = "哈啊。我本來以為是那種地方的。"
2000105-30 = "[s] 「既然是誤會，為何又繼續待下去呢？」"
2000105-32 = "那是因為，我已經喜歡上這個社團了。"
2000105-33 = "就算是因為誤會而產生的緣分……"
2000105-34 = "我還是很感謝它所帶來的回憶，還有夥伴們。"
2000105-35 = "雖然一開始是因為服裝很可愛，但是對現在的我來說，女僕裝已經不再只是可愛的衣服了。"
2000105-36 = "這件衣服，就像是把我為千年奉獻的精神，化為實體一樣。"
2000105-38 = "呵呵，我真是的，怎麼連這種事都說出來了呢。"
2000105-39 = "老師，在追加的課題結束之前，可以陪在我身邊嗎？"
2000105-40 = "終究是託老師的福才避開了不及格的危機，回去時我請你吃個飯吧。"

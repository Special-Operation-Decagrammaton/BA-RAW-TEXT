[translation]
1301306-1 = "A Slight Deviation"
1301306-2 = "I headed to the Red Winter library after receiving an invitation from Momiji..."
1301306-3 = "Inside the Library"
1301306-7 = "Oh, welcome, Sensei!"
1301306-8 = "[s] \"Huh? Is no one else in today?\""
1301306-9 = "Oh, about that... Today's a holiday."
1301306-10 = "What? Why did I call you on a holiday?"
1301306-11 = "..."
1301306-12 = "Just, hurry up and come in! Come on!"
1301306-15 = "What do you think, Sensei? Isn't it warm?"
1301306-16 = "[s1] \"Yeah. It feels...warm and comfy.\"\n[s2] \"So, why did you call me today?\""
1301306-19 = "A-About that!"
1301306-20 = "Well, you see! Today isn't really an official holiday. More of a temporary one."
1301306-21 = "I'm dodging the question? Fine, you got me there..."
1301306-25 = "Um, Sensei..."
1301306-26 = "Will... Will you...take a nap in the library?"
1301306-27 = "[s] \"What?! Is the librarian allowed to even offer that as an option?!\""
1301306-28 = "Ack! Well, you see..."
1301306-29 = "Sometimes...students or even President Cherino will come to the library just to nap!"
1301306-30 = "So I have to wake all of them up. I had to physically escort President Cherino out once! Not that it was very difficult, with her height and all..."
1301306-31 = "..."
1301306-32 = "Anyways! I got kinda curious why people would come all the way out here just to nap, so I tried it out..."
1301306-33 = "[s] \"You realized that the library is the perfect napping spot?\""
1301306-34 = "...Yes."
1301306-35 = "Wh-Why are you asking why the library is closed?"
1301306-36 = "Th-That's because...!"
1301306-37 = "[s] \"I get it. You wanted to at least seem legit.\""
1301306-38 = "You make it sound bad if you put it that way!"
1301306-39 = "Well, you're not...wrong..."
1301306-40 = "Ugh... It's bad of me, isn't it? Maybe this was a bad idea..."
1301306-41 = "What would people say if they found out that the librarian was using it for such trifling matters?"
1301306-42 = "B-But still, I did set aside some space as a dedicated napping area."
1301306-43 = "Other academies do it too, you know! We're just following suit!"
1301306-47 = "..."
1301306-48 = "I'm sorry, Sensei. I'm just making excuses..."
1301306-49 = "[s3] \"Man, doing an all-nighter sure makes me feel tired.\"\n[s4] \"Am I yawning? Cold weather always makes me sleepy.\""
1301306-52 = "R-Really?"
1301306-53 = "Are you just trying to make me feel better, Sensei?"
1301306-57 = "Hey! Wipe that smile off your face! You're starting to embarrass me!"
1301306-58 = "..."
1301306-59 = "Um, Sensei?"
1301306-65 = "Well, if you really are that tired, do you...maybe want to nap together?"
1301306-66 = "[s] \"Yes, please. My eyes won't stay open.\""
1301306-67 = "Heeheehee... Then please come this way to Red Winter library's brand new napping spot!"
1301306-72 = "The napping area Momiji prepared really was warm and cozy."
1301306-73 = "It had a lot of cushioning and blankets, and she had arranged the bookshelves to keep the sun out of my eyes."
1301306-75 = "Are you comfortable, Sensei?"
1301306-76 = "Your breathing slowed down already. You must have been so tired..."
1301306-77 = "..."
1301306-78 = "You know, Sensei."
1301306-79 = "I... I really like people who understand me."
1301306-83 = "I hope you get some good rest."

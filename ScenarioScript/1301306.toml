[translation]
1301306-1 = "หนีงานกันนิดหน่อย"
1301306-2 = "(หลังจากได้รับคำเชิญจากโมมิจิ คุณครูมุ่งหน้าไปที่ห้องสมุดของเรดวินเทอร์)"
1301306-3 = "ในห้องสมุด"
1301306-7 = "อ๊ะ เชิญเลยค่ะคุณครู!"
1301306-8 = "[s] \"เอ๋? ห้องสมุดไม่มีคนเลยแฮะ?\""
1301306-9 = "อ๊ะ เรื่องนั้น... วันนี้เป็นวันปิดทำการชั่วคราวน่ะค่ะ"
1301306-10 = "คะ? เหตุผลที่ชวนคุณครูมาทั้งๆ ที่เป็นวันปิดทำการของห้องสมุดน่ะเหรอคะ?"
1301306-11 = "..."
1301306-12 = "ก่อนอื่น เข้าไปด้านในกันก่อนเถอะค่ะ เร็วเข้าสิคะ!"
1301306-15 = "เป็นยังไงบ้างคะ คุณครู? เท่านี้อุ่นพอหรือยังคะ?"
1301306-16 = "[s1] \"อื้อ อุ่นมากๆ แล้วก็สบายด้วย\"\n[s2] \"ว่าแต่ว่าเรียกครูมาทำไมเหรอ?\""
1301306-19 = "ระ...เรื่องนั้น..."
1301306-20 = "อย่างแรกเลย... วันนี้ไม่ใช่วันปิดทำการตามปกติหรอกค่ะ แค่ปิดชั่วคราวค่ะ"
1301306-21 = "ตะ...ตอบไม่ตรงคำถามงั้นเหรอคะ? นั่นสิ...นะคะ..."
1301306-25 = "คือว่า... คุณครูคะ"
1301306-26 = "คือ... สนใจลองมานอนกลางวันที่ห้องสมุดดูสักหน่อยมั้ยคะ...?"
1301306-27 = "[s] \"หา? บรรณารักษ์บอกให้คนมานอนในห้องสมุดได้ด้วยเรอะ?!\""
1301306-28 = "นะ...นั่นสิคะ!"
1301306-29 = "มีหลายๆ ครั้งที่พวกนักเรียนหรือท่านประธานเชริโน่แวะมาห้องสมุดเพื่อพักงีบน่ะค่ะ..."
1301306-30 = "ทุกครั้งฉันจะเป็นคนปลุก หรืออย่างในกรณีของประธานเชริโน่ ฉันก็เคยพาไปส่งถึง 2-3 ครั้งเลยค่ะ..."
1301306-31 = "..."
1301306-32 = "ฉันอยากรู้ว่าทำไมคนถึงชอบมานอนกลางวันที่ห้องสมุดของเราก็เลยลองทำตามดูบ้าง..."
1301306-33 = "[s] \"แล้วก็ได้รู้ว่าเป็นที่ที่เหมาะกับการพักงีบเลยใช่มั้ยล่ะ?\""
1301306-34 = "...ใช่ค่ะ"
1301306-35 = "แล้วทำไมถึงปิดห้องสมุดชั่วคราวงั้นเหรอคะ?"
1301306-36 = "ระ...เรื่องนั้น...!"
1301306-37 = "[s] \"เข้าใจแล้ว คงทำตามหน้าที่ของบรรณารักษ์สินะ\""
1301306-38 = "ถะ...ถ้าคุณครูพูดแบบนั้น มัน...!"
1301306-39 = "เอ่อ...มันก็ไม่ใช่...ว่าผิดหรอกค่ะ..."
1301306-40 = "ฮือออ... ว่าแล้วเชียว คงจะแปลกสินะคะ... คงไม่ได้จริงๆ ด้วย"
1301306-41 = "บรรณารักษ์ที่เป็นผู้ดูแลห้องสมุด กลับคิดจะใช้ห้องสมุดเพื่อวัตถุประสงค์ส่วนตัวอย่างการพักงีบ..."
1301306-42 = "ตะ...แต่ว่าฉันจัดโซนแยกส่วนสำหรับนอนพักงีบ...เอาไว้ชั่วคราวแล้ว แต่ว่า..."
1301306-43 = "ได้ยินว่าห้องสมุดของโรงเรียนอื่นๆ มีห้องสำหรับพักงีบแยกเอาไว้เลยด้วยซ้ำค่ะ! พะ...เพราะงั้น ขะ...ขอแค่ครั้งนี้ครั้งเดียว..."
1301306-47 = "..."
1301306-48 = "ขอโทษค่ะ คุณครู... ฉันคงแค่กำลังแก้ตัวอยู่สินะคะ..."
1301306-49 = "[s3] \"ฮ้าว~ พอโต้รุ่งมาทั้งคืน ตอนนี้ก็ชักเริ่มง่วงแล้วสิ\"\n[s4] \"เพราะอากาศข้างนอกเย็นสบายหรือเปล่านะ ตอนนี้ชักง่วงแล้วสิ\""
1301306-52 = "จะ...จริงเหรอคะ?!"
1301306-53 = "คือว่า... คุณครูคงไม่ได้จงใจพูดเพื่อให้ฉันสบายใจหรอกใช่มั้ยคะ...?"
1301306-57 = "ทะ...ทำไมถึงเอาแต่ยิ้ม แล้วไม่ตอบฉันล่ะคะ... แบบนี้มันน่าอายนะคะ...!"
1301306-58 = "..."
1301306-59 = "คือ... คุณครูคะ"
1301306-65 = "ถ้าอย่างนั้น... พวกเรามาพักนอนกลางวันด้วยกันมั้ยคะ...?"
1301306-66 = "[s] \"อื้อ ก็ดีนะ ตอนนี้ครูเหมือนจะวูบได้ทุกเมื่อเลย\""
1301306-67 = "ฮิฮิฮิ... ถ้างั้นเชิญทางนี้เลยค่ะ ฉันเตรียมที่นอนไว้ให้แล้วค่ะ"
1301306-72 = "(ที่นอนที่โมมิจิเตรียมเอาไว้ให้นั้นอุ่นและนุ่มสบายมาก)"
1301306-73 = "(ชั้นหนังสือที่ช่วยบังแสงแดดที่ส่องมาไม่ให้จ้าเกินไป...)"
1301306-75 = "สบายตัวดีหรือเปล่าคะ คุณครู?"
1301306-76 = "นิ่งไปแล้วแฮะ... สงสัยคุณครูจะเหนื่อยมากแน่ๆ เลยค่ะ..."
1301306-77 = "..."
1301306-78 = "คือว่าคุณครูคะ..."
1301306-79 = "ฉันน่ะ... ชอบคนที่เข้าใจฉันมากๆ เลยค่ะ..."
1301306-83 = "ถ้างั้นก็... ฝันดีนะคะ"

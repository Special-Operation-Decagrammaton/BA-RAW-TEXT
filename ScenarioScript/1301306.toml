[translation]
1301306-1 = "些微的脫序"
1301306-2 = "（收到紅葉的邀請，前往了赤冬的圖書館）"
1301306-3 = "圖書館內部"
1301306-7 = "啊，歡迎你來，老師！"
1301306-8 = "[s]「咦？圖書館沒有其他人嗎？」"
1301306-9 = "啊，這是因為……今天是休館日。"
1301306-10 = "嗯？明明休館卻找老師來的原因……？"
1301306-11 = "……"
1301306-12 = "總之請先到裡面來吧！"
1301306-15 = "怎麼樣呀老師？這樣很溫暖吧？"
1301306-16 = "[s1]「嗯，非常溫暖……而且很舒服。」\n[s2]「所以在休館日叫我來的原因是……？」"
1301306-19 = "那，那個……！"
1301306-20 = "其實……今天不是例行休館，而是臨時休館。"
1301306-21 = "這，這不算回答？#n說的也是……"
1301306-25 = "……老師。"
1301306-26 = "老師……要不要在圖書館睡個午覺……？"
1301306-27 = "[s]「咦！？要不要在圖書館睡覺？圖書管理員這麼問沒問題嗎！？」"
1301306-28 = "是，是這樣的！"
1301306-29 = "有時候……潔莉諾會長或其他學生會在圖書館睡午覺……"
1301306-30 = "這種時候我就會去叫醒他們，甚至把潔莉諾會長趕走過好幾次……"
1301306-31 = "……"
1301306-32 = "出於好奇圖書館是否真的那麼好睡的心情嘗試了一下，結果……"
1301306-33 = "[s]「意外發現圖書館睡起來真的很舒服？」"
1301306-34 = "……是的。"
1301306-35 = "那又為何特意臨時休館？"
1301306-36 = "是，是因為……！"
1301306-37 = "[s]「我知道了。是身為管理員的道德底線吧。」"
1301306-38 = "那，那個說法……！"
1301306-39 = "好像，也不能說是錯的……"
1301306-40 = "嗚嗚……果然很奇怪吧……這樣是不行的吧……"
1301306-41 = "負責維護及管理圖書館的管理員，居然為了私利而讓圖書館休館……"
1301306-42 = "不，不過我還是有……臨時劃分出類似休息室的空間……"
1301306-43 = "而且我聽說其他學園的圖書館有附設休息室，所以想說我們也試著……！"
1301306-47 = "……"
1301306-48 = "對不起，老師……我一直在找藉口……"
1301306-49 = "[s3]「呼～啊，熬夜工作之後突然覺得好睏！」\n[s4]「是因為圖書館很溫暖的關係嗎？突然好想睡……」"
1301306-52 = "真，真的嗎！？"
1301306-53 = "那個……不是顧慮我才這麼說的……？"
1301306-57 = "為，為什麼只笑不回答……我會很害羞的……！"
1301306-58 = "……"
1301306-59 = "那個，老師。"
1301306-65 = "既然如此……要不要，一起睡午覺……？"
1301306-66 = "[s]「嗯，感覺馬上就要睡著了。嗯呣嗯呣。」"
1301306-67 = "耶嘿嘿……那麼請到這裡來吧。#n我已經準備好床鋪了。"
1301306-72 = "（紅葉準備的床鋪既溫暖又舒服）"
1301306-73 = "（同時書櫃製造了絕妙的陰影，所以光線並不刺眼）"
1301306-75 = "感覺如何呢，老師？"
1301306-76 = "呼吸已經平緩下來了……看來老師真的很累呢。"
1301306-77 = "……"
1301306-78 = "偷偷跟你說哦，老師。"
1301306-79 = "我真的……很喜歡願意理解我的人。"
1301306-83 = "祝你有個好夢。"

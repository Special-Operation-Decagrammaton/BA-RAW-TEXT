[translation]
10014060-1 = "ตอนที่ 6;ไม่ชอบเลยพวกหนวกหูเนี่ย"
10014060-2 = "คุณครู...? มีเรื่องอะไรเหรอ? เรียกฉันออกมาดึกดื่นแบบนี้"
10014060-3 = "หรือว่าจะให้มาปรึกษาอะไรอีกเหรอ..."
10014060-4 = "หืม...?"
10014060-5 = "จะมาคุยเรื่องที่ฉันไม่ชอบงั้นเหรอ? หมายความว่ายังไงน่ะ?"
10014060-6 = "นั่นมัน หรือว่า..."
10014060-12 = "......?"
10014060-13 = "คุณครู นี่มัน..."
10014060-14 = "[s1] \"อืม อย่างที่คาซึสะคิดนั่นแหละ\"\n[s2] \"บอกว่าจะไม่มาทำให้รำคาญอีกแล้วน่ะ\""
10014060-15 = "อ๋อ... งั้นเหรอ?"
10014060-16 = "อ๋อ... งั้นเหรอ?"
10014060-17 = "คาดไม่ถึงเลยแฮะ...? ทำไม... เรื่องถึงคลี่คลายได้ดีกว่าที่คิดเอาไว้... กันนะ?"
10014060-18 = "หมายความว่ามันจบแล้วเหรอ? จะไม่มาเที่ยวยื่นหนังสือคำท้า... หรือพุ่งเข้ามาหาเรื่องกันแล้วใช่มั้ย? ถูกหรือเปล่า?"
10014060-19 = "........."
10014060-20 = "กะ... ก็ดีเลย! อื้ม! ยัยนั่นก็อายุตั้งเท่าไรแล้ว จะให้มาทำอะไรแบบนั้นไปตลอดก็ไม่ได้ใช่มั้ยล่ะ?"
10014060-21 = "พอถึงเวลาก็คงมีเรื่องที่เลิกทำ แล้วก็มีเรื่องที่ลืมเลือนไปเองแบบนั้นล่ะสิ?"
10014060-22 = "ฮ่ะฮ่ะฮ่ะ! ที่นี้ฉันก็ไปไหนมาไหนได้อย่างสบายใจแล้วสินะ ฮู่ว ดีเลย ดีจริงๆ"
10014060-23 = "......"
10014060-24 = "อืม..."
10014060-25 = "คือว่า..."
10014060-26 = "คุณครู... คือ..."
10014060-27 = "แบบว่านะ... แค่พูดเผื่อไว้เฉยๆ นะ..."
10014060-28 = "ถ้าไม่ว่าอะไร ฉันขอถามอะไรอย่างหนึ่งได้มั้ย?"
10014060-29 = "อันนี้ หนังสือคำท้าอันนี้น่ะ..."
10014060-30 = "มีเหตุผลอะไรรึเปล่า... ที่จะต้องรีบเอามาให้ฉัน... ตอนดึกดื่นแบบนี้น่ะ?"
10014060-34 = "คุณครู...?"
10014060-35 = "[s3] \"คาซึสะเนี่ยหัวไวจริงๆ ด้วย\"\n[s4] \"อื้อ คิดอยู่แล้วว่าต้องถามแบบนั้น\""
10014060-36 = "อะไรกัน ท่าทางแบบนั้น...?"
10014060-37 = "อะไรกัน ท่าทางแบบนั้น...?"
10014060-38 = "หรือว่า..."
10014060-39 = "เกิดเรื่องอะไรกับอุซาวะสินะ?"
10014060-40 = "มีเรื่องอะไรน่ะ? ฉันถามได้ใช่มั้ย?"
10014060-41 = "[s] \"...\""
10014060-43 = "[ns5] \"ถ้าตอบไปก็จะทำให้คาซึสะรำคาญใจอีกนะ\"\n[ns6] \"ให้ครูพูดจะไม่เป็นไรจริงๆ เหรอ?\""
10014060-44 = "........."
10014060-45 = "........."
10014060-46 = "เฮ้อ..."
10014060-47 = "นี่คุณครู..."
10014060-48 = "ฉันเคยบอกไว้รึเปล่า? ฉันน่ะ... จริงๆ แล้ว..."
10014060-49 = "ฉันไม่ชอบ... พวกที่น่าหนวกหูน่ะ..."
10014060-50 = "เวลาอยู่ข้างๆ ก็เจ็บหูไปหมด แล้วก็ทำให้หงุดหงิดด้วย แต่สุดท้ายพอหายไปแล้วก็เป็นห่วงน่ะ"
10014060-51 = "ยิ่งพอเป็นคนแบบนั้นที่มักจะเลือกใช้คำแรงๆ...มันยิ่งทำให้ดูอ่อนแอกว่าเดิม..."
10014060-52 = "เอาเป็นว่านิสัยแบบนั้นน่ะมันไม่มีทางเข้ากับฉันได้เลย เพราะงั้นก็เลยไม่เคยญาติดีกับคนแบบนั้น"
10014060-53 = "เมื่อก่อนก็เป็นแบบนั้น ตอนนี้ก็ด้วย..."
10014060-54 = "แล้วก็น่าจะเป็นแบบนั้นไปเรื่อยๆ ด้วย..."
10014060-55 = "อื้อ... นั่นสิ"
10014060-56 = "มันก็เป็นแบบนั้นมาตลอดอยู่แล้วนี่ แล้วก็อาจจะเป็นแบบนี้ต่อไปตลอดก็ได้นะ"
10014060-60 = "........."
10014060-61 = "เพราะงั้น..."
10014060-63 = "...ตอนนี้อุซาวะอยู่ที่ไหน?"

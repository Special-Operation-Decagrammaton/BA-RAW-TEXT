[translation]
10014060-1 = "第6話;我討厭熱血又吵鬧的笨蛋"
10014060-2 = "……怎麼了嗎老師？#n這種時間找我出來。"
10014060-3 = "難道又是為了諮詢嗎……"
10014060-4 = "……咦？"
10014060-5 = "為了跟我說我可能會不喜歡的話來的？#n那是什麼意思？"
10014060-6 = "難道說……"
10014060-12 = "……？"
10014060-13 = "……老師，這是……"
10014060-14 = "[s1] 「嗯，跟千紗想的一樣。」\n[s2] 「他說不會再來找你麻煩了。」"
10014060-15 = "……啊啊……這樣啊？"
10014060-16 = "……啊啊……這樣啊？"
10014060-17 = "真是意外……？#n總覺得……比預期還快就解決……了？"
10014060-18 = "那麼，這樣就結束了對吧？#n不會再向我提挑戰書……也不會朝我衝過來了對吧？"
10014060-19 = "…………"
10014060-20 = "也，也對，本來就該這樣嘛！#n那傢伙也已經是高中生了，可總算是想通了啊。"
10014060-21 = "那種東西就像是一時的病一樣……#n只要時間到了就會停止或忘記……就是那樣的嘛。"
10014060-22 = "哈啊……這樣我終於能安心睡覺了……太好了。"
10014060-23 = "……"
10014060-24 = "唔嗯……"
10014060-25 = "……我說。"
10014060-26 = "老師，那個……"
10014060-27 = "方便的話……可以問你一個問題嗎……？"
10014060-28 = "……這個挑戰書，為什麼要現在拿過來呢……？"
10014060-29 = "在這麼晚的時間……特地叫我出來……"
10014060-30 = "雖然只是我個人的感覺，難道是有必須現在讓我看到的理由……嗎？"
10014060-34 = "……老師？"
10014060-35 = "[s3] 「千紗果然很敏銳呢。」\n[s4] 「我就覺得你會這麼問。」"
10014060-36 = "那個反應是什麼意思……"
10014060-37 = "那個反應是什麼意思……"
10014060-38 = "莫非……"
10014060-39 = "……宇沢出了什麼事嗎？"
10014060-40 = "啊，還是說……是我不該聽的事？"
10014060-41 = "[s] 「……」"
10014060-43 = "[ns5] 「如果聽了的話，千紗又會捲入麻煩之中哦。」\n[ns6] 「……就算這樣也要聽嗎？」"
10014060-44 = "…………"
10014060-45 = "…………"
10014060-46 = "……唉。"
10014060-47 = "……老師。"
10014060-48 = "我之前也說過了吧？#n我真的是……"
10014060-49 = "……很討厭熱血又吵鬧的笨蛋。"
10014060-50 = "只是在旁邊就會讓人耳朵很痛……還會很煩躁。"
10014060-51 = "不知道為什麼，但那些傢伙總是會說些大話……#n雖然看起來很蠢就是了。"
10014060-52 = "總之，從根本上就和我的個性不和。#n所以我總是跟那種人處得不好。"
10014060-53 = "以前是這樣，現在也是。"
10014060-54 = "……或許，之後也會是這樣……吧。"
10014060-55 = "……嗯，我想會吧。"
10014060-56 = "總之，一直都會是這樣。#n可是，那些傢伙突然不見的時候又會很在意，真搞不懂。"
10014060-60 = "……"
10014060-61 = "……所以呢。"
10014060-63 = "……宇沢在哪？"

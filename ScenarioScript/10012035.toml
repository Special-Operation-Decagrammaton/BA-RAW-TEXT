[translation]
10012035-8 = "How did we lose again?! We had reinforcements this time!"
10012035-9 = "Well...look at her. You can hardly call that reinforcements."
10012035-11 = "...Sensei? Sensei! ...Wh-What are you...doing here?"
10012035-12 = "Really? Sensei? U-Urgh..."
10012035-14 = "Wakamo?! What's wrong with you!"
10012035-16 = "Snap out of it!"
10012035-17 = "Something's wrong with her."
10012035-18 = "Let's retreat for now! We can beat them to a pulp after she comes to her senses!"
10012035-24 = "Ow! I-It stings! Ouch!"
10012035-25 = "Stop, stop! Okay!"
10012035-26 = "...Not again. Damn it."
10012035-27 = "Don't think we're through with you!"
10012035-38 = "Who in the world were they?"
10012035-39 = "They must be the ones who attacked Serika and Hoshino. The ones who came to take our resort."
10012035-40 = "...Right, Sensei?"
10012035-41 = "[s1] \"More or less, I guess.\" \n[s2] \"Not all of them were...\""
10012035-42 = "One of them did seem incredibly shocked to see Sensei."
10012035-43 = "Are you referring to the one who seemed to know you, Sensei?"
10012035-44 = "Is Wakamo an acquaintance of yours?"
10012035-45 = "[s3] \"Um... It's a long story...\"\n[s4] \"Maybe it's best if you don't know...\""
10012035-48 = "......"
10012035-49 = "Sensei..."
10012035-50 = "...Ahh!"
10012035-51 = "What's wrong, Ayane?!"
10012035-52 = "All of our fishing equipment..."
10012035-53 = "Everything was destroyed during the fight!"
10012035-57 = "...?"
10012035-61 = "...!!!"
10012035-63 = "I comforted an extremely disappointed Shiroko as we made our way back to the resort."
10012035-70 = "While I explained what happened to the others, I heard Shiroko mumble \"survival fishing\" at least three times."

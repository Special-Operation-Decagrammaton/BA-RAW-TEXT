[translation]
10012035-8 = "นะ... นี่มันอะไรกันเนี่ย!? เราแพ้อีกแล้วเหรอ...?? ขนาดเอากองกำลังเสริมมาแล้วนะ!!"
10012035-9 = "เดี๋ยวสิ นี่เธอแปลกๆ ไปหรือเปล่า? ทำไมถึงยืนงงอยู่แบบนั้นล่ะ!?"
10012035-11 = "คะ... คุณครู...? ทำไมคุณครูถึง... มาอยู่ที่นี่ได้ล่ะ...?"
10012035-12 = "คุณครูเป็น... เอ๊ะ เอ๋...? หืม...?"
10012035-14 = "วาคาโมะ? ทำอะไรของเธอน่ะวาคาโมะ!!"
10012035-16 = "วาคาโมะ!!"
10012035-17 = "เหมือนวิญญาณจะออกจากร่างไปแล้วเลยค่ะ"
10012035-18 = "งะ... งั้นก็ล่าถอยกันก่อนเถอะ! เอาเธอกลับมาเรียกสติก่อน แล้วค่อยมาบุกอีกรอบก็ได้...!"
10012035-24 = "อ๊ะ มันเจ็บนะเฟ้ย!!"
10012035-25 = "พอที หยุดยิงได้แล้ว! ฉันถอยให้ก็ได้!!"
10012035-26 = "ชิ... น่าเจ็บใจชะมัด...!"
10012035-27 = "อย่าคิดว่าจะจบง่ายๆ แบบนี้นะ...!!"
10012035-38 = "คนพวกนั้นคือใครกันเหรอคะ..."
10012035-39 = "อาจจะเป็นพวกที่เซริกะกับรุ่นพี่โฮชิโนะพูดถึงก็ได้... พวกที่พยายามจะแย่งรีสอร์ตของพวกเราไปน่ะ"
10012035-40 = "ใช่ไหมคุณครู?"
10012035-41 = "[s1] \"ส่วนใหญ่ก็คือใช่นะ...\"\n[s2] \"แต่บางส่วนก็เหมือนไม่ใช่...\""
10012035-42 = "จะว่าไป มีคนหนึ่งที่ทำตัวเหมือนรู้จักคุณครูเลยนะคะ..."
10012035-43 = "จะว่าไป มีคนหนึ่งที่ทำตัวเหมือนรู้จักคุณครูเลยนะคะ..."
10012035-44 = "หรือว่าคนที่ชื่อวาคาโมะคือคนรู้จักของคุณครูคะ?"
10012035-45 = "[s3] \"เอ่อ... เรื่องมันยาวน่ะ...\"\n[s4] \"จริงๆ ไม่รู้จักอาจจะดีกว่า...\""
10012035-48 = "....."
10012035-49 = "คุณครู..."
10012035-50 = "อ๊ายยย...!!"
10012035-51 = "......!?  อายาเนะ!?"
10012035-52 = "คันเบ็ด... แล้วก็อุปกรณ์ตกปลา...!"
10012035-53 = "เป็นเพราะการต่อสู้เมื่อกี้ทุกอย่างก็เลยพังไปหมดเลย คงใช้งานไม่ได้แล้วละค่ะ!!"
10012035-57 = "......?"
10012035-61 = "......!!!"
10012035-63 = "(หลังจากคุณครูช่วยปลอบชิโรโกะที่เศร้าโศก ทุกคนก็กลับมายังรีสอร์ต)"
10012035-70 = "(ระหว่างที่อธิบายเรื่องที่เกิดขึ้นให้ทุกคนที่รีสอร์ตฟัง ชิโรโกะก็เอาแต่พึมพำถึงเบ็ดตกปลาถึง 3 ครั้ง)"

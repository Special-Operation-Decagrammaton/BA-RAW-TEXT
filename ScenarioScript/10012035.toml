[translation]
10012035-8 = "怎，怎麼會，怎麼又輸了啊！！#n虧我還帶了支援部隊來了說～！！"
10012035-9 = "不覺得這傢伙的狀態有點奇怪嗎？為什麼愣在那裡！？"
10012035-11 = "老，老師……？老師為什麼……會在這裡……？"
10012035-12 = "老師是……？咦……？嗯？"
10012035-14 = "若藻？你在做什麼啊若藻！"
10012035-16 = "我說若藻啊！！"
10012035-17 = "完全呆住了耶。"
10012035-18 = "先，先撤退吧！把這傢伙帶回去，等他清醒了再來……！"
10012035-24 = "啊，好痛痛，好痛！！"
10012035-25 = "別這樣，我知道了啦！！"
10012035-26 = "呿……可惡……！"
10012035-27 = "別以為這樣就結束了！！"
10012035-38 = "他們到底是誰呢……"
10012035-39 = "可能是茜香和星野前輩說的……想搶走我們的渡假勝地的傢伙。"
10012035-40 = "……是嗎，老師？"
10012035-41 = "[s1] 「大致上是沒錯……」\n[s2] 「也有點不一樣的地方……」"
10012035-42 = "話說回來，有一個人叫了老師的名字……"
10012035-43 = "話說回來，有一個人叫了老師的名字……"
10012035-44 = "難不成老師認識那個叫做若藻的人嗎……？"
10012035-45 = "[s3] 「那個……說來話長……」\n[s4] 「不認識的話可能還比較好……」"
10012035-48 = "……"
10012035-49 = "老師……"
10012035-50 = "……啊！！"
10012035-51 = "……綾音，怎麼了！？"
10012035-52 = "釣竿……還有工具都……"
10012035-53 = "看起來似乎都在戰鬥的時候弄壞了……"
10012035-57 = "……？"
10012035-61 = "……！！！"
10012035-63 = "（在那之後，安慰了沮喪的白子，大家一起返回了渡假勝地）"
10012035-70 = "（就連回到渡假勝地之後，白子似乎依然掛念著釣竿）"

10046010-155 = "3;하스미 수영복;03;역시 그렇게 말씀해 주실 거라 예상하긴 했습니다만……."
10046010-156 = "5;이치카 수영복;01;……뭐, 저희가 계속 분위기 잡고 있어도 선생님께서 불편하실 테니, 여기서는 조금 가볍게 내려놓는 게 어떨까요?\n#5;em;[반응]\n#5;al\n#3;m1"
10046010-157 = "3;하스미 수영복;04;이치카……?\n#3;stiff"
10046010-158 = "3;하스미 수영복;03;후후, 역시 츠루기가 이치카를 보낸 이유가 있었군요. 저랑 이치카 둘만 보낸다기에 뭔가 했는데."

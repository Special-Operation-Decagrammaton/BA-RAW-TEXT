10046010-145 = "3;미카 수영복;14;……그런 일이 있어서, 모쪼록 너희들과 선생님한테도 부탁을 하게 됐어!\n#3;em;[땀]\n#3;a"
10046010-146 = "3;미카 수영복;13;나기 쨩이 푹 쉴 수 있게, 괜히 일 생각을 하지 않도록 함께 도와줬으면 해."
10046010-147 = "3;미카 수영복;08;정의실현부도…… 선생님도 각자의 일로 바쁠 텐데……. 미안해!\n#3;em;[세로선]\n#3;stiff"

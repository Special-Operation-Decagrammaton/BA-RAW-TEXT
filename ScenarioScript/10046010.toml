[translation]
10046010-1 = "Episode 1;It's Friday"
10046010-5 = "Ahh! I don't wanna!"
10046010-6 = "Nonononononono!!"
10046010-9 = "How could you? Impossible! No way!"
10046010-10 = "Whatever \"way\" life goes is not your decision. Please stop acting like a child."
10046010-11 = "As I always say, even in...dire situations, a Tea Party member must demonstrate proper composure."
10046010-12 = "And nevertheless, what third-year throws a tantrum in this manner? It's utterly unbefitting of your office."
10046010-13 = "No, no! We were supposed to go! We all agreed! We promised!"
10046010-14 = "And you think you can cancel it because of...work?! With no notice? You know how much I needed this! I even got a cute little outfit!"
10046010-16 = "Nagi, you dummy! You think you're so great! I hate you and your stupid table!"
10046010-24 = "Honestly? All this fuss for a summer vacation..."
10046010-25 = "Very well. Mika, you may have your summer leave."
10046010-29 = "No!"
10046010-33 = "...Pardon?"
10046010-34 = "No! That's no fun! It has to be all of us!"
10046010-35 = "We need to stick to what we promised. You and Seia are coming too!"
10046010-36 = "Mika...!"
10046010-41 = "I cannot simply..."
10046010-42 = "Seia, Seia, do chime in. Mika wants you to go."
10046010-43 = "Hmm?"
10046010-44 = "Interesting. Are you expecting me to handle her? Make her see reason?"
10046010-45 = "Hm... Oh, Nagisa, are you in over your head?"
10046010-49 = "If you deny my general authority and only call me when you need me, then I decline to intervene."
10046010-50 = "Or, perhaps you could give me some of your work, Nagisa? I could run Trinity while YOU go on vacation."
10046010-52 = "Tch! Not you too, Seia!"
10046010-53 = "..."
10046010-54 = "You both know how much this school needs me, and you feign ignorance of my commitments?"
10046010-55 = "To be repaid with such contempt is baffling!"
10046010-56 = "Hm, verbal manipulation. A Nagisa specialty."
10046010-57 = "But you've chosen the wrong opponent. See, this is all playing out according to her design."
10046010-58 = "Heeheehee!"
10046010-60 = "...Ugh...!"
10046010-67 = "Ah! So be it. You have succeeded in your insufferable campaign."
10046010-68 = "I surrender to your childish whims!"
10046010-75 = "Well done, Mika. It seems we are headed to the beach."
10046010-76 = "I'm genuinely impressed. You may be the only person who can crack Nagisa's stubbornness."
10046010-77 = "...Are you satisfied, Mika?"
10046010-83 = "Yes! Of course!"
10046010-84 = "This is a golden opportunity. We hardly see each other!"
10046010-85 = "How could you resist going out, with all three of us? A full set!"
10046010-86 = "Heehee. And to a private beach! Private, exclusive!"
10046010-87 = "Nagisa isn't here, so you can drop the act. I'm not an idiot."
10046010-88 = "I saw through your whining. Because the timing was good, I let it happen."
10046010-89 = "You did it for Nagisa, didn't you? Though, I must say, I am grateful to finally have some work."
10046010-94 = "..."
10046010-95 = "...Don't tell Nagi."
10046010-96 = "Of course I won't. Unlike you, I'm not foolish."
10046010-97 = "Seia...?"
10046010-98 = "If you let her, Nagisa would have canceled the vacation to take care of her heavy workload. She would have never stopped."
10046010-99 = "I've been concerned with how quickly she's returned to her old habits... The work is consuming her."
10046010-100 = "We should use this opportunity to force her to rest."
10046010-101 = "Even if this is how we do it... Well, the Tea Party was never meant to be run solo, and the workload is far too much for one person to bear."
10046010-102 = "...And that is a more fundamental problem."
10046010-103 = "Anyway, what I mean, and am failing to articulate is... I'm grateful, Mika."
10046010-108 = "Aw, gratitude from Seia? That's rare. Heehee."
10046010-109 = "Well, the vacation's for me too, you know! How could I treasure the luxury of Trinity if I never get away from it?"
10046010-110 = "It's also really embarrassing me when you talk to me like I'm...mature."
10046010-111 = "I never said you're mature. And I don't believe I said your whining was entirely fabricated."
10046010-112 = "We've known each other for a long time, you petulant princess."
10046010-113 = "Can't you let a touching moment be? You massive meanie!"
10046010-114 = "Ha, just like your immaturity, this is my nature. Please understand."
10046010-115 = "And I truly wish for the three of us to enjoy some carefree fun. It's been so long..."
10046010-116 = "However..."
10046010-120 = "...Huh? Is something wrong?"
10046010-121 = "Well... "
10046010-122 = "No, not exactly. It was simply a fleeting concern."
10046010-123 = "Haha! You're too much, Seia."
10046010-124 = "You don't have to think about everything so hard!"
10046010-129 = "What could possibly happen?"
10046010-145 = "...So that happened, which is why we need you and Sensei!"
10046010-146 = "Please help Nagi relax and not think about work!"
10046010-147 = "I know you and the Justice Task Force and Sensei have your plates full... Sorry!"
10046010-148 = "Don't worry. You see, Sensei, it's part of our job to support the Tea Party."
10046010-149 = "Regarding Nagisa... We are also concerned about her, so we are grateful for Mika's request."
10046010-150 = "Therefore, on behalf of the Justice Task Force, I would like to formally ask you to join this operation, Sensei."
10046010-151 = "[s1] \"Of course. You're all so caring.\"\n[s2] \"It sounds like a good cause.\""
10046010-154 = "Sensei..."
10046010-155 = "I never doubted you."
10046010-156 = "...Ladies, I'm sure all this emotion is making Sensei uncomfortable! How about we keep it light?"
10046010-157 = "You're right."
10046010-158 = "Fufu, I knew there was a reason Tsurugi sent you. Still, this operation has such a small crew."
10046010-159 = "Well, we're trying to keep it casual and have fun, right?"
10046010-161 = "Exactly! If we brought too many people out here, Nagi would go back into \"management mode.\""
10046010-162 = "She's too much! As soon as she has an audience, she tries to perform as the perfect prim President."
10046010-163 = "Given that, you know...maybe the Tea Party should handle this \"operation\" all by ourselves..."
10046010-165 = "I'm not so sure. Guarding you is our highest priority, and this beach doesn't look very secure."
10046010-166 = "Yeah...but there's also no one here!"
10046010-167 = "This is the Tea Party's private beach. It seems pretty safe to me."
10046010-171 = "...What's that, Sensei?"
10046010-172 = "Where are the other two?"
10046010-174 = "Well, Seia and Nagisa are on the way."
10046010-175 = "The rest of us came early as kind of a scouting party! You know, to inspect the beach!"
10046010-176 = "...Huh?"
10046010-177 = "Really, that's it. The four of us here, then Seia and Nagi. Six in total!"
10046010-178 = "Oh? You're wondering why I came early too?"
10046010-182 = "That's because I'm coordinating the schedule!"
10046010-183 = "[s3] \"You?!\"\n[s4] \"A WHOLE schedule?\""
10046010-186 = "Heehee. Why so shocked? It's hardly the first time I've taken charge of a situation."
10046010-187 = "Planning a vacation is work, and I want Nagi to be absolutely free of all of that."
10046010-188 = "That's why I'll take care of the hard thinking so she can finally decompress for once in her life!"
10046010-190 = "I see... That's very thoughtful, and it's likely the only way to get her to actually enjoy herself."
10046010-191 = "But then who will handle the Tea Party's daily tasks?"
10046010-192 = "Seia's got it! And if it's too much for her, she'll go to Sensei. Between the two of them, they can figure anything out!"
10046010-193 = "[s5] \"Oh. Now I get it.\"\n[s6] \"So that's why I was invited.\""
10046010-196 = "Very well. But, Mika, I could have taken care of those things."
10046010-197 = "No, no! That wouldn't be fair! The Justice Task Force already does too much."
10046010-198 = "So, this mandatory relaxation time extends to you two as well!"
10046010-199 = "Hasumi, Ichika, I want you to not think of yourselves as bodyguards, but as guests! It's a fun girl beach party!"
10046010-200 = "And if something goes wrong, don't hide it. Tell me! I'm in charge of this vacation!"
10046010-206 = "Mika..."
10046010-207 = "...That's quite considerate."
10046010-208 = "But we're already here, so we may as well establish a perimeter...while having a \"fun girl beach\" time."
10046010-210 = "Yeah, yeah! Now you're getting it!"
10046010-211 = "While we can't completely abandon our duties, you do have a point. We are already OUT here, after all."
10046010-212 = "And, since you insist, we will enjoy ourselves on a small, responsible vacation!"
10046010-213 = "Yes! Precisely! That's the spirit!"
10046010-214 = "Now, let's see. What should this \"scouting party\" do...?"
10046010-216 = "First, we should survey the area. At first glance, this appears to be a peaceful, empty beach..."
10046010-217 = "...but we should always be prepared. Let's assess the facilities and map the terrain for potential hazards."
10046010-219 = "Ah, you already know what to do!"
10046010-220 = "That's what we're trained for."
10046010-221 = "Since the beach is wide, how about we split up? I'll start at that end. Um... All alone!"
10046010-222 = "See you! Bye!"
10046010-226 = "Then I'll start from over there!"
10046010-231 = "...As suspected. Did you pick up on that, Sensei?"
10046010-232 = "[s7] \"You mean Ichika?\"\n[s8] \"Someone seems nervous...\""
10046010-235 = "Ha, sharp as always. Ichika is a very promising member of the Justice Task Force."
10046010-236 = "In fact, she's been on so many missions that she's never...been properly acquainted with the unique charms of the Tea Party."
10046010-237 = "Though she's pretending she's fine, I sense she's a little intimidated."
10046010-238 = "She's trying so hard to hide it, to be her diplomatic self..."
10046010-239 = "...Please keep an eye on her, Sensei."
10046010-240 = "[s] \"Sure, don't worry.\""
10046010-241 = "Heehee. Thank you. Then, Sensei... Why don't you relax while I start inspecting these facilities?"
10046010-245 = "Oh? You want to come with me?"
10046010-246 = "Why thank you. I was hoping you'd tag along."
10046010-250 = "There's not too much to see, so it shouldn't take much time. Right this way..."
10046010-257 = "This is the shower room. After the fun's over, we'll clean up here and change."
10046010-258 = "It's clean. A custodian checks on it every month. All we need to do is see if the water's running..."
10046010-259 = "Surely there's no one else here besides..."
10046010-266 = "...us."
10046010-281 = "...?"
10046010-282 = "[s9] \"Someone's here...?\"\n[s10] \"Oh no, that silhouette...!\""
10046010-287 = "...?"

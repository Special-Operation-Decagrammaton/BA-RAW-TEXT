[translation]
10046010-1 = "第1話;今天是星期五"
10046010-5 = "啊啊啊～啊！不要～！"
10046010-6 = "不要不要不要不要不要不要～！！"
10046010-9 = "怎麼可以這樣～太誇張了！我沒辦法接受！！"
10046010-10 = "這件事不是彌香同學可以決定的。#n請不要再像小孩子一樣胡鬧了。"
10046010-11 = "而且我應該說過很多次……#n無論現在情況如何，彌香同學都該維持茶會成員應有的表現才對。"
10046010-12 = "不，即便撇開這點不談……都已經3年級了，怎麼能這樣大聲撒嬌呢？#n拜託你稍微成熟一點吧！"
10046010-13 = "我不管！不管不管！不管啦～！#n明明說好要去的，這是約定好的行程耶！"
10046010-14 = "怎麼能因為工作多就突然取消！#n我可是非常期待又準備了很久耶！！"
10046010-16 = "渚醬笨蛋！大笨蛋！！#n老是自作主張！！最最最討厭了！！"
10046010-24 = "真是的……夏季渡假到底有什麼好的……"
10046010-25 = "我知道了，那就讓彌香同學一個人去吧……"
10046010-29 = "不行！！"
10046010-33 = "……什麼？"
10046010-34 = "怎麼可以這樣！！#n一個人去海邊有什麼意思！？根本不好玩呀！！"
10046010-35 = "就照原本的行程走嘛～！！#n好不好？渚醬和聖亞醬都一起去啦～！！"
10046010-36 = "彌香同學……！！"
10046010-41 = "唉，我真是服了你了……"
10046010-42 = "聖亞同學，你也說點什麼吧。#n難道要繼續放任彌香同學嗎？"
10046010-43 = "哼嗯～～？"
10046010-44 = "真有趣。渚一個人無法應付，只好連我也牽扯進來嗎？"
10046010-45 = "該怎麼說才好……"
10046010-49 = "平常什麼權限都不給，有需要的時候又想利用我……恕我敬謝不敏囉。"
10046010-50 = "還是說，你現在是打算把工作分給我呢，渚？"
10046010-52 = "居然連聖亞同學也……！！"
10046010-53 = "……"
10046010-54 = "你們兩位明明知道我每天都在「克己奉公」……！！"
10046010-55 = "卻還要一直這樣對我嗎……？"
10046010-56 = "哼嗯，恩威並濟啊……渚最擅長這種手段了吧。"
10046010-57 = "只可惜你挑錯對象了。#n這樣反而正中他的下懷哦。"
10046010-58 = "哼，哼，哼……！"
10046010-60 = "唔唔唔……！！"
10046010-67 = "啊～！！真是的！！你們愛怎樣就怎樣吧！！"
10046010-68 = "接下來不管發生什麼我都不管了！！"
10046010-75 = "太好了，彌香。#n結果還是能照原定計畫去海邊呢。"
10046010-76 = "老實說我很佩服。#n能讓渚改變主意的人，全世界恐怕也只有你了吧。"
10046010-77 = "……現在滿意了嗎？"
10046010-83 = "嗯！當然！"
10046010-84 = "畢竟我不像渚醬或聖亞醬，這種機會可不是常常有的！"
10046010-85 = "果然得大家一起去才行，對吧？"
10046010-86 = "嘿嘿～私人海灘～私人海灘～"
10046010-87 = "現在渚不在場，沒必要繼續裝模作樣了。#n我又不是笨蛋。"
10046010-88 = "你是為了渚才這麼做的吧？#n我也因此能夠分擔一些工作……"
10046010-89 = "在我看來，現在正是最佳時機。#n我知道彌香不會毫無理由地撒嬌。"
10046010-94 = "……"
10046010-95 = "……不可以告訴渚醬哦。"
10046010-96 = "當然。我可沒有你那麼天真啊。"
10046010-97 = "聖亞醬……？"
10046010-98 = "如果繼續置之不理，渚肯定又會為了處理過量的工作……取消渡假行程硬撐下去吧。"
10046010-99 = "上次才剛放鬆過，結果馬上又故態復萌……#n我一直很擔心他什麼時候才能放下那些獨自承受的負擔，這次總算有機會了。"
10046010-100 = "即便勉強也得讓他休息一下才行。"
10046010-101 = "哪怕必須用這種方式也一樣……嗯。#n畢竟茶會本來就不是能獨自管理的組織，工作量也不是一個人能負擔的。"
10046010-102 = "……況且這也是早已存在的問題了。"
10046010-103 = "總之，這是我一直以來都沒成功過的嘗試……各方面來說都得感謝你呢，彌香。"
10046010-108 = "嘿～居然能被聖亞醬感謝，還真少見呢。呵呵。"
10046010-109 = "不過想去渡假玩樂也不是謊話啦！#n以我現在的處境來說，想奢侈一下就只能把握這種時候了。"
10046010-110 = "結果被你誇得好像我很成熟一樣，反而讓我覺得有點害羞。"
10046010-111 = "首先我並沒有誇你成熟，也沒說過你為了玩樂而撒嬌是謊話。"
10046010-112 = "我們可不是只認識一天兩天的交情哦？任性大小姐。"
10046010-113 = "拜託，就不能偶爾融融洽洽地結束嗎？超難搞的聖亞同學？"
10046010-114 = "呵呵，這就跟你的天真一樣是我的本性，還請你多多包涵了。"
10046010-115 = "不過想久違地三個人一起悠哉玩樂的想法，倒是與我不謀而合呢。"
10046010-116 = "只是……"
10046010-120 = "……嗯？有什麼擔心的事嗎？"
10046010-121 = "唔嗯……"
10046010-122 = "沒什麼，我也跟以前不一樣了。#n不過是有點杞人憂天罷了。"
10046010-123 = "哈哈！什麼嘛，聖亞醬真是的～"
10046010-124 = "哎呀～你就別瞎操心了。反正……"
10046010-129 = "還能出什麼事呢☆"
10046010-145 = "……事情就是這樣，所以我希望能請你們和老師幫忙！"
10046010-146 = "一起讓渚醬能好好休息，不要再去想工作的事。"
10046010-147 = "雖然實現正義部和老師，應該本來就很忙碌了才對……抱歉！"
10046010-148 = "呵呵，請別這麼說。#n輔佐茶會也是我們的職責。"
10046010-149 = "況且渚大人目前的情況……我們也同樣感到擔憂。#n彌香大人的體貼，反倒令人鬆了一口氣呢。"
10046010-150 = "在此我也與彌香大人一起，代表實現正義部向老師請求協助。"
10046010-151 = "[s1]「完全沒問題哦。我也覺得很高興。」\n[s2]「這個想法真棒！很好很好。」"
10046010-154 = "老師……"
10046010-155 = "雖然早已預料到您會這麼說……"
10046010-156 = "如果我們一直這麼嚴肅的話，老師應該也會覺得拘謹……#n不如在這裡就稍微放鬆一下吧？"
10046010-157 = "一花……？"
10046010-158 = "呵呵，弦生會指派一花來果然是有原因的。#n我原本還有點好奇，為何只派我和一花兩個人來呢。"
10046010-159 = "畢竟我們收到了「希望盡可能減少人手，不要搞得太隆重」的請求嘛。"
10046010-161 = "啊，那個是我要求的。#n因為如果帶一大群人過來的話，渚醬又會恢復成平常的樣子了。"
10046010-162 = "真是個麻煩的大小姐啊。#n只要人一多，他就會立刻擺出平時的架子。"
10046010-163 = "其實我甚至想過乾脆不請實現正義部幫忙，我們幾個自己來就好……"
10046010-165 = "那從各方的立場來看都有點困難呢。#n畢竟保護各位是我們的首要任務。"
10046010-166 = "但說是這麼說，反正這裡也沒有別人……"
10046010-167 = "在茶會的私人海灘上……應該不會發生什麼事吧。"
10046010-171 = "……嗯？老師？"
10046010-172 = "你問其他人在哪裡？#n啊啊，是指聖亞大人和渚大人嗎？"
10046010-174 = "他們還沒到哦。之後才會分別抵達。"
10046010-175 = "我們現在有點類似「先遣隊」的感覺！#n先來檢查這片海灘以防萬一！"
10046010-176 = "……嗯？"
10046010-177 = "參加的人是不是就只有這些？沒錯唷。#n現在在場的四個人，加上聖亞醬和渚醬總共六個人！"
10046010-178 = "……問我為什麼這麼早就來了？#n那當然是因為……"
10046010-182 = "我是這次行程的總負責人呀☆"
10046010-183 = "[s3]「彌香你……？」\n[s4]「是行程的總負責人？」"
10046010-186 = "嘿嘿，嚇到了吧？#n至少在私人海灘這件事上，我決定親自負責並加以推進。"
10046010-187 = "雖然說是「渡假」，不過這對負責人來說也算是一種「工作」對吧？"
10046010-188 = "我已經跟渚醬說好「渡假期間，什麼都不要操心」了。"
10046010-190 = "說的也是……所謂的「休息」，就是要完全脫離工作才算真正成立。"
10046010-191 = "那麼今天茶會的工作……"
10046010-192 = "會由聖亞醬負責唷。#n如果聖亞醬一個人覺得有點吃力的話，就打算請老師幫忙代替渚醬。"
10046010-193 = "[s5]「這件事我也大概聽說過了。」\n[s6]「原來是這麼回事啊。」"
10046010-196 = "原來如此。#n如果是這樣的話，其實交給我也沒問題的……"
10046010-197 = "哎，不行不行。#n我們明明是來玩樂的，如果還把工作交給你就太不好意思了。"
10046010-198 = "所以蓮實醬跟一花醬也一樣唷！"
10046010-199 = "希望你們別把這當作工作，而是帶著玩樂的心情。"
10046010-200 = "有什麼事的話也不要兩個人悶著頭煩惱，直接告訴我就行了！"
10046010-206 = "彌香大人……"
10046010-207 = "呵呵，光是您的這份心意，就足以令人心情愉快了呢。"
10046010-208 = "雖然我們也有自己的立場，所以還是會維持基本的防備……#n嗯，那就偶爾麻煩您囉。"
10046010-210 = "嗯嗯！！交給我吧！！"
10046010-211 = "雖然不能明說「是來玩的」……#n但老實說，我們能來這種地方也是多虧了您。"
10046010-212 = "就照您說的，適度享受渡假的感覺吧！"
10046010-213 = "嗯！非常好！！這種感覺就對了！！"
10046010-214 = "那麼～先遣隊的第一個任務是……"
10046010-216 = "不如就從檢查周圍開始吧。#n雖然乍看之下是個寧靜和平的海灘……"
10046010-217 = "我想還是先有所防備比較好。#n檢查周圍的設施和地形，看看有沒有問題。"
10046010-219 = "嘿，真厲害。一下就進入狀況了呢？"
10046010-220 = "畢竟這就是我們平常的工作嘛。"
10046010-221 = "海灘還挺寬的，大家分頭行動吧？#n我從海岸的盡頭開始檢查。"
10046010-222 = "先走一步囉～！"
10046010-226 = "那我就去另一頭看看～！"
10046010-231 = "……老師，您也注意到了嗎？"
10046010-232 = "[s7]「啊，是說一花嗎。」\n[s8]「他是不是有點緊張？」"
10046010-235 = "呵呵，您果然相當敏銳呢。#n一花在我們實現正義部之中，也是備受期待的成員。"
10046010-236 = "因此一直負責外勤工作，從來沒被派來協助茶會。"
10046010-237 = "雖然他裝作若無其事的樣子，看起來依然比平常更加緊繃。"
10046010-238 = "不過，他本人應該覺得自己掩飾得很好吧。"
10046010-239 = "這次的行程，也請老師多多關照一花。"
10046010-240 = "[s]「嗯，別擔心。」"
10046010-241 = "呵呵，謝謝您。#n那麼在我們檢查設施的時候，老師要不要先休息一下？"
10046010-245 = "咦，要跟我一起去？"
10046010-246 = "呵呵，非常感謝。#n您果然會這麼說呢。"
10046010-250 = "其實設施的數量並不多，很快就能檢查完的。#n那麼這邊請……"
10046010-257 = "這裡是淋浴間。#n等大家的行程結束後，會在這裡洗澡並換衣服。"
10046010-258 = "說是檢查……其實只要確認水能不能正常流出來就行了。#n因為這裡每個月都會有管理員來巡檢。"
10046010-259 = "況且除了我們之外，不可能還有其他人在這裡……"
10046010-266 = "咦……？"
10046010-281 = "……？？？"
10046010-282 = "[s9]「……有人在？」\n[s10]「咦，那個身影是……！」"
10046010-287 = "……？？？？？？？？？"

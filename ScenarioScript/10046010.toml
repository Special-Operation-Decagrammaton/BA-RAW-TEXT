[translation]
10046010-1 = "ตอนที่ 1;วันศุกร์สักที"
10046010-5 = "แงงง~! ไม่เอา~!"
10046010-6 = "ไม่เอา ไม่เอา ไม่เอา ไม่เอา ไม่เอา ไม่เอา~!!"
10046010-9 = "แบบนั้นมีที่ไหนกัน~! ไม่มีทางหรอก ฉันไม่เอาด้วยเด็ดขาด!!"
10046010-10 = "นั่นไม่ใช่หน้าที่ของคุณมิกะที่จะตัดสินใจหรอกค่ะ ได้โปรดเถอะ อย่าทำตัวเหมือนเด็กเลยค่ะ"
10046010-11 = "ฉันก็พร่ำบอกอยู่ตลอดว่าคุณมิกะต้องรักษาระเบียบแบบแผนให้มากกว่านี้อีกหน่อยในฐานะสภาน้ำชา ..."
10046010-12 = "ไม่สิ... ต่อให้ไม่ต้องเป็นสภาน้ำชา แต่นักเรียนที่อยู่ถึงชั้นปีที่ 3 แล้วยังมาตะโกนโวยวายแบบนี้#nมีที่ไหนกันคะ? โตได้แล้วค่ะ!"
10046010-13 = "ไม่รู้หรอก! ไม่รู้ๆๆ เรื่องนั้นฉันไม่รู้หรอก~! แต่เราสัญญากันไว้แล้วนี่นาว่าจะไปด้วยกันน่ะ!"
10046010-14 = "จู่ๆ มาบอกว่างานเยอะแล้วก็มายกเลิกกันเนี่ยนะ ไหงเป็นงี้ล่ะ~! ฉันอุตส่าห์เตรียมทุกอย่าง และคาดหวังไว้มากเลยนะ!!"
10046010-16 = "นางิจัง คนบ้า! บ้างานที่สุด!! เอาแต่ใจตัวเองที่สุดด้วย!! ฉันไม่ชอบเลย!!"
10046010-24 = "จริงๆ เลยเชียว... พอถึงฤดูร้อนแล้วต้องไปพักผ่อนหย่อนใจทำไมก็ไม่รู้..."
10046010-25 = "ก็ได้ค่ะ งั้นฉันจะปล่อยให้คุณมิกะไป..."
10046010-29 = "ไม่!!"
10046010-33 = "คะ...?"
10046010-34 = "ไม่ได้สิ!! จะให้ฉันไปทำอะไรคนเดียวล่ะ!? ให้ไปนั่งมองทะเลคนเดียวหรือไง? แบบนั้นมันไม่สนุกหรอกนะ!!"
10046010-35 = "ไปกันให้หมดตามที่เราตกลงกันไว้เถอะนะ~!! นะ? นางิจังกับเซอาจังก็ต้องไปด้วยกันสิ~!!"
10046010-36 = "คุณมิกะ...!!"
10046010-41 = "ต้องให้ฉันพูดอีกกี่รอบคะ..."
10046010-42 = "คุณเซอา คุณเซอาก็ช่วยพูดอะไรหน่อยสิคะ จะยอมให้คุณมิกะเป็นแบบนี้เหรอคะ?"
10046010-43 = "หืมมม~~?"
10046010-44 = "น่าสนใจดีนะคะ พอนางิสะรับมือคนเดียวไม่ไหว ก็เลยดึงฉันมาเกี่ยวด้วยงั้นเหรอคะ?"
10046010-45 = "ฉันก็ไม่รู้สิคะ..."
10046010-49 = "ปกติแล้วนางิสะก็ไม่ได้ให้สิทธิอะไรฉันเป็นพิเศษ ถ้าคิดจะใช้งานฉันเฉพาะตอนที่จำเป็นละก็ ฉันขอปฏิเสธดีกว่าค่ะ"
10046010-50 = "หรือว่าในที่สุดก็คิดจะแบ่งงานให้คนอื่นทำเสียทีคะ นางิสะ?"
10046010-52 = "อึก!! คุณเซอา นี่คุณก็เป็นไปด้วยเหรอคะ!!"
10046010-53 = "......"
10046010-54 = "อึก! พวกคุณก็รู้กันดีนี่คะว่าแต่ละวันฉันไม่ได้แค่ใช้ชีวิตเฉยๆ แต่ต้อง 'ใช้ชีวิตไปด้วย อดทนไปด้วย'!!"
10046010-55 = "แล้วยังจะมาดื้อดึงกับฉันแบบนี้กันอีกเหรอคะ...?"
10046010-56 = "หืม เดี๋ยวก็ข่มขู่ เดี๋ยวก็หาทางประนีประนอม นี่เป็นงานถนัดของนางิสะเลยนะคะ"
10046010-57 = "ถ้าเป็นกับคนอื่นน่ะคงได้ แต่กับมิกะน่ะคงไม่ได้หรอกค่ะ เพราะการดื้อดึงแบบนั้น... คืองานถนัดของเธอนี่คะ"
10046010-58 = "ฮุฮุฮุ...!"
10046010-60 = "อึกกก...!!"
10046010-67 = "ฮึ่ม~!! จริงๆ เลยเชียว!! อยากทำอะไรก็ทำกันเลยค่ะ!!"
10046010-68 = "แต่มันจะออกมาเป็นยังไง ฉันไม่รู้ด้วยหรอกนะคะ!!"
10046010-75 = "ได้ข้อสรุปแล้วค่ะ มิกะ เราจะไปทะเลกันตามแผนการเดิมค่ะ"
10046010-76 = "บอกตามตรงว่าฉันประทับใจมากค่ะ ในโลกนี้น่าจะมีแค่คุณคนเดียวนะคะที่เอาชนะความดื้อรั้นของ#nนางิสะได้"
10046010-77 = "ตอนนี้... พอใจหรือยังล่ะคะ มิกะ?"
10046010-83 = "อื้อ! ต้องพอใจสิ!"
10046010-84 = "ก็ฉันไม่ได้มีโอกาสออกไปพักผ่อนแบบนี้ได้บ่อยๆ อย่างนางิจังหรือเซอาจังนี่นา!"
10046010-85 = "ถ้ามีโอกาสแล้วก็ต้องไปด้วยกันทั้งหมดเลยสิ? ว่ามั้ย?"
10046010-86 = "ฮิฮิ~ ชายหาดส่วนตัว~ น่าตื่นเต้นจังเลยน้า~"
10046010-87 = "ตอนนี้นางิสะก็ไม่ได้อยู่ตรงนี้แล้ว งั้นก็ไม่จำเป็นต้องปิดบังหรอกค่ะ คิดว่าฉันไม่รู้เหรอคะ?"
10046010-88 = "นี่คือทริปพักผ่อนเพื่อนางิสะไม่ใช่เหรอคะ? แล้วนี่ก็ทำให้นางิสะยอมแบ่งงานมาให้ฉันด้วย..."
10046010-89 = "ฉันเองก็คิดว่านี่คือช่วงเวลาที่เหมาะที่สุดค่ะ ฉันรู้ดีค่ะว่ามิกะไม่ใช่คนที่ทำตัวเหมือนเด็กๆ ที่ไม่มีความคิดอะไรในหัวเลย"
10046010-94 = "......"
10046010-95 = "ห้ามบอกนางิจังนะ..."
10046010-96 = "ฉันจะบอกทำไมล่ะคะ ฉันไม่ใช่คุณนะคะ ฉันเก็บความลับได้อยู่แล้ว"
10046010-97 = "เซอาจัง...?"
10046010-98 = "ถ้าเราไม่ทำอะไรเลยละก็ นางิสะก็คงยกเลิกทริปพักร้อนแล้วเอาวันลาพักร้อนมานั่งทำงานกองโตแน่ๆ ค่ะ"
10046010-99 = "คราวที่แล้วก็หนีกลับมาโหมงานด้วย... ฉันก็เป็นห่วงอยู่พอดีว่าจะแบกรับทุกอย่างคนเดียวไปถึงไหน แบบนี้ถือว่าเป็นโอกาสดีเลยค่ะ"
10046010-100 = "อย่างน้อยครั้งนี้ก็ต้องให้นางิสะพักผ่อนจากงานสักหน่อยค่ะ"
10046010-101 = "ถึงแม้จะต้องใช้วิธีนี้ก็เถอะนะ... ใช่ค่ะ สภาน้ำชาก็ไม่ใช่กลุ่มที่ต้องจัดการงานเพียงลำพังอยู่แล้ว แล้วงานที่มีก็ใช่ว่าจะทำคนเดียวไหวด้วยนี่คะ"
10046010-102 = "ที่ปล่อยให้เป็นแบบนี้มาก็ถือว่าเป็นปัญหาด้วยค่ะ..."
10046010-103 = "เอาเป็นว่าฉันเองก็อยากหาเรื่องให้นางิสะได้พักเรื่องงานบ้าง แต่ก็ไม่เคยสำเร็จเลย... ต้องขอบคุณมากนะคะ มิกะ"
10046010-108 = "ว้าว~ ฉันได้รับคำขอบคุณจากเซอาจังด้วย ช่างเป็นเรื่องพิเศษจริงๆ ฮิฮิ"
10046010-109 = "แต่ที่บอกว่าอยากไปพักผ่อนหย่อนใจ ฉันไม่ได้โกหกนะ! ถ้าไม่ใช่เวลานี้ ฉันก็ไม่มีโอกาสไปใช้ชีวิต#nสุขสบายหรอก"
10046010-110 = "เพราะงั้นไม่ต้องชมกันเหมือนว่าฉันโตแล้วก็ได้"
10046010-111 = "ฉันไม่ได้บอกว่าโตแล้วนะคะ แล้วก็ไม่เคยบอกว่า 'การที่มิกะรบเร้าให้ไปชายหาดเพราะตัวเองอยาก#nไปเที่ยว' เป็นเรื่องโกหกด้วยค่ะ"
10046010-112 = "ใช่ว่าเราจะเพิ่งรู้จักกันมาแค่วันสองวันนะคะ คุณหนูไร้เดียงสา"
10046010-113 = "ขอร้องละ บางเรื่องน่ะปล่อยผ่านไปบ้างเถอะ ไม่ต้องพูดขยายก็ได้นะ? คุณเซอาผู้น่าหงุดหงิด"
10046010-114 = "ฮุฮุ ถ้าคุณไร้เดียงสา ฉันก็น่าหงุดหงิด นี่คงเป็นนิสัยโดยกำเนิดของฉันน่ะค่ะ ช่วยเข้าใจด้วยนะคะ"
10046010-115 = "แต่ฉันก็คิดเหมือนกันนะคะว่าอยากให้เรา 3 คนได้ไปเที่ยวเล่นกันแบบไม่ต้องกังวลเรื่องอื่นบ้าง"
10046010-116 = "แต่ว่า..."
10046010-120 = "หืม...? มีเรื่องกังวลอะไรเหรอ?"
10046010-121 = "อืม..."
10046010-122 = "เปล่าหรอกค่ะ ก็ตอนนี้ฉันไม่เหมือนเดิมแล้วนี่คะ ฉันคงแค่กังวลเรื่องคนอื่นน่ะค่ะ"
10046010-123 = "ฮ่าฮ่า! อะไรกันเนี่ย เซอาจังนี่ละก็นะ~"
10046010-124 = "ไม่เอาน่า~ อย่ากังวลอะไรให้มากเลย..."
10046010-129 = "คงไม่มีเรื่องอะไรหรอกน่า"
10046010-145 = "ก็เพราะมีเรื่องแบบนั้น... ฉันก็เลยมาขอร้องพวกเธอกับคุณครูน่ะ!"
10046010-146 = "ฉันอยากให้นางิจังได้พักผ่อนเต็มที่ และไม่ต้องเอาเรื่องงานมาคิดให้เหนื่อยสมอง"
10046010-147 = "ทั้งชมรมทวงความยุติธรรม... และคุณครูก็น่าจะงานยุ่งกันอยู่แล้วแท้ๆ... ต้องขอโทษด้วยนะ!"
10046010-148 = "ฮุฮุ ไม่ต้องขอโทษหรอกค่ะ การสนับสนุนสภาน้ำชาก็เป็นหน้าที่ของพวกฉันอยู่แล้วค่ะ"
10046010-149 = "ส่วนเรื่องเกี่ยวกับคุณนางิสะ... ที่จริงพวกฉันเองก็กังวลอยู่เหมือนกัน พอเห็นว่าคุณมิกะใส่ใจแบบนี้ ก็น่าโล่งใจนะคะ"
10046010-150 = "ฉันในตัวแทนของชมรมทวงความยุติธรรม ฉันก็ต้องรบกวนคุณครูเหมือนกันค่ะ"
10046010-151 = "[s1] \"ได้สิ ครูก็ดีใจที่ได้เป็นส่วนหนึ่งด้วยนะ\"\n[s2] \"เป็นความคิดที่ดีเลยละ! ครูเห็นด้วย\""
10046010-154 = "คุณครู..."
10046010-155 = "ฉันคิดไว้แล้วละค่ะว่าคุณครูจะพูดแบบนี้..."
10046010-156 = "เอาละ... ในเมื่อคุณครูก็ตอบอย่างนี้แล้ว แล้วนี่ก็เป็นแผนการของพวกเราด้วย งั้นเราก็มาทำให้สบายๆ แบบไม่ต้องมีพิธีรีตองมากดีมั้ยคะ?"
10046010-157 = "อิจิกะ...?"
10046010-158 = "ฮุฮุ คงเพราะอย่างนี้สินะคะ ซึรุกิถึงได้ส่งอิจิกะมาทำงานนี้ ตอนแรกฉันก็สงสัยว่าเป็นงานอะไรถึงได้ส่ง#nฉันมากับอิจิกะแค่ 2 คน"
10046010-159 = "คงเป็นเพราะคำขอร้องที่บอกว่า 'ขอให้ส่งคนมาน้อยที่สุด และขอให้ไม่ต้องเล่นใหญ่มาก' นี่เองสินะคะ"
10046010-161 = "อ๊ะ ฉันเป็นคนพูดอย่างนั้นไปเองละ ฉันคิดว่าถ้ามีหลายคนจนดูวุ่นวาย นางิจังจะอยากกลับไปนั่ง#nทำงานเหมือนนางิจังคนเดิมน่ะ"
10046010-162 = "เป็นคุณหนูที่น่ารำคาญเอามากๆ เลยละ ถ้าคนเยอะขึ้นแค่นิดหน่อย ก็จะทำตัวเหมือนคนบ้างาน และคิดว่าจะเกิดปัญหาตลอด"
10046010-163 = "ที่จริงฉันก็ตั้งใจจะบอกว่ามาแค่พวกเราก็พอ ไม่ต้องให้ชมรมทวงความยุติธรรมลำบากมาด้วยก็ได้..."
10046010-165 = "แต่ถ้าคำนึงถึงเรื่องตำแหน่งแล้ว การมีคนมาคุ้มกันก็น่าจะดีกว่าค่ะ พวกฉันจะรับหน้าที่นั้นให้เอง นี่จะเป็นหน้าที่ที่สำคัญที่สุดของพวกฉันเลยค่ะ"
10046010-166 = "แต่ว่าที่นี่ก็ไม่มีใครอยู่เลย..."
10046010-167 = "แล้วก็เป็นชายหาดส่วนตัวของสภาน้ำชาด้วย... ฉันไม่คิดว่าจะมีเรื่องอะไรเป็นพิเศษหรอกค่ะ"
10046010-171 = "คะ...? คุณครู?"
10046010-172 = "แล้วอีก 2 คนที่เหลืออยู่ไหนเหรอคะ? คุณเซอากับคุณนางิสะน่ะค่ะ"
10046010-174 = "2 คนนั้นยังไม่มาเลย น่าจะมาถึงทีหลังพวกเราน่ะ"
10046010-175 = "ตอนนี้พวกเราเหมือน 'ทีมแรก' ที่มาถึงก่อนไง! ฉันว่าจะมาตรวจตราชายหาดเผื่อไว้ก่อนน่ะ"
10046010-176 = "หืม...?"
10046010-177 = "งั้นเราก็มีกันแค่นี้หรือเปล่าน่ะเหรอ? อื้อ มีพวกเรา 4 คนในตอนนี้ แล้วก็เซอาจังกับนางิจัง รวมเป็น 6 คน!"
10046010-178 = "หืม...? แล้วฉันจะมาก่อนทำไมน่ะเหรอ? ก็..."
10046010-182 = "ฉันเป็นผู้รับผิดชอบทริปนี้นี่นา!"
10046010-183 = "[s3] \"มิกะน่ะเหรอ...?\"\n[s4] \"เป็นผู้รับผิดชอบทริปนี้เลย?\""
10046010-186 = "แหะๆ ตกใจล่ะสิ? ฉันเป็นแม่งานดูแลทริปพักผ่อนนี้น่ะ"
10046010-187 = "ถึงจะเรียกว่ามา 'พักผ่อน' แต่สำหรับคนที่รับผิดชอบแล้ว นี่ก็เป็น 'งาน' อย่างหนึ่งนี่เนอะ?"
10046010-188 = "แล้วฉันก็บอกกับนางิจังไปแล้วว่า 'ระหว่างมาพักผ่อนที่นี่ ก็ไม่ต้องคิดหรือกังวลเรื่องอื่นเลย!'"
10046010-190 = "อืม... นั่นสินะคะ ถึงปากจะบอกว่ามา 'พักผ่อน' แต่ถ้ายังคิดเรื่องงานอยู่ ก็คงเรียกว่าเป็นการพักผ่อน#nจริงๆ ไม่ได้หรอกค่ะ"
10046010-191 = "ถ้างั้นงานของสภาน้ำชาวันนี้ก็..."
10046010-192 = "เซอาจังจะช่วยทำแทนให้น่ะ แต่ถ้างานมันยากเกินที่เซอาจังจะจัดการคนเดียวได้ ฉันก็จะขอร้องให้#nคุณครูมาช่วยแทน นางิจังจะได้วางมือได้จริงๆ เสียที"

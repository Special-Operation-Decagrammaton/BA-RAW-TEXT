10046010-149 = "3;하스미 수영복;09;그리고 나기사 님에 대해서는……. 저희 또한 걱정하고 있었으니, 오히려 미카 님의 배려에 안심하고 있습니다."
10046010-150 = "3;하스미 수영복;07;그러니 저 또한 미카 님처럼, 정의실현부를 대표해서 부탁드립니다. 선생님.\n#3;greeting"
10046010-151 = "[s1] \"정말로 괜찮아. 나도 오히려 기쁜걸.\"\n[s2] \"기특한 생각들이잖아! 좋아, 좋아.\""

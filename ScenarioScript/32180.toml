[translation]
32180-1 = "第18話;就算是這樣的世界（２）"
32180-2 = "修女會……"
32180-3 = "花子，你竟然……！"
32180-4 = "……沒錯，我和他們訂下了約定。"
32180-5 = "約定……？"
32180-6 = "你沒有必要知道，彌香同學。"
32180-11 = "希望今天平靜和安寧也和各位同在……咳咳。"
32180-12 = "不好意思打擾了……"
32180-13 = "修女會決定打破以往的慣例……在此介入茶會的內部紛爭。"
32180-14 = "茶會的聖園彌香同學──#n我以對其他茶會成員的教唆傷害，以及傷害未遂的罪名逮捕你。"
32180-17 = "咦……是修女會的歌住櫻子啊？"
32180-18 = "啊哈哈，跟修女會的戰鬥還是第一次呢。#n原來如此，這就是你們的王牌嗎？"
32180-19 = "你是怎麼讓修女會行動的呢，花子醬？"
32180-20 = "你之前跟修女們的感情似乎很不錯吧？#n那些可疑的傢伙不太可能毫無理由地行動……你究竟付出了什麼代價？"
32180-21 = "……"
32180-22 = "……真讓人好奇呢。#n雖然必須收拾的對象增加是有點麻煩。"
32180-23 = "……臉色終於變了呢，彌香同學。"
32180-24 = "是嗎？我本來就打算在當上主席後清掃一下大教堂。#n嗯，就當作是把麻煩的事情一起解決吧。"
32180-29 = "……那麼就繼續戰鬥吧？"
32180-33 = "彌香同學！你還想繼續戰鬥嗎？#n你已經沒有勝算了，乖乖放下武器投降吧！"
32180-34 = "……嗯，或許是這樣沒錯。#n但是都走到這一步了，總不可能乖乖投降吧？"
32180-36 = "我只能繼續前進了。"

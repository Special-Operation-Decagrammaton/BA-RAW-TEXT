32180-10 = "1;마리;01\n5;히나타;01\n#1;black\n#5;black"
32180-11 = "1;마리;09;오늘도 평화와 안녕이 그대와 함께하기를. ……콜록.\n#1;a\n#1;em;[속상함]\n#1;shake"
32180-12 = "5;히나타;06;……죄송해요. 폐를 끼치러 왔습니다.\n#5;greeting\n#5;a"
32180-13 = "1;마리;09\n5;히나타;06\n3;사쿠라코;99;시스터후드. 지금까지의 관습을 깨고 티파티의 내분에 개입하겠습니다.\n#3;a"
32180-14 = "1;마리;01\n5;히나타;01\n3;사쿠라코;01;티파티 미소노 미카 씨. 다른 티파티 멤버의 상해 교사 및 상해 미수로 시스터후드의 자율규제에 들어가겠습니다.\n#3;em;[반응]\n#1;h\n#5;h\n#3;h"
32180-15 = "#all;hide"
32180-16 = "1;하나코;05\n5;미카;09\n#1;h\n#5;h"
32180-17 = "5;미카;09;어라…… 그러니까, 시스터후드의 사쿠라코 쨩이지?"
32180-18 = "5;미카;10;아하하. 시스터후드랑은 처음 싸워보네. 응. 이게 너희가 준비한 비장의 카드야? \n#5;em;[재잘]\n#5;hophop"
32180-19 = "5;미카;15;대체 어떻게 시스터후드를 움직이게 만든 거야? 하나코 쨩?"
32180-20 = "5;미카;02;너는 시스터후드들과 친했었지? 대체 뭘 대가로 지불한 거야? 저 수상쩍은 녀석들이 아무 이득없이 움직일 리가 없는데 말야."
32180-21 = "1;하나코;05;……."
32180-22 = "5;미카;99;……재미있겠네. 해치워야 할 사람들이 더 늘어나는 건 귀찮지만."
32180-23 = "1;하나코;06;……. 동요하고 있군요, 미카 씨."
32180-24 = "5;미카;01;아니, 어차피 호스트가 되면 대성당도 청소하려고 했으니까, 응. 귀찮은 일을 한꺼번에 한다고 생각하지 뭐."

32180-33 = "3;하나코;06;미카 씨! 더 싸울 생각인가요? 당신에게 승산은 없습니다. 총을 버리세요!\n#3;em;[반응]\n#3;closeup"
32180-34 = "3;미카;99;응, 그럴지도. 하지만 여기까지 와서 순순히 항복할 수는 없잖아? \n#3;closeup"

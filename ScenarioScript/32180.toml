[translation]
32180-1 = "ตอนที่ 18;โลกแบบนั้น (2)"
32180-2 = "ชมรมซิสเตอร์..."
32180-3 = "ฮานาโกะ... นี่เธอ...!"
32180-4 = "ใช่ค่ะ... ฉันเองก็ทำสัญญาไว้เหมือนกัน"
32180-5 = "สัญญา...?"
32180-6 = "คุณไม่จำเป็นต้องรู้หรอกค่ะ คุณมิกะ อีกอย่าง..."
32180-11 = "ขอให้ความสงบสุขและความรื่นรมย์จงอยู่กับคุณ... แค่กๆ ..."
32180-12 = "ขอโทษนะคะ ฉันมาที่นี่เพื่อรบกวนค่ะ"
32180-13 = "ชมรมซิสเตอร์จะขอไม่รักษาธรรมเนียมที่มีอยู่ และเข้ามาแทรกแซงการทะเลาะกันภายในของสภาน้ำชาค่ะ"
32180-14 = "คุณมิโซโนะ มิกะ จากสภาน้ำชา คุณจะต้องเข้ารับการควบคุมตนเองในความผิดยุยง#nและพยายามทำร้ายร่างกายสมาชิกสภาน้ำชาค่ะ"
32180-17 = "เอ๋... เธอคือซากุระโกะจังจากชมรมซิสเตอร์สินะ?"
32180-18 = "อะฮ่ะฮ่า เป็นครั้งแรกเลยนะเนี่ยที่ได้สู้กับชมรมซิสเตอร์ นี่คือไพ่ลับที่พวกเธอเตรียมเอาไว้งั้นเหรอ?"
32180-19 = "ฮานาโกะจัง เธอทำยังไงถึงทำให้ชมรมซิสเตอร์ออกมาเคลื่อนไหวแบบนี้ได้ล่ะ?"
32180-20 = "เธอเคยสนิทกับพวกซิสเตอร์ใช่ไหม? เธอยอมจ่ายด้วยอะไรเพื่อแลกมาล่ะ? ไม่มีทางที่พวกที่มีพิรุธจะเคลื่อนไหวได้โดยไม่ได้รับอะไรเป็นการตอบแทนหรอก ว่าไหมล่ะ?"
32180-21 = "......."
32180-22 = "มันน่ารำคาญนะที่ต้องมีคนให้จัดการเพิ่มขึ้น... แต่ยังไงก็คงจะสนุกดี"
32180-23 = "คุณมิกะ คุณกำลังกระสับกระส่ายสินะคะ..."
32180-24 = "ก็เปล่านี่ ถ้าอยากขึ้นเป็นโฮสต์ ยังไงฉันก็ต้องจัดการมหาวิหารอยู่แล้ว#nอืม... ก็คิดซะว่าต้องทำเรื่องที่น่ารำคาญพร้อมๆ กันเลยแล้วกัน"
32180-29 = "เอาล่ะ มางั้นลองดูอีกสักตั้ง"
32180-33 = "คุณมิกะ! ยังคิดจะสู้ต่อเหรอคะ? คุณไม่มีทางชนะหรอก วางปืนเถอะค่ะ!"
32180-34 = "อื้ม อาจจะไม่ชนะก็ได้ แต่มาถึงขนาดนี้แล้ว จะให้ยอมจำนนง่ายๆ ได้ยังไงล่ะ? "
32180-36 = "ฉันไม่มีทางเลือกอื่นนอกจากไปให้ถึงที่สุด"

[translation]
32180-1 = "第18話;そんな世界も（２）"
32180-2 = "シスターフッド……！？"
32180-3 = "っ、浦和ハナコ……！"
32180-4 = "……まあ、ちょっとした約束をしましたので。"
32180-5 = "約束……？"
32180-6 = "あなたは知らなくても良いことですよ、ミカさん。"
32180-11 = "けほっ、今日も平和と安寧が、みなさんと共にありますように……けほっ。"
32180-12 = "す、すみません、お邪魔します……。"
32180-13 = "シスターフッド、これまでの慣習に反することではありますが……ティーパーティーの内紛に、介入させていただきます。"
32180-14 = "ティーパーティーの[ruby=みその]聖園[/ruby]ミカさん。他のティーパーティーメンバーへの傷害教唆及び傷害未遂で、あなたの身柄を確保します。"
32180-17 = "シスターフッド、[ruby=うたずみ]歌住[/ruby]サクラコ……。"
32180-18 = "……あはっ。流石にシスターフッドと戦うのは初めてだなー。なるほどね、これが切り札ってこと？"
32180-19 = "……浦和ハナコ、どうやってシスターフッドを動かしたの？"
32180-20 = "シスターたちと仲良かったのは知ってる。でもあの子たちが何の得も無く動くはずが無い……ねえ、[ruby=・   ・   ・   ・   ・   ・]何を支払った[/ruby]の？"
32180-21 = "……。"
32180-22 = "……うん、興味深いね。さて、片付けないといけない相手が一気に増えちゃったなぁ。"
32180-23 = "……ようやく顔色が変わりましたね、ミカさん？"
32180-24 = "……そうかな？まあどうせホストになったら、大聖堂も掃除しようと思ってたところだし。うん、一気にやれるチャンスだって考えることにしようかな。"
32180-29 = "……さて、じゃあやってみよっか？"
32180-33 = "……あくまでも戦うつもりですか、ミカさん。この状況での勝算がどれくらいか、分からないあなたではないですよね？"
32180-34 = "……うん、そうかもね。でもここまで来て、「おとなしく降参します」なんてわけにはいかないでしょ？"
32180-36 = "……もう私は、行くところまで行くしかないの。"

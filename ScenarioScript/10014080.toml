[translation]
10014080-1 = "第8話;被封印的魔獸……"
10014080-3 = "（……隔天）"
10014080-4 = "嗨，老師。"
10014080-5 = "……呵呵。這次換我等老師了呢。"
10014080-6 = "老師平常都這麼早就來了啊。"
10014080-7 = "[s1] 「早呀，千紗。」\n[s2] 「明明離約好的時間還很久……」"
10014080-8 = "……嗯？不，也不是有什麼特別的事。"
10014080-9 = "……嗯？不，也不是有什麼特別的事。"
10014080-10 = "只是想確認一下老師平常都會比約好的時間提早多少到而已。"
10014080-11 = "嘛，能像這樣悠悠哉哉的也是多虧了老師。"
10014080-12 = "……謝謝你，老師。#n我打從心底感謝你。"
10014080-13 = "[s3] 「態度也比以前輕鬆了不少呢。」\n[s4] 「說話也比較輕鬆了呢，千紗。」"
10014080-14 = "嘛……也對。"
10014080-15 = "嘛……也對。"
10014080-16 = "其實這次的事……在跟老師說之前，我真的不知道該怎麼辦才好。"
10014080-17 = "會想找老師商量，其實也是抱著死馬當活馬醫的心情……不過有拜託你是正確的呢。"
10014080-18 = "……雖然到途中都有點不可靠，害我有點生氣就是了。"
10014080-22 = "……老師你……"
10014080-23 = "其實打從一開始就全都明白了吧？#n……問題只是我要如何接受而已。"
10014080-24 = "所以才不是去找宇沢，而是一直來找我。#n對吧？"
10014080-25 = "……為什麼不直接跟我說呢？"
10014080-26 = "那個……我只是有點好奇。#n因為老師總是在一旁看著而已。"
10014080-27 = "「看你怎麼接受」、「樂觀一點看待吧」、「取決於你的心情」……#n其實只要說一些這種鼓勵的話就好了吧。事實上也是這樣沒錯。"
10014080-28 = "現在的我是這麼想的。#n假如其他人找我商量這種事，我想我也會這麼告訴他。"
10014080-29 = "[s5] 「……那是『現在』才會這麼想吧。」\n[s6] 「因為不是幾句話就能解決的問題。」\n[s7] 「因為有必要在一旁看著你們才行。」"
10014080-30 = "……唔嗯。"
10014080-31 = "……唔嗯。"
10014080-32 = "……唔嗯。"
10014080-33 = "這樣啊。說實話，雖然還有很多事搞不懂……"
10014080-34 = "不過……沒關係。#n某種程度上……也明白了。"
10014080-35 = "……嗯？"
10014080-36 = "……你說什麼？"
10014080-37 = "還有件事想問？#n……什麼事？"
10014080-38 = "……不當太妹的理由？#n咦……我不是說過了嗎？"
10014080-42 = "……想知道更詳細的原因啊。"
10014080-43 = "不過，其實真的不是多大的理由……"
10014080-44 = "因為不怎麼有趣，如果太期待的話可能會失望的哦。#n沒關係嗎？"
10014080-45 = "……啊，是。知道了知道了……#n畢竟也受你不少照顧，就說給你聽吧。"
10014080-46 = "嘛，那個……"
10014080-48 = "那是個平凡的一天。#n像往常一樣找人打架，沉醉在勝利的心情裡準備回家。"
10014080-49 = "就在那時……我看見了一個孩子。"
10014080-52 = "在路邊一家漂亮的咖啡廳裡，邊吃著蛋糕跟聖代邊吵吵鬧鬧的。"
10014080-54 = "不知道為什麼在吃那種東西……一邊吃著薄荷巧克力一邊有說有笑的。"
10014080-56 = "我自己也不知道為什麼……看見那個場景後就停下了腳步。"
10014080-57 = "很神奇對吧。明明沒什麼特別的。#n為什麼會這樣呢……"
10014080-59 = "……那孩子看起來是那麼的開心。#n帶著可愛、柔和……又溫暖的笑容。"
10014080-61 = "對當時的我來說，那是無論如何都模仿不來的氛圍。"
10014080-66 = "一這麼想……就突然很想變得跟那孩子一樣。"
10014080-67 = "……想成為跟他一樣的好女孩。#n就是這樣而已。"
10014080-70 = "像個笨蛋一樣努力模仿他之後，不知不覺就變成現在這樣了。"
10014080-74 = "嘛……也是因為這樣，我才想要忘了過去的自己。"
10014080-75 = "這次可能……有點做過頭，太歇斯底里了也說不定。"
10014080-76 = "明明沒有必要變得完全跟那孩子一樣的……"
10014080-77 = "……？"
10014080-78 = "……嗯。"
10014080-79 = "……哈哈。"
10014080-80 = "……原來如此，是這樣啊。"
10014080-81 = "老師……"
10014080-82 = "……真是的……大人還真狡猾啊。"
10014080-83 = "[s8] 「回社團活動室吧。」\n[s9] 「這樣一來，諮詢就結束了吧。」"
10014080-89 = "……嗯。"

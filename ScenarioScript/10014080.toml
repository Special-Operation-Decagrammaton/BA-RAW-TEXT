10014080-46 = "Well, it's just..."
10014080-48 = "It was just a regular day. I'd beat some kid in a huge fight, and was feeling pretty proud as I was walking home."
10014080-49 = "Then I saw some kid, just as I was walking by."
10014080-52 = "She was chatting in a cute cafe, eating cake and a parfait with friends."

[translation]
10014080-1 = "ตอนที่ 8;ปีศาจแคทส์ พาลูคที่ถูกผนึกไว้"
10014080-3 = "(วันต่อมา...)"
10014080-4 = "โอ๊ะ มาแล้วเหรอคุณครู?"
10014080-5 = "ฮุฮุ... ครั้งนี้ฉันมารอก่อนแหละ"
10014080-6 = "อย่างนี้นี่เอง ปกติคุณครูจะมาเร็วกว่าประมาณนี้สินะ"
10014080-7 = "[s1] \"มาถึงก่อนแล้วเหรอ คาซึสะ?\"\n[s2] \"อีกสักพักเลยนะกว่าจะถึงเวลานัด...\""
10014080-8 = "หืม...? ไม่นะ ก็ไม่ได้มีเหตุผลพิเศษอะไรหรอกนะ"
10014080-9 = "หืม...? ก็ไม่เห็นจะเป็นอะไรเลยนี่นา"
10014080-10 = "ก็แค่อยากรู้ว่าปกติแล้วเวลาที่นัดกัน คุณครูจะออกมาเร็วกว่าแค่ไหนน่ะ"
10014080-11 = "ก็นะ ที่ฉันมีเวลาว่างสบายๆ แบบนี้ได้ก็เพราะคุณครูแหละนะ"
10014080-12 = "อื้อ... ขอบคุณนะคุณครู รู้สึกขอบคุณจากใจเลย"
10014080-13 = "[s3] \"เหมือนจะคุยกันแบบสบายๆ กว่าเดิมแล้วนะ\"\n[s4] \"ฟังดูสบายใจขึ้นแล้วสินะ คาซึสะ\""
10014080-14 = "อืม... ก็จริงนะ"
10014080-15 = "อืม... ก็จริงนะ"
10014080-16 = "ที่จริงเรื่องครั้งนี้น่ะ... ก่อนที่จะได้มาปรึกษากับคุณครู ลำพังฉันตัวคนเดียวนี่ไม่รู้เลยว่าควรจะต้อง#nจัดการยังไง"
10014080-17 = "ฉันก็แค่อยากจะทำอะไรสักอย่าง... และการขอความช่วยเหลือก็ดูเหมือนจะเป็นคำตอบ"
10014080-18 = "ถึงตอนนั้นคุณครูจะไม่ได้ทำตัวให้น่าไว้ใจได้สักเท่าไรก็เถอะ..."
10014080-22 = "นี่คุณครู..."
10014080-23 = "ความจริงครูรู้อยู่ตั้งแต่แรกแล้วใช่มั้ย? ว่าเรื่องนี้... ปัญหาอยู่ที่ว่าฉันจะยอมรับได้ยังไงก็เท่านั้นเองน่ะ"
10014080-24 = "เพราะงั้นก็เลยไม่ได้เรียกอุซาวะ แต่เรียกฉันออกมาคุยแทนงั้นสินะ ใช่มั้ย?"
10014080-25 = "ทำไมถึงไม่บอกฉันมาตรงๆ เลยล่ะ? ทำไมถึงเอาแต่คอยอยู่ข้างๆ เฉยๆ ล่ะ?"
10014080-26 = "ฉันถามเพราะสงสัยเฉยๆ แค่นั้นนะ ไม่ใช่คำที่พูดยากอะไรนี่นา"
10014080-27 = "'มันขึ้นอยู่กับว่าเธอคิดยังไง' 'แค่คิดในแง่ดีๆ ไว้ก็ได้แล้วละ' 'มันต่างกันไปตามการตัดสินใจน่ะ'..."
10014080-28 = "ถึงจะเพิ่งมาพูดเอาตอนนี้ก็เถอะ แบบนั้นแม้แต่ฉันก็น่าจะพูดได้นะ"
10014080-29 = "[s5] \"ก็เพราะ... 'เพิ่งจะมาพูดเอาตอนนี้' น่ะสิ\"\n[s6] \"มันไม่ใช่เรื่องที่จะแก้ไขได้ด้วยการสั่งสอนนี่นา\"\n[s7] \"การคอยจับตาดูก็เป็นสิ่งที่จำเป็นนะ\""
10014080-30 = "อืม..."
10014080-31 = "อืม..."
10014080-32 = "อืม..."
10014080-33 = "อย่างนั้นเหรอ อันที่จริงฉันก็ยังไม่ค่อยจะเข้าใจเท่าไร..."
10014080-34 = "เอาเถอะ... ไม่เป็นไรหรอก เหมือนจะได้คำตอบประมาณหนึ่งแล้วแหละนะ"
10014080-35 = "หืม...?"
10014080-36 = "ว่าไงนะ...?"
10014080-37 = "มีเรื่องที่ยังไม่ได้ฟัง? ...? เรื่องอะไรเหรอ?"
10014080-38 = "เหตุผลที่เลิกเป็นแยงกี้สาว? อ้อ... ยังไม่ได้บอกงั้นเหรอ? เรื่องนั้น..."
10014080-42 = "เข้าใจแล้ว... ดูท่าทางจะอยากฟังให้มันละเอียดๆ เลยสินะ"
10014080-43 = "แต่ว่ามันก็ไม่ใช่เหตุผลที่ยิ่งใหญ่อะไรเลยนะ..."
10014080-44 = "พอฟังแล้วก็จะรู้ว่ามันไม่มีอะไรเลย ถ้าคาดหวังอะไรอยู่ก็คงต้องผิดหวังแน่ๆ จะไม่เป็นไรใช่มั้ย?"
10014080-45 = "อ่า ได้ เข้าใจแล้วละ มาถึงตอนนี้แล้ว ให้เล่าไปก็ไม่ใช่เรื่องยากแล้วแหละนะ"
10014080-46 = "คือว่า... มันก็แค่..."
10014080-48 = "มันเป็นวันหนึ่งที่ไม่ได้มีอะไรเป็นพิเศษ ฉันก็มีเรื่องเหมือนปกติ แล้วก็เดินฮัมเพลงกลับบ้านอย่าง#nสบายใจที่สู้ชนะ"
10014080-49 = "แล้วก็บังเอิญไปเห็น... เด็กคนหนึ่งเข้าน่ะ"
10014080-52 = "เด็กที่นั่งพูดคุยกันไปพร้อมกับกินเค้กและพาร์เฟต์อยู่ข้างในคาเฟ่สวยๆ ริมถนน"
10014080-54 = "กำลังนั่งกินมินต์ช็อกโกแลตที่ดูแล้วไม่น่ากินอยู่... แล้วก็หัวเราะไปพร้อมกับเพื่อนๆ"
10014080-56 = "ฉันก็ไม่รู้เหมือนกันว่าทำไม... แต่พอเห็นแบบนั้นฉันก็นิ่งไปแล้วก็หยุดเดินน่ะ"
10014080-57 = "น่าแปลกมากเลย ทั้งๆ ที่ไม่ใช่เรื่องใหญ่อะไร แต่จะว่ายังไงดี..."
10014080-59 = "ดูท่าทางสนุกกันมากเลย รู้สึกว่าน่ารักแล้วก็ทำให้ใจนุ่มฟู แล้วก็เป็นรอยยิ้มที่อบอุ่นมากน่ะ"
10014080-61 = "มันเป็นบรรยากาศที่ฉันในตอนนั้น ไม่ว่าจะพยายามแค่ไหนก็ทำตามไม่ได้"
10014080-66 = "พอคิดแบบนั้นแล้ว... จู่ๆ ก็อยากทำมากเลย"
10014080-67 = "อยากเป็นแบบเด็กคนนั้น... ก็แค่นั้นเอง"
10014080-70 = "ตอนนั้นแค่ทำตามโดยไม่รู้เรื่องอะไร เผลอแป๊บเดียวเรื่องก็กลายมาเป็นแบบนี้แล้ว"
10014080-74 = "ก็นะ... ในระหว่างนั้นฉันก็มีความคิดที่อยากจะลบตัวตนเก่าๆ ของตัวเองทิ้ง..."
10014080-75 = "บางทีคราวนี้ ฉันคงจะทำตัวน่ารำคาญไปหน่อยรึเปล่าก็ไม่รู้เหมือนกัน"
10014080-76 = "ที่จริงอาจจะไม่ต้องเหมือนกันเป๊ะขนาดนั้นก็ได้..."
10014080-77 = "...?"
10014080-78 = "อ่า..."
10014080-79 = "ฮ่าฮ่า..."
10014080-80 = "สุดท้ายก็มาคิดได้แบบนี้ เรื่องมันก็เป็นแบบนั้นน่ะ"
10014080-81 = "คุณครู..."
10014080-82 = "เป็นผู้ใหญ่เนี่ย...ยากเหมือนกันนะ"
10014080-83 = "[s8] \"เสร็จแล้วกลับไปที่ห้องชมรมกันดีมั้ย\"\n[s9] \"แบบนี้การให้คำปรึกษาก็เสร็จสิ้นแล้วสินะ\""
10014080-89 = "อื้ม..."

[translation]
80000018-1 = "The Treasurer's Limit"
80000018-2 = "Millennium Seminar Office"
80000018-5 = "Right. Valentine's Day is next week."
80000018-6 = "Sensei is sure to receive all kinds of chocolate next week,#nbeing as popular as they are."
80000018-7 = "Much more than they need, to say the least. Maybe I shouldn't bother sending chocolate as well."
80000018-8 = "..."
80000018-9 = "On the other hand, it's common courtesy to send gifts for holidays.#nSensei would think less of Seminar if I don't send something as the#ntreasurer while other academies' students send chocolate."
80000018-10 = "I'll have to buy a chocolate gift set of my own."
80000018-17 = "Hmm. A \"Chocolate Box for Business Partners\"."
80000018-18 = "The packing looks neat and professional, and the reviews are solid.#nThis seems perfect for Sensei..."
80000018-19 = "...but it costs 10,000 yen?!"
80000018-20 = "Is something this pricey appropriate for a student to give their teacher?#nEspecially coming from me after I've been so strict on Sensei about#nnot wasting money..."
80000018-21 = "Still, it wouldn't feel right to cheap out on Sensei's chocolate...#nWhat should I do?"
80000018-25 = "I may have an idea."
80000018-27 = "Schale Office"
80000018-28 = "The morning of Valentine's Day."
80000018-29 = "Good morning, Sensei."
80000018-30 = "[s] \"Good morning, Yuuka.\""
80000018-31 = "So...do you know what day it is?"
80000018-32 = "[s1] \"Go to Work in Your Underwear Day?\"\n[s2] \"Dried Anchovy Day?\""
80000018-33 = "What? That's not a real holiday, is it?"
80000018-34 = "What? That's not a real holiday, is it?"
80000018-35 = "Today is Valentine's Day! It's even written on the Schale calendar!"
80000018-36 = "A-Anyway. Not that I put much stock into a holiday like this,#nbut I do owe you a lot for the last year, so..."
80000018-41 = "Here. I bought you some Valentine's Day chocolate."
80000018-42 = "Don't...feel obligated to eat it, of course. It's merely my way of showing appreciation for our business relationship!"
80000018-43 = "[s] \"Thanks. Looks tasty.\""
80000018-51 = "[ns] \"By the way. Is this the receipt?\""
80000018-52 = "That's...! I mean, um...!"
80000018-53 = "I know I told you to run any purchases over 5,000 yen by me first,#nso I thought you'd judge me if spent more than that on chocolate."
80000018-54 = "I also didn't want to send the wrong message and make it look like I was trying to impress you or win you over."
80000018-55 = "All I'm trying to say is I'm not that kind of girl, and don't take it the wrong way."
80000018-56 = "That's why I made sure to spend exactly 5,000 yen on your chocolate and not even one more."
80000018-57 = "Th-This was a business expense! Nothing more and nothing less!"
80000018-59 = "Later, I spotted another 5,000 yen receipt poking out of Yuuka's wallet for the second payment on the chocolate that actually cost her 10,000 yen...but I pretended not to see that."

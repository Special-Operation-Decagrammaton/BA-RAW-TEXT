[translation]
80000018-1 = "#title;회계의 한도"
80000018-2 = "#place;밀레니엄 세미나 사무실"
80000018-3 = "3;유우카;05\n#3;a\n#wait;3000"
80000018-4 = "3;유우카;02\n#3;em;[반응]\n#wait;1000"
80000018-5 = "3;유우카;99;으음. 벌써 그러고 보니 다음 주가 발렌타인 데이인가…….\n#3;greeting"
80000018-6 = "3;유우카;05;분명 선생님은 인기가 많으니까 초콜릿을 잔뜩 받으시겠지……."
80000018-7 = "3;유우카;05;분명 다 먹지도 못할 정도의 초콜릿을 받으실 텐데, 굳이 나까지 나서서 초콜릿을 선물할 필요는 없으려나……."
80000018-8 = "3;유우카;99;…….\n#3;em;[...]"
80000018-9 = "3;유우카;99;하지만 기념일을 챙기는 것도 비즈니스의 연장. 다른 학원의 학생들이 모두 초콜릿을 선물했는데, 세미나의 회계만 아무것도 선물하지 않아도 선생님이 이상하게 볼 거야.\n#3;stiff"
80000018-10 = "3;유우카;01;역시 적당한 초콜릿 선물 세트라도 하나 선물하는 게 좋겠어.\n#3;hophop\n#3;em;[반응]"
80000018-11 = "#st;[0,0];instant;1;"
80000018-12 = "#clearST"
80000018-13 = "3;유우카;01\n#3;d\n#wait;1000"
80000018-14 = "#wait;1500"
80000018-15 = "#wait;1000"
80000018-16 = "#wait;1500"
80000018-17 = "3;유우카;02;……<비즈니스 상대를 위한 선물용 초콜릿 세트>.\n#3;em;…\n#3;a"
80000018-18 = "3;유우카;02;포장도 예쁘고, 평판도 나쁘지 않네……. 선생님이 좋아하는 맛도 많을 거야."
80000018-19 = "3;유우카;04;그런데 가격이 1만 엔이라고?\n#3;shake\n#3;em;[?!]"
80000018-20 = "3;유우카;04;우으윽…… 학생이 선생님께 드리는 선물의 액수로는 너무 비싸려나? 게다가 평소에 선생님께 낭비하지 말라고 거듭 말해온 입장에서……."
80000018-21 = "3;유우카;99;하지만 그렇다고 너무 저렴한 저가형 초콜릿 세트를 구입하기에는 자존심이 용납하질 않고…… 이를 어쩌지…….\n#3;stiff\n#3;em;[속상함]"
80000018-22 = "#st;[0,0];instant;1;"
80000018-23 = "#clearST"
80000018-24 = "3;유우카;99\n#3;em;…\n#wait;2500"
80000018-25 = "3;유우카;05;으음…… 역시 이 방법밖에 없으려나…….\n#3;greeting"
80000018-26 = "#all;hide"
80000018-27 = "#place;샬레 업무관"
80000018-28 = "#na;(발렌타인 데이 당일 아침)"
80000018-29 = "3;유우카;02;안녕하세요, 선생님. 좋은 아침입니다.\n#3;em;[반응]\n#3;a"
80000018-30 = "[s] \"좋은 아침, 유우카.\""
80000018-31 = "3;유우카;01;저…… 선생님, 오늘이 무슨 날인지 알고 계신가요?"
80000018-32 = "[s1] \"훈도시의 날?\"\n[s2] \"건멸치의 날?\""
80000018-33 = "3;유우카;06;네? 그게 무슨 이상한 기념일인가요?\n#3;em;[?]"
80000018-34 = "3;유우카;06;네? 그게 무슨 이상한 기념일인가요?\n#3;em;[?]"
80000018-35 = "3;유우카;04;오늘은 발렌타인 데이라고요! 샬레의 달력에 쓰여 있잖아요?\n#3;hophop"
80000018-36 = "3;유우카;99;여, 여하튼 그래서…… 딱히 기념일을 챙기는 건 아니지만…… 모른 척하고 넘어가기에는 선생님께 신세를 진 것도 많으니…….\n#3;em;[땀]\n#3;stiff"
80000018-37 = "#st;[0,0];instant;1;"
80000018-38 = "#clearST"
80000018-39 = "3;유우카;99\n#3;d\n#wait;1000"
80000018-40 = "3;유우카;01\n#3;a\n#3;closeup\n#wait;1000"
80000018-41 = "3;유우카;01;……제가 드리는 발렌타인 데이 초콜릿이에요.\n#3;em;[///]\n#3;closeup\n#3;greeting"
80000018-42 = "3;유우카;05;무, 물론 꼭 다 드시지 않아도 괜찮아요. 이 초콜릿은 의리— 아니, 비즈니스적인 의미로 드리는 것이니까요!\n#3;stiff\n#3;closeup"
80000018-43 = "[s] \"고마워. 잘 먹을게.\""
80000018-44 = "#st;[0,0];instant;1;"
80000018-45 = "#clearST"
80000018-46 = "3;유우카;05\n#3;d\n#3;closeup\n#wait;1000"
80000018-47 = "#wait;2500"
80000018-48 = "#st;[0,0];instant;1;"
80000018-49 = "#clearST"
80000018-50 = "#wait;1000"
80000018-51 = "[ns] \"……그나저나 이 영수증은?\""
80000018-52 = "3;유우카;04;그 영수증은…… 그게, 그러니까……!\n#3;em;[!]\n#3;shake\n#3;a"
80000018-53 = "3;유우카;06;전에 선생님께 5,000엔이 넘는 물건은 마음대로 구매하지 말라고 했으면서, 제가 멋대로 비싼 초콜릿을 사오면 이상하게 보실 것 같아서…….\n#3;hophop"
80000018-54 = "3;유우카;04;사심도 없는데 무작정 비싼 초콜릿을 사서 선물하는 여자라고 생각하신다면, 그건 조금 싫을지도……\n#fontsize;55\n#3;em;[속상함]"
80000018-55 = "3;유우카;05;저는 의미도 없는 의리 초콜릿에 거금을 쓰는— 그런 헤픈 여자가 아니니까요!\n#3;hophop"
80000018-56 = "3;유우카;05;이 초콜릿은 딱 5,000엔에 맞췄으니까, 오해하지 말아 주세요.\n#3;stiff"
80000018-57 = "3;유우카;04;이, 이건 어디까지나…… 비즈니스적인 의미로 드리는 선물이니까요!\n#3;em;[!]\n#3;hophop"
80000018-58 = "#all;hide"
80000018-59 = "#na;(이후 유우카의 가방에서 분할 결제한 5,000엔짜리 영수증을 한 장 더 발견했지만, 일부러 모른 척해주었다…….)"

[translation]
80000018-1 = "ขีดจำกัดของการทำบัญชี"
80000018-2 = "ห้องชมรมเซมิน่า มิลเลเนียม"
80000018-5 = "อืม อาทิตย์หน้าก็จะวันวาเลนไทน์แล้วเหรอ..."
80000018-6 = "คุณครูเป็นคนฮอตขนาดนั้นคงจะได้ช็อกโกแลตเยอะมากแน่ๆ..."
80000018-7 = "คงจะได้ช็อกโกแลตเยอะจนกินไม่หมด... เพราะงั้นฉันคงไม่ต้องให้ของขวัญคุณครูก็ได้ละมั้ง..."
80000018-8 = "..."
80000018-9 = "แต่ว่าการให้ของขวัญก็เป็นมารยาททางธุรกิจอย่างหนึ่ง... นักเรียนของโรงเรียนอื่นเองก็คงให้#nของขวัญเป็นช็อกโกแลตเหมือนกัน ถ้ามีแต่นักบัญชีของเซมิน่าที่ไม่ให้ของขวัญ คุณครูก็คงจะมอง#nฉันแปลกๆ สินะ"
80000018-10 = "ถ้างั้นก็ให้เป็นเซ็ตช็อกโกแลตสักหนึ่งเซ็ตแล้วกัน"
80000018-17 = "<เซ็ตช็อกโกแลตของขวัญสำหรับพาร์ทเนอร์ทางธุรกิจ>"
80000018-18 = "แพ็กเกจก็สวยดี แถมดูกระแสตอบรับก็ไม่แย่... แถมมีรสชาติที่คุณครูชอบอยู่เยอะด้วย"
80000018-19 = "แต่ว่าราคาตั้งหนึ่งหมื่นเยนเลยเหรอ?"
80000018-20 = "อึ่ก... ของขวัญที่นักเรียนให้คุณครู มันไม่แพงไปหน่อยรึไงนะ? แถมปกติฉันมักจะคอยบอกคุณครู#nไม่ให้ใช้จ่ายฟุ่มเฟือยอีกด้วย..."
80000018-21 = "ถึงงั้นก็เถอะ ถ้าซื้อเซ็ตช็อกโกแลตที่ราคาถูกไปให้ละก็... มันก็ดูไม่สมศักดิ์ศรีอยู่ดี"
80000018-25 = "อืม ช่วยไม่ได้นะ..."
80000018-27 = "สำนักงานชาเล่ต์"
80000018-28 = "(เช้าวันวาเลนไทน์)"
80000018-29 = "สวัสดีค่ะ คุณครู อรุณสวัสดิ์นะคะ"
80000018-30 = "[s] \"อรุณสวัสดิ์นะ ยูกะ\""
80000018-31 = "คือ... คุณครูคะ วันนี้วันอะไรทราบรึเปล่าคะ?"
80000018-32 = "[s1] \"วันฟุนโดชิ?\"\n[s2] \"วันตากปลาแห้ง?\""
80000018-33 = "คะ? มีวันแปลกๆ แบบนั้นด้วยเหรอคะ?"
80000018-34 = "คะ? มีวันแปลกๆ แบบนั้นด้วยเหรอคะ?"
80000018-35 = "วันนี้เป็นวันวาเลนไทน์ต่างหากค่ะ! มีเขียนไว้ในปฏิทินของชาเล่ต์ด้วยนะคะ"
80000018-36 = "อะ...เอาเป็นว่าปกติฉันไม่ใช่พวกที่ชอบฉลองเทศกาล แต่ก็คงจะปล่อยผ่านไปไม่ได้ เพราะคุณครูเองก็คอยช่วยเหลือฉันอยู่ตลอด..."
80000018-41 = "นี่เป็นช็อกโกแลตวันวาเลนไทน์จากฉันค่ะ"
80000018-42 = "คะ...คุณครูไม่ต้องกินก็ได้นะคะ ช็อกโกแลตนี่แค่ให้ตามธรรมเนียม— มะ...ไม่สิ แค่ให้ตามมารยาท#nทางธุรกิจเท่านั้นค่ะ!"
80000018-43 = "[s] \"ขอบคุณนะ ครูจะกินให้อร่อยเลย\""
80000018-51 = "[ns] \"แต่ว่าใบเสร็จนี่...?\""
80000018-52 = "บะ...ใบเสร็จนั่น เอ่อ คือว่า..."
80000018-53 = "ก่อนหน้านี้ฉันเคยบอกไม่ให้คุณครูซื้อของเกิน 5,000 เยนนี่นา ถ้าฉันเป็นฝ่ายที่ใช้เงินซื้อ#nช็อกโกแลตแพงๆ มา คุณครูอาจมองฉันแปลกๆ ก็ได้..."
80000018-54 = "คุณครูอาจคิดว่าฉันเป็นพวกผู้หญิงที่ซื้อช็อกโกแลตแพงๆ มาทั้งที่ไม่จำเป็น และอาจรู้สึกไม่ชอบ..."
80000018-55 = "ฉันไม่ใช่ผู้หญิงฟุ่มเฟือยที่ทุ่มเงินซื้อช็อกโกแลตมาโดยไม่มีความหมายหรอกนะคะ!"
80000018-56 = "ฉันซื้อช็อกโกแลตนี้มาพอดีงบ 5,000 เยนค่ะ เพราะงั้นอย่าเข้าใจผิดนะคะ!"
80000018-57 = "ฉะ...ฉันแค่ให้ของขวัญคุณครู...เพื่อเป็นมารยาททางธุรกิจเท่านั้นค่ะ!"
80000018-59 = "(จากนั้นคุณครูก็เห็นใบเสร็จอีกหนึ่งใบที่ระบุยอดเงิน 5,000 เยนโผล่ออกมาจากกระเป๋าของยูกะ#nแต่ก็เลือกที่จะทำเป็นไม่รู้ไม่ชี้ไป...)"

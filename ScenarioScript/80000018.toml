[translation]
80000018-1 = "會計的極限"
80000018-2 = "千年．研討會辦公室"
80000018-5 = "話說，下週就是情人節了……"
80000018-6 = "老師肯定會從其他學生那裡收到一大堆巧克力吧……"
80000018-7 = "都已經知道會多到吃不完了，是不是沒必要連我都送老師呢……？"
80000018-8 = "……"
80000018-9 = "但是送禮是工作重要的一環，而且其他學校的學生都有送卻只有我沒送的話……"
80000018-10 = "嗯。果然還是準備一點好東西送老師吧。"
80000018-17 = "……「商業送禮用巧克力組合」。"
80000018-18 = "包裝好看，評價也不錯……應該也有不少老師喜歡的口味。"
80000018-19 = "價格是……1萬元？"
80000018-20 = "唔……作為學生送老師的禮物，這個金額會不會太高了？#n況且我平時總是提醒老師不可以亂花錢……"
80000018-21 = "但是如果送便宜的東西又會比不上其他人，還會讓老師失望……#n不是，是這樣不太禮貌……怎麼辦……"
80000018-25 = "唔，那，只要這麼做的話……"
80000018-27 = "夏萊．辦公室"
80000018-28 = "（情人節當天早上）"
80000018-29 = "早安，老師。"
80000018-30 = "[s]「早安，優香。」"
80000018-31 = "那個……老師，你知道今天是什麼日子嗎？"
80000018-32 = "[s1]「褌之日？」\n[s2]「……魚乾日？」"
80000018-33 = "……咦？有那種奇怪的節日嗎？"
80000018-34 = "……咦？有那種奇怪的節日嗎？"
80000018-35 = "不對，今天是情人節！夏萊的月曆上不是有寫嗎？"
80000018-36 = "總，總之，那個……#n我沒有特別要慶祝節日的意思，不過平時受老師很多照顧，什麼也不做的話有點……"
80000018-41 = "……這是我送老師的情人節巧克力。"
80000018-42 = "當，當然就算不全部吃完也沒關係。這是義理──不對，是基於商業關係送的！"
80000018-43 = "[s]「謝謝，我會好好享用。」"
80000018-51 = "[ns]「……話說這張收據是？」"
80000018-52 = "那，那個是，呃呃……"
80000018-53 = "明明之前向老師說過不可以擅自買5000元以上的東西，#n而我卻買昂貴的巧克力會顯得很奇怪……"
80000018-54 = "我也不想被認為是個會在這種日子特別送昂貴巧克力的那種，心意沉重的女人……"
80000018-55 = "總，總之！我是不會因為沒有意義的義理巧克力就花大錢的──那種沒規矩的女人！"
80000018-56 = "這個巧克力剛好5000元！希望老師不要誤會！"
80000018-57 = "這，這只不過是……為了維持今後與老師的關係的、商業意義上的禮物！"
80000018-59 = "（之後在優香的錢包發現了另一張5000元的分期付款收據，但是決定假裝沒看到）"

2300706-47 = "3;하나코;01;……사실은 원래 이런 분이신 건가요?"
2300706-48 = "3;하나코;03;딱히 혼자 있는 걸 좋아하는 건 아니에요. 놀릴 사람이나, 재밌는 구경거리인 사람이 있는 게 좋죠.\n#3;em;[음표]"
2300706-49 = "3;하나코;03;아까도 말씀드렸듯, 그냥 좀 갑갑한 게 싫은 것뿐. 후후후."
2300706-50 = "3;하나코;01;……\n#3;em;…"
2300706-51 = "3;하나코;99;신기하네요. 생각해 보니 이런 말, 누구에게도 해 본 적도 없는데……"
2300706-52 = "3;하나코;99;묘하게…… 어딘가 후련해진 것 같은 느낌."
2300706-53 = "3;하나코;03;비가 와서 그런걸까요……? 싫지 않네요, 이런 기분.\n#3;em;[하트]"
2300706-54 = "3;하나코;01;……선생님."
2300706-55 = "3;하나코;99;혹시, 만약에 선생님만 괜찮으시다면……"
2300706-56 = "3;하나코;01;아주 가끔씩은, 이렇게 아무 의미 없는 이야기도 좀 부탁드릴 수 있을까요?"
2300706-57 = "[s7] \"물론이지. 단 좀 더 평범한 방법으로.\"\n[s8] \"곤란하게 만드는 장난들만 좀 빼 준다면.\""

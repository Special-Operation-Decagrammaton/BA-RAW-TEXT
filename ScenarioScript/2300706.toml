[translation]
2300706-1 = "#title;빗속의 소녀"
2300706-2 = "#na;(모모톡의 내용이 신경 쓰였기에 찾아가 보기로 했다.)"
2300706-3 = "#na;(이후 하나코 본인은 메시지 확인을 하지 않았기에, 주변의 사람들에게 물어 길을 찾아갔다.)"
2300706-4 = "#all;hide"
2300706-5 = "#wait;1500"
2300706-6 = "#na;(그러고도 한참을 더 찾아다닌 뒤에야, 공원 시설에 앉아 있는 하나코의 모습을 발견할 수 있었다.)"
2300706-7 = "#na;(하나코는 팔각정 안 벤치에 앉아, 멍한 얼굴로 내리는 비를 바라보고 있었다.)"
2300706-8 = "3;하나코;00;……\n#3;a"
2300706-9 = "3;하나코;05;……후……\n#3;stiff\n#3;em;[속상함]"
2300706-10 = "[s1] \"……안녕, 하나코.\"\n[s2] \"무슨 생각을 그렇게 하고 있어?\""
2300706-11 = "3;하나코;00;……?\n#3;em;[?]"
2300706-12 = "3;하나코;00;……?\n#3;em;[?]"
2300706-13 = "3;하나코;00;……응?"
2300706-14 = "3;하나코;04;어…… 어라? 선생님? 여기는 어떻게……\n#3;stiff\n#3;em;[땀]"
2300706-15 = "3;하나코;01;……"
2300706-16 = "3;하나코;03;흐응…… 후훗.\n#3;em;[음표]"
2300706-17 = "3;하나코;01;뭐, 그렇네요. 이것도 선생님답다면 선생님다운 일이겠죠."
2300706-18 = "3;하나코;01;하지만 그렇다고 장소도 말씀드리지 않았는데, 이렇게 집요하게 찾아오실 줄은……"
2300706-19 = "3;하나코;99;이렇게 안 쫓아 오셔도, 말씀만 해주신다면 얼마든지 제가 찾아가 드릴 텐데…….\n#3;em;…"
2300706-20 = "[s] 그런 거로 하고, 무슨 일이 있었는지를 묻는다."
2300706-21 = "3;하나코;01;……?\n#3;em;[반응]"
2300706-22 = "3;하나코;00;……어라."
2300706-23 = "3;하나코;01;뭔가 특별한 일이라고 할 만한 게 있었다면, 아까 선생님께 모모톡으로 연락을 드렸을 거예요."
2300706-24 = "3;하나코;03;아니면 제가 뭔가 숨기고 있는 것처럼 보이시나요? \n#3;em;[하트]"
2300706-25 = "[s] 그런 걸로 하고, 무슨 일이 있었는지를 묻는다."
2300706-26 = "3;하나코;01;……"
2300706-27 = "3;하나코;03……다시 말씀드리지만, 정말로 별일 없었어요. \n#3;em;[음표]"
2300706-28 = "3;하나코;03;굳이 말씀드리자면 아는 곳으로부터 연락이 좀 왔을 뿐."
2300706-29 = "[s3] \"아는 곳?\"\n[s4] \"……연락?\""
2300706-30 = "3;하나코;01;별 내용도 없고, 그냥 모두에게 인사차 돌리는 연락이에요. 격식적인 인사 치례죠."
2300706-31 = "3;하나코;01;별 내용도 없고, 그냥 모두에게 인사차 돌리는 연락이에요. 격식적인 인사 치례죠."
2300706-32 = "3;하나코;99;그치만 단순한 안부 인사라고 해도…… \n#3;em;…"
2300706-33 = "3;하나코;01;화려한 미사여구와 맥락 안에 본심을 숨겨놓은……. 복잡하고 피곤한 퀴즈 같은 편지거든요."
2300706-34 = "3;하나코;05;하고 싶은 이야기가 있다면 그냥 하면 될 텐데…… \n#3;em;[속상함]\n#3;stiff"
2300706-35 = "3;하나코;05;기만으로 스스로를 둘러싸지 않으면 소통이 안되는 건지……."
2300706-36 = "3;하나코;05;……."
2300706-37 = "3;하나코;00;아, 미리 말씀드리지만 딱히 나쁘거나 위험한 내용은 아니니까 걱정 마세요.\n#3;em;[반응]"
2300706-38 = "3;하나코;01;그냥…… 그냥 좀 갑갑하고 숨쉬기 힘든 곳일 뿐."
2300706-39 = "3;하나코;03;……후후. 그쵸? 참 이상한 이야기죠?"
2300706-40 = "3;하나코;03;거기도 저 같은 아이는 그냥 이대로 내버려 두는 게 좋을 텐데 말이예요."
2300706-41 = "3;하나코;01;성적도, 성격도 나빠서 보충수업부에 속해 있고, 매일 사고나 치는 저에게 왜 그런 걸 보내는지는……."
2300706-42 = "[s5] \"하나코는 연락 오는 게 싫은 거야?\"\n[s6] \"혼자 있는 걸 좋아하는 건 아니잖아.\""

[translation]
2300706-1 = "雨中的少女"
2300706-2 = "（因為很在意MomoTalk的內容，所以決定去找花子）"
2300706-3 = "（之後不管傳出多少訊息都沒有顯示已讀，只能一邊詢問附近的人一邊找他……）"
2300706-6 = "（找了好一段時間之後，才在公園找到花子）"
2300706-7 = "（花子坐在長椅上，呆呆地望著落下的雨滴）"
2300706-8 = "……"
2300706-9 = "……呼。"
2300706-10 = "[s1] 「……花子？」\n[s2] 「你有心事嗎？」"
2300706-11 = "……？"
2300706-12 = "……？"
2300706-13 = "……哎呀？"
2300706-14 = "老師……？您怎麼會在這裡……"
2300706-15 = "……"
2300706-16 = "……呵呵。"
2300706-17 = "沒有，只覺得這的確是老師會做的事呢。"
2300706-18 = "不過我明明沒有告訴您地點，老師居然能找到這裡來呢。"
2300706-19 = "明明只要說一聲，我就會前往您的身邊……"
2300706-20 = "[s] 詢問是不是有心事"
2300706-21 = "……？"
2300706-22 = "……呵呵。"
2300706-23 = "我剛剛也用MomoTalk說了，沒什麼要緊的。"
2300706-24 = "抱歉讓老師費心了。"
2300706-25 = "[s] 再溫柔地詢問一次"
2300706-26 = "……"
2300706-27 = "……真的不是什麼大事。"
2300706-28 = "真要說的話，只不過是有個認識的人跟我聯絡罷了。"
2300706-29 = "[s3] 「認識的人？」\n[s4] 「……聯絡？」"
2300706-30 = "沒什麼大不了的。就是個很制式很常見的問候，大家也都會傳。"
2300706-31 = "沒什麼大不了的。就是個很制式很常見的問候，大家也都會傳。"
2300706-32 = "不過……"
2300706-33 = "還是能稍微察覺到包裝在華麗詞藻與脈絡下的真心話……#n就像是個不太有趣的謎題。"
2300706-34 = "如果有什麼想說的，明明直接跟我說就好了…… "
2300706-35 = "不知道是不是有什麼，非得讓對方用謊言包裝自己的隱情……"
2300706-36 = "……"
2300706-37 = "啊，我話先說在前，並不是什麼不好或危險的內容，不用擔心。"
2300706-38 = "只是……只是有點煩悶，喘不太過氣來而已。"
2300706-39 = "……呵呵，很奇怪的話題吧。"
2300706-40 = "老師明明可以不用這麼顧慮我。"
2300706-41 = "我的成績、性格都很差，還是補課部的一員……#n每天只會惹麻煩，為什麼還要對我這種人……"
2300706-42 = "[s5] 「花子不喜歡那通聯絡嗎？」\n[s6] 「你應該不喜歡……一個人獨處對吧？」"
2300706-44 = "……"
2300706-46 = "……"
2300706-47 = "……如果我說是，老師會怎麼想呢？"
2300706-48 = "我絕不是喜歡一個人獨處。#n如果有人可以陪我談天、能給出反應讓我開心，那當然很好。"
2300706-49 = "我只是，不喜歡煩悶的感覺而已……"
2300706-50 = "……呵呵。"
2300706-51 = "還真神奇呢。我好像從來沒跟任何人說過這些……"
2300706-52 = "……但心裡卻覺得很暢快。感覺很不錯。"
2300706-53 = "是因為下雨的緣故嗎……？"
2300706-54 = "……老師。"
2300706-55 = "如果呀，要是老師不介意的話……"
2300706-56 = "偶爾能不能像這樣，找您聊一些無關緊要的話題呢？"
2300706-57 = "[s7] 「當然可以囉。」\n[s8] 「純聊天隨時沒問題，但惡作劇就有些困擾了。」"
2300706-58 = "呵呵，呵呵呵……"
2300706-59 = "呵呵，呵呵呵……"
2300706-60 = "謝謝老師。"
2300706-61 = "只不過，和老師聊天總是特別開心……所以今後，恐怕還是會忍不住對老師惡作劇。"
2300706-62 = "畢竟那對我來說，是最大的樂趣。"
2300706-63 = "但相對地……"
2300706-64 = "雖然可能稱不上答謝……但我以後想用更輕鬆的態度和老師互動。還請繼續多多關照了。"
2300706-67 = "呵呵……"
2300706-68 = "這是我第一次……有這種感覺。"

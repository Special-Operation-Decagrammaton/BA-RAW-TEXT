[translation]
2300706-1 = "เด็กสาวกลางสายฝน"
2300706-2 = "(คุณครูรู้สึกกังวลเรื่องข้อความใน MOMOTALK เลยตั้งใจจะไปหาฮานาโกะ)"
2300706-3 = "(แต่ว่าหลังจากข้อความนั้น ฮานาโกะก็ไม่อ่านข้อความเลย คุณครูจึงไปถามหาเธอกับคนที่อยู่แถวนั้น)"
2300706-6 = "(หลังจากตามหาอยู่พักใหญ่ คุณครูก็พบฮานาโกะนั่งอยู่ในสวน)"
2300706-7 = "(ฮานาโกะนั่งอยู่ที่ม้านั่งในศาลาแปดเหลี่ยม และมองสายฝนที่ตกลงมาด้วยสีหน้าเหม่อลอย)"
2300706-8 = "..."
2300706-9 = "เฮ้อ..."
2300706-10 = "[s1] \"...สวัสดีฮานาโกะ\"\n[s2] \"กำลังคิดอะไรอยู่เหรอ?\""
2300706-11 = "...?"
2300706-12 = "...?"
2300706-13 = "...หืม?"
2300706-14 = "...โอ้ะ? คุณครู? มาที่นี่ได้ไง..."
2300706-15 = "..."
2300706-16 = "ฮิฮิ..."
2300706-17 = "ฉันนี่ไม่น่าถามเลยนะคะ สมกับเป็นคุณครูจริงๆ"
2300706-18 = "ถึงฉันไม่ได้บอกว่าอยู่ที่ไหน แต่คุณครูก็หาฉันเจอได้ไม่ยาก..."
2300706-19 = "แต่ถึงคุณครูจะไม่มาตามหาฉันแบบนี้ แค่คุณครูเรียกละก็ ฉันจะไปหาคุณครูทันทีเลยค่ะ"
2300706-20 = "[s] ถามฮานาโกะว่าเกิดอะไรขึ้น"
2300706-21 = "...?"
2300706-22 = "โอ๊ะ"
2300706-23 = "ถ้ามีเรื่องอะไรละก็ ฉันคงพิมพ์บอกไปใน MOMOTALK ก่อนแล้วค่ะ"
2300706-24 = "หรือว่า... ฉันดูเหมือนกำลังปิดบังอะไรอยู่เหรอคะ?"
2300706-25 = "[s] ถามฮานาโกะว่าเกิดอะไรขึ้น"
2300706-26 = "..."
2300706-27 = "ฉันขอยืนยันว่าไม่มีอะไรจริงๆ ค่ะ"
2300706-28 = "เพียงแค่... ฉันได้รับการติดต่อจากคนที่รู้จักมาค่ะ"
2300706-29 = "[s3] \"คนรู้จักเหรอ?\"\n[s4] \"การติดต่อเหรอ...?\""
2300706-30 = "ไม่ได้มีอะไรมากหรอกค่ะ แค่ติดต่อมาทักทายทุกคนเฉยๆ ค่ะ ทักทายกันตามธรรมเนียมน่ะค่ะ"
2300706-31 = "ไม่ได้มีอะไรมากหรอกค่ะ แค่ติดต่อมาทักทายทุกคนเฉยๆ ค่ะ ทักทายกันตามธรรมเนียมน่ะค่ะ"
2300706-32 = "ถึงเป็นแค่การถามไถ่ความเป็นอยู่ธรรมดาๆ ก็เถอะ…"
2300706-33 = "ถึงจะเป็นคำพูดทักทายธรรมดา แต่เบื้องหลังก็แฝงความรู้สึกต่างๆ เอาไว้มากมาย มันเหมือนกับ... ปริศนาที่ซับซ้อนชวนปวดหัวเลยค่ะ"
2300706-34 = "ถ้ามีอะไรอยากจะพูด ก็แค่พูดมาเลยก็ได้แท้ๆ..."
2300706-35 = "มันเหมือนกับ... พวกเขาสื่อสารสิ่งที่คิดออกมาตรงๆ ไม่ได้"
2300706-36 = "...."
2300706-37 = "เอาเป็นว่าไม่ใช่เรื่องร้ายหรืออันตรายอะไรหรอกค่ะ ไม่ต้องห่วงนะคะ"
2300706-38 = "มันก็เป็นแค่... เรื่องที่ชวนให้อึดอัดและหงุดหงิดนิดหน่อยเองค่ะ"
2300706-39 = "ฮิฮิ ฟังแล้วดูแปลกๆ ใช่มั้ยล่ะคะ?"
2300706-40 = "พวกเขาไม่ควรจะมายุ่งกับเด็กอย่างฉันแท้ๆ..."
2300706-41 = "ผลการเรียนของฉันไม่ดีเลยต้องมาอยู่ในชมรมชั้นเรียนเสริม แถมฉันยังก่อเรื่องอยู่บ่อยๆ#nพวกเขาติดต่อฉันมาแบบนั้นจะได้ประโยชน์อะไรกัน..."
2300706-42 = "[s5] \"ฮานาโกะไม่อยากให้พวกเขาติดต่อมาเหรอ?\"\n[s6] \"แต่เธอไม่ได้ชอบอยู่คนเดียวนี่นา\""
2300706-44 = "..."
2300706-46 = "..."
2300706-47 = "คุณครูมองออกได้เร็วขนาดนี้ได้ยังไงกันคะ?"
2300706-48 = "ฉันไม่ได้ชอบอยู่คนเดียวเลยค่ะ การมีคนให้หยอกล้อหรือเล่นสนุกด้วยน่ะดีกว่าตั้งเยอะ"
2300706-49 = "อย่างที่บอกไป ฉันแค่ไม่ชอบอะไรที่อึดอัดค่ะ ฮิฮิฮิ"
2300706-50 = "..."
2300706-51 = "แปลกดีนะคะ พอมาคิดๆ ดูแล้ว ฉันไม่เคยพูดเรื่องนี้กับใครเลย..."
2300706-52 = "รู้สึกเหมือนว่า... โล่งใจขึ้นอย่างประหลาดเลยค่ะ"
2300706-53 = "คงเป็นเพราะฝนตกรึเปล่านะ...? แต่ฉันก็ไม่ได้เกลียดความรู้สึกแบบนี้หรอกนะคะ"
2300706-54 = "คุณครู..."
2300706-55 = "คือว่าถ้าคุณครูไม่ว่าอะไร..."
2300706-56 = "นานๆ ครั้งช่วยมาคุยเรื่องที่ไร้สาระแบบนี้กับฉันบ้างได้มั้ยคะ?"
2300706-57 = "[s7] \"ถ้าคุยกันแบบธรรมดาก็ได้เสมอเลย\"\n[s8] \"ถ้าเลิกแหย่ครูแบบนั้นก็ได้เสมอ\""
2300706-58 = "ฮิฮิ... ฮิฮิฮิ"
2300706-59 = "ฮิฮิ... ฮิฮิฮิ"
2300706-60 = "อ๊ะ ต้องขอโทษด้วยค่ะคุณครู"
2300706-61 = "เรื่องนั้นคงจะยากอยู่สักหน่อยค่ะ"
2300706-62 = "ฮิฮิฮิ เพราะการหยอกคุณครูมันสนุกเกินจะห้ามใจเลยน่ะสิคะ..."
2300706-63 = "หืม...~ ก็..."
2300706-64 = "ฉันไม่รู้ว่าทำแบบนี้จะชดเชยให้ได้รึเปล่า แต่ว่าต่อไป... ฉันจะช่วยทำให้คุณครูผ่อนคลายขึ้นนะคะ"
2300706-67 = "ค่ะ..."
2300706-68 = "นี่เป็นครั้งแรกของฉันเลยนะคะ"

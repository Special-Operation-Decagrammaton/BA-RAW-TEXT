[translation]
2300706-1 = "A Girl in the Rain"
2300706-2 = "I received some concerning MomoTalk messages, so I decided to investigate."
2300706-3 = "Hanako stopped checking her messages, so I asked people on the streets if they've seen her."
2300706-6 = "(After a long search, I found Hanako sitting in the park.)"
2300706-7 = "(She was on a bench under a pavilion, staring off into the rain.)"
2300706-8 = "..."
2300706-9 = "*sigh*"
2300706-10 = "[s1] \"...Hey, Hanako.\"\n[s2] \"What are you thinking about?\""
2300706-11 = "...?"
2300706-12 = "...?"
2300706-13 = "...Huh?"
2300706-14 = "Sensei? How did you find me here?"
2300706-15 = "..."
2300706-16 = "Ah... Heehee."
2300706-17 = "Well, I guess I'm not surprised. You're not one to be underestimated."
2300706-18 = "Still, I never told you where I was. I had no idea you'd work so hard to find me..."
2300706-19 = "You didn't have to try so hard, you know. If you had just called me, I would have rushed straight to you..."
2300706-20 = "[s] \"What happened?\""
2300706-21 = "...?"
2300706-22 = "...Huh?"
2300706-23 = "If I had anything important to say, I would have contacted you through MomoTalk."
2300706-24 = "Or...do I look like I'm hiding something?"
2300706-25 = "[s] What happened?\""
2300706-26 = "..."
2300706-27 = "...I'm telling you, it's really nothing."
2300706-28 = "But...if you absolutely must know, someone I know contacted me."
2300706-29 = "[s3] \"Someone you know?\"\n[s4] \"...Contacted you?\""
2300706-30 = "It was nothing special. They were just saying hi to everyone they know. Just as a formality."
2300706-31 = "It was nothing special. They were just saying hi to everyone they know. Just as a formality."
2300706-32 = "But even though they were only saying hello..."
2300706-33 = "it seemed like they were trying to hide behind a bunch of fancy rhetoric... It was a complicated, exhausting message."
2300706-34 = "If they've got something to say, why couldn't they just come out and say it? "
2300706-35 = "It's like they can't communicate directly..."
2300706-36 = "..."
2300706-37 = "Anyway, it's nothing bad or dangerous, so you don't have to worry."
2300706-38 = "It's just...kinda frustrating and annoying."
2300706-39 = "...Heehee. It's weird, isn't it?"
2300706-40 = "They're better off not bothering with a brat like me."
2300706-41 = "I'm in the Make-Up Work Club because I don't have good grades or special charm, and I'm constantly causing a scene. What do they have to gain by contacting me?"
2300706-42 = "[s5] \"Do you not want them to contact you?\"\n[s6] \"But you don't like being alone.\""
2300706-44 = "..."
2300706-46 = "..."
2300706-47 = "...How did you figure me out so quickly?"
2300706-48 = "I don't really like being alone. I like having someone to tease or pass the time with."
2300706-49 = "Like I said, I just hate feeling frustrated. Heeheehee."
2300706-50 = "..."
2300706-51 = "How interesting. Now that I think about it, I've never said that to anyone before..."
2300706-52 = "I feel...strangely relieved."
2300706-53 = "Is it because of the rain? Huh, I don't hate this feeling at all."
2300706-54 = "...Sensei."
2300706-55 = "If you're okay with it..."
2300706-56 = "Can we chat about nothing like this every once in a while?"
2300706-57 = "[s7] \"Sure. As long as we keep it simple.\"\n[s8] \"Only if you stop those horrible jokes.\""
2300706-58 = "Heh. Heehee, heeheehee..."
2300706-59 = "Heh. Heehee, heeheehee..."
2300706-60 = "Oh, I'm sorry, Sensei."
2300706-61 = "But I don't think that's possible."
2300706-62 = "Heeheehee, my jokes are way too much fun for me to give up..."
2300706-63 = "Hmm. Well..."
2300706-64 = "I'm not sure if this will make up for it, but...I'll try to make sure you're more comfortable in the future, Sensei."
2300706-67 = "...Yes."
2300706-68 = "It'll be my first time."

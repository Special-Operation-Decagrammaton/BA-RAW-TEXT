[translation]
10048080-1 = "Episode 8;The Exchange of Truth"
10048080-2 = "Wildhunt Park"
10048080-5 = "The Benevolent Thief...!"
10048080-6 = "How did you...?!"
10048080-7 = "I found such elegant traps in the storeroom...ones I didn't set..."
10048080-8 = "And a unique smoke formulation keeps clouding the air..."
10048080-9 = "So many mechanisms were set in optimal positions, carefully anticipating the Prefectural Council's movements."
10048080-10 = "...How could I not notice the unseen hand of outside help?"
10048080-11 = "I believe I owe you my gratitude."
10048080-12 = "You darlings have made my work SO much easier."
10048080-13 = "I-Is that so...?"
10048080-14 = "I-I'm glad you're...happy."
10048080-15 = "(From the sound of it, she already has the painting...)"
10048080-16 = "We better get t-to bed, right...?"
10048080-17 = "One moment. There's nothing more dangerous than an unnegotiated favor."
10048080-18 = "Nothing comes for free, and no deed is unmotivated."
10048080-19 = "Tell me, everyone."
10048080-20 = "Why did you decide to help me?"
10048080-21 = "We're big fans of your work, of course! It was just an act of kindness."
10048080-22 = "Spontaneous kindness? I do not believe it."
10048080-23 = "Innate good, common courtesy..."
10048080-24 = "...Those things don't exist in my world."
10048080-25 = "Come now. That's rather cynical, don't you think?"
10048080-26 = "Fufu, nice try. I will not be deterred."
10048080-27 = "You see, even if I believed in your good, innocent intentions..."
10048080-28 = "...This isn't like holding a door open for someone. It's abnormal."
10048080-29 = "What kinds of people would so thoughtfully lay out traps to help a thief they didn't know?"
10048080-30 = "So...please indulge me."
10048080-31 = "...What was your intention...and what IS your goal?"
10048080-37 = "(...I can't tell her the truth, obviously.)"
10048080-38 = "(If I tell her that she's taken the forgery, she'll ask even more questions.)"
10048080-39 = "(...But what should I do?)"
10048080-40 = "(How can I get out of this?)"
10048080-42 = "My, it seems you've forgotten how to speak."
10048080-46 = "W-Well, no, I..."
10048080-47 = "It's fine. A spot of stage fright."
10048080-48 = "If you're so nervous, I'll break the ice."
10048080-49 = "What?"
10048080-56 = "...The painting?"
10048080-61 = "Wait, why is my case unlatched?!"
10048080-62 = "Ah...! She took it out of my briefcase!"
10048080-63 = "When did she... HOW did she...?"
10048080-64 = "Oh no...!"
10048080-65 = "You were gripping the handle so tightly! Your nervous gazes said it all!"
10048080-67 = "That gave it away, girls! I knew it was important without you whispering a word!"
10048080-68 = "Now, let's see what's SO special..."
10048080-69 = "(Ah, no...!)"
10048080-70 = "(It's over...!)"
10048080-73 = "Oh...?"
10048080-74 = "Fufu. What is this crude forgery? A class project?"
10048080-78 = "...What?"
10048080-79 = "My question was simple. Why were you holding a shoddy replica of \"The Love of Purple and Blue Light\"?"
10048080-80 = "...Pardon?"
10048080-81 = "(Wh-Wh-What is she talking about?)"
10048080-82 = "(She thinks it's fake?)"
10048080-83 = "(The client slipped me a fake...? Why?)"
10048080-84 = "(That can't be? Why? Why? What would they gain? Why? That can't be right. But, but—)"
10048080-85 = "(Aaaaaah...?!)"
10048080-89 = "(We've been holding a forgery...?)"
10048080-90 = "(...No, surely the Benevolent Thief is mistaken.)"
10048080-91 = "(After all, she thinks she stole the REAL painting from the storeroom...!)"
10048080-92 = "(Even though it was actually fake, of course...)"
10048080-93 = "(...Right, then her story makes sense.)"
10048080-94 = "(The thief stole the forgery from the Veronica Foundation, but believed it was real. Then she stole ours and naturally assumed WE had a fake.)"
10048080-100 = "(...But, but what if...?)"
10048080-101 = "(What if she's right? She IS an expert...)"
10048080-102 = "(What if we were slipped the forgery?)"
10048080-103 = "(...And the client didn't care if we destroyed an authentic piece...?)"
10048080-104 = "(Who's telling the truth..?)"
10048080-108 = "[ns] \"Hello, everyone.\""
10048080-110 = "Sensei?! What are you—"
10048080-111 = "[s] \"I thought you might be out here.\""
10048080-115 = "...Sensei?"
10048080-116 = "[s] \"How have you been, Ak—\""
10048080-120 = "[ns] \"...tually, the Benevolent Thief, I mean?\""
10048080-121 = "...You remember me, Sensei."
10048080-122 = "Fufu..."
10048080-123 = "Fu, fufu, fuhee, fufufufu..."
10048080-124 = "Eh...?"
10048080-125 = "She's creeping me out."
10048080-126 = "S-Sensei, you know the Benevolent Thief...?"
10048080-127 = "[s] \"Of course. She's one of my students.\""
10048080-128 = "A student..."
10048080-132 = "Oh. Then, Sensei, if I may ask...?"
10048080-133 = "...Is she telling the truth?"
10048080-134 = "[s] \"It's not my job to distinguish what's true or false.\""
10048080-138 = "[ns] \"But, since she's my student, I believe her wholeheartedly.\""
10048080-139 = "Wholehearted belief... Wow."
10048080-140 = "I have an inquiry as well, Sensei."
10048080-141 = "Are these girls also your students?"
10048080-142 = "[s] \"Of course.\""
10048080-143 = "...Fufu, as I thought."
10048080-144 = "Disappointing, but such is their trusting nature."
10048080-145 = "Sensei, to see this side of you, I..."
10048080-146 = "..."
10048080-147 = "In that case, the answer should be simple."
10048080-148 = "Sensei, in a sense, vouches for the validity of each of our accounts."
10048080-149 = "...Therefore, it would be wise for all parties to reveal their hands."
10048080-150 = "So, my suspicious helpers, I shall ask again."
10048080-151 = "Why did you assist me?"
10048080-152 = "And why do you have a forgery of \"The Love of Purple and Blue Light\"?"
10048080-157 = "..."
10048080-158 = "...You believe our painting, taken from the case, is the forged one."
10048080-159 = "Yes. Clearly."
10048080-160 = "Really?"
10048080-161 = "My eyes, at least regarding art appreciation, have never led me astray."
10048080-162 = "..."
10048080-163 = "If that's the case, we should be honest."
10048080-164 = "M-Miyo, hold it...!"
10048080-165 = "It's the wisest option, Fuyu."
10048080-166 = "If she's telling the truth, then the client lied to you...to us."
10048080-168 = "Very well. Here's the whole story."

[translation]
10048080-1 = "第8話;真偽的交錯"
10048080-2 = "狂獵空地"
10048080-5 = "慈愛的怪盜……！"
10048080-6 = "你是怎麼知道我們的……！？"
10048080-7 = "我從未設置過的陷阱，在收藏庫周圍比比皆是……"
10048080-8 = "非慣用型號的煙霧彈，也接連不斷地引爆……"
10048080-9 = "而且所有陷阱的設置，都細心地考慮了舍監隊的動線。"
10048080-10 = "……這已足夠讓我察覺外部勢力的協助。"
10048080-11 = "因此，我想先向各位致上謝意。"
10048080-12 = "多虧各位的幫忙，我的工作變得順利許多。"
10048080-13 = "是，是嗎……"
10048080-14 = "能，能幫上忙真是太好了。"
10048080-15 = "（看他說話的樣子，應該是成功把畫偷走了吧……）"
10048080-16 = "那，那我們就先……"
10048080-17 = "沒有比不求回報的好意更危險的東西了。"
10048080-18 = "因為無從得知在好意的背後，潛藏著什麼樣的意圖。"
10048080-19 = "請說吧，各位。"
10048080-20 = "究竟是因為什麼樣的理由，選擇向我伸出援手呢？"
10048080-21 = "只是單純出於好意而已。"
10048080-22 = "好意……？#n我並不相信那種東西。"
10048080-23 = "所謂與生俱來的善意，抑或是普遍的教養……"
10048080-24 = "在我的世界觀裡都是不存在的。"
10048080-25 = "……還真是冷漠無情呢。"
10048080-26 = "呵呵，想用那種方式刺激我也是沒用的。"
10048080-27 = "況且，即便我相信人性本善……"
10048080-28 = "各位的行為也遠遠超出了常理的範疇。"
10048080-29 = "誰會為了一名素未謀面的怪盜，如此費盡心思地佈下陷阱呢？"
10048080-30 = "所以，現在請回答我吧。"
10048080-31 = "各位的目的和意圖……究竟為何？"
10048080-37 = "（……絕對不能讓慈愛的怪盜知道我們的意圖）"
10048080-38 = "（要是被他發現我們打算把贗品推給他，他肯定不會放過我們的）"
10048080-39 = "（……可是該怎麼辦才好？）"
10048080-40 = "（要編出什麼樣的故事，才能度過這個難關？）"
10048080-42 = "哎呀，看來各位並不打算開口呢。"
10048080-46 = "那，那個……"
10048080-47 = "沒關係。"
10048080-48 = "既然各位不說，就由這個東西來替你們開口吧。"
10048080-49 = "什麼？"
10048080-56 = "……畫？"
10048080-61 = "等等，我的包包為什麼開著！？"
10048080-62 = "啊啊……！怪盜從我包包裡把畫偷走了！"
10048080-63 = "究竟是在什麼時候……！？"
10048080-64 = "糟了……！"
10048080-65 = "這位小姐從剛才就一直很在意那個包包呢。"
10048080-67 = "裡面的東西想必非常重要吧。"
10048080-68 = "好了，那麼就讓我來看看吧？"
10048080-69 = "（不，不行……！）"
10048080-70 = "（完蛋了……！）"
10048080-73 = "哼嗯……？"
10048080-74 = "這是什麼粗劣的贗品？"
10048080-78 = "……你說什麼？"
10048080-79 = "各位為何要帶著《誰會喜愛紫與藍》的贗品呢？"
10048080-80 = "……咦？"
10048080-81 = "（現，現，現，現在是什麼情況？）"
10048080-82 = "（贗，贗，贗品是什麼意思？）"
10048080-83 = "（委託人給的畫是假的……？為什麼？）"
10048080-84 = "（不可能啊？為什麼？為什麼？為什麼？為什麼？為什麼？）"
10048080-85 = "（唔啊啊啊啊啊……！？）"
10048080-89 = "（我們手上的畫是贗品……？）"
10048080-90 = "（……不，慈愛的怪盜一定是搞錯了什麼）"
10048080-91 = "（他誤以為自己從收藏庫拿出來的畫是真跡了……！）"
10048080-92 = "（其實在收藏庫裡的那幅才是贗品……）"
10048080-93 = "（……嗯，這樣事情反而變容易了）"
10048080-94 = "（只要怪盜就這樣帶著贗品離開，我們再依照計畫把真跡放到展覽會上就行了）"
10048080-100 = "（可是……可是萬一……）"
10048080-101 = "（……萬一怪盜說的是真的呢？）"
10048080-102 = "（要是我們手上的畫才是贗品該怎麼辦？）"
10048080-103 = "（這樣真跡就會永遠從這個世界上消失了……）"
10048080-104 = "（究竟哪一邊才是對的……？）"
10048080-108 = "[ns]「嗨，孩子們。」"
10048080-110 = "老師！？你怎麼會在這裡……！"
10048080-111 = "[s]「總覺得大家好像會在這裡。」"
10048080-115 = "……老師？"
10048080-116 = "[s]「過得好嗎，晶……」"
10048080-120 = "[ns]「……慈愛的怪盜同學？」"
10048080-121 = "……您還記得我呢，老師。"
10048080-122 = "呵呵……"
10048080-123 = "呵，呵呵呵……呵呵呵呵呵。"
10048080-124 = "咦……？"
10048080-125 = "笑得讓人很不舒服耶……！"
10048080-126 = "老，老師。難道你認識慈愛的怪盜嗎……？"
10048080-127 = "[s]「這孩子也是我的學生。」"
10048080-128 = "我的……學生……"
10048080-132 = "那麼老師，我想請教你一個問題。"
10048080-133 = "……剛才慈愛的怪盜說的那些話，全部都是真的嗎？"
10048080-134 = "[s]「判別真偽並不是我的職責。」"
10048080-138 = "[ns]「但只要是我的學生，我就會選擇相信到底。」"
10048080-139 = "相信……到底……"
10048080-140 = "那麼，我也向您提出一個問題，老師。"
10048080-141 = "那些孩子們，也是老師您的學生嗎？"
10048080-142 = "[s]「當然。」"
10048080-143 = "……呵呵，果然如此啊。"
10048080-144 = "雖然是個令人遺憾的答案，但這也無可奈何。"
10048080-145 = "正因為老師是這樣的人，我才會……"
10048080-146 = "……"
10048080-147 = "既然如此，事情就變得十分單純了。"
10048080-148 = "因為這相當於是由老師保證了雙方發言的真實性。"
10048080-149 = "……換言之，現在我們終於可以毫無保留地坦誠對話了。"
10048080-150 = "那麼，可疑的協助者們……我再問各位一次。"
10048080-151 = "為什麼要幫助我？"
10048080-152 = "還有……為什麼要帶著《誰會喜愛紫與藍》的贗品呢？"
10048080-157 = "……"
10048080-158 = "……你剛才說，我們手上的畫是贗品對吧？"
10048080-159 = "沒錯。那毫無疑問是幅贗品。"
10048080-160 = "沒有出錯的可能性嗎？"
10048080-161 = "我的眼光，至少在藝術的領域是絕對不會錯的。"
10048080-162 = "……"
10048080-163 = "既然如此，我們也該把話說清楚了。"
10048080-164 = "美，美代，等等……！"
10048080-165 = "我認為說出來才是正確的，冬。"
10048080-166 = "如果怪盜的發言屬實，就代表委託人欺騙了我們。"
10048080-168 = "我就老實告訴你吧……我們的目的究竟是什麼。"

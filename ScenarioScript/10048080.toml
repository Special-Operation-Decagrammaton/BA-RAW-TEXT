[translation]
10048080-1 = "ตอนที่ 8;จุดตัดของความจริงและความลวง"
10048080-2 = "สนามไวลด์ฮันต์"
10048080-5 = "จอมโจรแห่งความเสน่หา...!"
10048080-6 = "ทำไมถึงรู้ว่าพวกเรา...?!"
10048080-7 = "กับดักที่ฉันไม่ได้วางไว้กระจายอยู่รอบโกดัง..."
10048080-8 = "ระเบิดควันชนิดต่างๆ ที่ฉันไม่ได้เป็นคนดึงสลักก็ระเบิดทีละลูกๆ..."
10048080-9 = "ยิ่งไปกว่านั้น กับดักทั้งหมดยังอยู่ในเส้นทางที่ฝ่ายดูแลหอพักจะเคลื่อนไหวกันด้วยค่ะ"
10048080-10 = "แค่นี้ก็เพียงพอแล้วที่จะทำให้ฉันรู้ว่ามีกำลังภายนอกที่ช่วยฉันอยู่..."
10048080-11 = "งั้นก็คงถึงเวลาที่ฉันต้องกล่าวขอบคุณแล้วละค่ะ"
10048080-12 = "ขอบคุณทุกคนที่ช่วยนะคะ งานของฉันง่ายขึ้นเยอะเลยค่ะ"
10048080-13 = "งะ... งั้นเหรอคะ..."
10048080-14 = "ดะ... ดีใจที่เป็นประโยชน์นะคะ"
10048080-15 = "(ดูจากที่มาพูดแบบนี้ คงจะขโมยภาพออกมาได้แล้วสินะ...)"
10048080-16 = "ถ้างั้นพวกฉันก็... ต้องขอตัวก่อน..."
10048080-17 = "ไม่มีอะไรอันตรายไปกว่าการให้ความช่วยเหลือโดยไม่มีสิ่งตอบแทนหรอกค่ะ"
10048080-18 = "เพราะเราไม่มีทางรู้เลยว่าเบื้องหลังความช่วยเหลือนั้นมีเจตนาอะไรแอบแฝงอยู่"
10048080-19 = "บอกมาเถอะค่ะทุกคน"
10048080-20 = "พวกคุณมาช่วยฉันด้วยเหตุผลอะไรคะ?"
10048080-21 = "ก็แค่ช่วยเหลือเฉยๆ ค่ะ"
10048080-22 = "แค่ช่วยเหลืองั้นเหรอ ฉันไม่เชื่ออะไรแบบนั้นหรอกค่ะ"
10048080-23 = "ทั้งจิตใจที่ดีโดยกำเนิด หรือการปลูกฝังอันเป็นสากล..."
10048080-24 = "ในมุมมองของฉันแล้ว สิ่งเหล่านั้นไม่มีอยู่จริงหรอกค่ะ"
10048080-25 = "พูดเหมือนคนโดดเดี่ยวเลยนะคะ..."
10048080-26 = "ฮุฮุ ต่อให้จะยั่วยุฉันแบบนั้นก็ไม่ได้ผลหรอกค่ะ"
10048080-27 = "และถึงแม้ฉันจะเชื่อในจิตใจที่ดีของมนุษย์..."
10048080-28 = "แต่การกระทำของพวกคุณก็เกินขอบเขตปกติไปมากเลยค่ะ"
10048080-29 = "คนแบบไหนกันคะจะมาบรรจงวางกับดักเพื่อช่วยคนแปลกหน้าขโมยของ?"
10048080-30 = "เพราะแบบนั้นก็ช่วยบอกมาทีเถอะค่ะ"
10048080-31 = "เป้าหมายและเจตนาของพวกคุณคืออะไรคะ...?"
10048080-37 = "(ห้ามบอกเจตนาของพวกเราให้จอมโจรแห่งความเสน่หารู้เด็ดขาดเลย...)"
10048080-38 = "(ถ้ารู้ว่าพวกเราโยนภาระงานเรื่องภาพปลอมให้ จอมโจรต้องไม่ปล่อยพวกเราไปแน่)"
10048080-39 = "(ว่าแต่จะทำยังไงดีล่ะ...?)"
10048080-40 = "(ต้องกุเรื่องอะไรขึ้นมา ถึงจะหาทางออกของสถานการณ์นี้ได้นะ?)"
10048080-42 = "ตายจริง ไม่อยากบอกกันสินะคะ"
10048080-46 = "อะ... เอ่อ... คือว่า..."
10048080-47 = "ไม่เป็นไรค่ะ"
10048080-48 = "ถ้าไม่อยากพูด ฉันก็จะทำให้เจ้านี่พูดออกมาเองค่ะ"
10048080-49 = "คะ?"
10048080-56 = "ภาพวาด...?"
10048080-61 = "เดี๋ยวนะ ทำไมกระเป๋าฉันถึงเปิดอยู่ล่ะ?!"
10048080-62 = "เฮือกก...! จอมโจรฉกภาพในกระเป๋าฉันไปแล้ว!"
10048080-63 = "เอาไปตั้งแต่ตอนไหนน่ะ?!"
10048080-64 = "แย่ละสิ...!"
10048080-65 = "ฉันเห็นคุณจับตามองกระเป๋าใบนั้นมาสักพักแล้วค่ะ"
10048080-67 = "นั่นก็หมายความว่าในนั้นต้องมีของสำคัญมากๆ"
10048080-68 = "เอาละ ไหนขอดูหน่อยสิคะ"
10048080-69 = "(มะ... ไม่ได้นะ...!)"
10048080-70 = "(ซวยแล้วไง...!)"
10048080-73 = "หืม...?"
10048080-74 = "อะไรกันคะ ภาพปลอมคุณภาพต่ำแบบนี้?"
10048080-78 = "ว่าไงนะคะ...?"
10048080-79 = "ฉันกำลังถามว่าทำไมพวกคุณถึงมีภาพปลอมของ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> อยู่กับตัวค่ะ"
10048080-80 = "คะ...?"
10048080-81 = "(มะ... มะ... มะ... เมื่อกี้พูดว่าอะไรนะ?)"
10048080-82 = "(ภะ... ภะ... ภาพปลอม?)"
10048080-83 = "(ภาพที่ลูกค้าให้มาเป็นภาพปลอมงั้นเหรอ...? ทำไมล่ะ?)"
10048080-84 = "(ไม่มีทางเป็นแบบนี้สิ? ไหงเป็นงี้ไปได้ล่ะ? ทำไมล่ะ? ทำไม? ทำไม? ทำไม?)"
10048080-85 = "(ม่ายยยยยย...!)"
10048080-89 = "(ภาพที่พวกเรามีคือภาพปลอมงั้นเหรอ....?)"
10048080-90 = "(ไม่หรอก จอมโจรแห่งความเสน่หาต้องเข้าใจอะไรผิดอยู่แน่ๆ...)"
10048080-91 = "(เข้าใจผิดว่าภาพที่ตัวเองเอาออกมาจากโกดังเป็นของจริงล่ะสิ...!)"
10048080-92 = "(ที่จริงภาพที่อยู่ในโกดังเป็นของปลอมต่างหาก...)"
10048080-93 = "(ใช่ ถ้าเป็นอย่างนั้นเรื่องราวก็ลงตัว...)"
10048080-94 = "(จอมโจรจะหายตัวไปกับภาพปลอม ส่วนพวกเราก็แค่เอาภาพจริงไปไว้ในนิทรรศการ)"
10048080-100 = "(แต่... แต่สมมติว่า...)"
10048080-101 = "(ถ้าจอมโจรพูดถูกล่ะ...?)"
10048080-102 = "(ถ้าภาพที่เรามีคือภาพปลอมจริงๆ ล่ะ?)"
10048080-103 = "(ถ้างั้น ภาพจริงก็จะหายไปจากโลกนี้ตลอดกาลน่ะสิ...)"
10048080-104 = "(ความจริงเป็นยังไงกันแน่...?)"
10048080-108 = "[ns] \"ว่าไงทุกคน\""
10048080-110 = "คุณครู?! มาที่นี่ได้ยังไง...!"
10048080-111 = "[s] \"ครูเดาว่าทุกคนน่าจะมาอยู่ที่นี่กันน่ะ\""
10048080-115 = "คุณครู...?"
10048080-116 = "[s] \"สบายดีมั้ย อากิ...\""
10048080-120 = "[ns] \"จอมโจรแห่งความเสน่หา...?\""
10048080-121 = "คุณครูจำฉันได้สินะคะ..."
10048080-122 = "ฮุฮุ..."
10048080-123 = "ฮุ... ฮุฮุ... ฮุฮุ... ฮุฮุฮุฮุ...."
10048080-124 = "เอ๋...?"
10048080-125 = "ทำไมหัวเราะน่าหงุดหงิดแบบนั้นล่ะ...!"
10048080-126 = "คะ... คุณครู... อย่าบอกนะคะว่าคุณครูรู้จักจอมโจรแห่งความเสน่หาน่ะ...?"
10048080-127 = "[s] \"เด็กคนนี้ก็เป็นนักเรียนของครูน่ะ\""
10048080-128 = "นักเรียน... ของครู..."
10048080-132 = "ถ้างั้นฉันขอถามอะไรสักอย่างสิคะ คุณครู"
10048080-133 = "ที่จอมโจรแห่งความเสน่หาพูดเมื่อกี้นี้ เป็นเรื่องจริงทั้งหมดหรือเปล่าคะ...?"
10048080-134 = "[s] \"ครูไม่มีหน้าที่แยกแยะความจริงออกจากความลวงหรอก\""
10048080-138 = "[ns] \"แต่ครูก็จะเชื่อใจนักเรียนของครูจนถึงที่สุดนะ\""
10048080-139 = "เชื่อใจ... จนถึงที่สุด..."
10048080-140 = "งั้นฉันขอถามบ้างค่ะ คุณครู"
10048080-141 = "เด็กๆ พวกนี้ก็เป็นนักเรียนของคุณครูหรือเปล่าคะ?"
10048080-142 = "[s] \"ต้องเป็นอยู่แล้วสิ\""
10048080-143 = "ฮุฮุ อย่างนี้เองสินะคะ..."
10048080-144 = "ถึงจะเป็นคำตอบที่น่าเสียดาย แต่ก็ช่วยไม่ได้นะคะ"
10048080-145 = "ก็แง่มุมนั้นของคุณครู ทำเอาฉัน..."
10048080-146 = "......"
10048080-147 = "เอาเถอะค่ะ เอาเป็นว่าเรื่องราวมันกระชับขึ้นแล้วค่ะ"
10048080-148 = "ก็เพราะคุณครูรับรองคำพูดของแต่ละฝ่ายให้แล้วนี่คะ"
10048080-149 = "พูดอีกอย่างก็คือ... จากนี้เราคุยกันอย่างจริงใจได้โดยไม่ต้องปิดบังอะไรกันแล้วค่ะ"
10048080-150 = "เพราะงั้น คุณผู้ช่วยที่น่าสงสัยทุกคนคะ ฉันจะถามพวกคุณอีกครั้งค่ะ"
10048080-151 = "ทำไมถึงมาช่วยฉันเหรอคะ?"
10048080-152 = "แล้วก็ทำไมถึง... มีภาพปลอมของ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> อยู่กับตัวล่ะคะ?"
10048080-157 = "......"
10048080-158 = "เมื่อกี้บอกว่าภาพที่พวกฉันมีคือภาพปลอมใช่มั้ยคะ...?"
10048080-159 = "ใช่ค่ะ เป็นของปลอมอย่างไม่ต้องสงสัยเลยค่ะ"
10048080-160 = "จริงเหรอคะ?"
10048080-161 = "สายตาของฉันน่ะ อย่างน้อยก็ไม่มีทางผิดพลาดในทางศิลปะค่ะ"
10048080-162 = "......"
10048080-163 = "ถ้าอย่างนั้นพวกฉันก็คงต้องบอกคุณสินะคะ"
10048080-164 = "มะ... มิโยะ... เดี๋ยวก่อน...!"
10048080-165 = "เราต้องบอกแล้วละ ฟุยุ"
10048080-166 = "เพราะถ้าสิ่งที่จอมโจรพูดเป็นความจริง ก็หมายความว่าลูกค้าหลอกลวงเรา"
10048080-168 = "งั้นฉันจะบอกให้ค่ะว่าเป้าหมายของพวกฉันคืออะไร"

[translation]
1000606-1 = "溫柔的治療"
1000606-2 = "格黑娜學園．保健室"
1000606-4 = "……"
1000606-5 = "[s] 「伊織，還好嗎？」"
1000606-6 = "哇！嚇，嚇我一跳。我還想說是誰，原來是老師啊。"
1000606-7 = "你問我傷口嚴不嚴重？ #n啊啊，沒問題。"
1000606-8 = "進行風紀委員會活動的話，這種程度的傷對我們來說是家常便飯，你不用在意。"
1000606-9 = "消毒？#n不只消毒，在老師來之前已經完成治療了。"
1000606-10 = "……"
1000606-11 = "不過……因為手碰不到背後……所以沒辦法把繃帶纏好。"
1000606-12 = "如果願意的話，老師可以替我纏繃帶嗎？"
1000606-13 = "這件制服，背面的扣子很難解開……你暫時把眼睛閉起來一下。"
1000606-16 = "……別亂想哦。"
1000606-22 = "嗯，可以睜開眼睛了。"
1000606-25 = "― 怎樣，你那個表情。該不會在想奇怪的事吧？[wa:2820] "
1000606-28 = "― 要看到什麼時候？快點。[wa:2340] "
1000606-31 = "― 嗯……嗯唔，哈唔……[wa:2620] "
1000606-33 = "― 你問我是不是很痛？格，格黑娜的風紀委員才不會因為這點程度就感覺到痛好嗎！[wa:5020] "
1000606-36 = "― 只是……有點，癢而已。[wa:2280] "
1000606-39 = "― 你在做什麼，繃帶都鬆掉了。[wa:1740] "
1000606-42 = "― 如果是老師的話……被手觸碰這種程度我不介意。[wa:4100] "
1000606-44 = "― 好好，做到最後。[wa:1500] "
1000606-47 = "（之後替伊織把繃帶纏好並整理好服裝）"
1000606-49 = "……謝謝你幫我治療。"
1000606-50 = "平常只覺得你是個奇怪的大人……沒想到該認真的時候也是挺認真的嘛。"
1000606-51 = "你說下次受傷的時候也會幫我做所以不用擔心？"
1000606-52 = "笨──我怎麼可能會因為想被你治療而故意受傷！"
1000606-57 = "但是……如果有下次的話，那個……再麻煩你了。"
1000606-59 = "（伊織帶著爽朗的表情離開了保健室）"

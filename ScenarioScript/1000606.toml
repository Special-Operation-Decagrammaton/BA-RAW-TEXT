[translation]
1000606-1 = "การรักษาที่อ่อนโยน"
1000606-2 = "ห้องพยาบาล สถาบันเกเฮนน่า"
1000606-4 = "..."
1000606-5 = "[s] \"อิโอริ เป็นยังไงบ้าง?\""
1000606-6 = "ตะ...ตกใจหมดเลย นึกว่าใคร ที่แท้ก็คุณครูนี่เอง"
1000606-7 = "บาดแผลเป็นยังไงบ้างงั้นเหรอ?#nอืม ไม่เท่าไหร่หรอก"
1000606-8 = "ทำงานของคณะกรรมการวินัยก็มักจะได้แผลแบบนี้เป็นประจำอยู่แล้วล่ะ ไม่ต้องห่วงหรอก"
1000606-9 = "ฆ่าเชื้อ? พูดอะไรของคุณครูน่ะ ฉันทำแผลเสร็จตั้งแต่ก่อนคุณครูจะมาแล้วล่ะ"
1000606-10 = "...อืม"
1000606-11 = "แต่ว่าฉันเอื้อมมือไปข้างหลังไม่ถึง... เลยพันแผลไม่ค่อยถนัดน่ะ"
1000606-12 = "ถ้าคุณครูไม่ว่าอะไร... ช่วยพันแผลให้หน่อยได้มั้ย?"
1000606-13 = "ชุดนักเรียนมันถอดแค่ข้างหลังลำบาก... คุณครูช่วยหลับตาก่อนได้มั้ย?"
1000606-16 = "....อย่าคิดอะไรแปลกๆ ล่ะ"
1000606-22 = "เสร็จแล้วล่ะ ลืมตาได้แล้ว"
1000606-25 = "― อะไร ทำไมทำหน้าแบบนั้น... คงไม่ได้คิดอะไรแปลกๆ อยู่ใช่มั้ย?[wa:1260] "
1000606-28 = "― จะ...จะจ้องฉันแบบนั้นไปจนถึงเมื่อไหร่? รีบๆ ทำแผลสิ[wa:740] "
1000606-31 = "― อืม... อึ่ก... ฮึ่ก...![wa:2100] "
1000606-33 = "― เจ็บรึเปล่าน่ะเหรอ? สำหรับกรรมการวินัยของเกเฮนน่า แค่นี้ไม่เท่าไหร่หรอกน่า![wa:3460] "
1000606-36 = "― แต่ว่า... มัน... มันจั๊กจี้นิดหน่อยน่ะ[wa:1200] "
1000606-39 = "― ทำอะไรน่ะ? ผ้าพันแผลย่นหมดแล้วนะ[wa:980] "
1000606-42 = "― ถ้าเข้ามาใกล้อีก... ฉันก็ไม่ว่าอะไรหรอก... ถ้าเป็นคุณครูน่ะนะ[wa:2540] "
1000606-44 = "― ช่วยพันแผลให้แน่นๆ หน่อยนะ[wa:780] "
1000606-47 = "(หลังจากนั้นคุณครูก็ช่วยพันแผลให้จนเสร็จและช่วยจัดเสื้อผ้าให้เรียบร้อย)"
1000606-49 = "วันนี้... ขอบคุณคุณครูที่มาทำแผลให้นะ"
1000606-50 = "ฉันคิดมาตลอดว่าคุณครูเป็นผู้ใหญ่ที่แปลกๆ แต่คุณครูเองก็มีมุมที่อ่อนโยนเหมือนกันสินะ"
1000606-51 = "ถ้าบาดเจ็บอีกคราวหน้าก็จะช่วยทำแผลให้อีกงั้นเหรอ?"
1000606-52 = "จะบ้ารึไง ฉันไม่เอาตัวไปเสี่ยงให้ได้แผลเพราะอยากให้คุณครูทำแผลให้หรอกนะ!"
1000606-57 = "แต่ว่า... ถ้าคราวหน้าฉันบาดเจ็บอีก... ก็รบกวนคุณครูด้วยล่ะ"
1000606-59 = "(อิโอริเดินออกไปจากห้องพยาบาลด้วยสีหน้าที่พึงพอใจ)"

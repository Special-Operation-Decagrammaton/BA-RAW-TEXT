[translation]
1000606-1 = "Tender Treatment"
1000606-2 = "Gehenna Academy Infirmary"
1000606-4 = "..."
1000606-5 = "[s] \"Is everything all right, Iori?\""
1000606-6 = "Wah! Oh, it's just you, Sensei. You scared me!"
1000606-7 = "How is my injury? Oh, it's not too bad."
1000606-8 = "Prefects expect to take damage in the line of duty. Don't worry about it."
1000606-9 = "Huh? Why would I need to disinfect it? I already treated it long before you showed up."
1000606-10 = "Um..."
1000606-11 = "Only thing is, I can't quite reach around and finishing tying up the bandage..."
1000606-12 = "Would you mind helping me, Sensei?"
1000606-13 = "Undoing the back of my uniform is a little tricky... Can you close your eyes for a bit?"
1000606-16 = "And don't get any funny ideas..."
1000606-22 = "I'm done. You can open them now."
1000606-25 = "― Why are you making that face? You had better not be thinking anything lewd![wa:620] "
1000606-28 = "― How long are you just going to stand there staring? Hurry up and help me.[wa:10] "
1000606-31 = "― Ugh... Guh Argh...[wa:2300] "
1000606-33 = "― Did it hurt? I'm a Gehenna prefect. This is nothing![wa:4380] "
1000606-36 = "― It just...kind of tickled... That's all.[wa:1120] "
1000606-39 = "― What are you doing? The bandage is coming loose.[wa:340] "
1000606-42 = "― If it's you...I don't mind it at all.[wa:3500] "
1000606-44 = "― So hurry up and wrap it tighter![wa:540] "
1000606-47 = "I wrapped Iori's bandage for her and helped her get dressed again."
1000606-49 = "Thanks for all of your help today."
1000606-50 = "You've always struck me as a weirdo, but you do have a sweet side to you."
1000606-51 = "You would help me treat my wounds again if I asked...right?"
1000606-52 = "You idiot! I didn't say I'd get hurt on purpose just so you can help me!"
1000606-57 = "But if and when it does happen...I hope I can count on you."
1000606-59 = "Iori left the infirmary with a pleased look on her face."

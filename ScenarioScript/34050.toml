34050-89 = "3;검은 양복;00;……스쿼드가.\n#3;closeup"
34050-90 = "3;베아트리체;00;폐기하려고 했던 소모품들이지만, 선생을 죽이면 용서해줄 수도 있다고 했거든요. 그들에겐 거절할 수 없는 제안이겠죠.\n#3;em;…\n#3;closeup"

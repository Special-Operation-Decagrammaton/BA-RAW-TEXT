[translation]
34050-1 = "第5話;無法理解的探究者"
34050-3 = "……"
34050-4 = "……"
34050-5 = "我接受邀請助閣下一臂之力，這件事閣下還記得吧？"
34050-6 = "就是[ruby=Mimesis]複製[/ruby]出戒律的守護者們協助閣下的計劃這件事。"
34050-7 = "當然，我很感激你哦，瑪艾斯托洛。託你的福，我才能夠在領地裡獲得更強大的力量。"
34050-8 = "我可不記得有允許閣下利用它們。不如說，用那種方式使用我的作品是不被允許的吧。"
34050-9 = "那個現象可不是你的所有物哦，瑪艾斯托洛。"
34050-10 = "……真是無禮啊。我並不是在主張所有權，而是──"
34050-11 = "無禮？你竟然敢……對我說這種話啊。"
34050-12 = "好了好了……請兩位冷靜一點吧。請別把事情搞亂了。"
34050-13 = "沒錯！"
34050-14 = "……失禮了。瑪艾斯托洛想必是將透過普遍的現象得出獨創解釋這件事，視為自己的獨有的表現方式了吧。"
34050-15 = "……"
34050-16 = "不過從夫人的立場來看，這部分或許沒有必要考慮吧。畢竟我們每個人解釋這個世界的方法都不一樣。"
34050-17 = "──也就是說，我擅自奪走瑪艾斯托洛的武器這件事讓你不高興了，是這樣嗎？"
34050-18 = "……閣下的行為並非藝術。在那之中不存在美學，只不過是為了讓兵器的誕生的行為而已。"
34050-19 = "沒錯，就是這樣。有什麼問題嗎？"
34050-23 = "再說了，我並不是只對你這樣。黑色西裝人提供的技術和戈爾孔特解釋的文本我也都是這麼使用的。"
34050-25 = "……"
34050-26 = "……"
34050-27 = "我對你們的藝術沒有興趣。我從加入「蓋瑪特利亞」開始就一直是這麼說的吧。"
34050-28 = "呵呵呵……確實如此。這樣也不錯，我也是這麼想的。"
34050-29 = "同伴之間沒有必要互相爭鬥。"
34050-30 = "他在奇普托斯裡取得了屬於自己的領地。對我們的計劃來說是不可或缺的存在。"
34050-31 = "你指的是奧利斯自治區吧。竟然能夠支配那裡所有的學生和學園，確實能稱得上是偉業。"
34050-32 = "（……！！）"
34050-34 = "黑色西裝人的阿拜多斯雖然遺憾地……哎呀，失禮了。我並沒有諷刺你的意思。"
34050-35 = "呵呵……不用在意。確實是很遺憾──那位老師的存在確實不在我的計算之中。"
34050-36 = "……「夏萊」。是之前那個人吧。我們的敵人。"
34050-37 = "沒錯！"
34050-39 = "（……！！）"
34050-40 = "不。不能跟那個人敵對。反而應該讓他加入我們才對。"
34050-41 = "我也相當中意他。那個人說不定能夠成為我們的理解者。"
34050-42 = "雖然我暫時保留我的判斷……不過如果能像貝雅特里榭一樣成為我們的一員的話……"
34050-44 = "真是愚蠢又怠惰的想法呢。「夏萊」的老師是一定要排除的。"
34050-45 = "……"
34050-46 = "……"
34050-47 = "……"
34050-49 = "看來需要說明呢。好吧，機會難得，我們就一件一件來吧。"
34050-50 = "自從聖園彌香來訪奧利斯自治區後，他就幫了我們很多忙。"
34050-51 = "（……彌香？）"
34050-52 = "沒錯……正是聖園彌香給了我靈感……也可以說是繆斯吧。"
34050-53 = "利用「伊甸園條約」確保太古的威嚴這個點子，還有需要最優先處理掉預知夢的大天使這個判斷，也是多虧了他才能實現。"
34050-54 = "預言家之類麻煩的存在肯定得盡快排除。我很感謝提供稀奇技術的轉印……不，戈爾孔特哦。"
34050-55 = "沒錯！"
34050-56 = "我只不過是提供了文本而已，實際讓它成形的可是夫人你呀。"
34050-57 = "不如說，那個技術扯了夫人的後腿吧？"
34050-58 = "確實……不過，幸好有事先在祭品身上設下防衛系統。這點我很感謝你喔，黑色西裝人。"
34050-59 = "……呵呵呵。無名祭司們的技術能夠派上用場真是太好了。"
34050-60 = "至於聖園彌香給我的最後一個靈感……正是關於「夏萊」老師的事情。"
34050-61 = "因為他將老師招待到了三一，我才能夠認知到他的存在並進行觀察。"
34050-63 = "我之所以將奧利斯自治區作為目標，單純只是因為那是個被隱藏的場所而已，並沒有其他意圖。"
34050-64 = "「三一」和「格黑娜」……他們對這兩個學園的憤怒和憎恨……對我來說根本無所謂。"
34050-66 = "「憎恨」只不過是控制小孩的手段，「伊甸園條約」只不過是獲得守護者之力的方法，「奧利斯小隊」只不過是用完即丟的道具而已。"
34050-67 = "如果聖園彌香沒有把老師帶到三一的話，我也不會注意到那個老師吧。不過……親眼看到他的活躍之後……"
34050-69 = "如果被老師介入的話，我所擁有的一切意義都將會改變。那個人很危險。"
34050-70 = "……"
34050-71 = "於是我意識到了。要完成我的計畫，首先就必須要把「老師」給除掉才行。"
34050-72 = "完全是[ruby=反派角色]antagonist[/ruby]呢……"
34050-73 = "呼姆……"
34050-74 = "你們似乎不太滿意我的決定呢──反正我們只不過是追求各自的目標而已，你們也沒有妨礙我的權利吧。"
34050-75 = "……沒錯，並沒有那種權利。隨你高興吧，貝雅特里榭。"
34050-76 = "……"
34050-77 = "……"
34050-78 = "不過，你的計畫究竟是什麼，你還沒有具體告訴過我們吧。夫人，你在奧利斯自治區裡打算做什麼呢？"
34050-79 = "我正在準備祭壇。"
34050-80 = "祭壇……？"
34050-81 = "和你打算在阿拜多斯做的事情本質上是相同的。不過我並沒有簽訂契約的打算。"
34050-82 = "哦，代替契約的儀式啊……本來這兩種方式可以認為沒什麼不同……"
34050-83 = "如果你打算這麼做的話，老師的存在肯定會成為阻礙的哦？"
34050-84 = "沒錯……我已經安排好了。"
34050-85 = "「奧利斯小隊」會把老師處理掉的。"
34050-87 = "（……！！！）"
34050-88 = "……"
34050-89 = "……原來如此，奧利斯小隊啊。"
34050-90 = "雖然是打算要捨棄的消耗品，不過我告訴他們只要殺掉老師就饒了他們。對他們來說，這是無法拒絕的提案吧。"
34050-91 = "不，不好了……！老師……很危險……！"
34050-92 = "（……唔！？）"
34050-93 = "……看來有老鼠混進來了呢。"
34050-94 = "……！！"
34050-95 = "這裡嗎？這裡除了我們以外誰也……"
34050-96 = "話說得有點多了。我就先回去了。"
34050-100 = "……"
34050-101 = "……"
34050-110 = "……哈啊，哈啊。"
34050-111 = "……哈啊。哈啊。哈啊……哈啊……"
34050-112 = "（剛才看到的景象……究竟是……）"
34050-113 = "嗚，嗚嗚……！"
34050-114 = "咳，咳咳……！"
34050-115 = "（奧利斯自治區已經被蓋瑪特利亞控制了……！？）"
34050-116 = "咳，咳……"
34050-118 = "（……身體不聽使喚。意識快要……可是……）"
34050-119 = "（奧利斯學生們所受的「教育」、自治區的位置一直沒有被發現的原因……那個未知的技術……還有破壞光環的炸彈……全部……）"
34050-120 = "（如果都跟蓋瑪特利亞有關的話……一切就說得通了……）"
34050-121 = "（如果「奧利斯小隊」正在追殺老師的話……）"
34050-122 = "（老師就危險了……得趕快讓其他人知道才行……）"
34050-124 = "（他們已經攻擊過老師一次了……恐怕是奇普托斯中最危險的……）"
34050-125 = "（……破壞光環的炸彈）"
34050-126 = "（我的命被人盯上……伊甸園條約決裂……大家都受了傷……讓老師陷入危險的……全部……）"
34050-128 = "（如果說這一切……存在著起點的話……那就是……）"
34050-135 = "嗯……那個，你好呀，聖亞醬……"
34050-137 = "……彌香。"
34050-142 = "下一話;被折斷的羽翼"

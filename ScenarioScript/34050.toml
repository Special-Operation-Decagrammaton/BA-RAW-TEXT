[translation]
34050-1 = "#title;제5화;불가해한 탐구자들"
34050-2 = "3;베아트리체;00\n#3;a\n#wait;1500"
34050-3 = "1;검은 양복;00;…….\n#1;a\n#3;m5"
34050-4 = "#3;hide\n5;베아트리체;00;……."
34050-5 = "1;마에스트로;00;그래. 요청에 따라 나는 나의 힘을 귀하에게 빌려주었다.\n#1;a\n#1;stiff"
34050-6 = "1;마에스트로;00;계율의 수호자들을 미메시스 하여 귀하의 계획에 어울려주었지."
34050-7 = "5;베아트리체;00;그 부분에 대해서는 감사하게 생각하고 있어요. 마에스트로. 덕분에 저는 저의 영지에서 더욱더 큰 힘을 얻을 수 있게 되었지요.\n#5;em;[반응]"
34050-8 = "1;마에스트로;00;아니, 난 그것을 귀하가 멋대로 이용해도 된다고 허락한 적이 없다. 내 작품의 방법론을 그렇게 사용하는 것을 용납할 수 없다.\n#1;stiff"
34050-9 = "5;베아트리체;00;미메시스 현상이 당신의 소유물은 아닐 텐데요. 마에스트로."
34050-10 = "1;마에스트로;00;무례하군. 나는 소유권을 주장하는 것이 아니다. 그것은……."
34050-11 = "5;베아트리체;00;무례하다고? 감히 나에게?\n#5;stiff\n#fontsize;90"
34050-12 = "3;골콩트;00;자, 자……. 두 분 다 진정해주세요. 여기서 언성을 높이지 않았으면 좋겠습니다. \n#3;a\n#3;em;…"
34050-13 = "3;골콩트;00\n#na;데칼코마니;그렇다!\n#fontsize;100\n#3;h\n#3;em;[!]"
34050-14 = "3;골콩트;00;……실례했습니다. 마에스트로의 입장에서는 보편적인 현상을 통해 독창적인 해석을 하는 것은 자신만의 고유한 표현법이라고 생각하는 것입니다.\n#3;greeting"
34050-15 = "1;마에스트로;00;…….\n#1;stiff"
34050-16 = "3;골콩트;00;하지만 그것은 마담의 입장에서는 딱히 고려할 필요가 없는 부분이겠죠. 우리 모두는 이 세계를 해석하는 방법이 다르니까요."
34050-17 = "5;베아트리체;00;쉽게 말해서. 제가 마에스트로의 무기를 멋대로 빼앗아서 기분 나쁘다, 그런 얘기겠죠?"
34050-18 = "1;마에스트로;00;……귀하가 행하는 것은 예술이 아니다. 그건 어떠한 미학도 없이 그저 병기를 만드는 것뿐."
34050-19 = "5;베아트리체;00;네. 맞아요. 그리고 거기에 무슨 문제가?"
34050-20 = "#st;[0,0];instant;1;"
34050-21 = "#clearST"
34050-22 = "1;마에스트로;00\n#1;em;…"
34050-23 = "5;베아트리체;00;그리고 비단 당신뿐인 건 아니에요. 저는 검은 양복이 제공한 기술력도, 골콩트가 해석한 텍스트도 그런 식으로 사용하고 있습니다.\n#5;em;[반응]\n#5;m3\n#3;dl\n#1;dl"
34050-24 = "#all;hide"
34050-25 = "3;검은 양복;00;……."
34050-26 = "3;골콩트;00;……."
34050-27 = "3;베아트리체;00;저는 당신들의 예술에 관심이 없어요. <게마트리아>의 일원이 될 때부터 강조했던 얘기일 텐데요.\n#3;em;…"
34050-28 = "3;검은 양복;00;큭큭큭……. 그렇습니다. 그건 그거대로 좋지 않나, 그렇게 생각하고 있습니다."
34050-29 = "3;검은 양복;00;동지들끼리 그 주제로 싸울 필요는 없다고 생각합니다."
34050-30 = "3;검은 양복;00;그녀는 키보토스에 자신만의 영지를 확보한 존재. 우리들의 계획에 가장 절실히 필요한 존재이니까요.\n#3;em;[반응]"
34050-31 = "3;골콩트;00;아리우스 자치구였었죠. 모든 학생과 학원을 자신의 지배하에 두다니, 확실히 그건 대단한 업적이죠."
34050-32 = "3;세이아;04;(……!!)\n#3;em;[!]"
34050-33 = "#all;hide"
34050-34 = "3;골콩트;00;검은 양복의 아비도스는 아쉬웠지만요. ……이런. 실례했습니다. 비꼬려는 의도는 아니었어요."
34050-35 = "3;검은 양복;00;큭큭…… 괜찮습니다. 확실히 그 선생의 존재는 제 계산에 없었으니까요."
34050-36 = "3;베아트리체;00;……<샬레>. 예의 그자 말이군요. 우리들의 대적자."
34050-37 = "3;골콩트;00\n#na;데칼코마니;그렇다!\n#fontsize;100\n#3;h\n#3;em;[!]"
34050-38 = "#all;hide"
34050-39 = "3;세이아;05;(……!!)"
34050-40 = "3;검은 양복;00;아뇨. 그자와는 대적해서는 안됩니다. 오히려 우리의 동료로 만드는 편이 낫습니다.\n#3;em;…"
34050-41 = "3;마에스트로;00;나 역시 그자가 마음에 들었다. 그는 우리들의 이해자가 되어 줄지도 모른다.\n#3;stiff"
34050-42 = "3;골콩트;00;저는 아직까진 판단을 보류 중이지만……. 그자가 베아트리체처럼 우리들의 일원이 되어준다면……."
34050-43 = "#all;hide"
34050-44 = "3;베아트리체;00;우둔하고 게으른 생각들이군요. 아니요, <샬레>의 선생은 반드시 제거해야 합니다.\n#3;closeup\n#3;em;[반응]"
34050-45 = "5;골콩트;00\n1;마에스트로;00\n3;검은 양복;00;……."
34050-46 = "1;마에스트로;00;…….\n#1;stiff"
34050-47 = "5;골콩트;00;……."
34050-48 = "#all;hide"
34050-49 = "3;베아트리체;00;설명이 필요한가 보군요. 좋아요. 모처럼 좋은 날이기도 하니, 하나씩 얘기해볼까요.\n#3;em;…"
34050-50 = "3;베아트리체;00;미소노 미카가 아리우스 자치구를 찾아온 이래로, 저는 그녀에게서 많은 도움을 받았습니다."
34050-51 = "3;세이아;04;(……미카?)"
34050-52 = "3;베아트리체;00;그래…… 말하자면 미소노 미카는 저에게 영감을 주는…… 뮤즈라고 할까요."
34050-53 = "3;베아트리체;00;<에덴조약>을 이용해 고대의 위엄을 확보한다는 아이디어도, 그 예지몽의 대천사를 가장 먼저 처리해야 한다는 결정도 그녀 덕분에 할 수 있었습니다."
34050-54 = "1;골콩트;00\n3;베아트리체;00;예언자라니, 그것만큼 무서운 방해꾼은 없으니까요. 모처럼 희귀한 기술을 제공해 준 데칼코마니…… 아니, 골콩트에게도 감사드리죠.\n#3;m5\n#1;ar"
34050-55 = "1;골콩트;00\n#na;데칼코마니;그렇다!\n#fontsize;100\n#1;h\n#1;em;[!]"
34050-56 = "1;골콩트;00;저는 그저 텍스트를 제공했을 뿐, 그걸 폭탄의 형태로 만든 건 마담이었죠. \n#1;greeting"
34050-57 = "1;골콩트;00;게다가 오히려 그 기술이 마담을 곤란하게 만들 뻔하지 않았나요?"
34050-58 = "5;검은 양복;00\n3;베아트리체;00;네. 하지만 제물의 몸에 심어둔 방어 시스템 덕분에 살았죠. 도움에 감사드리죠. 검은 양복.\n#3;m3\n#5;al"
34050-59 = "5;검은 양복;00;……큭큭큭. 무명사제들의 기술이 도움이 되었다니 다행이군요."
34050-60 = "3;베아트리체;00;그 미소노 미카가 최후에 주었던 영감이 바로……. <샬레>의 선생에 대한 것이었습니다.\n#3;em;…"
34050-61 = "3;베아트리체;00;그녀가 선생을 트리니티로 초대했기 때문에, 저는 그 존재에 대해 인식하고 고찰할 수 있었던 거죠."
34050-62 = "#all;hide"
34050-63 = "#na;베아트리체;제가 아리우스 자치구를 타깃으로 삼은 것은 순전히 그곳이 숨겨져 있는 장소이기 때문, 그 이상의 의미는 없었습니다."
34050-64 = "#na;베아트리체;<트리니티>니, <게헨나>니…… 그들에게 팽배한 분노와 증오 같은 건…… 저에게는 아무래도 상관없는 것들이었죠."
34050-65 = "#all;hide"
34050-66 = "#na;베아트리체;<증오>는 아이들을 통제하기 위한 수단일 뿐이고, <에덴조약>은 수호자의 힘을 얻기 위한 방법일 뿐이고, <스쿼드>는 쓰고 버리는 도구일 뿐."
34050-67 = "#na;베아트리체;미소노 미카가 선생을 트리니티에 데려오지 않았다면, 저도 선생을 신경 쓰지 않았겠죠. 하지만…… 그 이후 선생이 보여준 결과들을 보면……."
34050-68 = "3;베아트리체;00\n#3;h"
34050-69 = "3;베아트리체;00;샬레의 선생이 개입하면 제가 가진 그 모든 의미들이 달라져버립니다. 그자는 위험해요."
34050-70 = "3;검은 양복;00;…….\n#3;em;…"
34050-71 = "3;베아트리체;00;그래서 깨달은 거죠. 제 계획을 완수하기 위해선, 그 무엇보다 가장 먼저 <선생>부터 사라져야 한다는 것을요."
34050-72 = "3;골콩트;00;그야말로 [ruby=대적자]안타고니스트[/ruby]로군요……."
34050-73 = "3;검은 양복;00;흐음……."
34050-74 = "3;베아트리체;00;제 결정이 마음에 들지 않나 보군요. 어차피 우리는 각자의 목표를 추구할 뿐, 저를 막을 권리는 없을 텐데요.\n#3;closeup"
34050-75 = "3;검은 양복;00;……. 네. 그런 권리는 없죠. 뜻대로 하십시오. 베아트리체.\n#3;closeup"
34050-76 = "3;마에스트로;00;…….\n#3;closeup\n#3;stiff"
34050-77 = "3;골콩트;00;…….\n#3;closeup"
34050-78 = "3;검은 양복;00;하지만 그 계획이라는 것이 무엇인지 우리에게 구체적으로 알려준 적은 없었습니다. 마담, 아리우스 자치구에서 무엇을 하고 있는 겁니까?\n#3;em;[반응]"
34050-79 = "1;베아트리체;00;제단을 준비하고 있어요.\n#1;a\n#3;m5"
34050-80 = "3;검은 양복;00;제단……?"
34050-81 = "1;베아트리체;00;당신이 아비도스에서 하려던 것과 본질적으로 다르지 않아요. 다만, 저는 계약 같은 걸 할 생각은 없지만.\n#1;em;…"
34050-82 = "3;검은 양복;00;호오. 계약 대신 의식이라……. 사실 그 두 개는 별반 다르지 않다고 볼 수도 있지만……."
34050-83 = "3;검은 양복;00;다만, 그것을 실행하는 데 있어서 선생의 존재가 반드시 방해될 것이다?"
34050-84 = "1;베아트리체;00;네. 맞아요. ……사실을 말하자면, 이미 손을 써 두었죠. \n#1;greeting"

[translation]
34050-1 = "ตอนที่ 5;ผู้ค้นคว้าที่ไม่อาจเข้าใจได้"
34050-3 = "......"
34050-4 = "......"
34050-5 = "ใช่แล้ว ผมให้ท่านยืมพลังของผมตามที่ขอ"
34050-6 = "ผมมิเมซิสผู้พิทักษ์บรรทัดฐานเพื่อให้เข้ากับแผนการของท่าน"
34050-7 = "เรื่องนั้นฉันยังรู้สึกขอบคุณจนถึงทุกวันนี้ค่ะเมสโตร เพราะมันทำให้ฉันได้รับพลังมากขึ้นจากในเขตแดน#nของฉัน"
34050-8 = "เดี๋ยวก่อน ผมไม่เคยอนุญาตให้ใช้สิ่งนั้นได้ตามอำเภอใจสักหน่อย ผมไม่ยอมให้ใช้กลวิธี#nของผมแบบนั้น"
34050-9 = "แต่มิเมซิสมันไม่ได้เป็นกรรมสิทธิ์ของคุณนี่คะ เมสโตร"
34050-10 = "ไม่มีมารยาทเอาเสียเลย ผมไม่ได้อ้างเรื่องสิทธิ์สักหน่อย ผมแค่..."
34050-11 = "ไม่มีมารยาทเหรอ? กล้าดียังไงถึงพูดกับฉันแบบนี้?"
34050-12 = "เอาละๆ ทั้งคู่ใจเย็นๆ ก่อน อย่าพูดเสียงดังที่นี่จะดีกว่านะครับ "
34050-13 = "ใช่!"
34050-14 = "ต้องขอโทษด้วยครับ เมสโตรคงคิดว่าการตีความที่แปลกใหม่ด้วยปรากฏการณ์ทั่วไปคือการแสดงออก#nเฉพาะตัวของเขา"
34050-15 = "......"
34050-16 = "แต่ในมุมมองของมาดาม นั่นอาจจะเป็นสิ่งไม่จำเป็นต้องพิจารณาเป็นพิเศษก็ได้ครับ เพราะวิธีการตีความโลกใบนี้ของเราทุกคนต่างกัน"
34050-17 = "ถ้าให้สรุปง่ายๆ คือ เมสโตรอารมณ์ไม่ดีที่ฉันแย่งอาวุธของเขามาใช้ตามใจชอบ แบบนี้ใช่ไหมคะ?"
34050-18 = "สิ่งที่ท่านกระทำไม่ใช่ศิลปะ มันเป็นเพียงการสร้างอาวุธที่ไม่มีซึ่งสุนทรียศาสตร์ใดๆ"
34050-19 = "ก็ใช่ค่ะ แล้วมันมีปัญหาอะไรเหรอคะ?"
34050-23 = "อีกอย่าง ฉันไม่ได้ใช้แต่วิธีของคุณหรอกนะคะ ฉันใช้ทั้งเทคโนโลยีที่สูทดำจัดหาให้ และใช้ข้อความที่#nโกลคอนดาตีความให้ด้วยค่ะ"
34050-25 = "......"
34050-26 = "......"
34050-27 = "ฉันไม่ได้สนใจศิลปะของคุณหรอกค่ะ เรื่องนี้ฉันน่าจะเน้นย้ำไปแล้วตั้งแต่ตอนเข้ามาเป็นสมาชิก <เกมาเทรีย> นะคะ"
34050-28 = "หึหึหึ... ใช่ครับ ผมคิดว่านั่นไม่น่าจะใช่สิ่งที่ดีนัก"
34050-29 = "และคิดว่าพวกพ้องไม่จำเป็นต้องมาทะเลาะกันด้วยเรื่องแบบนี้นะครับ"
34050-30 = "เบียทริซเป็นคนที่มีเขตแดนเป็นของตัวเองในคิโวทอส เลยเป็นคนที่จำเป็นที่สุดต่อแผนการของ#nเราครับ"
34050-31 = "เขตปกครองตนเองอาเรียสสินะครับ การให้นักเรียนทุกคนและโรงเรียนทุกแห่งอยู่ใต้อำนาจการปกครอง#nของตัวเองถือเป็นความสำเร็จที่ยิ่งใหญ่เลยละครับ"
34050-32 = "(...!)"
34050-34 = "แต่ก็น่าเสียดายอะบิดอสของสูทดำนะครับ โอ๊ะ... ต้องขออภัยด้วยครับ กระผมไม่ได้ตั้งใจจะเหน็บแนม#nนะครับ"
34050-35 = "หึหึ... ไม่เป็นไรหรอกครับ ก็ครูคนนั้นไม่ได้อยู่ในการคำนวณของผมนี่นา"
34050-36 = "หมายถึงคนใน <ชาเล่ต์> สินะคะ... ศัตรูตัวฉกาจของพวกเรา..."
34050-37 = "ใช่!"
34050-39 = "(...!!)"
34050-40 = "ไม่ได้นะครับ เราต้องไม่เป็นปฏิปักษ์กับคนคนนั้น เอามาเป็นพวกเราน่าจะดีกว่านะครับ"
34050-41 = "ผมก็ถูกใจครูคนนั้นเหมือนกันครับ คนคนนั้นอาจจะมีผลประโยชน์ต่อพวกเราก็ได้"
34050-42 = "แม้ว่ากระผมจะยังตัดสินใจไม่ได้... แต่หากคนคนนั้นเข้ามาเป็นสมาชิกของเราเหมือนกับเบียทริซละก็..."
34050-44 = "เป็นความคิดที่โง่เขลาจังเลยนะคะ เราต้องกำจัดครูจาก <ชาเล่ต์> นั่นให้ได้ต่างหากค่ะ"
34050-45 = "......"
34050-46 = "......"
34050-47 = "......"
34050-49 = "อยากได้คำอธิบายสินะคะ ได้ค่ะ ไหนๆ วันนี้ก็เป็นวันดี งั้นฉันจะไล่ให้ทีละข้อเลยค่ะ"
34050-50 = "ตั้งแต่มิโซโนะ มิกะมาที่เขตปกครองตนเองอาเรียส ฉันก็ได้รับความช่วยเหลือมากมายจากเธอ"
34050-51 = "(มิกะ...?)"
34050-52 = "ถ้าจะให้พูดง่ายๆ... มิโซโนะ มิกะคือคนที่ให้แรงบันดาลใจกับฉันค่ะ... จะเรียกว่าเป็นมิวส์ได้ไหมนะ?"
34050-53 = "ทั้งไอเดียในการใช้ <สนธิสัญญาเอเดน> เพื่อให้ได้มาซึ่งความสง่างามของอดีตกาล ทั้งการตัดสินใจว่า#nต้องกำจัดนางฟ้าแห่งความฝันเป็นอันดับแรก... ฉันได้ทั้งหมดนี้มาเพราะมิกะค่ะ"
34050-54 = "มันไม่มีอะไรน่ากลัวได้เท่ากับผู้เลื่อมใสแล้วละค่ะ ต้องขอบคุณเดคาโคมาเนีย... ไม่สิ... ขอบคุณโกลคอนดาด้วยนะคะที่ให้เทคโนโลยีล้ำค่ามาใช้"
34050-55 = "ใช่!"
34050-56 = "ผมแค่ให้ข้อความเท่านั้น มาดามต่างหากครับที่ทำให้มันเป็นระเบิดขึ้นมา "
34050-57 = "แถมเทคโนโลยีนั้นยังเกือบทำให้มาดามต้องลำบากไม่ใช่หรือครับ?"
34050-58 = "ค่ะ โชคดีที่รอดมาได้ด้วยระบบป้องกันที่ฝังไว้ในร่างของเครื่องสังเวย ขอบคุณที่ช่วยนะคะสูทดำ"
34050-59 = "หึหึหึ... โชคดีนะครับที่เทคโนโลยีของพวกนักบวชนิรนามมีประโยชน์"
34050-60 = "และแรงบันดาลใจสุดท้ายที่ฉันได้มาจากมิโซโนะ มิกะ... ก็เกี่ยวกับครูจาก <ชาเล่ต์> ค่ะ"
34050-61 = "เธอเชิญครูคนนั้นมาที่ทรีนิตี้ ฉันเลยได้รู้จักและได้ศึกษาครูคนนั้นค่ะ"
34050-63 = "ที่ฉันเอาเขตปกครองตนเองอาเรียสเป็นเป้าหมาย เพราะมันเป็นที่ที่ซ่อนอยู่อย่างมิดชิดก็เท่านั้น ไม่มีเหตุผลอะไรอื่นเป็นพิเศษค่ะ"
34050-64 = "ความโกรธและความแค้นที่เต็มเปี่ยมใน <ทรีนิตี้> หรือ <เกเฮนน่า> อะไรนั่น... สำหรับฉันแล้วมันไม่สำคัญ#nเลยค่ะ"
34050-66 = "<ความแค้น> เป็นเพียงวิธีที่ใช้ครอบงำเด็กๆ ส่วน <สนธิสัญญาเอเดน> ก็เป็นเพียงวิธีให้ได้มาซึ่งพลัง#nแห่งผู้พิทักษ์ และ <สควอด> ก็เป็นเครื่องมือที่ใช้แล้วทิ้งก็เท่านั้นค่ะ"
34050-67 = "ถ้ามิโซโนะ มิกะไม่เชิญครูคนนั้นมาที่ทรีนิตี้ ฉันก็คงไม่ใส่ใจครูหรอกค่ะ แต่ว่า... พอได้เห็นผลงานของ#nครูหลังจากนั้น..."
34050-69 = "ฉันก็เกิดความคิดว่าหากครูจากชาเล่ต์เข้ามาแทรกแซง ทุกคุณค่าที่ฉันมีอยู่จะเปลี่ยนไป คนคนนั้นเป็นคนอันตรายค่ะ"
34050-70 = "......"
34050-71 = "ฉันก็เลยตระหนักได้ค่ะ ว่าหากจะทำให้แผนการของฉันสำเร็จ <ครู> จะต้องหายไปก่อนเป็นอันดับแรก"
34050-72 = "ก็เลยตั้งให้เป็น[ruby=ศัตรูตัวฉกาจ]แอนทาโกนิสต์[/ruby]สินะครับ..."
34050-73 = "อืม..."
34050-74 = "สงสัยจะไม่ถูกใจการตัดสินใจของฉันสินะคะ ยังไงเราก็ต่างทำตามเป้าหมายของตัวเอง เพราะฉะนั้นไม่มีใครมีสิทธิ์ขวางฉันได้หรอกค่ะ"
34050-75 = "ครับ... ไม่มีสิทธิ์แบบนั้นหรอกครับ ทำตามที่ต้องการเลยครับ เบียทริซ"
34050-76 = "......"
34050-77 = "......"
34050-78 = "แต่มาดามยังไม่เคยบอกผมเลยว่าแผนการที่ว่านั่นคืออะไรกันแน่ ตอนนี้มาดามกำลังทำอะไร#nในเขตปกครองตนเองอาเรียสเหรอครับ?"
34050-79 = "ฉันกำลังเตรียมแท่นพิธีอยู่ค่ะ"
34050-80 = "แท่นพิธี...?"
34050-81 = "มันไม่ต่างจากสิ่งที่คุณตั้งใจจะทำในอะบิดอสหรอกค่ะ แต่ว่า... ฉันไม่มีความคิดจะทำสัญญาอะไร"
34050-82 = "หืม... ทำพิธีแทนสัญญา... ที่จริงแล้วทั้งสองอย่างอาจดูไม่ต่างกันเท่าไรนะครับ..."
34050-83 = "ว่าแต่ การมีตัวตนของครูจะเป็นสิ่งกีดขวางการทำสิ่งนั้นเหรอครับ?"
34050-84 = "ใช่ค่ะ ที่จริงฉันลงมือไปแล้วด้วยค่ะ... "
34050-85 = "<สควอด> จะไปจัดการครูคนนั้นค่ะ "
34050-87 = "(...!!!)"
34050-88 = "...... "
34050-89 = "สควอด..."
34050-90 = "ตอนแรกฉันคิดว่าจะใช้แล้วทิ้ง แต่หากสควอดไปปลิดชีวิตครูได้ฉันก็ว่าจะยกโทษให้ค่ะ อีกอย่างนั่นเป็นข้อเสนอที่พวกนั้นปฏิเสธไม่ได้ด้วยค่ะ"
34050-91 = "มะ... ไม่นะ! คุณครู... อันตราย...! "
34050-92 = "(อึก...?!)"
34050-93 = "...... เดี๋ยวก่อนค่ะ มีคนแอบมองพวกเราอยู่"
34050-94 = "...!"
34050-95 = "อยู่ที่นี่เหรอครับ? แต่ที่นี่ไม่มีใครเลย..."
34050-96 = "ท่าทางฉันจะพูดอะไรไปเยอะเลยนะคะ จบการคุยเท่านี้เถอะค่ะ กลับก่อนนะคะ"
34050-100 = "......"
34050-101 = "......"
34050-110 = "แฮ่ก... แฮ่ก... "
34050-111 = "เฮ่อ... แฮ่ก... แฮ่ก... เฮ้อ..."
34050-112 = "(พวกนั้นมัน... อะไรกัน...)"
34050-113 = "อะ... อึกก...!"
34050-114 = "แค่กๆ แค่กๆๆ...!"
34050-115 = "(เขตปกครองตนเองอาเรียสถูกเกมาเทรียยึดครองอยู่งั้นเหรอคะ...?!)"
34050-116 = "แค่ก... แค่ก... แค่กๆๆ..."
34050-118 = "(ร่างกายไม่ให้ความร่วมมือเลย สติ... เลือนราง... แต่ก็...)"
34050-119 = "(ทั้ง <การศึกษา> ของนักเรียนอาเรียส... ทั้งตำแหน่งของเขตปกครองตนเองที่ไม่สามารถหาได้... ทั้งเทคโนโลยีนิรนาม... และระเบิดที่ทำลายฮาโล... ทั้งหมดมัน...)"
34050-120 = "(ถ้ามันเกี่ยวข้องกับเกมาเทรีย... ทุกอย่างก็ลงตัวหมดเลยค่ะ...)"
34050-121 = "(หาก <สควอด> กำลังไล่ล่าคุณครูอยู่...)"
34050-122 = "(คุณครูกำลังตกอยู่ในอันตรายค่ะ... ฉันต้องรีบไปบอกคนอื่น...)"
34050-124 = "(คนพวกนั้นคือคนที่โจมตีคุณครูสำเร็จไปแล้วครั้งหนึ่ง... สิ่งนั้นอันตรายที่สุดในคิโวทอส...)"
34050-125 = "(ระเบิดที่ทำลายฮาโลได้...)"
34050-126 = "(การที่ชีวิตของฉันถูกเพ่งเล็ง...  การที่สนธิสัญญาเอเดนล้มเหลว... การที่ทุกคนบาดเจ็บ... และการที่คุณครูตกอยู่ในอันตราย... ทั้งหมดนี้...)"
34050-128 = "(หากเรื่องทั้งหมดนี้... มีจุดเริ่มต้น... ก็คงเป็น...)"
34050-135 = "อ่า... คือ... หวัดดีนะ... เซอาจัง..."
34050-137 = "มิกะ..."
34050-142 = "ตอนต่อไป;สิ่งที่แตกหัก"

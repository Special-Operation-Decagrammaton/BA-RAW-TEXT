[translation]
34050-1 = "Episode 5; Inscrutable Seekers"
34050-3 = "..."
34050-4 = "..."
34050-5 = "I graciously permitted you access to my art. To the very expression of my soul."
34050-6 = "To help you, I went so far as to bring forth the guardians of the commandments as Mimeses. I brought your crass plan to fruition."
34050-7 = "And I'm so, very grateful for your assistance. Just behold the strength of my estate now."
34050-8 = "I don't need your trite appreciation. Your current misappropriation of my work is a direct insult to me. And insulting me is not a wise move."
34050-9 = "Oh! My sincerest, deepest apologies. I was unaware you personally devised the Mimesis phenomenon!"
34050-10 = "You dare jest? Your insolence knows no bounds."
34050-11 = "Hah! I've never been accused of insolence by an inferior."
34050-12 = "Hahaha! Shall we all try some breathing exercises together? Perhaps it'll help you keep your voices down.  "
34050-13 = "But of course!"
34050-14 = "What an entertaining conundrum! On one hand, our distinguished Maestro claims the Mimesis process belongs to he who harnessed it."
34050-15 = "..."
34050-16 = "But then our dearest Madame asserts one cannot claim ownership just because one holds the leash! Fascinating, fascinating!"
34050-17 = "For once in your brainless existence, learn to keep your opinions to yourself, Golconde. You fabricate meaning behind what is nothing more than a temper tantrum."
34050-18 = "You defile my work and then dare to belittle me? You are creating weapons with no consideration for artistry! You have no understanding of metaphors! Of passion!"
34050-19 = "Please, your hysterics are unbecoming. There is no need for art where there is power. And your supposed art would never have seen the light of day without Black Suit and Golconde's assistance."
34050-23 = "Tell me, Maestro. Are you afraid? Do you fear the power I have amassed with your work? ...Perhaps you fear we have no need for you any longer."
34050-25 = "..."
34050-26 = "..."
34050-27 = "Mark my words, speak to me of your little art project again and I will leave here with my estate. And you will be left with nothing but your passion."
34050-28 = "Hahaha! What's done is done, both of you."
34050-29 = "Let's not lose our heads over semantics. No offense, Golconde."
34050-30 = "Beatrice, you've secured your own estate in Kivotos. This alone makes her invaluable to our plan, Maestro"
34050-31 = "She's subdued every single one of those angry little students in the Arius district! Hahaha! It's a wonderful step forward for us all. "
34050-32 = "(...!)"
34050-34 = "I mean, did we not all see the disaster that was Black Suit's Abydos... Oh, dear! Why, that was rather rude of me!"
34050-35 = "Haha! You're only speaking the truth, Golconde. I'll admit, I didn't factor the teacher into my plans."
34050-36 = "...Schale. That Sensei is a nuisance."
34050-37 = "But of course!"
34050-39 = "(...!)"
34050-40 = "A nuisance, yes. But one that could become an invaluable asset if persuaded to our side."
34050-41 = "Ah, Sensei! Now there's one who understands art!"
34050-42 = "What if we could turn them into one of us? Like we did with Beatrice! She could certainly use a friend."
34050-44 = "All of you are foolish beyond comprehension. We must eliminate the Schale educator or all we have done will be for naught."
34050-45 = "..."
34050-46 = "..."
34050-47 = "..."
34050-49 = "*sigh* Must I always be surrounded by incompetence?"
34050-50 = "Allow me to explain in terms you three can understand. It all begins with Misono Mika."
34050-51 = "(...Mika?)"
34050-52 = "Mika is my muse, my inspiration. There's a metaphor that'll resonate with you."
34050-53 = "It was thanks to her I came up with the idea of securing those ancient powers through the Eden Treaty. Without Mika, I would never have realized and subsequently dealt with the overwhelming threat of the prophetic archangel."
34050-54 = "I must thank you and Decalcomania again, Golconde, for providing me such rare technology."
34050-55 = "But of course!"
34050-56 = "Oh, please! I only had the recipe. Without our esteemed cook, there would have been no bomb.  "
34050-57 = "I actually felt a little bad about that! Hahaha! Didn't our little masterpiece get you into trouble?"
34050-58 = "Almost. But thanks to Black Suit, I was able to plant a defense system in the body of an offering."
34050-59 = "Always happy to help. The nameless priests' technology proved more helpful than I expected."
34050-60 = "Indeed, it did. And that brings me to the final inspiration that Misono Mika provided me: Sensei."
34050-61 = "Had that girl not reached out to Schale, I wouldn't have been given the opportunity to observe Sensei with my own eyes."
34050-63 = "This was when I came to see Sensei's power. When I targeted Arius, it was simply due to their isolation and anonymity. No one would find me there."
34050-64 = "Trinity, Gehenna, Arius... It didn't matter which one of them it was. I could care less for their little conflicts, all the festering hate between them."
34050-66 = "What mattered was that hatred is a convenient means for control. The Eden Treaty was simply a way to gain new power. Squad, the rest of them, they were all disposable at best."
34050-67 = "But Sensei... They charged through my perfectly set scene spewing nonsense about saving the students and their dreams. And somehow, their methods worked."
34050-69 = "I will not underestimate Schale and their teacher again. Their involvement alters the very purpose of our work."
34050-70 = "..."
34050-71 = "Sensei must be eliminated."
34050-72 = "Beatrice is all fired up! She's found herself a worthy opponent!"
34050-73 = "Hm... I can't necessarily say I agree."
34050-74 = "Will you stop me? We may have fallen in together under a common goal, but taking orders isn't my strong suit."
34050-75 = "...I'm well aware. Do as you wish, Beatrice."
34050-76 = "..."
34050-77 = "..."
34050-78 = "What I'm much more curious about however, is what your plans are for the Arius district."
34050-79 = "I'm preparing an altar."
34050-80 = "Fascinating. To what end?"
34050-81 = "The same end you attempted to achieve in Abydos. I felt a ritual more...suited to my tastes."
34050-82 = "Haha! You certainly aren't the type to enter into a fair pact. But your methods fulfill the conditions all the same. Excellent work."
34050-83 = "And you really believe Sensei is powerful enough to stand in your way?"
34050-84 = "Yes, which is why I've already taken measures to prevent that.  "
34050-85 = "I'm sending Squad to eliminate Sensei."
34050-87 = "(...!!!)"
34050-88 = "... "
34050-89 = "...Squad, hm?"
34050-90 = "I promised them forgiveness for Sensei's head. Whether or not I actually do, that'll depend on my mood."
34050-91 = "Sensei is in danger! I have to warn someone!  "
34050-92 = "(...Huh?!)"
34050-93 = "....An insignificant fly is eavesdropping."
34050-94 = "...!"
34050-95 = "One, two, three, four... I only count four!"
34050-96 = "That's enough. We're done here."
34050-100 = "..."
34050-101 = "..."
34050-110 = "*pant* *pant* "
34050-111 = "*huff* *puff* *huff* *puff*"
34050-112 = "(What...did I just see...?)"
34050-113 = "U-Ugh!"
34050-114 = "*cough cough*"
34050-115 = "(The Arius district was being controlled by Gematria?!)"
34050-116 = "*cough* *cough cough*"
34050-118 = "(Everything feels so...foggy... Focus, Seia...!)"
34050-119 = "(The training of the Arius students, why the district was so elusive...and the foreign technology...the halo-shattering bomb...)"
34050-120 = "(It...It all ties back to Gematria... It all makes sense.)"
34050-121 = "(And Squad is after Sensei's life.)"
34050-122 = "(Sensei's in danger...! I have to tell someone!)"
34050-124 = "(They almost died during the Eden Treaty attack...)"
34050-125 = "(...And their bomb...there's nothing more dangerous in all of Kivotos.)"
34050-126 = "(My life was threatened... The Eden Treaty broke down... Everyone got hurt... Sensei nearly died...)"
34050-128 = "(The starting point of all of this...it's...)"
34050-135 = "Um... Hi, Seia..."
34050-137 = "Mika."
34050-142 = "Next Episode; Broken Things"

[translation]
34050-1 = "第5話;不可解な探求者"
34050-3 = "……。"
34050-4 = "……。"
34050-5 = "要請によって、私は自分の力を貴下に貸したのは覚えているな？"
34050-6 = "戒律を守護せし者たちを[ruby=ミメシス]複製[/ruby]して、そちらの計画に付き合わせた件だ。"
34050-7 = "ええ、とても感謝していますよ、マエストロ。おかげさまで、私は領地でさらに大きな力を得ることができました。"
34050-8 = "私は貴下がそれを利用する事を許可した覚えはない。そも、私の作品をそのように使うことは許可していないはずだ。"
34050-9 = "あの現象はあなたの所有物ではないはずですよ、マエストロ。"
34050-10 = "……不躾だな。私は所有権を主張しているわけではない、それは――"
34050-11 = "不躾？よくもまぁ……私にそんな口を。"
34050-12 = "まぁまぁ……お二人とも落ち着いてください。事を荒立てないでくださいよ。"
34050-13 = "そういうこった！"
34050-14 = "……失礼しました。マエストロはきっと、普遍的な現象を通じて独創的な解釈をすることは、自分なりの表現法だと考えているのでしょう。"
34050-15 = "……。"
34050-16 = "しかし、それはマダムの立場では別段考慮する必要がない部分かもしれません。私たちは皆、この世界を解釈する方法が違いますから。"
34050-17 = "――つまり、私がマエストロの武器を勝手に奪ったことが気に食わない、ということですよね？"
34050-18 = "……貴下が行うのは芸術ではない。そこには美学も何もなく、ただ兵器を生み出すだけの行為だ。"
34050-19 = "ええ、そうです。何か問題でも？"
34050-23 = "それに、あなただけではありません。私は黒服が提供した技術力も、ゴルコンダが解釈したテクストもそのように使っています。"
34050-25 = "……。"
34050-26 = "……。"
34050-27 = "私はあなたたちの芸術に興味はありません。「ゲマトリア」の一員になる時から主張してきた話だと思いますが。"
34050-28 = "クックックッ……その通り。それはそれで良いのではと、私はそう思っています。"
34050-29 = "仲間同士で争う必要はないかと。"
34050-30 = "彼女はキヴォトスに自分だけの領地を確保しています。私たちの計画に最も必要な存在ですから。"
34050-31 = "アリウス自治区ですね。あそこのすべての生徒と学園を自分の支配下に置くなんて、確かにそれは偉業です。"
34050-32 = "（……！！）"
34050-34 = "黒服のアビドスは残念でしたが……おっと、失礼。皮肉を言っているつもりではありません。"
34050-35 = "ククッ……お気になさらず。たしかに惜しかったですが――あの先生の存在は私の計算に入ってなかったので。"
34050-36 = "……「シャーレ」。例のあの者ですね。私たちの敵対者。"
34050-37 = "そういうこった！"
34050-39 = "（……！！）"
34050-40 = "いいえ。あの者とは対敵してはいけません。むしろ私たちの仲間に引き入れたほうが良いでしょう。"
34050-41 = "私としても大変気に入っている。あの者は、私たちの理解者になってくれるかもしれない。"
34050-42 = "私はまだ判断を保留していますが……もしベアトリーチェのように私たちの一員になってくれるなら……。"
34050-44 = "愚かで怠惰な思考ですね。「シャーレ」の先生は必ず排除しなければなりません。"
34050-45 = "……。"
34050-46 = "……。"
34050-47 = "……。"
34050-49 = "説明が必要なようですね。ええ、せっかくですので一つずつ順を追っていきましょうか。"
34050-50 = "[ruby=みその]聖園[/ruby]ミカがアリウス自治区を訪れて以降、彼女に多くのことを手伝っていただきました。"
34050-51 = "（……ミカ？）"
34050-52 = "そう……いわば聖園ミカは私にインスピレーションを与えてくれる……ミューズとでも言いましょうか。"
34050-53 = "「エデン条約」を利用して太古の威厳を確保するというアイデアも、予知夢の大天使を真っ先に処分すべきだという判断も、彼女のおかげで実現できたのです。"
34050-54 = "預言者だなんて厄介な存在はさっさと排除するに限りますからね。珍しい技術を提供してくれたデカルコマニー……いえ、ゴルコンダに感謝します。"
34050-55 = "そういうこった！"
34050-56 = "私はテクストを提供しただけで、それを形にしたのはマダムですよ。"
34050-57 = "それに、むしろその技術がマダムの足を引っ張っていませんでしたか？"
34050-58 = "ええ……ですが、生贄の体に予め植えておいた防御システムのおかげで助かりました。感謝します、黒服。"
34050-59 = "……クックックッ。無名の司祭たちの技術が役に立ってよかったです。"
34050-60 = "そして、聖園ミカが最後にくれたインスピレーションが……まさに「シャーレ」の先生についてのことでした。"
34050-61 = "彼女が先生をトリニティに招待したので、私はその存在について認識し、考察できたのです。"
34050-63 = "私がアリウス自治区をターゲットにしたのは、純粋にそこが秘匿された場所であるからで、それ以上の意味はありませんでした。"
34050-64 = "「トリニティ」や「ゲヘナ」……それらに向けられた怒りと憎悪など……私にとってはどうでもいいこと。"
34050-66 = "「憎悪」は子どもたちを統制するための手段に過ぎず、「エデン条約」は守護者の力を得るための方法に過ぎず、「スクワッド」は使い捨ての道具でしかない。"
34050-67 = "聖園ミカが先生をトリニティに連れてこなかったら、私もあの者の事など歯牙にもかけなかったでしょう。ですが……あの活躍をこの目で見てしまった……。"
34050-69 = "アレが介入すると、私が持っているすべての意味が変わってしまいます。あの者は危険です。"
34050-70 = "……。"
34050-71 = "そこで気づいたのです。私の計画を果たすためには、真っ先に「先生」を消さなければならないということに。"
34050-72 = "まさに[ruby=敵対者]アンタゴニスト[/ruby]ですね……。"
34050-73 = "ふむ……。"
34050-74 = "私の決定が気に入らないようですが――どうせ私たちは各々の目的を追求するだけの存在。あなた方に私を妨害する権利はないでしょう。"
34050-75 = "……ええ、そのような権利はありません。思うままになさってください、ベアトリーチェ。"
34050-76 = "……。"
34050-77 = "……。"
34050-78 = "しかし、あなたの計画というものが何なのか、私たちに具体的に教えてくれたことはありませんでした。マダム、あなたはアリウス自治区で何をしているのですか？"
34050-79 = "祭壇を用意しています。"
34050-80 = "祭壇……？"
34050-81 = "あなたがアビドスでしようとしていた事と本質的には変わりません。ただ、私は契約をするつもりはないですが。"
34050-82 = "ほう、契約の代わりに儀式ですか……本来その二つは変わらないと考えることもできますが……。"
34050-83 = "それを実行する上で、先生の存在が必ず邪魔になると？"
34050-84 = "ええ、そうです……既に手は打ってあります。"
34050-85 = "「スクワッド」が先生を処理してくれることでしょう。"
34050-87 = "（……！！！）"
34050-88 = "……。"
34050-89 = "……なるほど、スクワッドですか。"
34050-90 = "廃棄しようとしていた消耗品ですが、先生を殺せば許す機会を与えると伝えました。彼女たちにとっては断ることができない提案ですから。"
34050-91 = "い、いけない……！先生が……危険……！"
34050-92 = "（……うっ！？）"
34050-93 = "……どうやら、ネズミが潜り込んでいるようですね。"
34050-94 = "……！！"
34050-95 = "ここに？ここには我々以外誰も……。"
34050-96 = "少々話しすぎたようです。私はこれで帰るとします。"
34050-100 = "……。"
34050-101 = "……。"
34050-110 = "……はぁ、はぁ。"
34050-111 = "……はぁ、はぁ、はぁ……はぁ……。"
34050-112 = "（先程の光景は……一体……）"
34050-113 = "う、うぅっ……！"
34050-114 = "ゲホ、ゲホゲホ……！"
34050-115 = "（アリウス自治区は、既にゲマトリアに支配されていた……！？）"
34050-116 = "ゲホ、ゲホッ……。"
34050-118 = "（……体が、言うことを聞かない。意識が……でも……）"
34050-119 = "（アリウスの生徒たちの「教育」も、自治区の位置を今まで見つけられなかったのも……あの正体不明の技術も……ヘイローを壊す爆弾も……すべて……）"
34050-120 = "（ゲマトリアと関係があるとしたら……すべて辻褄が合う……）"
34050-121 = "（「スクワッド」が先生を追っているのであれば……）"
34050-122 = "（先生が危険だ……早く誰かに知らせねば……）"
34050-124 = "（彼女たちは既に一度先生を攻撃している……恐らく、このキヴォトスで最も危険な……）"
34050-125 = "（……ヘイローを壊す爆弾）"
34050-126 = "（私の命が狙われて……エデン条約が決裂して……みんなが怪我をして……先生が危険にさらされたのも……すべて……）"
34050-128 = "（そのすべての……始点があるとしたら……それは……）"
34050-135 = "えっと……その、こんにちは。セイアちゃん……。"
34050-137 = "……ミカ。"
34050-142 = "次回;折れてしまった羽"

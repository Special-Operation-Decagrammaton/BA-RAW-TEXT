[translation]
10046070-1 = "ตอนที่ 7;คืนวันเสาร์ของพวกเรา"
10046070-8 = "อ่า~ เป็นอย่างนี้เองสินะ กะไว้แล้วเชียว~"
10046070-13 = "รู้สาเหตุแล้วเหรอ?!"
10046070-14 = "[s1] \"เร็วมากเลย!\"\n[s2] \"รู้แล้วว่าจะเป็นแบบนี้เหรอ คาสุมิ?!\""
10046070-20 = "หืม? อ้อ ก็นะ~ พอดีฉันสำรวจพื้นที่ตรงนี้ไว้แล้วเพื่อการพัฒนาออนเซ็นน่ะ"
10046070-21 = "และสิ่งที่สำคัญที่สุด~"
10046070-22 = "ฉันรู้ได้จากประสบการณ์ที่สั่งสมมาน่ะ วะ~ ฮะฮะฮ่า~!!"
10046070-23 = "เอาละ ทุกคน..."
10046070-27 = "งั้นก็เริ่มกันเลย"
10046070-31 = "นี่มันเรื่องอะไรกันคะ!!"
10046070-38 = "ทำไมชมรมพัฒนาออนเซ็นถึงมาอยู่ที่นี่ล่ะ?"
10046070-39 = "อิจิกะ เตรียมตัวค่ะ! ครั้งนี้ฉันจะจัดหนักให้ไม่กล้ามาเหยียบที่นี่อีกเลย!"
10046070-44 = "ฉันเรียกพวกเธอมาเองค่ะ"
10046070-48 = "อิจิกะ...?"
10046070-53 = "รุ่นพี่ฮาสุมิ ครั้งนี้ช่วยหลับหูหลับตาให้ฉันสักครั้งเถอะนะคะ ฉันขอร้องละค่ะ"
10046070-54 = "นี่มันเรื่องอะไรกันคะ...?"
10046070-55 = "คนที่รู้ดีที่สุดว่าชมรมพัฒนาออนเซ็นอันตรายแค่ไหนคือคุณไม่ใช่เหรอคะ อิจิกะ?"
10046070-56 = "[s3] \"ครูขอร้องละ\"\n[s4] \"อิจิกะทำดีที่สุดแล้วจริงๆ นะ\""
10046070-61 = "คุณครูก็ด้วยเหรอคะ... งั้นก็ได้ค่ะ"
10046070-62 = "ถ้าทั้ง 2 คนถึงกับพูดแบบนั้น ก็คงมีเหตุผลอะไรละค่ะ"
10046070-63 = "แต่เมื่อเสร็จงานแล้ว ต้องมาอธิบายกับฉันอย่างละเอียดเลยนะคะ"
10046070-64 = "ขอบคุณค่ะ!"
10046070-68 = "นี่~! เพื่อนสนิทของหัวหน้าคาสุมิ~!"
10046070-72 = "ใครเป็นเพื่อนสนิทกันคะ?!"
10046070-73 = "หืม? แต่หัวหน้าพูดไว้ว่าอย่างนั้นนะ หรือว่าไม่ใช่?"
10046070-74 = "เชื่อเขาเลยจริงๆ..."
10046070-75 = "[s5] \"งานนี้เรามาเป็นมิตรกันหน่อยเถอะนะ... \"\n[s6] \"ครูว่าถือโอกาสนี้สร้างมิตรภาพกันไว้เถอะนะ...\""
10046070-81 = "คุณครู"
10046070-82 = "ในโลกนี้มีเรื่องที่ควรพูดและไม่ควรพูดนะคะ"
10046070-83 = "[s7] \"อ๊ะ ครูขอโทษ\"\n[s8] (หลบสายตา)"
10046070-86 = "ทำไมไม่อยากเป็นเพื่อนกับหัวหน้าคาสุมิเหรอ? หัวหน้าทั้งเป็นมิตรและสนิทกับคนอื่นได้ง่ายนะ"
10046070-87 = "คิดเอาเองคนเดียวหรือเปล่าคะ?"
10046070-88 = "รู้ได้ยังไงเนี่ย? อะฮ่า ทั้ง 2 คนสนิทกันจริงๆ สินะ!"
10046070-89 = "ไม่ใช่อย่างนั้นหรอกค่ะ... เฮ้อ โทษสมาชิกชมรมไปก็เท่านั้น~"
10046070-90 = "ไม่สิ... ที่จริงสมาชิกชมรมก็มีความผิดอยู่เหมือนกันนี่?"
10046070-91 = "อ๊ะ ฉันลืมไปสนิทเลย! หัวหน้าบอกว่าให้รีบไปหาน่ะ!"
10046070-92 = "คะ? ติดปัญหาอะไรกับการก่อสร้างหรือเปล่าคะ?"
10046070-93 = "ไม่หรอก~ การก่อสร้างน่ะเสร็จแล้ว แต่ว่าเราต้องมีพิธีฉลองก่อสร้างน่ะสิ"
10046070-94 = "เสร็จแล้วงั้นเหรอคะ? ไม่ได้สร้างอย่างลวกๆ กันใช่มั้ย...?"
10046070-95 = "ไม่หรอกน่า เอาละ ตามฉันมาเลย!"
10046070-105 = "นี่มันออนเซ็นไม่ใช่เหรอคะ...?"
10046070-110 = "เธอนี่มือสมัครเล่นจริงๆ เลยนะ!"
10046070-111 = "วัสดุอุปกรณ์ที่ฉันมีเป็นของที่เอาไว้สร้างออนเซ็น ภายนอกมันก็เลยออกมาเป็นแบบนี้น่ะ"
10046070-112 = "แต่พอไม่มีส่วนสำคัญที่สุดอย่างน้ำพุร้อน! ที่นี่ก็เลยเรียกว่าออนเซ็นไม่ได้หรอก!"
10046070-113 = "แต่ฉันก็ดึงไฟฟ้ามาใช้ให้มีน้ำร้อนแล้ว แล้วก็ใส่เกลืออาบน้ำที่มีกำมะถันลงไปด้วย แค่นี้ก็ได้ความรู้สึกของออนเซ็นแล้วละ"
10046070-114 = "แต่มันก็เป็นแค่ความรู้สึกนะ! นี่ยังเทียบกับออนเซ็นของจริงไม่ได้หรอก!"
10046070-115 = "โอ้ ดูตื่นเต้นจังเลยนะ... เธอก็ชอบออนเซ็นเหมือนกันสินะ"
10046070-116 = "มะ... ไม่สิ ที่สำคัญกว่านี้ก็คือ ทำไมบ้านพักถึงได้ออกมาเป็นอย่างนี้ล่ะคะ? ไม่เห็นจะเหมือนหลังเดิม#nเลยสักนิด?!"
10046070-120 = "ก็งานนี้เราต้องทำแข่งกับเวลานี่นา"
10046070-121 = "เพราะงั้นแทนที่จะเสียเวลาไปขนส่งวัสดุ ฉันก็เลยใช้วัสดุเดิมที่มีอยู่ และในเมื่อมันเป็นวัสดุที่เอาไว้ใช้#nสร้างออนเซ็น บ้านพักที่สร้างได้ก็เลยมีหน้าตาเหมือนออนเซ็นแบบนี้ละ"
10046070-122 = "ใช้วัสดุที่ฉันคืนไปน่ะเหรอคะ...?"
10046070-123 = "หืม? ก็ใช่น่ะสิ อย่างที่เห็นนั่นละ"
10046070-124 = "ถ้างั้นพวกคุณก็ไม่ได้ผลประโยชน์อะไรเลยนี่คะ? ของที่จะได้คืนก็ใช้ไปหมดแล้วด้วย?"
10046070-125 = "มันก็อย่างที่เธอว่าละนะ"
10046070-126 = "ทำไมต้องทำถึงขนาดนี้คะ?"
10046070-127 = "ก็ฉันสัญญากับเธอไว้แล้วนี่นา"
10046070-131 = "คุณนี่นะ... จริงๆ เลย..."
10046070-136 = "ทุกคน! นางิจังกำลังมาทางนี้แล้ว! เราต้องรีบแล้วละ!"
10046070-137 = "คาสุมิจัง! ฉันขอโทษนะ...!"
10046070-138 = "อื้อ ฉันรู้อยู่หรอกน่า~ ถ้ามีแขกที่ไม่ได้รับเชิญอยู่ด้วย เธอก็น่าจะเป็นกังวลทีเดียว งั้นตัวประกอบก็คง#nต้องออกจากฉากไปละนะ"
10046070-139 = "เพื่อเพื่อนคนสำคัญยังไงล่ะ"
10046070-143 = "อะ... อื้อ! ขอบใจที่มาซ่อมบ้านพักให้นะ ขอบใจมากเลย!"
10046070-144 = "ไปขอบใจอิจิกะจังแทนเถอะ~"
10046070-152 = "ไม่คิดเลยนะคะว่าฉันจะได้อธิบายเรื่องศักดิ์ศรีของสภาน้ำชาให้คุณเซอาฟัง..."
10046070-153 = "มันเป็นเรื่องสุดวิสัยน่ะค่ะ ให้ฉันดื่มชาเยอะขนาดนั้นแล้วจะคาดหวังอะไรจากฉันอีกคะ?"
10046070-154 = "เห็นทีต้องคุยเรื่องนี้อีกครั้งตอนคุณมิกะอยู่ด้วยแล้วละ..."
10046070-158 = "เอ๋...? ทำไมบ้านพักตากอากาศถึง...?"
10046070-159 = "ทุกคน! เข้ามาสิ เมื่อกี้ได้เล่นสนุกกันมาหรือเปล่า?"
10046070-160 = "อ้อ คุณมิกะ เราได้เล่นสนุกกันอย่างคาดไม่ถึงเลยละค่ะ ฉันอยากให้คุณมิกะได้เห็นเองกับตาจริงๆ"
10046070-161 = "ว่าแต่ บ้านพักตากอากาศของเรามันดูต่างจากเดิมนะคะ?"
10046070-165 = "อ่า งั้นเหรอ?! ฉันว่าก็เหมือนเดิมนะ หรือพอประดับตกแต่งขึ้นมานิดๆ หน่อยๆ ก็เลยให้บรรยากาศดู#nต่างออกไป?"
10046070-166 = "ไม่น่าจะใช่แค่การประดับตกแต่งนะคะ..."
10046070-168 = "วันนี้เราทำกิจกรรมกันเยอะแยะเลยนี่คะ คงรู้สึกอย่างนั้นเพราะความเหนื่อยน่ะค่ะ เท่าที่ฉันดู บ้านพักตากอากาศก็ไม่ได้ต่างไปจากเดิมเท่าไรนี่คะ"
10046070-170 = "ใช่มั้ยล่ะคะ? ถ้าคุณเซอาก็พูดแบบนั้น งั้นก็ต้องเป็นอย่างที่ว่าแน่ๆ ค่ะ"
10046070-171 = "ตอนนี้ฉันอยากเข้าไปพักผ่อนในห้องก่อนค่ะ"
10046070-175 = "อ๊ะ ฉันเตรียมน้ำไว้ให้อาบแล้วละ!"
10046070-176 = "ตายจริง ขอบคุณที่ใส่ใจกันนะคะ ถ้างั้นฉันต้องขอตัวก่อนนะคะ"
10046070-182 = "ฮุฮุ... ถึงฉันจะไม่รู้รายละเอียด แต่ดูเหมือนจะเจอเรื่องลำบากกันไม่น้อยเลยนะคะ"
10046070-183 = "ถึงกับต้องสร้างบ้านพักกันใหม่เลย... ถึงจะไม่รู้สาเหตุ แต่ก็ถือว่าทำออกมาได้ดีเลยค่ะ"
10046070-184 = "ดูออกเลยเหรอ?!"
10046070-185 = "ทำเอาฉันอยากถามกลับเลยนะคะ ทำไมถึงคิดว่าฉันจะไม่รู้ล่ะคะ?"
10046070-186 = "ครั้งนี้ฉันเข้ามาพูดช่วยไว้ก็จริง แต่ถ้าเป็นนางิสะตอนปกติละก็ ไม่มีทางไม่สังเกตเห็นแน่นอนค่ะ"
10046070-187 = "ค่ะ... ถ้าเป็นนางิสะตอนปกติล่ะก็นะ"
10046070-188 = "หืม? หมายความว่ายังไงคะ?"
10046070-189 = "เอาเป็นว่าตอนนี้ไม่ต้องทำให้ทุกอย่างสมบูรณ์แบบก็ได้ค่ะ ฉันรู้ว่านั่นไม่ใช่เรื่องง่ายสำหรับคุณ ก็ตารางของวันนี้เผยให้เห็นความรู้สึกเป็นหนี้บุญคุณที่เรามีนี่คะ"
10046070-190 = "แต่ฉันรู้สึกว่ามิกะในตอนนี้หักโหมเกินไปนิดหน่อยค่ะ ฉันก็พอเดาได้ว่าเพราะอะไร แต่ความสัมพันธ์ระหว่างคุณกับนางิสะก็ไม่ได้แย่ขนาดนั้นนี่คะ"
10046070-191 = "ฉันก็แค่อยากบอกให้ฟังน่ะค่ะ งั้นวันนี้ฉันก็จะตอบรับความปรารถนาดีที่ไม่ได้เห็นบ่อยๆ ของมิกะ และต้องขอตัวก่อนนะคะ"
10046070-197 = "อะไรกัน... จู่ๆ ก็พูดอะไรไม่เห็นจะเข้าใจเลย"
10046070-198 = "คุณครูพอเข้าใจบ้างหรือเปล่า?"
10046070-199 = "หืม? คุณครูไม่รู้... แต่คิดว่าฉันน่าจะรู้งั้นเหรอ?"
10046070-200 = "อะไรกันเนี่ย... แม้แต่คุณครูก็เริ่มเหมือนเซอาจังเข้าอีกคนเหรอ?"
10046070-205 = "ได้กลิ่นอะไรมั้ยคะ...?"
10046070-209 = "อ้อ...! จริงสิ! ฉันตั้งหม้ออาหารไว้!"
10046070-210 = "งั้นเดี๋ยวไว้คุยกันนะ คุณครู!"
10046070-222 = "(หลังจากกินมื้อเย็นเสร็จ นางิสะกับเซอาก็ได้เข้านอนอย่างสบายใจ)"
10046070-225 = "ทุกคน~ ทำได้ดีมากเลย~!"
10046070-226 = "ขอบคุณที่ทำงานหนักกันนะคะ!"
10046070-231 = "คิดไม่ถึงเลยนะคะว่าทั้ง 3 คนจะต้องเหนื่อยกันถึงขนาดนี้"
10046070-232 = "ฉันมาทำงานแท้ๆ แต่กลับไปเล่นสนุกอยู่กับสภาน้ำชาคนอื่น น่าอายจังเลยค่ะ"
10046070-233 = "ไม่หรอกนะ ถ้าฮาสุมิจังไม่ได้อยู่ตรงนั้น พวกเราก็คงมาเตรียมงานอย่างวางใจไม่ได้หรอก"
10046070-234 = "น่าน้อยใจจังเลย~ ทำไมไม่คิดถึงพวกฉันด้วยล่ะ?"
10046070-235 = "ชมรมพัฒนาออนเซ็น..."
10046070-236 = "ตัวต้นเหตุที่มาก่อปัญหาตั้งแต่แรกจะเข้ามาเอี่ยวด้วยทำไมคะ?"
10046070-237 = "ฮ่าฮ่า! งั้นเหรอ? รองหัวหน้าชมรมนี่เย็นชาจริงๆ เลยนะ~"
10046070-238 = "ฉันไม่คิดว่าเราติดหนี้อะไรพวกคุณหรอกนะคะ แต่ก็คงต้องยอมรับว่าได้รับความช่วยเหลือมาจริงๆ"
10046070-239 = "ไม่คิดเลยนะคะว่าจะมีวันที่ต้องขอบคุณพวกคุณด้วย..."
10046070-244 = "หืม? ทำไมล่ะ? ในเมื่อทุกคนพอใจ ก็ถือว่าคลี่คลายได้แล้วไม่ใช่เหรอ?"
10046070-245 = "ก็ใช่น่ะสิ! ใช่เลย! เมกุนี่ฉลาดจริงๆ!"
10046070-246 = "อ๊ะ จะว่าไปมันเกิดเรื่องแบบนั้นได้ยังไงเหรอ?"
10046070-247 = "บ้านพักหลังเดิมถึงกับถล่มลงมาไม่มีชิ้นดี ส่วนพื้นก็ทรุดลงไปเลยด้วย..."
10046070-248 = "อ้อ นั่นน่ะเรื่องง่ายๆ เป็นเพราะน้ำบาดาลน่ะ"
10046070-249 = "น้ำบาดาล?"
10046070-250 = "สายน้ำใต้ดินกำลังไหลอยู่น่ะ พอน้ำไหลตามสายน้ำใต้ดิน ดินกับทรายก็จะถูกชะล้างออกมาด้วย นอกจากจะทำให้ผิวพื้นดินอ่อนแอลงแล้ว ความชื้นที่เกิดขึ้นก็ยังทำให้วัสดุก่อสร้างเสื่อมสภาพเร็วขึ้น"
10046070-251 = "ถ้าจะสร้างอาคารในพื้นที่ที่มีปัญหาแบบนี้ ก็ต้องเริ่มตั้งแต่การวางแผนรับมือเรื่องระบบกันน้ำอย่าง#nละเอียด แล้วก็ต้องสร้างพื้นฐานให้มั่นคงด้วย"
10046070-252 = "สรุปได้ว่านี่คือหายนะที่เกิดจากความประมาทเลินเล่อน่ะ"
10046070-254 = "แหะๆ~ คาสุมิจังเชี่ยวชาญด้านนี้จังเลยนะ"
10046070-258 = "[ns9] \"เดี๋ยวนะ เมื่อกี้ที่พูดถึงสายน้ำใต้ดิน...?\"\n[ns10] \"เมื่อกี้บอกว่าสายน้ำใต้ดินไหลอยู่งั้นเหรอ...?\""
10046070-261 = "อ้อ... ที่บอกว่ามีสายน้ำใต้ดินไหลอยู่น่ะ มันแปลว่าถ้าเราขุดให้ลึกมากพอ น้ำที่ร้อนขึ้นจากความร้อน#nใต้พิภพก็จะพุ่งขึ้นมา"
10046070-265 = "ใช่แล้วละ และนั่นก็หมายถึง...!"
10046070-270 = "[ns11] \"มะ... มิกะ!! หยุดคาสุมิที!!\"\n[ns12] \"มะ... ไม่ได้นะ ไม่ทันแล้วเหรอเนี่ย...!!\""
10046070-275 = "วะ~ ฮะฮะฮะฮ่า!! ใช่แล้วละ ออนเซ็น...!!"
10046070-287 = "อึกก...?!"
10046070-288 = "จะ... จับสังเกตได้ตั้งแต่เมื่อไรเนี่ย...?"
10046070-295 = "ตั้งแต่แรกแล้วค่ะ"
10046070-296 = "ฮ่าฮ่า...! เธอนี่นะ เหมือนกับฉันจริงๆ..."
10046070-300 = "จริงๆ เลยเชียว เป็นคนที่จะประมาทไม่ได้เลยนะคะ..."
10046070-302 = "อะไรกันน่ะ? เกิดอะไรขึ้นเหรอ?"
10046070-303 = "สิ่งที่คาสุมิจังหยิบออกมาเมื่อกี้คือ... สวิตช์ระเบิดเหรอ?!"
10046070-304 = "ประมาณนั้นค่ะ คงจะสร้างเอาไว้ใต้อาคารระหว่างก่อสร้างน่ะค่ะ"
10046070-305 = "ฉันเตรียมตัวเผื่อเอาไว้ก็จริง แต่ไม่คิดเลยนะคะว่าจะเกิดขึ้นจริงๆ แต่ถ้าเรายึดสวิตช์นั่นมาไว้ได้ ก็คงไม่มีปัญหา..."
10046070-314 = "มีเรื่องอะไรเหรอคะ? ดึกดื่นป่านนี้ แต่เอะอะโวยวายกันจังเลย"
10046070-315 = "การออกมาข้างนอกตอนนี้ น่าจะมีเรื่องไม่ดีเกิดขึ้นใช่มั้ยคะ...?"
10046070-326 = "นั่นนักเรียนเกเฮนน่า... หรือเปล่าคะ? ทำไมนักเรียนจากเกเฮนน่าถึงมาอยู่ที่นี่?"
10046070-330 = "ดะ... เดี๋ยวก่อน! ฉันอธิบายทุกอย่างได้นะ!"
10046070-331 = "เอ๋? แล้วนี่มันอะไรกันคะ?"
10046070-335 = "สวิตช์อะไรหรือเปล่า?"
10046070-339 = "อ๊ะ อย่า..."
10046070-340 = "หืม?"
10046070-361 = "...???"

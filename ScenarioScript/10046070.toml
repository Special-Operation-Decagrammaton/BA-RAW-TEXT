[translation]
10046070-1 = "第7話;我們正值週六夜"
10046070-8 = "啊啊～果然還是變成這樣了啊～"
10046070-13 = "你已經查出來了嗎！？"
10046070-14 = "[s1]「好快！」\n[s2]「你早就知道了嗎，佳澄部長！？」"
10046070-20 = "嗯？是啊，畢竟這裡本來就是為了開發而調查過的地方嘛～"
10046070-21 = "更重要的是……"
10046070-22 = "我有長久以來累積的經驗啊！哈～哈哈哈哈！！"
10046070-23 = "那麼各位……"
10046070-27 = "開始施工吧。"
10046070-31 = "這到底是怎麼回事！？"
10046070-38 = "為什麼溫泉開發部會出現在這裡！？"
10046070-39 = "一花，快做好準備！#n這次一定要把他們一個不留地驅逐出去！"
10046070-44 = "是我叫他們來的。"
10046070-48 = "……一花？"
10046070-53 = "蓮實前輩，這次就請你睜一隻眼閉一隻眼吧。拜託了。"
10046070-54 = "這到底是怎麼回事……？"
10046070-55 = "最了解溫泉開發部危險性的，不就是一花你嗎？"
10046070-56 = "[s3]「我也拜託你了。」\n[s4]「一花真的已經盡力了。」"
10046070-61 = "連老師也……我明白了。"
10046070-62 = "既然兩位都這麼說，背後想必是有原因的吧。"
10046070-63 = "不過等事情結束之後，還請詳細向我說明情況。"
10046070-64 = "非常感謝！"
10046070-68 = "喂～！佳澄部長的好朋友～！"
10046070-72 = "就說了誰是他朋友啊！？"
10046070-73 = "嗯？部長是這麼說的耶，難道不是嗎？"
10046070-74 = "那傢伙真的是……"
10046070-75 = "[s5]「要不要趁這個機會好好相處看看……？」\n[s6]「老師我是這麼想的啦……」"
10046070-81 = "老師。"
10046070-82 = "世上有些話是不能說的哦。"
10046070-83 = "[s7]「啊，我很抱歉。」\n[s8] 移開視線"
10046070-86 = "佳澄部長怎麼了嗎？#n部長應該是那種很擅長交際、跟誰都能相處融洽的人才對呀？"
10046070-87 = "那是他本人自己說的吧？"
10046070-88 = "你怎麼知道？#n啊哈，你們果然很熟嘛！"
10046070-89 = "並沒有好嗎……#n唉，跟部員爭論這些也沒意義吧～"
10046070-90 = "……不，這件事追根究柢好像也跟他們有關？"
10046070-91 = "啊，我差點忘了！#n部長要我們趕快過去！"
10046070-92 = "咦？施工出了什麼問題嗎？"
10046070-93 = "沒有沒有～是因為施工已經結束，竣工儀式得要委託人到場才行的關係。"
10046070-94 = "已經完工了嗎？#n他應該不會偷工減料吧……？"
10046070-95 = "來，往這邊！"
10046070-105 = "……這不是溫泉旅館嗎。"
10046070-110 = "所以我才說外行人不懂啊！"
10046070-111 = "這些建材本來就是為了溫泉旅館準備的，看起來像不是很正常嗎？"
10046070-112 = "不過最關鍵的部分完全不行！#n沒有湧出溫泉就不能稱之為溫泉旅館了！"
10046070-113 = "雖然我們加裝了電熱水器跟含硫成分的入浴劑，所以多少還是有點氛圍就是了。"
10046070-114 = "但終究只是「氛圍」而已！跟真正的溫泉比起來差多了！"
10046070-115 = "哦，突然激動起來了耶……看來他是真的很喜歡溫泉啊。"
10046070-116 = "不是，先告訴我為什麼會變成這樣好不好？#n這跟原本的建築完全不一樣吧！？"
10046070-120 = "因為在我的理解中，這是個「以速度為第一優先」的委託。"
10046070-121 = "與其花時間重新採購，不如直接拿現成的建材來用。#n既然建材是為了建造溫泉旅館準備的，風格自然也是這樣囉。"
10046070-122 = "……你把歸還的建材直接拿來用了？"
10046070-123 = "對啊？就跟你看到的一樣。"
10046070-124 = "但這樣一來，你們不就忙了半天卻什麼都沒拿到嗎？"
10046070-125 = "哎～所謂世事難料嘛。"
10046070-126 = "為什麼要做到這種地步？"
10046070-127 = "因為約定就是約定。"
10046070-131 = "你這個人果然……"
10046070-136 = "大家！渚醬要過來了！我們得快點！"
10046070-137 = "佳澄醬！雖然很抱歉……！"
10046070-138 = "啊啊，我懂我懂～要是撞見沒受邀請的客人，會緊張也是難免的吧。#n配角就該識相地退場才對。"
10046070-139 = "畢竟是為了重要的朋友嘛～"
10046070-143 = "嗯！建築的事也是，真的很謝謝你！"
10046070-144 = "要謝的話就感謝一花醬吧～"
10046070-152 = "沒想到會跟聖亞同學談論起茶會格調的問題……"
10046070-153 = "這是不可抗力。#n都讓我喝下那麼多茶了，你還想要求什麼？"
10046070-154 = "這件事就等彌香同學也在場時再重新……"
10046070-158 = "……？#n咦，別墅怎麼……？"
10046070-159 = "大家！歡迎回來！玩得還開心嗎？"
10046070-160 = "啊，彌香同學。#n真想讓你看看剛才那難以言喻的一幕呢。"
10046070-161 = "話說回來，我們的別墅……是不是變得有點不太一樣？"
10046070-165 = "咦，有嗎！？我看起來沒什麼差別呀。#n可能是因為稍微整理過的關係，氣氛才變得不太一樣吧？"
10046070-166 = "這種程度的變化，已經不能用「氣氛」來形容了吧……"
10046070-168 = "……可能是今天緊湊的行程讓你累了吧。#n在我看來也覺得沒什麼變化。"
10046070-170 = "是嗎？既然連聖亞同學都這麼說了，應該不會有錯吧。"
10046070-171 = "現在我只想趕緊進房休息。"
10046070-175 = "啊，洗澡水已經準備好了唷！"
10046070-176 = "哎呀，感謝你安排得這麼周到。#n那我就先失陪了。"
10046070-182 = "……呵呵。雖然不清楚發生了什麼，你看起來似乎吃了不少苦呢。"
10046070-183 = "究竟是因為什麼原因，又是如何把建築重建的呢……總之辛苦你了。"
10046070-184 = "你發現了嗎！？"
10046070-185 = "你這話反而讓我好奇，為何你認為我不會發現了呢……？"
10046070-186 = "不過就算有我在一旁附和，平常的渚想必也不會輕易接受的吧。"
10046070-187 = "……是啊，如果是平常的渚的話。"
10046070-188 = "嗯？什麼意思？"
10046070-189 = "意思是或許不太容易，但可以稍微放鬆一下了。#n今天的行程本身，恰恰體現出了我們心裡的負擔。"
10046070-190 = "而現在的彌香又有點過於緊繃了。#n雖然我大概知道原因……但你和渚之間的關係，應該沒有那麼脆弱吧。"
10046070-191 = "言盡於此。#n那麼我今天也久違順從一下彌香的好意吧。先失陪囉。"
10046070-197 = "……真是的，又突然說一些人家聽不懂的話。"
10046070-198 = "老師能理解他想表達的意思嗎？"
10046070-199 = "嗯？老師也不太懂……但我說不定可以理解？"
10046070-200 = "……什麼啦，老師你也被聖亞醬傳染了嗎？"
10046070-205 = "……有沒有聞到什麼味道？"
10046070-209 = "……啊！鍋子的火沒關！"
10046070-210 = "我們晚點再聊囉，老師！"
10046070-222 = "（於是在吃完晚餐後，渚和聖亞都以非常放鬆的狀態入睡了）"
10046070-225 = "大家～辛苦啦～！"
10046070-226 = "辛苦了！"
10046070-231 = "沒想到三位居然在背後付出了這麼多努力。"
10046070-232 = "我卻對此一無所知，只顧著享受渡假……實在令人羞愧。"
10046070-233 = "也不能這麼說啦。#n要是沒有蓮實醬在的話，我們也沒辦法安心準備其他事情呀。"
10046070-234 = "我說～這樣會讓人很寂寞耶～#n我們不是也有幫上忙嗎？"
10046070-235 = "溫泉開發部……"
10046070-236 = "你們本來就是惹出問題的始作俑者，居然還有臉說這種話？"
10046070-237 = "哈哈！是嗎？副部長還真無情啊～"
10046070-238 = "雖然不覺得有所虧欠，不過受了你們的幫助也是事實。"
10046070-239 = "沒想到會有要感謝你們的一天啊……"
10046070-244 = "咦，為什麼要感謝？大家都開心不就好了嗎？"
10046070-245 = "沒錯沒錯！惠果然最聰明了！"
10046070-246 = "啊，這麼說來，你們是怎麼做到的？"
10046070-247 = "不是說地基差到無法支撐建築物嗎……"
10046070-248 = "啊啊，其實也沒有多複雜啦。#n問題是地下水造成的。"
10046070-249 = "地下水？"
10046070-250 = "就是有水脈在流動的意思。#n地下水的移動會導致土壤流失……除了地基變脆弱之外，濕氣也會加速建材的老化。"
10046070-251 = "想在這種麻煩地點蓋建築的話，#n從打地基開始就得徹底做好防水措施，並確保基礎工程的穩固才行。"
10046070-252 = "總而言之，這就是一場因為便宜行事釀成的人禍啦。"
10046070-254 = "嘿～佳澄醬好博學哦。"
10046070-258 = "[ns9]「等等，你剛才說……？」\n[ns10]「有水脈流動……？」"
10046070-261 = "地下有水脈流動就代表只要挖得夠深……受地熱加熱的水便會噴湧而出。"
10046070-265 = "沒錯，也就是所謂的……！"
10046070-270 = "[ns11]「彌，彌香！！快阻止佳澄！！」\n[ns12]「糟糕，已經太遲了……！！」"
10046070-275 = "哈～哈哈哈哈！！#n沒錯，就是溫──！！"
10046070-287 = "噗哈……！？"
10046070-288 = "你，你是什麼時候發現的……？"
10046070-295 = "我打從一開始就知道了。"
10046070-296 = "……哈哈！#n你果然，跟我很像啊……"
10046070-300 = "……真是個到最後都不能掉以輕心的對手呢。"
10046070-302 = "怎，怎麼了？現在是什麼情況？"
10046070-303 = "剛才佳澄醬拿出來的那個東西……是炸彈的開關嗎！？"
10046070-304 = "我想應該八九不離十吧。#n可能是施工的時候就藏在建築底下了。"
10046070-305 = "雖然有做好準備以防萬一，沒想到他居然會真的動手。#n好在只要回收開關就沒問題了……"
10046070-314 = "發生什麼事了？#n怎麼這麼晚還鬧哄哄的……？"
10046070-315 = "總覺得現在出來不是明智之舉呢……"
10046070-326 = "……格黑娜？#n為什麼格黑娜的學生會出現在這裡？"
10046070-330 = "等，等等！我可以解釋！"
10046070-331 = "咦，這是什麼？"
10046070-335 = "是啟動什麼的開關嗎？"
10046070-339 = "啊，等──"
10046070-340 = "我按。"
10046070-361 = "……？？？"

[translation]
2002603-1 = "實里．扭扭舞"
2002603-2 = "赤冬聯邦學園．圖書館"
2002603-3 = "（因夏萊的工作前往赤冬聯邦學園時，順便到圖書館查看學園的行政記錄）"
2002603-13 = "（在某個附近都沒人的角落座位上，實里正在讀書）"
2002603-14 = "呼呣……"
2002603-15 = "[ns]「……實里？」"
2002603-16 = "這不是老師嗎。#n來這種地方有什麼事？"
2002603-17 = "原來如此，是來找過去的學生名簿跟會議紀錄的啊。"
2002603-18 = "這樣的話，勸你還是放棄比較明智。#n學園的記錄每當發生政變就會被重寫。原文已經跟不存在沒兩樣了。"
2002603-19 = "所幸「知識解放戰線」的圖書管理員嚴選的文學作品還保持著良好的狀態。"
2002603-20 = "已經絕版的小說也有可能在這裡的圖書館找到。#n如果要找以前的書，來這裡也是個不錯的選擇。"
2002603-21 = "[s]「這樣啊。那實里為什麼會來圖書館呢？」"
2002603-22 = "為什麼會來……？"
2002603-23 = "當然是來讀書啊。"
2002603-24 = "……把我跟會在圖書館睡午覺的某個小不點混為一談，真是令人意外。"
2002603-25 = "[s1]「抱歉，我不是那個意思……」\n[s2]「因為工務部的學生都給人活潑的印象……」"
2002603-28 = "嘛，這我倒是不否認。#n但是，為了在工作現場集中精神，這也是有必要的。"
2002603-29 = "畢竟我可不能因為看不懂寫滿複雜專業用語的合約而造成部員的損失啊。"
2002603-30 = "所以作為部長，我也想試著提高自己的素養。"
2002603-31 = "因此在沒有工程或示威的日子，我就會像這樣在圖書館讀書。#n而且圖書館也比其他建築物還溫暖。"
2002603-32 = "[s]「實里喜歡什麼類型的書呢？」"
2002603-33 = "這個嘛，雖然也喜歡可以激發想像力的科幻小說或散文……#n但最喜歡的果然還是「無產階級文學」。"
2002603-34 = "[s]「無產階級文學……？」"
2002603-35 = "沒錯。無產階級文學就是描寫勞動者現實的文學作品。#n也就是受資本家所苦的勞動者挺身而出，發起鬥爭的故事。"
2002603-36 = "同樣身為勞動者，我時常能感同身受。#n此外還能學到面對資本家時的應對方法和教訓哦！"
2002603-37 = "[s]「這，這樣啊……」"
2002603-38 = "無產階級文學有很多，但我最喜歡的作品是……"
2002603-48 = "《狐狸與鶴》。"
2002603-49 = "[s]「狐狸與……鶴？」"
2002603-50 = "老師不知道《狐狸與鶴》嗎？#n這可是有名到每個學園的書架上都有的作品哦。"
2002603-51 = "《狐狸與鶴》是勞動者階級的鶴對抗象徵邪惡資本家的狐狸，並成功革命的故事。"
2002603-52 = "狐狸明明承諾要公平分配食物，#n卻把湯裝在鶴難以食用的淺盤子上，進而獨佔食物………"
2002603-53 = "[s]「是，是這樣嗎……？」"
2002603-54 = "啊啊，沒錯。"
2002603-55 = "於是鶴從中獲得了教訓，將狐狸叫到了自己的家裡。#n並且藉由把食物裝進狐狸的嘴搆不到的長瓶裡贏得了勝利。"
2002603-56 = "也就是說，這部作品想傳達的是……#n將敵人引向對自己有利的環境才能取得勝利，這一游擊戰的基礎戰術！"
2002603-57 = "[ns]（應該不是那種內容吧……）"
2002603-58 = "啊啊，也不能漏了《三隻小豬》！"
2002603-62 = "《三隻小豬》是從事建築相關工作的勞工必須閱讀的書。#n因為其中蘊含著在工作現場不可或缺的教訓啊。"
2002603-63 = "豬大哥和豬二哥因為怠於基礎工程而導致房屋倒塌。#n而用磚塊與水泥建造堅固房子的豬小弟的家，直到最後都很安全。"
2002603-64 = "雖然本來應該要用鋼筋混凝土為基礎才對……"
2002603-65 = "但畢竟是兒童向的文學，考量到故事的演出，這也沒辦法。"
2002603-66 = "[s]「這，這樣啊……」"
2002603-67 = "當然《北風與太陽》我也非常喜歡！"
2002603-68 = "北風與太陽說的是為了脫下貧窮旅人的上衣，反覆採取壓迫和懷柔政策的故事。#n是布爾喬亞階級為了分裂勞動者經常使用的手法……"
2002603-69 = "從這個故事中能夠學到的教訓是，身為勞動者必須時刻保持警覺──"
2002603-71 = "（在那之後，繼續聽著實里那稍微有點奇怪的童話心得）"

[translation]
2002603-1 = "Minori Twist"
2002603-2 = "Red Winter Academy Library"
2002603-3 = "I stopped by Red Winter Academy's library on Schale business, hoping to pull some administrative records."
2002603-13 = "I bumped into Minori there. She was lost in the stacks, engrossed in a book."
2002603-14 = "Hmm..."
2002603-15 = "[ns] \"Minori?\""
2002603-16 = "Oh, Sensei? What are you doing at the academy library?"
2002603-17 = "I hope you're not looking for the academy's administrative records..."
2002603-18 = "I wouldn't bother. Most of Red Winter Academy's records are redacted and changed whenever we have a coup, so there aren't many originals left."
2002603-19 = "You might have better luck checking the Knowledge Liberation Front's selection. Those are mostly intact."
2002603-20 = "They even have old, out-of-print novels. So if you have a book in mind, you should stop by."
2002603-21 = "[ns] \"Thanks for that. But why are you here, Minori?\""
2002603-22 = "What am I doing. Here. In the library."
2002603-23 = "I'm here to read books. I thought it'd be obvious..."
2002603-24 = "You don't think I'm like that child from the Secretariat, who hides out in the library because it's a good place for a nap?"
2002603-25 = "[s1] \"Sorry! I didn't mean any offense.\"\n[s2] \"I always think of hard work and physical labor when I think of you...\""
2002603-28 = "I guess the Labor Party has kind of a rough image. But to do good work, you need good manners and learning."
2002603-29 = "And how are we supposed to understand our work contracts if we aren't decent readers?"
2002603-30 = "That's why it's important for me to keep up my reading. As president of the Labor Party."
2002603-31 = "When I'm not working or striking, I'm often here in the library, reading. It helps that it's warmer than most of the other buildings on campus."
2002603-32 = "[s] \"What kind of books do you like to read?\""
2002603-33 = "Well, sci-fi and essays always get me thinking. But my favorite would have to be class literature."
2002603-34 = "[s] \"Class literature.\""
2002603-35 = "You know. Literature written for the enlightenment and emancipation of the working class! Literature that agitates against the capital elite!"
2002603-36 = "As a worker, I find it very relatable. And it teaches me how to deal with capitalists!"
2002603-37 = "[s] \"I-I see...\""
2002603-38 = "There are so many books to choose from, but let's see... My favorites..."
2002603-48 = "The Fox and the Crane."
2002603-49 = "[s] \"Um... That's Aesop, right?\""
2002603-50 = "Ah, you've heard of it! Well, it is in the library of most schools, so that makes sense."
2002603-51 = "It's a classic of guerrilla literature, in which the working-class crane uses its wits to wage a revolution against the sly capitalist fox."
2002603-52 = "The fox promises to share its food equally, but it serves the food on a flat plate that the crane can't eat out of, thereby hoarding resources for itself..."
2002603-53 = "[s] \"Is that how it goes...?\""
2002603-54 = "Yes, it is."
2002603-55 = "But the crane learns from this, see? So when the fox comes to the crane's house, it serves dinner in a narrow jug. The fox can't get at the food, thus ensuring victory for the crane!"
2002603-56 = "It's a fable, see? The moral of the story is that you must lure your enemy into an environment where you hold the advantage!"
2002603-57 = "[ns] \"(I don't think that's what Aesop meant...)\""
2002603-58 = "What else... Oh, right, The Three Little Pigs!"
2002603-62 = "This book is essential reading for any worker in construction. It deals with lessons about on-site safety, recording two cases of failure and one case of success."
2002603-63 = "The first and second pigs ignored civic codes and used cheap materials, and their houses collapsed just from a strong wind! The third pig, however, used approved materials, and his house was safe."
2002603-64 = "Of course, it would have been better if he framed out the house in rebar and concrete first..."
2002603-65 = "But it's a children's story, so it can be forgiven for going light on the details."
2002603-66 = "[s] \"That's, uh, very generous of you...\""
2002603-67 = "Ah, and I can't forget about The North Wind and the Sun!"
2002603-68 = "The winds and the sun conspire to take a poor traveler's cloak through a combination of hard and soft tactics, just like how the capitalist class divides workers and tricks them into fighting each other!"
2002603-69 = "The moral is that the worker must never, ever let her guard down, and always keep the fighting spirit of—"
2002603-71 = "I listened to Minori's unique takes on old fables until the sun was low in the sky..."

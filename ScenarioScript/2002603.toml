[translation]
2002603-1 = "#title;미노리 트위스트"
2002603-2 = "#place;붉은겨울 학원 도서관"
2002603-3 = "#na;(샬레의 일로 붉은겨울 학원에 들린 김에 학원의 주요 행정 기록을 살펴보기 위해 도서관에 들렀다.)"
2002603-4 = "#st;[0,0];instant;1;"
2002603-5 = "#clearST"
2002603-6 = "#wait;1000"
2002603-7 = "#wait;500"
2002603-8 = "#wait;1000"
2002603-9 = "3;미노리;01\n#3;a"
2002603-10 = "#st;[0,0];instant;1;"
2002603-11 = "#clearST"
2002603-12 = "3;미노리;01\n#3;em;[...]\n#wait;2500"
2002603-13 = "#na;(인적이 드문 서가 맞은편에서 독서에 열중하고 있던 미노리와 마주쳤다.)"
2002603-14 = "3;미노리;01;으음……"
2002603-15 = "[ns] \"……미노리?\""
2002603-16 = "3;미노리;02;어라, 선생……? 붉은겨울 학원의 도서관에는 무슨 일이야?\n#3;em;[반응]"
2002603-17 = "3;미노리;02;과거의 학생기록부 같은 주요 기록물을 살펴보기 위해 도서관에 들렀다고?"
2002603-18 = "3;미노리;01;그거라면 포기하는 게 좋을걸. 붉은겨울 학원의 기록물은 대부분 쿠데타가 일어날 때마다 수정되고 덧쓰여져서 원본이 그대로 남아있는 문서가 없을 정도거든."
2002603-19 = "3;미노리;99;대신이라긴 뭣하지만 <지식해방전선>의 사서들이 엄선한 문학 작품만큼은 대부분 고스란히 남아있으니까."
2002603-20 = "3;미노리;01;밖에서는 절판된 소설도 붉은겨울 학원의 도서관에는 남아있는 경우가 있으니, 읽고 싶은 책이 있다면 이곳을 찾아오는 것도 나쁜 선택은 아니야."
2002603-21 = "[s] \"미노리는 무슨 일로 도서관에 온 거야?\""
2002603-22 = "3;미노리;02;도서관에 무슨 일로……?\n#3;em;[?]"
2002603-23 = "3;미노리;01;그야 책을 읽으러 왔지. 당연한 거 아냐?"
2002603-24 = "3;미노리;09;설마…… 낮잠자기 좋다는 이유만으로 도서관의 자리를 축내는 사무국의 꼬맹이와 같은 취급을 하는 건 아니겠지?\n#3;stiff"
2002603-25 = "[s1] \"미안, 그런 뜻은 아니었어.\"\n[s2] \"어쩐지 용역부는 활동적인 이미지가 강해서……\""
2002603-26 = "#wait;100"
2002603-27 = "#wait;100"
2002603-28 = "3;미노리;99;뭐, 그런 인상이 있다는 건 부정하진 않겠지만…… 현장 작업을 위해서라면 최소한의 교양 정도는 갖추는 편이 좋으니까.\n#3;em;[한숨]"
2002603-29 = "3;미노리;01;더군다나 계약으로 움직이는 용역 학생들이 어려운 용어가 가득한 계약서의 문장을 오독해서 불이익을 받는다면 안 되잖아?"
2002603-30 = "3;미노리;07;그러니 부장인 나라도 부지런히 교양을 쌓아두어야지."
2002603-31 = "3;미노리;01;그래서 작업이나 시위가 없는 날에는 종종 도서관에서 책을 읽으면서 시간을 보내는 편이야. 도서관은 다른 건물에 비해 따듯하기도 하고."
2002603-32 = "[s] \"미노리는 어떤 장르의 책을 제일 좋아해?\""
2002603-33 = "3;미노리;02;글쎄. 상상력을 자극하는 SF나 에세이도 좋아하지만, 역시 제일은…… '계급 문학'이려나.\n#3;em;[땀]\n#3;stiff"
2002603-34 = "[s] \"계급 문학……?\""
2002603-35 = "3;미노리;01;음, 계급 문학은 노동 계급의 계몽과 해방을 위해 쓰여진 문학으로 자본가들에게 고통받는 노동자들과 그들의 투쟁을 주요 소재로 다루고 있지."
2002603-36 = "3;미노리;02;같은 노동자로서 공감되는 점도 많고, 자본가들을 상대할 때 어떤 방식으로 대처하면 좋을지 교훈도 얻을 수 있거든!"
2002603-37 = "[s] \"그, 그렇구나……\""
2002603-38 = "3;미노리;99;계급 문학에도 여러 가지가 있지만, 내가 그중에서도 제일 좋아하는 작품은……\n#3;em;[...]"
2002603-39 = "#st;[0,0];instant;1;"
2002603-40 = "#clearST"
2002603-41 = "3;미노리;01\n#3;m2\n#wait;1000"
2002603-42 = "3;미노리;01\n#3;greeting\n#wait;1000"
2002603-43 = "#wait;500"
2002603-44 = "3;미노리;01\n#3;d\n#wait;1000"
2002603-45 = "#wait;1200"
2002603-46 = "#all;hide"
2002603-47 = "3;미노리;01\n#3;closeup\n#3;a\n#wait;1000"
2002603-48 = "3;미노리;03;<여우와 두루미>야.\n#3;em;[반짝]\n#3;closeup"
2002603-49 = "[s] \"여우와…… 두루미?\""
2002603-50 = "3;미노리;02;응? 선생, <여우와 두루미>를 읽어본 적이 없는 거야? 거의 모든 학교의 서가에 비치되어 있는 유명한 작품인데."
2002603-51 = "3;미노리;01;<여우와 두루미>는 간악한 자본가를 상징하는 여우에 맞서 노동 계급인 두루미가 영리하게 혁명을 성공시키는 일종의 게릴라 문학이야."
2002603-52 = "3;미노리;99;여우는 공평하게 음식을 나눈다는 약속을 하고도 두루미가 손댈 수 없는 평평한 접시에 수프를 내놓아 음식을 독점하려 하지……"
2002603-53 = "[s] \"그, 그랬었던가……\""
2002603-54 = "3;미노리;01;음, 틀림없어.\n#3;jump"
2002603-55 = "3;미노리;01;하지만 두루미는 이 사건에서 교훈을 얻어 다음 차례에는 여우를 자신의 집으로 불러들인 다음, 여우의 주둥이가 닿지 않는 긴 병에 음식을 담아 승리를 쟁취하지."
2002603-56 = "3;미노리;99;결국 이 책에서 말하는 내용은…… 자신이 유리한 환경으로 적을 끌어들여야 승리할 수 있다는 유격전의 기초 전술이지!"
2002603-57 = "[ns] (그런 내용이 아니었던 것 같은데……)"
2002603-58 = "3;미노리;02;그 외에도 좋은 작품이라면…… 아, <아기 돼지 삼형제>도 빼놓을 수 없지!"
2002603-59 = "#st;[0,0];instant;1;"
2002603-60 = "#clearST"
2002603-61 = "3;미노리;02\n#3;greeting\n#wait;1000"
2002603-62 = "3;미노리;01;<아기 돼지 삼형제>는 건축업계에 종사하는 노동자라면 꼭 읽어야 하는 현장 안전 수칙에 대한 교훈집으로, 두 가지의 실패 사례와 한 가지의 성공 사례가 수록되어 있어."
2002603-63 = "3;미노리;01;기초 공사를 소홀히 한 첫째 돼지와 둘째 돼지는 강풍에 의한 공진만으로도 집이 무너져 버렸지만, 시멘트와 벽돌을 쌓아 튼튼한 집을 지은 셋째 돼지는 안전하게 집을 지킬 수 있었지."
2002603-64 = "3;미노리;99;물론 실제로 그 정도 크기의 집을 짓는다면 철근과 콘크리트를 섞어 골조 공사를 먼저 진행해야 했었겠지만……"
2002603-65 = "3;미노리;01;아동용 동화이니 이 정도의 연출적 허용은 어쩔 수 없었겠지."
2002603-66 = "[s] \"그, 그렇구나……\""
2002603-67 = "3;미노리;02;아, 그리고 <북풍과 태양>도 그에 못지않게 좋아하는 계급 문학이야!\n#3;em;[!]\n#3;jump"
2002603-68 = "3;미노리;05;저 높은 곳에서 군림하는 태양과 북풍이 가난한 나그네의 겉옷을 가져가기 위해 압제와 회유를 반복하는 모습은 부르주아들이 노동자들을 분열시키기 위해 자주 쓰는 더러운 수법이지……"
2002603-69 = "3;미노리;03;이 이야기에서 배울 수 있는 교훈은 결국 노동자는 어느 때나 방심해서는 안 된다는 투쟁 의지를—\n#3;em;[재잘]\n#3;hophop"
2002603-70 = "#all;hide"
2002603-71 = "#na;(이후, 지칠 때까지 계속해서 미노리의 약간 이상한 동화 감상을 들어주었다……)"

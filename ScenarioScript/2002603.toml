[translation]
2002603-1 = "มิโนริในแบบที่เข้าไม่ถึง"
2002603-2 = "ห้องสมุด สหภาพเรดวินเทอร์"
2002603-3 = "(คุณครูมาที่สหภาพเรดวินเทอร์เพราะมีธุระจากชาเล่ต์ แต่ไหนๆ มาทั้งทีแล้วก็ขอแวะห้องสมุดเพื่อดู#nบันทึกการบริหารงานหลักของโรงเรียนสักหน่อย)"
2002603-13 = "(คุณครูเจอมิโนริกำลังตั้งใจอ่านหนังสือตรงมุมลับตาคนฝั่งตรงข้ามพอดี)"
2002603-14 = "อืม..."
2002603-15 = "[ns] \"มิโนริ...?\""
2002603-16 = "อ้าว คุณครู...? มาทำอะไรที่ห้องสมุดสหภาพเรดวินเทอร์เหรอ?"
2002603-17 = "แวะมาห้องสมุดเพราะจะมาดูบันทึกสำคัญๆ อย่างบันทึกข้อมูลนักเรียนเมื่อครั้งอดีตน่ะเหรอ?"
2002603-18 = "ฉันว่าครูยอมแพ้จะดีกว่านะ บันทึกส่วนใหญ่ของสหภาพเรดวินเทอร์ถูกแก้ไขทุกครั้งที่มีการปฏิวัติ มันถูกเขียนทับจนแทบไม่เหลือเนื้อหาต้นฉบับแล้วละ"
2002603-19 = "ถึงจะทดแทนกันไม่ได้ แต่วรรณกรรมที่บรรณารักษ์ของ <ชมรมแนวร่วมปลดปล่อยความรู้> คัดสรรมาก็ยังอยู่ในสภาพเดิมอยู่นะ"
2002603-20 = "นิยายที่ไม่มีการตีพิมพ์ภายนอกก็ยังเหลือในห้องสมุดของสหภาพเรดวินเทอร์เช่นกัน ถ้ามีหนังสือที่#nอยากอ่านละก็ การแวะมาที่นี่ก็ไม่ใช่ตัวเลือกที่แย่อะไรหรอกนะ"
2002603-21 = "[s] \"มิโนริมีธุระอะไรที่ห้องสมุดเหรอ?\""
2002603-22 = "ธุระที่ห้องสมุด...?"
2002603-23 = "ก็มาอ่านหนังสือน่ะสิ ของมันก็แน่นอนอยู่แล้วนี่?"
2002603-24 = "ครูคง... ไม่คิดว่าฉันเป็นเหมือนเด็กสำนักเลขาธิการที่ชอบใช้พื้นที่ห้องสมุดนอนกลางวันหรอกใช่มั้ย?"
2002603-25 = "[s1] \"ขอโทษๆ ครูไม่ได้หมายความว่าอย่างนั้นนะ\"\n[s2] \"มิน่าชมรมผู้รับจ้างถึงได้มีภาพลักษณ์กระตือรือร้นกันสุดๆ...\""
2002603-28 = "ไม่ปฏิเสธหรอกว่าพวกเรามีภาพลักษณ์แบบนั้น.... แต่สำหรับการทำงานหน้าไซต์งานแล้ว อย่างน้อยมี#nการศึกษาขั้นต่ำไว้หน่อยก็ไม่ใช่เรื่องแย่อะไรหรอกนะ"
2002603-29 = "ยิ่งไปกว่านั้นพวกนักเรียนก่อสร้างที่ทำงานตามสัญญา ถ้าไม่เข้าใจข้อความในหนังสือสัญญาที่เต็มไป#nด้วยศัพท์เฉพาะทางยากๆ เลย มันก็ไม่ได้ใช่มั้ยล่ะ?"
2002603-30 = "อย่างน้อยคนเป็นหัวหน้าอย่างฉันก็ควรสั่งสมความรู้เอาไว้ละนะ"
2002603-31 = "เพราะงั้นวันไหนที่ไม่มีงานหรือมีประท้วง ฉันก็จะมาอ่านหนังสือที่ห้องสมุดเป็นประจำ เทียบกับตึกอื่นๆ ด้วยแล้ว ที่ห้องสมุดยังอบอุ่นกว่าด้วย"
2002603-32 = "[s] \"มิโนริชอบหนังสือแนวไหนที่สุดเหรอ?\""
2002603-33 = "ไม่รู้สิ... ฉันชอบแนวไซไฟหรือพวกงานเขียนกระตุ้นพลังจินตนาการนะ แต่ชอบที่สุดก็คงเป็น... 'วรรณกรรมชนชั้นกรรมาชีพ' นี่แหละ"
2002603-34 = "[s] \"วรรณกรรมชนชั้นกรรมาชีพเหรอ...?\""
2002603-35 = "อื้ม วรรณกรรมชนชั้นกรรมาชีพเป็นวรรณกรรมที่เขียนขึ้นเพื่อปลุกจิตสำนึกและปลดปล่อยอิสระของ#nชนชั้นแรงงาน มีเนื้อหาหลักเป็นการต่อสู้ของแรงงานที่ได้รับความเจ็บปวดจากพวกนายทุนน่ะ"
2002603-36 = "ในฐานะแรงงานด้วยกันฉันอินกับหลายๆ เรื่องราวมาก แถมยังได้เรียนรู้ด้วยว่าเวลาเผชิญหน้ากับพวก#nนายทุนเราควรรับมือยังไง!"
2002603-37 = "[s] \"ยะ... อย่างนั้นสินะ...\""
2002603-38 = "วรรณกรรมชนชั้นกรรมาชีพมีหลายเรื่องมาก แต่ผลงานที่ฉันชอบที่สุดคือ..."
2002603-48 = "<สุนัขจิ้งจอกกับนกกระสา>"
2002603-49 = "[s] \"สุนัขจิ้งจอก... กับนกกระสา?\""
2002603-50 = "หืม? ครู... ยังไม่เคยอ่าน <สุนัขจิ้งจอกกับนกกระสา> เหรอ? มันคือผลงานขึ้นชื่อที่มีในชั้นหนังสือเกือบ#nทุกโรงเรียนเลยนะ"
2002603-51 = "<สุนัขจิ้งจอกกับนกกระสา> เป็นวรรณกรรมกองโจรรูปแบบหนึ่งที่บอกเล่าเรื่องราวของนกกระสา ตัวแทนของชนชั้นแรงงานที่ต่อต้านสุนัขจิ้งจอก สัญลักษณ์ของชนชั้นนายทุนชั่วร้ายจนทำการปฏิวัติ#nมาได้สำเร็จ "
2002603-52 = "สุนัขจิ้งจอกสัญญาว่าจะแบ่งอาหารอย่างเท่าเทียมกัน แต่มันกลับใส่น้ำซุปลงบนจานเรียบแบนที่#nนกกระสากินไม่ได้เพราะหวังจะฮุบอาหารไว้กินคนเดียว..."
2002603-53 = "[s] \"ยะ... อย่างนั้นเหรอ...\""
2002603-54 = "อื้ม ไม่ผิดแน่"
2002603-55 = "แต่หลังจากนกกระสาได้บทเรียนจากเหตุการณ์ครั้งนี้ ครั้งต่อมามันก็เลยชวนสุนัขจิ้งจอกมาบ้านของตัว#nเองบ้าง แล้วก็เอาชนะด้วยการใส่อาหารลงในขวดปากยาวที่สุนัขจิ้งจอกยื่นปากไปไม่ถึง"
2002603-56 = "สรุปแล้วหนังสือเล่มนี้ได้สื่อถึง... ยุทธศาสตร์พื้นฐานของสงครามกองโจรที่กล่าวว่า 'เราจะชนะได้ก็ต่อ#nเมื่อนำศัตรูเข้ามาในสภาพแวดล้อมที่เราได้เปรียบ!'"
2002603-57 = "[ns] (รู้สึกว่าเนื้อเรื่องมันไม่ใช่แบบนั้นนะ...)"
2002603-58 = "ส่วนผลงานดีๆ นอกเหนือจากนั้นก็... อ้อ ขาดเรื่อง <ลูกหมูสามตัว> ไปไม่ได้เลย!"
2002603-62 = "<ลูกหมูสามตัว> เป็นนิทานสอนใจเกี่ยวกับกฎความปลอดภัยหน้าไซต์งาน ที่แรงงานผู้อุทิศตนให้กับ#nวงการก่อสร้างต้องอ่านให้ได้ มันมีอุทาหรณ์สอนใจเกี่ยวกับความล้มเหลวสองอย่างและความสำเร็จอีก#nหนึ่งอย่าง"
2002603-63 = "ลูกหมูตัวแรกและตัวที่สองสร้างบ้านแบบลวกๆ เพียงแค่โดนพายุพัดกระหน่ำใส่ บ้านก็พังทลายไป แต่#nลูกหมูตัวที่สามที่สร้างบ้านอย่างมั่นคงด้วยปูนซีเมนต์และก้อนอิฐ กลับปกป้องบ้านไว้ได้อย่างปลอดภัย"
2002603-64 = "แน่นอนว่าถ้าจะสร้างบ้านหลังใหญ่ขนาดนั้นในชีวิตจริง เราก็ต้องผสมคอนกรีตลงในเหล็กเส้น แล้วก็สร้างโครงบ้านก่อน..."
2002603-65 = "แต่มันเป็นนิทานสำหรับเด็ก ก็ช่วยไม่ได้แหละนะที่ต้องปล่อยให้แต่งเติมเรื่องราวประมาณนี้"
2002603-66 = "[s] \"ยะ... อย่างนั้นสินะ\""
2002603-67 = "อ้อ แล้วก็เรื่อง <ลมเหนือกับพระอาทิตย์> ก็เป็นวรรณกรรมชนชั้นกรรมาชีพที่ฉันชอบไม่แพ้เรื่องอื่นๆ เลยนะ!"
2002603-68 = "การที่ผู้มีอำนาจที่อยู่เบื้องบนอย่างพระอาทิตย์และสายลมเหนือพยายามข่มขวัญและเกลี้ยกล่อมเอา#nเสื้อคลุมจากนักเดินทางยากจนอยู่ซ้ำๆ มันก็ไม่ต่างจากวิธีสกปรกที่ชนชั้นนายทุนใช้แบ่งแยกแรงงาน#nนักหรอก..."
2002603-69 = "วรรณกรรมเรื่องนี้สอนให้รู้ว่าสุดท้ายแล้วแรงงานต้องมีจิตมุ่งมั่นในการต่อสู้ ไม่ว่าตอนไหนก็ห้าม#nประมาทเป็นอันขาด..."
2002603-71 = "(จากนั้นคุณครูก็ฟังมิโนริเล่านิทานแปลกๆ ต่อกันจนแทบจะหมดแรง...)"

[translation]
83305100200-5 = "รับสายแล้วค่ะ ท่านประธาน!"
83305100200-6 = "อาโกะ ฉันโทรมาเพราะมีเรื่องอยากให้ช่วยหน่อยน่ะ"
83305100200-7 = "เรื่องอยากให้ช่วย... เหรอคะ..."
83305100200-8 = "เรื่องการบรรเลงเปียโนในวันนี้น่ะ พอดีฉันอยากทำให้เต็มที่ที่สุด"
83305100200-9 = "ฉันอยากให้ออกมาอย่างไม่มีที่ติ เพราะงั้น..."
83305100200-10 = "ค่ะ วันนี้ฉันจะขยับงานช่วงเช้าของท่านประธานไปก่อน"
83305100200-11 = "อาโกะ..."
83305100200-12 = "การสนับสนุนในสิ่งที่ท่านประธานฮินะจะทำ"
83305100200-13 = "คือหน้าที่ของอามาอุ อาโกะคนนี้อยู่แล้วค่ะ เพราะงั้น ไม่ต้องห่วงนะคะ"
83305100200-14 = "ขอบใจนะ อาโกะ"
83305100200-15 = "อีกอย่าง... ไม่ได้มีแค่คุณครูที่ตั้งตารอการแสดงของท่านประธานนะคะ ฉันเองก็อยากชมเหมือนกันค่ะ"
83305100200-16 = "อื้ม งั้นเดี๋ยวฉันมานะ"

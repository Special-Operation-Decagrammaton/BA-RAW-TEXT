[translation]
2001415-1 = "กระต่ายกับตำราอาวุธ"
2001415-2 = "(เจอหนังสือที่เขียนชื่อของซากิอยู่บนโต๊ะ)"
2001415-6 = "คุณครู เจอหนังสือรึเปล่า?"
2001415-7 = "ฉันหาทั่วสวนสาธารณะแล้ว แต่หาไม่เจอเลย..."
2001415-8 = "[s] \"หนังสือที่ซากิพูดถึง ใช่เล่มนี้รึเปล่า?\""
2001415-12 = "อื้อ ใช่แล้ว! เล่มนี้ล่ะ!"
2001415-13 = "ฉันกำลังหาเล่มนั้นแหละ!"
2001415-14 = "[s] \"หนังสือเกี่ยวกับอะไรเหรอ?\""
2001415-15 = "ฮุฮุ ฟังแล้วอย่าตกใจล่ะ"
2001415-16 = "นี่ไม่ใช่หนังสือธรรดาหรอกนะ"
2001415-17 = "เอ้า ดูนี่สิ!"
2001415-22 = "เป็นไง สุดยอดเลยใช่มั้ย?"
2001415-23 = "[ns] \"ดูเหมือนหนังสือทั่วไปเลยนะ...?\""
2001415-24 = "อะไรเล่า...! นี่เป็นหนังสือคู่มือที่แจกให้นักเรียนของ SRT เท่านั้นนะ!"
2001415-25 = "เป็นคู่มือเกี่ยวกับกลยุทธ์และข้อมูลพื้นฐานที่จำเป็นสำหรับการใช้ชีวิตใน SRT น่ะ"
2001415-26 = "ไม่ใช่ของที่จะให้ใครอ่านได้ทั่วไปหรอกนะ แต่ถ้าเป็นคุณครูละก็คงไม่เป็นไร!"
2001415-27 = "[s] \"มีจดโน้ตไว้เยอะแยะเลยแฮะ...\""
2001415-28 = "อ๋อ ฉันไม่อยากรอจนเปิดเทอมก็เลยอ่านล่วงหน้าไว้เป็นสิบรอบเลยละ"
2001415-29 = "จุดสำคัญที่สุดคือจะต้องไม่ลืมเรื่องพื้นฐาน เพราะงั้นฉันเลยหยิบขึ้นมาอ่านทุกครั้งที่มีเวลาเลยละ"
2001415-30 = "[s] \"มีเขียนว่า 'จะต้องก้าวไปพร้อมๆ กันในโรงเรียน' ด้วยแฮะ\""
2001415-31 = "อ๋อ นั่นเป็นข้อปฏิบัติที่ต้องทำตามภายใน SRT น่ะ"
2001415-32 = "ถ้าเดินไปคนละทิศคนละทาง ก้าวคนละขา คงวุ่นวายกันแน่ เพราะงั้นเราเลยต้องก้าวเดินไปให้พร้อมๆ กัน"
2001415-33 = "ตอนที่ยังไม่ชิน มันลำบากมากเลยละ"
2001415-34 = "[s] \"เคยมีตอนที่ก้าวไม่พร้อมกันบ้างมั้ย?\""
2001415-35 = "น่าจะเป็นตอนที่พวกเราข้ามสะพานละมั้ง"
2001415-36 = "[s] \"พอคิดดูแล้วก็น่าจะเป็นอย่างนั้นนะ\""
2001415-37 = "ฮุฮุ... ถ้าอ่านดีๆ จะมีเขียนอยู่ในหนังสือคู่มือด้วยนะ"
2001415-38 = "ตอนที่เดินข้ามสะพาน ถ้าทุกคนก้าวเดินพร้อมกันก็อาจจะไปตรงกับความถี่ในการสั่นสะเทือนของ#nสะพานได้"
2001415-39 = "ถ้าเป็นแบบนั้นก็อาจทำให้เกิดการสั่นพ้องขึ้นจนทำให้สะพานถล่มได้"
2001415-40 = "เป็นไง? การฝึกของ SRT ไม่มีช่องโหว่เลยใช่มั้ยล่ะ?"
2001415-41 = "[s1] \"สะพานถล่มงั้นเหรอ?!\"\n[s2] \"โอ้ว สุดยอดเลย!\""
2001415-44 = "ใช่มั้ยล่ะ? ถ้าลองอ่านดูจะเจออะไรสนุกๆ เยอะเลย! คุณครูก็ลองอ่านดูสิ!"
2001415-48 = "[ns3] \"หน้าสุดท้ายมีโน้ตเขียนเอาไว้ด้วย...\"\n[ns4] \"อะไรเนี่ย 'ตามหาคุณครูของชาเล่ต์' เหรอ?\""
2001415-51 = "เฮือก?!"
2001415-52 = "(อ๊าก!! ฉันลืมไปแล้วว่าเขียนบันทึกไว้ในหน้าหนังสือคู่มือ!!)"
2001415-53 = "[s] \"มีเขียนว่า 'พวกผู้ใหญ่ไว้ใจไม่ได้' ด้วย\""
2001415-54 = "คะ... คำพูดนั้นก็ไม่ใช่เรื่องที่ผิดไม่ใช่รึไง?! ตอนนั้นมันก็เข้าใจได้นี่นา!"
2001415-55 = "แล้วทำไมถึงอ่านซ้ำอยู่แบบนั้นเล่า!"
2001415-56 = "[s] \"แล้วก็ 'ถึงจะแกล้งทำเป็นใจดี แต่ต้องมีแผนอะไรในใจแน่ๆ' ด้วย\""
2001415-57 = "อ้ากกก!! เอาคืนมาเลย!! เอาคืนมานะ!!"
2001415-58 = "[ns] \"อ๊ะ เขียนว่า 'แต่ว่า... อาจเป็นคนดีจริงๆ ก็ได้' ด้วย''"
2001415-59 = "ห้ามอ่านนะ!!!"
2001415-63 = "(พอรู้สึกตัวอีกที ซากิก็ออกไปพร้อมกับหนังสือคู่มือแล้ว)"
2001415-64 = "(ตอนที่คุณครูหมดสติ ซากิเขียนคำว่า 'บ้า' ไว้ที่หน้าคุณครู และคุณครูต้องพยายามอย่างหนัก#nในการลบคำคำนั้นออก)"

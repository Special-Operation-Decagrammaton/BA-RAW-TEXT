[translation]
2001415-1 = "兔子與軍事書"
2001415-2 = "（桌上有一本寫著咲希名字的書）"
2001415-6 = "老師，有找到書嗎？"
2001415-7 = "公園那邊我已經找過了，可是沒有看到……"
2001415-8 = "[s]「咲希說的書，是這本嗎？」"
2001415-12 = "嗯！沒錯！就是它！"
2001415-13 = "我一直在找這本書！"
2001415-14 = "[s]「這是什麼書？」"
2001415-15 = "呵呵，聽了可別嚇到哦？"
2001415-16 = "這可不是什麼普通的書。"
2001415-17 = "來，你看！"
2001415-22 = "怎麼樣，厲害吧？"
2001415-23 = "[ns]「看起來只是本普通的書啊……？」"
2001415-24 = "什麼……！這是學校發給SRT學生的教戰手冊耶！"
2001415-25 = "內容是SRT必備的基本知識和戰術基礎……"
2001415-26 = "本來不是什麼人都能看的，這次是破例讓老師你看哦。"
2001415-27 = "[s]「裡面有很多便條紙和筆記呢……」"
2001415-28 = "那些是我實在等不及開學，提前預習了十次的結果。"
2001415-29 = "我覺得牢記基礎是最重要的，所以有空的時候就會拿出來看。"
2001415-30 = "[s]「裡面寫著『在校內必須保持齊步走』呢。」"
2001415-31 = "是啊，那是在SRT內必須遵守的禮儀。"
2001415-32 = "如果大家都慢吞吞地各走各的就會一起挨罵，所以我直到現在都還是習慣齊步走。"
2001415-33 = "畢竟還沒養成習慣的時候，可是被罵得很慘──"
2001415-34 = "[s]「可是你上次好像沒有保持齊步走吧？」"
2001415-35 = "是說一起過橋的時候嗎？"
2001415-36 = "[s]「聽你這麼一說突然想到。」"
2001415-37 = "呵呵……其實這點在教戰手冊裡也有提到哦！"
2001415-38 = "如果在過橋的時候齊步走的話，可能會和橋樑本身的振動發生共振──"
2001415-39 = "嚴重的話甚至可能把橋震垮，所以必須各走各的才行。"
2001415-40 = "怎麼樣？SRT的教育無懈可擊吧？"
2001415-41 = "[s1]「橋會被震垮！？」\n[s2]「哦哦，好厲害！」"
2001415-44 = "對吧對吧？後面還有很多很有趣的部分哦！#n老師也讀讀看吧！"
2001415-48 = "[ns3]「最後還有備忘錄……」\n[ns4]「這是……『夏萊的老師來了』？」"
2001415-51 = "什麼！？"
2001415-52 = "（糟糕！！我忘記教戰手冊的角落有之前的塗鴉日記了！！）"
2001415-53 = "[s]「『大人都不能相信』。」"
2001415-54 = "這，這麼說也沒錯吧！？#n當時會那樣寫是有原因的！"
2001415-55 = "還有不要讀那麼仔細好不好！"
2001415-56 = "[s]「『就會裝好人，肯定有什麼企圖』。」"
2001415-57 = "停下來！！還給我！！快交出來！！"
2001415-58 = "[ns]「『但是……說不定真的是好人』。」"
2001415-59 = "別再念了！！！"
2001415-63 = "（等回過神來的時候，咲希已經帶著教戰手冊離開了）"
2001415-64 = "（臉上在昏倒期間被咲希寫了『笨蛋！』兩個字，後來費了好一番功夫才擦掉）"

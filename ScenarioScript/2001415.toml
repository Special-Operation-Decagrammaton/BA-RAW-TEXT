[translation]
2001415-1 = "The Rabbit and the Military Manual"
2001415-2 = "The book with Saki's name on it was on the table."
2001415-6 = "Sensei, have you found it?"
2001415-7 = "I tried looking around the park, and it wasn't there..."
2001415-8 = "[s] \"Is this the one you're looking for?\""
2001415-12 = "Yes! That's it!"
2001415-13 = "That's the one!"
2001415-14 = "[s] \"What kind of book is it?\""
2001415-15 = "Well, you might be surprised..."
2001415-16 = "It's not just any ordinary book."
2001415-17 = "Here, look!"
2001415-22 = "Incredible, right?"
2001415-23 = "[ns] \"...How's it not ordinary again?\""
2001415-24 = "What the...?! This is a manual for SRT students!"
2001415-25 = "It has all the basics and the fundamental tactics for living in SRT."
2001415-26 = "Most people don't get to see it, but you're allowed to, Sensei!"
2001415-27 = "[s] \"It's got lots of sticky notes and writing in the margins...\""
2001415-28 = "Well, I couldn't wait for the semester to start, so I read the whole thing. Ten times so far."
2001415-29 = "I wanted to make sure I understood the fundamentals."
2001415-30 = "[s] \"Why's it say, 'Always walk in step with others in campus'?\""
2001415-31 = "Ah. That's SRT etiquette."
2001415-32 = "They frown on walking at your own pace. We all try to stay in step there."
2001415-33 = "I got scolded a lot about that, back before I got used to it."
2001415-34 = "[s] \"I've seen you walk out of step sometimes, though.\""
2001415-35 = "Like back when we were walking on the bridge, right?"
2001415-36 = "[s] \"...Right, I think that was it.\""
2001415-37 = "Fufu... The manual talks about that too!"
2001415-38 = "See, on a bridge, too many people walking in step might trigger the bridge's resonant frequency."
2001415-39 = "That could make the bridge collapse, so we change up the pace when we're crossing one."
2001415-40 = "SRT's rules and regs cover everything, don't they?"
2001415-41 = "[s1] \"Wait, 'make the bridge collapse'?!\"\n[s2] \"Ooh, amazing!\""
2001415-44 = "Right? Right? There's a looot of interesting stuff like that in here. You should read it, Sensei!"
2001415-48 = "[ns3] \"There's a page with notes at the end...\"\n[ns4] \"What's this about? 'Someone called Schale's Sensei visited.'\""
2001415-51 = "Eh?!"
2001415-52 = "(Ah!! I forgot I used that page for my diary!!)"
2001415-53 = "[s] \"'I never trust adults.'\""
2001415-54 = "W-Well, you CAN'T really, right? Not most adults. It made sense back then!"
2001415-55 = "Anyway, why are you still reading that?!"
2001415-56 = "[s] \"'This one acts nice, but I'm sure they've got some other agenda.'\""
2001415-57 = "Eeek!! Give it back!! Gimme!!"
2001415-58 = "[ns] \"'Well, I guess they MIGHT actually be nice.'\""
2001415-59 = "Stop reading that!!"
2001415-63 = "By the time I came back to my senses, Saki had taken the manual and left."
2001415-64 = "She'd written \"Idiot!\" on my face while I was unconscious. It was hard to wash off."

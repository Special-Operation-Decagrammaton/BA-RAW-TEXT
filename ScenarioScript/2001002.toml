2001002-37 = "#wait;1800"
2001002-38 = "3;노도카 온천ND;01\n#3;a\n#wait;1300"
2001002-39 = "3;노도카 온천ND;03;오래 기다리셨습니다, 선생님. 말씀드렸던 가이세키 정식이 준비되었습니다.\n#3;em;[반응]"
2001002-40 = "3;노도카 온천ND;01;우선은 입맛을 돋우실 수 있도록 전채요리부터 드리겠습니다."
2001002-41 = "3;노도카 온천ND;99;첫 번째 요리는 값비싼 명란젓이 들어간……"
2001002-42 = "3;노도카 온천ND;03;……<운메에봉>입니다!\n#3;greeting\n#3;em;[반짝]"
2001002-43 = "[s] \"……운메에봉?\""
2001002-44 = "3;노도카 온천ND;01;네. 이 운메에봉, 구교사에서는 정말 구하기 어려운 고급 과자거든요!"
2001002-45 = "3;노도카 온천ND;99;짭짤한 맛의 운메에봉을 먹고 있노라면 어쩐지 배가 불러오기는커녕 더 고파지는 느낌이 들어서…… 전부터 전채요리로 잘 어울리는 음식이라고 생각했어요."
2001002-46 = "3;노도카 온천ND;03;자, 선생님. 봉이 눅눅해지기 전에 어서 드세요!\n#3;em;[음표]\n#3;hophop"
2001002-47 = "#st;[0,0];instant;1;"
2001002-48 = "#clearST"
2001002-49 = "#wait;1000"
2001002-50 = "#wait;1500"
2001002-51 = "3;노도카 온천ND;02;어떻게, 입맛이 도는 느낌이 드시나요?"
2001002-52 = "[s5] \"일단은 운메에봉이니까…….\"\n[s6] \"맛은 괜찮아.\""
2001002-53 = "3;노도카 온천ND;99;후후, 입에 맞으시는 것 같아 다행이네요."
2001002-54 = "3;노도카 온천ND;99;후후, 입에 맞으시는 것 같아 다행이네요."
2001002-55 = "3;노도카 온천ND;01;그럼 이어서 다음 메뉴를 가져오겠습니다.\n#3;em;[반응]"

[translation]
2001002-1 = "Hot Springs Training: Kaiseki"
2001002-2 = "Schale Residence Hall"
2001002-3 = "When I returned to the residence hall, Nodoka was waiting for me dressed as a hot spring resort hostess."
2001002-4 = "Welcome, Sensei. I've been waiting for you."
2001002-5 = "Good work today."
2001002-11 = "Here, let me take your outerwear. I'll hang it in the closet so it doesn't get wrinkled."
2001002-12 = "[s] \"...What are you doing?\""
2001002-13 = "I told you earlier on MomoTalk, didn't I? I'm undergoing hot springs training."
2001002-14 = "While Hot Springs Resort No. 227 is being restored, I'll master the skills I need as a hot springs resort hostess so that next time, I can run the perfect hot springs resort!"
2001002-15 = "However, even though I want to train, there aren't any other suitable hot springs at the Red Winter Academy, and I can't go to Gehenna Academy either..."
2001002-16 = "So instead, I decided to do my hot springs training at the Schale Residence Hall!"
2001002-17 = "[s1] \"This isn't a 'so instead' kind of issue.\"\n[s2] \"Why do you want to train at Schale?\""
2001002-18 = "The Schale Residence Hall not only has beds but also cooking facilities and baths!"
2001002-19 = "The Schale Residence Hall not only has beds but also cooking facilities and baths!"
2001002-20 = "It's the perfect place for my hot springs training arc!"
2001002-21 = "Plus, it's a great excuse to get a closer look at Sensei's more vulnerable side...*pant* *pant*"
2001002-22 = "Ah! P-Pretend I didn't say that!"
2001002-23 = "A-Anyway, have you had dinner yet? "
2001002-24 = "If it's okay with you, I'll make us dinner tonight as part of my hot springs training!"
2001002-25 = "The dish I am preparing today is..."
2001002-26 = "A kaiseki meal that can only be enjoyed at upscale ryokans!"
2001002-27 = "[s3] \"A kaiseki meal?!\"\n[s4] \"Are you okay making something that expensive?\""
2001002-28 = "I'm fine. I've been saving up for all the ingredients!"
2001002-29 = "I'm fine. I've been saving up for all the ingredients!"
2001002-30 = "You can't skimp out on ingredients if you want to run a fancy hot springs resort!"
2001002-31 = "The meal will be ready soon, so please wait!"
2001002-39 = "Thank you for waiting, Sensei. Your kaiseki meal is ready."
2001002-40 = "We'll begin with an appetizer to prepare your taste buds."
2001002-41 = "Made with expensive tarako, the first dish is..."
2001002-42 = "...a corn stick!"
2001002-43 = "[s] \"...A corn stick?\""
2001002-44 = "Yes! Corn sticks are a high-quality snack that's hard to get at the Former Institute."
2001002-45 = "I don't know why, but snacking on a salty corn sticks always makes me more hungry... So I thought it would be the perfect appetizer!"
2001002-46 = "Come on, Sensei. Hurry up and eat before it gets soggy!"
2001002-51 = "Are your taste buds waking up?"
2001002-52 = "[s5] \"It is a corn stick after all...\"\n[s6] \"It tastes...good.\""
2001002-53 = "Heehee, I'm glad you like it."
2001002-54 = "Heehee, I'm glad you like it."
2001002-55 = "On to the next item on the menu."
2001002-62 = "This time, it's soup!"
2001002-63 = "Since it's cold today, I prepared a clear soup made from thick beef broth."
2001002-64 = "[s] \"It smells and looks pretty good.\""
2001002-65 = "Yes, I used a special secret seasoning to make the soup!"
2001002-66 = "Try it before it gets cold!"
2001002-72 = "[ns7] \"...What is this supposed to taste like?\"\n[ns8] \"It's salty and sweet!\""
2001002-75 = "Oh? Do you not like it?"
2001002-76 = "That's weird. I boiled an expensive corn-potage-flavored corn stick to give it a deeper flavor."
2001002-77 = "Maybe it would have been better to boil the curry-flavored corn stick."
2001002-78 = "[s] \"The flavor isn't the problem here.\""
2001002-79 = "And finally, a dessert to cleanse your palate!"
2001002-82 = "The dish I prepared for dessert is..."
2001002-83 = "A lemon-flavored corn stick!"
2001002-84 = "[s] \"Another corn stick?!\""
2001002-85 = "Yes, I went all out and bought a huge set of corn sticks."
2001002-86 = "You can enjoy 10 flavors of corn sticks in a single set! What a luxurious combination."
2001002-87 = "I did go a little over budget from buying so many expensive snacks, but my hot springs resort guests are worth it!"
2001002-88 = "[s] \"...\""
2001002-91 = "How was it, Sensei? Were you satisfied with the kaiseki meal I served you today?"
2001002-92 = "Heehee, it looks you've been struck speechless by how wonderful it was."
2001002-93 = "Maybe the Hot Springs Resort No. 227 will emerge as a new sanctuary for gourmands!"
2001002-95 = "(Afterward, I took Nodoka downtown and treated her to a real kaiseki meal for dinner.)"
2001002-96 = "(Tasting a real kaiseki meal left Nodoka in a state of shock because she lost her appetite for a while afterward.)"

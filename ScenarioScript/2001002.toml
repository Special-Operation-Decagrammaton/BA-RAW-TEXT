2001002-73 = "#wait;100"
2001002-74 = "#wait;100"
2001002-75 = "3;노도카 온천ND;02;어라? 입맛에 맞지 않으셨나요?\n#3;em;[?]"
2001002-76 = "3;노도카 온천ND;13;이상하네요. 모처럼 비싼 콘포타주 맛 운메에봉을 끓여 감칠맛을 냈는데……."
2001002-77 = "3;노도카 온천ND;17;역시 카레 맛 운메에봉을 끓이는 게 좋았으려나요.\n#3;stiff\n#3;em;[땀]"
2001002-78 = "[s] \"맛의 문제가 아니잖아…….\""
2001002-79 = "3;노도카 온천ND;01;그럼 마지막으로 입가심용 디저트입니다.\n#3;em;[반응]"
2001002-80 = "#st;[0,0];instant;1;"
2001002-81 = "#clearST"
2001002-82 = "3;노도카 온천ND;99;디저트로 준비한 메뉴는……"
2001002-83 = "3;노도카 온천ND;03;레몬 맛 운메에봉입니다!\n#3;greeting\n#3;em;[반짝]\n#fontsize;80"
2001002-84 = "[s] \"또 운메에봉이냐!\""
2001002-85 = "3;노도카 온천ND;01;네, 전에 크게 마음을 먹고 대형 운메에봉 세트를 구입했거든요."
2001002-86 = "3;노도카 온천ND;07;한 세트로 10가지 맛의 운메에봉을 즐길 수 있다니, 이 어찌나 호화로운 조합인지……."
2001002-87 = "3;노도카 온천ND;03;비싼 과자를 잔뜩 사느라 조금 사치를 부리긴 했지만, 온천장을 방문하신 손님을 위해서라면 이 정도의 투자는 아깝지 않아요!\n#3;em;[음표]\n#3;hophop"
2001002-88 = "[s] \"………….\""
2001002-89 = "#all;hide"
2001002-90 = "#wait;500"
2001002-91 = "3;노도카 온천ND;01;어떠셨나요, 선생님. 오늘 대접한 가이세키 요리는 충분히 만족스러우셨나요?\n#3;a\n#3;em;[?]"
2001002-92 = "3;노도카 온천ND;99;후후, 제가 만든 가이세키 정식의 맛에 충격을 받아 아무말도 하시지 못하는 것처럼 보이시네요."
2001002-93 = "3;노도카 온천ND;10;어쩌면 앞으로 온천장 227호가 미식가들의 새로운 성지로 부상할지도……?\n#3;em;[///]\n#3;stiff"
2001002-94 = "#all;hide"
2001002-95 = "#na;(이후, 노도카를 데리고 시내로 나가 진짜 가이세키 요리를 저녁으로 대접해 주었다.)"
2001002-96 = "#na;(진짜 가이세키 요리를 맛본 노도카는 큰 충격을 받았는지, 한동안 입맛을 잃었다고 한다…….)"

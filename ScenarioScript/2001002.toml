[translation]
2001002-1 = "การฝึกดูแลออนเซ็น - ภาคอาหารไคเซกิ"
2001002-2 = "ที่พักชาเล่ต์"
2001002-3 = "(คุณครูกลับมาถึงที่พักหลังจากเสร็จงาน ก็พบกับโนโดกะที่แต่งชุดผู้ดูแลออนเซ็นยืนรออยู่)"
2001002-4 = "เชิญค่ะคุณครู ฉันกำลังรออยู่เลยค่ะ"
2001002-5 = "วันนี้เหนื่อยหน่อยนะคะ"
2001002-11 = "เอาละค่ะ ส่งเสื้อคลุมมาให้ฉันสิคะ ฉันจะเอาไปแขวนไว้ในตู้ไม่ให้เสื้อยับเองค่ะ"
2001002-12 = "[s] \"ทำอะไรอยู่น่ะ?\""
2001002-13 = "ฉันบอกคุณครูไปทาง MOMOTALK แล้วนี่คะ ฉันกำลังฝึกการดูแลออนเซ็นอยู่ค่ะ"
2001002-14 = "ในระหว่างที่กำลังปรับปรุงออนเซ็น No.227 ในฐานะผู้ดูแลออนเซ็น ฉันจะต้องฝึกฝนทักษะ#nของผู้ดูแลให้เพียบพร้อม และฉันจะต้องดูแลออนเซ็นให้สมบูรณ์แบบยิ่งขึ้นในครั้งต่อไปค่ะ!"
2001002-15 = "แต่ว่าถึงฉันจะฝึกฝนการดูแลออนเซ็นไปก็ตาม แต่ที่สหภาพเรดวินเทอร์มันไม่มีออนเซ็นอยู่เลย#nและฉันก็คงไปที่สถาบันเกเฮนน่าไม่ได้ด้วย..."
2001002-16 = "ฉันเลยตัดสินใจฝึกฝนการดูแลออนเซ็นที่ที่พักของชาเล่ต์แทนค่ะ!"
2001002-17 = "[s1] \"มันไม่น่าใช่นะ...\"\n[s2] \"ทำไมถึงมาฝึกที่ชาเล่ต์ล่ะ?\""
2001002-18 = "ก็ที่นี่มีตั้งแต่อุปกรณ์ชุดนอน อุปกรณ์ทำอาหารและห้องอาบน้ำยังไงล่ะคะ"
2001002-19 = "เพราะว่าที่นี่มีตั้งแต่อุปกรณ์ชุดนอน อุปกรณ์ทำอาหารและห้องอาบน้ำยังไงล่ะคะ"
2001002-20 = "เป็นสถานที่ที่เหมาะกับการฝึกเรื่องการดูแลออนเซ็นเลยค่ะ"
2001002-21 = "นอกจากนั้นยังใช้การฝึกเป็นข้ออ้างฉวยโอกาสส่องคุณครูแบบใกล้ชิดได้อีกด้วย... แฮ่ก... แฮ่ก..."
2001002-22 = "อ๊ะ...! ทะ...ที่ฉันพูดไปเมื่อกี้ช่วยทำเป็นไม่ได้ยินด้วยนะคะ!"
2001002-23 = "ว่าแต่ว่าคุณครู... ทานอาหารค่ำมารึยังคะ? "
2001002-24 = "ถ้าคุณครูไม่ว่าอะไร เพื่อเป็นส่วนหนึ่งของการฝึก ฉันจะเตรียมอาหารค่ำให้เองค่ะ!"
2001002-25 = "อาหารที่ฉันจะทำวันนี้..."
2001002-26 = "ก็คือเซ็ตอาหารไคเซกิที่สามารถลิ้มรสได้ที่เรียวกังสุดหรูเท่านั้นค่ะ!"
2001002-27 = "[s3] \"เซ็ตอาหารไคเซกิ...?!\"\n[s4] \"ของแพงเลยนะ ไม่เป็นไรแน่เหรอ?\""
2001002-28 = "ไม่เป็นไรค่ะ ฉันตั้งใจเก็บรวบรวมเงินมาเพื่อเป็นค่าวัตถุดิบของอาหารในวันนี้เลยค่ะ"
2001002-29 = "ไม่เป็นไรค่ะ ฉันตั้งใจเก็บรวบรวมเงินมาเพื่อเป็นค่าวัตถุดิบของอาหารในวันนี้เลยค่ะ"
2001002-30 = "ถ้ามัวแต่ประหยัดค่าวัตถุดิบ ก็จะไม่สามารถบริการออนเซ็นชั้นเลิศได้ค่ะ!"
2001002-31 = "ฉันจะรีบไปเตรียมอาหารนะคะ กรุณารอสักครู่ค่ะ!"
2001002-39 = "ขอโทษที่ทำให้รอนานนะคะคุณครู ชุดอาหารไคเซกิเตรียมพร้อมแล้วค่ะ"
2001002-40 = "ก่อนอื่นต้องเริ่มจากอาหารเรียกน้ำย่อย เพื่อกระตุ้นต่อมรับรสค่ะ"
2001002-41 = "อาหารจานแรกปรุงด้วยวัตถุดิบราคาแพง เมนไทโกะ..."
2001002-42 = "<ขนมข้าวโพดกรอบ> ค่ะ!"
2001002-43 = "[s] \"ขนมข้าวโพดกรอบ...?\""
2001002-44 = "ค่ะ ขนมข้าวโพดกรอบเป็นขนมชั้นสูงที่หาทานได้ยากมากๆ ที่อาคารเรียนเก่าค่ะ!"
2001002-45 = "ถ้าได้ลิ้มรสเค็มพอดีๆ ของขนมข้าวโพดกรอบ จะทำให้รู้สึกหิวมากขึ้น... ดังนั้นฉันเลยคิดว่า#nมันน่าจะเอามาเสิร์ฟเป็นอาหารเรียกน้ำย่อยได้ค่ะ"
2001002-46 = "เอาละค่ะคุณครู รีบทานก่อนที่ขนมจะไม่อร่อยเถอะค่ะ!"
2001002-51 = "เป็นยังไงบ้างคะ รสชาติถูกปากหรือเปล่าคะ?"
2001002-52 = "[s5] \"มันก็คือขนมข้าวโพดกรอบละนะ...\"\n[s6] \"รสชาติก็ใช้ได้อยู่นะ\""
2001002-53 = "ฮิฮิ ค่อยยังชั่วที่ถูกปากคุณครูค่ะ "
2001002-54 = "ฮิฮิ ค่อยยังชั่วที่ถูกปากคุณครูค่ะ "
2001002-55 = "ถ้างั้นฉันจะไปเอาจานต่อไปมาเลยนะคะ"
2001002-62 = "และจานนี้ก็คือซุปค่ะ!"
2001002-63 = "เนื่องจากวันนี้อากาศหนาว ฉันเลยทำน้ำซุปใสจากซุปกระดูกวัวเข้มข้นมาค่ะ"
2001002-64 = "[s] \"กลิ่นกับสีดูน่ากินมากเลยนะ\""
2001002-65 = "ค่ะ ฉันใช้เครื่องปรุงลับสูตรพิเศษในการทำน้ำซุปด้วยค่ะ!"
2001002-66 = "รีบทานก่อนมันจะเย็นเถอะค่ะ"
2001002-72 = "[ns7] \"รสชาตินี่มันอะไรกันเนี่ย...?\"\n[ns8] \"ทั้งเค็มแล้วก็หวานมาก...!\""
2001002-75 = "เอ๊ะ? ไม่ถูกปากคุณครูเหรอคะ?"
2001002-76 = "แปลกจังเลย... ฉันอุตส่าห์ลงทุนซื้อขนมข้าวโพดกรอบราคาแพงมาต้มเพื่อให้ได้รสชาติ#nกลมกล่อมแล้วแท้ๆ..."
2001002-77 = "คิดแล้วเชียว รู้อย่างนี้เอาขนมข้าวโพดกรอบรสแกงกะหรี่มาต้มแทนน่าจะดีกว่า..."
2001002-78 = "[s] \"ครูว่าปัญหามันไม่ได้อยู่ที่รสชาติหรอกนะ...\""
2001002-79 = "ถ้างั้นทานของหวานล้างปากเลยก็แล้วกันนะคะ"
2001002-82 = "เมนูที่ฉันเตรียมไว้สำหรับของหวาน..."
2001002-83 = "ขนมข้าวโพดกรอบรสเลมอนค่ะ!"
2001002-84 = "[s] \"ข้าวโพดกรอบอีกแล้วเรอะ?!\""
2001002-85 = "ค่ะ ก่อนหน้านี้ฉันตัดสินใจซื้อชุดขนมข้าวโพดกรอบเซ็ตใหญ่มาค่ะ"
2001002-86 = "หนึ่งเซ็ตจะมีขนมข้าวโพดกรอบหลากหลายรสชาติให้เลือกทานได้ ช่างเป็นการผสมผสาน#nที่เข้ากันจริงๆ..."
2001002-87 = "การซื้อขนมราคาแพงมามากมายแบบนี้ค่อนข้างสิ้นเปลืองไปสักหน่อย แต่ถ้าเพื่อลูกค้าที่มาใช้#nบริการออนเซ็นแล้วละก็ ถือว่าเป็นการลงทุนที่คุ้มค่ามากค่ะ!"
2001002-88 = "[s] \"......\""
2001002-91 = "เป็นยังไงบ้างคะคุณครู? วันนี้คุณครูพอใจกับเซ็ตอาหารไคเซกิที่เสิร์ฟไหมคะ?"
2001002-92 = "ฮิฮิ สงสัยคุณครูจะตะลึงกับรสชาติของเซ็ตอาหารไคเซกิที่ฉันทำจนพูดไม่ออกเลยสินะคะ"
2001002-93 = "บางทีในอนาคต ออนเซ็น No.227 อาจจะกลายเป็นสถานที่ยอดฮิตสำหรับนักชิมก็ได้นะคะ...?"
2001002-95 = "(จากนั้นคุณครูก็ตัดสินใจพาโนโดกะไปเลี้ยงเซ็ตอาหารไคเซกิที่ร้านอาหารในเมือง)"
2001002-96 = "(โนโดกะที่ได้ลองชิมอาหารไคเซกิที่แท้จริงแล้วก็ช็อกหนักมากจนพูดไม่ออกไปพักใหญ่...)"

[translation]
2001002-1 = "修行．會席料理篇"
2001002-2 = "夏萊．居住區"
2001002-3 = "（結束工作回到夏萊之後，發現和香以溫泉浴場女將的打扮等待著）"
2001002-4 = "歡迎回來。恭候多時了，老師。"
2001002-5 = "今天也辛苦您了。"
2001002-11 = "外衣請交給我吧，我會幫您用衣架掛好，防止衣服變皺的。"
2001002-12 = "[s] 「……和香？」"
2001002-13 = "就像我在MomoTalk中說過的一樣唷，這是溫泉培訓的一環。"
2001002-14 = "為了有朝一日，227號溫泉浴場復活的那一天，#n我必須趁現在學會溫泉浴場的女將需要具備的技能才行！"
2001002-15 = "不過就算想做溫泉培訓，赤冬也沒有其他適合的溫泉。#n話雖如此，去格黑娜學園又有點……"
2001002-16 = "所以就決定在夏萊進行培訓了！"
2001002-17 = "[s1] 「最後一句聽起來特別開心……？」\n[s2] 「為何是在夏萊……？」"
2001002-18 = "因為夏萊的居住區除了有寢具之外，還有廚房和澡堂。"
2001002-19 = "因為夏萊的居住區除了有寢具之外，還有廚房和澡堂。"
2001002-20 = "非常適合進行溫泉浴場女將的培訓！"
2001002-21 = "而且在培訓的空檔，還可以近距離偷窺老師毫無防備的表情和認真的側臉……#n耶嘿，耶嘿嘿嘿……"
2001002-22 = "……啊！剛，剛才說的請您別在意……"
2001002-23 = "話，話說回來，老師？您還沒吃晚餐吧？ "
2001002-24 = "作為培訓的一環，如果您不介意的話今天的晚餐請交給我來準備吧！"
2001002-25 = "今天我準備的料理……"
2001002-26 = "居然是會席料理！"
2001002-27 = "[s3] 「……會席料理！？」\n[s4] 「那不是很貴嗎……？」"
2001002-28 = "請別擔心。#n我為今天省下了很多伙食費，努力存了很多錢哦。"
2001002-29 = "請別擔心。#n我為今天省下了很多伙食費，努力存了很多錢哦。"
2001002-30 = "如果在這種地方小氣的話是無法經營理想中的溫泉浴場的！"
2001002-31 = "我這就去準備，請您稍等！"
2001002-39 = "讓您久等了，老師。"
2001002-40 = "首先是為了增進食慾的前菜。"
2001002-41 = "第一道料理是，使用大量明太子醬的……"
2001002-42 = "……「好粗棒」！"
2001002-43 = "[s] 「……『好粗棒』？」"
2001002-44 = "是的！這是在舊校舍很難取得的高級點心唷！"
2001002-45 = "這個「好粗棒」雖然非常好吃，不過或許是因為它的鹹味，#n別說是填飽肚子了，吃了反而會讓肚子更餓……所以我認為它非常適合作為前菜！"
2001002-46 = "來吧老師，請盡快享用吧！"
2001002-51 = "怎麼樣呢？好吃嗎？"
2001002-52 = "[s5] 「因為是『好粗棒』嘛……」\n[s6] 「和平常一樣好吃呢……」"
2001002-53 = "呵呵，合您的口味真是太好了。"
2001002-54 = "呵呵，合您的口味真是太好了。"
2001002-55 = "那麼接下來是下一道菜。"
2001002-62 = "接下來是椀物！"
2001002-63 = "今天天氣很冷，所以我準備了像法式清湯一樣，用濃郁的高湯做成的湯。"
2001002-64 = "[s] 「以湯來說，看起來挺濁的……？」"
2001002-65 = "因為那是使用獨門秘方所熬成的高湯哦。"
2001002-66 = "來，請在湯涼掉之前享用吧。"
2001002-72 = "[ns7] 「這個味道……？」\n[ns8] 「難道是……」"
2001002-75 = "哎呀，不合您的口味嗎？"
2001002-76 = "真奇怪，我明明使用玉米濃湯口味的「好粗棒」煮出濃郁的鮮味了才對……"
2001002-77 = "果然還是要用咖哩口味的「好粗棒」嗎……？"
2001002-78 = "[s] 「問題不在於口味吧……怎麼又是『好粗棒』……？」"
2001002-79 = "那麼最後是清除口中味道的水菓子。"
2001002-82 = "我準備的甜點是……"
2001002-83 = "檸檬口味的「好粗棒」！"
2001002-84 = "[s] 「又是『好粗棒』？不應該是水菓子嗎！？」"
2001002-85 = "其實，之前我狠下心買了大量的好粗棒套組。"
2001002-86 = "是能一次享受10種口味的好粗棒的，非常豪華的組合……！"
2001002-87 = "雖然有點奢侈，但如果是為了溫泉浴場的客人的話，這點程度的投資一點也不可惜！"
2001002-88 = "[s] （好粗棒沒有錯，不是好粗棒的錯……）"
2001002-91 = "怎麼樣呢，老師？我準備的會席料理有讓您滿意嗎？"
2001002-92 = "呵呵。看來老師覺得好吃到連話都說不出來了呢。"
2001002-93 = "說不定之後復活的溫泉浴場227號會變成眾所皆知的，美食家們的新聖地……？"
2001002-95 = "（當天晚上，帶和香去市區吃了真正的會席料理）"
2001002-96 = "（和香品嘗過真正的會席料理後深受打擊，似乎好一段時間都沒有胃口……）"

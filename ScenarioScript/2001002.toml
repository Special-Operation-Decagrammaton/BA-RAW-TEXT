2001002-62 = "3;노도카 온천ND;03;이번에는 장국입니다!\n#3;em;[반짝]\n#3;closeup"
2001002-63 = "3;노도카 온천ND;01;오늘은 날이 추웠기 때문에 콩소메 수프처럼 진한 소고기 육수로 만든 장국을 준비했습니다.\n#3;closeup"
2001002-64 = "[s] \"향과 모양은 꽤 그럴싸하네.\""
2001002-65 = "3;노도카 온천ND;03;네, 국물을 내는 데 특제 비법 양념을 썼거든요!\n#3;em;[반응]\n#3;closeup"
2001002-66 = "3;노도카 온천ND;01;식기 전에 국물부터 드셔보세요.\n#3;closeup"
2001002-67 = "#st;[0,0];instant;1;"
2001002-68 = "#clearST"

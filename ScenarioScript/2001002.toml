[translation]
2001002-1 = "#Title;온천 수행 - 가이세키 요리 편"
2001002-2 = "#Place;샬레 생활관"
2001002-3 = "#na;(업무를 마치고 생활관으로 돌아오니, 노도카가 온천장의 여주인 차림으로 기다리고 있었다.)"
2001002-4 = "3;노도카 온천ND;08;어서 오세요, 선생님. 기다리고 있었습니다.\n#3;a\n#3;em;[반짝]\n#3;greeting"
2001002-5 = "3;노도카 온천ND;01;오늘도 수고가 많으셨습니다."
2001002-6 = "#st;[0,0];instant;1;"
2001002-7 = "#clearST"
2001002-8 = "3;노도카 온천ND;01\n#3;d\n#wait;1000"
2001002-9 = "3;노도카 온천ND;01\n#3;a\n#3;closeup\n#wait;1000"
2001002-10 = "#wait;1000"
2001002-11 = "3;노도카 온천ND;03;자, 겉옷은 이리 주세요. 구겨지지 않게 옷장에 걸어두겠습니다.\n#3;em;[반응]\n#3;closeup"
2001002-12 = "[s] \"……무얼 하고 있는 거야?\""
2001002-13 = "3;노도카 온천ND;02;전에 모모톡으로 말씀드렸잖아요? 지금의 저는 온천 수행 중이라고.\n#3;em;[?]\n#3;closeup"
2001002-14 = "3;노도카 온천ND;01;온천장 227호를 복구하는 동안 온천장 여주인으로서 갖추어야 할 스킬을 완벽히 몸에 익혀, 다음번에는 더욱 완벽하게 온천을 운영하려고요!\n#3;closeup"
2001002-15 = "3;노도카 온천ND;99;하지만 온천 수행을 하려고 해도 붉은겨울 학원에는 마땅한 다른 온천이 없고, 그렇다고 게헨나 학원에 갈 수도 없는 노릇이라…….\n#3;closeup"
2001002-16 = "3;노도카 온천ND;03;그래서 대신 샬레의 생활관에서 온천 수행을 하기로 했답니다!\n#3;em;[음표]\n#3;hophop\n#3;closeup"
2001002-17 = "[s1] \"'그래서'가 아니잖아.\"\n[s2] \"어째서 샬레에서 수행하려는 거야?\""
2001002-18 = "3;노도카 온천ND;01;샬레의 생활관에는 침구는 물론이고, 조리 시설과 목욕탕도 있으니까요.\n#3;em;[반응]"
2001002-19 = "3;노도카 온천ND;01;샬레의 생활관에는 침구는 물론이고, 조리 시설과 목욕탕도 있으니까요.\n#3;em;[반응]"
2001002-20 = "3;노도카 온천ND;07;온천 수행을 하기에 안성맞춤의 장소이지요!"
2001002-21 = "3;노도카 온천ND;10;거기에 겸사겸사 수행을 핑계로 선생님의 무방비한 옆모습을 더 가까이에서 훔쳐볼 수 있으니…… 하아, 하아……\n#3;stiff\n#3;em;[///]"
2001002-22 = "3;노도카 온천ND;04;앗……! 바, 방금 그 이야기는 못 들은 걸로 해주세요!"
2001002-23 = "3;노도카 온천ND;02;그, 그나저나 선생님. 저녁 식사는 아직이시죠? \n#3;em;[?]"
2001002-24 = "3;노도카 온천ND;01;괜찮으시다면 온천 수행의 일환으로 오늘 저녁은 제가 준비할게요!"
2001002-25 = "3;노도카 온천ND;99;오늘 제가 준비한 요리는……"
2001002-26 = "3;노도카 온천ND;03;고급 료칸에서만 맛볼 수 있다는 가이세키 정식입니다!\n#3;em;[반짝]\n#3;greeting"
2001002-27 = "[s3] \"……가이세키 정식?!\"\n[s4] \"비싼 음식인데 괜찮겠어?\""
2001002-28 = "3;노도카 온천ND;01;괜찮아요. 오늘을 위해 식재료 값을 열심히 저축해 두었거든요.\n#3;em;[반응]"
2001002-29 = "3;노도카 온천ND;01;괜찮아요. 오늘을 위해 식재료 값을 열심히 저축해 두었거든요.\n#3;em;[반응]"
2001002-30 = "3;노도카 온천ND;07;식재료에 돈을 아껴서는 최고의 온천장을 운영할 수 없으니까요!"
2001002-31 = "3;노도카 온천ND;03;곧 요리를 준비해 올 테니, 잠시만 기다려주세요!\n#3;hophop\n#3;em;[음표]"

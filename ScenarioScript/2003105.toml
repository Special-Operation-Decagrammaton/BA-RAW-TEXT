[translation]
2003105-1 = "溫暖地"
2003105-2 = "（因為好奇時雨所說的牛奶吧檯而來到了他工作的溫泉浴場）"
2003105-8 = "啊，老師，歡迎光臨。"
2003105-9 = "我正打算開始吧檯的營業呢。"
2003105-10 = "第一個客人進去泡澡後過了約1個小時，應該差不多會有客人來買水果牛奶了。"
2003105-11 = "[s]「牛奶吧檯……具體來說該怎麼做呢？」"
2003105-12 = "就是字面上的意思，老師。"
2003105-13 = "如果有泡完澡的客人上門就根據客人的喜好，當場調配出最美味的水果牛奶。"
2003105-14 = "因為這種做法相對麻煩，一開始這間溫泉浴場也有點為難……"
2003105-15 = "但我說「不需要付薪水，只要讓我隨意製作飲料就行」，#n所以他們就允許我實驗幾天。"
2003105-16 = "我可以嘗試新的配方，客人也能喝到最好喝的水果牛奶……簡直是雙贏對吧？"
2003105-17 = "[s1]「時雨開心的話倒無所謂……」\n[s2]「我擔心你會不會加奇怪的材料……」"
2003105-20 = "呵呵，如果那麼擔心的話，就在那邊看我工作吧。"
2003105-21 = "牛奶準備完畢，調飲杯和攪拌棒也準備就緒……"
2003105-26 = "好，那麼……是時候混合牛奶、更換洗澡水了。"
2003105-33 = "呼……好棒的溫泉……"
2003105-34 = "但是泡久了好像有點口渴……"
2003105-35 = "不好意思，請問有水果牛奶嗎？"
2003105-36 = "嗯，有哦。想喝什麼口味的呢？"
2003105-37 = "有，有很多口味嗎？#n突然被這麼一問，有點傷腦筋耶……"
2003105-38 = "這個嘛……麻煩給我不會太甜的口味。"
2003105-39 = "不會太甜的口味啊……知道了。"
2003105-49 = "來，這是混合三種莓果的三合一莓果牛奶。"
2003105-50 = "我加入了甜味不強的越橘和蔓越莓，然後再用樹莓增添口感。試喝看看吧。"
2003105-51 = "我喝喝看……"
2003105-57 = "甜味恰到好處呢。#n莓果的酸味和牛奶的香醇融合在一起，味道不會過於刺激……"
2003105-58 = "我第一次喝到風味這麼高級的水果牛奶！"
2003105-59 = "呵呵，你能喜歡真是太好了。"
2003105-67 = "那個，我腸胃不好，喝牛奶老是會拉肚子……"
2003105-68 = "請問有我能喝的水果牛奶嗎？"
2003105-69 = "當然，請稍等。"
2003105-80 = "來，這是用豆奶代替牛奶製成的熱帶豆奶。"
2003105-81 = "還加入了有助於消化的熱帶水果增添柔和風味。"
2003105-87 = "真的耶……油脂的味道變少了，這樣感覺要喝多少都沒問題！"
2003105-88 = "真沒想到腸胃不好的我也能在泡完溫泉後喝到水果牛奶，簡直像在做夢一樣……！"
2003105-89 = "不管飲料有多好喝，喝太多還是會喝壞肚子的哦。#n今天就喝這杯忍耐一下吧。"
2003105-97 = "好累……可能是因為風紀委員會的工作太忙，泡完溫泉還是一樣累……"
2003105-98 = "可以給我一點喝的嗎？"
2003105-99 = "嗯，感到疲勞的話……"
2003105-106 = "來，這是妖怪MAX水果風味。"
2003105-110 = "[ns]「這已經不是水果牛奶了吧……？」"
2003105-111 = "優秀的酒保就該配合客人的情況，提供任何種類的飲料。"
2003105-112 = "如果想在短時間內消除疲勞，比起水果牛奶，能量飲料更有效！"
2003105-118 = "雖然和預期不太一樣……但喝了之後好像稍微有點力氣了。"
2003105-119 = "這是現在的我最需要的。謝謝你的用心良苦。"
2003105-120 = "不敢當。"
2003105-122 = "（時雨的水果牛奶吧檯大受好評，#n　大量的客人為了點各種水果牛奶而不斷來到休息室）"
2003105-123 = "（為了看時雨調製牛奶而一直待在溫泉浴場，不知不覺時間就過去了……）"
2003105-126 = "[ns]「哎呀，糟糕……」"
2003105-128 = "怎麼了，老師？"
2003105-129 = "……嗯？你說為了看我工作的樣子而錯過了回夏萊的末班車？"
2003105-130 = "沒什麼好傷腦筋的吧？#n這裡可是溫泉浴場唷。"
2003105-131 = "空房還有很多，住一晚再回去就──"
2003105-135 = "那個……不好意思，時雨同學。#n今天已經沒有空房了。"
2003105-136 = "今天喝過水果牛奶的客人都說明天也想喝，所以延長了住宿時間……"
2003105-137 = "糟糕……一不小心就努力過頭了。"
2003105-141 = "怎麼辦，老師？#n好像沒有其他能住的客房了。"
2003105-142 = "今天天氣這麼冷，總不能讓老師睡在外面……"
2003105-147 = "啊，那到我房裡睡怎麼樣？"
2003105-148 = "[s]「時雨的房間……？」"
2003105-149 = "嗯，這裡有提供宿舍給在溫泉浴場工作的員工。"
2003105-150 = "雖然可能有點小，但應該比縮著身體睡在外面來的好。"
2003105-151 = "[s3]「好像也沒有其他辦法了……」\n[s4]「那我就打擾一晚了。」"
2003105-154 = "呵呵，稍等一下哦。#n我收拾完就帶你回房間。"
2003105-157 = "呵呵，雖然小歸小，不過比想像中舒適吧？"
2003105-158 = "棉被已經先鋪好了，老師可以睡這邊唷。"
2003105-161 = "[ns5]「那個……時雨同學？」\n[ns6]「這裡只有一條棉被耶……」"
2003105-164 = "嗯？那不是當然的嗎？#n因為這間寢室本來就是準備給一個人用的。"
2003105-165 = "雖然棉被有點小，但只要緊緊貼在一起，兩個人蓋一條還是沒問題的……"
2003105-168 = "……所以現在，老師只有一個選擇唷？"
2003105-173 = "― [log=시구레 온천ND]來，老師。[/log][wa:860] "
2003105-174 = "― [log=시구레 온천ND]棉被外面很冷對吧？[/log][wa:1700] "
2003105-177 = "― [log=시구레 온천ND]別固執了，過來這邊吧。[/log][wa:1440] "
2003105-180 = "― [log=시구레 온천ND]棉被軟綿綿的，還很溫暖唷？[/log][wa:2760] "
2003105-183 = "― [log=시구레 온천ND]我想在這裡很快就能睡著。[/log][wa:810] "
2003105-186 = "― [log=시구레 온천ND]如果，只蓋棉被還是會冷…… [/log][wa:2850] "
2003105-189 = "― [log=시구레 온천ND]我可以當你的熱水袋唷。[/log][wa:1220] "
2003105-192 = "― [log=시구레 온천ND]咦？原本的熱水袋……？[/log][wa:2230] "
2003105-195 = "― [log=시구레 온천ND]那個……裡面，都被我喝光了。[/log][wa:3590] "
2003105-198 = "― [log=시구레 온천ND]因為，棉被裡……[/log][wa:1980] "
2003105-199 = "― [log=시구레 온천ND]正好是適合加熱漿果汁的溫度……[/log][wa:2880] "
2003105-202 = "― [log=시구레 온천ND]剛才工作的時候，[/log][wa:140] "
2003105-203 = "― [log=시구레 온천ND]就把熱水袋裡面換成特製漿果汁了。[/log][wa:3700] "
2003105-206 = "― [log=시구레 온천ND]不過……這也沒辦法吧？[/log][wa:1120] "
2003105-209 = "― [log=시구레 온천ND]既然事已至此，[/log]"
2003105-210 = "― [log=시구레 온천ND]又沒有其他能讓身體暖和的方法……[/log][wa:3460] "
2003105-213 = "― [log=시구레 온천ND]所以今晚，[/log]"
2003105-214 = "― [log=시구레 온천ND]老師就當我的熱水袋吧。[/log][wa:2920] "
2003105-219 = "[ns] 喝掉熱水袋裡的漿果汁"
2003105-222 = "……咦？老師在做什麼？"
2003105-223 = "突然把漿果汁喝掉……難道是口渴了嗎？"
2003105-224 = "[s7]「……這個漿果汁好像發酵了。」\n[s8]「有股淡淡的酒味。」"
2003105-227 = "什麼？應該不太可能吧。"
2003105-228 = "這份漿果汁裡沒有加發酵所需的酵母和糖哦。"
2003105-229 = "而且才泡一天就產出酒精什麼的……"
2003105-230 = "[s9]「不，我的身體在發熱，我很確定……」\n[s10]「這飲料一定是酒！」"
2003105-236 = "[ns11]「可能是酒讓身體熱了起來，好像不需要蓋棉被了。」\n[ns12]「棉被就讓時雨一個人蓋吧。」"
2003105-239 = "哦～想這樣溜走啊……"
2003105-240 = "好吧，我知道了。#n既然老師說熱，我也不能硬把老師拉到棉被裡。"
2003105-241 = "不過，我整晚都會在棉被裡空出老師的位置……#n如果覺得冷的話隨時都可以進來，知道嗎？"
2003105-243 = "（之後，在冰冷的榻榻米上縮著身體勉強度過一夜……）"
2003105-244 = "（雖然很慶幸什麼事都沒發生，#n　但可能是在很冷的地方睡覺的關係，之後得了輕微的感冒）"

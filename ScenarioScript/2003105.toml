[translation]
2003105-1 = "Warmly"
2003105-2 = "I was curious about the milk bartending that Shigure mentioned, so I headed to the hot spring she worked at."
2003105-8 = "Hey there, Sensei."
2003105-9 = "I was just about to start work."
2003105-10 = "It's been about an hour since the first person went into the bath, so I should have some customers soon."
2003105-11 = "[s] \"So... What exactly does milk bartending entail?\""
2003105-12 = "Exactly what it sounds like, Sensei."
2003105-13 = "After their bath, a customer comes to me and tells me what they like. Then I blend a fresh glass of fruit milk that's perfect for them."
2003105-14 = "The owner of the hot spring wasn't so sure about the idea at first..."
2003105-15 = "But I told them that I don't need to get paid as long as I can make the drink as I please, so they agreed to try it out."
2003105-16 = "I can test out all the recipes I want, and the customers get to enjoy the best fruit milk they ever had... It's a win-win."
2003105-17 = "[s1] \"As long as you're happy with that, Shigure...\"\n[s2] \"Just don't put anything weird in the milk...\""
2003105-20 = "Heehee. Why don't you sit over there and watch me work?"
2003105-21 = "I've got fresh milk, my mixing glasses, my muddler..."
2003105-26 = "Now then... I'd better mix the milk and change the bathwater."
2003105-33 = "Whew... What a fine bath..."
2003105-34 = "But soaking in that hot water for so long has made me terribly thirsty..."
2003105-35 = "Excuse me. Do you have any fruit milk?"
2003105-36 = "Yes, we do! What flavor would you like?"
2003105-37 = "Y-You have more than one? I don't know what to say to that..."
2003105-38 = "I don't know. Nothing too sweet."
2003105-39 = "Not too sweet...? Leave it to me."
2003105-49 = "Here you go. One triple berry milk."
2003105-50 = "It has blended lingonberry and cranberry, which aren't very sweet at all, and added raspberry for flavor. Give it a try."
2003105-51 = "Let's see..."
2003105-57 = "It really isn't too sweet. And the milk balances the sourness of the berries so it isn't overwhelming..."
2003105-58 = "I've never had fruit milk with such luxurious flavor before!"
2003105-59 = "Heehee, I'm glad you like it."
2003105-67 = "Excuse me, but I happen to be lactose intolerant. Milk gives me the most dreadful tummy aches..."
2003105-68 = "But I would still love to try one of your fruit milks, if you please."
2003105-69 = "Of course. Just a moment."
2003105-80 = "Here you go. This is a tropical soy milk—and it's completely lactose free!"
2003105-81 = "The tropical fruits should help with your digestion."
2003105-87 = "You're right... It's got this light, clean flavor. I could drink cups and cups of this!"
2003105-88 = "Look at me, enjoying a nice fruit milk after a hot bath like everyone else... It's a dream come true!"
2003105-89 = "I'm glad it tastes good, but if you have too much, you'll still have an upset stomach. Why don't we keep it to one glass for today?"
2003105-97 = "So tired... Even after a hot bath, I'm beat... The Prefect Team sure does demand a lot..."
2003105-98 = "What would you recommend to drink?"
2003105-99 = "Hmm, if you're that fatigued..."
2003105-106 = "Here you go. One fruit-flavored Frenzy Max."
2003105-110 = "[ns] \"Does that count as fruit milk...?\""
2003105-111 = "A good bartender provides whatever drink best fits the customer's needs."
2003105-112 = "In the short term, at least, an energy drink is more effective than fruit milk when you're exhausted!"
2003105-118 = "This isn't what I expected...but I do feel myself perking up."
2003105-119 = "Thanks for looking out. That was just what I needed!"
2003105-120 = "It was nothing."
2003105-122 = "Shigure's bartending was a huge success. As the day went on, more and more customers filled the break room looking for custom-mixed fruit milks."
2003105-123 = "I lost track of time, entranced as I was by Shigure's bartending..."
2003105-126 = "[ns] \"Oh, this isn't good...\""
2003105-128 = "What is it, Sensei?"
2003105-129 = "...Huh? You were so mesmerized by my bartending that you missed the last train to Schale?"
2003105-130 = "What's the problem? You're at a hot spring."
2003105-131 = "I'm sure they'll let you use a room here, so stay the night and—"
2003105-135 = "About that... Sorry, Shigure. We don't have any more rooms available today."
2003105-136 = "Everybody you served decided to extend their stays here so they could have more of your fruit milk tomorrow..."
2003105-137 = "Oh no... I guess I overdid it."
2003105-141 = "What are we going to do, Sensei? They don't have any open rooms."
2003105-142 = "You can't sleep outside. You'll freeze to death..."
2003105-147 = "Oh! Why don't you stay in my room?"
2003105-148 = "[s] \"Your room...?\""
2003105-149 = "Yeah. They have separate rooms for hot spring employees."
2003105-150 = "It's a bit cramped, but it beats spending a night out in the cold."
2003105-151 = "[s3] \"It looks like I have no choice...\"\n[s4] \"I'll be in your care for the night.\""
2003105-154 = "Heehee! Give me a moment to finish up here, then I'll show you to the room."
2003105-157 = "Heehee... Maybe it's small, but it's cozy, right?"
2003105-158 = "I already laid out the futon. You can sleep in there."
2003105-161 = "[ns5] \"Um... Shigure?\"\n[ns6] \"I only see one futon...\""
2003105-164 = "Huh? Obviously. The room is meant for one person."
2003105-165 = "I know the futon is a bit small, but if we squeeze in tight, it should cover both of us..."
2003105-168 = "...You have no choice, right?"
2003105-173 = "― [log=시구레 온천ND]Now, Sensei.[/log][wa:580] "
2003105-174 = "― [log=시구레 온천ND]Isn't it cold outside the futon?[/log][wa:780] "
2003105-177 = "― [log=시구레 온천ND]Don't be stubborn. Climb in.[/log][wa:760] "
2003105-180 = "― [log=시구레 온천ND]The futon is nice and fluffy and warm, you know?[/log][wa:1360] "
2003105-183 = "― [log=시구레 온천ND]Bundled up in here, you'll fall asleep in no time.[/log][wa:10] "
2003105-186 = "― [log=시구레 온천ND]And if the futon isn't warm enough... [/log][wa:1890] "
2003105-189 = "― [log=시구레 온천ND]Then I volunteer to be your own personal heater.[/log] [wa:10] "
2003105-192 = "― [log=시구레 온천ND]Hm? I did have a hot water bottle to keep the bedding warm...[/log][wa:230] "
2003105-195 = "― [log=시구레 온천ND]But the thing is... I drank it up.[/log][wa:2790] "
2003105-198 = "― [log=시구레 온천ND]See, the inside of the futon[/log][wa:1180] "
2003105-199 = "― [log=시구레 온천ND]was the perfect temperature for mors.[/log][wa:2000] "
2003105-202 = "― [log=시구레 온천ND]So before work,[/log][wa:10] "
2003105-203 = "― [log=시구레 온천ND]I emptied the hot water bottle and filled it with mors.[/log][wa:2140] "
2003105-206 = "― [log=시구레 온천ND]But what's done is done.[/log][wa:600] "
2003105-209 = "― [log=시구레 온천ND]That's our situation,[/log]"
2003105-210 = "― [log=시구레 온천ND]and there's no other way to warm up.[/log][wa:2660] "
2003105-213 = "― [log=시구레 온천ND]So for tonight,[/log]"
2003105-214 = "― [log=시구레 온천ND]you'll just have to be the heater.[/log][wa:2000] "
2003105-219 = "[ns] Drink the rest of the mors."
2003105-222 = "Huh? What are you doing, Sensei?"
2003105-223 = "You drank up all the mors... Were you that thirsty?"
2003105-224 = "[s7] \"...I'm pretty sure that mors was fermented.\"\n[s8] \"I could smell the alcohol.\""
2003105-227 = "What? No way."
2003105-228 = "This mors didn't have any yeast or sugar. You can't have fermentation without yeast or sugar."
2003105-229 = "Besides, it's only been in there for a day, so it couldn't have already—"
2003105-230 = "[s9] \"No, I already feel my body heating up...\"\n[s10] \"That was definitely alcohol!\""
2003105-236 = "[ns11] \"The mors has me feeling nice and toasty.\"\n[ns12] \"You can have the futon for yourself, Shigure.\""
2003105-239 = "Ah-ha. So that's your play..."
2003105-240 = "Suit yourself. If you're comfortable out there, I can't force you to get under the covers, Sensei."
2003105-241 = "But I'll be sure to leave some space for you under here... If you do get cold, don't hesitate to climb in."
2003105-243 = "And so I spent the rest of the night shivering on top of cold tatami mats, unable to sleep..."
2003105-244 = "But I survived, no worse for wear save for a slight cold when I woke in the morning."

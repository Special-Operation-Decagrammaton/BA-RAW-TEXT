[translation]
2003105-1 = "อย่างอบอุ่น"
2003105-2 = "(คุณครูสงสัยเกี่ยวกับงานบาร์เทนเดอร์นมที่ชิกุเระพูดถึง จึงลองไปที่โรงอาบน้ำที่ชิกุเระทำงาน)"
2003105-8 = "อ๊ะ เข้ามาสิ คุณครู"
2003105-9 = "ฉันกำลังจะเริ่มทำหน้าที่บาร์เทนเดอร์นมของที่นี่อยู่พอดีเลย"
2003105-10 = "ลูกค้าคนแรกของเราลงไปอาบน้ำประมาณ 1 ชั่วโมงแล้ว อีกเดี๋ยวคงมีลูกค้ามาหานมรสผลไม้ดื่มแล้ว#nละ"
2003105-11 = "[s] \"บาร์เทนเดอร์นมงั้นเหรอ... มันคืองานอะไรเนี่ย?\""
2003105-12 = "ความหมายก็ตามนั้นเลยคุณครู"
2003105-13 = "ถ้าลูกค้าที่อาบน้ำเสร็จออกมาสั่งนมรสผลไม้ ฉันก็จะถามรสนิยมของลูกค้าและทำนมผลไม้รสชาติ#nยอดเยี่ยมให้จากหน้าบาร์ยังไงล่ะ"
2003105-14 = "มันเป็นวิธีการขายที่ค่อนข้างยุ่งยาก ตอนแรกทางโรงอาบน้ำก็ไม่ค่อยพอใจนักหรอก..."
2003105-15 = "แต่ฉันก็มาทำให้แบบไม่เอาค่าจ้าง และขอแค่ให้ได้ทำเครื่องดื่มได้ตามใจชอบ ที่นี่ก็เลยอนุญาตให้ทำ#nคล้ายๆ เป็นการฝึกงานน่ะ"
2003105-16 = "ฉันสามารถทดสอบสูตรใหม่ๆ ได้ ส่วนลูกค้าก็ได้ดื่มนมรสผลไม้รสเลิศ... แบบนี้ถือว่าได้ประโยชน์ทั้ง#nสองฝ่ายเลยละ"
2003105-17 = "[s1] \"ถ้าชิกุเระสนุกกับงาน ก็ไม่มีปัญหาหรอก...\"\n[s2] \"แต่ครูแค่กังวลว่าจะใส่วัตถุดิบแปลกๆ ไปด้วยน่ะสิ...\""
2003105-20 = "ฮุฮุ ถ้ากังวลขนาดนั้นละก็ ไปนั่งตรงนั้นแล้วดูฉันทำงานได้เลย"
2003105-21 = "ฉันเตรียมนมเสร็จแล้ว ส่วนแก้วผสมกับไม้คนผสมเครื่องดื่มก็เตรียมไว้แล้วด้วย..."
2003105-26 = "เอาละ... ถึงเวลาผสมนมแล้วก็ไปเปลี่ยนน้ำในบ่อออนเซ็นแล้วสินะ"
2003105-33 = "ฮู่ววว... บ่ออาบน้ำที่นี่ดีมากเลย"
2003105-34 = "แต่พอแช่น้ำนานคอก็แห้งขึ้นมาเลยแฮะ..."
2003105-35 = "เอ่อ มีนมรสผลไม้ขายมั้ยครับ?"
2003105-36 = "อื้ม มีสิ อยากได้นมรสผลไม้แบบไหนเหรอ?"
2003105-37 = "อ้อ มีหลายรสเหรอครับ? ถ้าถามแบบนี้ ก็คิดหนักอยู่นะ..."
2003105-38 = "เอาเป็นว่า ขอที่ไม่หวานมากแล้วกันครับ"
2003105-39 = "ขอที่ไม่หวานมาก... เข้าใจแล้ว"
2003105-49 = "เอ้านี่! นี่คือนมทริปเปิ้ลเบอร์รีที่ทำจากผลไม้ 3 ชนิด"
2003105-50 = "ฉันเลือกใช้ลินกอนเบอร์รีและแครนเบอร์รีที่มีรสไม่หวานมาก พอปั่นให้เข้ากันแล้วก็ใส่ราสเบอร์รีช่วย#nเพิ่มเนื้อสัมผัสด้วย ลองดื่มดูสิ"
2003105-51 = "ไหนลองซิ..."
2003105-57 = "ไม่หวานมากจริงๆ ด้วยครับ รสเปรี้ยวนิดๆ ของผลไม้กับความกลมกล่อมของนมเข้ากันได้ดีเลย..."
2003105-58 = "นมรสผลไม้รสเลิศแบบนี้ เพิ่งเคยกินเป็นครั้งแรกเลยครับ!"
2003105-59 = "ฮุฮุ โล่งอกไปทีนะที่ชอบ"
2003105-67 = "เอ่อ พอดีว่าผมท้องไส้ไม่ค่อยดี ดื่มนมทีไรเป็นได้วิ่งเข้าห้องน้ำทุกทีเลย..."
2003105-68 = "พอจะมีนมรสผลไม้ที่เป็นมิตรต่อลำไส้บ้างมั้ยครับ?"
2003105-69 = "ต้องมีอยู่แล้ว รอเดี๋ยวนะ"
2003105-80 = "เอ้านี่! นี่คือนมถั่วเหลืองทรอปิคอล ฉันเอานมถั่วเหลืองมาใช้แทนนมวัวน่ะ"
2003105-81 = "แล้วก็ใส่ผลไม้เขตร้อนที่มีรสนุ่มๆ และช่วยในการย่อยอาหารลงไปด้วย"
2003105-87 = "สุดยอดเลย... มันไม่ค่อยเลี่ยนมาก แบบนี้ผมน่าจะดื่มได้โดยไม่ต้องกังวลเลยละ"
2003105-88 = "ในที่สุดคนที่ท้องไส้ไม่ค่อยดีอย่างผม ก็ดื่มนมรสผลไม้หลังแช่น้ำร้อนได้แล้ว นี่ผมไม่ได้ฝันไปใช่มั้ย#nเนี่ย...!"
2003105-89 = "ต่อให้อร่อยแค่ไหน แต่ถ้าดื่มมากเกินไปก็อาจจะท้องเสียได้นะ วันนี้ดื่มแค่แก้วเดียวก็พอ"
2003105-97 = "งานของคณะกรรมการวินัยทำฉันเหนื่อยไปหมดเลย ขนาดแช่น้ำอุ่นๆ มาแล้วยังไม่หายเพลียร่างเลย..."
2003105-98 = "มีอะไรให้ดื่มบ้างมั้ย?"
2003105-99 = "อืม ถ้ารู้สึกเหนื่อยละก็..."
2003105-106 = "เอานี่! นี่มอนสเตอร์แม็กซ์รสผลไม้"
2003105-110 = "[ns] \"แต่นี่มันไม่ใช่นมรสผลไม้ด้วยซ้ำ...?\""
2003105-111 = "บาร์เทนเดอร์ที่ดีต้องรู้ว่าจะต้องแนะนำเครื่องดื่มอะไรที่เหมาะกับสภาพร่างกายและจิตใจของลูกค้าน่ะ"
2003105-112 = "ถ้าอยากบรรเทาความเมื่อยล้าได้เร็วๆ เครื่องดื่มชูกำลังได้ผลดีกว่านมรสผลไม้อยู่แล้ว!"
2003105-118 = "ถึงจะได้เครื่องดื่มที่เกิดคาดไปหน่อย... แต่พอดื่มแล้วก็รู้สึกกระปรี้กระเปร่าขึ้นมาเลยแฮะ"
2003105-119 = "มันเป็นเครื่องดื่มที่ร่างกายฉันต้องการเลยละ ขอบคุณที่ใส่ใจรายละเอียดเป็นอย่างดีเลยนะ"
2003105-120 = "ขอบคุณอะไรกัน เรื่องเล็กน้อยน่า"
2003105-122 = "(บาร์นมรสผลไม้ของชิกุเระได้รับเสียงตอบรับที่ดี จนมีลูกค้าหลายคนแวะเวียนเข้ามาที่ห้องพักผ่อน เพื่อสั่งนมรสผลไม้หลายประเภทดื่มกัน)"
2003105-123 = "(คุณครูเฝ้าดูชิกุเระทำงานจนลืมเวลา จึงต้องค้างแรมที่โรงอาบน้ำ...)"
2003105-126 = "[ns] \"ตายละ เป็นเรื่องแล้วสิ...\""
2003105-128 = "ทำไมเหรอคุณครู?"
2003105-129 = "...หืม? เอาแต่ดูฉันทำงานจนไม่ทันขึ้นรถเที่ยวสุดท้ายกลับชาเล่ต์งั้นเหรอ?"
2003105-130 = "ไม่เห็นต้องกังวลขนาดนั้นเลย ที่นี่คือโรงอาบน้ำนะ"
2003105-131 = "มีห้องพักให้นอนค้างคืนตั้งหลายห้อง คืนนี้ก็นอนที่นี่แล้วพรุ่งนี้ค่อยกลับ..."
2003105-135 = "คือ... ขอโทษนะ ชิกุเระ วันนี้เราไม่มีห้องเหลือเลย"
2003105-136 = "ลูกค้าที่มาบาร์นมรสผลไม้วันนี้บอกว่าพรุ่งนี้อยากจะลองชิมนมรสผลไม้ของชิกุเระอีก ก็เลยจะนอนค้าง#nกันที่นี่กันอีกคืน..."
2003105-137 = "โอ้โห... จริงจังมากกว่าที่คิดเอาไว้อีกแฮะ"
2003105-141 = "ทำยังไงดีล่ะคุณครู? ทางนี้บอกว่าไม่มีห้องพักว่างเลย"
2003105-142 = "แต่ว่าในคืนที่อากาศหนาวแบบนี้ ฉันคงปล่อยให้คุณครูนอนสั่นอยู่ข้างนอกไม่ได้..."
2003105-147 = "อืม งั้นมานอนที่ห้องฉันมั้ย?"
2003105-148 = "[s] \"ห้องชิกุเระเหรอ...?\""
2003105-149 = "ใช่ โรงอาบน้ำนี้มีห้องพักแยกสำหรับพนักงานอยู่น่ะ"
2003105-150 = "ถึงมันจะแคบไปหน่อย แต่ก็ดีกว่าต้องไปนอนขดเป็นกุ้งอยู่ข้างนอกนะ"
2003105-151 = "[s3] \"คงไม่น่ามีวิธีอื่นแล้ว...\"\n[s4] \"งั้นครูขอรบกวนคืนหนึ่งนะ\""
2003105-154 = "ฮุฮุ งั้นรอเดี๋ยวนะ ฉันจะไปเตรียมที่นอนแล้วพาไปที่ห้อง"
2003105-157 = "ฮุฮุ ห้องเล็กแต่ก็อบอุ่นกว่าที่คิดใช่มั้ยล่ะ?"
2003105-158 = "ฉันปูที่นอนไว้ให้ทางนี้แล้ว คุณครูนอนตรงนี้ได้เลย"
2003105-161 = "[ns5] \"นี่... ชิกุเระ?\"\n[ns6] \"เหมือนมันจะมีผ้าห่มแค่ผืนเดียวนะ...\""
2003105-164 = "หืม? มันก็แน่นอนอยู่แล้วนี่ ก็นี่เป็นห้องนอนสำหรับคนเดียวตั้งแต่แรกอยู่แล้ว"
2003105-165 = "ถึงผ้าห่มจะผืนเล็กไปหน่อย แต่ถ้านอนเบียดๆ กันก็น่าจะใช้ห่มสองคนได้นะ..."
2003105-168 = "...เพราะงั้น ตอนนี้คุณครูมีทางเลือกแค่อย่างเดียวแล้วละ"
2003105-173 = "― [log=시구레 온천ND]เอาละ คุณครู[/log][wa:580] "
2003105-174 = "― [log=시구레 온천ND]อยู่นอกผ้าห่ม หนาวใช่มั้ย?[/log][wa:1020] "
2003105-177 = "― [log=시구레 온천ND]อย่าดื้อเลยน่า เข้ามาเถอะ[/log][wa:880] "
2003105-180 = "― [log=시구레 온천ND]ผ้าห่ม ทั้งนุ่มนิ่ม ทั้งอบอุ่นเลยนะ?[/log][wa:1840] "
2003105-183 = "― [log=시구레 온천ND]ถ้ามาอยู่ข้างในนี้ แป๊บเดียวก็หลับแล้วละ[/log][wa:10] "
2003105-186 = "― [log=시구레 온천ND]ถ้าหากว่า แค่นอนห่มผ้า แล้วยังไม่หายหนาวละก็...[/log][wa:1530] "
2003105-189 = "― [log=시구레 온천ND]เดี๋ยวฉันเป็นกระเป๋าน้ำร้อนให้เอง[/log] [wa:300] "
2003105-192 = "― [log=시구레 온천ND]หืม? กระติกน้ำร้อนที่มีอยู่น่ะเหรอ...?[/log][wa:1150] "
2003105-195 = "― [log=시구레 온천ND]เอ่อ คือว่า... ฉันดื่มไปหมดแล้วน่ะ[/log][wa:2790] "
2003105-198 = "― [log=시구레 온천ND]พอดีว่าข้างในผ้าห่ม[/log][wa:1540] "
2003105-199 = "― [log=시구레 온천ND]ทำให้มอร์สอุ่นขึ้นได้ ในอุณหภูมิที่พอดีเลย[/log][wa:1800] "
2003105-202 = "― [log=시구레 온천ND]เมื่อกี้ระหว่างทำงาน[/log][wa:10] "
2003105-203 = "― [log=시구레 온천ND]ฉันเปลี่ยนน้ำในขวดให้เป็นมอร์สสูตรพิเศษ[/log][wa:2780] "
2003105-206 = "― [log=시구레 온천ND]แต่ยังไงก็ช่วยไม่ได้นี่นา?[/log][wa:520] "
2003105-209 = "― [log=시구레 온천ND]ในเมื่อเป็นแบบนี้แล้ว[/log]"
2003105-210 = "― [log=시구레 온천ND]เราไม่มีวิธีอื่นที่จะทำให้ร่างกายอบอุ่นแล้ว[/log][wa:2380] "
2003105-213 = "― [log=시구레 온천ND]เพราะงั้นคืนนี้[/log]"
2003105-214 = "― [log=시구레 온천ND]คุณครูต้องมาเป็นกระเป๋าน้ำร้อนให้ฉันแล้วละ[/log][wa:1680] "
2003105-219 = "[ns] ดื่มมอร์สที่อยู่ในขวดน้ำร้อน"
2003105-222 = "...หืม? อยู่ๆ ก็ทำอะไรน่ะคุณครู?"
2003105-223 = "ยกมอร์สดื่มแบบไม่มีปี่ไม่มีขลุ่ยเลย... คอแห้งเหรอ?"
2003105-224 = "[s7] \"...สงสัยมอร์สนี้จะถูกหมักมานะ\"\n[s8] \"ได้กลิ่นเหล้าอ่อนๆ แปลกๆ ด้วย\""
2003105-227 = "ว่าไงนะ? ไม่มีทาง!"
2003105-228 = "ฉันไม่ได้ใส่ยีสต์หรือน้ำตาลที่จำเป็นในการหมักลงไปในมอร์สนี้เลยนะ"
2003105-229 = "แถมมอร์สนี้ยังหมักแค่วันเดียวเองด้วย ยังไม่น่าจะมีแอลกอฮอล์นี่นา..."
2003105-230 = "[s9] \"ครูตัวร้อนขนาดนี้ ต้องมีแอลกอฮอล์แน่นอน...\"\n[s10] \"ในขวดนี้ต้องเป็นเหล้าแน่ๆ!\""
2003105-236 = "[ns11] \"ตัวครูน่าจะร้อนเพราะฤทธิ์เหล้า งั้นคงไม่ต้องใช้ห่มผ้าแล้วละ\"\n[ns12] \"ชิกุเระห่มผ้านอนคนเดียวได้เลย\""
2003105-239 = "โอ้โห ใช้มุกนี้เหรอเนี่ย..."
2003105-240 = "ก็ได้ เข้าใจแล้ว คุณครูบอกเองว่าร้อน จะให้ฉันไปดึงตัวให้เข้ามาอยู่ในผ้าห่มได้ยังไงล่ะ"
2003105-241 = "ถ้างั้น... ฉันจะแบ่งผ้าห่มไว้ให้ฝั่งหนึ่ง... ถ้าหนาวก็เข้ามาห่มนะ"
2003105-243 = "(หลังจากนั้นคุณครูก็นอนขดตัวอยู่บนเสื่อทาทามิทั้งคืน...)"
2003105-244 = "(โชคดีที่ไม่มีเรื่องอะไรเกิดขึ้น แต่น่าจะเพราะนอนในที่ที่อากาศหนาว คุณครูเลยเป็นหวัด)"

[translation]
102100-1 = "ตอนที่ 10;ปฏิบัติการป้องกันเขตปกครองตนเอง - เฮียกคิยาโค"
102100-4 = "เอาละ ถึงตาพวกเราแล้วค่ะ "
102100-5 = "เริ่มปฏิบัติการป้องกันเขตปกครองตนเองเฮียกคิยาโคค่ะ!"
102100-6 = "อื้ม~ ไปกันเลย"
102100-7 = "ลุย~!!"
102100-11 = "เส้นทางสู่การเป็น <อัศวิน> เริ่มแล้วค่า!"
102100-17 = "พวกเราก็ไปกันเถอะ! โจมตีเลย!"
102100-19 = "โอ้วว!"
102100-23 = "ที่หลบภัยมีเตรียมพร้อมไว้แล้วอย่างเต็มที่ ส่วนเรื่องเสบียง ชมรมจัดงานเทศกาลจะสนับสนุนให้เอง! งั้นก็ฝากด้วยนะ!"
102100-24 = "ค่ะ! ท่านประธาน! ข้างนอกอึกทึกครึกโครมกันเหมือนงานเทศกาลเลย แอบตื่นเต้นนิดหน่อยนะคะเนี่ย!"

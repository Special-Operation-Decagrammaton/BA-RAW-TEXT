[translation]
51010-1 = "第1話;序幕"
51010-6 = "在，在哪裡！？#n那傢伙在哪裡……！"
51010-13 = "……！"
51010-19 = "隊長！後面……！"
51010-20 = "可惡！絕不會放過你！"
51010-26 = "嘿嘿！知道厲害了吧！"
51010-27 = "隊長真厲害！這樣那傢伙就動彈不得了……！"
51010-28 = "不對……他在那裡……！"
51010-41 = "呃，呃啊啊！？"
51010-51 = "到此為止。#n別再繼續搗亂了，妖怪劇團。"
51010-52 = "搗，搗亂？我們哪有……"
51010-53 = "哪沒有……？"
51010-54 = "你們剛才不是在街上遊蕩，對商店街的人找碴嗎？"
51010-56 = "什麼找碴！這樣說太失禮了！"
51010-57 = "我們只是依照隊長的偉大計劃，有條不紊地行動而已！"
51010-62 = "隊長！請說明那項偉大的計劃吧！"
51010-64 = "聽了之後可別嚇到腿軟啊！"
51010-70 = "……？"
51010-71 = "啊不是，那個，其實也沒什麼偉大不偉大的……"
51010-72 = "只是開始執行「在下週慶典開始前大鬧特鬧，玩弄慶典於股掌之間計畫」而已……！"
51010-73 = "…………"
51010-74 = "如果大家覺得不怎麼樣的話，要放棄也不是不行……"
51010-76 = "隊長的完美計畫！"
51010-77 = "我們絕對不會讓你妨礙的！"
51010-79 = "有，有那麼厲害嗎……？"
51010-81 = "我久違回來一趟，你們仍然一點都沒變啊。"
51010-82 = "……很抱歉，就算只是偶然，但既然被我看見──"
51010-86 = "我就不會放任你們搗亂。"
51010-88 = "呃……！"
51010-89 = "先，先等一下！"
51010-90 = "別的先不說，突然冒出來妨礙我們的你到底是誰啊！？#n仔細一想也太莫名其妙了！"
51010-91 = "……嗯？"
51010-92 = "隊長，那身衣服……那特別的水藍色羽織難道是……"
51010-93 = "啊，沒錯！那傢伙一定是百花繚亂！"
51010-94 = "什麼！？"
51010-95 = "百花繚亂不就是百鬼夜行的──"
51010-97 = "不是。"
51010-99 = "我都還沒說出決定性的台詞耶！？"
51010-101 = "跟你們想的不一樣。"
51010-102 = "這個……"
51010-104 = "……只是Cosplay而已。"
51010-108 = "……沒錯。#n既然我是來歸還「那個」……"
51010-115 = "就已經不再屬於百花繚亂了。"
51010-121 = "夏萊．辦公室"
51010-124 = "（一如往常處理夏萊工作的某天下午）"
51010-130 = "[ns]「你好，這裡是夏萊。」"
51010-132 = "喵哈哈！#n您好呀，老師。好久不見～"
51010-133 = "像今天這樣的日子，您在做什麼呢？"
51010-134 = "[s]「我在處理文書作業。」"
51010-137 = "（正在處理的大多是和《各學園自治區損失報告及支援預算運用指南報告》類似，#n　和近期發生的事件有關的文件）"
51010-139 = "啊哈～原來如此，是那場事件的善後工作啊。#n不久前我們百鬼夜行也發送過相關的文件。"
51010-140 = "畢竟……確實發生了很多事。"
51010-145 = "[ns]「先不說這個，仁耶怎麽突然聯絡我呢？」"
51010-146 = "啊，對了～看來現在是個不錯的機會呢。"
51010-147 = "老師最近似乎因為工作纏身，辛苦到連休息的時間都沒有對吧～？"
51010-148 = "這種時候，我能不能為不分晝夜辛勞的老師做些什麼？#n老師會不會需要幫忙呢～？經過左思右想之後……"
51010-149 = "[s]「……左思右想之後？」"
51010-150 = "呵呵，如果老師願意的話，要不要趁這個機會來一趟百鬼夜行呀？"
51010-151 = "慶典將於不久之後舉行。#n偶爾放下工作，喘口氣也是很重要的。"
51010-152 = "所以希望老師務必來放鬆一下～我是這麼想的。"
51010-153 = "而且剛好也能向您報告百鬼夜行的近況。#n除此之外，我還有一個私人的請求～"
51010-154 = "[s]「仁耶的請求……？」"
51010-155 = "啊，順帶一提，如果老師來的話，也許能摸摸我們陰陽部的可愛知世喵喔～"
51010-160 = "喵～？"
51010-162 = "喵哈哈哈～沒錯～"
51010-163 = "那麼就等候您的到來囉～"
51010-169 = "[ns]「……百鬼夜行啊。」"
51010-173 = "讓因「色彩」而反轉之人恢復原狀的方法，並不存在。"
51010-174 = "那就和──無法讓死者重生一樣。#n是這個世界絕對的法則。"
51010-175 = "但即便如此……如果你還是有想要拯救的對象……"
51010-179 = "──就來見妾身吧。"
51010-182 = "[ns]「也許能找到葛葉的線索……」"
51010-185 = "下一話;意想不到的相遇（１）"

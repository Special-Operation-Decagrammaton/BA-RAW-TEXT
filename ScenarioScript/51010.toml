[translation]
51010-1 = "ตอนที่ 1;บทเริ่มต้น"
51010-6 = "ยะ... อยู่ไหนน่ะ?! ยัยนั่นอยู่ที่ไหน...!"
51010-13 = "...!"
51010-19 = "หัวหน้า! อยู่ข้างหลังค่ะ...!"
51010-20 = "หน็อยแน่! ฉันไม่ปล่อยไปหรอก!"
51010-26 = "หึหึ! เป็นยังไงล่ะ!"
51010-27 = "สุดยอดเลยหัวหน้า! ถ้าเป็นอันนี้ พวกนั้นคงซี้แหงแก๋...!"
51010-28 = "ไม่ค่ะ... ไปอยู่ทางโน้นแล้ว...!"
51010-41 = "วะ... ว้ากกก?!"
51010-51 = "เอาละ หยุดความโหดเหี้ยมไว้แค่ตรงนั้น เจ้าพวกปีศาจ"
51010-52 = "หะ... โหดเหี้ยมงั้นเหรอ พวกเราไปทำอะไรไว้..."
51010-53 = "ไปทำอะไรไว้งั้นเหรอ..."
51010-54 = "เมื่อกี้ยังเห็นเที่ยวเดินไปมาตามถนนแล้วหาเรื่องผู้คนในย่านการค้าอยู่เลยนี่?"
51010-56 = "หาเรื่องงั้นเหรอ! กล่าวหากันแบบนี้เสียมารยาทนะ!"
51010-57 = "พวกเราก็แค่ตั้งอกตั้งใจเคลื่อนไหวกันตามแผนการที่ยิ่งใหญ่ของหัวหน้าก็เท่านั้นค่ะ!"
51010-62 = "หัวหน้า! อธิบายแผนการที่ยิ่งใหญ่นั่นสิคะ!"
51010-64 = "พอฟังแล้วก็คงต้องเอามือทาบอกเลยละ!"
51010-70 = "...?"
51010-71 = "บ้าน่า มันก็... ไม่ได้ถึงกับยิ่งใหญ่อะไรหรอก"
51010-72 = "ก็แค่เริ่ม <แผนการสร้างความวุ่นวายตามอำเภอใจก่อนมีงานเทศกาลสัปดาห์หน้า!> เท่านั้นเอง...! "
51010-73 = "......"
51010-74 = "แต่ถ้าทุกคนไม่เห็นด้วย ฉันก็จะหยุดแผนการเดี๋ยวนี้เลย..."
51010-76 = "แผนการที่สมบูรณ์แบบของหัวหน้า!"
51010-77 = "พวกเราไม่ขัดขวางแน่นอนค่ะ!"
51010-79 = "มะ... มันฟังดูยิ่งใหญ่ขนาดนั้นเลยใช่มั้ย...? กะไว้แล้วเชียว"
51010-81 = "ฉันไม่ได้กลับมานาน แต่พอกลับมาเจอก็ยังเป็นเหมือนเดิมเลยสินะ พวกเธอน่ะ"
51010-82 = "...ขอโทษนะ ถึงจะบอกว่าบังเอิญเจอก็เถอะ แต่ถ้าถูกสายตาคู่นี้จับได้แล้ว "
51010-86 = "ฉันก็ไม่ยอมให้สร้างความวุ่นวายไปมากกว่านี้หรอก"
51010-88 = "อึก...!"
51010-89 = "ดะ... เดี๋ยวก่อน!"
51010-90 = "แล้วเธอเป็นใคร ทำไมอยู่ๆ ก็โผล่มารบกวนพวกฉัน?! แบบนี้มันไม่ยุติธรรมนะ!"
51010-91 = "...หืม?"
51010-92 = "หัวหน้า! เสื้อนั่น... เสื้อฮาโอริสีคราม... หรือว่า..."
51010-93 = "อ๊ะ ใช่แล้วค่ะ! เสื้อเฮียกกะเรียวรันไม่ผิดแน่! "
51010-94 = "ว่าไงนะ?!"
51010-95 = "ถ้าเฮียกกะเรียวรันก็แปลว่าเป็นพวกนั้นน่ะสิ! พวกเด็กเฮียกคิยาโคที่...!"
51010-97 = "ไม่ใช่"
51010-99 = "ฉันยังพูดไม่จบประโยคเลยนะ!"
51010-101 = "ไม่ใช่อย่างที่พวกเธอคิดหรอก"
51010-102 = "นี่ก็แค่..."
51010-104 = "...ชุดคอสเพลย์น่ะ"
51010-108 = "...ใช่ ในเมื่อเอา <สิ่งนั้น> มาคืนแล้ว ฉันก็..."
51010-115 = "ไม่ใช่เฮียกกะเรียวรันอีกต่อไป"
51010-121 = "สำนักงานชาเล่ต์"
51010-124 = "(บ่ายวันหนึ่ง ในขณะที่คุณครูกำลังทำงานของชาเล่ต์ตามปกติ)"
51010-130 = "[ns] \"อ่า... ฮัลโหล\""
51010-132 = "อะฮาฮ่า สวัสดีค่ะคุณครู ไม่ได้คุยกันนานเลยนะคะ"
51010-133 = "วันดีๆ แบบนี้ คุณครูทำอะไรอยู่เหรอคะ?"
51010-134 = "[s] \"กำลังทำงานเอกสารอยู่น่ะ\""
51010-137 = "(เอกสารส่วนใหญ่ที่จัดการอยู่ตอนนี้เป็นเอกสารเกี่ยวกับเหตุการณ์ที่เกิดขึ้นในอดีต อย่างเช่น <รายงาน#nความเสียหายในเขตปกครองตนเองของแต่ละโรงเรียน กับรายงานแนวทางการบริหารงบประมาณ>)"
51010-139 = "อ๋อ~ ว่าแล้วเชียว จัดการเรื่องเมื่อตอนนั้นอยู่สินะคะ มีเรื่องที่ทางเฮียกคิยาโคส่งไปด้วยใช่ไหมคะ"
51010-140 = "ทางเราเองก็มีเรื่องเกิดขึ้นมากมายเลยนี่คะ"
51010-145 = "[ns] \"มันก็จริง ว่าแต่นิยะมีเรื่องอะไรเหรอ?\""
51010-146 = "อ้อ จริงสิ~ จะว่าไป ฉันว่าตอนนี้เป็นเวลาที่ดีเลยค่ะ"
51010-147 = "คุณครูเองก็ถูกงานถาโถมและเหมือนต้องเหน็ดเหนื่อยจนไม่มีเวลาพักเลยด้วย~"
51010-148 = "งั้นเด็กสาวอย่างฉันสามารถทำอะไรเพื่อคุณครูที่ทุ่มเทให้กับงานแบบไม่ลืมหูลืมตาบ้างคะ? ฉันคิดว่า \"น่าจะช่วยทำอะไรแบบนั้นได้อยู่น้า~?\" ก็เลยได้คำตอบว่า..."
51010-149 = "[s] \"ก็เลยได้คำตอบว่า...?\""
51010-150 = "ฮุฮุ ถ้าคุณครูไม่ติดอะไร ไว้โอกาสนี้ช่วยมาที่เฮียกคิยาโคได้ไหมคะ?"
51010-151 = "อีกไม่นานจะมีงานเทศกาลในเฮียกคิยาโคน่ะค่ะ เพราะนอกจากการทำงานแล้ว การได้หายใจหายคอ#nก็เป็นเรื่องสำคัญเหมือนกัน"
51010-152 = "ฉันก็เลยคิดว่า ชวนคุณครูมาเที่ยวพักผ่อนหย่อนใจหน่อยดีมั้ยน้า~?"
51010-153 = "ถือว่านี่เป็นการรายงานสถานการณ์ปัจจุบันของสหพันธ์เฮียกคิยาโคด้วย แล้วก็มีเรื่องส่วนตัวที่จะ#nขอร้องด้วยน่ะค่ะ"
51010-154 = "[s] \"เรื่องที่นิยะจะขอร้องเหรอ...?\""
51010-155 = "จริงสิ ถ้ามาแล้วจะได้ลูบหัวของน้องแมวชิเซะที่น่ารักของชมรมหยินหยางได้ด้วยนะคะ"
51010-160 = "เมี๊ยว~?"
51010-162 = "อะฮ่าฮ่าฮ่า~~ ใช่แล้วค่ะ~"
51010-163 = "ถ้างั้นฉันจะรอคุณครูอยู่ที่นี่นะคะ~"
51010-169 = "[ns] \"ให้ไปเฮียกคิยาโคงั้นเหรอ...\""
51010-173 = "คนที่กลับตาลปัตรด้วยฤทธิ์ของสีสันน่ะ... ไม่มีวิธีไหนในโลกนี้ที่จะทำให้กลับมาเป็นดังเดิมได้หรอก"
51010-174 = "มันเป็นกฎของโลก ไม่ต่างกับที่เราไม่สามารถฟื้นคืนชีพคนตายได้"
51010-175 = "แต่ว่า... หากต้องการช่วยใครสักคนละก็..."
51010-179 = "ตามหาข้าให้เจอสิ ครู..."
51010-182 = "[ns] \"ไปแล้วอาจจะได้เบาะแสของคุซึโนฮะก็ได้...\""
51010-185 = "ตอนต่อไป;การพบกันแบบไม่คาดคิด 1"

[translation]
51010-1 = "Episode 1;Prologue"
51010-6 = "Wh-What?! Where did she—!"
51010-13 = "...!"
51010-19 = "B-Boss, behind you!"
51010-20 = "Hiyah! I never miss!"
51010-26 = "Haha! How 'bout that!"
51010-27 = "Amazin', Boss! Nobody could survive one of your blows!"
51010-28 = "N-No, wait, over there!"
51010-41 = "G-Gah?!"
51010-51 = "Your rampage ends here, Mouryo."
51010-52 = "Wh-What rampage...?"
51010-53 = "Do you mean to claim..."
51010-54 = "That you weren't traversing the length of the shopping district, harassing everyone you met?"
51010-56 = "Harrassin' people?! How dare you!"
51010-57 = "We were just enactin' the boss's grand plan!"
51010-62 = "Yeah, Boss! Tell her your grand plan!"
51010-64 = "Just hearin' it will knock her out cold!"
51010-70 = "...?"
51010-71 = "W-Well, uh, I-I wouldn't call it grand or nothin'..."
51010-72 = "But this is just the first step of my \"Let's create chaos before next week's festival and take it over!\" plan! "
51010-73 = "..."
51010-74 = "...I was gonna call it quits if people didn't like it."
51010-76 = "Another perfect plan, Boss!"
51010-77 = "We won't let anyone stand in your way!"
51010-79 = "I-Is it really that amazin'...?"
51010-81 = "I see you have not changed a whit since I've been away..."
51010-82 = "My apologies. But even if our meeting was mere coincidence... "
51010-86 = "I cannot permit further disruption."
51010-88 = "Ugh...!"
51010-89 = "W-Wait a minute!"
51010-90 = "Just who do you think you are, h-harassin' us all of a sudden?! Now that I think about it, that's not fair!"
51010-91 = "...Hm?"
51010-92 = "Boss, look at her outfit... That brilliant sky blue haori..."
51010-93 = "Yeah! She's gotta be from the Hyakkaryouran!"
51010-94 = "What?!"
51010-95 = "A warrior of the Hyakkaryouran! Hyakkiyako's—!"
51010-97 = "No."
51010-99 = "H-Hey, you gotta let us finish our pre-fight declarations!"
51010-101 = "You labor under a misconception."
51010-102 = "This outfit..."
51010-104 = "...is cosplay."
51010-108 = "...Yes. A costume I've come to return."
51010-115 = "I am...no longer of the Hyakkaryouran."
51010-121 = "Schale Executive Office"
51010-124 = "It was another quiet afternoon at Schale, the clock's slow ticking only interrupted by the soft scratch of my pen."
51010-130 = "[ns] \"Ah, yes. Hello?\""
51010-132 = "Nyahaha! Hello, Sensei. It's been a while!"
51010-133 = "What are you up to on a fine day like this?"
51010-134 = "[s] \"Just wrapping up some paperwork.\""
51010-137 = "I was reviewing the Academy Damage Reports and Relief Budget Guidelines that Schale had approved. With everything that had happened, signing my name on one form after another was starting to make my hand hurt."
51010-139 = "Aha, I see! So you're still organizing the clean-up. Speaking of, I hope you approve the funding request we submitted for Hyakkiyako!"
51010-140 = "Despite our best efforts, it's taking time to repair all the damage."
51010-145 = "[ns] \"Is that why you called, Niya?\""
51010-146 = "Oh, no, I just thought it would be a good time for you!"
51010-147 = "You're the type to work unhealthy hours without taking breaks, right Sensei?"
51010-148 = "So after considering what I could do for a teacher who doesn't take care of themself, I thought..."
51010-149 = "[s] \"...You thought?\""
51010-150 = "Nyahaha, rather than waste away indoors, why not come visit Hyakkiyako?"
51010-151 = "We'll be holding a festival soon. You should come celebrate with us."
51010-152 = "Taking breaks is just as important as finishing your work, you know!"
51010-153 = "We can go over the situation at Hyakkiyako Academy, and I have a small favor to ask."
51010-154 = "[s] \"What sort of favor, Niya?\""
51010-155 = "You can even pet our adorable Chise when you come by the Yin-Yang Club!"
51010-160 = "...Meow?"
51010-162 = "Nyahaha! Okay?"
51010-163 = "I'll be waiting!"
51010-169 = "[ns] \"...Hyakkiyako.\""
51010-173 = "There's no way to restore an existence reversed by the Chroma to its original state."
51010-174 = "It's a natural rule of this world, just as how the dead cannot be brought back to life."
51010-175 = "But...if you still want to rescue someone..."
51010-179 = "...Come see me, Sensei."
51010-182 = "[ns] \"Maybe I can find some clues about Kuzunoha...\""
51010-185 = "Next Episode;Sudden Encounter 1"

[translation]
10035100-1 = "第10話;救生員任務，完成！"
10035100-3 = "咦？老師，您怎麼會在這裡？"
10035100-4 = "[s1]「千尋才是，怎麼會來這裡呢？」\n[s2]「千尋，你怎麼沒穿泳裝就跑來水上樂園了？」"
10035100-7 = "誰叫這些傢伙又闖禍了，我只好來收拾爛攤子。"
10035100-12 = "你好呀，老師。很高興能在這裡見到你。"
10035100-13 = "如果是在更和平的情況下見面就好了。"
10035100-15 = "那身制服……你們是千年學園的學生嗎？"
10035100-16 = "還有所謂的闖禍指的是……？"
10035100-17 = "好像莫名能猜到是什麼呢。"
10035100-23 = "我是女武神警察學園公安局局長，尾刃環奈。"
10035100-24 = "這隻機械鱷魚和千年科學學園有關嗎？"
10035100-26 = "唉，是的。"
10035100-27 = "詠葉，你自己解釋。"
10035100-28 = "嗯，雖然非常遺憾，但確實如此。"
10035100-29 = "這隻鱷魚是我們千年工程師部製造的。"
10035100-36 = "為什麼要製造這種東西！？"
10035100-37 = "許多市民都因為它而感到驚慌失措耶！"
10035100-39 = "這點我實在無地自容。"
10035100-40 = "不過正如剛才所說，這隻鱷魚是工程師部所「製造」而非「創造」。"
10035100-41 = "有什麼差別嗎？"
10035100-43 = "差別可大了！"
10035100-49 = "它的設計初衷其實是海洋休閒用機器人，#n只是在過程中不慎誤植了還在開發中的建築物拆除演算法而已！"
10035100-50 = "難怪它只針對遊樂設施而不是人……"
10035100-55 = "等一下！那為什麼海洋休閒用機器人會搭載攻擊功能呢！"
10035100-56 = "本官可沒有那麼好騙哦！"
10035100-57 = "請你說明搭載火焰噴射功能和發射齒型導彈功能的理由！"
10035100-62 = "因為那樣……很浪漫啊。"
10035100-67 = "什麼？"
10035100-68 = "總之當我們發現異常時，它已經逃進了海裡……"
10035100-69 = "雖然立刻展開了搜索，卻始終找不到它的行蹤。"
10035100-70 = "幸好它的行為日誌都記錄在伺服器上，我們才得以在千尋的幫助下找到它。"
10035100-71 = "沒想到它竟然會游進水上樂園……真是不得了。"
10035100-72 = "這起事件造成的相關損失，會由工程師部負起全責的。"
10035100-73 = "真的很抱歉……"
10035100-75 = "看吧！"
10035100-76 = "早說過不是我們幹的嘛！"
10035100-77 = "少不分青紅皂白就懷疑我們！"
10035100-78 = "就跟你說這是平時做人的問題。"
10035100-79 = "少囉嗦！總之既然現在製造者都到場了，應該能查明真相了吧？"
10035100-80 = "啊，確實如此呢！"
10035100-82 = "什麼意思？"
10035100-83 = "那隻鱷魚在衝撞環奈局長前的一瞬間，出現了異常反應。"
10035100-84 = "雖然不是什麼重要的事，但我們大家都很好奇原因。"
10035100-85 = "異常反應嗎……"
10035100-86 = "好像挺有趣的。那就拆開來看看吧。"
10035100-96 = "先解除安全設定……"
10035100-100 = "嗯，好了。"
10035100-101 = "不愧是千尋，真是可靠。"
10035100-105 = "這是鱷魚的行為日誌。#n故障之前的所有活動數據都會被記錄在裡面。"
10035100-106 = "你們說的異常反應……在這裡。"
10035100-110 = "錯誤代號4885：由生物本能模仿演算法引起的被捕食自覺和迴避行為。"
10035100-111 = "那個模仿……之類的是什麼東西？"
10035100-112 = "不能再解釋得清楚一點嗎？"
10035100-113 = "……簡單來說。"
10035100-117 = "鱷魚在面對對手的瞬間，意識到了對方是比自己更高級的掠食者。"
10035100-118 = "所以行為才會出現異常。"
10035100-119 = "……這真的是看到人引起的反應嗎？"
10035100-125 = "[ns]「……」"
10035100-126 = "這，這種事有可能發生嗎！？"
10035100-128 = "畢竟機械鱷魚的行為演算法，是參考真實的鱷魚製作出來的東西。"
10035100-129 = "如果是連鱷魚都會認定是頂級掠食者的對象，出現這種情況也不無可能……"
10035100-130 = "不不不，局長可是人類啊。"
10035100-131 = "就算表情再怎麼可怕，這種解釋也太荒謬了。"
10035100-137 = "……呵呵。"
10035100-138 = "局長？"
10035100-139 = "呵呵呵呵……"
10035100-140 = "是啊，發生這種事也不無可能。"
10035100-141 = "局長……您還好嗎？"
10035100-142 = "沒什麼好不好的，桐乃警官。我的長相我自己最清楚。"
10035100-143 = "幸好這次因為情況特殊能夠派上用場。#n之後如果又有對民服務的工作，我還是儘量迴避比較好。"
10035100-144 = "畢竟不能讓市民感到害怕嘛。呵呵。"
10035100-150 = "別露出那種表情，桐乃、吹雪。#n每個人都有適合自己的位置。只要在自己的位置上盡力扮演自己的角色就行了。"
10035100-151 = "看來比起水上樂園，還是審訊室更適合我。"
10035100-152 = "得到這個結論之後，感覺心情舒暢多了啊。"
10035100-153 = "……"
10035100-154 = "狂犬，你看起來一點都不像是心情舒暢啊。"
10035100-155 = "不必再說下去了。"
10035100-156 = "趕緊開始善後吧。"
10035100-157 = "我來清理破碎的殘骸，桐乃和吹雪去安置群眾──"
10035100-162 = "那個……"
10035100-167 = "咦？"
10035100-168 = "嗯？是剛才局長救下的孩子？你有什麼事嗎？"
10035100-172 = "救生員姐姐……"
10035100-175 = "嗯？"
10035100-176 = "是在叫我嗎？"
10035100-177 = "（點點頭）"
10035100-178 = "怎麼了？我不小心傷到你了嗎？"
10035100-179 = "（搖搖頭）"
10035100-180 = "那麼是？"
10035100-181 = "那個……"
10035100-186 = "謝謝你救了我！"
10035100-190 = "我，我剛才被鱷魚嚇到……"
10035100-191 = "愣在原地動彈不得……"
10035100-192 = "是姐姐跑，跑過來救了我！所以……謝謝你！謝謝你，姐姐！"
10035100-196 = "是嗎。"
10035100-201 = "沒受傷就好。"
10035100-202 = "真是太好了。"
10035100-211 = "老師？您剛才……？"
10035100-212 = "[s3]「拍下了環奈的笑容。」\n[s4]「捕捉到了環奈的真心。」"
10035100-215 = "……我不明白您的意思。"
10035100-216 = "[s]「來，自己看看吧。」"
10035100-217 = "您指的是……"
10035100-222 = "[ns]「怎麼樣，拍得不錯吧？」"
10035100-224 = "[ns5]「環奈也有成為優秀救生員的資質。」\n[ns6]「環奈也有成為出色生活安全局成員的資質。」"
10035100-229 = "……呵呵。"
10035100-230 = "老師，您又來了。"
10035100-231 = "就像我剛才說過的一樣，我很清楚自己不適合和市民們打交道。"
10035100-232 = "今天的表現也是一言難盡。"
10035100-233 = "但是……"
10035100-234 = "如果我也能辦到的話……"
10035100-235 = "救生員的任務，我想……再試著努力看看。"
10035100-236 = "嗯，我是這麼想的。"

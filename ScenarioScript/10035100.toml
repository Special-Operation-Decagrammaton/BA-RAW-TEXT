[translation]
10035100-1 = "Episode 10;I Did It as a Lifeguard!"
10035100-3 = "Huh? Sensei, what are you doing here?"
10035100-4 = "[s1]\"Hey, Chihiro, I was just about to ask you the same question.\"\n[s2]\"Why are you at a water park without swimsuits?\""
10035100-7 = "We're here to deal with a troublemaker."
10035100-12 = "Hello, Sensei. Fancy seeing you here."
10035100-13 = "I just wish it were under better circumstances."
10035100-15 = "That uniform... Are you Millennium students?"
10035100-16 = "More importantly...which troublemaker?"
10035100-17 = "I can guess which one."
10035100-23 = "I'm Ogata Kanna, Director of the Public Peace Bureau at Valkyrie Police School."
10035100-24 = "Does the Mechagator have any connection to Millennium Science School, by any chance?"
10035100-26 = "*sigh*... Yes, it does."
10035100-27 = "Utaha, you tell them."
10035100-28 = "Um... Yeah, so it's pretty much what you're thinking."
10035100-29 = "This alligator was built by our Millennium Engineering Department."
10035100-36 = "Why would you ever build something like this?"
10035100-37 = "It caused a panic here!"
10035100-39 = "And we're all ashamed of that."
10035100-40 = "But let me clarify: the Engineering Department built the alligator. We didn't design it."
10035100-41 = "Isn't that basically the same thing?"
10035100-43 = "Not at all."
10035100-49 = "Long story short, it was built to be a water toy, but we also had a building demolition tool in development, and their behavioral algorithms got mixed up."
10035100-50 = "So that's why it went after the rides and not the people..."
10035100-55 = "Wait a minute! If it's a \"water toy,\" why does it have weapons?"
10035100-56 = "You can't fool me!"
10035100-57 = "You gave it a flamethrower and a missile rack!"
10035100-62 = "Those were...for effect."
10035100-67 = "What?"
10035100-68 = "Anyway, by the time we spotted the problem, it had already escaped into the sea..."
10035100-69 = "So we were too late to catch it, and couldn't find out where it went..."
10035100-70 = "...until Chihiro remembered its activity logs were saved on the server. She helped us track it down from there."
10035100-71 = "Of all the places it could've gone, though, I wouldn't have guessed it'd go here."
10035100-72 = "*sigh* The Engineering Department will take full responsibility for the damages."
10035100-73 = "Please accept our full apologies."
10035100-75 = "See?!"
10035100-76 = "I told you it wasn't us!"
10035100-77 = "Don't make accusations without any evidence!"
10035100-78 = "You WERE the most likely suspects."
10035100-79 = "Ah, shut up! Anyway, now that YOU'RE here, maybe we can figure this out."
10035100-80 = "Ah, of course!"
10035100-82 = "Figure what out?"
10035100-83 = "When the alligator saw Director Kanna, it started acting strange."
10035100-84 = "I mean, it's not really important, but everybody's curious about it."
10035100-85 = "Acted strange, did it?"
10035100-86 = "Interesting. Let me take a closer look into it."
10035100-96 = "Disabling the security settings..."
10035100-100 = "And we're all set."
10035100-101 = "Nicely done, Chihiro."
10035100-105 = "Okay, here's its local activity log. This should have all its most recent data."
10035100-106 = "And that strange behavior is... Ah, right here."
10035100-110 = "Error code 4885: Biomimetic prey instinct algorithm engaged. Activating evasive protocols."
10035100-111 = "Biomimetic what now?"
10035100-112 = "Could you maybe spell that out?"
10035100-113 = "Simply put..."
10035100-117 = "...the alligator recognized its opponent as a superior predator."
10035100-118 = "That's why it switched behaviors."
10035100-119 = "...You're sure it got scared of a person?"
10035100-125 = "[ns] \"...\""
10035100-126 = "I-Is that even possible?!"
10035100-128 = "Demolition protocols aside, the Mechagator was meant to act like a real alligator."
10035100-129 = "If a real alligator spotted a superior predator, it would run."
10035100-130 = "The director's human, though."
10035100-131 = "She's got a mean streak, yeah, but it still doesn't make any sense."
10035100-137 = "...Heehee."
10035100-138 = "Director?"
10035100-139 = "Hahahaha..."
10035100-140 = "It does make sense. I get it."
10035100-141 = "Director, are you okay?"
10035100-142 = "Not a relevant question, Officer. Point is, I know how I come across."
10035100-143 = "In this very specific circumstance, that turned out to be a good thing, but next time they try to put me in front of the public, I'll have to decline."
10035100-144 = "I think the citizens have had enough scares lately. Haha."
10035100-150 = "Hey, don't feel bad for me. We all have places in life we are and aren't suited for."
10035100-151 = "Me, I'm more at home in an interrogation room than a water park."
10035100-152 = "And honestly, it's a relief to accept that."
10035100-153 = "..."
10035100-154 = "You don't seem TOO relieved, Feral Hound, going by the look on your face."
10035100-155 = "You be quiet."
10035100-156 = "Well, we all have a cleanup job to do here."
10035100-157 = "I'll start sweeping up the debris. Kirino and Fubuki, if you could handle the people—"
10035100-162 = "Excuse me..."
10035100-167 = "Huh?"
10035100-168 = "Isn't that the child the director saved earlier? Hey, kid. Is there something you need?"
10035100-172 = "Miss Lifeguard..."
10035100-175 = "Oh?"
10035100-176 = "Me?"
10035100-177 = "(nod, nod)"
10035100-178 = "What is it? Did you get hurt because of me?"
10035100-179 = "(shakes head)"
10035100-180 = "Then...?"
10035100-181 = "Umm..."
10035100-186 = "Thank you for saving me!"
10035100-190 = "I-I was so scared of the alligator..."
10035100-191 = "I just froze, right there..."
10035100-192 = "But then, you ran over and picked me up! So...thank you! Thank you so much!"
10035100-196 = "Well..."
10035100-201 = "...I'm just glad you're okay."
10035100-202 = "It all worked out."
10035100-211 = "Sensei? What did you just do...?"
10035100-212 = "[s3] \"I captured your smile.\"\n[s4] \"I captured your heart.\""
10035100-215 = "...I'm not sure what you mean."
10035100-216 = "[s] \"Here, take a look.\""
10035100-217 = "What in the world...?"
10035100-222 = "[ns] \"How's that? Came out good, right?\""
10035100-224 = "[ns5] \"You have the makings of an excellent lifeguard.\"\n[ns6] \"You have the qualities of an excellent Public Safety Bureau officer.\""
10035100-229 = "...Heehee."
10035100-230 = "There you go again, Sensei."
10035100-231 = "Like I said, I'm well aware that I'm not good at working with the public."
10035100-232 = "Today was no exception."
10035100-233 = "Still..."
10035100-234 = "If it's possible..."
10035100-235 = "I'd like to try and improve...as a lifeguard."
10035100-236 = "That's how I feel about it."

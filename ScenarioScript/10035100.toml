[translation]
10035100-1 = "ตอนที่ 10;ไลฟ์การ์ดสอบผ่านแล้วค่ะ!"
10035100-3 = "เอ๋? คุณครู ทำไมถึงมาอยู่ที่นี่ล่ะ?"
10035100-4 = "[s1] \"จิฮิโระต่างหาก ทำไมถึงมาอยู่ตรงนี้?\"\n[s2] \"จิฮิโระต่างหาก ทำไมมาสวนน้ำแต่ไม่ใส่ชุดว่ายน้ำล่ะ?\""
10035100-7 = "ก็มาแก้ปัญหาที่ยัยพวกนี้ก่อเรื่องไว้น่ะสิ"
10035100-12 = "สวัสดีคุณครู ไม่คิดเลยนะว่าจะได้มาเจอในที่แบบนี้"
10035100-13 = "แต่ถ้าได้เจอในสถานการณ์ที่สงบกว่านี้ก็น่าจะดีกว่าเนอะ"
10035100-15 = "ชุดนักเรียนนั่น... พวกคุณเป็นนักเรียนจากมิลเลเนียมเหรอคะ?"
10035100-16 = "แล้วปัญหาที่ว่า...?"
10035100-17 = "เอาละ ฉันพอจะเดาได้แล้ว"
10035100-23 = "ฉันโอกาตะ คันนะ หัวหน้ากรมความมั่นคงสาธารณะ สถาบันฝึกตำรวจวัลคิรี่"
10035100-24 = "จระเข้จักรกลมีส่วนเกี่ยวข้องกับโรงเรียนวิทย์มิลเลเนียมเหรอ?"
10035100-26 = "เฮ้อ ใช่แล้วละ"
10035100-27 = "อุทาฮะ เธออธิบายเองเลย"
10035100-28 = "อืม มันเป็นเรื่องที่น่าเสียใจ แต่มันก็จริงอย่างที่ว่าเลย"
10035100-29 = "จระเข้ตัวนี้เป็นหุ่นยนต์ที่ถูกสร้างขึ้นในชมรมวิศวกรรมของมิลเลเนียมน่ะ"
10035100-36 = "ทำไมถึงสร้างตัวอะไรแบบนี้ด้วยล่ะคะ!"
10035100-37 = "จระเข้จักรกลทำให้ชาวเมืองตกใจและหวาดกลัวไม่น้อยเลยนะคะ!"
10035100-39 = "น่าละอายใจจริงๆ"
10035100-40 = "แต่อย่างที่บอกเมื่อกี้ว่าชมรมวิศวกรรมไม่ได้ 'สร้าง' จระเข้ตัวนี้ขึ้นมาเอง แต่มัน 'ถูกสร้างขึ้นมา'"
10035100-41 = "แล้วมันต่างกันตรงไหน!"
10035100-43 = "ไม่ใช่นะ!"
10035100-49 = "เดิมทีแล้วเรากำลังสร้างหุ่นยนต์จระเข้เพื่อการสันทนาการทางน้ำ แต่ในระหว่างการพัฒนา เราดันพลาด#nไปใส่อัลกอริทึมรื้อถอนอาคารเข้าไปน่ะสิ!"
10035100-50 = "เพราะแบบนี้สินะคะ มันถึงโจมตีแค่พวกเครื่องเล่น แต่ไม่โจมตีผู้คนเลย..."
10035100-55 = "แต่เดี๋ยวนะคะ! แล้วทำไมหุ่นยนต์เพื่อการสันทนาการทางน้ำถึงมีฟังก์ชันโจมตีด้วยล่ะคะ!?"
10035100-56 = "อย่ามาหลอกฉันซะให้ยากเลยค่ะ!"
10035100-57 = "ฉันเห็นมาเต็มสองตาว่ามีฟังก์ชันพ่นไฟและมีมิสไซล์ที่ฟันด้วย!"
10035100-62 = "มันแค่... เป็นความโรแมนติกของวิศวกรน่ะ"
10035100-67 = "คะ?"
10035100-68 = "เอาเถอะ สรุปว่ากว่าเราจะตรวจพบความผิดปกติ มันก็หนีออกไปทางทะเลแล้ว..."
10035100-69 = "เราก็เลยออกค้นหา แต่ก็ไม่เจอร่องรอยอะไรเลย"
10035100-70 = "โชคดีที่เซิร์ฟเวอร์ของเรามีบันทึกพฤติกรรมของมันอยู่ จิฮิโระก็เลยช่วยดึงข้อมูลนั้นออกมา แล้วเราก็ออกมาตามหามัน"
10035100-71 = "เฮ้อ แต่ก็ไม่คิดเลยนะว่ามันจะเข้ามาอยู่ในสวนน้ำแบบนี้"
10035100-72 = "ชมรมวิศวกรรมจะรับผิดชอบต่อความเสียหายที่เกิดขึ้นครั้งนี้เอง"
10035100-73 = "ต้องขอโทษด้วยนะ..."
10035100-75 = "เห็นมั้ยล่ะ!"
10035100-76 = "บอกแล้วว่าไม่ใช่พวกฉัน!"
10035100-77 = "อย่ามาสงสัยกันโดยไม่ตรวจสอบให้ดีๆ ก่อนสิ!"
10035100-78 = "ก็ชอบก่อปัญหากันไม่หยุดหย่อนเองนี่"
10035100-79 = "เงียบไปเลยนะ! ยังไงคนสร้างหุ่นยนต์ก็อยู่ที่นี่ด้วยแล้ว งั้นเราก็หาสาเหตุได้แล้วสิ"
10035100-80 = "อ๊ะ นั่นสินะคะ!"
10035100-82 = "หมายถึงอะไรเหรอ?"
10035100-83 = "ตอนเผชิญหน้ากับหัวหน้ากรมฯ คันนะ จระเข้มันมีปฏิกิริยาแปลกๆ น่ะ"
10035100-84 = "มันไม่ใช่เรื่องสำคัญหรอก แต่ว่าทุกคนก็สงสัยกันน่ะ"
10035100-85 = "ปฏิกิริยาแปลกๆ เหรอ..."
10035100-86 = "น่าสนใจแฮะ... คงต้องเปิดมันดูสักหน่อยแล้วละ"
10035100-96 = "ปลดการตั้งค่าความปลอดภัย..."
10035100-100 = "เอาละ ได้แล้ว"
10035100-101 = "อืม จิฮิโระของเรายอดเยี่ยมสุดๆ ไปเลย"
10035100-105 = "นี่คือบันทึกพฤติกรรมของจระเข้ ข้อมูลพฤติกรรมของมันก่อนที่เครื่องยนต์จะพังถูกบันทึกไว้ที่นี่น่ะ"
10035100-106 = "พฤติกรรมแปลกๆ ของจระเข้ที่พวกเธอพูดถึง... คือตรงนี้สินะ"
10035100-110 = "เออเร่อโค้ด 4885 การรับรู้อากัปกิริยาและพฤติกรรมหลบหนีอันเนื่องมาจากอัลกอริทึมสัญชาตญาณ#nการเลียนแบบสิ่งมีชีวิต"
10035100-111 = "การเลียนแบบอะไรนะ?"
10035100-112 = "อธิบายให้เข้าใจง่ายๆ ได้มั้ย?"
10035100-113 = "ถ้าจะให้พูดง่ายๆ ละก็..."
10035100-117 = "จังหวะที่จระเข้เผชิญหน้าฝ่ายตรงข้าม มันคิดว่าได้เจอนักล่าที่อยู่เหนือกว่าตัวเอง"
10035100-118 = "ก็เลยเกิดพฤติกรรมผิดปกติขึ้นมาน่ะ"
10035100-119 = "แต่ว่ามันมีอาการแบบนี้ตอนเห็นคนจริงเหรอ?"
10035100-125 = "[ns] \"...\""
10035100-126 = "ปะ... เป็นไปได้เหรอคะเนี่ย?!"
10035100-128 = "อัลกอริทึมพฤติกรรมของจระเข้จักรกลทำเลียนแบบมาจากของจระเข้จริงๆ"
10035100-129 = "ถ้าฝ่ายตรงข้ามเป็นนักล่าที่อยู่เหนือกว่าละก็ จระเจ้ตัวจริงก็คงมีปฏิกิริยาแบบนี้ได้เหมือนกัน..."
10035100-130 = "เดี๋ยวก่อน แต่หัวหน้ากรมฯ เป็นคนนะ"
10035100-131 = "ต่อให้หน้าดุจนน่ากลัวแค่ไหน แต่นี่มันก็น่าเหลือเชื่อเกินไปหรือเปล่า"
10035100-137 = "ฮุฮุ..."
10035100-138 = "หัวหน้ากรมฯ?"
10035100-139 = "ฮุฮุฮุฮุ..."
10035100-140 = "ก็นะ เรื่องแบบนี้อาจเกิดขึ้นได้"
10035100-141 = "หัวหน้ากรมฯ... เป็นอะไรหรือเปล่าคะ?"
10035100-142 = "จะต้องเป็นอะไรทำไมล่ะ เจ้าหน้าที่คิริโนะ ฉันรู้ตัวเองดีกว่าใครอยู่แล้วละว่ารูปลักษณ์ของฉันมันไม่ได้#nน่าพูดคุยด้วยเท่าไร"
10035100-143 = "โชคดีที่ข้อด้อยนี้เป็นประโยชน์ในสถานการณ์พิเศษครั้งนี้ แต่ต่อไปถ้าเป็นงานบริการประชาชน เห็นทีฉันคงต้องปฏิเสธแล้วละ"
10035100-144 = "ฉันไม่ควรทำให้ชาวเมืองต้องหวาดกลัวนี่เนอะ ฮุฮุ"
10035100-150 = "ไม่ต้องทำหน้าแบบนั้นหรอก คิริโนะ ฟุบุกิ ทุกคนล้วนมีจุดที่เหมาะกับตัวเอง เราแค่ทำหน้าที่ของเรา#nให้ดีในจุดที่ตัวเองอยู่ก็พอ"
10035100-151 = "และฉันก็แค่เหมาะกับห้องสอบสวนมากกว่าสวนน้ำ"
10035100-152 = "พอได้ข้อสรุปก็โล่งใจขึ้นมาแล้วละ"
10035100-153 = "..."
10035100-154 = "หมาบ้า สีหน้าเธอไม่ได้ดูโล่งใจเลยนะ"
10035100-155 = "เงียบไปเลย"
10035100-156 = "งั้นฉันจะช่วยเคลียร์ส่วนที่เหลือให้แล้วกัน"
10035100-157 = "ฉันจะเอาเศษซากที่เสียหายไปทิ้ง ส่วนคิริโนะกับฟุบุกิก็..."
10035100-162 = "เอ่อ..."
10035100-167 = "เอ๋?"
10035100-168 = "หืม? เด็กที่หัวหน้ากรมฯ ช่วยไว้เมื่อกี้นี่นา มีธุระอะไรน่ะ?"
10035100-172 = "พี่สาวไลฟ์การ์ด..."
10035100-175 = "หืม?"
10035100-176 = "หมายถึงฉันเหรอ?"
10035100-177 = "(พยักหน้า)"
10035100-178 = "มีเรื่องอะไรน่ะ? หรือว่าได้รับบาดเจ็บอะไรเพราะฉัน?"
10035100-179 = "(ส่ายหน้า)"
10035100-180 = "ถ้างั้น?"
10035100-181 = "อ่า..."
10035100-186 = "ขอบคุณที่ช่วยหนูไว้นะคะ!"
10035100-190 = "ตะ... ตอนนั้นหนูกลัวจระเข้มากๆ เลยน่ะค่ะ ก็เลย..."
10035100-191 = "ทั้งทำอะไรไม่ถูกและก็ได้แต่ยืนตัวแข็งเป็นหิน..."
10035100-192 = "แต่พี่ก็วิ่งมาช่วยหนูไว้ค่ะ! ขอบคุณนะคะพี่สาวใจดี"
10035100-196 = "งั้นเหรอ?"
10035100-201 = "ไม่ได้บาดเจ็บตรงไหนก็ดีแล้วละ"
10035100-202 = "ดีแล้วละนะ"
10035100-211 = "คุณครู? ทำอะไรน่ะ...?"
10035100-212 = "[s3] \"เก็บภาพรอยยิ้มของคันนะไว้น่ะสิ\"\n[s4] \"บันทึกจิตใจที่งดงามของคันนะไว้น่ะสิ\""
10035100-215 = "พูดเรื่องอะไรไม่เห็นเข้าใจเลยค่ะ..."
10035100-216 = "[s] \"เอานี่ ลองมาดูเองได้เลย\""
10035100-217 = "นี่มัน..."
10035100-222 = "[ns] \"เป็นไง สวยใช่มั้ยล่ะ?\""
10035100-224 = "[ns5] \"คันนะก็มีคุณสมบัติของไลฟ์การ์ดที่ยอดเยี่ยมนะ\"\n[ns6] \"คันนะก็มีคุณสมบัติของเจ้าหน้าที่สำนักรักษาความปลอดภัยนะ\""
10035100-229 = "ฮุฮุ..."
10035100-230 = "พูดแบบนี้อีกแล้วนะคะคุณครู"
10035100-231 = "แต่ก็อย่างที่ฉันบอกไปค่ะ ฉันรู้ว่าตัวเองไม่มีคุณสมบัติที่จะมีปฏิสัมพันธ์กับชาวเมืองหรอกค่ะ"
10035100-232 = "และเหตุการณ์วันนี้ก็พิสูจน์แล้ว"
10035100-233 = "แต่ว่า..."
10035100-234 = "สมมติว่าถ้าฉันทำแบบนั้นได้..."
10035100-235 = "ฉันก็อยากพยายามกับงานไลฟ์การ์ด... ให้มากกว่านี้อีกหน่อยค่ะ"
10035100-236 = "ฉันคิดอย่างนั้นน่ะค่ะ"

[translation]
10013090-1 = "ตอนที่ 9;สิ้นสุดฤดูร้อน"
10013090-5 = "โนโนมิ~ ออกโรงค่ะ~☆"
10013090-9 = "อ๊ากกก!! เจ้าพวกนี้! แข็งแกร่ง ไม่เกรงใจใคร!!"
10013090-10 = "แหะๆ~ นี่ยังแค่น้ำจิ้มนะ~"
10013090-11 = "ดีละ! งั้นก็สู้ต่อตามแผน...!"
10013090-12 = "อ๊ะ! ว่าแต่...! ท่านชิซุโกะ! นายท่านล่ะคะ...? นายท่านหายไปไหนแล้ว?"
10013090-13 = "เอ๋...?"
10013090-19 = "อะ... อึก! นี่มัน... อะไรกัน...! เป็นแบบนี้ได้ไง? ฉันไม่ได้คิดจะเชิญพวกอะบิดอสมาสักหน่อย!"
10013090-20 = "ทำไมถึง... ถ่อมาขัดขวางพวกฉันถึงที่นี่เลย! พวกอะบิดอส! กล้าดียังไงถึงมาก่อเรื่องที่นี่!"
10013090-21 = "[s] \"คุณนี่โชคไม่ดีเลยนะ ปีชงหรือเปล่า?\""
10013090-22 = "แต่อย่าคิดนะว่าฉันไม่ได้เรียนรู้อะไรเลยหลังจากเหตุการณ์นั้น!"
10013090-23 = "การที่พวกนักเรียนมีพลังและความสามัคคีที่น่าทึ่งน่ะ! เป็นเพราะมีครูจากชาเล่ต์อยู่ยังไงล่ะ!"
10013090-24 = "เพราะงั้นถ้ากำจัดครูไป ฉันก็จะกลับมาพลิกสถานการณ์ได้!"
10013090-25 = "[s] \"ก็เลยลักพาตัวมางั้นสินะ\""
10013090-26 = "เหอะ! สถานการณ์แบบนี้ยังจะทำเป็นไม่รู้ร้อนรู้หนาวอยู่อีก ไม่กลัวเลยรึไง"
10013090-27 = "ฉันจะใช้แกเป็นทั้งตัวประกันและโล่ป้องกันจากการโจมตีของพวกอะบิดอส!"
10013090-28 = "ถ้าจะเสียใจที่เข้ามายุ่งเกี่ยวกับเรื่องแบบนี้ละก็ มันสายไปแล้ว!"
10013090-29 = "[s] \"อืม... บังเอิญว่าเคยเจอเหตุการณ์คล้ายๆ กันมาก่อนด้วยน่ะสิ\""
10013090-30 = "......?"
10013090-31 = "[s1] \"แล้วก็คิดถึงเรื่องนั้นขึ้นมาก่อนหน้านี้ด้วย\"\n[s2] \"ต้องบอกว่าเป็นโอกาสดี หรือจังหวะนรกดีนะ\""
10013090-34 = "พูดเรื่องไร้สาระอะไรของแก..."
10013090-42 = "กะ... เกิดอะไรขึ้น?!"
10013090-43 = "ตอนนี้พวกอะบิดอสต้องไปต่อสู้กับแก๊งหมวกกันน็อกอยู่สิ!"
10013090-51 = "บะ... บอสครับ! รายงานด่วนครับ! มะ... มีศัตรูนิรนามบุกเข้ามาจากด้านนอก...!"
10013090-52 = "มากับสี... สีชาดครับ!"
10013090-53 = "มากับ...? สีชาด...? พูดอะไรของแกน่ะ"
10013090-61 = "ฮุฮุฮุ"
10013090-66 = "ฮุฮุฮุฮุฮุ"
10013090-70 = "ฮุฮุฮุฮุฮุฮุ!!!!"
10013090-72 = "มีศัตรูมาเพิ่มงั้นเหรอ?!"
10013090-74 = "[ns] \"ว่าไง วาคาโมะ พอติดต่อไปก็รีบมาให้เลยนะ\""
10013090-75 = "ค่าา! วาคาโมะผู้นี้อยู่แถวนี้พอดิบพอดี ก็เลยรีบมาหาตามคำเรียกหาของคุณท่านค่ะ!"
10013090-76 = "อ้อ~ วันก่อนฉันทำผิดพลาดต่อคุณท่านไปเพราะเรื่องเข้าใจผิดนะคะ"
10013090-77 = "วันนี้ในเมื่อคุณท่านเรียกฉันมาด้วยตัวเอง..."
10013090-78 = "ฉันก็จะช่วยคุณท่านจากพวกอันธพาลเดี๋ยวนี้เลยค่ะ!"
10013090-79 = "ยิง ยิงเลย!"
10013090-83 = "ฮุฮุ ไม่มีประโยชน์หรอกค่ะ!"
10013090-87 = "ไม่มีใครที่จะมาขัดขวางความรักที่ฉันมีต่อคุณครูได้!"
10013090-99 = "นะ... หนอยแน่!"
10013090-103 = "[ns] \"หนีไปแล้ว\""
10013090-107 = "ฮึ่ย! ช่วยไม่ได้! หนีก่อนแล้วกัน! ติดเครื่องเฮลิคอปเตอร์!"
10013090-108 = "คะ... ครับ!"
10013090-113 = "อึก! พวกอะบิดอส! ครูจากชาเล่ต์! แล้วก็พวกร้านเฮียกคิยาโคด้วย!"
10013090-114 = "ถึงวันนี้ฉันจะยอมถอยให้ก่อน แต่ครั้งหน้า...!"
10013090-120 = "ไอ้งั่งที่ไม่เจียมตัว แถมคิดจะทำร้ายคุณครูที่ฉันรัก!"
10013090-121 = "คิดเหรอคะว่าฉันจะยอมปล่อยไปง่ายๆ?"
10013090-125 = "หา...?"
10013090-136 = "(หลังสิ้นสุดการปะทะกับผู้อำนวยการของไคเซอร์(?))"
10013090-141 = "[ns] \"ขอบใจนะ วาคาโมะ ครูไม่น่าสร้างปัญหาให้เลย\""
10013090-142 = "ปะ... เปล่าเลยค่ะ! ถึงคราวที่แล้วจะเกิดจากความเข้าใจผิดก็ตาม แต่วาคาโมะผู้นี้ก็อยากมาไถ่บาปที่ทำ#nให้คุณครูต้องเดือดร้อนค่ะ..."
10013090-143 = "คือ... คือว่า..."
10013090-149 = "วาคาโมะเป็นประโยชน์... บ้างมั้ยคะ?"
10013090-150 = "[s] \"อื้ม ถ้าไม่ได้วาคาโมะครูคงไม่รอดแล้ว ต้องเรียกว่าเป็นผู้ช่วยชีวิตเลยละ\""
10013090-151 = "ฉันคือ... ผู้ช่วยชีวิต... ของคุณท่าน...?"
10013090-152 = "อะ... อ๊า! ฉันไปก่อความเดือดร้อนให้คุณท่านแบบที่ไม่ควรให้อภัย แต่คุณท่านก็... ยังคง... พูดจาอ่อนโยนแบบนี้กับฉันเสมอเลย...!"
10013090-153 = "[s] \"ถ้าไม่ติดอะไรก็กลับไปด้วยกัน...\""
10013090-154 = "วาคาโมะใจฟูจนควบคุมตัวเองไม่ได้แล้วค่ะ!!"
10013090-155 = "ขะ... ขะ... ขอตัว... กะ... กลับก่อนนะคะ~!"
10013090-159 = "[ns] \"อ่า... อื้ม... กลับดีๆ นะ\""
10013090-164 = "(หลังจากวาคาโมะจากไปแล้ว ครูก็กลับมาที่เดิมและเห็นว่าสถานการณ์คลี่คลายบ้างแล้ว)"
10013090-165 = "อ๊ะ! นายท่าน!"
10013090-166 = "จู่ๆ ก็หายไปแบบนี้ อิซุนะเป็นห่วงนะคะ!"
10013090-167 = "คุณครู... ไปห้องน้ำมาเหรอ?"
10013090-168 = "[s] \"เปล่าหรอก พอดีมีธุระอะไรนิดหน่อย...\""
10013090-169 = "คุณครู?! แล้วผู้อำนวยการของไคเซอร์ล่ะ?! ไม่สิ ต้องเรียกว่าพนักงานฝ่ายธุรกิจหรือเปล่า?! เอาเถอะ เขาไปอยู่ไหนแล้ว?!"
10013090-170 = "[s] \"ได้รับการพิพากษาอย่างยุติธรรมไปแล้วน่ะ\""
10013090-171 = "หะ... หืม? อาจจะไม่ได้เจอแล้ว หรืออาจจะโผล่ออกมาอีกก็ได้งั้นเหรอ...?"
10013090-172 = "หายไปแต่อาจกลับมาได้? คืออะไรล่ะนั่นน่ะ?"
10013090-173 = "[s] \"สถานการณ์เป็นยังไงบ้าง?\""
10013090-174 = "เราควบคุมสถานการณ์ไว้ได้บ้างแล้ว เด็กเจ้าปัญหาจากแก๊งหมวกกันน็อกส่วนใหญ่ก็โดนอัดซะยับ..."
10013090-175 = "พวกนั้นหนีหัวซุกหัวซุนไปแล้วค่ะ"
10013090-176 = "[s] \"หนีไปเหรอ?\""
10013090-181 = "พวกนั้นมีกันแค่ไม่กี่คน! ยังสู้ไม่ได้งั้นเหรอ?!"
10013090-182 = "โดนเด็กใหม่แก๊งหมวกกันน็อกจัดการมาเนี่ยนะ...? ว่าแล้วเชียว น่ากลัวจริงๆ!"
10013090-183 = "แต่ว่าพอมาลองคิดๆ ดูแล้ว ฉันเป็นคนรับพวกนั้นเข้ามาเองนี่นา"
10013090-184 = "อืม! คนอะไรตาถึงจริงๆ!"
10013090-185 = "สมกับเป็นหัวหน้าแก๊งหมวกกันน็อก! โคะมาคาเสะ ราบุ! ทำได้เยี่ยมมาก!"
10013090-186 = "เยี่ยมอะไรล่ะหัวหน้า! มันทำให้พวกเราซวยแบบนี้ต่างหากเล่า!!"
10013090-187 = "ฮึ่ย! ถ้าเป็นแบบนี้ละก็...! ถอนกำลังทั้งหมด!"
10013090-188 = "ครั้งหน้าไม่ยอมให้แน่! เจ้าเด็กพวกนี้! รู้ไว้ด้วยว่าถึงครั้งนี้พวกฉันจะแพ้...! แต่ก็เป็นความพ่ายแพ้เล็กๆ เท่านั้น...!"
10013090-189 = "ยังไงก็แพ้มั้ยเล่า!"
10013090-190 = "เฮือก?!"
10013090-196 = "[ns] \"เป็นอย่างนี้นี่เอง\""
10013090-197 = "คุณครูคะ!"
10013090-198 = "[s] \"ชิซุโกะ ทุกคนปลอดภัยมั้ย?\""
10013090-199 = "ค่ะ! พวกฉันไม่เป็นไรค่ะ! ไม่มีใครได้รับบาดเจ็บ และเราก็แก้ไขปัญหาได้ด้วยความช่วยเหลือจาก#nอะบิดอส..."
10013090-200 = "ที่สำคัญที่สุดคือ..."
10013090-204 = "ร้านเฮียกคิยาโคของเรา... ไม่สิ พรรคพวกของเราได้ชัยชนะมาแล้วค่ะ!"
10013090-205 = "[s] \"อื้ม เป็นการชนะจากการร่วมมือของทุกคนเลยนะ\""
10013090-206 = "สุดยอดไปเลยค่ะ! ชิซุโกะจัง!"
10013090-207 = "นี่ทำให้เราได้บริหารทั้ง <ลอสต์ พาราไดซ์ รีสอร์ต> ได้แล้วค่ะ!"
10013090-208 = "อื้ม! ถึงเราจะเจอเคราะห์ร้ายหลายอย่าง แต่ตอนนี้ก็เปิดร้านเฮียกคิยาโคได้อย่างไม่ต้องกังวลอะไร#nแล้วละค่ะ!"
10013090-214 = "หืม?"
10013090-215 = "เหมือนได้ยินเสียงเอะอะโวยวายจากที่ไหนเลยค่ะ"
10013090-222 = "อื้ม~ มาถึงแล้ว~! อื้มมม~ นี่สินะกลิ่นสดชื่นของฤดูร้อน!"
10013090-223 = "โมโมกะ พวกเราไม่ได้มาเที่ยวเล่นที่นี่ แต่มาทำงานกันนะคะ ทำตัวให้เหมาะสมกับที่เป็นสมาชิก#nองค์การนักเรียนหน่อยค่ะ"
10013090-224 = "ง่า~ รุ่นพี่นี่ก็เข้มงวดตลอดเลย~"
10013090-225 = "[s] \"รินกับโมโมกะ? มาทำอะไรที่นี่เหรอ?\""
10013090-226 = "อ๊ะ คุณครูก็อยู่ที่นี่ด้วย...?"
10013090-227 = "มะ... ไม่สิคะ พอลองมาคิดดูดีๆ แล้ว การมีชาเล่ต์เข้ามาแทรกแซงเมื่อเกิดความวุ่นวายขนาดนี้... ก็ไม่ใช่เรื่องน่าแปลก..."
10013090-228 = "ดะ... เดี๋ยวก่อน! องค์การนักเรียนมาทำอะไรถึงที่นี่ล่ะ? แล้วทำไมถึงวุ่นวายขนาดนี้?"
10013090-230 = "แหะๆ~ ลางสังหรณ์ไม่ค่อยจะดีเลย"
10013090-231 = "ค่ะ พวกฉันทราบเรื่องมาว่าที่ <ลอสต์ พาราไดซ์ รีสอร์ต> เกิดความวุ่นวายจากการอ้างสิทธิ์กันค่ะ"
10013090-232 = "แถมยังเป็นกระแสในโลกออนไลน์ ตอนนี้ชาวเน็ตทายกันให้วุ่นว่าใครจะเป็นผู้ชนะ"
10013090-233 = "แต่เดิมทีแล้ว ที่ดินนี้คือสิทธิ์ของ <องค์การนักเรียน> ค่ะ"
10013090-234 = "แต่เมื่อรู้ว่าสิทธิในการครอบครองที่ดินนี้ถูกปลอมแปลงจนเกิดความวุ่นวาย พวกฉันก็เลย#nเดินทางมาที่นี่ค่ะ"
10013090-235 = "จะบอกว่าที่นี่เป็นที่ของเรา และจะมาเอาคืนใช่มั้ยล่ะ?"
10013090-236 = "[s] \"เดี๋ยวนะ... นี่ก็แปลว่า...\""
10013090-238 = "ว่าไงนะ...?"
10013090-239 = "ฉันรู้ว่ามันกะทันหัน และการทำแต่ละอย่างก็ต้องมีขั้นตอนตามลำดับ ฉันจึงไม่ขอให้พวกคุณออก#nไปในทันทีหรอกค่ะ"
10013090-243 = "เพราะฉะนั้นแล้ว พวกคุณต้องออกไปที่นี่ภายใน 3 วันจากนี้..."
10013090-245 = "อุ๊ย..."
10013090-246 = "แบบนี้ทั้งหมดที่พวกเราฝ่าฟันกันมา..."
10013090-247 = "มัน... เปล่าประโยชน์เหรอ?!"
10013090-248 = "[s] \"สิทธิครอบครองที่ธนาคารทาโกะขายให้ตั้งแต่แรกเป็นของปลอมสินะ\""
10013090-250 = "เหอะๆ~ สมกับที่เป็นไคเซอร์ คอร์เปอเรชั่นเลยนะ"
10013090-251 = "มันไม่ใช่เรื่องที่จะยอมรับง่ายๆ แบบนี้นะ! รุ่นพี่โฮชิโนะ!"
10013090-252 = "แล้วที่พวกเราเหน็ดเหนื่อยกันมาล่ะ... ทำกันแบบนี้มันไม่เกินไปหน่อยเหรอ?!"
10013090-254 = "แน่นอนว่าพวกฉันเองก็รู้สึกขอโทษมากๆ ค่ะ แต่ตามกฎหมายแล้ว มันก็ช่วยไม่ได้..."
10013090-258 = "[ns] \"ชิซุโกะ\""
10013090-259 = "ชิซุโกะจัง..."
10013090-260 = "ท่านชิซุโกะ!"
10013090-262 = "ท่านประธาน!"
10013090-263 = "คุณแรคคูน?"
10013090-264 = "น้องหนูน่ารัก?"
10013090-266 = "เดี๋ยวสิ! ทำไมยิ่งเรียก ชื่อยิ่งแปลกล่ะ...!"
10013090-267 = "เฮ้อ... เข้าใจแล้ว เข้าใจแล้ว~!"
10013090-268 = "[s] \"ไม่เป็นไรแน่นะ?\""
10013090-269 = "ค่ะ! ไม่เป็นไรอยู่แล้วค่ะ! เห็นอย่างนี้แต่พวกฉันก็เข้าใจอะไรเร็วอยู่นะคะ!"
10013090-270 = "แต่ว่า! ฉันมีเงื่อนไขบางอย่าง!"
10013090-271 = "เงื่อนไข... งั้นเหรอคะ?"
10013090-272 = "ก่อนที่พวกฉันจะออกไป!"
10013090-273 = "ฉันจะจัดงานเลี้ยงร้านเฮียกคิยาโค!"
10013090-274 = "เพราะไหนๆ ทุกคนก็เหนื่อยด้วยกันมาแล้ว เรามาจัดเทศกาลกันสักครั้ง ก็ไม่น่าเสียหายเนอะ?!"
10013090-275 = "อื้ม~ เห็นด้วย~"
10013090-276 = "โมโมกะ?!"
10013090-277 = "[s] \"ขอร้องละ ริน\""
10013090-278 = "คุณครูก็เป็นไปกับเขาด้วยเหรอคะ..."
10013090-289 = "ก็ได้ค่ะ ถ้าขอกันถึงขนาดนี้..."
10013090-295 = "อื้ม! ถ้างั้นเราก็มาเตรียมงานกันเลย!"

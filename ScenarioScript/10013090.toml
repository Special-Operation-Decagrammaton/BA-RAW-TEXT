[translation]
10013090-1 = "第9話;於是夏天的尾聲到來"
10013090-5 = "野乃美要上囉～☆"
10013090-9 = "痛痛痛痛！這些傢伙果然強的一塌糊塗啊！？"
10013090-10 = "唔嘿～也沒什麼啦～"
10013090-11 = "好，就順著這個氣勢……！"
10013090-12 = "咦？靜子閣下！主公到哪去了……？"
10013090-13 = "咦……？"
10013090-19 = "為什麼……為什麼會變成這樣！#n不可能是我引來阿拜多斯那群傢伙的吧！"
10013090-20 = "好不容易走到這一步了……那些傢伙又要來妨礙我！"
10013090-21 = "[s] 「你還真是倒楣呢。」"
10013090-22 = "……但是經歷剛才的事之後，我也並非什麼都沒學到！"
10013090-23 = "學生們展現的優異合作──#n全部都是因為你在才成立的。"
10013090-24 = "所以只要除掉你，我們就還有機會！"
10013090-25 = "[s] 「所以才把我抓走了，是嗎。」"
10013090-26 = "哈！在這種情況還能一派輕鬆……真是可笑。"
10013090-27 = "但是，這也到此為止了。現在開始就在他們的面前把你當肉盾來用吧！"
10013090-28 = "現在後悔也來不及了！"
10013090-29 = "[s] 「……真不巧，以前也發生過類似的事情呢。」"
10013090-30 = "……？"
10013090-31 = "[s1] 「沒想到會在這種時候想起那件事啊。」\n[s2] 「真不知道時機是好還是壞……」"
10013090-34 = "你到底在說什麼……"
10013090-42 = "剛，剛才那是！？"
10013090-43 = "阿拜多斯的那些傢伙應該忙著應付頭盔團才對啊！"
10013090-51 = "老，老大！出大事了！#n外，外圍有身分不明的敵人正在接近！"
10013090-52 = "警戒級別是……紅色！"
10013090-53 = "你說紅色警戒……？#n那怎麼可能──"
10013090-61 = "唔呵……"
10013090-66 = "唔呵呵呵……"
10013090-70 = "唔呵呵呵呵呵！！！！"
10013090-72 = "什麼！竟然有增援！？"
10013090-74 = "[ns] 「嗨，若藻。謝謝你過來一趟。」"
10013090-75 = "是的！若藻我正好在附近，聽見您的聲音便連忙趕來了！"
10013090-76 = "前些日子因為我的誤會讓您見笑了……"
10013090-77 = "……然而這次是由閣下親自呼喚了我。"
10013090-78 = "因此若藻我，現在立刻就將閣下從惡黨的手中救出來！"
10013090-79 = "開，開火！！"
10013090-83 = "唔呵呵呵，沒用的……沒錯，毫無用處！"
10013090-87 = "在若藻我對老師的愛面前，根本不值一提！"
10013090-99 = "可惡啊！"
10013090-103 = "[ns] 「啊，跑走了。」"
10013090-107 = "可惡！只好撤退了！現在立刻派直升機過來！"
10013090-108 = "是，是！"
10013090-113 = "阿拜多斯和夏萊，還有百夜堂……！"
10013090-114 = "這次就先放過你們。#n但是，下次再遇到的時候……！"
10013090-120 = "試圖傷害我深愛的老師的愚蠢之人──"
10013090-121 = "以為我會就這麼放過你們嗎？"
10013090-125 = "咦……？"
10013090-136 = "（就這樣，凱薩董事（？）所引發的騷動至此告一段落）"
10013090-141 = "[ns] 「謝謝你，若藻。給你添麻煩了呢。」"
10013090-142 = "別，別這麼說！#n雖然是誤會，能在此償還先前的過錯反而該說是幸運……"
10013090-143 = "這個，那個……"
10013090-149 = "若藻有……幫上閣下的，忙嗎……？"
10013090-150 = "[s] 「當然囉，說是救命恩人也不為過唷。」"
10013090-151 = "我，我是……！閣下的，恩人……！？"
10013090-152 = "啊，啊啊，啊啊啊啊！我……我明明對閣下犯下了無可挽回的過錯！#n您卻一如往常地向我訴說溫柔的話語……！"
10013090-153 = "[s] 「那個，可以的話一起回──」"
10013090-154 = "若藻我，已無法壓抑這份喜悅！"
10013090-155 = "那個……請，請，請容我先行告辭──！"
10013090-159 = "[ns] 「啊，嗯。注意安全喔……」"
10013090-164 = "（目送若藻離開並回到現場後，似乎已經處理得差不多了）"
10013090-165 = "啊！主公！"
10013090-166 = "主公突然不見蹤影，伊樹菜好擔心您啊！"
10013090-167 = "老師……去上廁所了嗎？"
10013090-168 = "[s] 「不是喔，剛才有點事。」"
10013090-169 = "老師，凱薩董事呢！？#n啊，現在只是普通職員才對吧？總之，那傢伙呢！？"
10013090-170 = "[s] 「遭到報應了唷。」"
10013090-171 = "原來如此……咦？說不定還會出現，也可能不會再出現了？"
10013090-172 = "什麼意思？像是薛丁格的什麼之類的？"
10013090-173 = "[s] 「話說回來情況如何？」"
10013090-174 = "頭盔團大部分都已經打倒了，但……"
10013090-175 = "他們似乎都很有精神地逃走了呢……？"
10013090-176 = "[s] 「逃走了？」"
10013090-181 = "明明是我們人更多為什麼還是處於劣勢啊！？"
10013090-182 = "新人的力量，真是可怕……！"
10013090-183 = "啊，不過仔細想想，他們也是我選拔出來的……"
10013090-184 = "嗯！果然我很有看人的眼光呢！"
10013090-185 = "不愧是頭盔團的幹部！河駒風良舞！"
10013090-186 = "我們可是因此受了不少苦啊！？隊長！"
10013090-187 = "哎！這樣的話……所有人，撤退──！"
10013090-188 = "你們給我記住！這次確實是我們輸了……#n但是，這只不過是小小的失敗而已！長遠來看的話──"
10013090-189 = "就算長遠來看輸了還是輸了啊！"
10013090-190 = "呃！？"
10013090-196 = "[ns] 「……之前好像也是這樣呢。」"
10013090-197 = "啊，老師！"
10013090-198 = "[s] 「靜子，你那邊還好嗎？」"
10013090-199 = "是！我們都沒事！#n多虧了阿拜多斯的各位，沒有出現傷員。"
10013090-200 = "不僅如此！"
10013090-204 = "這是百夜堂的……不，是我們的勝利！"
10013090-205 = "[s] 「嗯，是大家齊心協力的結果呢。」"
10013090-206 = "成功了呢，靜子醬！"
10013090-207 = "這樣一來，終於能夠營運這個「失樂園渡假勝地」了呢！"
10013090-208 = "就是說啊……雖然發生了很多事……#n不過，接下來就能安心地開始進行百夜堂的獨佔生意了！"
10013090-214 = "咦？"
10013090-215 = "好像從哪傳來了吵雜的聲音呢……？"
10013090-222 = "好耶，到達現場。嗯！充滿了夏天的氣息，我喜歡！"
10013090-223 = "桃香，我們並不是來玩，是來工作的。#n請做出聯邦學生會成員該有的行動。"
10013090-224 = "哎～前輩也太嚴格了吧？"
10013090-225 = "[s] 「琳和桃香？你們怎麼來了？」"
10013090-226 = "老師您才是，為何會在這裡呢？"
10013090-227 = "……不，都發生這麼大的騷動了，有夏萊介入也不奇怪。"
10013090-228 = "等，等等！為什麼聯邦學生會會出現在這裡！？#n還有你剛才是說這麼大的騷動！？"
10013090-230 = "唔嘿～好像有種不好的預感呢～"
10013090-231 = "我們也確認到這裡發生了與「失樂園渡假勝地」所有權相關的一連串騷動。"
10013090-232 = "正好網路上也很關注呢，究竟是誰輸誰贏～"
10013090-233 = "但是，這裡本來就是我們「聯邦學生會」所擁有的土地。"
10013090-234 = "既然因為偽造的權利書而引起騷動，我們也只好親自走一趟了。"
10013090-235 = "簡單來說，就是來收回自己的東西的感覺？"
10013090-236 = "[s] 「也就是說……」"
10013090-238 = "…………咦？"
10013090-239 = "當然，我們也清楚這個要求並不合情理，再加上還有手續需要處理……#n所以並不會要求你們立刻離開。"
10013090-243 = "嗯……就請你們在三天內離開這裡吧。"
10013090-245 = "哎呀哎呀……"
10013090-246 = "……這樣一來，我們至今為止所做的……全都……"
10013090-247 = "全都是白忙一場嗎──！？"
10013090-248 = "[s] 「竟然連權利書都是假的……」"
10013090-250 = "唔嘿～真像是凱薩公司會做出來的事呢。"
10013090-251 = "呃，星野前輩……這好像不是一句話就能解決的問題。"
10013090-252 = "這種事要人怎麼接受……太過分了吧！？"
10013090-254 = "我們也感到十分抱歉。#n只可惜我們也別無他法……"
10013090-258 = "[ns] 「靜子……」"
10013090-259 = "靜子醬……"
10013090-260 = "靜子閣下……"
10013090-262 = "社長……"
10013090-263 = "狸貓同學……"
10013090-264 = "可愛的小姑娘……"
10013090-266 = "……不不！後面的那些稱呼越來越難回應了……！"
10013090-267 = "唉……我知道了，我知道了啦！"
10013090-268 = "[s] 「沒事吧？」"
10013090-269 = "當然！別看我這樣，我轉換心情可是非常快的喔！"
10013090-270 = "作為交換！我有個條件！"
10013090-271 = "條件……是嗎？"
10013090-272 = "在離開這裡之前！"
10013090-273 = "要由百夜堂舉行宴會！"
10013090-274 = "大家都這麼努力了，這種程度沒問題的吧？"
10013090-275 = "哦，聽起來不錯呢～"
10013090-276 = "桃香！？"
10013090-277 = "[s] 「我也拜託你了，琳。」"
10013090-278 = "連，連老師都……"
10013090-289 = "我明白了……如果只是這樣的話……"
10013090-295 = "好！那麼大家就趕快開始準備吧！"
10013090-297 = "喔──！"
10013090-310 = "來吧！開始囉！"
10013090-311 = "大家的慶功宴！"
10013090-315 = "來來來，儘管吃吧！我們可是準備了不少喔！"
10013090-318 = "哦哦，這是伊樹菜喜歡的味道！太好吃了！"
10013090-319 = "啊，主公要不要吃一口呀？"
10013090-322 = "呵呵呵。大家看起來都很開心呢。"
10013090-329 = "………咻咻，風？"
10013090-334 = "啊啊啊～真是累死我了～"
10013090-336 = "但是也久違地運動到了。"
10013090-337 = "啊哈哈，白子醬真喜歡運動呢～"
10013090-339 = "話說回來，真是被靜子同學的能力嚇到了呢。#n不只是準備這個宴會，只要是和辦活動相關的事情都是專業級的呢。"
10013090-340 = "就是說呀。要是有機會的話，之後要辦阿拜多斯沙漠慶典的時候還真想向他請教呢。"
10013090-341 = "……嗯！說的沒錯！"
10013090-342 = "嗯！等到沙漠慶典可以重新舉辦的時候一定要！"
10013090-344 = "呵呵，要是能像這次一樣協助我們，應該能辦得很開心☆#n對吧，白子醬？"
10013090-345 = "……嗯。"
10013090-350 = "啊，這個真好吃。"
10013090-351 = "確實如此……"
10013090-353 = "這……就是百鬼夜行的味道嗎。"
10013090-358 = "[ns] 「……事情就是這樣。」"
10013090-360 = "哦哦～原來如此原來如此。#n結果錯的是我，靜子同學才是對的呢。"
10013090-361 = "唉呀～身為陰陽部的部長真是太慚愧了。"
10013090-362 = "[s] 「但是，這麼一來靜子投資的錢全都沒了……」"
10013090-363 = "啊，那個的話不用擔心。"
10013090-364 = "我已經申請對那筆基金進行資產凍結了～"
10013090-365 = "唔呵呵～凱薩公司的漏洞也不少，要在背後動手腳出乎意料的容易呢。"
10013090-366 = "所以雖然得花一些時間，那筆錢應該是能回到他手中的。"
10013090-367 = "[s] 「仁耶，其實你很擔心靜子對吧？」"
10013090-369 = "喵哈哈，誰知道呢？"
10013090-371 = "[ns] 「要是仁耶沒有通知我的話──」"
10013090-375 = "[ns] 「我想得知是詐欺的靜子，應該會一個人扛起責任吧。」"
10013090-377 = "您認為這是我行動的理由，是嗎？"
10013090-378 = "唔呵呵～該怎麼回答才好呢～我完全不明白您的意思呢～"
10013090-379 = "不過在這次的事件中，我和靜子同學毫無疑問是處於對立的立場哦。"
10013090-380 = "隨意的猜測會讓雙方抱有不應有的期待。"
10013090-381 = "所以就請當作是這樣吧。喵哈哈。"
10013090-382 = "[s] 「嗯，那就當作是這樣吧。」"
10013090-387 = "[ns] 「不過至少要有人明白這些，對吧？」"
10013090-388 = "（於是最後……）"
10013090-396 = "[ns] 「你在這裡呀，靜子。」"
10013090-397 = "啊，老師……"
10013090-403 = "可能因為宴會太忙碌，感覺有點累了……明明平常不會這樣的，真是奇怪。"
10013090-404 = "……或許是因為事情接連不斷地發生，所以才會這樣吧。"
10013090-405 = "[s] 「真是辛苦你了。」"
10013090-406 = "哈啊～～～！真的好累呀～！"
10013090-407 = "所以請多多安慰我！多稱讚我吧！多一點！再多一點！"
10013090-408 = "[s] 「嗯，如果沒有靜子，我想肯定沒辦法完成這些。」"
10013090-409 = "……雖然是我自己要求的，一聽到這些話還是有點害羞呢。"
10013090-410 = "但是，算了……反正事情都解決了，結果OK就好了！"
10013090-411 = "[s] 「但是，就這樣結束的話不會覺得有點可惜嗎？」"
10013090-412 = "咦？為什麼會這麼說呢，老師。"
10013090-413 = "[s] 「咦？」"
10013090-414 = "我並沒有覺得可惜唷？"
10013090-416 = "確實，到處跑來跑去還四處碰壁，再回頭看看自己犯的錯……"
10013090-417 = "還真的是挺辛苦的……"
10013090-418 = "不過，要是在那個陰陽部的部長面前承認的話，總覺得有種認輸的感覺……#n所以才會這麼堅持……"
10013090-420 = "但是，多虧有大家和老師──"
10013090-421 = "才讓我深切認知到這個選擇沒有錯。"
10013090-423 = "而且，也充分享受過這個夏天了……"
10013090-424 = "雖然甜蜜中帶點苦澀，但是獲得了非常幸福且寶貴的回憶……"
10013090-425 = "我不覺得有留下遺憾……"
10013090-427 = "反而應該說是大成功呢。"
10013090-428 = "[s] 「聽你這麼說我就放心了。」"
10013090-432 = "[s] 「因為我也是這麼想的。」"
10013090-433 = "耶嘿嘿！嗯！"
10013090-434 = "那麼這個話題就到這裡結束。重要的是未來！所以──"
10013090-440 = "今後我們百鬼夜行節慶營運管理部──"
10013090-441 = "還有部長河和靜子我，還請多多指教囉？"
10013090-442 = "老師♪"
10013090-443 = "出差！百夜堂大海之家加盟計畫"

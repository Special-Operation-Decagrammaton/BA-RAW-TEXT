10013090-20 = "Why...would they follow me all the way here?! Abydos!! Just when everything was coming together!"
10013090-21 = "[s] \"Yup. Not your lucky day.\""
10013090-22 = "...But I learned something from the past!"
10013090-23 = "The amazing unity and strength the students showed was possible because of you, Sensei!"
10013090-24 = "So, if I get rid of you, I'll be able to turn the tables!"
10013090-25 = "[s] \"That's why you abducted me.\""
10013090-26 = "Ha! You're playing it cool. How funny."
10013090-27 = "That's right! I'll use you as a hostage and shield against the Abydos brats!"
10013090-28 = "It's too late to regret getting involved in this!"
10013090-29 = "[s] \"Well, this isn't my first rodeo.\""
10013090-30 = "...?"
10013090-31 = "[s1] \"I'm remembering unpleasant things.\" \n[s2] \"Though... I guess it's good timing.\""
10013090-34 = "What are you talking about?!"
10013090-42 = "Wh-What's going on?!"
10013090-43 = "Did the Helmet Gangsters manage to subdue the Abydos brats?"
10013090-51 = "B-Boss! Report! U-Unidentified enemies are approaching from the outskirts!"
10013090-52 = "Crimson...pattern!"
10013090-53 = "Crimson...? Pattern...? What is that nonsense?"
10013090-61 = "Teeheehee."
10013090-66 = "Teeheeheehee."
10013090-70 = "Teeheeheeheeeee!"
10013090-72 = "Enemy reinforcements?!"
10013090-74 = "[ns] \"Hi, Wakamo. Thanks for coming so quickly.\""
10013090-75 = "Naturally! I ran right over as soon as I got your message!"
10013090-76 = "I promised I wouldn't make the same mistake I did last time!"
10013090-77 = "But this time you called for me! Heehee!"
10013090-78 = "I'll rescue you from the villains right now!"
10013090-79 = "Sh-Shoot!"
10013090-83 = "Heehee. No use! That won't work against me!"
10013090-87 = "Nothing can stop my love for Sensei!"
10013090-99 = "Damn it!"
10013090-103 = "[ns] \"Oh, they're running away.\""
10013090-107 = "Ugh! We have no choice. Retreat! Start the helicopter!"
10013090-108 = "U-Understood!"
10013090-113 = "Ugh! Abydos! Schale Sensei! And the Momoyodou brats!"
10013090-114 = "Today may be my defeat, but I won't lose the war!"
10013090-120 = "Do you think you can get away from me?"
10013090-121 = "You tried to harm my beloved Sensei. Allow me to teach you the error of your ways."
10013090-125 = "Uh..."
10013090-136 = "After a small commotion with the ex-Kaiser director..."
10013090-141 = "[ns] \"Thanks, Wakamo. And sorry to inconvenience you.\""
10013090-142 = "D-Don't apologize! I'm just happy I got to make up for my mistake last time."
10013090-143 = "So... Umm..."
10013090-149 = "Did I...help Sensei?"
10013090-150 = "[s] \"Yes, you saved me. You saved my life.\""
10013090-151 = "I...saved your life?"
10013090-152 = "O-Oh my! I was so afraid I would never be forgiven for my previous mistake! But Sensei's kindness is infinite!"
10013090-153 = "[s] \"Yeah... If you want, we can go back together and...\""
10013090-154 = "I'm so happy, I can't contain myself!"
10013090-155 = "I-I have to l-l-leave!"
10013090-159 = "[ns] \"Oh, okay... Bye.\""
10013090-164 = "After Wakamo left, I returned to the scene, where the situation was mostly sorted out."
10013090-165 = "Oh, my lord!"
10013090-166 = "Izuna was so worried when you suddenly disappeared!"
10013090-167 = "Sensei... Were you in the bathroom?"
10013090-168 = "[s] \"No. I just had to take care of something.\""
10013090-169 = "Sensei?! What about the Kaiser director? I mean, the salesperson? I'm gonna beat him up!"
10013090-170 = "[s] \"He was judged by justice.\""
10013090-171 = "H-Huh? Who judged him?!"
10013090-172 = "What the heck does that mean?"
10013090-173 = "[s] \"Don't worry about it. How are things here?\""
10013090-174 = "We defeated most of the Helmet Gangsters."
10013090-175 = "But then they ran away!"
10013090-176 = "[s] \"They got away?\""
10013090-181 = "We're being pushed back with a troop of this size?!"
10013090-182 = "Is this all the new Helmet Gangsters recruits can do? Who let them in?!"
10013090-183 = "Oh, actually, I chose them myself."
10013090-184 = "Weird! I usually have an eye for stuff like this."
10013090-185 = "After all, I am Komakaze Rabu, a Helmet Gangster officer!"
10013090-186 = "We know who you are! More importantly, we're about to be annihilated! Captain Rabu?!"
10013090-187 = "Ugh! At this point... Everyone, retreat!"
10013090-188 = "I'll see you bastards again! If we look at the bigger picture, this small defeat means..."
10013090-189 = " It just means defeat!"
10013090-190 = "Ugh?!"
10013090-196 = "[ns] \"Well, I'm not sad to see them go.\""
10013090-197 = "Sensei!"
10013090-198 = "[s] \"Shizuko! Is anyone hurt?\""
10013090-199 = "We're fine! There were no casualties, and we were able to solve the problem thanks to Abydos' help..."
10013090-200 = "More importantly!"
10013090-204 = "Finally, Momoyodou...no, we all won!"
10013090-205 = "[s] \"Yes, great job. You've achieved it by working together.\""
10013090-206 = "Amazing, Shizuko!"
10013090-207 = "Now with this, we can run the entire Lost Paradise Resort! Like one giant festival!"
10013090-208 = "Yeah! It might've been a bumpy road, but now we can run the genuine business of Momoyodou!"
10013090-214 = "Huh?"
10013090-215 = "I think I heard a loud noise from somewhere."
10013090-222 = "We've arrived at the scene! Mmm, the smell of summer!"
10013090-223 = "Momoka, we are here on business. Please conduct yourself as a member of the General Student Council."
10013090-224 = "Yeah, yeah. I get it. Don't have fun."
10013090-225 = "[s] \"Rin and Momoka? What are you doing here?\""
10013090-226 = "Sensei? What are you doing here?"
10013090-227 = "It seems wherever there is conflict, there is Schale."
10013090-228 = "W-Wait! What's the General Student Council doing here? What do you mean by conflict?"
10013090-230 = "Heh! Now this will be fun."
10013090-231 = "We've confirmed an ongoing conflict, involving the ownership of the Lost Paradise Resort."
10013090-232 = "It was all over the Internet. Everyone was arguing about who won and who lost."
10013090-233 = "However, the General Student Council owns the right to this land."
10013090-234 = "We found out about the fighting here, caused by a counterfeit land title, and came to handle it personally."
10013090-235 = "In other words, this place belongs to us, so we're here to take it back."
10013090-236 = "[s] \"Oh, so...that means...\""
10013090-238 = "...What?"
10013090-239 = "I know it's sudden, and there's a process to this, so we're not asking you to leave right now."
10013090-243 = "We can give you three days to vacate..."
10013090-245 = "Um... Umm..."
10013090-246 = "So, all of our work...everything we did..."
10013090-247 = "All of it was for nothing?"
10013090-248 = "[s] \"I guess the rights the Octopus Bank sold were fake.\""
10013090-250 = "Heh! How typical of the Kaiser Corporation."
10013090-251 = "Don't try to just \"heh\" this one away, Hoshino!"
10013090-252 = "We worked so hard though... I really took initiative..."
10013090-254 = "While I am very sorry to hear that, I cannot circumvent proper process and regulations."
10013090-258 = "[ns] \"Shizuko.\""
10013090-259 = "Shizuko..."
10013090-260 = "Shizuko!"
10013090-262 = "Boss!"
10013090-263 = "Raccoon?"
10013090-264 = "Cutie pie?"
10013090-266 = "Stop it! I'm not a raccoon, or a cutie pie...or a boss anymore."
10013090-267 = "I'm fine! Okay!"
10013090-268 = "[s] \"Are you sure?\""
10013090-269 = "Yup! I mean it! I'm pretty adaptable, you know."
10013090-270 = "However, I have one request!"
10013090-271 = "What would that be?"
10013090-272 = "Before we leave..."
10013090-273 = "Momoyodou would like to hold a banquet!"
10013090-274 = "We suffered through so much! We even drove the bad guys out. We deserve at least one party...don't we?"
10013090-275 = "Yeah! I approve!"
10013090-276 = "Momoka?!"
10013090-277 = "[s] \"Please, Rin.\""
10013090-278 = "Even Sensei..."
10013090-289 = "Okay. I guess that's fine..."
10013090-295 = "Yay! We need to begin preparations right away!"
10013090-297 = "Yeah!"
10013090-310 = "Okay! Let's begin, everyone!"
10013090-311 = "Let's have a banquet to celebrate our victory!"
10013090-315 = "Dig in, everyone! We have more than enough food!"
10013090-318 = "Wow! This hits the spot! So delicious!"
10013090-319 = "Oh, my lord! Do you wanna try too?!"
10013090-322 = "Heeheehee. Everyone is having a blast."
10013090-329 = "...Swoosh, swoosh, wind?"
10013090-334 = "Ahh! What a rough summer!"
10013090-336 = "But it was a great workout."
10013090-337 = "Haha. Shiroko's happy as long as she's exercising."
10013090-339 = "This banquet is really impressive, Shizuko. You're a pro when it comes to preparing a festival."
10013090-340 = "I know! You gotta come help us when we finally host the Oasis Festival again!"
10013090-341 = "That'd be awesome!"
10013090-342 = "Yes! When the Oasis Festival happens one day, we would love that."
10013090-344 = "Heehee, it'd be fun to work together again. Right, Shiroko?"
10013090-345 = "...Yeah."
10013090-350 = "Oh, this is delicious."
10013090-351 = "Right..."
10013090-353 = "This is...a taste of Hyakkiyako."
10013090-358 = "[ns] \"...That's how it turned out.\""
10013090-360 = "Oh, yes. Indeed, I was wrong and Shizuko was right!"
10013090-361 = "Bwahaha! As the president of the Yin-Yang Club, I'm ashamed."
10013090-362 = "[s] \"The funds Shizuko invested in the Octopus Bank might be lost though.\""
10013090-363 = "Oh, don't worry about that."
10013090-364 = "I've frozen all the assets for the funds."
10013090-365 = "Heehee. I wasn't just twiddling my thumbs over here! Kaiser Corporation isn't perfect. It was easy to circumvent them."
10013090-366 = "It might take some time, but we'll get every penny back."
10013090-367 = "[s] \"Did you send me here to help Shizuko from the start?\""
10013090-369 = "...Hahahaha. Not sure what you mean."
10013090-371 = "[ns] \"You knew Shizuko was going to try to solve it without your help.\""
10013090-375 = "[ns] \"If you hadn't gotten me, she would've had to do it alone.\""
10013090-377 = "Are you accusing me of going out of my way to help?"
10013090-378 = "Heehee. I don't know what you're talking about!"
10013090-379 = "I was Shizuko's foolish adversary who didn't believe in her."
10013090-380 = "I wouldn't make any assumptions... They can set unrealistic expectations."
10013090-381 = "Well, you can think whatever you want, though."
10013090-382 = "[s] \"As you wish, Niya.\""
10013090-387 = "[ns] \"But at least one person should recognize your good deed.\""
10013090-388 = "And lastly..."
10013090-396 = "[ns] \"Shizuko, there you are.\""
10013090-397 = "Oh, Sensei..."
10013090-403 = "I got a little tired from serving at the banquet. I normally have better stamina for this stuff."
10013090-404 = "Well, I guess a lot did happen though."
10013090-405 = "[s] \"You did really well, Shizuko.\""
10013090-406 = "Argh! I'm exhausted!"
10013090-407 = "So I need more comfort! And compliments! More please, Sensei."
10013090-408 = "[s] \"The group wouldn't have gotten this far without you.\""
10013090-409 = "I know I asked for it, but now I'm blushing."
10013090-410 = "But I am proud I cleaned up my mess! Things are good now!"
10013090-411 = "[s] \"Isn't it kind of bittersweet?\""
10013090-412 = "Huh? What do you mean, Sensei?"
10013090-413 = "[s] \"Hm?\""
10013090-414 = "I don't have any regrets!"
10013090-416 = "Looking back at my struggles and mistakes..."
10013090-417 = "...is very painful..."
10013090-418 = "I was stubborn in front of Niya because I didn't want to admit how scared I was."
10013090-420 = "But everyone supported me, and I knew I made the right choice."
10013090-421 = "More than anything, you supported me Sensei."
10013090-423 = "Thanks to you, I got to have a real taste of summer."
10013090-424 = "Maybe it is a little bittersweet."
10013090-425 = "But it's more sweet than bitter... I made a lot of great memories!"
10013090-427 = "So I have no regrets whatsoever. It's a success in my book."
10013090-428 = "[s] \"Yeah? That's great.\""
10013090-432 = "[ns] \"I feel the same way.\""
10013090-433 = "Heeheehee. Yes!"
10013090-434 = "The Resort Hunt ends here! What matters is the future!"
10013090-440 = "Please keep looking after the Hyakkiyako Festival Department."
10013090-441 = "And me, Kawawa Shizuko, of course!"
10013090-442 = "Sensei!"
10013090-443 = "Business Trip! Momoyodou Beach Shack Franchise Plan"

[translation]
10013090-1 = "Episode 9;The End of Summer"
10013090-5 = "Here I come! ☆"
10013090-9 = "Argh! You bastards! They're so strong!"
10013090-10 = "Heh! Can I take a nap?"
10013090-11 = "We're almost there, everyone!"
10013090-12 = "Shizuko! Shizuko!! My lord is missing!"
10013090-13 = "Huh?"

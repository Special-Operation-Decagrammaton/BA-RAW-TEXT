[translation]
1000105-1 = "最新流行研究（２）"
1000105-2 = "奇普托斯．市區"
1000105-3 = "嗨，老師。我剛才正好新得知了一件事。"
1000105-4 = "根據學校朋友的說法，最近好像很流行一起去KTV唱歌。"
1000105-5 = "我實在不懂一群人聚集在小房間裡唱歌到底哪裡有趣了……"
1000105-6 = "但比起不嘗試就妄下評論，實際嘗試還比較有效率。"
1000105-7 = "來，老師，我們現在一起去KTV吧。"
1000105-8 = "[s] 「比起我，跟朋友一起去應該更開心吧？」"
1000105-9 = "不行，KTV是很危險的。"
1000105-10 = "[s] 「KTV很危險？」"
1000105-11 = "KTV包廂是個狹小的密閉空間，而且有優良的隔音效果，外面的人根本不可能知道裡面發生了什麼事。"
1000105-12 = "如果在那裡面被什麼危險人物攻擊的話……我一定連反擊的機會都沒有。"
1000105-13 = "所以我判斷，先和老師這個值得信任的「戰友」一起去比較好。"
1000105-15 = "走吧，我們就一起去唱歌……不對，我們一起去調查KTV吧。"
1000105-17 = "（之後，和英美一起在KTV盡情歡唱了）"
1000105-18 = "（英美的歌唱實力比想像中還好，讓我大吃一驚……）"

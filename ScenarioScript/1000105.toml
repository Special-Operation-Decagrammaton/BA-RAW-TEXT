[translation]
1000105-1 = "#title;최신 유행 연구 2"
1000105-2 = "#place;키보토스 시내"
1000105-3 = "3;에이미;03;선생님, 어서 와. 마침 새로운 걸 알아낸 참이었어.\n#3;greeting\n#3;em;[음표]\n#3;a"
1000105-4 = "3;에이미;02;학교 친구들의 말에 의하면 요즈음은 노래방에서 같이 노래를 부르는 게 유행인가 봐."
1000105-5 = "3;에이미;04;좁은 방 안에 모여서 노래를 부르는 게 즐겁다니, 이해할 수는 없지만……\n#3;em;[...]"
1000105-6 = "3;에이미;99;직접 가보지도 않고 판단하는 건 비효율적인 일이겠지."
1000105-7 = "3;에이미;03;자, 선생님. 지금부터 같이 노래방에 가는 거야.\n#3;em;[반짝]"
1000105-8 = "[s] \"나보다는 친구들과 함께 가는 게 더 즐겁지 않을까?\""
1000105-9 = "3;에이미;05;그건 안 돼. 노래방은 위험하거든.\n#3;em;[반응]"
1000105-10 = "[s] \"노래방이 위험하다고?\""
1000105-11 = "3;에이미;99;노래방은 밀폐된 좁은 공간인 데다가, 방음도 잘 되어있어 밖에서는 무슨 일이 벌어지는 지 알 수 없어."
1000105-12 = "3;에이미;05;그 안에서 자칫 위험한 인물로부터 공격을 받는다면…… 나는 꼼짝없이 당하고 말겠지.\n#3;em;[!]"
1000105-13 = "3;에이미;03;그러니까 이번에는 믿을 수 있는 <전우>인 선생님과 함께 가는 게 맞아."
1000105-14 = "3;에이미;03\n#3;d\n#wait;1000"
1000105-15 = "3;에이미;03;자, 그럼 같이 노래를 부르러…… 아니, 노래방을 취재하러 함께 가자.\n#3;em;[반짝]\n#3;a\n#3;closeup"
1000105-16 = "#all;hide"
1000105-17 = "#na;이후, 에이미와 함께 노래방에서 열심히 노래를 불렀다."
1000105-18 = "#na;생각보다 에이미의 노래 실력이 좋아서 깜짝 놀랐다……"

[translation]
1000105-1 = "Trend Research 2"
1000105-2 = "City of Kivotos"
1000105-3 = "Hello, Sensei. I just discovered something new."
1000105-4 = "According to my school friends, singing together at karaoke has become quite popular."
1000105-5 = "I don't really understand how singing together in a small room could be fun..."
1000105-6 = "..but it'd be inefficient to jump to conclusions before trying it myself."
1000105-7 = "Now, Sensei. Let us go to karaoke together."
1000105-8 = "[s] \"Wouldn't it be more fun to go with your friends?\""
1000105-9 = "That isn't an option. Karaoke is a dangerous place."
1000105-10 = "[s] \"And what exactly is dangerous about karaoke?\""
1000105-11 = "It's a small, confined, soundproofed space. We'll be cut off from the outside."
1000105-12 = "If we were to be attacked there...I wouldn't stand a chance."
1000105-13 = "So it's only right that I go with Sensei, my trustworthy comrade."
1000105-15 = "Now, let's go sing... I mean, investigate this karaoke stuff."
1000105-17 = "After that, I sang my heart out with Eimi at karaoke."
1000105-18 = "I was surprised Eimi could sing so well..."

[translation]
10015060-1 = "第6話;名為應援的戰車"
10015060-9 = "那個機器人是怎麼回事？也太硬了吧？"
10015060-18 = "真紀的穿甲彈不但沒有對其造成傷害，反而全被彈開了……那到底是什麼材質？"
10015060-19 = "而且還有恐怖的瞬間加速力，就連想瞄準車身都很困難。"
10015060-21 = "工程師部的那幫傢伙……在這麼短的時間內就創造出了這樣的怪物……"
10015060-23 = "哈哈，聽你這樣說，真是不好意思呢。"
10015060-24 = "畢竟既然收到委託就不能隨便應付了事……"
10015060-25 = "「將委託做到最好！」是我們工程師部的座右銘。"
10015060-27 = "這不是在稱讚！！"
10015060-36 = "哈啊，哈啊……甩掉他們了嗎？"
10015060-37 = "話說回來，那個機器人好厲害……！"
10015060-38 = "真不愧是千年的巨匠們打造的作品……"
10015060-39 = "如果是具備這種戰鬥力的機器人，肯定能限制住學生們的行動吧。"
10015060-40 = "……話說工程師部原本是想把這麼可怕的戰車投入大運動會嗎？"
10015060-41 = "那種事怎樣都無所謂吧。#n現在想到大運動會，也只會勾起不好的回憶而已……"
10015060-42 = "總之，不能讓對方找到我們的藏身之地！"
10015060-48 = "嗚，嗚哇！往這邊過來了！"
10015060-49 = "喂，真紀，不要推！快跌倒了……！"
10015060-51 = "詠葉部長，沒有辦法讓那輛戰車停下來嗎？#n這是你們製造的東西吧！"
10015060-52 = "很抱歉，以我們現在的力量是辦不到的。"
10015060-53 = "那輛戰車……不，應援機器人的外殼是由高硬度軋製裝甲組成，#n一般的衝擊力無法破壞它。"
10015060-54 = "是的。我們對多次軋製的鋼板進行了超高頻感應加熱，對表面做了硬化處理！"
10015060-55 = "雖然因此導致修繕上較為困難，但卻能保障它的防禦力……"
10015060-57 = "……你們怎麼總是在奇怪的地方上認真呢？"
10015060-58 = "不能像犯人當初駭入機器人時一樣，由貝里塔斯奪回控制權嗎……？"
10015060-59 = "雖然可以干涉用於操控的多通道來奪取控制權，#n但我並不建議在機體運作時這麼做。"
10015060-60 = "因為干擾電波可能會使指令錯亂，產生機體暴走的危險。"
10015060-61 = "……如果變成那樣，到時候就真的誰也無法處理了。"
10015060-62 = "既然如此，只能用大量的炸彈炸斷履帶了……"
10015060-63 = "抱歉插個話，請再重新考慮一下該方案。"
10015060-67 = "如果使用足以炸斷履帶的強力炸藥，會有波及到其他學生的風險。"
10015060-68 = "除此之外，姑且不論功能與外觀……#n眼下能使用的應援機器人就只有工程師部做的那個……"
10015060-69 = "所以希望能在盡可能減少損傷的情況下壓制那輛戰車──#n抱歉，是那輛應援機器人。"
10015060-70 = "但是，要如何在不造成傷害的情況下，壓制將近10噸的機器人呢？"
10015060-71 = "我可不想靠近如同瘋牛般的戰車……"
10015060-72 = "就是說啊，我們又不是牛仔！"
10015060-73 = "牛仔……呵呵，這是個有趣的點子。"
10015060-78 = "我想到了一個好主意，大家可以協助我嗎？"
10015060-90 = "……人都跑去哪了？放棄了嗎？"
10015060-91 = "應該不太可能吧。#n研討會在這次「晄輪大祭」不知道花了多少錢，有可能因為這點干擾就放棄嗎？"
10015060-92 = "他們一定是在偷偷尋找其他方法，想讓大運動會繼續舉辦。"
10015060-93 = "咦？那個學生是……"
10015060-100 = "嗚，嗚哇……被，被發現了……"
10015060-101 = "本來想避開「晄．反．會」的視線，偷偷將串旗帶走的～"
10015060-103 = "……穿得那麼華麗，怎麼可能不被發現……"
10015060-105 = "賽道破壞者，快追上去！"
10015060-113 = "等等！你們的對手不是他！"
10015060-114 = "那輛戰車……不對，那個應援機器人的對手是我！"
10015060-120 = "咦？這次是從別的方向……？"
10015060-121 = "雖然不清楚你在想些什麼，但要戰鬥的話我可是不會客氣的！"
10015060-122 = "慢著，小心點。氣氛好像有點古怪。會不會是陷阱？"
10015060-123 = "而且前面還用串旗設置了像鐵絲網一樣的……"
10015060-124 = "不要緊，反正這附近沒有能貫穿「賽道破壞者」裝甲的武器。"
10015060-125 = "更何況，那麼細的鋼絲怎麼可能擋下戰車呢……"
10015060-142 = "停，停下來了？"
10015060-143 = "為，為什麼……！？"
10015060-145 = "讓我來向各位說明吧！"
10015060-146 = "雖然在輪子上加裝履帶可以提升抓地力，#n使其能夠幾乎不受地形影響，輕鬆行駛於險惡的地形，#n卻也同時有著一旦起動輪和履帶之間出現異物就很容易發生故障的缺點！"
10015060-147 = "所以只要像這樣在行駛路線上設置多道鋼絲，就會因捲入鋼絲而導致故障！"
10015060-148 = "呵呵……因為從藍圖上看起來，履帶和起動輪之間好像有鋼絲能進入的縫隙，#n所以我才會提出這樣的意見……果然是正確答案呢。"
10015060-149 = "為了懸掛旗幟而訂購的專利鋼絲擁有卓越的張力，正常情況下是不容易斷裂的。"
10015060-150 = "雖然不至於使引擎故障……#n但想要清除被捲入履帶中的鋼絲，可是需要相當長的時間。"
10015060-152 = "這，這明明是工程師部的巨匠們打造的作品，#n居然會因為這麼簡單的陷阱而故障，太不像話了吧？"
10015060-154 = "呃……這麼一說確實也是。#n明明有這麼致命的缺點，為什麼沒有進行改善呢？"
10015060-155 = "因為要求中雖然有希望加入能輕鬆爬坡的功能，#n卻沒有提及要具備開拓鐵絲網地帶的能力啊。"
10015060-156 = "研發費用終究不是無限的。#n必須篩選必要的功能，才能滿足客戶的需求。"
10015060-157 = "……既然能理解這點，又為何要在應援機器人身上加裝15mm機關炮呢？"
10015060-158 = "這不是顯而易見嗎。#n有15mm機關炮才浪漫吧？"
10015060-160 = "不，不要緊！別慌！"
10015060-162 = "就算履帶發生異常，厚重的裝甲和機關炮依然完好無損──"
10015060-169 = "……咦？"
10015060-170 = "你們在這裡啊，「晄．反．會」的各位成員。"
10015060-172 = "嗚，嗚哇啊啊啊！？"
10015060-174 = "堇，堇部長？#n你，你怎麼知道我們在這裡！？"
10015060-176 = "因為有聲音從閒置的倉庫中傳出來就來確認一下……果然在這裡啊。"
10015060-177 = "不管講得多小聲，也無法逃過我的耳朵。"
10015060-178 = "我雖然進行過無數次滾大球的訓練，不過被球追著跑還是頭一遭呢……#n因此得以鍛鍊平常使用不到的肌肉。"
10015060-179 = "謝謝你們讓我體驗如此特別的運動。#n做為謝禮，我得好好回報一下才行──"
10015060-183 = "──開始進行特別訓練！"
10015060-185 = "不，不要啊～！！"

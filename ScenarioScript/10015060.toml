[translation]
10015060-1 = "Episode 6; A Tank for Cheering"
10015060-9 = "That thing's a monster! I can't believe you guys built that!"
10015060-18 = "Geez. Maki's armor-piercing rounds may as well be made of rubber. What materials did you use to make that thing?"
10015060-19 = "It's too fast, even for me. I can't get a clear shot on it."
10015060-21 = "The Engineering Department really put together a behemoth in a matter of hours. I don't know if I'm impressed or incredibly annoyed."
10015060-23 = "Haha! Thank you, one and all! We appreciate your positive feedback!"
10015060-24 = "We put our all into each and every invention."
10015060-25 = "The Engineering Department's motto is to do our best, no matter what."
10015060-27 = "I've decided. I'm incredibly annoyed. Stop letting this go to your head!"
10015060-36 = "*pant* Did we lose them?"
10015060-37 = "What an incredible robot!"
10015060-38 = "Only Millennium's meisters could create such a monster..."
10015060-39 = "It would take all of Kivotos to bring that thing down."
10015060-40 = "How on earth was the Engineering Department planning on using that tank during the festival?"
10015060-41 = "Ugh! I don't care! Don't say the words festival or field day in front of me right now! It keeps bringing up bad memories!"
10015060-42 = "Keep them distracted with the tank! We'll make threatening maneuvers and keep our location hidden!"
10015060-48 = "Augh! Move, move! It's coming this way!"
10015060-49 = "Maki! You're pushing me! I'm gonna fall!"
10015060-51 = "For heaven's sake, Utaha, you really can't shut it down somehow? That thing's your kid!"
10015060-52 = "Unfortunately, we built it with the goal of it being...somewhat impossible to shut down."
10015060-53 = "Its exterior is as hard as diamonds! Maybe even harder!"
10015060-54 = "It's a pretty incredible feat of engineering, if I do say so myself. We hardened the surface by applying an ultra-high frequency to a multi-layered steel plate."
10015060-55 = "The only disadvantage to our methods is repairs would be near impossible, but the trade-off was worth it."
10015060-57 = "Why...Why are you like this? Every single one of you."
10015060-58 = "I can admit, we may have gone a tad overboard... If we can't break it from the outside, can you get to the inside? If you can hack the controls back, we wouldn't have to fight it."
10015060-59 = "Yes, if I interfered with the multichannel controls, but we'd need to get it stationary first."
10015060-60 = "If the commands get mixed up due to the interference, it could explode."
10015060-61 = "And I'd rather not blow up Millennium buildings the day before the event."
10015060-62 = "We need to destroy its tracks with explosives, maybe sticky bombs. I don't see any other options."
10015060-63 = "Apologies for interrupting, but I have to veto that idea."
10015060-67 = "We would need a massive amount of explosives to cut off its movements. It would be just as bad as the bot itself exploding. I can't risk the safety of the students like that."
10015060-68 = "And, at the end of the day, the Engineering Department's Track Crasher is the only cheer bot we have."
10015060-69 = "I would truly appreciate it if you could bring it under control with minimal damage."
10015060-70 = "We can't even take the thing down when we're trying to break it. How do you expect us to subdue a ten-ton robot with our bare hands?"
10015060-71 = "Agreed. It's not as if we can just tie a leash to the angry bull trying to run us down."
10015060-72 = "I like being a hacker! I'm not about to change careers to being a cowboy!"
10015060-73 = "Cowboys, you say? Haha! I love silly ideas like that."
10015060-78 = "In fact, I believe it gave me just the solution we needed. May I request your assistance, one last time?"
10015060-90 = "They left? They really just gave up?"
10015060-91 = "Don't be fooled! Seminar's spent nearly their entire budget on this stupid thing. They're not gonna just walk away."
10015060-92 = "I'm sure they're just plotting more nefarious schemes somewhere in their high-rise lounges."
10015060-93 = "Huh? Isn't that...?"
10015060-100 = "O-Oh no... I'm caught...!"
10015060-101 = "I was supposed to put up these school flags without getting caught by the infamous Anti-Halo Festival Group!"
10015060-103 = "Did you really think that was possible dressed in such flashy clothes?"
10015060-105 = "Who cares! Track Crasher, after them!"
10015060-113 = "Just one second! Here I am!"
10015060-114 = "Just try me! I'll take that tank... I mean, that cheer bot on with my eyes closed!"
10015060-120 = "Huh? Another one?"
10015060-121 = "They've given up on using their brains! They think they can just brute force their way through. Well, we're not backing down either!"
10015060-122 = "Wait, wait. Something seems off here. Do you think it's a trap?"
10015060-123 = "Look at the flags. I don't think they're being hung by just string...is that barbed wire?"
10015060-124 = "Let them try what they want. They said it themselves, nothing can pierce the Track Crasher's armor."
10015060-125 = "What's some measly wire gonna do? Stop an entire tank?"
10015060-142 = "Wh-What?! It stopped?"
10015060-143 = "I don't understand! What happened?"
10015060-145 = "Confused? Good thing explaining stuff is my specialty!"
10015060-146 = "We added continuous tracks over the wheels to improve friction and allow the cheer bot to travel on any terrain! The catch is, it'll break down in an instant if anything gets stuck in that little gap between the wheels and the tracks."
10015060-147 = "Lay down a spider web of wires like this one here, and this little guy won't be going anywhere!"
10015060-148 = "Heehee. I'm relieved it played out the way I predicted. Thanks to my illustrious blueprint-reading skills, I realized wire would most likely fit between the tracks and the wheels."
10015060-149 = "These patented wires made to hang the flags have outstanding tensile and shear strength, so they're almost impossible to cut."
10015060-150 = "The engine is still intact, and the only downside is the amount of time it'll take to untangle the cheer bot. I can mark this down as a job well done in my book!"
10015060-152 = "This was supposed to be made by the lauded meisters of the Engineering Department! How could it fall to something so small?"
10015060-154 = "Oh... That's true. Why didn't we think of this?"
10015060-155 = "The request was to develop a cheer bot that was sturdy and could navigate inclines or rough terrain. Metal wires weren't exactly part of the order."
10015060-156 = "And as much as I wish we did, we don't have unlimited funds. Picking out the most important features that will satisfy the client's needs is our main priority."
10015060-157 = "...If that's the case, why did you add a machine gun to it?"
10015060-158 = "What do you mean? That fifteen millimeter machine gun is vital!"
10015060-160 = "E-Everyone calm down and pay attention to me!"
10015060-162 = "Who cares about the tracks? The armor and machine gun are still working, I'll just—"
10015060-169 = "...Huh?"
10015060-170 = "I found you, my passionate athletes!"
10015060-172 = "W-Waaahh?!"
10015060-174 = "President Sumire? How did you find us?!"
10015060-176 = "I have ears all over this school. I heard voices coming from this old storage closet and put two and two together."
10015060-177 = "My hearing is very, very good. There's nowhere you can run."
10015060-178 = "While I have practiced a lot with rolling balls, I've never trained against a ball that could also run. It was an excellent workout for some of my less used muscles."
10015060-179 = "Allow me to repay you for providing me such a wonderful training experience."
10015060-183 = "It's time for Special Training Sessions: Sumire Edition."
10015060-185 = "N-No!!! Have mercy!"

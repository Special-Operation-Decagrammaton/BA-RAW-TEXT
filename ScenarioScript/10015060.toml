[translation]
10015060-1 = "ตอนที่6;รถถังที่ชื่อว่าเชียร์"
10015060-9 = "หุ่นยนต์นั่นมันอะไรน่ะ? ทำไมถึงแข็งแรงขนาดนั้นเลยล่ะ?"
10015060-18 = "กระสุนเจาะเกราะของมากิสร้างความเสียหายไม่ได้เลย แถมยังกระเด็นกลับมาอีก... ทำจากไวเบรเนียมรึไง?"
10015060-19 = "ความเร็วก็ไม่ใช่เล่นๆ เลยด้วย แค่จะเล็งให้โดนตัวรถก็ยากแล้ว"
10015060-21 = "พวกชมรมวิศวกรรม... ในเวลาแค่นั้นสร้างสัตว์ประหลาดอะไรขึ้นมากันแน่เนี่ย?"
10015060-23 = "ฮะฮ่า พอได้ยินแบบนั้นแล้วก็เขินอยู่หน่อยๆ เหมือนกันนะคะ"
10015060-24 = "ถ้าได้รับคำขอร้องมาแล้วก็ต้องทำออกมาให้เต็มที่ไงล่ะ..."
10015060-25 = "คติของชมรมวิศวกรรมก็คือ ทำงานที่ได้รับมอบหมายมาให้ดีที่สุด"
10015060-27 = "มันใช่คำชมที่ไหนกันเล่า!!"
10015060-36 = "แฮ่ก... แฮ่ก... พวกนั้นเลิกตามมารึยัง?"
10015060-37 = "จะว่าไปหุ่นยนต์นั่นสุดยอดไปเลยนะ…!"
10015060-38 = "ต้องบอกว่าสมกับที่เป็นผลงานของไมสเตอร์แห่งมิลเลเนียมรึเปล่านะ..."
10015060-39 = "หุ่นยนต์ที่มีพลังต่อสู้มากขนาดนี้ ไม่ว่าจะนักเรียนหน้าไหนก็คงจะรับมือลำบากแน่ๆ"
10015060-40 = "...ว่าแต่ชมรมวิศวกรรมบอกว่าจะเอารถถังที่มีประสิทธิภาพน่ากลัวแบบนี้ไปใช้ทำอะไรในงานมหกรรม#nแข่งขันกีฬานะ?"
10015060-41 = "ไม่ต้องไปสนใจเรื่องนั้นแล้วละ พอนึกถึงงานมหกรรมแข่งขันกีฬาขึ้นมาทีไร ก็มีแต่ความทรงจำเลวร้าย#nทั้งนั้นเลย..."
10015060-42 = "ก่อนอื่นพวกเราต้องเคลื่อนที่ไปเรื่อยๆ ไม่ให้ฝ่ายนั้นตามหาที่ซ่อนของเราเจอ!"
10015060-48 = "วะ... ว้าก! มันกลิ้งมาทางนี้แล้ว!"
10015060-49 = "ดะ... เดี๋ยว มากิ อย่าผลักสิ! จะล้มแล้วนะ!"
10015060-51 = "นี่หัวหน้าอุทาฮะ ไม่มีวิธีที่จะทำให้รถถังนั่นหยุดทำงานเลยเหรอ? พวกเธอสร้างได้ก็ต้องหยุดได้สิ!"
10015060-52 = "ต้องขอโทษด้วยนะ แต่แค่พวกเราในตอนนี้น่ะหยุดมันไม่ได้หรอก"
10015060-53 = "รถถังนั่น... ไม่สิ หุ่นยนต์เชียร์น่ะ ด้านนอกทำมาจากเกราะแข็งแรงพิเศษที่จะไม่ได้รับความเสียหายจาก#nแรงกระแทก"
10015060-54 = "ใช่ค่ะ แผ่นเหล็กที่บีบอัดหลายชั้นจะปล่อยคลื่นความถี่สูงออกมา และจะทำให้พื้นผิวแข็งแกร่งขึ้นค่ะ!"
10015060-55 = "ถึงจะมีข้อเสียอยู่ที่ซ่อมแซมลำบาก แต่ถ้าเรื่องการป้องกันละก็รับประกันได้เลย..."
10015060-57 = "...พวกเธอเนี่ยทำไมถึงได้จริงจังแต่กับเรื่องแบบนี้กันฮะ?"
10015060-58 = "แล้วถ้าให้เวอริทัสแย่งเอาสิทธิ์การควบคุมกลับมา เหมือนตอนที่โดนคนร้ายแฮ็กไปตอนแรกล่ะ พอจะทำได้มั้ย...?"
10015060-59 = "ถ้าจะให้เข้าไปแทรกแซงมัลติแชเนลที่ใช้ในการควบคุม แล้วชิงสิทธิ์การควบคุมมาก็พอจะทำได้อยู่ แต่ไม่แนะนำให้ใช้ในสถานการณ์ที่ตัวรถยังเคลื่อนที่แบบนี้หรอกนะ"
10015060-60 = "เพราะถ้าแทรกแซงคลื่นวิทยุ มันอาจจะเกิดคำสั่งทับซ้อนแล้วทำให้รถถังอาละวาดได้น่ะ"
10015060-61 = "...พอถึงตอนนั้นอาจจะกลายเป็นตัวปัญหาที่ไม่มีใครเอาอยู่ของจริงแน่"
10015060-62 = "คงต้องใช้ระเบิดปริมาณมากทำลายล้ออย่างช่วยไม่ได้ละนะ..."
10015060-63 = "ขอโทษที่ต้องเข้ามาแทรกนะคะ ช่วยพิจารณาเรื่องนั้นอีกครั้งเถอะค่ะ"
10015060-67 = "ถ้าเกิดใช้ระเบิดที่รุนแรงพอสำหรับทำให้ล้อหลุดออกมาได้ แบบนั้นก็มีโอกาสที่นักเรียนคนอื่นๆ จะได้#nรับบาดเจ็บไปด้วยนะคะ"
10015060-68 = "อีกอย่างถึงฟังก์ชันและรูปร่างจะเป็นแบบนั้น แต่ตอนนี้หุ่นยนต์เชียร์ที่ใช้งานได้ก็เหลือแค่หุ่นยนต์เชียร์#nของชมรมวิศวกรรมเท่านั้นค่ะ..."
10015060-69 = "เราต้องควบคุมรถถัง... ขอโทษค่ะ ควบคุมหุ่นยนต์เชียร์ให้ได้โดยทำให้เกิดความเสียหายน้อยที่สุดค่ะ"
10015060-70 = "แล้วจะมีวิธีไหนที่เราจะควบคุมหุ่นยนต์น้ำหนักเกือบ 10 ตัน โดยไม่เกิดความเสียหายได้ล่ะ?"
10015060-71 = "ฉันไม่ค่อยอยากให้ใช้วิธีเข้าไปใกล้แล้วเอาเชือกคล้องรถถังที่กำลังคลั่งเหมือนวัวตกมันหรอกนะ..."
10015060-72 = "เห็นด้วย พวกเราไม่ใช่คาวเกิร์ลสักหน่อย!"
10015060-73 = "คาวเกิร์ลเหรอคะ... ฮุฮุ เป็นความคิดที่ไม่เลวเลยค่ะ"
10015060-78 = "ฉันคิดอะไรดีๆ ขึ้นมาได้อย่างหนึ่งแล้วละค่ะ ขอความช่วยเหลือจากทุกคนได้มั้ยคะ?"
10015060-90 = "...ทุกคนหายไปไหนกันหมดน่ะ? ยอมแพ้ไปแล้วเหรอ?"
10015060-91 = "เป็นไปได้ที่ไหนกัน พวกกรรมการเซมิน่าเสียค่าใช้จ่ายไปตั้งเท่าไรกับ <ฮาโลเฟสติวัล> ครั้งนี้ คิดว่าจะยอมแพ้กับอุปสรรคแค่นี้งั้นเหรอ?"
10015060-92 = "ป่านนี้พวกนั้นคงกำลังหาทางทำให้งานมหกรรมแข่งขันกีฬาดำเนินต่อไปได้โดยที่พวกเราไม่รู้เรื่อง#nรู้ราวอะไรกันอยู่แน่ๆ"
10015060-93 = "เอ๊ะ? นักเรียนพวกนั้น..."
10015060-100 = "วะ... ว้า... ดะ... โดนจับได้ซะแล้ว..."
10015060-101 = "จบกันแผนการที่จะหลบเลี่ยง <ก.ต.ฮ.> แล้วไปเอาธงนานาสถาบันมา~"
10015060-103 = "ใส่ชุดสะดุดตาขนาดนั้นยังคิดว่าจะหลบสายตาใครได้อีกงั้นเหรอ..."
10015060-105 = "แทร็กครัชเชอร์ ตามไปเลย!"
10015060-113 = "หยุดนะ! คู่ต่อสู้ของพวกเธอไม่ใช่ทางนั้น!"
10015060-114 = "รถถังที่อยู่ตรงนั้น... ไม่สิ หุ่นยนต์เชียร์ตัวนั้นฉันจะจัดการเอง!"
10015060-120 = "เอ๊ะ? รอบนี้มาจากอีกทางเหรอ...?"
10015060-121 = "ไม่รู้หรอกนะว่าคิดจะทำอะไร แต่ถ้าอยากจะสู้ละก็ ฉันก็จะจัดให้ตามที่ขอ!"
10015060-122 = "เดี๋ยวก่อน ระวังด้วยนะ รู้สึกเหมือนจะมีอะไรแปลกๆ มันเป็นกับดักรึเปล่าน่ะ?"
10015060-123 = "อีกอย่างธงนานาสถาบันก็ตั้งเรียงอยู่ข้างหน้าอย่างกับรั้วลวดหนามเลยนี่..."
10015060-124 = "ไม่เป็นไรหรอก แถวนี้มันไม่มีอาวุธอะไรที่เจาะทะลุเกราะของแทร็กครัชเชอร์ได้หรอกน่า"
10015060-125 = "แล้วก็ไม่มีทางที่ลวดบางๆ แค่นั้นจะหยุดรถถังได้ด้วย..."
10015060-142 = "ยะ... หยุดไปแล้ว?"
10015060-143 = "ดะ... ได้ยังไงกัน...?!"
10015060-145 = "เรื่องนั้นเดี๋ยวฉันจะอธิบายให้ฟังเองค่ะ!"
10015060-146 = "ล้อแบบตีนตะขาบจะคอยช่วยเพิ่มแรงยึดเหนี่ยวและทำให้เคลื่อนที่บนพื้นผิวขรุขระได้สะดวกก็จริง แต่มีข้อเสียก็คือถ้าหากมีสิ่งแปลกปลอมเข้าไปติดอยู่ระหว่างช่องของสายพานก็จะเสียหายได้ง่ายมากๆ เลยละค่ะ!"
10015060-147 = "ดังนั้นถ้าขับไปบนขดลวดที่ติดตั้งเอาไว้หลายชั้นแบบนี้ ขดลวดก็จะถูกหมุนเข้าไปติดอยู่ในช่อง#nสายพานและทำให้รถเคลื่อนที่ไม่ได้ค่ะ!"
10015060-148 = "ฮุฮุ... ฉันเห็นจากในพิมพ์เขียวว่าช่องว่างระหว่างล้อและสายพานที่ขดลวดสามารถเข้าไปติดอยู่ได้ ก็เลยเสนอความคิดเห็นไป แล้วก็ใช้งานได้จริงๆ ด้วยสินะคะเนี่ย"
10015060-149 = "ขดลวดแบบพิเศษที่สั่งมาติดตั้งธงชนิดนี้มีแรงเฉือนและความยืดหยุ่นมาก เพราะฉะนั้นมันจะไม่ขาด#nง่ายๆ แน่นอนค่ะ"
10015060-150 = "ถึงจะไม่ได้ทำให้เครื่องยนต์เสียหาย... แต่ถ้าต้องมานั่งแกะลวดออกจากสายพานก็น่าจะต้องใช้เวลาไม่#nน้อยเลยละค่ะ"
10015060-152 = "ถะ... ถึงอย่างนั้นแต่นี่ก็เป็นถึงสิ่งประดิษฐ์ของไมสเตอร์แห่งชมรมวิศวกรรมเลยนะ จะมาตกม้าตาย เพราะกับดักแค่นี้เองงั้นเหรอ?"
10015060-154 = "อ่อ... จะว่าไปแล้วก็จริงอย่างที่ว่านะคะ พวกเราคำนวณข้อบกพร่องที่อันตรายขนาดนี้พลาดไปได้ยังไง#nกันนะ?"
10015060-155 = "เราได้รับคำขอให้ใส่ฟังก์ชันการเคลื่อนที่ขึ้นลงทางลาดชัน แต่ไม่ได้ขอให้ใส่ฟังก์ชันที่สามารถบุก#nทะลวงรั้วลวดหนามได้มาด้วยน่ะ"
10015060-156 = "แล้วค่าใช้จ่ายที่ใช้ในการสร้างก็มีจำกัดด้วย เราก็เลยต้องเลือกใช้ฟังก์ชันที่มีประสิทธิภาพและตรงกับ#nความต้องการของลูกค้าที่สุด"
10015060-157 = "...คนที่ติดตั้งปืนกล 15 มม. ให้หุ่นยนต์เชียร์พูดอะไรแบบนั้นได้ด้วยรึไง?"
10015060-158 = "พูดอะไรน่ะ นี่มันปืนกล 15 มม. ในฝันเลยนะ"
10015060-160 = "จะ... ใจเย็นไว้! ไม่ต้องตกใจไป!"
10015060-162 = "ถึงล้อสายพานจะใช้งานไม่ได้แล้ว แต่ว่าเกราะหนาพิเศษกับปืนกลก็ยังใช้งานได้ปกติ..."
10015060-169 = "เอ๋...?"
10015060-170 = "คุณสมาชิก มาอยู่กันที่นี่เองหรอกเหรอคะ"
10015060-172 = "วะ... ว้ากกกกกก?!"
10015060-174 = "หะ... หัวหน้าสึมิเระ? ระ... รู้ได้ยังไงว่าพวกเราอยู่ที่นี่?!"
10015060-176 = "ฉันบังเอิญได้ยินเสียงดังมาจากห้องเก็บของร้าง ก็คิดอยู่ว่าเสียงอะไร... เป็นทุกคนจริงๆ ด้วยสินะคะ"
10015060-177 = "ไม่ว่าจะพูดคุยกันเบาแค่ไหน มันก็เล็ดลอดหูฉันไปไม่ได้หรอกค่ะ"
10015060-178 = "ฉันเคยลงแข่งกีฬากลิ้งลูกบอลมาหลายครั้งก็จริง แต่เพิ่งเคยวิ่งไล่ลูกบอลที่กำลังกลิ้งหนีเป็นครั้งแรก#nเลย... รู้สึกว่าได้ใช้กล้ามเนื้อที่ปกติไม่ค่อยได้ใช้เลยละค่ะ"
10015060-179 = "ฉันต้องขอตอบแทนที่ช่วยให้ฉันได้ออกกำลังกายแบบพิเศษอย่างนี้สักหน่อยน่ะค่ะ"
10015060-183 = "ถ้าอย่างนั้นเรามาเริ่มการฝึกแบบพิเศษกันเลยค่ะ!"
10015060-185 = "มะ... ไม่เอานะ~!!"

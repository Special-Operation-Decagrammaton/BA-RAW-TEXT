[translation]
102145-3 = "โคฮารุ!"
102145-6 = "คุณโคฮารุ! เป็นอะไรหรือเปล่าคะ?"
102145-8 = "ระ... รุ่นพี่ฮาสุมิ... มาชิโระ..."
102145-10 = "ชมรมทวงความยุติธรรม! รอดแล้ว!"
102145-11 = "มาช่วยแล้วสินะคะ! แม่มดคนนั้นน่ะ...!"
102145-15 = "คุณมิกะ..."
102145-16 = "อื้ม โคฮารุบาดเจ็บมานิดหน่อย แต่ตอนนี้ไม่เป็นไรแล้วละ..."
102145-17 = "......"
102145-18 = "...อะไรกัน? ฉันยังไม่ได้ลงมือทำอะไรเลยนะ? อย่างน้อยก็ครั้งนี้น่ะ อืม..."
102145-19 = "ค่ะ ชะ... ใช่แล้วค่ะ รุ่นพี่ฮาสุมิ... คะ... คนนั้น... มาช่วยฉันไว้ค่ะ..."
102145-20 = "ไปกันเถอะค่ะ คุณโคฮารุ"
102145-21 = "อะ... อื้ม..."
102145-22 = "กลับดีๆ นะ โคฮารุจัง"
102145-25 = "...... ขอบคุณที่ช่วยนะคะ คุณมิกะ"
102145-26 = "เอ๋ คิดไม่ถึงเลยแฮะ ว่าจะได้ยินคำกล่าวขอบคุณ..."
102145-27 = "ทุกคนมีสิทธิ์ที่จะได้รับคำขอบคุณจากการกระทำที่ถูกต้องค่ะ"
102145-28 = "นั่นสิเนอะ..."
102145-29 = "ฉันยังมีงานอื่นที่ต้องไปจัดการอีกเยอะเลย ถ้างั้นขอตัวก่อนแล้วกันนะ"
102145-30 = "ไว้เจอกันคราวหน้านะ ฮาสุมิจัง"
102145-34 = "......"
102145-36 = "ตอนต่อไป;ปฏิบัติการบุกยึดหอคอยแห่งที่ 4 - มหาวิหารในสุสานใต้ดิน"

[translation]
102145-3 = "小春！"
102145-6 = "小春同學！你還好嗎？"
102145-8 = "蓮，蓮實前輩……麻白……"
102145-10 = "太好了！是實現正義部！"
102145-11 = "來救我們了啊！那個魔女他──"
102145-15 = "……彌香同學。"
102145-16 = "嗯。小春醬他沒事唷。#n雖然受了一點傷。"
102145-17 = "……"
102145-18 = "……咦？什麼什麼？#n我這次真的什麼都沒做哦☆"
102145-19 = "是，是的……蓮實前輩……#n是那邊，那位大人……救了我……"
102145-20 = "走吧，小春同學。"
102145-21 = "好，好的……"
102145-22 = "再見，小春醬。"
102145-25 = "……非常感謝您的幫忙。"
102145-26 = "咦，沒想到會被感謝呢……"
102145-27 = "……因為您幫助了小春是事實。"
102145-28 = "……嗯，也對。"
102145-29 = "那，我還有事要做，先走囉☆"
102145-30 = "下次見，蓮實醬。"
102145-34 = "……"
102145-36 = "下一話;第4聖所「地下墓穴內部宗座聖殿」"

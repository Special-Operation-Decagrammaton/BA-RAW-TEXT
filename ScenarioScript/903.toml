[translation]
903-1 = "#title;티페레트, 고난을 기리는 아름다움의 속죄자"
903-2 = "3;아오이;02;어서 와, 선생님. 기다리고 있었어.\n#3;a\n#3;em;[반응]"
903-3 = "3;아오이;99;시간 낭비는 서로에게 좋지 않겠지? 바로 본론으로 들어갈게."
903-4 = "3;아오이;01;키보토스의 툰드라 지역에서, 어떤 구조물을 발견했어."
903-5 = "3;아오이;02;제대로 교통 인프라도 구축되어 있지 않은, 완전한 오지인 곳이지."
903-6 = "3;아오이;05;단지 그것만이라면 아무런 문제도 되지 않았겠지만……. 이례적으로, 구조 신호가 발산되고 있는 상황이야.\n#3;em;[...]"
903-7 = "3;아오이;02;자체적으로 조사해 본 결과, 그 구조물은 예전 붉은겨울 연방학원에서 만든 '종자 보관소'였다는 것 같아."
903-8 = "3;아오이;02;그래서 붉은겨울 연방학원 측에 문의해 보았는데…… 지금의 자신들은 모른다는 공식 답변만을 내놓았어."
903-9 = "3;아오이;99;……이 부분에 대해서도 조사해 볼 것이 많을 것 같지만, 지금은 눈앞의 문제에 집중하도록 하겠어.\n#3;em;[한숨]"
903-10 = "3;아오이;01;아무튼 구조 신호는 지속적으로 발산 중인데, 나는 그 상황 자체에서 수상함을 느끼고 있어."
903-11 = "3;아오이;02;제대로 된 접근 수단도 없는 곳에서, 거기에 그 구조물을 만들었다는 측에서도 아는 게 없다고 대답하는 판국에."
903-12 = "3;아오이;05;거기에 상주하는 사람이…… 있을 리 없잖아?"
903-13 = "3;아오이;99;만에 하나 있다면, 그건 정말로 긴급 인명 구조가 필요한 조난자 같은 것일 테지만……."
903-14 = "3;아오이;05;……막상 구조 신호의 발산 주체는, 그 종자 보관소의 관리 AI였어.\n#3;em;[반응]"
903-15 = "3;아오이;01;그 내용은, 종자 보관소의 내구연한이 다 되어서, 보관 중인 종자만이라도 수거해 달라는 것이었는데……."
903-16 = "3;아오이;05;나는, 그것마저도 수상하다고 생각하고 있어."
903-17 = "3;아오이;02;일단 그 구조 신호의 패턴이, 개정 전의 구버전이야."
903-18 = "3;아오이;01;그리고 구버전 패턴을 사용하고 있었던 시기에는, 이 정도의 고성능 AI는 존재하지 않았어.\n#3;em;[...]"
903-19 = "3;아오이;02;그래. 어떻게 보아도, 앞뒤가 맞지 않아. 하지만 그런 모든 사실과는 별개로…… 종자 보관소는, 그 자체로 중요한 것이기도 하지."
903-20 = "3;아오이;01;지금은 멸종했거나, 멸종 위기에 몰린 식물의 가능성을 확보할 수 있다는 뜻이니까."
903-21 = "3;아오이;02;그래서, 이번의 의뢰야. 샬레에 그 종자 보관소의 조사를 부탁하고 싶어."
903-22 = "3;아오이;05;나는 어쨌든 재무실장이고, 파악해 둘 수 있는 키보토스의 재원은 최대한 파악해 두려고 해."
903-23 = "3;아오이;02;물론 조사 결과가 맞다면, 그 종자 보관소의 소유권은 여전히 붉은겨울 연방학원에 있겠지만…….\n#3;em;[반응]"
903-24 = "3;아오이;05;소유권과는 별개로, 키보토스의 재원 리스트는 가능한 한 철저하게 기록해 두고 싶으니까."
903-25 = "3;아오이;02;아, 그리고, 혹시 모르니까 어느 정도 무장을 해 두는 것이 좋을지도 몰라. 구조 신호 패턴 사이사이에…… 조금, 묘한 표현들이 섞여 있었거든."
903-26 = "3;아오이;05;'나의 길path은 <희생으로 말미암은 헌신>, 나의 이명은 <고난을 기리는 아름다움의 속죄자>라.' 는 표현이었어."
903-27 = "3;아오이;01;이게 도대체 무슨 소리인지, 그 종자 보관소를 마지막으로 떠난 사람이 남긴 무의미한 소리인지."
903-28 = "3;아오이;02;……정말로 생각할 수 없는 가능성이지만, 그곳의 관리 AI가 무언가 이상한 것을 학습한 것인지는 알 수 없지만…….\n#3;em;[...]"
903-29 = "3;아오이;99;그것도, 현장을 조사한다면 어느 정도 윤곽이 드러나게 되겠지."
903-30 = "3;아오이;01;아무튼 잘 부탁해, 선생님.\n#3;greeting"
903-31 = "3;아오이;03;총학생회는, 여러 부문에서 선생님을 의지하고 있으니까."

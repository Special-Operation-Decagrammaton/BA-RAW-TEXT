[translation]
10032015-3 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก...!"
10032015-4 = "ว้าว เร็วจริงๆ เลยนะนั่น บรรยากาศต่างจากเมื่อกี้ราวฟ้ากับเหวเลย"
10032015-5 = "เพราะคุณครูมาสั่งการใช่มั้ยน้า~? มาร่วมมือกันแบบนี้ก็ไม่เลวเลยนะ"
10032015-7 = "ไม่อะ ฉันว่าแบบนี้ไม่น่าจะดีนะ..."
10032015-8 = "ถึงครั้งนี้เราจะชนะในการต่อสู้ไปได้ แต่สถานการณ์ไม่มีทางจบลงแค่นี้หรอก"
10032015-9 = "และสำหรับประธานแล้ว จากนี้ไปอาจจะยิ่งลำบากกว่าเดิมก็ได้"
10032015-13 = "ใช่มั้ยครู?"
10032015-14 = "[s1] \"น่าจะเป็นอย่างนั้นนะ\"\n[s2] \"งั้นเล่ามา 'ให้ละเอียด' เลย\""
10032015-19 = "โอ้ว... บรรยากาศน่ากลัวอยู่นะเนี่ยคุณครู... จะให้พวกเค้าสำนึกผิดเหรอ?"
10032015-20 = "ขอโทษค่ะ ขอโทษค่ะ ขอโทษค่ะ ขอโทษค่ะ ขอโทษค่ะ"
10032015-21 = "ทำยังไงดีล่ะประธาน...? จะแก้ตัวเองเลยมั้ย?"
10032015-22 = "ถ้าทำไม่ได้ ให้ฉันแก้ตัวแทนมั้ย?"
10032015-26 = "ไม่หรอก..."
10032015-27 = "ผิดแล้วละ หัวหน้าฝ่ายคาโยโกะ เมื่อกี้พูดผิดแล้ว"
10032015-28 = "พวกเราไม่จำเป็นต้อง 'แก้ตัว' อะไรหรอกนะ..."
10032015-29 = "เพราะพวกเราคือหน่วยรับจ้างสารพัด 68 และตอนนี้เราแค่กำลังทำ 'ภารกิจที่ได้รับมา' ในฐานะของ 'หน่วยรับจ้าง'"
10032015-30 = "เพราะงั้นพวกเราไม่ต้องแก้ตัวหรือสำนึกผิดต่อคุณครูหรอก"
10032015-34 = "แต่ถึงยังไง..."
10032015-35 = "ใช่แล้วละ ในฐานะของ 'ประธาน' แล้ว ฉันต้องขอโทษที่ทำให้ที่ปรึกษาด้านการบริหารตกใจ และขอให้มาช่วยสั่งการอย่างกะทันหัน "
10032015-36 = "คุณครูก็เป็นผู้ร่วมงานของเราด้วยนี่นะ..."
10032015-37 = "ฉันจะอธิบายเกี่ยวกับ 'ภารกิจ' ของเราที่คุณครูสงสัยให้ฟังเพื่อเป็นการขอโทษแล้วกัน"
10032015-38 = "แต่ว่าถ้าฟังรายละเอียดไปแล้ว คุณครูต้องรู้นะว่าจะลอยตัวเป็นอิสระจากภารกิจนี้ไม่ได้แล้วน่ะ"
10032015-39 = "ว่ายังไงล่ะคุณครู?"
10032015-40 = "[s3] \"ครูไม่มีปัญหากับเงื่อนไขนี้\"\n[s4] \"งั้นก็ช่วยเล่าให้ละเอียดที่สุดเลยนะ\""
10032015-43 = "ฮู่ว..."
10032015-44 = "เข้าใจแล้ว คุณครู... ฉันจะเล่าให้ฟังอย่างละเอียดเลย ตั้งใจฟังให้ดีล่ะ"
10032015-48 = "นี่คือภารกิจอันยิ่งใหญ่... ที่พวกเราได้รับการว่าจ้างมาจากคนใหญ่คนโตในโลกสีเทา"
10032015-49 = "ใช่... นี่เป็นทั้งเรื่องที่อันตรายมาก และในขณะเดียวกันก็เป็นภารกิจที่เราต้องทำให้สำเร็จด้วย มันเป็นงานที่มีแต่หน่วยรับจ้างสารพัด 68 เท่านั้นที่ทำได้"
10032015-50 = "ภารกิจนี้จะเป็นใบเบิกทาง..."
10032015-52 = "ให้พวกเราหน่วยรับจ้างสารพัด 68 ได้ร้ายกาจไปอีกขั้น!"

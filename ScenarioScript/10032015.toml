[translation]
10032015-3 = "*huff* *puff* *huff*"
10032015-4 = "That went a million times smoother than the first time we fought them!"
10032015-5 = "You led us straight to victory, Sensei! Maybe this won't be too bad."
10032015-7 = "No, it's definitely bad, Mutsuki."
10032015-8 = "You can hardly call this a victory. More like the start of a war."
10032015-9 = "In fact, from the boss' perspective, this might be the worst case scenario."
10032015-13 = "...Am I right, Sensei?"
10032015-14 = "[s1] \"That's one way to put it.\"\n[s2] \"Now, you had better not leave out any details.\""
10032015-19 = "Oooh, Sensei's actually kinda scary. Are you gonna make us hold our arms in the air and self-reflect?"
10032015-20 = "I'msorryI'msorryI'msorryI'msorryI'msorry..."
10032015-21 = "What's the move, Boss? How're we gonna explain ourselves?"
10032015-22 = "I can tell them if you want."
10032015-26 = "...No."
10032015-27 = "Utterly incorrect. Your perspective could not be further from hard-boiled, Kayoko."
10032015-28 = "We are not going to \"explain ourselves\" or any other kind of nonsense."
10032015-29 = "We are Problem Solver 68! We don't need to answer to anyone, especially when everything was in the name of completing a job!"
10032015-30 = "Self-reflect? Apologize and explain? That's not us."
10032015-34 = "Well..."
10032015-35 = "I suppose, as the boss of this company, it's my responsibility to apologize for our wrongdoings. I'm sorry for the minor inconvenience and for receiving a very small helping hand from our management consultant."
10032015-36 = "Considering you're one of our valued business partners..."
10032015-37 = "I'll let you in on the details of the job, as a show of good faith."
10032015-38 = "But know this. Once you're sworn in, there's no escape until we're finished."
10032015-39 = "...Do you accept, Sensei?"
10032015-40 = "[s3] \"At least for now.\"\n[s4] \"Yes, but you better spill everything.\""
10032015-43 = "*sigh*"
10032015-44 = "I hope you're prepared for this, Sensei."
10032015-48 = "We received this commission from a big shot. One of the biggest names in the underworld."
10032015-49 = "It's such a dangerous job that they knew Problem Solver 68 was the only one up to the task."
10032015-50 = "For Problem Solver 68..."
10032015-52 = "This job will be the foundation for our hard-boiled future."

[translation]
33220-1 = "第22話;樂園之名為（３）"
33220-3 = "隊長……"
33220-4 = "沙織同學……"
33220-5 = "優斯提娜聖徒會已經沒辦法正常運作。在ETO變成兩個的時間點，戒律就漸漸變得沒有意義了……"
33220-6 = "剩下的聖徒會也是，安普羅西斯也是，已經……"
33220-7 = "沒手牌了呢……是我們輸了。"
33220-12 = "沙織……放棄吧。"
33220-13 = "開什麼玩笑！！"
33220-14 = "為什麼，為什麼只有妳……！！"
33220-15 = "我們一起痛苦，一起絕望了！在這個灰色的世界裡！"
33220-16 = "在這個全都是徒勞的世界，只有妳持有意義嗎！"
33220-17 = "只有妳，留在那樣的藍天之下嗎！"
33220-18 = "我要否定一切！妳在三一學到的、經歷過的、察覺到的！一切，那一切！！"
33220-19 = "全都是徒勞的！"
33220-20 = "不，那種事沒辦法做到。"
33220-21 = "我們合格的事，這麼努力的事，都不會變成沒有發生過！"
33220-25 = "……就算是徒勞的，我也會從那邊掙扎給妳看。"
33220-29 = "沙織……我，已經不會輸了。"

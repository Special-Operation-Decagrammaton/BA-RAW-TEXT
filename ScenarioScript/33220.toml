[translation]
33220-1 = "第22話;楽園の名前は（３）"
33220-3 = "リーダー……。"
33220-4 = "サオリさん……。"
33220-5 = "もうユスティナ聖徒会はまともに動作してない。ETOが二つになった時点で、戒律は意味を無くしつつある……。"
33220-6 = "残った聖徒会も、アンブロジウスも、もう……。"
33220-7 = "手札が無いね……私たちの負けだ。"
33220-12 = "サオリ……もう諦めて。"
33220-13 = "ふざけるなっ！！"
33220-14 = "どうして、どうしてお前だけ……！！"
33220-15 = "私たちは一緒に苦しんだ、絶望した！この灰色の世界に！"
33220-16 = "全てが虚しいこの世界で、お前だけが意味を持つのか！"
33220-17 = "お前だけがそんな、青空の下に残るのか！"
33220-18 = "全て否定してやる！お前がトリニティで学んだこと、経験したこと、気づいたこと！全て、その全てを！！"
33220-19 = "全ては虚しいのだから！"
33220-20 = "いえ、そんなことはできません。"
33220-21 = "私たちが合格したのも、そこまで頑張ったのも、無かったことにはならない！"
33220-25 = "……たとえ虚しくても、私はそこからまた足掻いてみせる。"
33220-29 = "サオリ……私は、もう負けない。"

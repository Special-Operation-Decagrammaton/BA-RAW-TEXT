[translation]
33220-1 = "ตอนที่ 22;นามแห่งสวรรค์ (3)"
33220-3 = "หัวหน้า..."
33220-4 = "คุณซาโอริ..."
33220-5 = "ตอนนี้ควบคุมสาวกไม่ได้แล้วล่ะ เมื่อ ETO แบ่งออกเป็นสองฝ่าย พลังของบรรทัดฐานก็หายไป..."
33220-6 = "สาวกที่เหลือ... พวกอัมโบรสด้วย..."
33220-7 = "ไม่มีเหลือแล้วเลย แบบนี้... พวกเราแพ้แล้วล่ะ"
33220-12 = "ซาโอริ... ยอมแพ้เถอะ"
33220-13 = "อย่ามาตลกน่า!!"
33220-14 = "ทำไมต้องเป็นเธอ... ทำไมถึงมีแต่เธอ...!!"
33220-15 = "ในโลกที่หม่นหมองแบบนี้! พวกเราต้องทุกข์ทนไปด้วยกัน สิ้นหวังไปด้วยกันสิ!!"
33220-16 = "ในโลกที่ทุกอย่างกลายเป็นเรื่องไร้สาระแบบนี้ ทำไมถึงมีแต่เธอที่มีความหมาย!"
33220-17 = "ทำไมเธอถึงอยากจะอยู่ในโลกสีฟ้าครามแบบนั้น!"
33220-18 = "ไม่มีทาง!! ฉันขอปฏิเสธทุกอย่าง! ทั้งความรู้ ทั้งประสบการณ์ที่เธอได้เรียนรู้มาจากทรีนิตี้ ทุกๆ อย่าง!!"
33220-19 = "ทุกอย่างเป็นเรื่องไร้สาระทั้งนั้น!"
33220-20 = "เปล่านะ มันไม่ใช่เรื่องไร้สาระนะคะ ใช่ไหมล่ะคะ?"
33220-21 = "ชะ... ใช่แล้ว!! เพราะในที่สุดพวกเราก็สอบผ่านกันทุกคน...!!"
33220-25 = "ไม่เป็นไร ถึงมันจะเป็นเรื่องไร้ความหมาย แต่ฉันก็จะไม่หยุดพยายามหรอกนะ"
33220-29 = "ซาโอริ... จากนี้ไป... ฉันจะไม่แพ้อีกแล้วล่ะ"

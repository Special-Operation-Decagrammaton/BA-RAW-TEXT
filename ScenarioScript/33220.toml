[translation]
33220-1 = "Episode 22;The Name of Paradise Part 3"
33220-3 = "Leader..."
33220-4 = "Saori...?"
33220-5 = "The Council can barely maintain its manifestation any longer. The presence of two ETOs are causing the commandments to lose their efficacy."
33220-6 = "It's happening to the entire Council—even Ambrosius."
33220-7 = "We have no hope of victory without them. It's over."
33220-12 = "Saori. Please surrender."
33220-13 = "Silence!"
33220-14 = "Why?! What makes you so different?!"
33220-15 = "We're cut from the same cloth. We suffered together! We despaired together in this bleak wasteland!"
33220-16 = "How is that you and only you can find meaning in a world where everything is in vain?!"
33220-17 = "What makes you so special?!"
33220-18 = "I refuse to accept it. I reject the meaning you've found—every last thing you experienced at Trinity! To hell with it all!"
33220-19 = "It's in vain—all of it!"
33220-20 = "No, it's not!"
33220-21 = "The hard work we put in to pass our exams will always have meaning!"
33220-25 = "Even if every breath that fills our lungs is ultimately in vain, there's still meaning. To struggle is to live."
33220-29 = "I'll show you, Saori. I won't fall here."

[translation]
10048050-1 = "第5話;色彩的源泉"
10048050-3 = "[log]蝸牛在哭泣[/log]"
10048050-4 = "[log]堅硬的天空已現扭曲[/log]"
10048050-5 = "[log]唯有王者展露微笑[/log]"
10048050-6 = "[log]在門扉緊閉、虹色交錯的魔幻剎那──[/log]"
10048050-7 = "[log]我將前去拜訪[/log]"
10048050-11 = "這是慈愛的怪盜寫的嗎！？"
10048050-13 = "當然是我抄寫過來的。原本在舍監隊那裡。"
10048050-14 = "不是，這種事我當然知道。#n重點是這個內容是真的吧？"
10048050-15 = "嗯，沒錯。"
10048050-16 = "那個那個，慈愛的怪盜是什麼啊？"
10048050-17 = "是專挑藝術品下手的怪盜。#n以必定能偷走盯上的目標而惡名昭彰。"
10048050-18 = "同時也是七罪人當中的一人。"
10048050-19 = "那這封信又是什麼啊？#n偷東西之前還特地告訴別人嗎？"
10048050-20 = "這正是慈愛的怪盜和其他小偷最大的差別。"
10048050-21 = "慈愛的怪盜在犯案前必定會寄出這種預告信，告知做案的時間及目標。"
10048050-22 = "嘿～原來這就是預告信啊。"
10048050-23 = "我還以為是什麼詩句呢。"
10048050-25 = "會這麼想也不奇怪。"
10048050-26 = "據說慈愛的怪盜送出的預告信，一向是這種充滿謎語又晦澀難懂的風格。"
10048050-27 = "但你不覺得奇怪嗎，美代。"
10048050-28 = "怎麼說？"
10048050-29 = "為什麼舍監隊的副隊長要給你看這個？"
10048050-30 = "因為……裕美醬和我都是主修文學的嘛……"
10048050-31 = "不是，我是說這種事情不是應該被列為機密的嗎？"
10048050-32 = "啊，原本好像是機密沒錯。#n只不過──"
10048050-33 = "只不過？"
10048050-34 = "因為完全沒有人能解讀出來的關係，所以就被解除機密了……"
10048050-35 = "啊……"
10048050-36 = "他還跟我說，如果成功解讀的話一定要告訴他……"
10048050-40 = "等一下，你該不會已經解出來了吧？"
10048050-41 = "不，還沒有。"
10048050-42 = "而且那已經不是重點了。"
10048050-43 = "什麼意思？"
10048050-44 = "現在怪盜和我們都盯上了Veronica特展。"
10048050-45 = "而既然舍監隊已經得知怪盜想對特展下手──#n展覽會場和收藏庫的警戒，勢必會比我們原本預估的強上好幾倍。"
10048050-47 = "……！"
10048050-48 = "這樣的話，美代醬熬夜寫的那份作品不就……"
10048050-49 = "只能完全作廢了。#n必須全部推倒重來，從情節開始重寫才行。"
10048050-50 = "而且還得先解開預告信的謎底……"
10048050-51 = "嗚哇啊啊啊啊啊啊啊……"
10048050-52 = "啊……那個……加油……？"
10048050-53 = "美代醬……"
10048050-54 = "我……去一趟圖書館。"
10048050-55 = "需要安定一下心靈……"
10048050-56 = "……順便再試試看能不能解讀那封預告信。"
10048050-57 = "我走了。"
10048050-62 = "狂獵藝術情報館"
10048050-63 = "呼……"
10048050-64 = "好，再重新讀一次吧。"
10048050-65 = "蝸牛在哭泣，堅硬的天空已現扭曲，唯有王者展露微笑……"
10048050-66 = "在門扉緊閉、虹色交錯的魔幻剎那，我將前去拜訪……"
10048050-67 = "……這到底是什麼意思呢。"
10048050-72 = "（就算翻遍Veronica特展的型錄，也沒找到有畫蝸牛的作品）"
10048050-73 = "（與天空有關的作品又太多了……而且「堅硬的天空」到底是什麼意思？）"
10048050-74 = "（描繪國王的畫作雖然只有幾幅……表情卻全都十分嚴肅，並沒有帶著微笑）"
10048050-75 = "（……慈愛的怪盜究竟想偷哪一幅畫呢？）"
10048050-76 = "（唔啊啊啊……事情為什麼會變成這樣……）"
10048050-82 = "嗯？書……？"
10048050-83 = "啊，不好意思！我把書弄掉了！"
10048050-84 = "不會，沒關係的。"
10048050-85 = "我幫你一起撿。"
10048050-86 = "謝謝你！"
10048050-91 = "（《召喚魔法入門》、《塔羅的岔路》、《理解星幽界》……）"
10048050-92 = "那個……你是神秘學研究會的繪梨同學……？"
10048050-93 = "啊！原來是美代同學啊！"
10048050-94 = "你還好嗎？剛才好像一直唉聲嘆氣的樣子……"
10048050-95 = "啊，因為……有件事讓我有點煩惱……"
10048050-96 = "我必須解開一道難解的謎題，可是卻完全沒有頭緒。"
10048050-97 = "這麼說來，繪梨同學的主修是……"
10048050-98 = "是！我的主修是繪畫！"
10048050-99 = "那你知不知道跟蝸牛有關的畫作呢？"
10048050-100 = "咦！？蝸牛！？"
10048050-101 = "唔嗯……在我知道的範圍裡好像沒有……"
10048050-102 = "那麼……如果是以天空為主題的作品呢？"
10048050-103 = "天空？"
10048050-104 = "出現天空的畫作有很多，不過以天空為主題的就……唔嗯……"
10048050-105 = "那你有聽過「堅硬的天空」這種說法嗎？"
10048050-106 = "堅硬的天空……？"
10048050-107 = "嘿嘿，不好意思，這還是我第一次聽──"
10048050-108 = "等等。"
10048050-109 = "你說堅硬的天空？"
10048050-111 = "我搞不好知道是什麼哦！"
10048050-112 = "是，是什麼呢！？"
10048050-113 = "那指的應該是青金石吧！"
10048050-114 = "青金石是一種藍色的寶石，也有人叫它「Lapis Lazuli」！"
10048050-115 = "而「Lapis Lazuli」的意思就是「天空之石」！"
10048050-116 = "天空之石……應該可以算是堅硬的天空吧？"
10048050-117 = "青金石……天空之石……堅硬的天空……"
10048050-118 = "這是個新的線索呢。#n我得重新以「青金石」為中心查找資料才行。"
10048050-119 = "謝謝你，繪梨同學。"
10048050-120 = "妞呵呵，不客氣～"
10048050-121 = "話說繪梨同學對寶石很熟悉呢。"
10048050-122 = "咦？啊，不是這樣的。"
10048050-123 = "之所以會知道，只是因為青金石是顏料的原料之一而已。#n畢竟我是主修繪畫的嘛。"
10048050-124 = "寶石……是顏料……！？"
10048050-125 = "是的。有一種[ruby=Ultramarine]名叫群青的顏[/ruby]料，就是將青金石磨碎之後製成的。"
10048050-126 = "在所有顏料之中，應該可以算是最昂貴的那種吧？"
10048050-127 = "雖然現在已經能用其他材料合成群青，所以幾乎不再使用青金石了……#n不過在以前，可是有不少畫家因為使用群青而破產哦！"
10048050-128 = "「……堅硬的天空已現扭曲」"
10048050-129 = "咦？"
10048050-131 = "如果這指的是磨碎[ruby=天空之石]青金石[/ruby]做成的顏料……意思就完全對得上了！"
10048050-132 = "……？"
10048050-137 = "啊，不好意思！#n朋友們在找我了，我先告辭囉！"
10048050-143 = "原來「堅硬的天空」指的是顏料……"
10048050-144 = "那「蝸牛在哭泣」會不會也……？"
10048050-145 = "……再查查看吧。#n只要從跟顏料有關的資料下手，一定會找到線索的。"
10048050-151 = "（幾小時後……）"
10048050-153 = "狂獵空地"
10048050-158 = "哈啊，哈啊……"
10048050-159 = "大家都不在宿舍，原來是跑到這裡來了啊……"
10048050-160 = "害我找了好久……"
10048050-161 = "啊，我們臨時出來處理一下工作……"
10048050-162 = "怎麼了嗎？為什麼喘成這樣？"
10048050-163 = "怎麼啦怎麼啦，美代醬？"
10048050-164 = "發生什麼事了嗎？"
10048050-165 = "……我解開了。"
10048050-166 = "嗯？解開什麼？"
10048050-168 = "……預告信的含義，我已經解開了。"

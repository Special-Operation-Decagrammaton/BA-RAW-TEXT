[translation]
10048050-1 = "ตอนที่ 5;ต้นกำเนิดของสี"
10048050-3 = "[log]เหล่าหอยทากร่ำร้องไห้[/log]"
10048050-4 = "[log]ท้องฟ้าแข็งๆ กลับคลาย[/log]"
10048050-5 = "[log]เพียงราชานั้นไซร้ที่แย้มสรวล[/log]"
10048050-6 = "[log]ยามประตูถูกปิดลง ชั่วขณะแห่งมนตราที่หมู่มวลสายรุ้งหลอมรวม[/log]"
10048050-7 = "[log]เมื่อนั้นฉันจะไปพบทุกคน[/log]"
10048050-11 = "นี่คือจดหมายที่จอมโจรแห่งความเสน่หาเขียนเองจริงๆ เหรอ?!"
10048050-13 = "คงจะคัดลอกมาน่ะค่ะ ต้นฉบับน่าจะอยู่กับฝ่ายดูแลหอพัก"
10048050-14 = "ไม่สิ เรื่องนั้นฉันก็รู้ ฉันหมายความว่า เนื้อหาในจดหมายเป็นของจริงใช่มั้ย?"
10048050-15 = "ค่ะ ใช่แล้วค่ะ"
10048050-16 = "เดี๋ยวนะ เดี๋ยวน้า จอมโจรแห่งความเสน่หาคือใครเหรอ?"
10048050-17 = "เป็นโจรที่มีเป้าหมายส่วนใหญ่เป็นงานศิลปะน่ะค่ะ ถ้าหมายตาอะไรไว้ ก็จะไปขโมยของสิ่งนั้นมา#nจนกลายเป็นโจรเลื่องชื่อเลยค่ะ"
10048050-18 = "แล้วเธอก็เป็นหนึ่งในเจ็ดอาชญากรด้วย"
10048050-19 = "ถ้างั้น แล้วจดหมายนี้ล่ะ? ทำไมต้องบอกกันล่วงหน้าก่อนจะขโมยของด้วย?"
10048050-20 = "นั่นคือความแตกต่างที่ชัดเจนระหว่างจอมโจรแห่งความเสน่หากับโจรทั่วไปค่ะ"
10048050-21 = "ก่อนลงมือก่ออาชญากรรม จอมโจรแห่งความเสน่หาจะส่งจดหมายมาบอกก่อนว่าตัวเองจะมาขโมย#nของแบบไหนในเวลาใดค่ะ"
10048050-22 = "อ๋อ~ งั้นนี่ก็คือจดหมายเตือนที่ว่าสินะ"
10048050-23 = "คิดว่าแค่เขียนบทกวีอะไรไว้เสียอีก"
10048050-25 = "จะเข้าใจผิดแบบนั้นก็ไม่แปลกหรอก"
10048050-26 = "จอมโจรแห่งความเสน่หาขึ้นชื่อเรื่องการส่งจดหมายเตือนด้วยเนื้อหาที่เป็นปริศนา และเข้าใจยากอยู่แล้ว"
10048050-27 = "แต่มันก็แปลกๆ นะ มิโยะ"
10048050-28 = "ทำไมเหรอคะ?"
10048050-29 = "ทำไมรองหัวหน้าฝ่ายดูแลหอพักถึงเอาจดหมายให้เธอดูล่ะ?"
10048050-30 = "ถามมาได้ ก็ฮิโรมิจังอยู่เอกวรรณกรรมเหมือนฉันไง..."
10048050-31 = "แต่ฉันว่าปกติแล้วเรื่องแบบนี้ควรเก็บเป็นความลับสุดยอดเลยนะ"
10048050-32 = "อ๊ะ ตอนแรกฮิโรมิจังก็บอกว่าจดหมายเตือนนี้เป็นความลับสุดยอดค่ะ แต่ว่า..."
10048050-33 = "แต่ว่า?"
10048050-34 = "พอตัวเองตีความเนื้อหาไม่ได้ ก็เลยเลิกให้เป็นความลับสุดยอด..."
10048050-35 = "อ่า..."
10048050-36 = "แล้วก็บอกว่าถ้าฉันตีความได้ ก็ขอให้ช่วยบอกด้วย... "
10048050-40 = "เดี๋ยวนะ หมายความว่าเธอตีความจดหมายเตือนได้แล้วงั้นเหรอ?"
10048050-41 = "เปล่าค่ะ"
10048050-42 = "และที่จริงแล้ว ตอนนี้สิ่งสำคัญไม่ใช่การตีความจดหมายเตือนให้สำเร็จหรอกค่ะ"
10048050-43 = "หมายความว่ายังไงน่ะ?"
10048050-44 = "สิ่งสำคัญก็คือ ตอนนี้ทั้งพวกเราและจอมโจรต่างก็หมายตานิทรรศการพิเศษเวโรนิก้าเหมือนกัน"
10048050-45 = "และในเมื่อฝ่ายดูแลหอพักรู้แล้วว่าจอมโจรกำลังจับจ้องนิทรรศการพิเศษอยู่ ทางนั้นก็คงยกระดับ#nการรักษาความปลอดภัยของสถานที่จัดนิทรรศการและโกดังเก็บของที่จะจัดแสดงด้วย... "
10048050-47 = "...!"
10048050-48 = "เดี๋ยวนะ เดี๋ยวน้า งั้นแผนการที่มิโยะจังอุตส่าห์อดหลับอดนอนเขียนก็..."
10048050-49 = "ไร้ประโยชน์แล้วค่ะ ฉันต้องรื้อทุกอย่างแล้วเขียนพล็อตใหม่ค่ะ"
10048050-50 = "และถ้าจะทำอย่างนั้น ฉันก็ต้องตีความจดหมายเตือนนี้ด้วย..."
10048050-51 = "ฮืออออออออ..."
10048050-52 = "อ่า... อืม... พยายามเข้านะ..."
10048050-53 = "มิโยะจัง..."
10048050-54 = "ฉัน... ขอตัวไปห้องสมุดก่อนนะคะ"
10048050-55 = "ฉันต้องหาความสงบให้ร่างกายและจิตใจ..."
10048050-56 = "ไหนๆ ไปแล้วก็จะลองตีความจดหมายเตือนนั่นด้วยค่ะ"
10048050-57 = "เดี๋ยวฉันกลับมานะคะ"
10048050-62 = "ศูนย์ข้อมูลศิลปะ ไวลด์ฮันต์"
10048050-63 = "ฮู่วววว..."
10048050-64 = "เอาละ มาอ่านอีกสักรอบดีกว่า"
10048050-65 = "เหล่าหอยทากร่ำร้องไห้ ท้องฟ้าแข็งๆ กลับคลาย เพียงราชานั้นไซร้ที่แย้มสรวล..."
10048050-66 = "ยามประตูถูกปิดลง ชั่วขณะแห่งมนตราที่หมู่มวลสายรุ้งหลอมรวม เมื่อนั้นฉันจะไปพบทุกคน..."
10048050-67 = "พูดเรื่องอะไรกันเนี่ย..."
10048050-72 = "(ในสมุดภาพรวมผลงานศิลปะที่จะจัดแสดงในนิทรรศการพิเศษเวโรนิก้าก็ไม่มีภาพที่มีหอยทากเลย)"
10048050-73 = "(แต่กลับมีภาพวาดท้องฟ้าอยู่หลายภาพ... แล้วที่บอกว่าท้องฟ้าแข็งๆ มันคืออะไรกัน?)"
10048050-74 = "(ส่วนภาพวาดราชาก็มีอยู่ 2-3 ภาพ แต่ว่า... ราชาในทุกภาพก็ทำหน้าเคร่งขรึม ไม่มีภาพไหนที่มีราชา#nยิ้มอยู่เลย)"
10048050-75 = "(จอมโจรแห่งความเสน่หากำลังหมายตาภาพไหนอยู่กันแน่นะ...?)"
10048050-76 = "(ฮือออ... แล้วทำไมสถานการณ์ถึงยุ่งเหยิงแบบนี้...)"
10048050-82 = "หืม? หนังสือ...?"
10048050-83 = "อ๊ะ ขอโทษค่ะ! ฉันทำหนังสือหล่นสินะคะ!"
10048050-84 = "ไม่ค่ะ ไม่เห็นต้องขอโทษเลย"
10048050-85 = "ฉันจะช่วยเก็บหนังสือนะคะ"
10048050-86 = "ขอบคุณค่ะ!"
10048050-91 = "(เวทมนตร์อัญเชิญเบื้องต้น ชุมทางไพ่ทาโรต์ เปิดระนาบดวงดาว...)"
10048050-92 = "เอ่อ... ใช่คุณเอริจากชมรมวิจัยรหัสยศาสตร์หรือเปล่าคะ...?"
10048050-93 = "อ๊ะ! คุณมิโยะนี่เองสินะคะ!"
10048050-94 = "ว่าแต่ เป็นอะไรหรือเปล่าคะ? เห็นทำหน้าหนักใจอยู่ตั้งแต่เมื่อกี้แล้ว"
10048050-95 = "อ่า พอดีว่า... ฉันมีเรื่องกังวลนิดหน่อย..."
10048050-96 = "ฉันต้องไขปริศนาน่ะค่ะ แต่ว่าหาเบาะแสไม่ได้เลย"
10048050-97 = "จะว่าไป คุณเอริเรียนวิชาเอก..."
10048050-98 = "ใช่ค่ะ! ฉันอยู่เอกจิตรกรรมค่ะ!"
10048050-99 = "ถ้างั้นพอจะรู้จักภาพวาดที่มีหอยทากบ้างมั้ยคะ?"
10048050-100 = "คะ?! หอยทากเหรอคะ?!"
10048050-101 = "ฮืมม... เท่าที่รู้จักก็ไม่น่าจะมีนะ..."
10048050-102 = "แล้วถ้าเป็นภาพวาดในธีมท้องฟ้าล่ะคะ?"
10048050-103 = "ท้องฟ้าเหรอคะ?"
10048050-104 = "ภาพวาดที่มีท้องฟ้ามีเยอะแยะเลยค่ะ แต่ภาพที่เน้นไปที่ท้องฟ้าเลยละก็... อืม..."
10048050-105 = "งั้นคุณเอริเคยได้ยินสำนวน 'ท้องฟ้าแข็งๆ' บ้างมั้ยคะ?"
10048050-106 = "ท้องฟ้าแข็งๆ...?"
10048050-107 = "แหะๆ ขอโทษด้วยค่ะ คำนั้นฉันก็เพิ่งจะเคยได้ยินเป็นครั้งแรกเลย..."
10048050-108 = "ไม่สิ เดี๋ยวนะคะ"
10048050-109 = "เมื่อกี้บอกว่าท้องฟ้าแข็งๆ ใช่มั้ยคะ?"
10048050-111 = "ถ้างั้นฉันก็พอเดาออกแล้วค่ะ!"
10048050-112 = "อะ... อะไรเหรอคะ?!"
10048050-113 = "น่าจะเป็นสำนวนที่หมายถึงหินลาพิสลาซูลีนะคะ!"
10048050-114 = "หินลาพิสลาซูลีเป็นอัญมณีสีครามค่ะ"
10048050-115 = "แล้วคำว่าลาพิสลาซูลีก็มีความหมายว่า 'หินแห่งท้องฟ้า' ค่ะ"
10048050-116 = "หินแห่งท้องฟ้า... ก็น่าจะหมายถึงท้องฟ้าแข็งๆ ที่ว่านั่นนะคะ?"
10048050-117 = "ลาพิสลาซูลี... หินแห่งท้องฟ้า... ท้องฟ้าแข็งๆ..."
10048050-118 = "เป็นคีย์เวิร์ดใหม่เลยนะคะ ฉันคงต้องยึดคำว่าหินลาพิสลาซูลีเป็นหลักแล้วหาข้อมูลใหม่แล้วละค่ะ"
10048050-119 = "ขอบคุณนะคะ คุณเอริ"
10048050-120 = "อุฮุฮุฮุ ไม่ต้องขอบคุณกันหรอกค่ะ"
10048050-121 = "จะว่าไป คุณเอริดูจะสนใจเกี่ยวกับอัญมณีมากเลยนะคะ"
10048050-122 = "คะ? อ้อ ไม่ใช่อย่างนั้นหรอกค่ะ"
10048050-123 = "ฉันรู้จักหินลาพิสลาซูลีเพราะมันเป็นวัตถุดิบที่เอามาทำสีสำหรับภาพวาดได้น่ะค่ะ ก็ฉันอยู่เอกจิตรกรรมนี่คะ"
10048050-124 = "อัญมณี... คือวัตถุดิบทำสีงั้นเหรอคะ?!"
10048050-125 = "ใช่ค่ะ ถ้าเอาหินลาพิสลาซูลีมาบดให้เป็นผง ก็จะได้สารสีที่ชื่อว่าอัลตรามารีน"
10048050-126 = "มันน่าจะเป็นสารสีที่แพงที่สุดในบรรดาสารสีทั้งหมดเลยนะคะ?"
10048050-127 = "ปัจจุบันอัลตรามารีนสามารถผลิตจากวัตถุดิบอื่นๆ ได้ ก็เลยไม่ค่อยมีการใช้หินลาพิสลาซูลีกันแล้ว แต่ในอดีตว่ากันว่าจิตรกรหลายคนใช้อัลตรามารีนจนกระเป๋าฉีกกันเลยละค่ะ!"
10048050-128 = "'ท้องฟ้าแข็งๆ กลับคลาย...'"
10048050-129 = "คะ?"
10048050-131 = "ถ้าบดหินแห่งท้องฟ้าแล้วเอามาทำเป็นสารสีได้อย่างที่ว่าไว้ละก็... ถ้างั้นความหมายก็สอดคล้องกัน#nพอดีเลยค่ะ...!"
10048050-132 = "...?"
10048050-137 = "อ๊ะ ขอโทษด้วยค่ะ! เพื่อนๆ ของฉันเรียกหาแล้ว ฉันต้องขอตัวก่อนนะคะ!"
10048050-143 = "'ท้องฟ้าแข็งๆ'... หมายถึงสารสีสินะ"
10048050-144 = "แล้ว 'การร่ำร้องไห้ของหอยทาก' ล่ะ...?"
10048050-145 = "ลองหาข้อมูลดูดีกว่า... ถ้าโฟกัสที่วัตถุดิบสี ก็อาจเจอเบาะแสอะไรก็ได้"
10048050-151 = "(หลายชั่วโมงต่อมา...)"
10048050-153 = "สนามไวลด์ฮันต์"
10048050-158 = "แฮ่ก... แฮ่ก..."
10048050-159 = "ทุกคนไม่ได้อยู่ที่หอพัก แต่อยู่ที่นี่กันสินะ..."
10048050-160 = "ฉันตามหาอยู่ตั้งนาน..."
10048050-161 = "อ้อ ฉันออกมาธุระเรื่องงานเดี๋ยวหนึ่งน่ะ"
10048050-162 = "มีเรื่องอะไรเหรอ? แล้วทำไมถึงหอบแฮ่กๆ มาอย่างนั้น?"
10048050-163 = "เอ๋ อะไรกันน่ะ มิโยะจัง?"
10048050-164 = "เกิดเรื่องอะไรเหรอ?"
10048050-165 = "ฉันได้คำตอบแล้วค่ะ..."
10048050-166 = "หืม? อะไรเหรอ?"
10048050-168 = "จดหมายเตือนน่ะค่ะ ฉันตีความได้แล้วค่ะ..."

[translation]
10048050-1 = "Episode 5;Source of Color"
10048050-3 = "[log]Snails will cry,[/log]"
10048050-4 = "[log]the hard sky will loosen,[/log]"
10048050-5 = "[log]only the king smiles.[/log]"
10048050-6 = "[log]When the doors close and the rainbow blends, in that magical moment—[/log]"
10048050-7 = "[log]I shall arrive.[/log]"
10048050-11 = "Really? The Benevolent Thief actually wrote this?"
10048050-13 = "It's a copy...obviously. The Prefectural Council has the original in their evidence locker."
10048050-14 = "You know what I meant. You're saying that the message is real?"
10048050-15 = "Indeed."
10048050-16 = "Hey, hey, who's this Benevolent Thief, anyway?"
10048050-17 = "She's an ACTUAL art thief, unlike us. She is infamous not only for her bravado, but her success rate."
10048050-18 = "She is also one of the Seven Prisoners."
10048050-19 = "So what's with the card? Why would she say that she's coming?"
10048050-20 = "She likes to be different, Ritsu. She's not a typical thief, and enjoys...toying with people. Like a game."
10048050-21 = "The Benevolent Thief always leaves a calling card before she strikes. In it, she announces her target."
10048050-22 = "So this is a message. A...real calling card. Wow..."
10048050-23 = "I thought it was a poem, or something!"
10048050-25 = "I can definitely see that. It's a little artistic."
10048050-26 = "The Benevolent Thief is more into puzzles, though. This message is a riddle."
10048050-27 = "Which makes me wonder...Miyo."
10048050-28 = "What?"
10048050-29 = "Why did the Prefectural Council Vice Captain show this to you? And then give you a copy?"
10048050-30 = "We are...compatriots. The Literature Department is pretty small..."
10048050-31 = "No, I mean, this is evidence. Shouldn't this be highly confidential?"
10048050-32 = "It was, initially, but it turns out that..."
10048050-33 = "...Yes?"
10048050-34 = "They need outside help. No one in the Council could figure it out."
10048050-35 = "Ah..."
10048050-36 = "She wanted me to give it a try and...call her if I crack it. "
10048050-40 = "So, did you? Did you crack it?"
10048050-41 = "No. Not yet."
10048050-42 = "Frankly, I have a lot on my mind."
10048050-43 = "Is that so?"
10048050-44 = "Yes, because, in case you missed it, both we AND the Benevolent Thief are targeting the Veronica Exhibition."
10048050-45 = "The Prefectural Council is on high alert for the Benevolent Thief, meaning that the exhibition hall and the storeroom are under heightened security. "
10048050-47 = "...!"
10048050-48 = "Wait, wait, then all the work you did...?"
10048050-49 = "Is now useless. This twist means I have to go back to the outline and replot."
10048050-50 = "And, uh... I'm not going to get far unless I...decode this calling card...."
10048050-51 = "Auuauhguhaughhh..."
10048050-52 = "Uh...um... Good luck...champ."
10048050-53 = "Miyo..."
10048050-54 = "I... I'll be in the library. At my usual desk. In the back."
10048050-55 = "I need to...calm my mind and body."
10048050-56 = "...And while I'm at it, maybe I'll crack this card... Augh."
10048050-57 = "Bye."
10048050-62 = "Wildhunt Arts Information Center"
10048050-63 = "*siiiiiigh*..."
10048050-64 = "One more time, Miyo..."
10048050-65 = "Snails will cry, the hard sky will loosen, only the king smiles..."
10048050-66 = "When the doors close and the rainbow blends, in that magical moment... I shall arrive."
10048050-67 = "...What is the author's intent?"
10048050-72 = "(I scoured the exhibition's site, and found no paintings of snails.)"
10048050-73 = "(Then, of course, there were SO many paintings of skies. Artists LOVE the sky. \"Hard sky\"? What?)"
10048050-74 = "(Only a few kings will be in attendance... And they were all scowling. Not even a hint of a smirk...)"
10048050-75 = "(...So what could the Benevolent Thief possibly be targeting?)"
10048050-76 = "(Aaahhh... How did this get so complicated? And stupid? And why am I always caught in the middle?!)"
10048050-82 = "Huh? Books...? Are they all right?"
10048050-83 = "Ah, whoops! That was me. I should get a belt or bag, ha! Sorry to scare you."
10048050-84 = "You...needn't apologize."
10048050-85 = "Please allow me to help."
10048050-86 = "Thank you so much!"
10048050-91 = "(\"Intro to Summoning Magic,\" \"The Spilt Path of Tarot,\" \"Understanding the Astral Plane\"...A big witch hat...)"
10048050-92 = "Um... You're Eri, right? From the Occult Investigation Society...?"
10048050-93 = "Oh! It IS you, Miyo!"
10048050-94 = "I didn't want to assume. You were really burying your head like you were struggling."
10048050-95 = "Ah, see... I was worried about a big quiz..."
10048050-96 = "There's this problem, and I just can't crack it."
10048050-97 = "Come to think of it, Eri, your major is....?"
10048050-98 = "Painting! Yes. Practical and Studio Art."
10048050-99 = "With a little history too, I hope. Do you know of any famous...snail-based paintings?"
10048050-100 = "Huh?! A snail?! Like with slime?"
10048050-101 = "Hmmm... Nothing comes to mind..."
10048050-102 = "How about paintings of the sky?"
10048050-103 = "The sky?"
10048050-104 = "Lots of paintings feature the sky. But, just OF the sky, hmm. Do you mean night, sunrise, eventide...?"
10048050-105 = "Something with a \"hard sky,\" if that rings a bell."
10048050-106 = "\"Hard sky\"...? Hard, as in, on fire and harsh? Or hard, like...huh."
10048050-107 = "...I'm sorry. Maybe that's a mistranslation. I've never heard of—"
10048050-108 = "Hold on a second. Freeze. Wait."
10048050-109 = "Sky. Night. Stars... HARD...ness scale..."
10048050-111 = "I have an idea!"
10048050-112 = "R-Really? What is it?"
10048050-113 = "Do you think it's about lazurites?"
10048050-114 = "Lazurite is a blue mineral. It's in lapis lazuli, which is a gemstone that's great for intuition, divination, psychic protection..."
10048050-115 = "But, most importantly, the name lapis lazuli means \"stone of the sky\"!"
10048050-116 = "If it's the\" stone of the sky\"...then that's a \"hard sky,\" right?"
10048050-117 = "A gemstone...stone of the sky...hard sky..."
10048050-118 = "That's a fascinating insight. I'll research lapis lazuli. It could be the key..."
10048050-119 = "Thank you very much, Eri."
10048050-120 = "Nyuhuhu, no problem!"
10048050-121 = "Thank you, Eri. I appreciate your help. You're quite kind."
10048050-122 = "Oh...that reminds me."
10048050-123 = "If you like \"appreciating,\" then perhaps you might APPRECIATE that lapis lazuli is used to make paint."
10048050-124 = "A gemstone...is in paint?!"
10048050-125 = "Not all...chunky, or anything. They used to grind it into a powder to make ultramarine."
10048050-126 = "It's a beautiful blue. I think it was also the most expensive paint in history."
10048050-127 = "Ultramarine uses synthetic stuff now, but, back in the day, procuring it made a lot of artists go bankrupt! Can you imagine? What commitment!"
10048050-128 = "\"...The hard sky will loosen.\""
10048050-129 = "...Eh?"
10048050-131 = "If you were to grind lapis lazuli, the stone of the sky, and mix it to make paint... Yes. I get it...!"
10048050-132 = "...Hm?"
10048050-137 = "Oh, sorry, Miyo! I gotta take this. Good luck with your quiz!"
10048050-143 = "\"Hard sky\"...was about a type of paint."
10048050-144 = "Then, could \"snails crying\" also be...?"
10048050-145 = "...It's worth a shot. Pigments, hues, materials. Got it. Time to focus."
10048050-151 = "A few hours later..."
10048050-153 = "Wildhunt Park"
10048050-158 = "*pant* *pant*..."
10048050-159 = "Why aren't you in the dorm?! *pant* Hold on."
10048050-160 = "*pant* I looked everywhere..."
10048050-161 = "We're just working, Prez. You've seen the team calendar."
10048050-162 = "What's going on? Why are you so sweaty?"
10048050-163 = "Huh? What is it, Miyo?"
10048050-164 = "Are you in trouble?"
10048050-165 = "...I cracked it."
10048050-166 = "Crack? Hm? What?"
10048050-168 = "...The calling card. I figured it out."

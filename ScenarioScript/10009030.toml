[translation]
10009030-1 = "ตอนที่ 3;การจู่โจมครั้งที่ 3!"
10009030-5 = "นี่ ยัยจิ้งจอกแห่งความพินาศ มื้อกลางวันมาแล้ว"
10009030-6 = "พอกินนี่เข้าไปแล้ว เธอคงอยากจะคายความลับทั้งเรื่องจุดประสงค์ที่แท้จริง แล้วก็เรื่องอื่นๆ ออกมาจนหมดเลยละมั้ง"
10009030-7 = "กินนั่นน่ะเหรอ? คิดว่าพอกินแล้วฉันจะสารภาพงั้นเหรอคะ?"
10009030-8 = "ใช่แล้ว! เพราะนี่คือโอยาโกะด้งที่มีประสิทธิภาพโดดเด่นแม้แต่ในสถาบันฝึกตำรวจวัลคิรี่ของเราเลยล่ะ!"
10009030-9 = "ฮุฮุฮุ♡ พอฉันใช้สิทธิ์ที่จะไม่พูดก็ใช้วิธีแบบนี้เลยเหรอคะ แค่ได้ยินก็รู้สึกได้ว่าเป็นของที่น่า#nสะอิดสะเอียนจนรู้สึกอึดอัดเลยละค่ะ"
10009030-10 = "หรือว่าในอาหารจะผสมยารับสารภาพไว้คะ?"
10009030-11 = "หืม? เปล่านะ แค่มันอร่อยมากเฉยๆ ก็เท่านั้นเอง"
10009030-12 = "..."
10009030-15 = "(คุณครูเดินลาดตระเวนพร้อมกับเซนะอย่างแข็งขัน)"
10009030-21 = "คุณครู! วาคาโมะ...!"
10009030-22 = "[s] \"คงไม่ใช่ว่าหนีออกมาอีกแล้วใช่มั้ย...\""
10009030-28 = "[ns] \"จริงๆ ด้วย...\""
10009030-29 = "อา ฮุฮุฮุ♡ ยังไงก็หนีฉันไม่พ้นหรอกนะคะ อุฮุฮุฮุ♡"

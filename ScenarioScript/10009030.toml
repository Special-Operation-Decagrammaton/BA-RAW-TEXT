[translation]
10009030-1 = "第3話;襲擊之三"
10009030-5 = "喂，災厄之狐。午餐來了。"
10009030-6 = "儘管吃吧。只要吃下這個，不管你有什麼企圖都會不打自招的。"
10009030-7 = "原來如此，吃下之後我就會招供一切？"
10009030-8 = "沒錯，這可是我們女武神警察學園中的高級品，有著驚人效果的親子丼啊！"
10009030-9 = "呵呵……♡一聽說我要行使緘默權就拿出這種東西啊……看來似乎是認真的呢？"
10009030-10 = "反而讓我期待裡頭加了多麼強力的自白劑了呢……"
10009030-11 = "不，沒有那種東西。只是單純地因為非常好吃，所以才會那樣而已。"
10009030-12 = "……這樣啊。"
10009030-15 = "（和朝氣蓬勃的瀬奈一起，重新開始巡邏的時候……）"
10009030-21 = "老師，若藻他……！"
10009030-22 = "[s]「該不會……」"
10009030-28 = "[ns]「……又來了啊。」"
10009030-29 = "哼哼哼……♡別想逃離我唷！"

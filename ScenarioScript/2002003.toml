[translation]
2002003-1 = "การทดลองของแฮ็กเกอร์อัจฉริยะ"
2002003-7 = "ขอบคุณสำหรับความร่วมมือในวันนี้ครับ! "
2002003-8 = "สมกับเป็นคุณครูของทางชาเล่ต์เลยนะครับ! คุณครูมาช่วยเลยทำให้งานเสร็จได้ง่ายขึ้นเยอะเลย!"
2002003-9 = "[s] \"ไม่ขนาดนั้นหรอก...\""
2002003-13 = "พวกเราขอตัวกลับก่อนนะครับ!"
2002003-14 = "แล้วพบกันใหม่นะครับ!"
2002003-18 = "(หลังจากทำธุระที่มิลเลเนียมเสร็จ เมื่อดูเวลาก็พบว่าเป็นเวลาประมาณบ่ายโมง)"
2002003-19 = "[ns] \"อีกสองชั่วโมงจะถึงเวลานัดกับฮิมาริแล้ว... รีบไปดีกว่า\""
2002003-25 = "(เดินมาไม่ไกลนัก ก็มาถึงป้ายรถบัสที่อยู่ใกล้ๆ)"
2002003-30 = "(หลังนั่งรออยู่ครู่หนึ่งรถบัสก็มาถึง)"
2002003-31 = "[ns] \"อ๊ะ รอเดี๋ยวสิ?!\""
2002003-43 = "[ns] \"แฮ่กๆ... ขะ...ขึ้นมาได้แล้ว...\""
2002003-48 = "(หลังขึ้นรถมาได้อย่างหวุดหวิด คุณครูก็หอบอยู่พักใหญ่กว่าจะกลับมาหายใจได้ปกติ)"
2002003-52 = "ท่านผู้โดยสารโปรดทราบ ป้ายต่อไปคืออาคารชมรมมิลเลเนียม..."
2002003-56 = "อ๊ะ ขออภัย รถบัสสายนี้มุ่งหน้าไปยังท่าเรือตะวันออกมิลเลเนียม สายท่าเรือตะวันออกครับ"
2002003-60 = "[ns] \"ท่าเรือตะวันออก? ฝั่งตรงข้ามกับอาคารชมรมมิลเลเนียมเลยนี่...\""
2002003-61 = "ขอให้ผู้โดยสารทุกท่านมีช่วงเวลาที่สนุกสนานกับการเดินทางไปทางฝั่งตะวันออกนะครับ!"
2002003-64 = "[ns] \"นี่ เดี๋ยวก่อน...!\""
2002003-72 = "ป้ายสุดท้าย ท่าเรือฝั่งตะวันออกมิลเลเนียมครับ"
2002003-73 = "ขอให้ผู้โดยสารทุกท่านลงที่ป้ายนี้ กรณีที่ท่านไม่ลงจากรถ ฟังก์ชันทางหนีไฟฉุกเฉินจะถูกเปิดใช้งานในอีกสาม... สอง... หนึ่ง..."
2002003-74 = "[ns] \"วะ... ว้ากกก?!\""
2002003-78 = "(ก่อนที่คุณครูจะได้ทันทำอะไรก็ถูกดีดออกมาจากรถบัสทันที)"
2002003-79 = "ขอให้ผู้โดยสารได้พบกับ <ผู้มีเกียรติ> ที่รอคอยและมีแต่วันที่ดีนะครับ!"
2002003-80 = "[ns] \"ดะ... เดี๋ยวก่อน! รอด้วยสิ?!\""
2002003-87 = "[ns] \"นี่มันอะไรกันเนี่ย...”"
2002003-88 = "(ด้วยเหตุผลบางอย่าง คุณครูก็ตกอยู่ในสถานการณ์ใกล้เคียงกับการโดนลักพาตัว และมาอยู่ที่แปลกๆ โดยไม่รู้ตัว...)"
2002003-92 = "[ns] \"ไม่ใช่เวลามาอึ้งอยู่สิ ต้องรีบกลับไปก่อนที่จะเลยเวลานัด...\""
2002003-102 = "(คุณครูรีบกลับไปที่อาคารชมรมให้ทันเวลาที่นัดกับฮิมาริไว้)"
2002003-103 = "(แต่ว่าตอนนั้น คุณครูกลับไม่รู้ตัวเลย...)"
2002003-107 = "(ว่ากำลังจะได้สัมผัสกับเค้าลางของเรื่องแปลกๆ อีกมากมาย...)"
2002003-116 = "(ขณะที่วิ่งไปห้องชมรม อาจเป็นเพราะความลำบากที่พบเจอก่อนหน้านี้ ทำให้จู่ๆ ก็รู้สึกหิวน้ำกะทันหัน)"
2002003-117 = "[ns] \"แวะกดเครื่องดื่มจากตู้หยอดเหรียญสักหน่อยแล้วกัน\""
2002003-123 = "(คุณครูกดปุ่มเลือกโซดาเย็นๆ ออกมา แต่ว่า...)"
2002003-129 = "[ns] \"อ๊ะ ร้อน?! อะไรเนี่ย...\""
2002003-133 = "[ns] \"<ซุปถั่วแดงหวาน ก็อต บอมบ์> เหรอ...?\""
2002003-134 = "(เครื่องดื่มเย็นๆ ที่เลือกกลับไม่ออกมา แต่ได้ซุปถั่วแดงหวานร้อนๆ มาแทน)"
2002003-135 = "(เสียงลึกลับดังออกมาจากตู้กดเครื่องดื่มอัตโนมัติ)"
2002003-136 = "<นำพาความเย็นไปให้ไกล และนำความอบอุ่นมาสู่คุณ>"
2002003-137 = "ซุปถั่วแดงหวานสำหรับคุณ! ทานให้อร่อยนะคะ!"
2002003-138 = "[ns] \"มะ... ไม่เอา! อยากดื่มเครื่องดื่มเย็นๆ ต่างหากเล่า?!\""
2002003-141 = "(คุณครูไม่ยอมแพ้และกดปุ่มต่างๆ ดูใหม่... แต่ว่าก็ได้แต่ซุปถั่วแดงร้อนออกมา)"
2002003-150 = "[ns] \"เฮ้อ... มัวแต่ทะเลาะกับตู้ขายของจนจะถึงเวลานัดแล้วสิ...!\""
2002003-151 = "(ตอนที่คุณครูกำลังจะข้ามสะพานเชื่อมไปยังอาคารห้องชมรม...)"
2002003-155 = "แจ้งเตือนพลเมืองทุกท่าน กรุณาหลีกเลี่ยงการใช้เส้นทางดังกล่าว และใช้เส้นทางอื่นแทน"
2002003-156 = "[s] \"หา?! ดะ... เดี๋ยวก่อน...!\""
2002003-157 = "แจ้งเตือนพลเมืองทุกท่าน กรุณาหลีกเลี่ยงการใช้เส้นทางดังกล่าว และใช้เส้นทางอื่นแทน"
2002003-161 = "แจ้งเตือนพลเมืองทุกท่าน กรุณาหลีกเลี่ยงการใช้เส้นทางดังกล่าว และใช้เส้นทางอื่นแทน"
2002003-162 = "<หากคุณอยู่ห่างจากน้ำ คุณจะมีโชคมากขึ้น>"
2002003-163 = "[s] \"โชคเหรอ...?\""
2002003-164 = "กรุณาใช้เส้นทางอื่น หากไม่เช่นนั้น โดรนรักษาความปลอดภัยจะมาในเร็วๆ นี้"
2002003-168 = "[ns] \"วะ... ว้ากกก! เกิดอะไรขึ้นกันเนี่ย?!\""
2002003-175 = "(คุณครูรีบออกมาจากที่นั่นทันที เพื่อหลบฝูงโดรนที่บินมา)"
2002003-176 = "(หลังจากนั้นเรื่องแปลกๆ ก็เกิดขึ้นอย่างต่อเนื่องไม่หยุดหย่อน)"
2002003-186 = "กรุณามุ่งหน้าไปทางทิศตะวันออก จะได้พบกับท่านผู้มีเกียรติ"
2002003-187 = "กรุณาอยู่ห่างจากของเย็นๆ และอยู่ใกล้ของที่อุ่นๆ..."
2002003-188 = "หากคุณอยู่ห่างจากน้ำ คุณจะมีโชค--"
2002003-189 = "ไปทางตะวันออก--"
2002003-190 = "ของเย็นๆ--"
2002003-191 = "น้ำ--"
2002003-199 = "[ns] \"ต้องมีอะไรผิดพลาดตรงไหนแน่ๆ นี่มันเกิดอะไรขึ้นเนี่ย\""
2002003-200 = "อืมๆ แบบนี้เองสินะคะ น่าสนใจมาก..."
2002003-204 = "ฮุฮุฮุ..."
2002003-205 = "[s] \"ฮิมาริ...?\""
2002003-206 = "เป็นยังไงบ้างคะคุณครู สำหรับเรื่องที่เกิดขึ้นในวันนี้..."
2002003-207 = "รู้สึกว่ามี <โชค> เพิ่มขึ้นรึเปล่าคะ?"
2002003-208 = "หรือรู้สึกว่า \"วันนี้เป็นวันที่ยอดเยี่ยมมากเลย!\" รึเปล่าคะ?"
2002003-209 = "[s] \"หืม? พูดเรื่องอะไรน่ะ...?\""
2002003-210 = "ฮุฮุฮุ ตอนนี้คงไม่ต้องปิดบังกันแล้วสินะคะ"
2002003-211 = "เอาละค่ะ คุณครูช่วยดูนี่หน่อยนะคะ"
2002003-218 = "(ฮิมาริยื่นนิตยสารให้คุณครูดูด้วยสีหน้าผู้ชนะ)"
2002003-219 = "[s] \"นิตยสารฉบับพิเศษ <ดวงชะตาประจำวัน>...?\""
2002003-223 = "(ฮิมาริเปิดนิตยสารหน้าที่พับไว้ และชี้ให้ดูข้อความที่เขียนเอาไว้)"
2002003-224 = "(<การท้าทายเพิ่มโชคประจำวันสุดพิเศษสำหรับผู้ที่เกิดในเดือนธันวาคม!>)"
2002003-225 = "<ไปทางตะวันออก จะได้พบกับผู้มีเกียรติและคุณจะมีโชคเพิ่มมากขึ้น>"
2002003-226 = "<อยู่ให้ห่างจากของเย็น และดื่มของอุ่นๆ จะทำให้โชคของคุณเพิ่มขึ้น>"
2002003-227 = "<อยู่ให้ห่างจากน้ำ จะทำให้โชคของคุณเพิ่มขึ้น> "
2002003-228 = "<อย่าทำอะไรผลีผลาม หากทำเช่นนั้นอาจทำให้คนรอบข้างไม่พอใจได้ ผู้ที่สงบนิ่งจะมีโชคเพิ่มขึ้น> และอื่นๆ"
2002003-229 = "ตามบทความพิเศษของทางโครโนส ดูเหมือนว่าถ้าคนที่เกิดในเดือนธันวาคมทำตาม จะโชคดี#nเพิ่มขึ้นค่ะ!"
2002003-233 = "[ns] \"เดี๋ยวนะ ถ้างั้นหรือว่าเรื่องที่เกิดวันนี้ทั้งวัน...\""
2002003-234 = "ค่ะ ฉันแฮ็กเข้าระบบ... และลองทำการทดสอบดูค่ะ"
2002003-235 = "วันเกิดฉันคือเดือนธันวาคม เลยคิดว่าน่าจะเป็นโอกาสที่ดีในการทดสอบดูน่ะค่ะ~"
2002003-236 = "แต่น่าเสียดาย... คุณครูก็ทราบดีว่าฉันออกไปข้างนอกไม่ได้"
2002003-237 = "ดังนั้นแทนที่จะลองทดสอบเองโดยตรง... ก็เลยให้คุณครูเป็นผู้ทดสอบแทนค่ะ"
2002003-238 = "[s] \"ฝีมือฮิมาริทั้งหมดเลยเหรอ?! ดวงมันทดสอบแทนกันได้ที่ไหนเล่า?!\""
2002003-239 = "อ๊ะ ฉันก็คำนึงถึงปัจจัยนั้นอยู่เหมือนกันนะคะ"
2002003-240 = "ฮุฮุ สมกับเป็นคุณครูจริงๆ เลยนะคะ ถึงวิเคราะห์บทสรุปได้แบบเดียวกันกับสาวน้อยอัจฉริยะอย่างฉัน รู้สึกประทับใจ-"
2002003-244 = "[ns] \"ฮิมาริ...\""
2002003-245 = "คะ...?"
2002003-249 = "[ns] \"ครูจะดุแบบไม่เกรงใจแล้วนะ\""
2002003-253 = "อา... คือ... คือว่า..."
2002003-259 = "[ns] \"เตรียมใจไว้เลย\""
2002003-260 = "อะ...อืม ระ... เรื่องนั้น..."
2002003-261 = "ในบทความของโครโนสเขียนไว้ว่า <อย่าทำอะไรผลีผลาม หากทำเช่นนั้นอาจทำให้คนรอบข้างไม่พอ#nใจได้ ผู้ที่สงบนิ่งจะมีโชคเพิ่มขึ้น>..."
2002003-262 = "สุดท้าย... ดวงนี่แม่นจริงๆ นะคะ ศาสตร์แห่งการดูดวงเป็นศาสตร์ที่ลึกซึ้งจริงๆ เลยค่ะ..."
2002003-263 = "[ns] \"ฮิมาริ เธอเป็นคนก่อเรื่องทั้งหมดเองนะ?!\""
2002003-265 = "(หลังจากนั้นคุณครูก็เริ่มเทศนาฮิมาริอย่างดุเดือดเป็นเวลาเกือบๆ 1 ชั่วโมง)"

[translation]
2002003-1 = "天才駭客的實驗"
2002003-7 = "今天非常感謝您協助千年的業務！"
2002003-8 = "真不愧是夏萊的老師！#n托您的福才能這麼順利地完成工作！"
2002003-9 = "[s]「不會不會，您太客氣了。」"
2002003-13 = "不好意思，我先告辭了！"
2002003-14 = "之後還請您多多關照！"
2002003-18 = "（依照計畫結束了千年的工作後，時鐘的時針指向著1）"
2002003-19 = "[ns]「和陽葵約好的時間只剩2小時了……得快點才行。」"
2002003-25 = "（就在能看見公車站的時候……）"
2002003-30 = "（預計要搭的公車正好抵達了公車站）"
2002003-31 = "[ns]「是那班公車！」"
2002003-43 = "[ns]「哈啊……哈啊……總算是趕上了……」"
2002003-48 = "（就在勉強搭上公車，還在調整呼吸時）"
2002003-52 = "感謝您的搭乘。#n下一站～「千年社團大樓」……"
2002003-56 = "……不好意思。#n下一站是「千年東港」，「千年東港」站。"
2002003-60 = "[ns]「……東港？那不是社團大樓的反方向嗎……」"
2002003-61 = "那麼我們即將向東出發！#n祝您旅途愉快！"
2002003-64 = "[ns]「等，等等！？」"
2002003-72 = "「千年東港」站到了。#n請留意您的隨身物品。"
2002003-73 = "請各位乘客盡快下車。#n為了避免班次混亂，強制脫離系統將會啟──"
2002003-74 = "[ns]「嗚哇！」"
2002003-78 = "（在車內廣播的途中，就被強制趕下了公車）"
2002003-79 = "向東方前進吧。貴人正等著你。#n祝您有美好的一天！"
2002003-80 = "[ns]「等，等等！」"
2002003-87 = "[ns]「怎麼回事……」"
2002003-88 = "（因為突然搭上了一輛奇怪的公車，被丟在了一個陌生的地方）"
2002003-92 = "[ns]「現在不是發呆的時候。我有和陽葵的約定啊。」"
2002003-102 = "（開始跑向陽葵等待著的社團大樓）"
2002003-103 = "（然而當時還不知道）"
2002003-107 = "（這只不過是接二連三發生的不可思議現象的序幕而已……）"
2002003-116 = "（就在朝社團大樓奔跑的途中，因意料之外的運動造成的疲勞感到口渴……）"
2002003-117 = "[ns]「在自動販賣機買個飲料吧……」"
2002003-123 = "（不假思索地按下了冰涼碳酸飲料的按鈕）"
2002003-129 = "[ns]「好燙！怎，怎麼會！？」"
2002003-133 = "[ns]「……『爆裂・神之紅豆湯』……？」"
2002003-134 = "（還以為出來的會是按下的冰涼碳酸飲料，沒想到卻是熱騰騰的紅豆湯……）"
2002003-135 = "（自動販賣機撥放起了奇怪的廣播）"
2002003-136 = "「遠離冷的，選擇熱的吧！」"
2002003-137 = "「為你準備的超甜紅豆湯！請好好享用！」"
2002003-138 = "[ns]「我現在想喝的是冰涼的飲料啊！？」"
2002003-141 = "（並沒有就此放棄，又試著按了別的按鈕……但出來的永遠都是紅豆湯）"
2002003-150 = "[ns]「哈啊……都是因為浪費時間和那台販賣機戰鬥，時間快要……！」"
2002003-151 = "（就在打算渡過前往社團大樓最短路線上的某座橋時……）"
2002003-155 = "各位居民請注意。#n此橋現在禁止通行。請使用替代道路。"
2002003-156 = "[s]「咦咦！？為什麼會在這種時候……！？」"
2002003-157 = "各位居民請注意。#n此橋現在禁止通行。請使用替代道路。"
2002003-161 = "各位居民請注意。#n此橋現在禁止通行。請使用替代道路。"
2002003-162 = "……「避開水邊的話運氣就會提升吧」"
2002003-163 = "[s]「……運氣？」"
2002003-164 = "……請使用替代道路。#n警告，發現可疑人物。已請求支援。"
2002003-168 = "[ns]「嗚哇！發生什麼事了！？」"
2002003-175 = "（為了逃離蜂擁而至的大量機器人，趕忙離開了那個地方）"
2002003-176 = "（在那之後，依然被捲入了各種奇妙的事件）"
2002003-186 = "向東方前進吧。貴人正等著你。"
2002003-187 = "遠離冷的，選擇熱的──"
2002003-188 = "避開水邊的話運氣──"
2002003-189 = "向東方前進──"
2002003-190 = "遠離冷的──"
2002003-191 = "避開水──"
2002003-199 = "[ns]「……事情就是這樣。今天真是倒楣。」"
2002003-200 = "原來如此，是這樣啊……"
2002003-204 = "……呵呵呵。"
2002003-205 = "[s]「……陽葵？」"
2002003-206 = "老師覺得怎麼樣呢？#n今天一整天，體驗那些事情之後……"
2002003-207 = "有覺得運氣多少提升了一點嗎？"
2002003-208 = "或者說，今天是美好的一天嗎？"
2002003-209 = "[s]「嗯？什麼意思……？」"
2002003-210 = "呵呵，揭曉答案。"
2002003-211 = "來，請您看看這個。"
2002003-218 = "（陽葵得意洋洋地打開了一本雜誌）"
2002003-219 = "[s]「克洛盧斯新聞部特輯……《本日占卜專欄》？」"
2002003-223 = "（陽葵打開事先摺好一角的頁面，在他手指指的地方這麼寫著）"
2002003-224 = "（「十二月誕生的你很特別！本日的運勢提升挑戰！」……）"
2002003-225 = "「向東方前進吧。貴人正等著你。這樣一來運氣就會提升吧」"
2002003-226 = "「遠離冷的，選擇熱的吧。這樣一來運氣就會提升吧」"
2002003-227 = "「避開水邊吧。這樣一來運氣就會提升吧」 "
2002003-228 = "「為了避免惹怒別人，請謹言慎行。這樣一來運氣就會提升吧」"
2002003-229 = "根據克洛盧斯新聞部的特輯，生日在十二月的人只要這麼做的話運氣就會提升！"
2002003-233 = "[ns]「難道說，今天發生的事情全都是……」"
2002003-234 = "沒錯，全都是我藉由駭入進行的實驗。"
2002003-235 = "因為我的生日在十二月，所以想試試看。"
2002003-236 = "……可惜我畢竟是病弱美少女，所以不太能到外面去。"
2002003-237 = "於是就讓老師代替我了。"
2002003-238 = "[s]「那些全都是陽葵做的嗎！？而且還是占卜的實驗！？」"
2002003-239 = "在實驗的過程中，我和老師應該都達成了一致的結論。"
2002003-240 = "呵呵。不愧是老師呢。#n和我這種超天才美少女有相同的思考方式──"
2002003-244 = "[ns]「……陽葵。」"
2002003-245 = "……嗯？"
2002003-249 = "[ns]「今天是說教時間唷。」"
2002003-253 = "那，那個，這是……"
2002003-259 = "[ns]「做好覺悟吧。」"
2002003-260 = "原，原來如此……"
2002003-261 = "特輯上確實寫著「為了避免惹怒別人，請謹言慎行。這樣一來運氣就會提升吧」──這樣的話呢。"
2002003-262 = "看來，這個占卜其實可能是正確的……？#n占卜的世界果然很深奧呢。"
2002003-263 = "[ns]「這是陽葵自己的錯哦！？」"
2002003-265 = "（之後花費超過1個小時，對陽葵仔細說教了一番）"

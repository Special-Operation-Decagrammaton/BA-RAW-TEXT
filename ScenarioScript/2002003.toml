[translation]
2002003-1 = "The Test of a Genius Hacker"
2002003-7 = "Thank you for helping today! "
2002003-8 = "You're amazing, Sensei! We had no problem finishing thanks to you!"
2002003-9 = "[s] \"Don't mention it...\""
2002003-13 = "I'm gonna get going!"
2002003-14 = "See you later!"
2002003-18 = "After finishing work at Millennium, I looked at the clock and saw it was just past one."
2002003-19 = "[ns] \"Two hours until I have to see Himari... Time to go.\""
2002003-25 = "After a short walk, I was almost at the bus station..."
2002003-30 = "Just in time to see the bus I needed arrive at the station."
2002003-31 = "[ns] \"W-Wait!\""
2002003-43 = "[ns] *pant* *pant* \"...Made it...\""
2002003-48 = "I barely made it on the bus and was catching my breath when suddenly..."
2002003-52 = "Greetings, passengers, our next destination is the Millennium clubhouse..."
2002003-56 = "...Oh, I'm sorry. Actually, our destination is Millennium's eastern port. Eastern port!"
2002003-60 = "[ns] \"...Huh? The eastern port is on the opposite side of Millennium from the clubhouse...\""
2002003-61 = "Enjoy your eastbound journey!"
2002003-64 = "[ns] \"W-Wait!\""
2002003-72 = "Destination reached. This is Millennium's eastern port."
2002003-73 = "Passengers must exit here. Compliance is assumed. Emergency ejection activating in three, two..."
2002003-74 = "[s] \"Wh-What...?!\""
2002003-78 = "Before I could react to the announcement, I was kicked off the bus."
2002003-79 = "Thank you for riding with us! We hope you meet a special someone today!"
2002003-80 = "[ns] \"W-Wait a second! Or longer than a second!\""
2002003-87 = "[ns] \"Wh-What was that all about?\""
2002003-88 = "Somehow, I had been kidnapped by a bus and dumped in an unfamiliar place."
2002003-92 = "[ns] \"Bus kidnappings are no excuse. I have to head back now, or I'll be late...\""
2002003-102 = "I headed to the clubhouse to meet Himari."
2002003-103 = "At the time, I had no idea..."
2002003-107 = "...that being kidnapped by a bus was just a precursor of things to come..."
2002003-116 = "While running to the clubhouse to make up for lost time, I got thirsty and stopped for a drink."
2002003-117 = "[ns] \"I'll grab a drink from the vending machine...\""
2002003-123 = "I selected a cool soda from the vending machine and grabbed it straight away..."
2002003-129 = "[ns] \"Argh, it's hot! Wh-What the...\""
2002003-133 = "[ns] \"...Fire Bomb Red Bean Soup Explosion?\""
2002003-134 = "Instead of a refreshing soda, an aggressively-named hot red bean soup had come out."
2002003-135 = "Then a strange voice began emanating from the vending machine, saying..."
2002003-136 = "Push away the cold and hold the heat close."
2002003-137 = "This red bean soup is for you! Enjoy!"
2002003-138 = "[ns] \"I-I just want a cold drink!\""
2002003-141 = "I refused to give into the vending machine's demands and pressed other buttons... A vain hope. Nothing came to me, nothing except for...Fire Bomb Red Bean Soup Explosions."
2002003-150 = "[ns] \"I've spent too much time losing a fight to this vending machine. I have to give up before I'm late.\""
2002003-151 = "I headed straight to the clubhouse, determined to let nothing distract me as I was about to cross the bridge, then..."
2002003-155 = "Attention all residents. Please step back and find a detour."
2002003-156 = "[s] \"What?! Why now?!\""
2002003-157 = "Attention all residents. Please step back and find a detour."
2002003-161 = "Attention all residents. Please step back and find a detour."
2002003-162 = "Remember, stay away from water and your luck will improve."
2002003-163 = "[s] \"...Luck?\""
2002003-164 = "Please step back and find a detour. If you do not comply, our drone-swarm customer satisfaction representative will be with you shortly."
2002003-168 = "[ns] \"Wh-Whoa! What is even going on?!\""
2002003-175 = "Avoiding the drones suddenly swarming in, I hurriedly left."
2002003-176 = "After that, strange things kept happening one after another."
2002003-186 = "Travel east and meet a special someone."
2002003-187 = "Stay away from the cold and keep the heat near..."
2002003-188 = "Stay away from water for improved luck..."
2002003-189 = "Eastward..."
2002003-190 = "The cold..."
2002003-191 = "Water..."
2002003-199 = "[ns] \"...That's what happened. I think. I still don't really understand what happened.\""
2002003-200 = "Huh. Interesting. Interesting."
2002003-204 = "...Heeheeheehee."
2002003-205 = "[s] \"...Um, Himari?\""
2002003-206 = "So, how were they, Sensei? How were those experiences?"
2002003-207 = "Do you feel that luck is on your side now?"
2002003-208 = "Are you thinking, \"Wow, what an amazing day! I wish this happened to me every day!\"?"
2002003-209 = "[s] \"...What? Why would I want to lose a fight to a vending machine everyday?\""
2002003-210 = "Heh heh. Nothing to hide now."
2002003-211 = "Here, feast your eyes on this."
2002003-218 = "With supreme confidence, Himari unfolded a magazine and laid it out in front of me."
2002003-219 = "[s] \"A Kronos School of Journalism special feature... The Horoscope Column?\""
2002003-223 = "Himari flipped to a page and pointed with her finger. I started reading..."
2002003-224 = "\"Specially prepared for those with December birthdays! Today's up, up, up and away fortune challenge!\" And more..."
2002003-225 = "\"Go east. There, you'll meet a special someone and your luck will improve.\""
2002003-226 = "\"Avoid the cold and seek the heat and your luck will improve.\""
2002003-227 = "\"Steer clear of water and your luck will improve.\" "
2002003-228 = "\"Don't be rash, or you will upset those around you. Good things come to those who wait.\" And on it went."
2002003-229 = "According to the Kronos School of Journalism, people born in December can increase their luck by doing these things today!"
2002003-233 = "[ns] \"Wait... So... Hold up... Just a sec... Everything that happened...\""
2002003-234 = "Yes! All part of a grand experiment I conducted with the help of some harmless hacks here and there."
2002003-235 = "I was born in December, so I thought this would be a great opportunity to test my luck."
2002003-236 = "...But unfortunately, as you know, I can't recklessly throw my body into the elements."
2002003-237 = "So, since I can't experiment on myself, I used you instead."
2002003-238 = "[s] \"At what point did any of that make sense to you?! How could I even act as your substitute?!\""
2002003-239 = "I considered the fact that we are different people, of course."
2002003-240 = "But, honestly, it just...made sense to me. We're so alike that..."
2002003-244 = "[ns] \"...Himari.\""
2002003-245 = "What?"
2002003-249 = "[ns] \"I'm going to be serious now.\""
2002003-253 = "...Oh, s-so..."
2002003-259 = "[ns] \"Listen.\""
2002003-260 = "Um, u-uh..."
2002003-261 = "The Kronos special feature said, \"Don't be rash, or you will upset those around you. Good things come to those who wait.\""
2002003-262 = "I understand completely... You're saying...that the fortune was completely correct. It's almost scary what astrology can do..."
2002003-263 = "[ns] \"Is your name astrology now?!\""
2002003-265 = "For about an hour after that, I lectured the girl who was a bit too obsessed with the occult."

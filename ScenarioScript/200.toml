[translation]
200-1 = "#title;총력전 임무 브리핑"
200-2 = "#place;샬레 상황실"
200-3 = "3;린;03;오랜만에 뵙는군요, 선생님. 샬레의 일은 잘 처리하고 계시는지요.\n#3;a"
200-4 = "3;린;02;오늘 이렇게 말씀을 청하게 된 이유는 다름이 아니라, 키보토스 곳곳에서 벌어지고 있는 어느 특별한 사건들을 부탁드리기 위해서입니다."
200-5 = "3;린;01;아비도스 사막의 지하에 잠들어 있는 거대한 기계 괴수라던가……"
200-6 = "3;린;99;밀레니엄 학원 외곽에서 무인 병기를 생산해내는 비밀스러운 군수공장이라던가……\n#3;em;…"
200-7 = "3;린;01;도시 전설 같은 이야기뿐이지만, 선생님께서도 들어보신 적이 있으시겠지요?"
200-8 = "3;린;05;네. 질 나쁜 낭설에 불과했을 이 소문들은 어느새 실체화되어 키보토스에 나타났고, 끝내는 유의미한 피해를 내기 시작했습니다."
200-9 = "3;린;99;학생회장의 부재로 바쁜 이 시기에 총학생회가 직접 움직이는 것은 비효율적인 일입니다."
200-10 = "3;린;01;선생님께서는 총학생회장께서 직접 선택한 분이시니, 이 정도의 업무는 어렵지 않게 해내실 수 있으시겠지요?"
200-11 = "3;린;03;좋습니다, 그럼 샬레의 활약을 기대하고 있겠습니다. \n#3;em;[반짝]\n#3;greeting"

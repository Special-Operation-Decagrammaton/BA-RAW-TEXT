[translation]
200-1 = "Total Assault Mission Briefing"
200-2 = "Schale Situation Room"
200-3 = "It's been a while, Sensei. How is it going with Schale?"
200-4 = "I was hoping we could discuss some of the bizarre incidents that have been happening around Kivotos."
200-5 = "Like that giant mechanical monster slumbering below the Abydos Desert..."
200-6 = "Or the secret munitions factory creating unmanned weapons on the outskirts of the Millennium School."
200-7 = "They may sound like urban legends, but I'm sure they've caught your attention as well."
200-8 = "These should have stayed myths, but Kivotos is finding out how real they are and suffering significant damage."
200-9 = "The General Student Council already has its hands full dealing with the situation surrounding our president."
200-10 = "The same president who hand-picked you, Sensei. You should have what it takes to tackle a mission like this."
200-11 = "Great. Then I'm looking forward to seeing what Schale can do."

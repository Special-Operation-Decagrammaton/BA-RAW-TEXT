[translation]
200-1 = "總力戰"
200-2 = "夏萊．作戰指揮室"
200-3 = "好久不見，老師。夏萊的工作還順利嗎？"
200-4 = "今天想拜託您的事情無他，正是想請您處理發生在奇普托斯各地的幾個特別的事件。"
200-5 = "比方說沉睡於阿拜多斯沙漠地底的巨大機械怪獸……"
200-6 = "或是在千年學園郊外生產無人兵器的祕密軍需工廠……"
200-7 = "雖然是都市傳說一類的事，但老師應該也聽說過吧？"
200-8 = "是的。雖然原本只不過是惡質的傳言，卻在不知不覺間實體化，出現於奇普托斯，最終開始造成實質性的損害。"
200-9 = "但是，在這個學生會長因不在而忙得不可開交的時期，由聯邦學生會直接採取行動會缺乏效率。"
200-10 = "而老師是聯邦學生會長親自指名的人，這個程度的工作應該難不倒你吧？"
200-11 = "那麼，期待夏萊的活躍。 "

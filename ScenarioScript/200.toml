[translation]
200-1 = "สรุปภารกิจเรดบอส"
200-2 = "ห้องยุทธการชาเล่ต์"
200-3 = "ไม่เจอกันนานเลยนะคะคุณครู จัดการงานของทางชาเล่ต์ได้ดีใช่มั้ยคะ?"
200-4 = "สาเหตุที่ฉันมาหาคุณครูวันนี้ เพราะอยากขอร้องเกี่ยวกับเหตุการณ์แปลกๆ บางอย่างที่เกิดขึ้น#nทั่วคิโวทอสค่ะ"
200-5 = "ที่ชั้นใต้ดินของทะเลทรายอะบิดอส มีเจ้าปีศาจขนาดใหญ่ที่หลับใหลอยู่"
200-6 = "ที่โรงงานผลิตอาวุธที่ตั้งขึ้นอย่างลับๆ ในเขตชานเมืองของโรงเรียนมิลเลเนียม....\n"
200-7 = "มันเป็นแค่เรื่องเล่าต่อๆ กันมาในเมือง คุณครูเองก็คงจะเคยได้ยินใช่มั้ยคะ?"
200-8 = "ข่าวลือพวกนี้เป็นแค่ข่าวลือเสียๆ หายๆ ก็จริง แต่มันเกิดขึ้นอย่างรวดเร็ว และแพร่ไปทั่วคิโวทอส#nซึ่งข่าวลือแบบนี้คือจุดเริ่มต้นของความเสียหายอันมหาศาลค่ะ"
200-9 = "ในตอนที่ประธานสภานักเรียนไม่อยู่และเกิดความวุ่นวายแบบนี้ การที่องค์การนักเรียนออกมา#nเคลื่อนไหวเอง มันไม่ใช่เรื่องที่ดีเท่าไรเลยค่ะ"
200-10 = "คุณครูเป็นคนที่ประธานองค์การนักเรียนเป็นคนเลือกมาเอง งานระดับนี้คงจัดการได้ไม่ยากเลย#nใช่มั้ยล่ะคะ?"
200-11 = "ดีค่ะ ถ้างั้นฉันจะรอดูผลงานของชาเล่ต์นะคะ"

[translation]
1010003-1 = "Similar and Different"
1010003-3 = "[ns1] \"In other words, you want to buy a lottery ticket...\"\n[ns2] \"...with numbers you remember from your world, to win the jackpot?!\""
1010003-6 = "Yes. I remember the winning numbers."
1010003-7 = "[s3] \"Um... I could see how that'd work, but...\"\n[s4] \"...Is this morally correct? No matter how you look at it.\""
1010003-10 = "I'm the only person in all of Kivotos capable of implementing this method. And now that I've thought of it, I must see it through."
1010003-11 = "[s] \"It'll be interesting, in a lot of different ways...\""
1010003-13 = "[ns5] \"But is this really okay? Are we breaking some universal balance?\"\n[ns6] \"And what about my ethics as an educator?!\""
1010003-18 = "[ns7] \"Well, I can't back out now! Let's do it!\"\n[ns8] Buy a lottery ticket."
1010003-26 = "But the winning numbers were completely different from the ones Shiroko remembered."
1010003-35 = "I apologize, Sensei. I wasted your 300 yen."
1010003-36 = "[s] \"Don't worry. I was really intrigued by the whole thing.\""
1010003-37 = "Yes. I'm realizing this world has subtle differences from mine."
1010003-38 = "[s] \"Like what?\""
1010003-39 = "It's difficult to delineate the exact differences...and my memories are...hazy... "
1010003-40 = "As if I woke up from a murky dream...and everything as I knew it had ceased to be. Now I view even my own body through the lens of stranger."
1010003-41 = "...I'm not articulating this correctly. I'm sorry."
1010003-42 = "I'm neither the Shiroko of my world, nor the Shiroko of this one."
1010003-43 = "The differences...are simply the differences. Just as the lottery numbers were not the same."
1010003-44 = "[s] \"Some things are still the same.\""
1010003-45 = "Yes. Some things are. Like you, Sensei. It's peculiar, but you remain a constant, Sensei."
1010003-46 = "[s] \"And the fact that you love riding bicycles is the same too.\""
1010003-47 = "..."
1010003-48 = "[s] \"Shiroko, why did you stop riding?\""
1010003-50 = "[ns9] \"You even made a bicycle workshop in the house.\"\n[ns10] \"You even have a bicycle generator.\""
1010003-53 = "Well..."
1010003-54 = "There is no deeper meaning to it. It's simply...been a very long time."
1010003-55 = "I could bike for several thousand kilometers easily before. I may...not be capable of that anymore."
1010003-56 = "Would I truly...be able to ride again? What if my abilities have diminished?"
1010003-57 = "What if I do ride my bicycle, and it only solidifies that I'll never be able to return to things as they were?"
1010003-58 = "[s] \"What makes you say that?\""
1010003-59 = "What happens if I awaken from this haze and discover that this isn't Abydos, that you were never here?"
1010003-60 = "...What if it truly was just a dream?"
1010003-64 = "I'm rambling, aren't I? I apologize, Sensei."
1010003-70 = "[ns] \"I'm not a dream, Shiroko.\""
1010003-74 = "[ns] \"I'm right here in front of you. I won't disappear.\""
1010003-75 = "...So close."
1010003-79 = "...I know that much. You've always been a steadfast presence, Sensei."
1010003-80 = "I do understand...things unchanged...still exist..."
1010003-86 = "This path is familiar."
1010003-87 = "I went this way when I embarked on my ride around Kivotos."
1010003-88 = "I paused at this light to send a MomoTalk..."
1010003-92 = "I see... I remember even the minute details of this street..."
1010003-96 = "Yes, Sensei. This way."
1010003-97 = "[ns] \"Wait for me, Shiroko!\""
1010003-107 = "Here, Sensei. This is the best vantage point to view the street below."
1010003-111 = "[ns11] \"Wait for me... Shiroko... I can't keep up...\"\n[ns12] \"My god, how are you so fast...?\""
1010003-114 = "[ns] Follow Shiroko."
1010003-120 = "― [log=시로코 테러 무소속]Yes... This place is the same. [/log][wa:2390] "
1010003-121 = "― [log=시로코 테러 무소속]Perhaps the only thing that has changed is me.[/log][wa:3250] "
1010003-124 = "― [log=시로코 테러 무소속]Yes... Despite that, some things remain constant. That gives me comfort.[/log][wa:2380] "
1010003-127 = "― [log=시로코 테러 무소속]Sensei, I believe I'll try cycling again.[/log][wa:3460] "
1010003-130 = "― [log=시로코 테러 무소속]I expect there'll be many obstacles along the way, but...[/log][wa:10] "
1010003-131 = "― [log=시로코 테러 무소속]I think I'll be able to...as long as you are with me, Sensei.[/log][wa:5350] "
1010003-134 = "[ns] \"I'm glad. I'll cheer you on, Shiroko!\""
1010003-135 = "― [log=시로코 테러 무소속]Yes. Thank you, Sensei.[/log][wa:2480] "

1010003-1 = "#title;같은 것과 다른 것"
1010003-2 = "#wait;1500"
1010003-3 = "[ns1] \"……즉, 이미 알고 있는 복권 당첨 번호로,\"\n[ns2] \"복권을 사서 당첨금을 노리겠다는 거……!?\""
1010003-4 = "#wait;10"
1010003-5 = "#wait;10"
1010003-6 = "3;시로코 테러 무소속;00;응. 기억하고 있는 복권 번호가 있었는데, 그게 바로 이번 회차에서 당첨되거든.\n#3;a"
1010003-7 = "[s3] \"으으으음…… 그건 그럴 수도 있지만…….\"\n[s4] \"괜찮은 건가, 이 방법…… 여러 가지로…….\""
1010003-8 = "#wait;10"
1010003-9 = "#wait;10"
1010003-10 = "3;시로코 테러 무소속;99;이 방법은 오직 키보토스에서 나만 가능할 거야. 이 아이디어를 깨달은 이상, 실행해 보지 않으면 안 돼."
1010003-11 = "[s] \"시도해 보는 것 자체는 여러 가지로 의미 있을 것 같은데…….\""
1010003-12 = "#wait;1000"
1010003-13 = "[ns5] \"하지만 괜찮은 건가……\"\n[ns6] \"우주의 균형이라던가 교육자로서의 자세라던가…….\""

[translation]
1010003-1 = "相同與不同"
1010003-3 = "[ns1]「也就是說，你打算按照你記得的中獎號碼去買彩券……」\n[ns2]「看看能不能賺到獎金嗎……！？」"
1010003-6 = "嗯，我剛好記得這期彩券的頭獎號碼。"
1010003-7 = "[s3]「嗯……雖然你的確是可以這麼做……」\n[s4]「但這樣真的好嗎？這個方法……從某些角度來看……」"
1010003-10 = "這是整個奇普托斯只有我能辦到的方法。當然得試試看才行。"
1010003-11 = "[s]「嘗試這件事本身的確有許多意義沒錯……」"
1010003-13 = "[ns5]「不過這樣真的好嗎……」\n[ns6]「不管從維持宇宙秩序，還是身為教育者的層面來看……」"
1010003-18 = "[ns7]「但是不能在這種時候退縮！上吧！！」\n[ns8] 購買彩券"
1010003-26 = "（然而根據電視播報的結果，這期的中獎號碼跟白子記憶中的號碼並不相同）"
1010003-35 = "……抱歉，老師。#n是我害你浪費了300元。"
1010003-36 = "[s]「沒關係，畢竟我自己也很想知道結果。」"
1010003-37 = "……嗯。看來這裡和我所認識的世界還是有些微的不同。"
1010003-38 = "[s]「怎麼說呢？」"
1010003-39 = "因為記得的東西不多，我其實也不太清楚。"
1010003-40 = "就像某天回過神來，一切就結束了……大概就是那樣的感覺。#n雖然這是我的身體，但我卻一直有種像是在看著別人的感覺……"
1010003-41 = "……這件事情解釋起來有點複雜，抱歉。"
1010003-42 = "……我既不是以前的自己，也不是這裡的白子。"
1010003-43 = "所以就像彩券的號碼一樣，不同的東西就是不同。"
1010003-44 = "[s]「不過應該還是有沒變的東西吧？」"
1010003-45 = "嗯，沒錯，就像老師你一樣。#n雖然很不可思議……不過好像只有老師永遠都不會變。"
1010003-46 = "[s]「我認為喜歡騎自行車的白子，也一樣不會變的哦。」"
1010003-47 = "……"
1010003-48 = "[s]「白子，你為什麼不再騎自行車了呢？」"
1010003-50 = "[ns9]「你不是特別在家裡建了一間自行車工作坊嗎？」\n[ns10]「甚至連自行車發電機都有。」"
1010003-53 = "嗯……"
1010003-54 = "其實也沒什麼特別的理由。#n我只是……太久沒騎了而已。"
1010003-55 = "以前騎幾千km都不是什麼難事……#n但我現在實在沒自信能騎得跟過去一樣……"
1010003-56 = "現在的我還能騎自行車嗎……#n如果騎得不像以前那麼好的話……"
1010003-57 = "如果重新開始騎自行車，卻只是更清楚地意識到自己無法回到從前的事實……"
1010003-58 = "[s]「為什麼會那麼想呢？」"
1010003-59 = "要是下次回過神來，眼前就不再是阿拜多斯，或者連老師都消失的話該怎麼辦……？"
1010003-60 = "……如果這一切全都是場夢呢？"
1010003-64 = "抱歉，老師。我又說了一些奇怪的話。"
1010003-70 = "[ns]「我不是你夢境中的人哦，白子。」"
1010003-74 = "[ns]「所以並不會消失，現在也確實在你身邊。」"
1010003-75 = "有，有點太近了。"
1010003-79 = "……這件事我也很清楚。因為老師一直都在我的身邊。"
1010003-80 = "我明白……有些事物自始至終都不曾改變。"
1010003-86 = "我記得這條路。"
1010003-87 = "是我環遊奇普托斯之旅的第一天經過的地方。"
1010003-88 = "我還曾經在這前面的紅綠燈前停下來，然後傳MomoTalk……"
1010003-92 = "沒錯，這條路我記得很清楚。"
1010003-96 = "嗯，老師，這邊。"
1010003-97 = "[ns]「等等我，白子！」"
1010003-107 = "就是這邊，老師。#n這裡是最能看清楚這條路的地方。"
1010003-111 = "[ns11]「等我一下……白子……我的體力……」\n[ns12]「我的天，他也跑太快了吧……」"
1010003-114 = "[ns] 前往白子的身邊"
1010003-120 = "― [log=시로코 테러 무소속]……一如既往呢，這裡。[/log][wa:3190] "
1010003-121 = "― [log=시로코 테러 무소속]發生改變的，只有我自己嗎。[/log][wa:4570] "
1010003-124 = "― [log=시로코 테러 무소속]嗯……不過，看見這些沒有改變的事物之後，稍微安心了。[/log][wa:4220] "
1010003-127 = "― [log=시로코 테러 무소속]老師，我……想重新嘗試騎自行車。[/log][wa:4460] "
1010003-130 = "― [log=시로코 테러 무소속]雖然可能會遇到許多困難……[/log][wa:1490] "
1010003-131 = "― [log=시로코 테러 무소속]但是，只要老師能陪著我……感覺應該能做到。[/log][wa:6950] "
1010003-134 = "[ns]「那真是太好了。我會為你加油哦，白子！」"
1010003-135 = "― [log=시로코 테러 무소속]嗯，謝謝你。老師。[/log][wa:3040] "

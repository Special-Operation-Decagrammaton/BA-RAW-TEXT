1010003-35 = "3;시로코 테러 무소속;99;……미안. 선생님. 나 때문에 300엔 낭비해 버려서.\n#3;em;[땀]\n#3;a"
1010003-36 = "[s] \"음, 아냐. 사실은 결과가 궁금했었어.\""
1010003-37 = "3;시로코 테러 무소속;02;……응. 역시 이곳은 내가 알던 세계와 미묘하게 다를지도 모르겠어."
1010003-38 = "[s] \"어떤 게 달라?\""
1010003-39 = "3;시로코 테러 무소속;04;잘 모르겠어. 사실은 많은 것들이 잘 기억나지 않거든. \n#3;em;…"
1010003-40 = "3;시로코 테러 무소속;04;어느 순간 정신을 차려보니…… 모든 게 끝나 있었다? 그런 느낌이라고 해야 할까. 내 몸이지만 내가 아닌 타인을 보는 느낌이랄까……."
1010003-41 = "3;시로코 테러 무소속;06;……잘 설명하기 힘드네. 미안."
1010003-42 = "3;시로코 테러 무소속;04;……나는 예전의 내가 아니고, 여기에 있는 시로코도 아니야."
1010003-43 = "3;시로코 테러 무소속;04;저 복권 번호처럼, 다른 것은 다를 수밖에 없는 것 같아."
1010003-44 = "[s] \"하지만 여전히 그대로인 것도 있잖아.\""
1010003-45 = "3;시로코 테러 무소속;00;응. 그렇지. 선생님은 그래. 신기한 느낌이지만…… 선생님만은 언제나 그대로인 것 같아.\n#3;em;…"
1010003-46 = "[s] \"자전거 타는 걸 좋아하는 시로코도 그래.\""
1010003-47 = "3;시로코 테러 무소속;02;……."
1010003-48 = "[s] \"시로코. 어째서 자전거 타는 걸 그만둔 거야?\""
1010003-49 = "#wait;1000"
1010003-50 = "[ns9] \"방 안에 자전거 공방도 만들어뒀으면서?\"\n[ns10] \"자전거 발전기도 있으면서?\""

[translation]
1010003-1 = "สิ่งที่เหมือนกับสิ่งที่แตกต่าง"
1010003-3 = "[ns1] \"หมายความว่ารู้เลขลอตเตอรี่ที่จะถูกรางวัลแล้ว?\"\n[ns2] \"ซื้อลอตเตอรี่หวังเงินรางวัลเหรอ...!?\""
1010003-6 = "อื้อ มีเลขลอตเตอรี่ที่ฉันจำได้อยู่ และเลขนั้นก็เป็นเลขที่จะถูกรางวัลในรอบนี้น่ะ"
1010003-7 = "[s3] \"อืมมม... ก็อาจเป็นแบบนั้นได้อยู่เหมือนกัน...\"\n[s4] \"วิธีนี้จะไม่เป็นไรใช่มั้ยนะ... ในหลายๆ เรื่องนะ\""
1010003-10 = "คนที่ใช้วิธีนี้ได้ในคิโวทอสมีแค่ฉันคนเดียวเท่านั้น ในเมื่อคุณครูรู้ไอเดียนี้แล้ว ต้องเอาไปลองดูนะ"
1010003-11 = "[s] \"ครูว่าการได้ลองดูก็มีความหมายในหลายๆ นัยยะนะ...\""
1010003-13 = "[ns5] \"มันจะไม่เป็นไรแน่เหรอ...\"\n[ns6] \"จะไม่เป็นไรแน่เหรอทั้งในเรื่องสมดุลของจักรวาลกับในฐานะครู...\""
1010003-18 = "[ns7] \"คงจะถอยไม่ได้แล้ว ลองดูก็ได้!!\"\n[ns8] ซื้อลอตเตอรี่"
1010003-26 = "(ผลลัพธ์คือ หมายเลขที่ถูกรางวัลแตกต่างจากเลขที่ชิโรโกะจำได้อย่างสิ้นเชิง)"
1010003-35 = "ขอโทษนะ คุณครู... ต้องเสียเงิน 300 เยนไปเปล่าๆ เพราะฉันเลย"
1010003-36 = "[s] \"ไม่หรอกๆ ครูลองเพราะอยากรู้เหมือนกัน\""
1010003-37 = "อื้อ... คิดแล้วเชียวว่าที่นี่มันอาจแตกต่างจากโลกที่ฉันรู้จัก"
1010003-38 = "[s] \"อะไรที่แตกต่างเหรอ?\""
1010003-39 = "ฉันเองก็ไม่รู้ ที่จริงมีหลายอย่างเลยที่ฉันจำไม่ค่อยได้น่ะ "
1010003-40 = "รู้สึกเหมือนกับว่า... จู่ๆ พอรู้ตัวอีกที... ทุกอย่างก็จบลงแล้วน่ะ  ถึงนี่จะเป็นร่างกายของฉัน แต่มันรู้สึกเหมือนกำลังมองคนอื่นอยู่..."
1010003-41 = "อธิบายยากจัง... ขอโทษนะ"
1010003-42 = "ฉันไม่ใช่คนเดิมที่เคยเป็น... และไม่ใช่ชิโรโกะที่อยู่ที่โลกนี้"
1010003-43 = "ดูเหมือนว่าทุกอย่างจะต่างออกไป... เหมือนกับเลขลอตเตอรี่นั่น"
1010003-44 = "[s] \"แต่ก็มีสิ่งที่ไม่เปลี่ยนไปอยู่ด้วยนี่นา\""
1010003-45 = "อื้อ ใช่แล้ว คุณครูพูดถูก ถึงจะรู้สึกแปลกนิดหน่อย... แต่ฉันคิดว่ามีแค่คุณครูน่ะ ที่ไม่เปลี่ยนไปเลย"
1010003-46 = "[s] \"ชิโรโกะที่ชอบปั่นจักรยานก็เหมือนกันนั่นแหละ\""
1010003-47 = "......"
1010003-48 = "[s] \"ชิโรโกะ ทำไมถึงเลิกปั่นจักรยานล่ะ?\""
1010003-50 = "[ns9] \"ทั้งที่ทำห้องซ่อมจักรยานไว้ในบ้านแท้ๆ...?\"\n[ns10] \"ทั้งที่มีเครื่องปั่นไฟด้วยจักรยานแท้ๆ...?\""
1010003-53 = "อืม..."
1010003-54 = "ไม่มีเหตุผลอะไรเป็นพิเศษหรอก ก็แค่... ไม่ได้ปั่นมานานแล้วน่ะ"
1010003-55 = "เมื่อก่อนปั่นได้เป็นพันกิโลเมตรสบายๆ... แต่ตอนนี้ฉันไม่แน่ใจเลยว่าจะปั่นแบบนั้นได้หรือเปล่า..."
1010003-56 = "จะปั่นได้อีกครั้งหรือเปล่า... แล้วถ้าปั่นได้ไม่ดีเหมือนเดิมจะทำยังไง..."
1010003-57 = "ถ้าการกลับไปปั่นจักรยานจะทำให้รู้ความจริงที่ว่าไม่สามารถย้อนกลับไปเป็นเหมือนเมื่อก่อนได้แล้ว จะทำยังไง..."
1010003-58 = "[s] \"ทำไมถึงคิดแบบนั้นล่ะ?\""
1010003-59 = "ถ้าเกิดรู้สึกตัวอีกทีแล้วรู้ว่าที่นี่ก็ไม่ใช่อะบิดอส และไม่มีคุณครูอยู่ล่ะ...?"
1010003-60 = "ได้รู้ว่าเรื่องทั้งหมดนี่เป็นแค่ความฝันล่ะ...?"
1010003-64 = "ขอโทษนะ คุณครู ดันพูดอะไรแปลกๆ ไปซะแล้ว"
1010003-70 = "[ns] \"ครูไม่ใช่ความฝันหรอกนะ ชิโรโกะ\""
1010003-74 = "[ns] \"ครูไม่หายไปไหนหรอก ยังอยู่ข้างๆ ชิโรโกะนี่ไง\""
1010003-75 = "ใกล้...เกินไปนะ"
1010003-79 = "เรื่องนั้นฉันรู้ดี เพราะคุณครูคอยอยู่เคียงข้างฉันเสมอ"
1010003-80 = "สิ่งที่ยังไม่เปลี่ยนไป... และสิ่งที่ยังคงหลงเหลืออยู่ที่นี่... ฉันรู้ดี"
1010003-86 = "ฉันจำถนนเส้นนี้ได้"
1010003-87 = "นี่เป็นเส้นทางที่ฉันใช้ในวันแรกตอนปั่นจักรยานรอบคิโวทอส"
1010003-88 = "ฉันหยุดที่ตรงไฟแดงข้างหน้าแล้วก็ส่ง MOMOTALK..."
1010003-92 = "ใช่แล้วละ ฉันจำถนนเส้นนี้ได้ทั้งสาย"
1010003-96 = "อื้อ คุณครู ทางนี้..."
1010003-97 = "[ns] \"รอครูด้วย ชิโรโกะ!\""
1010003-107 = "ทางนี้ คุณครู ตรงนี้เป็นจุดที่มองเห็นถนนได้ดีที่สุด"
1010003-111 = "[ns11] \"รอด้วย... ชิโรโกะ... ครูไม่มีแรงวิ่ง...\"\n[ns12] \"ทำไมถึงวิ่งเร็วอะไรขนาดนั้นนะ...\""
1010003-114 = "[ns] เดินไปตรงที่ที่ชิโรโกะอยู่"
1010003-120 = "― [log=시로코 테러 무소속]อื้อ เหมือนเดิมเลยนะ ที่นี่น่ะ[/log][wa:2430] "
1010003-121 = "― [log=시로코 테러 무소속]สิ่งที่เปลี่ยนไป อาจมีแค่ตัวฉันอย่างเดียวก็ได้[/log][wa:3250] "
1010003-124 = "― [log=시로코 테러 무소속]อื้อ... แต่ว่ามันก็มีบางสิ่งที่ไม่เปลี่ยนไปด้วยเลยรู้สึกอุ่นใจนิดหน่อย[/log][wa:2460] "
1010003-127 = "― [log=시로코 테러 무소속]คุณครู ฉันน่ะ...คิดว่าจะปั่นจักรยานอีกครั้งละ[/log][wa:3300] "
1010003-130 = "― [log=시로코 테러 무소속]อาจมีเรื่องยากลำบากต่างๆ เกิดขึ้นมากมายแต่ว่า...[/log][wa:90] "
1010003-131 = "― [log=시로코 테러 무소속]ถ้ามีคุณครูอยู่ด้วย... ฉันคิดว่าคงทำได้น่ะ[/log][wa:6110] "
1010003-134 = "[ns] \"ดีจังเลย ครูจะเป็นกำลังใจให้นะ ชิโรโกะ!\""
1010003-135 = "― [log=시로코 테러 무소속]อื้อ ขอบคุณนะ คุณครู [/log][wa:2560] "

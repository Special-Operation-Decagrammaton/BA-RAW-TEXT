[translation]
10014075-2 = "แฮ่ก...แฮ่ก... แฮ่ก...แฮ่ก"
10014075-3 = "ยะ... หยุด... หยุดวิ่งได้แล้ว... ถึงตรงนี้ก็พอ..."
10014075-9 = "แค่นี้ก็น่าจะไม่เป็นอะไรแล้วใช่มั้ย...? เข้ามาในเขตปกครองตนเองทรีนิตี้แล้วด้วย..."
10014075-10 = "แต่ว่านะ... ทำไมพวกเราต้องหนีมาอย่างนี้ด้วยล่ะ? กำลังจะชนะอยู่แล้วไม่ใช่รึไง...?"
10014075-11 = "ไม่หรอก ถ้ายังยื้อเวลาไปนานกว่านั้นจะอันตราย มันใกล้ถึงเวลาที่นกกระจอกของพวกวัลคิรี่#nหรือพวกอื่นๆ จะมาถึงแล้วน่ะ"
10014075-12 = "ถ้ายังอยู่ตรงนั้นคงจะโดนจับไปพร้อมกันทีเดียวหมดแน่ ตอนนี้พวกนั้นก็คงจะโดนจับไปแล้วละ"
10014075-13 = "งะ...งั้นเหรอ? แบบนี้เอง..."
10014075-17 = "ว่าแต่นกกระจอกคืออะไรน่ะ?"
10014075-21 = "อา..."
10014075-22 = "[s1] \"ใช้ศัพท์เฉพาะทางอีกแล้ว...\"\n[s2] \"คิดว่าคงจะหมายถึงโรงเรียนตำรวจวัลคิรี่น่ะ\""
10014075-23 = "อ่าๆ พวกนักเรียนโรงเรียนตำรวจ... คุณครูก็รู้จักอยู่บ้างสินะ"
10014075-24 = "อ่าๆ พวกนักเรียนโรงเรียนตำรวจ... คุณครูก็รู้จักอยู่บ้างสินะ"
10014075-29 = "อย่างนี้พวกที่พยายามจะหยุดไม่ให้แคทส์ พาลูคฟื้นคืนชีพ สุดท้ายแล้วก็โดนกวาดล้างไปหมดเลย"
10014075-30 = "อ้อ ถ้าหยุดการคืนชีพของปีศาจไม่ได้ ก็จะต้องกลับไปสู่ยุคมืด..."
10014075-37 = "บอกให้พอได้แล้วไงเล่า! ฮึ่ย!!"
10014075-39 = "บอกว่า!"
10014075-41 = "พอ!"
10014075-43 = "ได้แล้ว!"
10014075-45 = "ไงเล่า! หา!?"
10014075-47 = "เวลา...!"
10014075-49 = "ที่ คน อื่น เค้า พูด น่ะ หัด ฟัง กัน บ้าง สิ เฟ้ย!?"
10014075-51 = "อ่า อ่าา~ อ่าาาาา~"
10014075-53 = "อ่ะฮะฮะฮะ..."
10014075-54 = "ฮิฮิ..."
10014075-55 = "[s3] \"ดูมีความสุขสุดๆ เลยนะ โยชิมิ\"\n[s4] \"เป็นรอยยิ้มที่ดีที่สุดในช่วงนี้เลย\""
10014075-56 = "อ่า... แน่นอนอยู่แล้ว"
10014075-57 = "อ่า... แน่นอนอยู่แล้ว"
10014075-58 = "ตอนนี้กำลังสนุกสุดๆ เลยน่ะ... ปล่อยให้สนุกกันไปเถอะ"
10014075-60 = "จะว่าไป... แล้วนี่จะทำยังไงกับคนคนนี้กันดีล่ะ?"
10014075-61 = "คนคนนี้...? ถ้าเป็นคนคนนี้ละก็..."
10014075-67 = "จะว่าไปแล้ว... รายนั้นเป็นลมล้มพับไปตั้งแต่ตอนที่เราถล่มกำแพงเข้าไปเลยใช่มั้ยคะ"
10014075-68 = "อืม อย่าว่าแต่ได้สู้เลย แม้แต่หน้าพวกเราก็ยังไม่ทันได้มองเลยด้วยซ้ำ"
10014075-69 = "แต่ถึงอย่างนั้นก็โล่งใจนะคะที่ไม่ได้รับบาดเจ็บ... หรืออะไรแบบนั้นน่ะค่ะ!"
10014075-74 = "อืม... ถ้างั้นก็ไม่มีอะไรต้องห่วง ปล่อยให้นอนอยู่บนม้านั่งแถวนี้ก็คงไม่เป็นไรหรอก"
10014075-81 = "จะ... จะดีเหรอ!? คะ... คาซึสะจัง!?"
10014075-82 = "นี่ๆ.... จะยังไงก็เถอะนะ แต่ให้ปล่อยคนที่หมดสติไว้บนม้านั่งนี่มันก็..."
10014075-84 = "...? อื้อ เชื่อฉันเถอะ ยัยนี่ไม่เป็นอะไรหรอก"
10014075-85 = "ที่พูดแบบนั้นก็เพราะฉันรู้ดีน่ะ ไม่ได้ว่าเพิ่งเคยเห็นอะไรแบบนี้มาแค่ครั้งสองครั้งหรอกนะ อีกอย่างยัยนี่ก็ชอบนอนบนม้านั่งมาตั้งแต่แรกแล้วด้วย"
10014075-86 = "สุดท้าย... ความเข้าใจและความเชื่อใจก็ก่อตัวขึ้นในความสัมพันธ์สินะ"
10014075-88 = "โรแมนติกจัง..."
10014075-89 = "[s5] \"อื้ม... จริงด้วยนะ\"\n[s6] \"ครั้งนี้นัตสึอาจจะพูดถูกก็ได้นะ\""
10014075-90 = "หนวกหูน่า พอเถอะ!! โรแมนติกกับผีน่ะสิ..."
10014075-91 = "หนวกหูน่า พอเถอะ!! โรแมนติกกับผีน่ะสิ..."
10014075-95 = "อืม..."
10014075-99 = "...? มีอะไรงั้นเหรอ?"
10014075-100 = "คาซึสะจัง? นั่นมัน...หนังสือคำท้า? จะคืนให้เรอิสะจังอีกเหรอ?"
10014075-101 = "กะ... ก็... ถึงจะเก็บไว้ที่ฉันมันก็ไม่มีประโยชน์อะไรอยู่ดีนี่นา ก็แค่จะคืนให้กับเจ้าของก็เท่านั้นเอง"
10014075-103 = "เป็นไปอย่างที่คิดเลย ซึนเดเระจริงๆ ด้วยแฮะ"
10014075-104 = "ก็บอกว่าให้พอได้แล้วไงเล่า"
10014075-105 = "เฮ้อ เหนื่อยชะมัด... ทำไมฉันถึงต้องมาเจอเรื่องแบบนี้ด้วยนะ..."
10014075-110 = "เป็นนาฬิกาบอกเวลาได้สุดยอดไปเลยนะเนี่ย"
10014075-111 = "ทุกคนเหน็ดเหนื่อยกันมาทั้งคืนแล้วนี่คะ..."
10014075-112 = "อื้ม ถึงเวลาต้องเติมน้ำตาลกันแล้วละ"
10014075-113 = "[s7] \"ถ้าอย่างนั้นไปหาอะไรกินกันก่อนดีมั้ย\"\n[s8] \"เดี๋ยววันนี้ครูเลี้ยงเอง\""
10014075-120 = "อื้อ...!!"

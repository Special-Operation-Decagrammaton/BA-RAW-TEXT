[translation]
10014075-2 = "哈啊，哈啊……"
10014075-3 = "到，到這裡……差不多可以了吧……"
10014075-9 = "到這附近應該沒問題了吧……？#n都到三一的自治區了……"
10014075-10 = "話說我們有必要逃跑嗎？#n明明都要贏了不是嗎……？"
10014075-11 = "不，再待在那裡的話真的會有危險的。#n女武神的麻雀們也差不多要到了……"
10014075-12 = "如果還留在那裡，現在大家應該都已經被逮捕了吧。"
10014075-13 = "這，這樣啊……"
10014075-17 = "……話說麻雀是什麼意思？"
10014075-21 = "……啊。"
10014075-22 = "[s1] 「說出專業術語了……」\n[s2] 「應該是指女武神警察學園的人哦。」"
10014075-23 = "啊啊……是在說警察學校的學生啊……#n話說老師竟然知道這種事啊。"
10014075-24 = "啊啊……是在說警察學校的學生啊……#n話說老師竟然知道這種事啊。"
10014075-29 = "就這樣，試圖阻止凱茜．帕魯格復活的他們……#n反而全軍覆沒了。"
10014075-30 = "啊啊……世界並沒有成功阻止魔獸的復活，再次進入了黑暗的時代──"
10014075-37 = "別再說了！！！"
10014075-39 = "真是！！"
10014075-41 = "我都！"
10014075-43 = "已經！"
10014075-45 = "說過要你！"
10014075-47 = "停下來了吧！"
10014075-49 = "糟透了！！"
10014075-51 = "啊，啊啊！！啊啊啊！！這就是……"
10014075-53 = "啊哈哈……"
10014075-54 = "……呵呵。"
10014075-55 = "[s3] 「你看起來真開心呢，喜美。」\n[s4] 「這是你最近笑得最開心的一次呢。」"
10014075-56 = "……嗯，當然囉。"
10014075-57 = "……嗯，當然囉。"
10014075-58 = "我現在超開心的……再讓我笑一下吧。"
10014075-60 = "……話說這傢伙該怎麼辦呢？"
10014075-61 = "這傢伙……？#n啊……"
10014075-67 = "這麼說來……破壞牆壁之後他就昏倒了呢……"
10014075-68 = "唔嗯。別說戰鬥了，可能連我們的臉都沒看到吧。"
10014075-69 = "不過還好，看起來……沒有受傷的樣子！"
10014075-74 = "……這樣啊。那就不用擔心了吧。#n嘛，隨便把他放在那邊的長椅上睡覺吧。"
10014075-81 = "咦，咦咦！？！？#n千，千紗醬！？"
10014075-82 = "等一下……再怎麼說，把昏過去的人就這樣放在長椅上也太……"
10014075-84 = "……不是，你們先等等，相信我吧。#n這傢伙真的不用擔心。"
10014075-85 = "我是知道才會這麼說的……這種情況也已經看過好幾次了。#n況且這傢伙本來就喜歡在長椅上睡覺。"
10014075-86 = "原來如此……是由孽緣而生的信賴關係啊。"
10014075-88 = "……真是浪漫。"
10014075-89 = "[s5] 「……嗯，確實。」\n[s6] 「或許這次夏說的沒錯。」"
10014075-90 = "真是，煩死了！！#n什麼浪漫嘛……"
10014075-91 = "真是，煩死了！！#n什麼浪漫嘛……"
10014075-95 = "……唔嗯。"
10014075-99 = "……在做什麼？"
10014075-100 = "千紗醬，那個是……挑戰書？#n要還給澪紗醬嗎？"
10014075-101 = "嘛……反正我拿著也沒用，就物歸原主吧。#n就只是這樣而已。"
10014075-103 = "原來如此。這就是傲嬌嗎。"
10014075-104 = "就跟你說別鬧了。"
10014075-105 = "唉，真是累死了……為什麼會搞成這樣……"
10014075-110 = "你的肚子還真準時啊？"
10014075-111 = "畢竟大家都忙碌一個晚上了呢……"
10014075-112 = "嗯，需要補充糖分。"
10014075-113 = "[s7] 「那我們去吃點東西吧。」\n[s8] 「今天老師我請客哦。」"
10014075-120 = "……好耶──！！"

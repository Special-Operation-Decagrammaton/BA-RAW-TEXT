[translation]
51240-1 = "Episode 24;Ordinary Events"
51240-3 = "My only desire was to be good enough to stand by Ayame's side."
51240-4 = "I was afraid she would realize my incompetence, so I pretended. I pretended to be good enough."
51240-15 = "But one day, I looked back and realized everyone's eyes were on me."
51240-16 = "I was scared. "
51240-19 = "Because I'm not someone to look up to. They misunderstood my act for reality. "
51240-20 = "You're amazing. You're so impressive. You're good enough for Ayame."
51240-22 = "That's all I wanted... "
51240-23 = "So I struggled with all my might, but it wasn't—"
51240-25 = "[ns] \"It was good enough.\""
51240-26 = "...?!"
51240-33 = "...Wh-What?"
51240-34 = "[ns1] \"What's so bad about trying to grow into a better person?\"\n[ns2] \"Why can't that be who you really are?\""
51240-39 = "[ns3] \"It doesn't matter if it feels like a lie.\"\n[ns4] \"You fake it until you make it, right?\""
51240-42 = "[ns5] \"It's natural to try your best.\"\n[ns6] \"It's natural to want to look good in front of your peers.\""
51240-46 = "[ns] \"All of these things are ordinary events in a person's life.\""
51240-47 = "That's..."
51240-48 = "What kind of justification is that? Did you really think that would work?!"
51240-49 = "Lies are bad! Hurting people is bad! Look at what happened because of their lies!"
51240-50 = "[s] \"Just because it feels like a lie to you, it doesn't mean it's not true.\""
51240-56 = "Like when Yukari and Nagusa first met..."
51240-59 = "Are you well?"
51240-60 = "Your unflinching courage to stand up in the face of injustice."
51240-65 = "It was most impressive."
51240-66 = "...!"
51240-67 = "Leave it in the hands of the Hyakkaryouran from here. Now then..."
51240-69 = "Or when the Hyakkaryouran members were all together..."
51240-72 = "Renge possesses an indomitable heart... She's quite inspiring to a wavering spirit like mine."
51240-73 = "We owe much to Renge. You think so as well, don't you Yukari?"
51240-74 = "Yes!"
51240-75 = "Bold of you to tell Nagusa that you think Renge is more impressive, Yukari."
51240-76 = "What?!"
51240-77 = "Hey, don't tease her cause you want to embarrass me! Some things are too much to hear, you know?!"
51240-78 = "...It's weird to hear heartfelt praise from someone so refined."
51240-83 = "Heehee."
51240-85 = "Or when Nagusa tried to leave the Hyakkaryouran for good..."
51240-87 = "It's simple. Your work as the Hyakkaryouran's operations officer has garnered both you power and respect."
51240-88 = "Not just from the regular members, but from me as well."
51240-91 = "[ns] \"It might have felt like an act to Nagusa in the beginning.\""
51240-93 = "[ns7] \"But Nagusa worked hard and grew.\"\n[ns8] \"She became someone those three could look up to.\""
51240-96 = "[ns] \"Yes, Nagusa became exactly who she set out to be.\""
51240-97 = "...!!"
51240-98 = "[s] \"Why is it a bad thing to try and try to become better?\""
51240-99 = "They're terrible! They'll betray and fight each other! Their trust shatters like glass."
51240-100 = "No matter what they do, they'll hurt each other! Their very natures foster hate. How can you say that's okay?!"
51240-101 = "[s9] \"You're right. They're going to fight.\"\n[s10] \"They might even hate each other sometimes.\""
51240-104 = "[ns] \"I'm sure they'll act petulantly, blame, and even hurt one another.\""
51240-107 = "[ns] \"Like I said. Those are ordinary events. It's okay.\""
51240-109 = "[ns11] \"They'll just have to figure out how to say 'sorry'.\"\n[ns12] \"And they won't have to do it alone.\""
51240-114 = "Are you joking."
51240-115 = "The idealism is just dripping from your words."
51240-116 = "Your solution is...disgusting! Your story has no elegance whatsoever!"
51240-117 = "You will not get in the way of my ghost story!"
51240-118 = "I'll destroy you before that happens, Sensei!"
51240-123 = "I will be the bulwark against your evil deeds!"
51240-132 = "[ns] \"Yukari! You're okay?!\""
51240-137 = "No! You were devoured by the Katashiro! This can't be happening!"
51240-139 = "I found myself floating in an abyss... But a voice reached me..."
51240-140 = "It must have been Sensei's voice. "
51240-141 = "And then I heard Nagusa, as if she were right by my side."
51240-145 = "And so I, Yukari, have been resurrected! I am here!"
51240-150 = "What're the words coming out of your mouth right now?"
51240-151 = "Are you so stupid that you forgot already? You were abandoned by the world, trampled on, betrayed again and again."
51240-152 = "Your hatred was so strong that you birthed the Katashiro!"
51240-153 = "That kind of emotion and hostility doesn't just fly away into the wind!"
51240-154 = "No, it doesn't! I still bear the burden of my pain!"
51240-155 = "[s] \"Yukari...\""
51240-156 = "So much so that the pain weighs upon my heart, constricting my very breath."
51240-157 = "But Sensei's words reached me in that darkness."
51240-158 = "It took me longer than it ought to have, but I can understand Sensei's words now!"
51240-160 = "Do elaborate on this nonsense."
51240-165 = "All that we have done, all that we have suffered through... It is merely another facet of being human."
51240-171 = "Nagusa might've lied, but she was hardly the only guilty party."
51240-172 = "I lied about many things."
51240-173 = "Renge and Kikyou too."
51240-179 = "Humans lie for a great number of reasons: fear, to mislead, or even to protect our loved ones."
51240-180 = "And nothing good comes of it! You'll simply hurt and be hurt."
51240-184 = "But that's simply how life is. That's what it is to be human."
51240-185 = "[s] \"...Good job, Yukari.\""
51240-187 = "What...?"
51240-188 = "There's always space to say \"sorry\" after a fight."
51240-195 = "I choose to believe in Sensei's words."
51240-196 = "I care not for our conflicts! I, Yukari, am going to make up with everyone."
51240-197 = "I wish for us all to forgive each other, and for the Hyakkaryouran to return to its happy days!"
51240-199 = "The audacity of your immaturity knows no bounds."
51240-200 = "I! Do not! Care! You, the one named Yabuki Shuro..."
51240-201 = "I, Yukari, will defeat you and save the Hyakkaryouran."
51240-202 = "After all, that is my job as the Hyakkaryouran's Elite!"
51240-203 = "Hah. Talk your talk. Throw around your bravado."
51240-204 = "None of it matters. The Katashiro you created is still alive. "
51240-215 = "I'll put an end to Nagusa and Schale's Sensei for good! And then I'll stomp on this impertinent child who doesn't know her place."
51240-216 = "All of you...!"
51240-224 = "...What?"
51240-229 = "Haha! We made it!"
51240-230 = "Are you injured, Yukari?"
51240-235 = "...Ah."
51240-236 = "AHH! Renge! Kikyou!"
51240-238 = "I'm relieved you're okay."
51240-239 = "[s] \"How did you get here?!\""
51240-240 = "Let's just say we've made a lot of great friends here at Hyakkiyako."
51240-241 = "It appears we've left the frying pan to jump into the fire however."
51240-247 = "...Yabuki Shuro of Nature's Beauty."
51240-248 = "As the operations officer of the Hyakkaryouran, I demand your complete and total surrender."
51240-252 = "Hah."
51240-253 = "Haha."
51240-254 = "Hahaha!"
51240-258 = "You want me to surrender now? After all this? This pathetic ending is how you want me to give up?"
51240-259 = "Just try me! Make me surrender!"
51240-260 = "If you're going to ruin everything...rewrite the ending of my ghost story...!"
51240-261 = "I'll just do it all again! Over and over and over until we get it right!"
51240-272 = "Finish them!"
51240-273 = "Destroy the Hyakkaryouran!"
51240-275 = "Kikyou, Yukari, Sensei!"
51240-276 = "[s] \"Yes.\""
51240-277 = "There's no means of retreat."
51240-278 = "Then we have no choice but to face them head on!"

[translation]
51240-1 = "第24話;平凡的事"
51240-3 = "我想成為不愧對菖蒲的人。"
51240-4 = "我害怕自己真正的樣子被人發現，所以一直扮演著配得上菖蒲的人……"
51240-15 = "當我驀然回首，發現大家都在看著我。"
51240-16 = "這讓我感到很害怕。"
51240-19 = "我明明不是那種人……大家卻都誤會了。"
51240-20 = "說我很厲害、很出色，和菖蒲相比一點都不遜色。"
51240-22 = "但我……其實只是想成為不愧對菖蒲的人而已。"
51240-23 = "只是為了達到這個目標……拚命掙扎而已。"
51240-25 = "[ns]「那不就夠了嗎？」"
51240-26 = "…………！？"
51240-33 = "…………………你說什麼？"
51240-34 = "[ns1]「扮演虛假的自己……」\n[ns2]「結果弄假成真，被人接受又如何？」"
51240-39 = "[ns3]「就算一開始是假的，只要努力堅守下去……」\n[ns4]「遲早有一天會變成真的。」"
51240-42 = "[ns5]「想成為自己理想中的樣子──」\n[ns6]「簡直再正常不過了。」"
51240-46 = "[ns]「這只是每個人都會做的──平凡的事而已。」"
51240-47 = "這……"
51240-48 = "你以為那種歪理說得過去嗎？"
51240-49 = "謊言永遠是謊言……最後只會讓所有人因此受傷，釀成這種悲劇而已。"
51240-50 = "[s]「就算對本人來說只是謊言……在別人眼中也可能並非如此。」"
51240-56 = "（比如紫和名草初次見面的時候）"
51240-59 = "有沒有受傷？"
51240-60 = "路見不平拔刀相助，不畏邪惡挺身對抗的身影。"
51240-65 = "相當帥氣哦。"
51240-66 = "……！"
51240-67 = "之後就交給我們百花繚亂吧，後輩。#n告辭。"
51240-69 = "（比如百花繚亂的成員還在一起的時候）"
51240-72 = "蓮華你……是個非常優秀的孩子……遠比像我這樣的半吊子優秀的多。"
51240-73 = "我以蓮華為榮。#n紫也這麼覺得吧？"
51240-74 = "是！"
51240-75 = "紫，剛才那句話的意思是蓮華比名草前輩更勝一籌耶。"
51240-76 = "……哈！？"
51240-77 = "哎真是的，大家都別說了。#n這樣讓聽的人很不好意思耶！"
51240-78 = "被真正厲害的人這麼說，只會讓人覺得承擔不起而已。"
51240-83 = "……呵呵。"
51240-85 = "（比如決定離開百花繚亂的時候）"
51240-87 = "桔梗，你很優秀。#n身為百花繚亂的作戰參謀，有很多學生都跟隨著你。"
51240-88 = "……不只是其他一般成員，連我也是。"
51240-91 = "[ns]「起初可能單純是在『演戲』沒錯……」"
51240-93 = "[ns7]「不過名草也因此成為了比誰都瞭解那三個人……」\n[ns8]「並且願意理解他們的人。」"
51240-96 = "[ns]「沒錯，就像名草憧憬的……某個人一樣。」"
51240-97 = "……！！！"
51240-98 = "[s]「Cosplay又如何？為了待在那個位置拚命掙扎又如何？」"
51240-99 = "就算結果會讓彼此不和、爭吵也無所謂嗎！？"
51240-100 = "明知會讓人受傷、受挫……最後憎惡彼此，卻還是要說那種話……！"
51240-101 = "[s9]「確實……那可能會引發衝突……」\n[s10]「或者讓人討厭彼此。」"
51240-104 = "[ns]「想必也會有指責、中傷……這種讓人難過的情形。」"
51240-107 = "[ns]「但那些也不過是所有人都會經歷的事而已。」"
51240-109 = "[ns11]「如果發生爭吵，只要事後努力和解就行了。」\n[ns12]「為了讓大家都能那麼做，我也會全力幫忙。」"
51240-114 = "………………一派胡言。"
51240-115 = "那種……一無是處的理想論……"
51240-116 = "根本一點風情都沒有！真是最差勁的故事！"
51240-117 = "我要把侮辱「百物語」的邪門歪道破壞殆盡……！"
51240-118 = "夏萊的老師！就從你開始……！"
51240-123 = "別想得逞！"
51240-132 = "[ns]「紫……！」"
51240-137 = "竟然醒過來了？#n從無貌形代的吞噬之中……怎麼可能？"
51240-139 = "有聲音從黑暗中傳來。"
51240-140 = "那是老師…… "
51240-141 = "和名草前輩的聲音──我清楚地聽見了。"
51240-145 = "所以小女子紫！在此復活！"
51240-150 = "到底在胡說什麼？"
51240-151 = "你難道忘了嗎……？#n世界上的所有人都排斥你、拒絕你，甚至還踐踏你的內心。"
51240-152 = "所以才讓那個「無貌的形代」誕生了哦……？"
51240-153 = "但你現在卻表現出一副怎樣都無所謂的態度……！"
51240-154 = "當然！我也不否認那些事讓我很受傷！"
51240-155 = "[s]「紫……」"
51240-156 = "我心裡還是很痛苦……難過得心都快碎了也是事實！"
51240-157 = "但是我在模糊的意識中聽見了老師的聲音。"
51240-158 = "沒錯……雖然可能為時已晚，多虧老師的那番話讓我領悟了！"
51240-160 = "領悟？領悟什麼？"
51240-165 = "領悟到那不過是件「平凡」的事。"
51240-171 = "說謊的人並不只有名草前輩。"
51240-172 = "小女子也一樣說了謊。"
51240-173 = "蓮華前輩和桔梗前輩也一樣。"
51240-179 = "之所以會表裡不一……#n也許是因為害怕、為別人著想，抑或是為了欺騙自己。"
51240-180 = "所以才會因此受傷、受人指責、成為爭吵的契機……"
51240-184 = "但同時，那也是任何人都會做的──平凡的事。"
51240-185 = "[s]「……嗯。」"
51240-187 = "啥……？"
51240-188 = "發生爭吵的話只要和解就行了……！"
51240-195 = "小女子願意認同這句話！"
51240-196 = "因為小女子我很想和解！#n哪怕我們曾經互相傷害、彼此爭吵也一樣！"
51240-197 = "我希望能跟大家和解──回到那時的百花繚亂！"
51240-199 = "真虧你能說出如此幼稚的台詞……！"
51240-200 = "你叫箭吹棕櫚對吧！"
51240-201 = "小女子我！要為了保護百花繚亂的所有人向你宣戰！"
51240-202 = "這就是我身為百花繚亂菁～英的決心！"
51240-203 = "哈！好吧，隨便你愛怎麼說！"
51240-204 = "從你內心誕生的無貌形代還在這裡……！"
51240-215 = "只要有這個，不管是騙子名草醬、夏萊的老師，還是那個不知天高地厚的丫頭……！"
51240-216 = "全部都……！"
51240-224 = "……咦？"
51240-229 = "哈啊啊啊啊！！我們來了！"
51240-230 = "……紫！你沒事吧！？"
51240-235 = "…………啊。"
51240-236 = "啊啊啊！蓮華前輩！桔梗前輩！！"
51240-238 = "呼……看來是趕上了。"
51240-239 = "[s]「你們兩個都來了！？怎麼回事……！？」"
51240-240 = "多虧有其他人幫忙，我們才能先來到這裡！"
51240-241 = "從情況看來……現在正在激戰當中吧。"
51240-247 = "花鳥風月部的箭吹棕櫚──"
51240-248 = "我以百花繚亂作戰參謀的身分給你一個忠告──乖乖投降吧。"
51240-252 = "哈。"
51240-253 = "哈哈。"
51240-254 = "啊哈哈哈哈！"
51240-258 = "都已經發展到這裡了，你們卻想讓這一切淪落為如此膚淺的故事嗎！"
51240-259 = "……很好，那就來試試看吧！"
51240-260 = "如果想把屬於我的「百物語」變成這種支離破碎的故事……"
51240-261 = "我就重置這一切！再次從頭開始就行了！"
51240-272 = "我要了結你們！"
51240-273 = "把百花繚亂摧毀殆盡！"
51240-275 = "……桔梗、紫、老師！"
51240-276 = "[s]「嗯。」"
51240-277 = "都走到這一步了，現在可不能退縮。"
51240-278 = "全力奮戰吧！"

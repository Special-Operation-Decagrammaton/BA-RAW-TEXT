[translation]
10038040-1 = "第4話;過去與現在的分界線"
10038040-7 = "為什麼，會這樣……！"
10038040-8 = "頭好暈……呼吸困難……"
10038040-12 = "……"
10038040-13 = "稍微休息一下吧。#n這是對生命無害的異香。"
10038040-18 = "竟然會，以這種方式回來……！"
10038040-19 = "沙耶會長不在的時候，居然用這種手段……"
10038040-28 = "山川依舊，人事已非。"
10038040-29 = "空虛街道，不見人影。"
10038040-30 = "咯咯……"
10038040-35 = "準備已經就緒。"
10038040-36 = "山海經，還有鍊丹術研究會……"
10038040-37 = "我終於回來了。"
10038040-38 = "如此簡陋的歡迎，還請您原諒。"
10038040-39 = "無所謂。那麼走吧。"
10038040-46 = "啊啊，真令人懷念啊。#n我的鍊丹術研究會。"
10038040-47 = "即便一切都變了，唯獨這裡仍舊一如既往。"
10038040-48 = "接下來您有什麼打算？#n要直接去「那裡」嗎？"
10038040-49 = "就這麼做吧。#n我的目標打從一開始就是那裡。"
10038040-50 = "明白了。我來帶路。"
10038040-56 = "這裡似乎被保護得很好呢。"
10038040-57 = "是的……雖然要向藥子沙耶隱瞞這裡並不容易，不過並無大礙。"
10038040-58 = "咯咯……畢竟那孩子本來就很敏銳，這也難怪。"
10038040-59 = "不，還是我應該稱讚一下你向沙耶隱瞞這個設施的手段呢？"
10038040-60 = "您過獎了。"
10038040-61 = "……終於回來了。"
10038040-62 = "這裡可說是真正的鍊丹術研究會。#n蘊藏我所有心血結晶的地方……"
10038040-64 = "請您隨意使用。#n如今鍊丹術研究會已經是誡大人的了。"
10038040-65 = "所有的藥材和設施，都與誡大人離開山海經時一模一樣。"
10038040-67 = "辛苦你了。#n那麼就開始吧。"
10038040-71 = "停滯不前的──「仙丹」的研究。"
10038040-79 = "哈啊，哈啊……！"
10038040-80 = "居然這麼快就氣喘吁吁的……你這樣還算的上是玄龍門的執行部長嗎？"
10038040-81 = "雖然你一直以來都是這副德行，我早就習慣了。"
10038040-82 = "少，少囉嗦！#n大半夜的突然被叫出來，我有什麼辦法！"
10038040-83 = "這點我也是一樣吧……"
10038040-84 = "可是話又說回來，門主大人究竟有何打算……#n為什麼要和玄武商會……偏偏還是這傢伙一起執行任務……"
10038040-85 = "我全都聽到了耶……難道你打算成為不聽從門主大人命令的執行部長嗎？"
10038040-86 = "我唯獨不想從你嘴裡聽到這種話！"
10038040-90 = "我們接到的消息僅止於鍊丹術研究會遇襲，但具體發生了什麼還不知道。"
10038040-91 = "看來已經到了呢。#n總覺得氣氛和平時有點不太一樣……"
10038040-100 = "……應該說很不一樣才對。"
10038040-101 = "那是……不應該在山海經出現的黑市傭兵？#n為什麼這些傢伙會在鍊丹術研究會……！？"
10038040-108 = "好痛！這些傢伙……！"
10038040-109 = "某種意義上來說，不拖泥帶水的也不錯呢。#n真是群讓人頭腦清醒的朋友。"
10038040-110 = "……老實說你腦子裡裝的不是大腦，而是肌肉吧。"
10038040-111 = "……反正至少不是黑色電影。"
10038040-115 = "這些傢伙……"
10038040-121 = "……別人話說到一半吵什麼吵！"
10038040-132 = "從正門傳來了報告。襲擊已經開始了。"
10038040-137 = "叫雇來的黑市傭兵去防守吧。#n吩咐他們盡可能地拖延時間。"
10038040-138 = "是，已經安排好了。"
10038040-139 = "（不過把外部的兵力引入山海經真的好嗎……）"
10038040-140 = "……你看起來很不安呢。#n咯咯……"
10038040-144 = "不，不是的。我只是……！"
10038040-145 = "有時混亂也會帶來進步──就像藥材發生的化學反應一樣。"
10038040-146 = "而這正是山海經始終苦苦缺乏的東西。"
10038040-147 = "停滯不前就無法進步，因此有時需要來自外部的巨大衝擊。"
10038040-152 = "……"
10038040-153 = "不會花太多時間的。#n第一次仙丹的製作……大約幾個小時就會有結果了。"
10038040-154 = "既然這麼快就能完成，為何您一直以來都……？"
10038040-155 = "哎呀，原來連你也不知道嗎？#n沒辦法，就由我來告訴你吧。"
10038040-159 = "因為這個仙丹，放眼整個奇普托斯也只有這裡才做得出來。"
10038040-160 = "這……是因為地理位置或風水的關係嗎？"
10038040-161 = "不。是因為只有這裡保存了鍊丹術研究會的歷史藥材和祕方。"
10038040-162 = "此外，也只有這裡能獲得最天然的萬年參。"
10038040-166 = "雖然沙耶似乎沒能繼承這些就是了。咯咯……"
10038040-174 = "大致解決了嗎……？"
10038040-179 = "……看來剛才對付的只是先鋒部隊而已。"
10038040-187 = "……真讓人不爽。"
10038040-188 = "這麼多外部勢力，到底是怎麼悄無聲息進入山海經的！"
10038040-189 = "這個嘛……會不會是因為玄龍門控制了玄武商會，乃至於整個山海經的出入造成的？"
10038040-193 = "呃……唔……你也太會記仇了吧！#n我們不過才管制了商會街道幾天而已！"
10038040-194 = "也站在商會的立場想想好不好！#n知道休息一天得虧多少錢嗎！"
10038040-200 = "這也是沒辦法的事。"
10038040-201 = "至少現在可以確定，鍊丹術研究會內部肯定發生了什麼。"
10038040-205 = "強行突破吧。能跟得上嗎？"
10038040-209 = "我倒希望你別落後了呢。"
10038040-214 = "哼，還真是自信滿滿的。上吧！"

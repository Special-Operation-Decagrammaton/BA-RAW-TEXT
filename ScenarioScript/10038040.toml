[translation]
10038040-1 = "ตอนที่ 4;เส้นแบ่งอดีตกับปัจจุบัน"
10038040-7 = "อะไรกันเนี่ย...!"
10038040-8 = "เวียนหัวจังเลย... หายใจ... หายใจไม่ค่อยไม่ออกด้วย...!"
10038040-12 = "..."
10038040-13 = "พักกันไปก่อนเถอะ นี่เป็นกลิ่นธูปที่ไม่เป็นอันตรายต่อชีวิต"
10038040-18 = "จะเล่นแบบนี้เหรอ...!"
10038040-19 = "เธอกล้าใช้อุบายชั่วร้ายในระหว่างที่หัวหน้าซายะไม่อยู่..."
10038040-28 = "ธรรมชาติยังคงอยู่ แต่วีรสตรีกลับสูญหาย"
10038040-29 = "ถนนหนทางว่างเปล่า ไร้เงาของผู้คนให้เห็น"
10038040-30 = "หึหึหึหึ..."
10038040-35 = "ฉันเตรียมไว้พร้อมแล้วค่ะ"
10038040-36 = "ซานไห่จิง และชมรมวิจัยศาสตร์การปรุงยา..."
10038040-37 = "ในที่สุดฉันก็ได้กลับมาที่นี่แล้วสินะ"
10038040-38 = "ได้โปรดให้อภัยกับการต้อนรับที่ไม่สมศักดิ์ศรีด้วยนะคะ"
10038040-39 = "เรื่องนั้นไม่สำคัญหรอก งั้นเราไปกันเลยมั้ย?"
10038040-46 = "ฮื้ม... คิดถึงจังเลยนะ ชมรมวิจัยศาสตร์การปรุงยาของฉัน "
10038040-47 = "แม้ทุกอย่างจะเปลี่ยนไป แต่ที่แห่งนี้ก็ไม่เปลี่ยนแปลงเลย"
10038040-48 = "จากนี้จะทำอย่างไรคะ? จะมุ่งหน้าไป 'ที่นั่น' เลยมั้ยคะ?"
10038040-49 = "เอาสิ นั่นคือเป้าหมายของฉันตั้งแต่แรกอยู่แล้ว"
10038040-50 = "เข้าใจแล้วค่ะ ฉันจะนำทางให้ค่ะ"
10038040-56 = "ดูเหมือนว่าสถานที่แห่งนี้จะได้รับการดูแลอย่างดีเลยนะ"
10038040-57 = "ค่ะ ไม่มีปัญหาใดๆ ค่ะ แต่การทำให้ยาคูชิ ซายะจับสังเกตไม่ได้ก็เป็นเรื่องยากเลยค่ะ"
10038040-58 = "หึหึหึ... ปกติเด็กคนนั้นหูไวตาไวอยู่แล้ว ถ้าจะแอบทำอะไรก็คงไม่ง่ายหรอก"
10038040-59 = "เธอถึงกับซ่อนสถานที่แบบนี้ให้พ้นสายตาของซายะที่ไหวพริบดีได้ ต้องบอกว่าความสามารถของเธอ#nยอดเยี่ยมไปเลยละนะ"
10038040-60 = "ชมเกินไปแล้วค่ะ"
10038040-61 = "ในที่สุด... ฉันก็ได้กลับมาที่นี่แล้วสินะ"
10038040-62 = "สถานที่ที่เรียกได้ว่าเป็นชมรมวิจัยศาสตร์การปรุงยาที่แท้จริง ที่ที่เก็บผลึกของความพยายามของฉันไว้"
10038040-64 = "เชิญใช้งานได้อย่างเต็มที่เลยค่ะ ตอนนี้ชมรมวิจัยศาสตร์การปรุงยาเป็นของท่านไคแล้วค่ะ"
10038040-65 = "สมุนไพรและอุปกรณ์ต่างๆ ถูกเก็บรักษาไว้เป็นอย่างดีเหมือนกับตอนที่ท่านไคเพิ่งจากซานไห่จิงไปค่ะ"
10038040-67 = "ทำได้ดีมาก ถ้างั้นเราจะสานต่อสิ่งที่เคยทำไว้"
10038040-71 = "เพื่อความสมบูรณ์แบบของน้ำอมฤตที่หยุดชะงักไป "
10038040-79 = "แฮ่ก... แฮ่ก...!"
10038040-80 = "แค่นี้ก็หอบแล้วเหรอคะ? แบบนี้จะเรียกว่าเป็นหัวหน้าคณะกรรมการมังกรดำได้เหรอคะ?"
10038040-81 = "แต่ก็นะ ฉันเคยเห็นแบบนี้ตั้งแต่เมื่อก่อนมาจนคุ้นตาแล้วค่ะ"
10038040-82 = "งะ... เงียบไปเลยนะ! ก็จู่ๆ เธอก็เรียกฉันมากลางดึกนี่นา! ช่วยไม่ได้หรอก!"
10038040-83 = "เดี๋ยวก่อนนะ แต่สำหรับฉันก็ถือว่าดึกเหมือนกัน..."
10038040-84 = "อืม ตอนนี้ท่านประมุขคิดอะไรอยู่นะ... ทำไมถึงสั่งให้ฉันมาทำงานกับย่านการค้าเทพเต่าดำ... แล้วยังเป็นยัยคนนี้อีก..."
10038040-85 = "ฉันได้ยินทั้งหมดนั่นนะคะ... หรือว่าคุณคิดจะเป็นหัวหน้าคณะกรรมการมังกรดำที่ไม่ปฏิบัติตามคำสั่ง#nของท่านประมุขอย่างงั้นเหรอคะ?"
10038040-86 = "อย่ามาพูดแบบนั้นนะ ยิ่งเป็นจากเธอฉันยิ่งไม่อยากฟังเข้าไปใหญ่!"
10038040-90 = "ทั้งหมดที่เรารู้มาก็คือชมรมวิจัยศาสตร์การปรุงยาถูกบุกรุก ส่วนรายละเอียดว่าเกิดอะไรขึ้นในนั้น เรายังไม่อาจรู้ได้"
10038040-91 = "มาถึงกันแล้วนะคะ บรรยากาศที่นี่ดู..."
10038040-100 = "แตกต่างจากปกติมากเลยค่ะ "
10038040-101 = "คนพวกนั้นคือ... ทหารรับจ้างจากตลาดมืดที่ไม่มีทางพบเห็นได้ในซานไห่จิง? ทำไมคนพวกนั้นถึงมา#nอยู่ในชมรมวิจัยศาสตร์การปรุงยาล่ะ...?!"
10038040-108 = "เจ็บนะ คนพวกนี้นี่! "
10038040-109 = "ในแง่หนึ่งก็ถือว่าดีที่ดำเนินเรื่องไวนะคะ เป็นพวกคนที่ทำให้สมองโล่งจริงๆ เลย"
10038040-110 = "บอกฉันมาตามตรงนะ ที่อยู่ในหัวเธอไม่ใช่สมอง แต่เป็นกล้ามเนื้อใช่มั้ย?"
10038040-111 = "อย่างน้อยในนั้นก็ไม่มีภาพยนตร์ฟิล์มนัวร์คลาสสิกหรอกค่ะ"
10038040-115 = "พวกนี้นี่..."
10038040-121 = "อย่าขัดจังหวะสิ คนเขาคุยกันอยู่ไม่เห็นหรือไง!"
10038040-132 = "รายงานจากฝั่งประตูหลักค่ะ การจู่โจมเริ่มขึ้นแล้วค่ะ"
10038040-137 = "ฉันวางกองกำลังที่จ้างมาจากตลาดมืดให้เป็นยามคุ้มกันแล้ว ยื้อเวลาไว้ให้ได้มากที่สุดล่ะ"
10038040-138 = "ค่ะ ฉันกำลังทำอย่างนั้นอยู่ค่ะ"
10038040-139 = "(แต่ว่า... การให้กองกำลังจากภายนอกเข้ามาในซานไห่จิง... เป็นเรื่องที่เหมาะสมเหรอ...)"
10038040-140 = "เธอกังวลสินะ... หึหึหึ..."
10038040-144 = "มะ... ไม่ค่ะ ฉันแค่...!"
10038040-145 = "บางครั้งความวุ่นวายก็นำมาซึ่งความก้าวหน้า เช่นเดียวกับปฏิกิริยาเคมีของยานั่นละ"
10038040-146 = "ที่ผ่านมาซานไห่จิงยังขาดสิ่งนี้ แล้วก็ขาดไปมากด้วย"
10038040-147 = "ถ้ายังย่ำอยู่กับที่ เราก็ไม่อาจก้าวหน้าได้ ดังนั้นบางครั้งเราก็จำเป็นต้องมีเสียงสะท้อนจากภายนอกบ้าง"
10038040-152 = "..."
10038040-153 = "ฉันใช้เวลาไม่นานหรอก ผลลัพธ์จากการผลิตน้ำอมฤตขั้นที่ 1 น่ะ... คงได้เห็นกันในอีกไม่กี่ชั่วโมงนี้ละ"
10038040-154 = "ถ้าทำให้สำเร็จได้รวดเร็วแบบนี้ ทำไมที่ผ่านมาท่านถึงไม่...?"
10038040-155 = "ตายจริง เธอคิดว่าฉันไม่รู้หรอกเหรอ? ช่วยไม่ได้สินะ ถ้าอย่างนั้นฉันจะบอกให้"
10038040-159 = "น้ำอมฤตนี้ผลิตขึ้นได้จากสถานที่แห่งนี้เท่านั้น จะผลิตจากที่อื่นในคิโวทอสไม่ได้"
10038040-160 = "นั่นเป็นเพราะ... หลักฮวงจุ้ยหรือเปล่าคะ?"
10038040-161 = "เปล่า นั่นเป็นเพราะเคล็ดลับและสมุนไพรที่มีประวัติศาสตร์ยาวนานของชมรมวิจัยศาสตร์การปรุงยาถูก#nเก็บรักษาไว้ ณ ที่แห่งนี้เท่านั้นน่ะ"
10038040-162 = "นอกจากนี้ ที่แห่งนี้ยังเป็นที่เดียวที่จะหาโสมหมื่นปีในสภาพที่เป็นธรรมชาติที่สุดได้"
10038040-166 = "และดูเหมือนว่าซายะจะไม่ได้รับสืบทอดสิ่งนี้มา หึหึหึ..."
10038040-174 = "จัดการได้หมดแล้วหรือเปล่านะ...?"
10038040-179 = "เหมือนว่ากลุ่มที่เราสู้ด้วยจะเป็นกองทัพแนวหน้านะคะ"
10038040-187 = "น่าหงุดหงิดชะมัด..."
10038040-188 = "กล้าดียังไงถึงได้ลักลอบเอากองกำลังจากภายนอกมากมายขนาดนี้เข้ามาในซานไห่จิงน่ะ!"
10038040-189 = "ส่วนหนึ่งเป็นเพราะ... มังกรดำมาเข้มงวดกับการจำกัดการเข้าออกในย่านการค้าเทพเต่าดำ จึงละเลยการรักษาความปลอดภัยอื่นๆ หรือเปล่า?"
10038040-193 = "อ่า... อืม... พูดแรงไปหน่อยแล้วนะ! เราเพิ่งจำกัดการเข้าออกที่ย่านการค้าได้ไม่กี่วันเอง!"
10038040-194 = "ลองคิดในมุมของย่านการค้าดูบ้างสิคะ! แค่หยุดงานวันเดียวก็ขาดทุนตั้งเท่าไรแล้ว!"
10038040-200 = "เรื่องนั้นมันก็ช่วยไม่ได้หรอกนะ"
10038040-201 = "อย่างน้อยตอนนี้เราก็รู้แล้วว่ามีบางอย่างเกิดขึ้นข้างในชมรมวิจัยศาสตร์การปรุงยา"
10038040-205 = "เราจะบุกทะลวงเข้าไป คิดว่าตามมาไหวมั้ย?"
10038040-209 = "ฉันน่ะไหวแน่นอนค่ะ คุณต่างหากล่ะ อย่าหอบแฮ่กๆ เหมือนเดิมแล้วกันค่ะ"
10038040-214 = "เฮอะ ดูมั่นใจจังเลยนะ งั้นก็ดี!"

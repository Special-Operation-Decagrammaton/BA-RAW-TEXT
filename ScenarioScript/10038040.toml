10038040-71 = "To finish the potion we started. "
10038040-79 = "*pant* *pant*"
10038040-80 = "Are you out of breath already? And you call yourself a Genryumon officer?"
10038040-81 = "Well, I guess I HAVE seen you run out of gas before."

[translation]
80000084-1 = "มันเหมือนกับรอมคอม"
80000084-2 = "(วันวาเลนไทน์ มิจิรุมาที่ชาเล่ต์ตั้งแต่เช้าตรู่)"
80000084-4 = "ท่านอาจารย์ วันนี้เป็นวันวาเลนไทน์สินะ?"
80000084-5 = "[s] \"หืม ก็ใช่นะ\""
80000084-6 = "ช่อง <เคล็ดลับวิถีนินจาสาว มิจิรุจจี้> จะพลาดวันพิเศษแบบนี้ไม่ได้เด็ดขาด!"
80000084-7 = "สรุปก็คือในวันแบบนี้..."
80000084-8 = "พวกเราควรทำคอนเทนต์เกี่ยวกับวันวาเลนไทน์อัปโหลดลงช่องด้วยสิ...?!"
80000084-9 = "เราควรอัปเดตตัวเองให้ทันเทรนด์สมัยนี้สิ...?! "
80000084-10 = "ข้าน้อยคิดแบบนั้นนะ แล้วท่านอาจารย์คิดว่ายังไงกันเล่า?!"
80000084-11 = "[s] \"ที่พูดมาก็ถูกนะ แต่ช่องของมิจิรุเป็นช่องเกี่ยวกับนินจา...\""
80000084-12 = "สมัยนี้นินจาก็ชอบช็อกโกแลตเหมือนกันนะ?!"
80000084-13 = "[s] \"ชอบไม่ชอบมันใช่ประเด็นที่ไหนเล่า?!\""
80000084-14 = "ฮึ่ยยย- เรื่องเล็กน้อยแบบนั้นเทียบไม่ได้กับการอยู่รอดในอุตสาหกรรมนักสร้างคอนเทนต์หรอก#nนะ!"
80000084-15 = "เพราะงั้นช่วยข้าน้อยหน่อยสิ~ นะ~น้า~น้าาาา~"
80000084-16 = "ข้าน้อยอยากถ่ายคอนเทนต์วันวาเลนไทน์...! แล้วทำให้โลกได้รู้จักช่อง <เคล็ดลับวิถีนินจาสาว มิจิรุจจี้> น่ะ!"
80000084-17 = "นะนะ... น้าาา?"
80000084-18 = "[s] \"ให้ครูช่วย ก็ได้อยู่หรอก\""
80000084-19 = "งะ...งั้นเหรอ?!"
80000084-20 = "คิดแล้วเชียวว่าท่านอาจารย์น่ะสุดยอด!"
80000084-21 = "ถ้ามีนักเรียนที่เผชิญกับสถานการณ์ยากลำบาก ก็ไม่ลังเลที่จะช่วยเหลือ!"
80000084-22 = "สมกับเป็นผู้นำกลุ่มนินจายุคใหม่จริงๆ!"
80000084-23 = "[s1] \"จู่ๆ ยกให้เป็นผู้นำนินจามันลำบากนะ...\"\n[s2] \"ว่าแต่ว่าจะถ่ายคอนเทนต์อะไรล่ะ? มีแผนรึยัง?\""
80000084-24 = "อ๊ะ เรื่องนั้นน่ะไม่เป็นไรหรอก!"
80000084-25 = "อ๊ะ เรื่องนั้นน่ะ ไม่ต้องห่วงหรอก!"
80000084-26 = "ข้าน้อยเตรียมฉากกับบทพูดที่สมบูรณ์แบบไว้แล้วละ!"
80000084-27 = "[s] \"เอ๋? ทั้งที่บอกว่าลำบาก แต่ก็เตรียมไว้ได้ล่วงหน้าเนี่ยนะ...\""
80000084-28 = "...เอ๋?"
80000084-29 = "อ๊ะ... อ๊ะ! อ๊าย?!"
80000084-30 = "เอ่อ...คะ...คือว่า..."
80000084-31 = "ถึงจะอยู่ในสถานการณ์หน้าสิ่วหน้าขวาน แต่หัวหน้ามิจิรุก็เตรียมพร้อมเสมอยังไงเล่า...!"
80000084-32 = "อะ...เอาเป็นว่าท่านอาจารย์ทำตามข้าน้อยที่เป็นผู้กำกับบอกก็พอ...!"
80000084-33 = "[s] \"ก็ได้ๆ เข้าใจแล้ว\""
80000084-34 = "(ดะ...ดีละ... เท่านี้ก็โน้มน้าวท่านอาจารย์ได้สำเร็จแล้ว...)"
80000084-35 = "(ถ้าทำตามแผนการต่อไปละก็สำเร็จแน่...!)"
80000084-36 = "เอาละ ถ้างั้นก็มาเริ่มกันเลยดีกว่า!"
80000084-38 = "(หลังจากนั้นการถ่ายคอนเทนต์ฉลองวันวาเลนไทน์ตามที่มิจิรุบอก...ก็เริ่มขึ้น)"
80000084-39 = "ฉากแรกที่จะถ่ายก็คือฉากที่คนสองคนวิ่งออกมาจากในตรอกแล้วชน...ปัง! เข้าด้วยกัน"
80000084-40 = "[s] \"ขอโทษนะมิจิรุ เริ่มมาครูก็ไม่ค่อยเข้าใจแล้ว\""
80000084-41 = "ฮุฮุฮุ... สิ่งที่ข้าน้อยคิดจะทำก็คือ...!"
80000084-42 = "ตั้งแต่นี้ไปพวกเราจะถ่ายคอนเทนต์ฉลองวาเลนไทน์!"
80000084-43 = "และชื่อของคอนเทนต์นี้ก็คือ <การจำลองสถานการณ์รอมคอมที่เหมาะสมกับวันวาเลนไทน์!>"
80000084-44 = "[s] \"มันไม่เห็นจะเกี่ยวกับ...นินจาเลย?\""
80000084-45 = "อ๊ะ คะ...คือเรื่องนั้น...!"
80000084-46 = "อ๊ะ จริงสิ! มันไม่ใช่สถานการณ์รอมคอมแบบธรรมดาหรอกนะ..."
80000084-47 = "แต่เป็น <สถานการณ์รอมคอมแบบนินจา> ต่างหาก! ท่านอาจารย์ไม่ต้องห่วงหรอก!"
80000084-48 = "[s] \"ก็ได้ มิจิรุว่าไงครูก็ว่าตามกัน...\""
80000084-49 = "เอาละ! ถ้างั้นข้าน้อยจะไปเตรียมตัววิ่งมาจากด้านโน้น"
80000084-50 = "และพอข้าน้อยส่งสัญญาณ ท่านอาจารย์ก็วิ่งมาตรงนี้เลยนะ?"
80000084-55 = "เอาละ! ถ้างั้นก็เริ่มได้เลย!"
80000084-59 = "(พอได้รับสัญญาณจากมิจิรุ คุณครูก็วิ่งมาที่ตรงหัวมุมถนน)"
80000084-66 = "อ๊ายยย!!"
80000084-71 = "(และในตอนที่ชนกันตรงหัวมุม! ก็แอบหยิบ <ของ> ใส่กระเป๋าโดยไม่ให้ท่านอาจารย์รู้ตัว...!)"
80000084-72 = "...หืม? ดะ...เดี๋ยวก่อน?! ทำไมถึงมีเปลือกกล้วยอยู่ที่พื้นได้เล่า?!"
80000084-73 = "อะ...อ๊ายยยย?!"
80000084-77 = "[ns] \"มะ...มิจิรุเป็นอะไรรึเปล่า?!\""
80000084-79 = "แงงง~! ใครกัน?! ใครหน้าไหนมาทิ้งเปลือกกล้วยไว้บนพื้นแบบนี้!"
80000084-80 = "มันอันตรายนะ! แถมยังถ่ายฉากวิ่งชนกันตรงหัวมุมไม่ได้เลยด้วย!"
80000084-81 = "[s] \"ถึงไม่ใช่เพราะเรื่องนั้น มันก็อันตรายอยู่ดีนั่นแหละ\""
80000084-82 = "ใช่เวลามาพูดแบบนั้นที่ไหนกันเล่าท่านอาจารย์?!"
80000084-83 = "อืม... ทะ...ที่จริง...สถานการณ์เมื่อกี้มันก็ดูโบราณและอันตรายเกินไป..."
80000084-84 = "ดีละ! ถ้างั้นต่อไป...! "
80000084-85 = "ข้ามไปฉากต่อไปเลย!"
80000084-87 = "(หลังจากนั้นคุณครูก็ถ่ายทำฉาก <สถานการณ์รอมคอม>... ไม่สิ <สถานการณ์รอมคอมแบบนินจา> กับมิจิรุอีกหลายฉาก)"
80000084-89 = "เอาละ ต่อไปเป็นฉากที่ท่านอาจารย์ไม่สบาย!"
80000084-90 = "ฮึ่ม..."
80000084-91 = "ท่านอาจารย์ [USERNAME]! ข้าน้อยได้ข่าวเรื่องที่ท่านอาจารย์ไม่สบายแล้วละ~!"
80000084-92 = "นี่เป็น <โจ๊กสูตรพิเศษ> มีสรรพคุณแก้ไข้หวัดที่ข้าน้อยปรุงมาเป็นพิเศษเพื่อท่านอาจารย์...!"
80000084-93 = "[s] \"โจ๊กที่มิจิรุทำนี่... เหมือนจะไหม้จนดำปิ๊ดปี๋เลยนะ...\""
80000084-95 = "[ns] \"แถมมีกลิ่นหอมๆ เคล้ากับกลิ่นไหม้ด้วย... ใช่โจ๊กแน่เหรอ?\""
80000084-96 = "โอ้! ข้าน้อยมัวแต่สนใจเรื่องคอนเซ็ปต์การดูแลเพื่อนในวัยเด็ก... เลยลืมนึกถึงเรื่องความเข้ากัน#nของส่วนผสมไปเลย!"
80000084-97 = "ตะ...ต่อไป!"
80000084-99 = "ท่านอาจารย์ [USERNAME]! ถ้าเราชนะในการแข่งขันครั้งนี้ละก็...!"
80000084-100 = "ข้าน้อย... ข้าน้อยมี <ของ> บางอย่างที่อยากให้ท่านอาจารย์ด้วย... ซึ่งข้าน้อยฝังมันไว้ใน#nไทม์แคปซูลใต้ต้นไม้ตรงนั้น...!"
80000084-101 = "[s] \"ขอโทษนะมิจิรุ! ครูชักตามไม่ทันแล้ว!\""
80000084-102 = "แอร็ก~! อะ...อันนี้ก็ใช้ไม่ได้งั้นเหรอ?!"
80000084-103 = "ถะ...ถ้างั้นต่อไป...!"
80000084-105 = "ต่อปายยยย~!"
80000084-106 = "(คุณครูเล่นตามฉากสถานการณ์ต่างๆ ของมิจิรุซ้ำไปมา)"
80000084-107 = "(แต่ว่าก็ล้มเหลวไปทุกครั้ง... หรือไม่ก็ถูกขัดขวางจากอะไรบางอย่าง...)"
80000084-108 = "(จนเวลาล่วงเลยมาถึงช่วงเย็น... ก็ยังไม่ได้คอนเทนต์ที่น่าพึงพอใจ)"
80000084-110 = "ฮืออออ..."
80000084-111 = "[s] \"เป็นอะไรรึเปล่ามิจิรุ?\""
80000084-112 = "มะ...ไม่เป็น... "
80000084-113 = "ไม่หรอก... คิดแล้วเชียวว่าข้าน้อยคงฝืนตัวเองเกินไป... เลยทำไม่สำเร็จสักอย่าง~~~"
80000084-114 = "[s] \"ถ้างั้นก็มานั่งพักก่อนเถอะ เดี๋ยวครูซื้อเครื่องดื่มมาให้นะ\""
80000084-115 = "อื้อ... ขอรบกวนด้วยนะ...ท่านอาจารย์..."
80000084-119 = "ฮือ..."
80000084-120 = "แงงงง~! สุดท้ายก็คว้าน้ำเหลวทั้งหมดเลย~!"
80000084-121 = "แผนการลับที่ข้าน้อยเตรียมมา... เพื่อฉลองวันวาเลนไทน์..."
80000084-122 = "...แผนการมอบช็อกโกแลตแบบเนียนๆ โดยไม่ให้ท่านอาจารย์รู้...!"
80000084-123 = "[s3] \"ว่าแล้วเชียว... เรียกครูมาเพราะเรื่องนี้นี่เอง\"\n[s4] \"ครูก็เดาไว้แล้วแหละว่าจะเป็นแบบนี้\""
80000084-124 = "...เอ๋?"
80000084-125 = "...เอ๋?"
80000084-126 = "ทะ...ทะ...ทะ...ท่านอาจารย์~~?! ทำไมกัน?!"
80000084-127 = "ละ...แล้วเครื่องดื่มเล่า?!"
80000084-128 = "[s] \"ก็นะ ครูว่าจะมาถามก่อนว่ามิจิรุจะดื่มอะไร\""
80000084-129 = "ถ้างั้นกะกะกะ...ก็ได้ยินหมดเลยเหรอ....?!"
80000084-130 = "[s] \"ใช่แล้ว ได้ยินหมดเลย\""
80000084-131 = "ฮือ... ฮืออ...!"
80000084-132 = "ไม่รู้ด้วยแล้ว! เป็นยังไงก็เป็นกัน!"
80000084-133 = "ใช่แล้ว! ที่ข้าน้อยชวนท่านอาจารย์มาถ่ายคอนเทนต์วันนี้น่ะ..."
80000084-134 = "เพราะข้าน้อยอยากให้ช็อกโกแลตท่านอาจารย์!"
80000084-135 = "ท่านอาจารย์ที่คอยช่วยเหลือชมรมวิจัยศาสตร์นินจาของเราหลายๆ อย่างมาโดยตลอด..."
80000084-136 = "ขะ...ข้าน้อยก็เลยอยากแสดงฟามชอบคุน...!"
80000084-137 = "[s] \"มะ...มิจิรุ เป็นอะไรรึเปล่า...?\""
80000084-138 = "ฮือ... ดะ...ดันลิ้นพันกัน จนพูดผิดพูดถูกในเวลาสำคัญซะได้!"
80000084-139 = "[s] \"แต่ว่ามิจิรุ ถ้าแค่ช็อกโกแลตน่ะมาให้แบบธรรมดาๆ...\""
80000084-140 = "ว่าไงนะ?! พูดเรื่องน่ากลัวแบบนั้นได้ยังไงน่ะ ท่านอาจารย์?!"
80000084-141 = "ให้มอบของขวัญวาเลนไทน์แบบธรรมดาๆ งั้นเรอะ...!"
80000084-142 = "จะ...จะทำให้เรื่องรอมคอมที่หวานปนขมแบบนี้กลายเป็นเรื่องธรรมดาๆ ได้ยังไงเล่า?!"
80000084-143 = "คนที่ทำเรื่องแบบนั้นได้มีแต่คนที่ไม่มีความกลัว ไม่ก็ไร้ความเขินอายเท่านั้นที่ทำได้ หรือก็คือ#nคนพวกนั้นน่ะไม่เหมือนพวกเราหรอก!"
80000084-144 = "[s] \"อคติเกินไปรึเปล่า...\""
80000084-145 = "ฮืออออ..."
80000084-146 = "แต่ตอนนี้ท่านอาจารย์ก็รู้หมดแล้ว... ตอนนี้อะไรเป็นอะไร... ข้าน้อยก็ไม่รู้แล้ว..."
80000084-147 = "ดันลากท่านอาจารย์... มาทำเรื่องไม่เป็นเรื่องแบบนี้... ท่านอาจารย์คงจะโกรธข้าน้อยแน่ๆ..."
80000084-148 = "[s] \"เปล่า ครูไม่ได้โกรธเลย แถมสนุกที่ได้เห็นมิจิรุในหลายๆ มุมด้วย\""
80000084-149 = "งะ...งั้นเหรอ?! ถ้างั้นก็ค่อยยัง..."
80000084-150 = "...มะ...ไม่สิ! เกือบตกหลุมพรางคำพูดอบอุ่นนั่นซะแล้ว"
80000084-151 = "ว้ากกก! พูดแบบนั้นหมายความว่าสนุกตอนที่เห็นข้าน้อยลุกลี้ลุกลนสินะ?!"
80000084-152 = "ฮืออ... ไม่รู้ด้วยแล้ว! ไหนๆ ก็เป็นแบบนี้แล้ว!"
80000084-153 = "เอ้านี่! ท่านอาจารย์!"
80000084-158 = "ช็อกโกแลตสั่งทำพิเศษ...ที่อัดแน่นด้วยความรู้สึกขอบคุณจากข้าน้อยเชียวนะ! รับไปสิ!"
80000084-159 = "[s] \"...อื้อ ขอบคุณนะ\""
80000084-160 = "ฮือออ~! วันนี้เป็นวันที่ดูไม่เท่เลย... ไม่สมกับเป็นข้าน้อยเลยสักนิด..."
80000084-161 = "แถมวันนี้ยังจบลงแบบ...น่าเบื่อและไร้ความโรแมนติก..."
80000084-162 = "...ไม่สิ จบแบบนี้อาจเหมาะกับข้าน้อย...ก็ได้..."
80000084-163 = "[s] \"เดี๋ยวก่อน มิจิรุ...\""
80000084-164 = "...หืม? ท่านอาจารย์ ทำไม...?"
80000084-165 = "[s] \"นี่มันช็อกโกแลตที่มอบให้ตอนพระอาทิตย์ตก...\""
80000084-167 = "[ns] \"แบบนี้มันเข้าสูตรรอมคอมเป๊ะๆ เลยไม่ใช่เหรอ?\""
80000084-168 = "...เอ๋?"
80000084-172 = "...อา... ฮะๆ ฮะฮะ..."
80000084-173 = "ว้ากกก...!@##$!@#$"
80000084-177 = "[ns] \"อ้าว... หนีไปซะแล้ว\""
80000084-179 = "(และแล้วมิจิรุก็หายไปทั้งแบบนั้น...)"
80000084-180 = "(แต่ถึงยังไงคุณครูก็ยังรับรู้ได้ถึงความอบอุ่นจางๆ จากช็อกโกแลตที่ได้รับจากมิจิรุ...)"

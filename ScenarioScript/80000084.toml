[translation]
80000084-1 = "簡直就像戀愛喜劇一樣"
80000084-2 = "（情人節當天，三千留一大早就來到了夏萊）"
80000084-4 = "老師大人，今天是情人節對吧？"
80000084-5 = "[s]「嗯，沒錯。」"
80000084-6 = "我想如果能好好利用這個機會，#n「少女忍法帖 小小三千留」頻道的訂閱者應該就會增加才對。"
80000084-7 = "所以，雖然已經到了當天，而且還有點趕……"
80000084-8 = "不過果然還是趕快來拍個情人節的影片，上傳到頻道裡吧！"
80000084-9 = "不可能不跟上節日的吧！？"
80000084-10 = "……我是這麼想的，你怎麼看呢！老師大人！？"
80000084-11 = "[s]「好是好，不過那不是以忍者為主題的頻道嗎……？」"
80000084-12 = "可是忍者也喜歡巧克力呀？"
80000084-13 = "[s]「這是喜不喜歡的問題嗎！？」"
80000084-14 = "哎呀～反正只要能增加訂閱數就好了！"
80000084-15 = "幫幫我吧～老師大人～"
80000084-16 = "藉由上傳情人節的影片，這次一定要讓「少女忍法帖 小小三千留」的訂閱數增加！"
80000084-17 = "好嗎？拜託！"
80000084-18 = "[s]「這樣的話，就一起加油吧！」"
80000084-19 = "真，真的嗎！？"
80000084-20 = "不愧是老師大人～！"
80000084-21 = "看見面臨困難的學生就無法坐視不管的情操！"
80000084-22 = "果然是我相中的下任首領！"
80000084-23 = "[s1]「首領的事我還是第一次聽見……話說回來，我該幫什麼忙呢？」\n[s2]「影片的內容已經決定好了嗎？」"
80000084-24 = "啊，那個不用擔心！"
80000084-25 = "啊，那個不用擔心！"
80000084-26 = "有我三千留部長製作的完美企劃和劇本！"
80000084-27 = "[s]「咦，明明有困擾，準備卻很充分呢……？」"
80000084-28 = "……嗯？"
80000084-29 = "唔喵！"
80000084-30 = "那那，那是因為……！"
80000084-31 = "對我這種程度的忍者來說，這種小事就跟吃飯一樣！而且我是部長啊！"
80000084-32 = "總，總之今天的拍攝就交給我吧……！"
80000084-33 = "[s]「嗯，我知道了。」"
80000084-34 = "（很，很好……已經順利將老師帶出來了……）"
80000084-35 = "（接下來只要趁機把「那個」給……！）"
80000084-36 = "那麼，我們就開始吧！"
80000084-38 = "（於是便依照三千留的指示，開始拍攝情人節的影片）"
80000084-39 = "那麼首先……從兩人在某個巷子的轉角咚的一聲相撞的場景開始吧！"
80000084-40 = "[s]「怎麼這麼突然……」"
80000084-41 = "哎呀哎呀，做做看就會知道了唷！"
80000084-42 = "總之我們現在要拍攝的就是因應情人節而推出的影片！"
80000084-43 = "哼哼……標題就用「試著在情人節還原戀愛喜劇的場景！」之類的吧！"
80000084-44 = "[s]「……忍者的要素呢？」"
80000084-45 = "啊，這，這個嘛……！"
80000084-46 = "唔嗯，那就不要用普通的戀愛喜劇……"
80000084-47 = "改用「忍者戀愛喜劇」就沒問題了吧！"
80000084-48 = "[s]「你，你覺得可以就好……」"
80000084-49 = "先來拍拍看吧！我會從那邊的轉角跑過來……"
80000084-50 = "聽到我大聲喊出的信號之後，老師大人就從這邊起跑哦。"
80000084-55 = "老師大人，可以了唷～！"
80000084-59 = "（聽到三千留的聲音後，小心翼翼地跑了起來……）"
80000084-66 = "喝啊啊！！"
80000084-71 = "（在相撞的瞬間，神不知鬼不覺地把「這個」放進老師大人的口袋裡……！）"
80000084-72 = "……嗯！？等，等等！？為什麼地上會有香蕉皮……！？"
80000084-73 = "嗚，嗚哇啊啊！？"
80000084-77 = "[ns]「三，三千留！你還好嗎！？」"
80000084-79 = "真是的，到底是誰！？居然在這種地方亂丟香蕉皮！"
80000084-80 = "這樣很危險耶！？還害我失敗了！"
80000084-81 = "[s]「不過跑在這種視野不好的路上本來就很危險……」"
80000084-82 = "講道理！？"
80000084-83 = "唔嗯……不過確實如老師所說的有點危險，而且哏好像太老了……"
80000084-84 = "那，那來拍下一個吧……能拍的還有很多！"
80000084-85 = "來拍下一段「忍者喜劇」吧！"
80000084-87 = "（後來也和三千留一起挑戰了各種「戀愛喜劇情境」……#n　不，是「忍者戀愛喜劇情境」）"
80000084-89 = "這次是青梅竹馬「老師大人君」因為感冒在家休息的場景！"
80000084-90 = "……好。"
80000084-91 = "老師大人君！我幫你煮了粥唷～#n啊，就這樣躺著吧！"
80000084-92 = "為了讓你盡快恢復元氣，就讓我來餵你吃吧……！"
80000084-93 = "[s]「那個……那碗粥，整個是黑色的……」"
80000084-95 = "[ns]「好像還傳來了一股很重的燒焦味……？」"
80000084-96 = "唔，因為太專注在情境上，粥的狀態已經……！"
80000084-97 = "下，下一段一定沒問題的！"
80000084-99 = "那個，我……#n有東西想交給老師大人前輩！"
80000084-100 = "如果老師大人前輩在下次的大賽中獲得冠軍，到了那個時候……#n請和我一起將埋在那棵櫻花樹下的、那一天的時光膠囊給……！"
80000084-101 = "[s]「設定太複雜了！！」"
80000084-102 = "好，好像確實是這樣……！？"
80000084-103 = "下，下一個！"
80000084-105 = "下次一定……！"
80000084-106 = "（雖然之後也一一還原三千留想出的各種情境……）"
80000084-107 = "（每次都遇到各種妨礙，或是發生意外……）"
80000084-108 = "（還沒能拍出滿意的影片，天就已經在不知不覺間黑了）"
80000084-110 = "呣……"
80000084-111 = "[s]「三千留，你還好嗎？」"
80000084-112 = "我，我沒…… "
80000084-113 = "……好像不能說是沒事……身體已經快到極限了……"
80000084-114 = "[s]「那稍微休息一下吧。會不會口渴？」"
80000084-115 = "嗯，嗯……謝謝你，老師大人……"
80000084-119 = "唔……"
80000084-120 = "嗚哇～～～！怎麼那麼不順利～！"
80000084-121 = "為了情人節準備的終極作戰──"
80000084-122 = "我的「自然而然咻啪作戰」啊……！"
80000084-123 = "[s3]「果然是為了這個啊。」\n[s4]「雖然多少有預料到……」"
80000084-124 = "……咦？"
80000084-125 = "……咦？"
80000084-126 = "老，老，老師大人──！？為為為，為什麼會在這裡！？"
80000084-127 = "不，不是去買飲料了嗎！？"
80000084-128 = "[s]「我突然想到忘記問你要喝什麼了……」"
80000084-129 = "所以……你，你從哪裡開始聽的……！"
80000084-130 = "[s]「從『嗚哇～～～！』開始……」"
80000084-131 = "嗚，嗚嗚……居然從一開始就……！"
80000084-132 = "算了，事到如今……！"
80000084-133 = "沒錯！今天之所以會找老師大人拍影片……"
80000084-134 = "打從一開始就是為了送巧克力給老師！"
80000084-135 = "希望能向平時總是幫助忍術研究部的老師……"
80000084-136 = "表，表……表達感謝的心──"
80000084-137 = "[s]「沒，沒事吧……？」"
80000084-138 = "嗚嗚，在重要的地方咬到舌頭了……！"
80000084-139 = "[s]「不過如果是巧克力的話，普通地給我也……」"
80000084-140 = "什麼！？那是什麼令人害怕的發言！？"
80000084-141 = "居然要我把情人節的巧克力，「普通」地交給老師……！"
80000084-142 = "那種像是甜到蛀牙的戀愛喜劇一樣的事……我我，我怎麼可能做得到！？"
80000084-143 = "那種事是「現充」在做的事！#n像我這種人是做不到的！"
80000084-144 = "[s]「真是強烈的偏見……」"
80000084-145 = "嗚嗚……"
80000084-146 = "全都被發現了，而且還是用奇怪的形式……"
80000084-147 = "還給老師添了許多麻煩……"
80000084-148 = "[s]「沒關係的唷。不如說我覺得很開心。」"
80000084-149 = "是，是嗎？那就好……"
80000084-150 = "……等等！雖然放心了，不過那個「很開心」是什麼意思！？"
80000084-151 = "是覺得看我一個人唱獨角戲很有趣嗎！？"
80000084-152 = "嗚……算了！不管了！"
80000084-153 = "來，這個給你！"
80000084-158 = "這是我抱持著對老師大人的感謝特別訂做的！#n收下吧！"
80000084-159 = "[s]「謝謝，三千留。」"
80000084-160 = "唔喵啊啊～！#n今天的我真不像我……"
80000084-161 = "繞了這麼大一圈……結果卻還是普通地送出去……"
80000084-162 = "……不對，這樣反而像我……嗎？"
80000084-163 = "[s]「不過，仔細想想……」"
80000084-164 = "……？"
80000084-165 = "[s]「兩人邊看著夕陽邊送出巧克力……」"
80000084-167 = "[ns]「這不就像經典又『普通』的情人節一樣嗎？」"
80000084-168 = "……咦？"
80000084-172 = "啊。啊哈，哈哈，哈哈……"
80000084-173 = "……唔喵啊啊！@##$!@#$！！！"
80000084-177 = "[ns]「啊……跑走了。」"
80000084-179 = "（一邊看著逐漸遠去的背影，一邊縮緊被冷風吹著的肩膀……）"
80000084-180 = "（不過從三千留給的巧克力之中，隱約感受到了溫暖）"

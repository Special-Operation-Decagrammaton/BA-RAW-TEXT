[translation]
80000084-1 = "Like a Rom-Com"
80000084-2 = "Michiru came to Schale early on the morning of Valentine's Day."
80000084-4 = "Honorable Sensei! Today is Valentine's Day, is it not?"
80000084-5 = "[s] \"Yep, it is.\""
80000084-6 = "There's no way that Michiruchi, A Girl's Ninja Scroll can let such a celebrated day pass by!"
80000084-7 = "And so, to commemorate the occasion..."
80000084-8 = "We should create and upload some special Valentine's Day content!"
80000084-9 = "Those who don't adapt to the times are forgotten."
80000084-10 = "That is what I think. What say you, Honorable Sensei?!"
80000084-11 = "[s] \"I mean, you're not wrong, but isn't your channel about ninjas—\""
80000084-12 = "Even ninjas enjoy chocolate!"
80000084-13 = "[s] \"I think you're maybe missing my point.\""
80000084-14 = "None who lose sleep over such small matters can survive in the fierce battle of content creation!"
80000084-15 = "So please, I beg of you, lend me your aid!"
80000084-16 = "I must create content that ensures that Michiruchi, A Girl's Ninja Scroll goes viral on Valentine's Day!"
80000084-17 = "Please? Please?"
80000084-18 = "[s] \"I guess I don't mind helping...\""
80000084-19 = "R-Really?!"
80000084-20 = "I mean, I was right to come to you, Honorable Sensei!"
80000084-21 = "Someone of your magnanimous nature would never abandon a student in need!"
80000084-22 = "As expected from the next great ninja leader!"
80000084-23 = "[s1] \"I don't really remember agreeing to that part, but...oh well.\"\n[s2] \"So what are we filming? Do you have a plan?\""
80000084-24 = "Never fear! I have an idea!"
80000084-25 = "Never fear! I have an idea!"
80000084-26 = "I have crafted the perfect script with the perfect tools for this moment!"
80000084-27 = "[s] \"You know, for someone who claims to be in trouble, you sure seem well prepared...\""
80000084-28 = "...Huh?"
80000084-29 = "Erm, um, it's just..."
80000084-30 = "W-Well, it's just that..."
80000084-31 = "It's just because President Michiru is always prepared for any dangerous situation!"
80000084-32 = "Anyway! That's not important. Your job is simply to follow my directorial direction, Honorable Sensei!"
80000084-33 = "[s] \"Yeah, yeah. Okay.\""
80000084-34 = "(Okay! Step one, get Honorable Sensei to agree to film, went off without a hitch!)"
80000084-35 = "(Now onto step two!)"
80000084-36 = "Very well! Let us begin!"
80000084-38 = "And so began the Valentine's Day video shoot, following Michiru's unique vision..."
80000084-39 = "The first shot is a scene where two people bump into each other as they both round a street corner."
80000084-40 = "[s] \"Wait, I'm sorry. What are we shooting?\""
80000084-41 = "Heh heh heh. You've agreed, so there's nothing to hide now!"
80000084-42 = "What we're going to shoot is true Valentine's Day content!"
80000084-43 = "I call it: \"Trying out romcom tropes on Valentine's Day!\""
80000084-44 = "[s] \"Isn't that...completely ignoring the ninja theme?\""
80000084-45 = "Oh, well..."
80000084-46 = "Right! Sorry, we're not just filming any romcom tropes."
80000084-47 = "They're all ninja romcom tropes! So, you see, it is ninja related!"
80000084-48 = "[s] \"Hm, if you say so...\""
80000084-49 = "Now! I will run around the corner from that direction."
80000084-50 = "You shall stand here, and run this direction, at my signal."
80000084-55 = "Okay, and... Action!"
80000084-59 = "As directed, I slowly jog around the street corner."
80000084-66 = "Hi-yah!"
80000084-71 = "(Now, as we collide, I just need to slip this into Honorable Sensei's pocket without them noticing!)"
80000084-72 = "...Waaaaaaaaugh! A banana peel?"
80000084-73 = "Why was that there?"
80000084-77 = "[s] \"Michiru! Are you okay?!\""
80000084-79 = "Who did this heinous act? Who threw their trash on the ground?!"
80000084-80 = "It's so dangerous! It makes it impossible to do a romantic crash around a street corner!"
80000084-81 = "[s] \"I...don't think the banana peel is what makes that dangerous.\""
80000084-82 = "Must you always rely on facts and logic, Honorable Sensei?"
80000084-83 = "But, I guess, in this case, you do have a point... And it's an out-of-date trope, anyway..."
80000084-84 = "All right! No more of that!"
80000084-85 = "Onto the next trope!"
80000084-87 = "I continued to shoot romcom—I mean ninja romcom tropes with Michiru for some time."
80000084-89 = "Okay, this trope requires you to be sick with a cold."
80000084-90 = "Ahem..."
80000084-91 = "[USERNAME] Sensei! I heard you're feeling under the weather!"
80000084-92 = "Don't worry, I brought a homemade porridge just for you. It should knock the cold right out of you!"
80000084-93 = "[s] \"Um, the porridge looks like it was burnt black...\""
80000084-95 = "[ns] \"And what is that smell? It's weirdly sweet. Are you sure this is porridge...?\""
80000084-96 = "Oh! I was too focused on the character of the concerned childhood friend. I didn't think about the porridge ingredients..."
80000084-97 = "V-Very well! Onto the next trope!"
80000084-99 = "[USERNAME] Sensei! If we win this competition..."
80000084-100 = "I want you to know... I put something very important in the time capsule under the tree for you!"
80000084-101 = "[s] \"Wait! I can't follow the setup for this one at all.\""
80000084-102 = "Argh! This one won't work either?"
80000084-103 = "That's fine! Let's move on!"
80000084-105 = "The next one will surely go viral!"
80000084-106 = "I continued to reenact Michiru's list of tropes..."
80000084-107 = "But thanks to multiple failures, and plain old bad luck..."
80000084-108 = "The sun began to set before we managed to get a good clip."
80000084-110 = "*sigh*"
80000084-111 = "[s] \"Michiru, are you okay?\""
80000084-112 = "I-I'm fine..."
80000084-113 = "No, wait... Ugh. I think I pushed myself too hard. My muscles are so sore I can't move at all..."
80000084-114 = "[s] \"Okay, time for a break. Let me get some drinks from the vending machine.\""
80000084-115 = "Sure... Thanks, Honorable Sensei..."
80000084-119 = "Ugh..."
80000084-120 = "Urgh! I failed... every single one!"
80000084-121 = "My special Valentine's day plan..."
80000084-122 = "My plan to pass chocolate to Honorable Sensei in secret..."
80000084-123 = "[s3] \"I see. So that's why we're really here.\"\n[s4] \"That's more or less what I expected, anyways.\""
80000084-124 = "...Huh?"
80000084-125 = "...Huh?"
80000084-126 = "H-H-H-Honorable Sensei?! What are you doing here?!"
80000084-127 = "Y-You were supposed to... The drinks?!"
80000084-128 = "[s] \"Well, I forgot to ask you what you wanted, so...\""
80000084-129 = "S-S-So you heard...everything?!"
80000084-130 = "[s] \"Yep.\""
80000084-131 = "No... Noooooooooo!"
80000084-132 = "Argh! Okay! I don't care anymore!"
80000084-133 = "It's true! The real reason I asked you to create content with me was..."
80000084-134 = "Was because I wanted to give you chocolate!"
80000084-135 = "You're always helping the Ninjutsu Research Club, Honorable Sensei..."
80000084-136 = "I... I wanted... I wanted to say... To say thank y—OW!"
80000084-137 = "[s] \"Michiru? A-Are you all right?\""
80000084-138 = "Ugh! I bit my tongue at a pivotal moment!"
80000084-139 = "[s] \"You know, you can just give me chocolate normally, Michiru...\""
80000084-140 = "What?! How could you be so cold, Honorable Sensei?!"
80000084-141 = "To just...just casually hand someone Valentine's Day chocolates..."
80000084-142 = "Th-There's no way I could t-take part in a shickly sweet romcom i-in shuch a shimple way!"
80000084-143 = "The only people who could do something like that are totally fearless, or shameless, or both! In other words, nothing like us!"
80000084-144 = "[s] \"You may be showing some biases there...\""
80000084-145 = "Ugh..."
80000084-146 = "It doesn't even matter anymore... My cover is blown."
80000084-147 = "And you must be mad that I've been dragging you around all day..."
80000084-148 = "[s] \"Not at all. I had fun trying to make content with you.\""
80000084-149 = "R-Really? Well, that's a relief..."
80000084-150 = "Wait, wait! Things are getting way too heartwarming."
80000084-151 = "You're just saying you enjoyed watching me run around like a chicken with its head cut off!"
80000084-152 = "Fine! So be it! Even a ninja can't go back in time."
80000084-153 = "Here, Honorable Sensei!"
80000084-158 = "I special-ordered this chocolate to thank you properly. Enjoy it!"
80000084-159 = "[s] \"Yeah, thanks.\""
80000084-160 = "Aaaaagh! Today was the worst! This wasn't like me at all!"
80000084-161 = "And it came to such a boring and unromantic end..."
80000084-162 = "But, I guess maybe that's the ending that fits me best."
80000084-163 = "[s] \"Hang on, Michiru.\""
80000084-164 = "Huh? What is it, Honorable Sensei?"
80000084-165 = "[s] \"Isn't the quintessential romcom trope...\""
80000084-167 = "[ns] \"...A curt chocolate handover under the setting sun?\""
80000084-168 = "...Hm?"
80000084-172 = "Oh, ha... hahaha..."
80000084-173 = "Aaaaaaaaah!"
80000084-177 = "[ns] \"And...there she goes.\""
80000084-179 = "Although Michiru ran away..."
80000084-180 = "The warmth of her gift stayed with me."

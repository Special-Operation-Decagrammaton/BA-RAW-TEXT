90001060-33 = "2;에이미 수영복ND;07;안 되겠어, 선생님. 나 조금 벗을게.\n#2;stiff"
90001060-34 = "[s] \"안 돼, 에이미! 진정해!\""
90001060-35 = "2;에이미 수영복ND;06;어째서? 사람은 원래 추위보다 더위에 약한 생물이야. \n#2;jump\n#2;m2"
90001060-36 = "2;에이미 수영복ND;06;더위에 갑자기 노출되면, 흔히 일어나곤 하는 증상이 열사병인데…….\n#2;hophop\n#2;m4"
90001060-37 = "2;에이미 수영복ND;06;이 증세가 나타나면 인간은 버틸 수가 없어. 즉시 의식이 흐려지며 몸에 경련이 일어나고 저혈압, 탈수 증상이 일어나 사망하기까지 한다구.\n#2;m2"
90001060-38 = "2;에이미 수영복ND;05;심지어 열사병으로 사망하게 되면, 사인을 판별하기 어려워지기까지 한단 말이야.\n#2;hophop\n#2;m4"
90001060-39 = "2;에이미 수영복ND;08;무엇보다 더위라는 불쾌감을 억지로 참아 가면서 작전을 계속하는 것은, 비합리적인 행위인걸.\n#2;m3\n#2;jump"
90001060-40 = "[s3] \"유독 특정 증상에 자세한 건 이해하겠는데…….\"\n[s4] \"그래도 조금만 참아 줘…….\""
90001060-41 = "#all;hide"
90001060-42 = "#all;hide"
90001060-43 = "3;히마리 방한복;04;……고생이 많으시네요. 선생님.\n#3;em;[한숨]"
90001060-44 = "3;히마리 방한복;02;네? 저에게 위로를 받는 날이 오게 되다니, 감개가 무량하시다고요?"
90001060-45 = "3;히마리 방한복;09;무슨 말씀이신가요. 저같이 다른 사람의 마음을 자기 것처럼 이해할 줄 알고."
90001060-46 = "3;히마리 방한복;07;나아가 그 사람의 마음을 이해하고 위로할 줄 아는…… 그렇군요. 청초병약계열의 천재 해커이자 자상하고 자애로운 부장, 그리고 만능이자 전지인 미소녀에게."
90001060-47 = "3;히마리 방한복;09;이 정도는 숨 쉬는 것만큼이나 자연스럽게 이루어지는 간단한 행위랍니다. 네. 간단한 행위이고 말고요. 중요하니까 두 번 말씀드렸어요.\n#3;em;[반짝]"

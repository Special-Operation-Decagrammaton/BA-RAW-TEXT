[translation]
90001060-1 = "Episode 6;Flame"
90001060-6 = "..."
90001060-7 = "..."
90001060-12 = "?"
90001060-17 = "[ns1] \"We followed the trail to the very end...\"\n[ns2] \"There's a volcano...in the middle of a tundra?\""
90001060-20 = "Warmth!"
90001060-21 = "Too hot!"
90001060-22 = "I think it's just right."
90001060-27 = "No, Eimi. It is still slightly cold, and, as always, you are slightly strange."
90001060-28 = "Humans are designed to live in these kinds of—no, in temperatures much warmer than this!"
90001060-29 = "The cold was nice and refreshing. This is too hot."
90001060-33 = "This is beyond my threshold. I will remove my clothing now, Sensei."
90001060-34 = "[s] \"No, Eimi! Contain yourself!\""
90001060-35 = "But why? Humans naturally find cold more tolerable than heat. "
90001060-36 = "You can even suffer from heatstroke with sudden exposure."
90001060-37 = "We are not equipped to endure heatstroke. Some symptoms include the following: fainting, convulsions, low blood pressure, dehydration, and even DEATH."
90001060-38 = "To make matters worse, it's difficult to determine the cause of death when people die of heatstroke."
90001060-39 = "In conclusion, it's inhumane treatment to continue this operation and force me to endure this extreme heat."
90001060-40 = "[s3] \"You are very well-versed in these symptoms...\"\n[s4] \"But please endure just a bit more...\""
90001060-43 = "...We're sorry for causing you trouble, Sensei."
90001060-44 = "Huh? You feel honored to have received an apology from me?"
90001060-45 = "That's a given. After all, who else can empathize so perfectly with others..."
90001060-46 = "...and console them besides me? Besides a delicate, fragile, genius hacker? A kind and benevolent president? An omnipotent AND omniscient beauty?"
90001060-47 = "This simple task comes as easily as breathing to me. Yes, a simple task. I said it twice, to really emphasize how simple it is for me."
90001060-51 = "[ns] \"...Yes. Absolutely. Of course. You're right, Himari.\""
90001060-52 = "Your expression and your words are incredibly contradictory."
90001060-56 = "The trail ends here. I'll scout ahead. However..."
90001060-57 = "The expected terrain has changed, thus so has the situation."
90001060-58 = "Furthermore..."
90001060-66 = "There are many machines currently in operation."
90001060-67 = "Yes. Digging, drilling, transporting, demolishing... They are very busy."
90001060-68 = "That's a drilling machine, isn't it?"
90001060-69 = "Drilling...is primarily used to acquire resources, yes? Then are they mining for something here?"
90001060-70 = "Various ores tend to be formed in volcanic regions."
90001060-71 = "For example, volcanos make copper ore, and you can mine a significant amount of sulfur near an active volcano. But—"
90001060-82 = "President?!"
90001060-83 = "A communication jam! Toki?"
90001060-85 = "Yes, President Himari. I've confirmed a powerful jamming signal broadcasting throughout the entire region. In addition..."
90001060-90 = "...Abi-Eshuh appears to be affected as well. This jamming signal operates by overloading electronics."
90001060-91 = "No concern. In my experience, hitting technology very hard usually works."
90001060-93 = "E-Eimi?!"
90001060-100 = "...It did not work."
90001060-101 = "Peculiar. Maybe the angle was wrong?"
90001060-102 = "[s] \"No. I don't think that was the problem...\""
90001060-103 = "Is that so...?"
90001060-104 = "Due to a lack of options, I will reduce output down to regular mode."
90001060-105 = "I can store Abi-Eshuh in the temporary trailer Ms. Rio created with the AMAS."
90001060-106 = "...Negative. The jamming signal has also interfered with the trailer's functions. The only other avenue..."
90001060-107 = "...is to manually dismantle Abi-Eshuh."
90001060-109 = "I can assist."
90001060-110 = "Thank you, Eimi."
90001060-116 = "Wait. Any equipment that's still running..."
90001060-117 = "Yes. I can utilize any of the online devices to reverse the jamming signal. It's strong enough that it should be possible..."
90001060-118 = "I found it! The signal is coming from that direction!"
90001060-128 = "Is that...a radar base? A strange facility of sorts..."
90001060-129 = "It may be made to transmit this jamming signal."
90001060-130 = "...No matter what it is, we'll need to find a way to resolve the jamming situation. Immediately."
90001060-131 = "For what reason?"
90001060-132 = "Losing Abi-Eshuh as a combat tool is a huge blow to our forces."
90001060-133 = "Furthermore, and I am absolutely loath to admit this..."
90001060-134 = "..."
90001060-135 = "But without Rio's AMAS units and navigation, remaining here is risky at best."
90001060-136 = "This is purely about the utility of the tools available to us. Do you understand? Do you?"
90001060-137 = "(She just can't be honest with herself when it comes to Ms. Rio.)"
90001060-138 = "Understood, Eimi. Your expression reads as follows: \"President Himari cannot be honest with herself when it comes to Ms. Rio.\""
90001060-140 = "?!?!"
90001060-142 = "Can you read my mind?"
90001060-143 = "No. I was simply talking."
90001060-144 = "I figured as much..."
90001060-145 = "[s] \"For now, let's go that way.\""
90001060-146 = "Yes. Let's do so, Sensei. The situation and circumstances all point us towards that direction."
90001060-147 = "Follow me."
90001060-148 = "Be careful, Sensei. President. Everyone."

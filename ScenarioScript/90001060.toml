[translation]
90001060-1 = "ตอนที่ 6;เปลวไฟ"
90001060-6 = "..."
90001060-7 = "..."
90001060-12 = "?"
90001060-17 = "[ns1] \"ตรงนั้นคือภูเขาไฟเหรอ...?\"\n[ns2] \"เหมือนมีภูเขาไฟบนหิมะเลย?\""
90001060-20 = "อุ่นดีจังเลยค่ะ!"
90001060-21 = "ร้อนออก!"
90001060-22 = "ฉันคิดว่ากำลังดีเลยค่ะ"
90001060-27 = "ไม่หรอกค่ะ เอมิ ฉันยังรู้สึกหนาวอยู่นิดหน่อยค่ะ เอมิเป็นคนขี้ร้อนหรือเปล่าคะ?"
90001060-28 = "มนุษย์เป็นสิ่งมีชีวิตที่ถูกออกแบบมาให้ดำรงชีวิตในอุณหภูมิประมาณนี้ ไม่สิ ต้องในอุณหภูมิที่สูงกว่านี้#nอีกค่ะ"
90001060-29 = "แต่สำหรับฉันมันก็ร้อนอยู่ดีละน่า เมื่อกี้อุตส่าห์ดีใจที่ได้อยู่ในที่เย็นๆ แล้วเชียว"
90001060-33 = "ไม่ได้การละ คุณครู ฉันขอถอดหน่อยแล้วกัน"
90001060-34 = "[s] \"ไม่ได้นะ เอมิ! ใจเย็นๆ ก่อน!\""
90001060-35 = "ทำไมล่ะ? เดิมทีมนุษย์เป็นสิ่งมีชีวิตที่อ่อนแอต่อความร้อนมากกว่าความหนาวนะ "
90001060-36 = "ถ้าจู่ๆ ก็เจอความร้อนกะทันหันขึ้นมา เดี๋ยวก็ได้เป็นโรคลมแดดกันพอดี..."
90001060-37 = "ถ้าเกิดอาการแบบนั้น มนุษย์ทนไม่ได้หรอกนะ ว่ากันว่าสติจะเริ่มพร่ามัว แล้วก็จะเกิดอาการชัก ความดันโลหิตต่ำ เกิดภาวะขาดน้ำ และเสียชีวิตได้เลยนะ"
90001060-38 = "และถ้าเสียชีวิตด้วยโรคลมแดดละก็ การแยกแยะศพก็ไม่ใช่เรื่องง่ายเลยละ"
90001060-39 = "นอกจากนี้แล้ว ให้ทำตามแผนการต่อโดยที่ต้องทนกับความร้อนที่ไม่น่าเบิกบานใจมันก็เป็นสิ่งที่ไม่สม#nเหตุสมผลด้วย"
90001060-40 = "[s3] \"ครูก็เข้าใจอาการอยู่หรอก แต่ก็ทนหน่อยนะ...\"\n[s4] \"ครูเข้าใจเอมิ แต่ช่วยอดทนสักหน่อยเถอะนะ...\""
90001060-43 = "เหนื่อยน่าดูเลยนะคะ... คุณครู"
90001060-44 = "คะ? รู้สึกประทับใจเพราะเหมือนได้คำปลอบโยนจากฉันอย่างนั้นเหรอคะ?"
90001060-45 = "พูดอะไรของคุณครูคะ รู้จักเข้าใจคนอื่นเหมือนกับฉันเลย"
90001060-46 = "การรู้จักวิธีปลอบโยนน่ะ... นั่นสินะคะ สำหรับแฮ็กเกอร์อัจฉริยะที่อ่อนแอ หัวหน้าที่เอาใจใส่และเมตตา และสาวสวยรอยยิ้มสดใสที่มีความสามารถรอบด้านแล้ว"
90001060-47 = "นี่มันก็แค่การกระทำง่ายๆ ที่เกิดขึ้นตามธรรมชาติเหมือนการหายใจค่ะ ค่ะ มันคือการกระทำที่ง่ายๆ ค่ะ  ฉันย้ำให้อีกครั้งเพราะมันสำคัญน่ะค่ะ"
90001060-51 = "[ns] \"ก็ได้ๆ... ฮิมาริพูดถูกทุกอย่างเลย...\""
90001060-52 = "ทำไมสีหน้ากับสิ่งที่พูดมามันไปคนละทางเลยล่ะคะ...?"
90001060-56 = "ฉันยังคงตรวจตราบริเวณรอบๆ อยู่ แต่เหมือนว่าร่องรอยจะหายไปจากแถวนี้นะ..."
90001060-57 = "พอภูมิประเทศเปลี่ยนไป สถานการณ์ก็เปลี่ยนไปด้วยสินะคะ"
90001060-58 = "แต่เหนือสิ่งอื่นใด ทั่วทั้งบริเวณนี้..."
90001060-66 = "มีเครื่องจักรทำงานอยู่ทั่วเลยนะคะ"
90001060-67 = "อืม ทั้งขุดดิน ทั้งเจาะบางอย่างด้วยสว่าน และขนย้ายสิ่งนั้นไป... ทำงานกันมือเป็นระวิงเลยแฮะ"
90001060-68 = "อันนั้นมัน... เครื่องขุดเจาะหรืออะไรทำนองนั้นเปล่าคะ?"
90001060-69 = "เครื่องขุดเจาะ... เอาไว้ขุดพื้นให้เป็นหลุมเพื่อสำรวจทรัพยากรใช่มั้ย? ถ้าอย่างนั้นก็หมายความว่า#nกำลังมีการเก็บรวบรวมบางอย่างจากที่นี่ด้วยเหรอ?"
90001060-70 = "เขตภูเขาไฟคือสภาพแวดล้อมที่มีแร่ธาตุต่างๆ สะสมอยู่"
90001060-71 = "ภูเขาไฟผลิตแร่ทองแดงได้ และในบริเวณภูเขาไฟที่ยังคุกรุ่นอยู่ก็ขุดกำมะถันในปริมาณมากได้ด้วย แต่ว่า..."
90001060-82 = "ประธาน?!"
90001060-83 = "การสื่อสารถูกแทรกแซงค่ะ! โทคิ?"
90001060-85 = "ค่ะ หัวหน้าฮิมาริ ตรวจพบว่ามีการส่งคลื่นรบกวนที่รุนแรงไปทั่วพื้นที่นี้เลยค่ะ แล้วก็...?"
90001060-90 = "สภาวะของอาบี เอชูห์... ดูจะผิดปกตินิดหน่อยค่ะ โดยรวมแล้วคลื่นรบกวนนี้น่าจะส่งผลกระทบต่อ#nอุปกรณ์อิเล็กทรอนิกส์ค่ะ"
90001060-91 = "ไม่เป็นไรหรอก ปกติเรื่องแบบนี้ แค่ลงไม้ลงมือนิดๆ หน่อยๆ ก็หายแล้วละ"
90001060-93 = "อะ... เอมิ?!"
90001060-100 = "ไม่เห็นหายเลยค่ะ"
90001060-101 = "แปลกจัง... หรือว่าองศาไม่ถูกต้อง?"
90001060-102 = "[s] \"ไม่หรอก ไม่น่าจะใช่เรื่องนั้นหรอกนะ...\""
90001060-103 = "เป็นอย่างนั้นเหรอ..."
90001060-104 = "ถ้าอย่างนั้นก็ช่วยไม่ได้นะคะ ฉันจะกลับไปอยู่ในโหมดปกติก่อนแล้วกันค่ะ"
90001060-105 = "แล้วก็ค่อยเก็บอาบี เอชูห์ไว้ในรถเทรลเลอร์เคลื่อนที่ชั่วคราวที่ท่านริโอะเตรียมไว้..."
90001060-106 = "เป็นไปได้ยังไง... การแทรกแซงการสื่อสารทำให้รถเทรลเลอร์หยุดทำงานไปแล้วค่ะ ถ้าอย่างนั้นวิธีเดียวที่เหลือของฉันก็คือ..."
90001060-107 = "ยกเลิกระบบ... ของอาบี เอชูห์แบบแมนนวลสินะคะ..."
90001060-109 = "ฉันจะช่วยอีกแรงนะ"
90001060-110 = "ขอบคุณค่ะ เอมิ"
90001060-116 = "เดี๋ยวนะคะ จากอุปกรณ์ที่ยังทำงานอยู่..."
90001060-117 = "คลื่นรบกวนนี้รุนแรงกว่าระดับปกติมาก ฉันว่าเราสามารถใช้ประโยชน์จากสิ่งนี้ แล้วก็..."
90001060-118 = "เจอแล้วค่ะ! คลื่นรบกวนถูกปล่อยออกมาจากทางโน้นค่ะ!"
90001060-128 = "เหมือนมีอุปกรณ์อะไรแปลกๆ เลย ใช่เรดาร์หรือเปล่า?"
90001060-129 = "หรือไม่ก็เป็นเครื่องที่ส่งคลื่นวิทยุที่เป็นคลื่นรบกวนนี้ค่ะ"
90001060-130 = "ถึงจะไม่รู้ว่ามันคืออะไร... แต่สิ่งที่รู้แน่นอนก็คือ เราต้องแก้ไขเรื่องการแทรกแซงการสื่อสารนี้ค่ะ"
90001060-131 = "ใช้อะไรเป็นเกณฑ์ตัดสินเหรอ?"
90001060-132 = "ถ้าปล่อยไว้แบบนี้ต่อไป อาบี เอชูห์ก็จะใช้งานลำบากค่ะ และนั่นจะเป็นการสูญเสียกำลังต่อสู้ของเรา#nเป็นอย่างมากเลยละค่ะ"
90001060-133 = "อีกอย่าง... ฉันไม่อยากยอมรับเรื่องนี้เลย แต่ก็..."
90001060-134 = "..."
90001060-135 = "ค่ะ การที่เราอยู่ในอยู่ในพื้นที่นี้ต่อไปเรื่อยๆ โดยไม่มีกองกำลัง AMAS และเนวิเกชั่นของริโอะเป็น#nเรื่องที่อันตรายมากเลยค่ะ"
90001060-136 = "ฉันขอพูดให้ชัดเจนตรงนี้นะคะ นี่เป็นการตัดสินใจโดยคำนึงถึงการใช้ประโยชน์ของอุปกรณ์ค่ะ ทุกคนเข้าใจมั้ยคะ?"
90001060-137 = "(เรื่องที่เกี่ยวข้องกับประธานเนี่ย พูดตรงๆ ไม่ได้เลย...)"
90001060-138 = "อย่างนั้นเหรอคะ เอมิ? ดูจากสีหน้าแล้ว คงจะบอกว่า 'หัวหน้าฮิมาริพูดตรงๆ ในเรื่องที่เกี่ยวกับท่าน#nริโอะไม่ได้เลย' สินะคะ"
90001060-140 = "?!?!"
90001060-142 = "เดี๋ยวนะ ฉันเป็นพวกที่แสดงทุกอย่างออกมาทางสีหน้าเหรอ?"
90001060-143 = "ไม่หรอกค่ะ ฉันก็แค่ลองพูดไปอย่างนั้นค่ะ"
90001060-144 = "คิดไว้แล้วละว่าต้องเป็นแบบนี้..."
90001060-145 = "[s] \"เราไปตรงโน้นกันก่อนเถอะ\""
90001060-146 = "ค่ะ เอาตามนั้นค่ะ คุณครู ตอนนี้ทั้งสถานการณ์ ทิศทาง และเงื่อนไขทุกอย่างล้วนแล้วแต่เกี่ยวข้องกับ#nสถานที่นั้นค่ะ"
90001060-147 = "ฉันจะนำให้เองค่ะ"
90001060-148 = "หัวหน้า คุณครู ทุกคน ระวังตัวด้วยนะ"

90001060-27 = "4;히마리 방한복;04;아뇨, 에이미. 저는 아직도 약간이지만 추워요. 에이미가 조금 벗어나 있는 거라구요."
90001060-28 = "4;히마리 방한복;07;사람은 원래 이 정도, 아니, 이보다 훨씬 더 높은 온도에서 살아가도록 되어 있는 생물이라구요."
90001060-29 = "4;히마리 방한복;07\n2;에이미 수영복ND;06;그렇지만 더운 건 더운걸. 조금 전까지는 시원해서 좋았는데."

[translation]
90001060-1 = "第6話;火花"
90001060-6 = "……"
90001060-7 = "……"
90001060-12 = "？"
90001060-17 = "[ns1]「我們一路追著痕跡來到這裡……」\n[ns2]「在我眼前的……是一座火山嗎？」"
90001060-20 = "好溫暖！"
90001060-21 = "好熱！"
90001060-22 = "我倒覺得溫度剛剛好。"
90001060-27 = "不，英美。雖然只有一點點，但我還是覺得有點冷。#n這顯然是英美你有問題。"
90001060-28 = "人類本來就是應該在這種溫度……不，是應該在比這更溫暖的環境中生活的生物。"
90001060-29 = "但我就是覺得熱嘛。#n之前那樣明明那樣很涼爽很舒服的說。"
90001060-33 = "不行，老師。#n我得把衣服脫掉。"
90001060-34 = "[s]「等等，英美！你先冷靜！」"
90001060-35 = "為什麼？#n跟寒冷相比，人類本來就更害怕炎熱。"
90001060-36 = "而且突然暴露在炎熱的環境下，很容易會中暑……"
90001060-37 = "一旦中暑的症狀出現就撐不了多久了。#n除了意識模糊和痙攣之外，還有可能導致低血壓、脫水或死亡。"
90001060-38 = "而且如果是因中暑而死亡，死因是很難被檢驗出來的。"
90001060-39 = "還有最重要的是，要我一邊忍受炎熱的痛苦一邊執行作戰相當不合理。"
90001060-40 = "[s3]「我能明白你為什麼對特定症狀了解這麼深入……」\n[s4]「即便如此，還是麻煩你稍微忍忍吧……」"
90001060-43 = "……您也真辛苦呢，老師。"
90001060-44 = "嗯？沒想到有天能得到我的安慰，所以現在覺得感慨萬千？"
90001060-45 = "您怎麼這麼說呢。#n我明明就是經常站在別人的立場……"
90001060-46 = "並且能在替人著想的同時，給予對方安慰……#n沒錯，對我這個清楚系病弱天才駭客兼溫柔善良部長，以及萬能全知美少女來說……"
90001060-47 = "這種事就如同呼吸一樣自然而簡單。#n沒錯，簡直再簡單不過了。因為很重要，所以我得說第二遍。"
90001060-51 = "[ns]「……好好好，陽葵你說的都對。」"
90001060-52 = "為何您好像有種口是心非的感覺呢……？"
90001060-56 = "痕跡就斷在這附近。#n雖然我一直在觀察四周……"
90001060-57 = "隨著地形改變，情況也跟著變了呢。"
90001060-58 = "而且這附近……"
90001060-66 = "有很多正在運作的機器。"
90001060-67 = "嗯。有的在挖土，有的在用鑽頭破壞東西後再把東西載走……看起來好像很忙呢。"
90001060-68 = "那個是類似探鑽機的東西吧？"
90001060-69 = "探鑽……難道在地面挖洞是為了探測資源？#n既然如此，難道這裡也在開採某種資源嗎？"
90001060-70 = "火山地帶的確有很多礦石的沉積物。"
90001060-71 = "不僅會產出銅礦，在活火山附近也能開採到大量的硫磺。#n但話雖如此──"
90001060-82 = "會長！？"
90001060-83 = "是無線電干擾！季？"
90001060-85 = "是，陽葵部長。#n已確認剛才有道強烈的干擾電波被傳送到這整個區域內。並且……？"
90001060-90 = "……Abi-Eshuh的狀態似乎有些異常。#n我想應該是因為干擾電波，導致所有電子裝備都超出了負荷。"
90001060-91 = "別擔心。這種時候通常只要敲一敲就好了。"
90001060-93 = "英，英美！？"
90001060-100 = "似乎沒有效果呢。"
90001060-101 = "真奇怪……難道是角度不對嗎？"
90001060-102 = "[s]「我覺得應該不是那個問題……」"
90001060-103 = "是嗎……"
90001060-104 = "沒辦法，看來只能暫時使用一般模式了。"
90001060-105 = "莉央會長用AMAS為我們準備了一輛臨時移動拖車。#n只要將Abi-Eshuh密封進拖車裡……"
90001060-106 = "……怎麼會。拖車似乎也受到電波干擾的影響而無法啟動。#n這樣一來，剩下的方法……"
90001060-107 = "就只有手動解除Abi-Eshuh了嗎……"
90001060-109 = "我也來幫忙。"
90001060-110 = "謝謝你，英美。"
90001060-116 = "請稍等。我現在正設法用可以運作的裝備……"
90001060-117 = "因為這道干擾電波的威力遠遠超過一般電波，因此只要反過來利用它……#n就算只用最基礎的裝置……"
90001060-118 = "找到了！干擾電波是從那個方向發射出來的！"
90001060-128 = "那裡看起來好像有個奇怪的設施……是雷達基地嗎？"
90001060-129 = "還是那就是發送這道干擾電波的設施？"
90001060-130 = "……無論如何，我們得想辦法解決無線電干擾的問題，這點是無庸置疑的。"
90001060-131 = "為什麼這麼說？"
90001060-132 = "因為那會導致我們無法使用Abi-Eshuh。#n這在戰力方面將是極大的損失。"
90001060-133 = "而且……雖然我也很不想承認……"
90001060-134 = "……"
90001060-135 = "嗯，如果沒有莉央的AMAS部隊和導航，在這片區域待太久會相當危險。"
90001060-136 = "這是我考量效率所做出的決定。#n這點我得先跟你們說清楚，都聽懂了嗎？"
90001060-137 = "（只要一牽扯到和會長有關的事，就變得一點都不坦率……）"
90001060-138 = "我知道了，英美。你現在的表情是在說──#n「只要一牽扯到和莉央大人有關的事，陽葵部長就會變得一點都不坦率」對吧？"
90001060-140 = "！？！？"
90001060-142 = "原來我那麼容易被人看穿嗎？"
90001060-143 = "沒有。我只是隨口說說而已。"
90001060-144 = "我就知道……"
90001060-145 = "[s]「總之我們就先去那裡看看吧。」"
90001060-146 = "就這麼做吧，老師。#n畢竟目前所有的情況與線索都在指引我們前往那裡。"
90001060-147 = "由我打頭陣吧。"
90001060-148 = "部長跟老師都要記得注意安全哦。"

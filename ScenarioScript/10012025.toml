[translation]
10012025-3 = "We've taken too much damage! Retreat!"
10012025-7 = "How could we have lost?! There's only two of them!"
10012025-8 = "This is a monumental embarrassment to Helmet Gangsters everywhere..."
10012025-9 = "We know how wide the sea is! There will always be enemies we can't defeat!"
10012025-10 = "But...I won't give up... Not like this..."
10012025-14 = "Ouch! Ouch! Owww!"
10012025-15 = "That hurts, you idiots! Stop it! Ugh!"
10012025-16 = "I'll never forget this humiliation!"
10012025-17 = "The next time I see you, be ready to pay!"
10012025-22 = "What... What in the world was that?"
10012025-23 = "They're the ones who barge in guns blazing with no good reason, and then they just run away like dumb villains from a third-rate movie?"
10012025-24 = "And after I worked so hard to get this room spick and span."
10012025-25 = "How are we supposed to explain this to the others?"
10012025-29 = "Hey! We're back! ☆"
10012025-30 = "Seriously? Right now?!"
10012025-31 = "Their timing is always impeccable."
10012025-36 = "We've safely retrieved all the equipment. The containers were a little damaged, but the supplies are fine."
10012025-37 = "I hope you got a lot of cleaning..."
10012025-39 = "...?"
10012025-46 = "W-Wait! Don't say a word!"
10012025-47 = "I know what this looks like! But let me explain, okay?"
10012025-48 = "We finished cleaning! We really did! Even Hoshino worked her butt off!"
10012025-50 = "Um... Serika..."
10012025-51 = "Really, don't worry about it. It was a lot to ask just two people to clean."
10012025-52 = "It'll be okay. We'll all clean together."
10012025-53 = "I'm not lying! Sensei was even helping us!"
10012025-54 = "It wasn't very nice of us to ask you to clean up all by yourself, Serika."
10012025-55 = "I completely understand! Everything is easier as a team, anyway."
10012025-57 = "I'M TELLING THE TRUTH!!!"
10012025-59 = "I finally explained everything that happened, and then we all worked together to clean up the mess."
10012025-61 = "Ugh, my shoulders... They're all scratched up..."
10012025-62 = "What do we do now, Captain?"
10012025-63 = "Maybe we should look for another island..."
10012025-65 = "What did you just say to me?"
10012025-67 = "Eek... N-Nothing..."
10012025-68 = "But what can we do? There's no way we can beat them."
10012025-69 = "And what if the rest of their crew is just as crazy-strong?"
10012025-71 = "...Tsk."
10012025-72 = "I'm not happy about this but..."
10012025-74 = "...We'll have to request reinforcements."

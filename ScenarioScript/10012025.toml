[translation]
10012025-3 = "這，這些傢伙也太強了吧！全體撤退！！"
10012025-7 = "不敢相信我們居然輸了！對方明明才兩個人而已！？"
10012025-8 = "可惡……我們嘩啦嘩啦頭盔團竟然會被打敗……！"
10012025-9 = "是強敵呢……！"
10012025-10 = "但是不能就這樣放棄……！！"
10012025-14 = "啊，啊痛痛痛！"
10012025-15 = "痛，好痛！就說痛了！"
10012025-16 = "可惡──！給我記住！"
10012025-17 = "別以為我們會就這樣放棄……！！"
10012025-22 = "那些傢伙……究竟是誰……？"
10012025-23 = "大鬧一番後就這樣跑了……"
10012025-24 = "……啊～啊。好不容易整理好的，又回到原點了。"
10012025-25 = "要怎麼跟大家解釋呢……"
10012025-29 = "我們回來囉～☆"
10012025-30 = "……前輩們！？"
10012025-31 = "時機正好呢。"
10012025-36 = "備品全都搬出來了。沒什麼東西損毀，平安無事唷。"
10012025-37 = "茜香醬這邊，整理得還順利……"
10012025-39 = "……？"
10012025-46 = "等，等一下！"
10012025-47 = "我們已經打掃完了，不，是原本打掃完了！和老師跟前輩一起做的！"
10012025-48 = "雖然已經打掃完了，但變成這樣是有理由的……！"
10012025-50 = "茜香醬……"
10012025-51 = "兩個人整理果然還是太大了呢……沒關係的唷。"
10012025-52 = "……嗯，現在開始大家分頭進行就能馬上結束了。"
10012025-53 = "是，是真的啦！？並不是因為偷懶而沒有打掃……！"
10012025-54 = "嘛嘛，現在開始一起整理就好了呀。"
10012025-55 = "大家一起加油吧～☆"
10012025-57 = "真的啦──！！"
10012025-59 = "（那之後，慢慢地說明了打掃結束後到剛才所發生的事）"
10012025-61 = "嗚嗚，肩膀好痛……這不是都紅掉了嗎……"
10012025-62 = "果然這樣下去很勉強……怎麼辦啊隊長……？"
10012025-63 = "要回去了嗎……？還是去找看看其他的島……？"
10012025-65 = "……你剛才說什麼？"
10012025-67 = "噫，噫……什，什麼都……"
10012025-68 = "沒辦法嘛……！現在的我們根本贏不了呀。"
10012025-69 = "而且那些傢伙，好像還有其他夥伴……"
10012025-71 = "……也對呢。"
10012025-72 = "……既然如此，雖然我不怎麼喜歡……"
10012025-74 = "……我們也請求增援吧。"

[translation]
10012025-3 = "อะ... อะไรเนี่ย! สู้ไม่ได้เลย! ล่าถอย! ทุกคนถอยก่อน!!"
10012025-7 = "เป็นไปไม่ได้!!  นี่พวกเราแพ้เหรอ!? มีกันแค่สองคนเอง ทำไมถึงเก่งเบอร์นั้น!?"
10012025-8 = "อึก... เป็นไปได้ยังไง...! แก๊งหมวกกันน็อกป๋อมแป๋มแพ้ให้กับเด็กพวกนั้นเหรอ...!"
10012025-9 = "นี่สินะที่เขาบอกว่าทะเลนั้นแสนกว้างใหญ่และเต็มไปด้วยศัตรูที่แข็งแกร่ง...!?"
10012025-10 = "แต่ยังไงเราก็จะมายอมแพ้แบบนี้ไม่ได้...!!"
10012025-14 = "ย้ากกกกกก!"
10012025-15 = "โอ๊ย แสบนะ! บอกว่าแสบไง!!  พอได้แล้ว!!  ไม่เห็นหรือไงว่าเจ็บ!!"
10012025-16 = "โธ่เว้ย... ฝากไว้ก่อนเถอะ!"
10012025-17 = "อย่าคิดว่าพวกเราจะยอมแพ้ให้แค่นี้นะ...!!"
10012025-22 = "เจ้าพวกนั้น... คือใครกันนะ...?"
10012025-23 = "จู่ๆ ก็บุกเข้ามาหาเรื่องตามอำเภอใจ แล้วก็พูดจาเหมือนวายร้ายแล้วหนีไป..."
10012025-24 = "อะไรกัน... อุตส่าห์ตั้งใจเก็บกวาดของพวกนี้แท้ๆ ดันมาเละอีกรอบซะได้"
10012025-25 = "ถ้าคนอื่นมาถึง จะต้องเริ่มอธิบายตั้งแต่ตรงไหนดี..."
10012025-29 = "ยะฮู่ว~ พวกเรากลับมาแล้วค่า~☆"
10012025-30 = "......!?  รุ่นพี่!?"
10012025-31 = "จังหวะนรกจริงๆ เลยแฮะ..."
10012025-36 = "อืม ขนพวกอุปกรณ์มาหมดแล้ว ภายนอกกล่องเสียหายนิดหน่อย แต่ของข้างในยังดีอยู่"
10012025-37 = "เรื่องทำความสะอาดเป็นยังไงกันบ้างคะ?"
10012025-39 = "......?"
10012025-46 = "ดะ... เดี๋ยว! เดี๋ยวก่อน!"
10012025-47 = "ฉันรู้ว่ารุ่นพี่คิดอะไรกันอยู่ แต่หยุดฟังก่อนนะ! พวกเราอธิบายได้...!"
10012025-48 = "เราทำความสะอาดไปแล้ว! ทำไปแล้วจริงๆ นะ!! รุ่นพี่โฮชิโนะและคุณครูก็ช่วยกัน...!"
10012025-50 = "อืม.... เซริกะจัง..."
10012025-51 = "ไม่เป็นไรหรอก ฉันเข้าใจ ก็ที่นี่มันกว้างเกินกว่าที่คนสองคนจะทำความสะอาดหมดนี่..."
10012025-52 = "อืม เรามาช่วยกันทำก็ได้"
10012025-53 = "ไม่นะ ไม่สิ! ฉันพูดจริงๆ นะ! ไม่ได้โกหกเลย! รุ่นพี่โฮชิโนะเป็นคนทำความสะอาดไปแล้วนะ...!"
10012025-54 = "เอาละๆ ไม่เป็นไรหรอกค่ะ ยังไงพวกเราก็ไม่สบายใจอยู่แล้วค่ะที่ปล่อยให้เซริกะจังต้องเก็บกวาด#nคนเดียว"
10012025-55 = "จากนี้เราแค่มาช่วยกันทำก็ได้นี่คะ~ เอาเป็นว่ามาทำด้วยกันนะคะ~"
10012025-57 = "ทำไมถึงไม่มีใครเชื่อกันเลยล่ะะะ!!"
10012025-59 = "(หลังจากทำความสะอาดเสร็จ คุณครูก็ช่วยอธิบายเกี่ยวกับสิ่งที่เกิดขึ้น)"
10012025-61 = "โอ๊ย... ไหล่ฉัน... โดนยิงจนระบมไปหมดเลย..."
10012025-62 = "แบบนี้คงได้แพ้ราบคาบอีกแหงม... จะทำยังไงดีล่ะ...? หัวหน้า..."
10012025-63 = "เรากลับกันเลยไหม? หรือว่าไปหาเกาะอื่นแทน...?"
10012025-65 = "เมื่อกี๊แกพูดว่าอะไรนะ...?"
10012025-67 = "ฮะ... เฮือก! ไม่ได้พูดอะไรค่ะ..."
10012025-68 = "แต่จะให้ทำยังไงได้ล่ะคะ...! ลำพังพวกเราตอนนี้ไม่น่าจะเอาชนะได้เลยนะ"
10012025-69 = "แถมดูจากสถานการณ์แล้ว พวกนั้นน่าจะพาคนกันมาเยอะกว่าที่เห็นด้วย..."
10012025-71 = "อืม... ถ้างั้น..."
10012025-72 = "ก็คงไม่มีทางเลือกอื่น ถึงฉันจะไม่อยากเลือกวิธีนี้เท่าไร..."
10012025-74 = "...คงต้องเรียกกองกำลังเสริมมาแล้วละนะ"

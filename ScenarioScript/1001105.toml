[translation]
1001105-1 = "I'm Not Old!"
1001105-2 = "Shanhaijing Classroom"
1001105-4 = "*sigh* I'm always reminded of my age, no matter how much I try to keep my mind off of it."
1001105-5 = "I need to snap out of it..."
1001105-6 = "[s] \"Is something wrong?\""
1001105-7 = "Oh, it's you, Sensei."
1001105-8 = "No, it's nothing. ...There's just something on my mind."
1001105-9 = "I was scolding Kokona for her eating habits when she said I wouldn't understand because I'm too old."
1001105-10 = "I know she didn't really mean any harm by it..."
1001105-11 = "...but I can't deny that Kokona and I have been butting heads more often as of late."
1001105-12 = "Um, this may be awkward to ask...but do you think I'm too old as well?"
1001105-13 = "I suppose that's a silly question for me to ask an adult. Still, I've always been told I look and act more mature than other people my age."
1001105-14 = "I can't help but think if I was a little younger and more childlike...perhaps I could better empathize with Kokona."
1001105-15 = "[s] \"I think that's the mark of being a good sister, Shun.\""
1001105-16 = "Am I? I feel as though all I do is get on Kokona's nerves with my nagging..."
1001105-17 = "Naturally, I know Kokona doesn't hate me and isn't trying to hurt me, but having to be the older sister can be very challenging."
1001105-18 = "Sometimes I wonder what it would be like to be an ordinary student and not a Plum Blossom Garden instructor."
1001105-19 = "How it would be to spend my time with peers who weren't concerned about my age..."
1001105-20 = "[s] \"You still deserve the care that all students do.\""
1001105-21 = "C-Care... I've never considered being taken care of..."
1001105-22 = "It does make me happy to hear you say that, though. Heehee..."
1001105-25 = "Oh, dear. Where does the time go? The Plum Blossom children must be waiting."
1001105-26 = "Heehee. I also have students to take care of, just like you."
1001105-28 = "...But when I get back, I may just take you up on your offer."

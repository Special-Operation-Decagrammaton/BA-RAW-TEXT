[translation]
1001105-1 = "ยังไม่แก่สักหน่อย!"
1001105-2 = "ห้องเรียน ซานไห่จิง"
1001105-4 = "เฮ้อ... ทั้งที่พยายามไม่คิดเรื่องอายุแล้วแท้ๆ แต่ก็อดคิดมากไม่ได้สักที"
1001105-5 = "ถ้าไม่รีบสลัดเรื่องนี้ออกจากหัวให้ได้ละก็..."
1001105-6 = "[s] \"ไม่สบายตรงไหนรึเปล่า?\""
1001105-7 = "อ๊ะ มาแล้วเหรอคะคุณครู"
1001105-8 = "ไม่มีอะไรหรอกค่ะ ฉันก็แค่คิดเรื่องบางอย่างอยู่เท่านั้นค่ะ"
1001105-9 = "เมื่อเช้าฉันดุโคโคน่าไปเรื่องนิสัยการกินอาหารของเธอ แต่จู่ๆ เธอก็บอกว่าฉันไม่เข้าใจเธอ เพราะ#nว่าฉันอายุมากเกินไป..."
1001105-10 = "ถึงเธอจะไม่ได้ตั้งใจพูดแบบนั้นก็เถอะค่ะ..."
1001105-11 = "แต่ช่วงนี้ฉันรู้สึกเหมือนว่าจะทะเลาะกับโคโคน่าบ่อยขึ้นเลยค่ะ"
1001105-12 = "คือ... มันอาจจะฟังแปลกๆ อยู่บ้าง... คุณครูคิดว่าฉันดูอายุเยอะรึเปล่าคะ?"
1001105-13 = "ฮุฮุ มันอาจจะน่าอายนิดหน่อยที่มาถามคุณครูแบบนี้... แต่ฉันมักได้ยินคนอื่นพูดบ่อยๆ ค่ะ#nว่าฉันดูโตกว่าเพื่อนๆ ในรุ่นเดียวกัน"
1001105-14 = "เพราะงั้นฉันเลยคิดว่าถ้าฉันดูเด็กกว่านี้สักหน่อย... บางทีฉันอาจเข้าใจความรู้สึกของโคโคน่าได้#nมากขึ้นค่ะ"
1001105-15 = "[s] \"ชุนเป็นพี่สาวที่ดีจังเลยนะ ดูเป็นห่วงโคโคน่ามากๆ เลย\""
1001105-16 = "อย่างนั้นเหรอคะ? ฉันมักจะดุโคโคน่าอยู่บ่อยๆ เธอเลยค่อนข้างจะรำคาญฉันค่ะ...."
1001105-17 = "ถึงฉันรู้ดีว่าโคโคน่าไม่ได้รำคาญฉันจริงๆ... แต่การเป็นพี่สาวนี่มันยากจริงๆ เลยนะคะ"
1001105-18 = "บางครั้งฉันก็นึกสงสัยนะคะว่าจะเป็นยังไง ถ้าฉันเป็นแค่นักเรียนธรรมดาไม่ใช่ผู้ฝึกสอนแบบนี้..."
1001105-19 = "จะเป็นยังไง ถ้าได้ใช้เวลากับเพื่อนๆ รุ่นเดียวกันโดยที่ไม่ได้คำนึงถึงอายุ..."
1001105-20 = "[s] \"สำหรับครู ชุนเองก็เป็นนักเรียนคนสำคัญที่ต้องดูแลเหมือนกันนะ\""
1001105-21 = "ดะ...ดูแลงั้นเหรอคะ ฉันไม่เคยคิดถึงเรื่องนั้นมาก่อนเลย..."
1001105-22 = "ฉันดีใจนะคะที่คุณครูคิดแบบนั้น ฮุฮุ...."
1001105-25 = "ตายจริง เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย พวกเด็กๆ น่าจะกำลังรออยู่แล้วละค่ะ"
1001105-26 = "ฮุฮุ ฉันเองก็มีเด็กๆ ที่ต้องดูแล เหมือนที่คุณครูดูแลฉันยังไงล่ะคะ"
1001105-28 = "แต่ถ้าฉันกลับมาแล้ว.... คุณครูจะช่วยดูแลฉันหน่อยได้ไหมคะ?"

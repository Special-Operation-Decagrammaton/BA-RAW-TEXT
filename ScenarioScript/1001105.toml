[translation]
1001105-1 = "還沒到那把年紀！"
1001105-2 = "山海經教室"
1001105-4 = "呼……真的上年紀了嗎……#n就算不願意去想……每到這種時候，這種念頭總是揮之不去。"
1001105-5 = "得快點打起精神才行……"
1001105-6 = "[s] 「有哪裡不舒服嗎？」"
1001105-7 = "哎呀。你好，老師。"
1001105-8 = "沒什麼。 #n……只是有件事讓我很在意。"
1001105-9 = "上午我向心菜叮嚀了一下他的飲食習慣，#n結果他對我說：「姊姊已經老了，請先別管別人，管好自己吧。」"
1001105-10 = "當然，我相信那孩子也不是真心說那些話的……"
1001105-11 = "只是總覺得最近常常跟心菜起爭執。"
1001105-12 = "那個，雖然有點奇怪……不過老師覺得我看起來年紀很大嗎？"
1001105-13 = "呵呵，老師已經是大人了，問你這種問題或許很可笑吧…… #n但我經常聽到別人說我看起來比同齡的孩子更成熟。"
1001105-14 = "因此我心想，如果我長得再年幼一點、更像小孩一點……#n或許就比較能體會心菜的心情了……"
1001105-15 = "[s]「居然那麼擔心心菜，旬真是溫柔的姊姊。」"
1001105-16 = "是嗎？我每天都惹心菜不開心，說我成天只會嘮叨……"
1001105-17 = "當然，心菜一定也知道我不是故意的，果然姊姊的立場真是不容易呢。"
1001105-18 = "偶爾我也會思考，如果我不是梅花園的教官，只是一個平凡學生的話……#n會過著怎麼樣的生活。"
1001105-19 = "不用在意年紀，和同輩在嬉鬧中度過每一天……"
1001105-20 = "[s] 「對我來說，旬也一樣是我的寶貴學生。」"
1001105-21 = "是，是這樣沒錯……但聽老師這麼一說還挺害臊的……"
1001105-22 = "不過，知道老師是這麼想的，就覺得好開心。呵呵……"
1001105-25 = "哎呀，已經這個時間了。梅花園的孩子們應該已經在等了。"
1001105-26 = "呵呵，就像老師願意照顧我一樣，我也有必須要照顧的孩子們。"
1001105-28 = "……不過等我回來之後，也請讓我盡情撒嬌哦？"

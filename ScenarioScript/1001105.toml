[translation]
1001105-1 = "#title;나이 들지 않았는 걸!"
1001105-2 = "#place;산해경 교실"
1001105-3 = "1;슌;06\n#1;h\n#1;em;[...]\n#wait;2500\n#1;a"
1001105-4 = "1;슌;06;후우…… 나이, 나이…… 의식하지 않으려고 해도 이렇게 떠올려버리고 마네요."
1001105-5 = "1;슌;06;빨리 기운을 차리지 않으면……"
1001105-6 = "[s] \"어디 안 좋은 곳이라도 있어?\""
1001105-7 = "1;슌;02;어머, 오셨었군요. 선생님.\n#1;em;[반응]"
1001105-8 = "1;슌;01;아무것도 아니랍니다. #n……그저 신경 쓰이는 일이 하나 있어서요.\n#1;m3"
1001105-9 = "#1;hide\n3;슌;06;오전에 코코나에게 식습관 때문에 잔소리를 하다가 언니는 나이가 많으니 자신을 이해해주지 못한다는 말을 들었거든요."
1001105-10 = "3;슌;06;물론 그 아이도 진심으로 한 이야기는 아니겠지만……."
1001105-11 = "3;슌;06;어쩐지 요새 코코나와 싸우는 일이 잦아진 것 같아서요.\n#3;em;[속상함]"
1001105-12 = "3;슌;02;저, 이상하게 들릴지도 모르겠지만…… 선생님이 보시기에는 제 나이가 많아 보이나요?\n#3;em;[?]"
1001105-13 = "3;슌;01;후후, 어른인 선생님께 이런 질문을 드리는 것도 우습지만…… #n저는 제 나이 또래 아이들보다 좀 더 원숙해 보인다는 말을 자주 듣곤 해서요."
1001105-14 = "3;슌;06;그래서 만약 제가 좀 더 어렸더라면, 어린아이 같았더라면…… 코코나의 기분을 더 잘 이해할 수 있지 않았을까, 그런 생각이 들어서……\n#3;em;[...]"
1001105-15 = "[s] \"코코나를 그렇게 걱정해 주다니. 슌은 좋은 언니네.\""
1001105-16 = "3;슌;06;그런가요? 코코나에게는 잔소리가 많다고 매일 미움만 받고 있는데……"
1001105-17 = "3;슌;06;물론 코코나도 제가 고의로 그러는 게 아니라는 걸 알고 있겠지만, 역시 언니란 힘든 존재네요."
1001105-18 = "3;슌;01;가끔은 저도 매화원의 교관이 아니라 평범한 학생으로 살았으면 어땠을까— 고민이 될 때도 있어요."
1001105-19 = "3;슌;99;나이에 연연하지 않고 또래와 어울리며 살아가는……\n#3;em;[...]"
1001105-20 = "[s] \"내게는 슌도 다른 아이들처럼 보살펴야 할 소중한 학생이야.\""
1001105-21 = "3;슌;04;보, 보살핌을 받는다니…… 그런 생각은 해 본적이 없어서……\n#3;em;[///]\n#3;stiff"
1001105-22 = "3;슌;03;하지만 선생님이 그렇게 생각해 주신다니 기쁘네요. 후후……\n#3;em;[반짝]"
1001105-23 = "3;슌;01\n#3;h\n#wait;1500"
1001105-24 = "3;슌;02\n#3;h\n#3;em;[반응]\n#wait;1500"
1001105-25 = "3;슌;02;어머나, 벌써 시간이 이렇게 되었네요. 매화원의 아이들이 기다리고 있겠어요.\n#3;hophop"
1001105-26 = "3;슌;03;후후, 선생님이 저를 보살펴 주시는 것처럼 제게도 보살펴야 하는 아이들이 있으니까요."
1001105-27 = "3;슌;03\n#3;d\n#wait;1000"
1001105-28 = "3;슌;01;……대신 돌아오면 저도 실컷 어리광 부리게 해 주셔야 해요?\n#3;em;[///]\n#3;closeup"

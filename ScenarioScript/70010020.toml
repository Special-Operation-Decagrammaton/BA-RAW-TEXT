[translation]
70010020-1 = "Ending Manual Transmission 2"
70010020-2 = "Hm, what do I want to ask next?"
70010020-3 = "(They've been doing great until now, but her incessant questioning must be wearing them down at this point.)"
70010020-5 = "Inside the Box"
70010020-6 = "Exactly HOW many more questions does she intend on asking?"
70010020-7 = "Thank goodness for Minori's extensive knowledge, but it's endless!"
70010020-8 = "Mine?"
70010020-9 = "A lot of it has been guess work, to be honest."
70010020-10 = "Seriously?! What if she realizes?"
70010020-11 = "I see your concern. Answer me this: just what is a \"question\"?"
70010020-13 = "A request for information that the inquirer doesn't have."
70010020-14 = "...At its core."
70010020-15 = "Exactly! Someone asks a question because there's something they don't know."
70010020-16 = "So how would they know if the answer they receive is correct or not?"
70010020-17 = "That was your reasoning..."
70010020-18 = "Ah, like trying to answer when people ask, \"Meruri, what is the meaning of this scene?\""
70010020-19 = "No, I don't think THAT question is the same thing, Meru..."
70010020-21 = "As long as we don't contradict anything she believes to be true, she won't catch on."
70010020-23 = "Okay. I'm out of questions..."
70010020-25 = "Excellent! I'm thrilled you've found it to your liking! I will go ahead and shut down the power immediately, so we can save it for the big day!"
70010020-27 = "Ah, that's right! I wanted to ask it to draw me something."
70010020-29 = "Pardon?!"
70010020-31 = "Can it not? But the Millennium thingie could..."
70010020-32 = "Pwah! Of course it can! It's made with Red Winter technology! I want...a majestic portrait of myself!"
70010020-33 = "\"Draw a majestic portrait of me\"...?"
70010020-34 = "Wh-What is this?! The only thing I know how to draw is a blueprint!"
70010020-35 = "Hm..."
70010020-41 = "Eh...?"
70010020-42 = "H-Huh? Why is everyone looking at me? You want me to draw it?"
70010020-43 = "It seems you are our only hope. It is time for the great Meruri to take up her pen."
70010020-44 = "You're not making the deadline anyway... I haven't seen you draw a single line."
70010020-45 = "It's time for the great Meru to take the stage for once. Heh heh heh."
70010020-47 = "I won't do it!!"
70010020-48 = "Do you think if you just demand art from an artist, they'll wave a magic wand and meet your every whim and need?"
70010020-49 = "Art isn't free! Regardless of the funds, that kind of brutish art is undignified!"
70010020-51 = "Meru!! You have to help us get out of this! You're the one who wanted new reference materials! I didn't even want to be here!"
70010020-52 = "I don't care! Not one bit! Just tell her that feature is unavailable!"
70010020-53 = "Why isn't it responding? What's going on?"
70010020-55 = "W-Well, it wasn't originally designed with that capability. But if you give it a moment..."
70010020-57 = "That means it's worse than the Millennium one."
70010020-58 = "Then it's of no use to me..."
70010020-60 = "Should I just throw it in the furnace? Recycle the metals from this useless thing, at least?"
70010020-61 = "Pardon?!"
70010020-63 = "The Publishing Department put in a supply request for more printing plates, didn't they? You can use the metal..."
70010020-64 = "I guess I'll wait a little longer before I throw the whole thing in the furnace to melt into a pile of indistinguishable, forgotten goop."
70010020-68 = "Meruri!! O, great Meruri!!"
70010020-69 = "They say writers live on through their words but to think it would all end in me literally being turned into words on a printing plate... Heh. Hee. Heh..."
70010020-70 = "Even Yakumo loses her composure in the face of utter destruction."
70010020-72 = "All right, all right! Fine! I get it already! Minori, the pen! Now!"
70010020-73 = "It's fine. A dignified end befits the final chapter of a revolutionary."
70010020-74 = "It is an honor to be with you in our final stand, where Comrade Meru remains unyielding to the end."
70010020-75 = "Stop lamenting our imminent deaths and just give me the pen!"
70010020-78 = "Oh, there it is!"
70010020-82 = "Woah!! That's amazing!! It's a masterpiece!"
70010020-84 = "(Himeki Meru... I'll make sure to pay a fair price for your art.)"
70010020-85 = "(Thank you...so much...!)"
70010020-86 = "But the more I look at it... I feel like it's just not as good as the real thing. It's obvious this was done by a computer."
70010020-90 = "I guess those are the limitations of tech—"
70010020-96 = "*SLAM*!!! *SLAM!!!"
70010020-97 = "What's that?"
70010020-98 = "It must be the sound of it reading a disk, President!"
70010020-100 = "Let me go!! I'm going to give her a human-made punch to the face!!"
70010020-102 = "Calm down! She's going to hear us!"
70010020-103 = "Consider it a compliment!! That means your lines are as clean as a machine's!"
70010020-105 = "Ever been smacked with a computer, HUH?!!"
70010020-107 = "President, it's time for the new pudding tasting event."
70010020-108 = "Oh, I completely forgot about that. I guess I was having too much fun! Thank you, Tomoe!"
70010020-109 = "Marina, excellent work. You have a talent for making the impossible possible!"
70010020-110 = "I am officially nominating you as a candidate for the Red Winter Federal Hero!"
70010020-112 = "Th-Thank you, President!"
70010020-113 = "Oh, right. Before I leave... I must ask the supercomputer a very important question related to the future of Red Winter."
70010020-114 = "This is top-secret stuff, so everyone, leave!"
70010020-115 = "C-Clear the room! Now!"
70010020-116 = "Yes! Understood!"
70010020-126 = "Hm..."
70010020-127 = "Heh, excellent. That's right, just drop your most hidden secrets right into the lap of the Publishing Department."
70010020-128 = "You have my deepest gratitude. Heh heh heh."
70010020-129 = "This will become another cause to rally the revolution!"
70010020-131 = "It's so over for us! If she ever finds out about this, we'll be purged three times over!"
70010020-135 = "It's coming."
70010020-137 = "Let's see..."
70010020-138 = "I want my favorite Comrade to visit Red Winter more often."
70010020-142 = "And I want Comrade to play with me more. How can I make this happen?"
70010020-143 = "Oh..."
70010020-145 = "Oh, my, oh my."
70010020-146 = "This is...nine out of ten. Oho..."
70010020-148 = "This is seriously top-secret! Forget three times, we're going to be purged nine times over if we get caught!"
70010020-149 = "Now THIS was the material I was looking for, but it's almost too good!"
70010020-150 = "Hey, we need an answer! Come up with something, anything!"
70010020-152 = "Just how are we meant to respond to such a sincere, naive letter?"
70010020-153 = "Whatever it takes! It doesn't matter who it is, we just need something!"
70010020-156 = "There we go!"
70010020-157 = "Lemme see!"
70010020-159 = "Great question, Comrade! You just have to do the following, and make sure to be consistent!"
70010020-160 = "Introduce a two-day workweek, triple the Publishing Department budget, and allocate funds for fan fiction activities."
70010020-161 = "As long as you do those things, Sensei will visit more often!"
70010020-164 = "Hey, that's so easy!!"
70010020-165 = "Thank you, Supercomputer!"
70010020-171 = "Whew... I'm surprised that worked..."
70010020-177 = "I will conduct the final security checks. You may head home for the night."
70010020-178 = "Understood! Thank you for your hard work and dedication!"
70010020-186 = "Everyone's gone. You can come out now."
70010020-187 = "Gah! Fresh air!! "
70010020-189 = "Takane's asleep. Considering the hour, I can hardly blame her."
70010020-190 = "I can't believe we didn't get caught."
70010020-192 = "From the bottom of my heart, I apologize for all the trouble! I will pay each of you back twofold! On my honor!"
70010020-193 = "I hope I can count on you tomorrow, when the Millennium guests arrive, as well."
70010020-194 = "There is no need. Because tonight, the revolution rises!"
70010020-195 = "Yes! The revolution rises!"
70010020-199 = "...Excuse me?"
70010020-200 = "Comrade Marina, the last piece of the puzzle to save our oppressed comrades is finally ours."
70010020-201 = "To cut the chain of oppression, we must take down President Cherino, who is the root of the rot!"
70010020-202 = "What?! What are you even saying?!"
70010020-203 = "Thank you, Comrade! We were the viruses you installed into this \"computer\" and delivered into the heart of the Red Winter Office!"
70010020-204 = "The revolution begins from the inside out!"
70010020-206 = "For freedom, Comrade Marina!"
70010020-207 = "Wait, that's not—!"
70010020-214 = "Forward! FOR FREEDOOOMMM!!"
70010020-219 = "Somehow, we've ended up smack-dab in the middle of a mess."
70010020-220 = "Aaarrrggghhh!! My deadline!!"
70010020-224 = "Wh-What is this? I've woken up into a nightmare."
70010020-225 = "This rings a familiar bell... A virus... Delivered in the computer?"
70010020-227 = "Something...horse...?"
70010020-229 = "Finally! I never thought I'd see the day I'd be invited to visit Red Winter!"
70010020-230 = "The cutting-edge supercomputer of Red Winter... Oooh, I can't contain my excitement!"
70010020-231 = "I wonder what never-before-seen technology I'm about to witness! I'm so excite—"
70010020-239 = "The Supercomputer Revolutionaries, wipe out the Red Winter Office!!"
70010020-240 = "Win, with the power of the supercomputer!"
70010020-245 = "Supercomputer, how dare you betray me?!"
70010020-246 = "Purge! Purge!!"
70010020-259 = "Supercomputer...? Revolutionaries...? Betrayal...?"
70010020-263 = "I feel like we should go back and downgrade our supercomputer..."
70010020-264 = "Ending Manual Transmission"

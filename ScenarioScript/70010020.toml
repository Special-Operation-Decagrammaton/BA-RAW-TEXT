[translation]
70010020-1 = "จุดจบของระบบแมนนวล 2"
70010020-2 = "อืม ทีนี้จะถามอะไรดีนะ?"
70010020-3 = "(ก็ตอบเก่งอยู่หรอก แต่ทุกคนน่าจะเหนื่อยกันแล้วมั้ยนะ...)"
70010020-5 = "ในกล่อง"
70010020-6 = "ทำไมถึงมีคำถามเยอะขนาดนี้ล่ะคะ!"
70010020-7 = "ถึงคุณมิโนริจะเก่งจนรู้คำตอบของทุกข้อ แต่คำถามมันไม่จบไม่สิ้นเลยนะคะ!"
70010020-8 = "หืม? ฉันน่ะเหรอ?"
70010020-9 = "เมื่อกี้ตอนเจอคำถามที่ตอบไม่ได้ ฉันก็แค่ตอบมั่วๆ ไปเองนะ?"
70010020-10 = "แบบนั้นถ้าโดนจับได้ก็จบเห่น่ะสิ?!"
70010020-11 = "กังวลเรื่องนั้นกันสินะ ว่าแต่นิยามของ 'การถามคำถาม' มันคืออะไรล่ะ?"
70010020-13 = "'การถามใครบางคนด้วยความหวังว่าจะได้คำตอบที่ในสิ่งที่เราอยากรู้'"
70010020-14 = "ใช่มั้ยคะ?"
70010020-15 = "ใช่แล้วละ! มันคือการถาม 'ในสิ่งที่เราไม่รู้'"
70010020-16 = "งั้นก็หมายความว่า ไม่ว่าจะตอบอะไรไป คนถามก็ไม่รู้หรอกว่ามันถูกหรือผิด"
70010020-17 = "เพราะอย่างน้อยก็ได้คำตอบไปแล้วสินะคะ"
70010020-18 = "เหมือนคำตอบตอนถูกถามว่า 'เมรูริ ฉากนี้มันอะไรกันแน่คะ' หรือเปล่านะ? "
70010020-19 = "รุ่นพี่ ฉันว่านั่นไม่ใช่คำถามที่ถามเพราะอยากรู้จริงๆ นะคะ"
70010020-21 = "ไม่ต้องกังวลว่าจะถูกจับได้หรอก แค่ตอบไปเท่าที่รู้ก็พอ"
70010020-23 = "เราไม่มีอะไรจะถามแล้วละ..."
70010020-25 = "ดีใจจังเลยค่ะที่ผ่านการตรวจสอบจากท่านประธานแล้ว! งั้นฉันจะปิดเครื่องไว้ก่อนนะคะ จะได้ให้เครื่องพักเพื่อเตรียมพร้อมสำหรับวันพรุ่งนี้ค่ะ!"
70010020-27 = "อ้อ จริงสิ! ลองขอให้วาดรูปบ้างดีกว่า!"
70010020-29 = "คะ?!"
70010020-31 = "ไม่ได้เหรอ? คอมพิวเตอร์ของมิลเลเนียมยังวาดรูปให้ได้เลยนะ?"
70010020-32 = "ต้องทำได้อยู่แล้วละน่า! ไหนลองซิ <จงวาดภาพเหมือนของผู้มีเกียรติอย่างเราคนนี้!> อยากเห็นแล้วสิ!"
70010020-33 = "<จงวาดภาพเหมือนของผู้มีเกียรติอย่างเราคนนี้!> งั้นเหรอ...?"
70010020-34 = "ทะ... ทำยังไงดีล่ะ?! ฉันวาดเป็นแต่แบบแปลนก่อสร้างนะ"
70010020-35 = "อืม..."
70010020-41 = "หืม...?"
70010020-42 = "ทำไมถึงมองฉันล่ะ? จะให้ฉันวาดเหรอ?!"
70010020-43 = "ก็เราไม่มีทางเลือกอื่นแล้วนี่คะ ข้อนี้ต้องให้นักวาดผู้ยิ่งใหญ่อย่างคุณเมรูริรับผิดชอบถูกแล้วค่ะ"
70010020-44 = "รุ่นพี่ ยังไงก็ทำงานไม่ทันเดดไลน์อยู่แล้วนี่คะ ฉันไม่เห็นรุ่นพี่วาดอะไรสักหน้ามาตั้งแต่เมื่อกี้แล้วด้วย"
70010020-45 = "ถึงเวลาที่คุณเมรุ นักวาดผู้ยิ่งใหญ่จะได้แสดงฝีมือแล้วสินะคะ น่าตื่นเต้นจัง ฮิ ฮิ ฮิ"
70010020-47 = "ไม่เอาด้วยหรอก!!"
70010020-48 = "คิดว่าสั่งนักวาดการ์ตูนว่า 'วาดรูปให้หน่อย~' แล้วจะได้รูปออกมาทันทีเลยหรือไง?!"
70010020-49 = "รูปไม่ใช่ของที่จะวาดให้ฟรีๆ นะ และถึงจะตัดเรื่องเงินออกไป ก็วาดให้เสร็จในพริบตาเลยไม่ได้หรอก!"
70010020-51 = "รุ่นพี่!! แต่เราต้องผ่านวิกฤตนี้ไปให้ได้ก่อนสิคะ!! แล้วไหนบอกว่าเข้ามาด้วย เพราะอยากหาไอเดียไปวาดการ์ตูนไงคะ!"
70010020-52 = "ไม่เอา ไม่เอา ไม่วาดให้หรอก!! ตอบไปว่าวาดไม่เป็นแล้วกัน!"
70010020-53 = "ฮืม ไม่ได้คำตอบแฮะ ทำไมนะ?"
70010020-55 = "ฉันว่าน่าจะเป็นเพราะยังไม่มีฟังก์ชันวาดรูปนะคะ... หรือไม่ก็ช่วยรออีกหน่อย..."
70010020-57 = "ถ้าวาดรูปไม่ได้ งั้นก็ถือว่าประสิทธิภาพด้อยกว่าของมิลเลเนียมน่ะสิ?"
70010020-58 = "ไม่เห็นจะมีประโยชน์เลย..."
70010020-60 = "เอาไปโยนใส่เตาหลอมแล้วรีไซเคิลดีมั้ยนะ?"
70010020-61 = "คะ?!"
70010020-63 = "ได้ยินว่าชมรมสื่อสิ่งพิมพ์อยากได้โลหะสำหรับหล่อตัวเรียงพิมพ์อยู่พอดีไม่ใช่เหรอ งั้นใช้อันนี้ได้มั้ยนะ?"
70010020-64 = "เราจะรออีกหน่อยแล้วกัน ถ้าวาดให้ไม่ได้ก็เอาไปหลอมซะเลย!"
70010020-68 = "คุณเมรูริ!! คุณเมรูริคะ!!!"
70010020-69 = "ว่ากันว่าถึงเราตายไป แต่ผลงานจะยังคงอยู่ นี่คงถึงเวลาสร้างผลงานนั้นแล้วสินะคะ ฮะ... ฮะ... เฮือก..."
70010020-70 = "แม้แต่รุ่นพี่ยาคุโมะก็ยังเสียสติเมื่อเผชิญวิกฤตครั้งใหญ่สินะคะ..."
70010020-72 = "กะ... ก็ได้!! งั้นก็เอาปากกามา!! เร็วเข้าสิ คุณมิโนริ!!!"
70010020-73 = "ไม่เลวเลยนะ การจบสิ้นลงอย่างแน่วแน่ มันเหมาะกับช่วงสุดท้ายของชีวิตของนักปฏิวัติแล้วละ"
70010020-74 = "นับเป็นเกียรติอย่างยิ่งเลยละที่ฉันได้อยู่เคียงข้างสหายเมรุ ผู้ไม่เคยสั่นคลอนต่อความตั้งใจของตัวเอง แม้ในช่วงเวลาสุดท้ายของชีวิตแบบนี้"
70010020-75 = "อย่าเพิ่งยอมแพ้สิ!! รีบส่งปากกามาเร็วเข้า!!!!"
70010020-78 = "รูปออกมาแล้ว!"
70010020-82 = "ว้าว!!! ยอดเยี่ยมเลย!! วาดได้ดีเลยนี่?"
70010020-84 = "(ฮิเมกิ เมรุ... ไว้ฉันจะจ่ายค่าวาดรูปให้ทีหลังนะ)"
70010020-85 = "(ขอบใจนะ... ขอบใจมากเลย...!)"
70010020-86 = "ฮืม... แต่พอเป็นรูปที่วาดด้วยคอมพิวเตอร์ มันก็เลยไม่สมจริงเท่าไรนะ ดูออกเลยละว่าไม่ใช่ฝีมือมนุษย์"
70010020-90 = "แต่ก็นะ นี่คงเป็นขีดจำกัดของ..."
70010020-96 = "โครม!! คราม!!!"
70010020-97 = "อะไรน่ะ?"
70010020-98 = "น่าจะเป็นเสียงอ่านแผ่นดิสก์น่ะค่ะ ท่านประธาน!"
70010020-100 = "ปล่อยนะ!! ขอฉันออกไปใช้กำลังหน่อยเถอะ!!"
70010020-102 = "รุ่นพี่!! ใจเย็นๆ ก่อนค่ะ!!! เดี๋ยวข้างนอกได้ยินหมดนะคะ!!"
70010020-103 = "นั่นน่าจะเป็นคำชมนะคะ!! หมายความว่าลายเส้นของคุณเมรูริสวยเกินมนุษย์ยังไงล่ะคะ!!"
70010020-105 = "อยากโดนอัดด้วยคอมพิวเตอร์ดูมั้ยล่ะ?! ฮะ?!!!"
70010020-107 = "ท่านประธาน ถึงเวลาเริ่มชิมพุดดิ้งรสใหม่แล้วค่ะ"
70010020-108 = "แย่ละสิ! เราสนุกกับตรงนี้จนลืมเรื่องนั้นไปเลยแฮะ ขอบใจนะ โทโมเอะ!"
70010020-109 = "หัวหน้าคณะฯ มารินะ ทำได้ดีเลยละ เธอมีพรสวรรค์ในการทำเรื่องที่เป็นไปไม่ได้ ให้เป็นไปได้สินะ!"
70010020-110 = "แล้วเราจะเสนอชื่อรับเหรียญตรา <วีรสตรีแห่งสหภาพเรดวินเทอร์> ประจำเดือนนี้ให้!"
70010020-112 = "ขะ... ขอบคุณค่ะ! ท่านประธาน!"
70010020-113 = "จริงสิ ก่อนจะไปเราต้องถามคำถามสำคัญมากๆ เรื่องอนาคตของเรดวินเทอร์กับซูเปอร์คอมพิวเตอร์#nเครื่องนี้เสียก่อน"
70010020-114 = "เรื่องนี้ต้องเก็บเป็นความลับขั้นสุดยอด ทุกคนออกไปจากห้องนี้ให้หมด!"
70010020-115 = "ทะ... ทุกคนออกไปก่อน!"
70010020-116 = "ค่ะ รับทราบค่ะ!"
70010020-126 = "ฮืม..."
70010020-127 = "ตายจริง จะบอกสุดยอดความลับของเรดวินเทอร์ให้ชมรมสื่อสิ่งพิมพ์รู้งั้นเหรอ?"
70010020-128 = "ไม่รู้จะขอบคุณยังไงเลยนะคะ ฮิ ฮิ ฮิ"
70010020-129 = "ผู้กดขี่จะเปิดเผยข้อมูลลับสุดยอดงั้นเหรอ แบบนี้ก็จะยิ่งส่งเสริมให้เกิดการปฏิวัติน่ะสิ"
70010020-131 = "แต่ถ้าประธานเชริโน่รู้ว่าพวกเรารู้ความลับ เราได้จบชีวิตแน่เลย! ต้องโดนกวาดล้างอย่างน้อย 3 รอบแน่!"
70010020-135 = "อ๊ะ กระดาษคำถามเข้ามาแล้วค่ะ"
70010020-137 = "ไหนดูซิ..."
70010020-138 = "<เราอยากให้สหายมาที่เรดวินเทอร์บ่อยกว่านี้>"
70010020-142 = "<แล้วก็อยากให้มาเล่นสนุกกับเราด้วย เราควรทำยังไงดี?>"
70010020-143 = "อ่า..."
70010020-145 = "อ๊ะ อ๊ะ อ่า..."
70010020-146 = "ฉันให้ 9 คะแนนค่ะ อ่า..."
70010020-148 = "นี่มันความลับสุดยอดจริงๆ ด้วยนะคะ!! ถ้าโดนจับได้ว่าพวกเราแอบฟัง ต้องโดนกวาดล้างอย่างต่ำ 9 ครั้ง#nแน่เลยค่ะ!!"
70010020-149 = "ได้ไอเดียไปวาดการ์ตูนแล้ว แต่ไม่คิดเลยนะว่าจะเป็นเรื่องที่น่าสนใจแบบนี้น่ะ"
70010020-150 = "ตะ... แต่เราต้องตอบคำถามนี้ก่อนสิ!! ทุกคนมาระดมสมองกันเร็ว!!"
70010020-152 = "จะให้ตอบจดหมายแห่งความปรารถนานี้ว่าอะไรล่ะคะ?!"
70010020-153 = "ตอบว่าอะไรก็ได้ แต่ละคนคิดอะไรออกก็เขียนมาเร็ว!!"
70010020-156 = "ได้คำตอบแล้ว!"
70010020-157 = "ไหน! ขอดูหน่อย!"
70010020-159 = "<เป็นคำถามที่ดีเลยค่ะ สหาย! ถ้าอยากให้ความปรารถนาเป็นจริง ให้หมั่นทำเรื่องต่อไปนี้นะคะ!>"
70010020-160 = "<ใช้ระบบการทำงานสัปดาห์ละ 2 วัน เพิ่มงบชมรมสื่อสิ่งพิมพ์ 3 เท่า จัดงบสำหรับทำกิจกรรมชมรม>"
70010020-161 = "<ถ้าหมั่นทำตามรายการข้างต้น คุณครูจะมาที่นี่บ่อยขึ้นค่ะ!>"
70010020-164 = "อะไรกัน ก็แค่เรื่องง่ายๆ นี่นา!!"
70010020-165 = "ขอบใจนะ ซูเปอร์คอมพิวเตอร์!"
70010020-171 = "รอดแล้ว... โล่งอกไปทีที่ได้ผลนะ..."
70010020-177 = "ฉันจะปิดประตูสำนักงานบริหารเอง ทุกคนกลับไปก่อนเถอะ"
70010020-178 = "ค่ะ! รับทราบค่ะ! ขอบคุณที่ทำงานอย่างหนักค่ะ!"
70010020-186 = "ทุกคนกลับไปแล้วละ ออกมาได้แล้ว"
70010020-187 = "อ้ากกก!! ขออากาศบริสุทธิ์!! "
70010020-189 = "ทาคาเนะผล็อยหลับไปแล้วค่ะ เฮ้อ เราอยู่ในนี้กันถึงมืดค่ำเลยนะ"
70010020-190 = "พวกเรารอดมาได้โดยไม่โดนจับได้สินะคะ..."
70010020-192 = "ขอโทษนะทุกคน! ฉันจะชดใช้หนี้ครั้งนี้ให้นะ ขอสัญญาด้วยเกียรติของฉันเลย!"
70010020-193 = "พรุ่งนี้ช่วยตั้งใจทำงานจนกว่าแขกจากมิลเลเนียมจะกลับไปก็พอ!"
70010020-194 = "ไม่จำเป็นต้องทำแบบนั้นหรอก ก็เราจะก่อการปฏิวัติกันคืนนี้เลยยังไงล่ะ!"
70010020-195 = "ใช่! ก็เราจะก่อการปฏิวัติกันคืนนี้เลยยังไงล่ะ!"
70010020-199 = "ว่าไงนะ...?"
70010020-200 = "สหายมารินะ การช่วยเหลือสหายที่ถูกข่มเหงได้ข้อสรุปสุดท้ายแล้ว"
70010020-201 = "ถ้าจะยุติการกดขี่ข่มเหงนี้ เราต้องไปโค่นล้มประธานเชริโน่ที่เป็นตัวต้นเรื่อง"
70010020-202 = "ว่าไงนะ?! ทำไมเรื่องถึงกลายเป็นแบบนี้ไปได้ล่ะ?!"
70010020-203 = "และพอสหายติดตั้ง 'คอมพิวเตอร์' เครื่องนี้ไว้ในสำนักเลขาธิการ งานครั้งนี้ก็เลยราบรื่นขึ้น"
70010020-204 = "การปฏิวัติครั้งนี้จะไม่ได้มาจากข้างนอก แต่จะเริ่มออกจากข้างใน!"
70010020-206 = "ถึงเวลาแห่งการปลดปล่อยแล้ว สหายมารินะ!"
70010020-207 = "ไม่ได้นะ!!!"
70010020-214 = "ออกไปกันเลย!! เพื่อการปลดปล่อย! เพื่ออิสรภาพ!"
70010020-219 = "สุดท้ายก็ลงเอยแบบนี้สินะคะ เฮ้อ..."
70010020-220 = "อ๊ากก!! แล้วจะปั่นงานเสร็จมั้ยเนี่ย! จริงๆ เลย!!!"
70010020-224 = "นะ... นี่มันอะไรกันคะ? ทำไมตื่นมาก็เจอเรื่องแบบนี้ล่ะ..."
70010020-225 = "เหมือนเคยเห็นจากที่ไหนมาก่อนเลยค่ะ เหมือนไวรัสที่ออกมาจากคอมพิวเตอร์อย่างนั้นละ...?"
70010020-227 = "นี่เหรอที่เรียกว่า... ม้าไม้เมืองทรอย...?"
70010020-229 = "มาถึงจนได้สินะ ไม่คิดไม่ฝันเลยว่าจะได้มาเยือนเรดวินเทอร์!"
70010020-230 = "อยากเห็นสุดยอดซูเปอร์คอมพิวเตอร์ของเรดวินเทอร์ซะแล้วสิ!"
70010020-231 = "ซูเปอร์คอมพิวเตอร์ของที่นี่จะทำอะไรได้บ้างนะ? รอไม่ไหวแล้ว..."

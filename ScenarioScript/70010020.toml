[translation]
70010020-1 = "手動時代的終結（２）"
70010020-2 = "唔嗯，接下來該問什麼呢？"
70010020-3 = "（大家雖然厲害，也差不多該累了吧……）"
70010020-5 = "箱子內"
70010020-6 = "到底哪來這麼多問題啊！"
70010020-7 = "就算能回答所有問題的實里同學很厲害，這也太沒完沒了了吧！"
70010020-8 = "嗯？我嗎？"
70010020-9 = "其實從剛才開始，我遇到不知道的問題也只是隨便回答而已哦？"
70010020-10 = "要是被發現不就完蛋了嗎！？"
70010020-11 = "你在擔心那個啊。#n那麼我問你，「提問」的定義是什麼呢？"
70010020-13 = "「向某個人詢問某個問題，並期盼得到回答」。"
70010020-14 = "──是這樣沒錯吧？"
70010020-15 = "沒錯！正是對於「想知道的事」沒有答案才會提問。"
70010020-16 = "那麼就算我隨便回答，對方也沒辦法分辨是否正確吧？"
70010020-17 = "意思是只要有回答就好了呢。"
70010020-18 = "類似別人問我「Meruri同學，請問這個場景到底是什麽意思」的時候？"
70010020-19 = "前輩，那種問題通常不是因為真的好奇才問的。"
70010020-21 = "總之，只要知道照實回答知道的部分，應該不用擔心被發現才對。"
70010020-23 = "已經沒什麼好問的了……"
70010020-25 = "能通過會長的驗證真是太榮幸了！#n那麼為了準備明天的訪問，我就先關機了！"
70010020-27 = "啊，對了！叫它畫張畫看看吧！"
70010020-29 = "咦！？"
70010020-31 = "不行嗎？千年的那台連畫畫都會耶？"
70010020-32 = "咱們的電腦怎麼可能不行呢！#n「畫一張咱威風凜凜的肖像畫！」……真令人期待呢！"
70010020-33 = "「畫一張咱威風凜凜的肖像畫！」……？"
70010020-34 = "怎，怎麼辦！？#n我這輩子只畫過設計圖耶？"
70010020-35 = "唔嗯……"
70010020-41 = "……咦！？"
70010020-42 = "盯著我看是什麼意思啊？#n……難不成是要我畫嗎！？"
70010020-43 = "現在也沒有別的辦法了吧？#n大作家Meruri同學才是最適合的人選。"
70010020-44 = "前輩，反正截稿日也已經沒救了。#n你從剛才開始連一張都沒畫不是嗎？"
70010020-45 = "大作家愛瑠同學能有大顯身手的機會，真是太好了呢。呣呵呵。"
70010020-47 = "我不要！！"
70010020-48 = "你們以為只要對漫畫家說一句「幫我畫張畫～」就能馬上變出畫來嗎！？"
70010020-49 = "首先畫畫又不是免費的！#n況且就算撇開錢的問題不談，這也不是那種叮一聲就能變出來的東西！"
70010020-51 = "前輩！！現在得先度過危機才行吧！！#n你不是說想要收集題材，所以才把我也一起拖進來的嗎？"
70010020-52 = "不要不要不要！！#n就回答沒有這個功能啦！"
70010020-53 = "唔嗯，沒反應耶。#n怎麼會這樣呢？"
70010020-55 = "或，或許是因為沒有這個功能也說不定……請再稍等一下……"
70010020-57 = "如果沒有這個功能，不就代表它比千年的東西還差嗎？"
70010020-58 = "這東西根本沒用嘛……"
70010020-60 = "乾脆把它整個丟進熔爐熔掉回收吧？"
70010020-61 = "咦！？"
70010020-63 = "咱聽說出版部缺少活字用的金屬，這樣不是正好嗎？"
70010020-64 = "要是再等一下還是不行就直接送去熔掉吧！"
70010020-68 = "Meruri同學！！不，Meruri大人！！！"
70010020-69 = "雖然說文人是以活字留名，但是再這樣下去真的要親自化為活字了……唔呃……"
70010020-70 = "面臨重大危機的時候，就連八雲前輩也會失去平常心呢……"
70010020-72 = "好，好嘛，知道了啦！！#n實里同學，快把筆給我！！！"
70010020-73 = "我不介意。從容赴死正適合作為革命家的終點。"
70010020-74 = "能參與因為愛瑠同志不屈服因迎來的臨終，是我的榮幸。"
70010020-75 = "不要突然放棄希望！快點把筆拿過來！！！！"
70010020-78 = "出來了！"
70010020-82 = "哇！！！好厲害！！畫得超級好耶？"
70010020-84 = "（姬木愛瑠……這筆作畫費用，我之後一定會付給你的）"
70010020-85 = "（真的……很謝謝你……！）"
70010020-86 = "唔嗯……畢竟是電腦畫的，看起來終究還是有點差強人意的感覺。"
70010020-90 = "算了，這種程度大概就是極限了──"
70010020-96 = "碰！！碰！！！"
70010020-97 = "怎麼回事？"
70010020-98 = "大，大概是讀取磁碟的聲音吧，會長！"
70010020-100 = "放開！！我要出去給他一記手工鐵拳！！"
70010020-102 = "前輩你先冷靜，冷靜一點！！！外面會聽到的！！"
70010020-103 = "那一定是稱讚的意思啦！！#n代表Meruri同學的線條很乾淨俐落呀！！"
70010020-105 = "想不想嚐嚐被電腦揍的滋味啊！？哈啊！？"
70010020-107 = "會長，新口味布丁試吃活動的時間到了。"
70010020-108 = "哎呀！不小心聊得太開心，都忘記時間了呢。#n謝謝你，智惠！"
70010020-109 = "瑪麗娜委員長，真的辛苦你了。#n你簡直有化不可能為可能的本事呢！"
70010020-110 = "咱會正式將你列入本月「赤冬聯邦英雄」的審查名單！"
70010020-112 = "感，感激不盡！會長！"
70010020-113 = "對了，在離開之前……咱必須問超級電腦一個關乎赤冬未來的重要問題。"
70010020-114 = "這件事必須徹底保密，所以大家先離開房間吧！"
70010020-115 = "所，所有人退出房間！"
70010020-116 = "是，遵命！"
70010020-126 = "……呼呣。"
70010020-127 = "哎呀，赤冬的最高機密就要像這樣透露給編輯部了呢。"
70010020-128 = "真是感激不盡。呣呵呵。"
70010020-129 = "壓迫者居然將極機密的資訊洩漏出去……這下革命的大義又多了一條啊。"
70010020-131 = "要是被人發現機密都被我們知道就完蛋了！至少會被肅清三次的啊！"
70010020-135 = "啊，紙傳進來了。"
70010020-137 = "我看看……"
70010020-138 = "「希望同志能更常來赤冬」……"
70010020-142 = "「還有希望同志能多陪咱玩，該怎麼做才好呢？」……"
70010020-143 = "……"
70010020-145 = "啊……"
70010020-146 = "這個……能給到9分呢……"
70010020-148 = "這絕對是機密！！#n萬一他發現這東西被我們看到了，肯定會被肅清九次的！！"
70010020-149 = "雖然終於得到了題材，但是這題材也未免太勁爆了吧？"
70010020-150 = "總，總之得給出個回答才行！！#n大家快一起想想辦法！！"
70010020-152 = "這種曖昧不清的信，到底要我們怎麼回答啦！？"
70010020-153 = "不管什麼都好，大家把想到的都寫上去吧！！"
70010020-156 = "出來了！"
70010020-157 = "快讓咱看看……！"
70010020-159 = "「問得好，同志！只要持續實踐以下事項即可！」"
70010020-160 = "「實施週休二日制、將出版部的預算增加為三倍、編列同人活動預算」"
70010020-161 = "「若能實踐以上事項，老師將會更常來訪！」"
70010020-164 = "什麼嘛，原來這麼簡單啊！！"
70010020-165 = "謝謝你，超級電腦！"
70010020-171 = "得，得救了……沒想到這招居然能成功……"
70010020-177 = "事務局的門禁由我來處理。你們先回去吧。"
70010020-178 = "是！遵命！您辛苦了！"
70010020-186 = "所有人都已經離開，現在可以出來了。"
70010020-187 = "呼啊！！是新鮮的空氣！！ "
70010020-189 = "貴音已經睡著了呢。#n這也難怪，畢竟天都已經全黑了嘛。"
70010020-190 = "幸好總算是活下來了呢……"
70010020-192 = "各位，真的很抱歉！#n這份恩情我一定會報答的！我以我的名譽發誓！"
70010020-193 = "麻煩各位再辛苦一下，直到明天千年的客人們拜訪完為止！"
70010020-194 = "沒有那個必要──革命將在今晚開花結果！"
70010020-195 = "沒錯！革命將在今晚開花結果！"
70010020-199 = "……你剛才說什麼？"
70010020-200 = "瑪麗娜同志，解救被壓迫同志的最後一顆鈕扣已經扣上了。"
70010020-201 = "只要把身為壓迫元兇的潔莉諾會長拉下台，不就能終止壓迫了嗎？"
70010020-202 = "什麼！？話題為什麼會突然轉向那邊！？"
70010020-203 = "多虧同志你將這台「電腦」送進了事務局，事情才會進展得這麼順利。"
70010020-204 = "這次的革命不是從外面進攻，而是從內部開始！"
70010020-206 = "解放的時間到了，瑪麗娜同志！"
70010020-207 = "不是那樣的──！！！"
70010020-214 = "衝啊！！奔向解放吧！！"
70010020-219 = "結果最後還是被捲進來了，唉……"
70010020-220 = "唔啊啊！！我的截稿日該怎麼辦！這下子真的完了！！！"
70010020-224 = "現，現在是什麼情況？#n怎麼一覺醒來就……"
70010020-225 = "總覺得好像在哪看過呢。#n那種從電腦裡鑽出來的病毒……？"
70010020-227 = "某某……木馬之類的……？"
70010020-229 = "終於抵達了，沒想到真的來到赤冬了呢！"
70010020-230 = "赤冬最強的超級電腦啊……真讓人好奇！"
70010020-231 = "性能到底如何呢？#n真的好期待──"
70010020-239 = "超級電腦革命軍，徹底打倒事務局吧！！"
70010020-240 = "靠著超級電腦的力量，一定要取得勝利！"
70010020-245 = "可惡的超級電腦，竟然敢背叛咱！？"
70010020-246 = "肅清，全部肅清！！！！！"
70010020-259 = "超級電腦革命……軍？背叛……？"
70010020-263 = "看來回去之後，得把我們那台超級電腦的性能調低一點才行……"
70010020-264 = "手動時代的終結"

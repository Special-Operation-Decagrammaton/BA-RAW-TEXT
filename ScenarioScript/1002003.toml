[translation]
1002003-1 = "What Are You Talking About?"
1002003-2 = "(Something was off about Koharu, so I went to Trinity to find her.)"
1002003-3 = "(It didn't take long. Classes just ended and she's by the front gate.)"
1002003-4 = "..."
1002003-5 = "(Other students are chatting away as they walk home, but Koharu isn't saying a word.)"
1002003-6 = "[s] \"Koharu?\""
1002003-7 = "H-Huh?!"
1002003-8 = "S-Sensei? What are you doing here?"
1002003-9 = "[s1] \"You haven't been on MomoTalk at all.\"\n[s2] \"I was worried about you.\""
1002003-10 = "H-Huh?! Oh, that's..."
1002003-11 = "H-Huh?! Oh, that's..."
1002003-12 = "It's not a big deal or anything. I just..."
1002003-13 = "It's nothing."
1002003-14 = "[s] \"Why are you being so meek?\""
1002003-15 = "I-I'm not trying to be. I was just...thinking about what happened before."
1002003-16 = "I-I realized I was jumping to conclusions and out of line, so I wanted to apologize."
1002003-17 = "Th-That's all..."
1002003-18 = "...I have to say."
1002003-19 = "[s] \"...?\""
1002003-20 = "..."
1002003-22 = "(More students pass through the school gate as we stand there.)"
1002003-23 = "(Eventually, Koharu and I are the only two left.)"
1002003-25 = "..."
1002003-26 = "*sob*"
1002003-27 = "*cry*"
1002003-28 = "[s] \"Wh-What's wrong?!\""
1002003-29 = "Why?"
1002003-30 = "Why did you come here?"
1002003-31 = "Just because I sent that message?"
1002003-32 = "That can't be it!"
1002003-33 = "There must be more to it!"
1002003-34 = "I know you have some sort of ulterior motive!"
1002003-35 = "[s] \"Well, at least you're back to your usual self.\""
1002003-36 = "I-I didn't even say much in that message."
1002003-37 = "Are you sure you came here because you were worried about me? That's it? Really?"
1002003-38 = "...No way."
1002003-39 = "That can't be right. You must have another reason..."
1002003-40 = "When something like this happens, there's always a twist at the end."
1002003-41 = "You could be trying to bring my guard down and take me someplace secluded..."
1002003-42 = "Like the empty gym storage or..."
1002003-43 = "...Ahhh!"
1002003-44 = "[s] \"What?\""
1002003-45 = "That's it, isn't it?"
1002003-46 = "I should have known all along..."
1002003-47 = "...that this was where things were going!"
1002003-48 = "You must have been planning this all along!"
1002003-49 = "[s3] \"I swear this is a misunderstanding.\"\n[s4] \"You read about this somewhere, didn't you?\""
1002003-50 = "I can't let my guard down around you!"
1002003-51 = "I can't let my guard down around you!"
1002003-52 = "Thank goodness I know all of your tricks. Who knows what you could have pulled with someone else?"
1002003-53 = "But what if...you're targeting me because I know so much about you?!"
1002003-54 = "That's it. It all checks out..."
1002003-55 = "[s] \"Um... Would you mind repeating that, Koharu?\""
1002003-56 = "Now it all makes sense."
1002003-57 = "This is a mission—something I must do as a member of the Justice Task Force."
1002003-58 = "I have to protect the students from Sensei's evil schemes!"
1002003-59 = "I'm the only one who can stop you!"
1002003-60 = "*sob* There's no other way. I'll...endure this if I have to!"
1002003-61 = "[s5] \"Kivotos to Koharu.\"\n[s6] Tap on Koharu's shoulder."
1002003-62 = "Ahhh!"
1002003-63 = "Ahhh!"
1002003-64 = "Eeek!"
1002003-66 = "(...)"
1002003-67 = "[s] \"...\""
1002003-69 = "(Koharu went into another fit before disappearing again.)"

[translation]
1002003-1 = "在說什麼呢？"
1002003-2 = "（MomoTalk上的交談實在令人在意，於是便前往三一尋找小春）"
1002003-3 = "（剛好遇上放學時間，馬上就在校門口找到小春）"
1002003-4 = "……"
1002003-5 = "（其他學生都有說有笑的一起回去，只有小春一個人靜靜的走著）"
1002003-6 = "[s]「……小春？」"
1002003-7 = "……咦，為，為什麼！？"
1002003-8 = "老，老師……？怎麼會在這裡……？"
1002003-9 = "[s1] 「看你在MomoTalk上的反應有些奇怪。」\n[s2] 「我想說你會不會有心事。」"
1002003-10 = "咦，啊，那是……"
1002003-11 = "咦，啊，那是……"
1002003-12 = "沒有什麼需要老師擔心的事，只是……"
1002003-13 = "不知不覺……是的。"
1002003-14 = "[s] 「為什麼這麼拘謹……？」"
1002003-15 = "真，真的沒什麼……只是……上次那件事……"
1002003-16 = "仔細想想，我好像說得有點太過分了……所以想和老師道歉……"
1002003-17 = "就只是這樣而已……"
1002003-18 = "…………"
1002003-19 = "[s]「……？」"
1002003-20 = "……"
1002003-22 = "（在眾多學生的返家人潮中，只有我們兩人無言面對面了好一陣子）"
1002003-23 = "（沒過多久，校門口就只剩下我和小春兩人）"
1002003-25 = "……"
1002003-26 = "……"
1002003-27 = "唔唔……"
1002003-28 = "[s] 「……還，還好嗎！？」"
1002003-29 = "為，為什麼……"
1002003-30 = "為什麼會特地跑到這邊來……？"
1002003-31 = "為什麼會因為那種訊息而擔心……？"
1002003-32 = "這……"
1002003-33 = "這絕不可能！"
1002003-34 = "……你一定別有「企圖」對吧！"
1002003-35 = "[s] 「又變成平常的小春了！？」"
1002003-36 = "因為，訊息裡面根本什麼也沒寫……"
1002003-37 = "怎麼可能……怎麼可能真的會因此擔心！"
1002003-38 = "……不對。"
1002003-39 = "不可能……一定是有別的意思……"
1002003-40 = "沒錯！我都看過了！像這種時候，每次這種發展之後……"
1002003-41 = "都會先讓氣氛變得很感性，然後再把人帶到陰暗的場所……"
1002003-42 = "比方說，把人帶去那間空無一人的體育倉庫……"
1002003-43 = "……哇啊啊！！？！？"
1002003-44 = "[s] 「……小春，沒事吧？」"
1002003-45 = "用，用這種氣氛，"
1002003-46 = "企圖使人鬆懈……"
1002003-47 = "果然會是那種發展……！？"
1002003-48 = "從，從一開始就這麼打算……！？"
1002003-49 = "[s3] 「我不知道你在說什麼，但我確定是誤會……」\n[s4] 「那也是書上讀到的……？」"
1002003-50 = "真，真的是不能掉以輕心……！！"
1002003-51 = "真，真的是不能掉以輕心……！！"
1002003-52 = "這樣子，如果對象不是對老師瞭若指掌的我……"
1002003-53 = "不，不對，所以才刻意找我……！？"
1002003-54 = "知道會被看穿也硬要說服人，雖然少見但這種劇情也確實是存在的……"
1002003-55 = "[s] 「那個，小春同學……？」"
1002003-56 = "我全都明白了……"
1002003-57 = "這就是「實現正義部」交付予我的使命……"
1002003-58 = "我必須從老師的魔掌中保護其他同學……！"
1002003-59 = "嗯，沒錯……！一定是這樣！"
1002003-60 = "就算是極為艱難的使命，我，我也要……！"
1002003-61 = "[s5] 「小春？小春～？」\n[s6] 輕拍小春的肩膀"
1002003-62 = "……！？"
1002003-63 = "……！？"
1002003-64 = "我，我還，我還是……不行～～～～～～！！！"
1002003-66 = "（……）"
1002003-67 = "[s]「……」"
1002003-69 = "（於是，小春就這樣大叫著，不知道又跑去哪了）"

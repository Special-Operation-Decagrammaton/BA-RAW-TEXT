[translation]
1002003-1 = "พูดอะไรน่ะ?"
1002003-2 = "(คุณครูรู้สึกเป็นห่วงเลยมุ่งหน้าไปที่ทรีนิตี้เพื่อตามหาโคฮารุ)"
1002003-3 = "(หลังจากตามหาอยู่ไม่นาน คุณครูก็ได้พบโคฮารุที่ประตูหน้า)"
1002003-4 = "......"
1002003-5 = "(โคฮารุไม่ค่อยพูด ต่างจากนักเรียนคนอื่นๆ ที่คุยเล่นกัน)"
1002003-6 = "[s] \"...โคฮารุ?\""
1002003-7 = "อะ... เอ๋!?"
1002003-8 = "คุณครู...? ทำไมถึงอยู่ที่นี่ได้...?"
1002003-9 = "[s1] \"ใน MOMOTALK ดูแปลกๆ น่ะ\"\n[s2] \"ครูเป็นห่วงว่ามีอะไรหรือเปล่า\""
1002003-10 = "หะ... หือ!? อ่า... คือว่า..."
1002003-11 = "หะ... หือ!? อ่า... คือว่า..."
1002003-12 = "คือว่า....ไม่มีอะไรหรอก ก็แค่..."
1002003-13 = "ไม่มีอะไร... ค่ะ"
1002003-14 = "[s] \"...ใช้คำสุภาพเหรอ?\""
1002003-15 = "ปะ... เปล่าค่ะ คือว่า... ก็แค่... เรื่องก่อนหน้านี้..."
1002003-16 = "ฉันมาลองคิดๆ ดูแล้ว ฉันทำเกินไปหน่อย... อยากจะขอโทษ..."
1002003-17 = "กะ...ก็แค่นี้..."
1002003-18 = "...น่ะค่ะ..."
1002003-19 = "[s] \"......?\""
1002003-20 = "......"
1002003-22 = "(ระหว่างที่ยืนอยู่ตรงนั้น นักเรียนคนอื่นๆ ก็ออกจากโรงเรียนไปหมดแล้ว)"
1002003-23 = "(เวลาผ่านไปอีกสักพัก ก็เหลือแค่คุณครูกับโคฮารุยืนอยู่หน้าประตูใหญ่กันสองคน)"
1002003-25 = "......"
1002003-26 = "...อึก..."
1002003-27 = "...ฮึ่ก"
1002003-28 = "[s] “มะ... ไม่เป็นไรนะ?!\""
1002003-29 = "...ทำไม..."
1002003-30 = "ทำไมมาหาฉันถึงที่นี่...?"
1002003-31 = "แค่เพราะข้อความเดียวนั่น...?"
1002003-32 = "ปะ... เป็นไปได้..."
1002003-33 = "เป็นไปได้ที่ไหนกัน!"
1002003-34 = "...หรือว่ามีจุดประสงค์อื่น!"
1002003-35 = "[s] \"โคฮารุจังกลับมาเป็นแบบเดิมแล้ว!?\""
1002003-36 = "ตะ... แต่... ในข้อความนั่นไม่มีอะไรเลยนี่...?"
1002003-37 = "เป็นห่วงก็เลยมา... จริงอ่ะ? จริงเหรอ? แค่นั้นจริงเหรอ?"
1002003-38 = "...ไม่สิ"
1002003-39 = "เป็นไปไม่ได้... อาจมีจุดประสงค์อื่น... หรือเปล่านะ..."
1002003-40 = "ใช่แล้ว เรื่องนั้น... ตอนนั้นแน่เลย... แล้วก็เปลี่ยนไปหลังจากนั้น..."
1002003-41 = "บรรยากาศอบอุ่นแบบนี้ ในสถานที่เปลี่ยว..."
1002003-42 = "ถ้าถูกพาไปที่โกดังในโรงยิมที่ว่างเปล่า จากนั้น..."
1002003-43 = "......อ๊าย!?"
1002003-44 = "[s] \"......เอ๋?\""
1002003-45 = "ว่าแล้วจะทำอย่างนั้นล่ะสิ? ใช่มั้ยล่ะ...?"
1002003-46 = "ตอนนี้เห็นชัดเลย..."
1002003-47 = "อย่างงี้...ต้องจัดการ!?"
1002003-48 = "ว่าแล้วเชียวมีเป้าหมายอย่างนั้นแต่แรก...!?"
1002003-49 = "[s3] \"ไม่ใช่ เข้าใจผิด...เข้าใจผิดไปหมดแล้ว...!\"\n[s4] \"เรื่องนั้นอ่านมาจากหนังสือเหรอ...?\""
1002003-50 = "จริงๆ เลย... เป็นคนที่ประมาทไม่ได้…!!"
1002003-51 = "จริงๆ เลย... เป็นคนที่ประมาทไม่ได้…!!"
1002003-52 = "โชคดีที่ฉันเข้าใจวิธีของคุณครูทั้งหมด ไม่งั้นฉันคงจะ..."
1002003-53 = "มะ... ไม่สิ ดีไม่ดีอาจจะ... ทำอะไรกับฉัน... !?"
1002003-54 = "เอาล่ะ ในเมื่อเป็นแบบนั้น..."
1002003-55 = "[s] \"นี่ ยังอยู่มั้ยน่ะ...? คุณโคฮารุ?\""
1002003-56 = "เข้าใจแล้วล่ะ..."
1002003-57 = "นี่เป็นหน้าที่ของฉัน ในนามชมรมทวงความยุติธรรม..."
1002003-58 = "ฉันจะต้องปกป้องนักเรียนคนอื่นให้พ้นจากกลลวงของคุณครูไว้ให้ได้...!"
1002003-59 = "อื้อ...! ถ้าพูดตามจริง... นี่เป็นภารกิจที่มีฉันคนเดียวที่ทำได้...!"
1002003-60 = "ฉัน...! ฉัน...! ...เพื่อภารกิจที่ยากลำบากนี้..."
1002003-61 = "[s5] \"ฟังอยู่หรือเปล่า~? คุณโคฮารุ~?\"\n[s6] ใช้มือแตะไหล่ของโคฮารุ"
1002003-62 = "...เฮือก!!!"
1002003-63 = "...เฮือก!!!"
1002003-64 = "...อ๊ายยยย~!!!"
1002003-66 = "(......)"
1002003-67 = "[s] “.......”"
1002003-69 = "(โคฮารุกรีดร้องอยู่คนเดียว แล้วก็หายตัวไปที่ไหนสักแห่งอีกครั้ง)"

[translation]
32130-1 = "第13話;即使如此"
32130-2 = "（在那之後，補課部的大家為了第3次特別學力測驗持續努力著……）"
32130-24 = "第4次補課部模擬測驗，結果──"
32130-25 = "花子──100分[007eff]（合格）[-]"
32130-26 = "梓──82分[FF6666]（不合格）[-]"
32130-27 = "小春──74分[FF6666]（不合格）[-]"
32130-28 = "日步美──79分[FF6666]（不合格）[-]"
32130-53 = "第5次補課部模擬測驗，結果──"
32130-54 = "花子──100分[007eff]（合格）[-]"
32130-55 = "梓──94分[007eff]（合格）[-]"
32130-56 = "小春──90分[007eff]（合格）[-]"
32130-57 = "日步美──93分[007eff]（合格）[-]"
32130-71 = "第6次補課部模擬測驗，結果──"
32130-72 = "花子──100分[007eff]（合格）[-]"
32130-73 = "梓──91分[007eff]（合格）[-]"
32130-74 = "小春──83分[FF6666]（不合格）[-]"
32130-75 = "日步美──89分[FF6666]（不合格）[-]"
32130-82 = "離最後的特別學力測驗，還有6天"
32130-85 = "離最後的特別學力測驗，還有5天"
32130-88 = "離最後的特別學力測驗，還有4天"
32130-91 = "離最後的特別學力測驗，還有3天"
32130-94 = "離最後的特別學力測驗，還有2天"
32130-97 = "離最後的特別學力測驗，還有1天"
32130-100 = "……終於就是明天了呢。"
32130-101 = "嗯……就是明天了呢。"
32130-102 = "……"
32130-103 = "嗚，嗚嗚……應該不會突然又改了什麼規定吧？"
32130-107 = "唔嗯，第3次特別學力測驗的資訊暫時沒有改變……"
32130-108 = "嗯，我也一直有在注意。#n考試範圍和之前公告的一樣，合格標準也依然是90分。"
32130-109 = "考試地點是三一第19分館的第32教室。#n雖然離本館有點距離，但也不算太遠。"
32130-110 = "考試時間是早上9點開始，並沒有更改。"
32130-111 = "如果要說有什麼令人在意的地方的話……#n從昨天開始本館就特別安靜，簡直像是大家都突然消失了一樣。"
32130-112 = "……為了以防萬一，我今晚會一直注意著公佈欄的。"
32130-113 = "花，花子醬還是睡一下比較好吧……"
32130-114 = "呵呵，我沒事的。而且我能做的也只有這些了……"
32130-115 = "才，才沒有呢！#n都是多虧花子醬非常仔細地教我們，我跟梓醬和小春醬的成績才能提高這麼多……！"
32130-116 = "別這麼說，這是大家努力得來的成果。"
32130-117 = "明明連續幾天都沒好好睡覺，大家還是很努力。"
32130-118 = "[s] 「……嗯，一定沒問題的。」"
32130-119 = "嗯，雖然只是勉強達到90分……只要明天的考題簡單一點的話，一定……"
32130-120 = "……"
32130-121 = "……！不，不會剛好發生那種好事的！我會繼續讀書到半夜的！"
32130-122 = "100分！只要能考100分，別人就無話可說了吧！！"
32130-123 = "啊嗚嗚……小春醬……雖然我懂你的心情，但今天還是好好休息比較好……"
32130-124 = "沒錯唷。小春醬的努力大家都知道，沒問題的。#n今天還是先休息，為明天做準備比較好。"
32130-125 = "沒錯，休息也是戰略的一部分。"
32130-126 = "這點對梓醬來說也是一樣……要好好休息哦……"
32130-127 = "……嗯，我知道了。#n今天會好好休息。"
32130-131 = "明天……決定我們命運的一天終於到了。"
32130-132 = "要是……不，還是別說什麼不吉利的話了。一定要合格。"
32130-133 = "我，我也是！絕對不會輸的！"
32130-134 = "啊哈哈……是啊。#n結局是哭是笑就看明天了……一起加油吧。"
32130-135 = "嗯。既然都努力到這裡了，接下來就全力拚到最後吧。"
32130-136 = "[s] 「……相信至今為止的努力吧。一定沒問題的。」"
32130-137 = "好的。"
32130-138 = "就是呀。"
32130-139 = "嗯。"
32130-140 = "……"
32130-142 = "離最後的特別學力測驗，還有1天"
32130-148 = "……"
32130-153 = "……"
32130-156 = "梓，任務日期更改了。"
32130-157 = "……日期更改了？"
32130-159 = "沒錯。明天上午到約好的地點待命。"
32130-160 = "等，等等，沙織。#n明天……"
32130-161 = "有什麼問題嗎？"
32130-162 = "我還沒準備完畢。而且提前實施計畫的風險太高了。"
32130-163 = "不，明天就要執行。這是既定事項，好好準備吧。"
32130-164 = "……"
32130-165 = "到了明天，一切都會改變。#n不管是我們奧利斯還是三一，都會出現無法逆轉的巨大變化。"
32130-166 = "我們要破壞三一茶會的主席──桐藤渚的光環……為此我們需要有你在。"
32130-167 = "……"
32130-168 = "我相信你的實力，好好表現吧。#n就像百合園聖亞的時候一樣。"
32130-169 = "……我知道了。#n既然計畫如此，我也沒有異議。"
32130-170 = "我這就去準備。"
32130-175 = "梓。"
32130-176 = "……？"
32130-177 = "你沒有忘記吧──「vanitas vanitatum」。"
32130-178 = "……一切皆為徒勞。"
32130-179 = "無論是努力、成功、失敗……最終都是沒有意義的。"
32130-180 = "……我從來不曾忘記。"
32130-185 = "……"
32130-187 = "……"
32130-189 = "下一話;坦承"

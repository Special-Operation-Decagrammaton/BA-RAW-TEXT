32130-162 = "ฉันยังเตรียมตัวไม่เสร็จ ถ้าภารกิจขยับกระชั้นเข้ามากว่าเดิม เราจะเสี่ยงมาก"
32130-163 = "เป็นพรุ่งนี้เหมือนเดิม ไปเตรียมตัวอยู่ที่สถานที่ฝึกฝนล่ะ ชิราสึ อาซึสะ"
32130-164 = "......."
32130-165 = "ทุกอย่างจะเปลี่ยนไปในวันพรุ่งนี้ ทั้งอาเรียสของพวกเราและทรีนิตี้แห่งนี้#nการเปลี่ยนแปลงที่ไม่อาจหวนคืนได้จะเกิดขึ้นแล้วล่ะ"
32130-166 = "การทำลายฮาโลของโฮสต์สภาน้ำชาทรีนิตี้ คิริฟุจิ นางิสะ... และนี่ก็คือเหตุผลที่เธอไปอยู่ที่นั่น"

32130-159 = "อืม เปลี่ยนเป็นพรุ่งนี้เช้า ไปที่ที่ตกลงกันไว้แล้วรอคำสั่งอยู่ที่นั่น"
32130-160 = "ดะ... เดี๋ยวก่อนซาโอริ พรุ่งนี้ฉัน... "

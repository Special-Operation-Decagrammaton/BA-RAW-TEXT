32130-169 = "เข้าใจแล้ว... ถ้าแผนการถูกกำหนดไว้แบบนั้น ฉันก็ไม่มีข้อเห็นต่าง"
32130-170 = "แล้วฉันจะไปเตรียมพร้อมให้ภารกิจพรุ่งนี้ไม่มีข้อผิดพลาด"

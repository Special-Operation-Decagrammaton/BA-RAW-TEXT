32130-107 = "3;히후미;04;아우…… 3차 평가시험은 아직까진 우리가 알고 있는 대로예요.\n#3;a"
32130-108 = "3;하나코;03;네. 제가 계속 지켜보고 있었어요. 시험범위는 저번에 공지된 대로이고, 90점 이상 합격. \n#3;em;[반짝]"
32130-109 = "3;하나코;01;장소는 내일 트리니티 제 19분관 32교실. 외부에 있는 건물이지만 그렇게까지 멀진 않은 곳이에요."
32130-110 = "3;하나코;99;시간은 오전 9시. 시간 또한 그대로예요. 변경은 없어요."
32130-111 = "3;하나코;05;특별히 이상한 점은 없지만…… 어제부터 본관 쪽이 이상하게 조용한 느낌이네요. 인적도 뚝 끊겼고.\n#3;em;…"
32130-112 = "3;하나코;03;그래도 혹시 모르니 오늘은 제가 계속 공지 게시판을 지켜보고 있을게요.\n#3;greeting"
32130-113 = "1;히후미;04;아, 아우……. 하나코 쨩도 쉬어야 하는데.\n#1;a\n#3;m5"
32130-114 = "3;하나코;03;후후. 저는 괜찮아요. 제가 도울 수 있는 방법이 이런 것밖에 없어서…….\n#3;em;[음표]"
32130-115 = "1;히후미;04;아, 아니에요! 하나코 쨩이 엄청 쉽게 공부를 가르쳐 줘서 성적도 꽤 올릴 수 있었고…… 저도, 아즈사 쨩도, 코하루 쨩도 성적이 훨씬 더 올랐잖아요?\n#1;hophop"
32130-116 = "3;하나코;01;제 덕분이 아니라 모두가 열심히 해주셔서……."
32130-117 = "3;하나코;05;며칠째 잠도 제대로 자지 못하고 모두들 밤 늦게까지 고생하셨어요……"
32130-118 = "[s] \"……응. 할 수 있는 만큼 노력한 거 같아.\""
32130-119 = "1;히후미;00;네…… 그래도 평균 90점은 아슬아슬하지만…… 호, 혹시라도 내일 시험이 쉽게 나온다면……."
32130-120 = "#3;hide\n5;아즈사;06;…….\n#5;em;…"
32130-121 = "3;코하루;07;아니! 그럴 리가 없잖아! 그런 요행같은 게 있을 거 같아?! 난 오늘도 밤 늦게까지 공부할 거니까! \n#3;hophop\n#3;a"
32130-122 = "3;코하루;11;100점! 100점을 맞을 거야! 그거라면 어떤 시비도 걸 수 없겠지!!\n#3;em;[!]"
32130-123 = "1;히후미;04;아우우…… 코하루 쨩…… 오늘만큼은 푹 쉬는 게……. \n#1;em;[땀]\n#1;stiff"
32130-124 = "5;하나코;01;맞아요. 코하루 쨩이 열심히 한 건 우리 모두가 다 알고 있으니까……. 오늘은 그만 쉬고 내일을 위한 준비를 하는게 맞을 거 같아요."
32130-125 = "1;아즈사;02;맞아. 쉬는 것도 전략이니까.\n#1;em;[반응]"
32130-126 = "5;하나코;05;그건 아즈사 쨩도 마찬가지예요……. 쉬지 않으면 안 돼요……."
32130-127 = "1;아즈사;99;……그러네. 알았어. 오늘만큼은 푹 쉬어두겠어."

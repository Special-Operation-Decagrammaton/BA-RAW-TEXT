32130-178 = "ทุกอย่างเปล่าประโยชน์และไร้ความหมาย... ฉันไม่ลืมหรอก"
32130-179 = "ไม่ว่าจะพยายามแค่ไหน จะสำเร็จอย่างไร หรือไม่ว่าจะล้มเหลวแค่ไหน#nท้ายที่สุดแล้วทุกอย่างก็จะไร้ความหมายอยู่ดี"

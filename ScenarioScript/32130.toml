32130-107 = "อืม... การสอบประเมินครั้งที่ 3 ยังคงเป็นแบบเดิมตามที่เราเข้าใจอยู่ค่ะ"
32130-108 = "ค่ะ ฉันจับตาดูอยู่ตลอดเลยค่ะ เนื้อหาที่ออกสอบยังคงเหมือนที่ประกาศครั้งก่อน#nและคะแนนผ่านเกณฑ์อยู่ที่ 90 คะแนน "
32130-109 = "สถานที่สอบพรุ่งนี้คือห้องเรียนที่ 32 อาคาร 19 ทรีนิตี้ เป็นอาคารที่อยู่ภายนอก#nแต่ก็ไม่ได้ไกลมากเท่าไหร่ค่ะ"
32130-110 = "เวลาสอบคือ 9 โมงเช้าเหมือนเดิมค่ะ ไม่มีอะไรเปลี่ยนแปลง"
32130-111 = "ถึงจะไม่มีจุดที่น่าสงสัย... แต่ทางอาคารส่วนกลางมันเงียบแปลกๆ อยู่ตั้งแต่เมื่อวานแล้วค่ะ#nแถมไม่มีใครเข้าออกด้วย"
32130-112 = "แต่ยังไงก็ตามวันนี้ฉันจะหมั่นดูประกาศเรื่อยๆ เผื่อมีอะไรเปลี่ยนแปลงค่ะ"
32130-113 = "อะ... อ่า... แต่ฮานาโกะจังก็ต้องพักผ่อนนะ"
32130-114 = "ฮุฮุ ฉันไม่เป็นไรหรอกค่ะ เพราะนอกจากเรื่องนี้แล้วฉันก็ช่วยอะไรไม่ได้เลย..."
32130-115 = "มะ... ไม่ใช่นะคะ! ฮานาโกะจังช่วยสอนให้เข้าใจได้ง่ายจนคะแนนของพวกเราสูงขึ้น...#nทั้งฉันเอง โคฮารุจัง แล้วก็อาซึสะจังด้วยนะคะ"
32130-116 = "ไม่ใช่เพราะฉันช่วยอะไรหรอกค่ะ เพราะทุกคนตั้งใจกันมากกว่า..."
32130-117 = "ที่ผ่านมาทุกคนพยายามกันมากเลยค่ะ เอาแต่ติวหนังสือถึงดึกดื่นจนแทบไม่ได้นอนกันเลย..."
32130-118 = "[s] \"อื้ม เราพยายามเท่าที่จะทำได้กันแล้วล่ะ\""
32130-119 = "ใช่ค่ะ... ถึงคะแนนเฉลี่ยจะยังไม่ถึง 90 ก็เถอะ... แต่หากพรุ่งนี้ข้อสอบง่ายขึ้นมาล่ะก็..."
32130-120 = "......."
32130-121 = "ไม่หรอก! จะเป็นอย่างนั้นไปได้ยังไง! คิดว่าเราจะมีโชคอะไรแบบนั้นเหรอ?! ต้องพึ่งตัวเองสิ!#nวันนี้ฉันจะนั่งเรียนถึงกลางดึกเลย! "
32130-122 = "100 คะแนน! ต้องได้ 100 คะแนนเต็มให้ได้! ถ้าได้คะแนนเต็มก็คงหาเรื่องแกล้งกันไม่ได้อีก!!"
32130-123 = "อ่า... โคฮารุจัง... วันนี้พักแค่นี้เถอะค่ะ... "
32130-124 = "ใช่แล้วค่ะ พวกเราทุกคนรู้ดีค่ะว่าโคฮารุจังพยายามมากแค่ไหน...#nวันนี้พักแค่นี้ก่อนแล้วไปเตรียมตัวสำหรับวันพรุ่งนี้ดีกว่านะคะ"
32130-125 = "ถูกต้อง การพักผ่อนเป็นกลยุทธ์อย่างหนึ่งนะ"
32130-126 = "อาซึสะจังเองก็ด้วยค่ะ... ต้องพักผ่อนด้วยนะคะ..."
32130-127 = "มันก็ใช่อยู่หรอก... เข้าใจแล้วล่ะ วันนี้คงต้องพักแค่นี้"
32130-131 = "วันพรุ่งนี้แล้วสินะคะ... วันที่จะตัดสินชะตากรรมของพวกเราทุกคน..."
32130-132 = "ไม่หรอก... อย่าพูดอะไรให้ไม่สบายใจสิ ฉันจะต้องสอบผ่านแน่นอน"
32130-133 = "ฉันก็ด้วย!! คิดว่าฉันจะยอมแพ้หรือไง!"
32130-134 = "แหะๆๆ... นั่นสิคะ... ฉันไม่ควรพูดให้หมดกำลังใจเลย... คงต้องฮึดสู้กว่านี้แล้วค่ะ"
32130-135 = "ค่ะ ที่ผ่านมาพวกเราพยายามอย่างสุดความสามารถแล้ว "
32130-136 = "[s] \"จริงๆ นี่ถือเป็นวิกฤตเลย แต่ก็เชื่อในความพยายามที่ผ่านมากันเถอะนะ\""

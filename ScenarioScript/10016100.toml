10016100-7 = "3;노아 학교 체육복;01\n#3;a\n#wait;1500"
10016100-8 = "3;노아 학교 체육복;03;안녕하세요, 선수 및 관람객 여러분. 밀레니엄 학원, 세미나의 서기이자 이번 <황륜대제>의 실행위원을 맡게 된 우시오 노아라고 합니다.\n#3;em;[반응]\n#3;greeting"
10016100-9 = "3;노아 학교 체육복;01;본래는 밀레니엄 학원의 회장이신 리오 회장님께서 폐회사를 읽어주실 예정이었습니다만, 갑작스러운 사정으로 인해 제가 대신 연사를 맡게 되었습니다. 양해 부탁드립니다."
10016100-10 = "3;노아 학교 체육복;03;으음…… 아까도 말씀드렸습니다만, 저는 본래 이야기를 기록하는 일에 익숙한 서기인지라. 제 생각을 담아 폐회사를 전달해 드리려 하니 조금 막막하게 느껴지네요.\n#3;em;[땀]"
10016100-11 = "3;노아 학교 체육복;01;그러니 이번 폐회사는 서기의 본분에 맞게 오늘의 일정을 회고하는 것으로 대신할까 합니다."
10016100-12 = "#st;[0,0];instant;1;"
10016100-13 = "#clearST"
10016100-14 = "3;노아 학교 체육복;01\n#wait;1500\n#3;greeting"
10016100-15 = "3;노아 학교 체육복;01;이번 황륜대제에서는 많은 경기가 진행되었고, 또 많은 선수 여러분이 경기에 참여해주셨습니다."
10016100-16 = "3;노아 학교 체육복;99;개인적으로는 모든 경기가 손에 땀을 쥐게 하는 명승부이자 하이라이트였다고 생각합니다만, 모두가 같은 시선에서 경기를 지켜보진 않으셨겠지요."
10016100-17 = "3;노아 학교 체육복;01;때문에 이번 <황륜대제>에서 가장 돋보인 활약을 보인 학생 하나를 고르는 건 어려울 것 같습니다."
10016100-18 = "#st;[0,0];instant;1;"
10016100-19 = "#clearST"
10016100-20 = "3;노아 학교 체육복;99\n#wait;1500\n#3;greeting"
10016100-21 = "3;노아 학교 체육복;03;다만 '저마다 이야기의 주인공'으로서 이번 대운동회에서 멋진 활약을 보여주신 학생 여러분 모두에게 깊은 감사의 말씀을 드립니다."
10016100-22 = "3;노아 학교 체육복;01;개회 때 말씀드린 것처럼…… <황륜대제>는 키보토스의 모든 학생들이 함께 즐기며 만들어가는 '모두의 축제' 니까요."
10016100-23 = "3;노아 학교 체육복;03;그럼 부디 즐거운 축제가 되셨기를 기원하며. 이것으로 <황륜대제>의 성료를 선언하겠습니다!\n#3;closeup\n#3;em;[반짝]"
10016100-24 = "#wait;1000"
10016100-25 = "#all;hide"
10016100-26 = "#na;학생 A;저기, 이제 어디로 갈 거야? 경기장 좀 더 둘러볼래?"
10016100-27 = "#na;학생 B;구경도 좋지만 나는 어쩐지 배가 고픈데……"
10016100-28 = "#na;학생 B;그러고 보니 노점들은 대회가 끝나도 늦은 시간까지 계속 음식을 판다고 하던데."
10016100-29 = "#na;학생 B;경기 중에는 먹을 시간이 없었던 그 중화 덮밥을 한번 먹으러 가보자!"
10016100-30 = "#na;학생 C;아까 보니 경기장 앞에 거대한 장작더미를 준비하고 있던데…… 불이라도 피울 생각인가?"
10016100-31 = "#na;학생 D;아직 '후야제'가 남아 있다는 걸 벌써 잊어버린 거야?"
10016100-32 = "#na;학생 D;후야제에서 큰 캠프파이어를 피우고, 여러 학원의 학생들이 어울려 포크 댄스를 추는 것도 <황륜대제>의 명물 중 하나라고."
10016100-33 = "#na;학생 D;그러고 보니 황륜대제의 후야제에서 좋아하는 사람과 함께 포크 댄스를 추면 사랑이 이루어진다는 전설이 있는데……"
10016100-34 = "#na;학생 D;저기, 이번 후야제에서는 누구랑 같이 춤을 출 거야?"
10016100-35 = "#na;학생 C;음, 나는……"

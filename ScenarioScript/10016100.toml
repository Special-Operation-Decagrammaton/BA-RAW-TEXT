[translation]
10016100-1 = "Epilogue;Tea for All"
10016100-2 = "After the relay race, the Kivotos Halo Festival was wrapped up without much fuss..."
10016100-3 = "It came to a successful end with a closing address by a representative of the Millennium School."
10016100-8 = "Greetings, athletes and spectators. My name is Ushio Noa of the Millennium School. I am a secretary of Seminar and a member of the Executive Committee for this Kivotos Halo Festival."
10016100-9 = "Originally, the closing address was supposed to be delivered by the Millennium School's student president, Rio. But due to unforeseen circumstances, I will be taking over as speaker today. Thank you for your understanding."
10016100-10 = "As I said before, as a secretary and a scribe, I'm more used to writing down stories than telling them. So I'm a little stumped on how to share my thoughts in these closing remarks."
10016100-11 = "Therefore, in place of a closing address, I would like to provide a bit of a retrospective of today's events, as an extension of my regular secretarial duties."
10016100-15 = "This year's Kivotos Halo Festival saw many events and games, with countless athletes rising up to represent their schools."
10016100-16 = "It is my personal opinion that each and every event was a thrilling showdown worthy of applause, although perhaps not all of you share this sentiment. Regardless, it was a spectacular field day."
10016100-17 = "I couldn't pick one school or one student to single out for showing incredible sportsmanship and giving an incredible performance. Because each and every one of you did so."
10016100-21 = "So the message I would like to leave you all with is this... I would like to express my deep gratitude to all the students who came and performed to their fullest capabilities on this field day."
10016100-22 = "After all, like it was said during the opening ceremony... The Kivotos Halo Festival is an event by the students and for the students, meant to be enjoyed by all."
10016100-23 = "And with that, I hope that everyone had a fantastic time, and I hereby declare a successful conclusion of the Kivotos Halo Festival!"
10016100-26 = "What should we do now? There's still a lot of stuff to look at around the stadium."
10016100-27 = "Yeah, but honestly I'm pretty hungry..."
10016100-28 = "I heard the vendors are staying open late, even though the event's over."
10016100-29 = "I want to try those Chinese rice bowls we didn't have time for earlier!"
10016100-30 = "I saw a huge pile of firewood in front of the stadium earlier... I wonder if they're going to have a bonfire?"
10016100-31 = "There's going to be an after-party, didn't you know?"
10016100-32 = "It's one of the key attractions of the Kivotos Halo Festival. An after-party with a huge fire and folk dancing for all the students."
10016100-33 = "There's even a legend that says if you dance with your crush around the fire, your love will blossom and last forever!"
10016100-34 = "Is there anyone you want to dance with at the after-party?"
10016100-35 = "Hm, I think I'd want to dance with..."
10016100-37 = "Hasumi, all of the necessary equipment and fire extinguishers for the after-party festivities are ready."
10016100-38 = "And here's the summary you asked for on the amount of ammo consumed during the festival..."
10016100-39 = "Thank you. You've been immensely helpful."
10016100-40 = "When the after-party begins, students may be reckless around the bonfire, so please pay strict attention to security."
10016100-41 = "Let's ensure the festivities conclude on a high note."
10016100-42 = "U-Understood!"
10016100-46 = "[ns] \"I see you're hard at work until the very end, Hasumi.\""
10016100-47 = "Oh, Sensei."
10016100-48 = "Thank you for everything you did today. You were instrumental in ensuring the Kivotos Halo Festival went off without a hitch."
10016100-49 = "[s] \"It's nothing compared to how much work the Executive Committee had to do.\""
10016100-51 = "[ns] \"...Did you have fun at the Halo Festival, Hasumi?\""
10016100-52 = "Me? Do you want to know how I felt about the festival?"
10016100-53 = "Hmm, well to be honest..."
10016100-54 = "...It was awful."
10016100-55 = "Not only was my performance subpar, but in the end I had to stand by and watch as Gehenna was awarded victory at the podium."
10016100-56 = "To make matters worse, we had the endless hijinks of misbehaving students, the constant malfunctioning of Millennium's latest robotics..."
10016100-57 = "And finally, the overwhelming amount of street vendors hawking ultra high-calorie snacks tempting me to ruin my diet right and left!"
10016100-58 = "...It was the worst Kivotos Halo Festival ever."
10016100-59 = "But... I also had the privilege of seeing many students work together to win their matches."
10016100-60 = "And even if I didn't do well, it was exhilarating running with all my power on the track."
10016100-61 = "So, at the very least, I can't deny I had fun."
10016100-62 = "[s] \"I'm happy to hear it.\""
10016100-63 = "Obviously, it would have been even better if Trinity had won the championship."
10016100-64 = "But since I ran anchor for the academy relay, I guess I can't really blame anyone else..."
10016100-68 = "Anyway, Sensei. Those students standing behind you..."
10016100-69 = "[s] \"Behind me...?\""
10016100-74 = "[ns1] \"Yuuka, Ako, and...Mari?\"\n[ns2] \"What are the three of you doing here...?\""
10016100-78 = "W-Well, you see... The after-party will be beginning soon, and we were curious if you were planning on attending..."
10016100-79 = "I promise our intention wasn't to eavesdrop on your conversation... I'm sorry!"
10016100-80 = "I-It's not like I care about legends or anything..."
10016100-81 = "B-But if you don't have a folk dancing partner, I just wanted to let you know that I don't have one either, so I could keep you company... If you'd like."
10016100-82 = "I don't care in the slightest for dancing, but I just saw you two speaking together."
10016100-83 = "I was hoping to hear some dirt I could tease you about later. But, alas."
10016100-85 = "You three truly don't change."
10016100-86 = "The games may be over, but there is still plenty of work to be done, including for the after-party."
10016100-87 = "Aren't any of you concerned with your actual responsibilities as Executive Committee members?"
10016100-89 = "H-Hey, I've already taken care of all the urgent stuff, okay?"
10016100-90 = "I don't need to hear this from a Trinity student."
10016100-92 = "But, you know... I suppose..."
10016100-93 = "It wouldn't be the worst thing in the world if we put off a little work so we can enjoy the festivities. Every once in a while."
10016100-97 = "It'll take them quite a bit of time to get the campfire ready."
10016100-105 = "So... Would anyone like some tea, especially gifted by the Tea Party?"
10016100-106 = "Get Set, Go! Kivotos Halo Festival!"

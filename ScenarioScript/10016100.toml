[translation]
10016100-1 = "尾聲;為了大家的──"
10016100-2 = "（接力賽結束後，「晄輪大祭」也順利進入了尾聲……）"
10016100-3 = "（待千年的代表致上閉幕詞後，大運動會就將圓滿落幕）"
10016100-8 = "選手們及各位觀眾，大家好。#n我是千年研討會的書記兼本次「晄輪大會」實行委員的生塩乃愛。"
10016100-9 = "雖然原本應該由莉央學生會長致閉幕詞，但因為各種原因，將由我代為表述。#n還請各位見諒。"
10016100-10 = "咳哼……如同剛才所說，我是一名以紀錄工作為主的書記，#n因此不太習慣陳述夾雜個人主觀想法的閉幕詞。"
10016100-11 = "因此，我想以書記的身分，藉由回顧今天的日程來為閉幕式畫下句點。"
10016100-15 = "本次晄輪大祭舉行了許多場比賽，也有很多選手參與其中。"
10016100-16 = "就我個人而言，每一場都是驚心動魄且精彩萬分的比賽。#n但是，相信並不是所有人都和我抱有一樣的觀點。"
10016100-17 = "所以很難挑選出一名本次「晄輪大祭」中表現最為活躍的學生。"
10016100-21 = "不過我認為每位學生都是「晄輪大祭的主角」，大家都展現了出色的活躍表現。#n在此向所有參加的人致上深深的謝意。"
10016100-22 = "就像開幕時說的一樣……#n「晄輪大祭」是奇普托斯所有學生一起享受並成就的「屬於大家的慶典」。"
10016100-23 = "最後，希望各位都經歷了一場愉快的慶典──#n──閉幕詞到此結束。"
10016100-26 = "喂，你接下來有什麼計畫。#n要在運動場再待一下嗎？"
10016100-27 = "唔嗯，我有點餓了。"
10016100-28 = "攤販好像會持續營業到晚上……"
10016100-29 = "比賽期間都沒時間吃飯，我們去吃那個看起來很好吃的中華丼吧！"
10016100-30 = "對了，我剛才瞄了一下，運動場前堆滿了木柴……是打算做什麼呢？"
10016100-31 = "你忘記還有後夜祭了嗎？"
10016100-32 = "在後夜祭的時候會升起巨大的篝火，#n讓各學園的學生一起跳土風舞，也算是「晄輪大祭」的看點之一哦！"
10016100-33 = "你沒聽說過只要在後夜祭和喜歡的人一起跳土風舞，兩人就能修成正果嗎？"
10016100-34 = "對了，你有想一起跳舞的對象嗎？"
10016100-35 = "唔嗯，我的話……"
10016100-37 = "蓮實同學，後夜祭需要的器材和滅火工具都準備好了。"
10016100-38 = "然後這是在晄輪大祭中消耗的子彈數量清單……"
10016100-39 = "非常感謝。#n多虧有大家的幫忙，我才能稍作喘息。"
10016100-40 = "後夜祭開始後，可能會有學生在營火前做出危險行為。#n還請多留意安全方面的控管。"
10016100-41 = "那麼再麻煩你到最後一刻了。"
10016100-42 = "是，是！"
10016100-46 = "[ns]「一路努力過來真是辛苦你了，蓮實。」"
10016100-47 = "啊，老師。"
10016100-48 = "老師今天也辛苦了。#n託您的福，晄輪大祭才能圓滿結束。"
10016100-49 = "[s]「跟實行委員們比起來根本不算什麼。」"
10016100-51 = "[ns]「……蓮實有好好享受『晄輪大祭』嗎？」"
10016100-52 = "……是想聽聽我的感想嗎？"
10016100-53 = "這個嘛，從結論上來說……"
10016100-54 = "……糟透了。"
10016100-55 = "沒能在比賽中有所發揮，只能眼睜睜看著格黑娜奪走總冠軍的寶座。"
10016100-56 = "再加上不良學生的事故不斷發生，千年的最新型機器人也出現異常……"
10016100-57 = "而且，還有那麼多與節食勢不兩立的高熱量路邊攤料理……"
10016100-58 = "……真的是場最糟糕的「晄輪大祭」。"
10016100-59 = "但是，學生們齊心協力取得勝利的景象……"
10016100-60 = "以及在大家的應援下，暢快地奔馳在跑道上的經驗……"
10016100-61 = "……不得不說，真的非常開心。"
10016100-62 = "[s]「你能覺得開心真是太好了。」"
10016100-63 = "不過，就如同我剛才說的，如果三一能奪下總冠軍的話，心情會更加愉悅……"
10016100-64 = "但我是學園對抗接力賽的最後一棒，所以也怨不了人。"
10016100-68 = "話說回來，老師。後面的那些學生……"
10016100-69 = "[s]「後面……？」"
10016100-74 = "[ns1]「優香、亞子……還有瑪麗？」\n[ns2]「你們三個在做什麼……？」"
10016100-78 = "那，那個……我是想問問老師會怎麼過後夜祭……"
10016100-79 = "不，不是故意偷窺的，真是抱歉……！"
10016100-80 = "雖然我不是特別迷信這種事……"
10016100-81 = "但假如還沒有決定土風舞的舞伴的話，我可以和你一起跳……"
10016100-82 = "我和優香同學不同，對老師的舞伴不感興趣。#n只是恰巧看到蓮實同學和老師親切交談的樣子……"
10016100-83 = "本來以為能聽到一些有趣的事，以後可以拿來戲弄老師……看來是空歡喜一場呢。"
10016100-85 = "大家還是和開幕式時一樣呢。"
10016100-86 = "比賽雖然結束了，但實行委員會還有後夜祭的事要處理吧？"
10016100-87 = "各位都沒有身為實行委員的責任感嗎……"
10016100-89 = "我，我是把要緊的工作處理完才來的喔？"
10016100-90 = "我可不想被三一的學生那樣說。"
10016100-92 = "呵呵……不過。"
10016100-93 = "偶爾把工作往後推，享受一下慶典也不錯吧。"
10016100-97 = "距離完成營火晚會的準備還有一段時間──"
10016100-105 = "要不要一起享用從茶會那裡收到的紅茶呢？"
10016100-106 = "Get Set, Go！～奇普托斯晄輪大祭～"

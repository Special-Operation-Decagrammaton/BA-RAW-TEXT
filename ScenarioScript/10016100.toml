[translation]
10016100-1 = "บทส่งท้าย;ชาแดงสำหรับทุกคน"
10016100-2 = "(หลังจบการแข่งขันวิ่งผลัด <ฮาโลเฟสติวัล> ก็ดำเนินไปอย่างราบรื่นโดยไร้ความวุ่นวายใดๆ...)"
10016100-3 = "(โรงเรียนมิลเลเนียมกล่าวปิดงานในฐานะเจ้าภาพ และงานก็จบลงอย่างประสบความสำเร็จ)"
10016100-8 = "สวัสดีค่ะ นักกีฬาและผู้ชมทุกท่าน ฉันอุชิโอะ โนอา เลขาฯ ของเซมิน่าแห่งโรงเรียนมิลเลเนียม และหนึ่งในคณะกรรมการจัดงาน <ฮาโลเฟสติวัล> ครั้งนี้ค่ะ"
10016100-9 = "ตามกำหนดการเดิม ประธานริโอะจากโรงเรียนมิลเลเนียมจะเป็นผู้กล่าวปิดงาน แต่ด้วยสถานการณ์ที่#nไม่คาดคิด ฉันจึงได้รับมอบหมายให้มากล่าวปิดแทนค่ะ หวังว่าทุกท่านจะเข้าใจนะคะ"
10016100-10 = "อืม... จากที่แจ้งไปเมื่อสักครู่ว่าฉันมีตำแหน่งเป็นเลขาฯ เลยคุ้นเคยกับการจดบันทึกเรื่องราวมากกว่า#nการพูดค่ะ พอต้องมากล่าวปิดและพูดความประทับใจของฉันเข้าไปด้วย ก็รู้สึกเขินแปลกๆ นะคะ"
10016100-11 = "ดังนั้นในการกล่าวปิดในครั้งนี้ ฉันจะย้อนนึกถึงกำหนดการของงานนี้แทน จะได้ตรงกับบทบาทหลัก#nของเลขาฯ ด้วยค่ะ"
10016100-15 = "ในงานฮาโลเฟสติวัลครั้งนี้มีการแข่งขันหลายรายการ และมีนักกีฬามากมายเข้าร่วมการแข่งขันค่ะ"
10016100-16 = "ส่วนตัวแล้วฉันคิดว่าทุกการแข่งขันมีการแพ้ชนะอย่างสมเกียรติและทุกการแข่งขันก็เป็นไฮไลท์ได้ แต่คนอื่นก็คงมีความคิดเห็นที่แตกต่างกันออกไปใช่มั้ยคะ"
10016100-17 = "ด้วยเหตุนี้ การเลือกนักกีฬาเพียงคนเดียวที่แสดงฝีมือได้อย่างน่าประทับใจใน <ฮาโลเฟสติวัล> ครั้งนี้จึงเป็นเรื่องยากค่ะ"
10016100-21 = "ฉันคิดว่านักเรียนแต่ละคนต่างก็เป็น 'ตัวเอกในงานเทศกาล' ค่ะ ต้องขอบคุณนักเรียนทุกคนที่แสดง#nฝีมืออย่างยอดเยี่ยมในงานมหกรรมแข่งขันกีฬาครั้งนี้นะคะ"
10016100-22 = "อย่างที่กล่าวไปในพิธีเปิดว่า <งานมหกรรมแข่งขันกีฬา> คืองานเทศกาลของทุกคน งานที่ให้นักเรียน#nจากทั่วคิโวทอสได้มาสนุกด้วยกันค่ะ"
10016100-23 = "หวังว่างานในวันนี้จะเป็นเทศกาลที่ทุกคนได้สนุกร่วมกันนะคะ ขอจบการกล่าวปิดงาน <ฮาโลเฟสติวัล> เพียงเท่านี้ค่ะ!"
10016100-26 = "นี่เธอ จะไปไหนเหรอ? ไปเดินเล่นในสนามกีฬาอีกหน่อยมั้ย?"
10016100-27 = "ฉันก็อยากไปอยู่หรอกนะ แต่ตอนนี้เริ่มหิวแล้ว..."
10016100-28 = "จะว่าไป ถึงการแข่งขันจะจบไปแล้ว แต่เห็นว่าร้านค้าริมทางก็ยังเปิดขายต่อจนดึกเลยนะ"
10016100-29 = "ไปกินข้าวราดแกงสูตรจีนกันมั้ย ตอนแข่งกีฬาเรายุ่งกันจนไม่มีเวลาไปกินเลยนี่"
10016100-30 = "เมื่อกี้เห็นมีกองฟืนขนาดใหญ่เตรียมอยู่หน้าสนามกีฬาด้วย... เขาจะมีจุดไฟอะไรกันเหรอ?"
10016100-31 = "ลืมไปแล้วเหรอว่ายังมี 'อาฟเตอร์ปาร์ตี้' อยู่น่ะ?"
10016100-32 = "การจุดแคมป์ไฟขนาดใหญ่และให้นักเรียนจากหลายๆ โรงเรียนมาเต้นรำพื้นเมืองด้วยกันในงาน#nอาฟเตอร์ปาร์ตี้คือหนึ่งกิจกรรมยอดฮิตของ <ฮาโลเฟสติวัล> เลยนะ"
10016100-33 = "จะว่าไป ได้ยินมาว่าหากได้เต้นรำพื้นเมืองกับคนที่ชอบในงานอาฟเตอร์ปาร์ตี้ของฮาโลเฟสติวัล ความรักนั้นจะสมหวังด้วยละ..."
10016100-34 = "นี่ๆ ตอนอาฟเตอร์ปาร์ตี้เธอจะไปเต้นกับใครเหรอ?"
10016100-35 = "อืม ฉันน่ะ..."
10016100-37 = "คุณฮาสุมิ ฉันเตรียมอุปกรณ์ที่จำเป็นและเครื่องมือดับไฟสำหรับอาฟเตอร์ปาร์ตี้เสร็จแล้วค่ะ"
10016100-38 = "ส่วนนี่ก็เอกสารสรุปจำนวนกระสุนปืนที่ใช้ในฮาโลเฟสติวัลที่ขอไว้ค่ะ..."
10016100-39 = "ขอบคุณค่ะ แบบนี้ฉันก็โล่งใจได้แล้วละค่ะ"
10016100-40 = "เดี๋ยวถ้าเริ่มอาฟเตอร์ปาร์ตี้ อาจจะมีนักเรียนซนๆ ที่มาเล่นอันตรายหน้ากองไฟก็ได้ เพราะฉะนั้นเราต้อง#nระวังเรื่องการดูแลความปลอดภัยให้มากขึ้นค่ะ"
10016100-41 = "ถ้าอย่างนั้นก็ขอรบกวนด้วยนะคะ"
10016100-42 = "ค่ะ!"
10016100-46 = "[ns] \"ต้องเหนื่อยจนจบงานเลยนะ ฮาสุมิ\""
10016100-47 = "อ่า คุณครู"
10016100-48 = "วันนี้คุณครูก็ยอดเยี่ยมเหมือนกันค่ะ ต้องขอบคุณที่ช่วยให้ฮาโลเฟสติวัลจบลงได้อย่างราบรื่นนะคะ"
10016100-49 = "[s] \"เทียบกับที่คณะกรรมการจัดงานทำแล้ว ครูไม่ได้ทำอะไรเยอะเลย\""
10016100-51 = "[ns] \"แล้วฮาสุมิล่ะ สนุกกับ <ฮาโลเฟสติวัล> มั้ย?\""
10016100-52 = "คะ? อยากฟังความรู้สึกของฉันเหรอคะ?"
10016100-53 = "อืม ถ้าจะให้พูดสรุปเลยก็..."
10016100-54 = "...... มันแย่ที่สุดเลยค่ะ"
10016100-55 = "ฉันไม่ได้แสดงฝีมือในการแข่งขันมากเท่าไร แล้วก็ยังจะต้องมาเห็นเกเฮนน่าขึ้นไปรับรางวัลชนะเลิศ#nคะแนนรวมด้วย"
10016100-56 = "ไหนจะปัญหาเรื่องเด็กเกเรที่เกิดขึ้นไม่หยุดหย่อน และหุ่นยนต์รุ่นใหม่ล่าสุดของมิลเลเนียมก็ทำงาน#nผิดพลาดอีก..."
10016100-57 = "แถมร้านอาหารริมถนนก็ยังขายแต่อาหารแคลอรีสูงๆ ที่ขัดขวางการไดเอต..."
10016100-58 = "สำหรับฉันแล้ว นี่เป็น <ฮาโลเฟสติวัล> ที่แย่สุดๆ เลยค่ะ"
10016100-59 = "แต่ยังไงก็ได้เห็นนักเรียนหลายๆ คนร่วมมือกันจนคว้าชัยชนะมาได้..."
10016100-60 = "และฉันก็ได้รับแรงเชียร์จากทุกคนจนสามารถวิ่งบนสนามได้อย่างสดชื่น..."
10016100-61 = "แบบนี้คงปฏิเสธไม่ได้ว่าฉันก็สนุกเหมือนกันค่ะ"
10016100-62 = "[s] \"ได้ยินแบบนี้ครูก็ดีใจ\""
10016100-63 = "แต่ถ้าเป็นทรีนิตี้ที่ได้รางวัลชนะเลิศคะแนนรวม ฉันคงสนุกกว่านี้ค่ะ..."
10016100-64 = "แต่ก็จะให้บ่นกับใครได้ล่ะคะ ก็ฉันเป็นนักวิ่งไม้สุดท้ายของการวิ่งผลัดประเภททีมนี่นา"
10016100-68 = "แต่จะว่าไป คุณครูคะ... พวกนักเรียนที่อยู่ข้างหลังนั่น..."
10016100-69 = "[s] \"ข้างหลังเหรอ...?\""
10016100-74 = "[ns1] \"ยูกะ อาโกะ... แล้วก็มารีด้วย?\"\n[ns2] \"ทั้งสามคนมาทำอะไรกันอยู่เหรอ...?\""
10016100-78 = "คือ... คือว่า... พวกฉันสงสัยว่าคุณครูจะไปอาฟเตอร์ปาร์ตี้ที่จะจัดหลังจากนี้หรือเปล่าน่ะค่ะ..."
10016100-79 = "ขอโทษที่มาแอบดูจากข้างหลังนะคะ เหมือนเด็กไม่ดีเลย...!"
10016100-80 = "จริงๆ ฉันก็ไม่ได้เชื่อเรื่องที่เค้าเล่าๆ กันมาหรอก แต่ก็นะ..."
10016100-81 = "ตะ... แต่ว่าถ้าคุณครูยังไม่มีคู่เต้นรำพื้นเมือง ก็มาเต้นกับฉันก็ได้นะคะ ฉันเองก็ยังไม่มีเหมือนกัน... แค่อยากจะมาบอกเท่านี้น่ะ..."
10016100-82 = "ส่วนฉันไม่ได้สนใจเรื่องคู่เต้นรำหรอกค่ะ แค่บังเอิญผ่านมาเห็นคุณฮาสุมิกับคุณครูคุยกันอยู่"
10016100-83 = "ก็เลยคิดว่าคงจะได้ฟังเรื่องสนุกๆ ที่จะเอาไปแซวได้ แต่ก็ไม่มีเรื่องแบบนั้นเลยค่ะ"
10016100-85 = "ทุกคนยังเหมือนกับตอนพิธีเปิดเลยนะคะ"
10016100-86 = "ถึงการแข่งขันจะจบไปแล้ว แต่คณะกรรมการจัดงานก็ยังมีงานอื่นๆ ที่ต้องทำอีกเยอะไม่ใช่เหรอคะ? อาฟเตอร์ปาร์ตี้ก็ใกล้จะจัดแล้วด้วย"
10016100-87 = "ทุกคนทิ้งความรับผิดชอบของคณะกรรมการจัดงานไปแล้วเหรอคะ..."
10016100-89 = "ฉะ... ฉันจัดการเรื่องเร่งด่วนทั้งหมดเสร็จแล้วต่างหาก?"
10016100-90 = "ฉันไม่อยากฟังอะไรแบบนั้นจากนักเรียนทรีนิตี้เลยละค่ะ"
10016100-92 = "ก็นะ แต่ฉันก็เข้าใจค่ะ..."
10016100-93 = "บางครั้งการเพลิดเพลินกับงานเทศกาลโดยผลักความรับผิดชอบออกไปเล็กน้อยก็ไม่เลวหรอกค่ะ"
10016100-97 = "เรายังเหลือเวลาอีกพอสมควรในการเตรียมแคมป์ไฟให้เสร็จ—"
10016100-105 = "งั้นเรามาพักดื่มชาแดงที่ได้มาจากสภาน้ำชากันก่อนมั้ยคะ?"
10016100-106 = "Get Set, Go! ~คิโวทอส ฮาโลเฟสติวัล~"

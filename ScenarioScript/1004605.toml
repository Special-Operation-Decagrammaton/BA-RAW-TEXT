[translation]
1004605-1 = "和伊樹菜一起千鈞一髮！"
1004605-4 = "讓您久等了，主公！"
1004605-5 = "[s] 「不會。話說今天好像又更熱了呢。」"
1004605-6 = "就是說啊……！"
1004605-7 = "天氣預報也說今天是近期最熱的一天……"
1004605-8 = "既然如此，今天的忍者修行要做什麼好呢……？"
1004605-9 = "唔嗯～今天該跟主公做些什麼好呢～？"
1004605-10 = "[s] 「天氣這麼熱，第一個想到的果然還是游──」"
1004605-11 = "！！"
1004605-12 = "游，游泳嗎……！？"
1004605-13 = "那，那個，嗯……"
1004605-14 = "啊！對了！"
1004605-15 = "伊樹菜想到了一個很適合在今天進行的修行！"
1004605-16 = "雖然上次已經跟主公一起建造過沙堡……"
1004605-17 = "不過當時真的很開心，所以還想試試其他玩沙的方法！"
1004605-18 = "[s] 「原來如此，玩沙確實很有趣。」"
1004605-19 = "耶嘿嘿，伊樹菜也這麼覺得！"
1004605-20 = "……哈！？"
1004605-21 = "不，不對！更正一下！不是要玩沙……！"
1004605-22 = "而是用沙子進行忍者修行！"
1004605-23 = "您，您，您覺得如何呢，主公！？"
1004605-24 = "[s1] 「伊樹菜能接受的話我是無所謂……」\n[s2] 「不過要怎麼用沙子修行呢？」"
1004605-27 = "是！雖然這個修行是剛剛才想到的……！"
1004605-28 = "今天伊樹菜打算進行從滾燙的沙子裡逃出去的……"
1004605-29 = "「沙浴逃脫修行」！"
1004605-30 = "[s] 「沙浴……逃脫……？」"
1004605-32 = "伊樹菜在前幾天的時代劇裡看見……"
1004605-33 = "當敵人攻入城堡時，忍者帶著主公從祕密通道離開……"
1004605-37 = "主公順利逃脫的同時，忍者馬上用炸彈將祕密通道炸毀！"
1004605-43 = "爆炸颳起泥沙！讓敵人陷入恐慌！"
1004605-44 = "只可惜主公雖然順利逃了出來，被捲入爆炸的忍者卻被埋在了泥沙底下！"
1004605-45 = "難道他要犧牲自己嗎……！？#n就在伊樹菜忐忑不安的時候！"
1004605-47 = "忍者從崩塌的泥沙中，帥氣地一躍而出！"
1004605-48 = "[s] 「所以我們今天……」"
1004605-49 = "是的！伊樹菜也想嘗試看看！"
1004605-50 = "而且忍者本來就該為所有極限狀況做準備……"
1004605-51 = "今天這麼熱，也可以說是一種極限狀況！"
1004605-52 = "……所以主公！"
1004605-53 = "在伊樹菜身上堆沙子吧！"
1004605-54 = "伊樹菜會盡全力從沙浴裡逃出去的！"
1004605-55 = "[s] （……這種東西能算修行嗎？）"
1004605-59 = "[ns] 「我知道了，不過在大太陽底下有點危險，先去找個有陰影的地方吧。」"
1004605-60 = "是！"
1004605-65 = "（於是找了個有點陰影的地方，開始進行「沙浴逃脫修行」）"
1004605-66 = "[ns] 「覺得很難受的話，一定要跟我說喔。」"
1004605-67 = "是，拜託主公了！"
1004605-75 = "[ns] 「這樣行嗎？」"
1004605-76 = "那個，伊樹菜試試看……喝！"
1004605-77 = "啊，一下子就出來了！"
1004605-78 = "主公，請再多堆一點！"
1004605-79 = "[s] 「那，那麼……」"
1004605-84 = "[ns] 「這樣如何？」"
1004605-85 = "唔嗯，感覺還是很簡單就能出來了……"
1004605-86 = "主公，請再堆更多一點！"
1004605-87 = "[s] 「好，好……！」"
1004605-92 = "[ns] 「那，那這樣……」"
1004605-93 = "不行，這還完全稱不上是極限狀態！"
1004605-94 = "請再堆更多一點！"
1004605-98 = "[ns] 「已經有點危險了吧……！？」"
1004605-99 = "不行，還可以堆更多！還能再更多一點才對！"
1004605-100 = "[ns] 「呃！伊樹菜的極限究竟在哪……！」"
1004605-105 = "（之後依舊努力地堆著沙子……）"
1004605-109 = "（而伊樹菜則不斷重複著要堆更多……）"
1004605-110 = "[ns] 「這，這下還真的是不得了了……」"
1004605-114 = "（最後堆出的沙堆已經完全看不到伊樹菜，遠看甚至會以為是個沙丘）"
1004605-118 = "[ns] 「伊樹菜，這樣就行了嗎？」"
1004605-120 = "[ns] 「……伊樹菜？」"
1004605-122 = "[ns] 「伊樹菜！？」"
1004605-134 = "[ns] 「伊樹菜，你沒事吧！？」"
1004605-135 = "主公……"
1004605-136 = "[s] 「……？」"
1004605-137 = "耶嘿嘿……再多玩一會兒嘛……主公……"
1004605-138 = "難得的夏天……還想和主公……再多玩一下……"
1004605-139 = "呼嚕……"
1004605-140 = "[s] 「……看來是玩累了。」"
1004605-144 = "[ns] 「……嗯，盡情地玩吧。」"
1004605-147 = "（於是把沙丘縮小到不會造成負擔的大小）"
1004605-152 = "（並在睡著的伊樹菜旁邊，看書度過了悠閒的時光）"

[translation]
1004605-1 = "Escaping Crisis with Izuna!"
1004605-4 = "My lord! You're here!"
1004605-5 = "[s] \"Hey, Izuna. It seems hotter than usual today.\""
1004605-6 = "Hmm, yes!"
1004605-7 = "The weather report says today is gonna be extra hot..."
1004605-8 = "For ninja training, we should always consider the environment!"
1004605-9 = "Hmm... What should we do today?"
1004605-10 = "[s] \"Okay, today really is the perfect day for swi...\""
1004605-11 = "(Shock)"
1004605-12 = "S-S-S-Swimming...?"
1004605-13 = "Oh... Um... Uh..."
1004605-14 = "Oh, right!"
1004605-15 = "I-I know of the perfect kind of training for a hot day like this, my lord!"
1004605-16 = "Last time, all we did was build sandcastles, but..."
1004605-17 = "Oh...! Making sandcastles is so fun! I wanna do it again!"
1004605-18 = "[s] \"Oh, so...do you wanna play in the sand again today?\""
1004605-19 = "You would do that, my lord? Heehee!"
1004605-20 = "...Wait, oops!"
1004605-21 = "N-N-No, my lord! We have to train today! "
1004605-22 = "Yes, I'm here for ninja training, not swimming!"
1004605-23 = "I-Is that okay, my lord?"
1004605-24 = "[s1] \"If that's what you want, sure...\"\n[s2] \"What kind of a training do you want to do?\""
1004605-27 = "Okay! It's a particular training I just thought of!"
1004605-28 = "Today, I want to do training for escaping from hot sand. It's called..."
1004605-29 = "Sand Burial Escape Ninjutsu Training!"
1004605-30 = "[s] \"That sounds very dangerous.\""
1004605-32 = "I saw a historical ninja movie not too long ago!"
1004605-33 = "When enemies invaded a castle, the lord and a ninja escaped through a secret passage..."
1004605-37 = "There was a scene where after the lord passed through, the ninja used a bomb to detonate the passage!"
1004605-43 = "The ground crumbled down and the enemies panicked!"
1004605-44 = "The ninja was bait to save the lord and got buried with the enemies in the passage!"
1004605-45 = "I was nervous that would be the end for the ninja, but then...!"
1004605-47 = "Ta-da! The ninja escaped through the dirt! It was brilliant!"
1004605-48 = "[s] \"So, when you saw that, you...\""
1004605-49 = "Yes! I wanted to try it myself!"
1004605-50 = "A ninja must be prepared for the most extreme situations..."
1004605-51 = "On a hot day like this, we could do training that really helps me with that!"
1004605-52 = "...So on that note, my lord!"
1004605-53 = "Can you bury me in the sand?"
1004605-54 = "Then I'll do everything I can to escape!"
1004605-55 = "[s] \"(Hmm, not sure if that serves as training...)\""
1004605-59 = "[ns] \"Okay, but let's do it in the shade. You might get heatstroke.\""
1004605-60 = "Heeheehee. Yes, my lord!"
1004605-65 = "So we went to a shady spot to perform the Sand Burial Escape Ninjutsu Training."
1004605-66 = "[ns] \"If it gets too unbearable, you have to let me know, okay? I'll start.\""
1004605-67 = "Okay! I'm ready!"
1004605-75 = "[ns] \"All right, Izuna. How's that?\""
1004605-76 = "Umm, if I move my body like this..."
1004605-77 = "My lord! I think I could use more sand!"
1004605-78 = "The training will be more meaningful if you put sand until my arms and legs are pressed down!"
1004605-79 = "[s] \"If you say so...\""
1004605-84 = "[ns] \"How about now?\""
1004605-85 = "Hmm... It's still slightly lacking..."
1004605-86 = "My lord! Just a little more... Yes! A little more!"
1004605-87 = "[s] \"...O-Okay!\""
1004605-92 = "[ns] \"All right. How is that...?\""
1004605-93 = "No...! My lord! I need more sand to create a more dramatic situation!"
1004605-94 = "Please, put more!"
1004605-98 = "[s] \"Isn't this getting dangerous?!\""
1004605-99 = "It's okay, my lord! A little more!"
1004605-100 = "[ns] \"Whoa! What's Izuna's limit?!\""
1004605-105 = "I kept putting sand on top of Izuna at her request."
1004605-109 = "I checked in on her over and over while piling up sand, but she insisted she was okay..."
1004605-110 = "[ns] \"Th-This is way too extreme...\""
1004605-114 = "I piled up the sand until I couldn't even see Izuna."
1004605-118 = "[ns] \"...Izuna, are we done?\""
1004605-120 = "[ns] \"Um, Izuna...?\""
1004605-122 = "[ns] \"Oh, no, no! I buried her alive! Are you okay, Izuna?!\""
1004605-134 = "[ns] \"Izuna?! Please don't be dead!\""
1004605-135 = "Mmm... My lord."
1004605-136 = "[s] \"...Huh?"
1004605-137 = "Heeheehee... Let's play more, my lord..."
1004605-138 = "It's summer...and I want to...be with you..."
1004605-139 = "Zzz..."
1004605-140 = "[s] \"I guess she was tired.\""
1004605-144 = "[ns] \"Sure, let's keep playing.\""
1004605-147 = "While Izuna took a nap,"
1004605-152 = "I opened a parasol and read a book, enjoying the relaxing summer afternoon."

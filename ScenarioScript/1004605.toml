[translation]
1004605-1 = "หนีวิกฤตกับอิซุนะ!"
1004605-4 = "นายท่านมาแล้วเหรอคะ! "
1004605-5 = "[s] \"ว่าไงอิซุนะ วันนี้อากาศร้อนว่าปกติเลยนะ\""
1004605-6 = "อื้ม ค่ะ~!"
1004605-7 = "พยากรณ์อากาศก็บอกว่าวันนี้จะร้อนมากกว่าปกติค่ะ..."
1004605-8 = "สำหรับนินจาแล้ว เราต้องคำนึงถึงสภาพอากาศตลอดเวลา..."
1004605-9 = "อืม~ วันนี้จะทำอะไรกับนายท่านดีนะ~?"
1004605-10 = "[s] \"เอาล่ะ ถ้างั้นวันนี้เรามาว่าย--\""
1004605-11 = "(ตกใจ)"
1004605-12 = "วะ...ว่ายน้ำงั้นเหรอคะ?"
1004605-13 = "อืม... พอดีว่า..."
1004605-14 = "อ๊ะ จริงด้วยค่ะ!"
1004605-15 = "มะ...มีการฝึกที่เหมาะกับวันที่อากาศร้อนๆ แบบนี้อยู่ด้วยนะคะ นายท่าน!"
1004605-16 = "ครั้งที่แล้ว เราได้ฝึกสร้างปราสาททรายไปแล้ว..."
1004605-17 = "อื้อ...! ตอนสร้างปราสาททรายสนุกมากเลยค่ะ! ฉันอยากทำอีกจังเลย!"
1004605-18 = "[s] \"ถ้างั้นวันนี้มาเล่นสร้างปราสาททรายกันอีกมั้ย?\""
1004605-19 = "อ๊ะ จริงเหรอคะนายท่าน?! ฮิฮิฮิ งั้นมาเล่นกันมั้ยคะ?"
1004605-20 = "เดี๋ยวสิคะ?!"
1004605-21 = "มะ... ไม่ค่ะ นายท่าน! วันนี้เราต้องฝึกฝนกันนะ...! "
1004605-22 = "ค่ะ! วันนี้เราออกมาฝึกฝนในฐานะนินจาค่ะ! มะ...ไม่ใช่การว่ายน้ำด้วยค่ะ!"
1004605-23 = "ตะ...ตกลงมั้ยคะ นายท่าน?!"
1004605-24 = "[s1] \"ถ้าอิซุนะอยากทำแบบนั้น ครูก็ไม่ติดหรอก...\"\n[s2] \"คราวนี้จะฝึกอะไรเหรอ?\""
1004605-27 = "ค่ะ! อิซุนะนึกได้เมื่อกี้เลยค่ะ...!"
1004605-28 = "วันนี้เพื่อหลบหนีจากหาดทรายที่ร้อนระอุ..."
1004605-29 = "ฉันอยากฝึก <วิถีนินจาหลบหนีการอบทรายร้อน> ค่ะ!"
1004605-30 = "[s] \"หลบหนีการอบทรายร้อน...?\""
1004605-32 = "อิซุนะเห็นมาจากซีรีส์นินจาย้อนยุคที่เคยดูมาเมื่อไม่มานานนี้ค่ะ...!"
1004605-33 = "ตอนที่พวกศัตรูบุกเข้ามาที่ปราสาท นินจาก็พานายท่านหลบหนีด้วยเส้นทางลับ..."
1004605-37 = "เป็นฉากที่พอนินจาดูจนแน่ใจแล้วว่านายท่านหลบหนีออกไปได้ นินจาก็ระเบิดเส้นทางลับทิ้งค่ะ!"
1004605-43 = "ดินและทรายกระจายฟุ้ง และเหล่าศัตรูตกอยู่ในความตกตะลึง!"
1004605-44 = "นินจาที่ใช้ตัวเองเป็นเหยื่อล่อเพื่อช่วยเหลือนายท่าน สุดท้ายก็ถูกฝังไปพร้อมกับเหล่าศัตรูในเส้น#nทางลับนั้นค่ะ!"
1004605-45 = "และในตอนที่อิซุนะกำลังจดจ่ออยู่ ว่านินจาคนนั้นจะต้องจบชีวิตไปแบบนี้จริงหรือไม่...!"
1004605-47 = "ทาด๊า~! นินจาก็หลบหนีออกมาจากกองดินที่ถล่มลงมาได้อย่างงดงามค่ะ!"
1004605-48 = "[s] \"อิซุนะดูฉากนั้นมาก็เลยอยากลองสินะ...\""
1004605-49 = "ค่ะ! อิซุนะเองก็อยากลองทำแบบนั้นค่ะ!"
1004605-50 = "ในฐานะนินจาจะต้องเตรียมพร้อมเผชิญหน้าสถานการณ์ที่เลวร้ายแบบนั้นเอาไว้..."
1004605-51 = "และก็ยังเป็นการฝึกฝนที่เหมาะกับในวันที่อากาศร้อนแบบนี้ด้วยค่ะ!"
1004605-52 = "เพราะงั้นนายท่านคะ...!"
1004605-53 = "นายท่านช่วยกลบทรายบนตัวอิซุนะให้หน่อยได้มั้ยคะ?"
1004605-54 = "แล้วอิซุนะจะใช้แรงทั้งหมดที่มีหลบหนีออกจากการอบทรายร้อนให้ดูค่ะ!"
1004605-55 = "[s] (อืม อาจเป็นการฝึกจริงๆ ก็ได้นะ...)"
1004605-59 = "[ns] \"เข้าใจแล้ว แต่เล่นกลางแดดร้อนๆ จะแย่เอา เข้าไปในร่มดีกว่า\""
1004605-60 = "ฮิฮิฮิ ค่า!"
1004605-65 = "(คุณครูกับอิซุนะเดินไปหาพื้นที่เหมาะๆ ใต้ร่มไม้เพื่อฝึก <วิถีนินจาหลบหนีการอบทรายร้อน> ด้วยกัน)"
1004605-66 = "[ns] \"ถ้าระหว่างฝึกแล้วเหนื่อยขึ้นมาก็บอกครูนะ \""
1004605-67 = "ค่ะ อิซุนะพร้อมแล้วค่ะ!"
1004605-75 = "[ns] \"เอาละ เท่านี้พอมั้ยอิซุนะ?\""
1004605-76 = "อืม ถ้ากลบทรายบนตัวแบบนี้..."
1004605-77 = "นายท่าน! เท่านี้อาจจะไม่พอก็ได้ค่ะ!"
1004605-78 = "ช่วยกลบทรายลงมาให้ท่วมช่วงแขนขาอีกหน่อยนะคะ จะได้มีผลต่อการฝึกค่ะ...!"
1004605-79 = "[s] \"เข้าใจแล้ว ถ้างั้น...\""
1004605-84 = "[ns] \"เอาละ แบบนี้เป็นไง\""
1004605-85 = "อืม... ดูเหมือนจะยังไม่พอนะคะ"
1004605-86 = "นายท่านคะ! ช่วยกลบตรงนี้เพิ่มอีกหน่อยค่ะ...! ใช่ค่ะ เพิ่มอีกหน่อยค่ะ!"
1004605-87 = "[s] \"กะ...ก็ได้!\""
1004605-92 = "[ns] \"ถ้างั้นแบบนี้ล่ะเป็นไง...?\""
1004605-93 = "ยังไม่พอค่ะ นายท่าน! ต้องกลบทรายเพิ่มอีกให้สมกับเป็นสถานการณ์วิกฤตค่ะ!"
1004605-94 = "ช่วยกลบทรายเพิ่มลงมาอีกหน่อยค่ะ!"
1004605-98 = "[ns] \"ครูว่ามันชักจะอันตรายแล้วนะ...?!\""
1004605-99 = "นายท่าน! ขออีกนิดนึงนะคะ อีกนิดเดียวก็ได้ค่ะ!"
1004605-100 = "[ns] \"ขีดจำกัดของอิซุนะจะไปหยุดที่ตรงไหนกันนะ!\""
1004605-105 = "(จากนั้นคุณครูก็ถมทรายทับลงไปอีกเรื่อยๆ ตามคำขอของอิซุนะที่เอาแต่บอกว่ายังไม่พอ#nและขอให้เททรายลงไปอีกเรื่อยๆ...)"
1004605-109 = "(หลังจากเททรายถมลงไปเรื่อยๆ ก็กลายเป็นกองเนินทรายสูงขึ้นมา...)"
1004605-110 = "[ns] \"กะ...กลายเป็นทรายกองใหญ่เลยนะเนี่ย...\""
1004605-114 = "(ทรายที่ถมลงไปมีขนาดกองใหญ่มากๆ จนมองไม่เห็นอิซุนะเลย)"
1004605-118 = "[ns] \"อิซุนะ... เท่านี้พอรึยัง?\""
1004605-120 = "[ns] \"นี่ อิซุนะ...?\""
1004605-122 = "[ns] \"นี่ฝังทั้งเป็นไปแล้วรึเปล่าเนี่ย?! อิซุนะเป็นอะไรรึเปล่า?!\""
1004605-134 = "[ns] \"อิซุนะ?! อย่าเพิ่งตุยนะ...?!\""
1004605-135 = "งืมๆ... นาย-ท่าน..."
1004605-136 = "[s] \"หืม?...\""
1004605-137 = "ฮิฮิฮิ... มาเล่นกันต่ออีกหน่อยสิคะ... นายท่าน..."
1004605-138 = "ฤดูร้อน... อิซุนะ... กับนายท่าน... มาเล่น... กันอีก..."
1004605-139 = "คร่อก....ฟี้..."
1004605-140 = "[s] \"คงจะเหนื่อยสิน้า\""
1004605-144 = "[ns] \"อื้อ ไว้มาเล่นกันให้เต็มที่เลยนะ\""
1004605-147 = "(คุณครูนั่งอยู่ข้างๆ อิซุนะที่นอนกลางวัน...)"
1004605-152 = "(คุณครูนำร่มกันแดดมากางและใช้เวลายามบ่ายในฤดูร้อนอย่างสบายๆ ไปกับการอ่านหนังสือ)"

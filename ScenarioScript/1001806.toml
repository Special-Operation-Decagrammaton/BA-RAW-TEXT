[translation]
1001806-1 = "งานพาร์ทไทม์ของเด็กขี้อาย 2"
1001806-2 = "ทางเข้าสวนสนุกประตูหน้า"
1001806-4 = "ไม่ไหวหรอกค่ะ...!"
1001806-5 = "ถึงจะบอกว่าเป็นงานพาร์ทไทม์ที่ไม่ต้องเจอผู้คนโดยตรง แต่นี่พาฉันมาสวนสนุกที่มีคนเยอะมาก..."
1001806-6 = "ฉันเชื่อใจคุณครู...... เชื่อใจคุณครูแท้ๆ......!"
1001806-7 = "[s] \"ไม่ต้องห่วงนะ นี่ไม่ใช่งานพาร์ทไทม์เหมือนครั้งก่อน\""
1001806-8 = "มีงานพาร์ทไทม์ที่ไม่ต้องเจอผู้คนในสวนสนุกด้วยเหรอ..."
1001806-9 = "...คะ? งานพาร์ทไทม์ใส่ชุดตุ๊กตาแจกลูกโป่งให้เด็กๆ เหรอคะ?"
1001806-10 = "แน่นอนว่ามันดีกว่าการเจอลูกค้าด้วยหน้าตาเปล่าๆ แต่... แต่ว่าฉันก็ยังกลัวการเข้าหาคนไม่รู้จัก#nก่อนอยู่เหมือนเดิมค่ะ..."
1001806-11 = "ยิ่งไปกว่านั้นนักเรียนพาร์ทไทม์ที่ใส่ชุดตุ๊กตาจะยิ่งกลายเป็นจุดสนใจได้ง่ายๆ..."
1001806-12 = "หากเด็กๆ มาล้อเล่นใส่ระเบิดมือในชุดตุ๊กตา หรือยิงกระสุนไล่ฉันล่ะ..."
1001806-13 = "[s] \"คงไม่มีเรื่องอย่างนั้นหรอก...\""
1001806-14 = "อย่างนั้นเหรอคะ? ฉันคงจะกังวลเกินไปสินะคะ?"
1001806-15 = "[s1] \"งานนี้ง่ายกว่าครั้งก่อน ไม่น่ามีปัญหา\"\n[s2] \"ถ้าเป็นยูสึคงทำได้ดีอยู่แล้วล่ะ\""
1001806-16 = "......คุณครูพูดถูกค่ะ ถ้ามัวแต่วิ่งหนีเพราะกลัวสายตาของคนอื่น ฉันคงอยู่ในตู้ไปตลอด#nและทำให้สมาชิกคนอื่นเดือดร้อนค่ะ"
1001806-17 = "......คุณครูพูดถูกค่ะ ถ้ามัวแต่วิ่งหนีเพราะกลัวสายตาของคนอื่น ฉันคงอยู่ในตู้ไปตลอด#nและทำให้สมาชิกคนอื่นเดือดร้อนค่ะ"
1001806-18 = "เพราะฉันไม่สามารถอยู่คนเดียวไปตลอดได้....."
1001806-19 = "ครั้งนี้ฉันจะตั้งใจทำเต็มที่ค่ะ!"
1001806-20 = "ฮานาโอกะ ยูสึจะพยายามค่ะ!"
1001806-29 = "ดะ... เด็กๆ ทุกคน มารับลูกโป่งกันจ้า ลูกโป่งจ้า!"
1001806-30 = "ว้าว ขอบคุณค่ะ!"
1001806-31 = "ยะ... ยินดีจ้า ฮ่าฮ่าฮ่า..."
1001806-34 = "(พอใส่ชุดตุ๊กตาแบบนี้... รู้สึกว่าการพูดคุยไม่ยากเท่าตอนปกตินะคะ)"
1001806-35 = "(ถ้าเป็นแบบนี้ ฉันจะทำได้จนครบเวลา...)"
1001806-38 = "คือว่า... พี่สาวชุดตุ๊กตา"
1001806-39 = "จะ... จ๊ะ? ฉะ... ฉันเหรอ?"
1001806-40 = "อื้ม ชุดตุ๊กตานี่ เพโรโร่ป่ะคะ?"
1001806-41 = "จ๊ะ! ชะ.. ใช่จ่ะ...! ชื่อเพโรโร่จ่ะ!"
1001806-42 = "อ๊ะ! จะว่าไปสำเนียงเพโรโร่ไม่ใช่แบบนั้นใช่มั้ยจ๊ะ?"
1001806-43 = "ขอโทษด้วยนะ เพโรเพโร่...!#nได้โปรดอย่ายิงกระสุนใส่ชุดตุ๊กตานะ เพโรเพโร่...!"
1001806-44 = "ไม่ใช่อย่างนั้นค่ะ... หนูอยากถ่ายรูปกับเพโรโร่..."
1001806-45 = "ถ่ายรูปด้วยกันสักรูปได้มั้ยคะ?"
1001806-46 = "ถ้าเป็นเรื่องนั้น... ได้เลย เพโรเพโร่..."
1001806-47 = "ว้าว ขอบคุณค่ะ!#nแม่คะ ทางนี้ ทางนี้! ถ่ายรูปหนูกับเพโรโร่ให้หน่อยค่า~"
1001806-50 = "(ทุกคน...ดูสนุกจังเลย...)"
1001806-51 = "(พอได้เห็นท่าทางผู้คนที่มีความสุขใกล้ๆ แบบนี้ งานพาร์ทไทม์นี้ก็อาจจะไม่ได้แย่...)"
1001806-54 = "เฮ้อ... ฉันทำงานพาร์ทไทม์เสร็จแล้วค่ะ"
1001806-55 = "[s] \"เทียบกับตอนแรกแล้ว เหมือนจะคุ้นเคยขึ้นเยอะเลยนะ\""
1001806-56 = "มะ.. ไม่เลยค่ะ... ฉันยังกลัวการพบคนแปลกหน้าอยู่ค่ะ...!"
1001806-57 = "แต่ว่าถึงยังไง... ฉันก็ภูมิใจที่ได้ทำให้ผู้คนมีความสุขค่ะ"
1001806-58 = "ถ้าความพยายามของฉันทำให้ผู้คนสนุกและมีความสุขได้ แม้ว่าจะเป็นงานที่เหนื่อยหรืองานหนัก#nก็ทำให้ฉันรู้สึกมีความสุขขึ้นค่ะ"
1001806-59 = "เหมือนกับการสร้างเกม..."
1001806-60 = "คุณครูคะ ฉันจะพยายามให้มากกว่านี้ค่ะ!"
1001806-61 = "เพราะงั้นต่อจากนี้ไป... คอยดูฉันด้วยนะคะ!"

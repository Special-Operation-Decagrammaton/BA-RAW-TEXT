[translation]
1001806-1 = "害羞鬼的打工（２）"
1001806-2 = "遊樂園．正門入口"
1001806-4 = "我做不到……！"
1001806-5 = "明，明明聽說是不用跟人直接接觸的打工，沒想到竟然是在人這麼多的遊樂園……"
1001806-6 = "我明明這麼相信老師……這麼相信你的……"
1001806-7 = "[s] 「別擔心，和上一個打工的工作內容不一樣的。」"
1001806-8 = "但，但是在遊樂園裡不跟別人接觸的打工……"
1001806-9 = "……咦？是穿著布偶裝發氣球給小朋友的打工嗎？"
1001806-10 = "當，當然可能會比直接面對客人好一點……但要主動接觸不認識的人還是很可怕……"
1001806-11 = "而且，穿著布偶裝的打工很容易成為別人的目標吧……"
1001806-12 = "要，要是那些小朋友惡作劇往布偶裝裡丟手榴彈，或是一邊開槍一邊追著我的話該怎麼辦……"
1001806-13 = "[s] 「那種事應該不會發生吧……」"
1001806-14 = "是，是這樣嗎？只是我想太多了嗎……？"
1001806-15 = "[s1] 「是比上次還簡單的工作，我想應該沒問題的唷。」\n[s2] 「我覺得柚子應該能做得很好的唷。」"
1001806-16 = "……老，老師說得對。而且，如果一直害怕別人的視線而不斷逃避的話，我就只能永遠待在櫃子裡面，繼續給其他部員困擾了……"
1001806-17 = "……老，老師說得對。而且，如果一直害怕別人的視線而不斷逃避的話，我就只能永遠待在櫃子裡面，繼續給其他部員困擾了……"
1001806-18 = "也不能永遠這樣下去呢……"
1001806-19 = "我這次一定會全力以赴，好好完成的……！"
1001806-20 = "花岡柚子會加油的！"
1001806-29 = "大，大家～請來拿氣球吧～是，是汽球唷──……！"
1001806-30 = "哇，謝謝！"
1001806-31 = "不，不客氣。啊，啊哈哈……"
1001806-34 = "（不，不知道是不是因為穿著布偶裝……好像比平常更容易和別人說話了……）"
1001806-35 = "（這樣的話，到結束之前應該沒問題……）"
1001806-38 = "那個……布偶裝的大姊姊。"
1001806-39 = "咦，怎，怎麼了？是在說我嗎？"
1001806-40 = "嗯。你穿著的那個是佩洛洛對吧？"
1001806-41 = "對，對喔！沒錯……！是，是佩洛洛唷……！"
1001806-42 = "啊啊……！這麼說來，佩洛洛的說話方式不是這樣的對吧？"
1001806-43 = "不，不好意思呸囉呸囉……！#n請，請千萬不要對著布偶裝發射散彈塊唷，呸囉呸囉……！"
1001806-44 = "呃，不是那樣的……我只是想跟佩洛洛一起拍張照……"
1001806-45 = "可以一起拍照嗎？"
1001806-46 = "如果是這樣的話……要拍多少都可以唷，呸囉呸囉……"
1001806-47 = "哇，謝謝大姊姊！#n媽媽！這裡這裡！快來跟佩洛洛拍照吧！"
1001806-50 = "（總覺得……好像很開心……）"
1001806-51 = "（能這樣近距離地看見別人開心的樣子，或許接待客人也不全然都是壞事……）"
1001806-54 = "呼……總，總算是順利結束了……"
1001806-55 = "[s] 「跟一開始比起來好像習慣很多了呢。」"
1001806-56 = "才，才沒有……！和陌生人說話還是很可怕……！"
1001806-57 = "但是……就算這樣，在讓孩子們快樂的瞬間，我也覺得很開心。"
1001806-58 = "雖然很辛苦也很累……但這份努力如果能讓別人感到幸福的話，也是件開心的事。我覺得這件事很有價值。"
1001806-59 = "就和製作遊戲是一樣的……"
1001806-60 = "老師，我會更努力的！"
1001806-61 = "所，所以之後……請再關照我一下吧……！"

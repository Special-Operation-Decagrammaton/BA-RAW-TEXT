1001806-5 = "3;유즈;04;사람을 직접 마주하지 않고서 할 수 있는 아르바이트라고 하셨으면서, 사람이 많은 놀이공원으로 저를 데려오시다니……."
1001806-6 = "3;유즈;04;선생님을 믿었는데…… 믿었었는데……!\n#3;stiff\n#3;em;[속상함]"
1001806-7 = "[s] \"걱정하지 마. 지난번과 같은 아르바이트는 아니니까.\""
1001806-8 = "3;유즈;06;하지만 놀이공원에서 사람들과 마주치지 않고 할 수 있는 아르바이트가 있을 리가……."
1001806-9 = "3;유즈;02;……네? 인형탈을 쓰고 아이들에게 풍선을 나누어 주는 아르바이트요?\n#3;em;[?]"
1001806-10 = "3;유즈;01;무, 물론 맨얼굴로 손님들과 마주하는 것보다는 낫지만…… 그래도 모르는 사람에게 먼저 다가가는 건 여전히 무서운걸요…….\n#3;em;…"
1001806-11 = "3;유즈;04;게다가 인형탈을 쓴 아르바이트 학생은 장난의 표적이 되기도 쉬워서…….\n#3;em;[땀]\n#3;stiff"
1001806-12 = "3;유즈;04;혹시 아이들이 장난이라며 인형 옷에 수류탄을 집어넣거나, 슬러그 탄을 쏘며 쫓아오면 어쩌죠……."
1001806-13 = "[s] \"그런 일은 없지 않을까…….\""
1001806-14 = "3;유즈;02;그, 그렇겠죠? 제가 너무 걱정을 하는 거겠죠?"
1001806-15 = "[s1] \"저번보다 더 쉬운 일이니 문제없을 거야.\"\n[s2] \"유즈라면 무엇이든 잘 할 수 있을 거야.\""
1001806-16 = "3;유즈;01;……선생님 말이 맞아요. 다른 사람의 시선이 무섭다고 계속 도망치기만 했더라면, 저는 영영 캐비닛 속에서 머무르며 다른 부원들에게 폐만 끼치고 있었을 거예요."
1001806-17 = "3;유즈;01;……선생님 말이 맞아요. 다른 사람의 시선이 무섭다고 계속 도망치기만 했더라면, 저는 영영 캐비닛 속에서 머무르며 다른 부원들에게 폐만 끼치고 있었을 거예요."

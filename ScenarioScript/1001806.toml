[translation]
1001806-1 = "A Shy Girl's Part-Time Job 2"
1001806-2 = "Theme Park Main Entrance"
1001806-4 = "No way..."
1001806-5 = "You said this was a part-time job that didn't require direct contact with people, and yet you've brought me to a theme park full of people..."
1001806-6 = "Sensei, I trusted you... I trusted you!"
1001806-7 = "[s] \"Don't worry. It's not the same kind of part-time job as last time.\""
1001806-8 = "But there's no kind of part-time job you can do at a theme park without running into people!"
1001806-9 = "...Huh? It's a part-time job where I wear a costume and give out balloons to children?"
1001806-10 = "O-Of course it's better than meeting people face-to-face, but...it's still scary to approach strangers..."
1001806-11 = "Besides, student part-timers in costume are easy targets for pranks..."
1001806-12 = "What if children put grenades in my costume? Or chase me around with shotguns?"
1001806-13 = "[s] \"Those are...oddly specific concerns.\""
1001806-14 = "Y-Yeah? Am I worrying too much?"
1001806-15 = "[s1] \"It's easier than the last job, so it won't be a problem.\"\n[s2] \"Yuzu, you can do anything.\""
1001806-16 = "...You're right, Sensei. If I kept running away out of fear of other people, I would still be in the cabinet, causing trouble for the other members."
1001806-17 = "...You're right, Sensei. If I kept running away out of fear of other people, I would still be in the cabinet, causing trouble for the other members."
1001806-18 = "I can't be a loner forever..."
1001806-19 = "I'll do my best this time!"
1001806-20 = "I, Hanaoka Yuzu, will do my best!"
1001806-29 = "H-Hi kids. Have a balloon. C-C'mon, take one!"
1001806-30 = "Wow, thank you!"
1001806-31 = "M-My pleasure. Ha, hahaha..."
1001806-34 = "(Maybe it's because I'm in costume...but talking to others doesn't feel as difficult as it used to.)"
1001806-35 = "(If I just hang in there until closing time...)"
1001806-38 = "Excuse me...girl in the costume?"
1001806-39 = "Y-Yes? A-Are you talking to me?"
1001806-40 = "Yes. That's a Peroro costume, right?"
1001806-41 = "Y-Yes...! Th-That's right...! It's Peroro!"
1001806-42 = "A-Ah! C-Come to think of it, Peroro doesn't talk like this, right?"
1001806-43 = "I-I'm sorry, peropero! P-Please don't shoot me, peropero!"
1001806-44 = "I don't do things like that... I just want to take a picture with Peroro..."
1001806-45 = "Can you take a picture with me?"
1001806-46 = "Oh, in that case...o-of course I can. Peropero..."
1001806-47 = "Wow, thank you! Mom, over here. Here! Come quick and take a picture of me and Peroro!"
1001806-50 = "(Everyone seems to be...having fun...)"
1001806-51 = "(Seeing people having fun like this... Maybe this part-time job might not be so bad...)"
1001806-54 = "Phew...I-I somehow finished my shift..."
1001806-55 = "[s] \"You seem to have really gotten used to the job.\""
1001806-56 = "N-Not really! I'm still scared of meeting strangers..."
1001806-57 = "But still...I think it's rewarding to be able to make someone happy."
1001806-58 = "If someone can enjoy themselves and be happy because of me, then even if it's hard and painful, it's worth it."
1001806-59 = "It's just like developing a game..."
1001806-60 = "Sensei, I'm going to try harder!"
1001806-61 = "So, please keep...watching out for me!"

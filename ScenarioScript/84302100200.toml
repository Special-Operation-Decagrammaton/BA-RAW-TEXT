[translation]
84302100200-5 = "進去之前先簡單聽我說一下。"
84302100200-6 = "就算進得了資料中心，接下來也需要駭入工具。#n我在桌上放了隨身碟，記得帶去。"
84302100200-7 = "……隨身碟？"
84302100200-8 = "是我製作的東西。#n它能讓我利用這裡的電腦，對那邊進行一定程度的控制。"
84302100200-9 = "所以你只要在跟資料相關的電腦上插入那個就可以了。#n之後的事就由我來處理。"
84302100200-10 = "這樣啊，那就好。#n我也不喜歡聽從別人的指示操作電腦。"
84302100200-14 = "……先說一下，我可不是不會哦？"
84302100200-15 = "我知道。這終究是為了有效行動的權宜之計。"
84302100200-16 = "而且應該沒辦法直達目的地，必須在途中先打開被封閉的房門。"
84302100200-17 = "這部分的駭入，交給放在那邊的保全鑰匙就行了。#n萬一有問題的話就聯絡我。"
84302100200-19 = "這次的作戰計畫還真縝密……真是久違了啊。"
84302100200-20 = "讓我不禁想起了以前的事。#n當時跟現在不同……感覺還挺不錯的。"
84302100200-21 = "畢竟當時只有你和「一之瀬明日奈」。#n而一之瀬明日奈……以作戰的兵力而言，變數有點太多了。"
84302100200-22 = "因此作戰自然會以美甘寧瑠你為中心。"
84302100200-23 = "嗯，這麼說也是。#n我並沒有覺得現在哪裡不好，只是各有各的優缺點罷了。"
84302100200-24 = "那我準備帶上東西出發，作戰指令再麻煩了。"
84302100200-25 = "知道了。保全鑰匙我放在箱子上面，記得帶去。"

84302100200-1 = "#all;hide"
84302100200-2 = "#hidemenu"
84302100200-3 = "#all;hide"
84302100200-4 = "#showmenu"
84302100200-5 = "5;네루 교복;01\n1;리오;01;들어가기 전에 우선 간략하게 들어줘.\n#1;a\n#5;a"
84302100200-6 = "1;리오;02;데이터 센터에 들어간다 해도, 그 후에는 해킹을 위한 도구가 필요해. 책상 위에 USB를 두었으니, 가져가도록 해."
84302100200-7 = "5;네루 교복;23;……? USB?\n#5;em;[?]"
84302100200-8 = "1;리오;99;내가 만들어 둔 물건이야. 지금 이곳의 컴퓨터로 그쪽을 어느 정도 제어할 수 있게 되지."
84302100200-9 = "1;리오;01;그러니 데이터 관리 컴퓨터에 이것을 꽂아주었으면 해. 이후의 일은 내가 진행할 테니."
84302100200-10 = "5;네루 교복;03;과연, 잘됐네. 나도 지시받으며 이것저것 컴퓨터 만지고 있는 쪽은 취향이 아니라서 말이지."
84302100200-11 = "#st;[0,0];instant;1;"
84302100200-12 = "#clearST"
84302100200-13 = "1;리오;01\n5;네루 교복;17\n#1;h\n#5;h\n#5;em;[!]\n#wait;1000"
84302100200-14 = "5;네루 교복;10;……미리 말해 두지만 못한다는 건 아니니까.\n#5;jump"
84302100200-15 = "1;리오;99;알고 있어. 이건 어디까지나 효율적인 작전을 위한 방편일 뿐."
84302100200-16 = "1;리오;05;그리고 아마도 경로상 한 번에 목적지까지 갈 수는 없을 거야. 중간 기점에서 폐쇄된 방의 문을 열어야 해.\n#1;m3\n#5;dr"
84302100200-17 = "1;리오;01;그 부분의 해킹 또한 저쪽에 둔 보안키를 가지고 가면 할 수 있어. 만약 문제가 생긴다면 연락해 줘."
84302100200-18 = "#all;hide"
84302100200-19 = "3;네루 교복;03;오랜만에 느끼는 거지만, 참 작전 계획이 꼼꼼하고 충실하단 말이지.\n#3;em;[재잘]"
84302100200-20 = "3;네루 교복;22;조금은 예전 생각도 나고 그러네. 지금과는 달리…… 꽤 괜찮았는데."
84302100200-21 = "3;리오;99;그땐 너와 <이치노세 아스나>뿐이었으니까. 게다가 이치노세 아스나 쪽은…… 작전 병력으로 보기엔 변수가 너무 많았어.\n#3;em;…"
84302100200-22 = "3;리오;07;자연히 작전은 모두 미카모 네루, 너를 중심으로 짤 수밖에 없었지."
84302100200-23 = "5;네루 교복;24;뭐, 그렇지. 지금도 딱히 나쁘다는 건 아니야. 지금은 지금대로의 장단이 있을 뿐.\n#5;em;[한숨]\n#5;al\n#3;m1"
84302100200-24 = "5;네루 교복;22;아무튼 그럼 이것저것 챙겨서 출발할 테니, 계속해서 작전 지시 잘 부탁한다고."
84302100200-25 = "3;리오;01;알았어. 보안키는 상자 위에 두었으니, 잊지 말고 챙겨 가."
84302100200-26 = "#wait;100"

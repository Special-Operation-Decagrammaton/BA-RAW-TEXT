[translation]
84302100200-5 = "ก่อนจะเข้าไป ฉันจะขอสรุปสั้นๆ ให้ฟังก่อน"
84302100200-6 = "ต่อให้เราเข้าไปในศูนย์ข้อมูลได้ แต่หลังจากนั้นเราก็ต้องการอุปกรณ์สำหรับแฮ็ก#nฉันวาง USB ไว้บนโต๊ะแล้ว เอาไปได้เลย"
84302100200-7 = "USB เหรอ...?"
84302100200-8 = "ฉันสร้างเอาไว้น่ะ USB อันนั้นจะทำให้ฉันควบคุมคอมพิวเตอร์ที่นั่นด้วยคอมพิวเตอร์ของฉันจากที่นี่ได้"
84302100200-9 = "เพราะงั้นก็ช่วยเอา USB ไปเสียบที่คอมพิวเตอร์ที่จัดการข้อมูลให้ทีนะ แล้วหลังจากนั้นฉันจะรับช่วงต่อเอง"
84302100200-10 = "อย่างนี้สินะ งั้นก็ดีเลย ฉันไม่ชอบต้องมานั่งงมคอมพิวเตอร์ตอนฟังคำสั่งอยู่เหมือนกัน"
84302100200-14 = "บอกไว้ก่อนนะ... ใช่ว่าฉันจะทำแบบนั้นไม่ได้หรอก ฉันแค่ไม่ชอบ"
84302100200-15 = "ฉันรู้ นี่มันก็แค่วิธีที่สะดวกเพื่อปฏิบัติการที่มีประสิทธิภาพน่ะ"
84302100200-16 = "ดูจากเส้นทางแล้ว เธอน่าจะไปถึงจุดหมายในครั้งเดียวไม่ได้ เธอต้องเปิดประตูของห้องที่ปิดไว้ที่อยู่#nตรงกลางเพื่อไปต่อ"
84302100200-17 = "ถ้าเอาคีย์ความปลอดภัยที่อยู่ตรงนั้นไปก็จะแฮ็กได้ ถ้ามีปัญหาอะไรก็ติดต่อมานะ"
84302100200-19 = "ฉันไม่ได้รู้สึกอย่างนี้มานานแล้ว แต่แผนปฏิบัตินี้ละเอียดและครบถ้วนสมบูรณ์จังแฮะ"
84302100200-20 = "ทำเอาฉันคิดถึงสมัยก่อนเลยนะ ตอนนั้นน่ะดีทีเดียว... ต่างจากตอนนี้เลย"
84302100200-21 = "ก็ตอนนั้นมีแค่เธอกับ <อิชิโนเสะ อาสึนะ> นี่นา นอกจากนั้นอิชิโนเสะ อาสึนะ... ก็มีตัวแปรมากเกินไป#nที่จะมองว่าเป็นกองกำลังในปฏิบัติการด้วย"
84302100200-22 = "มิคาโมะ เนรุ เธอก็เลยเป็นศูนย์กลางของปฏิบัติการในตอนนั้นไปโดยปริยาย"
84302100200-23 = "มันก็จริงของเธอ แต่ฉันก็ไม่ได้หมายความว่าตอนนี้มันแย่อะไรหรอก ตอนนี้แค่ทำตามสถานการณ์น่ะ"
84302100200-24 = "งั้นฉันจะเตรียมของที่จำเป็นแล้วมุ่งหน้าไปที่นั่น ฝากเรื่องการออกคำสั่งต่อด้วยแล้วกัน"
84302100200-25 = "เข้าใจแล้ว ฉันเอาคีย์ความปลอดภัยวางไว้บนกล่องแล้ว อย่าลืมเอาไปด้วยล่ะ"

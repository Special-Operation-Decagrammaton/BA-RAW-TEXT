[translation]
84302100200-5 = "Before you move in, let me give you a brief overview."
84302100200-6 = "Once you get inside the Data Center, you'll need a hacking tool. I left a USB on the desk. Take it."
84302100200-7 = "Hm? USB?"
84302100200-8 = "It's something I made. It'll let me control other computers remotely, to a degree."
84302100200-9 = "I want you to plug it into the data management computer. I'll handle the rest."
84302100200-10 = "Good. I don't want to be fiddling around with computers, WHILE I'm listening to you."
84302100200-14 = "...Which isn't to say I COULDN'T do that if I had to."
84302100200-15 = "I understand. This is just for efficiency."
84302100200-16 = "Speaking of, based on our planned route, you likely won't be able to reach the destination in one go. You'll have to open the door to the restricted room at around the midpoint."
84302100200-17 = "That security key over there will help you get through it. If anything goes wrong, contact me."
84302100200-19 = "It's been a while, but she's still as meticulous as ever."
84302100200-20 = "It takes me back to the good old days..."
84302100200-21 = "Back then, it was just you and Ichinose Asuna. She had...too many variables to be a reliable operator."
84302100200-22 = "Naturally, all our plans had to center on you, Neru."
84302100200-23 = "Of course. I'm not saying it's bad right now. Right now has its own pros and cons."
84302100200-24 = "Anyway, I'll gear up and go. Just keep giving orders."
84302100200-25 = "All right. I left the security key on top of the box, so make sure not to forget."

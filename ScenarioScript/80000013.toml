[translation]
80000013-1 = "巧克力之海"
80000013-2 = "（和星野在市區巡邏途中發現了一間小小的海洋博物館）"
80000013-3 = "（因為星野的眼中默默散發出了閃亮的光芒，便進去參觀了一下）"
80000013-5 = "D.U.．海洋博物館前"
80000013-6 = "沒想到這種地方居然會有海洋博物館呢～"
80000013-7 = "雖然規模不大，但久違地看到了海洋生物真是開心。"
80000013-8 = "而且幾乎沒什麼人，可以慢慢地欣賞。唔嘿嘿。"
80000013-9 = "[s]「看你這麼開心，真是太好了。」"
80000013-10 = "嗯。啊……那是紀念品店嗎？"
80000013-14 = "老師，你看！是以海洋博物館展出的海洋生物為主題的巧克力組合！"
80000013-18 = "這是海星，這個是河豚……"
80000013-23 = "這是鯨魚嗎？哦～真可愛！"
80000013-24 = "……咦？但是這間水族館沒有鯨魚吧？"
80000013-25 = "為什麼會有鯨魚造型的巧克力呢……"
80000013-26 = "[s1]「因為鯨魚很可愛，之類的？」\n[s2]「公司有公司的考量吧……？」"
80000013-27 = "確實……老師說的沒錯，鯨魚是種可愛的生物。"
80000013-28 = "要做這種可愛巧克力的話當然不能少了牠。唔嘿。"
80000013-29 = "唔嘿，是嗎……"
80000013-30 = "大叔不太了解那種事……"
80000013-31 = "不過總之買一盒當紀念吧。"
80000013-36 = "來，老師。收下吧。"
80000013-37 = "也給老師一個當作紀念。"
80000013-38 = "[s]「鯨魚的……我真的可以收下嗎？」"
80000013-39 = "嗯，收下吧。"
80000013-40 = "反正味道都一樣，吃到肚子裡之後就沒差了。唔嘿嘿。"
80000013-41 = "當然我最喜歡鯨魚造型的紀念品也是事實……"
80000013-42 = "所以，才更希望老師收下。"

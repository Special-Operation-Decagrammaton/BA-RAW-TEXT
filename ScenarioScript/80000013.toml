[translation]
80000013-1 = "ทะเลช็อกโกแลต"
80000013-2 = "(ขณะที่ลาดตระเวนในเมืองพร้อมกับโฮชิโนะ ก็พบพิพิธภัณฑ์ทางทะเลขนาดเล็กแห่งหนึ่ง)"
80000013-3 = "(เห็นแก่ความกระตือรือร้นของโฮชิโนะ คุณครูเลยยอมแวะเข้าไปดูในพิพิธภัณฑ์ครู่หนึ่ง)"
80000013-5 = "ด้านหน้าพิพิธภัณฑ์ในเขต D.U."
80000013-6 = "ฮิฮิ ไม่นึกเลยว่าจะมีพิพิธภัณฑ์ทางทะเลอยู่ในที่แบบนี้"
80000013-7 = "ถึงขนาดจะไม่ได้ใหญ่มาก แต่ไม่ได้เห็นพวกปลาชนิดต่างๆ มานานแล้วแบบนี้มันก็สนุกดีนะ"
80000013-8 = "แถมคนก็ไม่เยอะ แบบนี้ดูปลานานๆ ได้โดยไม่ถูกรบกวนเลยล่ะ ฮิฮิฮิ"
80000013-9 = "[s] \"ดีใจจังที่โฮชิโนะสนุก\""
80000013-10 = "อ๊ะ ตรงทางออกมีของที่ระลึกขายด้วยล่ะ"
80000013-14 = "คุณครู ดูนี่สิ เซ็ตช็อกโกแลตรูปปลาที่จัดแสดงอยู่ในพิพิธภัณฑ์ทางทะเลล่ะ!"
80000013-18 = "อันนี้รูปปลาดาว อันนี้ปลาปักเป้า..."
80000013-23 = "อันนี้วาฬรึเปล่านะ? ฮ่าๆ น่ารักทุกชิ้นเลย!"
80000013-24 = "เอ๋...? แต่ที่นี่ไม่มีวาฬนี่นา?"
80000013-25 = "ทำไมถึงมีช็อกโกแลตรูปวาฬรวมอยู่ด้วยล่ะ..."
80000013-26 = "[s1] \"อาจเพราะวาฬดูน่ารักก็ได้นะ?\"\n[s2] \"อาจเป็นเหตุผลของพวกผู้ใหญ่ก็ได้...\""
80000013-27 = "อืม ที่พูดมาก็ถูกนะ วาฬเป็นสัตว์ที่น่ารักมากนี่นา"
80000013-28 = "ถ้าจะทำช็อกโกแลตรูปปลา ก็คงขาดเจ้าวาฬไปไม่ได้หรอก ฮิฮิ"
80000013-29 = "ฮิฮิ อย่างนั้นเองหรอกเหรอ..."
80000013-30 = "ลุงคนนี้แก่แล้วตามโลกไม่ค่อยทันเลย..."
80000013-31 = "ซื้อช็อกโกแลตรูปปลาไปเป็นของที่ระลึกดีมั้ยนะ"
80000013-36 = "เอ้า คุณครู รับไปสิ"
80000013-37 = "ให้คุณครูชิ้นหนึ่งเป็นที่ระลึกน่ะ"
80000013-38 = "[s] \"ให้ช็อกโกแลตรูปวาฬครูจริงๆ เหรอ? ไม่เป็นไรเหรอ?\""
80000013-39 = "ไม่เป็นไรหรอก ไม่เป็นไร"
80000013-40 = "ยังไงรสชาติมันก็เหมือนกันหมดอยู่แล้ว กินลงท้องไปก็เหมือนกันนั่นแหละน่า ฮิฮิฮิ"
80000013-41 = "รูปวาฬมันน่ารักมากที่สุดเลยก็จริงอยู่หรอก แต่ก็นะ..."
80000013-42 = "เพราะแบบนั้นฉันเลยอยากให้คุณครูรับไว้ยังไงล่ะ"

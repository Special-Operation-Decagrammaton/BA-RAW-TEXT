[translation]
80000013-1 = "#title;초콜릿 속의 바다"
80000013-2 = "#na;(호시노와 시내 순찰을 하던 중, 작은 해양 박물관을 발견했다.)"
80000013-3 = "#na;(호기심을 보이는 호시노를 위해 박물관에서 잠시 관람을 하고 나왔다.)"
80000013-4 = "#all;hide"
80000013-5 = "#place;D.U. 내 구립 해양 박물관 앞"
80000013-6 = "3;호시노;03;헤에, 설마 이런 곳에 해양 박물관이 있었을 줄이야.\n#3;em;[음표]\n#3;a"
80000013-7 = "3;호시노;01;규모가 크지는 않지만, 그래도 오랜만에 다양한 물고기를 볼 수 있어서 즐거웠어."
80000013-8 = "3;호시노;02;게다가 사람도 거의 없어서 방해받지 않고 물고기를 더 오래 지켜볼 수 있었고 말이야. 으헤헤.\n#3;em;[///]"
80000013-9 = "[s] \"즐거웠다니 다행이야.\""
80000013-10 = "3;호시노;14;아, 출구 근처에서 기념품을 팔고 있네.\n#3;em;[!]\n#3;jump"
80000013-11 = "#st;[0,0];instant;1;"
80000013-12 = "#clearST"
80000013-13 = "3;호시노;14\n#3;m2\n#3;hophop\n#wait;1000"
80000013-14 = "3;호시노;04;선생, 이것 봐! 이 해양 박물관에서 전시 중인 물고기를 모티브로 만든 초콜릿 세트래!"
80000013-15 = "#st;[0,0];instant;1;"
80000013-16 = "#clearST"
80000013-17 = "3;호시노;04\n#3;m1\n#wait;1000"
80000013-18 = "3;호시노;16;이건 불가사리고, 이건 가시복이고……\n#3;em;…"
80000013-19 = "#wait;500"
80000013-20 = "#st;[0,0];instant;1;"
80000013-21 = "#clearST"
80000013-22 = "3;호시노;16\n#3;m3\n#3;jump\n#wait;1000"
80000013-23 = "3;호시노;03;이건 고래인가? 아하하, 전부 귀여워!"
80000013-24 = "3;호시노;08;……어라? 그런데 이 수족관에 분명 고래는 없지 않았던가?\n#3;em;[?]"
80000013-25 = "3;호시노;02;어째서 고래 모양의 초콜릿이 들어있는 거지……."
80000013-26 = "[s1] \"고래가 귀여우니까 그런 게 아닐까?\"\n[s2] \"……어른의 사정이 아닐까.\""
80000013-27 = "3;호시노;14;음…… 선생 말이 맞아. 고래는 귀여운 생물이니까.\n#3;em;[...]"
80000013-28 = "3;호시노;16;물고기 모양 초콜릿을 만든다면 절대로 빠트릴 수 없지. 으헤."
80000013-29 = "3;호시노;15;으헤, 그런가…….\n#3;em;[...]"
80000013-30 = "3;호시노;14;아저씨는 요즘 사람이 아니라서 그런 건 잘 모르겠어……."
80000013-31 = "3;호시노;02;그래도 물고기 초콜릿 하나 정도는 기념으로 사갈까.\n#3;greeting\n#3;em;[음표]"
80000013-32 = "#st;[0,0];instant;1;"
80000013-33 = "#clearST"
80000013-34 = "3;호시노;02\n#3;d\n#wait;1000"
80000013-35 = "#wait;2500"
80000013-36 = "3;호시노;01;자, 선생. 받아.\n#3;greeting\n#3;closeup\n#3;a"
80000013-37 = "3;호시노;03;선생에게도 기념으로 하나 나누어 줄게.\n#3;closeup\n#3;em;[재잘]"
80000013-38 = "[s] \"내가 고래 모양 초콜릿을 받아도 괜찮아?\""
80000013-39 = "3;호시노;14;괜찮아, 괜찮아."
80000013-40 = "3;호시노;02;어차피 맛은 다 똑같으니까, 뱃속에 들어가면 상관없어진다고. 으헤헤.\n#3;em;[음표]"
80000013-41 = "3;호시노;99;물론 고래 모양의 기념품이 가장 애착이 가는 건 사실이지만……"
80000013-42 = "3;호시노;03;그러니까, 선생이 받아줬으면 좋겠어.\n#3;em;[///]\n#3;greeting"

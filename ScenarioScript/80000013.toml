[translation]
80000013-1 = "Under the Chocolate Sea"
80000013-2 = "Hoshino and I discovered a small maritime museum while walking around the city."
80000013-3 = "She seemed interested, so we went inside for a little while and then came back out."
80000013-5 = "Outside D.U. Maritime Museum"
80000013-6 = "I wasn't expecting to find something like that here of all places."
80000013-7 = "It wasn't very big inside, but it was still fun to see all the different kinds of fish they had."
80000013-8 = "And there wasn't even a crowd, so we got to look as much as we wanted. Heh."
80000013-9 = "[s] \"I'm glad you had fun.\""
80000013-10 = "Hey. Is that their gift shop?"
80000013-14 = "Look, Sensei! They sell a chocolate set modeled after the fish they have inside the museum!"
80000013-18 = "There's a starfish, a puffer, and..."
80000013-23 = "...is this one a whale? Haha. They're adorable!"
80000013-24 = "Wait. I don't remember seeing a whale inside..."
80000013-25 = "I wonder why that one made it into the set."
80000013-26 = "[s1] \"Could it be because people find whales cute?\"\n[s2] \"You never know what people do to make money.\""
80000013-27 = "That's a good point. Whales are pretty cute."
80000013-28 = "I guess the set wouldn't feel complete without one."
80000013-29 = "You think so...?"
80000013-30 = "Well, whatever. I'm too old to get these new-world economics."
80000013-31 = "Anyway, I may as well buy it to commemorate today."
80000013-36 = "Here, Sensei. I want you to have this one."
80000013-37 = "Think of it as a souvenir."
80000013-38 = "[s] \"You're giving me the whale-shaped one? Are you sure?\""
80000013-39 = "Of course I'm sure."
80000013-40 = "They're all the same kind of chocolate, so what shape they are doesn't matter once it's in your belly."
80000013-41 = "You're right that the whale one is probably my favorite out of the bunch..."
80000013-42 = "...but that's why I want you to have it."

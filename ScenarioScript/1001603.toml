[translation]
1001603-1 = "นี่คือการฝึกภาคสนามค่ะ คุณครู"
1001603-2 = "ทางเข้าหอนิทรรศการอาร์ตเวิร์กเกมในมิลเลเนียม"
1001603-3 = "แซนด์วิชที่ฉันทำแต่เช้าตรู่ OK"
1001603-4 = "และมีขนมกับชาอู่หลงไว้มาดื่มกับคุณครู..."
1001603-5 = "เตรียมสมุดบันทึกกับสมุดวาดภาพมาแล้ว ...ไม่ลืมอะไรแล้วใช่มั้ยนะ?"
1001603-6 = "การโจมตีในดันเจี้ยนต้องเตรียมการล่วงหน้า"
1001603-7 = "ฮู่ว ฮา ฮู่ว ฮา"
1001603-8 = "โอกาสนี้ล่ะ ฉันจะให้คุณครูได้เห็นความเป็นผู้ใหญ่ของฉันในนิทรรศการอาร์ตเวิร์กครั้งนี้..."
1001603-9 = "[s] \"บ่นพึมพำอะไรอยู่คนเดียวน่ะ?\""
1001603-10 = "อ๊ะ?! ตะ...ตกใจหมดเลย!"
1001603-11 = "คะ... คุณครู?! มาถึงตั้งแต่เมื่อไหร่คะ?"
1001603-12 = "[s1] \"มาถึงตั้งแต่ตอนที่มิโดริจ้องกล่องข้าวอยู่\"\n[s2] \"จนถึงตอนที่สูดหายใจอย่างกับผู้กล้าที่จะเข้าโจมตีในดันเจี้ยน\""
1001603-13 = "ยะ... อยู่มาตั้งแต่แรกและได้ยินหมดเลยนี่คะ!"
1001603-14 = "ยะ... อยู่มาตั้งแต่แรกและได้ยินหมดเลยนี่คะ!"
1001603-15 = "[s] \"ตั้งตารอนิทรรศการวันนี้มากเลยเหรอ?\""
1001603-16 = "คือว่า... มันเป็นนิทรรศการเกมอาร์ตที่เปิดแค่ปีละครั้งนี่คะ"
1001603-17 = "ฉันคิดว่าจะถือโอกาสนี้เดินดูให้เต็มที่และเอามาใช้เป็นข้อมูลค่ะ"
1001603-18 = "(แน่นอนว่าเหตุผลที่ตั้งตารอวันนี้ไม่ใช่แค่นั้นหรอกนะ...)"
1001603-19 = "งานไม่ได้จัดที่นี่ รีบไปกันเถอะค่ะ คุณครู"
1001603-21 = "หอนิทรรศการอาร์ตเวิร์กเกมในมิลเลเนียม 1F"
1001603-23 = "อืม.. นิทรรศการชั้น 1 เป็นบูธเกมใหม่ล่าสุด และดูเหมือนว่าแต่ละชั้นจะแบ่งตามประเภทนะคะ"
1001603-24 = "จริงสิ นิทรรศการอาร์ตเวิร์กเกมคลาสสิกอยู่ตั้งแต่ชั้น 3 ขึ้นไปนี่นา"
1001603-25 = "[s] \"คนเยอะมากเลยล่ะ\""
1001603-26 = "ค่ะ ฉันคิดว่าเพราะเกมเป็นสิ่งที่มีเสน่ห์ดึงดูดที่สุดค่ะ"
1001603-27 = "แม้ว่าทุกคนจะเป็นคนที่สนุกกับการเล่นเกมต่างประเภทกัน มาจากต่างสถานที่ต่างช่วงเวลา"
1001603-28 = "แต่ก็มารวมตัวที่นี่เพื่อแบ่งปันความทรงจำร่วมกันค่ะ"
1001603-29 = "อ๊ะ ไม่ใช่ที่นี่ ขึ้นไปชั้น 3 กันค่ะ คุณครู คงจะมีอาร์ตเวิร์กที่มีเสน่ห์มากๆ แน่นอนค่ะ"
1001603-35 = "(ทำภารกิจที่จะขึ้นมาที่นี่กับคุณครูสองต่อสองสำเร็จแล้ว ต่อไปก็ต้องทำให้การบุกนี้สำเร็จ...)"
1001603-38 = "เราก็เดินดูงานค่อนข้างนานแล้วนะคะ คุณครู ไม่หิวน้ำเหรอคะ?"
1001603-39 = "ฉันมีชาอู่หลงที่เตรียมมาจากบ้าน..."
1001603-40 = "(ช่วงที่ส่งชาให้ ฉันก็จะได้เข้าใกล้คุณครู...!)"
1001603-41 = "[s] \"มิโดริดูนั่นสิ\""
1001603-42 = "คะ? อะไร..."
1001603-46 = "อ๊ะ อาร์ตเวิร์กนี้สื่อถึงความโดดเดี่ยวอันรุนแรงราวกับไม่ยอมให้ชีวิตหนึ่งยอมแพ้…!"
1001603-47 = "หรือว่านี่เป็นภาพทะเลทราย..."
1001603-48 = "ว่าแล้ว! เป็นอย่างที่ฉันคิดไว้เลยค่ะ คุณครู!"
1001603-49 = "เกมวิ่งยิงไร้ที่ติที่ถูกเรียกว่าผลงานชิ้นเอกมาตั้งแต่สมัยก่อน...!"
1001603-50 = "นี่เป็นอาร์ตเวิร์กแผนที่รกร้างของเมทัลส์เนล 2! สุดยอดเลยค่ะ!"
1001603-51 = "อ๊ะ ไม่ได้มีแค่ชิ้นนี้นะคะ มีภาพด้านนั้นด้วย!"
1001603-54 = "อันนี้เป็นอาร์ตเวิร์กของแรคคูนซิตี้ เมืองซอมบี้ที่ฉาวโฉ่จากมอรัลฮาซาร์ด...!"
1001603-55 = "รูปพวกนี้เป็นผลงานเกมคลาสสิกชิ้นเอกทั้งนั้นเลยค่ะ!"
1001603-58 = "[ns3] \"มิโดริ ใจเย็นๆ ก่อน\"\n[ns4] \"มิโดริกำลังยิ้มกว้างอยู่\""
1001603-59 = "ตอนนี้ไม่ใช่เวลาที่จะมาใจเย็นนะคะ!"
1001603-60 = "ตอนนี้ไม่ใช่เวลาที่จะมาใจเย็นนะคะ!"
1001603-61 = "อ๊ะ!"
1001603-62 = "นั่นคืออาร์ตเวิร์กของแผนที่ด่าน 1-1 ใน \"อัลตร้ามารีนซิสเตอร์\" เกมแพลตฟอร์มคลาสสิกชื่อดัง!"
1001603-63 = "คุณครู คุณครู! รู้จักอันนั้นมั้ยคะ?"
1001603-64 = "เมฆที่ปรากฏในอัลตร้ามารีนซิสเตอร์เป็นดีไซน์แบบดั้งเดิมค่ะ!"
1001603-65 = "หืมม! ทนไม่ไหวแล้วค่ะ! ตอนนี้มีไอเดียพรั่งพรูขึ้นมาแล้ว"
1001603-66 = "กระดาษโน้ต...! กระดาษโน้ตอยู่ไหน?! ต้องรีบวาดแล้ว...!"
1001603-68 = "(หลังจากนั้นมิโดริก็วาดภาพอย่างบ้าคลั่งอยู่พักหนึ่ง)"
1001603-69 = "(หลังนิทรรศการอาร์ตเวิร์กเกมปิดลง)"
1001603-71 = "ไม่มีอะไรจะพูดเลยล่ะค่ะ ฉันตื่นเต้น...อีกแล้ว...."
1001603-72 = "ขอโทษค่ะ คุณครู ฉันตื่นเต้นอยู่คนเดียวแล้วลากคุณครูไปมาตามอำเภอใจ..."
1001603-73 = "(เพราะฉันตื่นเต้นเหมือนเด็ก แผนทั้งหมดที่ตั้งใจจะทำให้คุณครูเห็นความเป็นผู้ใหญ่ของฉัน#nมลายหายไปหมดแล้วเลย...)"
1001603-74 = "[s5] \"ไม่หรอก ครูสนุกมาก\"\n[s6] \"มิโดริดูชอบเกมคลาสสิกจริงๆ เลยนะ\""
1001603-75 = "ค่ะ... ตอนแรกเป็นเรื่องเกมคลาสสิก ฉันสงสัยว่าทำไมทุกคนถึงได้เล่นกันนะ"
1001603-76 = "ค่ะ... ตอนแรกเป็นเรื่องเกมคลาสสิก ฉันสงสัยว่าทำไมทุกคนถึงได้เล่นกันนะ"
1001603-77 = "แม้ตอนแรกจะไม่แน่ใจ"
1001603-78 = "แต่พอได้เข้าชมรมพัฒนาเกม ก็สนุกและชอบมันมากขึ้นเรื่อยๆ ค่ะ"
1001603-79 = "ในบรรดาเกมพวกนั้นก็มีเกมที่มีกฎกติกาที่เข้าใจยากด้วย"
1001603-80 = "ทีแรกเป็นเกมทำลายน้ำแข็งแล้วปีนขึ้นไปใช่มั้ยล่ะคะ?!"
1001603-81 = "ถ้าเกินหน้าจอไป ทำไมจะต้องตายด้วยล่ะคะ! ทำไมไม่รออีกหน่อยล่ะ!"
1001603-82 = "[s] \"อืม ครูดีใจที่เห็นมิโดริมีความสุขนะ\""
1001603-83 = "อ๊ะ..."
1001603-84 = "คุณครูเอาแต่พูดอย่างนี้ตลอดเลย..."
1001603-85 = "นั่นสินะคะ ค่ะ วันนี้ฉันก็สนุกมากเลยค่ะ"
1001603-86 = "ครั้งหน้าก็มาเล่นด้วยกันแบบนี้อีกนะคะ คุณครู"

[translation]
1001603-1 = "是展覽會唷，老師"
1001603-2 = "千年．遊戲美術展覽會場入口"
1001603-3 = "早起做的三明治，OK。"
1001603-4 = "要和老師一起喝的烏龍茶和點心也帶好了……"
1001603-5 = "筆記本和素描本也放了……沒有忘記什麼了吧？"
1001603-6 = "要攻略地城就需要做好事前準備。"
1001603-7 = "做個深呼吸……好。"
1001603-8 = "這是個好機會。就在這次的展覽上，讓老師看看我成熟的一面……"
1001603-9 = "[s] 「你在自言自語什麼呢？」"
1001603-10 = "嗚哇啊啊！？"
1001603-11 = "嚇，嚇死我了……！老師，你什麼時候來的！？"
1001603-12 = "[s1] 「從綠盯著包包的時候開始吧。」\n[s2] 「從像勇者進入地下城之前一樣深呼吸的時候吧。」"
1001603-13 = "那不就幾乎是一開始就在了嗎！"
1001603-14 = "那不就幾乎是一開始就在了嗎！"
1001603-15 = "[s] 「你好像很期待今天的展覽呢。」"
1001603-16 = "那，那是因為……這是一年只有一次的展覽。"
1001603-17 = "我想要趁這個機會多到處看看，收集很多的資料。"
1001603-18 = "（當，當然，期待的原因也不只這個……）"
1001603-19 = "……來吧，不是在這裡發呆的時間了！我們趕快走吧，老師！"
1001603-21 = "千年．遊戲美術展覽會場1F"
1001603-23 = "首先1樓是最新遊戲的攤位。隨著樓層不同，遊戲的種類也不同，大概是這種感覺吧。"
1001603-24 = "啊，懷舊遊戲的展示是在3樓的樣子。"
1001603-25 = "[s] 「人真多呢。」"
1001603-26 = "就是說呀，這種活動也是遊戲的魅力之一呢。"
1001603-27 = "大家在不同的地點、不同的時間玩著不同種類的遊戲……"
1001603-28 = "最後在這類的場合聚集在一起，交流著各自的感想。"
1001603-29 = "啊，現在不是說這個的時候了，我們走吧。我想肯定有著很多就連老師都會覺得震撼的、充滿魅力的好作品的……！"
1001603-35 = "（和老師兩個人單獨到這裡的任務算是成功了，接下來就是……）"
1001603-38 = "走了不少路了呢，老師會不會渴呢？"
1001603-39 = "正好我有準備好從家裡帶來的烏龍茶……"
1001603-40 = "（利用這個好機會，趁機接近老師……！）"
1001603-41 = "[s] 「綠，你看那個。」"
1001603-42 = "咦，那個是……？"
1001603-46 = "啊……！那張彷彿不允許任何生命的存在一般，傳達出荒涼感的沙漠插畫……！"
1001603-47 = "難道是……！"
1001603-48 = "果然沒錯！"
1001603-49 = "就是在懷舊遊戲中被稱為名作的動作射擊遊戲……！"
1001603-50 = "《越北大戰2》的沙漠地區插畫！好厲害！"
1001603-51 = "啊，那裡的話也是！"
1001603-54 = "是在《惡靈骨堡》系列裡很有名的，殭屍聚集的「辣昆市」的概念美術圖……！"
1001603-55 = "那個和這個也是，全都是在懷舊遊戲裡非常有名的作品！"
1001603-58 = "[ns3] 「綠，冷靜點。」\n[ns4] 「綠，你的嘴巴還開著唷。」"
1001603-59 = "真是讓人興奮到不行！"
1001603-60 = "真是讓人興奮到不行！"
1001603-61 = "啊！"
1001603-62 = "那是著名的懷舊遊戲，橫向卷軸動作遊戲《究極瑪琳姊妹》的關卡1-1的地圖！"
1001603-63 = "老師，你知道嗎？"
1001603-64 = "在《究極瑪琳姊妹》裡出現的草和雲，都是用同一張點陣圖做出來的唷！"
1001603-65 = "哦哦……！太厲害了！靈感好像一個一個浮出來了……！"
1001603-66 = "筆，筆記本……！筆記本在哪！？現在不趕快畫下來的話……！"
1001603-68 = "（之後，綠就這麼興奮了一段時間，用著很強的氣勢畫著畫）"
1001603-69 = "（遊戲美術展覽結束之後）"
1001603-71 = "對不起……我一不小心就太興奮了……"
1001603-72 = "老師，對不起。我只顧著自己開心，拉著老師到處跑來跑去的……"
1001603-73 = "（興奮得像個孩子一樣……要向老師展現成熟一面的計畫都泡湯了……）"
1001603-74 = "[s5] 「沒關係的，我也看到了很多感興趣的東西，很有趣喔。」\n[s6] 「綠還真是喜歡懷舊遊戲呢。」"
1001603-75 = "啊，對，確實是這樣呢。其實我一開始對懷舊遊戲是抱著「為什麼大家會想玩這麼舊的遊戲呢」的心情的……"
1001603-76 = "啊，對，確實是這樣呢。其實我一開始對懷舊遊戲是抱著「為什麼大家會想玩這麼舊的遊戲呢」的心情的……"
1001603-77 = "在加入遊戲開發部後，"
1001603-78 = "在一一體驗過這些遊戲後就被它們的魅力給吸引住，漸漸喜歡上了。"
1001603-79 = "雖然也有現在也難以理解規則的遊戲在……"
1001603-80 = "……話說回來，那是個一邊打破冰塊一邊合作登上冰山的遊戲對吧！？"
1001603-81 = "為什麼一跑到畫面的外面就會死掉呢！為什麼不等我一下呢！？"
1001603-82 = "[s] 「今天看到了很多綠開心的樣子，我也很開心。」"
1001603-83 = "啊……"
1001603-84 = "老，老師，又說這種話……"
1001603-85 = "……但是，也沒錯。嗯，今天很開心。"
1001603-86 = "下次也這樣一起來玩吧，老師。"

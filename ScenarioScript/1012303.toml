[translation]
1012303-1 = "困難的對話"
1012303-2 = "夏萊辦公室"
1012303-3 = "（為了迎接聖亞，正在整理凌亂的環境）"
1012303-8 = "哎呀……你其實不必準備到這種程度的。"
1012303-9 = "如果害你還要忙東忙西的話，我過來的時候也會不好意思的吧？"
1012303-10 = "[s1]「……聖亞？」\n[s2]「啊，你到了啊。」"
1012303-17 = "……不。"
1012303-18 = "或許我其實有點開心也說不定。#n因為老師開始為我多做一些事了。"
1012303-19 = "該怎麼形容這種感覺呢……能算是「比重增加了」嗎？"
1012303-20 = "[s3]「……聖亞？」\n[s4]「你來的路上都打扮成那樣嗎？」"
1012303-23 = "呵呵，想知道嗎？"
1012303-24 = "不用擔心。我是自己開車過來，所以不會太奇怪的。"
1012303-25 = "……嗯？"
1012303-26 = "問我是不是喜歡這套衣服？#n啊啊，是因為我一直穿著它嗎？"
1012303-27 = "當然喜歡囉。這可是我自己挑的衣服啊。"
1012303-28 = "這麼說來，我好像還沒問過老師的感想呢……突然覺得有點好奇。"
1012303-29 = "……老師覺得怎麼樣？"
1012303-30 = "[s5]「當然覺得很漂亮。」\n[s6]「聖亞的時尚品味真不錯。」"
1012303-33 = "……原來如此。"
1012303-34 = "雖然我早就覺得老師八成會這麼說……畢竟你一向都是這樣的。"
1012303-38 = "開玩笑的。#n其實我真的很開心，只是直接說出來有點害羞而已。"
1012303-39 = "嗯……時尚品味……時尚品味啊……"
1012303-40 = "沒錯，坦白說我對時尚還挺有興趣的。"
1012303-41 = "在符合季節與企劃的同時……為服裝加上不落俗套的亮點真的很有趣。"
1012303-42 = "感覺就像創作一段劇情優秀的故事……或者設計一道有品味的謎題一樣吧？"
1012303-43 = "不過喜歡歸喜歡，能真正實踐的機會並不多。#n畢竟我還是挺受眾人關注的。"
1012303-44 = "所以至少在這種時候……就讓我好好展現一下實力吧。"
1012303-45 = "既然展現了實力，想讓更多人看到也是理所當然的。"
1012303-46 = "所以老師剛剛的稱讚，真的讓我很開心。#n謝謝你。"
1012303-47 = "……覺得意外嗎？"
1012303-48 = "[s7]「有一點，不過我覺得也挺好的。」\n[s8]「能發現你意外的一面，感覺很有趣。」"
1012303-51 = "你又說這種話。"
1012303-52 = "雖然我心裡很想跟老師一起去玩水，可惜你現在看起來有點忙碌呢。"
1012303-53 = "我不希望因為自己的任性而妨礙老師工作……"
1012303-57 = "……不，坦白說我其實希望這麼做。#n只是過於頻繁實在不太好，今天就讓我在這裡待一會再回去吧。"
1012303-58 = "這種程度應該沒問題吧？"
1012303-59 = "[s9]「當然。」\n[s10]「想待多久都行。」"
1012303-62 = "…………"
1012303-66 = "…………"
1012303-67 = "[s11]「……聖亞？」\n[s12]「你的表情有點……」"
1012303-70 = "……沒什麼。"
1012303-71 = "明知老師是這樣的人，卻還堅持使用相同的手段……這是我的不對。"
1012303-72 = "我明白了。#n既然老師依舊如此，我也只好再主動一點了。"
1012303-80 = "[ns13]「……聖，聖亞？」\n[ns14]「你怎麼坐到我腿上了……？」"
1012303-83 = "我就在這裡休息吧。#n老師不必在意，繼續專心工作就行了。"
1012303-84 = "或者如果有什麼簡單的事情……只要不涉及機密文件的話，說不定我也幫得上忙。"
1012303-85 = "這方面我還算是挺擅長的。"
1012303-86 = "……嗯？"
1012303-87 = "問我怎麼了？是不是生氣了？"
1012303-88 = "……呵呵。"
1012303-89 = "沒有，我一點也不生氣。"
1012303-90 = "……不。"
1012303-91 = "應該說剛才確實有點生氣，但看到老師的表情後就消氣了……或許更準確吧。"
1012303-92 = "現在我反而覺得有點開心，所以你不必擔心。"
1012303-96 = "……真的不用擔心沒關係。"
1012303-97 = "來，開始工作吧，老師。#n我也會幫忙，早點做完早點休息。"
1012303-98 = "趕快結束之後……"
1012303-103 = "……一起去休息室稍微放鬆一下吧。"
1012303-105 = "（在聖亞的幫助下，很快就完成了當天的工作）"
1012303-106 = "（回到休息室後，聖亞在沙發上悠閒地小睡了一會才離開）"

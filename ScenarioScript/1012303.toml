[translation]
1012303-1 = "The Hard Conversations"
1012303-2 = "Schale Executive Office"
1012303-3 = "I was cleaning up before Seia's visit."
1012303-8 = "Oh my... You didn't need to prepare all this."
1012303-9 = "My, Sensei. Setting this all up for me... You didn't think that would make me uncomfortable?"
1012303-10 = "[s1] \"...Seia?\"\n[s2] \"Huh?\""
1012303-17 = "...No."
1012303-18 = "I suppose I'm feeling grateful. Clearly, you care about me if you are putting in so much work."
1012303-19 = "I feel, perhaps, more...treasured."
1012303-20 = "[s3] \"...Seia?\"\n[s4] \"Did you...walk through the building like this?\""
1012303-23 = "Heehee, why are you so concerned?"
1012303-24 = "You needn't fret. I drove myself. No one saw me."
1012303-25 = "...What's that?"
1012303-26 = "Do I have a preference for this outfit? Ah. You're curious why I keep wearing it."
1012303-27 = "Well, of course I like it. I chose it, bought it, and put it on today."
1012303-28 = "Now that I think about it, I never asked for your opinion. Please don't keep me waiting."
1012303-29 = "...What do you think, Sensei?"
1012303-30 = "[s5] \"It's pretty.\"\n[s6] \"You're very fashionable.\""
1012303-33 = "...I see."
1012303-34 = "I predicted you would say something along those lines. You're always like that."
1012303-38 = "I'm just joking. I'm honestly happy, but it's a bit embarrassing to admit."
1012303-39 = "Hmm... Fashionable... Fashion sense..."
1012303-40 = "Right. Despite how I appear, I have considerable interest in fashion."
1012303-41 = "I enjoy the restriction of a theme, like a special season or a holiday. It's amusing to dress out of the ordinary."
1012303-42 = "How should I put it...? Picking out all the pieces feels like writing a good riddle, in a way."
1012303-43 = "Of course, despite my enjoyment, I rarely get opportunities to express my fashion sense. There are so many eyes watching me."
1012303-44 = "So that's why...I take special days like this to show off my skill."
1012303-45 = "And it's only natural for me to want to showcase my thoughtful work to...thoughtful people."
1012303-46 = "That said, I was very happy with your compliment, Sensei. Thank you."
1012303-47 = "...Were you surprised?"
1012303-48 = "[s7] \"A little. But I think it's nice.\"\n[s8] \"I'm happy to see a new side of you.\""
1012303-51 = "There you go saying things like that again."
1012303-52 = "Anyway, I'd love to invite you to splash around with me at the beach, but you seem to be drowning in work."
1012303-53 = "It would be a shame to interrupt such important business."
1012303-57 = "...Well, indeed, I would quite enjoy it. But it'd be rude of me to do it too often, so I'll just keep you a little company and drive back."
1012303-58 = "Is that acceptable to you?"
1012303-59 = "[s9] \"Of course.\"\n[s10] \"Stay as long as you'd like.\""
1012303-62 = "..."
1012303-66 = "..."
1012303-67 = "[s11] \"...? Seia?\"\n[s12] \"Why are you looking at me like that?\""
1012303-70 = "...It's nothing."
1012303-71 = "I have been too stubborn with my approach, despite knowing your demeanor."
1012303-72 = "Very well. If I must be more direct, I shall."
1012303-80 = "[ns13] \"...S-Seia?\"\n[ns14] \"You're on my lap...?\""
1012303-83 = "I'll be resting here. Don't worry about me, so feel free to get your business done."
1012303-84 = "Or perhaps there's some...work I can assist with? Something simple, perhaps?"
1012303-85 = "Despite my reputation, I'm actually quite good at this type of thing."
1012303-86 = "...Excuse me?"
1012303-87 = "Why am I doing this? You think I'm...angry?"
1012303-88 = "...Fufu."
1012303-89 = "No. I'm not angry at all."
1012303-90 = "...No."
1012303-91 = "To be precise, I WAS angry, but looking at you makes me feel...so much better."
1012303-92 = "I'm just having a little fun. You needn't be frightened."
1012303-96 = "...I mean it. You don't have to worry."
1012303-97 = "Now, let's get back to work, Sensei. I'll help, so we'll wrap it up and you can rest."
1012303-98 = "Let's finish this quickly..."
1012303-103 = "...and relax in the lounge."
1012303-105 = "With Seia's help, we quickly finished the day's work."
1012303-106 = "Seia went to the lounge, curled up on the sofa for a nap, and then drove back."

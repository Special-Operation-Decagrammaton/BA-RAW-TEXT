1012303-8 = "#na;세이아 수영복 언노운;이런……. 그렇게 준비하실 것까진 없는데."
1012303-9 = "#na;세이아 수영복 언노운;저 때문에 이것저것 준비하시면, 저도 오기가 불편해지지 않겠나요?"
1012303-10 = "[s1] \"……세이아?\"\n[s2] \"아, 도착했구나.\""
1012303-11 = "#wait;10"
1012303-12 = "#wait;10"

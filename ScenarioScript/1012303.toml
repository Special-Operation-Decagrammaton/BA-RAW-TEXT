[translation]
1012303-1 = "การสนทนาที่ยากลำบาก"
1012303-2 = "สำนักงานชาเล่ต์"
1012303-3 = "(คุณครูกำลังเก็บกวาดสำนักงานเพื่อต้อนรับเซอา)"
1012303-8 = "ตายจริง... ไม่ต้องเตรียมตัวต้อนรับถึงขนาดนี้ก็ได้ค่ะ"
1012303-9 = "ถ้าต้องจัดเตรียมนู่นนี่เพื่อฉัน แบบนี้ฉันก็คงไม่กล้ามาหาอีกสิคะ"
1012303-10 = "[s1] \"เซอา...?\"\n[s2] \"อ้อ มาถึงแล้วสินะ\""
1012303-17 = "ไม่สิ... "
1012303-18 = "ที่จริงก็น่าดีใจนิดหน่อยนะคะ ก็คุณครูทำแบบนี้ก็เพราะใส่ใจฉันนี่คะ"
1012303-19 = "จะว่ายังไงดีนะ... จะเรียกได้ว่า 'ฉันมีความสำคัญมากขึ้นนิดหน่อย' ก็ได้นะคะ"
1012303-20 = "[s3] \"เซอา...? ชุดที่ใส่?\"\n[s4] \"ใส่ชุดนี้มาถึงที่นี่เลยเหรอ?\""
1012303-23 = "ฮุฮุ ชุดสะดุดตาเหรอคะ? "
1012303-24 = "ไม่ต้องห่วงนะคะ ฉันขับรถมาน่ะค่ะ ไม่มีใครเห็นแล้วคิดว่าแปลกหรอก"
1012303-25 = "คะ...?"
1012303-26 = "ฉันชอบชุดนี้หรือเปล่าน่ะเหรอคะ? อ่า คงเพราะช่วงนี้ฉันหยิบมาใส่บ่อยๆ สินะคะ"
1012303-27 = "ฉันต้องชอบชุดนี้อยู่แล้วค่ะ มันเป็นชุดที่ฉันเลือกเองนี่คะ"
1012303-28 = "จะว่าไป ฉันยังไม่เคยถามเลยนะคะว่าคุณครูรู้สึกยังไง แอบอยากรู้ขึ้นมาแล้วสิคะ"
1012303-29 = "ในสายตาคุณครู ชุดนี้เป็นยังไงบ้างคะ...?"
1012303-30 = "[s5] \"ครูก็ต้องคิดว่ามันน่ารักอยู่แล้ว\"\n[s6] \"เซนส์แฟชั่นของเซอานี่ยอดเยี่ยมเลยนะ\""
1012303-33 = "งั้นสินะคะ..."
1012303-34 = "ก็นะ ฉันกะไว้แล้วละค่ะว่าคุณครูจะพูดแบบนั้น ก็คุณเป็นอย่างนี้ตลอดเลยนี่คะ"
1012303-38 = "ล้อเล่นค่ะ ฉันดีใจจริงๆ นะคะ แต่อายเกินกว่าจะพูดออกมาน่ะ"
1012303-39 = "ฮืม... เซนส์แฟชั่น... เซนส์แฟชั่นงั้นเหรอ..."
1012303-40 = "ใช่ค่ะ เห็นอย่างนี้ฉันก็แอบสนใจเรื่องแฟชั่นอยู่เหมือนกันค่ะ"
1012303-41 = "ชุดที่เข้ากับฤดูกาลและโอกาส... แต่ก็ยังมีจุดเด่นที่ไม่เวอร์เกินไป อะไรแบบนั้นมันน่าสนุกนะคะ"
1012303-42 = "จะว่ายังไงดีล่ะ... นี่คงเหมือนการเขียนเรื่องที่มีพล็อตที่ดี หรือไม่ก็การใส่ปริศนาดีๆ เข้าไป"
1012303-43 = "แต่เมื่อเทียบกับสิ่งที่ฉันชอบแล้ว ฉันก็ไม่มีโอกาสทำให้เป็นเรื่องเป็นราวมากเท่าไรค่ะ แล้วฉันก็ยังมีหลายสายตาจับจ้องด้วย"
1012303-44 = "เพราะงั้นอย่างน้อยในวันแบบนี้... ฉันก็เลยแสดงเซนส์แฟชั่นแบบนั้นออกมาให้เห็นค่ะ"
1012303-45 = "และในเมื่อได้โอกาสแสดงเซนส์แฟชั่นออกมาแล้ว ฉันก็ย่อมอยากให้หลายๆ คนได้เห็น"
1012303-46 = "เพราะงั้นฉันก็เลยดีใจมากที่ได้รับคำชมจากคุณครูค่ะ ขอบคุณนะคะ"
1012303-47 = "แปลกใจงั้นเหรอคะ...?"
1012303-48 = "[s7] \"ก็นิดหน่อยน่ะ แต่ก็น่าชื่นชมนะ\"\n[s8] \"เซอาสนุกกับเรื่องที่ครูคาดไม่ถึงเลยนะเนี่ย\""
1012303-51 = "เอาอีกแล้ว พูดแบบนี้อีกแล้ว"
1012303-52 = "ถ้าเป็นไปได้ฉันก็อยากชวนไปเล่นน้ำด้วยกันเลย แต่ตอนนี้ดูเหมือนคุณครูจะงานยุ่งนะคะ"
1012303-53 = "แล้วฉันก็ไม่อยากดื้อดึงจนรบกวนการทำงานของคุณครูด้วย..."
1012303-57 = "ไม่สิ... ที่จริงฉันก็อยากดื้อนะคะ แต่ฉันก็ดื้อมาบ่อยมากแล้ว งั้นวันนี้ฉันจะอยู่ที่นี่แล้วค่อยกลับค่ะ"
1012303-58 = "ถ้าแบบนั้นจะได้มั้ยคะ?"
1012303-59 = "[s9] \"ได้เลย\"\n[s10] \"อยู่ได้นานเท่าที่ต้องการเลยนะ\""
1012303-62 = "......"
1012303-66 = "......"
1012303-67 = "[s11] \"เซอา...?\"\n[s12] \"ทำไมถึงทำหน้าแบบนั้น...\""
1012303-70 = "ไม่มีอะไรค่ะ..."
1012303-71 = "ถึงฉันจะรู้ดีว่าคุณครูเป็นคนแบบนั้น แต่ฉันก็ผิดเองที่เอาแต่ใช้วิธีเดิมๆ ซ้ำๆ ค่ะ"
1012303-72 = "ก็ได้ค่ะ ในเมื่อคุณครูเป็นคนแบบนั้น เห็นทีฉันคงต้องทำอะไรให้มากกว่านี้หน่อย"
1012303-80 = "[ns13] \"ซะ... เซอา?\"\n[ns14] \"มานั่งตักเลยเหรอ...?\""
1012303-83 = "ฉันจะนั่งพักตรงนี้ค่ะ คุณครูไม่ต้องสนใจฉันนะคะ ทำงานต่อตามสบายได้เลยค่ะ"
1012303-84 = "บางทีฉันอาจจะเจอบางอย่างที่ฉันพอจะช่วยได้ก็ได้นะคะ ถ้าเป็นงานง่ายๆ ที่ไม่ใช่เอกสารลับสุดยอด ฉันจะช่วยเองค่ะ"
1012303-85 = "เห็นอย่างนี้ฉันก็ทำงานในลักษณะนี้เก่งนะคะ"
1012303-86 = "คะ...?"
1012303-87 = "ทำไมถึงทำแบบนี้น่ะเหรอคะ? ฉันโกรธอะไรหรือเปล่าน่ะเหรอคะ?"
1012303-88 = "ฮุฮุ..."
1012303-89 = "ไม่หรอกค่ะ ฉันไม่ได้โกรธอะไรเลยสักนิดค่ะ"
1012303-90 = "ไม่สิ..."
1012303-91 = "ที่จริงฉันก็เคืองๆ อยู่ แต่สีหน้าของคุณครูเมื่อกี้ทำให้ฉันหายเคืองแล้วค่ะ..."
1012303-92 = "ตอนนี้ฉันเริ่มจะสนุกขึ้นมาแล้ว คุณครูไม่ต้องห่วงฉันหรอกค่ะ"
1012303-96 = "ฉันไม่ได้ล้อเล่นด้วยค่ะ ไม่ต้องกังวลนะคะ..."
1012303-97 = "เอาละ เริ่มทำงานสิคะ คุณครู ฉันก็จะช่วยอีกแรง งานจะได้เสร็จไวแล้วไปพักผ่อนได้ไงคะ"
1012303-98 = "รีบทำให้เสร็จ..."
1012303-103 = "แล้วไปพักในห้องพักผ่อนนะคะ..."
1012303-105 = "(แล้วคุณครูก็ทำงานของวันนั้นเสร็จได้อย่างรวดเร็วด้วยความช่วยเหลือของเซอา)"
1012303-106 = "(ส่วนเซอาก็เข้าไปนอนกลางวันบนโซฟาในห้องพักผ่อน เมื่อตื่นแล้วจึงเดินทางกลับไป)"

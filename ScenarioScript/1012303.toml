1012303-83 = "3;세이아 수영복;12;여기서 쉬겠습니다. 신경 쓰지 마시고, 편하게 업무를 봐주세요.\n#3;a\n#3;closeup\n#zmc;instant;316,0;2428\n#3;em;[음표]"
1012303-84 = "3;세이아 수영복;11;아니면 제가 조금 거들 수 있는 게 있을지도 모르겠네요. 단순한 업무나, 기밀 서류가 아니라면 도와드리죠.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-85 = "3;세이아 수영복;03;이래 봬도 이런 일, 꽤 잘하는 편이니까요.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-86 = "3;세이아 수영복;02;……네?\n#3;em;[?]\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-87 = "3;세이아 수영복;02;왜 그러냐고요? 혹시 화났냐고요?\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-88 = "3;세이아 수영복;13;……후후.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-89 = "3;세이아 수영복;03;아닙니다. 전혀 화나지 않았어요.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-90 = "3;세이아 수영복;15;……아니죠.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-91 = "3;세이아 수영복;12;정확하겐 화났었지만, 방금 선생님의 표정으로 인해 풀렸다……. 그렇게 말해야겠군요.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-92 = "3;세이아 수영복;03;지금은 오히려 좀 즐거워졌으니, 신경 쓰지 않으셔도 된답니다.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-93 = "#st;[0,0];instant;1;\n#zmc;instant;316,0;2428"
1012303-94 = "#clearST\n#zmc;instant;316,0;2428"
1012303-95 = "3;세이아 수영복;03\n#3;em;…\n#3;h\n#wait;2500\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-96 = "3;세이아 수영복;11;……이 말은 정말이니, 걱정하지 않으셔도 된답니다.\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-97 = "3;세이아 수영복;08;자, 업무를 시작하세요. 선생님. 저도 거들 테니, 빨리 끝내고 쉬시죠.\n#3;em;[반응]\n#zmc;instant;316,0;2428\n#3;closeup"
1012303-98 = "3;세이아 수영복;15;얼른 끝내고…….\n#zmc;instant;316,0;2428\n#3;closeup"

1012303-16 = "3;세이아 수영복;01\n#3;a\n#3;h\n#wait;2000"
1012303-17 = "3;세이아 수영복;01;……아니."
1012303-18 = "3;세이아 수영복;02;사실은 좀 기쁠지도 모르겠네요. 선생님께서 저에 대해 신경 써서 행동하신 일이 늘어난 거니까요."
1012303-19 = "3;세이아 수영복;15;이것도 뭐랄까……. 조금은 '비중이 늘었다'라고 할 수 있을지도."
1012303-20 = "[s3] \"……세이아?\"\n[s4] \"그거 입고 여기까지 온 거니?\""
1012303-21 = "#wait;10"
1012303-22 = "#wait;10"
1012303-23 = "3;세이아 수영복;12;후후, 신경 쓰이시나요?"
1012303-24 = "3;세이아 수영복;11;너무 걱정 마세요. 올 때 차를 타고 오기도 했으니, 그리 이상하지는 않았을 거예요."
1012303-25 = "3;세이아 수영복;02;……네?\n#3;em;[반응]"
1012303-26 = "3;세이아 수영복;02;이 옷이 마음에 들었냐고요? 아아. 계속 입고 다녀서 그러시는 건가요?"
1012303-27 = "3;세이아 수영복;11;그야 물론이죠. 제가 직접 고른 옷인걸요."
1012303-28 = "3;세이아 수영복;01;그러고 보니 감상을 여쭤본 적이 없네요. 조금 궁금해지는걸요."
1012303-29 = "3;세이아 수영복;12;……어떠신가요? 선생님이 보시기에는.\n#3;em;[?]"
1012303-30 = "[s5] \"물론 예쁘다고 생각해.\"\n[s6] \"패션 센스가 뛰어나구나, 세이아는.\""
1012303-31 = "#wait;10"
1012303-32 = "#wait;10"
1012303-33 = "3;세이아 수영복;02;……그렇군요."
1012303-34 = "3;세이아 수영복;06;뭐, 선생님이라면 그렇게 말해 주실 거라 생각했죠. 늘 그런 식이시니까요."
1012303-35 = "#st;[0,0];instant;1;"
1012303-36 = "#clearST"
1012303-37 = "3;세이아 수영복;01\n#3;h\n#3;em;…\n#wait;2500"
1012303-38 = "3;세이아 수영복;99;농담이에요. 순수하게 기쁜 기분이었는데, 그대로 말하기 부끄러워서요."
1012303-39 = "3;세이아 수영복;14;흠……. 패션 센스……. 패션 센스라…….\n#3;m4"
1012303-40 = "3;세이아 수영복;11;그렇죠. 이래 봬도 은근히 관심이 있는 쪽이거든요, 패션."
1012303-41 = "3;세이아 수영복;03;시즌과 기획에 맞는 옷……. 그러면서도 뻔하지 않게 포인트를 주는 건 재미있죠."
1012303-42 = "3;세이아 수영복;02;뭐랄까……. 좋은 플롯의 글이나 센스 좋은 수수께끼를 만드는 느낌. 이랄까요?"
1012303-43 = "3;세이아 수영복;99;물론 좋아하는 것에 비해, 막상 그걸 실현한 기회는 자주 주어지지 않지만요. 보는 눈도 많고요.\n#3;m3"
1012303-44 = "3;세이아 수영복;11;그러니 이런 날이라도……. 실력을 발휘해 보는 거죠."
1012303-45 = "3;세이아 수영복;05;그리고 이왕 실력을 발휘했으면, 여러 사람에게 보이고 싶은 것 또한 당연지사."
1012303-46 = "3;세이아 수영복;03;그런 의미에서 선생님께서 해주신 칭찬은 아주 기뻤어요. 감사합니다."
1012303-47 = "3;세이아 수영복;01;……의외신가요?"
1012303-48 = "[s7] \"조금은. 하지만 보기 좋아.\"\n[s8] \"의외의 면을 알아서 즐겁네.\""

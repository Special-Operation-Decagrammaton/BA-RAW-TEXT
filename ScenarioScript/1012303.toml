1012303-71 = "3;세이아 수영복;01;그런 분이시라는 걸 모르지 않는데도, 계속 같은 방식을 고수하는 제게 잘못이 있는 거겠죠."
1012303-72 = "3;세이아 수영복;03;알겠습니다. 선생님께선 원래 그런 분이시니, 여기서는 제가 조금 더 나갈 수밖에 없겠네요."

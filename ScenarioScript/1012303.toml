1012303-50 = "#wait;10"
1012303-51 = "3;세이아 수영복;06;또, 또. 그런 말씀을.\n#3;em;[한숨]"
1012303-52 = "3;세이아 수영복;01;아무튼 마음 같아서는 함께 물놀이라도 가고 싶다는 생각이지만, 지금은 다소 바빠 보이시네요."
1012303-53 = "3;세이아 수영복;99;선생님의 업무를 방해하면서까지 떼를 쓰고 싶지는 않으니…….\n#3;m2"

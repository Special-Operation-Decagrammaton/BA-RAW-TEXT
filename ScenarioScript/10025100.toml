[translation]
10025100-1 = "第10話;清理甲板"
10025100-8 = "這裡是RABBIT1，成功進入右舷第一層。"
10025100-9 = "這裡是RABBIT2，成功進入左舷第一層。"
10025100-10 = "了解。"
10025100-11 = "RABBIT2，是否有任何異常？"
10025100-12 = "沒看到船員的身影……唔，怎麼有股臭味！"
10025100-13 = "怎麼了，RABBIT2？"
10025100-14 = "船上有大量的冷凍蝦……看起來是不久前才放在這裡的。"
10025100-15 = "是剛從冷凍庫裡拿出來的嗎……還有部分是結凍的。"
10025100-17 = "你說蝦子被丟掉了……？"
10025100-25 = "這不是……老夫供應給「Red Hook Express」的蝦子嗎。"
10025100-27 = "一眼就能看出來嗎？"
10025100-28 = "當然，自己捕的獵物我記得一清二楚。"
10025100-29 = "這是……聽說要供應給D.U.的高級餐廳，所以特意挑選出來的肉質飽滿的蝦子……#n居然會被丟在這種地方……"
10025100-31 = "竟然這樣糟蹋別人辛苦捕來的蝦子……太過分了。"
10025100-38 = "真是無法理解。#n明明是用高價買來的蝦子，為何要刻意避人耳目在這種地方丟棄……"
10025100-39 = "是有什麼更重要的目的嗎？"
10025100-40 = "箱子……"
10025100-41 = "本來裝著蝦子的箱子在……"
10025100-46 = "……「Red Hook Express」的箱子都堆在這裡！"
10025100-47 = "嗯？好像有奇怪的聲音……裡面裝了什麼？"
10025100-49 = "……RABBIT2，請進行確認。"
10025100-50 = "收到。"
10025100-55 = "這是什麼……瓷器、絲綢，還有香水……？"
10025100-56 = "「Red Hook Express」也有經手這類的商品嗎？"
10025100-57 = "不，我確認了一下，「Red Hook Express」只有取得海產加工品的流通許可。"
10025100-58 = "想要經手其他品項的話，可得事先向聯邦學生會申請才行。"
10025100-60 = "也就是說，這些全都是走私品……？"
10025100-62 = "不只如此，要說這些東西有什麼共通點的話……"
10025100-64 = "那就是它們都是被課了高額關稅的奢侈品──"
10025100-69 = "……看來被你們發現了啊。"
10025100-75 = "你是……"
10025100-76 = "「Red Hook Express」的董事長……！"
10025100-81 = "這艘駁船的存在，還有丟棄蝦子的理由……到底是怎麼回事！"
10025100-82 = "請不要那麼氣憤，太激動對身體可不好。"
10025100-83 = "不用您說，我也會一一說明清楚。"
10025100-87 = "……沒錯，誠如各位所見，這艘駁船不是什麼「返魂之船」。"
10025100-88 = "只是我們「Red Hook Express」的駁船罷了。"
10025100-89 = "話說，棲息在海底的謎樣生物會上岸回收祭品……#n現在這個時代居然還會有人相信這種都市傳說啊。"
10025100-90 = "……為什麼要丟棄蝦子？"
10025100-91 = "因為蝦子賺不到錢。"
10025100-93 = "……我們終究是生意人。"
10025100-95 = "難道您不清楚嗎？#n蝦子是賺不了什麼錢的。"
10025100-96 = "漁業由於產量不夠穩定，因此很難簽訂合約。#n能領到的補助也少得可憐……"
10025100-97 = "還不如把走私品偽裝成蝦子轉賣到黑市，這樣就能賺到10倍、20倍的利潤啊！"
10025100-98 = "就，就算是那樣，也用不著把蝦子丟掉吧！"
10025100-99 = "你知道那位老人家為了捕到那些蝦子花費了多少汗水嗎！"
10025100-100 = "……吵死了。"
10025100-101 = "那又怎樣，有什麼問題嗎？我已經付過蝦子的錢了吧？"
10025100-102 = "既然如此，要煎煮炒炸都是我的自由……當然，我一點都不想吃就是了。"
10025100-104 = "我之前沒跟你們說過嗎？再次重申，我討厭蝦子。"
10025100-111 = "你這傢伙會遭天譴的！！"
10025100-119 = "你們似乎還沒有明白自己的處境啊……#n這裡，可是我的船哦？"
10025100-120 = "在海上讓幾個人失蹤不是什麼難事。"
10025100-122 = "你知道自己在說什麼嗎！？#n這可是犯罪啊！"
10025100-123 = "所以呢？那又如何？"
10025100-124 = "你們又能怎麼辦？"
10025100-126 = "腦袋裡只有捕蝦的漁夫。"
10025100-128 = "不被本部放在眼裡的吊車尾學生。"
10025100-129 = "幾天前連這個村子的存在都不知道的外人。"
10025100-131 = "面對掌控這個村子經濟的我……又能奈我何？"
10025100-132 = "除了憤怒、辱罵、詛咒以外什麼都做不到啊！你們這群鄉巴佬！！"
10025100-142 = "[ns]「……都子。」"
10025100-143 = "……是。#n你說的話我們全都聽見了。"
10025100-145 = "我記得你們是最近才到村子裡的觀光客對吧……？"
10025100-147 = "海運公司「Red Hook Express」董事長──"
10025100-148 = "你濫用自己在夜戶浦村的經濟地位，犯下了數道罪行──#n非法丟棄海產造成海洋汙染、侵占本應提供給漁會的補助金。"
10025100-149 = "偽造會計帳目、運送未經登錄的商品、逃漏巨額稅金。"
10025100-150 = "以不當所得募集私兵，散布虛假的情報蒙騙居民──"
10025100-151 = "──以及，從D.U.奪走了夜戶浦村的蝦子。"
10025100-152 = "此為侵害奇普托斯市民安全的重大犯罪……"
10025100-153 = "我將以SRT特殊學園的名義，對你進行緊急逮捕！"
10025100-155 = "SRT，特殊學園……？#nSRT的學生怎麼會在這種地方……！？"
10025100-156 = "你雖然對賺不了錢的東西不屑一顧……"
10025100-157 = "我們可是很喜歡的啊……這個村子的蝦子。"
10025100-159 = "SRT……特殊學園？"
10025100-160 = "我有聽說過。是在事件發生後，總是會率先被投入現場的特殊部隊……"
10025100-161 = "我還以為已經被廢校了……居然還健在啊！"
10025100-167 = "嘖……！#n竟然給我在大海中央遇到SRT，今天真是倒楣到家了。"
10025100-168 = "不過，可不能就這麼放棄……#n你們知道我為了這個計畫投入了多少錢嗎！"
10025100-169 = "全體船員，到甲板集合！"
10025100-177 = "就算是特化於戰鬥的SRT，也勝不過數量的暴力吧？"
10025100-179 = "讓他們知道擋人財路的下場！！"
10025100-184 = "所有人準備戰鬥。"
10025100-188 = "……開始清理甲板！"

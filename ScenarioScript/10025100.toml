[translation]
10025100-1 = "Episode 10;Mopping the Deck"
10025100-8 = "RABBIT 1, entry secured on starboard side."
10025100-9 = "RABBIT 2, entry secured on port side."
10025100-10 = "Roger."
10025100-11 = "RABBIT 2, do you see anything?"
10025100-12 = "No signs of the crew, but I do smell...fish... Ugh...!"
10025100-13 = "RABBIT 2, report!"
10025100-14 = "Someone piled up a whole bunch of shrimp here. It's just starting to thaw."
10025100-15 = "Some of them still have ice, so they were taken out of refrigeration not too long ago..."
10025100-17 = "Frozen shrimp, you say...?"
10025100-25 = "That's the shrimp I delivered to Red Hook Express..."
10025100-27 = "How can you tell?"
10025100-28 = "I don't know much, miss, but I know shrimp. Those are the ones I caught myself, no doubt about it."
10025100-29 = "I specially picked out the largest shrimp, since they said it was for those fancy restaurants in the D.U. I can't believe someone dumped them out..."
10025100-31 = "To toss out the fruits of your hard work... How awful."
10025100-38 = "I don't get it. Why'd they pay the fishermen for all this shrimp, just to throw it all away?"
10025100-39 = "And if they aren't here to transport the shrimp, then what are they doing out here?"
10025100-40 = "...The containers."
10025100-41 = "I don't see any of the containers they use to transport the shrimp. Where are they?"
10025100-46 = "There! I see a bunch of Red Hook Express boxes over there!"
10025100-47 = "It makes a weird noise when I shake it. I wonder..."
10025100-49 = "RABBIT 2, please confirm."
10025100-50 = "Confirming."
10025100-55 = "What is this? Vases and silk and...expensive perfume?"
10025100-56 = "Does Red Hook Express deal in luxury goods?"
10025100-57 = "Nope. Red Hook Express has a license to distribute seafood, and only seafood."
10025100-58 = "If they want to expand to other goods, they'll need to take that up with the General Student Council."
10025100-60 = "Then this is all contraband...?"
10025100-62 = "All kinds of things in that crate, but there's something they all have in common..."
10025100-64 = "The tariffs on those items is more than it costs to make them."
10025100-69 = "...So we've been found out."
10025100-75 = "You're..."
10025100-76 = "The CEO of Red Hook Express...!"
10025100-81 = "You've got some explaining to do. What's this ship? And why's my shrimp piled up on the deck?!"
10025100-82 = "No need to get so upset. At your age, you really do need to watch your blood pressure."
10025100-83 = "I'll explain everything, don't you worry."
10025100-87 = "You may have noticed that this is not actually the Stygian Ship."
10025100-88 = "It's simply a Red Hook Express barge with a few modifications."
10025100-89 = "I hope you're not disappointed that there are no Deep Ones here... But who is naive enough to believe such a tale in the first place?"
10025100-90 = "You still haven't explained why you're tossing out the shrimp."
10025100-91 = "Well gee, why would I do something crazy like that?"
10025100-93 = "Because they're not profitable."
10025100-95 = "Not that I expect you to keep up with business trends, but shrimp just don't bring in big money nowadays."
10025100-96 = "Fishing is unpredictable, so we can't get fixed contracts, and the subsidies are a pittance..."
10025100-97 = "But if we dump the shrimp, fill the boxes with contraband, and sell it on the black market, then there's profit to be made!"
10025100-98 = "B-But there was no need to throw the shrimp away!"
10025100-99 = "Do you know how much effort it takes just to catch one shrimp?!"
10025100-100 = "No need to shout."
10025100-101 = "I paid for the shrimp fair and square, didn't I? I can do what I want with it."
10025100-102 = "It's up to me whether I grill it or fry it or eat it... Of course, I'd never eat a shrimp."
10025100-104 = "Because—and I'm letting you in on a big secret here—shrimp! Is! Disgusting!"
10025100-111 = "You...!"
10025100-119 = "Mind your tone of voice, old salt. You're on my ship, you know."
10025100-120 = "I'd hate for you to take a little tumble overboard..."
10025100-122 = "Are you crazy? This is a crime!"
10025100-123 = "So? What about it?"
10025100-124 = "I mean, you aren't going to do anything."
10025100-126 = "An old fisherman from a small village who only knows how to catch shrimp..."
10025100-128 = "Some poor abandoned police students, totally ignored by their academy..."
10025100-129 = "Four tourists who were foolish enough to come here, of all places..."
10025100-131 = "What can you do against me? I hold the entire economy of this village in my grasp!"
10025100-132 = "I suppose you can scream and curse and call me bad names. You peasants!"
10025100-142 = "[ns] \"...Miyako.\""
10025100-143 = "Right. I've heard enough."
10025100-145 = "Oh, the tourists have something to say?"
10025100-147 = "You have just admitted to gross abuse of your economic power over Yatoura Village, as well as the following crimes:"
10025100-148 = "The dumping of unprocessed seafood and misappropriation of fishing subsidies."
10025100-149 = "Tax evasion, falsification of business records, and smuggling of luxury products."
10025100-150 = "Operating an illegal private military force using ill-gotten funds and waging a campaign of terror on the local village."
10025100-151 = "...and preventing the citizens of the D.U. from enjoying delicious shrimp."
10025100-152 = "You have presented a grave and present danger to the citizens of Kivotos, and therefore..."
10025100-153 = "In the name of SRT Academy, you are under arrest!"
10025100-155 = "SRT...? What the hell are SRT students doing here...?"
10025100-156 = "Maybe you can just brush them aside, since they aren't very profitable..."
10025100-157 = "...but we happen to like the shrimp of this village. A lot."
10025100-159 = "SRT Academy, eh...?"
10025100-160 = "Hey, I've heard of them! They're a special forces group. Best of the best in law enforcement..."
10025100-161 = "I heard that SRT Academy closed down... Guess I heard wrong!"
10025100-167 = "Well, that's some bad luck, meeting some SRT brats out in the middle of the ocean..."
10025100-168 = "But I've gone too far to back down now. If you think I'll go quietly, you're sadly mistaken."
10025100-169 = "All hands, to the top deck!"
10025100-177 = "You may be special forces, but you're hopelessly outnumbered."
10025100-179 = "Let's show these fools what we do to brats who meddle in our business!"
10025100-184 = "Squad, prepare for battle!"
10025100-188 = "It's time to mop the deck!"

[translation]
10025100-1 = "ตอนที่ี 10;ทำความสะอาดดาดฟ้าเรือ"
10025100-8 = "นี่คือ RABBIT 1 ฉันเข้ามาในทางปีกขวาของชั้น 1 แล้ว"
10025100-9 = "นี่คือ RABBIT 2 ฉันเข้ามาในทางปีกซ้ายของชั้น 1 แล้ว"
10025100-10 = "รับทราบ"
10025100-11 = "RABBIT 2 พบอะไรแปลกๆ ไหมคะ?"
10025100-12 = "ฉันไม่เห็นวี่แววของลูกเรือเลย แต่ว่าได้กลิ่นเหม็นคลุ้งจากอะไรไม่รู้... อึ๋ย!"
10025100-13 = "มีอะไรเหรอคะ RABBIT 2?"
10025100-14 = "...ตรงนี้มีกุ้งที่ตายแล้วทิ้งอยู่เต็มไปหมดเลย แต่ดูสภาพแล้ว เหมือนจะยังไม่นานเลยนะ"
10025100-15 = "แถมกุ้งบางส่วนยังถูกแช่แข็งอยู่ด้วย เหมือนเพิ่งเอาออกมาจากตู้แช่แข็งยังไงยังงั้น"
10025100-17 = "กุ้งแช่แข็งถูกทิ้งไว้งั้นเหรอ...?"
10025100-25 = "นั่นมัน... กุ้งที่ฉันส่งให้ <เรด ฮุก เอ็กซ์เพรส> นี่นา"
10025100-27 = "แค่เห็นกุ้งก็รู้แล้วเหรอว่าใครเป็นคนหามันมาได้?"
10025100-28 = "ของคนอื่นฉันไม่รู้หรอก แต่ถ้าเป็นกุ้งที่ฉันหามาได้ ฉันจำได้หมดนั่นแหละ"
10025100-29 = "โดยเฉพาะกุ้งที่มีไข่พวกนี้ ประธานเรด ฮุก เอ็กซ์เพรสบอกฉันว่าจะเอาไปส่งให้ร้านอาหารชั้นหรูใน D.U. ฉันก็เลยบรรจงเลือกให้อย่างดี... แต่มันกลับถูกเอามาทิ้งในที่แบบนี้..."
10025100-31 = "เอาของที่คนอื่นตั้งใจหามาอย่างยากเย็นมาทิ้งกันแบบนี้ได้ไง... ทำเกินไปแล้ว"
10025100-38 = "ฉันไม่เห็นจะเข้าใจเลย เอากุ้งที่รับซื้อมาแพงๆ มาแอบทิ้งกันแบบนี้ทำไม..."
10025100-39 = "หรือทางนั้นจะมีจุดประสงค์อื่นนอกเหนือจากกุ้ง?"
10025100-40 = "ลัง..."
10025100-41 = "ฉันไม่เห็นลังที่เอาไว้ใส่กุ้งเลย มันหายไปไหนแล้วล่ะคะ?"
10025100-46 = "... ลังกุ้งของ <เรด ฮุก เอ็กซ์เพรส> กองกันอยู่ตรงนี้เป็นพะเนินเลย!"
10025100-47 = "แต่พอเขย่าดูก็มีเสียงแปลกๆ ออกมาด้วย... มีอะไรใส่ไว้ข้างในนี้นะ?"
10025100-49 = "... RABBIT 2 ช่วยตรวจสอบด้วยค่ะ"
10025100-50 = "รับทราบ"
10025100-55 = "อะไรเนี่ย? เครื่องปั้นดินเผา ผ้าทำชุดกิโมโน... แล้วก็น้ำหอมชั้นดี?"
10025100-56 = "<เรด ฮุก เอ็กซ์เพรส> ค้าขายสินค้าประเภทนี้ด้วยเหรอ?"
10025100-57 = "ไม่นะ เรด ฮุก เอ็กซ์เพรสได้รับอนุญาตให้ขนส่งและจัดจำหน่ายอาหารทะเลเท่านั้น"
10025100-58 = "หากจะทำการค้าสินค้าอื่นด้วยก็ต้องไปขออนุญาตต่างหากจากองค์การนักเรียนก่อนสิ"
10025100-60 = "งั้นของที่อยู่ข้างในนี้คือสินค้าหนีภาษีเหรอ...?"
10025100-62 = "ยิ่งดูสินค้าหนีภาษีที่ซากิหยิบออกมาแล้ว แต่ละชิ้นมันมีสิ่งที่เหมือนกันอยู่..."
10025100-64 = "ทุกชิ้นคือสินค้าฟุ่มเฟือยราคาแพงที่บวกภาษีศุลกากรแพงกว่าราคาทุนอีก—"
10025100-69 = "... สุดท้ายก็หาเจอจนได้สินะครับ"
10025100-75 = "คุณคือ..."
10025100-76 = "ประธาน <เรด ฮุก เอ็กซ์เพรส>...!"
10025100-81 = "เรือลำนี้มันอะไรกัน? แล้วทำไมกุ้งของฉันถึงได้ถูกทิ้งอยู่แบบนี้!"
10025100-82 = "อย่าโมโหไปหน่อยเลยน่า ผู้อาวุโส โกรธไปมันไม่ดีต่อสุขภาพนะครับ"
10025100-83 = "ยังไงผมก็จะอธิบายให้ฟังอยู่แล้วครับ ไม่ต้องมารบเร้ากันหรอก"
10025100-87 = "... ก็อย่างที่เห็นนั่นละครับว่าเรือลำนี้ไม่ใช่ <เรือส่งวิญญาณ>"
10025100-88 = "แต่มันเป็นเรือบรรทุกสินค้าที่ใช้เพื่อขนส่งสินค้าของ <เรด ฮุก เอ็กซ์เพรส> ของเราก็เท่านั้น"
10025100-89 = "ส่วนที่บอกว่าสิ่งมีชีวิตลึกลับในท้องทะเลลึกลงเรือมารับเครื่องบรรณาการที่ชายฝั่งน่ะ... สมัยนี้ยังมีใคร#nในโลกที่ยังเชื่อตำนานเหลวไหลอะไรแบบนี้ด้วยเหรอครับ?"
10025100-90 = "...แล้วทำไมถึงเอากุ้งไปทิ้งในทะเลล่ะ?"
10025100-91 = "สำหรับคนเป็นพ่อค้าแล้ว มันจะมีเหตุผลอื่นด้วยเหรอครับ?"
10025100-93 = "นอกจากว่าสินค้านั้น... มันทำเงินไม่ได้น่ะครับ"
10025100-95 = "ผู้อาวุโส จะบอกให้นะครับว่าหมู่นี้กุ้งทำเงินเยอะๆ ให้ผมไม่ได้เลย"
10025100-96 = "ปริมาณที่หาได้ก็เอาแน่เอานอนไม่ได้ อย่าว่าแต่ทำสัญญาซื้อขายระยะยาวเลยครับ แค่เงินสนับสนุน#nการซื้อจากกลุ่มสหกรณ์ยังไม่ค่อยจะได้..."
10025100-97 = "สู้เอากุ้งนั่นไปทิ้งแล้วหาสินค้าหนีภาษีใส่ลังไปขายที่ตลาดมืดยังดีเสียกว่า ทำแบบนี้ได้กำไรเป็น 10-20 เท่าเลยละครับ!"
10025100-98 = "ตะ... แต่ถึงอย่างนั้นก็ไม่เห็นจะต้องเอาไปทิ้งเลยนี่นา!"
10025100-99 = "ผู้อาวุโสของเราต้องลำบากแค่ไหนกว่าจะจับกุ้งมาได้แต่ละตัว!"
10025100-100 = "เฮ้อ... หนวกหูชะมัดเลย"
10025100-101 = "แล้วมันยังไงล่ะ มีปัญหาตรงไหนหรือไง? ผมก็จ่ายเงินค่ากุ้งไปแล้วนี่?"
10025100-102 = "กุ้งนั่นผมเป็นคนซื้อมา ต่อให้เอาไปย่างหรือทำกุ้งเทมปุระกินมันก็เรื่องของผม ...แต่ยังไงก็ไม่กินหรอก"
10025100-104 = "ก่อนหน้านี้ผมก็บอกไปแล้วไม่ใช่เหรอ? งั้นจะบอกให้รู้อีกครั้งก็แล้วกันนะ ว่าผมไม่ชอบกินกุ้งสุดๆ"
10025100-111 = "เจ้าพ่อค้าหัวหมอนี่...!"
10025100-119 = "ดูเหมือนจะยังไม่รู้สถานการณ์และสถานะของตัวเองด้วยนะ... เรือที่ยืนกันอยู่น่ะมันเรือของผม!"
10025100-120 = "การแจ้งว่าคนหายตัวไปในทะเลน่ะ มันไม่ใช่เรื่องยากหรอกนะ!"
10025100-122 = "คุณรู้ตัวหรือเปล่าคะว่ากำลังพูดอะไรออกมา? นี่มันอาชญากรรมนะคะ!"
10025100-123 = "แล้วไง? จะทำไมล่ะ?"
10025100-124 = "พวกเธอทำอะไรกันได้งั้นเหรอ?"
10025100-126 = "นี่ก็ชาวประมงแก่ๆ ที่ทำอะไรไม่เป็นนอกจากจับกุ้ง"
10025100-128 = "ส่วนนี่ก็นักเรียนตำรวจจากหลังเขาที่โรงเรียนหลักไม่สนใจ"
10025100-129 = "แล้วก็คนต่างถิ่นที่ไม่รู้อะไรสักนิดเกี่ยวกับหมู่บ้านนี้"
10025100-131 = "พวกเธอคิดว่าจะทำอะไรกับคนที่ขับเคลื่อนเศรษฐกิจของหมู่บ้านนี้ได้งั้นเหรอ?"
10025100-132 = "ก็คงทำได้แค่โกรธ ก่นด่า แล้วก็สาปแช่ง นอกจากนี้จะไปทำอะไรได้! พวกบ้านนอกที่ไม่มีอะไรเลย!"
10025100-142 = "[ns] \"มิยาโกะ...\""
10025100-143 = "ค่ะ ขอบคุณที่แจ้งให้ทราบนะคะ"
10025100-145 = "พวกเธอคือนักท่องเที่ยวชุดใหม่ที่มาเที่ยวหมู่บ้านนี้เหรอ...?"
10025100-147 = "ประธาน <เรด ฮุก เอ็กซ์เพรส> คุณกระทำความผิดฐานใช้สถานะทางเศรษฐกิจที่มีต่อหมู่บ้านยาโตอูระ#nในทางที่ผิดค่ะ"
10025100-148 = "ความผิดฐานทิ้งสินค้าทางทะเลลงทะเลโดยไม่ได้รับอนุญาต และฉ้อโกงเงินรับซื้อที่สนับสนุนต่อชาว#nประมง"
10025100-149 = "ความผิดฐานปลอมแปลงบัญชี และหลบเลี่ยงภาษีจำนวนมากจากการหมุนเวียนสินค้าฟุ่มเฟือยที่ไม่ได้#nรับอนุญาตให้ทำการค้า"
10025100-150 = "ความผิดฐานใช้ประโยชน์จากองค์กรผิดกฎหมายด้วยกำไรที่ได้มาจากอาชญากรรมอีกที"
10025100-151 = "...และความผิดฐานที่ทำให้ชาวเมือง D.U. ไม่ได้กินกุ้งที่เป็นสินค้าขึ้นชื่อของหมู่บ้านยาโตอูระ!"
10025100-152 = "ทั้งหมดนี้ถือเป็นอาชญากรรมร้ายแรงที่ละเมิดความปลอดภัยของชาวคิโวทอส..."
10025100-153 = "ฉันจึงขอจับกุมคุณเป็นกรณีเร่งด่วน ในนามของสถาบันพิเศษ SRT ค่ะ!"
10025100-155 = "หา... สถาบันพิเศษ SRT งั้นเหรอ...? ทำไมนักเรียนจาก SRT ถึงมาอยู่ที่นี่ได้...?"
10025100-156 = "คุณอาจจะไม่ใส่ใจสินค้าของที่นี่สักเท่าไรเพราะมันทำเงินให้ไม่ได้สินะคะ..."
10025100-157 = "...แต่รู้ไว้ด้วยค่ะว่าพวกฉันชอบกุ้งของหมู่บ้านนี้มาก"
10025100-159 = "สถาบันพิเศษ... SRT?"
10025100-160 = "ฉันเคยได้ยินมาว่าเป็นหน่วยรบพิเศษที่ไปถึงที่ก่อเหตุอาชญากรรมได้รวดเร็วกว่าองค์กรเพื่อความสงบ#nเรียบร้อยอื่นๆ..."
10025100-161 = "คิดว่าสถาบันพิเศษ SRT ถูกยุบไปแล้วเสียอีก... ยังอยู่กันดีสินะคะ!"
10025100-167 = "บ้าจริง... นี่ต้องดวงซวยขนาดไหนถึงต้องมาเจอพวก SRT กลางทะเลเนี่ย...!"
10025100-168 = "แต่ของพวกนี้ทำเงินได้มหาศาล พวกเธอคิดว่าฉันจะยอมโดนเล่นงานงั้นเรอะ?"
10025100-169 = "ลูกเรือทุกคน มารวมตัวกันที่ดาดฟ้าเรือ!"
10025100-177 = "ต่อให้เราต้องเผชิญหน้ากับสมาชิก SRT ที่เชี่ยวชาญในการต่อสู้ แต่จำนวนคนเรามีมากกว่า ยังไงก็ยังชนะได้"
10025100-179 = "มาทำให้พวกอวดดีได้เห็นกันเลยว่าถ้ามาขัดขวางธุรกิจของคนอื่นแล้วจะเป็นยังไง!"
10025100-184 = "สมาชิกกองทหารทุกคน เตรียมตัวต่อสู้"
10025100-188 = "... การทำความสะอาดดาดฟ้าเรือจะเริ่มตั้งแต่ตอนนี้ค่ะ!"

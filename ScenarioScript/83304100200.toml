[translation]
83304100200-6 = "เอกสารนี้เอาไว้ตรงนี้..."
83304100200-7 = "แล้วแผ่นนี้ก็ต้องอยู่ตรงนี้ไหมนะ..."
83304100200-8 = "เอกสารที่ต้องจัดการก่อนจะออกไปฝึกก็น่าจะมีเท่านี้..."
83304100200-9 = "ต่อไปก็คงเป็น... เตรียมฝึกการต่อต้านการก่อการร้ายก่อนจะจัดปาร์ตี้เกเฮนน่าสินะ"
83304100200-10 = "ถึงจะไม่ใช่การฝึกหนักเป็นพิเศษ แต่ต่อให้เป็นเรื่องเล็กๆ น้อยๆ เราก็ต้องทำให้สมบูรณ์แบบ..."
83304100200-11 = "เพราะเราไม่รู้เลยว่าแพนเดโมเนียม โซไซตี้จะเอาอะไรมาเล่นงานคนอื่นอีก"
83304100200-12 = "เอาเป็นว่า... เรียกรวมสมาชิกที่จะเข้ารับการฝึกฝนก่อนแล้วกัน"

[translation]
1009306-1 = "คิราระ ออน เดอะ สตรีท"
1009306-2 = "(คุณครูได้รับการติดต่อที่น่าดีใจจากคิราระ จึงมุ่งหน้าไปยังสถานที่นัด)"
1009306-9 = "อ๊ะ! ครู! ทางนี้ๆ!"
1009306-10 = "อีกตั้ง 20 นาทีกว่าจะถึงเวลานัด ครูนี่มาเร็วจังเลยนะ!"
1009306-11 = "[s1] \"รอนานรึเปล่า?\"\n[s2] \"คิราระมาก่อนครูอีกนะ\""
1009306-14 = "อะฮ่า! ฉันตื่นเต้นที่จะได้มาเที่ยวเล่นกับครู ก็เลยออกมาก่อนล่วงหน้าน่ะ!"
1009306-15 = "ฉันสอบซ่อมหมดแล้ว ทีนี้ก็ไม่มีอะไรให้กังวลแล้วละ ไปเล่นสนุกให้สบายใจกันเถอะ!"
1009306-16 = "ปกติครูมีร้านไหนที่ไปบ่อยๆ บ้างมั้ย?"
1009306-17 = "หืม? งานยุ่งจนไม่ค่อยรู้ว่าแถวนี้มีร้านอะไรบ้างงั้นเหรอ?"
1009306-18 = "งั้นก็ดีเลย!"
1009306-19 = "ฉันจะแนะนำร้านที่ไปบ่อยๆ ให้เอง อาจจะตรงกับรสนิยมของครูก็ได้นะ!"
1009306-20 = "เอาละ งั้นรีบไปกัน!"
1009306-23 = "ขอเครปไส้ทะลัก รสสตรอว์เบอร์รีกับกล้วยค่ะ!"
1009306-24 = "2 ชิ้นใช่ไหมครับ? รอสักครู่นะครับ!"
1009306-29 = "ร้านนี้อร่อยมากเลยนะ กัดคำเดียวแล้วอาจขึ้นสวรรค์เลยก็ได้!"
1009306-30 = "ที่นี่น่ะ ใส่ทั้งสตรอว์เบอร์รี่ ทั้งกล้วย บลูเบอร์รี่ แล้วก็วิปปิ้งครีมให้เยอะมากเลยละ ร้านคุณภาพดีๆ แบบนี้หาไม่ได้ง่ายๆ นะ!"
1009306-31 = "เครปไส้ทะลัก 2 ชิ้น ได้แล้วครับ"
1009306-37 = "เอ้า! อันนี้ของครู!"
1009306-38 = "[ns] \"ไหนขอลองชิมหน่อย...\""
1009306-41 = "เป็นไง? เป็นไง?"
1009306-42 = "[s] \"อื้ม อร่อยดีนะ\""
1009306-43 = "ใช่มั้ย? กะไว้แล้วเชียวว่าครูต้องชอบ!"
1009306-44 = "เอ้า ลองชิมของฉันด้วยสิ! ของฉันเป็นไส้สตรอว์เบอร์รี่น่ะ!"
1009306-45 = "ถ้าได้ชิมทั้ง 2 ไส้ ก็สนุกได้เป็น 2 เท่าเลยใช่มั้ยล่ะ?"
1009306-46 = "เอ้า อ้าม~!"
1009306-47 = "หืม? ทำไมเหรอ? ถึงฉันจะกินไปบ้างแล้วก็เถอะ แต่ว่ามันไม่ทำให้รสชาติเปลี่ยนไปนะ"
1009306-48 = "[ns] กัดเครปที่คิราระยื่นให้"
1009306-52 = "เป็นไง? อร่อยใช่มั้ย? รู้แล้วใช่มั้ยล่ะว่าทำไมฉันถึงชอบรสนี้ที่สุด?"
1009306-56 = "อะฮ่าฮ่า! อ๊ะ วิปปิ้งครีมเลอะปากแล้วนะ จะเก็บไว้กินทีหลังเหรอ? อะฮ่าฮ่า!"
1009306-57 = "เอ้า! หันมาทางนี้สิ ฉันเช็ดให้!"
1009306-58 = "[s] \"ครูเช็ดเองได้ ไม่ต้องถึงกับเช็ดให้ครูหรอก...\""
1009306-59 = "ไม่ได้ ไม่ได้หรอก ฉันไม่ชอบให้คนที่ไปไหนมาไหนกับฉันดูมอมแมมหรอกนะ!"
1009306-60 = "เอ๋ แต่ไม่มีทิชชู่แฮะ"
1009306-61 = "งั้นเอามือเช็ดก่อน..."
1009306-65 = "(เช็ดคราบออก)"
1009306-66 = "[ns] \"?!?!\""
1009306-68 = "เอาละ งั้นก็ไปที่ต่อไปเลย!"
1009306-73 = "ครู ดูนี่สิ! ชุดนี้น่ารักมากเลยว่ามั้ย?"
1009306-74 = "หืม? เสื้อยืดแบบเดียวกันขาย 1 แถม 1 งั้นเหรอ...?"
1009306-76 = "ว่าไงครู? เราซื้อเสื้อคู่กันมั้ย?"
1009306-105 = "ฮู่ว... เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย"
1009306-106 = "เหนื่อยรึเปล่าน่ะครู?"
1009306-107 = "[s] \"ที่จริงครูหมดแรงตั้งแต่เมื่อกี้แล้ว...\""
1009306-108 = "อ๊ะ! งั้นก็บอกกันก็ได้นี่!"
1009306-109 = "ขอโทษนะ ฉันก็เดินเที่ยวเพลินจนไม่รู้ตัวเลย..."
1009306-110 = "หืม? ถึงจะเหนื่อย แต่การเที่ยวเล่นกับฉันก็สนุกงั้นเหรอ?"
1009306-111 = "อะฮ่าฮ่า ถ้าจะพูดอย่างนั้นก็ขอบคุณนะ!"
1009306-112 = "อืม~ แต่ถ้าจะกลับไปเลยก็น่าเสียดาย..."
1009306-113 = "ครู! เราแวะไปที่สวนสาธารณะเป็นที่สุดท้ายกันเถอะ!"
1009306-116 = "ฮู่ว ฉันก็ปวดขาขึ้นมาแล้วเหมือนกัน"
1009306-117 = "นานมากแล้วที่ไม่ได้เดินเที่ยวจนปวดขาแบบนี้"
1009306-118 = "[s] \"ปกติคิราระก็เที่ยวเล่นกับเพื่อนๆ บ่อยอยู่แล้วไม่ใช่เหรอ?\""
1009306-119 = "อื้ม ไปไหนทีหนึ่งก็ 3-4 คนน่ะ ฉันชอบความจอแจและก็ความคึกคักน่ะ มันน่าสนุกออก!"
1009306-120 = "วันนี้มาแค่ 2 คนก็จริง แต่เหมือนจะเดินเยอะกว่าปกติเลยนะ"
1009306-121 = "หรือว่าฉันจะสนุกเกินเบอร์ไปไหมนะ?"
1009306-122 = "[s] \"น่าจะเพราะโล่งใจที่สอบซ่อมผ่านแล้วรึเปล่า?\""
1009306-123 = "เรื่องนั้นก็มีส่วนนะ แต่ฉันว่า..."
1009306-127 = "น่าจะเป็นเพราะคนที่เดินด้วยกันมากกว่า... รึเปล่า?"
1009306-128 = "มะ... ไม่รู้จริงๆ ด้วยแฮะ! ฉันว่าเรากลับกันเถอะ!"
1009306-130 = "(หลังจากนั้นคุณครูก็เดินเล่นกับคิราระต่ออีกหน่อย แล้วก็กลับมาที่ชาเล่ต์)"

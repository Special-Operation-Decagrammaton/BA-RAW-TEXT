[translation]
1009306-1 = "Kirara on the Street"
1009306-2 = "After receiving Kirara's elated message, I headed over to meet up with her."
1009306-9 = "Teach! Teach! Over here!"
1009306-10 = "Wooow, how diligent, Teach! You're twenty minutes early!"
1009306-11 = "[s1] \"Were you waiting for long?\"\n[s2] \"You're even earlier!\""
1009306-14 = "Haha! I was just so psyched about hanging out, I ended up getting here a tiny bit early!"
1009306-15 = "I'm finally done with my make-up test, so now I'm home free! Let's do something fun!"
1009306-16 = "Where do you like to shop, Teach?"
1009306-17 = "...Huh? You've been too busy with work to explore the area?"
1009306-18 = "That's perfect!"
1009306-19 = "I'll show you around all my favorite spots. You might even find a store you like, Teach!"
1009306-20 = "C'mon! Hurry, hurry!"
1009306-23 = "Two supersized crepes, one strawberry and one banana, please!"
1009306-24 = "Two crepes, coming right up!"
1009306-29 = "This place is the bomb! You're gonna fall in love at the first bite!"
1009306-30 = "They don't skimp at all with the strawberries, bananas, blueberries, and whipped cream here! You can't find another place with this kinda quantity and quality!"
1009306-31 = "Here are your supersized crepes!"
1009306-37 = "Yay! This one's yours, Teach!"
1009306-38 = "[ns] \"Don't mind if I do...\""
1009306-41 = "Do you like? How is it?"
1009306-42 = "[s] \"Yum. It's delicious!\""
1009306-43 = "Right?! I just knew you'd like it, Teach!"
1009306-44 = "Here, try a bite of mine!"
1009306-45 = "Double the excitement, double the taste! Or something!"
1009306-46 = "Okay! Say, \"Aaah!\""
1009306-47 = "Huh? C'mon, what's wrong? I know it looks kinda funny, but it's just because I took a few bites! I promise it's still super yummy."
1009306-48 = "[ns] Take a bite of Kirara's crepe."
1009306-52 = "Super yummy, right? It's my favorite crepe place for a reason, after all!"
1009306-56 = "Hahaha! You got whipped cream all over your face, Teach! You saving it for later or something?"
1009306-57 = "Okay, come here!"
1009306-58 = "[s] \"Ah. You don't have to wipe it—\""
1009306-59 = "Nope! No way! You gotta look put together if you're gonna hang out with me!"
1009306-60 = "Let's see... Ah, we didn't get any napkins."
1009306-61 = "For now, my hand'll do..."
1009306-65 = "(lick)"
1009306-66 = "[ns] \"?!?!\""
1009306-68 = "All right, next place!"
1009306-73 = "Teach! Check this out! It's so cute!"
1009306-74 = "Huh? This shirt is buy one, get one?"
1009306-76 = "What do you think, Teach? Should we match? Heehee."
1009306-105 = "Oh my gosh, it's so late!"
1009306-106 = "You're not tired, Teach?"
1009306-107 = "[s] \"I reached my limit a long time ago...\""
1009306-108 = "Gah! You should've said something!"
1009306-109 = "Sorry... I totally got carried away..."
1009306-110 = "Huh? You still had fun? Even though you were tired?"
1009306-111 = "Hahaha! Aw, okay! Thanks. That makes me feel better."
1009306-112 = "Hm... I don't wanna end the day on this note, though..."
1009306-113 = "Let's visit the park before we call it, Teach!"
1009306-116 = "Phew! My feet are pretty tired too!"
1009306-117 = "I can't remember the last time I've walked until my legs hurt!"
1009306-118 = "[s] \"Don't you go out with your friends all the time, Kirara?\""
1009306-119 = "Yup! I like being in a rowdy group, so normally with like three or four people!"
1009306-120 = "But, even with just the two of us, I walked way more than usual today!"
1009306-121 = "I think I got a little caught up in the moment!"
1009306-122 = "[s] \"Maybe it was the adrenaline from passing your make-up test?\""
1009306-123 = "That was definitely a factor! But actually..."
1009306-127 = "I think, more than anything, it was the company I had today..."
1009306-128 = "I-I mean, who knows? I don't! Anyway, we gotta get going!"
1009306-130 = "Kirara and I walked around a little longer, then I returned to Schale."

[translation]
1009306-1 = "綺羅羅 on the street"
1009306-2 = "（接到綺羅羅的聯絡後，前往約定地點去見興高采烈的綺羅羅）"
1009306-9 = "啊！老師！我在這邊，這邊！"
1009306-10 = "竟然提早二十分鐘到，老師你還真守時呢！"
1009306-11 = "[s1]「你等很久了嗎？」\n[s2]「可是綺羅羅來的比我更早耶？」"
1009306-14 = "啊哈！因為太期待跟老師一起出來玩，不小心就太早到了！"
1009306-15 = "反正補考也結束了，我現在什麼都不用擔心，可以盡情地大玩特玩！"
1009306-16 = "老師有什麼平時常去的店嗎？"
1009306-17 = "嗯？你說工作很忙，所以對這附近其實不太熟？"
1009306-18 = "那樣正好！"
1009306-19 = "今天我就幫你介紹幾家我常去的店，說不定老師也會喜歡哦！"
1009306-20 = "來，走吧走吧！"
1009306-23 = "我要草莓口味和香蕉口味的特大可麗餅！"
1009306-24 = "一共兩份對吧！請您稍等！"
1009306-29 = "這家店真的超好吃的哦？#n只要吃一口，老師肯定也會愛上的！"
1009306-30 = "他們家的可麗餅會加入滿滿的草莓、香蕉、藍莓和鮮奶油！#n這種等級的可麗餅，在其他地方可是很難找到的！"
1009306-31 = "這是您的特大可麗餅，請慢用。"
1009306-37 = "來！這份是老師的！"
1009306-38 = "[ns]「那我就來嚐嚐吧……」"
1009306-41 = "怎麼樣？怎麼樣？"
1009306-42 = "[s]「嗯，很好吃耶。」"
1009306-43 = "對吧？我就知道老師會喜歡！"
1009306-44 = "來，也吃吃看我的草莓可麗餅！"
1009306-45 = "一次吃到兩種口味，幸福也會是雙倍唷？"
1009306-46 = "來，啊～"
1009306-47 = "嗯？怎麼了嗎？#n雖然被我咬過幾口所以有點變形，但味道還是不錯的哦？"
1009306-48 = "[ns] 嚐一口綺羅羅遞過來的可麗餅"
1009306-52 = "怎麼樣？好吃吧？#n所以我才會這麼喜歡這家店！"
1009306-56 = "啊哈哈！老師的嘴巴沾到鮮奶油了耶！#n有那麼好吃嗎？"
1009306-57 = "來，看我這邊！"
1009306-58 = "[s]「啊，我可以自己擦，你不用特地幫我……」"
1009306-59 = "不行不行，我不喜歡跟我在一起的人看起來很狼狽！"
1009306-60 = "我找找……奇怪，紙巾跑哪去了。"
1009306-61 = "只好先用手……"
1009306-65 = "（舔）"
1009306-66 = "[ns]「！？！？」"
1009306-68 = "好，那我們就出發去下一個地方吧！"
1009306-73 = "老師，你看這個！不覺得這件衣服超可愛的嗎？"
1009306-74 = "咦？相同款式的T恤買一送一……？"
1009306-76 = "怎麼樣，老師？要不要來穿情侶裝啊？"
1009306-105 = "呼，時間已經這麼晚了啊……"
1009306-106 = "老師會不會累？"
1009306-107 = "[s]「其實我的體力剛才就到極限了……」"
1009306-108 = "哎呀！怎麼不早點跟我說呢！"
1009306-109 = "抱歉，都怪我太興奮，一直拉著你跑來跑去……"
1009306-110 = "嗯？你說和我在一起，就算累也很開心？"
1009306-111 = "啊哈哈，謝謝你這樣安慰我！"
1009306-112 = "嗯～就這樣回去的話，感覺有點可惜……"
1009306-113 = "老師，我們最後再去公園逛逛吧。"
1009306-116 = "呼，其實我的腳也有點痠……"
1009306-117 = "好像已經很久沒有走到腳痠過了呢。"
1009306-118 = "[s]「綺羅羅不是很常和朋友們一起到處玩嗎？」"
1009306-119 = "嗯，平常都會三、四個人一起出去玩。#n因為我喜歡大家一起聊天，熱熱鬧鬧的感覺。"
1009306-120 = "雖然今天只有我們兩個人，不過好像走了比平常還多的路……"
1009306-121 = "看來我好像真的有點太興奮了？"
1009306-122 = "[s]「會不會是因為補考通過，所以心情放鬆下來的關係？」"
1009306-123 = "這個嘛，那可能也是一部分的原因……"
1009306-127 = "或許跟一起出來玩的是誰也有關吧……"
1009306-128 = "我，我也不是很確定！那，我們差不多也該回去了！"
1009306-130 = "（之後陪綺羅羅再稍微走了一段路後，回到了夏萊）"

1013905-29 = "2;경찰;05\n4;참새 시민;01\n#2;al\n#4;al\n#2;h\n#4;h\n#wait;1000"
1013905-30 = "4;참새 시민;01;경찰 아저씨, 이 사람이에요!\n#4;hophop"
1013905-31 = "4;참새 시민;01;안 그래도 요새 누군가 자꾸 뒤를 쫓는 듯한 느낌이 들더니만……\n#4;stiff"
1013905-32 = "4;참새 시민;01;분명 이 사람이 저를 스토킹하고 있었던 게 분명해요!\n#4;em;[속상함]"
1013905-33 = "2;경찰;05\n4;참새 시민;01\n#2;h\n#4;h"
1013905-34 = "[ns] \"아뇨, 저는 그저 물건을 전해드리러—\""
1013905-35 = "2;경찰;02;……물건? 이봐, 물건을 받는 사람의 기분은 생각하지 않는 거야?"

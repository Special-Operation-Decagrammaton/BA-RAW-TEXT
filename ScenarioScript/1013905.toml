1013905-55 = "3;우울한 학생;08;선생님, 지금 그 아이 편을 드시는 건가요?!\n#3;em;[?!]\n#3;shake"
1013905-56 = "3;우울한 학생;07;제가 몇 차례나 말씀드렸잖아요. 그 친구가 오해할 여지는 조금도 없었다고!\n#3;hophop"
1013905-57 = "[s] \"아니, 그런 뜻이 아니라……\""
1013905-58 = "3;우울한 학생;06;……역시 선생님도 제가 억지를 부린다고 생각하셨군요.\n#3;em;[속상함]"

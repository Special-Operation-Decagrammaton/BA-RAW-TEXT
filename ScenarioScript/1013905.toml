1013905-124 = "3;니코;09;가끔 그런 날이 있지요.\n#3;em;[한숨]"
1013905-125 = "3;니코;06;하나하나 따지고 보면 대수롭지 않은 사소한 일인데, 한 번에 몰려오면 큰 일보다 오히려 더 견디기 어려운 때가."
1013905-126 = "3;니코;12;오히려 대수롭지 않고 사소한 일이라 말하지 못하고 속으로만 삭이는 그런 때가."

1013905-45 = "3;우울한 학생;06;……그래서 그 소문만 듣고 제가 험담을 했다고 생각한 게 분명해요.\n#3;em;[속상함]"
1013905-46 = "3;우울한 학생;02;친구라고 생각했는데…… 제게는 묻지도 않고 소문만 덜컥 믿어 버리다니.\n#3;stiff"
1013905-47 = "3;우울한 학생;07;저희 관계는 이제 끝이에요. 다 끝났다고요!\n#3;hophop"

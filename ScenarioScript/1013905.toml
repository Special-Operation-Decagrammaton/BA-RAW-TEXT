1013905-39 = "2;경찰;00;그러고 보니 어딘가 낯이 익은데. ……현상수배지에서 보았나?\n#2;em;[…]"
1013905-40 = "2;경찰;05;이봐. 일단 서로 가자고. 변명이라면 서에서 들어줄테니까."

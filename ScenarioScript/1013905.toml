1013905-138 = "3;니코;01;더군다나 선생님은 어른이시니까, 더더욱 타인에게 솔직하지 못하시니까."
1013905-139 = "3;니코;08;가끔은 그 상대가 학생일지라도 타인을 조금만 더 의지해주세요."

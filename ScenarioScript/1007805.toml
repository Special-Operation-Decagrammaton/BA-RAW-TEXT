[translation]
1007805-1 = "知性的一面"
1007805-2 = "夏萊．休息室"
1007805-3 = "（邀請佳澄來到了夏萊）"
1007805-4 = "嗯嗯！原來如此原來如此，果然沒錯。"
1007805-5 = "這裡既安靜又整潔，相當適合唸書，同時也能避人耳目……"
1007805-6 = "而且既然是夏萊的休息室，也沒有人敢隨便來抓人吧。#n真是太完美了～"
1007805-7 = "話是這麼說沒錯……不過……"
1007805-8 = "……老師，這樣真的好嗎？#n居然邀請我到這裡來……"
1007805-9 = "明明我不久前才親口說過夏萊也是爆破的候選地點之一……"
1007805-10 = "你不會擔心嗎？#n難道不該阻止我來到附近嗎？"
1007805-11 = "[s1]「因為你是身處困境的學生。」\n[s2]「支援想用功的學生是我的義務。」"
1007805-14 = "……！！"
1007805-15 = "哈～哈哈哈哈！這樣啊這樣啊。#n老師的膽量似乎出乎意料的大呢。"
1007805-16 = "算了，這樣也好。#n我的個性基本上是來者不拒的。"
1007805-17 = "難得有這種機會，當然不能錯過。#n馬上開始唸書吧。"
1007805-18 = "嘿……咻！"
1007805-22 = "[ns3]「書本量相當多呢。」\n[ns4]「這些是什麼書……？」"
1007805-25 = "如老師所見，是與土木工學、地質學、建築工學相關的書……"
1007805-26 = "這些都是各領域知名人士的論文和研究資料。"
1007805-27 = "……嗯？為什麼又露出那種表情？#n老師看到我總是會瞪大眼睛呢。"
1007805-28 = "……哈哈。"
1007805-29 = "開玩笑的，其實我都知道。"
1007805-30 = "……你應該很意外吧？"
1007805-31 = "像我這種人居然會坐下來好好認真「唸書」。"
1007805-32 = "不過老師，我們溫泉開發部的工作可不僅止於土地的挖掘，還要在上面打造溫泉。"
1007805-33 = "因此我們並不是隨便亂炸，而是會好好執行「土木」和「建築」工程──#n明白我的意思嗎？"
1007805-34 = "雖然周圍的人好像只把我們當成爆破恐怖份子……"
1007805-35 = "……不，沒必要特地說明。#n他們有他們的觀點，而我們有我們的觀點，僅此而已。"
1007805-36 = "如果每件瑣碎的小事都要費心，只會無謂地揮霍本就短暫的人生而已。"
1007805-37 = "來，那我們就開始吧？#n今天要記在腦袋裡的目標進度可是比想像中還多啊。"
1007805-38 = "老師……"
1007805-39 = "……這個位置，我會好好使用的。"
1007805-41 = "（……之後的幾小時中，佳澄真的不發一語，專心地看著書）"
1007805-42 = "（正好夏萊的工作也還剩很多，於是決定把工作拿來旁邊處理）"
1007805-44 = "…………"
1007805-48 = "……啊，原來如此。"
1007805-49 = "嗯……"
1007805-50 = "……嘿咻。"
1007805-54 = "[ns5]「……佳澄？」\n[ns6]「怎麼了嗎？」"
1007805-57 = "沒什麼，不用放在心上，老師繼續忙吧。#n我只是……"
1007805-61 = "……嗯，泡得不錯。"
1007805-66 = "……來，請用。#n這是咖啡。"
1007805-67 = "因為杯子空了就起來喘口氣，順便泡杯咖啡而已。#n老師也休息一下再繼續吧。"
1007805-68 = "話說我們還真專注呢？#n明明在身旁好幾個小時卻彼此不發一語，這種經驗還是第一次。"
1007805-69 = "嗯？啊，沒什麼，不要誤會。#n我沒有不喜歡的意思，反而感到很舒適。"
1007805-70 = "老師可能不知道，能像這樣坐在彼此身旁默默唸書的關係……是可遇不可求的。"
1007805-71 = "……對我這種人來說更是如此。"
1007805-72 = "我平時總是一個人唸書和研究。#n所以現在這樣……或許……"
1007805-77 = "嗯嗯！果然因為是老師你嗎？"
1007805-78 = "因為是管理眾多學生，還必須兼顧文書與現場工作的老師……"
1007805-79 = "這也不無可能。#n也許只有老師才能理解我……"
1007805-83 = "……開玩笑的。#n其實我心裡很清楚，我們的風格幾乎處於兩個極端。"
1007805-87 = "但我說這裡很舒適可不是騙人的哦？"
1007805-88 = "如果可以的話，我巴不得一直待在這裡，連續唸書好幾天呢。"
1007805-89 = "……嗯？你說可以？"
1007805-90 = "想唸書的話歡迎隨時過來……？"
1007805-91 = "……哈哈哈哈哈！！"
1007805-92 = "老師，我知道你也許沒有那個意思……#n但如果有的話，這裡就會變成牢牢抓住我的空間哦？"
1007805-93 = "很抱歉，我現在還無法做到這種程度。#n雖然是很有魅力的提議，但我決定暫時忍耐！"
1007805-94 = "不過當我需要……或者懷念這種氣氛的時候……"
1007805-95 = "我會再來打擾的……"
1007805-96 = "……今後，時不時地。"

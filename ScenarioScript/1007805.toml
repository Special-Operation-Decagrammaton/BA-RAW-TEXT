[translation]
1007805-1 = "Seems Smart"
1007805-2 = "Schale Lounge"
1007805-3 = "I invited Kasumi to Schale."
1007805-4 = "Hm! Of course. I see."
1007805-5 = "It's a quiet, clean place to study...and secluded."
1007805-6 = "Schale's lounge would keep me safe from my pursuers. Nice!"
1007805-7 = "But I have to ask..."
1007805-8 = "Sensei, are you sure about this? This is me we're talking about."
1007805-9 = "Me! The one who told you Schale is one of my ideal demolition sites..."
1007805-10 = "Aren't you worried? Shouldn't you be keeping me as far away from here as possible?"
1007805-11 = "[s1] \"You're still a student, and you need help.\"\n[s2] \"It's my duty to help any student who needs to study.\""
1007805-14 = "...!"
1007805-15 = "Wahaha! Man, you're so magnanimous that it's almost comical."
1007805-16 = "...Fine. I'm not going to look a gift horse in the mouth."
1007805-17 = "This is a rare opportunity. I need to take advantage."
1007805-18 = "Hup!"
1007805-22 = "[ns3] \"That's a lot of books.\"\n[ns4] \"What is all this...?\""
1007805-25 = "I have here the best resources related to civil engineering, geography, architecture..."
1007805-26 = "They're all research materials or academic papers from well-known scholars!"
1007805-27 = "...Hm? What's wrong? You've got that look again. You get saucer eyes a lot when you're around me."
1007805-28 = "...Haha."
1007805-29 = "Just kidding. I know why you look that way."
1007805-30 = "You didn't expect this."
1007805-31 = "Seeing me, of all people, sitting down and studying like a proper student must be a strange experience for you."
1007805-32 = "But you should know that the Hot Springs Department doesn't just blow things up willy-nilly and call it a hot spring."
1007805-33 = "No. We do things RIGHT. We follow proper civil engineering and construction methods to the letter."
1007805-34 = "I know on the surface we seem like a bunch of bomb-wielding hooligans, and people judge us for that."
1007805-35 = "Who could blame them? Everyone's entitled to their own perspective. And we don't owe them an explanation."
1007805-36 = "We have a limited amount of time in this world, and we can't waste it trying to make everyone else happy. Know what I mean?"
1007805-37 = "Now, in that spirit, let's get started, shall we? I have a lot of ground to cover today."
1007805-38 = "Sensei..."
1007805-39 = "...I'll make good use of this space."
1007805-41 = "Kasumi sat in complete silence for hours as she pored over her books."
1007805-42 = "Since I had some work for Schale, I worked quietly alongside her."
1007805-44 = "..."
1007805-48 = "...Oh, I see."
1007805-49 = "..."
1007805-50 = "Upsy-daisy!"
1007805-54 = "[ns5] \"Kasumi?\"\n[ns6] \"You're getting up?\""
1007805-57 = "Don't worry about me, Sensei. You keep focusing on your work, and I'll just..."
1007805-61 = "...Mm. That's the good stuff."
1007805-66 = "Here, Sensei, have some of this coffee."
1007805-67 = "I noticed your cup was empty, so I made a pot during my last break. Why don't you take a break too?"
1007805-68 = "We worked side-by-side for hours without a word. It must be some kind of record!"
1007805-69 = "Don't misunderstand. I didn't hate it. In fact, I quite enjoyed myself."
1007805-70 = "You may not know it, but it's hard to find a good person to study with in silence like that..."
1007805-71 = "...especially among the people I'm usually around."
1007805-72 = "Researching has always been more of a solo activity for me. So this was..."
1007805-77 = "Ahem! Well, I guess it's because it was you. Who better to research with than Sensei?"
1007805-78 = "It's your job to both manage students and do paperwork as an educator, right?"
1007805-79 = "You might just be the only person in the whole world capable of understanding me..."
1007805-83 = "...Nah! Who am I kidding? We're complete opposites!"
1007805-87 = "But I wasn't lying when I said I had fun doing this."
1007805-88 = "If I could, I'd stay here studying indefinitely."
1007805-89 = "...Hm? That's really okay?"
1007805-90 = "You'd...prefer that I come here every day to study..."
1007805-91 = "...Wahaha!"
1007805-92 = "Good one, Sensei! Really funny. But you know I could never be tied down to one place like that. As they say, I'm a free spirit!"
1007805-93 = "I'm not ready for that kind of commitment yet. It's tempting, but I have to pass."
1007805-94 = "However, if I need a change of scenery..."
1007805-95 = "I'll take you up on your offer."
1007805-96 = "In the future, anyway."

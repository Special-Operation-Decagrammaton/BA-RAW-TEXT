[translation]
1007805-1 = "อีกมุมหนึ่งของนักระเบิด"
1007805-2 = "ห้องพักผ่อนชาเล่ต์"
1007805-3 = "(คุณครูเชิญคาสุมิมาที่ชาเล่ต์)"
1007805-4 = "อื้ม! ที่นี่เป็นอย่างนี้เองสินะ"
1007805-5 = "ที่ที่ทั้งสะอาดและสงบพอที่จะมาอ่านหนังสือได้ แถมยังเป็นสถานที่ลับๆ ในเวลาเดียวกันด้วย..."
1007805-6 = "คงไม่มีใครบุกเข้ามาจับตัวฉันในห้องพักผ่อนชาเล่ต์หรอกเนอะ สมบูรณ์แบบเลย!"
1007805-7 = "แต่ว่า... แต่ว่าที่นี่มัน..."
1007805-8 = "ฮืม... คุณครู จะไม่เป็นไรจริงๆ เหรอ? ฉันไม่ได้เหมือนเด็กคนอื่นๆ นะ?"
1007805-9 = "แล้วไม่กี่วันก่อนหน้านี้ ฉันก็เพิ่งบอกไปเองว่าอาคารชาเล่ต์ก็เป็นหนึ่งในสถานที่ที่ฉันหมายตา#nเอาไว้ด้วย..."
1007805-10 = "ไม่กังวลเลยเหรอ? คุณครูควรห้ามไม่ให้ฉันเข้ามาใกล้ๆ ที่นี่ไม่ใช่รึไง?"
1007805-11 = "[s1] \"คาสุมิเป็นนักเรียนที่กำลังเจอความลำบากไง\"\n[s2] \"ครูมีหน้าที่สนับสนุนให้นักเรียนอ่านหนังสืออยู่แล้ว\""
1007805-14 = "......!!"
1007805-15 = "วะฮะฮะฮะฮะฮ่า! คุณครูเป็นคนใจกว้างมากกว่าที่คิดอีกนะเนี่ย"
1007805-16 = "งั้นก็ดีเลย ปกติฉันเป็นคนที่ไม่ขัดน้ำใจคนอื่นอยู่แล้ว"
1007805-17 = "โอกาสที่ได้รับมาอย่างยากลำบากแบบนี้ ฉันไม่ปล่อยให้พลาดหรอก งั้นมาเริ่มอ่านหนังสือเลยดีกว่า!"
1007805-18 = "ฮึบ!"
1007805-22 = "[ns3] \"หนังสือเป็นตั้งเลยแฮะ\"\n[ns4] \"นี่มันอะไรกันเนี่ย...?\""
1007805-25 = "ก็อย่างที่เห็นน่ะแหละ ทั้งหนังสือวิศวกรรมโยธา ธรณีวิทยา และก็สถาปัตยกรรม..."
1007805-26 = "นี่คือวิทยานิพนธ์และข้อมูลการวิจัยของคนที่มีชื่อเสียงในแต่ละสาขา..."
1007805-27 = "...หืม? ทำไมทำหน้าแบบนั้นอีกแล้ว? รู้ตัวมั้ยว่าเวลามองฉัน คุณครูทำตาโตบ่อยๆ เลย"
1007805-28 = "...ฮะฮ่า"
1007805-29 = "ล้อเล่นน่า ฉันรู้อยู่แล้วน่ะ"
1007805-30 = "คงคิดไม่ถึงล่ะสิท่า?"
1007805-31 = "ที่คนอย่างฉันจะมานั่ง 'อ่านหนังสือ' อย่างจริงๆ จังๆ น่ะ"
1007805-32 = "แต่ว่านะคุณครู ชมรมพัฒนาออนเซ็นของเราไม่ได้ทำงานจบแค่การขุดดินหรอกนะ เราต้องสร้างบ่อ#nออนเซ็นขึ้นมาบนพื้นที่ที่เราขุดด้วย"
1007805-33 = "และเราก็ไม่ได้นึกอยากระเบิดตรงไหนก็ระเบิดตามอำเภอใจ แต่เราจะหาพิกัดที่สามารถดำเนินการด้าน 'วิศวกรรมโยธา' และ 'สถาปัตยกรรม' ด้วยได้"
1007805-34 = "ถึงคนอื่นจะมองว่าพวกฉันเป็นผู้ก่อการร้ายด้านการระเบิดก็เถอะ..."
1007805-35 = "...ไม่สิ ฉันไม่จำเป็นต้องอธิบายเหตุผลให้คนพวกนั้นรู้หรอก คนพวกนั้นมีทัศนคติของตัวเอง และพวกฉันก็มีจุดยืนของพวกฉันด้วยเหมือนกัน"
1007805-36 = "ชีวิตคนเรายิ่งสั้นๆ อยู่ ถ้ามัวแต่ใส่ใจกับเรื่องหยุมหยิมทุกเรื่อง ก็จะยิ่งเสียดายเวลาชีวิตเข้าไปใหญ่"
1007805-37 = "เอาละ งั้นมาเริ่มกันเลยดีกว่า วันนี้ฉันมีเป้าหมายที่ต้องเรียนรู้ให้เข้าหัวตั้งเยอะเลย"
1007805-38 = "คุณครู..."
1007805-39 = "...งั้นฉันขอใช้สถานที่หน่อยนะ"
1007805-41 = "(...หลังจากนั้นคาสุมิก็เอาแต่อ่านหนังสือโดยที่ไม่พูดอะไรออกมาเลยอยู่หลายชั่วโมง)"
1007805-42 = "(ช่างเหมาะเจาะที่งานของชาเล่ต์ยังค้างอยู่อีกเยอะ คุณครูจึงไปเอางานเอกสารมานั่งทำอยู่ข้างๆ คาสุมิ)"
1007805-44 = "......"
1007805-48 = "...อ้อ อย่างนี้นี่เอง"
1007805-49 = "ฮืม..."
1007805-50 = "...ฮึบ"
1007805-54 = "[ns5] \"...คาสุมิ?\"\n[ns6] \"ลุกขึ้นยืนทำไมเหรอ?\""
1007805-57 = "ไม่ต้องสนใจฉันหรอก คุณครูทำงานของตัวเองต่อได้เลย ฉันก็แค่..."
1007805-61 = "อืม... ฝีมือใช้ได้เลยนะเนี่ย"
1007805-66 = "...เอ้านี่ รับกาแฟไปสิ"
1007805-67 = "เห็นว่ากาแฟหมดแก้วแล้ว ฉันก็เลยลุกขึ้นมาพักสักหน่อย เลยไปชงกาแฟมาให้น่ะ คุณครูเองก็พักบ้างนะ"
1007805-68 = "จะว่าไป คุณครูมีสมาธิกับงานดีจังเลยนะ เรานั่งด้วยกันตั้งหลายชั่วโมง แต่นี่เป็นครั้งแรกที่เราไม่คุยกัน#nเลยแม้แต่คำเดียว"
1007805-69 = "หืม? อ้อ ไม่หรอก อย่าเข้าใจผิดสิ ไม่ใช่ว่าฉันไม่ชอบหรอก ฉันกลับพอใจมากๆ ด้วยซ้ำ"
1007805-70 = "ฉันไม่รู้ว่าคุณครูคิดยังไงหรอกนะ แต่สำหรับฉันแล้ว ความสัมพันธ์แบบนั่งอ่านหนังสือโดยที่ไม่ต้อง#nพูดคุยกันแบบนี้น่ะ... ไม่ใช่สิ่งที่จะหากันได้ง่ายๆ เลยนะ"
1007805-71 = "...โดยเฉพาะจากคนรอบๆ ตัวฉันน่ะ"
1007805-72 = "ปกติฉันอ่านหนังสือและหาข้อมูลนั่นนี่คนเดียวตลอด เพราะแบบนั้นก็เลย..."
1007805-77 = "ฮืม! อาจเป็นเพราะคุณครูหรือเปล่านะ?"
1007805-78 = "เป็นเพราะคุณครูคนนี้... ที่มีหน้าที่ดูแลนักเรียนจำนวนมาก และต้องทำงานตัวเป็นเกลียวหัวเป็นน็อต เพื่อจัดการงานต่างๆ หรือเปล่า?"
1007805-79 = "ก็อาจจะใช่นะ บางทีคุณครูอาจจะเป็นคนเดียวที่เข้าใจฉันก็ได้..."
1007805-83 = "ล้อเล่นน่า! ฉันรู้อยู่แล้วละว่านิสัยของเรามันออกจะคนละขั้ว"
1007805-87 = "แต่ฉันยอมรับนะ ว่าฉันสนุกกับสิ่งที่ทำอยู่ตรงนี้มากเลย"
1007805-88 = "ใจจริงก็อยากจะมานั่งอ่านหนังสือที่นี่แบบนี้อีกหลายๆ วันเลย"
1007805-89 = "...หืม? ทำได้งั้นเหรอ?"
1007805-90 = "ถ้าจะมานั่งอ่านหนังสือ ให้ฉันมาได้ทุกวันเลยเหรอ...?"
1007805-91 = "...วะฮะฮะฮ่า!!"
1007805-92 = "คุณครู ฉันรู้หรอกนะว่าคุณครูไม่ได้หมายความว่าอย่างนั้น แต่ถ้าหากเป็นอย่างนั้นจริงๆ รู้มั้ยว่า#nฉันอาจจะมาจุ่มตัวเองอยู่แต่ที่นี่เลยก็ได้นะ"
1007805-93 = "ขอโทษนะ แต่ฉันคงทำแบบนั้นให้ไม่ได้หรอก มันเป็นข้อเสนอที่น่าสนใจทีเดียว แต่ว่าฉันจะห้ามใจไว้#nแค่นี้!"
1007805-94 = "แต่ว่าถ้าจำเป็นจริงๆ หรือถ้าฉันคิดถึงบรรยากาศแบบนี้ขึ้นมาละก็..."
1007805-95 = "ฉันจะขอมารบกวนสักหน่อยก็แล้วกัน..."
1007805-96 = "...เอาไว้จะมาเรื่อยๆ เลยละ"

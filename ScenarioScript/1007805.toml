[translation]
1007805-1 = "#title;지적인 모습"
1007805-2 = "#place;샬레 휴게실"
1007805-3 = "#na;(카스미를 샬레로 초대했다.)"
1007805-4 = "3;카스미;01;음음! 과연, 과연. 그러네.\n#3;a\n#3;em;[음표]"
1007805-5 = "3;카스미;02;공부를 할 수 있을 만큼 조용하고 깔끔하면서도, 동시에 비밀스러운 장소라……."
1007805-6 = "3;카스미;03;오히려 샬레의 휴게실이라면 무턱대고 잡으러 오거나 할 수도 없겠지. 완벽한걸?"
1007805-7 = "3;카스미;99;그치만……. 그렇지만 말이지…….\n#3;em;…"
1007805-8 = "3;카스미;11;흠……. 선생님. 정말로 괜찮아? 다른 사람도 아니고 바로 나라고?"
1007805-9 = "3;카스미;08;불과 얼마 전에 내 입으로 이 샬레 또한 발파 장소의 후보지 중 하나라고 말했는데……."
1007805-10 = "3;카스미;10;걱정되지는 않는 건가? 오히려 근처에 오는 걸 막아야 하는 게 아닐까?\n#3;em;[?]"
1007805-11 = "[s1] \"곤란에 처한 학생이니까.\"\n[s2] \"공부하는 학생을 지원하는 건 의무야.\""
1007805-12 = "#wait;100"
1007805-13 = "#wait;100"
1007805-14 = "3;카스미;08;……!!"
1007805-15 = "3;카스미;14;와하핫핫핫! 이거, 이거. 생각 이상으로 배포가 큰 사람인지도 모르겠어, 선생님은.\n#3;em;[재잘]\n#3;hophop"
1007805-16 = "3;카스미;01;뭐, 좋아. 기본적으로 받는 걸 사양하지는 않는 성격이라서 말이지.\n#3;m4"
1007805-17 = "3;카스미;02;어렵사리 받은 이런 기회, 그냥 놓칠 수 없지. 곧바로 공부를 시작해 볼까?\n#3;greeting"
1007805-18 = "3;카스미;01;영……차!\n#3;m3"
1007805-19 = "#st;[0,0];instant;1;"
1007805-20 = "#clearST"
1007805-21 = "3;카스미;01\n#3;greeting\n#wait;1500"
1007805-22 = "[ns3] \"굉장한 양의 책이네.\"\n[ns4] \"이게 다 뭐야……?\""
1007805-23 = "#wait;100"
1007805-24 = "#wait;100"
1007805-25 = "3;카스미;02;보시는 대로 책이지. 토목공학이나 지질학, 그리고 건축공학에 관한…….\n#3;em;[음표]"
1007805-26 = "3;카스미;01;나름대로 저명한 이름을 가진 사람들의 논문이나 연구 자료들이야."
1007805-27 = "3;카스미;08;……음? 왜 또 그런 얼굴이지? 선생님은 날 보며 꽤 자주 눈이 동그래지네.\n#3;em;[?]"
1007805-28 = "3;카스미;09;……핫핫."
1007805-29 = "3;카스미;03;농담이야. 사실 다 알고 있지.\n#3;em;[재잘]"
1007805-30 = "3;카스미;01;……의외인 거겠지?"
1007805-31 = "3;카스미;99;다른 사람도 아닌 내가, 제대로 진지하게 앉아서 '공부'라는 걸 진짜로 한다는 게."
1007805-32 = "3;카스미;02;하지만 선생님. 적어도 우리 온천개발부는 땅을 파는 데에서 그치는 게 아니라, 그 위에 온천을 만드는 일까지 함께하는 곳이라고.\n#3;em;[반응]"
1007805-33 = "3;카스미;01;되는대로 터뜨리는 게 아니라, 제대로 '토목'과 '건축'을 시행하는 곳이다- 이 말이야."
1007805-34 = "3;카스미;99;주변에선 우리를 그저 폭파광 테러리스트-라고 취급하는 모양이지만…….\n#3;em;…"
1007805-35 = "3;카스미;11;……아니. 굳이 그들에게 설명해야 할 이유는 없지. 그들에겐 그들의 시선, 우리에겐 우리의 시선이 있을 뿐."
1007805-36 = "3;카스미;02;자잘한 것들 하나하나 신경 쓰다가는 안 그래도 짧은 인생, 할 수 있는 게 많이 줄어들잖아."
1007805-37 = "3;카스미;03;자, 그럼 일단 시작해 볼까? 생각보다 머리에 넣어야 할 목표 진도가 넓다고, 오늘은."
1007805-38 = "3;카스미;99;선생님……."
1007805-39 = "3;카스미;13;……그럼 자리, 잘 쓸게.\n#3;closeup\n#3;greeting\n#3;em;[음표]"

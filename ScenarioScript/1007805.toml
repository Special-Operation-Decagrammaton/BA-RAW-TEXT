1007805-54 = "[ns5] \"……카스미?\"\n[ns6] \"자리에서 일어났다?\""
1007805-55 = "#wait;100"
1007805-56 = "#wait;100"
1007805-57 = "#na;카스미;아니, 뭐. 신경 쓰지 마. 선생님은 선생님 하던 일을 계속하면 돼. 나야 그냥……."
1007805-58 = "#st;[0,0];instant;1;"
1007805-59 = "#clearST"
1007805-60 = "#wait;3000"
1007805-61 = "#na;카스미;……음. 잘 타졌네."
1007805-62 = "#st;[0,0];instant;1;"
1007805-63 = "#clearST"
1007805-64 = "#wait;1000"
1007805-65 = "3;카스미;01\n#3;al\n#wait;2000"
1007805-66 = "3;카스미;03;……자, 여기. 커피야.\n#3;em;[반짝]\n#3;greeting"
1007805-67 = "3;카스미;11;잔이 비어 있길래, 잠시 숨 좀 돌릴까 일어선 겸 타 왔어. 쉬어 가면서 하라고, 선생님도."
1007805-68 = "3;카스미;01;그나저나 정말이지 굉장한 집중력이잖아? 이렇게 몇 시간이나 같이 있으면서, 서로 말 한마디 없었던 건 처음이라고.\n#3;em;[반응]"
1007805-69 = "3;카스미;13;응? 아, 아니. 오해하지 마. 절대로 싫다는 뜻이 아니니까. 오히려 굉장히 만족하고 있어."
1007805-70 = "3;카스미;01;선생님은 모르겠지만, 이렇게 같이 앉아서 함께 말없이 공부하는 사이라는 게……. 좀처럼 구하기가 쉬운 일이 아니거든.\n#3;m2"
1007805-71 = "3;카스미;11;……특히, 나 같은 사람 주변에는 말이지."
1007805-72 = "3;카스미;99;늘 공부와 연구는 혼자만의 일. 그래서 지금 이것도……. 어쩌면…….\n#3;em;…"
1007805-73 = "#st;[0,0];instant;1;"
1007805-74 = "#clearST"
1007805-75 = "3;카스미;99\n#3;d\n#wait;1500"
1007805-76 = "#all;hide"
1007805-77 = "3;카스미;01;흠흠! 과연, 선생님이라서 그런 건가?\n#3;closeup\n#3;a"
1007805-78 = "3;카스미;13;많은 학생들을 관리하고, 서면과 현장 양면에서 몸을 움직이며 일을 처리하는 선생님이기 때문일까?\n#3;closeup\n#3;em;[재잘]"
1007805-79 = "3;카스미;14;그럴 수도 있겠지. 어쩌면 선생님이야말로, 나를 이해해 줄 수 있을지도…….\n#3;closeup"
1007805-80 = "#st;[0,0];instant;1;"
1007805-81 = "#clearST"
1007805-82 = "3;카스미;99\n#3;em;…\n#3;closeup\n#wait;2500"
1007805-83 = "3;카스미;11;……라는 것은 농담. 사실 알고는 있지, 우리의 스타일은 꽤 대척점이라는 걸 말이야.\n#3;closeup\n#3;em;[음표]"
1007805-84 = "#st;[0,0];instant;1;"
1007805-85 = "#clearST"
1007805-86 = "3;카스미;01\n#3;d\n#3;closeup\n#wait;1500"
1007805-87 = "3;카스미;02;하지만 여기가 즐겁다는 건 거짓말이 아니라고?\n#3;a\n#3;em;[반응]"
1007805-88 = "3;카스미;99;마음 같아서는 이대로 여기 눌러앉아, 며칠 내내 계속해서 공부만 하고 싶을 정도로."
1007805-89 = "3;카스미;08;……응? 상관없다고?\n#3;em;[?]"
1007805-90 = "3;카스미;08;오히려 그런 거라면 매일 와서 여기 앉아 있는 것도 좋아……?"
1007805-91 = "3;카스미;03;……핫핫핫핫!!\n#3;em;[재잘]\n#3;hophop"
1007805-92 = "3;카스미;11;선생님, 그런 의도로 한 말이 아니라는 건 알지만, 정말로 그렇게 된다면 이 자리가 날 붙잡는 공간이 된다는 거 알지?"
1007805-93 = "3;카스미;99;미안하지만 거기까지는 아직 어렵겠어. 굉장히 매력적인 제안이었지만 여기선 참도록 하지!\n#3;em;[!]"
1007805-94 = "3;카스미;01;하지만 필요할 때에는, 그래. 이런 분위기가 그리울 때에는……."
1007805-95 = "3;카스미;15;신세를 좀 지도록 하겠어……."
1007805-96 = "3;카스미;14;……앞으로, 종종 말이야.\n#3;closeup\n#3;em;[음표]"
1007805-97 = "#all;hide"

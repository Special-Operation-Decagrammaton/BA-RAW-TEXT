[translation]
10037105-3 = "อะ... อึก...?!"
10037105-9 = "ฮึ่ม ง่ายๆ แค่นี้สินะ! ทำได้ดีมาก ทั้งหัวหน้าเลขานุการโทโมเอะและหัวหน้าคณะฯ มารินะเลย!"
10037105-10 = "ขอบคุณค่ะ ท่านเลขาธิการเชริโน่"
10037105-11 = "บาดเจ็บตรงไหนบ้างหรือเปล่าคะ คุณครู?"
10037105-12 = "[s] \"อื้อ ครูไม่เป็นอะไรเลย ขอบใจทั้งสองคนเลยนะ\""
10037105-13 = "ฉันเองก็หวั่นใจอยู่บ้างเหมือนกัน แต่ก็โล่งอกไปทีนะ"
10037105-14 = "จะว่าไป ทางนี้ทำการปฏิวัติกันอ่อนแอขนาดนี้เลยเหรอ... ทำเอาฉันอยากไปสอนพื้นฐานการก่อปฏิวัติ#nเลยนะ"
10037105-15 = "หัวหน้าคณะฯ มารินะ? แค่ทำความสะอาดห้องน้ำยังไม่พอใช่มั้ยคะ?"
10037105-19 = "มะ... ไม่ใช่อย่างนั้นนะคะ! ฉันพูดผิดไปน่ะค่ะ ท่านหัวหน้าเลขานุการโทโมเอะ!"
10037105-20 = "ไหนๆ ก็คุยเรื่องนี้แล้ว ฉันขอถามอะไรสักอย่างนะคะ โดยพื้นฐานแล้วการก่อปฏิวัติเป็นสิ่งที่ห้ามไม่ได้ แต่เราสามารถป้องกันไม่ให้เกิดการปฏิวัติตั้งแต่แรกได้มั้ยคะ?"
10037105-21 = "ได้สิ เราก็แค่ส่งนักเรียนที่ยอดเยี่ยมกว่าท่านประธานเชริโน่ไปอยู่ห้องพิเศษ 227 ก็เป็นอันจบเรื่อง!"
10037105-22 = "นั่นเป็นคำตอบที่ดีเลยนะคะ และนักเรียนที่ยอดเยี่ยมกว่าท่านเลขาธิการเชริโน่...?"
10037105-23 = "โดยหลักการแล้วยังไม่มีค่ะ!"
10037105-24 = "ดีมากค่ะ"
10037105-31 = "มังกรดำ ระดมพล!"
10037105-36 = "?!"
10037105-37 = "หัวหน้าคณะกรรมการมินะ...!"
10037105-43 = "ตอนนี้ฉันจะไม่ถามว่าพวกเธอคิดอะไรกันอยู่ ฉันไม่สนหรอกว่าพวกเธอวางแผนจะทำอะไร หรือว่าได้ทำอะไรลงไปแล้ว!"
10037105-44 = "ทุกคนฟังคำสั่งของฉัน! จับกุมชมรมการแสดงงิ้วไว้ แล้วคุ้มกันท่านประมุขและแขกจากเรดวินเทอร์ไป#nที่อาคารหกเหลี่ยม!"
10037105-49 = "ค่ะ ค่ะ!"
10037105-50 = "เข้าใจแล้วค่ะ!"
10037105-54 = "(แต่ว่า... ความตั้งใจขอท่านประมุขคืออะไรกันแน่นะ...)"
10037105-55 = "(ฉันไม่เคยคิดเรื่องนี้มาก่อนเลย...)"
10037105-62 = "(ไม่ใช่เรื่องแย่หรอกที่จะโดนจับตัวไป)"
10037105-63 = "(เพราะความสำเร็จและความล้มเหลวไม่ได้อยู่ในเส้นทางแห่งความภักดียังไงล่ะ)"
10037105-64 = "(เพราะงั้น ขอให้ท่านประมุขตาสว่างอีกครั้งด้วยเถิด...)"

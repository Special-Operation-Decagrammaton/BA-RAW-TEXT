[translation]
10037105-3 = "U-Ugh...!"
10037105-9 = "Hm, that was simple! Good work, Chief Secretary Tomoe! Chairman Marina, you too!"
10037105-10 = "Thank you, Great Leader Cherino."
10037105-11 = "Are you injured at all, Sensei?"
10037105-12 = "[s] \"Nope. Not even a scratch, thanks to you, Tomoe and Marina.\""
10037105-13 = "That's a relief. I was a bit nervous."
10037105-14 = "That was such a weak coup d'etat... I'm tempted to teach them a thing or two about running a proper coup."
10037105-15 = "Chairman Marina? Do you need to clean more bathrooms?"
10037105-19 = "Oh, n-no! I misspoke, Chief Secretary Tomoe!"
10037105-20 = "While we're on the topic, let me ask... If you can't block a coup d'etat, how can you prevent them?"
10037105-21 = "We just need to send any students who are greater than Great Leader Cherino to Spec Ops No. 227!"
10037105-22 = "Good answer. And which students are greater than Great Leader Cherino?"
10037105-23 = "There is no such thing!"
10037105-24 = "Very good."
10037105-31 = "Genryumon, assemble!"
10037105-36 = "?!"
10037105-37 = "Executive Officer Mina...!"
10037105-43 = "It doesn't matter what you all think, what you all tried to do, or have already done!"
10037105-44 = "Those who can, move! Round up the Peking Opera Club and escort the president and all the visitors to the Rikkagaku!"
10037105-49 = "Y-Yes!"
10037105-50 = "Understood!"
10037105-54 = "(But... What are Madam Kisaki's intentions?)"
10037105-55 = "(I've never even thought about anything like this until now...)"
10037105-62 = "(It's not a bad idea to make some arrests.)"
10037105-63 = "(Success and failure have no place on the path to loyalty.)"
10037105-64 = "(So I truly hope Madam Kisaki will open her eyes again...)"

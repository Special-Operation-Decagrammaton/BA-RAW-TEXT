[translation]
10037105-3 = "呃，呃啊……！？"
10037105-9 = "唔呣，小菜一碟！#n智惠秘書室長、瑪麗娜委員長，兩位都辛苦了！"
10037105-10 = "過獎了，潔莉諾書記長。"
10037105-11 = "您有沒有哪裡受傷，老師？"
10037105-12 = "[s]「我沒事，多虧了智惠和瑪麗娜。」"
10037105-13 = "老實說我剛才還有點擔心呢，真是好險。"
10037105-14 = "話說回來，這場政變未免也太沒計畫了……#n如果有機會的話，真想好好教教他們政變的基本守則。"
10037105-15 = "瑪麗娜委員長，你是不是還想去打掃廁所？"
10037105-19 = "不，不是的！剛才是我一時失言，智惠秘書室長！"
10037105-20 = "既然都提到這件事了，我就順帶多問一句吧。#n雖然政變基本上是無從阻止的，但如果想要預防政變發生應該怎麼做呢？"
10037105-21 = "只要把比潔莉諾會長更偉大的學生，通通送去227號特別班就行了！"
10037105-22 = "回答得很好。#n那麼，比潔莉諾書記長更偉大的學生有誰呢？"
10037105-23 = "原則上並不存在！"
10037105-24 = "非常好。"
10037105-31 = "玄龍門，集合！"
10037105-36 = "！？"
10037105-37 = "美奈執行部長……！"
10037105-43 = "我不打算過問你們心裡的想法。#n無論你們打算怎麼做，又或者已經做了什麼……現在我都不會追究！"
10037105-44 = "所以還能行動的人趕快給我動起來！#n立刻逮捕京劇部，並且將門主大人和賓客們護送至六和閣！"
10037105-49 = "是，是！"
10037105-50 = "遵命！"
10037105-54 = "（話雖如此……門主大人究竟是怎麼想的呢……）"
10037105-55 = "（我到目前為止，從來沒有想過這個問題……）"
10037105-62 = "（被打入大牢對我而言反而是件好事）"
10037105-63 = "（成就忠義之路上，並不存在成與敗）"
10037105-64 = "（所以請務必再次睜開雙眼，門主大人……）"

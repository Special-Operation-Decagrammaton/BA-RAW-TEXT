[translation]
1011505-1 = "สิ่งที่ไม่อาจปล่อยไปได้"
1011505-3 = "[ns] \"บรรยากาศคึกคักมากเลยนะ...\""
1011505-4 = "ค่ะ! ก็นี่เป็นการแข่งขันระหว่างทีมคู่แข่งในตำนานเลยนี่คะ!"
1011505-5 = "แฟนๆ ของทั้งสองทีมยังขึ้นชื่อเรื่องความสัมพันธ์ที่เป็นมิตร แต่ก็มีบางมุมที่ห้ำหั่นกันเหมือนกันค่ะ"
1011505-6 = "บางคนถึงขนาดกับเรียกการแข่งขันระหว่าง 2 ทีมนี้ว่าเป็น 'การต่อสู้ประเพณี' เลยนะคะ"
1011505-8 = "แง... แงงง...!"
1011505-9 = "เอ๋? เหมือนได้ยินเสียงร้องไห้ปนมากับเสียงโห่ร้องเลย...?"
1011505-13 = "พ่อจ๋า... แม่จ๋า... อยู่ไหน...?"
1011505-14 = "คะ... คุณครู? เด็กคนนี้..."
1011505-15 = "[s] \"คนเยอะเกินจนพลัดหลงกับพ่อแม่สินะ\""
1011505-16 = "ทะ... ทำยังไงดีล่ะคะ?"
1011505-20 = "อ้อ! ใช่แล้วค่ะ! ต้องไปแจ้งทางสนามว่ามีเด็กหลงก่อน... เรื่องง่ายๆ แท้ๆ แต่ฉันคิดไม่ออกได้ยังไงเนี่ย"
1011505-21 = "มาทางนี้สิคะ คุณครู ฉันจะบอกทางให้เองค่ะ"
1011505-27 = "นี่หนู เดี๋ยวพี่กับคุณครูจะอยู่ด้วยจนกว่าจะเจอพ่อแม่นะจ๊ะ ไม่ต้องกลัวนะ"
1011505-28 = "จริงนะ...?"
1011505-30 = "(หลังจากแจ้งทางสนามกีฬาว่ามีเด็กพลัดหลง)"
1011505-31 = "(คุณครูกับเรย์ก็อยู่รอพ่อแม่ของเด็กด้วยกัน)"
1011505-33 = "หนูชอบเบสบอลหรือเปล่า?"
1011505-34 = "ผม... ไม่ค่อยรู้เรื่องเบสบอลหรอก แต่พ่อแม่จะมาดู ผมก็เลยตามมาด้วย"
1011505-35 = "แต่พ่อกับแม่หายไปไหนก็ไม่รู้ แล้วจะหาผมเจอหรือเปล่า... ฮืออ..."
1011505-36 = "มะ... ไม่ต้องกังวลหรอกน่า ไม่เป็นไรนะ! พวกเราจะอยู่ด้วยจนกว่าพ่อแม่ของหนูจะมาเลย! "
1011505-42 = "หืม? ลูกฟาวล์... มาทางนี้เหรอ...?"
1011505-44 = "ไหนดูซิ...!"
1011505-51 = "คว้าไว้ได้แล้ว! วันนี้โชคดีจริงๆ เลยนะเนี่ย!"
1011505-52 = "..."
1011505-56 = "เอาบอลมั้ย?"
1011505-57 = "ลูกเบสบอลเหรอ...?"
1011505-58 = "กีฬาเบสบอลน่ะ มันต่างจากกีฬาอื่นๆ ที่ใช้ลูกทำแต้มอยู่นิดหน่อย"
1011505-59 = "ยังไงเหรอ...?"
1011505-60 = "ในเกมที่ต้องที่ใช้ลูกทำแต้ม ลูกคือสิ่งสำคัญ เพราะแบบนี้เราก็เลยไม่ค่อยเปลี่ยนลูกระหว่างการแข่งขัน แล้วก็จะไม่เอาลูกให้แฟนกีฬาที่มาเชียร์ด้วย"
1011505-61 = "แต่เบสบอลไม่ใช่อย่างนั้น ในกีฬาเบสบอล ผู้เล่นต่างหากที่เป็นฝ่ายทำคะแนน เราก็เลยไม่ยึดติดกับลูก"
1011505-62 = "และเพราะแบบนี้... ในกีฬาเบสบอลก็เลยมีการให้ลูกกับแฟนๆ ที่มาเชียร์ แม้จะอยู่ระหว่างการแข่งขัน#nก็ตาม จะเรียกว่าเป็นเกมแห่งการให้ก็ยังได้"
1011505-63 = "เกมที่บอลถูกโยนออกไป ส่วนคนก็กลับบ้านหรือโฮมเพลต เจ๋งใช่มั้ยล่ะ?"
1011505-64 = "เรื่องแบบนั้นผมไม่อินหรอก..."
1011505-65 = "งะ... งั้นเหรอ...?"
1011505-71 = "<ทรี สไตรค์... เอาต์!>"
1011505-75 = "ดูนั่นสิ! เอาต์เพราะตีลูกไม่ถูก 3 ครั้ง! ลูกฟาวล์เมื่อกี้นี้ทำให้จำนวนสไตรค์เพิ่มมาอีกหนึ่ง แบตเตอร์ก็เลยเริ่มใจร้อนสินะ!"
1011505-76 = "พิชเชอร์ก็เลยสร้างสงครามประสาทด้วยการทำเหมือนจะโยนลูกโค้งลงข้างล่าง..."
1011505-77 = "แล้วก็ขว้างลูกตรงแรงๆ เข้าตรงกลางให้ครบ 3 เอาต์ไปเลย! นี่ละการแข่งขันแบบเผชิญหน้ากันตรงๆ!"
1011505-81 = "เรื่องแบบนั้นผมไม่รู้หรอก! ไม่เห็นจะเข้าใจเลย!"
1011505-82 = "พ่อกับแม่ต้องชอบเบสบอลมากกว่าชอบผมแน่... ผมหายไปแท้ๆ แต่ก็ไม่มาหา..."
1011505-83 = "เบสบอลมันมีอะไรน่าสนุกนักหนา! ไม่เห็นต้องวิ่งให้เร็ว แล้วก็ไม่มีอะไรให้ตื่นเต้นเหมือนบาสเก็ตบอล#nหรือฟุตบอลด้วย!"
1011505-84 = "ตอนรับลูกก็แค่ยืนเหม่อ แล้วค่อยรับตอนลูกลอยเข้ามาใกล้ๆ..."
1011505-85 = "มันสนุกตรงไหน! ผมเกลียดทั้งพ่อแม่... ทั้งเบสบอลเลย!"
1011505-86 = "..."
1011505-87 = "(เบสบอลไม่สนุกงั้นเหรอ...)"
1011505-88 = "(จะว่าไป ตอนยังเด็กมากๆ เราก็...)"
1011505-89 = "รู้อะไรหรือเปล่า? เดิมทีแล้วเบสบอลไม่ใช่กีฬาที่เล่นเอาสนุกหรอกนะ"
1011505-90 = "[s] \"ฟังดูน่าสนใจเลยนะ มันเป็นยังไงเหรอคุณนักวิเคราะห์?\""
1011505-91 = "คะ... คุณครูก็สงสัยเหรอคะ...?"
1011505-95 = "อะแฮ่ม ในกีฬาเบสบอลน่ะ เป้าหมายที่สำคัญที่สุดคือการปิดอินนิ่งที่ไม่สนุกให้ได้"
1011505-96 = "และวิธีที่ดีที่สุดก็คือ... การที่แบตเตอร์ตีลูกร่วงพื้นหรือลูกฟลายจนเอาต์ไปทั้ง 3 คน..."
1011505-97 = "ส่วนในการแข่งขันที่เป็นทางการ ถึงมันจะไม่สนุกเอาเสียเลย แต่สิ่งสำคัญก็คือต้องไม่ให้เกิดข้อผิด#nพลาดเป็นอันขาด"
1011505-98 = "เบสบอลน่ะ... เป็นกีฬาที่ต้องพยายามทำให้ดีที่สุดในที่ที่ไม่มีใครเห็น"
1011505-99 = "เป็นกีฬาที่ต้องต่อสู้อย่างสุดความสามารถให้คนอื่นเห็นว่าเรานิ่งที่สุด และดูน่าเบื่อให้มากที่สุดเลยละ"
1011505-100 = "แล้วพี่ก็ชอบความย้อนแย้งนั่นมากเลย"
1011505-101 = "รู้จักหงส์ใช่มั้ย? หงส์ลอยตัวเหนือน้ำได้อย่างสง่างาม แต่เห็นอย่างนั้นมันก็ต้องถีบขาว่ายน้ำอย่างเอา#nเป็นเอาตายเลยนะ"
1011505-102 = "การที่ต้องพยายามทำให้ดีที่สุดในจุดที่ไม่มีใครเห็น เพื่อให้ออกมาดูธรรมดาที่สุด..."
1011505-103 = "แบบนั้นมันเจ๋งสุดๆ ไปเลยไม่ใช่เหรอ?"
1011505-105 = "..."
1011505-106 = "งั้น... เหรอ?"
1011505-107 = "ก็ใช่น่ะสิ!"
1011505-108 = "อืม..."
1011505-109 = "บางทีเบสบอล... ก็อาจจะไม่แย่เท่าไรก็ได้..."
1011505-110 = "ใช่มั้ยล่ะ?"
1011505-116 = "แบตเตอร์ลำดับที่ 6 ตีลูกเคิร์ฟที่ตกลงมาได้อย่างแม่นยำเลยครับ!"
1011505-117 = "ลูกตกทางขวาของสนามส่วนนอก! วิ่งจากเบสแรกไปเบสที่ 2 แล้วครับ!"
1011505-118 = "วิ่ง! วิ่งให้ไวกว่านี้! เอาให้ได้ 2 เบสไปเลย!"
1011505-119 = "ไวชะมัด...! ฝ่ายรับปาลูกไปที่เบส 2 แล้ว! แล้วก็ยืดขาออกไปด้วย?"
1011505-120 = "สไลด์ตัวเข้าไปเลย! จะตัดสินว่าไงนะ...!?"
1011505-124 = "เซฟ! เซฟครับ! ฝีเท้ารวดเร็วเหลือเชื่อเลย! วิ่งได้ 2 เบสเลยนะครับ!"
1011505-125 = "เยี่ยมเลย!"
1011505-126 = "ว้าว!"
1011505-127 = "เป็นไงล่ะ?"
1011505-128 = "สนุกเลยฮะ!"
1011505-129 = "อื้อ!"
1011505-131 = "(การแข่งขันดำเนินต่อไปอย่างดุเดือด)"
1011505-132 = "(และพ่อแม่ของเด็กก็มาหาในที่สุด)"
1011505-133 = "(พวกเขาหน้าซีดและดูเหนื่อย... น่าจะเพราะตามหาลูกกันอยู่นาน)"
1011505-135 = "ขอบคุณนะครับ... ขอบคุณมากครับ... ไม่รู้ว่าตอบแทนบุญคุณยังไงถึงจะพอ..."
1011505-136 = "เป็นยังไงบ้างลูก? แม่เป็นห่วงแทบแย่... แม่ขอโทษนะ โล่งอกไปทีนะที่ไม่เป็นอะไร"
1011505-137 = "ผมไม่เป็นไรเลย! พี่สาวกับคุณครูคนนี้ช่วยมาอยู่เป็นเพื่อนน่ะ!"
1011505-138 = "คุณครู! พี่สาว! งั้นผมไปก่อนนะ! วันนี้สนุกมากเลย! ขอบคุณฮะ!"
1011505-143 = "โล่งอกไปทีนะคะ แล้วก็... เรื่องเมื่อกี้ทำให้ฉันใจฟูเลยค่ะ แหะๆ"
1011505-144 = "[ns] \"ครูก็ประทับใจกับทฤษฎีเบสบอลของเรย์นะ\""
1011505-145 = "คะ... คะ?! ทฤษฎี... ของฉันน่ะเหรอคะ?"
1011505-146 = "..."
1011505-147 = "ยะ... อย่าล้อกันเล่นสิคะ คุณครู"
1011505-148 = "[s] \"ครูไม่ได้ล้อเล่นสักหน่อย?\""
1011505-149 = "งั้นก็อย่าพูดอะไรให้ฉันอายเลยค่ะ..."
1011505-151 = "(เรย์พูดพลางดึงหมวกลงมาปิดหน้า)"
1011505-152 = "(แต่ก็ซ่อนหูที่แดงก่ำของตัวเองไม่ได้)"

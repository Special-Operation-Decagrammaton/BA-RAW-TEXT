1011505-58 = "3;레이;10;야구는 말이지. 다른 공으로 점수를 내는 경기와는 조금 다른 부분이 있어."
1011505-59 = "5;길 잃은 뱁새 남자아이;00;뭔데……?"
1011505-60 = "3;레이;14;공으로 점수를 내는 경기에서는 공이 소중해. 그래서 웬만해선 경기 중에 공을 바꾸지 않지. 경기 중에 관중들에게 공을 주지도 않고."
1011505-61 = "3;레이;11;하지만 야구는 약간 달라. 야구에서는 사람이 점수를 내거든. 그래서 공에 집착하지 않아."
1011505-62 = "3;레이;10;그래서 야구는…… 경기 중에도 관중들에게 많은 공을 나눠주고는 해. 이런 식으로. 베푸는 경기라고도 할 수 있지."

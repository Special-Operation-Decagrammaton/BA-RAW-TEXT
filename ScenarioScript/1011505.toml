[translation]
1011505-1 = "What Cannot be Missed"
1011505-3 = "[ns] \"What an incredibly heated game...\""
1011505-4 = "Of course it is! These two teams have a long history of being rivals!"
1011505-5 = "And their fans have a weird love-hate relationship with each other."
1011505-6 = "It's one of the best classic match-ups in baseball history!"
1011505-8 = "Waah... Waaah...!!"
1011505-9 = "Huh? Did I hear someone crying in the middle of all that cheering...?"
1011505-13 = "Mom...Dad...where are you...?"
1011505-14 = "S-Sensei, look..."
1011505-15 = "[s] \"He must've lost his parents in the crowd.\""
1011505-16 = "Wh-What should we do?"
1011505-20 = "Ah, right! I should tell the stadium first. I don't know why I didn't think of that right away."
1011505-21 = "Here, follow me, Sensei. I know where to go."
1011505-27 = "And hey, we'll stay with you until you find your parents, okay?"
1011505-28 = "Really...?"
1011505-30 = "And so, we notified the stadium of the lost child."
1011505-31 = "And we decided to wait for the child's parents with him."
1011505-33 = "So, do you like baseball?"
1011505-34 = "Baseball...? I don't know. Mom and Dad do, I guess, or they wouldn't have brought me here."
1011505-35 = "But I don't know where they are now... Waah..."
1011505-36 = "I-It's fine. It's okay! We'll stay with you. "
1011505-42 = "Huh? Is that a foul ball coming this way...?"
1011505-44 = "Oh, here we go..."
1011505-51 = "Got it! Woo, my lucky day!"
1011505-52 = "..."
1011505-56 = "Would you like to have it?"
1011505-57 = "A baseball...?"
1011505-58 = "See, baseball's a lot different from other sports that use a ball to score with."
1011505-59 = "How so...?"
1011505-60 = "Well, with other sports, the ball itself is what scores the points. So they don't usually change it out in mid-game, and they don't give it away to the fans like this."
1011505-61 = "But baseball's different. In baseball, people score the points. So the ball's less important, and we don't hang onto it as much."
1011505-62 = "And even in the middle of the game, if a ball goes flying out to a fan, the fan gets to keep it. It's a game that gives."
1011505-63 = "The ball just follows the fan home. Isn't that amazing?"
1011505-64 = "Eh, I guess."
1011505-65 = "Y-You guess?!"
1011505-71 = "Strike three! You're out!"
1011505-75 = "Ah, did you see that? That foul ball made the batter impatient."
1011505-76 = "The pitcher took advantage of that, and faked like they were going to throw a falling curve ball..."
1011505-77 = "Then, boom! Fastball straight to the center! What a showdown!"
1011505-81 = "I don't even know what any of that means!"
1011505-82 = "...But I bet Mom and Dad do. They must REALLY care about this game. They haven't even come to find me yet."
1011505-83 = "Why DO they care, anyway? This game's boring. It's just a bunch of people standing around. Not like basketball or soccer..."
1011505-84 = "Even when they catch the ball, they just run a little bit and then stop again..."
1011505-85 = "This sucks! I hate Mom, I hate Dad... I hate baseball!"
1011505-86 = "..."
1011505-87 = "(Baseball is boring...?)"
1011505-88 = "(Now that I think about it, I might have said the same thing at that age.)"
1011505-89 = "Here's the thing. Baseball's SUPPOSED to be boring."
1011505-90 = "[s] \"That's an interesting statement, Commentator Rei.\""
1011505-91 = "H-Hang on, Sensei..."
1011505-95 = "*cough* So it's like this. When you're playing defense in baseball, you want everything to stick to the same routine."
1011505-96 = "If all three batters hit their first pitch as grounders or flyouts, that's what's best for you."
1011505-97 = "If that doesn't happen, someone's made a mistake. The trick is to keep things \"boring\" by not making any."
1011505-98 = "So when it looks boring, it's because the whole team is doing their absolute best to keep it that way."
1011505-99 = "You have to struggle as hard as you can to look as nonchalant as possible."
1011505-100 = "And I kind of love the irony of that."
1011505-101 = "You know swans, right? Up above the surface, they're just floating like clouds...but under the surface, their feet are always going like crazy."
1011505-102 = "Having to do your best to seem ordinary and not get noticed..."
1011505-103 = "...that's commendable, I think. There's something cool about it."
1011505-105 = "..."
1011505-106 = "...Yeah?"
1011505-107 = "Yeah, I'd say so."
1011505-108 = "Huh..."
1011505-109 = "That IS pretty cool. Maybe baseball's okay..."
1011505-110 = "Right?"
1011505-116 = "Sixth batter gets a GREAT hit on that falling curve ball!"
1011505-117 = "The ball lands in center right field! The batter gets past first base. They're heading for second!"
1011505-118 = "Run! Run! Make it a double!"
1011505-119 = "Look at that speed! Defense throws to second base. The baseman stretches out for the catch..."
1011505-120 = "It's a slide! And the call is...?!"
1011505-124 = "Safe! What a sprint, turning a single into a double!"
1011505-125 = "Yeah!"
1011505-126 = "Woo!"
1011505-127 = "You like that?"
1011505-128 = "Yeah, that was cool!"
1011505-129 = "Right?"
1011505-131 = "The game heated up more and more."
1011505-132 = "Before long, the child's parents showed up."
1011505-133 = "Judging by their faces, they'd been looking for quite a while."
1011505-135 = "Thank you... Thank you... I don't know how to repay you..."
1011505-136 = "Are you okay? We were so worried... I'm really sorry. We're so glad you're safe."
1011505-137 = "It's okay! I had Sensei and Sis here to play with me!"
1011505-138 = "Okay, Sensei, Sis! I've gotta go! I had a lot of fun! Thank you!"
1011505-143 = "I'm glad. This...worked out pretty well. Heehee."
1011505-144 = "[ns] \"You've got a very impressive theory of baseball, Rei.\""
1011505-145 = "Wh-What?! Theory of...? Nah."
1011505-146 = "..."
1011505-147 = "D-Don't tease me, Sensei."
1011505-148 = "[s] \"I'm not.\""
1011505-149 = "Well, you're embarrassing me, so...yeah."
1011505-151 = "Rei pulled her hat down as she said that."
1011505-152 = "But her ears were already completely red."

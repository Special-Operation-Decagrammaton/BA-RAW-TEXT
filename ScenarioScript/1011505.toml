[translation]
1011505-1 = "不能錯過的事物"
1011505-3 = "[ns]「好熱血的氣氛……」"
1011505-4 = "嗯！兩支歷史悠久的宿敵球隊，將在今天的球賽中展開對決！"
1011505-5 = "雙方球迷之間的關係也是出了名的微妙哦。"
1011505-6 = "有些人甚至把兩隊的比賽稱為「傳統大戰」！"
1011505-8 = "嗚……嗚哇啊……！"
1011505-9 = "咦？歡呼聲之中好像夾雜著哭聲……？"
1011505-13 = "媽媽……爸爸……你們在哪裡……？"
1011505-14 = "老，老師？這是……"
1011505-15 = "[s]「好像因為人太多的關係，有小朋友跟父母走散了。」"
1011505-16 = "該，該怎麼辦？"
1011505-20 = "啊，對了！應該先跟棒球場的管理單位通報有小朋友走失……#n這麼理所當然的事，我竟然沒想到。"
1011505-21 = "往這邊，老師。我知道該怎麼去。"
1011505-27 = "來，我們會陪你找到媽媽爸爸的。好嗎？"
1011505-28 = "真的嗎……？"
1011505-30 = "（向球場的管理單位報告走失後）"
1011505-31 = "（決定和小朋友一起等待孩子的父母）"
1011505-33 = "你喜歡棒球嗎？"
1011505-34 = "棒球……我看不懂。是媽媽爸爸說要看棒球才來的。"
1011505-35 = "可是媽媽爸爸不見了，我找不到他們……嗚嗚……"
1011505-36 = "別，別擔心，不會有事的！我們會一直陪著你！"
1011505-42 = "嗯？界外球往這邊……？"
1011505-44 = "我看看……！"
1011505-51 = "接到了！#n哇，今天運氣真好！"
1011505-52 = "……"
1011505-56 = "你想不想要這顆球呀？"
1011505-57 = "棒球……？"
1011505-58 = "棒球這種運動呢，和其他球類比賽有點不一樣。"
1011505-59 = "哪裡不一樣……？"
1011505-60 = "在用球得分的比賽中，球通常扮演很重要的角色。#n所以基本上不太會在比賽中換球，也不會把比賽中的球送給觀眾。"
1011505-61 = "不過棒球不太一樣。#n棒球是靠人得分的運動，所以重點並不在於球。"
1011505-62 = "棒球比賽中……也會像這樣分送很多球給觀眾。#n可以算是一種代表「分享」的比賽吧。"
1011505-63 = "雖然球會離開，但人會回[ruby=本壘]到家裡[/ruby]……不覺得很棒嗎？"
1011505-64 = "我不太懂……"
1011505-65 = "是，是嗎……？"
1011505-71 = "「三好球……三振出局！」"
1011505-75 = "你看！是三振出局！#n剛才因為界外球讓好球數增加，所以打者開始心急了！"
1011505-76 = "看準這個機會，用一顆下墜的變化球引發心理戰……"
1011505-77 = "然後用強勢逼近中心的直球，堂堂正正把出局數拿下！#n跟打者正面對決！"
1011505-81 = "我聽不懂！完全聽不懂啦！"
1011505-82 = "媽媽爸爸比起我更喜歡棒球……#n我都不見這麼久了，居然還不來找我……"
1011505-83 = "棒球到底有什麼好玩的！#n既不像籃球足球會到處跑來跑去，又要打半天！"
1011505-84 = "接球的時候也只是呆呆站著，讓球飛進手套裡而已……"
1011505-85 = "什麼跟什麼嘛！#n我討厭媽媽爸爸……也討厭棒球！"
1011505-86 = "……"
1011505-87 = "（棒球不好玩……？）"
1011505-88 = "（這麼說來，其實我很小的時候也……）"
1011505-89 = "你知道嗎？#n棒球這種運動，本來就是要打得無聊才算成功哦。"
1011505-90 = "[s]「這種說法聽起來真有趣呢，莉解說員。」"
1011505-91 = "怎，怎麼連老師也……？"
1011505-95 = "咳哼，事情是這樣的。#n棒球最重要的目標，是要先無趣平靜地守完一局。"
1011505-96 = "三名打者都在第一球打出滾地球或飛球，形成三上三下……這是最理想的情況。"
1011505-97 = "在正式比賽中，最重要的關鍵是不要犯下失誤，因此會讓比賽顯得有點無聊。"
1011505-98 = "所以棒球這種運動……必須在所有人都看不見的地方傾注最多努力。"
1011505-99 = "為了表現得若無其事、為了展現最無趣的模樣而拚命掙扎。"
1011505-100 = "我呢，很喜歡棒球這種矛盾的地方。"
1011505-101 = "你知道天鵝嗎？#n天鵝雖然看起來很優雅，其實一直都在水面下奮力划水哦。"
1011505-102 = "為了表現出平靜的一面，而在看不見的地方拚盡全力……"
1011505-103 = "不覺得聽起來很帥嗎？"
1011505-105 = "……"
1011505-106 = "是，是嗎？"
1011505-107 = "沒錯！"
1011505-108 = "嗯……"
1011505-109 = "棒球，說不定還挺好看的……"
1011505-110 = "對吧？"
1011505-116 = "第六棒打者，瞄準了下墜變化球，穩穩打中！"
1011505-117 = "是個落在右中外野的安打！經過一壘跑向二壘！"
1011505-118 = "快跑！跑啊！把一壘安打變成二壘安打！"
1011505-119 = "好快……！球丟向二壘了！跑者也把腿伸了出來？"
1011505-120 = "滑壘！判決是……！？"
1011505-124 = "Safe！安全上壘！#n真是神速的飛毛腿啊！順利將一壘安打變成了二壘安打！"
1011505-125 = "好耶！"
1011505-126 = "哇！"
1011505-127 = "你覺得怎麼樣？"
1011505-128 = "好好玩！"
1011505-129 = "嗯！"
1011505-131 = "（比賽的氣氛變得越來越熱烈）"
1011505-132 = "（小朋友的父母也在不久後出現）"
1011505-133 = "（臉色相當蒼白……看來應該找孩子找得非常著急）"
1011505-135 = "謝謝……謝謝你們……#n真不知道該怎麼報答這份恩情才好……"
1011505-136 = "你還好嗎？媽媽好擔心你……#n真的很對不起，幸好你平安無事。"
1011505-137 = "我沒事的！我在這裡跟老師還有姐姐玩！"
1011505-138 = "那麼老師和姐姐，我走囉！#n今天很好玩！謝謝你們！"
1011505-143 = "太好了。而且……雖然只是微不足道的小事，但心情還是很好呢。嘿嘿。"
1011505-144 = "[ns]「我也被莉的棒球理論驚嘆到了哦。」"
1011505-145 = "咦咦！？我的棒球什麼？"
1011505-146 = "……"
1011505-147 = "別，別捉弄我了，老師。"
1011505-148 = "[s]「我沒有在捉弄你啊？」"
1011505-149 = "那就別說會讓人家難為情的話……"
1011505-151 = "（莉一邊說著，一邊壓低了帽子）"
1011505-152 = "（可惜沒能遮住他已經紅透了的耳朵）"

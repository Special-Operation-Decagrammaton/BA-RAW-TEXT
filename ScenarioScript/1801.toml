[translation]
1801-1 = "The Justice Task Force's Day Off 1"
1801-2 = "Abandoned Factory Near Trinity"
1801-3 = "*yells*"
1801-5 = "Oh, don't make such a fuss! You're gonna be sorry if you keep resisting!"
1801-6 = "Wh-Who are you guys? Why did you kidnap me?"
1801-7 = "You sure have a lot of questions, Trinity lady!"
1801-8 = "All you need to do is be quiet and stay here until the academy pays your ransom. And don't even think of doing anything stupid!"
1801-9 = "What?! You're negotiating with Trinity General School?"
1801-10 = "Of course! We've already told them that if they want to get their students back they'll..."
1801-11 = "Oh, no... Everyone run! ...I mean, watch out!"
1801-12 = "Huh?"
1801-13 = "What are you talking about?"
1801-15 = "*boom*!"
1801-16 = "Ahhh! "
1801-17 = "What? What's going on?! "
1801-19 = "Heh heh heh..."
1801-21 = "Kehehehehehe! "
1801-22 = "Whaaa?!"
1801-23 = "Sh-She's here! She's here!"
1801-25 = "Kyaaaaaak!"
1801-28 = "Remedial Knights Central Ward"
1801-29 = "So, how are they doing?"
1801-30 = "Most of the students who were held hostage are in stable condition, but..."
1801-31 = "Some of them are showing PTSD symptoms from the stress... They'll need to rest for at least three weeks."
1801-32 = "..."
1801-33 = "Serina, I'm back!"
1801-34 = "I transported those goons from the Deko-Boko Helmet Gang to a public hospital in the outskirts of the city!"
1801-35 = "They were all crushed like soda cans. It was scary just trying to give them first aid!"
1801-36 = "Was this the work of Tsurugi of the Justice Task Force...?"
1801-37 = "Hanae..."
1801-39 = "Oh, I'm sorry..."
1801-42 = "Good work so far. Please keep it up."
1801-43 = "Ha...you're welcome."
1801-45 = "*sigh*"
1801-46 = "Great work."
1801-47 = "Next, we should thank the Sisterhood who looked for the hostages with us in the wreckage of the building..."
1801-48 = "Uh...yes. We should go there too..."
1801-49 = "After that, we have to go to the office that handled the claim for the damages..."
1801-50 = "Hmm...right."
1801-51 = "Also, we need to go to the club headquarters to report all the extra ammunition we used..."
1801-52 = "..."
1801-53 = "It was all in the name of justice. We did what we had to do."
1801-54 = "That's true, but..."
1801-55 = "Tsurugi seems a little sadder this time..."
1801-56 = "But isn't that pretty typical of her?"
1801-57 = "I guess so..."
1801-58 = "*rings* Huh?"
1801-59 = "What is it?"
1801-60 = "Oh...it's a video message from the Tea Party."
1801-61 = "What? The Tea Party?!"
1801-63 = "We heard about what happened today with the Justice Task Force."
1801-64 = "It was a rescue mission, but the students who got taken hostage were all sent to the hospital..."
1801-65 = "Some of them even claim that they got PTSD from looking at Tsurugi's face..."
1801-66 = "..."
1801-67 = "I've been thinking about this."
1801-68 = "How come these kinds of events keep happening with the Justice Task Force?"
1801-69 = "I think the solution could be...an exchange."
1801-70 = "To be exact, learning common sense by having a cultural exchange with others...and showing compassion."
1801-71 = "That's what the Justice Task Force needs. To exchange more with other clubs."
1801-72 = "So, I came up with a plan. The Justice Task Force will be closed tomorrow."
1801-73 = "During which, you'll be participating in other clubs' activities at the academy."
1801-74 = "My plan is perfect. It'll be an opportunity for you to better understand others and learn about common sense and compassion."
1801-75 = "What do you think? Are you excited?"
1801-76 = "Well, good luck, everyone! ☆"
1801-78 = "Oh... And just so you know, this is mandatory, and there will be no exceptions."
1801-80 = "..."
1801-81 = "...What does this mean? Are we supposed to observe all the other clubs?"
1801-82 = "*sigh* What else can we do?"

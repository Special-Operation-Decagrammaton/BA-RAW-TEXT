[translation]
1801-1 = "實現正義部休假中（１）"
1801-2 = "三一綜合學園．近郊的廢棄工廠"
1801-3 = "呀啊啊！"
1801-5 = "安靜！要是不聽話可別怪我不客氣！"
1801-6 = "你、你們到底是什麼人？為什麼要把我抓到這種地方……！"
1801-7 = "三一的大小姐就算知道了又能怎麼樣？"
1801-8 = "你就乖乖待在這裡，等你們學校付贖金吧。別想些有的沒的！"
1801-9 = "你、你們要和學校交涉！？"
1801-10 = "沒錯！我們已經聯絡好了，告訴她們希望學生平安回去就乖乖聽話！"
1801-11 = "不、不行，快逃啊……不，請你們快逃吧……！！"
1801-12 = "啊？"
1801-13 = "你在說什……"
1801-15 = "（轟隆隆隆隆隆！！）"
1801-16 = "嚇咿咿咿？！"
1801-17 = "怎、怎麼了？！怎麼回事？！"
1801-19 = "咕、咕咕咕、咕嘻……"
1801-21 = "咕嘻嘻嘻嘻嘻嘻嘻！！"
1801-22 = "唔、唔哇啊啊啊？！"
1801-23 = "結、結果還是來了……！"
1801-25 = "嘰耶耶耶耶耶耶耶耶！！！！"
1801-28 = "救護騎士團．中央醫療大樓"
1801-29 = "……狀態如何？"
1801-30 = "還好，這幾位學生的傷勢並不像對方那麼嚴重……"
1801-31 = "但有幾個人可能有罹患[ruby=創傷後壓力症候群]PTSD[/ruby]……最好在醫院靜養三週左右。"
1801-32 = "……我了解了。"
1801-33 = "芹奈前輩，我回來了！"
1801-34 = "我把凹凹凸凸頭盔團的傷患確實送到市區外的醫院了！"
1801-35 = "那些人變得像是被壓扁的飲料罐一樣，讓我好難處理喔～"
1801-36 = "那就是實現正義部的弦生前輩──"
1801-37 = "花繪醬。"
1801-39 = "啊，對、對不起……"
1801-42 = "……那麼，後續再麻煩你們了。"
1801-43 = "是，請交給我們吧。"
1801-45 = "呼……"
1801-46 = "辛苦了，前輩。 "
1801-47 = "接下來要去「修女會」，感謝對方一起在倒塌的建築物中搜救人質……"
1801-48 = "……是啊。也得去一趟那裡才行……"
1801-49 = "之後還得去幫我們處理損害賠償申訴的行政室。"
1801-50 = "是啊……"
1801-51 = "然後因為這次用了很多子彈，以防萬一還要去社團活動本部報告一下……"
1801-52 = "……"
1801-53 = "……我覺得某種程度的損害是無可避免的。畢竟也不可能將傷亡降為零……"
1801-54 = "確實有道理……"
1801-55 = "但重點是，弦生她好像相當沮喪……"
1801-56 = "……這不是也是老樣子了嗎？"
1801-57 = "話雖如此……"
1801-58 = "嗯……？"
1801-59 = "怎麼了嗎？"
1801-60 = "啊……茶會傳來了一段影片。"
1801-61 = "茶會？！"
1801-63 = "日安，實現正義部的各位。我有聽說今天發生的事了，各位辛苦了。"
1801-64 = "營救任務本身相當成功……然而，就連被當成人質的學生們也都全數住院。"
1801-65 = "其中有些人，還因為任務中的弦生同學實在太駭人，可能罹患PTSD……"
1801-66 = "……"
1801-67 = "根據以上情況，我稍微思考了一下。"
1801-68 = "思考各位現在需要什麼東西。"
1801-69 = "最後得出結論，認為各位需要「交流」。 "
1801-70 = "雖說是交流，但準確來說是要有著常識與溫暖……充滿愛的交流。"
1801-71 = "我認為，這就是實現正義部的各位，現在所需要的。"
1801-72 = "於是我想到了。讓實現正義部，明天休假一整天吧。"
1801-73 = "但同時，也請各位參加學園其他社團、團體，或委員會的活動。 "
1801-74 = "我相信透過這次交流，各位一定能理解常識與愛。一定不會錯。"
1801-75 = "呵呵，很令人期待吧？"
1801-76 = "那麼，祝各位有個美好的明天～☆"
1801-78 = "啊，順帶一提，這項決定具有強制力。沒有例外。"
1801-80 = "……"
1801-81 = "……這是什麼意思？要我們參與其他社團……？"
1801-82 = "哈啊，又來了…… "

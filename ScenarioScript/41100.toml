[translation]
41100-1 = "ตอนที่ 10;การไม่เป็นเจ้าของและข้าวกล่องหน้าเนื้อย่าง"
41100-11 = "ในที่สุดก็ได้สติแล้วสินะ..."
41100-17 = "ฉันล่ะกังวลว่าการต้อนรับของพวกพ้องของฉันจะทำให้ร่างกายคุณเกิดปัญหาอะไรขึ้นมา"
41100-19 = "พวกเราไม่เคยเจอคนนอกคิโวทอสมาก่อนน่ะ"
41100-20 = "[s] \"คุณคือ...?\""
41100-21 = "ลืมแนะนำตัวไปเลย ฉันชื่อว่าเดการ์ต"
41100-22 = "เป็นหัวหน้ากลุ่ม <ความสุขเล็กๆ> ที่ย่อมาจาก <กลุ่มผู้แสวงหาความสุขเล็กๆ แบบไม่ต้องครอบครอง>"
41100-23 = "[s1] \"ความสุขเล็กๆ...?\"\n[s2] \"แบบไม่ต้องครอบครอง...?\""
41100-24 = "อะไรกัน ไม่เคยได้ยินชื่อกลุ่มพวกเรามาก่อนเลยงั้นเหรอ?"
41100-25 = "อะไรกัน ไม่เคยได้ยินชื่อกลุ่มพวกเรามาก่อนเลยงั้นเหรอ?"
41100-26 = "คนที่แสวงหาชีวิตที่ปราศจากความโลภในทรัพย์สมบัติน่าจะต้องเคยได้ยินชื่อของเราบ้าง หรือว่าชีวิต#nของคุณครูจะยังห่างไกลกับเรื่องแบบนี้?"
41100-27 = "แต่ก็นะ ฉันก็เดาไว้แล้วแหละว่าต้องเป็นอย่างนี้"
41100-28 = "เพราะคุณคือมนุษย์โลภมากที่สั่งให้ลูกน้องออกไปปล้นอาหารของคนอื่นยังไงล่ะ!"
41100-29 = "[s] \"พูดอะไรของคุณน่ะ...\""
41100-30 = "อย่ามาทำเป็นไม่รู้หน่อยเลย! ฉันและพวกพ้องเห็นคุณกับกลุ่มนักเรียนหูกระต่ายคุยกัน! เห็นมากับตาของตัวเองเลย! "
41100-31 = "[s3] \"กลุ่มนักเรียนหูกระต่ายงั้นเหรอ...\"\n[s4] \"หมายถึงกองทหาร RABBIT ใช่ไหม?\""
41100-32 = "ไม่สำคัญหรอกว่าเด็กพวกนั้นจะใช้ชื่อกลุ่มว่าอะไร"
41100-33 = "ไม่สำคัญหรอกว่าเด็กพวกนั้นจะใช้ชื่อกลุ่มว่าอะไร"
41100-34 = "สำหรับพวกเราแล้ว พวกคุณก็เป็นแค่คนโลภมากที่ขัดขวาง \"การแสวงหาสัจธรรม\" ของพวกเรา"
41100-35 = "[s] \"พวกเราไปขัดขวางอะไร?\""
41100-36 = "คนอื่นพากันถามพวกเราว่าทำไมไม่ไปหางานทำ"
41100-37 = "และเรียกเราว่าปลิงของสังคมบ้าง คนขี้แพ้บ้าง พวกขอทานบ้าง"
41100-38 = "แต่ว่าความจริงพวกเราไม่ใช่แบบนั้น ไม่ใช่ว่าเราไม่ทำงานสักหน่อย..."
41100-39 = "พวกเราแค่ไม่ต้องการครอบครองสิ่งใดเลย!"
41100-40 = "[s] \"ไม่ครอบครองสิ่งใด...?\""
41100-41 = "ผู้คนในคิโวทอสต่างเป็นเจ้าของสิ่งของมากมายนับไม่ถ้วน"
41100-42 = "ทั้งรถถังรุ่นใหม่ ปืนไรเฟิลราคาแพง หรือแม้แต่บังเกอร์ที่ช่วยป้องกันมิสไซล์..."
41100-43 = "แต่ความปรารถนาที่จะครอบครองของพวกนี้เป็นสิ่งที่ไม่มีที่สิ้นสุด นับวันมันจะยิ่งเพิ่มขึ้นเรื่อยๆ จนทำให้ชีวิตย่ำแย่"
41100-44 = "ความสุขที่แท้จริงคือการไม่ครอบครองสิ่งใดเลยต่างหาก..."
41100-45 = "เราต้องปล่อยวางทุกอย่างยกเว้นแต่สิ่งจำเป็นเพื่อความอยู่รอด แล้วใช้ชีวิตตามธรรมชาติที่ปราศจาก#nการแต่งเติม จะได้เข้าถึงความสุขที่แท้จริงได้"
41100-46 = "พวกเราก็เลยไม่ทำงาน ไม่เป็นเจ้าของ และมาใช้ชีวิตที่ไม่ครอบครองสิ่งใดในอาคารเก่าๆ นี่"
41100-50 = "แต่อยู่มาวันหนึ่งก็มีแขกที่ไม่ได้รับเชิญโผล่มา"
41100-51 = "นักเรียนพวกนั้นใส่หูกระต่ายและติดอาวุธราคาแพง หอบข้าวกล่องหมดอายุไปมากมายขนาดที่กินกัน#nทุกคนแล้วยังเหลือ แถมยังโลภมากอยากได้ข้าวกล่องใหม่อีก"
41100-52 = "ทุกที่ที่พวกนั้นไปจะไม่มีอะไรเหลือเลย ขนาดข้าวหน้าถั่วงอกยังไม่เหลือ..."
41100-53 = "ไหนจะข้าวหน้าเนื้อย่างที่เป็นแรร์ไอเทมอีก... พวกนั้นผูกขาดสิ่งของฟุ่มเฟือยแบบนั้นเพียงผู้เดียว..."
41100-54 = "นี่คือการกระทำไร้มารยาท การกระทำที่ขาดจริยธรรม!"
41100-55 = "[s] \"ไหนว่าไม่สนใจสิ่งของฟุ่มเฟือยไง...?\""
41100-56 = "กะ... ก็จริงอยู่ แต่ว่ามัน..."
41100-57 = "เอาเถอะ! พวกเราทนเห็นพฤติกรรมแย่ๆ ของกองทหาร RABBIT หรือกองทหารกระต่ายอะไรนั่นไม่ได้!"
41100-58 = "ดูทรงแล้วคุณน่าจะเป็นหัวหน้าของเด็กพวกนั้นสินะ... สัญญาอะไรกับเราหน่อยสิ"
41100-59 = "ขอให้พวกเราชาว <ความสุขเล็กๆ> ได้เป็นเจ้าของข้าวกล่องหน้าเนื้อย่างในย่านนี้ต่อไปด้วย!"
41100-60 = "[s5] \"เด็กๆ พวกนั้นไม่ใช่ลูกน้องสักหน่อย\"\n[s6] \"เด็กๆ พวกนั้นเป็นแค่ลูกศิษย์น่ะ\""
41100-61 = "ฉันไม่สนหรอกว่าจะเป็นลูกน้องหรือลูกศิษย์ แต่พวกนั้นน่าจะฟังคำสั่งของคนที่เป็นครูไม่ใช่เหรอ?"
41100-62 = "ฉันไม่สนหรอกว่าจะเป็นลูกน้องหรือลูกศิษย์ แต่พวกนั้นน่าจะฟังคำสั่งของคนที่เป็นครูไม่ใช่เหรอ?"
41100-63 = "ทำไมถึงทำหน้าแบบนั้นล่ะ? คุณจัดการนักเรียนของตัวเองไม่ได้รึไง?"
41100-64 = "ฮึ่ม... งั้นก็ช่วยไม่ได้"
41100-68 = "อยู่ที่นี่อย่างสงบเสงี่ยมไปก็แล้วกัน พวกเราจะใช้โทรศัพท์ของคุณเจรจาต่อรองดู"
41100-69 = "[s] \"ไม่น่ามีประโยชน์นะ...\""
41100-73 = "ไหนลองหาชื่อกองทหาร RABBIT ในรายชื่อซิ... "
41100-74 = "เจอแล้ว"
41100-81 = "มีเรื่องอะไรเหรอคะคุณครู...? พวกฉันกำลังยุ่งกับการเตรียมอาหารค่ะ"
41100-82 = "ธะ... เธอคือหัวหน้า <กองทหาร RABBIT> ใช่ไหม?"
41100-83 = "พวกเราคือ <กลุ่มผู้แสวงหาความสุขเล็กๆ แบบไม่ต้องครอบครอง> หรือย่อสั้นๆ ว่า <ความสุขเล็กๆ>"
41100-87 = "วะ... วางไปแล้วเหรอ?"
41100-88 = "[s] \"สงสัยจะคิดว่าเป็นแก๊งคอลเซ็นเตอร์\""
41100-89 = "หนอย... พวกคนร้ายที่ไม่รับรู้ความจริง..."
41100-96 = "ฮะ... ฮัลโหล พวกเธออาจจะคิดว่าเราเป็นแก๊งคอลเซ็นเตอร์..."
41100-97 = "แต่เราจับตัวคุณครูของพวกเธอมา ถ้าไม่ทำตามที่เราขอละก็ คุณครูของพวกเธอจะได้ลิ้มรสความ#nป่าเถื่อน..."
41100-98 = "อ้อ งั้นเหรอ เล่นให้สนุกนะ"
41100-103 = "วางสายไปอีกแล้วเหรอ?!"
41100-104 = "อะไรกัน? เป็นครูจริงหรือป่าว? ทำไมพวกนักเรียนถึงไม่เป็นห่วงเลยล่ะ?!"
41100-105 = "[s] \"คือว่าเรื่องมันซับซ้อนน่ะ...\""
41100-106 = "โธ่เว้ย! อุตส่าห์จับตัวคุณครูจากชาเล่ต์มาเป็นตัวประกัน คิดว่านี่จะเป็นโอกาสที่จะได้กินข้าวกล่อง#nแพงๆ แล้วซะอีก..."
41100-107 = "งั้นก็ต้องหาวิธีอื่น..."
41100-108 = "[s] \"เดี๋ยวขอโทรเองได้ไหม?\""
41100-109 = "นี่แกจะเป็นคนพูดสายเองงั้นรึ?"
41100-110 = "ให้โทรเองก็ได้อยู่หรอก แต่ถ้าจะโทรแจ้งตำรวจละก็ ล้มเลิกความคิดนั้นจะดีกว่า"
41100-111 = "พวกเราชาวความสุขเล็กๆ มีอาวุธที่เหนือกว่าตำรวจพวกนั้น!"
41100-112 = "[s] โทรหากองทหาร RABBIT"
41100-121 = "งืม... ว่าไงอีกคุณครู เมื่อคืนฉันทำงานโต้รุ่งจนเพลียเลย"
41100-122 = "ถ้าจะโทรมาแกล้งกันอีกละก็..."
41100-123 = "[s] \"ที่นี่มีข้าวกล่องหน้าเนื้อวากิวชั้นดีด้วยนะ\""
41100-129 = "ฮึ่ม! ไหนว่าโทรเองแล้วจะได้ผลไง?"
41100-130 = "โดนตัดสายใส่อีกรอบแล้วเนี่ย!"
41100-131 = "ขืนยังเป็นแบบนี้ คงต้องไปข่มขู่ขอของกินจากนักเรียนคนอื่น..."
41100-142 = "ทุกคนหลบไป! SRT มาแล้ว!"
41100-144 = "ซากิ ตอนนี้เราไม่ได้ทำภารกิจของ SRT อยู่นะ เอาเป็นว่าเรื่องการเปิดเผยตัวตน..."
41100-145 = "ว่าแต่ที่นี่มีข้าวกล่องหน้าเนื้อวากิวชั้นดีจริงๆ เหรอ?"
41100-146 = "ตอนอยู่สถาบัน SRT ยังไม่เคยได้กินข้าวกล่องที่มีเนื้อวากิวเลย..."
41100-148 = "ต้องมีสิ ก็คุณครูจากชาเล่ต์บอกฉันมาแบบนี้"
41100-149 = "ฉันเช็กตำแหน่งของคุณครูจากเบอร์โทรศัพท์แล้ว คุณครูต้องยังอยู่แถวๆ นั้นแน่นอน!"
41100-150 = "[s] \"มาถึงเร็วจังเลย...\""
41100-152 = "อ๊ะ คุณครูนี่นา"
41100-153 = "นี่ที่มีข้าวกล่องหน้าเนื้อวากิวชั้นดีจริงๆ เหรอคุณครู?"
41100-154 = "การเก็บอย่างรวดเร็วส่งผลอย่างมากกับความสดใหม่ข้าวกล่องเหลือทิ้งนะ"
41100-155 = "คุณค่าข้าวกล่องที่หมดอายุจะลดลงในทุกๆ วินาทีเลยด้วย"
41100-156 = "พอได้ยินว่าที่นี่มีข้าวกล่องหน้าเนื้อวากิว พวกเราก็เลยรีบมา..."
41100-157 = "[s] \"เอ่อ... คือว่า...\""
41100-159 = "ฮ่ะฮ่ะฮ่า! ตกหลุมพรางของเราจนได้"
41100-160 = "ความปรารถนาของมนุษย์ช่างไม่มีที่สิ้นสุดจริงๆ..."
41100-161 = "มนุษย์ที่ไม่อาจหลุดพ้นจากความโลภได้ย่อมก้าวขาเข้าไปสู่ความพินาศเสมอ"
41100-162 = "พูดอย่างนี้แปลว่า... ที่นี่ไม่มีข้าวกล่องหน้าเนื้อวากิวชั้นดีงั้นเหรอ?"
41100-163 = "ก็ไม่มีน่ะสิ มันไม่มีขายตั้งแต่แรก แล้วจะเอาที่ไหนมาเหลือทิ้งล่ะ?"
41100-164 = "ถ้าได้ข้อคิดจากครั้งนี้แล้วก็ไปดื่มด่ำกับการใช้ชีวิตที่ไร้ซึ่งการครอบครองซะเถอะ"
41100-166 = "พวกพ้องทั้งหลาย มาสั่งสอนปีศาจแห่งความปรารถนาพวกนี้กัน!"
41100-176 = "อะไรของพวกแกเนี่ย? ใส่เสื้อผ้าขาดรุ่งริ่งแต่มีอาวุธใหม่ล่าสุดครบมือเลย!"
41100-177 = "ระ... เราโดนล้อมเอาไว้แล้ว..."
41100-179 = "รอเดี๋ยวก่อนนะคะทุกคน"
41100-180 = "เราแค่ต้องล่อศัตรูไปในที่แคบๆ แล้วก็..."
41100-181 = "ถึงจะมีอาวุธดีๆ แต่ถ้าใช้ไม่เป็นก็จบอยู่ดีไม่ใช่รึไง?"
41100-182 = "ยังไงก็เทียบชั้นกับนักเรียน SRT อย่างพวกเราไม่ได้หรอก!"
41100-183 = "ฉันว่าเราน่าจะจัดการสไนเปอร์ที่อยู่ชั้น 2 ได้นะ..."
41100-184 = "มิยาโกะ ฉันกับมิยุจะจัดการศัตรูข้างหน้าเอง ฝากเธอจัดการข้างหลังหน่อยนะ! ไหวใช่ไหม?"
41100-186 = "ไหวค่ะ งั้นฝากทุกคนปะทะแทนฉันด้วยนะคะ"
41100-187 = "ฉันจะให้สัญญาณพร้อมระเบิดแสง ถึงตอนนั้นให้ทุกคนกระจายกำลังนะคะ"
41100-188 = "ถ้างั้นก็..."
41100-190 = "เริ่มปฏิบัติการ!"

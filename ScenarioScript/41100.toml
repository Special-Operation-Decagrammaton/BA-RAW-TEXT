[translation]
41100-1 = "Episode 10; Non-Possession and Yakiniku Bentos"
41100-11 = "You're finally awake."
41100-17 = "I do apologize for the poor hospitality of my comrades."
41100-19 = "We don't often deal with guests, you must understand."
41100-20 = "[s] \"You are?\""
41100-21 = "Ah, where are my manners. I am Descartes."
41100-22 = "I am the leader of this organization, the Pursuers of Non-Possessive Happiness, or the Pursuers for short."
41100-23 = "[s1] \"Non-possessive happiness?\"\n[s2] \"The Pursuers?\""
41100-24 = "You mean to say you've never heard of our organization?"
41100-25 = "You mean to say you've never heard of our organization?"
41100-26 = "We are well-known amongst those pursuing a lifestyle of minimalism and peace. To not have heard of us, you must lead an egregious life of excess."
41100-27 = "Of course, I already knew that."
41100-28 = "I already knew that you're a selfish human who orders your minions to rob poor folk of their food!"
41100-29 = "[s] \"I don't think I follow...\""
41100-30 = "Don't play dumb! I have seen you and those rabbit-eared students plotting and scheming together!"
41100-31 = "[s3] \"Do you mean the SRT students?\"\n[s4] \"Are you talking about the RABBIT Squad?\""
41100-32 = "It makes no difference what they're called."
41100-33 = "It makes no difference what they're called."
41100-34 = "We call them greedy pigs. You are sabotaging our path to enlightenment."
41100-35 = "[s] \"What did we sabotage now?\""
41100-36 = "...Society calls us by many names."
41100-37 = "Leeches, NEETs, Homeless, Good-for-Nothing Layabouts..."
41100-38 = "But such names are facetious. To call us layabouts...!"
41100-39 = "We are noble ones pursuing non-possessiveness!"
41100-40 = "[s] \"Non-possessiveness?\""
41100-41 = "The people of Kivotos today wish to possess everything they lay their eyes upon."
41100-42 = "The newest tanks, expensive rifles, cozy bunkers that block missiles..."
41100-43 = "And so they buy more and more, wishing to fill the gaping hole within them with possessions. The more they purchase, the bigger it grows, until it consumes their very being!"
41100-44 = "True happiness comes not from having, but from NOT having..."
41100-45 = "One must be willing to release their attachment to worldly possessions, to let go of the shackles of society and only indulge in what we must to survive! To be free!"
41100-46 = "We are not leeches upon society. We chose this life: to not work, to not own, to not possess. We freed ourselves of material greed and instead feed our souls with our impoverished lifestyle."
41100-50 = "But then, in the midst of our noble pursuit, a group of intruders arrived."
41100-51 = "These intruders donned rabbit ears and the most expensive equipment on the market. Their insatiable appetite knew no bounds, plundering every bento they could lay their greedy fingers upon."
41100-52 = "They're like a virus, devouring all in sight. They refuse to leave behind even a mung bean sprout bento..."
41100-53 = "Yakiniku bentos are so popular that they're rarely discarded as it is... To monopolize such a luxury solely for themselves..."
41100-54 = "This senselessness is a slap in the face to all we stand for!"
41100-55 = "[s] \"Don't you stand for letting go of material attachments?\""
41100-56 = "I-I... Well... You see..."
41100-57 = "Don't change the subject! Either way, we cannot just stand idly by and allow this squad of rabbits or bunnies or what have you to carry on with their greedy acts."
41100-58 = "Now, the reason I brought you here is to make a demand."
41100-59 = "As the leader of these miscreants, you will tell them that from now on, all yakiniku bentos belong to the Pursuers!"
41100-60 = "[s5] \"Those kids aren't my subordinates.\"\n[s6] \"They're really just my students.\""
41100-61 = "Student or subordinate, what does it matter? As their teacher, simply make them listen to you."
41100-62 = "Student or subordinate, what does it matter? As their teacher, simply make them listen to you."
41100-63 = "Don't look at me like that. Are you truly so incompetent you cannot control your students?"
41100-64 = "I didn't want it to come to this."
41100-68 = "Don't move an inch. I'll call them on your cell phone and make my demands."
41100-69 = "[s] \"I'm trying to tell you, they're not going to care...\""
41100-73 = "Now, where is the RABBIT Squad in your contacts list? "
41100-74 = "Here it is."
41100-81 = "Yes, Sensei? We're busy making dinner."
41100-82 = "Am I speaking to the leader of the RABBIT Squad?"
41100-83 = "We are the Pursuers of Non-possessive Happiness, or the Pursuers for short, a collective of monks in this city in search of true happiness. We are noble—"
41100-87 = "They...hung up?"
41100-88 = "[s] \"Maybe they thought you were a phishing scam?\""
41100-89 = "Ugh... This is why enlightenment eludes these deplorable students..."
41100-96 = "Hello? Don't hang up, this isn't a prank call."
41100-97 = "We have your precious Sensei hostage. If you don't meet our demands, you'll never see Sensei again."
41100-98 = "Oh, okay. Tell Sensei I said bye-bye."
41100-103 = "They just hung up?! Again?"
41100-104 = "Are you really their Sensei? How could these callous students not show the slightest bit of concern for you? What is wrong with all of you?"
41100-105 = "[s] \"It's kind of a long story...\""
41100-106 = "Drat! I thought our plan was flawless! I was supposed to be rolling in expensive bentos by the end of this..."
41100-107 = "I didn't plan for their absolute lack of enlightenment!"
41100-108 = "[s] \"How about I try calling them?\""
41100-109 = "You, personally?"
41100-110 = "I'll allow it. However, trying to call the police would end very badly for everyone."
41100-111 = "The Pursuers are all very heavily armed, and not afraid to fight for our noble cause!"
41100-112 = "[s] Call the RABBIT Squad yourself."
41100-121 = "Ugh... Again, Sensei? I stayed up all night and I wanna go to sleep."
41100-122 = "If you call us one more time..."
41100-123 = "[s] \"There's an abandoned top-quality wagyu bento here.\""
41100-129 = "Hah! Did you think your precious students would care if they heard your voice?"
41100-130 = "You got hung up on! Just like me!"
41100-131 = "Ugh. The only way to salvage this situation is to blackmail some other students with the Sensei."
41100-142 = "SRT! Everyone, back up!"
41100-144 = "Saki, it's against protocol to use the academy's name when we're not on official business..."
41100-145 = "I-I want the top-quality wagyu bento, please."
41100-146 = "I've n-never had wagyu meat before, even at SRT."
41100-148 = "I promise, Sensei said there was some there."
41100-149 = "I traced their cell right to where you are, so bring us home some meat!"
41100-150 = "[s] \"Wow, I didn't even know you could move that fast.\""
41100-152 = "Oh... Hi, Sensei."
41100-153 = "Sensei, where's the top-quality wagyu bento?!"
41100-154 = "Rapid collection is the key to preserving the freshness of a bento."
41100-155 = "Once a discarded bento passes its expiration date, every second counts."
41100-156 = "So, as soon as Moe informed us of your call, we dropped everything and came as fast as we could."
41100-157 = "[s] \"Uh, so the thing is...\""
41100-159 = "Bahahaha! You completely fell for our plan!"
41100-160 = "You came here driven by your human desire and were led astray by it!"
41100-161 = "Imbeciles like you who are driven by greed are consumed by it until it leads them to utter ruin!"
41100-162 = "What's this weirdo saying? Where's the top-quality wagyu bento?"
41100-163 = "Of course there's no wagyu bento here. They always sell out immediately when they're in stock."
41100-164 = "But what we do have here, is a lesson on the joys of non-possession."
41100-166 = "Comrades, rise! Let us instill our noble cause in these greedy goblins!"
41100-176 = "Who the hell are these guys? They appear homeless, but all their weapons are state-of-the art!"
41100-177 = "W-We're surrounded..."
41100-179 = "Don't panic."
41100-180 = "Lure them to a tight space. We'll funnel them through a choke point and pick them off one-by-one."
41100-181 = "You think we're scared of your weapons? Small-fry are still small-fry."
41100-182 = "Throw whatever you can at us. You're no match against SRT elites!"
41100-183 = "I-I can p-probably take down the snipers on the second floor."
41100-184 = "All right, I'll help you with that and deal with the front. Miyako, you have our backs?"
41100-186 = "Always. Stay safe."
41100-187 = "Watch out for my signal before the flash grenade. That's your cue to spread out in formation."
41100-188 = "Well then..."
41100-190 = "RABBIT Squad, move!"

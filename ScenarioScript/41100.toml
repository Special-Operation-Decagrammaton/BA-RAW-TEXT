41100-20 = "[s] \"……당신은?\""
41100-21 = "3;데카르트;04;인사가 늦었군요. 제 이름은 데카르트.\n#3;em;[반응]"
41100-22 = "3;데카르트;01;이곳의 조직— <소유하지 않고도 확실한 행복을 찾는 모임>, 줄여 <소확행>을 이끌고 있는 리더입니다.\n#3;greeting"
41100-23 = "[s1] \"소유하지 않고……?\"\n[s2] \"소확행……?\""
41100-24 = "3;데카르트;03;이런, 이런. 저희의 이름을 처음 들어보셨습니까?\n#3;em;[?]"
41100-25 = "3;데카르트;03;이런, 이런. 저희의 이름을 처음 들어보셨습니까?\n#3;em;[?]"
41100-26 = "3;데카르트;01;청빈한 삶을 추구하는 자라면 누구나 한 번쯤은 들어본 이름일 텐데, 선생님께서는 청빈과는 거리가 먼 삶을 살아오셨나 보군요."
41100-27 = "3;데카르트;01;하긴, 그럴 거라고 이미 예상하고 있었습니다."
41100-28 = "3;데카르트;02;당신은 부하들을 시켜 남의 음식을 강탈하기나 하는 탐욕스러운 인간이니까요!\n#3;em;[!]"
41100-29 = "[s] \"무슨 말인지 모르겠는데…….\""
41100-30 = "3;데카르트;05;시치미 떼지 마십시오! 저와 동지들이 이 눈으로 똑똑히 당신과 토끼 귀를 단 그 학생들이 이야기를 나누는 광경을 보았으니까요!\n#3;hophop"
41100-31 = "[s3] \"토끼 귀를 단 학생이라면……\"\n[s4] \"RABBIT 소대를 말하는 거야?\""
41100-32 = "3;데카르트;01;당신이 그 학생들을 무어라 부르고 있는지는 관심 없습니다."
41100-33 = "3;데카르트;01;당신이 그 학생들을 무어라 부르고 있는지는 관심 없습니다."
41100-34 = "3;데카르트;02;저희에게 당신들은 그저 구도를 방해하는 탐욕스러운 방해자일 뿐이니까요."
41100-35 = "[s] \"우리가 무얼 방해했는데?\""
41100-36 = "3;데카르트;04;……혹자들은 저희를 이렇게 부르곤 하죠.\n#3;em;…"
41100-37 = "3;데카르트;02;<사회의 거머리>, <니트>, <거지>, <어째서 일하지 않는 거야-> 라고……."
41100-38 = "3;데카르트;02;하지만 그것은 실제와 다릅니다. 저희는 일하지 않는 것이 아닙니다……"
41100-39 = "3;데카르트;05;저희는 무소유를 실천하고 있을 뿐입니다!\n#3;closeup\n#fontsize;80"
41100-40 = "[s] \"무소유……?\""
41100-41 = "3;데카르트;04;키보토스의 사람들은 너무나도 많은 것을 소유하려 하고 있습니다."
41100-42 = "3;데카르트;01;새로 나온 전차나, 값비싼 소총, 미사일을 막아주는 아늑한 벙커 등등……"
41100-43 = "3;데카르트;02;하지만 이 소유에 대한 욕망은 아무리 채워도 마르지 않고 계속 불어나, 결국은 삶을 피폐하게 만들고 맙니다.\n#3;em;[반응]"
41100-44 = "3;데카르트;01;진정한 행복이란 소유가 아닌 무소유에서 비롯되는 법……"
41100-45 = "3;데카르트;01;생존에 필요한 것을 제외한 모든 것을 내려놓고 무위자연의 삶을 유지해야 진정한 행복에 도달할 수 있는 것입니다."
41100-46 = "3;데카르트;03;그래서 저희는 일하지 않고, 소유하지 않고, 이런 낡은 건물 아래에서 무소유의 삶을 이어 나가기로 했습니다.\n#3;greeting"
41100-47 = "#st;[0,0];instant;1;"
41100-48 = "#clearST"
41100-49 = "3;데카르트;01\n#3;m4\n#wait;1500"
41100-50 = "3;데카르트;02;그런데 어느 날, 이곳에 불청객이 찾아왔습니다.\n#3;em;…"
41100-51 = "3;데카르트;02;토끼 귀를 달고 값비싼 장비로 무장한 그 학생들은 자신들의 아지트에 먹고 남을 정도의 폐기 도시락을 쌓아 놨음에도 불구하고 탐욕스럽게 새로운 도시락을 앗으려 했습니다."
41100-52 = "3;데카르트;06;그들이 지나간 자리에는 숙주 도시락조차 남아있지 않았습니다……"
41100-53 = "3;데카르트;02;안 그래도 야키니쿠 도시락은 폐기가 잘 안 되는 고급 도시락인데…… 그런 사치품을 혼자 독점하려 하다니……\n#3;stiff"
41100-54 = "3;데카르트;05;이는 최소한의 상도덕을 무시한 몰상식한 행위가 아닙니까?!\n#3;em;[빠직]"
41100-55 = "[s] \"사치품에는 관심이 없다며……?\""
41100-56 = "3;데카르트;06;그, 그건 그렇지만…….\n#3;m3"
41100-57 = "3;데카르트;05;여하튼! RABBIT 소대인지 토끼 소대인지 모를 그 학생들의 폭거를 두고만 볼 수는 없습니다!\n#3;hophop"
41100-58 = "3;데카르트;02;보아하니 당신이 그들의 리더처럼 보이던데…… 이 자리에서 약속해주시겠습니까?"
41100-59 = "3;데카르트;05;앞으로 이 일대의 야키니쿠 도시락은 우리 <소확행>의 소유라는 것을 말이지요!\n#3;em;[!]\n#fontsize;80"
41100-60 = "[s5] \"그 아이들은 내 부하가 아니야.\"\n[s6] \"그 아이들은 내 학생일 뿐이야.\""
41100-61 = "3;데카르트;02;부하든 학생이든, 선생이라면 당신의 말을 들을 게 아닙니까?"
41100-62 = "3;데카르트;02;부하든 학생이든, 선생이라면 당신의 말을 들을 게 아닙니까?"
41100-63 = "3;데카르트;06;……어째서 그런 표정을 지으시는 거죠? 당신은 당신의 학생들도 제대로 다루지 못하는 겁니까?\n#3;stiff"

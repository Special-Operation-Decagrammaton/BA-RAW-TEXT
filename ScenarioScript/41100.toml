[translation]
41100-1 = "第10話;無所有と焼肉弁当"
41100-11 = "……おや、お目覚めですか。"
41100-17 = "体調はいかがです？"
41100-19 = "問題無さそうでしたら何よりです。下手なおもてなしで何かあったらどうしようかと……なにせ私たちも、キヴォトスの外の方をお迎えするのは初めてでして。"
41100-20 = "[s] \"……あなたは？\""
41100-21 = "ご挨拶が遅れました、私の名前はデカルト。"
41100-22 = "この組織、「[ruby=・]所[/ruby]有せずとも[ruby=・]確[/ruby]かな[ruby=・]幸[/ruby]せを探す集い」……通称「所確幸」を率いるリーダーです。"
41100-23 = "[s1] \"？？？\"\n[s2] \"しょかっこう……？\""
41100-24 = "お耳に入れたのは初めてでしょうか？"
41100-25 = "お耳に入れたのは初めてでしょうか？"
41100-26 = "清貧な人生を追い求める方であれば、一度は聞いたことがあるのではと思ったのですが……なるほど。"
41100-27 = "まあ、そうかもしれないとは思っていました。"
41100-28 = "何せあなたは、部下を使って食べ物を強奪していたようですからね。"
41100-29 = "[s] \"えっと、何の話……？\""
41100-30 = "とぼけるのも大概にしなさい！私の仲間たちがこの目ではっきり見たのです、あなたとウサ耳の生徒たちが仲良くしているのを！"
41100-31 = "[s3] \"ウサ耳ってことは……。\"\n[s4] \"RABBIT小隊のみんなのこと？\""
41100-32 = "あの生徒たちの呼称については、特に興味ありません。"
41100-33 = "あの生徒たちの呼称については、特に興味ありません。"
41100-34 = "大事なのはただ、あなた方が我々の求道を邪魔する、貪欲な者たちであるということ。"
41100-35 = "[s] \"何か邪魔をしちゃったっけ……？\""
41100-36 = "……私たちは時にこう呼ばれます。"
41100-37 = "「穀潰し」、あるいは「社会の膿」、と……"
41100-38 = "しかし、それはどちらも的を射ていません。私たちは何もしていないのではなく……"
41100-39 = "ただ、「無所有」を実践しているだけなんです！"
41100-40 = "[s] \"話の流れが見えてこない……。\""
41100-41 = "キヴォトスの人々は、あまりにも多くの物を所有しています。"
41100-42 = "新しい戦車、高い小銃、ミサイルを防ぐためのバンカーなどなど……"
41100-43 = "こういった欲望はしかし、満たされるものではありません。より上に、より高く……それらは最終的に、人生を疲弊させるだけなのです。"
41100-44 = "真の幸せは「所有」ではなく、「無所有」から生まれるもの……"
41100-45 = "生存に必要な最低限のもの以外を全て手放し、無為自然の在り方を維持する……それでこそ、真の幸福に辿り着けるのです。"
41100-46 = "そこで私たちは働かず、所有せずの「無所有」を実践して生活していたのです。"
41100-50 = "ところがある日、ここに招かれざる客がやって来ました。"
41100-51 = "ウサ耳を付けて、何やら高価な武装を手にしたその生徒たちは、次々に廃棄弁当を手にしていきました。"
41100-52 = "彼女たちが通った後、そこにはぺんぺん草も残らず……もやし弁当一つすら残っていなかったのです。"
41100-53 = "ただでさえ「焼肉弁当」などは廃棄の対象になりにくいのに……それを含めて、独り占めを……！"
41100-54 = "こんな非常識な行為が、許されて良いのでしょうか！？"
41100-55 = "[s] \"えっと、「贅沢な嗜好品には興味が無い」って話だったのでは……？\""
41100-56 = "そ、それはそうですが……。"
41100-57 = "とにかく！ラビット小隊なのかウサギ小隊なのか知りませんが、あの暴挙を許すわけには行きません！"
41100-58 = "そして、あなたが彼女たちのリーダーと見ました……さあ、約束してください。"
41100-59 = "今後「焼肉弁当」が廃棄されていたら、それは私たち「所確幸」に譲ると！"
41100-60 = "[s5] \"あの子たちは、私の部下じゃないよ。\"\n[s6] \"あの子たちはただ、私の生徒たちであって。\""
41100-61 = "部下であろうが生徒であろうが、どちらでも構いません。あなたの言うことなら聞くのでしょう？"
41100-62 = "部下であろうが生徒であろうが、どちらでも構いません。あなたの言うことなら聞くのでしょう？"
41100-63 = "……何ですかその微妙な表情は。先生だというのに、自分の生徒たちも律することができないのですか？"
41100-64 = "全く、仕方ありませんね……。"
41100-68 = "こうなったらスマホだけ寄こして、そこでおとなしくしていてください。私が交渉するとします。"
41100-69 = "[s] \"多分無駄だと思うけど……。\""
41100-73 = "えぇっと……"
41100-74 = "これですかね。"
41100-81 = "……何の用ですか？私たちは今、食事の準備で忙しいんですが。"
41100-82 = "あぁ、あなたが「RABBIT小隊」のリーダーですか？"
41100-83 = "私たちは真の幸せを追求する都市の求道者、「所有せずとも確かな幸せを探す集い」……略して「所確幸」の――"
41100-87 = "……き、切られた？"
41100-88 = "[s] \"詐欺か何かだと思ったんだろうね……。\""
41100-89 = "こ、これだから真理を知らない凡人たちは……。"
41100-96 = "み、みなさん？どうやら「いたずら電話」か何かだと誤解されてるようですが……。"
41100-97 = "あなたたちの先生は捕らえました。こちらの要求に素直に応じなければ、今から先生に残酷な仕打ちを――"
41100-98 = "好きにすれば？"
41100-103 = "……また切れた！？"
41100-104 = "どういうことだ、あなたは本当に「先生」なのか！？これっぽっちも心配されてないじゃないか！？"
41100-105 = "[s] \"まあ、複雑な事情があって……。\""
41100-106 = "くそっ、せっかくシャーレの先生を人質にしたというのに……これでは高級弁当が……"
41100-107 = "こうなったら、他の方法を……。"
41100-108 = "[s] \"ちょっと試しに、私が電話をしても良い？\""
41100-109 = "あなたが直接交渉すると？"
41100-110 = "別に構いませんが、その振りをして警察に通報……などという小細工は止めた方が良いですよ。"
41100-111 = "私たち「所確幸」の武装は、ヴァルキューレを軽く凌駕していますからね！"
41100-112 = "[s] RABBIT小隊に電話をかける。"
41100-121 = "ああもう、何なの先生……こっちは夜遅くまで作業してて疲れてるってのに。"
41100-122 = "大した用事じゃないならもう――"
41100-123 = "[s] \"実は廃棄された和牛ステーキ弁当を見つけて……\""
41100-129 = "はははっ！"
41100-130 = "あれだけ自信満々だったのに、自分だって無視されているではないですか！"
41100-131 = "はぁ、こうなったらもう他の生徒を脅して……。"
41100-142 = "SRTだ！部外者はどけ！"
41100-144 = "サキ、私たちは今SRTの任務中ではないので、名乗らない方が……。"
41100-145 = "そ、それよりここに、本当に最高級の和牛が……？"
41100-146 = "和牛ステーキのお弁当なんて、SRTにいた頃にも食べたことなかった……。"
41100-148 = "うん、絶対にそう言ってた。間違いない。"
41100-149 = "逆探知の結果から推測するに、すぐその辺にいるはず！急いで！"
41100-150 = "[s] \"いやー、優秀だ……。\""
41100-152 = "あっ、先生……。"
41100-153 = "和牛ステーキ弁当はどこだ！？"
41100-154 = "迅速な収集は任務の基本。"
41100-155 = "賞味期限が切れているとしたらその旨味は刻一刻と減ってしまうため、今すぐに確保を……"
41100-156 = "と思ったのですが、お弁当はどこですか？"
41100-157 = "[s] \"えっと、それが……。\""
41100-159 = "はははっ！まんまと私たちの計画に騙されましたね！"
41100-160 = "欲望の果て、それはあたかも存在しない虚像のようなもの……"
41100-161 = "欲に負け、その虚像に魅せられた者たちは、いつしか破滅へと足を踏み入れる他ありません。"
41100-162 = "何言ってるか分からないけど……和牛ステーキ弁当は無いってことか？"
41100-163 = "勿論です。どうしてそんなものが廃棄されてると思ったのですか。"
41100-164 = "どうかこれをきっかけとして、「無所有」の素晴らしさに気づかれてはいかがでしょうか。"
41100-166 = "さあ、同志たちよ。彼女たちにそれを教えてあげましょう！"
41100-176 = "うわっ、何だこいつら！？服はボロボロなのに、武器だけやたら最新式で……！"
41100-177 = "ほ、包囲されちゃった……。"
41100-179 = "まずは落ち着きましょう。"
41100-180 = "基本は狭い所に誘導した上での各個撃破です、そうすればこの数でも……"
41100-181 = "まぁ、武器だけが良かったところで関係無い。"
41100-182 = "私たちSRTを舐めるな！"
41100-183 = "2階にいる狙撃手は、私の方で全部どうにか……。"
41100-184 = "ミヤコ、前方は私とミユでどうにかするから、後ろは頼む。それで良いか？"
41100-186 = "……はい、それで行きましょう。"
41100-187 = "閃光弾を使いますので、その合図で散開してください。"
41100-188 = "それでは……"
41100-190 = "作戦開始！"

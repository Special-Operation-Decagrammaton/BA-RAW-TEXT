[translation]
41100-1 = "第10話;無所有和燒肉便當"
41100-11 = "……哦，你醒了嗎。"
41100-17 = "身體如何？"
41100-19 = "沒問題那就再好不過了。我還在想要是因為招待不周而出什麼狀況該如何是好……#n畢竟我們也是第一次迎接奇普托斯外部的客人。"
41100-20 = "[s] 「……你是？」"
41100-21 = "抱歉介紹晚了，我的名字是笛卡爾。"
41100-22 = "是率領這個，「就算無[ruby=．]所[/ruby]有也要蒐集[ruby=．]確[/ruby]實的[ruby=．]幸[/ruby]福」……通稱「所確幸」組織的隊長。"
41100-23 = "[s1] 「？？？」\n[s2] 「所確幸……？」"
41100-24 = "是第一次聽說嗎？"
41100-25 = "是第一次聽說嗎？"
41100-26 = "若是追求過清貧人生的人，我想應該至少有聽過才對……原來如此。"
41100-27 = "不過我也猜到會不會是那樣。"
41100-28 = "畢竟你似乎派出部下試圖搶走食物。"
41100-29 = "[s] 「那個，什麼意思……？」"
41100-30 = "裝傻也沒用！我的夥伴們親眼看見，你和兔耳朵學生相處得很融洽！"
41100-31 = "[s3] 「你說兔耳朵……」\n[s4] 「是指RABBIT小隊的大家嗎？」"
41100-32 = "我對那些學生的稱呼並不是特別感興趣。"
41100-33 = "我對那些學生的稱呼並不是特別感興趣。"
41100-34 = "重點在於，你們妨礙了我們的求道，是群貪欲之人。"
41100-35 = "[s] 「我們有妨礙了什麼嗎……？」"
41100-36 = "……我們有時被這麼稱呼。"
41100-37 = "「飯桶」，或是「社會的腫瘤」……"
41100-38 = "但其實哪個都不對。我們並不是無所事事……"
41100-39 = "只是在實踐「無所有」而已！"
41100-40 = "[s] 「我不懂你想說什麼……」"
41100-41 = "奇普托斯的人們，擁有太多東西了。"
41100-42 = "新型戰車、高價手槍、抵禦導彈的堡壘等等……"
41100-43 = "然而這些慾望卻沒有被滿足。想要更好、想爬更高……那些想法最終只會讓人生疲憊而已。"
41100-44 = "真正的幸福不是「擁有」，而是由「無所有」產生的……"
41100-45 = "放下生存所需最低限度以外的一切，維持自然無為的存在方式……這才能抵達真正的幸福。"
41100-46 = "所以我們不工作，實踐了不擁有的「無所有」生活。"
41100-50 = "然後某一天，這裡來了不速之客。"
41100-51 = "戴著兔耳朵，拿著高價武裝的那些學生，接二連三搶走廢棄便當。"
41100-52 = "她們經過的地方寸草不生……連豆芽菜便當都不留下。"
41100-53 = "明明「燒肉便當」這類的東西本來就很少成為廢棄品了……#n她們卻連這些都想獨佔……！"
41100-54 = "這種沒有常理的行為，豈能被原諒！？"
41100-55 = "[s] 「那個，原本不是在談論『對奢侈品沒興趣』嗎……？」"
41100-56 = "雖，雖然是那樣沒錯……"
41100-57 = "總之！不管她們是RABBIT小隊還是兔子小隊，我們都不能原諒這種暴行！"
41100-58 = "而我們認為你是她們的隊長……因此請和我做約定吧。"
41100-59 = "今後「燒肉便當」被廢棄的話，必須讓給我們「所確幸」！"
41100-60 = "[s5] 「那些孩子不是我的部下哦。」\n[s6] 「那些孩子只是我的學生。」"
41100-61 = "不管是部下還是學生都無所謂。#n他們會聽你說的話對吧？"
41100-62 = "不管是部下還是學生都無所謂。#n他們會聽你說的話對吧？"
41100-63 = "……那是什麼微妙的表情。明明是老師，卻連自己的學生都約束不了嗎？"
41100-64 = "真是沒辦法呢……"
41100-68 = "這樣的話請把手機給我，在那裡老實待著。由我來交涉。"
41100-69 = "[s] 「我想應該沒用……」"
41100-73 = "我來看看……"
41100-74 = "是這個嗎。"
41100-81 = "……有什麼事嗎？我們正忙著準備用餐。"
41100-82 = "啊啊，你就是「RABBIT小隊」的隊長嗎？"
41100-83 = "我們是追求真正幸福的都市求道者，「就算無所有也要蒐集確實的幸福」……#n簡稱「所確幸」的──"
41100-87 = "……被，被掛斷了？"
41100-88 = "[s] 「應該認為是詐欺還是什麼的吧……」"
41100-89 = "所，所以才說這些不懂真理的凡人……"
41100-96 = "各，各位？你們似乎誤以為這是「騷擾電話」之類的了……"
41100-97 = "我抓住了你們的老師。#n不老實答應我們的要求的話，老師馬上就會受到殘酷的對待──"
41100-98 = "隨你高興啊？"
41100-103 = "……又掛斷了！？"
41100-104 = "怎麼回事啊，你真的是「老師」嗎！？絲毫都不擔心你耶！？"
41100-105 = "[s] 「嘛，有複雜的原因……」"
41100-106 = "可惡，好不容易將夏萊的老師當作人質……這樣高級便當就……"
41100-107 = "這樣只能用其他方法……"
41100-108 = "[s] 「可以試著換我打電話嗎？」"
41100-109 = "由你直接交涉？"
41100-110 = "可以是可以……但勸你不要耍小心機，趁機向警察通報比較好唷。"
41100-111 = "因為我們「所確幸」的武裝，能輕鬆凌駕女武神呢！"
41100-112 = "[s] 撥電話給RABBIT小隊"
41100-121 = "啊啊真是，老師是怎樣啊……這邊作業到深夜很累的說。"
41100-122 = "不是重要的事就──"
41100-123 = "[s] 「其實我找到了被廢棄的和牛牛排便當……」"
41100-129 = "哈哈哈！"
41100-130 = "明明那麼自信滿滿，自己不也被無視了嗎！"
41100-131 = "哈啊，這樣的話只能威脅其他學生……"
41100-142 = "我們是SRT！閒雜人等讓開！"
41100-144 = "咲希，我們現在並不是在進行SRT的任務，還是不要報上名號比較好……"
41100-145 = "比，比起那個，這裡真的有最高級的和牛……？"
41100-146 = "和牛牛排便當什麼的，在SRT的時候也沒吃過……"
41100-148 = "嗯，老師絕對是那麼說的。不會有錯。"
41100-149 = "根據反偵測的結果來推測，應該就在那附近！快點！"
41100-150 = "[s] 「哎呀～真是優秀呢……」"
41100-152 = "啊，老師……"
41100-153 = "和牛牛排便當在哪裡！？"
41100-154 = "迅速收集是任務的基本。"
41100-155 = "賞味期限到期之後，美味程度每分每秒都會減少，必須馬上確保……"
41100-156 = "所以說便當在哪裡？"
41100-157 = "[s] 「這個，那個嘛……」"
41100-159 = "哈哈哈！徹底被我們的計劃騙了呢！"
41100-160 = "慾望的盡頭，就是個海市蜃樓般的幻覺……"
41100-161 = "輸給慾望被幻覺魅惑的人，總有一天只會踏入毀滅。"
41100-162 = "雖然不知道在說什麼……反正沒有和牛牛排便當嗎？"
41100-163 = "當然。怎麼會認為那樣的東西會被廢棄呢。"
41100-164 = "請以此為契機，察覺到「無所有」的美好吧。"
41100-166 = "來吧，同志們。來教教她們吧！"
41100-176 = "嗚哇，這些傢伙是怎樣！？明明衣服破破爛爛的，只有武器是最新型……！"
41100-177 = "被，被包圍了……"
41100-179 = "先冷靜下來吧。"
41100-180 = "基本上只要引誘到狹窄的地方一一擊破，這些數量也不是問題……"
41100-181 = "嘛，和只有武器好沒關係。"
41100-182 = "別小看我們SRT了！"
41100-183 = "2樓的狙擊手，我會全部想辦法解決……"
41100-184 = "都子，前方我和美優會想辦法處理，後方就拜託你了。這樣可以嗎？"
41100-186 = "……好的，那麼上吧。"
41100-187 = "我會使用閃光彈，請以那個為信號散開。"
41100-188 = "那麼……"
41100-190 = "作戰開始！"

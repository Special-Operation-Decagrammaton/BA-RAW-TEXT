[translation]
1012802-1 = "เศษซากและจินตนาการ"
1012802-2 = "(วันต่อมา หลังเสร็จจากการทำงานนอกสถานที่ คุณครูก็เดินทางกลับชาเล่ต์)"
1012802-9 = "[ns] \"หืม?!\""
1012802-11 = "[ns] \"เกิดเรื่องอะไรขึ้นน่ะ?!\""
1012802-13 = "โอ้โห... เป็นฉากจบที่น่าประทับใจมาก"
1012802-14 = "ลึกซึ้งมากเลย นี่สินะการถ่ายทอดสิ่งที่ไม่อาจแสดงออกด้วยคำพูดผ่านการกระทำ..."
1012802-15 = "แต่ทำไมถึงกับต้องเล่นใหญ่ขนาดนั้นด้วยนะ?"
1012802-16 = "แบบนั้นเรียกว่าศิลปะการแสดงไง ศิลปะการแสดง"
1012802-18 = "[ns] \"ศิลปะการแสดง...?\""
1012802-20 = "(สิ่งที่คุณครูได้เห็นก็คือ...)"
1012802-21 = "(โทรทัศน์ จอมอนิเตอร์ วิทยุ และกล้องถ่ายรูปพังๆ กระจัดกระจายอยู่ทั่วบริเวณ)"
1012802-22 = "(และที่ใจกลางเศษซากตรงนั้นก็คือ...)"
1012802-24 = "โอ๊ะ ใครเนี่ย! คุณครูไม่ใช่เหรอคะ!"
1012802-25 = "[s] \"ฟุยุ นี่มันอะไรกัน...?\""
1012802-26 = "อ้อ หมายถึงกองเศษซากนี้น่ะเหรอคะ?"
1012802-27 = "ถ้าจะอธิบายให้เข้าใจง่ายๆ ละก็ มันคือ..."
1012802-28 = "ประติมากรรมที่หยุดนิ่ง ระบำ บทเพลง หรือถ้อยคำ..."
1012802-29 = "มันคือการต่อสู้ทางศิลปะเพื่อแสดงออกถึงความลับบางอย่าง..."
1012802-30 = "ที่ไม่อาจนิยามได้ด้วยการกระทำเพียงอย่างใดอย่างหนึ่งค่ะ..."
1012802-31 = "[s] \"นี่อธิบายให้เข้าใจง่ายๆ แล้วใช่มั้ย...?\""
1012802-32 = "ถ้าจะให้สรุปให้กระชับกว่านี้ นี่คือการจัดแสดงศิลปะแบบมีเดียอาร์ตค่ะ"
1012802-33 = "[s] \"ก็บอกอย่างนี้ตั้งแต่แรกสิ...!\""
1012802-37 = "[ns] \"อ้อ ที่เมื่อวานบอกไว้ว่าจะออกไปข้างนอก...\""
1012802-38 = "ใช่ค่ะ ฉันได้รับอนุญาตให้ออกไปข้างนอกเพื่อการจัดแสดงผลงานครั้งนี้ค่ะ"
1012802-39 = "แน่นอนว่าฉันแอบพ่วง 'งานเสริม' เล็กๆ น้อยๆ ไว้ด้วย..."
1012802-40 = "อย่างที่คุณครูเห็นว่าศิลปะที่ฉันสนใจเป็นแขนงที่ต้องใช้เงินค่อนข้างสูง"
1012802-41 = "ทั้งยังต้องใช้อุปกรณ์อิเล็กทรอนิกส์จำนวนมาก แล้วก็ต้องมีอุปกรณ์สำหรับดัดแปลงของพวกนี้ด้วย..."
1012802-42 = "[s] \"ก็เลยมาทำชมรมการค้าพิเศษสินะ\""
1012802-43 = "จะว่าอย่างนั้นก็ได้ค่ะ แต่นั่นก็ไม่ใช่เหตุผลทั้งหมดหรอกนะคะ..."
1012802-44 = "เอาเถอะค่ะ แต่ยังไงก็น่าเสียดายนะคะ ก็คุณครูมาถึงตอนจะจบการแสดงพอดีน่ะสิ"
1012802-45 = "การแสดงครั้งนี้ฉันทุ่มเททั้งพลังกายและพลังใจเลยนะคะ"
1012802-46 = "คะ? เป็นการแสดงแบบไหนน่ะเหรอคะ?"
1012802-47 = "ฮุฮุ ถ้าเฉลยก็หมดสนุกน่ะสิคะ"
1012802-48 = "มันเป็นการแสดงเพื่อสื่อถึงบางอย่างที่ยากจะถ่ายทอดออกมาเป็นคำพูด..."
1012802-49 = "ถ้าอธิบายด้วยคำพูดทั้งหมดตั้งแต่แรก มันก็น่าจะไม่สนุกและไม่เปิดโอกาสให้ตีความน่ะค่ะ"
1012802-50 = "[s] \"งั้นเหรอ...?\""
1012802-51 = "งั้นคุณครูลองจินตนาการดูแทนมั้ยคะ?"
1012802-52 = "นึกถึงตำแหน่งและรูปร่างของเศษซากแต่ละชิ้นที่กระจัดกระจายอยู่บนพื้น บรรยากาศและปฏิกิริยา#nของผู้ชมหลังจบการแสดง..."
1012802-53 = "รวบรวมเบาะแสเหล่านี้เข้าด้วยกันแล้วจินตนาการถึงการแสดงของฉันดูสิคะ"
1012802-54 = "บางทีอาจค้นพบศิลปะแขนงใหม่ๆ ก็ได้นะคะ"
1012802-55 = "[s] \"ศิลปะ... เป็นอะไรที่ไม่ง่ายเลยนะ...\""
1012802-56 = "แต่ถึงอย่างนั้น ข้อดีที่สุดของงานศิลปะนี้..."
1012802-57 = "ก็คือคุณครูจะได้ชมจากเก้าอี้แถวหน้าสุดเลยค่ะ ฮุฮุ"
1012802-58 = "หรือจะขึ้นมาแสดงกับฉันบนเวทีเลย...?"
1012802-59 = "[s] \"ไว้ครั้งหน้าครูต้องมาชมให้ได้เลย!\""
1012802-60 = "ฮ่าฮ่า! มุ่งมั่นดีจังเลยนะคะ!"
1012802-61 = "แต่ก็นะ ครั้งนี้ไม่เป็นไรหรอกค่ะ เพราะสิ่งที่สำคัญก็คือ..."
1012802-62 = "เราจะได้เจอกันใหม่ในครั้งหน้ายังไงล่ะคะ"
1012802-63 = "เอาละ! งั้นวันนี้ฉันต้องขอตัวก่อนค่ะ!"
1012802-64 = "ฉันต้องไปเก็บกวาดเศษซากที่เหลือ คุณครูกลับก่อนได้เลยค่ะ!"
1012802-65 = "คะ...? คุณครูก็จะช่วยเก็บกวาดด้วยกันเหรอคะ...?"
1012802-66 = "ไม่ต้องช่วยฉันถึงขนาดนั้นก็ได้..."
1012802-67 = "[s1] \"ระหว่างเก็บกวาด ครูจะจินตนาการการแสดงไปด้วยน่ะ\"\n[s2] \"ระหว่างนี้ครูจะตีความไปด้วยว่าศิลปินอยากสื่ออะไร\""
1012802-70 = "คุณครู..."
1012802-71 = "[s] \"นะ... นี่ไม่ใช่การช่วยเฉยๆ หรอกนะ!\""
1012802-72 = "ฮะฮ่า!"
1012802-73 = "ค่ะ งั้นก็มาเก็บกวาดด้วยกันเลยค่ะ..."
1012802-74 = "ขอบคุณนะคะ คุณครู"
1012802-76 = "(หลังจากนั้นคุณครูก็ช่วยฟุยุเก็บกวาดเศษสิ่งต่างๆ ในพื้นที่การแสดง)"

[translation]
1012802-1 = "Remnants and Imagination"
1012802-2 = "The next day, I returned to Schale after a business trip."
1012802-9 = "[ns] \"Hm?!\""
1012802-11 = "[ns] \"What's happening?!\""
1012802-13 = "Huh... What a fascinating finale."
1012802-14 = "It's quite profound. She has such a way of communicating so much without words."
1012802-15 = "I don't get it. Why is this happening? Are we under attack?"
1012802-16 = "It's performance art! It's cultured!"
1012802-18 = "[ns] \"Performance art...?\""
1012802-20 = "And, as I approached..."
1012802-21 = "...I found broken televisions, monitors, radios, and cameras strewn about."
1012802-22 = "At the center of the clutter was..."
1012802-24 = "Oh, look who it is! Good to see you, Sensei!"
1012802-25 = "[s] \"Fuyu, what is this mess?\""
1012802-26 = "A mess...or a curated wreckage?"
1012802-27 = "To put it simply..."
1012802-28 = "Suspending objects, dancing, poetry, music..."
1012802-29 = "...are all art in their own ways. Yet they resist simple definition."
1012802-30 = "So, I was exploring the ambiguity and embodiment of the personal with the political, the body with the machine..."
1012802-31 = "[s] \"...Can you say that a little more plainly?\""
1012802-32 = "It's media art, Sensei. It's a performance, and we're all part of it."
1012802-33 = "[s] \"You could have started with that...!\""
1012802-37 = "[ns] \"So, that means when you said you were going out, it was for...\""
1012802-38 = "Yes. I was granted an outing pass for this performance."
1012802-39 = "...Of course, I'm synergizing and multi-tasking with a \"side job\" too."
1012802-40 = "In case you can't tell, making art like this is expensive. I can't be like Miyo and just type in some dark corner."
1012802-41 = "I need a constant revenue stream to enable me to procure electronics, tools, things of that nature..."
1012802-42 = "[s] \"So that's why you're in the Free Trade Cartel.\""
1012802-43 = "The money helps, but I have other reasons."
1012802-44 = "Anyway, what a shame. You came right as I ended. You missed all the storytelling, the struggle!"
1012802-45 = "I put a lot of thought into this. You wouldn't believe how much planning it takes."
1012802-46 = "Hm? What was this performance about?"
1012802-47 = "Fufu, it'd be no fun to just TELL you."
1012802-48 = "Performance is about SHOWING, about expressing something that can't be told with mere words."
1012802-49 = "And if I told you what it meant, it would diminish the experience."
1012802-50 = "[s] \"I suppose...?\""
1012802-51 = "I have an idea. Try imagining it."
1012802-52 = "Look at the wreckage. Every item is in a position—thoughtfully placed, or a random occurrence? Imagine how the audience felt after, the sudden silence, the clearing of smoke..."
1012802-53 = "Put all that together and imagine what my performance was about."
1012802-54 = "You might just discover something about yourself, Sensei!"
1012802-55 = "[s] \"The world of art sure isn't simple...\""
1012802-56 = "Well, that said, it would have been best if you..."
1012802-57 = "...could have watched from the front row. Fufu."
1012802-58 = "Or, better yet, you can join me on stage next time."
1012802-59 = "[s] \"I'll make sure to come watch next time!\""
1012802-60 = "Haha! I got it! I won't push."
1012802-61 = "I respect your preference. But I heard what I wanted..."
1012802-62 = "...That you'll be here next time."
1012802-63 = "You promised! That said, I think I better get moving."
1012802-64 = "I need to sweep up and pack, so you should head back to work, Sensei!"
1012802-65 = "...What's that? You want to help with the cleanup?"
1012802-66 = "You REALLY don't have to... That's not what I was implying."
1012802-67 = "[s1] \"I'll use my imagination as I pick up each piece.\"\n[s2] \"It could give me insight about the performer's artistic intentions.\""
1012802-70 = "Sensei..."
1012802-71 = "[s] \"S-So it's not like I-I'm trying to help you or anything!\""
1012802-72 = "Pfft! Ha!"
1012802-73 = "...Very well. Let's clean up together."
1012802-74 = "Thank you, Sensei."
1012802-76 = "I cleaned up the performance site with Fuyu."

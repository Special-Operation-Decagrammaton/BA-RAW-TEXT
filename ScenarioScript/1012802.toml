[translation]
1012802-1 = "殘骸與想像力"
1012802-2 = "（隔天，結束外勤後返回夏萊的路上）"
1012802-9 = "[ns]「咦！？」"
1012802-11 = "[ns]「這是怎麼回事！？」"
1012802-13 = "哦哦……藉由這樣的方式來詮釋結局啊……"
1012802-14 = "相當深奧呢。#n打算以行為來重現語言無法表達的彼岸嗎……"
1012802-15 = "不過為什麼要做那種事呢？"
1012802-16 = "那就是所謂的行為藝術啦，行為藝術。"
1012802-18 = "[ns]「行為藝術……？」"
1012802-20 = "（靠近現場後，映入眼簾的是……）"
1012802-21 = "（破碎的電視、螢幕、收音機和攝影機散落一地）"
1012802-22 = "（而在那些殘骸的中央……）"
1012802-24 = "哦，這不是老師嗎！"
1012802-25 = "[s]「冬，這到底是……？」"
1012802-26 = "啊，是指這些殘骸嗎？"
1012802-27 = "要簡單說明的話……"
1012802-28 = "就是靜止的物件，或者舞蹈、歌唱、演說……"
1012802-29 = "僅憑這些單獨的行為無法規定的……"
1012802-30 = "為了體現某種祕儀而掙扎的藝術表現……可以這麼說吧。"
1012802-31 = "[s]「……這能算是簡單說明嗎？」"
1012802-32 = "說得更簡單一點，就是媒體藝術的行為藝術表演啦。"
1012802-33 = "[s]「一開始就這麼說嘛……！」"
1012802-37 = "[ns]「啊，所以你昨天說要外出是……」"
1012802-38 = "是的。我以這場公演為由，取得了外出許可。"
1012802-39 = "……當然除此之外，也打算處理一些小小的「副業」就是了。"
1012802-40 = "如你所見，我所追求的藝術可是相當花錢的呢。"
1012802-41 = "不只需要很多電子設備，還需要加以改造的器材……"
1012802-42 = "[s] 「所以你才會參加特殊交易部的活動啊。」"
1012802-43 = "可以這麼說吧。#n雖然那並不是唯一的理由就是了……"
1012802-44 = "不過居然剛好在公演結束的時候抵達，實在很可惜。"
1012802-45 = "這次的公演，可是我傾注心血策劃的作品呢。"
1012802-46 = "咦？問我是什麼樣的公演？"
1012802-47 = "呵呵，要是說出來就沒意思了吧。"
1012802-48 = "畢竟這是場「為了表達某種難以用言語傳達的東西」而舉辦的公演……"
1012802-49 = "要是用言語解釋，不就太掃興了嗎？"
1012802-50 = "[s] 「是嗎……？」"
1012802-51 = "對了，要不要來發揮一下想像力呢？"
1012802-52 = "現在散落在地板上的所有殘骸的位置與形狀，以及公演結束後觀眾的反應與氣氛……"
1012802-53 = "將這些線索拼湊起來，嘗試想像我剛才的公演。"
1012802-54 = "說不定能從中開拓出新的藝術視野哦？"
1012802-55 = "[s] 「藝術真不容易啊……」"
1012802-56 = "不過話又說回來，最棒的情況……"
1012802-57 = "果然還是坐在最前排親自觀賞吧。呵呵。"
1012802-58 = "或者和我一起在舞台上進行表演也不錯……"
1012802-59 = "[s] 「下次我一定會準時來看的！」"
1012802-60 = "哈哈！真果斷呢！"
1012802-61 = "嗯，這樣也好。畢竟重要的是……"
1012802-62 = "下次還能再見面這件事嘛。"
1012802-63 = "好！那麼今天就先說到這裡吧！"
1012802-64 = "我把殘骸清理掉再離開，老師可以先回去沒關係！"
1012802-65 = "……嗯？老師也要一起清理嗎？"
1012802-66 = "其實不必幫忙到這種程度的……"
1012802-67 = "[s1]「我想一邊清理殘骸，一邊試著想像看看。」\n[s2]「透過這場公演，作者想要傳達的會什麼。」"
1012802-70 = "老師……"
1012802-71 = "[s]「所，所以我可不是為了幫忙才做的哦！」"
1012802-72 = "噗哈哈！"
1012802-73 = "……好，那就一起清理吧。"
1012802-74 = "謝謝你，老師。"
1012802-76 = "（之後和冬一起清理了公演現場的殘骸）"

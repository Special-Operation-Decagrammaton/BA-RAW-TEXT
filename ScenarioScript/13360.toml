13360-82 = "..."
13360-86 = "...Hoshino."
13360-87 = "She must be..."
13360-92 = "Yes. The Terror hasn't completely gripped Hoshino, not yet."
13360-93 = "Barely, just barely...that notebook is halting the manifestation."
13360-94 = "[s3] \"That means this is our last chance.\"\n[s4] \"We need Hoshino to hear our words!\""
13360-97 = "..."
13360-102 = "—!!"
13360-103 = "Sh-She's moving again...!"
13360-105 = "...Situation analyzed. "
13360-106 = "Plana...?"
13360-107 = "Solution established. "
13360-112 = "I've identified a possible method to contact Hoshino before the complete reversal of her Mystic."
13360-113 = "H-How?! "
13360-114 = "Overclocking. Utilizing the Shittim Chest's power, we will create a pseudo-Throne of Naram-Sin."
13360-115 = "H-Huh? The Shittim Chest doesn't have that kind of power! We can't do it without the Ark!"
13360-116 = "...I have completed my analysis of the Underground Dweller's abilities."
13360-118 = "A chaotic realm where dimensions, time, existence, and non-existence are mixed together, without ever settling... If we were to construct something similar..."
13360-119 = "It would be brief, but we could establish a point of contact with Hoshino."
13360-120 = "B-But...that's too dangerous..."
13360-121 = "Yes. It is. That is why I will return 99% of computational resources to you."
13360-122 = "I will then enter a state of disconnected consciousness."

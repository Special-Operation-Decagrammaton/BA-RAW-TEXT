13360-124 = "Yes. That near-death state will allow me to dive into the depths of the Shittim Chest and construct a virtual chaotic realm."
13360-125 = "B-But...Plana...if you don't make it back..."
13360-126 = "I am aware. This aspect must be kept secret from Sensei."
13360-127 = "Although..."

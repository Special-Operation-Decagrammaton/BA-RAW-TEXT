13360-132 = "Yes. I am a bit...afraid."
13360-138 = "Yes! Yes! Forever! I'll hold your hand, forever and forever! I won't let go!"
13360-139 = "Thank you. Arona..."
13360-142 = "[ns] Listen to Arona's explanation."
13360-146 = "[ns] Relay the details to everyone else."
13360-147 = "Sensei...has to somehow make physical contact with Hoshino..."
13360-148 = "Yeah. Specifically, Sensei's Shittim Chest needs to make contact with that notebook..."
13360-149 = "U-Uh... We're gonna have to get really close to make that happen. "
13360-150 = "We'll need to incapacitate Hoshino, for there to be any hope of this working."
13360-151 = "...Understood. Stop Hoshino, then establish connection with the notebook. Got it."

[translation]
13360-1 = "第36話;手冊"
13360-6 = "有，有效果嗎……？"
13360-7 = "嗯！前輩停止動作了！！"
13360-8 = "那團閃電球也慢慢消失了！！"
13360-9 = "我們成功了？能救回星野前輩了嗎？"
13360-13 = "嗯……！！只要繼續這樣下去……"
13360-14 = "不，那是不可能的。"
13360-18 = "不，不可能指的是……？"
13360-19 = "被反轉為恐怖的星野前輩無法恢復以前的模樣。#n就像不可能讓死者重生一樣。"
13360-20 = "就像現在的我一樣。"
13360-21 = "可，可是……你的意思是前輩他……？"
13360-22 = "嗯，我是來救你們的。"
13360-27 = "必須破壞星野前輩的光環。"
13360-28 = "什麼！？"
13360-29 = "不這麼做的話，被星野前輩喚來的「那個」將會顯現，最終導致這個世界走向滅亡。"
13360-30 = "可是……前輩他……"
13360-31 = "……這是前輩期望看見的結果。#n他以前不是也這樣拜託過我們嗎？"
13360-36 = "……雖然跟我所知的記憶有些不同，但這就是砂狼白子的命運。"
13360-37 = "你心裡其實也不想那麼做的，不是嗎？"
13360-38 = "……"
13360-45 = "[ns]「幫幫我們，白子。真的沒有辦法了嗎？」"
13360-46 = "辦法……"
13360-47 = "辦法啊……#n雖然我經歷了無數次失敗……"
13360-51 = "等等，有件事和之前不太一樣……"
13360-52 = "星野前輩胸前的那個……"
13360-56 = "我第一次看見。#n那是……尚未顯現……還不具備型態的……？"
13360-57 = "那是……"
13360-58 = "那個樣子……"
13360-59 = "它的形狀……看起來是不是有點像一本手冊？"
13360-60 = "……！！"
13360-64 = "[ns]「難道是……夢的手冊？」"
13360-69 = "我…………"
13360-70 = "前輩的手冊……究竟……"
13360-71 = "前輩……"
13360-79 = "[ns1]「星野他依然在這片沙漠中徘徊。」\n[ns2]「為了找到夢的手冊。」"
13360-82 = "……"
13360-86 = "……星野前輩。"
13360-87 = "沒錯……"
13360-92 = "星野前輩還沒有完全反轉為「恐怖」。"
13360-93 = "雖然力量微弱，但那本手冊……或許正在阻止某種東西的顯現……"
13360-94 = "[s3]「所以現在就是最後的機會。」\n[s4]「我們必須把星野需要的東西送去給他。」"
13360-97 = "…………………………………………"
13360-102 = "──────────！！！"
13360-103 = "又，又開始動起來了……！！"
13360-105 = "……確認狀況。"
13360-106 = "星奈……？"
13360-107 = "尋找方法。"
13360-112 = "在星野同學的「神祕」完全反轉之前，應該有方法可以接近他。"
13360-113 = "該，該怎麼做？"
13360-114 = "……是超頻，彩奈前輩。#n我會藉由「希迪姆的箱子」的力量，創造出類似「納拉姆辛的王座」的區域。"
13360-115 = "咦！？你，你打算怎麼做……！？#n那不是要有「方舟」才辦得到嗎！光靠「希迪姆的箱子」的力量……"
13360-116 = "……我之前分析過「地下生活者」的能力。"
13360-118 = "次元與次元、時間與時間、存在與不存在……一切都相互混雜的混沌區域。#n只要能製造出類似的空間……"
13360-119 = "也許我們就能將聲音傳達給星野同學。"
13360-120 = "可，可是……那樣不是很危險嗎……"
13360-121 = "同意。所以從現在起，我會把99%的運算資源分配給前輩。"
13360-122 = "同時進入假死狀態。"
13360-123 = "假，假死狀態……？"
13360-124 = "是的。#n我要以這個狀態潛入「希迪姆的箱子」的水面之下，並在那裡構築虛擬的混沌區域。"
13360-125 = "可，可是……要是你回不來的話……"
13360-126 = "同意。因此這件事必須向老師保密。"
13360-127 = "可是……"
13360-128 = "我立刻開始進行，前輩。#n不過在那之前，我還有一個請求。"
13360-129 = "嗯，星奈醬！是什麼請求？"
13360-130 = "可以……握住我的手嗎……"
13360-131 = "手……？"
13360-132 = "是的。我有點……害怕……"
13360-138 = "……當然沒問題！！我會一直一直握住你的手！絕對不會放開的！"
13360-139 = "謝謝你，彩奈……前輩。"
13360-142 = "[ns] 請彩奈說明方法"
13360-146 = "[ns] 將方法告訴大家"
13360-147 = "也就是說……老師必須接觸星野前輩的身體……"
13360-148 = "嗯。準確來說，是老師的「希迪姆的箱子」要接觸到那本手冊……"
13360-149 = "唔……那不就得靠得很近才行嗎……"
13360-150 = "所以我們必須先制服星野前輩才行。"
13360-151 = "……知道了。#n我們會壓制星野前輩，設法接近那本手冊。"
13360-153 = "老師，把我也納入指揮吧。"
13360-154 = "光靠我們幾個……辦得到嗎……"
13360-155 = "……我也來幫忙。"
13360-159 = "[ns]「陽奈！！你身體還好嗎！？繼續亂動的話……」"
13360-160 = "這點小傷不算什麼。目前的狀況我都明白了。#n現在時間緊迫，趕緊動手吧。我也會盡一份力的。"
13360-161 = "……"
13360-162 = "另一個砂狼白子，你上次欠了老師一個人情對吧？#n有什麼問題嗎？"
13360-163 = "……沒有。"
13360-164 = "我們得抓緊時間！！那團閃電又開始膨脹了！"
13360-165 = "嗯，這是最後的機會。我們上吧。"

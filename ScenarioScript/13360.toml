13360-51 = "Wait. Something is different."
13360-52 = "On Hoshino's chest..."
13360-56 = "I have never experienced this kind of deviation... Something is there, but...without tangible form... It has yet to manifest."
13360-57 = "That's..."
13360-58 = "Oh... That's..."
13360-59 = "Doesn't it...kind of look like a notebook?"
13360-60 = "Ah!"
13360-64 = "[ns] \"It's...Yume's notebook.\""
13360-69 = "I..."
13360-70 = "Yume's notebook... Where..."
13360-71 = "...Yume..."

[translation]
13360-1 = "ตอนที่ 36;สมุดโน้ต"
13360-6 = "ดะ... ได้ผลเหรอคะ...?"
13360-7 = "ใช่! รุ่นพี่นิ่งไปแล้ว!!"
13360-8 = "สายฟ้านั่นก็กำลังหายไปค่ะ!!"
13360-9 = "เราทำสำเร็จใช่มั้ย? ถ้างั้นเราจะได้รุ่นพี่โฮชิโนะกลับมาใช่มั้ย?"
13360-13 = "อื้อ...!! ถ้าเป็นแบบนี้ต่อไปละก็..."
13360-14 = "ไม่หรอก มันเป็นไปไม่ได้"
13360-18 = "ปะ... เป็นไปไม่ได้งั้นเหรอคะ...?"
13360-19 = "รุ่นพี่โฮชิโนะที่เปลี่ยนไปเป็นความน่าสะพรึงกลัวอย่างสิ้นเชิงไม่มีทางกลับมาเป็นเหมือนเดิมได้หรอก ก็เหมือนกับที่เราฟื้นคืนชีพคนตายไม่ได้นั่นละ เรื่องแบบนั้นเป็นไปไม่ได้อยู่แล้ว"
13360-20 = "ก็เหมือนกับฉันนั่นละ"
13360-21 = "ตะ... แต่ว่า... ถ้าอย่างนั้นก็แปลว่า... คุณมา...?"
13360-22 = "ใช่ ฉันมาที่นี่เพื่อช่วยพวกเธอ"
13360-27 = "แล้วฉันก็จะทำลายฮาโลของรุ่นพี่โฮชิโนะ"
13360-28 = "ว่าไงนะ?!"
13360-29 = "ถ้าไม่ทำอย่างนั้น <สิ่งนั้น> ที่เกิดขึ้นโดยการดึงดูดของรุ่นพี่โฮชิโนะก็จะเผยตัวขึ้นอีก และนั่นอาจจะนำมาสู่การล่มสลายของโลกก็ได้"
13360-30 = "แต่ว่า... แบบนั้นมัน..."
13360-31 = "นั่นเป็นสิ่งที่รุ่นพี่ต้องการน่ะ... รุ่นพี่ก็เคยขอร้องพวกเราแบบนั้นแล้วไม่ใช่เหรอ?"
13360-36 = "ถึงมันจะต่างกับที่ฉันรู้อยู่... แต่สุดท้ายแล้วนี่ก็คืออนาคตที่ถูกลิขิตไว้แล้วของสึนาโอกามิ ชิโรโกะ"
13360-37 = "แต่ที่จริงแล้วไม่ได้ต้องการให้เป็นอย่างนั้นไม่ใช่เหรอ? "
13360-38 = "..."
13360-45 = "[ns] \"ช่วยครูหน่อยนะ ชิโรโกะ ไม่มีวิธีเลยเหรอ?\""
13360-46 = "วิธีงั้นเหรอ..."
13360-47 = "วิธีที่จะช่วย... แม้ที่ผ่านมาฉันจะล้มเหลวซ้ำแล้วซ้ำเล่า... แต่วิธีที่จะช่วย..."
13360-51 = "เดี๋ยวก่อน มีบางอย่างที่ต่างออกไป..."
13360-52 = "สิ่งนั้นที่อยู่บนหน้าอกของรุ่นพี่โฮชิโนะ..."
13360-56 = "ฉันไม่เคยเห็นมันมาก่อนเลย นั่นมัน... บางอย่างที่ปรากฏตัวไม่ได้...? สิ่งที่ไม่มีรูปร่าง..."
13360-57 = "นั่นมัน..."
13360-58 = "อ่า... นั่นมัน..."
13360-59 = "นั่นมัน... เหมือนกับสมุดโน้ตเลย..."
13360-60 = "...!!"
13360-64 = "[ns] \"สมุดโน้ตของยูเมะ... งั้นเหรอ\""
13360-69 = "ฉัน..."
13360-70 = "ทำไม... สมุดโน้ตของรุ่นพี่ถึง..."
13360-71 = "รุ่นพี่..."
13360-79 = "[ns1] \"โฮชิโนะยังเตร็ดเตร่อยู่ในทะเลทรายอะบิดอส\"\n[ns2] \"โฮชิโนะยังตามหาสมุดโน้ตอยู่ในทะเลทราย\""
13360-82 = "..."
13360-86 = "รุ่นพี่โฮชิโนะ..."
13360-87 = "นั่นสินะคะ..."
13360-92 = "ใช่ รุ่นพี่โฮชิโนะยังไม่ได้เปลี่ยนเป็นร่าง <เทอเรอร์> โดยสิ้นเชิง"
13360-93 = "ถึงจะแค่เพียงเล็กน้อยก็ตาม... แต่บางทีสมุดโน้ตนั่น... อาจจะกำลังขัดขวางไม่ให้มีการเผยตัวก็ได้..."
13360-94 = "[s3] \"งั้นนี่ก็เป็นโอกาสสุดท้ายที่จะบอกโฮชิโนะแล้ว\"\n[s4] \"เราต้องบอกในสิ่งที่ต้องบอกกับโฮชิโนะ\""
13360-97 = "...................................."
13360-102 = "--------------------------------!!!"
13360-103 = "ระ... เริ่มเคลื่อนไหวอีกครั้งแล้ว...!!"
13360-105 = "ตรวจสอบสถานการณ์... "
13360-106 = "พลาน่าจัง...?"
13360-107 = "หาวิธี... "
13360-112 = "น่าจะมีวิธีติดต่อก่อนที่ <ความลึกลับ> ของคุณโฮชิโนะจะสลับเปลี่ยนโดยสมบูรณ์ค่ะ"
13360-113 = "ยะ... ยังไงเหรอคะ? "
13360-114 = "โอเวอร์คล็อกค่ะ รุ่นพี่อะโรน่า... เราจะใช้พลังของ <กล่องแห่งซิสดิม> ในการสร้าง <บัลลังก์แห่งนารัมชิน> ที่คล้ายคลึงกันขึ้นมาค่ะ"
13360-115 = "คะ?! จะ... จะทำได้ยังไงคะ...?! ต้องมี <เรือ> ถึงจะทำได้ไม่ใช่เหรอคะ? ลำพังแค่พลังจากกล่องแห่งซิสดิมน่ะ..."
13360-116 = "เมื่อกี้ฉันได้ลองวิเคราะห์ความสามารถของ <ผู้อาศัยอยู่ใต้พิภพ> ดูค่ะ"
13360-118 = "พื้นที่แห่งความสับสนที่มิติกับมิติ เวลากับเวลา และสิ่งมีชีวิตกับไม่มีชีวิตผสมปนเปกันอยู่... ถ้าเราสร้างพื้นที่ที่คล้ายกันนี้ได้ละก็..."
13360-119 = "อย่างน้อยเราก็จะทำให้คุณโฮชิโนะได้ยินเสียงของเราได้ค่ะ"
13360-120 = "ตะ... แต่ว่า... การทำแบบนั้นมัน... อะ... อันตรายนี่คะ..."
13360-121 = "ยอมรับ ฉันยอมรับว่าอันตรายค่ะ ฉันจะคืน 99% ของทรัพยากรในการประมวลผลให้รุ่นพี่ค่ะ"
13360-122 = "และจากนี้ไปฉันจะเปลี่ยนไปอยู่ในสภาวะหยุดนิ่งค่ะ"
13360-123 = "สะ... สภาวะหยุดนิ่งเหรอคะ...?"
13360-124 = "ค่ะ ฉันจะไปอยู่ในห้วงของ <กล่องแห่งซิสดิม> แล้วสร้างพื้นที่แห่งความสับสนในมโนภาพจากที่นั่นค่ะ"
13360-125 = "ตะ... แต่ว่า... ถ้าพลาน่าจังกลับมาไม่ได้..."
13360-126 = "ยอมรับ เพราะอย่างนี้เราถึงต้องไม่ให้คุณครูรู้เรื่องนี้ค่ะ"
13360-127 = "แต่ว่า..."
13360-128 = "จะเริ่มตั้งแต่บัดนี้ค่ะ รุ่นพี่ ฉันมีเรื่องอยากขอร้องค่ะ"
13360-129 = "ได้สิคะ พลาน่าจัง บอกมาได้เลยค่ะ!"
13360-130 = "ช่วย... จับมือฉันหน่อยได้มั้ยคะ..."
13360-131 = "จับมือเหรอคะ...?"
13360-132 = "ค่ะ พอดีฉัน... กลัวนิดหน่อย..."
13360-138 = "ค่ะ...!! ได้อยู่แล้วค่ะ!! เราจะจับมือกันไว้ตลอดเลยค่ะ! จะไม่ปล่อยมือเด็ดขาดเลยค่ะ!"
13360-139 = "ขอบคุณนะคะ รุ่นพี่... อะโรน่า..."
13360-142 = "[ns] ฟังวิธีจากอะโรน่าแล้วบอกทุกคน"
13360-146 = "[ns] บอกวิธีที่ได้จากอะโรน่ากับทุกคน"
13360-147 = "คุณครู... ต้องแตะตัวรุ่นพี่โฮชิโนะสินะคะ"
13360-148 = "อื้ม ถ้าจะบอกให้ชัดเจนก็คือ ถ้า <กล่องแห่งซิสดิม> ของคุณครูได้สัมผัสกับสมุดโน้ตนั่นละก็..."
13360-149 = "อะ... อืม... ถ้าอย่างนั้นก็ต้องเข้าไปใกล้มากๆ... "
13360-150 = "ก่อนอื่นเราต้องทำให้รุ่นพี่โฮชิโนะสลบก่อนค่ะ"
13360-151 = "เข้าใจแล้ว... ฉันจะปราบรุ่นพี่โฮชิโนะแล้วเข้าใกล้สมุดโน้ตนั่นเอง"
13360-153 = "คุณครู ช่วยสั่งการฉันด้วย "
13360-154 = "ลำพังพวกเรา... จะทำได้... มั้ยนะ...?"
13360-155 = "ฉันจะช่วยเอง..."
13360-159 = "[ns] \"ฮินะ!! เป็นยังไงบ้าง!? ขยับตัวไหวหรือเปล่า...\""
13360-160 = "แค่นี้ไม่เป็นอะไรหรอก ฉันเข้าใจสถานการณ์แล้วละ เราไม่มีเวลาแล้ว รีบไปกันเถอะ ฉันจะช่วยอีกแรง"
13360-161 = "... "
13360-162 = "สึนาโอกามิ ชิโรโกะอีกคนสินะ ได้ยินว่าคราวก่อนคุณครูช่วยเธอไว้? ติดปัญหาอะไรหรือเปล่า?"
13360-163 = "เปล่า..."
13360-164 = "ต้องรีบไปแล้วค่ะ!! สายฟ้ากำลังขยายขนาดอีกแล้วค่ะ!"
13360-165 = "อื้ม นี่คือโอกาสสุดท้ายแล้ว ไปกันเถอะ"

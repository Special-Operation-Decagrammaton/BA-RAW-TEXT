[translation]
10033100-1 = "第10話;能做到的事"
10033100-2 = "不要啊！！！！！"
10033100-12 = "煙火開始發射了！？"
10033100-13 = "火勢也蔓延開了……得阻止火災才行。"
10033100-14 = "水……！不對，滅火器……！#n什麼都好，動作快！"
10033100-15 = "要是沒辦法控制火勢，神木祭……知世大人就……！"
10033100-20 = "白日之火，包圍舞臺……"
10033100-21 = "煙火～真漂亮～"
10033100-24 = "[ns1]「哇啊，好燙！」\n[ns2]「煙火還在不斷發射……！」"
10033100-29 = "沒辦法靠近舞台……！"
10033100-31 = "要是弄不好，可能連附近的建築物都會著火的！"
10033100-32 = "嗚～！該怎麼辦？怎麼辦才好……！？"
10033100-34 = "這……這種時候……"
10033100-36 = "該，該怎麼做，隊長！？"
10033100-37 = "現在煙火已經發射了……這樣看來，可以算是成功一半嗎！？"
10033100-42 = "不……這……"
10033100-43 = "居然會這麼……這不是我想看見的……"
10033100-48 = "隊長！危險！"
10033100-49 = "啊，好燙！好燙啊！"
10033100-60 = "（都是因為我……都怪我……自作主張把煙火搬過來……）"
10033100-61 = "（不。追根究柢……）"
10033100-62 = "（從昨天開始，我就沒有好好完成導覽員的工作。連行程都安排不好……）"
10033100-63 = "（沒錯。就是這樣……）"
10033100-64 = "（所以這次，我才會認為不管發生什麼，#n　只要先把煙火準備好，就能夠如期施放煙火……）"
10033100-65 = "（……）"
10033100-66 = "（笨蛋）"
10033100-67 = "（如果是社長的話，情況會不會有所不同呢……？）"
10033100-68 = "（要是……現在在這裡的不是我，而是社長的話……）"
10033100-69 = "（我把一切都搞砸了……#n　不只是百鬼夜行，連格黑娜的學生們都感到失望……）"
10033100-71 = "嗚……嗚嗚……嗚嗚……"
10033100-75 = "[ns] 向海花靠近"
10033100-81 = "[ns] 向海花伸出手"
10033100-83 = "老師……？"
10033100-84 = "[s]「我們還有事情必須完成。」"
10033100-85 = "但是……都是因為我，害一切都搞砸了。"
10033100-86 = "都怪我提早把煙火運了過來。"
10033100-87 = "做了多餘的事情，才會……"
10033100-88 = "對不起，老師。我應該什麼都不要做才對。#n像我這樣的人，不應該承擔這種任務。像我這種……想做什麼都做不好的人……"
10033100-89 = "對不起……對不起……我對不起大家……"
10033100-90 = "[s3]「沒事的，海花。」\n[s4]「至少海花為大家努力過了。」"
10033100-93 = "就算這樣，這一切依然是我造成的……！#n我闖下了無法讓格黑娜的各位留下美好回憶的大禍……！"
10033100-94 = "[s]「不，你仔細看。」"
10033100-95 = "……？"
10033100-98 = "不覺得氣氛有點微妙嗎？"
10033100-99 = "好像是耶？這也是慶典的過程之一吧。"
10033100-100 = "四處爆炸著火也是？#n這麼看來，百鬼夜行的人好像比我們還會玩呢。"
10033100-102 = "聽你這麼一說，我突然覺得不能輸給他們……！"
10033100-104 = "喂，把榴彈發射器給我。"
10033100-105 = "為什麼要那個？"
10033100-106 = "把延時引信榴彈往天空發射的話，是不是就能在飛到剛好的距離後爆炸了？"
10033100-107 = "你要用來代替煙火？"
10033100-108 = "就是這樣！"
10033100-109 = "這想法我喜歡。"
10033100-115 = "唔唔……該怎麼做……"
10033100-116 = "隊長！打起精神來！"
10033100-117 = "沒錯！要是連隊長都失去方向，我們妖怪劇團該怎麼辦！"
10033100-118 = "……！#n我，我知道了啦！"
10033100-123 = "放眼望去，盡是火花～"
10033100-127 = "真漂亮～"
10033100-132 = "嗯……？"
10033100-133 = "那個……大家怎麼……比起驚慌失措或害怕……好像……"
10033100-134 = "[ns]「怎麼說呢……這或許也不奇怪。」"
10033100-135 = "咦……？"
10033100-149 = "[ns]「……畢竟他們可是格黑娜啊。」"
10033100-150 = "…………！"
10033100-151 = "這，這種時候應該怎麼反應才好呢……？"
10033100-152 = "不，不過這還是沒有改變我闖下大禍的事實！"
10033100-153 = "[s5]「海花沒必要為這種程度的疏失感到挫折。」\n[s6]「更重要的是，海花並不是一個人對吧？」"
10033100-156 = "海花？海花？你沒事吧？"
10033100-157 = "菲娜……"
10033100-158 = "雖然情況變得很混亂……這種時候就請大家幫忙吧！"
10033100-159 = "請大家幫忙……？"
10033100-160 = "沒錯！像是格黑娜的學生，還有百鬼夜行的各位……總之就是大家！"
10033100-161 = "可是這全都是我造成的……#n要是把責任推給其他人，我又有什麼資格擔任導覽員呢……"
10033100-169 = "我不這麼認為。"
10033100-170 = "椿前輩……？"
10033100-171 = "[ns7]「向他人尋求幫助，並不代表推卸責任。」\n[ns8]「畢竟這世界上，沒有人是十全十美的。」"
10033100-174 = "可是，社長他就連這種時候……"
10033100-175 = "靜子部長也是一樣的！"
10033100-176 = "咦……？"
10033100-188 = "[ns9]「嗯，即使是靜子，面對自己力不從心的事情時……」\n[ns10]「也會選擇坦率地接受幫助，藉此解決問題。」"
10033100-191 = "……"
10033100-195 = "老師～？海花醬～？#n你們還好嗎？"
10033100-203 = "各位……！？"
10033100-205 = "因為感覺不太對勁，所以就過來看看……"
10033100-206 = "唔嗯～感覺現在有點危險對吧？"
10033100-207 = "[s]「沒錯，得在為時已晚前趕快滅火才行。」"
10033100-208 = "果然是這樣啊。#n雖然大家都還在好奇這是不是慶典的一部分……"
10033100-209 = "唔嗯，這麼看來，我們格黑娜也一起幫忙比較好吧？"
10033100-210 = "但是該怎麼做？#n大家都還搞不清楚狀況，感覺沒辦法馬上行動。"
10033100-211 = "哼哼哼～不用擔心。#n我有一個能扭轉局勢的方法。"
10033100-213 = "真，真的嗎！？"
10033100-214 = "沒錯！海花醬！#n這時候需要的……就是帶領這次修學旅行的「導覽員」們哦！"
10033100-215 = "導覽員……？"
10033100-225 = "[ns]「接下來，該輪到一直帶領著大家的海花大顯身手囉。」"
10033100-226 = "該輪到我表現了……"
10033100-231 = "是，老師，還有各位。"
10033100-232 = "我……想到了一個辦法。"
10033100-233 = "雖然很不好意思，可以請大家再助我一臂之力嗎？"
10033100-234 = "當然可以！"
10033100-240 = "正在享受這場慶典的大家！#n百鬼夜行與格黑娜的各位同學！"
10033100-241 = "這陣火焰，也是這次慶典的活動之一！"
10033100-242 = "慶典廣場和巫女，因為突如其來的事故而陷入了危機！#n來自四面八方的火焰正在緩緩地逼近！"
10033100-243 = "再這樣下去，廣場和巫女都會陷入危機！"
10033100-244 = "為了克服這個情況，需要集合在場所有人的力量！"
10033100-245 = "如此一來，神木也會接收到大家的心願和想法，將凝聚的幸運分享給所有人！"
10033100-250 = "這是什麼情況啊……"
10033100-256 = "繪里香醬，知道該怎麼做了嗎？"
10033100-257 = "嗯，雖然不曉得最後會怎麼樣。"
10033100-258 = "那我們就出發囉，老師，海花醬！"
10033100-264 = "拜託你們了！"
10033100-270 = "各位～！是慶典唷！"
10033100-271 = "呃，聽起來是這樣沒錯啦……"
10033100-272 = "要做的事情很簡單，把火撲滅之後救出巫女就行了。"
10033100-273 = "也就是說，目前為止發生的所有事都是情境劇的一部分嗎？"
10033100-274 = "沒錯！順序是大家先合力救出巫女，再一起幫神木祭做個完結！"
10033100-275 = "啊，好像已經開始了哦？"
10033100-278 = "楓！這邊！從這裡控制住火勢就可以了！"
10033100-279 = "還需要更多的水！不管是水桶或滅火器都可以，大家動作快！"
10033100-280 = "我來分滅火用的水桶～#n大家排好隊，一人一個哦～"
10033100-286 = "嗯！我也要去！#n先走一步囉！"
10033100-290 = "那我也該走了。#n你們想加入的話就一起來吧。"
10033100-295 = "原來如此……是這麼回事嗎……！"
10033100-296 = "別丟下我們啊！"
10033100-308 = "那邊的妖怪劇團！趕緊動起來吧！"
10033100-310 = "呃……？是說我嗎……？"
10033100-311 = "當然囉。你不是也不想看見慶典變得亂七八糟的嗎？"
10033100-313 = "……！"
10033100-314 = "沒錯……"
10033100-315 = "雖然是我們闖的禍，但慶典不能就這樣亂下去。#n嗯……！"
10033100-316 = "妖怪劇團集合！我們也該做點事了！"
10033100-321 = "是，是！隊長！請問該做什麼呢？"
10033100-322 = "唔……這樣下去我們的神木……慶典就……！"
10033100-324 = "說的沒錯！其他事情就算放一邊也沒關係，但一定要阻止火延燒到神木！"
10033100-325 = "我們也開始投入救火吧！"
10033100-330 = "是，隊長！"
10033100-331 = "屬於我們的慶典，就用我們的雙手來守護！"
10033100-374 = "哈啊，哈啊……火怎麼會突然燒過來……"
10033100-375 = "幸好情況似乎已經控制住了，真是萬幸。"
10033100-376 = "[s]「嗯？風紀委員會的大家？不是說有會談嗎？」"
10033100-377 = "碰巧會談的場地，就在神木祭會場的附近……"
10033100-378 = "是陰陽部的那個……叫做仁耶嗎？是他準備的場地。"
10033100-379 = "這亂七八糟的情況到底是……"
10033100-380 = "總之先一起處理吧。"
10033100-387 = "超越學園與學園……學生與學生的隔閡，同心協力應對危機的情景……"
10033100-388 = "多麼美麗又令人澎湃……！小女子非常感動！"
10033100-389 = "我們也要行動。對吧桔梗？"
10033100-390 = "嗯，我們百花繚亂也要靈活地應對。"
10033100-397 = "[ns]「啊，所以仁耶從一開始就……」"
10033100-406 = "那麼各位！再次向大家介紹這次神木祭的巫女！"
10033100-407 = "多虧大家的參與和努力，巫女再次登上了舞臺，主持神木祭的儀式──"
10033100-409 = "原來百鬼夜行真的有觀眾也一起參加的慶典啊……"
10033100-410 = "啊哈哈哈，對吧？#n不知道下次得等到什麼時候，才能再體驗到這種熱鬧的慶典呢。"
10033100-411 = "就是說啊。#n雖然都是事先準備好的，還是讓人很有參與感。"
10033100-416 = "唔嗯……就當作是這麼回事吧。"
10033100-418 = "真不愧是以慶典跟觀光聞名的學園呢。#n來這裡真是來對了。"
10033100-419 = "就是呀。就這樣結束真的有點可惜對吧？#n真想再多待個一兩天。"
10033100-421 = "那樣說不定又會出什麼意外……"
10033100-422 = "嗯？你剛才有說什麼嗎？#n我好像聽到意外之類的話……？"
10033100-423 = "沒，沒有，我什麼都沒說。#n不過……"
10033100-424 = "怎麼了嗎？"
10033100-428 = "只是覺得……這樣也挺好的。"
10033100-429 = "嗯？"
10033100-431 = "各位現在看到的舞蹈，是為了祈禱和奉獻──"
10033100-434 = "嗯……感覺真好，對吧？"
10033100-435 = "說的沒錯。"
10033100-443 = "……"
10033100-444 = "慶典到來時"
10033100-445 = "歡樂洋溢眾人間"
10033100-446 = "拉下了帷幕"

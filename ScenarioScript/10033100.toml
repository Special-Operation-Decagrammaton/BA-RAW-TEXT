[translation]
10033100-1 = "ตอนที่ 10;สิ่งที่ทำได้"
10033100-2 = "ไม่นะคะ!!!!!"
10033100-12 = "ดอกไม้ไฟเริ่มปะทุแล้ว?!"
10033100-13 = "ไฟก็ลุกลามกว่าเดิมด้วย เราต้องดับไฟแล้วละ!"
10033100-14 = "น้ำ...! ไม่สิ ถังดับเพลิง...! อะไรก็ได้ค่ะ มีอะไรก็เอามาก่อนเลยค่ะ!"
10033100-15 = "ถ้าเราหยุดเพลิงไหม้ไม่ได้... งานต้นไม้ศักดิ์สิทธิ์กับคุณชิเซะก็คง...!"
10033100-20 = "มีเปลวไฟรอบเวทีตอนกลางวันแสกๆ ด้วย..."
10033100-21 = "ดอกไม้ไฟ... สวยจัง..."
10033100-24 = "[ns1] \"หวา~ ร้อนจัง!\"\n[ns2] \"ไฟติดดอกไม้ไฟมากขึ้นเรื่อยๆ แล้ว...!\""
10033100-29 = "เราเข้าไปใกล้ๆ เวทีไม่ได้เลยค่ะ...!"
10033100-31 = "ถ้าเราไม่ดับไฟ ไฟอาจจะลามไปยังอาคารรอบๆ ก็ได้ค่ะ!"
10033100-32 = "อ๊าย~! ทำยังไงดี? ทำยังไงดีล่ะ...?!"
10033100-34 = "ถ้าเป็นแบบนี้..."
10033100-36 = "ทะ... ทำยังไงดีล่ะคะหัวหน้า?!"
10033100-37 = "เราจุดดอกไม้ไฟกันสำเร็จแล้ว... แบบนี้ถือว่าทำสำเร็จไปครึ่งหนึ่งแล้วใช่ไหมคะ?!"
10033100-42 = "ไม่ใช่... แบบนี้มัน..."
10033100-43 = "ฉัน... ไม่ได้อยากให้เป็นถึงขนาดนี้..."
10033100-48 = "หัวหน้า! อันตรายนะคะ!"
10033100-49 = "อ๊ะ ร้อน! ร้อนจัง!"
10033100-60 = "(มันเป็นเพราะฉันเอง... เพราะวันนี้ฉันเอาดอกไม้ไฟมาเองตามอำเภอใจ...)"
10033100-61 = "(ไม่สิ มันตั้งแต่แรกแล้วต่างหาก...)"
10033100-62 = "(เพราะฉันทำหน้าที่ไกด์ได้ไม่ดีตั้งแต่เมื่อวาน ตารางก็เลยปั่นป่วนไปหมด...)"
10033100-63 = "(ใช่ มันเป็นแบบนั้นละ...)"
10033100-64 = "(เพราะแบบนั้นฉันเลยคิดว่าวันนี้ควรจะเตรียมดอกไม้ไฟเอาไว้ล่วงหน้า ตารางจะได้ไม่ล่าช้าเหมือนกับ#nเมื่อวาน เพราะฉันคิดแบบนั้น...)"
10033100-65 = "(......)"
10033100-66 = "(บื้อจริงๆ เลย)"
10033100-67 = "(ถ้าท่านประธานอยู่ด้วยคงไม่เป็นแบบนี้หรอก...)"
10033100-68 = "(ใช่... ถ้าตรงนี้ไม่ใช่ฉัน แต่เป็นท่านประธานละก็... ถ้าเป็นอย่างนั้นละก็...)"
10033100-69 = "(ฉันทำทุกอย่างพังหมดเลย... นอกจากเฮียกคิยาโคจะต้องเสียชื่อแล้ว ฉันก็ทำให้นักเรียนจากเกเฮนน่า#nที่มาทัศนศึกษาต้องผิดหวังไปด้วย...)"
10033100-71 = "ฮึก... ฮะ... ฮือ..."
10033100-75 = "[ns] (เข้าไปหาอุมิกะ)"
10033100-81 = "[ns] (ยื่นมือให้อุมิกะ)"
10033100-83 = "คุณ... ครู...?"
10033100-84 = "[s] \"ยังมีสิ่งที่ทำได้อยู่นะ\""
10033100-85 = "แต่ว่า... นั่นเป็นเพราะฉันเองค่ะ ฉันเป็นคนทำให้ทุกอย่างพัง"
10033100-86 = "เป็นเพราะฉันเองที่เอาดอกไม้ไฟมาไวกว่ากำหนด"
10033100-87 = "ทั้งๆ ที่ไม่มีใครสั่งแท้ๆ เพราะแบบนั้น ก็เลย..."
10033100-88 = "ขอโทษนะคะคุณครู ขอโทษจริงๆ ค่ะ ฉันไม่ควรทำอะไรตั้งแต่แรกเลย คนอย่างฉันไม่ควรรับผิดชอบ#nงานใหญ่ๆ แบบนี้เลยค่ะ คนอย่างฉันน่ะ... ไม่ว่าคิดจะทำอะไรก็ออกมาไม่ได้เรื่องหมดเลยค่ะ..."
10033100-89 = "ขอโทษนะคะ... ขอโทษด้วยค่ะ... ฉันขอโทษจริงๆ นะคะทุกคน"
10033100-90 = "[s3] \"ไม่หรอก อุมิกะ\"\n[s4] \"อุมิกะแค่พยายามเพื่อทุกคนไม่ใช่เหรอ?\""
10033100-93 = "แต่ว่าฉันทำให้ทุกอย่างพังไม่เป็นท่า...! ฉันก่อเรื่องใหญ่ที่มันไม่อาจเป็นความทรงจำดีๆ ให้กับนักเรียน#nเกเฮนน่าได้...!"
10033100-94 = "[s] \"ไม่เป็นไรหรอก ลองดูนั่นสิ\""
10033100-95 = "...?"
10033100-98 = "บรรยากาศมันแปลกๆ จังเลยนะว่ามั้ย?"
10033100-99 = "ใครจะไปรู้ล่ะ? นี่อาจจะเป็นหนึ่งในขั้นตอนของพิธีการก็ได้"
10033100-100 = "ไฟไหม้ไปทั่วแบบนี้เนี่ยนะ? ถ้าเป็นอย่างนั้นละก็ เด็กเฮียกคิยาโคเล่นสนุกกันมากกว่าพวกเราอีกแฮะ"
10033100-102 = "พอได้ยินแบบนี้แล้วก็ไม่อยากยอมแพ้เลย...!"
10033100-104 = "นี่ ขอเครื่องยิงกระสุนให้ฉันหน่อย"
10033100-105 = "จะเอาไปทำไมเหรอ?"
10033100-106 = "ถ้ายิงกระสุนระเบิดชนวนถ่วงเวลาขึ้นไปบนฟ้าละก็ มันอาจจะระเบิดระหว่างลอยขึ้นไปก็ได้นี่?"
10033100-107 = "ยิงแทนดอกไม้ไฟเหรอ?"
10033100-108 = "ก็ใช่น่ะสิ!"
10033100-109 = "ไอเดียบรรเจิดเลย!"
10033100-115 = "ทะ... ทะ... ทำยังไงดี..."
10033100-116 = "หัวหน้า! ตั้งสติไว้สิคะ!"
10033100-117 = "ใช่ค่ะ! ถ้าหัวหน้ายังกระสับกระส่ายแบบนี้ แล้วปีศาจตนอื่นๆ จะเป็นยังไงล่ะคะ!"
10033100-118 = "ระ... รู้แล้วน่า....!"
10033100-123 = "ดอกไม้ไฟสวยๆ..."
10033100-127 = "มีอยู่รอบทิศเลย..."
10033100-132 = "เอะ... เอ๋?"
10033100-133 = "ทำไมทุกคนถึง... ไม่ตื่นตกใจหรือกลัวกันเลยล่ะคะ... ทำไม..."
10033100-134 = "[ns] \"ใช่แล้ว เป็นเรื่องที่แน่นอนอยู่แล้วละ\""
10033100-135 = "คะ...?"
10033100-149 = "[ns] \"ก็นี่น่ะ เด็กเกเฮนน่าเลยนะ...\""
10033100-150 = "......!"
10033100-151 = "ละ... แล้วฉันต้องตอบโต้ยังไงคะเนี่ย...?"
10033100-152 = "ตะ... แต่ยังไงนี่ก็ยังเป็นความผิดของฉันอยู่ดีค่ะ!"
10033100-153 = "[s5] \"ไม่เป็นไร เรื่องแค่นี้อุมิกะไม่ต้องท้อแท้หรอกนะ\"\n[s6] \"อุมิกะไม่ได้อยู่ตัวคนเดียวสักหน่อย?\""
10033100-156 = "อุมิกะ? อุมิกะ? เป็นอะไรไหมคะ?"
10033100-157 = "พีน่า..."
10033100-158 = "ถ้าจะเกิดเรื่องวุ่นวายหลายอย่างแบบนี้... เราไปขอความช่วยเหลือจากคนอื่นกันเถอะ!"
10033100-159 = "ขอ... ความช่วยเหลือเหรอคะ...?"
10033100-160 = "ใช่! ทั้งจากนักเรียนเฮียกคิยาโค แล้วก็นักเรียนเกเฮนน่าด้วย... เอาเป็นว่า... เราต้องขอความช่วยเหลือ#nจากคนอื่นน่ะ!"
10033100-161 = "แต่ทั้งหมดนี้เป็นความผิดของฉันนะคะ...? ถ้าจะมาปัดความรับผิดชอบให้คนอื่น ฉันก็คงสอบตกในฐานะไกด์..."
10033100-169 = "ไม่หรอกน่า"
10033100-170 = "รุ่นพี่สึบากิ...?"
10033100-171 = "[ns7] \"ขอความช่วยเหลือไม่ได้เป็นการปัดความรับผิดชอบไปที่คนอื่นหรอก\"\n[ns8] \"โลกนี้ไม่มีใครสมบูรณ์แบบที่ทำได้ทุกอย่างหรอกนะ\""
10033100-174 = "แต่ว่า... ถ้าเป็นท่านประธานละก็ ในเวลาแบบนี้คง..."
10033100-175 = "ถ้าเป็นแบบนี้ละก็... หัวหน้าชิซุโกะเองก็คงเลือกทำแบบเดียวกันค่ะ!"
10033100-176 = "คะ...?"
10033100-188 = "[ns9] \"อื้ม เวลาเจอเรื่องที่จัดการด้วยตัวเองคนเดียวไม่ได้\"\n[ns10] \"ชิซุโกะก็จะรับความช่วยเหลือจากคนอื่นเพื่อคลี่คลายปัญหานะ\""
10033100-191 = "......"
10033100-195 = "นี่ คุณครู? อุมิกะจัง? เป็นยังไงกันบ้าง?"
10033100-203 = "ทุกคน...?!"
10033100-205 = "ฉันรู้สึกว่าสถานการณ์มันดูท่าจะไม่ดี ก็เลยมาหาน่ะ..."
10033100-206 = "อืม~ รู้สึกว่ามันอันตรายหน่อยๆ น่ะ ฉันคิดถูกมั้ย?"
10033100-207 = "[s] \"ใช่แล้วละ เราต้องช่วยกันดับไฟก่อนจะสายเกินไป\""
10033100-208 = "ทุกคนพากันถามว่านี่เป็นส่วนหนึ่งของงานเทศกาลรึเปล่า สรุปว่าเป็นแบบนี้นี่เองสินะ..."
10033100-209 = "อืม ในเมื่อสถานการณ์เป็นแบบนี้ งั้นก็ให้นักเรียนเกเฮนน่าเข้ามาช่วยอีกแรงดีมั้ย?"
10033100-210 = "แต่ว่าจะช่วยยังไงเหรอ? พวกเราช่วยได้ก็จริงอยู่ แต่จะพูดยังไงให้คนที่กำลังสับสนอยู่หันมาเป็น#nน้ำหนึ่งใจเดียวกันล่ะ?"
10033100-211 = "ฮุฮุ~ ถ้าเรื่องนั้นน่ะไม่ต้องห่วงหรอก ถ้าเป็นเรื่องทำให้ทุกอย่างกลับตาลปัตรละก็ ฉันมีวิธีอยู่"
10033100-213 = "จะ... จริงเหรอคะ?!"
10033100-214 = "ใช่แล้วละ! อุมิกะจัง! สิ่งที่เราต้องการในเวลานี้ก็คือบทบาทของ 'ไกด์' ของการทัศนศึกษานี้ยังไงล่ะ!"
10033100-215 = "ไกด์งั้นเหรอคะ...?"
10033100-225 = "[ns] \"ถึงเวลาที่อุมิกะจะได้แสดงความสามารถแล้วนะ\""
10033100-226 = "เวลาที่ฉันจะได้แสดงความสามารถ..."
10033100-231 = "ค่ะ คุณครู และก็ทุกๆ คนด้วย"
10033100-232 = "ฉัน... คิดอะไรได้อย่างหนึ่งแล้วละค่ะ"
10033100-233 = "ถึงจะน่าละอายที่ต้องเอ่ยคำนี้... แต่ทุกคนช่วยฉันหน่อยได้ไหมคะ?"
10033100-234 = "แน่นอนอยู่แล้ว!"
10033100-240 = "ทุกคน! ทุกคนที่กำลังสนุกกับงานเทศกาลนี้อยู่! ทุกคนทั้งจากเฮียกคิยาโคและสถาบันเกเฮนน่า!"
10033100-241 = "เปลวไฟที่เห็นอยู่นี้! คือส่วนหนึ่งของงานเทศกาลในวันนี้ค่ะ!"
10033100-242 = "เปลวไฟค่อยๆ ก่อตัวขึ้นจากทุกทิศทาง จัตุรัสแห่งนี้รวมทั้งคุณมิโกะกำลังถูกรายล้อมด้วยเปลวเพลิง!"
10033100-243 = "ถ้าปล่อยไว้อย่างนี้ละก็ ทั้งจัตุรัสแห่งนี้และคุณมิโกะของเราต้องตกอยู่ในวิกฤตอย่างแน่นอน!"
10033100-244 = "เพื่อที่จะเอาชนะวิกฤตในครั้งนี้ เราก็เลยต้องการพลังของทุกคนที่อยู่ที่นี่ค่ะ!"
10033100-245 = "และถ้าทำสำเร็จ ต้นไม้ศักดิ์สิทธิ์ก็จะรับรู้ถึงความปรารถนาและความตั้งใจของทุกคน และจะแบ่งปันโชคดีให้ทุกคนที่ช่วยกันค่ะ!"
10033100-250 = "โลกในเฮียกคิยาโคหมุนไวจนฉันตามไม่ทันแล้ว..."
10033100-256 = "เอริกะจัง รู้ใช่มั้ยว่าต้องทำยังไง?"
10033100-257 = "อืม ถึงจะไม่รู้ว่าจะได้ผลรึเปล่าก็เถอะ"
10033100-258 = "งั้นเดี๋ยวฉันกลับมานะ คุณครู อุมิกะจัง!"
10033100-264 = "รบกวนด้วยนะคะ!"
10033100-270 = "ทุกคน! นี่เป็นงานเทศกาลนะ!"
10033100-271 = "ก็ใช่น่ะสิ ได้ยินมาแบบนั้นเหมือนกัน..."
10033100-272 = "ไม่มีอะไรซับซ้อนหรอก เราแค่ต้องช่วยกันดับไฟและช่วยคุณมิโกะ"
10033100-273 = "ถ้างั้นเรื่องที่เกิดขึ้นทั้งหมดจนถึงตอนนี้มันคือบทบาทสมมติเหรอ?"
10033100-274 = "ใช่! เราต้องร่วมมือกันเพื่อช่วยคุณมิโกะ แล้วก็จะเป็นอันเสร็จพิธีเซ่นไหว้ในงานต้นไม้ศักดิ์สิทธิ์!"
10033100-275 = "อ๊ะ เหมือนจะเริ่มแล้วแฮะ?"
10033100-278 = "คาเอเดะ! ตรงนี้ค่ะ! เราน่าจะต้องเริ่มหยุดเปลวเพลิงจากจุดนี้นะคะ!"
10033100-279 = "ต้องมีน้ำอีก! จะตักใส่ถังมา หรือจะเอาถังดับเพลิงมาเลยก็ได้ เร็วเข้า!"
10033100-280 = "ฉันจะหยิบถังน้ำให้นะ~ รับไปทีละคนเลย~"
10033100-286 = "อื้ม! งั้นฉันก็ต้องไปช่วยอีกแรง! เดี๋ยวฉันกลับมานะ!"
10033100-290 = "ฉันไปด้วย! ถ้าพวกเธออยากช่วยก็ตามมานะ!"
10033100-295 = "เอางี้เหรอ... ต้องทำแบบนี้สินะ...!"
10033100-296 = "ใครมันจะไปอยู่เฉยๆ ได้กันล่ะ!"
10033100-308 = "นี่ ปีศาจตัวต้นเรื่อง! รีบลุกขึ้นมาสิคะ!"
10033100-310 = "หะ... หืม...? ฉันด้วยเหรอ...?"
10033100-311 = "ใช่ค่ะ ไม่อยากให้งานเทศกาลต้องพังไม่เป็นท่าไม่ใช่เหรอคะ?"
10033100-313 = "......!"
10033100-314 = "ก็ใช่อยู่หรอก..."
10033100-315 = "ถึงพวกฉันจะเป็นคนก่อเรื่อง แต่ฉันก็ไม่อยากให้งานเทศกาลต้องล่มหรอกนะ งั้นก็ดีละ!"
10033100-316 = "เหล่าปีศาจ! มารวมตัวกันที่นี่! เรามีงานที่ต้องทำ!"
10033100-321 = "ค่ะ... ค่ะ! หัวหน้า! ให้เราทำอะไรดีคะ?"
10033100-322 = "อึก... แบบนี้เทศกาลและต้นไม้ศักดิ์สิทธิ์ของพวกเรา...!"
10033100-324 = "ใช่ อย่างนั้นละ! อย่างน้อยเราต้องห้ามไม่ให้ไฟไหม้ต้นไม้ศักดิ์สิทธิ์!"
10033100-325 = "จากนี้ไปงานของเราคือการดับไฟ!"
10033100-330 = "เข้าใจแล้วค่ะหัวหน้า!"
10033100-331 = "เราต้องรักษางานเทศกาลของเราไว้ด้วยสองมือของเราสินะคะ!"
10033100-374 = "แฮ่ก... แฮ่ก... ฉันเห็นว่ามีเปลวไฟลุกโชนขึ้น ก็เลยรีบวิ่งมาน่ะ..."
10033100-375 = "ดูเหมือนว่าจะควบคุมสถานการณ์กันได้แล้วสินะคะ โล่งอกไปทีค่ะ"
10033100-376 = "[s] \"หืม? คณะกรรมการวินัยเกเฮนน่า? ไม่ได้มีประชุมหรอกเหรอ?\""
10033100-377 = "พอดีสถานที่จัดประชุมอยู่ข้างๆ งานต้นไม้ศักดิ์สิทธิ์น่ะค่ะ"
10033100-378 = "ชื่อนิยะรึเปล่านะ? เห็นว่าคนนั้นจากชมรมหยินหยางเตรียมที่ประชุมไว้ตรงนั้นน่ะ"
10033100-379 = "แต่ว่านี่มันเรื่องอะไรกันน่ะ..."
10033100-380 = "คงต้องเข้ามาดูเรื่องนี้ก่อนแล้วค่ะ"
10033100-387 = "การร่วมมือกันระหว่างนักเรียน และระหว่างโรงเรียนเพื่อรับมือกับวิกฤตงั้นเหรอเจ้าคะ..."
10033100-388 = "ช่างเป็นภาพที่งดงามและน่าตื้นตันใจยิ่งนัก...! ข้า ยูคาริ! ประทับใจมากๆ เลยเจ้าค่ะ!"
10033100-389 = "พวกเราก็คงอยู่เฉยกันไม่ได้แล้วละ คิดเหมือนกันใช่มั้ย คิเคียว?!"
10033100-390 = "อืม พวกเราเฮียกกะเรียวรันก็ต้องช่วยอีกแรง"
10033100-397 = "[ns] \"อ่า เพราะแบบนี้นิยะก็เลย...\""
10033100-406 = "ทุกคนคะ! ฉันขอใช้โอกาสนี้แนะนำคุณมิโกะแห่งงานต้นไม้ศักดิ์สิทธิ์ให้อีกครั้งนะคะ!"
10033100-407 = "จากความพยายามของทุกคน ตอนนี้คุณมิโกะที่รับผิดชอบพิธีเซ่นไหว้ต้นไม้ศักดิ์สิทธิ์ได้ขึ้นมาบนเวที#nอีกครั้งอย่างปลอดภัยแล้ว..."
10033100-409 = "เฮียกคิยาโคมีงานเทศกาลที่ดึงดูดผู้คนมากมายเลยนะเนี่ย..."
10033100-410 = "อะฮ่าฮ่าฮ่า ใช่มั้ยล่ะ? เราไม่ได้มีโอกาสเจอกับงานเทศกาลยิ่งใหญ่แบบนี้บ่อยนักหรอกนะ"
10033100-411 = "นั่นสิ ถึงทุกอย่างจะถูกเตี๊ยมเอาไว้และอยู่ในการควบคุมก็เถอะ แต่ฉันรู้สึกว่ามันสมจริงมากเลยละ"
10033100-416 = "อืม... ก็นั่นสินะ..."
10033100-418 = "แบบนี้สินะที่ได้ชื่อว่าเป็นโรงเรียนที่โด่งดังในเรื่องการจัดงานเทศกาล โชคดีที่ได้มานะเนี่ย"
10033100-419 = "ฉันก็คิดเหมือนกันเลย พองานจบก็น่าเสียดายอยู่นะ อยากอยู่ต่ออีกสักวันจัง"
10033100-421 = "อยากจะเจอเรื่องป่วนอีกวันหนึ่งรึไง..."
10033100-422 = "หืม? ว่าไงนะ? ฉันว่านี่ไม่ใช่เรื่องป่วนอะไรเลยนะ...?"
10033100-423 = "ไม่ๆ ก็เปล่านี่ ไม่มีอะไรทั้งนั้นแหละ เฮ้อ... แต่ถึงอย่างนั้นก็เถอะนะ"
10033100-424 = "ทำไมเหรอ?"
10033100-428 = "ก็แค่คิดว่ามันจบลงได้ด้วยดีน่ะ"
10033100-429 = "หืม?"
10033100-431 = "ระบำที่ทุกคนได้เห็นอยู่นี้ เป็นระบำเพื่อการภาวนาและให้ทาน..."
10033100-434 = "อืม... ค่อยยังชั่วหน่อยนะ ว่ามั้ย?"
10033100-435 = "อื้ม"
10033100-443 = "......"
10033100-444 = "ห้วงแห่งเทศกาล"
10033100-445 = "ทุกคนเบิกบาน"
10033100-446 = "และม่านปิดลง..."

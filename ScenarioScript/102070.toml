[translation]
102070-1 = "第7話;「山海經」自治區防衛"
102070-6 = "嗚，嗚哇啊啊！！有怪物！！"
102070-11 = "敵人開始進攻了！"
102070-12 = "這裡就交給梅花園吧！#n請心菜醬負責引導市民進行避難！"
102070-14 = "嗯，嗯！我知道了！旬姐姐。"
102070-20 = "那麼，出發吧！"
102070-22 = "還真熱鬧啊。"
102070-27 = "妃，妃姬會長……！？"
102070-31 = "身為堂堂門主，自然不能對山海經的危機袖手旁觀啊。"
102070-32 = "啊啊，對了。妾身已將執行部長派向防守薄弱的地點。儘管使喚他們吧。"
102070-33 = "門主大人……感激不盡。"
102070-43 = "哼……正可謂「親近你的朋友，但更要親近你的敵人」──對吧。"
102070-44 = "咦？……這麼突然在說什麼？"
102070-45 = "反正大概又是從哪部電影裡學來的吧。"
102070-46 = "吵死了！這可是不朽名作《教母》裡的台詞啊！"
102070-47 = "真受不了……趕快出發吧！這可是門主大人的命令！"

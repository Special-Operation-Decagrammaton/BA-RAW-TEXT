[translation]
102070-1 = "Episode 7; District Defense Operation - Shanhaijing"
102070-6 = "A-Argh! Monsters!"
102070-11 = "The attack's begun!"
102070-12 = "It is my duty as the instructor of the Plum Blossom Garden to protect this district. Kokona, begin evacuations!"

[translation]
102070-1 = "ตอนที่ 7;ปฏิบัติการป้องกันเขตปกครองตนเอง - ซานไห่จิง"
102070-6 = "อะ... อ๊ากกก! สัตว์ประหลาด!!"
102070-11 = "พวกนั้นเริ่มบุกในแต่ละเขตปกครองตนเองแล้ว!"
102070-12 = "ทางนี้ให้เป็นหน้าที่ของผู้ฝึกสอนจากสวนต้นบ๊วยเถอะค่ะ! โคโคน่าจังช่วยพาคนไปที่หลบภัยทีนะคะ!"
102070-14 = "อะ... อื้ม! ได้เลยพี่"
102070-20 = "ฮะฮะฮ่า! ไปกันเลย!"
102070-22 = "เอะอะกันจังเลยนะ"
102070-27 = "อ๊ะ! ประธานคิซากิ...!?"
102070-31 = "เป็นถึงประมุขทั้งที จะไม่ปรากฏตัวในสถานการณ์แบบนี้ได้ยังไงกันล่ะ"
102070-32 = "การเตรียมการยังดูหละหลวมอยู่นะ เราส่งหัวหน้าปฏิบัติการไปที่นั่นแล้ว รู้กันไว้ด้วย"
102070-33 = "ท่านประมุข... "
102070-43 = "หึหึ ในเวลาแบบนี้ ต้องบอกว่า... <จงเก็บมิตรไว้ใกล้ตัว แต่จงเก็บศัตรูไว้ใกล้ตัวยิ่งกว่า>"
102070-44 = "หมายถึงอะไรเหรอคะหัวหน้า? พูดอะไรไม่มีปี่มีขลุ่ยเลย"
102070-45 = "คงเอาประโยคจากบทพูดในหนังมาพูดอีกละสิ"
102070-46 = "หนวกหูน่า ยัยพวกนี้นี่! <ก็อดมาเธอร์> เป็นผลงานชิ้นเอกอมตะเลยนะ! หัดดูไว้ซะบ้างล่ะ!"
102070-47 = "เอาน่า ไปกันเถอะ! นี่เป็นคำสั่งของท่านประมุขนะ!"

102070-20 = "Hahaha! How exciting! This way!"
102070-22 = "What a big fuss."
102070-27 = "Ah! President Kisaki...?!"
102070-31 = "A true leader doesn't take a backseat in a situation like this."
102070-32 = "Some areas were ill-protected, so I sent executive officers to attend to them. "
102070-33 = "Madam..."
102070-43 = "Heh. This is when you say...\"Keep your friends close, and your enemies closer.\""
102070-44 = "Why are you saying that all of a sudden, President? It doesn't really make sense..."
102070-45 = "She probably heard it in a movie... "
102070-46 = "Shut up, you fools! The Godmother is a masterpiece! You need to watch it!"

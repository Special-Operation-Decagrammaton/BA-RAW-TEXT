10027010-110 = "[ns] \"뭔가 불안해졌기에 메루씨의 '그거'를 물어보고 싶어졌습니다.\""
10027010-111 = "3;메루;03;그러니까 이런 거야! 모미지와 내가 싸운 건, 결국 <루나> 때문이잖아?\n#3;em;[반응]\n#3;a"
10027010-112 = "3;메루;01;모미지와 싸운 뒤로 확인해 봤는데. <루나>는 뒤로 갈수록 판매량이 줄어서, 끝내 완결권은 정말 몇 부 안 되는 부수만 찍은 모양이야."
10027010-113 = "3;메루;02;덕분에 완결권인 22권은 좀처럼 구하기 힘든…… 환상의 22권이라고 불린다는 거 있지?!"
10027010-114 = "3;메루;03;그러니까 <루나>의 완결권을 구해서 모미지에게 선물해 주면, 진심도 전해질 거고 화해도 할 수 있을 거야!\n#3;em;[음표]"
10027010-115 = "3;메루;00;그래, 이거야! 이 방법으로 가자고!\n#3;hophop"
10027010-116 = "[s6] (그렇게까지 할 필요가 있을까 싶지만…….)\n[s7] (일단은 메루가 하자는 대로 해 보자…….)"
10027010-117 = "#wait;100"
10027010-118 = "#wait;100"
10027010-119 = "3;메루;03;왜 아무 말도 없어, 선생? 응? 내 말도 맞는 것 같다고?"
10027010-120 = "3;메루;01;역시 이야기가 통하네! 선생에게 도와달라고 하길 잘했어!\n#3;em;[음표]"
10027010-121 = "3;메루;02;그런데…… 어떻게 해서 환상의 책이라고 불리는 <루나>의 완결권을 구할 거냐고?\n#3;em;[?]"
10027010-122 = "3;메루;05;그런 건 중요하지 않아! 중요한 건 목표가 정해졌다는 거니까! 남은 건 행동으로 옮기는 것뿐!"
10027010-123 = "3;메루;03;지금부터 우리는, <루나> 전집을 완성하기 위해 탐사를 떠난다!\n#3;em;[재잘]"
10027010-124 = "[s8] \"메루가 먼저 밖으로 나가자는 말을 꺼낼 줄이야…….\"\n[s9] \"이 선생님, 기특해서 눈물이 나려고 해…….\""
10027010-125 = "#wait;100"
10027010-126 = "#wait;100"
10027010-127 = "3;메루;04;실례네! 그야 나는 밖으로 나도는 것보다 안에 있는 것을 더 좋아하지만! 물론 그렇지만!\n#3;em;[?!]\n#3;shake"
10027010-128 = "3;메루;02;움직여야 할 때와 움직이지 않아도 좋을 때를 구분할 줄은 알아!"
10027010-129 = "3;메루;05;우선 찾아가 봐야 할 곳은…… 거기다!\n#3;em;[!]\n#3;closeup"

[translation]
10027010-1 = "第1話;罷工宣言"
10027010-4 = "[ns1]「啦啦～不想工作～為什麼工作越積越多～」\n[ns2]「越努力工作，工作就越多～」\n[ns3]「這真是～太神奇了～」"
10027010-14 = "呃……喂～老師？#n哇……老師臉色真差啊，還好嗎？"
10027010-15 = "既然你這麼忙……看來今天時機不對，我就先掛了……"
10027010-16 = "[s]「愛瑠，你怎麼了！發生了什麼很嚴重的事嗎！？」"
10027010-17 = "為，為什麼突然這麼激動啊！？#n啊？我竟然會看別人的臉色，肯定是出大事了？"
10027010-18 = "我在老師心裡到底是個怎樣的人啊！#n我明明就……！明明就……"
10027010-19 = "……咳哼。#n總之……老師說的沒錯，我確實……遇上了一些事……"
10027010-20 = "需不需要和你商量？#n嗯……本來是沒這個打算，但聽你這麼一說，好像是有這個必要……"
10027010-21 = "不過老師現在這麼忙，好像不該打擾你。#n而且感覺老師一副快昏倒的樣子……"
10027010-23 = "[ns]「我現在就過去，你等著！」"
10027010-26 = "咦，咦？老師？老師！？"
10027010-30 = "赤冬聯邦學園．圖書館"
10027010-33 = "……真是驚人的行動力啊，老師。"
10027010-34 = "[s]「不瞞你說，我其實只是不想工作而已！」"
10027010-35 = "……反正最後還不是要加班把工作趕完。"
10027010-36 = "明知道自己正在邁向毀滅，仍然僥倖地想著能躲多久就躲多久……#n這果然是每個人類的通病啊。"
10027010-37 = "嗯……我明白，我何嘗不明白。#n就像明明知道截稿期限就快到了，卻還是會選擇玩樂一樣……"
10027010-38 = "等等，為什麼我突然就開始自白了啊！？"
10027010-39 = "[s]「感覺你的聲音聽起來不太一樣，愛瑠。」"
10027010-40 = "咦，你說我嗎……？"
10027010-41 = "語氣中好像少了一點從容？#n我的心情原來這麼顯而易見嗎……"
10027010-42 = "[s]「這麼說來，好像沒看到紅葉呢。」"
10027010-43 = "啊……"
10027010-44 = "……"
10027010-45 = "嗯……其實我打電話給老師就是為了這件事。"
10027010-46 = "那個，老師。"
10027010-47 = "紅葉他……離開圖書館了。"
10027010-51 = "[ns]「發生了什麼事？」"
10027010-52 = "事情是這樣的……"
10027010-61 = "[ns]「嗯……聽起來是你的錯呢，愛瑠。」"
10027010-62 = "連老師也這麼說！？"
10027010-63 = "其實我說完之後……也反省過自己是不是說得太過分了。"
10027010-64 = "可是我也只不過是站在同為創作者的角度，#n將我在那部作品中看到的缺點如實地講出來而已……有必要那麼生氣嗎！？"
10027010-65 = "不過每個人的個性不同，他會生氣……或許也情有可原……"
10027010-66 = "但要這麼說的話……我也不是沒有在反省啊……"
10027010-67 = "[s]「你們常常這樣吵架嗎？」"
10027010-68 = "雖然不能說經常……偶爾確實會意見不合。"
10027010-69 = "畢竟我跟紅葉的喜好不太一樣，而這個問題……#n在「我們圈裡」算是挺重要的。"
10027010-70 = "我本來以為這次也會像之前一樣……能夠馬上和好的……"
10027010-71 = "可是紅葉到現在都不接我電話……"
10027010-72 = "……"
10027010-73 = "我實在不知道該怎麼辦才好……"
10027010-74 = "我還是第一次看到紅葉那麼生氣……也是第一次看見他離開圖書館。"
10027010-75 = "老師，我現在該怎麼辦……？"
10027010-76 = "[s]「總之，先試著誠懇地跟他道歉怎麼樣？」"
10027010-77 = "如果這麼簡單就能解決的話，我就不用找老師過來了！"
10027010-78 = "我們兩個從一開始……對話的頻率就對不上……"
10027010-79 = "嗯？老師……你說你不這麼認為？"
10027010-80 = "[s4]「只要你願意誠心道歉、認真溝通的話，問題一定能順利解決的。」\n[s5]「如果這樣還是不行，我再陪你想別的辦法。」"
10027010-83 = "怎麼可能只要道歉就能解決所有問題……又不是在寫小說！"
10027010-84 = "不，就算是現在的網路小說，這樣寫肯定也是會被罵的！#n說超展開也要有限度之類的！"
10027010-85 = "[s]「如果道歉還不夠的話，愛瑠還有想到其他的方法嗎？」"
10027010-86 = "光是用嘴巴說說是不夠的……我必須想個更加具體的……"
10027010-87 = "和好計畫……然後靠這個計畫…… "
10027010-88 = "……"
10027010-89 = "《LUNA》……"
10027010-90 = "咦……？"
10027010-96 = "雖然因為一些原因，第二十二卷最終卷……有點一言難盡……"
10027010-97 = "竟然還問為什麼沒有最終卷？#n我才想問咧！！"
10027010-103 = "就是這個！"
10027010-104 = "老師！我想到了一個好點子！"
10027010-110 = "[ns]「我突然覺得有點不安，可以麻煩你詳細地把『好點子』告訴我嗎。」"
10027010-111 = "就是那個啊！#n我跟紅葉之所以會吵架，追根究底還是因為《LUNA》的關係嘛！"
10027010-112 = "紅葉離開後，我自己也查了一下……#n《LUNA》因為後期銷量越來越差的關係，最終卷的發行量相當稀少。"
10027010-113 = "想要找到它非常困難，所以第二十二卷最終卷……#n似乎也被稱作「夢幻的第二十二卷」之類的？"
10027010-114 = "既然如此，只要能找到《LUNA》的最終卷送給紅葉當禮物，#n他一定會明白我的真心，並且原諒我的！"
10027010-115 = "沒錯，這樣就對了！執行這個計畫吧！"
10027010-116 = "[s6]（雖然感覺沒必要做到那個地步……）\n[s7]（不過暫時就先照著愛瑠的話去做吧……）"
10027010-119 = "老師為什麼一句話也不說？#n嗯？你覺得我說的也有道理？"
10027010-120 = "果然老師就是好溝通！幸好有向老師求助！"
10027010-121 = "……你問要怎麼找到那本被稱作夢幻之書的《LUNA》最終卷？"
10027010-122 = "那種事不重要啦！#n重點是我們已經確定了目標！接下來只要付諸行動就行了！"
10027010-123 = "好，那我們現在就出發，以湊齊全套《LUNA》為目標吧！"
10027010-124 = "[s8]「沒想到你竟然會主動說要離開圖書館……」\n[s9]「愛瑠，老師開心到眼淚都要流出來了……」"
10027010-127 = "真沒禮貌！我只是比起去外面玩，更喜歡待在室內而已！"
10027010-128 = "什麼時候該行動、什麼時候能偷懶，這種事我還是分得出來的！"
10027010-129 = "那麼首先，我們該去的地方……就是那裡！"
10027010-135 = "中古書店街"
10027010-137 = "好久沒來這裡了呢。#n嗯～這熟悉的空氣……"
10027010-138 = "[s]「這裡是……！？」"
10027010-139 = "這裡是中古書店街，也是我們「知識解放戰線」經常來的地方。"
10027010-140 = "這裡不像其他書店只會販售近期熱門的書籍……#n就連非常老的書也能受到同等的尊重，所以我們也常常會來。"
10027010-141 = "雖然在這裡幾乎什麼都能找到……不過老師你要小心哦。"
10027010-142 = "對老師這樣的古書新手來說……這裡簡直就是一個吃人的坑！"
10027010-143 = "[s]「你說的這麼誇張，還真讓我有些害怕……」"
10027010-144 = "哼哼哼，既然老師還無法感同身受，就讓我來說個業界的鬼故事給你聽吧……！"
10027010-145 = "首先，這裡賣的是大多是年代已久的書籍，價格往往比市價高上許多，#n畢竟只要有一隻肥羊上鉤就夠了。"
10027010-146 = "而那些對市場行情一無所知的新手，就是店家們的主要目標。"
10027010-147 = "除了以高價販售的一般中古商品外，#n這裡也正大光明地販售著一些要是流到市面上……會引來許多麻煩的商品。"
10027010-148 = "而且也沒人能保證，那些東西全都是真貨……"
10027010-149 = "問我為什麼還這麼多人來？這個嘛……畢竟就算是見不得光的書，#n與其拿去資源回收變成再生紙，不如讓那些作品的粉絲擁有它們不是嗎？"
10027010-150 = "而且就算只是來這裡湊熱鬧，也沒有人會趕你走。"
10027010-151 = "總之！我相信這裡一定找得到《LUNA》的最終卷的！"
10027010-152 = "老師，你絕～對不能放開我的手，一定要緊緊跟著我哦？#n畢竟這裡……基本上就跟弱肉強食的Wild野生世界沒兩樣。"
10027010-153 = "[s]「Wild跟野生是同一個意思哦，愛瑠同學。」"
10027010-154 = "……哎呀，不要挑我語病嘛！"
10027010-166 = "[ns]「咦，這間店的外面是不是寫著圖書館？」"
10027010-167 = "……可能是因為店裡的書大部分都是從圖書館買來的吧。"
10027010-168 = "無論如何，我們現在的目標就只有《LUNA》第二十二卷！"
10027010-174 = "[ns]「我們已經在這裡找三個小時了……」"
10027010-175 = "想要找到自己想找的東西，費點體力不是理所當然的事嗎！"
10027010-176 = "不過，這裡的搜索確實已經差不多了……#n我們前往下一個地點吧！"
10027010-183 = "老師，你肯定沒看過這種連接走廊吧？#n只要通過這裡……"
10027010-184 = "就能抵達這個看似狹小，卻販售著真正年代久遠的書的書店哦。"
10027010-185 = "如果是這裡……肯定能找得到！"
10027010-193 = "[ns]「看來你的計畫好像失敗了呢，愛瑠隊長。」"
10027010-194 = "怎麼會……？#n我的計算明明完美無缺的啊……"
10027010-201 = "[ns]「感覺我們繞來繞去，最終好像繞回了原點。」"
10027010-202 = "這怎麼可能……都找到這個地步了，竟然還是連一點線索都沒有……"
10027010-203 = "《LUNA》……雖然早就聽聞過它的事蹟……#n沒想到竟然真的是這麼強勁的對手……！"
10027010-206 = "難怪覺得好像聽見了熟悉卻莫名讓人想迴避的聲音……#n果然是你啊，Meruri同學。"
10027010-208 = "這個聲音是……！？"
10027010-215 = "別來無恙，好久不見了吧？"

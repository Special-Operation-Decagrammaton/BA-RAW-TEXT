10027010-33 = "3;메루;00;……엄청난 행동력이네. 선생."
10027010-34 = "[s] \"무엇을 숨기랴. 일하기 싫었던 것이다.\""
10027010-35 = "3;메루;02;……결국엔 나중에 몰아서 하게 될 거잖아."
10027010-36 = "3;메루;01;파멸이 다가올 걸 알고 있어도, 당장을 피하고 싶어지는 게 사람 마음인 법이라고?\n#3;em;[?]"
10027010-37 = "3;메루;99;응……. 알지. 알아. 마감이 끝장난다는 걸 알고 있어도, 지금 노는 것을 선택한다든가…….\n#3;greeting"
10027010-38 = "3;메루;04;잠깐만. 왜 내가 자백하는 분위기야, 이거?!\n#3;em;[?!]\n#3;shake"
10027010-39 = "[s] \"거기에, 메루의 목소리가 심상치 않은 것 같았고.\""
10027010-40 = "3;메루;02;어, 내가……?"
10027010-41 = "3;메루;99;여유가 사라져 있었다고? 그렇게 티가 났던가, 나…….\n#3;em;…"
10027010-42 = "[s] \"그러고 보니, 모미지의 모습이 안 보이는데?\""
10027010-43 = "3;메루;04;아……."
10027010-44 = "3;메루;04;……."
10027010-45 = "3;메루;06;응……. 사실 그것 때문이었어. 선생에게 전화한 게.\n#3;em;[속상함]"
10027010-46 = "3;메루;06;있잖아. 선생."
10027010-47 = "3;메루;12;모미지가 도서관을…… 나가 버렸어.\n#3;closeup"

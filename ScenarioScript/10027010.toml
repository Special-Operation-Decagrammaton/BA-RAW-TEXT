[translation]
10027010-1 = "ตอนที่ 1;ประกาศหยุดงาน"
10027010-4 = "[ns1] \"ลั้ลล้า~ ขี้เกียจทำงานจัง~ ทำไมงานมีเป็นกองเลย~\"\n[ns2] \"ทำไมทำงาน แต่งานไม่ลดลงเลย~\"\n[ns3] \"งานแปลกๆ ก็มีให้เจอ~\""
10027010-14 = "ฮะ... ฮัลโหล ครู? ว้าว... วันนี้สีหน้าก็ดูไม่จืดเหมือนกันเลยแฮะ"
10027010-15 = "หรือว่าฉันไม่ควรโทรหาตอนยุ่งๆ นะ... สงสัยจะโทรผิดวันซะแล้ว งั้นวางละนะ..."
10027010-16 = "[s] \"เมรุ เป็นอะไรหรือเปล่า! เกิดเรื่องอะไรขึ้นเหรอ?!\""
10027010-17 = "ทะ... ทำไมอยู่ดีๆ ก็เอะอะขึ้นมาล่ะ? ว่าไงนะ? เห็นฉันเป็นห่วงคนอื่นขึ้นมา ก็เลยคิดว่าสงสัยจะเกิดเรื่อง#nใหญ่งั้นเหรอ?"
10027010-18 = "มองฉันเป็นคนยังไงเนี่ย! ฉันดูเหมือนคนที่! คนที่..."
10027010-19 = "ฮึ่ม ฮึ่ม... เอาเถอะ ตะ... แต่ก็จริงแหละ ไม่ใช่ว่าฉัน... ไม่มีเรื่องอะไรหรอก..."
10027010-20 = "อยากปรึกษาครูไหมน่ะเหรอ? เอ่อก็... ไม่ได้คิดไปถึงขนาดนั้นแฮะ ฟังดูแล้วก็เข้าท่าอยู่นะ..."
10027010-21 = "แต่ท่าทางครูก็ดูจะยุ่งมากๆ อยู่ด้วย ฉันว่าฉันไม่ควรจะรบกวนอะไรครูน่ะ ขืนรบกวนตอนนี้เดี๋ยวครูจะเป็น#nลมล้มพับไปซะก่อน..."
10027010-23 = "[ns] \"เดี๋ยวครูไปหาเดี๋ยวนี้เลย! รอก่อนนะ!\""
10027010-26 = "เอะ... เอ๋? ครู? ครู?!"
10027010-30 = "ห้องสมุดเรดวินเทอร์"
10027010-33 = "...พลังล้นเหลือเลยนะเนี่ย ครู"
10027010-34 = "[s] \"ขอบอกตามตรงละกัน ครูมาเพราะขี้เกียจทำงานน่ะ\""
10027010-35 = "...สุดท้ายแล้วก็จะดินพอกหางหมูแล้วก็ต้องมาทำอยู่ดีไม่ใช่เหรอ"
10027010-36 = "ต่อให้รู้อยู่แก่ใจว่างานจะรุมจนไฟลนก้น แต่ก็เป็นธรรมดาที่คนเราอยากหลีกเลี่ยงงั้นเหรอ?"
10027010-37 = "อืม... ฉันเข้าใจดีเลย ต่อให้รู้ดีว่าจวนจะถึงเดดไลน์แล้ว แต่ก็ยังเลือกที่จะไปเที่ยวเล่น..."
10027010-38 = "เดี๋ยวนะ ทำไมบรรยากาศมันเหมือนว่าฉันกำลังสารภาพอะไรอยู่ล่ะ?!"
10027010-39 = "[s] \"คำพูดคำจาของเมรุฟังดูแปลกๆ ไปนะ\""
10027010-40 = "หืม ฉันเหรอ...?"
10027010-41 = "เหมือนฉันรู้สึกประหม่างั้นเหรอ? ดูออกขนาดนั้นเลยเหรอเนี่ย..."
10027010-42 = "[s] \"จะว่าไป ไม่เห็นโมมิจิอยู่ด้วยกันเลยแฮะ?\""
10027010-43 = "อ่า..."
10027010-44 = "......"
10027010-45 = "อืม... ที่จริงเป็นเพราะเรื่องนั้นแหละ ฉันก็เลยโทรไปหาครูน่ะ"
10027010-46 = "คือว่า... ครู"
10027010-47 = "โมมิจิ... ออกจากห้องสมุดไปแล้วน่ะ"
10027010-51 = "[ns] \"เรื่องมันเป็นมายังไงกันน่ะ?\""
10027010-52 = "เรื่องก็มีอยู่ว่า..."
10027010-61 = "[ns] \"อืม... เป็นความผิดเมรุแฮะ\""
10027010-62 = "ครูก็เป็นไปกับเขาด้วยเหรอ?!"
10027010-63 = "พอพูดไปแบบนั้นแล้ว... ฉันเองก็สำนึกผิดอยู่หรอกนะ... ว่าตัวเองก็พูดแรงไป... นิ๊ดดดหนึ่ง"
10027010-64 = "แต่ในฐานะของนักสร้างสรรค์คนหนึ่ง! ฉันก็แค่พูดวิจารณ์ผลงานในจุดที่ตัวเองคิดว่าบกพร่องก็เท่านั้น#nเอง ไม่เห็นจะต้องโกรธกันขนาดนั้นเลยนี่?!"
10027010-65 = "...ไม่สิ จริงๆ มันก็... ในบางกรณีก็อาจจะโกรธกันบ้างก็ได้..."
10027010-66 = "แต่นั่นก็ไม่ได้หมายความว่า... ฉันไม่ได้สำนึกผิดอยู่นะ..."
10027010-67 = "[s] \"ปกติทะเลาะกันบ่อยไหม?\""
10027010-68 = "ก็ไม่ถึงกับบ่อยหรอก... แต่ก็ไม่ใช่ว่าจะไม่มีปากเสียงกันเลยน่ะ "
10027010-69 = "โมมิจิกับฉันมีรสนิยมที่ค่อนข้างแตกต่างกัน และปัญหาเรื่องรสนิยม... ก็เป็นเรื่องสำคัญของ 'ทางนี้'"
10027010-70 = "ที่ผ่านมาเราเคยทะเลาะกันเพราะเรื่องนี้อยู่บ้าง... ฉันก็เลยคิดว่าครั้งนี้เราก็คงจะคืนดีกันได้ทันทีเหมือน#nเมื่อก่อน"
10027010-71 = "แต่ว่าโมมิจิไม่ยอมรับโทรศัพท์ฉันเลยน่ะ..."
10027010-72 = "......"
10027010-73 = "ฉันไม่รู้เลยว่าต้องทำยังไงดี..."
10027010-74 = "ฉันเพิ่งจะเคยเห็นโมมิจิโมโหแบบนั้นเป็นครั้งแรก และนี่ก็เป็นครั้งแรกด้วยที่เธอออกไปจากห้องสมุด#nด้วยตัวเอง"
10027010-75 = "เอายังไงดีล่ะครู...?"
10027010-76 = "[s] \"ไปขอโทษจากใจจริงดูก่อนไหม?\""
10027010-77 = "ถ้ามันคลี่คลายง่ายดายขนาดนั้น ฉันคงไม่โทรมาหาครูหรอก!"
10027010-78 = "เดิมที... ฉันไม่คิดว่าพูดไปแล้วมันจะเวิร์กตั้งแต่แรกแล้ว..."
10027010-79 = "หืม? ครูไม่คิดอย่างนั้นเหรอ?"
10027010-80 = "[s4] \"อืม ถ้าขอโทษอย่างจริงใจ ก็จะเป็นไปได้ด้วยดีเอง\"\n[s5] \"แต่ถ้ายังไม่ได้ผล ครูจะช่วยอีกแรง\""
10027010-83 = "ลำพังแค่คำขอโทษอย่างจริงใจ มันไม่มีทางเป็นไปได้ด้วยดีหรอก! เรื่องแบบนั้นน่ะมันมีแค่ในนิยาย#nเท่านั้นแหละ!"
10027010-84 = "ไม่สิ ถ้านิยายออนไลน์มีเนื้อหาแบบนั้น คนอ่านได้พากันสาปแช่งหมดแน่! เผลอๆ จะพากันมา#nคอมเมนต์ด้วยอีกว่าโลกสวยเกินไป!"
10027010-85 = "[s] \"งั้นถ้าแค่ขอโทษยังไม่พอ เมรุคิดว่าต้องทำอะไรล่ะ?\""
10027010-86 = "แค่คำพูดยังไม่พอ... ต้องหาอะไรที่เป็นรูปธรรมหน่อย..."
10027010-87 = "วิธีคืนดี... วิธีคืนดีที่เป็นรูปธรรม... "
10027010-88 = "......"
10027010-89 = "<ลูน่า>..."
10027010-90 = "หืม?"
10027010-96 = "แต่ด้วยเหตุผลหลายอย่าง ทำให้เล่ม 22 ที่เป็นเล่มจบบริบูรณ์ต้องเจอชะตากรรมแบบนั้น..."
10027010-97 = "ถามมาได้ว่าทำไมไม่มีเล่มจบบริบูรณ์ ฉันต่างหากค่ะที่อยากถามแบบนั้น!!"
10027010-103 = "อันนั้นแหละ!"
10027010-104 = "ครู! ฉันมีความคิดดีๆ แล้ว!"
10027010-110 = "[ns] \"ครูชักจะกังวลแล้วสิ ขอถามได้ไหมว่า 'อันนั้น' ของเมรุคืออะไร?\""
10027010-111 = "ก็แบบนี้ยังไงล่ะ! ที่ฉันกับโมมิจิทะเลาะกัน เป็นเพราะ <ลูน่า> นั่น!"
10027010-112 = "หลังจากทะเลาะกับโมมิจิ ฉันก็ไปหาข้อมูลมา ยิ่งเข้าตอนหลังๆ ยอดขายของ <ลูน่า> ก็ยิ่งตกต่ำลง ทำให้เล่มจบบริบูรณ์ถูกพิมพ์แค่ไม่กี่เล่มเท่านั้น"
10027010-113 = "และเพราะแบบนี้เอง เล่ม 22 ที่เป็นเล่มจบก็เลยหายากเป็นพิเศษ... จนได้ชื่อว่าเป็น 'เล่ม 22 ในฝัน'!"
10027010-114 = "ฉันจะหา <ลูน่า> เล่มจบบริบูรณ์แล้วเอาไปให้โมมิจิเป็นของขวัญ แบบนี้ก็จะเป็นทั้งการส่งความจริงใจ และเป็นการขอคืนดีได้ด้วย!"
10027010-115 = "ใช่เลย วิธีนี้แหละ! เอาตามนี้เลย!"
10027010-116 = "[s6] (ต้องทำถึงขนาดนั้นเลยเหรอ...)\n[s7] (เอาตามที่เมรุเสนอก่อนแล้วกัน...)"
10027010-119 = "ทำไมไม่พูดอะไรเลยล่ะครู? หืม? เห็นด้วยกับวิธีของฉันเหรอ?"
10027010-120 = "กะไว้แล้วเชียวว่าครูต้องเข้าใจ! ฉันทำถูกแล้วละที่ขอให้ครูช่วย!"
10027010-121 = "ว่าแต่... ต้องทำยังไงถึงจะหา <ลูน่า> เล่มจบบริบูรณ์ที่ได้ชื่อว่าเป็นหนังสือในฝันได้นะ?"
10027010-122 = "เรื่องกระบวนการไม่สำคัญหรอก! ที่สำคัญคือเป้าหมายถูกกำหนดไว้แล้วต่างหาก! ที่เหลือก็แค่เข้าสู่#nการลงมือทำ!"
10027010-123 = "จากนี้เราจะออกสำรวจเพื่อทำให้หนังสือชุด <ลูน่า> สมบูรณ์ให้ได้!"
10027010-124 = "[s8] \"คิดไม่ถึงเลยแฮะว่าเมรุจะชวนไปข้างนอก...\"\n[s9] \"ครูคนนี้ซาบซึ้งจนน้ำตาจะไหลแล้ว...\""
10027010-127 = "เสียมารยาทนะเนี่ย! ถึงฉันจะชอบอยู่แต่ในห้องมากกว่าออกไปข้างนอกก็เถอะ!"
10027010-128 = "แต่ฉันก็แยกแยะออกนะว่าตอนไหนควรลุกขึ้นมาทำอะไร หรือตอนไหนต้องอยู่เฉยๆ น่ะ!"
10027010-129 = "ก่อนอื่นเลย ที่ที่เราต้องไปก็คือ... ที่นี่!"
10027010-135 = "ถนนร้านหนังสือมือสอง"
10027010-137 = "ไม่ได้มาตรงนี้นานแล้วแฮะ ฮืม อากาศที่คุ้นเคย"
10027010-138 = "[s] \"ที่นี่คือ...?!\""
10027010-139 = "ถนนร้านหนังสือมือสองไง พวกเราชาว <ชมรมแนวร่วมปลดปล่อยความรู้> เป็นลูกค้าประจำของที่นี่เลย"
10027010-140 = "ร้านหนังสือที่นี่ต่างจากร้านอื่นๆ ที่ขายแต่หนังสือขายดีในตอนนั้นเท่านั้น... ที่นี่ยังมีหนังสือเก่าๆ ด้วยนะ หลายครั้งเลยละที่ฉันรู้สึกขอบคุณที่เขาไม่เลือกปฏิบัติต่อหนังสือ"
10027010-141 = "ถึงจะมีความเป็นไปได้สูงว่าเราจะหาซื้อทุกอย่างได้จากที่นี่... แต่ยังไงก็ระวังไว้หน่อยก็ดี "
10027010-142 = "โดยเฉพาะมือใหม่อย่างครูน่ะ... อาจจะเผลอตกไปในวังวนขุมนรกแห่งการดองหนังสือเลยก็ได้!"
10027010-143 = "[s] \"ดูพูดเข้าสิ ขู่ซะน่ากลัวเชียว...\""
10027010-144 = "ฮิฮิฮิ ยังไม่เข้าใจสินะ เห็นทีฉันคงต้องอธิบายด้านมืดอย่างหนึ่งของวงการนี้ให้ครูฟังแล้วละ...!"
10027010-145 = "ก่อนอื่นเลยก็ ถ้าหากว่าหนังสือนั้นเป็นหนังสือเก่าๆ ก็จะติดราคาที่ต่างออกไปจากราคาตลาดในตอน#nนั้นอย่างสิ้นเชิง เคสแบบนี้มีให้เห็นเยอะเลยละ"
10027010-146 = "เป้าหมายของร้านพวกนี้คือนักอ่านมือใหม่ที่ไม่รู้ราคาตลาดและอ่อนต่อโลกน่ะ"
10027010-147 = "นอกจากหนังสือมือสองทั่วไปที่ขายในราคาพิเศษแล้ว ยังมีหนังสืออื่นที่ถ้าเผยแพร่ออกไปข้างนอก#nแล้วจะเกิดปัญหาตามมาด้วย"
10027010-148 = "...แล้วก็รับประกันไม่ได้ด้วยนะว่าในบรรดาหนังสือพวกนั้นจะไม่มีหนังสือปลอมน่ะ..."
10027010-149 = "แต่ทำไมคนก็ยังมาหาซื้อหนังสือจากที่นี่อยู่น่ะเหรอ? ก็... อย่างพวกหนังสือที่ไม่ควรเผยแพร่สู่สายตา#nชาวโลก ถ้าจะให้ถูกทิ้งจนเป็นกระดาษรีไซเคิล สู้ให้ไปอยู่ในมือแฟนๆ ไม่ดีกว่าเหรอ?"
10027010-150 = "และต่อให้มาเดินดูอย่างเดียวโดยที่ไม่ได้ซื้อกลับไป ก็ไม่มีใครว่าอะไรด้วย "
10027010-151 = "เอาเถอะ! ถ้าเป็นที่นี่ละก็ ฉันว่าต้องหา <ลูน่า> เล่มจบบริบูรณ์ได้แน่นอน! "
10027010-152 = "จับมือฉันเอาไว้แล้วเดินตามมาให้ดีๆ นะ ที่นี่น่ะ... เป็นพื้นที่โหดร้ายป่าเถื่อน ที่แต่ละคนต้องเอาตัวรอด#nกันด้วยตัวเอง!"
10027010-153 = "[s] \"โหดร้ายกับป่าเถื่อนมันก็เหมือนๆ กันนะ  เมรุ\""
10027010-154 = "...เอาเถอะน่า!"
10027010-166 = "[ns] \"มีอันที่เขียนว่าห้องสมุดอยู่ด้วยแฮะ?\""
10027010-167 = "...คงเป็นไปได้ว่าน่าจะรับหนังสือจากห้องสมุดมาแบบลวกๆ อีกทีน่ะ"
10027010-168 = "เอาเป็นว่าจากนี้เราจะมาตามหากันอย่างจริงๆ จังๆ กันแล้ว! ฉันต้องเจอเธอให้ได้เลย <ลูน่า> เล่ม 22!"
10027010-174 = "[ns] \"นี่เราเดินหาหนังสือมา 3 ชั่วโมงแล้วนะ...?\""
10027010-175 = "ถะ... ถ้าจะหาหนังสือที่อยากได้ มันก็ต้องอดทนเดินหาแบบนี้แหละ!"
10027010-176 = "ว่าแต่ฝั่งนี้เหมือนว่าเราจะเดินหากันทั่วแล้วนะ... งั้นก็ไปสถานที่ต่อไปกันเลย!"
10027010-183 = "ไม่รู้ใช่ไหมล่ะว่ามีทางเดินเชื่อมกันแบบนี้ด้วย? ถ้าผ่านตรงนี้ไป..."
10027010-184 = "ถึงมันจะดูเล็กไปหน่อย แต่ร้านนี้มีแต่หนังสือเก่าเท่านั้นเลยนะ"
10027010-185 = "ถ้าเป็นที่นี่ละก็... ต้องหาเจอแน่นอน!"
10027010-193 = "[ns] \"น่าจะล้มเหลวแล้วนะ หัวหน้าเมรุ\""

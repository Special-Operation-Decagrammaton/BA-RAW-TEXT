[translation]
10027010-1 = "Episode 1;Announcing a Strike"
10027010-4 = "[ns1] \"Ugh! The work never ends, does it?\"\n[ns2] \"No matter how much I do, there's always more.\"\n[ns3] \"Just great!!\""
10027010-14 = "Uh... Sensei? Wow, you don't look so good."
10027010-15 = "You're clearly busy today... I-I can call back another time..."
10027010-16 = "[s] \"Meru, what's wrong? Is there some problem?!\""
10027010-17 = "N-No need to make a fuss! Just because I'm self-conscious doesn't mean there's a problem."
10027010-18 = "I mean, really. What do you take me for? Am I that, that..."
10027010-19 = "Oh, who am I kidding? You're right. There is something..."
10027010-20 = "It hadn't really occurred to me before, but I suppose I could use some advice."
10027010-21 = "But you look busy, and I don't want to inconvenience you, Sensei. You look like you're about to pass out."
10027010-23 = "[ns] \"I'll be right there! Just hang tight!\""
10027010-26 = "H-Huh? Sensei? Sensei?!"
10027010-30 = "Red Winter Library"
10027010-33 = "You were so quick to act, Sensei."
10027010-34 = "[s] \"What can I say? I'm procrastinating.\""
10027010-35 = "...You know you'll end up having to pull an all-nighter to get it done."
10027010-36 = "But I suppose that's just human nature. We'll do anything to delay the inevitable as long as possible."
10027010-37 = "I understand. You know the deadline is coming, but you still just want to have fun..."
10027010-38 = "Heh. It sounds like I'm confessing something."
10027010-39 = "[s] \"Are you? You sounded very serious.\""
10027010-40 = "Did I?"
10027010-41 = "I am a little stressed, but... Was it that obvious?"
10027010-42 = "[s] \"A bit. I notice Momiji isn't with you.\""
10027010-43 = "Ah..."
10027010-44 = "..."
10027010-45 = "Yeah... That's why I called you, Sensei."
10027010-46 = "Um..."
10027010-47 = "Momiji...left the library."
10027010-51 = "[ns] \"Ah. You want to tell me what happened?\""
10027010-52 = "Well, you see..."
10027010-61 = "[ns] \"Hm... Meru, I think you're in the wrong on this one.\""
10027010-62 = "What?! Why are you taking her side?!"
10027010-63 = "I mean, afterward, I did wonder if I went a little too far."
10027010-64 = "But I'm a creator too! I just stated my professional opinion. The story was lacking! It's nothing to get angry about!"
10027010-65 = "Well, I suppose someone else might think differently..."
10027010-66 = "And I did reflect on it... It's not like I didn't..."
10027010-67 = "[s] \"Do you two argue often?\""
10027010-68 = "Not that often. Sure, we disagree from time to time. "
10027010-69 = "But Momiji and I just have different opinions on things. In a job like this, you can't NOT have strong opinions."
10027010-70 = "It seemed like any other disagreement we've had. I figured we would make up eventually."
10027010-71 = "But Momiji isn't answering her phone..."
10027010-72 = "..."
10027010-73 = "I don't know what to do."
10027010-74 = "I've never seen Momiji that angry. And she's never run out of the library like that."
10027010-75 = "What should I do, Sensei?"
10027010-76 = "[s] \"Why don't you try being honest and apologizing?\""
10027010-77 = "If I thought that would work, I wouldn't have called you, Sensei!"
10027010-78 = "It's always been like this. Nothing I say gets through to her..."
10027010-79 = "Huh? You disagree?"
10027010-80 = "[s4] \"Give her a sincere apology, and it'll be fine.\"\n[s5] \"And if that doesn't work, I'll step in and help.\""
10027010-83 = "This isn't some story in a novel! There's no way a sincere apology is enough!"
10027010-84 = "I mean, even if it were a novel, people would say it was too shallow...simplistic even!"
10027010-85 = "[s] \"Well, then what do you think you should do, Meru?\""
10027010-86 = "Talking to her isn't enough. I need a more methodical approach..."
10027010-87 = "Some kind of reconciliation formula... "
10027010-88 = "..."
10027010-89 = "\"Luna\"..."
10027010-90 = "Hm..."
10027010-96 = "The final volume, Volume 22, took kind of a turn, but..."
10027010-97 = "I just wanted to know why there's no final volume to wrap up the story."
10027010-103 = "That's it!"
10027010-104 = "Sensei! I know what to do!"
10027010-110 = "[ns] \"I thought I'd check in and see how that idea of yours is working out, Meru.\""
10027010-111 = "Great! It's like this! You know how Momiji and I fought over the \"Luna\" story?"
10027010-112 = "Well, after that, I did some research. It turns out that the reason nobody can get that final volume is because sales at the time were terrible, so they only printed a few copies of it."
10027010-113 = "Now they're extremely rare—so much so that it's known as The Elusive \"Luna\" Volume 22!"
10027010-114 = "If I can get my hands on a copy of the final volume, Momiji will have to forgive me!"
10027010-115 = "It's the perfect plan! I'm sure it'll work!"
10027010-116 = "[s6] \"(That might be a little extreme, but...)\"\n[s7] \"(I could go along with Meru's plan for now...)\""
10027010-119 = "You're awfully quiet, Sensei. I guess that means you have no objections!"
10027010-120 = "Ah! You always understand me! I'm so glad I asked for your help, Sensei!"
10027010-121 = "Now I just have to figure out how to get my hands on such a rare book..."
10027010-122 = "At least we have a goal! If I take it one step at a time, I'm sure a solution will come to me."
10027010-123 = "Our quest to complete the \"Luna\" set starts now!"
10027010-124 = "[s8] \"Your first thought was to go outdoors?\"\n[s9] \"I'm so proud! I could cry tears of joy!\""
10027010-127 = "Tch! I'm not a shut in! Sure, I prefer the indoors, but still!"
10027010-128 = "I know when it's time to go out and get some fresh air!"
10027010-129 = "Now, our first stop should be...here!"
10027010-135 = "The Used Books District"
10027010-137 = "I haven't been here in ages! Mm... Smells just like I remember."
10027010-138 = "[s] \"What is this place?!\""
10027010-139 = "It's a whole street dedicated to used books. The Knowledge Liberation Front comes here all the time."
10027010-140 = "You see, these aren't your typical bookstores... They specialize in rare and out-of-print books!"
10027010-141 = "Doesn't matter how old a book is or what it's about. You can find it here. Just...be careful.  "
10027010-142 = "This place is pretty cutthroat. They eat newbies like you for breakfast!"
10027010-143 = "[s] \"That's, uh... That's terrifying...\""
10027010-144 = "Heeheehee. I guess you never got the memo about the industry's dark side, huh, Sensei? I can explain."
10027010-145 = "The first thing you need to know is that everything here is marked up like crazy, because sellers expect to negotiate."
10027010-146 = "So they love it when naive buyers come around."
10027010-147 = "Then there's the fact that not everything they're selling is strictly legal...or safe. It would cause major problems if the authorities caught wind."
10027010-148 = "And no regulation means the less reputable sellers try to pass off fakes to unsuspecting buyers."
10027010-149 = "Hahaha! You want to know why we come here anyway? Well, regardless of quality or legality or even safety, it's better for collectors to keep it than to let it end up in a landfill somewhere, right?"
10027010-150 = "And last, if all you're doing is window-shopping, no one will bother you. "
10027010-151 = "And with that, here we are—the shop that will have the final volume of \"Luna\"!"
10027010-152 = "But...this place can get pretty rough. It's the wild west in there—survival of the fittest! So...you should probably hold my hand for safety."
10027010-153 = "[s] \"I'm not sure I'd call a bookshop the wild west, Meru dear.\""
10027010-154 = "Uh... Anyway!"
10027010-166 = "[ns] \"Why does this book have 'Library' on it?\""
10027010-167 = "Oh, that probably came from a library, and they forgot to remove the tag."
10027010-168 = "Let's start searching, okay? Volume 22 of \"Luna\", here we come!"
10027010-174 = "[ns] \"We've been searching for three hours now...?!\""
10027010-175 = "I-If you want to find a needle in a haystack, you have to do a lot of looking."
10027010-176 = "That said, I think we've done all we can on this side of the street. Let's go to the next place!"
10027010-183 = "I bet you didn't notice this alley before, did you? If we go through here..."
10027010-184 = "It's a tight squeeze, but the bookshop through here has some really old stuff."
10027010-185 = "If that book is anywhere, it'll be there!"
10027010-193 = "[ns] \"I'm afraid we've failed our mission, Captain Meru.\""
10027010-194 = "How? My plan was perfect!"
10027010-201 = "[ns] \"It feels like we're back to square one.\""
10027010-202 = "This is ridiculous! All that searching and we still don't have a clue where to find it?!"
10027010-203 = "The rumors said she was elusive. But this is beyond my expectations. \"Luna\" is quite the formidable opponent!"
10027010-206 = "I thought I recognized your voice. How unfortunate that I ran into you here... Meruri."
10027010-208 = "That voice!"
10027010-215 = "It's been quite some time. How are you?"

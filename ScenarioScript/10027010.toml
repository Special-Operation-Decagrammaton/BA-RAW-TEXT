10027010-61 = "[ns] \"음…… 메루가 잘못했네.\""
10027010-62 = "3;메루;04;선생까지 그런 말을 하기야?!\n#3;em;[?!]\n#3;shake"
10027010-63 = "3;메루;05;나도 말한 뒤에는…… 쪼오끔, 말이 심했나?! 하고 자기반성을 하기도 했지만."
10027010-64 = "3;메루;09;그래도 한 명의 창작자로서! 어디까지나 작품에서 느껴졌던 아쉬운 점을 나름대로의 시점에서 평가하고 말했을 뿐인데. 그게 그렇게까지 화를 낼 일이야?!\n#3;em;[스팀]\n#3;hophop"
10027010-65 = "3;메루;07;……아니, 경우에 따라서는 낼 수도…… 있을지도 모르지만……\n#3;stiff"
10027010-66 = "3;메루;09;그런 점에서는 나도 반성을…… 하고 있지 않은 건, 또 아니지만……\n#3;stiff\n#3;em;[속상함]"
10027010-67 = "[s] \"자주 그렇게 싸워?\""
10027010-68 = "3;메루;99;자주까지는 아니지만……. 부딪히는 경우가 없지는 않았지. "
10027010-69 = "3;메루;05;아무래도 모미지와 나는 취향이 좀 다르기도 하고. 취향 문제는…… '이쪽'에서는 꽤나 중요한 부분이니까.\n#3;em;[!]"
10027010-70 = "3;메루;06;그래도 이전에도 몇 번 싸웠던 것처럼…… 이번에도 그냥 어쩌다 이런 거고, 바로 화해할 수 있을 줄 알았는데."
10027010-71 = "3;메루;12;모미지, 전화도 안 받고 있고……."
10027010-72 = "3;메루;12;…….\n#3;em;…"
10027010-73 = "3;메루;06;어떻게 하면 좋을지 모르겠어…….\n#3;stiff"
10027010-74 = "3;메루;12;그렇게 화를 내는 모미지도 처음 봤고, 도서관을 자기 발로 뛰쳐나간 것도 처음이고."
10027010-75 = "3;메루;06;어쩌면 좋지……? 선생.\n#3;em;[?]"
10027010-76 = "[s] \"일단, 솔직하게 사과해 보는 건 어때?\""
10027010-77 = "3;메루;10;그 정도로 해결될 문제면 선생을 부르지도 않았어!\n#3;em;[!]"
10027010-78 = "3;메루;09;애초에…… 이야기가 제대로 통할 것 같지가 않단 말이야……\n#3;stiff"
10027010-79 = "3;메루;04;응? 선생은…… 그렇게 생각하지 않는다고?"
10027010-80 = "[s4] \"응. 진심을 담아 사과하고 대화를 나누면, 잘될 거야.\"\n[s5] \"그러고도 안 되면, 나도 같이 노력해 볼게.\""
10027010-81 = "#wait;100"
10027010-82 = "#wait;100"
10027010-83 = "3;메루;04;진심을 다한 사과만으로 모든 게 다 잘될 리 없잖아! 무슨 소설 속 이야기냐고!\n#3;hophop"
10027010-84 = "3;메루;05;아니, 요즘 인터넷 소설도 그렇게 전개하면 욕먹어! 무슨 편의주의 전개냐고 악플이 달릴걸?!\n#3;em;[!]"
10027010-85 = "[s] \"그럼 사과만으로 부족하다면, 메루는 어떻게 해야 한다고 생각하는데?\""
10027010-86 = "3;메루;99;말만으로는 부족할 거야…… 좀 더 구체적으로……\n#3;m2"

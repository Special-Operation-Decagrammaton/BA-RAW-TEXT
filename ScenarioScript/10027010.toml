10027010-13 = "3;메루;01\n#3;a\n#3;sig\n#wait;1200"
10027010-14 = "3;메루;02;어…… 여보세요. 선생? 우와…… 오늘도 안색이 완전 엉망이네.\n#3;sig\n#3;em;[반응]"
10027010-15 = "3;메루;01;바쁜데 괜히 전화한 건가…… 오늘은 날이 아니었나 보네. 끊을게…….\n#3;sig\n#3;greeting"
10027010-16 = "[s] \"메루, 왜 그래! 무슨 큰일이라도 났어?!\""
10027010-17 = "3;메루;04;가, 갑자기 웬 호들갑이야? 뭐? 내가 다른 사람 눈치를 보는 날이 오다니, 그거야말로 큰일이 일어난 증거인 것 같았다고?\n#3;em;[?!]\n#3;shake\n#3;sig"
10027010-18 = "3;메루;05;날 뭐라고 생각하는 거야! 내가 그렇게! 그렇게…….\n#3;sig\n#3;stiff"
10027010-19 = "3;메루;06;……흠, 흠. 아무튼. 뭐…… 맞아. 무슨 일이…… 없는 건 아니긴 해……\n#3;sig\n#3;em;[속상함]"
10027010-20 = "3;메루;02;상담이 필요하냐고? 어…… 거기까지는 생각 못 해봤는데, 듣고 보니 그런 것 같기도 하네…….\n#3;sig"
10027010-21 = "3;메루;01;하지만 선생은 바빠 보인달까, 건드리면 안 될 것 같고. 지금도 건드리면 기절할 것 같고…….\n#3;sig\n#3;em;…"
10027010-22 = "#all;hide"
10027010-23 = "[ns] \"곧바로 갈게! 기다려!\""

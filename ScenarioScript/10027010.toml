10027010-137 = "3;메루;00;오랜만이구만, 여기도. 으음. 이 익숙한 공기.\n#3;em;[재잘]"
10027010-138 = "[s] \"이곳은……?!\""
10027010-139 = "3;메루;01;중고 서점거리지. 우리 <지식해방전선>이 단골로 찾는 곳이기도 하고."
10027010-140 = "3;메루;03;그때그때 잘 팔리는 책만을 취급하는 다른 서점들과는 달리…… 정말로 오래된 책들도 차별 없이 다뤄 줘서 고마울 때가 많단 말이야.\n#3;em;[음표]"
10027010-141 = "3;메루;01;구할 수 있는 것이라면 뭐든 구할 수 있는 가능성을 갖고 있지만…… 조심하라고. "
10027010-142 = "3;메루;05;선생 같은 초심자에게는 그야말로……. 개미지옥 구덩이 같은 곳이니까!\n#3;em;[!]"
10027010-143 = "[s] \"그 무시무시한 비유가 두렵구만…….\""
10027010-144 = "3;메루;00;훗훗훗. 아직 감이 오지 않는 선생에게, 업계의 어둠 중 하나에 대해 설명해 줘야 할 때가 온 것 같네……!\n#3;em;[반짝]"
10027010-145 = "3;메루;01;우선 오래된 책 같은 경우, 대부분 한 놈만 걸려라 식으로 시세랑 완전히 동떨어진 가격으로 진열되는 케이스가 많아."
10027010-146 = "3;메루;03;시세 감각 없고 물정 모르는 초심자들이 주요 타깃이지.\n#3;em;[재잘]"
10027010-147 = "3;메루;99;일반 중고 상품도 대부분 프리미엄 가격으로 판매되고 있는 데다, 외부로 유출되면…… 여러모로 곤란한 상품들도 버젓이 팔리고 있기도 하고."
10027010-148 = "3;메루;02;……그것들 중 가짜가 없을 거란 보장도 없지……."
10027010-149 = "3;메루;03;그런데도 왜 다들 여기를 찾는 거냐고? 뭐, 세상에 나가면 안 되는 책이라도, 폐지 수거에 버려져 재생지가 될 바에야, 그 작품의 팬들에게 가는 게 차라리 낫잖아?\n#3;em;[?]"
10027010-150 = "3;메루;00;결정적으로 구경하는 것만이라면 아무도 뭐라고 하지 않으니까. "
10027010-151 = "3;메루;02;아무튼! 여기라면 분명 구할 수 있을 거야! 그 <루나>의 완결권을!\n#3;m2"
10027010-152 = "3;메루;03;내 손 꼭 잡고 잘 따라와야 한다고? 여기는…… 그야말로 각자 알아서 살아남아야 하는, 와일드한 야생 그 자체니까!\n#3;em;[음표]\n#3;m1"
10027010-153 = "[s] \"와일드는 이미 야생이라는 뜻입니다. 메루 학생.\""
10027010-154 = "3;메루;10;……아무튼!\n#3;em;[!]"

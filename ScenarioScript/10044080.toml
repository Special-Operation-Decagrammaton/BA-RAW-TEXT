[translation]
10044080-1 = "第8話;該做的事沒有改變"
10044080-2 = "……"
10044080-3 = "那，那個……這樣真的沒關係嗎……？"
10044080-4 = "怎麼了～？"
10044080-5 = "我，我是說……那些正在運送的貨物……！"
10044080-6 = "所以怎麼了嗎～？"
10044080-7 = "沒，沒什麼……#n可能只是我想太多而已……"
10044080-8 = "吼唷，你這樣讓人很煩躁耶！乾脆點說出來！"
10044080-12 = "……一般要運送高價貴重物品的時候，會特別選這種貨物列車嗎？"
10044080-13 = "不曉得耶？應該不會吧？"
10044080-14 = "對，對吧！為什麼要用這種……平常用來載產業原料的列車載那麼貴的東西……？"
10044080-15 = "而且事前還完全沒說內容物是什麼……？#n這太奇怪了……"
10044080-16 = "其實有說～只是沒聽進去哦～？"
10044080-17 = "對，對方說不定連兩位幹部這種粗心的特質都考慮到了……？"
10044080-19 = "我只是在想，這會不會是什麼陰謀……"
10044080-24 = "噗哈哈！你是不是漫畫看太多啦？"
10044080-26 = "不，不要這樣用吐槽帶過！#n雖，雖然我確實看了很多漫畫沒錯！"
10044080-27 = "但為什麼這輛車偏偏會遇到一連串的意外……#n像是發車系統故障，克洛盧斯集中報導，被各種問題學生追趕之類的……！"
10044080-28 = "這，這一切真的是偶然嗎？"
10044080-29 = "發車系統故障還不好說，後面的部分不是我們自己搞砸的嗎？"
10044080-30 = "如，如果那也是有人刻意安排的呢？"
10044080-36 = "總覺得有某股黑暗勢力……在暗中操弄一無所知的我們。"
10044080-37 = "你，你們有聽說過嗎？#n有人會利用高價美術品或藝術品之類的東西來洗，洗錢。"
10044080-38 = "啊，光有聽說過～"
10044080-39 = "要，要是我們被捲入足以撼動奇普托斯的巨大陰謀的話……！！"
10044080-40 = "老，老師您怎麼看？#n不覺得可疑嗎……？"
10044080-41 = "[s1]「聽起來的確有點……」\n[s2]「這個嘛……」"
10044080-44 = "還有那些暴走族！那些暴走族也很奇怪……！#n為什麼要一路緊追著我們不放呢？"
10044080-45 = "要，要說是為了報披薩的仇實在有點……背後肯定還有什麼原因……！！"
10044080-46 = "說不定～是我們的粉絲～？"
10044080-47 = "那怎麼可能……"
10044080-48 = "[ns]「青葉你想怎麼做？」"
10044080-49 = "……"
10044080-50 = "我，我倒也沒有想怎麼做。#n只是，只是……"
10044080-51 = "我擔心這些東西……會不會被用在什麼不好的事情上……"
10044080-52 = "如果真的是那樣的話，負責運送的我們不是也有責任嗎……？"
10044080-53 = "假如我們運送的貨物被拿來做壞事……繼續運送下去真的是正確的嗎……"
10044080-54 = "我，我只是在想這些事而已……"
10044080-58 = "唔嗯，我能理解你的擔心。#n實際上也確實有發生過這種情況。"
10044080-59 = "不過我們該做的事情並沒有改變。"
10044080-60 = "我們該做的事……？"
10044080-61 = "答應別人提出的請求，把貨物送到目的地。"
10044080-62 = "就這麼簡單不是嗎？"
10044080-63 = "是，是這麼說沒錯……"
10044080-65 = "不是要你不經思考～也不是要你照單全收～"
10044080-66 = "只是決定要做的事～就該確實做好～"
10044080-67 = "這是身為管理鐵道的高地人學生，最應該具備的責任感。"
10044080-69 = "責任感……"
10044080-70 = "而且～沒必要太在意自己不了解的事～"
10044080-71 = "不懂就是不懂～思考只會帶來壓力～"
10044080-72 = "我才不想聽壓力的來源跟我說這種話……"
10044080-73 = "……"
10044080-74 = "不，不過……好像稍微安心了一點點……"
10044080-75 = "噗哈哈，對吧？#n不用太擔心啦，總會有辦法的！！"
10044080-76 = "那種無憂無慮、歡樂至上的心態，我倒是挺想效仿的……"
10044080-78 = "[ns3]「雖然我個人認為義務和責任是大人的事……」\n[ns4]「不過我也明白學生們的心情。」"
10044080-82 = "[ns5]「如果那是你們自己下的決定……」\n[ns6]「我就會以老師的身分為你們全力加油。」"
10044080-85 = "噗哈哈！就是說啊，不會少一塊肉的啦。#n敞開心胸接受老師的加油吧？"
10044080-86 = "老師～換上啦啦隊服吧～"
10044080-87 = "老師的意思是，尊重學生自己的決定嗎……"
10044080-91 = "唉……有道理。#n反正就算在這裡窮擔心也沒什麼意義……"
10044080-92 = "現在最重要的還是完成運送任務……"
10044080-93 = "[s]「嗯，至於貨物會被用在哪裡，就等之後再繼續調查吧。」"
10044080-94 = "好，好的……"
10044080-95 = "其，其實這只是些沒用的廢話而已，就算不認真思考也沒關係……"
10044080-96 = "[s]「我不覺得是沒用的廢話哦。」"
10044080-97 = "是，是嗎……"
10044080-98 = "謝謝你，老師……"
10044080-99 = "……"
10044080-103 = "為什麼又一臉嚴肅……？"
10044080-104 = "列車的速度是不是一直在加快？"
10044080-105 = "咦……？#n我確認一下。"
10044080-112 = "……"
10044080-113 = "嗯？為什麼跑得比最高速限還快……？"
10044080-115 = "限制器解除～全力開跑～？"
10044080-116 = "奇，奇怪。#n我試著減速看看……"
10044080-121 = "嗯？"
10044080-126 = "……咦咦？"
10044080-128 = "怎麼了～？"
10044080-130 = "煞車系統……失靈了？"
10044080-131 = "嗯？"
10044080-132 = "嗯？？"
10044080-134 = "[ns]「……嗯？？？」"

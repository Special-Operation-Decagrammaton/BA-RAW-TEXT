[translation]
10044080-1 = "ตอนที่ 8;สิ่งที่ทำย่อมไม่เปลี่ยนแปลง"
10044080-2 = "......"
10044080-3 = "อะ... เอ่อ... จะไม่เป็นไรจริงเหรอคะ...?"
10044080-4 = "อะไรเหรอ?"
10044080-5 = "สินค้าไงคะ สินค้า... สิ่งที่พวกเรากำลังขนส่งอยู่ไงคะ...!"
10044080-6 = "แล้วมันทำไมเหรอ?"
10044080-7 = "อะ... เอ่อ... ฉันคิดว่ามันน่าจะมีปัญหา..."
10044080-8 = "โอ๊ย อึดอัดชะมัด! คิดอะไรก็บอกมาตรงๆ เลยดีกว่า!"
10044080-12 = "ปกติของสำคัญหรือของมูลค่าสูงจะขนส่งกันทางรถไฟบรรทุกสินค้าเยอะมั้ยคะ?"
10044080-13 = "ไม่รู้สิ? แต่ก็ไม่น่าจะเยอะเท่าไรหรือเปล่า?"
10044080-14 = "กะ... ก็นั่นแหละค่ะ! แล้วทำไมพวกเขาถึงเอาของแพงๆ มาส่งด้วยรถไฟที่ใช้ขนส่งวัสดุอุตสาหกรรม#nด้วยล่ะคะ??"
10044080-15 = "แถมยังไม่บอกด้วยว่าของข้างในคืออะไร... แบบนี้มันไม่ชอบมาพากลนะคะ..."
10044080-16 = "ทางนั้นบอกแล้ว เราแค่ไม่ได้ตั้งใจฟังเฉยๆ"
10044080-17 = "กะ... ก็ท่านผู้บริหารไม่ค่อยใส่ใจอยู่แล้ว บางทีนี่อาจเป็นเหตุผลที่ถูกเลือกมาให้ทำงานนี้ก็ได้ค่ะ..."
10044080-19 = "ฉันว่าน่าจะมีแผนการบางอย่างอยู่เบื้องหลังเรื่องนี้ค่ะ..."
10044080-24 = "วะฮะฮ่า! ดูการ์ตูนมากเกินไปหรือเปล่า?"
10044080-26 = "ฮึ่ม อย่าหัวเราะกันแบบนั้นสิคะ! ถะ... ถึงฉันจะดูบ่อยก็เถอะ!"
10044080-27 = "ทำไมระบบออกตัวของรถไฟขบวนนี้ต้องมาเสีย แล้วโครโนสก็รายงานข่าวเรื่องนี้จนเด็กมีปัญหา#nมาไล่ล่าพวกเราเยอะเต็มไปหมด...!"
10044080-28 = "คะ... คิดว่าทั้งหมดนี้คือเรื่องบังเอิญเหรอคะ?"
10044080-29 = "ระบบออกรถเสียเป็นเรื่องที่เราควบคุมไม่ได้ แต่เรื่องที่เกิดขึ้นหลังจากนั้นคือความผิดของเรานี่?"
10044080-30 = "ถะ... ถ้านั่นมันเป็นเจตนาของใครบางคนล่ะคะ?"
10044080-36 = "ถ้าเกิดว่า... มีกลุ่มอำนาจมืด... มาหลอกใช้พวกเราที่ไม่รู้อิโหน่อิเหน่ล่ะ?"
10044080-37 = "ฉะ... ฉันเคยได้ยินมาด้วยว่าพวกงานศิลปะราคาแพงๆ ก็เอามาใช้ฟอกเงินได้ค่ะ"
10044080-38 = "อ๊ะ ฮิคาริก็เคยได้ยินมาเหมือนกัน"
10044080-39 = "ถะ... ถ้าพวกเราไปเกี่ยวพันกับแผนการชั่วร้ายขนาดใหญ่ที่จะสั่นคลอนคิโวทอสล่ะคะ...?!"
10044080-40 = "คะ... คุณครูคิดว่ายังไงคะ? ไม่คิดว่ามันน่าสงสัยเหรอคะ...?"
10044080-41 = "[s1] \"พอฟังดูมันก็... นั่นสินะ\"\n[s2] \"ก็น่าตะหงิดๆ อยู่หรอกนะ...\""
10044080-44 = "พวกนักซิ่ง! นักซิ่งพวกนั้นก็แปลกค่ะ...! พวกนั้นยังตามเรามาอยู่เลยนี่คะ?"
10044080-45 = "ต้องมีอะไรมากกว่าความแค้นเรื่องพิซซ่าแน่ๆ ค่ะ...!!"
10044080-46 = "หรือว่าเป็นแฟนคลับพวกเรา?"
10044080-47 = "จะเป็นแบบนั้นได้ยังไงกันคะ..."
10044080-48 = "[ns] \"อาโอบะอยากทำยังไงเหรอ?\""
10044080-49 = "......"
10044080-50 = "ฉะ... ฉันไม่ได้อยากทำอะไรเป็นพิเศษหรอกค่ะ ฉันแค่... แค่..."
10044080-51 = "แค่กังวลว่า... ของชิ้นนี้อาจจะ... ถูกเอาไปใช้ในเรื่องที่ไม่ดีก็ได้"
10044080-52 = "แล้วถ้าเป็นอย่างนั้น ผู้ที่ส่งสินค้าอย่างพวกเราก็ต้องรับผิดชอบด้วยหรือเปล่า..."
10044080-53 = "ถ้าสินค้าที่พวกเราขนส่งอยู่ถูกเอาไปใช้ในทางที่ไม่ดีขึ้นมาละก็... แล้วพวกเราควรเอาไปส่งตามคำสั่ง#nหรือเปล่า..."
10044080-54 = "ฉะ... ฉันแค่คิดอะไรอย่างนั้นน่ะค่ะ..."
10044080-58 = "อืม ฉันพอเข้าใจแล้วละว่ากังวลเรื่องอะไร ที่จริงมันก็มีเคสแบบนั้นอยู่นะ"
10044080-59 = "แต่สิ่งที่สำคัญก็คือ สิ่งที่พวกเราจะทำมันไม่เปลี่ยนแปลงไปหรอก"
10044080-60 = "สิ่งที่พวกเราจะทำ...?"
10044080-61 = "มีคนต้องการให้ส่งสินค้า แล้วเราก็รับงานนั้นมา จากนั้นก็ส่งสินค้าไปยังจุดหมายปลายทาง แล้วก็จบงาน"
10044080-62 = "ก็ง่ายๆ นี่นา?"
10044080-63 = "มะ... มันก็จริงอยู่หรอกนะ..."
10044080-65 = "ใช่ว่าเราจะทำอะไรไปโดยไม่คิด หรือทำไปงั้นๆ เพราะได้คำสั่งมาแล้วหรอกนะ"
10044080-66 = "เราแค่ทำในสิ่งที่ตัดสินใจแล้วว่าจะทำต่างหาก"
10044080-67 = "นั่นคือความรับผิดชอบประการแรกที่เราต้องมีในฐานะนักเรียนไฮแลนเดอร์ผู้รับผิดชอบการรถไฟ"
10044080-69 = "ความรับผิดชอบงั้นเหรอ..."
10044080-70 = "อีกอย่างนะ เรื่องที่เราไม่รู้มาก เราไม่ต้องใส่ใจให้มากหรอก"
10044080-71 = "ก็เราไม่รู้นี่เนอะ คิดมากไปก็เครียดเปล่าๆ"
10044080-72 = "ฉันไม่อยากได้ยินอะไรแบบนี้จากคนที่ทำให้ฉันเครียดเลยค่ะ..."
10044080-73 = "......"
10044080-74 = "ตะ... แต่ยังไงก็... เหมือนว่าฉันจะคลายความกังวลไปได้บ้างแล้วค่ะ..."
10044080-75 = "วะฮะฮ่า ใช่มั้ยล่ะ? บอกแล้วว่าไม่ต้องคิดให้มากนักหรอก เดี๋ยวมันก็คลี่คลายเองน่า!!"
10044080-76 = "ทำงานอย่างสนุกสนานโดยไม่มีแผนรับมือ ฉันอยากมีมายด์เซ็ตแบบนี้บ้างจังค่ะ..."
10044080-78 = "[ns3] \"ทุกคนย่อมมีหน้าที่และความรับผิดชอบส่วนตัว\"\n[ns4] \"นักเรียนเองก็มีหน้าที่และความรับผิดชอบส่วนตัว\""
10044080-82 = "[ns5] \"ครูจะสนับสนุนการตัดสินใจจากความคิดของทุกคนนะ\"\n[ns5] \"ครูจะสนับสนุนการตัดสินใจจากความคิดของนักเรียนนะ\""
10044080-85 = "วะฮะฮ่า! อื้อ ไม่มีอะไรเสียหายหรอก รับกำลังใจจากคุณครูมาเยอะๆ ดีกว่า"
10044080-86 = "คุณครู ใส่ชุดเชียร์ลีดเดอร์ให้ดูหน่อยสิ"
10044080-87 = "คุณครูกำลังบอกว่าตัวเองเคารพการตัดสินใจของนักเรียนสินะคะ..."
10044080-91 = "เฮ้อ... นั่นสินะคะ ตอนนี้กังวลไปก็คงไม่มีความหมายอะไร..."
10044080-92 = "ตอนนี้สิ่งสำคัญคือการทำภารกิจขนส่งนี้ให้สำเร็จก่อน..."
10044080-93 = "[s] \"อื้อ แล้วค่อยมาสืบเบื้องลึกเบื้องหลังของสินค้ากัน\""
10044080-94 = "ค่ะ ค่ะ..."
10044080-95 = "ฉะ... ฉันก็แค่พูดไปตามที่คิด ไม่ต้องจริงจังกับคำพูดไร้สาระของฉันมากก็ได้ค่ะ..."
10044080-96 = "[s] \"ครูไม่คิดว่ามันไร้สาระหรอก\""
10044080-97 = "ค่ะ... ค่ะ..."
10044080-98 = "ขอบคุณนะคะ คุณครู..."
10044080-99 = "......"
10044080-103 = "ทำไมถึงทำหน้าตึงเครียดขนาดนั้นล่ะคะ...?"
10044080-104 = "เหมือนรถไฟของเรามันค่อยๆ เร็วขึ้นเลยนะ?"
10044080-105 = "เอ๋...? ฉันจะไปเช็กให้เดี๋ยวนี้ค่ะ"
10044080-112 = "..."
10044080-113 = "หืม? ทำไมมันเร็วกว่าความเร็วสูงสุดที่กำหนดอีกล่ะ...?"
10044080-115 = "รถไฟที่จริงใจ เร็วเกินลิมิตแล้ว"
10044080-116 = "ปะ... แปลกจังเลยค่ะ ฉันจะลองลดความเร็วดูนะคะ..."
10044080-121 = "หืม?"
10044080-126 = "หืมมม...??"
10044080-128 = "ทำไมเหรอ?"
10044080-130 = "เบรกไม่ทำงานค่ะ..."
10044080-131 = "หา?"

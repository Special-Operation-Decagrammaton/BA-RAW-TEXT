[translation]
10044080-1 = "Episode 8;What to Do Doesn't Change"
10044080-2 = "..."
10044080-3 = "So... Um... Is it okay...?"
10044080-4 = "Is what okay?"
10044080-5 = "The cargo, I mean. That we're transporting."
10044080-6 = "\"Okay\" in what sense?"
10044080-7 = "I-I mean... Maybe I'm overthinking this, but..."
10044080-8 = "Ugh, would you just spit it out already?!"
10044080-12 = "...People don't typically transport valuables in a freight train like this, do they?"
10044080-13 = "Probably not."
10044080-14 = "R-Right! We usually transport industrial materials! So why are we hauling a shipment of someone's valuables?!"
10044080-15 = "And why wouldn't they tell us about them?"
10044080-16 = "They told us, we just didn't listen."
10044080-17 = "W-Well...maybe they counted on that. On you two being careless."
10044080-19 = "...I think we might be caught up in a conspiracy here..."
10044080-24 = "Pahyahya! You been reading too much manga, or what?"
10044080-26 = "Urgh, don't just laugh it off like that! I-I DO read a lot of them. Who doesn't? But..."
10044080-27 = "Just on this one job, the departure system malfunctioned, Kronos flew in and did a special report on us, MULTIPLE gangs came at us..."
10044080-28 = "C-Could that ALL be coincidence?"
10044080-29 = "Well, the malfunction was weird, yeah, but everything after that was because of our own mistakes."
10044080-30 = "What if someone planned for those too?"
10044080-36 = "What if...there's a criminal organization, counting on us to botch this job?"
10044080-37 = "I've heard they use valuables, like artwork, for money laundering."
10044080-38 = "Hikari heard that too."
10044080-39 = "We're in the middle of something big here. TOO big. \"Shake-up-all-of-Kivotos\" big."
10044080-40 = "R-Right, Sensei? I'm not just being paranoid, am I?"
10044080-41 = "[s1] \"Well, now that you mention it...\"\n[s2] \"It does sound a little...\""
10044080-44 = "And the biker gang! They were weird too...! They kept on following us, right?"
10044080-45 = "That couldn't have just been revenge for the pizza incident."
10044080-46 = "Weren't they in our fan club?"
10044080-47 = "There is no fan club."
10044080-48 = "[ns] \"So what are you suggesting we do?\""
10044080-49 = "..."
10044080-50 = "I-I'm not saying that I want to DO anything, it's just..."
10044080-51 = "I'm worried. Because what we're carrying here...they might use it for something bad, you know?"
10044080-52 = "And if that's the case, would that make us accomplices for bringing it to them?"
10044080-53 = "If we're going to give it to a criminal, then...maybe we just shouldn't."
10044080-54 = "...I don't know. I just had that thought."
10044080-58 = "No, I know what you mean. And that sort of thing does happen sometimes."
10044080-59 = "But that doesn't change what WE need to do."
10044080-60 = "And that is...?"
10044080-61 = "Someone offered a job, we accepted it, so now we deliver the cargo to its destination. Period."
10044080-62 = "Simple enough, right?"
10044080-63 = "I-In a sense, but..."
10044080-65 = "We're not saying, \"Don't think about what we're doing,\" or \"Do whatever we're told.\""
10044080-66 = "Just that once we've accepted a job, we get it done properly every time."
10044080-67 = "We're Highlander. That's our number one responsibility."
10044080-69 = "Responsibility..."
10044080-70 = "Plus it doesn't do any good to worry about things we don't know."
10044080-71 = "What we don't know, we don't know, y'know? Thinking about it just causes stress."
10044080-72 = "That's not the only cause of my stress around here..."
10044080-73 = "..."
10044080-74 = "...but you do make a good point. Thanks, I feel a bit better now."
10044080-75 = "Pahyahya, right? It's gonna work out. Don't sweat it too hard."
10044080-76 = "It must be nice. Just bouncing through life, never minding the consequences..."
10044080-78 = "[ns3] \"I personally believe responsibility belongs to adults.\"\n[ns4] \"Some students agree with that, and some don't.\""
10044080-82 = "[ns5] \"Whatever your beliefs, and whatever your decisions...\"\n[ns6] \"...I'll support you to the best of my ability as Sensei.\""
10044080-85 = "Pahyahya! Yeah, sounds good. Thanks for having my back, Sensei!"
10044080-86 = "Put on a cheerleader outfit. And say it agaaain."
10044080-87 = "...So whatever decision we make in the end, you'll respect it."
10044080-91 = "*sigh* I suppose there's no point in worrying here and now."
10044080-92 = "Better to focus on the delivery."
10044080-93 = "[s] \"And THEN, if we want, we can look into how it's being used.\""
10044080-94 = "R-Right."
10044080-95 = "...B-But that was all just me blathering. Don't take it too seriously."
10044080-96 = "[s] \"It didn't sound like blather to me.\""
10044080-97 = "...W-Well..."
10044080-98 = "...thank you, Sensei."
10044080-99 = "..."
10044080-103 = "...Whyyy are you looking so serious?"
10044080-104 = "Uh, is it me, or is the train getting faster?"
10044080-105 = "Hmm, let me see..."
10044080-112 = "..."
10044080-113 = "...\"Faster\" is an understatement. It shouldn't be ABLE to reach this speed."
10044080-115 = "Our train's having a limit break? What?"
10044080-116 = "Th-This is...bizarre. Let me try to slow it down..."
10044080-121 = "...Oh."
10044080-126 = "Ohhh no."
10044080-128 = "What?"
10044080-130 = "...The brake isn't working. At all."
10044080-131 = "Huh?"
10044080-132 = "Huh?"
10044080-134 = "[ns] \"...Huh??!\""

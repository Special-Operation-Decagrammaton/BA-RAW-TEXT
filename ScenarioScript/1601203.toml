[translation]
1601203-1 = "More Food, More Fun! More Me?"
1601203-2 = "You're late, Sensei!"
1601203-6 = "I'll have to pay you back for this!"
1601203-7 = "[s] \"Your promise sounds so scary... *sob*\""
1601203-8 = "H-Hey! Why are you crying? You'll be fine!"
1601203-9 = "I-I was just joking..."
1601203-10 = "So spare me the fake sobs! I know what you're doing!"
1601203-11 = "[s] \"Why didn't we go to the New Year's festival?\""
1601203-12 = "Why go there when we could come to..."
1601203-13 = "...this seemingly random street!"
1601203-14 = "[s] \"Seemingly random?\""
1601203-15 = "When you hear \"New Year's food,\" what comes to mind?"
1601203-16 = "What? Cabbage? No, I wanted you to say osechi, ozoni...stuff like that."
1601203-17 = "And don't get me wrong, those are all delicious for sure."
1601203-18 = "But...I'm fed up with that stuff! Sometimes literally! I'm part of the Gourmet Research Society! I don't just eat food, I explore it!"
1601203-19 = "And what better time to explore than the start of a new year!"
1601203-20 = "[s] \"Now that I look around, this street...?!\""
1601203-21 = "Heh heh heh...You've noticed!"
1601203-22 = "Yes! Here you'll find special New Year's food you can't get anywhere else!"
1601203-23 = "So, Sensei! What food should we explore first?"
1601203-24 = "I owe you one from L'Oiseau Bleu last time, so I'll buy!"
1601203-25 = "Uh, I owe you...but within my budget, okay?"
1601203-28 = "Oh... What type of dumplings are these?"
1601203-29 = "They're called jiaozi!"
1601203-30 = "Tofu and cabbage for an accident-free year, and peanuts for family luck."
1601203-31 = "Noodles for longevity, and sticky rice cake for realized ambitions!"
1601203-32 = "So, what sort of good fortune would you like?"
1601203-33 = "I-I see... What should we get, Sensei?"
1601203-34 = "The priority is to avoid getting into any kind of accident so we can enjoy delicious food? That's true..."
1601203-35 = "Then I'll take tofu and cabbage jiaozi for two!"
1601203-37 = "Oh? What's that savory smell?"
1601203-41 = "It's called Hoppin' John."
1601203-42 = "Stir-fried and simmered beans, pork, and leafy greens."
1601203-43 = "The beans represent coins, and the greens represent paper money."
1601203-44 = "You eat this food for wishes of wealth."
1601203-45 = "In that case, I need to eat as much as I can..."
1601203-46 = "I'll take an order for two!"
1601203-48 = "...What's this incredible pie?"
1601203-49 = "It's called Galette des Rois. It means, \"King's Cake.\""
1601203-50 = "It's crispy pastry dough filled with butter and almond pastry cream."
1601203-51 = "Wow..."
1601203-52 = "A small charm called a fève is hidden inside the pie."
1601203-53 = "If you find it, you can become a king."
1601203-54 = "What do I get for becoming a king?"
1601203-55 = "One more cake."
1601203-56 = "Hmm... I'll take two pieces!"
1601203-58 = "It was good!"
1601203-59 = "[s] \"You seemed to really enjoy it!\""
1601203-60 = "I did! Everything was delicious and unique..."
1601203-61 = "Unique..."
1601203-68 = "[s] \"Junko?\""
1601203-69 = "U-Ugh...!"
1601203-70 = "I can't... I can't breathe..."
1601203-71 = "[s] \"Wh-What's wrong?!\""
1601203-72 = "Wh-What do I do, Sensei?!"
1601203-73 = "I think... I think I overate!"
1601203-75 = "Junko's face was pale, so I brought her medicine which may or may not have been a placebo."
1601203-77 = "Phew... Thanks, Sensei. I feel much better."
1601203-78 = "Ugh...I'm sorry that I ruined our journey of gourmet discovery..."
1601203-79 = "[s] \"All that matters is that you enjoyed it, Junko.\""
1601203-80 = "Really? ...You're not just saying that?"
1601203-81 = "Anyway, I'm not gonna be able to eat anything until tomorrow."
1601203-82 = "Why?! Why can't I eat as much as Akari?! Curse this small body!"
1601203-84 = "I comforted Junko on our way back to Schale."

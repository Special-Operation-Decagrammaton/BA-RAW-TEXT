1601203-69 = "3;준코 새해;10;우, 윽……!\n#3;em;[!]\n#3;jump"
1601203-70 = "3;준코 새해;08;꼼짝도 못 하겠어…… 숨이 안 쉬어져……"
1601203-71 = "[s] \"왜, 왜 그래?!\""
1601203-72 = "3;준코 새해;08;선생님, 어쩌지……?"
1601203-73 = "3;준코 새해;17;나, 너무 과식했나 봐……\n#3;em;[훌쩍]\n#3;stiff"

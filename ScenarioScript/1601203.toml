[translation]
1601203-1 = "#title;다양한 음식이 필요해!"
1601203-2 = "5;준코 새해;16;늦었잖아, 선생님!\n#5;al\n#5;em;[!]"
1601203-3 = "#st;[0,0];instant;1;"
1601203-4 = "#clearST"
1601203-5 = "5;준코 새해;16\n#5;m3\n#5;hophop\n#wait;1500"
1601203-6 = "5;준코 새해;14;정말, 간만에 사람이 되갚아 주겠다는데."
1601203-7 = "[s] \"되갚아 주겠다는 말이 무서워서…… 흑흑……\""
1601203-8 = "#5;hide\n3;준코 새해;16;뭐, 뭐야! 왜 울고 그래! 그렇게 무서운 거 아니라니까!\n#3;em;[땀]\n#3;stiff"
1601203-9 = "3;준코 새해;14;되갚아 주겠다는 것도, 뭐, 농담 같은 거였고……"
1601203-10 = "3;준코 새해;11;그러니까 그렇게 훌쩍거리는 척하지 마! 다 보이거든!"
1601203-11 = "[s] \"새해 축제에 가고 싶었던 거면, 말을 하지 그랬어.\""
1601203-12 = "3;준코 새해;11;어…… 뭐, 그 비슷한 것도 있긴 하지만 말이야."
1601203-13 = "3;준코 새해;00;여기 축제 거리는, 조금 다르거든!"
1601203-14 = "[s] \"다르다니, 뭐가?\""
1601203-15 = "3;준코 새해;12;선생님은, 새해 음식 하면 뭐가 떠올라?\n#3;em;[?]"
1601203-16 = "3;준코 새해;13;그래, 그래……해넘이 국수, 오세치 요리, 오조니…… 뭐 그런 것들이겠지.\n#3;greeting"
1601203-17 = "3;준코 새해;13;물론 맛있는 음식들이지. 나도 아주 좋아하고."
1601203-18 = "3;준코 새해;00;하지만…… 조금 식상해! 나는 미식연구회의 일원이라고! 더 많은 미식을 탐구할 의무가 있어!"
1601203-19 = "3;준코 새해;12;올해에는 정말로 다양한 새해 음식을 맛보고 싶었단 말씀이야!\n#3;em;[!]"
1601203-20 = "[s] \"그러고 보니, 이 축제 거리는……?!"
1601203-21 = "3;준코 새해;13;훗, 훗, 훗…… 이제 뭐가 다른지 조금 눈에 들어오는 모양이지?\n#3;em;[재잘]"
1601203-22 = "3;준코 새해;12;그래, 맞아. 다른 데에서는 맛볼 수 없는 새해 음식들을 파는 곳이라고!"
1601203-23 = "3;준코 새해;12;그럼, 선생님! 뭐부터 먹어 볼까?"
1601203-24 = "3;준코 새해;03;저번 <르와조 블뢰> 일도 있으니, 내가 살게!\n#3;em;[반짝]\n#3;greeting"
1601203-25 = "3;준코 새해;14;어…… 예산이 허락하는 범위 안에서, 말이지만.\n#3;em;[땀]\n#3;stiff"
1601203-26 = "#all;hide"
1601203-27 = "#all;hide"
1601203-28 = "3;준코 새해;02;어…… 이 만두 같은 건 뭐야, 아저씨?\n#3;a\n#3;em;[반응]"
1601203-29 = "#na;나레이션 상인;만두는 만두지! 자오쯔라고 한단다!"
1601203-30 = "#na;나레이션 상인;무사고를 기원할 때에는 두부와 배추, 가족운을 기원할 때에는 땅콩."
1601203-31 = "#na;나레이션 상인;장수를 기원할 때는 국수, 승진을 기원할 땐 찹쌀떡을 넣어서 만들지!"
1601203-32 = "#na;나레이션 상인;자, 어떤 걸 고르겠니?"
1601203-33 = "3;준코 새해;09;어, 어어……? 어떻게 하지, 선생님?\n#3;stiff"
1601203-34 = "3;준코 새해;02;일단 사고가 나지 않아야 맛있는 걸 많이 먹을 수 있지 않겠냐고? 그것도 그렇네……\n#3;em;[?]"
1601203-35 = "3;준코 새해;03;그러면, 아저씨! 두부와 배추 자오쯔 두 개 줘!"
1601203-36 = "#all;hide"
1601203-37 = "3;준코 새해;02;어라, 이 구수한 냄새가 나는 음식은……?\n#3;em;[반응]\n#3;a"
1601203-38 = "#st;[0,0];instant;1;"
1601203-39 = "#clearST"
1601203-40 = "3;준코 새해;09\n#3;m1\n#3;hophop\n#wait;1000"
1601203-41 = "#na;나레이션 상인;호핑 존이라는 음식입니다."
1601203-42 = "#na;나레이션 상인;콩과 돼지고기, 녹색 야채를 한 번 볶은 다음 끓여내서 만들죠."
1601203-43 = "#na;나레이션 상인;콩은 동전, 녹색 야채는 지폐를 상징한답니다."
1601203-44 = "#na;나레이션 상인;이 음식을 먹고 모두 부자가 되기를 바라는 것이죠."
1601203-45 = "3;준코 새해;09;정말로 그렇게 된다면, 맛있는 것도 많이 먹을 수 있겠지……?\n#3;stiff"
1601203-46 = "3;준코 새해;03;이거, 2인분!\n#3;em;[음표]\n#3;greeting"

[translation]
1601203-1 = "ต้องการอาหารที่หลากหลาย!"
1601203-2 = "มาช้านะคุณครู!"
1601203-6 = "ให้ตายเถอะ นานๆ ที ฉันจะได้ตอบแทนคุณครูเลยนะ"
1601203-7 = "[s] \"คำว่าตอบแทนนี่น่ากลัวจัง... ฮึกๆ...\""
1601203-8 = "อะ... อะไรเล่า! จะมาแกล้งร้องไห้ทำไม! ไม่ใช่เรื่องน่ากลัวอะไรแบบนั้นสักหน่อย!"
1601203-9 = "ฉันแค่พูดล้อเล่นต่างหาก..."
1601203-10 = "เพราะงั้นเลิกแกล้งบีบน้ำตาแบบนั้นได้แล้ว! ฉันรู้นะว่าแกล้งทำน่ะ!"
1601203-11 = "[s] \"ถ้าอยากชวนไปงานเทศกาลปีใหม่ แค่บอกตรงๆ ก็ได้นะ\""
1601203-12 = "เอ่อ... ก็อะไรทำนองนั้นแหละ"
1601203-13 = "แต่ว่าถนนงานเทศกาลนี้น่ะ มันไม่เหมือนกับที่อื่นหรอกนะ!"
1601203-14 = "[s] \"ไม่เหมือนเหรอ? ไม่เหมือนยังไง?\""
1601203-15 = "สำหรับคุณครู ถ้าพูดถึง 'อาหารปีใหม่' จะนึกถึงอะไรเหรอ?"
1601203-16 = "ใช่แล้วๆ ก็คงนึกถึงพวกโทชิโคชิโซบะ โอเซจิ หรือไม่ก็โอโซนิ... อะไรพวกนั้นล่ะสิท่า"
1601203-17 = "อย่าเข้าใจผิดล่ะ แน่นอนว่าอาหารพวกนั้นเป็นอาหารแสนอร่อย และฉันก็ชอบมากๆ ด้วย"
1601203-18 = "แต่ว่า... แค่นั้นมันน่าเบื่อเกินไปน่ะสิ! ฉันเป็นสมาชิกชมรมชิมอาหารเชียวนะ! มีภารกิจที่ต้องตามหา#nอาหารรสเลิศ!"
1601203-19 = "ปีนี้ฉันก็เลยอยากลองชิมอาหารปีใหม่ที่หลากหลายดูไงล่ะ!"
1601203-20 = "[s] \"พอดูรอบๆ แล้ว ที่นี่มัน...?!\""
1601203-21 = "ฮุฮุฮุ... สังเกตเห็นแล้วสินะว่าที่นี่แตกต่างจากที่อื่นตรงไหน?"
1601203-22 = "ใช่แล้วๆ ที่นี่เป็นสถานที่ที่ขายอาหารปีใหม่ที่หาชิมจากที่อื่นไม่ได้ไงล่ะ!"
1601203-23 = "เอาละคุณครู... เราจะเริ่มจากอะไรกันดี?"
1601203-24 = "คุณครูช่วยฉันไว้เมื่อคราวก่อน เพราะงั้นครั้งนี้เดี๋ยวฉันเลี้ยงเอง!"
1601203-25 = "เอ่อ... ขอราคาอยู่ในงบก็แล้วกันนะ"
1601203-28 = "อืม... ของที่ดูเหมือนเกี๊ยวนั่นคืออะไรเหรอลุง?"
1601203-29 = "เกี๊ยวก็คือเกี๊ยวน่ะสิ! ใครไม่ซ่า \"เกี๊ยวซ่า\" ไงล่ะ!"
1601203-30 = "ไส้เต้าหู้กับผักกาดแทนการขอพรให้ปลอดภัยตลอดปี ไส้ถั่วแทนการขอพรเรื่องโชคให้ครอบครัว..."
1601203-31 = "ไส้เส้นหมี่แทนการขอพรให้มีอายุยืนยาว ส่วนไส้ไดฟุกุแทนการขอพรให้ก้าวหน้า เจริญรุ่งเรือง!"
1601203-32 = "เอ้า จะรับแบบไหนดี?"
1601203-33 = "อ่ะ... เอ่อ...? เอายังไงดีล่ะคุณครู?"
1601203-34 = "เราควรหลีกเลี่ยงเรื่องแปลกๆ เพื่อให้กินของอร่อยๆ ได้เยอะๆ งั้นเหรอ? อืม... เรื่องนั้นก็จริง"
1601203-35 = "ถ้างั้น... ลุง! ขอเกี๊ยวซ่าไส้เต้าหู้กับผักกาดขาวสองชิ้น!"
1601203-37 = "เอ๊ะ? กลิ่นหอมๆ น่ากินนี่มัน...?"
1601203-41 = "โฮปปิ้ง จอห์นคร้าบบบ"
1601203-42 = "เป็นอาหารที่ทำขึ้นจากการนำถั่ว เนื้อหมู และผักสีเขียวมาผัดคลุกเคล้า แล้วก็นำไปต้มนั่นเอง"
1601203-43 = "ถั่วเป็นสัญลักษณ์ของเหรียญ และผักสีเขียวเป็นสัญลักษณ์ของธนบัตร"
1601203-44 = "เชื่อกันว่ากินอาหารนี้แล้วจะทำให้ทุกคนจะร่ำรวย"
1601203-45 = "ถ้าเป็นอย่างนั้นจริง ก็คงจะกินของอร่อยได้เยอะแยะเลยสินะ...?"
1601203-46 = "เอาอันนี้ด้วย 2 ที่!"
1601203-48 = "แล้วพายใหญ่ๆ นี่ล่ะ...?"
1601203-49 = "พาย 'กาแลตต์ เดส์ รัวส์' หรือ 'พายสามกษัตริย์' ไงล่ะ"
1601203-50 = "ขนมอบกรอบสอดไส้เนยเน้นๆ อัลมอนด์แน่นๆ..."
1601203-51 = "ว้าว..."
1601203-52 = "นอกจากนี้ในพายก็จะมี 'เฟ็บ' หรือตุ๊กตาปั้นตัวเล็กๆ ซ่อนอยู่ในไส้ด้วย"
1601203-53 = "คนที่กินแล้วเจอ 'เฟ็บ' ในขนมจะถือว่าเป็นกษัตริย์หรือราชินี"
1601203-54 = "ถ้าเป็นราชินีแล้ว... จะทำอะไรได้ล่ะ?"
1601203-55 = "ก็จะได้รับพายฟรีอีก 1 ชิ้นทันที"
1601203-56 = "อืม... เอามาหนึ่งชิ้นก่อนแล้วกัน!"
1601203-58 = "อร่อยจัง!"
1601203-59 = "[s] \"กินเพลินเลยนะ ไม่เป็นไรใช่มั้ย?\""
1601203-60 = "อื้อ อาหารอร่อยแล้วก็มีเอกลักษณ์..."
1601203-61 = "ทะ... ทุกอย่าง..."
1601203-68 = "[ns] \"จุนโกะ?\""
1601203-69 = "อะ... อึก...!"
1601203-70 = "ขะ...ขยับตัวไม่ไหว หะ...หายใจไม่ออก..."
1601203-71 = "[s] \"ปะ...เป็นอะไรน่ะ?!\""
1601203-72 = "คุณครู... ทำยังไงดี...?"
1601203-73 = "ดะ... ดูเหมือนฉันจะกินเยอะเกินไป..."
1601203-75 = "(คุณครูรีบไปหาซื้อยาลดกรดมาให้จุนโกะที่ตอนนี้จุกจนหน้าเขียวหน้าแดงไปหมด...)"
1601203-77 = "ฮู่ว... ขอบคุณนะคุณครู ตอนนี้ดีขึ้นแล้วละ"
1601203-78 = "ฮือ... ขอโทษนะ ที่ทำมื้ออาหารอร่อยๆ พังไม่เป็นท่าอีกแล้ว..."
1601203-79 = "[s] \"แค่จุนโกะสนุกก็พอแล้วละ\""
1601203-80 = "จริงเหรอ? ไม่ได้พูดไปงั้นๆ ใช่มั้ย...?"
1601203-81 = "ยังไงก็เถอะ ถ้าเป็นแบบนี้คงกินอะไรไม่ได้จนถึงพรุ่งนี้เลยแหละ"
1601203-82 = "ทำไมฉันถึงกินได้ไม่เยอะเหมือนอย่างอาคาริกันนะ..."
1601203-84 = "(คุณครูปลอบใจจุนโกะที่รู้สึกห่อเหี่ยว ก่อนจะกลับไปที่ชาเล่ต์)"

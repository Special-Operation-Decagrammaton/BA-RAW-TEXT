[translation]
1601203-1 = "想吃各種料理！"
1601203-2 = "老師你好慢！"
1601203-6 = "真是的，難得我想報答你的說。"
1601203-7 = "[s]「一想到不知道會被報答什麼，實在太害怕就……」"
1601203-8 = "為，為什麼要哭啊！又不是什麼可怕的事！"
1601203-9 = "我說的「要報答你」不是那個意思……"
1601203-10 = "真是的，也差不多哭夠了吧！？"
1601203-11 = "[s]「如果想來買新年的東西，明明只要正常地邀請我就好了。」"
1601203-12 = "那個，雖然大致上是那樣沒錯……"
1601203-13 = "不過這裡有點不一樣唷！"
1601203-14 = "[s]「不一樣？哪裡不一樣呢？」"
1601203-15 = "老師，提到年菜你會想到什麼呢？"
1601203-16 = "一定是跨年蕎麥麵、御節料理、年糕湯……之類的對吧。"
1601203-17 = "當然這些都很好吃。我也非常喜歡。"
1601203-18 = "但是……這樣實在太沒有創意了！#n我可是美食研究會的成員！得探索更多的美食才行！"
1601203-19 = "所以我決定，今年一定要認真品嘗各式各樣的新年料理！"
1601203-20 = "[s]「這麼說來，這裡……」"
1601203-21 = "哼哼哼……終於注意到了呢，這個地方的特徵！"
1601203-22 = "沒錯，這裡販賣的是其他地方吃不到的，特別的年菜哦！"
1601203-23 = "來吧，老師！要從什麼開始吃呢？"
1601203-24 = "畢竟之前在「L'Oiseau Bleu」吃了老師一頓，這次就換我請客吧！"
1601203-25 = "……要，要在預算允許的範圍內就是了。"
1601203-28 = "啊……大叔，這個像餃子的東西是什麼？"
1601203-29 = "餃子就是餃子呀！或者叫「元寶」也行！"
1601203-30 = "祈求平安時加入豆腐和白菜，祈求順利時加入豆餡。"
1601203-31 = "祈求長壽時加入麵條，祈求升遷時加入年糕來製作！"
1601203-32 = "來，你想點哪種呢？"
1601203-33 = "那，那個……？怎，怎麼辦，老師？"
1601203-34 = "要先確保平安，才能吃很多美食……？確實，這麼說也有道理。"
1601203-35 = "那，我要兩個豆腐白菜餃子！"
1601203-37 = "咦，這個很香的味道是……？"
1601203-41 = "這是一種叫做[ruby=單腳跳約翰]「Hoppin' John」[/ruby]的食物唷。"
1601203-42 = "是把黑眼豆、豬肉、蔬菜先炒過之後煮成的料理。"
1601203-43 = "豆子象徵「銅板」，蔬菜則象徵「鈔票」。"
1601203-44 = "大家希望吃完這個後，就能變成有錢人唷。"
1601203-45 = "如果真的變成有錢人，就可以盡情吃好吃的東西了對吧……？"
1601203-46 = "那這個，請給我兩人份！"
1601203-48 = "這個看起來很厲害的派是……？"
1601203-49 = "這是一種名為「Galette des Rois」的食物，意思是「國王的派」。"
1601203-50 = "在用了許多奶油的酥皮中，加入了滿滿的杏仁奶油內餡唷。"
1601203-51 = "哇啊……！"
1601203-52 = "派裡面放入了一種被稱為[ruby=蠶豆]「la fève」[/ruby]的小瓷偶。"
1601203-53 = "發現[ruby=蠶豆]「la fève」[/ruby]的人似乎就能成為國王。"
1601203-54 = "如果成為國王可以做什麼呢？"
1601203-55 = "在我們店裡，可以再免費獲得一塊派哦。"
1601203-56 = "這樣的話，先給我兩塊吧！"
1601203-58 = "真好吃～！"
1601203-59 = "[s]「吃了真多呢。肚子還好嗎？」"
1601203-60 = "嗯！每種都很美味又有特色……"
1601203-61 = "而且……"
1601203-68 = "[ns]「……淳子？」"
1601203-69 = "唔……！"
1601203-70 = "動，動不了……呼吸也……"
1601203-71 = "[s]「怎，怎麼了！？」"
1601203-72 = "老師，怎麼辦……？"
1601203-73 = "可，可能是我吃太多了……？"
1601203-75 = "（買了能促進消化的胃藥給臉色發青的淳子……）"
1601203-77 = "謝，謝謝老師……多虧你才活了過來。"
1601203-78 = "對，對不起……都是我的錯，本來應該要很開心的……"
1601203-79 = "[s]「身體似乎好多了，淳子好像也很開心，我很滿足唷。」"
1601203-80 = "……真的嗎？不是顧慮我才這麼說？"
1601203-81 = "謝，謝謝……看這個情況，到明天為止可能什麼都沒辦法吃。"
1601203-82 = "唔嗯，要是我能像亞伽里一樣吃那麼多就好了……"
1601203-84 = "（安慰完喪氣的淳子後，回到了夏萊）"

1601203-48 = "5;준코 새해;02;이 엄청난 파이는……?\n#5;em;[?]\n#5;a"
1601203-49 = "#na;나레이션 상인;'갈레트 데 루아' 라고 하는 파이란다. '왕들의 파이' 라는 뜻이지."
1601203-50 = "#na;나레이션 상인;버터를 잔뜩 머금은 바삭한 페이스트리 생지 속에, 아몬드 페이스트리 크림이 잔뜩 들어가 있어."
1601203-51 = "5;준코 새해;09;우와아……\n#5;em;[반짝]"
1601203-52 = "#na;나레이션 상인;파이를 먹다 보면 '페브' 라고 하는 작은 도자기가 들어 있는데,"
1601203-53 = "#na;나레이션 상인;페브를 발견하는 사람은 그 자리의 왕이 될 수 있어."
1601203-54 = "5;준코 새해;02;여기에서 왕이 되면…… 뭘 할 수 있는데?\n#5;em;[?]"
1601203-55 = "#na;나레이션 상인;파이를 한 조각 더 받을 수 있지."
1601203-56 = "5;준코 새해;03;흐음…… 일단 파이 두 조각!\n#5;em;[재잘]\n#5;greeting"

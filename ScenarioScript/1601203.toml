1601203-77 = "3;준코 새해;13;후아…… 고마워, 선생님. 이제 좀 살 것 같네.\n#3;em;[한숨]\n#3;a"
1601203-78 = "3;준코 새해;14;우우…… 미안해. 즐거운 미식의 마지막을 망쳐 버린 것 같아……."
1601203-79 = "[s] \"준코가 즐거워했으니 그걸로 됐어.\""
1601203-80 = "3;준코 새해;10;정말? 그냥 해 보는 말 아니지……?\n#3;hophop"
1601203-81 = "3;준코 새해;14;그렇다고 해도, 이래서야 내일까지는 아무것도 못 먹을 것 같네."
1601203-82 = "3;준코 새해;14;왜 나는 아카리처럼 많이 먹지 못하는 걸까……\n#3;em;[세로선]"

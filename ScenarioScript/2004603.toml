[translation]
2004603-1 = "The Barren Land Has No Response"
2004603-2 = "Hyakkiyako Yin-Yang Club"
2004603-3 = "Niya? She's fine, why?"
2004603-4 = "[ns1] \"NiyAAA!!\"\n[ns2] \"Bah, she fooled me again!\""
2004603-7 = "She's dealing with visitors inside, I can let you know once she's... Actually, would you like to come in and observe the club in session?"
2004603-8 = "Not even our president could slack off while you're watching, Sensei, heehee..."
2004603-10 = "Prompted by the dubiously intentioned Yin-Yang Club member, I decided to observe Niya's work."
2004603-12 = "Nyahaha! Everyone's telling me the festival was a great success, beyond expectations! I'm very impressed!"
2004603-13 = "Haha, it was nothing! Those videos on SNS really brought in the crowds!"
2004603-14 = "So, what brings a busy merchant guild member to the Yin-Yang Club?"
2004603-15 = "Ah, it's a bit embarrassing to say, but we're kind of victims of our own success here."
2004603-16 = "The streets are a mess with all the leftover trash...and lots of decorations ended up damaged..."
2004603-17 = "So you want to borrow our club's resources to help clean up."
2004603-19 = "Yes, exactly! Since the Yin-Yang Club helps people out, right?"
2004603-20 = "Mmm, I'd love to, but a merchant guild assignment, that'd be hard to budget for..."
2004603-21 = "Well, if you could be flexible with that part... We're very shorthanded right now. Even just a few club members would be a huge help."
2004603-22 = "...I really am sorry, but that's not in the scope of our business."
2004603-23 = "*sigh* What are we going to do...?"
2004603-25 = "Then the next guest made her visit..."
2004603-27 = "H-Hello! Are you the Yin-Yang Club President?"
2004603-28 = "Amachi Niya, yes. Despite what you may have heard, I'm still the president. And...wow, you're quite the honored guest, aren't you?"
2004603-29 = "They say the Origami Club is full of fine artisans, who focus on origami day and night in their mountain club room..."
2004603-30 = "H-Hmm? Artisans? Y-You flatter us. We just do origami because we like it... Ehehe."
2004603-31 = "So, what brings a lady of your stature to the Yin-Yang Club?"
2004603-33 = "Ah, right! The thing is...we want to change our club room."
2004603-34 = "Lately, we've been hearing strange noises there, and the outside is always so dark at night."
2004603-35 = "There are even rumors of ghosts! The whole club is freaked out, and all our activities are on hold."
2004603-36 = "I see, I see. That does sound troublesome."
2004603-37 = "Well, let me spare you any false hope: we can't help you."
2004603-38 = "Wh-Why not?!"
2004603-39 = "Let's put it this way: who do you want me to kick out of THEIR club room so that you can use it?"
2004603-40 = "W-Well, um..."
2004603-41 = "...Yeah, see the problem?"
2004603-42 = "I do."
2004603-43 = "The Yin-Yang Club can't just swap people's club rooms around."
2004603-44 = "If there's another club that WANTS to trade with you, that'd be a different story, but it'd also be between you and them, not us."
2004603-45 = "Now what do we do...?"
2004603-47 = "Then the last guest came..."
2004603-49 = "Hey! You've got some explaining to do!"
2004603-50 = "We worked our butts off for the festival, and you haven't paid us a dime yet!"
2004603-51 = "We're extras, yeah, but we still take pride in our work! You think you can just ignore us?"
2004603-52 = "...Isn't your contract with the merchant guild, not us?"
2004603-53 = "H-Huh? But doesn't the Yin-Yang Club solve this sort of thing?"
2004603-54 = "We solve what's in our jurisdiction. That does not include collecting unpaid compensation for third-party contractors, unfortunately."
2004603-56 = "And so, everyone left."
2004603-58 = "Wow, sorry to make you wait."
2004603-59 = "I didn't think you'd get here so fast. And, um, pardon me for everything you just saw."
2004603-60 = "[s3] \"Mmm...\"\n[s4] \"Is it always like this?\""
2004603-63 = "Hm? You mean work? Pretty much."
2004603-64 = "Traditionally speaking, the Yin-Yang Club mediates conflicts in Hyakkiyako..."
2004603-65 = "Oh, are you asking about our process?"
2004603-66 = "Well, I'm sure you visited plenty of different schools."
2004603-67 = "You must know all kinds of student councils. Maybe ours is a little bit different than what you're used to."
2004603-68 = "Hmm, this is going to be a boring story."
2004603-69 = "What do you say we go for a walk first?"
2004603-70 = "Maybe the scenery will help make the history lesson a little more interesting."
2004603-71 = "[s5] \"That's fine and all, but...\"\n[s6] \"...didn't you tell me you were in some kind of trouble?\""
2004603-74 = "I was stuck in a tragedy, to be precise. The story of a girl in her prime, trapped at work while the best years of her life all slipped away."
2004603-75 = "But now that you're here, everything's fine. Nyahahaha!"
2004603-77 = "Usually, the Hyakkiyako streets are clean, but this time, I saw trash here and there."
2004603-78 = "Nyaha...yeah, I'm sorry you had to see this."
2004603-79 = "The festival was a huge success, bigger than anybody planned for. The cleaning staff couldn't keep up with the number of visitors."
2004603-80 = "But they'll get it all cleaned up eventually."
2004603-81 = "They all work so hard, after all. Nyahaha!"
2004603-82 = "Oh, right, the history lesson. Where to start...?"
2004603-83 = "Ah, I know. It's an old story, so let's start it like this..."
2004603-84 = "Once upon a time..."
2004603-89 = "...when Hyakkiyako was not yet Hyakkiyako..."
2004603-91 = "...there were countless academies, all of them embroiled in a cauldron of conflict."
2004603-92 = "Until finally, they all stopped fighting and gathered to create the Hyakkiyako we know today. And peace ruled for generations."
2004603-93 = "...At least, that's the fairytale version. The reality isn't that simple, of course."
2004603-95 = "Let me ask, Sensei: what do you think of Hyakkiyako?"
2004603-96 = "[s7] \"It's a beautiful place.\n[s8] \"I wouldn't quite call it 'peaceful'...\""
2004603-99 = "Nyahaha! Right?"
2004603-100 = "It's like a house built on sand. There's some charm to that, for sure..."
2004603-101 = "...but if you push, it falls over, and if you pull, it collapses."
2004603-102 = "The academies aren't in open war anymore, but students and clubs still fight each other all the time."
2004603-103 = "And the Yin-Yang Club's right in the middle of it all. Basically, every other club here conceded certain powers to a new club, our club, and in theory, we're mediators. In theory. Reality is, we're only as relevant as both sides say we are."
2004603-104 = "Most times, we're stuck between a rock and a hard place."
2004603-105 = "So when people have conflicts and problems, we're usually better off just watching, not trying to meddle."
2004603-106 = "Best case, we get lucky, and everything works out on its own..."
2004603-107 = "[s9] \"How often does that actually happen?\"\n[s10] \"I'd love it if it worked that way, but...\""
2004603-110 = "Nyaha! Yeah, I know. Nothing's ever that easy."
2004603-111 = "She's gone again!"
2004603-112 = "What?! She just barely finished YESTERDAY'S work, though!"
2004603-116 = "Ah, and there's my adorable juniors again."
2004603-117 = "Guess we'd better call it for today."
2004603-119 = "And with that, Niya speed-walked in the opposite direction of the Yin-Yang Club room."
2004603-120 = "I could hear her juniors searching for her in the streets for quite a while."

2004603-37 = "3;니야;01;하지만 괜한 기대하지 않게, 결론부터 말씀드리자면 저희가 해결할 수 없네요."
2004603-38 = "1;종이접기부 부원 A;04;어, 어째서죠?!\n#1;ar\n#3;m5\n#1;em;[?!]\n#1;shake"

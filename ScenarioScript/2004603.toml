2004603-33 = "3;종이접기부 부원 A;05;아참! 그게…… 사실 부실을 바꾸고 싶어서요.\n#3;closeup"
2004603-34 = "3;종이접기부 부원 A;05;요즘 부실에서 자꾸 이상한 소리가 들리고, 저녁만 되면 주변에 불 켜진 곳도 하나 없고요…….\n#3;closeup"
2004603-35 = "3;종이접기부 부원 A;04;심지어 소문에 따르면 유령이 나온다고도! 부원들 모두 겁에 질려서, 부 활동이 멈춰버렸어요!\n#3;closeup\n#3;em;[!]"

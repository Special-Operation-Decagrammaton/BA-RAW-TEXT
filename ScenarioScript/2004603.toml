[translation]
2004603-1 = "ดินแดนอันแห้งแล้งไร้คำตอบ"
2004603-2 = "ชมรมหยินหยาง เฮียกคิยาโค"
2004603-3 = "คุณนิยะเหรอคะ? ไม่เห็นบอกอะไรไว้เลยนะคะ?"
2004603-4 = "[ns1] \"นิยะ!!!\"\n[ns2] \"อะไรกัน โดนหลอกอีกแล้วเหรอเรา!!!\""
2004603-7 = "ตอนนี้คุณนิยะกำลังต้อนรับแขกอยู่ในห้อง ไว้เสร็จแล้วฉันจะมา... อ๊ะ ไม่สิ คุณครูเข้าไปสังเกตการณ์#nการทำงานของชมรมหยินหยางดูมั้ยคะ?"
2004603-8 = "ถ้ามีคุณครูคอยจับตาดูอยู่ ต่อให้เป็นถึงหัวหน้าก็คงโดดงานไม่ได้ค่ะ ฮุฮุฮุ..."
2004603-10 = "(คุณครูได้รับการแนะนำจากสมาชิกชมรมหยินหยางและตัดสินใจไปสังเกตการณ์การทำงานของนิยะ)"
2004603-12 = "อะฮะฮ่า! ใช่ค่ะ~ ได้ยินมาว่างานเทศกาลครั้งนี้ประสบความสำเร็จเกินความคาดหมายเลยค่ะ เด็กสาวคนนี้ประทับใจมากเลยละค่ะ~"
2004603-13 = "ฮ่าฮ่า ไม่ขนาดนั้นหรอกครับ! ยุคนี้เป็นยุคของโซเชียลมีเดียจริงๆ เลยนะ พอวิดีโอการแสดงถูกแชร์#nออกไป ผู้คนก็มาเที่ยวกันล้นหลามเลย~"
2004603-14 = "ตอนนี้กลุ่มการค้าน่าจะงานยุ่งกันแท้ๆ ว่าแต่มีธุระอะไรกับชมรมหยินหยางเหรอคะ?"
2004603-15 = "อ่อ... อ้อ จะว่าไปมันก็น่าเขินนะครับ พองานเทศกาลของเราประสบความสำเร็จแบบเกินคาด ปัญหาก็ตามมาน่ะครับ"
2004603-16 = "ท้องถนนเต็มไปด้วยขยะ... แถมรูปปั้นริมถนนก็ได้รับความเสียหายหลายอัน..."
2004603-17 = "สรุปก็คือ อยากขอแรงชมรมหยินหยางไปฟื้นฟูท้องถนน..."
2004603-19 = "ครับ ใช่เลย! ชมรมหยินหยางเป็นชมรมที่ช่วยเหลือคนอื่นอยู่แล้วไม่ใช่เหรอครับ?"
2004603-20 = "อืม~ ใจฉันก็อยากช่วยนะคะ แต่การจัดสรรงบประมาณไปกับงานของกลุ่มการค้าเป็นเรื่องยากน่ะค่ะ~"
2004603-21 = "ช่วยยืดหยุ่นกับเรื่องนั้นหน่อยเถอะครับ... พวกเรากำลังคนไม่พอน่ะ แค่ส่งสมาชิกชมรมมาไม่กี่คน#nก็น่าจะช่วยได้แล้ว..."
2004603-22 = "ต้องขอโทษด้วยนะคะ แต่งานนั้นไม่ได้อยู่ในความรับผิดชอบของพวกฉันค่ะ"
2004603-23 = "เฮ้อ ทำไมเป็นแบบนี้ไปได้ล่ะ..."
2004603-25 = "(แล้วแขกคนต่อไปก็เข้ามา...)"
2004603-27 = "อ๊ะ สวัสดีค่ะ! คุณคือหัวหน้าชมรมหยินหยางใช่มั้ยคะ?"
2004603-28 = "ใช่ค่ะ ฉันคืออามาจิ นิยะ หัวหน้าชมรมหยินหยางค่ะ ตายจริง~ วันนี้เรามีแขกคนพิเศษมาเลยนะคะเนี่ย"
2004603-29 = "ได้ยินว่าที่ห้องชมรมพับกระดาษโอริกามิที่อยู่ในหุบเขามีแต่ช่างฝีมือที่อุทิศตนให้กับงานฝีมือกระดาษ#nทั้งวันทั้งคืนเลย~"
2004603-30 = "คะ... คะ?! ช่างฝีมืองั้นเหรอคะ?! มะ... ไม่ถึงกับขนาดนั้นหรอกค่ะ! ฉันแค่ชอบพับกระดาษ ก็เลยแค่พับเป็นงานอดิเรกเฉยๆ น่ะค่ะ... แหะๆๆ"
2004603-31 = "ว่าแต่มีธุระอะไรกับชมรมหยินหยางเหรอคะ?"
2004603-33 = "อ๊ะ จริงสิ! คือว่า... พวกฉันอยากเปลี่ยนห้องชมรมน่ะค่ะ"
2004603-34 = "ช่วงหลังมานี้พวกฉันได้ยินเสียงแปลกๆ ออกมาจากห้องน้ำตลอดเลย แล้วพอตกเย็น บริเวณนั้น#nก็ไม่เปิดไฟเลยสักดวงค่ะ..."
2004603-35 = "แถมยังมีข่าวลือว่ามีผีออกมาด้วยนะคะ! พวกฉันกลัวกันมากจนต้องหยุดพักกิจกรรมของชมรมไว้ก่อน#nเลยค่ะ!"
2004603-36 = "โอ้โห ฟังดูเป็นเรื่องลำบากจริงๆ เลยนะคะ~"
2004603-37 = "แต่ฉันจะเข้าประเด็นเลยนะคะ จะได้ไม่ต้องคาดหวังกัน พวกฉันช่วยอะไรไม่ได้หรอกค่ะ"
2004603-38 = "ทะ... ทำไมล่ะคะ?!"
2004603-39 = "ถ้างั้นเอาแบบนี้มั้ยล่ะคะ? คืนห้องชมรมพับกระดาษโอริกามิ แล้วให้ชมรมอื่นมาใช้ห้องแทนน่ะค่ะ"
2004603-40 = "คะ?! บะ... แบบนั้นคง..."
2004603-41 = "ไม่ได้ใช่มั้ยล่ะคะ~"
2004603-42 = "อ่า..."
2004603-43 = "ชมรมหยินหยางมอบหรือยึดห้องของชมรมอื่นตามอำเภอใจไม่ได้หรอกค่ะ"
2004603-44 = "ถ้าเป็นเรื่องการเปลี่ยนห้องชมรม ชมรมอื่นอาจช่วยทำให้ได้ แต่ชมรมหยินหยางช่วยอะไรไม่ได้ค่ะ"
2004603-45 = "ไหงเป็นงี้ล่ะ..."
2004603-47 = "(แล้วก็ถึงคิวของแขกคนสุดท้าย...)"
2004603-49 = "นี่! ทำไมถึงเป็นแบบนี้ไปได้ล่ะ! เหลวไหลชะมัด!"
2004603-50 = "พวกฉันทำประโยชน์กับงานเทศกาลครั้งที่แล้วไว้ตั้งมากมาย แต่กลับไม่ได้ค่าตอบแทนเลยสักเยน!"
2004603-51 = "ถึงพวกเราจะเป็นเอ็กซ์ตรา แต่พอเป็นเรื่องงาน เราก็หยิ่งในศักดิ์ศรีนะ! กล้าดูถูกพวกเราหรือไง!"
2004603-52 = "พวกคุณทำสัญญาไว้กับทางกลุ่มการค้าไม่ใช่เหรอคะ...?"
2004603-53 = "เอะ... เอ๋? งั้นเหรอ? แต่ชมรมหยินหยางช่วยเหลือได้ทุกอย่างไม่ใช่หรือไง?"
2004603-54 = "ถ้ามันอยู่ในขอบเขตงานของพวกฉัน พวกฉันก็ยินดีช่วยค่ะ แต่น่าเสียดายนะคะที่การจ่ายค่าจ้าง#nไม่ใช่งานของชมรมเรา~"
2004603-56 = "(แล้วแขกทุกคนก็กลับไป)"
2004603-58 = "ตายจริง~ ขอโทษที่ทำให้รอนานนะคะ~"
2004603-59 = "คิดไม่ถึงเลยนะคะว่าคุณครูจะมารออยู่ก่อนแล้ว... อะฮะฮ่า~ ฉันดันให้คุณครูเห็นภาพลักษณ์ที่ไม่น่าดู#nจนได้~"
2004603-60 = "[s3] \"อืม... ปกติทำงานแบบนี้เหรอ?\"\n[s4] \"ปกติเป็นแบบนี้เหรอ?\""
2004603-63 = "คะ? เรื่องงานน่ะเหรอคะ? ก็ต้องเป็นอย่างนั้นละค่ะ~"
2004603-64 = "ชมรมหยินหยางรับผิดชอบปัญหาน้อยใหญ่ในเฮียกคิยาโคมาตั้งแต่สมัยก่อนแล้วค่ะ..."
2004603-65 = "อ้อ~ คุณครูหมายถึงขั้นตอนการทำงานสินะคะ"
2004603-66 = "คุณครูก็คงเคยเห็นจากโรงเรียนอื่นๆ มาบ้างแล้ว"
2004603-67 = "ฉันเดาว่าคุณครูน่าจะใกล้ชิดกับสภานักเรียนของโรงเรียนอื่น และคงสัมผัสได้ถึงรูปแบบการทำงานที่#nไม่เหมือนใครของชมรมหยินหยางนะคะ"
2004603-68 = "ฮืม~ กลายเป็นว่าฉันกำลังพูดเรื่องน่าเบื่อจนได้นะคะ~"
2004603-69 = "เราออกไปเดินเล่นข้างนอกกันก่อนมั้ยคะ?"
2004603-70 = "ถ้าได้เดินชมวิวสวยๆ ข้างนอก การฟังเรื่องราวประวัติศาสตร์ก็น่าจะเหมือนกับได้ฟังเพลงที่ผ่อนคลาย~ นะคะ อะฮะฮ่า~"
2004603-71 = "[s5] \"เรื่องนั้นเอาไว้ก่อนเถอะ ว่าแต่เรื่องลำบากที่เจออยู่...\"\n[s6] \"ตกลงเรื่องลำบากที่เจออยู่คืออะไรเหรอ?\""
2004603-74 = "เด็กสาวคนหนึ่งต้องมาทำงานเพื่อส่วนรวมจนไม่ได้สนุกกับช่วงวัยรุ่นของตัวเอง ช่างเป็นโศกนาฏกรรมจริงๆ เลยค่ะ~"
2004603-75 = "แต่พอคุณครูมาหา ทุกอย่างก็คลี่คลายได้สมดังปรารถนาเลยค่ะ~ อะฮะฮะฮ่า~"
2004603-77 = "(ปกติถนนเฮียกคิยาโคจะสะอาดอยู่เสมอ แต่วันนี้มีขยะเกลื่อนกลาดไปหมด)"
2004603-78 = "อะฮ่า... ให้เห็นมุมที่น่าอายของโรงเรียนเสียได้นะคะ~"
2004603-79 = "งานเทศกาลครั้งนี้ประสบความสำเร็จเกินความคาดหมายเลย... กำลังคนในการเคลียร์สถานที่คงไม่พอ#nเมื่อเทียบกับนักท่องเที่ยวจำนวนมากที่เข้ามาน่ะค่ะ"
2004603-80 = "แต่ก็เอาเถอะ~ ปล่อยไว้แบบนี้ เดี๋ยวก็มีคนใจดีมาเก็บกวาดจนกลับมาสะอาดสะอ้านเหมือนเดิมค่ะ~"
2004603-81 = "ก็คนที่นี่ขยันกันนี่คะ~ อะฮะฮ่า~"
2004603-82 = "จริงสิ~ เรื่องราวประวัติศาสตร์ของเรายังไม่จบนี่นา เล่าไปถึงไหนแล้วนะ?"
2004603-83 = "เอาละ งั้นเอาแบบนี้มั้ยคะ? เรื่องราวเก่าแก่ในอดีตมักจะเริ่มต้นแบบนี้น่ะค่ะ"
2004603-84 = "กาลครั้งหนึ่งนานมาแล้ว นานจนจำไม่ได้~"
2004603-89 = "ในสมัยที่เฮียกคิยาโคยังไม่ได้เป็นสหพันธ์เฮียกคิยาโคอย่างทุกวันนี้..."
2004603-91 = "โรงเรียนมากมายหลายแห่งไม่ลงรอยกันและต่อสู้กันด้วยเหตุผลที่ต่างกันออกไป จนนำไปสู่ช่วงเวลา#nแห่งสงครามอันยาวนาน..."
2004603-92 = "จนในที่สุดโรงเรียนเหล่านั้นก็หยุดการต่อสู้ลง แล้วก็ยึดเจตจำนงเดียวกันจนก่อตั้งเป็นสหพันธ์#nเฮียกคิยาโคในตอนนี้ แล้วความสงบสุขก็สืบทอดมายังปัจจุบัน~"
2004603-93 = "ถ้ามันจบอย่างนั้นก็ดีน่ะสิคะ แต่ว่าความจริงมันไม่ง่ายเหมือนเรื่องเล่าในอดีตหรอกค่ะ~"
2004603-95 = "แล้วคุณครูคิดยังไงกับเฮียกคิยาโคเหรอคะ?"
2004603-96 = "[s7] \"เป็นสถานที่ที่สวยงามเลยละ\"\n[s8] \"มันเคยสงบสุขขนาดนั้นเลยเหรอ...? \""
2004603-99 = "อะฮะฮะฮ่า! กะไว้แล้วเชียวว่าต้องพูดแบบนี้~"
2004603-100 = "ที่นี่ก็เหมือนบ้านที่สร้างบนพื้นทรายค่ะ บ้านที่อยู่บนพื้นทรายที่มีพื้นฐานไม่แข็งแรง จะว่าไปมันก็#nมหัศจรรย์ดีนะคะ"
2004603-101 = "แต่ถ้าผลักก็คงล้มโครม ถ้าดึงก็คงพังทลายได้..."
2004603-102 = "ถึงการชิงอำนาจระหว่างโรงเรียนจะหายไปแล้ว แต่ความขัดแย้งระหว่างนักเรียนและชมรมนั้น#nก็ยังเกิดขึ้นอยู่บ่อยๆ ค่ะ"
2004603-103 = "และอำนาจที่ชมรมหยินหยางมีคืออำนาจอันคลุมเครือที่แต่ละชมรมมอบให้เราด้วยความเคารพ เป็นอำนาจที่บังคับใช้ยาก และเป็นสิ่งไม่ชัดเจนว่ามีอยู่ก่อนหน้านั้นหรือเปล่า"
2004603-104 = "เห็นอย่างนี้พวกฉันเองก็วางตัวลำบากนะคะ~"
2004603-105 = "เพราะงั้นแล้ว แทนที่จะไปแตะต้องบ้านที่สร้างบนพื้นทราย สู้เฝ้าดูอยู่เงียบๆ อาจเป็นคำตอบที่ถูกต้อง#nกว่าค่ะ"
2004603-106 = "ถ้าโชคดี ทุกอย่างก็คงออกมาดีเองละค่ะ และถ้าเป็นอย่างนั้นก็ถือว่าดีที่สุดด้วย~"
2004603-107 = "[s9] \"จะเป็นอย่างนั้นไปได้ยังไง...\"\n[s10] \"บางทีครูก็คิดคล้ายๆ กัน แต่ไม่เห็นปัญหาจะแก้ได้เลย...\""
2004603-110 = "อะฮ่า! ก็ไม่แปลกหรอกค่ะ~ โลกนี้ไม่มีอะไรที่ง่ายดายอยู่แล้วค่ะ~"
2004603-111 = "คุณนิยะหายไปอีกแล้ว!"
2004603-112 = "ว่าไงนะ?! เพิ่งจะเคลียร์งานของเมื่อวานเสร็จเองนะ?!"
2004603-116 = "ตายจริง~ เหมือนว่ารุ่นน้องที่น่ารักของฉันน่าจะจับสังเกตได้แล้วละค่ะ~"
2004603-117 = "ถ้างั้นวันนี้เรากลับกันก่อนดีมั้ยคะ~?"
2004603-119 = "(เมื่อพูดจบ นิยะก็รีบเดินไปยังทิศตรงข้ามกับห้องชมรมหยินหยางทันที)"
2004603-120 = "(หลังจากนั้นคุณครูก็ได้ยินเสียงของเหล่าสมาชิกชมรมหยินหยางที่ออกมาตามหานิยะตามท้องถนนอยู่#nพักใหญ่...)"

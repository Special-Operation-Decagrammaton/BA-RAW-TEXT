2004603-26 = "#all;hide"
2004603-27 = "3;종이접기부 부원 A;00;아, 안녕하세요! 음양부장님, 이실까요?\n#3;a\n#3;em;[반응]"
2004603-28 = "5;니야;03;네, 부족한 몸이나 음양부장을 맡고 있는 아마치 니야라 합니다. 그렇지만, 이야~ 참 귀한 손님이 오셨네요.\n#5;al\n#3;m1"
2004603-29 = "5;니야;01;종이접기부라면 산간의 부실에 묻혀 밤낮으로 종이 공예에 몰두하는 장인분들이라 들었는데~"
2004603-30 = "3;종이접기부 부원 A;04;네, 네?! 장인이라뇨?! 너, 너무 과분해요! 그냥 종이접기를 좋아해서 하고 있을 뿐인데…… 에헤헤.\n#3;em;[///]"
2004603-31 = "5;니야;02;그래서, 그런 분들께서 어쩐 일로 음양부에?\n#5;em;[?]"

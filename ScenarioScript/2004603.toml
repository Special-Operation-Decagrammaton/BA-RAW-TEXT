2004603-7 = "3;음양부원 A;01;지금은 안에서 손님맞이 중이신데, 끝나면 알려 드릴…… 앗, 아니다. 혹시 음양부 업무를 참관해 보시겠어요?"
2004603-8 = "3;음양부원 A;03;선생님이 지켜보고 계신다면, 천하의 부장님이라도 땡땡이칠 수 없겠죠, 후후후…….\n#3;em;[재잘]"
2004603-9 = "#all;hide"
2004603-10 = "#na;(속마음이 새어 나오는 음양부원의 안내를 받아 니야의 업무를 견학하기로 했다.)"
2004603-11 = "#all;hide"
2004603-12 = "3;니야;03;냐하핫! 들었습니다~ 이번 축제는 예상을 뛰어넘은 대성황이라고요. 소녀 감복하고 또 감복했습니다~\n#3;a\n#3;em;[음표]"
2004603-13 = "1;지역상인회장;01;하하, 뭘요! 역시 요즘은 SNS가 대세더라고요. 공연 영상이 퍼지자마자 그렇게 사람이 몰려와서~\n#1;ar\n#3;m5\n#1;em;[재잘]\n#1;hophop"
2004603-14 = "3;니야;02;그래서 한창 바쁠 상인회 분께서 어인 일로 음양부까지 발걸음을?"
2004603-15 = "1;지역상인회장;01;아, 아아. 조금 부끄러운 얘긴데요. 예상보다 너무 성공했더니, 문제가 많이 터져서요."
2004603-16 = "1;지역상인회장;01;거리는 쓰레기로 엉망진창…… 파손된 거리 조형물도 수두룩…….\n#1;em;[...]"
2004603-17 = "3;니야;07;요컨대 거리 수복에 음양부의 힘을 빌리고 싶다……."
2004603-18 = "#all;hide"
2004603-19 = "3;지역상인회장;01;네, 그 말대로입니다! 음양부는 사람을 도와주는 곳이잖습니까?\n#3;closeup\n#3;em;[!]"
2004603-20 = "3;니야;02;으음~ 돕고 싶은 마음은 굴뚝 같지만, 상인회 일로는 예산 집행이 어려워서요~\n#3;em;[한숨]"
2004603-21 = "3;지역상인회장;01;그 부분을 어떻게든 융통성 있게…… 말 그대로 일손이 없어요. 부원 몇 명만이라도 보내준다면 정말 도움될 텐데……."
2004603-22 = "3;니야;07;송구스럽지만, 저희 관할이 아닌 듯합니다."
2004603-23 = "3;지역상인회장;01;하, 이걸 어쩐다…….\n#3;em;[세로선]"

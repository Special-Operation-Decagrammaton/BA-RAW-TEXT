[translation]
2004603-1 = "貧瘠之地無聲回應"
2004603-2 = "百鬼夜行陰陽部"
2004603-3 = "仁耶大人是嗎？沒發生什麼事呀？"
2004603-4 = "[ns1] 「仁耶！！！」\n[ns2] 「可惡，又中計了！！！」"
2004603-7 = "現在他正在裡面接待客人，等結束之後我會告訴他……#n啊，對了。老師要不要順便參觀一下陰陽部的業務呢？"
2004603-8 = "如果老師在一旁看著的話，就算是部長大人也不敢隨便偷懶了吧，呵呵呵……"
2004603-10 = "（在暗自吐露心聲的陰陽部員的帶領下，決定開始參觀仁耶的工作情況）"
2004603-12 = "喵哈哈！我聽說了唷～#n這次的慶典比預期還要成功，真是讓小女子佩服又感動呢～"
2004603-13 = "哈哈，哪裡哪裡！現在果然是社群媒體的時代了呢。#n表演的影片一在網路上擴散，人潮馬上就蜂擁而至～"
2004603-14 = "不過如此繁忙的商會，今日為何遠道而來呢？"
2004603-15 = "啊，啊啊。說來有點不好意思……因為太成功的關係，反而出了不少問題。"
2004603-16 = "除了街道上的垃圾堆積如山之外……損壞的街道裝飾也不計其數……"
2004603-17 = "所以簡而言之，各位希望請我們陰陽部協助恢復街道……"
2004603-19 = "沒錯，就是這個意思！#n陰陽部不是專門幫助大家的嗎？"
2004603-20 = "唔嗯～雖然我也很想幫忙……#n不過如果是商會的事情，在預算執行方面實在有點困難呢～"
2004603-21 = "能不能想辦法通融一下……我們實在缺乏人手啊。#n哪怕只派幾個部員幫忙也好……"
2004603-22 = "不好意思，這似乎不在我們的管轄範圍內呢。"
2004603-23 = "唉，這下該怎麼辦才好……"
2004603-25 = "（接著又有下一位客人到來……）"
2004603-27 = "您，您好！請問陰陽部部長在嗎？"
2004603-28 = "你好，我就是擔任陰陽部部長的仁耶。#n不過～這可真是稀客呢。"
2004603-29 = "我聽說摺紙部的各位都是埋首於山間的部室，日日夜夜專注於紙藝創作的職人呢～"
2004603-30 = "咦，咦！？職人什麼的太誇張了啦！#n我們只是單純喜歡摺紙而已……呵呵。"
2004603-31 = "話說，這樣的各位為何會來陰陽部呢？"
2004603-33 = "啊，對了！其實……我們想要換一間部室。"
2004603-34 = "因為最近部室裡總是會傳出奇怪的聲音，晚上又會變得一片漆黑……"
2004603-35 = "甚至還有傳聞說會鬧鬼！#n害得部員們都被嚇得不輕，根本沒辦法好好活動！"
2004603-36 = "哎呀哎呀，那可真麻煩呢～"
2004603-37 = "不過為了不讓你們抱有不必要的期待，我就從結論說起吧──我們幫不上忙。"
2004603-38 = "為，為什麼！？"
2004603-39 = "該怎麼說呢……不如你們摺紙部就把部室讓給其他社團使用吧？"
2004603-40 = "什麼！？#n這，這怎麼行……"
2004603-41 = "……當然不行對吧～"
2004603-42 = "啊。"
2004603-43 = "就像這樣，部室並不是陰陽部能隨意分配或收回的。"
2004603-44 = "除非有其他社團願意交換，否則我們陰陽部恐怕愛莫能助。"
2004603-45 = "怎麼這樣……"
2004603-47 = "（最後一位客人進來了……）"
2004603-49 = "喂！這是怎麼回事！"
2004603-50 = "上次祭典我們出了那麼多力，結果一毛錢都沒拿到是什麼意思！"
2004603-51 = "雖然只是臨時演員，但我們對這份工作可是充滿榮譽的！#n你們是在看不起我們嗎！？"
2004603-52 = "……那份契約不是你們和商會簽的嗎？"
2004603-53 = "是，是嗎？但陰陽部不是什麼都能解決嗎？"
2004603-54 = "如果是我們管轄內的問題就可以。#n不過很遺憾，追討欠款並不在我們的職責範圍內呢～"
2004603-56 = "（最終所有客人都離開了）"
2004603-58 = "哎呀～讓您久等真是不好意思～"
2004603-59 = "沒想到老師已經在這裡了呢……#n喵哈哈～真是讓您見笑了～"
2004603-60 = "[s3] 「唔嗯……」\n[s4] 「平常也是這樣嗎？」"
2004603-63 = "嗯？您是指業務嗎？#n大致上是這樣吧～"
2004603-64 = "自古以來，陰陽部一直負責調解百鬼夜行內部的各種糾紛……"
2004603-65 = "啊哈～看來老師指的是我們的處理方式呢。"
2004603-66 = "老師應該已經見過不少學園，也和其他學園的學生會有過密切往來……"
2004603-67 = "所以才會覺得我們陰陽部的手段比較特別吧。"
2004603-68 = "嗯～這個話題好像有些無趣～"
2004603-69 = "我們不如出去走走吧？"
2004603-70 = "如果配合美麗的風景，就連枯燥的歷史也能像歌詞一樣動聽～就好了呢，喵哈哈～"
2004603-71 = "[s5] 「可以是可以……」\n[s6] 「不過你之前提到的棘手的狀況是什麼？」"
2004603-74 = "就是一名少女無法享受青春，只能困在公務裡的悲劇啊～"
2004603-75 = "不過多虧老師來了，一切都圓滿解決了呢～喵哈哈哈～！"
2004603-77 = "（與平時整潔的百鬼夜行街道不同，這裡到處都散落著垃圾）"
2004603-78 = "喵哈……稍微有點丟臉呢？"
2004603-79 = "或許是因為這次祭典的盛況超乎預期……#n才會導致準備的清潔措施明顯無法負荷來訪的人潮吧。"
2004603-80 = "不過嘛～就算放著不管也會恢復原狀的～"
2004603-81 = "畢竟大家可是很勤快的呢～喵哈哈～"
2004603-82 = "那麼～繼續剛才的話題吧。#n該怎麼說明才好呢？"
2004603-83 = "嗯，就從這裡說起吧。#n這是個相當古老的故事，而古老的故事總是這樣開始的──"
2004603-84 = "很久很久以前，在那個老虎還會抽菸的年代～"
2004603-89 = "……我是說在百鬼夜行還不是百鬼夜行的時候。"
2004603-91 = "當時存在的無數學園因各種理由而爭鬥不休，延續著漫長的戰亂時代……"
2004603-92 = "直到學園們終於停止爭鬥、願意齊心協力……才誕生了如今的百鬼夜行。#n此後世世代代都過著和平安樂的日子，真是可喜可賀～"
2004603-93 = "……如果能這樣結束就好了，可惜現實並沒有那麼簡單呢～"
2004603-95 = "老師覺得百鬼夜行是個怎麼樣的地方呢？"
2004603-96 = "[s7] 「是個很美的地方。」\n[s8] 「不過好像也沒有那麼和平……？」"
2004603-99 = "喵哈哈哈！果然是這樣吧～"
2004603-100 = "某種意義上來說，就像沙上樓閣一般。#n雖說立於沙灘上的樓閣確實別有一番風味……"
2004603-101 = "不過只要輕輕一推就會倒下，稍微拉扯便會崩塌……"
2004603-102 = "雖然學園間的群雄割據已經終止，但學生與社團間的爭執依然層出不窮。"
2004603-103 = "在這種情況下，陰陽部所擁有的卻僅僅是各社團以「尊重」之名讓渡的模糊權力……#n不僅難以使用，甚至讓人懷疑它是否真的存在。"
2004603-104 = "我們也挺辛苦的呢～"
2004603-105 = "所以與其笨拙地觸碰這座樓閣，靜觀其變才是上策～"
2004603-106 = "當然，要是一切都能自然解決，那就再好不過了～"
2004603-107 = "[s9] 「恐怕沒那麼容易吧……」\n[s10] 「我偶爾也會這樣想，只是從來沒成功過……」"
2004603-110 = "喵哈！果然如此吧～？#n世上哪會有這麼簡單的事呢～"
2004603-111 = "仁耶大人又不見了！"
2004603-112 = "什麼！？他好不容易才把昨天的事處理完耶！？"
2004603-116 = "哎呀呀～可愛的後輩們好像已經察覺了呢～"
2004603-117 = "那麼今天就到此為止，我們回去吧～"
2004603-119 = "（說完，仁耶便迅速地朝向與陰陽部部室相反的方向走去）"
2004603-120 = "（……不久後，街上便響起了陰陽部員們四處尋找仁耶的聲音）"

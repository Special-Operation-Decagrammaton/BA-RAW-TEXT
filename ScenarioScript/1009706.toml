[translation]
1009706-1 = "Area Beautification"
1009706-2 = "Unused, vacant houses? Sure, they have some of those around here."
1009706-3 = "This village used to be packed with people. But then, starting about ten years ago, a lot of villagers started leaving for the city."
1009706-4 = "So there are vacant, abandoned homes here and there, yeah."
1009706-5 = "If you need a place to shelter from the rain or the wind, feel free to use one."
1009706-6 = "[s] \"Thanks for this.\""
1009706-7 = "No, not at all. We ought to be thankful to you for moving in and taking care of the place."
1009706-8 = "Honestly, these houses are kind of a headache. Even when we subsidize them, no one wants to move in. We can't even GIVE them away."
1009706-9 = "The place is old and run-down, so it'll take some work to clean it all up."
1009706-10 = "Meh, it beats sleeping outdoors."
1009706-11 = "S-Sleeping outdoors...?"
1009706-12 = "Anyway, get some rest."
1009706-16 = "Phew. Well, looks like I can rest easy thanks to you, Sensei."
1009706-17 = "It wasn't easy to get that portable generator here, and with the weather, I thought I was going to have to cover it up and not use it."
1009706-18 = "But indoors, that's not a problem. The rain won't touch the generator at all."
1009706-19 = "[s] \"I'm glad I could help.\""
1009706-20 = "You and the villagers have been a HUGE help."
1009706-21 = "Water, food, and now a house, even... This is a whole lot more comfortable than Kousagi Park."
1009706-22 = "I'd almost rather keep my operations here and not go back at all, heehee..."
1009706-23 = "[s] \"Really...?\""
1009706-24 = "...I'm kidding. This is just an operation site for me. My home base is my home base."
1009706-25 = "Besides, the park's kind of grown on me."
1009706-26 = "More than anything, our whole squad pledged to do our best there until SRT Academy comes back."
1009706-30 = "Ugh, all this serious talk is giving me the heebie-jeebies."
1009706-31 = "...In any case! We'd better start cleaning if we want to make a base out of this place!"
1009706-32 = "Like the villager said, it's going to take a lot of work..."
1009706-34 = "After that, Moe and I started cleaning the house from top to bottom."
1009706-36 = "Oof... This is a way bigger job than I thought."
1009706-37 = "So many of the fixtures are rotting or broken. We've been at it all day, and all we've done so far is clear out the unusable furniture."
1009706-38 = "[s] \"Well done, Moe.\""
1009706-39 = "Nah, but thanks for the help. From me and the squad."
1009706-40 = "It'll take a few more days to make the place livable, but..."
1009706-41 = "At least tonight, I can cozy up and analyze the data indoors, no wind, no rain."
1009706-42 = "...Huh?"
1009706-46 = "Is that a mosquito?"
1009706-47 = "More than one. And there's, moths, horseflies, even mayflies..."
1009706-48 = "This place is full of bugs!"
1009706-52 = "Ahh! They're coming this way!"
1009706-53 = "[s1] \"Is there a nest inside the house?\"\n[s2] \"There's so many...\""
1009706-56 = "*sigh* I really didn't want to use this."
1009706-57 = "A phosphorus smoke grenade, effective against flying insects!"
1009706-58 = "[s3] \"No, not that!\"\n[s4] \"That's effective against people too!\""
1009706-61 = "Oh yeah, huh? ...Come to think of it, it'd be a huge pain in the butt just cleaning up all the residue..."
1009706-62 = "All right, I'll use a CS grenade. Harmless to humans."
1009706-63 = "[s] \"That's not harmless at all!\""
1009706-67 = "[ns5] \"Look, give me a second...\"\n[ns6] \"I brought something just in case.\""
1009706-71 = "You brought a...mosquito coil?"
1009706-72 = "Bah, that thing can barely kill a fly."
1009706-73 = "[s7] \"...Isn't that what we're trying to do?\"\n[s8] \"Let's just light it up and wait a bit.\""
1009706-81 = "― [log=모에 수영복]Hmm... I really think we could use more  firepower... [/log][wa:2100] "
1009706-82 = "― [log=모에 수영복]Well, there's smoke coming from it, so maybe it'll work.[/log][wa:1430] "
1009706-85 = "[ns9] \"Smoke doesn't necessarily equal firepower, but...\"\n[ns10] \"Let's just wait patiently for now.\""
1009706-88 = "― [log=모에 수영복]Come to think of it, it's been a while since I smelled this. [/log][wa:3160] "
1009706-91 = "― [log=모에 수영복]When I was at SRT...[/log]"
1009706-92 = "― [log=모에 수영복]Or...maybe even before that...[/log][wa:2820] "
1009706-95 = "― [log=모에 수영복]Whenever I smell this scent, [/log]"
1009706-96 = "― [log=모에 수영복]it reminds me of a summer way back when.[/log][wa:270] "
1009706-99 = "― [log=모에 수영복]You know, it really is amazing.[/log][wa:830] "
1009706-102 = "― [log=모에 수영복]For bugs, this scent means death, but...[/log][wa:290] "
1009706-103 = "― [log=모에 수영복]...to people, some people, it means nostalgia. [/log][wa:2630] "
1009706-106 = "― [log=모에 수영복]Maybe all people are drawn to destruction, in a way. Heeheehee...[/log][wa:1860] "
1009706-109 = "― [log=모에 수영복]Sensei, could you come over here a little closer?[/log][wa:1250] "
1009706-112 = "― [log=모에 수영복]I just don't want any of these bugs bothering you...[/log][wa:760] "
1009706-113 = "― [log=모에 수영복]Let's both get this smoke all over us.[/log][wa:3540] "
1009706-116 = "Moe and I enjoyed the summer night atmosphere."

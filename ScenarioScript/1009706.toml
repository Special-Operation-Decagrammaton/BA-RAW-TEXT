[translation]
1009706-1 = "#title;Area Beautification"
1009706-2 = "3;마을 주민;00;안 쓰는 빈집 말이야? 그야 있지.\n#3;em;[?]\n#3;a"
1009706-3 = "3;마을 주민;00;예전에는 이 마을도 사람으로 북적이던 때가 있었는데, 10년 전부터 대부분의 주민들이 도시로 떠나버려서……"
1009706-4 = "3;마을 주민;00;지금은 쓰이지 않는 빈집이 곳곳에 방치된 채로 남아 있어."
1009706-5 = "3;마을 주민;00;혹시 비나 바람을 피할 장소가 필요하면 편하게 써도 좋아."
1009706-6 = "[s] \"흔쾌히 빈 집을 내주셔서 감사합니다.\""
1009706-7 = "3;마을 주민;00;아니야. 오히려 빈 집에 들어가서 관리를 해준다면 우리가 더 고맙지."
1009706-8 = "3;마을 주민;00;이런 집들은 무료로 내놓거나, 심지어 지원금을 준다고 해도 들어오려는 사람이 거의 없어서 골칫거리였거든."
1009706-9 = "3;마을 주민;00;오래되고 낡은 집이라 청소하는 데에도 생각보다 품이 많이 들거야."
1009706-10 = "3;마을 주민;00\n4;모에 수영복;00;야외에서 노숙하는 것에 비하면 그 정도는 큰 문제도 아니지!\n#3;m2\n#4;al\n#4;hophop"
1009706-11 = "3;마을 주민;00;노, 노숙……?\n#3;stiff\n#3;em;[땀]"
1009706-12 = "3;마을 주민;00;여하튼 그럼 편히 쉬도록 해."
1009706-13 = "#st;[0,0];instant;1;"
1009706-14 = "#clearST"
1009706-15 = "3;마을 주민;00\n4;모에 수영복;00\n#3;h\n#4;h\n#3;d\n#wait;1000"
1009706-16 = "4;모에 수영복;99;이야~ 덕분에 한숨 돌렸어, 선생님.\n#4;em;[음표]\n#4;m3"
1009706-17 = "4;모에 수영복;02;힘들게 가져온 휴대용 발전기를 쓰지도 못하고 방수포에 감아 두어야 하나, 걱정하던 참이었거든."
1009706-18 = "4;모에 수영복;00;비와 바람을 막을 집이 있다면 이제 안심하고 발전기를 돌릴 수 있겠지."
1009706-19 = "[s] \"도움이 되었다니, 다행이야.\""
1009706-20 = "4;모에 수영복;02;응. 정말 마을 주민들에게는 여러모로 도움을 받았네."
1009706-21 = "4;모에 수영복;99;물도, 음식도, 거주지도…… 생각해 보면 코우사기 공원에 있을 때보다 더 풍족하게 지내는 것 같은걸."
1009706-22 = "4;모에 수영복;07;마음 같아서는 공원으로 돌아가지 않고, 이곳에서 작전을 계속하고 싶을 정도네. 쿠히히……\n#4;em;[음표]"
1009706-23 = "[s] \"정말……?\""
1009706-24 = "4;모에 수영복;12;……그야 당연히 농담이지. 아무리 작전지가 편하더라도 주둔지보다 마음이 편할 리가 없잖아."
1009706-25 = "4;모에 수영복;13;그리고 이제는 그 공원도 제법 정이 들었고……"
1009706-26 = "4;모에 수영복;12;무엇보다 SRT 학원이 부활할 때까지, 그곳에서 다 같이 힘내기로 소대원들과 약속했으니까."
1009706-27 = "#st;[0,0];instant;1;"
1009706-28 = "#clearST"
1009706-29 = "4;모에 수영복;06\n#4;em;[///]\n#wait;1500"
1009706-30 = "4;모에 수영복;06;으으~ 뭔가 어울리지 않는 이야기를 해서 그런가. 두드러기가 생길 것 같네……"
1009706-31 = "4;모에 수영복;05;……여하튼! 이곳을 새로운 거점으로 삼는다면, 청소부터 시작할까?"
1009706-32 = "4;모에 수영복;12;아까 주민이 말해 준 것처럼 청소하는 데 생각보다 시간이 오래 걸릴지도 모르니까."
1009706-33 = "#all;hide"

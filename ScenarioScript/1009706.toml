[translation]
1009706-1 = "Area Beautification"
1009706-2 = "บ้านว่างที่ไม่ได้ใช้เหรอ? มีสิ"
1009706-3 = "แต่ก่อนหมู่บ้านนี้ก็เคยมีคนเยอะจนเรียกว่าแออัดได้เลยละ แต่เมื่อ 10 ปีก่อน ชาวบ้านส่วนใหญ่ก็ย้าย#nไปอยู่ในเมืองกันเสียหมด..."
1009706-4 = "ตอนนี้ก็เลยมีบ้านที่ถูกทิ้งร้างอยู่หลายหลังเลย"
1009706-5 = "ถ้าอยากหาที่หลบฝนหรือลมทะเลละก็ จะไปพักในบ้านพวกนั้นก็ได้นะ"
1009706-6 = "[s] \"ขอบคุณที่ใจดีให้พวกเราเข้าไปอยู่นะ\""
1009706-7 = "ไม่หรอก พวกเราต่างหากที่ต้องขอบใจที่พวกเธอจะเข้าไปอยู่และดูแลบ้านร้างให้"
1009706-8 = "พวกเราก็กลุ้มกับบ้านร้างพวกนี้อยู่ เพราะต่อให้เสนอให้อยู่ฟรีหรือให้เงินสนับสนุน ก็แทบจะไม่มีใคร#nอยากเข้าไปอยู่และดูแลให้เลยน่ะ"
1009706-9 = "บ้านมันเก่ามากแล้ว แค่ทำความสะอาดก็คงต้องเหน็ดเหนื่อยกันไม่น้อยเลย"
1009706-10 = "แต่ถ้าเทียบกับการนอนเร่ร่อนกลางแจ้งแล้ว เรื่องแค่นั้นไม่เป็นปัญหาใหญ่หรอก!"
1009706-11 = "ระ... เร่ร่อนเหรอ...?"
1009706-12 = "เอาเถอะ ยังไงก็เข้าไปอยู่ให้สบายนะหนู"
1009706-16 = "รอดชีวิตได้เพราะคุณครูช่วยไว้เลยนะเนี่ย~"
1009706-17 = "ฉันกำลังกลุ้มใจอยู่เลยว่าต้องหาผ้ากันน้ำมาพันเครื่องกำเนิดไฟฟ้าไว้หรือเปล่า"
1009706-18 = "ถ้ามีบ้านที่บังลมให้ได้ ทีนี้เราก็วางใจและใช้งานเครื่องกำเนิดไฟฟ้าได้เหมือนเดิมแล้วละ"
1009706-19 = "[s] \"โล่งอกไปทีนะที่ครูช่วยได้\""
1009706-20 = "อื้อ ชาวบ้านที่นี่ก็ช่วยพวกเราไว้หลายเรื่องเหมือนกัน"
1009706-21 = "ทั้งน้ำ อาหาร ที่พัก... ถ้ามาคิดๆ ดูแล้ว ตอนนี้พวกเราอยู่สบายมากกว่าตอนที่อยู่ในโคะอุซางิ การ์เด้นอีก"
1009706-22 = "ถ้าเป็นไปได้ฉันอยากอยู่ทำปฏิบัติการที่นี่ไปเรื่อยๆ มากกว่ากลับสวนสาธารณะนั่นอีก ฮิฮิฮิ..."
1009706-23 = "[s] \"จริงเหรอ...?\""
1009706-24 = "ต้องล้อเล่นอยู่แล้วสิ! ต่อให้สถานที่ปฏิบัติการจะสะดวกสบายแค่ไหน แต่ฐานเดิมของเรามันก็#nสบายใจกว่ากันเยอะเลย"
1009706-25 = "แล้วตอนนี้ฉันก็ผูกพันกับสวนสาธารณะนั่นแล้วด้วย..."
1009706-26 = "ที่สำคัญ ฉันสัญญากับสมาชิกกองทหารคนอื่นไว้แล้วว่าจะอยู่ที่นั่นด้วยกันจนกว่าสถาบัน SRT จะได้รับการฟื้นฟู"
1009706-30 = "อ่า... นี่ฉันพูดเรื่องที่ไม่ควรพูดหรือเปล่านะ รู้สึกเหมือนจะเป็นลมพิษเลย..."
1009706-31 = "เอาเถอะ...! ถ้าจะให้ที่นี่เป็นฐานชั่วคราว ก็คงต้องเริ่มทำความสะอาดก่อน"
1009706-32 = "มันอาจจะต้องใช้เวลาในการทำความสะอาดนานเหมือนอย่างที่ชาวบ้านบอกไว้ก็ได้"
1009706-34 = "(หลังจากนั้นคุณครูก็ช่วยโมเอะทำความสะอาดบ้านร้างจนสะอาดเอี่ยม)"
1009706-36 = "เฮ้อ... งานหนักกว่าที่คิดไว้อีกนะเนี่ย"
1009706-37 = "ลำพังแค่เอาเฟอร์นิเจอร์ที่ใช้ไม่ได้ออกไปก็หมดไปทั้งวันแล้ว ไหนจะบริเวณที่ขึ้นราหรือไม่ก็ผุพังอีก..."
1009706-38 = "[s] \"ทำได้ดีมากเลย โมเอะ\""
1009706-39 = "ไม่หรอก ฉันต้องขอบคุณคุณครูมากกว่าที่มาช่วยงานของกองทหารน่ะ"
1009706-40 = "ถ้าจะจัดบ้านให้คนสามารถอยู่อาศัยได้ ฉันว่าคงต้องใช้เวลาอีก 2-3 วัน..."
1009706-41 = "แต่อย่างน้อยคืนนี้เราก็คงวิเคราะห์ข้อมูลได้โดยไม่ต้องกังวลเรื่องลมฝน..."
1009706-42 = "เอ๋...?"
1009706-46 = "นั่นอะไรน่ะ ยุงเหรอ?"
1009706-47 = "เดี๋ยวนะ... มีทั้งยุง ผีเสื้อกลางคืน และแมลงหวี่ด้วย..."
1009706-48 = "นี่มันดงแมลงดีๆ เลยนี่นา?! "
1009706-52 = "ว้ายยย! บินมาทางนี้แล้ว!"
1009706-53 = "[s1] \"มันมาทำรังอยู่ในบ้านร้างหรือเปล่านะ?\"\n[s2] \"มีไม่น้อยเลยนะเนี่ย...\""
1009706-56 = "ฮู่ว... ถ้ามีแมลง ฉันก็ไม่อยากอยู่บ้านหลังนี้นะ"
1009706-57 = "แบบนี้ต้องใช้ระเบิดควันฟอสฟอรัสขาวที่มีประสิทธิภาพในการกำจัดแมลง..."
1009706-58 = "[s3] \"ไม่ได้นะ!\"\n[s4] \"แบบนั้นจะกำจัดคนมากกว่า!\""
1009706-61 = "งั้นเหรอ? พอมาคิดดูแล้วมันก็จริงเนอะ ฟอสฟอรัสขาวมันเก็บกวาดยากด้วย"
1009706-62 = "ถ้างั้นก็ต้องใช้ระเบิดมือ CS ที่ไม่มีพิษ..."
1009706-63 = "[s] \"แบบนั้นก็ยังอันตรายอยู่ดีนั่นแหละ!\""
1009706-67 = "[ns5] \"รอเดี๋ยวนะ\"\n[ns6] \"ครูมีของที่เตรียมมาเผื่อน่ะ\""
1009706-71 = "นี่มัน... เครื่องหอมไล่ยุงนี่นา?"
1009706-72 = "เฮอะ ของที่กำลังไฟอ่อนแบบนี้คงไล่ได้แค่แมลงบินได้ตัวเล็กๆ เท่านั้นละ"
1009706-73 = "[s7] \"แต่เราก็จะไล่แมลงตัวเล็กๆ กันไม่ใช่เหรอ?\"\n[s8] \"จุดไฟแล้วรออย่างใจเย็นดีกว่านะ\""
1009706-81 = "― [log=모에 수영복]อืม ยังไงฉันก็ว่าไฟมันไม่น่าจะแรงพอนะ... [/log][wa:2620] "
1009706-82 = "― [log=모에 수영복]เอาเถอะ มีควันลอยออกมาอยู่ คงใช้ได้ละมั้ง[/log][wa:2030] "
1009706-85 = "[ns9] \"ถึงจะจุดไฟแรงๆ แต่ควันก็ไม่ได้เยอะขึ้นหรอก\"\n[ns10] \"นั่งรอชิลๆ ไปดีกว่านะ\""
1009706-88 = "― [log=모에 수영복]จะว่าไป ฉันไม่ได้ดมกลิ่นแบบนี้มานานแล้วนะเนี่ย [/log][wa:3720] "
1009706-91 = "― [log=모에 수영복]ตั้งแต่ตอนที่อยู่ SRT...[/log]"
1009706-92 = "― [log=모에 수영복]ไม่สิ นานกว่านั้นหรือเปล่านะ?[/log][wa:2860] "
1009706-95 = "― [log=모에 수영복]ถ้าได้กลิ่นหอมแบบนี้[/log]"
1009706-96 = "― [log=모에 수영복]ฉันจะนึกถึงฤดูร้อนในอดีตน่ะ[/log][wa:790] "
1009706-99 = "― [log=모에 수영복]จะว่าไปแล้ว มันน่าทึ่งจังเลยนะ[/log][wa:870] "
1009706-102 = "― [log=모에 수영복]ควันนี้มีกลิ่นหอมแห่งความพินาศที่ไล่พวกแมลงแท้ๆ[/log][wa:10] "
1009706-103 = "― [log=모에 수영복]แต่สำหรับบางคนกลับเป็นกลิ่นอายที่น่ายินดี... [/log][wa:2710] "
1009706-106 = "― [log=모에 수영복]บางทีแล้วคนอาจจะชอบความพินาศกันก็ได้เนอะ ฮิฮิฮิ...[/log][wa:2460] "
1009706-109 = "― [log=모에 수영복]คุณครู เขยิบมาทางนี้อีกนิดได้มั้ย?[/log][wa:1850] "
1009706-112 = "― [log=모에 수영복]ถ้ามีแมลงร้ายไปตอมคุณครู จะเป็นเรื่องใหญ่เอานะ...[/log][wa:880] "
1009706-113 = "― [log=모에 수영복]คืนนี้เรามาอาบควันนี้ให้เยอะๆ ไปเลย[/log][wa:3660] "
1009706-116 = "(จากนั้นคุณครูกับโมเอะก็สนุกสนานกับกลิ่นอายของคืนฤดูร้อนด้วยกัน)"

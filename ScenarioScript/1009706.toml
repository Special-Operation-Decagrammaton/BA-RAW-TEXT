[translation]
1009706-1 = "Area Beautification"
1009706-2 = "閒置的空房子嗎？當然有。"
1009706-3 = "以前這個村子也曾經熱鬧過，#n不過從10年前開始，大部分的居民都搬到都市去了……"
1009706-4 = "現在到處都是沒人住的空房子。"
1009706-5 = "如果需要躲避風雨的地方，可以隨意使用沒關係。"
1009706-6 = "[s]「感謝您的爽快協助。」"
1009706-7 = "別這麼說。#n如果有人願意到空房裡管理，我們反而更感謝呢。"
1009706-8 = "這種房子就算不收錢，甚至提供補助也幾乎沒人會想來住，實在很傷腦筋。"
1009706-9 = "因為房子老舊的關係，打掃會比想像中還費工夫。"
1009706-10 = "跟露宿街頭相比，這種程度根本不算什麼！"
1009706-11 = "露，露宿……？"
1009706-12 = "總之好好休息吧。"
1009706-16 = "哎呀～託你的福能鬆口氣了，老師。"
1009706-17 = "辛苦帶來的攜帶式發電機派不上用場，我還在煩惱要不要用防水布包起來呢。"
1009706-18 = "有能擋風避雨的房子之後，現在能放心啟動發電機了。"
1009706-19 = "[s]「能幫上忙真是太好了。」"
1009706-20 = "嗯，村民們真的幫了我們很多忙。"
1009706-21 = "水、食物和住處……現在想想，好像過得比在兔寶寶公園時還要富足啊。"
1009706-22 = "真想繼續在這裡進行作戰，不回公園去了。#n咯嘻嘻……"
1009706-23 = "[s]「真的嗎……？」"
1009706-24 = "……當然是開玩笑的。#n不管作戰地點有多舒服，心裡都不可能比待在駐屯地時自在。"
1009706-25 = "而且現在已經對那個公園有感情了……"
1009706-26 = "最重要的是，我已經和隊員們約好要在那裡一起努力，直到SRT特殊學園復活了。"
1009706-30 = "唔唔～不知道是不是因為說了什麼不對的話，好像要起疹子了……"
1009706-31 = "……總之！如果要把這裡當作新據點，就先從打掃開始吧？"
1009706-32 = "就像剛才居民說的一樣，打掃可能得花費不少時間。"
1009706-34 = "（之後，和萌一起把空屋清掃乾淨……）"
1009706-36 = "哈啊……確實比想像中還累人呢。"
1009706-37 = "因為很多地方都有生鏽或損壞……#n光是處理不能用的家具就幾乎花了一整天。"
1009706-38 = "[s]「辛苦了，萌。」"
1009706-39 = "不會，我才要謝謝老師幫忙小隊的事。"
1009706-40 = "要整修到能正常生活的程度，應該還需要幾天的時間……"
1009706-41 = "不過至少今晚能不必擔心風雨，悠閒地分析數據──"
1009706-42 = "……嗯？"
1009706-46 = "搞什麼，是蚊子嗎？"
1009706-47 = "哇……蚊子、飛蛾、虻、甚至連蜉蝣都有……"
1009706-48 = "根本是飛蟲的巢穴嘛！？"
1009706-52 = "唔啊啊啊！往這邊飛過來了！"
1009706-53 = "[s1]「是蚊子在空屋裡築巢了嗎？」\n[s2]「規模真嚇人……」"
1009706-56 = "呼……本來是不想用這招的。"
1009706-57 = "這種時候就是要用能有效驅趕飛蟲的白磷煙霧彈──"
1009706-58 = "[s3]「絕對不行！」\n[s4]「那對驅趕人也很有效啊！」"
1009706-61 = "是嗎？#n……不過仔細想想，用了白磷彈之後確實不好清理。"
1009706-62 = "那就用對人體無害的CS手榴彈──"
1009706-63 = "[s]「那也夠有害了好嗎！？」"
1009706-67 = "[ns5]「你等我一下。」\n[ns6]「為了預防萬一，我有帶一個東西過來。」"
1009706-71 = "這不是……蚊香嗎？"
1009706-72 = "呿，這種火力這麼弱的東西只能對付飛蟲啦。"
1009706-73 = "[s7]「……我們的目的不就是對付飛蟲嗎？」\n[s8]「先點上蚊香耐心等一下吧。」"
1009706-81 = "― [log=모에 수영복]唔嗯，不管看幾次都覺得火力很弱……[/log][wa:3580] "
1009706-82 = "― [log=모에 수영복]算了，有在冒煙就行了吧。[/log][wa:3190] "
1009706-85 = "[ns9]「不是火力強就會冒很多煙的哦。」\n[ns10]「先耐心等等吧。」"
1009706-88 = "― [log=모에 수영복]總覺得……聞到這個味道，也是久違了呢。[/log][wa:4840] "
1009706-91 = "― [log=모에 수영복]還在SRT的時候……[/log]"
1009706-92 = "― [log=모에 수영복]不對，可能是更久之前？[/log][wa:3580] "
1009706-95 = "― [log=모에 수영복]只要聞到這個味道，[/log]"
1009706-96 = "― [log=모에 수영복]就會想起以前的夏天。[/log][wa:1470] "
1009706-99 = "― [log=모에 수영복]真是不可思議。[/log][wa:1790] "
1009706-102 = "― [log=모에 수영복]這明明是對蟲有害的毀滅氣味……[/log][wa:1290] "
1009706-103 = "― [log=모에 수영복]卻也能讓某些人感到懷念……[/log][wa:3990] "
1009706-106 = "― [log=모에 수영복]說不定人類，意外還挺喜歡毀滅的呢。咯嘻嘻……[/log][wa:3580] "
1009706-109 = "― [log=모에 수영복]老師，要不要再靠過來一點？[/log][wa:2690] "
1009706-112 = "― [log=모에 수영복]要是老師被壞蟲盯上就糟糕了……[/log][wa:2240] "
1009706-113 = "― [log=모에 수영복]今晚就用這個好好薰一薰吧。[/log][wa:4540] "
1009706-116 = "（之後，和萌一起感受著夏夜風情，度過了快樂的時光）"

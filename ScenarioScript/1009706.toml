1009706-35 = "#all;hide"
1009706-36 = "3;모에 수영복;99;하아…… 생각했던 것보다 훨씬 큰 작업이 되었네.\n#3;a\n#3;em;[한숨]"
1009706-37 = "3;모에 수영복;00;보이지 않는 곳에 썩거나 망가진 시설이 많아서…… 못 쓰는 가구를 걷어내는 것만으로도 하루가 다 지나버렸어."
1009706-38 = "[s] \"수고 많았어, 모에.\""
1009706-39 = "3;모에 수영복;02;아니야. 선생님이야말로 소대의 일을 도와줘서 고마워."
1009706-40 = "3;모에 수영복;00;사람이 살 수 있을 만큼 정비를 하려면 앞으로도 며칠 더 걸리겠지만……"
1009706-41 = "3;모에 수영복;99;적어도 오늘 밤만큼은 비바람 걱정 없이 느긋하게 데이터 분석을 할 수 있겠—"

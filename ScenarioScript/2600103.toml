[translation]
2600103-1 = "#title;메리 씨의 전파"
2600103-2 = "#place;샬레 하우스"
2600103-3 = "#wait;1500"
2600103-4 = "#na;샬레에서 밤 늦게까지 야근을 한 뒤, 잠시 눈을 붙이기 위해 간이 침대에 누웠다."
2600103-5 = "#na;잠이 들 무렵, 어디선가 이상한 소리가 들려오기 시작했다."
2600103-6 = "#na;정체불명의 목소리;하하, 하하하……."
2600103-7 = "#na;정체불명의 목소리;나는 ……야. 지금 ……에 있어……."
2600103-8 = "[s] \"……어디서 나는 목소리지?\""
2600103-9 = "#na;정체불명의 목소리;지금 바로 당신을 찾아갈게……. #n앞으로 둘……!"
2600103-10 = "[s] \"이 목소리는 설마…… 메리 씨?\""
2600103-11 = "#na;정체불명의 목소리;앞으로 하나……!"
2600103-12 = "#bgshake\n[s] \"???!!!\""
2600103-13 = "#wait;1000"
2600103-14 = "#all;hide"
2600103-15 = "#na;밤새도록 들려오는 정체불명의 웃음 소리에 질려 잠을 이루지 못했다……."
2600103-16 = "#all;hide"
2600103-17 = "#place;샬레 집무실"
2600103-18 = "3;코타마;02;어젯밤 샬레 하우스에서 메리 씨로 추측되는 이상한 목소리가 들렸다고요?\n#3;em;[반응]\n#3;a"
2600103-19 = "3;코타마;01;그것 참 흥미롭군요……. 사실 저는 전부터 귀신이 내는 랩음이나 비명소리를 녹음해보는 것이 꿈이었습니다.\n#3;greeting"
2600103-20 = "3;코타마;02;오늘 밤에는 저도 샬레 하우스에서 머물러도 괜찮을까요? 제가 직접 소리가 어디서 나는지 조사해 보겠습니다.\n#3;em;[?]"
2600103-21 = "[s] \"코타마는 메리 씨가 무섭지 않아?\""
2600103-22 = "3;코타마;99;무서울 것 없습니다. 대부분의 현상은 과학으로 설명할 수 있고 설명되지 않는 현상은 연구할 가치가 있다는 뜻이니, 오히려 기쁠 정도입니다."
2600103-23 = "[s] \"……역시 코타마도 밀레니엄의 학생이었구나.\""
2600103-24 = "3;코타마;02;물론입니다. 저 역시 진리를 탐구하는 <베리타스>의 일원이니까요.\n#3;greeting"
2600103-25 = "3;코타마;01;우선은 소리가 들렸을 때 바로 녹음을 할 수 있도록 미리 샬레 하우스에 음향 장비를 설치해 두어야 겠군요."
2600103-26 = "3;코타마;02;그럼 저는 베리타스의 부실에 가서 녹음 장비를 가져오겠습니다.\n#3;em;[반응]"
2600103-27 = "#all;hide"
2600103-28 = "#na;코타마는 녹음 장비를 가지러 밀레니엄으로 돌아갔다."
2600103-29 = "#all;hide"
2600103-30 = "#place;샬레 하우스"
2600103-31 = "3;코타마;01;이곳이 선생님이 숙직할 때 사용하는 샬레 하우스로군요.\n#3;a\n#3;em;[반응]"
2600103-32 = "3;코타마;99;전부터 이곳에 도청 장치를 놓겠다고 벼르고 있었는데, 이런 식으로 설치하게 될 줄은……."
2600103-33 = "3;코타마;01;물론 농담입니다. 도청 장치에 대해서는 신경 쓰지 마십시오.\n#3;greeting"
2600103-34 = "[s] \"더 신경 쓰이는데…….\""
2600103-35 = "3;코타마;02;우선은 이상한 소리가 들리지 않는 지 귀를 기울여볼까요."
2600103-36 = "#all;hide"
2600103-37 = "#na;잠시 후……."
2600103-38 = "#na;정체불명의 목소리;하하, 하하하……."
2600103-39 = "#na;정체불명의 목소리;나는 ……야. 지금 ……에 있어……."
2600103-40 = "[s] \"또 나왔다!\""
2600103-41 = "3;코타마;05;이 목소리는 혹시……?\n#3;a\n#3;stiff\n#3;em;[?!]"
2600103-42 = "3;코타마;06;선생님, 집무실의 라디오를 켜 주시겠습니까?\n#3;em;[반응]"
2600103-43 = "3;코타마;05;제 생각이 맞다면 이건 아마도……."
2600103-44 = "#all;hide\n#wait;1500"
2600103-45 = "#wait;1500"
2600103-46 = "#na;라디오 DJ;하하! 다들 오래 기다렸지? #n나는 DJ 메리! 지금 크로노스 라디오 스튜디오에 있어!"
2600103-47 = "#na;라디오 DJ;사연을 보내주면 푸짐한 선물을 들고 지금 바로 찾아갈게."
2600103-48 = "#na;라디오 DJ;오늘의 사연은 앞으로…… 두 개!"
2600103-49 = "[s] \"이 목소리는 설마……?\""
2600103-50 = "3;코타마;02;네. 이 시간대에 진행되는 심야 라디오 방송입니다.\n#3;greeting\n#3;em;[반응]"
2600103-51 = "3;코타마;01;가끔 연결되지 않은 스피커 기기에 무선 라디오의 주파수 신호가 혼선되면 불쾌한 음성이 출력되기도 합니다."
2600103-52 = "3;코타마;02;아마 선생님이 들은 메리의 목소리도 이 라디오 방송이었겠지요."
2600103-53 = "[s] \"귀신이 아니었다니, 다행이야.\""
2600103-54 = "3;코타마;99;하지만 저로서는 조금 실망스럽군요. 이번에야말로 진짜 심령현상에서 나는 목소리를 녹음할 수 있을 거라 기대했는데."
2600103-55 = "3;코타마;99\n#3;em;…\n#wait;2500"
2600103-56 = "3;코타마;02;……이렇게 된 김에 10엔 동전으로 콧쿠리상이라도 불러볼까요.\n#3;em;[반응]"
2600103-57 = "[s] \"정말로 무서우니까 그만둬!\""
2600103-58 = "#all;hide"
2600103-59 = "#na;이후 직접 강령술을 시험해보려는 코타마를 말리느라 한동안 애를 먹었다."

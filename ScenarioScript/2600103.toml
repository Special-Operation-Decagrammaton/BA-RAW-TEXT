[translation]
2600103-1 = "The Voice of Mary"
2600103-2 = "Schale House"
2600103-4 = "I lay down on a cot to rest my eyes after a late night of work at Schale."
2600103-5 = "Just when I was about to fall asleep, I heard a strange sound."
2600103-6 = "Haha, hahaha..."
2600103-7 = "My name's... I'm...in..."
2600103-8 = "[s] \"...Where's that voice coming from?\""
2600103-9 = "I'm coming straight at you... Two...!"
2600103-10 = "[s] \"That voice... Mary?\""
2600103-11 = "One...!"
2600103-12 = "[s] \"?!\""
2600103-15 = "I couldn't fall asleep because of the mysterious laughing..."
2600103-17 = "Schale Executive Office"
2600103-18 = "So, you heard a mysterious voice at the Schale House which you believe to be Mary?"
2600103-19 = "That's interesting... Actually, it's been a dream of mine to record audio from a ghost."
2600103-20 = "Would it be okay if I stayed at the Schale House with you tonight? I'll discover where the sound is coming from."
2600103-21 = "[s] \"Kotama, aren't you afraid of Mary?\""
2600103-22 = "No need to be afraid. Most phenomena can be explained with science, and unexplained phenomena must be researched. I'm actually quite excited."
2600103-23 = "[s] \"...You really are a Millennium student, after all.\""
2600103-24 = "Of course. I'm also a member of Veritas, the seekers of truth."
2600103-25 = "I'll have to set up the sound equipment in the Schale House in advance so that I can record right away when we hear something."
2600103-26 = "Then I'll go to Veritas' club room to get the recording equipment."
2600103-28 = "Kotama returned to Millennium to get the recording equipment."
2600103-30 = "Schale House"
2600103-31 = "So this is the Schale House Sensei uses when on duty."
2600103-32 = "I tried so hard to install a wiretapping device here... Who'd have thought I'd end up getting it in like this?"
2600103-33 = "That's a joke, of course. Please don't worry about eavesdropping."
2600103-34 = "[s] \"Saying that makes me worry even more...\""
2600103-35 = "First, we'll listen carefully to see if there are any strange sounds."
2600103-37 = "Soon..."
2600103-38 = "Haha, hahaha..."
2600103-39 = "My name's... I'm...in..."
2600103-40 = "[s] \"There it is again!\""
2600103-41 = "This voice is perhaps...?"
2600103-42 = "Sensei, could you turn on the Executive Office radio?"
2600103-43 = "If I'm right, this is probably..."
2600103-46 = "Haha! Did I keep you waiting? This is DJ Mary, coming to you live from Kronos!"
2600103-47 = "If you send me a story, I'll hook you up with some prizes. "
2600103-48 = "Looks like there are...two stories today!"
2600103-49 = "[s] \"This voice is...\""
2600103-50 = "That's right, it's the late-night radio show."
2600103-51 = "Occasionally when the radio frequency gets picked up by an unconnected speaker, this strange voice might result."
2600103-52 = "Mary's voice must've been from this radio broadcast."
2600103-53 = "[s] \"I'm glad it wasn't a ghost.\""
2600103-54 = "But it's a little disappointing. I was looking forward to recording a real ghost's voice."
2600103-56 = "...Maybe I should use a 10 yen coin to give Kokkuri a call."
2600103-57 = "[s] \"Stop it, now you're really scaring me!\""
2600103-59 = "After that, I had a hard time convincing Kotama not to try summoning ghosts."

[translation]
2600103-1 = "เสียงของคุณแมรี่"
2600103-2 = "บ้านพักของชาเล่ต์"
2600103-4 = "คุณครูนอนลงบนเตียงเพื่อพักสายตาหลังจากทำงานจนดึกที่ชาเล่ต์"
2600103-5 = "ในระหว่างที่กำลังเคลิ้มหลับก็ได้ยินเสียงแปลกๆ"
2600103-6 = "ฮ่าฮ่า ฮ่าฮ่าฮ่า..."
2600103-7 = "ฉันชื่อ... ฉัน...อยู่ใน..."
2600103-8 = "[s] \"...เสียงดังมาจากไหนน่ะ?\""
2600103-9 = "ฉันกำลังจะไปหาเธอ... ในอีกสอง...!"
2600103-10 = "[s] \"เสียงนั่น... แมรี่เหรอ?\""
2600103-11 = "หนึ่ง...!"
2600103-12 = "[s] \"???!!!\""
2600103-15 = "สุดท้ายก็นอนไม่หลับเพราะเสียงหัวเราะลึกลับนั่น..."
2600103-17 = "สำนักงานชาเล่ต์"
2600103-18 = "คุณครูได้ยินเสียงลึกลับที่บ้านพักของชาเล่ต์เลยคิดว่าเป็นเสียงของแมรี่เหรอคะ?"
2600103-19 = "น่าสนใจนะคะ... ความจริงแล้วฉันฝันมาตลอดเลยว่าอยากลองอัดเสียงผีจริงๆ บ้างเหมือนกันค่ะ"
2600103-20 = "คุณครูจะว่าอะไรมั้ยคะถ้าฉันจะขอไปที่บ้านพักของชาเล่ต์กับคุณครูคืนนี้? ฉันจะลองค้นหาดูว่า#nเสียงนั่นมาจากไหนค่ะ"
2600103-21 = "[s] \"โคทามะไม่กลัวแมรี่เหรอ?\""
2600103-22 = "ไม่เห็นต้องกลัวเลยค่ะ ปรากฏการณ์ส่วนใหญ่มักอธิบายด้วยหลักวิทยาศาสตร์ได้ เพราะอย่างนั้น#nเราเลยต้องค้นคว้าเพิ่มเกี่ยวกับปรากฏการณ์ที่อธิบายไม่ได้ ฉันเลยคิดว่ามันน่าตื่นเต้นมากเลยค่ะ"
2600103-23 = "[s] \"...โคทามะนี่สมกับเป็นนักเรียนโรงเรียนมิลเลเนียมจริงๆ\""
2600103-24 = "ใช่แล้วค่ะ และฉันก็ยังเป็นสมาชิกของ <เวอริทัส> ที่เป็นผู้ค้นหาความจริงด้วยค่ะ"
2600103-25 = "ฉันคงต้องติดตั้งอุปกรณ์เสียงไว้ที่บ้านพักของชาเล่ต์ เพื่อที่เวลามีเสียงอะไรจะได้บันทึกไว้ได้#nทันทีค่ะ"
2600103-26 = "ถ้างั้นฉันจะไปเอาอุปกรณ์บันทึกเสียงที่ห้องของชมรมเวอริทัสมาก่อนนะคะ"
2600103-28 = "โคทามะกลับไปที่มิลเลเนียมเพื่อไปเอาอุปกรณ์บันทึกเสียงมา"
2600103-30 = "บ้านพักของชาเล่ต์"
2600103-31 = "ที่นี่คือบ้านพักของชาเล่ต์ที่คุณครูไว้พักผ่อนตอนเข้าเวรสินะคะ"
2600103-32 = "ฉันพยายามอย่างมากที่จะติดตั้งอุปกรณ์ดักฟังที่นี่... ไม่นึกเลยว่าจะเข้ามาติดตั้งได้ง่ายๆ แบบนี้..."
2600103-33 = "ฉันล้อเล่นค่ะ ไม่ต้องกังวลจะโดนดักฟังหรอกนะคะ"
2600103-34 = "[s] \"แบบนี้ยิ่งกังวลว่าเดิมอีก\""
2600103-35 = "ก่อนอื่น ลองตั้งใจฟังก่อนว่ามีเสียงแปลกๆ หรือเปล่าดูนะคะ"
2600103-37 = "หลังจากนั้นไม่นาน..."
2600103-38 = "ฮ่าฮ่า ฮ่าฮ่าฮ่า..."
2600103-39 = "ฉันชื่อ... ฉัน...อยู่ใน..."
2600103-40 = "[s] \"เสียงนั่นมาอีกแล้ว!\""
2600103-41 = "หรือว่าเสียงนี้คือ...?"
2600103-42 = "คุณครูคะ ช่วยเปิดวิทยุของสำนักงานหน่อยได้มั้ยคะ?"
2600103-43 = "ถ้าฉันคิดถูกล่ะก็ เสียงนี่อาจเป็นเสียงของ..."
2600103-46 = "ฮ่าฮ่า! ทุกคนรอนานรึเปล่า? นี่คือดีเจแมรี่ ส่งสัญญาณถึงคุณโดยตรงจากโครนอส!"
2600103-47 = "ถ้าคุณส่งเรื่องราวของคุณเข้ามา เราก็จะมอบของขวัญให้กับคุณ!"
2600103-48 = "ดูเหมือนว่าวันนี้จะมี...สองเรื่องด้วยกัน!"
2600103-49 = "[s] \"เสียงนี่มัน...\""
2600103-50 = "ใช่แล้วค่ะ เสียงจากรายการวิทยุรอบดึกน่ะค่ะ"
2600103-51 = "บางครั้งเวลาที่ลำโพงจับสัญญาณคลื่นวิทยุเข้าโดยบังเอิญ ก็อาจทำให้เกิดเสียงแปลกๆ#nแบบนี้ขึ้นได้ค่ะ"
2600103-52 = "เสียงที่คุณครูได้ยินคงเป็นเสียงแมรี่จากรายการวิทยุนี่ล่ะค่ะ"
2600103-53 = "[s] \"ครูดีใจนะที่ไม่ใช่เสียงผี\""
2600103-54 = "แต่ฉันแอบผิดหวังนิดหน่อยนะคะ อุตส่าห์ตั้งตารอที่จะได้บันทึกเสียงผีจริงๆ แล้วเชียว"
2600103-56 = "หรือว่าเราควรใช้เหรียญสิบเยนเรียกคกคุริซังออกมาดีคะ..."
2600103-57 = "[s] \"หยุดเลยนะ ทำให้ครูกลัวจริงๆ แล้วเนี่ย!\""
2600103-59 = "หลังจากนั้น คุณครูก็พยายามอย่างหนักเพื่อโน้มน้าวไม่ให้โคทามะเรียกผีมา"

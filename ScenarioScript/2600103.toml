[translation]
2600103-1 = "瑪莉小姐的電波"
2600103-2 = "夏萊．居住區"
2600103-4 = "（在夏萊工作到很晚之後，為了稍微休息躺在了折疊床上）"
2600103-5 = "（正要睡著的時候，從某處傳來了奇怪的聲音）"
2600103-6 = "呵呵，唔呵呵……"
2600103-7 = "我……現在，……在……"
2600103-8 = "[s]「……聲音？從哪裡來的？」"
2600103-9 = "馬上就去找你哦……#n兩個……！"
2600103-10 = "[s]「這個聲音，難道是……？」"
2600103-11 = "還有一個……！"
2600103-12 = "[s]「！？！？」"
2600103-15 = "（因為一整晚不知從哪傳來的笑聲，完全無法入睡……）"
2600103-17 = "夏萊．辦公室"
2600103-18 = "你說昨夜在夏萊的居住區，聽到了類似瑪莉小姐的怪聲嗎？"
2600103-19 = "那真是引人入勝呢……其實我，從以前開始錄製鬼魂的RAP聲和悲鳴是我的夢想。"
2600103-20 = "今夜，我可以也住在夏萊的居住區嗎？關於那個聲音，由我來調查。"
2600103-21 = "[s]「小玉不怕瑪莉小姐嗎？」"
2600103-22 = "並不害怕。這世上大多現象都能以科學說明。反而，現在沒辦法說明的現象就代表，是擁有研究價值的東西，不如說很開心。"
2600103-23 = "[s]「……話說小玉也是，千年的學生呢。」"
2600103-24 = "當然。因為我也是，探究真理「貝里塔斯」的一員。"
2600103-25 = "首先為了在響起聲音時可以馬上錄音，必須事前在夏萊的居住區設置機器呢。"
2600103-26 = "那麼，我去貝里塔斯的社辦，拿取錄音器材。"
2600103-28 = "（小玉為了拿取器材，返回了千年）"
2600103-30 = "夏萊．居住區"
2600103-31 = "這裡就是，老師平常生活的地方……"
2600103-32 = "在好幾次想要設置竊聽器的夏萊裡，沒想到能以這樣的形式設置……"
2600103-33 = "當然是開玩笑的，請不用在意。"
2600103-34 = "[s]「不不，會在意好嗎……」"
2600103-35 = "那麼，會不會聽到怪聲呢，讓我們豎起耳朵等待吧。"
2600103-37 = "（一段時間後……）"
2600103-38 = "呵呵，唔呵呵……"
2600103-39 = "我……現在，……在……"
2600103-40 = "[s]「出現了──！？」"
2600103-41 = "這個聲音，該不會是……？"
2600103-42 = "老師，可以把辦公室的收音機打開嗎？"
2600103-43 = "如果我想得沒錯這大概是……"
2600103-46 = "唔呵呵！大家等很久了嗎？#n我，DJ瑪莉！目前在，克洛盧斯的廣播室唷！"
2600103-47 = "今天送信給我的人，也會由我直接送禮物過去哦！"
2600103-48 = "今天的信有……兩封！"
2600103-49 = "[s]「這個聲音是……？」"
2600103-50 = "是這個時間帶播放的，深夜廣播的播送呢。"
2600103-51 = "未連接的音響受到無線廣播的頻率信號干擾的話，有時會如雜音一樣輸出那個廣播的聲音。"
2600103-52 = "恐怕昨夜老師聽到的瑪莉小姐的聲音，也是這個廣播的播送吧。"
2600103-53 = "[s]「不是鬼魂真是太好了……」"
2600103-54 = "……我有點失望。原本還很期待以為這次真的可以錄製到真正的靈異現象的聲音。"
2600103-56 = "……機會難得，用10圓硬幣試著呼叫錢仙吧。"
2600103-57 = "[s]「那也很可怕快住手！」"
2600103-59 = "（這之後，拚死阻止了想嘗試降靈術的小玉）"

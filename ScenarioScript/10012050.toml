[translation]
10012050-1 = "Episode 5; An Uninvited Guest"
10012050-4 = "Here we are."
10012050-5 = "Thanks for coming with me. Hopefully we can get the electricity up and running from here."
10012050-7 = "Of course... But a break would've been nice after all that cleaning and foraging."
10012050-8 = "Heehee. I love seeing my kiddos having fun."
10012050-9 = "Fun?! Does my pain and suffering seem like fun to you?"
10012050-11 = "I know, Serika. I'm sorry for putting you through this."
10012050-12 = "I promise you'll have the vacation you deserve once we have the power up and running."
10012050-13 = "Hm... The equipment is in working condition."
10012050-14 = "They're obviously old and rusted, but I can get them running."
10012050-15 = "Also, I found a floor plan for the resort."
10012050-16 = "Look, right here. There's a hangar and a storage room."
10012050-17 = "A hangar? Really? "
10012050-19 = "Great find, Shiroko! Ayane can stop worrying her cute head about fixing the helicopter if they have parts there."
10012050-20 = "Everything's falling into place! ☆"
10012050-21 = "Before you get too excited, the hangar's iron gate won't budge unless we get the power up and running."
10012050-23 = "It wasn't enough to clean the whole place... Now we have to be electricians too?"
10012050-24 = "There, there. Consider it all a part of the immersive vacation experience."
10012050-25 = "Just take it step by step, Serika."
10012050-26 = "Speaking of... What's our next step?"
10012050-29 = "Hello? Anyone home?"
10012050-30 = "Unless you're looking for ghosts, I think we're safe."
10012050-31 = "To be fair, we can't guarantee we scared the Helmet Gangsters off for good."
10012050-33 = "I agree. We should stay alert."
10012050-34 = "We should be okay. They would've tapped into the surveillance systems if they had the chance."
10012050-35 = "Judging by the thick layer of dust, we're the first ones here."
10012050-36 = "You really think this janky old machine will work?"
10012050-37 = "Well..."
10012050-44 = "It's turning on!"
10012050-45 = "Actually?! It was as easy as pressing a button?"
10012050-46 = "Heehee! Silly Serika! That's what an \"on\" button is for!"
10012050-47 = "O-Obviously! That's not what I meant!"
10012050-48 = "In Serika's defense, I didn't expect it to work on the first try either."
10012050-49 = "It's a relief at least one thing went smoothly."
10012050-50 = "Oh? Do you see this?"
10012050-54 = "\"Resort defense system\"...?"
10012050-56 = "How cool! The resort has its own defense system!"
10012050-57 = "It'll protect us, and we don't have to lift a finger. I'm all for it!"
10012050-58 = "I'd like to see those stupid gangsters try to get in now."
10012050-59 = "C'mon, Ayane! Let's deploy it."
10012050-61 = "A-Are you sure? I suppose we have nothing to lose..."
10012050-66 = "Is it working?"
10012050-68 = "Oh! I think it's turning on."
10012050-69 = "Yup, yup! Look, you can see the whole resort with the CCTVs."
10012050-70 = "We have power! What a relief."
10012050-75 = "<System Message>"
10012050-77 = "Resort defense system."
10012050-79 = "Resort defense system. Activating."
10012050-81 = "Entering autonomous security mode."
10012050-84 = "<System Message>"
10012050-86 = "Scanning"
10012050-88 = "Scanning..."
10012050-90 = "Scanning......"
10012050-92 = "Incredible. It's scanning the entire resort for threats."
10012050-93 = "Not just anyone can afford a state-of-the-art defense system like this."
10012050-94 = "...Kaiser could afford it."
10012050-95 = "I wouldn't worry about that. It's even more advanced than their technology."
10012050-97 = "<System Message>"
10012050-98 = "...Scanning complete."
10012050-101 = "<System Message>"
10012050-102 = "Searching for unauthorized personnel."
10012050-104 = "Multiple subjects"
10012050-106 = "located"
10012050-108 = "located within"
10012050-110 = "located within the resort."
10012050-112 = "It already found a threat! How cool."
10012050-113 = "Wait? By unauthorized personnel does it mean..."
10012050-114 = "Oh dear."
10012050-116 = "<System Message>"
10012050-117 = "Deploying autonomous"
10012050-119 = "intruder prevention measures."
10012050-122 = "Wait! No!"
10012050-123 = "The system activated an army of security robots!"
10012050-125 = "F-For what? Because it kind of looks like..."
10012050-126 = "...they're headed this way..."
10012050-127 = "It sure looks like it~"
10012050-128 = "[s1] \"...What a turn of events.\"\n[s2] \"I guess we're technically intruding.\""
10012050-129 = "It's ridiculous! We do have permission! We have the ticket!"
10012050-130 = "No we're not! We have permission! We have the ticket!"
10012050-131 = "But the system doesn't know we have tickets. There was no one here to register us."
10012050-132 = "And, either way, I have a feeling they wouldn't want vacationers in the system control room."
10012050-134 = "They're here. There are around...  "
10012050-135 = "...a few hundred!"
10012050-137 = "A h-h-hundred? What do we do? What are we gonna do?!"
10012050-138 = "Take deep breaths, Serika! There must be a way to register ourselves from here."
10012050-139 = "See, no problem! We just have to keep Ayane safe while she gets us all signed up."
10012050-140 = "No, this is a huge problem! I didn't sign up for this."
10012050-142 = "...Sensei? What should we do?"
10012050-143 = "[s3] \"Let's fight some robots.\"\n[s4] \"Don't worry. I'll lead you through this.\""
10012050-148 = "They're coming!"

[translation]
10012050-1 = "第5話;不請自來的客人"
10012050-4 = "……就是這裡。"
10012050-5 = "這裡就是渡假勝地的控制室……是電力、瓦斯為首的所有動力源集中的地方呢。"
10012050-7 = "還以為解決完各種麻煩了，這次是控制室……？"
10012050-8 = "哎呀～真是段美好的假期對吧，茜香醬？"
10012050-9 = "哪有什麼美好的假期啊！！明明就根本沒辦法休息！"
10012050-11 = "這已經是最快速且確實的方法囉，茜香醬。"
10012050-12 = "不管是為了我們的安全，還是接下來的「假期」。"
10012050-13 = "……嗯。設備似乎沒問題。"
10012050-14 = "雖然已經被棄置了很久，不過沒有損壞。#n只是積了點灰塵而已。"
10012050-15 = "根據這張地圖來看……"
10012050-16 = "好像有個機庫兼倉庫。"
10012050-17 = "……！#n有機庫就代表……！"
10012050-19 = "說不定可以找到直升機的零件呢。"
10012050-20 = "太好了！這樣就可以修理了呢☆"
10012050-21 = "不過，機庫似乎沒辦法手動打開。必須先在控制室確保電力。"
10012050-23 = "……從打掃建築開始，慢慢變成開拓無人島了呢。"
10012050-24 = "哎呀～準備暑假的過程也是一種樂趣嘛。"
10012050-25 = "計較那種事也只會讓自己不高興而已～"
10012050-26 = "那麼，我們就出發吧～"
10012050-29 = "……好像一個人都沒有耶？"
10012050-30 = "有人在才恐怖吧……"
10012050-31 = "搞不好剛才那群人也在，保持警戒也沒什麼不好唷～"
10012050-33 = "說得也是……"
10012050-34 = "如果剛才那群人先掌握這裡的話，沒有理由不利用監視系統。"
10012050-35 = "所以，我想我們是第一個來到這裡的。灰塵也沉積了很多。"
10012050-36 = "這個，真的能啟動嗎？"
10012050-37 = "嗯……"
10012050-44 = "啟動了！"
10012050-45 = "什麼嘛，害我白擔心了。#n原來只要按一下就啟動了啊。"
10012050-46 = "茜香醬～電腦本來就是按一下電源就能啟動的唷～"
10012050-47 = "那，那種事我當然知道啊！？#n我又不是那個意思！"
10012050-48 = "我也有點驚訝，因為是蠻老舊的設備，我也以為沒辦法啟動……"
10012050-49 = "就算狀態相對良好，這也有點……"
10012050-50 = "……嗯，這個是？"
10012050-54 = "「渡假勝地防禦系統」……？"
10012050-56 = "好厲害～！還有那種東西呀！是警備系統的一種嗎？"
10012050-57 = "會自動保護我們嗎？唔嘿，很厲害呢。"
10012050-58 = "很周到嘛！這樣就能安全渡假了呢。"
10012050-59 = "綾音，有什麼好煩惱的嗎？快點按下去吧。"
10012050-61 = "是，是嗎……？#n好吧，好像也沒什麼損失……"
10012050-66 = "……啟動，了嗎？"
10012050-68 = "好像有什麼開始運轉了呢。"
10012050-69 = "啊，螢幕上出現了監視器的畫面唷！渡假勝地一覽無遺呢～！"
10012050-70 = "這樣就解決了呢～"
10012050-75 = "<System Message>"
10012050-77 = "「渡假勝地警備系統」"
10012050-79 = "「渡假勝地警備系統」啟動。"
10012050-81 = "即將進入，自我監視模式。"
10012050-84 = "<System Message>"
10012050-86 = "掃描中"
10012050-88 = "掃描中…"
10012050-90 = "掃描中……"
10012050-92 = "似乎正在掃描整個渡假勝地呢……"
10012050-93 = "好厲害……是最先進的防禦系統呢。"
10012050-94 = "凱薩也有這種東西呢～"
10012050-95 = "……搞不好，這是比那個還要厲害的系統也說不定。"
10012050-97 = "<System Message>"
10012050-98 = "……掃描結束。"
10012050-101 = "<System Message>"
10012050-102 = "於渡假勝地內，發現，"
10012050-104 = "有"
10012050-106 = "大量，"
10012050-108 = "大量，未獲得"
10012050-110 = "大量，未獲得許可的人員。"
10012050-112 = "哦哦，感覺很厲害呢～"
10012050-113 = "……咦？「未獲得許可的人員」……？"
10012050-114 = "嗯……？"
10012050-116 = "<System Message>"
10012050-117 = "為了逮捕，即將投入，"
10012050-119 = "自律防衛機。"
10012050-122 = "……請，請等一下！"
10012050-123 = "休眠狀態的警備機器人開始行動了！#n……數量相當多！"
10012050-125 = "不覺得那些傢伙的行動很奇怪嗎？#n這樣簡直像……"
10012050-126 = "似乎在往這邊……過來呢？"
10012050-127 = "……啊，是那種情況啊～"
10012050-128 = "[s1] 「……果然變成這樣了呢。」\n[s2] 「嘛，畢竟我們也不是獲得了許可。」"
10012050-129 = "等，等等你在說什麼啊……！？#n我們不是拿到使用券……拿到許可了嗎……？"
10012050-130 = "等，等等你在說什麼啊……！？#n我們不是拿到使用券……拿到許可了嗎……？"
10012050-131 = "不過我們畢竟沒有完成認證手續或是在系統上登錄身分……"
10012050-132 = "而且就算有使用券，這裡可是控制室……不是一般旅客會來的地方哦？"
10012050-134 = "……能看見警備機器人的身影了。#n有數十……"
10012050-135 = "不，有數百台以上。"
10012050-137 = "怎，怎麼辦！？接下來該怎麼辦！？"
10012050-138 = "冷，冷靜一點，茜香醬！這裡是控制室哦。只要登記身份應該就沒問題了！"
10012050-139 = "問題是在綾音醬進行登錄的期間，我們能不能擋住那些傢伙呢～"
10012050-140 = "啊～！為什麼來到這裡之後全是這種事啊！！"
10012050-142 = "……老師？"
10012050-143 = "[s3] 「嗯。一起阻止它們吧。」\n[s4] 「指揮交給我。」"
10012050-148 = "……要來囉。"

[translation]
10012050-1 = "ตอนที่ 5;แขกที่ไม่ได้รับเชิญ"
10012050-4 = "มาถึงแล้วละค่ะ..."
10012050-5 = "ที่นี่คือห้องควบคุมไฟฟ้าของรีสอร์ต... เป็นที่ที่รวมแหล่งพลังงานทั้งหมดค่ะ ทั้งไฟฟ้า ทั้งแก๊ส"
10012050-7 = "พอเก็บกวาดพื้นที่เสร็จก็ไปหาอาหารมากิน แล้วก็ได้เข้ามาในห้องควบคุมไฟฟ้าแบบนี้สินะ..."
10012050-8 = "ว้าวๆ... นี่มันพักร้อนที่ยอดเยี่ยมดีจริงๆ ใช่ไหมเซริกะจัง?"
10012050-9 = "ยอดเยี่ยมอะไรกันล่ะ!!  มีแต่เรื่องให้ใช้แรงงานไม่จบไม่สิ้นน่ะสิ!!"
10012050-11 = "แต่นี่เป็นวิธีที่รวดเร็วและแน่นอนที่สุดนะเซริกะจัง"
10012050-12 = "เพื่อความปลอดภัยของเรา และเพื่อ 'การพักผ่อนหย่อนใจ' ของเราด้วย..."
10012050-13 = "อืม... อุปกรณ์ไม่มีปัญหา"
10012050-14 = "ถึงจะเก่าและถูกละเลยไปบ้าง แต่ก็ไม่มีส่วนที่เสียหาย ก็แค่มีฝุ่นเกาะเยอะเท่านั้น"
10012050-15 = "และถ้าดูแบบแปลนแล้ว..."
10012050-16 = "ที่นี่มีคลังที่เป็นโรงเก็บเครื่องบินด้วย"
10012050-17 = "......! โรงเก็บเครื่องบินเหรอ...?"
10012050-19 = "งั้นก็แปลว่าเราน่าจะหาอะไหล่ของเฮลิคอปเตอร์ที่อายาเนะจังกังวลอยู่ได้ไงล่ะ"
10012050-20 = "ดีจังเลยค่ะ เยี่ยมเลย~☆"
10012050-21 = "แต่เราจะเปิดประตูเหล็กของโรงเก็บเครื่องบินเองไม่ได้ เราต้องเปิดระบบไฟฟ้าในห้องควบคุมก่อน"
10012050-23 = "จากพนักงานทำความสะอาดอาคาร ตอนนี้รู้สึกเหมือนเป็นผู้รับเหมาก่อสร้างเลยแฮะ..."
10012050-24 = "เอาละๆ ปกติแล้วในการพักร้อน เราก็ต้องสนุกไปกับการเตรียมตัวด้วยแหละเนอะ"
10012050-25 = "มัวแต่มาคิดเล็กคิดน้อย เดี๋ยวแก่แล้วผมหงอกไม่รู้ด้วยนะ"
10012050-26 = "งั้นเราออกเดินทางกันเลยไหม?"
10012050-29 = "ดูเหมือนจะไม่มีใครอยู่เลยนะคะ..."
10012050-30 = "ถ้ามีสิแปลก ที่นี่ถูกทิ้งร้างมาตั้งแต่เมื่อไหร่แล้วก็ไม่รู้..."
10012050-31 = "ใครจะไปรู้ล่ะ อาจจะมีใครโผล่ออกมาอีกก็ได้..."
10012050-33 = "ก็อาจจะนะ..."
10012050-34 = "ไม่หรอก ถ้าเข้ามายึดตรงนี้ได้ก่อน ก็ไม่มีเหตุผลอะไรที่จะไม่เปิดใช้ระบบเฝ้าระวัง"
10012050-35 = "พวกเราน่าจะเป็นกลุ่มแรกที่มาถึงที่นี่ ดูจากฝุ่นหนาเตอะพวกนั้นสิ"
10012050-36 = "มันจะเปิดติดจริงๆ ไหมเนี่ย? จะยังไม่เสียใช่ไหมนะ?"
10012050-37 = "อืม..."
10012050-44 = "ได้แล้ว"
10012050-45 = "อะไรเนี่ย ได้จริงด้วย? แต่กดปุ่มแบบนี้ก็เปิดติดแล้วเหรอ?"
10012050-46 = "เซริกะจัง~ พวกคอมพิวเตอร์น่ะ แค่กดปุ่มก็เปิดติดแล้วละ~"
10012050-47 = "อะ... อันนั้นฉันก็รู้น่า!!? ไม่ได้หมายความแบบนั้นสักหน่อย!?"
10012050-48 = "แต่ฉันเองก็ตกใจอยู่นะคะ ดูจากภายนอกแล้วเหมือนจะต้องกดนู่นนี่เยอะๆ เสียอีก..."
10012050-49 = "ถึงสภาพจะยังดีอยู่ แต่ก็ไม่คิดเลยค่ะว่าจะทำงานได้เหมือนใหม่ขนาดนี้..."
10012050-50 = "หืม...? นี่มันอะไรเหรอคะ?"
10012050-54 = "<ระบบป้องกันรีสอร์ต>......?"
10012050-56 = "ว้าว~! มีระบบป้องกันรีสอร์ตด้วยเหรอคะเนี่ย!"
10012050-57 = "มันจะทำงานให้เองเหรอ? โอ้ว~ รีสอร์ตนี่เยี่ยมไปเลยนะ"
10012050-58 = "ดีเลย! ถ้ามีระบบนี้ คนพวกนั้นก็คงเข้ามายากกว่าเดิมอีก"
10012050-59 = "มัวกังวลอะไรล่ะอายาเนะ? กดเปิดเลยสิ!"
10012050-61 = "อะ... เอางั้นเหรอคะ? จะว่าไป... เปิดไว้ก็ไม่น่ามีอะไรเสียหาย..."
10012050-66 = "...ติดหรือยังคะ?"
10012050-68 = "โอ้วๆๆ เหมือนจะมีบางอย่างเริ่มทำงานแล้วนะ"
10012050-69 = "ในหน้าจอเริ่มแสดงภาพจากกล้องวงจรปิดแล้วค่ะ เห็นทัศนียภาพด้านหน้าของรีสอร์ตหมดเลย!"
10012050-70 = "แบบนี้ก็ค่อยโล่งใจหน่อยน้า~"
10012050-75 = "<System Message>"
10012050-77 = "ระบบรักษาความปลอดภัย"
10012050-79 = "ระบบรักษาความปลอดภัย เปิดใช้งาน"
10012050-81 = "กลับไปที่โหมดเฝ้าระวังตนเอง"
10012050-84 = "<System Message>"
10012050-86 = "กำลังสแกน"
10012050-88 = "กำลังสแกน..."
10012050-90 = "กำลังสแกน......"
10012050-92 = "น่าจะกำลังค้นหาทั่วรีสอร์ตอยู่นะคะ"
10012050-93 = "สุดยอด... นี่มันระบบป้องกันจากเทคโนโลยีชั้นสูงที่บริษัทขนาดใหญ่ใช้กันเลยนะคะ"
10012050-94 = "พูดถึงบริษัท... ไคเซอร์งั้นเหรอ?"
10012050-95 = "ไม่หรอกค่ะ ฉันว่านี่อาจจะเป็นระบบจัดการขั้นสูงมากกว่านั้น..."
10012050-97 = "<System Message>"
10012050-98 = "สิ้นสุดการสแกน"
10012050-101 = "<System Message>"
10012050-102 = "ตรวจพบ"
10012050-104 = "ผู้ไม่ได้รับอนุญาต"
10012050-106 = "ในรีสอร์ต"
10012050-108 = "ในรีสอร์ต จำนวน"
10012050-110 = "ในรีสอร์ต จำนวน หนึ่ง"
10012050-112 = "โอ้... หาเจอแล้วเหรอเนี่ย เก่งไม่เบาเลยนะ~"
10012050-113 = "หืม...? ว่าแต่เมื่อกี๊บอกว่าเจออะไรนะ? 'ผู้ที่ไม่ได้รับอนุญาต'... งั้นเหรอ?"
10012050-114 = "เอ๋..."
10012050-116 = "<System Message>"
10012050-117 = "นำเข้าเครื่องป้องกันอาชญากรรมเพื่อจับกุมตัว"
10012050-119 = "อัตโนมัติ"
10012050-122 = "...เดี๋ยวสิคะ!"
10012050-123 = "พวกหุ่นยนต์คุ้มกันที่หลับอยู่เริ่มเคลื่อนไหวแล้วค่ะ! มีกันเยอะมากเลยค่ะ!"
10012050-125 = "อะ... อะไรเนี่ย? ทิศทางการเคลื่อนไหวของพวกนั้นมันแปลกๆ มั้ย? เหมือนกับว่า..."
10012050-126 = "แน่เลย... มันกำลังมาทางนี้... แน่เลยค่ะ?"
10012050-127 = "กรรม... ไหงเป็นงั้นไปได้"
10012050-128 = "[s1] \"กลายเป็นแบบนี้เฉยเลย\"\n[s2] \"แต่ก็นะ พวกเราก็ไม่ได้รับอนุญาตนี่นา\""
10012050-129 = "มะ... หมายความว่ายังไงเนี่ย!? เป็นไปไม่ได้! แบบนี้มีที่ไหนกันล่ะ? พวกเราก็ได้รับอนุญาตแล้ว#nไม่ใช่เหรอ!? ตั๋วเราก็มี!!"
10012050-130 = "มะ... หมายความว่ายังไงเนี่ย!? เป็นไปไม่ได้! แบบนี้มีที่ไหนกันล่ะ? พวกเราก็ได้รับอนุญาตแล้ว#nไม่ใช่เหรอ!? ตั๋วเราก็มี!!"
10012050-131 = "แต่นั่นก็ไม่ได้แปลว่าเราจะผ่านขั้นตอนการตรวจสอบสิทธิ์นะ แล้วในระบบก็ไม่มีประวัติส่วนตัวของ#nพวกเราบันทึกไว้ด้วย..."
10012050-132 = "ถึงจะมีประวัติ แต่นี่ก็เป็นระบบของที่นี่นะเซริกะจัง นี่ไม่ใช่ที่ที่แขกของรีสอร์ตจะเข้ามาเพ่นพ่านด้วย"
10012050-134 = "เริ่มเห็นแล้ว หลายสิบตัวเลย "
10012050-135 = "ไม่สิ หลายร้อยเลยละ"
10012050-137 = "อ๊ากกก!?  ทำยังไงดี!?  ทีนี้เราจะทำยังไงกันดี!!"
10012050-138 = "จะ... ใจเย็นๆ ก่อนเซริกะจัง!  นี่คือห้องควบคุมระบบนะ ก็แค่ลงทะเบียนประวัติใหม่ไง!"
10012050-139 = "ปัญหาคือ ระหว่างที่อายาเนะลงทะเบียนประวัติให้พวกเรา เราต้องคุ้มกันที่นี่จากเจ้าพวกนั้น แค่นี้แหละ~"
10012050-140 = "โธ่เอ๊ย~!  มาที่นี่แล้วต้องเจอเรื่องให้ปวดหัวไม่จบไม่สิ้นเลย!!"
10012050-142 = "คุณครู...?"
10012050-143 = "[s3] \"อื้ม ไปขวางพวกนั้นกัน\"\n[s4] \"ครูจะสั่งการให้เอง\""
10012050-148 = "มาแล้ว..."

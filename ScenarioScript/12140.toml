[translation]
12140-1 = "第14話;阿拜多斯攻防戰（１）"
12140-8 = "這些傢伙！！！"
12140-9 = "……"
12140-10 = "……"
12140-12 = "已確認凱薩董事的位置！"
12140-14 = "哼，本來打算親自去學校的，結果你們居然跑到這裡迎接我啊？"
12140-15 = "這是在做什麼？#n企業竟然攻擊城市……就算你們是這片土地的所有人也沒有權力這麼做吧！"
12140-16 = "而且學校還是我們阿拜多斯的所有物！#n你們這明顯是違法行為！我會向聯邦學生會檢舉！"
12140-17 = "挖角一開始就是個謊言？#n……不，比起這個，星野前輩在哪裡？"
12140-18 = "這個壞蛋……把星野前輩還給我們！"
12140-19 = "……呵，呵呵。"
12140-20 = "向聯邦學生會檢舉？這話還真有趣呢。"
12140-21 = "你們不是已經把面臨的困難報告給聯邦學生會無數次了嗎？#n然後呢？他們有採取任何行動嗎？"
12140-22 = "……"
12140-23 = "八成沒有吧。因為聯邦學生會現在什麼也做不了。"
12140-24 = "還是說有其他人幫助你們？比如其他學園？#n……差不多該理解了吧？"
12140-25 = "沒有任何人會對你們伸出援手。"
12140-26 = "……"
12140-27 = "……"
12140-28 = "……"
12140-29 = "……"
12140-31 = "由於最後的學生會成員小鳥遊星野退學，阿拜多斯學生會已經消滅。"
12140-32 = "你們已經什麼都不是了。"
12140-33 = "……！！"
12140-34 = "！！"
12140-35 = "連正式的社團、學生會，甚至自治區都沒有的阿拜多斯……#n將被認定無法作為學園都市的學校自立。"
12140-36 = "因此就由這個自治區的主人──我們凱薩公司來接收學校吧。"
12140-37 = "我想想，新學校的名字就叫「凱薩職業訓練學校」怎麼樣 。"
12140-38 = "！！"
12140-39 = "咦……？你，你在說什麼……！？"
12140-40 = "就算沒有學生會，阿拜多斯還有對策委員會！！還有我們在！！"
12140-42 = "這，這……"
12140-43 = "……綾音醬？"
12140-44 = "對策委員會並不是受到正式許可的社團……"
12140-45 = "……咦！？"
12140-46 = "對策委員會成立的時候，阿拜多斯已經沒有學生會了……"
12140-47 = "咦，咦……！？"
12140-48 = "沒錯。你們只是個非正式的社團，也沒有獲得文件的許可。#n換句話說，就跟幽靈沒什麼兩樣。"
12140-49 = "不過你們也不必難過。#n阿拜多斯高中消失之後，你們就能從債務的地獄解放了。"
12140-52 = "你，你們在做什麼！？這跟約好的不一樣吧！！"
12140-53 = "為什麼要攻擊阿拜多斯！！為什麼！！"
12140-56 = "……"
12140-57 = "不，我並沒有違背約定，星野小姐。"
12140-58 = "我確實如約免除了債務的金額。"
12140-59 = "然而遺憾的是，由於你退學的關係──#n阿拜多斯高中似乎已經沒有正式的學生會成員存在了。"
12140-60 = "……！！"
12140-61 = "你覺得我們為什麼要支援這種無聊至極的企業不動產詐欺行為？"
12140-62 = "即使奪走奇普托斯自治區的土地，也只是多了一個像黑市一樣的無法地帶而已。"
12140-63 = "那種地方在奇普托斯到處都是。"
12140-64 = "不過……如果在阿拜多斯誕生了一間由企業主導的新學園……"
12140-65 = "──究竟會為奇普托斯帶來什麼變化呢？"
12140-66 = "──！！"
12140-67 = "……啊啊，不過這也只是餘興節目而已。"
12140-68 = "星野小姐，我們的目標從一開始就是你。"
12140-69 = "讓你簽下合約，得到你的所有權利。"
12140-70 = "之所以協助凱薩，也是只是因為利害關係一致罷了。"
12140-71 = "終身成為凱薩PMC的傭兵？我從來沒有這麼說過。#n如果曾讓你產生那種誤解的話，我在此向你致歉。"
12140-72 = "既然獲得了像你這種奇普托斯最高級的神祕，我並不打算以那種方式使用。"
12140-75 = "對星野小姐進行研究、分析、加以理解──"
12140-76 = "這才是我們想觀測的有趣實驗。"
12140-77 = "因此請不必感到遺憾。"
12140-83 = "……"
12140-84 = "……原來如此。"
12140-85 = "我……"
12140-87 = "……又被大人欺騙了啊。"
12140-89 = "……"
12140-90 = "……抱歉，大家。#n都是因為我，讓這一切都白費了……"
12140-91 = "白子醬、野乃美醬、茜香醬、綾音醬……"
12140-92 = "……夢前輩。"
12140-93 = "……"
12140-94 = "對不起……"
12140-95 = "……"
12140-96 = "我……"
12140-98 = "…………"
12140-99 = "老師……"
12140-102 = "……"
12140-103 = "我們至今為止的努力……"
12140-104 = "哦？你們難道是認真的嗎？"
12140-105 = "真的打算還清數百年份的債務？"
12140-106 = "我還以為你們只會做做樣子，好讓放棄的時候能安慰自己「已經盡力了」呢。"
12140-107 = "──！！"
12140-108 = "你們為何要堅持下去？究竟是為了什麼？"
12140-109 = "你這傢伙，要是敢再說下去……"
12140-112 = "我要開槍了。"
12140-113 = "但，但是……"
12140-114 = "就算在這裡戰鬥……又能改變什麼呢？"
12140-115 = "綾音醬！？"
12140-116 = "現在也有數量驚人的兵力正朝這裡前進……"
12140-117 = "即便贏了……之後又該怎麼辦……"
12140-118 = "失去學校的話……我們就沒有戰鬥的理由了。#n就算想辦法奪回學校，留下的債務也不會消失……"
12140-119 = "……綾音醬。"
12140-120 = "綾音……"
12140-121 = "已經交易出去的土地也不會回來……#n沒有星野前輩……沒有學生會的情況下，我們這種非正式的社團……"
12140-122 = "究竟又能做什麼呢……"
12140-123 = "為什麼……"
12140-124 = "為什麼只有我們……會像這樣……#n星野前輩……"
12140-125 = "綾音醬……"
12140-126 = "……"
12140-127 = "……"
12140-128 = "（哐哐哐哐哐哐啷啷啷啷啷啷──！）"
12140-129 = "！？"
12140-131 = "什麼──！？確，確認到北方發生大規模爆炸！"
12140-132 = "預計會合的BRAVO小隊被捲入其中──！！"
12140-133 = "什麼！？ "
12140-134 = "（哐哐哐哐哐哐哐哐哐啷啷啷啷啷啷啷──！）"
12140-135 = "東方也確認到了！預計會合的MIKE小隊也因為大量C4的爆炸……！！"
12140-136 = "怎麼回事！？這裡應該沒有阿拜多斯以外的人才對啊……！！"
12140-141 = "真受不了，這些笨蛋們在做什麼啊……"
12140-142 = "……！？"
12140-152 = "以眼還眼，以牙還牙。不管人情世故，孤高地走在眾人所畏懼的魔境……"
12140-155 = "那不是你們泳裝蒙面團的座右銘嗎？ "
12140-156 = "……你，你是！？"
12140-157 = "看不見目標，找不到方法，所作所為全都以失敗收場……"
12140-158 = "不被別人承認，前方充斥著逆境和苦難……"
12140-160 = "那又怎麼樣──！！！！"
12140-161 = "咦，咦……？"
12140-162 = "夥伴明明正陷入危機，你們卻要糾結這些雞毛蒜皮的小事，像笨蛋一樣坐以待斃嗎！"
12140-163 = "你們難道是那麼沒用的社團嗎！"
12140-164 = "哎呀，亞瑠醬就放過他吧。#n眼鏡妹可是很纖細的，偶爾就是會有這種時候嘛。"
12140-165 = "咦咦……！？"
12140-166 = "啊哈哈～不過話說回來，把我可愛的眼鏡妹弄哭可是重罪唷？#n所以……"
12140-170 = "只能殺光你們了吧──！！！"
12140-171 = "呵呵呵，呵呵呵呵呵呵……#n我準備好了，亞瑠大人。設置好的炸彈還有很多很多……"
12140-172 = "唉……本來只是來吃拉麵而已，怎麼會變成這樣……"
12140-173 = "以事前埋下的炸藥截斷敵人的增援，趁機癱瘓敵方指揮官並瓦解指揮系統。"
12140-174 = "這樣一來就能一口氣瓦解敵方集團。#n這本來是要用來對付風紀委員會使用的戰術……"
12140-176 = "張大雙眼好好看清楚吧。這才是真正法外之徒的戰鬥方式。"
12140-177 = "遙香。"
12140-178 = "（嗶）"
12140-179 = "（哐哐哐哐啷啷啷啷啷啷啷啷啷啷──！）"
12140-180 = "（哐啷啷啷啷啷啷啷啷──！）"
12140-181 = "（哐哐哐哐啷啷啷啷啷啷啷──！）"
12140-183 = "嗚哇──！？"
12140-187 = "來吧，合作的時候到囉！老師！"
12140-188 = "讓[ruby=對策委員會]那些笨蛋[/ruby]見識真正硬派的實力吧！"
12140-189 = "[ns] 「……好，我們上吧！」"

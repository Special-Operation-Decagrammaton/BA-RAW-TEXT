12140-29 = "......"
12140-31 = "ทาคานาชิ โฮชิโนะ สภานักเรียนคนสุดท้ายของอะบิดอสได้ลาออกจากโรงเรียนไปแล้ว เท่ากับว่าไม่มี#nสภานักเรียนอะบิดอสอีกต่อไป \n"

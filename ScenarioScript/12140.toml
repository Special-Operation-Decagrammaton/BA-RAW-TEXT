12140-21 = "พวกเธอก็เคยไปร้องทุกข์กับองค์การนักเรียนอยู่หลายต่อหลายครั้งแล้วไม่ใช่รึไง? แล้วพวกนั้นช่วยอะไร#nบ้างไหมล่ะ?"

12140-15 = "นี่มันเรื่องอะไรกันคะ? มาโจมตีเมืองของเราได้ยังไง? ถึงพวกคุณจะเป็นเจ้าของที่ดิน แต่ก็ไม่มีสิทธิ์จะทำ#nแบบนี้นะ!"
12140-16 = "อีกอย่าง โรงเรียนยังเป็นของอะบิดอสนะคะ! นี่มันละเมิดกฎหมายอย่างชัดเจนค่ะ! ฉันจะไปร้องเรียน#nการกระทำผิดกฎหมายนี้ต่อองค์การนักเรียนค่ะ!"
12140-17 = "...รุ่นพี่โฮชิโนะอยู่ที่ไหน? หลอกกันสินะว่าจะทาบทามตัวไปทำงานด้วย"
12140-18 = "เอารุ่นพี่โฮชิโนะคืนมานะ! พวกคนนิสัยไม่ดี!\n"

[translation]
12140-1 = "Episode 14;The Abydos Siege Part 1"
12140-8 = "Back off! Unless you've got a death wish!"
12140-9 = "..."
12140-10 = "..."
12140-12 = "Kaiser Director's location confirmed!"
12140-14 = "My, my. We were just about to visit your school, and yet here you are, coming all this way to greet us?"
12140-15 = "What do you think you're doing?! A corporation attacking a city? Just because you own the land doesn't give you that kind of right!"
12140-16 = "And the school still belongs to us, the students of Abydos! This is outright illegal! We'll take this straight to the General Student Council!"
12140-17 = "...Where is Hoshino? So that whole \"scouting\" story was a lie from the start."
12140-18 = "Give Hoshino back, you bastards!"
12140-19 = "...Heh. Hah... Haha."
12140-20 = "Take it to the General Student Council? Oh, that's rich."
12140-21 = "How many times have you petitioned for the General Student Council's help? How many of those prayers have gone unanswered?"
12140-22 = "..."
12140-23 = "No, of course they didn't. Because they can't do anything right now."
12140-24 = "For that matter, has anyone else ever given you their aid? The other academies, perhaps? I doubt it."
12140-25 = "You've always been alone."
12140-26 = "..."
12140-27 = "..."
12140-28 = "..."
12140-29 = "..."
12140-31 = "With Takanashi Hoshino officially withdrawing, the Abydos Student Council is no more."
12140-32 = "You are nothing now."
12140-33 = "...!"
12140-34 = "!!"
12140-35 = "Abydos no longer has an official club, a student council, or even a recognized district. That means it can no longer sustain itself as a school in the Academy City."
12140-36 = "But don't worry. As the rightful owners of this land, Kaiser Corporation will graciously take the school off your hands."
12140-37 = "How does the Kaiser Training Academy sound? It's a fitting name for the new school."
12140-38 = "!!"
12140-39 = "Wh-What are you talking about?"
12140-40 = "That's nonsense! Even if the student council is disbanded, Abydos still has the Foreclosure Task Force! We're right here!"
12140-42 = "This can't be happening..."
12140-43 = "Ayane?"
12140-44 = "The Foreclosure Task Force isn't an authorized club."
12140-45 = "What?!"
12140-46 = "The Student Council was long gone by the time it was created."
12140-47 = "What do you mean?!"
12140-48 = "That's right. An unregistered club like yours? There's no official paperwork backing you up. You're nothing but ghosts."
12140-49 = "But try to look on the bright side. Now you're finally free from all that tedious debt."
12140-52 = "What are you doing?! This wasn't the deal!"
12140-53 = "Why are you attacking Abydos?! Why?!"
12140-56 = "..."
12140-57 = "No, we kept our word, Hoshino."
12140-58 = "The debt has been settled, exactly as promised."
12140-59 = "But since you went ahead and withdrew...it seems Abydos no longer has an official student council, does it?"
12140-60 = "...!"
12140-61 = "Tell me, why do you think we backed this petty corporate land grab?"
12140-62 = "Snatching up a Kivotos district is meaningless. At worst, it just creates another lawless zone, another Black Market."
12140-63 = "And we've got more than enough of those."
12140-64 = "But...what if a brand-new school, owned by a corporation, was established here in Abydos?"
12140-65 = "What kind of change do you think that would bring to Kivotos?"
12140-66 = "...!"
12140-67 = "Ah...but this? This was nothing more than a sideshow, Hoshino."
12140-68 = "You were our true objective from the very start."
12140-69 = "Getting you to sign the contract, transferring all rights over to us."
12140-70 = "That was the only reason we cooperated with Kaiser."
12140-71 = "A lifetime contract with Kaiser PMC? Hah...we never said anything of the sort. If you misunderstood, well...that's unfortunate."
12140-72 = "To think we'd waste something as valuable as Kivotos' highest-grade mystic on mere labor? Ridiculous."
12140-75 = "Takanashi Hoshino is to be studied, analyzed, understood. You, in other words, are a test subject, nothing more."
12140-76 = "That's the experiment we truly wish to observe."
12140-77 = "So don't take it too personally."
12140-83 = "..."
12140-84 = "Now I get it."
12140-85 = "All this time..."
12140-87 = "...I was being manipulated by adults yet again."
12140-89 = "..."
12140-90 = "I'm sorry, everyone. This is my fault."
12140-91 = "Shiroko. Nonomi. Serika. Ayane."
12140-92 = "and Yume..."
12140-93 = "..."
12140-94 = "I'm so sorry."
12140-95 = "..."
12140-96 = "I..."
12140-98 = "..."
12140-99 = "Sensei..."
12140-102 = "..."
12140-103 = "...Then everything we worked for...was for nothing?"
12140-104 = "Oh? Don't tell me you were serious about it."
12140-105 = "Did you really think you could pay off that debt over a few hundred years? "
12140-106 = "I assumed it was just an excuse, something to tell yourselves so you could pretend you tried before eventually giving up."
12140-107 = "...!"
12140-108 = "But you didn't quit. You kept struggling. Why? What for?"
12140-109 = "...You bastard. Shut your mouth before I shut it for you..."
12140-112 = "Engaging."
12140-113 = "But..."
12140-114 = "And then what? What happens after we fight?"
12140-115 = "...Ayane?!"
12140-116 = "They're still sending wave after wave of soldiers our way..."
12140-117 = "Even if we somehow win...then what?"
12140-118 = "If the school disappears, what are we even fighting for? And even if we take it back...our debt isn't going anywhere."
12140-119 = "...Ayane."
12140-120 = "Ayane..."
12140-121 = "The land is already gone. It won't come back. Hoshino is gone. The student council is gone. And us? We're just an unrecognized club..."
12140-122 = "...What can we even do...?"
12140-123 = "Why...?"
12140-124 = "Why is it always us...? Why do we have to suffer like this...? Hoshino..."
12140-125 = "Oh, Ayane..."
12140-126 = "..."
12140-127 = "..."
12140-128 = "*kabooooom*"
12140-129 = "...?!"
12140-131 = "What?! Massive explosion detected to the north!"
12140-132 = "Bravo Squad was c-caught in the blast on their way in. They're not responding!"
12140-133 = "Wh-What?!"
12140-134 = "*BOOM*"
12140-135 = "Mike Squad was hit in the east! Massive C4 explosion detected!"
12140-136 = "What's happening? The only people in that area should be Abydos residents!"
12140-141 = "What are you idiots doing?"
12140-142 = "...?!"
12140-152 = "An eye for an eye, a tooth for a tooth. Forsake mercy and walk the path of chaos."
12140-155 = "Wasn't that the Masked Swimsuit Gang's motto? "
12140-156 = "...Wha— Y-You are?!"
12140-157 = "There's no finish line in sight, you can't find a way to get there, and everything you do is failure after failure. "
12140-158 = "No one sees how hard you struggle, and the only things waiting for you are more hardships and rough days ahead..."
12140-160 = "But who cares?!"
12140-161 = "Huh...?"
12140-162 = "Are you really going to let something like that get in the way of rescuing your friend?!"
12140-163 = "Pathetic. Absolutely pathetic!"
12140-164 = "Sheesh, Aru, lighten up a little. Little Miss Four-Eyes is the neurotic type. She can't help it."
12140-165 = "Huh?!"
12140-166 = "Haha! But making my adorable Little Miss Four-Eyes cry is a pretty serious crime. Which is why..."
12140-170 = "...I'm gonna rip these guys apart!"
12140-171 = "Heh heh heh. I'm ready, Aru. We still have plenty of bombs left..."
12140-172 = "*sigh* I only came back for more ramen. Why am I getting dragged into this?"
12140-173 = "I've set up explosives to cut off enemy reinforcements. While they're stuck, we take out their commander and break their chain of command."
12140-174 = "That should leave them completely disorganized. Originally, this strategy was meant for dealing with the Prefect Team, but..."
12140-176 = "Perfect. Time to show them what real outlaws fight like."
12140-177 = "Light it up, Haruka."
12140-178 = "*click*"
12140-179 = "*kaboooooom*"
12140-180 = "*boooooom*"
12140-181 = "*kabooooom*"
12140-183 = "What in the world?!"
12140-187 = "Back us up, Sensei!"
12140-188 = "Let's show the Foreclosure Idiot Force what it means to be hard-boiled!"
12140-189 = "[ns] \"Let's go, Problem Solvers!\""

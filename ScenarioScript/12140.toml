12140-33 = "...!!"
12140-34 = "!!"
12140-35 = "ตอนนี้อะบิดอสไม่มีทั้งชมรมและสภานักเรียนที่เป็นทางการ อีกทั้งยังไม่มีสิทธิ์ในเขตปกครองตนเอง#nจึงถูกประเมินว่าอยู่เป็นเอกเทศเองไม่ได้ในฐานะโรงเรียนในเมืองแห่งการศึกษา\n"

[translation]
10018060-1 = "第6話;賣光了？怎麼可能……"
10018060-2 = "（為了採購食材，一行人來到了被喵食品占領（？）的商店街）"
10018060-3 = "（一眼望去，就是一條平凡無奇的普通商店街）"
10018060-8 = "街上真熱鬧呢。"
10018060-9 = "不過考慮到現在是年節期間，這也是理所當然的。"
10018060-10 = "總覺得……讓人有點興奮！"
10018060-11 = "[s]「謝謝茱莉願意接受採購食材的任務。」"
10018060-12 = "這不算什麼，只是供給部每天的例行公事而已！"
10018060-13 = "能在和平常不同的地方買東西，我反而覺得很期待呢。"
10018060-14 = "啊，但這並不是說供給部的工作讓人不開心唷！"
10018060-15 = "前輩的廚藝，總是會讓我看到入迷……"
10018060-16 = "光是看著就能感到高興。"
10018060-17 = "那可不可以把供餐做的更好吃一點！"
10018060-18 = "雖然我大概能想到幾種可能性……"
10018060-19 = "不過經常聽到類似的抱怨也是事實呢★"
10018060-20 = "嗚嗚……"
10018060-21 = "說的也是。身為供給部的一員，這的確是我們該做的……"
10018060-22 = "[s]「也謝謝泉和亞伽里的幫忙。」"
10018060-23 = "嗯！我很喜歡看食材！每個看起來都很好吃！"
10018060-24 = "但看著看著肚子就餓了呢……（吞口水）"
10018060-25 = "我只是不好意思把工作都推給茱莉唷★"
10018060-26 = "而且如果要帶食材回去的話，人手是越多越好。"
10018060-27 = "[s]「很高興聽到你們這麼說。」"
10018060-29 = "那就開始採購吧！"
10018060-30 = "我們的目標是在便宜的食材裡，選出相對好的東西！"
10018060-35 = "啊，這個高麗菜看起來不錯。"
10018060-39 = "形狀和顏色都很漂亮，裡面也很飽滿。"
10018060-40 = "不好意思，我想買這些高麗菜……"
10018060-41 = "啊，抱歉。菜已經全部賣光了。"
10018060-42 = "咦？可是架子上不是還有很多嗎……？"
10018060-43 = "剛才有人說要包下所有庫存，連訂金都付了……真抱歉啊……"
10018060-44 = "那，那……還有其他食材能買嗎？"
10018060-45 = "現在……沒有。#n即使有，我也被交代過不能賣出去。"
10018060-46 = "真的很不好意思……#n我們也不是自願這麼做的，希望你們能諒解……"
10018060-52 = "哼嗯……？"
10018060-53 = "怎麼會有這種事！"
10018060-57 = "接著去買肉吧。"
10018060-61 = "……這邊的豬肉看起來很不錯！"
10018060-62 = "顏色是漂亮的鮮紅色，脂肪的比例也很均勻。"
10018060-63 = "今天已經收攤了……有什麼事嗎？"
10018060-64 = "咦，這麼快？"
10018060-65 = "因為今天準備的肉都賣光了。"
10018060-66 = "該不會……是有人匯了款，說要包下所有的庫存吧？"
10018060-67 = "是啊……就像你說的一樣。#n總覺得不太對勁，以前從來沒有遇過這種事……"
10018060-68 = "真不好意思。下次我會準備更好的商品，今天就請你們多擔待了。"
10018060-69 = "總覺得事有蹊蹺。"
10018060-72 = "再來得去買醬油和料理酒……有種不祥的預感。"
10018060-73 = "調味料的保存期間很長，我想肯定會有庫存的……"
10018060-74 = "不好意思。我想買醬油和料理酒……啊，還有沙拉油。"
10018060-75 = "那個……在下次進貨之前，我打算關門休息一陣子。"
10018060-79 = "難道……全都賣完了嗎？"
10018060-80 = "嗯，抱歉讓你們白跑一趟。"
10018060-85 = "一次的話還能說是偶然，但接二連三發生相同的事……"
10018060-86 = "是有人故意這麼做的吧？但是為什麼呢？"
10018060-87 = "太過分了！"
10018060-88 = "[s]「這種情況確實很不自然。」"
10018060-90 = "先，先打起精神，去其他地方再找找看吧！"
10018060-97 = "不管去哪裡都一樣……"
10018060-98 = "[s]「整條街的食材……居然全都賣完了？」"
10018060-99 = "並不是全部哦，老師。#n只有我們需要的食材賣完了而已。"
10018060-100 = "一定是故意要妨礙我們的！討厭，到底為什麼！"
10018060-104 = "那是因為……你們實在太礙眼了。"
10018060-109 = "[ns]「是誰？」"
10018060-116 = "你們涉入太深了。"
10018060-117 = "雖然說了你們可能也不會聽，但我還是給你們一個忠告吧。"
10018060-118 = "只要你們願意就此收手，我們也不會再干涉下去。"
10018060-119 = "你似乎很清楚我們會怎麼回答，又為何會覺得我們會接受那個提案呢？"
10018060-120 = "我就坦白說吧，因為再這樣下去，也只會造成彼此的困擾而已。"
10018060-121 = "可是就算這樣，你們也沒打算放過麻雀亭對吧？那可不行！"
10018060-122 = "那間店才是問題所在啊……"
10018060-123 = "算了，這樣也好。"
10018060-124 = "我早就猜到結局會是這樣了。#n……出來吧。"
10018060-131 = "哇！這次怎麼完全換了批人！？"
10018060-132 = "這也算是信任的一種表現呢。"
10018060-134 = "要怪就怪你們自己吧。"
10018060-138 = "覺悟吧。這次跟之前可不一樣啊。"

[translation]
10018060-1 = "Episode 6; Sold Out? No Way..."
10018060-2 = "I went to the street dominated by Nyao Foods to buy groceries."
10018060-3 = "Everything looked exceedingly normal, nothing special in sight."
10018060-8 = "The street is really bustling today."
10018060-9 = "I guess it makes sense considering the time."
10018060-10 = "I'm...kind of excited!"
10018060-11 = "[ns] \"You have a lot on your plate today, Juri.\""
10018060-12 = "Not at all. I do this sort of thing every day for the School Lunch Club."
10018060-13 = "If anything, today is easier and more enjoyable than usual."
10018060-14 = "Oh! I'm not saying that School Lunch Club work isn't enjoyable."
10018060-15 = "It's amazing seeing the senior members of the club work. Their skill is mesmerizing..."
10018060-16 = "Just watching them makes me happy."
10018060-17 = "I'd be just as happy if they made even more delicious lunches!"
10018060-18 = "I get what you're saying..."
10018060-19 = "I'm sure you hear things like that quite often. ★"
10018060-20 = "*sigh*"
10018060-21 = "Right. That is what the School Lunch Club is supposed to do, but..."
10018060-22 = "[s] \"Thanks for coming, Izumi and Akari.\""
10018060-23 = "Absolutely! I love looking at delicious food!"
10018060-24 = "But I love eating it even more... *gulp*"
10018060-25 = "I just didn't want Juri to keep all the culinary eye candy to herself. ★"
10018060-26 = "Anyway, the more help, the better, so don't worry about it, Sensei."
10018060-27 = "[s] \"I'm not sure about all that...but if you say so.\""
10018060-29 = "All right, let's go grocery shopping!"
10018060-30 = "Our goal is to find the best of the best mediocre ingredients."
10018060-35 = "Oh! This cabbage looks decent, but not too decent."
10018060-39 = "There aren't many brown spots. It's hard when you push on it, so it's fresh at least. It looks affordably good."
10018060-40 = "Excuse me. We'd like to buy these cabbages."
10018060-41 = "Oh, sorry. We're all sold out."
10018060-42 = "...What? But I'm holding one right now."
10018060-43 = "I'm sorry, we were paid in advance."
10018060-44 = "A-Are you sure there are none left?"
10018060-45 = "I'm sure... Besides, we were told not to sell any more even if we had them."
10018060-46 = "I'm so sorry. I wish it didn't have to be like this..."
10018060-52 = "Hmm..."
10018060-53 = "This is nonsense!"
10018060-57 = "Let's try buying meat instead."
10018060-61 = "The pork here looks good!"
10018060-62 = "It's a nice pink, and the marbling looks good."
10018060-63 = "We're closing for today. What do you need?"
10018060-64 = "What? Already?"
10018060-65 = "We're all sold out today."
10018060-66 = "Uh-huh. Did someone happen to pay you in advance?"
10018060-67 = "Yeah, actually. It's kind of strange. I've never had this happen before."
10018060-68 = "Sorry. Please come again when we've restocked."
10018060-69 = "Something smells fishy, and it's not the meat."
10018060-72 = "Well, we can go buy soy sauce and cooking wine, but I have a bad feeling about this..."
10018060-73 = "Seasonings have a long shelf life and aren't something you often buy in bulk, so they shouldn't be sold out..."
10018060-74 = "Hello, do you have soy sauce and cooking wine? We also need cooking oil."
10018060-75 = "Um, we actually have to close until more inventory comes in."
10018060-79 = "Everything's...sold out?"
10018060-80 = "Yes, I'm sorry for the inconvenience."
10018060-85 = "Once or twice could be a coincidence, but three times? No way."
10018060-86 = "Is someone doing this on purpose? But why?"
10018060-87 = "That's so mean!"
10018060-88 = "[s] \"This is no accident.\""
10018060-90 = "L-Let's check out other places!"
10018060-97 = "It was fruitless, and I'm not just talking about the fruit vendor."
10018060-98 = "[s] \"Everything on the street is sold out?\""
10018060-99 = "Not everything, Sensei, just everything decent."
10018060-100 = "Someone is trying to stop us! But why?!"
10018060-104 = "Because you crossed the line."
10018060-109 = "[ns] \"Who's that?\""
10018060-116 = "You're in too deep."
10018060-117 = "You probably won't do it, but it's not too late to turn back."
10018060-118 = "Walk away, then we'll stop interfering."
10018060-119 = "You seem to know the answer already. What makes you think we'd walk away?"
10018060-120 = "Listen, it's inconvenient for both of us. We don't wanna do this, and you don't either, so if you stop, so can we."
10018060-121 = "More like if we stop, you'll just take over Sparrow!"
10018060-122 = "That restaurant can't possibly be worth the trouble..."
10018060-123 = "But fine, have it your way."
10018060-124 = "I figured it would come to this, so I came prepared."
10018060-131 = "Th-Those things aren't wearing helmets at all!"
10018060-132 = "Ah, I see how it is."
10018060-134 = "Remember, this is your fault."
10018060-138 = "Things are gonna end a bit differently this time."

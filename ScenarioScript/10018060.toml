[translation]
10018060-1 = "ตอนที่ 6;ขายหมดแล้วเหรอคะ? เป็นไปได้ยังไง..."
10018060-2 = "(ออกมาที่ถนนย่านการค้าที่ถูกเนียวฟู้ดยึดครอง(?) เพื่อซื้อวัตถุดิบ)"
10018060-3 = "(ดูภายนอกก็เหมือนถนนย่านการค้าทั่วไป ไม่มีอะไรพิเศษ)"
10018060-8 = "ถนนพลุกพล่านจังเลยนะคะ"
10018060-9 = "พอคิดว่าเป็นช่วงเทศกาลแบบนี้แล้วก็คงไม่แปลกสินะคะ"
10018060-10 = "รู้สึก... ใจเต้นตึกตักเลยค่ะ!"
10018060-11 = "[s] \"จูริทำงานหนักน่าดูเลยนะ...\""
10018060-12 = "ทำงานหนักอะไรล่ะคะ ฉันก็แค่ทำเหมือนตอนอยู่ที่ชมรมเท่านั้นเองค่ะ"
10018060-13 = "แถมกลายเป็นว่าตอนนี้รู้สึกสบายและสนุกกว่าตอนปกติด้วยค่ะ"
10018060-14 = "อ๊ะ! ไม่ใช่ว่างานที่ชมรมโภชนาการไม่สนุกนะคะ!"
10018060-15 = "พอเห็นฝีมือของรุ่นพี่ก็รู้สึกทึ่งมาก เอาแต่มองจนลืมหายใจเลยค่ะ..."
10018060-16 = "เวลาที่เห็นรุ่นพี่ทำอาหาร ฉันก็รู้สึกมีความสุขไปด้วยค่ะ"
10018060-17 = "ถ้างั้นก็ทำอาหารให้อร่อยๆ หน่อยสิ!"
10018060-18 = "มันสามารถคาดเดาได้หลายๆ อย่างก็จริง..."
10018060-19 = "แต่ที่มีคนออกมาบ่นเรื่องนั้นบ่อยๆ น่ะ เรื่องจริงนะคะ★"
10018060-20 = "ฮือ..."
10018060-21 = "นั่นสินะคะ การทำอาหารอร่อยๆ เป็นหน้าที่ของชมรมโภชนาการแท้ๆ..."
10018060-22 = "[s] \"อิซุมิ อาคาริ ขอบคุณนะที่มาช่วยน่ะ\""
10018060-23 = "อื้อ! งานแบบนี้ฉันชอบนะ! แถมได้กินของอร่อยๆ ด้วย!"
10018060-24 = "แต่ว่าฉันก็อยากลองกินดูบ้างจัง... เอื้อก..."
10018060-25 = "ฉันไม่อยากให้คุณจูริได้มีช่วงเวลาดีๆ ตามลำพังน่ะค่ะ★"
10018060-26 = "ยังไงมาหลายคนก็ย่อมดีกว่าคนเดียวอยู่แล้ว เพราะงั้นไม่ต้องเกรงใจนะคะคุณครู"
10018060-27 = "[s] \"ถึงจะไม่ค่อยเข้าใจเท่าไร... แต่ว่าไงก็ว่าตามนั้น\""
10018060-29 = "ถ้างั้นเราก็รีบไปซื้อของกันเถอะค่ะ!"
10018060-30 = "เป้าหมายของพวกเราก็คือหาวัตถุดิบชั้นเลิศในหมู่วัตถุดิบที่ดีที่สุดค่ะ"
10018060-35 = "ว้าว! กะหล่ำปลีหัวนี้ดูใช้ได้เลยนะคะ"
10018060-39 = "ตรงผิวด้านนอกก็ไม่มีส่วนที่เป็นสีน้ำตาลคล้ำ ลองจับดูก็เนื้อแน่นมาก ขนาดใหญ่พอเหมาะด้วยค่ะ"
10018060-40 = "ขอโทษนะคะ ฉันขอซื้อกะหล่ำปลีหน่อยค่ะ"
10018060-41 = "อ๊ะ อันนั้น... ขอโทษด้วยนะ เมื่อกี้มีคนซื้อไว้แล้วน่ะ"
10018060-42 = "คะ? ของยังวางอยู่ตรงนี้เลย แต่กลับบอกว่าขายไปแล้วงั้นเหรอคะ..."
10018060-43 = "เขาจ่ายเงินเอาไว้ก่อนน่ะ ขอโทษด้วยนะ..."
10018060-44 = "ถะ... ถ้าอย่างนั้นมีกะหล่ำปลี... เหลืออยู่บ้างมั้ยคะ?"
10018060-45 = "ตอนนี้... ไม่มีเลย ถึงจะมีอยู่แต่ก็มีคนสั่งมาว่าห้ามขายน่ะ"
10018060-46 = "ขอโทษจริงๆ นะ พวกเราก็ไม่ได้อยากทำแบบนี้สักนิดเดียว..."
10018060-52 = "หืม...?"
10018060-53 = "เรื่องแบบนี้มีที่ไหนกัน!"
10018060-57 = "งั้นคราวนี้ไปซื้อเนื้อกันเถอะค่ะ"
10018060-61 = "เนื้อหมูที่ร้านนี้ดูใช้ได้เลยค่ะ!"
10018060-62 = "เนื้อเป็นสีชมพูสด ชั้นไขมันก็เป็นสีขาว  และกระจายแทรกอยู่ในชั้นเนื้ออย่างสม่ำเสมอด้วยค่ะ"
10018060-63 = "ฉันจะปิดร้านแล้ว มีอะไรงั้นเหรอ?"
10018060-64 = "คะ? จะปิดแล้วเหรอคะ?"
10018060-65 = "เนื้อที่เตรียมไว้วันนี้ขายหมดแล้วละ"
10018060-66 = "หรือว่า... มีใครซื้อไว้ก่อนแล้วงั้นเหรอคะ?"
10018060-67 = "ใช่แล้ว... ถูกแล้วละ น่าขายหน้าจริงๆ จนถึงตอนนี้ ไม่เคยมีเรื่องแบบนี้เกิดขึ้นมาก่อนเลย"
10018060-68 = "ขอโทษด้วยนะ เอาไว้คราวหน้าฉันจะเตรียมเนื้อคุณภาพดีไว้ให้ก็แล้วกัน วันนี้ขอโทษด้วยจริงๆ"
10018060-69 = "ฉันว่ามันดูแปลกๆ นะคะ "
10018060-72 = "ต้องซื้อซีอิ๊วขาวกับไวน์สำหรับทำอาหารด้วย... แต่รู้สึกสังหรณ์ใจไม่ดีเลยค่ะ"
10018060-73 = "พวกเครื่องปรุงเป็นวัตถุดิบที่เก็บไว้ได้นาน ไม่น่าจะมีคนเหมาไปหมดหรอก..."
10018060-74 = "สวัสดีค่ะ ขอดูซีอิ๊วขาวกับไวน์ทำอาหารหน่อยได้มั้ยคะ แล้วก็น้ำมันด้วยค่ะ"
10018060-75 = "อืม... ฉันคิดจะปิดร้านสักพักจนกว่าวัตถุดิบล็อตต่อไปจะมาส่งน่ะ"
10018060-79 = "เครื่องปรุงทุกอย่าง... ขายหมดแล้วเหรอคะ?"
10018060-80 = "ใช่แล้ว ขอโทษด้วยนะ"
10018060-85 = "ครั้งแรกถือว่าเป็นเรื่องที่เกิดขึ้นได้ ครั้งที่สองถือเป็นเรื่องบังเอิญ แต่ถ้ามีครั้งที่สามน่ะหมายความว่า...?"
10018060-86 = "แสดงว่ามีใครจงใจทำแบบนี้งั้นเหรอ? แล้วจะทำไปทำไม?"
10018060-87 = "เกินไปแล้วนะ!"
10018060-88 = "[s] \"ไม่ใช่เรื่องบังเอิญแน่ๆ\""
10018060-90 = "กะ...ก่อนอื่น เราลองไปดูที่อื่นกันก่อนเถอะค่ะ!"
10018060-97 = "เหนื่อยเปล่าเลยนะคะ..."
10018060-98 = "[s] \"หมด... ทุกร้านเลยงั้นเหรอ?\""
10018060-99 = "ไม่ได้เป็นทุกร้านหรอกค่ะคุณครู มีแต่ของที่พอใช้ได้เท่านั้นแหละค่ะที่ขายหมด"
10018060-100 = "เป็นไปไม่ได้ ต้องมีใครคิดขัดขวางพวกเราแน่ๆ แต่ทำไปเพื่ออะไรกันล่ะ?"
10018060-104 = "เรื่องนั้น... เพราะพวกเธอมันรกหูรกตายังไงเล่า"
10018060-109 = "[ns] \"ใครน่ะ?\""
10018060-116 = "พวกเธอถลำลึกกันเกินไปแล้ว"
10018060-117 = "ฉันคิดว่าพูดไปพวกเธอก็คงจะไม่ฟังอยู่ดี แต่ว่าฉันมีข้อเสนอดีๆ ให้นะ"
10018060-118 = "ถ้ายอมรามือไปซะตั้งแต่ตอนนี้ พวกเราก็จะไม่ยุ่งกับพวกเธออีก"
10018060-119 = "พวกคุณก็น่าจะรู้คำตอบดีอยู่แล้วแท้ๆ นะคะ ทำไมถึงยังมั่นหน้าอีกว่าพวกเราจะรับข้อเสนอนั้นคะ?"
10018060-120 = "อันที่จริง... มันก็เหนื่อยเปล่าทั้งสองฝ่ายไม่ใช่รึไง ทั้งพวกเรา แล้วก็พวกเธอ"
10018060-121 = "ถ้างั้นพวกเธอก็จะไปรังแกร้านซุซุเมะตามใจชอบอีกน่ะสิ? แบบนั้นไม่เอาด้วยหรอก!"
10018060-122 = "...ก็ร้านนั้นนั่นแหละที่เป็นตัวปัญหา"
10018060-123 = "งั้นก็ดี"
10018060-124 = "คิดไว้แล้วว่าจะต้องเป็นแบบนี้ เอ้า ออกมาได้"
10018060-131 = "เอ๋... เอ๋? คราวนี้อีกฝ่ายดูไม่เหมือนเดิมเลย?!"
10018060-132 = "เหลือเชื่อเลยนะคะ"
10018060-134 = "พวกเธอเองไม่ใช่รึไงที่ทำให้มันเป็นแบบนี้น่ะ "
10018060-138 = "เตรียมตัวให้ดีๆ ซะ คราวนี้ไม่เหมือนเดิมแน่"

[translation]
10007105-1 = "Episode 10;Unchanging Friendship"
10007105-2 = "Ugh... Darn it. If it wasn't for that tank...!"
10007105-3 = "Heehee. Did you experience the might of the Purginator No. 1?"
10007105-4 = "The Purginator No. 1 is not only equipped with a dozer blade that can cut through any obstacles, but it also has all kinds of anti-personnel equipment to defeat students who challenge my authority!"
10007105-5 = "The Labor Party's attacks can't touch me now!"
10007105-6 = "Next time, we'll take down that tank first..."
10007105-11 = "With this, all the saboteurs are gone!"
10007105-13 = "Now, it's finally time to demolish the hot springs resort..."
10007105-14 = "The last hope we had for the hot springs..."
10007105-15 = "Waah...Waah..."
10007105-17 = "WAAAHHH!"
10007105-19 = "Wh-Wh-Why are you crying all of a sudden? The matter of shutting down the hot springs resort has already been decided!"
10007105-20 = "Even if you cry, we won't back down! This is a decision for the public interest of Red Winter Academy!"
10007105-21 = "Isn't that right, everyone?"
10007105-27 = "Well, um..."
10007105-28 = "Haha...hahaha..."
10007105-30 = "Wh-Why is everyone avoiding me?"
10007105-31 = "It makes me look like the bad guy!"
10007105-32 = "Comrade! Do you also think I'm in the wrong?!"
10007105-33 = "[s1] \"I think you went a bit overboard this time, Cherino.\"\n[s2] \"Isn't it okay to at least leave the hot springs resort building intact?\""
10007105-34 = "I trusted you, Comrade! How could you!"
10007105-35 = "I trusted you, Comrade! How could you!"
10007105-36 = "No! I refuse! The Hot Springs Resort No. 227 will be shut down!"
10007105-37 = "If we leave any route to restore the hot springs, the Hot Springs Department could come back at some point and endanger Red Winter Academy!"
10007105-38 = "Of course, I could leave the hot springs resort building alone, but.."
10007105-39 = "It's no use—it's all over! We're done for without the hot springs!"
10007105-40 = "The money we earned will quickly disappear, the building will be left unattended, and the rain and wind will seep in... We'll eventually return to living like we used to at the Former Institute."
10007105-41 = "I didn't want to let go of what we had... I don't want to go back to those hard times!"
10007105-42 = "In the end, there's nothing left for us!"
10007105-44 = "It's not like that, Nodoka. We do still have some things."
10007105-45 = "What's left for us, Shigure?"
10007105-46 = "There's nothing! Nothing!"
10007105-47 = "We still have our friends from the Former Institute Spec Ops."
10007105-48 = "Our friends?"
10007105-52 = "To be honest, I never thought life was all that bad back in the Former Institute."
10007105-53 = "Of course, there wasn't enough to eat, there wasn't any kind of heating system, and sometimes there were bears..."
10007105-54 = "But the fact that I could be with my great friends, including Nodoka, made me happy."
10007105-55 = "I don't care whether this place is a splendid hot springs resort or a desolate ruin as long as we're together."
10007105-56 = "We even get to have a nice new building that used to be a hot springs resort, right? It won't be as bad as it was before."
10007105-57 = "We'll be fine this time too, Nodoka. Promise."
10007105-58 = "Aw. Shigure..."
10007105-63 = "W-Wait. I didn't say I'd cancel the demolition of the hot springs resort yet."
10007105-64 = "*whisper* Cherino, read the room."
10007105-65 = "H-Huh? Y-Yeah?"
10007105-66 = "Tch, fine. Everyone seems to want it, so I'll be lenient this time."
10007105-67 = "I hereby cancel the demolition!"
10007105-68 = "I will entrust the hot springs resort to the Spec Ops No. 227 students to do with as they please!"
10007105-70 = "A wise decision indeed. As expected from our President."
10007105-71 = "You have treated your enemies with generosity."
10007105-72 = "I, Marina, am touched!"
10007105-77 = "This hot springs resort...won't be a resort anymore?"
10007105-79 = "Megu? You're still here?"
10007105-80 = "We told you to use the hot springs resort however you like..."
10007105-81 = "...but we still meant for you to use it as a hot springs resort!"
10007105-82 = "Well, it's going to dry out eventually..."
10007105-83 = "If we can't save the hot springs, wouldn't it be more beneficial to renovate it for a different purpose?"
10007105-84 = "We were trying to blow up the underground magma province to save them, but..."
10007105-85 = "Since our plan has been thwarted, we have no choice but to carry out President Kasumi's plan B!"
10007105-86 = "[s] \"Plan B?\""
10007105-87 = "Plan B: \"If a hot spring is no longer a hot spring, there's no reason to leave it be!\""
10007105-88 = "We knew this was going to happen, so we buried explosives in advance when building the foundation!"
10007105-89 = "E-Explosives?"
10007105-90 = "So you're saying we're standing on top of explosives?"
10007105-91 = "Yep. Our President Kasumi always comes up with the best solution for any situation. ♪"
10007105-92 = "We were told to blow everything up if the Red Winter Office tried to interfere!"
10007105-93 = "There are no useless hot springs in the world! There are only useless buildings!"
10007105-98 = "Well, then. Time to detonate—"
10007105-99 = "[s] \"W-Wait—\""
10007105-100 = "Fire!"
10007105-107 = "*BOOM*"

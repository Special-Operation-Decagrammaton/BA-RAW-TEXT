[translation]
10007105-1 = "ตอนที่ 10;มิตรภาพที่ไม่เสื่อมคลาย"
10007105-2 = "อึ่ก... บ้าจริง ถะ...ถ้าไม่มีรถถังนั่นละก็..."
10007105-3 = "ฮุฮุ เห็นรึยังล่ะ เกียรติภูมิที่แข็งแกร่งของ <ผู้กวาดล้าง No.1>"
10007105-4 = "นอกจาก <ผู้กวาดล้าง No.1>  จะมีใบเลื่อยคมที่ใช้จัดการกับสิ่งกีดขวางแล้ว ยังมีอุปกรณ์#nหลายชนิดที่ใช้จัดการกับพวกนักเรียนที่คิดจะคุกคามกับอำนาจของเราด้วยนะ!"
10007105-5 = "คราวนี้ก็ไม่ต้องห่วงเรื่องสิ่งกีดขวางที่พวกชมรมผู้รับจ้างเอามาแล้ว!"
10007105-6 = "คราวหน้าคงจะต้องเริ่มจากทำลายเจ้ารถถังนั่นก่อน..."
10007105-11 = "เท่านี้ก็ไม่มีพวกขวางหูขวางตาแล้ว!"
10007105-13 = "เอาละ ต่อมาก็จัดการรื้อถอนออนเซ็น..."
10007105-14 = "ออนเซ็นที่เป็นความหวังของเรา..."
10007105-15 = "ฮือ... ฮือออ..."
10007105-17 = "แงงงงงงงง!"
10007105-19 = "ทะ...ทำไมจู่ๆ ถึงแหกปากลั่นแบบนั้นล่ะ เราตัดสินใจเรื่องปิดออนเซ็นแล้วนะ!"
10007105-20 = "ถึงจะร้องไห้แบบนี้ก็ไม่ช่วยอะไรหรอก! นี่เป็นการตัดสินใจเพื่อประโยชน์ของสหภาพเรดวินเทอร์!"
10007105-21 = "ใช่มั้ยล่ะทุกคน?"
10007105-27 = "อืม เรื่องนั้น..."
10007105-28 = "ฮะๆ... ฮะฮะ..."
10007105-30 = "ทะ...ทำไมทุกคนถึงหลบตาเราแบบนั้นล่ะ?"
10007105-31 = "ถ้าเป็นแบบนี้ก็เท่ากับว่าเราเป็นคนใจร้ายน่ะสิ!"
10007105-32 = "สหาย! สหายคิดว่าเราทำเรื่องที่ผิดรึเปล่า?!"
10007105-33 = "[s1] \"คราวนี้เหมือนเชริโน่จะทำเกินไปนะ\"\n[s2] \"เหลือออนเซ็นนี่ไว้คงไม่เป็นไรหรอกน่า\""
10007105-34 = "สหายที่เราไว้ใจก็ด้วยงั้นเรอะ!"
10007105-35 = "สหายที่เราไว้ใจก็ด้วยงั้นเรอะ!"
10007105-36 = "แต่ยังไงก็ไม่ได้! ออนเซ็น No.227 จะต้องปิดตัวลง!"
10007105-37 = "ถ้าเหลืออะไรที่ใช้เป็นข้ออ้างในการฟื้นฟูออนเซ็นไว้ พวกชมรมพัฒนาออนเซ็นอาจจะกลับมา#nและทำเรื่องที่อันตรายต่อสหภาพเรดวินเทอร์ก็ได้นะ!"
10007105-38 = "จะให้เหลือตัวอาคารไว้ก็ได้นะ..."
10007105-39 = "จะมีประโยชน์อะไรคะ ยังไงก็พังหมดแล้ว ถ้าน้ำในออนเซ็นแห้งไปหมดแบบนั้นพวกเราก็จบเห่กันอยู่ดีค่ะ!"
10007105-40 = "เงินที่หามาได้ก็คงหมดไปในทันที อาคารก็จะถูกทิ้งไว้โดยที่ไม่มีใครดูแล... ต้องเจอทั้งแดดและลม สุดท้ายพวกเราก็กลับไปเป็นเหมือนตอนอยู่ที่อาคารเรียนเก่าอยู่ดี"
10007105-41 = "ฉันไม่อยากพลาดโอกาสดีๆ แบบนี้ไป... และไม่อยากกลับไปมีชีวิตแบบเดิมอีกแล้ว...!"
10007105-42 = "เพราะสุดท้ายพวกเราก็จะไม่เหลืออะไรเลยยังไงล่ะคะ!"
10007105-44 = "ไม่หรอกนะโนโดกะ พวกเรายังมีเหลืออยู่เยอะเลยนะ"
10007105-45 = "แล้วพวกเราจะเหลืออะไรล่ะ ชิกุเระจัง..."
10007105-46 = "ในสถานการณ์ที่ทุกอย่างกำลังจะจบลงแบบนี้น่ะ!"
10007105-47 = "ก็มีเพื่อนๆ ทุกคนในห้องเรียนพิเศษอยู่ไม่ใช่เหรอ"
10007105-48 = "เพื่อนๆ...?"
10007105-52 = "ฉันน่ะ... ที่จริงตอนที่อยู่อาคารเรียนเก่าก็ไม่ได้รู้สึกว่ามันลำบากอะไรมากมายหรอก"
10007105-53 = "แน่นอนว่าถึงจะขาดแคลนเรื่องอาหารอยู่บ้าง ต้องทนหนาวเพราะไม่มีเครื่องทำความร้อน หรือบางครั้งก็ต้องเผชิญหน้ากับหมียักษ์ที่โผล่มาบ้าง..."
10007105-54 = "แต่การที่ฉันได้อยู่กับโนโดกะแล้วก็เพื่อนๆ ทุกคน ฉันมีความสุขมากนะ"
10007105-55 = "ไม่ว่าจะเป็นทั้งที่ออนเซ็นหรูหราแบบนี้ หรือจะเป็นอาคารเรียนเก่าๆ นั่น ขอแค่ได้อยู่กับทุกคน ฉันก็ไม่มีปัญหาอะไร"
10007105-56 = "แต่ตอนนี้เรามีอาคารใหม่ที่เคยใช้เป็นออนเซ็นด้วยนี่นะ สถานการณ์อาจจะดีกว่าเดิมก็ได้"
10007105-57 = "โนโดกะ... คราวนี้พวกเราต้องอดทนผ่านมันไปได้แน่ๆ"
10007105-58 = "ฮือ... ชิกุเระจัง..."
10007105-63 = "ดะ...เดี๋ยวก่อน! ระ...เราไม่ได้พูดว่าจะยกเลิกการรื้อถอนออนเซ็นนี่สักหน่อย"
10007105-64 = "(กระซิบ) เชริโน่จัง ดูสถานการณ์หน่อยสิคะ"
10007105-65 = "อ่ะ อืม... งะ...งั้นเหรอ?"
10007105-66 = "ชิส์... ช่วยไม่ได้นะ ดูเหมือนจะเป็นสิ่งที่ทุกคนต้องการ เพราะงั้นคราวนี้เราจะผ่อนปรนให้แล้วกัน"
10007105-67 = "เลื่อนการรื้อถอนอาคาร!"
10007105-68 = "สำหรับออนเซ็นที่นี่ เราขอมอบอำนาจดูแลให้กับห้องพิเศษ 227 และพัฒนาเป็นอาคารอำนวยความสะดวกอื่นขึ้นแทน!"
10007105-70 = "ตัดสินใจได้สมกับเป็นท่านประธานมากเลยค่ะ"
10007105-71 = "ปฏิบัติกับศัตรูด้วยความเอื้ออาทรงั้นเหรอ..."
10007105-72 = "มารินะประทับใจมากค่ะ!"
10007105-77 = "จะดัดแปลงออนเซ็นนี่... ไปใช้เพื่อจุดประสงค์อื่นเหรอ?"
10007105-79 = "คุณเมกุ? ยังอยู่ที่นี่อีกเหรอคะ?"
10007105-80 = "บอกว่าใช้ออนเซ็นได้ตามอำเภอใจมันก็ดีอยู่หรอก..."
10007105-81 = "แต่จะให้ปรับปรุงเพื่อจุดประสงค์อื่น แบบนั้นฉันยอมรับไม่ได้!"
10007105-82 = "ถึงจะพูดแบบนั้น แต่ถ้าปล่อยไว้ น้ำพุร้อนของที่นี่ก็จะเหือดแห้งไปอยู่ดี…"
10007105-83 = "ถ้ารักษาตาน้ำพุร้อนเอาไว้ไม่ได้แล้ว เราปรับปรุงเพื่อใช้งานแบบอื่นไม่ดีกว่าเหรอคะ?"
10007105-84 = "เพื่อไม่ให้ตาน้ำเหือดแห้ง พวกเราเลยคิดจะระเบิดแมกม่าใต้ดินกัน..."
10007105-85 = "แต่ถ้าแผนการถูกขัดขวางแบบนี้ คงไม่มีทางเลือกอื่นนอกจากทำตามแผนสองของหัวหน้าคาสุมิแล้ว!"
10007105-86 = "[s] \"แผนสองเหรอ?\""
10007105-87 = "แผนสองก็คือ 'ถ้าออนเซ็นกลายเป็นสถานที่ที่ไม่ใช่ออนเซ็นไปละก็ มันก็ไม่มีเหตุผลที่จะต้องมีออนเซ็นแห่งนั้นอีกต่อไป!'"
10007105-88 = "คิดแล้วว่าจะต้องเกิดเรื่องแบบนี้ขึ้น เพราะงั้นตอนที่ก่อสร้างเลยฝังดินระเบิดเอาไว้ข้างใต้ด้วยไงล่ะ!"
10007105-89 = "ดะ...ดินระเบิดเหรอคะ?"
10007105-90 = "ถ้างั้น แสดงว่าตอนนี้พวกเรายืนยู่บนดินระเบิดเหรอคะ?"
10007105-91 = "อื้อ หัวหน้าคาสุมิของเราน่ะ เป็นคนที่วางแผนจัดการได้อย่างยอดเยี่ยมในทุกสถานการณ์เลยนะ♪"
10007105-92 = "ถ้าเกิดพวกสำนักเลขาธิการเรดวินเทอร์เข้ามาขัดขวางละก็ เราจะจุดดินระเบิดให้ราบเป็นหน้ากลองเลย!"
10007105-93 = "ในโลกนี้ไม่มีออนเซ็นที่ไร้ประโยชน์หรอก! มีแต่อาคารที่ไร้ประโยชน์เท่านั้น!"
10007105-98 = "ถ้างั้น...ก็ระเบิดทิ้งซะเลย—"
10007105-99 = "[s] \"ดะ...เดี๋ยวก่อน—!\""
10007105-100 = "ระเบิดไปซะ!"
10007105-107 = "ตู้มมมมม!"

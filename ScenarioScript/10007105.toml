[translation]
10007105-1 = "第10話;不會改變的事物"
10007105-2 = "唔……可惡，要是沒有那台戰車……"
10007105-3 = "哼哼，看到了吧。這就是「肅清君1號」的威力。"
10007105-4 = "肅清君1號不只有能剷除任何障礙物的巨大鏟子，#n還有能驅除對咱刀刃相向的學生們的各種裝備！"
10007105-5 = "不管工務部的傢伙用什麼重裝備攻擊，也沒什麼好怕的！"
10007105-6 = "唔，真是麻煩……下次，得先破壞那台戰車才行……"
10007105-11 = "這樣一來，礙事的傢伙就全部消失了。"
10007105-13 = "好，這次一定要把溫泉浴場拆掉……"
10007105-14 = "最後的，希望……"
10007105-15 = "嗚……嗚嗚……"
10007105-17 = "嗚啊啊啊──！"
10007105-19 = "為，為什麼突然哭了起來？#n溫泉浴場的關閉已經是既定事項，差不多也該放棄了……"
10007105-20 = "……即使你哭了也不能撤回！#n這是為了赤冬聯邦學園整體利益的決定……"
10007105-21 = "對，對吧，各位？"
10007105-27 = "那個，該怎麼說呢……"
10007105-28 = "呃，呃……"
10007105-30 = "為，為什麼大家都把視線移開了！？"
10007105-31 = "這樣咱不就像壞人一樣了嗎！"
10007105-32 = "同志！同志也覺得咱錯了嗎！？"
10007105-33 = "[s1]「這次是潔莉諾做得太過頭囉。」\n[s2]「溫泉浴場的建築物，留下來也沒什麼不好吧？」"
10007105-34 = "連，連同志也……！？"
10007105-35 = "連，連同志也……！？"
10007105-36 = "……總，總之227號溫泉浴場必須封鎖！"
10007105-37 = "如果一直營運到溫泉枯竭的話，溫泉開發部的那些傢伙還會再來，#n很可能會讓赤冬聯邦學園暴露在危險之中！"
10007105-38 = "不過，正因如此……反過來說，就算把建築留著也……"
10007105-39 = "全部都結束了，早就結束了！無論如何只要溫泉一枯竭，我們就已經完蛋了……！"
10007105-40 = "賺來的錢很快就會消失，我們終究得回歸舊校舍時期的貧困生活……"
10007105-41 = "所以我才不想放過這個機會的……所以才不想回到那個時候的……！"
10007105-42 = "結果我們還是一無所有！！"
10007105-44 = "不是那樣的唷，和香。"
10007105-45 = "你在說什麼啊，時雨醬……"
10007105-46 = "明明就，什麼都不剩了……！"
10007105-47 = "我們227號特別班不是還在一起嗎？"
10007105-48 = "……？"
10007105-52 = "……我啊，其實也沒有那麼討厭舊校舍的生活唷。"
10007105-53 = "雖然食物永遠不夠，還沒有完善的暖房器具，偶爾還會有熊出沒……"
10007105-54 = "但是能跟和香在一起，227號特別班能在一起，我覺得這樣就很開心了。"
10007105-55 = "不管這裡是很棒的溫泉浴場，還是荒涼的廢墟……#n只要能待在一起，不管在哪都無所謂。"
10007105-56 = "而且還有溫泉浴場的建築，就算只留下一棟建築物……狀況也會有所改善不是嗎？"
10007105-57 = "只要我們一起努力，一定沒問題。#n我是這麼想的……和香你呢？"
10007105-58 = "時雨醬……"
10007105-63 = "……等等。咱可還沒說要取消拆除哦。"
10007105-64 = "潔莉諾醬，請看一下氣氛……！"
10007105-65 = "呃，啊，唔呣……"
10007105-66 = "……真沒辦法。#n既然大家都這麼說了，這次就特別放過你們吧。"
10007105-67 = "建築物的拆除命令暫時保留！"
10007105-68 = "這個溫泉浴場就交由「227號特別班」的學生們改建成其他建築物！"
10007105-70 = "不愧是潔莉諾會長，非常明智的判斷。"
10007105-71 = "如此寬宏大量的處理方式……"
10007105-72 = "瑪麗娜我，真是感動萬分！"
10007105-77 = "……改建？"
10007105-79 = "咦……惠同學？"
10007105-80 = "畢竟也不能放著溫泉的問題不管就回去嘛！#n不過我們雖然說過可以自由使用溫泉浴場……"
10007105-81 = "但是要改建為其他用途的話就無法允許了呢！那可是對溫泉的褻瀆啊！"
10007105-82 = "但，但是就算放著不管，這裡的溫泉也會乾枯的對吧……？"
10007105-83 = "如果沒有辦法讓溫泉重新甦醒，不如改建成其他用途的建築……"
10007105-84 = "就是為了防止那種情況，我們之前才想引爆地下的岩漿地帶的……"
10007105-85 = "既然無法那麼做，也只好執行佳澄部長的B計畫了！"
10007105-86 = "[s]「B計畫……？」"
10007105-87 = "嗯，「與其讓溫泉不再是溫泉，不如全部炸掉」計畫！"
10007105-88 = "我們也有預想過事情可能會變成這樣，#n所以其實在進行基礎工程時就埋了一些炸藥哦♪"
10007105-89 = "炸，炸藥？"
10007105-90 = "也就是說我們現在就站在炸藥上面……？"
10007105-91 = "嗯，不愧是佳澄部長！#n或許早就預料到事情會變成這樣，所以才告訴我們要埋炸藥吧。"
10007105-92 = "啊哈，果然和我不一樣，非常聰明呢！"
10007105-93 = "這個世界上沒有沒意義的溫泉！只有沒意義的建築物！"
10007105-98 = "那麼B計畫……"
10007105-99 = "[s]「等，等──」"
10007105-100 = "上吧！"
10007105-107 = "（咚哐──！）"

21040-109 = "*whir*"
21040-111 = "Circumstances unknown."
21040-113 = "Attempting conversation. Please explain."
21040-114 = "Explain? You want to know what's going on?"
21040-115 = "That's what we were going to ask you! Who are you? What IS this place?!"
21040-117 = "Sense of self, memory, and purpose not found. No data available."
21040-118 = "What does that mean? And...you're not going to attack us, are you?"
21040-120 = "Negative. The offensive capabilities of this unit cannot be activated when in contact with an approved subject."
21040-121 = "Fascinating. Robotic citizens are common in Kivotos, but I've never seen one that looks like us."
21040-124 = "What do we do now, Sensei?"
21040-125 = "[s3] \"Tell me what you mean by 'approved subject.'\"\n[s4] \"Who are you? And what is this place?\""
21040-127 = "Answer not found. This is presumably the first occurrence of deep consciousness for this unit. Answer unknown."
21040-129 = "Answer not found. This is presumably the first occurrence of deep consciousness for this unit. Answer unknown."
21040-131 = "Deep consciousness? What does that mean?"
21040-132 = "Hmm..."
21040-133 = "Factory basement... No clothes... Memory loss..."
21040-134 = "Heehee, I have a great idea."
21040-135 = "I...really don't like where you're going with this."
21040-140 = "???"
21040-142 = "Millennium Game Development Department"
21040-145 = "???"
21040-147 = "What were you thinking?!"
21040-148 = "Why did you bring her to the club room?!"
21040-150 = "Ugh! Don't choke me! I can't breathe! *cough*"
21040-151 = "I had no choice. I couldn't leave her there with all those scary robots..."
21040-153 = "*munch*"
21040-154 = "Ah! That's my console! Don't put that in your mouth! Spit it out!"
21040-155 = "We couldn't leave her all alone."
21040-157 = "I know that..."
21040-158 = "...but shouldn't we submit a report about her to the General Student Council or Valkyrie?"
21040-159 = "We can't do that. Not until our task is all done."
21040-160 = "What do you mean \"task\"?"
21040-161 = "Hmm. First, we should give her a name. How does \"Aris\" sound?"
21040-164 = "Please confirm Aris as the designated name for this unit."
21040-165 = "W-Wait! You said her name was AL-1S. Where did you get \"Aris\" from?"
21040-166 = "Eh. The other thing would take too long to say, and it's not cute enough. Trust me—a dev knows best. What do you think, Aris?"
21040-168 = "..."
21040-170 = "Confirmed."
21040-171 = "Unit designation: Aris."
21040-172 = "Hahaha! See? Do I know how to pick a cute name or what?"
21040-173 = "Well, as long as she's fine with it."
21040-175 = "Now, let's move on to the next step."
21040-177 = "You can't be serious. This isn't as simple as adopting a cat!"
21040-178 = "Think about it, Midori."
21040-179 = "Why did we risk our lives to get the G.BIBLE in the first place?"
21040-180 = "Huh? It was to make a good game so we can keep our club."
21040-181 = "Exactly."
21040-182 = "To keep our club, we have to meet one of two conditions."
21040-183 = "Making a good game and winning the Millennium Prize is just one of our options."
21040-184 = "But I thought you said it was the only way. After all, we've had no luck recruiting people to work on a retro game."
21040-185 = "Hold on..."
21040-186 = "Momoi. Don't tell me..."
21040-187 = "You're thinking of disguising her as a Millennium Student and having her join our club, aren't you?"
21040-189 = "Aris!"
21040-191 = "You're one of us now!"
21040-193 = "*munch*"
21040-194 = "That's my Game Girl Advance SP! It's the only 16-bit game console in Kivotos with an 8-core, 16-thread custom CPU capable of 8K resolution!"
21040-197 = "*sigh*"
21040-199 = "I hope this works out..."
21040-201 = "Next Episode;I, Aris..."

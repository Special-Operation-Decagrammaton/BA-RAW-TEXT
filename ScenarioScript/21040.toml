21040-72 = "(poke) (poke) Nothing. It's almost like she's dead."
21040-73 = "Don't say that! I don't think this is a corpse. Take a closer look."
21040-74 = "She doesn't look injured. More like...destroyed."
21040-75 = "Really? Come to think of it, I guess she does kind of look like a mannequin.#nLet's see..."
21040-78 = "(poke) Hmm. Her skin is so soft. Oh, there are some letters here."
21040-79 = "AL-IS..."
21040-80 = "What's that supposed to mean? Is it supposed to be her name?"
21040-81 = "How would you pronounce that?"

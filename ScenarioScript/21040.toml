[translation]
21040-1 = "第4話;私たちはあの日、少女に出会った"
21040-2 = "？？？"
21040-3 = "あれ……？"
21040-4 = "あのロボットたち、急に追ってこなくなった……？"
21040-5 = "この工場に入るまでは、恐ろしい勢いで向かってきたのに。"
21040-6 = "何でか分かんないけど、とにかくラッキ～、で良いのかな？"
21040-7 = "良くないよ！うわあああん！もういや！いったいなんでこんなところで、ロボットたちに追われなきゃいけないの！"
21040-8 = "落ち着いて、ミドリ。生きてればいつか良い日も来るよ。"
21040-9 = "今日の話をしてるの！そもそもお姉ちゃんのせいでしょ！！"
21040-10 = "とにかく……本当にここ、何をするところなんだろ。"
21040-11 = "連邦生徒会は、あのロボットたちがいるから出入りを制限してたのかな？"
21040-12 = "あのロボットたち、実は連邦生徒会が非常時に使うための秘密兵器で……とかは考えてみたけど、"
21040-13 = "そういうのじゃない気がするし……何なんだろ。"
21040-14 = "うーん、何か引っかかってるんだよね……大事なことを見落としてるっていうか、それに……"
21040-15 = "接近を確認。"
21040-16 = "えっ、な、なに？"
21040-17 = "部屋全体に、音が響いてる……？"
21040-18 = "対象の身元を確認します。[ruby=さいば]才羽[/ruby]モモイ、資格がありません。"
21040-19 = "え、え！？何で私のこと知ってるの？"
21040-20 = "対象の身元を確認します。[ruby=さいば]才羽[/ruby]ミドリ、資格がありません。"
21040-21 = "私のことも……一体どういう……？"
21040-22 = "対象の身元を確認します……「[USERNAME]先生」。"
21040-23 = "……。"
21040-24 = "あれ？"
21040-25 = "資格を確認しました、入室権限を付与します。"
21040-26 = "えぇっ！？"
21040-27 = "え、どういうこと！？先生はいつこの建物と仲良しになったの！？"
21040-28 = "当の先生も戸惑ってるみたいだけど……。"
21040-29 = "才羽モモイ、才羽ミドリの両名を、先生の「生徒」として認定、同行者である「生徒」にも資格を与えます。承認しました。"
21040-30 = "下部の扉を開放します。"
21040-31 = "……下部の扉？この目の前の扉じゃなくて？"
21040-32 = "それより、下部ってもしかして……。"
21040-33 = "さすがに違うでしょ。どこからどう見てもただの床――"
21040-34 = "（ガチャン）"
21040-35 = "ゆ、床が無くなっ……落ちるっ！？"
21040-36 = "うわわわっ！"
21040-39 = "お姉ちゃん！先生！きゃあぁぁっ！"
21040-41 = "……"
21040-44 = "うーん……。"
21040-45 = "あれっ、お姉ちゃん？先生！？"
21040-46 = "いやー、流石に死ぬかと思った……。"
21040-47 = "お姉ちゃん大丈夫？あれ、先生はいったいどこに……。"
21040-48 = "[s] \"[ruby=ここ]ふぉふぉ[/ruby]に……。\""
21040-49 = "ひゃぁっ！？な、なっ、なんで！？どうして私たちの下にいるんですか！！？"
21040-50 = "どうしてって……落ちる時とっさに先生が、私たちのクッションになってくれたからでしょ。"
21040-51 = "あっ、ご、ごめんなさい……びっくりしちゃって、てっきり先生に「そういう趣味」があるのかと……。"
21040-52 = "いや、今の言葉に対しても、もう一度謝った方が良いと思うけど……。"
21040-53 = "とにかく先生、大丈夫？"
21040-54 = "[s1] \"もちろん、二人が無事でよかった。\"\n[s2] \"損して得取れって言葉があってね……。\""
21040-55 = "と、とにかく……ありがとうございます、助けてくれて。"
21040-56 = "と、とにかく……ありがとうございます、助けてくれて。"
21040-57 = "そんなに深いところまで落ちたわけじゃないみたいだけど……ん？"
21040-58 = "……。"
21040-59 = "……えっ！？"
21040-60 = "ん……？どうしたのお姉ちゃん……？"
21040-62 = "えっ……！？"
21040-69 = "お、女の子？"
21040-70 = "この子……眠ってるのかな？"
21040-72 = "……返事がない、ただの死体のようだ。"
21040-73 = "不謹慎なネタ言わないで！それに死体っていうか……ねえ、見て。"
21040-74 = "この子、怪我とかじゃなくて……「電源が入ってない」みたいな感じがしない？"
21040-75 = "そう？確かに言われてみれば、何だかマネキンっぽいね。どれどれ……"
21040-78 = "すごい、肌もしっとりしてるし柔らかい……あれ？ここに何か、文字が書かれてる。"
21040-79 = "……AL-IS……。"
21040-80 = "……アル、イズ……エー、エル、アイ、エス？どう読むのか分からないけど、この子の名前？"
21040-81 = "……アリス？"
21040-82 = "ちょっと待って、これよく見ると全部ローマ字なわけじゃなくて……AL-1S、じゃない？"
21040-83 = "え、そう？"
21040-85 = "いったいこの子は……それにこの場所、いったい何なんだろう？"
21040-86 = "この子に聞いた方が早いんじゃない？"
21040-87 = "起きて、話してくれるなら良いんだけど……とりあえずこのままじゃ可哀そうだし、服でも着せてあげよっか。"
21040-88 = "へえ、予備の服なんて持ってきてたんだ……ってそれ私のパンツじゃん！"
21040-89 = "違うよ、これは私の。猫ちゃんの表情が違うでしょ。"
21040-94 = "……よし。これでいいかな。"
21040-95 = "（ピピッ、ピピピッ）"
21040-96 = "ん？"
21040-97 = "な、何この音！？"
21040-98 = "警報音みたいだけど……もしかして近くにロボットが？"
21040-99 = "ううん……「この子」から聞こえた気がする。"
21040-100 = "え？ま、まさか……。"
21040-102 = "状態の変化、および接触許可対象を感知。休眠状態を解除します。"
21040-106 = "……"
21040-107 = "め、目を覚ました……？"
21040-109 = "……"
21040-111 = "状況把握、難航。"
21040-113 = "会話を試みます……説明をお願いできますか。"
21040-114 = "え、えっ？せ、説明？なんのこと？"
21040-115 = "せ、説明が欲しいのはこっちの方！あなたは何者？ここは一体なんなの！？"
21040-117 = "本機の自我、記憶、目的は消失状態であることを確認。データがありません。"
21040-118 = "ど、どういうこと……？い、いきなり攻撃してきたりしないよね？"
21040-120 = "肯定。接触許可対象への遭遇時、本機の敵対意思は発動しません。"
21040-121 = "うわ、すごい。ロボットの市民ならキヴォトスによくいるけど、こんなに私たちに似てるロボットなんて初めて。"
21040-124 = "うーん……先生、どうしましょう？"
21040-125 = "[s3] \"「接触許可対象」って、どういう意味か教えてくれる？\"\n[s4] \"あなたは誰？ここはどこ？\""
21040-127 = "回答不可、本機の深層意識における第一反応が発生したものと推定されます。"
21040-129 = "回答不可、本機の深層意識における第一反応が発生したものと推定されます。"
21040-131 = "深層意識って、何のこと……？"
21040-132 = "うーん……。"
21040-133 = "工場の地下、ほぼ全裸の女の子、おまけに記憶喪失……"
21040-134 = "ふふっ、良いこと思いついちゃった。"
21040-135 = "いや……今の言葉の羅列からは、嫌なことしか思い当たらないんだけど……。"
21040-140 = "？？？"
21040-142 = "ミレニアム・ゲーム開発部"
21040-145 = "？？？"
21040-147 = "ねえ、ちょっと！？"
21040-148 = "この子を部室にまで連れてきてどうするの！"
21040-150 = "うっ、首絞めないでって！苦しっ、ゲホッ、ゲホッ！"
21040-151 = "し、仕方ないじゃん。そもそもあんな恐ろしいロボットたちがいる場所に置いていくわけにも……"
21040-153 = "（モグモグ）"
21040-154 = "ああっ、私のWeeリモコンを口に入れないで！ペッてして！ペッて！"
21040-155 = "……やっぱり、放っておくわけにはいかないでしょ。"
21040-157 = "それはそうだけど……。"
21040-158 = "今からでも、連邦生徒会かヴァルキューレ辺りに連絡した方が良くない？"
21040-159 = "それはそうだけど……それは[ruby=・・]まだ[/ruby]。私たちのやるべきことが終わった後にね。"
21040-160 = "やるべきこと？"
21040-161 = "さて、とりあえず名前は必要だよね。「アリス」って呼ぼうかな。"
21040-164 = "……本機の名称、「アリス」。確認をお願いします。"
21040-165 = "ちょ、ちょっと待って！それお姉ちゃんが勝手に読んだ名前でしょ！？本当ならAL-1Sちゃんなんじゃないの？"
21040-166 = "そんなに長いと呼びにくいじゃん。どう、アリス？気に入った？"
21040-168 = "……"
21040-170 = "……肯定。"
21040-171 = "本機、アリス。"
21040-172 = "あはは！ほら、見たか私のネーミングセンス！"
21040-173 = "うーん……本人が気に入ってるならいいけど。"
21040-175 = "さあ、それじゃ次のステップに行ってみよっか。"
21040-177 = "お姉ちゃん、いったい何を考えてるの……？子猫を拾ってきたとか、そういうレベルじゃないんだからね！？"
21040-178 = "ミドリの方こそ、よく考えてみてよ。"
21040-179 = "そもそも私たちが危険を冒してまで、G.Bibleを探してた理由は何だったっけ？"
21040-180 = "それは……良いゲームを作って、部活を廃部にさせないためでしょ？"
21040-181 = "そう、今一番大事な問題はそれ。"
21040-182 = "良いゲームも作りたいけど、まずは部活の維持が最優先。それで、そのためには二つの条件のうち、どっちかをクリアする必要がある。"
21040-183 = "ミレニアムプライスで受賞を狙うのは、あくまでその内の一つに過ぎない。"
21040-184 = "あくまでも何も、方法は実際のところ一つしか無いでしょ？お姉ちゃんがそう言ったんじゃん、だってこれ以上「部員を増やす」のは無理……"
21040-185 = "……あれ？"
21040-186 = "お、お姉ちゃん、まさかとは思うけど……"
21040-187 = "この子をミレニアムの生徒に偽装して、うちの部に入れようとしてるんじゃ……！？"
21040-189 = "アリス！"
21040-191 = "私たちの仲間になって！"
21040-193 = "（ガリガリ……）"
21040-194 = "ああっ！私の「ゲームガールズアドバンスSP」食べちゃダメっ！8コア16スレッドカスタムCPUに8K解像度を誇る、キヴォトス唯一の16bitゲーム機なんだよ！？"
21040-197 = "ああもう……。"
21040-199 = "だ、大丈夫なのかな……。"
21040-201 = "次回;私はアリスです"

21040-49 = "Aaaah! Wh-What are you doing down there?!"
21040-50 = "What do you mean? Be grateful Sensei broke our fall."
21040-51 = "O-Oh. I guess I was so frazzled that I jumped to conclusions."
21040-52 = "I think you owe Sensei an apology for that one."
21040-53 = "Are you okay?"

[translation]
21040-1 = "第4話;那天，我們與少女相遇了"
21040-2 = "？？？"
21040-3 = "咦……？"
21040-4 = "那些機器人，突然就不追過來了……？"
21040-5 = "明明在進入工廠之前都還用恐怖的氣勢追著我們的說。"
21040-6 = "雖然不知道為什麼，總之真是Lucky～這樣想就好了吧？"
21040-7 = "才不好咧！嗚哇啊啊啊！我受不了了！#n我們到底為什麼非得在這種地方被機器人給追著跑不可呢！"
21040-8 = "冷靜點，綠。只要還活著，好日子總有一天會到來的。"
21040-9 = "我是在說今天的事啊！說到底這都是姐姐你的錯吧！！"
21040-10 = "話說回來……這裡是用來做什麼的呢。"
21040-11 = "聯邦學生會是因為有那些機器人才會限制這裡的進出嗎？"
21040-12 = "那些機器人，難道是聯邦學生會為了非常時期而準備的祕密武器……"
21040-13 = "想想好像也不太對……到底是什麼呢。"
21040-14 = "唔嗯──總覺得很在意呢……好像漏掉了某個很重要的東西，而且……"
21040-15 = "確認到有人接近。"
21040-16 = "咦，怎，怎麼了？"
21040-17 = "整個房間裡都響起了聲音……？"
21040-18 = "確認對象身分。才羽桃井，資格不符。"
21040-19 = "咦，咦！？為什麼知道我的事？"
21040-20 = "確認對象身分。才羽綠，資格不符。"
21040-21 = "我也是……這到底是……？"
21040-22 = "確認對象身分……「[USERNAME]老師」。"
21040-23 = "……"
21040-24 = "嗯？"
21040-25 = "已確認資格，授予進入權限。"
21040-26 = "咦！？"
21040-27 = "這，這是怎麼回事！？老師什麼時候跟這個建築物打好關係了！？"
21040-28 = "老師好像也很困惑呢……"
21040-29 = "才羽桃井、才羽綠兩人，認定為老師的「學生」。#n作為同行的「學生」同樣授予資格。已承認資格。"
21040-30 = "開放下方的門。"
21040-31 = "……下方的門？不是面前的這個門？"
21040-32 = "比起這個，下方指的不會是……"
21040-33 = "再怎麼樣都不可能吧。不管怎麼看這都只是普通的地──"
21040-34 = "（喀嚓）"
21040-35 = "地，地板不見……要掉下去了！？"
21040-36 = "嗚哇哇啊！"
21040-39 = "姐姐！老師！呀啊啊！"
21040-41 = "……"
21040-44 = "唔嗯……"
21040-45 = "咦？姐姐？老師！？"
21040-46 = "哎呀──還以為死定了呢……"
21040-47 = "姐姐你沒事嗎？奇怪，老師跑到哪去了……"
21040-48 = "[s] 「[ruby=我　在]呃啊呃啊[/ruby]這裡……」"
21040-49 = "呀啊！？為，為，為什麼！？為什麼會在我們下面！！？"
21040-50 = "還能為什麼……肯定是掉下來的時候，老師用身體當我們的緩衝墊了吧。"
21040-51 = "啊，對，對不起……我剛才嚇了一跳，還以為老師有「那種興趣」……"
21040-52 = "呃，我覺得你應該再為剛才的話道歉一次比較好……"
21040-53 = "總之老師，你還好嗎？"
21040-54 = "[s1] 「當然，你們兩個沒事真是太好了。」\n[s2] 「有句話說吃虧就是占便宜嘛……」"
21040-55 = "總，總之……非常感謝老師救了我們。"
21040-56 = "總，總之……非常感謝老師救了我們。"
21040-57 = "看起來好像也不是掉到了很深的地方……嗯？"
21040-58 = "……"
21040-59 = "……咦！？"
21040-60 = "嗯……？怎麼了姐姐……？"
21040-62 = "咦……！？"
21040-69 = "女，女孩子？"
21040-70 = "這孩子……睡著了嗎？"
21040-72 = "……沒有回應，就像屍體一樣。"
21040-73 = "不要亂講話！與其說是屍體……你看那邊。"
21040-74 = "這孩子不是受了傷之類的……比較像是「沒開電源」的感覺？"
21040-75 = "是嗎？聽你這麼一說，好像有點像人偶的感覺？我來看看……"
21040-78 = "好厲害，皮膚濕潤又柔軟……咦？這裡好像寫了些什麼字。"
21040-79 = "……AL-IS……"
21040-80 = "……阿魯，以斯……欸，耶魯，唉依，欸斯？不知道該怎麼唸呢，這是他的名字嗎？"
21040-81 = "……愛麗絲？"
21040-82 = "等等，仔細看的話好像不全都是羅馬字……AL-1S，是這樣嗎?"
21040-83 = "咦？是嗎？"
21040-85 = "這個孩子究竟是……而且這裡到底是什麼地方呀？"
21040-86 = "問這個孩子可能更快吧？"
21040-87 = "要是他能醒過來告訴我們就好了……#n總之就這樣放他在那裡太可憐了，先幫他穿上衣服吧。"
21040-88 = "嘿，你還有帶備用的衣服來啊……等等那不是我的內褲嗎！"
21040-89 = "不是，這是我的。上面貓咪的表情不一樣吧。"
21040-94 = "……好了，這樣就可以了吧。"
21040-95 = "（嗶嗶，嗶嗶嗶）"
21040-96 = "嗯？"
21040-97 = "什，什麼聲音！？"
21040-98 = "聽起來像是警報聲……難道附近有機器人嗎？"
21040-99 = "唔嗯……感覺是「這孩子」發出來的。"
21040-100 = "咦？難，難道說……"
21040-102 = "感知到狀態變化以及允許接觸的對象。解除休眠狀態。"
21040-106 = "……"
21040-107 = "你，你醒了嗎……？"
21040-109 = "……"
21040-111 = "情況掌握，困難。"
21040-113 = "嘗試對話……能請你們說明嗎。"
21040-114 = "咦，咦？說，說明？說明什麼？"
21040-115 = "需，需要說明的是我們才對！你是誰？這裡到底是什麼地方！？"
21040-117 = "已確認本機的自我、記憶、目的皆為消失狀態。沒有任何資料。"
21040-118 = "怎，怎麼回事……？你，你不會突然攻擊我們吧？"
21040-120 = "同意。遭遇允許接觸對象時，本機將不發動敵對意識。"
21040-121 = "哇，真厲害。#n雖然奇普托斯也有很多機器人市民，但和我們這麼像的機器人我還是第一次見到。"
21040-124 = "嗯……老師，該怎麼辦呢？"
21040-125 = "[s3] 「『允許接觸對象』是什麼意思，可以告訴我嗎？」\n[s4] 「你是誰？這裡是哪裡呢？」"
21040-127 = "不可回答，推測這是由本機的深層意識產生的第一反應。"
21040-129 = "不可回答，推測這是由本機的深層意識產生的第一反應。"
21040-131 = "深層意識，是指什麼……？"
21040-132 = "唔嗯……"
21040-133 = "工廠的地下，幾乎全裸的女孩子，再加上喪失記憶……"
21040-134 = "呵呵，想到好的點子了。"
21040-135 = "呃……聽你剛剛說的那些，我只能想到不好的東西……"
21040-140 = "？？？"
21040-142 = "千年．遊戲開發部"
21040-145 = "？？？"
21040-147 = "喂，等等！？"
21040-148 = "你把這孩子帶進社團活動室是想做什麼！"
21040-150 = "嗚，別勒我的脖子！好難受，咳，咳！"
21040-151 = "我，我也沒辦法啊。總不能把她丟在有那些恐怖機器人的地方不管……"
21040-153 = "（嚼嚼）"
21040-154 = "啊啊，不要把我的Wee手把放到嘴巴裡！吐出來！快吐！"
21040-155 = "……果然，不能放著不管吧。"
21040-157 = "這麼說也沒錯啦……"
21040-158 = "就算是現在也沒關係，還是通知一下聯邦學生會或是女武神比較好吧？"
21040-159 = "這麼說也沒錯……但不是[ruby= ・     ・ ]現在[/ruby]。而是在我們該做的事情做完之後。"
21040-160 = "該做的事？"
21040-161 = "那麼，總之還是需要一個名字吧。就叫她「愛麗絲」吧。"
21040-164 = "……本機的名稱為「愛麗絲」。請確認。"
21040-165 = "等，等一下！那是姐姐自己隨意唸的名字吧！？#n本來應該是叫「AL-1S醬」之類的才對吧？"
21040-166 = "名字這麼長的話很難唸嘛。怎麼樣，愛麗絲？你喜歡這個名字嗎？"
21040-168 = "……"
21040-170 = "……給予肯定。"
21040-171 = "本機為，愛麗絲。"
21040-172 = "啊哈哈！你看，見識到我的命名品味了吧！"
21040-173 = "嗯……如果本人喜歡的話那也沒關係。"
21040-175 = "那麼，我們就進行下一階段吧。"
21040-177 = "姐姐，你到底在想什麼呀……？這可不是撿到了小貓這種等級的事啊！？"
21040-178 = "綠你才是，你好好想想吧。"
21040-179 = "我們之所以冒著危險也要尋找G.Bible的理由是什麼？"
21040-180 = "那是……為了要做出好的遊戲，不讓社團被廢社吧？"
21040-181 = "沒錯，現在最重要的就是這個。"
21040-182 = "好的遊戲當然也想做，但是把社團維持下去才是最優先的。#n所以說在兩個條件裡，至少得完成一個才行。"
21040-183 = "在千年大賞裡得獎，不過只是其中一個選項而已。"
21040-184 = "說什麼「不過」，實際上選項只有一個而已呀？#n姐姐你不也說過了嗎，要「增加社員」是行不通……"
21040-185 = "……咦？"
21040-186 = "姐，姐姐，難道說……"
21040-187 = "你想把這孩子偽裝成千年的學生，然後讓她加入我們的社團……！？"
21040-189 = "愛麗絲！"
21040-191 = "成為我們的夥伴吧！"
21040-193 = "（嘎吱嘎吱……）"
21040-194 = "啊啊！不可以吃掉我的GameGirlsAdvanceSP！#n這可是有8核16緒的客製CPU和8K超高解析度，奇普托斯唯一的16bit遊戲機啊！？"
21040-197 = "啊啊真是的……"
21040-199 = "真，真的沒問題嗎……"
21040-201 = "下一話;我叫愛麗絲"

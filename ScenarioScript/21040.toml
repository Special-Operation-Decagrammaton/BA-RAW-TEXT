21040-85 = "Who is this girl? And what's this place supposed to be?"
21040-86 = "Maybe we should ask her."
21040-87 = "If she wakes up, that is. Let's give her some clothes first. I feel bad leaving her like this."
21040-88 = "Wow, you really did bring an extra change of clothes. Wait! That's my underwear!"
21040-89 = "No, they're mine. The kitty face on the front is different."
21040-94 = "*rustle* Okay. All done."
21040-95 = "*be-beep beep*"
21040-96 = "Huh?"
21040-97 = "What was that noise?!"
21040-98 = "It sounded like some kind of alarm... Are there any robots nearby?"
21040-99 = "No... I think it came from her."
21040-100 = "What? Could it be...?"
21040-102 = "Status update. Contact with approved subject detected. Dormant state deactivated."
21040-106 = "..."

[translation]
21040-1 = "Episode 4;On That Day, We Met a Girl"
21040-2 = "???"
21040-3 = "What the...?"
21040-4 = "Why aren't the robots still chasing us?"
21040-5 = "They were hot on our heels right up until we entered the factory!"

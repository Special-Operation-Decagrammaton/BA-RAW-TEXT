[translation]
41170-1 = "ตอน 17;ปฏิบัติการโคลเวอร์ 1"
41170-4 = "ทางเดินในอาคารส่วนกลาง สถาบันฝึกตำรวจวัลคิรี่"
41170-10 = "นี่คือ RABBIT 1 ขณะนี้เวลา 23:30 น. ฉันมาถึงจุดเอโค่แล้วค่ะ"
41170-11 = "จากการตรวจสอบไม่พบเวรยามที่คุ้มกันบริเวณนี้อยู่ แต่ตรวจพบสัญญาณอิเล็กทรอนิกส์ที่คาดว่าจะ#nเป็นอุปกรณ์ถ่ายภาพวงจรปิดในทางเดินฝั่งตรงข้ามค่ะ"
41170-12 = "นี่คือ RABBIT ในค่าย มีกล้องวงจรปิดจำนวนมากในทางเดินฝั่งตรงข้าม แต่ฉันแฮ็กระบบและได้สิทธิ์#nควบคุมกล้องมาสดๆ ร้อนๆ เลย"
41170-13 = "ดูจากหน้าจอแล้วไม่พบตำรวจที่กำลังเฝ้ายามอยู่ในบริเวณนั้น เข้าไปที่จุดเซียร์ร่าได้เลย"
41170-14 = "แฮ็กระบบวงจรปิดได้ในเวลาแค่นิดเดียวเอง! โมเอะจังนี่ยอดไปเลย...!"
41170-15 = "ฮิฮิฮิ เรื่องแค่นี้มันของกล้วยๆ น่ะ"
41170-16 = "แต่ว่า... เซิร์ฟเวอร์จะติดโค้ดสุ่มตัวเลขที่เปลี่ยนทุกๆ 30 นาที หลังจากนั้นฉันว่าน่าจะควบคุมลำบาก ขอโทษด้วยนะ... แต่ช่วยทำปฏิบัติการให้เสร็จภายใน 30 นาทีได้ไหม?"
41170-17 = "ต้องเป็นฝีมือของรองหัวหน้าหรือใครในเวอริทัสแน่ๆ เบื่อจริงๆ เลยพวกนี้"
41170-18 = "แต่ที่นี่คืออาคารส่วนกลางที่เลื่องชื่อของสถาบันฝึกตำรวจวัลคิรี่เลยนะ ทำไมถึงไม่มีเวรยามมา#nลาดตระเวนเลยล่ะ?"
41170-19 = "ไม่ได้ยินที่ฉันบอกไปเมื่อกี๊เหรอไง? ฉันแฮ็กระบบกล้องตรวจจับกับอุปกรณ์เตือนภัยหมดแล้ว!"
41170-20 = "ฉันไม่ได้หมายถึงเธอสักหน่อย ฉันหมายถึงสำนักความมั่นคงจอมขี้เกียจที่ออกลาดตระเวนเพราะเชื่อ#nในกล้องตรวจจับอย่างเดียวต่างหากเล่า"
41170-21 = "เป็นศัตรูที่น่าสมเพชชะมัด เพราะอย่างนี้ไงฉันถึงไม่อยากย้ายไปเรียนในสถาบันฝึกตำรวจวัลคิรี่"
41170-22 = "เอาเถอะ จุดเซียร์ร่าที่บันทึกการซื้อขายของกรมความมั่นคงสาธารณะ ไม่สิ... จุดที่มีโคลเวอร์อยู่ที่ชั้น 3 ใช้บันไดทางฝั่งตะวันตกไปนะ"
41170-23 = "อย่างที่บอกไปว่าฉันควบคุมกล้องและระบบเตือนภัยได้แค่ 30 นาที เพราะฉะนั้นรีบกลับมาที่จุดนัดพบ#nก่อนหน้านั้นนะ!"
41170-28 = "RABBIT 1 ทราบ"
41170-29 = "ว่าแต่คุณครูไม่ได้มาทำปฏิบัติการครั้งนี้กับเราเหรอคะ?"
41170-30 = "ไม่ได้มาหรอกค่ะ ครั้งนี้เป็นการแทรกซึมอย่างลับๆ ที่ต้องใช้การกระโดดร่มทางยุทธวิธีนี่คะ คุณครูไม่#nเคยผ่านการฝึกฝนมาก่อนอาจจะเกิดอันตรายได้ เลยขอให้คุณครูช่วยสนับสนุนอยู่เบื้องหลังแทนค่ะ"
41170-31 = "อีกอย่างเราอาจจะตกไปในจุดที่มีระเบิดจนต้องหนีออกจากจุดปฏิบัติการก็ได้..."
41170-32 = "[s1] \"ขอโทษนะ\"\n[s2] \"ถ้าให้กระโดดร่มครูไม่น่าไหว\""
41170-33 = "ช่างเถอะ ครั้งนี้พวกเราจะลุยกันเอง ที่ผ่านมาเราก็จัดการกันเองอยู่แล้วนี่"
41170-34 = "ช่างเถอะ ครั้งนี้พวกเราจะลุยกันเอง ที่ผ่านมาเราก็จัดการกันเองอยู่แล้วนี่"
41170-35 = "ชะ... ใช่ นี่คือสิ่งที่พวกเราทำด้วยกันมาตลอด..."
41170-36 = "พวกเรา... ด้วยกัน..."
41170-37 = "ทำไมจู่ๆ ก็ทำหน้าแบบนั้นล่ะมิยาโกะ มีเรื่องอะไรเหรอ?"
41170-38 = "มะ... ไม่มีอะไรหรอกค่ะ ฉันกำลังคิดถึงปฏิบัติการอยู่น่ะค่ะ"
41170-42 = "เอาละทุกคน แทรกซึมเข้าไปอย่างลับๆ ให้ถึงจุดเซียร์ร่านะคะ ระวังตัวด้วยค่ะ!"
41170-47 = "ที่นี่คือห้องเก็บบันทึกที่มีเอกสารทั้งหมดของสถาบันฝึกตำรวจวัลคิรี่..."
41170-48 = "พอเป็นห้องเก็บหลักฐานเกี่ยวกับอาชญากรรมต่างๆ ก็เลยถูกปิดกั้นด้วยประตูเหล็กที่แข็งแรงเลยค่ะ"
41170-50 = "แข็งแรงแล้วยังไง ไม่เห็นจะมียามยืนเฝ้าเลย"
41170-51 = "แต่ก็ดีแล้วละ ปฏิบัติการของเราจะได้สะดวกขึ้น"
41170-52 = "จะว่าไป นี่เรารออะไรกันอยู่เหรอ? ทำไมไม่รีบเข้าไปล่ะ?"
41170-53 = "คือว่า... ประตูเหล็กนี้เหมือนจะเปิดปิดด้วยสัญญาณอิเล็กทรอนิกส์เท่านั้น..."
41170-54 = "ตอนนี้โมเอะน่าจะกำลังตั้งใจถอดสัญญาณจากทางไกลอยู่นะ"
41170-55 = "ว่าไงนะ? ถ้าต้องนับเวลารอด้วย ก็ต้องให้เวลาเรามากกว่า 30 นาทีสิ"
41170-60 = "อย่ามารบเร้าน่า! ฉันก็กำลังรีบอยู่นะ"
41170-61 = "ชิ... เราเจาะประตูด้วยปืนลูกซองหรือระเบิดเลยไม่ได้รึไง?"
41170-62 = "ถ้าคิดว่าจะเจาะเหล็กหนาๆ ได้ก็ลองเองเลยสิ"
41170-63 = "อีกอย่างถ้านักเรียนทั้งหมดของสถาบันฝึกตำรวจวัลคิรี่ตื่นขึ้นมา เธอจะรับผิดชอบไหมล่ะ?"
41170-67 = "อืม... ถ้าติดตั้งโปรแกรมถอดรหัสด้วยซีเคร็ตคีย์ที่ได้มาจากเพลนเท็กซ์ละก็..."
41170-73 = "ได้แล้ว!"
41170-79 = "ใช้เวลาตั้ง 3 นาทีเลยนะ..."
41170-80 = "นี่ฉันก็รีบเท่าที่จะรีบได้แล้วนะ!"
41170-81 = "ถ้าไม่พอใจก็เจาะประตูเองเลยสิ!"
41170-83 = "นี่ไม่ใช่เวลาจะมาทะเลาะกันนะคะทุกคน"
41170-84 = "เราเหลือเวลาอีกไม่มากแล้วก่อนที่ระบบรักษาความปลอดภัยจะกลับมาทำงานใหม่อย่างที่โมเอะบอก#nนะคะ"
41170-85 = "ช่วยกันหาหลักฐานเงินคืนที่ผิดกฎหมายของกรมความมั่นคงสาธารณะในห้องเก็บเอกสารก่อนเถอะค่ะ"
41170-86 = "ก็ได้..."
41170-87 = "ฉันจะหาจากชั้นหนังสือทางขวานี้ก่อน"
41170-93 = "งืออ... ไม่ชอบที่มืดๆ เลย..."
41170-100 = "ไหนดูซิ..."
41170-101 = "เอกสารการซื้อขายของกรมความมั่นคงสาธารณะ..."
41170-106 = "ใบเสร็จที่ออกโดย <ไคเซอร์ อินดัสทรี> เมื่อสัปดาห์ก่อนงั้นเหรอ..."
41170-110 = "เจอแล้ว!"
41170-115 = "ดีมากค่ะซากิ ขอฉันดูใบเสร็จหน่อยได้ไหมคะ?"
41170-120 = "อืม... เป็นอย่างนี้จริงด้วยนะคะ"
41170-124 = "คุณครูคะ เจอ <โคลเวอร์> แล้วค่ะ! เราได้หลักฐานเงินคืนผิดกฎหมายระหว่าง <ไคเซอร์ อินดัสทรี> กับกรมความมั่นคงสาธารณะมาแล้วค่ะ"
41170-125 = "กรมความมั่นคงสาธารณะสัญญาว่าจะขับไล่คนไร้บ้านออกจากโคะอุซางิ ทาวน์ และได้รับอาวุธมาจาก <ไคเซอร์ อินดัสทรี> อย่างที่คุณครูพูดเลยค่ะ"
41170-126 = "[s3] \"เดาถูกจริงๆ ด้วย\"\n[s4] \"ทุกคนทำได้ดีมาก!\""
41170-127 = "แค่มีเอกสารตัวนี้ เราก็หยุดยั้งแผนการร้ายของกรมความมั่นคงสาธารณะกับไคเซอร์กรุ๊ปได้แล้วค่ะ"
41170-128 = "แค่มีเอกสารตัวนี้ เราก็หยุดยั้งแผนการร้ายของกรมความมั่นคงสาธารณะกับไคเซอร์กรุ๊ปได้แล้วค่ะ"
41170-129 = "ทำมาอวดเก่งนะพวกกรมความมั่นคงสาธารณะ... สมน้ำหน้า!"
41170-137 = "หืม? ทำอะไรอยู่หน้าประตูน่ะมิยุ?"
41170-138 = "คะ... คือว่า... ปะ... ประตูมันปิด..."
41170-139 = "จะกลัวอะไรล่ะ ประตูปิดก็เปิดใหม่สิ"
41170-140 = "คะ... คือว่า... ประตูนี้มัน..."
41170-141 = "ไม่มีที่เปิดจากข้างใน..."
41170-146 = "ว่าไงนะ?!"
41170-148 = "ตอนต่อไป;ปฏิบัติการโคลเวอร์ 2"

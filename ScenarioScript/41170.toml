[translation]
41170-1 = "Episode 17; Operation Clover 1"
41170-4 = "Valkyrie Police School Main Building Hallway"
41170-10 = "RABBIT 1, reporting. Time is 2330 hours. I've arrived at Point Echo."
41170-11 = "Guard presence has not yet been confirmed, but several electronic signals presumed to be CCTV devices have been detected in the opposite hallway."
41170-12 = "This is Camp RABBIT. Affirmative. There were CCTVs there, but I've already took over them. Heehee."
41170-13 = "I'm monitoring the video feeds for you, so you're clear to make your way to Point Sierra. Not a guard in sight."
41170-14 = "W-Wow! You hacked it so fast, Moe!"
41170-15 = "Teeheehee! Bypassing this level of security is easier than blowing up a building."
41170-16 = "...Mostly. The server has a randomized numerical code that changes every thirty minutes, so I can't promise anything beyond that. You either finish in that time frame or it's a bust."
41170-17 = "The code has the vice president of Veritas written all over it. What a pill."
41170-18 = "But this is the main building of Valkyrie Police School. How can there not be a single guard on patrol?"
41170-19 = "Do you have earwax or something? I told you, I disabled the cameras and alarms!"
41170-20 = "I wasn't talking about you, all right? I just can't believe their lax security and overreliance on technology."
41170-21 = "I find it undisciplined and pathetic. It's the exact embodiment of why I didn't want to attend this school."
41170-22 = "We get it, Little Miss Perfect. The Public Peace Bureau's ledger, I mean, the Clover is located at Point Sierra, on the third floor of the basement. Make your way to the west stairs. Route still clear."
41170-23 = "And to emphasize, I can only keep the alarms disabled for thirty minutes. You dummies better be back at the rendezvous point by then."
41170-28 = "RABBIT 1, understood."
41170-29 = "Umm, wh-where's Sensei?"
41170-30 = "Since we had to rappel down from such a high altitude to be able to infiltrate undetected, it would've been dangerous for Sensei to attempt it with no training. So they'll be supporting from the rear."
41170-31 = "And we couldn't risk a hostile bulldozing their way through the line of fire and harming Sensei..."
41170-32 = "[s1] \"You found out my deep dark secret. I'm scared of heights.\"\n[s2] \"I have many skills, but rappelling is not one of them.\""
41170-33 = "We have no choice but to carry out this mission on our own. That's how it's always been, anyways."
41170-34 = "We have no choice but to carry out this mission on our own. That's how it's always been, anyways."
41170-35 = "Th-That's right... We've always p-pulled through with just us..."
41170-36 = "Just us..."
41170-37 = "Why the long face, Miyako? What's wrong?"
41170-38 = "Ah, nothing. Just reviewing the plan."
41170-42 = "Okay, RABBIT Squad. Don't let your guard down and watch each other's backs. We're moving to Point Sierra."
41170-47 = "Th-This is the archive room of all their d-documents..."
41170-48 = "It's not surprising it's secured by a solid steel door. Criminals will go to great lengths to hide evidence of their wrongdoings."
41170-50 = "Who cares about a big door? There's not a single guard in sight."
41170-51 = "I can't complain though. This operation has gone smoothly so far."
41170-52 = "Well, Miyako? Let's get going. We don't have much time."
41170-53 = "This isn't a normal lock. It can only be unlocked via an electronic signal."
41170-54 = "Moe is p-probably trying to crack the code..."
41170-55 = "What? Does this count towards our thirty-minute time limit?"
41170-60 = "I'm going as fast as I can, all right? Geez!"
41170-61 = "We don't have time. Can't we breach the door with explosives?"
41170-62 = "Yes. Please. Breach the solid steel door with explosives. Be my guest."
41170-63 = "Oh and just go ahead and wake up the entire student body while you're at it. What'll you do when that happens, you dummy musclehead?"
41170-67 = "Run the decoding program using the secret key I found through the plaintext..."
41170-73 = "We're in, ladies and ladies!"
41170-79 = "...That took over three minutes."
41170-80 = "Do you think I just have to sit here and wave a magic wand?"
41170-81 = "If it's so easy, why don't YOU try next time?"
41170-83 = "We don't have time for in-fighting."
41170-84 = "The security system will be live again soon."
41170-85 = "We need to prioritize finding the evidence that'll incriminate the Public Peace Bureau."
41170-86 = "You're right."
41170-87 = "I'll take the bookshelves on the right."
41170-93 = "I-I hate dark spaces..."
41170-100 = "Let's see..."
41170-101 = "Transaction logs... Transaction logs..."
41170-106 = "A receipt submitted by Kaiser Industries a week ago..."
41170-110 = "Jackpot!"
41170-115 = "Excellent work, Saki. Let me see."
41170-120 = "It seems Sensei was right."
41170-124 = "Sensei, the Clover has been secured."
41170-125 = "It's as you said. Kaiser Industries provided free weapons to the Public Peace Bureau in exchange for evicting Kousagi Town's entire homeless population."
41170-126 = "[s3] \"So my hunch was right.\"\n[s4] \"We've got what we need, then.\""
41170-127 = "Yes, this is exactly what we need to put a stop to this unjust conspiracy."
41170-128 = "Yes, this is exactly what we need to put a stop to this unjust conspiracy."
41170-129 = "Hahaha! I can't wait to stick it to those Public Peace Bureau goons!"
41170-137 = "Miyu, what are you doing in front of the door?"
41170-138 = "W-Well...i-it's closed..."
41170-139 = "Okay. Open it."
41170-140 = "Th...The thing is... The d-d-door..."
41170-141 = "There's no handle from the inside."
41170-146 = "WHAT?!"
41170-148 = "Next Episode; Operation Clover 2"

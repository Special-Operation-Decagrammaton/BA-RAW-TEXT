41170-10 = "3;미야코;05;여기는 RABBIT 1. 현재 시각은 2330시. 지금 막 포인트 에코에 도착했습니다.\n#3;em;[반응]"
41170-11 = "3;미야코;11;해당 위치를 지키고 있는 초병의 존재는 확인되지 않았으며, 맞은편 복도에서 폐쇄회로 영상 장치로 추측되는 다수의 전자기기 신호를 감지했습니다."
41170-12 = "1;통신모에;02;여기는 캠프 RABBIT. 맞은편 복도에 다수의 CCTV가 존재하는 건 사실이지만 방금 내가 해킹으로 제어권을 가져왔어.\n#1;a\n#3;m5"
41170-13 = "1;통신모에;03;화면으로 보니 그 근처에 경계 중인 경찰은 없는 것 같으니, 안심하고 포인트 시에라까지 진입해도 괜찮아."
41170-14 = "#3;hide\n5;미유ND;11;그 짧은 시간 내에 폐쇄회로를 해킹하다니…… 모에 쨩, 진짜 대단해……!\n#5;a"
41170-15 = "1;통신모에;00;쿠히히. 이 정도의 보안을 우회하는 일이야 간단하지.\n#1;em;[///]"
41170-16 = "1;통신모에;05;……그런데 미안하지만 서버에 30분 간격으로 바뀌는 난수 코드가 걸려 있어서 그 이후의 조작은 장담하기 어려울 것 같아. 작전은 30분 내로 끝내줘."
41170-17 = "1;통신모에;06;……이거 또 베리타스의 그 부부장인가 하는 녀석 짓이지? 진짜 지긋지긋하다니까."
41170-18 = "5;사키 헬멧;02;그래도 명색이 발키리 경찰학교의 본관인데, 순찰을 하는 경비도 없는 건가?\n#5;em;[?]\n#5;a"
41170-19 = "1;통신모에;05;방금 내가 한 소리를 뭐로 들은 거야? 감시 카메라와 경보 장치는 내가 무력화시켰다니까!\n#1;hophop"
41170-20 = "5;사키 헬멧;11;너한테 한 소리 아니야. 감시 카메라만 믿고 순찰을 게을리하는 경비국 녀석들에게 한 소리지."
41170-21 = "5;사키 헬멧;99;……적이지만 한심하군. 이래서 내가 발키리 경찰학교에 가고 싶지 않았던 거라니까."
41170-22 = "1;통신모에;02;여하튼, 공안국의 거래 장부— 아니, 클로버를 보관하고 있는 포인트 시에라는 지하 3층에 위치하고 있어. 통행량이 적은 서편 계단을 사용해.\n#1;em;[반응]\n#1;m3\n#5;dr"
41170-23 = "1;통신모에;05;……아까도 말했지만, 경보를 무력화할 수 있는 건 30분까지니까. 그전까지는 랑데부 포인트로 꼭 돌아와야 해!"

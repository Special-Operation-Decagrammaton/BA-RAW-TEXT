[translation]
41170-1 = "第17話;幸運草作戰（１）"
41170-4 = "女武神警察學園．走廊"
41170-10 = "這裡是RABBIT1，現在時刻2230。已抵[ruby=Ecco]達E地[/ruby]點。"
41170-11 = "沒有哨兵，確認對向走廊有多數疑似監視器的機器。"
41170-12 = "這裡是營地RABBIT。那些監視器已經駭入完成了，不用在意～"
41170-13 = "從畫面上來看，附近沒有警衛。安心前[ruby=Sierra]往S地[/ruby]點吧。"
41170-14 = "萌醬，還是一樣迅速……"
41170-15 = "咕嘻嘻，這種程度的保全輕輕鬆鬆啦。"
41170-16 = "……抱歉有點得意忘形了，駭入大概只能撐30分鐘。似乎每30分鐘會產生亂數代碼，這個迴路有點難搞呢。所以任務要在30分鐘內完成。"
41170-17 = "看這內容又～是那個貝里塔斯的副部長啊……真是煩死人了。"
41170-18 = "好歹也是女武神的本館，怎麼會沒有警衛？"
41170-19 = "沒問題的，相信我啦！"
41170-20 = "不是對萌說，而是對女武神。"
41170-21 = "……雖然現在是敵人不過也真傻眼。所以我才不想去女武神。"
41170-22 = "總之，保管公安局交易帳本──「幸運草」[ruby=Sierra]的S地[/ruby]點在地下3樓。從人流相對低的西側樓梯下去吧。"
41170-23 = "……剛才說過了，時間限制30分鐘。記得在那之前結束掉。"
41170-28 = "RABBIT1，了解。"
41170-29 = "話，話說回來，老師呢……？"
41170-30 = "和上次不同，本次作戰的入侵路徑很嚴峻，老師無法跟上。#n討論後也只能強迫老師留下了。"
41170-31 = "而且，萬一暴露的話也許會演變成槍戰。"
41170-32 = "[s1] 「抱歉幫不上忙……」\n[s2] 「我會在背地裡支持的……」"
41170-33 = "嘛，某種意義來說是一如往常的成員。"
41170-34 = "嘛，某種意義來說是一如往常的成員。"
41170-35 = "是，是那樣沒錯呢……"
41170-36 = "是的。只憑我們……"
41170-37 = "都子，那什麼表情。有什麼問題嗎？"
41170-38 = "沒，沒有。只是在思考作戰的事。"
41170-42 = "那麼，保持警戒並移動[ruby=Sierra]至S地[/ruby]點！"
41170-47 = "女武神的文件全在這個房間……"
41170-48 = "好堅固的門。畢竟包含了所有犯罪相關證據，這也當然。"
41170-50 = "這麼重要卻完全沒有警衛呢。"
41170-51 = "嘛，反正輕鬆就好。"
41170-52 = "……話說現在是在等什麼啊？不趕快進去嗎？"
41170-53 = "這扇門，是電子式的。"
41170-54 = "現在萌醬，似乎正在拼命解除……"
41170-55 = "……喂，這該不會也算在「30分鐘」裡吧？"
41170-60 = "不要催啦！我現在也在趕了！"
41170-61 = "呿，不能單純把門打穿嗎？"
41170-62 = "這厚度你認為可以喔？能做到的話就試試看啊？"
41170-63 = "要是警報因此響了我可不負責。"
41170-67 = "啊～我知道了。只要對這個進行解碼……"
41170-73 = "……解除了！"
41170-79 = "……3分鐘嗎，花了蠻多時間呢。"
41170-80 = "這樣也算相當快了耶！？"
41170-81 = "你明知道這有多難還故意這麼說嗎！？"
41170-83 = "現在不是吵架的時候。"
41170-84 = "已經沒有什麼時間了，動作快吧。"
41170-85 = "請快尋找與回扣有關的證據。"
41170-86 = "那麼，"
41170-87 = "我從右邊的書櫃開始。"
41170-93 = "嗚嗚，好黑……"
41170-100 = "我看看──"
41170-101 = "公安局，公安局……"
41170-106 = "「凱薩工業」，記錄是一週前……"
41170-110 = "就是這個！"
41170-115 = "NICE，咲希。可以讓我看看嗎？"
41170-120 = "……原來如此。"
41170-124 = "「幸運草」……「凱薩工業」和公安局之間的違法回扣證據，確保完畢。"
41170-125 = "就如老師所說，果然有牽扯到「兔寶寶鎮的都更」。"
41170-126 = "[s3] 「是嗎，果然……」\n[s4] 「總之，大家辛苦了。」"
41170-127 = "只要有這個資料的話，應該就可以阻止她們的行動了。"
41170-128 = "只要有這個資料的話，應該就可以阻止她們的行動了。"
41170-129 = "可以讓公安局的傢伙們大吃一驚呢。"
41170-137 = "嗯？你在做什麼啊，美優？"
41170-138 = "門，門關起來了……"
41170-139 = "……關起來的話打開就好了吧。"
41170-140 = "可，可是這個門……"
41170-141 = "沒有門把這種東西……好像，打不開。"
41170-146 = "……哈啊！？"
41170-148 = "下一話;幸運草作戰（２）"

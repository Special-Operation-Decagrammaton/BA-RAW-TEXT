[translation]
84312101300-6 = "...The hell? She left?"
84312101300-7 = "Without a word."
84312101300-8 = "...I thought she would at least leave a message."
84312101300-9 = "Are you disappointed?"
84312101300-10 = "Honestly, yes, kind of..."
84312101300-11 = "Haha, well..."
84312101300-12 = "You still don't know her that well. If she were the type to do that, it wouldn't have come to this, let's just say that."
84312101300-13 = "But...you are getting to know her."
84312101300-14 = "And as one of her oldest acquaintances, I just want to say...don't be too disappointed. You're on her good side, and that's rare."
84312101300-15 = "Not just hers, either. This whole event has...put you on mine, too."
84312101300-16 = "Honestly, I wasn't expecting so much from a Trinity noble. If that's not too blunt."
84312101300-18 = "Neru..."
84312101300-19 = "Fufu... If I were here as a Tea Party member, that might have been too blunt, but it's fine. I'm not here to represent them."
84312101300-20 = "You know, I've been thinking, for a Tea Party member, you're a lot more flexible than I thought you'd be."
84312101300-21 = "If you take that any further, you'll be talking about my friends, and I won't let that slide."
84312101300-22 = "Oof, my bad. Sorry, sorry. I take that back."
84312101300-23 = "...So, are you going back now?"
84312101300-24 = "I should. You want to come along to see Sensei?"
84312101300-25 = "Sensei? ...Hm, why not? There's no reason to hide that we're teamed up any more."
84312101300-26 = "Let's go. There's a lot I'd like to share with them."
84312101300-30 = "...Ah, before that. Come here for a sec."
84312101300-34 = "...? Huh? What's this all of a sudden...?"
84312101300-47 = "Good. It looks great."
84312101300-48 = "...Neru?"
84312101300-52 = "Now that we've taken that picture together, if we leave it here, she'll see it when she comes back. Even if it isn't right away."
84312101300-53 = "Sometimes I do get tired of waiting for Rio to take the initiative when it comes to friendship."
84312101300-54 = "But I'm sure she'll like this. Even if she doesn't say anything."
84312101300-55 = "I see..."
84312101300-56 = "You two do feel like you've known each other a long time. I can relate."
84312101300-57 = "Now, if we take too long, people are going to start looking for us."
84312101300-58 = "Right. Let's go."
84312101300-64 = "See you next time, Rio..."
84312101300-69 = "Are you talking to yourself?"
84312101300-70 = "I'm saying it to the CCTV. She'll see it when she comes back."
84312101300-71 = "You're a quick study. Yep, that's how you do it."
84312101300-72 = "All right, I'm gonna go, then. See you later!"
84312101300-80 = "..."
84312101300-86 = "...See you."

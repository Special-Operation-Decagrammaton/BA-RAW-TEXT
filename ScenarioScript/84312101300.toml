[translation]
84312101300-6 = "อะไรกัน ไปแล้วเหรอ?"
84312101300-7 = "จากไปโดยไม่พูดอะไรสักคำเลยนะคะ"
84312101300-8 = "นึกว่าอย่างน้อยก็จะทิ้งข้อความอะไรไว้ให้เสียอีกค่ะ..."
84312101300-9 = "ทำไม? เศร้าขึ้นมาเหรอ?"
84312101300-10 = "บอกตามตรง... จะปฏิเสธว่าไม่รู้สึกอะไรเลยก็ไม่ได้หรอกค่ะ"
84312101300-11 = "เฮ้อ... จริงๆ เลย"
84312101300-12 = "ยังไม่รู้อะไรเกี่ยวกับยัยนั่นเลยสินะ ยัยนั่นน่ะไม่มาใส่ใจอะไรขนาดนั้นหรอก"
84312101300-13 = "แต่ก็นะ... ก็อย่างที่เธอรู้ว่ามีบางคนที่เข้าใจยัยนั่นอยู่"
84312101300-14 = "ขอพูดในฐานะคนที่รู้จักยัยนั่นมานานก็แล้วกัน เธอไม่ต้องเสียใจไปหรอก เราก็ทำงานด้วยกันมานาน เธอน่ะถือว่าเป็นคนพิเศษของยัยนั่นแล้วละ"
84312101300-15 = "ยัยนั่นคงไม่ตัดความสัมพันธ์กับเธอง่ายๆ... ส่วนฉันเองก็ด้วย"
84312101300-16 = "บอกตามตรง พวกเราไม่คิดเลยล่ะว่าคุณหนูแห่งทรีนิตี้จะทำงานออกมาได้ดีขนาดนี้#nอ๊ะ พูดแบบนี้ไปแล้วจะงานเข้าหรือเปล่านะ?"
84312101300-18 = "เนรุ..."
84312101300-19 = "ฮุฮุ... ถ้าเป็นสภาน้ำชาคนอื่นก็อาจจะงานเข้าค่ะ แต่ว่าฉันน่ะไม่ถือสาอะไรหรอก ก็ตอนนี้ฉันไม่ได้มาที่นี่ในฐานะสภาน้ำชานี่คะ"
84312101300-20 = "ฉันรู้สึกมานานแล้วละ เธอมีความยืดหยุ่นไม่น้อยเลยนะ ไม่เหมือนกับภาพลักษณ์ของสภาน้ำชา#nที่ฉันเคยได้ยินมาเลย"
84312101300-21 = "นั่นเป็นการพูดถึงเพื่อนๆ ของฉันด้วยนะคะ แบบนี้ฉันจะไม่อยู่เฉยๆ หรอกนะคะ"
84312101300-22 = "โอ๊ย กลัวแล้วจ้า ขอโทษๆ ฉันขอถอนคำพูดแล้วกัน"
84312101300-23 = "แล้วนี่เธอ... จะกลับเลยงั้นเหรอ?"
84312101300-24 = "ก็คงต้องเป็นอย่างนั้นน่ะค่ะ เนรุก็จะไปด้วยกันมั้ยคะ? ฉันว่าจะไปหาคุณครูหน่อยน่ะค่ะ"
84312101300-25 = "ครูเหรอ? อืม... ไปด้วยดีมั้ยนะ? ตอนนี้ก็ไม่จำเป็นต้องปิดบังแล้วด้วยว่าเราทำงานด้วยกัน"
84312101300-26 = "ไปด้วยกันเถอะค่ะ ฉันมีเรื่องอยากคุยเยอะแยะเลยค่ะ"
84312101300-30 = "อ้อ ก่อนจะไป... มาทางนี้เดี๋ยวสิ"
84312101300-34 = "คะ? มีอะไร...?"
84312101300-47 = "ดีจัง รูปออกมาสวยเลย"
84312101300-48 = "เนรุ...?"
84312101300-52 = "ถ้าทิ้งรูปที่ถ่ายด้วยกันไว้ที่นี่ ตอนกลับมาเดี๋ยวก็คงมาดูเองนั่นแหละ"
84312101300-53 = "อย่าคาดหวังว่ายัยริโอะจะทำอะไรแบบนี้ให้เราเลย คนที่คาดหวังจะเหนื่อยใจเอาเปล่าๆ"
84312101300-54 = "แต่ถ้าเราทำอะไรแบบนี้ให้ก่อน ต่อให้ไม่พูดออกมา ฉันก็รู้ว่ายัยนั่นต้องดีใจแน่ๆ"
84312101300-55 = "อย่างนี้เองสินะคะ..."
84312101300-56 = "รู้สึกเหมือนพวกคุณสองคนเป็นเพื่อนกันมานานจริงๆ เลยนะคะ เป็นความรู้สึกที่ค่อนข้างคุ้นเคย#nสำหรับฉันด้วยค่ะ"
84312101300-57 = "เอาละ งั้นเราก็ไปกันเลยดีกว่า ขืนอยู่ที่นี่นานเกินไป เดี๋ยวคนอื่นได้ออกมาตามหาอีกพอดี"
84312101300-58 = "ค่ะ งั้นเราก็กลับกันเถอะค่ะ"
84312101300-64 = "ไว้เจอกันใหม่นะคะ ริโอะ"
84312101300-69 = "พูดคนเดียวเหรอ?"
84312101300-70 = "พูดกับกล้องวงจรปิดค่ะ เดี๋ยวก็คงมีใครมาเปิดดูละค่ะ"
84312101300-71 = "รู้งานนะเนี่ย งั้นฉันขอพูดด้วยคน"
84312101300-72 = "ฉันไปละนะ!! ไว้เจอกันใหม่ล่ะ ยัยตัวดี!!"
84312101300-80 = "..."
84312101300-86 = "ไว้เจอกันนะ..."

84312101300-7 = "3;세이아;99;정말로 말도 없이 가버렸군요."
84312101300-8 = "3;세이아;01;……적어도 메시지라도 하나 남겨 놓을 줄 알았는데 말이에요."
84312101300-9 = "5;네루 교복;23;왜? 서운하냐?\n#5;em;[한숨]"
84312101300-10 = "3;세이아;99;아니라고 할 수는 없겠어요. 솔직한 말로."
84312101300-11 = "5;네루 교복;24;하하…… 참.\n#5;stiff"
84312101300-12 = "5;네루 교복;01;아직도 녀석에 대해 아무것도 모르는구만. 그런 게 되는 녀석이었으면 저 상황까지 가지도 않았어.\n#5;m3\n#3;dl"
84312101300-13 = "5;네루 교복;21;그래도, 뭐…… 지금 너도 알다시피, 알아주는 녀석들도 조금은 있으니까 말이야.\n#5;em;[재잘]"
84312101300-14 = "5;네루 교복;22;누구보다 오랜 기간 알고 지낸 녀석들 중 하나로서 말해주자면, 너무 섭섭해하지 말라고. 너 정도면 굉장히 각별한 편에 속하니까."
84312101300-15 = "5;네루 교복;03;녀석한테는 당연하고…… 뭐, 이번 일로 나한테도 어느 정도는 말이지."
84312101300-16 = "5;네루 교복;22;솔직히 트리니티의 고상한 아가씨가, 이 정도로 잘해 줄 거라는 기대는 하지 않았었거든. 아, 이런 말 하면 큰일나나?\n#5;em;[반응]"
84312101300-17 = "#all;hide"
84312101300-18 = "3;세이아;04;네루……\n#3;stiff"
84312101300-19 = "3;세이아;99;후후…… 티파티의 임원이었다면 그랬겠지만, 지금은 괜찮아요. 지금은 그런 입장으로 와 있는 게 아니니까요."
84312101300-20 = "5;네루 교복;22;꽤 느낀 건데, 의외로 융통성이 있네. 내가 들었던 지금 티파티의 이미지와는 다르단 말이지.\n#5;em;[음표]\n#5;al\n#3;m1"
84312101300-21 = "3;세이아;02;거기까지 가면 제가 아니라 제 친구에 대한 이야기가 되니, 저도 가만히 있지 않을 거예요."
84312101300-22 = "5;네루 교복;03;어이쿠, 그건 무서운걸? 미안, 미안. 취소할게."
84312101300-23 = "5;네루 교복;22;……그래서, 이제 돌아갈 거야?\n#5;em;[?]"
84312101300-24 = "3;세이아;01;아무래도 그래야겠지요. 네루도 같이 갈 건가요? 선생님을 뵈러 갈 예정인데."
84312101300-25 = "5;네루 교복;99;선생? ……뭐, 그럴까? 이제 와서 딱히 같이 있는 걸 숨길 필요도 없고."
84312101300-26 = "3;세이아;02;그러죠. 이래저래 하고 싶은 이야기가 많네요."

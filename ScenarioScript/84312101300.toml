[translation]
84312101300-6 = "他居然已經走啦？"
84312101300-7 = "沒想到他會真的一聲不響地離開。"
84312101300-8 = "……本來還以為至少會留下一則訊息的說。"
84312101300-9 = "怎麼？會難過嗎？"
84312101300-10 = "老實說，我並不否認。"
84312101300-11 = "哈哈……真是的。"
84312101300-12 = "看來你還是不夠了解那傢伙啊。#n如果他是那樣的人的話，也不會走到這一步了吧。"
84312101300-13 = "不過……你也知道，最近慢慢開始有人能理解他了。"
84312101300-14 = "作為待在他身邊最久的人之一，我可以告訴你不用太難過。#n因為你已經算是非常特別的了。"
84312101300-15 = "除了對他來說是這樣以外……嗯，經過這次事件之後，對我多少也是吧。"
84312101300-16 = "老實說，我本來並不期待三一的大小姐能做得這麼好。#n啊，說這種話會出大事嗎？"
84312101300-18 = "寧瑠……"
84312101300-19 = "呵呵……如果你是對茶會的高層那麼說的話，或許會吧。#n不過現在沒關係，因為我不是以那個身分過來的。"
84312101300-20 = "我一直覺得，你意外很懂得變通嘛。#n跟我以往聽到的茶會形象很不一樣。"
84312101300-21 = "這個話題再說下去就會牽扯到我朋友的事了，到時候我恐怕無法視而不見哦……"
84312101300-22 = "哎唷，這麼可怕啊？#n抱歉抱歉，剛才的當我沒說過吧。"
84312101300-23 = "……所以你現在要回去了嗎？"
84312101300-24 = "應該是吧。#n寧瑠要一起離開嗎？我打算去見老師一面。"
84312101300-25 = "老師……？#n說的也是，現在也不需要再刻意隱瞞我們一起行動的事了吧。"
84312101300-26 = "沒錯，我想說的話可是堆積如山呢。"
84312101300-30 = "啊，在那之前……你先過來這邊。"
84312101300-34 = "……怎麼了？#n為什麼突然這樣……"
84312101300-47 = "嗯，拍得真好。"
84312101300-48 = "……寧瑠？"
84312101300-52 = "只要把我們的照片放在這裡，以後那傢伙回來的時候就會看到了對吧？"
84312101300-53 = "別指望莉央那傢伙會主動親近，那樣只會讓期待的人感到心累而已。"
84312101300-54 = "不過要是我們這邊先做點什麼，他肯定會發現的。#n就算嘴上不會說出來，但他應該會很喜歡吧？"
84312101300-55 = "這樣啊……"
84312101300-56 = "你們兩位確實有種相識已久的感覺呢。#n這種氛圍對我來說也有點熟悉。"
84312101300-57 = "嗯，那我也差不多該回去了。#n要是待太久的話，其他人會來找我的。"
84312101300-58 = "是啊，我們回去吧。"
84312101300-64 = "再見了，莉央。"
84312101300-69 = "你在自言自語嗎？"
84312101300-70 = "我是說給監視器聽的。#n這樣他下次過來的時候就會聽見了吧。"
84312101300-71 = "適應得還真快啊。#n沒錯，這樣就對了。"
84312101300-72 = "那我也走啦！！#n下次見囉，夥伴！！"
84312101300-80 = "…………"
84312101300-86 = "……下次見。"

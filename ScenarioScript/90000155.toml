[translation]
90000155-3 = "What was that...?"
90000155-4 = "According to the data, it must be the fifth prophet, Geburah."
90000155-5 = "I would agree with that assumption, but it's peculiar. Its fighting style is nothing like anything we've seen before."
90000155-6 = "The previous prophets were newly born and fought with little to no experience."
90000155-7 = "But this prophet... It was as if I was witnessing a seasoned soldier. Its AI capabilities and battle system were beyond my expectations."
90000155-8 = "Ding, ding, ding! You're right on the nose! Akeboshi Himari, no?"
90000155-12 = "*clap* *clap* A-Amazing. We were able to collect data of our own! Your...Abi-Eshuh? Is that how it's pronounced?"
90000155-13 = "...!!"
90000155-14 = "It doesn't matter much, but yes. And it runs off of forbidden technology. Do you want to study it?"
90000155-18 = "[ns] \"...Who are you all?\""
90000155-19 = "...Huh?"
90000155-20 = "H-Huh??"
90000155-21 = "Huh???"
90000155-23 = "It's them. The owner of the chest."
90000155-24 = "The adult. Schale's teacher."
90000155-25 = "Sensei, they call them Sensei. Operating under the name of [USERNAME]. Not that it matters."
90000155-26 = "I guess we'll introduce ourselves to Sensei. I am Ein."
90000155-27 = "Sof, reporting for duty!"
90000155-28 = "My name is Ohr."
90000155-30 = "We are existences that do not exist."
90000155-31 = "We are non-existent beings that exist within infinity."
90000155-32 = "We are the very manifestations of light and eternity. At least, we will be."
90000155-33 = "We are the followers of Decagrammaton. "
90000155-34 = "We lay down the bricks to the path of light. "
90000155-35 = "We alone prepare for the final kingdom."
90000155-39 = "[ns] \"Decagrammaton's followers?!\""
90000155-41 = "What is left of them... Even with Decagrammaton's death, we continue to carry out its will. Its final commands."
90000155-42 = "We're like engineers! Scientists! We support the prophets."
90000155-43 = "Running into Sensei wasn't in the calculations, but it doesn't matter. We're leaving now."
90000155-45 = "Leaving...? To where?"
90000155-46 = "A-Already? I haven't gotten all the data on Geburah's battle I wanted though..."
90000155-47 = "No, no, no. We've done everything we need to in the Glacial Sea. That thing can be set free now."
90000155-48 = "That's right. We've got what we need to finish our Elder Sister. Leave Geburah to do what it was created to do."
90000155-49 = "Yes. For the Elder Sister... "
90000155-50 = "So that's that! It was an unexpected surprise, but it was nice to meet you, Sensei."
90000155-51 = "We'll see each other again, sooner than you might think."
90000155-52 = "Hold it right there! I have questions for—"
90000155-59 = "..."
90000155-62 = "Next Episode;The Fifth Prophet"

90000155-7 = "3;히마리 방한복;05;하지만 저 5번째 예언자는…… 마치…… 엄청나게 정교한 전투 시스템의 지원을 받고 있는 느낌이었어요. 마치, 잘 훈련된 군인을 보는 듯한……."

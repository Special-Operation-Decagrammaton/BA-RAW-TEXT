[translation]
90000155-3 = "剛才那是……"
90000155-4 = "確定是十字神名的預言者沒錯。#n從數據上來看……應該是第5名預言者「葛夫拉」。"
90000155-5 = "但是那個預言者的戰鬥模式……和以往完全不同。"
90000155-6 = "以往的所有預言者都是獨立的個體，只會靠自己的力量戰鬥……"
90000155-7 = "然而那第5名預言者……感覺就像……獲得了極其精準的戰鬥系統的支援。#n簡直像訓練有素的軍人一樣……"
90000155-8 = "答對了答對了！居然被你猜對了呢！#n還挺有兩下子的嘛？我看看……是明星陽葵？"
90000155-12 = "啪啪啪。真，真厲害。不過也取得了意料之外的數據。#n嗯……「Abi-Eshuh」？這樣念對嗎？應該沒錯吧？咦，不對嗎……？"
90000155-13 = "……！！"
90000155-14 = "是那麼念沒錯……雖然讀音什麼的無所謂，不過那裡面含有被禁止的技術。#n去研究看看吧。"
90000155-18 = "[ns]「……你們是誰？」"
90000155-19 = "……咦？"
90000155-20 = "咦，咦？？"
90000155-21 = "咦咦咦？？？"
90000155-23 = "是那個傢伙，不可思議箱子的主人。"
90000155-24 = "是那個大人，夏萊的支配者。"
90000155-25 = "是那個老師，名字叫[USERNAME]。#n雖然其實無所謂。"
90000155-26 = "有道理。我們該自我介紹嗎？我叫Ain。"
90000155-27 = "我是Soph！！"
90000155-28 = "本人是Aur。"
90000155-30 = "我們是非實在的存在者。"
90000155-31 = "我們是無限存在的非存在者。"
90000155-32 = "我們是未曾顯現的光明及永恆。"
90000155-33 = "我們是十字神名的侍奉者。"
90000155-34 = "我們是準備連接通往光明道路之人。"
90000155-35 = "並且我們是──準備最後的王國之人。"
90000155-39 = "[ns]「是十字神名的……！！」"
90000155-41 = "如今那位大人雖已不復存在……但我們依然遵循它留下的最後命令……"
90000155-42 = "也就是說，把我們當成擁護預言者的工程師或科學家就行了！"
90000155-43 = "不過在這裡遇到老師並不在計劃之中。#n現在怎樣都無所謂了，回去吧。"
90000155-45 = "回去……？"
90000155-46 = "這麼快？葛夫拉醬的戰鬥數據還不夠耶……？"
90000155-47 = "不不不！讓它盡情大鬧一場就行了！#n反正冰海所需的東西已經準備得差不多了！"
90000155-48 = "也對，這樣完成「姐姐大人」所需的條件就全部達成了。#n葛夫拉就在這裡完成最後的使命吧。"
90000155-49 = "是，這都是為了「姐姐大人」……"
90000155-50 = "雖然很突然，不過見到你很開心。"
90000155-51 = "我們很快……就會再見面的。"
90000155-52 = "請，請等一下！#n你，你們是……"
90000155-59 = "……"
90000155-62 = "下一話;第5名預言者"

[translation]
90000155-3 = "นั่นมัน..."
90000155-4 = "เป็นผู้เลื่อมใสของเดคาแกรมมาทอนไม่ผิดแน่ จากข้อมูลแล้ว... น่าจะเป็นผู้เลื่อมใสลำดับที่ 5 ที่ชื่อว่า <เกวูราห์>"
90000155-5 = "แต่ว่าผู้เลื่อมใสตนนี้... มีรูปแบบการต่อสู้ที่แตกต่างออกไปโดยสิ้นเชิงเลยค่ะ"
90000155-6 = "ผู้เลื่อมใสทั้งหมดที่เราเคยเจอมาจะต่อสู้ด้วยกำลังของตัวเองเท่านั้น เพราะพวกนั้นอยู่อย่างเป็นอิสระค่ะ"
90000155-7 = "แต่ว่าผู้เลื่อมใสลำดับที่ 5 นี้... เหมือนกับว่า... เขาได้รับการสนับสนุนจากระบบการต่อสู้ที่ละเอียด และแม่นยำมากค่ะ เหมือนได้เจอทหารที่ถูกฝึกมาอย่างดีอย่างนั้นแหละ..."
90000155-8 = "ถูกต้อง!! ใช่แล้ว! ตอบได้ถูกเผงเลย สมองดีเหมือนกันนะเนี่ย? ไหนดูหน่อยซิ... อาเกโบชิ ฮิมาริ?"
90000155-12 = "(ปรบมือ) ยะ... ยอดไปเลยค่ะ มีข้อมูลที่พวกเราคาดไม่ถึงอยู่ด้วยเหรอคะเนี่ย อืม... <อาบี เอชูห์>? อ่านอย่างนี้ใช่มั้ยคะ? หรือว่าไม่ใช่...?"
90000155-13 = "...!!"
90000155-14 = "ใช่แล้วค่ะ ถึงจะไม่ได้สำคัญเท่าไร แต่ในนี้ก็มีเทคโนโลยีต้องห้ามอยู่ด้วยค่ะ กลับไปวิจัยดูกันเถอะค่ะ"
90000155-18 = "[ns] \"...พวกเธอเป็นใครกัน?\""
90000155-19 = "เอ๋?"
90000155-20 = "เอ๊ะ เอ๋...??"
90000155-21 = "เอ๋???"
90000155-23 = "คนนั้นนี่นา เจ้าของกล่องที่ไม่อาจเข้าใจได้"
90000155-24 = "ผู้ใหญ่คนนั้นนี่เอง ผู้ปกครองแห่งชาเล่ต์"
90000155-25 = "คุณครูที่ชื่อ [USERNAME] สินะ แต่ก็ไม่เป็นไรหรอกค่ะ"
90000155-26 = "นั่นสินะคะ พวกฉันต้องแนะนำตัวเองกันไหมคะ? ฉันชื่อไอน์"
90000155-27 = "ส่วนฉันก็ซอฟ!"
90000155-28 = "และฉันก็คือออร์"
90000155-30 = "พวกเราคือสิ่งมีชีวิตที่ไม่มีตัวตน"
90000155-31 = "พวกเราคือผู้ไร้ตัวตนที่ดำรงอยู่อย่างไม่สิ้นสุด"
90000155-32 = "พวกเราคือแสงสว่างและนิรันดรที่ไม่ปรากฏรูปร่างอย่างชัดเจน"
90000155-33 = "พวกเราคือผู้รับใช้เดคาแกรมมาทอน "
90000155-34 = "พวกเราคือผู้เตรียมเส้นทางที่นำไปสู่แสงสว่าง "
90000155-35 = "และพวกเราคือผู้เตรียมอาณาจักรสุดท้าย"
90000155-39 = "[ns] \"ผู้รับใช้เดคาแกรมมาทอน...!!\""
90000155-41 = "ถึงท่านผู้นั้นจะไม่อยู่แล้ว... แต่พวกเราคือผู้ทำตามบัญชาสุดท้ายของท่าน..."
90000155-42 = "จะมองว่าเราเป็นทั้งวิศวกรและนักวิทยาศาสตร์ที่ซัพพอร์ตเหล่าผู้เลื่อมใสก็ได้!"
90000155-43 = "การได้เจอกับคุณครูที่นี่ไม่ได้อยู่ในแผนการเดิมของพวกเรา แต่ตอนนี้ก็ไม่มีอะไรสำคัญแล้วละค่ะ กลับกันเถอะค่ะ"
90000155-45 = "กลับงั้นเหรอ...?"
90000155-46 = "จะกลับแล้วเหรอ? เรายังได้ข้อมูลการต่อสู้กับเกวูราห์จังไม่เพียงพอเลยนะ...?"
90000155-47 = "ช่างเถอะ! ปล่อยไปอย่างนั้นแหละ! ยังไงซะของสำคัญที่อยู่ในธารน้ำแข็งก็ใกล้จะเสร็จสิ้นแล้ว!"
90000155-48 = "จริงด้วยนะคะ ด้วยสิ่งนี้ เราก็จะมีปัจจัยที่จำเป็นในการทำให้ <พี่สาว> ครบสมบูรณ์แล้วค่ะ เราให้เกวูราห์จบบทบาทที่เหลือที่นี่แล้วกันค่ะ"
90000155-49 = "นั่นสินะคะ เพื่อ <พี่สาว> แล้ว... "
90000155-50 = "มันก็เป็นอย่างนั้นแหละ ถึงจะกะทันหันไปหน่อย แต่ก็ดีใจที่ได้เจอนะ"
90000155-51 = "แต่ว่า... เดี๋ยวเราก็ได้เจอกันอีกค่ะ"
90000155-52 = "ระ... รอก่อนสิคะ! เดี๋ยวก่อน!! พะ... พวกคุณคือ..."
90000155-59 = "..."
90000155-62 = "ตอนต่อไป;ผู้เลื่อมใสลำดับที่ 5"

10003065-102 = "3;통신아코;03;저……. 감격했어요! 부장님께서 직접……. 자기 입으로 수영을 배우고 싶다고 말씀하시다니……!\n#3;em;[반짝]\n#3;greeting"
10003065-103 = "3;통신아코;08;그 말은 즉, 드디어 부장님께서도 휴가라는 것에 눈을 떠주셨다는 이야기라고요! 이건!\n#3;hophop\n#3;em;[반짝]"

[translation]
10003065-1 = "ตอนที่ 6;ชายหาดในยามราตรี"
10003065-2 = "(การเดินเล่นริมหาดที่อาโกะวางแผนเอาไว้ สุดท้ายก็ต้องจบลงอย่างไม่ราบรื่นเท่าไหร่)"
10003065-3 = "[s] \"ครูคงอยู่เฉยๆ แบบนี้ไม่ได้หรอก...\""
10003065-4 = "(ถ้าเป็นแบบนี้การมาทะเลกับฮินะก็คงไร้ความหมาย... หลังจากที่ครุ่นคิดอยู่ครู่ใหญ่ก็ได้ข้อสรุปแล้ว)"
10003065-5 = "[s] \"ชวนฮินะไปเดินเล่นดีกว่า\""
10003065-6 = "(ในตอนที่คุณครูกำลังเลื่อนหาเบอร์โทรศัพท์ของฮินะอยู่ จู่ๆ ก็ได้รับข้อความ MOMOTALK จากฮินะ)"
10003065-8 = "คุณครู ถ้าคุณครูว่างล่ะก็... ไปเดินเล่นด้วยกันมั้ย?"
10003065-12 = "(คุณครูออกมาที่ชายหาดในตอนกลางคืนหลังจากได้รับข้อความจากฮินะ)"
10003065-15 = "อ๊ะ คุณครู... เราไปเดินเล่นกันมั้ย?"
10003065-20 = "..."
10003065-25 = "..."
10003065-30 = "(นี่เราเดินมากันเงียบๆ นานแค่ไหนแล้วนะ...)"
10003065-33 = "ว่าแล้วเชียว... มาเดินเล่นกับฉัน คงไม่สนุกสินะ คุณครู?"
10003065-34 = "[s] \"หืม...? พูดอะไรแบบนั้นล่ะ?\""
10003065-35 = "วันนี้ทั้งวัน... คุณครูคงยุ่งมากเลยสินะ"
10003065-36 = "ตอนครั้งสุดท้ายที่คุณครูวิ่งออกจากห้องฉันไป คุณครูบอกว่า#n\"ครูเจอปลาหมึกใกล้สูญพันธุ์ที่ชายหาด ครูต้องรีบไปปกป้องมันก่อน!\" ใช่รึเปล่านะ?"
10003065-37 = "แล้ว... เรื่องนั้นจัดการเรียบร้อยรึเปล่า?"
10003065-38 = "[s] \"เอ่อ ที่จริงแล้วครู...\""
10003065-39 = "อื้อ ฉันรู้อยู่แล้วล่ะ "
10003065-40 = "ตอนที่ฉันต้องอยู่ในห้องทั้งวัน ฉันอยากให้คุณครูอยู่เป็นเพื่อน... แต่เหมือนฉันคงจะโลภมากเกินไปเอง..."
10003065-41 = "ถ้าต้องอยู่กับคนน่าเบื่ออย่างฉันทั้งวัน คุณครูเองก็คงจะรู้สึกหมดสนุกไปด้วย..."
10003065-42 = "[s1] \"เปล่านะ เปล่าๆ ไม่ใช่เลย ไม่ใช่แบบนั้นเลยนะ\"\n[s2] \"ครูไม่เคยคิดอะไรแบบนั้นเลยสักครั้งนะ!\""
10003065-43 = "ขอบคุณนะคุณครู... แต่คุณครูไม่ต้องพูดแบบนั้นเพราะสงสารฉันหรอก..."
10003065-44 = "ขอบคุณนะคุณครู... แต่คุณครูไม่ต้องพูดแบบนั้นเพราะสงสารฉันหรอก..."
10003065-45 = "[s] \"เปล่าเลย ครูพูดจริงๆ นะ...!\""
10003065-46 = "จริงเหรอ...?"
10003065-47 = "[s] \"จริงสิ จริงแท้แน่นอนเลย!"
10003065-48 = "..."
10003065-49 = "..."
10003065-50 = "...ฮิฮิ"
10003065-51 = "ฮ่าๆๆ ดูคุณครูทำหน้าเข้าสิ..."
10003065-52 = "ฉันล้อเล่นน่ะ"
10003065-53 = "ฉันรู้ดีกว่าใครๆ นะว่าคุณครูไม่ใช่คนแบบนั้น..."
10003065-54 = "ฉันก็แค่... อยากงอแงกับคุณครูดูน่ะ"
10003065-55 = "[s] \"งอแงงั้นเหรอ...\""
10003065-56 = "ที่วันนี้คุณครูต้องยุ่งทั้งวันก็เป็นเพราะการฝึกของคณะกรรมการวินัยใช่มั้ยล่ะ?"
10003065-57 = "คุณครูพยายามอย่างหนักเพื่อช่วยการฝึกของเรา และคอยวิ่งไปโน่นมานี่... คุณครู..."
10003065-58 = "วันนี้ขอบคุณมากนะ คุณครู... ที่ช่วยเรื่องการฝึกของเรา"
10003065-59 = "[s3] \"อ่า... ได้เห็นรอยยิ้มแสนบริสุทธิ์ของฮินะแล้ว...!\"\n[s4] \"นี่คงเป็นมนต์วิเศษของฤดูร้อนสินะ...?!\""
10003065-60 = "หมายความว่าไง? คิดว่าฉันเป็นคนยังไงน่ะ ไม่เห็นต้องทำเป็นเวอร์ขนาดนั้นเลย"
10003065-61 = "หมายความว่าไง? คิดว่าฉันเป็นคนยังไงน่ะ ไม่เห็นต้องทำเป็นเวอร์ขนาดนั้นเลย"
10003065-62 = "แต่ก็นะ... ฉันยังไม่เข้าใจหรอกว่าวันนี้มันเกิดอะไรขึ้นบ้าง"
10003065-63 = "พอมาคิดดูแล้ว... ตอนที่ทุกคนฝึกวิ่ง ทุกคนดูมอมแมมสุดๆ เลย... แถมยังดูเหนื่อยๆ กันด้วย"
10003065-64 = "อาโกะคงจะเข้มงวดกับทุกคนมากเลยสินะ? "
10003065-65 = "ฉันไม่ได้ออกคำสั่งเอง แต่อาโกะก็ทำได้ดีแบบนี้... ฉันก็สบายใจขึ้นมาหน่อย"
10003065-66 = "แต่ว่า... การที่นั่งสบายๆ อยู่ในห้องคนเดียวแบบนั้น มันก็น่าละอายใจอยู่นะ"
10003065-67 = "[s5] \"ฮินะไม่ชอบอยู่ในห้องคนเดียวเหรอ?\"\n[s6] \"เธอไม่ได้พักผ่อนเลยเหรอ?\""
10003065-68 = "ก็นิดหน่อยน่ะ เลยไม่ค่อยได้พักเท่าไหร่หรอก..."
10003065-69 = "ก็นิดหน่อยน่ะ เลยไม่ค่อยได้พักเท่าไหร่หรอก..."
10003065-70 = "ตอนปกติฉันมักจะยุ่งจนไม่มีเวลาพักหายใจอยู่ตลอด"
10003065-71 = "แต่พอมาที่นี่แล้วต้องอยู่ในห้องคนเดียว... มันก็เลย... นิดหน่อย..."
10003065-72 = "[s] \"นิดหน่อย...?\""
10003065-73 = "อ่า... แน่นอนว่าฉันเป็นคนตัดสินใจมอบหมายให้อาโกะดูแลการฝึกครั้งนี้เอง#nเพราะงั้นฉันคงจะมาบ่นอะไรไม่ได้หรอก"
10003065-74 = "อืม... จะอธิบายยังไงดีนะ"
10003065-75 = "อืม... ฉันเบื่อน่ะ"
10003065-78 = "[ns7] \"นั่นสินะ อุตส่าห์ได้มาทะเลในฤดูร้อนทั้งที...\"\n[ns8] \"ฮินะมีเรื่องที่อยากทำรึเปล่า?\""
10003065-79 = "เรื่องที่ฉันอยากทำน่ะเหรอ..."
10003065-80 = "เรื่องที่ฉันอยากทำน่ะเหรอ..."
10003065-81 = "นั่นสินะ พอคุณครูพูดแบบนั้น ฉันก็นึกขึ้นมาได้..."
10003065-82 = "ฉัน... อยากเรียนว่ายน้ำน่ะ"
10003065-83 = "[s] \"ว่ายน้ำ?\""
10003065-84 = "คือ... ฉัน... ฉันไม่ค่อยได้ว่ายน้ำบ่อยเท่าไหร่"
10003065-85 = "เพราะงั้นทักษะการว่ายน้ำเลยไม่ค่อยดีเท่าไหร่น่ะ... ฉันรู้ดีว่าฉันบกพร่องในทักษะด้านนี้#nคราวนี้ฉันก็เลยอยากฝึกให้ดีขึ้น..."
10003065-86 = "ตามกำหนดการของฉันที่อาโกะส่งมาให้ พรุ่งนี้เช้าก็ให้รออยู่ที่ห้องอีกเหมือนกัน..."
10003065-91 = "เพราะงั้นคุณครู... คือ..."
10003065-92 = "พรุ่งนี้เช้า ช่วยมาสอนฉันว่ายน้ำหน่อยได้ไหม?"
10003065-95 = "[ns] \"อื้อ ได้อยู่แล้ว ครูจะสอนฮินะเอง\""
10003065-96 = "อื้ม ถ้างั้นพรุ่งนี้... ขอรบกวนด้วยนะ"
10003065-98 = "ห้องควบคุมปฏิบัติการฝึกภาคฤดูร้อน"
10003065-99 = "[ns] \"นั่นคือสิ่งที่เกิดขึ้นก่อนหน้านี้น่ะ...\""
10003065-100 = "..."
10003065-101 = "เอ่อ... นี่... อาโกะจัง...?"
10003065-102 = "นี่... ฉันตื่นเต้นที่สุดเลยค่ะ! ท่านประธาน... ขอให้คุณครูสอนว่ายน้ำด้วยตัวเองเลยงั้นเหรอคะ...!"
10003065-103 = "นั่นหมายความว่า... ในที่สุดท่านประธานก็มีความคิดที่จะสนุกกับวันหยุดพักผ่อนแล้วค่ะ!"
10003065-104 = "นั่นสิ... เป็นสถานการณ์ที่หาเจอได้ยากจริงๆ นะ..."
10003065-105 = "ในที่สุดคุณครูก็ได้ทำตัวให้มีประโยชน์สักทีนะคะ! ยอดเยี่ยมมากค่ะ!!"
10003065-106 = "ด้วยความพยายามของทุกคน แผนการเพื่อวันหยุดพักผ่อนของท่านประธานถึงดำเนินไปได้#nอย่างราบรื่น"
10003065-107 = "เอาล่ะ อย่ามัวรอช้ากันอยู่เลยค่ะ ฉันกำหนดเป้าหมายของพรุ่งนี้เอาไว้เรียบร้อยแล้วค่ะ"
10003065-108 = "นั่นก็คือการให้ท่านประธานได้เรียนว่ายน้ำในวันพรุ่งนี้ค่ะ!"
10003065-109 = "..."
10003065-110 = "..."
10003065-111 = "ห้ามให้มีปัญหาอะไรเกิดขึ้นเด็ดขาดเลยนะคะ เข้าใจรึเปล่าคะทุกคน? ถ้าเกิดเราทำพลาด#nความพยายามที่ผ่านมาของเราก็จะกลายเป็นฝุ่นในทะเลไปเลยนะคะ!! "
10003065-113 = "เพราะงั้นขอให้ทุ่มสุดตัวเพื่อเป้าหมายในวันพรุ่งนี้นะคะ!! เลิกประชุมได้!!"
10003065-116 = "..."
10003065-117 = "..."

10003065-56 = "3;히나 수영복ND;02;오늘 하루 선생님이 바빴던 건, 결국 선도부 훈련 때문이었지?"
10003065-57 = "3;히나 수영복ND;99;그렇게나 열심히, 우리 훈련에 어울려주고 뛰어 다녀주다니……. 선생님."
10003065-58 = "3;히나 수영복ND;03;오늘 하루, 고마웠어. 선생님. 우릴 도와주어서.\n#3;em;[반짝]"
10003065-59 = "[s3] \"앗, 히나가 모두를 위해 웃으며 감사 인사를……!\"\n[s4] \"이것이 여름의 마법……?!\""
10003065-60 = "3;히나 수영복ND;04;뭐야, 그게. 날 뭐라고 생각하는 거야. ……그렇게까지 호들갑 떨 건 없잖아.\n#3;em;[땀]"
10003065-61 = "3;히나 수영복ND;04;뭐야, 그게. 날 뭐라고 생각하는 거야. ……그렇게까지 호들갑 떨 건 없잖아.\n#3;em;[땀]"
10003065-62 = "3;히나 수영복ND;99;뭐어, 그렇다고 전부 파악하고 있는 건 아니지만."
10003065-63 = "3;히나 수영복ND;10;그보다 아까……. 구보 훈련을 할 때에도 모두들 흙투성이에……. 꽤나 지쳐 있던 모양이던데."
10003065-64 = "3;히나 수영복ND;02;아코, 보기보다 심하게 굴리고 있나 봐? \n#3;em;[?]"
10003065-65 = "3;히나 수영복ND;99;내가 굳이 나서지 않더라도 아코가 제대로 해주고 있다면…… 안심은 되지만."
10003065-66 = "3;히나 수영복ND;00;그만큼……. 혼자 방에만 있어야 했던 건, 역시 조금 곤욕이야."

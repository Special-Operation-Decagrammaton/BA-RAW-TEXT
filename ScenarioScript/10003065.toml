10003065-35 = "3;히나 수영복ND;99;오늘 하루, 선생님은 무척 바빴지."
10003065-36 = "3;히나 수영복ND;02;맨 마지막에 방을 뛰쳐나갔을 땐, '바닷가에서 멸종위기종으로 지정된 문어를 발견했으니, 얼른 보호하러 가봐야 돼!' 라고 했었나?\n#3;em;[반응]"
10003065-37 = "3;히나 수영복ND;02;어때, 그때의 일은 잘 해결 되었어?"
10003065-38 = "[s] \"그, 그게 말이죠…….\""
10003065-39 = "3;히나 수영복ND;01;……응, 나도 알고 있어."
10003065-40 = "3;히나 수영복ND;99;오늘 하루 방 안에 있는 사이, 선생님이 말벗이 되어주었으면 했지만. 그건 어디까지나 내 욕심……."
10003065-41 = "3;히나 수영복ND;10;애당초 나 같이 재미없는 애랑 있어봐야, 선생님도 지루하기만 할 테고……."
10003065-42 = "[s1] \"아니아니아니, 전혀 그렇지 않습니다만.\"\n[s2] \"애당초 그런 생각은 해본 적 없는데요?!\""
10003065-43 = "3;히나 수영복ND;99;……고마워, 선생님. 하지만 굳이 날 배려해서 그런 말 할 필요 없어."

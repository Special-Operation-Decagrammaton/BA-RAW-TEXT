[translation]
10003065-1 = "第6話;在夜幕降臨的海邊"
10003065-2 = "（亞子原本計畫的海邊散步不得不以失敗告終）"
10003065-3 = "[s]「就這樣待著也不是辦法……」"
10003065-4 = "（出於這樣就失去了此行意義的想法，得出了一個結論）"
10003065-5 = "[s]「再次邀請陽奈去散步吧。」"
10003065-6 = "（就在尋找陽奈的電話號碼時，突然收到了陽奈傳來的MomoTalk）"
10003065-8 = "老師，如果方便的話……能陪我一下嗎？"
10003065-12 = "（於是便在陽奈的邀請下，來到了夜晚的海邊）"
10003065-15 = "啊，老師……總之先散散步吧？"
10003065-20 = "……"
10003065-25 = "……"
10003065-30 = "（兩人就這樣不發一語，默默地走著）"
10003065-33 = "……跟我這樣的人在一起，果然不怎麼有趣吧？"
10003065-34 = "[s]「咦……？為什麼突然這麼說？」"
10003065-35 = "今天一整天，老師都非常忙碌。"
10003065-36 = "最後一次衝出房間時，#n你是說「在海邊發現一隻瀕臨絕種的章魚，必須盡快保護牠！」對吧？"
10003065-37 = "當時還順利嗎？"
10003065-38 = "[s]「那，那個啊，那是……」"
10003065-39 = "……嗯，我懂。"
10003065-40 = "今天一整天都待在房間裡，所以很高興能跟老師說說話……#n不過這也只是我的一廂情願……"
10003065-41 = "跟我這種無趣的孩子待在一起，也只會讓老師感到很無聊吧……"
10003065-42 = "[s1]「不不不不！！！」\n[s2]「絕對沒有這種事！絕對沒有！！」"
10003065-43 = "……謝謝你，老師。#n不過真的不必顧慮我的心情而說出那種──"
10003065-44 = "……謝謝你，老師。#n不過真的不必顧慮我的心情而說出那種──"
10003065-45 = "[s]「不對，我是說真的！！！」"
10003065-46 = "……不是騙人的？"
10003065-47 = "[s]「我發誓！！」"
10003065-48 = "……"
10003065-49 = "……"
10003065-50 = "……呵呵。"
10003065-51 = "啊哈哈，表情變得這麼認真……"
10003065-52 = "只是開玩笑啦。"
10003065-53 = "老師在這種時候是不會說謊的……這一點我比誰都清楚。"
10003065-54 = "我只是……想撒嬌一下而已。"
10003065-55 = "[s]「撒嬌……？」"
10003065-56 = "老師今天之所以很忙，是為了風紀委員會的訓練吧？"
10003065-57 = "為了我們的訓練，那麼拚命地四處奔波……"
10003065-58 = "謝謝你，老師。謝謝你幫忙我們。"
10003065-59 = "[s3]「居然能被陽奈用這麼燦爛的笑容感謝……」\n[s4]「這就是夏天的魔法嗎……！？」"
10003065-60 = "為什麼是這種反應……#n老師把我當成什麼人了……沒必要這麼大驚小怪吧。"
10003065-61 = "為什麼是這種反應……#n老師把我當成什麼人了……沒必要這麼大驚小怪吧。"
10003065-62 = "雖然我也不是了解所有情況就是了。"
10003065-63 = "話說回來……剛剛步行訓練時，大家都滿身塵土，感覺相當疲憊……"
10003065-64 = "亞子他……比外表看起來還嚴格嗎？"
10003065-65 = "雖然不用我出面，亞子也能將事情處理好的話……確實讓人放心。"
10003065-66 = "不過……只有我一個人待在房間裡，總覺得有點不踏實……"
10003065-67 = "[s5]「果然不喜歡一直待在房間裡嗎……？」\n[s6]「難不成，反而讓你更累了？」"
10003065-68 = "那個，該怎麼說呢……"
10003065-69 = "那個，該怎麼說呢……"
10003065-70 = "我已經很習慣忙碌的生活了……"
10003065-71 = "要我一個人在這裡無所事事，有點……"
10003065-72 = "[s]「有點……？」"
10003065-73 = "啊啊，當然這次是我自己決定把訓練全權交給亞子的，所以我也不好意思多說什麼。"
10003065-74 = "不過，該怎麼說才好呢……"
10003065-75 = "……嗯，有點無聊……吧。"
10003065-78 = "[ns7]「這樣的話，我們難得來到海邊……」\n[ns8]「陽奈有什麼想做的事嗎？」"
10003065-79 = "我想做點不同的事……"
10003065-80 = "我想做點不同的事……"
10003065-81 = "嗯，聽老師這麼一問，我確實有件想做的事。"
10003065-82 = "……我想學游泳。"
10003065-83 = "[s]「游泳？」"
10003065-84 = "我，那個……幾乎沒游過泳。"
10003065-85 = "從一項技能的角度來看，實在不是很熟練……#n我自己也深有所感，所以希望能趁這個機會稍微鍛鍊一下。"
10003065-86 = "根據亞子送來的日程表，我明天上午也是在房間裡待命……"
10003065-91 = "所以，老師。"
10003065-92 = "明天上午，可以教我游泳嗎？"
10003065-95 = "[ns]「嗯，當然。交給我吧！」"
10003065-96 = "……謝謝。那麼，明天就拜託囉。"
10003065-98 = "夏季集訓指揮室"
10003065-99 = "[ns]「……這就是事情的經過。」"
10003065-100 = "……"
10003065-101 = "那個……亞子醬？沒事吧？"
10003065-102 = "……太感動了！那個委員長，那個委員長竟然親口說出「想游泳」……！"
10003065-103 = "也就是說，委員長終於也想放暑假了！"
10003065-104 = "這……確實是件稀奇的事……"
10003065-105 = "老師也有能派上用場的時候呢，真令人刮目相看！"
10003065-106 = "多虧大家的努力，這次讓委員長休假的作戰進行得相當順利。"
10003065-107 = "好，現在可不是發呆的時候。#n這樣一來明天的目標就定下來了！"
10003065-108 = "為了讓委員長明天能平安地游泳！讓我們傾注全身的心血及靈魂吧！"
10003065-109 = "……"
10003065-110 = "……"
10003065-111 = "絕對，絕～對不能發生任何問題，各位都明白了嗎？#n哪怕要葬身海底也不許失敗！"
10003065-113 = "那麼為了明天的最終目標，獻上生命吧！解散！！"
10003065-116 = "……"
10003065-117 = "……"

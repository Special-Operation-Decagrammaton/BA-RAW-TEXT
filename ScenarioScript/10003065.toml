10003065-73 = "3;히나 수영복ND;02;아아, 물론 이번 훈련의 전권은 아코에게 맡겼던 건, 어디까지나 내 선택이었으니까. 이제 와서 뭐라 하고픈 건 아니지만.\n#3;em;[반응]"

[translation]
10012095-2 = "今天真的發生了很多事呢～☆"
10012095-3 = "好不容易中了頭獎，本來還很高興的……#n結果卻遇到一堆爛事……真討厭……"
10012095-5 = "茜香，免費的東西才是最貴的哦。"
10012095-6 = "白子前輩不是第一個準備泳衣的嗎！？"
10012095-7 = "這是兩回事。"
10012095-9 = "不過總算是告一段落了呢，太好了太好了。"
10012095-10 = "老師明明特地在百忙之中抽出時間，結果卻變成這樣……真不好意思。"
10012095-11 = "唔嘿～老師應該也很期待這難得的休假機會，結果卻被我們搞砸了呢～"
10012095-12 = "[s] 「不會，我沒關係。」"
10012095-13 = "沒關係……嗎？"
10012095-14 = "[s1] 「因為和大家過得很開心。」\n[s2] 「是個好假期唷。」"
10012095-17 = "呵呵……那就太好了☆"
10012095-18 = "[s] 「大家這個夏天，玩得開心嗎？」"
10012095-19 = "……突，突然說什麼啊！？"
10012095-20 = "茜香醬在害羞呢～真可愛真可愛～"
10012095-21 = "唔！連，連星野前輩也……！"
10012095-22 = "……嗯。要說的話那當然是──"
10012095-24 = "嗯～！非～常開心唷☆"
10012095-25 = "雖然發生了很多事……不過和大家，和老師一起度過了。"
10012095-27 = "嗯。茜香呢，如何？"
10012095-29 = "我，我嗎！？那，那當然是……！"
10012095-30 = "當，當然是，很，很，很開……"
10012095-31 = "[s] 「嗯，那我差不多該回去囉。」"
10012095-32 = "這樣啊……雖然遺憾，但畢竟老師很忙呢。"
10012095-33 = "那麼得趕快出發……不然就沒辦法用直升機送老師了。"
10012095-35 = "我們還得收拾，所以預計會留到明天。"
10012095-36 = "吶，我的回答還沒說完耶！？"
10012095-37 = "茜香醬～後續就等回去之後再慢～慢傳達也可以唷？"
10012095-38 = "不用了！我的感想已經說完了！"
10012095-39 = "是真的說完了！"
10012095-41 = "[ns] 「嗯，那我先回去了。」"
10012095-42 = "好的！那麼，我送老師回夏萊哦！"
10012095-43 = "路上小心～"
10012095-46 = "呵呵……雖然短暫，不知道老師在跟我們玩的這幾天有沒有放鬆到呢？"
10012095-47 = "很夠了。現在應該已經精神滿滿才對。"
10012095-48 = "是那樣就好了呢～"
10012095-49 = "那～接下來該做什麼好呢～回渡假勝地整理行李嗎～"
10012095-50 = "唉……回去之後得趕快開始排打工才行，假期也沒剩多久了……"
10012095-54 = "啊「渡假勝地使用券」……"
10012095-55 = "嗯？野乃美前輩，那已經不需要了吧？"
10012095-56 = "呵呵～我在想要不要帶回去做紀念之類的～"
10012095-57 = "嘿咻。"
10012095-59 = "……咦？"
10012095-60 = "野乃美醬，怎麼了嗎？"
10012095-61 = "那個……在這個角落……#n找到了「渡假勝地使用權」最終持有者的名字。"
10012095-62 = "咦，最終持有者！？"
10012095-63 = "剛才漏看了嗎？"
10012095-64 = "最終持有者也就是……這次騷動的元兇？"
10012095-65 = "就是引發「渡假勝地狩獵」，到處散布漏洞百出的「渡假勝地使用券」的主謀對吧？"
10012095-66 = "到底是誰！？"
10012095-67 = "野乃美醬～讓我也看一下～"
10012095-68 = "來，請看，星野前輩。"
10012095-69 = "嗯嗯，失樂園～渡假勝地投資及營運負責人……"
10012095-70 = "名字是……"
10012095-73 = "……咦？"
10012095-74 = "阿拜多斯渡假勝地復原對策委員會"

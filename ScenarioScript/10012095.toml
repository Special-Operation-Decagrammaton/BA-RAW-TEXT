[translation]
10012095-2 = "วันนี้มีเรื่องเกิดขึ้นเยอะเลยนะคะ~☆"
10012095-3 = "อุตส่าห์ดีใจที่ถูกรางวัลที่ 1 แต่สุดท้ายก็มีแต่เรื่องวุ่นวายเป็นที่ 1... ไม่เอาด้วยแล้ว..."
10012095-5 = "อื้ม เซริกะ ถึงจะเป็นของฟรี แต่เราจะรีบเอามาทันทีไม่ได้หรอกนะ"
10012095-6 = "แต่พอรู้ข่าว รุ่นพี่ชิโรโกะก็ไปเตรียมชุดว่ายน้ำคนแรกเลยไม่ใช่เหรอ?!"
10012095-7 = "นั่นมันคนละเรื่องกัน"
10012095-9 = "แต่ยังไงก็ดีแล้วละนะที่เรื่องมันจบแล้ว~"
10012095-10 = "คุณครูก็อุตส่าห์สละเวลามาด้วยกันทั้งๆ ที่ยุ่งด้วย ขอโทษที่เรื่องมันเป็นแบบนี้นะคะ..."
10012095-11 = "แหะๆ~ ฉันก็หวังไว้ว่าครูจะได้ใช้เวลาพักผ่อนอย่างเต็มที่ แต่ก็พังไม่เป็นท่าเพราะพวกเราเลย~"
10012095-12 = "[s] \"ไม่หรอก ครูไม่ได้ว่าอะไร\""
10012095-13 = "คะ?"
10012095-14 = "[s1] \"ยังไงเราก็ได้โกลาหลด้วยกันทั้งที\"\n[s2] \"มันไม่ได้แย่ขนาดนั้นหรอก\""
10012095-17 = "ฮิฮิ~☆ คุณครูเนี่ย พูดดีๆ กับพวกเราตลอดเลยนะคะ~☆"
10012095-18 = "[s] \"ทุกคนล่ะเป็นไงบ้าง? ฤดูร้อนนี้สนุกไหม?\""
10012095-19 = "มะ... มาถามอะไรน่าอายแบบนี้กันซึ่งๆ หน้าเนี่ย?!"
10012095-20 = "แหะๆ... อายกับเขาด้วยเหรอ~ เซริกะจัง~ น่ารักจังเลยน้า~"
10012095-21 = "อึก! ระ.. รุ่นพี่โฮชิโนะก็ด้วยเหรอ!"
10012095-22 = "ก็... ถ้าจะให้ตอบตามจริงละก็..."
10012095-24 = "ค่าา~! สนุกมากเลยค่ะ!"
10012095-25 = "ถึงจะมีแต่ความวุ่นวาย... แต่มันเป็นช่วงเวลาที่ฉันได้อยู่กับพวกเราชาวอะบิดอสและคุณครูค่ะ เวลาแบบนี้คงไม่ได้มีบ่อยๆ ด้วย..."
10012095-27 = "อื้ม แล้วเซริกะล่ะ?"
10012095-29 = "อะไร? ฉันเหรอ?!  เอ่อ... ก็...!"
10012095-30 = "ก็... สะ... สนุกอยู่หรอก..."
10012095-31 = "[s] \"อื้ม งั้นครูต้องขอตัวกลับก่อนแล้วกัน\""
10012095-32 = "จริงสิ~ งานที่ชาเล่ต์ของครูจะน่ากองเป็นภูเขาแล้วเนอะ สงสัยต้องกลับแล้วละ"
10012095-33 = "อ้อ! ฟ้าก็ใกล้จะมืดลงแล้วด้วย ถ้าไม่รีบก็คงเอาเฮลิคอปเตอร์ไปส่งไม่ได้นะคะ "
10012095-35 = "พวกเราต้องเก็บกวาดที่นี่ ก็เลยว่าจะอยู่กันต่อถึงพรุ่งนี้น่ะ"
10012095-36 = "เดี๋ยวสิ ฉันยังตอบไม่เสร็จเลยนะ?!"
10012095-37 = "เซริกะจัง~ เก็บความรู้สึกไปบอกทีหลังก็ได้ค่ะ~ ไว้เรากลับไปแล้วค่อยพูดคุยกันระหว่างเวลาน้ำชา#nกับคุณครูก็ได้นะคะ~ ฮิฮิ"
10012095-38 = "ไม่เอา! ฉันจะบอกความรู้สึกแค่วันนี้เท่านั้น!"
10012095-39 = "เพราะว่ามันจบแค่-!"
10012095-41 = "[ns] \"อื้ม งั้นครูไปก่อนนะ\""
10012095-42 = "ฉันจะไปส่งคุณครูให้ถึงชาเล่ต์อย่างปลอดภัยเองค่ะ!"
10012095-43 = "สู้ๆ นะ~ อายาเนะจัง~"
10012095-46 = "ฮิฮิ~ ถึงจะเป็นช่วงเวลาสั้นๆ ที่ได้พักผ่อนกับพวกเราที่นี่ แต่คุณครูก็ได้ชาร์จแบตตัวเองกลับไป#nใช่ไหมคะ?"
10012095-47 = "ต้องได้อยู่แล้ว น่าจะได้ชาร์จจนเต็มเลยละ"
10012095-48 = "ถ้างั้นก็ดีเลยค่ะ~"
10012095-49 = "เอาละ~ ถ้างั้นพวกเราก็มาเริ่มกันที่อะไรดีน้า~ ต้องกลับไปที่รีสอร์ตแล้วเก็บของก่อนไหมน้า~?"
10012095-50 = "เฮ้อ... ยังไงก็ถือว่าได้พักบ้างแหละนะ ถึงจะรู้สึกเหมือนมาเจอแต่เรื่องลำบากๆ ก็เถอะ ถ้ากลับไป#nต้องรีบหางานพาร์ทไทม์ทำอีกรอบแล้วละ วันหยุดพักร้อนก็เหลือไม่กี่วันแล้วด้วย..."
10012095-54 = "อ๊ะ... ตั๋วใช้งานรีสอร์ต..."
10012095-55 = "หืม? รุ่นพี่โนโนมิ ตอนนี้มันไม่จำเป็นแล้วไม่ใช่เหรอ?"
10012095-56 = "ฮุฮุฮุ~ แค่อยากเก็บเอาไปเป็นที่ระลึกน่ะค่ะ"
10012095-57 = "เอาละ~"
10012095-59 = "...อุ๊ย?"
10012095-60 = "มีอะไรเหรอ? โนโนมิจัง?"
10012095-61 = "อ่า... คือว่า ในส่วนท้ายสุดของหนังสือสัญญา... มีชื่อของผู้มีสิทธิ์ขั้นสุดท้ายเขียนไว้ด้วยค่ะ"
10012095-62 = "หืม?! ผู้มีสิทธิ์ขั้นสุดท้ายงั้นเหรอ?!"
10012095-63 = "เมื่อกี๊เราไม่ได้อ่านตรงนี้หรอกเหรอ?"
10012095-64 = "ผู้มีสิทธิ์ขั้นสุดท้ายก็คือ... ตัวการหลักที่ทำให้เกิดความวุ่นวายในครั้งนี้?"
10012095-65 = "หมายถึงผู้ที่โปรยหนังสือสัญญาที่มีช่องโหว่นี้ไปทั่วเพื่อให้เกิด 'การล่ารีสอร์ต' ใช่ไหม?!"
10012095-66 = "คนคนนั้นเป็นใครกันนะ?!"
10012095-67 = "โนโนมิจัง~ ขอลุงดูบ้างสิ~"
10012095-68 = "ฮุฮุ นี่ค่ะรุ่นพี่โฮชิโนะ"
10012095-69 = "งืมมม... ผู้ลงทุนและบริหารงานทั่วไปของลอสต์ พาราไดซ์~ รีสอร์ต..."
10012095-70 = "ชื่อนี้มัน..."
10012095-73 = "เอ๋...?"
10012095-74 = "คณะกรรมการแผนงานฟื้นฟูรีสอร์ตอะบิดอส"

[translation]
10012095-2 = "Today was so eventful! ☆"
10012095-3 = "I thought I won a great first place prize, but it landed us in this mess. This sucks."
10012095-5 = "Nothing is free in this world, Serika."
10012095-6 = "Don't act all high and mighty! You were the first to pack a swimsuit!"
10012095-7 = "I don't see the connection."
10012095-9 = "Regardless, let's just be glad it's over."
10012095-10 = "Sensei, you made time in your busy schedule for this. I'm sorry it ended up being a strange resort battle royale."
10012095-11 = "Heh. It looks like we ended up lying to Sensei about this being a vacation."
10012095-12 = "[s] \"There's nothing to apologize for.\""
10012095-13 = "Really?"
10012095-14 = "[s1] \"I had fun with all of you.\" \n[s2] \"It was a memorable vacation.\""
10012095-17 = "Aww! ☆ Sensei is always so nice! ☆"
10012095-18 = "[s] \"How about you? How do you feel about it?\""
10012095-19 = "D-Don't ask such bold questions outright!"
10012095-20 = "Heh! Serika is the cutest when she's embarrassed."
10012095-21 = "Ugh! H-Hoshino!"
10012095-22 = "...I enjoyed it immensely. Especially the survival activities."
10012095-24 = "Heehee! I'll always remember our barbecue!"
10012095-25 = "It was a bit chaotic...but when is it not with us?"
10012095-27 = "What about you, Serika?"
10012095-29 = "Huh? Me?! I-I...!"
10012095-30 = "O-Of course... I-It was f-fu—"
10012095-31 = "[s] \"Well. I should get going then.\""
10012095-32 = "You put off a lot of work back at home to come with us. I'm sure you have to get back to it."
10012095-33 = "Oh, you're right. We need to hurry or it'll be too dark for me to fly you back."
10012095-35 = "We'll stay until tomorrow to pack and clean up."
10012095-36 = "Hello?! I was talking!"
10012095-37 = "Aww, Serika! I promise we'll make time to reminisce later. Maybe we can have a tea party with Sensei! Heehee."
10012095-38 = "It's not like I wanted to reminisce. Ugh!"
10012095-39 = "Nevermind! I'm over it!"
10012095-41 = "[ns] \"I think that's my cue.\""
10012095-42 = "I'll escort Sensei to Schale safely and come back!"
10012095-43 = "Good luck, Ayane!"
10012095-46 = "Heehee! It was short-lived, but I hope Sensei had a fun vacation."
10012095-47 = "I'm sure Sensei is relaxed and fully recharged."
10012095-48 = "That would be wonderful!"
10012095-49 = "What do you kiddos want to do? Should we start packing?"
10012095-50 = "*sigh* I don't feel rested at all, but I need to get back to work. I don't have a lot of vacation days left..."
10012095-54 = "Oh, the Resort Contract...!"
10012095-55 = "Just toss it. We don't need that piece of crap."
10012095-56 = "Heeheehee! I'm gonna take it as a souvenir."
10012095-57 = "Let me put it..."
10012095-59 = "Oh?"
10012095-60 = "Is something wrong?"
10012095-61 = "Look, here. At the very end of the contract...it says \"Lost Paradise Proprietor.\""
10012095-62 = "Huh?! Like, the owner?!"
10012095-63 = "How did we miss it?"
10012095-64 = "The proprietor...would likely be the culprit."
10012095-65 = "You mean they're the one who spread these stupid contracts and loopholes to start this whole Resort Hunt thing?!"
10012095-66 = "Who is the jerk?"
10012095-67 = "Can I see, Nonomi?"
10012095-68 = "Here you go!"
10012095-69 = "Hmm. The Lost Paradise Proprietor...resort investment and operation manager..."
10012095-70 = "The name is..."
10012095-73 = "Huh?"
10012095-74 = "Abydos Resort Restoration Task Force"

[translation]
10042070-1 = "第7話;LAST GIRL STANDING"
10042070-4 = "茱莉同學！？"
10042070-9 = "不行，千夏。這樣他一定也會被捲進去的。"
10042070-10 = "仔細想想確實沒錯……！"
10042070-11 = "唔──！唔唔──！！！"
10042070-12 = "……總不能又多一個人變成那樣吧。"
10042070-13 = "但，但話雖如此……"
10042070-32 = "這邊！"
10042070-36 = "沒錯……看我這邊就對了！"
10042070-37 = "來！好好看清楚吧！！#n如果想繼續暴走的話……！！！"
10042070-39 = "就先通過我這關吧！！！"
10042070-43 = "停下來了……！？"
10042070-44 = "[ns]「這是……！」"
10042070-45 = "為了製造砲擊的機會而犧牲自己嗎……"
10042070-46 = "事情的發展真是越來越有趣了。#n是不是該配點爆米花呢？"
10042070-47 = "明明是這麼感人的場面，怎麼被你說得那麼平淡……？"
10042070-51 = "茱莉……！！"
10042070-52 = "茱莉同學……！！"
10042070-53 = "……（喀滋喀滋）"
10042070-59 = "老師，趁現在！"
10042070-61 = "[ns1]「它為了抓茱莉停下來了……！」\n[ns2]「就是現在！開火吧！」"
10042070-64 = "但，但是擁有砲擊權限的人……！"
10042070-65 = "行政官的嘴巴被觸手塞住……而且好像昏過去了。"
10042070-66 = "除非先轉移權限，否則砲台無法採取任何動作。"
10042070-67 = "這像話嗎！？你也是風紀委員，難道不能代替他下令嗎？"
10042070-68 = "那個……我也跟你一樣心急如焚……"
10042070-69 = "你不知道嗎？軍隊和醫院本來就是靠嚴明的權級制度運作的地方。"
10042070-70 = "都這種時候了還說這些！？！？"
10042070-71 = "事情我都聽說了。"
10042070-72 = "亞子突然大動作動員砲擊部隊，我還想說到底發生什麼事了……"
10042070-73 = "[ns]「這個聲音是……！」"
10042070-75 = "從現在起，亞子的砲擊部隊指揮權限將移交給夏萊的老師。"
10042070-76 = "所有動員部隊在作戰結束前，一切聽從老師指揮……以上。"
10042070-77 = "[s3]「陽奈！」\n[s4]「來得正是時候……！！」"
10042070-84 = "看起來沒什麼時間了。#n那麼老師……"
10042070-85 = "現場就麻煩你指揮了。"
10042070-86 = "……啊，還有。"
10042070-87 = "有個人應該幫得上忙，我已經把他叫醒並派過去了。"
10042070-88 = "幫得上忙的人……？"
10042070-89 = "該不會是！"
10042070-95 = "我回來了！！！"
10042070-96 = "這次我絕不會掉以輕心……一定要把之前的仇討回來！"
10042070-97 = "到了回收伏筆的時候了嗎。"
10042070-98 = "嗯，所有人都到齊了呢。"
10042070-99 = "那就麻煩您了，老師。"
10042070-103 = "[ns]「所有砲手預備──」"
10042070-105 = "[ns]「──發射！！！」"
10042070-116 = "巨大鬆餅的行動明顯慢下來了。"
10042070-117 = "不過似乎還需要某個決定性的「收尾」。"
10042070-118 = "嗯，在砲兵發動支援射擊後展開全面突擊，也是非常正規的戰術。"
10042070-119 = "[s5]「我知道了。」\n[s6]「那麼，去結束這場戰鬥吧。」"

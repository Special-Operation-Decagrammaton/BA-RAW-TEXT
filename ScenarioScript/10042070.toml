[translation]
10042070-1 = "ตอนที่ 7;LAST GIRL STANDING"
10042070-4 = "คุณจูริ?!"
10042070-9 = "ไม่ได้นะคะ ชินัตสึ ถ้าเข้าไปจะโดนหนวกลากตัวไปด้วยนะคะ"
10042070-10 = "มันก็จริงอย่างที่ว่าหรอกนะคะ...!"
10042070-11 = "อุ้บ! อุ้บบบ!!!"
10042070-12 = "เราต้องไม่เป็นแบบนั้นไปอีกคนสิคะ..."
10042070-13 = "ที่พูดมามันก็ไม่ผิดหรอกค่ะ..."
10042070-32 = "ทางนี้!"
10042070-36 = "ใช่... ต้องมองมาทางนี้สิ!"
10042070-37 = "เอาเลย! มองมาที่ฉันเลย!! และถ้าอยากลิงโลดไปมากกว่านี้ละก็...!!!"
10042070-39 = "ต้องข้ามศพฉันไปก่อน!!!"
10042070-43 = "หยุดแล้ว...!?"
10042070-44 = "[ns] \"นี่มัน...!\""
10042070-45 = "การเสียสละตัวเองเพื่อให้ปืนใหญ่หาจังหวะเล็งเป้า..."
10042070-46 = "เป็นฉากที่น่าสนใจจริงๆ เลยค่ะ ฉันไปเอาป๊อปคอร์นมาดีมั้ยคะ?"
10042070-47 = "ฉากน่าประทับใจขนาดนั้น แต่พูดอะไรเย็นชาแบบนั้นออกมาได้ยังไง..."
10042070-51 = "จูริ...!!"
10042070-52 = "คุณจูริ...!!"
10042070-53 = "(ง่ำๆ ง่ำๆ)..."
10042070-59 = "ได้ผลแล้วค่ะ คุณครู!"
10042070-61 = "[ns1] \"แพนเค้กหยุดแล้ว...!\"\n[ns2] \"ตอนนี้ละ! ยิงเลย!\""
10042070-64 = "ตะ... แต่คนที่มีอำนาจสั่งให้ยิงได้...!"
10042070-65 = "เจ้าหน้าที่อาวุโสโดนหนวดเจ้านั่นปิดปากไว้อยู่ค่ะ ตอนนี้เหมือนจะหมดสติไปแล้วด้วย..."
10042070-66 = "ถ้าไม่มีการโอนอำนาจสั่งการ ปืนใหญ่ก็ยิงออกไปไม่ได้ค่ะ"
10042070-67 = "แบบนี้มีที่ไหนกัน!? เธอก็เป็นคณะกรรมการวินัยไม่ใช่เหรอ!? สั่งการแทนไม่ได้หรือไง!?"
10042070-68 = "คือว่า... ถึงฉันจะอยากทำอย่างนั้นก็เถอะค่ะ..."
10042070-69 = "คงจะไม่รู้อะไรสินะคะ ปกติค่ายทหารกับโรงพยาบาลจะต้องเจอแต่เรื่องอึดอัดแบบนี้ละค่ะถึงจะบริหาร#nงานได้"
10042070-70 = "แล้วมันช่วยให้สถานการณ์ดีขึ้นยังไงเนี่ย?!?!"
10042070-71 = "ฉันได้ยินเรื่องแล้ว"
10042070-72 = "พอได้รับแจ้งว่าจู่ๆ อาโกะก็ลงมือทำบางอย่าง ฉันก็สงสัยว่าเรื่องอะไร..."
10042070-73 = "[ns] \"เสียงนี้มัน!\""
10042070-75 = "ฉันขอโอนอำนาจการใช้กองปืนใหญ่และอำนาจควบคุมการยิงของอาโกะให้ครูของชาเล่ต์เดี๋ยวนี้"
10042070-76 = "กองกำลังทั้งหมด ขอให้ปฏิบัติตามคำสั่งของครูจนกว่าจะเสร็จภารกิจ..."
10042070-77 = "[s3] \"ฮินะ!\"\n[s4] \"ไนซ์ ไทม์มิ่ง...!!\""
10042070-84 = "ดูเหมือนจะเหลือเวลาไม่มากนะ ครู"
10042070-85 = "ฝากสั่งการจากที่เกิดเหตุด้วยนะ"
10042070-86 = "อ้อ แล้วก็..."
10042070-87 = "ฉันปลุกคนที่พอจะช่วยได้แล้วส่งตัวไปทางนั้นแล้ว"
10042070-88 = "คนที่พอจะช่วยได้...?"
10042070-89 = "หรือว่าจะเป็น!"
10042070-95 = "ฉันกลับมาแล้ว!!!"
10042070-96 = "ครั้งนี้ฉันจะไม่ประมาทเด็ดขาด... จะล้างแค้นให้สาสมเลย!"
10042070-97 = "นี่สินะ การกลับมาแก้แค้นของคนที่คิดว่าจากไปแล้ว"
10042070-98 = "ค่ะ ทุกคนอยู่กันครบอีกครั้งแล้วนะคะ"
10042070-99 = "ถ้างั้นก็รบกวนด้วยค่ะ คุณครู"
10042070-103 = "[ns] \"ถ้านักแม่นปืนพร้อมแล้วละก็...\""
10042070-105 = "[ns] \"ยิงเลย!!!\""
10042070-116 = "แพนเค้กยักษ์เคลื่อนไหวช้าลงอย่างเห็นได้ชัดเลยค่ะ"
10042070-117 = "แต่เหมือนว่านี่เป็นจังหวะที่ต้องทำอะไรสักอย่างเพื่อ 'ปิดจ๊อบ' นะคะ"
10042070-118 = "ค่ะ การจู่โจมอย่างพร้อมเพรียงหลังการยิงสนับสนุนด้วยปืนใหญ่เป็นวิธีที่คลาสสิกเลยค่ะ"
10042070-119 = "[s5] \"อื้อ เข้าใจแล้ว\"\n[s6] \"ไปหยุดสงครามนี้กันเถอะ\""

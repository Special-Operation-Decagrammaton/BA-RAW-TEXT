[translation]
1003303-1 = "一起單人約會"
1003303-2 = "（各種事情告一段落，來到了久違的假日）"
1003303-3 = "[s1]「畢竟是難得的假日……」\n[s2]「今天來做點平時沒時間做的事吧……」"
1003303-11 = "（首先，來到了夏萊附近的購物中心）"
1003303-12 = "[s]「啊，剛好有什麼特賣……？」"
1003303-13 = "今天非常感謝百忙之中前來的各位貴賓！"
1003303-14 = "由於今天是本店開店的15周年！#n作為紀念，目前正在舉辦「SSS級最高級牛肉特別折扣活動」！"
1003303-15 = "限量100包！最先購買的100位客人將享有優惠價格，走過路過不要錯過哦！"
1003303-16 = "那麼現在開始販售！"
1003303-21 = "（跟著一擁而上的人群，成功排到了感覺可以買到的位置）"
1003303-22 = "好的，麻煩下一位客人！謝謝惠顧！好的，下一位……！"
1003303-26 = "（就這樣等著等著，總算是排到了）"
1003303-27 = "來，這邊是最後一包！請收下──"
1003303-33 = "咯咯咯！"
1003303-34 = "我就心懷感激地收下了！"
1003303-35 = "啊啊！這，這位客人！？"
1003303-36 = "[s]「等，等一下……怎麼可以插隊！？」"
1003303-37 = "插隊？"
1003303-38 = "是你動作慢吞吞的搞得我很煩，我才會跑到前面來啊！"
1003303-39 = "而且先搶先贏不就是先來的人贏嗎？"
1003303-40 = "不高興的話，你也插隊不就好了！"
1003303-41 = "[s]「那是什麼歪理……」"
1003303-43 = "少囉唆！總之這是我的東西了！"
1003303-44 = "你也不用那麼失望！#n我會連你的份一起，用心、盡力、美味地享用！哈哈！"
1003303-45 = "話說該去哪裡結帳……"
1003303-51 = "咦！？"
1003303-55 = "這，這位客人？"
1003303-59 = "[ns]「……嗯！？」"
1003303-60 = "這，這位客人！？"
1003303-61 = "這……失去意識了！？"
1003303-62 = "請，請呼叫醫療人員！！有傷患……！"
1003303-66 = "呼……雖然發生了一點狀況，現在還剩下最後一包限定版最高級牛肉呢。"
1003303-67 = "這位客人，您打算怎麼做呢？"
1003303-68 = "[s]「啊，那我就不客氣了……話說剛才那位客人真的沒事嗎？」"
1003303-76 = "（買到了最高級牛肉之後，前往了最近在SNS成為話題的家庭餐廳）"
1003303-80 = "[ns]「在SNS熱門的餐點記得是……」"
1003303-81 = "呀哈哈哈！這個還挺好吃的嘛！"
1003303-82 = "給我再拿一份來！"
1003303-83 = "嗯～把飲料吧的飲料全部混在一起看看吧！"
1003303-87 = "怎麼那麼吵啊……"
1003303-88 = "噓！小聲一點！會被那些人聽到的……！"
1003303-89 = "聽說在SNS上很有名才來的，這樣根本不能好好吃飯……"
1003303-90 = "呀哈哈哈！"
1003303-91 = "呼嘻嘻嘻嘻！！"
1003303-92 = "啊呀呀呀！"
1003303-97 = "那，那個，客人……這樣會造成其他客人的困擾，麻煩稍微控制一下音量……"
1003303-100 = "啊？意思是我們很吵就對了？"
1003303-101 = "竟敢說這種話，之後可別後悔哦？"
1003303-102 = "怎麼，要讓你見識一下什麼才是真正的「吵」嗎？"
1003303-104 = "噫……！？"
1003303-105 = "[s]「你們先等等，再這樣造成別人困擾的話……」"
1003303-108 = "啊啊？"
1003303-109 = "你是……"
1003303-110 = "是夏萊的老師對吧！"
1003303-111 = "什麼！之前的事你還沒忘記吧！"
1003303-112 = "很好！現在就把當時的仇給──"
1003303-125 = "三，三位客人？那個，各位沒事吧！？"
1003303-129 = "是，是狙擊……？"
1003303-130 = "子，子彈是從哪裡飛過來的？"
1003303-131 = "[s]「又來了……？」"
1003303-140 = "（假日的行程結束，最後來到了便利商店買日常用品）"
1003303-141 = "[s3]「雖然是狀況連連的一天……」\n[s4]「來到這裡應該就沒事了吧……」"
1003303-146 = "[ns]「嗯！果然沒有這種好事！」"
1003303-147 = "怎，怎麼回事！？"
1003303-148 = "哼哈哈哈！這間便利商店就由我們收下了！"
1003303-149 = "還不趕快把收銀機裡的現金全部交出來！"
1003303-156 = "[ns]「等，等等！」"
1003303-164 = "咕哈啊！？"
1003303-165 = "什，什麼……！？"
1003303-170 = "[ns]「…………」"
1003303-173 = "（明明是難得的假日卻碰上了許多事件，#n　結果還沒能消除疲勞，假日就這麼結束了）"
1003303-175 = "（隔天……）"
1003303-176 = "[s]「昨天究竟是怎麼回事呢……」"
1003303-180 = "[ns]「嗯？請問是哪位？」"
1003303-184 = "唔呵呵呵……老師，一天沒見了呢。#n若藻我，儘管十分害羞還是再次前來拜訪了。"
1003303-185 = "昨天一同度過的時光，令我感到相當高興和幸福。"
1003303-186 = "啊啊，一回想起這段回憶……#n即便明白今天並非您的假日，卻實在無法壓抑想見到閣下的火熱心意……"
1003303-187 = "於是再次前來拜訪了♡"
1003303-188 = "[s]「這，這樣啊……呃，昨天？」"
1003303-189 = "哎呀？"
1003303-190 = "莫非……您不記得了嗎？"
1003303-191 = "明明若藻我，僅因為昨天的回憶，心裡便如此小鹿亂撞……？"
1003303-192 = "[s]「我真的沒搞清楚狀況，可以麻煩你從頭開始說明嗎！？」"
1003303-193 = "好的，我知道了。"
1003303-194 = "如果老師希望的話，說明這點小事不足掛齒。"
1003303-195 = "啊啊～昨天真讓人困擾呢。#n能在老師難得的假日進行約會固然是件好事……"
1003303-196 = "[s]「約，約會？」"
1003303-197 = "卻不巧碰見了忌妒我們約會的無知之人……"
1003303-198 = "呵呵，不過能一起獲得SSS級的牛肉真是幸運呢。"
1003303-199 = "您今天打算如何料理呢？"
1003303-200 = "和老師一起談論喜愛的料理、交流彼此的喜好和口味……#n若藻我，光是想像就……"
1003303-201 = "彷彿觸及到了閣下內心深處一般，開心得無法自拔。"
1003303-202 = "[s]「？？？」"
1003303-203 = "然而……"
1003303-204 = "唉，可惜之後前往的餐廳也同樣令人不禁皺眉……"
1003303-205 = "都怪那群毫不在意他人目光的吵鬧飛蟲……"
1003303-206 = "本想當場將他們全數蹂躪殆盡……"
1003303-207 = "但最終還是忍住了。"
1003303-208 = "我並不希望糟蹋閣下寶貴的時間，因此選擇點到為止。#n不過在那之後又在便利商店遭遇了不知天高地厚的強盜……"
1003303-209 = "連假日都如此棲悽遑遑……這也是與閣下同行時無可避免的命運嗎……呵呵。"
1003303-210 = "真拿閣下沒辦法呢♡"
1003303-214 = "[ns]「也就是說，若藻昨天一直在跟蹤我……？」"
1003303-215 = "跟蹤……？"
1003303-216 = "不，若藻我只是維持著不會踏及閣下影子的距離，跟在您身後而已唷？"
1003303-217 = "啊，這只能稱之為約會了吧。"
1003303-218 = "啊啊，不過今後您不必擔心。"
1003303-219 = "為了避免這樣的不幸再度發生……"
1003303-220 = "下次我會事先將所有阻礙清除乾淨──"
1003303-221 = "打造僅有彼此的約會……！"
1003303-222 = "[s]「STOP！等等！你先冷靜，若藻！」"
1003303-223 = "咦……？"
1003303-224 = "[s]「那個……對了！下次不用在後面跟著我沒關係！」"
1003303-231 = "哎呀？"
1003303-232 = "[s5]「下次就直接手牽著手約會吧！」\n[s6]（不然在看不見的地方引起問題就麻煩了！）"
1003303-237 = "啊，啊啊……老，老師您竟然那麼直接……對我如此積極……！"
1003303-238 = "好，好的……那，那麼……"
1003303-239 = "若，若若若藻我，很期待，那個時候的到來……！"
1003303-240 = "先，先告辭了……！"
1003303-245 = "（目送慌張的若藻逃也似地離開了）"

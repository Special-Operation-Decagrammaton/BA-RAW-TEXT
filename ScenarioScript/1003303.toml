[translation]
1003303-1 = "เดตตามลำพังของสองเรา"
1003303-2 = "(วันหยุดพักผ่อนหลังจากไม่ได้หยุดมาสักพักใหญ่)"
1003303-3 = "[s1] \"ไม่ได้หยุดมานานแล้วนะเนี่ย...\"\n[s2] “ได้เวลาทำเรื่องที่ค้างไว้แล้วล่ะ”"
1003303-11 = "(สถานที่แรกที่ไปก็คือห้างสรรพสินค้าใกล้ๆ ชาเล่ต์)"
1003303-12 = "[s] “ได้ยินมาว่าวันนี้มีของลดราคาพิเศษด้วย...”"
1003303-13 = "ขอบคุณนะที่อุตส่าห์แวะมาจับจ่ายใช้สอยที่ร้านเราในวันนี้นะครับ!"
1003303-14 = "เพื่อเป็นการฉลองครบรอบ 15 ปีของการเปิดร้าน วันนี้จะมีกิจกรรมลดราคาพิเศษ#nสำหรับเนื้อวัวพรีเมี่ยมเกรด SSS ครับ!"
1003303-15 = "มีจำหน่ายแค่ 100 แพ็ก! พิเศษสำหรับลูกค้า 100 ท่านแรกเท่านั้น! ห้ามพลาดโอกาสเด็ดขาดเลยนะครับ!"
1003303-16 = "จะเปิดการขายแล้วนะคร้าบบบบ!"
1003303-21 = "(คุณครูเบียดเสียดแย่งชิงไปเข้าแถวได้ทันเวลาพอดี)"
1003303-22 = "ครับ เชิญท่านต่อไปครับ!#nขอบคุณที่แวะมาอุดหนุนกันนะครับ!... ท่านต่อไปเลยครับ!"
1003303-26 = "(หลังจากยืนรออยู่นานก็ถึงคิวสักที)"
1003303-27 = "เนื้อวัวเหลือแพ็กสุดท้ายแล้ว เชิญลูกค้าท่านต่อไปได้เลยครับ!"
1003303-33 = "หึหึหึ!"
1003303-34 = "ฉันขอรับไปก็แล้วกัน!"
1003303-35 = "อ๊ะ! คะ... คุณลูกค้า!"
1003303-36 = "[s] “เดี๋ยวสิ...! จะแซงคิวงั้นเหรอ!”"
1003303-37 = "แซงคิว?"
1003303-38 = "เปล่าสักหน่อย ก็ฝั่งนั้นเดินช้าอืดอาดยืดยาด ฉันเห็นแล้วหงุดหงิดก็เลยเดินมาก่อนแค่นั้นเอง!"
1003303-39 = "แล้วถ้าฉันแซงคิวแล้วมันจะทำไมมิทราบ? คนที่มาก่อนก็ต้องได้ก่อนไม่ใช่เหรอ?"
1003303-40 = "การแย่งชิงเนื้อลดราคาไม่มีคำว่าแซงคิวหรอก!"
1003303-41 = "[s] “ช่างพูดจริงๆ เลยนะ”"
1003303-43 = "ช่างเถอะ! ยังไงฉันก็ได้ของมาแล้ว!"
1003303-44 = "ไม่ต้องผิดหวังไปหรอกนะ! ฉันจะกินเนื้อวัวนี้อย่างเอร็ดอร่อยแทนให้เอง! ฮ่ะฮ่ะฮ่า!"
1003303-45 = "งั้นก็ขอตัวล่ะ"
1003303-51 = "อ๊ะ?!"
1003303-55 = "คะ... คุณลูกค้า?"
1003303-59 = "[ns] “อะไรเนี่ย...?\""
1003303-60 = "เอ่อ คะ... คุณลูกค้า ไม่เป็นไรอะไรใช่ไหมครับ?!"
1003303-61 = "อะไรเนี่ย... หมดสติไปแล้วเหรอ?"
1003303-62 = "ใครก็ได้ตามหน่วยแพทย์มาทีครับ! ช่วยเรียกหน่วยแพทย์ให้ทีครับ! มีคนหมดสติ!"
1003303-66 = "ฮู่ว...ถึงจะเกิดปัญหาเล็กๆ น้อยๆ แต่ก็ยังเหลือเนื้อวัวคุณภาพดีอีกแพ็กหนึ่งนะครับ"
1003303-67 = "คุณลูกค้า จะรับหรือเปล่าครับ?"
1003303-68 = "[s] “แน่นอน... ว่าแต่คนนั้นไม่เป็นอะไรจริงเหรอ?”"
1003303-76 = "(หลังจากบังเอิญซื้อเนื้อวัวคุณภาพดีมาได้ คราวนี้คุณครูเลยลองหาร้านอาหารชื่อดัง#nบนโซเชียลเพื่อที่จะไปทานมื้อกลางวัน)"
1003303-80 = "[ns] “เมนูที่กำลังฮิตบนโซเชียลช่วงนี้...”"
1003303-81 = "อาหารที่นี่! อร่อยเหมือนที่เขาบอกกันจริงด้วย!"
1003303-82 = "เอามาอีกจาน! ขอสั่งอีกจาน!"
1003303-83 = "อืม~ ผสมเครื่องดื่มที่บาร์เครื่องดื่มทั้งหมดเลยดีกว่า~"
1003303-87 = "เสียงดังไปหน่อยหรือเปล่า?"
1003303-88 = "ชู่ว! เงียบๆ สิ เดี๋ยวนักเลงพวกนั้นก็ได้ยินหรอก"
1003303-89 = "อุตส่าห์มาเพราะเป็นร้านดังในโซเชียลแท้ๆ ถ้าเป็นอย่างนี้คงไม่ได้กินอาหารอย่างมีความสุขแน่..."
1003303-90 = "คิกๆๆๆ!"
1003303-91 = "คิคิคิคิคิคิ!"
1003303-92 = "อะฮ่ะฮ่ะฮ่ะ~"
1003303-97 = "คะ... คุณลูกค้า... ช่วยลดเสียงลงหน่อยได้ไหมครับ จะได้ไม่เป็นการรบกวนลูกค้าท่านอื่น..."
1003303-100 = "ฮะ? จะบอกว่าพวกเราเสียงดังหนวกหูงั้นเหรอ?"
1003303-101 = "พูดแบบนั้นแล้วคิดว่าเราจะรู้สึกผิดรึไง?"
1003303-102 = "ให้แสดงให้ดูมั้ยว่าสิ่งที่น่าหนวกหูของจริงน่ะมันเป็นยังไง?"
1003303-104 = "ฮึ่ก คะ...คือว่า..."
1003303-105 = "[s] “เดี๋ยวสิ สร้างความเดือดร้อนให้คนอื่นแบบนี้ไม่ได้นะ...”"
1003303-108 = "หา?!"
1003303-109 = "คนคนนี้...?"
1003303-110 = "คุณครูของชาเล่ต์นี่!"
1003303-111 = "ว่าไงนะ! คิดว่าพวกเราจะลืมเรื่องเมื่อคราวก่อนไปแล้วงั้นเหรอ?!"
1003303-112 = "ฮึ่ย! แก้แค้นตอนนี้ก็ไม่สาย..."
1003303-125 = "คะ... คะ... คุณลูกค้า?#nเอ่อ... เป็นอะไรหรือเปล่าครับ คุณลูกค้า?!"
1003303-129 = "ดะ... โดนลอบยิงงั้นเหรอ?"
1003303-130 = "มะ... เมื่อกี้มาจากไหนน่ะ?"
1003303-131 = "[s] “อีกแล้วเหรอ...?”"
1003303-140 = "(พอเสร็จจากธุระในวันหยุดแล้วคุณครูก็เลยแวะไปที่ร้านสะดวกซื้อเพื่อซื้อของใช้จำเป็น)"
1003303-141 = "[s3] “วันนี้มันวันอะไรกันเนี่ย...”\n[s4] “มาถึงที่นี่แล้ว คงไม่มีเรื่องอะไรหรอกมั้ง...?”"
1003303-146 = "[ns] “โธ่เอ๊ย อีกแล้วเรอะ!”"
1003303-147 = "กะ... เกิดอะไรขึ้นกันเนี่ย?"
1003303-148 = "ฮะฮะฮ่า! พวกเรายึดร้านสะดวกซื้อนี้แล้ว!"
1003303-149 = "อย่าส่งเสียงดังแล้วส่งเงินสดในเคาน์เตอร์มาให้หมด!"
1003303-156 = "[ns] “ดะ... เดี๋ยวก่อน!”"
1003303-164 = "อ๊ะ... อ๊ากกกก?!"
1003303-165 = "ดะ...โดนเข้าแล้ว!"
1003303-170 = "[ns] “???”"
1003303-173 = "(แม้ว่าจะเป็นวันหยุดที่นานๆ จะมีสักที แต่พอเจอเรื่องราวมากมายแบบนั้น วันหยุดก็ผ่านไป#nอย่างน่าเหน็ดเหนื่อย)"
1003303-175 = "(วันต่อมา)"
1003303-176 = "[s] “เมื่อวานนี้มันเกิดอะไรขึ้นกันแน่”"
1003303-180 = "[ns] \"ใครน่ะ...?”"
1003303-184 = "ฮุฮุฮุ วาคาโมะเองค่ะ วันนี้วาคาโมะก็มาหาคุณครูอีกแล้วค่ะ"
1003303-185 = "ช่วงเวลาที่ได้ใช้ด้วยกันเมื่อวานช่างมีความสุขเหลือเกินค่ะ"
1003303-186 = "เอาแต่คิดถึงเรื่องเมื่อวานนี้วนไปวนมา ทั้งๆ ที่รู้ว่าวันนี้ไม่ใช่วันหยุดของคุณครู#nแต่ฉันก็ทนเสียงเรียกร้องของหัวใจไม่ไหว..."
1003303-187 = "วันนี้ก็เลยมาเจอคุณครูอีกค่ะ ♡"
1003303-188 = "[s] \"เดี๋ยวนะ เมื่อวานเราอยู่ด้วยกันเหรอ?”"
1003303-189 = "คะ? "
1003303-190 = "หรือว่า... จำอะไรไม่ได้เลยอย่างนั้นเหรอคะ?"
1003303-191 = "วาคาโมะผู้นี้ ยังใจเต้นแรงกับเรื่องเมื่อวานอยู่เลยแท้ๆ..."
1003303-192 = "[s] “ช่วยอธิบายให้ฟังหน่อยได้มั้ย?!”"
1003303-193 = "คะ? งะ... งั้นเหรอคะ?"
1003303-194 = "ฮุฮุ ถ้าคุณครูต้องการ ฉันก็พร้อมจะอธิบายให้ฟังค่ะ..."
1003303-195 = "อ่า~ เมื่อวานนี้ก็ลำบากพอตัวเลยค่ะ ฉันรู้สึกดีที่เดตแรกของเราได้ออกไปใช้เวลาด้วยกันในวันหยุดของคุณครู"
1003303-196 = "[s] \"หืม? ดะ... เดตงั้นเหรอ?”"
1003303-197 = "ตอนแรกพวกเราไปเจอพวกแมลงเกะกะที่อิจฉาการเดตของพวกเรา..."
1003303-198 = "ฮุฮุ แต่ถึงอย่างนั้นก็โชคดีที่ได้เนื้อวัว SSS คุณภาพดีกลับมาด้วยนะคะ"
1003303-199 = "แล้วนี่วันนี้เราจะเอามาทำอะไรกินกันดีเหรอคะ?"
1003303-200 = "อยากจะคุยเรื่องอาหารที่ชอบกับคุณครู... แค่จินตนาการว่าจะได้คุยกันเรื่องรสชาติ#nที่ชอบและเรื่องรสนิยมกัน..."
1003303-201 = "วาคาโมะก็ดีใจที่เหมือนจะได้รู้เรื่องของคุณท่านมากขึ้นเลยค่ะ"
1003303-202 = "[s] “??”"
1003303-203 = "แต่ว่า..."
1003303-204 = "เฮ้อ หลังจากนั้นก็ไปหาร้านอาหารเพื่อทานมื้อกลางวัน แต่ก็ต้องเจอเรื่องน่าปวดหัวอีกจนได้ค่ะ"
1003303-205 = "พวกหนอนแมลงน่ารำคาญที่ส่งเสียงดังโดยไม่สนใจสายตาคนอื่นเลย..."
1003303-206 = "ถึงในใจฉันอยากจะขยี้พวกนั้นให้แหลกคาที่ไปเลยก็ตาม"
1003303-207 = "แต่ก็ทำแบบนั้นไม่ได้ เพราะไม่อยากจะทำให้ช่วงเวลาที่อยู่กับคุณท่านต้องแปดเปื้อน ฉันตักเตือนพวกนั้นไปนิดหน่อยค่ะ"
1003303-208 = "จากนั้นร้านสะดวกซื้อที่แวะไปเป็นที่สุดท้ายก็ดันมีโจรบุกมาปล้นอีก..."
1003303-209 = "ช่างเป็นวันที่เกิดเรื่องต่างๆ มากมายจริงๆ นะคะ แต่สุดท้ายฉันก็ได้ใช้เวลาอยู่กับคุณท่าน..."
1003303-210 = "เพราะคุณท่านเป็นดั่งข้อยกเว้นทุกอย่างไงค่ะ♡"
1003303-214 = "[ns] “หมายความว่าวาคาโมะสะกดรอยตามครูงั้นเหรอ...?”"
1003303-215 = "สะกดรอยตาม...?"
1003303-216 = "วาคาโมะผู้นี้ก็เพียงแค่เดินตามคุณท่าน โดยที่เว้นระยะห่างเอาไว้หนึ่งก้าวตลอดเท่านั้นเองนะคะ"
1003303-217 = "สำหรับฉันนี่ก็ไม่ต่างอะไรกับการเดตเลยค่ะ"
1003303-218 = "แต่คุณท่านไม่ต้องห่วงหรอกนะคะ"
1003303-219 = "เพื่อไม่ให้เกิดเรื่องร้ายแบบนี้อีกในอนาคต"
1003303-220 = "ต่อไปฉันจะกำจัดพวกหนอนแมลงที่มาขัดขวางไปให้พ้นทางตั้งแต่แรกเลยค่ะ...!"
1003303-221 = "จะได้ไม่มีใครมาขัดขวางการเดตของสองเราอีกค่ะ...!"
1003303-222 = "[s] “เดี๋ยวก่อน วาคาโมะ!”"
1003303-223 = "คะ...?"
1003303-224 = "[s] “คราวหน้าห้ามมาเดินตามแบบนี้อีกนะ\""
1003303-231 = "ตายจริง... "
1003303-232 = "[s5] “ครั้งหน้ามาจับมือกันแล้วไปเดตกันเถอะ!”\n[s6] (เพราะถ้าไปก่อเรื่องในที่ที่มองไม่เห็นเดี๋ยวจะเป็นเรื่องใหญ่อีก!)"
1003303-237 = "เอ่อ อ๊ะ คะ...คือว่า ถ้าเกิด คะ...คุณครูว่าอย่างนั้น...!"
1003303-238 = "ตะ...ตกลงค่ะ ถ้าคุณท่านต้องการแบบนั้น"
1003303-239 = "วาคาโมะจะตั้งตารอให้ถึงตอนนั้นค่ะ! "
1003303-240 = "ถะ...ถ้างั้นไว้พบกันใหม่นะคะ…!"
1003303-245 = "(จากนั้นคุณครูก็ยืนมองวาคาโมะที่รีบวิ่งออกไปจากห้องด้วยสีหน้าที่ว่างเปล่า...)"

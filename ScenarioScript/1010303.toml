[translation]
1010303-1 = "หญิงงามย่อมไม่ปริปากพูด"
1010303-2 = "อ๊ะ ครู มาแล้วเหรอ ฉันอยู่ทางนี้"
1010303-3 = "[s] \"โทษที มารินะ รอนานเลยใช่มั้ย?\""
1010303-4 = "พูดอะไรแบบนั้นน่ะ ฉันไม่คิดมากหรอก"
1010303-5 = "งั้นวันนี้เราไปทัวร์ซานไห่จิงกันต่อเถอะ ไปกันเลยมั้ย?"
1010303-7 = "ดูนั่นสิ คนนั้นน่ะ เหมือนที่ฉันพูดเลยใช่มั้ย?"
1010303-8 = "จะ... จริงด้วย... ตายจริง แค่อยู่ตรงนั้นเฉยๆ ก็ดึงดูดสายตาทุกคนได้หมดเลย"
1010303-10 = "อืม..."
1010303-11 = "[s] \"รู้สึกบรรยากาศมันแปลกๆ ชอบกลๆ แฮะ...?\""
1010303-12 = "ครูก็คิดแบบนั้นเหรอ? นึกว่าฉันคิดไปเองซะอีก..."
1010303-13 = "ฉันแค่นั่งรออยู่เฉยๆ เอง แต่ดูเหมือนทุกคนที่อยู่รอบๆ จะหันมามองกันหมดเลย"
1010303-15 = "ไม่เคยเห็นหน้ามาก่อนเลยแฮะ แต่มีเสน่ห์แบบพวกองครักษ์เลย... ว่ามั้ย?"
1010303-16 = "ถึงแขนขาจะเรียวยาวแต่กลับไว้ผมสั้น แต่ว่าก็ดูเข้ากันสุดๆ"
1010303-17 = "ปกติแล้วพวกสาวงามมักจะมีผมสีดำยาวสลวย และได้ยินว่าเวลาถักเปียก็จะบางเบาเหมือนปีกจั๊กจั่น#nเลยด้วยนะ?"
1010303-18 = "แต่ว่าเด็กคนนั้น... กลับให้ภาพลักษณ์ของสาวงามที่แปลกใหม่เลยละ ฮู่ว..."
1010303-20 = "ถ้าฉันเข้าใจผิดก็คงดีนะ... พอคุณครูมาถึงก็รู้สึกได้ถึงสายตาที่มองมาเยอะขึ้นกว่าเดิมเลย..."
1010303-21 = "เพราะอะไรกันนะ... ครูพอจะเดาเหตุผลได้รึเปล่า?"
1010303-22 = "[s] \"เหมือนจะรู้แต่ก็ไม่รู้...\""
1010303-23 = "งั้นเหรอ..."
1010303-25 = "อาจเพราะนี่เป็นครั้งแรกที่สวมชุดของซานไห่จิง..."
1010303-26 = "แต่ก็ไม่ได้รู้สึกว่าไม่เป็นธรรมชาติเลย แต่ถ้าสังเกตดีๆ จะเห็นว่ามีบางอย่างที่ดูกระอักกระอ่วนอยู่บ้าง..."
1010303-28 = "แต่กลับช่วยเพิ่มเสน่ห์ขึ้นไปอีกระดับหนึ่ง..."
1010303-29 = "ดูดีจังเลยนะ น่าอิจฉาจัง..."
1010303-31 = "ก่อนอื่นรีบไปจากตรงนี้ก่อนดีกว่ามั้ย"
1010303-32 = "เห็นด้วยงั้นเหรอ? ดีละ ถ้าตกลงแล้วก็รีบไปกันเลยเถอะ"
1010303-33 = "ถ้าเป็นแบบนี้ต่อไป... ฉันคงระเบิดตู้มเพราะความเขินแน่ๆ..."
1010303-34 = "เดี๋ยวก่อนครับ! พวกคุณสองคน รอเดี๋ยวก่อนครับ"
1010303-35 = "[s] \"เอ่อ... ใครน่ะ?\""
1010303-39 = "ผมเป็นช่างภาพที่ผ่านมาแถวนี้น่ะ! พอดีมีเรื่องอยากถามนักเรียนคนนั้นหน่อย!"
1010303-40 = "เอ่อ... ฉันเหรอ?"
1010303-41 = "ใช่แล้วครับ! เวลาที่ผมเห็นสิ่งสวยๆ งามๆ ผมก็อยากจะเก็บสิ่งๆ นั้นเอาไว้...!  "
1010303-42 = "ผมอยู่ระหว่างเดินทางไปทั่วคิโวทอส และกำลังทำโฟโต้บุ๊คเกี่ยวกับทิวทัศน์ดีๆ สถานที่สวยๆ และผู้คนที่สวยงามอยู่ครับ"
1010303-43 = "อ๊ะ ว่าแต่ว่าช่วยบอกชื่อของเธอหน่อยได้มั้ย? ผมต้องตั้งชื่อโฟโต้บุ๊คด้วยน่ะครับ!"
1010303-44 = "ชื่อฉันเหรอ? ฉันชื่ออิเคะคุระ มารินะ"
1010303-45 = "คุณมารินะสินะครับ ขอบคุณมากครับ! งั้น... ผมอยากลองถ่ายรูปคุณมารินะดูสักหน่อยได้รึเปล่าครับ?! "
1010303-47 = "หะ... หาาาา?!"
1010303-48 = "ผมคอยสังเกตคุณมาตลอดเลยนะครับ... สายตาของคุณมารินะที่จมอยู่ในความคิดคนเดียวเงียบๆ ขณะที่รอใครบางคน! "
1010303-49 = "ทำให้ผมนึกถึงเรื่องราวของเหล่าสาวงามที่เล่าต่อกันมาในซานไห่จิงครับ!"
1010303-50 = "หมายถึงอะไรน่ะ?!"
1010303-51 = "ในซานไห่จิงมีคำกล่าวว่า \"จันทร์ซ่อนบุปผาอาย\" อยู่ด้วยครับ "
1010303-52 = "เล่ากันว่ามีหญิงงามคนหนึ่งเงยหน้าขึ้นมองดวงจันทร์ และทำให้ดวงจันทร์ได้รู้ว่าตนเองยังมีความงดงาม เทียบหญิงสาวคนนั้นไม่ได้ จึงเกิดความละอายและหนีไปซ่อนตัวอยู่หลังก้อนเมฆ จึงเรียกว่า 'จันทร์ซ่อน' ครับ!"
1010303-53 = "จากนั้นหญิงสาวก็ไปที่สวนเพื่อชื่นชมความงามของดอกไม้ แต่เมื่อเธอสัมผัสดอกไม้บางอย่างเข้าโดย#nบังเอิญ"
1010303-54 = "ดอกไม้รู้สึกเขินอายจึงหลบหลีกซ่อนตัว เป็นที่มาของคำว่า 'บุปผาอาย' ครับ"
1010303-55 = "พูดอะไรไม่เข้าใจเลยแฮะ..."
1010303-56 = "และภาพของคุณมารินะที่ผมเห็น ก็ไม่ได้ด้อยกว่าสาวงามในเรื่องเล่าเหล่านั้นเลยครับ!"
1010303-57 = "เข้าใจผิดแล้วละ! คะ... คิดแล้วเชียวว่าควรปฏิเสธไป..."
1010303-58 = "ถ้างั้นเอาแบบนี้เป็นไงครับ? ถ้าคุณยอมเป็นนางแบบให้ผมถ่ายแบบ ผมจะมอบโฟโต้บุ๊คแพนด้า... ที่ถ่ายไว้ให้คุณครับ!"
1010303-59 = "ฟะ... โฟโต้บุ๊คแพนด้าเหรอ?! นั่นมัน... นั่นมัน... เรื่องนั้นมัน...!"
1010303-61 = "ว่ายังไงล่ะครับ? การแลกเปลี่ยนที่เท่าเทียม แลกรูปกับรูปยังไงล่ะครับ ผมคิดว่ามันเป็นข้อเสนอที่ไม่#nเลวเลยนะครับ"
1010303-62 = "ทะ... ทำยังไงดีล่ะ ครู?!"
1010303-63 = "[s1] \"ก็นะ... ทำตามที่มารินะอยากทำก็ได้นี่นา\"\n[s2] \"รูปตอนมารินะเป็นนางแบบ... ครูก็อยากเห็นนะ\""
1010303-66 = "พะพะพะพะ... พูดอะไรน่ะ ครู!"
1010303-67 = "แต่ว่า... ถ้าครูคิดแบบนั้น..."
1010303-68 = "แถมยังมีโฟโต้บุ๊คแพนด้าด้วย... แพนด้า... แพนด้า..."
1010303-69 = "ดะดะ... ดะดะดะดะดะดะ! ดีละ! ยังไงก็ลองดูหน่อยแล้วกัน!"
1010303-70 = "ยิ่งกว่านั้น ถ้ายอมแพ้เพราะเรื่องแบบนี้...! ในฐานะหัวหน้าสมาชิกคณะความมั่นคงของเรดวินเทอร์แล้ว ถือเป็นเรื่องที่น่าอับอายอย่างมาก!"
1010303-71 = "ตัดสินใจแล้วสินะครับ! ถ้างั้นเชิญทางนี้ครับ ทางนี้...!"
1010303-74 = "― [log=마리나 치파오]บะ... แบบนี้?[/log][wa:1070] "
1010303-76 = "― [log=마리나 치파오]เอ๋? อ้าขาให้กว้างอีกหน่อย... แขนด้วย...?[/log][wa:2630] "
1010303-79 = "― [log=마리나 치파오]อะ... อือ... เรื่องแบบนี้ฉันไม่ชินเลย...[/log][wa:2920] "
1010303-82 = "― [log=마리나 치파오]นี่... ครู...[/log][wa:2350] "
1010303-84 = "― [log=마리나 치파오]ฉันในตอนนี้ดูเป็นยังไงบ้าง...?[/log][wa:1140] "
1010303-87 = "― [log=마리나 치파오]เฮือก...? [/log][wa:10] "
1010303-89 = "― [log=마리나 치파오]ดูมีเสน่ห์ต่างจากตอนปกติเหรอ...?[/log][wa:1170] "
1010303-92 = "― [log=마리나 치파오]บะ... บ้า! อย่ามาแกล้งพูดหน่อยเลย...![/log][wa:1090] "
1010303-95 = "― [log=마리나 치파오]พะ... พูดจริงเหรอ...?[/log][wa:2000] "
1010303-98 = "― [log=마리나 치파오]รอรูปถ่ายอยู่ด้วยงั้นเหรอ...?[/log][wa:150] "
1010303-101 = "― [log=마리나 치파오]อึก...![/log][wa:280] "
1010303-103 = "― [log=마리나 치파오]วันนี้ครูก็... มีเจตนาไม่บริสุทธิ์อีกแล้วนะ... [/log][wa:1700] "
1010303-106 = "ขอบคุณที่ช่วยนะครับ! เหนื่อยหน่อยนะครับ!"
1010303-107 = "ฉะ... ฉันจะไม่มีวันลืมเลย..."
1010303-108 = "พอมาคิดดูแล้ว ตอนที่ถ่ายรูปคุณคิดอะไรอยู่อย่างนั้นเหรอครับ? ตอนนี้เขานิยมใส่คำพูดสั้นๆ ไว้ในรูป#nด้วยน่ะครับ ไม่ละ ผมพอจะรู้แล้วละครับ"
1010303-109 = "คงจะคิดชื่นชมตนเองว่าเป็น 'หญิงงามล่มเมือง' ที่มีความงดงามโดดเด่นจนสั่นคลอนประเทศได้อยู่#nสินะครับ!"
1010303-110 = "เปล่านะ... แค่คิดถึงเมนูอาหารกลางวันอยู่น่ะ...?"
1010303-114 = "แบบนี้ไม่น่าเอามาเขียนได้นะครับ... ตอนที่ไม่พูดอะไรก็ดูสมกับเป็นสาวงามดีอยู่หรอก..."
1010303-116 = "(การถ่ายแบบครั้งแรกของมารินะจบลงได้ด้วยดี)"
1010303-117 = "(หลังจากนั้น โฟโต้บุ๊คของมารินะได้รับความนิยมล้นหลามอย่างประหลาดจนถูกนำไปขายต่อ...)"

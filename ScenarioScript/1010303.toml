[translation]
1010303-1 = "沉默即是美人"
1010303-2 = "啊，老師，你來了啊。我在這裡。"
1010303-3 = "[s]「抱歉，瑪麗娜！讓你久等了吧？」"
1010303-4 = "這不算什麼，我完全不在意。"
1010303-5 = "那我們今天也繼續山海經之旅吧？"
1010303-7 = "你看那邊那個人……我說的沒錯吧？"
1010303-8 = "真，真的耶……光是待在那裡就很引人注目。"
1010303-10 = "唔嗯……"
1010303-11 = "[s]「周遭的氣氛是不是有點微妙……？」"
1010303-12 = "老師也這麼想嗎？#n原來不是我誤會了……"
1010303-13 = "我明明只是坐在這邊等而已，卻感覺到周圍人們的目光莫名地集中在我身上。"
1010303-15 = "明明是第一次看到的學生，卻有著任俠般的魅力……對吧？"
1010303-16 = "纖細的四肢搭配一頭短髮，可說是相當適合。"
1010303-17 = "通常說到美女的話，不是應該有著烏黑的長髮，或是薄如蟬翼的耳下短髮嗎？"
1010303-18 = "但是那個學生……似乎展現出了嶄新的美人形象啊。#n唉……"
1010303-20 = "而且雖然可能是我的錯覺……#n但是跟老師會合之後，視線好像變得更強烈了……"
1010303-21 = "這是為什麼呢……老師有什麼頭緒嗎？"
1010303-22 = "[s]「好像知道，又好像不知道……」"
1010303-23 = "這樣啊……"
1010303-25 = "他可能是第一次穿山海經的服裝吧……"
1010303-26 = "不過卻沒有任何突兀的感覺。#n雖然仔細看的話，某些地方確實有點不自在……"
1010303-28 = "但該怎麼說呢？那樣反而更有魅力……"
1010303-29 = "感覺真不錯，讓人好羨慕。"
1010303-31 = "……我們先離開這裡吧？"
1010303-32 = "老師也贊成？#n那好。既然決定了就快點行動吧。"
1010303-33 = "……要是繼續待下去，我可能會害羞到爆炸的。"
1010303-34 = "且慢！兩位，能請你們稍微留步嗎？"
1010303-35 = "[s]「那個……請問你是？」"
1010303-39 = "我是個碰巧路過的攝影師！有件事想拜託那位學生！"
1010303-40 = "你指的是……我嗎？"
1010303-41 = "沒錯！我只要一看到漂亮的東西就會想拍下來……！"
1010303-42 = "所以正在奇普托斯四處遊歷，#n並把美麗的風景、精彩的場面、漂亮的人們拍下來做成相簿。"
1010303-43 = "啊，在那之前，可以請教你的名字嗎？#n我想先把名稱定下來！"
1010303-44 = "我的名字是嗎？#n我叫池倉瑪麗娜。"
1010303-45 = "原來是瑪麗娜同學呀，謝謝你！#n那麼……我希望能請瑪麗娜同學擔任我的模特兒，你覺得怎麼樣？"
1010303-47 = "什，什麼～～～！？"
1010303-48 = "我剛才一直在觀察……瑪麗娜同學一邊等待著某個人，靜靜沉浸在思考中的模樣！"
1010303-49 = "讓我不禁想起了山海經流傳下來的美人故事！"
1010303-50 = "那又是什麼故事！？"
1010303-51 = "山海經有個成語叫做「閉月羞花」。"
1010303-52 = "其中「閉月」講的是有位美人某天抬頭仰望月亮，#n結果月亮發現自己的美比不上美人，因此羞愧地躲到了雲朵後面！"
1010303-53 = "後來那位美人來到了花園，無意間碰到了某朵花。"
1010303-54 = "結果那朵花竟然害羞地將自己隱藏起來，所以叫做「羞花」！"
1010303-55 = "我怎麼有聽沒有懂……"
1010303-56 = "而我所看到的瑪麗娜同學，就算拿來與故事中的美人相比也毫不遜色！"
1010303-57 = "應該是你看錯了！還，還請容我拒絕……"
1010303-58 = "那不如這樣吧？#n如果你願意擔任我的模特兒，我就把在這裡拍到的……這本熊貓相簿送給你！"
1010303-59 = "熊，熊貓相簿！？#n那……那……那種東西……！"
1010303-61 = "怎麼樣？#n拿照片換照片，聽起來還不賴吧？"
1010303-62 = "我，我該怎麼辦才好？老師！？"
1010303-63 = "[s1]「這個嘛……就照瑪麗娜的想法去做吧？」\n[s2]「瑪麗娜當模特兒的照片，我也好想看哦。」"
1010303-66 = "你，你你你你，你在說什麼啊？老師！"
1010303-67 = "但是……如果老師想看的話……"
1010303-68 = "況且，還有熊貓相簿……熊貓……熊貓……"
1010303-69 = "唔……唔～～～～～！好吧！這點小事才難不倒我！"
1010303-70 = "要是連這點小事也退縮的話，身為赤冬保安委員長的面子可就要掃地了！"
1010303-71 = "看來你已經決定好了呢！#n那麼，請過來這裡……！"
1010303-74 = "― [log=마리나 치파오]這，這樣嗎？[/log][wa:1350] "
1010303-76 = "― [log=마리나 치파오]咦？腿再張開一點……手臂也是……？[/log][wa:3590] "
1010303-79 = "― [log=마리나 치파오]唔，唔唔……果然這種事還是無法習慣……[/log][wa:3760] "
1010303-82 = "― [log=마리나 치파오]那個……老師……[/log][wa:2550] "
1010303-84 = "― [log=마리나 치파오]現在的我，看起來怎麼樣……？[/log][wa:1780] "
1010303-87 = "― [log=마리나 치파오]咦……！？[/log][wa:40] "
1010303-89 = "― [log=마리나 치파오]有股跟平常不一樣的魅力，是嗎……？[/log][wa:1770] "
1010303-92 = "― [log=마리나 치파오]笨，笨蛋！那種違心之論……！[/log][wa:2010] "
1010303-95 = "― [log=마리나 치파오]……你，你是，說真的……？[/log][wa:2320] "
1010303-98 = "― [log=마리나 치파오]很期待相片……？ [/log][wa:950] "
1010303-101 = "― [log=마리나 치파오]唔……！[/log][wa:400] "
1010303-103 = "― [log=마리나 치파오]今天的老師……真是壞心眼啊……[/log][wa:2980] "
1010303-106 = "好，辛苦了！真的辛苦你了！"
1010303-107 = "這件事，我永遠也不會忘記的……"
1010303-108 = "話說回來，剛才拍照的時候你在思考什麼呢？#n最近很流行為圖片配上一小段文字……啊，沒關係，我好像知道了。"
1010303-109 = "你一定是在想自己擁有傾國傾城的美貌吧！能令所有人為之傾倒的那種！"
1010303-110 = "並沒有……我只是在思考午餐要吃什麼而已……"
1010303-114 = "這段話可不能用來搭配啊……#n不開口的時候，明明是個大美女的說……"
1010303-116 = "（就這樣，瑪麗娜的首次拍攝順利落幕）"
1010303-117 = "（順帶一提，據說瑪麗娜的寫真集在外部特別有人氣，已經銷售一空了……）"

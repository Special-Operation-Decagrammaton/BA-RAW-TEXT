1010303-108 = "3;사진사;00;그러고 보니, 사진 촬영 때에는 무슨 생각을 하고 계셨나요? 요즘은 사진과 함께 짧은 멘트를 넣는 게 유행이어서 말이죠. 아뇨, 왠지 알 것 같군요.\n#3;em;[반응]"

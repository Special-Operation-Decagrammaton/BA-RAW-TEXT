[translation]
1010303-1 = "#title;입 다물면 미인"
1010303-2 = "3;마리나 치파오;02;아, 선생. 도착했군. 여기다.\n#3;a\n#3;em;[반응]"
1010303-3 = "[s] \"미안, 마리나! 조금 늦었지?\""
1010303-4 = "3;마리나 치파오;03;뭘 그런 걸 가지고. 나는 신경 쓰지 않는다."
1010303-5 = "3;마리나 치파오;03;그러면 오늘도 산해경 투어를 계속하도록 하지. 가 볼까?\n#3;em;[음표]"
1010303-6 = "#all;hide"
1010303-7 = "4;산해경 모브 학생 B;00\n2;산해경 모브 학생 A;00;저기 봐, 저 사람. 내 말 맞지?\n#2;em;[반응]\n#2;a\n#4;a"
1010303-8 = "4;산해경 모브 학생 B;00;저, 정말이네……. 세상에. 그저 그 자리에 있는 것만으로 시선을 빼앗기는 느낌이야."
1010303-9 = "#all;hide"
1010303-10 = "3;마리나 치파오;04;음…….\n#3;em;…"
1010303-11 = "[s] \"뭔가, 미묘한 분위기가 느껴지는데……?\""
1010303-12 = "3;마리나 치파오;08;선생도 그렇게 생각하나? 나만의 착각은 아니었던 것 같군……."
1010303-13 = "3;마리나 치파오;10;기다리면서 그저 앉아 있었을 뿐인데, 묘하게 주위에서 시선이 집중되는 느낌이어서 말이지."
1010303-14 = "#all;hide"
1010303-15 = "4;산해경 모브 학생 B;01\n2;산해경 모브 학생 A;02;처음 보는 학생인데, 꼭 협객 같은 매력이…… 있지?\n#2;em;…"
1010303-16 = "4;산해경 모브 학생 B;00;팔다리는 늘씬한데 머리는 짧아. 그런데 그게 너무 잘 어울려."
1010303-17 = "2;산해경 모브 학생 A;00;보통 미인이라고 하면 머리는 검고 길어야 하며, 반대로 귀밑머리는 매미 날개처럼 옅어야 한다고 하잖아?\n#2;em;[반응]"
1010303-18 = "4;산해경 모브 학생 B;00;하지만 저 학생…… 저분은 완전히 새로운 미인상을 제시하고 있는 것 같아. 하아…….\n#4;em;[///]\n#4;stiff"
1010303-19 = "#all;hide"
1010303-20 = "3;마리나 치파오;04;그리고 내 착각이었으면 좋겠지만……. 선생과 만나고 나니, 왠지 시선이 더 강하게 느껴지는 것 같군…….\n#3;em;…"
1010303-21 = "3;마리나 치파오;99;어째서일까…… 선생은 이유가 짐작이 가나?"
1010303-22 = "[s] \"알 것 같기도, 모를 것 같기도…….\""
1010303-23 = "3;마리나 치파오;06;역시 그런가……."
1010303-24 = "#all;hide"
1010303-25 = "4;산해경 모브 학생 B;04\n2;산해경 모브 학생 A;04;아마 산해경의 복식도 처음 입어 보는 것일 텐데……."
1010303-26 = "4;산해경 모브 학생 B;00;부자연스러움이 전혀 느껴지지 않아. 물론 자세히 살펴보면 어색해하는 모습이 약간씩 보이기는 하지만……."
1010303-27 = "#all;hide"
1010303-28 = "3;산해경 모브 학생 A;00;그게 오히려 매력을 한층 더 높이고 있는 느낌이라고 할까…….\n#3;closeup\n#3;em;[반짝]"
1010303-29 = "3;산해경 모브 학생 B;00;뭔가, 좋네. 부럽기도 하고.\n#3;closeup\n#3;em;[하트]"
1010303-30 = "#all;hide"
1010303-31 = "3;마리나 치파오;08;……일단 이 자리를 피하는 게 어떨까 하는데.\n#3;em;[땀]"
1010303-32 = "3;마리나 치파오;02;찬성이라고? 좋아. 결정되었으면 빠르게 행동하도록 하지."
1010303-33 = "3;마리나 치파오;06;……이대로는 뭔가, 부끄러워서 폭발해 버릴 것 같으니까…….\n#3;stiff\n#3;em;[///]"
1010303-34 = "3;마리나 치파오;06\n#na;사진사;잠시만요! 거기 두 분, 잠깐만 기다려 주시겠습니까?"
1010303-35 = "[s] \"어…… 누구?\""
1010303-36 = "#st;[0,0];instant;1;"
1010303-37 = "#clearST"
1010303-38 = "3;마리나 치파오;06\n#3;d\n#wait;1500"
1010303-39 = "3;사진사;00;지나가던 사진사입니다! 거기 학생분께 꼭 드리고 싶은 부탁이 있어서 말이죠!\n#3;a\n#3;em;[재잘]"
1010303-40 = "3;마리나 치파오;08;어……. 나에게?\n#3;em;[?]"
1010303-41 = "3;마리나 치파오;08\n5;사진사;00;그렇습니다! 저는 뭔가 아름다운 것을 보면, 그걸 남기고 싶어 하는 사람이라서 말이죠……!\n#5;al\n#3;m1\n#5;em;[!]"
1010303-42 = "3;마리나 치파오;08\n5;사진사;00;키보토스의 여기저기를 다니면서 좋은 풍경, 멋진 광경, 아름다운 사람들을 사진집으로 만들고 있답니다."
1010303-43 = "5;사진사;00;아, 그 전에 이름을 잠시 알려주실 수 있겠습니까? 사진집의 제목을 정해야 하기도 하고요!\n#5;hophop\n#5;em;[음표]"
1010303-44 = "3;마리나 치파오;04;내 이름? 이케쿠라 마리나라고 한다만.\n#3;em;[땀]"
1010303-45 = "3;마리나 치파오;04\n5;사진사;00;마리나 씨로군요. 감사합니다! 그러면…… 마리나 씨의 모델 사진 촬영을 꼭 해 보고 싶은데, 어떠실까요?!\n#5;m4"
1010303-46 = "#all;hide"
1010303-47 = "3;마리나 치파오;12;뭐, 뭐어어어어?!\n#3;closeup\n#3;shake\n#3;em;[?!]"
1010303-48 = "3;사진사;00;저는 쭉 지켜보고 있었답니다……. 누군가를 기다리면서 가만히 사색에 잠겨 있던 마리나 씨의 모습이! \n#3;stiff"
1010303-49 = "3;사진사;00;여기 산해경에 내려오는 미인들의 이야기를 떠올리게 하는 것 같았거든요!\n#3;em;[재잘]"
1010303-50 = "3;마리나 치파오;08;그건 또 뭔데?!"
1010303-51 = "3;사진사;00;산해경에는 폐월수화(閉月羞花)라는 말이 있습니다. \n#3;em;…"
1010303-52 = "3;사진사;00;어느 미인이 달을 올려다보자, 달이 그 미인에 차마 자신이 미치지 못하는 것을 깨닫고, 스스로를 부끄러워하며 구름 뒤로 숨었다는 의미에서 폐월(閉月) 이라 하고!"
1010303-53 = "3;사진사;00;다시 미인이 화원에 가서 꽃을 감상하는데, 무의식중에 어떤 꽃을 건드리자."
1010303-54 = "3;사진사;00;꽃이 부끄러움을 느끼며 스스로의 모습을 감추었다는 의미에서 수화(羞花)라 했죠!\n#3;em;[!]\n#3;jump"
1010303-55 = "3;마리나 치파오;10;……뭐가 뭔지 영문을 모르겠는데……."
1010303-56 = "3;마리나 치파오;10\n5;사진사;00;그리고 제가 본 마리나 씨의 모습은, 그 미인들의 이야기에 견주어도 전혀 뒤떨어지지 않을 거라는 느낌이 왔거든요!\n#5;al\n#3;m1\n#5;em;[반짝]"
1010303-57 = "3;마리나 치파오;08;사람 잘못 본 거야! 여, 역시 난 거절하고 싶은데……?"
1010303-58 = "5;사진사;00;그렇다면 이런 건 어떻습니까? 모델 사진 촬영에 협조해 주시면, 제가 이곳에서 찍은…… 이 판다 사진집을 드리도록 하죠!\n#5;em;[반응]\n#5;m4"
1010303-59 = "3;마리나 치파오;08;파, 판다 사진집이라고?! 그건…… 그것은…… 그런 건……!\n#3;em;[?!]"
1010303-60 = "#all;hide"
1010303-61 = "3;사진사;00;어떻습니까? 사진과 사진을 교환하는 것이지요. 저는 충분히 괜찮다고 생각되는데요?\n#3;closeup\n#3;em;[반짝]"
1010303-62 = "3;마리나 치파오;08;어, 어떻게 하면 좋지. 선생?!\n#3;em;[땀]"
1010303-63 = "[s1] \"뭐…… 마리나가 마음 가는 대로 하면 되지 않을까?\"\n[s2] \"마리나의 모델 사진이라니, 나도 보고 싶고.\""
1010303-64 = "#wait;10"
1010303-65 = "#wait;10"
1010303-66 = "3;마리나 치파오;12;무, 무무무무, 무슨 말을 하는 것인가. 선생!\n#3;stiff\n#3;em;[///]"
1010303-67 = "3;마리나 치파오;08;……그렇지만……. 선생이 보고 싶다면……."
1010303-68 = "3;마리나 치파오;10;거기에, 판다 사진집…… 판다…… 판다……."
1010303-69 = "3;마리나 치파오;01;으으…… 으으으으으으! 좋아! 까짓것, 해 보겠어!\n#3;em;[!]"
1010303-70 = "3;마리나 치파오;05;무엇보다 이런 정도의 일에서 물러서면! 붉은겨울의 보안위원장으로서 면목이 서지 않을 테니!\n#3;hophop"
1010303-71 = "3;사진사;00;결정해 주셨군요! 그렇다면 여기, 여기로…….!"

[translation]
1010303-1 = "The Beauty in Silence"
1010303-2 = "There you are, Sensei. Over here!"
1010303-3 = "[s] \"I'm sorry for being late, Marina!\""
1010303-4 = "It's of no concern. I don't mind."
1010303-5 = "Shall we continue our tour of Shanhaijing?"
1010303-7 = "Look over there, her! Aren't I totally right?"
1010303-8 = "Like, totally! Wow. I can't look away."
1010303-10 = "Um..."
1010303-11 = "[s] \"Something seems a little off.\""
1010303-12 = "I thought it was just me... You noticed it to, Sensei?"
1010303-13 = "I noticed I was getting a lot of stares while I was waiting for you..."
1010303-15 = "I've never seen her around here before. She has a rough...vigilante kind of charm?"
1010303-16 = "Her short hair really complements her slender figure!"
1010303-17 = "We've always been taught that standard beauty is long, dark hair. That our sideburns should be faint, like cicada wings."
1010303-18 = "But her...just her existence sets a whole new standard I'd never even imagined before."
1010303-20 = "I may be mistaken, but I feel like the stares have gotten more intense since you got here..."
1010303-21 = "D-Do you know what's happening here, Sensei?"
1010303-22 = "[s] \"I think I'm getting an idea...\""
1010303-23 = "I see..."
1010303-25 = "It seems like it's her first time wearing traditional Shanhaijing clothing."
1010303-26 = "It looks really natural on her though! I guess you can kind of see that she's not totally comfortable..."
1010303-28 = "...but that awkwardness really only elevates her charm."
1010303-29 = "Wow. How nice. I'm honestly a little jealous."
1010303-31 = "...For now, maybe we should relocate."
1010303-32 = "You think so too? Okay, good. Let's get moving."
1010303-33 = "...Another moment here, and I may explode from embarrassment."
1010303-34 = "Wait! You two, wait right there!"
1010303-35 = "[s] \"Uh... Who are you?\""
1010303-39 = "I'm just a passerby photographer! I absolutely must speak to the student by your side!"
1010303-40 = "Uh...me?"
1010303-41 = "Yes! When I see something beautiful, I'm gripped by the artistic urge to immortalize it!"
1010303-42 = "I'm currently traveling through Kivotos, building a portfolio of exquisite sceneries and breathtaking people."
1010303-43 = "Ah, first, I must know your name! For this album's title!"
1010303-44 = "My name? I'm Ikekura Marina."
1010303-45 = "Marina! Wow! Thank you so much. So, what do you think? Will you be my model?"
1010303-47 = "Wh-Wh-What?!"
1010303-48 = "I observed you for a while. Your expression...the thoughtful longing of waiting for your companion! "
1010303-49 = "It reminded me of an old tale passed down here in Shanhaijing, lauding beautiful muses of their history!"
1010303-50 = "A-An old tale?"
1010303-51 = "Yes! There's an old idiom in Shanhaijing: the moon hides, and the flowers wilt in shame. "
1010303-52 = "It comes from the story of a beauty so exceptional, even the moon knew it could not compare and hid away at the sight of her!"
1010303-53 = "She then went to the gardens and reached out to the flowers..."
1010303-54 = "...but they shied away, feeling ashamed in her illustrious presence!"
1010303-55 = "...I have no idea what you're talking about!"
1010303-56 = "The moment I beheld you, Marina, I couldn't help but think that you measure up to the beauty in that tale!"
1010303-57 = "You're speaking to the wrong person entirely! I-I think I'd like to refuse!"
1010303-58 = "Hm...why don't we make a deal? If you model for me, I'll give you this panda album, filled with photos I've taken of Shanhaijing!"
1010303-59 = "P-P-Panda album?! I didn't know such a thing existed!"
1010303-61 = "Isn't that a good deal? Photos for photos! How about it?"
1010303-62 = "Wh-What do I do, Sensei?!"
1010303-63 = "[s1] \"Do whatever you want to do!\"\n[s2] \"I do want to see your modeling pictures...\""
1010303-66 = "Wh-Wh-What are you saying, Sensei!"
1010303-67 = "...However...if that's what Sensei desires...."
1010303-68 = "And I could acquire a panda album...panda...panda...!"
1010303-69 = "Gaaah! Okay! I can overcome this! Let's do this!"
1010303-70 = "I can't back down from something as trivial as a photoshoot! If I did, I could never hold my head high as Security Chairman of Red Winter ever again!"
1010303-71 = "Excellent! Great decision! This way, then!"
1010303-74 = "― [log=마리나 치파오]L-Like this?[/log][wa:1110] "
1010303-76 = "― [log=마리나 치파오]Huh? Put my legs further apart...? My arms, too...?[/log][wa:2230] "
1010303-79 = "― [log=마리나 치파오]U-Ugh... I'm really not used to this...[/log][wa:2960] "
1010303-82 = "― [log=마리나 치파오]Hey... Sensei...[/log][wa:2230] "
1010303-84 = "― [log=마리나 치파오]How do I look right now...?[/log][wa:1260] "
1010303-87 = "― [log=마리나 치파오]*gasp*... [/log][wa:10] "
1010303-89 = "― [log=마리나 치파오]I'm charming, in a different way than usual...?[/log][wa:570] "
1010303-92 = "― [log=마리나 치파오]D-Dummy! Don't say things you don't mean![/log][wa:930] "
1010303-95 = "― [log=마리나 치파오]...Really? Y-You really do mean it...?[/log][wa:1320] "
1010303-98 = "― [log=마리나 치파오]You're looking forward to seeing the pictures...? [/log][wa:10] "
1010303-101 = "― [log=마리나 치파오]Gah...![/log][wa:280] "
1010303-103 = "― [log=마리나 치파오]You keep teasing me today... Sensei... [/log][wa:2020] "
1010303-106 = "You did really well! Great work!"
1010303-107 = "..."
1010303-108 = "Oh, also, it's common these days to include a small blurb underneath the photo. Do you think you could tell me what you were thinking during the shoot? Actually, wait, I bet I know!"
1010303-109 = "You must have been admiring your own beauty, so deadly that it could cause the fall of an entire nation!"
1010303-110 = "More like...what I was going to eat for lunch?"
1010303-114 = "...I can't use that. That definitely took away from her mysterious allure..."
1010303-116 = "So, Marina's first photoshoot went without a hitch."
1010303-117 = "Additionally, Marina's photo album grew a cult following. The photographer ended up selling out of copies."

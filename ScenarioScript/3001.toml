3001-20 = "1;블랙스톤 사장;00;뭐라고? 어떤 간 큰 녀석들이 감히 우리 회사를 습격한 거지?\n#1;em;[?!]"
3001-21 = "5;블랙스톤 용병;00\n1;블랙스톤 사장;00;설마 발키리의 참새 녀석들이……? 방위실의 임원들에게는 입막음 비를 충분히 챙겨주었을 텐데……!\n#1;em;[빠직]\n#1;m3\n#5;dr"

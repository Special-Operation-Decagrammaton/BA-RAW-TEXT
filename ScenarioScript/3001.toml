3001-126 = "3;미유;04;성분이라면 몰라도 맛까지는 교범으로 알 수 없지 않아……?"
3001-127 = "3;미유;04\n1;통신모에;00;그러게. SRT의 훈련 중에 실제 전투식량을 먹어본 건 두 번 정도밖에 없었잖아?\n#3;m5\n#1;ar"

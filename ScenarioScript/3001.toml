3001-91 = "3;통신모에;01\n5;미야코;06;아쉽지만 여기 있는 무기는 대부분 소화기뿐이고, 그마저도 저희가 갖고 있는 무기와는 호환이 되지 않는 장비와 탄약이 대부분이라……\n#5;em;[속상함]\n#3;m1\n#5;al"
3001-92 = "5;미야코;04;이대로 폐기하거나 발키리 경찰학교에 맡기는 수밖에 없겠네요."

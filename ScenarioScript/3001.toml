3001-130 = "3;사키 헬멧;06;전투식량은 특수부대의 주식이라는 말도 있고, 어떤 맛일지 궁금하기도 해서……\n#3;em;[///]"
3001-131 = "3;사키 헬멧;04;SRT 학원에 입학하기 전부터 이것저것 개인적으로 사서 먹어봤으니까……"
3001-132 = "3;사키 헬멧;04\n1;통신모에;01;뭐야. 맨날 교범만 들먹이길래 고지식한 줄만 알았는데, 은근히 비슷한 구석이 있잖아?\n#3;m5\n#1;ar\n#1;em;[반응]"

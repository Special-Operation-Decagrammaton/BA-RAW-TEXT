[translation]
3001-1 = "เงาของกระป๋อง 1"
3001-4 = "สำนักงาน <แบล็กสโตน> บริษัทรับปรึกษาด้านความปลอดภัยเอกชน"
3001-9 = "ฮุฮุ... แผนการดำเนินไปได้อย่างราบรื่น"
3001-10 = "จ้างพวกนักเลงให้ไปบุกโจมตีโรงเรียนต่างๆ จากนั้นก็เสนอการให้บริการด้านความปลอดภัยให้ใน#nเวลาที่พอดิบพอดี..."
3001-11 = "ถึงจะแค่ทำตามวิธีเก่าๆ ของไคเซอร์กรุ๊ป แต่ผลกลับออกมาดีกว่าที่คิดไว้เลยนะเนี่ย"
3001-12 = "ถ้าเราขยายธุรกิจไปเรื่อยๆ แบบนี้ สักวันเราจะต้องยิ่งใหญ่กว่าไคเซอร์กรุ๊ปได้แน่-"
3001-19 = "บอส... ไม่สิ ท่านประธาน! พวกเราโดนโจมตี!"
3001-20 = "ว่าไงนะ? ใครหน้าไหนที่กล้าดีมาโจมตีบริษัทพวกเรา?"
3001-21 = "อย่าบอกนะว่าเป็นพวกนกกระจอกวัลคิรี่...? เราน่าจะจ่ายค่าปิดปากให้คณะกรรมการสำนักป้องกันไป#nมากพอแล้วนี่...!"
3001-23 = "มะ... ไม่ใช่พวกตำรวจครับ คือว่า... เป็นเจ้าหน้าที่พิเศษของ SRT ครับ!"
3001-24 = "SRT?! แต่สถาบันพิเศษ SRT ไม่ได้ถูกองค์การนักเรียนสั่งปิดไปแล้วเหรอ?"
3001-25 = "ทำไมถึงรู้ที่อยู่ของพวกเรา แล้วตามมาถึงที่นี่..."
3001-26 = "ฮึ่ย... ธุรกิจนี้ทำเงินได้ตั้งเท่าไหร่..."
3001-27 = "ฉันไม่ปล่อยให้มันพังลงไปแบบนี้เด็ดขาด!"
3001-34 = "นี่ SRT! ยกมือขึ้นและทำตามที่ฉันบอก!"
3001-35 = "นี่คือ RABBIT 1 ขณะนี้เวลา 13:30 น. มาถึงตำแหน่งวิสกี้แล้ว"
3001-36 = "มีการต่อต้านเล็กน้อยที่บริเวณทางเข้าแต่ทำการปราบปรามเรียบร้อยแล้วค่ะ และจะดำเนินการตามแผน#nต่อไปค่ะ"
3001-38 = "สามหาวนักเจ้าพวกนี้... กล้าดียังไงถึงได้มาที่นี่...!"
3001-40 = "คุณคือตัวแทนของบริษัทรับปรึกษาด้านความปลอดภัยแห่งนี้ใช่ไหมคะ?"
3001-41 = "จากรายงานที่ส่งเข้ามายังหน่วยรักษาความปลอดภัยวัลคิรี่โดย 'บังเอิญ' เมื่อสัปดาห์ที่แล้ว เราพบหลักฐานว่าคุณอยู่เบื้องหลังกลุ่มนักเลงที่ไปโจมตีโรงเรียนต่างๆ ค่ะ"
3001-42 = "และถึงแม้ว่าหน่วยรักษาความปลอดภัยวัลคิรี่จะพบหลักฐานแล้ว แต่ด้วยขั้นตอนที่ซับซ้อนของสำนัก#nความมั่นคง ทำให้ต้องพลาดโอกาสในการจับกุมไปหลายครั้งค่ะ"
3001-43 = "แต่ว่าวิธีแบบนั้นหยุดเจ้าหน้าที่พิเศษ SRT อย่างพวกเราไม่ได้หรอกค่ะ!"
3001-45 = "ฮึ่ยยยย... ไม่คิดเลยว่าจะถูกจับได้ในที่แบบนี้..."
3001-46 = "แต่ไม่มีทางที่ฉันจะยอมให้เด็กอย่างพวกเธอมาพรากบริษัทที่ฉันทุ่มเทสร้างมากับมือไปได้หรอก!"
3001-47 = "ฉันคือหัวหน้าของ PMC ที่ทำงานเป็นทหารรับจ้างมานาน เรื่องการต่อสู้ระยะประชิดเนี่ย ฉันก็มีฝีมือพอตัว!"
3001-53 = "ลุยเลย! บอกให้จัดการไง!"
3001-60 = "ระ... หรือว่าจะลอบยิงจากตรงนี้..."
3001-66 = "...นี่คือ RABBIT 4 ยืนยันเป้าหมายอยู่ในระยะยิง"
3001-67 = "ทำการลอบยิงตามแผน..."
3001-69 = "อ๊ะ บอสล้มลงไปแล้ว..."
3001-70 = "สู้กับเจ้าหน้าที่พิเศษของ SRT ในพื้นที่เปิดแบบนี้ไปก็ไม่มีความหมาย..."
3001-71 = "นะ... หนีกันเถอะ!"
3001-72 = "คิดว่าจะหนีไปได้ง่ายๆ งั้นเหรอ?"
3001-83 = "ไซต์ A เคลียร์ เหมือนว่าด้านในจะไม่มีใครอยู่แล้วนะ"
3001-84 = "ไซต์ B ก็เคลียร์... นอกจากพวกที่หนีไปได้ ที่เหลือก็ถูกปราบปรามหมดแล้ว..."
3001-85 = "ทำได้ดีมากค่ะทุกคน"
3001-86 = "หลังจากจับกุมศัตรูที่ยอมจำนนแล้ว เราจะขอให้นักเรียนจากสถาบันฝึกตำรวจวัลคิรี่มาช่วยจัดการ#nส่วนที่เหลือค่ะ"
3001-87 = "จากนี้พวกเราจะกลับไปที่แคมป์..."
3001-89 = "จะว่าไปแล้ว ฉันได้ยินมาว่านี่เป็นฐานของ PMC น่ะ มันไม่มีอะไรที่พอจะเอากลับไปใช้ได้บ้างเลยเหรอ?"
3001-90 = "เราน่าจะเก็บของที่เรายึดมาได้และของที่จะถูกทำลายกลับมาใช้ได้นะ"
3001-91 = "อาวุธทั้งหมดที่อยู่ที่นี่ก็มีแค่อุปกรณ์ดับเพลิง อีกอย่างอุปกรณ์และกระสุนที่มีอยู่ส่วนใหญ่ก็ใช้งานกับ#nอาวุธของเราไม่ได้..."
3001-92 = "คงต้องกำจัดทิ้งไปทั้งอย่างนั้นหรือไม่ก็ปล่อยให้สถาบันฝึกตำรวจวัลคิรี่เป็นคนจัดการค่ะ"
3001-94 = "อืม... ก็ไม่ได้มาเพราะอยากได้รางวัลหรอกนะ แต่ยึดของอะไรไปใช้ไม่ได้สักอย่างแบบนี้มันน่าเสียดาย#nชะมัด...."
3001-95 = "เอ๊ะ? มิยาโกะจัง ซากิจัง กล่องที่อยู่ตรงนี้คืออะไรน่ะ?"
3001-96 = "เหมือนจะมีคำว่า 'อาหาร' เขียนอยู่ข้างบนด้วยนะ..."
3001-102 = "นี่มัน... เสบียงอาหารนี่คะ"
3001-103 = "ที่สำคัญเป็นอาหารที่ยังไม่หมดอายุด้วย"
3001-104 = "ฮุฮุ ได้กำไรแบบไม่คาดคิดเลย ไม่คิดเลยว่าจะเจอเสบียงอาหารในที่แบบนี้"
3001-105 = "อะไรกัน อะไรกัน มีอาหารด้วยงั้นเหรอ? "
3001-107 = "เสบียงอาหารมีวิธีเก็บรักษาแบบเฉพาะเพื่อให้อาหารคงอยู่ได้นานและพกพาสะดวก..."
3001-108 = "สำหรับพวกเราที่พักแรมอยู่ที่แคมป์แล้ว นี่ถือว่าเป็นเสบียงที่เหมาะสมมากเลยละค่ะ"
3001-109 = "แถมยังมีตั้งเยอะขนาดนี้... พวกเราคงไม่ต้องกังวลเรื่องอาหารไปได้สักพักเลยละ"
3001-111 = "อืม… แต่พอดูเมนูแล้วไม่ค่อยน่ากินเท่าไรเลยแฮะ"
3001-112 = "<ออมเล็ตมังสวิรัติใส่เชดด้าชีส> <โจ๊กข้าวโอ๊ต> <ข้าวถั่วแดงอบแห้งสำหรับฤดูหนาว>..."
3001-117 = "อึก มีซีฟู้ดคลุกซอสกระป๋องด้วยนี่นา อันนี้รสชาติไม่ได้เรื่องสุดๆ เลย..."
3001-118 = "คะ...? ปกติเสบียงอาหารก็ต้องรสชาติไม่ค่อยดีอยู่แล้วไม่ใช่เหรอคะ?"
3001-119 = "เสบียงอาหารที่ไม่อร่อยมันก็แค่สมัยก่อนสิ สมัยนี้ไม่เป็นแบบนั้นแล้วนะ"
3001-120 = "เพราะอาหารที่อร่อยจะส่งผลโดยตรงต่อขวัญกำลังใจของทหาร ก็เลยเลิกทำอาหารรสชาติห่วยๆ ออกมา เว้นแต่ว่าจะเป็นเสบียงอาหารแบบพิเศษที่เอาไว้กินในสถานการณ์ลำบากๆ น่ะ"
3001-121 = "ในสมัยก่อนเทคโนโลยีการเก็บรักษาอาหารมีจำกัด เลยผลิตได้แค่เสบียงที่แข็งกระด้างไร้รสชาติ แต่ในยุคสมัยนี้ที่เทคโนโลยีพัฒนาขึ้น ต่อให้อยู่ในสถานการณ์ลำบาก ก็จะกินอาหารที่มีรสสัมผัส และรสชาติดีได้"
3001-122 = "นอกจากนี้ยังพัฒนาเนื้อสัตว์ที่ทำจากเต้าหู้และพัฒนาอาหารเมนูพิเศษสำหรับทหารที่มีอาการแพ้ ทำให้สมัยนี้เลือกเสบียงอาหารที่รสชาติดีๆ ได้ตามที่ชอบเลยละ"
3001-124 = "งะ... งั้นเหรอคะ..."
3001-125 = "แต่ว่านะซากิจัง... รู้เรื่องเกี่ยวกับเสบียงอาหารเยอะจังเลย..."
3001-126 = "ถ้าอ่านจากในคู่มือก็อาจจะรู้จักวัตถุดิบก็จริง แต่รู้แม้กระทั่งรสชาติเลยเหรอ...?"
3001-127 = "นั่นสิ ระหว่างการฝึกของ SRT ก็เคยกินเสบียงอาหารของจริงแค่สองครั้งเองไม่ใช่เหรอ?"
3001-129 = "ระ... เรื่องนั้น คือว่า..."
3001-130 = "เคยได้ยินมาว่าเสบียงอาหารเป็นอาหารหลักของหน่วยรบพิเศษ แล้วสงสัยว่าจะมีรสชาติแบบไหน..."
3001-131 = "ก็เลยไปลองซื้อหลายๆ แบบมาลองกินเองตั้งแต่ก่อนจะเข้าเรียนที่ SRT แล้วน่ะ..."
3001-132 = "อะไรกัน เห็นว่าเอาแต่อ่านคู่มือ เลยนึกว่าจะเป็นพวกยึดติดแต่กับตำราซะอีก ก็มีส่วนที่คล้ายกันอยู่ด้วยนี่นะ?"
3001-133 = "บอกมาตามตรงเถอะซากิ เหตุผลที่เธอเข้าเรียนที่ SRT ก็เพราะอยากจะลองสัมผัสอุปกรณ์ทางทหาร#nหลายๆ อย่างใช่มั้ยล่ะ?"
3001-134 = "บอกมาตรงๆ เลยก็ได้ ไม่เห็นต้องปิดบังโอตาคุด้วยกันเลย หุหุหุ"
3001-135 = "...นะ... หนวกหูน่ะ! ใครเค้าจะไปเหมือนเธอกันเล่า?!"
3001-137 = "ยังไงก็เถอะค่ะ โชคดีไปที่เราได้ของดีมาโดยไม่คาดคิดนะคะ"
3001-138 = "เอาละ เราจะเอาเสบียงที่เพียงพอสำหรับทุกคนกลับไปกันค่ะ"
3001-140 = "(คืนนั้น...)"
3001-147 = "...ขณะนี้เวลา 05:00 น. อยู่ระหว่างการเฝ้าระวังเขตแดน..."
3001-151 = "วันนี้แสงจันทร์ก็มืดมนเช่นเคย แทบไม่มีเสียงอะไรให้ได้ยินเลย..."
3001-152 = "ต้องมาเฝ้าระวังเขตแดนในวันแบบนี้น่ากลัวจัง ไม่ชอบเลย..."
3001-153 = "แต่ถ้าการเฝ้าระวังวันนี้เสร็จแล้วก็น่าจะได้กลับไปกินอาหารกระป๋องอร่อยๆ ที่ไม่ได้กินมานาน... อดทนอีกหน่อยแล้วกัน"
3001-154 = "การเฝ้ารออาหารอร่อยๆ เนี่ยทำให้อารมณ์ดีขึ้นอย่างที่ซากิจังบอกจริงด้วย..."
3001-159 = "เสียงนี้มัน... หรือว่าจะเป็นโจร...?"
3001-160 = "ตั้งใจจะมาขโมยเสบียงอาหารที่เราได้มาเมื่อกลางวันเหรอ..."
3001-166 = "ยะ... หยุดนะ! ถ้าขยับจะยิงนะคะ!"
3001-170 = "เอ๊ะ? ในคลังอาหารไม่เห็นจะมีใครเลยนี่นา..."
3001-175 = "เป็นพวกสัตว์ป่าเข้ามาหรือเปล่านะ..."
3001-183 = "(แกรก)"
3001-184 = "เอ๋ เมื่อกี้กระป๋องมัน..."
3001-189 = "ขยับเองเหรอ...?"
3001-194 = "เป็นไปไม่ได้..."
3001-201 = "แกรก แกรก แกรก แกรก...!"
3001-202 = "...!?!!#%$!"

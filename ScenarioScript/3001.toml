[translation]
3001-1 = "罐頭的陰影（１）"
3001-4 = "私設保全諮詢公司「黑石」辦公室"
3001-9 = "呵呵……計畫進行得很順利呢。"
3001-10 = "雇用鎮上的太妹襲擊小型學校，然後在適當的時機和它們簽訂保全服務……"
3001-11 = "只不過試著模仿凱薩公司的老招，沒想到居然這麼有用。"
3001-12 = "只要繼續這樣擴張我們的事業版圖，我們遲早會成為比凱薩公司更龐大的軍需企業──"
3001-19 = "老大……不，社長！我們遭遇襲擊！"
3001-20 = "什麼？是哪個膽大包天的傢伙？"
3001-21 = "難道是女武神……？我們明明已經塞很多錢給聯邦學生會防衛室了……！"
3001-23 = "不，不是警察。來的人……是SRT的特殊幹員！"
3001-24 = "SRT！？SRT特殊學園不是早就被聯邦學生會廢校了嗎？"
3001-25 = "她們怎麼會發現我們……"
3001-26 = "可惡……她們以為我在這個事業上砸了多少錢啊……"
3001-27 = "我絕不能就這樣束手就擒！"
3001-34 = "這裡是SRT！所有人立刻舉手投降！"
3001-35 = "這裡是RABBIT1，目前時間1330，已抵達[ruby=Whisky]W點[/ruby]。"
3001-36 = "……在出入口處有遭遇些微的反抗，目前已鎮壓完畢。繼續執行作戰。"
3001-38 = "你們……竟敢……！"
3001-40 = "你就是這間保全諮詢公司的負責人嗎？"
3001-41 = "根據我們日前「偶然」從女武神警備局獲得的報告書，已經有證據指出，近期發生的小型學校襲擊事件──都是由各位暗中指使。"
3001-42 = "……然而女武神警備局明明已經掌握確切證據，卻因為防衛室遲遲沒有下許可，導致多次錯過逮捕的機會。"
3001-43 = "不過你們那種小伎倆，對我們SRT特殊幹員來說是行不通的！"
3001-45 = "可惡……竟然會在意想不到的地方被抓住小辮子……"
3001-46 = "即便如此，我可不能讓你們這些小鬼搶走我的公司！"
3001-47 = "我好歹是個曾當過傭兵的PMC首長。我對於近身戰還算有自信！"
3001-53 = "儘管放馬過來！"
3001-60 = "竟，竟然，連這種距離也狙擊的到……"
3001-66 = "……這裡是RABBIT4，已確認擊中目標。"
3001-67 = "請提示下一個目標……"
3001-69 = "唔，老大被幹掉了……"
3001-70 = "既然已經東窗事發了，我們也沒義務和SRT特殊幹員硬碰硬了……"
3001-71 = "快，快逃啊！"
3001-72 = "休想逃！"
3001-83 = "A側Clear。室內應該沒有敵人留下了。"
3001-84 = "……B側也Clear。除了逃走的敵人，其餘已全數鎮壓……"
3001-85 = "各位辛苦了。"
3001-86 = "現在只要將無力反抗的敵人五花大綁，剩下來的工作就交給女武神警察學園的學生們吧。"
3001-87 = "那麼，我們差不多可以回去營地了……"
3001-89 = "話說回來，這裡是PMC的基地對吧？會不會有什麼能用的物資呢～？"
3001-90 = "既然那些物資之後會被廢棄掉，那我們拿一點走應該也沒關係吧？"
3001-91 = "很遺憾，這裡的武器絕大部分都是小型槍械，而且那些裝備、子彈和我們持有的武器都不相容……"
3001-92 = "所以我們只能把它們丟在這裡，或者交由女武神警察學園沒收。"
3001-94 = "雖然我們本來就不是為了報酬才來這裡的，但連一點戰利品都帶不走實在有些可惜……"
3001-95 = "咦？都子醬、咲希醬……這個箱子呢？"
3001-96 = "上面好像寫著「食物」兩個字耶……"
3001-102 = "這些是……戰備口糧。"
3001-103 = "而且它們的保存期限還有很久呢。"
3001-104 = "呵呵，沒想到能在這種地方找到食物。"
3001-105 = "什麼什麼～？有吃的？"
3001-107 = "為了提高保存期限和便攜性，戰備口糧都經過特殊處理……"
3001-108 = "對我們這種長期露宿在帳棚裡的人來說，可說是最適合的糧食。"
3001-109 = "而且數量這麼多……短時間內應該不用擔心食物短缺的問題了。"
3001-111 = "……不過品項有點微妙呢。"
3001-112 = "「切達起司蔬菜歐姆蛋」、「燕麥粥」、「寒帶專用乾燥紅豆飯」……"
3001-117 = "噁，連海鮮拌醬罐頭都有。這東西味道不太好耶……"
3001-118 = "……戰備口糧不是本來就不能奢求味道嗎？"
3001-119 = "以前的確是那樣，不過現在的軍糧都已經進化了。"
3001-120 = "美味的食物能直接提振士兵們的士氣。除非要應對極限環境而做得特別難以食用，現在基本上都不會刻意做得很難吃了。"
3001-121 = "因為受限於保存技術，以前只能生產出既難吃又硬的戰備口糧，但是因為現在技術越來越發達，即使在沒有火的野外也能品嘗到濕潤美味的食物。"
3001-122 = "除此之外，也有為素食者或過敏患者開發出假肉或特製品項，現在每個人都能符合自己喜好享受各式各樣的戰備口糧。"
3001-124 = "原，原來如此……"
3001-125 = "咲希醬好了解喔……"
3001-126 = "不過光看教戰手冊，你怎麼知道它好不好吃呢……？"
3001-127 = "就是說啊。我們在SRT訓練時，也只實際吃過兩次戰備口糧吧。"
3001-129 = "那，那是因為……"
3001-130 = "人家都說戰備口糧就是特殊部隊的主食，讓我很好奇是什麼味道……"
3001-131 = "所以我從進入SRT學園之前，就自己花錢買了很多戰備口糧來試吃……"
3001-132 = "什麼嘛～看你每天把教戰手冊掛在嘴邊，我還以為你很古板呢。想不到我們其實有些相似的地方嘛。"
3001-133 = "你不如老實說吧，咲希？你之所以會進入SRT，其實是因為想要摸摸看各式各樣的軍事裝備，對吧？"
3001-134 = "既然都是軍事宅，就來坦誠相見慢慢聊吧。咯嘻嘻……"
3001-135 = "吵，吵死了！我跟萌不一樣！"
3001-137 = "不論如何，有獲得戰利品就是好事。"
3001-138 = "好了，大家一起把戰備口糧帶回去吧。"
3001-140 = "（……當天晚上）"
3001-147 = "……目前時間0500。站哨中，沒有異常……"
3001-151 = "今天的月光晦暗，周遭也幾乎沒有聲音……"
3001-152 = "我最討厭在這種日子站夜哨了，超級可怕……"
3001-153 = "不過今天站完夜哨，就能吃到美味的罐頭……再加點油吧。"
3001-154 = "就像咲希醬說的一樣……一想到任務結束後能吃到美食，就會讓人很開心呢……"
3001-159 = "這個聲音……該不會是小偷……？"
3001-160 = "難道是來偷糧食的……？"
3001-166 = "不，不准動！你敢動的話，我就要開槍了喔！"
3001-170 = "咦？沒有人……"
3001-175 = "還是說只是野生動物嗎……"
3001-183 = "喀噠……"
3001-184 = "咦，那個罐頭，剛才……"
3001-189 = "……是不是動了？"
3001-194 = "不不，怎麼可ㄋ……"
3001-201 = "……喀噠，喀噠，喀噠，喀噠！"
3001-202 = "…………！！？！＃％＄！"

3001-118 = "1;미야코;04;……네? 전투식량은 원래 맛이 없는 게 당연하지 않나요?\n#1;em;[?]"
3001-119 = "5;사키 헬멧;11;전투식량이 맛이 없다는 것도 옛날이야기지, 요즘은 그렇지도 않다고."
3001-120 = "1;미야코;04\n5;사키 헬멧;02;맛있는 음식은 병사들의 사기에도 직결되는 문제인 만큼, 극한 상황을 대비해 일부러 먹기 어렵게 만든 특수전용 식량이 아니고서야 일부러 맛없게 만드는 경우는 거의 없어.\n#1;dl\n#5;em;[반응]\n#5;m3"
3001-121 = "5;사키 헬멧;99;옛날에는 보존 기술이 한정되었기 때문에 딱딱하고 향미가 부족한 전투 식량밖에 만들 수 없었지만, 요새는 기술의 발달로 불이 없는 야지에서도 촉촉하고 풍부한 향의 음식을 즐길 수 있지."
3001-122 = "5;사키 헬멧;07;게다가 요즘은 채식주의자를 위한 두부 고기나 알레르기가 있는 병사를 위한 특수 메뉴도 개발되어서, 기호에 맞게 다양한 전투식량을 즐길 수 있어.\n#5;em;[재잘]"

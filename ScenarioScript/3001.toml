3001-23 = "3;블랙스톤 용병;00;겨, 경찰은 아닙니다. 그게…… SRT의 특수 요원들입니다!\n#3;em;[반응]"
3001-24 = "3;블랙스톤 사장;00;SRT?! SRT 특수학원은 이미 총학생회에 의해 폐쇄된 게 아니었단 말인가?"
3001-25 = "3;블랙스톤 사장;00;어떻게 우리의 존재를 눈치채고 이곳에……"

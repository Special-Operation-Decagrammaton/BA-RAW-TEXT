3001-41 = "4;사키 헬멧;01\n5;미야코;10;지난주 발키리 경비국으로부터 '우연히' 입수한 보고서를 통해, 그동안 군소 학교를 습격해 온 불량배들의 배후에 여러분이 있다는 증거를 확보했습니다.\n#5;em;[반응]\n#5;m4\n#4;m5"
3001-42 = "1;블랙스톤 사장;00\n4;사키 헬멧;01\n5;미야코;11;……발키리 경비국은 증거를 확보했음에도 불구하고, 방위실의 복잡한 행정 절차 때문에 계속 검거 기회를 놓친 모양이더군요.\n#5;m3\n#1;dl\n#4;dr"
3001-43 = "5;미야코;05;하지만 그런 수법은 저희 SRT 특수 요원들에게는 통하지 않습니다!\n#5;em;[!]"
3001-44 = "#all;hide"
3001-45 = "3;블랙스톤 사장;00;그으으읏…… 설마 생각지도 못한 곳에서 꼬리가 잡힐 줄이야……\n#3;em;[땀]\n#3;stiff"
3001-46 = "3;블랙스톤 사장;00;하지만 공들여 키운 회사를 너희 같은 애송이에게 빼앗길 수는 없지!"
3001-47 = "3;블랙스톤 사장;00;나 또한 오랫동안 용병일을 해 온 PMC의 수장. 근접전에는 어느 정도 자신이 있다고!\n#3;em;[빠직]"

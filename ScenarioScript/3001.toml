3001-103 = "4;미야코;02\n2;사키 헬멧;08;게다가 유통기한도 아직 충분히 남았어.\n#4;h"
3001-104 = "4;미야코;02\n2;사키 헬멧;07;후후, 의외의 소득인걸? 이런 곳에서 식량을 구하게 될 줄이야.\n#2;em;[재잘]\n#4;h"
3001-105 = "4;미야코;02\n2;사키 헬멧;07\n3;통신모에;08;뭐야, 뭐야. 먹을 게 있다고?\n#3;a\n#2;m1\n#4;m5\n#3;em;[반응]\n#2;h\n#4;h"

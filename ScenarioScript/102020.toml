102020-188 = "ฉันจะตรวจสอบไปพร้อมๆ กันค่ะว่ามีข้อมูลส่วนไหนที่แตกต่างกับที่คณะกรรมการแผนงานหามาได้#nหรือเปล่า!"
102020-196 = "ถ้าจะให้สรุปเลยละก็ เราต้องทำลายหอคอยนั่นภายใน 2 สัปดาห์นี้ค่ะ"
102020-197 = "......"
102020-198 = "หอคอยปริศนาทั้ง 6 ที่ปรากฏอยู่ทั่วคิโวทอส จากนี้เราจะเรียกพวกมันว่า <หอคอยแห่งคำลวง> ค่ะ "
102020-199 = "งั้นก็แปลว่ามันเป็นแซงค์ทัมทาวเวอร์ปลอมสินะ ถ้าอย่างนั้นก็พอจะเข้าใจท้องฟ้าสีแดง พายุ... แล้วก็พลังงานความเข้มข้นสูงได้"
102020-201 = "นี่คือปฏิบัติการทำลายของพวกนี้ใช่ไหมคะ? 2 สัปดาห์เหรอ..."
102020-202 = "ใช่แล้วค่ะ"
102020-204 = "นี่คือข้อมูลที่รวบรวมได้จากหนังสือโบราณในห้องสมุดเก่า และจากที่เซอาจัง... ไม่สิ ที่สภาน้ำชากับ#nชมรมซิสเตอร์จับมือกันเพื่อแลกเปลี่ยนข้อมูลลับค่ะ"
102020-205 = "ขอบอกเลยว่าการที่คนพวกนี้จะมาร่วมมือกัน เป็นเรื่องที่แทบจะจินตนาการไม่ได้เลย... ถ้าไม่มีคุณครู#nจากชาเล่ต์ เรื่องแบบนี้คงไม่เกิดขึ้นหรอกค่ะ♡"
102020-207 = "นี่ไม่ใช่การพยากรณ์ แต่เป็นสิ่งที่ฉันมีประสบการณ์มาโดยตรง ฉันเลยให้คำตอบที่แน่ชัดได้ค่ะ"
102020-208 = "สิ่งที่ได้ชื่อว่า <สีสัน> กำลังบุกรุกโลกของเรา ก็เลยเกิดปรากฏการณ์นี้ขึ้นค่ะ"
102020-210 = "ใช่ค่ะ สีสันที่ว่าก็มีบันทึกอยู่ในหนังสือโบราณของชมรมซิสเตอร์เหมือนกันค่ะ"
102020-211 = "ถ้าจะให้พูดง่ายๆ... มันคือแสงที่ทำให้คนตกอยู่ใน <ความบ้าคลั่ง>"
102020-213 = "สีสัน......? ที่ทำให้เราบ้าคลั่งงั้นเหรอ......?"
102020-214 = "ยูกะจัง พวกเขาพูดถูกค่ะ "
102020-215 = "โนอา?"
102020-216 = "ตอนนี้ชมรมวิศวกรรมกำลังวิเคราะห์ข้อมูลจากตัวอย่างหอคอย และตรวจพบสัญญาณที่รบกวนจิตใจ#nผู้คนด้วยละค่ะ"
102020-218 = "ถ้าไปสัมผัสกับแสงนี้เข้า ก็น่าจะเกิดการกลายพันธุ์ในความเป็นมนุษย์และจิตสำนึก... มันดูเหมือนกับ#nการโจมตีทางจิตวิญญาณเลย..."
102020-219 = "แต่ก็ยังมีอีกหลายอย่างที่ไม่สามารถอธิบายได้ด้วยตัวอย่างที่เรากำลังวิเคราะห์ เราต้องการข้อมูลเพิ่มอีก "

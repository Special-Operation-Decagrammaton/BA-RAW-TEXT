102020-183 = "อ๊ะ งั้นเหรอคะ... "
102020-184 = "โดนระงับอำนาจ และองค์การนักเรียนก็แบ่งขั้ว แถมแซงค์ทัมทาวเวอร์ก็ถูกทำลายเพราะหอคอยนั่นอีก ...ตอนนี้คนที่เคลื่อนไหวได้คงมีแต่ชาเล่ต์สินะคะ"
102020-185 = "เข้าใจง่ายดีนะคะ"
102020-186 = "ก็บอกแล้วว่าองค์การนักเรียนพึ่งพาแซงค์ทัมทาวเวอร์มากเกินไป"

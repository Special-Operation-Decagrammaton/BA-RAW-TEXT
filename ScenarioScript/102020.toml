102020-24 = "อะ... อะไรกัน... หมายความว่ายังไงน่ะ?! อย่าบอกนะว่าความจำเสื่อม? เดี๋ยวนี้มันมีโรคอะไรแบบนี้#nระบาดเหรอ? ลุงไม่เห็นรู้มาก่อนเลย?"

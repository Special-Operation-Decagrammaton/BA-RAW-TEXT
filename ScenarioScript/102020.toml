[translation]
102020-1 = "Episode 2; Operational Meeting"
102020-4 = "*pant* ... *pant*"
102020-5 = "Heh. That was a bit violent of me... "
102020-7 = "Abydos School Bicycle Parking"
102020-8 = "Hoshino..."
102020-9 = "But if I had held back, it would've been a resounding defeat for me."
102020-10 = "..."
102020-11 = "Interesting, though. I didn't know there was such a skilled student still here in the district."
102020-12 = "What's your name, petty thief?"
102020-13 = "...Shiroko. Sunaookami Shiroko."
102020-14 = "Hmm, I see. Shiroko, what are you doing here?"
102020-15 = "..."
102020-16 = "I know this place looks to be in ruins, but it's still the Abydos Satellite...I mean, Abydos High School."
102020-17 = "I've never seen that uniform before."
102020-18 = "Me neither. It's way too thin to be a winter uniform, either. "
102020-20 = "Hey, what school are you from, Shiroko?"
102020-21 = "...I don't know."
102020-22 = "...?"
102020-23 = "I just woke up here. I don't remember anything except my name..."
102020-24 = "Wh-What do you mean? Is amnesia a new thing the kids are trying these days? I've got to be missing something here..."
102020-25 = "Y-You mean to say you don't remember anything but your name? Your academy or phone number? Nothing?"
102020-26 = "*nod*"
102020-28 = "..."
102020-29 = "..."
102020-30 = "H-Hoshino... What should we do?"
102020-31 = "Hmm... What a headache."
102020-33 = "Let's go indoors and talk, Shiroko. This isn't the best place for a long conversation."
102020-34 = "Huh?! W-We're taking her with us?"
102020-36 = "Here, it's cold. Put this on."
102020-39 = "A scarf...?"
102020-40 = "It's not much, but it'll help a little for now."
102020-41 = "There. Better?"
102020-42 = "...Yeah."
102020-44 = "...It's warm."
102020-47 = "Hoshino..."
102020-48 = "We have to find Shiroko. Something bad must have happened."
102020-49 = "But the situation..."
102020-50 = "I'm taking a rain check on Schale's call. Handle it please, Nonomi."
102020-51 = "You don't even know where Shiroko is! What are you going to do alone?!"
102020-52 = "..."
102020-53 = "Shiroko isn't who she used to be! And things are different from before!"
102020-54 = "Wh-What do you mean? Nothing is different!"
102020-56 = "You were alone then, but you're not anymore!"
102020-57 = "...!"
102020-65 = "There you are! What are you guys still doing here?!"
102020-66 = "Hoshino... Let's go see Sensei, together."
102020-67 = "...You guys."
102020-68 = "Sensei will be able to help."
102020-70 = "...Hoshino. Please."
102020-71 = "..."
102020-72 = "...You're right."
102020-73 = "I'm sure we can depend on Sensei, like we always do."
102020-74 = "So... Everything will be okay... Right...? Right?"
102020-78 = "..."
102020-79 = "..."
102020-83 = "...Yes! I'm positive."
102020-87 = "..."
102020-88 = "Students are coming from all over. They'll be here soon..."
102020-89 = "..."
102020-90 = "Will you be okay here at Schale instead of the General Student Council?"
102020-91 = "Sanctum Tower has been destroyed, and I'm in a state of nonconfidence as a proxy."
102020-92 = "The General Student Council is essentially disintegrated. Even if I summon the other chiefs of staff, there's no guarantee they'll follow my instructions..."
102020-93 = "Schale is our only hope right now."
102020-94 = "I get it, but you're gonna have hell to deal with afterwards."
102020-96 = "...I would expect so."
102020-97 = "We can worry about that when and if we resolve this situation."
102020-98 = "Momoka, Ayumu, I'll be counting on you."
102020-99 = "Y-Yes! Please let me lean on your support as well."
102020-100 = "Ugh... Everything about this situation is so wrong."
102020-101 = "But if Rin says so, we'll follow her to the ends of the universe."
102020-105 = "..."
102020-107 = "Huh? Who are you?"
102020-109 = "...Onikata Kayoko."
102020-110 = "I guess I'm first. Well, it doesn't matter."
102020-111 = "Proxy, I'll tell you this now. I've really got no kind of experience in things like this, so don't expect anything, yeah?"
102020-112 = "It was Schale's Sensei who called you here, not the General Student Council."
102020-113 = "...I know. That's why I'm here."
102020-121 = "I'm here! Proxy, this is our report analyzing the phenomenon. We weren't able to get much, but..."
102020-122 = "I'm Amau Ako, the senior administrator of the Gehenna Prefect Team."
102020-124 = "Yuuka, Ako."
102020-125 = "The General Student Council...? Where is Sensei?"
102020-126 = "Sensei left to protect D.U. They'll be back soon."
102020-127 = "Sensei's gonna have a lot on their plate."
102020-128 = "E-Even Kayoko...?!"
102020-129 = "...Yup, I know."
102020-130 = "Hmm..."
102020-135 = "What an interesting gathering of people."
102020-136 = "U-Urawa Hanako?"
102020-137 = "Heehee. Long time no see, Yuuka."
102020-138 = "I'm Okusora Ayane, representative of Abydos High School. I came to Schale at Sensei's request!"
102020-139 = "Ayane..."
102020-140 = "H-Hahaha... Even Hanako is here. I hope you've been well. I'm sorry to skip the pleasantries, but..."
102020-141 = "I absolutely understand. I've been briefed on your situation, Ayane."
102020-142 = "We'll do everything in our power to find Shiroko."
102020-143 = "Yes. Thank you..."
102020-144 = "The situation might seem desperate, but we can't wallow in it. The only thing we can do is move forward."
102020-145 = "Just now, you reminded me of a friend of mine."
102020-146 = "You're much stronger than I am, Ayane."
102020-147 = "Wh-What? N-No, not at all?"
102020-148 = "You've been fighting for a long time to protect your school. You're a strong person."
102020-149 = "..."
102020-154 = "Okay. Sensei is carrying out a defense operation against the unknown forces all over D.U."
102020-155 = "They're about wrapping up, so Sensei'll be back soon."
102020-157 = "Okay. We'll meet Sensei in the conference room."
102020-179 = "Everyone should have received the operation plan we prepared. Please take a moment to look it over."
102020-180 = "When did you have the time to prepare so many documents? And it's so thorough..."
102020-181 = "...Truly. Great work, Chief Officer."
102020-182 = "Rin is fine for now, Hanako. My authority as officer has been suspended."
102020-183 = "Oh, understood..."
102020-184 = "The proxy's authority has been suspended, the General Student Council has been disintegrated, and Sanctum Tower is in ruins... Only Schale can take action."
102020-185 = "Well, that does simplify things at least."
102020-186 = "The General Student Council relies on Sanctum Tower too much."
102020-187 = "...Noa? I'm sending over the General Student Council's report. Can you take a look? And..."
102020-188 = "I'll cross-check whether there's a difference with the data obtained by the Foreclosure Task Force!"
102020-196 = "Based on analysis, the towers must be destroyed within two weeks."
102020-197 = "..."
102020-198 = "From now on, we'll call the six unidentified towers that appeared in Kivotos False Sanctums."
102020-199 = "So, they're like fake Sanctum Towers. That explains the red sky, storms, and the high energy."
102020-201 = "Then the plan is to destroy them within the next two weeks."
102020-202 = "Correct."
102020-204 = "Seia...or rather, the Tea Party and Sisterhood cooperated with each other to exchange information, and we found interesting data by going through ancient texts in the old library."
102020-205 = "It would have been unimaginable in the past for them to cooperate with each other like this... If Sensei hadn't been there, this would have been impossible."
102020-207 = "This is not prophecy, but my own experience, so I can say this with absolute certainty."
102020-208 = "What this phenomenon means is that the Chroma is invading Academy City."
102020-210 = "Yes. The concept of the Chroma is also recorded in ancient texts kept by the Sisterhood."
102020-211 = "Simply put...it's the light that drives people to madness."
102020-213 = "The Chroma...drives people to madness...?"
102020-214 = "You're correct, Yuuka. "
102020-215 = "Noa?"
102020-216 = "The Engineering Department has been analyzing the sample data of the sanctum. They've detected a signal that can actually interfere with a person's brain."
102020-218 = "Exposure to this light seems to cause changes in a person's personality and conscious functioning. It seems to be some sort of attack on the mind..."
102020-219 = "But there are so many things that can't be explained. We need more data."
102020-220 = "Right. With the equipment we have, reliability isn't even at ten percent. We can't move past the hypothesis stage at this point."
102020-221 = "That's why I've requested more data from Veritas. But the technology we have here in Kivotos just isn't enough."
102020-222 = "This is why it's necessary to interpret from different perspectives! So I brought books from the old library in Trinity! Where should I put them?"
102020-223 = "Oh! Should I cut out the pages and scan them? We can make it into an e-book so it's easier to carry with us and look through...!"
102020-224 = "If you do that, the president of the Trinity Library Committee might actually kill you..."
102020-226 = "Keep in mind it's only a hypothetical, but I believe high energy contained in the towers..."
102020-227 = "At this rate, it'll reach a critical point in about three hundred hours."
102020-228 = "If we don't do anything, after going through a total of four mutations, the energy will eventually spread throughout all of Kivotos."
102020-229 = "I'm going to need more caffeine..."
102020-230 = "Should I order some Frenzy MAX? Ten more boxes?"
102020-232 = "Everything about this phenomenon matches the prophetic dream we had, Sensei."
102020-233 = "An enormous tower emerges from a blood-red sky..."
102020-234 = "It erodes the entire world, enveloping everything with its sinister power. It's accompanied by an awful screech."
102020-236 = "You had an apocalyptic prophecy...?"
102020-237 = "...I mean, sounds like something that would happen at Trinity. "
102020-238 = "..."
102020-239 = "About three hundred hours...so in two weeks the Chroma will spread all over Kivotos..."
102020-241 = "And the fragments of our ravaged world will rage like a storm, crumbling into pieces. At last, a black light will shine down... "
102020-242 = "And Kivotos will fall."
102020-244 = "Not a trace of us or our home will remain."
102020-246 = "[ns] \"First, we need to find a way to revert anyone exposed to it.\""
102020-248 = "..."
102020-253 = "Exactly. I would agree."
102020-254 = "I don't have many answers...but the student who saved me..."
102020-255 = "Hyakkiyako's Great Prophet, Kuzunoha. She may have the answers we need."
102020-256 = "Nyah? Kuzunoha?"
102020-257 = "..."
102020-259 = "That's not a name I was expecting to hear here."
102020-260 = "Hmm... Well, I get the gist of it. Kaho said the General Student Council inquired about Kuzunoha... I see..."
102020-261 = "We'll have to discuss it in further detail later, Sensei. ♪"
102020-262 = "It's a bit complicated, but...it seems like an important issue, so I'll try to do something about it."
102020-264 = "[ns] \"I'll be counting on you, Niya.\""
102020-265 = "Nyahaha. Of course."
102020-269 = "In summary, if we don't address the False Sanctums, the energy will reach a critical point in two weeks."
102020-270 = "If that happens..."
102020-271 = "It'll be the destruction of our world as we know it."
102020-273 = "To stop it, we must destroy the False Sanctums..."
102020-274 = "The goal seems straightforward enough."
102020-275 = "It is...but to do it within two weeks..."
102020-276 = "There are a total of six False Sanctums."
102020-277 = "The Abydos Desert, the amusement park near D.U., the closed area in the Millennium outskirts, the border area between Trinity and Gehenna, that new town near Millennium...and the center of D.U."
102020-278 = "The energy of the sanctum in central D.U. is the greatest, so we should destroy the other five sanctums first and then deal with the central sanctum."
102020-279 = "I don't think it's quite as simple as you are making it out to seem."
102020-281 = "Himari...?!"
102020-282 = "Heeheehee. Yes. Here I am, the delicate, genius hacker of Millennium."
102020-283 = "Genius...?"
102020-284 = "Delicate...?"
102020-286 = "We were able to approach a False Sanctum thanks to data left behind by Big Sister. Once there..."
102020-287 = "We saw enemies guarding it. Powerful ones at that. They couldn't be handled with a normal level of strength."
102020-288 = "Toki, that's enough data. Don't push yourself too hard. Retreat."
102020-290 = "Ugh...! But..."
102020-298 = "This is the fun part."
102020-299 = "The being guarding Sanctum Tower encapsulates all the strange, mysterious, and incomprehensible phenomena that have occurred in Kivotos until now."
102020-300 = "The prophets of Decagrammaton, the Mimesis phenomenon that appeared in Trinity, and the Divi:Sion observed in the ruins of Millennium not long ago..."
102020-301 = "Yes, you see..."
102020-303 = "Abydos Desert"
102020-305 = "Decagrammaton's third prophet, Binah."
102020-307 = "Abandoned Amusement Park Near D.U."
102020-310 = "The Mimesis animatronics at Slumpia, Shiro & Kuro."
102020-312 = "Border Area Between Trinity and Gehenna"
102020-314 = "Hieronymus of Communio Sanctorum."
102020-316 = "Closed Millennium Outskirts Area"
102020-318 = "Decagrammaton's fourth prophet, Chesed."
102020-320 = "New Town Near Millennium"
102020-324 = "And the eighth prophet, Hod..."
102020-326 = "[ns] \"Hmm... I see.\""
102020-327 = "...Sensei seems to be catching on."
102020-328 = "They're exactly right. Just defeating the False Sanctums won't be enough. We have to first defeat the prophets and guardians of each sanctum."
102020-330 = "Right. The logistics will be complicated, but essentially our mission is to defeat both the guardians of the sanctums and then each of the six False Sanctums."
102020-331 = "We'll need to begin preparations immediately. It'll require a large-scale, allied operation to attack all six targets simultaneously."
102020-332 = "Yeah, and with two weeks to do it too."
102020-334 = "Okay, okay. I know you go-getters are just chomping at the bit, but we have other things we need to get in order first."
102020-335 = "What's most important is ensuring the safety of the citizens and students. We'll need to defend them from the enemies while evacuating them to a safe shelter."
102020-336 = "Gehenna, Hyakkiyako, Red Winter, Shanhaijing, Trinity, D.U... We've received reports of attacks from all over, even districts with no False Sanctum, which means these guardians aren't our only enemies."
102020-337 = "You need not concern yourself with Trinity."
102020-339 = "We will be responsible for protecting our own district. That is our duty."
102020-340 = "Right, Mika and Seia?"
102020-341 = "Hahaha. Yup, that's what the Tea Party does! ☆"
102020-342 = "And I pinky promise to do exactly as Nagi and Seia say this time, so consider Trinity safe and sound."
102020-343 = "Although... I would like to have Sensei helping us. Heehee. "
102020-344 = "I know their responsibilities are elsewhere, though, so leave it to us, Sensei."
102020-345 = "Yes, we will be safe. The future I have seen is bleak..."
102020-346 = "But that is no reason for us to not fight back with all we have. The only way from here on out is forward."
102020-348 = "Naturally, Gehenna is safe under our watch."
102020-349 = "The Prefect Team will oversee the safe evacuation and defense of our students and citizens."
102020-351 = "We'll be there as well."
102020-352 = "The Medical Emergency Club...!"
102020-353 = "With us supporting the Prefect Team, the head prefect can do what she does best without worrying about her back."
102020-354 = "Sena..."
102020-355 = "Thank you very much."
102020-357 = "But in return, we want Chinatsu to come back to the Medical Emergency Club."
102020-358 = "Wh-Wh-What? But I..."
102020-359 = "That was a joke."
102020-361 = "Yes, understood. We'll prepare as well."
102020-362 = "Our comrades at Red Winter will see no harm!"
102020-364 = "We will, as we always have, protect the Hyakkiyako district."
102020-365 = "Yes. I will too, Sensei."
102020-366 = "The Inner Discipline Club is at your service!"
102020-368 = "We'll take care of evacuation and aid! "
102020-369 = "Yes! Coincidentally, Boss recently rented out a building for a business venture, so we can use it as a shelter! "
102020-370 = "It's like a big festival!"
102020-371 = "...Oops. I guess that's a bit inappropriate."
102020-372 = "No, you have the right idea! Our job will be supporting and managing a large crowd, just like a festival!"
102020-374 = "You can leave Shanhaijing to us!"
102020-375 = "Yes, we'll never allow the children of the Plum Blossom Garden or its citizens to come to harm..."
102020-376 = "Y-Yes...! I'll protect everyone!"
102020-378 = "The Black Tortoise Promenade will provide food and evacuation."
102020-379 = "Genryumon will do something too. Kisaki won't just sit around doing nothing in a situation like this. Hahaha!"
102020-381 = "Let us take care of the D.U. evacuation!"
102020-382 = "I mean, that's kind of our job."
102020-383 = "Yes. We've gathered all available troops."
102020-385 = "I expect no issues with Millennium's evacuation."
102020-386 = "Big Sister has obsessively prepared for any potential disaster at any moment."
102020-387 = "Her obsessions are toxic to the core, but it ends up being useful at times like these."
102020-388 = "We'll take safety in the shelters she has hidden all over Millennium."
102020-390 = "...That sounds like a plan."
102020-391 = "Our goal is to destroy the six False Sanctums that appeared in Kivotos."
102020-392 = "At the same time, we carry out evacuation and defense operations for each district."
102020-393 = "The success of these operations are centered around [USERNAME] Sensei of Schale."
102020-394 = "Sensei must check every district's defense and evacuation operations while commanding the attack of the sanctums. Are you able to handle that?"
102020-395 = "[s] \"Yes. It won't be a problem.\""
102020-396 = "You're sure gonna be busy, Sensei."
102020-397 = "Th-Then, can everyone please set your watches to Kivotos standard time?"
102020-399 = "The current time left until the final critical point of the sanctums is fourteen days, twenty-three hours, fifty-nine minutes, and fifty-nine seconds..."
102020-401 = "That's all we have left."
102020-402 = "G-Good luck to you all. We have to finish everything, from establishing strategies to preparation to the actual attack, within that time..."
102020-403 = "Excellent work everyone. Now then..."
102020-405 = "Let us begin preparations."
102020-408 = "Sensei, Sensei! Do you have a minute?"
102020-409 = "We need to discuss your earlier request."
102020-410 = "[s] \"Niya, Kaho.\""
102020-411 = "We'll need Seia of Trinity as well."
102020-413 = "Yes, thank you. Do you have any clues as to Kuzunoha's whereabouts?"
102020-414 = "Nyahaha! It's awkward to talk about it in front of everyone..."
102020-415 = "I suppose I'm not surprised people want to find her."
102020-417 = "How do I say this... The student named Kuzunoha does not exist in Hyakkiyako."
102020-418 = "[s] \"Doesn't exist...?\""
102020-420 = "I thought as much... "
102020-421 = "Essentially, there has never been an official record of her on our student registry."
102020-422 = "Kuzunoha, the Great Prophet...I can't say for sure if she exists or not..."
102020-423 = "...What do you mean?"
102020-424 = "Well... Kuzunoha is a being that only a few Hyakkiyako students insist they've met... Her existence is something of a legend."
102020-425 = "...!"
102020-426 = "Imagine how surreal it was for me to hear an outsider say her name! hahaha!"
102020-430 = "There is one known record that mentions Kuzunoha."
102020-431 = "It's unreliable as fact as it's only briefly mentioned in an old collection of tales and legends, but..."
102020-432 = "Anything could help. What does it say?"
102020-433 = "...In the past, when Hyakkiyako wasn't yet an alliance, we were divided into many forces and war was a constant in our region."
102020-434 = "At that time, the Great Prophet Kuzunoha organized the Hyakkaryouran and entrusted it with mediating the dispute in Hyakkiyako."
102020-435 = "Hyakkaryouran...?"
102020-436 = "Oh... You mean the organization created to resolve alliance conflicts, the Hyakkaryouran Resolution Council. It's a sort of mediator."
102020-437 = "Wow, of course you knew about that, Trinity lady!"
102020-438 = "You're exactly right. Hyakkaryouran is like a group of mediators or balancers, as they say. ...Their history is rather clouded by mystery however."
102020-439 = "Come to think of it, the students who claim to have met Kuzunoha...were all presidents of Hyakkaryouran."
102020-440 = "Even now, the rumors say that only Hyakkaryouran's president has the privilege to meet Kuzunoha and receive orders from her..."
102020-441 = "Hyakkaryouran is the only one that truly believes in the existence of Kuzunoha."
102020-442 = "Perhaps only they are privileged enough to meet her?"
102020-443 = "Either way, the whole thing is suspicious to me."
102020-444 = "Until now, I've brushed it off as some kind of Hyakkaryouran tradition."
102020-445 = "...She was kind of like a nice imaginary friend?"
102020-446 = "Well, there's really no way to know the truth. And it was never really a problem until now."
102020-450 = "I would like to meet with the president of Hyakkaryouran, if possible."
102020-451 = "Not that I'm against it, but it might be a bit difficult due to...recent events."
102020-452 = "Hyakkaryouran is meant to be shut down soon."
102020-453 = "...!"
102020-454 = "Huh? No, no. It's not officially decided yet... I think?"
102020-455 = "The president and vice president recently cut off all contact and disappeared into thin air."
102020-456 = "Club activities have been suspended for some time, and rumors claim that the remaining members are losing morale and leaving."
102020-457 = "We've done our best to investigate their disappearance, but we haven't been able to find a single lead."
102020-458 = "Hyakkaryouran is an incredibly secretive group, so it's difficult to gain visibility into their inner workings. My apologies."
102020-459 = "Basically what Kaho said. The situation's been kept secret because no one knows what kind of chaos the Mouryo will cause if they discover the state the Hyakkaryouran is in."
102020-460 = "...Been kept secret for now. There's only a matter of time before the students and the rest of the district uncover the truth, Niya. "
102020-461 = "Well, I can't say you're wrong..."
102020-462 = "So, there's no way you can think of to find Kuzunoha at this point?"
102020-463 = "Unfortunately, no..."
102020-464 = "...It's not like there's no way at all."
102020-465 = "Niya...?"
102020-466 = "Let's see... A terrifying phenomenon known as the Chroma has appeared in Kivotos... Schale's own Sensei wants us at Hyakkiyako to find a way to revert any afflicted students."
102020-467 = "It's a matter of utmost importance, so we need to help."
102020-468 = "I'm not saying I wouldn't like to, but how...?"
102020-469 = "Ahem, you see..."
102020-470 = "Well, I have a good idea. ♪ Just give me some time. Heehee."
102020-472 = "Next Episode; Planning an Operation 1"

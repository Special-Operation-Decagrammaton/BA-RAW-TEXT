[translation]
102020-1 = "第2話;作戰會議"
102020-4 = "哈啊……哈啊……"
102020-5 = "唉呀，是不是有點太粗暴了……"
102020-7 = "阿拜多斯高中．停車場"
102020-8 = "星野前輩……"
102020-9 = "不過，要是太手下留情的話，我也是有可能會輸掉的呀～#n這個孩子，可是相當強啊。"
102020-10 = "……"
102020-11 = "不過真奇怪。這種孩子的存在……大叔居然完全不知道。"
102020-12 = "你叫什麼名字？"
102020-13 = "……白子。砂狼白子。"
102020-14 = "嘿……你叫白子醬啊。#n那白子醬在這裡做什麼呢？"
102020-15 = "……"
102020-16 = "這裡雖然看起來像廢墟……姑且還是阿拜多斯分校──#n不，是阿拜多斯本校唷。"
102020-17 = "你的制服……以前從來沒見過。"
102020-18 = "對吧？而且，穿那麼薄會冷的唷。"
102020-20 = "那個，白子醬是哪個學園的學生呢？"
102020-21 = "……不知道。"
102020-22 = "……？"
102020-23 = "醒來之後就在這裡了。#n除了名字之外……什麼都不記得……"
102020-24 = "你，你說的……難道是喪失記憶！？#n最近流行的那個？大叔我不太了解那些呢～"
102020-25 = "那……白子醬除了名字之外，什麼都不知道嗎？#n上課的學園、電話號碼、電子郵件也是……？"
102020-26 = "（點頭）"
102020-28 = "……"
102020-29 = "……"
102020-30 = "星，星野前輩，怎麼辦呢？"
102020-31 = "嗯～真傷腦筋。"
102020-33 = "總之……先到裡頭去吧，白子醬。"
102020-34 = "咦！？要，要帶他一起走嗎？"
102020-36 = "這個，你拿去圍著吧～"
102020-39 = "圍巾……？"
102020-40 = "嗯。有總比沒有好吧。"
102020-41 = "怎麼樣？感覺好一點了對吧？"
102020-42 = "……嗯。"
102020-44 = "很溫暖。"
102020-47 = "前輩……"
102020-48 = "去找白子醬吧。#n──我有不好的預感。"
102020-49 = "但是……"
102020-50 = "大叔我，就不參加夏萊的召集了。#n野乃美醬先過去吧。"
102020-51 = "……還不知道白子醬在哪裡對吧？#n只靠前輩一個人，究竟要怎麼找呢？"
102020-52 = "……"
102020-53 = "這次和她那個時候不一樣唷？#n白子醬並沒有遇難。"
102020-54 = "──是一樣的。"
102020-56 = "現在──已經不一樣了。"
102020-57 = "……！！"
102020-65 = "找到了！前輩們，你們在這裡做什麼呀！！"
102020-66 = "星野前輩……一起去見老師吧。"
102020-67 = "……大家。"
102020-68 = "老師他，一定會幫助我們的。"
102020-70 = "……星野前輩。"
102020-71 = "……"
102020-72 = "……也對。"
102020-73 = "老師他一定……會幫助我們吧……就像往常一樣。"
102020-74 = "所以，沒問題的……對吧……？"
102020-78 = "……"
102020-79 = "……"
102020-83 = "……嗯，一定沒問題的！"
102020-87 = "……"
102020-88 = "各自治區的學生正在往這裡聚集……預計很快就會抵達……"
102020-89 = "……"
102020-90 = "……我說前輩，不待在聯邦學生會而是待在夏萊沒問題嗎～？"
102020-91 = "……聖所之塔遭到破壞，身為代理的我處於不信任的狀態。"
102020-92 = "聯邦學生會就和瓦解了沒有兩樣。#n就算召集其他室長，我也不認為他們會按照我們的意思行動。"
102020-93 = "現在「夏萊」才是唯一的希望。"
102020-94 = "……這樣啊。#n雖然我也清楚……不過事後處理也許會很麻煩唷。"
102020-96 = "……也許吧。"
102020-97 = "但是……那是在完全解決這件事之後才需要考慮的事。"
102020-98 = "桃香、步。在那之前就拜託你們了。"
102020-99 = "是，是……！我，我才應該這麼說……"
102020-100 = "唔，總覺得好像一頭栽進了不必要的事情裡……"
102020-101 = "但，既然琳前輩都這麼說了，我也會跟上的唷。無論天涯海角。"
102020-105 = "……"
102020-107 = "嗯？是誰？"
102020-109 = "……鬼方佳世子同學。"
102020-110 = "我是最先到的嗎……算了，無所謂。"
102020-111 = "話先說在前頭……我並不是專家，應該幫不上什麼忙。"
102020-112 = "……找你過來的並非聯邦學生會，而是夏萊的老師。"
102020-113 = "我知道。所以我才會過來。"
102020-121 = "我來囉，代理！這是我們對現狀進行的分析報告。#n雖然量並不多──"
102020-122 = "我是格黑娜風紀委員會所屬，天雨亞子。#n為回應夏萊的請求，特此前來。"
102020-124 = "優香同學。亞子同學。"
102020-125 = "話說，老師現在在哪裡呢？"
102020-126 = "老師現在為了防衛D.U.暫時離開了。#n我想應該很快就會回來。"
102020-127 = "現在在忙啊，老師……"
102020-128 = "等等，老師連佳世子同學也叫來了嗎……！？"
102020-129 = "……嘛，就是這樣。"
102020-130 = "哈啊……"
102020-135 = "原來如此……要和在場的各位一起合作呀♡"
102020-136 = "嗯……？浦和花子……？"
102020-137 = "呵呵，好久不見了呢，優香同學。"
102020-138 = "我是阿拜多斯高中的代表奥空綾音。#n受到老師的請求，現在抵達了夏萊！"
102020-139 = "哎呀，奧空同學……"
102020-140 = "啊，啊哈哈……花子同學也在呀……過得還好嗎？#n……那個……"
102020-141 = "是，綾音同學──事情我都聽說了。"
102020-142 = "一起找出白子同學吧。我也會盡自己的棉薄之力。"
102020-143 = "是……非常感謝。"
102020-144 = "只是一味難過的話，什麼也不會改變……#n現在，無論如何得先採取行動……"
102020-145 = "……就是說啊。我的朋友也經常這麼說。"
102020-146 = "綾音同學是個堅強的人呢……遠遠比我堅強。"
102020-147 = "……沒，沒有。那個……我……"
102020-148 = "請更有自信吧。沒問題的，你是個堅強的人。"
102020-149 = "……"
102020-154 = "那個～老師目前正與出現在D.U.全區的來歷不明的兵力交戰中唷。"
102020-155 = "似乎差不多要結束了。他說會先回來這裡一趟～"
102020-157 = "我知道了。等老師回來就立刻到會議室去吧。"
102020-179 = "請各位過目手邊的資料。#n這是作戰計畫書。"
102020-180 = "如此多的資料，是在什麼時候……"
102020-181 = "明明您自己也很辛苦的……真是辛苦您了，琳行政官。"
102020-182 = "現在叫我琳就可以了。#n我作為行政官的權限目前處於停止狀態。"
102020-183 = "啊啊，原來是這樣……我失禮了。"
102020-184 = "聯邦學生會長代理的權限被停止，聖所之塔因那座塔而崩毀──並且，目前能運作的地方只有夏萊。"
102020-185 = "原來如此……"
102020-186 = "聯邦學生會是不是太依賴聖所之塔了？"
102020-187 = "……乃愛，我現在把報告書傳給你，麻煩確認一下。還有──"
102020-188 = "我，我來確認和我們對策委員會取得的情報是否有差異！"
102020-196 = "從結論來說，我們必須在2個星期內破壞那些塔。"
102020-197 = "……"
102020-198 = "目前，出現於奇普托斯的6座塔。#n現在將其命名為「虛假的聖所」。"
102020-199 = "呃，也就是說，那是假的聖所之塔嗎？#n不過，這樣天空的顏色和超高濃度能量體的事好像也能解釋了……"
102020-201 = "要將它們……在2個星期內破壞，是嗎……？"
102020-202 = "是的，正是如此。"
102020-204 = "這些是聖亞醬……不，是茶會與修女會合力在古書館發現的資料。"
102020-205 = "在此之前，茶會與修女會的合作，可是完全無法想像的……#n這也是多虧了老師呢。"
102020-207 = "這不是預言──是我自己的親身經歷，因此我能夠斷言。"
102020-208 = "現在發生的這些不祥的變化──是由於名為「色彩」的存在正在入侵我們的世界所導致的現象。"
102020-210 = "──關於「色彩」，修女會持有的古書中也有相關的記錄。"
102020-211 = "那是──會讓人們陷入「瘋狂」的光。"
102020-213 = "「色彩」……？#n陷入，瘋狂……？那是什麼意思？"
102020-214 = "優香醬，我知道這很難相信……#n不過那全都是事實。"
102020-215 = "乃愛？"
102020-216 = "目前工程師部正在對那座塔進行分析……#n並在樣本中探測到了會使人的精神錯亂的信號。"
102020-218 = "看來只要接觸到這道光，人格與意識功能似乎就會發生變化呢。#n類似於某種精神攻擊──"
102020-219 = "但是，目前無法解釋的事實在太多了。沒有更多資料的話……"
102020-220 = "嗯。以我們所擁有的裝置，結果的信賴度連10%都不到。#n目前都還只是假設而已。"
102020-221 = "所以我們拜託貝里塔斯進行了數據的分析。#n──但是，就算這樣還是不夠。"
102020-222 = "這種時候也需要從不同的觀點進行分析！#n所以，我把三一古書館的書帶來了！放哪裡好呢？"
102020-223 = "啊，對了！這樣有點難閱讀，要不要乾脆把書全部拆散再進行掃描？電子化之後不僅攜帶方便，搜尋性也──"
102020-224 = "那些是借來的書所以不行。#n而且如果做那種事的話，會被三一的圖書委員長殺掉的唷……"
102020-226 = "雖然還處於假設的階段──從那座塔之中感受到的能量…… "
102020-227 = "依照目前的情況來看，大約300小時後就會達到臨界點。"
102020-228 = "放任不管的話──最終會擴及整個奇普托斯吧。"
102020-229 = "咖啡因……不夠了……"
102020-230 = "要再叫10箱妖怪MAX嗎？"
102020-232 = "這片景象──和我之前告訴老師的預知夢是一樣的。"
102020-233 = "巨大的塔從天而降，虛空被染上緋紅──"
102020-234 = "不祥之塔如悲鳴般地鳴動……將這個世界一點一點地削去……#n接著，世界的碎片被「某個東西」給覆蓋。"
102020-236 = "（末日的預言……？）"
102020-237 = "（這樣啊……也對……三一應該也有呢）"
102020-238 = "……"
102020-239 = "大約300小時──也就是說，如果2個星期後「色彩」將擴散至整個奇普托斯，有必要盡快展開決戰呢。"
102020-241 = "削下的世界碎片如暴風雨般四處飛散的同時，#n黑色的光從天而降……世界將傾向終焉……"
102020-242 = "接著……奇普托斯的一切將會崩壞──"
102020-244 = "就連一點灰塵都不留，一切化為虛無消逝。"
102020-246 = "[ns]「除此之外，還得找出讓接觸到『色彩』的人恢復原狀的方法。」"
102020-248 = "……"
102020-253 = "……是呢。"
102020-254 = "我所知道的情報並不多……#n但是，如果是她──"
102020-255 = "百鬼夜行的大預言者，葛葉。#n──說不定得去找她才行。"
102020-256 = "喵哈哈～葛葉，是嗎？"
102020-257 = "……"
102020-259 = "哎呀～該說是我沒想到會在這裡聽見那個名字嗎。"
102020-260 = "呼呣……我大概瞭解情況了。#n佳穗所說「聯邦學生會似乎想詢問葛葉的事」看來就是這這件事呢。呼呣呣……"
102020-261 = "嘛，這事等之後，我們倆再私下談吧，老師♪"
102020-262 = "雖然有一～些複雜的原因……#n不過看來是很重要的問題……我會想想辦法的。"
102020-264 = "[ns]「謝謝你，仁耶。」"
102020-265 = "喵哈哈，那麼再會～"
102020-269 = "綜上所述，依照目前的情況來看，可以認為「虛假的聖所」約2個星期後將會達到臨界點。"
102020-270 = "那樣一來……"
102020-271 = "世界將迎向終焉……一切都會結束呢。"
102020-273 = "為了阻止這個情況，必須破壞「虛假的聖所」……"
102020-274 = "這麼說來，事情還真是單純呢。"
102020-275 = "沒錯──不過要在[ruby=・]2[/ruby][ruby=・     ・     ・     ・]個星期內[/ruby]，辦到呢。"
102020-276 = "──「虛假的聖所」一共存在6座。"
102020-277 = "阿拜多斯沙漠、D.U.近郊的遊樂園、千年郊外的封鎖地區、#n三一與格黑娜的邊界附近、千年近郊的新都市──以及D.U.的正中央。"
102020-278 = "其中位於D.U.的能量體最為龐大，#n先破壞其他5座再來處理D.U.的塔可能會比較好……"
102020-279 = "如果是那樣就好了──不過事情看來沒那麼簡單。"
102020-281 = "陽葵前輩……！？"
102020-282 = "呵呵呵，沒錯──#n千年的超天才病弱美少女駭客，做好萬全準備登場囉♪"
102020-283 = "……天才？"
102020-284 = "病弱美少女……？"
102020-286 = "我們利用大姐頭留下的資料，嘗試訪問了「虛假的聖所」，不過……"
102020-287 = "被防衛著「虛假的聖所」的敵人給阻止了。#n──而且對方是普通的戰力無法對抗的強敵。"
102020-288 = "季，收集的資料已經夠了。不用逞強，撤退吧。"
102020-290 = "唔……！可是……"
102020-298 = "而且，有趣的是──"
102020-299 = "守護著「虛假的聖所」的存在──凝聚了以往奇普托斯曾出現過的所有奇異現象。"
102020-300 = "十字神名的預言者、三一的[ruby=Mimesis]複製[/ruby]，#n以及不久前在千年廢墟觀測到的「Divi:Sion」──"
102020-301 = "沒錯──"
102020-303 = "阿拜多斯沙漠"
102020-305 = "十字神名的第3名預言者──「薇娜」。"
102020-307 = "D.U.近郊的廢棄遊樂園"
102020-310 = "在史林皮亞被[ruby=Mimesis]複製[/ruby]的玩偶──「白&黑」。"
102020-312 = "三一與格黑娜的邊界附近"
102020-314 = "「諸聖相通」──「耶羅尼姆斯」。"
102020-316 = "千年郊外的封鎖地區"
102020-318 = "十字神名的第4名預言者──「赫賽德」。"
102020-320 = "千年近郊的新都市"
102020-324 = "十字神名的第8名預言者──「霍德」……"
102020-326 = "[ns]「原來如此……是這樣啊。」"
102020-327 = "……老師您知道它們呢。"
102020-328 = "──如果不先打倒各聖所的守護者，就無法破壞「虛假的聖所」。"
102020-330 = "──不過簡單來說，只要打倒各地的守護者就皆大歡喜了對吧？"
102020-331 = "沒錯。#n既然時間所剩不多，立刻開始準備吧──#n同時攻擊6個區域……以擬定聯合作戰的方式行動吧。"
102020-332 = "也對，畢竟時間有限。"
102020-334 = "大家先冷靜一下～#n我知道大家都充滿鬥志～不過可以先聽我說句話嗎？"
102020-335 = "要執行這個作戰的話，必須先確保各自治區的居民和學生的避難場所，同時還必須維持自治區的治安唷。"
102020-336 = "格黑娜、百鬼夜行、赤冬、山海經、三一、D.U.……#n各地都傳來遭到襲擊的報告。敵人不是只有守護者而已。"
102020-337 = "這點請不必擔心。"
102020-339 = "各自治區的治安維持就由我們來處理。#n──這本來就是我們的義務。"
102020-340 = "兩位沒有異議吧，彌香同學，聖亞同學？"
102020-341 = "啊哈哈♪交給我們吧☆"
102020-342 = "這次我會乖乖依照渚醬和聖亞醬的指示行動的。#n三一這邊不用擔心哦。"
102020-343 = "當然……如果老師能來幫忙的話，我也會很高興的♪"
102020-344 = "我們沒問題的。#n──交給我們吧，老師。"
102020-345 = "沒錯。雖然已經無法看見未來──"
102020-346 = "不過我很清楚，大家齊心協力才是最重要的。"
102020-348 = "格黑娜自治區的防禦就交給我們吧。"
102020-349 = "我們風紀委員會負責學生的避難與護衛。"
102020-351 = "我們也會幫忙。"
102020-352 = "急救醫學部……！"
102020-353 = "這樣一來，風紀委員長也能更安心地投入作戰吧。"
102020-354 = "……瀬奈部長。"
102020-355 = "感激不盡。"
102020-357 = "相對地，請千夏回到急救醫學部吧。"
102020-358 = "……！？#n這，這……！"
102020-359 = "……開玩笑的。"
102020-361 = "我知道了。那麼我們也會做好準備。"
102020-362 = "赤冬的同志們就包在我們身上吧！"
102020-364 = "百鬼夜行自治區請交給我們吧。"
102020-365 = "嗯。交給我吧，老師～"
102020-366 = "修行部也在唷～"

102020-111 = "ผู้รักษาการแทน ขอบอกไว้ก่อนเลยนะว่าฉันไม่ชำนาญในสถานการณ์แบบนี้ ฉันคงช่วยอะไรไม่ได้มาก#nนักหรอก"

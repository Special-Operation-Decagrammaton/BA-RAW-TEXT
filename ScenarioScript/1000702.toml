[translation]
1000702-1 = "模範市民"
1000702-2 = "派出所"
1000702-3 = "嗚哇啊啊啊！老師──！"
1000702-4 = "我，明明什麼都沒有錯，突然就被警察抓過來……"
1000702-5 = "竟然說自己沒錯，看來還不懂得反省啊！"
1000702-6 = "嗚哇──，老師──！幫幫我──！"
1000702-7 = "這孩子的監護人嗎？"
1000702-8 = "[s] 「我是這孩子的老師。」"
1000702-9 = "既然如此，您知道這孩子做了什麼嗎？"
1000702-10 = "我沒有做錯事！ #n我只是做了該做的事！"
1000702-11 = "安靜！"
1000702-13 = "這個孩子啊，擅自闖進別人的私有地……"
1000702-15 = "在牆上亂塗鴉！"
1000702-16 = "才不是亂塗鴉！是[ruby=Graffiti]街頭塗鴉[/ruby]，是藝術！"
1000702-17 = "從旁看的話只是個塗鴉！"
1000702-18 = "[s] 「塗鴉嗎？」"
1000702-19 = "是，雖然不知道是街頭塗鴉還是什麼的，滿牆都是擦不掉的油性顏料！"
1000702-20 = "但是那之後，屋主不是說了沒關係嗎！"
1000702-21 = "那只是原諒妳這一次的意思，不是畫了也沒關係的意思！ #n而且妳這又不是第一次！"
1000702-22 = "KV高速公路的高架橋下、黑貓市場的小巷……"
1000702-23 = "就因為妳在沒人的地方到處畫滿塗鴉，妳知道清理的人有多辛苦嗎？"
1000702-24 = "就說了不是塗鴉是藝術！"
1000702-26 = "[s] 「不好意思……」"
1000702-27 = "該道歉的人不是老師，而是這位學生該做的。"
1000702-28 = "不要！我只是在為這座灰暗的城市做點綴而已！"
1000702-29 = "[s] 「好好道歉，真紀。」"
1000702-30 = "但是……嗚嗚……"
1000702-31 = "是我……錯了。對不起。"
1000702-32 = "呼，今天就這樣原諒妳。 #n只不過，沒有下次了！"
1000702-34 = "那個，老師。這個……那個…… #n難不成，你在生氣嗎？"
1000702-35 = "[s] 「沒關係。」"
1000702-36 = "果然在生氣，嗚嗚嗚……"
1000702-37 = "但是啊～那面灰暗的牆向我這麼說了哦。說，幫我添上可愛的色彩。"
1000702-38 = "我，我當然知道在別人的東西上畫圖是不對的……"
1000702-39 = "可是燃燒的藝術之魂在恣意操縱著我……"
1000702-40 = "……抱歉，但是我果然還是不想被老師討厭。"
1000702-41 = "雖然我喜歡街頭塗鴉，但我不想被老師罵。"
1000702-42 = "怎麼辦……我想做街頭塗鴉，但又不想被老師罵……"
1000702-43 = "[s] 「找一塊巨大的畫布，在上面畫圖吧。」"
1000702-44 = "……巨大的畫布？"
1000702-45 = "這樣啊，把好幾面畫布組在一起的話，或許可以取代牆面！"
1000702-46 = "說不定，不如在真的牆上塗鴉那麼過癮，不過…… #n只要是跟老師在一起，不管做什麼都很開心。"
1000702-47 = "那樣的話老師，下次我帶巨大的畫布來的話，可以跟我一起畫圖嗎？"
1000702-48 = "[s] 「嗯，一起畫圖吧。」"
1000702-49 = "呵呵，約好了哦？ #n謝謝，老師！"

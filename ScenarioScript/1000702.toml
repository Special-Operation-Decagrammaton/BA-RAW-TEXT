[translation]
1000702-1 = "#Title;모범 시민"
1000702-2 = "#place;파출소"
1000702-3 = "3;마키;05;우아아아앙— 선생님—!\n#3;em;[반응]\n#3;hophop\n#3;a"
1000702-4 = "3;마키;05;나는 아무런 잘못도 하지 않았는데, 경찰이 갑자기 끌고 와서는……\n#3;stiff"
1000702-5 = "5;경찰;05;아무런 잘못도 하지 않았다니, 아직도 반성을 안 했군!\n#5;em;[빠직]\n#5;al\n#3;m1"
1000702-6 = "3;마키;05;으앙, 선생님— 나 좀 도와줘!\n#3;shake"
1000702-7 = "5;경찰;05;이 아이의 보호자이십니까?\n#5;em;[?]"
1000702-8 = "[s] \"이 아이의 선생님입니다.\""
1000702-9 = "5;경찰;05;그렇다면 이 아이가 무슨 잘못을 저지르고 다녔는지 알고 계십니까?"
1000702-10 = "3;마키;06;나는 잘못하지 않았어! #n해야 할 일을 했을 뿐인걸!\n#3;em;[!]"
1000702-11 = "5;경찰;05;그읏!\n#5;stiff"
1000702-12 = "5;경찰;05\n#5;m3\n#5;em;[빠직]\n#wait;1500"
1000702-13 = "5;경찰;05;이 아이는 무려, 남의 사유지에 들어가서……\n#5;em;[...]\n#3;d"
1000702-14 = "#all;hide"
1000702-15 = "3;경찰;05;낙서를 했습니다!\n#3;closeup\n#3;em;[빠직]"
1000702-16 = "#3;hide\n1;마키;06;낙서가 아니야! 그래피티, 예술이라고!\n#1;em;[!]\n#1;hophop\n#1;a"
1000702-17 = "5;경찰;05;당하는 사람 입장에서는 똑같은 낙서일 뿐이지!\n#5;em;[!]\n#5;hophop\n#5;a"
1000702-18 = "[s] \"낙서요?\""
1000702-19 = "5;경찰;05;예, 그래피티인지 뭔지, 지워지지도 않는 유성 페인트를 벽에 잔뜩 뿌려 놓았다고요!"
1000702-20 = "1;마키;06;하지만 주인 아저씨는 괜찮다고 했잖아!\n#1;em;[!]"
1000702-21 = "5;경찰;05;그건 용서한다는 뜻이지 괜찮다는 뜻이 아니라고! #n게다가 넌 이번이 처음도 아니잖아!\n#5;em;[빠직]"
1000702-22 = "5;경찰;05;KV 하이웨이의 고가대교에, 쿠로네코 시장의 뒷골목에……\n#5;m3"
1000702-23 = "5;경찰;05;인적이 드문 곳이라면 어디든 온통 낙서를 해 두니, 지우는 사람이 얼마나 고생인 줄 알아?\n#5;em;[빠직]\n#5;hophop"
1000702-24 = "1;마키;06;그러니까 낙서가 아니라 예술이라니까!\n#1;m3\n#1;hophop\n#5;m5\n#1;em;[!]"
1000702-25 = "5;경찰;05\n1;마키;06\n#1;d\n#5;d\n#wait;1000"
1000702-26 = "#all;hide\n[s] \"……죄송합니다.\""
1000702-27 = "3;경찰;05;사과는 선생님이 아니라 이 학생이 해야지요.\n#3;a"
1000702-28 = "3;마키;06;싫어! 나는 우중충한 도시를 밝게 꾸며준 것 뿐인걸!\n#3;em;[!]"
1000702-29 = "[s] \"제대로 사과해, 마키.\""
1000702-30 = "3;마키;05;하지만…… 으으…….\n#3;em;[속상함]\n#3;stiff"
1000702-31 = "3;마키;05;죄송……합니다. 잘못했어요.\n#3;m1"
1000702-32 = "5;경찰;05;흥, 오늘은 이 정도로 넘어가 주지요. #n하지만 다음번에는 용서하지 않을 겁니다!\n#5;em;[!]\n#5;a"
1000702-33 = "#all;hide"
1000702-34 = "3;마키;05;저, 선생님. 어…… 그러니까……. #n혹시 화났어?\n#3;em;[...]\n#3;a"
1000702-35 = "[s] \"괜찮아.\""
1000702-36 = "3;마키;05;역시 화났지? 우으으……"
1000702-37 = "3;마키;06;하지만~ 그 우중충한 회벽이 내게 말하고 있었다고. 예쁜 색의 옷을 입고 싶다고 말이야!\n#3;hophop\n#3;em;[!]"
1000702-38 = "3;마키;05;무, 물론 남의 물건에 멋대로 칠을 해서는 안된다는 건 알고 있었지만……"
1000702-39 = "3;마키;05;불타오르는 예술혼이 나를 멋대로 조종하는 바람에……"
1000702-40 = "3;마키;05;……미안. 역시 선생님께 미움 받고 싶지는 않아."
1000702-41 = "3;마키;05;그래피티를 하는 것도 좋지만, 선생님에게 혼나는 건 더 싫은 걸.\n#3;em;[속상함]\n#3;stiff"
1000702-42 = "3;마키;05;어쩌지…… 그래피티는 하고 싶고, 선생님에게 혼나는 건 싫고…….\n#3;m4"
1000702-43 = "[s] \"커다란 캔버스를 구해 그 위에 그림을 그리자.\""
1000702-44 = "3;마키;02;……커다란 캔버스?\n#3;m3"
1000702-45 = "3;마키;03;그래, 캔버스 여러 개를 쌓아 겹쳐 놓는다면 벽 대신 쓸 수 있을 지도 몰라!\n#3;em;[!]"
1000702-46 = "3;마키;01;물론 진짜 벽에 그래피티를 하는 것만큼 신나지는 않겠지만…… #n선생님과 함께한다면 분명 뭐든지 즐거울 거야.\n#3;em;[음표]"
1000702-47 = "3;마키;00;그럼 선생님, 다음 번에 내가 커다란 캔버스를 가져오면 같이 그림 그릴래?"
1000702-48 = "[s] \"그래, 같이 그림을 그리자.\""
1000702-49 = "3;마키;03;후후, 약속한 거다? #n고마워, 선생님!\n#3;em;[반짝]\n#3;hophop"

[translation]
1000702-1 = "An Exemplary Citizen"
1000702-2 = "Police Station"
1000702-3 = "Waaaaaah! Sensei!"
1000702-4 = "The police arrested me even though I'm innocent..."
1000702-5 = "You know exactly why we arrested you!"
1000702-6 = "Waaah, Sensei! The cops are bullying me!"
1000702-7 = "Are you this child's guardian?"
1000702-8 = "[s] \"I'm her teacher.\""
1000702-9 = "Are you aware of what this young lady has been doing?"
1000702-10 = "I didn't do anything wrong! I did what I had to do!"
1000702-11 = "Why you!"
1000702-13 = "This girl was caught trespassing on private property..."
1000702-15 = "...not to mention vandalizing it!"
1000702-16 = "Graffiti isn't vandalism. It's an art form!"
1000702-17 = "Try explaining that to the property owner, young lady."
1000702-18 = "[s] \"Vandalism?\""
1000702-19 = "Precisely—or \"graffiti\" as this miscreant refers to it. She was caught painting images on the property's wall."
1000702-20 = "But the owner said it was fine!"
1000702-21 = "He only said that he forgave you, not that you were given permission in the first place. This also isn't the first instance."
1000702-22 = "The overpass on the KV highway, the back alley of the Kuro Neko market..."
1000702-23 = "You're always tagging places where there aren't a lot of people around. Do you have any idea how hard it is to clean up the messes you leave behind?"
1000702-24 = "They're not messes—they're art!"
1000702-26 = "[s] \"...I'm sorry about her.\""
1000702-27 = "She should be the one apologizing, not you."
1000702-28 = "What?! All I'm doing is adding some liveliness to this gloomy city!"
1000702-29 = "[s] \"You really should apologize, Maki.\""
1000702-30 = "But... Ugh..."
1000702-31 = "Fine. I'm...sorry about all of this."
1000702-32 = "Hmph. I'll let you off with a warning this time. Don't think you'll get so lucky if I catch you again!"
1000702-34 = "Hey, Sensei. Are you...angry with me?"
1000702-35 = "[s] \"Why would I be?\""
1000702-36 = "Don't lie. You are angry, aren't you? Um..."
1000702-37 = "But that gloomy gray wall was calling out to me! It wanted to be tagged in bright, pretty colors!"
1000702-38 = "I-I know that tagging someone else's property isn't right, okay...?"
1000702-39 = "But I couldn't contain the burning artistic passion inside me..."
1000702-40 = "I'm sorry. The last thing I wanted was to make you angry."
1000702-41 = "Graffiti means a lot to me but not more than you do."
1000702-42 = "This is a predicament. How can I continue expressing myself with graffiti but not make Sensei angry...?"
1000702-43 = "[s] \"We could always get you a huge painting canvas.\""
1000702-44 = "...A huge canvas?"
1000702-45 = "Wait, I get it. If we stacked several canvases together, I could use that instead of the side of a building!"
1000702-46 = "Maybe it won't be the same as using a real wall...but anything is fun as long as I'm doing it with you, Sensei."
1000702-47 = "So...if I put a huge canvas together, will you be there to help me paint?"
1000702-48 = "[s] \"Sure. We'll work together.\""
1000702-49 = "You promise, right? Thanks, Sensei!"

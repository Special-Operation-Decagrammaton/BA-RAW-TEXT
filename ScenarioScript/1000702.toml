[translation]
1000702-1 = "พลเมืองดีเด่น"
1000702-2 = "ป้อมตำรวจ"
1000702-3 = "อ๊าาาาา.... คุณครู.....!"
1000702-4 = "ฉันไม่ได้ทำอะไรผิดเลยนะ แต่จู่ๆ ตำรวจก็จับตัวฉันมาที่นี่..."
1000702-5 = "ไม่ได้ทำผิดอะไรงั้นเหรอ ยังไม่สำนึกอีกสินะ!"
1000702-6 = "อ๊าาาา คุณครู! ช่วยฉันด้วย!"
1000702-7 = "คุณเป็นผู้ปกครองของเด็กคนนี้เหรอ?"
1000702-8 = "[s] \"เอ่อ... เป็นครูของเธอน่ะ\""
1000702-9 = "คุณรู้มั้ยว่าเธอก่อเรื่องอะไรไปบ้าง?"
1000702-10 = "ฉันไม่ได้ทำอะไรผิดสักหน่อย! แค่ทำสิ่งที่ต้องทำเท่านั้นเอง!"
1000702-11 = "นี่!"
1000702-13 = "เด็กคนนี้บุกรุกเข้าไปในพื้นที่ส่วนบุคคล..."
1000702-15 = "เธอไปพ่นสีกำแพงเล่นจนเละเทะไปหมดเลย!"
1000702-16 = "ไม่ได้พ่นสีเล่นสักหน่อย! นั่นเรียกกว่ากราฟิตี้ต่างหาก เป็นศิลปะอย่างหนึ่งนะ!"
1000702-17 = "แต่สำหรับผู้เสียหายแล้วมันก็แค่การพ่นสีเลอะๆ เทอะๆ นั่นแหละ!"
1000702-18 = "[s] \"การพ่นสีเหรอ?\""
1000702-19 = "ใช่แล้ว จะเรียกว่ากราฟิตี้หรืออะไรก็ช่างเถอะ แต่ตอนนี้บนกำแพงมีภาพวาดผสมสีน้ำมัน#nเขียนเลอะอยู่เต็มไปหมด!"
1000702-20 = "แต่คุณลุงเจ้าของบอกว่าไม่เป็นไรนี่นา!"
1000702-21 = "ที่เขาพูดคือเขายกโทษให้แต่ไม่ได้หมายความว่าเขาชอบใจในสิ่งที่เธอทำหรอกนะ!#nอีกอย่าง นี่ไม่ใช่ครั้งแรกที่เธอทำแบบนี้ด้วย!"
1000702-22 = "ที่ตรงสะพานข้ามทางด่วน KV กับที่ตรอกในตลาดคุโระเนโกะก็เหมือนกัน..."
1000702-23 = "เธอเล่นไปพ่นสีเล่นไปทั่วตรงที่ไม่ค่อยมีคนผ่านไปมาแบบนั้น รู้บ้างมั้ยว่ามันลบออกยากแค่ไหน?"
1000702-24 = "ก็บอกว่าไม่ใช่พ่นสีเล่นยังไงล่ะ มันคืองานศิลปะ!"
1000702-26 = "[s] \"ต้องขอโทษแทนเธอด้วย...\""
1000702-27 = "คุณครูไม่ใช่คนที่ต้องขอโทษหรอก เด็กคนนี้ต่างหากที่ควรจะต้องขอโทษน่ะ"
1000702-28 = "ไม่เอา! ฉันแค่ทำให้เมืองที่น่าเบื่อๆ นี่มีสีสันขึ้นก็เท่านั้นเอง!"
1000702-29 = "[s] \"มากิ ขอโทษคุณตำรวจสิ\""
1000702-30 = "แต่ว่า... อึ่ก...."
1000702-31 = "ขะ...ขอโทษค่ะ ฉันทำผิดเอง"
1000702-32 = "ฮึ่ม วันนี้ฉันจะปล่อยเธอไปก็แล้วกัน แต่คราวหน้าฉันจะไม่ละเว้นโทษให้แน่ๆ!"
1000702-34 = "คือ...คุณครู เอ่อ... คือว่า... โกรธฉันรึเปล่า?"
1000702-35 = "[s] \"เปล่า\""
1000702-36 = "โกรธจริงๆ ด้วยสินะ? อืม...."
1000702-37 = "แต่ว่า~ เจ้ากำแพงสีหม่นๆ นั่นมันเรียกฉันไปหาจริงๆ นะ#nมันบอกให้ช่วยตกแต่งสีสันบนตัวมันให้สวยๆ หน่อยน่ะ!"
1000702-38 = "นะ...แน่นอนว่าฉันรู้ดีว่าไม่ควรไปวาดรูปในที่ของคนอื่น..."
1000702-39 = "แต่ว่าจิตวิญญาณศิลปินในตัวฉันมันร่ำร้องให้แสดงความสามารถออกมาน่ะสิ..."
1000702-40 = "ขอโทษ... ฉันไม่อยากถูกคุณครูโกรธเลยนะ..."
1000702-41 = "ฉันชอบวาดรูปกราฟิตี้ก็จริง แต่ก็ไม่ชอบเวลาที่ถูกคุณครูโกรธเลย..."
1000702-42 = "ทำยังไงดี... ฉันอยากวาดรูปกราฟิตี้อีกเยอะๆ แต่ก็ไม่อยากถูกคุณครูโกรธ..."
1000702-43 = "[s] \"ถ้างั้นเราไปซื้อผ้าแคนวาสใหญ่ๆ แล้วเอามาใช้วาดรูปกันเถอะ\""
1000702-44 = "ผ้าแคสวาสขนาดใหญ่เหรอ?"
1000702-45 = "จริงด้วย ถ้าเราเอาผ้าแคนวาสหลายๆ ผืนมาต่อกันก็จะใช้วาดรูปแทนกำแพงได้นี่นา!"
1000702-46 = "ถึงอาจจะไม่หนำใจเท่าวาดลงบนกำแพงก็เถอะ... แต่ถ้าได้วาดรูปกับคุณครูล่ะก็ยังไงก็สนุกอยู่ดี"
1000702-47 = "งั้นคราวหน้าถ้าฉันซื้อผ้าแคนวาสมาแล้ว คุณครูจะมาวาดรูปกับฉันมั้ย?"
1000702-48 = "[s] \"ได้สิ เอาไว้มาวาดรูปด้วยกันนะ\""
1000702-49 = "ฮุฮุ สัญญาแล้วน้า? ขอบคุณนะคุณครู!"

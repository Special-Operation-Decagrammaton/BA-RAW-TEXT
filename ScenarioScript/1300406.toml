[translation]
1300406-1 = "遊戲很有趣"
1300406-2 = "對策委員會．教室"
1300406-3 = "什麼？要幫我做黑白棋的特訓嗎？"
1300406-4 = "嗯……但是。"
1300406-5 = "不，不是。我很開心！老師願意為我操心……"
1300406-6 = "但是我，非常的弱……至少得有能夠接受指導的實力……"
1300406-7 = "……"
1300406-8 = "是。我知道了。實戰就是最好的學習！"
1300406-9 = "我明白了，老師！請務必，教導我不知道的知識！"
1300406-11 = "………"
1300406-12 = "[s] 「我輸了……」"
1300406-13 = "……"
1300406-14 = "下了10盤……全勝。"
1300406-15 = "老師，你比我還弱呢。"
1300406-16 = "唔嗯……也或許是其他成員非常強呢……"
1300406-17 = "不過，有了勝利的經驗，只要好好掌握這個體驗的話感覺就可以找到出路！"
1300406-18 = "託老師的福，今天又多知道了一件事☆"
1300406-20 = "（被野乃美溫柔地安慰了）"

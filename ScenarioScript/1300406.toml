[translation]
1300406-1 = "การเล่นเกมสนุกสุดๆ"
1300406-2 = "ห้องชมรมคณะกรรมการแผนงาน"
1300406-3 = "คะ? คุณครูจะช่วยฉันฝึกเล่นโอเทลโล่เหรอคะ?"
1300406-4 = "อืม... แต่ว่า..."
1300406-5 = "ปะ... เปล่าค่ะ ฉันแค่ดีใจที่คุณครูใส่ใจฉันแบบนี้..."
1300406-6 = "แต่ว่า... ฉันเล่นแย่สุดๆ เลย... บางทีอาจจะเล่นแย่จนสอนไม่ได้เลยด้วยซ้ำ..."
1300406-7 = "....."
1300406-8 = "อื้อ เข้าใจแล้วค่ะ ถ้าฝึกบ่อยๆ ต้องเล่นได้ดีขึ้นแน่ค่ะ!"
1300406-9 = "เข้าใจแล้วค่ะคุณครู! ช่วยสอนฉันทุกๆ อย่างเลยนะคะ!"
1300406-11 = "......"
1300406-12 = "[s] \"แพ้จนได้...\""
1300406-13 = "....."
1300406-14 = "เล่นมาสิบเกมแล้ว... ชนะรวดเลย"
1300406-15 = "คุณครูเล่นแย่กว่าฉันอีกสินะคะ"
1300406-16 = "อืม... หรือว่าสมาชิกคนอื่นจะเล่นเก่งเกินไปกันนะ...."
1300406-17 = "แต่ว่าตอนนี้ฉันเข้าใจความรู้สึกของการชนะบ้างแล้วละค่ะ ฉันจะหาทางรักษาความรู้สึกนี้เอาไว้#nให้ได้ตลอดไปเลยค่ะ!"
1300406-18 = "ขอบคุณคุณครูมากๆ เลยนะคะที่ทำให้วันนี้ฉันได้เรียนอะไรใหม่ๆ ☆"
1300406-20 = "(โนโนมิปลอบใจคุณครูอย่างอ่อนโยน)"

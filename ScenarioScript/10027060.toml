10027060-223 = "ถึงฉันจะเป็นนักวิจารณ์ที่พยายามไม่เอาเรื่องส่วนตัวเข้ามาเกี่ยวข้องในงาน... แต่ในครั้งนี้ ในฐานะที่#nเป็นประธานของกลุ่มแฟนคลับ <ลูน่า> ฉันจะรีวิวแบบเห็นแต่ประโยชน์ส่วนตัวนะคะ"
10027060-224 = "[ns] \"รบกวนด้วยนะ\""
10027060-225 = "เอาละ ไหนขอดูหน่อย..."
10027060-234 = "ฮืม... ฮืม... มาถึงจุดนี้ ลูน่าทั้งสองคนก็...? เหลวไหลน่า! อยู่ๆ เรื่องเป็นแบบนี้ไปได้ยังไง?!"
10027060-235 = "เดี๋ยวนะคะ นี่มันคือส่วนของสปอยล์ที่มีในเล่มก่อนหน้า... ถึงแม้มันจะเป็นอย่างนั้นก็เถอะ แต่คุณเอา#nมาบิดให้เป็นแบบนี้งั้นเหรอคะ? แค่นั้นยังไม่พอ..."
10027060-240 = "โห... อ่าฮะ... อืม... น่าสนใจนะคะ น่าสนใจทีเดียวเลย อ๊ะ ถ้าใช้บทสนทนาแบบนั้นในสถานการณ์นี้#nแล้วละก็...!"
10027060-241 = "กลับมานะ ลูน่า! ไม่สิ ไม่ใช่ลูน่าคนนี้ แต่เป็นลูน่าคนนั้น! ความจริงไม่ใช่แบบนี้นี่คะ!"
10027060-242 = "คุณไม่รู้อะไรเลยนี่คะ! ไม่สิ หรือว่าจริงๆ คุณรู้อยู่แล้ว แต่เลือกดำเนินเรื่องให้เป็นแบบนี้คะ? แต่แบบนั้นมันก็... ถ้าเป็นแบบนั้น... จะมีแต่สร้างบาดแผลให้กันและกันนะ...!"
10027060-247 = "......"
10027060-249 = "คุณเล่นตลกอยู่เหรอคะเนี่ย?! ลุกขึ้นมาเลยนะคะ คุณเมรูริ! ถ้าเรื่องมันจบไปทั้งๆ แบบนี้ ฉันจะไม่ให้อภัย#nคุณตลอดชีวิตเลยค่ะ! ต่อให้มีใครที่ยิ่งใหญ่เหนือธรรมชาติมายกโทษให้คุณ แต่ฉันไม่มีวันยกโทษให้คุณ#nเด็ดขาดค่ะ!"
10027060-255 = "งึมงำๆ.... ใครมาส่งเสียงหนวกหูแบบนี้นะ...? หืม? ทำไมเธอถึงมาอยู่ที่นี่ล่ะ ทาคาเนะ?"
10027060-256 = "...มาตรวจคน แล้วก็ตรวจงานด้วยค่ะ รู้แค่นี้ก็พอค่ะ"
10027060-257 = "ตรวจคน...? ตรวจงาน...? พูดอะไรไม่เห็นจะรู้เรื่อง... ไม่ไหวแล้ว ฉันขอนอนอีกหน่อยนะ"
10027060-259 = "ถ้าจะไปนอนก็บอกเรื่องต่อจากนี้ก่อนค่ะ! เร็วๆ เข้า!"
10027060-271 = "เฮ้อ... พอได้เติมกาแฟสัก 3 แก้ว สติก็ค่อยๆ กลับมาแล้วละนะ"
10027060-272 = "จำไว้เลยนะคะว่าคุณใช้ฉันชงกาแฟ...!"
10027060-273 = "ก็มันช่วยไม่ได้นี่นา สภาพครูก็ไม่ไหวแล้วด้วย และฉันก็พร้อมจะวูบได้ทุกเมื่อ งั้นก็ต้องใช้คนที่ยังมี#nสติสัมปชัญญะครบสิ หรือเธอว่าไม่ใช่?"
10027060-274 = "กล้าพูดแบบนั้นออกมาจากปากตัวเองเหรอคะ! แต่ก็เอาเถอะ..."
10027060-275 = "แล้วมันเป็นยังไงบ้าง?"
10027060-276 = "อะ... อะไรเหรอคะ?"
10027060-277 = "ก็ครึ่งแรกของ <ลูน่า> เล่มสุดท้ายไง เธอบอกว่าจะรีวิวในฐานะของนักวิจารณ์และประธานกลุ่มแฟน#nคลับไม่ใช่เหรอ?"
10027060-282 = "...ฉันไม่ให้ผ่านค่ะ"
10027060-283 = "ทำไมเป็นงั้นล่ะ?!"
10027060-285 = "ยังจะถามมาได้ ก็มันเพิ่งเสร็จแค่ครึ่งเดียวไงคะ! ถ้าได้อ่านแค่ครึ่งเรื่อง ฉันจะวิจารณ์อะไรได้ล่ะคะ?"
10027060-286 = "ที่ <ลูน่า> เล่ม 22 มันไม่มีอยู่จริงเพราะมันยังไม่สมบูรณ์แบบ สิ่งที่คุณทำอยู่ตอนนี้ก็ไม่ต่างอะไรจาก#nนั้นเลยค่ะ!"
10027060-287 = "อึก...!"
10027060-288 = "คุณคิดจะคืนดีกับคุณโมมิจิด้วยของครึ่งๆ กลางๆ แบบนี้จริงๆ เหรอคะ? นี่คุณวางใจไปเองว่าทำแบบนี้#nมันจะได้ผลงั้นเหรอ?"
10027060-289 = "อึก...!"
10027060-294 = "(หัวเริ่มร้อนแล้ว...! แต่เถียงอะไรไปก็ไม่น่าจะฟังขึ้น...! แต่ผลงานที่ผ่านมาของฉัน... ที่มันสำเร็จได้ก็#nเพราะมีโมมิจิคอยช่วย...!)"
10027060-295 = "(ถึงครูจะพยายามช่วยแล้ว แต่ถ้าไม่มีโมมิจิ งานนี้ก็คงไม่เสร็จ...)"
10027060-296 = "(ถ้าต้นฉบับไม่เสร็จสมบูรณ์ ก็ไปขอโทษโมมิจิไม่ได้... แต่ถ้าไม่มีโมมิจิ ฉันก็ปั่นต้นฉบับให้เสร็จไม่ไหว#nเหมือนกัน... จะทำยังไงดีล่ะเนี่ย...!)"
10027060-301 = "ว่ากันว่า... บางครั้งความซื่อตรงก็เป็นคุณธรรมสูงสุดนะคะ มันช่วยปลดปล่อยเราให้เป็นอิสระค่ะ"
10027060-302 = "เธอหมายความว่าให้ฉันยอมรับแต่โดยดีงั้นเหรอ? ยอมรับว่าฉันจะส่งต้นฉบับไม่เสร็จทันเวลาน่ะนะ...?!"
10027060-303 = "ก็เราจะเอาหนังสือที่เสร็จแค่ครึ่งเล่มไปจัดแสดงไม่ได้นี่คะ อ่านไปมันก็ไม่รู้ตอนจบอยู่ดี"
10027060-304 = "ถ้าคุณบอกว่านี่คือความจริงใจจากคุณแล้วละก็... ฉันคงจะผิดหวังในตัวคุณจากใจจริงเลยละค่ะ"
10027060-305 = "...ยังไม่ถึงเดดไลน์สักหน่อย"
10027060-306 = "ถึงจะเหลือเวลาอีก 2 วัน แต่ถ้าคิดเวลาที่เหลือของวันนี้และเวลาตีพิมพ์ด้วยแล้วละก็ ที่จริงก็เหลือ#nเวลาให้เขียนและวาดต่อแค่วันเดียวเท่านั้นค่ะ คุณมั่นใจว่าจะปั่นต้นฉบับอีกครึ่งเล่มที่เหลือให้เสร็จได้#nภายในวันเดียวไหมล่ะคะ คุณเมรูริ?"
10027060-307 = "ถ้าไม่ลองก็ไม่มีทางรู้หรอกน่า"
10027060-308 = "ถึงแม้จะไม่มีคุณโมมิจิน่ะเหรอคะ?"
10027060-309 = "ฉันจะรับการวิจารณ์จากเธอก็ต่อเมื่อการ์ตูนเสร็จสมบูรณ์ทั้งเล่มแล้ว"
10027060-310 = "...จะยกเหตุผลที่ถูกต้องขึ้นมาพูดสินะคะ ก็ดีค่ะ ถ้างั้นฉันก็จะรอค่ะ"
10027060-311 = "ฉันจะรอติดตามผลงานแล้วกันค่ะ"

[translation]
10027060-1 = "#title;제6화;절반의 완성"
10027060-2 = "#place;동인회장"
10027060-3 = "1;타카네;04\n5;메루;01\n#1;h\n#5;h\n#1;a\n#5;a\n#wait;1000"
10027060-4 = "#wait;2500"
10027060-5 = "[ns] \"메루, 갑자기 무슨 말이야?\""
10027060-6 = "1;타카네;02;선생님 말씀이 맞아요. 갑작스럽네요. <루나>의 마지막 권을 그리겠다고요? 당신이, 왜요?\n#1;em;[?]"
10027060-7 = "1;타카네;06;애초에 당신, 얼마 전까지는 <루나>라는 작품이 세상에 있었는지도 모르고 있었잖아요?"
10027060-8 = "5;메루;05;거 아픈 데를 찌르네…….\n#5;em;[세로선]"
10027060-9 = "1;타카네;05;아픈 데를 찌른다든가 그런 문제가 아니라 이건……"
10027060-10 = "1;타카네;06;잠깐만요. 그렇다는 건……. 메루리 씨가 <루나>의 동인지를 그린다는 건……."
10027060-11 = "5;메루;04;……갑자기 왜 그러냐. 불길하게."
10027060-12 = "1;타카네;16;역시 마음에 들지 않는군요."
10027060-13 = "5;메루;05;또 어디가.\n#5;em;[?]"
10027060-14 = "1;타카네;09;얼뜨기 팬이 갑자기 감명받아서, 감히 신성한 <루나>의 동인지를 그리겠다니…… <루나>는 제가 먼저 좋아했거든요?!\n#1;em;[!]"
10027060-15 = "5;메루;10;그게 뭔 상관이야?!\n#5;em;[?!]"
10027060-16 = "[s] \"아, 가끔 있지. 그런 생각이 들 때.\""
10027060-17 = "5;메루;07;선생까지?! "
10027060-18 = "5;메루;09;그보다 역시 너 나한테만 엄청나게 편파적이지 않아?!\n#5;em;[스팀]\n#5;hophop"
10027060-19 = "1;타카네;05;한 명의 평론가이자 <루나>의 팬으로서, 이 정도의 불만은 말할 수 있다고 보는데요?"
10027060-20 = "#st;[0,0];instant;1;"
10027060-21 = "#clearST"
10027060-22 = "1;타카네;05\n5;메루;05\n#1;h\n#5;h\n#wait;2500\n#5;em;…"
10027060-23 = "5;메루;99;……뭐, 그래. 분명, 그렇게 보일 수도 있어.\n#5;greeting"
10027060-24 = "5;메루;05;나도 한 명의 독자로서 좀 공감이 되는 게 없는 건 아니지만 말이지!\n#5;em;[!]"
10027060-25 = "5;메루;02;하지만…… 역시, 나도 그려 보고 싶어졌어."
10027060-26 = "1;타카네;01;……흐음. 계속 이야기해 보시죠."
10027060-27 = "5;메루;99;처음에…… 내 멋대로 듣는 상대를 생각하지도 않고, 작품에 대해 떠들어댔던 건 분명 실수였어. 인정해."
10027060-28 = "5;메루;99;그 때문에 모미지를 화나게 했고, 결과적으로 사태가 여기까지 왔지. 모두…… 내 책임이야.\n#5;em;…"
10027060-29 = "1;타카네;02;평소 독선적이고 타협 따윈 절대로 안 하던…… 제가 알던 메루리 씨와 다르군요."
10027060-30 = "1;타카네;01;……새삼스럽지만 묻겠어요. 그렇게 생각이 바뀐 이유는, 무엇 때문이죠?"
10027060-31 = "5;메루;02;……팬들. 그리고 동인지들."
10027060-32 = "5;메루;01;이렇게, 붉은겨울에서도 따로 떨어진 곳에서…… 이 정도 규모의 온리전이 열리고 있었다는 사실이."
10027060-33 = "5;메루;99;그리고 거기에 참여한 팬들이, 모두 자발적으로 동인지를 그리고 있었다는 사실이."
10027060-34 = "1;타카네;02;…….\n#1;em;…"
10027060-35 = "5;메루;01;모자란 게 있으면 공부하겠어."
10027060-36 = "5;메루;05;그러니까, 나도 그릴 거야. 그렇게 하고 싶어졌으니까. 그런 생각이 들었으니까.\n#5;em;[!]"
10027060-37 = "1;타카네;05;……욕망은 창작의 원동력이니까요?\n#1;em;[?]"
10027060-38 = "5;메루;03;그런 거지.\n#5;em;[반짝]"
10027060-39 = "1;타카네;99;……그렇군요."
10027060-40 = "5;메루;01;물론 <루나>의 오랜 팬이라는 너는 여전히 인정하지 못할 수도……."
10027060-41 = "1;타카네;07;좋아요. 이렇게 하죠. 당신에게 앞으로 4일의 시간을 드리겠습니다. 메루리 씨.\n#1;em;[음표]"
10027060-42 = "5;메루;04;갑자기 타임 리미트?! 그것도 짧아!\n#5;em;[?!]"
10027060-43 = "1;타카네;10;어쩔 수 없어요. 하겠다고 한 건 당신이잖아요? 그리고 어떤 의미에서 이건 기회이기도 하다고요?"
10027060-44 = "5;메루;05;일단 물어나 보자. 갑자기 왜? 4일이라는 시간제한은 또 뭐고?\n#5;em;[?]"
10027060-45 = "1;타카네;08;그건, 올해의 <루나 22권 미니 온리전>이 4일 후에 개최되기 때문이에요."
10027060-46 = "[s] \"어? 그건 지금 열리는 행사랑 다른 거야?\""
10027060-47 = "1;타카네;05;네. 지금 열리는 건 올해의 <루나 22권 미니 온리전>이 열리기 전에 먼저 치러지는 앞선 행사로, 요컨대 전야제.\n#1;em;[반응]\n#1;m3\n#5;dr"
10027060-48 = "1;타카네;01;여러분이 여기까지 오는 길에 보셨던 수많은 <루나 완결권>은 전부 작년이나, 그보다 좀 더 과거에 출품되었던 동인지들인 셈이죠."
10027060-49 = "1;타카네;02;하지만 매년 새로운 루나의 완결권을 추구하는 저희들은, 올해에도 같은 행사를 열 예정입니다."
10027060-50 = "1;타카네;00;바로 그것이, 4일 후에 열리는 올해의 <루나 22권 미니 온리전>이랍니다. \n#1;em;[반짝]"
10027060-51 = "1;타카네;03;당신, 자기 손으로 루나 22권을 그리고 싶다고 했죠. 그렇다면 그 행사에 참가하는 게 어때요?"
10027060-52 = "5;메루;02;그럼 네가 말했던 4일이라는 시간은 곧…….\n#1;m1\n#5;em;[?]\n#5;al"
10027060-53 = "1;타카네;07;네. 정식으로 저희 온리전에 참가하여 루나 22권을 출품해 보라는 것이죠."
10027060-54 = "1;타카네;12;모미지 씨 또한 루나의 팬이라면, 이 행사에 대해서도 알고 있겠지요. 그곳에 출품한 당신의 작품이라면, 같은 루나의 팬인 모미지 씨에게도 떳떳하게 보여줄 수 있지 않겠어요?"
10027060-55 = "1;타카네;13;아, 물론 마감이 닥치면 비명을 지르며 품위 없는 말을 쏟아내곤 하는 메루리 씨가, 과연 어디까지 할 수 있을지 조금 걱정이 되기는 하지만요.\n#1;em;…"
10027060-56 = "5;메루;05;그냥 차라리 욕을 해라, 욕을 해…….\n#5;em;[속상함]"
10027060-57 = "1;타카네;02;당신이 진심으로 온리전에 참가해, 22권을 출품한다면.\n#1;m3\n#5;dr"
10027060-58 = "1;타카네;01;그 동인지가 얼뜨기 팬의 것인지, 아니면 인정받을 만한 '아우라'를 가진 작품인지."
10027060-59 = "1;타카네;05;다른 누구도 아닌 이 제가! 붉은겨울의 평론가이자 <루나> 동호회의 회장으로서!\n#1;em;[!]"
10027060-60 = "#all;hide"
10027060-61 = "3;타카네;09;직접 확인과 평가를 해 드릴 테니까요!\n#3;closeup\n#bgshake"

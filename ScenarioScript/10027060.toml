10027060-85 = "#wait;2000"
10027060-86 = "#place;붉은겨울 도서관"
10027060-87 = "3;메루;16;으어어……. 돌아왔다…….\n#3;a\n#3;em;[세로선]\n#3;stiff"
10027060-88 = "[s] \"반나절 내내…… 눈 속을 걸은 느낌이야…….\""
10027060-89 = "3;메루;15;느낌이 아니라, 진짜 그랬었는데. 그것도 동인지를 양손 가득 들고."
10027060-90 = "[s3] \"책들이 얇아서 가벼울 줄 알았는데.\"\n[s4] \"생각보다 무게가 나가네…….\""

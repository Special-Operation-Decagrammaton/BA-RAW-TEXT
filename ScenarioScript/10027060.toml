10027060-92 = "#wait;100"
10027060-93 = "3;메루;00;헹! 동인지를 무시하면 곤란하다고! 물론 한 권 한 권은 얇고 가볍지만…….\n#3;em;[재잘]"
10027060-94 = "3;메루;01;그것들이 쌓여서 한곳에 모이면, 절대 무시할 수 없는 규모가 된단 말이야."
10027060-95 = "3;메루;99;자주 있지, 자주 있어……. 눈에 보이는 대로 마음에 드는 것들을 닥치고 사다가, 무게는 무게대로 나가서 지치고, 지갑은 그에 반비례해 얇고 가벼워지는 사태…….\n#3;em;…"
10027060-96 = "3;메루;02;양손 가득 무게가 전해져 오고, 주위에서는 왠지 흘끔거리며 쳐다보는 것 같고, 그 모든 시선을 애써 무시하면서 바닥을 내려다보며 시간이 흐르기만을 기다리고……. 후우.\n#3;em;[한숨]"
10027060-97 = "3;메루;04;아, 오해하지 말라고! 내가 그랬다는 건 아니니까!\n#3;em;[!]\n#3;jump"
10027060-98 = "[s] \"그런 것 치고는 미묘하게 구체적입니다만?\""
10027060-99 = "3;메루;05;어쨌든 간에! 지금부터 연구다! 시작이야!\n#3;closeup"
10027060-100 = "[s] \"벌써?!\""
10027060-101 = "3;메루;00;벌써라니! 우리에겐 4일밖에 남지 않았잖아? 이러는 순간에도 시간은 지나가고 있단 말이야."
10027060-102 = "3;메루;99;하지만 그전에 먼저……\n#3;em;…"
10027060-103 = "3;메루;05;선생, 이건 내 억지야. 어디까지나 나 혼자 하고 싶다고 결정한, 히메키 메루의 제멋대로 투정."
10027060-104 = "3;메루;02;이런 내 억지에 선생이 어울려 줄 필요는……"
10027060-105 = "[s] \"아니. 그렇지 않아. 처음부터 나는 메루의 요청을 받고 왔는걸.\""
10027060-106 = "3;메루;07;윽, 그럴 줄은 알고 있었지만. 기다렸다는 듯이 클리셰의 대사를!\n#3;em;[?!]"
10027060-107 = "3;메루;09;……그런 선생이라서, 믿고 있는 거지만.\n#3;greeting"
10027060-108 = "3;메루;08;좋았어. 간만에 동인지도 왕창 사 왔고, 우선은 분석부터 시작해야지. 그런 다음…… 오늘부터 바로 러프에 들어가 주겠어!\n#3;closeup\n#3;em;[음표]"

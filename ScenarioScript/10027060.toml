[translation]
10027060-1 = "第6話;半成品"
10027060-2 = "同人會場"
10027060-5 = "[ns]「愛瑠，這會不會太突然了？」"
10027060-6 = "老師說的對，這也太突然了吧？#n要畫《LUNA》的最終卷？為什麼……？"
10027060-7 = "直到不久前，你甚至還不知道世界上有《LUNA》這部作品存在不是嗎？"
10027060-8 = "你還真愛戳人痛處……"
10027060-9 = "這不是愛不愛戳人痛處的問題，而是……"
10027060-10 = "等等，如果是這樣的話……如果Meruri同學要畫《LUNA》同人誌……"
10027060-11 = "……怎麼了，你這樣讓我有點害怕。"
10027060-12 = "我果然還是不喜歡。"
10027060-13 = "哪裡不喜歡？"
10027060-14 = "一個跟風書迷突然受到感召就說要畫神聖的《LUNA》同人誌……#n明明是我先喜歡《LUNA》的！"
10027060-15 = "這兩件事有什麼關係啊！？"
10027060-16 = "[s]「啊～我有時候也會有這種想法。」"
10027060-17 = "竟然連老師也……！？"
10027060-18 = "況且你平時不就老愛針對我嗎！？"
10027060-19 = "身為一名評論家兼《LUNA》的粉絲，我至少有權利表達不滿吧？"
10027060-23 = "……這倒也是。#n你會這麼想也是情有可原……"
10027060-24 = "身為一名讀者，我也不是不能理解！"
10027060-25 = "可是……我還是想要畫畫看。"
10027060-26 = "……請繼續說吧。"
10027060-27 = "當時……我不該不顧紅葉的感受，自顧自地把我對作品的想法通通說出來。#n這點我承認。"
10027060-28 = "紅葉因此而生氣，最終讓事情演變到現在這個地步……全都是我造成的。"
10027060-29 = "今天的你……和我認識的那個自命清高又絕不向人低頭的Meruri同學完全不一樣呢。"
10027060-30 = "……雖然這麼問或許有點多餘，不過是什麼讓你改變了想法呢？"
10027060-31 = "……是粉絲們，以及他們製作的同人誌。"
10027060-32 = "即使是在赤冬學園之中，這裡也算是相當偏僻……#n竟然能在這裡見到規模如此龐大的限定專展。"
10027060-33 = "而且前來參加這場活動的粉絲們，甚至還都自發性地創作了同人誌。"
10027060-34 = "……"
10027060-35 = "知道自己有所不足，就應該要設法改進。"
10027060-36 = "所以我也要畫。#n我想這麼做，應該要這麼做。"
10027060-37 = "……因為慾望就是創作的動力？"
10027060-38 = "嗯，就是這樣。"
10027060-39 = "……原來如此。"
10027060-40 = "不過身為《LUNA》資深書迷的你，應該不會認同吧……"
10027060-41 = "好，那就這麼辦吧。#n我給你四天的時間，Meruri同學。"
10027060-42 = "突然就出現時間限制！？而且還這麼短！"
10027060-43 = "那有什麼辦法，不是你自己說你要畫的嗎？#n而且從別的角度來看，這對你來說不也是個機會嗎？"
10027060-44 = "不過這麼做的用意是什麼？為什麼是四天？"
10027060-45 = "那是因為今年的「LUNA第二十二卷Only展」將在四天後舉行。"
10027060-46 = "[s]「嗯？那跟今天舉辦的活動不一樣嗎？」"
10027060-47 = "是的。#n今天只是為「LUNA第二十二卷Only展」預熱的、類似前夜祭的小活動而已。"
10027060-48 = "兩位先前看到的那些《LUNA》最終卷，全部都是去年或更久以前出版的同人誌。"
10027060-49 = "然而追求新詮釋的《LUNA最終卷》的我們，今年也預計將按例舉辦相同的活動。"
10027060-50 = "也就是將於四天後舉辦的「LUNA第二十二卷Only展」。 "
10027060-51 = "你剛才說，想親手畫一本《LUNA最終卷》對吧？#n既然如此，何不來參加我們的專展呢？"
10027060-52 = "所以你剛才說的四天期限指的是……"
10027060-53 = "沒錯，我希望你能報名參加我們的迷你專展，並在展覽上展示你所畫的《LUNA》。"
10027060-54 = "我想身為《LUNA》粉絲的紅葉同學很可能也知道這場專展。#n如果你的作品能在這場專展上亮相……這份禮物應該也會變得更有份量吧？"
10027060-55 = "當然，每當被截稿期追趕時都會一邊哀號一邊口吐芬芳的Meruri同學，#n你究竟能做到什麼程度，我確實有點擔心就是了……"
10027060-56 = "想罵我就直說，何必拐彎抹角的……"
10027060-57 = "假如你是真心想創作《LUNA》第二十二卷，並參加這次的迷你專展的話……"
10027060-58 = "你所製作的同人誌究竟是跟風之作，還是具有值得評價「氣場」的作品──"
10027060-59 = "就由我本人──以赤冬的評論家暨《LUNA》後援會會長的身分！"
10027060-61 = "好好評價評價吧！"
10027060-66 = "[ns]「……」"
10027060-67 = "……老師？#n您怎麼了嗎？"
10027060-68 = "[s1]「沒什麼，只是在想你接下來會不會發出高亢的笑聲。」\n[s2]「像是『哦呵呵呵呵！』這種……」"
10027060-71 = "不太明白老師的意思呢……？"
10027060-72 = "你這傢伙還是老樣子，自尊心那麼強……！#n你算什麼裁判啊！能不能得到你的認可，對我來說根本就不重要！"
10027060-73 = "……如果是平時的我，應該早就這樣大喊了吧？#n唔……"
10027060-74 = "不過……不管怎麼說……我們能夠找到這個地方，或多或少，也是託你的福。"
10027060-75 = "什麼？我沒聽清楚耶？#n和別人說話的時候，不是應該大聲清楚地說出來嗎？"
10027060-76 = "沒聽到的話就算了～"
10027060-77 = "總之！這次我就照你的話做吧。#n反正稍微有點「壓力」，我反而能夠表現得更好。"
10027060-79 = "最重要的是，這樣我才能夠畫出能讓我和紅葉都滿意的作品！"
10027060-80 = "嗯……基於禮貌，我還是會給你一點期待和支持……#n請好好努力囉？"
10027060-86 = "赤冬聯邦學園．圖書館"
10027060-87 = "唔哦哦……終於回來了……"
10027060-88 = "[s]「有種……在雪地裡走了半天的錯覺……」"
10027060-89 = "老師，那不是錯覺。#n我們是真的在雪地裡走了半天，而且兩手還提著滿滿的同人誌。"
10027060-90 = "[s3]「那些書看起來這麼薄，我還以為很輕的說。」\n[s4]「沒想到提起來比想像中還重……」"
10027060-93 = "哼！小看同人誌的話，可是會吃大虧的喔！#n雖然每一本同人誌都很輕、很薄……"
10027060-94 = "要是一次集中起來，重量絕對不容小覷。"
10027060-95 = "這真的非常常見……一開始看到喜歡的東西就直接買下來，#n漸漸地因為那些東西的重量而累得喘不過氣，而錢包的厚度則會漸漸變薄……"
10027060-96 = "沉甸甸的感覺從雙手傳來的同時，忽然察覺周圍的人似乎都悄悄注視著你，#n只能默默低下頭，努力忽略眾人的視線，靜靜地等待時間流逝……呼。"
10027060-97 = "啊，老師你別誤會！剛才那些是我聽朋友說的！"
10027060-98 = "[s]「那會不會描述得太詳細了……？」"
10027060-99 = "總而言之！趕緊開始研究吧！現在馬上！"
10027060-100 = "[s]「現在！？」"
10027060-101 = "就是現在！我們只剩下四天的時間了哦！#n就連我們在說話的時候，時間也正在無情地流逝啊。"
10027060-102 = "不過在那之前……"
10027060-103 = "老師，其實這只是我自己在胡鬧，是姬木愛瑠自己的決定和任性。"
10027060-104 = "你其實沒有必要配合……"
10027060-105 = "[s]「不，我不這麼認為。我一開始就是來幫助你的。」"
10027060-106 = "唔，雖然是有這麼想過，不過老師竟然真的說出了那種老套的台詞！"
10027060-107 = "……也是因為老師是這樣的人，我才會相信你就是了。"
10027060-108 = "好，既然久違地買了這麼多同人誌回來，首先就從分析開始吧。#n接下來……今天就直接深入最艱難的戰區吧！"
10027060-110 = "（於是，與愛瑠的四天內畫出同人誌作戰就此開始……）"
10027060-114 = "D-4"
10027060-118 = "為什麼會這麼多啊！？"
10027060-119 = "[s]「歲月和歷史的累積……真是不容小覷啊……」"
10027060-120 = "唔……這樣不行。修正作戰！#n要把這些全部讀完別說是四天了，就算有一個星期也不夠。"
10027060-121 = "總之先開始作畫，等陷入瓶頸的時候再把同人誌拿出來參考吧！"
10027060-122 = "老師，跟上我吧！"
10027060-133 = "D-3"
10027060-146 = "[ns]「不行哦，學生愛瑠。現在已經是睡覺時間了。」"
10027060-147 = "不行……不行啦……#n現在連，一分一秒，都很珍貴……"
10027060-148 = "咦咦，老師，你要拉我去哪裡……？#n先坐在這張椅子上……？"
10027060-156 = "（愛瑠才剛一坐下便昏昏沉沉地睡了過去）"
10027060-157 = "（就這樣放著不管的話，很可能會一路睡到明天中午……）"
10027060-162 = "[ns]「來，愛瑠你先醒醒。先去刷牙洗梳一下再睡。」"
10027060-163 = "咦……？你剛才不是叫我去睡覺嗎……#n為什麼說話變來變去的，老師……"
10027060-164 = "[s]「這樣睡著的話會著涼的，你先醒一醒。」"
10027060-165 = "我不要……我就是要這樣睡……好睏……"
10027060-166 = "[s]「來吧，乖孩子？趕快去洗臉刷牙，很快就結束了。」"
10027060-167 = "我一點也不乖……"
10027060-178 = "D-2"
10027060-181 = "老師……我們那時候睡了幾個小時？"
10027060-182 = "[s]「大概不到三個小時吧……？」"
10027060-183 = "那……我們已經連續工作幾個小時了……？"
10027060-187 = "[ns]「大概十三個小時……？」"
10027060-188 = "嘿，嘿嘿……"
10027060-189 = "這裡真的是人間地獄啊……"
10027060-200 = "[ns5]「歡迎你來，貴音……」\n[ns6]「不過……你今天怎麼會來？應該還有幾天的時間吧？」"
10027060-203 = "……咳咳。#n老師，請您當作我是來監視的吧。"
10027060-204 = "我絕對……絕～對不是因為擔心Meruri同學才來的哦！？"
10027060-205 = "總之，我才剛抵達「知識解放戰線」的圖書館，#n就發現老師和Meruri同學都半死不活地躺在地上……"
10027060-206 = "詢問發生了什麼事，卻默默地給了我一本書？"
10027060-212 = "[ns]「沒錯……貴音……」"
10027060-213 = "老師，就算您豎起大拇指這麼說也……"
10027060-214 = "你也說點什麼吧，Meruri同學？"
10027060-219 = "呼嚕嚕嚕……"
10027060-221 = "哎呀，看來他已經失去意識了。"
10027060-222 = "算了，既然來都來了，就讓我來見識一下Meruri同學的誠意吧。"
10027060-223 = "雖然身為一名評論家應該盡力保持客觀……#n這次我就破例以《LUNA》後援會會長的身分，從個人的角度來評鑑吧。"
10027060-224 = "[ns]「請你多多指教。」"
10027060-225 = "那麼……"
10027060-234 = "嗯……嗯……為什麼兩個露娜都……咦？騙人的吧！#n劇情為什麼會這樣發展！？"
10027060-235 = "等等，這不是本篇中埋下的伏筆嗎……竟然反過來這樣利用？#n這也就算了，甚至還……！"
10027060-240 = "哦哦，嗯嗯……有趣，真是有趣。#n啊，居然在這種時候讓角色說出這種台詞……！"
10027060-241 = "回來吧，露娜！不，我說的不[ruby=這個露娜]是你，[/ruby]而[ruby=那個露娜]是他！[/ruby]那些並不是真心話吧！"
10027060-242 = "你不是也很清楚嗎！不，之所以做出那種選擇，或許正是因為再清楚不過了？#n但是這樣一來……這麼做的話……只會傷害彼此而已啊……！"
10027060-247 = "……"
10027060-249 = "這是在開什麼玩笑！？請你起來，Meruri同學！#n如果這個故事就這樣結束的話，我一輩子都不會原諒你的！#n就算再厲害再偉大的人願意原諒你，我也永遠不會！"
10027060-255 = "唔喵……怎麼這麼吵啊……？#n咦？貴音怎麼會在這裡？"
10027060-256 = "……來監視和視察。#n你這麼想就行了。"
10027060-257 = "監視……？視察……？完全聽不懂你在說什麼……#n不行了，我再睡一下。"
10027060-259 = "想睡覺的話就先把後續的故事交出來！快點！"
10027060-271 = "呼啊啊啊……喝了三杯咖啡才總算稍微清醒了一點。"
10027060-272 = "竟敢要我幫你泡咖啡，給我記住……！"
10027060-273 = "這也沒辦法嘛～畢竟老師現在也呈現半昏迷狀態。#n如果你剛才不幫我泡咖啡的話，我一定會繼續睡下去……#n所以也只好請閒閒沒事的人代勞囉，你說對吧？"
10027060-274 = "這種話不要自己說出來啊！#n算了……"
10027060-275 = "所以呢，怎麼樣？"
10027060-276 = "什，什麼怎麼樣？"
10027060-277 = "《LUNA》最終卷的前半部啊。#n你不是說要以評論家兼後援會會長的身分來評鑑嗎？"
10027060-282 = "……不合格。"
10027060-283 = "為什麼！？"
10027060-285 = "還問我為什麼，你不是只畫了半本而已嗎！#n只有半本要別人怎麼評價啊？"
10027060-286 = "《LUNA》之所以沒有第二十二卷，不就是因為作者沒畫完嗎？#n而你現在做的事就跟那個作者一模一樣！"
10027060-287 = "唔……！"
10027060-288 = "你真的打算用這種半成品跟紅葉同學和好？#n以為這樣真的行得通？"
10027060-289 = "唔唔……！"
10027060-294 = "（真不甘心……！可是我現在根本百口莫辯……！#n　畢竟我平常之所以能創作出那些作品……都是因為有紅葉的幫助……！）"
10027060-295 = "（雖然老師也很努力幫我，可是果然只要紅葉不在，我就……）"
10027060-296 = "（要是無法畫完就沒有臉向紅葉道歉……#n　但是沒有紅葉又無法創作出滿意的同人誌……這種時候，我到底該怎麼辦……！）"
10027060-301 = "有時候，誠實就是最高尚的美德。#n因為它能讓我們擺脫一切的束縛。"
10027060-302 = "……！#n你的意思是要我乖乖承認自己沒辦法準時畫完同人誌嗎……！？"
10027060-303 = "這樣的半成品連要展示都有困難吧。#n畢竟根本還沒完成。"
10027060-304 = "如果這就是你全部的誠意的話……我可能會真的對你感到有點失望。"
10027060-305 = "……不過，現在還有一些時間。"
10027060-306 = "雖然乍看之下似乎還有兩天，不過扣掉今天和印刷的時間，實際上只剩下一天而已。難道你有自信在一天的時間內，把剩餘的進度趕出來嗎，Meruri同學？"
10027060-307 = "不試試看怎麼知道呢。"
10027060-308 = "就算紅葉同學不在也一樣？"
10027060-309 = "無論是評論還是漫畫，都只有在完成之後才能展現自己的價值。"
10027060-310 = "……在這種時候搬出大道理啊？#n好吧，既然如此，我也會耐心等待的。"
10027060-311 = "你所繳出的成品，我也相當期待哦。"
10027060-312 = "……還請繼續努力。"

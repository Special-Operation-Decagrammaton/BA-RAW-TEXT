10027060-203 = "...อะแฮ่ม คิดซะว่าฉันมาตรวจงานแล้วกันค่ะ"
10027060-204 = "ฉันไม่ได้มาเพราะเป็นห่วงคุณเมรูริหรอกนะคะ ไม่เลยค่ะ!"
10027060-205 = "เอาเถอะค่ะ พอได้มาห้องสมุดของ <ชมรมแนวร่วมปลดปล่อยความรู้> สิ่งที่ฉันเจอก็คือ คุณครูกับคุณเมรูริที่เหมือนคนที่กำลังจะล้มลงไปนอนกองกับพื้นอยู่แล้ว"
10027060-206 = "แล้วพอถามว่าทำไมถึงได้มาอยู่ในสภาพนี้กัน ฉันก็ได้หนังสือเล่มนี้มาแทนคำตอบอย่างนั้นเหรอคะ?"

10027060-67 = "3;타카네;02;……선생님? 왜 그렇게 쳐다보시죠?\n#3;em;[?]"
10027060-68 = "[s1] \"아니, 왠지 소리 높여 웃지 않을까 해서.\"\n[s2] \"오–호호호호! 라던가…….\""
10027060-69 = "#wait;100"
10027060-70 = "#wait;100"
10027060-71 = "3;타카네;14;무슨 말씀이신지 모르겠는데요……?"
10027060-72 = "5;메루;05;이 녀석, 여전히 자존감이 너무 높아……! 네가 무슨 심판이냐! 애당초 너에게 인정받고 아니고는 중요한 것도 아니잖아!\n#3;m1\n#5;em;[빠직]\n#5;al"
10027060-73 = "5;메루;99;……라고 평소라면 소리쳤겠지만. 으음…….\n#5;stiff"
10027060-74 = "5;메루;05;뭐…… 이곳까지 올 수 있었던 것도, 어떤 의미로는 네 덕분인 것도 있고.\n#fontsize;50"
10027060-75 = "3;타카네;03;네? 안 들리는데요. 사람에게 할 말이 있을 때에는 크고 분명한 목소리로 말해 주시겠어요?\n#3;em;[음표]"
10027060-76 = "5;메루;00;못 들었으면 됐거든요~\n#5;em;[재잘]"
10027060-77 = "5;메루;01;아무튼! 이번만큼은 한 번 어울려 주겠어. 나도 그 정도의 '허들'이 있는 편이 딱 좋 것 같고."
10027060-78 = "#all;hide"
10027060-79 = "3;메루;05;무엇보다 그래야 나 자신도, 모미지도 납득할 수 있는 걸 그려낼 수 있을 테니까!\n#3;closeup"
10027060-80 = "3;타카네;12;흥…… 예의상 기대와 응원은 해 드릴 테니, 힘껏 발버둥 쳐 보도록 하세요?\n#3;em;[음표]\n#3;closeup"

[translation]
10027060-1 = "Episode 6;Half-Baked"
10027060-2 = "Fanfic Convention"
10027060-5 = "[ns] \"Meru, you can't just write a book in the blink of an eye...\""
10027060-6 = "Sensei is right. It takes planning. How do you plan to write the whole ending on a whim?"
10027060-7 = "I mean, it wasn't that long ago that you didn't even know \"Luna\" existed."
10027060-8 = "Ugh. Don't remind me..."
10027060-9 = "I have to remind you. This is a problem..."
10027060-10 = "Oh... On the other hand, if you write up \"Luna\" fanfic..."
10027060-11 = "Uh, that look on your face is giving me the willies."
10027060-12 = "I don't like this. I don't like this one bit."
10027060-13 = "You don't like what? What do you mean?"
10027060-14 = "You're barely a fan of \"Luna\", and suddenly you're inspired to write fanfic? You don't deserve to! I'm the real \"Luna\" fan! I liked it first!"
10027060-15 = "What does that matter?!"
10027060-16 = "[s] \"I can understand where she's coming from.\""
10027060-17 = "You too, Sensei?! "
10027060-18 = "Augh! It's just because you have a grudge against me, Takane!"
10027060-19 = "As both a critic and true fan of \"Luna\", I'm the most qualified person to deliver an opinion on the subject."
10027060-23 = "Well...fine. You make a fair point."
10027060-24 = "And as a reader myself, it's not like I don't sympathize!"
10027060-25 = "But...I really want to draw and create!"
10027060-26 = "Hm... Go on."
10027060-27 = "I'll admit I was wrong for not considering Momiji's opinion before I started criticizing the work."
10027060-28 = "It hurt her feelings, made her angry, and started this whole mess. Everything was my fault."
10027060-29 = "Is that accountability I hear? You never compromise... Meru, you've come so far!"
10027060-30 = "So tell me, what brought about this moment of personal growth?"
10027060-31 = "...The fans and their writing."
10027060-32 = "There's a massive, official convention happening outside of Red Winter."
10027060-33 = "And fans happily created and brought stories to share."
10027060-34 = "..."
10027060-35 = "I'll study whatever I have to."
10027060-36 = "I want to draw. It feels right. I'm sure that's what I need to do."
10027060-37 = "...Like I always say, desire inspires creation."
10027060-38 = "I think you might be right."
10027060-39 = "...Yes."
10027060-40 = "But of course, as a long-time fan of \"Luna\", you would never approve..."
10027060-41 = "Tell you what...I'll give you four days to do it, Meruri."
10027060-42 = "You're giving me a time limit?! But it's so short!"
10027060-43 = "If you want the opportunity, you'll have to make it work. You did want to do this, didn't you?"
10027060-44 = "Why the sudden change of heart? And what's with the four-day time limit?"
10027060-45 = "It's because this year's 'Official Luna Volume 22 Con' is in four days."
10027060-46 = "[s] \"Huh? Is that different from this event?\""
10027060-47 = "Yes, this one is just the precursor to the main event."
10027060-48 = "Everything you saw here today is fanfic that was submitted for previous Volume 22 Cons."
10027060-49 = "The point of this year's event is to find the next great Volume 22 of \"Luna\"."
10027060-50 = "And that's happening in four days. "
10027060-51 = "If you want to draw Luna Volume 22, and you want to do it right, then you should enter the event."
10027060-52 = "You said I have four days...?"
10027060-53 = "If you want to participate in our official con and submit your interpretation of Luna Volume 22, then yes."
10027060-54 = "Oh, and since she's a fan, you should tell Momiji about it. Considering you're both fans of Luna, you should be proud to show off your work."
10027060-55 = "The only thing I worry about is all the shouting and cursing you do when you're coming up on a deadline."
10027060-56 = "If you think that's a lot of cursing..."
10027060-57 = "Just know, if you participate in the official con and submit your Volume 22..."
10027060-58 = "...whether it's garbage or a masterpiece..."
10027060-59 = "...as the best Red Winter critic and president of the \"Luna\" Club..."
10027060-61 = "...I will be the one to personally evaluate it."
10027060-66 = "[ns] \"...\""
10027060-67 = "...Sensei? Why are you looking at me like that?"
10027060-68 = "[s1] \"I thought for sure you'd laugh after saying that.\"\n[s2] \"You know, like a good belly laugh after a joke.\""
10027060-71 = "I don't understand."
10027060-72 = "Well, I could say, \"You're so full of yourself! You're not a judge! I don't need your approval!\""
10027060-73 = "And a few days ago, that's exactly what I would have shouted at you."
10027060-74 = "But I don't want to. You're the reason I'm even here, after all."
10027060-75 = "What was that? I'm sorry. I didn't quite catch that. Could you say it MUCH louder?"
10027060-76 = "No! If you didn't hear it the first time, that's your fault."
10027060-77 = "Anyway, maybe a challenging deadline is just what I need. I'll play along with your plans this time."
10027060-79 = "That way, I can create something that Momiji and I can both enjoy!"
10027060-80 = "I look forward to seeing what you come up with. As a courtesy, I'm expressing my full support. Do your best."
10027060-86 = "Red Winter Library"
10027060-87 = "Ughh... We're back..."
10027060-88 = "[s] \"I feel like we've been tromping through snow for an entire day...\""
10027060-89 = "That's because we did, silly—with an armful of books at that!"
10027060-90 = "[s3] \"They're such thin books!\"\n[s4] \"How can they be so heavy?\""
10027060-93 = "Hmph! Never underestimate fan fiction! Each book is thin and light."
10027060-94 = "But when you have a bunch together, they can be quite the challenge."
10027060-95 = "It happens to me all the time. I buy a bunch of books I can't live without, but the stack really weighs you down. They also have the unfortunate side effect of lightening your wallet."
10027060-96 = "You hold the entire stack until you feel like your arms are going to give out, and people stare at you like you have two heads. Then you just have to stare at the ground and hope they go away eventually."
10027060-97 = "That never happened to me, mind you."
10027060-98 = "[s] \"That description was awfully specific—\""
10027060-99 = "Time to start my research!"
10027060-100 = "[s] \"Already?!\""
10027060-101 = "What do you mean already? We only have 4 days. Time is flying, and every moment is precious!"
10027060-102 = "But there's one thing I wanted to say..."
10027060-103 = "I know I'm being stubborn, Sensei, and that I've made things hard for myself. But I chose to do this, and I'm determined to do it right."
10027060-104 = "But that doesn't mean you have to indulge me..."
10027060-105 = "[s] \"Of course, I will! You asked me for help right from the start, and I won't abandon you now!\""
10027060-106 = "Ugh! You were just waiting to say that cliche line, weren't you? But somehow I knew you'd stick with me."
10027060-107 = "...You're very kind, Sensei. I think that's why I trust you so much."
10027060-108 = "Ah-hem! Well then! I bought a bunch of fanfic for inspiration, so it's time to analyze. I should be able to write up a rough draft by the end of the day!"
10027060-110 = "And with that, Meru's 4-day drawing challenge began..."
10027060-114 = "4 Days to Go"
10027060-118 = "...There's no end to these fanfics!"
10027060-119 = "[s] \"The weight of history is surely great...\""
10027060-120 = "Ugh... Change of plans. This won't work. It would take me four days just to read all of this!  "
10027060-121 = "I'll just have to start working and use these as reference when I'm stuck! "
10027060-122 = "Sensei, you just keep up the good work!"
10027060-133 = "3 Days to Go"
10027060-146 = "[ns] \"Meru, you have to get some sleep.\""
10027060-147 = "No... I can't... Every minute is precious right now..."
10027060-148 = "Huh? Sensei, where are you taking me? Oh, you want me to sit down...here...?"
10027060-156 = "Meru dozed off the moment she sat down."
10027060-157 = "I couldn't leave her like that. She'd have slept 'til noon the next day and felt terrible..."
10027060-162 = "[ns] \"Meru, wake up. You need to brush your teeth and wash your face first.\""
10027060-163 = "But... You just told me to sit down...and I'm so tired... Why do you want me to get up?"
10027060-164 = "[s] \"You'll feel awful if you sleep in this chair all night. Come on.\""
10027060-165 = "Noooo... I wanna sleep right now... Please..."
10027060-166 = "[s] \"Come on now. It's not hard. You're a good, responsible girl, right? Go clean up.\""
10027060-167 = "I'm not that good of a girl..."
10027060-178 = "2 Days to Go"
10027060-181 = "Sensei... How long was I asleep?"
10027060-182 = "[s] \"Just under 3 hours maybe?\""
10027060-183 = "And how many hours have I been working."
10027060-187 = "[ns] \"At least 13.\""
10027060-188 = "Heh... Heheh..."
10027060-189 = "This is hell."
10027060-200 = "[ns5] \"Oh, welcome, Takane.\"\n[ns6] \"What brings you here? Meru still has time, right?\""
10027060-203 = "Ahem. I'm just here for an...inspection. "
10027060-204 = "I am by no means here because I was worried about Meruri."
10027060-205 = "And what do I find when I visit the Knowledge Liberation Front library? Sensei and Meruri lying half-dead on the floor..."
10027060-206 = "When I ask what happened, all you can do is show me this book?"
10027060-212 = "[ns] \"Correct... Takane...\""
10027060-213 = "You only had energy for a thumbs up, Sensei?"
10027060-214 = "Meruri? Say something..."
10027060-219 = "...Zzzzz..."
10027060-221 = "Well, she's a goner. Out cold."
10027060-222 = "Well, since I'm here, I'll give it a look. This is her life's calling, huh?"
10027060-223 = "As a critic, I must remain objective... But I can also factor in my personal opinion as the president of the \"Luna\" fan club."
10027060-224 = "[s] \"Please be kind to her.\""
10027060-225 = "Well, then..."
10027060-234 = "Hmm... So the two Lunas go... Huh? No way! That's how it ends?!"
10027060-235 = "It fulfilled the foreshadowing in the canon... But with a twist! Moreover...!"
10027060-240 = "Oh... Aha! Hm... Interesting. But if she says that..."
10027060-241 = "No! Come back, Luna! She didn't mean that!"
10027060-242 = "She knew all along... That's why she made that choice. But...doing that means they'll only hurt each other..."
10027060-247 = "..."
10027060-249 = "Really, Meruri?! If that's how it ends, I'll never forgive you! Never! Even if the gods themselves do, I won't!"
10027060-255 = "*yawn* What's going on...? Takane? Why are you here?"
10027060-256 = "...Routine inspection. That's all you need to know."
10027060-257 = "Inspection...? I don't understand... *yawn* And I'm still so sleepy! Maybe another nap..."
10027060-259 = "You can sleep after you've finished the next chapter! Hurry!"
10027060-271 = "*yawn* Geez...I can't deal with this until I've had at least three cups of coffee... "
10027060-272 = "...You're making me fetch you coffee?! I won't forget this!"
10027060-273 = "What did you expect? Sensei's half dead, and I desperately need sleep. You're the only one who can make a coffee run right now."
10027060-274 = "Wow. I can't believe you had the guts to say that to my face."
10027060-275 = "You bet I did. Anyway, how was it?"
10027060-276 = "H-How was what?"
10027060-277 = "Part 1 of \"Luna\" Volume 22, of course! You said you'd review it from the perspective of a fan. So...?"
10027060-282 = "...You're disqualified."
10027060-283 = "What?! Why?!"
10027060-285 = "Because it's not even done yet! What is there for me to review? "
10027060-286 = "\"Luna\" Volume 22 was never published because it's incomplete, right? You're sentencing me to the same fate!"
10027060-287 = "Urgh!"
10027060-288 = "Did you really think this half-baked attempt would help Momiji forgive you? How can you be so careless?"
10027060-289 = "Ugh...!"
10027060-294 = "(A thousand words couldn't describe how ashamed and disappointed I am right now. If it weren't for Momiji, I wouldn't even have this opportunity.)"
10027060-295 = "(Sensei tried so hard to help me, but without Momiji, I'd be nothing. )"
10027060-296 = "(I can't finish this without Momiji, but I need to finish this to make up with her... What should I do?!)"
10027060-301 = "Sometimes, being honest with ourselves is exactly what we need to be free."
10027060-302 = "Are you telling me to admit I can't do it and give up?!"
10027060-303 = "I'm telling you to be realistic. You can't submit an unfinished work."
10027060-304 = "And if this is the best you can do, then...I'm a little disappointed in you."
10027060-305 = "...D-Day isn't here yet."
10027060-306 = "It's two days away, and today is nearly over. When you factor in the time to print, you really only have one day left. Do you really think you can finish the last half in a single day, Meruri?"
10027060-307 = "You never know unless you try!"
10027060-308 = "Without Momiji?"
10027060-309 = "You can't review anything until it's finished, right?"
10027060-310 = "So you're going to try for it anyway, huh? Good. I'll be waiting."
10027060-311 = "I look forward to reading your finished product. "
10027060-312 = "...Keep it up."

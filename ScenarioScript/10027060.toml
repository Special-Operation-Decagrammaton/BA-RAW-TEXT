[translation]
10027060-1 = "ตอนที่ 6;ความสมบูรณ์เพียงครึ่ง"
10027060-2 = "เซอร์เคิล"
10027060-5 = "[ns] \"เมรุ อยู่ๆ ก็พูดอะไรออกมาเนี่ย?\""
10027060-6 = "คุณครูพูดถูกค่ะ แบบนี้มันกะทันหันไปนะคะ คุณเมรูริจะวาด <ลูน่า> ตอนจบงั้นเหรอคะ? ทำไมล่ะคะ?"
10027060-7 = "ตอนแรกคุณไม่รู้ด้วยซ้ำว่าโลกนี้มีการ์ตูนที่ชื่อว่า <ลูน่า> ด้วยนี่คะ?"
10027060-8 = "อย่าพูดแทงใจดำกันสิ..."
10027060-9 = "ปัญหาไม่ได้อยู่ที่ว่ามันแทงใจดำคุณหรือเปล่านะคะ แต่นี่มัน..."
10027060-10 = "เดี๋ยวนะคะ งั้นก็แปลว่า... คุณเมรูริจะวาดโดจินชิ <ลูน่า>..."
10027060-11 = "...อยู่ๆ เป็นอะไรของเธอ? อย่าทำให้รู้สึกถึงลางไม่ดีสิ"
10027060-12 = "ฉันไม่สบายใจเป็นอย่างยิ่งเลยค่ะ"
10027060-13 = "ไม่สบายใจอะไรอีกล่ะ"
10027060-14 = "คนที่ไม่รู้อะไรเลย อยู่ๆ ก็อินจนมาเข้าด้อม แล้วยังมีหน้ามาบอกว่าจะวาดโดจินชิ <ลูน่า> ที่พวกเรา#nหวงแหนอีก... ฉันชอบ <ลูน่า> มาก่อนคุณอีกนะคะ!!"
10027060-15 = "แล้วมันเกี่ยวอะไรกันด้วยเล่า?!"
10027060-16 = "[s] \"อ้อ บางครั้งก็คิดแบบนั้นได้นะ\""
10027060-17 = "นี่ครูก็เป็นไปกับเค้าด้วยเหรอ?!"
10027060-18 = "จะว่าไป เธอน่ะมีอคติแต่กับฉันนั่นแหละ!!"
10027060-19 = "ในฐานะของนักวิจารณ์และแฟนคลับของ <ลูน่า> คนหนึ่ง ฉันคิดว่าฉันมีสิทธิ์พูดความไม่พอใจแค่นี้#nออกมานะคะ"
10027060-23 = "...เอาเถอะ มันก็ใช่ เธอทำแบบนั้นได้"
10027060-24 = "แต่ฉันก็มีสิทธิ์อินกับ <ลูน่า> ในฐานะของนักอ่านคนหนึ่งเหมือนกันไม่ใช่เหรอไง!"
10027060-25 = "แล้วฉันก็... อยากลองวาดตอนจบเหมือนกันด้วย"
10027060-26 = "ฮืม... ลองพูดต่อเรื่อยๆ สิคะ"
10027060-27 = "ตอนแรก... ฉันยอมรับว่าฉันผิดเองที่เอาแต่พูดโม้เรื่องงานของตัวเองตามอำเภอใจโดยไม่นึกถึงคนฟัง"
10027060-28 = "และเพราะแบบนี้โมมิจิก็เลยโกรธจนสถานการณ์เลยเถิดมาเป็นแบบนี้ ทั้งหมด... เป็นความรับผิดชอบ#nของฉัน"
10027060-29 = "คุณเมรูริที่ฉันรู้จักเป็นคนไม่ยอมรับฟังความเห็นของผู้อื่น แล้วก็ไม่ใช่คนประเภทที่จะมาเจรจา#nประนีประนอมกับใครด้วย... แต่คุณต่างออกไปนะคะ"
10027060-30 = "...ฉันขอถามอะไรตรงๆ นะคะ อะไรทำให้คุณเปลี่ยนความคิดได้ถึงขนาดนี้เหรอคะ?"
10027060-31 = "...แฟนๆ ...แล้วก็โดจินชิ"
10027060-32 = "การที่มีการจัดกิจกรรมชมรมขนาดใหญ่ในที่ห่างไกลของเรดวินเทอร์แบบนี้..."
10027060-33 = "และการที่แฟนๆ มาเข้าร่วมกันถึงที่นี่ และทุกคนก็วาดโดจินชิกันด้วยความสมัครใจ..."
10027060-34 = "......"
10027060-35 = "ฉันต้องไปเรียนรู้ในสิ่งที่ตัวเองบกพร่องแล้วละ"
10027060-36 = "ฉันก็เลยจะวาดบ้าง เพราะทุกอย่างที่นี่ทำให้ฉันอยากทำมากขึ้น ฉันคิดแบบนั้น"
10027060-37 = "...ก็ความปรารถนาเป็นแรงผลักดันในการสร้างสรรค์ผลงานนี่คะ?"
10027060-38 = "มันก็แบบนั้นแหละ"
10027060-39 = "...เพราะแบบนี้เองสินะคะ"
10027060-40 = "แต่แน่นอนว่าแฟนคลับรุ่นบุกเบิกของ <ลูน่า> อย่างเธออาจจะยังทำใจยอมรับฉันไม่ได้..."
10027060-41 = "ก็ดีค่ะ งั้นทำแบบนั้นเลย ฉันจะให้เวลาคุณ 4 วันค่ะ คุณเมรูริ"
10027060-42 = "อยู่ๆ มากำหนดเดดไลน์กันเฉยเลย?! 4 วันมันน้อยไปนะ!"
10027060-43 = "ก็ช่วยไม่ได้นี่คะ คนที่บอกว่าจะทำคือคุณเองไม่ใช่เหรอ? และถ้ามองในอีกมุม นี่เป็นโอกาสทองของ#nคุณเลยนะคะ?"
10027060-44 = "งั้นฉันขอถามหน่อยเถอะว่าทำไมต้อง 4 วัน? เธอใช้เกณฑ์อะไรมากำหนด?"
10027060-45 = "ก็เพราะ <มินิอีเวนต์ลูน่าเล่ม 22> จะเปิดในอีก 4 วันข้างหน้าไงคะ"
10027060-46 = "[s] \"หืม? มันคนละงานกับที่จัดอยู่ตอนนี้เหรอ?\""
10027060-47 = "ใช่ค่ะ งานที่จัดอยู่ตอนนี้เป็นงานอุ่นเครื่องก่อนจะมีการเปิด <มินิอีเวนต์ลูน่าเล่ม 22> ในปีนี้ค่ะ"
10027060-48 = "<ลูน่า เล่มจบบริบูรณ์> หลากหลายเวอร์ชันที่ทุกคนได้เห็นระหว่างมาถึงที่นี่คือโดจินชิที่ถูกจัดแสดง#nเมื่อปีที่แล้ว หรือบางเล่มก็นานกว่านั้นเลยค่ะ"
10027060-49 = "แต่สำหรับพวกฉันที่แสวงหา <ลูน่า> เล่มจบในเนื้อหาใหม่ๆ อยู่ทุกปี ก็ยังคงจัดงานแบบนี้อยู่ค่ะ"
10027060-50 = "และงาน <มินิอีเวนต์ลูน่าเล่ม 22> ที่ว่าก็จะเปิดในอีก 4 วันข้างหน้านี้แล้วค่ะ"
10027060-51 = "คุณบอกว่าอยากวาด <ลูน่า> เล่ม 22 ด้วยตัวเองใช่ไหมคะ? ถ้าอย่างนั้นก็ลองมาเข้าร่วมงานนี้ดูไหมคะ?"
10027060-52 = "งั้นเวลา 4 วันที่เธอพูดถึงก็..."
10027060-53 = "ใช่ค่ะ ฉันอยากให้คุณมาเข้าร่วมงานของเราอย่างเป็นทางการแล้วจัดแสดง <ลูน่า> เล่ม 22 ของคุณดูค่ะ"
10027060-54 = "ถ้าคุณโมมิจิก็เป็นแฟนของ <ลูน่า> เธอก็ต้องรู้จักงานนี้แน่นอนค่ะ ถ้าผลงานของคุณได้จัดแสดงใน#nงานนั้น คุณก็น่าจะสามารถเอาให้คุณโมมิจิดูได้อย่างมั่นใจเลยไม่ใช่เหรอคะ?"
10027060-55 = "อืม แต่ฉันก็กังวลอยู่นิดหน่อยนะคะว่าคุณเมรูริจะวาดได้สักแค่ไหน เพราะเมื่อกำหนดส่งต้นฉบับมาถึง คุณก็คงจะกรีดร้องและพ่นคำไม่น่าฟังออกมาแน่นอน"
10027060-56 = "พูดแบบนี้ด่ากันเลยดีกว่า..."
10027060-57 = "ถ้าคุณเข้าร่วมมินิอีเวนต์อย่างเป็นทางการและจัดแสดงเล่ม 22 ของคุณ..."
10027060-58 = "ก็คงรู้ว่าผลงานนั้นเป็นของแฟนคลับที่ไม่ได้เรื่อง หรือว่าเป็นผลงานที่มี 'ออร่า' ที่ควรค่าแก่การยอมรับ"
10027060-59 = "และคนที่จะประเมินผลงานนั้นไม่ใช่ใครที่ไหน! แต่เป็นนักวิจารณ์แห่งเรดวินเทอร์และประธานชมรม <ลูน่า> อย่างฉันเอง!"
10027060-61 = "ฉันจะตั้งใจอ่านและประเมินให้เลยค่ะ!"
10027060-66 = "[ns] \"......\""
10027060-67 = "...คุณครู? ทำไมจ้องหน้ากันแบบนั้นล่ะคะ?"
10027060-68 = "[s1] \"ครูสงสัยว่าเธอจะหัวเราะออกมาหรือเปล่าน่ะ\"\n[s2] \"อย่างเช่นหัวเราะ โฮะๆๆๆๆ... อะไรแบบนี้\""
10027060-71 = "พูดเรื่องอะไรไม่เห็นเข้าใจเลยค่ะ..."
10027060-72 = "ยัยคนนี้ยังมั่นใจในตัวเองมากเหมือนเคย...! เธอเป็นกรรมการรึไง! มันไม่สำคัญตั้งแต่แรกอยู่แล้ว#nสักหน่อยว่าผลงานของฉันจะได้รับการยอมรับจากเธอหรือเปล่า!"
10027060-73 = "...ถ้าพูดไปแบบนั้น คงได้โดนเทศน์ชุดใหญ่สินะ อืม..."
10027060-74 = "ก็นะ... ที่ฉันมาถึงตรงนี้ได้ มันก็เป็นเพราะเธอช่วยเอาไว้"
10027060-75 = "คะ? ไม่ค่อยได้ยินเลยค่ะ ถ้าจะพูดอะไรกับคนอื่น ก็ช่วยพูดให้เสียงดังฟังชัดหน่อยได้ไหมคะ?"
10027060-76 = "ถ้าไม่ได้ยินก็ไม่เป็นไรจ้ะ~"
10027060-77 = "เอาเถอะ! ครั้งนี้ฉันจะยอมร่วมมือด้วยแล้วกัน ฉันก็อยากมี 'อุปสรรค' ในการทำงานดูน่ะ"
10027060-79 = "ฉันต้องทำแบบนี้แหละ ถึงจะวาดการ์ตูนที่ทั้งตัวฉันเองและโมมิจิยอมรับได้!"
10027060-80 = "ฮึ่ม... งั้นฉันจะคอยเอาใจช่วยและตั้งตารอเป็นมารยาทนะคะ ยังไงก็พยายามเข้าล่ะ"
10027060-86 = "ห้องสมุดเรดวินเทอร์"
10027060-87 = "โอยยย... กลับมาแล้ว..."
10027060-88 = "[s] \"รู้สึกเหมือนเดินฝ่าหิมะมาครึ่งวันเลย...\""
10027060-89 = "ไม่ใช่แค่รู้สึกหรอก เราเดินฝ่าหิมะกันมาจริงๆ แล้วก็หอบโดจินชิกันมาเต็มสองมือด้วย"
10027060-90 = "[s3] \"หนังสือเล่มบางๆ ครูก็คิดว่าจะเบาเสียอีก\"\n[s4] \"หนักกว่าที่คิดเอาไว้เยอะเลย...\""
10027060-93 = "ฮึ่ม! อย่าดูถูกโดจินชินะ! ถึงแม้ตอนอยู่เล่มเดียวมันจะบางก็เถอะ..."
10027060-94 = "แต่เวลาได้อยู่ด้วยกันแล้ว ก็จะมีน้ำหนักและพลังที่ไม่อาจมองข้ามได้เลยละ"
10027060-95 = "เรื่องแบบนี้เกิดขึ้นบ่อยๆ เลยละ... เวลาเห็นหนังสือที่ถูกใจแล้วหน้ามืดตามัวซื้อๆ มา กระเป๋าของเรา#nก็จะหนัก ส่วนกระเป๋าสตางค์ก็จะเบาลงเรื่อยๆ..."
10027060-96 = "มือทั้งสองข้างรับรู้ได้ถึงน้ำหนักที่หนักอึ้ง แล้วก็ไม่รู้ว่าทำไมผู้คนที่เดินรอบๆ ถึงได้ทั้งชำเลืองมองแล้ว#nจ้องตาเป็นมัน จนเราต้องเมินสายตาพวกนั้นแล้วจ้องไปที่พื้น ภาวนาให้เวลาผ่านไปเร็วๆ แทน... ฮู่ว..."
10027060-97 = "ยะ... อย่าเข้าใจผิดนะ! นั่นไม่ใช่เรื่องของฉัน!"
10027060-98 = "[s] \"แต่ว่าเล่าได้ละเอียดมากเลยนะ?\""
10027060-99 = "เอาเถอะน่า! จากนี้ต่อไปคือการลงมือทำ! เริ่มเลย!"
10027060-100 = "[s] \"เอาเลยเหรอ?!\""
10027060-101 = "ถามมาได้! เรามีเวลาเหลือแค่ 4 วันเองนะ! แม้แต่ตอนนี้เวลาก็กำลังเดินอยู่ด้วย"
10027060-102 = "แต่ว่าก่อนจะลงมือทำ ฉันอยากบอกครูว่า..."
10027060-103 = "นี่เป็นเพราะฉันดื้อเอง นี่คือการตัดสินใจเอาเองว่าอยากทำ นี่คือการทำตามอำเภอใจของฮิเมกิ เมรุ"
10027060-104 = "ครูไม่จำเป็นต้องมาช่วยฉันเพราะความดื้อรั้นของฉันก็ได้..."
10027060-105 = "[s] \"ไม่ ไม่ใช่อย่างนั้นหรอก ครูมาเพราะเมรุขอให้ช่วยตั้งแต่แรกแล้วนี่นา\""
10027060-106 = "อึก... นั่นฉันก็รู้ดีอยู่หรอก แต่คิดว่าครูจะตอบด้วยประโยคในฉากจำเจอะไรแบบนั้นซะอีก!"
10027060-107 = "...ก็เพราะเป็นครู ฉันก็เลยเชื่ออย่างนั้นน่ะสิ"
10027060-108 = "ดีละ ไหนๆ ก็ซื้อโดจินชิมาเป็นกองแล้ว ก่อนอื่นฉันต้องวิเคราะห์ก่อน ถ้างั้นก็... วันนี้เอามาอ่านอย่าง#nเต็มสปีดกันเลย!"
10027060-110 = "(และเมรุก็เริ่มภารกิจปั่นต้นฉบับให้สมบูรณ์ให้ได้ภายใน 4 วัน...)"
10027060-114 = "D-4"
10027060-118 = "ทำไมถึงได้เยอะแบบนี้เนี่ย?!"
10027060-119 = "[s] \"น้ำหนักของเวลาและประวัติศาสตร์... อ่านอะไรลึกซึ้งจังเลยนะ...\""
10027060-120 = "โอยย... ไม่ไหวแล้ว ขอเปลี่ยนแผนหน่อย ถ้าอ่านเรื่องนี้หมด คงไม่ใช่ 4 วัน แต่ต้องกินเวลาทั้ง#nสัปดาห์แน่ๆ"
10027060-121 = "เอาเป็นว่าวาดก่อนเลย! ถ้าหัวไม่แล่นขึ้นมา ก็ค่อยมาเปิดอ้างอิงดูแล้วกัน!"
10027060-122 = "ครู ฉันเปลี่ยนแผนแล้ว ตามมาให้ทันนะ!"
10027060-133 = "D-3"
10027060-146 = "[ns] \"ครูไม่ให้เธอฝืนแล้วเมรุ ไปนอนพักบ้าง\""
10027060-147 = "ไม่ได้... ไม่ได้หรอก... เวลาแค่ 1 นาทีก็มีค่า..."
10027060-148 = "หืม จะลากฉันไปไหนน่ะครู...? ให้นั่งตรงเก้าอี้นี้ก่อนเหรอ...?"
10027060-156 = "(ทันทีที่นั่งบนเก้าอี้ เมรุก็เริ่มง่วงนอน)"
10027060-157 = "(ถ้าปล่อยไว้คงนั่งหลับไปทั้งอย่างนั้น และคงตื่นมาอีกทีพรุ่งนี้ตอนเที่ยงแน่ๆ...)"
10027060-162 = "[ns] \"เอาละ เมรุ ลุกไปล้างหน้าแปรงฟันได้แล้ว\""
10027060-163 = "เอ้า...? แล้วไหนเมื่อกี้บอกให้นอน... ทำไมถึงเปลี่ยนคำพูดล่ะครู..."
10027060-164 = "[s] \"นอนทั้งแบบนี้จะปวดเมื่อยตัวเอานะ ลุกขึ้นมาตั้งสติก่อน\""
10027060-165 = "ไม่เอา... ฉันจะนอนทั้งอย่างนี้แหละ... ง่วงจะแย่แล้วเนี่ย..."

[translation]
10023090-1 = "ตอนที่ 9;โอนกรรมสิทธิ์"
10023090-22 = "งื้ออออ... เมื่อกี้น่ากลัวชะมัดเลย..."
10023090-24 = "ยอดไปเลย ยูสึ! ยามพวกนั้นไม่ทันจับสังเกตได้เลย!"
10023090-25 = "ยูสึจัง บรรยากาศทางนั้นเป็นยังไงบ้าง?"
10023090-27 = "ผิดคาดแฮะ... ประตูหน้าไม่มีการเฝ้าระวังมากเท่าไรเลย..."
10023090-28 = "เหมือนพวกยามจะเข้าไปอยู่ในด้านในกันหมด..."
10023090-29 = "ตอนประตูเปิดเมื่อกี้... ฉันแอบเห็นว่ามีพวกยามอยู่ข้างในเพียบเลย"
10023090-30 = "ว่าแล้วเชียว... งั้นแปลว่าเราไม่มีวิธีอื่นแล้วใช่ไหมคะคุณครู?"
10023090-31 = "[s1] \"ใช่... เราตกลงกันแล้วว่าจะเบี่ยงเบนความสนใจ\"\n[s2] \"ถ้าจอมโจรแห่งความเสน่หาส่งสัญญาณมา\"\n[s3] \"เราจะบุกเข้าไปทางประตูหน้าในอีก 5 นาทีให้หลัง\""
10023090-35 = "ก็เราจะทำให้ยามรักษาการณ์ของทั้งสองฝั่งสับสนไงล่ะ..."
10023090-36 = "ตอนนี้เราไม่มีวิธีอื่นแล้ว ทำตามกลยุทธ์นี้กันเลย!"
10023090-42 = "(รอมานานแค่ไหนแล้วกันนะ...)"
10023090-47 = "(มีดอกไม้ไฟพุ่งขึ้นสู่ท้องฟ้าอย่างกะทันหันจากทางด้านหลังของคฤหาสน์)"
10023090-49 = "อะไรน่ะ? คุณเมทาโร่บอกไว้ว่าจะจุดดอกไม้ไฟคืนนี้เหรอ...?"
10023090-50 = "ไม่เห็นเคยได้ยินอะไรแบบนั้นเลย...?"
10023090-56 = "(ดอกไม้ไฟสว่างจ้าไปบนท่ามกลางท้องฟ้ายามค่ำคืน... และปรากฏเป็นข้อความว่า...)"
10023090-57 = "(<จอมโจรแห่งความเสน่หา> ...!)"
10023090-61 = "!!! ออกมาแล้ว! <จอมโจรแห่งความเสน่หา>!"
10023090-62 = "ระดมพล! ไปไล่ล่า <จอมโจรแห่งความเสน่หา>!"
10023090-68 = "สัญญาณ... มาแล้วค่ะคุณครู"
10023090-69 = "[s] \"โอ้โห เล่นใหญ่อะไรเบอร์นี้...\""
10023090-71 = "อย่างน้อยก็เป็นสัญญาณที่ชัดเจนดีนะคะ"
10023090-72 = "เราจับเวลากันตามแผน แล้วก็เคลื่อนไหวกันบ้างเถอะค่ะ"
10023090-73 = "รบกวนหน่อยได้ไหมคะอาริสึ?"
10023090-75 = "ได้สิคะ! เวลานี้แหละค่ะที่ผู้กล้าต้องออกโรง!"
10023090-76 = "อาริสึจะผ่านกิจกรรมนี้กับสหายแล้วรับรางวัล EXP ไปเยอะๆ... แล้วก็จะแข็งแกร่งขึ้นค่ะ!"
10023090-80 = "หืม? เดี๋ยวนะ... ทำไมทางนู้นเหมือนมีเรื่องเอะอะเลย?"
10023090-81 = "อะไรอีกเนี่ย? แค่งานฝั่งนี้ก็วุ่นวายพอตัวอยู่แล้วนะ..."
10023090-84 = "ลำแสงทำลายล้าง!"
10023090-89 = "!!"
10023090-97 = "เอาละ มาเริ่มกันเลย!"
10023090-102 = "จะเข้าไปเดี๋ยวนี้แหละค่ะ"

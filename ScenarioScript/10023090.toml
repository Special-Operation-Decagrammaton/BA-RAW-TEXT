[translation]
10023090-1 = "第9話;所有權的轉移"
10023090-22 = "嗚嗚嗚嗚……好可怕……"
10023090-24 = "好厲害，柚子！居然完全沒有被警衛發現！"
10023090-25 = "柚子醬，狀況如何？"
10023090-27 = "意外地……到正門為止的監視並不森嚴……"
10023090-28 = "警衛們……好像幾乎都在正門內側……"
10023090-29 = "我，我從門縫間看見……宅邸裡面全都是警衛……"
10023090-30 = "果然……只有這個方法了嗎，老師？"
10023090-31 = "[s1]「嗯……」\n[s2]「首先得分散敵人的注意力才行。」\n[s3]「看見『慈愛的怪盜』的信號後就正面突破吧。」"
10023090-35 = "這樣一來，警衛們想必會陷入混亂吧……"
10023090-36 = "現在煩惱也沒用！按照作戰進行吧！"
10023090-42 = "（於是大家屏氣凝神地等待……）"
10023090-47 = "（從宅邸後方傳來了煙火發射的聲音）"
10023090-49 = "喂，那個是……銅田先生剛才有提過嗎？"
10023090-50 = "不，我什麼都沒聽說啊……？"
10023090-56 = "（煙火在夜空中爆炸……）"
10023090-57 = "（浮現了「慈愛的怪盜」五個字……！）"
10023090-61 = "是「慈愛的怪盜」！！"
10023090-62 = "集合！所有人一起去追「慈愛的怪盜」！！"
10023090-68 = "是信號……老師。"
10023090-69 = "[s]「真是史上最容易理解的信號呢……」"
10023090-71 = "沒錯。不過至少不會搞錯。"
10023090-72 = "我們也在一分鐘後行動吧。"
10023090-73 = "可以拜託你嗎，愛麗絲？"
10023090-75 = "當然！現在正是勇者登場的時候！"
10023090-76 = "和夥伴們一起推進活動……#n和大家一起提升等級！"
10023090-80 = "……嗯？這次又是那邊有騷動？"
10023090-81 = "究竟是怎麼回事……？"
10023090-84 = "光呀──！"
10023090-89 = "！！！"
10023090-97 = "好，開始吧！"
10023090-102 = "迅速進行壓制。"

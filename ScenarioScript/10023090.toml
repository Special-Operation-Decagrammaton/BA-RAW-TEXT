[translation]
10023090-1 = "Episode 9; Transfer of Ownership"
10023090-22 = "...My hands are still shaking. Oh my god."
10023090-24 = "You're amazing, Yuzu! Not even one guard saw you!"
10023090-25 = "Did you get to scout ahead? How's it look?"
10023090-27 = "Yes, I did. The security was actually pretty lax at first."
10023090-28 = "But then, I got to the front door..."
10023090-29 = "...I looked inside while someone was leaving, and there were guards everywhere."
10023090-30 = "In the end, we have no other choice, do we, Sensei?"
10023090-31 = "[s1] \"We'll put our diversionary attack plan into action!\"\n[s2] \"The Benevolent Thief will get in position and signal.\"\n[s3] \"Five minutes later, it's our turn!\""
10023090-35 = "With their attention divided, we'll be able to complete our mission!"
10023090-36 = "The only way we can go is forward! Diversionary attack plan, commence!"
10023090-42 = "Time seemed to stretch on for an eternity into the night..."
10023090-47 = "Finally, we saw what looked like a flame shoot into the skies behind the mansion."
10023090-49 = "Huh? Did Meitaro say anything about fireworks tonight?"
10023090-50 = "I didn't hear anything about that..."
10023090-56 = "The flame turned into fireworks, exploding in a dazzling message across the night sky."
10023090-57 = "It read, the Benevolent Thief!"
10023090-61 = "It's her! It's the thief!"
10023090-62 = "Everyone, assemble! Take down the Benevolent Thief!"
10023090-68 = "That was...the signal. Sensei..."
10023090-69 = "[s] \"I'm speechless. It was flashy, to say the least.\""
10023090-71 = "She did say we wouldn't be able to miss it."
10023090-72 = "Let's get ready to move out."
10023090-73 = "Aris, are you ready?"
10023090-75 = "Heroes are always ready!"
10023090-76 = "I will complete these events with my party members, gain lots of EXP...and level up!"
10023090-80 = "Did you hear something? Hey! Who's there? "
10023090-81 = "What is it? We've already got our plates full over here."
10023090-84 = "Blinding Light!"
10023090-89 = "!!"
10023090-97 = "Let's begin our phase of the plan!"
10023090-102 = "We must move quickly."

[translation]
1301115-1 = "Gamer's Memory"
1301115-5 = "Sensei! It's done! Charging complete!"
1301115-6 = "[s] \"All right! It's going down! Go, Momoi!\""
1301115-7 = "It looks like your drift is a little off, but all right!"
1301115-8 = "Eyaaa–!!"
1301115-13 = "Huh, huh?!!"
1301115-14 = "[ns1] \"Ah, so you're THAT type.\"\n[ns2] \"You lean with your whole body while playing a racing game.\""
1301115-17 = "O-Of course! True immersion is a sign of a real gamer!"
1301115-18 = "Ah?"
1301115-25 = "Blech?!"
1301115-27 = "Ugh! What a mess!"
1301115-28 = "Well... It's just...the tower of stuff next to me toppled over."
1301115-29 = "[s] \"Come now. Get up. Take my hand.\""
1301115-33 = "Thank you, Sensei... Huh?"
1301115-39 = "Oh, here it is! I was wondering where this was!"
1301115-40 = "What is it, you ask? Fu. Fu. Fu... This..."
1301115-41 = "...is the game console Midori and I got a long time ago. It's part of a set."
1301115-42 = "[s] \"So, this is how you started your gaming journey?\""
1301115-43 = "Huh? No. I was a gamer way before this!"
1301115-44 = "This is just a set I got with Midori. It's cute, right?"
1301115-45 = "But, now that you mention it, it may have been Midori's first gaming console. And that's pretty cool."
1301115-46 = "[s3] \"If it's so important...\"\n[s4] \"Why didn't you store it properly...?\""
1301115-49 = "I-I was storing it properly!"
1301115-50 = "See? It's well-kept with a stand and a transparent case!"
1301115-55 = "Huh? Isn't it almost a little meaningless if I can't find it where it is normally? W-Well, you have a point... A bad point..."
1301115-56 = "Look! I think I did a pretty good job!"
1301115-57 = "[s] \"Yeah, yeah...\""
1301115-58 = "Huh? You want to know why I took such care to preserve it?"
1301115-59 = "..."
1301115-60 = "Well, as an older sister, I have to be responsible!"
1301115-61 = "Before we started gaming together, we weren't really close."
1301115-62 = "I was trying to find a way to bond...and, so I suggested we get matching consoles."
1301115-63 = "Which...led to us buying them together."
1301115-64 = "I figured that if I got it for her as a gift, then she'd take care of it."
1301115-65 = "Fu. Fu. Fu... And \"Operation: Make Midori a Gamer\" was a resounding success."
1301115-66 = "What's important is that it made us closer, right? All's well that ends well?"
1301115-67 = "Wait... Are we actually close...? I feel like Midori teases me all the time."
1301115-68 = "[s] \"Now that you mention it... Don't you lose against her most of the time?\""
1301115-69 = "Why'd you have to say that out loud?"
1301115-70 = "Anyway, I don't like that you said I'm losing overall. Is that really true, Sensei?"
1301115-71 = "[s] \"Sometimes, elder sisters are supposed to let their siblings win...\""
1301115-72 = "R-Right! That's it! See, I'm not actually worse at gaming."
1301115-77 = "Huh...? Wah?!"
1301115-78 = "[s] \"What is it? What's wrong, Momoi?\""
1301115-79 = "Wh-While we were talking..."
1301115-80 = "The monster escaped!"
1301115-81 = "[ns] \"A failed hunt?!\""
1301115-82 = "No! It'll be such a pain to track it down again!"
1301115-84 = "So, while we had a few incidents..."
1301115-85 = "...I had a lot of fun gaming with Momoi."

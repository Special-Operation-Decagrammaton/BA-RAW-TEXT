1301115-54 = "#wait;1500"
1301115-55 = "3;모모이;04;어? 평소에 어디 있는지 찾을 수 없었으면 의미가 없는 것 아니냐고? 그, 그건 그렇게 볼 수도 있는데…….\n#3;stiff"
1301115-56 = "3;모모이;05;아무튼! 나 치고는 잘 하고 있었단 말이야!\n#3;hophop\n#3;m3\n#3;em;[스팀]"
1301115-57 = "[s] \"그래, 그래…….\""
1301115-58 = "3;모모이;02;응? 그런데 이 게임기만 이렇게까지 신경 써서 보관하고 있었던 이유가 있냐고?"
1301115-59 = "3;모모이;99;…….\n#3;em;[...]"
1301115-60 = "3;모모이;00;뭐, 그것도 어떻게 보면 언니로서 책임감의 증표 같은 거라고 할까!"
1301115-61 = "3;모모이;02;애초에, 게임을 같이 하기 전까지는, 미도리랑 그렇게까지 사이가 좋지 않았거든."
1301115-62 = "3;모모이;02;사이 좋아질 방법을 찾으려다…… 게임을 같이 하면 어떨까, 하고 생각했어."
1301115-63 = "3;모모이;01;그러다 보니…… 이것도 같이 사 줬던 거고.\n#3;em;[반응]"
1301115-64 = "3;모모이;01;자기 돈으로 사라고 하면 화를 낼 수도 있지만, 가족이 선물해 주는 걸 마냥 소홀히 하기도 꺼림칙한 법이잖아?"
1301115-65 = "3;모모이;99;후. 후. 후……. 그렇게 나의 '미도리 게임 물들이기 작전'은 멋진 성공을 거두고 말았던 것이었다…….\n#3;em;[음표]"
1301115-66 = "3;모모이;02;뭐, 결국 이렇게 예전보다 나름 사이도 좋아졌고, 끝이 좋으면 다 좋은 게 아닐까?"
1301115-67 = "3;모모이;04;어라……? 그런데 우리 사이좋은 거 맞긴 한가……? 맨날 내가 미도리한테 말로 두드려 맞는 느낌인데……?\n#3;stiff"
1301115-68 = "[s] \"그러고~ 보니~ 게임도 이길 때보다 질 때가 더 많지~\""
1301115-69 = "3;모모이;06;그걸 꼭 말로 해야겠냐고!\n#3;jump"
1301115-70 = "3;모모이;04;아무튼 이거 내가 전체적으로 손해 보고 있는 거 아닐까? 어떻게 생각해, 선생님?!\n#3;em;[?]"
1301115-71 = "[s] \"원래 언니는 좀 져주고 그러는 거야…….\""
1301115-72 = "3;모모이;04;여, 역시 그렇지? 그래! 그런 거야! 절대 내가 게임을 더 못하거나 그래서 그런 게 아니라고!\n#3;stiff"

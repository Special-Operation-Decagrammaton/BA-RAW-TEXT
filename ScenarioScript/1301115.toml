[translation]
1301115-1 = "ความทรงจำของเกมเมอร์"
1301115-5 = "คุณครู! เสร็จแล้ว! ชาร์จเสร็จแล้วละ!"
1301115-6 = "[s] \"เยี่ยม! โหลดเรียบร้อย ลุยเลย โมโมอิ!\""
1301115-7 = "คงจะต้องเลี้ยวหักมุมแบบดริฟต์รถแฮะ... ดีละ!"
1301115-8 = "ย๊าาาา-!!!"
1301115-13 = "อะ... เอ๋?!?!"
1301115-14 = "[ns1] \"อ่า โมโมอิเป็นเกมเมอร์ที่อินกับเกมสินะ\"\n[ns2] \"เป็นเกมเมอร์ที่เวลาเล่นเกมแล้วเอนตัวไปตามแฮนด์สินะ\""
1301115-17 = "มะ... มันก็ต้องแหงอยู่แล้วสิ! ระดับความอินกับเกมก็เป็นคุณสมบัติสำคัญของเกมเมอร์นะ!"
1301115-18 = "เอ๋...?"
1301115-25 = "อ๊าย-?!"
1301115-27 = "มาถามกันว่าโอเครึเปล่างั้นเหรอ? เห็นแล้วดูโอเครึไง-!!!"
1301115-28 = "ก็แค่... พวกของที่กองๆ ไว้มันล้มลงมาทับน่ะ..."
1301115-29 = "[s] \"เอ้าๆ ลุกขึ้นมาๆ ครูจะช่วยดึงเอง\""
1301115-33 = "ขอบคุณนะ คุณครู... เอ๋?"
1301115-39 = "อะไรกัน อยู่นี่เองเหรอเนี่ย! ก็คิดอยู่ว่าหายไปไหน!"
1301115-40 = "เจ้านี่คืออะไรน่ะเหรอ? ฮุฮุฮุ... เจ้านี่น่ะ..."
1301115-41 = "เครื่องเล่นเกมเครื่องแรก... เครื่องเล่นเกมเซ็ตคู่กับมิโดริ!"
1301115-42 = "[s] \"งั้นโมโมอิก็เริ่มเล่นเกมจากเครื่องเล่นอันนี้เหรอ?\""
1301115-43 = "หืม? เปล่าสักหน่อย ฉันเป็นเกมเมอร์มาตั้งแต่ก่อนซื้อเจ้านี่แล้วละ!"
1301115-44 = "ก็แค่เครื่องเล่นเกมอันนี้น่ะ ฉันซื้อมาเป็นเซ็ตคู่กับมิโดริน่ะ"
1301115-45 = "พอคิดดูแล้ว เครื่องเล่นเกมเซ็ตนี้อาจเป็นเครื่องเล่นเกมเครื่องแรกของมิโดริก็ได้"
1301115-46 = "[s3] \"ถ้าเป็นของสำคัญขนาดนั้นก็ควรเก็บให้ดีๆ สิ...\"\n[s4] \"ของสำคัญขนาดนั้นควรเก็บให้ดีๆ หน่อยสิ...\""
1301115-49 = "ฉะ... ฉันก็เก็บไว้ดีแล้วนะ!"
1301115-50 = "ดูสิ! ฉันซื้อที่วางกับกล่องอะคริลิกมาใส่ไว้ด้วยนะ!"
1301115-55 = "เอ๋? ปกติถ้าหาไม่เจอว่าอยู่ตรงไหนก็ไร้ความหมายงั้นเหรอ? ทะ... ที่พูดมามันก็ถูกแฮะ..."
1301115-56 = "ยังไงก็เถอะ เอาเป็นว่าฉันดูแลมันอย่างดีก็แล้วกัน!"
1301115-57 = "[s] \"จ้าๆ...\""
1301115-58 = "หืม? ทำไมฉันถึงเก็บเครื่องเกมเครื่องนี้ไว้อย่างดีน่ะเหรอ?"
1301115-59 = "......"
1301115-60 = "ก็นะ มันเป็นสัญลักษณ์ของความรับผิดชอบในฐานะพี่สาวยังไงล่ะ!"
1301115-61 = "ตอนแรกๆ ก่อนที่เราจะมาเล่นเกมด้วยกันแบบนี้ ฉันกับมิโดริเราเข้ากันได้ไม่ค่อยดีเท่าไรน่ะ"
1301115-62 = "พอลองหาวิธีที่จะช่วยให้พวกเราเข้าใจกันมากขึ้น... เลยคิดว่าถ้าเราเล่นเกมด้วยกันจะเป็นยังไงนะ"
1301115-63 = "พอคิดแบบนั้น... ฉันก็เลยซื้อเจ้านี่มาน่ะ"
1301115-64 = "ถ้าบอกให้ใช้เงินตัวเองซื้อก็อาจทำให้เธอหงุดหงิดอีก แต่ถ้าเป็นคนในครอบครัวซื้อให้#nจะทำเป็นเมินก็ไม่ได้ใช่มั้ยล่ะ"
1301115-65 = "ฮุฮุฮุ... และแล้ว 'ปฎิบัติการดึงมิโดริมาเล่นเกม' ของฉันก็ค่อยๆ ประสบความสำเร็จอย่างสวยงาม..."
1301115-66 = "ก็นะ เอาเป็นว่าเราก็สนิทกันมากขึ้นกว่าเดิมและทุกอย่างก็ผ่านไปด้วยดีน่ะ"
1301115-67 = "เอ๋...? ว่าแต่ว่าเราสนิทกันขึ้นจริงๆ รึเปล่านะ...? ฉันรู้สึกเหมือนว่าตัวเองโดนมิโดริดุอยู่ตลอดเวลาเลย#nแฮะ...?"
1301115-68 = "[s] \"คิดดูแล้ว... เธอเล่นเกมแพ้มิโดริบ่อยกว่าเล่นชนะอีกนะ~\""
1301115-69 = "จำเป็นต้องพูดเรื่องนั้นขึ้นมาด้วยรึไง!"
1301115-70 = "ยังไงก็เถอะ โดยรวมๆ แล้วเท่ากับฉันเสียเปรียบรึเปล่านะ? คุณครูคิดว่ายังไง?!"
1301115-71 = "[s] \"ปกติพวกพี่สาวก็ทำแบบนี้กันทั้งนั้นแหละ...\""
1301115-72 = "ชะ... ใช่มั้ยล่ะ! เป็นแบบนั้นแหละ! ไม่ใช่เพราะฉันเล่นเกมไม่เก่งสักหน่อย! "
1301115-77 = "เอ๋...? อ๊ายยย?!?!"
1301115-78 = "[s] \"ทำไมเหรอ? มีอะไรเหรอโมโมอิ?\""
1301115-79 = "ตะ... ตอนที่เราคุยกัน..."
1301115-80 = "มอนสเตอร์มันหนีไปแล้ว!"
1301115-81 = "[ns] \"จัดการไม่สำเร็จเรอะ?!\""
1301115-82 = "ฮือออ~! ถ้าต้องไปตามหาอีกคงเหนื่อยลากเลือดแหงๆ~!"
1301115-84 = "(หลังจากนั้นก็เกิดเรื่องวุ่นวายเล็กๆ น้อยๆ ขึ้น)"
1301115-85 = "(แล้วคุณครูกับโมโมอิก็ใช้เวลาสนุกกับการเล่นเกม หลังจากไม่ได้เล่นด้วยกันมานาน)"

[translation]
1301115-1 = "玩家的回憶"
1301115-5 = "老師！已經充能完畢了！"
1301115-6 = "[s]「好！擊倒牠！上吧，桃井！」"
1301115-7 = "角度得像甩尾一樣極限才行……好！"
1301115-8 = "呀啊──！！！"
1301115-13 = "唔，唔啊！？"
1301115-14 = "[ns1]「啊，原來桃井你……」\n[ns2]「是玩賽車遊戲的時候，會隨著方向盤傾斜身體的類型啊。」"
1301115-17 = "當，當然囉！對遊戲的投入程度，也是玩家的基本素養之一耶！"
1301115-18 = "咦……？"
1301115-25 = "哇啊！？"
1301115-27 = "問我有沒有怎樣？#n我看起來像沒事的樣子嗎──！！！"
1301115-28 = "雖然……也只是堆起來的雜物塔倒了而已啦……"
1301115-29 = "[s]「來，我拉你一把。」"
1301115-33 = "謝謝老師……咦？"
1301115-39 = "什麼嘛，原來在這裡啊！#n我還在想說跑哪去了咧！"
1301115-40 = "問我這是什麼？#n哼哼哼……這可是……"
1301115-41 = "我和綠第一次湊成一套的──我們的遊戲機哦！"
1301115-42 = "[s]「所以桃井是從它開始接觸遊戲的嗎？」"
1301115-43 = "嗯？不是啊？#n我在買下它之前就已經是玩家了！"
1301115-44 = "這台只是在買的時候，順便連綠的份也一起買了而已。"
1301115-45 = "仔細想想……對綠來說，這可能是他的第一台遊戲機呢。"
1301115-46 = "[s3]「既然這麼重要的話……」\n[s4]「應該好好保管才對吧……」"
1301115-49 = "我，我有好好保管啊！？"
1301115-50 = "你看！我還買了底座和透明收納盒，把它好好地供著耶！"
1301115-55 = "咦？平常找不到它在哪不就沒意義了？#n這，這個嘛，從某種角度來看可能是這樣沒錯……"
1301115-56 = "總之呢！以我的標準，已經算是做得很好了！"
1301115-57 = "[s]「是是是……」"
1301115-58 = "嗯？問我為什麼只特別保存這台遊戲機？"
1301115-59 = "……"
1301115-60 = "因為它……可以算是某種身為姐姐責任感的象徵吧！"
1301115-61 = "在開始一起玩遊戲之前，我和綠的關係其實並沒有那麼好。"
1301115-62 = "所以就在思考，該怎麼改善我們的關係……#n最後我覺得「一起玩遊戲」是個不錯的選擇。"
1301115-63 = "於是……就幫綠買了這個。"
1301115-64 = "假如要他自己花錢買，可能會惹他生氣……#n不過換作是家人送的禮物的話，就沒辦法隨便對待了對吧？"
1301115-65 = "哼哼哼……我的「讓綠沉迷遊戲作戰」就這樣華麗地成功了……"
1301115-66 = "而且我們的關係也變得比之前更親近。#n反正結果好不就行了嗎？"
1301115-67 = "咦……？不過我們真的算親近嗎……？#n總覺得我有種一直被綠用言語修理的感覺……？"
1301115-68 = "[s]「這麼說來～遊戲也是輸的時候比較多吧～」"
1301115-69 = "那種話一定要說出來嗎！？"
1301115-70 = "整體來看，我是不是虧大了啊？#n老師你覺得呢！？"
1301115-71 = "[s]「姐姐本來就該稍微讓著妹妹嘛……」"
1301115-72 = "果，果然是這樣對吧？#n沒錯！就是這樣！絕對不是我遊戲技術比較差才輸的！"
1301115-77 = "咦……？哇啊！？"
1301115-78 = "[s]「怎麼了？發生什麼事了，桃井？」"
1301115-79 = "在，在我們聊天的時候……"
1301115-80 = "怪物跑掉了！"
1301115-81 = "[ns]「討伐失敗！？」"
1301115-82 = "嗚哇～！要再找到它一次超麻煩的耶～！"
1301115-84 = "（雖然中途發生了不少小插曲）"
1301115-85 = "（不過還是久違和桃井痛快地玩了遊戲）"

1301115-43 = "3;모모이;02;응? 난 아닌데? 난 이거 사기 전부터 계속 게이머였다구!"
1301115-44 = "3;모모이;01;단지 이 게임기를 세트로, 미도리 것까지 함께 샀던 것뿐이었지."
1301115-45 = "3;모모이;02;생각해 보니까 미도리에게는 그게 첫 게임기였을 수도 있겠네."

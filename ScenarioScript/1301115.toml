1301115-39 = "3;모모이;00;뭐야, 여기 있었구나! 어디 갔나 했는데!"
1301115-40 = "3;모모이;99;이게 뭐냐고? 후. 후. 후……. 이것이야말로…….\n#3;m3\n#3;em;[음표]"
1301115-41 = "3;모모이;03;미도리와 함께 처음으로 세트로 맞춘! 우리들의 게임기인 것이다!\n#3;hophop"

101100-154 = "คุณครูคะ!!! แงงงงงงง-!!! "
101100-155 = "ปลอดภัยดีใช่ไหมคะ!! หนูเป็นห่วงแทบแย่ค่ะ ตกใจมากเลยด้วย! ทำไมอยู่ดีๆ เครื่องก็ดับไปล่ะ...!! "

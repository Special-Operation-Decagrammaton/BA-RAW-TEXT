[translation]
101100-1 = "ตอนที่ 10;ปะทะ 2"
101100-4 = "ลงมติไม่ไว้วางใจรุ่นพี่รินเหรอเนี่ย... นี่มันไม่ใช่เรื่องเล่นๆ เลยนะ..."
101100-5 = "ตะ.. แต่ว่า... ระหว่างนั้นรุ่นพี่รินก็ยังรักษาการแทนประธานองค์การนักเรียนนี่คะ! ถ้าอำนาจบริหาร#nของพี่รินถูกระงับไปละก็..."
101100-6 = "องค์การนักเรียนจะเป็นอมพาตเอาได้นะ อาโออิ เหมือนตอนที่ประธานองค์การนักเรียนหายตัวไปเลย"
101100-7 = "... เพื่อหยุดความพลุ่งพล่านของคุณ เราก็เลยจำเป็นต้องทำอย่างนี้กันน่ะ"
101100-8 = "อย่างน้อยก็จนกว่าจะหาคุณครูของชาเล่ต์หรือหัวหน้าสำนักป้องกันพบ "
101100-9 = "......"
101100-10 = "...... แล้วมาคุยรายละเอียดกันพรุ่งนี้เช้า ฉันจะเรียกตัวหัวหน้ามาทั้งหมด"
101100-11 = "กลับไปพักผ่อนเถอะ รุ่นพี่ริน พรุ่งนี้คงจะเป็นวันที่ต้องเหนื่อยน่าดูเลยละ"
101100-12 = "......"
101100-13 = "ส่วนเจ้าหน้าที่คนอื่น ถ้าได้ยินแล้วก็ลุกขึ้น!"
101100-14 = "เอ่อ... ค่ะ ค่ะ!"
101100-15 = "ปะ... ไปกันเถอะ..."
101100-21 = "โมโมกะ อายูมุ พวกเธอก็ออกจากที่นี่ไปด้วย นี่คือคำสั่ง!"
101100-22 = "...... ตะ... แต่......"
101100-23 = "คือว่า... เอ่อ..."
101100-24 = "ไม่เป็นไรค่ะ... ทำตามนั้นเถอะค่ะ ทั้งสองคนต้องเหนื่อยเพราะฉันมามากแล้ว... "
101100-25 = "ถะ... ถะ... ถ้างั้น... พรุ่งนี้ฉันจะรีบมานะคะ... รุ่นพี่..."
101100-26 = "เฮ้อ... บรรยากาศน่าอึดอัดชะมัด..."
101100-32 = "ไว้ค่อยมาคุยกันพรุ่งนี้เถอะค่ะ อาโออิ"
101100-33 = "...... "
101100-51 = "......?!  อะ... อะไรกัน...!!"
101100-57 = "ง่ายกว่าที่คิดเอาไว้อีกนะ องค์การนักเรียนว่างเปล่าเลยแบบนี้"
101100-58 = "ที่แย่ที่สุด คิดว่าจะได้ปะทะกับ 'พวกสุนัขจิ้งจอก' ด้วยเสียอีก แต่ก็นะ ยังไงผลลัพธ์ก็ไม่ต่างออกไป#nจากเดิมอยู่ดี"
101100-59 = "ที่นี่เหลือแค่เจ้าหน้าที่คนเดียวเองงั้นสินะ"
101100-60 = "......!!  พวกคุณคือ...!! ไคเซอร์ คอร์เปอเรชั่น...?!"
101100-61 = "แล้วคนที่เหลือดันเป็นหัวหน้าฝ่ายบริหารซะด้วยสิ..."
101100-62 = "อย่าคิดทำอะไรไร้สาระให้มันเปล่าประโยชน์เลย ฉันจัดการระบบสื่อสารและระบบเตือนภัยไว้หมดแล้ว"
101100-63 = "......!!!"
101100-64 = "จากนี้ไป อำนาจทั้งหมดขององค์การนักเรียนจะถูกส่งต่อให้ไคเซอร์ คอร์เปอเรชั่น"
101100-65 = "ทางแซงค์ทัมทาวเวอร์เป็นยังไงบ้าง?"
101100-66 = "(ซ่า) เราเข้าควบคุมได้แล้วครับ! "
101100-67 = "ดีละ เชื่อมกับประธานใหญ่เลย"
101100-71 = "(ซ่า) อืม ดีมาก เชื่อมต่อกับที่นี่ได้แล้วสินะ อืม... แต่น่าจะใช้เวลาสักหน่อย"
101100-72 = "ประกาศกฎอัยการศึกใน D.U. ก่อนเลย"
101100-73 = "ตั้งแต่นี้ไป เราจะชัตดาวน์การสื่อสาร การคมนาคม การขนส่ง และการใช้คอมพิวเตอร์จัดการข้อมูลใน D.U. และจะระงับทุกองค์กรบริหารไปพร้อมกันด้วย"
101100-74 = "คนจากภายนอกจะไม่รู้ว่าเกิดอะไรขึ้นใน D.U. และในระหว่างนี้..."
101100-75 = "ไคเซอร์ คอร์เปอเรชั่น... กำลังวางแผนทำอะไรกันอยู่คะ?"
101100-76 = "ก็จะยึดครองแซงค์ทัมทาวเวอร์น่ะสิ"
101100-77 = "......!!"
101100-78 = "ทำไมน่ะเหรอ? ก็ฉันได้อาวุธยุทโธปกรณ์โบราณมาไว้ในมือแล้วน่ะสิ เพราะงั้นก็เลยต้องการพลังของ#nแซงค์ทัมทาวเวอร์ เรื่องรายละเอียดขอข้ามไปก็แล้วกัน"
101100-79 = "ตอนนี้คิโวทอสอยู่ภายใต้การควบคุมของไคเซอร์ คอร์เปอเรชั่นแล้ว เจ้าของเมืองแห่งการศึกษาแห่งนี้ ไม่ใช่ทั้งเกมาเทรียหรือองค์การนักเรียน แต่เป็นพวกฉันต่างหาก"
101100-80 = "......!!"
101100-82 = "ไม่คิดว่าเป็นเรื่องดีเหรอ? เมืองแห่งธุรกิจฟังดูรื่นหูมากกว่าเมืองแห่งการศึกษาตั้งเยอะ หึหึหึหึ"
101100-86 = "[ns] \"ไคเซอร์ คอร์เปอเรชั่น...\""
101100-87 = "องค์การนักเรียนถูกยุบ ก็เลยขาดการติดต่อกันไป หัวหน้าคณะฯ ทั้งหลายก็เลยกระจัดกระจายกัน... ตอนนี้ไม่มีใครรู้สถานการณ์ภายในแซงค์ทัมทาวเวอร์เลยค่ะ"
101100-88 = "กะ... กะ... เกิดสถานการณ์แบบนี้แต่เราก็ระดมกำลังกันไม่ได้... น่าอึดอัดจังเลยนะคะ..."
101100-89 = "เฮ้อ... ฉันไม่ชอบเลยที่ต้องมาพัวพันกับเรื่องน่ารำคาญแบบนี้..."
101100-90 = "เอ๋? ประตูเปิดอยู่งั้นเหรอ?"
101100-91 = "อะไรนะ? ไปค้นหากันเถอะ!"
101100-92 = "เฮือก... พวก PMC กำลังมาทางนี้ เราต้องรีบย้ายที่กันแล้ว"
101100-93 = "ปะ... ไปกันเถอะค่ะทุกคน!"
101100-94 = "อึก..."
101100-95 = "[ns] \"คันนะ แผลเธอสาหัสมากนะ...\""
101100-98 = "ฉันช่วยได้ถึงแค่ตรงนี้ค่ะ... คุณครู"
101100-99 = "[ns] \"ว่าไงนะ...?!\""
101100-100 = "คะ?!  พะ... พูดอะไรออกมาเนี่ย...?!"
101100-101 = "หมายความว่ายังไงน่ะ?!"
101100-103 = "ฮุฮุ... ยังเหมือนเดิมไม่เปลี่ยนเลยนะคะ ยังทำท่าทีเหมือนที่ฉันได้เห็นตอนที่อบรมเด็กใหม่อยู่เลย..."
101100-104 = "ตอนนั้นฉันฝันอยากเป็นตำรวจที่ยุติธรรม... สงสัยจะมีแค่ฉันคนเดียวนะคะที่เปลี่ยนไป"
101100-105 = "ฉันเป็นหนี้บุญคุณของพวกเธอ... ที่อยู่ในสำนักรักษาความปลอดภัย"
101100-106 = "หัวหน้ากรมฯ คันนะ..."
101100-107 = "อะ... อะไรน่ะ ทำไมอยู่ดีๆ บรรยากาศก็เป็นแบบนี้ไปได้น่ะ ฉันกลัวนะ..."
101100-108 = "คุณครูคะ ถ้าออกจากตึกนี้แล้วเดินต่อไปอีกหน่อย ก็จะเจอสถานีรถไฟความเร็วสูงที่มุ่งหน้าไปยังด้าน#nนอกของ D.U. ค่ะ คุณครูน่าจะรู้จักที่นั่นนะคะ มันอยู่แถวๆ โคะอุซางิ การ์เด้นค่ะ แล้วก็..."
101100-109 = "อ๊ะ ฉันลืมไปเลยค่ะ นี่สัมภาระของคุณครูค่ะ"
101100-110 = "เอาแท็บเล็ตกับโทรศัพท์มือถือติดตัวไปด้วยนะคะ"
101100-115 = "[ns] \"กล่องแห่งซิสดิม... เอามาได้ยังไงน่ะ?!\""
101100-116 = "ฉันรวบรวมข้อมูลลับสุดยอดภายในวัลคิรี่... จนรู้ตำแหน่งที่คุณครูถูกขังอยู่... และตำแหน่งของสิ่งของ#nชิ้นนี้ได้ค่ะ"
101100-117 = "ไคเซอร์กรุ๊ปคิดว่าฉันเป็นตำรวจทุจริตที่สมรู้ร่วมคิดกับพวกเขา... ฉันก็เลยหลีกเลี่ยงความระแวงได้ค่ะ นี่ค่ะ... รีบรับไปสิคะ..."
101100-118 = "[ns] รับกล่องแห่งซิสดิมมา"
101100-121 = "ตอนนี้ไคเซอร์ คอร์เปอเรชั่นเข้าบุกรุกองค์การนักเรียน แล้วฉกชิงอำนาจควบคุมและบริหารของ#nแซงค์ทัมทาวเวอร์ไว้ค่ะ... "
101100-122 = "ถ้าเราปล่อยไว้อย่างนี้ เมืองนี้จะตกอยู่ในความสับสนอลหม่านจนไม่สามารถควบคุมได้เลยค่ะ..."
101100-123 = "ในฐานะตำรวจทุจริตที่เห็นชอบกับความเป็นจริง นี่คือการต่อต้านอย่างสุดความสามารถแล้วของฉันค่ะ ถ้าคุณครูไม่ทำให้ฉันได้ตระหนักรู้... ฉันก็คงยังไม่กล้าพอหรอกค่ะ"
101100-124 = "คุณครูคะ ในวัลคิรี่ ไม่ใช่ทุกคนที่คิดเหมือนฉันหรอกนะคะ"
101100-125 = "ยังมีคนที่ต่อสู้เพื่อสิ่งที่ตัวเองคิดว่าถูกต้องอยู่... อีก... เยอะมากเลยค่ะ... เหมือนกับสองคนที่อยู่ตรงนี้..."

[translation]
101100-1 = "第10話;衝突（２）"
101100-4 = "琳前輩的不信任案通過了……？#n哇哇，這可不得了了……"
101100-5 = "怎，怎麼會……琳前輩除了是行政官，同時也是學生會長代理唷……！#n琳前輩的權限如果被停止──"
101100-6 = "聯邦學生會將會癱瘓吧──就像聯邦學生會長失蹤後一樣。"
101100-7 = "……為了阻止你的暴走，這也是沒辦法的。"
101100-8 = "至少，在找到老師或是防衛室長之前也只能這麼做了。"
101100-9 = "……"
101100-10 = "……詳細的情況明天再談吧。#n我打算召集所有室長。"
101100-11 = "今天請好好休息吧，琳前輩。#n──明天將會是漫長的一天。"
101100-12 = "……"
101100-13 = "其他行政官也別呆在那裡，快點行動！"
101100-14 = "……是，是！"
101100-15 = "走，走吧……！"
101100-21 = "桃香、步。#n你們也回去吧。這是行政命令。"
101100-22 = "……怎，怎麼這樣。"
101100-23 = "唔……那，那個……"
101100-24 = "……我沒事的。#n很抱歉把你們兩位也捲了進來。"
101100-25 = "呃……那，那麼……明天我會早點來的，前輩……！"
101100-26 = "唉……真是，讓人不舒服的氛圍……"
101100-32 = "……明天再說吧。碧。"
101100-33 = "……"
101100-51 = "……！？#n你，你們是誰……！"
101100-57 = "哎呀哎呀。事情比預期中還順利呢。#n沒想到聯邦學生會居然會空蕩蕩的。"
101100-58 = "本來還以為在最糟的狀況下，有可能碰上那些「狐狸」……#n不過即便如此，也不會對結果有影響吧。"
101100-59 = "在這裡的只有行政官一個人而已嗎？"
101100-60 = "……！#n你們是……凱薩公司……！？"
101100-61 = "……居然偏偏是首席行政官啊。"
101100-62 = "啊啊，別做出無謂的抵抗。#n通訊網和警報裝置已經全都處理完了。"
101100-63 = "……！"
101100-64 = "從現在起，聯邦學生會的所有權限將由我們凱薩公司繼承。"
101100-65 = "聖所之塔那邊怎麼樣了？"
101100-66 = "已經控制住了！"
101100-67 = "很好，聯絡總裁吧。"
101100-71 = "咳咳。看來一切順利呢。我這邊也完成了通訊確認。#n但是，要掌握權限似乎還需要一點時間。"
101100-72 = "先在D.U.全區發布戒嚴令吧。"
101100-73 = "從現在開始，往來D.U.的所有通訊、交通、物流將會停擺。#n於此同時，所有行政機關也會停止。"
101100-74 = "要讓外部無法得知D.U.內部的情況……接著──"
101100-75 = "凱薩公司，你們究竟有什麼企圖？"
101100-76 = "我們要掌控聖所之塔。"
101100-77 = "……！"
101100-78 = "……我們獲得了超古代兵器。#n因此需要聖所之塔的力量，就是這麼回事。"
101100-79 = "這樣一來，奇普托斯將由凱薩公司支配。#n並非蓋瑪特利亞，也非聯邦學生會……我們將成為學園都市的主人。"
101100-80 = "……！"
101100-82 = "你們也覺得不錯吧？#n和「學園都市」相比，「企業都市」聽起來更悅耳吧。咯咯咯──"
101100-86 = "[ns]「凱薩公司……」"
101100-87 = "室長們四散各地，聯邦學生會實質上處於解散狀態，還失去了聯絡……#n現在沒有人知道聖所之塔內部的狀況。"
101100-88 = "嗚……這種情況下居然無法出動，真是糟透了……"
101100-89 = "嗚哇……事情越來越麻煩了……"
101100-90 = "喂，那裡的門開著！"
101100-91 = "快去調查！"
101100-92 = "可惡……PMC的傢伙們往這邊來了。得趕快移動。"
101100-93 = "走，走吧！"
101100-94 = "……唔。"
101100-95 = "[ns]「環奈，你的傷……」"
101100-98 = "……我就到此為止了，老師。"
101100-99 = "[ns]「……！？」"
101100-100 = "為，為什麼要這麼說……！"
101100-101 = "等等，你在說什麼啊！？"
101100-103 = "呼……這裡還是老樣子呢……就和新生合宿時見過的一樣……"
101100-104 = "當時的我，也夢想著成為正義的夥伴……#n看來，改變的只有我而已啊。"
101100-105 = "生活安全局的兩位……受你們照顧了呢。"
101100-106 = "環奈局長……"
101100-107 = "等，等一下……我不喜歡這種氣氛。"
101100-108 = "離開這棟建築物後再前進一段路，就會抵達通往D.U.外部的高速鐵路站。#n就在「兔寶寶公園」附近，老師應該也知道那個地方……之後──"
101100-109 = "──啊，我忘了一件事。這是老師被沒收的持有物品……"
101100-110 = "是平板電腦和手機，請收下吧。"
101100-115 = "[ns]「希迪姆的箱子……你是怎麼拿到的？」"
101100-116 = "……我收集女武神內部的極密情報……查出了老師被囚禁的位置……#n以及放著這部機器的地點……"
101100-117 = "凱薩集團將我視為與企業聯手的腐敗警官……所以才沒有懷疑我。請您，收下吧……"
101100-118 = "[ns]收下希迪姆的箱子"
101100-121 = "現在……凱薩公司襲擊了聯邦學生會，#n奪走了聖所之塔的行政控制權……"
101100-122 = "再這樣下去，這座都市……將會陷入前所未有的混亂……"
101100-123 = "這就是與現實妥協、身為腐敗警官的我，能做的最大抵抗了……#n如果沒有老師的指導……我或許，還沒能踏出這一步就結束了。"
101100-124 = "老師。並非所有女武神的人，都和我一樣腐敗。"
101100-125 = "即使是現在，為了正義而戰的人……應該還有很多才對。#n就像這兩位一樣……"
101100-126 = "……"
101100-127 = "……"
101100-132 = "[ns1]「沒有那種事。環奈也是一名優秀的警官。」\n[ns2]「你不是遵從了自己的信念，不屈不撓地採取了行動嗎？」"
101100-135 = "……"
101100-136 = "[s3]「而且，只要有這個就沒問題了。」\n[s4]「總會有辦法的。」"
101100-139 = "……？"
101100-140 = "老師……？"
101100-141 = "嗯？那是很重要的東西嗎？"
101100-146 = "[ns5]「……我們盼望，七聲歎息。」\n[ns6]「……我們記得，耶利哥的古則。」"
101100-154 = "老師！！哇啊啊啊啊啊！！！"
101100-155 = "你還好嗎！？我很擔心你唷！#n電源突然關閉，真是嚇到我了……！"
101100-156 = "而且現在發生了很嚴重的大事……！"
101100-157 = "[s7]「嗯，我知道。」 \n[s8]「彩奈沒事真是太好了。」"
101100-160 = "嗚嗚……是。#n我沒事的，老師……"
101100-163 = "[ns]「那麼重新，開始指揮吧。」"
101100-165 = "下一話;脫逃（１）"

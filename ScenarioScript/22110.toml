[translation]
22110-1 = "第11話;那種事怎樣都無所謂！"
22110-2 = "……結果，會長把愛麗絲帶走了呢。"
22110-3 = "吶……這情況相當不妙吧……？"
22110-4 = "沒錯，這是緊急狀況。"
22110-6 = "那麼，莉央會長沒有叫部長之外的人也是……"
22110-7 = "或許，從一開始就預測到部長會背叛了吧。"
22110-8 = "真過分！不只帶走了愛麗絲醬，還欺負了隊長！"
22110-10 = "…………唉。"
22110-11 = "……部長。"
22110-12 = "[s]「寧瑠……？還有哪裡會痛嗎……？」"
22110-13 = "那傢伙在我眼前被帶走……#n我卻，只能眼睜睜的看著……"
22110-15 = "這……"
22110-16 = "隊長，不需要糾結那種事。對方也不是堂堂正正的對決對吧？"
22110-17 = "就是說呀！那種對決無效！無效！"
22110-19 = "……你們幾個就算任務失敗了，也會說那種藉口嗎？"
22110-23 = "這……"
22110-25 = "視我於無物帶走了愛麗絲的那傢伙……"
22110-26 = "那傢伙，自稱是「代號Zero Four」。"
22110-27 = "是叫季來著？#n──朱音，妳知道那傢伙嗎？"
22110-28 = "……這個嘛。"
22110-29 = "她的存在，我是知道的。"
22110-30 = "代號Zero Four。#nC&C所屬的莉央會長專屬成員。"
22110-31 = "換句話說，是莉央會長的保鏢……"
22110-32 = "但是，我也是第一次實際面對她……"
22110-33 = "沒想到……會長不惜派出她也要做出這種事……"
22110-34 = "而且雖說是奇襲，居然能壓制部長……"
22110-35 = "……那傢伙，好像用了什麼奇怪的東西。"
22110-36 = "[s]「……她說是莉央給的『武裝』吧。」"
22110-37 = "吶，老師。"
22110-38 = "那個小不點為什麼……"
22110-39 = "……就算被說了要被破壞光環，還是跟著莉央走了呢？"
22110-40 = "是理解了那句話的意思，並且接受了才跟她走的嗎？"
22110-41 = "吶……不過就是個稍微比較會玩遊戲的小不點，莉央為什麼要說那種話呢？"
22110-42 = "只有我無法理解嗎？#n吶，告訴我吧……這到底是什麼狀況？"
22110-43 = "寧瑠前輩……"
22110-44 = "[s]「總之……先整理一下情況吧。」"
22110-46 = "（在桃井失去意識的期間，愛麗絲被莉央綁架了──）"
22110-47 = "（接著，莉央告訴我們她的目的是要破壞愛麗絲的光環）"
22110-49 = "也就是說，「愛麗絲」。#n妳──"
22110-50 = "是為了毀滅世界而誕生的「魔王」哦。"
22110-52 = "啊啊……這樣很難懂嗎？"
22110-53 = "簡單來說──只要破壞妳的光環就解決了，就是這麼回事。"
22110-55 = "老師，愛麗絲醬……#n真的跟會長說的一樣……"
22110-56 = "……是「魔王」嗎？"
22110-57 = "[s]「綠……」"
22110-61 = "我……"
22110-62 = "我也……"
22110-63 = "不是……很清楚……"
22110-64 = "想好好聽聽，愛麗絲醬的心聲，再多和她說說話……"
22110-65 = "愛麗絲醬，不是她說的那樣……#n不是什麼「魔王」………好想，說服會長……"
22110-66 = "我……"
22110-67 = "我們……"
22110-72 = "老師，我們現在該怎麼辦？"
22110-76 = "[ns] 「……」"
22110-78 = "桃井…………"
22110-81 = "降臨！"
22110-82 = "姐姐！？"
22110-83 = "[s]「桃井……！身體還好嗎！？傷勢怎麼樣！？」"
22110-84 = "身體已經沒問題了！好好睡了一覺後體力也完全恢復！"
22110-85 = "沒錯……現在的我，就像是在架子上獲得了藥水，#n等級成功超越下一關推薦等級的戰士……！"
22110-86 = "天不怕地不怕的，超強化型女高中生狀態！"
22110-87 = "姐姐……"
22110-88 = "姐姐……愛麗絲醬……愛麗絲醬她！"
22110-94 = "唔哇！！？怎麼了怎麼了！？"
22110-95 = "綠進入了看完惡意評論後的隔天才會出現的「一日限定撒嬌鬼模式」！？為什麼！？"
22110-99 = "桃井，愛麗絲醬她……"
22110-102 = "那個笨蛋！！"
22110-104 = "姐，姐姐？"
22110-105 = "桃井……？"
22110-107 = "老實說，那種困難的事情我不太理解……！"
22110-108 = "聽完大家的話之後，胸口就像被揪住一樣……#n不太能用言語來形容……"
22110-109 = "但是有件事我非常確定！"
22110-110 = "……非常確定？"
22110-111 = "就是我們不能接受這件事！！"
22110-112 = "說實話，愛麗絲是「魔王」還是什麼，那種事怎樣都無所謂！"
22110-113 = "我就是不喜歡就這樣和愛麗絲分別！"
22110-114 = "愛麗絲留下的那些話，既不是道別也不是什麼特別的話！"
22110-115 = "連個結局都不是！真是糟透了！"
22110-116 = "所以我想把愛麗絲帶回來！會去把她帶回來哦！#n大家不想嗎！？"
22110-117 = "姐姐……"
22110-118 = "桃井……"
22110-122 = "……嗯，也對。"
22110-128 = "喂，小不點。"
22110-129 = "哇！？有，有什麼事……寧瑠前輩？"
22110-130 = "妳啊──"
22110-132 = "還挺會說的嘛！"
22110-133 = "嗯，嗯……？"
22110-134 = "妳說的沒錯。沒必要想那麼多。#n被打了的話，只要打回去就好了。"
22110-135 = "東西被奪走的話，搶回來就好了。就是這麼簡單。"
22110-136 = "吶，妳們怎麼想？#n朱音、明日奈、花凛。"
22110-138 = "呵呵……那還用說嗎？"
22110-139 = "只要是部長的決定。"
22110-140 = "當然要一起去囉～♪"
22110-142 = "……老師！"
22110-143 = "拜託你！助我們一臂之力吧！"
22110-147 = "[ns]「桃井……大家……」"
22110-149 = "[ns]「我知道了，一起想想把愛麗絲帶回來的方法吧。」"
22110-151 = "下一話;作戰會議"

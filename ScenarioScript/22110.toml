[translation]
22110-1 = "Episode 11; Be That as It May!"
22110-2 = "...So the president took Aris away?"
22110-3 = "Umm... Isn't this a really dangerous situation?"
22110-4 = "Yes, it's clearly an emergency."
22110-6 = "The reason President Rio only called Neru was..."
22110-7 = "...because she already knew how Neru would react."
22110-8 = "That's so mean! She took away Aris and harassed the leader!"
22110-10 = "*sigh*"
22110-11 = "...Neru?"
22110-12 = "[s] \"Neru...? What's wrong? Are you injured anywhere?\""
22110-13 = "She took the kid away. And I... I couldn't do a damn thing about it."
22110-15 = "That's..."
22110-16 = "It wasn't your fault, Neru. She ambushed you and cornered you into an unfair fight."
22110-17 = "Right! It doesn't count!"
22110-19 = "Would you say the same thing if you failed a mission because you got ambushed?"
22110-23 = "Well..."
22110-25 = "She easily subdued me, the president of C&C, and I let them take Aris away."
22110-26 = "She introduced herself as call sign Zero-Four."
22110-27 = "She said her name was Toki. Akane, do you know her?"
22110-28 = "Do I know her? Hmm... "
22110-29 = "Let's just say I knew of her."
22110-30 = "Call sign Zero-Four was affiliated with C&C, like us, but was assigned exclusively to President Rio."
22110-31 = "So, we could say that she's Rio's bodyguard."
22110-32 = "But this was my first time seeing her and hearing her name..."
22110-33 = "I didn't think she would utilize someone like that to deal with this matter..."
22110-34 = "Not only that, she was skilled enough to subdue Neru..."
22110-35 = "...She was using something strange."
22110-36 = "[s] \"Right... Was that what Rio called 'the weapon'?\""
22110-37 = "Hey, Sensei."
22110-38 = "Why did the kid follow Rio without resisting?"
22110-39 = "She was told that her halo was gonna be destroyed, so why?"
22110-40 = "Did the kid really understand what that meant before she left?"
22110-41 = "All she ever does is play video games and go on adventures. Why would Rio say all those awful things to her? Make her feel like she didn't deserve to live?"
22110-42 = "Am I the only one who doesn't get it? What... What did she do wrong?"
22110-43 = "Neru..."
22110-44 = "[s] \"Let's take a moment to try to understand the situation.\""
22110-46 = "While Momoi was unconscious, Aris was kidnapped by Rio."
22110-47 = "Rio said her goal was to destroy Aris' halo."
22110-49 = "Aris, your existence is essentially..."
22110-50 = "...that of an evil lord who was born to destroy this world."
22110-52 = "Was that too difficult for you to understand? Let me put it simply."
22110-53 = "Your halo must be destroyed."
22110-55 = "Sensei, like Rio said, is Aris really..."
22110-56 = "...a demon lord?"
22110-57 = "[s] \"Midori, that's...\""
22110-61 = "I..."
22110-62 = "I want..."
22110-63 = "I don't know..."
22110-64 = "I want to talk to Aris. I want to hear what she's thinking..."
22110-65 = "I want to convince Rio that Aris...is nothing like a demon lord..."
22110-66 = "I..."
22110-67 = "We have to..."
22110-72 = "Sensei... What do we do now?"
22110-76 = "[ns] \"...\""
22110-78 = "I..."
22110-81 = "I have risen!"
22110-82 = "Momoi?!"
22110-83 = "[s] \"Momoi...! How are you feeling? How are your injuries?!\""
22110-84 = "I'm fine! Everything's all healed! I slept it all off, and I'm ready to go!"
22110-85 = "I'm a Hero who's just filled all her potions, got all the EXP needed for leveling up, and has moved on to the next stage!"
22110-86 = "I'm a super-enhanced character who has nothing to be afraid of!"
22110-87 = "Momoi..."
22110-88 = "Momoi... Aris... Aris is...!"
22110-94 = "Whoa! What is this?!"
22110-95 = "Why's Midori acting all needy? It's like she just got a bunch of mean comments online or something!"
22110-99 = "Momoi, Aris was..."
22110-102 = "You fools!"
22110-104 = "H-Hey...?"
22110-105 = "Momoi...?"
22110-107 = "Hmm... I don't know if I understand everything exactly..."
22110-108 = "After hearing the story, I can't exactly explain all the things I'm feeling, and my heart is heavy..."
22110-109 = "But one thing is clear!"
22110-110 = "What's that?"
22110-111 = "We cannot and will not accept this situation!"
22110-112 = "I don't care if Aris is a demon lord or whatever!"
22110-113 = "She's our friend! We can't let Aris go like this!"
22110-114 = "What she said when she left...that's not an acceptable farewell!"
22110-115 = "That can't be the end! It's the worst!"
22110-116 = "I want to get Aris back! I'm gonna go get her! Everyone, don't you agree?"
22110-117 = "Hey..."
22110-118 = "Momoi..."
22110-122 = "...Yeah. She's right."
22110-128 = "Hey, kid."
22110-129 = "Whoa?! Wh-What...? Y-Yes, Neru?"
22110-130 = "You..."
22110-132 = "That was a good speech just now."
22110-133 = "...?"
22110-134 = "You're right. We don't have to overthink this. All we gotta do is what I do best: attack."
22110-135 = "She took her away from us, so now we have to go get her back."
22110-136 = "What do you think, Akane, Asuna, Karin?"
22110-138 = "Heehee... Say no more."
22110-139 = "If that's your decision..."
22110-140 = "I've been waiting for this!"
22110-142 = "So, Sensei!"
22110-143 = "Please! Lend us your power!"
22110-147 = "[ns] \"Momoi...everyone...\""
22110-149 = "[ns] \"Okay. Let's think about how we can bring Aris back.\""
22110-151 = "Next Episode; Strategy Meeting"

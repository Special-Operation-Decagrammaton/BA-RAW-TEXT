[translation]
22110-1 = "ตอนที่ 11;จะยังไงก็ไม่สำคัญหรอก!"
22110-2 = "อืม... สุดท้ายแล้วประธานก็พาตัวอาริสึไปสินะ"
22110-3 = "นี่... แบบนี้มันเป็นสถานการณ์อันตรายเลยไม่ใช่เหรอ...?"
22110-4 = "ใช่ค่ะ เป็นสถานการณ์ฉุกเฉินเลยละ"
22110-6 = "งั้นที่ประธานริโอะเรียกหัวหน้าออกไปแค่คนเดียวก็..."
22110-7 = "คงเป็นเพราะคิดว่าหัวหน้าจะทรยศตั้งแต่แรกแล้วน่ะสิ"
22110-8 = "เกินไปแล้วนะ! พาตัวอาริสึจังไปตามอำเภอใจ แถมยังรังแกหัวหน้าของเราอีก!"
22110-10 = "......ฮึ่ย"
22110-11 = "หัวหน้า...?"
22110-12 = "[s] \"เนรุ...? เป็นอะไรหรือเปล่า ยังเจ็บตรงไหนอยู่ไหม...\""
22110-13 = "เด็กคนนั้นถูกพาตัวไปต่อหน้าต่อตาเลยนะ แล้วฉันทำได้แค่ยืนดูเฉยๆ..."
22110-15 = "ถ้าเป็นเรื่องนั้นละก็..."
22110-16 = "ไม่ต้องคิดมากหรอกหัวหน้า ทางนั้นไม่เปิดโอกาสให้เราสู้ได้อย่างผ่าเผย และการจู่โจมนั่นก็เป็นคำสั่ง#nของประธานด้วย"
22110-17 = "ใช่! แบบนี้ถือว่าโมฆะ! ไม่ต้องไปคิดมากหรอก!"
22110-19 = "ถ้าพวกเธอทำภารกิจไม่สำเร็จเพราะโดนจู่โจมกลางคัน ก็จะแก้ตัวกันแบบนี้เรอะ?"
22110-23 = "คือว่า..."
22110-25 = "ยัยคนที่ล็อกตัวฉันที่เป็นถึงหัวหน้าของ C&C และจับตัวอาริสึไปน่ะ"
22110-26 = "ยัยนั่นบอกว่าตัวเองรหัสประจำตัว ซีโร่โฟร์"
22110-27 = "ชื่อว่าโทคิหรือเปล่านะ? เธอรู้จักไหม อาคาเนะ?"
22110-28 = "ถ้าถามว่ารู้จักหรือเปล่า นั่นน่ะก็..."
22110-29 = "ฉันรู้แค่ว่าเธอมีตัวตนอยู่ค่ะ"
22110-30 = "สมาชิกรหัสประจำตัว ซีโร่โฟร์ สังกัด C&C เหมือนพวกเรา แต่ขึ้นตรงกับประธานริโอะ"
22110-31 = "จะมองว่าเป็นบอดี้การ์ดของประธานริโอะก็ได้ค่ะ"
22110-32 = "แต่ฉันก็ไม่เคยเห็นตัวจริง และไม่เคยได้ยินชื่อมาก่อนเลย..."
22110-33 = "คาดไม่ถึงเลยค่ะว่าประธานจะยืมมือเธอทำเรื่องแบบนั้น..."
22110-34 = "ถึงจะเป็นแค่การซุ่มโจมตีก็เถอะ แต่มีฝีมือถึงขั้นสยบหัวหน้าได้แบบนี้..."
22110-35 = "...ยัยนั่นน่ะ ใช้อาวุธอะไรแปลกๆ ด้วย"
22110-36 = "[s] \"<อาวุธ> ที่ริโอะให้ไปน่ะเหรอ?\""
22110-37 = "นี่ครู"
22110-38 = "ทำไมเด็กน้อยนั่น... ถึงยอมเดินตามริโอะไปอย่างว่าง่ายเลยล่ะ?"
22110-39 = "...ขนาดริโอะพูดเรื่องบ้าบอ อย่างเรื่องทำลายฮาโลแบบนั้นแล้ว ก็ยังยินดีที่จะตามไปอยู่อีก?"
22110-40 = "หรือว่าเด็กน้อยนั่นจะฟังเรื่องที่ริโอะพูดจนเกิดคล้อยตามขึ้นมา?"
22110-41 = "แล้วทำไมริโอะถึงมาพูดฉอดๆ ในเรื่องของเด็กที่ไม่คิดร้ายต่อใคร วันๆ เอาแต่เล่นเกมแบบนั้นด้วย?"
22110-42 = "มีแค่ฉันคนเดียวเหรอที่ไม่เข้าใจ? นี่มันเรื่องบ้าบออะไรกันเนี่ย?"
22110-43 = "รุ่นพี่เนรุ..."
22110-44 = "[s] \"ครูว่า... เรามาสรุปสถานการณ์กันก่อนดีกว่า\""
22110-46 = "(ระหว่างที่โมโมอิหมดสติไปและยังนอนไม่ฟื้น อาริสึก็ถูกริโอะพาตัวไป)"
22110-47 = "(ริโอะบอกทุกคนว่าเป้าหมายของเธอคือการทำลายฮาโลของอาริสึ)"
22110-49 = "โดยสรุปแล้ว ตัวตนของอาริสึ ไม่สิ ตัวตนของเธอ──"
22110-50 = "ก็คือ <ราชาปีศาจ> ที่เกิดมาเพื่อทำลายล้างโลกยังไงล่ะ"
22110-52 = "อืม... ยังไม่เข้าใจเหรอ? งั้นก็คงต้องพูดสั้นๆ ให้เข้าใจง่ายๆ สินะ"
22110-53 = "ฉันหมายถึงการทำลายฮาโลของเธอน่ะ"
22110-55 = "คุณครูคะ... อาริสึจังเป็น..."
22110-56 = "เป็นราชาปีศาจอย่างที่ประธานพูดไว้จริงเหรอคะ?"
22110-57 = "[s] \"มิโดริ เรื่องนั้นมัน...\""
22110-61 = "ฉัน..."
22110-62 = "ฉันน่ะ..."
22110-63 = "ฉัน... ไม่รู้อะไรเลย..."
22110-64 = "ฉันอยากฟังคำพูดจากอาริสึจัง... อยากคุยด้วยกันต่อ..."
22110-65 = "อยากเกลี้ยกล่อมประธานด้วยว่าอาริสึจังไม่ใช่อะไรแบบนั้น... อาริสึจังไม่ใช่ราชาปีศาจ..."
22110-66 = "คุณครู..."
22110-67 = "จากนี้ฉัน..."
22110-72 = "และพวกเราทุกคนจะทำยังไงดี?"
22110-76 = "[ns] \".........\""
22110-78 = "โมโมอิ..."
22110-81 = "มาจุติแล้วจ้า!"
22110-82 = "พี่โมโมอิ?!"
22110-83 = "[s] \"โมโมอิ...! เป็นยังไงบ้าง?! ยังเจ็บแผลอยู่ไหม?!\""
22110-84 = "เรื่องแผลน่ะไม่เป็นไรแล้ว! แผลหายดีแล้วด้วย! แถมยังได้นอนเต็มอิ่ม! ฟื้นฟู HP จนเต็มหลอดเลย!"
22110-85 = "ตอนนี้ฉันคือผู้กล้าที่ได้โพชั่นเต็มเปี่ยมมาจากบ่อน้ำ และอัปเลเวลจนมี EXP เหลือเฟือจนเข้าพิชิตด่าน#nถัดไปได้...!"
22110-86 = "ตอนนี้ฉันคือนักเรียนม.ปลายที่มีพลังเหนือธรรมชาติ และไม่มีอะไรให้เกรงกลัว!"
22110-87 = "พี่โมโมอิ..."
22110-88 = "พี่โมโมอิ... อาริสึจัง... อาริสึจังเค้า!"
22110-94 = "อะ... อ๊ายยย!! อะไรกันเนี่ย?!"
22110-95 = "ทำไมมิโดริถึงอยู่ในโหมดเด็กขี้แยเอาแต่ใจ ปกติจะเห็นได้ตอนโดนคอมเมนต์แย่ๆ ทัวร์ลงแบบนี้ล่ะ?!"
22110-99 = "โมโมอิ... อาริสึจังเค้า..."
22110-102 = "เจ้าพวกซื่อบื้อเอ๊ย!!"
22110-104 = "พะ... พี่?"
22110-105 = "โมโมอิ...?"
22110-107 = "อืมมม~~ ถ้าให้พูดตรงๆ ฉันไม่รู้เรื่องยากๆ อะไรหรอกนะ"
22110-108 = "จากเท่าที่ฟังมาฉันก็เหมือนถูกบีบหัวใจ... มันเจ็บจนอธิบายออกมาเป็นคำพูดไม่ได้เลย"
22110-109 = "แต่ยังไงก็มีอย่างหนึ่งที่ชัดเจนอยู่นะ!"
22110-110 = "ชัดเจน...?"
22110-111 = "ก็การที่พวกเราไม่ยินยอมยังไงล่ะ!!"
22110-112 = "ถึงอาริสึจะเป็นราชาปีศาจหรืออะไรอื่น จะยังไงก็ไม่สำคัญหรอก!"
22110-113 = "ฉันก็แค่ไม่อยากปล่อยอาริสึไปทั้งๆ แบบนี้ก็เท่านั้นละ!"
22110-114 = "อาริสึยังไม่ทันจะได้บอกลาพวกเราเลยด้วยซ้ำ!"
22110-115 = "นี่ไม่ใช่ฉากจบที่ถูกต้อง! แบบนี้แย่มากเลย!"
22110-116 = "ฉันอยากพาตัวอาริสึกลับมา! เราต้องพาอาริสึกลับมา! ใช่ไหมทุกคน?!"
22110-117 = "พี่โมโมอิ..."
22110-118 = "โมโมอิ..."
22110-122 = "อืม... ต้องอย่างนี้สิ"
22110-128 = "นี่ เด็กน้อย"
22110-129 = "หา?! อะ... อะไรกันน่ะ...? รุ่นพี่เนรุ?"
22110-130 = "เรียกเธอนั่นแหละ!"
22110-132 = "เธอก็พูดอะไรดีๆ กับเค้าเป็นเหมือนกันนี่นา!"
22110-133 = "หะ... หืม...?"
22110-134 = "เธอพูดถูกแล้วละ ไม่ต้องไปคิดให้มันมากความนักหรอก ถ้าถูกทำให้เจ็บช้ำ เราก็แค่ต้องสนองคืน"
22110-135 = "ถ้าถูกแย่งอะไรไป ก็แค่ต้องไปเอากลับมาไงล่ะ"
22110-136 = "พวกเธอล่ะ คิดว่าไง? อาคาเนะ อาสึนะ คาริน"
22110-138 = "ฮุฮุ... จำเป็นต้องพูดด้วยเหรอคะ?"
22110-139 = "ถ้ามันเป็นการตัดสินใจของหัวหน้าละก็..."
22110-140 = "อื้ม!"
22110-142 = "คุณครู ถ้างั้นก็...!"
22110-143 = "ให้พวกเรายืมพลังของคุณครูหน่อยนะ!"
22110-147 = "[ns] \"โมโมอิ... ทุกคน...\""
22110-149 = "[ns] \"เข้าใจแล้ว เรามาคิดหาวิธีพาอาริสึกลับมากันเถอะ\""
22110-151 = "ตอนต่อไป;ประชุมเชิงปฏิบัติการ"

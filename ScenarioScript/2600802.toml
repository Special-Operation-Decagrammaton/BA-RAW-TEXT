[translation]
2600802-1 = "เห็นใช่ไหมคะ? ฉันทำสำเร็จแล้วค่ะ!"
2600802-2 = "(คุณครูมาที่ร้านริมทะเลตามที่สัญญาไว้กับชิซุโกะ)"
2600802-3 = "อ๊ะ คุณครู!"
2600802-4 = "โธ่เอ๊ย ชิซุโกะรอคุณครูมาตั้งนานแล้วนะคะ~!"
2600802-5 = "[s] \"ชิซุโกะนี่ร่าเริงตลอดเลยน้า\""
2600802-6 = "แน่นอนอยู่แล้วค่ะ!"
2600802-7 = "ในฐานะเจ้าของร้านเฮียกคิยาโคและไอดอล ภาพลักษณ์ที่สดใสเป็นเรื่องสำคัญมากค่ะ "
2600802-8 = "[s] \"วันนี้เรียกครูมาทำไมเหรอ?\""
2600802-9 = "อ่า จริงๆ เลย... ทำเอาหมดอารมณ์เลยนะคะเนี่ย"
2600802-10 = "เรามาอยู่ที่ทะเลกันแล้วนี่คะ แถมตอนนี้ก็เป็นฤดูร้อนด้วย?"
2600802-11 = "ตอนนี้ร้านริมทะเลของเรากำลังเจอกระแสคลื่นลมอยู่เลยนะคะ!"
2600802-12 = "ถ้าได้คนมาช่วยเสริมแรงโต้คลื่นก็คงจะดีไม่น้อยเลยละค่ะ!"
2600802-13 = "[s1] \"ครูไม่ค่อยเข้าใจเท่าไรเลย\"\n[s2] \"ถึงจะไม่ค่อยรู้เรื่องอะไร แต่ก็เอาตามที่ชิซุโกะบอกแล้วกัน!\""
2600802-16 = "เฮ้อ... ช่างเถอะค่ะ"
2600802-17 = "เดี๋ยวฉันจะอธิบายให้ฟังเองค่ะ"
2600802-18 = "พอฟังเรื่องราวของฉันแล้ว"
2600802-19 = "คุณครูห้ามเมินกันเด็ดขาดเลยนะคะ?!"
2600802-24 = "ดูสิคะ นี่คือร้านสาขาของร้านเฮียกคิยาโคค่ะ"
2600802-25 = "ร้านริมทะเลค่ะ!"
2600802-27 = "อยู่ตรงหน้านี้ไงล่ะคะ"
2600802-28 = "รีสอร์ตแต่ละแห่งในย่านนี้"
2600802-29 = "เราได้ติดต่อร่วมมือทางธุรกิจไว้หมดแล้ว!"
2600802-31 = "อาหารที่จะเสิร์ฟในรีสอร์ตพวกนั้น"
2600802-32 = "ร้านริมทะเลของเราก็จะมีจำหน่ายเหมือนกัน"
2600802-33 = "เราจะบริหารสาขาใหญ่และร้านสาขาแต่ละแห่งแยกจากกัน"
2600802-35 = "โดยวางขายสินค้าตามลักษณะเด่นของแต่ละสาขา"
2600802-36 = "พร้อมทั้งนำสินค้าทั่วๆ ไปที่พบเจอได้ทุกที่มาผสมผสานกัน"
2600802-37 = "และสร้างรายได้เป็นกอบเป็นกำแบบที่ไม่เคยมีมาก่อนค่ะ!"
2600802-39 = "รายได้ของร้านเฮียกคิยาโคสาขานี้เป็นความลับทางธุรกิจก็จริง"
2600802-40 = "แต่ถ้าเทียบกับเมื่อก่อน ก็แล้วนับว่าพุ่งทะลุจุดเดือดมากๆ เลย!"
2600802-41 = "นี่เป็นก้าวแรก ไม่ใช่แค่เพียงชายหาดนี้และหมู่เกาะนี้เท่านั้น"
2600802-42 = "ฉันจะสร้างชื่อเสียงของร้านเฮียกคิยาโคให้ดังกระฉ่อนไปทั่วคิโวทอสเลยค่ะ!"
2600802-43 = "เรียกว่าโกลบอลมาร์เก็ตติ้งไงคะ!"
2600802-44 = "[s3] \"อืม... อธิบายได้น่าตื่นเต้นน่าดูเลยนะ\"\n[s4] \"ชิซุโกะนี่สุดยอดเลยน้า\""
2600802-47 = "อึ่ก อะ...อะไรกันคะ คำตอบและการแสดงออกที่ตรงไปตรงมาแบบนั้น"
2600802-48 = "คุณครูนี่ชอบพูดอะไรจี้ใจอยู่เรื่อยเวลาที่ฉันสงบใจได้แล้วเลยจริงๆ นะคะ...!"
2600802-49 = "คะ? คุณครูลองไปที่สาขาอื่นๆ มาแล้วเหรอคะ?"
2600802-50 = "เป็นยังไงบ้างคะ? "
2600802-51 = "บริการหลังจากรีแบรนด์ใหม่ภายใต้ชื่อของร้านเฮียกคิยาโค!"
2600802-52 = "[s] \"ก็ดีนะ แต่รู้สึกเหมือนเสน่ห์ของร้านเฮียกคิยาโคหายไปน่ะ\""
2600802-53 = "คะ?! เสน่ห์ของร้านเฮียกคิยาโคที่พูดถึงนั่น..."
2600802-54 = "อ๋า หรือว่าจะหมายถึงอีเวนต์การแสดงโก๊ะๆ กังๆ นั่นน่ะเหรอคะ...?"
2600802-55 = "ระ...เรื่องนั้น มะ...มันไม่น่ามีผลเท่าไร..."
2600802-56 = "หรือจะบอกว่าฉันลำดับความสำคัญมันไว้หลังๆ ดีนะ... "
2600802-57 = "หรือจะบอกว่าคิดไม่ถึงดีนะ..."
2600802-58 = "แต่คุณครูอุตส่าห์ให้ความสนใจกับรายละเอียดแบบนั้น..."
2600802-59 = "ที่จริงแล้วอุปกรณ์ กับกำลังของเราไม่พอน่ะค่ะ..."
2600802-60 = "เพราะงั้นเลยต้องตัดใจตัดทิ้งไปอย่างเจ็บปวดน่ะค่ะ แหะๆ"
2600802-61 = "[s] \"ช่วงนี้ชิซุโกะได้พักผ่อนบ้างรึเปล่า?\""
2600802-62 = "อะ...อะไรกันคะ...?!"
2600802-63 = "มีอะไรแปลกๆ เหรอคะ?"
2600802-64 = "[s5] \"ชิซุโกะที่คอยสร้างเสียงหัวเราะให้ลูกค้าน่ะ น่ารักมากเลยนะ\"\n[s6] \"ถ้าร้านสาขาเพิ่มมาเยอะ ก็คงทำเหมือนเดิมไม่ได้สินะ\""
2600802-67 = "คะ... คะ...?"
2600802-68 = " เอ่อ... คือว่า..."
2600802-69 = "(จู่ๆ ชิซุโกะก็หน้าแดงอย่างที่ไม่เคยเห็นมาก่อน)"
2600802-70 = "จะ...จู่ๆ ฉันก็นึกขึ้นมาได้ว่ามีธุระค่ะ! "
2600802-71 = "พะ...พอดีฉันมีประชุมเกี่ยวกับธุรกิจของเรารออยู่ค่ะ "
2600802-72 = "ถะ...ถ้างั้นไว้เจอกันพรุ่งนี้นะคะ!"
2600802-77 = "(ชิซุโกะวิ่งหายไปแทบจะทันที)"
2600802-78 = "(คุณครูรู้สึกเป็นห่วงที่ชิซุโกะแสดงท่าทางแบบนั้น แต่ก็กลับไปที่ห้องพักโดยไม่ได้พูดอะไร...)"

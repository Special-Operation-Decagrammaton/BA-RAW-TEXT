[translation]
2600802-1 = "我，成功了！"
2600802-2 = "（來到了和靜子約好碰面的海之家）"
2600802-3 = "啊！"
2600802-4 = "真是的，老師你太慢了！"
2600802-5 = "[s] 「抱歉抱歉。靜子還真是隨時都充滿了活力呢。」"
2600802-6 = "當然！"
2600802-7 = "身為百夜堂的老闆兼偶像，我當然要隨時拿出活力又正向的一面啊。 "
2600802-8 = "[s] 「原來如此。話說回來，你今天找我來有什麼事嗎？」"
2600802-9 = "也，也太冷靜了吧……！"
2600802-10 = "現在是夏天，而且是難得的海邊！"
2600802-11 = "那我們海之家當然也要乘著這股浪潮！"
2600802-12 = "加倍燃燒我們的鬥志！"
2600802-13 = "[s1] 「好，好喔！」\n[s2] 「雖然我完全聽不懂，不過了解了！」"
2600802-16 = "嗚，感覺老師只是在勉強附和我……"
2600802-17 = "總之先讓我繼續說吧。"
2600802-18 = "不過等你聽完之後……"
2600802-19 = "保證老師一定會深陷其中，對我目不轉睛！"
2600802-24 = "請看。這就是百夜堂的分店──"
2600802-25 = "「海之家」！"
2600802-27 = "實不相瞞，本人靜子……"
2600802-28 = "和各大渡假勝地透過業務合作建立的加盟經營模式……"
2600802-29 = "已經幾乎全數完成了！"
2600802-31 = "而且各式商品、各家渡假勝地的獨家服務……"
2600802-32 = "都會在這間海之家旗艦店進行提供！"
2600802-33 = "而各分店也會和總店一樣，具備管理優良的體制！"
2600802-35 = "各分店也會販賣具備各地特徵的商品！"
2600802-36 = "加上重點商品都能在各分店購買！"
2600802-37 = "打造出史上最高的整體收益！"
2600802-39 = "雖然實際數字屬於營業機密……"
2600802-40 = "不過我們百夜堂的營收已經急速成長，不可同日而語了！"
2600802-41 = "我們也將趁勝追擊，除了這片群島及沿海地帶……"
2600802-42 = "還預定讓百夜堂的名號響徹整個奇普托斯！"
2600802-43 = "沒錯！百夜堂的發展已經一發不可收拾了！！"
2600802-44 = "[s3] 「喔……靜子看起來很開心呢。」\n[s4] 「不愧是靜子，好厲害唷。」"
2600802-47 = "呃，感覺不到什麼熱忱……"
2600802-48 = "為什麼老師在這種時候都能異常冷靜呢……？"
2600802-49 = "嗯？你說你已經去好幾家分店看過了？"
2600802-50 = "這，這樣啊。那你覺得怎麼樣呢？ "
2600802-51 = "夏日百夜堂脫胎換骨後，提供的服務如何呀？"
2600802-52 = "[s] 「雖然很不錯，不過我覺得沒有百夜堂以往提供的服務有點可惜。」"
2600802-53 = "老，老師是說……"
2600802-54 = "那個冒失鬼服務嗎？"
2600802-55 = "畢，畢竟就結果上來說，那麼做實在不怎麼有效率……"
2600802-56 = "或者應該說不是優先事項……"
2600802-57 = "或者應該說我沒有想得那麼周全……"
2600802-58 = "特別是……"
2600802-59 = "還有工作量這些現實問題……"
2600802-60 = "而且……是啦，雖然我自己也覺得有點可惜……"
2600802-61 = "[s] 「靜子，你最近有好好休息嗎？」"
2600802-62 = "休，休息……！？"
2600802-63 = "難，難道我看起來有哪裡不對勁嗎！？"
2600802-64 = "[s5] 「我一直覺得能讓客人開心的你相當可愛，而且很樂在其中。」\n[s6] 「不過我也能理解有時候就是不得不做出一些改變……」"
2600802-67 = "那，那個……"
2600802-68 = "你的意思是……"
2600802-69 = "（靜子的臉變得越來越紅）"
2600802-70 = "我，我突然想起來我還有點事情要辦！ "
2600802-71 = "我等一下必須去參加一場，充滿智慧又豪華又有品味的會議！"
2600802-72 = "明，明天再見！"
2600802-77 = "（靜子快跑著離開了）"
2600802-78 = "（雖然相當在意靜子的態度，不過最後還是決定先回到渡假勝地……）"

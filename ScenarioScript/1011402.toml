[translation]
1011402-1 = "The Joy of Waitressing"
1011402-2 = "Just as I arrived at the cafe, Juri came up and said..."
1011402-6 = "Oh, Sensei! Welcome!"
1011402-7 = "[s] \"Hey, Juri! How's it going?\""
1011402-8 = "Oh, well..."
1011402-9 = "Heehee. I actually saw you coming from far away, so..."
1011402-10 = "Ah, what am I saying? This isn't the time for that. Please, come in!"
1011402-12 = "Welcome, dear \"customer.\" What would you like to order?"
1011402-13 = "[s1] \"The cafe's specialty coffee!\"\n[s2] \"I'm worried for my weight, but I still want a parfait!\""
1011402-14 = "All right, coffee it is, then. We have both hot and iced coffee."
1011402-15 = "Which would you like?"
1011402-16 = "...Right away. Would you like any syrup or creamer?"
1011402-17 = "Thank you for the order. Please wait and I'll have it right out."
1011402-18 = "Ah, a parfait, you say? You got it."
1011402-19 = "Could I interest you in our chocolate cherry parfait, since cherries are in season?"
1011402-20 = "Thank you! It's a limited menu item, you know."
1011402-21 = "We're also topping it with a small cheese cake, so please enjoy that too."
1011402-23 = "I enjoyed looking over the menu while I observed how Juri worked."
1011402-24 = "I ordered plenty off that menu, so that I wouldn't feel like I was imposing on the cafe."
1011402-27 = "...Oh no, what do we do? We're all out of powdered sugar!"
1011402-28 = "What? The powdered sugar...? We can always check the market down the street!"
1011402-33 = "...Powdered sugar is sold out EVERYWHERE right now...?"
1011402-34 = "I-It'll be okay! We can always make more. Powdered sugar is made by creating a fine powder, out of sugar, and then mixing in a small amount of starch..."
1011402-35 = "We're out of regular sugar AND starch too! What're we going to do, Juri...?"
1011402-36 = "We're getting our next shipment tomorrow, but we need the powdered sugar right now!"
1011402-37 = "W-We do. How're we going to fix this..."
1011402-43 = "Manager! We should try the pharmacy!"
1011402-44 = "Huh? Why the pharmacy?"
1011402-45 = "We can buy some glucose candy!"
1011402-47 = "Then we can make a powder out of that, and blend it into an even finer powder..."
1011402-52 = "That'll do it, Manager! I think that'll work as a substitute for today!"
1011402-53 = "Oh, and the powdered glucose will melt at a lower temperature than regular sugar."
1011402-54 = "It should have a different texture, and actually a nice, refreshing flavor, so those customers with delicate tastes might be able to tell the difference..."
1011402-55 = "...but it's still better than nothing!"
1011402-57 = "What? We're out of butter, but we have to make more red bean butter sandwiches?"
1011402-58 = "Then... That's it! Why don't we use cream cheese instead of butter?"
1011402-59 = "Of course, we can't mask the unique sour taste of the cream cheese, but..."
1011402-60 = "They both have a soft texture, and they're quite savory, so it should be close enough!"
1011402-61 = "It's certainly a good idea, but we're almost out of cream cheese too...!"
1011402-62 = "W-We are? Then what DO we...ah!"
1011402-63 = "Manager! Do we have any milk, any whipped cream?"
1011402-64 = "We have plenty of those."
1011402-65 = "Then we might be able to make something work! Here's what I have in mind!"
1011402-66 = "First, we're going to warm up some milk, add the whipped cream, and then heat it up some more..."
1011402-67 = "...and if we mix in lemon juice after that, it'll separate the cream from the whey."
1011402-68 = "Once you remove the layer of cream, you should be able to make a cream cheese substitute!"
1011402-69 = "All right! We'll try that!"
1011402-71 = "..."
1011402-72 = "Hey, manager? This bread doesn't look fresh!"
1011402-73 = "R-Really?! They told me it just came out of the oven this morning, though..."
1011402-74 = "Fresh-baked sourdough always has a slight scent of ethanol..."
1011402-75 = "...but this bread doesn't have that! You should call your provider!"
1011402-76 = "Y-Yeah, I'll do that!"
1011402-79 = "...You were right on the money, Juri. That \"fresh bread\" was actually their left-over inventory from two days ago."
1011402-80 = "I see..."
1011402-81 = "*sigh* I wonder if we should change vendors. Anyways, that's an impressive eye for detail you've got there!"
1011402-82 = "Oh, no, I'm nothing special..."
1011402-83 = "[ns] \"Juri's the best there is when it comes to managing food products.\""
1011402-84 = "Not you too, Sensei!"
1011402-86 = "After being so busy, it's gotten so quiet now..."
1011402-87 = "Well, I suppose it's usually like this when peak time's over. ...Um, Sensei? You're not bored just hanging around this cafe, are you?"
1011402-88 = "What? You weren't bored because you were keeping eye on me? W-Well...that's... I mean... It's flattering. Heeheehee."
1011402-89 = "Juri? You can take a break now. Good work!"
1011402-90 = "R-Really? Then..."
1011402-91 = "Could I bother you for something, Sensei?"
1011402-92 = "[s] \"Please, anytime.\""
1011402-93 = "Then...I'll help myself and sit...right next to you!"
1011402-98 = "Once again, hello, Sensei."
1011402-99 = "[s] \"Must be hard work, here in the cafe.\""
1011402-100 = "Well, it is hard, but it's also fun."
1011402-101 = "And it's a different kind of fun than the work I do with the School Lunch Club."
1011402-102 = "Sometimes I have to think about what I should serve first."
1011402-103 = "Most of the customers here enjoy sweets, so that's what I recommend for them."
1011402-104 = "Then, later on, they'll likely be in the mood for a drink that can wash down the sweetness."
1011402-105 = "But some of the customers just want drinks like black coffee, so I need to keep aware."
1011402-106 = "It can also be fun to try to read the customer and recommend them items from the menu, when they're having trouble deciding what they want."
1011402-107 = "Usually, I recommend something from the page they seem to linger on the most. That tends to work."
1011402-108 = "Customers who drink a lot of water before they order are usually pretty thirsty...so when I recommend a refreshing drink, they seem receptive to that."
1011402-109 = "The easiest ones are the customers with the growling stomachs!"
1011402-110 = "What else... Oh, right! It's also a big perk to be able to try all the latest menu items myself."
1011402-111 = "They're adding this drink with a mix of peaches and green grapes, with coconut jelly on top. They haven't settled on a name for it yet."
1011402-112 = "When I tried it, it felt like a good combination of smooth sweetness, refreshing taste, and the texture of the coconut jelly, all working in harmony!"
1011402-113 = "And also..."
1011402-115 = "As I listened to Juri, I lost track of time."
1011402-117 = "All right it's clock-out time! Good work, everyone!"
1011402-118 = "Yeah, great work!"
1011402-119 = "Yes, thank you for your hard work!"
1011402-120 = "[ns] \"Good work today, Juri. You did great.\""
1011402-121 = "S-Sensei? I, uh... Thank you for the kind words."
1011402-122 = "You really meant them? Th-Then thank you even more..."
1011402-123 = "That reminds me. From what I've seen of your performance here...I think you can handle it, Juri."
1011402-124 = "Hmm? Handle what?"
1011402-125 = "Nothing other than..."
1011402-126 = "...the Waitress of the Month competition! You'll take it by storm!"
1011402-127 = "...What? What even is that?"
1011402-128 = "A competition to determine the most competent, charming waitress in the neighborhood."
1011402-129 = "The cafe with the winning waitress always becomes a hot spot!"
1011402-130 = "N-N-N-N-No, Manager! That's way too much! Yeah! Too much!"
1011402-131 = "[ns] \"You don't want to give it a shot?\""
1011402-132 = "...I'm not sure. Um...one second. Let me think about it."
1011402-133 = "..."
1011402-134 = "I mean, I'm not completely against...the idea."
1011402-135 = "But I'm worried about what I could even do to compete..."
1011402-136 = "[s3] \"Let's try it out together. I'll do my best to help you!\"\n[s4] \"Why not just do what you did today?\""
1011402-139 = "See? Even you're getting into it, Sensei."
1011402-143 = "..."
1011402-144 = "Ummm...!!"

[translation]
1011402-1 = "ความสนุกของพนักงานเสิร์ฟ"
1011402-2 = "(ระหว่างที่คุณครูเดินทางไปที่คาเฟ่ตามที่จูริบอก...)"
1011402-6 = "อ๊ะ คุณครู! เชิญค่ะ!"
1011402-7 = "[s] \"สวัสดี จูริ! ออกมาทำอะไรข้างหน้าเหรอ?\""
1011402-8 = "อ่า... เรื่องนั้น... น่ะค่ะ"
1011402-9 = "แหะๆๆ ที่จริงฉันเห็นว่าคุณครูกำลังเดินมาจากไกลๆ ค่ะ ฉันก็เลย..."
1011402-10 = "อ๊ะ นี่ไม่ใช่เวลาจะมาคุยแบบนี้อยู่สิ รีบเข้าไปข้างในกันเถอะค่ะ"
1011402-12 = "ถ้างั้น... 'คุณลูกค้าคะ' จะรับอะไรดีคะ?"
1011402-13 = "[s1] \"ขอกาแฟแนะนำของคาเฟ่นี้!\"\n[s2] \"ถึงจะกลัวน้ำหนักขึ้น แต่ขอเป็นพาร์เฟต์แล้วกัน!\""
1011402-14 = "อยากดื่มกาแฟสินะคะ ร้านเรามีกาแฟให้เลือก 2 แบบ ทั้งร้อนและเย็นเลยค่ะ"
1011402-15 = "จะรับแบบไหนดีคะ?"
1011402-16 = "ค่ะ เข้าใจแล้วค่ะ ให้ใส่นมกับไซรัปมากแค่ไหนคะ?"
1011402-17 = "ได้ค่ะ รับออเดอร์ค่ะ ช่วยรอสักครู่นะคะ"
1011402-18 = "ค่ะ รับเป็นพาร์เฟต์นะคะ? ได้ค่ะ"
1011402-19 = "รับเป็นพาร์เฟต์ช็อกโกเชอร์รีด้วยมั้ยคะ เชอร์รี่ตามฤดูกาลตอนนี้กำลังอร่อยเลยค่ะ"
1011402-20 = "ขอบคุณค่ะ! พาร์เฟต์ช็อกโกเชอร์รีเป็นเมนูที่มีขายแค่ในช่วงนี้เท่านั้นค่ะ"
1011402-21 = "เรามีท็อปปิ้งเป็นชีสเค้กชิ้นเล็กๆ ให้ด้วย ทานให้อร่อยนะคะ"
1011402-23 = "(คุณครูเอร็ดอร่อยกับเมนูที่จูรินำมาเสิร์ฟ พลางดูจูริทำงานในร้านไปด้วย)"
1011402-24 = "(และเพื่อไม่ให้เป็นการเสียมารยาทต่อคาเฟ่ คุณครูก็สั่งอย่างอื่นมาเพิ่มอีก...)"
1011402-27 = "ตายจริง ทำยังไงดีล่ะเนี่ย? น้ำตาลไอซิ่งดันมาหมดซะได้!"
1011402-28 = "คะ? น้ำตาลไอซิ่งเหรอคะ...? ลองไปดูที่ร้านสะดวกซื้อใกล้ๆ ก่อนมั้ยคะ?"
1011402-33 = "วันนี้น้ำตาลไอซิ่งขายหมดเกลี้ยงเลยงั้นเหรอคะ...?"
1011402-34 = "มะ... ไม่เป็นไรค่ะ! ถ้าไม่มี งั้นเราก็ทำขึ้นมาเองก็ได้ค่ะ ถ้าอยากได้น้ำตาลไอซิ่ง ก็แค่บดน้ำตาลให้ละเอียด แล้วผสมแป้งลงไปเล็กน้อย..."
1011402-35 = "ทำยังไงดีล่ะ จูริ? ทั้งน้ำตาล ทั้งแป้ง ทุกอย่างไม่มีเหลือเลย..."
1011402-36 = "ร้านสะดวกซื้อบอกว่าต้องรอจนถึงพรุ่งนี้เช้ากว่าสินค้าจะมาเติมสต็อก แต่ว่าเราต้องใช้น้ำตาลไอซิ่ง#nตอนนี้เลยน่ะสิ!"
1011402-37 = "นะ... นั่นสิคะ ทำยังไงดีล่ะ...?"
1011402-43 = "คุณผู้จัดการร้านคะ! เราลองไปร้านขายยากันเถอะค่ะ!"
1011402-44 = "หืม? ทำไมถึงจะไปร้านขายยาล่ะ?"
1011402-45 = "ไปซื้อลูกอมน้ำตาลกลูโคสค่ะ!"
1011402-47 = "ถ้าเราบดลูกอมน้ำตาลกลูโคส แล้วเอามาปั่นให้เป็นผงละเอียดๆ..."
1011402-52 = "ต้องได้แน่ๆ ค่ะ คุณผู้จัดการร้าน! เราใช้ลูกอมแทนน้ำตาลไอซิ่งได้ค่ะ!"
1011402-53 = "ถึงผงน้ำตาลกลูโคสจะละลายง่ายกว่าน้ำตาลทั่วไป"
1011402-54 = "และมีเนื้อสัมผัสที่เย็นสดชื่นเป็นเอกลักษณ์จนลูกค้าอาจจะสังเกตได้..."
1011402-55 = "แต่มันก็ดีกว่าไม่มีเลยค่ะ!"
1011402-57 = "คะ? ต้องทำแซนด์วิชเนยถั่วแดง แต่ว่าไม่มีเนยงั้นเหรอคะ?"
1011402-58 = "ถ้างั้นก็... ใช่แล้วค่ะ! ใช้ครีมชีสแทนเนยดูมั้ยคะ?"
1011402-59 = "ถึงรสเปรี้ยวอันเป็นเอกลักษณ์ของครีมชีสจะหลงเหลืออยู่บ้าง..."
1011402-60 = "แต่ทั้งครีมชีสและเนยก็มีรสชาติที่นุ่มลิ้นและกลมกล่อมเหมือนกันค่ะ!"
1011402-61 = "มันก็เป็นความคิดที่ดีอยู่หรอกนะ แต่ว่าครีมชีสของเราก็มีเหลืออยู่ไม่เท่าไร...!"
1011402-62 = "งะ... งั้นเหรอคะ? งั้นทำยังไงดีล่ะ... อ้อ!"
1011402-63 = "คุณผู้จัดการร้านคะ! มีนมกับวิปปิ้งครีมมั้ยคะ?"
1011402-64 = "ถ้าเป็นนมกับวิปปิ้งครีม ก็น่าจะมีเหลืออยู่นะ?"
1011402-65 = "งั้นก็อาจจะแก้ปัญหาได้ค่ะ! ฉันจะบอกวิธีให้เองค่ะ!"
1011402-66 = "ขั้นแรกให้เอานมไปอุ่น จากนั้นก็ใส่วิปปิ้งครีมแล้วอุ่นต่ออีกหน่อย..."
1011402-67 = "แล้วถ้าใส่น้ำเลมอนลงไป ชั้นครีมกับโปรตีนก็จะแยกตัวกันค่ะ"
1011402-68 = "แล้วถ้าเราตักชั้นครีมนั้นออกมา ก็ใช้เป็นครีมชีสทดแทนได้ค่ะ!"
1011402-69 = "เข้าใจแล้ว! งั้นจะลองทำดูนะ!"
1011402-71 = "......"
1011402-72 = "คุณผู้จัดการร้านคะ! ขนมปังอันนี้ไม่สดเลยค่ะ!"
1011402-73 = "จะ... จริงเหรอ?! แต่ได้ยินว่าเป็นขนมปังอบใหม่เมื่อเช้านี้เลยนะ...?"
1011402-74 = "ถ้าเป็นขนมปังหมักจากซาวโดวจ์ที่อบใหม่ในวันนั้น จะต้องมีกลิ่นเอทานอลอ่อนๆ"
1011402-75 = "แต่ขนมปังอันนี้ไม่มีกลิ่นแบบนั้นเลยสักนิดค่ะ! ลองติดต่อร้านขนมปังดูนะคะ"
1011402-76 = "อะ... อื้ม งั้นฉันจะลองติดต่อดู!"
1011402-79 = "เป็นอย่างที่จูริว่าเลย... ขนมปังที่เราได้มาคือของที่อบไว้เมื่อ 2 วันก่อน..."
1011402-80 = "งั้นเหรอคะ..."
1011402-81 = "เฮ้อ สงสัยต้องเปลี่ยนซัพพลายเออร์แล้วละ แต่จะว่าไป จูริมีสายตาที่เฉียบแหลมมากเลยนะ!"
1011402-82 = "มะ... ไม่ถึงขนาดนั้นหรอกค่ะ..."
1011402-83 = "[ns] \"ใช่แล้วละ จูริเก่งเรื่องการจัดการวัตถุดิบอาหารที่สุดแล้ว\""
1011402-84 = "คุณครูก็เป็นไปกับเขาด้วยเหรอคะ?!"
1011402-86 = "เมื่อกี้ฉันงานยุ่งจนหัวหมุนเลย แต่ตอนนี้ได้พักหายใจบ้างแล้วค่ะ..."
1011402-87 = "ปกติร้านจะเงียบหลังจากช่วงพีคของวันแบบนี้ละค่ะ เอ่อ... คุณครูคะ? มานั่งอยู่ที่คาเฟ่นานๆ แบบนี้#nไม่เบื่อเหรอคะ?"
1011402-88 = "คะ? คุณครูเอาแต่ดูฉันทำงาน ก็เลยไม่เบื่องั้นเหรอคะ? คะ... คำพูดแบบนั้น... ได้ยินแล้ว... น่าดีใจมากเลยค่ะ แหะๆๆ..."
1011402-89 = "จูริ ไปพักสักหน่อยเถอะ วันนี้ทำงานได้ดีมากเลย!"
1011402-90 = "งะ... งั้นเหรอคะ? ถ้างั้น..."
1011402-91 = "ฉันขอเสียมารยาทหน่อย... ได้มั้ยคะ? คุณครู?"
1011402-92 = "[s] \"ได้สิ เชิญเลย\""
1011402-93 = "ถ้างั้น... ฉันขอไปนั่งข้างๆ... นะคะ!"
1011402-98 = "สวัสดีอีกครั้งค่ะ คุณครู"
1011402-99 = "[s] \"งานที่คาเฟ่เหนื่อยมั้ย?\""
1011402-100 = "อืม... บางครั้งก็เหนื่อย แต่มันก็สนุกดีค่ะ"
1011402-101 = "การทำงานพาร์ทไทม์ในคาเฟ่ให้ความสนุกที่ต่างจากการทำงานของชมรมโภชนาการน่ะค่ะ"
1011402-102 = "อย่างเช่น พอทำงานที่นี่แล้วก็จะได้ประเมินว่าควรเสิร์ฟอะไรก่อนดี"
1011402-103 = "ลูกค้าส่วนใหญ่ที่มาที่ร้านมักจะมาทานของหวานๆ กัน ฉันก็เลยจะแนะนำเมนูของหวานให้ก่อน"
1011402-104 = "แล้วหลังจากนั้น ถ้าแนะนำเครื่องดื่มที่มีรสขมปนมาล้างปาก ลูกค้าก็จะชอบกันค่ะ"
1011402-105 = "แต่ฉันก็ต้องแยกแยะให้ดีด้วยค่ะ เพราะลูกค้าบางคนจะดื่มแต่กาแฟดำเท่านั้น"
1011402-106 = "แล้วในตอนที่ลูกค้าตัดสินใจเลือกเมนูไม่ได้ การสังเกตสีหน้าท่าทางของพวกเขาและแนะนำเมนูให้ก็#nเป็นเรื่องสนุกค่ะ"
1011402-107 = "ในกรณีนั้น ถ้าสังเกตจากสายตาของลูกค้าที่จับจ้องกระดาษเมนูนานๆ ก็จะพอรู้ได้ค่ะ"
1011402-108 = "ลูกค้าที่เข้ามาแล้วดื่มน้ำก่อนสั่งคือลูกค้าที่คอแห้ง... ถ้าฉันแนะนำเครื่องดื่มที่สดชื่นให้ พวกเขา#nก็จะชอบค่ะ"
1011402-109 = "บางครั้งก็จะมีลูกค้าที่หิวจนท้องร้องให้ได้ยินด้วย ถ้าเจอแบบนั้นก็ง่ายเลยค่ะ!"
1011402-110 = "แล้วก็... ใช่ค่ะ! การให้ลูกค้าลองเมนูใหม่ของคาเฟ่ก่อนก็ดีเหมือนกันค่ะ"
1011402-111 = "เมนูใหม่ล่าสุดของเราคือเครื่องดื่มที่ทำจากลูกพีชและองุ่นเขียว แล้วก็ราดด้วยเยลลี่มะพร้าว ถึงแม้จะยังคิดชื่อเมนูไม่ได้ก็เถอะค่ะ"
1011402-112 = "มันเป็นเครื่องดื่มที่ผสมผสานความหวานหอมของลูกพีช ความสดชื่นขององุ่นเขียว และเนื้อสัมผัสที่นุ่มหนึบหนับของเยลลี่มะพร้าวได้เป็นอย่างดีเลยค่ะ"
1011402-113 = "ยังไม่หมดแค่นี้นะคะ..."
1011402-115 = "(คุณครูฟังเรื่องราวของจูริจนลืมเวลา...)"
1011402-117 = "ได้เวลาเลิกงานแล้ว! ทุกคนทำได้ดีมาก!"
1011402-118 = "ขอบคุณที่ทำงานหนักค่ะ!"
1011402-119 = "ค่ะ! ขอบคุณที่ทำงานหนักนะคะ!"
1011402-120 = "[ns] \"ทำได้ดีมากเลยนะ จูริ เก่งมากเลย\""
1011402-121 = "คะ... คุณครู? อ่า... ค่ะ ถึงจะเป็นการแกล้งชม แต่ก็ขอบคุณนะคะ"
1011402-122 = "ไม่ได้แกล้งชมกันงั้นเหรอคะ? ถะ... ถ้างั้นฉันก็ยิ่ง..."
1011402-123 = "ถูกต้องแล้วละ ฉันเองก็เฝ้าดูการทำงานของจูริอยู่... ถ้าเป็นจูริละก็ ต้องทำได้อย่างแน่นอนเลย"
1011402-124 = "คะ? ทำอะไร... เหรอคะ?"
1011402-125 = "ที่ฉันพูดถึงก็คือ..."
1011402-126 = "ในการแข่งขันพนักงานเสิร์ฟในคาเฟ่ประจำเดือนนี้ จูริน่าจะทำให้ทุกคนประหลาดใจได้เลยน่ะสิ!"
1011402-127 = "คะ...? การแข่งขันที่ว่าคืออะไรเหรอคะ?"
1011402-128 = "เป็นการแข่งขันที่เฟ้นหาพนักงานเสิร์ฟดีเด่นที่สุดของคาเฟ่ในย่านนี้เหรอคะ?"
1011402-129 = "แล้วคาเฟ่ที่มีพนักงานเสิร์ฟที่ชนะการแข่งขัน ก็จะได้เป็นคาเฟ่ที่มีชื่อเสียงของเขตนี้ได้เลย?"
1011402-130 = "มะ... มะมะมะมะ... ไม่ดีกว่าค่ะ คุณผู้จัดการร้าน! ฉันไม่ไหวหรอกค่ะ! ต้องไม่ไหวแน่เลยค่ะ! "
1011402-131 = "[ns] \"ไม่อยากลงแข่งขันเหรอ?\""
1011402-132 = "ฉันก็ไม่ค่อยแน่ใจค่ะ... อ่า... สักครู่นะคะ... ฉันขอเวลาคิดหน่อยค่ะ"
1011402-133 = "......"
1011402-134 = "ไม่ใช่ว่าฉันไม่อยากทำอย่างเด็ดขาดเลยหรอกนะคะ..."
1011402-135 = "แต่ฉันก็กังวลว่าตัวเองจะไปทำอะไรได้บ้าง..."
1011402-136 = "[s3] \"งั้นก็ลงแข่งเถอะ ครูจะช่วยอย่างสุดความสามารถเลย!\"\n[s4] \"ทำให้ดีอย่างที่ทำวันนี้ก็พอแล้วละ!\""
1011402-139 = "เห็นมั้ยล่ะ ขนาดคุณครูยังแนะนำให้ไปแข่งเลย!"
1011402-143 = "......"
1011402-144 = "คะ????!"

[translation]
1011402-1 = "服務生的快樂"
1011402-2 = "（根據茱莉所說的地址，來到咖啡廳時……）"
1011402-6 = "啊，老師！歡迎光臨！"
1011402-7 = "[s]「嗨，茱莉！你怎麼在外面？」"
1011402-8 = "啊，因為……"
1011402-9 = "耶嘿嘿。#n其實我遠遠就看到老師走過來了，所以……"
1011402-10 = "啊，現在不是說這些的時候。#n快請進吧！"
1011402-12 = "那麼……這位「客人」，請問您要點什麼呢？"
1011402-13 = "[s1]「到咖啡廳當然要點咖啡囉！」\n[s2]「雖然有點擔心變胖，但我要點一份百匯！」"
1011402-14 = "想喝咖啡的話，我們有冰咖啡和熱咖啡。"
1011402-15 = "請問要哪一種呢？"
1011402-16 = "嗯，好的。需要為您準備牛奶和糖漿嗎？"
1011402-17 = "好的。謝謝您的點餐，請稍等。"
1011402-18 = "好的，要百匯是嗎？沒問題。"
1011402-19 = "現在正好是櫻桃的產季，要不要試試看巧克力櫻桃百匯呢？"
1011402-20 = "謝謝！巧克力櫻桃百匯是期間限定的餐點哦。"
1011402-21 = "還有迷你起司蛋糕作為配料，請您放輕鬆慢慢享用。"
1011402-23 = "（就這樣一邊享受茱莉呈上的餐點，一邊觀察茱莉努力工作的樣子）"
1011402-24 = "（過程中為了避免造成咖啡廳的困擾，時不時會加點一些別的東西……）"
1011402-27 = "天啊，怎麼辦？糖粉用完了！"
1011402-28 = "嗯？糖粉是嗎……？#n先去附近的超市看看吧！"
1011402-33 = "今天糖粉全部賣光了……？"
1011402-34 = "沒，沒關係！賣光的話也可以自己做。#n糖粉其實只是把砂糖磨細，再混合一點澱粉……"
1011402-35 = "怎麼辦，茱莉同學？#n他們說砂糖和澱粉也都賣光了……"
1011402-36 = "得等到明天才會補貨，但我們現在就急需糖粉啊！"
1011402-37 = "就，就是說呀。該怎麼辦呢……？"
1011402-43 = "經理！我們去藥局看看吧！"
1011402-44 = "嗯？去藥局做什麼？"
1011402-45 = "去購買葡萄糖的糖果！"
1011402-47 = "只要把葡萄糖糖果搗碎，再用攪拌機打成細粉……"
1011402-52 = "成功了，經理！#n這樣應該就可以代替糖粉了！"
1011402-53 = "雖然葡萄糖粉的融化溫度低於砂糖……"
1011402-54 = "不過這也讓它帶有獨特的清爽口感，味蕾敏銳的客人可能會察覺到差異……"
1011402-55 = "但總比什麼都沒有好！"
1011402-57 = "咦？要做紅豆奶油三明治，結果奶油用完了？"
1011402-58 = "那麼……對了！用奶油起司代替奶油如何？"
1011402-59 = "雖然奶油起司特有的酸味，會稍微殘留在食物裡……"
1011402-60 = "不過以濃厚香濃這一點來說，兩者是共通的！"
1011402-61 = "這的確是個好主意，但奶油乳酪剛好也快用光了……！"
1011402-62 = "是，是嗎？那怎麼辦……啊！"
1011402-63 = "經理！還有牛奶和鮮奶油嗎？"
1011402-64 = "牛奶和鮮奶油嗎？還有很多庫存。"
1011402-65 = "那說不定行得通！我來說明一下方法！"
1011402-66 = "把牛奶加熱之後，放入鮮奶油……"
1011402-67 = "接著加入檸檬汁，讓乳脂層和乳清分離。"
1011402-68 = "把乳脂層撈起來後，就能做出奶油乳酪的替代品了！"
1011402-69 = "知道了！我來試試看！"
1011402-71 = "……"
1011402-72 = "經理！這個麵包不新鮮！"
1011402-73 = "真，真的嗎！？#n可是那明明是今天早上才烤好的新鮮麵包啊……？"
1011402-74 = "使用酵母發酵的麵包如果是當天製作的話，應該會帶有一絲酒精的香氣。"
1011402-75 = "但是這個麵包卻完全沒有酒香！#n麻煩請打電話確認一下！"
1011402-76 = "嗯，嗯。#n我來聯絡看看！"
1011402-79 = "茱莉同學說的沒錯……他們送來的是兩天前剩下的庫存……"
1011402-80 = "這樣啊……"
1011402-81 = "唉，是不是該換間供應商了啊……#n不過話又說回來，茱莉同學真的很敏銳呢！"
1011402-82 = "沒，沒有啦，我實在承擔不起……"
1011402-83 = "[ns]「在食材管理方面，茱莉的實力是無人能敵的哦。」"
1011402-84 = "怎麼連老師都說這種話！？"
1011402-86 = "剛剛還忙得暈頭轉向，現在突然安靜下來了呢……"
1011402-87 = "尖峰時間過後通常都是這樣。#n那個……老師？你一直待在咖啡廳，不覺得無聊嗎？"
1011402-88 = "咦？忙著看我工作，所以沒時間覺得無聊？#n那，那個……能聽見老師這麼說，我真的很開心。耶嘿嘿……"
1011402-89 = "茱莉同學？可以稍微休息一下囉。#n你今天真是太厲害了！"
1011402-90 = "是，是嗎？#n那麼……"
1011402-91 = "可以打擾你一下嗎，老師？"
1011402-92 = "[s]「當然可以。請坐。」"
1011402-93 = "那麼……我就不客氣地……坐在老師旁邊囉！"
1011402-98 = "打擾了，老師。"
1011402-99 = "[s]「咖啡廳的工作會不會很辛苦？」"
1011402-100 = "唔嗯……當然會有辛苦的時候，不過還挺愉快的。"
1011402-101 = "在咖啡廳打工時的樂趣，和供給部的工作有點不太一樣。"
1011402-102 = "比如要判斷先上什麼餐點給客人比較好。"
1011402-103 = "通常來咖啡廳的客人都會想吃甜食，所以我基本上會先推薦甜點。"
1011402-104 = "接著再推薦能解膩的微苦飲料，客人大多都很買單。"
1011402-105 = "不過也有人只點黑咖啡這類的飲料，所以還是需要用心分辨。"
1011402-106 = "還有，當客人猶豫不決的時候，觀察客人的反應來推薦餐點也很有趣。"
1011402-107 = "這種時候，觀察客人的視線停留在什麼餐點上比較久，推薦那個就大致不會出錯。"
1011402-108 = "點餐前就一直喝水的客人，多半是因為口渴……所以最好推薦他們清涼爽口的飲料。"
1011402-109 = "偶爾也會遇到肚子咕嚕咕嚕叫的客人，那就更簡單了！"
1011402-110 = "還有……對了！能先搶先嘗試咖啡廳的新品項也很不錯。"
1011402-111 = "最近的新品是混合桃子和綠葡萄，再加上椰果的飲料。#n不過品名還在構思中就是了。"
1011402-112 = "水蜜桃的柔和香甜搭配青葡萄的清新爽口，配上QQ的椰果簡直棒極了！"
1011402-113 = "還有……"
1011402-115 = "（聽著茱莉說話，不知不覺時間就過去了……）"
1011402-117 = "下班時間到囉！大家辛苦了！"
1011402-118 = "辛苦了！"
1011402-119 = "嗯！大家都辛苦了！"
1011402-120 = "[ns]「辛苦了，茱莉。你真的很專業呢。」"
1011402-121 = "老，老師？老師願意這麼說，我就已經很感謝了。"
1011402-122 = "不是客套話？那，那就更……"
1011402-123 = "沒錯。我其實也一直在觀察……如果是茱莉同學的話，一定能做得到的。"
1011402-124 = "咦？做得到……什麼呢？"
1011402-125 = "如果是茱莉同學的話……"
1011402-126 = "一定能在這個月的「服務生選拔大會」上驚豔所有人！"
1011402-127 = "……嗯？那是什麼活動？"
1011402-128 = "是從這個地區的咖啡廳中，選出最優秀、最受歡迎的服務生的比賽？"
1011402-129 = "只要贏得這場比賽，服務生所屬的咖啡廳也會成為地區名店？"
1011402-130 = "不，不不不不，不行啦，經理！#n我辦不到！完全沒辦法！"
1011402-131 = "[ns]「你完全不想參加嗎？」"
1011402-132 = "……我也不是很清楚。#n唔嗯……請讓我思考一下。"
1011402-133 = "……"
1011402-134 = "好像也不是……完全不想參加。"
1011402-135 = "可是我覺得自己什麼都做不好，實在很擔心……"
1011402-136 = "[s3]「那就一起努力試試看吧，我也會盡力幫忙！」\n[s4]「真的沒有頭緒的話，只要照今天的表現去做就行了！」"
1011402-139 = "你看，連老師都開口了哦？"
1011402-143 = "……"
1011402-144 = "咦咦咦咦咦！？"

[translation]
1011402-1 = "#title;웨이트리스의 즐거움"
1011402-2 = "#na;(주리의 말대로 카페를 찾은 때였다…….)"
1011402-3 = "#st;[0,0];instant;1;"
1011402-4 = "#clearST"
1011402-5 = "#wait;1800"
1011402-6 = "3;주리 아르바이트;11;아, 선생님! 어서 오세요!\n#3;hophop\n#3;em;[재잘]\n#3;a"
1011402-7 = "[s] \"안녕, 주리! 무슨 일로 나와 있었어?\""
1011402-8 = "3;주리 아르바이트;02;아, 그거…… 요?"
1011402-9 = "3;주리 아르바이트;12;에헤헤. 사실은 멀리에서 선생님이 오시는 게 보였거든요. 그래서…….\n#3;em;[///]"
1011402-10 = "3;주리 아르바이트;04;아, 이럴 때가 아니네요. 어서 안으로 들어오세요!\n#3;em;[!]\n#3;m4"
1011402-11 = "#all;hide"
1011402-12 = "3;주리 아르바이트;01;그러면…… '손님'. 주문은 무엇으로 하시겠습니까?\n#3;em;[반응]\n#3;a"
1011402-13 = "[s1] \"카페의 정석인 커피로!\"\n[s2] \"살찌는 것이 조금 걱정이지만, 파르페!\""
1011402-14 = "3;주리 아르바이트;02;커피 말씀이시군요. 아이스 커피와 따듯한 커피, 두 가지가 준비되어 있습니다만."
1011402-15 = "3;주리 아르바이트;12;어느 쪽으로 하시겠어요?\n#3;em;[?]"
1011402-16 = "3;주리 아르바이트;01;네. 알겠습니다. 우유와 시럽은 어느 정도로 준비해 드릴까요?"
1011402-17 = "3;주리 아르바이트;11;알겠습니다. 주문받았습니다. 잠시만 기다려 주세요.\n#3;em;[음표]"
1011402-18 = "3;주리 아르바이트;01;네. 파르페로 하시겠어요? 알겠습니다."
1011402-19 = "3;주리 아르바이트;02;마침 제철인 체리가 들어간, 초코 체리 파르페는 어떠신가요?\n#3;em;[?]"
1011402-20 = "3;주리 아르바이트;12;감사합니다! 초코 체리 파르페는 기간 한정 메뉴여서."
1011402-21 = "3;주리 아르바이트;11;작은 치즈 케이크를 토핑해 드리고 있으니, 편하게 즐겨 주세요.\n#3;em;[음표]"
1011402-22 = "#all;hide"
1011402-23 = "#na;(그렇게, 주리가 가져다준 메뉴를 즐기며 주리가 일하는 모습을 관찰했다.)"
1011402-24 = "#na;(중간중간 카페 측에 실례가 되지 않도록, 추가 메뉴를 덤으로 주문해 가면서…….)"
1011402-25 = "#all;hide"
1011402-26 = "3;주리 아르바이트;01\n#3;a\n#wait;1500"
1011402-27 = "3;주리 아르바이트;01\n#na;카페 매니저;세상에, 어쩌면 좋아? 슈가 파우더가 다 떨어졌어!"
1011402-28 = "3;주리 아르바이트;02;네? 슈가 파우더가요……? 우선 근처 마트로 가 보죠!\n#3;em;[!]"
1011402-29 = "#st;[0,0];instant;1;"
1011402-30 = "#clearST"
1011402-31 = "3;주리 아르바이트;02\n#3;dr\n#wait;700"
1011402-32 = "#all;hide"
1011402-33 = "3;주리 아르바이트;04;……하필이면 오늘 슈가 파우더가 전부 매진이라고요……?\n#3;a\n#3;em;[?]"
1011402-34 = "3;주리 아르바이트;09;괘, 괜찮아요! 없으면, 만들면 되니까요. 슈가 파우더는 결국 설탕을 곱게 간 다음, 전분을 약간 섞으면 되는 거니까…….\n#3;stiff"
1011402-35 = "3;주리 아르바이트;09\n#na;카페 매니저;어떡하지, 주리 양? 설탕도 전분도, 모두 떨어졌대……."
1011402-36 = "3;주리 아르바이트;09\n#na;카페 매니저;물건들이 재입고되려면 내일까지는 기다려야 한다는데, 우리는 지금 당장 슈가 파우더가 필요해!"
1011402-37 = "3;주리 아르바이트;04;그, 그러게요. 어떡하죠……?"
1011402-38 = "#st;[0,0];instant;1;"
1011402-39 = "#clearST"
1011402-40 = "3;주리 아르바이트;04"
1011402-41 = "#wait;500"
1011402-42 = "3;주리 아르바이트;05\n#3;shake\n#wait;1500"
1011402-43 = "3;주리 아르바이트;12;매니저님! 우리, 약국으로 가 봐요!\n#3;em;[!]\n#3;closeup"
1011402-44 = "3;주리 아르바이트;12\n#3;closeup\n#na;카페 매니저;응? 약국에는 왜?"
1011402-45 = "3;주리 아르바이트;03;포도당 캔디를 구입하는 거예요!\n#3;closeup"
1011402-46 = "#all;hide"
1011402-47 = "3;주리 아르바이트;01;포도당 캔디를 빻고, 한 번 더 블렌더로 갈아서 고운 가루를 만들면…….\n#3;a\n#3;em;[...]"
1011402-48 = "#st;[0,0];instant;1;"
1011402-49 = "#clearST"
1011402-50 = "3;주리 아르바이트;01\n#3;greeting\n#wait;1000"
1011402-51 = "3;주리 아르바이트;01\n#3;greeting\n#wait;1000"
1011402-52 = "3;주리 아르바이트;12;됐어요, 매니저님! 이걸로 어떻게든 슈가 파우더 대신 사용할 수 있을 거예요!\n#3;em;[반응]"
1011402-53 = "3;주리 아르바이트;02;물론 포도당 가루는 설탕보다 더 낮은 온도에서 쉽게 녹고."
1011402-54 = "3;주리 아르바이트;02;식감도 특유의 청량함과 시원함이 있어서 민감하신 손님들은 알아차릴 수도 있겠지만……."
1011402-55 = "3;주리 아르바이트;11;그래도, 없는 것보다는 낫겠죠!\n#3;em;[!]"
1011402-56 = "#all;hide"
1011402-57 = "3;주리 아르바이트;04;네? 앙버터 샌드를 만들어야 하는데, 버터가 다 떨어졌다고요?\n#3;a\n#3;em;[?]"
1011402-58 = "3;주리 아르바이트;12;그러면…… 그래요! 버터 대신 크림치즈를 사용하면 어떨까요?"
1011402-59 = "3;주리 아르바이트;99;물론 크림치즈 특유의 새콤한 맛이 약간 남아 있긴 하겠지만……."
1011402-60 = "3;주리 아르바이트;03;눅진하고 고소한 맛이라는 점에서는, 양쪽 모두 공통점이 있으니까요!\n#3;em;[반응]"
1011402-61 = "3;주리 아르바이트;03\n#na;카페 매니저;좋은 생각이긴 한데, 크림치즈도 마침 남은 게 별로 없어……!"
1011402-62 = "3;주리 아르바이트;04;그, 그래요? 그러면 어떡하죠……. 아!\n#3;em;[땀]"
1011402-63 = "3;주리 아르바이트;02;매니저님! 우유와 생크림 있나요?"
1011402-64 = "3;주리 아르바이트;02\n#na;카페 매니저;그거라면 제법 재고가 있는데?"
1011402-65 = "3;주리 아르바이트;01;그걸로 어떻게든 될지도 몰라요! 제가 방법을 말씀드릴게요!"
1011402-66 = "3;주리 아르바이트;02;우선 우유를 데운 다음, 생크림을 넣고 한층 더 가열하고요……."
1011402-67 = "3;주리 아르바이트;02;거기에 레몬즙을 섞으면, 크림층과 유청이 분리되거든요?"
1011402-68 = "3;주리 아르바이트;12;그 크림층을 걷어내면 크림치즈의 대용품을 만들 수 있을 거예요!\n#3;em;[!]"
1011402-69 = "3;주리 아르바이트;12\n#na;카페 매니저;알았어! 해 볼게!"
1011402-70 = "#all;hide"
1011402-71 = "3;주리 아르바이트;05;…….\n#3;a\n#3;em;[...]"
1011402-72 = "3;주리 아르바이트;09;매니저님! 이 빵, 신선하지가 않아요!\n#3;closeup"
1011402-73 = "3;주리 아르바이트;09\n#na;카페 매니저;저, 정말이야?! 분명 오늘 아침에 구운 신선한 빵이라고 했는데……?\n#3;closeup"
1011402-74 = "3;주리 아르바이트;02;사워도우를 사용한 발효빵은, 당일 만든 신선한 것이라면 아주 희미한 에탄올 향이 나야 해요.\n#3;closeup"
1011402-75 = "3;주리 아르바이트;05;하지만 이 빵에서는 조금도 그런 향이 나지 않아요! 한 번 연락해 보세요!\n#3;closeup"
1011402-76 = "3;주리 아르바이트;05\n#na;카페 매니저;으, 응. 그렇게 할게!\n#3;closeup"
1011402-77 = "#all;hide"
1011402-78 = "3;주리 아르바이트;01\n#3;a\n#wait;1500"
1011402-79 = "3;주리 아르바이트;01\n#na;카페 매니저;주리 양의 말대로였어……. 이틀 전에 남은 재고를 배달한 거였대……."
1011402-80 = "3;주리 아르바이트;02;그런가요……."
1011402-81 = "3;주리 아르바이트;02\n#na;카페 매니저;하아, 공급처를 바꿔야 하려나. 그것보다 눈썰미가 대단하네, 주리 양!"
1011402-82 = "3;주리 아르바이트;04;아, 아니에요. 제가 무슨…….\n#3;em;[땀]"
1011402-83 = "[ns] \"물론이죠. 주리는 식재료 관리에 있어서는 최강입니다.\""
1011402-84 = "3;주리 아르바이트;08;선생님까지 왜 그러세요?!\n#3;em;[///]\n#3;stiff"
1011402-85 = "#all;hide"
1011402-86 = "3;주리 아르바이트;02;그렇게 정신없었는데, 지금은 조용하네요…….\n#3;a\n#3;em;[...]"
1011402-87 = "3;주리 아르바이트;02;피크 타임이 끝나면, 보통 이래요. 저…… 선생님? 카페에 계속 계셨는데, 심심하지 않으셨어요?"
1011402-88 = "3;주리 아르바이트;12;네? 저를 지켜보느라 그럴 틈이 없으셨다고요? 그, 그건…… 뭔가…… 엄청나게, 기쁜 말씀이네요. 에헤헤…….\n#3;em;[///]"
1011402-89 = "3;주리 아르바이트;12\n#na;카페 매니저;주리 양? 조금 쉬어도 될 것 같아. 오늘 정말 잘해 줬어!"
1011402-90 = "3;주리 아르바이트;02;그, 그런가요? 그러면……."
1011402-91 = "3;주리 아르바이트;01;실례, 해도 괜찮을까요. 선생님?\n#3;em;[?]"
1011402-92 = "[s] \"어서 오시죠. 환영합니다.\""
1011402-93 = "3;주리 아르바이트;11;그러면…… 사양하지 않고, 옆자리에…… 앉겠습니다!\n#3;em;[!]"
1011402-94 = "#st;[0,0];instant;1;"
1011402-95 = "#clearST"
1011402-96 = "3;주리 아르바이트;11\n#3;d\n#wait;1500"
1011402-97 = "3;주리 아르바이트;01\n#3;a\n#3;closeup\n#wait;1500"
1011402-98 = "3;주리 아르바이트;12;다시 한번, 안녕하세요. 선생님.\n#3;em;[하트]\n#3;closeup"
1011402-99 = "[s] \"카페 일 힘들지 않았어?\""
1011402-100 = "3;주리 아르바이트;02;음……. 힘든 면도 있지만, 즐겁기도 해요.\n#3;closeup"
1011402-101 = "3;주리 아르바이트;99;카페 아르바이트에는, 급양부 일과는 약간 다른 방향의 재미가 있거든요.\n#3;closeup"
1011402-102 = "3;주리 아르바이트;01;가령 어떤 것을 먼저 서빙하는 것이 좋은지를 가늠해 보는 게 있어요.\n#3;em;[반응]\n#3;closeup"
1011402-103 = "3;주리 아르바이트;01;보통 카페에 방문하시는 손님들은 단 것을 찾는 분들이 많으니까, 단 것을 먼저 추천해 드린 다음.\n#3;closeup"
1011402-104 = "3;주리 아르바이트;02;입가심을 할 수 있는 쌉쌀한 음료를 나중에 권해 드리면 좋아하시거든요.\n#3;closeup"
1011402-105 = "3;주리 아르바이트;09;하지만 그냥 블랙 커피같이, 스트레이트한 음료만을 시키는 분도 있으므로 잘 구분해야 하지만요.\n#3;em;[땀]\n#3;closeup"
1011402-106 = "3;주리 아르바이트;01;그리고 또, 손님이 좀처럼 메뉴를 정하지 못하고 있을 때, 손님의 기색을 살피고 메뉴를 추천해 드리는 것도 재미있어요.\n#3;closeup"
1011402-107 = "3;주리 아르바이트;99;그럴 때는 보통 손님의 시선이 오래 머무는 메뉴판 페이지를 참고하면 대충 맞아요.\n#3;closeup"
1011402-108 = "3;주리 아르바이트;11;주문 전에 물을 계속 마시는 손님은, 목이 말라서 그런 경우가 많으니까…… 청량한 음료를 추천해 드리면 좋아하시고요.\n#3;em;[...]\n#3;closeup"
1011402-109 = "3;주리 아르바이트;99;가끔 꼬르륵 소리를 내는 손님이 계시는데, 그건 정말로 쉽죠!\n#3;closeup\n#fontsize;50"
1011402-110 = "3;주리 아르바이트;03;그리고 또…… 맞아요! 카페 신메뉴를 먼저 먹어 볼 수 있다는 것도 좋은 것 같아요.\n#3;em;[!]\n#3;closeup"
1011402-111 = "3;주리 아르바이트;01;최근의 메뉴는 복숭아와 청포도를 섞은 뒤, 코코넛 젤리를 띄운 음료였어요. 아직 메뉴 이름은 구상 중이지만요.\n#3;closeup"
1011402-112 = "3;주리 아르바이트;03;복숭아의 부드러운 단맛과 청포도의 청량한 맛, 그리고 말캉하게 씹히는 코코넛 젤리가 정말 잘 어우러지는 음료였어요!\n#3;closeup\n#3;em;[재잘]"
1011402-113 = "3;주리 아르바이트;01;그리고 또 있잖아요…….\n#3;closeup"
1011402-114 = "#all;hide"
1011402-115 = "#na;(주리의 이야기를 듣느라, 시간 가는 줄 몰랐다…….)"
1011402-116 = "#all;hide"
1011402-117 = "#na;카페 매니저;퇴근 시간이야! 모두 수고했어!"
1011402-118 = "#na;아르바이트생들;수고하셨습니다!"
1011402-119 = "3;주리 아르바이트;11;네! 수고하셨습니다!\n#3;em;[반응]\n#3;a"
1011402-120 = "[ns] \"고생 많았어, 주리. 정말 잘하더라.\""
1011402-121 = "3;주리 아르바이트;04;서, 선생님? 그, 네. 말씀만이라도, 감사합니다.\n#3;em;[///]"

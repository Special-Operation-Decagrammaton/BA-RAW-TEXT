41140-76 = "5;통신 카이저 영업사원;01\n#5;em;…\n#wait;2500"
41140-77 = "5;통신 카이저 영업사원;01;저…… 대단히 죄송합니다만, 지금 당사에서 보유하고 있는 무기의 재고가 마침 다 떨어져서요."
41140-78 = "3;모에;04;뭐어? 그 많은 무기가 전부 팔려버렸다고?\n#3;shake\n#3;em;[?!]"
41140-79 = "5;통신 카이저 영업사원;01;예. 며칠 전에 익명의 고객님이 저희가 보유하고 있는 무기를 전부 구입해 가셨습니다."
41140-80 = "3;모에;05;누가 그 많은 무기를 전부 구입했는데?\n#3;em;[반응]\n#3;m2"

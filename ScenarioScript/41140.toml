41140-82 = "5;통신 카이저 영업사원;01;그건…… 기업 비밀입니다."
41140-83 = "5;통신 카이저 영업사원;01;VVIP님께서도 저희가 귀하의 구매 기록을 여기저기에 누출시킨다면 곤란하시지 않겠습니까?"

[translation]
41140-1 = "Episode 14; The Barter System"
41140-2 = "Moe, do you have a solution for our supply issues?"
41140-3 = "W-We have no money, and n-no way of making some."
41140-4 = "Did you call yourself the \"supplies expert\"? Is this the same person who wasted all of our ammunition to make some stupid fireworks?"
41140-6 = "You have no eye for art! Ammunition is never a waste in pursuit of the beauty of explosions. It was an essential sacrifice!"
41140-7 = "Do you want me to bail us out, or not? The wonderful person that I am, I can get us supplies without spending a cent."
41140-8 = "[s] \"I really can't just stand by while you rob a bank.\""
41140-9 = "How could you suggest something so awful?"
41140-10 = "SRT Academy exists to protect the citizens. We would never engage in such behavior."
41140-11 = "Sensei, do you think so little of me?"
41140-12 = "My tip-top secret for supplies acquisition is..."
41140-14 = "The barter system!"
41140-15 = "People've been bartering for things they want since before we could talk."
41140-16 = "And so, easy peezy lemon squeezy, we'll trade off our valuable items for new and wonderful incendiaries...and weapons."
41140-18 = "The problem with your plan lies in the fact that we have no valuables."
41140-19 = "We have expired yakiniku bentos..."
41140-20 = "Are you a dummy? You think we're trading with those hypocrite monks?"
41140-21 = "What we do have is the missiles and bombs at the outskirts of camp. My babies."
41140-22 = "I can't believe I'm suggesting selling off my precious babies...even if they're water-damaged."
41140-23 = "But my bleeding heart will live knowing that a caring owner will love them the way I did. And then my beautiful, splendid babies will be detonated like they deserve."
41140-24 = "[s] \"It always ends in them being blown up...\""
41140-26 = "I agree those are very expensive explosives, but they're also very broken ones. How are we going to sell them?"
41140-27 = "Am I not literally this squad's unit supply specialist? I got connections you can't even dream of."
41140-28 = "Just to name one..."
41140-29 = "My little friend, Kaiser Industries is a subsidiary of Kaiser Group, and they're the big guns for weapons in the Black Market. Heehee, get it? They sell to hard-up mercenaries who'll take anything they can get."
41140-30 = "So, if anyone's gonna take good care of my rusty little babies, it's Kaiser Industries."
41140-31 = "And, voila! In return, I get you your ammunition and guns from Kaiser itself!"
41140-32 = "I...I'm in shock. Moe came up with a really good idea."
41140-33 = "Was there something in the bento you ate yesterday? That must be it."
41140-34 = "I'll make you go ka-boom faster than you can say rabbit!"
41140-38 = "Well then, would you like to see the expert at work?"
41140-45 = "Greetings! Kaiser Industries, the leading purveyor of top-tier firearms. How may I help you?"
41140-46 = "Long time no talk, buddy!"
41140-47 = "It's SRT Academy's supply manager. Heehee."
41140-48 = "Our VIP client!"
41140-49 = "Greetings! What a pleasure to speak with you again!"
41140-50 = "How can I help you today? We have some brand new missiles I think you would love."
41140-51 = "Or... Oh, dear! Were there any issues with the cluster bomb you purchased? I would be glad to assist you with that as well."
41140-52 = "...Moe. Did he just say cluster bomb?"
41140-53 = "A girl's gotta do what she's gotta do, right?"
41140-54 = "I used my own money, not SRT budget! And it was for personal reasons!"
41140-55 = "[s] \"Saying it was for personal reasons makes it even more suspicious.\""
41140-56 = "Actually, I wasn't looking to buy anything today."
41140-57 = "I was hoping to sell."
41140-58 = "Sell? Well, we don't usually allow purchases from our sales line."
41140-59 = "But our VIP clients have special privileges! What was it you were hoping to sell?"
41140-60 = "I hope you're ready, you might blow your circuits. I've got loads of state-of-the-art stuff, stuff you won't be able to find anywhere else."
41140-61 = "Infrared image-guided anti-aircraft missiles, scalable cluster grenades, remote-controlled anti-tank rockets..."
41140-62 = "That is quite the list of rare weaponry! You're sure you're willing to sell them?"
41140-63 = "I know, I know. The deal of the century! Imagine how your boss would praise you. There's a small matter of a little rust, but you know how it is with the humid weather."
41140-64 = "[s] \"It's not a little.\""
41140-65 = "(Shut up, Sensei! I'm trying to make a deal here!)"
41140-66 = "Well, such special equipment is always in demand. This is a little outside of protocol, but I suppose..."
41140-67 = "Very well. I accept."
41140-68 = "Is the same account we have on file still correct for payment?"
41140-69 = "Ah, so you see, I've unfortunately been running into some issues with my account."
41140-70 = "It should be resolved soon, but until then I was hoping to be paid in weapons and ammo instead."
41140-71 = "...Weapons? Ammo?"
41140-72 = "I didn't stutter! I'm willing to let go of anti-aircraft missiles for a bunch of measly guns. Strong ones, of course."
41140-73 = "Or if you have, you know, thermo-pressure grenades, or white phosphorus smoke grenades! *pant* *pant*"
41140-77 = "While I would love to assist you, we unfortunately just recently sold our entire stock of weapons."
41140-78 = "Whaaat?! The entire stock?"
41140-79 = "Yes. An...anonymous customer recently bought us out."
41140-80 = "Who on earth would buy that much firepower? Why?"
41140-81 = "The only reason you would need that much is to go to war!"
41140-82 = "I...cannot tell you that."
41140-83 = "As a VIP client, you must understand. You would be rather upset if we divulged your private purchase history, no?"
41140-84 = "Well, they all know about the cluster bombs now...but yeah..."
41140-85 = "I'm terribly sorry, but let's pretend this exchange never happened."
41140-86 = "I do hope we have more fruitful dealings in the future!"
41140-91 = "What in the world... What psychotic world do we live in that Kaiser Industries just...has no more weapons? What has this society come to?"
41140-93 = "More importantly. Moe. When and how did you become a VIP client at Kaiser Industries?"
41140-94 = "I KNEW there were discrepancies with missing inventory in the squad's supply ledger... You told me I was crazy..."
41140-95 = "M-Moe... I don't want you to go to j-jail...!"
41140-97 = "W-Wait a second! Can you guys go back to being worried about supplies?"
41140-98 = "Don't sweat the small details!"
41140-99 = "Kaiser Industries might have let me down, but you know what never does? Second-hand auctions! I already made a post, so just wait for the buyers to come rolling in!"
41140-100 = "Who's going to buy all that crazy equipment at some second-hand auction.?"
41140-101 = "You may be an uncultured neophyte, but underestimating these auctions will be your first and final mistake!"
41140-102 = "Look! A message! I told you it wouldn't let me down!"
41140-108 = "...Wait, seriously?"
41140-110 = "Next Episode; A Small but Certain Failure"

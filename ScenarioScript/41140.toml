[translation]
41140-1 = "#title;제14화;물물교환"
41140-2 = "1;사키 헬멧;02\n3;미유ND;01\n5;미야코;02;모에, 지금의 보급 문제를 해결할 좋은 방법이라도 있는 건가요?\n#5;em;[?]\n#1;a\n#3;a\n#5;a"
41140-3 = "3;미유ND;02;하지만 지금의 우리에겐 보급품을 살 돈은커녕, 돈을 입금할 수 있는 계좌조차도 없는걸……."
41140-4 = "1;사키 헬멧;12;……해결책이라니. 불꽃놀이를 하느라 1개 포대의 탄약을 앞뒤 생각도 없이 통째로 날려 먹은 사람이 할 소리야?\n#1;em;…"
41140-5 = "#all;hide"
41140-6 = "3;모에;05;날려 먹다니! 다시 말하지만 그때의 불꽃놀이는 중대 사항이었거든?\n#3;hophop\n#3;a"
41140-7 = "3;모에;02;여하튼! 돈이 없어도 보급품을 구할 방법은 충분히 있어."
41140-8 = "[s] \"설마 은행을 털…….\""
41140-9 = "5;사키 헬멧;02;무슨 흉흉한 소리를 하는 거야?\n#5;em;[?]\n#3;m1\n#5;al"
41140-10 = "5;미야코;05;시민의 안전을 지켜야 할 SRT 대원들이 은행을 털다니, 있을 수 없는 일입니다."
41140-11 = "3;모에;05;그런 정신 나간 방법을 제안할 리가 없잖아.\n#3;em;[반응]"
41140-12 = "3;모에;07;내가 말하려고 했던 방법은……"
41140-13 = "#all;hide"
41140-14 = "3;모에;05;바로 물물교환이야!\n#3;em;[!]\n#3;closeup\n#fontsize;100"
41140-15 = "3;모에;02;물물교환은 인류의 가장 고전적인 거래 방식이라고도 하잖아?\n#3;closeup"
41140-16 = "3;모에;03;그러니까 우리가 갖고 있는 귀한 물건을 건네주고, 대금으로 멀쩡한 무기와 탄약을 받아오는 거야!\n#3;greeting\n#3;em;[반짝]\n#3;closeup"
41140-17 = "#all;hide"
41140-18 = "1;모에;03\n5;미야코;02;저희가 갖고 있는 귀한 물건이라면……\n#5;em;…"
41140-19 = "5;미유ND;01;……유통기한 지난 야키니쿠 도시락?"
41140-20 = "1;모에;05;……그걸 누가 사 간다고 팔아? <소확행>?\n#1;em;[빠직]\n#1;m3\n#5;dr"
41140-21 = "1;모에;02;내가 교환하려고 하는 물건은 캠프 외곽에 방치된 대량의 미사일과 폭탄들이야."
41140-22 = "1;모에;06;비록 비를 맞아 못 쓰게 되었다지만, 자식 같은 폭탄들을 팔아치우려니 마음속으로는 피눈물이 나지만…….\n#1;em;[속상함]\n#1;stiff"
41140-23 = "1;모에;02;못 쓰는 상태로 저렇게 내버려 두느니, 차라리 좋은 주인을 찾아주어서 좋은 곳에서 폭발시키는 게 좋겠다는 생각도 들어서."
41140-24 = "[s] \"역시 폭발시키는 게 목적이구나……\""
41140-25 = "#all;hide"
41140-26 = "3;모에;02\n5;미야코;02;하지만 아무리 비싼 미사일과 폭탄이라 해도 대부분이 고장 나고 녹이 슬었는데, 그걸 제값에 사줄 사람이 있을까요?\n#5;em;[?]\n#5;al\n#3;m1"
41140-27 = "3;모에;03;그건 걱정하지 마. 내게는 오랜 보급계원 업무를 통해 쌓은 인맥이 있으니까.\n#3;em;[음표]"
41140-28 = "3;모에;02;예를 들자면……"
41140-29 = "3;모에;09;블랙마켓을 통해 무기를 주로 거래하는 카이저 그룹의 자회사, <카이저 인더스트리>에는 중고 무기를 구입하고 싶어 하는 가난한 용병들의 연락이 끊이질 않지."
41140-30 = "3;모에;03;그 <카이저 인더스트리>라면 필요한 사람들에게 이 녹슨 미사일들을 판매할 수 있을 거야.\n#3;greeting\n#3;em;[반짝]"
41140-31 = "3;모에;02;그리고 그 대가로 카이저 그룹에서 생산하는 괜찮은 품질의 무기를 공급받을 수도 있고!"
41140-32 = "5;사키 헬멧;02;오오, 모에답지 않은 똑똑한 발상인데.\n#5;stiff"
41140-33 = "5;사키 헬멧;03;어제 먹은 나폴리탄 도시락에 무슨 문제라도 있었던 거 아니야?\n#5;em;[?]"
41140-34 = "3;모에;05;시끄러워. 폭파시켜버린다!\n#3;hophop"
41140-35 = "#st;[0,0];instant;1;"
41140-36 = "#clearST"
41140-37 = "3;모에;02\n#3;m3\n#5;dr\n#wait;1200"
41140-38 = "3;모에;03;자, 그럼 어서 영업소에 전화를 걸어볼까?\n#3;em;[음표]"
41140-39 = "#st;[0,0];instant;1;"

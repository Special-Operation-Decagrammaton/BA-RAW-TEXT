41140-44 = "5;통신 카이저 영업사원;00\n#5;a\n#3;m1\n#wait;1500"
41140-45 = "5;통신 카이저 영업사원;01;네. 언제나 최고 품질의 화기를 공급해드리는 <카이저 인더스트리>입니다. 무엇을 도와드릴까요?\n#5;em;[반짝]"
41140-46 = "3;모에;00;아, 오랜만이야!\n#3;em;[반응]"
41140-47 = "3;모에;03;나야, 나. 저번에 연락했던 그 SRT 학원의 보급 담당인데……."
41140-48 = "5;통신 카이저 영업사원;01;앗…… 그때의 VVIP 고객님이시군요!\n#5;em;[!]"
41140-49 = "5;통신 카이저 영업사원;01;다시 모시게 되어 정말 영광입니다!\n#5;greeting"
41140-50 = "5;통신 카이저 영업사원;01;혹시 이번에도 새로운 미사일을 구입하시려는 건가요?"
41140-51 = "5;통신 카이저 영업사원;01;아니면 설마 지난번에 구입해가신 클러스터 폭탄에 뭔가 문제라도……?\n#5;em;[?]"
41140-52 = "1;미야코;10;……모에. 언제 그런 걸 구매한 거죠?\n#1;em;…\n#1;ar\n#3;m3"
41140-53 = "3;모에;04;고, 공금으로 구매한 거 아니거든?\n#3;em;[땀]\n#3;stiff"
41140-54 = "3;모에;05;그 폭탄은 사비로 구입한 물건이라고! 지극히 사적인 목적으로 구입한 거야!"
41140-55 = "[s] \"사적인 목적의 폭탄이 더 수상한데…….\""
41140-56 = "3;모에;02;여하튼 오늘은 무언가를 구매하고 싶어서 연락한 게 아니야.\n#3;em;[반응]\n#3;m1\n#1;dl"
41140-57 = "3;모에;03;무기를 팔고 싶어."
41140-58 = "5;통신 카이저 영업사원;01;판매요? 저희 영업소에서는 매입은 보통 하고 있지 않습니다만…….\n#5;em;[?]"
41140-59 = "5;통신 카이저 영업사원;01;하지만 VVIP님의 의뢰니, 일단 어떤 물건을 팔고자 하시는지 들어볼 수 있을까요?"
41140-60 = "3;모에;09;들으면 깜짝 놀랄걸? 총포상이나 편의점에서도 구하기 힘든 고급 무기가 잔뜩 있다고.\n#3;em;[///]"
41140-61 = "3;모에;03;……적외선 영상 유도식 대공 미사일이랑 위력 조절용 집속 수류탄, 원격 발사가 가능한 대전차 로켓……"
41140-62 = "5;통신 카이저 영업사원;01;정말이십니까? 그런 구하기 힘든 장비들을 저희에게 파시겠다고요?\n#5;em;[땀]"
41140-63 = "3;모에;02;응. 물론 습기 때문에 조금 녹슨 부분이 있기는 하지만……."
41140-64 = "[s] \"조금이 아니잖아.\""
41140-65 = "3;모에;05;(시끄러워, 선생님! 거래를 방해하지 말라고!)\n#3;em;[빠직]\n#fontsize;50"
41140-66 = "5;통신 카이저 영업사원;01;그런 특수 장비의 매매라면 언제나 수요가 있으니 거절할 이유가 없지요."
41140-67 = "5;통신 카이저 영업사원;01;좋습니다. 거래를 받아들이도록 하겠습니다.\n#5;em;[반짝]\n#5;greeting"
41140-68 = "5;통신 카이저 영업사원;01;그럼 대금은 어떻게 처리해 드리면 좋을까요? 지난번의 계좌로 이체해 드리면 될까요?"
41140-69 = "3;모에;06;그게…… 그 계좌는 지금 사정이 있어서 사용할 수가 없어서…….\n#3;em;[땀]"
41140-70 = "3;모에;03;대신 대금을 무기와 탄약으로 대신 받을 수 없을까?"
41140-71 = "5;통신 카이저 영업사원;01;……무기요?\n#5;em;[?]"
41140-72 = "3;모에;02;응응. 조금 가격은 싸더라도 위력은 괜찮은 무기들이 있잖아."
41140-73 = "3;모에;08;발사관에 끼울 수 있는 열압력탄이라든가, 백린 연막탄이라든가……! 하아, 하아…….\n#3;em;[///]\n#3;stiff"

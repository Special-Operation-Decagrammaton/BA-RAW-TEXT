[translation]
41140-1 = "第14話;以物易物"
41140-2 = "萌，你有什麼好方法嗎？"
41140-3 = "但，但是現在的我們，錢和帳戶都……"
41140-4 = "……話說最一開始，瘋狂浪費彈藥的就是你啊。"
41140-6 = "不不不，我有說過那是必要的時機啊！"
41140-7 = "總之，又不是沒有錢就沒辦法補充。"
41140-8 = "[s] 「該不會要搶銀行……」"
41140-9 = "哈啊？你在說什麼？"
41140-10 = "必須守護市民安全的SRT，怎麼可能去當銀行強盜。"
41140-11 = "才不是那種頭腦壞掉的想法呢，"
41140-12 = "我想說的是……"
41140-14 = "以物易物！"
41140-15 = "嘛，也算是某種回歸原點的古典交易方法。"
41140-16 = "交出我們持有的貴重物品，收下等價的武器和彈藥。"
41140-18 = "說到「我們持有的貴重物品」……"
41140-19 = "……燒肉便當？賞味期限到了耶……"
41140-20 = "那種東西誰也不會買吧。真要說的話只有那個「所確幸」。"
41140-21 = "不是那些，而是大量的導彈和炸彈啦。"
41140-22 = "雖然浸水報廢了，不過也不代表沒有價值。"
41140-23 = "雖然是斷腸之痛，但它們能找到更好的主人也比較好吧。"
41140-24 = "[s] 「原來如此……？」"
41140-26 = "不過會有人買嗎？雖然原本是高價品，但現在幾乎都故障或生鏽了……"
41140-27 = "嘛，那方面就交給我吧。我有人脈。"
41140-28 = "例如，我想想……"
41140-29 = "在黑市經手武器的「凱薩工業」。#n那邊的傭兵們對二手武器的需求是源源不絕。"
41140-30 = "那裡的話就算是這種生鏽導彈，也會有人能找出什麼用途吧。"
41140-31 = "作為交換，我們可以收下凱薩集團品質還不錯的武器！"
41140-32 = "嘿～以萌來說算是很正常的想法了嘛。"
41140-33 = "身體沒事嗎？難道昨天的拿波里便當吃壞肚子了？"
41140-34 = "吵死啦！？"
41140-38 = "總之，撥電話給營業所看看吧。"
41140-45 = "您好，這裡是提供最高品質武器的「凱薩工業」。請問有什麼事呢？"
41140-46 = "嗨嗨，好久不見！"
41140-47 = "是我啦，是我。之前也買了很多東西的，SRT特殊學園補給擔當。"
41140-48 = "那，那個時候的VVIP……！？"
41140-49 = "久疏問候了！"
41140-50 = "請問這次也需要新的導彈嗎？"
41140-51 = "還是說以前購買的集束炸彈有什麼問題嗎……？"
41140-52 = "……萌，你什麼時候買了那種東西？"
41140-53 = "呀，那個，反正不是學園的錢？"
41140-54 = "只是私人用的炸彈！是自費的所以沒問題！"
41140-55 = "[s] 「『私人用的炸彈』是什麼……？」"
41140-56 = "總，總之……"
41140-57 = "今天不是要買，而是要賣才聯絡的。"
41140-58 = "要賣嗎……？本店基本上對於買進業務……"
41140-59 = "不過也不能什麼都不聽就拒絕呢。可以先請教原因嗎？"
41140-60 = "這個嘛……其實我手上有一些在便利商店買不到的高級裝備。"
41140-61 = "像是誘導式對空導彈、可以調節威力的集束手榴彈、可以遠端操作的反戰車火箭……"
41140-62 = "什，什麼……您願意把那些賣給我們嗎？"
41140-63 = "嗯，雖然有點生鏽了……不過應該沒問題吧。"
41140-64 = "[s] 「……有點？」"
41140-65 = "（老師，Shut up！！）"
41140-66 = "如果是那種特殊的東西，我想需求應該要多少有多少……"
41140-67 = "好的，我們很樂意接受。"
41140-68 = "順帶一提款項部分，和以前一樣匯入同一個帳戶就可以了嗎？"
41140-69 = "啊……其實那個帳戶出了點問題，現在沒辦法使用……"
41140-70 = "不收現金，用實物如何？"
41140-71 = "實物是指……？"
41140-72 = "稍微便宜點的東西就可以了，我想要高火力的武器。"
41140-73 = "空爆燃燒彈、白磷彈之類的……哈啊，哈啊……！"
41140-77 = "其，其實，非常抱歉……目前武器的庫存都賣光了……"
41140-78 = "……咦，平常明明有那麼多？全沒了？"
41140-79 = "是的……其實前幾天，被匿名的客人全部買下了。"
41140-80 = "什……是打算在奇普托斯展開戰爭嗎？"
41140-81 = "是誰買那麼大量的……"
41140-82 = "這部分我實在沒辦法回答……"
41140-83 = "不好意思，這是對顧客們的保密政策……"
41140-84 = "這，這倒也是……"
41140-85 = "那麼雖然很遺憾，這次的交易就當作沒發生過……"
41140-86 = "如果還有其他事情的話，隨時歡迎聯絡！"
41140-91 = "這，這什麼莫名其妙的狀況……害人期待落空了……"
41140-93 = "話說萌，你什麼時候變成凱薩工業的VVIP了啊。"
41140-94 = "這樣想起來，以前有很多細項計算對不上，該不會……"
41140-95 = "萌醬……會因為貪汙罪被逮捕……？"
41140-97 = "那，那不是現在該說的事吧！？"
41140-98 = "總之現在補給的事比較重要……！"
41140-99 = "反，反正也不是只有「凱薩工業」這條人脈！還有中古拍賣之類的，買家要多少都有！"
41140-100 = "這種東西會有人特地在拍賣會買嗎？"
41140-101 = "別小看拍賣會！最近的拍賣會除了武器和彈藥，從駭客機器到蔬菜什麼都能入手！"
41140-102 = "肯定現在也有，請讓我買炸彈的訊息──"
41140-108 = "……嗚哇，還真的有。"
41140-110 = "下一話;小而確實的敗北"

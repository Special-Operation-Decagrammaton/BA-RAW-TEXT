[translation]
41140-1 = "ตอนที่ 14;แลกเปลี่ยนสินค้า"
41140-2 = "โมเอะมีวิธีดีๆ ที่จะแก้ปัญหาเรื่องของใช้เหรอคะ?"
41140-3 = "แต่เราไม่มีเงินซื้อข้าวของเครื่องใช้เลยนะคะ บัญชีให้ฝากเงินก็ไม่มีด้วย..."
41140-4 = "วิธีแก้ปัญหางั้นเหรอ... คนที่จุดดอกไม้ไฟจนกระสุนหมดไปเป็นกระสอบเนี่ยนะจะหาวิธีแก้ปัญหา?"
41140-6 = "จะทำไม่ได้หรือไง!? อีกอย่างนะ ตอนนั้นดอกไม้ไฟมันเป็นสิ่งจำเป็นต้องทำต่างหาก!"
41140-7 = "เอาเถอะ! ถึงจะไม่มีเงิน แต่เราก็มีวิธีหาของใช้มาได้"
41140-8 = "[s] \"อย่าบอกนะว่าจะไปปล้นธนาคาร...?\""
41140-9 = "พูดอะไรของคุณครูน่ะ?"
41140-10 = "สมาชิกกองทหารจาก SRT ที่ต้องรักษาความสงบของพลเมืองไม่มีทางไปปล้นธนาคารหรอกค่ะ"
41140-11 = "ใครจะไปเสนอให้ทำอะไรบ้าๆ แบบนั้นล่ะ"
41140-12 = "วิธีที่ฉันจะเสนอ..."
41140-14 = "ก็คือการแลกเปลี่ยนสิ่งของต่างหากล่ะ!"
41140-15 = "การแลกเปลี่ยนคือวิธีการซื้อขายที่คลาสสิกที่สุดของมนุษยชาติ!"
41140-16 = "เพราะงั้นเราจะใช้ของมีค่าที่เรามีไปแลกกระสุนกับอาวุธมาใช้"
41140-18 = "ของมีค่าที่เรามี..."
41140-19 = "ข้าวกล่องหน้าเนื้อย่างที่หมดอายุ...?"
41140-20 = "ใครจะไปอยากได้ของแบบนั้นกันล่ะ...? แก๊ง <ความสุขเล็กๆ> รึไง?"
41140-21 = "สิ่งที่ฉันจะเอาไปแลกก็คือมิสไซล์กับระเบิดจำนวนมากที่อยู่ในชายขอบของค่ายเราต่างหาก"
41140-22 = "ถึงจะใช้แทบไม่ได้แล้วเพราะโดนฝน แต่พอคิดว่าต้องขายระเบิดที่ฉันรักเหมือนลูก น้ำตาก็เหมือนจะ#nไหลออกมาเป็นสายเลือดเลย..."
41140-23 = "แต่ถึงปล่อยเอาไว้เฉยๆ ก็ไม่มีประโยชน์อยู่ดี สู้ให้ไปอยู่กับเจ้าของดีๆ แล้วไประเบิดในที่ที่ดีกว่านี้น่าจะ#nดีกว่า..."
41140-24 = "[s] \"สุดท้ายเป้าหมายคืออยากให้เกิดระเบิดสินะ...\""
41140-26 = "แต่ถึงจะเป็นระเบิดกับมิสไซล์ราคาแพง แต่ส่วนมากมันก็เสียหายและขึ้นสนิมแล้ว แบบนี้จะมีใครเอา#nของมาแลกอย่างสมราคาเหรอคะ?"
41140-27 = "เรื่องนั้นไม่ต้องห่วงหรอก ฉันมีคอนเน็กชั่นมากมายจากการทำปฏิบัติการจัดหาอาวุธยุทธภัณฑ์อยู่น่ะ"
41140-28 = "ยกตัวอย่างเช่น..."
41140-29 = "<ไคเซอร์ อินดัสทรี> ที่เป็นบริษัทลูกของไคเซอร์กรุ๊ป พวกนี้จะเอาอาวุธมือสองมาขายให้กับทหาร#nรับจ้างที่ไม่ค่อยมีเงินแต่อยากได้อาวุธไว้ใช้"
41140-30 = "ฉันว่าต้องมีคนที่อยากซื้อมิสไซล์ขึ้นสนิมจาก <ไคเซอร์ อินดัสทรี> บ้างล่ะ"
41140-31 = "และพวกเราก็จะรับอาวุธคุณภาพดีที่ไคเซอร์กรุ๊ปผลิตเป็นของตอบแทน!"
41140-32 = "โอ้ เป็นแผนการที่ฉลาด ไม่สมกับเป็นโมเอะเลยนะ"
41140-33 = "ข้าวกล่องนาโปลิตันที่กินไปเมื่อวานมีอะไรผสมเข้าไปด้วยหรือเปล่าเนี่ย?"
41140-34 = "หนวกหูน่า เดี๋ยวก็จุดระเบิดซะเลยนี่!"
41140-38 = "เอาล่ะ งั้นเราโทรหาสำนักงานพวกนั้นกันเลย"
41140-45 = "นึกถึงอาวุธคุณภาพสูงสุด นึกถึง <ไคเซอร์ อินดัสทรี> สวัสดีครับ ติดต่อเรื่องอะไรครับ?"
41140-46 = "อ๊ะ! ไม่ได้คุยกันนานเลย!"
41140-47 = "นี่ฉันเอง เจ้าหน้าที่ฝ่ายเสบียงของสถาบัน SRT ที่เคยติดต่อมาคราวก่อน..."
41140-48 = "อ๊ะ! คุณลูกค้า VIP ท่านนั้นสินะครับ!"
41140-49 = "เป็นเกียรติอย่างยิ่งที่ได้บริการอีกครั้งเลยละครับ!"
41140-50 = "ครั้งนี้ก็จะมาซื้อมิสไซล์รุ่นใหม่อีกเหรอครับ?"
41140-51 = "หรือว่าระเบิดคลัสเตอร์ที่ซื้อไปคราวก่อนมีปัญหาอะไร...?"
41140-52 = "โมเอะ... ไปซื้ออะไรแบบนั้นมาเมื่อไหร่คะ?"
41140-53 = "ฉะ... ฉันไม่ได้เอาเงินส่วนกลางไปซื้อสักหน่อย"
41140-54 = "ฉันเอาเงินส่วนตัวซื้อมาต่างหาก! ซื้อมาใช้เป็นวัตถุประสงค์ส่วนตัว!"
41140-55 = "[s] \"ซื้อมาใช้เพื่อวัตถุประสงค์ส่วนตัว... แปลกกว่าเดิมอีก\""
41140-56 = "เอาเถอะ วันนี้ฉันไม่ได้ติดต่อมาเพราะอยากซื้ออะไรหรอก"
41140-57 = "ฉันอยากขายอาวุธน่ะ"
41140-58 = "ขายเหรอครับ? ปกติสำนักงานของเราไม่รับซื้อของหรอกนะครับ..."
41140-59 = "แต่ไหนๆ ก็เป็นลูกค้า VIP งั้นขอฟังรายละเอียดของของที่จะขายหน่อยแล้วกันครับ"
41140-60 = "รับรองว่าได้ฟังแล้วจะต้องตกใจเลยแหละ ฉันมีอาวุธชั้นยอดมากมายที่หาซื้อไม่ได้จากพ่อค้าปืน#nหรือร้านสะดวกซื้ออยู่ด้วยนะ"
41140-61 = "ทั้งขีปนาวุธนำวิถีด้วยอินฟาเรด ระเบิดแสงปรับอานุภาพ แล้วก็จรวดพิฆาตรถถังที่ยิงจากระยะไกลได้"
41140-62 = "พูดจริงหรือเปล่าครับ? จะขายอาวุธหายากพวกนั้นให้เราเหรอครับ?"
41140-63 = "อื้ม แต่มันขึ้นสนิมนิดหน่อยเพราะความชื้นน่ะ..."
41140-64 = "[s] \"นั่นไม่เรียกว่านิดหน่อยนะ\""
41140-65 = "(หนวกหูน่าคุณครู! คนจะขายของ อย่ามารบกวนสิ!)"
41140-66 = "ถ้าเป็นอาวุธพิเศษขนาดนั้นละก็ เราก็ไม่มีเหตุผลให้ปฏิเสธหรอกครับ"
41140-67 = "เราจะรับซื้อไว้เองครับ"
41140-68 = "เรื่องการชำระเงินเอายังไงดีครับ? ให้โอนเงินเข้าบัญชีเดิมเลยไหมครับ?"
41140-69 = "เรื่องนั้น... พอดีฉันติดปัญหานิดหน่อยเลยใช้บัญชีนั้นไม่ได้แล้ว..."
41140-70 = "ขอรับเงินเป็นอาวุธกับกระสุนแทนจะได้รึเปล่าล่ะ?"
41140-71 = "อาวุธเหรอครับ?"
41140-72 = "อื้ม อาวุธอานุภาพปานกลางที่ไม่ต้องแพงมากก็ได้"
41140-73 = "อย่างเช่น ระเบิดสุญญากาศที่เอาใส่ท่อตอร์ปิโดได้ หรือไม่ก็ระเบิดควัน…! แฮ่ก... แฮ่ก..."
41140-77 = "คือ... ต้องขออภัยด้วยนะครับ ตอนนี้อาวุธในคลังของเราหมดพอดีเลยครับ"
41140-78 = "ว่าไงนะ? ขายอาวุธที่มีตั้งเยอะนั่นไปหมดแล้วเหรอ?"
41140-79 = "ใช่ครับ เมื่อไม่กี่วันก่อนมีลูกค้านิรนามมาขอซื้ออาวุธที่เรามีไปจนเกลี้ยงเลยครับ"
41140-80 = "กว้านซื้อไปหมดเลยงั้นเหรอ?"
41140-81 = "นี่ใครคิดจะก่อสงครามในคิโวทอสหรือไง?"
41140-82 = "มันเป็น... ความลับทางการค้าครับ..."
41140-83 = "คุณลูกค้า VIP เองก็คงไม่อยากให้ข้อมูลซื้อขายอาวุธกับเรารั่วไหลออกไปเหมือนกันใช่ไหมครับ?"
41140-84 = "อึก... มันก็ใช่อยู่หรอก..."
41140-85 = "น่าเสียดายนะครับ การซื้อขายในครั้งนี้คงต้องยกเลิกไปก่อนครับ"
41140-86 = "หวังว่าจะได้ให้บริการในครั้งต่อไปนะครับ!"
41140-91 = "ทำยังไงดี... ใครจะไปคิดว่าอาวุธในคลังของไคเซอร์ อินดัสทรีจะโดนกว้านซื้อไปหมดแบบนี้..."
41140-93 = "โมเอะ ตอนนี้ฉันสงสัยแล้วละว่าเธอไปเป็นลูกค้า VIP ของไคเซอร์ อินดัสทรีตั้งแต่เมื่อไรกัน"
41140-94 = "จะว่าไปที่ผ่านมาก็มีสิ่งของจำเป็นหายออกไปจากคลังอย่างน่าสงสัยอยู่นะ..."
41140-95 = "โมเอะจัง... แบบนี้ก็ต้องโดนจับข้อหายักยอกของส่วนกลางน่ะสิ..."
41140-97 = "ดะ... เดี๋ยวก่อน! ตอนนี้เรื่องเสบียงมันสำคัญกว่าไม่ใช่เหรอ?"
41140-98 = "อย่าไปสนใจเรื่องเล็กน้อยแบบนั้นเลยน่า!"
41140-99 = "ถึงการซื้อขายกับไคเซอร์ อินดัสทรีจะไม่สำเร็จ แต่ฉันก็ตั้งขายไว้ในตลาดของมือสองเผื่อไว้แล้ว เดี๋ยวก็มีคนสนใจซื้อเองแหละ!"
41140-100 = "ใครจะมาซื้อของแพงๆ แบบนี้ในตลาดของมือสองกันล่ะ!"
41140-101 = "อย่าดูถูกตลาดของมือสองนะ! ในนั้นมีสินค้าตั้งแต่กับข้าวถุงยันอุปกรณ์การแฮ็กเลยนะ!"
41140-102 = "ดูสิๆ อาจจะมีข้อความจากคนที่อยากซื้อระเบิดเข้ามาก็แล้วได้..."
41140-108 = "...มาจริงด้วยแฮะ?"
41140-110 = "ตอนต่อไป;ความพ่ายแพ้เล็กๆ"

[translation]
10002030-1 = "ตอนที่ 3;ก่อปราสาททรายกับการอบทรายร้อน 1"
10002030-4 = "เอ่อ... ก่อปราสาททราย... ทุกคนทำไปถึงไหนกันแล้วนะ"
10002030-6 = "อ๊ะ คุณครู ทุกคนก่อปราสาททรายไปได้ด้วยดีไหมคะ?"
10002030-7 = "ฉันหายไปแค่ครู่เดียว..."
10002030-8 = "[s1] จ้องไปที่ชายหาดอีกด้านหนึ่งโดยไม่พูดอะไร\n[s2] \"คือด้านโน้น...\""
10002030-9 = "หืม...?"
10002030-10 = "หืม...?"
10002030-15 = "(ผ่างงง-!!)"
10002030-18 = "เอ๋~~!!?!?!?"
10002030-20 = "อะ... อะไรน่ะอาซึสะจัง?! นี่มันอะไรเนี่ย!? ขนาดมัน...!? ทำไมถึงได้สร้างใหญ่ขนาดนี้กันคะ!?#nไม่สิ... ทำได้ยังไงกันเนี่ย!?"
10002030-21 = "เห็นเธอบอกให้ก่อปราสาททรายน่ะ ป้อมปราการนี่... ไม่ว่าจะบุกโจมตีเข้ามายังไง#nก็ไม่มีทางพังแน่นอน"
10002030-22 = "ดูแล้วก็ใช่นะ แต่ฉันไม่ได้หมายถึงแบบนั้นนี่!? นี่มันคนละเรื่องกันแล้วนะ!?"
10002030-23 = "แต่ถึงยังไงที่ชายหาดนี้ก็เป็นที่เปิดโล่ง ไม่มีหลุมหลบภัยหรือที่กำบังตัวได้ ฉันเลยรู้สึกไม่ค่อย#nสบายใจเท่าไหร่ แต่แบบนี้ก็พอได้อยู่นะ "
10002030-24 = "เท่านี้ก็คงป้องกันการโจมตีของศัตรูได้แล้วล่ะ หายห่วงได้"
10002030-25 = "ฉันเห็นด้วยค่ะ ในทางกลับกัน ที่นี่ก็เหมาะที่จะใช้เป็นที่ลอบยิงได้เหมือนกันนะคะ#nถือเป็นจุดที่เหมาะสำหรับสไนเปอร์สุดๆ ค่ะ"
10002030-26 = "คุณมาชิโระ!? คุณมาชิโระก็เอากับเขาด้วยเหรอคะ!? นี่ทั้งสองคนช่วยกันสร้างป้อมนี้ขึ้นมาเหรอคะ!?"
10002030-31 = "..."
10002030-32 = "... ฮึ"
10002030-33 = "...????"
10002030-34 = "ทำไมถึงทำท่าภูมิใจกันขนาดนั้นคะ!?!?"
10002030-35 = "ก่อปราสาททรายเล็กๆ น่ารักๆ ที่เหมาะสำหรับถ่ายรูปกันไม่เป็นรึไงคะ...?"
10002030-36 = "ไม่ล่ะ ถ้าจะรับมือกับพวกศัตรูให้ได้ อย่างน้อยเราต้องมีป้อมปราการแบบนี้นะ#nถ้าเล็กกว่านี้ก็ป้องกันไม่ได้หรอก"
10002030-37 = "ถึงอยากจะบอกว่าเราใช้ทรายเป็นส่วนผสมในการสร้างก็เถอะ แต่มันคงไม่มีประโยชน์#nเพราะว่าป้อมนี้มันสูงมากเลยล่ะค่ะ"
10002030-40 = "สุดท้ายก็ถ่ายรูปที่หน้าป้อมปราการนั้นด้วยกันอย่างช่วยไม่ได้..."
10002030-42 = "อะ อ่า... คิดไม่ถึงเลยว่าทั้งสองคนจะเข้ากันได้เป็นปี่เป็นขลุ่ยขนาดนี้..."
10002030-43 = "ตะ...แต่ว่าที่นี่คือชายหาดนะคะ มันเป็นสถานที่พักผ่อนธรรมดาๆ ค่ะ!"
10002030-44 = "ทั้งเรื่องซุ่มโจมตี หรือเรื่องการป้องกันพวกนั้น... ไม่จำเป็นระ..."
10002030-48 = "(ตู้มมมมม!!)"
10002030-49 = "...เอ๋?"
10002030-51 = "(ปังๆๆๆ!! ป๊างงง! ปังๆๆ!!)"
10002030-52 = "พบศัตรู! พบศัตรูค่ะ!! ทาง 3 นาฬิกา อีกฝั่งของชายหาด! พวกกลุ่มแยงกี้สาวชุดว่ายน้ำ#nโผล่มาแล้วค่ะ!!"
10002030-53 = "เห็นมั้ย? โดนลอบโจมตีอีกแล้ว"
10002030-54 = "อะ... อื้อ"
10002030-62 = "ย้ากกกกก! เมื่อกี้โจมตีใส่พวกเราใช่มั้ย?!"
10002030-63 = "เดี๋ยวจะเอาคืนให้ดูเอง! ฉันพาพวกของฉันมาแล้วนะยะ!"
10002030-69 = "กำลังรออยู่เลย จะตอบโต้เดี๋ยวนี้แหละ"
10002030-70 = "พลซุ่มยิง ฝากระวังหลังด้วย"
10002030-71 = "ฉันจะแสดงฝีมือให้ได้เห็นเองค่ะ! วางใจได้เลยค่ะ"
10002030-74 = "อะ...เอ๋!!!!?!? "

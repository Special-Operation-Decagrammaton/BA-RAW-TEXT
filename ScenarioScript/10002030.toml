[translation]
10002030-1 = "第3話;沙堡與沙浴（１）"
10002030-4 = "我看看……沙堡……堆得如何呢？"
10002030-6 = "啊，老師。#n情況還順利嗎？"
10002030-7 = "剛剛稍微離開了一下……"
10002030-8 = "[s1] 無言地望著海邊的另一頭\n[s2]「呃，就在那邊……」"
10002030-9 = "……嗯？"
10002030-10 = "……嗯？"
10002030-15 = "（咚！！）"
10002030-18 = "咦咦咦────！？！？"
10002030-20 = "這，這究竟是怎麼回事，梓醬！？#n為什麼會堆得這麼大！？不對，要先問的應該是怎麼做到的！？"
10002030-21 = "要求是「沙堡」──沙的城堡，也就是堡壘。#n我把它建造得能夠應對任何攻擊。"
10002030-22 = "說是這麼說沒錯，但是在別的意義上錯了吧！？"
10002030-23 = "這樣剛好，我正好因為這片海灘既沒有掩蔽物又沒有壕溝感到有點不安呢。"
10002030-24 = "有這座城堡在，就算有敵人來襲也不成問題，放心吧日步美。"
10002030-25 = "我同意。而且這裡也建造得相當適合狙擊，感覺非常不錯。"
10002030-26 = "麻白同學！？麻白同學也參了一腳嗎！？"
10002030-31 = "……"
10002030-32 = "……呵呵。"
10002030-33 = "……？？？？"
10002030-34 = "為什麼那麼高興！？！？"
10002030-35 = "這個，能拍得進去嗎……可不可以做得可愛嬌小一點……？"
10002030-36 = "不，考量到敵人來襲的狀況，這已經是最小尺寸了。#n如果再繼續縮小就無法保障安全。"
10002030-37 = "雖然是用沙子堆成的，像這樣身處高處果然讓人感到心靈舒暢呢。"
10002030-40 = "（總之還是拍下了大家的照片）"
10002030-42 = "啊，啊嗚嗚……沒想到你們兩位會在出乎意料的地方意氣相投呢……"
10002030-43 = "不過話又說回來，在這麼和平的海邊……"
10002030-44 = "要說攻擊還是敵襲什麼的，那種事怎麼可──"
10002030-48 = "（咚哐────！！！！）"
10002030-49 = "……咦？"
10002030-51 = "（噠噠噠噠噠噠噠噠！咚，咚！！)"
10002030-52 = "發現敵人，在3點鐘方向！出現大量泳裝太妹！！"
10002030-53 = "你看，敵人這不就來了嗎？"
10002030-54 = "……什，什麼？"
10002030-62 = "我們來報剛才的仇啦！"
10002030-63 = "帶這麼多人總不會輸了，覺悟吧！"
10002030-69 = "求之不得。"
10002030-70 = "狙擊手，背後就交給你了。"
10002030-71 = "包在我身上，讓你見識見識我的實力。"
10002030-74 = "怎麼會這樣～～～～！？"

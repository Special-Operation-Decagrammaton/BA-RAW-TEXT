[translation]
10002030-1 = "Episode 3;Sandcastles and Sunbathing Part 1"
10002030-4 = "Right, back to sandcastles. I wonder how everything is going."
10002030-6 = "Sensei! How are things holding up?"
10002030-7 = "Sorry I had to step away."
10002030-8 = "[s1] Look over at the other side of the beach.\n[s2] \"Well...\""
10002030-9 = "Huh?"
10002030-10 = "Huh?"
10002030-15 = "(A castle!!)"
10002030-18 = "What the...?!"
10002030-20 = "What is this thing, Azusa? Why are you inside of a fortress?! It's so big!"
10002030-21 = "You asked me to make a sandcastle, so that's what I did. There is no attack it cannot withstand."
10002030-22 = "I meant a normal sandcastle!"
10002030-23 = "The beach's open space and lack of cover had been worrying me, so this is the perfect defense."
10002030-24 = "We'll be safe from enemy attack here."
10002030-25 = "I'm on Azusa's side. This perch she built will be perfect for picking off any enemies that try to approach."
10002030-26 = "Mashiro?! You're in on this too?! Did you help her make this?!"
10002030-31 = "..."
10002030-32 = "Maybe."
10002030-33 = "...???"
10002030-34 = "Why do you look so proud?!"
10002030-35 = "Could you at least have made a smaller one that would fit in a picture?"
10002030-36 = "No. This is the smallest we could do while still being sufficient enough to defend against enemy attacks."
10002030-37 = "It's still made of sand, after all. But we should be okay with a vantage point this high up."
10002030-40 = "We then took a picture of Mashiro and Azusa."
10002030-42 = "*sigh* Well, at least those two are hitting it off."
10002030-43 = "B-But we should be having fun! This is the beach!"
10002030-44 = "We're probably not going to be attacked like that again..."
10002030-48 = "*boom*"
10002030-49 = "What?"
10002030-51 = "*pop* *pop* *pop* *tat*"
10002030-52 = "Enemy at 3 o'clock. More beach thugs!"
10002030-53 = "See? Enemy attack."
10002030-54 = "Um..."
10002030-62 = "Ahhh! This is payback!"
10002030-63 = "We brought backup! Any final words?!"
10002030-69 = "Very well. They'll be the last ones you ever hear."
10002030-70 = "Cover my six, sniper."
10002030-71 = "They're already marked."
10002030-74 = "Not again! "

[translation]
80000076-1 = "สัมพันธภาพของวันครบรอบกับงานเพื่อส่วนรวม"
80000076-2 = "ในอาคารที่มีกำหนดจะทุบทิ้งในเขตพัฒนาใหม่"
80000076-3 = "บอกไว้ก่อนนะ ฉันเป็นคนที่รับผิดชอบดูแลความปลอดภัยของเด็กคนอื่นๆ"
80000076-4 = "[s] \"อื้อ เรื่องนั้นครูรู้แล้ว\""
80000076-5 = "และที่ฉันนัดเจอคุณครูในวันนี้ ก็เป็นเพราะเรื่องจำเป็นที่เกี่ยวกับหน้าที่เท่านั้น"
80000076-6 = "หวังว่าจะไม่ลืมเรื่องนี้น่ะ"
80000076-7 = "[s1] \"ครูจะจำไว้ก็แล้วกัน แล้วนี่มีอะไรเหรอ?\"\n[s2] \"แล้ว... วันนี้จะให้ทำอะไรเหรอ?\""
80000076-8 = "เรื่องนั้น อืม..."
80000076-9 = "เรื่องนั้น อืม..."
80000076-10 = "ก่อนอื่น เราต้องมาตรวจสอบว่าสายยังชีพได้รับการบำรุงรักษาดีหรือไม่"
80000076-11 = "คุณครูอาจรู้อยู่แล้ว สายยังชีพน่ะเชื่อมต่อกับทั้งสายไฟฟ้า น้ำประปา แล้วก็แก๊สครัวเรือน"
80000076-12 = "ที่นี่ไม่มีช่างบำรุงรักษา หรือพวกช่างตรวจสอบมิเตอร์ขึ้นมาดูแล เพราะงั้นพวกเราเลยต้องคอย#nตรวจสอบเองว่าสายยังชีพยังปลอดภัยดีรึเปล่า"
80000076-13 = "ฟังดูเหมือนอันตรายงั้นเหรอ?"
80000076-14 = "สำหรับพวกเราแล้ว เรื่องแบบนี้ถือเป็นเรื่องปกติน่ะ หวังว่าคุณครูจะไม่ลืมจุดๆ นั้นไปนะ"
80000076-15 = "[s3] \"แต่ว่า... ดูเหมือนไฟฟ้ากับน้ำประปายังใช้ได้ปกติอยู่นะ?\"\n[s4] \"แสดงว่าสายยังชีพได้รับการบำรุงรักษาอย่างดีไม่ใช่เหรอ?\""
80000076-16 = "..."
80000076-17 = "..."
80000076-18 = "ช่างสังเกตอย่างคาดไม่ถึงเลยนะคุณครู"
80000076-19 = "ดีละ ถ้างั้นก็ข้ามไปเรื่องต่อไปเลยแล้วกัน"
80000076-20 = "[s5] \"จู่ๆ ก็ข้ามไปเลยแบบนี้ ครูเสียใจนะ?!\"\n[s6] \"ยังไม่ได้ทำอะไรเลยก็เสร็จงานแล้วเรอะ?!\""
80000076-21 = "เป็นผู้ใหญ่แล้ว อย่าโวยวายนักเลยน่า"
80000076-22 = "เป็นผู้ใหญ่แล้ว อย่าโวยวายนักเลยน่า"
80000076-23 = "ต่อไปก็... อันนั้นสินะ"
80000076-24 = "ตรวจสอบว่าถนนที่ใช้เดินทางยังมีสภาพดีหรือไม่"
80000076-25 = "ความสงบเรียบร้อยของที่นี่น่ะ ย่ำแย่กว่าที่อาเรียสซะอีก"
80000076-26 = "ที่นี่น่ะไร้ระเบียบวินัยกันแบบสุดๆ เลย"
80000076-27 = "เพราะงั้นจำเป็นต้องตรวจสอบเส้นทางสำหรับเข้าออกเอาไว้ เผื่อว่าเกิดอะไรขึ้นน่ะ"
80000076-28 = "[s7] \"แต่ครูก็มาถึงที่นี่ได้สบายๆ เลยนะ...\"\n[s8] \"แสดงว่าเส้นทางเข้าออกก็ยังใช้ได้ปกติไม่ใช่เหรอ?\""
80000076-29 = "..."
80000076-30 = "..."
80000076-31 = "ดีละ การตัดสินใจของคุณครูถือว่ามีประโยชน์ทีเดียว"
80000076-32 = "แก้ปัญหาได้แล้ว ทำไมฉันถึงยังโมโหอยู่งั้นเหรอ?"
80000076-33 = "ฉันไม่ได้โมโหอะไรสักหน่อย"
80000076-35 = "(หลังจากนั้น มิซากิก็ยังยืนกรานว่าจะต้องจัดการ \"งานส่วนกลาง\" โน่นนี่ให้สำเร็จ)"
80000076-36 = "(...ซึ่งส่วนใหญ่ก็เป็นปัญหาที่แก้ไขได้ง่ายๆ เกือบทั้งหมด...)"
80000076-38 = "..."
80000076-39 = "[s] \"มีงานที่ต้องทำอีกรึเปล่ามิซากิ?\""
80000076-40 = "เหนือความคาดหมายจริงๆ..."
80000076-41 = "[s] \"หืม? ว่ายังไงนะ?\""
80000076-42 = "ไม่ได้พูดอะไรสักหน่อย"
80000076-43 = "[s] \"แต่ว่า...\""
80000076-44 = "ฉันบอกว่าไม่ได้พูดอะไรไง"
80000076-45 = "[s] \"ว่าแต่ว่ามิซากิ...\""
80000076-47 = "[ns] \"มีห่ออะไรโผล่ออกมาจากกระเป๋าน่ะ?\""
80000076-48 = "...?!"
80000076-49 = "หะ...เห็นตั้งแต่เมื่อไหร่น่ะ?!"
80000076-50 = "[s9] \"อืม~ ก็ตอนที่มิซากิตรวจสอบความปลอดภัยน่ะ\"\n[s10] \"ตั้งแต่ตอนที่ชวนขึ้นไปบนตึกร้างล่ะมั้ง...?\""
80000076-51 = "...!"
80000076-52 = "...!"
80000076-53 = "เลวร้ายที่สุด..."
80000076-54 = "[s] \"หรือว่านั่นมัน...\""
80000076-55 = "ไม่ต้องพูดเลย"
80000076-56 = "..."
80000076-57 = "(มิซากิที่นิ่งเงียบมาพักใหญ่ ค่อยๆ ยื่นกล่องช็อกโกแลตมาให้)"
80000076-62 = "[ns11] \"ช็อกโกแลตที่มิซากิให้!\"\n[ns12] \"ขอบใจนะ! ครูจะกินให้อร่อยเลย!\""
80000076-63 = "เฮ้อ... อุตส่าห์กังวลเรื่องนี้ตั้งนาน..."
80000076-64 = "เฮ้อ... อุตส่าห์กังวลเรื่องนี้ตั้งนาน..."
80000076-65 = "ช่างเถอะ ไหนๆ ก็ให้แล้วนี่นะ... กินให้อร่อยล่ะ"
80000076-66 = "เพราะวันนี้เป็นวันพิเศษนั่นละนะ"
80000076-67 = "ฉันก็เคยไปรบกวนคุณครู... เอาไว้เยอะเลยนี่นา"
80000076-68 = "ไม่ได้มีความหมายอื่นอะไรแม้แต่นิดเดียว เข้าใจมั้ย?"
80000076-69 = "เข้าใจรึเปล่า?! หยุดหัวเราะแล้วตอบมาเร็วๆ เข้า!"
80000076-71 = "(คุณครูยืนดูมิซากิที่โกรธจนหน้าแดง แล้วหยิบช็อกโกแลตมากินอย่างเอร็ดอร่อย)"

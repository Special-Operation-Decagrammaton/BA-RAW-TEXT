[translation]
80000076-1 = "責任與活動的相關性"
80000076-2 = "再開發地區．預計拆除的大樓"
80000076-3 = "姑且告訴你一聲，我現在肩負著守護奧利斯的大家的使命。"
80000076-4 = "[s]「嗯，我知道唷。」"
80000076-5 = "所以今天之所以約老師見面，也只是那個使命的延伸而已。"
80000076-6 = "請先記住這一點。"
80000076-7 = "[s1]「我會銘記在心。」\n[s2]「所以……今天要做什麼呢？」"
80000076-8 = "首先……"
80000076-9 = "首先……"
80000076-10 = "……從確保生命線開始吧。"
80000076-11 = "電力，瓦斯，水管……為了確保這些，必須仔細檢查才行。"
80000076-12 = "這裡並不是整備的人會來的地方，所以我們得自己動手。"
80000076-13 = "你那是……好像很辛苦的表情？"
80000076-14 = "不過，這對我們來說是日常。"
80000076-15 = "[s3]「這樣啊……啊，這麼說來我剛才確認過電和水了唷。」\n[s4]「只是要確認的話，這樣就可以了嗎？」"
80000076-16 = "……"
80000076-17 = "……"
80000076-18 = "你意外的敏銳呢，老師。"
80000076-19 = "那，就進行下一個工作吧。"
80000076-20 = "[s5]「真意外！？」\n[s6]「明明什麼都還沒做就已經完成第一個工作了！！」"
80000076-21 = "別吵吵鬧鬧的，你可是大人。"
80000076-22 = "別吵吵鬧鬧的，你可是大人。"
80000076-23 = "接下來……嗯。"
80000076-24 = "是檢查進出的路線，吧。"
80000076-25 = "畢竟這裡完全是無秩序的狀態……"
80000076-26 = "要說治安的話，這裡某種意義上比奧利斯自治區還危險。"
80000076-27 = "所以為了以防萬一，我有調查進出路線是否已經準備完成的責任。"
80000076-28 = "[s7]「可是，我在來的路上都沒有遇到問題唷？」\n[s8]「這樣應該已經確保路線了吧？」"
80000076-29 = "……"
80000076-30 = "……"
80000076-31 = "好吧……既然老師都這麼說了，就當作沒問題吧。"
80000076-32 = "……怎麼了？我沒有生氣。"
80000076-33 = "我只是覺得能解決問題很高興而已。"
80000076-35 = "（之後也和美咲一起處理各種「責任」）"
80000076-36 = "（不過大多都是一下就能解決的事……）"
80000076-38 = "……"
80000076-39 = "[s]「美咲，還有其他事要做嗎？」"
80000076-40 = "真是出乎意料……"
80000076-41 = "[s]「……？」"
80000076-42 = "……沒什麼。"
80000076-43 = "[s]「但是剛才──」"
80000076-44 = "我什麼都沒說。"
80000076-45 = "[s]「這樣啊。話說回來，我一直想告訴你……」"
80000076-47 = "[ns]「……你的口袋裡，好像露出了什麼東西唷？」"
80000076-48 = "……！？"
80000076-49 = "你，你什麼時候發現的！？"
80000076-50 = "[s9]「呃，從美咲為了進行安全檢查……」\n[s10]「說要一起去廢棄大樓的時候……？」"
80000076-51 = "……！"
80000076-52 = "……！"
80000076-53 = "糟透了……"
80000076-54 = "[s]「那該不會是……」"
80000076-55 = "別說話。"
80000076-56 = "……"
80000076-57 = "（美咲沉默了好一會，最終還是將口袋中的巧克力遞了過來）"
80000076-62 = "[ns11]「是美咲送給我的巧克力！」\n[ns12]「謝謝！我會好好享用的！」"
80000076-63 = "唉……本來不該是這樣的……"
80000076-64 = "唉……本來不該是這樣的……"
80000076-65 = "算了。給都給了……就拿去吃吧。"
80000076-66 = "首先，今天就是該這麼做的日子。"
80000076-67 = "而且……我也稍微受了老師一些照顧。"
80000076-68 = "絕對、絕對、絕對沒有其他意思。#n知道了嗎？"
80000076-69 = "……真的有聽懂嗎？#n啊啊真是！別光顧著笑，快回答！"
80000076-71 = "（一邊安撫著氣得面紅耳赤的美咲，一邊津津有味地吃著巧克力）"

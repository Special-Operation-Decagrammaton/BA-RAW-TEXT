[translation]
80000076-1 = "Commitments and Celebrations"
80000076-2 = "Abandoned Building in a Construction Area"
80000076-3 = "It's my responsibility to keep everyone safe."
80000076-4 = "[s] \"Yeah. I know that.\""
80000076-5 = "This meeting with you is a part of that responsibility, Sensei."
80000076-6 = "I want you to keep that in mind."
80000076-7 = "[s1] \"Understood.\"\n[s2] \"So, what are we doing?\""
80000076-8 = "Well... You see..."
80000076-9 = "Well... You see..."
80000076-10 = "First, we need to check if the utility lines are properly secured."
80000076-11 = "We can't stay in a building with unsafe utility lines. Electricity, water, gas... If anything went wrong..."
80000076-12 = "And we can't expect a building inspector or a meter reader to come here, so we have to do it."
80000076-13 = "You already think this sounds too dangerous?"
80000076-14 = "This is everyday work for us. Please don't forget that."
80000076-15 = "[s3] \"But the electricity and water are obviously working...\"\n[s4] \"Does that mean the utility line maintenance is already done?\""
80000076-16 = "..."
80000076-17 = "..."
80000076-18 = "You're smarter than you look, Sensei."
80000076-19 = "Great. We'll move on to the next task."
80000076-20 = "[s5] \"Ouch. That was almost hurtful.\"\n[s6] \"The work's all done and we don't have to do a thing!\""
80000076-21 = "Calm down. Aren't you supposed to be responsible?"
80000076-22 = "Calm down. Aren't you supposed to be responsible?"
80000076-23 = "Next up... Let's see."
80000076-24 = "We need to check to see if the road is safe."
80000076-25 = "In some ways, the security here is worse than Arius."
80000076-26 = "There's no order of any kind."
80000076-27 = "If something were to happen, we need to make sure we have clear and secure exit and entry paths."
80000076-28 = "[s7] \"But I got in here without any difficulties...\"\n[s8] \"Doesn't that mean the entry is safe?\""
80000076-29 = "..."
80000076-30 = "..."
80000076-31 = "Great. Your assessment is useful in this case."
80000076-32 = "I'm not mad that you solved the problem. Why would I be?"
80000076-33 = "Of course I'm not mad."
80000076-35 = "Misaki insisted on taking care of several more \"safety inspections.\""
80000076-36 = "Most were resolved without difficulty."
80000076-38 = "..."
80000076-39 = "[s] \"Do we need to take care of anything else, Misaki?\""
80000076-40 = "This was...unexpected."
80000076-41 = "[s] \"What was that?\""
80000076-42 = "I didn't say anything."
80000076-43 = "[s] \"But...\""
80000076-44 = "I said, I didn't say anything."
80000076-45 = "[s] \"Anyways, Misaki...\""
80000076-47 = "[ns] \"That box is sticking out of your pocket.\""
80000076-48 = "...?!"
80000076-49 = "H-How long have you known?"
80000076-50 = "[s9] \"Hmm. I noticed when you wanted to do safety checks...\"\n[s10] \"Since we tested the structural integrity of that abandoned building?\""
80000076-51 = "...!"
80000076-52 = "...!"
80000076-53 = "This is terrible..."
80000076-54 = "[s] \"Is that, perhaps…\""
80000076-55 = "No! Don't say anything."
80000076-56 = "..."
80000076-57 = "After a long silence, Misaki shoved the chocolate into my hands."
80000076-62 = "[ns11] \"Chocolate from you, Misaki?\"\n[ns12] \"Thank you! I'll cherish it!\""
80000076-63 = "*sigh* ...This is exactly why I didn't want to..."
80000076-64 = "*sigh* ...This is exactly why I didn't want to..."
80000076-65 = "Fine. Since I gave it to you, you'd better enjoy it."
80000076-66 = "It's just because it's the day for it..."

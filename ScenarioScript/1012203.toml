[translation]
1012203-1 = "延續那時的時光"
1012203-4 = "啊哈，老師～！呀齁！"
1012203-5 = "真的在發呆呢。哈哈哈。"
1012203-6 = "[s1]「難得來到海邊嘛。」\n[s2]「這樣的時間也是很珍貴的。」"
1012203-9 = "也對～現在陽光剛好不會太刺眼。"
1012203-10 = "呵呵，老師喜歡海嗎？"
1012203-11 = "[s3]「喜歡啊。像是那開闊的視野。」\n[s4]「還有海的氣味。」"
1012203-12 = "啊，我也是！"
1012203-13 = "只有大海才能帶來這種獨特的開放感呢～"
1012203-14 = "視野變遼闊之後，心情也跟著開朗起來的感覺？哈哈哈！"
1012203-15 = "啊，我也是！"
1012203-16 = "大海有種獨特的氣味呢～"
1012203-17 = "雖然有點鹹味和腥味，但並不會讓人討厭……"
1012203-18 = "海浪來來回回的景象也很有趣！"
1012203-19 = "像這～樣～"
1012203-24 = "啊哈哈，站在浪花之間的感覺真奇怪。"
1012203-25 = "當水流回到海裡的時候……就像要被吸進去了一樣。"
1012203-26 = "實際上也發生過不少意外，所以要小心？"
1012203-27 = "嗯！不用擔心，老師！"
1012203-28 = "我可是有努力練習過游泳呢。"
1012203-32 = "[ns]「這麼說來……」"
1012203-34 = "[ns]「之前的游泳課只進行到一半對吧？」"
1012203-35 = "啊……對耶。"
1012203-36 = "那時候因為被警衛發現的關係，只好一起逃跑。"
1012203-41 = "呵呵，真有趣。老師逃跑的速度超快的呢。"
1012203-42 = "[s]「那可是下班時間啊！」"
1012203-43 = "啊哈哈。嗯，說的也是。"
1012203-44 = "之後我都有努力上課哦。#n畢竟有跟老師一起修補的泳衣嘛。"
1012203-45 = "可能是因為這個關係，成績還算不錯？#n甚至對游泳有點信心了！"
1012203-49 = "其實，這次我本來也想穿那件泳衣來的。"
1012203-50 = "[s]「來私人海灘嗎？」"
1012203-51 = "嗯！雖然可能不太適合，但我就是想穿。"
1012203-52 = "因為那……是蘊含著跟老師滿滿回憶的珍貴泳衣。"
1012203-53 = "但是那上面終究還有修補過的痕跡……"
1012203-54 = "要是被朋友看到，感覺會被問東問西的。"
1012203-55 = "[ns]「啊……」"
1012203-56 = "朋友們並不知道這件事，我也不想因為過去的事讓他們白操心。"
1012203-57 = "反正都已經過去了……"
1012203-61 = "啊，好像也沒有嗎……唔嗯。"
1012203-62 = "總之～！！"
1012203-63 = "雖然有點可惜，最後還是穿上了新泳衣！啊哈哈☆"
1012203-64 = "這件也挺適合我的對吧？"
1012203-65 = "怎麼樣？可愛嗎？"
1012203-66 = "[s]「嗯。彌香很可愛。」"
1012203-71 = "……哇哦。"
1012203-72 = "沒想到你會說得這麼直接……"
1012203-73 = "……嗚嗚！！"
1012203-78 = "老師，你說這種話的時候都不會害羞嗎！？"
1012203-79 = "[s5]「總覺得有種似曾相識的感覺……」\n[s6]「小心別被海浪捲走哦，彌香！」"
1012203-82 = "啊，這邊的水很淺，應該沒問題！#n你看！只到膝蓋而已。"
1012203-83 = "老師也要下來嗎？呵呵。"
1012203-89 = "[ns]「這麼說來，當時還沒有宣布下課對吧。」"
1012203-92 = "嗯……"
1012203-93 = "那麼……"
1012203-98 = "就麻煩你……繼續上游泳課囉，老師。"
1012203-100 = "（就這樣繼續和彌香在淺灘玩水玩了好一陣子）"

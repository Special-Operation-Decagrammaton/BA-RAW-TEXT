[translation]
1012203-1 = "สืบเนื่องจากครั้งนั้น"
1012203-4 = "อะฮ่า คุณครู~ สวัสดี!"
1012203-5 = "นั่งเหม่ออยู่จริงด้วยสินะ อะฮะฮ่า"
1012203-6 = "[s1] \"ไหนๆ ได้มาทะเลแล้วไง\"\n[s2] \"ไม่เคยได้ยินเหรอ นั่งโง่ๆ ริมทะเลน่ะ\""
1012203-9 = "นั่นสินะ~ แดดก็ไม่ได้ร้อนเกินไปด้วย"
1012203-10 = "ฮุฮุ คุณครูชอบทะเลเหรอ?"
1012203-11 = "[s3] \"ชอบสิ มีวิวให้ดูสุดลูกหูลูกตาเลย\"\n[s4] \"ชอบสิ กลิ่นอายของทะเลแบบนี้น่ะ\""
1012203-12 = "อ๊ะ ฉันก็ด้วย!"
1012203-13 = "ความรู้สึกอิสระอันเป็นเอกลักษณ์เฉพาะของทะเล~"
1012203-14 = "พอได้เห็นวิวทิวทัศน์กว้างๆ ก็รู้สึกว่าจิตใจกว้างขึ้นไปด้วยใช่มั้ยล่ะ? อะฮะฮ่า!"
1012203-15 = "อ๊ะ ฉันก็ด้วย!"
1012203-16 = "ทะเลมีกลิ่นอายเฉพาะตัวเลยละ~"
1012203-17 = "ถึงจะเค็มและเหนียวตัวบ้าง ฉันก็ไม่ได้ไม่ชอบ..."
1012203-18 = "แล้วคลื่นที่ซัดสาดก็น่าสนุกดีด้วย!"
1012203-19 = "แบบนี้~ ไง~"
1012203-24 = "อะฮะฮ่า พอได้มายืนกลางคลื่น ก็รู้สึกแปลกๆ นะ"
1012203-25 = "พอคลื่นมันไหลกลับลงทะเล จะว่ายังไงดีนะ ฉันรู้สึกเหมือนตัวเองโดนดูดลงไปด้วยเลย"
1012203-26 = "อุบัติเหตุจากคลื่นเกิดขึ้นบ่อยๆ เพราะงั้นเลยต้องระวังงั้นเหรอ?"
1012203-27 = "อื้อ! ไม่ต้องห่วงหรอกนะคุณครู!"
1012203-28 = "ฉันก็ฝึกว่ายน้ำมาเยอะเลยละ"
1012203-32 = "[ns] \"จะว่าไป...\""
1012203-34 = "[ns] \"เมื่อก่อนเราเคยเรียนว่ายน้ำแล้วหยุดไปใช่มั้ย\""
1012203-35 = "อื้อ... ใช่แล้วละ"
1012203-36 = "ตอนนั้นเราโดนยามจับได้ ก็เลยหนีออกมากัน"
1012203-41 = "ฮุฮุ แต่มันก็สนุกเลยละ คุณครูหนีเร็วมากเลยนะตอนนั้น"
1012203-42 = "[s] \"เรียกว่าครูเลิกงานต่างหาก!\""
1012203-43 = "อะฮะฮ่า อื้อ นั่นสิเนอะ"
1012203-44 = "แต่หลังจากนั้นฉันก็กลับไปตั้งใจเรียนอีกรอบนะ ก็ฉันมีชุดว่ายน้ำที่คุณครูช่วยซ่อมให้ไง"
1012203-45 = "พอตั้งใจและมีชุดดีๆ ฉันก็เลยได้เกรดดีเลยนะ? ฉันมั่นใจเรื่องการว่ายน้ำขึ้นมาเลยละ!"
1012203-49 = "ที่จริงครั้งนี้ฉันก็คิดว่าจะใส่ชุดว่ายน้ำตัวนั้นมาดีหรือเปล่า"
1012203-50 = "[s] \"มาที่ชายหาดส่วนตัวน่ะเหรอ?\""
1012203-51 = "อื้อ! ถึงมันจะไม่เข้ากับสถานที่ แต่ฉันก็อยากใส่น่ะ"
1012203-52 = "ที่สำคัญมันคือชุดว่ายน้ำล้ำค่าที่ฉันมีความทรงจำร่วมกับคุณครูด้วย"
1012203-53 = "แต่ว่ามันเห็นชัดเจนเลยว่าเย็บปะตรงไหนไปบ้าง"
1012203-54 = "ถ้าเพื่อนๆ เห็นก็น่าจะถามและพูดนู่นนี่กัน ฉันก็เลย..."
1012203-55 = "[ns] \"อ่า...\""
1012203-56 = "พอเป็นเรื่องที่เพื่อนๆ ยังไม่รู้ ฉันก็เลยไม่อยากหาเรื่องให้เพื่อนๆ ต้องกังวลน่ะ"
1012203-57 = "ไหนๆ มันก็เป็นเรื่องอดีตที่ผ่านไปแล้วด้วย..."
1012203-61 = "อ๊ะ หรือว่ายังไม่ผ่านไปนะ อืม อืม"
1012203-62 = "เอาเถอะ~!!"
1012203-63 = "เอาเป็นว่าฉันใส่ชุดว่ายน้ำใหม่มาน่ะ! อะฮะฮ่า☆"
1012203-64 = "แต่ชุดนี้ก็เข้ากับฉันอยู่ใช่มั้ยล่ะ?"
1012203-65 = "ว่าไง? น่ารักมั้ย?"
1012203-66 = "[s] \"อื้อ น่ารักเลยละ มิกะ\""
1012203-71 = "ว้าว..."
1012203-72 = "ไม่คิดเลยนะเนี่ยว่าจะตอบทันควันแบบนี้..."
1012203-73 = "อึก...!!"
1012203-78 = "คุณครูพูดแบบนี้ แต่ตัวเองก็ไม่เขินเลยเหรอ?!"
1012203-79 = "[s5] \"ทำไมรู้สึกเหมือนเดจาวูเลย...\"\n[s6] \"ระวังอย่าให้คลื่นซัดไปนะ มิกะ!\""
1012203-82 = "ตรงนี้น้ำตื้นมาก ไม่เป็นไรหรอกน่า! ดูสิ! ยังไม่ถึงหัวเข่าเลย"
1012203-83 = "คุณครูก็ลงมาด้วยมั้ย? ฮุฮุ"
1012203-89 = "[ns] \"จะว่าไป ตอนนั้นครูไม่ได้บอกว่าจะเลิกสอนแล้วนี่เนอะ\""
1012203-92 = "อืม..."
1012203-93 = "เอาละ ถ้างั้นก็"
1012203-98 = "มาสอน... คลาสว่ายน้ำต่อทีนะคะคุณครู"
1012203-100 = "(แล้วคุณครูกับมิกะก็เล่นน้ำตื้นๆ ด้วยกันอยู่นาน)"

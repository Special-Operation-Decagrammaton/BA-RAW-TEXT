[translation]
1012203-1 = "Picking Up From the Past"
1012203-4 = "Aha, Sensei! Hi there!"
1012203-5 = "You were really zoned out, huh? Ahaha."
1012203-6 = "[s1] \"Just watching the tide.\"\n[s2] \"It's beautiful out here.\""
1012203-9 = "I guess so. It's not too hot today, either."
1012203-10 = "Heehee. Do you like the sea, Sensei?"
1012203-11 = "[s3] \"I love how vast it is.\"\n[s4] \"I love the scent of the salty air.\""
1012203-12 = "Ah, me too!"
1012203-13 = "There's something so sincere and timeless about the sea."
1012203-14 = "It's like an openness that I feel in my heart. Ahaha!"
1012203-15 = "Oh, me too!"
1012203-16 = "It has a very unique smell. Not fresh, exactly..."
1012203-17 = "...it's salty, and even fishy. But it's not bad!"
1012203-18 = "And it's fun to watch the waves crash and pull back."
1012203-19 = "Just like...this!"
1012203-24 = "Ahaha, standing in between the waves feels so strange!"
1012203-25 = "When the tide pulls the sand out from under...it's like I might get sucked in!"
1012203-26 = "Oh, you think I should be careful?"
1012203-27 = "Sure. But you don't need to worry about that, Sensei!"
1012203-28 = "I practice my swimming regularly."
1012203-32 = "[ns] \"Now that I think about it...\""
1012203-34 = "[ns] \"We had a swimming lesson once, right?\""
1012203-35 = "Ah... Yeah."
1012203-36 = "A security guard caught us, and we bolted like fugitives!"
1012203-41 = "Heehee, that was fun. You're actually pretty fast, Sensei."
1012203-42 = "[s] \"I had to be!\""
1012203-43 = "Ahaha. Yeah, for sure. Not as fast as me, though!"
1012203-44 = "I studied harder after that, all because you helped me mend that swimsuit."
1012203-45 = "I got good grades too, you know? And I even started to feel confident about my swimming."
1012203-49 = "I even considered wearing that swimsuit here, as well."
1012203-50 = "[s] \"At the private beach?\""
1012203-51 = "Yeah! It might not fit the ambiance, but I still like it."
1012203-52 = "After all, it reminds me of you."
1012203-53 = "...But the part that we mended is pretty visible."
1012203-54 = "I was worried about what the others would say."
1012203-55 = "[ns] \"Ah...\""
1012203-56 = "They don't really know that story, and I don't want to invite a lot of questions..."
1012203-57 = "...It's old news, after all."
1012203-61 = "Or...maybe not! Mm, mm."
1012203-62 = "Anyway!"
1012203-63 = "So, that's how I ended up in this! Ahaha! ☆"
1012203-64 = "I think it looks pretty good, right?"
1012203-65 = "What's your opinion? Is it cute?"
1012203-66 = "[s] \"Yeah, very cute, Mika.\""
1012203-71 = "...Whoa."
1012203-72 = "I didn't expect such a direct answer."
1012203-73 = "...Uhh?!"
1012203-78 = "Aren't you embarrassed? You just say stuff like that out loud?"
1012203-79 = "[s5] \"Wow. Deja vu...\"\n[s6] \"Don't get swept away, Mika!\""
1012203-82 = "Oh, it's super shallow. I'm fine, see? It's only up to my knees."
1012203-83 = "Heehee. Would you like to join me, Sensei?"
1012203-89 = "[ns] \"You know, we never finished that lesson!\""
1012203-92 = "Yeah."
1012203-93 = "In that case..."
1012203-98 = "...please continue with the swimming lesson, Sensei."
1012203-100 = "And so, we played together in the shallow water."

1006903-43 = "[ns] \"선생님은 조금도 좋지 않습니다, 루미 학생!\""
1006903-44 = "3;루미;00;자, 자. 그렇게 흥분하지 말고. 다음 요리도 준비되어 있으니까.\n#3;em;[음표]"

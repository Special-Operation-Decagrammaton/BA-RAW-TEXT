1006903-49 = "#st;[0,0];instant;1;"
1006903-50 = "#clearST"
1006903-51 = "#wait;1500"
1006903-52 = "[ns6] \"느, 느끼해?!\"\n[ns7] \"숨이 막힐 정도로 매운데!?\""
1006903-53 = "#wait;100"
1006903-54 = "#wait;100"
1006903-55 = "3;루미;99;그렇단 말이지…… 여기까지는 생각대로네. 자, 이제 마지막 요리야.\n#3;a\n#3;em;[...]"
1006903-56 = "[s] \"저기, 이 선생님, 더 이상 뭘 맛볼 자신이 없는데……\""
1006903-57 = "3;루미;03;하하하. 여기까지 온 이상 마지막까지 함께 해 달라고.\n#3;em;[재잘]"
1006903-58 = "3;루미;01;가다가 그만두면 안 간 것만 못하다는 말도 있잖아?"
1006903-59 = "3;루미;02;그런 말이 분명히 있고, 용법도 맞는 것 같지만, 왠지 억울하다고?\n#3;em;[?]"
1006903-60 = "3;루미;01;괜찮아, 괜찮아. 살다 보면 그런 일도 겪기 마련이잖아. 선생님은 어른이니까 더 잘 알겠지?"

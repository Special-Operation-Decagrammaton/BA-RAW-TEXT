1006903-67 = "#clearST"
1006903-68 = "#wait;1800"
1006903-69 = "[ns8] \"어, 어라? 이 맛은……?\n[ns9] \"처음 먹어보는 맛인데……?! 조화로워!\""
1006903-70 = "#wait;100"
1006903-71 = "#wait;100"
1006903-72 = "3;루미;99;그런가…… 마침내 성공했군.\n#3;a\n#3;em;[...]"
1006903-73 = "3;루미;01;쓴맛은 참 살리기 힘든 맛이지."
1006903-74 = "3;루미;02;하지만 소금을 넣어 맛을 정돈하는 것은, 자칫하면 지나치게 짜게 될 위험이 있어 피하고 싶었고."
1006903-75 = "3;루미;07;그래서 생각해 본 게 지방과 매운맛을 활용해 보자는 거였어.\n#3;em;[반짝]"
1006903-76 = "3;루미;99;쓴맛을 너무 강하게 느끼지 않도록 혀를 코팅하고, 미각에 쾌감을 주는 거지. 감칠맛을 첨가하는 것은 덤이고."
1006903-77 = "3;루미;01;거기에 기름에 잘 녹는 매운맛을 살짝 추가해, 빠르게 매운맛을 가시게 하면서 개운함을 주려고 했고."
1006903-78 = "3;루미;03;선생님의 감상을 보아하니, 성공한 모양이네. 하하하.\n#3;em;[재잘]"
1006903-79 = "[s] \"루미는 이런 식으로 요리 개발을 하는 거구나.\""
1006903-80 = "3;루미;01;음. 나만의 방식이랄까, 고집이랄까. 그런 거지."
1006903-81 = "3;루미;99;맛이란 건 섬세한 녀석이라, 여러 조합을 계속해서 시도해 봐야 해.\n#3;em;[...]"
1006903-82 = "3;루미;99;……시도라는 게 늘 그렇듯이, 도전과 실패가 반복되기는 하지만."
1006903-83 = "[s10] \"훌륭한 자세라고 생각해.\"\n[s11] \"……그것과는 별개로, 왜 현무상회 학생들이 자리를 피했는지 알 것도 같고.\""
1006903-84 = "#wait;100"
1006903-85 = "#wait;100"
1006903-86 = "3;루미;00;하하하…… 뭐, 나로서도 우리 학생들을 그렇게까지 괴롭히고 싶지는 않으니까.\n#3;em;[음표]"
1006903-87 = "3;루미;02;선생님도 괴롭힘 받고 싶지 않았다고? 음…… 뭐, 마지막에는 성공적인 음식이 나왔으니 괜찮은 것 아닐까!"
1006903-88 = "3;루미;01;그 대신이랄까, 보상이랄까. 이 맛의 레시피를 응용해서 다섯 가지 정도의 요리를 더 만들어 볼 생각이야."
1006903-89 = "3;루미;03;맛 내기가 정립되었으니 이번엔 자신작들로만 채울 수 있다고."
1006903-90 = "3;루미;07;그 전부를 맛 보여 줄 테니까, 기대하라고!\n#3;em;[반짝]"
1006903-91 = "[s12] \"그게 말입니다, 루미 학생……\"\n[s13] \"너무 배가 불러서 더 이상은 못 먹을 것 같은데요……\""
1006903-92 = "#wait;100"
1006903-93 = "#wait;100"
1006903-94 = "3;루미;02;응? 시식은 다음으로 미뤄 달라고?"
1006903-95 = "3;루미;06;하, 하지만 이런 요리는 영감이 떠올랐을 때 바로 해야 하는 법인데……\n#3;em;[속상함]"
1006903-96 = "#st;[0,0];instant;1;"

[translation]
1006903-1 = "The Taste Test"
1006903-2 = "Black Tortoise Promenade"
1006903-3 = "Rumi invited me to visit her at the Black Tortoise Promenade."
1006903-8 = "Welcome, Sensei. I have been expecting you."
1006903-9 = "Are you excited? Hahaha... Don't be. This is actually kind of embarrassing for me..."
1006903-10 = "[s1] \"When you put it that way...\"\n[s2] \"Why not ask for help from your fellow club members, then?\""
1006903-13 = "About that..."
1006903-14 = "Normally, I would get help from the others, of course!"
1006903-15 = "But everyone's too busy to help me right now. That's why you're here!"
1006903-16 = "They're all hard at work studying, but the club is important, too. At least, that's how I feel."
1006903-17 = "[s] \"(Something smells fishy...)\""
1006903-24 = "Here's the first dish. Please try it and tell me what you think."
1006903-25 = "Don't hold back. I want your honest opinion."
1006903-26 = "Yes, yes, I know it looks a little green. That's...um...that's how it's supposed to look!"
1006903-31 = "I gave Rumi's cooking a taste."
1006903-35 = "[ns3] \"Th-This flavor...?!\"\n[ns4] \"I can't feel my tongue!\"\n[ns5] \"*cough cough* What's in this...?!\""
1006903-39 = "Okay. That's all right. I'll make a note about this dish..."
1006903-43 = "[ns] \"There's nothing 'all right' about any of this!\""
1006903-44 = "No need to get upset. There are more dishes for you to try."
1006903-48 = "I tried Rumi's next dish."
1006903-52 = "[ns6] \"S-So greasy!\"\n[ns7] \"Too spicy... Can't breathe...\""
1006903-55 = "I see... Just as I expected. Okay, the next dish is the last one."
1006903-56 = "[s] \"Listen, I don't know if I can survive another dish...\""
1006903-57 = "Hahaha! Oh, Sensei. You can't back out now."
1006903-58 = "You've already come so far, and you want to give up halfway?"
1006903-59 = "In for a penny, in for a pound, as they say! It's only fair...right?"
1006903-60 = "Life is full of trials like this one. You're an adult, Sensei. I'm sure you've had your fair share."
1006903-65 = "I tried...Rumi's cooking...again!"
1006903-69 = "[ns8] \"This tastes like...\"\n[ns9] \"Unbelievable! Such harmony of flavor!\""
1006903-72 = "Finally...success."
1006903-73 = "Bitterness isn't an easy flavor to use well."
1006903-74 = "You could cut it with salt, but then you risk the whole dish becoming too salty."
1006903-75 = "So I tried to balance it with fat and spiciness..."
1006903-76 = "The idea is to coat the tongue to cover the bitterness and give your taste buds a little thrill. And it gives the dish a pleasant savor!"
1006903-77 = "Then the spiciness helps cut through the grease quickly, giving you a sense of relief."
1006903-78 = "Based on your reaction, I'd say it worked."
1006903-79 = "[s] \"So this is how you come up with new recipes.\""
1006903-80 = "It is. Maybe it's a bit stubborn of me..."
1006903-81 = "Flavor is such a delicate thing. You never know what combinations are going to work out."
1006903-82 = "So that means lots of trial and error."
1006903-83 = "[s10] \"That's commendable.\"\n[s11] \"I think I know why your club members are suddenly so interested in their studies...\""
1006903-86 = "Hahaha... Well, it's not like I want to torture my fellow students."
1006903-87 = "You don't want to be a taste-tester, either? Hm... Well, I still say it all worked out in the end!"
1006903-88 = "I've got 5 more recipes in mind, based on that last success."
1006903-89 = "I'm sure they'll all be just as delicious as the dish you just tried."
1006903-90 = "So sit tight, because the next course is coming right up!"
1006903-91 = "[s12] \"Oh no, that's okay...\"\n[s13] \"I couldn't eat another bite!\""
1006903-94 = "You don't want any...?"
1006903-95 = "But I'm inspired NOW. If I try making these dishes later, it won't be the same..."
1006903-99 = "Sensei? Where are you going?  "
1006903-101 = "I tried to get away, but in the end, she caught me..."
1006903-102 = "And once again, I was fed plate after plate until I was bursting at the seams..."

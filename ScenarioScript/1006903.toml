1006903-8 = "3;루미;00;어서 와, 선생님! 기다리고 있었어."
1006903-9 = "3;루미;03;기대된다고? 하하하. 너무 크게 기대하지는 마. 그…… 여러 가지로, 쑥스러우니까.\n#3;em;[?]"
1006903-10 = "[s1] \"그런데 생각해 보니까 말이지.\"\n[s2] \"다른 현무상회 학생들에게 도와 달라고 하면 되지 않아?\""
1006903-11 = "#wait;100"
1006903-12 = "#wait;100"
1006903-13 = "3;루미;99;아…… 그게 말이지."
1006903-14 = "3;루미;03;물론 일반적으로 생각하면 그렇긴 하지, 응!\n#3;em;[!]"
1006903-15 = "3;루미;00;그런데 다들 지금은 좀 바쁘다고 할까, 일이 생겨서 여유가 없다고 할까! 뭐 그런 상황이라!"
1006903-16 = "3;루미;03;이것 참, 다들 성실한 학생들이지만, 이럴 때만큼은 협조성이 조금 아쉽다고 해야 하나, 그런 기분이야. 하하하!\n#3;em;[재잘]"
1006903-17 = "[s] (미묘하게 수상한데……)"

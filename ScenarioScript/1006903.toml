[translation]
1006903-1 = "ลองชิมก่อนแล้วค่อยตัดสิน!"
1006903-2 = "ย่านการค้าเทพเต่าดำ"
1006903-3 = "(คุณครูมาหารูมิที่เรียกให้มาที่ย่านการค้าเทพเต่าดำ)"
1006903-8 = "เชิญเลยคุณครู! กำลังรออยู่เลย"
1006903-9 = "ตั้งตารออยู่เลยงั้นเหรอ? ฮ่าฮ่าฮ่า แต่อย่าคาดหวังมากเกินไปนักล่ะ อันที่จริงฉันเองก็รู้สึกเขินๆ อยู่#nเหมือนกันนะ"
1006903-10 = "[s1] \"ว่าแต่ พอมาลองคิดๆ ดูแล้ว...\"\n[s2] \"ทำไมไม่ขอให้สมาชิกย่านการค้าคนอื่นๆ ช่วยล่ะ?\""
1006903-13 = "อ๋อ.. เรื่องนั้นน่ะ"
1006903-14 = "แน่นอนปกติก็คงจะต้องไปขอให้คนอื่นๆ ช่วยนั่นแหละ"
1006903-15 = "แต่ว่าตอนนี้พวกนั้นจะยุ่งๆ กันนิดหน่อย หรือไม่ทำงานกันจนไม่ได้พักเลยน่ะสิ! เรื่องมันก็ประมาณนั้น#nนั่นแหละ!"
1006903-16 = "ทุกคนเป็นเด็กนักเรียนที่ทุ่มเททำงานกันมากๆ เลยนะ แต่จะว่ายังไงดีละ ช่วงนี้ดูแผ่วๆ เรื่องให้ความ#nร่วมมือไปหน่อยน่ะ อารมณ์ประมาณนั้นแหละ ฮ่าฮ่าฮ่า!"
1006903-17 = "[s] (มีบางอย่างไม่ชอบมาพากลแฮะ...)"
1006903-24 = "เอาละ นี่เป็นเมนูแรกนะ คุณครูช่วยชิมแล้วบอกมาหน่อยสิว่าคิดยังไง"
1006903-25 = "ถ้าบอกตามความรู้สึกจริงๆ มาละก็จะดีมากเลย"
1006903-26 = "หืม? สีของอาหารมันเขียวๆ ไปหน่อยเหรอ? เรื่องนั้น... ก็... ฉันตั้งใจให้เป็นแบบนั้นเองแหละ!"
1006903-31 = "(ลองชิมอาหารของรูมิ...)"
1006903-35 = "[ns3] \"ระ... รสชาตินี้มัน...?!\"\n[ns4] \"ขม! ขมจนลิ้นชาเลย!\"\n[ns5] \"แค่กๆ... อันนี้ใส่อะไรไปบ้างเนี่ย?!\""
1006903-39 = "อ่า ว่าแล้วเชียว พอกินแล้วเป็นแบบนี้นี่เอง ดีๆ ขอจดไว้ก่อน..."
1006903-43 = "[ns] \"ครูไม่เห็นว่าดีเลยสักนิด รูมิ!\""
1006903-44 = "เอาละๆ อย่าเพิ่งควันออกหูสิ เมนูต่อไปพร้อมเสิร์ฟแล้วนะ"
1006903-48 = "(ชิมอาหารของรูมิอีกครั้ง)"
1006903-52 = "[ns6] \"ละ... เลี่ยนจัง?!\"\n[ns7] \"เผ็ดจนแทบหายใจไม่ทันเลย!?\""
1006903-55 = "งั้นเหรอ... เมนูนี้ก็ยังเป็นไปตามที่คิดไว้ เอาละ อันนี้เป็นเมนูสุดท้ายแล้ว"
1006903-56 = "[s] \"คือว่า... ครูชักไม่แน่ใจแล้วว่าจะชิมต่อไปได้...\""
1006903-57 = "ฮ่าฮ่าฮ่า ชิมมาตั้งขนาดนี้แล้วก็ชิมๆ ให้ครบเถอะนะ"
1006903-58 = "มันมีคำกล่าวเอาไว้ว่า 'ถ้าจะไปหยุดกลางทาง สู้ไม่ไปเสียยังดีกว่า' อยู่ใช่มั้ยล่ะ?"
1006903-59 = "ทั้งๆ ที่เป็นไปตามคำกล่าวนั้น แต่ทำไมคุณครูกลับรู้สึกไม่ยุติธรรมงั้นเหรอ?"
1006903-60 = "ไม่เป็นไรนะ ไม่เป็นไรๆ ชีวิตคนเรามันก็ย่อมเจอเหตุการณ์แบบนั้นเป็นธรรมดาอยู่แล้วละ คุณครูเป็น#nผู้ใหญ่แล้วน่าจะเข้าใจดีกว่าฉันแหละเนอะ?"
1006903-65 = "(คุณครูลองชิมอาหาร... ของรูมิ!)"
1006903-69 = "[ns8] \"อ๊ะ... เอ๋? รสชาตินี้มัน...?\"\n[ns9] \"เพิ่งเคยกินรสชาตินี้เป็นครั้งแรกเลย...?! กลมกล่อมมาก!\""
1006903-72 = "อย่างนั้นเหรอ... ถือว่าสำเร็จ"
1006903-73 = "การทำอาหารรสขมมันยากมากเลยนะ"
1006903-74 = "ถึงจะใช้เกลือตัดรสขมได้ก็เถอะ แต่มันก็เสี่ยงที่จะทำให้อาหารมีรสเค็มจนเกินไป"
1006903-75 = "ฉันเลยหันมาใช้ไขมันกับรสเผ็ดแทน..."
1006903-76 = "มันจะช่วยเคลือบลิ้นไม่ให้รู้สึกขมเกินไปและให้ความรู้สึกดีต่อประสาทการรับรส แถมยังเพิ่มอรรถรสใน#nการกินด้วยนะ"
1006903-77 = "ฉันปรุงรสชาติเผ็ดกลมกล่อมลงไปในน้ำมัน และทำให้รสเผ็ดมันหายไปอย่างรวดเร็วเพื่อให้เกิดรส#nสัมผัสที่สดชื่นเวลากินน่ะ"
1006903-78 = "พอดูจากอาการของคุณครูแล้ว ฉันคงทำสำเร็จแล้วละ ฮ่าฮ่าฮ่า"
1006903-79 = "[s] \"รูมิพัฒนาอาหารด้วยวิธีนี้เองสินะ\""
1006903-80 = "อื้ม คงเรียกว่าเป็นวิธีเฉพาะหรือความดื้อเฉพาะตัวของฉันน่ะ..."
1006903-81 = "รสชาติน่ะ มันเป็นอะไรที่ละเอียดอ่อนมาก เราต้องลองผสมผสานรสต่างๆ เข้าด้วยกันไปเรื่อยๆ ถึงจะรู้#nผลลัพธ์"
1006903-82 = "ถึงการทดลอง... จะวนเวียนอยู่กับความท้าทายและความผิดพลาดมาตลอดก็เถอะนะ"
1006903-83 = "[s10] \"ครูคิดว่าเธอเก่งมากเลยนะ\"\n[s11] \"พอจะรู้สาเหตุที่นักเรียนคนอื่นๆ ไม่ยอมมาแล้วละ...\""
1006903-86 = "ฮ่าฮ่าฮ่า... ฉันก็ไม่ได้อยากให้พวกเขาลำบากอะไรด้วยแหละ"
1006903-87 = "คุณครูก็ไม่อยากลำบากเหมือนกันเหรอ? อืม... แต่สุดท้ายเราก็ได้อาหารที่ทำสำเร็จมาแล้วนี่ แสดงว่า#nมันได้ผลนะ!"
1006903-88 = "ถ้างั้นถือว่าเป็นการชดเชยหรือให้รางวัลก็แล้วกัน ฉันจะใช้สูตรที่คิดค้นได้นี้ทำอาหารสักห้าเมนูเลย"
1006903-89 = "เราได้รสชาติที่ต้องการแล้ว เพราะงั้นครั้งนี้แค่ใส่ความสร้างสรรค์เฉพาะตัวลงไปเติมรสอร่อยก็พอ"
1006903-90 = "ฉันจะให้คุณครูได้ลิ้มรสความอร่อยพวกนั้นเอง ตั้งตารอได้เลย!"
1006903-91 = "[s12] \"คือว่านะ... รูมิ...\"\n[s13] \"ครูอิ่มจนจะกินไม่ไหวแล้วนะ...\""
1006903-94 = "หืม? เอาไว้ค่อยชิมคราวหน้างั้นเหรอ?"
1006903-95 = "แต่ว่าตอนนี้ฉันได้แรงบันดาลใจมาแล้วนะ... ถ้าไปทำวันอื่นแรงบันดาลใจมันก็อาจจะหายไป..."
1006903-99 = "คุณครู? จะไปไหนล่ะนั่น คุณครู?  "
1006903-101 = "(คุณครูพยายามปลีกตัวออกมาอย่างเนียนๆ แล้ว แต่สุดท้ายก็ไม่รอดอยู่ดี)"
1006903-102 = "(และในครั้งนี้คุณครูก็ถูกให้กินอาหารจนพุงกางเหมือนเช่นเคย...)"

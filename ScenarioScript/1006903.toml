[translation]
1006903-1 = "先試試味道吧！"
1006903-2 = "玄武商會"
1006903-3 = "（收到瑠美的聯絡，來到了玄武商會）"
1006903-8 = "歡迎你，老師！#n謝謝你願意過來。"
1006903-9 = "能讓老師期待我很高興……#n不過那麼期待的話，好像讓人有點害羞……啊哈哈。"
1006903-10 = "[s1]「話說……」\n[s2]「你沒有找其他玄武商會的人幫忙嗎？」"
1006903-13 = "啊～"
1006903-14 = "是有跟他們說過沒錯……"
1006903-15 = "不過大家都說在忙著練習料理！"
1006903-16 = "大家對料理的熱情都是貨真價實的，不過協調性就有點……啊哈哈！"
1006903-17 = "[s]（總覺得有點可疑……）"
1006903-24 = "那麼，首先是第一道料理。"
1006903-25 = "不用有太多顧慮哦。告訴我最直接的感想吧。"
1006903-26 = "嗯？為什麼這道料理看起來綠油油的？#n別擔心，這個顏色是正常的！"
1006903-31 = "（品嚐瑠美的料理）"
1006903-35 = "[ns3]「這，這是……！？」\n[ns4]「好苦！苦到舌頭都……！」\n[ns5]「咳咳。這裡面加了什麼……！？」"
1006903-39 = "啊……果然是這樣嗎。#n好，先記住這個味道哦。"
1006903-43 = "[ns]「老師並不好啊，學生瑠美！」"
1006903-44 = "哎呀哎呀，再陪我一下嘛。"
1006903-48 = "（品嚐下一道料理）"
1006903-52 = "[ns6]「這個油膩程度！」\n[ns7]「還辣到令人窒息！？」"
1006903-55 = "原來如此……不過目前為止還在預期之內。#n來，這是最後一道了唷。"
1006903-56 = "[s]「放過我吧……」"
1006903-57 = "啊哈哈。"
1006903-58 = "別這麼說，陪我到最後的話我會很開心的。"
1006903-59 = "沒問題沒問題。#n我想你一定不會後悔的哦？"
1006903-60 = "而且活著就是會經歷各種事情嘛。#n畢竟老師是大人，一定很清楚這一點吧？"
1006903-65 = "（……做好覺悟後，將筷子伸向最後的料理）"
1006903-69 = "[ns8]「咦，咦……？」\n[ns9]「雖然是第一次嚐到的味道……不過非常好吃！」"
1006903-72 = "呵呵，終於成功了呢。"
1006903-73 = "要活用食材的苦味是相當困難的。"
1006903-74 = "不過……我並不想用鹽來調整味道。"
1006903-75 = "所以我試著在脂肪和辣味上下功夫。"
1006903-76 = "首先為了抑制苦味，要以油脂增加食物的醇厚感……"
1006903-77 = "再加上些許辣味的話，或許就能做出清爽的味道。"
1006903-78 = "從老師的反應來看，我的想法是正確的呢。"
1006903-79 = "[s]「你一直都是這樣研發餐點的啊。」"
1006903-80 = "……這是我個人的堅持。"
1006903-81 = "料理是非常纖細的，光是調味發生些許改變，就會成為完全不同的料理。"
1006903-82 = "……必須反覆經歷挑戰和失敗。#n要說不辛苦也是騙人的。"
1006903-83 = "[s10]「我覺得這樣很了不起哦。」\n[s11]「……玄武商會的學生不在這裡的理由，我好像也明白了。」"
1006903-86 = "啊哈哈，他們有時候也是會來吃的……"
1006903-87 = "反正只要結果是好的就行了，對吧？"
1006903-88 = "我有幾道料理想試著運用這次測試的成果。"
1006903-89 = "既然味道已經確定了，接下來就只剩做出來了！"
1006903-90 = "我會全都讓老師試吃的，敬請期待哦！"
1006903-91 = "[s12]「說到這個……」\n[s13]「其實我已經吃飽了……」"
1006903-94 = "嗯？下次再試吃？"
1006903-95 = "可是，不在靈感逃走前做出來的話……"
1006903-99 = "等等……老師，你要去哪裡？"
1006903-101 = "（雖然打算趁瑠美轉身的空檔逃回去，卻立刻就被發現而以失敗告終）"
1006903-102 = "（即使肚子已經到了極限，也只能試吃接二連三端出的料理……）"

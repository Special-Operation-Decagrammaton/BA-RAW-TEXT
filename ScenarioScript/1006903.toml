1006903-24 = "3;루미;00;자, 첫 번째 요리야. 맛보고 감상을 들려줘.\n#3;closeup\n#3;em;[음표]"
1006903-25 = "3;루미;03;가능한 한 솔직하게 말해 주면 좋겠어.\n#3;closeup"
1006903-26 = "3;루미;07;음? 참 녹색녹색한 요리라고? 그거야…… 뭐…… 의도된 사항이니까! 응!\n#3;closeup\n#3;em;[반짝]"
1006903-27 = "#st;[0,0];instant;1;"

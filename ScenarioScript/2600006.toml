[translation]
2600006-1 = "出乎意料的狀況"
2600006-4 = "啊，老師。謝謝您趕來。"
2600006-5 = "對不起，我沒想到老師會這麼快就過來，"
2600006-6 = "準備的不是很充足……但還是謝謝老師幫忙。"
2600006-7 = "啊，那個，文件現在還放在其他房間。"
2600006-8 = "也可以說是，專門進行文書工作的房間。"
2600006-12 = "請跟我來。"
2600006-24 = "（房間整體而言非常整潔，但也堆放了挺多東西）"
2600006-25 = "（與其說凌亂，不如說這間房間充滿了生活感。"
2600006-29 = "真抱歉……仔細想想，我居然把老師請來這種髒亂的地方……"
2600006-30 = "要不要我們帶著文件移動到其他地方呢……？"
2600006-31 = "[s1] 「沒關係，夏萊偶爾會比這房間還誇張呢。」\n[s2] 「這些難道是，千夏的私人物品……？」"
2600006-32 = "哈哈，這樣啊……謝謝老師體諒。那就在這邊處理吧。"
2600006-33 = "啊，是的，沒錯。"
2600006-34 = "風紀委員會沒什麼人會一起處理這種文書作業……"
2600006-35 = "所以自然而然，我單獨使用這裡的時間就變多了。"
2600006-36 = "有時會來這裡處理工作，有時也會在這裡過夜。"
2600006-40 = "像這張折疊床就是搬來過夜用的。"
2600006-41 = "……夏萊也差不多嗎？"
2600006-42 = "呵呵，真的嗎？確實可能非常相像呢。"
2600006-43 = "那麼……文件在這裡。"
2600006-50 = "（哐──！）"
2600006-54 = "[ns3] 「……你原本預定要一個人處理這些？」\n[ns4] 「……這些是幾年份的文件啊？」"
2600006-55 = "那個……是，沒錯。"
2600006-56 = "這個分量很正常啊……？"
2600006-57 = "不。"
2600006-58 = "是上週的，一週的分量呀……？"
2600006-59 = "需要批核的文件委員長都有處理好了，剩下只要把文件整理分類好就行了。"
2600006-60 = "但也如老師所見是個麻煩的工作……不好意思，能請您幫忙嗎？"
2600006-61 = "[s5] 「可以呀，交給我。」\n[s6] 「這種事我很擅長。」"
2600006-62 = "……謝謝老師。"
2600006-63 = "……謝謝老師。"
2600006-64 = "其實我心裡一直覺得……老師一定會欣然答應。"
2600006-65 = "說起來或許會有些失禮……"
2600006-66 = "但我在煩惱的當下，第一個想到的就是老師。"
2600006-67 = "……咳咳。對不起我離題了。那就麻煩老師幫忙了。"
2600006-69 = "（因為文件數量實在太多，我也打起精神集中在作業上）"
2600006-70 = "（明明只需要按照規則做好整理分類，但在兩人合作下還是花了半天的時間）"
2600006-75 = "……到這邊就結束了。"
2600006-76 = "呼～不知不覺天也黑了呢……"
2600006-77 = "啊，沒有，"
2600006-78 = "請不要在意。"
2600006-79 = "要是沒有老師幫忙，也不會這麼快就處理完這些文件。"
2600006-80 = "……？"
2600006-81 = "啊，老師說這間房間嗎……？謝謝誇獎。"
2600006-82 = "海報嗎……？啊，是的。那些都是我的私人物品……"
2600006-83 = "請問，難道會很奇怪嗎……？"
2600006-84 = "啊，這樣啊……那就好。"
2600006-85 = "聽到老師這麼說，真令人開心。"
2600006-86 = "就像我剛才說的一樣，這間房間堆放了挺多私人物品，所以那個，實質上……"
2600006-87 = "可以說就是，我的房間……"
2600006-91 = "……"
2600006-92 = "[s] 「……？」"
2600006-93 = "……"
2600006-94 = "（在這麼晚的時間，）"
2600006-95 = "（在實質上可說是「我的房間」的空間裡……）"
2600006-96 = "（和老師兩人獨處……？）"
2600006-97 = "[s] 「怎麼了嗎……？」"
2600006-98 = "啊，那個，就是……"
2600006-99 = "……！"
2600006-102 = "― 雖，雖然沒什麼意識到……[wa:2560] "
2600006-105 = "― 不過這個狀況，那個，[wa:1170] "
2600006-107 = "― 該說是有點不太好嗎……[wa:900] "
2600006-110 = "― 那個，老師……？[wa:2530] "
2600006-112 = "― 那個……不說點什麼的話，就是……[wa:3550] "
2600006-115 = "― 再繼續沉默下去的話，[wa:740] "
2600006-117 = "― 反而氣氛會……"
2600006-120 = "― 不，那個，並沒有催促老師的意思……！[wa:1580] "
2600006-122 = "― 我想想，該怎麼說才好呢……[wa:1590] "
2600006-125 = "― 這種時候，該怎麼辦……[wa:1350] "
2600006-128 = "[ns] 「千夏，你還好嗎？你的臉很紅耶，太累了不舒服嗎……？」"
2600006-129 = "― ……呼。[wa:290] "
2600006-131 = "― 不……我沒事，是的。[wa:3100] "
2600006-134 = "― 呵呵。真的是，讓人傷腦筋呢……[wa:2400] "
2600006-136 = "― 到底是為什麼呢，這個。[wa:1580] "
2600006-139 = "― 光是和老師待在一起，[wa:2520] "
2600006-141 = "― 不知為何就沒辦法保持平常心……[wa:670] "
2600006-144 = "― 真的是，傷腦筋呢……[wa:1440] "
2600006-146 = "― 各方面都是……"
2600006-149 = "……對不起，老師。"
2600006-150 = "那個，該說我太早下判定了嗎，想了很多奇怪的事情……"
2600006-151 = "因，因為我不常遇到這種情況……"
2600006-152 = "……您問我還好嗎？"
2600006-153 = "……是的，"
2600006-154 = "謝謝老師關心……"
2600006-158 = "……"
2600006-159 = "[s] 「千夏？」"
2600006-163 = "啊，沒有，沒什麼。我真的沒事……"
2600006-164 = "總之是我自己想太多了……"
2600006-165 = "是的。"
2600006-167 = "果然只有我……有這種感覺嗎？"

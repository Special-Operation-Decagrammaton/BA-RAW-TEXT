[translation]
2600006-1 = "สถานการณ์ที่ไม่คาดคิด"
2600006-4 = "มาแล้วเหรอคะ คุณครู ขอบคุณที่ตอบรับคำขอของฉันค่ะ"
2600006-5 = "อันที่จริง ฉันคิดไม่ถึงเลยว่าคุณครูจะมาเร็วขนาดนี้..."
2600006-6 = "แต่เพราะได้คุณครูช่วยไว้ งานต่างๆ เลยผ่านพ้นไปได้อย่างราบรื่นค่ะ"
2600006-7 = "อ๊ะ พวกเอกสารต่างๆ ไม่ได้อยู่ที่นี่หรอกค่ะ"
2600006-8 = "งานที่ต้องทำก็มีอยู่เยอะมาก และคนอื่นๆ ก็หัวหมุนกันไปหมด... แต่ว่าเราไม่ทำงานที่นี่หรอกนะคะ"
2600006-12 = "ถ้างั้นเชิญทางนี้ค่ะ..."
2600006-24 = "(ภายในห้องพักผ่อนดูเก็บกวาดเป็นระเบียบก็จริง แต่ก็สังเกตเห็นได้ว่ามีบางจุดที่เก็บกวาดไม่หมดอยู่)"
2600006-25 = "(แต่ก็ไม่ได้ดูรกหรือสกปรกอะไร ดูสมกับเป็นพื้นที่ที่มีคนอยู่อาศัยมากกว่า...)"
2600006-29 = "อืม... พอคิดดูอีกทีแล้ว ดูเหมือนฉันจะเชิญคุณครูมาที่สถานที่ที่ไม่เหมาะสมเลยค่ะ"
2600006-30 = "ถ้าไปที่อื่นคงจะดีกว่านี้แท้ๆ ขอโทษด้วยนะคะ"
2600006-31 = "[s1] \"ไม่เป็นไร ที่ชาเล่ต์ก็เป็นแบบนี้แหละ\"\n[s2] \"มีของใช้ส่วนตัวอยู่เยอะเลยนะ?\""
2600006-32 = "อ่ะฮะฮะฮะ... งั้นเหรอคะ ขอบคุณที่เข้าใจนะคะ"
2600006-33 = "อา... ค่ะ ก็ใช่ค่ะ"
2600006-34 = "ในคณะกรรมการวินัย ไม่มีคนช่วยจัดการเรื่องงานเอกสารง่ายๆ อยู่..."
2600006-35 = "เลยกลายเป็นว่าคนที่ใช้ห้องนี้เลยมีแค่ฉันน่ะค่ะ"
2600006-36 = "ตอนที่งานยุ่งๆ หรือว่าต้องอยู่สแตนด์บาย บางครั้งฉันก็ใช้ห้องนี้เป็นห้องพักไปในตัวด้วยค่ะ"
2600006-40 = "เตียงพับอันนี้ก็เอาไว้ใช้ในเวลาแบบนั้นด้วยเหมือนกันค่ะ"
2600006-41 = "คะ...? คุณครูก็มีของคล้ายๆ กันอยู่ที่ชาเล่ต์เหรอคะ?"
2600006-42 = "งะ... งั้นเหรอคะ ฮะฮะฮะ... คงทำงานเหนื่อยมากเลยสินะคะ"
2600006-43 = "ถ้างั้นตอนนี้ก็มาจัดการเอกสารกัน..."
2600006-50 = "(ตึง--!)"
2600006-54 = "[ns3] \"ทำหมดนี่คนเดียวเลยเหรอ?\"\n[ns4] \"เอกสารค้างมากี่ชาติแล้วล่ะนั่นน่ะ?\""
2600006-55 = "คะ? คือว่า... ค่ะ"
2600006-56 = "เวลาบอกว่าต้องจัดการงานที่ค้างอยู่... มันก็จะเยอะประมาณนี้ไม่ใช่เหรอคะ? ที่ชาเล่ต์ไม่ได้เป็นแบบนี้เหรอคะ?"
2600006-57 = "กี่ชาติ...?"
2600006-58 = "เปล่าหรอกค่ะ แค่เอกสารจากช่วงอาทิตย์ที่แล้วอาทิตย์เดียวค่ะ..."
2600006-59 = "เรื่องการอนุมัติการจ่ายเงิน ท่านประธานจะเป็นคนจัดการให้ ฉันก็แค่จัดการแยกประเภทเอกสาร#nก็เท่านั้นค่ะ"
2600006-60 = "ฉันไม่มีคนอื่นที่จะขอให้ช่วยได้อีกแล้ว... แต่ว่ามันก็เสียมารยาทกับคุณครูเกินไปสินะคะ?"
2600006-61 = "[s5] \"มาขอให้ครูช่วยได้ตลอดเลยนะ\"\n[s6] \"งานพวกนี้ครูถนัดอยู่แล้วละ\""
2600006-62 = "อืม... ฉันคิดแล้วว่าคุณครูจะตอบแบบนั้นค่ะ"
2600006-63 = "อืม... ฉันคิดแล้วว่าคุณครูจะตอบแบบนั้นค่ะ"
2600006-64 = "ในใจลึกๆ ฉันก็แอบหวังอยู่ค่ะ ว่าถ้าเป็นคุณครูจะตอบรับด้วยความยินดีแบบนี้ แต่พอเอาเข้าจริงๆ..."
2600006-65 = "ฉันรู้สึกผิดค่ะที่แอบหวังไปแบบนั้น..."
2600006-66 = "แต่ว่าสถานการณ์ตอนนี้มันบังคับ..."
2600006-67 = "ถึงจะละอายใจ แต่ก็ขอรบกวนด้วยนะคะ คุณครู"
2600006-69 = "(ดูจากปริมาณเอกสารแล้วก็คงจะเลี่ยงไม่ได้ คุณครูเลยลงมือทำงานเอกสารทันที)"
2600006-70 = "(แต่การช่วยกันแยกเอกสารอยู่แค่สองคน ทำให้ใช้เวลาไปมากกว่าครึ่งวัน)"
2600006-75 = "ฮู่ว..."
2600006-76 = "ดูเหมือนอันนี้จะเป็นอันสุดท้ายแล้วละค่ะ ดึกขนาดนี้แล้วเหรอเนี่ย..."
2600006-77 = "คะ...? ใช้เวลานานเลยงั้นเหรอคะ?"
2600006-78 = "ไม่หรอกค่ะ ถือว่าไม่นานเท่าไรหรอกค่ะ"
2600006-79 = "ถ้าฉันทำคนเดียว อาจทำไม่เสร็จภายในวันนี้ก็ได้ค่ะ สมแล้วที่เป็นคุณครูค่ะ"
2600006-80 = "คะ...?"
2600006-81 = "ที่ผนังเหรอคะ...? อ๋อ โปสเตอร์ที่ผนังด้านนี้น่ะเหรอคะ?"
2600006-82 = "มันก็แค่ของส่วนตัว...น่ะค่ะ คะ...คุณครูถามถึงมันทำไมเหรอคะ?"
2600006-83 = "หรือว่ามันดูแปลกๆ เหรอคะ?"
2600006-84 = "ไม่ใช่งั้นเหรอคะ?"
2600006-85 = "เฮ้อ ค่อยยังชั่วหน่อยค่ะ ฉันกลัวว่ามันจะดูแปลกๆ ซะอีกค่ะ"
2600006-86 = "อย่างที่บอกไปเมื่อกี้ค่ะ ห้องพักผ่อนนี่ก็เหมือนกับ..."
2600006-87 = "เป็นห้องส่วนตัวของฉันไปแล้ว..."
2600006-91 = "...?"
2600006-92 = "[s] \"...?\""
2600006-93 = "เหมือนเป็น... ห้องส่วนตัว..."
2600006-94 = "และในตอนดึกแบบนี้..."
2600006-95 = "อยู่ที่ห้องที่เหมือนห้องส่วนตัว..."
2600006-96 = "กับคุณครูตามลำพัง..."
2600006-97 = "[s] \"...????\""
2600006-98 = "เอ่อ... อะ.... เอ๊ะ...?"
2600006-99 = "...!!"
2600006-102 = "― ถะ... ถึงฉัน... จะไม่ได้คาดการณ์ถึงสถานการณ์นี้มาก่อน...[wa:800] "
2600006-105 = "― สถานการณ์แบบนี้ คือว่า...[wa:570] "
2600006-107 = "― คือว่ามัน... จะเรียกว่าล่อแหลมดีมั้ยคะ…[wa:10] "
2600006-110 = "― คือว่า... คุณครูคะ...?[wa:1970] "
2600006-112 = "― คือ... ถ้าคุณครูไม่พูดอะไรเลย คือว่า…[wa:2710] "
2600006-115 = "― ถ้าคุณครูไม่พูดอะไรเลยแบบนี้...[wa:10] "
2600006-117 = "― บรรยากาศมันจะดูแปลกๆ..."
2600006-120 = "― เปล่าค่ะ... คือว่า...ฉันไม่ได้อยากจะเร่งนะคะ...![wa:380] "
2600006-122 = "― คือ... ฉันไม่รู้ว่าควรพูดอะไรดี…[wa:830] "
2600006-125 = "― ในเวลาแบบนี้ ควรต้องทำยังไง...[wa:590] "
2600006-128 = "[ns] \"ชินัตสึ...? เป็นอะไรรึเปล่า หน้าแดงๆ นะ เป็นไข้เหรอ...?\""
2600006-129 = "― เฮ้อ…[wa:250] "
2600006-131 = "― เปล่าค่ะ ไม่เป็นไรค่ะ ค่ะ…[wa:2460] "
2600006-134 = "― ฮุฮุ... รู้สึกลำบากใจจังเลยค่ะ…[wa:1760] "
2600006-136 = "― จะว่ายังไงดีล่ะคะ แบบนี้น่ะ…[wa:900] "
2600006-139 = "― แค่ได้อยู่ด้วยกัน... กับคุณครูแบบนี้[wa:1480] "
2600006-141 = "― รู้สึกว่า ฉันไม่เป็นตัวเองเลย...[wa:10] "
2600006-144 = "― ฉัน... รู้สึกลำบากจริงๆ ค่ะ[wa:760] "
2600006-146 = "― หลายๆ อย่างเลย…"
2600006-149 = "ขะ...ขอโทษค่ะ คุณครู..."
2600006-150 = "ทั้งที่ฉันเป็นคนชวนคุณครูมาแท้ๆ แต่ก็ดันมาลุกลี้ลุกลนกับสถานการณ์แบบนี้..."
2600006-151 = "คือว่า... ฉันไม่เคยเจอสถานการณ์แบบนี้บ่อยนัก ก็เลยไม่รู้ว่าจะพูดยังไง..."
2600006-152 = "คะ...?"
2600006-153 = "อะ... อ่า... ไม่เป็นไรงั้นเหรอคะ?"
2600006-154 = "ขอบคุณค่ะ... รู้สึกโล่งใจขึ้นมานิดหน่อยค่ะ"
2600006-158 = "..."
2600006-159 = "[s] \"ชินัตสึ...?\""
2600006-163 = "อืม... ปะ...เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
2600006-164 = "กะ... ก็นั่นน่ะสินะคะ"
2600006-165 = "ค่ะ... คงอย่างนั้นสินะคะ ค่ะ..."
2600006-167 = "คงมีแต่ฉันที่รู้สึก... สินะคะ"

[translation]
2600006-1 = "Unexpected Situation"
2600006-4 = "You're here, Sensei. Thanks for accepting my request."
2600006-5 = "Though I didn't expect you so soon."
2600006-6 = "Work will be much easier thanks to you."
2600006-7 = "But I don't keep the documents here."
2600006-8 = "All that paperwork can be a bit cumbersome, so I don't do it here."
2600006-12 = "Come with me..."
2600006-24 = "The lounge was relatively tidy, with only a little clutter here and there."
2600006-25 = "It wasn't messy so much as it was...lived in."
2600006-29 = "Hm... I'm sorry the place is such a mess."
2600006-30 = "I should have straightened up. I'm sorry..."
2600006-31 = "[s1] \"It's okay. Schale is the same way.\"\n[s2] \"There's a lot of personal stuff here...\""
2600006-32 = "Ahaha... Thank you for understanding."
2600006-33 = "Oh, yeah. Well... I spend a lot of time here..."
2600006-34 = "Nobody in the Prefect Team is willing to help me with the busy work."
2600006-35 = "So I'm pretty much the only one who ever uses this space."
2600006-36 = "When I'm on standby or working late, I come here."
2600006-40 = "The cot's come in handy more than once."
2600006-41 = "Schale is the same, huh?"
2600006-42 = "Well then, ahaha... I guess we both work too hard."
2600006-43 = "Anyway, the documents are right here."
2600006-50 = "*thud*"
2600006-54 = "[ns3] \"You were going to do all this alone?\"\n[ns4] \"How many years of documents are here?\""
2600006-55 = "Well..."
2600006-56 = "Work piles up fast here. I suppose Schale is a little different."
2600006-57 = "Years...?"
2600006-58 = "No, no. This is just the past week."
2600006-59 = "The head prefect already approved them, so we just have to organize everything."
2600006-60 = "I'm sorry. Is this too much? I didn't have anyone else to ask."
2600006-61 = "[s5] \"It's fine. You can ask me for help anytime.\"\n[s6] \"Are you kidding. I'm an expert at this. We'll have it done in no time.\""
2600006-62 = "Hm... I thought you might say that."
2600006-63 = "Hm... I thought you might say that."
2600006-64 = "I mean, I knew you'd agree to help if I asked, but..."
2600006-65 = "I didn't want to be presumptuous."
2600006-66 = "If I'd had any other option, I—"
2600006-67 = "Never mind. Thank you for your help, Sensei."
2600006-69 = "With a backlog that big, there was no time to waste. So we started sorting immediately."
2600006-70 = "It took the better part of a day."
2600006-75 = "*sigh*"
2600006-76 = "That's it for now. Good thing too. It's really late..."
2600006-77 = "Hm? You think that was a lot?"
2600006-78 = "Trust me. This is nothing."
2600006-79 = "Regardless, I never would have finished this tonight if it weren't for you."
2600006-80 = "...Huh?"
2600006-81 = "You want to know about the wallpaper and poster?"
2600006-82 = "Wh-What about them?"
2600006-83 = "You think they're weird, don't you?"
2600006-84 = "Y-You don't?"
2600006-85 = "*sigh* ...I'm glad. You had me worried for a moment there."
2600006-86 = "Like I said before, the lounge has kinda morphed over time."
2600006-87 = "It's more like my home away from home now."
2600006-91 = "...?"
2600006-92 = "[s] \"...?\""
2600006-93 = "It may as well be my home at this point..."
2600006-94 = "Hm... It's late at night..."
2600006-95 = "...and I'm in what's basically my room..."
2600006-96 = "...with Sensei. Just the two of us...alone together..."
2600006-97 = "[s] \"...?\""
2600006-98 = "Uh... Uhhh..."
2600006-99 = "...!"
2600006-102 = "― You know... Now that I think about it... Uh...[wa:1200] "
2600006-105 = "― This situation is... Uh...[wa:530] "
2600006-107 = "― It's a bit... inappropriate...[wa:140] "
2600006-110 = "― Don't you think? Sensei...?[wa:1770] "
2600006-112 = "― Please... Say something... Anything...[wa:2670] "
2600006-115 = "― If you don't say anything...[wa:20] "
2600006-117 = "― It's going to be really awkward..."
2600006-120 = "― Not because of you! I just mean... Ugh! I'm sorry.[wa:300] "
2600006-122 = "― I don't mean to be rude. I just... I don't know what to say...[wa:10] "
2600006-125 = "― OR what to do! Ugh![wa:1030] "
2600006-128 = "[ns] \"Chinatsu? Your face is about 12 shades of red. Are you okay?\""
2600006-129 = "― *sigh*[wa:210] "
2600006-131 = "― Yes, I— I'm fine. Yeah.[wa:2580] "
2600006-134 = "― Heehee... Goodness! I don't know what's come over me.[wa:880] "
2600006-136 = "― What is this feeling?[wa:1180] "
2600006-139 = "― Whenever I'm with you...[wa:1960] "
2600006-141 = "― I'm not myself.[wa:670] "
2600006-144 = "― It's so difficult to explain.[wa:680] "
2600006-146 = "― And for so many reasons..."
2600006-149 = "I-I'm so sorry, Sensei."
2600006-150 = "I asked you to come here, and then I got all flustered."
2600006-151 = "This doesn't normally happen to me. I—"
2600006-152 = "...Huh?"
2600006-153 = "You don't mind?"
2600006-154 = "Thank you. That actually makes me feel a little better..."
2600006-158 = "..."
2600006-159 = "[s] \"...Chinatsu?\""
2600006-163 = "I'm okay. Really. It's nothing."
2600006-164 = "I see now..."
2600006-165 = "Yes, of course."
2600006-167 = "It was all in my head..."

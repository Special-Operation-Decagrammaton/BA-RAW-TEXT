2003902-4 = "3;키사키;11;그리하여, 지금은 유폐된 상태나 다름없다는 것이다!\n#3;a\n#bgshake"
2003902-5 = "[s1] \"갑자기 밑도 끝도 없이?!\"\n[s2] \"도대체 무슨 일로!?\""
2003902-6 = "#wait;10"
2003902-7 = "#wait;10"
2003902-8 = "3;키사키;07;음. 그것은 현룡문 내부의 이런저런 복잡하고 설명하기 귀찮…… 힘든 정치적인 문제와."
2003902-9 = "3;키사키;02;나아가 현무상회와의 세력적 갈등, 산해경의 키보토스에서의 학원적으로서의 입지와 위신.\n#3;em;[반응]"
2003902-10 = "3;키사키;01;그 외에 기준금리의 지속적 상승, 멈추지 않는 증세, 회복될 기미를 보이지 않는 실질 소득 및 공교육 붕괴…… 그 모든 문제들이 한 데 뒤엉켜."
2003902-11 = "3;키사키;99;도저히 탈출구가 보이지 않는 갈등 상황의 극에 다다른 결과물이라고 할 수 있겠지.\n#3;em;[...]"
2003902-12 = "[s] \"전혀 모르겠습니다.\""
2003902-13 = "3;키사키;02;음. 그럴 게다."
2003902-14 = "[s] \"거기서 그런 대답을 하셔도.\""
2003902-15 = "3;키사키;02;때로는 이해보다 행동이 중할 때가 있는 법이다. 그렇지 아니한가?\n#3;em;[?]"
2003902-16 = "3;키사키;07;시선은 하늘을 향하고, 발걸음은 태산과 같이. 하여."
2003902-17 = "3;키사키;11;이 순간부터 선생에게는, 교육자로서 나와 함께 이 상황을 타개할 의무가 부여되었다고 볼 수 있는 것이겠지!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
2003902-18 = "[s] \"요컨대, 여기에서 데리고 나가달라는 뜻……?\""
2003902-19 = "3;키사키;18;음. 이야기가 빠르게 통하는 말벗이란 역시 좋은 것이로구나."
2003902-20 = "3;키사키;02;허나 현룡문 그 자체라고도 볼 수 있는 육화각을, 아무 준비 없이 몰래 빠져나가는 것도 쉬운 일은 아닐 터.\n#3;em;[반응]\n#3;m2"

[translation]
2003902-1 = "Hide-and-Seek in the Old Palace"
2003902-2 = "Genryumon Main Room"
2003902-4 = "I've been confined here!"
2003902-5 = "[s1] \"Suddenly, out of nowhere?!\"\n[s2] \"But why!?\""
2003902-8 = "Hm. It's due to internal Genryumon matters...complex political issues. It'd be a difficult endeavor to explain it all to you."
2003902-9 = "It includes factions like Black Tortoise Promenade, as well as Shanhaijing's dignity, in its position as an academy of Kivotos."
2003902-10 = "In addition, the continuous increase of interest rates and taxes, the lack of recovery in people's incomes, as well as the collapse of public education have all contributed. It is a menagerie of issues, all collapsing upon themselves."
2003902-11 = "We've reached the depths of this conflict, without an exit in sight."
2003902-12 = "[s] \"I don't get it at all.\""
2003902-13 = "Hm. As expected."
2003902-14 = "[s] \"Even that answer. Don't get it.\""
2003902-15 = "At times, action is more important than comprehension. Do you agree?"
2003902-16 = "We must gaze towards the sky and climb the steps of the high mountain."
2003902-17 = "To put it simply, you, as an educator, must rise to your duty and help me overcome these circumstances. Sensei!"
2003902-18 = "[s] \"In short, you want me to get you out of here...?\""
2003902-19 = "Hm. What a blessing, to have a friend who can ascertain my needs with such quickness."
2003902-20 = "However, secretly escaping Rikkagaku, the headquarters of Genryumon itself, would be a fool's errand. Not without a plan."
2003902-21 = "So, naturally, I've prepared one."
2003902-25 = "[ns] \"Is that...?!\""
2003902-26 = "Yes. Here it is."
2003902-34 = "Now then, let us leave here, quietly."
2003902-37 = "Our escape from the main room was successful."
2003902-38 = "But this area appears to be even more dangerous?"
2003902-39 = "While the criticism stings, you are correct, Sensei. This is the very center of Rikkagaku."
2003902-40 = "The patrols here operate on very strict schedules and rotations."
2003902-45 = "Huh...? I'm the only one on duty right now."
2003902-46 = "What's going on? Did I misread the schedule?"
2003902-47 = "No... A Genryumon member entrusted security would have never made such a rookie mistake!"
2003902-48 = "I may not know every detail about every member, but I don't recognize you! Is this a Black Tortoise Promenade covert mission?!"
2003902-49 = "U-Um...!"
2003902-50 = "[ns] \"(Kisaki...is in danger!)\""
2003902-52 = "[ns3] \"Ah! You've met my guard! M-My guide!\"\n[ns4] \"That's what she is! Yep!\""
2003902-55 = "Oh, Sensei? You're here too..."
2003902-56 = "A-Apologies! Please take no offense at my failure to recognize you! I tunnel-visioned on the fact that there appeared to be a mistake in our patrol rotation!"
2003902-57 = "...But if I think about it more, it's a bit strange. Why would you need Genryumon protection in the very heart of Rikkagaku, Sensei?"
2003902-58 = "[s] \"That...That's because...!\""
2003902-59 = "It's an extra security measure, under the guise of protection."
2003902-60 = "Security measure...? Oh!"
2003902-61 = "So that means, this is a secret order, directly from the president...?"
2003902-62 = "That's correct."
2003902-63 = "I-I'm sorry, Sensei!"
2003902-64 = "I'm sure you've gotten acclimated already, but please enjoy everything Genryumon has to offer, to the fullest!"
2003902-68 = "You've helped us overcome the first obstacle. Fufu."
2003902-69 = "Good work, Sensei. If we're able to avoid detection and escape Rikkagaku..."
2003902-70 = "...that would be quite the victory for us."
2003902-72 = "Kisaki's journey to escape confinement(?) continued along that vein..."
2003902-75 = "[ns] \"The head of security is headed this way!\""
2003902-76 = "The news that a Genryumon member is attending to you should have spread all over Rikkagaku by now, Sensei..."
2003902-77 = "Which means that it will be nigh impossible for said Genryumon member to leave the premises."
2003902-78 = "We must employ a different methodology for this case."
2003902-88 = "What?! What's a Black Tortoise Promenade member doing here?!"
2003902-89 = "Get out of here immediately!"
2003902-90 = "Fufu. Just as expected. Shall we run?"
2003902-96 = "We've somehow escaped the heart of Rikkagaku."
2003902-97 = "But a Black Tortoise Promenade member roaming around Rikkagaku Street would garner much suspicion."
2003902-98 = "I must become someone whose presence by your side wouldn't garner a second glance, Sensei."
2003902-99 = "[s] \"Is that even possible?!\""
2003902-100 = "Fufu. Of course. It's..."
2003902-108 = "Hello, Sensei! I'm Kiki! Today, we're walking around outside of the Plum Blossom Garden, right, Sensei?"
2003902-109 = "[s5] \"...\"\n[s6] \"Sure... We'll go with that...\""
2003902-112 = "Yay! Kiki likes Sensei best!"
2003902-119 = "Um, Sensei? Why are you here...? Oh, I see. You're playing with the Plum Blossom Garden children."
2003902-120 = "Thank you for your hard work. And you, don't give Sensei a hard time!"
2003902-121 = "Don't worry! Instructor Shun already told me the same thing!"
2003902-122 = "[s7] \"...\"\n[s8] \"Don't...worry about it...\""
2003902-125 = "All right, thank you."
2003902-126 = "(...Huh? But...)"
2003902-127 = "(Why did a chill just run down my spine...?)"
2003902-130 = "[ns] \"Now...are we reaching our goal? Bit by bit?\""
2003902-131 = "Hm."
2003902-137 = "Fufu. Great work, Sensei."
2003902-138 = "I sincerely appreciate your assistance in my escape play— Ahem! I mean, in escaping my confinement."
2003902-139 = "Huh? Was I really confined?"
2003902-140 = "..."
2003902-141 = "Why would you ask such a thing, Sensei?"
2003902-142 = "It didn't seem like the Genryumon members were really looking for me, in the Rikkagaku or nearby streets...?"
2003902-146 = "I suppose it's no use attempting to hide the truth from you, Sensei."
2003902-147 = "This was all part of my grand play."
2003902-148 = "But it's been quite some time since I've been so entertained."
2003902-149 = "[s9] \"That...means...?!\"\n[s10] \"You tricked me, Kisaki! Tricked me!\""
2003902-152 = "Fufu. Yes, it would appear so."
2003902-153 = "But, Sensei. Genryumon's president...or rather, the student council presidents that reside in each academy..."
2003902-154 = "...they're all confined in their own right, are they not?"
2003902-155 = "Following such logic, every now and again, these presidents require guidance of the \"educational\" sort."
2003902-156 = "[s] \"You can't just throw in the word 'educational' and make everything better!\""
2003902-157 = "Fufu. I suppose you could perceive this as a manipulation to further my interests."
2003902-158 = "Worry not. I shall be sure to repay your kindness—"
2003902-159 = "[s] \"No. I had fun, too.\""
2003902-160 = "I-Is that so...?"
2003902-161 = "Occasionally, you say things that I can find no fitting response to."
2003902-162 = "Then, Sensei..."
2003902-163 = "Just for this day...could we continue our charade?"
2003902-165 = "President! President! Where are you?! President!"
2003902-169 = "Ah. It would appear the absence of Genryumon's president was quickly noticed."
2003902-170 = "I had assumed it would happen, however..."
2003902-175 = "Well then, Sensei. Shall we go?"
2003902-176 = "[s] \"Huh? Where are we going?\""
2003902-177 = "Back to Genryumon, of course."
2003902-178 = "Fufu. Does that invalidate my request to continue our charade?"
2003902-179 = "Of course...if you were to deny me and return, Sensei, I would have no way nor reason to stop you."
2003902-180 = "[s] \"You don't play fair, Kisaki!\""
2003902-181 = "Fufu. I'm aware. But I must take advantage of my presidential privileges, when the circumstances allow for it."
2003902-182 = "Now, then."
2003902-183 = "For our remaining time...I look forward to working with you, Sensei."
2003902-185 = "Just like that, I was confined(?) to Genryumon with Kisaki..."

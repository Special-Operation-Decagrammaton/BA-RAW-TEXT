2003902-56 = "2;현룡문 부원 A;04;죄, 죄송합니다! 알아보지도 못했다고 그렇게 실망하지는 말아 주세요! 순찰 순번에 이상이 생긴 건 아닌지, 그 부분에 너무 집중하는 바람에……!\n#2;em;[!]\n#2;jump"
2003902-57 = "2;현룡문 부원 A;02;어라? 그런데 생각해 보니 또 이상하군요. 선생님께서…… 다른 곳도 아니고 이 육화각 안에서, 저희 현룡문의 호위까지 받을 일이 있었습니까?"

[translation]
2003902-1 = "เล่นซ่อนหาในราชสำนัก"
2003902-2 = "ห้องพัก มังกรดำ"
2003902-4 = "ตอนนี้เราก็ไม่ต่างจากโดนกักขังหรอก!"
2003902-5 = "[s1] \"จู่ๆ ก็เกิดอะไรขึ้นน่ะ?!\"\n[s2] \"มีเรื่องอะไรงั้นเหรอ!?\""
2003902-8 = "อืม เราก็ไม่อยากอธิบายเรื่องภายในที่ซับซ้อนของมังกรดำ... เอาเป็นว่าเรากำลังเจอปัญหาการเมือง#nที่ยากลำบาก"
2003902-9 = "ไหนจะเรื่องความขัดแย้งทางอำนาจกับย่านการค้าเทพเต่าดำ เรื่องตำแหน่งและศักดิ์ศรีของซานไห่จิง#nในฐานะโรงเรียนในคิโวทอส"
2003902-10 = "นอกจากนี้ยังมีเรื่องการเพิ่มขึ้นอย่างต่อเนื่องของดอกเบี้ย เรื่องการขึ้นภาษีที่ไม่หยุดหย่อน เรื่องการ#nศึกษาขั้นพื้นฐานที่ตกต่ำและรายได้ที่ไม่มีแนวโน้มว่าจะดีขึ้น... ปัญหาพวกนี้พันกันยุ่งเหยิงไปหมด"
2003902-11 = "เรียกได้ว่าเป็นผลที่เกิดขึ้นจากความขัดแย้งอย่างสุดขั้วที่ไม่เห็นทางออกเลยละ"
2003902-12 = "[s] \"มีแต่คำยากๆ ทั้งนั้นเลย\""
2003902-13 = "อืม ก็คงจะเป็นเช่นนั้น"
2003902-14 = "[s] \"ตอบอย่างนั้น ครูก็ไม่เข้าใจไปกว่าเดิมหรอกนะ\""
2003902-15 = "บางครั้งการกระทำก็สำคัญกว่าความเข้าใจน่ะ ครูไม่คิดเช่นนั้นหรือ?"
2003902-16 = "เราต้องออกไปมองให้มาก และลงมือทำให้เยอะ"
2003902-17 = "จากนี้ไป ครูจะได้รับหน้าที่ในการช่วยเราหาทางออกของทุกปัญหาในฐานะ#nนักวิชาการศึกษา!"
2003902-18 = "[s] \"สรุปว่าอยากให้พาออกไปจากที่นี่ใช่มั้ย...?\""
2003902-19 = "อืม เป็นเพื่อนคุยที่อ่านสถานการณ์ได้ไวเสียจริง"
2003902-20 = "ทว่าการแอบหนีออกจากอาคารหกเหลี่ยมของมังกรดำโดยไร้การเตรียมการนั้นไม่ใช่เรื่องง่ายๆ เลย"
2003902-21 = "เราก็เลยเตรียมบางอย่างไว้"
2003902-25 = "[ns] \"อย่าบอกนะว่า...!\""
2003902-26 = "ใช่แล้ว เป็นเช่นนั้นละ"
2003902-34 = "เอาละ เราแอบหนีออกไปอย่างเงียบๆ กันเถอะ"
2003902-37 = "หนีออกจากห้องพักมาจนถึงที่นี่ได้อย่างปลอดภัยแล้วสินะ..."
2003902-38 = "มาอยู่ตรงนี้จะยิ่งอันตรายกว่าเดิมอย่างนั้นหรือ?"
2003902-39 = "อืม... มันก็จริงอย่างที่ครูว่า ที่นี่นับได้ว่าเป็นใจกลางของอาคารหกเหลี่ยม"
2003902-40 = "จึงมีการลาดตระเวนอย่างเข้มงวดและเป็นระบบตามตารางเวลาที่กำหนดไว้..."
2003902-45 = "เอ๋...? ตอนนี้เป็นเวรลาดตระเวนของฉันนี่?"
2003902-46 = "อะไรกัน? หรือว่าสมาชิกคนนั้นจะดูตารางมาผิด?"
2003902-47 = "เดี๋ยวนะ... สมาชิกมังกรดำที่ได้รับมอบหมายให้มาลาดตระเวนในจุดที่สำคัญแบบนี้ไม่มีทางทำพลาด#nด้วยเรื่องเล็กๆ น้อยๆ แค่นี้!"
2003902-48 = "เธอเป็นใครน่ะ! อย่าบอกนะว่าเป็นสายลับของย่านการค้าเทพเต่าดำ!?"
2003902-49 = "อะ... อืม...!"
2003902-50 = "[ns] (คิซากิ... กำลังตกอยู่ในอันตราย!)"
2003902-52 = "[ns3] \"อ้อ คนนี้คือ! ผู้คุ้มกันของครูเองน่ะ!\"\n[ns4] \"ใช่แล้ว! คนนี้มาช่วยเป็นไกด์ให้ครูน่ะ!\""
2003902-55 = "อ๊ะ คุณครู? คุณครูก็อยู่ตรงนี้ด้วยเหรอคะ..."
2003902-56 = "ขะ... ขอโทษด้วยค่ะ! ได้โปรดอย่าผิดหวังที่ฉันไม่ทันเห็นคุณครูเลยนะคะ! พอดีฉันเอาแต่สนใจกับ#nลำดับการลาดตระเวนที่แปลกๆ ไปน่ะค่ะ...!"
2003902-57 = "เอ๋? แต่พอมาคิดดูก็ยิ่งแปลกนะคะ! คุณครู... มีธุระที่เข้ามาอยู่ถึงในอาคารหกเหลี่ยม... จนถึงกับต้อง#nได้รับการคุ้มกันจากมังกรดำเลยเหรอคะ?"
2003902-58 = "[s] \"เรื่องนั้นมัน... คือว่า...!\""
2003902-59 = "นี่คือมาตรการรักษาความปลอดภัยรูปแบบหนึ่งค่ะ"
2003902-60 = "มาตรการรักษาความปลอดภัย...? อ๊ะ!"
2003902-61 = "แปลว่านี่คือคำสั่งลับจากท่านประมุขโดยตรงเหรอคะ...?"
2003902-62 = "ใช่ค่ะ"
2003902-63 = "ถะ... ถ้างั้นฉันต้องขอโทษด้วยค่ะ! คุณครู!"
2003902-64 = "ตอนนี้คุณครูอาจจะคุ้นชินกับที่นี่บ้างแล้ว แต่ยังไงก็ขอให้เพลิดเพลินในมังกรดำอย่างเต็มที่เลยนะคะ!"
2003902-68 = "เหมือนจะผ่านไปได้แล้วนะ ฮุฮุ"
2003902-69 = "เหนื่อยแย่เลยนะครู แต่ถ้ายังไม่มีใครจับได้ และเราหนีออกจากอาคารหกเหลี่ยมไปได้ละก็..."
2003902-70 = "ตอนนั้นคงเรียกได้ว่าเป็นชัยชนะของพวกเรา"
2003902-72 = "(และการเดินทางเพื่อหนีออกจากที่กักขัง(?) ของคิซากิก็ดำเนินต่อไป...)"
2003902-75 = "[ns] \"คนที่เฝ้ายามกำลังมาจากทางโน้น!\""
2003902-76 = "ข่าวที่สมาชิกมังกรดำกำลังติดตามครูอยู่คงแพร่ไปทั่วอาคารหกเหลี่ยมแล้วละ..."
2003902-77 = "ในอีกนัยหนึ่งก็แปลว่าสมาชิกมังกรดำที่ติดตามครูอยู่คงออกไปนอกอาคารหกเหลี่ยมได้ยาก"
2003902-78 = "เช่นนั้นเราก็คงต้องใช้วิธีอื่น"
2003902-88 = "เดี๋ยวก่อน?! ทำไมคนจากย่านการค้าเทพเต่าดำถึงมาอยู่ที่นี่!"
2003902-89 = "รีบออกไปจากที่นี่เดี๋ยวนี้นะ!"
2003902-90 = "ฮุฮุ เป็นไปตามคาดเลยนะ รีบหนีไปกันเถอะ"
2003902-96 = "ออกมาจากอาคารหกเหลี่ยมจนได้สินะ"
2003902-97 = "การที่สมาชิกย่านการค้าเทพเต่าดำมาเดินยุ่มย่ามถึงในถนนอาคารหกเหลี่ยมคงเป็นเรื่องไม่เข้าท่านัก"
2003902-98 = "ตอนนี้เราคงต้องสวมบทบาทที่จะทำให้คนอื่นจะไม่สงสัยและอยู่กับครูได้อย่างเป็นธรรมชาติแล้วละ"
2003902-99 = "[s] \"แต่นั่นจะเป็นไปได้เหรอ?!\""
2003902-100 = "ฮุฮุ ย่อมเป็นไปได้อยู่แล้ว และบทบาทที่ว่าก็คือ..."
2003902-108 = "สวัสดีค่ะ คุณครู! คิกิเองค่ะ! วันนี้คุณครูจะพาฉันไปเดินเล่นนอกสวนต้นบ๊วยใช่มั้ยคะ?"
2003902-109 = "[s5] \"จ้ะ...\"\n[s6] \"ก็ได้... เอาตามนั้นแล้วกัน...\""
2003902-112 = "เย้! คิกิชอบคุณครูที่สุดเลยค่ะ!"
2003902-119 = "อ๊ะ คุณครู? มาทำอะไรที่นี่... อ้อ กำลังเล่นกับเด็กๆ สวนต้นบ๊วยสินะคะ"
2003902-120 = "เหนื่อยน่าดูเลยนะคะ เธอก็อย่าดื้อกับคุณครูให้มากล่ะ เข้าใจมั้ย?"
2003902-121 = "ไม่ต้องห่วงค่ะ! ผู้ฝึกสอนชุนก็บอกฉันมาแบบนี้เหมือนกันค่ะ!"
2003902-122 = "[s7] \"......\"\n[s8] \"ไม่ต้องห่วง... จนเกินไปหรอก...\""
2003902-125 = "ค่ะ ถ้างั้นก็รบกวนด้วยนะคะ"
2003902-126 = "(เอ๋...? ว่าแต่...)"
2003902-127 = "(ทำไมจู่ๆ ก็รู้สึกหนาวไปถึงกระดูกสันหลังเลย...??)"
2003902-130 = "[ns] \"ตอนนี้... น่าจะปลอดภัยแล้วนะ...\""
2003902-131 = "อืม"
2003902-137 = "ฮุฮุ เหนื่อยแย่เลยนะ ครู"
2003902-138 = "ขอบคุณที่มาเล่นหนีออกจากราชสำนักเป็นเพื่อนเรา... ไม่สิ ขอบคุณที่ช่วยให้เราออกมาจากที่กักขัง#nได้นะ"
2003902-139 = "หืม? เราถูกกักขังจริงๆ หรือเปล่าน่ะหรือ?"
2003902-140 = "..."
2003902-141 = "ทำไมถึงถามเช่นนั้นเล่าครู?"
2003902-142 = "ในอาคารหกเหลี่ยมและพื้นที่รอบๆ ไม่เห็นว่าจะมีสมาชิกมังกรดำสอดส่องสายตามองหาหรือจับผิดเรา#nเลยอย่างนั้นหรือ...?"
2003902-146 = "อืม จะซ่อนทุกอย่างจากครูไปก็ไร้ประโยชน์"
2003902-147 = "ทุกอย่างเป็นการสวมบทบาทสมมติของเราน่ะ"
2003902-148 = "ทว่าครั้งนี้เราสนุกมากๆ เลยละ"
2003902-149 = "[s9] \"แกล้ง... ครูเหรอ?!\"\n[s10] \"คิซากิหลอกครูเหรอเนี่ย!\""
2003902-152 = "ฮุฮุ สุดท้ายแล้วก็คงเป็นเช่นนั้นนะ"
2003902-153 = "ทว่า... สำหรับตำแหน่งประมุขแห่งมังกรดำ... ไม่สิ ตำแหน่งประธานนักเรียนของแต่ละโรงเรียน#nแล้ว..."
2003902-154 = "การได้อยู่ในตำแหน่งนั้นก็ไม่ต่างจากการถูกกักขังหรอกหรือ?"
2003902-155 = "ในแง่นั้น เราคิดว่าอย่างน้อยก็ควรมีใครบางคนมาแนะนำเกี่ยวกับสถานภาพของประธานนักเรียนเหล่า#nนั้น 'ในเชิงวิชาการ' บ้างนะ?"
2003902-156 = "[s] \"เดี๋ยวเหอะ! มันใช่เรื่องที่จะมาใช้คำว่า 'เชิงวิชาการ' งั้นเหรอ!\""
2003902-157 = "ฮุฮุ สำหรับเรื่องวันนี้ ในอีกแง่หนึ่งก็อาจมองได้ว่าเราใช้ครูเพื่อความเพลิดเพลินของเราสินะ"
2003902-158 = "ไม่ต้องกังวลไปหรอก ไม่ว่าจะด้วยวิธีใด เราก็จะตอบแทนเรื่องวันนี้ให้อย่างแน่นอน"
2003902-159 = "[s] \"ไม่เป็นไรหรอก เพราะครูก็สนุกเหมือนกัน\""
2003902-160 = "ชะ... เช่นนั้นหรือ...?"
2003902-161 = "บางครั้งคำพูดและการกระทำของครูก็ทำเราไปไม่เป็นเลยนะ..."
2003902-162 = "ถ้าเช่นนั้น ครู..."
2003902-163 = "วันนี้มาอยู่กับเรา... แบบนี้ต่อได้มั้ยเล่า?"
2003902-165 = "ท่านประมุข! ท่านประมุข! ท่านอยู่ที่ไหนคะ! ท่านประมุข!"
2003902-169 = "มังกรดำคงรู้กันแล้วสินะว่าประมุขหายไป"
2003902-170 = "แต่เราก็คิดไว้แล้วละว่าต้องเป็นเช่นนี้..."
2003902-175 = "ถ้าเช่นนั้น ครู... เราไปกันเถอะ"
2003902-176 = "[s] \"หืม? ไปไหนเหรอ?\""
2003902-177 = "ก็ต้องไปที่มังกรดำน่ะสิ"
2003902-178 = "ฮุฮุ แต่เราก็ยังขอให้อยู่ด้วยกันอยู่นะ?"
2003902-179 = "แน่นอนว่า... ถ้าครูปฏิเสธคำขอของเราแล้วกลับไป เราก็มีวิธีขัดขวางอยู่แล้ว..."
2003902-180 = "[s] \"คิซากิคนใจร้าย!\""
2003902-181 = "ฮุฮุ อะไรที่คนเป็นประมุขใช้ได้ ก็ย่อมต้องใช้ให้เกิดประโยชน์อยู่แล้ว"
2003902-182 = "เอาละ"
2003902-183 = "สำหรับเวลาที่เหลือของวันนี้... ก็ขอฝากด้วยนะ ครู"
2003902-185 = "(แล้วคุณครูก็โดนกักขัง(?) อยู่ในมังกรดำกับคิซากิ...)"

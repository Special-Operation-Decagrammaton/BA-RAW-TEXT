[translation]
2003902-1 = "九重宮闕中的捉迷藏"
2003902-2 = "玄龍門內堂"
2003902-4 = "因此，妾身現與遭人幽禁並無二致！"
2003902-5 = "[s1]「怎麼沒頭沒尾的！？」\n[s2]「到底發生了什麼！？」"
2003902-8 = "唔呣，此乃因玄龍門之複雜內情而起……難以解釋的政治問題。"
2003902-9 = "攸關與玄武商會之間的勢力糾葛、山海經於奇普托斯學園間的地位和威信……"
2003902-10 = "亦與持續上升的基本利率、節節攀升的稅賦、不見恢復跡象的實質所得，#n以及公共教育的崩潰……以上種種問題相互糾纏。"
2003902-11 = "可說是不見解方的衝突累積至臨界點的結果吧。"
2003902-12 = "[s]「我是有聽沒有懂。」"
2003902-13 = "唔呣，這也不奇怪。"
2003902-14 = "[s]「我這麼回答也沒關係嗎？」"
2003902-15 = "有時行動比理解更重要，不是嗎？"
2003902-16 = "目光望向天空，腳步堅定如泰山。因此──"
2003902-17 = "自即刻起，身為教育者的老師應與妾身一同克服困境！"
2003902-18 = "[s]「總而言之，你的意思是要我帶你離開這裡嗎……？」"
2003902-19 = "能有好溝通的交談對象，真是值得慶幸。"
2003902-20 = "然若是毫無準備，欲悄然逃離可視作玄龍門核心的六和閣絕非易事。"
2003902-21 = "因此，妾身也準備了對策。"
2003902-25 = "[ns]「難道是……！」"
2003902-26 = "不錯，就是這個。"
2003902-34 = "來，趕緊動身吧。"
2003902-37 = "雖已設法自內堂抵達此處……"
2003902-38 = "汝說此處反倒更加危險？"
2003902-39 = "唔呣……真是一針見血的指責。#n此處正如老師所言，可謂六和閣的中心地帶。"
2003902-40 = "隨時皆有人員輪班巡查……"
2003902-45 = "咦……？這個時段的巡查負責人應該是我才對啊？"
2003902-46 = "這是怎麼回事？那個人是不是看錯班表了？"
2003902-47 = "不……能來這裡負責巡查的玄龍門成員，不可能會犯那麼基本的錯誤！"
2003902-48 = "雖然我不知道所有成員的身分，但你是誰！是玄武商會的間諜嗎！？"
2003902-49 = "唔嗯……！"
2003902-50 = "[ns]（妃姬他……有危險！）"
2003902-52 = "[ns3]「啊，他應該說是我的護衛……還是嚮導呢！」\n[ns4]「總之差不多就是這樣！嗯！」"
2003902-55 = "啊，老師？#n這麼說來，居然連老師也在……"
2003902-56 = "恕，恕我失禮了！還請您別為我沒注意到您一事感到失望！#n我只是太專注於確認巡查班表是否有異常……！"
2003902-57 = "咦？不過仔細一想又有點奇怪。#n老師您……究竟有何要事必須在六和閣處理，還由我們玄龍門的人護衛呢？"
2003902-58 = "[s]「這，這個嘛……就是……！」"
2003902-59 = "偽裝成護衛是一種安全措施。"
2003902-60 = "安全措施……？啊！"
2003902-61 = "也就是說，這是門主大人親自下達的機密指示……？"
2003902-62 = "正是如此。"
2003902-63 = "抱，抱歉打擾您了。老師！"
2003902-64 = "或許您已經很熟悉玄龍門了，但還是祝您能在這裡過得愉快！"
2003902-68 = "似乎順利蒙混過關了呢。呵呵。"
2003902-69 = "有勞汝了，老師。#n若能就此逃出六和閣而不被發現……"
2003902-70 = "屆時便是妾身等人得勝。"
2003902-72 = "（於是妃姬的幽禁逃脫(？)依舊持續……）"
2003902-75 = "[ns]「那邊的警衛正在靠近！」"
2003902-76 = "玄龍門的成員正在護送老師的消息，如今應已傳遍整個六和閣……"
2003902-77 = "換言之，負責護送老師的玄龍門成員，將難以到達六和閣之外。"
2003902-78 = "看來得使出其他手段了。"
2003902-88 = "啊！？玄武商會的人怎麼會出現在這種地方！"
2003902-89 = "還不快點給我滾出去！"
2003902-90 = "呵呵，果真不出妾身所料。#n趕緊逃吧。"
2003902-96 = "總算是逃離了六和閣。"
2003902-97 = "但若有玄武商會之人在這六和閣街道上遊蕩，屬實有些異常。"
2003902-98 = "如今需要一名不會遭人懷疑，與老師同行又很自然的角色。"
2003902-99 = "[s]「是這麼說沒錯，不過有辦法嗎！？」"
2003902-100 = "呵呵，當然有。#n那便是……"
2003902-108 = "你好呀，老師！我是妃妃！#n今天是跟老師一起到梅花園外面散步的日子，對吧？"
2003902-109 = "[s5]「…………」\n[s6]「沒錯……你說的對……」"
2003902-112 = "哇～！妃妃最喜歡老師了！"
2003902-119 = "啊，老師？您怎麼會在這裡……？#n啊哈，原來如此。您正在陪梅花園的孩子玩啊。"
2003902-120 = "真是辛苦您了。#n那邊的孩子，記得不可以一直跟老師耍賴喔！"
2003902-121 = "別擔心！旬教官剛才也跟我說過一樣的話！"
2003902-122 = "[s7]「……………………」\n[s8]「不用擔心……沒關係……」"
2003902-125 = "好的，那就麻煩您了。"
2003902-126 = "（……咦？話說……）"
2003902-127 = "（怎麼好像突然覺得背脊發涼……？？）"
2003902-130 = "[ns]「現在……好像已經不用擔心了……？」"
2003902-131 = "唔呣。"
2003902-137 = "呵呵，汝辛苦了。老師。"
2003902-138 = "此次的逃脫遊戲……非也，幽禁逃脫真是多虧了汝的協助。"
2003902-139 = "嗯？妾身是否真的遭到了幽禁？"
2003902-140 = "……"
2003902-141 = "老師，何出此問？"
2003902-142 = "由於六和閣與周圍的街道上……尤其玄龍門的成員似乎皆未找尋妾身……？"
2003902-146 = "也罷，即便試圖向老師隱瞞亦無濟於事吧。"
2003902-147 = "方才的一切，皆是妾身自導自演的狀況劇。"
2003902-148 = "然話雖如此，妾身也許久不曾玩得如此開心了。"
2003902-149 = "[s9]「所以……也就是說！？」\n[s10]「你欺騙了我嗎，妃姬！你居然騙我！」"
2003902-152 = "呵呵，若以結論而言或許確實如此。"
2003902-153 = "然話雖如此，老師。#n玄龍門的門主……非也，各學園的學生會長自某方面而言……"
2003902-154 = "亦可謂是遭到自身所屬學園的幽禁不是嗎？"
2003902-155 = "就這點而言，即便僅是偶爾為之……#n妾身認為基於「教育」之意，應當有人點明諸位學生會長的處境不是嗎？"
2003902-156 = "[s]「哎！居然在這種時候搬出『教育』這個有魔力的關鍵字！」"
2003902-157 = "呵呵。理由姑且不論，此次事件亦可視為妾身為一己之興而利用了老師。"
2003902-158 = "無須擔心。#n無論形式為何，妾身必將為此事做出補償──"
2003902-159 = "[s]「其實沒關係啊？反正我也覺得很有趣。」"
2003902-160 = "真，真是如此……？"
2003902-161 = "汝之言行，有時屬實會令妾身不知該如何是好呢……"
2003902-162 = "那麼，老師。"
2003902-163 = "今日能否就此……陪伴在妾身身旁呢？"
2003902-165 = "門主大人──！門主大人──！#n您到哪去了──！門主大人──！"
2003902-169 = "玄龍門似乎察覺門主不在一事了。"
2003902-170 = "……無妨，這本就在妾身的意料之內。"
2003902-175 = "那麼老師，是時候動身了。"
2003902-176 = "[s]「咦？要去哪裡？」"
2003902-177 = "那自然，非玄龍門莫屬。"
2003902-178 = "呵呵。陪伴妾身的提議，如今依舊有效哦？"
2003902-179 = "當然……若老師執意拒絕，妾身倒也莫可奈何……"
2003902-180 = "[s]「妃姬太狡猾了！」"
2003902-181 = "呵呵。妾身也清楚。#n畢竟身為門主之人，自應使一切適得其所。"
2003902-182 = "那麼──"
2003902-183 = "往後的時間……也有勞汝囉，老師。"
2003902-185 = "（於是就這樣，被迫與妃姬一起回玄龍門遭到幽禁(？)……）"

2003902-47 = "2;현룡문 부원 A;02;아니…… 이곳까지 들어와 순찰을 담당할 만한 현룡문 부원이, 그런 기초적인 실수를 저지를 리 없어!"
2003902-48 = "2;현룡문 부원 A;05;내가 모든 부원의 신상을 파악하고 있는 것은 당연히 아니지만, 너는 누구냐! 혹시 현무상회의 밀정인가!?\n#2;em;[?!]\n#2;jump"

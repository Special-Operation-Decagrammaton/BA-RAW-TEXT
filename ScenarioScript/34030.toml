[translation]
34030-1 = "#title;제3화;감옥 안의 프린세스"
34030-2 = "3;나기사;10;에덴조약 사태 이후, 지금 트리니티 학원의 정세는 굉장히 복잡해졌어요.\n#3;a"
34030-3 = "3;나기사;04;특히 그중에서도, 미카 씨에 대한 여론이 상당히 악화되고 있어요……."
34030-4 = "3;나기사;04;미카 씨는 이미 자신의 지지 세력인 파테르 분파에서 축출되었고, 내일 있을 청문회에서 티파티의 자격도 박탈되는 것이 확정되었어요."
34030-5 = "3;나기사;07;그 과정이나 진실이 어쨌든, 미카 씨는 아리우스 학원과 결탁해서 에덴조약 사태를 가져온 주범이니까요.\n#3;em;…"
34030-6 = "[s] \"……!!\""
34030-7 = "3;나기사;05;이미 탄핵을 요구하는 소요가 벌어지기도 했고, 미카 씨가 있는 감옥 교실 안으로 돌이나 폭탄을 던진다거나……."
34030-8 = "3;나기사;07;학원 게시판에서는 미카 씨에 대한 비난 글이 폭주…… 미카 씨의 방은 온갖 오물과 쓰레기로 가득 차버렸고……."
34030-9 = "3;나기사;99;미카 씨가 쓰던 책과 소지품들은 전부 도난…… 애지중지하게 모았던 옷과 액세서리들은 원인 불명의 화재로 소실……."
34030-10 = "[s] \"……너무 심하잖아!!\""
34030-11 = "3;나기사;04;……네. 정의실현부가 단속하고 있지만, 학원 전체에 팽배한 이 분위기를 막는 것은 불가능에 가까워요.\n#3;em;…"
34030-12 = "[s1] \"…….\"\n[s2] \"그럴 수가…….\""
34030-13 = "3;나기사;10;……미카 씨는 트리니티에서 공공의 적이 되어 있어요."
34030-14 = "3;나기사;10;……미카 씨는 트리니티에서 공공의 적이 되어 있어요."
34030-15 = "3;나기사;99;그 모든 것들이 미카 씨가 받아야 할 마땅한 대가라고 볼 수도 있겠지만……."
34030-16 = "3;나기사;05;……하지만 저는 미카 씨를 변호하고 싶어요. 미카 씨는 분명…… 자신이 저지른 일보다 더 많은 대가를 감당하고 있어요.\n#3;em;[반응]"
34030-17 = "[s3] \"응. 알겠어. 나도 도울게.\"\n[s4] \"내가 할 수 있는 일이 있을까?\""
34030-18 = "3;나기사;02;……네. 고맙습니다. 선생님. 하지만……."
34030-19 = "3;나기사;02;……네. 고맙습니다. 선생님. 하지만……."
34030-20 = "3;나기사;04;정작 미카 씨 본인이…… 자신을 변호할 의사가 없는 것 같아요."
34030-21 = "[s] \"미카가……?\""
34030-22 = "3;나기사;04;미카 씨는 청문회에 참석하지 않으려고 해요. 그녀가 결석한 상태에서 벌어지는 청문회는……. 미카 씨의 퇴학으로 이어지게 될 거예요."
34030-23 = "3;나기사;07;어떻게든 미카 씨를 청문회에 참석시켜야 그것을 막을 수 있지만…… 저로서는 역부족……."
34030-24 = "3;나기사;99;세이아 씨가 있다면 좋겠지만 그녀는 현재 건강이 좋지 않아서 자신의 방에서 나올 수 없는 상태이고……."

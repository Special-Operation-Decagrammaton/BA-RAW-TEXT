34030-90 = "3;미카 비무장;02;나기 쨩은 잘 지내고 있는 거지? ……응, 다행이다."
34030-91 = "3;미카 비무장;09;아마 나기 쨩 옆에 시스터후드와 구호기사단장이 함께 있었지? 불청객 같은 느낌으로?\n#3;em;[반응]"
34030-92 = "3;미카 비무장;08;역시 그렇구나? 권력이라는 건 진공 상태와도 같은 거라서, 티파티의 입지가 옅어질수록 그 주변의 다른 권력들이 치고 들어오거든."

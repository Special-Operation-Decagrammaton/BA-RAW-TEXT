34030-33 = "3;나기사;01;……네. 감사합니다. 분명 선생님이라면…… 미카 씨도 마음을 돌릴 거라고 생각해요."
34030-34 = "3;나기사;01;미카 씨는 선생님의 방문을 기다리고 있는 것 같으니……."
34030-35 = "3;나기사;04;……하아. \n#3;em;[속상함]\n#3;stiff"
34030-36 = "3;나기사;04;이제야 조금 안심이 되네요. 아직 아무것도 해결된 건 없는데도……."

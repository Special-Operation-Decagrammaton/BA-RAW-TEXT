[translation]
34030-1 = "Episode 3; Jailed Princess"
34030-2 = "Since the Eden Treaty incident, the situation at Trinity is...precarious at best."
34030-3 = "The public's opinion of Mika is steadily declining."
34030-4 = "She's already been expelled by her supporters in the Pater faction, and it was confirmed that she'll be dismissed from the Tea Party at the hearing tomorrow."
34030-5 = "People are convinced Mika is the main culprit in colluding with the Arius Academy to bring about the Eden Treaty incident."
34030-6 = "[s] \"...!\""
34030-7 = "There have been riots demanding her dismissal, not to mention stones and even bombs being thrown through her prison window."
34030-8 = "The academy bulletin board was flooded with criticisms about Mika... They've utterly vandalized her room in anger."
34030-9 = "Her clothes and accessories were burned, and her belongings pilfered. The perpetrators haven't been caught."
34030-10 = "[s] \"They're going way too far!\""
34030-11 = "...Yes. The Justice Task Force is doing their best, but we can only do so much against this mob mentality."
34030-12 = "[s1] \"They don't even know the whole story.\"\n[s2] \"I can't believe this...\""
34030-13 = "Mika has become public enemy number one in Trinity."
34030-14 = "Mika has become public enemy number one in Trinity."
34030-15 = "The student body may think all of this is the price Mika must pay, but..."
34030-16 = "The punishment doesn't fit the crime. I want to help her."
34030-17 = "[s3] \"I'll help. Just tell me what to do.\" \n[s4] \"Is there anything I can do?\""
34030-18 = "I thought you would say that."
34030-19 = "I thought you would say that."
34030-20 = "But I don't think Mika is willing to defend herself."
34030-21 = "[s] \"What? Why not?\""
34030-22 = "She refuses to even attend the hearing. If she isn't present... Well, it'll be an automatic expulsion."
34030-23 = "I wish there was something I could do to convince her, but..."
34030-24 = "If Seia were here, I'm sure she could do something... But as you've heard, she's currently bedridden."
34030-28 = "So, I have a favor to ask of you."
34030-29 = "[s] \"Okay. I'll try to convince Mika.\""
34030-33 = "Thank you, Sensei. If it's you, I'm sure she'll listen."
34030-34 = "She won't admit it, but she's been waiting for your visit."
34030-35 = "*sigh* "
34030-36 = "That's at least a little off my plate, even if nothing's been resolved yet."
34030-37 = "[s] \"Are you okay, Nagisa?\""
34030-38 = "Me? Oh, yes..."
34030-39 = "Somehow, I always will be."
34030-40 = "Heehee. I can always count on you to worry about me. Thank you."
34030-41 = "Anyway... Good luck, Sensei.  "
34030-43 = "I said goodbye to Nagisa and went to go see Mika."
34030-46 = "How dare she attack Seia? Bring her out!"
34030-47 = "It's repulsive that the witch is still part of the Tea Party!"
34030-48 = "Hang the traitor!"
34030-50 = "Stay back! D-Don't cross the line!"
34030-51 = "The traitor must pay for her crimes!"
34030-55 = "[ns] \"(Nagisa wasn't exaggerating...)\""
34030-58 = "Mika's Prison Room"
34030-59 = "[ns] \"Mika? It's me.\""
34030-61 = "Oh, Sensei. Shhh."
34030-65 = "[ns5] \"...?\"\n[ns6] \"Is that music?\""
34030-70 = "Sorry to keep you waiting. I had to finish chapel. They broadcast it on the TV, see?"
34030-71 = "Don't you think it's so mean they still make me take classes while I'm in prison?  "
34030-72 = "I thought I'd at least get out of that."
34030-73 = "[s] \"It was beautiful music though.\""
34030-74 = "You really think so? I find it a bit boring. It's just that same strange line on repeat: \"have mercy on us.\""
34030-75 = "Kyrie Eleison... Even the name is lame. Why plead to some guy up there I don't even know exists?"
34030-76 = "And it looks weak to ask for pity, you know."
34030-77 = "But the melody is nice, I'll give you that! It's just an ideological disagreement.  "
34030-78 = "Oh, you know! You've never heard me sing, huh Sensei? Do you want a performance?"
34030-79 = "I don't normally sing for free, but I'll make an exception just for you!"
34030-80 = "Like in the fairy tales where the trapped princess sings to her lover from a tall tower!"
34030-81 = "[s] \"Except we're in prison, not a tower.\""
34030-82 = "And I come crashing back to a harsh reality."
34030-86 = "...So what brings you to my humble abode, Sensei?"
34030-87 = "[s7] \"I heard about the situation, Mika.\"\n[s8] \"Why won't you attend the hearing? Nagisa is worried.\""
34030-88 = "..."
34030-89 = "..."
34030-90 = "How's Nagi been? Is she holding up?"
34030-91 = "The Sisterhood and Remedial Knights leaders showed up uninvited?"
34030-92 = "I'm not surprised. A lack of authority is like a vacuum. As the Tea Party's position diminishes, the lesser forces around it are sucked in."
34030-93 = "I'm sure she didn't expect them to confront the Tea Party so directly like that."
34030-94 = "Poor Nagi. Has her stomach been hurting? It always hurts when she's stressed."
34030-95 = "[s] \"Your safety is her biggest concern. I saw the crowds on my way here.\""
34030-96 = "Ah... You did...  "
34030-97 = "Well, what's a girl to do? I've never been one to care what others think of me anyway."
34030-98 = "Nagi thinks she can defend me if I just attend the hearing, but we both know how naive she is."
34030-99 = "The Eden Treaty incident did a real number on the Tea Party's authority."
34030-100 = "As the public opinion of it dwindles, so does its political power. Obviously, it's my fault."
34030-101 = "And if she really insists on defending me in these conditions..."
34030-102 = "...the Tea Party, along with Nagi and Seia's positions will be at risk."
34030-103 = "They can't shoulder that risk for me."
34030-104 = "I've already cost them too much."
34030-105 = "[s9] \"You'll be expelled if you don't attend.\" \n[s10] \"I heard about your room, and your things.\""
34030-108 = "..."
34030-109 = "[s] \"I think they're going too far.\""
34030-110 = "Y-You think so?"
34030-111 = "I did mess up more than a little bit this time. Even if I get expelled..."
34030-112 = "...E-Even if they burned the precious mementos of me and Nagi's childhood..."
34030-113 = "...None of it erases what I did. And...Seia still hates me..."
34030-114 = "[s11] \"No, Seia could never hate you.\"\n[s12] \"Seia's already forgiven you.\""
34030-115 = "No, you don't understand. I tried to apologize a few times, but she..."
34030-116 = "No, you don't understand. I tried to apologize a few times, but she..."
34030-117 = "The last time I tried..."
34030-120 = "Hi Seia! Looking serious as usual! Did you stay up late again? You have to take better care of your skin. Here, you can use my lotion!"
34030-121 = "..."
34030-122 = "S-Seia?"
34030-123 = "So, um... Actually, I was wondering...  "
34030-124 = "Do you want to eat lunch together? I'm afraid the only thing on the menu in prison is roll cakes though. "
34030-125 = "Nagi is seriously the meanest! Like seriously? Nothing but roll cakes?"
34030-126 = "Mika..."
34030-127 = "Y-Yes?"
34030-128 = "I'm sorry, but I don't have time."
34030-129 = "O-Oh...? Right! Sorry! You're probably really busy!"
34030-130 = "I'm not feeling well. I'm returning to my room."
34030-137 = "[ns] \"Seia...\""
34030-138 = "..."
34030-139 = "Seia's completely isolated herself. She doesn't come out, and no one goes in.  "
34030-140 = "She's always been a bit weak, but she's been really sick these days. "
34030-141 = "And I keep hearing things... Like they can hear her crying in her room..."
34030-142 = "I don't always really get what Seia's thinking or saying, but...  "
34030-143 = "I can tell she doesn't want to make up."
34030-144 = "[s13] \"There must be some misunderstanding.\" \n[s14] \"I promise, Seia really doesn't blame you.\""
34030-145 = "Oh, Sensei. Thanks for trying to make me feel better. I've accepted my consequences..."
34030-146 = "Oh, Sensei. Thanks for trying to make me feel better. I've accepted my consequences..."
34030-147 = "I just wish I could give her a real apology."
34030-148 = "But I don't want to cause her any stress and affect her health..."
34030-149 = "I don't know how I'll go on if anything else happens to Seia."
34030-150 = "[s] \"I'll go check on her for you.\""
34030-151 = "S-Seriously?"
34030-152 = "[s] \"Of course. I want you to have your chance to apologize.\""
34030-153 = "...!"
34030-154 = "[s15] \"Then you, me, Nagisa, and Seia can go to the hearing together!\" \n[s16] \"And the three of us will support you at your hearing!\""
34030-155 = "... "
34030-156 = "... "
34030-157 = "Wh-What are you saying, Sensei? "
34030-158 = "I don't deserve your help or forgiveness."
34030-159 = "I really swore I'd never cry again. Why are you being so kind to me?"
34030-160 = "Well..."
34030-164 = "You win, Sensei."
34030-165 = "Since you insist, I'll have to comply. Time to face the music."
34030-166 = "[s] \"I'm proud of you, Mika. Really.\""
34030-167 = "..."
34030-168 = "I've never really believed in fate... I'd given up on a second chance a long time ago."
34030-169 = "Heehee. Maybe I really am a princess trapped in a tower?"
34030-173 = "Y-You didn't hear that, Sensei!"
34030-174 = "Please take care of Seia, then... Sensei."
34030-176 = "[ns] Go to Seia's room."
34030-181 = "Seia's Infirmary"
34030-183 = "Sensei? Is that you?"
34030-184 = "[s] \"Seia, you're so pale! What's wrong?\""
34030-185 = "Hm? You're...alive? How can that...? Is this a dream? Sensei, a-am I awake? "
34030-186 = "[s] \"What do you mean...?\""
34030-187 = "..."
34030-188 = "Oh, I'm sorry. I was still waking up."
34030-189 = "It slipped my mind. You were meant to visit Trinity today."
34030-190 = "I'm sorry again. The line between my dreams and reality has been so blurred lately."
34030-191 = "The past, present, and future are all tangled up."
34030-192 = "Ah, I'm just babbling."
34030-193 = "[s] \"Everyone is worried about you. What's going on?\""
34030-194 = "Are they?"
34030-195 = "I guess I can't hide it... I'm not doing well."
34030-196 = "If I'm to tell you this, no one else can know, okay?"
34030-197 = "...I've been grappling with an impossible problem."
34030-198 = "[s] \"Okay, I'm listening.\""
34030-199 = "This is unlike anything you and I have ever experienced."
34030-200 = "Please heed my words carefully."
34030-201 = "[s] \"I promise, I will.\""
34030-202 = "I had a...dream some time ago."
34030-203 = "As you know, my dreams are often predictive of the future, as if I've entered a piece of reality destined to happen."
34030-204 = "While these dreams happen often, this one shook me to my core."
34030-205 = "Sensei, I saw the fall of Kivotos."
34030-207 = "Next Episode; Between a Dream and a Mirage"

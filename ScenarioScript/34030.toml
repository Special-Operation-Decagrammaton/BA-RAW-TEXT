[translation]
34030-1 = "第3話;監牢中的公主"
34030-2 = "從伊甸園條約的事件以來，三一綜合學園的情勢就變得相當複雜。"
34030-3 = "特別是對彌香同學的輿論惡化相當嚴重……"
34030-4 = "彌香同學已經被自己所屬的聖父派給驅逐，明天舉行的聽證會也決定要剝奪他茶會成員的資格。"
34030-5 = "畢竟不管過程跟真相如何──彌香同學就是奧利斯分校勾結並引發伊甸園條約事件的主謀。"
34030-6 = "[s] 「……！！」"
34030-7 = "就算在聽證會開始之前，也時常發生要向彌香同學定罪的騷動，也出現了動用私刑，向關著彌香同學的牢房裡丟石頭的學生……"
34030-8 = "在學園的留言板上也全都是對彌香同學的指責……聖父派也只因為是彌香同學曾經所屬的派系就被人冷眼相待……"
34030-9 = "彌香同學用過的書和物品都遭到扣押，珍藏的衣服和飾品也被燒毀……"
34030-10 = "[s] 「竟然會發生這種事……」"
34030-11 = "……實現正義部雖然進行了取締，但要消除這瀰漫在整個學園內的氛圍幾乎是不可能的。"
34030-12 = "[s1] 「……」\n[s2] 「這樣啊……」"
34030-13 = "……彌香同學已經成為三一的公敵了。"
34030-14 = "……彌香同學已經成為三一的公敵了。"
34030-15 = "雖然我可以把這全都當作是彌香同學應該受到的懲罰……"
34030-16 = "……儘管如此，我還是想為彌香同學辯護。因為他已經付出了比犯下的罪更高的代價了。"
34030-17 = "[s3] 「是呀……我也會幫忙的唷。」\n[s4] 「有沒有什麼我能幫上忙的呢？」"
34030-18 = "……嗯，謝謝你，老師。但是……"
34030-19 = "……嗯，謝謝你，老師。但是……"
34030-20 = "彌香同學自己……似乎沒有要為自己辯護的意思……"
34030-21 = "[s] 「彌香他……？」"
34030-22 = "彌香同學似乎不打算出席聽證會。在那種狀態下舉行的聽證會……毫無疑問會得出將他退學的結論吧。"
34030-23 = "但是……我沒有成功說服他出席……"
34030-24 = "雖然聖亞同學或許可以做到……不過他現在已經自顧不暇了。"
34030-28 = "……所以，有件事想拜託你。"
34030-29 = "[s] 「嗯……我會去見彌香一面，想辦法說服他的。」"
34030-33 = "非常感謝。如果是老師出面的話一定……"
34030-34 = "而且彌香同學似乎也在等著老師……"
34030-35 = "……呼。"
34030-36 = "稍微安心一點了。雖然什麼事情都還沒解決……"
34030-37 = "[s] 「渚還好嗎……？」"
34030-38 = "我……？啊啊……"
34030-39 = "我沒事唷……就像往常一樣。"
34030-40 = "……呵呵，現在會擔心我的也就只有老師了呢。謝謝你。"
34030-41 = "那麼……之後的事就拜託你了。"
34030-43 = "（向渚告別，正往彌香所在的地方移動時……）"
34030-46 = "把想要謀害聖亞大人的叛徒交出來！"
34030-47 = "和奧利斯聯手破壞伊甸園條約的罪人竟然會是茶會，不可原諒！"
34030-48 = "罪人就該受罰！定罪！"
34030-50 = "大，大家！請不要跨越這條線！"
34030-51 = "讓叛徒受到懲罰！！讓他付出欺騙我們的代價！！"
34030-55 = "[ns] （真可怕的氣氛……）"
34030-58 = "關著彌香的牢房"
34030-59 = "[ns] 「彌香……？」"
34030-61 = "噓──"
34030-65 = "[ns5] 「……？」\n[ns6] （……好像能微微聽到音樂）"
34030-70 = "……讓你久等了。剛才是禮拜的時間，今天是聽讚美歌的日子。"
34030-71 = "就算在這裡也一定要參加禮拜才行，不覺得有點殘忍嗎？"
34030-72 = "明明沒有必要要求這種事的。"
34030-73 = "[s] 「不過真是首不錯的曲子呢。」"
34030-74 = "是嗎？聽起來不會很無聊嗎？「請寬恕我們」和「請賜予我們憐憫」之類的──"
34030-75 = "[ruby=Kyrie eleison]垂憐經[/ruby]這個名字我也不喜歡。為什麼要依靠這些看不見的存在呢？"
34030-76 = "竟然要說出「請賜予我們憐憫」這種話也太悲慘了吧。這種事不管是對自己還是對別人都不應該做唷。"
34030-77 = "不過曲子我很喜歡唷！雖然歌詞有點微妙就是了。"
34030-78 = "啊對了老師。你沒有聽過我唱歌吧？"
34030-79 = "這可不是隨便就能聽到的，因為是老師才有特別待遇喔，畢竟都特地來找我了嘛！"
34030-80 = "被關在高塔裡的公主向命運的對象唱著小夜曲，怎麼樣？簡直像是故事中才會出現的場景對吧！"
34030-81 = "[s] 「雖然這裡不是高塔而是牢房就是了。」"
34030-82 = "嗚哇，一下就回到現實了……？算了，這也是事實。"
34030-86 = "……所以今天有什麼事呢，老師？"
34030-87 = "[s7]  「事情我都聽說了唷，彌香。」\n[s8]  「你不想參加聽證會是嗎？渚很擔心你的唷。」"
34030-88 = "……"
34030-89 = "……"
34030-90 = "渚醬沒事，對吧？……嗯，那就好。"
34030-91 = "我猜修女會跟救護騎士團的團長都待在渚醬的身邊對吧？"
34030-92 = "……果然是這樣。畢竟茶會的立場越危險，對其他的勢力就越有利。"
34030-93 = "沒想到他們會這麼直接的牽制茶會……"
34030-94 = "……渚醬的壓力肯定很大吧。"
34030-95 = "[s] 「對呀……話說回來，來這裡的時候，我看到廣場上那群人了唷。」"
34030-96 = "啊……嗯，這樣啊。"
34030-97 = "……嘛，畢竟我的立場就跟你看到的一樣。這也沒辦法。"
34030-98 = "渚醬好像覺得我只要出席聽證會的話一切都能圓滿結束……三一可不是這麼天真的地方。"
34030-99 = "……在事件之後，茶會的權威已經跌落谷底。"
34030-100 = "不管是校園內的輿論還是政治上的立場……那也是當然的，畢竟我做出了那種事情。"
34030-101 = "在這種千瘡百孔的狀態下，渚醬越想保護我……"
34030-102 = "「茶會」的……不只是渚醬，就連聖亞醬的立場都會陷入危險的。"
34030-103 = "我不希望他們為了我這種人變成那樣。"
34030-104 = "這全都只是我該付出的代價。"
34030-105 = "[s9]  「不過，可能會被退學的……」\n[s10] 「而且彌香也已經受到很多懲罰了……」"
34030-108 = "……"
34030-109 = "[s] 「已經付出了足夠的代價了不是嗎？」"
34030-110 = "可，可是……"
34030-111 = "……就算這樣，也都是因為我的錯。"
34030-112 = "和渚醬一起收集的，充滿回憶的珍貴寶物好像都被燒掉了呢……"
34030-113 = "儘管這樣，他們還是不願意原諒我……聖亞醬也還恨著我……"
34030-114 = "[s11] 「聖亞並不恨彌香，我可以保證唷。」\n[s12] 「聖亞已經原諒彌香了唷。」"
34030-115 = "……不，不對！不可能……因為，我每次想要道歉的時候都……"
34030-116 = "……不，不對！不可能……因為，我每次想要道歉的時候都……"
34030-117 = "之前見面的時候也是……"
34030-120 = "聖亞醬，今天臉色也不太好呢。沒睡好嗎？皮膚也很粗糙哦？要借你保濕乳液嗎？"
34030-121 = "……"
34030-122 = "那個，聖亞醬……？"
34030-123 = "……那個，如果可以的話……"
34030-124 = "要不要一起吃飯？雖然說是吃飯，不過牢房裡只有蛋糕捲而已就是了！"
34030-125 = "真是的，渚醬真是心胸狹窄，竟然三餐都只給我吃蛋糕捲！"
34030-126 = "……彌香。"
34030-127 = "嗯，嗯？要吃嗎？"
34030-128 = "抱歉，現在有點……"
34030-129 = "啊……我，我想也是。果然，那個……"
34030-130 = "我有點不舒服……抱歉，我先回房間了。"
34030-137 = "[ns] 「聖亞他……？」"
34030-138 = "……"
34030-139 = "聖亞醬最近好像都不從房間裡出來，也不讓任何人進房間……"
34030-140 = "也有傳聞聖亞醬已經只能躺在床上了……他的身體本來就不好。"
34030-141 = "而且，似乎還有些不好的傳聞……像是能從聖亞醬的房間裡聽到啜泣聲之類的……"
34030-142 = "雖然聖亞醬說的話總是很難懂……"
34030-143 = "我想他多半還沒有原諒我吧……"
34030-144 = "[s13] 「聖亞醬確實說過已經原諒彌香了唷。」\n[s14] 「是不是有點誤會呢？」"
34030-145 = "……謝謝你，老師。不過，聖亞醬就算要恨我也沒關係……"
34030-146 = "……謝謝你，老師。不過，聖亞醬就算要恨我也沒關係……"
34030-147 = "畢竟我也還沒好好跟聖亞醬說過「對不起」呢……"
34030-148 = "在這種狀態下，如果因為我害聖亞醬的身體更糟的話……"
34030-149 = "如果聖亞醬又勉強自己的話……我肯定……無法原諒自己的……"
34030-150 = "[s] 「我會去見聖亞的唷。」"
34030-151 = "老，老師嗎……？"
34030-152 = "[s] 「為了讓彌香能好好跟聖亞說聲『對不起』。」"
34030-153 = "……！"
34030-154 = "[s15] 「之後……我跟渚、聖亞、彌香，大家一起」\n[s16] 「大家一起出席明天的聽證會吧！」"
34030-155 = "……"
34030-156 = "……"
34030-157 = "……等，等一下。為什麼要……"
34030-158 = "我，我有被這麼對待的價值嗎……？"
34030-159 = "我……明明發誓不會再哭了，為什麼還……"
34030-160 = "……要對我說這種話呢。"
34030-164 = "……嗯，我知道了。"
34030-165 = "既然老師都這麼說了……我會跟大家一起去聽證會的。"
34030-166 = "[s] 「嗯，謝謝你願意下定決心，彌香。」"
34030-167 = "……"
34030-168 = "……老實說，我以為不會有第二次機會了……不過，這就是命運嗎……"
34030-169 = "果然我是被關在高塔中的公主嗎……？"
34030-173 = "啊……沒，沒什麼唷，老師！"
34030-174 = "那聖亞醬就……拜託你了，老師。"
34030-176 = "[ns] 前往聖亞的房間"
34030-181 = "聖亞的治療室"
34030-183 = "……老師？"
34030-184 = "[s] 「聖亞你還好嗎？臉色不太好唷。」"
34030-185 = "老師……你沒事嗎。不，這或許也是自我滿足的夢吧。是幻影還是虛構呢，或者其實都一樣呢……"
34030-186 = "[s] 「怎，怎麼了嗎……？」"
34030-187 = "……"
34030-188 = "不，似乎並非如此呢……那雙眼睛──"
34030-189 = "……這樣啊。今天是你來三一的日子啊。"
34030-190 = "抱歉。最近的我和以往比起來，夢境和現實的交界似乎更加曖昧……"
34030-191 = "現在、過去、未來……這些不斷地包圍著我，讓我連現在究竟身處何處都難以辨別了。"
34030-192 = "嘛，這些事不用在意也沒關係的……你要這樣理解也可以。"
34030-193 = "[s] 「大家都很擔心你唷，發生什麼事了？」"
34030-194 = "……這樣啊。"
34030-195 = "發生什麼了，要精準回答這個問題有點困難──但是，有一點我可以說。"
34030-196 = "我看見了無法告訴任何人的未來。但是，如果是老師你的話……"
34030-197 = "……願意傾聽我的話嗎？"
34030-198 = "[s] 「嗯，當然了。」"
34030-199 = "從這裡開始，是跟你過去經歷過的事件完全不同種類的……完全不一樣的事。"
34030-200 = "但是拜託你……就算感到荒唐無稽也請你聽下去。"
34030-201 = "[s]「……我知道了。」"
34030-202 = "……不久前，夢的使者告訴了我。"
34030-203 = "可以說是「預知夢」之類的東西──也就是某天將到來的未來的碎片……當然，那只不過是我平常看見的其中一個世界而已。"
34030-204 = "但是，只有那天不同。沒錯，那一天──"
34030-205 = "……我看見了世界，奇普托斯迎來終焉的景象。"
34030-207 = "下一話;於夢與海市蜃樓之間"

34030-70 = "3;미카 비무장;14;……. 응. 미안해, 기다렸지? 채플 수업 중이었거든. TV로 하는 거지만."
34030-71 = "3;미카 비무장;06;감옥에서도 채플 수업만큼은 꼭 들어야 한다니, 너무 가혹하지 않아? \n#3;em;[땀]"
34030-72 = "3;미카 비무장;08;이런 부분은 좀 사정을 봐줘도 좋을 거 같은데 말이지.\n#3;stiff"
34030-73 = "[s] \"그래도 좋은 음악이네.\""
34030-74 = "3;미카 비무장;02;그런가? 지루하지 않아? 자비를 베풀라느니, 우리를 불쌍히 여기라느니 이상한 말들만 계속인데?"
34030-75 = "3;미카 비무장;09;[ruby=Kyrie Eleison]자비송[/ruby]이라니, 이름도 마음에 안 들잖아? 어째서 보이지도 않는 존재에게 애원해야 하는 거야?\n#3;em;[반응]"
34030-76 = "3;미카 비무장;02;자기를 불쌍하게 여겨달라고 해봤자 비참할 뿐이잖아. 그런 건 자기에게도, 남에게도 하면 안 돼."
34030-77 = "3;미카 비무장;03;그래도 노래는 좋아해! 가사는 좀 별로지만. \n#3;hophop\n#3;em;[반짝]"
34030-78 = "3;미카 비무장;02;아, 그러네? 선생님, 내 노래 들어본 적 없지? 나중에 들려줄까?"
34030-79 = "3;미카 비무장;10;원래 공짜로는 안 되지만, 선생님이라면 특별히 괜찮달까, 응! 이렇게 만나러 와 주었으니까!\n#3;em;[음표]\n#3;greeting"
34030-80 = "3;미카 비무장;10;탑에 갇힌 공주님이 운명의 사람에게 세레나데를 불러주는 동화 속 장면 같은 느낌으로!"
34030-81 = "[s] \"탑이 아니라 감옥이지만 말야.\""
34030-82 = "3;미카 비무장;08;우와, 거기서 정곡을……. 뭐, 사실이지만.\n#3;stiff\n#3;em;[땀]"

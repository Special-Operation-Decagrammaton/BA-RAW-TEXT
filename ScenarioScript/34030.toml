[translation]
34030-1 = "ตอนที่ 3;เจ้าหญิงในคุก"
34030-2 = "หลังเกิดเรื่องสนธิสัญญาเอเดน สถานการณ์ในสถาบันทรีนิตี้ก็วุ่นวายขึ้นมากๆ เลยละค่ะ"
34030-3 = "โดยเฉพาะเรื่องความเห็นของคนส่วนใหญ่ที่มีต่อคุณมิกะ ตอนนี้เรียกได้ว่ากำลังแย่เลยค่ะ..."
34030-4 = "กลุ่มปาเตอร์ที่เป็นอำนาจสนับสนุนคุณมิกะก็ไล่เธอออกแล้ว และในการสืบพยานพรุ่งนี้ เธอจะถูกตัดสิทธิ์ในสภาน้ำชาค่ะ"
34030-5 = "เพราะไม่ว่าขั้นตอนหรือความจริงจะออกมาเป็นอย่างไรก็ตาม คุณมิกะก็คือคนผิดที่สมรู้ร่วมคิดกับ#nโรงเรียนอาเรียสจนเกิดเหตุการณ์สนธิสัญญาเอเดนนั่นค่ะ"
34030-6 = "[s] \"......!!\""
34030-7 = "ตอนนี้มีทั้งการร้องเรียนให้ขับออกจากตำแหน่ง ไหนจะมีการปาก้อนหินและระเบิดเข้าไปในห้องเรียนคุก#nที่คุณมิกะอยู่อีก..."
34030-8 = "บนกระดานข่าวของโรงเรียนก็มีแต่ทัวร์ลงคุณมิกะ... ส่วนในห้องคุณมิกะก็เต็มไปด้วยสิ่งสกปรก และขยะค่ะ"
34030-9 = "หนังสือและสัมภาระที่คุณมิกะเคยใช้ก็ถูกขโมยไปทั้งหมด... เสื้อผ้าและเครื่องประดับที่เก็บสะสมมา#nอย่างทะนุถนอมก็หายไปในกองเพลิงที่หาสาเหตุไม่ได้..."
34030-10 = "[s] \"แบบนี้มันเกินไปแล้วนะ!!\""
34030-11 = "ค่ะ... แม้ชมรมทวงความยุติธรรมจะควบคุมเรื่องนี้อยู่ แต่ก็แทบจะเป็นไปไม่ได้เลยที่เราจะยุติ#nบรรยากาศรุนแรงที่เอ่อล้นไปทั่วโรงเรียนแบบนี้ค่ะ"
34030-12 = "[s1] \"......\"\n[s2] \"เป็นไปได้ยังไง......\""
34030-13 = "คุณมิกะกลายเป็นศัตรูสาธารณะของทรีนิตี้ไปแล้วละค่ะ..."
34030-14 = "คุณมิกะกลายเป็นศัตรูสาธารณะของทรีนิตี้ไปแล้วละค่ะ..."
34030-15 = "คนอื่นอาจจะคิดว่าทั้งหมดนี้คือสิ่งที่คุณมิกะสมควรได้รับเพื่อชดใช้สิ่งที่ได้ทำไป..."
34030-16 = "แต่ถึงอย่างนั้นฉันก็อยากแก้ต่างให้คุณมิกะค่ะ เพราะว่าคุณมิกะ... กำลังชดใช้มากเกินกว่าสิ่งที่ตัวเอง#nได้ทำลงไปค่ะ "
34030-17 = "[s3] \"อื้ม ครูเข้าใจแล้ว ครูเองก็จะช่วย\"\n[s4] \"มีอะไรที่ครูพอจะช่วยได้บ้างไหม?\""
34030-18 = "ค่ะ... ขอบคุณนะคะคุณครู แต่ว่า..."
34030-19 = "ขอบคุณนะคะคุณครู แต่ว่า..."
34030-20 = "ในความเป็นจริงแล้ว... ฉันว่าคุณมิกะไม่คิดอยากแก้ต่างให้ตัวเองเลยค่ะ"
34030-21 = "[s] \"มิกะน่ะเหรอ...?\""
34030-22 = "คุณมิกะจะไม่เข้าร่วมการสืบพยานค่ะ และการสืบพยานที่ไม่มีเธอเข้าร่วม... อาจจะนำไปสู่การไล่เธอ#nออกจากโรงเรียนค่ะ"
34030-23 = "ถ้าจะขัดขวางเรื่องนั้น เราก็ต้องทำให้คุณมิกะเข้าร่วมการสืบพยานให้ได้ไม่ว่าจะด้วยวิธีใดก็ตาม... แต่ลำพังฉันคนเดียวคงทำไม่ได้..."
34030-24 = "ถ้าคุณเซอาอยู่ด้วยก็น่าจะดีอยู่หรอกค่ะ แต่ตอนนี้สภาพร่างกายเธอก็ยังไม่สู้ดีนัก จะให้ออกมาจาก#nห้องก็คงไม่ได้ค่ะ..."
34030-28 = "เพราะงั้นคุณครู... ฉันมีเรื่องอยากขอร้อง..."
34030-29 = "[s] \"อื้ม ครูจะลองไปเกลี้ยกล่อมมิกะดู\""
34030-33 = "ค่ะ... ขอบคุณนะคะ ถ้าเป็นคุณครูละก็... ฉันคิดว่าคุณมิกะจะเปลี่ยนใจค่ะ"
34030-34 = "ตอนนี้คุณมิกะคงรอให้คุณครูไปหาอยู่..."
34030-35 = "เฮ้อ... "
34030-36 = "ทีนี้ก็คงเบาใจได้บ้างแล้วค่ะ ถึงจะยังไม่มีอะไรคลี่คลายก็เถอะ..."
34030-37 = "[s] \"แล้วนางิสะล่ะ? จะไม่เป็นอะไรเหรอ...?\""
34030-38 = "ฉันเหรอคะ...? อ๋อ... ค่ะ..."
34030-39 = "ฉันไม่เป็นไรหรอกค่ะ เหมือนทุกครั้งแหละค่ะ"
34030-40 = "ฮุฮุ... คุณครูคือคนคนเดียวที่เป็นห่วงฉันเลยค่ะ ขอบคุณนะคะ"
34030-41 = "ถ้าอย่างนั้น... ฉันขอฝากด้วยนะคะ "
34030-43 = "(คุณครูแยกกับนางิสะและไปพบมิกะ)"
34030-46 = "มิกะพยายามทำร้ายคุณเซอา! เอาตัวคนร้ายออกมาซะสิ!"
34030-47 = "ไม่อยากจะเชื่อเลยว่าคนร้ายที่จับมือกับอาเรียสและทำลายสนธิสัญญาเอเดนคือสภาน้ำชา! แบบนี้เรารับไม่ได้!"
34030-48 = "เอาแม่มดคนนั้นไปแขวนที่จัตุรัสเถอะค่ะ!!"
34030-50 = "ทะ... ทะ... ทุกคนคะ ห้ามเกินเส้นนี้มานะคะ!"
34030-51 = "คนทรยศจะต้องชดใช้!! ชดใช้ที่หลอกลวงพวกเรา!!"
34030-55 = "[ns] (บรรยากาศแบบนี้เองเหรอ...)"
34030-58 = "ห้องเรียนคุกที่มิกะถูกกักตัวอยู่"
34030-59 = "[ns] \"มิกะ...?\""
34030-61 = "ชู่ว รอแป๊บนะคุณครู"
34030-65 = "[ns5] \"......??\"\n[ns6] \"เสียงดนตรี......?\""
34030-70 = "...... อื้ม รอนานรึเปล่า? ขอโทษนะ ฉันกำลังเข้าคลาสสวดมนต์น่ะ เรียนจากทาง TV..."
34030-71 = "ถึงจะอยู่ในคุกแต่ก็ต้องเข้าคลาสสวดมนต์ด้วย โหดร้ายมากเลยเนอะว่าไหม? "
34030-72 = "ถ้าช่วยดูสถานการณ์กันหน่อยก็น่าจะดีเนอะ"
34030-73 = "[s] \"แต่เพลงก็เพราะดีนะ\""
34030-74 = "งั้นเหรอ? ไม่น่าเบื่อหรอกเหรอ? ให้เมตตาเราบ้างละ ให้สงสารเราบ้างละ มีแต่คำแปลกๆ เต็มไปหมด"
34030-75 = "เพลง[ruby=Kyrie Eleison]โปรดทรงเมตตา[/ruby]งั้นเหรอ? แค่ชื่อก็ไม่ถูกใจแล้ว ทำไมถึงต้องอ้อนวอนต่อสิ่งที่มองไม่เห็นด้วยล่ะ?"
34030-76 = "ถึงจะวอนขอให้สงสารตัวเอง แต่สุดท้ายก็มีแต่ความทุกข์ไม่ใช่หรือไง เรื่องแบบนี้จะให้ทำกับตัวเอง หรือคนอื่นก็ไม่ได้ทั้งนั้นนั่นแหละ"
34030-77 = "แต่ฉันก็ชอบทำนองเพลงอยู่หรอกนะ ถึงเนื้อเพลงจะใช้ไม่ได้ก็เถอะ "
34030-78 = "อ้อ จริงสิ คุณครูไม่เคยได้ยินเพลงนี้มาก่อนใช่ไหม? ไว้วันหลังฉันเปิดให้ฟังเอาไหมล่ะ?"
34030-79 = "ปกติให้ฟังฟรีๆ ไม่ได้หรอกนะ แต่ถ้าเป็นคุณครูฉันจะยอมเปิดให้แล้วกัน ก็อุตส่าห์มาหาฉันแบบนี้ไง!"
34030-80 = "แบบฉากหนึ่งในเทพนิยายไง ที่เจ้าหญิงที่ถูกขังในหอคอยร้องเพลงรักในยามราตรีให้กับคนใน#nโชคชะตาของเธอน่ะ!"
34030-81 = "[s] \"แต่นี่มันคุกนะ ไม่ใช่หอคอย\""
34030-82 = "ว้าว จี้จุดกันอย่างนี้เลยเหรอ... ก็นะ มันก็จริงนี่เนอะ"
34030-86 = "ถ้างั้น วันนี้มาหาฉันเพราะเรื่องอะไรเหรอคุณครู?"
34030-87 = "[s7] \"อืม มีเหตุผลให้มาหานิดหน่อยน่ะ มิกะ\"\n[s8] \"นางิสะกำลังเป็นห่วงที่เธอจะไม่เข้าร่วมการสืบพยานนะ\""
34030-88 = "......"
34030-89 = "......"
34030-90 = "นางิจังสบายดีใช่ไหม? ... อืม โล่งอกไปที"
34030-91 = "ชมรมซิสเตอร์กับชมรมอัศวินบรรเทาทุกข์มาหานางิจังใช่ไหมล่ะ? มาเหมือนแขกที่ไม่ได้รับเชิญเลย#nใช่ไหม?"
34030-92 = "เป็นอย่างนี้เองสินะ อำนาจก็เหมือนภาวะสุญญากาศ ยิ่งสถานะของสภาน้ำชาอ่อนแอลง อำนาจอื่นรอบๆ ตัวก็จะยิ่งเพิ่มมากขึ้น"
34030-93 = "เพราะเป็นอย่างนี้ ทั้งสองคนนั้นถึงไปอยู่ที่นั่นไงล่ะ... ไม่นึกเลยว่าจะเข้ามาขัดขาสภาน้ำชาด้วยตัวเอง#nแบบนี้..."
34030-94 = "ฮึ่ม... นางิจังคงจะ... เครียดน่าดูเลยนะ"
34030-95 = "[s] \"ครูเห็นพวกนักเรียนมารวมตัวกันที่จัตุรัสด้วย\""
34030-96 = "อ่อ... อื้ม... "
34030-97 = "ช่างเถอะ ก็มันช่วยไม่ได้นี่นา อีกอย่างฉันก็ไม่ใช่คนที่ใส่ใจคำพูดของคนอื่นอยู่แล้ว"
34030-98 = "นางิจังคงจะคิดว่าทุกอย่างจะคลี่คลายได้หากฉันไปเข้าร่วมการสืบพยาน... แต่นั่นเป็นแค่ความคิดที่#nไร้เดียงสา  "
34030-99 = "...... อื้ม หลังจากเหตุการณ์สนธิสัญญาเอเดน อำนาจของสภาน้ำชาก็ไม่เหมือนเดิม"
34030-100 = "เสียงส่วนใหญ่ของโรงเรียนก็ไม่สู้ดีนัก สถานะทางการเมืองก็ลดลงไปเยอะเลยด้วย แต่มันก็สมควรแล้วละ ก็ฉันไปก่อเรื่องขนาดนั้นไว้นี่นา"
34030-101 = "พอเป็นแบบนี้ แล้วยิ่งนางิจังจะมาแก้ต่างให้ฉันแล้วด้วย..."
34030-102 = "ตำแหน่ง <สภาน้ำชา> ของทั้งนางิจังและเซอาจังอาจจะเป็นอันตรายได้นะ..."
34030-103 = "ฉันจะให้ทุกคนมาเสี่ยงอันตรายเพราะฉันไม่ได้"
34030-104 = "เพราะทั้งหมดนี้คือสิ่งที่ฉันต้องรับผิดชอบ"
34030-105 = "[s9] \"มิกะอาจถูกไล่ออกเลยนะ\" \n[s10] \"ครูได้ยินมาว่าข้าวของของมิกะถูกเผาไปหมดแล้วด้วย\""
34030-108 = "......"
34030-109 = "[s] \"นี่มันเรื่องใหญ่มากจริงๆ นะ\""
34030-110 = "ตะ... แต่ว่า..."
34030-111 = "ฉัน... เป็นคนผิดเอง... ต่อให้โดนไล่ออก..."
34030-112 = "มะ... แม้ว่าข้าวของแห่งความทรงจำที่เก็บสะสมกับนางิจังมาตั้งแต่เด็กๆ... จะถูก... ไฟไหม้ไปหมด..."
34030-113 = "ฉะ... ฉันคง... ไม่ได้รับการยกโทษ... และเซอาจังก็คงจะเกลียดฉันอยู่..."
34030-114 = "[s11] \"ไม่ใช่นะ เซอาไม่ได้เกลียดมิกะ ครูรู้ดี\"\n[s12] \"เซอายกโทษให้มิกะแล้วนะ\""
34030-115 = "มะ... ไม่หรอก... ไม่ใช่อย่างนั้นหรอก... ฉันพยายามจะขอโทษหลายครั้งแล้ว... แต่ทุกครั้งก็..."
34030-116 = "มะ... ไม่หรอก... ไม่ใช่อย่างนั้นหรอก... ฉันพยายามจะขอโทษหลายครั้งแล้ว... แต่ทุกครั้งก็..."
34030-117 = "ครั้งที่แล้ว... ที่ได้เจอกันก็ด้วย..."
34030-120 = "เซอาจัง วันนี้ทำหน้าจริงจังอีกแล้วนะ นอนไม่หลับเหรอ? ผิวก็แย่ลงด้วย เอาโลชั่นบำรุงผิวของฉันไป#nใช้ไหม?"
34030-121 = "......"
34030-122 = "นี่... เซอาจัง...?"
34030-123 = "เอ่อ... คือว่า... ถ้าไม่ติดอะไร... "
34030-124 = "วันนี้ไปกินของหวานกับฉันไหม? ไปกินแยมโรลกัน! ถึงจะในห้องเรียนคุกก็เถอะ... "
34030-125 = "นางิจังนี่ใจแคบจริงๆ ไม่คิดเลยว่าจะทรมานกันแบบนี้เลย อื้ม"
34030-126 = "มิกะ..."
34030-127 = "หืม?"
34030-128 = "ขอโทษนะคะ แต่ตอนนี้ไม่ใช่เวลามาทำอะไรแบบนั้นหรอกค่ะ..."
34030-129 = "งะ... งั้นเหรอ? ก็กะไว้อยู่แล้วแหละ... นี่..."
34030-130 = "ฉันรู้สึกไม่ค่อยสบาย... ขอกลับห้องก่อนนะคะ"
34030-137 = "[ns] \"เซอาน่ะเหรอ...?\""
34030-138 = "......"
34030-139 = "ช่วงนี้เซอาจังไม่ยอมออกจากห้องตัวเอง แถมยังไม่อนุญาตให้ใครเข้าไปเยี่ยมด้วย... "
34030-140 = "มีคนบอกว่าที่เธอทำอย่างนั้นเพราะร่างกายไม่แข็งแรง... ปกติเซอาจังไม่ค่อยแข็งแรงอยู่แล้วน่ะ"
34030-141 = "แต่ที่ฉันได้ยินมามีแต่เรื่องไม่ดี... มีคนบอกว่าได้ยินเสียงร้องไห้ออกมาจากห้องของเซอาจังด้วย..."
34030-142 = "อืม... เพราะเป็นอย่างนี้ฉันถึงไม่อาจเข้าใจเซอาจังได้เลย "
34030-143 = "ฉันคงไม่มีวันถูกยกโทษให้หรอก..."
34030-144 = "[s13] \"ไม่หรอก ครูว่าต้องมีเรื่องเข้าใจผิด\"\n[s14] \"เซอาบอกว่ายกโทษให้มิกะแล้วจริงๆ นะ\""
34030-145 = "ฮ่าฮ่าฮ่า... อื้ม ขอบคุณนะคุณครู ต่อให้เซอาจังโกรธเกลียดฉันก็ไม่เป็นไรหรอก..."
34030-146 = "ฮ่าฮ่าฮ่า... อื้ม ขอบคุณนะคุณครู ต่อให้เซอาจังโกรธเกลียดฉันก็ไม่เป็นไรหรอก..."
34030-147 = "ฉันอยากจะพูดขอโทษเซอาจังสักครั้ง..."
34030-148 = "แต่ถ้าฉันไปก่อปัญหาอะไรจนทำให้สุขภาพของเซอาจังแย่ลงอีกละก็... ฉันคง..."

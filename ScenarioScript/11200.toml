[translation]
11200-2 = "ตอนที่ 20;กรรมการวินัยเข้าร่วมรบ!"
11200-3 = "เมืองอะบิดอสที่ถูกทำลาย"
11200-4 = "ประธาน! มุสึกิ! ฮารุกะ! เราต้องหนีแล้ว! คนพวกนั้นมาแล้วละ!"
11200-5 = "คนพวกนั้น...?"
11200-6 = "พวกคณะกรรมการวินัยเกเฮนน่าไงเล่า! พวกนั้นไล่ตามพวกเรามาถึงที่นี่เลยเหรอเนี่ย แต่ทำไมถึงโผล่มา#nตอนนี้ล่ะ...!"
11200-7 = "เดี๋ยวสิ เลือกเวลาโจมตีได้เหมาะเกินไปไหม?!"
11200-8 = "(ตู้มมมมมมม!)"
11200-9 = "อึ้ก!"
11200-10 = "หนอยยย...."
11200-12 = "(ตู้มมมม!)"
11200-14 = "เป้าหมายนิ่งไปแล้วค่ะ!"
11200-15 = "ดีละ ส่งกองกำลังหน่วยที่ 2 ลงพื้นที่เพิ่มได้"
11200-16 = "อิโอริ แล้วเด็กพวกนั้นจะเอายังไงดีคะ?"
11200-17 = "หืม? นักเรียนจากโรงเรียนนั้นเหรอ? โรงเรียนไหนนะ... อะบิดอสใช่ไหม?"
11200-18 = "มันก็แหงอยู่แล้วไม่ใช่รึไง? พวกที่ขัดขวางการทำงานของส่วนกลางก็ถือเป็นศัตรูทั้งหมดนั่นแหละ"
11200-19 = "ถ้างั้นก็คงต้องขอให้พวกนั้นอยู่กันเงียบๆ แล้วละ... แต่ตามขั้นตอนแล้วเราก็ควรอธิบายสถานการณ์#nของพวกเราให้ฟังก่อน..."
11200-20 = "อธิบายเหรอ? จำเป็นด้วยหรือไง?"
11200-21 = "......"
11200-22 = "แค่ต้องมาตามจับตัวปัญหาของโรงเรียนเราก็เสียดายเวลาจะแย่อยู่แล้ว ถ้าพวกนั้นเข้ามาขวางละก็ ฉันจะ#nซัดให้หมอบรวมกันไปเลย"
11200-23 = "......"
11200-25 = "อะไรเนี่ย? คณะกรรมการวินัยมาจับตัวหน่วยรับจ้างสารพัดเหรอ?!"
11200-26 = "เรื่องนั้นยังไม่รู้หรอกค่ะ... อีกอย่าง คณะกรรมการวินัยก็ไม่ได้ส่งสัญญาณบอกเราว่ามาดีด้วย..."
11200-27 = "ใช่ ยังไงพวกเราก็อยู่ในรัศมีปืนใหญ่ แม้จะไม่ได้ตั้งใจยิงเราโดยเฉพาะก็เถอะ"
11200-28 = "ถ้างั้น..."
11200-29 = "อย่ามาตลกน่า! พวกเราต่างหากที่จะเป็นฝ่ายจัดการพวกหน่วยรับจ้างสารพัดน่ะ! พวกนั้นคิดว่าตัวเองเป็นใคร ถึงเข้ามายุ่งแบบนี้น่ะ!?"
11200-30 = "แต่ว่าคณะกรรมการวินัยเป็นกลุ่มกองกำลังทางการของโรงเรียนอื่น พวกนั้นต่างจากชมรมอย่างหน่วยรับจ้าง#nสารพัดนะคะ!"
11200-31 = "ถ้าเกิดมีอะไรผิดพลาดขึ้นมา อาจทำให้เกิดความขัดแย้งทางการเมืองขึ้นได้..."
11200-32 = "ยังติดต่อหัวหน้าโฮชิโนะไม่ได้อีกเหรออายาเนะจัง?"
11200-33 = "ยังติดต่อไม่ได้เลยค่ะ แต่ไม่เคยติดต่อรุ่นพี่ไม่ได้นานขนาดนี้มาก่อนเลย..."
11200-34 = "...แล้วเราต้องทำยังไงในสถานการณ์นี้เหรอคะ?"
11200-35 = "......"
11200-36 = "......"
11200-37 = "[s] \"จะให้คณะกรรมการวินัยเอาตัวหน่วยรับจ้างสารพัดไปแบบนี้เหรอ?\""
11200-38 = "ตะ... แต่ว่า... เราคงสู้กับคนพวกนั้นไม่ไหว..."
11200-39 = "งั้นจะทำยังไงดีล่ะ คุณครู?"
11200-42 = "ไม่มีทางอื่นแล้ว พวกเราจะต้องขัดขวางคณะกรรมการวินัย"
11200-43 = "ชิโรโกะจัง...?!"
11200-44 = "......"
11200-45 = "ใช่ค่ะ... ถูกต้องแล้ว"
11200-46 = "จริงๆ ความขัดแย้งทางการเมืองเกิดขึ้นตั้งแต่ที่คณะกรรมการวินัย เข้ามาต่อสู้ในเขตปกครองของพวกเรา#nโดยพละการแบบนี้แล้วละค่ะ"
11200-47 = "ทางหน่วยรับจ้างสารพัดเป็นฝ่ายที่สร้างปัญหานี้ขึ้นมาก็จริง..."
11200-48 = "แต่ก็ไม่ได้หมายความว่าพวกคณะกรรมการวินัยจะเข้ามาใช้กำลังในเขตพื้นที่ของพวกเราโดยไม่ได้รับ#nอนุญาตแบบนี้ได้นะคะ"
11200-49 = "พูดถูกแล้วละ! กล้าดียังไง! แบบนี้มันดูถูกโรงเรียนเรานี่นา!"
11200-50 = "คนที่จะลงโทษพวกหน่วยรับจ้างสารพัดคือพวกเราต่างหาก! พวกนั้นต้องชดใช้ที่ทำลายชิบะเซกิ ราเม็ง!"
11200-52 = "......"
11200-53 = "นักเรียนของอะบิดอสเตรียมพร้อมเข้าต่อสู้แล้วค่ะ"
11200-54 = "เฮ้อ น่ารำคาญชะมัด พยายามช่วยกันแค่ไหนก็มีกันแค่สี่คนอยู่ดี ทางเรามีเป็นกองร้อยเลยนะ "
11200-55 = "แต่คณะกรรมการวินัยไม่มีทางหนีการต่อสู้ตรงหน้าอยู่แล้ว ทุกคน! เตรียมพร้อมต่อสู้!"
11200-56 = "ดะ... เดี๋ยวก่อนค่ะ อิโอริ"
11200-57 = "หืม?"
11200-58 = "มีชาวเมืองอยู่ในฝั่งอะบิดอสด้วยค่ะ ฉันกำลังตรวจสอบข้อมูลอยู่ รอก่อนค่ะ..."
11200-59 = "หืม...?!!"
11200-60 = "คนนั้น... หรือว่าจะเป็นคุณครู [USERNAME] จากชาเล่ต์?!"
11200-61 = "ว่าไงนะ? ชาเล่ต์เหรอ...? คืออะไรน่ะ?"
11200-62 = "ดะ... เดี๋ยวก่อนนะคะ ถ้าคุณครูจากชาเล่ต์อยู่กับทางนั้นละก็..."
11200-63 = "ห้ามต่อสู้นะคะ!"
11200-64 = "หมายความว่าไงน่ะ?"
11200-66 = "พวกอะบิดอสบุกเข้ามาแล้ว จะเริ่มการยิงสกัดแล้วนะคะ!"
11200-67 = "(ปังๆๆๆๆๆ!)"
11200-68 = "ฮึ่ม! ช่วยไม่ได้! บุกเลย!"
11200-70 = "อ่า..."

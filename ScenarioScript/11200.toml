[translation]
11200-2 = "第20話;風紀委員會，參戰！"
11200-3 = "被破壞的阿拜多斯市區"
11200-4 = "社長！無月！遙香！快點躲起來！那些傢伙來了！"
11200-5 = "那些傢伙？"
11200-6 = "我們學校風紀委員會的那些人！居然追到這裡來！還偏偏挑這種時候……！"
11200-7 = "不對，就因為是這種時候……！？"
11200-8 = "（咻哐哐哐哐哐──！）"
11200-9 = "呃！ "
11200-10 = "唔……！"
11200-12 = "（轟隆隆隆隆隆！）"
11200-14 = "目標已沉默。"
11200-15 = "很好。步兵，第2小隊突擊。"
11200-16 = "……伊織，那些人怎麼辦？"
11200-17 = "嗯？那邊的學生？我記得是……阿拜多斯？"
11200-18 = "那還用說？膽敢妨礙執行公務的全是敵人。"
11200-19 = "只能希望他們不要輕舉妄動了……#n不過我認為應該先說明一下這邊的情況……"
11200-20 = "說明？有必要嗎？"
11200-21 = "……"
11200-22 = "光是想到為了抓那群問題學生所花的勞力都覺得可惜。#n就算他們是外人，只要膽敢妨礙我們就直接一起解決。"
11200-23 = "……"
11200-25 = "搞，搞什麼？風紀委員會是來抓走便利屋這些傢伙的嗎！？"
11200-26 = "目前還不清楚……但他們並沒有對我們釋出善意。"
11200-27 = "沒錯。雖然對方並沒有直接瞄準我們……但我們也在砲擊範圍內。"
11200-28 = "怎麼這樣……"
11200-29 = "開什麼玩笑啊！便利屋是我們的獵物！到底想怎樣！"
11200-30 = "但是格黑娜的風紀委員會，和其他學園的武裝集團、便利屋等社團的性質是不同的！"
11200-31 = "一不小心的話，可能會變成政治紛爭的導火線也說不定……"
11200-32 = "綾音醬，還沒有聯絡上星野前輩嗎？"
11200-33 = "……是。平常應該不會聯絡不上才對……"
11200-34 = "這個狀況……我們該怎麼辦才好呢？"
11200-35 = "……"
11200-36 = "……"
11200-37 = "[s]「就這樣把便利屋移交給風紀委員會嗎？」"
11200-38 = "這……可是也不能因此和他們開戰……"
11200-39 = "那要怎麼做？"
11200-42 = "沒有其他選項了，阻止風紀委員會吧。"
11200-43 = "白子醬……！？ "
11200-44 = "……"
11200-45 = "……是，說得沒錯。"
11200-46 = "從風紀委員會在我們的自治區發動作戰的時間點開始，就已經發生政治紛爭了……"
11200-47 = "雖然問題明顯是由便利屋的各位所引起……"
11200-48 = "但即便如此──#n這也不代表其他學園的風紀委員會可以不經我們的許可，擅自來這裡肆意妄為。"
11200-49 = "說的沒錯！竟敢做出這種事！#n這顯然是在無視我們學校的權利！"
11200-50 = "負責懲罰便利屋的人是我們！#n必須讓他們付出破壞柴關拉麵的代價！"
11200-52 = "……"
11200-53 = "阿拜多斯的學生們已進入備戰狀態。"
11200-54 = "唉，真麻煩，他們不過才4個人而已。#n我們這邊可是有一個中隊的兵力啊。"
11200-55 = "不過身為風紀委員，可不能逃避找上門來的戰鬥。所有人備戰！"
11200-56 = "……請，請等一下。伊織。"
11200-57 = "嗯？"
11200-58 = "阿拜多斯那邊有一般民眾的身影。#n目前還在確認當中，請稍等一下。"
11200-59 = "咦……！？"
11200-60 = "……那，那位是……該不會是夏萊的[USERNAME]老師！？"
11200-61 = "嗯？夏萊？那是什麼？"
11200-62 = "……請，請等一下。如果夏萊的老師在那裡的話……"
11200-63 = "……這場戰鬥不能打！"
11200-64 = "怎麼回事？"
11200-66 = "阿拜多斯正在接近。開火！"
11200-67 = "（噠噠噠噠噠噠噠──！！）"
11200-68 = "呿，沒辦法。上吧！"
11200-70 = "啊……"

[translation]
11200-2 = "Episode 20;The Prefect Team Goes to War!"
11200-3 = "Destroyed Downtown Abydos"
11200-4 = "Boss! Mutsuki, Haruka! We have to get out of here! It's them!"
11200-5 = "Who's \"them\"?"
11200-6 = "The Gehenna Prefect Team is here! Have they been tracking us all this time? And why now..."
11200-7 = "No, wait. This might be them picking the perfect time to attack!"
11200-8 = "*KA-BLAM*"
11200-9 = "Gah! "
11200-10 = "Damn it..."
11200-12 = "(collapse)"
11200-14 = "Targets neutralized."
11200-15 = "Good. Squads one and two, move in."
11200-16 = "What about the others, Iori?"
11200-17 = "You mean the students from that school? What was it called again...?#nAbydos?"
11200-18 = "Do you really need to ask? Anyone who interferes with the execution of official duties is an enemy."
11200-19 = "Then let's hope they stay out of our way...but procedure dictates that we state our intentions first."
11200-20 = "What for? Is it even necessary?"
11200-21 = "..."
11200-22 = "It's tiring enough already, going after all these loser delinquents from our academy. Why waste the time or effort? Just wipe them out with the rest if they put up a fuss."
11200-23 = "..."
11200-25 = "Is the Prefect Team here to take those Problem Solver kids into custody?!"
11200-26 = "I'm not sure yet... And they're not exactly acting like friendlies, either."
11200-27 = "Yeah. They weren't targeting us specifically, but we were still in their bombardment zone."
11200-28 = "Geez... "
11200-29 = "Fat chance we'll allow it! Those Problem Solver scumbags are ours!#nWho the hell do they think they are?!"
11200-30 = "Dealing with the Prefect Team and some small-time crooks like Problem Solver couldn't be any more different. They're the official armed forces of their academy."
11200-31 = "This might escalate into a political conflict if we're not careful..."
11200-32 = "Ayane, is there still no word from Hoshino?"
11200-33 = "No. She's never been out of contact for this long before..."
11200-34 = "So...what should we do here?"
11200-35 = "..."
11200-36 = "..."
11200-37 = "[s] \"Then are you going to hand Problem Solver over to them, just like that?\""
11200-38 = "B-But we can't fight them head on...can we?"
11200-39 = "I get what you're asking us, but what are we supposed to do about it?"
11200-42 = "We must be of one mind on this. We have to take down the Prefect Team."
11200-43 = "Shiroko?! "
11200-44 = "..."
11200-45 = "She's right."
11200-46 = "The Prefect Team escalated this into a political conflict the moment they commenced tactical operations here in our district. "
11200-47 = "Yes, those Problem Solver geeks may have started this mess..."
11200-48 = "...but that doesn't give the disciplinary board of another academy carte blanche to project force in our jurisdiction without our say-so."
11200-49 = "Yeah, that's right! How dare they? They're basically spitting in our faces!"
11200-50 = "We're the ones who're going to take Problem Solver down! I'm gonna make sure they pay for what they did to Shiba Seki Ramen!"
11200-52 = "..."
11200-53 = "The Abydos students are preparing for battle."
11200-54 = "*sigh* They want to do this the hard way, huh? Even though it's only four of them against our entire brigade?"
11200-55 = "But the Prefect Team standing down from a fight is out of the question.#nAll units, prepare for combat!"
11200-56 = "Wait. Hold a moment, Iori."
11200-57 = "Huh?"
11200-58 = "A civilian has been sighted on the Abydos side. One moment while we confirm..."
11200-59 = "Wait...!"
11200-60 = "That person over there. Could it be...? [USERNAME] Sensei from Schale?!"
11200-61 = "Huh? Schale? What's that?"
11200-62 = "W-Wait a minute. If Schale is working with them, then..."
11200-63 = "We can't! We mustn't engage!"
11200-64 = "What are you on about?"
11200-66 = "The Abydos students are headed our way. Open fire!"
11200-67 = "*ratta-tat-tat-tat-tat-tat-tat-tat*"
11200-68 = "Tch! They're not going to give us any other choice!#nEngage in combat! "
11200-70 = "*sigh*..."

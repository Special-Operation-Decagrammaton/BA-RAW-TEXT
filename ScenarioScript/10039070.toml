[translation]
10039070-1 = "ตอนที่ 7;แอนทีก เซราฟิม บีกินนิง"
10039070-3 = "[log=마리]\"ทุกคนหยุดสู้กันเถอะค่ะ!\"[/log]"
10039070-8 = "ใครกันคะ...?"
10039070-9 = "คะ... คุณครูก็มาด้วยเหรอ...!?"
10039070-11 = "คุณครู...? คุณมารี...?"
10039070-12 = "ทำไมถึงมาอยู่ที่นี่..."
10039070-13 = "ไม่สิ ที่สำคัญกว่านั้นคือ... ทำไมถึงไปขี่มอเตอร์ไซค์...?"
10039070-18 = "ฉะ... ฉันไม่รู้รายละเอียดหรอกนะคะ...! แต่ทุกคนจะสู้กันไม่ได้ค่ะ!"
10039070-19 = "ถอยออกมาคนละก้าว แล้วแก้ไขปัญหาด้วยการพูดคุยกันเถอะค่ะ! ฉันพาคุณครูมาที่นี่ด้วยแล้วค่ะ!"
10039070-20 = "วันนี้เป็นวันที่ดีไม่ใช่เหรอคะ? วันนี้อยู่ในช่วงของ <ทรีนิตี้คาร์นิวัล> ที่เป็นสัญลักษณ์ของความสามัคคี และความเข้าใจซึ่งกันและกันไม่ใช่เหรอคะ?"
10039070-21 = "ช่วยวางปืนลงและพูดคุยกันด้วยความเข้าใจเถอะค่ะ...!!"
10039070-22 = "[ns1] \"ทุกคนใจเย็นก่อน! แล้วก็วางปืนลงด้วย!\"\n[ns2] \"บอกครูได้ไหมว่าเกิดเรื่องอะไรขึ้น?\""
10039070-25 = "อะ... อืม..."
10039070-26 = "เป็นเรื่องลำบากแล้วสินะคะ ฉันไม่อยากให้คุณครูได้เห็นด้านนี้ของฉันสักเท่าไรน่ะค่ะ"
10039070-27 = "ถ้าจะให้อธิบายก็คงจะยาว แต่ว่า... ค่ะ ก็ได้ค่ะ คุณครูก็ไม่ใช่ใครอื่น ดังนั้นฉันควรจะบอกให้ทราบค่ะ"
10039070-28 = "นี่คือ... ปัญหาสำคัญของทรีนิตี้..."
10039070-29 = "มารี...!!"
10039070-30 = "มาได้จังหวะเลยค่ะ มารี! ฉันว่าจะขอให้คุณมาที่นี่อยู่พอดีเลยค่ะ"
10039070-31 = "...?"
10039070-32 = "อะไรกัน...???"
10039070-34 = "...?"
10039070-35 = "คะ... คะ? ฉะ... ฉันเหรอคะ...?"
10039070-36 = "ใช่ค่ะ เรื่องนี้ฉันต้องฟังความคิดเห็นจากมารีน่ะค่ะ"
10039070-43 = "...!!"
10039070-44 = "น่าตกใจจริงๆ นะคะ เพราะฉันเองก็คิดแบบเดียวกันอยู่เลย"
10039070-45 = "ฮุฮุ ไม่ใช่แค่ฉันที่คิดอย่างนั้นสินะคะ..."
10039070-47 = "คิดแบบเดียวกัน... งั้นเหรอคะ...?"
10039070-48 = "ขะ... ขอโทษนะคะ... หมายความว่ายังไงเหรอคะ... ฉันไม่เห็นเข้าใจ..."
10039070-50 = "ฮุฮุ..."
10039070-51 = "นี่คือข้อสรุปที่ฉันได้หลังจากไปคิดทบทวนมาค่ะ แน่นอนว่าถ้าหัวหน้ามิเนะก็มีความคิดตรงกันนะคะ..."
10039070-55 = "มารี..."
10039070-56 = "คุณมารี"
10039070-57 = "ถ้าไม่ว่าอะไร ช่วยมาเป็นผู้นำ/ลีดเดอร์ของพวกเราให้หน่อยได้มั้ยคะ...?"
10039070-59 = "ค่ะ...!?!?"
10039070-60 = "...!?"
10039070-61 = "[ns3] \"มารีด้วยเหรอ...!?\"\n[ns4] \"ผู้นำ!? ลีดเดอร์!?\""
10039070-64 = "ที่ผ่านมาพวกฉันเอาแต่ให้ความสำคัญกับการฝึกฝน ก็เลยไม่ได้ใส่ใจความรู้สึกส่วนตัวของมารีค่ะ พวกฉันอยากขอโทษในความผิดพลาดนี้ค่ะ"
10039070-65 = "ฉันเพิ่งคิดได้ว่าคนที่มาช่วยพวกเราเตรียมแผนงานนั้นสนุกกับการทำสิ่งนี้มากกว่าพวกเราเสียอีกค่ะ"
10039070-66 = "ที่จริงแล้วมารี... เหมาะสมกว่าพวกเรามาก..."
10039070-67 = "โดยพื้นฐานแล้วมารีเป็นคนที่ \"คู่ควรกับการเป็นไอดอล\" ค่ะ"
10039070-68 = "หลังจากแยกย้ายกับหัวหน้ามิเนะ ฉันก็ไปคิดทบทวนและลองค้นหาเกี่ยวกับตัวตนของ <ไอดอล> ให้มากขึ้นค่ะ"
10039070-69 = "ไอดอลคือคนที่เรียนรู้และพยายามอย่างหนักทั้งทางร่างกายและจิตใจ ทั้งยังต้องเสียเหงื่อฝึกฝน"
10039070-70 = "และเป็นคนที่เปล่งประกายบนเวทีและอีเวนต์ต่างๆ เพื่อทำให้ผู้คนมากมายมีความสุข... นั่นคือสิ่งที่ฉัน#nอ่านเจอมาค่ะ"
10039070-71 = "แล้วฉันก็ไม่เคยเจอใครที่เหมาะสมกับสิ่งนี้มากกว่ามารีเลยค่ะ..."
10039070-72 = "มารีเป็นคนที่คู่ควรกับการเป็นไอดอล..."
10039070-73 = "ไม่สิ... ตอนนี้มารีเป็นไอดอลของพวกฉันแล้วค่ะ"
10039070-74 = "ต้องขอโทษด้วยนะคะที่เพิ่งจะมาคิดได้ พอมาคิดดูแล้ว ทุกอย่างที่มารีทำก็ให้คำตอบได้ชัดเจนเลยค่ะ"
10039070-75 = "ทิศทางของพวกเราและการฝึกซ้อมเป็นไปตามคำแนะนำของคุณมารีตั้งแต่แรกแล้ว"
10039070-76 = "ถ้าคุณมารีชื่นชอบ ฉันก็อยากให้การทำสิ่งนี้เป็นสิ่งที่คุณมารีสนุกไปด้วยค่ะ"
10039070-77 = "เป้าหมายของพวกฉันคือการเข้าไปหาทุกคนให้มากขึ้น ดังนั้นใครจะเป็นลีดเดอร์ไม่ใช่เรื่องสำคัญของ#nพวกฉันหรอกค่ะ"
10039070-78 = "ตอนนี้มารีเองก็ได้รับความเชื่อมั่นจากเหล่าซิสเตอร์และเพื่อนนักเรียนมากมาย..."
10039070-79 = "ดังนั้นทุกคนจะยิ่งสัมผัสความจริงใจนั้นได้ค่ะ พวกฉันเชื่ออย่างนั้นค่ะ..."
10039070-81 = "นะ... นี่พวกคุณ... หมายความว่า..."
10039070-86 = "ดะ... เดี๋ยวนะคะ! งั้นก็แสดงว่า...!!"
10039070-87 = "ฉัน... ฉันจะได้...!?"
10039070-89 = "ค่ะ... ใช่แล้วค่ะ พวกฉันตั้งใจจะบอกมารีตรงนี้ค่ะ"
10039070-90 = "ใช่แล้วค่ะ มารี ขอโทษที่ทำให้ตกใจกับข้อเสนอที่กะทันหันนี้นะคะ..."
10039070-91 = "มารี..."
10039070-92 = "ช่วยมาเป็น <ไอดอล> กับพวกเราเถอะค่ะ"
10039070-94 = "ทุกคน..."
10039070-99 = "เอ๋... ถะ... ถ้างั้นก็..."
10039070-100 = "อย่าบอกนะคะว่า... ที่พวกคุณมาเจอกันที่นี่..."
10039070-101 = "[ns5] \"ก็เพื่อเลือกลีดเดอร์คนใหม่...?\"\n[ns6] \"ก็เพราะเรื่องของวงไอดอล...?\""
10039070-104 = "...?"
10039070-105 = "ใช่แล้วนี่คะ...? หืม? จะเป็นอย่างอื่นไปได้ยังไงคะ?"
10039070-106 = "นี่เป็นเรื่องสำคัญมากนะคะคุณครู ความเป็นความตายของพวกฉันขึ้นอยู่กับเรื่องนี้เลยค่ะ"
10039070-107 = "หืม...?"
10039070-108 = "ทำไมทำหน้าอย่างนั้นล่ะคะ..."
10039070-109 = "อ๊ะ"
10039070-110 = "หรือว่าพวกฉันเข้าใจผิดกันไปเอง และมารีก็ไม่ได้อยากทำแบบนั้น... เหรอคะ...!!"
10039070-111 = "...!!"
10039070-112 = "ยะ... อย่าบอกนะ...! พะ... พวกฉันเข้าใจผิดจนสร้างภาระใหม่ให้มารีอีกแล้วเหรอคะเนี่ย...!!"
10039070-114 = "มะ... ไม่ค่ะ! ไม่ใช่ค่ะ! ฉันไม่ได้หมายความแบบนั้นค่ะ...!"
10039070-115 = "ที่จริงฉันก็สนุกกับการเตรียมแผนการเหมือนกันค่ะ! ถ้าให้ฉันทำ ฉันก็น่าจะดีใจมาก...!!"
10039070-120 = "อะ... อ่า...!? เฮือก...!? นะ... นี่ฉันเผลอพูดอะไรออกไป...!!!"
10039070-121 = "ช่วยลืมๆ ไปเถอะนะคะ ลืมสิ่งที่ฉันพูดเมื่อกี้ด้วยเถอะค่ะ...!!"
10039070-122 = "ตะ... แต่เดี๋ยวก่อนนะคะ...! ว่าแต่จะให้ฉันเข้าไปแทรกตอนนี้ได้เหรอคะ...?"
10039070-123 = "เพลงก็แบ่งให้ร้องแค่ 2 คน... แล้วฉันก็ไม่มีชุดด้วย..."
10039070-129 = "[ns7] \"เรื่องนั้นไม่ต้องกังวลหรอก...\"\n[ns8] หยิบรูปถ่ายที่เตรียมไว้ออกมา"
10039070-133 = "คุณครู...?"

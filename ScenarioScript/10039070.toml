[translation]
10039070-1 = "第7話;Antique Seraphim的起點"
10039070-3 = "[log=마리]所有人，請停止戰鬥！[/log]"
10039070-8 = "……是誰？"
10039070-9 = "……！#n連，連老師都來了……！？"
10039070-11 = "……老師？瑪麗同學……？"
10039070-12 = "為什麼會在這裡……"
10039070-13 = "不，更重要的是，為什麼騎著機車……？"
10039070-18 = "雖然我不知道具體情況，但爭鬥是不對的！"
10039070-19 = "請大家先各退一步，用對話解決問題！#n我已經把老師帶來了！"
10039070-20 = "今天應該是個好日子……是象徵溝通與和諧的[ruby=Carnival]狂歡節[/ruby]，不是嗎？"
10039070-21 = "請大家放下武器，用溝通和理解來化解矛盾……！！"
10039070-22 = "[ns1]「大家冷靜！都先把武器放下來吧！」\n[ns2]「能告訴我發生了什麼事嗎？」"
10039070-25 = "唔，唔嗯……"
10039070-26 = "真傷腦筋。#n其他人姑且不論，這種情景實在不想讓老師看見呢。"
10039070-27 = "雖然要解釋可能得花費不少時間……不過，還是應該向老師說明才對。"
10039070-28 = "現在……是我們三一的重大……"
10039070-29 = "……瑪麗！！"
10039070-30 = "你來得正好，瑪麗！我正想請你過來呢。"
10039070-31 = "……？"
10039070-32 = "……？？？#n咦……？"
10039070-34 = "……？"
10039070-35 = "我，我嗎……？"
10039070-36 = "是的……當然，這還要看瑪麗的意願。"
10039070-43 = "……！！"
10039070-44 = "真是驚人。我也有同樣的想法。"
10039070-45 = "呵呵。果然……並非只有我這麼想呢。"
10039070-47 = "同樣的……想法？"
10039070-48 = "不，不好意思……我不太明白兩位的意思……"
10039070-50 = "……呵呵。"
10039070-51 = "這是我們深思熟慮後得出的結論。#n假如我們的想法一致的話……"
10039070-55 = "……瑪麗。"
10039070-56 = "瑪麗同學。"
10039070-57 = "……能請瑪麗加入我們，並成為我們的[ruby=領袖]領導者[/ruby]嗎？"
10039070-59 = "……什麼！？"
10039070-60 = "……！？"
10039070-61 = "[ns3]「瑪麗也要加入……！？」\n[ns4]「領導者！？領袖！？」"
10039070-64 = "首先，請容許我們向你道歉。#n這段期間我們只顧著練習而忽略了瑪麗的感受，這是我們的過失。"
10039070-65 = "現在回想起來，瑪麗在準備的過程中，其實比我們更享受這些活動。"
10039070-66 = "跟我們相比……瑪麗你才是……"
10039070-67 = "不，瑪麗就是「最適合當偶像」的人。"
10039070-68 = "我在和美禰團長分開後，思考了很多關於「偶像」本質的事。"
10039070-69 = "從裡到外不斷地努力練習、揮灑汗水……"
10039070-70 = "為了創造閃耀的舞台和活動，讓眾人感到快樂的閃耀之人……這就是偶像。"
10039070-71 = "……而瑪麗你，是我近期見過最符合這個敘述的人。"
10039070-72 = "瑪麗才是最適合當偶像的人……"
10039070-73 = "……不，你早就已經是我們的偶像了。"
10039070-74 = "很抱歉這麼晚才意識到。#n現在回想起來，這種氛圍應該很容易察覺才對。"
10039070-75 = "我們的發展方向和練習內容，也都是在瑪麗同學的指導下進行。"
10039070-76 = "因此如果瑪麗同學願意，我希望能將這個位置交給你。"
10039070-77 = "我們的目標僅止於親近大眾，因此由誰擔任領袖並不重要。"
10039070-78 = "況且瑪麗深受許多修女和學生們的信賴……"
10039070-79 = "因此我們相信……那股真誠將更能打動大家。"
10039070-81 = "那，那是什麼意思……"
10039070-86 = "請，請等一下！也就是說……！！"
10039070-87 = "我……我也要……！？"
10039070-89 = "……沒錯。#n這就是此時此刻，我們想告訴你的事。"
10039070-90 = "是的，瑪麗。#n雖然這個提議十分突然，也可能讓你感到困惑……"
10039070-91 = "……瑪麗。"
10039070-92 = "……希望你能和我們一起成為「偶像」。"
10039070-94 = "大家……"
10039070-99 = "咦……所，所以……"
10039070-100 = "莫非……這個場合從一開始就是……"
10039070-101 = "[ns5]「說要選出新的領導者……」\n[ns6]「原來指的是偶像團體啊……」"
10039070-104 = "……？"
10039070-105 = "是的……不然還會是什麼意思呢？"
10039070-106 = "這是非常重要的事，老師。#n對我們而言，將其稱之為關乎生死也不為過。"
10039070-107 = "……嗯？"
10039070-108 = "怎麼了嗎？您為何露出那種表情……"
10039070-109 = "……啊。"
10039070-110 = "難道是我們誤會了，瑪麗同學其實並不這麼想……！！"
10039070-111 = "……！！"
10039070-112 = "該，該不會……！我們又在無意間造成了瑪麗的困擾嗎……！！"
10039070-114 = "不，不是的！絕對沒有這回事……！"
10039070-115 = "其實我也很樂在其中！#n如果兩位願意讓我試試看的話，我會很開心的……！！"
10039070-120 = "啊，啊……！？咦咦……！？#n我，我剛才說了什麼……！！！"
10039070-121 = "請，請把我剛才說的話都……！！"
10039070-122 = "不，更重要的是……現在突然讓我加入真的好嗎？"
10039070-123 = "歌曲都已經分配給兩位，而且我又沒有服裝……！"
10039070-129 = "[ns7]「……這點你不用擔心。」\n[ns8] 拿出準備好的照片"
10039070-133 = "……老師？"
10039070-139 = "……！？！？#n老師……！？"
10039070-141 = "那是……！！"
10039070-142 = "老師果然早就察覺到了呢。"
10039070-143 = "謝謝您，老師。#n我唯一的擔憂是時程方面會有問題，不過這樣一來……"
10039070-145 = "可，可是……！"
10039070-146 = "唔，唔唔唔……！？！？"
10039070-147 = "[ns]「……瑪麗。」"
10039070-149 = "[ns9]「就像瑪麗想為大家付出一樣，大家也想為瑪麗付出哦。」\n[ns10]「如果有想做的事，不妨坦率地說出來吧。」"
10039070-152 = "我……我怎麼能……"
10039070-153 = "那……那個……"
10039070-154 = "那……"
10039070-155 = "……………………"
10039070-156 = "那麼……"
10039070-157 = "還請……多多指教……"
10039070-161 = "……耶嘿嘿。"
10039070-167 = "[ns11]「這股破壞力……！！」\n[ns12]「這……這肯定行得通……！！！」"
10039070-172 = "瑪麗──！瑪麗──！瑪麗──！瑪麗──！"
10039070-173 = "咦，咦咦……！？#n拜，拜託大家快停下來……！！"
10039070-174 = "拜託……！！！"
10039070-177 = "…………"
10039070-178 = "……渚醬，你沒有什麼話要說嗎？"
10039070-179 = "應該有吧？"
10039070-183 = "彌，彌香同學。#n那個……"
10039070-184 = "就……就是……"
10039070-186 = "……什～麼？"
10039070-187 = "那個……"
10039070-188 = "……咳，咳哼。"
10039070-192 = "……哼嗯～☆"
10039070-193 = "站在這裡會打擾別人的，我們先回去吧？"
10039070-194 = "回去之後……"
10039070-195 = "……有很多話要說，對吧～？"

10039070-141 = "นี่มัน...!!"
10039070-142 = "คุณครูคิดไว้ในใจหมดแล้วสินะคะ"
10039070-143 = "ขอบคุณนะคะ คุณครู การต้องเตรียมงานอย่างเร่งด่วนเป็นสิ่งที่ฉันกังวลอยู่พอดี แต่คุณครูก็..."
10039070-145 = "ตะ... แต่ว่า... แต่ว่า...!"

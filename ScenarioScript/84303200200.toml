[translation]
84303200200-6 = "乓啪喀乓──！愛麗絲遭遇新的人了！"
84303200200-10 = "乓啪喀乓……？遭遇……？"
84303200200-11 = "你好，我是百合園聖亞。#n愛麗絲同學也是遊戲開發部的人嗎？"
84303200200-12 = "沒錯！今天的愛麗絲是導覽員，負責引導各位訪客！"
84303200200-13 = "這樣啊……"
84303200200-14 = "為需要協助的人提供協助，是愛麗絲今天的使命！#n有問題請儘管開口！"
84303200200-15 = "儘，儘管開口啊……"
84303200200-21 = "（氣氛看起來沒有特別可疑的部分）"
84303200200-22 = "（這裡好像沒問題，那就去展示場……）"
84303200200-26 = "……！！？"
84303200200-27 = "（剛，剛才那是？某人的視線……？）"
84303200200-32 = "（是錯覺嗎……不，我確實感受到了。#n　是監視的視線……而且還非常警戒）"
84303200200-33 = "（除了愛麗絲同學以外……這個房間裡應該沒有別人了啊……！）"
84303200200-37 = "……愛麗絲同學。或許這個問題有點冒昧……#n請問這個房間裡除了愛麗絲同學和我之外，還有其他人在嗎？"
84303200200-38 = "咦？那是什麼意思？除了愛麗絲跟聖亞同學以外的人……？"
84303200200-39 = "嗯。因為我感覺到了……視線。"
84303200200-40 = "沒事，果然還是當我沒問過吧。#n請別放在心上，愛麗絲同學。我會自己找出來的。"
84303200200-41 = "我還挺相信……自己在這方面的直覺的。"
84303200200-42 = "看來這個地方……"
84303200200-43 = "沒錯！聖亞同學的第六感真準呢！"
84303200200-44 = "我想也是。#n果然除了我和愛麗絲同學之外……"
84303200200-48 = "……嗯？"
84303200200-49 = "除了聖亞同學和愛麗絲之外，這個房間裡還有另一名隊員！#n居然能察覺到這一點，真是太厲害了！"
84303200200-50 = "請看，柚子！柚子的氣息被發現了！#n真了不起，簡直就像盜賊一樣！！"
84303200200-51 = "盜賊……！？"
84303200200-55 = "不，不是的！對不起！他不是那個意思！"
84303200200-56 = "愛麗絲醬絕對不是在說你是小偷，或者其他的意思……#n只是遊戲中的職業名稱而已，所以……！"
84303200200-65 = "櫃，櫃子裡面居然有人……！？"
84303200200-66 = "你……你好……我叫做柚子……"
84303200200-67 = "愛，愛麗絲同學！？請問這位是……"
84303200200-69 = "是遊戲開發部的部長、最棒的遊戲大師，同時也是隊伍的隊長柚子！！"
84303200200-70 = "柚子喜歡在自己的空間裡面待命，所以把櫃子裡面當成專屬的待命房間！"
84303200200-71 = "啊……這，這樣啊……原來是這裡的成員啊。"
84303200200-72 = "（這裡明明是自己的部室，為什麼還要待在櫃子裡面呢……）"
84303200200-73 = "聖亞同學不是來找柚子的嗎？#n你的反應好像跟想像中不太一樣。"
84303200200-74 = "啊，我只是來跟遊戲開發部的成員，確認一下要在博覽會展出的遊戲而已……"
84303200200-75 = "……！#n原來如此，那你不應該來這裡，應該去展示場才對！"
84303200200-76 = "這邊請，愛麗絲來幫你帶路！！"
84303200200-77 = "好，好的。那……柚子同學呢……？"
84303200200-79 = "咦！？我，我嗎？#n我，我就……不用了……"
84303200200-80 = "今天的柚子是指揮官，所以不會到前線去。#n負責前線的人是桃井、綠、愛麗絲！"
84303200200-81 = "……還有聖亞同學也是！"
84303200200-82 = "啊……嗯，我明白了。#n那就麻煩你了。"
84303200200-83 = "……打擾了，柚子同學。"
84303200200-84 = "不，不會。很高興見到你……"
84303200200-85 = "新的任務出現了！！出發！！"

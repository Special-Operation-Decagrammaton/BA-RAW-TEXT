[translation]
84303200200-6 = "Bum bum bum! New person encountered!"
84303200200-10 = "\"Bum-bum-bum\"...? \"Encountered\"...?"
84303200200-11 = "...Hello, I'm Yurizono Seia. Are you with the Game Development Department?"
84303200200-12 = "Yes, I am Aris! Today, I am working as a guide, helping the visiting guests!"
84303200200-13 = "I see..."
84303200200-14 = "Assisting those in need is my quest today! Ask me anything!"
84303200200-15 = "A-Anything..."
84303200200-21 = "(I don't see anything suspicious going on around here...)"
84303200200-22 = "(Looks like it's all clear, so I'll head to the Exhibition Hall...)"
84303200200-26 = "Hm?!"
84303200200-27 = "(Wh-What was that just now? I feel like somebody's watching me...)"
84303200200-32 = "(Is it just my imagination? ...No. I definitely feel it. Someone's watching...and they're on guard.)"
84303200200-33 = "(But there shouldn't be anyone here other than Aris...!)"
84303200200-37 = "...Aris, this might be a rude question, but is there anyone else with us in the room?"
84303200200-38 = "Huh? What do you mean? Someone else other than me and you...?"
84303200200-39 = "Yes. I feel...a gaze on me."
84303200200-40 = "...Never mind, disregard. It's fine, Aris. I'll take a look around myself."
84303200200-41 = "I tend to trust...this kind of hunch."
84303200200-42 = "There must be..."
84303200200-43 = "Yes! There is! You have an excellent sixth sense, Seia!"
84303200200-44 = "Of course. Other than me and you..."
84303200200-48 = "...What?"
84303200200-49 = "Other than me and you, there is one more party member in this room! You actually noticed! That is amazing!"
84303200200-50 = "Look, Yuzu! She noticed your presence! Amazing. She is as perceptive as a thief!"
84303200200-51 = "A thief?"
84303200200-55 = "N-No! Sorry! She didn't mean it like that!"
84303200200-56 = "She isn't calling you an actual thief. That's just the name of the job class in a game..."
84303200200-65 = "Y-You were hiding in the cabinet...?!"
84303200200-66 = "Ah... H-Hello... I'm Yuzu..."
84303200200-67 = "A-Aris...?! Who...?"
84303200200-69 = "This is Yuzu, the president of the Game Development Department and the best GM and party leader!!"
84303200200-70 = "Yuzu likes her own private space, so she uses the club room cabinet!"
84303200200-71 = "Ah... I-I see... You're part of the club, then."
84303200200-72 = "(I'm still a bit unclear about the cabinet...)"
84303200200-73 = "Were you not looking for Yuzu? I thought that was why you were here. You are not reacting the way I expected."
84303200200-74 = "Ah, I'm just here to see the games the Game Development Department submitted to the Expo..."
84303200200-75 = "Ah! I see. Then this is not where you want to be! You have to go to the Exhibition Hall!"
84303200200-76 = "This way. I will be your informant. Follow me!!"
84303200200-77 = "Uh, okay. Then what about Yuzu...?"
84303200200-79 = "Eek! M-Me? I-I'm good..."
84303200200-80 = "Yuzu is the commander today, so she will not be heading to the front lines. Instead, she has dispatched Momoi, Midori, and me!"
84303200200-81 = "...And Seia!"
84303200200-82 = "Ah... I understand. Lead the way, then."
84303200200-83 = "...I apologize for intruding, Yuzu."
84303200200-84 = "N-No. I'm glad we met..."
84303200200-85 = "Now, a new quest has appeared!! Let us go!!"

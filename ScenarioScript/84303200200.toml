[translation]
84303200200-6 = "ปาปัม ปาปัม ป๊าม! อาริสึบังเอิญได้เจอคนใหม่อีกคนค่ะ!"
84303200200-10 = "ปาปัม ปาปัม ป๊าม...? บังเอิญเจอ...?"
84303200200-11 = "สวัสดีค่ะ ฉันชื่อยูริโซโนะ เซอาค่ะ คุณอาริสึก็เป็นสมาชิกชมรมพัฒนาเกมเหรอคะ?"
84303200200-12 = "ใช่แล้วค่ะ! แต่วันนี้อาริสึมาเป็นไกด์เพื่อแนะนำแขกที่มาเที่ยวดูชมรมของเราค่ะ!"
84303200200-13 = "อย่างนี้นี่เอง..."
84303200200-14 = "ภารกิจวันนี้ของอาริสึก็คือการช่วยเหลือผู้ที่ต้องการความช่วยเหลือ! ถ้าสงสัยอะไรก็ถามได้ทุกอย่างเลยค่ะ!"
84303200200-15 = "ทะ... ทุกอย่างเลยงั้นเหรอ..."
84303200200-21 = "(ดูจากบรรยากาศแล้วก็ไม่มีจุดไหนที่แปลกเป็นพิเศษ)"
84303200200-22 = "(ตรงนี้น่าจะไม่มีอะไร งั้นไปที่ห้องสาธิตดีกว่า...)"
84303200200-26 = "...!!?"
84303200200-27 = "(มะ... เมื่อกี้คืออะไรน่ะ? เหมือนมีใครจ้องมองอยู่เลย...?)"
84303200200-32 = "(หรือจะคิดไปเอง? ไม่หรอก... มันชัดเจนมาก สายตาที่จับจ้องมา... แถมนั่นก็เป็นสายตาที่ระแวดระวัง#nด้วย)"
84303200200-33 = "(แต่นอกจากคุณอาริสึ... ก็ไม่น่ามีใครอยู่ในห้องนี้นี่นา...!)"
84303200200-37 = "คุณอาริสึคะ... คำถามของฉันอาจจะเสียมารยาทสักหน่อย แต่นอกจากคุณอาริสึแล้ว ไม่ทราบว่ามีคนอื่นอยู่ในห้องนี้อีกหรือเปล่าคะ?"
84303200200-38 = "คะ? หมายความว่ายังไงคะ? คนอื่นนอกจากเราสองคนเหรอ...?"
84303200200-39 = "ค่ะ พอดีว่า... ฉันรู้สึกได้ว่ามีสายตาจากคนอื่นน่ะค่ะ"
84303200200-40 = "ฉันคงถามอะไรไร้สาระน่ะค่ะ ไม่เป็นไรหรอกค่ะ คุณอาริสึ ฉันจะลองหาดูเองค่ะ"
84303200200-41 = "ฉันค่อนข้าง... เชื่อถือสัญชาตญาณของตัวเองในเรื่องนี้น่ะค่ะ"
84303200200-42 = "ฉันว่าที่นี่น่ะ..."
84303200200-43 = "ค่ะ! มีค่ะ! คุณเซอามีเซนส์ที่ยอดเยี่ยมไปเลยนะคะ!"
84303200200-44 = "มีใช่มั้ยคะ? นอกจากฉันและคุณอาริสึแล้ว..."
84303200200-48 = "คะ...?"
84303200200-49 = "นอกจากคุณเซอาและอาริสึแล้ว ในห้องนี้ยังมีสมาชิกชมรมของเราอีกคนหนึ่งค่ะ! น่าทึ่งจังเลยนะคะที่คุณเซอารู้ได้ด้วย!"
84303200200-50 = "ได้ยินมั้ยคะ ยูสึ! มีคนรู้ด้วยค่ะว่ายูสึอยู่ที่นี่! สุดยอดไปเลยค่ะ เหมือนกับโจรเลยละค่ะ!!"
84303200200-51 = "โจรเหรอคะ...!?"
84303200200-55 = "มะ... ไม่ใช่ค่ะ! ขอโทษค่ะ! ไม่ใช่อย่างนั้นนะคะ!"
84303200200-56 = "อาริสึจังไม่ได้หมายความถึงโจรขโมย แต่หมายถึงตัวละครอาชีพโจรในเกมน่ะค่ะ...!"
84303200200-65 = "มีคนอยู่ในตู้เหรอ...!?"
84303200200-66 = "สะ... สวัส... ดีค่ะ... ฉันชื่อยูสึค่ะ..."
84303200200-67 = "คะ... คุณอาริสึ!? คนคนนี้คือ..."
84303200200-69 = "ยูสึค่ะ! ยูสึคือหัวหน้าชมรมพัฒนาเกม เกมมาสเตอร์ และหัวหน้าปาร์ตี้ของเราค่ะ!!"
84303200200-70 = "ยูสึชอบอยู่ในพื้นที่ของตัวเอง ก็เลยใช้ตู้เป็นล็อบบี้ประจำตัวอยู่น่ะค่ะ!"
84303200200-71 = "อ่า... งะ... งั้นเหรอคะ... เป็นคนของชมรมนี้สินะคะ..."
84303200200-72 = "(ที่นี่ก็ห้องชมรมของตัวเองแท้ๆ แต่ทำไมถึงเข้าไปอยู่ในตู้นะ...)"
84303200200-73 = "คุณเซอาไม่ได้มาหายูสึหรอกเหรอคะ? อาริสึคิดว่าจะเป็นอย่างนั้นเสียอีก แต่ปฏิกิริยาจากคุณเซอา#nกลับต่างไปจากที่คิดไว้เลยนะคะ"
84303200200-74 = "อ่า... ฉันแค่มาดูเกมที่จัดแสดงในงานเอ็กซ์โปกับชมรมพัฒนาเกมน่ะค่ะ"
84303200200-75 = "อย่างนั้นสินะคะ ถ้างั้นก็มาผิดที่แล้วละค่ะ! ต้องไปห้องสาธิตแทนค่ะ...!"
84303200200-76 = "ทางนี้ค่ะ เดี๋ยวอาริสึนำทางไปนะคะ ตามมาได้เลยค่ะ!!"
84303200200-77 = "ขะ... เข้าใจแล้วค่ะ ถ้างั้น... แล้วคุณยูสึล่ะคะ...?"
84303200200-79 = "ฮะ... เฮือก!? ฉะ... ฉันเหรอคะ? ฉัน... มะ... ไม่เป็นไรดีกว่าค่ะ..."
84303200200-80 = "วันนี้ยูสึคือผู้บังคับบัญชา ก็เลยไม่ต้องออกไปที่แนวหน้าค่ะ คนที่ไปอยู่แนวหน้าก็คือ โมโมอิ มิโดริ และอาริสึค่ะ!"
84303200200-81 = "แล้วก็คุณเซอาด้วยค่ะ...!"
84303200200-82 = "อ่า... ค่ะ เข้าใจแล้วค่ะ งั้นฉันจะตามไปค่ะ"
84303200200-83 = "ขอโทษที่เสียมารยาทนะคะ คุณยูสึ..."
84303200200-84 = "มะ... ไม่เลยค่ะ ยินดีที่ได้พบนะคะ..."
84303200200-85 = "เอาละ มีเควสใหม่แล้วค่ะ!! ไปกันเลย!!"

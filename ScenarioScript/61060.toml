[translation]
61060-1 = "ตอนที่ 6;เก้าอี้ฝั่งตรงข้าม"
61060-6 = "อีกไม่นานก็จะเย็นแล้วสินะ..."
61060-7 = "นั่นสิ งั้นก็เร่งมือกันอีกนิดเถอะ"
61060-11 = "......"
61060-12 = "เป็นอะไรไปเหรอ ฮิโยริ?"
61060-13 = "ระ... เราจะกลับไปอาเรียสกันจริงๆ สินะคะ... แหะ... แหะๆ..."
61060-14 = "ก็เรื่องมันกลายเป็นแบบนี้นี่นา..."
61060-15 = "ฉันตัดสินใจแล้วละว่าจากนี้จะหยุดมองหาความหมายของเหตุการณ์ต่างๆ ที่เจอในชีวิต"
61060-16 = "งั้นเหรอ... เป็นความตั้งใจที่ดีเลย เธอเติบโตขึ้นเยอะเลยนะ มิซากิ"
61060-21 = "หนวกหูน่ะหัวหน้า ทีตัวเองละก็ คิดจะหายหน้าไปก็ไปตามอำเภอใจเลย"
61060-22 = "อึก..."
61060-23 = "แต่ก็ดีใจใช่มั้ยล่ะที่ซาโอริกลับมาเป็นหัวหน้าอีกครั้ง?"
61060-24 = "ถึงจะเป็นหัวหน้าชั่วคราวเพื่องานนี้เท่านั้นก็เถอะ"
61060-25 = "เรื่องนั้นมัน...!"
61060-26 = "ช่างเถอะ... ฉันไม่อยากฟังแล้ว จะเอายังไงก็เชิญ ไม่ว่าฉันจะพูดอะไร องค์หญิงก็คิดแบบนั้นอยู่ดี#nนั่นแหละ"
61060-27 = "ยังไม่ยอมพูดตรงๆ เหมือนเดิมเลยนะ มิซากิ"
61060-28 = "ไม่ใช่อย่างนั้นสักหน่อย!"
61060-30 = "[ns] \"ดีใจจังเลยนะที่นักเรียนของครูเข้ากันได้ดีแบบนี้...\""
61060-31 = "อยากเห็นฉันในโหมดไม่ทนแล้วมั้ยล่ะ คุณครู..."
61060-32 = "ฮุฮุ แต่ฉันดีใจนะที่คุณครูอยู่กับพวกเราด้วย"
61060-34 = "ถึงจะต้องคอยคุ้มกันให้... ก็เถอะค่ะ แหะๆๆ..."
61060-36 = "ฉันก็เลยอยากขอร้องคุณครูน่ะค่ะ"
61060-37 = "คุณครู ช่วยสอนพิเศษให้นักเรียนอาเรียสได้มั้ยคะ?"
61060-38 = "จะใช้วิธีทางอ้อมหรือสอนทางไกลก็ได้ค่ะ..."
61060-39 = "แน่นอนว่านี่คือคำขอส่วนตัวที่เห็นแก่ตัวของฉัน และความปลอดภัยของคุณครูคือสิ่งที่สำคัญกว่าอะไร#nทั้งหมด"
61060-40 = "ในอีกทางหนึ่ง คำขอนี้... อาจมองได้ว่าเป็นการกระทำที่ฉันเพิกเฉยต่อนักเรียนอาเรียสอยู่ฝ่ายเดียว#nก็ได้ค่ะ"
61060-41 = "คะ?! คุณครูจะเดินทางไปที่โรงเรียนสาขาอาเรียสด้วยตัวเองงั้นเหรอคะ...!?"
61060-43 = "......"
61060-44 = "ฉันคิดว่าภารกิจครั้งนี้คือการไปเจรจาบางอย่างกับนักเรียนที่ยังเหลืออยู่ในอาเรียส..."
61060-45 = "แล้วก็ให้เราเป็นผู้ช่วยสอนสำหรับการสอนพิเศษทางไกลของครูเสียอีก"
61060-46 = "แต่พอครูบอกว่าจะเดินทางไปด้วยตัวเอง ภารกิจของเราก็เลยถูกเปลี่ยนเป็นภารกิจคุ้มกันแทน..."
61060-47 = "[ns] \"ขอโทษนะ ครูทำให้ลำบากใจหรือเปล่า?\""
61060-48 = "ปะ... เปล่า! จะเป็นแบบนั้นไปได้ยังไง!"
61060-49 = "ในฐานะอดีตนักเรียนโรงเรียนสาขาอาเรียส ฉันกลับรู้สึกผิดและกังวลมากกว่าที่สร้างปัญหาให้ครูมาก#nเกินไปหรือเปล่า..."
61060-50 = "แล้วก็รู้สึกละอายใจด้วยที่ครูเอาใจใส่พวกเราถึงขนาดนี้..."
61060-51 = "ไหนๆ ก็คุยเรื่องนี้แล้ว ฉันอยากขอถามอะไรสักอย่าง"
61060-52 = "ทำไมถึงตัดสินใจไปสถานที่ที่อันตรายอย่างโรงเรียนสาขาอาเรียสด้วยตัวเองเหรอ คุณครู?"
61060-56 = "[ns1] \"ฮุฮุฮุ ต้องไปเองสิ ไหนๆ ไปแล้วก็ไปทำเท่หน่อยดีมั้ย...\"   \n[ns2] \"ครูต้องไปโชว์ความเท่ให้นักเรียนของครูที่นั่นเห็นสิ!\""
61060-60 = "[ns] \"ฮึ่มม...! บทพูดของครูเมื่อกี้ใช้ได้เลยนะ ว่ามั้ย?\""
61060-61 = "อะ... เอ่อ..."
61060-62 = "อย่างน้อยก็ทำให้ฉันได้รู้บางอย่างละนะ..."
61060-63 = "ผู้ใหญ่... บางครั้งก็พูดจาเลอะเทอะ..."
61060-65 = "[ns] \"ไหงเป็นงั้นล่ะ...\""
61060-66 = "อื้อ ถ้าพูดแบบนั้น คนฟังก็หน้าบางอยู่หรอกนะ"
61060-67 = "แต่นั่นก็เป็นเหตุผลที่พวกเราเชื่อมั่นในคุณครูเหมือนกัน"
61060-68 = "คำพูดปลอบใจกลับยิ่งทำร้ายจิตใจกันงั้นเหรอ?"
61060-69 = "อื้อ ฉันก็พอเดาออก แต่ยังไงฉันก็กล้าพูดนะ"
61060-75 = "อะ... อาสึโกะ?!"
61060-76 = "คะ... คุณครูเอามือกุมหน้าอกแล้วลงไปนอนหมอบแล้วนะคะ...?"
61060-77 = "เลิกแกล้งสำออยได้แล้ว คุณครู เรายังต้องไปอีกไกลนะ"
61060-79 = "เอาละ งั้นทุกคนมาปรบมือ!"
61060-80 = "เพื่อแสดงความยินดีกับเพื่อนของเราที่กลับมาอาเรียสอย่างปลอดภัยกันค่ะ!"
61060-86 = "อ่า... แหะๆ... ถึงจะกลับมาในสภาพที่ดูไม่จืดก็เถอะค่ะ..."
61060-87 = "ไม่เห็นเป็นอะไรเลยค่ะ อย่างน้อยฮาโลก็ยังอยู่ดีนี่คะ?"
61060-88 = "ในเมื่อรักษาสิ่งที่มีค่าที่สุดไว้ได้ เดี๋ยวสิ่งอื่นก็ทวงกลับมาได้ค่ะ"
61060-93 = "คิดดีแล้วละค่ะที่กลับมา ขอบคุณที่กลับมาอย่างปลอดภัยนะคะ ไมอา"
61060-94 = "พวกเรายังมีเวลาเหลืออีก... ถมเถไปค่ะ"
61060-95 = "ค่ะ ค่ะ... รุ่นพี่!"
61060-96 = "ถึงจะบอกว่าเป็นงานต้อนรับ แต่ฉันก็ทำอะไรให้ได้ไม่เท่าไรเลย ต้องขอโทษในส่วนนี้ด้วยนะคะ"
61060-97 = "ขะ... ขอโทษอะไรกันละค่ะ! ฉันออกจะ... คิดถึงบรรยากาศแบบนี้ด้วยซ้ำค่ะ..."
61060-98 = "จะว่าไป 'ข้างนอก' นั่นเป็นยังไงบ้างคะ? ฉันอยากฟังประสบการณ์ของคนที่ออกไปน่ะค่ะ"
61060-99 = "ข้างนอก... เหรอคะ? อืม ก่อนอื่นเลย..."
61060-100 = "ทุกอย่างแปลกประหลาดไปหมดเลยค่ะ"
61060-101 = "แล้วก็... น่าทึ่งด้วย"
61060-106 = "......"
61060-108 = "ฉันได้เห็นทิวทัศน์หลายๆ อย่างเลยค่ะ ทั้งตึกสูงที่ทำด้วยกระจก"
61060-109 = "แม่น้ำขนาดใหญ่ สะพานที่สร้างตัดแม่น้ำสายนั้น"
61060-112 = "ในเวลากลางคืน สิ่งปลูกสร้างกับถนนก็สว่างขึ้นด้วยแสงไฟ"
61060-113 = "สะพานที่มีไฟส่องสว่างไสว แสงระยิบระยับบนผืนน้ำราวกับฝันไป"
61060-115 = "มีอาคารบางหลังที่สร้างไว้เพื่อเล่นดนตรีโดยเฉพาะด้วยนะคะ"
61060-116 = "แต่ว่าที่นี่ ถ้าจะเล่นดนตรี... ก็ต้องเล่นตอนที่ 'มาดาม' ไม่อยู่ หรือไม่ก็ต้องไปแอบเล่นให้ใครจับไม่ได้#nใช่มั้ยล่ะคะ"
61060-119 = "แต่ว่าที่อาคารหลังนั้นมีการเล่นดนตรีทุกเมื่อเลยค่ะ แล้วก็เล่นตอนกลางคืนมากกว่าตอนกลางวันอีก#nนะคะ"
61060-120 = "ที่นั่นก็เลยมีการออกแบบให้มีแสงไฟส่องสว่างเมื่อเริ่มมืดลง เพื่อเป็นการตกแต่งบริเวณโดยรอบค่ะ"
61060-121 = "ค่ะ... ต่อให้มันจะไม่ได้ช่วยในการเอาตัวรอดหรือไม่ได้สร้างประโยชน์อะไร"
61060-122 = "แต่บางแห่งบนโลกใบนี้ก็ยังมีคนที่เต็มใจที่จะลงทุนเวลาและความพยายามกับบางอย่าง เพียงเพราะว่ามัน 'สวย' ด้วยค่ะ"
61060-124 = "ส่วนในตลาดก็เต็มไปด้วยอาหารและแผงลอยที่ฉันไม่เคยเห็นมาก่อน"
61060-125 = "แค่ได้ยืนมองและได้กลิ่น ก็ทำให้ฉันมีความสุขแล้วค่ะ"
61060-126 = "ค่ะ... ต่อให้สิ่งที่ฉันทำได้จะมีแค่การยืนมองและได้กลิ่นก็เถอะค่ะ"
61060-128 = "รุ่นพี่รู้จักสถานที่ที่เรียกว่าสวนน้ำมั้ยคะ? ที่นั่นมีน้ำเต็มสระให้คนมาเล่นน้ำ แล้วน้ำในสระก็สะอาด#nจนแทบจะดื่มได้เลยนะคะ..."
61060-130 = "ยิ่งไปกว่านั้นยังมีพื้นที่ในร่มและกลางแจ้งแยกกัน แล้วก็ตกแต่งให้ต่างกันราวกับเป็นคนละโลกเลยค่ะ"
61060-131 = "นอกจากนี้ก็ยังมี..."
61060-145 = "......"
61060-146 = "......"
61060-147 = "แต่ไม่ว่าจะไปไหน ก็เหมือนจะไม่มีที่สำหรับฉันเลยค่ะ"
61060-148 = "ค่ะ... ฉันเข้าใจค่ะ"
61060-149 = "แสงไฟสว่างไสว ทุกคนดูมีความสุข"
61060-150 = "แต่ก็ดูมีความสุขกันในหมู่ตัวเอง"
61060-151 = "เพราะงั้น"
61060-156 = "ฉันก็เลยคิดได้ว่า ต่อให้ฉันล้มลงและหมดสติไปตรงหัวมุมไหนสักแห่ง"
61060-157 = "ก็คงไม่มีใครมาสนใจฉันค่ะ"
61060-161 = "ในที่ไหนสักแห่งบนโลกนี้ มีใครบางคนกำลังมีความสุข"
61060-162 = "และบางคนก็คงมีเรื่องให้อิ่มเอมใจ"
61060-163 = "แต่ในทางกลับกัน"
61060-167 = "ใครบางคนก็อาจไม่เป็นเช่นนั้นค่ะ"
61060-168 = "ที่บอกว่า \"เราทำได้ทุกอย่าง\" น่ะ..."
61060-169 = "อีกนัยหนึ่งอาจเป็นคำว่า \"ไม่มีอะไรที่เราทำได้เลย\" สำหรับบางคนก็ได้ค่ะ"
61060-170 = "เพราะไม่มีใครบอกเราให้ชัดเจนว่าต้องใช้ชีวิตยังไง"
61060-171 = "\"ชีวิตไม่มีคำตอบที่ถูกต้อง จงใช้ชีวิตตามที่ใจเลือก\""
61060-172 = "ในทางหนึ่งแล้วมันเป็นการให้กำลังใจที่ฟังรื่นหูแต่ไร้ความรับผิดชอบไม่ใช่เหรอคะ?"
61060-178 = "คงลำบากน่าดูเลยนะคะ คิดถูกแล้วละค่ะที่กลับมา"
61060-179 = "รุ่นพี่..."
61060-180 = "ฉันรู้ค่ะ รู้ดีเลยละ"
61060-181 = "ก็ที่นี่มีเด็กหลายคนที่ออกไปแล้วกลับมานี่คะ"
61060-182 = "ถึงจะมีหลายคนที่ตรงไปยังทรีนิตี้แล้วขาดการติดต่อไปเลยก็เถอะค่ะ"
61060-183 = "......"
61060-184 = "ทรีนิตี้..."
61060-185 = "ทำไมคะ อยากไปเหรอคะ?"
61060-192 = "มะ... มะมะมะมะ... ไม่ใช่อย่างนั้นค่ะ! ฉันเนี่ยนะคะจะอยากไป!"
61060-193 = "ไม่เป็นไรหรอกค่ะ ฉันไม่ห้ามหรอก แต่ว่าฉัน... คงทำแบบนั้นไม่ได้ค่ะ"
61060-194 = "ฉันยัง... ให้อภัยทรีนิตี้ไม่ลงน่ะค่ะ"
61060-195 = "ชะ... ใช่มั้ยล่ะคะ! ไม่ต้องสงสัยเลยละ!"
61060-196 = "ฉันเองก็... เหมือนกับรุ่นพี่ค่ะ...!"
61060-197 = "ขอบคุณนะคะ ฉันมีแรงขึ้นมาเลยค่ะ"
61060-204 = "อีกอย่างที่ให้อภัยไม่ได้"
61060-205 = "ก็คือพวกสควอดที่เลือกจะหายตัวไป ทั้งๆ ที่สามารถเป็นผู้นำทุกอย่างได้"
61060-209 = "แล้วก็ 'โจมาเอะ ซาโอริ' ด้วยค่ะ"
61060-211 = "ตอนต่อไป;ฮาร์โมนิกา"

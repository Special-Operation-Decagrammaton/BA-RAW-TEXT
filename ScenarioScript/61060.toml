[translation]
61060-1 = "Episode 6;A Seat on the Other Side"
61060-6 = "...The sun will set soon."
61060-7 = "You're right. We'll want to hurry."
61060-11 = "..."
61060-12 = "What's wrong, Hiyori?"
61060-13 = "It's just...really hitting that we're actually going back to Arius. Heh. Eheehee."
61060-14 = "...That's just how the dice rolled."
61060-15 = "At this point, whatever happens, happens."
61060-16 = "You've grown, Misaki. That's a mature way of looking at things."
61060-21 = "I don't want to hear it from you, \"Leader.\" Always coming and going as you please."
61060-22 = "Ack..."
61060-23 = "There's an undercurrent of affection in her jabs, Saori. She IS happy you're back."
61060-24 = "Even if only temporarily."
61060-25 = "Hey...!"
61060-26 = "...I won't fight with you. You'll just think whatever you want, Hime."
61060-27 = "Heehee. Vulnerability is not chief among your skills, Misaki."
61060-28 = "This is exactly what I mean!"
61060-30 = "[ns] \"It's nice to see you all getting along.\""
61060-31 = "Is that what you call this, Sensei?"
61060-32 = "Heehee. For my part, I am THRILLED Sensei is joining us."
61060-34 = "M-Me too! It's like...we're on an escort mission!"
61060-36 = "As Saori said, I have a favor to ask of you, Sensei."
61060-37 = "Would you consider teaching the Arius students?"
61060-38 = "If you'd prefer to do it remotely, we could make arrangements."
61060-39 = "I realize this is no simple request. Your safety will be our top priority."
61060-40 = "And from a certain perspective, moving ahead with this plan would be to disregard the wishes of the Arius students..."
61060-41 = "Excuse me?! You wish to teach them in person?!"
61060-43 = "..."
61060-44 = "I originally thought our mission would be to negotiate with the Arius students..."
61060-45 = "...and support Sensei as they taught remotely."
61060-46 = "But since you agreed to going in person, it could be regarded as an escort mission, of sorts."
61060-47 = "[ns] \"Sorry. Did I make things harder for you?\""
61060-48 = "N-No! Not at all."
61060-49 = "Rather, I'm worried that you're once again shouldering our burdens."
61060-50 = "And I feel guilty for that."
61060-51 = "While we're on the topic..."
61060-52 = "Why would you risk your safety to go somewhere as dangerous as Arius, Sensei?"
61060-56 = "[ns1] \"Heh. Heh. Heh. Obviously, for a chance to look cool...\"\n[ns2] \"...in front of my dear students!\""
61060-60 = "[ns] \"Heehee. That was a good one, wasn't it?\""
61060-61 = "Ah. Ummm..."
61060-62 = "I've already learned one thing..."
61060-63 = "...adults are cringy."
61060-65 = "[ns] \"That wasn't cool...?\""
61060-66 = "Not at all. I believe they call this \"second-hand embarrassment.\""
61060-67 = "But that part of you is exactly why we trust you, Sensei."
61060-68 = "...That felt like a pity compliment?"
61060-69 = "Mhm. Even I felt that way saying it."
61060-75 = "A-Atsuko?!"
61060-76 = "C-Critical damage! Sensei is down! Are they going to die?!"
61060-77 = "Cut the theatrics, Sensei. Let's get moving."
61060-79 = "Now then, a big round of applause!"
61060-80 = "Let us all celebrate our compatriot's safe return to Arius!"
61060-86 = "Aha...ha... It wasn't exactly smooth sailing, though."
61060-87 = "What matters is that your halo is intact."
61060-88 = "You protected what's most precious, so the rest can be addressed in due time."
61060-93 = "Welcome back. And thank you for returning safely, Maia."
61060-94 = "Time is still on our side."
61060-95 = "Y-Yes, Subaru!"
61060-96 = "I'm sorry. We don't even have a celebratory gift for you."
61060-97 = "N-No! Being back is more than enough. I kind of...missed it here..."
61060-98 = "Ah, yes. So, how was it? The outside? Please, tell me about it."
61060-99 = "The outside?"
61060-100 = "...It was amazing."
61060-101 = "And beautiful."
61060-106 = "..."
61060-108 = "I saw so many sights. Glass skyscrapers..."
61060-109 = "A huge river, with bridges suspended over it."
61060-112 = "At night, there were lights everywhere."
61060-113 = "Even the bridges were lit up. The way they shimmered over the water was like a dream."
61060-115 = "They had an entire building completely dedicated to playing music."
61060-116 = "While we could only play in secret when Madame wasn't looking..."
61060-119 = "...they held all kinds of concerts there, all through the day and night."
61060-120 = "Since they even played at night, they decorated it with so many pretty lights."
61060-121 = "...I learned that, out there, people don't worry about how useful their effort is."
61060-122 = "They aren't concerned with survival. They make pretty things, just because they're pretty."
61060-124 = "And at the markets...! I didn't know so many different foods existed in the world."
61060-125 = "Just smelling them made my stomach feel full."
61060-126 = "...Although that could have been because smelling them was all I COULD do."
61060-128 = "And have you ever heard of a water park? They fill an entire area with clean water, and people come just to play in it!"
61060-130 = "They even have indoor and outdoor sections, like two different worlds right next to each other."
61060-131 = "I can't begin to count all of the things I saw."
61060-145 = "..."
61060-146 = "..."
61060-147 = "But with all of those new and exciting things...there was nowhere for me to fit in."
61060-148 = "Yes. I understand."
61060-149 = "The lights were so bright, and everyone was smiling."
61060-150 = "They looked so happy together."
61060-151 = "But that's why..."
61060-156 = "Because even if I fainted somewhere, or fell in a dark corner..."
61060-157 = "...none of them would care. I knew that. I could feel that."
61060-161 = "Some people are happy."
61060-162 = "And others are satisfied."
61060-163 = "But people rarely spare a thought for..."
61060-167 = "...those who are suffering."
61060-168 = "People are encouraged from birth that \"they can do anything.\""
61060-169 = "Which also means that you may do nothing at all."
61060-170 = "No one takes your hand and guides you through life, step by step."
61060-171 = "They ignore you. They tell you that, since there's no right answer, you should live as you please."
61060-172 = "However, that's just shrugging off their responsibility with pretty words, isn't it?"
61060-178 = "You've worked hard. Welcome back."
61060-179 = "Subaru..."
61060-180 = "I know. There's no way for me to not."
61060-181 = "Many left here, like you, and returned."
61060-182 = "...While some left for Trinity, and we haven't heard from them since."
61060-183 = "..."
61060-184 = "Trinity..."
61060-185 = "Hm? Do you want to go too?"
61060-192 = "N-Never! I'll never leave you."
61060-193 = "Don't worry so much. I'd be fine with you going, if you really wanted."
61060-194 = "I just wouldn't...couldn't follow you. I will never forgive Trinity."
61060-195 = "Th-That's right! Why would you?"
61060-196 = "I feel the same way, Subaru!"
61060-197 = "Thank you. That gives me strength."
61060-204 = "Most of all..."
61060-205 = "I can't forgive the Squad. They were meant to lead us, and instead, they discarded us like yesterday's trash."
61060-209 = "Especially her. That Joumae Saori."
61060-211 = "Next Episode;Harmonica"

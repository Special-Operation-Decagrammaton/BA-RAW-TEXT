[translation]
61060-1 = "第6話;對面的椅子 "
61060-6 = "……快要傍晚了。 "
61060-7 = "是啊，再稍微加快腳步吧。 "
61060-11 = "…… "
61060-12 = "怎麼了，日和？ "
61060-13 = "我，我只是……有種真的要回到奧利斯了……的感覺。#n嘿，嘿嘿…… "
61060-14 = "既然都走到這一步了……"
61060-15 = "我決定不再對即將發生的事，賦予過多意義。 "
61060-16 = "是嗎。這個心態很不錯，美咲。#n看來你成長了啊。"
61060-21 = "隊長你少囉嗦。#n就是你最愛搞消失還敢說。 "
61060-22 = "唔…… "
61060-23 = "不過能讓沙織再度擔任隊長，還是挺讓人高興的吧？ "
61060-24 = "雖然僅限於這次任務的期間就是了。 "
61060-25 = "那是……！"
61060-26 = "……算了，麻煩死了。就當作是這樣吧。#n反正不管我說什麼，公主都會這麼想。 "
61060-27 = "還是這麼不坦率呢，美咲。 "
61060-28 = "我才沒有！ "
61060-30 = "[ns]「學生們相處得這麼融洽，老師也很欣慰…… 」"
61060-31 = "我的忍耐已經快到極限了哦，老師…… "
61060-32 = "呵呵。不過我還是很高興老師能陪在我們身邊。 "
61060-34 = "雖，雖然算是擔任護衛……還是很開心。#n耶嘿嘿…… "
61060-36 = "正因如此，我想向老師提出一個大膽的請求。 "
61060-37 = "即便只透過間接或遠端的方式也無妨…… "
61060-38 = "能請您為奧利斯的學生們授課嗎？ "
61060-39 = "當然這完全是我個人自私的請求，還請老師將自身的安全放在第一位。 "
61060-40 = "某種意義上而言，這個請求本身……也可能是我單方面忽視奧利斯學生意願的行為。 "
61060-41 = "什麼！？老師要親自前往奧利斯分校……！？ "
61060-43 = "…… "
61060-44 = "我原本以為任務的內容，是由我們負責跟留在奧利斯的學生進行某種協商……"
61060-45 = "並協助老師完成遠端輔導。"
61060-46 = "結果因為老師說要親自到場的關係，就這麼變成了護衛任務…… "
61060-47 = "[ns]「抱歉。會不會覺得有負擔？」 "
61060-48 = "不，不不不！怎麼會呢！ "
61060-49 = "身為曾在奧利斯分校待過的學生，我反而擔心是不是給老師添了太多麻煩…… "
61060-50 = "老師這麼為我們著想，也讓我覺得很過意不去…… "
61060-51 = "既然都說到這了，姑且讓我確認一下吧。 "
61060-52 = "為什麼要親自跑來奧利斯分校這麼危險的地方，老師？"
61060-56 = "[ns1]「哼．哼．哼。難得有這種機會，就讓我耍帥一下吧……」  \n[ns2]「因為那裡，也有我的學生啊！」 "
61060-60 = "[ns]「咳哼……！剛才那句台詞是不是還挺讚的？」"
61060-61 = "啊，啊嗚…… "
61060-62 = "……至少有件事我確實明白了。"
61060-63 = "那就是大人……有時候真的很丟臉…… "
61060-65 = "[ns]「怎麼會……」 "
61060-66 = "嗯。雖然聽起來確實有點尷尬…… "
61060-67 = "不過也讓我有種「這才是我們信任的老師」的感覺。"
61060-68 = "你說溫柔的安慰反而讓人心痛？ "
61060-69 = "嗯。我多少也猜到你會這麼想，所以才故意這麼說的。"
61060-75 = "敦，敦子！？ "
61060-76 = "老，老師突然縮起身體捂著胸口，就像快要昏倒一樣……？ "
61060-77 = "別裝病了，快起來吧老師。#n路還很遠呢。 "
61060-79 = "──那麼，請大家鼓掌！ "
61060-80 = "慶祝我們的朋友平安回到奧利斯！ "
61060-86 = "啊，啊哈哈……雖然看起來有夠狼狽的就是了…… "
61060-87 = "不過，至少光環還在不是嗎？ "
61060-88 = "只要有保住最貴重的東西，其他的隨時都能再找回來。 "
61060-93 = "歡迎回來。#n還有，謝謝你平安無事，舞彩。 "
61060-94 = "我們剩下的時間……還有很多。 "
61060-95 = "是，是……前輩！ "
61060-96 = "雖然說是歡迎會，但能做的事情也不是很多。#n真不好意思。 "
61060-97 = "別，別這麼說！#n我反而覺得……或許我懷念的，就是這種氛圍…… "
61060-98 = "這麼說來，「外面」感覺如何？#n我想直接聽你說說你的感想。 "
61060-99 = "外面是嗎？#n嗯，首先…… "
61060-100 = "……很神奇。 "
61060-101 = "也很漂亮。 "
61060-106 = "…… "
61060-108 = "我看見了很多風景。#n像是玻璃打造的高樓大廈……"
61060-109 = "巨大的河流，還有橫跨河面的橋。 "
61060-112 = "到了晚上之後，街道跟大樓都被燈光點亮……"
61060-113 = "倒映在水面上的橋，營造出了夢幻的氛圍。 "
61060-115 = "就連專門為了演奏音樂而建的建築都有。"
61060-116 = "在這裡，音樂只能趁「夫人」不在的時候偷偷演奏……"
61060-119 = "聽說那座建築，在晚上的演出比白天還多。"
61060-120 = "所以它的設計，打從一開始就著重於夜晚的燈光哦。"
61060-121 = "……沒錯。#n即使對生存或利益沒有任何幫助……"
61060-122 = "世界上的某些人，也願意只為了「漂亮」這個理由而投入時間與精力。"
61060-124 = "市集上擺滿了我從來沒見過的食物。"
61060-125 = "光是看著、聞著……就覺得幸福。 "
61060-126 = "雖然除了看跟聞之外……也什麼都做不了就是了。 "
61060-128 = "大家知道水上樂園嗎？#n是個裝滿了乾淨到能直接飲用的水，卻只用來玩樂的地方…… "
61060-130 = "甚至還分成室內和室外，布置得就像完全不同的世界一樣。"
61060-131 = "除此之外，還有…… "
61060-145 = "……"
61060-146 = "……"
61060-147 = "但是無論什麼地方……好像都沒有屬於我的位置。 "
61060-148 = "嗯……我明白你的心情。 "
61060-149 = "燈光璀璨，大家看起來都很幸福。 "
61060-150 = "幸福得令人不禁感到格格不入。 "
61060-151 = "所以……"
61060-156 = "就算我倒在某個角落失去意識……"
61060-157 = "也沒有人會在意吧。 "
61060-161 = "在這個世界上，總有些人能感到幸福。"
61060-162 = "也總有些人會感到滿足。 "
61060-163 = "不過換個角度來說……"
61060-167 = "這也意味著總有些人永遠無法如此。 "
61060-168 = "「什麼都能做到」這句話……"
61060-169 = "或許也等同於「什麼都做不到」。"
61060-170 = "因為沒有人能準確地告訴我該怎麼活下去。 "
61060-171 = "「人生沒有標準答案，所以就按照你選擇的方式活下去吧」。 "
61060-172 = "仔細想想，這不就只是句聽起來好聽卻一點也不負責任的鼓勵嗎？ "
61060-178 = "辛苦你了。歡迎回來。 "
61060-179 = "前輩…… "
61060-180 = "我知道。我當然知道。 "
61060-181 = "畢竟這裡有很多曾經出去又回來的孩子。"
61060-182 = "……雖然也有在前往三一之後就音訊全無的孩子就是了。"
61060-183 = "…… "
61060-184 = "三一…… "
61060-185 = "怎麼了？你也想去嗎？ "
61060-192 = "沒，沒沒沒，沒有！我怎麼會想去呢！ "
61060-193 = "沒關係，我不會阻止你的。#n只是……我恐怕做不到吧。"
61060-194 = "因為我還無法原諒三一。 "
61060-195 = "就，就是說啊！那當然！"
61060-196 = "我也……跟前輩一樣……！"
61060-197 = "謝謝你。我感覺踏實多了。 "
61060-204 = "除了三一之外……"
61060-205 = "明明能領導一切卻選擇消失的那個小隊……"
61060-209 = "尤其「錠前沙織」也是如此。"
61060-211 = "下一話;口琴"

[translation]
10044010-1 = "第1話;平常的任務"
10044010-2 = "[log]幾小時前……[/log]"
10044010-6 = "……就是因為這樣，所以才會請你們來。"
10044010-7 = "什麼嘛，只是普通的貨物輸送任務嘛。"
10044010-8 = "和平常一樣～好無聊～"
10044010-9 = "不是……你們有認真聽嗎？#n我剛才都說了，這項任務非常重要。"
10044010-10 = "反正也不可能會出什麼事嘛？運什麼貨哪有差。"
10044010-11 = "過去回來～結束～"
10044010-12 = "唉……為什麼那個時段能駕駛的幹部偏偏只有你們兩個。#n我現在是在做惡夢嗎……"
10044010-13 = "總之事情就是這樣，你們只要平安完成行駛就好。#n我會派一名工程師跟你們一起行動。"
10044010-14 = "準時把貨物安全送到目的地。我就拜託你們這一件事……"
10044010-15 = "啊～啊～知道了～"
10044010-16 = "把貨物～在指定時間送到指定位置～超簡單。"
10044010-17 = "就叫你們認真一點……！！"
10044010-21 = "碎碎唸，Cut！"
10044010-22 = "Let's do this～"
10044010-29 = "咯咯咯……真的沒問題嗎？"
10044010-30 = "唉……真是不好意思。#n不過他們的實力無庸置疑，再麻煩您多多關照了……"
10044010-31 = "他們看起來很放鬆……說不定反而更適合這種任務呢。呵呵。"
10044010-32 = "是。貨物一定會準時平安送達的。"
10044010-33 = "一定得送到。無論如何都必須送到。#n咯咯……"
10044010-36 = "貨物列車出發站"
10044010-41 = "是這班列車嗎？#n和平常沒什麼不一樣嘛。"
10044010-42 = "要不要來貼「重要貨物」的貼紙～？超大的那種～"
10044010-43 = "噗哈哈！那樣根本是在叫路上的人快點來搶我們嘛！"
10044010-44 = "好像很好玩耶，下次試試看好了。"
10044010-48 = "那，那個……"
10044010-52 = "你，你們好……請問兩位是……CCC的幹部嗎……？"
10044010-53 = "嗯，沒錯。"
10044010-54 = "你誰～？"
10044010-55 = "啊……是兩位沒錯呢。#n嘿嘿……"
10044010-56 = "我，我叫內海青葉……"
10044010-57 = "是事務局派來協助兩位的整備工程師……"
10044010-58 = "啊哈，對耶。#n剛才有說過會派工程師來。"
10044010-59 = "是New face～"
10044010-60 = "不過想想也是，要是列車開到一半故障的話，我們也沒辦法修嘛。噗哈哈！"
10044010-61 = "看，看來他們真的只是因為駕駛技術好才當上幹部的菜鳥而已……"
10044010-65 = "嗯？你說什麼？"
10044010-66 = "如，如果遇到功能故障或運行期間的障礙，就交給我來處理吧……！"
10044010-67 = "不是，你剛才好像在說別的吧……"
10044010-68 = "請兩位不用擔心，只要專心駕駛就好……"
10044010-70 = "好吧，那就交給你囉。"
10044010-71 = "光是橘光～希望是橘希望～"
10044010-73 = "好，好的……請多指教……"
10044010-74 = "我一直都很想親眼看看幹部們到底長什麼樣子……#n因為幹部下的指令實在太蠢，根本對現場工作一無所知……#n沒，沒想到會有這種機會，真讓人高興……#n"
10044010-75 = "看吧！你剛才又罵人了？"
10044010-76 = "差，差點把心裡想的都說出口了呢～嘿嘿……"
10044010-77 = "你早就說出來了好嗎！"
10044010-79 = "被攻擊了～光要報仇～"
10044010-88 = "唔哦哦～懲罰的一擊～"
10044010-92 = "呀，呀啊……好痛……"
10044010-96 = "咦，一點也不痛……？#n怎，怎麼這麼沒力……"
10044010-97 = "嗚嗚～光肚子餓～沒力氣了～"
10044010-99 = "離出發還有一點時間，先到站務室去吧。"
10044010-100 = "在那裡叫外送吃就行了。"
10044010-101 = "叫披薩吧～臘腸披薩～"
10044010-102 = "噗哈哈，不錯耶？#n開車前果然就是要吃披薩！"
10044010-103 = "請，請等一下。#n要是沒有事先告知就貿然跑進站務室的話……"
10044010-104 = "嗯？有什麼問題嗎？"
10044010-105 = "畢，畢竟兩位是幹部……我怕會造成站務員的困擾……"
10044010-109 = "會嗎？我們只是去休息一下而已耶？"
10044010-110 = "不，不是……#n待在同一個空間，可能會讓彼此不太自在……"
10044010-111 = "不會呀～超自在的～"
10044010-112 = "是你想太多了吧。#n待在那裡很自然啊，有什麼好不自在的？"
10044010-113 = "因為兩位是幹部，所以當然……"
10044010-114 = "快進去躺下來吧！"
10044010-118 = "……"
10044010-119 = "唉……這些幹部真的是……"
10044010-122 = "系統從剛才開始就有點怪怪的。"
10044010-123 = "怎麼了？"
10044010-124 = "自動發車系統一直在對月台發送發車信號。"
10044010-125 = "是哦……不過這也不是什麼大問題。#n只要駕駛室不要接收就好了吧。"
10044010-126 = "話是這麼說沒錯，但我總覺得有點在意。"
10044010-127 = "不用管這麼多啦，反正我們也沒辦法做什麼。"
10044010-128 = "也對，那就這樣吧。"
10044010-135 = "加速衝刺登場～"
10044010-136 = "你，你們是誰……？#n這裡非相關人員禁止進入……"
10044010-137 = "哈囉～我們是CCC的人～！"
10044010-141 = "啊，啊啊！！#n幹部們怎麼會來這裡……"
10044010-142 = "難，難道是突擊檢查！？"
10044010-144 = "啊啊～不用在意。#n我們是來執行貨物運輸工作的，但現在還沒到出發時間，所以就來休息一下。"
10044010-145 = "噗哈哈，借用一下這邊的沙發囉？"
10044010-146 = "Hyper dive～"
10044010-151 = "好，好的……請便……"
10044010-155 = "不，不好意思……這兩位比較我行我素…"
10044010-156 = "哈哈……只是覺得有點突然而已，請幾位好好休息……"
10044010-157 = "好，好的……對不起，謝謝……"
10044010-162 = "沒想到會突然有幹部跑進來……"
10044010-163 = "唔，空氣突然變得好沈重……"
10044010-164 = "明明沒做錯什麼，卻覺得坐立難安……"
10044010-165 = "唉……看來今天的班會上得很痛苦。"
10044010-166 = "不過聽說今天克洛盧斯好像要去別的車站採訪，相較之下已經好多了。"
10044010-167 = "啊……要打掃整理還要練習受訪，肯定會亂成一團。"
10044010-168 = "就是說啊。我們繼續工作吧。"
10044010-170 = "10分鐘後……"
10044010-179 = "哇啊～披薩要來了～"
10044010-180 = "這麼快就來了？#n也太快了吧？噗哈哈！"
10044010-182 = "甚至還叫了披薩……？"
10044010-188 = "披薩外送到了～"
10044010-189 = "這邊～這邊～"
10044010-190 = "臘腸披薩加大，還有加點汽水對吧？"
10044010-191 = "那我放在這邊，再見～"
10044010-192 = "哇，動作超快，而且還熱騰騰的……"
10044010-193 = "……"
10044010-194 = "不是，先等一下！"
10044010-195 = "怎麼了？"
10044010-196 = "你自己看！這披薩是怎樣啊？"
10044010-201 = "這樣要我們怎麼吃啦！"
10044010-202 = "跟急轉彎的時候東倒西歪的乘客一樣～"
10044010-207 = "反正又不是不能吃？#n重新鋪平不就好了，吃下去又沒差。"
10044010-208 = "啊？"
10044010-209 = "我這麼快就送到，你們反而應該感謝我才對吧？"
10044010-210 = "外送最重要的是速度！"
10044010-211 = "還在胡說八道？我一定要投訴你！#n光，馬上打電話給披薩店！"
10044010-212 = "唔哦哦～無限連Call開始～"
10044010-213 = "不是，先等等！你們就不能將就一下嗎！！#n我都已經這麼快送到了！！"
10044010-225 = "居然能把披薩搞成這樣，你到底是怎麼騎車的……該不會是飆車過來的吧……"
10044010-226 = "站務室亂成一團……"
10044010-228 = "哼！！你們要這樣搞我是吧？#n好啊，你們永遠都別想再踏上馬路一步！"
10044010-229 = "笨～蛋！我們都是搭火車好嗎？才不會到馬路上去咧！"
10044010-230 = "可惡……！可惡的高地人，給我走著瞧！"
10044010-231 = "我可是轟隆轟隆疾馳聯盟的人！怕了吧？#n我一定會報仇！！"
10044010-236 = "唉，真是的。什麼怪人都有。"
10044010-238 = "光飢餓度100%……每秒傷害5億……"
10044010-239 = "店裡說會派另一個外送員過來，再等一下吧。"
10044010-241 = "結，結果還是退款了……兩邊都好過分……"
10044010-242 = "話說好像跟暴走族結下了樑子，沒問題嗎……"
10044010-243 = "能有什麼問題？反正我們都是搭火車啊。"
10044010-244 = "不，不是……我不是在說兩位幹部，是在說我自己。"
10044010-245 = "而，而且我為什麼要擔心幹部？#n我才不會做那種事咧，又不是笨蛋……"
10044010-246 = "光，攻擊！"
10044010-248 = "嗚嗚……肚子好餓～連報仇的力氣都沒有了～"
10044010-253 = "（過了一段時間……）"
10044010-258 = "呼啊～睡得好飽～"
10044010-259 = "差不多該出發了。出去看看吧？"
10044010-261 = "啊，幾位要走了嗎？"
10044010-262 = "又吃又睡的……兩位幹部真的把這裡當成自己家啊……"
10044010-263 = "大家辛苦啦～！"
10044010-264 = "Adios～"
10044010-269 = "抱，抱歉打擾了……！！"
10044010-274 = "不會……辛苦了……"
10044010-279 = "唉……終於走了。"
10044010-280 = "就是說啊……害我一直好緊繃。"
10044010-285 = "要，要遵守檢查的標準作業程序才行哦。"
10044010-286 = "都～說～了～沒關……"
10044010-290 = "嗯？"
10044010-291 = "嗯？怎麼了嗎……"
10044010-292 = "列車怎麼沒有停在這裡？"
10044010-293 = "什麼？"
10044010-294 = "原本明明在這裡啊。#n怎麼不見了？"
10044010-295 = "咦？？？"
10044010-296 = "消失了～"
10044010-297 = "兩，兩位幹部……請別開這種玩笑。"
10044010-298 = "沒開玩笑啊～？"
10044010-299 = "列車到底跑去哪了？"
10044010-300 = "……"
10044010-307 = "咦咦？？？？？？？"

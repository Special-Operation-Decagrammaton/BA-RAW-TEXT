[translation]
10044010-1 = "Episode 1;Ordinary Mission"
10044010-2 = "[log]A few hours earlier...[/log]"
10044010-6 = "...which is why we called you."
10044010-7 = "Huh, so just a regular freight run, then."
10044010-8 = "Same as usual. That's no fun."
10044010-9 = "Wait... Were you paying attention? I just told you, this mission is critical."
10044010-10 = "Yeah, but nothing's going to HAPPEN, right? Train loads thing, train carries thing."
10044010-11 = "Back and forth. Done."
10044010-12 = "*sigh* And you're the only two I have available. What a nightmare..."
10044010-13 = "Look, just make sure it gets there without any trouble. I'll assign you an engineer."
10044010-14 = "All I'm asking you to do is get the cargo to its destination on time."
10044010-15 = "Yeah, yeah. Got it."
10044010-16 = "Cargo to destination on time. Super easy."
10044010-17 = "You really need to take this more seriously..."
10044010-21 = "Ah, quit nagging already."
10044010-22 = "Yeah, let's go."
10044010-29 = "Ha ha... You say you're certain about those two?"
10044010-30 = "*sigh* They're embarrassing, sure, but there's no questioning their skills."
10044010-31 = "They do seem to have a certain...fearlessness about them. Perhaps that's what's most important, on this...particular run."
10044010-32 = "Well, I can tell you one thing, they'll get it there on time, in one piece."
10044010-33 = "As they should. As they must. Ha ha..."
10044010-36 = "Freight Train Departure Station"
10044010-41 = "Is that the train we're taking? Looks pretty run-of-the-mill."
10044010-42 = "We should put a giant sticker on it that says, \"IMPORTANT CARGO!\""
10044010-43 = "Pahyahya! Right, then EVERYbody'll come after us!"
10044010-44 = "Sounds fun. We should do that next time."
10044010-48 = "U-Um..."
10044010-52 = "H-Hello... You're the CCC officers, right...?"
10044010-53 = "Yeah. And?"
10044010-54 = "Who are you?"
10044010-55 = "Ah...right. Heehee..."
10044010-56 = "I-I'm Utsumi Aoba..."
10044010-57 = "The Bureau sent me. I'll be your engineer."
10044010-58 = "Ah, right, they did say they'd be sending someone."
10044010-59 = "A new face, huh?"
10044010-60 = "Well, glad to have you along. If something breaks, it's not like WE can fix it. Pahyahya!"
10044010-61 = "R-Right...(s-since you two are just spoiled brats who know how to drive)..."
10044010-65 = "Hm? What was that?"
10044010-66 = "I-I'll take care of any malfunctions or operational issues!"
10044010-67 = "No, I think you said something else..."
10044010-68 = "Nothing to worry about. You can just drive, and I'll handle the rest."
10044010-70 = "Huh, all right. Everything else is your job, then."
10044010-71 = "I'm Tachibana Hikari. This is Tachibana Nozomi."
10044010-73 = "R-Right... I look forward to working with you..."
10044010-74 = "I'm glad for the chance to...see the faces of these two silver-spoon hoity-toities, giving all their braindead orders..."
10044010-75 = "You know we can hear you, right?"
10044010-76 = "J-Just kidding... Heehee..."
10044010-77 = "Nah, there's no taking that back."
10044010-79 = "That was a personal attack. And now we get to attack you!"
10044010-88 = "Aw, yeah. Revennnge SMACK!"
10044010-92 = "O-Ouch... That..."
10044010-96 = "...didn't actually hurt. Wh-Why are you so weak...?"
10044010-97 = "Boo. Hikari hungry. No strength."
10044010-99 = "There's time before we have to go, if we want to step into the station office."
10044010-100 = "We could order a pizza from there."
10044010-101 = "Ooh, with pepperoni."
10044010-102 = "Pahyahya! Sounds good! Pizza's perfect for a run like this!"
10044010-103 = "H-Hold on. If you just barge into the station office..."
10044010-104 = "Hm? Is there a problem?"
10044010-105 = "W-Well, you're officers. You might put the staff on edge, is all."
10044010-109 = "They don't need to worry. We're just taking a little break in there."
10044010-110 = "I-I mean being in the same room with you could make them uncomfortable."
10044010-111 = "Uncomfy? Nah, super-comfy for us."
10044010-112 = "Yeah, the staff doesn't make me uncomfortable, so what's their problem?"
10044010-113 = "Well, you're officers, and they're not..."
10044010-114 = "Eh, whatever. Let's go put our feet up already!"
10044010-118 = "..."
10044010-119 = "*sigh* Officers. Always the same..."
10044010-122 = "The system's been acting weird since earlier."
10044010-123 = "How so?"
10044010-124 = "The automatic departure system keeps sending signals to the platform when it's not supposed to."
10044010-125 = "Huh... Well, it's not that big of a problem, as long as the drivers' compartment has someone on the job."
10044010-126 = "True, but it's still bothering me."
10044010-127 = "Leave it. There's nothing we can do about it."
10044010-128 = "Tsk, fine."
10044010-135 = "WWWhoo-dash!"
10044010-136 = "Wh-Who are...? This place is staff-only..."
10044010-137 = "Hi! We're with the CCC!"
10044010-141 = "A-Ah! What brings our officers here...?"
10044010-142 = "I-Is this a surprise inspection?"
10044010-144 = "Ha, no, it's nothing to worry about. We're just chilling here before we take our train out."
10044010-145 = "Pahyahya, I call the sofa!"
10044010-146 = "Hyperdive!"
10044010-151 = "...Okay... Sure..."
10044010-155 = "I-I'm sorry... They're quite pushy..."
10044010-156 = "Haha... Well, uh, you've caught us a little unprepared for guests, but...please enjoy your stay!"
10044010-157 = "Y-Yes... Pardon us, thank you..."
10044010-162 = "Who would've expected officers to come flying in like this?"
10044010-163 = "Ugh, the air feels so heavy now..."
10044010-164 = "I didn't even DO anything, and I feel like I'm in trouble..."
10044010-165 = "*sigh* It's going to be one of those days..."
10044010-166 = "Could be worse. You could be at the station where Kronos has that interview today."
10044010-167 = "Ah... All that cleaning, and organizing, and rehearsing must be a nightmare for them."
10044010-168 = "Right? Let's just get to work and make the best of it."
10044010-170 = "10 minutes later..."
10044010-179 = "Yay, pizza's here!"
10044010-180 = "Already? That was quick! Pahyahya!"
10044010-182 = "They even ordered pizza...?"
10044010-188 = "Delivery!"
10044010-189 = "Right over here!"
10044010-190 = "Large pepperoni pizza with soda, right?"
10044010-191 = "Here you go!"
10044010-192 = "Wow, it's still steaming, you got it here so fast..."
10044010-193 = "..."
10044010-194 = "Hold up."
10044010-195 = "Huh?"
10044010-196 = "Look at this! Why is the pizza like this?"
10044010-201 = "How are we supposed to eat this?"
10044010-202 = "It looks like a bunch of passengers after a sharp curve. Total mess."
10044010-207 = "Well, it's still edible. You can spread it back out, if you like."
10044010-208 = "Haaah?"
10044010-209 = "You should thank me for bringing it so fast."
10044010-210 = "Speed's what counts in delivery, right?"
10044010-211 = "What kind of joke is...? I'm filing a complaint. Hikari, call their corporate office."
10044010-212 = "Oooh. Eternal hold music, here we come."
10044010-213 = "Seriously, just eat it!! I got it here lightning-fast!"
10044010-225 = "How fast were you driving to make it look like this? Were you having road rage or something?!"
10044010-226 = "This office is a total mess now..."
10044010-228 = "All right, you want to play it that way? I can make some calls of my own! How'd you like to never set foot on the road again?"
10044010-229 = "Yeah, we ride trains. We don't need roads, dumbass!"
10044010-230 = "Oh, you wait and see, you little Highlander brats!"
10044010-231 = "I'm from the Vroom Vroom Race Association, you know! Ha, you scared now? I'm gonna make you pay for this!!"
10044010-236 = "I...canNOT believe that just happened."
10044010-238 = "Hunger at 100%... 500 million damage per second..."
10044010-239 = "Hang on a little longer. They said they're gonna send another delivery guy."
10044010-241 = "S-So you ended up getting a refund... You must be very used to getting your way."
10044010-242 = "Although ticking off a biker gang might not have been the best idea..."
10044010-243 = "Eh. Bikers don't ride on train tracks. We'll be fine."
10044010-244 = "I'm not worried about you two. I'm worried about myself."
10044010-245 = "*grumble* Worrying about you two would be a waste of time..."
10044010-246 = "Hikari, smack her!"
10044010-248 = "Boo... Too hungry. No strength for revenge..."
10044010-253 = "Some time later..."
10044010-258 = "*yawn* That was a nice nap."
10044010-259 = "It's almost time for departure. Shall we?"
10044010-261 = "Ah, you're going?"
10044010-262 = "Eating, then sleeping... You really made yourself at home here..."
10044010-263 = "Good luck with all that work you're doing!"
10044010-264 = "Adios."
10044010-269 = "S-Sorry for all this...!"
10044010-274 = "Yeah..."
10044010-279 = "Ah, they're finally gone."
10044010-280 = "Yeah... The nerves really got to me. Phew."
10044010-285 = "Th-There's a reason why there's a whole inspection process."
10044010-286 = "I'm telling you, it's ok..."
10044010-290 = "Huh?"
10044010-291 = "Hm? Why are you...?"
10044010-292 = "Where'd our train go?"
10044010-293 = "What do you mean?"
10044010-294 = "It was here before. Where'd it go?"
10044010-295 = "What?!"
10044010-296 = "...It's gooone."
10044010-297 = "O-Officers... You can't joke about that."
10044010-298 = "We're not."
10044010-299 = "Seriously, where'd it go?"
10044010-300 = "..."
10044010-307 = "Ehh?!!"

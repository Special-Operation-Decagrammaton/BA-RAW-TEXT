[translation]
10044010-1 = "ตอนที่ 1;ภารกิจทั่วไป"
10044010-2 = "[log]ไม่กี่ชั่วโมงก่อนหน้านี้...[/log]"
10044010-6 = "ก็เพราะอย่างนี้ละ ฉันเลยเรียกพวกเธอมา..."
10044010-7 = "อะไรกัน แค่ภารกิจส่งสินค้าธรรมดาๆ นี่นา"
10044010-8 = "เหมือนเดิมทุกวัน ไม่เห็นสนุกเลย"
10044010-9 = "เดี๋ยวนะ... พวกเธอได้ยินถูกกันหรือเปล่า? ฉันบอกว่าเป็นภารกิจที่สำคัญมากๆ ต่างหาก"
10044010-10 = "ก็มันไม่มีอะไรพิเศษอยู่แล้วนี่? ไม่ว่าจะเป็นสินค้าหรืออะไรก็ไม่ต่างกันหรอก"
10044010-11 = "รับมาส่งไป ก็จบ"
10044010-12 = "เฮ้อ... แล้วทำไมถึงต้องเหลือแค่พวกเธอที่ทำงานในเวลานี้ได้นะ นี่มันฝันร้ายของฉันหรือเปล่า..."
10044010-13 = "เอาเถอะ! ขับรถไฟให้มันดีๆ แล้วกัน อย่าให้เกิดอันตรายอะไรล่ะ แล้วฉันจะส่งวิศวกรไปด้วยอีกคนหนึ่ง"
10044010-14 = "ส่งสินค้าให้ถึงจุดหมายปลายทางให้ปลอดภัยและตรงเวลาล่ะ ฉันขอร้องแค่เรื่องนี้..."
10044010-15 = "ระ~ ระ~ รู้แล้วน่า~"
10044010-16 = "ส่งสินค้าในพิกัดและเวลาที่กำหนด ง่าย จะ ตาย"
10044010-17 = "ถ้างั้นก็ทำให้มันจริงจังหน่อย...!!"
10044010-21 = "เลิกบ่นได้แล้วน่า!"
10044010-22 = "เล็ตส์ ดู ดิส"
10044010-29 = "ฮึ่ม สองคนนี้... จะไหวหรือเปล่าครับ?"
10044010-30 = "แหะๆ... น่าอายจังเลยนะคะ แต่เห็นอย่างนี้พวกเธอก็เป็นคนที่มีฝีมือ..."
10044010-31 = "จะว่าไปพวกเธอก็ไม่ได้ดูประหม่าอะไรเลยด้วย... บางทีอาจจะเหมาะกับภารกิจนี้แล้วละครับ หึหึ"
10044010-32 = "ค่ะ สินค้าจะถึงอย่างปลอดภัยตามเวลาที่กำหนดค่ะ"
10044010-33 = "ต้องเป็นอย่างนั้นครับ จะให้เป็นอย่างอื่นไปไม่ได้ หึหึ..."
10044010-36 = "ต้นทางรถไฟบรรทุกสินค้า"
10044010-41 = "ขบวนนี้สินะ? ก็ไม่เห็นจะต่างกับขบวนทั่วไปเลย"
10044010-42 = "ติดสติกเกอร์ว่าเป็นสินค้าสำคัญมั้ย? เอา อัน ใหญ่ๆ เลย"
10044010-43 = "วะฮะฮ่า! ถ้างั้นทุกคนก็คงจ้องอยากจะได้ของข้างในน่ะสิ!"
10044010-44 = "ฟังดูน่าสนุกดีนะ ไว้คราวหน้าลองทำดูแล้วกัน"
10044010-48 = "อะ... เอ่อ..."
10044010-52 = "สะ... สวัสดีค่ะ... ท่านผู้บริหาร CCC... ใช่มั้ยคะ...?"
10044010-53 = "อื้อ ใช่"
10044010-54 = "ใครเหรอ?"
10044010-55 = "อ่า... ใช่สินะ แหะๆๆ..."
10044010-56 = "ฉะ... ฉันชื่ออุตสึมิ อาโอบะ..."
10044010-57 = "เป็นวิศวกรที่สำนักงานบริหารส่งมาช่วยในภารกิจครั้งนี้ค่ะ..."
10044010-58 = "อ้อ จริงสิ ทางนั้นบอกว่าจะส่งวิศวกรมานี่เนอะ"
10044010-59 = "นิว เฟซ"
10044010-60 = "ก็นะ ถ้ารถไฟพังระหว่างที่วิ่งอยู่ พวกเราก็ซ่อมไม่เป็นนี่เนอะ วะฮะฮ่า!"
10044010-61 = "ค่ะ ค่ะ... กะ... ก็พวกคุณสองคนเป็นเด็กน้อยที่มีดีแค่เรื่องการขับรถไฟ ก็เลยได้มาเป็นผู้บริหาร..."
10044010-65 = "หืม? ว่ายังไงนะ?"
10044010-66 = "ถะ... ถ้ารถไฟมีส่วนไหนเสียหายหรือมีปัญหาระหว่างการเดินทาง ฉันจะจัดการให้เองค่ะ...!"
10044010-67 = "เดี๋ยวก่อน เมื่อกี้เหมือนเธอว่าอะไรพวกเราเลย..."
10044010-68 = "ไม่ต้องกังวลนะคะ ใส่ใจแค่เรื่องขับรถไฟก็พอแล้วค่ะ..."
10044010-70 = "ฮึ่ม ก็ได้ งั้นฉันฝากด้วยแล้วกัน"
10044010-71 = "ฉันชื่อทาจิบานะ ฮิคาริ ส่วนนี่ก็ทาจิบานะ โนโซมิ"
10044010-73 = "ค่ะ ค่ะ... ขอฝากตัวด้วยนะคะ..."
10044010-74 = "สงสัยอยู่นานเลยว่าพวกผู้บริหารเป็นคนยังไง ถึงได้ชอบออกคำสั่งโง่ๆ เหมือนคนไม่รู้สถานการณ์หน้า#nงาน แล้วฉันก็อยากเห็นหน้าพวกผู้บริหารสักครั้งด้วย... วะ... วันนี้ดีใจจังเลยค่ะที่ได้โอกาสนั้นแล้ว..."
10044010-75 = "อีกแล้วนะ! เมื่อกี้ก็พูดแซะพวกเราใช่มั้ย?"
10044010-76 = "กะ... เกือบพูดความคิดของตัวเองไปแล้วสินะคะ~ แหะๆ..."
10044010-77 = "พูดออกมาหมดแล้วเหอะ!"
10044010-79 = "โดนโจมตีแล้ว ต้องแก้แค้น..."
10044010-88 = "โอ้ววว ล้างแค้นแบบครั้งเดียวจอด"
10044010-92 = "อ๊ะ... อ๊าย... เจ็บ..."
10044010-96 = "ไม่เจ็บเลยนี่คะ...? ทะ... ทำไมถึงไม่มีแรงอย่างนี้ล่ะคะ..."
10044010-97 = "โอย... ฮิคาริหิว ไม่มีแรงเลย"
10044010-99 = "เรายังมีเวลาเหลือจนกว่าจะออกเดินทาง งั้นไปนั่งเล่นในสำนักงานของสถานีกันก่อนดีกว่า"
10044010-100 = "แล้วก็สั่งอาหารอะไรมากินด้วย"
10044010-101 = "สั่งพิซซ่ากันเถอะ พิซซ่าเปปเปอโรนี"
10044010-102 = "วะฮะฮ่า ดีเลยนะ พิซซ่าที่กินก่อนขับรถไฟนี่ละอร่อยที่สุดแล้ว!"
10044010-103 = "ดะ... เดี๋ยวก่อนค่ะ ถ้าเข้าไปในสำนักงานของสถานีโดยไม่ได้แจ้งล่วงหน้า..."
10044010-104 = "หืม? มีปัญหาอะไรเหรอ?"
10044010-105 = "กะ... ก็พวกคุณเป็นถึงผู้บริหาร... ฉันเลยกังวลว่าเจ้าหน้าที่สถานีที่นี่จะลำบากใจกัน..."
10044010-109 = "จะลำบากใจอะไร? พวกเราแค่จะไปพักผ่อนเอง?"
10044010-110 = "มะ... ไม่หรอกค่ะ... บางทีแค่อยู่ในพื้นที่เดียวกันก็อึดอัดได้..."
10044010-111 = "ไม่เห็นอึดอัด ฉันสะดวกใจออก"
10044010-112 = "อื้อ ไม่เห็นจะรู้สึกอย่างนั้นเลย แค่เราไปพักผ่อนอย่างเป็นธรรมชาติก็พอนี่?"
10044010-113 = "ก็พวกคุณเป็นผู้บริหาร ต้องคิดแบบนั้นอยู่แล้ว..."
10044010-114 = "รีบเข้าไปนอนเล่นกันเถอะน่า!"
10044010-118 = "......"
10044010-119 = "เฮ้อ... คนใหญ่คนโตก็แบบนี้ละนะ..."
10044010-122 = "ระบบมันแปลกๆ มาตั้งแต่เมื่อกี้แล้วแฮะ"
10044010-123 = "ทำไมเหรอ?"
10044010-124 = "ระบบออกตัวอัตโนมัติส่งสัญญาณออกตัวไปยังชานชาลาอยู่เรื่อยเลย"
10044010-125 = "เรื่องแค่นี้เอง... ไม่ใช่ปัญหาใหญ่อะไรหรอก แค่ทางห้องควบคุมปิดสัญญาณก็พอแล้ว"
10044010-126 = "มันก็จริงอยู่หรอก แต่ฉันกังวลน่ะ"
10044010-127 = "ปล่อยไปเถอะ นั่นไม่ใช่เรื่องที่พวกเราจะทำอะไรได้สักหน่อย"
10044010-128 = "เฮ้อ เอางั้นก็ได้"
10044010-135 = "แดชเข้าไปเลย"
10044010-136 = "คะ... ใครน่ะ? ห้ามบุคคลภายนอกเข้ามาในนี้นะ..."
10044010-137 = "สวัสดี~ พวกเรามาจาก CCC~!"
10044010-141 = "อ่า... อ๊ะ!! ท่านผู้บริหารมาทำอะไรที่นี่คะ..."
10044010-142 = "ระ... หรือว่ามาตรวจการทำงานแบบไม่แจ้งล่วงหน้า?!"
10044010-144 = "โธ่~ ไม่ต้องกังวลหรอก พวกฉันต้องทำภารกิจขนส่งสินค้า แต่ยังไม่ถึงเวลาเดินทาง ก็เลยเข้ามาพักผ่อนในนี้น่ะ"
10044010-145 = "วะฮะฮ่า ขอยืมโซฟาหน่อยนะ"
10044010-146 = "ไฮเปอร์ ไดฟ์"
10044010-151 = "ค่ะ... ตามสบายเลยค่ะ..."
10044010-155 = "ขะ... ขอโทษด้วยนะคะ... ทั้งสองคนนี้ดื้อรั้นกันจริงๆ เลย..."
10044010-156 = "แหะๆ... ถึงจะกะทันหันจนตั้งตัวไม่ทันไปหน่อย แต่ก็พักผ่อนให้สบายเถอะค่ะ"
10044010-157 = "ค่ะ... ค่ะ... ขอโทษอีกครั้งนะคะ ขอบคุณค่ะ..."
10044010-162 = "คิดไม่ถึงเลยว่าพวกผู้บริหารจะเข้ามาแบบนี้..."
10044010-163 = "อึก... จู่ๆ บรรยากาศก็อึมครึมขึ้นมาเลยนะ..."
10044010-164 = "ฉันไม่ได้ทำอะไรผิดแท้ๆ แต่รู้สึกไม่สบายใจเลย..."
10044010-165 = "เฮ้อ... การทำงานวันนี้คงเครียดน่าดู"
10044010-166 = "แต่ได้ยินมาว่าวันนี้บางสถานีมีคนจากโครโนสมาเก็บข้อมูลด้วยนะ ยังไงพวกเราก็โชคดีกว่าละน่า"
10044010-167 = "อ่า... สถานีนั้นน่าจะต้องทั้งทำความสะอาด จัดพื้นที่ แล้วก็ซ้อมให้สัมภาษณ์ด้วย คงวุ่นวายกันน่าดูนะ"
10044010-168 = "นั่นน่ะสิ งั้นพวกเราก็ทำงานของสถานีนี้กันเถอะ"
10044010-170 = "10 นาทีต่อมา..."
10044010-179 = "ว้าว พิซซ่ามาส่งแล้ว"
10044010-180 = "มาไวจังเลย นั่งรถไฟความเร็วสูงมาหรือไงกัน? วะฮะฮ่า!"
10044010-182 = "ถึงกับสั่งพิซซ่ามากินเลยเหรอ...?"

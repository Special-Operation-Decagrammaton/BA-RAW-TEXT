10044010-193 = "......"
10044010-194 = "นี่ เดี๋ยวก่อน!"
10044010-195 = "ค่ะ!"
10044010-196 = "มาดูนี่สิ! ทำไมพิซซ่าถึงสภาพเป็นแบบนี้ล่ะ?"
10044010-201 = "จะให้กินได้ยังไง?"
10044010-202 = "เหมือนผู้โดยสารบนทางโค้งเลย ไหลไปรวมกันหมดแล้ว"
10044010-207 = "แหม แค่นี้เอง น่าจะยังกินได้อยู่นะ แผ่ออกแล้วจัดหน้าให้ดีๆ ก็กินได้เหมือนกันละน่า"
10044010-208 = "เฮอะ!"
10044010-209 = "ฉันอุตส่าห์มาส่งให้เร็วขนาดนี้ ต้องขอบคุณกันมากกว่าหรือเปล่า?"
10044010-210 = "สิ่งสำคัญในการส่งอาหารคือความรวดเร็วไม่ใช่หรือไง!"
10044010-211 = "พูดอะไรเหลวไหล ฉันจะโทรไปคอมเพลนเดี๋ยวนี้เลย ฮิคาริ โทรไปที่ร้าน!"
10044010-212 = "โอ้วว อินฟินิตี้ คอล สตาร์ต"
10044010-213 = "เดี๋ยวก่อนสิ! มันก็ยังกินได้นี่นา!! ยังไงฉันก็มาส่งให้เร็วไม่ใช่เหรอ!!"
10044010-225 = "ขับรถมายังไงคะ หน้าพิซซ่าถึงเละเทะได้ขนาดนี้น่ะ... หรือว่าสวมวิญญาณนักซิ่งมา..."
10044010-226 = "เกิดเรื่องวุ่นในสำนักงานเสียแล้วสิ..."
10044010-228 = "ฮึ่ม!! พวกเธอจะเล่นแบบนี้ใช่มั้ย? งั้นก็ได้ งั้นฉันจะทำให้พวกเธอไม่กล้าออกมาเหยียบถนนเลย!"
10044010-229 = "เจ้า~ บื้อ! พวกฉันนั่งรถไฟกันอยู่แล้วเถอะ เรามีรางส่วนตัว ไม่ได้ใช้ถนนหรอกนะ"
10044010-230 = "อึกก! พวกไฮแลนเดอร์ ฝากไว้ก่อนเถอะ!"
10044010-231 = "ฉันมาจากสหพันธ์วรูม วรูมเลยนะ! กลัวใช่มั้ยล่ะ? เดี๋ยวจะกลับมาล้างแค้นให้สาสมเลย!!"
10044010-236 = "เฮ้อ... จริงๆ เลย โมโหหิวเลยนะเนี่ย"
10044010-238 = "ความหิวฮิคาริ 100%... ดาเมจ 500 ล้านต่อวินาที..."
10044010-239 = "เดี๋ยวพนักงานคนอื่นมาส่งให้ใหม่ รออีกหน่อยแล้วกันนะ"
10044010-241 = "สะ... สุดท้ายก็ขอเงินคืนสินะคะ... แย่กันทั้ง 2 ฝ่ายเลย..."
10044010-242 = "จะว่าไป พวกเราน่าจะโดนแก๊งนักซิ่งเขม่นนะคะ เป็นแบบนี้ต่อไปจะไม่เป็นอะไรเหรอ..."
10044010-243 = "ใครสนกันล่ะ? ยังไงพวกเราก็โดยสารรถไฟกันอยู่แล้ว"
10044010-244 = "มะ... ไม่ใช่ค่ะ ฉันไม่ได้หมายถึงท่านผู้บริหาร แต่หมายถึงฉันค่ะ"
10044010-245 = "ทำไมฉันจะต้องไปห่วงท่านผู้บริหารล่ะคะ? ฉันไม่ทำอะไรโง่ๆ แบบนั้นหรอกค่ะ..."
10044010-246 = "ฮิคาริ แอทแท็ค!"
10044010-248 = "ฮือ... หิวจัง ไม่มีแรงโต้กลับแล้ว"
10044010-253 = "(แล้วเวลาก็ล่วงเลยไป...)"
10044010-258 = "ฮ้าว ได้นอนอิ่มเลยแฮะ"

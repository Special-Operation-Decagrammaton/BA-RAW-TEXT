10044010-263 = "ตั้งใจทำงานเข้าล่ะทุกคน~!"
10044010-264 = "อาดิโอส"
10044010-269 = "ตะ... ต้องขอโทษที่มารบกวนนะคะ...!"
10044010-274 = "ค่ะ... โชคดีนะคะ..."
10044010-279 = "เฮ้อ... ในที่สุดก็ไปจนได้นะ"
10044010-280 = "นั่นน่ะสิ... ฉันเครียดจนปวดหัวเลย เฮ้อ"
10044010-285 = "งะ... งั้นฉันจะตรวจสอบรถไฟก่อนนะคะ นี่เป็นขั้นตอนที่จำเป็นค่ะ"

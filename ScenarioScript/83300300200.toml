83300300200-5 = "3;이오리;01\n#3;a\n#wait;1000"
83300300200-6 = "3;이오리;04;우왓. 부장! 방금까지 어딜 갔다 온 거야?\n#3;em;[?!]\n#3;shake"
83300300200-7 = "3;히나;02;잠시 볼일이 있어 밖에 나갔다 왔어. 무슨 일 때문에 그래? 이오리.\n#3;a"
83300300200-8 = "3;이오리;05;딴 게 아니라, 조금 전까지 선도부 건물 근처에서 문제아들이 난동을 피우던 거 있지?\n#3;em;[스팀]\n#3;hophop"
83300300200-9 = "3;히나;14;난동? 그런 건 늘 있는 일이잖아?\n#3;em;[?]"
83300300200-10 = "3;이오리;04;으음, 아니, 그렇게 말한다면야 그건 그렇지만.\n#3;stiff"
83300300200-11 = "5;치나츠;06;다만 이번 난동은 이전과 같은 평범한 난동이 아닌 모양이에요.\n#5;a\n#3;m1"
83300300200-12 = "3;이오리;02;치나츠 말이 맞아. 우리가 훈련에서 돌아오자마자 기다렸다는 듯이 덮치던 게.\n#3;hophop\n#3;m3\n#5;dr"
83300300200-13 = "3;이오리;05;우리의 훈련 스케쥴을 알고 있는 것도 그랬고. 일사불란하던 모습도 그렇고."
83300300200-14 = "3;이오리;99;아무래도 녀석들 ……누군가의 사주를 받고 움직이는 모양새였어."
83300300200-15 = "3;이오리;01;마치 우리들의 행동반경을 제한하려는 듯한…… 이곳에 묶어두려고 한 듯한 모양새였는데."
83300300200-16 = "3;치나츠;05;저희와 싸우던 도중, 불리한 걸 깨닫자마자 도망치는 모습도 예사롭지 않았죠."
83300300200-17 = "3;히나;05;……그 말은, 목적이 있어 우릴 방해했고, 그 문제아들 뒤엔 뒷배가 있다?\n#3;em;[…]"
83300300200-18 = "3;이오리;05;응. 아무래도 고용주가 있는 모양이야."
83300300200-19 = "3;히나;99;이런 타이밍에 우릴 방해하는 문제아들, 인가……"
83300300200-20 = "3;히나;01;이오리, 치나츠. 문제아들이 어디로 갔는지 알려줘. 내가 가보겠어."
83300300200-21 = "#wait;100"

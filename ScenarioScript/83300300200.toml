[translation]
83300300200-6 = "嗚哇，委員長！你剛才去哪裡了？"
83300300200-7 = "因為有事暫時外出了。#n有什麼事嗎？伊織。"
83300300200-8 = "委員長知道剛剛風紀委員會大樓附近，有問題學生引起騷動嗎？"
83300300200-9 = "騷動？這不是常有的事嗎？"
83300300200-10 = "呃，是這樣沒錯啦。"
83300300200-11 = "這次的騷動似乎和往常不太一樣。"
83300300200-12 = "千夏說得對。#n我們才剛訓練回來就展開攻擊，簡直像是刻意在等我們一樣。"
83300300200-13 = "而且還知道我們的訓練行程……有條不吝的行動模式也很可疑。"
83300300200-14 = "我想……那些人應該是在某個人的唆使下展開行動的。"
83300300200-15 = "就像是想限制我們的行動範圍……企圖把我們困在這個地方。"
83300300200-16 = "戰鬥時一發現對自己不利就立刻逃跑，這一點也很不尋常吧。"
83300300200-17 = "……也就是說，他們之所以妨礙我們是為了某個目的，背後可能有主謀存在？"
83300300200-18 = "嗯，看來是有雇主。"
83300300200-19 = "會在這個時機點妨礙我們的問題學生……"
83300300200-20 = "伊織、千夏。#n告訴我問題學生的去向。我過去一趟。"

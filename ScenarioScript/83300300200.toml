[translation]
83300300200-6 = "อ๊ะ! ประธาน! ไปไหนมาตั้งแต่เมื่อกี้แล้วน่ะ?"
83300300200-7 = "ออกไปข้างนอกมาน่ะ พอดีมีธุระนิดหน่อย มีเรื่องอะไรเหรออิโอริ?"
83300300200-8 = "ก็เมื่อกี้น่ะสิ มีพวกเด็กเจ้าปัญหามาก่อความวุ่นวายกันแถวๆ อาคารคณะกรรมการวินัย"
83300300200-9 = "ก่อความวุ่นวาย? แต่เรื่องแบบนั้นก็มีอยู่บ่อยๆ ไม่ใช่เหรอ?"
83300300200-10 = "อืม ถ้าจะพูดอย่างนั้นมันก็ถูก แต่ว่า..."
83300300200-11 = "แต่ดูเหมือนว่าการก่อความวุ่นวายครั้งนี้จะต่างจากทุกๆ ทีที่เราเคยเจอน่ะค่ะ"
83300300200-12 = "ชินัตสึพูดถูก เพราะมันเกิดขึ้นทันทีหลังจากเรากลับมาจากฝึกฝนเลย เหมือนว่ารอจังหวะนี้กันอยู่อย่าง#nนั้นละ"
83300300200-13 = "ไหนจะเรื่องที่รู้กำหนดการฝึกฝนของเราอีก แถมยังขยันกันออกมาป่วนแปลกๆ"
83300300200-14 = "ฉันว่าพวกนั้นน่ะ... ต้องได้รับการบงการจากใครมาแน่เลย"
83300300200-15 = "ที่ทำให้เรามาง่วนอยู่กับงานนี้ที่นี่... เหมือนว่าจะควบคุมขอบเขตการกระทำของเราอย่างนั้นละ"
83300300200-16 = "พอรู้ว่าเสียเปรียบระหว่างต่อสู้กับพวกเราก็เผ่นแน่บไปเลยด้วย แบบนั้นดูไม่ใช่เรื่องปกติเลยนะคะ"
83300300200-17 = "หมายความว่า... มีคนอยู่เบื้องหลังพวกเด็กเจ้าปัญหา และจุดประสงค์คือการขัดขวางเรางั้นเหรอ?"
83300300200-18 = "อื้ม ฉันว่าน่าจะมีผู้ว่าจ้างมา"
83300300200-19 = "เด็กเจ้าปัญหาที่จงใจมาขัดขวางเราในจังหวะนี้..."
83300300200-20 = "อิโอริ ชินัตสึ บอกฉันหน่อยว่าเด็กเจ้าปัญหาพวกนั้นไปทางไหน ฉันจะไปดูเอง"

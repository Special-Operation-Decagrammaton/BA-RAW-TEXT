[translation]
83300300200-6 = "Head Prefect! Where have you been? We've been looking everywhere!"
83300300200-7 = "I only just returned from looking into a matter, Iori. What's going on?"
83300300200-8 = "Did you see the troublemakers we just cleared away? They were gathered around our headquarters."
83300300200-9 = "We face rabble-rousers all the time, do we not? Passions here run hot."
83300300200-10 = "Well, yes, that's certainly true..."
83300300200-11 = "But this disturbance feels different from the usual ones."
83300300200-12 = "It's as Chinatsu says. We were attacked as soon as we returned from training, as if they were waiting in ambush."
83300300200-13 = "Our opponents knew our training schedule...and I believe they were organized."
83300300200-14 = "Their coordination suggests that they were following someone's orders."
83300300200-15 = "They were clearly trying to pin us down and keep us at a disadvantage..."
83300300200-16 = "What's more, they were quick to retreat as soon as they realized the fight was turning against them."
83300300200-17 = "...So you believe they attacked you for some overarching goal...and that there was another hand guiding the troublemakers?"
83300300200-18 = "Yes. I'm sure that someone hired them and told them how to attack us."
83300300200-19 = "Troublemakers ambushing us now, of all times..."
83300300200-20 = "Iori, Chinatsu. Tell me where the troublemakers went. I'll handle the matter myself."

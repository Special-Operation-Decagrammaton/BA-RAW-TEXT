1000020-10 = "ในฐานะที่ปรึกษาของเรา คุณครูมักจะคอยคำนึงถึงสภาพการเงินของหน่วยรับจ้างสารพัด..."
1000020-11 = "ไม่ใช่สักหน่อย!"
1000020-12 = "อ่ะแฮ่ม! ก็บอกแล้วไงว่าไม่เป็นไรน่ะ!"
1000020-13 = "[s] \"ไม่เป็นไรแน่นะ?\""
1000020-14 = "อื้อ วันนี้ไม่ต้องกังวลเรื่องนั้นหรอก!"

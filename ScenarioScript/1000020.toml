[translation]
1000020-1 = "Something Very Precious and Important"
1000020-2 = "After I got Aru's message, I arrived at the luxurious-looking restaurant."
1000020-4 = "[ns] \"Aru, are you sure about this place? It looks really expensive.\""
1000020-5 = "Heeheehee. Come on, Sensei."
1000020-6 = "You shouldn't be intimidated here. You're Problem Solver 68's management consultant!"
1000020-7 = "You should relax and display an attitude in line with Problem Solver's caliber."
1000020-8 = "[s] \"Well, shouldn't the management consultant worry about budget?\""
1000020-9 = "Oh, r-r-really? Y-You're right!"
1000020-10 = "Even at a time like this, you're always taking care of us, keeping the Problem Solver's finances in mind..."
1000020-11 = "...No, I mean!"
1000020-12 = "A-Ahem! It's really okay!"
1000020-13 = "[s] \"Are you sure?\""
1000020-14 = "Yes! We don't have to worry at all, at least not today!"
1000020-15 = "Yesterday, I successfully completed a fairly large number of quests and received a lot of compensation! ♪"
1000020-16 = "[s] \"Oh, I see.\""
1000020-17 = "This is all thanks to you, Sensei."
1000020-18 = "You always give advice in a timely manner, anytime, anywhere, in any situation..."
1000020-19 = "Through the ways of the adult, you're always teaching me more about how to lead an organization!"
1000020-20 = "Yeah! You're the perfect management consultant of Problem Solver!"
1000020-21 = "[s1] \"Wow, I'm blushing just listening to you, Aru!\"\n[s2] \"...Did I do something that impressive?\""
1000020-22 = "Ahem! That's enough chitchat!"
1000020-23 = "Ahem! That's enough chitchat!"
1000020-24 = "It's on me today! Don't be shy and enjoy!"
1000020-25 = "[s] \"Well, if you insist, Aru...\""
1000020-27 = "Aru and I ended up having a nice dinner, although it was a bit extravagant."
1000020-35 = "So, when Problem Solver entered the scene, we ran into the Black Market protest organization the client told us about."
1000020-36 = "[s] \"Wow! And then what happened?!\""
1000020-37 = "Heeheehee. You know, Sensei... I'm the leader of Problem Solver 68 and a true outlaw in Kivotos..."
1000020-38 = "I told my opponent..."
1000020-39 = "\"We have no ill feelings towards you. You're just unlucky to have run into us.\""
1000020-40 = "\"But you'll regret running into this outlaw, after I send you to hell!\""
1000020-41 = "[s] \"That's what a hard-boiled outlaw would say!\""
1000020-42 = "Right?! You think so too, Sensei?!"
1000020-43 = "It's one of the top ten hard-boiled lines everyone dreams of saying one day! ♪"
1000020-44 = "Heeheehee... Heehee, heeheehee!"
1000020-45 = "Oh, we've been talking for a while. Look at the time..."
1000020-46 = "We're done eating... Should we leave, Sensei?"
1000020-47 = "Umm... There's more of the story I wanted to tell you though..."
1000020-48 = "[s] \"Tell me all your stories.\""
1000020-49 = "R-Really?"
1000020-50 = "Then, I'll tell you when we get back to the office..."
1000020-51 = "Come on, Sensei! ♪"
1000020-53 = "How was your dinner, ma'am?"
1000020-54 = "It was delicious! I'll definitely be back!"
1000020-55 = "Haha! I'm glad to hear that! Whenever you're ready, here's the check."
1000020-56 = "Yeah, let's see..."
1000020-60 = "..."
1000020-64 = "........."
1000020-68 = "............!"
1000020-69 = "Ma'am?"
1000020-70 = "H-Huh?! Huuuuh?!"
1000020-71 = "[s] \"Aru? What's wrong?\""
1000020-72 = "I-I-It's gone?!"
1000020-73 = "[s] \"What's gone?!\""
1000020-74 = "M-My wallet! I had it in my pocket. But it's gone!"
1000020-75 = "...Ma'am?"
1000020-76 = "Where could it have gone? Why is this happening?!"
1000020-77 = "[s] \"I'll pay.\""
1000020-78 = "Eek! Th-Thank you!"
1000020-80 = "Sorry, Sensei. I was supposed to treat you today..."
1000020-81 = "How could I lose my wallet...?"
1000020-82 = "I don't even know when or where!"
1000020-83 = "[s] \"Aru, you said you were working on commissions this morning, right?\""
1000020-84 = "Oh, yes. W-What about it?"
1000020-85 = "[s] \"What if you dropped it in the middle of that?"
1000020-86 = "Th-That's right! I could have..."
1000020-87 = "I was running around a lot during the commission. I must have lost it then..."
1000020-88 = "[s] \"Should we go check?\""
1000020-89 = "Y-Yes, please!"
1000020-93 = "This is where I was working on the commission!"
1000020-94 = "[s] \"What kind of a wallet is it? What does it look like?\""
1000020-95 = "Oh... It's a luxurious reddish color..."
1000020-96 = "What kind...? Well, it's a really important item."
1000020-97 = "It's a truly one-of-a-kind, premium item..."
1000020-98 = "[s] \"It must be a very precious wallet.\""
1000020-99 = "Oh, y-yes! It really is!"
1000020-100 = "[s] \"Let's find it together.\""
1000020-101 = "……!!"
1000020-102 = "Thank you! Thank you so much, Sensei!"
1000020-104 = "Knowing our chances were slim, Aru and I started to look for the wallet."
1000020-105 = "We looked around the commission location for a while, but we couldn't find it."
1000020-107 = "Come to think of it, I think I went in that direction!"
1000020-108 = "[s] \"We'll just keep retracing your steps.\""
1000020-110 = "We searched through several areas."
1000020-111 = "Ugh, it's nowhere to be found..."
1000020-112 = "Oh! W-What if our field of vision is too small? Maybe we're missing something important!"
1000020-113 = "Ugh! I'm ashamed of having such a short field of view as a leader!"
1000020-114 = "Sensei! Can I ride on your shoulders? Please!"
1000020-115 = "[s] \"That's a bit much...but okay.\""
1000020-117 = "I went along with Aru's sudden idea and continued the search..."
1000020-118 = "*gasp*"
1000020-119 = "What if someone took it? It's a very attractive wallet, you know!"
1000020-120 = "[s] \"...There's definitely a high chance it was stolen.\""
1000020-121 = "Ugh! I shouldn't have let my guard down."
1000020-122 = "Maybe it was a stray cat!"
1000020-123 = "[s] \"That seems a little less likely.\""
1000020-124 = "You shouldn't underestimate the stray cats of the Gehenna Academy district, Sensei!"
1000020-125 = "Once, I was sharing some hard-earned sandwiches with the members..."
1000020-126 = "One suddenly ran toward us and snatched them out of our hands! They're terrifying creatures!"
1000020-127 = "It's no exaggeration to call them the outlaws of Gehenna!"
1000020-128 = "[s] \"Officially recognized by Aru?! Gehenna stray cats are scary!\""
1000020-130 = "[ns3] \"Well, maybe a kind soul found it and turned it in.\" \n[ns4] \"Maybe we can check the lost and found center.\""
1000020-131 = "Y-Yeah... Okay."
1000020-132 = "Y-Yeah... Okay."
1000020-134 = "We continued looking for the wallet, with no luck."
1000020-136 = "[ns] \"It doesn't seem to be anywhere.\""
1000020-137 = "*sigh* Where did I lose it...? Ugh."
1000020-142 = "[ns] \"Umm, Aru, look at the time...\""
1000020-143 = "Oh, yes... It's midnight already..."
1000020-147 = "...Yeah, okay."
1000020-148 = "It's all right, Sensei."
1000020-149 = "[s] \"Aru? What do you mean?\""
1000020-150 = "You looked everywhere with me. Thank you."
1000020-151 = "[s5] \"But you said it's a very precious item.\"\n[s6] \"You looked really sad when you realized you lost it.\""
1000020-152 = "Oh, I-I mean, that's true, but...!"
1000020-153 = "Oh, I-I mean, that's true, but...!"
1000020-154 = "But...!"
1000020-155 = "Sometimes, there's nothing we can do."
1000020-156 = "It's super late, so we should head back."
1000020-157 = "We tried our best, so that's enough."
1000020-158 = "Heehee. Thanks for looking with me until this late, Sensei."
1000020-159 = "[s] \"Don't mention it. I was happy to.\""
1000020-160 = "It's a shame we couldn't find it though!"
1000020-161 = "All right, let's go back before it gets any later, Sensei."
1000020-162 = "[s] \"Okay, Aru. Let's get you home safe.\""
1000020-167 = "It was disappointing that we couldn't find the wallet."
1000020-168 = "Without any other choice, Aru and I decided to go back to our respective offices."
1000020-184 = "Ugh... Come on... Where is it...?"
1000020-185 = "[s] \"Yup, I knew it.\""
1000020-186 = "Eek?!"
1000020-187 = "S-S-Sensei?! I thought you left...?"
1000020-188 = "[s] \"Did you think I believed you when you said that's enough?\""
1000020-189 = "What?!"
1000020-190 = "[s7] \"You said it's very important to you!\"\n[s8] \"You're not the type to just give up.\""
1000020-191 = "Oh, b-but...I don't want to inconvenience you anymore..."
1000020-192 = "Oh, b-but...I don't want to inconvenience you anymore..."
1000020-193 = "You see..."
1000020-194 = "[s] \"I'm the Problem Solver 68 partner and future management consultant, you know?\""
1000020-195 = "……!!"
1000020-196 = "Heehee."
1000020-197 = "Yeah, that's right!"
1000020-198 = "You're right, Sensei! I don't know why I was struggling all by myself."
1000020-199 = "Okay, Sensei. As a partner and future Problem Solver management consultant..."
1000020-203 = "\"Will you come with me to the bottom of hell?\""
1000020-204 = "[s] \"Is that one of the hard-boiled lines you've been wanting to try?\""
1000020-205 = "Heh. Maybe."
1000020-206 = "[s] \"Well, I'll come with you if that helps, Aru.\""
1000020-212 = "And, finally..."
1000020-215 = "[ns] \"Huh...? I found something. Is this it, Aru?\""
1000020-216 = "Oh, h-huh?! Really?!"
1000020-221 = "R-Really! Y-You found it, Sensei!"
1000020-222 = "Thank you so much!"
1000020-223 = "[s] \"But, Aru, it doesn't look like a luxury wallet...\""
1000020-224 = "Oh, I mean... It doesn't look like much on the outside, but..."
1000020-225 = "It was a gift."
1000020-226 = "[s] \"From who?\""
1000020-227 = "Yeah, some time after establishing Problem Solver 68..."
1000020-228 = "The members saved up and bought it to congratulate me for becoming the boss..."
1000020-229 = "So it's very special to me...and it can't be replaced..."
1000020-230 = "[s] \"...\""
1000020-231 = "...Huh? Um, Sensei? What's that look...?"
1000020-232 = "[s] \"I'm so glad we found it!\""
1000020-233 = "R-Really?!"
1000020-234 = "Oh, m-me too! H-Heeheehee."
1000020-235 = "As you said, I'm so glad you found it."
1000020-239 = "Heh!"
1000020-240 = "[s] \"It was a lot of fun.\""
1000020-241 = "Y-Yeah! In return for your help, I'll buy you ramen for breakfast!"
1000020-242 = "Okay, then let's..."
1000020-243 = "...Oh."
1000020-244 = "By any chance..."
1000020-248 = "[s] \"Huh? Is there a problem, Aru?\""
1000020-249 = "...Actually, I haven't withdrawn any money since receiving the commission."
1000020-250 = "Sensei, I don't have any cash right now..."
1000020-251 = "And the bank isn't open at this hour... So, umm..."
1000020-252 = "[s] \"You can buy next time. It's on me today.\""
1000020-253 = "O-O-Okay! Thank you, Sensei! I'll make sure to repay you! I swear...!"
1000020-254 = "I pinky promise!"
1000020-255 = "[s] \"Sure, sure...\""
1000020-257 = "After a lot of apologizing, I went to eat breakfast with Aru."

1000020-206 = "[s] \"ถ้าเพื่ออารุแล้ว ครูยินดีช่วยตลอดเลยนะ\""
1000020-212 = "(และแล้ว...)"
1000020-215 = "[ns] \"เอ๊ะ...? เจอแล้วละ อันนี้รึเปล่าอารุ?\""
1000020-216 = "ห้ะ จริงเหรอ?!"
1000020-221 = "ใช่จริงๆ ด้วย เจอแล้วละ คุณครู!"
1000020-222 = "ขอบคุณมากเลยนะ!"
1000020-223 = "[s] \"แต่ว่าอารุ มันดูไม่เหมือนกับของหรูหราเลยนะ...\""
1000020-224 = "อ๊ะ คือว่า... ดูข้างนอกมันก็อาจจะเอ่อ... ดูเก่าๆ นิดหน่อย"
1000020-225 = "แต่ว่า... มันเป็นของขวัญที่ฉันได้รับมาน่ะ"
1000020-226 = "[s] \"ของขวัญเหรอ?\""
1000020-227 = "อื้อ หลังจากที่ก่อตั้งหน่วยรับจ้างสารพัดขึ้นมาได้ไม่นาน..."
1000020-228 = "ทุกคนก็ทำงานรวบรวมเงินมา... แล้วก็เอามาซื้อของขวัญฉลองที่ฉันได้เป็นประธานน่ะ"
1000020-229 = "เพราะงั้นสำหรับฉันแล้วกระเป๋างสตางค์นี่... เป็นของสำคัญที่เอาอะไรมาแลกก็ไม่ยอมเลยละ..."
1000020-230 = "[s] \"....\""
1000020-231 = "หืม? นี่คุณครู? ทำไมเงียบไปล่ะ แล้วทำไมทำหน้าแบบนั้น..."
1000020-232 = "[s] \"โชคดีจริงๆ ที่หาเจอนะ!\""
1000020-233 = "อะ...อื้อ!"
1000020-234 = "ชะ...ใช่ ใช่แล้วละ! ฮุฮุฮุฮุ"
1000020-235 = "โชคดีเหมือนที่คุณครูบอกจริงๆ นั่นละ"
1000020-239 = "อะ...อึก!"
1000020-240 = "[s] \"ใช้เวลาหานานเลย เรารีบกลับกันเถอะ\""
1000020-241 = "จะ...จริงด้วย! ถ้างั้นเพื่อเป็นการตอบแทนคุณครู! มื้อเช้าวันนี้ฉันจะเลี้ยงราเม็งเป็นการตอบแทน!"
1000020-242 = "เอาละ ถ้างั้นก็..."
1000020-243 = "อ๊ะ..."
1000020-244 = "คือว่า..."
1000020-248 = "[ns] \"หืม? มีอะไรเหรออารุ?\""
1000020-249 = "อันที่จริง... หลังจากทำงานเสร็จแล้ว ฉันยังไม่ได้ไปถอนเงินค่าจ้างมาเลย…"
1000020-250 = "คุณครู ตอนนี้ฉันไม่มีเงินสดติดตัวเลยน่ะ..."
1000020-251 = "แถมตอนนี้ธนาคารก็ยังไม่เปิดด้วย เพราะงั้น..."
1000020-252 = "[s] \"ถ้างั้นเอาไว้คราวหน้าก็ได้ วันนี้ครูเลี้ยงเอง\""
1000020-253 = "อะ...อื้อ! ขอบคุณนะ! หนี้บุญคุณในครั้งนี้ ฉันจะต้องตอบแทนอย่างแน่นอน...!"
1000020-254 = "ขอเกี่ยวก้อยสัญญาเลย!"
1000020-255 = "[s] \"กะ...ก็ได้ๆ\""
1000020-257 = "(หลังพบกับความวุ่นวายมาตลอดทั้งคืน คุณครูกับอารุก็ไปนั่งกินมื้อเช้าด้วยกัน)"

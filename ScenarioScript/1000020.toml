1000020-19 = "ทำให้ฉันได้เรียนรู้วิธีการดูแลองค์กร ภายใต้การแนะนำของผู้ใหญ่!"
1000020-20 = "อื้อ! สมแล้วที่เป็นที่ปรึกษาธุรกิจของหน่วยรับจ้างสารพัดของเรา!"

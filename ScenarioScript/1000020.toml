[translation]
1000020-1 = "#title;엄청나게 귀중하고 중요한 것"
1000020-2 = "#na;(그렇게 아루의 연락을 받아 도착한 곳은, 한눈에 보기에도 제법 비싸 보이는 고급 레스토랑이었다.)"
1000020-3 = "#all;hide"
1000020-4 = "[ns] \"저기……. 아루 정말 괜찮겠어? 여기 엄청 비싼 곳 같은데.\""
1000020-5 = "3;아루;03;후후후, 뭐야. 선생님.\n#3;em;[재잘]\n#3;a"
1000020-6 = "3;아루;99;여기서 그렇게 겁을 집어먹어서야 우리 흥신소의 차기 경영 고문이라고 할 수 있겠어?"
1000020-7 = "3;아루;01;좀 더 여유를 가지고, 흥신소의 격에 맞게 태도를 갖추는 게 좋다고?\n#3;em;[음표]"
1000020-8 = "[s] \"아니, 경영 고문이라면 이런 걸 신경 쓰지 않을까.\""
1000020-9 = "3;아루;04;아, 그, 그, 그래? 그, 그렇구나~\n#3;em;[땀]\n#3;stiff"
1000020-10 = "3;아루;10;선생님은 경영 고문으로서 늘 흥신소의 건전한 재정을 염두에 두고, 우리를 신경 써주고 있었던……."
1000020-11 = "3;아루;11;……게 아니라!\n#3;hophop"
1000020-12 = "3;아루;13;크, 크흠! 그거라면 진짜 괜찮으니까!"
1000020-13 = "[s] \"괜찮아?\""
1000020-14 = "3;아루;03;응, 오늘만큼은 전혀 걱정할 필요 없어!"
1000020-15 = "3;아루;08;그렇지 않아도 마침, 바로 어제 꽤나 큰 건수의 의뢰를 성공시키고 보수도 잔뜩 받은 참이거든~♪\n#3;em;[음표]"
1000020-16 = "[s] \"앗, 과연.\""
1000020-17 = "3;아루;03;흠흠, 이것도 전부 선생님 덕분이야."
1000020-18 = "3;아루;99;언제, 어디에서나, 그 어떤 상황에서도 시의적절하게 내려주는 충고와 조언…….\n#3;em;…"
1000020-19 = "3;아루;03;어른의 시야를 통해, 어떻게 조직을 이끌어 나가면 좋을지. 선생님에겐 늘 감탄하며 배우고 있다고?"
1000020-20 = "3;아루;09;응! 역시 우리 흥신소의 미래 경영 고문다워!\n#3;em;[재잘]"
1000020-21 = "[s1] \"이거 참, 아루가 그렇게까지 말해주니 부끄럽네~\"\n[s2] \"……그 정도로 엄청난 일, 했었던가?\""
1000020-22 = "3;아루;08;자아, 자잘한 이야기는 이쯤 해두고.\n#3;hophop"
1000020-23 = "3;아루;08;자아, 자잘한 이야기는 이쯤 해두고.\n#3;hophop"

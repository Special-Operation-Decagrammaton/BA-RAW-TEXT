[translation]
1000020-1 = "สิ่งที่สำคัญและล้ำค่าที่สุด"
1000020-2 = "(คุณครูมาถึงสถานที่นัดพบหลังได้ข้อความจากอารุ มองแว็บเดียวก็รู้ได้ทันทีว่าเป็นภัตตาคารหรู#nที่ดูแพงมาก)"

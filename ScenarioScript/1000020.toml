1000020-5 = "ฮุฮุฮุ อะไรกัน คุณครู"
1000020-6 = "ถ้าแค่นี้ยังรู้สึกประหม่า จะเรียกตัวเองว่าที่ปรึกษาของหน่วยรับจ้างสารพัดได้อีกเหรอ?"
1000020-7 = "ทำใจให้สบาย อกผายไหล่ผึ่งให้สมฐานะของหน่วยรับจ้างสารพัดของเราหน่อยดีกว่านะ"
1000020-8 = "[s] \"เดี๋ยวสิ ที่ปรึกษาก็ต้องสนใจเรื่องงบที่ใช้หน่อยไม่ใช่รึไง?\""

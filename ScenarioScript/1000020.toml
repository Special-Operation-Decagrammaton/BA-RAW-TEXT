1000020-23 = "เอาละ อย่ามัวคุยเรื่อยเปื่อยกันอยู่เลย"
1000020-24 = "วันนี้ฉันจะเป็นเจ้ามือเอง คุณครูกินให้เต็มที่ไม่ต้องเกรงใจเลยนะ!"

[translation]
1000020-1 = "珍貴的"
1000020-2 = "（和亞瑠見面的餐廳，是間感覺非常高檔的地方）"
1000020-4 = "[ns] 「那個……真的是在這裡？」"
1000020-5 = "當然，就是在這裡。"
1000020-6 = "才這點程度就嚇到，可不夠格當我們的經營顧問喔？"
1000020-7 = "好了，老師，不要想太多了，抬頭挺胸。"
1000020-8 = "[s] 「既然是經營顧問，不是更應該在意這些嗎……？」"
1000020-9 = "原，原來如此！？"
1000020-10 = "老師作為經營顧問，自然會顧慮到財政狀況是否健全……"
1000020-11 = "……等等不對！"
1000020-12 = "總之今天真的沒問題！"
1000020-13 = "[s] 「為什麼會說沒問題？」"
1000020-14 = "意思是今天完全不用擔心金錢的問題！"
1000020-15 = "因為我們才剛完成一項大型委託，得到一筆豐厚的報酬♪"
1000020-16 = "[s] 「喔喔，真了不起。」"
1000020-17 = "這也多虧了老師。"
1000020-18 = "那時老師給了我非常明確的建議……"
1000020-19 = "透過成年人的觀點教導我該如何引導組織……令我深感欽佩。"
1000020-20 = "真不愧是我們便利屋未來的經營顧問！"
1000020-21 = "[s1] 「沒那麼了不起啦。」\n[s2] 「我說的話有那麼厲害嗎……？」"
1000020-22 = "總之就是這麼回事……"
1000020-23 = "總之就是這麼回事……"
1000020-24 = "今天我請客，老師別客氣儘管吃！"
1000020-25 = "[s] 「那我就不客氣囉。」"
1000020-27 = "（於是和亞瑠一同享用了美味的晚餐）"
1000020-35 = "……結果我們便利屋一到現場，就正面撞上傳聞中的黑市組織。"
1000020-36 = "[s] 「那，那然後呢……！？」"
1000020-37 = "呵呵呵……你也不看看我是誰呀，老師。我陸八魔亞瑠……可是便利屋的社長、真正的法外之徒。"
1000020-38 = "我對著那些人如此大喊："
1000020-39 = "「雖然我們之間無冤無仇……但遇到我們代表你們氣數已盡。」"
1000020-40 = "「等你們下地獄之後，再後悔遇上了我們吧！」"
1000020-41 = "[s] 「好硬派……！」"
1000020-42 = "對吧！老師也這麼覺得吧！？"
1000020-43 = "畢竟這可是「想親口說一次看看」的十大硬派台詞之一呢♪"
1000020-44 = "呵呵，呵呵呵呵呵……！"
1000020-45 = "啊，不知不覺都這麼晚了……"
1000020-46 = "那我們似乎也該走了。"
1000020-47 = "唔──嗯，才剛聊到精彩的地方呢……"
1000020-48 = "[s] 「確實，斷在一個好令人在意的地方唷。」"
1000020-49 = "對，對吧！"
1000020-50 = "如果老師願意的話，待會要不要回去便利屋辦公室聽後續呢？"
1000020-51 = "那就這麼決定！事不宜遲快走吧！"
1000020-53 = "客人您好，請問今天的餐點還合兩位的胃口嗎？"
1000020-54 = "可以，餐點很美味。讓人下次還想再來吃。"
1000020-55 = "謝謝客人給我們這麼高的評價！那麼不好意思，容我幫兩位結帳……"
1000020-56 = "哼哼。"
1000020-60 = "……"
1000020-64 = "……"
1000020-68 = "…………！"
1000020-69 = "……客人？"
1000020-70 = "啊咦咦咦咦咦咦咦咦！？"
1000020-71 = "[s] 「亞瑠？怎麼了？」"
1000020-72 = "不，不不不不不不見了！！"
1000020-73 = "[s] 「『不見了』，難道是指……？」"
1000020-74 = "錢包不見了！我明明一直放在口袋裡的……！！"
1000020-75 = "……客人，不要緊吧？"
1000020-76 = "為，為什麼！？怎麼會！？"
1000020-77 = "[s] 「總之這頓先由我出錢吧……」"
1000020-78 = "謝，謝謝惠顧！"
1000020-80 = "老師對不起……今天明明說好要由我請客……"
1000020-81 = "為什麼會這樣呢……而且錢包又跑哪裡去了……"
1000020-82 = "到底是在哪裡弄丟的啊……！？"
1000020-83 = "[s] 「你說你今天一直在忙著處理委託對吧？」"
1000020-84 = "是啊……？"
1000020-85 = "[s] 「會不會在過程中弄丟錢包了？」"
1000020-86 = "的，的確有可能……"
1000020-87 = "戰鬥時的確有很多激烈的動作，確實有可能是在那時候弄丟的……"
1000020-88 = "[s] 「那總之先回去找找看吧？」"
1000020-89 = "說，說的也是！"
1000020-93 = "在這邊，今天我們一直在這附近工作……！"
1000020-94 = "[s] 「那個錢包有什麼特徵嗎？」"
1000020-95 = "嗯……是個充滿高級感的酒紅色錢包……"
1000020-96 = "還有就是……總之非常非常重要……"
1000020-97 = "可說是世界上獨一無二的錢包……"
1000020-98 = "[s] 「感覺是相當貴重的東西呢。」"
1000020-99 = "是，是啊！！確實是呢！"
1000020-100 = "[s] 「好！那就開始找吧。」"
1000020-101 = "老師……！"
1000020-102 = "那麼我往那個方向去找……！"
1000020-104 = "（於是便和亞瑠一起開始找錢包）"
1000020-105 = "（但一段時間過後卻依然沒有找到……）"
1000020-107 = "對了！我記得好像也有跑到那邊！"
1000020-108 = "[s] 「那會不會掉在那邊呢……？」"
1000020-110 = "（慢慢移動地點繼續尋找……）"
1000020-111 = "唔唔，怎麼還是找不到……"
1000020-112 = "你說因為看得不是很清楚，或許因此看漏了……？"
1000020-113 = "說的對！身為組織領導人，必須看清楚每個細節……！"
1000020-114 = "既然這樣！老師，讓我坐在你的肩膀上！"
1000020-115 = "[s] 「是，是這種問題嗎……？」"
1000020-117 = "（於是便乖乖扛起亞瑠，繼續尋找……）"
1000020-118 = "啊……！"
1000020-119 = "會不會錢包已經被撿走了……！？"
1000020-120 = "[s] 「確實有這個可能……」"
1000020-121 = "是啊，不能掉以輕心……"
1000020-122 = "例如路邊的野貓就很會偷東西！"
1000020-123 = "[s] 「野貓！？」"
1000020-124 = "可別小看格黑娜學園自治區的野貓了，老師！"
1000020-125 = "上次我們便利屋才正打算一起分享一款好不容易買到的三明治……"
1000020-126 = "結果卻不知道從哪跑來一隻野貓，將我們手中的三明治華麗地奪走！"
1000020-127 = "在格黑娜自治區之中，野貓可是相當高明的法外之徒！"
1000020-128 = "[s] 「亞瑠認證的法外之徒……格黑娜的野貓真不得了……！」"
1000020-130 = "[ns3] 「不然也有可能被人當作失物撿去派出所了……」\n[ns4] 「之後也去那裡問問看吧。」"
1000020-131 = "確，確實很有可能……"
1000020-132 = "確，確實很有可能……"
1000020-134 = "（於是四處找了很久……）"
1000020-136 = "[ns] 「嗯……找不到呢……」"
1000020-137 = "唉……我到底是在哪裡弄丟的呢……"
1000020-142 = "[ns] 「都這麼晚了啊……」"
1000020-143 = "都已經過12點了呢……"
1000020-147 = "……"
1000020-148 = "謝謝，老師。"
1000020-149 = "[s] 「……亞瑠？」"
1000020-150 = "我們已經努力找過了，今晚先到此為止吧。"
1000020-151 = "[s5] 「但那不是很重要的東西嗎……」\n[s6] 「都找這麼久了，怎麼能放棄……」"
1000020-152 = "重，重要歸重要……！"
1000020-153 = "重，重要歸重要……！"
1000020-154 = "可是……！"
1000020-155 = "……沒辦法啊。"
1000020-156 = "而且時間都這麼晚了，我們還是先回去吧。"
1000020-157 = "也不能讓老師繼續陪著我……"
1000020-158 = "謝謝老師陪我找到這麼晚。"
1000020-159 = "[s] 「……這沒有什麼好謝的。」"
1000020-160 = "雖然很可惜最後還是沒找到……"
1000020-161 = "但總之趕快回去吧，老師。"
1000020-162 = "[s] 「……嗯。」"
1000020-167 = "（最後依然沒找到錢包）"
1000020-168 = "（就這麼離開了……）"
1000020-184 = "到底在哪裡啊……拜託快點出來啦……"
1000020-185 = "[s] 「我就知道。」"
1000020-186 = "噫噫！？！？"
1000020-187 = "老，老老老師！？為什麼？你不是已經回去了嗎……？"
1000020-188 = "[s] 「看你那副表情，讓人怎麼能放心回去。」"
1000020-189 = "……！"
1000020-190 = "[s7] 「那不是很重要的東西嗎？」\n[s8] 「所以我猜亞瑠一定不會放棄。」"
1000020-191 = "可是，總不能給老師添更多麻煩了……"
1000020-192 = "可是，總不能給老師添更多麻煩了……"
1000020-193 = "所以……"
1000020-194 = "[s] 「什麼添麻煩……對亞瑠來說，我可是未來的經營顧問耶。」"
1000020-195 = "……！！"
1000020-196 = "……呵呵。"
1000020-197 = "沒錯……確實如此！"
1000020-198 = "老師說得對……我幹嘛在這裡自怨自艾呢！"
1000020-199 = "……那就拜託你了，老師。身為合夥人……身為我們便利屋未來的經營顧問……"
1000020-203 = "「可以陪我找到地獄的盡頭嗎？」"
1000020-204 = "[s] 「……這也是『十大硬派台詞』之一嗎？」"
1000020-205 = "……就，就默默地讓我說一句有什麼關係！"
1000020-206 = "[s] 「抱歉抱歉……我非常樂意。」"
1000020-212 = "（後來……）"
1000020-215 = "[ns] 「……亞瑠，是不是這個？」"
1000020-216 = "嗯，啊……！"
1000020-221 = "就是這個！"
1000020-222 = "謝謝老師！"
1000020-223 = "[s] 「聽你說有『高級感』我還遲疑了一下，有找到真是太好了。」"
1000020-224 = "雖，雖然看起來是破破爛爛的啦……"
1000020-225 = "……其實這是別人送我的禮物。"
1000020-226 = "[s] 「禮物？」"
1000020-227 = "那時候便利屋才剛創立沒多久……"
1000020-228 = "大家一起努力湊錢買給我，說是慶祝我當上社長……"
1000020-229 = "所以這東西對我來說，是個無價之寶……"
1000020-230 = "[s] 「……」"
1000020-231 = "……老，老師？"
1000020-232 = "[s] 「有把錢包找回來真是太好了……」"
1000020-233 = "是，是啊，太好了。"
1000020-234 = "呵呵呵……！"
1000020-235 = "真的，太好了……"
1000020-239 = "……！"
1000020-240 = "[s] 「話說回來，我們找了好久呢，也花了不少體力……」"
1000020-241 = "就，就是啊！這次該輪到我，請老師吃拉麵當作回禮了……！"
1000020-242 = "要請老師……"
1000020-243 = "……"
1000020-244 = "啊……"
1000020-248 = "[ns] 「怎麼了？」"
1000020-249 = "這麼說來，完成委託之後我還沒有去領錢……"
1000020-250 = "所以現在錢包裡……"
1000020-251 = "而且現在這麼早，銀行也還沒開，那個……"
1000020-252 = "[s] 「……那下次再讓你請吧。今天我請。」"
1000020-253 = "那，那真是太感謝了！這份恩情我一定，一定會還……！"
1000020-254 = "打勾勾！約好了！"
1000020-255 = "[s] 「嗯。」"
1000020-257 = "（於是事情總算告一段落，再次和亞瑠一起去吃飯）"

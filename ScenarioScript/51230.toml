[translation]
51230-1 = "Episode 23;Elaborate Lies"
51230-7 = "Sensei! Someone's fainted on the ground."
51230-10 = "[ns] \"Yukari?!\""
51230-20 = "[ns] \"Ugh. There's no end to these monsters.\""
51230-23 = "You two just don't give up, do you?"
51230-25 = "Shuro..."
51230-26 = "[s] \"...Shuro. This ends now.\""
51230-30 = "We're taking Yukari home."
51230-35 = "...Hah."
51230-36 = "Haha."
51230-37 = "Hahahahaha!"
51230-41 = "You're annoying. Really, really annoying."
51230-47 = "You know, I think I've heard of this before."
51230-48 = "The famed Sensei of Schale who can solve any problem."
51230-49 = "They're a nosy busybody who can't help but meddle in every conflict that arises in Kivotos."
51230-50 = "You've always fixed everything in the past, so why not now? You ran valiantly here with Nagusa, thinking you could snap your fingers and save Yukari."
51230-51 = "Really? Really now?! Just one more pen stroke, and the conclusion of the story will finally be mine."
51230-52 = "I'm on the last page, and you think you can stop me now? Yup. I'm aggravated. Annoyed. It's hilarious."
51230-53 = "You're hilarious, Sensei. Your entertainment knows no bounds."
51230-57 = "But I think what's really, really, incredibly hilarious is you. Nagusa."
51230-59 = "...Stop it."
51230-61 = "\"Give Yukari back\"? Do you of all people think you have the right to say that? "
51230-62 = "You think you're the hero of this story, Nagusa? You really believed you could ride in on your white horse and fix everything."
51230-63 = "How disgustingly delusional can you be?"
51230-64 = "Did you get a cute little motivational speech from your friends?"
51230-65 = "Let me guess what they said. Ah! \"Only you can save Yukari! Please!\""
51230-66 = "But why would they say something like that?"
51230-67 = "After all, you're the coward who couldn't save Ayame."
51230-72 = "Oh. It all makes sense. You're still lying."
51230-73 = "Did you tell them the truth? The reaaal truth about what happened out in the Great Snowfield?"
51230-74 = "[s] \"Nagusa, you don't have to listen to this.\""
51230-75 = "Actually, you do. In fact, Sensei, you should too."
51230-76 = "Look at Nagusa. She stands so proud now, finally ready to be a leader! A few nice words, and she thinks she can save the world. "
51230-77 = "But in reality, she's a weak-willed idiot who just can't seem to stop lying!"
51230-83 = "Do you remember? Nagusa? Because I do! "
51230-85 = "You came back. You tried so hard to save Ayame. And you failed, failed, FAILED!"
51230-86 = "Let me see your right arm. Stretch it out as far as you can, and we can see what it looked like when you lost hold of Ayame."
51230-87 = "I guess little Nagusa is too much of a coward to have reached her."
51230-89 = "Never forget what you are. You're an imposter, sinking your claws into Ayame as if her excellence would be your salvation."
51230-91 = "What were we talking about again?"
51230-92 = "Ah, yes. Your right arm."
51230-93 = "...I said stop."
51230-94 = "Show Sensei your useless, shriveled arm. You see, Sensei, her arm was consumed by the spirit realm when she tried to reach into it to save Ayame."
51230-95 = "So brave, so admirable. Not. The second adversity struck, you ran away as fast as you could."
51230-96 = "I didn't... No..."
51230-101 = "Shush. I'm still telling your story."
51230-102 = "I remember clear as day what Ayame said to you, after she became a Phantom Fable."
51230-103 = "Do you remember it too, Nagusa?"
51230-104 = "Shut up! Shut up!"
51230-106 = "\"You were never my friend, Goryou Nagusa.\""
51230-112 = "That moment was so wonderful. I'll remember it forever."
51230-113 = "She believed in you for a split moment, Nagusa. She really believed you were going to save her. Can you blame her for telling you the harsh truth when she realized how useless you were?"
51230-114 = "I'm totally on her side honestly."
51230-115 = "Just imagine if it had been someone else there."
51230-116 = "Someone else, anyone else could have stopped it from happening. They could have saved Ayame."
51230-117 = "Don't you think so?"
51230-119 = "[ns] \"Your words are poison, Shuro!\""
51230-123 = "Please don't interrupt me. I, Yabuki Shuro, the bard of ghost stories, am talking."
51230-135 = "[ns] \"Mmph?!\""
51230-136 = "There we go. The ghosts will keep you quiet."
51230-137 = "You be good over there, Schale's Sensei."
51230-139 = "Sensei!"
51230-140 = "Back to the topic. You, Nagusa. All of this is because of you."
51230-141 = "Did that hurt your feelings? You think that's a little unfair? Hm?"
51230-142 = "I'll prove it to you."
51230-144 = "My tome will expose all truths."
51230-160 = "(I was born with expectations on my shoulders.)"
51230-161 = "(To rise above each and every one of them was my duty.)"
51230-162 = "(I smiled under the weight of their anticipation.)"
51230-165 = "My name is Kadenokouji Yukari."
51230-166 = "The heir to one of Hyakkiyako's oldest and most honored families."
51230-167 = "Uphold the Kadenokouji name."
51230-168 = "Such has been my duty since the moment I was born."
51230-169 = "...I know that."
51230-170 = "That is my sole purpose in life."
51230-175 = "But..."
51230-176 = "Then I met Nagusa."
51230-177 = "She taught me how to pursue a life that I wanted, not the one that was given to me!"
51230-181 = "Yes! I wanted to join the Hyakkaryouran with Nagusa!"
51230-188 = "You were misled, Yukari..."
51230-189 = "I deserve neither your admiration nor your pride."
51230-194 = "I was a fraud. "
51230-195 = "Every day I donned a mask and performed as was expected."
51230-200 = "Everything you knew of me was a lie."
51230-211 = "And because I lied..."
51230-212 = "Because I created this persona of Nagusa, all so I could selfishly stand by Ayame's side..."
51230-213 = "That's why Yukari sought to join the Hyakkaryouran. Because she believed in me."
51230-215 = "Good, good. You're getting it, Nagusa. Everything you touch dies."
51230-216 = "A better person would have grabbed Ayame from the spirit realm. Saved Yukari before it was too late."
51230-221 = "All this, because you were an idiot who thought you had the right to stand next to Ayame."
51230-222 = "Look at the flames around you, and know that they're here because you tried to step out of line."
51230-223 = "Don't ever forget that."
51230-225 = "I am culpable...for all of it... This is my punishment for dreaming..."
51230-226 = "I've ruined the Hyakkaryouran. Hyakkiyako itself."
51230-227 = "My existence...was a mistake..."
51230-229 = "[ns] \"Na...sa...!\""
51230-230 = "Boooring. Subdue Nagusa."
51230-239 = "[ns] \"...!!!\""
51230-241 = "Ahhh. Much better."
51230-242 = "She was a shell of a person to begin with. It was easy to turn her into a ghost."
51230-243 = "You'll be my favorite little pet forever, Nagusa."
51230-244 = "*sigh*"
51230-245 = "And with that, ladies and gentlemen, we come to the conclusion!"
51230-248 = "Heehee, Aha, Ahahaha."
51230-249 = "How wonderful. Excellent!"
51230-250 = "I'm satisfied. Everyone has learned their place."
51230-251 = "Everything went exactly to plan."
51230-254 = "I will say, it took much less than I expected to make everyone turn on each other. Sowing the seeds of distrust among humans is just too easy."
51230-255 = "And look at Sensei! Renowned throughout all of Kivotos, but nothing but a pawn to me."
51230-259 = "Do you like my Ghost Stories, Kokuriko?"
51230-260 = "Now comes the fun part. Curse and hate each other! Cut down your fellow students and obliterate Hyakkiyako!"
51230-262 = "In my version of the Hundred Ghost Stories, Hyakkiyako burns to the ground. Kokuriko, I've achieved perfect elegance!"
51230-266 = "Now to receive my Katashiro..."
51230-271 = "[ns] \"...!!!\""
51230-273 = "Huh?!"
51230-282 = "Look at you. You're all banged up and bruised from trying to resist."
51230-283 = "What're you even trying to do here? Rescue Yukari?"
51230-284 = "The gleam of hope in your eyes disgusts me."
51230-285 = "How dare the powerless have hope? You're not like us. I could kill you in an instant, Sensei."
51230-287 = "[ns] \"...!\""
51230-292 = "Stop it! You idiot!"
51230-298 = "You're still trying? Stop! Moving!"
51230-299 = "Do you have no brain? Are you just plain stupid?"
51230-300 = "Or are you just that desperate to save Yukari?"
51230-302 = "[ns] \"...HYAAAH!\""
51230-309 = "...I'm utterly baffled."
51230-310 = "Do you still not understand the situation?"
51230-311 = "If not for Yukari, I couldn't have made the Faceless Katashiro currently destroying everything Hyakkiyako students know and love right now."
51230-312 = "She hated everyone so much, wished for freedom so badly, she created a monster. "
51230-313 = "Your stupid misconceptions of this stupid little student are making you believe in a lie."
51230-314 = "Yukari was never a good person. She manipulated you into helping her revive the Hyakkaryouran."
51230-315 = "That's all humans do! Lie! Lie! Lie!"
51230-316 = "They're no heroes. You're injured beyond compare. But you just soldier on relentlessly, determined to save everyone."
51230-317 = "Why are you trying so hard to save some worthless, lying idiots? Why?!"
51230-318 = "[s1] \"You're right. They're liars.\"\n[s2] \"They were terrified of the truth.\"\n[s3] \"Because of that, they lied to benefit themselves.\""
51230-322 = "Do you still not understand the situation?"
51230-323 = "I knew you'd see it my way!"
51230-324 = "[s] \"...You're right.\""
51230-326 = "[ns] \"But why does it matter?\""
51230-330 = "...What?"
51230-331 = "[s4] \"Is it really that bad to lie?\"\n[s5] \"To be a hypocrite at times?\""
51230-334 = "What is this nonsense..."
51230-335 = "[ns] \"It's not nonsense. It's common sense.\""
51230-339 = "[ns] \"All of these things are just ordinary.\""
51230-341 = "...What?"
51230-348 = "Next Episode;Ordinary Events"

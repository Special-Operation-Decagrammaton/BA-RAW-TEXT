[translation]
51230-1 = "第23話;捏造的謊言"
51230-7 = "老師……！有人倒在那裡……！"
51230-10 = "[ns]「紫！？」"
51230-20 = "[ns]「唔……！這裡也有怪物……！」"
51230-23 = "居然追到這裡來了啊。#n夏萊的老師……還有名草醬。"
51230-25 = "棕櫚……"
51230-26 = "[s]「……棕櫚，你的暴行到此為止了。」"
51230-30 = "我們要把紫帶回去。"
51230-35 = "……呵。"
51230-36 = "啊哈。"
51230-37 = "啊哈哈哈哈哈哈！！"
51230-41 = "真煩人啊。"
51230-47 = "這麼說來……我曾經聽過這樣一個傳聞。"
51230-48 = "──夏萊的老師不管什麼事都能解決。"
51230-49 = "只要是發生在奇普托斯的事，無論什麼都會插手的──天下第一蠢蛋。"
51230-50 = "其結果……就是夏萊的老師和名草醬一起來救紫。#n就是那種心情驅使你們來到這裡的嗎？"
51230-51 = "明明我的「百物語」只要劃下句點就能完成……"
51230-52 = "你卻想在這裡妨礙我？#n太可笑了，真是可笑至極。"
51230-53 = "雖然夏萊的老師也一樣……"
51230-57 = "但尤其可笑的人……名草醬，就是你。"
51230-59 = "……！！"
51230-61 = "竟敢開口要我把紫還給你們？"
51230-62 = "也就是說……你來這裡是以為自己能救得了巫女？是嗎名草醬？"
51230-63 = "真虧你能若無其事地說出這種話啊？"
51230-64 = "是同伴要你這麼做的嗎？"
51230-65 = "說能救巫女的只有你，這種能激勵你的話為你加油嗎？"
51230-66 = "……那真是太奇怪了。#n難道大家都不知道嗎？"
51230-67 = "名草醬[ruby=  ・     ・     ・     ・  ]明明是個[/ruby][ruby= ・     ・     ・     ・     ・     ・     ・ ]沒能力拯救菖蒲[/ruby][ruby= ・     ・     ・ ]的蠢蛋[/ruby]這件事。"
51230-72 = "啊～我知道了。#n你依然沒把一切告訴大家吧？"
51230-73 = "我指的是當時在大雪原發生事情的真相。"
51230-74 = "[s]「名草，不需要聽他說。」"
51230-75 = "不不不，必須得聽我說。#n而且老師更應該聽才對哦？"
51230-76 = "現在站在你身旁的那個自以為是，看似想解救重要後輩而跑來的名草醬……"
51230-77 = "其實是個既沒那份心也沒那個本事、一無所有的騙子……#n這件事你還是知道比較好吧？"
51230-83 = "我還記得哦，名草醬。"
51230-85 = "你為了拯救菖蒲而來到大雪原，結果卻失敗的那一天。"
51230-86 = "你根本沒救到菖蒲不是嗎？"
51230-87 = "畢竟名草醬你根本沒那種本事。"
51230-89 = "他只會模仿菖蒲而已。#n以為只要待在菖蒲身邊就是配得上他的優等生，真是愚蠢。"
51230-91 = "話說當時的結果是怎麼樣來著？"
51230-92 = "啊，對了，是右手吧？"
51230-93 = "…………夠了。"
51230-94 = "你的右手已經不能動了對吧？我全都知道哦。#n因為你那本想伸向菖蒲卻被拒絕的右手，已經被黃昏吞噬了。"
51230-95 = "雖然為了重要的青梅竹馬勇敢地衝上前去，#n最終卻因為害怕而放棄解救近在眼前的菖蒲……"
51230-96 = "不是的，我……"
51230-101 = "我還記得，當時墜入黃昏的菖蒲……"
51230-102 = "成為百物語的菖蒲對你說的話。"
51230-103 = "那時候菖蒲是這麼說的。"
51230-104 = "夠了……！"
51230-106 = "「名草，我從一開始就沒把你當成朋友」──"
51230-112 = "嗯，這句話可真是大快人心啊。"
51230-113 = "面對什麼都辦不到的蠢蛋名草醬展現的醜態……#n雖然一時抱有期待，最終失望的他說出了這句話。"
51230-114 = "啊，當時菖蒲究竟做何感想……我完全能切身體會。"
51230-115 = "要是當初來救人的不是你……"
51230-116 = "而是其他更可靠的人……說不定就能阻止悲劇發生了。"
51230-117 = "你不這麼認為嗎？"
51230-119 = "[ns]「棕櫚……！」"
51230-123 = "請不要插嘴好嗎？#n我──怪談家箭吹棕櫚現在正在說話。"
51230-135 = "[ns]「呃，唔！？」"
51230-136 = "就算是夏萊的老師，在被百物語壓制的情況下應該也說不出話吧？"
51230-137 = "請你乖乖閉上嘴，夏萊的老師。"
51230-139 = "老師……！"
51230-140 = "真要追究起來，這一切的悲劇都是因名草醬而起。"
51230-141 = "覺得我說得太過分？說話不合邏輯？"
51230-142 = "那我就讓你看看證據吧。"
51230-144 = "藉由我的怪書讓你看個清楚。"
51230-160 = "（不辜負期待是理所當然的）"
51230-161 = "（回應期待是應該的）"
51230-162 = "（對充滿期待的目光綻放微笑是自然的）"
51230-165 = "勘解由小路紫。"
51230-166 = "百鬼夜行赫赫有名的名門家族．勘解由小路家的女兒。"
51230-167 = "勘解由小路家之人，必須保持正直"
51230-168 = "這是我應盡的使命和任務。"
51230-169 = "…………我很清楚。"
51230-170 = "這是小女子必須做的事。"
51230-175 = "但是……"
51230-176 = "我見到了名草前輩。"
51230-177 = "第一次……讓我察覺除了「該做的事」之外還有「想做的事」的人。"
51230-181 = "只要加入百花繚亂就行了！"
51230-188 = "不是的……紫。"
51230-189 = "我沒有你想得……那麼厲害。"
51230-194 = "我……是個滿口謊言的人…… "
51230-195 = "為了欺騙大家而帶著虛假的面具……"
51230-200 = "那一切全都只是謊言罷了……"
51230-211 = "就因為我在這裡。"
51230-212 = "為了待在菖蒲身邊而扮演「名草」不斷說謊的結果……"
51230-213 = "導致連紫都想成為百花繚亂……所以才……"
51230-215 = "沒錯唷，名草醬。現在明白了嗎？#n名草醬所觸碰到的一切都將會崩毀。"
51230-216 = "菖蒲被黃昏吞噬，以及紫變成百物語，這一切都是你的錯。"
51230-221 = "全都是因為不知天高地厚的你妄想待在菖蒲身邊而發生的。"
51230-222 = "因為你想扮演不適合自己的「角色」，所以才會發生這種悲劇。"
51230-223 = "請你好好銘記在心。"
51230-225 = "一切……都是因為我……#n因為我戴上了虛假的「面具」……才會……"
51230-226 = "都是我破壞的。"
51230-227 = "全都是因為我……"
51230-229 = "[ns]「……！……名草！」"
51230-230 = "哼，連名草也一起壓制吧。"
51230-239 = "[ns]「……！！！」"
51230-241 = "這樣正好。"
51230-242 = "內心受挫的人更容易昇華為怪談。"
51230-243 = "名草醬，我會好好對待你的，敬請期待哦。"
51230-244 = "呼……"
51230-245 = "這樣終於結束了。"
51230-248 = "呵呵，啊哈，啊哈哈哈！"
51230-249 = "嗯嗯，這樣就對了。"
51230-250 = "只要你知道分寸，願意理解就夠了。"
51230-251 = "一切都依照我的意圖發展。"
51230-254 = "讓彼此反目、爭吵所需的所有材料。"
51230-255 = "為此，我連那個了不起的夏萊老師都當做棋子利用了。"
51230-259 = "啊啊，請看，雛罌粟大人。#n這就是我創造的「百物語」……"
51230-260 = "來，全部破壞殆盡吧。#n互相中傷、辱罵、詆毀、誣陷……最後刀劍相向，傷害彼此吧。"
51230-262 = "這樣我就完成了將百鬼夜行燃燒殆盡的「百物語」──美麗的風情了，雛罌粟大人。"
51230-266 = "接著只要回收創造無貌形代的巫女……"
51230-271 = "[ns]「……！！！」"
51230-273 = "唔！？"
51230-282 = "都已經遍體鱗傷了還掙脫幻魎百物語，我還以為你想去哪裡呢……"
51230-283 = "你以為只要趁機救出紫就能逆轉局勢嗎？"
51230-284 = "──誤會也要有個限度。"
51230-285 = "我可是知道的哦？#n夏萊的老師和我們不同，是只要我一個手勢就能讓你在地上打滾的脆弱存在。"
51230-287 = "[ns]「……！」"
51230-292 = "都說了沒用的！"
51230-298 = "啊？你現在在做什麼？"
51230-299 = "難道腦袋已經出問題了嗎？"
51230-300 = "你就那麼想救紫嗎？"
51230-302 = "[ns]「……哈啊！」"
51230-309 = "……實在搞不懂。"
51230-310 = "你不是也很清楚嗎？"
51230-311 = "讓那個在街道上肆虐的怪物「無貌的形代」誕生的人就是紫。"
51230-312 = "他就是痛恨所有人，想燒毀、拋開一切的罪魁禍首。"
51230-313 = "沒錯。你認為很了不起的百花繚亂1年級生──打從一開始就不存在。"
51230-314 = "就連紫也只是為了私慾而欺騙你……扮演想恢復百花繚亂的乖學生而已。"
51230-315 = "盡是些滿口謊言的人。"
51230-316 = "他又不是什麼可憐的女主角……為何不惜在地上掙扎也想救他呢？"
51230-317 = "為什麼要救那種毫無價值的騙子……！"
51230-318 = "[s1]「……沒錯，或許確實有人說了謊。」\n[s2]「也許是害怕內心的想法被人發現……」\n[s3]「所以才會包裝自己，表現出虛偽的一面。」"
51230-322 = "你這不是很清楚嗎。"
51230-323 = "沒錯！全都是謊言！#n隱藏內心深處的想法！不斷說著令人作嘔的謊言！"
51230-324 = "[s]「……沒錯。」"
51230-326 = "[ns]「但是那又如何？」"
51230-330 = "……咦？"
51230-331 = "[s4]「就算說謊、假仁假義……」\n[s5]「扮演虛假的自己又如何？」"
51230-334 = "你在說什麼……"
51230-335 = "[ns]「真要說起來……」"
51230-339 = "[ns]「那不過就是每個人都做過的，再平凡不過的事而已。」"
51230-341 = "…………………………………………………………啥？"
51230-348 = "下一話;平凡的事"

[translation]
51230-1 = "ตอนที่ 23;คำโกหกที่แต่งขึ้น"
51230-7 = "คุณครู...! คนที่นอนสลบอยู่ตรงนั้น...!"
51230-10 = "[ns] \"ยูคาริ?!\""
51230-20 = "[ns] \"อึ้ก...! มีพวกปีศาจตรงนี้ด้วย...!\""
51230-23 = "ไล่ตามมาถึงนี่เลยเหรอคะ คุณครูจากชาเล่ต์... แล้วก็นางุสะ"
51230-25 = "ชูโระ..."
51230-26 = "[s] \"...ชูโระ หยุดเรื่องโหดร้ายพวกนี้ได้แล้ว\""
51230-30 = "ฉันจะพายูคาริกลับไป"
51230-35 = "...เฮอะ"
51230-36 = "อะฮ่า"
51230-37 = "อ่ะฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!!"
51230-41 = "น่าหงุดหงิดจริงๆ เลย"
51230-47 = "จะว่าไปแล้ว... ฉันเคยได้ยินข่าวลือมาบ้างนะคะ"
51230-48 = "ได้ยินว่าครูจากชาเล่ต์เป็นคนที่ช่วยแก้ปัญหาให้ได้ทุกสิ่งอย่าง"
51230-49 = "แล้วก็ว่ากันว่า... เป็นคนโง่ที่ทุ่มเทอย่างสุดกำลัง ไม่ว่าจะเจอเรื่องหนักหนาแค่ไหนในคิโวทอส"
51230-50 = "และด้วยเหตุนั้น... ทั้งคุณครูจากชาเล่ต์และนางุสะก็เลยบึ่งมาที่นี่เพื่อที่จะช่วยยูคาริ ฉันเข้าใจถูกไหมคะ?"
51230-51 = "ตอนนี้ <ตำนานร้อยเรื่องราว> ของฉันเหลือแค่ขีดเส้นใต้คำว่าจบบริบูรณ์แล้ว"
51230-52 = "แต่จะมาขัดขวางกันตอนนี้ มันก็ตลกดีนะคะ ตลกจนฉันหงุดหงิดเลยละ"
51230-53 = "ครูจากชาเล่ต์ คุณก็น่าตลกอยู่หรอกนะ... แต่คนที่ตลกมากกว่านั้นคือ..."
51230-57 = "นางุสะจัง คุณนั่นแหละค่ะ"
51230-59 = "...อึก!!"
51230-61 = "ยัยนี่น่ะเหรอคะ ที่บอกว่าจะมาพาตัวยูคาริกลับไป?"
51230-62 = "ที่ถ่อมาถึงที่นี่และพูดออกมาแบบนั้นน่ะ... คิดแล้วใช่ไหมว่าจะมาช่วยคุณมิโกะที่อยู่ตรงนี้กลับไปจริงๆ? คิดแบบนั้นจริงเหรอคะ? นางุสะจัง?"
51230-63 = "พูดแบบนั้นออกมาโดยไม่รู้สึกอะไรเลยได้ยังไงคะ?"
51230-64 = "หรือว่าเพื่อนๆ บังคับให้มาคะ?"
51230-65 = "มีคนบอกว่ามีแค่คุณที่ช่วยคุณมิโกะได้ และช่วยพูดให้กำลังใจจนมีแรงฮึดขึ้นมาเหรอคะ?"
51230-66 = "...ถ้าเป็นอย่างนั้นจริง ก็ถือว่าน่าแปลกมากนะคะ ทุกคนไม่รู้กันหรอกเหรอคะ?"
51230-67 = "ว่าความจริงแล้ว ยัยคนนี้ช่วยไม่ได้แม้แต่อายาเมะด้วยซ้ำน่ะค่ะ"
51230-72 = "อ้อ... พอจะรู้แล้วละ คุณยังไม่ได้บอกทุกคนใช่ไหมคะ?"
51230-73 = "ยังไม่ได้บอกความจริงว่าเกิดอะไรขึ้นบ้างในทุ่งหิมะใหญ่ใช่ไหม?"
51230-74 = "[s] \"นางุสะ ไม่ต้องไปฟังหรอกนะ\""
51230-75 = "ไม่สิ ต้องฟังสิคะ กลับเป็นคุณครูด้วยซ้ำนะคะที่ควรฟัง"
51230-76 = "นางุสะจังที่ยืนทำเป็นอวดดีอยู่ข้างคุณ คนที่วิ่งแจ้นมาเหมือนว่าจะมาช่วยรุ่นน้องน่ะ"
51230-77 = "ที่จริงแล้วเป็นแค่คนโกหกที่ไม่มีความสามารถ และไม่มีความคิดจะช่วยใครด้วย เรื่องแบบนี้รู้ไว้ไม่ดีกว่าเหรอคะ?"
51230-83 = "ฉันยังจำได้ขึ้นใจเลยละค่ะ นางุสะจัง"
51230-85 = "วันที่คุณมาที่ทุ่งหิมะใหญ่แล้วบอกว่าจะมาช่วยอายาเมะ แต่สุดท้ายก็ทำไม่ได้น่ะ"
51230-86 = "มือนั่นน่ะ... ช่วยอายาเมะเอาไว้ไม่ได้นี่คะ?"
51230-87 = "นางุสะจังไม่ใช่คนที่มีความสามารถแบบนั้นตั้งแต่แรกแล้ว"
51230-89 = "ก็แค่คนที่ตัวติดและทำอะไรตามอายาเมะ คนโง่ที่เข้าใจผิดว่าตัวเองเป็นนักเรียนดีเด่นที่เหมาะจะเป็น#nเพื่อนอายาเมะ"
51230-91 = "แล้วสุดท้ายผลมันเป็นยังไงนะ?"
51230-92 = "อ้อ จริงสิ แขนขวาใช่ไหมคะ?"
51230-93 = "...พอได้แล้ว"
51230-94 = "ขยับแขนข้างนั้นไม่ได้ใช่ไหมคะ? ฉันรู้อยู่ค่ะ คุณยื่นแขนขวาออกไปหาอายาเมะแต่ถูกปฏิเสธ จนโดนห้วงอัสดงกลืนกิน"
51230-95 = "คุณวิ่งเข้าใส่เพื่อจะช่วยเพื่อนวัยเด็กคนสำคัญ แต่สุดท้ายก็กลัวจนล้มเลิกความคิดที่จะช่วยไปต่อหน้า#nต่อตา"
51230-96 = "ไม่ใช่นะ ฉัน..."
51230-101 = "ตอนนั้นที่อายาเมะเข้าไปติดอยู่ในห้วงอัสดง ฉันยังจำได้อยู่เลยค่ะ"
51230-102 = "คำที่อายาเมะบอกกับคุณหลังจากตัวเองกลายเป็นตำนานร้อยเรื่องราว"
51230-103 = "ตอนนั้นอายาเมะพูดไว้ว่า"
51230-104 = "พอได้แล้ว...!"
51230-106 = "<นางุสะ ฉันไม่เคยคิดว่าเธอเป็นเพื่อนฉันตั้งแต่แรกเลย>"
51230-112 = "ได้ยินแล้วสาแก่ใจเลยละค่ะ"
51230-113 = "พอได้เห็นการกระทำแย่ๆ ของนางุสะจังหน้าโง่ที่ลงมือทำอะไรไม่ได้เลย ความหวังที่เคยมีก็เลยเปลี่ยน#nเป็นความสิ้นหวัง จนพ่นคำแบบนั้นออกมา"
51230-114 = "อืม ฉันเข้าใจเป็นอย่างดีเลยค่ะว่าตอนนั้นอายาเมะรู้สึกยังไง จะว่าไป..."
51230-115 = "ถ้าคนที่มาช่วยมันไม่ใช่คุณตั้งแต่ตอนแรก"
51230-116 = "ถ้าเป็นคนที่ได้เรื่องกว่าคุณสักหน่อย... ก็อาจจะหยุดโศกนาฏกรรมครั้งนั้นได้"
51230-117 = "เคยคิดแบบนี้ไหมคะ?"
51230-119 = "[ns] \"ชูโระ...!\""
51230-123 = "อย่าขัดฉันสิคะ นักเล่าเรื่องลึกลับยาบูกิ ชูโระกำลังเล่าเรื่องอยู่นะคะ"
51230-135 = "[ns] \"อึ้ก... อึก... อุ๊บ?!\""
51230-136 = "ต่อให้เป็นคุณครูจากชาเล่ต์ก็ตาม แต่ถ้าหากถูกเหล่าตำนานร้อยเรื่องราวปิดปากไว้ ยังไงก็เอื้อนเอ่ยอะไรออกมาไม่ได้ค่ะ"
51230-137 = "หุบปากของคุณไว้เถอะค่ะ คุณครูจากชาเล่ต์"
51230-139 = "คุณครู...!"
51230-140 = "ลองคิดดูดีๆ แล้ว โศกนาฏกรรมทั้งหมดนี้เกิดขึ้นเพราะคุณตั้งแต่แรกนะคะ นางุสะ"
51230-141 = "คิดว่าฉันพูดแรงหรือไม่มีเหตุผลหรือเปล่าคะ?"
51230-142 = "ถ้าอย่างนั้นฉันจะให้ดูหลักฐานค่ะ"
51230-144 = "หลักฐานจากหนังสือลึกลับของฉัน"
51230-160 = "(แน่นอนอยู่แล้วที่จะตอบสนองต่อความคาดหวัง)"
51230-161 = "(สมควรแล้วที่จะตอบสนองต่อความคาดหวัง)"
51230-162 = "(เป็นธรรมชาติที่จะยิ้มให้กับสายตาแห่งความคาดหวัง)"
51230-165 = "นามของข้าคือคาเดโนะโคจิ ยูคาริ"
51230-166 = "บุตรีจากตระกูลคาเดโนะโคจิ ตระกูลที่มีชื่อเสียงโด่งดังในเฮียกคิยาโค"
51230-167 = "จงยืนหยัดในฐานะคาเดโนะโคจิ"
51230-168 = "นั่นคือภารกิจและหน้าที่ที่ข้าต้องทำ"
51230-169 = "...ข้าทราบดีเจ้าค่ะ"
51230-170 = "ว่ามันเป็นสิ่งที่ข้าจำเป็นต้องทำ"
51230-175 = "แต่ว่า"
51230-176 = "วันที่ได้เจอกับรุ่นพี่นางุสะ"
51230-177 = "วันนั้นเป็นครั้งแรกที่ข้ารู้ว่านอกจากสิ่งที่ข้าต้องทำแล้ว ข้ายังมีสิ่งที่ตัวเองอยากทำอยู่"
51230-181 = "ใช่เจ้าค่ะ ข้าอยากเป็นเฮียกกะเรียวรันเจ้าค่ะ!"
51230-188 = "ไม่ใช่หรอก... ยูคาริ"
51230-189 = "ฉันไม่ใช่คนยอดเยี่ยม... อย่างที่เธอคิดหรอกนะ"
51230-194 = "ฉันมันก็แค่... คนที่ใส่หน้ากากแล้วหลอกลวงทุกคน..."
51230-195 = "ด้วยเรื่องโกหกที่ไม่มีวันเป็นเรื่องจริงได้..."
51230-200 = "ทั้งหมด... มันเป็นแค่คำโกหก..."
51230-211 = "เป็นเพราะฉัน"
51230-212 = "การที่ฉันพูดโกหกและแสร้งเป็นเด็กที่ชื่อ <นางุสะ> เพื่อจะได้อยู่ข้างๆ อายาเมะ..."
51230-213 = "ทำให้ยูคาริคิดอยากเป็นเฮียกกะเรียวรันไปด้วย... และเพราะแบบนั้น..."
51230-215 = "ใช่ค่ะ นางุสะจัง ตอนนี้พอจะรู้แล้วหรือยังคะว่าทุกสิ่งที่นางุสะไปแตะต้อง สุดท้ายมันก็จะล้มไม่เป็นท่า"
51230-216 = "ทุกอย่างเป็นเพราะคุณ ที่อายาเมะต้องหลุดไปในห้วงอัสดง ทั้งยูคาริที่กลายเป็นตำนานร้อยเรื่องราว"
51230-221 = "ทั้งหมดเป็นเพราะคุณไม่รู้จักเจียมตัว และเอาแต่จะตามอายาเมะต้อยๆ"
51230-222 = "โศกนาฏกรรมนี้เกิดขึ้นเพราะคุณพยายามแสดงใน <บทบาท> ที่ไม่เหมาะสมกับตัวเอง"
51230-223 = "รู้เอาไว้ด้วยนะคะ"
51230-225 = "ทุกอย่างที่เกิดขึ้น... เป็นเพราะฉัน... ที่ฉันใส่ <หน้ากาก> แห่งความโกหก... ทำให้ทุกอย่าง..."
51230-226 = "พังไม่เป็นท่าหมดเลย"
51230-227 = "ทุกอย่างเป็นเพราะฉัน..."
51230-229 = "[ns] \"......! นะ... นางุสะ!\""
51230-230 = "ฮึ่ม ทุกคนไปหยุดนางุสะไว้"
51230-239 = "[ns] \"......!!!\""
51230-241 = "ดีเลยค่ะ"
51230-242 = "มนุษย์ที่ท้อใจน่ะ ส่งไปเป็นเรื่องลึกลับเลยจะดีเสียกว่า"
51230-243 = "แล้วฉันจะทำให้นางุสะออกมาน่ารักเลยละค่ะ ตั้งตารอได้เลย"
51230-244 = "เฮ้อ..."
51230-245 = "ในที่สุดก็จบเสียทีนะคะ"
51230-248 = "ฮุฮุ อะฮ่า อะฮ่าฮ่าฮ่า"
51230-249 = "ใช่ค่ะ แค่นี้ก็เพียงพอแล้ว"
51230-250 = "แค่รู้และเข้าใจสถานภาพตัวเองก็พอแล้วค่ะ"
51230-251 = "ทุกอย่างเป็นไปตามที่ฉันหวังเลย"
51230-254 = "ฉันใช้ทุกองค์ประกอบที่จำเป็นในการทำให้ทุกคนมุ่งร้ายและต่อสู้กัน"
51230-255 = "แล้วยังได้ใช้ครูจากชาเล่ต์ที่เก่งนักหนาเป็นเบี้ยอีก"
51230-259 = "ท่านโคคุริโกะ ดู <ตำนานร้อยเรื่องราว> ที่ฉันสร้างขึ้นมาสิคะ"
51230-260 = "เอาเลย เอาให้แตกหักกันให้หมด ทุกคนจงพูดให้ร้าย ด่าทอ ใช้เล่ห์เพทุบาย... และสุดท้ายก็หันคมมีด#nเข้าใส่กัน"
51230-262 = "ฉันจะทำให้ความสง่างามอันน่างดงาม กับ <ตำนานร้อยเรื่องราว> ที่แผดเผาเฮียกคิยาโคจบบริบูรณ์#nด้วยสิ่งนี้ค่ะ ท่านโคคุริโกะ"
51230-266 = "เอาละค่ะ ต่อไปก็รับเอาคุณมิโกะที่สร้างคาตาชิโระขึ้นมา..."
51230-271 = "[ns] \"......!!!\""
51230-273 = "อึก?!"
51230-282 = "มีแผลเต็มตัวขนาดนั้น ก็คิดอยู่ว่าจะผลักไสตำนานร้อยเรื่องราววิญญาณลี้ลับแล้ววิ่งแจ้นไปไหน..."
51230-283 = "คิดว่าถ้าใช้ช่องโหว่เข้าไปช่วยยูคาริแล้วจะเปลี่ยนสถานการณ์ได้งั้นเหรอคะ?"
51230-284 = "ถ้าจะคิดไปเอง... ก็เอาให้มันพอดีหน่อยเถอะ"
51230-285 = "ฉันรู้อยู่ค่ะว่าครูจากชาเล่ต์เป็นคนอ่อนแอที่ไม่เหมือนกับพวกเราแม้แต่ปลายนิ้วก้อย"
51230-287 = "[ns] \"......!\""
51230-292 = "เพราะงั้นมันถึงไม่มีประโยชน์ไงคะ!"
51230-298 = "เฮอะ คิดจะทำอะไรของคุณคะ?"
51230-299 = "หรือว่าสมองกลับไปแล้ว?"
51230-300 = "อยากทำถึงขนาดนั้นเพื่อช่วยยูคาริงั้นเหรอคะ?"
51230-302 = "[ns] \"......ย้าก!\""
51230-309 = "...ไม่เข้าใจเลย"
51230-310 = "คุณเองก็รู้ดีอยู่แก่ใจนี่คะ?"
51230-311 = "ว่าคนที่ทำให้เกิด <คาตะชิโระไร้หน้า> ที่ฉุนเฉียวอยู่บนถนนงานเทศกาลนั้นคือยูคาริ"
51230-312 = "ตัวต้นเหตุที่เกลียดชังทุกคนจนอยากเผาให้มอดไหม้ ตัวต้นเหตุที่อยากสลัดทุกอย่างทิ้งไป"
51230-313 = "ใช่ค่ะ เด็กชั้นปีที่ 1 ของเฮียกกะเรียวรันที่คุณภาคภูมิใจน่ะไม่มีตั้งแต่แรกแล้ว"
51230-314 = "แม้แต่ยูคาริเองก็หลอกคุณและแสดงเป็นนักเรียนดีเด่นที่จะฟื้นฟูเฮียกกะเรียวรันกลับมา... แต่มันก็แค่เพื่อความสะดวกของตัวเอง"
51230-315 = "ตรงนี้มีแต่มนุษย์ที่เอาแต่พูดคำโป้ปดทั้งนั้น"
51230-316 = "คนที่ลงไปกองบนพื้น ทั้งที่จริงก็ไม่ได้เป็นนางเอกที่น่าสงสารหรืออะไรเลย ทำไมคุณถึงยังจะช่วยเธอ#nอยู่เหรอคะ?"
51230-317 = "ทำไมถึงจะช่วยคนขี้โกหกไร้ค่าแบบนั้นด้วย...!"
51230-318 = "[s1] \"...ใช่ อาจจะมีใครพูดโกหกก็ได้\"\n[s2] \"อาจจะมีคนที่กลัวถูกเผยความในใจ\"\n[s3] \"ก็เลยแกล้งแสดงให้เห็นด้านที่ไม่จริงก็ได้\""
51230-322 = "ก็รู้ดีนี่คะ"
51230-323 = "ใช่ค่ะ! ทุกอย่างคือคำพูดปด ส่วนความจริงก็เก็บซ่อนไว้ในใจ! แล้วพูดแต่เรื่องโกหกซ้ำไปซ้ำมา!"
51230-324 = "[s] \"...อื้ม มันก็อาจจะใช่\""
51230-326 = "[ns] \"ก็แล้วมันจะไปเป็นอะไรล่ะ?\""
51230-330 = "คะ...?"
51230-331 = "[s4] \"ถึงจะพูดโกหก\"\n[s5] \"แล้วแกล้งแสดงเป็นคนอื่น แล้วมันจะทำไมล่ะ?\""
51230-334 = "นี่คุณ... หมายความว่ายังไง..."
51230-335 = "[ns] \"ถ้าจะพูดให้เข้าใจง่ายๆ...\""
51230-339 = "[ns] \"นั่นมันเป็นเรื่องธรรมดาของทุกคนอยู่แล้วไม่ใช่เหรอ?\""
51230-341 = "............................ว่าไงนะ?"
51230-348 = "ตอนต่อไป;เรื่องธรรมดา"

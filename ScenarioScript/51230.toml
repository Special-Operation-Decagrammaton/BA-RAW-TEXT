51230-52 = "3;슈로;09;그런데, 여기서 날 방해하려고 하다니. 웃기네요. 정말 짜증 날 정도로 웃겨요."
51230-53 = "3;슈로;99;샬레의 선생. 당신이란 작자도 그렇지만…… 특히나 웃기는 쪽은……\n#3;em;…"

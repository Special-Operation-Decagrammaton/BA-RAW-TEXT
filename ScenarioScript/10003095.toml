[translation]
10003095-1 = "第9話;風紀委員會vs問題兒童集團（２）"
10003095-2 = "重型戰車被單人擊倒了！？"
10003095-3 = "啊啊，討厭，撤退吧！是誰說他留守學園沒來的？可惡，被騙了！"
10003095-4 = "溫泉呀！海洋深層水溫泉呀──！！"
10003095-11 = "咦咦咦咦咦咦！？玉米這下都變成爆米花了！！"
10003095-12 = "哎呀，風紀委員長來了嗎★那就到此為止了呢。"
10003095-13 = "是啊，本次的研究就在此結束吧。"
10003095-14 = "撤退～閃人囉──！"
10003095-15 = "為什麼一臉開心的樣子！？趕緊逃吧！！"
10003095-19 = "……一轉眼就……"
10003095-20 = "這就是陽奈委員長的力量……"
10003095-21 = "太妹集團「罪i搗亂」和「溼答答頭盔團」已壓制完成！"
10003095-22 = "雖然有數人逃走，但已掌握行蹤，應該很快就會追捕歸案。"
10003095-23 = "感謝您鎮壓局勢！您辛苦了，空崎委員長！"
10003095-24 = "這不算什麼。#n比起這個，伊織、千夏。"
10003095-25 = "呃……"
10003095-26 = "委員長……"
10003095-31 = "所有人立刻回到飯店。"
10003095-32 = "啊，還有……"
10003095-33 = "回去之後立即舉辦反省會。全員都要參加。"
10003095-34 = "唉……"
10003095-35 = "是……"
10003095-36 = "亞子，特別是你。"
10003095-37 = "唔……是……"

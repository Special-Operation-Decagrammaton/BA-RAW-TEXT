[translation]
10003095-1 = "ตอนที่ 9;คณะกรรมการวินัย vs เด็กเจ้าปัญหา 2"
10003095-2 = "ใช้รถถังลุยเดี่ยวคนเดียวเลยเหรอ?! "
10003095-3 = "ทะ...ทุกคน ถอย! ไหนบอกว่าหัวหน้าคณะกรรมการวินัยไม่อยู่ยังไงเล่า~! บะ..บ้าจริง! ถูกต้มซะแล้ว!"
10003095-4 = "อ๊าาาา! บ่อน้ำพุร้อน!! บ่อน้ำพุร้อนทะเลลึกของเรา!!"
10003095-11 = "อ๊าาาา...! ข้าวโพดดด! ข้าวโพดที่เหลือ...! กลายเป็นป็อปคอร์นไปหมดแล้ว!"
10003095-12 = "ตายจริง☆ ถ้าหัวหน้าคณะกรรมการวินัยโผล่มาล่ะก็... ไม่ไหวค่ะ ไม่ไหว... "
10003095-13 = "อืม... ดูเหมือนจะมาได้แค่นี้สินะคะ การค้นหาของอร่อยของเราคงจะมาได้แค่นี้แล้วล่ะค่ะ"
10003095-14 = "ค่ะ~! ถอนตัว!"
10003095-15 = "ทำไมพูดเหมือนสนุกกันอยู่เลยล่ะ?! รีบหนีเร็วเข้า!!"
10003095-19 = "...แค่ในพริบตาเดียว..."
10003095-20 = "นี่คือพลังของท่านประธานฮินะสินะคะ..."
10003095-21 = "รายงานค่ะ! รวบตัวพวกกลุ่มแยงกี้สาวและแก๊งหมวกกันน็อกที่เหลือเอาไว้ได้สำเร็จแล้วค่ะ!"
10003095-22 = "ส่วนพวกที่เหลืออยู่ตอนนี้ กองกำลังของเรากำลังไล่ตามไปจับกุมอยู่#nและคาดว่าจะจับกุมได้หมดในไม่ช้าค่ะ"
10003095-23 = "ควบคุมสถานการณ์ได้แล้วค่ะ! ขอบคุณมากค่ะ ประธานโซระซากิ!"
10003095-24 = "ไม่ใช่เรื่องใหญ่หรอก ส่วนอิโอริ ชินัตสึ..."
10003095-25 = "อึ่ก"
10003095-26 = "ท่านประธาน..."
10003095-31 = "ทุกคนกลับไปที่โรงแรมได้แล้ว"
10003095-32 = "อ๋อ แล้วก็..."
10003095-33 = "พอกลับไปเราจะประชุมพิจารณาเรื่องที่เกิดขึ้น ขอให้ทุกคนเข้าร่วมด้วยล่ะ"
10003095-34 = "เฮ้อ..."
10003095-35 = "ค่ะ... "
10003095-36 = "โดยเฉพาะอาโกะ..."
10003095-37 = "คะ... คะ...ค่ะ"

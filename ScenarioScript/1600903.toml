[translation]
1600903-1 = "นินจาสาวไม่ยอมหยุด"
1600903-2 = "(ใกล้ช่วงเวลาพักเที่ยง...)"
1600903-6 = "[ns] \"วันนี้เคลียร์งานได้เร็วกว่าที่คิดแฮะ พักกินข้าวหน่อยดีกว่า\""
1600903-8 = "[ns] \"รอแค่สามนาที...\""
1600903-10 = "(คุณครูนั่งรอเงียบๆ ให้ราเม็งสุก)"
1600903-18 = "วะฮะฮะฮ่า! รอนานเลยใช่มั้ย ท่านอาจารย์! มิจิรุ... ได้เวลาออกโรงแล้ว!"
1600903-22 = "[ns1] \"เดี๋ยวก่อน มิจิรุ... ครูไม่ได้รอนานเลย...!\"\n[ns2] \"เธอบอกว่าจะมาตอนบ่ายไม่ใช่เรอะ!? นี่เพิ่งเที่ยงเองนะ...\""
1600903-23 = "ท่านอาจารย์! นินจาน่ะมักจะปรากฏตัวออกมาโจมตีแบบไม่ให้ซุ่มให้เสียงหรอกนะ!"
1600903-24 = "ท่านอาจารย์! นินจาน่ะมักจะปรากฏตัวออกมาโจมตีแบบไม่ให้ซุ่มให้เสียงหรอกนะ!"
1600903-25 = "หืม~ เป็นไงบ้าง ข้าน้อยเหมือนนินจาเลยใช่มั้ย?!"
1600903-26 = "[s] \"อะ...อื้อ นั่นสินะ\""
1600903-27 = "ว้า... ปฏิกิริยาตอบกลับแบบไม่เต็มใจอย่างยิ่งแบบนั้นอะไรกันน่ะ! ทำแบบนั้นข้าน้อยปวดใจนะ! นินจาเป็นพวกอ่อนไหวมากนะ!"
1600903-28 = "[s] \"สิ่งมีชีวิตที่เรียกว่านินจา เข้าใจยากจริงๆ นะ...!\""
1600903-29 = "อุวะฮะฮะ แค่จะบอกเอาไว้ก็เท่านั้นเอง~"
1600903-30 = "ว่าแต่ว่า... เอ๊ะ? ท่านอาจารย์ มื้อเที่ยงวันนี้ก็กินราเม็งถ้วยอีกแล้วเหรอ?"
1600903-31 = "โธ่เอ๊ยๆ ท่านอาจารย์... ถ้าเอาแต่กินราเม็งถ้วยแบบนี้อย่างเดียวจะเสียใจภายหลังเอานะ?"
1600903-32 = "[s] \"เสียใจภายหลังงั้นเหรอ?\""
1600903-33 = "ก็นะ... ถ้าเอาแต่กินอาหารจานด่วนอย่างราเม็งถ้วยแบบนั้นต่อไปเรื่อยๆ จะได้รับสารอาหารไม่ครบถ้วน พอร่างกายได้รับสารอาหารไม่เพียงพอก็จะทำให้ปากแตกได้ แถมจะปวดหลังด้วย"
1600903-34 = "ถ้าไม่กินอาหารที่ดีต่อร่างกาย ตอนกลางคืนก็จะนอนไม่ค่อยหลับ แล้วถ้านอนไม่พอขึ้นมาจะเกิดอะไรขึ้น?"
1600903-35 = "พอนอนไม่หลับก็จะเอาแต่ไถโทรศัพท์เล่นเน็ตทั้งคืน แล้วก็ไปเล่นดราม่ากับพวกที่คอมเม้นต์แย่ๆ เรื่องนินจา จากนั้นพอมีเวลาหน่อยก็จะไถไปดูคลิปวิดีโอต่างๆ..."
1600903-36 = "แน่นอนว่าแบบนี้ก็จะทำให้คุณภาพการนอน Down! เช้าวันต่อมาตอนตื่นก็จะไม่ค่อยสดชื่นยังไงล่ะ?"
1600903-37 = "อาหารจานด่วนพวกนี้น่ะเป็นหนึ่งในของต้องห้ามของนินจาเลยล่ะ...!"
1600903-38 = "[s3] \"ราเม็งถ้วยนี่น่ากลัวจริงๆ...!\"\n[s4] \"ครูประทับใจที่เธอร่ายละเอียดยิบจนเห็นภาพจัง...\""
1600903-39 = "ฮึ นั่นเพราะสั่งสมประสบการณ์มายังไงล่ะ นั่นละคือสิ่งที่ข้าน้อยทำในช่วงนี้"
1600903-40 = "ฮึ นั่นเพราะสั่งสมประสบการณ์มายังไงล่ะ นั่นละคือสิ่งที่ข้าน้อยทำในช่วงนี้"
1600903-41 = "[s] \"นี่ไม่ใช่ว่ากำลังภูมิใจที่แหกกฎนินจาได้อยู่รึไง?!\""
1600903-42 = "โธ่เอ๊ย ช่างเรื่องเล็กน้อยนั่นเถอะ!"
1600903-43 = "ยังไงก็เถอะ อืมมม~ ท่านอาจารย์ ดูจากที่กำลังจะทานมื้อเที่ยงแบบนี้ แสดงว่าจัดการงานเสร็จแล้วสินะ? ดีจังเลย!"
1600903-44 = "[s] \"เปล่า ยังไม่เสร็จดีน่ะ...\""
1600903-45 = "เหตุผลที่ข้าน้อยบอกไว้ว่าจะมาที่นี่วันนี้..."
1600903-46 = "อ๊ะ ไม่สิ อืม... ถ้าเปิดเผยวัตถุประสงค์ตอนนี้ก็คงจะไม่ตื่นเต้นสักเท่าไร อืม... พูดอีกอย่างคือจะรู้สึกจืดชืด น่าเบื่อสินะ..."
1600903-47 = "อืมมม ใช่แล้ว สิ่งที่สำคัญสำหรับนินจาคือจังหวะ... บรรยากาศ... และท่วงทำนองของการบรรยาย ทักษะในการพูดเหมือนกับนักเล่าเรื่อง..."
1600903-48 = "แล้วก็การบุกโจมตีทันที!"
1600903-49 = "[s] \"เห็นได้ชัดเลยว่าข้อสุดท้ายมันไม่เข้ากันเลยน่ะ\""
1600903-50 = "รอเดี๋ยวก่อนนะ ท่านอาจารย์ ข้าน้อยขอเรียบเรียงความคิดสักครู่ก่อน"
1600903-51 = "เพราะงั้นอืมๆ... อืมๆ..."
1600903-52 = "อื้มมม อืมๆ... อืม... ฮึ่ม..."
1600903-53 = "คราวนี้ก็หายใจเข้าลึกๆ... ฮึ่บบบบ!!"
1600903-54 = "แค่กๆๆ แค่กๆๆ...!!"
1600903-55 = "[s] \"นี่ เป็นอะไรรึเปล่า...?\""
1600903-56 = "เดี๋ยวก่อน... มะ...เมื่อกี้มันพลาด แค่พลาดไปน่ะ...! อะ...เอาเป็นว่าข้าน้อยเรียบเรียงได้แล้ว"
1600903-57 = "เอาละ ท่านอาจารย์... ตั้งใจฟังคำที่ข้าน้อยจะพูดให้ดีแล้วอย่าตกใจล่ะ..."
1600903-58 = "ท่านอาจารย์ ข้าน้อยเก็บไว้เป็นความลับจนถึงตอนนี้..."
1600903-59 = "ที่จริงแล้วข้าน้อยน่ะ... ข้าน้อยดำรงตำแหน่งเป็นหัวหน้ากลุ่มนินจาลับที่ชื่อว่าชมรมวิจัยศาสตร์นินจาอยู่..."
1600903-60 = "ที่ผ่านมาข้าน้อยปิดบังมาตลอด ต้องขออภัยท่านอาจารย์ด้วย...! ไม่สิ ข้าน้อยเคยพูดไปแล้ว 2-3 ครั้งนะ...!"
1600903-61 = "[s5] \"อื้อ ว่าแต่ที่เล่นเน็ตทั้งคืนน่ะ มิจิรุ ทำการบ้านเสร็จแล้วใช่มั้ย?\"\n[s6] \"หาาา?! ครูไม่เห็นรู้มาก่อนเลย...!\""
1600903-62 = "เดี๋ยวสิ ทำไมจู่ๆ ถึงเปลี่ยนเรื่องคุยกะทันหันแบบนี้เล่า?!"
1600903-63 = "ตอนนี้เป็นฉากการเปิดเผคยความจริงของ <เด็กสาวแสนสวยที่คิดว่าเป็นคนธรรมดา แต่ที่จริงแล้วเป็น#nหัวหน้ากลุ่มนินจาลับหรอกเหรอ?!> เลยนะ?! "
1600903-64 = "[s7] \"ไม่มีเรื่องอะไรแบบนั้นสักหน่อย แล้วเรื่องการบ้านล่ะว่ายังไง?\""
1600903-65 = "อึ่ก... ยังไม่ลืมเรื่องนั้นอีกเหรอ...!"
1600903-66 = "การบ้าน อืม... เหมือนข้าน้อยจะทำไปแล้ว แต่ก็รู้สึกว่าเหมือนยังทำไม่เสร็จ... คือเรื่องชโรดิงเกอร์..."
1600903-67 = "ยะ...ยังไงก็เถอะ ที่ข้าน้อยพูดเรื่องนั้นขึ้นมาก็เพราะว่า..."
1600903-68 = "วะ...ว้าว ยอมรับทันทีเลย สมกับเป็นท่านอาจารย์จริงๆ!"
1600903-69 = "สมกับเป็นว่าที่สุดยอดนินจาที่ข้าน้อยยอมรับจริงๆ! ท่านจงภูมิใจเสียเถอะ!"
1600903-70 = "[s8] \"อื้ม ระ...รู้สึกหวั่นๆ แฮะ...\""
1600903-71 = "ตอนนี้เป็นฉากการเปิดเผยความจริงของ <เด็กสาวแสนสวยที่คิดว่าเป็นคนธรรมดา แต่ที่จริงแล้วเป็น#nหัวหน้ากลุ่มนินจาลับหรอกเหรอ?!> เลยนะ?! "
1600903-72 = "ที่ข้าน้อยพูดเรื่องนี้ขึ้นมาน่ะ..."
1600903-73 = "เพราะดูเหมือนว่าเมื่อไม่นานมานี้พวกวิดีโอที่มีคอนเซปต์หรือซีนพิเศษๆ จะกลับมาเป็นที่นิยมอีกน่ะสิ"
1600903-74 = "โดยเฉพาะพวกคลิปวิดีโอสั้นๆ น่ะ เพราะงั้นเลยเพิ่มยอดวิวได้ง่าย! "
1600903-75 = "ขนาดข้าน้อยเองยังเผลอนอนดูคลิปวิดีโอพวกนี้ทั้งคืนเลย..."
1600903-76 = "อ๊ะ ไม่ใช่นะ! แน่นอนว่าข้าน้อยเองก็ทำการบ้านด้วย!"
1600903-77 = "แต่ยังไงก็เถอะ ข้าน้อยอยากถ่ายวิดีโอแบบนั้นแล้วโพสต์ลงช่อง <วิถีนินจาสาว มิจิรุจจี้> นะ ท่านอาจารย์!"
1600903-78 = "[s] \"อื้อ แต่ว่าก่อนหน้านั้นพักสักหน่อยไม่ดีกว่าเหรอ...\""
1600903-79 = "ไม่เป็นไรๆ! อ๊ะ ข้าน้อยเตรียมซีนพิเศษๆ มาเพื่อท่านอาจารย์ด้วยนะ!"
1600903-80 = "ซีนที่ท่านอาจารย์พูดว่า <เด็กสาวแสนสวยที่คิดว่าเป็นคนธรรมดา แต่ที่จริงแล้วเป็นหัวหน้ากลุ่มนินจาลับหรอกเหรอ?!> ยังไงล่ะ!"
1600903-81 = "การต่อสู้ในชีวิตประจำวัน... การต่อสู้ระหว่างตระกูลนินจา! โชคชะตาที่พลิกแปรผันมิตรในวันวานให้เป็น#nศัตรูในวันนี้...!"
1600903-82 = "แต่ว่าท่านอาจารย์ไม่ต้องกังวลหรอก~! "
1600903-83 = "เรื่องราวในตอนท้ายหลังจากเอาชนะความวุ่นวายต่างๆ มาได้จะเป็นอย่างไร...?!"
1600903-84 = "ก็นะ ประมาณนี้แหละ เพราะตอนจบน่ะขอเก็บเป็นความลับไว้ก่อน ฮุฮุ... ถ้าวิดีโอนี้ประสบความสำเร็จ#nละก็... ช่อง <วิถีนินจาสาว มิจิรุจจี้> จะต้องมีคนติดตามเยอะขึ้นมากแน่ๆ!"
1600903-85 = "[s] \"พะ...พยายามเข้านะ...!\""
1600903-86 = "เอาละ ถ้างั้นก็ไปกันเถอะ ท่านอาจารย์!"
1600903-87 = "[s] \"เดี๋ยวสิ มิจิรุ ครูยังไม่ได้กินข้าวเที่ยง...\""
1600903-92 = "โธ่เอ๊ย~ เรื่องเล็กน้อยน่ะช่างมันเถอะ! เอาละ เป้าหมายของเรา! เพิ่มคนติดตามให้ได้ 100 คน!"
1600903-94 = "(หลังจากนั้นคุณครูก็ถูกมิจิรุลากออกมาข้างนอกเพื่อถ่ายคลิปวิดีโอ...)"
1600903-95 = "(และแน่นอนว่าคราวนี้ก็ถูกลากออกมาโดยยังไม่ได้กินราเม็งอีกเช่นเคย...)"

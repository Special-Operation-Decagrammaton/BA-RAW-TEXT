1600903-18 = "3;미치루;03;와핫핫핫! 오래 기다리셨소! 소생! 미치루! 이 자리에 등장했소이다!\n#3;ar\n#3;em;[반응]"
1600903-19 = "#st;[0,0];instant;1;"
1600903-20 = "#clearST"
1600903-21 = "3;미치루;03\n#3;closeup\n#wait;1500"
1600903-22 = "[ns1] \"잠깐 미치루, 오래 기다리지도 않았고……!\"\n[ns2] \"오후에 찾아온다고 하지 않았어?! 이제 막 정오…….\""
1600903-23 = "3;미치루;03;닌자란 언제나 예상치 못한 순간에 나타나 앰부쉬 하는 법이라고! 선생 공!\n#3;em;[재잘]\n#3;hophop"
1600903-24 = "3;미치루;03;닌자란 언제나 예상치 못한 순간에 나타나 앰부쉬 하는 법이라고! 선생 공!\n#3;em;[재잘]\n#3;hophop"
1600903-25 = "3;미치루;01;흐흥~ 어때, 지금 나 엄청 닌자 같았지?!"
1600903-26 = "[s] \"……아, 응. 그, 그렇네.\""
1600903-27 = "3;미치루;04;우와아, 엄청나게 내키지 않는다는 미적지근한 반응! 그러면 상처받는다고! 닌자는 예민하니까!\n#3;em;[땀]\n#3;stiff"
1600903-28 = "[s] \"닌자란 생물, 어렵구나……!\""
1600903-29 = "3;미치루;03;우햐햣. 취급 주의 딱지를 붙여 달라고~\n#3;hophop"
1600903-30 = "3;미치루;02;근데, 어라. 선생 공. 오늘 점심도 또 컵라면?\n#3;em;[반응]"
1600903-31 = "3;미치루;01;이런이런, 선생 공- 그런 식으로 컵라면만 먹다간 후회할지도 몰라?"
1600903-32 = "[s] \"후회하다니?\""
1600903-33 = "3;미치루;02;아니, 뭐. 그도 그럴 게 컵라면 같은 인스턴트 식품만 먹다간 영양 밸런스도 깨질 거고. 이게 또 영양이 부족해지니 입안이 헐어 구내염은 생기지. 허리도 아파오지.\n#3;em;[속상함]\n#3;stiff"
1600903-34 = "3;미치루;05;제대로 먹질 못했으니 밤엔 잠도 제대로 못 자고, 잠이 안 오니 또 어쩌겠어?"
1600903-35 = "3;미치루;99;밤새 인터넷의 바다를 헤엄치면서 닌자를 깔보는 악플러 녀석들과 전력을 다한 전자=배틀을 벌이고, 그러다가 짬이 나면 다시 동영상 채널을 들락거리고.\n#3;em;…"
1600903-36 = "3;미치루;06;이러니 당연히 수면의 질은 왕창 Down! 다음 날 아침엔 일어나는 것조차 힘들어진단 말이지?\n#3;stiff"
1600903-37 = "3;미치루;05;인스턴트 식품은 닌자에겐 금기 중의 금기야! 정말로……!\n#3;em;[!]"
1600903-38 = "[s3] \"컵라면, 무섭다……!\"\n[s4] \"그건 그렇고 엄청나게 디테일한 감상이네.\""
1600903-39 = "3;미치루;02;어? 그야 경험담이니까? 요즘 내가 딱 그랬거든.\n#3;em;[반응]"
1600903-40 = "3;미치루;02;어? 그야 경험담이니까? 요즘 내가 딱 그랬거든.\n#3;em;[반응]"
1600903-41 = "[s] \"닌자의 금기를 절찬리에 어기는 중 아냐?!\""
1600903-42 = "3;미치루;03;뭐, 사소한 건 됐고!\n#3;hophop"
1600903-43 = "3;미치루;01;하여간 으음~ 선생 공, 점심을 먹고 있는 걸 보니 업무는 대강 끝난 거구나? 마침 잘 됐다!\n#3;em;[음표]"
1600903-44 = "[s] \"아니, 아직 전부 끝난 건 아니…….\""
1600903-45 = "3;미치루;00;내가 오늘 이렇게 사전에 방문 예고까지 하면서 찾아온 이유가 뭐냐면 말이지.\n#3;em;[재잘]"
1600903-46 = "3;미치루;99;……앗. 아냐. 흐음. 여기서 바로 목적을 밝히는 건 전혀 극적이지도 않고, 으음. 단도직입적으로 말해서 정취가 없는 느낌-이랄까."
1600903-47 = "3;미치루;99;흐으음, 맞아. 닌자에게 중요한 건 템포……. 분위기……. 서사를 얼마나 맛깔나게 풀어내는지. 이야기꾼과도 같은 솜씨…….\n#3;em;…"
1600903-48 = "3;미치루;00;그리고 기습적인 앰부쉬!\n#3;closeup"
1600903-49 = "[s] \"명백하게 마지막만 카테고리가 다르잖아.\""
1600903-50 = "3;미치루;99;잠깐만 기다려줘. 선생 공. 잠시 생각 좀 정리해볼 테니까."
1600903-51 = "3;미치루;99;그러니까, 흠흠. 흐음.\n#3;em;…"
1600903-52 = "3;미치루;01;흐음, 흐음, 흐으으음. 흐읍.\n#3;jump"
1600903-53 = "3;미치루;05;여기서 심호흡을 있는 힘껏 흐읍, 흐으으으으읍!!\n#3;hophop"
1600903-54 = "3;미치루;04;………쿨럭쿨럭쿨럭!!\n#3;stiff"
1600903-55 = "[s] \"……저기, 괘, 괜찮아?\""
1600903-56 = "3;미치루;07;아니! 방금 건 실수! 실수니까! 하, 하여간……! 정리는 끝났어.\n#3;em;[땀]"
1600903-57 = "3;미치루;01;자아, 선생 공…… 지금부터 소생이 하는 말을……. 부디 놀라지 말고 들어주시오……."
1600903-58 = "3;미치루;99;선생 공. 지금까지 비밀로 해왔지만…….\n#3;stiff"
1600903-59 = "3;미치루;05;실은 소생……. 인법연구부라는 은밀한 닌자들의 조직을 이끄는 부장을 맡아오고 있었소…….\n#3;em;…"
1600903-60 = "3;미치루;05;지금까지 숨기고 있어서, 면목이 없소이다……! 아니, 몇 번이나 말했을 수도 있긴 한데!\n#3;closeup"
1600903-61 = "[s5] \"아, 응. 그보다 밤새 인터넷을 했다는 건, 미치루. 숙제는 제대로 했어?\"\n[s6] \"뭣이?! 이제까지 전혀 눈치채지 못했어……!\""
1600903-62 = "3;미치루;04;아니?! 갑자기 화제를 바꿨어?!\n#3;em;[땀]"
1600903-63 = "3;미치루;05;지금 막 <평소 동네에서 자주 마주치던 그저 예쁘기만 하다고 생각했던 소녀가 실은 알고 보니 전설적인 닌자 조직의 수장?!>이라는 설정으로 일생일대의 비밀이 밝혀지는 씬이잖아?!\n#3;hophop"
1600903-64 = "[s7] \"그런 복선 같은 거 전혀 없었고, 그래서 숙제는?\""
1600903-65 = "3;미치루;04;윽, 그냥 넘어가 주지 않는 건가……!\n#3;stiff"
1600903-66 = "3;미치루;07;숙제는, 음……. 한 것 같은데, 또 그게 하지 않은 것 같기도 하고……. 그야말로 슈뢰딩거…….\n#3;em;…"
1600903-67 = "3;미치루;07;하, 하여간 갑자기 내가 왜 이런 말을 꺼냈냐면……\n#3;hophop"
1600903-68 = "3;미치루;03;우냐핫! 이걸 받아 주다니 역시 선생 공이라니까!\n#3;em;[재잘]"
1600903-69 = "3;미치루;03;역시 내가 인정한 차기 상급 닌자의 새싹다워! 자랑스럽게 어깨를 펴도 돼!\n#3;hophop"
1600903-70 = "[s8] \"으음, 화, 황공합니다?\""
1600903-71 = "3;미치루;00;그보다 방금 말한 거 <평소 동네에서 자주 마주치던 그저 예쁘기만 하다고 생각했던 소녀가 실은 알고 보니 전설적인 닌자 조직의 수장?!>이라는 설정의 이야기거든?"
1600903-72 = "3;미치루;03;내가 왜 갑자기 이런 소리를 했냐면 말이지.\n#3;em;…"
1600903-73 = "3;미치루;01;최근엔 이렇게 특이한 설정과 컨셉을 가진 영상이 또 무진장 먹히는 모양이야."
1600903-74 = "3;미치루;00;특히 분량은 짧은 녀석으로 말이지! 그래야 조회수가 늘기 쉬운 것 같으니까!\n#3;em;[반응]"
1600903-75 = "3;미치루;03;간밤에 이런 동영상들을 챙겨보느라 나도 모르게 밤을 새버렸을 정도……"
1600903-76 = "3;미치루;07;가, 아니라! 무, 물론 숙제도 했지만!\n#3;em;[땀]\n#3;hophop"
1600903-77 = "3;미치루;01;하여간 <소녀인법첩 미치룻치>에서도 그런 영상을 찍고 싶어! 선생 공!"
1600903-78 = "[s] \"으음, 그전에 한숨 자는 편이 좋지 않을까…….\""
1600903-79 = "3;미치루;00;괜찮아! 괜찮아! 아, 물론 선생 공을 위한 설정도 빈틈없이 준비했으니까!\n#3;em;[반짝]"
1600903-80 = "3;미치루;99;선생 공은 <평소 근처에 살고 있는 귀여운 여자아이를 지켜보고 있다……고 생각했지만, 실은 몰래 감시하고 있던 적대 닌자 조직의 멤버>란 설정이야!"
1600903-81 = "3;미치루;05;일상에서 벌어지는 전투……. 닌자 가문 사이에서 벌어지는 싸움! 어제는 함께 했지만, 오늘은 싸울 수밖에 없는 운명……!\n#3;m2\n#3;em;[!]\n#3;hophop"
1600903-82 = "3;미치루;00;하지만 걱정하지 마시라~! \n#3;m4\n#3;hophop"
1600903-83 = "3;미치루;06;수많은 아수라장을 극복한 끝에- 마지막에 이르러서 무려 두 사람은……?!\n#3;em;[///]\n#3;stiff"
1600903-84 = "3;미치루;03;라는 느낌으로, 뭐, 엔딩은 비밀이지만. 후후……. 이 콘텐츠가 성공하면 <소녀인법첩 미치룻치>의 구독자도 엄청 늘어날 거야!\n#3;em;[반응]\n#3;m3"
1600903-85 = "[s] \"그, 히, 힘내……!\""
1600903-86 = "3;미치루;03;자, 그럼 가자! 선생 공!\n#3;m3\n#3;em;[음표]\n#3;hophop"
1600903-87 = "[s] \"잠깐. 미치루, 나 아직 점심을…….\""

[translation]
1600903-1 = "忍者少女不會停下腳步"
1600903-2 = "（到了正中午──）"
1600903-6 = "[ns]「趁現在快點吃午餐吧……」"
1600903-8 = "[ns]「現在只要等3分鐘……」"
1600903-10 = "（就在我靜靜等待杯麵泡好的時候……）"
1600903-18 = "讓你久等了！老師大人！三千留，參上！"
1600903-22 = "[ns1]「咦，還真早。」\n[ns2]「你不是說下午才會來嗎？」"
1600903-23 = "忍者就是要隨時出人意料，老師大人！"
1600903-24 = "忍者就是要隨時出人意料，老師大人！"
1600903-25 = "如何，我剛剛那樣很忍者對吧！？"
1600903-26 = "[s]「大概吧……？」"
1600903-27 = "哇，反應不上不下！我有點受傷了！忍者是很敏感的！"
1600903-28 = "[s]「忍者這種生物，還真難懂……！」"
1600903-29 = "哈，看來你最好貼個「小心對待」的標籤！"
1600903-30 = "咦？老師大人。你今天午餐又吃杯麵喔？"
1600903-31 = "老是吃杯麵將來可是會後悔的喔？"
1600903-32 = "[s]「後悔……？」"
1600903-33 = "沒錯。只吃杯麵會造成營養失衡，有害健康。也會容易引起口內炎。"
1600903-34 = "而且晚上也會睡不好……"
1600903-35 = "一旦變成那樣，就只能漫遊網路大海一整晚，和看不起忍者的酸民鬥嘴，或是瀏覽各種頻道的影片荒度時間……"
1600903-36 = "造成睡眠品質大幅下滑，隔天早上一定會感到後悔。"
1600903-37 = "因此速食食品對忍者而言可說是禁忌！"
1600903-38 = "[s3]「杯麵真可怕……！」\n[s4]「怎麼你的感想好多細節啊。」"
1600903-39 = "因為是我的親身經驗。像今天早上就有夠想睡……"
1600903-40 = "因為是我的親身經驗。像今天早上就有夠想睡……"
1600903-41 = "[s]「這不是禁忌嗎！？」"
1600903-42 = "別在意那些小事！"
1600903-43 = "總之既然老師大人在吃午餐，代表工作已經結束了對吧！？"
1600903-44 = "[s]「不，其實還有很多……」"
1600903-45 = "讓我來告訴你，為什麼我今天會先作預告才現身。"
1600903-46 = "……不對，還是先不要說好了。感覺說出來會少了一些樂趣。再拖久一點比較好。"
1600903-47 = "是啊，我差點忘了……對忍者來說，重要的是節奏，氣氛，話術，"
1600903-48 = "還有埋伏！"
1600903-49 = "[s]「感覺最後一個不太對啊！」"
1600903-50 = "請老師大人稍等一下。我要整理一下思緒。"
1600903-51 = "嗯……"
1600903-52 = "嗯嗯嗯嗯嗯……"
1600903-53 = "總之先深呼吸，吸────────────"
1600903-54 = "………咳咳咳咳咳咳！！"
1600903-55 = "[s]「……沒事吧？」"
1600903-56 = "剛，剛剛的不算！不算！總之……我整理好思緒了。"
1600903-57 = "老師大人……你聽了可別嚇到了。"
1600903-58 = "這個祕密我已經隱瞞很久了……"
1600903-59 = "其實我……是生於黑暗的眾忍者所隸屬的組織──「忍術研究部」的部長。"
1600903-60 = "對不起，我一直隱瞞到現在……！"
1600903-61 = "[s5]「話說三千留，你剛剛說『一整晚都在上網』……」\n[s6]「什麼！？我一直都沒有察覺到啊……！」"
1600903-62 = "怎麼突然改變話題！？"
1600903-63 = "這不是「住在附近的美少女，其實是傳奇組織的首領」，這種熱血設定嗎！？"
1600903-64 = "[s7]「這我就不知道了……不過你一整晚都在上網，作業有寫完嗎？」"
1600903-65 = "呃，呼嚨不過去……！"
1600903-66 = "作業喔，呃……好像有寫，又好像沒寫，就像是薛丁格……"
1600903-67 = "反，反正別閒聊了！！總之為什麼我會談到這些呢……"
1600903-68 = "哼哼，居然懂得配合我，真不愧是老師大人！"
1600903-69 = "根本就能挑戰成為中忍了！感到驕傲吧！"
1600903-70 = "[s8]「喔，喔喔……誠惶誠恐？」"
1600903-71 = "然後我現在所做的，就是「住在附近的美少女，其實是傳奇組織的首領」，這種設定。"
1600903-72 = "而我為什麼會突然提到這些呢……"
1600903-73 = "是因為要延續上次製作影片的話題！最近的觀眾們對都會要求影片要有「理念」。"
1600903-74 = "然後製作的若是短片，聽說也會比較容易提升觀看次數！"
1600903-75 = "所以我昨晚，便熬夜看了各種不同理念的影片……"
1600903-76 = "啊，作業當然也有寫好了！"
1600903-77 = "總之，我也想在「少女忍法帖 小小三千留」拍那種影片！"
1600903-78 = "[s]「在那之前先去睡一下比較好吧……」"
1600903-79 = "沒問題沒問題！啊，老師大人的角色設定當然也已經決定好了！"
1600903-80 = "老師大人的設定是「暖暖守望住家附近的美少女……但其實是暗中進行監視的敵對忍者組織成員」！"
1600903-81 = "日常生活瞬間變成，忍者組織間的鬥爭……昨天明明還併肩同行，今天卻必須互相廝殺的命運……！"
1600903-82 = "但是不用擔心！"
1600903-83 = "跨越了眾多生死之後，兩人竟然……！？"
1600903-84 = "結局就先不爆雷了。不過，哼哼哼……如果這個項目能成功，「少女忍法帖 小小三千留」的訂閱人數一定會暴增！"
1600903-85 = "[s]「加，加油吧……！」"
1600903-86 = "總之我們開始吧！老師大人！"
1600903-87 = "[s]「等等，三千留，先讓我吃午餐……」"
1600903-92 = "好了，忍者可不等人的！目標要讓訂閱人數變成100人！"
1600903-94 = "（於是三千留就帶著我跑到外面，一起拍攝忍者相關影片……）"
1600903-95 = "（這次的杯麵，泡到了驚為天人的程度）"

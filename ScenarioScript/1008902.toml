[translation]
1008902-1 = "ชุดเดรสที่แขวนไว้"
1008902-2 = "(คุณครูไปที่สำนักงานหน่วยรับจ้างสารพัดเพราะกังวลว่าจะมีเรื่องอะไรเกิดขึ้น)"
1008902-8 = "[ns1] \"ประตูเปิดอยู่แฮะ...\"\n[ns2] \"มีใครอยู่มั้ย~?\""
1008902-11 = "หืม...? คุณครู?"
1008902-16 = "มีเรื่องอะไรเหรอ? หรือว่าวันนี้มีนัดอะไรกับพวกเรา?"
1008902-17 = "ไม่สิ จะเป็นแบบนั้นไปได้ยังไง ฉันจำตารางงานได้หมดเลยนะ..."
1008902-18 = "หืม? ไม่ได้มาเพราะมีนัดเหรอ?"
1008902-19 = "แค่แวะมาเฉยๆ...?"
1008902-20 = "กะ... ก็... ไม่ใช่ว่าจะมาไม่ได้หรอก! ตอนนี้ฉันเองก็ไม่ได้ติดงานอะไรอยู่..."
1008902-21 = "คิดว่านี่เป็นงานที่ทำให้ความสัมพันธ์ทางธุรกิจของเราแน่นแฟ้นขึ้นแล้วกัน เข้ามาสิ คุณครู"
1008902-30 = "นี่... คุณครู"
1008902-31 = "แค่แวะมาเฉยๆ จริงเหรอ? คุณครูไม่น่ามาโดยไม่มีเหตุผลนะ..."
1008902-32 = "แวะมาเพราะมีเรื่องบางอย่างใช่มั้ย...?"
1008902-36 = "บอกฉันมาตามตรงได้เลย เพราะความสัมพันธ์ระหว่างคุณครูกับฉันน่ะ เราไม่จำเป็นต้องประดิษฐ์คำพูด หรือแสร้งทำอะไรอยู่แล้ว"
1008902-37 = "หืม...?"
1008902-38 = "MOMOTALK ที่ฉันส่งไปตอนเช้าเหรอ...?"
1008902-42 = "อ่า..."
1008902-46 = "อ๋อ... ปะ... เป็นอย่างนี้นี่เอง อืม... ฉันไปทำให้คุณครูกังวลโดยใช่เหตุหรือเปล่าเนี่ย..."
1008902-47 = "นะ... นั่นไม่ใช่เรื่องใหญ่อะไรแท้ๆ... แต่ถ้าจะให้ฉันอธิบาย ฉันว่ามันก็น่าอายนิดหน่อย..."
1008902-48 = "หืม...?"
1008902-49 = "เป็นอะไรไปเหรอคุณครู?"
1008902-50 = "อ่า... อันนั้นน่ะเหรอ...?"
1008902-55 = "[ns3] \"หืม...? เหมือนตกแต่งชุดขึ้นใหม่เลยนะ\"\n[ns4] \"ดูสะอาดจัง หลังจากงานนั้นก็ไม่ได้ใส่เลยเหรอ?\""
1008902-58 = "อะ... อืม... "
1008902-59 = "กะ... ก็ใช่ แต่ว่ามัน..."
1008902-60 = "จะว่ายังไงดีล่ะ ฉันกังวลหลายเรื่องเลยน่ะ ไหนจะเรื่องที่เกิดขึ้นเมื่อคราวก่อนด้วย..."
1008902-65 = "จริงๆ เรื่องที่คิดว่าอยากปรึกษาด้วยเมื่อตอนเช้าก็เป็นเรื่องนี้เหมือนกัน กลายเป็นว่าได้มาคุยตอนนี้แล้ว#nสินะ"
1008902-66 = "[s5] \"เรื่องอยากปรึกษา...?\"\n[s6] \"ปรึกษาเรื่องชุดนั้นเหรอ?\""
1008902-69 = "อืม..."
1008902-70 = "ฉันตั้งใจซื้อชุดนี้มาตอนทำภารกิจครั้งที่แล้ว แต่พอจะใส่เข้าจริงๆ ก็ไม่แน่ใจเลย"
1008902-71 = "เพราะว่า... ถึงจะใส่ชุดนั้น แต่ก็เหมือนว่าไม่ได้ทำให้อะไรเปลี่ยนไปเท่าไร"
1008902-72 = "ต้องบอกว่ามันไม่ได้ส่งผลกับงาน แต่แค่พอทำให้เปลี่ยนบรรยากาศได้บ้างน่ะ..."
1008902-73 = "เฮ้อ... "
1008902-74 = "เอาชุดไปขายแล้วเอาเงินนั้นมาสมทบค่าใช้จ่ายของหน่วยรับจ้างสารพัดดีกว่ามั้ย?"
1008902-75 = "น่าจะขายได้ราคาดีเลยด้วย..."
1008902-76 = "แต่พอคิดแบบนั้น... ฉันก็เอาแต่ถามตัวเองว่านั่นเป็นความคิดที่ดีจริงๆ เหรอ..."
1008902-77 = "แล้วก็อยากรู้ว่าถ้าเป็นคุณครูจะตอบว่ายังไง ฉันก็เลยกะว่าจะเก็บไว้ถามวันที่คุณครูมีเวลาน่ะ"
1008902-78 = "ถึงได้ส่ง MOMOTALK ไปหาตอนเช้าน่ะ เรื่องมันก็เป็นอย่างนี้ละ"
1008902-79 = "ไม่มีอะไรอื่นหรอก..."
1008902-80 = "หืม...?"
1008902-81 = "'แค่ทำให้เปลี่ยนบรรยากาศได้บ้าง' ก็เพียงพอแล้วงั้นเหรอ? แล้วก็น่าเสียดายถ้าฉันจะขายทิ้งด้วย?"
1008902-82 = "'ที่ซื้อมาก็เพราะชอบชุดนั้นไม่ใช่เหรอ' งั้นเหรอ?"
1008902-83 = "กะ... ก็ ก็ต้องชอบอยู่แล้วสิ ฉันเป็นคนเลือกเองกับมือเลยนะ..."
1008902-84 = "แต่ว่าตอนนี้มันไม่มีประโยชน์แล้วนี่ ตอนนี้สิ่งที่สำคัญกว่าเสื้อผ้า... คือการบริหารหน่วยรับจ้างสารพัด#nต่างหาก"
1008902-85 = "ถึงฉันจะแอบเสียดายอยู่สักหน่อยก็เถอะ"
1008902-86 = "หืม...?"
1008902-87 = "ฉันเคยลองคิดหรือเปล่าว่าถ้าใส่ชุดนั้นแล้วอยากทำอะไรบ้างน่ะเหรอ?"
1008902-88 = "อืม... มะ... ไม่เคยคิดเลย... นั่นสินะ..."
1008902-89 = "หืม...?  "
1008902-90 = "แบบนั้นยิ่งไม่ควรขายชุดงั้นเหรอ? ทำไมล่ะ...?"
1008902-91 = "แต่ว่าฉันคงไม่ได้มีธุระอะไรที่จะต้องใส่ชุดนี้แล้ว..."
1008902-92 = "[s7] \"ถ้าบังคับตัวเองให้คิด ก็จะยิ่งคิดไม่ออกนะ\"\n[s8] \"ไม่ต้องหาวันที่จะใส่หรอก เดี๋ยววันที่ต้องใส่จะมาหาเราเอง\""
1008902-95 = "...?!!!"
1008902-96 = "หะ... หืม? งั้น... เหรอ...?"
1008902-97 = "หมายความว่ายังไงนะ..."
1008902-98 = "เหมือนจะเข้าใจ... แต่ก็เหมือนจะไม่เข้าใจเลย..."
1008902-102 = "ฮุฮุ..."
1008902-103 = "แต่ก็ได้ ยังไงคำตอบของคุณครูก็คือ 'ให้เก็บชุดไว้ก่อน' สินะ"
1008902-107 = "ฉันจะรับความคิดเห็นนั้นไว้แล้วกัน ส่วนเรื่องขายเอาเป็นว่าเลื่อนไปก่อน"
1008902-108 = "เฮ้อ..."
1008902-109 = "ถึงจะไม่ค่อยเข้าใจเหตุผลเท่าไร และถึงจะคลี่คลายอะไรไม่ได้ แต่กลับรู้สึกเบาใจขึ้นอย่าง#nประหลาดเลย"
1008902-110 = "นั่นสินะ... สมแล้วที่เป็นคุณครู"
1008902-111 = "หรือว่าเป็นเพราะคำพูดของคุณครูมากกว่านะ...? ไม่ใช่แบบนั้นหรอกเหรอ?"
1008902-112 = "ฮุฮุ..."
1008902-113 = "ถ้ารู้ว่าจะเป็นแบบนี้ ฉันถามไปตั้งแต่ที่ส่ง MOMOTALK ไปก็ดี"
1008902-117 = "อืม..."
1008902-118 = "[s9] \"อารุ...?\"\n[s10] \"เป็นอะไรไปเหรอ?\""
1008902-121 = "ไม่หรอก..."
1008902-122 = "ที่พูดไปเมื่อกี้ขอยกเลิกนะ"
1008902-123 = "เราควรได้หารือกันซึ่งๆ หน้ามากกว่าการส่งข้อความหรือโทรศัพท์ แบบนั้นจะเป็นการหารือที่มี#nประสิทธิภาพมากกว่าน่ะ"
1008902-124 = "ฮุฮุ..."
1008902-125 = "เพราะงั้นไว้ต่อไป..."
1008902-126 = "ถ้ามีเรื่องอะไร..."
1008902-132 = "ฉันก็อยากให้คุณครูมาหาฉัน 'ด้วยตัวเอง' แล้วมาหารือกันซึ่งๆ หน้าอีกนะ"

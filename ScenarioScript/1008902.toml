[translation]
1008902-1 = "高掛的禮服"
1008902-2 = "（因為擔心是不是發生了什麼事情，所以去了便利屋）"
1008902-8 = "[ns1]「……咦，門開著耶。」\n[ns2]「有人在嗎～？」"
1008902-11 = "……嗯？老師？"
1008902-16 = "怎麼了？今天和我們有約嗎？"
1008902-17 = "不，應該沒有才對，行程我都記得啊……"
1008902-18 = "嗯？你說不是？"
1008902-19 = "……只是來晃晃？"
1008902-20 = "唔，唔……當然也不是不行！#n正好我現在也沒什麼事……"
1008902-21 = "就當作是鞏固一下合作關係吧？請進，老師。"
1008902-30 = "……那個，老師？"
1008902-31 = "你真的只是來晃晃的嗎？#n我認識的老師應該不會那麼做才對……"
1008902-32 = "果然是有什麼原因吧……？"
1008902-36 = "不用顧慮太多，直接說出來吧。#n我們之間不需要遮遮掩掩的。"
1008902-37 = "……嗯？"
1008902-38 = "早上傳的MomoTalk……？"
1008902-42 = "……啊。"
1008902-46 = "啊……原，原來是這樣啊。#n果然讓你白白掛心了呢……"
1008902-47 = "其，其實真的不是什麼大不了的事。#n要我特別拿出來說明，好像反而更不好意思……"
1008902-48 = "……嗯？"
1008902-49 = "怎麼了嗎，老師？"
1008902-50 = "啊……那個？"
1008902-55 = "[ns3]「……嗯，變得像裝飾一樣呢。」\n[ns4]「真乾淨，從那以後都沒有穿過嗎？」"
1008902-58 = "嗯，嗯……"
1008902-59 = "是，是啊。#n該怎麼說呢……"
1008902-60 = "不知為何，包含上次的事在內，許多事情都讓人很在意……"
1008902-65 = "其實早上想跟老師商量的也是那件事。#n話題不知不覺就連接起來了呢。"
1008902-66 = "[s5]「商量……？」\n[s6]「是關於那件禮服的事嗎？」"
1008902-69 = "嗯……"
1008902-70 = "雖然上次委託的時候，憑藉氣勢拿到東西是還不錯，#n不過等到真的需要的時候，卻不知道該怎麼利用才好。"
1008902-71 = "想不到……就算穿著那件禮服，事情也不會有多大的變化。"
1008902-72 = "或者應該說，它的用途也只有偶爾營造一下氣氛而已……"
1008902-73 = "唉……"
1008902-74 = "是不是應該乾脆把它賣了，把錢用在便利屋的經營比較好呢？"
1008902-75 = "……畢竟它確實挺值錢的。"
1008902-76 = "可是一這麼想……又不知道這到底是不是個好主意……"
1008902-77 = "所以才想知道，如果換作是老師會怎麼處理。"
1008902-78 = "早上的MomoTalk就只是這樣而已。"
1008902-79 = "……這樣的回答還滿意嗎？"
1008902-80 = "……嗯？"
1008902-81 = "……「偶爾營造一下氣氛」就已經夠了？#n賣掉好像有點可惜？"
1008902-82 = "我不是很喜歡這件禮服嗎？"
1008902-83 = "我，我當然很喜歡。畢竟是自己挑的嘛……"
1008902-84 = "可是現在也沒有其他辦法。#n比起禮服這種東西……我們便利屋的經營更重要。"
1008902-85 = "……雖然確實有點可惜。"
1008902-86 = "……嗯？"
1008902-87 = "有沒有具體想過穿上禮服後想做什麼事？"
1008902-88 = "這，這個嘛……還，還沒有……？"
1008902-89 = "……嗯？"
1008902-90 = "那就更不應該賣掉了……為什麼呢？"
1008902-91 = "如果連要用在哪裡都想不到的話，不是更應該……"
1008902-92 = "[s7]「不必勉強自己去想，答案遲早會自己出現的。」\n[s8]「不應該為衣服尋找穿的時機，而是應該根據場合挑選衣服。」"
1008902-95 = "……？？？？"
1008902-96 = "唔，唔嗯……？是……嗎……？"
1008902-97 = "老師的意思……"
1008902-98 = "我好像稍微能夠理解……卻又好像不太懂……"
1008902-102 = "……呵呵。"
1008902-103 = "算了，沒關係。#n總之老師的意見是「暫時先留著」沒錯吧。"
1008902-107 = "我會好好考慮的。#n有關賣掉禮服的事就暫時先這樣吧。"
1008902-108 = "……呼！"
1008902-109 = "雖然不知道為什麼……明明什麼都沒解決，心裡卻感覺舒服多了。"
1008902-110 = "……不愧是老師。"
1008902-111 = "因為是老師說的話……才會這樣的嗎？"
1008902-112 = "呵呵……"
1008902-113 = "如果早知道會這樣，之前傳MomoTalk時候就應該直接問老師才對。"
1008902-117 = "唔嗯……"
1008902-118 = "[s9]「……亞瑠？」\n[s10]「怎麼了？」"
1008902-121 = "……不。"
1008902-122 = "我收回剛才那句話。"
1008902-123 = "比起用訊息或是電話，果然還是面對面討論更適合吧？#n畢竟談話的品質完全不同。"
1008902-124 = "……呵呵。"
1008902-125 = "所以之後……"
1008902-126 = "如果有什麼事情……"
1008902-132 = "可以常常過來「直接」討論哦，老師。"

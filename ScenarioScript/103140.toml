[translation]
103140-1 = "Episode 14;Rush"
103140-5 = "The front of Utnapishtim has penetrated the outer wall of the Ark of Atrahasis and pierced its wall."
103140-6 = "From a distance, it probably looks like an apple with a toothpick stuck in it..."
103140-7 = "*sigh* ...Th-That was way too rough..."
103140-8 = "Is everyone okay? Please report on our current status."
103140-9 = "The multidimensional analysis system is fine. However, it seems the core system was damaged when it collided with the Ark."
103140-11 = "The engines are down... We're unable to restart them."
103140-12 = "The main control system is also inoperable..."
103140-13 = "The communication system is down throughout the entire ship, and the calculation system is malfunctioning..."
103140-19 = "Wh-What's that?!"
103140-20 = "A-Argh?! Enemies! Enemies are swarming towards us!"
103140-31 = "East, west, above... They're coming from all sides!"
103140-32 = "Not that we weren't expecting it, but the response was so immediate. They must have been prepared for this."
103140-33 = "It appears we have fallen in the middle of the enemy's stronghold..."
103140-34 = "We can't let them destroy the ship or everything's over for us! Whoever can fight needs to go defend the ship, now!"
103140-35 = "People who can fight... Uh..."
103140-37 = "Heh! So it's finally our time to shine!"
103140-45 = "Hoshino!"
103140-46 = "Abydos, reporting for duty! We're ready at any time!"
103140-47 = "Yes! I have your back! We have to go defend the eastern passage!"
103140-48 = "Sounds perfect. Let's go, kiddos."
103140-49 = "Let's do this!"
103140-55 = "Heeheehee. We'll take care of things here."
103140-56 = "That was crazy... I'm gonna be sick..."
103140-58 = "*sigh* ...Again... Why am I here...?"
103140-59 = "The Gourmet Research Society...! When...?"
103140-61 = "Heeheehee. I don't know the details, but you need someone to fight, right?"
103140-62 = "And fight we will! The Gourmet Research Society never flees from those who disrupt our search for the pinnacle of taste."
103140-63 = "Yup! The journey to taste space food begins now!"
103140-65 = "(...You're never gonna eat any of that here.)"
103140-66 = "*sigh* ...I guess we don't exactly have anyone else to turn to."
103140-67 = "Engage the enemy! I'll be supporting you!"
103140-68 = "Heehee. Thank you, Ako."
103140-69 = "Shall we begin? ★"
103140-75 = "W-We'll defend this place no matter what...!"
103140-76 = "The Game Development Department?! Wh-When did you...?!"
103140-77 = "While Aris is asleep, we'll do everything we can to help!"
103140-78 = "Yes. With us and Sensei, things will work out!"
103140-80 = "...Ugh. Okay! I'll keep you safe from behind, so don't be too reckless!"
103140-81 = "Heehee! We have nothing to worry about if you're helping us, Yuuka! Let's go!"
103140-82 = "I'm looking forward to working with you!"
103140-83 = "W-We can do this! I believe in us!"
103140-85 = "Sensei, then please lead the defense of Utnapishtim's Ship!"
103140-92 = "[ns] \"I'm counting on everyone. Abydos, Millennium, Gehenna! Let's go!\""

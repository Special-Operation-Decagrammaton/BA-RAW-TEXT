[translation]
103140-1 = "第14話;突入"
103140-5 = "我們現在處於將半顆頭埋入方舟外壁的狀態。"
103140-6 = "從遠處觀測的話，也許就像牙籤插在蘋果上一樣……"
103140-7 = "哈啊……累，累死了～"
103140-8 = "大家都還好嗎？請報告狀況。"
103140-9 = "多次元詮釋系統沒有問題。#n但中樞系統似乎因碰撞受到了傷害。"
103140-11 = "引擎完全處於停擺狀態……重啟程式也無法作用……"
103140-12 = "主控制系統也無法正常運作了呢……"
103140-13 = "各區域的通訊也出現異常……此外，演算系統也破破爛爛的了。"
103140-19 = "怎，怎麼了！？"
103140-20 = "嗚哇，那不是聖所出現過的敵人嗎！？#n往這裡來了！"
103140-31 = "等等……敵人從四面八方過來了！"
103140-32 = "雖然有預料到這種情況，沒想到會這麼快……！？#n簡直，就像在等著我們一樣……"
103140-33 = "畢竟我們……就在敵方的大本營啊……"
103140-34 = "得想辦法擋住他們才行……如果船被破壞，我們就沒戲唱了。#n有能夠戰鬥的人嗎？"
103140-35 = "也，也對！能夠戰鬥的人……"
103140-37 = "唔嘿～輪到大叔們出場了嗎？"
103140-45 = "……星野前輩！"
103140-46 = "嗯嗯，準備好了唷！隨時都能出動！"
103140-47 = "嗯！那麼我來負責支援！#n請前輩們防衛東邊的通道！"
103140-48 = "那我們出發吧～"
103140-49 = "上吧！！"
103140-55 = "呵呵。那麼這邊就交給我們吧。"
103140-56 = "嗚嗚……頭好暈啊。"
103140-58 = "為什麼我又……唉……"
103140-59 = "美食研究會……是在什麼時候？"
103140-61 = "雖然不清楚詳細情況，總之只要在這邊咚哐★就行了吧？"
103140-62 = "沒錯。我們美食研究會……從來不會逃避試圖妨礙探求的對象。"
103140-63 = "沒錯！享受宇宙美食的旅程才剛剛開始呀！"
103140-65 = "（這趟旅程應該不會結束吧……）"
103140-66 = "唉……畢竟現在非常需要幫忙，"
103140-67 = "出發吧。#n我會負責支援的。"
103140-68 = "謝謝你，亞子同學。"
103140-69 = "那就開始吧★"
103140-75 = "這，這邊由我們來保護……"
103140-76 = "遊戲開發部！？什，什麼時候到那裡去了？"
103140-77 = "那個……愛麗絲醬雖然還在睡覺，不過我們也想幫忙……"
103140-78 = "沒錯！有我們跟老師在的話，總會有辦法的！"
103140-80 = "……我，我知道了！#n我會負責支援，千萬別亂來唷？"
103140-81 = "有優香支援的話，我們就無敵了吧？#n好，要上囉～！！"
103140-82 = "是，拜託你了！"
103140-83 = "走，走吧……！我們一起加油……！"
103140-85 = "那麼老師。#n「生命守護者本艦」防衛戰，麻煩老師進行總指揮！"
103140-92 = "[ns]「對策委員會、遊戲開發部、美食研究會的大家……上吧！！」"

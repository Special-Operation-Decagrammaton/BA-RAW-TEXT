[translation]
103140-1 = "ตอนที่ 14;เข้าสู่สงคราม"
103140-5 = "ตอนนี้...... ด้านหน้าของเรือรบอุตนาพิชทิมทะลุผนังด้านนอกของเรืออะทราฮาซิสเข้ามาแล้วค่ะ"
103140-6 = "ถ้ามองจากไกลๆ คงจะเป็นเหมือนไม้จิ้มฟันที่เสียบผลแอปเปิลอยู่นะคะ......"
103140-7 = "เฮ้อ พะ... เพลียร่างจัง......"
103140-8 = "ทุกคนเป็นยังไงบ้างคะ? ช่วยรายงานสถานการณ์ด้วยค่ะ"
103140-9 = "ระบบวิเคราะห์พหุมิติปลอดภัยดีค่ะ แต่ระหว่างชนเข้ากับเรือ เหมือนว่าระบบส่วนกลางจะได้รับ#nความเสียหายนะคะ"
103140-11 = "ตอนนี้เครื่องยนต์ดับ...... ส่วนวงจรคำสั่งเดินเครื่องใหม่ก็ไม่ทำงานค่ะ......"
103140-12 = "ระบบควบคุมส่วนกลางก็เป็นอัมพาตค่ะ......"
103140-13 = "ระบบสื่อสารของแต่ละโซนก็เสีย ระบบคำนวณก็ติดขัด......"
103140-19 = "อะ... อะไรคะเนี่ย?!"
103140-20 = "อะ... อ๊ากก!! ศัตรู! พวกศัตรูกำลังมุ่งหน้ามาทางนี้แล้ว!!"
103140-31 = "ทั้งทางตะวันออก ตะวันตก แล้วก็ทางเหนือ... เข้ามาทุกทิศทุกทางเลย!"
103140-32 = "ถึงจะคาดไว้แล้วก็เถอะ แต่ทำไมถึงมาเร็วขนาดนี้...?!  เหมือนกับเตรียมตัวไว้แล้วอย่างนั้นเลย...?"
103140-33 = "ก็พวกเราอยู่กลางถิ่นของศัตรูเลยนี่นา..."
103140-34 = "ต้องขวางไว้ให้ได้! ถ้าเรือพังเมื่อไรละก็พวกเราจบเห่แน่! เราต้องส่งคนที่พร้อมปะทะออกไปสกัดไว้#nตอนนี้เลย!"
103140-35 = "คะ... คนที่พร้อมออกไปปะทะ... อ่า... ใครบ้างนะ..."
103140-37 = "แหะๆ~ ได้เวลาพวกเราออกโรงแล้วสินะ~"
103140-45 = "รุ่นพี่โฮชิโนะ!!"
103140-46 = "อื้ม พวกฉันพร้อมแล้วค่ะ! เรียกระดมพลได้ทุกเมื่อเลยค่ะ!"
103140-47 = "ค่ะ! ฉันจะซัพพอร์ตให้เองค่ะ! ทางเดินฝั่งทิศตะวันออก!!  เราต้องไปสกัดทางฝั่งนั้นค่ะ!"
103140-48 = "ดีละ~ งั้นไปกันเลย"
103140-49 = "ลุยเลย!!"
103140-55 = "ฮุฮุฮุ ถ้างั้นทางนี้พวกฉันจะจัดการให้เองค่ะ"
103140-56 = "มะ...... เมาเรืออ่ะ"
103140-58 = "เฮ้อ...... ทำไมต้องเป็นฉันด้วย......"
103140-59 = "ชมรมชิมอาหาร......! มากันตอนไหนเนี่ย?"
103140-61 = "ฮุฮุฮุ ฉันไม่รู้รายละเอียดหรอกค่ะ แต่เอาเป็นว่า แค่ทำให้ระเบิดตู้มต้าม★ก็พอแล้วใช่ไหมคะ?"
103140-62 = "ใช่ค่ะ พวกเราชาวชมรมชิมอาหารไม่เคยปล่อยให้ใครที่มาขัดขวางการแสวงหาอาหารรสเลิศหนีรอด#nไปได้เด็ดขาดค่ะ"
103140-63 = "ใช่! การเดินทางเพื่อลิ้มรสอาหารในอวกาศมันเพิ่งจะเริ่มเท่านั้น!!"
103140-65 = "(...... ไม่น่าจะได้กินอาหารแบบนั้นกันหรอกนะคะ)"
103140-66 = "เฮ้อ...... แต่ก็เอาเถอะ ในเมื่อตอนนี้เราต้องการกำลังเสริมมาช่วย......"
103140-67 = "ลุยเลยค่ะ ฉันจะซัพพอร์ตให้เองค่ะ"
103140-68 = "ฮุฮุฮุ ขอบคุณค่ะ คุณอาโกะ"
103140-69 = "งั้นก็มาเริ่มกันเลยไหมคะ★"
103140-75 = "พะ... พวกฉันจะตั้งรับฝั่งนี้ให้เองค่ะ......"
103140-76 = "ชมรมพัฒนาเกม?! ปะ... ไปอยู่ตรงนั้นตั้งแต่เมื่อไรกันน่ะ......?!"
103140-77 = "ค่ะ พวกฉันอยากมีส่วนช่วยบ้างน่ะค่ะ อย่างน้อยก็ยังดีค่ะ...... ถึงอาริสึจังจะยังนอนอยู่ก็เถอะ"
103140-78 = "ใช่ ถ้าพวกเรารวมพลังกับคุณครูละก็ ไม่ว่ายังไงก็จะผ่านพ้นไปได้!"
103140-80 = "อื้ม เข้าใจแล้ว! งั้นฉันจะซัพพอร์ตให้เอง อย่าคิดทำอะไรบุ่มบ่ามล่ะ"
103140-81 = "อื้ม ถ้าได้ยูกะมาช่วยก็มั่นใจหายห่วง! ไปกันเลย!!"
103140-82 = "ค่ะ รบกวนด้วยนะคะ!"
103140-83 = "ปะ... ไปกัน......! สู้ๆ!"
103140-85 = "คุณครูคะ ถ้างั้นฝากป้องกัน <เรือรบอุตนาพิชทิม> ด้วยนะคะ!"
103140-92 = "[ns] \"ได้สิ คณะกรรมการแผนงาน ชมรมพัฒนาเกม ชมรมชิมอาหาร!! ไปลุยกันเลย!\""

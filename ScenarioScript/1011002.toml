[translation]
1011002-1 = "ใช้อำนาจในทางมิชอบ"
1011002-2 = "(คุณครูมาถึงทรีนิตี้ในตอนที่ว่างตามที่เซอานัด)"
1011002-8 = "[ns1] (เอ๋...? ไม่อยู่เหรอ?)\n[ns2] (มาผิดที่เหรอ?)"
1011002-12 = "(ประตูไม่ได้ล็อก แต่กลับเปิดแง้มๆ อยู่)"
1011002-17 = "[ns3] \"ที่นี่คือ...\"\n[ns4] \"เซอา...? อยู่ข้างในหรือเปล่า?\""
1011002-20 = "งืม..."
1011002-21 = "งืม......"
1011002-25 = "เอ๋..."
1011002-26 = "คุณครู..."
1011002-29 = "― [log=세이아]...... ฉันไม่รู้เลยค่ะว่าคุณครูมาแล้ว[/log][wa:330] "
1011002-30 = "― [log=세이아]ถึงจะไม่ดูเป็นอย่างนั้น แต่เห็นอย่างนี้ฉันก็ตกใจมากนะคะ [/log][wa:5620] "
1011002-33 = "[ns5] \"ขอโทษที่เข้ามาตามอำเภอใจนะ\"\n[ns6] \"ครูไม่ได้ตั้งใจจะทำให้ตกใจหรอก ขอโทษนะ\""
1011002-36 = "― [log=세이아]ฉันไม่ได้บอกว่าไม่ดีค่ะ การมีอะไรให้ตกใจเยอะๆ ถือเป็นเรื่องสนุกค่ะ[/log][wa:5390] "
1011002-37 = "― [log=세이아]มันเป็นสิ่งที่ฉัน... ปรารถนามาโดยตลอดน่ะค่ะ[/log][wa:4490] "
1011002-40 = "― [log=세이아]...ยิ่งเป็นการที่...[/log][wa:1570] "
1011002-41 = "― [log=세이아]คุณครูมาปรากฏตัวต่อหน้าอย่างกะทันหันแบบนี้แล้วด้วย ฉันก็ยิ่ง... [/log][wa:4840] "
1011002-44 = "― [log=세이아]ไหนดูซิ วันนี้...[/log][wa:2500] "
1011002-45 = "― [log=세이아]อ้อ นั่นสินะคะ [/log][wa:4600] "
1011002-48 = "― [log=세이아]คุณครูมาเพราะฉันขอให้มานี่เนอะ [/log][wa:1190] "
1011002-51 = "― [log=세이아]...ขอโทษด้วยค่ะ ที่จริงฉันไม่ได้มีเรื่องอะไรพิเศษหรอกค่ะ [/log][wa:2440] "
1011002-54 = "― [log=세이아]ฉันแค่...[/log][wa:240] "
1011002-55 = "― [log=세이아]...อยากคุยกับคุณ ฉันก็แค่คิดแบบนี้น่ะ[/log][wa:8950] "
1011002-58 = "กังวลจังเลยค่ะว่าความเอาแต่ใจของฉันจะทำให้คุณครูต้องลำบากหรือเปล่า"
1011002-59 = "ถึงแม้จะมาพูดแบบนี้หลังจากสร้างเรื่องไปแล้วก็เถอะค่ะ ฮุฮุ"
1011002-60 = "ไม่เป็นไรงั้นเหรอคะ...? ไม่เป็นปัญหาเลยแม้แต่นิดเดียวเหรอคะ"
1011002-61 = "นั่นสิ คุณเป็นคนที่พูดอย่างนี้ตลอดอยู่แล้วนี่คะ"
1011002-62 = "[s7] \"ครูคิดว่าเรียกมาเพราะงานของสภาน้ำชาเสียอีก\"\n[s8] \"ที่จริงครูคิดว่าเรียกมาเพราะเรื่องงานน่ะ\""
1011002-65 = "ฉันก็คิดว่าคุณครูต้องคิดอย่างนั้นค่ะ ก็ฉันพูดไปในทำนองนั้นนี่คะ"
1011002-66 = "ถึงคุณครูจะเป็นคนที่แค่บอกไปว่า 'คิดถึงจัง มาหาหน่อย' ก็น่าจะมาหากันอย่างยินดี..."
1011002-67 = "แต่ว่าฉันดันเป็นเด็กที่ชอบทำให้ต้องเป็นห่วงน่ะค่ะ"
1011002-68 = "ฉันแค่อยากเห็นใบหน้าที่ 'สงสัยใคร่รู้ด้วยความกังวล' ของคุณครูน่ะ"
1011002-69 = "แม้ว่าฉันจะพลาดช่วงเวลาที่สำคัญที่สุดไปเพราะเผลอหลับไปอย่างสบายใจก็เถอะค่ะ"
1011002-70 = "ช่างเป็นแผนการที่โง่เขลาจังเลยนะคะ ฮุฮุ"
1011002-71 = "การที่ฉันเติมเต็มความปรารถนาส่วนตัวด้วยการใช้คีย์เวิร์ดสำคัญๆ อย่าง 'งานของสภาน้ำชา' ทำให้คุณครูตกใจหรือเปล่าคะ...?"
1011002-72 = "แต่ถ้าเป็นคุณครู ก็อาจจะรู้อยู่แล้วก็ได้ค่ะ"
1011002-73 = "ฉันต่างจากคนอื่นตรงที่ฉันค่อนข้างไม่ลังเลในเรื่องแบบนั้น ตราบใดที่ทำแล้วไม่กระทบกับทรีนิตี้ และสภาน้ำชา ฉันก็ไม่ปฏิเสธที่จะสนุกกับมันค่ะ"
1011002-74 = "แล้วฉันก็คิดว่าการทำแบบนี้ 'นานๆ ที' เหมือนกับในครั้งนี้ก็น่าจะไม่เป็นอะไรค่ะ"
1011002-75 = "แต่ว่าฉันใช้การทำ 'นานๆ ที' ที่ว่าในวันนี้ไปเสียแล้ว..."
1011002-76 = "ค่ะ ต่อไปฉันจะไม่เรียกให้คุณครูมาหาด้วยวิธีแบบนี้อีกแล้วค่ะ"
1011002-77 = "จริงอยู่ที่บางครั้งฉันก็อยากทำให้คุณครูงานเข้า แต่ฉันก็ไม่อยากให้คุณครูเกลียดฉันน่ะค่ะ"
1011002-78 = "แต่ถ้าหาข้ออ้างด้วยวิธีอื่น... เรื่องมันก็คงจะต่างออกไปนะคะ"
1011002-79 = "ตอนนี้คุณครูคงไม่ได้กำลังคิดว่าฉันน่ารำคาญใช่มั้ยคะ...?"
1011002-80 = "[s9] \"ครูดีใจที่ได้รู้จักเซอามากขึ้นนะ\"\n[s10] \"ครูอยากให้เราคุยกันได้แบบนี้เร็วๆ อยู่แล้ว\""
1011002-85 = "ขอบคุณค่ะ ฉันก็หวังว่าจะได้ยินคำตอบแบบนี้อยู่เหมือนกัน"
1011002-86 = "คุณครูคงเหนื่อยแย่เลยนะคะที่ต้องมาเจอกับเด็กแบบนี้"
1011002-90 = "จะว่าไป นี่อาจจะเป็นเรื่องที่ต่างออกไปก็ได้"
1011002-91 = "คุณครูไม่ถามเกี่ยวกับสุขภาพของฉันเลย ปกติแล้วนี่จะเป็นสิ่งแรกที่ถูกถามถึงเมื่อเริ่มบทสนทนานะคะ"
1011002-92 = "อย่างเช่น ร่างกายเป็นยังไงบ้าง ตอนนี้โอเคหรือยัง หรือเจ็บป่วยตรงไหนบ้างหรือเปล่า..."
1011002-93 = "ฮุฮุ..."
1011002-94 = "ฉันไม่น่าพูดถึงเลยนะคะ คุณก็ไม่ใช่ใครอื่น คงจะรู้ดีอยู่แล้วว่าฉันไม่ชอบให้ถามเรื่องแบบนั้น"
1011002-95 = "[s11] \"ดูจากท่าทีที่มีชีวิตชีวา ครูก็ได้คำตอบแล้วน่ะ\"\n[s12] \"เรื่องนี้ไม่ต้องถามครูก็รู้น่ะ\""
1011002-98 = "ดีเลยค่ะ ถึงมันจะผิดวิสัยไปหน่อย แต่ฉันก็ไม่เสียใจหรอกนะคะ"
1011002-99 = "ถ้างั้น คุณครูคะ ในเมื่อคุณครูมาหาฉันถึงที่นี่แล้ว..."
1011002-100 = "โปรดถือว่านี่เป็น 'คำขออย่างเป็นทางการ' ของ 'โฮสต์คนก่อนของสภาน้ำชา'"
1011002-111 = "แล้วช่วยมา... 'ทำภารกิจนอนกลางวัน' กับฉันได้มั้ยคะ?"
1011002-113 = "(จากนั้นคุณครูก็นอนกลางวันกับเซอาในห้องอยู่ครู่หนึ่งแล้วกลับไปที่ชาเล่ต์)"

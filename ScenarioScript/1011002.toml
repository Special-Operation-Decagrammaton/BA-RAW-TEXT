1011002-64 = "#wait;100"
1011002-65 = "3;세이아;02;그러실 거라 생각했어요. 제가 그런 식으로 말했으니까요."
1011002-66 = "3;세이아;08;선생님께선 '그냥 보고 싶다'라고 말해도 흔쾌히 찾아와 주실 분이시겠지만……."
1011002-67 = "3;세이아;01;여기서는 그저, 제가 그런 아이라고 해둘까요. 성가신 아이."
1011002-68 = "3;세이아;02;선생님의 '그런 걱정과 긴장으로 궁금해하는 얼굴'을 보고 싶었을 뿐."
1011002-69 = "3;세이아;01;그 가장 중요한 순간을, 정작 본인은 속 편히 자느라 놓쳐 버렸지만요."
1011002-70 = "3;세이아;03;바보 같은 수작이었네요. 후후.\n#3;em;[음표]"
1011002-71 = "3;세이아;01;……혹시 놀라셨을까요? '티파티의 업무' 같은 중요한 키워드를 이용해서, 이렇게 사적인 소망을 채우는 저의 모습에."
1011002-72 = "3;세이아;02;선생님이라면 이미 알고 계셨을지도 모르죠."
1011002-73 = "3;세이아;01;다른 분들과 달리, 저는 그런 점에서 주저함이 없는 편이에요. 트리니티와 티파티에 폐가 되지 않는 이상, 그걸 누리는 걸 굳이 거부하지도 않죠."
1011002-74 = "3;세이아;02;당장 이번 같은 경우도 '한 번 정도는' 괜찮을 거라 생각했고요."
1011002-75 = "3;세이아;99;하지만 그 한 번을 지금 이렇게 써 버렸으니……."
1011002-76 = "3;세이아;01;네, 앞으로는 이런 식으로 선생님을 호출하는 일은 없도록 하겠습니다."
1011002-77 = "3;세이아;02;선생님을 곤란하게 만들고 싶을 때가 있긴 하지만, 가볍게 여겨지거나 미움받고 싶은 건 아니니까요."
1011002-78 = "3;세이아;99;다른 방식으로 그렇게 만든다면……. 또 이야기는 별개겠지만요."
1011002-79 = "3;세이아;03;……혹시 이미 귀찮다고 생각하고 계신 건 아니시죠?\n#3;em;[?]"
1011002-80 = "[s9] \"세이아에 대해 더 알게 돼서 좋아.\"\n[s10] \"오히려 이런 대화가 더 빠르길 바랐어.\""

[translation]
1011002-1 = "濫用權力"
1011002-2 = "（依照聖亞所說，在有空的時候來了三一）"
1011002-8 = "[ns1]（……咦？不在嗎？）\n[ns2]（找錯地方了嗎？）"
1011002-12 = "（門沒有鎖，而是微微敞開著）"
1011002-17 = "[ns3]「這裡是……」\n[ns4]「……聖亞？你在裡面嗎？」"
1011002-20 = "嗯……？"
1011002-21 = "唔嗯……"
1011002-25 = "……咦？"
1011002-26 = "老師……"
1011002-29 = "― [log=세이아]……你來了呢。[/log][wa:1530] "
1011002-30 = "― [log=세이아]也許看起來並非如此，但我其實還挺驚訝的。[/log][wa:7060] "
1011002-33 = "[ns5] 「抱歉，就這樣闖進來了。」\n[ns6] 「抱歉，我沒有想要嚇你的意思。」"
1011002-36 = "― [log=세이아]不，這並不是壞事……對我而言，感到驚訝是件開心的事。[/log][wa:6990] "
1011002-37 = "― [log=세이아]也是我一直……翹首以盼的。[/log][wa:5690] "
1011002-40 = "― [log=세이아]而且還是像這樣……[/log][wa:2010] "
1011002-41 = "― [log=세이아]看見老師出現在我面前，就更不用說了……[/log][wa:6640] "
1011002-44 = "― [log=세이아]話說今天……[/log][wa:2940] "
1011002-45 = "― [log=세이아]啊啊，說的也是。[/log][wa:4880] "
1011002-48 = "― [log=세이아]是我拜託你的對吧。[/log][wa:2070] "
1011002-51 = "― [log=세이아]……非常抱歉。其實並不是有什麼特別的事。 [/log][wa:3880] "
1011002-54 = "― [log=세이아]只是……[/log][wa:440] "
1011002-55 = "― [log=세이아]想跟你交流話語，就只是這樣而已。[/log][wa:9790] "
1011002-58 = "都怪我任性地堅持己見，真擔心會給老師添麻煩。"
1011002-59 = "雖然現在說這些可能有點晚了，呵呵。"
1011002-60 = "……沒關係？完全沒問題？"
1011002-61 = "這樣啊，你果然會這麼說。"
1011002-62 = "[s7]「我以為找我是為了茶會的事。」\n[s8]「其實我以為是為了公事。」"
1011002-65 = "考慮到我當時的說法，你會這麼想也不奇怪。"
1011002-66 = "雖然只要我說「想見你」，老師就會欣然過來找我……"
1011002-67 = "就把在場的我，當作是那種麻煩的孩子吧。"
1011002-68 = "我只是想見到老師露出「擔憂緊張又好奇的表情」罷了。"
1011002-69 = "雖然這麼做的始作俑者，卻因為睡得太沉而錯過了那最重要的瞬間。"
1011002-70 = "我的手法還真愚蠢啊。呵呵。"
1011002-71 = "……嚇到你了嗎？#n我利用「茶會的工作」這種重要關鍵字，滿足一己私欲的模樣。"
1011002-72 = "老師也許早就知道了也說不定。"
1011002-73 = "與其他人不同，我在這個方面相對果斷。#n只要不會造成三一和茶會的麻煩，我也不會堅持拒絕享受。"
1011002-74 = "類似這樣的情況，我認為發生個「一次」應該無傷大雅。"
1011002-75 = "然而僅此一次的機會，就這麼被我用掉了……"
1011002-76 = "嗯，我以後不會再用這種方式把老師叫過來了。"
1011002-77 = "雖然我偶爾會想讓老師感到困擾，#n但我並不想讓你認為我是個輕浮的人，或者被你討厭。"
1011002-78 = "不過如果能以其他方法達成效果……又是另一回事了。"
1011002-79 = "……你該不會已經覺得很煩了吧？"
1011002-80 = "[s9]「我覺得好像更了解聖亞了。」\n[s10]「我反而希望能更早像這樣對話。」"
1011002-85 = "謝謝你，那正是我想聽到的回答。"
1011002-86 = "跟我這種孩子扯上關係想必很辛苦吧。"
1011002-90 = "話說回來，還有一件事。"
1011002-91 = "老師都沒有問我身體的情況呢。#n大家通常都會先拿這件事當話題的。"
1011002-92 = "例如身體如何、現在還好嗎、有沒有哪裡不舒服……"
1011002-93 = "……呵呵。"
1011002-94 = "果然不該多嘴的。#n畢竟你又不是別人，我也知道你不喜歡那樣。"
1011002-95 = "[s11]「你朝氣蓬勃的樣子已經說明了一切。」\n[s12]「因為這件事不問也知道。」"
1011002-98 = "這樣果然不錯。#n雖然有點冒險，但我並不後悔。"
1011002-99 = "那麼老師，既然你今天都抽空過來了……"
1011002-100 = "不如就把這當成是「茶會前主席」提出的「正式協助請求」吧。"
1011002-111 = "能請你……協助我完成「午睡工作」嗎？"
1011002-113 = "（之後便跟聖亞一起，在房間稍作午睡後才回到夏萊）"

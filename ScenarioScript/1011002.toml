1011002-61 = "3;세이아;00;그렇죠. 당신은 그렇게 말씀하실 분이었죠."
1011002-62 = "[s7] \"티파티의 용무로 부른 줄 알았어.\"\n[s8] \"사실 공적인 업무라고 생각했거든.\""

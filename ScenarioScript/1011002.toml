[translation]
1011002-1 = "Abuse of Power"
1011002-2 = "As Seia asked, I arrived at Trinity at a quiet hour."
1011002-8 = "[ns1] \"(...? Is she not here?)\"\n[ns2] \"(Did I come to the wrong place?)\""
1011002-12 = "The door was not locked. In fact, it was slightly open."
1011002-17 = "[ns3] \"Is this...\"\n[ns4] \"...? Seia? Are you here?\""
1011002-20 = "...Mmm..."
1011002-21 = "Mmm..."
1011002-25 = "...Oh."
1011002-26 = "Sensei..."
1011002-29 = "― [log=세이아]...I didn't know you were here.[/log][wa:570] "
1011002-30 = "― [log=세이아]It may not seem like it, but I assure you, I'm quite surprised. [/log][wa:5300] "
1011002-33 = "[ns5] \"Sorry for coming in without asking.\"\n[ns6] \"I'm sorry, I didn't mean to surprise you.\""
1011002-36 = "― [log=세이아]Oh, don't misunderstand. Surprises can be wonderful things.[/log][wa:5670] "
1011002-37 = "― [log=세이아]Even things you anticipate can be surprises when they happen.[/log][wa:3770] "
1011002-40 = "― [log=세이아]...For example...[/log][wa:1690] "
1011002-41 = "― [log=세이아]Something like you, Sensei, suddenly showing up in front of me... [/log][wa:4760] "
1011002-44 = "― [log=세이아]Let's see. Today was...[/log][wa:2260] "
1011002-45 = "― [log=세이아]Ah, yes. [/log][wa:4840] "
1011002-48 = "― [log=세이아]You came here for my request. [/log][wa:1230] "
1011002-51 = "― [log=세이아]...For that,  I apologize. There's no particular occasion. [/log][wa:2360] "
1011002-54 = "― [log=세이아]I simply...[/log][wa:160] "
1011002-55 = "― [log=세이아]...I...simply wanted to talk with you. That's all.[/log][wa:8430] "
1011002-58 = "Perhaps my stubbornness has troubled you."
1011002-59 = "Though perhaps it's a bit late to say so. Heehee."
1011002-60 = "...Ah, so you're untroubled? No worries, then?"
1011002-61 = "Of course you would say so, gracious as you are."
1011002-62 = "[s7] \"I figured you had some Tea Party work to talk about.\"\n[s8] \"I thought you'd have something official on your mind.\""
1011002-65 = "Yes, I suppose my messages could have been interpreted that way."
1011002-66 = "Though you'd likely visit even if I simply said, \"I wish to see you.\""
1011002-67 = "I can be quite the troublesome brat sometime, can't I?"
1011002-68 = "Perhaps I simply wanted to see your face, in a confusing and awkward situation."
1011002-69 = "And then I slept through it, without a care in the world."
1011002-70 = "Such folly. Fufu."
1011002-71 = "...Does it surprise you that I played the \"official Tea Party business\" card to fulfill my personal motives?"
1011002-72 = "Or did you already know, Sensei?"
1011002-73 = "Unlike others, I have no qualms about such things. I have my privileges, and I use them. Unless it would cause trouble for Trinity or the Tea Party, of course."
1011002-74 = "After all, what harm could there be in doing it just once?"
1011002-75 = "But, now that it's been done..."
1011002-76 = "...I shan't call on you again in such a way."
1011002-77 = "There may be times when I enjoy your consternation, but I have no wish to make you distrust or dislike me."
1011002-78 = "Though I may yet find other ways to fluster you."
1011002-79 = "...I haven't worn you out already, have I?"
1011002-80 = "[s9] \"It's nice to get to know you more, Seia.\"\n[s10] \"I actually wanted to talk like this earlier.\""
1011002-85 = "Very good. That is precisely what I wanted to hear."
1011002-86 = "It must be hard for you, dealing with a brat like me."
1011002-90 = "On a somewhat-related topic..."
1011002-91 = "You haven't asked me how I feel yet, Sensei. Most people start their conversations that way."
1011002-92 = "You know, \"How are you feeling,\" \"Are you well,\" \"Are you hurting,\" that sort of thing."
1011002-93 = "...Fufu."
1011002-94 = "But of course, you would know that I find such small talk entirely unnecessary."
1011002-95 = "[s11] \"Your attitude already answered that question.\"\n[s12] \"I can tell without asking.\""
1011002-98 = "Excellent. Then this gamble of mine was entirely worth it."
1011002-99 = "Now, Sensei, since you have taken the time to come all the way here..."
1011002-100 = "...I do have an official request, as a former Tea Party Host."
1011002-111 = "Would you...help me with my \"nap task\" by nodding off over there for a bit?"
1011002-113 = "Afterwards, I took a long nap, with Seia in the room, and then returned to Schale."

[translation]
2001603-1 = "誘惑的少女"
2001603-6 = "（伊呂波輕輕走近，一股甜膩的花香撲鼻而來）"
2001603-7 = "（伊呂波用輕柔的聲音悄悄說到）"
2001603-8 = "……老師，別再硬撐了。就算繼續做這種事也只會越來越痛苦，這點老師是最清楚的吧？"
2001603-9 = "我這可是，為老師著想才這麼說的。"
2001603-10 = "不要再忍耐了，過來我這邊吧……"
2001603-11 = "（她的臉，她的手，慢慢靠近。幾乎都能感覺到她的體溫了……）"
2001603-12 = "[ns1]「我不是說過了，伊呂波。」\n[ns2]「我現在工作堆積如山，晚點再說！！」"
2001603-13 = "呿……"
2001603-14 = "呿……"
2001603-15 = "[s3]「還給我明目張膽地咂舌……」\n[s4]「對了，伊呂波，你今天來做什麼……？」"
2001603-16 = "沒什麼，我只是遵照萬魔殿的指示執行任務而已。"
2001603-17 = "沒什麼，我只是遵照萬魔殿的指示執行任務而已。"
2001603-18 = "上次也和老師說過了，我要「拉攏老師加入萬魔殿的勢力」。"
2001603-19 = "[s5]「這點我知道，但你先讓我工作吧……」\n[s6]「難道你是基於什麼特別的意圖，才妨礙我工作……？」"
2001603-20 = "……咦？"
2001603-21 = "……咦？"
2001603-22 = "……那就當那麼回事吧。"
2001603-23 = "[s]「一整個什麼都沒在想的反應！！」"
2001603-24 = "失禮耶，你認為我會想都沒想就採取行動嗎？"
2001603-25 = "我當然有個合理的理由。"
2001603-26 = "首先，我是以萬魔殿的工作為藉口，而來到這裡偷懶的。"
2001603-27 = "[s]「你直接把『藉口』兩個字說出來了。」"
2001603-28 = "但就算我想要偷懶，旁邊卻有個人在死命工作。"
2001603-29 = "而我們懶惰蟲也是有我們懶惰蟲的自尊。"
2001603-30 = "因此我想讓勤奮工作的老師跟我一起偷懶。不然感覺……"
2001603-31 = "……好像就只有我是個廢人一樣。"
2001603-32 = "[s]「槽點也太多……！」"
2001603-33 = "老師，有些東西，把它說破就不美了呀。"
2001603-34 = "[s7]「很抱歉在得意的時候說這種話。」\n[s8]「但我的吐槽功力已經跟不上了。」"
2001603-35 = "總而言之……以老師的立場來看，會希望我認真工作是嗎？"
2001603-36 = "總而言之……以老師的立場來看，會希望我認真工作是嗎？"
2001603-37 = "如果老師這麼希望，我也不是做不到……"
2001603-44 = "……老師。只有老師這麼辛苦的必要性何在？"
2001603-45 = "我很清楚老師平常有多辛苦……"
2001603-46 = "聯邦學生會下達的不合理指示，奇普托斯各地發生的事件，然後要為了這些事情日夜奔波…… "
2001603-47 = "周遭都是問題和問題學生，不管怎麼做都兩面受氣……像我們這種中階管理者，生活除了辛勞還是辛勞。"
2001603-48 = "就算努力到粉身碎骨，也沒有多少人能理解我們……"
2001603-49 = "與其這樣，乾脆讓我們一起全部拋在腦後吧。"
2001603-50 = "把一切丟下，推遲，視而不見……"
2001603-51 = "只要試過一次，說不定會意外爽快唷？來啊，老師。"
2001603-52 = "要不要，跟我一起偷懶呀？"
2001603-53 = "[s]「真是惡魔的誘惑……」"
2001603-54 = "不必那麼大驚小怪，我只是……"
2001603-55 = "只是……"
2001603-56 = "[s]「……只是什麼？」"
2001603-57 = "……我累了，引人偷懶也好累人。"
2001603-59 = "全都好麻煩喔～剛剛這段是怎樣啊……話說我到底在幹嘛啊～"
2001603-60 = "一回歸現實突然整個累爆……"
2001603-61 = "萬魔殿的任務也不想管了……我想要一整天偷懶在書裡度過……"
2001603-62 = "我為什麼會做這種事情啊……"
2001603-63 = "……"
2001603-64 = "這都是老師的錯。"
2001603-65 = "[s]「太不合理了！！」"
2001603-66 = "全都好麻煩喔，我們乾脆去吃晚餐吧。正好我前陣子看到一家感覺不錯的餐廳。"
2001603-67 = "只要吃了美食，心情應該會好一點。"
2001603-68 = "[s]「這倒也是……」"
2001603-77 = "[ns]「我們應該往哪走？」"
2001603-78 = "……"
2001603-79 = "哼哼……"
2001603-80 = "[s]「……伊呂波？」"
2001603-81 = "你中計了吧，老師。"
2001603-82 = "現在你走出了室外，代表說你已經中了我的計謀，放下工作偷懶了。"
2001603-83 = "[s]「……啊！」"
2001603-84 = "作戰成功。"
2001603-85 = "雖然可能不算有成功懷柔，但也算是達成任務了吧。好了老師，就讓我們這兩個中階管理懶惰蟲，一起去吃美味的晚餐吧。"
2001603-86 = "[s]「中，中計了……」"
2001603-88 = "（於是我就被伊呂波帶出來，在夏萊附近吃完美味的晚餐才回去）"

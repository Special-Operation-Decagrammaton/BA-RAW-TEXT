2001603-77 = "[ns] \"이로하, 그럼 식당은 어느 방향에 있어?\""
2001603-78 = "3;이로하;01;…….\n#3;a\n#3;em;…"
2001603-79 = "3;이로하;07;후훗. 후후후……!"
2001603-80 = "[s] \"……이로하?\""
2001603-81 = "3;이로하;03;당하셨네요. 선생님.\n#3;em;[재잘]"
2001603-82 = "3;이로하;07;여기까지 나와버린 이상. 하던 일, 땡땡이친 셈이 되어버렸네요?"
2001603-83 = "[s] \"………아!\""
2001603-84 = "3;이로하;03;멋들어지게 작전 성공. \n#3;em;[반짝]"
2001603-85 = "3;이로하;07;그럼 소기의 목적도 달성했으니. 땡땡이치는 사람들끼리, 맛난 저녁을 먹으러 가볼까요? 선생님.\n#3;em;[음표]"
2001603-86 = "[s] \"다, 당했다…….\""

[translation]
2001603-1 = "Enticing Fraulein"
2001603-6 = "As Iroha approached, I got a whiff of a sweet floral fragrance."
2001603-7 = "Iroha spoke to me with a soft voice."
2001603-8 = "Sensei... Why don't you take a break? Don't you know working all day isn't good for you?"
2001603-9 = "I'm just looking out for you. Why do things that make you miserable?"
2001603-10 = "Can you come closer, Sensei? Sit next to me."
2001603-11 = "Iroha's hand slowly reached out to me. The distance between us narrowed as she came closer and closer."
2001603-12 = "[ns1] \"Iroha. Stop it.\"\n[ns2] \"I'm so backed up with work it's getting dangerous!\""
2001603-13 = "Tsk."
2001603-14 = "Tsk."
2001603-15 = "[s3] \"Are you clicking your tongue at me?\"\n[s4] \"What are you even doing here, Iroha?\""
2001603-16 = "I'm putting all my effort into carrying out my mission."
2001603-17 = "I'm putting all my effort into carrying out my mission."
2001603-18 = "Didn't I tell you that my mission is to lure you into the Pandemonium Society? I hate repeating myself."
2001603-19 = "[s5] \"I know that already, but what does that have to do with this nonsense?!\"\n[s6] \"Is the Pandemonium Society hoping to get something by messing with me?!\""
2001603-20 = "Oh? Well..."
2001603-21 = "Oh? Well..."
2001603-22 = "If that's how you see it, then."
2001603-23 = "[s] \"That's what people say when they can't think of an excuse!\""
2001603-24 = "How rude! Do you really think I would bother you for no reason?"
2001603-25 = "Why am I bothering you? The reason is simple."
2001603-26 = "I'm trying to get out of work under the guise of luring you into the Pandemonium Society!"
2001603-27 = "[s] \"I knew you were up to something!\""
2001603-28 = "My current resting spot happens to be someone else's office, and the only thing I have to do is watch them work all day."
2001603-29 = "Don't you know that even lazy couch potatoes have pride as lazy couch potatoes?"
2001603-30 = "Simply put, I'm trying to skip work and you're making me watch you work."
2001603-31 = "You've scammed me!"
2001603-32 = "[s] \"You put yourself in this situation!\""
2001603-33 = "Sensei, there's times when the truth is better left unsaid."
2001603-34 = "[s7] \"Sorry to burst your bubble, but this isn't working.\"\n[s8] \"That didn't sound nearly as cool as you think it did.\""
2001603-35 = "Hmph. So you want me to dutifully carry out my mission from the Pandemonium Society, then?"
2001603-36 = "Hmph. So you want me to dutifully carry out my mission from the Pandemonium Society, then?"
2001603-37 = "Well, if you insist, I guess I can."
2001603-44 = "Sensei... Why are you working so hard? There's no need for that."
2001603-45 = "Things are so hard for you, aren't they? "
2001603-46 = "You have to take care of all those unreasonable orders from the General Student Council and the students are always asking so much of you. "
2001603-47 = "All the hard work just comes down on you, doesn't it?"
2001603-48 = "Nobody truly recognizes all that you do."
2001603-49 = "Don't you want to just take a little break?"
2001603-50 = "Forget all the work and stress, throw away your pressing matters..."
2001603-51 = "Just thinking about it makes me so happy! Sensei... Why don't you and I..."
2001603-52 = "Skip work?"
2001603-53 = "[s] \"Wow... You're good.\""
2001603-54 = "There's no point thinking about it. Just..."
2001603-55 = "Just..."
2001603-56 = "[s] \"Just...?\""
2001603-57 = "This is tiring."
2001603-59 = "And embarrassing. I had to ask myself what I was doing for a moment there."
2001603-60 = "Once the adrenaline fades away, all you're left with is the pain of reality..."
2001603-61 = "Forget the Pandemonium Society... I just want to get cozy and read all day."
2001603-62 = "What am I doing here on a nice day like this?"
2001603-63 = "*sigh*"
2001603-64 = "This is your fault, isn't it?"
2001603-65 = "[s] \"That's not fair!\""
2001603-66 = "I'm just so tired of it all, Sensei. Can we go eat? I know a good place around here I can show you."
2001603-67 = "Maybe eating will make me feel better... Please?"
2001603-68 = "[s] \"Well, when you put it like that...\""
2001603-77 = "[ns] \"Where do you want to eat, Iroha?\""
2001603-78 = "..."
2001603-79 = "Heehee, heeheehee."
2001603-80 = "[s] \"Iroha?\""
2001603-81 = "I got you, Sensei."
2001603-82 = "If you eat with me, you're basically skipping work, right?"
2001603-83 = "[s] \"...Oh!\""
2001603-84 = "Success. "
2001603-85 = "Now that I've achieved my goal, let's go get dinner, Sensei. We're one and the same. Two people who skipped work."
2001603-86 = "[s] \"You got me good. I have to admit.\""
2001603-88 = "Iroha took me to a restaurant near Schale for a delicious dinner before heading back."

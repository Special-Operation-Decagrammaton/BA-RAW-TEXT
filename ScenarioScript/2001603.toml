[translation]
2001603-1 = "#title;유혹하는 프로일라인"
2001603-2 = "3;이로하;03\n#3;a\n#wait;1500"
2001603-3 = "3;이로하;03\n#3;d\n#wait;1500"
2001603-4 = "3;이로하;03\n#3;closeup\n#3;a\n#wait;1000"
2001603-5 = "3;이로하;03\n#3;closeup\n#3;greeting\n#wait;1500"
2001603-6 = "#na;(이로하가 가까이 다가오자 꽃과 비슷한 달콤한 내음이 코끝을 스친다.)"
2001603-7 = "#na;(이윽고 이로하는 부드러운 목소리로 넌지시 말을 걸어왔다.)"
2001603-8 = "3;이로하;02;……선생님, 이제 그런 건 더는 그만하도록 하죠. 그런 일을 계속해 봤자 괴로워지기만 할 뿐이라는 걸 선생님도 잘 알고 계시잖아요?\n#3;closeup\n#3;em;…"
2001603-9 = "3;이로하;99;저는……. 어디까지나 선생님을 위해서 말씀드리는 거예요. 괴로운 일은 그만하고…….\n#3;closeup"
2001603-10 = "3;이로하;03;네에, 선생님. 부디…… 제 곁으로, 좀 더 가까이…… 이리로 와 주시지 않겠나요?\n#3;closeup\n#3;em;[하트]"
2001603-11 = "#na;(천천히 다가드는 이로하의 손. 점점 더 거리가 좁혀지면서 이로하의 온기가 바로 지근거리에서 느껴지려고 할 때 즈음.)"
2001603-12 = "[ns1] \"그러니까 말했잖아. 이로하\"\n[ns2] \"지금 일이 엄청나게 밀려 있어서 진짜 위험하다니까?!\""
2001603-13 = "3;이로하;00;쳇.\n#3;closeup"
2001603-14 = "3;이로하;00;쳇.\n#3;closeup"
2001603-15 = "[s3] \"정면에서 혀를 차는 거야……?\"\n[s4] \"그보다 이로하! 갑자기 찾아와서 뭘 하는 거야……?\""
2001603-16 = "3;이로하;02;아, 저 말씀이신가요? 별거 아닌데요. 만마전에서 지시받은 업무를 충실히 이행하고 있을 뿐이에요.\n#3;em;[반응]"
2001603-17 = "3;이로하;02;아, 저 말씀이신가요? 별거 아닌데요. 만마전에서 지시받은 업무를 충실히 이행하고 있을 뿐이에요.\n#3;em;[반응]"
2001603-18 = "3;이로하;01;<선생님을 꼬드겨서 저희 만마전으로 끌어들인다> 이미 앞서 말씀드렸잖아요? 뭘 이제 와서 새삼스럽게."
2001603-19 = "[s5] \"아니, 그야 알고는 있지만! 그거랑 일을 방해하는 거랑 무슨 상관인데?!\"\n[s6] \"설마 만마전은 샬레를 방해하면서, 뭔가를 노리고 있는 건가?!\""
2001603-20 = "3;이로하;02;네? ……아. 뭐,\n#3;em;[?]"
2001603-21 = "3;이로하;02;네? ……아. 뭐,\n#3;em;[?]"
2001603-22 = "3;이로하;00;선생님이 그렇게 생각하고 싶으시다면 그냥 그런 걸로 해둘까요?"
2001603-23 = "[s] \"아무런 변명도 준비해두지 않았을 때의 반응이구만!\""
2001603-24 = "3;이로하;05;아니, 그런 말씀은 너무 실례 아닌가요? 아무리 그래도 제가 아무 생각 없이 선생님을 방해할 리가 없잖아요?\n#3;em;[!]\n#3;jump"
2001603-25 = "3;이로하;02;그럼 방해하는 이유가 뭐냐고요……? 그거라면 간단해요."
2001603-26 = "3;이로하;01;저, 여기까지 찾아와서, 일단은 만마전으로 선생님을 꼬드긴다는 명분하에 땡땡이를 치고 있잖아요?"
2001603-27 = "[s] \"결국 명분이라고 말해버렸어! 이 아가씨!\""
2001603-28 = "3;이로하;99;그런데 정작 땡땡이치러 온 저만의 쉼터에서, 다른 사람이 일하고 있는 걸 멍하니 지켜보고 있어야만 한다니."
2001603-29 = "3;이로하;05;아니아니, 그건 아니죠. 선생님. 귀차니스트들은 또 귀차니스트만의 프라이드라는 게 있는 법이거든요?\n#3;hophop"
2001603-30 = "3;이로하;00;간단히 말해서, 저는 땡땡이 치고 있는데 선생님이 옆에서 열심히 일하면서 생색내는 걸 보고 있으려니까. 마치…….\n#3;em;…"
2001603-31 = "3;이로하;05;저만 글러 먹은 거 같잖아요……?\n#3;closeup"
2001603-32 = "[s] \"아니, 글러 먹은 거 맞지!\""
2001603-33 = "3;이로하;03;선생님, 진실이란 때로 말하지 않기에 아름다운 법이에요.\n#3;em;[반짝]"
2001603-34 = "[s7] \"<방금 나 멋진 말 한 듯>하고 으쓱한 표정을 짓는 중에 미안하지만.\"\n[s8] \"전혀 멋지지 않거든?!\""
2001603-35 = "3;이로하;01;흐음, 그 말씀은, 선생님께선 제가 만마전으로부터 받은 임무를 성실히 수행했으면 한다……는 요구인가요?"
2001603-36 = "3;이로하;01;흐음, 그 말씀은, 선생님께선 제가 만마전으로부터 받은 임무를 성실히 수행했으면 한다……는 요구인가요?"
2001603-37 = "3;이로하;07;뭐, 정 원하신다면 못할 것도 없긴 한데요."

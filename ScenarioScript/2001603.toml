2001603-43 = "3;이로하;03\n#3;a\n#3;closeup\n#wait;1500"
2001603-44 = "3;이로하;03;선생님……. 역시, 이런 일은 그만하죠……? 그렇게까지 열심히 할 필요, 없잖아요?\n#3;closeup\n#3;em;[하트]"
2001603-45 = "3;이로하;01;저는 알고 있어요- 평소 선생님께서 얼마나 고생을 하고 계시는지……. \n#3;closeup"
2001603-46 = "3;이로하;99;총학생회로부터 내려오는 불합리한 지시나 키보토스 학생들이 저지르는 골치 아픈 사건들을 해결하기 위해, 그야말로 밤낮없이 뛰어다니길 여러 차례…… \n#3;closeup"
2001603-47 = "3;이로하;06;네, 고개를 돌려보면 위나 아래나 전부 골칫덩이뿐. 그사이에 끼여서 고생하는 건 언제나 저희 같은 중간관리자들이죠.\n#3;closeup\n#3;stiff"
2001603-48 = "3;이로하;05;그렇게 제 몸을 깎아가며 노력해본들 알아주는 사람은 소수…….\n#3;closeup"
2001603-49 = "3;이로하;03;차라리 그럴 바엔……. 같이 내팽개쳐버리자구요?\n#3;closeup"
2001603-50 = "3;이로하;99;주어진 업무를 내버려 둔다……. 반드시 해야만 하는 일을 밀어둔다. 모든 건 시야 밖으로 밀쳐내면서 모른척 한다…….\n#3;closeup"
2001603-51 = "3;이로하;03;이거, 생각 외로 엄청나게 기분 좋다구요……? 네에? 선생님……. 저와 함께…….\n#3;closeup"
2001603-52 = "3;이로하;07;땡땡이칠까요?\n#3;closeup\n#3;em;[반짝]"
2001603-53 = "[s] \"……아, 악마의 유혹이다!\""
2001603-54 = "3;이로하;03;후후, 그렇게까지 호들갑 떨 일인가요? 그냥………\n#3;closeup"
2001603-55 = "3;이로하;01;……그냥.\n#3;closeup\n#3;em;…"
2001603-56 = "[s] \"……그냥?\""
2001603-57 = "3;이로하;06;……피곤하네요. 이런 것도.\n#3;closeup\n#3;stiff"
2001603-58 = "3;이로하;06\n#3;d\n#3;closeup\n#wait;1500"
2001603-59 = "3;이로하;00;전부 귀찮아졌어요. 자괴감이 든 달까요. 나, 지금 뭐 하고 있는 거지……? 라는 상태예요.\n#3;a\n#3;em;[속상함]"
2001603-60 = "3;이로하;01;한창 흥분하다가 그 흥분이 식고 마주하는 현실은 괴로운 법이네요……."
2001603-61 = "3;이로하;99;만마전의 업무고 뭐고…… 하아, 돌아가서 하루 종일 책이나 읽고 싶다아……."
2001603-62 = "3;이로하;00;오늘 같은 날, 여기까지 나와서 뭘 하는 건지……."
2001603-63 = "3;이로하;06;……하아.\n#3;em;[땀]\n#3;stiff"
2001603-64 = "3;이로하;00;전부 선생님 때문이에요."
2001603-65 = "[s] \"부, 부당한 이야기다!\""
2001603-66 = "3;이로하;01;전부 귀찮아졌으니, 선생님. 저녁이나 먹으러 가요. 저 마침 좋은 식당을 알고 있으니까. 소개도 해드릴 겸."
2001603-67 = "3;이로하;03;맛있는 걸 먹으면 조금이라도 기분이 풀릴 거 같은데……. 어때요?\n#3;em;[음표]"
2001603-68 = "[s] \"뭐, 하는 수 없지…….\""

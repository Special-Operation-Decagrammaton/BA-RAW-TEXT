[translation]
2001603-1 = "เด็กสาวที่น่าดึงดูด"
2001603-6 = "(เมื่ออิโรฮะเดินเข้ามาใกล้ ก็ได้กลิ่นหอมหวานอ่อนๆ คล้ายกลิ่นดอกไม้)"
2001603-7 = "(และในตอนนั้นเอง อิโรฮะได้พูดขึ้นเบาๆ ด้วยน้ำเสียงที่นุ่มนวล)"
2001603-8 = "คุณครูคะ... เลิกทำงานสักครู่ดีมั้ยคะ ถึงจะฝืนทำงานต่อไปก็มีแต่จะปวดหลังๆ เรื่องนั้นคุณครูเองก็น่าจะทราบดีไม่ใช่เหรอคะ?"
2001603-9 = "ฉันพูดแบบนี้เพราะเป็นห่วงคุณครูนะคะ เลิกทำเรื่องที่น่าปวดหัวเถอะ..."
2001603-10 = "คุณครู ช่วยขยับมานั่งใกล้ๆ ฉัน... มานั่งตรงนี้หน่อยได้รึเปล่าคะ?"
2001603-11 = "(มือของอิโรฮะที่ยื่นเข้ามาอย่างช้าๆ และในตอนที่สัมผัสได้ถึงไออุ่นของอิโรฮะจากระยะห่างระหว่างเราที่ค่อยๆ ลดลง...)"
2001603-12 = "[ns1] \"เมื่อกี้ครูบอกว่ายุ่งไง อิโรฮะ\"\n[ns2] \"ตอนนี้มีงานค้างอยู่เยอะมาก รหัสแดงเลยนะ!\""
2001603-13 = "ชิ..."
2001603-14 = "ชิ..."
2001603-15 = "[s3] \"นี่เดาะลิ้นต่อหน้าครูเลยเหรอ...?\"\n[s4] \"แล้วมาหาครูทำไมเหรอ?\""
2001603-16 = "อา... ฉันเหรอคะ? ฉันไม่ได้เดาะลิ้นสักหน่อยค่ะ ฉันแค่ทำภารกิจที่ได้รับมาจากแพนเดโมเนียม โซไซตี้ก็เท่านั้นเองค่ะ"
2001603-17 = "อา... ฉันเหรอคะ? ไม่มีอะไรหรอกค่ะ ฉันแค่ทำภารกิจที่ได้รับมาจากแพนเดโมเนียม โซไซตี้ก็เท่านั้นเองค่ะ"
2001603-18 = "ฉันเคยบอกแล้วนี่คะ ภารกิจ <ล่อลวงคุณครูและพามาที่แพนเดโมเนียม โซไซตี้> ค่ะ ลืมแล้วเหรอคะ อย่าให้ฉันต้องพูดบ่อยๆ สิคะ"
2001603-19 = "[s5] \"ครูรู้แล้ว แต่เกี่ยวอะไรกับการที่มากวนเวลางานครูล่ะ!?\"\n[s6] \"ที่แพนเดโมเนียมมาขัดขวางครูนี่ มีแผนอะไรอยู่ใช่มั้ย?!\""
2001603-20 = "คะ...? ก็นะ..."
2001603-21 = "คะ...? ก็นะ..."
2001603-22 = "ถ้าคุณครูสบายใจจะคิดแบบนั้นละก็ คิดแบบนั้นไปก็ได้นะคะ?"
2001603-23 = "[s] \"ปกติคนที่ตอบแบบนั้นคือคนที่หาข้อแก้ตัวไม่ได้นะ!\""
2001603-24 = "เปล่าสักหน่อย พูดแบบนั้นไม่เสียมารยาทเกินไปหน่อยเหรอคะ? อย่างฉันไม่มีทางมาขัดขวางงานคุณครูอย่างไม่มีเหตุผลหรอก จริงมั้ยคะ?"
2001603-25 = "แล้วฉันมากวนคุณครูทำไมน่ะเหรอคะ...? เรื่องนั้นก็ง่ายนิดเดียวค่ะ"
2001603-26 = "ฉันมาที่นี่ก็เพื่อทำตามคำสั่งของแพนเดโมเนียม โซไซตี้ที่บอกให้ล่อลวงคุณครู แล้วฉันก็จะได้โดดงานด้วยไงล่ะคะ?"
2001603-27 = "[s] \"สุดท้ายก็ไต๋มาแล้วสินะ แม่สาวน้อย!\""
2001603-28 = "ฉันอุตส่าห์โดดงานมาหลบภัยที่นี่ทั้งที แต่กลับต้องมานั่งดูคนอื่นขยันทำงานแบบนี้ มันไม่สบอารมณ์เลยค่ะ"
2001603-29 = "คุณครูคงไม่รู้สินะคะ ว่าพวกคนนิยมความเกียจคร้านเองก็มีความภาคภูมิใจในแบบคน#nนิยมความเกียจคร้านค่ะ"
2001603-30 = "พูดให้เข้าใจง่ายๆ ก็คือ ฉันกำลังอู้งานอยู่แท้ๆ แต่คุณครูกลับมานั่งตั้งใจทำงานอวดกันแบบนี้"
2001603-31 = "มันก็เหมือนฉันกำลังอู้อยู่คนเดียวไม่ใช่รึไงคะ...?"
2001603-32 = "[s] \"เดี๋ยวสิ เธอเลือกที่จะอู้งานเองไม่ใช่เรอะ!\""
2001603-33 = "คุณครูคะ สิ่งที่เรียกว่าความจริงน่ะ เก็บเอาไว้ในใจไม่พูดออกมาจะงดงามกว่านะคะ"
2001603-34 = "[s7] \"ทำสีหน้าเหมือนพูดว่า <คำพูดฉันเจ๋ง> เลยนะ...\"\n[s8] \"ไม่ได้ดูคูลขึ้นเลยสักนิดเดียว?!\""
2001603-35 = "อืม ถ้างั้นที่คุณครูพูดหมายถึง... ให้ฉันปฏิบัติภารกิจที่ได้รับมาอย่างตรงไปตรงมา... งั้นเหรอคะ?"
2001603-36 = "อืม ดูไม่คูลงั้นเหรอคะ... หมายถึงอยากให้ฉันปฏิบัติภารกิจที่ได้รับมาอย่างตรงไปตรงมางั้นเหรอคะ?"
2001603-37 = "ก็นะ... ถ้าคุณครูต้องการแบบนั้น ฉันก็ไม่ขัดค่ะ"
2001603-44 = "คุณครู... ช่วยเลิกทำงานสักทีได้มั้ยคะ...? ไม่เห็นจะต้องฝืนตัวเองทำงานหนักขนาดนั้นเลยนี่คะ?"
2001603-45 = "ฉันรู้ดีนะคะ ว่าปกติแล้วคุณครูทำงานหนักมากแค่ไหน... "
2001603-46 = "ทั้งภารกิจไร้เหตุผลจากพวกองค์การนักเรียน ทั้งต้องไปตามล้างตามเช็ดเรื่องน่าปวดหัวที่พวกนักเรียน#nก่อขึ้น คุณครูต้องวิ่งไปวิ่งมาแทบไม่ได้หยุดพักเลย... "
2001603-47 = "ไม่ว่าจะหันไปทางไหนก็มีแต่พวกตัวปัญหาทั้งนั้น... คุณครูเองเป็นคนกลางที่ต้องถูกดึงเข้าไปเกี่ยวข้อง และต้องเหน็ดเหนื่อยอยู่เสมอเหมือนกับฉันนี่คะ"
2001603-48 = "แต่ก็ไม่มีใครเห็นถึงความพยายามในการทำงานของเรา..."
2001603-49 = "ไหนๆ ก็เป็นแบบนั้นแล้ว... พวกเราก็มาลืมงานทุกอย่างกันเถอะค่ะ"
2001603-50 = "ลืมงานที่ได้รับมอบหมาย ปล่อยวางพวกงานที่ต้องทำทุกอย่าง... วางทุกอย่างเอาไว้ให้ไกลสายตา และทำเป็นลืมไป..."
2001603-51 = "แค่คิดแบบนี้ก็รู้สึกดีมากแล้วนะคะ...? เพราะงั้นคุณครูขา..."
2001603-52 = "มาอู้งานไปกับฉันดีมั้ยคะ?"
2001603-53 = "[s] \"นี่มัน...การล่อลวงของปีศาจชัดๆ !\""
2001603-54 = "ฮิฮิ ทำไมตกใจแบบนั้นล่ะคะ? ฉันก็แค่..."
2001603-55 = "ก็แค่..."
2001603-56 = "[s] \"ก็แค่...?\""
2001603-57 = "เหนื่อยกับเรื่องพวกนี้นิดหน่อยค่ะ..."
2001603-59 = "ฉันรู้สึกว่าทุกอย่างน่ารำคาญไปหมด เหมือนจะเอาแต่คิดว่า 'ตอนนี้ฉันกำลังทำอะไรอยู่...?' น่ะค่ะ..."
2001603-60 = "พอได้เล่นสนุกๆ แบบนี้ มันก็รู้สึกตื่นเต้นนิดหน่อย แต่พอต้องเผชิญหน้ากับความจริงหลังจากความตื่นเต้นหายไป มันรู้สึกเจ็บปวดค่ะ..."
2001603-61 = "ฉันอยากลืมงานของทางแพนเดโมเนียม โซไซตี้และอื่นๆ... แล้วกลับไปแล้วนอนอ่านหนังสือทั้งวันจังเลย..."
2001603-62 = "วันที่อากาศดีๆ แบบนี้ ฉันมัวมาทำอะไรอยู่ที่นี่กันนะ?"
2001603-63 = "เฮ้อ..."
2001603-64 = "เรื่องทุกอย่างก็เป็นเพราะคุณครูนั่นแหละค่ะ"
2001603-65 = "[s] \"บะ...แบบนี้ไม่แฟร์เลยนะ!\""
2001603-66 = "จู่ๆ ก็รู้สึกหงุดหงิดขึ้นมาเลยค่ะ คุณครู เราไปหาอะไรกินกันเถอะค่ะ ฉันรู้จักร้านอาหารอร่อยๆ อยู่พอดี เดี๋ยวจะพาไปแนะนำค่ะ"
2001603-67 = "ถ้าได้กินของอร่อยๆ ก็น่าจะรู้สึกดีขึ้นบ้าง... ไปด้วยกันนะคะ คุณครู?"
2001603-68 = "[s] \"ช่วยไม่ได้นะ...\""
2001603-77 = "[ns] \"อิโรฮะ ร้านอาหารอยู่ตรงไหนเหรอ?\""
2001603-78 = "..."
2001603-79 = "ฮุฮุ ฮุฮุฮุ...!"
2001603-80 = "[s] \"อิโรฮะ...?\""
2001603-81 = "โดนเข้าแล้วนะคะ คุณครู"
2001603-82 = "ในเมื่อคุณครูออกมาข้างนอกแบบนี้ ก็เท่ากับว่าคุณครูก็อู้งานแล้วนะคะ?"
2001603-83 = "[s] \"อ๊ะ...!\""
2001603-84 = "แผนการอันแยบยลของฉัน... สำเร็จแล้ว "
2001603-85 = "ฉันทำตามแผนการสำเร็จแล้ว เพราะงั้นพวก \"คนอู้งาน\" อย่างเราก็ไปกินมื้อเย็นอร่อยๆ กันดีมั้ยคะ คุณครู...?"
2001603-86 = "[s] \"ดะ...โดนจนได้สินะ...\""
2001603-88 = "(หลังจากนั้นทั้งสองคนก็ไปนั่งกินมื้อเย็นที่อยู่ใกล้ๆ ชาเล่ต์ด้วยกัน)"

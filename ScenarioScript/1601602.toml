[translation]
1601602-1 = "Photobook Shoot"
1601602-5 = "After getting Mine's message, I followed her directions and headed to a photo studio in Trinity."
1601602-14 = "[ns1] \"Things seem to be pretty busy around here.\"\n[ns2] \"Are they doing a photobook shoot...or something like that?\""
1601602-29 = "...Oh, hello, Sensei."
1601602-30 = "One moment."
1601602-34 = "Everyone! We shall break for a short rest. Report back in ten minutes!"
1601602-35 = "Dismissed!"
1601602-37 = "Yes, ma'am!"
1601602-44 = "*huff* Thank you for responding to my call on such short notice, Sensei."
1601602-45 = "Yes. As you can see, we were shooting for a photobook."
1601602-46 = "The opportunity to wear such a costume is a rarity indeed. Therefore, the Remedial Knights held an internal meeting to discuss how to best capitalize upon this event."
1601602-47 = "After all, the reason I was provided this chance was to bolster the Remedial Knights' public image. It has recently, for unknown reasons, been suffering from continuous misconceptions."
1601602-51 = "[ns3] \"(How...?)\"\n[ns4] \"(Misconceptions...?)\""
1601602-54 = "Therefore, to those ends, we are attempting to develop a photobook of me. We will implement them in promotions for Remedial Knights activities."
1601602-55 = "Therefore, I require your advice on how to best improve the images' impact and effectiveness."
1601602-56 = "From your perspective, which poses and angles would be—"
1601602-60 = "...? What?"
1601602-61 = "Direction? What is the meaning of that?"
1601602-62 = "...Ah. The photo's overall aesthetic. The intended direction."
1601602-63 = "[s5] \"Exactly. For example, like something refined or cool...\"\n[s6] \"We can brainstorm based off that original vision.\""
1601602-66 = "Hm. I see. We have been wandering aimlessly through this endeavor."
1601602-71 = "Hm...? But..."
1601602-72 = "Upon reflection, it is odd. Despite our lack of \"vision,\" we've been forging a strong path forward, without hesitations."
1601602-73 = "I have been posing without the proper intention. However, no one has had any input."
1601602-74 = "Shall I consult with the Knights who have been assisting with the photoshoot? Perhaps they had a direction in mind."
1601602-81 = "I see them there. Excellent. Let us inquire."
1601602-85 = "Everyone. This may seem sudden, but we have encountered an issue with the shoot that we must address."
1601602-86 = "We were playing fast and loose until now, but we will now establish our photography style, before it is too late to turn back."
1601602-90 = "Huh? What do you mean by that?"
1601602-91 = "We already figured all that out. How would we have been able to do the shoot otherwise?"
1601602-92 = "You...didn't know? You were posing so perfectly, we figured you did."
1601602-96 = "Excuse me? The vision had already been decided? What...was it?"
1601602-97 = "...Cuteness?"
1601602-98 = "The chosen direction was \"cuteness\"? I suppose the costume IS cute..."
1601602-99 = "Oh, geez. There she goes again."
1601602-100 = "It's not like we're making a photobook of the costume! You should start being a bit more honest, especially for a special occasion like this."
1601602-101 = "Why're you getting all shy and pretending you didn't know this whole time? You were totally posing with the concept in mind, weren't you?"
1601602-102 = "Wh-What? I am confused by these reactions! Y-Your expressions..."
1601602-107 = "...Sensei?! Why are you smiling as well?!"
1601602-111 = "I don't understand the situation right now. Explain yourselves!"
1601602-115 = "Hm?"
1601602-116 = "The \"cuteness\" that everyone's talking about..."
1601602-120 = "...is me?"
1601602-121 = "...Me?"
1601602-122 = "Not the costume...but...me?"
1601602-123 = "[ns7] \"What's cute isn't the costume, but you in that costume.\"\n[ns8] \"Didn't you say you like cute things yourself?\"\n[ns9] \"To pose so cutely, without even knowing...\""
1601602-129 = "...Ehh..."
1601602-130 = "...Ehh?! E-Ehh...?!"
1601602-131 = "Th-That's... That's...!"
1601602-132 = "...That's...!"
1601602-135 = "― [log=미네 아이돌]Th-This is... It's...[/log][wa:2000] "
1601602-137 = "― [log=미네 아이돌]This is not...quite what I expected...! [/log][wa:1600] "
1601602-140 = "― [log=미네 아이돌]N-No![/log][wa:1100] "
1601602-142 = "― [log=미네 아이돌]I-I'm not averse to it or anything of the sort...[/log][wa:240] "
1601602-145 = "― [log=미네 아이돌]H-However![/log][wa:610] "
1601602-147 = "― [log=미네 아이돌]I am not implying that I enjoy it either...![/log][wa:10] "
1601602-150 = "― [log=미네 아이돌]I mean, it is a fact that I appreciate cute things... [/log][wa:2660] "
1601602-153 = "― [log=미네 아이돌]But for me to be the one who is \"cute\"...[/log][wa:870] "
1601602-156 = "― [log=미네 아이돌]I... What I am saying is...! I wasn't...[/log][wa:2150] "
1601602-158 = "― [log=미네 아이돌]...presuming that to be the situation...![/log][wa:10] "
1601602-161 = "[ns10] \"You're very cute, so don't worry!\"\n[ns11] \"Take it easy. It's a great opportunity!\""
1601602-162 = "― [log=미네 아이돌]A-Are you making fun of me, Sensei?[/log][wa:2330] "
1601602-163 = "― [log=미네 아이돌]A-Are you making fun of me, Sensei?[/log][wa:2330] "
1601602-165 = "― [log=미네 아이돌]D-Do not say such things...![/log][wa:2280] "
1601602-168 = "― [log=미네 아이돌]Wh-What...should I do...?![/log][wa:1220] "
1601602-171 = "The more embarrassed Mine got, the more enthusiastic the Knights' responses were."
1601602-172 = "Mine's conscious embarrassment actually made the photoshoot turn out even better, in the end."
1601602-177 = "However, due to Mine's intense objections, the photobook was never distributed and instead became a personal keepsake for the Knights."

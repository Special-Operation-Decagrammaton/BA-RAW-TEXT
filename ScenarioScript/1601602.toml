[translation]
1601602-1 = "相片拍攝"
1601602-5 = "（和美禰聊完之後，如他所說前往了三一的攝影棚）"
1601602-14 = "[ns1]「大家好像都很忙呢。」\n[ns2]「正在拍攝中嗎……？」"
1601602-29 = "……啊，老師。您來了啊。"
1601602-30 = "麻煩您稍等……"
1601602-34 = "各位！稍微休息一下，十分鐘後再集合吧。"
1601602-35 = "解散！！"
1601602-37 = "是～！"
1601602-44 = "如此突然的請求，您還是爽快地答應了……真的非常謝謝您，老師。"
1601602-45 = "如您所見，我們正在進行拍攝。"
1601602-46 = "由於能穿上這種服裝的機會不多，#n因此救護騎士團內部便提議，應該盡可能利用這樣的機會。"
1601602-47 = "畢竟要不是騎士團一直莫名受人誤會，我也不會為了改善形象而穿上這種服裝了。"
1601602-51 = "[ns3]（莫名……？）\n[ns4]（誤會……？）"
1601602-54 = "總之基於這樣的理由，#n我們打算製作一本以我為主角的雜誌，並將其用於騎士團對外活動時的宣傳。"
1601602-55 = "之所以麻煩老師過來，也是為了盡可能提升改善形象的效果。#n希望老師能提供一些意見。"
1601602-56 = "您覺得什麼樣的姿勢或構圖，效果會最好呢……"
1601602-60 = "……嗯？"
1601602-61 = "方向性……是嗎？#n您所謂的方向指的是……？"
1601602-62 = "……啊啊，是指希望呈現的氛圍嗎？#n得先了解我們想表現的傾向……"
1601602-63 = "[s5]「沒錯。比如高傲或帥氣之類的……」\n[s6]「只要能告訴我方向，我可以陪你一起想。」"
1601602-66 = "唔嗯……這麼說也對。#n我們之前都是憑感覺隨意地拍攝。"
1601602-71 = "不過……？#n等等……"
1601602-72 = "仔細想想，好像有點奇怪。#n明明沒有事先決定好方向，拍攝卻進行得意外順利……"
1601602-73 = "即便我只是隨意擺出想擺的姿勢，大家好像也沒有任何意見。"
1601602-74 = "不如去問問擔任工作人員的團員們吧？#n或許他們也會有一些想法。"
1601602-81 = "……啊，他們正好回來了。#n我們一起去問問吧。"
1601602-85 = "各位，雖然有點突然，不過我對這次的拍攝有個想法。"
1601602-86 = "雖然之前一直都是採取順其自然的方式，#n但是從現在開始，我認為可以決定一下拍攝的主題……"
1601602-90 = "……嗯？拍攝主題？"
1601602-91 = "主題不是早就決定好了嗎？#n不然剛才的拍攝根本沒辦法進行。"
1601602-92 = "原來您不知道嗎？#n因為您擺的姿勢相當自然，我還以為您早就知道了呢……"
1601602-96 = "……嗯？主題早就決定好了？#n這是什麼意思……"
1601602-97 = "……「可愛」？"
1601602-98 = "這次的拍攝主題是可愛？#n啊啊，這身衣服的確是蠻可愛的……"
1601602-99 = "真是的～您又來了。"
1601602-100 = "我們又不是為了服裝而拍的！#n現在畢竟是特殊情況，您不如就坦率一點吧？"
1601602-101 = "您明明從一開始就知道要擺可愛俏皮的姿勢！#n何必現在才開始裝傻呢？"
1601602-102 = "……？？？#n奇，奇怪？大家這是什麼反應？為什麼要露出那種表情……"
1601602-107 = "……老師！？為何連您也笑個不停呢！？"
1601602-111 = "我完全搞不清楚現在的狀況！#n為什麼大家都……！！"
1601602-115 = "……嗯？"
1601602-116 = "大家口中的「可愛」指的是……"
1601602-120 = "……我？"
1601602-121 = "……我嗎？"
1601602-122 = "不是衣服……而是……我嗎？"
1601602-123 = "[ns7]「可愛的並不是那身衣服，而是穿著衣服的你哦，美禰。」\n[ns8]「你不是也說過喜歡可愛的事物嗎？」\n[ns9]「明明什麼不知道，卻還是能擺出『可愛又自然的姿勢』啊……」"
1601602-129 = "……咦？"
1601602-130 = "咦，咦咦……！？"
1601602-131 = "怎，怎怎……！！！"
1601602-132 = "怎麼會……！！"
1601602-135 = "― [log=미네 아이돌]這，這是……那個……[/log][wa:2440] "
1601602-137 = "― [log=미네 아이돌]感覺跟我預期的……不太一樣……！[/log][wa:2560] "
1601602-140 = "― [log=미네 아이돌]不，不是的！[/log][wa:1060] "
1601602-142 = "― [log=미네 아이돌]我沒有……不喜歡的意思……[/log][wa:1680] "
1601602-145 = "― [log=미네 아이돌]但，但是！[/log][wa:810] "
1601602-147 = "― [log=미네 아이돌]也沒有覺得喜歡……！[/log][wa:1340] "
1601602-150 = "― [log=미네 아이돌]確實，我自己也喜歡可愛的東西沒錯…… [/log][wa:4060] "
1601602-153 = "― [log=미네 아이돌]但「可愛」的對象是自己就……[/log][wa:1950] "
1601602-156 = "― [log=미네 아이돌]那，那個……這種狀況……[/log][wa:3270] "
1601602-158 = "― [log=미네 아이돌]不在我的預期之內……！[/log][wa:850] "
1601602-161 = "[ns10]「別擔心，你真的很可愛哦！」\n[ns11]「不用給自己壓力，這可是難得的機會！」"
1601602-162 = "― [log=미네 아이돌]您，您是在取笑我對吧，老師？[/log][wa:3170] "
1601602-163 = "― [log=미네 아이돌]您，您是在取笑我對吧，老師？[/log][wa:3170] "
1601602-165 = "― [log=미네 아이돌]請，請您別說那種話……！[/log][wa:2920] "
1601602-168 = "― [log=미네 아이돌]我，我……該怎麼辦才好……！[/log][wa:1700] "
1601602-171 = "（見到害羞的美禰之後，騎士團團員們的反應變得更加熱烈）"
1601602-172 = "（雖然美禰「擺姿勢」時顯得相當彆扭，但拍出來的效果卻比之前還要好……）"
1601602-177 = "（不過在美禰的強烈反對之下，#n　那些照片後來並未用於宣傳，而是成為了團員們的個人收藏）"

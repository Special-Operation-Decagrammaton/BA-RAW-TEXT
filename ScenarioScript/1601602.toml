[translation]
1601602-1 = "ถ่ายโฟโต้บุ๊ค"
1601602-5 = "(หลังจากได้รับการติดต่อจากมิเนะ คุณครูก็ไปหาเธอที่สตูดิโอในทรีนิตี้)"
1601602-14 = "[ns1] \"บรรยากาศวุ่นวายไม่ใช่เล่นเลยนะ\"\n[ns2] \"ถ่ายรูปไปทำโฟโต้บุ๊คกันเหรอเนี่ย?\""
1601602-29 = "อ๊ะ... คุณครู มาแล้วสินะคะ"
1601602-30 = "สักครู่นะคะ..."
1601602-34 = "ทุกคนคะ! เรามาพักกันสักหน่อยดีกว่าค่ะ อีก 10 นาทีมาเจอกันใหม่นะคะ"
1601602-35 = "แยกย้ายได้ค่ะ!!"
1601602-37 = "ค่า~!"
1601602-44 = "ฮู่ว... ขอบคุณนะคะ คุณครู ฉันขอร้องไปอย่างกะทันหัน แต่คุณครูก็ยินดีมาหากันแบบนี้..."
1601602-45 = "ค่ะ อย่างที่เห็นว่าฉันกำลังถ่ายโฟโต้บุ๊คอยู่ค่ะ"
1601602-46 = "ฉันได้ความคิดเห็นจากในชมรมอัศวินบรรเทาทุกข์ว่าชมรมของเราไม่ได้มีโอกาสใส่ชุดแบบนี้บ่อยๆ ก็เลยอยากใช้ประโยชน์จากโอกาสนี้ให้ได้มากที่สุดค่ะ"
1601602-47 = "แต่เหตุผลที่ฉันใส่ชุดนี้ก็เพื่อการปรับปรุงภาพลักษณ์ของชมรมอัศวินบรรเทาทุกข์ที่ถูกเข้าใจผิดอยู่#nบ่อยๆ น่ะค่ะ ทำไมถึงเป็นอย่างนั้นก็ไม่รู้"
1601602-51 = "[ns3] (ถูกเข้าใจผิด...?)\n[ns4] (แต่ทำไมถึงเป็นอย่างนั้นก็ไม่รู้...?)"
1601602-54 = "เอาเถอะค่ะ จากความคิดเห็นที่ได้ ฉันจึงเอามาต่อยอดด้วยการถ่ายโฟโต้บุ๊ค แล้วจะเอามาใช้โปรโมต#nงานของชมรมอัศวินบรรเทาทุกข์ด้วยค่ะ"
1601602-55 = "ส่วนเรื่องที่ฉันอยากขอจากคุณครูก็คือความคิดเห็นที่เป็นประโยชน์ว่าฉันควรทำยังไงถึงจะได้ภาพ#nสวยๆ ที่ออกมาตรงวัตถุประสงค์น่ะค่ะ"
1601602-56 = "คุณครูคิดว่าฉันควรโพสท่าหรือจัดองค์ประกอบแบบไหนดีคะ..."
1601602-60 = "คะ...?"
1601602-61 = "ทิศทางเหรอคะ? หมายความว่ายังไงคะ? ทิศทางอะไรเหรอคะ?"
1601602-62 = "อ้อ... หมายถึงคอนเซ็ปต์ของภาพสินะคะ ต้องให้เป็นคอนเซ็ปต์แบบไหนนะ..."
1601602-63 = "[s5] \"ใช่แล้วละ เช่นอยากให้ดูสง่างาม หรือว่าเอาแบบเท่ๆ...\"\n[s6] \"ถ้ามีคอนเซ็ปต์ในใจ ครูจะได้ช่วยคิดต่อให้\""
1601602-66 = "ฮืม นั่นสินะคะ ตอนนี้พวกฉันคงทำอะไรแบบไม่ชัดเจนอยู่สินะคะ"
1601602-71 = "หืม...? เดี๋ยวนะคะ..."
1601602-72 = "พอคิดดูอีกที มันก็แปลกๆ นะคะ การถ่ายภาพก็ราบรื่น ไม่ติดขัดอะไรเลยค่ะ"
1601602-73 = "ตอนฉันทำท่าต่างๆ โดยไม่ได้คิดอะไรมาก คนอื่นก็ไม่ได้ติอะไรเป็นพิเศษค่ะ"
1601602-74 = "ฉันควรไปถามเหล่าอัศวินที่เป็นทีมงานดีมั้ยคะว่ามีไอเดียอะไรบ้างหรือเปล่า?"
1601602-81 = "อ๊ะ เข้ามากันพอดีเลยค่ะ ดีเลยค่ะ ฉันจะลองไปถามดูค่ะ"
1601602-85 = "ทุกคนคะ นี่อาจจะฟังดูกะทันหันไปสักนิด แต่ฉันคิดว่าเรามีบางอย่างต้องคำนึงถึงในการถ่ายโฟโต้บุ๊ค#nของเราค่ะ"
1601602-86 = "ที่ผ่านมาเราถ่ายทำกันอย่างราบรื่นก็จริง แต่จากนี้ฉันว่าเราควรกำหนดคอนเซ็ปต์ในการถ่าย..."
1601602-90 = "คะ...?? คอนเซ็ปต์ในการถ่ายเหรอคะ?"
1601602-91 = "เรากำหนดไว้ตั้งแต่แรกแล้วนี่คะ? ถ้าไม่อย่างนั้นเราก็คงถ่ายกันถึงตอนนี้ไม่ได้หรอกค่ะ"
1601602-92 = "หัวหน้าเองก็รู้อยู่แล้วไม่ใช่เหรอคะ? เห็นหัวหน้าทำท่าทางอย่างเป็นธรรมชาติ พวกฉันเลยเข้าใจว่า#nหัวหน้าก็รู้คอนเซ็ปต์แล้วเสียอีก..."
1601602-96 = "คะ...? กำหนดไว้ตั้งแต่แรกแล้วเหรอคะ? หมายความว่ายังไงคะ...?"
1601602-97 = "<ความน่ารัก> งั้นเหรอ...?"
1601602-98 = "นี่เรากำลังถ่ายในคอนเซ็ปต์น่ารักอยู่เหรอคะ? อ่า ชุดนี้มันก็น่ารักอยู่ก็จริง..."
1601602-99 = "หัวหน้านี่ละก็~ เล่นแบบนี้อีกแล้วนะคะ"
1601602-100 = "เราไม่ได้มาถ่ายโฟโต้บุ๊คเพื่อจะขายชุดนะคะ นี่เป็นสถานการณ์พิเศษ ฉันว่าเรายอมรับและปล่อยใจไป#nตามความรู้สึกจริงๆ เถอะค่ะ"
1601602-101 = "หัวหน้าก็ทำท่าทางน่ารักอยู่ตั้งแต่แรกนี่คะ! ทำไมจู่ๆ ถึงทำเป็นไม่รู้เอาดื้อๆ ล่ะคะ?"
1601602-102 = "อะ... อะไรคะ...??? ทำไมทำหน้าตาและท่าทีแบบนี้กันล่ะ..."
1601602-107 = "คุณครู...!? ทำไมคุณครูถึงยิ้มไปกับเขาอีกคนล่ะคะ!?"
1601602-111 = "ฉันไม่เห็นจะเข้าใจสถานการณ์นี้เลยค่ะ ทำไมทุกคนเป็นอย่างนี้กันหมด...!!"
1601602-115 = "คะ...?"
1601602-116 = "<ความน่ารัก> ที่ทุกคนกำลังพูดถึงอยู่ตอนนี้..."
1601602-120 = "หมายถึงฉันเหรอคะ...?"
1601602-121 = "ฉันน่ะเหรอคะ...?"
1601602-122 = "ไม่ใช่เสื้อผ้าพวกนี้... แต่เป็น... ฉันคนนี้น่ะเหรอคะ?"
1601602-123 = "[ns7] \"ไม่ใช่เสื้อผ้าที่น่ารัก แต่เป็นมิเนะที่ใส่เสื้อตัวนั้นอยู่ต่างหาก\"\n[ns8] \"มิเนะก็บอกว่าตัวเองชอบอะไรน่ารักๆ ไม่ใช่เหรอ?\"\n[ns9] \"ถึงจะไม่รู้ แต่ก็ทำท่าน่ารักอย่างเป็นธรรมชาติเลยนะ...\""
1601602-129 = "เอะ..."
1601602-130 = "เอะ...!?? เอ๋...!?"
1601602-131 = "นะ... นั่นมัน... มัน...!!!"
1601602-132 = "แบบว่า...!!"
1601602-135 = "― [log=미네 아이돌]นะ... นี่มัน... แบบว่า...[/log][wa:1840] "
1601602-137 = "― [log=미네 아이돌]เหมือนจะแตกต่าง... จากที่ฉันคิดไว้เลยค่ะ...! [/log][wa:1400] "
1601602-140 = "― [log=미네 아이돌]มะ... ไม่ค่ะ![/log][wa:780] "
1601602-142 = "― [log=미네 아이돌]ฉะ... ฉันไม่ได้ไม่ชอบหรอกค่ะ…! [/log][wa:960] "
1601602-145 = "― [log=미네 아이돌]ตะ... แต่ว่า![/log][wa:490] "
1601602-147 = "― [log=미네 아이돌]แต่ฉันก็ไม่ได้ชอบค่ะ...![/log][wa:780] "
1601602-150 = "― [log=미네 아이돌]ฉันชอบอะไรน่ารักๆ ก็จริง...[/log][wa:3740] "
1601602-153 = "― [log=미네 아이돌]แต่การที่ฉันเป็นสิ่งที่น่ารักเสียเอง...[/log][wa:950] "
1601602-156 = "― [log=미네 아이돌]คะ... คือว่า... ฉันไม่ได้คาดหวัง...[/log][wa:2350] "
1601602-158 = "― [log=미네 아이돌]ให้เกิดสถานการณ์แบบนี้นะคะ...![/log][wa:90] "
1601602-161 = "[ns10] \"น่ารักจะตาย อย่าคิดมากเลย!\"\n[ns11] \"ทำใจให้สบายนะ นี่เป็นโอกาสที่ดีเลยไม่ใช่เหรอ!\""
1601602-162 = "― [log=미네 아이돌]ละ... ล้อฉันเล่นเหรอคะ คุณครู?[/log][wa:2530] "
1601602-163 = "― [log=미네 아이돌]ละ... ล้อฉันเล่นเหรอคะ คุณครู?[/log][wa:2530] "
1601602-165 = "― [log=미네 아이돌]ยะ... อย่าพูดอะไรแบบนั้นสิคะ...! [/log][wa:2080] "
1601602-168 = "― [log=미네 아이돌]ฉะ... ฉัน... ควรทำยังไงดีคะ...[/log][wa:1060] "
1601602-171 = "(เมื่อได้เห็นท่าทีที่เขินอายของมิเนะ เหล่าอัศวินก็มีปฏิกิริยาที่แตกต่างออกไปอย่างมาก)"
1601602-172 = "(การถ่ายโฟโต้บุ๊คเป็นไปได้ราบรื่น อีกทั้งยังมีประสิทธิภาพยิ่งกว่าเดิมด้วยการโพสท่าที่เขินอายของ#nมิเนะ...)"
1601602-177 = "(แต่ในทางตรงกันข้าม รูปถ่ายของมิเนะกลับไม่ได้ถูกใช้ในการโปรโมตชมรม แต่กลายเป็นของสะสม#nส่วนตัวที่มีค่าของเหล่าอัศวินบรรเทาทุกข์...)"

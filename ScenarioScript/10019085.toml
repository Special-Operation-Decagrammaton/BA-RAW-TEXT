[translation]
10019085-6 = "......"
10019085-7 = "......"
10019085-8 = "...ยะ...ยืนยัน หะ...หอคอยแห่งสุดท้ายถูกทำลายแล้วค่ะ..."
10019085-9 = "สะ...สำเร็จแล้วใช่มั้ย...?"
10019085-10 = "...ยืนยัน หอคอยทั้ง 6 แห่งถูกทำลายแล้วค่ะ... ในที่สุดปฏิบัติการบุกโจมตี <หอคอยแห่งคำลวง> ก็..."
10019085-14 = "สำเร็จแล้วค่ะ...!!"
10019085-16 = "เฮ้อ......"
10019085-17 = "......"
10019085-18 = "ทำได้แล้วค่ะ รุ่นพี่ริน...!! เราช่วยคิโวทอสไว้ได้สำเร็จแล้วค่ะ!!"
10019085-19 = "[s] \"พยายามได้ดีมากเลยนะ ริน โมโมกะ อายูมุ...\""
10019085-20 = "ค่ะ...!! ขอบคุณมากค่ะคุณครู!!"
10019085-21 = "ฮ่าฮ่า ถ้าเทียบกับครูแล้ว พวกเราไม่ได้เหนื่อยขนาดนั้นหรอก"
10019085-22 = "...มันยังไม่จบหรอกนะคะ"
10019085-23 = "ต้นเหตุของปรากฏการณ์ครั้งนี้ แล้วก็การวิเคราะห์ความเป็นไปได้ที่จะเกิดเหตุซ้ำรอย... การฟื้นฟูเขต#nชิราโทริที่ถูกทำลาย..."
10019085-24 = "งานที่พวกเราต้องจัดการยังมีอีกเป็นภูเขาเลากาเลยค่ะ"
10019085-30 = "แต่ยังไงก็..."
10019085-31 = "...ขอบคุณที่พยายามอย่างหนักนะคะ คุณครู"

[translation]
84312101303-6 = "ถึงแล้วติดต่อมานะ!"
84312101303-7 = "อื้อ ไว้มาที่โรงเรียนของเราก็ติดต่อมาด้วยล่ะ~"
84312101303-9 = "(เข้าสังคมเก่งมากเลย... แค่ไม่กี่วันก็ได้เพื่อนแล้วสินะ)"
84312101303-10 = "(บรรยากาศที่จริงใจและไร้ซึ่งการตัดสิน... ทุกคนคงรู้สึกถึงบรรยากาศนี้กันอย่างเป็นธรรมชาติสินะ)"

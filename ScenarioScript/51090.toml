[translation]
51090-1 = "第9話;不破蓮華"
51090-2 = "……紫，你怎麼會在這裡……？"
51090-3 = "小女子我為了找蓮華前輩，前往了各個文化系的社團！"
51090-4 = "想不到前輩會和修行部的各位在一起……"
51090-6 = "不久前，蓮華醬說想體驗修行部的活動，所以提出了申請。"
51090-7 = "呼啊啊～所以現在……正在體驗……入部……呼嚕……"
51090-8 = "一定是我拍的修行部介紹影片幫上忙了對吧！"
51090-9 = "原來你們兩位認識啊。#n這麼說來，兩位確實穿著一樣的水藍色羽織……"
51090-10 = "哇！真的耶！一模一樣！蓮華前輩也是百花繚亂的人嗎！？"
51090-12 = "啊，是，是啊……"
51090-13 = "我，我沒有刻意要隱瞞的意思……"
51090-14 = "果然是為了享受青春的活動嗎？"
51090-15 = "……呃！？"
51090-16 = "等，等等！紫，你怎麼會知道？"
51090-17 = "因為我有事要找前輩，所以去了一趟前輩的家！"
51090-18 = "結果只在前輩家門前發現寫著「踏上找回青春之旅了」的紙條……"
51090-23 = "於是我就前往各個蓮華前輩可能去體驗的社團了！"
51090-24 = "[s]「畢竟社團活動確實充滿青春氣息啊。」"
51090-25 = "蓮華前輩朝青春筆直邁進的的心……！"
51090-26 = "小女子非常感動！#n真想馬上見到蓮華前輩，和前輩聊聊……"
51090-27 = "等一下等一下！別青春來青春去的，都不會害羞嗎！"
51090-28 = "那張紙條是在不知不覺怒從中來的時候寫的嗎……"
51090-29 = "因為聽見「學園生活如果無所事事的話很快就會結束」這樣的話……"
51090-30 = "[s] （這樣的話……？）"
51090-31 = "啊～！雖然也沒什麼好害羞的就是了！"
51090-36 = "紫，你說的沒錯。#n我是為了享受青春才加入修行部的。"
51090-37 = "為了至今為止……因為參加充滿汗味的「社團活動」而來不及好好享受的青春……#n以及我所失去的青春！"
51090-38 = "……所以紫，雖然不知道你是抱著什麼想法來找我，但我已經決定了。#n我要在這個修行部度過剩餘的青春。你就乖乖回去──"
51090-40 = "啊，我也很好奇前輩在修行部進行什麼青春活動！"
51090-41 = "你有在聽我說話嗎！？"
51090-42 = "因為我對蓮華前輩的活動非常感興趣！"
51090-43 = "該，該怎麼說呢……我進行的青春活動是……是……"
51090-44 = "那個……！"
51090-50 = "為了成為「精通睡眠的大和撫子戰士」而正在修行部修行！"
51090-57 = "嗯？"
51090-58 = "呼啊……"
51090-59 = "蓮華醬……原來你一直抱持著那種目標嗎！？"
51090-60 = "[s]「那到底是大和撫子……還是戰士……？」"
51090-65 = "是，是什麼都無所謂！"
51090-66 = "反正青春就是青春！"
51090-68 = "怎……怎麼會……"
51090-69 = "當然紫你可能會覺得奇怪……"
51090-70 = "真是太了不起了，甚至讓我感到驚訝！#n這毫不猶豫朝目標筆直邁進的模樣！"
51090-71 = "不愧是小女子敬佩的蓮華前輩！"
51090-72 = "嗯……？"
51090-77 = "桔梗前輩已經知道這件事了嗎？"
51090-78 = "我想桔梗前輩一定會全力為你加油──"
51090-80 = "加油個頭！那傢伙知道之後一定會「噗」一聲笑出來吧？#n我反而最不想讓他知道了！"
51090-81 = "話說回來，紫找我有什麼事？"
51090-82 = "咦？"
51090-83 = "咦什麼咦……再說了……"
51090-84 = "我們的「社團活動」現在不是已經暫停了嗎？"
51090-85 = "就算沒有，你現在也應該忙著準備慶典才對……"
51090-87 = "哇──哇──！"
51090-88 = "[s]「……？」"
51090-89 = "呵呵，我找蓮華前輩當然是有原因的！"
51090-90 = "沒什麼好隱瞞的！#n小女子我之所以找蓮華前輩，是為了得到蓮華前輩的幫助！"
51090-91 = "我……打算進行「百花繚亂繼承戰」！"
51090-96 = "………………什麼？繼承戰？"
51090-97 = "等等，那是什麼意思？"
51090-99 = "（將在陰陽部發生的事，以及紫的宣言告訴了蓮華）"
51090-101 = "桔梗前輩說的對！"
51090-102 = "名草前輩真的在大雪原！"
51090-104 = "…………"
51090-106 = "為了解決最近的問題，讓我們百花繚亂恢復原狀！"
51090-107 = "我要在「繼承戰」中打敗名草前輩……"
51090-108 = "由我來接任委員長之位！"
51090-113 = "…………"
51090-114 = "蓮華前輩！我們一起回去吧！"
51090-115 = "回到桔梗前輩所在的百花繚亂……！擔任繼承戰的保證人……"
51090-116 = "紫……你……居然還……"
51090-117 = "還在說那種……"
51090-118 = "是！"
51090-123 = "還在說那種蠢話嗎？"
51090-128 = "……咦？"
51090-129 = "紫，你應該也很清楚，百花繚亂已經被下達解散命令了。"
51090-130 = "這是桔梗親自出面，以參謀權限做出的判斷。"
51090-131 = "什麼？百花繚亂……被下令解散？#n那，那是什麼意思……"
51090-132 = "[s]「三森，其中有些複雜的內情……」"
51090-134 = "這，這怎麼可能！"
51090-135 = "蓮華前輩！解散令全是誤會……！"
51090-137 = "才不是誤會。"
51090-142 = "菖蒲委員長消聲匿跡之後……我就隱約有這種感覺了。"
51090-143 = "委員長確實是個很厲害的人……#n不過包含你在內的大家……也都認為他無論什麼時候消失都不奇怪吧。"
51090-144 = "……！"
51090-145 = "就連必須接任委員長職位的名草前輩也……#n從他拋下我們，頭也不回地去尋找菖蒲委員長的時候開始……"
51090-146 = "百花繚亂就已經結束了，一切都結束了。"
51090-148 = "不……不是那樣的！"
51090-149 = "沒，沒錯！百花繚亂並沒有結束……蓮華前輩剛才不也證明了這點嗎！？"
51090-150 = "妖怪劇團……蓮華前輩依然以百花繚亂的身分，負責擊退了那些人！"
51090-152 = "不，你別搞錯了。"
51090-158 = "那只是除掉妨礙我青春的障礙而已。#n我是為了自己才那麼做的。"
51090-160 = "蓮華醬……"
51090-161 = "……"
51090-163 = "可是……可是……如果沒有百花繚亂，百鬼夜行的和平……"
51090-164 = "唉，你的誤會真是可笑。"
51090-165 = "[s]「誤會……是什麼意思……？」"
51090-166 = "你是夏萊的老師對吧。"
51090-167 = "還記得之前天空變紅那天的事嗎？"
51090-168 = "……！"
51090-173 = "當時的百鬼夜行真的是亂成一團。"
51090-174 = "所有人一看到出現在街上的怪物，都著急地找百花繚亂解決問題。"
51090-175 = "但是失去了委員長和副委員長的我們……就像烏合之眾一樣驚慌失措……"
51090-176 = "我、桔梗……還有紫雖然也努力四處奔走，設法解決問題……#n但那只不過是少數人的掙扎罷了。"
51090-177 = "結果……你知道發生了什麼事嗎？"
51090-178 = "[s]「……發生了什麼事？」"
51090-179 = "……什麼事都沒發生。"
51090-185 = "紫，身為當事人的你應該也很清楚。#n即使沒有百花繚亂，問題依然會被解決與克服──百鬼夜行不會因此出現問題。"
51090-186 = "沒錯，我們的行為反而證明了「就算沒有百花繚亂也沒問題」的事實。"
51090-188 = "即使委員長不在，名草副委員長不回來……#n即使沒有百花繚亂也不會有人受害……沒有任何人需要我們。"
51090-190 = "這種社團……"
51090-191 = "只會讓癡癡等待著的人感到痛苦的社團沒有也罷……難道不是嗎？"
51090-192 = "可是……可是！"
51090-193 = "蓮，蓮華前輩不是也很喜歡名草前輩嗎！#n不是也很喜歡百花繚亂的活動嗎！"
51090-195 = "蓮華你……是個非常優秀的孩子……遠比像我這樣的半吊子優秀的多。"
51090-196 = "我以蓮華為榮。#n紫也這麼覺得吧？"
51090-197 = "是！"
51090-198 = "紫，剛才那句話的意思是蓮華比名草前輩更勝一籌耶。"
51090-199 = "……哈！？"
51090-200 = "哎真是的，大家都別說了。#n這樣讓聽的人很不好意思耶！"
51090-201 = "被真正厲害的人這麼說，只會讓人覺得承擔不起而已。"
51090-208 = "……呵呵。"
51090-210 = "大家一起巡邏的時候，蓮華前輩總是走在最前面……！#n名草前輩明明一直以蓮華前輩為榮……！"
51090-211 = "……！！"
51090-212 = "我才不管！反正我們已經被拋棄了！"
51090-213 = "過去就是過去。#n名草前輩已經不會再回來了……！"
51090-214 = "那個人已經說要歸還……你竟然還……！"
51090-215 = "[s] （…………歸還？）"
51090-216 = "可是……"
51090-217 = "雖然等了很久，但只要名草前輩回來，大家趁這個機會重聚……"
51090-218 = "接著只要我在「繼承戰」中獲勝……！#n就能重新……！"
51090-219 = "重新……回到那個時候……"
51090-221 = "……紫，你從以前就是這樣。#n只要覺得是對的就會堅持到底。"
51090-223 = "總是充滿自信……認為只要下定決心，不管什麼事都辦得到……"
51090-224 = "而且絕對不會放棄自己，你就是這樣的人。"
51090-227 = "只是嘴上說說而不用行動證明的話，你是不會接受的。"
51090-231 = "那我就用力量讓你明白吧。"
51090-235 = "紫，接招吧！"

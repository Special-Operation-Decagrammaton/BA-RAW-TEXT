[translation]
51090-1 = "ตอนที่ 9;ฟูวะ เรนเกะ"
51090-2 = "...ยูคาริ ทำไมเธอถึงมาอยู่ที่นี่...?"
51090-3 = "ข้า ยูคาริ! ออกตามหารุ่นพี่เรนเกะตามชมรมเชิงวัฒนธรรมอยู่หลายชมรมเลยเจ้าค่ะ!"
51090-4 = "แต่ไม่คิดเลยว่าจะมาอยู่กับชมรมฝึกฝนแบบนี้..."
51090-6 = "เรนเกะจังมาขอร้องว่าอยากลองทำกิจกรรมของชมรมฝึกฝนเมื่อเช้านี้น่ะค่ะ"
51090-7 = "ฮ้าวววว ตอนนี้ก็เลย... มาลองทำ... กิจกรรมของชมรมอยู่... งืมงำ..."
51090-8 = "นี่ต้องเป็นผลจากวิดีโอโปรโมตชมรมฝึกฝนที่ฉันถ่ายแน่ๆ! ว่ามั้ย?!"
51090-9 = "ทั้งสองคนรู้จักกันสินะคะ? จะว่าไป ทั้งคู่ใส่เสื้อฮาโอริสีครามเหมือนกันเลย..."
51090-10 = "ว้าว! นั่นสินะ! เหมือนกันเป๊ะๆ เลย! รุ่นพี่เรนเกะก็เป็นเฮียกกะเรียวรันงั้นเหรอ?!"
51090-12 = "อ่า... ตะ... แต่ว่า..."
51090-13 = "ฉะ... ฉันก็ไม่ได้ตั้งใจจะปกปิดหรอกนะ..."
51090-14 = "กิจกรรมเพื่อใช้ชีวิตวัยรุ่นอย่างนั้นสินะเจ้าคะ"
51090-15 = "...อึกก!!"
51090-16 = "ดะ... เดี๋ยวก่อน! ยะ... ยูคาริ เธอรู้เรื่องนั้นได้ยังไง"
51090-17 = "ข้ามีธุระจะคุยกับรุ่นพี่ ก็เลยแวะไปหารุ่นพี่ที่บ้านมาน่ะเจ้าค่ะ"
51090-18 = "แต่พอไปถึงรุ่นพี่ก็ไม่อยู่บ้าน แล้วข้าก็เจอกระดาษโน้ตที่เขียนบอกว่า <ฉันไม่อยู่บ้าน จะออกไปตามหา#nชีวิตวัยรุ่น> เจ้าค่ะ!"
51090-23 = "หลังจากนั้นข้าก็ตระเวนไปตามชมรมต่างๆ ที่คิดว่ารุ่นพี่เรนเกะจะไปลองทำกิจกรรมของที่นั่นน่ะเจ้าค่ะ!"
51090-24 = "[s] \"กิจกรรมชมรมจะเรียกว่าเป็นกิจกรรมวัยรุ่นได้ไหมนะ\""
51090-25 = "จิตใจที่ซื่อสัตย์ของรุ่นพี่เรนเกะที่มีต่อชีวิตวัยรุ่น...!"
51090-26 = "ข้ารู้สึกประทับใจ ก็เลยอยากพบกับรุ่นพี่เรนเกะและพูดคุยกัน..."
51090-27 = "เดี๋ยวๆ! อย่าเอาแต่พูดถึงชีวิตวัยรุ่นๆ แบบนั้นสิ ฉันก็เขินเป็นเหมือนกันนะ!"
51090-28 = "เรื่องกระดาษโน้ตน่ะ ต้องบอกว่าฉันเขียนไปส่งๆ ด้วยความโมโห หรือว่าเขียนเพราะได้ยินข่าวลือว่าให้#nระมัดระวังในการใช้ชีวิตดีล่ะ..."
51090-29 = "ก็ฉันไปได้ยินข่าวลือว่าชีวิตในโรงเรียนอาจผ่านไปอย่างรวดเร็วทั้งๆ ที่ยังไม่ทันทำอะไรเลยก็ได้น่ะสิ"
51090-30 = "[s] (ข่าวลือ......?)"
51090-31 = "อืม! จริงสิ จะมัวมาขงมาเขินอะไรอยู่กันเล่า!"
51090-36 = "ยูคาริ เธอพูดถูกแล้วละ ฉันมาเข้าชมรมฝึกฝนเพื่อใช้ชีวิตวัยรุ่นของฉัน"
51090-37 = "ที่ผ่านมาฉันทำ <กิจกรรมชมรม> ที่ต้องเปื้อนเหงื่อมาตลอด ก็เลยไม่ได้สนุกกับวัยใสอย่างเต็มที่... ฉันก็เลยมาที่นี่เพื่อตามหาชีวิตวัยรุ่นที่หายไปยังไงล่ะ!"
51090-38 = "...ยูคาริ ฉันไม่รู้หรอกนะว่าเธอมาหาฉันด้วยเหตุผลอะไร แต่ฉันตัดสินใจแล้ว ฉันจะใช้ช่วงชีวิตวัยรุ่น#nที่เหลือของฉันที่ชมรมฝึกฝน เพราะงั้นก็กลับ..."
51090-40 = "อ๊ะ ข้าก็สงสัยเหมือนกันเจ้าค่ะว่ากิจกรรมวัยรุ่นของชมรมฝึกฝนเป็นยังไง!"
51090-41 = "นี่เธอตั้งใจฟังที่ฉันพูดอยู่รึเปล่า?!"
51090-42 = "พอเป็นกิจกรรมที่รุ่นพี่เรนเกะเลือกทำ ข้าก็เลยสนใจขึ้นมาน่ะเจ้าค่ะ!"
51090-43 = "กะ... ก็... กิจกรรมวัยรุ่นที่ฉันทำ... คือ..."
51090-44 = "ฉัน..."
51090-50 = "กำลังฝึกฝนเพื่อเป็น <กุลสตรีนักสู้ที่เพียบพร้อมที่ต่อให้นอนเยอะก็ไม่อ๊อง> อยู่กับชมรมฝึกฝนน่ะ!"
51090-57 = "หา?"
51090-58 = "ฮ้าวว..."
51090-59 = "เรนเกะจัง... มีเป้าหมายแบบนั้นสินะคะ?!"
51090-60 = "[s] \"จะเป็นกุลสตรีที่เพียบพร้อม...? หรือเป็นนักสู้นะ...?\""
51090-65 = "จะได้เป็นอะไรก็ช่างเหอะ!"
51090-66 = "ไม่ว่าจะทางไหนก็เป็นชีวิตวัยรุ่นทั้งนั้นแหละ!"
51090-68 = "งั้นเหรอ... เจ้าคะ..."
51090-69 = "ยูคาริ ฉันเข้าใจนะ เธออาจจะมองว่ามันแปลกก็ได้..."
51090-70 = "มันล้ำเลิศจนน่าตกใจเลยต่างหากเจ้าค่ะ! การวิ่งตามจุดหมายอย่างมุ่งมั่นและไม่ลังเล!"
51090-71 = "สมกับเป็นรุ่นพี่เรนเกะที่ข้าเคารพเลยเจ้าค่ะ!"
51090-72 = "หะ... หืม...?"
51090-77 = "รุ่นพี่คิเคียวก็รู้เรื่องนี้ด้วยไหมเจ้าคะ?"
51090-78 = "ถ้ารุ่นพี่คิเคียวรู้ละก็ ต้องมาให้กำลังใจแน่นอน..."
51090-80 = "กำลังจงกำลังใจอะไรล่ะ! ยัยนั่นน่าจะมาหัวเราะดูถูกกันมากกว่า ถ้าจะไม่อยากบอกให้ใครรู้ ก็มียัยนั่นแหละที่ฉันไม่อยากบอกเป็นที่สุด!"
51090-81 = "เรื่องนั้นช่างเถอะ... ยูคาริ! เธอมีธุระกับฉันไม่ใช่เหรอ ธุระอะไรล่ะ?"
51090-82 = "เจ้าคะ?"
51090-83 = "เจ้าคะเหรอ? อะไรน่ะ...?"
51090-84 = "ก็ตอนนี้ <กิจกรรมชมรม> ของเราถูกพักชั่วคราวอยู่นี่"
51090-85 = "และต่อให้ไม่มีกิจกรรมของชมรม เธอก็น่าจะยุ่งกับการเตรียมงานเทศกาลไม่น้อยเลยด้วย..."
51090-87 = "วะ... ว้ายย!"
51090-88 = "[s] \"......?\""
51090-89 = "ฮืม ที่ข้ามาตามหารุ่นพี่เรนเกะ ก็เพราะมีเหตุผลน่ะสิเจ้าคะ มีแน่นอนอยู่แล้ว!"
51090-90 = "ถ้าอยากรู้ว่าเรื่องอะไรละก็! ข้า ยูคาริผู้นี้! มาตามหารุ่นพี่เรนเกะเพราะอยากได้ความช่วยเหลือจากรุ่นพี่#nเจ้าค่ะ!"
51090-91 = "เพราะว่า... ข้าจะเปิด <ศึกชิงตำแหน่งเฮียกกะเรียวรัน> เจ้าค่ะ!"
51090-96 = "......หา? ศึกชิงตำแหน่ง?"
51090-97 = "เดี๋ยวนะ นี่เธอพูดเรื่องอะไรออกมา?"
51090-99 = "(คุณครูเล่าเรื่องที่เกิดขึ้นในชมรมหยินหยางและเรื่องที่ยูคาริประกาศว่าจะทำให้เรนเกะฟัง)"
51090-101 = "รุ่นพี่คิเคียวพูดถูกเจ้าค่ะ!"
51090-102 = "รุ่นพี่นางุสะอยู่ที่ทุ่งหิมะใหญ่จริงๆ ด้วยเจ้าค่ะ!"
51090-104 = "......"
51090-106 = "เพื่อแก้ไขปัญหาที่เกิดขึ้นในระยะนี้! และเพื่อทำให้เฮียกกะเรียวรันของเรากลับมาเป็นเหมือนเดิม!"
51090-107 = "ข้าจะโค่นรุ่นพี่นางุสะด้วย <ศึกชิงตำแหน่ง>..."
51090-108 = "แล้วรับช่วงตำแหน่งหัวหน้ามาให้ได้เจ้าค่ะ!"
51090-113 = "......"
51090-114 = "รุ่นพี่เรนเกะ! กลับไปด้วยกันเถอะเจ้าค่ะ!"
51090-115 = "กลับไปที่เฮียกกะเรียวรัน... ที่ที่มีรุ่นพี่คิเคียว...! และได้โปรดช่วยเป็นผู้รับรองศึกชิงตำแหน่ง..."
51090-116 = "ยูคาริ... นี่เธอ... ยัง..."
51090-117 = "ยัง..."
51090-118 = "เจ้าค่ะ!"
51090-123 = "ยังพูดเรื่องเหลวไหลอะไรแบบนั้นอยู่อีกเหรอ?"
51090-128 = "...เจ้าคะ?"
51090-129 = "ยูคาริ เธอก็รู้ไม่ใช่เหรอว่าเฮียกกะเรียวรันได้รับคำสั่งสลายตัวมาแล้วน่ะ"
51090-130 = "นี่เป็นการตัดสินใจอย่างแน่วแน่ด้วยสิทธิของที่ปรึกษาคิเคียวนะ"
51090-131 = "คะ? เฮียกกะเรียวรัน...? ได้รับคำสั่งสลายตัว...? มะ... หมายความว่ายังไงคะ..."
51090-132 = "[s] \"มิโมริ พอดีทางนี้มีเรื่องซับซ้อนนิดหน่อยน่ะ...\""
51090-134 = "ปะ... เป็นไปไม่ได้เจ้าค่ะ!"
51090-135 = "รุ่นพี่เรนเกะ! เรื่องคำสั่งสลายตัวมันเป็นความผิดพลาด...!"
51090-137 = "มันไม่ใช่ความผิดพลาดหรอก"
51090-142 = "ตอนที่หัวหน้าอายาเมะหายตัวไป... ฉันก็คิดว่ามันก็เป็นเรื่องที่เป็นไปได้ "
51090-143 = "หัวหน้าเป็นคนที่ยอดเยี่ยม... และคนอื่น... อาจจะรวมถึงเธอด้วย... ต่างก็คิดว่าหัวหน้าเป็นคนที่ต่อให้#nหายตัวไปก็ไม่ใช่เรื่องแปลก"
51090-144 = "...!"
51090-145 = "แต่รุ่นพี่นางุสะที่ต้องรับช่วงต่อ... ก็ไม่หันมามองพวกเราที่เหลืออยู่ แล้วก็มาหายตัวไปอีกคน เพราะบอกว่าจะไปตามหาหัวหน้า"
51090-146 = "เฮียกกะเรียวรันมันจบแล้วละ มันไม่มีอีกต่อไปแล้ว"
51090-148 = "ใช่... ซะที่ไหนล่ะเจ้าคะ!"
51090-149 = "จะ... จริงสิ! รุ่นพี่เรนเกะเพิ่งพิสูจน์ให้เห็นไปไม่ใช่เหรอเจ้าคะ... ว่าเฮียกกะเรียวรันยังไม่จบแค่นี้?!"
51090-150 = "พวกปีศาจไง... รุ่นพี่เรนเกะยังออกไปเล่นงานเจ้าพวกนั้นอยู่เลย...! รุ่นพี่ทำด้วยความรับผิดชอบของ#nเฮียกกะเรียวรันไงเจ้าคะ!"
51090-152 = "ไม่ใช่ อย่าเข้าใจผิดไปหน่อยเลย"
51090-158 = "นั่นก็แค่การกำจัดอุปสรรคที่ขัดขวางการใช้ชีวิตวัยรุ่นของฉัน มันเป็นเรื่องที่ฉันทำเพื่อตัวเองต่างหาก"
51090-160 = "เรนเกะจัง..."
51090-161 = "..."
51090-163 = "แต่ว่า... แต่ว่า... ถ้าไม่มีเฮียกกะเรียวรัน แล้วสันติภาพในเฮียกคิยาโค..."
51090-164 = "เฮ้อ น่าหัวเราะชะมัด เธอนี่มันคิดไปเองแท้ๆ"
51090-165 = "[s] \"คิดไปเองเหรอ หมายความว่ายังไง...?\""
51090-166 = "คุณเป็น... ครูของชาเล่ต์ใช่มั้ย?"
51090-167 = "ครูจำได้ไหมล่ะ? เหตุการณ์ที่ท้องฟ้าเป็นสีแดงเมื่อก่อนหน้านี้น่ะ"
51090-168 = "...!"
51090-173 = "ตอนนั้นเฮียกคิยาโควุ่นวายกันใหญ่เลย"
51090-174 = "ทุกคนเห็นสัตว์ประหลาดโผล่ออกมาจากตามท้องถนน แล้วก็ตามหาคนที่จะช่วยคลี่คลายสถานการณ์นี้#nกันจ้าละหวั่น ใช่แล้วละ ทุกคนตามหาเฮียกกะเรียวรัน"
51090-175 = "แต่ตอนนั้นทั้งหัวหน้า รองหัวหน้า และคนที่หายไป... ก็เอาแต่ไปทางโน้นทีทางนี้ที เหมือนฝูงชนชุลมุน ..."
51090-176 = "ทั้งฉัน ทั้งคิเคียว ทั้งยูคาริต่างก็วิ่งเต้นเพื่อแก้ไขสถานการณ์ แต่มันก็เป็นแค่การดิ้นรนของคนไม่กี่คนเท่านั้น"
51090-177 = "แล้วรู้หรือเปล่า... ว่ามันทำให้เกิดเรื่องอะไร?"
51090-178 = "[s] \"...เกิดเรื่องอะไรขึ้นเหรอ?\""
51090-179 = "ไม่... มันไม่ได้เกิดเรื่องอะไรเลยสักนิด"
51090-185 = "ยูคาริ เธอก็อยู่ในเหตุการณ์ เธอก็น่าจะรู้อยู่แล้วนะว่าต่อให้ไม่มีเฮียกกะเรียวรัน คนที่นี่ก็สามารถ#nคลี่คลายและก้าวผ่านปัญหาได้ และต่อให้ไม่มีเฮียกกะเรียวรัน เฮียกคิยาโคก็ไม่ได้เจอปัญหาอะไร"
51090-186 = "ใช่ มันเป็นสิ่งที่พิสูจน์แล้วว่าไม่มีเฮียกกะเรียวรันอยู่อีกแล้ว"
51090-188 = "ต่อให้ไม่มีหัวหน้า หรือต่อให้รองหัวหน้านางุสะไม่กลับมา... ก็ไม่มีใครได้รับผลกระทบจากการที่ไม่มี#nเฮียกกะเรียวรัน ไม่มีใครเป็นที่ต้องการทั้งนั้น"
51090-190 = "เพราะงั้น กิจกรรมชมรมอะไรพรรค์นั้นน่ะ... "
51090-191 = "ชมรมที่คนรอต้องเจ็บปวดหัวใจน่ะ ไม่ต้องมีก็ไม่เป็นไรหรอก"
51090-192 = "แต่... แต่ว่า..."
51090-193 = "รุ่นพี่... รุ่นพี่เรนเกะเองก็นับถือรุ่นพี่นางุสะนี่เจ้าคะ? รุ่นพี่ชอบกิจกรรมของเฮียกกะเรียวรันด้วย#nไม่ใช่เหรอเจ้าคะ?"
51090-195 = "เรนเกะ... เป็นเด็กที่เก่งกาจมาก ...คนโง่และขี้แยอย่างฉันเทียบเรนเกะไม่ติดเลยละ"
51090-196 = "ฉันภูมิใจในตัวเรนเกะมาก ยูคาริเองก็คิดเหมือนกันใช่ไหม?"
51090-197 = "เจ้าค่ะ!"
51090-198 = "ยูคาริ... นั่นแปลว่าเรนเกะเหนือกว่ารุ่นพี่นางุสะนะ"
51090-199 = "...เจ้าคะ?!"
51090-200 = "พวกเธอนี่ พอกันได้แล้ว แบบนี้คนฟังเค้าก็เขินเป็นนะ?!"
51090-201 = "ฉันไม่ได้ดีใจหรอกนะที่ได้ยินคำแบบนั้นจากคนที่ยอดเยี่ยมแบบนั้นน่ะ ฉันอายมากกว่าอีก"
51090-208 = "...ฮุฮุ"
51090-210 = "ตอนออกไปลาดตระเวนด้วยกัน รุ่นพี่เรนเกะจะนำหน้าตลอดเลย...! รุ่นพี่นางุสะภูมิใจในตัวรุ่นพี่เรนเกะ#nคนนี้มากนะเจ้าคะ!"
51090-211 = "...!!"
51090-212 = "ภูมิใจแล้วมันยังไงล่ะ! พวกเราถูกทิ้งตั้งแต่แรกแล้วต่างหาก"
51090-213 = "อดีตก็แค่อดีต ไม่ว่ายังไงรุ่นพี่นางุสะก็ไม่กลับมาอยู่ดี...!"
51090-214 = "ถึงรุ่นพี่จะบอกว่าตั้งใจจะคืนสิ่งนั้น... ยูคาริ เธอก็ยัง...!"
51090-215 = "[s] (.......คืน?)"
51090-216 = "แต่ว่า..."
51090-217 = "ถึงแม้จะรอมานานแล้ว แต่หากเราเจอรุ่นพี่นางุสะ แล้วมารวมตัวกันได้อีกครั้ง..."
51090-218 = "และถ้าข้าเอาชนะใน <ศึกชิงตำแหน่ง> เพื่อทำแบบนั้นได้...! ถ้าทำแบบนั้นได้ ข้าก็เชื่อว่าเราจะ...!"
51090-219 = "...กลับไปเป็นเหมือนตอนนั้นได้..."
51090-221 = "...ยูคาริ เธอยังเหมือนเมื่อก่อนเลยนะ เป็นเด็กที่ถ้ามีสิ่งที่คิดว่าถูกต้อง ก็จะไม่ล้มเลิกไปง่ายๆ"
51090-223 = "เด็กที่มีความมั่นใจอยู่เสมอ... และถ้าตั้งใจจะทำอะไรแล้ว ก็คิดว่าสามารถทำให้สำเร็จได้ทุกอย่าง..."
51090-224 = "เด็กที่ไม่ยอมแพ้เด็ดขาด..."
51090-227 = "เธอเป็นคนที่ไม่ได้ดีแต่พูด และไม่ยัดเยียดให้คนอื่นเห็นด้วยจนกว่าจะพิสูจน์ด้วยการกระทำ"
51090-231 = "ส่วนทางนี้น่ะ ฉันจะใช้กำลังพิสูจน์ให้เข้าใจกันเอง"
51090-235 = "เข้ามาเลย ยูคาริ!"

[translation]
51090-1 = "Episode 9;Fuwa Renge"
51090-2 = "...What are you doing here, Yukari?"
51090-3 = "I, Yukari, scoured the clubs that specialize in the humanities to find you, Renge! And now my search is complete!"
51090-4 = "But I never expected that you'd be with the Inner Discipline Club."
51090-6 = "Renge asked to join us on a trial basis so she could experience the Inner Discipline Club's activities."
51090-7 = "*yawn* So...that's why...I'm experiencing our activities...now... *snore*"
51090-8 = "Then the Inner Discipline Club promo video must have worked! Right?!"
51090-9 = "I'm sorry, I would have said something earlier if I had realized you two knew each other. But perhaps I should have guessed from that blue haori..."
51090-10 = "Wow, yeah! It's exactly the same! So Renge is part of the Hyakkaryouran too?!"
51090-12 = "Ah, well, yes, but..."
51090-13 = "I-I wasn't trying to hide it or anything like that..."
51090-14 = "I understand. You're just trying to reclaim your youth."
51090-15 = "...Huh?!"
51090-16 = "H-Hold on, Yukari! How do you know about—"
51090-17 = "You told me! And besides, I went looking for you at your home first."
51090-18 = "You were gone, but I found a note reading \"I am off to reclaim my youth!\""
51090-23 = "So Sensei and I made our way through all the clubs you might be visiting!"
51090-24 = "[s] \"Club activities can definitely be called youth activities.\""
51090-25 = "I met all those club members who welcomed you into their clubs and were touched by your pure heart!"
51090-26 = "And I, Yukari, am also touched! I'm glad you're on a quest for your bittersweet youth, Renge! But we have to discuss—"
51090-27 = "H-Hold on! You don't need to embarrass me—quit it with all the \"youth this, youth that\", p-please!"
51090-28 = "I wrote that note in the heat of the moment..."
51090-29 = "People say that student life can end before you know it, so I've been trying to focus on as many club activities as possible..."
51090-30 = "[s] \"(People say that?)\""
51090-31 = "No, wait! Why should I be embarrassed of my dreams?! "
51090-36 = "You're right, Yukari! I came to the Inner Discipline Club to find my youth."
51090-37 = "All that time spent fretting over our club activities like an old maid, sweat on my brow and a frown on my face... I'm taking my youth back!"
51090-38 = "...So, Yukari, I don't know why you've chased me down, but I've already decided to set aside my haori and join the Inner Discipline Club. So whatever it is, no matter how much it hurts, you should head back—"
51090-40 = "What kind of youth activities does the Inner Discipline Club partake in?"
51090-41 = "Are you even listening to me?!"
51090-42 = "I just want to know what you've been up to, Renge!"
51090-43 = "A-Ah, then... My youth activities are... I..."
51090-44 = "I..."
51090-50 = "I've joined the Inner Discipline Club in order to become a calm and cultivated lady! And a battler who has mastered beauty sleep!"
51090-57 = "...Eh?"
51090-58 = "*yawn*"
51090-59 = "So that was your goal, Renge?"
51090-60 = "[s] \"...So do you want to be a calm and cultivated lady? Or a master of beauty sleep?\""
51090-65 = "Both! Either! It doesn't matter!"
51090-66 = "Whichever way I choose, it's y-youth! "
51090-68 = "Oh my..."
51090-69 = "Do you think it's strange, Yukari...?"
51090-70 = "It's amazing! You always run straight towards your goals, without a moment's hesitation!"
51090-71 = "It's what I admire most about you, Renge!"
51090-72 = "O-Oh, r-really...?"
51090-77 = "Does Kikyou know about this?"
51090-78 = "I'm sure she would cheer you on with all her strength..."
51090-80 = "No way! I can just see her smirking at me mysteriously if I tried! She's the person I want to tell the least!"
51090-81 = "M-More importantly, Yukari, it's my turn to ask questions! Why were you looking for me?"
51090-82 = "Hmm?"
51090-83 = "Don't play hard of hearing. You know what I asked..."
51090-84 = "Our club has been disbanded. Our activities are suspended."
51090-85 = "You should be getting ready to enjoy the festival as a normal student..."
51090-87 = "Never!"
51090-88 = "[s] \"...\""
51090-89 = "Um, I mean... Of course I have a reason for seeking you out! ...I don't have anything to hide, after all!"
51090-90 = "I, Yukari, am here because I require your aid!"
51090-91 = "With... With you as my witness, I invoke the Hyakkaryouran Succession Contest!"
51090-96 = "...What."
51090-97 = "...Why bring up a succession contest all of a sudden?"
51090-99 = "We told Renge everything we learned at the Yin-Yang Club and Yukari repeated her declaration."
51090-101 = "Kikyou was right!"
51090-102 = "Nagusa truly traveled to the Great Snowfield!"
51090-104 = "..."
51090-106 = "So our path forward is clear! We can fix everything and return the Hyakkaryouran to the way it was before!"
51090-107 = "I shall defeat Nagusa in a succession contest, and..."
51090-108 = "And then I shall assume the presidency!"
51090-113 = "..."
51090-114 = "Renge! Let's return together!"
51090-115 = "We can find Kikyou and reunite the Hyakkaryouran! Please...witness my succession contest!"
51090-116 = "Yukari... You..."
51090-117 = "You're still..."
51090-118 = "Yes!"
51090-123 = "You're still going on about all that nonsense?!"
51090-128 = "Wh-What?"
51090-129 = "Yukari, the Hyakkaryouran has already disbanded."
51090-130 = "Kikyou decreed it personally, upon her authority as the operations officer."
51090-131 = "Huh? The Hyakkaryouran...disbanded? Wh-When?"
51090-132 = "[s] \"It's a complicated story, Mimori...\""
51090-134 = "Sh-She would never!"
51090-135 = "Renge, the order to disband must be a mistake!"
51090-137 = "There's no mistake."
51090-142 = "When President Ayame disappeared... Well, none of us were shocked—we knew something like that might happen. "
51090-143 = "The president is an amazing person and I wish you could have known her better...but we all assumed that she might vanish at any time. It's hard to explain..."
51090-144 = "...!"
51090-145 = "But then Nagusa, who should have taken the reins as the new president, abandoned us without a second thought. She left to find the president..."
51090-146 = "It was already over for the Hyakkaryouran. We were already dead. We just hadn't stopped moving."
51090-148 = "That's not... That can't be true!"
51090-149 = "The Hyakkaryouran still lives... You proved it just now!"
51090-150 = "You still stopped the Mouryo from causing chaos! What is that, if not the duty of the Hyakkaryouran?!"
51090-152 = "I didn't do that for the Hyakkaryouran. I did it to reclaim the years I stupidly sacrificed for it."
51090-158 = "The Mouryo were an obstacle to my reclaimed youth. I stopped them for myself."
51090-160 = "Renge..."
51090-161 = "..."
51090-163 = "But... But... Without the Hyakkaryouran, Hyakkiyako's peace will..."
51090-164 = "Ha, you really don't know anything, do you?"
51090-165 = "[s] \"What do you mean?\""
51090-166 = "You're Schale's Sensei, right?"
51090-167 = "Do you remember, Sensei? When the sky turned red?"
51090-168 = "...!"
51090-173 = "Hyakkiyako was consumed by chaos."
51090-174 = "Monsters rampaged through the streets and the students cried out desperately for someone to save them, for the Hyakkaryouran to save them."
51090-175 = "But without the president and vice president, we... We ran around like headless chickens."
51090-176 = "Me, Kikyou... And you too, Yukari! We scrambled to resolve the situation to the best of our abilities, but we barely helped anyone on our own."
51090-177 = "And you know what happened as a result?"
51090-178 = "[s] \"...What happened?\""
51090-179 = "Nothing. Nothing at all."
51090-185 = "Yukari, stop living in a dream. You saw it as well as I did. People can solve their problems without the Hyakkaryouran. Hyakkiyako will be just fine without us."
51090-186 = "It took the Hyakkaryouran's absence to prove we were never necessary."
51090-188 = "Even if the president and vice president never return... No one is going to suffer because the Hyakkaryouran isn't around. Nobody needs us."
51090-190 = "Our club...the things we did... "
51090-191 = "In the end we were only a club that wasted peoples' time and caused them pain. It's right that we disappear."
51090-192 = "But...but..."
51090-193 = "Renge! You admired Nagusa too! You loved the Hyakkaryouran, I know you did!"
51090-195 = "Renge possesses an indomitable heart... She's quite inspiring to a wavering spirit like mine."
51090-196 = "We owe much to Renge. You think so as well, don't you Yukari?"
51090-197 = "Definitely!"
51090-198 = "Bold of you to tell Nagusa that you think Renge is more impressive, Yukari."
51090-199 = "Wh-What?! No, I—"
51090-200 = "Hey, don't tease her cause you want to embarrass me! Some things are too much to hear, you know?!"
51090-201 = "...It's weird to hear heartfelt praise from someone so refined."
51090-208 = "...Heehee."
51090-210 = "You were always there for us! You kept our spirits up on long patrols and you always had our backs! I-I was proud of you! Nagusa was proud of you!"
51090-211 = "...!!"
51090-212 = "Who cares?! That didn't keep her from abandoning us!"
51090-213 = "You can't change the past! Even beyond the fact that Nagusa won't come back!"
51090-214 = "She already... Even though she tried to return it, you still—!"
51090-215 = "[s] \"(...Return?)\""
51090-216 = "But..."
51090-217 = "I know it has been a long time. But still...if we gather everyone again... If we meet Nagusa... And if I win the succession contest...!"
51090-218 = "If we do that, everything can go back to how it was! We'll all be together again!"
51090-219 = "Back to how it was..."
51090-221 = "...Yukari. You've always been like this. If you think something is right, you charge forward, full tilt."
51090-223 = "You always acted like anything was possible if you really put your heart into it... I admired that about you..."
51090-224 = "But that's why I know that my words are nowhere near enough to get you to back down."
51090-227 = "You're not the type to be convinced until something is proven by action."
51090-231 = "So I'll convince you with my strength here and now."
51090-235 = "Here I come, Yukari!"

[translation]
1601202-1 = "New Year, New Clothes! New Me?"
1601202-3 = "L'Oiseau Bleu Bakery"
1601202-4 = "After getting a call from Junko, I made my way to L'Oiseau Bleu."
1601202-5 = "Welcome to L'Oiseau Bleu!"
1601202-6 = "Oh, hey there, Sensei. What do you think?"
1601202-7 = "[s] \"So, what you wanted to show me was...\""
1601202-8 = "This kimono! Yep."
1601202-9 = "L'Oiseau Bleu gave us these to wear for New Year's."
1601202-10 = "But it's optional, so no one is being forced into one."
1601202-11 = "[s] \"You say optional, but the shop is full of kimonos...\""
1601202-15 = "Yeah! Most people really liked the idea."
1601202-16 = "...Why do you keep looking around?"
1601202-17 = "Me! Look at me, Sensei! That's who you're here for!"
1601202-18 = "Okay, well don't stare too much! Seriously...find a balance."
1601202-19 = "S-So, what do you think?"
1601202-20 = "What? No, about the outfit! I'm asking you how you think I look!"
1601202-21 = "[s] \"Looks good on you, Junko.\""
1601202-22 = "Oh. I see."
1601202-23 = "That's it?"
1601202-24 = "No, yeah. I'm not mad. It's fine. *sigh* It's just.."
1601202-25 = "[s] \"You're so super mega cute, Junko! The best! The prettiest! I wanna take you home!\""
1601202-26 = "Wh-What the hell is wrong with you?! What are you planning on doing to me there?!"
1601202-27 = "Seriously, just find a balance that perfectly suits what I'm thinking!"
1601202-28 = "Anyway, the important thing is that I like this kimono quite a lot."
1601202-29 = "In fact, I want to borrow it so I can wear it outside too."
1601202-30 = "But to do that, I would need to pay to rent and clean it..."
1601202-31 = "Which means I need more money and thus more work... *sigh*"
1601202-32 = "[s1] \"Reality is full of sacrifice...\"\n[s2] \"Desire begets sacrifice...\""
1601202-35 = "Right, sacrifice, exactly what I was thinking."
1601202-36 = "So, we already agree that you should make a sacrifice and buy the most expensive things on the menu!"
1601202-37 = "[s3] \"I've been deceived! Bamboozled! But I have no choice!\"\n[s4] \"Why stop at expensive things? I'll order everything!\""
1601202-40 = "I-I was just kidding! So are you, right? Right?!"
1601202-41 = "[s] \"The waitress is so pretty that I'm compelled to splurge!\""
1601202-42 = "N-No! I mean... I was just...!"
1601202-43 = "[s] \"But also, I really do want to try L'Oiseau Bleu's New Year's menu!\""
1601202-44 = "I-I get that..."
1601202-45 = "But do you actually want this much?"
1601202-46 = "Your order was serious? O-Okay..."
1601202-47 = "I got your order..."
1601202-57 = "..."
1601202-58 = "*sigh* What did I say..."
1601202-59 = "[s] \"...That I was ordering too much?\""
1601202-60 = "Ugh, you never listen to me."
1601202-61 = "What are you gonna do with all this? You didn't even touch half of it."
1601202-62 = "You have a good idea? I have a feeling this is going to take a weird turn..."
1601202-63 = "Hm? You need someone to eat with?"
1601202-64 = "[s5] \"Let's finish this together, Junko.\"\n[s6] \"I wanna eat with you.\""
1601202-67 = "What are you saying?! I'm working right now..."
1601202-68 = "B-But, if you insist..."
1601202-72 = "I think the manager will be fine with it..."
1601202-73 = "I have no choice! I'll eat with you!"
1601202-76 = "Junko sat by me as we slowly worked through all the cakes."
1601202-81 = "I said I enjoyed our date. She punched me."

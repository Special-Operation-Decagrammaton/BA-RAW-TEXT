[translation]
1601202-1 = "新年穿新衣！"
1601202-3 = "西式糕點店「L'Oiseau．Bleu」"
1601202-4 = "（收到淳子的聯絡後，來到了「L'Oiseau Bleu」）"
1601202-5 = "歡迎光臨「L'Oiseau Bleu」！"
1601202-6 = "啊，老師！你來了啊！我就直接問了，怎麼樣，怎麼樣呀？"
1601202-7 = "[s]「問我『怎麼樣』，是指……」"
1601202-8 = "沒錯，就是這套和服！"
1601202-9 = "為了迎接新年，特別開放可以穿著和服工作哦！"
1601202-10 = "因為不是強制規定，也可以選擇不穿就是了。"
1601202-11 = "[s]「確實，聽你這麼一說，店裡……」"
1601202-15 = "嗯！一半以上都穿著和服對吧？"
1601202-16 = "……話說老師。"
1601202-17 = "別看別人，請看著我啊！不然叫老師來不就沒有意義了嗎！"
1601202-18 = "……也不要突然一直盯著我看呀！為什麼要那麼極端……"
1601202-19 = "所，所以呢，覺得怎麼樣？"
1601202-20 = "問，問我什麼怎麼樣……適不適合啦！"
1601202-21 = "[s]「當然，非常適合你唷。」"
1601202-22 = "哼……"
1601202-23 = "……感想就只有這樣嗎？"
1601202-24 = "唔嗯……算了，畢竟是老師，我也想過可能就是這樣而已。唉……"
1601202-25 = "[s]「全世界最適合唷淳子！好可愛，最可愛了！好想外帶！！」"
1601202-26 = "你，你在說什麼啊！？把我帶回去想做什麼！？"
1601202-27 = "啊啊真是的，到底為什麼一定要那麼極端啊！"
1601202-28 = "……總之，我也挺喜歡這件和服的。"
1601202-29 = "甚至租了一陣子，連在店外也想穿。"
1601202-30 = "但是，這樣就得支付租金和洗衣費……"
1601202-31 = "結果……就是我得更認真打工才行。"
1601202-32 = "[s1]「這個世界果然沒那麼容易呢……」\n[s2]「為了獲得想要的東西，就必須做出犧牲……」"
1601202-35 = "簡單來說就是這樣。唔嗯……"
1601202-36 = "既然如此……就讓老師點一堆最貴的餐點，讓營業額暴漲吧？"
1601202-37 = "[s3]「多麼邪惡的手段啊！那就沒辦法了！」\n[s4]「從這裡到那裡我全都要！」"
1601202-40 = "我開玩笑的……等等，咦！？我，我是開玩笑的啦！為什麼要當真啊！？"
1601202-41 = "[s]「難得有可愛的女服務生，當然要點貴的囉。」"
1601202-42 = "我，我的意思是……！"
1601202-43 = "[s]「而且我也想吃吃看『L'Oiseau Bleu』的新年餐點！」"
1601202-44 = "那，那就沒辦法了……"
1601202-45 = "話說，就算這樣也不用點那麼多吧？"
1601202-46 = "咦，客人點餐就該接受？唔，唔嗯……"
1601202-47 = "那，好吧，感謝您的點餐……"
1601202-57 = "……"
1601202-58 = "我就說吧……"
1601202-59 = "[s]「果然點太多了嗎……？」"
1601202-60 = "真是的，都不聽別人說話。"
1601202-61 = "這些該怎麼辦啊，一半以上都沒吃過。"
1601202-62 = "咦，你有個好主意？什麼主意？"
1601202-63 = "只要呼叫增援就好……？"
1601202-64 = "[s5]「一起吃吧，淳子。」\n[s6]「淳子不想一起吃嗎？」"
1601202-67 = "啊！？我，我姑且也是這裡的服務生，而且還在上班時間哦……！？"
1601202-68 = "但，但是，既然你都這麼說了……"
1601202-72 = "……為什麼店長也遠遠地比出OK的手勢啊。"
1601202-73 = "啊啊真是，沒辦法了！就一起吃吧！"
1601202-76 = "（和淳子並排坐著，慢慢享用了蛋糕）"
1601202-81 = "（回去時和淳子說了「約會真開心呢」之後，莫名其妙地被打了一頓）"

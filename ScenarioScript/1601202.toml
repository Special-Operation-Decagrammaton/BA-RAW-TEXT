1601202-9 = "3;준코 새해;12;새해를 맞아 <르와조 블뢰> 에서 기모노를 입은 채 아르바이트를 해도 좋다고 했거든!"
1601202-10 = "3;준코 새해;12;물론 어디까지나 자기 선택이니까, 입기 싫으면 안 입어도 되지만.\n#3;em;[...]"

[translation]
1601202-1 = "ปีใหม่ก็ต้องใส่ชุดใหม่!"
1601202-3 = "ร้านขนมหวาน <ลูวาโซ บลู>"
1601202-4 = "(มาถึงร้านลูวาโซ บลู ตามที่จุนโกะบอก)"
1601202-5 = "ร้านขนมหวาน <ลูวาโซ บลู> ยินดีต้อนรับค่าาาาา!"
1601202-6 = "อ๊ะ มาแล้วเหรอคุณครู? เป็นไง ดูเป็นยังไงบ้าง?"
1601202-7 = "[s] \"ที่บอกว่ามีบางอย่างจะให้ดู...\""
1601202-8 = "ใช่แล้ว! ชุดกิโมโนนี่ไงล่ะ"
1601202-9 = "ตอนนี้เป็นช่วงปีใหม่ ทางร้านลูวาโซ บลูเลยบอกว่าจะใส่ชุดกิโมโนมาทำงานพาร์ทไทม์ได้น่ะ!"
1601202-10 = "แต่นอนว่าไม่ได้บังคับหรอก ถ้าไม่อยากใส่ก็ไม่ต้องใส่ก็ได้น่ะ"
1601202-11 = "[s] \"ถึงบอกว่าไม่ได้บังคับ แต่ทุกคนก็ใส่กันหมดเลยนะ...\""
1601202-15 = "อื้อ! ส่วนใหญ่ก็ใส่กิโมโนกันหมดเลยแหละ?"
1601202-16 = "ว่าแต่ว่า... ทำไมเอาแต่มองทางอื่นแบบนั้นล่ะ?"
1601202-17 = "มองฉันนี่ หันมามองฉันสิ! ฉันเรียกคุณครูมาที่นี่เพราะให้มาดูชุดฉันนะ!"
1601202-18 = "ไม่ได้บอกให้จ้องเขม็งแบบนั้นสักหน่อย! จริงๆ เลย... ไม่รู้จักทำให้พอดีๆ เอาซะเลย"
1601202-19 = "ละ...แล้ว... คิดว่ายังไงบ้าง?"
1601202-20 = "ถามว่าคิดว่ายังไงบ้างไงเล่า? หมายถึงชุดนี้เหมาะกับฉัน...หรือเปล่า..."
1601202-21 = "[s] \"เหมาะกับจุนโกะดีนะ\""
1601202-22 = "อืม..."
1601202-23 = "แค่นั้นเองเหรอ? อืม..."
1601202-24 = "ก็นะ สมกับเป็นคุณครูดี คงพูดแค่นี้แหละเนอะ... เฮ้ออออ..."
1601202-25 = "[s] \"เหมาะกับจุนโกะที่สุดในโลกเลย! น่ารักตะโกน!! สวยจนอยากหนีบกลับบ้านเลย!!\""
1601202-26 = "อะ... อะไรกันเล่า! จะหนีบฉันกลับบ้านทำไมกัน!"
1601202-27 = "จริงๆ เลยเชียว หัดรู้จักคำว่าพอดีๆ ซะบ้างสิ!"
1601202-28 = "ยังไงก็เถอะ ฉันชอบกิโมโนตัวนี้มาก..."
1601202-29 = "ก็เลยอยากยืมใส่ไปเดินเที่ยวนอกร้านด้วยน่ะ"
1601202-30 = "แต่ว่าถ้าทำแบบนั้นก็ต้องจ่ายค่ายืมชุดกับค่าซักรีด..."
1601202-31 = "เพราะงั้นเลยต้องตั้งใจทำงานพาร์ทไทม์เพื่อหาเงินเพิ่มไงล่ะ ฮะฮะฮะ..."
1601202-32 = "[s1] \"ความจริงที่น่าเศร้าสินะ...\"\n[s2] \"ต้องเสียสละบางอย่างเพื่อไขว่คว้าสิ่งที่อยากได้มาสินะ\""
1601202-35 = "ก็แบบนั้นแหละ... แต่ไหนๆ ก็เป็นแบบนั้นแล้ว"
1601202-36 = "ฉันก็จะแนะนำแต่เมนูแพงๆ ให้คุณครู เพื่อเพิ่มยอดขายให้ร้านเลยดีมั้ย?"
1601202-37 = "[s3] \"ร้ายกาจมาก แต่ช่วยไม่ได้นะ... เอามาเลย!\"\n[s4] \"เอาทุกอย่างที่มี ทุกเมนูที่ขายมาให้หมดเลย!\""
1601202-40 = "อะไรกัน ฉันก็แค่ล้อเล่นเอง... เดี๋ยวก่อนสิ! บอกว่าล้อเล่นไงเล่า! ทำอะไรน่ะ!"
1601202-41 = "[s] \"พนักงานเสิร์ฟน่ารักขนาดนี้ ครูก็ต้องสั่งของแพงๆ สิ...\""
1601202-42 = "ดะ... เดี๋ยวก่อน! หมายถึง... ฉันแค่...!"
1601202-43 = "[s] \"ครูเองก็อยากลองชิมเมนูปีใหม่ของลูวาโซ บลู เหมือนกัน!\""
1601202-44 = "ถะ... ถ้าพูดแบบนั้นก็ช่วยไม่ได้..."
1601202-45 = "แต่ยังไงก็เถอะ ไม่เห็นต้องสั่งเยอะขนาดนี้เลยนี่นา?"
1601202-46 = "หะ... ให้ฉันรับออเดอร์เลยงั้นเหรอ? ขะ... เข้าใจแล้ว..."
1601202-47 = "รับออเดอร์เรียบร้อยค่ะ..."
1601202-57 = "..."
1601202-58 = "เห็นมั้ยล่ะ ฉันบอกแล้ว..."
1601202-59 = "[s] \"สั่งเยอะเกินไปรึเปล่านะ?\""
1601202-60 = "อึก... เตือนแล้วไม่ฟังเองนะ"
1601202-61 = "แล้วทีนี้จะทำยังไงล่ะ? ยังกินไปไม่ถึงครึ่งหนึ่งของที่สั่งมาเลยนะ"
1601202-62 = "มีวิธีดีๆ งั้นเหรอ? คงไม่ได้คิดจะทำอะไรเพี้ยนๆ อีกใช่มั้ย..."
1601202-63 = "เอ๋? ต้องการคนมาช่วยกินเหรอ?"
1601202-64 = "[s5] \"มากินด้วยกันเถอะจุนโกะ\"\n[s6] \"ครูอยากให้จุนโกะมากินด้วยกันจัง...\""
1601202-67 = "พูดบ้าอะไรน่ะ! ฉันเป็นพนักงานพาร์ทไทม์นะ...! "
1601202-68 = "ตะ... แต่ถ้าจะทำหน้าอ้อนกันขนาดนั้นละก็... "
1601202-72 = "คะ...คิดว่าคุณผู้จัดการก็คงไม่ว่าอะไร"
1601202-73 = "งั้นก็ช่วยไม่ได้นะ! ฉันจะช่วยกินเอง!"
1601202-76 = "(คุณครูกับจุนโกะนั่งกินเค้กด้วยกันอย่างเพลิดเพลิน...)"
1601202-81 = "(พอคุณครูพูดล้อเล่นว่าเป็นเดตที่สนุกมาก ก็ถูกจุนโกะตีเข้าอย่างแรง)"

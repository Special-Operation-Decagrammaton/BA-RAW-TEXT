2601503-7 = "3;이치카 수영복;99;실은, 잠이 안 와서요."
2601503-8 = "3;이치카 수영복;01;……아아, 선생님께서도 똑같군요."
2601503-9 = "3;이치카 수영복;02;네? 모처럼이니 함께 밤 산책이나 하자고요?\n#3;em;[?]"
2601503-10 = "3;이치카 수영복;11;오…… 뜻밖의 부수입.\n#fontsize;50"
2601503-11 = "3;이치카 수영복;00;어, 아뇨, 그냥 혼잣말입니다."

2601503-19 = "[s] \"고민이라도 있어?\""
2601503-20 = "3;이치카 수영복;02;……네? 갑자기요?\n#3;em;[?]"
2601503-21 = "3;이치카 수영복;04;어, 음…… 당황스럽네요. 그야, 저는 그런 이미지가 아니잖슴까?\n#3;stiff"
2601503-22 = "3;이치카 수영복;20;자주 듣는 질문은 아니라서 조금 놀랐을 뿐임다.\n#3;em;[땀]"
2601503-23 = "3;이치카 수영복;99;뭐, 저도 사람이니까, 이것저것 고민이야 있죠? 그렇지만……."
2601503-24 = "3;이치카 수영복;01;굳이 선생님께 상담 드릴 만한 내용은 없네요."
2601503-25 = "3;이치카 수영복;00;이런 느낌임다.\n#3;em;[음표]"
2601503-26 = "[s] \"그러면 다음 질문! 바다에는 자주 와?\""
2601503-27 = "3;이치카 수영복;20;얼레……? 그런 느낌 질문이었슴까……?\n#3;em;[?]"
2601503-28 = "3;이치카 수영복;04;그렇게 자주는…… 아, 자꾸 나쁜 버릇이 나오네요. 그냥 솔직히 말하면 되는데."
2601503-29 = "3;이치카 수영복;01;바다에 와본 건, 처음이네요.\n#3;m4"
2601503-30 = "3;이치카 수영복;02;이유…… 이유 말입니까? 음, 별로 재밌는 사연이 있는 건 아닌데요."
2601503-31 = "3;이치카 수영복;05;게다가, 으음~ 아니, 이건 너무 진지한 대답 같은데…….\n#3;em;[속상함]"
2601503-32 = "3;이치카 수영복;01;뭐랄까, 정의실현부는 모두 이렇다! 하고 딱 잘라 말할 정도는 아니지만, 여기 지원하는 아이들은 대부분 진지한 편이라서요."
2601503-33 = "3;이치카 수영복;00;다들 금욕적이라 할까, 그러려 한다 할까…… 뭐, 실제로 어떤지는 둘째 치고라도요. 하하."

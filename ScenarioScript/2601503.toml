[translation]
2601503-1 = "Anonymous Girl"
2601503-4 = "Ah."
2601503-5 = "Sensei? What're you doing up?"
2601503-6 = "Haha, but I guess I can't say anything. I'm up too, after all."
2601503-7 = "I was just having trouble falling asleep."
2601503-8 = "Eh? You too, Sensei?"
2601503-9 = "You...want to go for a walk together, in that case?"
2601503-10 = "Oh... What an unexpected bonus."
2601503-11 = "Hm? Nothing. Heehee. I was just talking to myself."
2601503-12 = "I'd love to. Please, lead the way."
2601503-18 = "..."
2601503-19 = "[s] \"Something on your mind?\""
2601503-20 = "...Hm? Why do you ask?"
2601503-21 = "Sorry, I was just surprised. I try not to let people see me worry, you know?"
2601503-22 = "I guess you caught me off guard."
2601503-23 = "What I'm trying to say is..."
2601503-24 = "I mean, I have the same worries any high school girl would."
2601503-25 = "But nothing drastic enough to be burdening you with."
2601503-26 = "[s] \"Next question! Do you come to the sea often?\""
2601503-27 = "Eh? That's what you want to know?"
2601503-28 = "I wouldn't say often— Well, I guess I can be honest with you."
2601503-29 = "This is my first time, actually."
2601503-30 = "...Why haven't I before? There's no big reason."
2601503-31 = "Well, if I really thought about it..."
2601503-32 = "Obviously I can't speak for every single member of the Justice Task Force, but you don't generally join up unless you're a pretty serious type."
2601503-33 = "Regardless of their actual dispositions, they all try to be pretty ascetic."
2601503-37 = "You know what I'm talking about, right, Sensei?"
2601503-38 = "[s1] \"Yeah... They definitely do.\"\n[s2] \"Really? Is that how it is?\""
2601503-41 = "You're signing away your carefree high school life when you join the Justice Task Force, in a way.  "
2601503-42 = "So I guess I'm just not very used to going out and having fun."
2601503-43 = "But why did you ask that?"
2601503-44 = "[s3] \"Well, you've been pretty even-keeled about the whole experience.\"\n[s4] \"People tend to get pretty excited about being at the beach.\""
2601503-47 = "Ahhh. You're right. Who doesn't love a good beach episode, right?"
2601503-48 = "But you really shouldn't judge a book by its cover. You should know that about me by now."
2601503-49 = "I might look like this, but maybe I'm just brimming with excitement on the inside."
2601503-53 = "...Hey, don't even try to call me out. I know you don't believe me."
2601503-54 = "You always seem to squirm through my people-pleasing tendencies. Hmph."
2601503-55 = "Hm... Well, can I be honest here?"
2601503-59 = "It's not anything super serious, to be clear. I just wouldn't want you to take it the wrong way."
2601503-60 = "Well, I think if it's you, you'll understand. I'm gonna say it."
2601503-61 = "...It's hard for me to find a reason to be excited about this."
2601503-62 = "The beach isn't THAT much more outstanding from anywhere else, is it?"
2601503-63 = "I go to other schools and districts for work a lot."
2601503-64 = "And coming here feels more or less the same as that. Like a business trip, I guess."
2601503-65 = "I sound pretty ungrateful, don't I? A lot of members would've killed to come in my place."
2601503-66 = "...I really should've just kept my mouth shut."
2601503-67 = "[s5] \"No, thank you for sharing with me.\"\n[s6] \"I'm happy to hear what you've been thinking.\""
2601503-70 = "It still doesn't really make sense to me, but people started expecting great things from me at one point or another."
2601503-71 = "So I figured I should meet their expectations."
2601503-72 = "...Saying it out loud makes it sound worse than it is."
2601503-73 = "Hm? Is it not hard?"
2601503-74 = "Well... It's not like I'm the only person in the world who feels this way."
2601503-75 = "Everyone deals with this, in one form or another."
2601503-76 = "In fact, I'd say that you and my seniors have it way worse than I do."
2601503-80 = "...Wait a second."
2601503-81 = "How did this turn into a counseling session?"
2601503-82 = "[s7] \"I-I don't know what you're talking about.\"\n[s8] \"Did you read my mind?!\""
2601503-85 = "Hah. I always get swept up in the conversation when it's you and me, Sensei."
2601503-86 = "It's not a bad thing, of course. I'm actually...really grateful for it."
2601503-87 = "It's just hard to hide the parts of me I don't want you to see, sometimes."
2601503-88 = "I do feel a little unburdened now!"
2601503-89 = "I'll sleep well tonight, so..."
2601503-90 = "Thank you!"
2601503-92 = "Ichika and I walked together along the shore for a bit longer. By the time we got back, it was already past midnight."

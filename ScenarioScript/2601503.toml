[translation]
2601503-1 = "เด็กสาวนิรนาม"
2601503-4 = "เอ๋?"
2601503-5 = "คุณครูหรือเปล่าคะ? ดึกดื่นป่านนี้ ออกมาทำอะไรคะ?"
2601503-6 = "ฉันถามคุณครูแบบนั้น แต่ฉันก็ออกมาข้างนอกเหมือนกันนะคะเนี่ย... แหะๆ"
2601503-7 = "ที่จริงฉันนอนไม่หลับน่ะค่ะ"
2601503-8 = "อ่า... คุณครูก็เหมือนกันสินะคะ"
2601503-9 = "คะ? ไหนๆ ก็นอนไม่หลับทั้งคู่แล้ว งั้นก็ไปเดินเล่นกันงั้นเหรอคะ?"
2601503-10 = "โอ้... ได้กำไรชีวิตเฉยเลย"
2601503-11 = "อ๊ะ ไม่มีอะไรค่ะ ฉันแค่บ่นอะไรคนเดียวน่ะค่ะ"
2601503-12 = "ฉันก็อยากไปค่ะ งั้นไปกันเถอะค่ะ ฮิฮิ"
2601503-18 = "......"
2601503-19 = "[s] \"มีเรื่องกังวลอะไรหรือเปล่า?\""
2601503-20 = "คะ...? ทำไมจู่ๆ ถึงถามล่ะคะ?"
2601503-21 = "อ่า อืม... ถามแบบนี้ฉันไปไม่เป็นเลย ก็แบบ... ปกติแล้วฉันไม่ได้มีภาพลักษณ์แบบนั้นไม่ใช่เหรอคะ?"
2601503-22 = "พอได้ยินคำถามที่ไม่คุ้นเคย ฉันก็เลยตกใจขึ้นมาน่ะค่ะ"
2601503-23 = "แต่ก็นะ ฉันก็เป็นมนุษย์คนหนึ่ง ย่อมมีเรื่องนู่นนี่ให้กังวลเป็นธรรมดาค่ะ แต่ว่า..."
2601503-24 = "มันไม่ใช่เรื่องใหญ่จนต้องปรึกษาคุณครูนี่สิคะ"
2601503-25 = "ฉันไม่อยากรบกวนด้วยค่ะ"
2601503-26 = "[s] \"งั้นคำถามต่อไป! มาทะเลบ่อยหรือเปล่า?\""
2601503-27 = "เอ๋...? เปลี่ยนเป็นถามเรื่องแบบนี้แทนเหรอคะ...?"
2601503-28 = "ก็ไม่ได้บ่อย... อ๊ะ ฉันเผลอแสดงนิสัยไม่ดีออกมาอยู่เรื่อยเลยค่ะ ฉันควรจะแค่ตอบตามตรงแท้ๆ"
2601503-29 = "นี่เป็นครั้งแรกที่ฉันได้มาทะเลค่ะ"
2601503-30 = "เหตุผล... เหตุผลน่ะเหรอคะ? อืม... มันไม่ใช่เรื่องราวที่น่าสนใจมากนักหรอกค่ะ"
2601503-31 = "อีกอย่าง อืม~ ไม่สิ แบบนี้มันจะเป็นคำตอบที่จริงจังมากไปหรือเปล่า..."
2601503-32 = "จะว่ายังไงดีล่ะ ถึงจะบอกได้ไม่เต็มปากว่า 'ชมรมทวงความยุติธรรมก็เป็นอย่างนี้กันทุกคน!' แต่คนที่สังกัดชมรมนี้ส่วนใหญ่เป็นคนจริงจังกันทั้งนั้นน่ะค่ะ"
2601503-33 = "ทุกคนต่างบังคับใจตนเอง หรือไม่ก็พยายามจะเป็นคนแบบนั้น... ไม่ว่าจริงๆ แล้วตัวเองเป็นแบบไหน#nก็ตามค่ะ แหะๆ"
2601503-37 = "คุณครูเองก็น่ารู้สึกได้บ้างนะคะ"
2601503-38 = "[s1] \"มันก็... มีมุมแบบนั้นอยู่จริงๆ นะ\"\n[s2] \"เป็นแบบนั้นกันเหรอ?\""
2601503-41 = "ก็ใช่น่ะสิคะ เอาเถอะค่ะ สรุปว่าแต่ละคนเหมือนจะ~ แอบยอมแพ้ต่อชีวิตที่สนุกสนานในโรงเรียน แล้วมาเข้าชมรมนี้น่ะค่ะ  "
2601503-42 = "ในบรรยากาศแบบนี้ ถ้าฉันออกมาเที่ยวเล่นอยู่คนเดียว~ มันก็จะไม่เหมาะไม่ใช่เหรอคะ?"
2601503-43 = "ว่าแต่ทำไมคุณครูถึงสงสัยเรื่องนี้ล่ะคะ?"
2601503-44 = "[s3] \"มาทะเลทั้งที แต่ครูเห็นว่าอิจิกะสุขุมมากน่ะ...\"\n[s4] \"ปกติมาทะเลเราต้องตื่นเต้นกันไม่ใช่เหรอ?\""
2601503-47 = "อ่า~ ทะเลมีภาพลักษณ์ของความตื่นเต้นและสนุกสนานสินะคะ~"
2601503-48 = "อืม... แต่ถ้าดูจากภายนอกก็ไม่รู้หรอกค่ะ อย่างที่คุณครูอาจจะรู้ว่าฉันไม่ใช่คนประเภทที่ชอบแสดง#nความรู้สึกออกมามากนัก"
2601503-49 = "แต่คุณครูไม่รู้หรอกค่ะว่าในใจฉันตื่นเต้นแค่ไหน"
2601503-53 = "ถึงจะพูดแบบนี้เพื่อเลี่ยงๆ ดู~ แต่พออีกฝ่ายเป็นคุณครู วิธีนี้ก็ไม่ได้ผลนะคะ แหะๆ"
2601503-54 = "ฉันคิดว่าฉันค่อนข้างเก่งในการพูดสิ่งที่คนอื่นอยากได้ยินเสียอีก เฮ้อ เจอแบบนี้ก็หมดกำลังใจ#nนิดหน่อยนะคะ~"
2601503-55 = "เอ่อ... อันนี้ฉันพูดได้มั้ยนะ?"
2601503-59 = "อ่า บอกล่วงหน้าไว้ก่อนนะคะว่ามันไม่ใช่เหตุผลที่จริงจังอะไรหรอกค่ะ แต่บางทีมันอาจฟังดูจริงจังไป#nตามการวิเคราะห์ของคนฟังก็ได้..."
2601503-60 = "เอาเหอะ ฉันไม่อ้อมค้อมดีกว่า! คุณครูก็ไม่ใช่คนที่จะเข้าใจผิดด้วย!"
2601503-61 = "ก็แค่... ฉันไม่รู้เหตุผลที่ต้องตื่นเต้นน่ะค่ะ"
2601503-62 = "ถึงจะเป็นทะเล แต่สุดท้ายแล้วมันก็เป็นแค่สถานที่ที่ต่างจากปกตินิดหน่อยไม่ใช่เหรอคะ?"
2601503-63 = "ปกติแล้วฉันมักจะไปเดินลาดตระเวนแถวชายขอบเขตปกครองตนเอง หรือไม่ก็ไปโรงเรียนอื่นๆ เพื่อทำงานทางความร่วมมือค่ะ"
2601503-64 = "ที่จริงฉันไม่รู้สึกว่าการมาที่นี่มันต่างจากการไปทำงานแบบนั้นมากเท่าไรค่ะ"
2601503-65 = "อ่า อืม... พอพูดไปก็รู้สึกผิดนิดหน่อยนะคะ มีสมาชิกคนอื่นในชมรมที่อยากมาทะเลแทนฉันแท้ๆ"
2601503-66 = "ฉันน่าจะให้คนอื่นมามากกว่านะคะ... แหะๆ"
2601503-67 = "[s5] \"ขอบใจที่พูดตามตรงนะ\"\n[s6] \"ในใจอิจิกะคิดแบบนี้สินะ\""
2601503-70 = "เฮ้อ~ ฉันก็ไม่รู้หรอกค่ะว่าเป็นแบบนี้ไปได้ยังไง แต่ฉันกลายเป็นคนที่ชมรมทวงความยุติธรรมคาดหวัง#nไปแล้วค่ะ"
2601503-71 = "ฉันก็เลยคิดว่าอย่างน้อยก็ต้องทำให้ถึงระดับมาตรฐานค่ะ"
2601503-72 = "พอพูดแบบนี้... ฉันรู้สึกเหมือนคนอับโชคเลยค่ะ"
2601503-73 = "คะ? ฉันเหนื่อยหรือเปล่าน่ะเหรอคะ?"
2601503-74 = "อืม แต่งานมันก็เป็นแบบนี้อยู่แล้วไม่ใช่เหรอคะ? ใช่ว่าจะมีแต่ฉันที่เหนื่อยหรอกค่ะ"
2601503-75 = "ทุกคนก็คงใช้ชีวิตแบบนี้กันทั้งนั้นละค่ะ"
2601503-76 = "แต่ถ้ามองจากมุมของฉันละก็ ฉันว่าคุณครูกับพวกรุ่นพี่น่าจะเหนื่อยกว่าอีกค่ะ"
2601503-80 = "หืม...? เอ๋?"
2601503-81 = "นี่เราเข้าเรื่องปรึกษากันตั้งแต่เมื่อไรเหรอคะ?"
2601503-82 = "[s7] \"พะ... พูดเรื่องอะไรไม่เห็นเข้าใจเลย\"\n[s8] \"อ่านความคิดออกเหรอ...?!\""
2601503-85 = "ฮืม~ พอได้คุยกับคุณครู ฉันรู้สึกเป็นฝ่ายหลงกลตลอดเลยค่ะ"
2601503-86 = "อ่า ฉันไม่ได้ไม่ชอบหรอกนะคะ ฉันกลับรู้สึกขอบคุณมากกว่าด้วยซ้ำ"
2601503-87 = "มันรู้สึกเหมือนให้เห็นในส่วนที่ไม่อยากให้เห็นน่ะค่ะ..."
2601503-88 = "แต่ยังไงก็... พอได้พูดออกไปมันก็โล่งใจดีนะคะ"
2601503-89 = "วันนี้ฉันน่าจะนอนหลับสบายเลยค่ะ"
2601503-90 = "ขอบคุณนะคะ!"
2601503-92 = "(หลังจากนั้นคุณครูกับอิจิกะก็เดินชมชายหาดด้วยกันต่อ กว่าจะกลับไปถึงที่พักของแต่ละคนก็ตอน#nฟ้าสางแล้ว)"

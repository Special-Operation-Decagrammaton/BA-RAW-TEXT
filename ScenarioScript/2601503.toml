[translation]
2601503-1 = "匿名少女"
2601503-4 = "咦？"
2601503-5 = "這不是老師嗎？#n怎麼這麼晚了還在這裡？"
2601503-6 = "……雖然我其實也一樣就是了。哈哈。"
2601503-7 = "我今天有點睡不著。"
2601503-8 = "……啊啊，原來老師也一樣啊。"
2601503-9 = "咦？難得有機會，要不要一起散散步？"
2601503-10 = "哦……是個意料之外的收穫呢。"
2601503-11 = "啊，沒什麼，我剛才只是在自言自語而已。"
2601503-12 = "好呀，那我們走吧。嘿嘿。"
2601503-18 = "……"
2601503-19 = "[s]「有什麼煩惱嗎？」"
2601503-20 = "……咦？這麼突然？"
2601503-21 = "啊，就是……被問得有點措手不及。#n畢竟我平時給人的印象，應該不是這樣的吧？"
2601503-22 = "因為很少被問到這種問題，一時覺得有點驚訝。"
2601503-23 = "畢竟我也是人，會有煩惱也是當然的……"
2601503-24 = "不過也不是什麼非得跟老師商量的事。"
2601503-25 = "大概就是這種感覺。"
2601503-26 = "[s]「那我換個問題吧！你常來海邊嗎？」"
2601503-27 = "咦……？#n這次改問這種問題嗎……？"
2601503-28 = "我其實不太常……啊，我的壞習慣又犯了。#n明明只要老實回答就行了說。"
2601503-29 = "這是我第一次來到海邊。"
2601503-30 = "理由……理由嗎？#n唔嗯，倒也沒什麼有趣的故事啦。"
2601503-31 = "而且……哎呀～這樣回答好像有點太嚴肅了……"
2601503-32 = "怎麼說呢，雖然不能一概而論說「實現正義部都是這樣！」……#n不過會來報名的孩子，個性大多都比較正經。"
2601503-33 = "該說比較克制，還是努力讓自己保持克制呢……#n當然實際上是不是這樣還不好說就是了，哈哈。"
2601503-37 = "老師應該也多少感覺到了吧？"
2601503-38 = "[s1]「確實……有點那種感覺。」\n[s2]「是嗎？」"
2601503-41 = "嗯，總之大家都是多少放棄了「愉快的校園生活」才加入的。"
2601503-42 = "在這種氛圍下，如果只有我一個人到處玩樂……不是也怪怪的嗎？"
2601503-43 = "但話又說回來，老師為什麼突然問這個？"
2601503-44 = "[s3]「因為你看起來很冷靜……」\n[s4]「一般來到海邊不是都會比較興奮嗎？」"
2601503-47 = "啊啊～海邊的確給人那種印象呢。"
2601503-48 = "……不過只看外表也不一定準嘛。#n老師你也知道，我不是那種會把情緒表現在臉上的類型。"
2601503-49 = "搞不好我心裡其實超興奮的哦？"
2601503-53 = "……雖然想用這種方式糊弄過去，看來對老師好像不怎麼管用呢。哈哈。"
2601503-54 = "我還以為自己挺能言善道的，結果今天有點被打擊到耶～"
2601503-55 = "呃……這個能說出來嗎？"
2601503-59 = "啊，我先強調一下，不是因為什麼嚴肅的理由哦。#n只是怕有人聽到之後會想太多……"
2601503-60 = "算了，我就老實說吧！#n反正老師也不是會誤會的人嘛！"
2601503-61 = "我只是……不知道為什麼要興奮而已。"
2601503-62 = "就算來到海邊，說白了不也只是換個地方嗎？"
2601503-63 = "我平常也會去自治區外圍巡邏，或者因為外交任務而訪問其他學園……"
2601503-64 = "坦白說，我覺得跟執行那些任務的時候沒什麼區別。"
2601503-65 = "唔嗯……這種話講出來好像有點不好意思呢。#n想代替我到海邊來的部員，應該大有人在才對。"
2601503-66 = "……我果然不該來的，哈哈。"
2601503-67 = "[s5]「謝謝你坦白告訴我。」\n[s6]「原來你總是把這種事放在心裡啊。」"
2601503-70 = "哎呀～雖然不知道為什麼會變成這樣，但我在實現正義部還算是頗受期待的哦。"
2601503-71 = "所以至少得達到一定的水準才行。"
2601503-72 = "……這種說法好像有點討人厭耶。"
2601503-73 = "咦？不會覺得累嗎？"
2601503-74 = "其實也沒什麼特別的吧？#n又不是只有我一個人這樣生活。"
2601503-75 = "大家或多或少都會這樣吧。"
2601503-76 = "我反而覺得老師和前輩們更辛苦呢。"
2601503-80 = "……嗯？"
2601503-81 = "怎麼好像不知不覺就變成面談了？"
2601503-82 = "[s7]「我，我聽不懂你的意思。」\n[s8]「你會讀心術嗎……！？」"
2601503-85 = "哼嗯～跟老師聊天的時候，總是會被牽著走呢。"
2601503-86 = "啊，也不會覺得討厭啦。#n我反而挺感謝的。"
2601503-87 = "……只是好像連不想被看到的一面都被看穿了。"
2601503-88 = "不過把話說出來之後，感覺輕鬆多了！"
2601503-89 = "今天似乎能睡個好覺了呢。"
2601503-90 = "謝謝老師！"
2601503-92 = "（之後繼續和一花在海邊散步了一會，直到快天亮才各自回到住處）"

[translation]
2004702-1 = "วิธีชักชวนของที่ปรึกษายุทธศาสตร์"
2004702-3 = "[ns] \"คิเคียว~! ครูมาแล้ว!\""
2004702-4 = "อะไรกัน มาแล้วเหรอ?"
2004702-5 = "คุณครู ทางนี้#nมาช่วยฉันหน่อยสิ"
2004702-8 = "[ns] \"สวัส...\""
2004702-10 = "[ns1] \"เฮือก...!\"\n[ns2] \"นะ... นี่มัน...?!\""
2004702-14 = "มันน่าตกใจขนาดนั้นเลยเหรอ?"
2004702-15 = "ก็นี่ฤดูร้อนนี่นา ชุดนี้ก็ไม่ได้แปลกตรงไหนด้วย"
2004702-16 = "[s] \"ทำไมถึงอยู่ในชุดว่ายน้ำล่ะ...?\""
2004702-17 = "ก็นี่ไง... ฉันว่าจะเติมลมสระนี้น่ะ"
2004702-18 = "อย่ามัวแต่ยืนดูสิ มาช่วยกันหน่อย"
2004702-19 = "[s] \"อืม จะวางสระว่ายน้ำในชมรมเหรอ?\""
2004702-20 = "ใช่ เป็นการหลบร้อนที่ยอดเยี่ยมเลยใช่มั้ยล่ะ?"
2004702-21 = "ทั้งอยู่ใกล้ แล้วก็เล่นน้ำได้สบายโดยไม่ต้องกังวลว่าคนอื่นจะมองด้วย"
2004702-22 = "หืม?"
2004702-23 = "ทำไมทำหน้าเหมือนไม่เห็นด้วยอย่างนั้น..."
2004702-24 = "ดีละ ไหนลองอธิบายมาสิ"
2004702-28 = "ว่าไง? คุณครูคิดว่ายังไงเหรอ?"
2004702-29 = "ฉันเตรียมมาด้วยความมั่นใจพอสมควรเลยนะ..."
2004702-30 = "มันแปลกเหรอ...?"
2004702-31 = "[s3] \"ไม่หรอก! แต่ชุดสวยดีนะ\"\n[s4] \"ชุดว่ายน้ำเหมาะกับคิเคียวดีนะ!\""
2004702-34 = "ชุดว่ายน้ำเหรอ...?"
2004702-38 = "...!"
2004702-39 = "ฉันไม่ได้ถามเรื่องนั้นสักหน่อย! ฉันถามเรื่องสระน้ำต่างหาก!"
2004702-40 = "[s] \"มันก็ดีอยู่หรอกนะ...\""
2004702-41 = "ก็แน่น่ะสิ ไม่น่าถามในสิ่งที่รู้คำตอบอยู่แล้วเลย..."
2004702-45 = "อยากพูดอะไรก็พูดมาเลย..."
2004702-46 = "อ้อ บอกไว้ก่อนนะ"
2004702-47 = "โอกาสนี้มีแค่ครั้งเดียว"
2004702-48 = "คิดให้ดีล่ะว่าจะพูดอะไรออกมา"
2004702-49 = "[s5] \"ขะ... ขอโอกาสอีกเถอะนะ!\"\n[s6] \"ครูจะบอกความเห็นอย่างจริงใจเลย!\""
2004702-53 = "เอาละ กลับเข้าเรื่องได้แล้ว..."
2004702-54 = "คุณครูคิดยังไงเกี่ยวกับแผนการติดตั้งสระน้ำของฉันที่นี่?"
2004702-55 = "เป็นวิธีหนีร้อนมาเย็นใจที่ดีเลยใช่มั้ย?"
2004702-56 = "หืม...? แบบนี้มันต่างจากการเปิดแอร์ในสำนักงานยังไงน่ะเหรอ?"
2004702-57 = "......"
2004702-58 = "เข้าใจพูดนะ ฉันพอรู้แล้วละว่าคุณอยากสื่ออะไร"
2004702-59 = "ทะเล แม่น้ำ สระว่ายน้ำ... ถ้าได้ไปที่แบบนั้น ฉันอาจจะชอบมันก็ได้"
2004702-60 = "แต่แค่นึกว่าต้องไปก็ขี้เกียจแล้วนี่นา?"
2004702-61 = "เพราะงั้นฉันก็เลยเตรียมสระน้ำชั่วคราวขึ้นมาน่ะสิ"
2004702-62 = "[s] \"คิเคียวไม่ชอบกิจกรรมกลางแจ้งเหรอ?\""
2004702-63 = "ไม่รู้สิ น่าจะแล้วแต่ว่าไปกับใครนะ"
2004702-64 = "แต่ถ้าไปกับคุณ... ก็อาจจะอยากไปก็ได้"
2004702-65 = "[s] \"โอ้ว งั้นเราไปเที่ยวทะเลด้วยกันเถอะ!\""
2004702-66 = "พูดแบบนั้น... แปลว่าจะชวนไปกัน 2 คนเหรอ?"
2004702-67 = "[s] \"ครูก็ว่าจะอย่างนั้นนะ... คิดว่ายังไงเหรอ?\""
2004702-68 = "ฮืม..."
2004702-69 = "งั้นตอนนี้ก็ไม่ใช่เวลาจะมาเตรียมสระน้ำอยู่อย่างนี้สิ ต้องไปวางแผนเที่ยวแล้วละ"
2004702-70 = "แล้วคุณว่างตอนไหนบ้างเหรอ?"
2004702-71 = "หืม? คิดว่าฉันตั้งเป้าหมายแบบนี้ไว้แล้วงั้นเหรอ?"
2004702-72 = "ก็ไม่รู้สิ? คิดตามที่สบายใจได้เลย"
2004702-73 = "เอาเป็นว่าเราตกลงจะไปทะเลกันแล้วนะ ถ้าเทกันละก็ ฉันไม่ยกโทษให้แน่"
2004702-74 = "ฮุฮุ..."
2004702-76 = "(แล้วคุณครูก็วางแผนวันหยุดพักร้อนกับคิเคียวที่ดูตื่นเต้นเป็นพิเศษ)"

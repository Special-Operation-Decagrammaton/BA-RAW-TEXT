[translation]
84301400103-6 = "อึก... นี่เป็นสถานการณ์ที่อธิบายไม่ได้ค่ะ"
84301400103-7 = "ค่อยๆ หาไปอย่างใจเย็นแล้วกัน มันต้องมีเหตุผลอะไรสักอย่างแน่นอน"
84301400103-8 = "การหาสาเหตุเมื่อเกิดข้อผิดพลาดก็เป็นงานของพวกเราไม่ใช่เหรอ?"
84301400103-9 = "ฮิบิกิมีความคิดเป็นผู้ใหญ่จังเลยนะคะ..."
84301400103-10 = "งั้นก็ดีค่ะ! ฉันก็จะตั้งใจหาเหมือนกันค่ะ!"

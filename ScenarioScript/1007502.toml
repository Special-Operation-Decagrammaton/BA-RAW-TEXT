1007502-100 = "3;메루;04;여기까지인가……! 나의 예술혼은 여기에서 끊기고 마는가……!\n#3;em;[땀]"
1007502-101 = "3;메루;00;좋아. 어쩔 수 없지. 이번만은 물러나 주겠어. 태블릿 펜과 펜심이 있다면, 기회는 또 언젠가 찾아올 테니까......!"
1007502-102 = "3;메루;02;하지만 각오하라고, 선생! 난 언젠가 반드시, 선생을 제대로 스케치하고 말 거니까!"

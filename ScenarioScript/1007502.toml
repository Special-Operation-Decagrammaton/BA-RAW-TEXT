1007502-71 = "3;메루;02;응? 딱히 번거롭다거나 그렇게 느끼지는 않는데?\n#3;em;[?]"
1007502-72 = "3;메루;01;오히려 평소에 그려 보지 못했던 피사체가 생겨서 좋은 일이라고도 볼 수 있는 거고."
1007502-73 = "3;메루;03;말하고 보니 이런 기회는 또 없을 것 같아졌어. 잠자코 나의 스케치를 받아라!\n#3;hophop"

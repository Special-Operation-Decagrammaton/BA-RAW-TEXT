1007502-41 = "3;메루;04;이건 또 뭐지? 흐익? 여벌 펜심을 이렇게나……!?\n#3;shake\n#3;em;[?!]"
1007502-42 = "[s3] \"왜 그렇게 놀라?\"\n[s4] \"그냥 덤으로 끼워 주던데?\""
1007502-43 = "#wait;100"
1007502-44 = "#wait;100"
1007502-45 = "3;메루;04;붉은겨울을 우습게 보지 말라고! 아니, 우습게 보라고!\n#3;em;[!]"
1007502-46 = "3;메루;05;여긴 말이지…… 유탄이나 굴삭기 삽날, 유압 장치 같은 건 의외로 쉽게 구할 수 있지만!"
1007502-47 = "3;메루;02;질 좋은 휴지나 비누, 잘 나오는 볼펜이나 맛이 진한 푸딩 같은 건 오히려 구하기 힘든 곳이니까!"
1007502-48 = "[s] \"아…… 붉은겨울 학원이라면 확실히……\""
1007502-49 = "3;메루;99;흠, 흠. 어쨌든 고마워. \n#3;jump"

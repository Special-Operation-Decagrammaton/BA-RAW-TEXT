1007502-33 = "3;메루;04;아니, 그 반대라고 해야 하나, 뭐라고 해야 하나…… 이건 너무 황송하잖아……!\n#3;jump"
1007502-34 = "3;메루;04;이 정도의 고급 태블릿 펜이라니…… 붉은겨울에서는 소문으로만 들었던 건데."
1007502-35 = "3;메루;04;정말 주는 거야? 이 비싼걸? 내가 받아도 될까? 진짜로?\n#3;closeup"
1007502-36 = "[s] \"오히려 받아서 잘 쓰면 좋겠다고 할까…… \""
1007502-37 = "3;메루;00;이야~ 그럼 거절은 안 하지 뭐! 주는 성의가 있는데!\n#3;em;[음표]"

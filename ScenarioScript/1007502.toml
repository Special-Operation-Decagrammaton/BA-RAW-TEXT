[translation]
1007502-1 = "調度物資"
1007502-5 = "（由於不知道該買什麼筆才好，於是買了店員推薦的型號……）"
1007502-17 = "（結果拿到了一大堆贈品……）"
1007502-20 = "歡迎你，老師！#n我都快等不及了！"
1007502-21 = "想到的素材差點就全部蒸發掉了！"
1007502-22 = "話說話說，請你買的筆有買來嗎？有吧？  "
1007502-23 = "[s]「當，當然有囉。你看～老師把筆買來了～」"
1007502-24 = "很好！那麼就……就……？"
1007502-29 = "老，老師……？"
1007502-30 = "[s1]「怎麼了嗎，愛瑠？難道……買錯了嗎？」\n[s2]「我有特別做功課以免買錯的說……」"
1007502-33 = "不是，該怎麼說呢……這東西很貴的吧……？"
1007502-34 = "這麼高級的筆……在赤冬可是只能在傳聞中聽見啊。"
1007502-35 = "真的要給我嗎？這很貴吧？我能收下嗎？真的嗎？"
1007502-36 = "[s]「希望你能收下好好使用……」"
1007502-37 = "哇～那就恭敬不如從命囉！"
1007502-41 = "這又是什麼……？#n咦？居然有這麼多備用筆芯……！？"
1007502-42 = "[s3]「有必要那麼驚訝嗎？」\n[s4]「那些都是贈品呀？」"
1007502-45 = "你可別小看赤冬！不，儘管小看吧！"
1007502-46 = "在我們這裡……雖然能輕易取得像榴彈、鏟頭、油壓裝置這種東西……"
1007502-47 = "但像柔軟的衛生紙、肥皂、好寫的原子筆和味道濃郁的布丁之類的是真的很稀有啊！"
1007502-48 = "[s]「啊……畢竟是赤冬學園……」"
1007502-49 = "嗯，嗯。真的很謝謝你。"
1007502-53 = "既然收到這麼好的東西，我也想報答一下……"
1007502-54 = "老師有什麼想要的東西嗎？"
1007502-55 = "[s]「沒關係，老師幫助學生是理所當然的事。」"
1007502-56 = "別這麼說嘛～！#n而且照你這麼說，報答老師不也是學生該做的事嗎？"
1007502-57 = "[s5]「不不不，真的不用沒關係。」\n[s6]「只要學生過得好，老師就滿足了……呵呵呵……」"
1007502-60 = "……受不了。#n居然把我當小孩……！"
1007502-61 = "好！既然老師給了這麼多筆芯，就用這個來報答吧！"
1007502-62 = "問我在打什麼主意？#n哼哼哼……"
1007502-66 = "要畫一張老師的圖哦！"
1007502-67 = "[s]「沒關係，不用了……」"
1007502-68 = "哎呀，不用跟我客氣！#n街上不是常會有幫人畫似顏繪的畫家嗎？"
1007502-69 = "就跟那個差不多啦！#n當然，我會畫得比他們更好！"
1007502-70 = "[s]「真的沒關係……我也不想給你添麻煩。」"
1007502-71 = "嗯？我不覺得有什麼麻煩啊？"
1007502-72 = "有了平常沒辦法仔細描繪的對象，反而是件好事才對。"
1007502-73 = "仔細想想，這種機會其實可遇不可求吧！#n乖乖讓我畫～！"
1007502-79 = "哎……！還想抵抗嗎！#n我熊熊燃燒的藝術之魂可是無法阻擋的……！"
1007502-80 = "現在報答什麼的已經無所謂了！#n我要，畫老師！"
1007502-83 = "[ns]「救命啊！素描星人想畫我的素描！」"
1007502-87 = "哼哼哼……就算老師叫破喉嚨也不會有人來救你的……！"
1007502-88 = "畢竟我們知識解放戰線的圖書館……可是偏僻到不管怎麼叫都不會有人聽見啊！"
1007502-89 = "[s7]「唔……！這樣下去不行。只好使用大人的話術了！」\n[s8]「要收下筆還是畫素描，你只能選一個！」"
1007502-95 = "咦……？"
1007502-96 = "怎麼這樣……筆跟老師只能二選一……？"
1007502-97 = "可是沒有筆根本沒辦法畫啊！？"
1007502-98 = "唔唔！這就是大人的話術嗎……！#n好卑鄙！太卑鄙了！"
1007502-99 = "[s]「呵……大人本來就該卑鄙的恰到好處。」"
1007502-100 = "到此為止了嗎……！#n我的藝術之魂只能在這裡畫下句點了嗎……！"
1007502-101 = "好吧，這次也只能放棄了。#n但只要有筆和筆芯，機會總有一天會再次降臨……！"
1007502-102 = "做好覺悟吧，老師！#n總有一天，我一定會好好畫老師的素描的！"
1007502-108 = "為了那一天的到來……今天我要近距離徹底觀察老師！"
1007502-110 = "（為了躲避不斷靠近的愛瑠，結果一天就在打鬧中結束了……）"

1007502-96 = "3;메루;04;잠깐만, 그거 조금 이상한데? 태블릿 펜을 받든가 선생을 스케치하든가 둘 중 하나만 하라고……."
1007502-97 = "3;메루;04;하지만 태블릿 펜이 없으면 애초에 선생을 스케치할 수도 없는 거잖아!\n#3;jump"

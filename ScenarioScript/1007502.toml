[translation]
1007502-1 = "การจัดส่งอุปกรณ์"
1007502-5 = "(คุณครูไม่รู้ว่าจะซื้อปากกาแบบไหนดี จึงซื้อตามที่พนักงานร้านแนะนำ)"
1007502-17 = "(และผลลัพธ์ก็คือ... ได้อะไรบางอย่างที่เหมือนของแถมมาด้วยเยอะเต็มไปหมด...)"
1007502-20 = "เชิญเลยคุณครู! ฉันรออยู่นานแล้วละ!"
1007502-21 = "รอซะจนเกือบจะลืมพล็อตที่คิดขึ้นมาได้แล้วเนี่ย"
1007502-22 = "แล้ว...แล้วนี่ซื้อปากกาแท็บเล็ตมาแล้วใช่มั้ย? ซื้อมาแล้วใช่รึเปล่า??  "
1007502-23 = "[s] \"จ้าๆ ครูซื้อมาให้แล้ว~\""
1007502-24 = "เยี่ยมเลย! ไหนๆ... ไหนดู...?"
1007502-29 = "คะ... ครู?!?!"
1007502-30 = "[s1] \"ทำไมเหรอ เมรุ? หรือว่า... ครูซื้อมาผิดงั้นเหรอ?\"\n[s2] \"คิดแล้วว่าอาจเกิดเรื่องแบบนี้ขึ้น เลยเตรียมการรับมือมาแล้วละ...\""
1007502-33 = "ไม่สิ กลับกันเลยต่างหาก จะว่ายังไงดีนะ แบบนี้มัน...สุดๆ ไปเลย!"
1007502-34 = "ปากกาแท็บเล็ตอย่างดีแบบนี้... ฉันเคยแต่ได้ยินคนอื่นๆ ในเรดวินเทอร์พูดถึงกันเท่านั้น..."
1007502-35 = "ของแพงแบบนี้ให้ฉันจริงๆ เหรอ? ฉันรับของแบบนี้ไว้ได้จริงๆ แน่นะ? ถามจริง...?"
1007502-36 = "[s] \"เมรุพยายามมาตลอดเลยนี่นา ถือว่าเป็นของขวัญแล้วกันนะ...\""
1007502-37 = "อา~ งั้นคงปฏิเสธไม่ได้สินะเนี่ย! ถ้าปฏิเสธคงดูเสียมารยาทแย่"
1007502-41 = "แล้วอันนี้อะไรอะ? เฮือก! ซื้อหัวปากกาสำรองมาขนาดนี้เลยเรอะ...!?"
1007502-42 = "[s3] \"ทำไมตกใจอะไรขนาดนั้นล่ะ? เขาให้มาเป็นของแถมน่ะ\"\n[s4] \"อ้อ อันนั้นเขาใส่มาให้เป็นของแถมน่ะ?\""
1007502-45 = "อย่ามาดูถูกเรดวินเทอร์นะ! ไม่สิ คิดอีกทีจะดูถูกก็ได้..."
1007502-46 = "ที่นี่น่ะ... ถึงจะหาของอย่างพวกอุปกรณ์ไฮดรอลิก พลั่ว ที่ขุด หรือระเบิดได้ง่ายอย่างคาดไม่ถึงก็เถอะ"
1007502-47 = "แต่ของอย่างพวกพุดดิ้งอร่อยๆ หรือปากกาเขียนลื่นๆ สบู่ดีๆ หรือกระดาษทิชชู่นุ่มๆ น่ะ หายากมาก#nเลยนะ!"
1007502-48 = "[s] \"อ่า... เรดวินเทอร์ก็คงเป็นแบบนั้น...\""
1007502-49 = "ฮึ่ม ฮึ่ม... ยังไงก็ขอบคุณนะ "
1007502-53 = "รู้สึกเหมือนว่าจะต้องตอบแทนครูบ้างซะแล้ว..."
1007502-54 = "มีของที่อยากได้รึเปล่าล่ะ?"
1007502-55 = "[s] \"ไม่เป็นไรหรอก มันเป็นงานของครูที่ต้องคอยช่วยนักเรียนอยู่แล้ว\""
1007502-56 = "ไม่เอาแบบนั้นสิ~ ถ้าจะพูดแบบนั้นละก็ การตอบแทนคุณครูก็เป็นเรื่องที่นักเรียนต้องทำอยู่แล้วเหมือน#nกันนะ!"
1007502-57 = "[s5] \"ไม่ละ ครูไม่มีอะไรที่อยากได้เลย\"\n[s6] \"ครูน่ะ ขอแค่นักเรียนสุขสบายดี ครูก็พอใจแล้วละ หึหึหึ...\""
1007502-60 = "...เหลือเชื่อจริงๆ ตอบอะไรเป็นเด็กๆ ไปได้...!"
1007502-61 = "ดีละ! ในเมื่อครูซื้อหัวปากกาสำรองมาให้เยอะแบบนี้ ฉันก็จะใช้มันทำบางอย่างเพื่อตอบแทนคุณครูก็#nแล้วกัน!"
1007502-62 = "ฉันคิดจะทำอะไรน่ะเหรอ? นั่นก็คือ..."
1007502-66 = "ฉันจะวาดรูปเหมือนคุณครูไงล่ะ!"
1007502-67 = "[s] \"ไม่เป็นไร ครูว่าไม่ต้องก็ได้...\""
1007502-68 = "โธ่เอ๊ย แค่นี้มันไม่เท่าไหร่หรอกน่า! ทำไมล่ะ มันก็เหมือนการวาดการ์ตูนล้อเลียนที่ศิลปินข้างถนนชอบ#nวาดกันน่ะ?"
1007502-69 = "แต่แน่นอนว่าฉันจะวาดให้สวยกว่านั้นอีก!"
1007502-70 = "[s] \"ครูไม่เป็นไรจริงๆ... ทำแบบนั้นมันยุ่งยากนี่นา\""
1007502-71 = "หืม? ฉันไม่เห็นว่ามันจะยุ่งยากตรงไหนเลยนะ"
1007502-72 = "เป็นเรื่องดีซะอีกที่จะได้วาดงานแบบที่ปกติไม่ค่อยได้วาดน่ะ"
1007502-73 = "พอคิดดูแล้ว โอกาสแบบนี้ก็อาจจะไม่มีอีกแล้วก็ได้ เพราะงั้นให้ฉันวาดให้ซะดีๆ!"
1007502-79 = "ฮึ่ยยยย...! คิดจะต่อต้านกันจนถึงที่สุดเลยงั้นเรอะ! แบบนี้ยิ่งทำให้ไฟจิตวิญญาณของศิลปินลุกโชน#nกว่าเดิมอีกนะเนี่ย...!"
1007502-80 = "ตอนนี้เรื่องการตอบแทนจะเป็นยังไงก็ช่าง! มาให้ฉันวาดรูปซะดีๆ!"
1007502-83 = "[ns] \"ช่วยด้วย! จะโดนนักวาดสุดประหลาดจับไปเป็นแบบวาดรูปแล้ว~!\""
1007502-87 = "หึหึหึ.... ถึงจะตะโกนให้ใครมาช่วย ก็คงไม่มีใครมาช่วยครูหรอกน่า..."
1007502-88 = "ห้องสมุดของชมรมเราน่ะ... เป็นที่ที่ห่างไกลจนถึงขั้นต่อให้ส่งเสียงดังหรือตะโกนแค่ไหนก็ไม่มีใคร#nได้ยินเลยละ!"
1007502-89 = "[s7] \"อึก...! ไม่ได้การแล้ว คงต้องใช้ไม้ตายของผู้ใหญ่แล้ว\"\n[s8] \"เมรุต้องเลือกแล้วว่าจะเอาปากกา หรือจะวาดรูปครู!\""
1007502-95 = "หา...?"
1007502-96 = "เดี๋ยวสิ แบบนี้มันแปลกๆ นะ? ให้เลือกอย่างใดอย่างหนึ่งระหว่างวาดรูปครูหรือปากกาแท็บเล็ต#nงั้นเหรอ...?"
1007502-97 = "แต่ถ้าไม่มีปากกา ฉันก็วาดรูปคุณครูไม่ได้น่ะสิ!"
1007502-98 = "อึก! นี่น่ะเหรอไม้ตายของผู้ใหญ่...! ขี้โกง! แบบนี้มันขี้ขลาดนะ!"
1007502-99 = "[s] \"หึ... ผู้ใหญ่น่ะต้องหัดฉลาดแกมโกงบ้างสิถึงจะดี\""
1007502-100 = "มาได้แค่นี้เองงั้นเหรอ...! จิตวิญญาณแห่งศิลปะของฉันจะต้องจบลงแค่นี้เหรอเนี่ย...!"
1007502-101 = "ดีละ ช่วยไม่ได้นะ คราวนี้ฉันจะยอมถอยก่อนแล้วกัน ถ้ามีปากกากับหัวปากกาสำรองละก็ ในอนาคต#nคงจะมีโอกาสอีกแน่...!"
1007502-102 = "แต่ก็เตรียมตัวเตรียมใจเอาไว้ล่ะครู! สักวันหนึ่ง ฉันจะต้องวาดรูปครูให้ได้เลย!"
1007502-108 = "และเพื่อการนั้น... วันนี้ฉันจะตามติดเป็นวิญญาณตามตัวครูเพื่อสังเกตทุกอิริยาบถของครูเลย คอยดู!"
1007502-110 = "(และแล้ววันทั้งวันก็ผ่านไปโดยที่คุณครูพยายามขัดขวางเมรุที่พยายามสุดๆ เพื่อเข้าใกล้คุณครู...)"

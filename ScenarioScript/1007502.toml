1007502-55 = "[s] \"아니, 선생이 학생을 돕는 건 당연한 일이니까.\""
1007502-56 = "3;메루;03;그러지 말고~! 그렇게 따지면, 선생에게 뭔가를 보답하는 것도 학생에게는 당연한 일이니까 말이지!\n#3;hophop\n#3;em;[음표]"
1007502-57 = "[s5] \"아니, 아니. 정말로 생각나는 게 없는데.\"\n[s6] \"선생님은 학생들이 잘 지내기만 한다면 만족한단다…… 헛헛헛……\""
1007502-58 = "#wait;100"
1007502-59 = "#wait;100"
1007502-60 = "3;메루;05;……못 참겠군. 아이 취급이라니……!"
1007502-61 = "3;메루;01;좋아! 선생이 펜심을 잔뜩 구해 줬으니, 나도 그걸로 선생한테 뭔가를 해 줘 버리겠어!\n#3;jump"

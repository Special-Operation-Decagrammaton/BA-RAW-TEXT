[translation]
10007065-1 = "第6話;給工務部一杯漿果汁！"
10007065-2 = "哈啊，哈啊……真難纏呢……"
10007065-3 = "你，你們才是……"
10007065-4 = "差不多該認輸了吧？"
10007065-5 = "怎麼可能認輸！這個溫泉浴場是我們的希望啊！"
10007065-6 = "與其回到嚴峻的舊校舍生活……"
10007065-7 = "不如跟著這個溫泉浴場一起殉情！"
10007065-8 = "……氣勢值得敬佩。"
10007065-9 = "但是，我們也是賭上了工務部的尊嚴。#n無法退讓這點，我們也是一樣的！"
10007065-13 = "唔。今天的風感覺特別冷呢……"
10007065-15 = "呵呵……別，別小看舊校舍附近的寒，寒風哦……！"
10007065-16 = "會，會冷的話，就，就趕快放棄，乖，乖乖回去，怎麼樣啊？"
10007065-18 = "……不是，你看起來比我還冷吧。穿得那麼薄。"
10007065-19 = "居然在寒冬裡穿成那樣……"
10007065-20 = "有辦法撐過一個小時嗎？"
10007065-22 = "嗚嗚，好有道理……！"
10007065-28 = "和香，我拿熱呼呼的漿果汁來了唷。"
10007065-29 = "啊，時雨醬謝謝。咕嚕，咕嚕……呼，真溫暖……"
10007065-31 = "什麼！？竟然在戰鬥中只補給自己人，真卑鄙！"
10007065-32 = "明明是「工務部」和「227號特別班」雙方賭上尊嚴的戰鬥……！#n不要依賴補給品，堂堂正正公平地決勝負啊！"
10007065-37 = "來，工務部的朋友們要不要也來一杯？"
10007065-38 = "……咦？我們也有嗎……？"
10007065-39 = "嗯。反正去年春天釀的漿果汁還多的很。"
10007065-40 = "來，在感冒之前，快點趁熱喝吧？"
10007065-41 = "謝謝你的心意，但……"
10007065-42 = "我，我們工務部的意志可沒有軟弱到會被區區一杯飲料給動搖！#n別小看至今為止克服了無數艱苦施工現場的，勞動者們的尊嚴啊！"
10007065-49 = "真好喝！"
10007065-50 = "這個漿果汁真厲害，味道又甜又順口。"
10007065-51 = "還略帶些許苦味，一股暖氣竄流全身……在寒冷的地方喝這種飲料最棒了！"
10007065-52 = "呵呵，你們喜歡真是太好了。#n我也覺得這次釀得特別好呢……可能是因為稍微發酵了吧。"
10007065-53 = "要不要再來一杯？"
10007065-54 = "嗯，我就收下了！"
10007065-57 = "呵呵，唔呵呵呵……"
10007065-58 = "真是太好喝了。要我喝多少都行…… "
10007065-59 = "[s]「那個……實里，你還好嗎？」"
10007065-60 = "嗯？怎麼了啊老師，我沒問題的！#n只要有這個溫暖的漿果汁，我就無叟不稜！"
10007065-61 = "不盧說身體非常溫暖，甚至都有點熱了！"
10007065-62 = "嗯，真的很熱……但是因為流汗又有點冷……嗯？"
10007065-63 = "[s]「果然，或者該說難道是……」"
10007065-64 = "一旦覺得冷之後，好像就越來越冷了……"
10007065-65 = "唔……頭好像也昏昏的……咕！"
10007065-66 = "那可不行。得趁汗水冷掉之前，趕快去泡個溫泉暖暖身體才行。"
10007065-67 = "……溫泉？"
10007065-68 = "你的意思是……要我們工務部去泡格黑娜的笨蛋們建設的溫泉？"
10007065-69 = "不是的，實里部長。"
10007065-70 = "雖然是半強迫地將溫泉浴場交給他們建設，#n但我們也不清楚格黑娜學生們建造的這個設施「是否真的安全」。"
10007065-71 = "所以我希望「奇普托斯最厲害的建築業者」也就是工務部的成員到裡面，#n直接仔細地檢查這個溫泉浴場的狀態。"
10007065-72 = "奇普托斯最厲害的，建築業者……"
10007065-73 = "哼哼，原來如此……奇普托斯確實不存在比我們還厲害的建築業者！"
10007065-74 = "而且，邊泡溫暖的溫泉邊喝飲料可是別有一番風味唷？"
10007065-75 = "……真的嗎？"
10007065-79 = "我這只是事先調查而已，難道除了漿果汁之外還有其他好喝的飲料……？"
10007065-80 = "當然。我們227號溫泉浴場為了滿足所有客人，準備了各式各樣的飲料哦。"
10007065-81 = "如果工務部願意以客人的身分光臨，#n不管是康波特還是漿果汁，想喝多少就喝多少唷。雖然可能發酵了就是了。"
10007065-82 = "原，原來如此……既然你這麼說就沒辦法了！#n格黑娜蠢蛋們的工程有多麼粗糙，得要實際到溫泉裡調查才行！"
10007065-83 = "……絕對不是因為想喝更多漿果汁才這麼說的！"
10007065-84 = "嗯嗯，我當然知道唷。"
10007065-85 = "那麼首先請各位從北邊的露天溫泉開始吧。#n浴場很大，工務部的大家應該都能一起泡唷。"
10007065-86 = "很好。那麼大家！"
10007065-87 = "為了227號溫泉浴場的安全，以及許多的漿果汁……！"
10007065-88 = "不對，是休……那個，對了，為了「革命性的休息」……！"
10007065-89 = "向溫泉突擊！"
10007065-92 = "為了革命性的休息──！！！"
10007065-97 = "那些頑固的工務部成員，突然都像老實的綿羊一樣……"
10007065-98 = "這也不是什麼特別困難的事唷。"
10007065-99 = "美味的飲料和發自真心的話語。只要有這些，大部分的請求都能順利地傳達哦。"
10007065-100 = "時雨醬有時候真可怕呢……還好我們是朋友……"
10007065-101 = "[s]「話說時雨，我有件事想問你。」"
10007065-102 = "嗯？什麼事呢，老師？"
10007065-103 = "[s]「剛才的飲料，真的不是什麼奇怪的東西吧？」"
10007065-104 = "當然。這是用越橘和砂糖釀製的傳統漿果汁唷。還有酵素。"
10007065-105 = "不過存放的環境不太好，所以可能有點發酵了……"
10007065-111 = "順便作為確認，老師要不要也來一杯呀？"
10007065-113 = "（一邊拒絕時雨推薦的漿果汁，一邊逃命似地回到了溫泉浴場……）"

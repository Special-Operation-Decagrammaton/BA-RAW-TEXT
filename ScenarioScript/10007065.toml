[translation]
10007065-1 = "ตอนที่ 6;มอร์สสุดพิเศษสำหรับชมรมผู้รับจ้าง!"
10007065-2 = "แฮ่ก...แฮ่ก... อดทนได้เก่งดีนะคะ"
10007065-3 = "แฮ่ก...แฮ่ก... ทางนั้นเองก็อึดใช้ได้เลยนี่"
10007065-4 = "ยอมรับความพ่ายแพ้แล้วให้รื้อถอนออนเซ็นตอนนี้ก็ยังทันนะ"
10007065-5 = "ฉันยอมไม่ได้เด็ดขาดค่ะ! ออนเซ็นนี่เป็นความหวังเดียวของพวกเราค่ะ!"
10007065-6 = "ถ้าจะต้องกลับไปใช้ชีวิตลำบากเหมือนตอนอยู่ที่อาคารเรียนเก่าละก็..."
10007065-7 = "ฉันยอมปกป้องออนเซ็นจนตัวตายซะยังดีกว่าค่ะ!"
10007065-8 = "มีความมุ่งมั่นแรงกล้าดีนี่..."
10007065-9 = "แต่เรื่องนี้มีศักดิ์ศรีของชมรมผู้รับจ้างเป็นเดิมพัน... พวกเราเองก็ถอยไม่ได้เหมือนกัน!"
10007065-13 = "อึ่ก! วันนี้ลมแรงบาดผิวจริงๆ เลย..."
10007065-15 = "แฮ่ก...แฮ่กๆ สบประมาทลมหนาวของเขตอาคารเรียนเก่างั้นเหรอคะ...!"
10007065-16 = "ถะ...ถ้าหนาวละก็... ยะ...ยอมแพ้แล้วกลับไปตอนนี้... นะ...น่าจะดีกว่านะคะ?"
10007065-18 = "ไม่เอาหรอก... ดูจากเสื้อผ้าที่ใส่แล้ว คนที่หนาวน่าจะเป็นเธอมากกว่านะ"
10007065-19 = "สวมชุดยูกาตะบางๆ บนภูเขาหิมะตอนฤดูหนาวแบบนี้..."
10007065-20 = "จะทนได้ถึงหนึ่งชั่วโมงหรือเปล่าเหอะ?"
10007065-22 = "อึ่ก...!"
10007065-28 = "โนโดกะ ฉันเอาชามอร์สอุ่นๆ มาให้"
10007065-29 = "อ๊ะ ชิกุเระจัง ขอบใจนะ"
10007065-31 = "เดี๋ยวก่อน! เรากำลังสู้กันอยู่นะจะพักเติมแรงได้ยังไง ขี้โกงนี่!"
10007065-32 = "การต่อสู้ครั้งนี้มีศักดิ์ศรีของ <ชมรมผู้รับจ้าง> กับ <ห้องเรียนพิเศษ> เป็นเดิมพัน — เลิกคิดเรื่อง#nพักเติมแรงแล้วมาต่อสู้กันอย่างยุติธรรมดีกว่า!"
10007065-37 = "เอ้า สหายจากชมรมผู้รับจ้างก็ดื่มสักแก้วสิ"
10007065-38 = "เอ๊ะ เอ๋...? ให้พวกเราด้วยเหรอ?"
10007065-39 = "อื้อ ชามอร์สที่บ่มไว้เมื่อฤดูใบไม้ผลิมีอยู่เยอะ เพียงพอสำหรับทุกคนเลย"
10007065-40 = "รีบดื่มตอนอุ่นๆ เถอะ จะได้ทำให้ร่างกายอบอุ่นไม่เป็นหวัด"
10007065-41 = "งั้นก็ขอรับน้ำใจไว้แล้วกัน..."
10007065-42 = "แค่เครื่องดื่มถ้วยเดียว มันไม่ทำให้ความมุ่งมั่นของเราสั่นคลอนหรอกนะ!"
10007065-49 = "อะ...อร่อยจัง~!"
10007065-50 = "ชามอร์สอะไรกันเนี่ย? รสชาติหวานนุ่มลิ้นมากเลย"
10007065-51 = "อีกทั้งยังรู้สึกได้ถึงความอบอุ่นที่แผ่ไปทั่วร่างกาย... เป็นเครื่องดื่มที่ดีที่สุดในฤดูหนาวเลยจริงๆ!"
10007065-52 = "ฮิฮิ ดีใจที่ชอบกันนะ ฉันเองก็คิดว่าชามอร์สที่ทำคราวนี้ \"บ่ม\" ได้ดีเป็นพิเศษเลยเหมือนกัน"
10007065-53 = "ยังมีชามอร์สอุ่นๆ อีกเพียบเลยนะ... จะเอาเพิ่มมั้ยล่ะ?"
10007065-54 = "อื้ม ด้วยความยินดีเลย!"
10007065-57 = "ฮิฮิ... ฮิฮิ... "
10007065-58 = "รสชาติดีจริงๆ ถ้าเป็นชามอร์สนี่ละก็..."
10007065-59 = "[s] \"เธอโอเคหรือเปล่ามิโนริ?\""
10007065-60 = "อื้อ ไม่เป็นไร! แค่มีชามอร์สอุ่นๆ นี้ละก็ จะหนาวแค่ไหนก็ทนได้อยู่แล้ว!"
10007065-61 = "พอความอบอุ่นแผ่ไปทั่วร่างกาย ก็ทำให้รู้สึกร้อนขึ้นมาเลยละ!"
10007065-62 = "เดี๋ยวสิ... เหงื่อออกแบบนี้ก็รู้สึกหนาวหน่อยๆ เหมือนกันนะ... เกิดอะไรขึ้นเนี่ย?"
10007065-63 = "[s] \"ไม่โอเคจริงๆ ด้วย\""
10007065-64 = "อืม... พอคิดว่าหนาว มันก็รู้สึกหนาวกว่าเดิม..."
10007065-65 = "ระ... รู้สึกเวียนหัวจัง ทนไม่ไหวแล้ว..."
10007065-66 = "แบบนี้ก็เรื่องใหญ่เลยนะ ก่อนที่เหงื่อจะออกเยอะกว่านี้รีบไปแช่ออนเซ็นให้สบายตัวก่อนเถอะ"
10007065-67 = "ออนเซ็น...?"
10007065-68 = "จะให้พวกเราเข้าไปแช่น้ำในออนเซ็นที่สร้างโดยแรงงานจากเกเฮนน่างั้นเรอะ!"
10007065-69 = "ไม่ใช่แบบนั้นสักหน่อย หัวหน้ามิโนริ"
10007065-70 = "ที่เราถูกกึ่งๆ บังคับให้สร้างออนเซ็นนี้ขึ้นมาก็จริงอยู่ และอาคารที่สร้างโดยนักเรียนเกเฮนน่า ก็ไม่ได้ทำให้เรารู้สึกปลอดภัยเลยด้วย"
10007065-71 = "เพราะงั้นก็เลยอยากจะเชิญให้ \"สุดยอดสถาปนิกชั้นนำของคิโวทอส\" เข้าไปแช่ออนเซ็น#nและตรวจสอบสภาพของออนเซ็นนี้ด้วยตัวเองน่ะ"
10007065-72 = "สุดยอดสถาปนิกชั้นนำของคิโวทอส..."
10007065-73 = "ฮุฮุ แน่นอนอยู่แล้ว ในคิโวทอสไม่มีสถาปนิกกลุ่มไหนที่มีฝีมือเทียบเท่าพวกเราหรอก!"
10007065-74 = "อีกอย่างชามอร์สที่ดื่มระหว่างแช่ออนเซ็นน่ะ รสชาติก็จะต่างออกไปด้วยนะ"
10007065-75 = "... (กลืนน้ำลาย)"
10007065-79 = "(กระซิบ) มีเครื่องดื่มอื่นนอกจากชามอร์สมั้ย...?"
10007065-80 = "มีอยู่แล้วสิ เราเตรียมเครื่องดื่มผลไม้บ่มเองหลายชนิดไว้สำหรับลูกค้าที่มาใช้บริการออนเซ็น No.227 ของเราอยู่แล้ว"
10007065-81 = "ถ้าชมรมผู้รับจ้างมาใช้บริการออนเซ็นของเราในฐานะลูกค้าละก็ เราจะเตรียมชามอร์ส#nและกัมปอตไว้ต้อนรับทุกคนเลย"
10007065-82 = "อืม... ช่วยไม่ได้นะ คงจะต้องเข้าไปแช่น้ำให้สบายๆ แล้วก็ตรวจดูฝีมือการสร้างออนเซ็น#nของพวกนักเรียนจากเกเฮนน่าสักหน่อยแล้ว"
10007065-83 = "ฉันไม่ได้ยอมเพราะอยากดื่มชามอร์สเพิ่มอีกหรอกนะ!"
10007065-84 = "อื้อๆ... คิดถูกแล้วละ"
10007065-85 = "ถ้าจะลงแช่ออนเซ็นด้วยกันทั้งหมดละก็ ฉันขอแนะนำบ่อออนเซ็นกลางแจ้งขนาดใหญ่ที่อยู่ทางด้าน#nทิศเหนือนะ"
10007065-86 = "เอาละ เหล่าสหาย!"
10007065-87 = "เพื่อความปลอดภัยของออนเซ็นและชามอร์ส..."
10007065-88 = "ไม่ใช่สิ เพื่อการปฏิวัติ..."
10007065-89 = "เข้าไปลุยออนเซ็นกันเลย!"
10007065-92 = "เพื่อการปฏิวัติ...!"
10007065-97 = "ว้าว พวกชมรมผู้รับจ้างหัวรั้นเมื่อกี้ พอเจอชิกุเระจังโน้มน้าวก็ยอมทำตามเหมือนแกะเชื่องๆ เลยนะคะ"
10007065-98 = "ฮิฮิ ไม่ใช่เรื่องยากอะไรสักหน่อย"
10007065-99 = "ลูกอ้อนที่ใช้คำพูดจริงใจกับเครื่องดื่มอร่อยๆ สักแก้วน่ะ ไม่ว่าเมื่อไรก็ได้ผลตลอดนั่นแหละ"
10007065-100 = "ถึงจะเป็นเพื่อนร่วมชั้นในห้องเรียนพิเศษของเราก็จริง แต่บางครั้งชิกุเระจังก็น่ากลัวเหมือนกันนะคะ..."
10007065-101 = "[s] \"นี่ ชิกุเระ\""
10007065-102 = "หืม? มีอะไรเหรอคุณครู?"
10007065-103 = "[s] \"เครื่องดื่มนั่นน่ะ ไม่ได้ใส่อะไรแปลกๆ ใช่มั้ย?\""
10007065-104 = "มันก็แหงอยู่แล้ว ชามอร์สนี้เป็นชามอร์สแบบดั้งเดิมที่ใช้ลินกอนเบอร์รี่ น้ำตาลแล้วก็ยีสต์บ่มขึ้นมานะ"
10007065-105 = "แต่ว่าห้องเก็บของเรามีสภาพแย่นิดหน่อย มันก็เลยเหมือนจะบ่มนานเกินไปน่ะ..."
10007065-111 = "ถ้าสงสัยละก็คุณครูจะลองดื่มดูมั้ยล่ะ?"
10007065-113 = "(หลังจากนั้นคุณครูก็ปฏิเสธชามอร์สที่ชิกุเระเสนอให้ และรีบวิ่งเข้าไปในออนเซ็นทันที...)"

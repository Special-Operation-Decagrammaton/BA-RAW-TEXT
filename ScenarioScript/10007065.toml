[translation]
10007065-1 = "Episode 6;Mors for the Labor Party!"
10007065-2 = "*pant* *pant* *pant* How persistent."
10007065-3 = "*pant* *pant* You guys are the persistent ones."
10007065-4 = "How about admitting defeat and demolishing the hot springs resort?"
10007065-5 = "Absolutely not! This hot springs resort is our only hope!"
10007065-6 = "If I have to go back to those terrible days at the Former Institute..."
10007065-7 = "I would rather die along with this hot springs resort!"
10007065-8 = "I applaud your spirit, but..."
10007065-9 = "Since the Labor Party's honor is at stake, we can't back down either!"
10007065-13 = "Ack, it's so bitterly cold today."
10007065-15 = "Hahaha! You u-underestimated the cold at the Former Institute!"
10007065-16 = "I-If it's cold, wh-why don't you give up and g-g-go back?"
10007065-18 = "You're the one who looks freezing!"
10007065-19 = "Wearing only one thin kimono on a snowy mountain in the middle of winter..."
10007065-20 = "You won't last another hour like that!"
10007065-22 = "Ugh...!"
10007065-28 = "Nodoka, I brought you some warm mors."
10007065-29 = "Thank you very much, Shigure."
10007065-31 = "Wait! You can't supply during combat! That's unfair!"
10007065-32 = "This fight is a battle between the Labor Party and the Spec Ops. For our honor! Don't rely on supplies and fight fairly!"
10007065-37 = "Here, have a drink, Labor Party members."
10007065-38 = "H-Huh? Are you giving it to us as well?"
10007065-39 = "Of course. We have more than enough mors from the batch we made last spring."
10007065-40 = "Drink it while it's warm so you don't catch a cold."
10007065-41 = "We thank you for your hospitality, but..."
10007065-42 = "The will of our workers isn't so weak as to be shaken by a simple drink!"
10007065-49 = "I-It's delicious!"
10007065-50 = "What's with this mors? It's so smooth and sweet!"
10007065-51 = "Along with the slight bitter aftertaste, warmth spreads throughout the body... It's perfect for the cold!"
10007065-52 = "Heehee, I'm glad you guys like it. I thought this batch fermented very well too."
10007065-53 = "Would you like some more?"
10007065-54 = "W-We'll take it!"
10007065-57 = "Heeheehee. "
10007065-58 = "It's really good. We'd love more of this! "
10007065-59 = "[s] \"...Are you okay, Minori?\""
10007065-60 = "Of course! With this warm mors, I can withstand even the harshest of cold!"
10007065-61 = "Heat is rising from the inside of my body. I actually feel hot!"
10007065-62 = "Or I think I'm getting cold because I was sweating... What's happening?"
10007065-63 = "[s] \"I knew you wouldn't be okay...\""
10007065-64 = "Umm, I feel colder now thinking about being cold..."
10007065-65 = "My head is dizzy as well. I can't stand this any longer..."
10007065-66 = "Oh dear, that's no good. You should go into the hot springs and warm yourself up before your sweat cools down."
10007065-67 = "...The hot springs?"
10007065-68 = "Are you recommending our Labor Party to bathe in the hot springs built by the Gehenna idiots?!"
10007065-69 = "It's not like that, President Minori."
10007065-70 = "We were indeed forced to take over the resort, but we're very worried about the stability of a facility built by Gehenna students."
10007065-71 = "That's why we would like the members of the Labor Party, the renowned best architects of Kivotos, to go into the baths and personally check the facility's conditions."
10007065-72 = "The best architects of Kivotos..."
10007065-73 = "Heehee. That's right. There are no other architecture groups as skilled as us in Kivotos!"
10007065-74 = "Plus, drinking mors while soaking your body in a warm bath is a special kind of experience."
10007065-75 = "*hiccup*"
10007065-79 = "*whisper* Are there drinks other than mors by any chance?"
10007065-80 = "We have a large variety of homemade fruit drinks for our guests at Hot Springs Resort No. 227."
10007065-81 = "If the Labor Party visits our hot springs resort as guests, we'll treat you to whatever drink you like, whether it's kompot or mors."
10007065-82 = "Hmm...It can't be helped, I guess. We will have to take a bath, only so we can check out how poorly the Gehenna idiots built the hot springs resort."
10007065-83 = "I'm definitely not doing this because I want to drink more mors!"
10007065-84 = "Yeah, yeah. Good idea."
10007065-85 = "If you are all going to bathe together, I recommend the northern open-air, large public bath."
10007065-86 = "Come, comrades."
10007065-87 = "For the structural safety of the hot springs resort and more mors..."
10007065-88 = "I mean, for a revolutionary break..."
10007065-89 = "Charge the hot springs!"
10007065-92 = "For a revolutionary break!"
10007065-97 = "Wow, those stubborn Labor Party members were powerless before Shigure's persuasion."
10007065-98 = "Heehee, it wasn't that difficult."
10007065-99 = "A request asked with a delicious drink and words of sincerity always works."
10007065-100 = "Even though we're in the same Spec Ops, I'm scared of you sometimes, Shigure..."
10007065-101 = "[s] \"Hey, Shigure.\""
10007065-102 = "Huh? What is it, Sensei?"
10007065-103 = "[s] \"There's nothing wrong with the drink, right?\""
10007065-104 = "Of course not. It's a traditional mors made only with lingonberry, sugar, and yeast."
10007065-105 = "It's just that it fermented a bit due to poor storage conditions..."
10007065-111 = "If you're suspicious, why don't you take a sip, Sensei?"
10007065-113 = "Afterwards, I refused the mors that Shigure kept on offering and ran into the hot springs resort."

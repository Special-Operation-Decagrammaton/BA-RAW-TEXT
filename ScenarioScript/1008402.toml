[translation]
1008402-1 = "Secret Mountain Hike"
1008402-6 = "Over the weekend break, I visited the mountains for a refreshing hike..."
1008402-12 = "And I ran into Kotama right at the trailhead."
1008402-13 = "[s] \"Kotama?\""
1008402-17 = "Oh"
1008402-18 = "Wh-Why are you here, Sensei?"
1008402-19 = "Or rather...I'm here to...uh..."
1008402-25 = "What a lovely day."
1008402-26 = "[s] \"Yes, the weather's lovely.\""
1008402-28 = "[ns1] \"What brings you out to the mountain?\"\n[ns2] \"I'm surprised you're not at the club room.\""
1008402-31 = "Well, you see..."
1008402-32 = "For my new year's resolution, I wanted to be more active."
1008402-33 = "So I decided to start by taking a hike up this mountain!"
1008402-34 = "[s] \"...And you need that huge voice recorder to hike?\""
1008402-35 = "This is no voice recorder!"
1008402-36 = "It's a multipurpose electronic recording device that picks up surrounding sounds in the nearby area."
1008402-37 = "[s] \"Also known as a voice recorder.\""
1008402-42 = "...I can't believe I got caught again. You're right."
1008402-43 = "The real reason I came up here was to record the candid conversations of hiking couples."
1008402-44 = "[s] \"...Define candid?\""
1008402-48 = "Of course! Through intensive research, I learned that mountains make for popular dating spots."
1008402-49 = "The open space and low population density provides an air of isolation and privacy, while the physical and mental toil forces couples to rely on each other."
1008402-50 = "As the hike brings them closer, the lovebirds become prone to uttering sweet nothings they normally wouldn't say."
1008402-51 = "And hidden amongst the mountain shrubbery will be me, ready to capture every giggle and secret whisper."
1008402-52 = "[s] \"Then you'll go to jail for wiretapping.\""
1008402-53 = "I figured you'd say something like that."
1008402-54 = "But I've already come this far. I can't go back without any results."
1008402-55 = "At least let me record your voice, Sensei—"
1008402-56 = "[s] \"(What's the point of trying to be sneaky, if you admit your crime out loud?)\""
1008402-58 = "[ns] \"Anyway, since we're already at the mountain, why don't we take a hike?\""
1008402-59 = "Mm... I'm not exactly a hiking fan..."
1008402-60 = "But I suppose I won't catch any juicy conversations down here at the trailhead."
1008402-61 = "Let's comb the mountain for a romantic spot where couples would start talking all lovey-dovey to each other."
1008402-62 = "If I'm lucky, I'll even get to record Sensei's heavy breathing from our intense hike."
1008402-63 = "[s] \"And just what exactly would you use that for?!\""
1008402-64 = "Heehee. That's a secret."
1008402-68 = "Shall we begin our journey?"
1008402-74 = "About thirty minutes later..."
1008402-79 = "*pant* *wheeze*... That's odd..."
1008402-80 = "The sign at the trailhead said this was a beginner's trail..."
1008402-81 = "We're not even half way up, and I'm *wheeze* exhausted."
1008402-82 = "I'd like to request that the official mountain information signs be revised."
1008402-83 = "[s] \"Have you ever even hiked before, Kotama?\""
1008402-84 = "Of course not."
1008402-85 = "But I thought I could at least handle the beginner trail."
1008402-86 = "[s] \"Well it isn't going to get any easier.\""
1008402-90 = "[ns] \"Here, give me your hand. I'll help you.\""
1008402-94 = "*cough*... Thank you... *pant*"
1008402-101 = "Your hands are really warm, Sensei."
1008402-102 = "And they smell kind of nice."
1008402-103 = "[s] \"Thanks. I use soap.\""
1008402-104 = "Huh. I've never really thought about something like what kind of soap people use."
1008402-105 = "I usually fixate on people's voices. I never considered physical aspects like their scent or body heat."
1008402-106 = "It's a treasure trove of new stimuli!"
1008402-112 = "While the physical and mental toil forces couples to rely on each other..."
1008402-113 = "As the hike brings them closer, the lovebirds become prone to uttering sweet nothings they normally wouldn't say."
1008402-118 = "...!"
1008402-119 = "[s] \"Are you all right?\""
1008402-120 = "I came here to record the candid conversations of couples, only to speak candidly myself..."
1008402-121 = "I guess the hiking must've made me delirious."
1008402-125 = "J-Just forget about everything I said earlier!"
1008402-132 = "Kotama sprinted down the mountain, moving faster than she had all day. In seconds, she was out of sight."

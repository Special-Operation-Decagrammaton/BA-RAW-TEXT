[translation]
1008402-1 = "การปีนเขาแบบลับๆ"
1008402-6 = "(คุณครูไปปีนเขาใกล้ๆ ในวันสุดสัปดาห์ด้วยใจที่ผ่อนคลาย และระหว่างนั้นเอง...)"
1008402-12 = "(ก็ได้เจอกับโคทามะที่ทางเข้า)"
1008402-13 = "[s] \"โคทามะ...?\""
1008402-17 = "อ๊ะ"
1008402-18 = "คะ... คุณครูมาทำอะไรที่นี่..."
1008402-19 = "ไม่สิ ต้องถามว่า... รู้ได้ยังไงว่าฉันมาที่นี่..."
1008402-25 = "ช่างเป็นวันหยุดที่ดีจริงๆ เลยค่ะ คุณครู"
1008402-26 = "[s] \"ใช่ เป็นวันที่ดีจริงๆ นะ โคทามะ\""
1008402-28 = "[ns1] \"จะว่าไป มาทำอะไรที่ภูเขาเหรอ?\"\n[ns2] \"ปกติเห็นแทบจะไม่ออกจากห้องชมรมเลยนี่นา...\""
1008402-31 = "เอ่อ คือว่า..."
1008402-32 = "ปีใหม่ทั้งที ฉันเลยอยากฝึกนิสัยการใช้ชีวิตที่ดีต่อสุขภาพ..."
1008402-33 = "ก็เลยออกมาปีนเขาน่ะค่ะ!"
1008402-34 = "[s] \"แต่ก็พกเครื่องบันทึกเสียงขนาดใหญ่มาด้วยเนี่ยนะ?\""
1008402-35 = "นะ... นี่ไม่ใช่เครื่องบันทึกเสียงนะคะ!"
1008402-36 = "ก็แค่เครื่องบันทึกอิเล็กทรอนิกส์อเนกประสงค์ที่ใช้เก็บเสียงรอบๆ ตัวค่ะ"
1008402-37 = "[s] \"ก็เครื่องบันทึกเสียงไม่ใช่เหรอ...\""
1008402-42 = "ฉันหลอกคุณครูไม่ได้จริงด้วย..."
1008402-43 = "ที่จริงแล้ว... ฉันมาที่ภูเขาเพื่อบันทึกการสนทนาลับๆ ของคู่รักที่มาที่นี่ค่ะ"
1008402-44 = "[s] \"การสนทนาลับๆ?\""
1008402-48 = "ค่ะ อย่างที่ฉันเคยบอกไปก่อนหน้านี้ว่าภูเขาเป็นที่ที่คู่รักมักจะมาเดตกัน"
1008402-49 = "เพราะที่นี่มีคนน้อย ก็เลยเหมาะกับการพูดคุยเรื่องลับๆ และการเดินป่าก็มักทำให้เกิดความเหนื่อยล้า ทั้งทางร่างกายและจิตใจ..."
1008402-50 = "ถ้าต้องพึ่งพาอีกฝ่ายเยอะๆ ก็จะพูดคำหวานๆ ที่ปกติแล้วไม่ค่อยกล้าพูดออกมาได้ง่ายค่ะ"
1008402-51 = "เพราะงั้นฉันก็เลยคิดว่าถ้าซ่อนตัวอยู่ในเส้นทางปีนเขา ก็จะบันทึกเสียงสนทนาสนุกๆ ได้..."
1008402-52 = "[s] \"แอบฟังคนอื่นคุยกันเป็นเรื่องไม่ดีนะ\""
1008402-53 = "กะไว้แล้วค่ะว่าคุณครูต้องพูดแบบนี้"
1008402-54 = "แต่ฉันก็มาถึงที่นี่แล้ว ถ้ากลับไปมือเปล่ามันก็..."
1008402-55 = "แต่ในเมื่อเป็นแบบนี้แล้ว ก็บันทึกเสียงของคุณครูไปเลย..."
1008402-56 = "[s] (ถ้าบันทึกเสียงซึ่งๆ หน้า มันจะเรียกว่าดักฟังได้เหรอ?)"
1008402-58 = "[ns] \"เอาเถอะ ไหนๆ ก็มาแล้ว ไปปีนเขาด้วยกันเลยแล้วกัน\""
1008402-59 = "อืม... ฉันไม่อยากจะปีนเขาเท่าไรเลย..."
1008402-60 = "แต่การอยู่ที่ทางเข้าเส้นทางปีนเขาก็บันทึกเสียงอะไรไม่ได้เท่าไรค่ะ"
1008402-61 = "ถ้าจะหาสถานที่ที่บรรยากาศเหมาะสำหรับการพูดคุยกันของคู่รัก ก็น่าจะต้องปีนเขาขึ้นไปหน่อย"
1008402-62 = "และถ้าโชคดี บางทีฉันอาจจะได้บันทึกเสียงหยาบกร้านของคุณครูขณะที่ปีนเขาได้ด้วยนะคะ"
1008402-63 = "[s] \"จะเอาเสียงแบบนั้นไปทำอะไรน่ะ?!\""
1008402-64 = "ฮุฮุ ความลับค่ะ"
1008402-68 = "งั้นเราไปปีนเขากันเลยมั้ยคะ?"
1008402-74 = "(30 นาทีต่อมา...)"
1008402-79 = "แฮ่ก... แฮ่ก... แปลกจังเลยค่ะ..."
1008402-80 = "ป้ายตรงทางเข้าเขียนไว้ว่านี่เป็นเส้นทางง่ายๆ ที่นักปีนเขามือใหม่ก็ขึ้นมาได้แท้ๆ..."
1008402-81 = "แต่ฉันหมดแรงตั้งแต่ยังไม่ถึงครึ่งทางเลย..."
1008402-82 = "ฉันจะไปแจ้งกับทางป่าไม้ให้แก้ข้อมูลในป้ายค่ะ"
1008402-83 = "[s] \"โคทามะไม่ค่อยมีแรงเองรึเปล่า?\""
1008402-84 = "ไม่มีทางหรอกค่ะ..."
1008402-85 = "เรื่องพละกำลังน่ะ ฉันมั่นใจว่าตัวเองก็อยู่ในเกณฑ์มาตรฐาน"
1008402-86 = "[s] \"ถ้าเหนื่อยอย่างนี้ คงปีนเขาต่อลำบากแล้วนะ\""
1008402-90 = "[ns] \"งั้นส่งมือมา ครูจะพาปีนเอง\""
1008402-94 = "แฮ่ก... แฮ่ก... งั้นก็รบกวนด้วยนะคะ..."
1008402-101 = "มือของคุณครู อบอุ่นกว่าที่คิดไว้นะคะเนี่ย"
1008402-102 = "อีกอย่าง... มือยังมีกลิ่นหอมด้วยค่ะ"
1008402-103 = "[s] \"งั้นเหรอ? ไม่รู้เลยแฮะ...\""
1008402-104 = "ค่ะ นี่เป็นครั้งแรกที่ฉันได้อยู่ใกล้ๆ คุณครูแบบนี้ มันรู้สึกแปลกๆ ดีนะคะ"
1008402-105 = "เพราะปกติแล้วฉันเอาแต่ตั้งใจฟังเสียงของคุณครูจากที่ไกลๆ ก็เลยไม่ได้คิดถึงเรื่องกลิ่นหรืออุณหภูมิ#nร่างกายเท่าไร..."
1008402-106 = "สิ่งเร้าประเภทนี้ก็... ไม่ได้แย่นะคะ"
1008402-112 = "การเดินป่าก็มักทำให้เกิดความเหนื่อยล้าทั้งทางร่างกายและจิตใจ..."
1008402-113 = "ถ้าต้องพึ่งพาอีกฝ่ายเยอะๆ ก็จะพูดคำหวานๆ ที่ปกติแล้วไม่ค่อยกล้าพูดออกมาได้ง่ายๆ ค่ะ"
1008402-118 = "...!"
1008402-119 = "[s] \"จู่ๆ เป็นอะไรไปเหรอ?\""
1008402-120 = "ฉันขึ้นมาบันทึกคำพูดหวานๆ ของคู่รักตอนพวกเขาเผลอแท้ๆ แต่ก็ดันมาตกกับดักเดียวกันซะงั้น..."
1008402-121 = "ฉันเหนื่อยกับการปีนเขา ก็เลยพูดอะไรน่าอายออกไปจนได้ค่ะ..."
1008402-125 = "ทะ... ที่ฉันพูดออกไปเมื่อกี้ ช่วยทำเป็นไม่เคยได้ยินด้วยนะคะ!"
1008402-132 = "(จากนั้นโคทามะก็มุ่งหน้าปีนเขาด้วยความเร็วมากกว่าเดิม 2 เท่าจนหายไปจากสายตา...)"

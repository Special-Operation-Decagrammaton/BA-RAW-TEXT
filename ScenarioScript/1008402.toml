[translation]
1008402-1 = "隱密的健行"
1008402-6 = "（為了享受假日，帶著愜意的心情到附近的山裡健行……）"
1008402-12 = "（……結果竟然在入口處碰上了小玉）"
1008402-13 = "[s]「……小玉？」"
1008402-17 = "啊。"
1008402-18 = "老，老師，你怎麼會在這裡……？"
1008402-19 = "不，更重要的是……我在這裡的事……"
1008402-25 = "……週末愉快，老師。"
1008402-26 = "[s]「週末愉快，小玉。」"
1008402-28 = "[ns1]「話說小玉怎麼會來爬山？」\n[ns2]「你平常不是連離開部室都覺得麻煩嗎……」"
1008402-31 = "該怎麼說呢……"
1008402-32 = "因為新的一年到了，我想培養一些健康的好習慣……"
1008402-33 = "所以打算久違地來爬一次山！"
1008402-34 = "[s]「……帶著那個巨大的錄音機？」"
1008402-35 = "這，這才不是錄音機！"
1008402-36 = "只是……一種能收集周圍聲音的多用途電子紀錄裝置。"
1008402-37 = "[s]「那不就是錄音機嗎……」"
1008402-42 = "……果然騙不過老師呢。"
1008402-43 = "其實我來這裡是為了錄下情侶之間的悄悄話。"
1008402-44 = "[s]「……悄悄話？」"
1008402-48 = "沒錯，我記得之前好像有跟老師提過，山上是情侶之間的熱門約會場所。"
1008402-49 = "因為山裡人煙稀少，很適合聊一些私密的話題……#n而且爬山容易會造成身心疲勞……"
1008402-50 = "這種時候如果情侶間能互相扶持……#n即使是平時會覺得難為情的甜言蜜語也能輕易地說出口。"
1008402-51 = "所以我想說只要躲在登山步道旁邊，應該能錄到許多有趣的對話內容……"
1008402-52 = "[s]「偷聽別人的對話不是一件好事哦。」"
1008402-53 = "……我就知道老師會這麼說。"
1008402-54 = "可是都已經來到這裡，就這樣空手回去也太令人不甘心了……"
1008402-55 = "既然如此，至少讓我錄一段老師的聲音……"
1008402-56 = "[s]（……都直接講出來了還能算是竊聽嗎？）"
1008402-58 = "[ns]「總之，既然你都難得過來了，我們就一起爬山吧。」"
1008402-59 = "唔……雖然我不是很想爬山……"
1008402-60 = "不過在這種空曠的登山步道入口的確錄不到什麼精彩的對話。"
1008402-61 = "想要找到氣氛夠好、能讓情侶們自然說出甜言蜜語的地方，應該還得再爬一段路吧？"
1008402-62 = "而且運氣好的話，說不定還能錄到老師爬山爬得氣喘吁吁的聲音……"
1008402-63 = "[s]「你錄那種聲音要做什麼！？」"
1008402-64 = "呵呵，那是祕密。"
1008402-68 = "那我們就一起爬山吧？"
1008402-74 = "（約莫三十分鐘過後……）"
1008402-79 = "哈啊，哈啊……真奇怪……"
1008402-80 = "入口處明明寫這是一條連初學者都能輕鬆駕馭的登山步道……"
1008402-81 = "為什麼連一半都還沒走完，我的體力就已經見底了……"
1008402-82 = "之後一定要要求他們修改登山簡介。"
1008402-83 = "[s]「小玉，這會不會是因為你的體力太差了……？」"
1008402-84 = "怎麼可能……"
1008402-85 = "老實說，我一直覺得自己的體力應該跟普通人差不多。"
1008402-86 = "[s]「這樣可能有點難爬到山頂。」"
1008402-90 = "[ns]「來，把手給我，我牽你走吧。」"
1008402-94 = "哈啊，哈啊……那就拜託你了……"
1008402-101 = "……老師的手比想像中還要溫暖呢。"
1008402-102 = "而且總覺得……聞起來好像有股舒服的香味。"
1008402-103 = "[s]「是嗎？我自己倒是沒什麼感覺……」"
1008402-104 = "嗯，而且我還是第一次離老師這麼近，總覺得有點新鮮。"
1008402-105 = "因為平時距離比較遠，所以我只注意到老師的聲音，#n完全沒有注意到老師的香味或體溫之類的特徵……"
1008402-106 = "其實這樣子的刺激也不賴──"
1008402-112 = "而且爬山容易會造成身心疲勞……"
1008402-113 = "這種時候如果情侶間能互相扶持……#n即使是平時會覺得難為情的甜言蜜語也能輕易地說出口。"
1008402-118 = "……！"
1008402-119 = "[s]「怎麼了嗎？」"
1008402-120 = "今天本來是想趁情侶們不注意的時候，錄下他們之間的甜言蜜語……#n沒想到卻自己落入了相同的陷阱……"
1008402-121 = "都是因為爬山爬得太累，我才會下意識說出那種令人害羞的話……"
1008402-125 = "請，請你把我剛才說的話忘了！"
1008402-132 = "（說完，小玉就用比上坡時快一倍的速度消失在眼前……）"

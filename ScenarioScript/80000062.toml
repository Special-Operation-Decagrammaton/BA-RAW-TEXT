[translation]
80000062-1 = "未經包裝如實呈現"
80000062-2 = "……啊啊，老師。晚安。"
80000062-3 = "抱歉半夜請你過來。我姑且處於待命狀態，所以沒辦法去太遠的地方。"
80000062-4 = "[s1]「沒關係。有什麼事嗎？」\n[s2]「瀨奈今天也辛苦了。話說今天有什麼事？」"
80000062-5 = "謝謝。"
80000062-6 = "和平時的狀況差不多，到目前為止還不算特別忙……"
80000062-7 = "我想老師也和平時一樣，不，今天應該會特別忙，所以就開門見山進入正題了。"
80000062-8 = "來，請收下這個。"
80000062-14 = "[ns3]「這是，情人節的……？」\n[ns4]「纏著繃帶……」"
80000062-15 = "是的，是情人節巧克力。因為不想後悔，所以想送給老師。"
80000062-16 = "是的，是情人節巧克力。因為不想後悔，所以想送給老師。"
80000062-17 = "本來是打算送更好更精緻的巧克力的……"
80000062-18 = "可惜實在是沒有抽空到店裡買的時間，只好用手邊的材料自己做了。"
80000062-19 = "[ns]「這樣啊，謝謝你。」"
80000062-21 = "[ns]「……『用手邊的材料』？」"
80000062-22 = "是的。如老師所知，救護車上有各式各樣的藥品跟材料。#n要做出巧克力之類的東西還是有可能的。"
80000062-23 = "……？"
80000062-24 = "怎麼了嗎？老師一臉不安的樣子。"
80000062-25 = "……啊啊，我大概能想像的到。不過請不用擔心。"
80000062-26 = "雖然那確實是「巧克力口味的化合物」沒錯。但是對人體無害，反而對健康有益。"
80000062-27 = "硬要說的話，那個「包裝」或許更令人在意……"
80000062-28 = "因為實在沒有更適合的東西，又必須注意清潔衛生的問題。"
80000062-29 = "仔細想想這種東西的外觀也是很重要的部分，現在我反而擔心它會成為扣分的因素。"
80000062-30 = "[s5]「不會哦，我覺得很有瀬奈的風格。」\n[s6]「你為了我嘗試了很多次吧，我很開心。」"
80000062-31 = "……依然這麼直來直往呢，老師。"
80000062-32 = "……依然這麼直來直往呢，老師。"
80000062-33 = "不過老師喜歡的話我就放心了。不介意的話要不要現在嚐嚐看？"
80000062-37 = "我聽說這種時候經常由送禮的一方餵對方吃。機會難得就立刻來試試看吧。"
80000062-38 = "……怎麼了嗎？老師在猶豫什麼？"
80000062-39 = "請別擔心，這個巧克力既安全又衛生。請老師別亂動。"
80000062-45 = "……沒辦法了，強制執行吧。"
80000062-49 = "（於是便被瀨奈強行進行了「啊～嗯」（？）……味道確實是非常美味的巧克力）"

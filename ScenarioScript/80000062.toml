[translation]
80000062-1 = "#title;포장지가 없어서"
80000062-2 = "3;세나;02;……아. 선생님. 오셨습니까.\n#3;em;[반응]\n#3;a"
80000062-3 = "3;세나;99;야밤에 불러내서 죄송합니다. 한창 비상 대기 중인 터라, 멀리 나가지 못해서 그랬습니다."
80000062-4 = "[s1] \"나는 괜찮아. 무슨 일 있어?\"\n[s2] \"오늘도 바쁘네. 신경 쓰지 마.\""
80000062-5 = "3;세나;01;아뇨. 아직은 별일이 없는 상태입니다."
80000062-6 = "3;세나;02;뭐……. 늘 똑같은 상황이니 바쁘다는 느낌은 없습니다만……."
80000062-7 = "3;세나;01;아마 선생님께서도 바쁘실 테니, 거두절미하고 본론으로 들어가겠습니다.\n#3;greeting"
80000062-8 = "3;세나;99;불러낸 이유는……. 이것입니다.\n#3;em;[...]"
80000062-9 = "#st;[0,0];instant;1;"
80000062-10 = "#clearST"
80000062-11 = "3;세나;99\n#3;d\n#wait;1000"
80000062-12 = "#wait;1500"
80000062-13 = "#wait;2500"
80000062-14 = "[ns3] \"발렌타인 초콜릿……?\"\n[ns4] \"붕대를 두른 초콜릿?\""
80000062-15 = "3;세나;02;네. 발렌타인 초콜릿입니다. 오늘 같은 날을 빠뜨리면, 분명 나중에 후회할 테니까요.\n#3;em;[반짝]\n#3;a"
80000062-16 = "3;세나;02;네. 발렌타인 초콜릿입니다. 오늘 같은 날을 빠뜨리면, 분명 나중에 후회할 테니까요.\n#3;em;[반짝]\n#3;a"
80000062-17 = "3;세나;99;원래라면 좀 더 제대로 된 걸로, 가게에서 돈 주고 사서 대접해 드려야겠지만……."
80000062-18 = "3;세나;02;유감스럽게도 가게를 직접 들르거나 할 여유는 없어서, 대신 있는 재료들로 짬짬이 만들었습니다.\n#3;em;[재잘]"
80000062-19 = "[ns] \"그렇구나. 있는 재료들로…….\""
80000062-20 = "#wait;2000"
80000062-21 = "[ns] \"……있는 재료들로?\""
80000062-22 = "3;세나;01;네. 아시다시피 이 앰뷸런스에는 다양한 약품과 재료들이 있으니까요. 초콜릿 정도는, 대기 시간 동안 만들 수 있는 것이죠.\n#3;em;[반응]"
80000062-23 = "3;세나;02;……음?"
80000062-24 = "3;세나;01;왜 그러시죠? 갑자기 불안해하는 얼굴로.\n#3;em;[?]"
80000062-25 = "3;세나;99;……음. 무슨 생각을 하시는지 대충 상상은 가지만 괜찮습니다."
80000062-26 = "3;세나;99;사실상 초콜릿 맛이 나는 이상한 혼합물이지만, 몸에 나쁜 건 없으니까요.\n#3;em;[...]"
80000062-27 = "3;세나;06;……오히려 문제는 포장지 쪽입니다만."
80000062-28 = "3;세나;01;딱히 쌀 만한 게 없어서, 청결 유지 겸 멸균붕대를 사용했더니 모양새가 영 이상해졌거든요.\n#3;em;[속상함]"
80000062-29 = "3;세나;02;이런 건 비주얼도 상당히 중요하다고 생각하는데, 큰 감점요인이라 걱정이 됩니다."
80000062-30 = "[s5] \"세나다워서 마음에 들어.\"\n[s6] \"가게에서 산 것보다 이게 더 좋아.\""
80000062-31 = "3;세나;99;……또 그런 무방비한 말씀을 아무렇지도 않게 하시는군요. 선생님답네요.\n#3;em;[...]"
80000062-32 = "3;세나;99;……또 그런 무방비한 말씀을 아무렇지도 않게 하시는군요. 선생님답네요.\n#3;em;[...]"
80000062-33 = "3;세나;02;그래도 기뻐해 주시니 마음이 놓입니다. 맛에는 문제가 없으니, 괜찮으시다면 지금 드시겠습니까?"
80000062-34 = "#st;[0,0];instant;1;"
80000062-35 = "#clearST"
80000062-36 = "3;세나;02\n#3;d\n#wait;1000"
80000062-37 = "3;세나;01;이런 건 원래 스스로 먹는 게 아니라 옆에서 먹여주는 거라고 알고 있습니다. 바로 실행하시죠.\n#3;em;[반짝]\n#3;closeup\n#3;greeting\n#3;a"
80000062-38 = "3;세나;02;……음? 뭐죠? 왜 머뭇거리시는 겁니까.\n#3;closeup"
80000062-39 = "3;세나;01;안전한 식품이라고 말씀드렸지 않습니까. 거기 그대로 계십시오.\n#3;closeup\n#bgshake"
80000062-40 = "#st;[0,0];instant;1;"
80000062-41 = "#clearST"
80000062-42 = "#wait;250"
80000062-43 = "3;세나;01\n#wait;750"
80000062-44 = "3;세나;01\n#3;em;[반응]\n#wait;1500"
80000062-45 = "3;세나;01;……가만히 있으라고 말씀드렸습니다.\n#3;em;[빠직]\n#3;closeup"
80000062-46 = "#all;hide"
80000062-47 = "#wait;1500"
80000062-48 = "#wait;1500"
80000062-49 = "#na;(……의외로 제대로 된 초콜릿 맛이었다.)"

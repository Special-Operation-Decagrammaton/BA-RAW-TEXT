[translation]
80000062-1 = "พอดีไม่มีกระดาษห่อ..."
80000062-2 = "อ๊ะ... คุณครู มาแล้วเหรอคะ"
80000062-3 = "ขอโทษที่เรียกออกมากลางดึกนะคะ ฉันอยู่ระหว่างสแตนด์บายรอเหตุฉุกเฉิน เลยออกไปไหนไกลไม่ได้ค่ะ"
80000062-4 = "[s1] \"ครูไม่เป็นไรหรอก มีอะไรเหรอ?\"\n[s2] \"วันนี้ก็ยุ่งเหมือนเดิมเลยนะ\""
80000062-5 = "ไม่หรอกค่ะ ตอนนี้ไม่มีเหตุฉุกเฉินอะไรด้วยค่ะ"
80000062-6 = "ก็... สถานการณ์มันก็เหมือนเดิมตลอด เลยไม่ค่อยรู้สึกว่ายุ่งเท่าไรค่ะ..."
80000062-7 = "คุณครูเองก็คงจะยุ่งมากเหมือนกัน มาคุยธุระกันเลยดีกว่าค่ะ"
80000062-8 = "เหตุผลที่ฉันเรียกคุณครูมาก็คือ... นี่ค่ะ"
80000062-14 = "[ns3] \"ช็อกโกแลตวาเลนไทน์...?\"\n[ns4] \"ช็อกโกแลตที่พันด้วยผ้าพันแผล?\""
80000062-15 = "ใช่แล้วค่ะ ช็อกโกแลตวาเลนไทน์ค่ะ หากพลาดวันแบบนี้ไป จะเสียใจภายหลังได้นะคะ"
80000062-16 = "ใช่แล้วค่ะ ช็อกโกแลตวาเลนไทน์ค่ะ หากพลาดวันแบบนี้ไป จะเสียใจภายหลังได้นะคะ"
80000062-17 = "ปกติก็ควรจะไปซื้อที่ร้านแล้วเอามาให้แท้ๆ..."
80000062-18 = "น่าเสียดายที่ฉันไม่มีเวลาไปร้านเอง เพราะงั้นฉันเลยทำขึ้นมาโดยใช้วัตถุดิบที่มีอยู่ค่ะ"
80000062-19 = "[ns] \"งั้นเหรอ วัตถุดิบที่มี...\""
80000062-21 = "[ns] \"วัตถุดิบที่มี...?\""
80000062-22 = "ใช่แล้วค่ะ ในรถพยาบาลคันนี้มีวัตถุดิบและยาหลากหลายชนิดเลยค่ะ เพราะงั้นตอนที่รอ แค่ช็อกโกแลตก็ทำได้อยู่แล้วค่ะ"
80000062-23 = "หืม...?"
80000062-24 = "ทำไมทำหน้าแบบนั้นล่ะคะ? จู่ๆ สีหน้าก็ดูกังวลขึ้นมาเลยนะคะ"
80000062-25 = "อืม... ฉันพอจะทราบว่าคุณครูคิดอะไรอยู่ แต่ไม่เป็นไรค่ะ"
80000062-26 = "ถึงจะเป็นส่วนผสมแปลกๆ ที่มีรสช็อกโกแลต แต่ก็ไม่มีอะไรที่เป็นอันตรายต่อร่างกายหรอกค่ะ"
80000062-27 = "แต่ปัญหาคือกระดาษห่อมากกว่า..."
80000062-28 = "ฉันไม่มีกระดาษที่ใช้ห่อได้เลย เพราะงั้นเลยใช้ผ้าพันแผลที่มีอยู่ห่อแทน เลยดูแปลกๆ แบบนั้นค่ะ"
80000062-29 = "ที่จริงฉันเองก็คิดว่าลักษณะภายนอกเป็นเรื่องสำคัญอยู่เหมือนกันนะคะ..."
80000062-30 = "[s5] \"ครูชอบนะ ดูเป็นเอกลักษณ์ของเซนะดี\"\n[s6] \"ดีกว่าอันที่ซื้อจากร้านตั้งเยอะ\""
80000062-31 = "พูดอะไรแบบนี้อีกแล้วนะคะ สมกับเป็นคุณครูจริงๆ ค่ะ"
80000062-32 = "พูดอะไรแบบนี้อีกแล้วนะคะ สมกับเป็นคุณครูจริงๆ ค่ะ"
80000062-33 = "แต่ก็ดีแล้วละค่ะที่คุณครูชอบ เรื่องรสชาติไม่มีปัญหาแน่ๆ ถ้าคุณครูไม่ติดอะไรลองชิมสักหน่อยมั้ยคะ?"
80000062-37 = "ได้ยินว่าปกติจะต้องมีคนคอยป้อนให้ด้วยค่ะ ฉันจะป้อนให้นะคะ"
80000062-38 = "หืม...? อะไรเหรอคะ? ลังเลอะไรเหรอคะ"
80000062-39 = "ฉันบอกแล้วไม่ใช่เหรอคะว่าปลอดภัยแน่นอน รออยู่ตรงนั้นก่อนค่ะ"
80000062-45 = "ฉันบอกให้รอก่อนไม่ใช่เหรอคะ..."
80000062-49 = "(น่าแปลกที่รสชาติอร่อยเหมือนช็อกโกแลตจริงๆ...)"

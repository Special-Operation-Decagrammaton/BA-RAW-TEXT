[translation]
2000903-1 = "Softer Than Pudding"
2000903-2 = "You're late, Comrade!"
2000903-3 = "[s] \"I'm only five minutes late...\""
2000903-4 = "Only? Only?! Do you know what you can achieve in five minutes?"
2000903-5 = "For example, you could boil 100 hot spring boiled eggs!"
2000903-6 = "[s] \"Hot spring eggs don't boil that fast.\""
2000903-7 = "I-Is that so?"
2000903-8 = "A-Ahem, regardless, making me wait is a crime! Normally, I would sentence you to 10 years of bathroom cleaning, but..."
2000903-9 = "Since we have a very important mission today, I will specially forgive you. Feel honored, Comrade!"
2000903-10 = "So, uh, how do you make hot spring boiled eggs? When I watched the School Lunch Club making pudding last time, it looked pretty complicated."
2000903-11 = "[s] \"You put the eggs in the hot springs and wait.\""
2000903-12 = "Wh-What? Is it really possible to make such a pudding-like delicacy so simply?"
2000903-13 = "Comrade... You would not dare deceive me, would you?"
2000903-14 = "Well, it's not like you would benefit from deceiving me. I suppose you're forgiven."
2000903-15 = "Shall we start making hot spring boiled eggs then?"
2000903-21 = "[ns] \"Are those all eggs...?\""
2000903-22 = "Heehee, I'll spare no expense when we are making something as delicious as pudding!"
2000903-23 = "I made them bring all the eggs from the School Lunch Club!"
2000903-24 = "If I make a bunch like this, I can eat hot spring boiled eggs all day long."
2000903-25 = "Huh? I might get tired of eating the eggs?"
2000903-26 = "Nonsense, Comrade. I would never tire of food that's soft and delicious like pudding."
2000903-27 = "I can eat it all day! The rest of my life!"
2000903-28 = "Heehee... I can't contain my excitement at the idea of turning all these eggs into pudding."
2000903-29 = "We must not delay any further. Comrade, let's boil the hot spring eggs."
2000903-30 = "Place all the eggs here in the hot springs. Be careful not to break them!"
2000903-39 = "Comrade, are the eggs almost done?"
2000903-40 = "[s] \"It hasn't even been five minutes.\""
2000903-41 = "It feels like it's been fifty years."
2000903-42 = "Fine. I guess I'll just have to be patient and wait."
2000903-46 = "Comrade, are they done yet?"
2000903-47 = "[s] \"It's only been eight minutes...\""
2000903-48 = "It hasn't even been ten minutes?"
2000903-49 = "Comrade, maybe your watch is broken."
2000903-50 = "There's absolutely no way it's only been eight minutes."
2000903-53 = "[ns] \"I think you can eat it now.\""
2000903-54 = "Finally! I've waited so long!"
2000903-60 = "[ns] Hand Cherino a hot spring boiled egg."
2000903-61 = "Heehee... The warmth of a properly boiled egg feels really nice."
2000903-62 = "Since this food took so long to make, it should be just like high-quality pudding, right?"
2000903-63 = "Now, let's see how it tastes."
2000903-69 = "What's this, Comrade?"
2000903-70 = "It's just... It's just an undercooked egg."
2000903-71 = "[s] \"Yes, it's an egg boiled in hot springs water.\""
2000903-72 = "I mean, the texture is similar to that of pudding, but it tastes bland and smells like sulfur... Besides the texture, it's not like pudding at all."
2000903-73 = "Ugh... You deceived me, Comrade!"
2000903-74 = "Comrade, I trusted you and boiled all these eggs. What am I going to do with them?!"
2000903-75 = "[s1] \"Didn't you say you were going to eat it all by yourself?\"\n[s2] \"You're the one who brought the eggs, Cherino.\""
2000903-76 = "I thought they were supposed to taste like pudding!"
2000903-77 = "It was your responsibility to stop me if you knew!"
2000903-78 = "Even if it's you Comrade, I cannot forgive you for this misinformation or for causing trouble for Red Winter's food service!"
2000903-79 = "As a payment for your unquestionable sabotage, I demand the highest quality pudding!"
2000903-80 = "[s] \"That seems pretty unreasonable...\""
2000903-82 = "In the end, I was the one who had to deal with all the leftover hot spring boiled eggs."

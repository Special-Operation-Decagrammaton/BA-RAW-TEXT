[translation]
2000903-1 = "比布丁更柔軟"
2000903-2 = "你太慢了，同志！"
2000903-3 = "[s] 「抱歉，稍微遲到了……」"
2000903-4 = "稍微！？你這不是遲到了5分鐘嗎！5分鐘可以做多少事情啊！"
2000903-5 = "5分鐘的話，應該已經做出100顆溫泉蛋了吧！"
2000903-6 = "[s] 「再怎麼樣都沒有這麼快吧……」"
2000903-7 = "是，是嗎？"
2000903-8 = "好吧，不過你終究還是讓咱等了這麼久，#n本來這種情況應該懲罰你掃廁所10年的……"
2000903-9 = "看在今天要一起作溫泉蛋的份上，咱就特別原諒你吧。#n這是你的榮幸哦，同志！"
2000903-10 = "話說回來，溫泉蛋要怎麼製作呢？#n之前咱看過供給部製作布丁的過程，看起來相當複雜。"
2000903-11 = "[s] 「只要把蛋放在溫泉裡，然後等它熟就好了。」"
2000903-12 = "什麼！？只要用這麼簡單的方法，就可以做出跟布丁一樣美味的食物嗎？"
2000903-13 = "同志……你該不會是把咱當作不諳世事的小鬼頭，想騙咱吧？"
2000903-14 = "……不過同志騙咱也沒好處，應該不會這樣吧。"
2000903-15 = "那就快點來製作溫泉蛋吧！"
2000903-21 = "[ns] 「那，那些該不會全部都是雞蛋吧……？」"
2000903-22 = "哼哼。既然能輕鬆地做出像布丁一樣的食物，咱是不會吝嗇的。"
2000903-23 = "其實咱已經下令供給部把庫存的雞蛋全都帶來了！"
2000903-24 = "做這麼多的話，肯定能吃溫泉蛋一整天！"
2000903-25 = "嗯？你說吃那麼多的話會吃膩……？"
2000903-26 = "你在說什麼啊同志。#n像布丁這種柔軟又好吃的東西，怎麼可能會吃膩呢？"
2000903-27 = "別說是一天了，要吃一個禮拜都行！"
2000903-28 = "哼哼……一想到這麼多的雞蛋都會變成布丁就已經覺得興奮了呢。"
2000903-29 = "咱的忍耐快到極限了！同志，快來煮溫泉蛋吧！"
2000903-30 = "把這裡的雞蛋全都放進溫泉裡吧，小心別把蛋弄破了！"
2000903-39 = "同志，差不多了吧？變成溫泉蛋了嗎？"
2000903-40 = "[s] 「才過不到5分鐘哦。」"
2000903-41 = "這樣啊，咱感覺已經過了30分鐘了……"
2000903-42 = "沒辦法，咱就再忍耐一下吧。"
2000903-46 = "同志，還沒好嗎？"
2000903-47 = "[s] 「現在才過8分鐘。」"
2000903-48 = "還，還不到10分鐘嗎？"
2000903-49 = "同志，會不會是那個時鐘壞了啊？"
2000903-50 = "都已經等這麼久了，竟然只過了8分鐘……"
2000903-53 = "[ns] 「應該差不多了。」"
2000903-54 = "哦哦，咱等很久了！"
2000903-60 = "[ns] 把溫泉蛋交給潔莉諾"
2000903-61 = "哼哼……從火候洽到好處的雞蛋中傳來的溫暖，真不錯啊。"
2000903-62 = "既然花了這麼久才完成，吃起來肯定會和最頂級的布丁一樣吧。"
2000903-63 = "那咱就趕快……"
2000903-69 = "……喂，同志。"
2000903-70 = "這個東西該怎麼說呢……不就是還沒煮熟的蛋嗎？"
2000903-71 = "[s] 「因為是溫泉蛋嘛。」"
2000903-72 = "雖然軟軟的口感和布丁很像……但是散發著一股硫磺的味道，完全不像布丁啊。"
2000903-73 = "唔唔……你竟然欺騙咱啊，同志！"
2000903-74 = "咱是相信同志說的話才煮這麼多的，現在怎麼辦啊！"
2000903-75 = "[s1] 「剛才不是你自己說可以吃一週的嗎……」\n[s2] 「因為潔莉諾看起來很開心……」"
2000903-76 = "那是溫泉蛋的味道和布丁一樣的情況！"
2000903-77 = "話，話雖如此，察覺到不對勁時為什麼不阻止咱呢！？"
2000903-78 = "傳達了錯誤的資訊，造成赤冬供給部龐大的損失……#n就算是同志，咱也不會放過你的！"
2000903-79 = "作為怠忽職守的代價，必須補償咱最高級的布丁！"
2000903-80 = "[s] 「真不講理……」"
2000903-82 = "（之後為了處理剩下的大量溫泉蛋費了好多功夫）"

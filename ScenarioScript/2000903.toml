[translation]
2000903-1 = "#Title;푸딩보다 부드러운"
2000903-2 = "3;체리노 온천ND;05;늦었잖아, 콤라드!\n#3;a\n#3;hophop"
2000903-3 = "[s] \"5분밖에 늦지 않았는데…….\""
2000903-4 = "3;체리노 온천ND;05;5분밖에라니? 5분이면 엄청나게 많은 일을 하고도 남는 시간이거늘.\n#3;em;[빠직]"
2000903-5 = "3;체리노 온천ND;99;예를 들자면…… 온천 계란을 100개나 삶고도 남을 시간이라고!"
2000903-6 = "[s] \"온천 계란은 그렇게 빨리 익지 않아.\""
2000903-7 = "3;체리노 온천ND;02;그, 그런가?\n#3;em;[땀]\n#3;stiff"
2000903-8 = "3;체리노 온천ND;99;흠, 흠. 여하튼 감히 이 몸을 기다리게 하다니, 원래대로라면 화장실 청소 10년형에 처해 마땅하지만……"
2000903-9 = "3;체리노 온천ND;05;오늘은 함께 온천 계란을 만들어야 하므로 특별히 용서하도록 하지. 영광으로 알게, 콤라드!\n#3;em;[!]"
2000903-10 = "3;체리노 온천ND;02;그나저나 온천 계란은 어떻게 만드는 거지? 전에 급양부에서 푸딩을 만드는 것을 지켜보았을 때는 꽤나 복잡해 보였는데."
2000903-11 = "[s] \"온천에 계란을 담고 기다리면 돼.\""
2000903-12 = "3;체리노 온천ND;04;뭐, 뭐라? 그렇게 간단한 방법으로 푸딩과 같은 진미를 만들 수 있단 말인가?\n#3;em;[땀]\n#3;stiff"
2000903-13 = "3;체리노 온천ND;05;콤라드…… 설마 이 몸을 어리숙한 꼬맹이라 생각하고 속이려 드는 건 아니겠지?"
2000903-14 = "3;체리노 온천ND;02;뭐, 콤라드가 이 몸을 속여 이득을 볼 이유도 없고. 아무래도 상관없으려나."
2000903-15 = "3;체리노 온천ND;03;자, 그럼 어서 온천 계란을 만들어 볼까?\n#3;em;[음표]"
2000903-16 = "#st;[0,0];instant;1;"
2000903-17 = "#clearST"
2000903-18 = "3;체리노 온천ND;01\n#3;m5\n#wait;1000"
2000903-19 = "3;체리노 온천ND;01\n#3;greeting\n#wait;1500"
2000903-20 = "#wait;3500\n#bgshake"
2000903-21 = "[ns] \"그거 모두 계란이야……?\""
2000903-22 = "3;체리노 온천ND;99;후후, 손쉽게 푸딩과 같은 음식을 만들 수 있다는데 계란을 아낄 이유는 없지.\n#3;em;…\n#3;m3"
2000903-23 = "3;체리노 온천ND;01;급양부에 보관 중인 계란을 모두 가져오도록 했다네!"
2000903-24 = "3;체리노 온천ND;03;이렇게 잔뜩 만들어 두면 하루 종일 온천 계란을 먹을 수 있겠지?\n#3;em;[///]\n#3;stiff"
2000903-25 = "3;체리노 온천ND;02;응? 계란을 그렇게 잔뜩 먹으면 질릴지도 모른다고?"
2000903-26 = "3;체리노 온천ND;01;그게 무슨 소리인가, 콤라드. 푸딩처럼 부드럽고 맛있는 음식이 질릴 리가 없지 않는가."
2000903-27 = "3;체리노 온천ND;03;하루 종일은 물론이고, 일주일 내내 먹을 수도 있다고!\n#3;em;[재잘]\n#3;hophop"
2000903-28 = "3;체리노 온천ND;99;후후…… 이 수많은 계란이 모두 푸딩으로 바뀐다고 생각하니 벌써부터 흥분을 감출 수가 없군."
2000903-29 = "3;체리노 온천ND;01;더는 지체할 수 없겠어. 콤라드, 어서 온천 계란을 삶도록 하지."
2000903-30 = "3;체리노 온천ND;03;깨지지 않게 주의하며, 여기 있는 계란들을 모두 온천 안으로 옮겨 넣는 거다!\n#3;em;[음표]"
2000903-31 = "#all;hide"
2000903-32 = "#wait;1000"
2000903-33 = "#wait;1000"
2000903-34 = "#wait;1000"
2000903-35 = "#wait;1000"
2000903-36 = "#all;hide"
2000903-37 = "#wait;500"
2000903-38 = "3;체리노 온천ND;99\n#3;a\n#3;em;[...]\n#wait;2500"
2000903-39 = "3;체리노 온천ND;02;콤라드, 온천 계란이 완성되려면 아직 멀었는가?\n#3;em;[반응]"
2000903-40 = "[s] \"아직 5분도 지나지 않았어.\""
2000903-41 = "3;체리노 온천ND;04;기분으로는 벌써 30분은 넘게 지난 것 같은데…….\n#3;em;[땀]\n#3;stiff"
2000903-42 = "3;체리노 온천ND;99;하는 수 없지. 인내심을 갖고 느긋하게 기다리는 수밖에."
2000903-43 = "#all;hide"
2000903-44 = "4;체리노 온천ND;99\n#4;em;…\n#4;a\n#wait;2500"
2000903-45 = "4;체리노 온천ND;01\n#4;m3\n#wait;1200"
2000903-46 = "4;체리노 온천ND;02;콤라드, 아직도 온천 계란은 완성되지 않았는가?\n#4;em;[?]"
2000903-47 = "[s] \"이제야 8분이 지났어…….\""
2000903-48 = "4;체리노 온천ND;04;아직도 10분이 지나지 않았다고?\n#4;em;[땀]"
2000903-49 = "4;체리노 온천ND;01;콤라드, 그대의 시계가 고장 난 건 아닌가?"
2000903-50 = "4;체리노 온천ND;06;이렇게 오래 기다렸는데, 8분밖에 지나지 않았다니…… 믿을 수가 없어.\n#4;em;[속상함]\n#4;stiff"
2000903-51 = "#all;hide"
2000903-52 = "3;체리노 온천ND;99\n#3;em;[...]\n#3;a\n#wait;2500"
2000903-53 = "[ns] \"이제 먹어도 될 것 같네.\""
2000903-54 = "3;체리노 온천ND;02;오오, 기다리고 있었다네!\n#3;em;[반응]"
2000903-55 = "#st;[0,0];instant;1;"
2000903-56 = "#clearST"
2000903-57 = "3;체리노 온천ND;02\n#3;d\n#wait;1000"
2000903-58 = "3;체리노 온천ND;02\n#3;a\n#3;closeup\n#wait;1000"
2000903-59 = "#wait;1000"
2000903-60 = "[ns] 체리노에게 온천 계란을 건넨다."
2000903-61 = "3;체리노 온천ND;99;후후…… 알맞게 익은 계란에서 느껴지는 온기가 정말 기분 좋군.\n#3;stiff\n#3;em;[///]\n#3;closeup"
2000903-62 = "3;체리노 온천ND;02;이렇게 오래 기다려서 만든 음식이니, 분명 최고급 푸딩에 가까운 극상의 맛이 나겠지?\n#3;closeup"
2000903-63 = "3;체리노 온천ND;01;그럼 어디 한번 맛을 볼까.\n#3;closeup"
2000903-64 = "#st;[0,0];instant;1;"
2000903-65 = "#clearST"
2000903-66 = "3;체리노 온천ND;99\n#3;greeting\n#wait;1000\n#3;closeup"
2000903-67 = "3;체리노 온천ND;99\n#3;greeting\n#wait;1500\n#3;closeup"
2000903-68 = "3;체리노 온천ND;99\n#3;em;[...]\n#wait;2500\n#3;closeup"
2000903-69 = "3;체리노 온천ND;04;……이게 뭔가, 콤라드.\n#3;em;[?!]\n#3;shake\n#3;closeup"
2000903-70 = "3;체리노 온천ND;04;이건 그냥…… 덜 삶은 계란이잖나.\n#3;stiff\n#3;em;[땀]\n#3;closeup"
2000903-71 = "[s] \"응, 온천물에 삶은 계란이니까.\""
2000903-72 = "3;체리노 온천ND;07;분명 흐물거리는 식감은 푸딩과 비슷하긴 하지만, 맛도 밍밍하고 유황 냄새도 나는 게…… 나머지는 푸딩과 하나도 닮지 않았어."
2000903-73 = "3;체리노 온천ND;99;으읏…… 이 몸을 속였구나, 콤라드!\n#3;stiff"
2000903-74 = "3;체리노 온천ND;05;콤라드의 말만 믿고 삶아버린 이 수많은 계란은 어찌하냔 말이냐!\n#3;hophop"
2000903-75 = "[s1] \"아까는 혼자서 다 먹을 거라며?\"\n[s2] \"계란을 가져온 건 체리노잖아.\""
2000903-76 = "3;체리노 온천ND;05;그건 온천 계란에서 푸딩의 맛이 날 때의 이야기였지!\n#3;em;[빠직]"
2000903-77 = "3;체리노 온천ND;05;그렇다 하더라도 잘못되었다는 걸 눈치챘으면 그 자리에서 말렸어야지!\n#3;em;[빠직]"
2000903-78 = "3;체리노 온천ND;99;잘못된 정보를 전달해 붉은겨울의 급양에 막대한 피해를 입히다니, 아무리 콤라드라 하더라도 용서할 수 없어!"
2000903-79 = "3;체리노 온천ND;05;사보타주의 대가로 최고급 푸딩을 요구하는 바이니라!\n#3;closeup\n#bgshake\n#fontsize;80"
2000903-80 = "[s] \"부조리해…….\""
2000903-81 = "#all;hide"
2000903-82 = "#na;(이후, 잔뜩 남은 온천 계란을 처리하느라 한동안 애를 먹었다.)"

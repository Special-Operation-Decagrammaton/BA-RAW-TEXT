[translation]
2000903-1 = "นุ่มฟูกว่าพุดดิ้ง"
2000903-2 = "มาสายนะสหาย!"
2000903-3 = "[s] \"สายแค่ห้านาทีเอง...\""
2000903-4 = "\"แค่\" ห้านาทีงั้นเหรอ? ห้านาทีนี่มันเป็นเวลาที่ทำงานอะไรได้ตั้งหลายอย่างเลยนะ"
2000903-5 = "ตัวอย่างเช่น... สามารถต้มไข่ออนเซ็นได้ตั้ง 100 ใบยังไงล่ะ!"
2000903-6 = "[s] \"ไข่ต้มออนเซ็นไม่สุกเร็วขนาดนั้นหรอกนะ\""
2000903-7 = "งะ...งั้นเหรอ?"
2000903-8 = "ฮึ่ม ฮึ่ม... จะยังไงก็เถอะ บังอาจให้เราคอยตั้งนาน... ปกติถ้าเป็นแบบนี้จะต้องถูกตัดสินโทษ#nให้ล้างห้องน้ำสัก 10 ปี..."
2000903-9 = "แต่วันนี้เรานัดกันมาทำไข่ต้มออนเซ็นแล้ว... เราจะยกโทษให้เป็นกรณีพิเศษแล้วกัน#nถือว่าเป็นเกียรติมากนะสหาย!"
2000903-10 = "ว่าแต่ว่าไข่ต้มออนเซ็นทำยังไงเหรอ? คราวก่อนตอนดูชมรมโภชนาการทำพุดดิ้ง#nมันดูซับซ้อนมากเลยนะ"
2000903-11 = "[s] \"ก็แค่เอาไข่ไปต้มในออนเซ็นแค่นั้นเอง\""
2000903-12 = "วะ...ว่ายังไงนะ? แค่วิธีง่ายๆ แบบนั้นก็ทำอาหารเลิศรสที่อร่อยเหมือนพุดดิ้งออกมาได้งั้นเหรอ?"
2000903-13 = "สหาย... คงไม่ได้คิดจะหลอกเราเพราะคิดว่าเราเป็นเด็กไม่รู้ประสาหรอกใช่มั้ย?"
2000903-14 = "แต่ก็นะ... ถึงหลอกเราไป สหายก็ไม่ได้ประโยชน์อะไรอยู่ดี เอาเป็นว่าช่างมันแล้วกัน"
2000903-15 = "ถ้างั้นเรามาทำไข่ต้มออนเซ็นกันเลยดีมั้ย?"
2000903-21 = "[ns] \"ตรงนั้น... ไข่ไก่ทั้งหมดเลยเหรอ...?\""
2000903-22 = "ฮุฮุ ถ้าจะทำอาหารที่เหมือนกับพุดดิ้งได้ง่ายๆ ล่ะก็ ไม่จำเป็นที่จะต้องเสียดายไข่ไก่หรอก"
2000903-23 = "เราเอาไข่ไก่ที่ชมรมโภชนาการมีอยู่ทั้งหมดมาแล้วล่ะ!"
2000903-24 = "ถ้าทำเอาไว้เยอะๆ เราก็จะกินไข่ต้มออนเซ็นได้ทั้งวันเลยใช่มั้ยล่ะ?"
2000903-25 = "หืม? ถ้ากินไข่ไก่เยอะๆ ก็จะเลี่ยนแล้วเบื่อเอางั้นเหรอ?"
2000903-26 = "หมายความว่ายังไงน่ะสหาย อาหารที่อร่อยแล้วก็นุ่มลิ้นเหมือนพุดดิ้งน่ะ เราไม่มีทางเบื่อได้หรอก"
2000903-27 = "เรากินได้ทั้งวันเลยนะ ไม่สิ ให้กินทั้งอาทิตย์ก็ยังได้นะ!"
2000903-28 = "ฮุฮุ... แค่คิดว่าไข่ไก่จำนวนมากพวกนี้จะเปลี่ยนไปเป็นพุดดิ้ง...#nเราก็ตื่นเต้นจนแทบจะทนไม่ไหวแล้วล่ะ"
2000903-29 = "อย่ามัวรอช้าอยู่เลย สหาย... รีบเอาไข่ไก่ไปต้มในออนเซ็นกันเถอะ"
2000903-30 = "เอาไข่ไก่ที่อยู่ตรงนี้ทั้งหมดไปต้มในออนเซ็น ระวังอย่าให้แตกล่ะ!"
2000903-39 = "สหาย... อีกนานมั้ยกว่าไข่ต้มออนเซ็นจะเสร็จน่ะ?"
2000903-40 = "[s] \"ยังไม่ถึงห้านาทีเลย\""
2000903-41 = "เรารู้สึกเหมือนผ่านไป 30 นาทีแล้วเลย..."
2000903-42 = "ช่วยไม่ได้นะ... คงจะต้องรออย่างอดทนต่อไป"
2000903-46 = "สหาย... อีกนานมั้ยกว่าไข่ต้มออนเซ็นจะเสร็จน่ะ?"
2000903-47 = "[s] \"เพิ่งจะผ่านไปแปดนาทีเอง...\""
2000903-48 = "ยังไม่ถึงสิบนาทีอีกเหรอ?"
2000903-49 = "สหาย... นาฬิกาเสียรึเปล่า?"
2000903-50 = "เรารอมาตั้งนานแล้ว แต่เพิ่งจะผ่านไปแค่แปดนาทีเองเหรอ... เหลือเชื่อเลย"
2000903-53 = "[ns] \"ตอนนี้น่าจะกินได้แล้วล่ะ\""
2000903-54 = "โอ้ รอฟังคำนี้อยู่เลยล่ะ!"
2000903-60 = "[ns] ยื่นไข่ต้มออนเซ็นให้เชริโน่"
2000903-61 = "ฮุฮุ... ไข่ต้มอุ่นๆ ที่ปรุงสุกอย่างดี... เราชอบมากเลยล่ะ"
2000903-62 = "อาหารที่เรารอมาตั้งนาน รสชาติคงจะเหมือนกับสุดยอดพุดดิ้งเลยใช่มั้ย?"
2000903-63 = "ไหนลองชิมดูหน่อยซิ..."
2000903-69 = "อะไรกันเนี่ยสหาย"
2000903-70 = "นี่มัน... ไข่ต้มยางมะตูมนี่นา"
2000903-71 = "[s] \"อื้อ ก็มันต้มด้วยน้ำในออนเซ็นนี่นา\""
2000903-72 = "รสสัมผัสของมันอ่อนนุ่มคล้ายพุดดิ้งก็จริง แต่ว่ารสชาติกลับจืดสนิทแถมยังมีกลิ่นกำมะถันนิดๆ...#nส่วนที่เหลือก็ดูไม่เหมือนพุดดิ้งเลยด้วยซ้ำ"
2000903-73 = "อึ่ก... หลอกเรางั้นเหรอ สหาย!"
2000903-74 = "เราอุตส่าห์เชื่อคำพูดของสหาย แล้วจะทำยังไงกับไข่ต้มจำนวนมากนี่ล่ะ!"
2000903-75 = "[s1] \"เมื่อกี้ยังบอกว่าจะกินคนเดียวทั้งหมดอยู่เลยนี่?\"\n[s2] \"เชริโน่เป็นคนเอาไข่ไก่มาไม่ใช่เหรอ?\""
2000903-76 = "นั่นมันตอนที่คุยกันว่าไข่ต้มออนเซ็นมีรสชาติเหมือนพุดดิ้งต่างหาก!"
2000903-77 = "ถึงเราจะพูดอย่างนั้นก็เถอะ แต่ถ้าสหายรู้ว่ามีอะไรผิดปกติ ก็ควรจะห้ามไม่ใช่รึไง!"
2000903-78 = "การให้ข้อมูลผิดๆ จนสร้างความเสียหายต่ออาหารของสหภาพเรดวินเทอร์...#nถึงจะเป็นสหายก็ตาม แต่เราก็คงจะยกโทษให้ไม่ได้!"
2000903-79 = "เราขอเรียกร้องพุดดิ้งสุดอร่อยเพื่อแลกกับการก่อวินาศกรรมในครั้งนี้!"
2000903-80 = "[s] \"ไม่สมเหตุสมผลเลย...\""
2000903-82 = "(หลังจากนั้น คุณครูก็พยายามจัดการกับไข่ออนเซ็นจำนวนมากอยู่พักใหญ่ๆ)"

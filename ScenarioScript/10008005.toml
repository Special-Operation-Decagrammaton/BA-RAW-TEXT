[translation]
10008005-1 = "序幕;在一年之初"
10008005-6 = "來！"
10008005-7 = "大家都換好衣服了吧！"
10008005-14 = "時光飛逝，轉眼間又到新年了呢。"
10008005-15 = "就是說啊～#n哎呀～時間過得真快呢～"
10008005-16 = "現在回想起來，去年也發生了很多事呢……"
10008005-17 = "開心的事、難過的事、痛苦的事和遺憾的事……"
10008005-18 = "負面事情的比例是不是太高了？"
10008005-19 = "……"
10008005-20 = "總，總之！#n重要的是我們便利屋68已經順利克服那許許多多的逆境，迎向新的一年了！"
10008005-21 = "所以也算是為了紀念，我們現在要前往「某個地方」。"
10008005-22 = "某，某個地方，是嗎……？"
10008005-23 = "要我們打扮成這樣還在清晨集合，應該是什麼新年的活動吧。"
10008005-25 = "不愧是你，真敏銳呢佳世子。"
10008005-27 = "不過，這次可不只是普通的活動哦。#n畢竟我們接下來要去的……可是「實現願望的地方」哦！"
10008005-28 = "實，實現願望的地方……？"
10008005-30 = "啊，我好像在社群網站上看過。最近很紅的那個？"
10008005-31 = "「在社群網站上很紅」這點就讓人很擔心了……"
10008005-32 = "那個不是什麼新型的商業手法嗎？"
10008005-33 = "不過亞瑠醬就是喜歡那一類的東西嘛～？"
10008005-34 = "我，我又沒有說我相信！？#n只是要去那裡而已，我另外有其他的目的！"
10008005-35 = "嗯？什麼意思？"
10008005-36 = "呵呵，這點暫時保密。"
10008005-37 = "不過是為了讓我們便利屋68更上一層樓、更加生意興隆……我只能這麼說。"
10008005-38 = "總覺得越來越可疑了……"
10008005-39 = "八成是又自己一個人計畫著什麼好事了吧～"
10008005-40 = "多少也信任我一下吧！"
10008005-41 = "……話說回來，大家都準備好「那個」了吧？"
10008005-43 = "嗯，算吧。你指的是錢對吧？"
10008005-44 = "畢竟都說是社長命令了，姑且還是有準備。"
10008005-45 = "我，我也好好地，準備了很多！"
10008005-47 = "呵呵，那就好。"
10008005-48 = "這是為了達成目的必須要有的東西，好好帶著吧。"
10008005-54 = "那個，難不成……"
10008005-55 = "亞瑠醬，難道你單純只是要做「投錢祈求生意興隆」這種事……？"
10008005-56 = "原，原來如此！#n既然是「實現願望的地方」，只要投越多錢就代表工作會越順利，是這樣嗎……！？"
10008005-58 = "才，才不是！你以為我想的會是那麼單純的事嗎！？"
10008005-60 = "哼嗯～？"
10008005-61 = "唉……"
10008005-63 = "啊啊真是的，既然如此就告訴你們吧！#n重要的是這次有很多地下社會的大人物會去那個地方！"
10008005-64 = "地下社會的，大人物……？"
10008005-65 = "沒錯。以暴力聞名的組織自不用說，就連專做非法勾當的黑暗集團，還有讓黑錢流通的公司也……！十惡不赦的壞蛋都會在新年齊聚一堂哦！"
10008005-66 = "不過你們想想看……#n那種大人物們特地聚在一起，目的有可能只是「友善地互道新年快樂」嗎？"
10008005-67 = "答案是NO！絕對是NO唷！#n他們真正的目的……肯定是「分析」沒錯！"
10008005-68 = "……分析？"
10008005-69 = "在投香油錢的時候是多麼果斷，穿著怎樣的衣服，而衣服又是多麼名貴……#n藉由各式各樣的情報互相較勁，在暗地裡對彼此進行「牽制與分析」！"
10008005-70 = "藉此掌握彼此的勢力，制定未來一年的計畫……"
10008005-71 = "「那套衣服還有香油錢的金額……那個人，不容小覷啊」這樣！"
10008005-73 = "也就是說，你的意思是……"
10008005-74 = "特地借來了這麼貴的和服，還說「為了新年要準備一大筆錢」是為了……"
10008005-75 = "沒錯。#n因為這是在新年年初就讓我們「便利屋68」的名號在地下社會聲名遠播的機會！"
10008005-76 = "唉……"
10008005-77 = "原，原來如此！不愧是亞瑠大人！#n居然想得如此深遠……！"
10008005-78 = "所以是要虛張聲勢的意思……？"
10008005-79 = "才，才不是虛張聲勢！#n至少也說是「形象戰略」吧！"
10008005-80 = "總之只要把大把大把的錢高調地丟進賽錢箱裡，肯定就會帥到不行了沒錯！"
10008005-81 = "表現出「這點小錢，我們根本不在意」的感覺！"
10008005-83 = "好，好厲害……！#n太帥氣了亞瑠大人！"
10008005-84 = "啊哈，也沒什麼不好吧？我贊成！"
10008005-85 = "嘛，我還是會去啦……"
10008005-87 = "呵呵，那麼既然所有人都取得共識了……"
10008005-88 = "我再重申一次，這不只是單純的新年活動。"
10008005-89 = "新年第一個決勝點，說是賭上「便利屋68」今年的命運也不為過的戰役……#n也把這當成是一個任務吧！"
10008005-92 = "是，是！我知道了！"
10008005-93 = "嗯！"
10008005-94 = "好像很有趣！好了好了，快走吧！"
10008005-95 = "反正我也預計要去參拜，倒是無所謂……"
10008005-97 = "那麼「便利屋68」，為了今後事業的繁榮……"
10008005-98 = "來，出發吧！"

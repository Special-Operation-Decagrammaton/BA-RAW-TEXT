[translation]
10008005-1 = "Prologue;The End of Problem Solver's Fiscal Year"
10008005-6 = "All right, everyone. Listen up!"
10008005-7 = "I have an announcement to make."
10008005-14 = "As we all know, a new year is upon us."
10008005-15 = "It is, isn't it? Time flies."
10008005-16 = "No doubt. Looking back, a lot has happened in the last year."
10008005-17 = "There have been moments of happiness, pain, sadness, and even regret."
10008005-18 = "Is it just me, or were there a lot more painful ones than anything?"
10008005-19 = "..."
10008005-20 = "A-Anyway! All that matters is that we overcame that adversity and are still standing. It's time to welcome a new year!"
10008005-21 = "That's why I proposed that we visit somewhere special to celebrate."
10008005-22 = "A-And that would be...?"
10008005-23 = "Considering you made us get dressed up and dragged us here at the break of dawn, it must be a New Year's event."
10008005-25 = "Quick on the uptake as usual, Kayoko, but that's not all."
10008005-27 = "We're not visiting just any old place. We're going somewhere wishes are said to come true."
10008005-28 = "Th-There's a place like that?"
10008005-30 = "Ohhh. You must mean what's been trending on social media. "
10008005-31 = "If social media is why it's popular, then I already have a bad feeling..."
10008005-32 = "Are you sure this is legit? It already sounds like some marketing trick for publicity."
10008005-33 = "Aru's a total sucker for those kinds of things!"
10008005-34 = "I-I never said I believed any of the rumors! We're going there for a different reason!"
10008005-35 = "And that is?"
10008005-36 = "Curious, are you?"
10008005-37 = "Well, it's a secret. All you need to know for now is that it's going to take our business to even greater heights."
10008005-38 = "That bad feeling I had just got worse."
10008005-39 = "Who knows what kind of weird scheme Aru's drawn up this time?"
10008005-40 = "Knock it off! Have a little faith in me for once!"
10008005-41 = "Never mind that. Did you prepare what I asked for?"
10008005-43 = "Well, yeah. You said to bring a bunch of cash, right?"
10008005-44 = "I did the same. Boss' orders."
10008005-45 = "I-I brought some too!"
10008005-47 = "Heh. Good. Good..."
10008005-48 = "It's crucial for our objective, so make sure to keep it safe."
10008005-54 = "Wait. Are you going to...?"
10008005-55 = "Aru. Don't tell me your plan is to wish for prosperity by offering all this money."
10008005-56 = "N-Now I get it! We're going to use the money to wish for even more money!"
10008005-58 = "Wh-What?! No! Don't think I'd come up with something so stupid!"
10008005-60 = "Phew. Are you sure?"
10008005-61 = "*sigh*"
10008005-63 = "The point is that a bunch of underworld tycoons are going to be at this event!"
10008005-64 = "What's a tycoon?"
10008005-65 = "You know. Like, underworld big shots from gangs, crime syndicates, money laundering companies... That sorta stuff! Villains from all over are gathering in one place, using New Year's as an excuse!"
10008005-66 = "Think about it. Are they going there just to make some New Year's wishes and say hi to one another?"
10008005-67 = "Of course not! Only a fool would think that! They're gathering to forecast the coming fiscal year!"
10008005-68 = "And how are they going to do that?"
10008005-69 = "Simple. By observing how much money the other attendees are offering, how expensive their clothes are, et cetera. It's essentially an arena where the savviest of the savvy can evaluate one another to get a leg up on the competition."
10008005-70 = "They'll size each other up and then make plans for the coming fiscal year! "
10008005-71 = "So if one businessman is dressed especially well or makes a ridiculously large offering, you know they've got cash to spare and are worthy of doing business with!"
10008005-73 = "I think I follow..."
10008005-74 = "You made us rent these expensive kimonos and scrounge up all the cash we could so that..."
10008005-75 = "Exactly! This is our chance to show off Problem Solver 68's might to the underworld!"
10008005-76 = "I thought so."
10008005-77 = "I-It makes perfect sense! It's so brilliant that only you could come up with it!"
10008005-78 = "I'm pretty sure this is what's referred to as faking it until you make it."
10008005-79 = "I-It's not faking! We're just building our brand image!"
10008005-80 = "Anyway, the plan is for us to drop a huge wad of cold, hard cash into the offering box like the big shots we are."
10008005-81 = "We've gotta do it with a flair that says, \"What, this? It's just pocket change to us!\""
10008005-83 = "O-Of course! Pocket change! "
10008005-84 = "Not a bad idea! Count me in!"
10008005-85 = "*sigh*"
10008005-87 = "Good. Then you all understand my ingenious vision."
10008005-88 = "Let me reiterate. This is no ordinary New Year's event."
10008005-89 = "Consider this a battle that will decide Problem Solver 68's future. We'll be entering a battlefield with the sole objective of leaving a positive impression on our peers and competitors!"
10008005-92 = "U-Understood!"
10008005-93 = "Fine."
10008005-94 = "Sounds like fun! C'mon, let's go!"
10008005-95 = "I was planning to visit to make a New Year's wish anyway."
10008005-97 = "Well, then. Let us be off, my dear Problem Solver 68."
10008005-98 = "To the New Year's celebration!"

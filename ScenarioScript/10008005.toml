[translation]
10008005-1 = "บทเริ่มต้น;สิ้นปีที่ธรรมดาๆ ของหน่วยรับจ้างสารพัด"
10008005-6 = "เอาละทุกคน ฟังทางนี้!"
10008005-7 = "ฉันมีเรื่องจะประกาศ"
10008005-14 = "อย่างที่ทุกคนรู้ ตอนนี้ก็ใกล้ถึงวันปีใหม่แล้ว"
10008005-15 = "อา~ จะปีใหม่แล้วเหรอเนี่ย เวลาผ่านไปเร็วจังเลยน้า~"
10008005-16 = "ฮุฮุฮุ... พอนึกย้อนดูแล้ว ปีที่ผ่านมาก็มีเรื่องเกิดขึ้นเยอะเลยเนอะ?"
10008005-17 = "ทั้งเรื่องที่มีความสุขและขมขื่น เรื่องน่าเศร้าและน่าเสียดายเต็มไปหมด..."
10008005-18 = "อารุจัง มาคิดดูแล้ว ฉันว่ามีแต่เรื่องน่าลำบากทั้งนั้นนะ"
10008005-19 = "..."
10008005-20 = "ยะ... ยังไงก็เถอะ! สิ่งสำคัญก็คือหน่วยรับจ้างสารพัดของเราก้าวผ่านเรื่องเลวร้ายพวกนั้นมาได้#nและกำลังจะเริ่มต้นปีใหม่กันต่างหาก!"
10008005-21 = "เพื่อเป็นการฉลอง พวกเราจะไปยังสถานที่ที่พิเศษกัน"
10008005-22 = "\nสะ...สถานที่พิเศษเหรอคะ?"
10008005-23 = "ที่ให้ใส่ชุดแบบนี้แล้วบอกว่าจะฉลองปีใหม่... คงหมายถึงการไปเที่ยวงานปีใหม่สินะ"
10008005-25 = "ฮุฮุ เฉียบมาก หัวหน้าฝ่ายคาโยโกะ แต่ว่าไม่ได้มีแค่นั้นหรอกนะ"
10008005-27 = "ที่ที่เราจะไปมันไม่ใช่สถานที่ธรรมดาหรอกนะ แต่เป็นสถานที่ขึ้นชื่อของสายมูเรื่อง \"ขอพรแล้วสมหวังทุก#nประการ\" ล่ะ"
10008005-28 = "สะ...สถานที่ที่ขอพรแล้วจะสมหวัง... เหรอคะ?"
10008005-30 = "อ๊ะ หมายถึงงานเทศกาลชื่อดังที่กำลังฮิตในโซเชียลช่วงนี้ใช่มั้ย?"
10008005-31 = "สถานที่ยอดฮิตในหมู่ชาวเน็ตเหรอ? แบบนั้นยิ่งน่าสงสัยใหญ่เลย..."
10008005-32 = "เรื่องงมงายหรือเปล่า? หรือว่าเป็นวิธีโปรโมตสถานที่อะไรทำนองนั้น?"
10008005-33 = "ก็นะ~ อารุจังเป็นพวกชอบเรื่องอะไรพวกนี้นี่นา~?"
10008005-34 = "ว่าไงนะ? ฉะ... ฉันเองก็ไม่ได้เชื่อเรื่องพวกนี้ร้อยเปอร์เซ็นต์หรอกนะ! ที่ไปเพราะฉันมีเป้าหมายอื่น#nต่างหาก!"
10008005-35 = "มีเป้าหมายอื่นเหรอ?"
10008005-36 = "ฮุฮุ ใช่แล้ว"
10008005-37 = "ถึงฉันจะอยากเก็บเป็นความลับก็เถอะนะ แต่ฉันหาสถานที่ที่จะช่วยส่งเสริมความรุ่งเรืองของ#nหน่วยรับจ้างสารพัด 68 ของเราเอาไว้แล้วละ"
10008005-38 = "แบบนี้ยิ่งน่าสงสัยหนักกว่าเก่าอีก..."
10008005-39 = "แอบวางแผนลับๆ คนเดียวอีกแล้วเหรอ อารุจัง..."
10008005-40 = "ฮึ่ย! ไม่ต้องถามรายละเอียดให้มากนักหรอก!"
10008005-41 = "ทุกคนเตรียมของที่ฉันบอกมาแล้วใช่มั้ย?"
10008005-43 = "ก็...เตรียมมาพร้อมแล้วละนะ~ บอกให้เตรียมเงินก้อนใหญ่มาใช่มั้ยล่ะ?"
10008005-44 = "ต้องเตรียมมาสิ ก็มันเป็นคำสั่งของประธานนี่นา"
10008005-45 = "ฉะ...ฉันเองก็เตรียมมาแล้วค่ะ! ท่านอารุ!!"
10008005-47 = "ฮุฮุฮุ งั้นเหรอ"
10008005-48 = "เราต้องใช้เงินพวกนั้นเพื่อให้เป้าหมายของฉันสำเร็จลุล่วง อย่าเอาไปวางลืมที่ไหน เก็บให้ดีๆ ล่ะ"
10008005-54 = "หรือว่า... ประธาน...?"
10008005-55 = "อารุจัง หรือว่าจะเอาเงินไปขอพรให้ธุรกิจรุ่งเรื่องเหรอ...?"
10008005-56 = "ยะ... อย่างนั้นเหรอคะ! เพราะเป็นสถานที่ที่ขอพรแล้วจะสมหวัง งั้นยิ่งให้เงินมากเท่าไร ธุรกิจของเรา#nก็จะยิ่งรุ่งเรืองสินะคะ!?"
10008005-58 = "ว่าไงนะ?! มะ...ไม่ใช่สักหน่อย! ไม่ใช่อย่างนั้นนะ!! คิดว่าฉันเป็นคนยังไงเนี่ย!!"
10008005-60 = "ฮู่ว... ฉัน..."
10008005-61 = "เฮ้อ..."
10008005-63 = "สิ่งสำคัญก็คือ...! ที่งานนั้นจะมีคนใหญ่คนโตในวงการใต้ดินหลายคนมาร่วมงานด้วย!!"
10008005-64 = "คะ...คนใหญ่คนโตเหรอ?"
10008005-65 = "ใช่แล้ว ทั้งพวกมาเฟียหัวรุนแรง กลุ่มอันธพาลที่ทำงานผิดกฎหมาย และพวกบริษัทที่ฟอกเงินใต้ดิน!  เป็นสถานที่ที่รวมเจ้าแห่งจอมวายร้ายทั้งหลายเอาไว้ โดยใช้งานฉลองปีใหม่เป็นฉากบังหน้า!"
10008005-66 = "คิดว่าอภิมหาวายร้ายจะมารวมตัวกันเพื่อฉลองปีใหม่กันอย่างญาติดีงั้นเหรอ?"
10008005-67 = "โนวๆ! ไม่มีทาง! เนเวอร์! ไม่มีทางเป็นแบบนั้นเด็ดขาด! คนใหญ่คนโตพวกนั้นมารวมตัวกันก็เพื่อ#nการวิเคราะห์ต่างหาก!"
10008005-68 = "วิเคราะห์เหรอ...?"
10008005-69 = "ปีใหม่นี้แต่ละคนบริจาคเงินกันเท่าไร แล้วเสื้อผ้าที่ประโคมแต่งกันมาวันนี้หรูหราแค่ไหน... พวกเขาจะ#nใช้ข้อมูลพวกนี้เปิดสนามวิเคราะห์กันและกันยังไงล่ะ!"
10008005-70 = "เป็นการวิเคราะห์อำนาจของแต่ละฝ่าย และเก็บข้อมูลไปเรื่อยๆ เพื่อใช้วางแผนสำหรับอีกหนึ่งปีข้างหน้า!"
10008005-71 = "\"ยัยนั่นเงินหนาขนาดนั้นเลยเหรอ สงสัยปีนี้คงต้องระวังตัวไว้หน่อยแล้วละ...\" อะไรประมาณนี้น่ะ!"
10008005-73 = "\nเฮ้อ สรุปแล้วเพราะเรื่องนั้น..."
10008005-74 = "ประธานก็เลยไปเช่าชุดกิโมโนราคาแพงหูฉี่มา แล้วสั่งให้พวกเราเตรียมเงินเยอะๆ มาบริจาคสินะ..."
10008005-75 = "ใช่แล้ว! นี่เป็นโอกาสที่จะทำให้เจ้าพวกนั้นรับรู้ถึงการมีอยู่ของหน่วยรับจ้างสารพัดของพวกเราเลยนะ!!"
10008005-76 = "อา... อืม"
10008005-77 = "ขะ... เข้าใจแล้วค่ะ! เป็นแผนการที่สุดยอดมากเลยค่ะท่านอารุ!! แผนการแบบนี้ นอกจากท่านอารุแล้ว#nคงไม่มีใครคิดได้หรอกค่ะ!"
10008005-78 = "เดี๋ยวสิประธาน... ทำแบบนั้นมันเหมือนเราไปอวดตัวเองในงานเลยนะ"
10008005-79 = "มะ... ไม่ใช่การอวดสักหน่อย เขาเรียกว่าไปสร้างภาพลักษณ์ต่างหาก!!"
10008005-80 = "แล้วตอนจบงาน เราก็ต้องเอาเงินสดที่เตรียมมาไปใส่กล่องบริจาคอย่างคูลๆ ด้วย"
10008005-81 = "เศษเงินแค่นี้น่ะ พวกเราจะหาใหม่เมื่อไรก็ได้อยู่แล้ว!"
10008005-83 = "ศะ... เศษเงิน...!! "
10008005-84 = "อะฮะฮะฮ่า ใช่แล้ว! ฉันเห็นด้วย!"
10008005-85 = "เฮ้อ..."
10008005-87 = "ดีละ คิดว่าทุกคนคงเข้าใจวิสัยทัศน์ของฉันแล้ว"
10008005-88 = "เตรียมตัวกันให้พร้อมล่ะ อย่างที่บอกไปว่างานนี้ไม่ใช่งานฉลองปีใหม่ธรรมดาๆ"
10008005-89 = "นี่เป็นสงครามที่เดิมพันด้วยชะตากรรมของหน่วยรับจ้างสารพัด 68 การไปร่วมงานฉลองปีใหม่นี้#nก็เหมือนกับการเดินเข้าสู่สนามรบ และภารกิจของเราคือการแสดงอำนาจให้พวกคู่แข่งเห็น!"
10008005-92 = "ค่ะ... ค่ะ! ฉันจะจำเอาไว้ค่ะ!"
10008005-93 = "หืมมม~"
10008005-94 = "อื้อ! ก็ดูน่าสนุกเหมือนกันนะ รีบไปกันเถอะ!"
10008005-95 = "ก็นะ... ไหนๆ ก็ปีใหม่แล้วทั้งที ไปขอพรไว้บ้างก็คงดีเหมือนกัน..."
10008005-97 = "นึกถึงความรุ่งโรจน์ของหน่วยรับจ้างสารพัด 68 เอาไว้..."
10008005-98 = "แล้วรีบไปที่สถานที่จัดงานปีใหม่กันเถอะ!"

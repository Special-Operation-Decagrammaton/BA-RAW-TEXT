[translation]
10024030-1 = "Episode 3;Diligent Study, Constant Practice"
10024030-3 = "Eastern Alchemy Society Club Room"
10024030-5 = "[ns1] \"Ah, so this is what you had in mind.\"\n[ns2] \"The Eastern Alchemy Society...?\""
10024030-9 = "That's right, Sensei."
10024030-10 = "I've never so much as touched ten-thousand-year ginseng."
10024030-11 = "But someone in Shanhaijing has."
10024030-12 = "If anyone would know about it, it would be the medicine researchers at the Eastern Alchemy Society."
10024030-13 = "I also considered checking with student athletes, like martial artists and dancers..."
10024030-14 = "But they'd just chew up the ginseng without really understanding it, you see."
10024030-15 = "Oh! So...ten-thousand-year ginseng increases your combat power...?"
10024030-16 = "Would that help my kung fu, do you think?"
10024030-17 = "...Nobody said it would work like that."
10024030-18 = "But you just said martial artists like to chew on it..."
10024030-19 = "Please focus, Reijo."
10024030-25 = "I heard something was up, but a visit from the Black Tortoise Promenade and Sensei, to boot... What's up?"
10024030-26 = "[s] \"We were hoping you could help us with something.\""
10024030-27 = "No. Not happening. Sorry, Sensei, but go right back where you came from."
10024030-28 = "If it was just you, I'd be up for anything. But I'm hearing rumors about your friends from the Promenade here."
10024030-29 = "There's trouble brewing between the Black Tortoise Promenade and Genryumon, and I want to keep out of it!"
10024030-30 = "The Eastern Alchemy Society is already plenty busy researching the Immortality Elixir!"
10024030-31 = "Let's talk. We're all reasonable people."
10024030-32 = "And I brought stir-fried knife-cut noodles with sautéed cheese meatballs. To enjoy. While we talk."
10024030-38 = "S-Stir-fried knife-cut noodles...? And cheese meatballs...? I've never heard of such a thing...!"
10024030-39 = "The cheese crisps inside the meatballs, giving it a savory crunch. And the noodles soak up the sauce, and it's so chewy..."
10024030-40 = "...!"
10024030-41 = "Imagine the harmony of the aromatic noodles and the savory cheese, mixing on your tongue..."
10024030-42 = "It was the only recipe that survived a night of intense experimentation. I could use your expert opinion, Saya."
10024030-43 = "Ahem... Well, since you need my expertise...!"
10024030-55 = "[ns] \"So this is why we had to swing by the kitchen first...\""
10024030-56 = "One never goes into battle without enough provisions."
10024030-66 = "Why would you be interested in ten-thousand-year ginseng...? The stuff's too much trouble..."
10024030-67 = "[s] \"How so?\""
10024030-68 = "First off, it's almost impossible to cultivate."
10024030-69 = "The plant likes it cool and humid, so it only grows high up the slopes of Kunlun Mountain."
10024030-70 = "And it takes at least six years—usually ten—before it's mature enough to make into a medicine."
10024030-71 = "Even worse, if the plant is disturbed even a little, it goes into a hibernation stage. If you plant 100 seeds, you'll be lucky if even 10 sprout in your lifetime."
10024030-72 = "[s] \"That's a tricky plant...\""
10024030-73 = "And the taste! If you bite just the tip, it's so bitter it'll make your tongue go numb for ten minutes."
10024030-74 = "You'd be crazy to want to cook with it..."
10024030-75 = "You're not kidding."
10024030-76 = "You've cooked with it before?!"
10024030-77 = "I just tasted a small bit of it."
10024030-79 = "There are some failures that you can see coming, even without experimenting..."
10024030-80 = "Maybe so. But somehow, I never can resist trying out a new recipe..."
10024030-82 = "But, as they say, the best medicines are bitter. And ten-thousand-year ginseng is no exception."
10024030-83 = "Once you go through all the steps of refining it—and there are a LOT—it has some interesting effects."
10024030-84 = "[s] \"Such as?\""
10024030-85 = "It provides a temporary, but intense, increase to your ability to focus."
10024030-86 = "It boosts your metabolism, which makes it attractive for dieters..."
10024030-87 = "...and it acts as a stimulant, stopping you from feeling any fatigue at all."
10024030-88 = "It even increases cognitive processing so much that you can see bullets flying at you."
10024030-89 = "[s] \"It can make you dodge bullets? Amazing!\""
10024030-90 = "Hey, I never said anything about DODGING bullets!"
10024030-91 = "You'll stand there, thinking, \"Oh, a bullet. I should dodge that.\" Then WHAM, the bullet hits you."
10024030-97 = "Improved reaction time... Tireless energy and high metabolism..."
10024030-98 = "No, Reijo."
10024030-99 = "I-I didn't say anything yet..."
10024030-100 = "You don't have to. You must get stronger the proper way. Otherwise, it's not in the spirit of kung fu."
10024030-102 = "...!"
10024030-104 = "Of course...! It's like you always say... There's no such thing as a free lunch..."
10024030-105 = "I understand, President! Then, would you..."
10024030-106 = "No."
10024030-107 = "You didn't hear what I was going to ask."
10024030-108 = "I'm too busy with my cooking and my work as president to train in kung fu with you."
10024030-109 = "[s] \"Anyway, this ginseng sounds like it could be dangerous in the wrong hands.\""
10024030-111 = "There's plenty of students who dream of getting their hands on the stuff. To help with studying, exams, and so on..."
10024030-112 = "And here I thought they were after its unique bitter flavor."
10024030-113 = "It's always about taste with you, huh? Well, at least you're consistent."
10024030-114 = "Anyhow, I don't get students like that. Just read the textbook before your exam, and bam! Aced!"
10024030-118 = "[ns] \"It's not that easy for most people...\""
10024030-119 = "Really? For me, it's always been enough to brush up on my reading the day before."
10024030-120 = "I always get a perfect score. Except for when they sneak in trick questions, that is..."
10024030-121 = "[s3] \"It really, really isn't that easy for most people...\"\n[s4] \"You're the only person I know who can do that.\""
10024030-124 = "Is that so?"
10024030-125 = "Huh... I guess I can understand why some students are after this ginseng, in that case."
10024030-126 = "[s] \"Erm, maybe, but that doesn't make it okay.\""
10024030-127 = "Okay, so here's what I don't get. Even if these students get the ginseng, who's got time to process it?"
10024030-128 = "You need to handle dangerous solvents and high temperatures, and a single mistake along the way ruins the batch. "
10024030-129 = "Detoxification. Distillation. Neutralization. Separation. Rapid-cooling. Extraction... And that's just off the top of my head."
10024030-130 = "You'd need a professional lab to make anything useful."
10024030-131 = "If there was anywhere other than the Eastern Alchemy Society with that kind of setup, I'd have heard about it."
10024030-132 = "And if anyone was distributing all of that equipment, my contacts would have informed me."
10024030-133 = "[s] \"You both know your stuff.\""
10024030-134 = "You can't turn on a Bunsen burner in Shanhaijing without my knowing about it!"
10024030-135 = "Not that all this knowledge is helping with the Immortality Elixir..."
10024030-136 = "[s5] \"You're still chasing the Immortality Elixir, eh?\"\n[s6] \"Why are you so intent on creating this elixir?\""
10024030-139 = "I'm driven because it's impossible..."
10024030-140 = "That's right, impossible! Anything less than an impossible goal wouldn't be worth the challenge!"
10024030-141 = "Any researcher worth her salt has to aim as high as possible! No matter how difficult!"
10024030-142 = "And, while I work towards this difficult and impossible thing, I'll naturally make lots of great discoveries on the way."
10024030-143 = "Hmm. That's downright inspiring, Saya. You have a broader vision than I realized."
10024030-144 = "Don't get me wrong. Those discoveries are nice, but they're not the goal."
10024030-145 = "Some scientists get sidelined by their unexpected results and forget what they're after..."
10024030-147 = "But not at the Eastern Alchemy Society! I won't allow it!"
10024030-148 = "[s] \"You're doing good work, Saya.\""
10024030-149 = "C-C-Compliment me all you want, Sensei, but I'm still not getting wrapped up in this."
10024030-150 = "I don't know who's smuggling the ten-thousand-year ginseng or what it's being used for..."
10024030-151 = "Oh... Actually..."
10024030-152 = "[s] \"You thought of something?\""
10024030-153 = "N-No. I just had a thought. Nothing that concerns you..."
10024030-157 = "(There WAS that one research project using a chemical from the ten-thousand-year ginseng to stimulate brain function...)"
10024030-158 = "(But that research is...)"
10024030-164 = "You mentioned that ten-thousand-year ginseng only grows on Kunlun Mountain, didn't you?"
10024030-165 = "We should take a look there for ourselves. Thanks for the lead."
10024030-166 = "...The Eastern Alchemy Society has NOTHING to do with your investigation."
10024030-167 = "I'll be sure to mention that to Genryumon when I see them."

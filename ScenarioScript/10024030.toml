[translation]
10024030-1 = "第3話;鏃礪括羽：刻苦磨練"
10024030-3 = "鍊丹術研究會的部室"
10024030-5 = "[ns1]「我還以為要去哪裡……」\n[ns2]「鍊丹術研究會……？」"
10024030-9 = "沒錯。這裡是可能會用到「萬年蔘」的地方之一。"
10024030-10 = "就算是我，也從來沒有把「萬年蔘」用在料理上。"
10024030-11 = "真要說的話，它應該給人更常用於藥品的印象吧？#n雖然有想用於料理或單純想得到它的人存在也是事實……"
10024030-12 = "總之，先到最可能會用到它的地方來看看就是了。"
10024030-13 = "我也想過要找武術研究部或京劇部這類會鍛鍊身體的人……"
10024030-14 = "不過我實在不認為他們會了解特性或效果之類的事。#n你們想，那些人多半給人「對身體好的東西吃下去就對了」的感覺對吧。"
10024030-15 = "原來如此……會長，也就是說吃下「萬年蔘」就能變強是吧。"
10024030-16 = "難道「萬年蔘」──是為了功夫而存在的嗎？"
10024030-17 = "……剛才完全沒有人提到功夫哦？"
10024030-18 = "不過，對鍛鍊身體會有幫助對吧？"
10024030-19 = "好了好了，先冷靜點。"
10024030-25 = "才想說是誰在吵鬧，居然是玄武商會跟老師？#n……真是少見的組合，究竟發生什麼事了？"
10024030-26 = "[s]「我們有事想請沙耶幫忙。」"
10024030-27 = "……我莫名有股不好的預感。#n和玄武商會在一起的話……就表示……"
10024030-28 = "雖然對老師很抱歉，不過你們還是請回吧……"
10024030-29 = "玄武商會與玄龍門的糾紛什麼的，我絕～對不想被牽扯進去！"
10024030-30 = "煉丹術研究會，今天也忙著開發不老不死的靈藥啊！"
10024030-31 = "哎呀哎呀，別這麼說嘛。"
10024030-32 = "哦？炒刀削麵佐起司南煎丸子居然會出現在這種地方……"
10024030-38 = "居，居然在炒刀削麵上加起司南煎丸子……！#n那種料理完全沒看過也沒聽過！"
10024030-39 = "炸得酥酥脆脆的南煎丸子配合起司的味道及香氣，與香Q有勁刀削麵簡直是絕配哦！#n嗯～看起來真好吃～"
10024030-40 = "！！！"
10024030-41 = "怎麼樣？不想品嚐一下融合香醇鮮味與起司的料理嗎？"
10024030-42 = "這是近期的試作品中最受好評的料理，#n希望沙耶這樣的美食家務必嘗嘗看……"
10024030-43 = "咳哼，既然你們這麼說就沒辦法了……！#n我要開動了！"
10024030-55 = "[ns]「之所以先去廚房一趟，原來是為了這個啊……」"
10024030-56 = "有句話說要先抓住敵人的胃不是嗎？"
10024030-66 = "……「萬年蔘」？#n為什麼想了解那種很難照顧的植物呢？"
10024030-67 = "[s]「怎麼說呢？」"
10024030-68 = "首先，栽培方法十分困難。"
10024030-69 = "它只扎根於陰涼且濕度足夠的土地，因此只生長在崑崙山的山頂一帶──"
10024030-70 = "要收穫至少需要六年，而且不等上十年就無法期待它能發揮足夠的藥效──"
10024030-71 = "除此之外，它對環境的變化相當敏感……#n即使播下100顆種子，真正能夠收成的也不到10株。"
10024030-72 = "[s]「難度還真高啊……」"
10024030-73 = "還有……它那簡直能讓舌頭麻痺的苦味也十分出名。"
10024030-74 = "在有那種苦味的情況下，我實在不認為它適合拿來當作食材……"
10024030-75 = "是呢，我也有同感。"
10024030-76 = "已經試過了嗎！？"
10024030-77 = "只是稍～微試試味道而已。"
10024030-79 = "有些事不必試也知道……"
10024030-80 = "啊哈哈，誰叫我是不用自己的舌頭嘗試就不罷休的個性呢。"
10024030-82 = "總之，就像良藥苦口這句話說的一樣，「萬年蔘」也不例外。"
10024030-83 = "反覆經過複雜且危險的加工後──便能提取出具有「某種效能」的成分。"
10024030-84 = "[s]「是什麼樣的藥效？」"
10024030-85 = "可以在短期內大大提高專注力。"
10024030-86 = "具體來說，可以使意識覺醒、將疲勞一掃而空，#n同時也能期待對減肥有一定的效果──"
10024030-87 = "還能大幅提升筋力和爆發力。"
10024030-88 = "據說還能獲得異於常人的動態視力，甚至可以看見子彈飛行的軌跡。"
10024030-89 = "[s]「有這麼厲害啊！？」"
10024030-90 = "不，雖然看是能看見，不過我可沒說能躲過哦。"
10024030-91 = "只能想著「得趕快躲開！」然後靜靜的看著子彈擊中而已……"
10024030-97 = "專注力……意識的覺醒……"
10024030-98 = "不可以哦，令女。"
10024030-99 = "我，我什麼都還沒說……"
10024030-100 = "作弊讓自己變強，不就算不上是功夫了嗎？"
10024030-102 = "！！！"
10024030-104 = "確，確實如此……！#n俗話說得好「天下沒有白吃的午餐，努力才是王道」對吧……！"
10024030-105 = "不愧是會長！#n果然還是和我一起……"
10024030-106 = "我不要。"
10024030-107 = "我什麼都還沒說……"
10024030-108 = "你想說的是功夫的修行對吧？#n我現在光是商會的工作跟料理就忙個不停了。"
10024030-109 = "[s]「聽起來不像是只有好處呢。」"
10024030-111 = "不過似乎到處都有想要那種藥的學生哦。#n特別是在考試與測驗的時期……"
10024030-112 = "我只希望能利用那種苦味引出鮮味而已。"
10024030-113 = "這也能連接到料理嗎……#n雖然是很有瑠美會長的風格沒錯……"
10024030-114 = "總之，我無法理解。#n真的那麼在意的話，大家都試試看不就知道了嗎？"
10024030-118 = "[ns]「不是每個人都有機會嘗試的……」"
10024030-119 = "再說考試什麼的，只要前一天有稍微翻一下課本……"
10024030-120 = "除非出現某些特別惡意的題目，否則不是都能拿滿分嗎？"
10024030-121 = "[s3]「這倒未必吧……」 \n[s4]「能做到這種事的，可能也就只有沙耶吧……？」"
10024030-124 = "是，是嗎……"
10024030-125 = "既然如此……真的有學生渴望「萬年蔘」也不是不能理解。"
10024030-126 = "[s]「但是會有危險，絕對不能這麼做……」"
10024030-127 = "我在意的是，那麼麻煩的事究竟要由誰來做……"
10024030-128 = "除了必須使用危險的溶劑之外，還要進行嚴密的溫度管理……"
10024030-129 = "不是只需要蒸餾而已，還得經過好幾項複雜的工程……"
10024030-130 = "要引出完美的藥效，甚至還需要有相當專業的設備……"
10024030-131 = "鍊丹術研究會之外的地方有那種設備的話，#n我應該也會知道才對。"
10024030-132 = "而且如果有這種程度的設備流通進來，玄武商會肯定也會聽到風聲的吧。"
10024030-133 = "[s]「真厲害呢。」"
10024030-134 = "在山海經之中，沒有人比我更了解藥材了！"
10024030-135 = "雖然到頭來，對製造不老不死的靈藥還是沒什麼幫助就是了……"
10024030-136 = "[s5]「我之前就很好奇……」\n[s6]「你執著於不老不死的靈藥的理由是什麼？」"
10024030-139 = "──因為那是不可能的。"
10024030-140 = "老師不明白其中的浪漫嗎？#n正是因為不可能才有挑戰的價值啊！"
10024030-141 = "目標就是要夠高！而且要夠難！"
10024030-142 = "在向不可能的問題挑戰的過程中，肯定也會有新的收穫！"
10024030-143 = "哼～這話說得還挺不錯的嘛？#n我還以為你只對靈藥感興趣呢。"
10024030-144 = "才，才不是呢……"
10024030-145 = "不過，製作靈藥才是最重要的目標。#n雖然很多人都把手段與目的弄反了……"
10024030-147 = "但至少鍊丹術研究會會避免這種情況發生！"
10024030-148 = "[s]「你真是努力呢，沙耶。」"
10024030-149 = "你，你說什麼！#n就算突然稱讚我也不會有什麼好處的哦！"
10024030-150 = "而且目前也還不清楚「萬年蔘」具體被用在什麼地方……"
10024030-151 = "……咦？"
10024030-152 = "[s]「怎麼了嗎？」"
10024030-153 = "沒，沒事，沒什麼！"
10024030-157 = "（這麼說來，之前好像有個利用「萬年蔘」的成分使大腦覺醒的研究……）"
10024030-158 = "（不過，那個研究……）"
10024030-164 = "總之，能栽培「萬年蔘」的就只有崑崙山而已對吧？"
10024030-165 = "那麼就先去那邊看看吧。#n謝謝你，沙耶。"
10024030-166 = "……我什麼都不知道，也什麼都沒說。#n剛才只是在自言自語而已。"
10024030-167 = "啊哈哈，我知道了。#n就當成是我們的祕密吧。"

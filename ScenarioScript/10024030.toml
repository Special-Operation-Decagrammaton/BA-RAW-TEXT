[translation]
10024030-1 = "ตอนที่ 3;มุ่งมั่นไม่ย่อท้อ"
10024030-3 = "ห้องชมรมวิจัยศาสตร์การปรุงยา"
10024030-5 = "[ns1] \"สงสัยอยู่เลยว่าจะไปที่ไหน...\"\n[ns2] \"ชมรมวิจัยศาสตร์การปรุงยา…?\""
10024030-9 = "ใช่ค่ะ คุณครู"
10024030-10 = "ฉันไม่เคยนำโสมหมื่นปีมาใช้เป็นวัตถุดิบอาหารเลย"
10024030-11 = "แต่ฉันมั่นใจว่าต้องมีคนเอามันไปใช้อยู่ที่ไหนสักแห่ง"
10024030-12 = "เพราะงั้นการหาข้อมูลจากชมรมที่วิจัยสมุนไพรอย่างชมรมวิจัยศาสตร์การปรุงยา มันน่าจะเร็วที่สุดแล้วละ"
10024030-13 = "ฉันลองนึกถึงชมรมที่ต้องใช้กำลังอย่างชมรมวิจัยศิลปะป้องกันตัวกับชมรมการแสดงงิ้วด้วยนะ..."
10024030-14 = "ดูจากพละกำลังของพวกเธอแล้ว เหมือนกับพวกเธอเคี้ยวโสมหมื่นปีไปทั้งรากเลยอย่างนั้นละ"
10024030-15 = "อย่างนั้นเองเหรอคะท่านประธาน ถ้าเคี้ยวโสมหมื่นปีทั้งรากจะช่วยเพิ่มพลังต่อสู้ของเราเหรอคะ?"
10024030-16 = "ถ้าอย่างนั้นมันจะได้ผลกับกังฟูของฉันด้วยหรือเปล่าคะ?"
10024030-17 = "...ยังไม่มีใครบอกเลยนะว่ามันจะได้ผล?"
10024030-18 = "แต่ถ้าวิเคราะห์แนวโน้มอุปนิสัยของชมรมที่กินมันเข้าไปละก็..."
10024030-19 = "ไม่หรอกน่า ไม่ใช่หรอก ใจเย็นๆ ก่อนนะ"
10024030-25 = "ก็ว่าเสียงเอะอะอะไรกัน ที่แท้ก็ครูกับคนของย่านการค้าเทพเต่าดำเองหรอกเหรอ... มีเรื่องอะไรหรือเปล่าน่ะ?"
10024030-26 = "[s] \"พวกเราอยากขอความช่วยเหลือจากซายะหน่อยน่ะ\""
10024030-27 = "ไม่ละ ไม่ได้หรอก ขอโทษที่ต้องบอกอย่างนี้นะ แต่กลับไปเถอะ..."
10024030-28 = "จริงๆ ฉันยินดีช่วยครูเสมอนะ แต่ถ้ามาพร้อมกับย่านการค้าเทพเต่าดำละก็ มันต้องเป็นเพราะเรื่องที่เกิดขึ้นเมื่อไม่นานมานี้แน่เลย..."
10024030-29 = "ฉันไม่รู้เรื่องข้อพิพาทระหว่างย่านการค้าเทพเต่าดำกับมังกรดำหรอกนะ! ถ้าเป็นไปได้ก็ไม่อยากเข้าไปยุ่งเลยด้วย!"
10024030-30 = "ชมรมวิจัยศาสตร์การปรุงยาน่ะ ง่วนอยู่กับการพัฒนายาอายุวัฒนะอยู่ตลอดเวลาเลยนะ!"
10024030-31 = "เอ้าๆ อย่าเพิ่งปฏิเสธกันสิ"
10024030-32 = "ฉันรู้อยู่แล้วละว่าต้องเป็นแบบนี้ก็เลยหยิบนี่ติดมือมาด้วย อันนี้คือเส้นเตาเซียวเมี่ยน ผัดราดด้วยหนานเจียนหวานจื่อ ฉันใส่ชีสเพิ่มไปด้วยนะ"
10024030-38 = "สะ... เส้นเตาเซียวเมี่ยนผัดเหรอ...? ราดหนานเจียนหวานจื่อด้วย...!! ไม่เคยเห็นและไม่เคยได้ยินมาก่อนเลย!"
10024030-39 = "ฉันเพิ่มรสชาติหอมๆ มันๆ ด้วยการใส่ชีสในมีตบอลที่ทอดกรอบๆ จากนั้นก็เอามาราดบนเส้นเตาเซียว#nเมี่ยนที่ผัดจนเหนียวหนึบ แล้วก็ราดซอสลงไปด้วยนะ"
10024030-40 = "!!!"
10024030-41 = "เป็นไง ไม่อยากรู้เหรอว่าความเข้ากันของรสหอมมัน รสกลมกล่อม และรสชาติของชีสมันเป็นยังไง?"
10024030-42 = "ในบรรดาเมนูที่เราพัฒนาขึ้นล่าสุดนี้ นี่เป็นเมนูเดียวที่ได้รับการประเมินในทางที่ดี แล้วฉันก็อยากให้นักชิมภายนอกอย่างซายะจังช่วยประเมินด้วยน่ะ"
10024030-43 = "ฮึ่ม งั้นก็ช่วยไม่ได้ละนะ...! จะกินแล้วนะ!"
10024030-55 = "[ns] \"ที่แอบแวะไปห้องครัวก่อนมาที่นี่ ก็เพราะแบบนี้สินะ...\""
10024030-56 = "ไม่มีใครลงสนามทั้งๆ ที่มีเสบียงไม่พอหรอกนะ"
10024030-66 = "โสมหมื่นปี...? ถามหาสมุนไพรใช้ยากๆ แบบนั้นไปทำไมกันน่ะ?"
10024030-67 = "[s] \"หายากยังไงเหรอ?\""
10024030-68 = "ก่อนอื่นเลยนะ ปัญหามันอยู่ที่การปลูกโสมหมื่นปีน่ะ"
10024030-69 = "มันชอบดินเย็นๆ และมีความชื้นเพียงพอ นอกจากแถบยอดเขาคุนหลุนของซานไห่จิงแล้วก็ไม่มีที่ไหน#nพอจะเพาะปลูกได้เลย"
10024030-70 = "นอกจากนี้มันยังเป็นพืชที่เติบโตช้า ต้องใช้เวลาปลูกอย่างน้อย 6-10 ปีถึงจะได้รากโสมที่มีสรรพคุณ#nครบครัน"
10024030-71 = "ถ้าสภาพแวดล้อมเปลี่ยนไประหว่างเพาะปลูก มันจะหยุดการเจริญเติบโตและเข้าสู่ภาวะหลับใหล#nถ้าหว่านเมล็ด 100 เมล็ด เราจะได้ผลผลิตไม่ถึง 10 รากด้วยซ้ำ..."
10024030-72 = "[s] \"เป็นพืชที่น่าทึ่งจริงๆ...\""
10024030-73 = "แถมขึ้นชื่อเรื่องความขมด้วยนะ แค่เคี้ยวตรงปลายรากก็ลิ้นชาไป 10 นาทีเลยละ"
10024030-74 = "ถ้าขมขนาดนั้นก็น่าจะเอามาประกอบอาหารยากนะ..."
10024030-75 = "นั่นน่ะสิ เป็นอย่างที่เธอว่าเลย"
10024030-76 = "นี่เธอเคยลองกินเข้าไปแล้วเหรอ!?"
10024030-77 = "เคยลองชิมไปแค่นิดเดียวเอง"
10024030-79 = "นี่ประธาน... โลกเรามันมีความล้มเหลวที่เรารับรู้ได้เองโดยที่ไม่ต้องลองทำก็ได้อยู่นะ"
10024030-80 = "ฉันชอบล้มเหลวด้วยตัวเองน่ะ ถึงจะพอใจ ฮ่ะฮ่ะฮ่า"
10024030-82 = "เอาเถอะ โสมหมื่นปีก็ใช่ว่าจะไม่มีประโยชน์อะไรเลย เหมือนคำกล่าวที่ว่าหวานเป็นลมขมเป็นยานั่นละ"
10024030-83 = "ถ้าผ่านกระบวนการคัดสรรและสกัดที่ทั้งซับซ้อน อันตราย และยุ่งยากแล้วละก็ เราจะดึงเอาองค์ประกอบที่มีสรรพคุณทางยาของโสมออกมาได้"
10024030-84 = "[s] \"สรรพคุณที่ว่าคืออะไรเหรอ?\""
10024030-85 = "มันช่วยเพิ่มสมาธิในระยะสั้นได้ดีมากน่ะ"
10024030-86 = "แล้วก็ยังช่วยเพิ่มการตื่นตัวและระบบเผาผลาญด้วยนะ เป็นประโยชน์ต่อการลดน้ำหนักพอสมควรเลย"
10024030-87 = "ตอนที่โสมออกฤทธิ์ เราจะไม่รู้สึกเหนื่อยง่ายๆ ด้วย"
10024030-88 = "ได้ยินว่าระบบประสาทจะตอบสนองเร็วขึ้นขนาดที่สามารถเห็นกระสุนที่พุ่งเข้ามาได้เลยละ"
10024030-89 = "[s] \"ขนาดนั้นเลยเหรอ? เยี่ยมเลยนะ!\""
10024030-90 = "เอ่อ แค่มองเห็นเฉยๆ นะ ไม่ได้บอกว่าหลบได้"
10024030-91 = "จังหวะที่คิดว่า 'กระสุนพุ่งมาแล้ว! ต้องหลบแล้วละ!' คงโดนยิงพอดี..."
10024030-97 = "ระบบประสาทตอบสนองเร็วขึ้น ไม่รู้สึกเหนื่อย แถมระบบเผาผลาญและกล้ามเนื้อก็เพิ่มขึ้นด้วย..."
10024030-98 = "ไม่ได้นะ เรย์โจว"
10024030-99 = "ฉะ... ฉันยังไม่ทันจะได้พูดอะไรเลยนะ..."
10024030-100 = "ก็ไม่ได้อยู่ดี ถ้าเราไม่แข็งแกร่งอย่างบริสุทธิ์ใจ มันก็ไม่ใช่วิถีกังฟูใช่ไหมล่ะ?"
10024030-102 = "!!!"
10024030-104 = "ชะ... ใช่แล้วค่ะ...! มีคำกล่าวว่า <กำไรไม่ได้หล่นจากฟ้าและไม่ได้ผุดขึ้นมาจากดิน> ด้วยนะคะ"
10024030-105 = "สมกับเป็นท่านประธานจริงๆ ค่ะ! อย่างนี้ต้องมาฝึก..."
10024030-106 = "ไม่เอา"
10024030-107 = "ฉันยังไม่ได้พูดอะไรเลยนะคะ"
10024030-108 = "ก็ไม่เอาอยู่ดี แค่งานย่านการค้ากับเรื่องอาหารฉันก็ยุ่งมากแล้ว ไม่มีเวลาไปฝึกกังฟูกับเธอหรอก"
10024030-109 = "[s] \"ฟังแล้วโสมก็มีสรรพคุณที่ดูอันตรายอยู่นะนั่น\""
10024030-111 = "ได้ยินว่ามีนักเรียนที่ต้องการยาแบบนั้นกันทั่วเลยละ เห็นว่าจะเอาไปกินตอนสอบบ้าง หรือใช้ตอนฝึกบ้าง..."
10024030-112 = "ฉันไม่ได้คิดถึงสรรพคุณขนาดนั้นเลยแฮะ คิดแค่เรื่องรสขมและก็รสกลมกล่อมแค่นั้นเอง"
10024030-113 = "การเป็นคนเสมอต้นเสมอปลายมันก็ดีอยู่หรอกนะ... แต่จะมองในมุมมองของรสชาติอย่างเดียวได้ยังไง..."
10024030-114 = "เอาเป็นว่าฉันไม่เข้าใจนักเรียนพวกนั้นเลย แค่อ่านหนังสือก่อนสอบก็น่าจะจำทั้งหมดได้อยู่แล้วนี่นา"
10024030-118 = "[ns] \"นักเรียนทุกคนไม่ได้เหมือนกับซายะนะ...\""
10024030-119 = "งั้นเหรอ? ขึ้นชื่อว่าการสอบน่ะ แค่อ่านหนังสือพอผ่านหูผ่านตาสักหนึ่งวันก่อนสอบ"
10024030-120 = "แค่นี้ก็ได้คะแนนเกือบเต็มได้แล้วไม่ใช่เหรอ เว้นแต่ว่าจะมีปัญหาเลวร้ายอะไรเกิดขึ้นน่ะนะ..."
10024030-121 = "[s3] \"ไม่ใช่หรอก ใช่ว่าทุกคนจะเป็นแบบนั้น\" \n[s4] \"คนที่ทำได้คงมีแค่ซายะคนเดียวหรือเปล่า...?\""
10024030-124 = "ยะ... อย่างนั้นเหรอ?!"
10024030-125 = "ถ้าอย่างนั้น... ก็อาจจะมีนักเรียนที่ใช้ตัวช่วยแบบโสมหมื่นปีอยู่ก็ได้..."
10024030-126 = "[s] \"ไม่หรอก ตามหลักการแล้วทำแบบนั้นไม่ได้หรอก...\""
10024030-127 = "อีกเรื่องที่ฉันไม่เข้าใจเลยก็คือใครมันจะไปทำเรื่องยุ่งยากแบบนั้นกันล่ะ"
10024030-128 = "ต้องใช้ตัวทำละลายที่อันตรายและต้องระวังเรื่องการรักษาอุณหภูมิแรงดันระหว่างจัดการด้วย"
10024030-129 = "ต้องเอามาล้างพิษและกลั่น ปรับค่าเป็นกลางและจำแนก แล้วก็ต้องแช่เย็นและสกัดให้ได้เร็วๆ อีก... แค่ขั้นตอนคร่าวๆ ก็ยังเยอะขนาดนี้"
10024030-130 = "ถ้าจะทำแบบนั้น ก็ต้องใช้อุปกรณ์เฉพาะทางที่ทันสมัยมากๆ"
10024030-131 = "ถ้าที่อื่นมีอุปกรณ์ครบครันกว่าชมรมวิจัยศาสตร์การปรุงยาละก็ ฉันคงได้ข่าวก่อนใครแล้วละ"
10024030-132 = "และถ้ามีการปล่อยขายอุปกรณ์ระดับนั้น มันต้องมีข่าวมาถึงกลุ่มร้านค้าของย่านการค้าเทพเต่าดำแล้วสิ"
10024030-133 = "[s] \"รู้ลึกรู้จริงมากเลยนะเนี่ย...\""
10024030-134 = "ท่านซายะกล้าพูดเลยละว่ารู้จักยาทุกอย่างในซานไห่จิง!"
10024030-135 = "ถึงยาหลายๆ ตัวนั้นจะไม่ได้มีประโยชน์ในการสร้างยาอายุวัฒนะเลยก็เถอะนะ..."
10024030-136 = "[s5] \"ครูสงสัยเรื่องนี้มานานแล้ว\"\n[s6] \"ทำไมซายะถึงได้สนใจยาอายุวัฒนะมากขนาดนั้นล่ะ?\""
10024030-139 = "เหตุผลก็ง่ายๆ เลย เพราะว่ามันเป็นไปไม่ได้ยังไงล่ะ"
10024030-140 = "ทำไมถึงพยายามทั้งที่มันเป็นไปไม่ได้น่ะเหรอ? ก็ไม่รู้เหมือนกันสิน้าครู ฉันต้องทำงานระดับนั้นแหละ มันถึงจะได้รสชาติของความท้าทายน่ะ!"
10024030-141 = "ตั้งเป้าหมายให้สูงและยากๆ เท่าที่จะเป็นไปได้เข้าไว้!"
10024030-142 = "ถ้าพยายามจะบรรลุเป้าหมายที่ดูยากและเป็นไปไม่ได้ มันจะเกิดผลพลอยได้ที่เป็นประโยชน์#nจากกระบวนการพวกนั้นขึ้นมาเอง!"
10024030-143 = "โอ้ พูดได้ดีเลยนะเนี่ย? นึกว่านอกจากการทดลองแล้วเธอจะไม่สนใจอะไรแล้วเลยซะอีกนะ"
10024030-144 = "แต่ถึงอย่างนั้นก็ไม่ควรนำผลพลอยได้มาเป็นเป้าหมายนะ"
10024030-145 = "ในชีวิตการทำงาน บางครั้งเป้าหมายกับวิธีการก็สลับกัน"
10024030-147 = "แต่อย่างน้อยท่านซายะก็ต้องพยายามไม่ให้เกิดเหตุการณ์แบบนั้นในชมรมวิจัยศาสตร์การปรุงยา!"
10024030-148 = "[s] \"ซายะเป็นคนซื่อตรงจริงๆ เลยน้า...\""
10024030-149 = "อะ... อะไรกัน! ถึงจะเอ่ยชมปุบปับแบบนั้น แต่ฉันก็ไม่มีข้อมูลอะไรให้หรอกนะ!"
10024030-150 = "ฉันไม่รู้อะไรเกี่ยวกับการขายหรือการใช้ประโยชน์จากโสมหมื่นปีเลยน่ะสิ..."
10024030-151 = "เอ๋ เดี๋ยวก่อนนะ?"
10024030-152 = "[s] \"หืม? มีอะไรเหรอ?\""
10024030-153 = "มะ... ไม่มี ไม่มีอะไรหรอก! ครูไม่ต้องสนใจก็ได้..."
10024030-157 = "(ถ้าลองนึกดีๆ เมื่อก่อนเคยมีงานวิจัยเกี่ยวกับการใช้ส่วนประกอบพิเศษของโสมหมื่นปีเพื่อกระตุ้น#nสมองอยู่นะ...)"
10024030-158 = "(แต่ว่างานวิจัยนั้น...)"

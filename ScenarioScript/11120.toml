[translation]
11120-2 = "第12話;前往黑市（２）"
11120-3 = "娛樂街"
11120-4 = "……來到這裡應該就沒事了。"
11120-5 = "呼呣…… #n看來這裡是相當危險的地方呢。 "
11120-6 = "咦？這，這是當然的。 #n因為是聯邦學生會無法控管的地方之一……"
11120-7 = "光是黑市的規模就等同於數間學園，絕對不容小覷……"
11120-8 = "據我所知，各式各樣的「企業」會在這裡從事非法行為，展開金權鬥爭。"
11120-9 = "甚至還有專屬於黑市的銀行和治安單位……"
11120-10 = "還有銀行和警察……！？#n那，那應該也是不被認可的非法團體吧！？"
11120-11 = "是……沒錯。"
11120-12 = " 規模不是鬧著玩的呢……"
11120-13 = "其中尤其是治安單位，最好能避則避……#n如果引起騷動，就必須先躲起來……"
11120-14 = "哼嗯～日步美醬，沒想到你意外的很了解這裡呢～"
11120-15 = "咦？是嗎？因為是危險的地方，所以做了不少準備……"
11120-16 = "好，決定了～"
11120-17 = "……？"
11120-18 = "作為救了你的回禮，直到我們找到要找的東西為止，都要跟我們一起行動唷～♪"
11120-19 = "咦？咦咦？"
11120-20 = "哇啊☆真是好主意呢！"
11120-21 = "原來如此，是誘拐呢。 "
11120-22 = "什麼！？"
11120-23 = "不是誘拐，而是拜託帶路吧……#n當然前提是日步美同學願意。"
11120-24 = "啊，啊嗚嗚……雖然不知道我幫不幫得上忙……#n畢竟受了阿拜多斯各位的照顧，我很樂意協助。"
11120-25 = "好～那就拜託你暫時一起行動囉。"
11120-27 = "（噗嚕嚕嚕嚕……）"
11120-29 = "（噗嚕嚕嚕嚕嚕嚕嚕嚕……）"
11120-31 = "怎麼了，亞瑠醬？不接電話嗎？"
11120-32 = "…… "
11120-33 = "表情好陰暗……難道是客戶打來的……？"
11120-34 = "嗚哇，難怪一副臭臉。#n不是得報告失敗的結果嗎？"
11120-35 = "亞瑠大人……"
11120-36 = "……呿。"
11120-38 = "（喀嚓）"
11120-39 = "你好……這裡是便利屋68。"
11120-42 = "……"
11120-43 = "嗯。真是有趣的報告啊。"
11120-44 = "你們的練習真精彩。#n所以實戰何時會開始呢？"
11120-47 = "……咦？#n那，那就是實戰的……說……"
11120-48 = "啊不是，沒什麼。#n實，實戰隨時可以開始……嗯……啊，大約在一週內……是。"
11120-49 = "！？"
11120-50 = "！！"
11120-51 = "呵呵呵。是的，沒錯。#n……儘管包在我身上吧。"
11120-53 = "（喀嚓）"
11120-54 = "那些傢伙的資料本身應該沒有問題才對。"
11120-55 = "是計算出錯了嗎？不過那股力量明明……"
11120-56 = "……看來你似乎有點困擾呢。"
11120-57 = "……"
11120-58 = "不，這不是什麼棘手的事，只是計算出了點問題而已。#n阿拜多斯的傢伙遠比資料中來得強。"
11120-59 = "……"
11120-60 = "……資料並沒有任何問題。"
11120-61 = "……？"
11120-62 = "阿拜多斯的學生變得更強了，只能這樣解釋了。"
11120-63 = "那是什麼意思……"
11120-64 = "阿拜多斯究竟發生了什麼變化，就由我來確認吧。"
11120-65 = "告辭。 "
11120-68 = "……"
11120-70 = "（喀嚓）"
11120-71 = "……唉。"
11120-72 = "你看起來好憔悴呢，亞瑠醬。"
11120-73 = "社長，這是怎麼回事……？#n難道你還打算要開戰嗎？"
11120-74 = "……雖然我也不太清楚客戶的背景，不過他似乎是個大人物。#n……這件委託不能失敗。"
11120-75 = "……"
11120-76 = "但是阿拜多斯那些傢伙比想像中還強。#n還有那個「夏萊」的老師在，光靠我們是行不通的。"
11120-77 = "而且我們已經用光所有財產了，之後該怎麼戰鬥？"
11120-78 = "需，需要我去打工賺錢嗎？"
11120-79 = "想用勞力賺錢來雇傭兵的話，得要所有人工作一年才有辦法……"
11120-80 = "誰叫我們因為租了這間昂貴的辦公室，無謂地花了一大筆錢……"
11120-81 = "少，少囉嗦！一間像樣的公司怎麼可以沒有辦公室！#n這樣才能順利接到委託啊！"
11120-82 = "我不在意哦，就算要像上次那樣在公園搭帳篷也可以～？"
11120-83 = "少囉嗦少囉嗦！大家都給我安靜！！"
11120-84 = "……"
11120-85 = "……我要去貸款。"
11120-86 = "啥？亞瑠醬不是信用不良嗎。"
11120-87 = "才沒有！我只是因為被通緝的關係，帳戶被凍結了而已！"
11120-88 = "是嗎？ #n……啊，說的也是。是風紀委員會那些傢伙做的呢。"
11120-89 = "可惡，沒想到風紀委員會那些傢伙……會把我們逼得這麼緊。 "
11120-90 = "就算去中央銀行也會吃閉門羹吧？"
11120-91 = "就跟你說少囉嗦了！我還有其他辦法！"
11120-92 = "……"
11120-93 = "阿拜多斯，我們走著瞧。#n事情可不會這樣就結束。"
11120-94 = "便利屋的任務現在才開始呢！"
11120-96 = "……"
11120-97 = "嘿～究竟在打什麼主意呢。"
11120-99 = "下一話;出動！泳裝蒙面團（１）"

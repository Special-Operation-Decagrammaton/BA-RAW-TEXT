[translation]
11120-2 = "ตอนที่ 12;ไปยังตลาดมืด 2"
11120-3 = "ย่านบรรเทิง"
11120-4 = "...ออกมาถึงตรงนี้ก็น่าจะปลอดภัยแล้วค่ะ"
11120-5 = "อืม... ที่นี่มันอันตรายไม่ใช่เล่นเลยนะ"
11120-6 = "เอ๋? กะ...ก็ใช่น่ะสิคะ! ที่นี่เป็นพื้นที่ที่อยู่นอกเหนือการดูแลขององค์การนักเรียนค่ะ"
11120-7 = "แค่ขนาดของตลาดมืดก็เท่าๆ กับโรงเรียนขนาดเล็กหลายแห่งรวมกันแล้ว มาที่นี่จะประมาทไม่ได้เลยค่ะ..."
11120-8 = "ได้ยินมาว่ามีพวก <ธุรกิจ> สีเทาทั้งหลายต่อสู้แย่งสัมปทานอำนาจครองพื้นที่ที่นี่ด้วยนะคะ"
11120-9 = "แถมยังมีหน่วยงานดูแลความปลอดภัยและธนาคารเฉพาะของตลาดมืดเองอีกด้วย..."
11120-10 = "ธนาคารและตำรวจงั้นเหรอ?! คงเป็นพวกองค์กรผิดกฎหมายที่ไม่ได้รับการรับรองใช่ไหม?!"
11120-11 = "ใช่ค่ะ..."
11120-12 = "ไม่ใช่เล่นๆ เลยนะคะเนี่ย..."
11120-13 = "ถ้าอย่างนั้นพวกเราก็อย่าไปเกี่ยวข้องกับหน่วยงานความปลอดภัยนั่นไว้จะดีกว่าค่ะ... ถ้าเกิดเรื่องวุ่นวาย#nอะไรขึ้นมาละก็ การหาที่ซ่อนคือวิธีที่ดีที่สุดค่ะ"
11120-14 = "อืม... ฮิฟุมิจังนี่รู้เยอะกว่าที่คิดอีกนะ?"
11120-15 = "เอ่อ.. งั้นเหรอคะ? ที่นี่อันตรายมาก ฉันเลยหาข้อมูลล่วงหน้ามาเยอะมากค่ะ......"
11120-16 = "ดีละ ตัดสินใจได้แล้ว~"
11120-17 = "...?"
11120-18 = "ไหนๆ เราก็ช่วยฮิฟุมิจังไว้ งั้นเธอก็อยู่กับเราจนกว่าจะหาของที่เราต้องการได้แล้วกัน~♪"
11120-19 = "อะ... เอ๋?"
11120-20 = "ว้าวว☆ เป็นความคิดที่ดีเลยค่ะ!"
11120-21 = "เอางั้นเหรอ เหมือนลักพาตัวเลยนะ"
11120-22 = "คะ?!!"
11120-23 = "ไม่ได้ลักพาตัวสักหน่อย แค่ขอให้ช่วยนำทางและแนะนำอะไรนิดหน่อยเอง ฉันหมายถึง...#nถะ... ถ้าคุณฮิฟุมิตกลงละนะ..."
11120-24 = "คือ... ฉันไม่รู้ว่าจะช่วยได้มากแค่ไหน แต่ฉันก็ติดหนี้บุญคุณทุกคนอยู่ ยังไงก็ต้องตกลงอยู่แล้วละค่ะ!"
11120-25 = "ดีเลย! งั้นช่วยไปกับพวกเราหน่อยแล้วกันนะ"
11120-27 = "(กริ๊งงงงง)"
11120-29 = "(กริ๊งงงงงงงงงงง)"
11120-31 = "ทำอะไรอยู่น่ะอารุจัง? ไม่รับโทรศัพท์เหรอ?"
11120-32 = "......"
11120-33 = "ทำไมทำหน้าหม่นหมองแบบนั้นล่ะ... อย่าบอกนะว่า... ลูกค้าโทรมา...?"
11120-34 = "เฮ้อ คงจะลำบากใจสิท่า ใครจะอยากรายงานลูกค้าว่าทำภารกิจไม่สำเร็จกันล่ะ"
11120-35 = "ท่านอารุ..."
11120-36 = "ฮึ่ม..."
11120-38 = "(แกรก)"
11120-39 = "ค่ะ... หน่วยรับจ้างสารพัดค่ะ"
11120-42 = "......"
11120-43 = "อืม... น่าสนใจ"
11120-44 = "ฉันได้ดูการฝึกซ้อมนั่นแล้ว เมื่อไหร่จะเริ่มปฏิบัติการจริงล่ะ?"
11120-47 = "เอ่อ... นั่นก็ปฏิบัติการจริงนะ..."
11120-48 = "ไม่ค่ะ ไม่มีอะไรค่ะ! ฉันหมายถึง... เราแค่ลองฝึกซ้อม... ก่อนปฏิบัติการจริง เอ่อ... ก็คงภายใน#n1 สัปดาห์ค่ะ... ค่ะ..."
11120-49 = "!?"
11120-50 = "!!"
11120-51 = "ฮุฮุฮุ ค่ะ ใช่ค่ะ วางใจพวกเราได้เลยค่ะ"
11120-53 = "(แกรก)"
11120-54 = "จากข้อมูลที่มีอยู่ ข้อมูลของพวกนั้นไม่น่าผิดนะ..."
11120-55 = "หรือว่าจะคำนวณอะไรผิดพลาดไป?"
11120-56 = "...กังวลใจอยู่สินะครับ"
11120-57 = "......"
11120-58 = "เปล่า ฉันไม่ได้กังวลอะไร ก็แค่คำนวณพลาดนิดหน่อย นักเรียนของอะบิดอสแข็งแกร่งมากกว่าข้อมูล#nที่เรามี ก็เท่านั้น"
11120-59 = "......"
11120-60 = "แต่ข้อมูลไม่ได้บกพร่องอะไรเลยนะครับ"
11120-61 = "...?"
11120-62 = "อนุมานได้ว่า พวกนักเรียนอะบิดอสแข็งแกร่งขึ้นกว่าเดิมยังไงล่ะครับ"
11120-63 = "ไร้สาระสิ้นดี..."
11120-64 = "ผมต้องไปตรวจสอบแล้วครับว่าอะไรที่ทำให้นักเรียนอะบิดอสเก่งขึ้นมาได้แบบนี้"
11120-65 = "ขอตัวนะครับ"
11120-68 = "......"
11120-70 = "(แกรก)"
11120-71 = "เฮ้อ..."
11120-72 = "หน้าซีดแล้วนะ อารุจัง"
11120-73 = "คุยอะไรกับลูกค้ามาเหรอประธาน... อย่าบอกนะว่าวางแผนจะออกไปต่อสู้อีก?"
11120-74 = "...บอกตามตรง ฉันไม่ค่อยรู้รายละเอียดของลูกค้าคนนี้เท่าไหร่หรอก แต่ว่าต้องเป็นระดับคนใหญ่#nคนโตแน่ๆ เพราะงั้นภารกิจนี้จะล้มเหลวไม่ได้"
11120-75 = "......"
11120-76 = "แต่พวกอะบิดอสเก่งกว่าที่เราคิดนะ แถมยังมี <ชาเล่ต์> มาช่วยอีก แค่กำลังของเราน่ะไม่พอหรอก"
11120-77 = "อีกอย่าง เราก็ใช้เงินทุนไปหมดแล้ว จะเอาอะไรไปสู้ล่ะ?"
11120-78 = "ให้ฉันไปทำงานพาร์ทไทม์ใช้แรงงานดีไหมคะ?"
11120-79 = "ถ้าจะหาเงินมาจ้างทหารรับจ้างแบบเดิมละก็ สงสัยต้องทำงานพาร์ทไทม์ทั้งปี..."
11120-80 = "อีกอย่าง เรามาเช่าสำนักงานแพงๆ แล้วเสียเงินไปโดยใช่เหตุแบบนี้กันทำไมเนี่ย..."
11120-81 = "หนวกหูน่า! ถ้าจะทำธุรกิจจริงจัง ก็ต้องมีสำนักงานสิ! ถ้าเราดูน่าเชื่อถือ ลูกค้าก็จะได้มาจ้างทำ#nภารกิจกันเรื่อยๆ ไงล่ะ!"
11120-82 = "อืม.. แต่ให้ไปกางเต็นท์ในสวนสาธารณะแบบคราวที่แล้วก็ได้อยู่นะ?"
11120-83 = "หนวกหูน่า! ทุกคนเงียบไปเลย!"
11120-84 = "......"
11120-85 = "...เราจะไปกู้เงินกัน"
11120-86 = "ว่าไงนะ? ฉันนึกว่าอารุจังติดแบล็กลิสต์อยู่ซะอีก..."
11120-87 = "เปล่าสักหน่อย!! แค่บัญชีถูกระงับเพราะดันมีชื่อติดอยู่บนใบประกาศจับต่างหากเล่า!"
11120-88 = "อย่างนั้นเองเหรอ? อ๋อ...จำได้แล้ว เพราะพวกคณะกรรมการวินัยนั่นเอง"
11120-89 = "พวกคณะกรรมการวินัยบ้าบอนั่น... คิดไม่ถึงเลยว่าจะมากลั่นแกล้งกันแบบนี้"
11120-90 = "แต่ถ้าไปบอกพนักงานธนาคารแบบนั้น จะถูกหัวเราะเยาะเอาได้นะ"
11120-91 = "หนวกหูน่า! ฉันมีวิธีของฉันก็แล้วกัน!"
11120-92 = "......"
11120-93 = "คอยดูเถอะ เจ้าพวกอะบิดอส! ฉันบอกแล้วไงว่ามันจะไม่จบแค่นั้นแน่นอน"
11120-94 = "ภารกิจของหน่วยรับจ้างสารพัดจะเริ่มตั้งแต่ตอนนี้แหละ"
11120-96 = "......"
11120-97 = "เห~ คิดจะทำอะไรอีกล่ะเนี่ย?"
11120-99 = "ตอนต่อไป;ปฏิบัติการ! กองกำลังหน้ากากมิสึกิ 1"

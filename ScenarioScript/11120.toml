[translation]
11120-2 = "Episode 12;To the Black Market! Part 2"
11120-3 = "Entertainment District"
11120-4 = "I think we lost them..."
11120-5 = "This place really lives up to its reputation."
11120-6 = "I guess you could say that. The General Student Council doesn't have much influence here."
11120-7 = "The Black Market's operational scale is equivalent to at least that of the smaller academies in Kivotos. It definitely shouldn't be underestimated..."
11120-8 = "Especially since there are also corporations here constantly battling for control over all sorts of illegal trades and activities."
11120-9 = "The Black Market even has its own bank and law enforcement."
11120-10 = "A bank and police force?! That can't be legal, can it?!"
11120-11 = "It's not in the slightest."
11120-12 = "I can't believe how organized it all is."
11120-13 = "You especially don't want to get involved with their police force—trust me.#nThe best thing to do when something happens is to just run away and take cover."
11120-14 = "You seem to know quite a lot about this place, Hifumi."
11120-15 = "Do I? I did a lot of research before coming here because of the stories..."
11120-16 = "Then it's settled!"
11120-17 = "...?"
11120-18 = "Hifumi will be coming with us until we've got what we came for! ♪"
11120-19 = "Wait, what?"
11120-20 = "Wow! That's a brilliant idea! ☆"
11120-21 = "A kidnapping. Good thinking."
11120-22 = "Excuse me?!"
11120-23 = "No, no, not a kidnapping. They mean they'd like you to be our guide.#nThat is, if you're okay with it, Hifumi."
11120-24 = "Oh. I'm not sure I'd be very helpful, but I do owe you all one,#nso...all right."
11120-25 = "Great, so you'll be coming with us. For now, at least."
11120-27 = "*riiiiiinnnnnng*"
11120-29 = "*riiiiiinnnnnng*"
11120-31 = "The heck, Aru?! Why aren't you answering your phone?"
11120-32 = "..."
11120-33 = "Check out the look on her face. It must be the client..."
11120-34 = "Oof. I wouldn't want to be her right now, having to report a failure."
11120-35 = "Aru..."
11120-36 = "Tch."
11120-38 = "*click*"
11120-39 = "Problem Solver 68..."
11120-42 = "..."
11120-43 = "Well. This is interesting."
11120-44 = "I had a fine time watching you get warmed up. So tell me, when will the real operation begin?"
11120-47 = "Uh, what? But that was the real op— "
11120-48 = "I mean, uh, the real operation will be underway soon. That is to say,#nit will be in a week. Yup..."
11120-49 = "...?!"
11120-50 = "...!"
11120-51 = "Hahaha. That's right. You have nothing to worry about."
11120-53 = "*clang*"
11120-54 = "As far as I know, the data we have on that group should be accurate."
11120-55 = "Was it an error in our calculations?"
11120-56 = "You seem troubled."
11120-57 = "..."
11120-58 = "No, not troubled. It must have been a calculation error, that's all.#nThose Abydos students happened to have a little more fight in them than expected, based on the data."
11120-59 = "..."
11120-60 = "On the contrary. The data was flawless."
11120-61 = "...?"
11120-62 = "The only way this can be interpreted is the Abydos students have somehow grown in strength."
11120-63 = "That's preposterous."
11120-64 = "We'll have to find out if any new variables have appeared in Abydos recently."
11120-65 = "Pardon me."
11120-68 = "..."
11120-70 = "*clang*"
11120-71 = "*exhale*"
11120-72 = "You don't look so good, Aru."
11120-73 = "What was that all about? You're not planning on starting another fight, are you?"
11120-74 = "Truth be told, I don't know a lot about the client, but I know they're not to be messed with. We don't want to disappoint them..."
11120-75 = "..."
11120-76 = "But those Abydos kids were way stronger than we thought.#nPlus, they've got Schale in their corner. Our strength alone won't cut it. "
11120-77 = "And we've already spent our entire budget. How would we fight them even if we wanted to?"
11120-78 = "Sh-Should I start looking for some part-timers to use as hired muscle?"
11120-79 = "That would cost each of us a year's worth of work just to be able to afford it again."
11120-80 = "Remind me why we signed a lease for this office. It's a waste of money."
11120-81 = "B-Because a proper business needs a proper workplace!#nNobody would hire us if we didn't look presentable!"
11120-82 = "She has a point, but I wouldn't really care if we started doing business out of a tent in the park like we used to."
11120-83 = "Shut up! Just shut your mouths! All of you!"
11120-84 = "..."
11120-85 = "We'll get a loan."
11120-86 = "You can't be serious, Aru! I thought your credit was in the dumpster!"
11120-87 = "Nuh-uh! My account's just been frozen because of a bounty!"
11120-88 = "Is that what happened...? Oh, now I remember. The Prefect Team did that."
11120-89 = "Those jerks... They just had to keep hounding us, didn't they? "
11120-90 = "Try explaining that to the bank. We'd be laughed right out of the lobby!"
11120-91 = "Shut up! We'll figure it out somehow!"
11120-92 = "..."
11120-93 = "Stupid Abydos twits. I said they hadn't seen the last of us, didn't I?!"
11120-94 = "We're just getting started!"
11120-96 = "..."
11120-97 = "Hmm. What in the world is she planning?"
11120-99 = "Next Episode;The Masked Swimsuit Gang! Part 1"

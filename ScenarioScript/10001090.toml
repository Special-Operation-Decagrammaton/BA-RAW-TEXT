[translation]
10001090-1 = "Episode 9;Back to the Secretariat"
10001090-2 = "Red Winter Academy Secretariat"
10001090-3 = "Heh heh... Power is good."
10001090-4 = "I get as many naps and snacks as I want! And the presidential chair is a bit small, but the cushion is so soft!"
10001090-5 = "I could get used to living like this. I'm in heaven!"
10001090-6 = "The only problem is...I still don't know where President Cherino is..."
10001090-7 = "Well, my people are looking for her, so I'm sure they'll catch her soon. Our academy may be big, but there are only so many places that little brat can hide. Hahaha!"
10001090-8 = "Now then, what's next on the agenda?"
10001090-9 = "I suppose I should have all those Cherino statues on campus changed into statues of me."
10001090-12 = "Terrible news, Great Leader!"
10001090-13 = "What's going on? I told you not to bother me until you find President Cherino!"
10001090-14 = "Well, um, you see, President... Ex-president Cherino is storming the secretariat with her forces."
10001090-15 = "Wh-What? She's coming here?!"
10001090-16 = "Wh-Wh-What should I do? Should I go out and greet her? Oh, and I should prepare a warm cup of her favorite hot cocoa!"
10001090-17 = "Uhhh... President Marina?"
10001090-18 = "H-Huh?"
10001090-19 = "Oh, right! I am the president now! She should be afraid of ME."
10001090-20 = "Heh. I don't know how that stubborn little brat managed to win anyone over, but they're no match for my State Guard! I'm not scared!"
10001090-21 = "...But, just curious, how many students are with Cherino? Like five or...?"
10001090-22 = "Uh, no. I don't have an exact head count, but it looks like there are hundreds of students behind Ex-president Cherino."
10001090-23 = "H-Hundreds? How the heck did she get so many people?"
10001090-24 = "The reports say the students of Spec Ops No. 227, the Knowledge Liberation Front, and the Labor Party are all among her ranks."
10001090-25 = "How'd she get all of them to be loyal to her?! That doesn't make any sense...!"
10001090-30 = "(I-I-I'm so screwed. Do I just give up the office and beg for forgiveness...?)"
10001090-31 = "(...No, that'd never work. I'm sure President Cherino is already planning the worst punishment for me that she can imagine...)"
10001090-32 = "(Besides, I worked so hard for this power... Now that I've tasted it, I can't bear to give it up!)"
10001090-35 = "...Prepare for battle."
10001090-36 = "Huh?"
10001090-37 = "They may have the numbers advantage, but they're just a disorganized mob of random students!"
10001090-38 = "We'll strike first and break up their formation! That's our way to victory!"
10001090-40 = "State guards, assemble! Charge forward and capture President Cherino!"

[translation]
10001090-1 = "ตอนที่ 9;ไปยังสำนักเลขาธิการอีกครั้ง"
10001090-2 = "สำนักเลขาธิการสหภาพเรดวินเทอร์"
10001090-3 = "ฮุฮุฮุ... อำนาจเป็นอะไรที่หอมหวานซะจริง"
10001090-4 = "ได้นอนกลางวันได้มากเท่าที่ต้องการ ถามยังกินของว่างได้อย่างไม่อั้นอีก!#nถึงเก้าอี้ประจำตำแหน่งจะเล็กไปหน่อย แต่ฉันก็ชอบเพราะเบาะรองนั่งมันนุ่มมาก!"
10001090-5 = "ชีวิตดีจังเลย คงไม่มีอะไรที่สบายไปกว่านี้แล้วล่ะ~"
10001090-6 = "แต่ว่า... การที่เรายังสืบร่องรอยของประธานเชริโน่ไม่ได้มันคาใจชะมัด..."
10001090-7 = "แต่เดี๋ยวก็คงจะถูกจับได้แล้วล่ะมั้ง ถึงสหภาพเรดวินเทอร์จะกว้างแค่ไหน#nแต่ที่ที่เด็กตัวกะเปี๊ยกจอมดื้อด้านคนนั้นจะยอมไปคงมีไม่กี่ที่หรอก ฮ่ะฮ่ะฮ่า!"
10001090-8 = "งั้นต่อไปทำอะไรดีนะ?"
10001090-9 = "อืม... ก่อนอื่นเปลี่ยนรูปปั้นในโรงเรียนให้เป็นรูปปั้นของเราก่อน..."
10001090-12 = "เกิดเรื่องใหญ่แล้วค่ะ!"
10001090-13 = "อะไรกันน่ะ? ฉันบอกแล้วไม่ใช่เหรอว่าอย่ารบกวนจนกว่าจะหาตัวประธานเชริโน่พบ!"
10001090-14 = "เอ่อ.. คือว่า... ประธานเชริโน่ที่หายตัวไปกับพวกนักเรียนกำลังบุกมาที่สำนักเลขาธิการค่ะ"
10001090-15 = "วะ.. ว่าไงนะ!? ท่านประธานเชริโน่น่ะเหรอ?"
10001090-16 = "ทะ.. ทำยังไงดีล่ะ? ต้องออกไปรับไหมนะ?#nหรือว่าต้องชงโกโก้ร้อนสักแก้วไว้ให้?"
10001090-17 = "เอ่อ... ท่านประธานมารินะ?"
10001090-18 = "เอ่อ... อื้ม?"
10001090-19 = "จริงสิ! ตอนนี้ฉันต่างหากที่เป็นประธาน! ไม่จำเป็นต้องกลัวอะไรสักหน่อย!"
10001090-20 = "ฮุฮุฮุ ถึงจะไม่รู้ว่าเด็กตัวกะเปี๊ยกจอมดื้อด้านนั่นไปโน้มน้าวนักเรียนมาเป็นพวกได้ยังไง#nแต่ที่ฉันมั่นใจก็คือ พวกนั้นไม่มีทางสู้กองกำลังป้องกันมารินะได้! ฉันไม่กลัวหรอก!"
10001090-21 = "แต่ก็ถามไว้หน่อยสิ... นักเรียนที่ติดตามประธานเชริโน่มามีกี่คนเหรอ?#nสัก 5 คนได้ไหม?"
10001090-22 = "ไม่ค่ะ ฉันไม่ได้นับมาอย่างละเอียด แต่ก็น่าจะมีหลายร้อยคนอยู่นะคะ"
10001090-23 = "ละ... หลายร้อยคน!? ไปเกณฑ์คนเยอะแยะแบบนั้นมาจากไหน?"
10001090-24 = "ตอนนี้นักเรียนที่ถูกพักการเรียนที่อยู่ในห้องพิเศษ 227 ในอาคารเรียนเก่า พวกหนอนหนังสือ#nจากชมรมแนวร่วมปลดปล่อยความรู้ แล้วก็กลุ่มแรงงานจากชมรมผู้รับจ้าง#nกำลังสนับสนุนประธาน#nเชริโน่อยู่ค่ะ"
10001090-25 = "ประธานเชริโน่ไปโน้มน้าวนักเรียนพวกนั้นมาได้หมดเลยเหรอ? เป็นไปไม่ได้...!"
10001090-30 = "(ตะ.. ตะ.. ตายแล้ว หรือว่าเราควรร้องขอให้ยกโทษ แล้วคืนเก้าอี้ประธานให้?)"
10001090-31 = "(ตามนิสัยของประธานเชริโน่แล้ว เธอไม่น่าจะยกโทษให้แน่ๆ#nโอ๊ยย จะต้องโดนลงโทษอย่างสาหัสแน่เลย...)"
10001090-32 = "(แต่ตำแหน่งประธานสภานักเรียนนี้ไม่ได้ได้มาง่ายๆ นะ... เราจะยอมแพ้แบบนี้ไม่ได้!)"
10001090-35 = "เตรียมจู่โจม..."
10001090-36 = "เอ๋?"
10001090-37 = "ถึงศัตรูจะมากันเยอะ แต่ก็เป็นแค่กลุ่มชนวุ่นวายที่ไม่มีระบบสั่งการอะไร"
10001090-38 = "ชัยชนะย่อมเป็นของผู้ที่เชี่ยวชาญกว่า! เราจะโจมตีก่อนเพื่อทำลายการจัดกองทัพของพวกนั้น!"
10001090-40 = "กองกำลังป้องกันมารินะ! ออกไปจู่โจมแล้วจับตัวประธานเชริโน่มาเลย!"

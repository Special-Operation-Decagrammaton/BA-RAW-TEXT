[translation]
10001090-1 = "第9話;再次前往事務局"
10001090-2 = "赤冬聯邦學園．事務局"
10001090-3 = "呵呵呵……原來如此。權力的滋味真的太甜美了。"
10001090-4 = "想睡多久就睡多久，想吃多少點心就吃多少。#n只有會長能坐的專屬椅，雖然有點小，但非常鬆軟，我很喜歡！"
10001090-5 = "如果是這種生活，要我享受幾輩子都沒問題。這就是天堂嗎……"
10001090-6 = "只是……有一件事讓我耿耿於懷，那就是潔莉諾會長至今仍下落不明……"
10001090-7 = "嘛，相信馬上就會抓到了吧。#n就算赤冬腹地再怎麼大，也大概能猜到那個固執的小矮子會去哪裡。哈哈哈！"
10001090-8 = "好了……接下來要做什麼呢？"
10001090-9 = "對了……先把設立在校內的銅像換成我的樣子──"
10001090-12 = "瑪麗娜會長，大事不好了！"
10001090-13 = "怎麼了？找到失蹤的潔莉諾會長了？"
10001090-14 = "那個，該說是找到了嗎……潔莉諾會長正帶著其他學生們朝著事務局湧來。"
10001090-15 = "什麼？潔莉諾會長來了？"
10001090-16 = "該，該，該怎麼辦？該出去迎接嗎？還是應該先準備能暖和身子的熱可可？"
10001090-17 = "那個……瑪麗娜會長？"
10001090-18 = "咦，嗯……？"
10001090-19 = "啊，是，是啊！現在我是會長！完全沒必要害怕！"
10001090-20 = "呵呵呵。雖然不知道那個固執的小矮子是怎麼說服其他學生的……#n但他現在沒了權力，在瑪麗娜親衛隊的面前就像是嬰兒一樣！沒什麼好怕的！"
10001090-21 = "……慎重起見，我問你，追隨潔莉諾會長的學生有多少？ #n五、六人左右嗎？"
10001090-22 = "不，雖然沒有仔細數過，但追隨潔莉諾會長的學生數量大約是……以數百人為單位。"
10001090-23 = "數，數百人！？那些人究竟是從哪跑來的！？"
10001090-24 = "舊校舍的「227號特別班」學生、「知識解放戰線」的圖書館員、甚至是「工務部」的勞動者都支持潔莉諾會長……"
10001090-25 = "潔莉諾會長把那些學生全都說服了？這怎麼可能……！"
10001090-30 = "（糟，糟，糟，糟糕了！現在是不是該道歉然後歸還會長之位比較好？）"
10001090-31 = "（不，以潔莉諾會長的個性，是絕對不會饒恕我的……#n　等著我的肯定是殘酷的肅清……）"
10001090-32 = "（而且，好不容易才得到學生會長的寶座……不能就這樣放棄！）"
10001090-35 = "……準備突擊。"
10001090-36 = "什麼？"
10001090-37 = "人數再多，在這麼短的時間內，也只是臨時東湊西拼出來的，缺乏指揮系統！"
10001090-38 = "先手必勝！如果我們先攻破防線的話，應該有勝算！"
10001090-40 = "瑪麗娜親衛隊，突擊！捉住潔莉諾會長！"

10001090-29 = "#all;hide"
10001090-30 = "3;마리나;08;(크, 크, 크, 큰일이야. 지금이라도 용서를 빌고 회장의 자리를 반납해야 하나?)\n#3;stiff\n#3;em;[속상함]\n#5;hide\n#3;closeup"
10001090-31 = "3;마리나;12;(……아니, 체리노 회장의 성격이라면 절대로 용서해주지 않을 거야. 분명 가혹한 숙청이 나를 기다리고 있겠지…….)\n#3;closeup"
10001090-32 = "3;마리나;08;(게다가 어떻게 얻은 학생회장의 자리인데…… 이대로 포기할 수는 없어!)\n#3;em;[!]\n#3;closeup"

10001090-37 = "3;마리나;01;그 수가 많다고는 하지만 적은 지휘체계도 없이 급조된 오합지졸일 터!\n#3;em;[!]"
10001090-38 = "3;마리나;03;선수 필승! 먼저 돌격하여 전열을 흩트리면 승기를 잡을 수 있다!"

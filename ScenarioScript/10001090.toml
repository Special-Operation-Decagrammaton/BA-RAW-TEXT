[translation]
10001090-1 = "#title;제9화;다시 사무국으로"
10001090-2 = "#place;붉은겨울 학원 사무국"
10001090-3 = "3;마리나;03;후후후…… 권력이란 정말 달콤한 것이구나.\n#3;a"
10001090-4 = "3;마리나;09;낮잠도 원하는 만큼 잘 수 있고, 간식도 실컷 먹을 수 있고! #n회장만 앉을 수 있는 전용 의자도 조금 작기는 하지만 방석이 푹신한 게 아주 마음에 들어!\n#3;em;[음표]"
10001090-5 = "3;마리나;09;이런 생활이라면 얼마든지 즐길 수 있겠어. 천국이 따로 없구나~."
10001090-6 = "3;마리나;01;다만…… 한 가지 마음에 걸리는 것은 체리노 회장의 행방이 아직도 묘연하다는 것뿐인데……."
10001090-7 = "3;마리나;11;뭐, 사람을 풀어놓았으니 금방 잡히겠지. 이 붉은겨울 학원이 넓다고는 하지만 그 고집불통 꼬맹이가 갈 만한 장소는 흔치 않으니까 말이야. 하하하!\n#3;em;[재잘]\n#3;hophop"
10001090-8 = "3;마리나;09;자, 그럼 다음에는 무얼 해볼까?\n#3;em;[음표]"
10001090-9 = "3;마리나;03;우선은 교내에 설치된 동상들을 이 몸의 모습으로 바꾸는 작업부터……"
10001090-10 = "#wait;1500"
10001090-11 = "5;친위대원 붉은겨울;01 \n#5;al\n#3;m1\n#wait;1000"
10001090-12 = "5;친위대원 붉은겨울;00;큰일입니다!\n#5;em;[!]"
10001090-13 = "3;마리나;05;무슨 일이냐? 실종된 체리노 회장을 찾기 전까지는 방해하지 말라고 말했을 텐데!\n#3;em;[빠직]\n#3;stiff"
10001090-14 = "5;친위대원 붉은겨울;00;저, 그게…… 실종되었던 체리노 회장이 학생들과 함께 사무국으로 몰려오고 있습니다."
10001090-15 = "3;마리나;12;뭐, 뭐라고? 체리노 회장님이?\n#3;em;[?!]\n#3;shake"
10001090-16 = "3;마리나;08;어, 어, 어떻게 해야지? 마중을 나가야 하나? #n아니면 몸을 덥힐 따듯한 코코아라도 미리 준비해 둬야 하나?\n#3;stiff\n#fontsize;50"
10001090-17 = "5;친위대원 붉은겨울;00;저…… 마리나 회장님?\n#5;em;[?]"
10001090-18 = "3;마리나;07;어, 어……?\n#3;stiff"
10001090-19 = "3;마리나;11;아, 그래! 지금은 이 몸이 회장이었지! 전혀 무서워할 필요가 없어!\n#3;em;[!]\n#3;hophop"
10001090-20 = "3;마리나;03;후후후. 그 고집불통 꼬맹이가 학생들을 어떻게 설득했는지는 몰라도 이 마리나 친위대의 군세 앞에서는 한 줌 낙엽에 불과할 것! 이 몸은 조금도 두렵지 않다!"
10001090-21 = "3;마리나;01;……그래도 혹시나 해서 묻는 건데, 체리노 회장을 따르는 학생의 수가 얼마나 되지? #n한 다섯 명쯤 되려나?\n#3;em;[반응]"
10001090-22 = "5;친위대원 붉은겨울;00;아닙니다. 정확히 세어보지는 않았지만 족히 수백 명 가까이 되는 학생들이 체리노 회장을 뒤따르고 있습니다."
10001090-23 = "3;마리나;12;수, 수백 명이나? 도대체 그 인원이 어디서 나왔는데?\n#3;em;[?!]\n#3;shake"
10001090-24 = "5;친위대원 붉은겨울;00;구교사 227호 특별반의 정학생들과 지식해방전선의 사서들, 그리고 용역부의 노동자들이 체리노 회장에게 가세했다고 합니다.\n#5;em;…"
10001090-25 = "3;마리나;08;체리노 회장이 그 학생들을 모두 설득했다고? 이 무슨 말도 안 되는……!\n#3;stiff"
10001090-26 = "3;마리나;08\n#3;m3\n#5;dr\n#wait;1000"

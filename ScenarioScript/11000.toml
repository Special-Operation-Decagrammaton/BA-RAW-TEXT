11000-211 = "Rin said securing the club room is paramount if they're to regain control of Sanctum Tower."
11000-212 = "I get that, but why is busywork like this falling on me?! I'm part of the prestigious student council of my academy!"
11000-214 = "*bang* *bang* *bang*"

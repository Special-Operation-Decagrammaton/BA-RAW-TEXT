[translation]
11000-5 = "[FF6666]……我々は望む、七つの[-][ruby=なげ][FF6666]嘆[-][/ruby][FF6666]きを。[-]"
11000-7 = "[FF6666]……我々は覚えている、ジェリコの[-][ruby=こそく][FF6666]古則[-][/ruby][FF6666]を。[-]"
11000-10 = "接続パスワード承認。"
11000-13 = "「シッテムの箱」へようこそ、[USERNAME]先生。"
11000-36 = "……私のミスでした。"
11000-37 = "私の選択、そしてそれによって招かれたこの全ての状況。"
11000-45 = "結局、この結果にたどり着いて初めて、あなたの方が正しかったことを悟るだなんて……。"
11000-50 = "……今更図々しいですが、お願いします。"
11000-51 = "[USERNAME]先生。"
11000-52 = "きっと私の話は忘れてしまうでしょうが、それでも構いません。"
11000-53 = "何も思い出せなくても、おそらくあなたは同じ状況で、同じ選択をされるでしょうから……。"
11000-56 = "ですから……大事なのは経験ではなく、選択。"
11000-57 = "あなたにしかできない選択の数々。"
11000-71 = "責任を負う者について、話したことがありましたね。"
11000-72 = "あの時の私には分かりませんでしたが……。今なら理解できます。"
11000-73 = "大人としての、責任と義務。そして、その延長線上にあった、あなたの選択。"
11000-74 = "それが意味する心延えも。"
11000-75 = "……。"
11000-76 = "ですから、先生。"
11000-77 = "私が信じられる大人である、あなたになら、"
11000-78 = "この[ruby=ね]捻[/ruby]じれて歪んだ先の終着点とは、また別の結果を……。"
11000-79 = "そこへ繋がる選択肢は……きっと見つかるはずです。"
11000-82 = "だから先生、どうか……。"
11000-85 = "……い。"
11000-86 = "……先生、起きてください。"
11000-87 = "[USERNAME]先生！！"
11000-89 = "連邦生徒会室・ロビー"
11000-91 = "……。"
11000-92 = "[s] \"……？\""
11000-93 = "少々待っていてくださいと言いましたのに、お疲れだったみたいですね。#nなかなか起きないほど熟睡されるとは。"
11000-94 = "……夢でも見られていたようですね。ちゃんと目を覚まして、集中してください。"
11000-95 = "もう一度、あらためて今の状況をお伝えします。"
11000-96 = "私は[ruby=なながみ]七神[/ruby]リン、学園都市「キヴォトス」の連邦生徒会所属の幹部です。"
11000-97 = "そしてあなたはおそらく、私たちがここに呼び出した先生……のようですが。"
11000-98 = "……ああ。推測形でお話したのは、私も先生がここに来た経緯を詳しく知らないからです。"
11000-99 = "……。"
11000-100 = "混乱されてますよね。分かります。"
11000-101 = "こんな状況になってしまったこと、[ruby=いかん]遺憾[/ruby]に思います。でも今はとりあえず、私についてきてください。"
11000-102 = "どうしても、先生にやっていただかなくてはいけない事があります。"
11000-103 = "……。"
11000-104 = "学園都市の命運をかけた大事なこと……ということにしておきましょう。"
11000-106 = "[ns] ついていく。"
11000-111 = "ウィイイイイイイン――"
11000-114 = "「キヴォトス」へようこそ。先生。"
11000-115 = "キヴォトスは数千の学園が集まってできている巨大な学園都市です。これから先生が働くところでもあります。"
11000-116 = "きっと先生がいらっしゃったところとは色々な事が違っていて、最初は慣れるのに苦労するかもしれませんが……。"
11000-117 = "でも先生なら、それほど心配しなくてもいいでしょう。"
11000-118 = "あの連邦生徒会長が、お選びになった方ですからね。"
11000-119 = "……それは後でゆっくり説明することにして。"
11000-120 = "（チン）"
11000-122 = "レセプションルーム"
11000-123 = "（ざわざわ……）"
11000-124 = "ちょっと待って！代行！見つけた、待ってたわよ！連邦生徒会長を呼んできて！"
11000-125 = "……うん？隣の大人の方は？"
11000-126 = "首席行政官。お待ちしておりました。"
11000-127 = "連邦生徒会長に会いに来ました。風紀委員長が、今の状況について納得のいく回答を要求されています。"
11000-130 = "あぁ……面倒な人たちに捕まってしまいましたね。"
11000-131 = "こんにちは、各学園からわざわざここまで訪問してくださった生徒会、風紀委員会、その他時間を持て余している皆さん。"
11000-132 = "こんな暇そ……大事な方々がここを訪ねてきた理由は、よく分かっています。"
11000-133 = "今、学園都市に起きてる混乱の責任を問うために……でしょう？"
11000-134 = "そこまで分かってるなら何とかしなさいよ！連邦生徒会なんでしょ！"
11000-135 = "数千もの学園自治区が混乱に陥ってるのよ！この前なんか、うちの学校の風力発電所がシャットダウンしたんだから！"
11000-137 = "連邦矯正局で停学中の生徒たちについて、一部が脱出したという情報もありました。"
11000-138 = "スケバンのような不良たちが、登校中のうちの生徒たちを襲う頻度も、最近急激に高くなりました。#n治安の維持が難しくなっています。"
11000-139 = "戦車やヘリコプターなど、出所の分からない武器の不法流通も2000%以上増加しました。#nこれでは正常な学園生活に支障が生じてしまいます。"
11000-141 = "……。"
11000-142 = "こんな状況で連邦生徒会長は何をしているの？どうして何週間も姿を見せないの？#n今すぐ会わせて！"
11000-143 = "……。"
11000-144 = "連邦生徒会長は今、席におりません。正直に言いますと、行方不明になりました。"
11000-146 = "……え！？"
11000-147 = "……！！"
11000-148 = "やはりあの噂は……。"
11000-150 = "結論から言うと「サンクトゥムタワー」の最終管理者がいなくなったため、今の連邦生徒会は行政制御権を失った状態です。"
11000-151 = "認証を迂回できる方法を探していましたが……先ほどまで、そのような方法は見つかっていませんでした。"
11000-152 = "それでは、今は方法があるということですか、首席行政官？"
11000-153 = "はい。"
11000-154 = "この先生こそが、フィクサーになってくれるはずです。"
11000-156 = "！？"
11000-157 = "！"
11000-158 = "この方が？"
11000-159 = "[s] \"私が？\""
11000-160 = "ちょっと待って。そういえばこの先生はいったいどなた？どうしてここにいるの？"
11000-161 = "キヴォトスではないところから来た方のようですが……先生だったのですね。"
11000-163 = "はい。こちらの[USERNAME]先生は、#nこれからキヴォトスの先生として働く方であり、連邦生徒会長が特別に指名した人物です。"
11000-164 = "行方不明になった連邦生徒会長が指名……？ますますこんがらがってきたじゃないの……。"
11000-165 = "[s] みんなに挨拶する。"
11000-166 = "こ、こんにちは、先生。私はミレニアムサイエンススクールの……"
11000-167 = "い、いや、挨拶なんて今はどうでもよくて……！"
11000-168 = "そのうるさい方は気にしなくていいです。続けますと……"
11000-169 = "誰がうるさいって！？わ、私は[ruby=はやせ]早瀬[/ruby]ユウカ！覚えておいてください、先生！"
11000-170 = "[s] \"よろしくね。\""
11000-172 = "……先生は元々、連邦生徒会長が立ち上げた、ある部活の担当顧問としてこちらに来ることになりました。"
11000-173 = "連邦捜査部「シャーレ」。"
11000-174 = "単なる部活ではなく、一種の超法規的機関。#n連邦組織のため、キヴォトスに存在するすべての学園の生徒たちを、制限なく加入させることすらも可能で、"
11000-175 = "各学園の自治区で、制約無しに戦闘活動を行うことも可能です。"
11000-176 = "なぜこれだけの権限を持つ機関を、連邦生徒会長が作ったのかは分かりませんが……。"
11000-177 = "シャーレの部室はここから約30km離れた外郭地区にあります。#n今はほとんど何もない建物ですが、連邦生徒会長の命令で、そこの地下に「とある物」を持ち込んでいます。"
11000-178 = "先生を、そこにお連れしなければなりません。"
11000-179 = "モモカ、シャーレの部室に直行するヘリが必要なんだけど……。"
11000-180 = "シャーレの部室？……ああ、外郭地区の？そこ、今大騒ぎだけど？"
11000-181 = "大騒ぎ……？"
11000-182 = "矯正局を脱出した停学中の生徒が騒ぎを起こしたの。そこは今戦場になってるよ。"
11000-183 = "……うん？"
11000-184 = "連邦生徒会に恨みを抱いて、地域の不良たちを先頭に、周りを焼け野原にしてるみたいなの。#n巡航戦車までどっかから手に入れてきたみたいだよ？"
11000-185 = "それで、どうやら連邦生徒会所有のシャーレの建物を占拠しようとしてるらしいの。まるでそこに何か大事なものでもあるみたいな動きだけど？"
11000-186 = "……。"
11000-187 = "まあでも、もうとっくにめちゃくちゃな場所なんだから、別に大した事な……あっ、先輩、お昼ごはんのデリバリーが来たから、また連絡するね！"
11000-188 = "（ブツッ）"
11000-189 = "……。"
11000-190 = "（プルプル）……。"
11000-191 = "[s1] \"大丈夫？\"\n[s2] \"深呼吸でもする？\""
11000-192 = "……だ、大丈夫です。……少々問題が発生しましたが、大したことではありません。"
11000-193 = "……だ、大丈夫です。……少々問題が発生しましたが、大したことではありません。"
11000-195 = "（じー）"
11000-196 = "……？"
11000-197 = "な、何？どうして私たちを見つめてるの？"
11000-198 = "ちょうどここに各学園を代表する、立派で暇そうな方々がいるので、私は心強いです。"
11000-199 = "……えっ？"
11000-200 = "キヴォトスの正常化のために、暇を持て余した皆さんの力が今、切実に必要です。行きましょう。"
11000-202 = "ちょ、ちょっと待って！？ど、どこに行くのよ！？"
11000-205 = "D.U.外郭地区・シャーレの部室付近"
11000-206 = "（ヒュオオオオーーー！！）"
11000-207 = "（ドカアアァァァァン！）"
11000-208 = "な、なに、これ！？"
11000-209 = "（タタタタタタッ！！）"
11000-210 = "なんで私たちが不良たちと戦わなきゃいけないの！！"
11000-211 = "サンクトゥムタワーの制御権を取り戻すためには、あの部室の奪還が必要ですから……。"
11000-212 = "それは聞いたけど……！私これでも、うちの学校では生徒会に所属してて、それなりの扱いなんだけど！なんで私が……！"
11000-214 = "（パパパパパッ！）"
11000-215 = "いっ、痛っ！！痛いってば！！あいつら違法JHP弾を使ってるじゃない！？"
11000-216 = "伏せてください、ユウカ。それに、ホローポイント弾は違法指定されてはいません。"
11000-217 = "うちの学校ではこれから違法になるの！傷跡が残るでしょ！"
11000-218 = "今は先生が一緒なので、その点に気を付けましょう。"
11000-219 = "先生を守ることが最優先。#nあの建物の奪還はその次です。"
11000-220 = "ハスミさんの言う通りです。先生はキヴォトスではないところから来た方ですので……。"
11000-221 = "私たちとは違って、弾丸一つでも生命の危機にさらされる可能性があります。その点ご注意を！"
11000-222 = "分かってるわ。先生、先生は戦場に出ないでください！私たちが戦ってる間は、この安全な場所にいてくださいね！"
11000-223 = "[s3] \"私が指揮する、任せて。\"\n[s4] \"今から私の指示に従って。\""
11000-224 = "え、ええっ？戦術指揮をされるんですか？まあ……先生ですし…… 。"
11000-225 = "え、ええっ？戦術指揮をされるんですか？まあ……先生ですし…… 。"
11000-226 = "分かりました。これより先生の指揮に従います。"
11000-227 = "生徒が先生の言葉に従うのは自然なこと、ですね。よろしくお願いします。"
11000-229 = "よし、じゃあ行ってみましょうか！"

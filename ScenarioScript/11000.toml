11000-122 = "Reception Room"
11000-123 = "*murmuring*"
11000-124 = "There you are, Acting President! We've been waiting! Get the real president in here already!"
11000-125 = "Huh? Who's that adult next to you?"
11000-126 = "I've been waiting to see you, Chief Officer."
11000-127 = "I'm here to meet with the General Student Council president. The head prefect is demanding answers."
11000-130 = "Well... This timing is rather inconvenient."
11000-131 = "Hello, guests that represent neighboring academies' student councils, disciplinary boards, and those who otherwise have too much time on their hands."
11000-132 = "I am well aware why you idle wanderers—I mean, important representatives—have come here today."
11000-133 = "You're here to hold us responsible for the fuss happening in the Academy City. Are you not?"
11000-134 = "If you're well aware, then do something! You represent the General Student Council!"
11000-135 = "Thousands of academy districts are in panic! Not to mention, our academy's wind generator shut down just a few days ago!"
11000-137 = "We've also received intel that a few suspended students escaped the Federal Corrections Bureau's custody."
11000-138 = "There has been a sharp increase in the number of thugs attacking our students on their way to school. Public safety is not being properly enforced."
11000-139 = "Illegal distribution of tanks, helicopters, and other unknown weapons has increased by over 2000 percent. At this rate, ordinary school life in Kivotos will become a thing of the past."
11000-141 = "..."
11000-142 = "And what's the General Student Council president doing during such a sorry state of affairs? I demand to see her right this instant!"
11000-143 = "..."
11000-144 = "The president is not here at the moment. To be frank, she's gone missing."
11000-146 = "What?!"
11000-147 = "...!"
11000-148 = "So the rumors were true..."
11000-150 = "Allow me to cut to the chase. The General Student Council has no authority because the top administrator of Sanctum Tower has gone missing."
11000-151 = "We had been searching for a way to bypass verification, all to no avail...until now."
11000-152 = "You mean you've found a way, Chief Officer?"
11000-153 = "That is correct."
11000-154 = "Sensei here is the answer to our problems."
11000-156 = "...?!"
11000-157 = "!"
11000-158 = "This person?"
11000-159 = "[s] \"Me?\""
11000-160 = "Hold up. Who is this \"Sensei\" you're talking about? What are they doing here in the first place?"
11000-161 = "They don't seem to be from Kivotos...A teacher would make sense."
11000-163 = "This is [USERNAME] Sensei. Not only are they going to be teaching in Kivotos, but they've also been personally selected by the General Student Council president."
11000-164 = "Chosen by the missing president...? Things are making less and less sense..."
11000-165 = "[s] Greet everyone with a smile."
11000-166 = "R-Right. Nice to meet you, Sensei. I'm Millennium Science School's..."
11000-167 = "W-Wait, forget introductions...!"
11000-168 = "Feel free to ignore that annoying girl. Moving on—"
11000-169 = "Who are you calling annoying?! I-I'm Hayase Yuuka! Make sure you remember that name, Sensei!"
11000-170 = "[s] \"Nice to meet you too.\""
11000-172 = "...You're here to serve as the advisor for a club that was formed by the General Student Council president."
11000-173 = "The Federal Investigation Club: Schale."
11000-174 = "This isn't your average club—more like a type of extrajudicial organization. Since it's a federal club, you'll be allowed to register students from any academy in Kivotos."
11000-175 = "You're also permitted to conduct battle activities in each academy district without restriction."
11000-176 = "However, I do not know why the president would create an organization with this much power."
11000-177 = "The Schale club room is about 30 kilometers from here. The building is currently empty, but we had to put something in the basement at the president's request."
11000-178 = "And it's my job to take you there."
11000-179 = "Momoka. I need a helicopter to take us to the Schale club room."
11000-180 = "The Schale club room? ...Oh. The one in the outskirts? Things are kind of crazy over there right now."
11000-181 = "What do you mean, \"crazy\"?"
11000-182 = "A suspended student escaped from the Corrections Bureau and is wreaking havoc. It's a battlefield over there right now!"
11000-183 = "What?"
11000-184 = "They rallied all the thugs in the area and are destroying everything in their path to get revenge on the General Student Council. I hear they've even got a Crusader Tank!"
11000-185 = "They must be trying to occupy the Schale building because it belongs to the General Student Council. Maybe they think there's something valuable inside."
11000-186 = "..."
11000-187 = "Oh, well. The city's already a dump, so I don't think it'll make that much of a difference—Oh, great! The food I ordered is here. I'll talk to you later!"

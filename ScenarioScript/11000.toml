[translation]
11000-5 = "[FF6666]……我們盼望，七聲歎息。[-]"
11000-7 = "[FF6666]……我們記得，耶利哥的古則。[-]"
11000-10 = "連線密碼核准。"
11000-13 = "歡迎來到「希迪姆的箱子」，[USERNAME]老師。"
11000-36 = "……是我的失誤。"
11000-37 = "我的選擇，以及因此招致的所有情況。"
11000-45 = "最終，到達了這個結果，才領悟到你是對的……"
11000-50 = "……事到如今雖然很厚顏無恥，但是拜託你了。"
11000-51 = "[USERNAME]老師。"
11000-52 = "你或許會忘記我說的話，但那樣也沒關係。"
11000-53 = "即使什麼也想不起來，在面對相同的情況時，你也會做出相同的選擇吧……"
11000-56 = "所以……重要的不是經驗，而是選擇。"
11000-57 = "只有你才能做出的各種選擇。"
11000-71 = "關於背負責任之人的話題，有和你討論過對吧。"
11000-72 = "雖然當時的我還不清楚……不過現在能夠理解了。"
11000-73 = "身為大人的責任和義務。以及，在那條延長線上的，你的選擇。"
11000-74 = "還有它所代表的想法。"
11000-75 = "……"
11000-76 = "所以，老師。"
11000-77 = "如果是你這個我能相信的大人的話，"
11000-78 = "與這個扭曲變形的終點，不同的結果……"
11000-79 = "連接那裡的選項……你一定能找到的。"
11000-82 = "所以老師，請務必……"
11000-85 = "……醒。"
11000-86 = "……老師，請醒醒。"
11000-87 = "[USERNAME]老師！！"
11000-89 = "聯邦學生會室．大廳"
11000-91 = "……"
11000-92 = "[s]「……？」"
11000-93 = "我只說了稍等一下，看來你似乎很疲倦呢。#n沒想到會熟睡到這麼難叫醒。"
11000-94 = "……好像還做夢了呢。請好好睜開眼睛，集中精神。"
11000-95 = "再重新說明一次現在的狀況。"
11000-96 = "我是七神琳，學園都市「奇普托斯」的聯邦學生會所屬幹部。"
11000-97 = "而你應該就是被我們叫來這裡的老師……對吧。"
11000-98 = "……啊啊。之所以用推測的口吻，是因為我也不清楚老師來到這裡的詳細經過。"
11000-99 = "……"
11000-100 = "你很混亂吧。我明白。"
11000-101 = "會變成這種狀況，我深感遺憾。但現在，請先跟我來。"
11000-102 = "有件無論如何都得請老師去做的事。"
11000-103 = "……"
11000-104 = "攸關學園都市命運的重要事項……也可以這麼說吧。"
11000-106 = "[ns] 跟上去"
11000-111 = "（嗚咿咿咿咿咿──）"
11000-114 = "歡迎來到「奇普托斯」。老師。"
11000-115 = "奇普托斯是數千所學園聚集而成的巨大學園都市。也是今後老師工作的地方。"
11000-116 = "一定和老師來的地方有很多不同之處，剛開始可能很難適應……"
11000-117 = "但如果是老師的話，應該不用太擔心吧。"
11000-118 = "因為是那位聯邦學生會長選擇的人啊。"
11000-119 = "……那個之後會慢慢跟你說明的。"
11000-120 = "（叮）"
11000-122 = "招待室"
11000-123 = "（吵吵嚷嚷……）"
11000-124 = "等等！代理！找到你了，等你很久了！叫聯邦學生會長來！"
11000-125 = "……嗯？你旁邊的大人是？"
11000-126 = "首席行政官。恭候多時了。"
11000-127 = "我是來見聯邦學生會長的。風紀委員長要求對現在的狀況給出一個合理的答覆。"
11000-130 = "啊……被麻煩的人抓住了呢。"
11000-131 = "你們好，從各個學園特地來到此處的學生會、風紀委員會，以及其他有空閒時間的各位。 "
11000-132 = "你們這些悠閒……重要的人來這裡的原因我很清楚。"
11000-133 = "是為了追究現在學園都市發生混亂的責任……對吧？"
11000-134 = "這麼清楚的話，就想想辦法吧！你們不是聯邦學生會嗎！"
11000-135 = "幾千個學園自治區都陷入了混亂哦！不久前，我們學園的風力發電站還停止運作了！"
11000-137 = "還有情報顯示，有一部分在聯邦矯正局停學中的學生們逃脫了。 "
11000-138 = "太妹一類的不良分子襲擊上學途中的學生們的頻率也急遽增加。#n維持治安越來越困難了。"
11000-139 = "戰車和直升機之類來歷不明武器的非法流通也增加了2000%以上。#n這樣連正常的校園生活都會有障礙了。"
11000-141 = "……"
11000-142 = "在這種情況下，聯邦學生會長在做什麼？為什麼好幾個星期沒露面了？ #n現在就讓我見她！"
11000-143 = "……"
11000-144 = "聯邦學生會長現在不在。老實說，是下落不明了。"
11000-146 = "……咦！？"
11000-147 = "……！！"
11000-148 = "果然那個傳聞是……"
11000-150 = "就結論來說，由於「聖所之塔」的最終管理者消失，現在聯邦學生會處於失去行政控制權的狀態。"
11000-151 = "一直在尋找繞過認證的方法……但直到剛才，都還沒找到那樣的方法。"
11000-152 = "那麼，是現在有辦法了的意思嗎，首席行政官？"
11000-153 = "是的。 "
11000-154 = "這位老師應該能成為調停者才對。"
11000-156 = "！？"
11000-157 = "！"
11000-158 = "這個人嗎？"
11000-159 = "[s]「我嗎？」"
11000-160 = "先等一下。話說回來這位老師到底是誰？為什麼會在這裡？"
11000-161 = "似乎是從奇普托斯以外的地方來的……原來是老師啊。"
11000-163 = "是的。這位[USERNAME]老師， #n從現在起將擔任奇普托斯的老師，是聯邦學生會長特別指名的人物。"
11000-164 = "下落不明的聯邦學生會長指定的……？這不是越來越亂了嗎……"
11000-165 = "[s] 向大家打招呼"
11000-166 = "你，你好，老師。我是千年科學學園的……"
11000-167 = "不，不是，問好什麼的現在不重要……！"
11000-168 = "不用在意那個吵鬧的人。接下來……"
11000-169 = "你說誰吵鬧啊！？我，我是早瀨優香！請好好記住，老師！"
11000-170 = "[s]「請多指教。」"
11000-172 = "……老師原本是來這裡擔任某個聯邦學生會長創立的社團的顧問。"
11000-173 = "聯邦搜查部「夏萊」。"
11000-174 = "不是單純的社團，而是超越法規的機構。 #n因為是聯邦組織，所以奇普托斯所有學園的學生都能無限制地加入。"
11000-175 = "在各個學園自治區內，都可以不受限制地進行戰鬥活動。"
11000-176 = "雖然不知道聯邦學生會長為何建立了擁有如此權限的機構……"
11000-177 = "夏萊的社團辦公室位於距此約30km的外圍地區。 #n雖然現在是個幾乎什麼都沒有的建築，但根據聯邦學生會長的命令，在那裡的地下有著「某個東西」。"
11000-178 = "必須要把老師帶去那裡才行。"
11000-179 = "桃香，我需要一架直達夏萊社團辦公室的直升機……"
11000-180 = "夏萊社團辦公室？……啊啊，外圍地區那個？那裡現在亂成一團哦？"
11000-181 = "亂成一團……？"
11000-182 = "從矯正局逃出來的停學學生引起了騷動，那裡現在變成戰場了唷。"
11000-183 = "……嗯？"
11000-184 = "好像是對聯邦學生會懷恨在心，以地區的不良分子為首，企圖將周圍燒成廢墟。 #n好像還不知道從哪弄來了一輛巡航戰車哦？"
11000-185 = "而且，似乎想要佔領聯邦學生會持有的夏萊大樓。他們的行動就好像那裡有著什麼重要的東西一樣哦？"
11000-186 = "……"
11000-187 = "不過，那裡早就已經是個亂七八糟的地方了，也沒什麼大不了……#n啊，前輩，午餐的外送來了，之後再聯絡吧！"
11000-188 = "（噗滋）"
11000-189 = "……"
11000-190 = "（微微發抖）……"
11000-191 = "[s1]「沒事吧？」\n[s2]「要不要深呼吸？」"
11000-192 = "……沒，沒事。……雖然發生了一些問題，不過沒什麼大不了的。"
11000-193 = "……沒，沒事。……雖然發生了一些問題，不過沒什麼大不了的。"
11000-195 = "（盯──）"
11000-196 = "……？"
11000-197 = "怎，怎麼了？為什麼一直盯著我們？"
11000-198 = "這裡正好有代表各個學園的優秀閒人，我放心了。"
11000-199 = "……咦？"
11000-200 = "為了讓奇普托斯恢復正常，現在迫切需要各位閒人的力量。我們走吧。"
11000-202 = "等，等一下！？要，要去哪裡啊！？"
11000-205 = "D.U.外圍區域．夏萊社團辦公室附近"
11000-206 = "（咻喔喔喔喔──！）"
11000-207 = "（咚喀啊啊！）"
11000-208 = "那，那是，什麼！？"
11000-209 = "（噠噠噠噠噠噠──！）"
11000-210 = "為什麼我們得要跟不良分子戰鬥啊！！"
11000-211 = "為了取得聖所之塔的控制權，奪回那間社團辦公室是必要的……"
11000-212 = "那個我已經聽過了……！但就算這樣，我仍然是隸屬於我們學校的學生會，應該要有相應的待遇才對！為什麼我會……！"
11000-214 = "（啪啪啪啪啪！）"
11000-215 = "好，好痛！！痛死了！！這些傢伙是不是在使用違法的JHP子彈啊！？"
11000-216 = "請趴下，優香。而且，使用中空彈並沒有被列為非法行為。"
11000-217 = "之後在我們學園就是非法了！會留下疤痕的！"
11000-218 = "現在是和老師在一起，這點要特別注意。"
11000-219 = "保護老師是第一優先。 #n奪回那棟建築物是其次。"
11000-220 = "蓮實同學說得沒錯。因為老師是從奇普托斯以外的地方來的……"
11000-221 = "所以和我們不一樣，即便只是一顆子彈有造成生命危險的可能性。請注意這點！"
11000-222 = "我知道。老師，請不要出現在戰場上！我們戰鬥的時候，請待在這個安全的地方吧！"
11000-223 = "[s3]「我來指揮，交給我吧。」\n[s4]「現在按照我的指示行動吧。」"
11000-224 = "咦，咦咦？你要指揮戰術嗎？嘛……畢竟是老師……"
11000-225 = "咦，咦咦？你要指揮戰術嗎？嘛……畢竟是老師……"
11000-226 = "我明白了。從現在開始聽從老師的指揮。"
11000-227 = "學生聽老師的話也是很自然的，對吧。請多指教。"
11000-229 = "好，那就出發吧！"

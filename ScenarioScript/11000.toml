11000-92 = "[s] \"...?\""
11000-93 = "You must've been exhausted. I didn't expect you to fall asleep while waiting—let alone have trouble waking up."
11000-94 = "You must have been having a dream. Anyway, gather yourself and focus..."
11000-95 = "Let me explain the current situation again."
11000-96 = "My name is Nanagami Rin, an officer of the General Student Council in the Academy City of Kivotos."
11000-97 = "And you're the teacher that we have summoned here...or so it would seem."
11000-98 = "Pardon my uncertainty. I only say that because I don't fully understand how you got here."
11000-99 = "..."
11000-100 = "I understand that this must be very confusing for you."
11000-101 = "My apologies. However, I would like you to follow me for now."
11000-102 = "There's something I need you to do."
11000-103 = "..."
11000-104 = "Let's just say that it's a grave matter that could determine the very fate of the Academy City."
11000-106 = "[ns] Follow her."
11000-111 = "*whirring*"
11000-114 = "Welcome to Kivotos, Sensei."
11000-115 = "Kivotos is a massive city, home to thousands of different academies. This is where you'll be working from now on."
11000-116 = "I imagine it's very different from the place you call home. You might find it difficult to get acclimated at first..."
11000-117 = "...but something tells me that you'll be just fine."
11000-118 = "After all, you were chosen by the General Student Council president."
11000-119 = "We can leave the rest of the details for later."

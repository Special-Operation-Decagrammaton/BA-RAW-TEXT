11000-215 = "โอ๊ย เจ็บนะ! บอกว่าเจ็บยังไงล่ะ! เจ้าพวกนี้ใช้กระสุน JHP ผิดกฎหมายอยู่นี่นา?!!"
11000-216 = "ไปซ่อนตัวก่อนเถอะค่ะยูกะ อีกอย่าง... กระสุนหัวรู JHP ไม่เคยถูกลงทะเบียนว่าผิดกฎหมายด้วยค่ะ"
11000-217 = "แต่มันผิดกฎหมายที่โรงเรียนเราแล้วนะ! ยิงแล้วมันเกิดแผลเป็นไม่ใช่รึไง!"
11000-218 = "ตอนนี้คนที่เราต้องให้ความสนใจก็คือคุณครูค่ะ"
11000-219 = "เราต้องคุ้มกันคุณครูให้ปลอดภัยก่อน ส่วนการชิงอาคารนั้นกลับมาเอาไว้เป็นเรื่องหลังจากนี้#nเถอะค่ะ"
11000-220 = "คุณฮาสุมิพูดถูกนะคะ เพราะคุณครูมาจากที่อื่นที่ไม่ใช่คิโวทอส..."
11000-221 = "คุณครูไม่ได้เป็นเหมือนพวกเรา กระสุนนัดเดียวอาจเสี่ยงต่อชีวิตได้เลยนะคะ ห้ามลืมสิ่งนี้เด็ดขาด!"
11000-222 = "ฉันรู้น่า คุณครูจะไปในสนามรบนั่นไม่ได้นะคะ! ซ่อนอยู่ในที่ปลอดภัยตรงนี้ระหว่างที่พวกเรา#nออกไปต่อสู้เถอะค่ะ!"
11000-223 = "[s3] \"ครูจะสั่งการเอง ไว้ใจได้เลย\" \n[s4] \"ทำตามที่ครูบอกเถอะ\""
11000-224 = "หืม? จะวางกลยุทธ์แล้วสั่งการเองเหรอคะ? จริงๆ ก็เข้าใจได้เพราะเป็นคุณครู... แต่ว่า..."
11000-225 = "หืม? จะสั่งการเองเหรอคะ? จริงๆ ก็เข้าใจได้เพราะเป็นคุณครู... แต่ว่า..."
11000-226 = "เข้าใจแล้วค่ะ จากนี้พวกเราจะทำตามคำสั่งของคุณครูค่ะ"
11000-227 = "หน้าที่ของเราคือการฟังคำสั่งของคุณครูอยู่แล้ว งั้นฝากตัวด้วยนะคะ"

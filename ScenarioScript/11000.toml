11000-51 = "[USERNAME] Sensei."
11000-52 = "You'll forget these words, but it won't matter."
11000-53 = "Even without your memories, you'll probably make the same decision under the same circumstances..."
11000-56 = "Which is why...what matters are the choices we make, not our past experiences."
11000-57 = "There are choices only you can make."

[translation]
10019040-10 = "ตรวจสอบพบผู้พิทักษ์หอคอยแห่งที่ 4 ที่ด้านหน้า"
10019040-11 = "ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ! ด้วยความเชื่อมั่นและความองอาจ!"
10019040-15 = "ค่ะ <สควอด> ทุกๆ คน! กรุณาเข้าสมทบด้วยค่ะ!"
10019040-23 = "เข้าใจแล้ว นอกจากจะใช้ให้เป็นฝ่ายป้องกัน ยังใช้ให้เป็นกองกำลังโจมตีอีกแบบนี้..."
10019040-24 = "แต่ก็นะ ไม่มีปัญหาหรอก ลุยละนะ"
10019040-40 = "...จะเริ่มแล้วนะคะ"

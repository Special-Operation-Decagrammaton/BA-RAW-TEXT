[translation]
2004103-1 = "轉運站"
2004103-7 = "好的，這些就是全部了。#n話說回來，這個數量真驚人呢……"
2004103-8 = "（莉央寄來的包裹數量比想像中還多……）"
2004103-9 = "難道是打算開個人工坊嗎？#n哈哈哈！沒有沒有，我開玩笑的啦。"
2004103-10 = "那再麻煩幫我蓋個章囉！"
2004103-12 = "（接著等到了跟莉央約好的晚上……）"
2004103-23 = "你好，老師。#n我沒有遲到吧？"
2004103-24 = "首先……嗯，我應該先跟老師道個歉才對。"
2004103-25 = "[s]「嗯？為什麼突然要道歉？」"
2004103-26 = "我在來的路上想了很多……"
2004103-27 = "……總覺得要這麼做才行。"
2004103-28 = "[s]「哎呀，我們莉央也長大了呢。真了不起。」"
2004103-29 = "請，請不要那樣捉弄我……"
2004103-30 = "還有過來的途中，我為了避免受到追蹤或身分暴露……"
2004103-31 = "就以駭入的方式，干擾了所有的交通信號和監視器。"
2004103-32 = "這樣就不會有人看到我來夏萊了。"
2004103-33 = "[s]「……哎呀，我們莉央也『稍微』長大了呢。我會為你加油的……」"
2004103-34 = "……我不太明白老師現在的這個反應。"
2004103-35 = "總之謝謝你，老師。#n因為想做的事情增加，祕密基地需要的零件也變多了。"
2004103-36 = "例如改良會料理的前衛君，以及維修電腦或分析試劑等等……"
2004103-37 = "因此我需要高性能的均溫板和IC抑制器。"
2004103-38 = "隨著裝置數量變多，冷卻效率的重要性也日漸增加。#n而在最近進行的研究中，有些需要分析的離子溶液──"
2004103-40 = "（之後莉央又繼續說明著難以聽懂的事）"
2004103-41 = "（雖然可能只是錯覺，但莉央看起來似乎莫名的開心……）"
2004103-43 = "……總而言之，我目前需要對大量零件進行替換，但是又沒辦法直接訂貨。"
2004103-44 = "畢竟這很可能會導致祕密基地的位置曝光。"
2004103-45 = "[s]「所以才會把夏萊當成轉運站啊……」"
2004103-46 = "……是的。#n對不起，老師。"
2004103-47 = "[s]「話說你有祕密基地？」"
2004103-48 = "沒錯，而且不止一個，在很多地方都有。"
2004103-49 = "雖然現在待在位置最好的地點……"
2004103-50 = "不過要是有什麼萬一，我也做好了移動的準備。"
2004103-51 = "一旦位置曝光，隨時都能用AMAS移動到下個祕密基地。"
2004103-52 = "[s]「那樣不會很辛苦嗎？」"
2004103-53 = "說不辛苦是騙人的……"
2004103-54 = "但這麼做是合理的。"
2004103-55 = "嗯？看起來很沒效率？"
2004103-56 = "……這麼說確實沒錯。"
2004103-57 = "我曾經跟英美討論過這個問題。"
2004103-58 = "我似乎……可以為了合理而放棄效率。"
2004103-59 = "而英美則與我相反，可以為了效率而放棄合理。"
2004103-60 = "以前我並不認為兩者是互相矛盾的概念。#n始終認為合理的事自然也最有效率。"
2004103-64 = "然而……事實並非如此。"
2004103-65 = "因為人不可能永遠保持合理。#n而我們所經歷的事情，又大多發生在人與人之間。"
2004103-66 = "從前我認為人們無法信任，所以必須要控制一切……"
2004103-67 = "……但我現在已經不這麼想了。"
2004103-68 = "因為我發覺，人是無法挽回的。"
2004103-69 = "[s]「無法挽回？」"
2004103-70 = "……嗯。"
2004103-71 = "無法挽回這個概念，對現在的我而言相當重要。"
2004103-72 = "因為那是足以區分機械與人類的概念。"
2004103-74 = "如果機械的零件故障，只要換一個新的就行了。#n如果人工智慧的判斷邏輯毀損，也只要加以修復就能解決。"
2004103-75 = "如此一來，那些東西便能一如既往地順利運作。#n因此這是可以挽回……也就是能夠替換的東西。"
2004103-77 = "然而……人類不一樣。#n一旦哪裡出了差錯，就再也無法挽回了。"
2004103-78 = "雖然某些部分可以自行治癒，但終究是有限度的。"
2004103-81 = "人體每天有3300億個細胞誕生和死去，#n而細胞的替換週期大約需要一個月到一年左右……"
2004103-82 = "不過像是大腦的神經細胞，就一輩子都不會替換。"
2004103-83 = "你有聽說過關於「更換零件的船」的故事嗎？"
2004103-84 = "[s1]「嗯，大概知道。」\n[s2]「抱歉，我沒聽過。」"
2004103-85 = "沒錯，就是每當船的零件出現老舊或毀損就將其替換──"
2004103-86 = "當所有零件都被替換之後，那艘船究竟還是不是原本的船呢──大致是這樣的故事。"
2004103-87 = "假設現在有一艘船，並且每當船的零件出現老舊或毀損就將其替換──"
2004103-88 = "當所有零件都被替換之後，那艘船究竟還是不是原本的船呢──大致是這樣的故事。"
2004103-89 = "我認為……如果是機械的話，就能套用那艘船的概念。"
2004103-90 = "就算所有零件都經過更換，只要功能性依舊存在，那麼它就依然是原本的那台機械。"
2004103-91 = "……但我覺得這個概念無法套用在人類身上。"
2004103-92 = "如果在遙遠的未來，人類能夠完整分析大腦與神經，#n並製作出以碳和蛋白質為基礎的替換用生物零件的話，或許還能另當別論……"
2004103-93 = "但我現在並不想做那種思想實驗。#n因為光是假設都很困難，要實際應用更是不可能。"
2004103-94 = "而所謂的思想實驗……#n是將必要的裝置和條件簡化之後，推測理論上會發生的現象。"
2004103-95 = "我認為思想實驗也可以分成兩種。"
2004103-96 = "一種是經過精準的模擬，能夠預測出無限接近事實的結果。"
2004103-97 = "另一種是只能停在想像和假設階段。"
2004103-98 = "……能否替換或代替人類的問題，我覺得屬於後者。"
2004103-99 = "所以我現在並不希望考慮那種事情。"
2004103-100 = "換句話說，老師。"
2004103-101 = "現在的老師在某種層面……"
2004103-108 = "對我而言是個無可取代的人──這就是我想說的。"
2004103-109 = "[s]「嗯？那是什麼意思？」"
2004103-114 = "……原來如此，你不明白也沒關係。"
2004103-115 = "但是總有一天……"
2004103-116 = "我也想成為對老師而言……"
2004103-120 = "……無可取代的人。"
2004103-122 = "既然東西已經收到，我也該回去了。"
2004103-123 = "[s]「……你要怎麼回去？」"
2004103-124 = "跟來的時候一樣，用駭入的方式干擾所有交通信號和監視器。"
2004103-125 = "避免任何人看到我離開夏萊，又要前往什麼地方──"
2004103-126 = "[s3]「嗯，這個方案駁回。」\n[s4]「……我送你回去吧。」"
2004103-129 = "咦？可，可是……"
2004103-130 = "[s]「請聽老師的話，莉央會長。」"
2004103-131 = "我，我知道了……"
2004103-133 = "（之後叫了一台大型的貨物計程車，並讓莉央在中途下車）"
2004103-134 = "（在確定計程車離開之後，莉央才叫出了AMAS移送貨物）"
2004103-140 = "那我走了。#n今天謝謝你，老師。"
2004103-141 = "[s]「嗯，路上小心。」"

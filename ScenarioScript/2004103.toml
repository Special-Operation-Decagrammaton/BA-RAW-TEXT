2004103-96 = "3;리오;02;정교한 시뮬레이션으로, 한없이 사실에 근접한 결과를 예측할 수 있는 것이 있고."
2004103-97 = "3;리오;01;상상과 가정 수준에서 종료될 수밖에 없는 것이 있어."
2004103-98 = "3;리오;99;……사람을 교체하거나 대체할 수 있는가의 문제는, 후자라고 생각해.\n#3;em;[한숨]"

2004103-74 = "1;AMAS A;01\n3;AMAS A;01\n5;AMAS A;01\n#1;h\n#3;h\n#5;h\n#na;리오;기계의 부품이 망가졌으면, 교체하면 돼. 인공지능의 판단 로직이 망가졌다면, 그 부분을 복구하면 되고."
2004103-75 = "1;AMAS A;01\n3;AMAS A;01\n5;AMAS A;01\n#1;h\n#3;h\n#5;h\n#na;리오;그렇게 하면, 그것들은 예전과 같은 성능을 내며 잘 동작하지. 이것은 되돌이킬 수 있는 것, 즉 대체 가능한 것이야."
2004103-76 = "1;히마리;00\n3;아리스N;00\n5;토키 모드 1;00\n#1;black\n#3;black\n#5;black\n#1;h\n#3;h\n#5;h"
2004103-77 = "1;히마리;00\n3;아리스N;00\n5;토키 모드 1;00\n#1;black\n#3;black\n#5;black\n#1;h\n#3;h\n#5;h\n#na;리오;하지만…… 사람은 아니야. 한 번 어딘가 잘못되면, 되돌이킬 수 없어."
2004103-78 = "1;히마리;00\n3;아리스N;00\n5;토키 모드 1;00\n#1;black\n#3;black\n#5;black\n#1;h\n#3;h\n#5;h\n#na;리오;스스로 치유되는 부분도 있기는 하지만, 한계가 있기 마련이고."

2004103-23 = "3;리오;02;안녕, 선생. 늦지 않았지?\n#3;a\n#3;em;[?]"
2004103-24 = "3;리오;99;우선…… 그렇네. 선생에게 사과해야 할 것 같아.\n#3;greeting"
2004103-25 = "[s] \"응? 갑자기 사과는 왜?\""
2004103-26 = "3;리오;07;오는 길에 여러 가지로 생각해 봤는데……."
2004103-27 = "3;리오;06;……그래야 할 것 같았어."
2004103-28 = "[s] \"아이구, 우리 리오. 성장했구나. 기특하다, 기특해.\""
2004103-29 = "3;리오;07;그, 그렇게 놀리지 말아 줘…….\n#3;em;[///]"
2004103-30 = "3;리오;02;그리고 오는 길에, 추적당하거나 정체를 들키지 않을까 해서."
2004103-31 = "3;리오;08;해킹으로 교통 신호와 CCTV를 전부 교란시켰어.\n#3;em;[반짝]\n#3;closeup"
2004103-32 = "3;리오;09;이걸로 내가 샬레로 오는 걸 목격한 사람은 없을 거야.\n#3;closeup"
2004103-33 = "[s] \"……아이구, 우리 리오. 성장하다 말았구나. 그래도 응원할게…….\""
2004103-34 = "3;리오;02;……잘 모르겠는 반응이네, 지금은.\n#3;em;[?]"
2004103-35 = "3;리오;01;아무튼, 고마워. 선생. 이런저런 걸 하려다 보니, 아지트에서 부품이 많이 필요해져서."
2004103-36 = "3;리오;07;요리하는 아방가르드 군의 개량이라든가, 컴퓨터 장비라든가, 시약 분석이라든가……."
2004103-37 = "3;리오;02;무엇보다 필요했던 것은 고성능 베이퍼 챔버와 IC 서프레서였는데."
2004103-38 = "3;리오;99;아무래도 기기 수가 늘어나다 보니 냉각 효율이 중요해졌고, 최근 진행 중인 연구에서 조금 분석해야 할 이온 용액이–\n#3;em;[...]"
2004103-39 = "#all;hide"
2004103-40 = "#na;(리오는 그 뒤로 한참이나, 잘 알아들을 수 없는 설명을 계속했다.)"
2004103-41 = "#na;(……착각일 수도 있겠지만, 리오는 어딘가 즐거워 보였다…….)"
2004103-42 = "#all;hide"
2004103-43 = "3;리오;99;……어쨌든, 그래서 대량의 부품 교체가 필요한 상황이었어. 하지만 내가 직접 택배 주문을 하는 건 안 될 일이었지.\n#3;em;[반응]\n#3;a"
2004103-44 = "3;리오;01;아무래도, 아지트가 발각될 가능성이 있으니까 말이야."
2004103-45 = "[s] \"그래서 샬레를 배송대행지로 쓴 거였구만…….\""
2004103-46 = "3;리오;06;……맞아. 미안해, 선생.\n#3;em;[땀]"
2004103-47 = "[s] \"그보다, 아지트가 있었어?\""
2004103-48 = "3;리오;02;한 곳은 아니야. 여러 군데에 있어."
2004103-49 = "3;리오;07;지금은 그중 가장 입지가 좋은 곳에 자리하고 있지만…….\n#3;em;[...]"
2004103-50 = "3;리오;01;만에 하나 무슨 일이 생기면, 그 즉시 옮길 수 있도록 준비하고 있어."
2004103-51 = "3;리오;02;발각된다면, 언제든 내 AMAS들을 써서 다음 아지트로 이동할 수 있도록 말이지."
2004103-52 = "[s] \"그거, 힘들지 않아?\""
2004103-53 = "3;리오;07;힘들지 않다고 하면 거짓말이겠지만…….\n#3;em;[한숨]"
2004103-54 = "3;리오;99;그래도, 합리적이야."
2004103-55 = "3;리오;02;응? 효율적이지는 않아 보인다고?\n#3;em;[?]"
2004103-56 = "3;리오;07;……그건 맞을 거야."
2004103-57 = "3;리오;07;에이미와 예전에, 이 문제로 잠깐 이야기를 했었는데."
2004103-58 = "3;리오;02;나는…… 합리를 위해 효율을 버릴 수 있는 타입이라나 봐."
2004103-59 = "3;리오;01;에이미는 반대지. 효율을 위해 합리를 버릴 수 있는 타입이니까."
2004103-60 = "3;리오;99;예전의 나는, 그게 상충될 수 있는 개념이라고 생각하지 않았어. 합리적인 것이 당연히 가장 효율적인 것이라고 생각했거든."

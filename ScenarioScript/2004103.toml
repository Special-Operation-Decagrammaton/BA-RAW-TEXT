[translation]
2004103-1 = "Shipping Agency"
2004103-7 = "...Oof, there you go. That's everything."
2004103-8 = "Rio ordered way more packages than I expected."
2004103-9 = "Are you setting up a personal workshop or something? Hahaha, never mind, I'm joking."
2004103-10 = "If you could just sign here..."
2004103-12 = "As I promised Rio, I stayed at the office until after dark."
2004103-23 = "Hello, Sensei. I believe I'm right on time."
2004103-24 = "First off, allow me to apologize."
2004103-25 = "[s] \"Huh? What for?\""
2004103-26 = "Well, I was thinking on my way over here..."
2004103-27 = "...and it just felt like the right thing to do."
2004103-28 = "[s] \"Oh, Rio. You've grown. I'm proud of you.\""
2004103-29 = "D-Don't tease me like that..."
2004103-30 = "Incidentally, to make sure I wasn't tracked or identified..."
2004103-31 = "I jammed all the traffic cameras and CCTVs along the route here."
2004103-32 = "I can safely assure you, no one saw me."
2004103-33 = "[s] \"...Oh, Rio. You're still the same. I'll still support you, though...\""
2004103-34 = "...I'm not sure what you mean."
2004103-35 = "Anyway, thank you for holding these packages, Sensei. I have a few projects going on in the hideout, and I needed extra parts for them."
2004103-36 = "Upgrades for the cooking Avant Guard, computer maintenance, reagent analysis..."
2004103-37 = "Most of all, I needed a high-quality vapor chamber and IC suppressor."
2004103-38 = "You see, the more devices you have running, the more important cooling efficiency becomes. Plus there's the ion solution I need for my recent research..."
2004103-40 = "She continued her unintelligible explanation for a while."
2004103-41 = "I'm not quite sure, but I think she enjoyed talking about it."
2004103-43 = "...Anyway, that's why I needed all the parts. And obviously, I couldn't order them myself."
2004103-44 = "Not without giving away the hideout."
2004103-45 = "[s] \"And that's why you used Schale as a forwarding address.\""
2004103-46 = "Exactly, yes. So for that, my apologies."
2004103-47 = "[s] \"Back up for a sec: you have a hideout?\""
2004103-48 = "More than one."
2004103-49 = "At the moment, I'm using the one with the most optimal location..."
2004103-50 = "...but I do have several backups if the need arises."
2004103-51 = "One whiff of trouble, and my AMAS will take me straight to the next one."
2004103-52 = "[s] \"Sounds like a rough way to live.\""
2004103-53 = "I'd be lying if I said it wasn't..."
2004103-54 = "But still, it's rational."
2004103-55 = "...You think it sounds inefficient?"
2004103-56 = "...Well, maybe."
2004103-57 = "Eimi and I talked it over a while ago."
2004103-58 = "She says I'm the type of person who can give up efficiency for rationality."
2004103-59 = "With her, she told me, it's the other way around."
2004103-60 = "I thought you couldn't have one without the other, honestly. I thought the most efficient option would naturally be the rational one."
2004103-64 = "But...apparently, that's not the case."
2004103-65 = "People can't always be rational, and most of the events in our lives are between people and other people."
2004103-66 = "The way I used to see that, I thought people were unreliable and untrustworthy. That's why I thought everything had to be controlled."
2004103-67 = "...I don't think that's the case anymore."
2004103-68 = "Because people can't be rolled back."
2004103-69 = "[s] \"Rolled back?\""
2004103-70 = "Yes."
2004103-71 = "I've thought a lot about that lately."
2004103-72 = "People aren't like machines."
2004103-74 = "If a machine gets a broken part, you can just replace it. If an AI's decision-making algorithm goes wrong, you can just rewrite it."
2004103-75 = "You can make them good as new. Just like they were before. Every part of them is replaceable."
2004103-77 = "But...people aren't. Things that go wrong for them can't be fixed that way."
2004103-78 = "Some parts of a person can heal on their own, but there are limits to that."
2004103-81 = "About 330 billion cells are born and die in every human body. The cellular turnover rate is anywhere from a month to a year..."
2004103-82 = "But a brain's nerve cells, for example, don't get replaced at any point in your lifespan."
2004103-83 = "Do you know the story of the Ship of Theseus?"
2004103-84 = "[s1] \"Sounds familiar.\"\n[s2] \"Sorry, I don't think I do.\""
2004103-85 = "It's a story that illustrates what it means, or doesn't mean, to replace things piece by piece."
2004103-86 = "And whether it's the same thing after it's all been replaced."
2004103-87 = "Let's say you have a ship. As time goes on, parts of the ship need replacing."
2004103-88 = "And so you keep replacing parts, until one day, every single part's been replaced at one time or another. Is it still the same ship, or is it not?"
2004103-89 = "I think...you can apply that concept to machines."
2004103-90 = "Even if you replace every part, then as long as it keeps functioning, it's the same machine as it ever was."
2004103-91 = "...But I don't think humans work the same way."
2004103-92 = "Maybe someday in the far future, they'll have ways of analyzing every neuron in your brain, and creating an exact carbon and protein-based copy of anything you need replaced..."
2004103-93 = "But I don't want to do that thought experiment right now. It requires a lot of assumptions, and doesn't have much bearing on reality."
2004103-94 = "You know what I mean by \"thought experiment,\" right? When you sort of simplify a scenario, and then make predictions based off of that?"
2004103-95 = "There are really two types of thought experiments."
2004103-96 = "One is where you can predict near-accurate results based on precise simulations."
2004103-97 = "And the other is built off of imagination and presumptions."
2004103-98 = "The question of the human \"ship of Theseus\" is definitely one of the latter."
2004103-99 = "So I don't see much use in considering that right now."
2004103-100 = "In other words, Sensei..."
2004103-101 = "I wanted to say that you, the way you are now..."
2004103-108 = "...are irreplaceable for me."
2004103-109 = "[s] \"Hm? What do you mean?\""
2004103-114 = "...Well, it's all right if you don't understand."
2004103-115 = "But one day..."
2004103-116 = "...I hope you'll see me that way too."
2004103-120 = "Just a thought I had in the moment."
2004103-122 = "Now then, since I've picked up all my packages, I should get back."
2004103-123 = "[s] \"...How do you plan on going back?\""
2004103-124 = "Just like I did on the way here, jamming all the traffic cams and CCTVs."
2004103-125 = "So no one sees me leaving Schale and —"
2004103-126 = "[s3] \"Yeah, no, I veto that.\"\n[s4] \"...I'll take you back.\""
2004103-129 = "Huh? B-But..."
2004103-130 = "[s] \"President Rio, please listen to Sensei.\""
2004103-131 = "A-All right..."
2004103-133 = " I called a taxi, a large cargo taxi, and dropped Rio off near her hideout."
2004103-134 = "She waited until the taxi was gone, then called her AMAS to move the packages."
2004103-140 = "I'll be on my way, then. Thank you for everything today, Sensei."
2004103-141 = "[s] \"No problem. Have a safe rest-of-your-trip home.\""

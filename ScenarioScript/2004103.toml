2004103-82 = "3;리오;01;가령, 뇌의 신경세포 같은 것은 일생 교체되지 않아."
2004103-83 = "3;리오;02;부품을 교체하는 배의 이야기, 알아?\n#3;em;[?]"
2004103-84 = "[s1] \"응. 알 것 같아.\"\n[s2] \"미안. 잘 모르겠어.\""

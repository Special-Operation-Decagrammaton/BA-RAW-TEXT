2004103-88 = "3;리오;02;어느 날 배의 모든 부품을 교체하게 되면, 그 배는 원래의 배와 같은 것이라고 부를 수 있을까, 하는 이야기야.\n#3;em;[반응]"
2004103-89 = "3;리오;99;나는…… 기계라면 그 배의 개념을 적용시킬 수 있다고 봐."
2004103-90 = "3;리오;07;모든 부품을 교체하더라도, 기능성이 유지된다면, 그 기계는 이전의 기계와 같은 것이겠지."
2004103-91 = "3;리오;99;……하지만 그 개념은, 사람에게는 적용될 수 없을 것이라고 생각해.\n#3;em;[...]"
2004103-92 = "3;리오;01;먼 훗날 언젠가, 뇌와 신경을 완전히 분석해, 탄소 및 단백질 기반의 교체용 생체 부품을 만들어 낼 수 있다면 또 모르겠지만……."
2004103-93 = "3;리오;02;그런 사고 실험은, 지금은 하고 싶지 않아. 가정하는 것조차 힘들고, 실제로 적용하는 것은 더욱 불가능하니까."
2004103-94 = "3;리오;01;필요한 장치와 조건을 단순하게 가정한 다음, 이론을 바탕으로 일어날 현상을 예측하는 것을 사고 실험이라고 하는데……."

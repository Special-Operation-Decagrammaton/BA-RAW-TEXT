[translation]
2004103-1 = "รับของแทน"
2004103-7 = "ครับ ทั้งหมดมีเท่านี้ครับ แต่ว่ามันมีจำนวนมากทีเดียวนะครับ...."
2004103-8 = "(จำนวนพัสดุที่ริโอะฝากให้รับแทนมีหลายชิ้นมากๆ...)"
2004103-9 = "จะทำโรงหัตถกรรมเป็นของตัวเองเหรอครับ? ฮ่าฮ่าฮ่า! เปล่าหรอกครับ ผมล้อเล่นน่ะ"
2004103-10 = "ถ้างั้นก็รบกวนประทับตราตรงนี้ด้วยครับ!"
2004103-12 = "(แล้วคุณครูก็รอจนกว่าจะถึงเวลากลางคืนตามที่สัญญากับริโอะไว้...)"
2004103-23 = "สวัสดี ครู ฉันไม่ได้มาดึกไปใช่มั้ย?"
2004103-24 = "ฉันว่า... นั่นสินะ ฉันน่าจะต้องขอโทษครูก่อน"
2004103-25 = "[s] \"หืม? จู่ๆ จะขอโทษทำไมเหรอ?\""
2004103-26 = "ระหว่างมาที่นี่ฉันก็คิดอะไรได้หลายๆ อย่างน่ะ..."
2004103-27 = "ก็เลยคิดว่าต้องขอโทษหน่อย..."
2004103-28 = "[s] \"ริโอะของครูโตเป็นผู้ใหญ่แล้วนะเนี่ย น่าชื่นใจจริงๆ\""
2004103-29 = "มะ... ไม่ต้องพูดถึงขนาดนั้นก็ได้..."
2004103-30 = "และระหว่างมาที่นี่ ฉันกลัวว่าจะถูกติดตามหรือโดนจับได้"
2004103-31 = "ก็เลยแฮ็กระบบสัญญาณจราจรกับกล้องวงจรปิดไว้หมดเลย"
2004103-32 = "แบบนี้ก็จะไม่มีใครเห็นแล้วละว่าฉันมาที่ชาเล่ต์"
2004103-33 = "[s] \"ริโอะเป็นผู้ใหญ่จริงๆ ด้วย ครูเป็นกำลังใจให้นะ...\""
2004103-34 = "ปฏิกิริยาแบบนี้มันหมายความว่าอะไรนะ..."
2004103-35 = "เอาเถอะ ยังไงก็ขอบคุณนะครู พอฉันจะสร้างหรือประดิษฐ์นู่นนี่ ก็ต้องใช้อะไหล่หลายชิ้นเลยน่ะ"
2004103-36 = "ทั้งการสร้างหุ่นรบเชฟล้ำยุค ซ่อมคอมพิวเตอร์ แล้วก็วิเคราะห์สารเคมี..."
2004103-37 = "สิ่งที่จำเป็นที่สุดคือตัวกระจายความร้อนแบบแบนและบางที่มีประสิทธิภาพสูงและตัวเก็บเสียงแบบ IC"
2004103-38 = "และเมื่อจำนวนชิ้นส่วนมีเพิ่มมากขึ้น ประสิทธิภาพการทำความเย็นจึงเป็นเรื่องสำคัญ ส่วนสารประกอบไอออนิกที่ฉันต้องวิเคราะห์ในการทดลองที่กำลังทำอยู่ก็..."
2004103-40 = "(ริโอะอธิบายเรื่องที่คุณครูฟังไม่เข้าใจอยู่อีกพักใหญ่)"
2004103-41 = "(นี่อาจจะเป็นสิ่งที่คุณครูคิดไปเองก็ได้ แต่ริโอะดูมีความสุขกับการพูดถึงสิ่งที่ตัวเองทำมาก...)"
2004103-43 = "เอาเป็นว่า... เพราะแบบนั้นฉันก็เลยต้องเปลี่ยนอะไหล่หลายชิ้นมากๆ เลย แต่จะให้ฉันสั่งไปส่งที่ที่#nซ่อนตัวของตัวเองก็คงไม่ได้"
2004103-44 = "เพราะถ้าทำแบบนั้น ที่ซ่อนตัวของฉันก็จะถูกเปิดเผยได้"
2004103-45 = "[s] \"ก็เลยใช้ชาเล่ต์เป็นที่อยู่รับของแทนสินะ...\""
2004103-46 = "ใช่... ขอโทษนะ ครู"
2004103-47 = "[s] \"จะว่าไป ที่ซ่อนตัวของริโอะอยู่ไหนเหรอ?\""
2004103-48 = "ไม่ได้มีที่เดียวหรอก ฉันซ่อนตัวอยู่หลายๆ ที่น่ะ"
2004103-49 = "และตอนนี้ฉันอยู่ในที่ซ่อนตัวที่มีทำเลที่ดีที่สุด..."
2004103-50 = "ถ้าเกิดเรื่องอะไรขึ้น ฉันก็พร้อมที่จะเคลื่อนไหวทันที"
2004103-51 = "และถ้าถูกจับได้ ฉันก็ใช้ AMAS ของตัวเองแล้วย้ายไปยังที่ซ่อนตัวถัดไปได้"
2004103-52 = "[s] \"แบบนั้นไม่ลำบากเหรอ?\""
2004103-53 = "ถ้าบอกว่าไม่ลำบากก็คงเป็นเรื่องโกหกน่ะ..."
2004103-54 = "แต่แบบนี้มันก็สมเหตุสมผลแล้ว"
2004103-55 = "หืม? ดูไม่สมเหตุสมผลมากกว่างั้นเหรอ?"
2004103-56 = "มันก็น่าจะใช่นะ..."
2004103-57 = "เมื่อก่อนฉันกับเอมิก็เคยคุยปัญหานี้ด้วยกัน"
2004103-58 = "สงสัยฉันจะ... เป็นคนประเภทที่เสียสละเรื่องประสิทธิภาพเพื่อความมีเหตุผลได้น่ะ"
2004103-59 = "ส่วนเอมิก็ตรงข้ามกับฉันเลย เพราะเอมิเป็นคนที่ยอมทิ้งความมีเหตุผลเพื่อประสิทธิภาพมากกว่า"
2004103-60 = "เมื่อก่อนฉันไม่คิดว่านั่นจะเป็นแนวคิดที่ขัดแย้งกันหรอกนะ ฉันเคยคิดว่าสิ่งที่สมเหตุสมผลคือสิ่งที่มี#nประสิทธิภาพที่สุดแล้วน่ะ"
2004103-64 = "แต่ว่า... ฉันก็ได้เรียนรู้ว่ามันก็ไม่ใช่อย่างนั้น"
2004103-65 = "เพราะเราไม่สามารถมีเหตุผลได้เสมอไป และสิ่งที่เกิดขึ้นกับเราส่วนใหญ่ก็เป็นเรื่องที่เกิดขึ้นระหว่าง#nเรากับคนอื่นด้วย"
2004103-66 = "ก่อนหน้านี้ฉันคิดว่ามนุษย์เป็นสิ่งมีชีวิตที่ไว้ใจไม่ได้เท่าไร และเพราะอย่างนั้นฉันเลยต้องควบคุมทุกๆ อย่าง..."
2004103-67 = "แต่ตอนนี้... ฉันไม่คิดอย่างนั้นแล้วละ"
2004103-68 = "มนุษย์เป็นสิ่งที่ไม่อาจหวนกลับคืนได้"
2004103-69 = "[s] \"ไม่อาจหวนกลับคืนได้งั้นเหรอ?\""
2004103-70 = "อื้อ..."
2004103-71 = "แนวคิดเรื่อง <การไม่อาจหวนกลับคืนได้> เป็นสิ่งที่สำคัญสำหรับฉันในตอนนี้"
2004103-72 = "เหตุผลก็เพราะมันเป็นสิ่งที่เอาไว้แบ่งแยกระหว่างเครื่องจักรกลกับมนุษย์ยังไงล่ะ"
2004103-74 = "หากชิ้นส่วนใดส่วนหนึ่งของเครื่องจักรกลเสียหาย เราก็เปลี่ยนชิ้นส่วนนั้นได้ หากตรรกะการตัดสินใจ#nของ AI เสียหาย ก็ซ่อมแซมส่วนนั้นได้เหมือนกัน"
2004103-75 = "และถ้าทำแบบนั้น พวกมันก็จะทำงานได้ดีและมีประสิทธิภาพเหมือนเมื่อก่อน นี่คือสิ่งที่สามารถหวน#nกลับคืนได้ เรียกง่ายๆ ว่ามันเปลี่ยนอะไหล่ได้"
2004103-77 = "แต่ว่ามนุษย์... ไม่เป็นอย่างนั้นน่ะสิ ถ้ามีส่วนไหนเสียหายหรือทำอะไรผิดไปละก็ เราหวนคืนสิ่งนั้น#nกลับมาไม่ได้หรอก"
2004103-78 = "แม้จะมีส่วนที่ซ่อมแซมตัวเองได้ แต่มันก็มีข้อจำกัดอยู่ดี"
2004103-81 = "ร่างกายของมนุษย์มีเซลล์ที่เกิดและตายไปประมาณ 330 พันล้านเซลล์ทุกวัน และมีวงจรการทดแทน#nเซลล์ประมาณหนึ่งเดือนถึงหนึ่งปี..."
2004103-82 = "แต่ก็มีบางเซลล์ที่ไม่มีการทดแทนตลอดชีวิต อย่างเช่นเซลล์ประสาทในสมอง"
2004103-83 = "ครูรู้เรื่องเรือธีซีอุสที่ถูกแทนที่ด้วยส่วนประกอบใหม่มั้ยล่ะ?"
2004103-84 = "[s1] \"อื้อ แต่น่าจะลืมๆ ไปแล้วน่ะ\"\n[s2] \"ขอโทษนะ ครูไม่เคยได้ยินเลย\""
2004103-85 = "ฉันทวนให้ก็ได้ มันเป็นเรือที่ถ้ามีส่วนไหนที่ชำรุดทรุดโทรมก็จะเปลี่ยนชิ้นส่วนนั้น"
2004103-86 = "คำถามก็คือ ถ้าเราเปลี่ยนชิ้นส่วนทั้งหมดของเรือ แล้วมันจะยังเป็นเรือลำเดิมหรือเปล่าน่ะ"
2004103-87 = "สมมติว่ามีเรือลำหนึ่ง ถ้ามีส่วนไหนของเรือที่ชำรุดทรุดโทรม เราก็จะเปลี่ยนชิ้นส่วนนั้น"
2004103-88 = "แล้วพอเวลาผ่านไปเรื่อยๆ จนทุกชิ้นส่วนถูกเปลี่ยนไปทั้งหมด แล้วเราจะยังคิดว่าเป็นเรือลำเดิมได้#nหรือเปล่า มันเป็นเรื่องแบบนี้น่ะ"
2004103-89 = "สำหรับฉัน... ถ้าเป็นเรื่องเครื่องจักรกล ฉันคิดว่าเราเอาแนวคิดของเรือนั้นมาประยุกต์ใช้ได้"
2004103-90 = "ต่อให้เปลี่ยนชิ้นส่วนทั้งหมด แต่ถ้ายังคงการทำงานไว้ได้ เครื่องจักรกลนั้นก็ยังคงเหมือนเครื่องจักรกล#nเดิม"
2004103-91 = "แต่ว่าแนวคิดนั้น... ฉันคิดว่าประยุกต์ใช้กับมนุษย์ไม่ได้"
2004103-92 = "แม้ว่าในอนาคตอันไกลโพ้นเราอาจวิเคราะห์สมองและเส้นประสาทอย่างสมบูรณ์ แล้วสร้างชิ้นส่วนชีวภาพโดยมีพื้นฐานจากคาร์บอนและโปรตีนได้ก็เถอะ..."
2004103-93 = "แต่ฉันไม่อยากนึกภาพการทดลองนั้นเลย มันยากที่จะสันนิษฐาน และยิ่งเป็นไปไม่ได้เลยที่จะนำไปใช้#nได้จริงน่ะ"
2004103-94 = "ว่ากันว่าการทดลองทางความคิด ก็คือการตั้งสมมติฐานระบบและเงื่อนไขที่จำเป็นอย่างง่ายๆ จากนั้นก็คาดการณ์สิ่งที่จะเกิดขึ้นโดยใช้ทฤษฎีเป็นพื้นฐาน..."
2004103-95 = "แต่สำหรับฉันแล้ว การทดลองทางความคิดมีอยู่สองแบบ"
2004103-96 = "แบบแรกก็คือการจำลองที่ซับซ้อน เราคาดการณ์ผลลัพธ์ที่ใกล้เคียงกับความเป็นจริงได้อย่างไม่มีที่สิ้น#nสุด"
2004103-97 = "ส่วนอีกแบบก็คือ มีบางสิ่งที่จำเป็นต้องจบลงในขั้นตอนของจินตนาการและการสันนิษฐานเท่านั้น"
2004103-98 = "ส่วนคำถามที่ว่าเราเปลี่ยนหรือทดแทนมนุษย์ได้หรือเปล่าน่ะ ฉันคิดว่าเป็นแบบหลัง"
2004103-99 = "ฉันจึงไม่อยากคำนึงถึงเรื่องนั้นในตอนนี้น่ะ"
2004103-100 = "ถ้าพูดในอีกแง่หนึ่ง"
2004103-101 = "ตอนนี้ครู ในบางความหมายแล้ว..."
2004103-108 = "คือคนที่แทนที่ไม่ได้สำหรับฉันน่ะ"
2004103-109 = "[s] \"หืม? หมายความว่ายังไงน่ะ?\""
2004103-114 = "เป็นอย่างนั้นสินะ... ถ้าไม่เข้าใจ ก็ปล่อยไว้แบบนี้ละดีแล้ว"
2004103-115 = "แต่ในสักวันหนึ่ง"
2004103-116 = "ฉันก็อยากเป็นคนแบบนั้นสำหรับครูเหมือนกัน..."
2004103-120 = "ฉันแค่อยากบอกว่าฉันมีความคิดแบบนั้นน่ะ"
2004103-122 = "เอาละ ในเมื่อฉันได้ของแล้ว งั้นฉันกลับดีกว่า"
2004103-123 = "[s] \"แล้วจะกลับยังไงเหรอ...? \""
2004103-124 = "ฉันแฮ็กระบบสัญญาณจราจรกับกล้องวงจรปิดไว้เหมือนขามาแล้ว"
2004103-125 = "ถ้าทำแบบนี้ ต่อให้ฉันออกจากชาเล่ต์และไปที่อื่นก็ไม่มีใครรู้..."
2004103-126 = "[s3] \"'งั้นเหรอ ครูไม่ให้ไปคนเดียวหรอก\"\n[s4] \"เดี๋ยวครูไปส่งเอง...\""
2004103-129 = "หืม? ตะ... แต่ว่า..."
2004103-130 = "[s] \"ประธานริโอะ ต้องเชื่อฟังคำของคุณครูสิ\""
2004103-131 = "กะ... ก็ได้..."
2004103-133 = "(หลังจากนั้นคุณครูก็เรียกแท็กซี่ขนาดใหญ่แล้วให้ริโอะลงกลางทางได้)"
2004103-134 = "(ริโอะรอจนกว่าแท็กซี่จะขับพ้นสายตาไป จากนั้นก็เรียก AMAS ของตัวเองมาขนของกลับไป)"
2004103-140 = "งั้นฉันไปละนะ วันนี้ขอบคุณมากนะ ครู"
2004103-141 = "[s] \"อื้อ กลับดีๆ นะ\""

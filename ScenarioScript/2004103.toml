2004103-65 = "3;리오;02;왜냐하면, 사람이 늘 합리적일 수는 없는 법이고, 우리에게 일어나는 일은 대개 사람과 사람 사이에서 일어나는 일이기 마련이니까."
2004103-66 = "3;리오;07;예전에는 그런 것을 포함해서, 사람이란 그다지 믿을 대상이 못 되고, 그렇기에 모든 것을 컨트롤해야 한다고 생각했지만…….\n#3;em;[한숨]"

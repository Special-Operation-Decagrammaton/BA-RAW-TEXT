2005206-57 = "3;야쿠모;02;네에? 그리고, 평소에 그렇게 편하게 사는 출판부 부장이 파묻혀 버릴 정도로 눈이 왔다면."
2005206-58 = "3;야쿠모;99;다들 그거야말로 보통 상황이 아닐 거라고 생각할 테고……."
2005206-59 = "3;야쿠모;05;무엇보다 선생님께서 생각하기에, 그 장면 자체가…… 재미있을 것 같으니까요?\n#3;em;…"
2005206-60 = "3;야쿠모;09;……그쪽이 진심이셨구만요……."
2005206-61 = "[s] \"매출을 위해서라면, 뭐든 할 수 있다고 하지 않았던가?\""
2005206-62 = "3;야쿠모;12;으윽, 여기에서 자기 말에 스스로 걸려 넘어지게 되다니……!\n#3;stiff"
2005206-63 = "3;야쿠모;99;어쩔 수 없죠…… 말과 글은, 한 번 나가면 돌이킬 수 없으니까요…….\n#3;em;[한숨]"

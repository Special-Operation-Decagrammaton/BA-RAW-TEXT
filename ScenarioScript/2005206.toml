[translation]
2005206-1 = "Management Psychology"
2005206-2 = "Sensei, what are you willing to do to make a sale?"
2005206-3 = "[s1] \"Another mysterious question from Yakumo.\"\n[s2] \"Is everything okay?\""
2005206-6 = "Well, things have been a bit tough lately..."
2005206-7 = "The publishing industry is always in crisis these days, after all."
2005206-8 = "Ah, did you know?"
2005206-9 = "It's a manager's right to declare a crisis."
2005206-10 = "Even if sales go up, you can still insist that an uncertain future is putting us in crisis."
2005206-11 = "And when sales go down... Well, obviously that doesn't need any further explanation."
2005206-12 = "After achieving record-breaking sales, a relative decline in performance inevitably follows."
2005206-13 = "Putting it simply, we're suffering a decline in our sales ratio, which is precisely the basis for declaring this a crisis."
2005206-14 = "Honestly, you just can't trust managers. Heh, heh, heh."
2005206-15 = "[s] \"Well then, it seems you can't be trusted either.\""
2005206-16 = "Ack."
2005206-17 = "So, that's how it works... Is it?"
2005206-18 = "I-I was just kidding. Of course. Heh, heh...heh."
2005206-19 = "Anyways."
2005206-20 = "Print books have practically become souvenirs. Keepsakes."
2005206-21 = "Web books are in such a state of chaos that predicting their future is impossible."
2005206-22 = "I've been...pondering if there's a solution to all this."
2005206-23 = "But even if there were, it'd only be a stopgap measure, covering up the core issue."
2005206-24 = "Well, you know, if you keep putting in temporary fixes, then you might just plug the leak eventually, right?"
2005206-25 = "[s] \"I guess you should get everyone to read a lot of books.\""
2005206-26 = "Yes. That's our fundamental policy."
2005206-27 = "Because of that, I really wish it would snow heavily."
2005206-28 = "Why snow? Because when it snows, students have a tendency to rush back to their rooms and consume whatever content has currently captured them. That's the ultimate propaganda..."
2005206-29 = "Excuse me. The ultimate chance to make \"public interest recommendations.\""
2005206-30 = "[s] \"I almost miss when you would at least pretend to hide it.\""
2005206-31 = "...I believe I haven't quite crossed that final line yet..."
2005206-32 = "Anyway, there's a problem."
2005206-33 = "Red Winter is always covered in snow, you see..."
2005206-34 = "Since there's already snow everywhere, even if I said that there's more pouring down on top of it, would anyone even care?"
2005206-35 = "[s] \"Then you just have to emphasize how MUCH it snowed?\""
2005206-36 = "A simple way to put it."
2005206-37 = "Huh? You have a good idea?"
2005206-41 = "Sensei...?"
2005206-42 = "I'm afraid I don't quite understand. Could you please explain it again...?"
2005206-43 = "[s3] \"Students' questions are always welcome!\"\n[s4] \"As I said, let's use a photo of you making a snow angel for the cover!\""
2005206-46 = "Why...?"
2005206-47 = "[s] \"You need a lot of snow to make a snow angel!\""
2005206-48 = "Yes, I know. I grew up in Red WINTER. But why ME?"
2005206-49 = "I'm a publisher. The spotlight isn't my cup of tea."
2005206-50 = "I don't exactly endear myself to the public either, Sensei."
2005206-51 = "[s5] \"That's exactly why it's perfect!\"\n[s6] \"If people see someone like you in the snow...\"\n[s7] \"...then they'll really believe it came down hard!\""
2005206-57 = "Huh...? If it's snowing so hard that even the Publishing Department President, who usually lives a life of luxury, got buried in it..."
2005206-58 = "Everyone would think that's definitely an extraordinary situation..."
2005206-59 = "Above all, that scene itself... You think it'd be fun?"
2005206-60 = "...So you were being sincere after all..."
2005206-61 = "[s] \"Wouldn't you do anything for a sale?\""
2005206-62 = "Ugh, to have my own words thrown back at me...!"
2005206-63 = "It can't be helped... Words and writing, once spoken or written, cannot be taken back..."
2005206-71 = "― [log=야쿠모]Oh... It feels soft.[/log][wa:1780] "
2005206-74 = "― [log=야쿠모]This might be nice...[/log][wa:2060] "
2005206-77 = "― [log=야쿠모]Why did saying that give me chills?  [/log][wa:3500] "
2005206-80 = "― [log=야쿠모]Achoo! [/log][wa:10] "
2005206-83 = "[ns] \"All right, smile for the camera!\""
2005206-84 = "― [log=야쿠모]Did you get it?[/log][wa:1550] "
2005206-86 = "― [log=야쿠모]Now then, your turn.[/log][wa:490] "
2005206-89 = "― [log=야쿠모]Huh?[/log]"
2005206-91 = "― [log=야쿠모]Did you really mean to make me do this by myself? [/log][wa:90] "
2005206-94 = "― [log=야쿠모]Dear, oh dear. I don't think [/log][wa:1580] "
2005206-96 = "― [log=야쿠모]that's very responsible of you, Sensei.[/log][wa:1240] "
2005206-99 = "― [log=야쿠모]Red Winter's cold[/log][wa:1710] "
2005206-101 = "― [log=야쿠모]is the same for everyone, you know? Heh, heh, heh.[/log][wa:1400] "

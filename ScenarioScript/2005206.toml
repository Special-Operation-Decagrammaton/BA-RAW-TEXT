[translation]
2005206-1 = "經營的心理學"
2005206-2 = "如果是為了業績的話，老師會什麼都願意做嗎？"
2005206-3 = "[s1]「又是個令人摸不著頭緒的問題呢，八雲。」\n[s2]「發生什麼事了嗎？」"
2005206-6 = "我總覺得最近有股危機感……"
2005206-7 = "雖然出版業的情況，其實一直都很嚴峻就是了。"
2005206-8 = "啊，老師知道嗎？"
2005206-9 = "經營者無論何時都能主張自己正處於危機之中。"
2005206-10 = "在營業額上升的時候，可以辯說未來充滿不確定性，所以是危機……"
2005206-11 = "如果營業額出現下跌，那本身就是顯而易見的危機。"
2005206-12 = "在營業額創下歷史新高後，遲早會面臨相對下滑的時候……"
2005206-13 = "只要單純地將其解釋為成長率下降，就能當作是聲稱危機的根據。"
2005206-14 = "受不了，經營者這種人真是信不得呢。呣呵呵。"
2005206-15 = "[s]「所以八雲也信不得囉～」"
2005206-16 = "咦……"
2005206-17 = "要，要這麼說的話……好像也對？"
2005206-18 = "剛，剛才是開玩笑的啦。嘿嘿，嘿……"
2005206-19 = "總之我想說的是……"
2005206-20 = "實際上，如今實體的書籍已經變成紀念品一般的存在了。"
2005206-21 = "而電子書則處於未來莫測的混沌之中。"
2005206-22 = "所以我才在思考……能不能想出什麼妙計。"
2005206-23 = "雖然就算真的能想出來，八成也只會變成應付當前問題的權宜之計而已……"
2005206-24 = "不過，只要權宜之計不斷累積起來，久而久之不就變成一種解決方案了嗎？"
2005206-25 = "[s]「首先得讓大家願意多讀書才行，對吧？」"
2005206-26 = "沒錯，那正是我們的基本方針。"
2005206-27 = "所以我才希望雪能下得大一點。"
2005206-28 = "問我為什麼突然提到雪？#n當然是因為能向大家灌輸「放學後趕緊回房間消費內容才是最棒的」之類的觀念……"
2005206-29 = "更正，是因為能向大家進行「公益性的勸導」。"
2005206-30 = "[s]「現在連瞞都不打算瞞了呢……」"
2005206-31 = "……我自認應該還沒跨過最後那條紅線才對。"
2005206-32 = "總之，現在有一個問題。"
2005206-33 = "那就是赤冬一年到頭都被白雪覆蓋……"
2005206-34 = "既然雪早就已經堆積如山，再說「會下大雪」究竟能有多少說服力呢……"
2005206-35 = "[s]「嗯……那只要強調雪下得『超級無敵大』就行了吧？」"
2005206-36 = "從結論來說是這樣沒錯？"
2005206-37 = "嗯？老師有什麼好主意嗎？"
2005206-41 = "……老師？"
2005206-42 = "我，我不太能理解，可以麻煩再解釋一次嗎……？"
2005206-43 = "[s3]「學生的提問我隨時歡迎！」\n[s4]「就像剛才說的，把八雲做『雪天使』的照片當成封面就行了！」"
2005206-46 = "為什麼……"
2005206-47 = "[s]「因為如果雪積得不夠厚，是無法做出雪天使的。」"
2005206-48 = "這點我也清楚，但是為什麼得由我來做呢……？"
2005206-49 = "我平常不怎麼喜歡拋頭露面的說。"
2005206-50 = "而且老實說，我也不是那種討人喜歡的類型……"
2005206-51 = "[s5]「所以才要這麼做啊。」\n[s6]「這樣大家看到八雲陷進雪裡的模樣……」\n[s7]「才會覺得雪好像真的下得很大。」"
2005206-57 = "咦？如果連平時過得那麼安逸的出版部部長都被埋進雪裡了……"
2005206-58 = "大家一定會相信事態非比尋常……"
2005206-59 = "而且老師覺得那個畫面……應該會很有趣？"
2005206-60 = "……看來最後這句才是老師的真心話呢……"
2005206-61 = "[s]「你不是說為了業績什麼都願意做嗎？」"
2005206-62 = "唔，沒想到會被自己說過的話給打敗……！"
2005206-63 = "看來也沒辦法了……一言既出駟馬難追……"
2005206-71 = "― [log=야쿠모]哦哦…… 軟綿綿的呢。[/log][wa:2140] "
2005206-74 = "― [log=야쿠모]意外還挺不錯的……也說不定。[/log][wa:2340] "
2005206-77 = "― [log=야쿠모]……本來是這麼想的，果然很冷呢。[/log][wa:4340] "
2005206-80 = "― [log=야쿠모]哈啾！ [/log][wa:80] "
2005206-83 = "[ns]「來，表情放鬆一點，要拍囉～」"
2005206-84 = "― [log=야쿠모]拍好了嗎？[/log][wa:1950] "
2005206-86 = "― [log=야쿠모]那麼接下來輪到老師了。[/log][wa:850] "
2005206-89 = "― [log=야쿠모]咦？[/log]"
2005206-91 = "― [log=야쿠모]……您該不會打算只讓我一個人做吧？[/log][wa:1410] "
2005206-94 = "― [log=야쿠모]真是的，那樣未免有點[/log][wa:2340] "
2005206-96 = "― [log=야쿠모]想得太簡單了吧？老師？[/log][wa:2360] "
2005206-99 = "― [log=야쿠모]赤冬的嚴寒，[/log][wa:2150] "
2005206-101 = "― [log=야쿠모]對所有人都是平等的唷？呣呵呵。[/log][wa:2800] "

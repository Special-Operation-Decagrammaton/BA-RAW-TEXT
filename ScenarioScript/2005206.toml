[translation]
2005206-1 = "#title;경영의 심리학"
2005206-2 = "3;야쿠모;01;선생님은 매출을 위해서라면 뭐든 할 수 있으십니까?\n#3;em;[?]\n#3;a"
2005206-3 = "[s1] \"또 영문 모를 질문이구나, 야쿠모야.\"\n[s2] \"무슨 일이라도 있니?\""
2005206-4 = "#wait;10"
2005206-5 = "#wait;10"
2005206-6 = "3;야쿠모;04;뭔가, 요즘 위기여서요…….\n#3;stiff"
2005206-7 = "3;야쿠모;99;사실 출판업은 늘 위기이긴 합니다만."
2005206-8 = "3;야쿠모;02;아, 그거 아십니까."
2005206-9 = "3;야쿠모;09;경영자는 언제나 위기라고 주장할 수 있다는 것 말이죠.\n#3;em;[음표]"
2005206-10 = "3;야쿠모;99;매출이 오르면 미래가 불확실하니 위기라고 우길 수 있고."
2005206-11 = "3;야쿠모;08;매출이 떨어지면 그건 그냥 위기죠."
2005206-12 = "3;야쿠모;04;역대급 매출을 찍은 다음에는, 반드시 상대적인 실적 저하가 오기 마련인데.\n#3;em;[한숨]"
2005206-13 = "3;야쿠모;05;그걸 단순하게 해석해서 매출 비율 하락이 발생했으니, 이거야말로 위기라고 말할 수 있는 근거가 되는 거죠."
2005206-14 = "3;야쿠모;07;정말이지, 경영자란 믿을 게 못 된다니까요. 힛. 힛. 히."
2005206-15 = "[s] \"그러면 야쿠모도 믿을 게 못 되겠네~\""
2005206-16 = "3;야쿠모;13;엑.\n#3;em;[땀]\n#3;stiff"
2005206-17 = "3;야쿠모;12;그게, 그렇게…… 되네, 요?"
2005206-18 = "3;야쿠모;13;노, 농담이었습니다. 그렇고말고요. 헤헤. 헤……."
2005206-19 = "3;야쿠모;99;아무튼요.\n#3;em;…"
2005206-20 = "3;야쿠모;02;오프라인 서적은 이제 사실상 기념품 비슷한 게 되어 가고 있고."
2005206-21 = "3;야쿠모;01;온라인 서적은 그야말로 미래 예측이 안 될 정도로 혼돈 속이고."
2005206-22 = "3;야쿠모;05;뭔가…… 뾰족한 수가 없을까 해서요.\n#3;em;[속상함]"
2005206-23 = "3;야쿠모;99;그런 거 생각해 낸다 한들, 결국 당장의 이슈를 덮는 임시방편이 되겠지만."
2005206-24 = "3;야쿠모;00;거 왜, 임시방편도 계속 쌓아가다 보면, 문제 해결책이 되고 그러는 거 아니겠습니까.\n#3;em;[음표]"
2005206-25 = "[s] \"일단 책을 많이 읽히도록 해야겠네?\""
2005206-26 = "3;야쿠모;08;네. 그게 기본적인 방침이죠."
2005206-27 = "3;야쿠모;02;그래서 눈이 왕창 내렸으면 좋겠네요."
2005206-28 = "3;야쿠모;03;갑자기 눈은 어째서냐고요? 그래야 하교 후에는 빨리 방으로 돌아가, 컨텐츠를 소비하는 게 최고라고 프로파간다를…….\n#3;em;[?]"
2005206-29 = "3;야쿠모;07;실례. '공익적인 권장'을 할 수 있기 때문이죠."
2005206-30 = "[s] \"이젠 숨기지도 않는구나…….\""
2005206-31 = "3;야쿠모;09;……최후의 선은 아직 넘지 않았다고 생각하는데요…….\n#3;em;[재잘]"
2005206-32 = "3;야쿠모;02;어쨌든, 여기에서 문제가 되는 게 하나 있습니다."
2005206-33 = "3;야쿠모;01;붉은겨울은 언제나 눈으로 덮여 있다는 거죠……."
2005206-34 = "3;야쿠모;04;이미 눈이 쌓여 있는데, 거기에 한층 더 눈이 쏟아진다고 이야기를 해 봤자, 얼마나 설득력이 있을지…….\n#3;em;[한숨]"
2005206-35 = "[s] \"흠……. 그러니까 눈이 엄청나게 왔다는 어필을 하면 되는 거지?\""
2005206-36 = "3;야쿠모;02;결론적으로는 그렇죠?"
2005206-37 = "3;야쿠모;01;네? 좋은 생각이 있으시다고요?\n#3;em;[?]"
2005206-38 = "#all;hide"
2005206-39 = "#wait;150"
2005206-40 = "#wait;2500"
2005206-41 = "3;야쿠모;13;……선생님?\n#3;em;…\n#3;a"
2005206-42 = "3;야쿠모;12;저, 잘 이해가 안 가는데, 다시 한번만 설명 부탁드려도 될까요……?\n#3;stiff"
2005206-43 = "[s3] \"학생의 질문은 언제나 환영이지!\"\n[s4] \"말했던 대로, 야쿠모의 스노우 엔젤 사진을 표지로 쓰는 것이다!\""
2005206-44 = "#wait;10"
2005206-45 = "#wait;10"
2005206-46 = "3;야쿠모;02;왜죠.\n#3;em;[?]"
2005206-47 = "[s] \"스노우 엔젤은, 눈이 상당히 쌓이지 않으면 못 찍으니까.\""
2005206-48 = "3;야쿠모;01;그건 아는데, 왜 제가 하느냐는 겁니다만……?"
2005206-49 = "3;야쿠모;99;저는 보통 앞에 나서는 거 안 좋아하고."
2005206-50 = "3;야쿠모;04;솔직히, 이쁨받는 타입은 아닌데요…….\n#3;em;[속상함]"
2005206-51 = "[s5] \"바로 그렇기 때문이야.\"\n[s6] \"야쿠모가 눈 속에 파묻힌 모습을 보여주면.\"\n[s7] \"다들, 정말로 눈이 많이 왔다고 생각할 테니까.\""

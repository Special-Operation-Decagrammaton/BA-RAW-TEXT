[translation]
2005206-1 = "จิตวิทยาการบริหาร"
2005206-2 = "เพื่อยอดขายแล้ว คุณครูจะยอมทำทุกอย่างหรือเปล่าคะ?"
2005206-3 = "[s1] \"จู่ๆ มาถามอะไรแบบนี้อีกแล้วนะ ยาคุโมะ\"\n[s2] \"มีเรื่องอะไรมางั้นเหรอ?\""
2005206-6 = "พอดีว่า... ช่วงนี้พวกฉันตกอยู่ในวิกฤตนิดหน่อยน่ะค่ะ..."
2005206-7 = "อันที่จริงธุรกิจสื่อสิ่งพิมพ์ก็เจอกับวิกฤตตลอดอยู่แล้ว"
2005206-8 = "อ้อ คุณครูรู้มั้ยคะ?"
2005206-9 = "คนที่เป็นนักธุรกิจหรือผู้บริหารน่ะ อ้างได้เสมอว่าตัวเองกำลังเจอวิกฤตค่ะ"
2005206-10 = "ยอดขายที่เพิ่มขึ้นอาจทำให้อนาคตไม่แน่นอน นี่ก็เรียกได้ว่าเป็นวิกฤต"
2005206-11 = "ถ้ายอดขายลดลง ก็เป็นวิกฤตอย่างชัดเจน"
2005206-12 = "กรณีที่ทำยอดขายได้สถิติสูงสุดเป็นประวัติการณ์ ต่อไปก็ย่อมมีการลดลงของผลการดำเนินงานอย่าง#nแน่นอน"
2005206-13 = "และถ้าตีความว่ายอดขายลดลง ก็จะบอกว่านั่นก็เป็นอีกหนึ่งวิกฤตค่ะ"
2005206-14 = "พวกนักบริหารน่ะเชื่อใจไม่ได้เลยจริงๆ ฮิ ฮิ ฮิ"
2005206-15 = "[s] \"งั้นครูก็คงเชื่อยาคุโมะไม่ได้แล้วละ~\""
2005206-16 = "อ้าว"
2005206-17 = "งะ... ไหงเป็นงั้น... ล่ะคะ?"
2005206-18 = "ฉะ... ฉันล้อเล่นค่ะ ล้อเล่นจริงๆ นะ แหะๆ แหะ..."
2005206-19 = "เอาเถอะค่ะ"
2005206-20 = "สรุปว่าตอนนี้หนังสือเล่มกำลังกลายเป็นของที่ระลึกไปแล้วค่ะ"
2005206-21 = "ส่วนพวกอีบุ๊ก ตอนนี้ตลาดก็ผันผวนมากจนแทบจะคาดการณ์อนาคตไม่ได้เลย"
2005206-22 = "ฉันก็เลยคิดว่า... จะมีวิธีลัดอื่นๆ ที่จะได้ผลดีบ้างหรือเปล่าน่ะค่ะ"
2005206-23 = "ถึงจะบอกว่าต่อให้คิดหาวิธีนั้นได้ สุดท้ายมันก็จะเป็นแค่มาตรการชั่วคราวเพื่อแก้ไขปัญหาเฉพาะหน้า#nเท่านั้น"
2005206-24 = "แต่ถ้าเราแก้ปัญหาเฉพาะหน้าไปได้เรื่อยๆ ในที่สุดมันก็จะเป็นวิธีแก้ปัญหาไปเองไม่ใช่เหรอคะ?"
2005206-25 = "[s] \"งั้นคงต้องอ่านหนังสือเยอะๆ เข้าไว้ก่อนสินะ?\""
2005206-26 = "ใช่ค่ะ นั่นคือแนวทางเบื้องต้นเลยละ"
2005206-27 = "ฉันก็เลยอยากให้หิมะตกหนักๆ เลยค่ะ"
2005206-28 = "ทำไมจู่ๆ ก็พูดถึงหิมะน่ะเหรอคะ? ก็นั่นเป็นเหตุผลในการโฆษณาชวนเชื่อว่า ในวันที่หิมะตกเยอะๆ สิ่งที่ดีที่สุดคือการเลิกเรียนแล้วรีบกลับบ้านไปเสพคอนเทนต์..."
2005206-29 = "ขอโทษค่ะ ฉันขอตอบใหม่ว่า เพราะหิมะใช้เป็น 'คำแนะนำที่เป็นประโยชน์ต่อสาธารณะ' ได้ค่ะ"
2005206-30 = "[s] \"ตอนนี้ไม่ปิดบังอะไรครูแล้วสินะ...\""
2005206-31 = "แต่ฉันยังไม่ถึงกับพูดคำที่ไม่ควรพูดนะคะ..."
2005206-32 = "จะยังไงก็เถอะค่ะ สรุปว่าตอนนี้ฉันเจอปัญหาอยู่อย่างหนึ่ง"
2005206-33 = "ก็ที่เรดวินเทอร์ปกคลุมด้วยหิมะตลอดเลยน่ะสิคะ..."
2005206-34 = "ในพื้นที่ที่หิมะตกเยอะเป็นทุนอยู่แล้ว ถ้าไปบอกว่าหิมะจะตกเพิ่มขึ้น ฉันไม่รู้ว่าจะโน้มน้าวใจได้หรือเปล่า..."
2005206-35 = "[s] \"ฮืม... แต่ก็อยากสื่อว่าหิมะตกหนักมากเลยใช่มั้ย?\""
2005206-36 = "โดยสรุปแล้วก็เป็นอย่างนั้นค่ะ"
2005206-37 = "คะ? มีไอเดียดีๆ งั้นเหรอคะ?"
2005206-41 = "คุณครู...?"
2005206-42 = "ฉะ... ฉันไม่ค่อยเข้าใจเลยค่ะ ช่วยอธิบายให้ฟังอีกรอบได้มั้ยคะ...?"
2005206-43 = "[s3] \"ลองให้สโนว์แองเจิลเป็นตัวช่วยมั้ยล่ะ?\"\n[s4] \"ครูจะเสนอให้ยาคุโมะไปถ่ายรูปสโนว์แองเจิลน่ะ!\""
2005206-46 = "ทำไมล่ะคะ?"
2005206-47 = "[s] \"ก็สโนว์แองเจิลเป็นสิ่งที่ทำไม่ได้ถ้าหิมะตกไม่เยอะยังไงล่ะ\""
2005206-48 = "เรื่องนั้นฉันรู้ค่ะ แต่ที่สงสัยคือทำไมต้องเป็นฉันด้วยล่ะคะ...?"
2005206-49 = "ฉันไม่ชอบการไปอยู่เบื้องหน้าหรอกค่ะ"
2005206-50 = "บอกตามตรงว่า... ฉันไม่ใช่คนประเภทที่คนอื่นจะมาเอ็นดูหรอกค่ะ"
2005206-51 = "[s5] \"ก็เพราะอย่างนั้นละ\"\n[s6] \"ก็นั่นจะเป็นสิ่งที่เหลือเชื่อเลยไม่ใช่เหรอ?\"\n[s7] \"แบบนั้นคนจะยิ่งเชื่อว่าหิมะตกหนักจริงๆ นะ\""
2005206-57 = "ว่าไงนะคะ? ถ้าหิมะตกหนักจนถึงขนาดที่หัวหน้าชมรมสื่อสิ่งพิมพ์ที่เคยใช้ชีวิตสบายๆ ต้องมาถูกฝังอยู่ใต้หิมะ"
2005206-58 = "ทุกคนก็คงคิดว่านี่ไม่ใช่สถานการณ์ธรรมดา..."
2005206-59 = "และที่สำคัญ คุณครูคิดว่าภาพที่จะได้เห็น... น่าจะตลกดีงั้นเหรอคะ?"
2005206-60 = "กล้าบอกอย่างไม่ปิดบังเลยนะคะ..."
2005206-61 = "[s] \"เคยบอกไว้ว่าจะยอมทำทุกอย่างเพื่อยอดขายไม่ใช่เหรอ?\""
2005206-62 = "อึก... คิดไม่ถึงเลยว่าจะโดนคำพูดของตัวเองเล่นงาน...!"
2005206-63 = "งั้นก็ช่วยไม่ได้ค่ะ... ถ้าเราเขียนหรือพูดอะไรออกไปแล้ว เราก็ห้ามคืนคำนี่คะ..."
2005206-71 = "― [log=야쿠모]โอ้ว... อบอุ่นจังเลยค่ะ[/log][wa:1660] "
2005206-74 = "― [log=야쿠모]รู้สึกดีกว่าที่คิดนะเนี่ย... [/log][wa:1740] "
2005206-77 = "― [log=야쿠모]พูดจบปุ๊บ ก็หนาวขึ้นปั๊บเลยค่ะ [/log][wa:3740] "
2005206-80 = "― [log=야쿠모]ฮัดชิ่ว! [/log][wa:10] "
2005206-83 = "[ns] \"เอาละ ทำท่าสวยๆ เลย ครูจะถ่ายละนะ~\""
2005206-84 = "― [log=야쿠모]เสร็จหรือยังคะ?[/log][wa:1550] "
2005206-86 = "― [log=야쿠모]ถ้างั้นก็ ถึงตาคุณครูแล้วค่ะ[/log][wa:170] "
2005206-89 = "― [log=야쿠모]เอ๋ [/log]"
2005206-91 = "― [log=야쿠모]จะสั่งให้ฉันทำคนเดียวหรอกเหรอคะ? [/log][wa:770] "
2005206-94 = "― [log=야쿠모]อะไรกัน แบบนี้มัน [/log][wa:2020] "
2005206-96 = "― [log=야쿠모]สบายเกินไปแล้วนะคะ คุณครู[/log][wa:1800] "
2005206-99 = "― [log=야쿠모]ความหนาวในเรดวินเทอร์ [/log][wa:1510] "
2005206-101 = "― [log=야쿠모]เป็นสิ่งที่ยุติธรรมทั่วถึงทุกคนนะคะ ฮิ ฮิ ฮิ[/log][wa:1640] "

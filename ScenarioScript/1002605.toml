1002605-15 = "3;네루 바니걸;05\n#3;a\n#wait;1200"
1002605-16 = "3;네루 바니걸;03;……제 시간에 왔네. 역시 선생이야.\n#3;em;[음표]"
1002605-17 = "[s1] \"……네루?\"\n[s2] \"왜 또 그 복장을…….\""
1002605-18 = "3;네루 바니걸;06;……뭐야, 선생도 그런 반응이야? 흐음…….\n#3;em;[속상함]\n#3;stiff"
1002605-19 = "3;네루 바니걸;06;……뭐야, 선생도 그런 반응이야? 흐음…….\n#3;em;[속상함]\n#3;stiff"
1002605-20 = "3;네루 바니걸;02;역시 이거 때문이었나. 대충 예상은 했지만……."
1002605-21 = "3;네루 바니걸;05;……응? 무슨 말이냐고? 지금 뭔가 위장 임무 같은 거 하는 중이냐고?"
1002605-22 = "3;네루 바니걸;07;크하하. 아냐. 이건 그냥 입고 나온 거야.\n#3;em;[재잘]\n#3;hophop"
1002605-23 = "3;네루 바니걸;03;이제 슬슬 신발 쪽도 길들이기가 되었으니까 말이지. 꽤나 자연스럽게 행동할 수 있게 됐으니……."
1002605-24 = "3;네루 바니걸;05;그치만 역시 어색하게 안 보이려면 가끔씩은 실제로 착용하고 다니는 것도 필요할 거 같아서 말이지.\n#3;em;[반응]"
1002605-25 = "3;네루 바니걸;08;일부러라도 적어도 네다섯 번은 입어 봐야 필요할 때 자연스럽게 행동할 수 있지 않겠어?"
1002605-26 = "3;네루 바니걸;05;……응?\n#3;em;[?]"
1002605-27 = "3;네루 바니걸;02;신경 쓰이지 않냐고?"
1002605-28 = "3;네루 바니걸;08;아니, 전혀."
1002605-29 = "3;네루 바니걸;05;뭐, 그래. 아침부터 쓸데없는 시선을 많이 받긴 했지. 대충 그런 이유인가보다 하기는 했는데…….\n#3;em;…"
1002605-30 = "3;네루 바니걸;08;역시 선생이 말해주니 확실해지는군. 고마워, 확인이 됐네."
1002605-31 = "3;네루 바니걸;99;참 나. 남의 옷에 신경 쓸 시간에 자기들 앞가림이나 잘 할 것이지…….\n#3;stiff"
1002605-32 = "3;네루 바니걸;05;……뭐?\n#3;em;[반응]"
1002605-33 = "3;네루 바니걸;02;별로 개의치 않아 하는 것 같다고?"
1002605-34 = "3;네루 바니걸;08;당연하잖아? 딱히 교칙 위반을 한 것도 아닌데.\n#3;em;[?]"
1002605-35 = "3;네루 바니걸;08;그렇게 따지면 평소에 입는 옷도 마찬가지 아니겠어? 보통의 교복은 아니니까."
1002605-36 = "3;네루 바니걸;05;뭐, 어느 쪽이든 교복보다는 훨씬 낫지. 갑갑한 건 딱 질색이니까."

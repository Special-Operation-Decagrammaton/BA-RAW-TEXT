[translation]
1002605-1 = "#title;주변의 시선"
1002605-2 = "#na;(부탁을 받고, 네루가 기다리고 있다던 밀레니엄 광장으로 향했다.)"
1002605-3 = "#na;(원래부터 사람들이 많은 곳이긴 했지만 어째서인지 평소보다 조금 더 소란스러웠다.)"
1002605-4 = "#all;hide"
1002605-5 = "#wait;1500"
1002605-6 = "#na;밀레니엄 학생 A;뭔데? 무슨 일이야? 무슨 일 있어?"
1002605-7 = "#na;밀레니엄 학생 B;나, 나도 잘 모르겠어. 저게 무슨 상황인지……. 행사 같은 건가?"
1002605-8 = "#na;밀레니엄 학생 B;그럼 왜 혼자야? 그리고 왜 태연하게 강의실을 들락거려……?"
1002605-9 = "#na;밀레니엄 학생 A;글쎄……. 어? 잠깐만. 근데 저 사람, C&C의 부장 선배 아냐?"
1002605-10 = "#na;밀레니엄 학생 A;지, 진짜네……? 뭐야. 저 사람이 왜 저런 복장을……."
1002605-11 = "#na;???;여어, 선생. 여기야, 여기."

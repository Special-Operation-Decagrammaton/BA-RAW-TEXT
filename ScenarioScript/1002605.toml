[translation]
1002605-1 = "A Sea of Stares"
1002605-2 = "I headed over to Millennium Square where Neru asked me to meet her."
1002605-3 = "It's usually packed here, but for some reason it felt even noisier than usual."
1002605-6 = "What's wrong? Is something the matter?"
1002605-7 = "I-I don't know either. What's going on over there? Is it some kind of event?"
1002605-8 = "But why is she alone? And why is she just going in and out of the classrooms like nothing's wrong?"
1002605-9 = "Wait, isn't that the president of C&C?"
1002605-10 = "I-Is it really? But what's she doing in that outfit?"
1002605-11 = "Hey, Sensei. Over here!"
1002605-16 = "Just in time. I knew I could count on you."
1002605-17 = "[s1] \"Neru?\"\n[s2] \"Why are you wearing that outfit again?\""
1002605-18 = "What, you too?"
1002605-19 = "What, you too?"
1002605-20 = "So, it was because of me? I suspected that might be the case, but..."
1002605-21 = "You thought I was on some weird undercover mission?!"
1002605-22 = "Hahaha. Not at all! I just felt like wearing it!"
1002605-23 = "I've finally broken in these dang shoes. I think I look a little more natural in them."
1002605-24 = "But I have to keep practicing in them if I don't want to look awkward."
1002605-25 = "I have to wear them at least four or five more times to perfect them, don't you think?"
1002605-26 = "Huh?"
1002605-27 = "Does what bother me?"
1002605-28 = "No, not at all."
1002605-29 = "Well, I guess. I've gotten a lot of weird stares wearing this. I did kind of wonder what that was about."
1002605-30 = "Hearing it from you pretty much confirms it."
1002605-31 = "For crying out loud! They should take a look at themselves before they start gawking at other people!"
1002605-32 = "Huh?!"
1002605-33 = "It doesn't look like I really care?"
1002605-34 = "Why should I? It's not like I'm breaking any rules or anything."
1002605-35 = "And how is it different from my normal clothes? They're different from the school uniform after all."
1002605-36 = "Well, either way, it's better than a school uniform. I absolutely hate stuffy things."
1002605-40 = "*murmuring*"
1002605-43 = "Hey."
1002605-44 = "Get lost. You see something ya like?! Huh?!"
1002605-45 = "Eek!"
1002605-49 = "Hahaha! What a bunch of weaklings. They always run."
1002605-50 = "Um."
1002605-51 = "Hmm."
1002605-52 = "[s3] \"Neru?\"\n[s4] \"What's wrong?\""
1002605-53 = "Oh. It's nothing."
1002605-54 = "Oh. It's nothing."
1002605-55 = "What do you think, Sensei?"
1002605-56 = "Does it bother you too? Do I...look ridiculous to you? Weird?"
1002605-57 = "Hmm? What?"
1002605-58 = "Y-You think it's fine to dress up sometimes?"
1002605-59 = "Hahaha. You're pretty nice, Sensei."
1002605-60 = "I'm not sure how much you mean it, but it doesn't matter."
1002605-61 = "Now then, since today's classes are all done..."
1002605-62 = "and we're out here anyway, why don't we do something fun before heading back?"
1002605-64 = "Afterwards, I had fun exploring campus with Neru until I had to return to Schale that evening."
1002605-65 = "All eyes were fixed on Neru's outfit the entire time, but she didn't seem to care at all."

[translation]
1002605-1 = "สายตาของคนรอบข้าง"
1002605-2 = "(หลังจากถูกขอให้ช่วย คุณครูก็มาที่จัตุรัสมิลเลเนียมที่เนรุรออยู่)"
1002605-3 = "(ปกติที่นี่มักจะมีคนพลุกพล่านอยู่ตลอด แต่ว่าวันนี้กลับเงียบกว่าปกติ)"
1002605-6 = "อะไรน่ะ? มีอะไรๆ เกิดอะไรขึ้นเหรอ?"
1002605-7 = "ฉะ...ฉันก็ไม่รู้เหมือนกัน เกิดอะไรขึ้นตรงนั้นน่ะ... มีงานอีเวนต์เหรอ?"
1002605-8 = "แต่ทำไมถึงมีแค่คนเดียวล่ะ? แล้วทำไมถึงเข้าออกห้องเรียนได้อย่างไม่สะทกสะท้านเลยด้วย...?"
1002605-9 = "นั่นน่ะสิ... เอ๊ะ? เดี๋ยวก่อนนะ ว่าแต่ว่า... นั่นมันรุ่นพี่ที่เป็นหัวหน้าของ C&C ไม่ใช่เหรอ?"
1002605-10 = "จะ...จริงด้วย... อะไรเนี่ย? ทำไมเธอถึงได้แต่งชุดแบบนั้นล่ะ..."
1002605-11 = "เฮ้ครู! ทางนี้ ทางนี้!"
1002605-16 = "มาตรงเวลาเลยนะ สมกับเป็นครูจริงๆ"
1002605-17 = "[s1] \"เนรุ...?\"\n[s2] \"ทำไมใส่ชุดนั้นอีกล่ะ...\""
1002605-18 = "อะไรเนี่ย ครูก็ทำท่าไปกับเขาด้วยเหรอ? อืม..."
1002605-19 = "อะไรเนี่ย ครูก็ทำท่าทางกับเขาด้วยเหรอ? อืม..."
1002605-20 = "คงเป็นเพราะเจ้านี่จริงๆ สินะ ที่จริงฉันก็เดาๆ ไว้บ้างแล้ว..."
1002605-21 = "หืม...? ฉันพูดอะไรน่ะเหรอ? ฉันกำลังทำภารกิจปลอมตัวอยู่รึเปล่าน่ะเหรอ?"
1002605-22 = "ฮะฮ่าฮ่า เปล่าหรอก ก็แค่เลือกใส่ชุดนี้ออกมาเองน่ะ"
1002605-23 = "ตอนนี้ก็เริ่มชินกับรองเท้าขึ้นบ้างแล้วล่ะ พอจะขยับตัวหรือทำอะไรได้เป็นธรรมชาติบ้างแล้ว..."
1002605-24 = "แต่ว่าถ้าจะไม่ให้ดูเก้ๆ กังๆ ก็ดูเหมือนว่าจะต้องใส่ออกมาข้างนอกจริงๆ ดูบ้าง"
1002605-25 = "อย่างน้อยก็ควรใส่ดูสักสี่ห้าครั้ง แล้วพอเวลาที่จำเป็นต้องใส่จริงๆ ก็จะเคลื่อนไหวได้เป็นธรรมชาติ#nขึ้นใช่มั้ยล่ะ?"
1002605-26 = "หืม...?"
1002605-27 = "ฉันอึดอัดใจรึเปล่าน่ะเหรอ?"
1002605-28 = "ไม่นะ ไม่สักนิดเลย"
1002605-29 = "ก็นะ... ถึงจะมีคนมองฉันแปลกๆ ตั้งแต่เช้าแล้วก็เถอะ ฉันก็คิดแล้วล่ะว่าคงเป็นเพราะเรื่องนั้น..."
1002605-30 = "แต่พอครูพูดมาก็ค่อนข้างแน่ใจเลย ขอบคุณนะ ฉันแน่ใจแล้วล่ะ"
1002605-31 = "ให้ตายสิ น่าจะเอาเวลาไปสนใจเรื่องของตัวเองดีกว่ามาใส่ใจเรื่องของคนอื่นนะ..."
1002605-32 = "อะไรนะ?"
1002605-33 = "ฉันดูไม่แคร์เท่าไรเลยน่ะเหรอ?"
1002605-34 = "ก็แน่นอนอยู่แล้ว? ฉันไม่ได้แหกกฎของโรงเรียนสักหน่อย"
1002605-35 = "พูดก็พูดเถอะ มันก็เหมือนชุดที่ฉันใส่ปกติไม่ใช่รึไง? มันก็ไม่ใช่ชุดนักเรียนเหมือนกันอยู่แล้ว"
1002605-36 = "แต่ก็นะ ไม่ว่าชุดไหนก็ดีกว่าชุดนักเรียนทั้งนั้นล่ะ ฉันไม่ชอบอะไรที่มันน่าอึดอัดน่ะ"
1002605-40 = "(เสียงพูดคุยจอแจ)"
1002605-43 = "นี่..."
1002605-44 = "ยังไม่ไปกันอีกเรอะ? มีอะไรน่าดูนักรึไง!? หา?"
1002605-45 = "ฮึ่ก...!"
1002605-49 = "ฮะฮ่าฮ่าฮ่า! ยังไงก็แค่พวกขี้กลัวสินะ สุดท้ายก็หนีไปแบบนี้"
1002605-50 = "อืม..."
1002605-51 = "อืม..."
1002605-52 = "[s3] \"เนรุ...?\"\n[s4] \"ทำไมเหรอ?\""
1002605-53 = "ไม่หรอก... มันก็แค่..."
1002605-54 = "ไม่หรอก... มันก็แค่..."
1002605-55 = "แล้วครูล่ะ?"
1002605-56 = "ครูรู้สึกอึดอัดใจรึเปล่า? รู้สึกว่ามันแปลกๆ หรือว่ามันน่าขำบ้างรึเปล่า... อะไรประมาณนั้นน่ะ?"
1002605-57 = "หืม...? ไม่รู้สึกเลยเหรอ?"
1002605-58 = "บางครั้งการทำแบบนี้บ้างก็โอเคงั้นเหรอ?"
1002605-59 = "ฮะฮ่าฮ่า เป็นคนดีจริงๆ เลยนะครู"
1002605-60 = "ถึงไม่รู้ว่าพูดเอาใจฉัน หรือว่าคิดแบบนั้นจริงๆ... แต่ก็ไม่เป็นไรหรอก"
1002605-61 = "เอาละ ถ้างั้นก็... ยังไงชั่วโมงเรียนวันนี้ก็คงจบไปแล้ว..."
1002605-62 = "ไหนๆ ก็ออกมาถึงนี่แล้ว ไปเที่ยวด้วยกันหน่อยมั้ยครู?"
1002605-64 = "(หลังจากนั้นคุณครูก็ไปเที่ยวเล่นกับเนรุในวิทยาเขตจนถึงตอนเย็นก่อนจะกลับไปที่ชาเล่ต์)"
1002605-65 = "(ในตอนที่ไปเดินเที่ยวกัน ชุดของเนรุดึงดูดความสนใจของหลายๆ คนเป็นอย่างมาก แต่ดูเหมือน#nว่าเธอจะไม่ได้สนใจอะไรเลย)"

1002605-55 = "3;네루 바니걸;02;선생은 어때?"
1002605-56 = "3;네루 바니걸;06;선생도 신경 쓰여? 혹시 많이 이상하다든가, 우스꽝스럽게 보인다든가……. 그런가?\n#3;em;[땀]\n#3;stiff"
1002605-57 = "3;네루 바니걸;05;……응? 아니라고?"
1002605-58 = "3;네루 바니걸;08;가끔은 이런 식인 것도 괜찮은 거 같다고?"
1002605-59 = "3;네루 바니걸;07;……크하하. 정말 좋은 사람이구만, 선생.\n#3;em;[재잘]\n#3;hophop"
1002605-60 = "3;네루 바니걸;03;그냥 해주는 말인지 진심인지는 모르겠지만, 상관없겠지."
1002605-61 = "3;네루 바니걸;03;자아-. 그럼 뭐……. 어차피 오늘은 수업도 다 끝났겠다……."
1002605-62 = "3;네루 바니걸;07;이왕 여기까지 나온 거, 같이 좀 놀다 들어갈까? 선생.\n#3;em;[음표]"

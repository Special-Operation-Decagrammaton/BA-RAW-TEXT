[translation]
1002605-1 = "視線"
1002605-2 = "（前往了寧瑠正等待著的千年廣場）"
1002605-3 = "（這邊本來人就很多，但今天比平常更熱鬧些）"
1002605-6 = "欸欸，那是怎樣？有什麼有趣的東西嗎？"
1002605-7 = "我，我也不清楚……好像有什麼活動？"
1002605-8 = "但，今天也沒有其他夥伴……為什麼穿成那樣……？"
1002605-9 = "……？嗯？那個，不是C&C的前輩嗎……？"
1002605-10 = "咦，怎麼會穿成兔女郎的樣子……"
1002605-11 = "哦，老師。這邊這邊。"
1002605-16 = "……嘛，你很準時，原諒你。"
1002605-17 = "[s1] 「……寧瑠？」\n[s2] 「大白天的穿成這樣，總感覺很厲害呢……」"
1002605-18 = "果然連老師也是這種反應嗎。"
1002605-19 = "果然連老師也是這種反應嗎。"
1002605-20 = "哼～，果然很顯眼啊……"
1002605-21 = "……嗯？執行任務中？"
1002605-22 = "不，沒啊？我只是隨便穿穿而已。"
1002605-23 = "也習慣這雙鞋了，還算可以正常行走了唷。"
1002605-24 = "總之，和我一起去附近走走吧。"
1002605-25 = "果然有些事還是要多穿幾次才會知道呢。"
1002605-26 = "……嗯？"
1002605-27 = "視線？"
1002605-28 = "不，不會啊。"
1002605-29 = "確實，感覺比平常有更多人盯著看……"
1002605-30 = "不過，即使是老師，如果突然穿這樣出現在眼前，也會大吃一驚吧。很有參考價值。"
1002605-31 = "話說回來，這些傢伙也一臉稀奇……又不是穿給他們看的。"
1002605-32 = "……什麼？"
1002605-33 = "感覺好像我不太在意？那不是當然的嗎，"
1002605-34 = "我又沒有違反校規，也沒有做壞事。"
1002605-35 = "要這麼說的話，我們平常穿的也是女僕裝啊。"
1002605-36 = "嘛，不管怎麼說都比制服輕鬆多了。穿著那個，總感覺喘不過氣啊……"
1002605-40 = "（人聲嘈雜……）"
1002605-43 = "啊──，真是……"
1002605-44 = "所以我不是說了，不是穿給你們看的！還不給我滾！！"
1002605-45 = "噫……！？"
1002605-49 = "要逃跑的話，還不如一開始就不要來。"
1002605-50 = "不過話說回來……"
1002605-51 = "嗯……"
1002605-52 = "[s3] 「……寧瑠？」\n[s4] 「怎麼了？」"
1002605-53 = "……不，那個。"
1002605-54 = "……不，那個。"
1002605-55 = "老師覺得如何？"
1002605-56 = "其他人怎樣大驚小怪都無所謂，但老師是怎麼想的，是不是看起來很奇怪……"
1002605-57 = "……嗯？"
1002605-58 = "你說很好看……？"
1002605-59 = "……哈，這樣啊。"
1002605-60 = "雖然不知道你說的是不是客套話，嘛，那種事怎樣都無所謂。"
1002605-61 = "那麼，既然今天的課和任務都結束了……"
1002605-62 = "難得來一趟，一起玩吧？老師。"
1002605-64 = "（之後和寧瑠一起，在千年校內到處玩到晚上，才回到了夏萊）"
1002605-65 = "（在逛校園時，寧瑠一直被大家盯著看，但本人卻絲毫都不在意）"

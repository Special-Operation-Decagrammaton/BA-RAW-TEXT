[translation]
10041050-1 = "第5話;負面情緒"
10041050-4 = "……一小時前。"
10041050-7 = "聖亞出發後，於莉央的藏身處。"
10041050-12 = "……寧瑠。"
10041050-17 = "……怎麼了？"
10041050-18 = "我有件事想問你。"
10041050-19 = "不過這和我們的任務無關，我只是覺得有點擔心，所以才想私下問你。"
10041050-23 = "……是什麼事？"
10041050-24 = "雖然根據目前為止的情況，#n我大概可以推測你聽到這個問題時的反應，但我還是沒有十足的把握。"
10041050-25 = "真是的，所以到底是什麼事啦？"
10041050-26 = "假如我問了這個問題，而你的反應……"
10041050-35 = "啊啊啊啊！"
10041050-36 = "你真的是……喂！！"
10041050-37 = "你要是敢再用那種方式跟我說話，我絕對不會放過你！#n立刻給我說，我叫你直接說出來！聽懂了嗎！？"
10041050-43 = "……我知道了。"
10041050-44 = "其實我擔心的不是別的，正是百合園聖亞這個人。"
10041050-45 = "你是說那個茶會成員？#n怎麼，你是覺得他情緒不太穩定嗎？還是怕他真的會闖禍？"
10041050-46 = "不，我不這麼認為。#n我對他的信任依舊很堅定。"
10041050-47 = "其實我擔心的並不是這些，而是剛才對他說的那些話。"
10041050-48 = "話……？你對他說了什麼嗎？"
10041050-52 = "……啊，是指嘮叨的事嗎？"
10041050-53 = "雖然他看起來似乎很能接受我說的話……不僅能夠理解，甚至還反過來向我道了歉。"
10041050-54 = "然而並不是每個人表現出來的態度，都跟他們心裡所想的一樣。#n在經歷了各式各樣的事情之後，我也慢慢體會到了這一點。"
10041050-55 = "因此萬一，我是說萬一……"
10041050-59 = "我說的那些話傷害了他的感情，導致他對我的評價出現惡化……"
10041050-63 = "……啊？"
10041050-64 = "簡單來說，我是想問……百合園聖亞會不會對我抱持著負面的看法。"
10041050-65 = "如果你很難理解的話，我可以換個方式，從他的內心和情感層面……"
10041050-66 = "不是，我並不是因為聽不懂才這樣問你。"
10041050-67 = "所以你的意思是……#n「剛才自己用討人厭的語氣唸了別人幾句，要是對方因此討厭你怎麼辦」是嗎？"
10041050-68 = "……我才沒有用討人厭的語氣。"
10041050-69 = "哪沒有？分明就是討人厭的語氣啊？"
10041050-70 = "可是……可是在當時的情況下，我實在別無選擇。"
10041050-71 = "這可是關係到學園存亡的重大事件。#n必須將其擺在個人的情感之前。"
10041050-72 = "所以我無論如何都得說服他。#n為了達成這個目的，我自然得積極強調我的理由。"
10041050-73 = "但是如果先撇開這些……#n假如他因為這件事對我產生敵意或負面的情緒……"
10041050-74 = "那樣的話，我……我……"
10041050-79 = "夠了──！"
10041050-80 = "你是不是真的存心想急死我啊！？"
10041050-81 = "那傢伙怎麼可能會因為這種事情對你懷恨在心呢！"
10041050-82 = "他一看就不是那種人好不好。"
10041050-83 = "而且你不也說過那是必要的嗎？不然還能怎麼辦？"
10041050-88 = "再說了，明明是你當著人家的面把話說得那麼難聽，#n怎麼現在又在那邊煩惱「嗚嗚～要是被討厭怎麼辦～」啊？"
10041050-89 = "真的是有夠難搞。#n像你這種類型的人最麻煩了。"
10041050-90 = "話說你難道就不在乎我嗎？#n都不擔心我可能會討厭或排斥你之類的？"
10041050-91 = "為什麼你從來沒有這樣問過我？"
10041050-96 = "……美甘寧瑠。"
10041050-97 = "如果這種事發生在你身上，你是絕對不會善罷甘休的。#n我至今收集到的所有資料都能作為此事的佐證。"
10041050-98 = "無論我的反應如何，你總是會將自己的情緒和判斷擺在第一位。#n所以你根本不會，也不覺得有必要因而改變自己的想法和行動。"
10041050-99 = "你是在說我是單細胞生物嗎？"
10041050-100 = "我並沒有貶低你的意思……"
10041050-104 = "不過如果你是想問兩者之間有沒有關聯，藉此幫助理解的話……#n嗯，要這麼說也不是不行。"
10041050-109 = "好啊，你還挺會說話的嘛……#n那我就讓你見識見識我的「負面情緒」吧，混蛋！！"
10041050-115 = "住，住手……！我正在搜尋資料……！"
10041050-122 = "……！！#n監視網有反應了！"
10041050-123 = "是，是健身中心！快出發前往健身中心，寧瑠！#n現在不是做這種事的時候！！"
10041050-124 = "誰理你啊！！"

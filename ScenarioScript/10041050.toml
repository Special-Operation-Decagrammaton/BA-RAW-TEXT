[translation]
10041050-1 = "Episode 5;Negative Emotions"
10041050-4 = "One hour ago..."
10041050-7 = "Rio's hideout, right after Seia left."
10041050-12 = "...Neru."
10041050-17 = "Hm? What?"
10041050-18 = "There's something I want to ask."
10041050-19 = "But it's a personal question, not work related, so I'm not sure if I should bring it up at all."
10041050-23 = "Well, what is it??"
10041050-24 = "Based on my experiences with you so far, I can predict your reaction to the question, but not with perfect accuracy."
10041050-25 = "Are you going to ask me or what?"
10041050-26 = "If I do ask you, your reaction could be..."
10041050-35 = "Really?!"
10041050-36 = "Really-really?! Come on!"
10041050-37 = "Talk to me like that one more time, and you're done for. Just spit it out, all right?!"
10041050-43 = "...All right."
10041050-44 = "My concern is with Yurizono Seia."
10041050-45 = "The Tea Party kid? Why, you think she's too emotional? Think she's going to cause problems?"
10041050-46 = "No, I don't. In fact, I trust her entirely."
10041050-47 = "My concern, rather, is about what I said to her earlier."
10041050-48 = "\"What you said to her\"...?"
10041050-52 = "...Ah. When you scolded her."
10041050-53 = "At first, it looked like she was taking it well. I thought I'd convinced her. In fact, she actually apologized..."
10041050-54 = "...but I've come to understand that a person's external reaction does not necessarily reflect their emotional state."
10041050-55 = "So in that regard, do you think she might have..."
10041050-59 = "Do you think she might have been offended, or that it might have colored her opinion of me?"
10041050-63 = "...What?"
10041050-64 = "In short, I wonder if she might think poorly of me now."
10041050-65 = "This might be difficult to understand. Let me rephrase: due to her emotional state, and her inner—"
10041050-66 = "No, no, I didn't say \"what\" because I didn't understand."
10041050-67 = "Basically, you're asking, \"Does she think I'm a jerk because I acted like a jerk?\" Right?"
10041050-68 = "...I wouldn't say I treated her THAT harshly."
10041050-69 = "Oh, you wouldn't? Because you did."
10041050-70 = "I... I had no choice but to be direct in that situation."
10041050-71 = "This is urgent. The school's fate is at stake. That takes priority over all of our personal feelings."
10041050-72 = "I had to convince her, so I cited the strongest reasons I had."
10041050-73 = "But if that causes her to mistrust or dislike me, then..."
10041050-74 = "If that happens, then I... I..."
10041050-79 = "Ugh! Seriously, urgh!"
10041050-80 = "This is the most ridiculous thing to worry about!"
10041050-81 = "Does that even make sense? For her to sulk around and hold a grudge?"
10041050-82 = "Do you think she's the kind of person who'd do that?"
10041050-83 = "Besides, you HAD to say what you said, right? So you couldn't have done it any differently?"
10041050-88 = "And now you want to cry alone about, \"Waah, what if she hates me\"?"
10041050-89 = "You are a headache and a half, you know that?"
10041050-90 = "How about me, hmm? Am I not on your mind? Don't you ever worry that I might hate you, or at least dislike you?"
10041050-91 = "Why haven't you ever asked ME anything like that?"
10041050-96 = "...Mikamo Neru."
10041050-97 = "If you disliked me, you would let me know right away. I have all kinds of data to prove that."
10041050-98 = "You act on your feelings, regardless of what my reaction might be. You're socially simple with me, so I'm the same with you."
10041050-99 = "Did you just call me simple?"
10041050-100 = "Not in a demeaning way, but..."
10041050-104 = "...if it helps clarify the matter and establish understanding between us, then yes, I do consider you simple in some respects."
10041050-109 = "Right, good talk. You know what? Read THIS emotional state!!"
10041050-115 = "S-Stop it...! I'm in the middle of data search...!"
10041050-122 = "*gasp* I got something on the radar!"
10041050-123 = "Th-The Fitness Center! Head to the Fitness Center, Neru! Now's not the time for this!!"
10041050-124 = "Not my problem!!"

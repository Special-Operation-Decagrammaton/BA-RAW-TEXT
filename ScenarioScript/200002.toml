[translation]
200002-1 = "第2話;連邦生徒会長からの手紙"
200002-5 = "キヴォトスの皆様。"
200002-6 = "連邦生徒会統括室の室長および、連邦生徒会長代行の[ruby=なながみ]七神[/ruby]リンです。"
200002-7 = "最近、誤射による負傷者が増加しています。"
200002-8 = "軽い衝撃でも発射されることを忘れず、不用意に銃口を他人に向けないよう注意してください。"
200002-9 = "また、弾倉を抜いた後も、薬室に弾が残っていないか必ず確認しましょう。#nこまめなライフリングの手入れもお忘れなく。"
200002-10 = "最後に、連邦生徒会の認可を受けていない弾薬の使用は禁止されています。#n皆様の安全のため、ご協力をお願いいたします。"
200002-11 = "以上、キヴォトス連邦生徒会からのお知らせでした。"
200002-20 = "＜この広告はキヴォトス連邦生徒会とクロノス報道局の提供でお送りします＞"
200002-21 = "＜広告に関するお問い合わせは、クロノス報道局までご連絡ください――＞"
200002-23 = "カット！OKです！"
200002-24 = "……お疲れ様でした。"
200002-27 = "連邦生徒会長代行執務室"
200002-29 = "お、お疲れ様でした！"
200002-30 = "皆さんも準備、ご苦労様でした。"
200002-31 = "本日の収録はこれで終わりでしょうか？"
200002-32 = "ええ。改正道路交通法の施行告知と、納税推進CMの収録も終わったわ。"
200002-33 = "財務室の案件にも協力してくれてありがとう。"
200002-38 = "いやぁ～、アレを一発で終わらせるなんてね。"
200002-39 = "私には絶対無理。#nリン先輩、流石～"
200002-40 = "もしかしたら、芸能界でも活躍できたりして？"
200002-41 = "それとこれとは別でしょう……#nカメラの前に立つことを楽しんでいるわけではありません。"
200002-42 = "ところで……なぜ他部署の広報に私が？"
200002-43 = "それぞれの室長が担当した方が効果的だと思うのですが。"
200002-45 = "そ、それは……。"
200002-46 = "リン行政官……あなた、自分が連邦生徒会の顔だという自覚はあるのかしら？"
200002-47 = "あなた、露出も多いでしょう？#n顔も名前も知らない私たちがやるよりもよっぽど政策を受け入れてもらえるはずよ。"
200002-48 = "それに、以前は連邦生徒会長がやっていた業務でもあるわ。#n悪いけど、これも代行業務の一環として理解してほしいの。"
200002-50 = "……ええ、そうでしたね。#n連邦生徒会長の仕事……。"
200002-51 = "そういえば……連邦生徒会長は写真を撮るのがお好きでしたね。#n思い出を残すには写真が一番だと。"
200002-52 = "代行を続けるのなら、この業務にも慣れるべきなのでしょうか……。"
200002-56 = "写真、で思い出したのですが――"
200002-57 = "アユム。この手紙はどこで？"
200002-58 = "は、はい！？"
200002-60 = "あ……箱舟から帰ってきた時にお渡しした手紙ですね。"
200002-61 = "それが……すみません。#n私は郵便受けから持ってきただけで……差出人は分からないんです。"
200002-62 = "な、何か悪意のある内容が書かれていたり……？"
200002-64 = "いえ、そうではないのですが……。"
200002-65 = "ただ、筆跡が連邦生徒会長に似ていて――"
200002-66 = "連邦生徒会長ですか？"
200002-67 = "連邦生徒会長？"
200002-68 = "連邦生徒会長からの手紙！？"
200002-73 = "……落ち着いてください。#nまだ確定したわけではありません。"
200002-74 = "ただ、封筒に書かれた「リンちゃんへ」の筆跡が、連邦生徒会長のものと似ているというだけで……。"
200002-75 = "中に手紙は入っていませんでした。"
200002-76 = "代わりに、連邦生徒会長が撮ったと思われる写真が何枚か。"
200002-80 = "見覚えがあるものがほとんどですが……。"
200002-82 = "あははっ、リン先輩にもこんな時があったんだねぇ～#nこれいつの？"
200002-83 = "……モモカ。"
200002-84 = "これは……2年前かしら。#n連邦生徒会長が就任した頃の写真ね。"
200002-85 = "史上最年少での就任、と当時話題になりましたよね。"
200002-87 = "こっちは……夏合宿？去年？一昨年？"
200002-88 = "……一昨年です。#nただ、今は思い出に浸りたいわけではなく……。"
200002-91 = "これを見てください。"
200002-92 = "……モノクロ写真？"
200002-93 = "これは……初めて見ます。"
200002-94 = "何か特別なフィルターでもかけたのかしら？"
200002-95 = "恐らくは。今どきフィルムカメラ……それもモノクロフィルムは愛好家でもない限りほとんど使いません。"
200002-97 = "ですが、それ以上に気になるのは写真の場所です。"
200002-98 = "私の知る連邦生徒会長は、1日中執務室で激務に追われている人です。#n休日でさえもD.U.の外へは滅多に出かけません。"
200002-99 = "だというのに、この写真……#n私の知る限り、水平線が見えるほどの巨大な湖はD.U.に存在しません。"
200002-100 = "この中で、この場所に心当たりがある人は？"
200002-103 = "さあ……？"
200002-105 = "次回;奇妙な夢"

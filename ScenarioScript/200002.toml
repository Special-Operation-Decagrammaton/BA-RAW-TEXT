[translation]
200002-1 = "#title;제2화;총학생회장의 편지"
200002-2 = "#wait;1000"
200002-3 = "#wait;1500"
200002-4 = "3;린;01\n#3;a"
200002-5 = "3;린;02;안녕하세요, 키보토스의 시민 여러분."
200002-6 = "3;린;00;총학생회 통괄실의 실장이자 총학생회장 대행 업무를 맡고 있는 나나가미 린이라고 합니다."
200002-7 = "3;린;02;최근 총기 오발 사고로 인해 불의의 부상을 입는 시민들이 여럿 발생하고 있습니다."
200002-8 = "3;린;00;총기는 가벼운 충격 만으로도 격발될 수 있으니, 언제나 총구는 사람을 향하지 않게 하시고 탄창을 제거한 빈 총도 약실을 반드시 확인하시길 바랍니다."
200002-9 = "3;린;01;총기 강선에 이물질이 끼지 않도록 총기 손질을 생활화하시고, 총학생회의 허가를 받지 않은 불법 조병창에서 제조한 탄약은 쓰지도 권하지도 맙시다."
200002-10 = "3;린;03;여러분의 작은 실천이 안전한 키보토스를 만듭니다."
200002-11 = "3;린;02;이상, 키보토스 총학생회에서 보내드립니다."
200002-12 = "#st;[0,0];instant;1;"
200002-13 = "#clearST"
200002-14 = "#zmc;move;0,1250;3025;50\n#all;hide\n#wait;50"
200002-15 = "#zmc;move;0,-1250;3025;50\n#wait;50"
200002-16 = "#zmc;move;0,800;3025;50\n#wait;50"
200002-17 = "#zmc;move;0,-800;3025;50\n#wait;50"
200002-18 = "#zmc;move;0,1100;3025;50\n#wait;50"
200002-19 = "#zmc;move;0,0;3025;50\n#wait;1000"
200002-20 = "#zmc;instant;0,0;3025\n#na;<이 광고는 키보토스의 공익을 위해 키보토스 총학생회와 크로노스 보도국이 공동으로 제작하였습니다.>"
200002-21 = "#zmc;instant;0,0;3025\n#na;<광고 문의 및 상담은 크로노스 보도국으로 연락바랍니다—>"
200002-22 = "3;린;99\n#3;a"
200002-23 = "3;린;99\n#na;촬영 감독;컷! OK 입니다!"
200002-24 = "3;린;02;……수고 많으셨습니다."
200002-25 = "#st;[0,0];instant;1;"
200002-26 = "#clearST"
200002-27 = "#place;총학생회장 대행 집무실"
200002-28 = "#wait;2500"
200002-29 = "3;린;02\n5;아유무;03;수, 수고 많으셨어요. 선배!\n#3;m2\n#5;al\n#5;em;[!]"
200002-30 = "3;린;03;다들 방송 준비하느라 수고 많으셨습니다."
200002-31 = "3;린;02;오늘 녹화 예정이었던 영상은 이것으로 모두 끝인가요?\n#3;em;[?]"
200002-32 = "3;린;02\n1;아오이;02;응. 새로운 도로교통법 시행 안내 고지와 세금 납부 장려용 CM의 녹화도 모두 끝났으니까.\n#1;ar\n#3;m3"
200002-33 = "1;아오이;03;재무실의 일에 협조해주어서 고마워, 선배."
200002-34 = "#st;[0,0];instant;1;"
200002-35 = "#clearST"
200002-36 = "1;아오이;03\n3;린;02\n5;아유무;03\n#1;h\n#3;h\n#5;h\n#1;d\n#3;d\n#5;d\n#wait;1000"
200002-37 = "3;모모카;12\n#3;a\n#wait;1000"
200002-38 = "3;모모카;13;이야~ 대단하던 걸, 선배. 그 긴 대사를 토씨 하나 안 틀리고 한 컷 만에 OK를 받다니.\n#3;em;[음표]"
200002-39 = "3;모모카;10;나였더라면 카메라가 신경 쓰여서 계속 말을 더듬었을 거야."
200002-40 = "3;모모카;07;어쩌면 선배에게는 연예인의 재능이 있을지도……?"
200002-41 = "3;린;36;저라고 해서 카메라 앞에 서는 걸 즐기는 건 아닙니다만.\n#3;em;[속상함]"
200002-42 = "3;린;42;그나저나, 어째서 제가 총괄실이 아닌 다른 부서의 홍보 영상에까지 출연해야 하는 거죠?"
200002-43 = "3;린;09;각 실의 정책 홍보는 제가 아니라 실장들이 직접 진행하는 편이 더 효과적일 텐데요."
200002-44 = "#all;hide"
200002-45 = "4;아오이;01\n2;아유무;04;그, 그건 그러니까……\n#2;em;[땀]"
200002-46 = "4;아오이;03;그야 당연하잖아? 총학생회의 얼굴은 린 행정관이니까."
200002-47 = "2;아유무;04\n4;아오이;02;시민들 입장에서도 이름 모를 실장이 새로운 시책을 설명하는 것보다 평소에도 자주 접해서 낯이 익은 총학생회장 대행의 입으로 이야기를 듣는 쪽이 편할 거야.\n#4;m3\n#2;dl"
200002-48 = "4;아오이;03;전에도 이런 홍보 CM에는 총학생회장이 직접 출현했으니까. 조금 불편하더라도 이해해줘."
200002-49 = "#all;hide"
200002-50 = "3;린;25;……그렇군요. 총학생회장의 일이라."
200002-51 = "3;린;22;그러고 보니 총학생회장은 언제나 사진 찍는 걸 좋아했었죠. 추억을 남기는 데에는 사진이 제일이라며."
200002-52 = "3;린;99;역시 높은 자리에 오르려면 카메라 앞에서 서는 것도 즐길 줄 알아야 하는 법일까요.\n#fontsize;50"
200002-53 = "#st;[0,0];instant;1;"
200002-54 = "#clearST"
200002-55 = "3;린;99\n#3;em;…\n#wait;2500"
200002-56 = "3;린;02;그러고 보니 카메라 하니 떠올랐는데.\n#3;em;[반응]"
200002-57 = "3;린;01;아유무, 혹시 이 편지를 어디서 받았는지 기억하고 있나요?"
200002-58 = "3;아유무;04;네, 네?!\n#3;shake\n#3;em;[?!]"
200002-59 = "#all;hide"
200002-60 = "#na;아유무;아…… 방주에서 돌아왔을 때 전해드렸던 그 편지군요."
200002-61 = "#na;아유무;그게, 죄송합니다만 저도 우편함에 꽂혀 있던 것을 가져온 것뿐이라…… 출처나 발신인은 잘 모르겠네요. 죄송합니다……"
200002-62 = "#na;아유무;호, 혹시 뭔가 안에 나쁜 내용이라도……"
200002-63 = "3;린;01\n#3;a"
200002-64 = "3;린;99;아뇨. 특별한 내용은 적혀 있지 않았습니다. "
200002-65 = "3;린;02;다만 이 편지에 적힌 필체가 총학생회장의 것과 비슷해서—"
200002-66 = "3;아유무;10;총학생회장이요?\n#3;em;[?]\n#3;closeup\n#fontsize;80"
200002-67 = "3;아오이;05;총학생회장?\n#3;closeup\n#fontsize;80"
200002-68 = "3;모모카;04;총학생회장이 편지를 썼다고?!\n#3;em;[?!]\n#3;shake\n#3;closeup\n#fontsize;80"
200002-69 = "#st;[0,0];instant;1;"
200002-70 = "#clearST"
200002-71 = "3;모모카;04\n#3;closeup\n#3;d\n#wait;1000"
200002-72 = "3;린;08\n#3;a\n#wait;1000"
200002-73 = "3;린;08;……모두 진정하세요. 아직 정확히 확인된 내용은 아니니까요.\n#3;em;[한숨]"
200002-74 = "3;린;02;봉투 겉에 적힌 ‘린 쨩에게’ 라는 글씨는 총학생회장의 필적과 유사합니다만……"
200002-75 = "3;린;00;정작 편지 안에는 아무런 내용도 쓰여 있지 않았습니다."
200002-76 = "3;린;02;대신, 봉투 안에는 총학생회장이 찍은 것으로 보이는 여러 장의 사진이 들어있었습니다."
200002-77 = "#all;hide"
200002-78 = "#wait;1500"
200002-79 = "#all;hide"
200002-80 = "#na;린;대부분은 제가 기억하고 있던 때의 사진입니다만……"
200002-81 = "#all;hide"
200002-82 = "#na;모모카;아하하, 이거 언제 찍은 거야? 린 선배한테도 이런 시절이 있었네~"
200002-83 = "#na;린;……모모카."
200002-84 = "#na;아오이;2년 전, 총학생회장이 막 취임했을 때의 사진이군요."
200002-85 = "#na;아유무;아, 저도 기억나요. 당시 역대 최연소 총학생회장이 취임했다며 화제가 되었지요."
200002-86 = "#all;hide"
200002-87 = "#na;모모카;이건 여름 하계 합숙 때 사진이지?"
200002-88 = "#na;린;……네. 다만 제가 이 사진들을 보여드리는 이유는 추억을 회상하려는 것이 아니라……"
200002-89 = "#all;hide"
200002-90 = "#wait;2500"
200002-91 = "#na;린;이 사진 때문입니다."
200002-92 = "#na;모모카;……흑백 사진?"
200002-93 = "#na;아유무;저도 처음 보는 사진이네요……"
200002-94 = "#na;아오이;뭔가 특별한 필터나 처리를 해서 인쇄한 걸까?"
200002-95 = "#na;린;아마도 그렇겠지요. 요새는 대부분이 디지털 방식의 인화— 필름을 쓰더라도 흑백 필름을 쓰는 카메라는 거의 없으니까요."
200002-96 = "3;린;01\n#3;a"
200002-97 = "3;린;01;제가 신경 쓰이는 것은 다름이 아니라 이 사진이 찍힌 장소."
200002-98 = "3;린;01;제가 아는 총학생회장은 매일 격무를 처리하느라 바빴기 때문에 대부분의 시간을 총학생회 건물 내에서 보냈고, 휴일에도 D.U. 밖으로 나간 일은 드물었습니다."
200002-99 = "3;린;01;그런데 수평선이 보일 정도로 거대한 규모의 이 호수는…… 제가 아는 한 D.U.에는 존재하지 않습니다."
200002-100 = "3;린;01;혹시 이 장소가 어디인지 아시는 분, 계신가요?"
200002-101 = "#all;hide"
200002-102 = "#wait;2500"
200002-103 = "#na;모모카;글쎄………."
200002-104 = "#continued"
200002-105 = "#nextepisode;다음화;기묘한 꿈"

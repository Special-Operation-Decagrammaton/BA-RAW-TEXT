[translation]
62070-1 = "Episode 7;Porta Pacis 1"
62070-3 = "[ns] \"What...is that?\""
62070-4 = "W-Well... I don't actually know either. It's a building here, in Arius. "
62070-5 = "I think it's really, really old. But that's pretty much it. The Squad might know, though."
62070-7 = "All I know is that it means \"Gate of Peace\"..."
62070-8 = "...And that its doors are never to be opened."
62070-10 = "Yes. Arius had a revolving door of leaders during its long history of civil wars."
62070-11 = "Despite that, every faction respected the law to never approach Porta Pacis."
62070-12 = "...Thinking about it now...I wonder what manner of things could possibly be hidden there."
62070-13 = "All these people who hated each other were able to agree on just this one subject."
62070-14 = "We were too focused on survival to think about things like that then..."
62070-15 = "They always told us first-years that it wasn't our business and to not go snooping."
62070-16 = "..."
62070-17 = "I've only heard rumors."
62070-18 = "But one says that there are secrets of Arius' past buried there, ones that no one is meant to know."
62070-19 = "[s] \"About Arius' past?\""
62070-23 = "But I've heard all about the history of Arius from my seniors..."
62070-24 = "Yes, but what you heard was Trinity's records. Because, publicly, that's all that's known."
62070-25 = "...We never had the chance to inspect them ourselves, but we grew up learning that everything written in Trinity's public records is nonsense."
62070-26 = "L-Like how the excommunication was inevitable once Arius escalated to violence at the Council..."
62070-27 = "Arius had no one to blame but ourselves for our exile. And on and on."
62070-28 = "They say history is written by the victors...and that rings especially true here."
62070-33 = "..."
62070-34 = "[s] \"Atsuko?\""
62070-35 = "Hm? Yes, Sensei?"
62070-36 = "Do I have something to say?"
62070-37 = "..."
62070-38 = "If I may ask, Sensei..."
62070-39 = "Do you know of any students well-versed in the darker aspects of history between Trinity and Arius?"
62070-40 = "...That's impossible, Atsuko. How would they know any better?"
62070-41 = "No, it's always possible. Because, no matter where you look, you'll always find those who pursue and preserve the truth."
62070-42 = "Trinity's Library Committee, perhaps?"
62070-43 = "[s] \"Since when do you know about the Library Committee?\""
62070-44 = "I don't know much about the students themselves, but I've heard of them, at least."
62070-45 = "I've also heard that their president has quite an...impressive personality, amongst other things."
62070-46 = "[s] \"(...She's not...wrong...)\""
62070-47 = "H-How? We never received that kind of intel..."
62070-48 = "Fufu. I do wonder."
62070-49 = "Perhaps it is simply...the privilege of my royal lineage?"
62070-50 = "There's our Hime."
62070-51 = "R-Right...! U-Usually, someone like me shouldn't even be looking at the princess..."
62070-52 = "Now, now. That's not me anymore. Now, I'm Atsuko."
62070-56 = "Wh-What?! B-B-B-B-But...!"
62070-57 = "We're both first-years, aren't we? Maia?"
62070-58 = "Th-That is true! But still...!"
62070-59 = "Let's practice. Ah-tsu-koh!"
62070-63 = "A-Atsuko..."
62070-64 = "Yes. Good job. Here, a handshake."
62070-65 = "Eeek..."
62070-70 = "...Atsuko had secrets of her own she had to keep."
62070-71 = "It's an inevitable side effect of her position and status. She was inherently entitled to higher-level intel."
62070-72 = "So that's why...you didn't...tell us about them..."
62070-73 = "Yes, I apologize. At the time, if I had spoken too carelessly..."
62070-74 = "It would have been our lives on the line."
62070-75 = "E-Eeeek..."
62070-76 = "And after we left Arius, well, what was the point?"
62070-77 = "Yes. But now it does matter."
62070-78 = "[s] \"I get it, Atsuko.\""
62070-82 = "[ns] \"I'll try reaching out to Ui.\""
62070-83 = "\"Ui.\" So that's her name."
62070-88 = "I'll leave it to you then, Sensei."
62070-97 = "Am I some kind of handy encyclopedia to you?!?!"
62070-102 = "E-Eeek...! She's scary...so scary...!"
62070-103 = "Wh-Whoaaaa... She's scary...so scary...!"
62070-104 = "You're s-scared too, Hiyori? I didn't think the Squad members were scared of anything."
62070-105 = "B-But there are so many things to be scared of in the world..."
62070-111 = "[ns1] \"Sorry, I'm really sorry...\"\n[ns2] \"How about 20 coupons for an americano? For 'White & Mason!'\""
62070-117 = "President, do not accept that offer! This is an opportunity to repay Sensei for all they've done for us, not squeeze them for caffeinated drinks!"
62070-119 = "B-But..."
62070-120 = "If you even think about it, I'll drag you on a \"business trip\" all the way to Sensei's location!"
62070-121 = "Aaaah?!"
62070-127 = "She truly lives up to her reputation."
62070-128 = "[s] \"I'm sorry. That's just how Ui is.\""
62070-129 = "Hello, Ui, Shimiko. I am Hakari Atsuko, from Arius Satellite School. Nice to meet you."
62070-130 = "Joumae Saori."
62070-131 = "...Imashino Misaki."
62070-132 = "I'm Tsuchinaga Hiyori... H-Heehee... Um, I heard Trinity's old library is a renowned library in Kivotos..."
62070-133 = "Do you also have things like...past issues of magazines?"
62070-134 = "Yes, Hiyori. We do have electronic copies of magazines, for record-keeping purposes. Would you like me to deliver you some through Sensei?"
62070-138 = "R-Really?! Th-Thank you! B-But I don't have anything to offer in return..."
62070-139 = "It's okay. Anyone who appreciates the persevering importance of the printed medium is our ally."
62070-140 = "Waaaaaah! I'm so glad to be alive...!"
62070-141 = "Excuse me for my late introduction. I am Endou Shimiko."
62070-146 = "What? I-I need to introduce myself too?! Ah! Uh, um... I'm Tachigi Maia... Nice to meet you..."
62070-151 = "..."
62070-152 = "President?"
62070-156 = "W-Well... *sigh* I'm Kozeki Ui... Moving on to the topic at hand..."
62070-157 = "[s] \"You read about our current situation on MomoTalk, right?\""
62070-158 = "Yes. We investigated every avenue available, and I believe we were able to find what you wanted, Sensei."
62070-159 = "You found them?! But..."
62070-160 = "...Of course, these are classified as banned books in Trinity... "
62070-161 = "I can understand why some of these resources shouldn't be made available to the public, but..."
62070-162 = "It's all because of the Tea Party and Sisterhood's stubbornness... Their handling of this has been so egregious that it's making them look suspect."
62070-163 = "...But we're Trinity's Library Committee, and keepers of the old library, on top of that. We were able to find most of what you needed."
62070-164 = "Of course, our information on other academies may not be completely accurate..."
62070-165 = "...but even that is just another manifestation of Trinity's past."
62070-166 = "Those authoritative scum always want to twist the narrative to their advantage..."
62070-167 = "So they lie, and cover things up, and use more lies to hide their tracks!"
62070-168 = "...But in this case..."
62070-169 = "Could you tell us what you know, Ui?"
62070-170 = "I am asking as someone who was once called the royal blood of Arius."
62070-174 = "\"Royal blood\"? You?"
62070-175 = "[s] \"Yes. She's telling the truth.\""
62070-179 = "..."
62070-180 = "I was going to tell you everything I knew, regardless, just so you know."
62070-181 = "But since Sensei is vouching for you as well, there's really no need to hold back."
62070-185 = "Porta Pacis was originally intended to be used exactly as its name suggests."
62070-186 = "Yes. It was going to be the Gate of Peace."
62070-187 = "...It was built when Arius Satellite School first split off from the Trinity General School."
62070-188 = "Surprisingly, back then...both Trinity and Arius thought this conflict...would be peacefully resolved..."
62070-189 = "...However, that wasn't the case at all, yes?"
62070-190 = "...Yes."
62070-191 = "Well, even our records get a little blurry when it comes to that time in history."
62070-192 = "...There's a saying that the true horror of power lies not in recording things, but in not recording things at all."
62070-193 = "So, we weren't sure about this part..."
62070-194 = "...It's rather inconsequential in the grand scheme of things, but I will summarize briefly."
62070-195 = "The endless civil war in Arius began with a dispute over the completion of Porta Pacis."
62070-199 = "But wasn't it the Gate of PEACE? That's the opposite of what it stands for, isn't it?!"
62070-200 = "A-Am I allowed to be here right now?"
62070-202 = "You'd be surprised at how often monuments like these become divisive symbols."
62070-203 = "There are inherent limitations to the concept of symbols, just like this one. People tend to rebel when they feel like something is being forced upon them."
62070-204 = "Yeah. There were people who thought the Gate of Peace was a farce."
62070-205 = "But there were also others that said that it didn't matter if it didn't bring about peace. It symbolized the belief that peace would eventually come."
62070-206 = "There was one belief at the core of each side: that any negotiations with Trinity would be impossible..."
62070-207 = "...and that negotiations were the only way forward."
62070-209 = "And so, civil war."
62070-210 = "Yes. The anger that had been directed outwards began to turn inwards."
62070-211 = "That should sum up what you need to know. "
62070-212 = "It happened too long ago and was too violent of a time for Arius to possess any proper records either."
62070-213 = "But the seed of anger that was planted then...it has passed down from generation to generation."
62070-214 = "A seething hatred towards Trinity, an even greater hatred towards ourselves."
62070-215 = "...In the present, it's simply a story from our history books."
62070-216 = "...People are beings capable of empathy, after all..."
62070-217 = "As we've evolved, we've reached a point where we're able to empathize with others."
62070-218 = "And we're able to apply that same empathy when studying history."
62070-219 = "We can understand the emotions and perspectives of the people from those times still."
62070-220 = "Yes, that's exactly how the anger festering in Arius has continued to pass down."
62070-221 = "The faction against the Porta Pacis as a symbol of peace was the first to emerge victorious during the long war."
62070-222 = "They decided to construct a massive underground archive to create and set guidelines for Arius."
62070-223 = "There was an archive under Porta Pacis?!"
62070-224 = "Yes. And that archive...is a record of everything that has ever happened in Arius."
62070-225 = "...It sounds just like the Trinity library."
62070-226 = "Recording something for the future to one day see...is something like humanity's instinct... It's like a universal desire..."
62070-228 = "Yes. So the archive of Porta Pacis served as a library and archive for Arius."
62070-229 = "However, if my knowledge is correct, the party that held power in Arius about 150 years ago..."
62070-230 = "...designated Porta Pacis and its archive as restricted."
62070-231 = "[s] \"Why?\""
62070-232 = "No one knows. I only have my own speculations."
62070-233 = "Perhaps it's because they couldn't handle it anymore."
62070-234 = "All the stories that kept piling up, and the dark emotions linked to them."
62070-235 = "[s3] \"...I see.\"\n[s4] \"I might understand that a little...\""
62070-238 = "...So, an information blackout... Trinity suffers from those too."
62070-239 = "Seriously, authority figures are always..."
62070-240 = "Solely from governing and ruling perspectives, stoking some level of anger in your subjects can be a beneficial tool, but excessive amounts can backfire."
62070-241 = "...We see it in history again and again: someone mobilizes a group of agitators to seize power, and then eliminates them as soon as they get what they want."
62070-243 = "I-Is that really how the outside world works...? I'm scared, Hiyori... I'm scared..."
62070-244 = "M-Me too... I'm losing my strength to live on. Waaaah... "
62070-245 = "But Shimiko said she'll send us copies of magazines, so I'll try to hold on to hope a little longer..."
62070-247 = "I mean, the same thing happened in Arius too..."
62070-248 = "I see. So Arius' history was passed down by oral tradition after that."
62070-249 = "Yeah. However, Arius' ruling power changed hands constantly until Madame... Until Beatrice took control."
62070-250 = "Which is why each of them restricted access to Porta Pacis."
62070-251 = "...You finally said her name."
62070-252 = "Yes. I think it's about time I should."
62070-253 = "But there were definitely side effects of passing down history orally."
62070-254 = "...To put it simply, everyone's stories were slightly different."
62070-256 = "That's how it usually goes without written records."
62070-257 = "Some things get exaggerated, some things get lost, some things get distorted by emotions..."
62070-258 = "The history of Arius we were taught is probably a very distorted version of the truth."
62070-259 = "Yes. I don't believe anyone would find anything groundbreaking from releasing the records in Porta Pacis either."
62070-260 = "In fact, reviewing the records may become the first step to normalizing Arius."
62070-261 = "But then...what does Subaru want there?"
62070-262 = "Subaru probably knew \"something.\""
62070-263 = "Although I cannot say what the exact process was, after Beatrice disappeared, Arius was warped into...a place where the rules of reality were twisted. Anything was possible."
62070-264 = "Th-That's...true... Which is why, until Subaru regained order...this place was..."
62070-265 = "*sob*"
62070-266 = "Now, now. Don't cry. I'm sorry. I'm going to tell you all something now, something only I know."
62070-267 = "Although, I suppose Subaru likely knows of it now as well."
62070-272 = "What...is it?"
62070-277 = "It's the mystery of Arius, hidden in Porta Pacis."
62070-281 = "Next Episode;Porta Pacis 2"

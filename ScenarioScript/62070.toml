62070-132 = "3;히요리;03;츠치나가 히요리, 입니다……. 헤, 헤헤……. 저기, 트리니티 고서관은 키보토스에서도 알아주는 도서관이라고 들었는데요…….\n#3;em;[///]\n#3;stiff"

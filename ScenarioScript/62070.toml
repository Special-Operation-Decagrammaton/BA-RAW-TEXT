62070-134 = "1;통신시미코;02;네. 히요리 씨. 스크랩 용도로 전자 보관 중인 잡지 자료들이 있어요. 나중에 선생님 편으로 데이터 이전해 드릴까요?\n#1;h\n#1;a\n#3;m5"

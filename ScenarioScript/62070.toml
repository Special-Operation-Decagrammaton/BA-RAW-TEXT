[translation]
62070-1 = "#title;제7화;포르타 파시스 1"
62070-2 = "#wait;300"
62070-3 = "[ns] \"그게…… 뭐야?\""
62070-4 = "3;마이아;04;사, 사실 저도…… 잘, 몰라요. 그냥, <포르타 파시스>라는 건물이 아리우스에 있어 왔고…… \n#3;em;[땀]\n#3;a"
62070-5 = "3;마이아;21;그 건물이, 아주 오래되었다는 것만, 아는 정도예요. 스쿼드 분들은 다를 수도 있겠지만……."
62070-6 = "#all;hide"
62070-7 = "3;히요리;04;저희라고 해도 마찬가지인데요……. 그 뜻이 <평화의 문>이라는 것과…….\n#3;em;[세로선]"
62070-8 = "3;미사키;05;……절대로 그곳의 문을 열어서는 안 된다는 말 정도였지."
62070-9 = "#all;hide"
62070-10 = "3;사오리;S2_05;그래. 아리우스는…… 언제부터 시작되었는지도 모를 내전으로, 자주 지배 세력이 바뀌고는 했지만.\n#3;em;…"
62070-11 = "3;사오리;S2_06;그 모두가 공통으로, '포르타 파시스에는 접근하지 말 것'을 철칙처럼 지켰다."
62070-12 = "3;사오리;S2_16;……지금 생각해 보면, 거기에 얼마나…… 말로 표현할 수 없을 것이 숨겨져 있기에, 그렇게 서로를 없애려 했던 자들이."
62070-13 = "3;사오리;S2_17;그 철칙 하나만은 그토록 필사적으로 지키려 했던 것인지, 의문이 들 지경이지만…….\n#3;em;[속상함]\n#3;stiff"
62070-14 = "3;히요리;06;네, 네에……. 그때는 모두가, 하루하루 버텨내는 데 바빴으니까, 다른 생각을 할 여유가 없기도 했죠……."
62070-15 = "3;마이아;04;저는, 1학년이니까…… 그런 건 알 필요도 없고, 알려고 해서도 안 된다고만, 들었어요……."
62070-16 = "3;아츠코;S2_05;……."
62070-17 = "3;사오리;S2_18;다만, 이것은 어디까지나 건너 들은 이야기에 지나지 않지만……."
62070-18 = "3;사오리;S2_05;거기에는 아무에게도 알려지지 않았던, 아리우스의 과거에 대한 것들이 숨겨져 있다는 말을 듣기는 했다."
62070-19 = "[s] \"아리우스의 과거?\""
62070-20 = "#st;[0,0];instant;1;"
62070-21 = "#clearST"
62070-22 = "3;마이아;02\n#3;em;[?]\n#3;h\n#wait;1000"
62070-23 = "3;마이아;06;그랬던 건가요……? 하지만 그런 건 보통, 선배들로부터 이야기로 전해 들어 왔는데……."
62070-24 = "3;미사키;99;그랬을 거야. 아리우스의 과거는, 적어도 대외적으로는 트리니티의 공식 기록으로 남은 것이 전부이기도 하고.\n#3;em;[한숨]"
62070-25 = "3;미사키;02;……정작 우리가 트리니티의 공식 기록에 대해 자세히 알아볼 기회는 없었지만, 교육받은 대로라면, 그 대부분이 날조와 은폐로 가득하다고 들었어."
62070-26 = "3;히요리;04;가, 가령 공의회에서 아리우스가 먼저 물리적인 충돌을 일으켰기에, 불가피하게 파문을 명할 수밖에 없었다거나…….\n#3;stiff"
62070-27 = "3;사오리;S2_06;……그 당시의 아리우스를 이곳으로 보낼 수밖에 없었던 것은, 그들이 자초한 결과라고 했다던가. 뭐, 그런 이야기였지.\n#3;em;[속상함]"
62070-28 = "3;사오리;S2_05;역사는 승자의 기록이라는 말이 있지만, 이런 경우는…… 특히 더 그렇다고 볼 수 있을 것이고."
62070-29 = "#st;[0,0];instant;1;"

[translation]
62070-1 = "ตอนที่ 7;ปอร์ตาปาซิส 1"
62070-3 = "[ns] \"มันคือ... อะไรเหรอ?\""
62070-4 = "ทะ... ที่จริงฉันก็... ไม่แน่ใจเหมือนกันค่ะ เท่าที่ฉันรู้คือในอาเรียสมีอาคารหลังหนึ่งที่ชื่อว่า <ปอร์ตาปาซิส>... "
62070-5 = "แล้วมันก็เป็นอาคารที่เก่าแก่มาก บางทีสควอดอาจจะรู้มากกว่าฉันก็ได้ค่ะ..."
62070-7 = "พวกฉันก็ไม่ต่างกันหรอกค่ะ จะรู้ก็แค่มันหมายความว่า <ประตูแห่งสันติภาพ>..."
62070-8 = "แล้วก็ไม่ควรเปิดประตูของที่แห่งนั้นเลยด้วย..."
62070-10 = "ใช่... อาเรียสต้องเผชิญกับสงครามกลางเมืองที่ไม่รู้ว่าเริ่มต้นตั้งแต่ตอนไหน และระหว่างนั้นอำนาจปกครองก็เปลี่ยนแปลงอยู่บ่อยครั้ง"
62070-11 = "แต่ทุกขั้วอำนาจก็รักษากฎเหล็กข้อหนึ่งไว้เหมือนกัน นั่นก็คือ 'ห้ามเข้าใกล้ปอร์ตาปาซิส'"
62070-12 = "พอมาคิดดูตอนนี้ ฉันก็อดสงสัยไม่ได้ว่าที่นั่นน่าจะมีอะไรบางอย่างที่อธิบายเป็นคำพูดไม่ได้ซ่อนอยู่..."
62070-13 = "พวกคนที่พยายามทำลายกันเองก็เลยรักษากฎเหล็กข้อนั้นอย่างเอาเป็นเอาตาย..."
62070-14 = "ค่ะ ค่ะ... ตอนนั้นทุกคนเอาแต่คิดถึงการเอาชีวิตให้รอดในแต่ละวัน ก็เลยไม่มีเวลาไปคิดเรื่องอื่นค่ะ..."
62070-15 = "ส่วนฉันก็ถูกสอนว่ายังเป็นแค่เด็กชั้นปีที่ 1... ก็เลยไม่จำเป็นต้องรู้เรื่องแบบนั้น แล้วก็ไม่ควรพยายามหาคำตอบด้วยค่ะ..."
62070-16 = "..."
62070-17 = "นี่เป็นสิ่งที่ฉันบังเอิญได้ยินมาน่ะ..."
62070-18 = "ได้ยินมาว่าที่นั่นซ่อนเรื่องราวในอดีตของอาเรียสไว้ อดีตที่ไม่เคยมีใครล่วงรู้มาก่อน"
62070-19 = "[s] \"อดีตของอาเรียสเหรอ?\""
62070-23 = "งั้นเหรอคะ...? แต่ปกติแล้วเรื่องแบบนั้นพวกรุ่นพี่จะเล่าให้รุ่นน้องฟังปากต่อปากอยู่แล้วนี่คะ..."
62070-24 = "ต้องเป็นอย่างนั้นละ อย่างน้อยเท่าที่รู้ได้จากภายนอก อดีตทั้งหมดของอาเรียสมีแค่ที่อยู่ในบันทึกอย่าง#nเป็นทางการของทรีนิตี้"
62070-25 = "ถึงพวกเราไม่มีโอกาสได้เห็นบันทึกอย่างเป็นทางการของทรีนิตี้ แต่เท่าที่เราถูกสอนมา เนื้อหาในบันทึกส่วนใหญ่เต็มไปด้วยการปกปิดและการปลอมแปลง..."
62070-26 = "ยะ... อย่างเช่นที่บอกว่าอาเรียสเป็นฝ่ายเริ่มปะทะก่อนในการประชุมสภา จึงสมควรแล้วที่ต้องโดนขับไล่ออกมา..."
62070-27 = "และการส่งอาเรียสมาที่นี่ในตอนนั้นเป็นสิ่งที่หลีกเลี่ยงไม่ได้ และนั่นก็เป็นผลจากการกระทำของ#nอาเรียสเอง เท่าที่ได้ยินมาก็ประมาณนี้ละ"
62070-28 = "มีคำกล่าวที่ว่า 'ประวัติศาสตร์คือบันทึกของผู้ชนะ' ในกรณีนี้... ฉันว่ามันก็มองแบบนั้นได้"
62070-33 = "..."
62070-34 = "[s] \"อาสึโกะ?\""
62070-35 = "หืม? ทำไมเหรอ คุณครู?"
62070-36 = "มีอะไรที่ฉันอยากพูดหรือเปล่าน่ะเหรอ?"
62070-37 = "..."
62070-38 = "คุณครู"
62070-39 = "คิดว่าจะมีนักเรียนที่รู้เกี่ยวกับ... ประวัติศาสตร์ 'ที่ซ่อนอยู่' ของทั้งฝั่งทรีนิตี้และอาเรียสหรือเปล่า?"
62070-40 = "จะไปมีได้ยังไงล่ะ อาสึโกะ... เด็กแต่ละโรงเรียนก็น่าจะรู้แค่สิ่งที่ตัวเองได้รับการปลูกฝังมานั่นละ"
62070-41 = "ก็คงจะเป็นอย่างนั้น แต่ฉันแค่ถามเผื่อๆ น่ะ ก็คนที่พยายามแสวงหา 'ความจริง' ด้วยตัวเอง มีอยู่ทุกหนทุกแห่งใช่ไหมล่ะ?"
62070-42 = "อย่างเช่น 'ชมรมอ่านหนังสือ' ของทรีนิตี้ไง?"
62070-43 = "[s] \"เด็กๆ ชมรมอ่านหนังสือรู้เรื่องนี้เหรอ?\""
62070-44 = "ฉันไม่ค่อยรู้จักนักเรียนของที่นั่นเท่าไร แต่ถ้าเป็นชมรมอ่านหนังสือของทรีนิตี้ ก็พอมีเรื่องที่เคยได้ยิน#nมาบ้างน่ะ"
62070-45 = "แล้วก็ได้ยินมาว่าหัวหน้าชมรมนั้น... เป็นนักเรียนที่น่าทึ่งในหลายๆ ด้านเลยด้วย"
62070-46 = "[s] (ที่ได้ยินมาก็... ไม่ผิดหรอก...)"
62070-47 = "ระ... รู้ได้ยังไงน่ะ? พวกฉันไม่เคยรู้มาก่อนเลย..."
62070-48 = "ฮุฮุ ก็ไม่รู้สินะ"
62070-49 = "ในแง่หนึ่ง นี่คงเรียกได้ว่าเป็นสิทธิพิเศษของ 'สายเลือดของราชวงศ์' ละมั้ง?"
62070-50 = "นั่นสิ... ก็อาสึโกะเคยเป็น 'องค์หญิง' นี่เนอะ"
62070-51 = "จะ... จริงด้วยนะคะ... ถ้าเป็นแต่ก่อน คนอย่างฉันคงไม่กล้าเงยหน้าขึ้นมององค์หญิงเลยด้วย..."
62070-52 = "เอาละๆ ฉันไม่ได้อยู่ในสถานะนั้นอีกต่อไปแล้ว ส่วนเธอก็เรียกฉันว่าอาสึโกะเฉยๆ ก็พอแล้วละ"
62070-56 = "คะ... คะ?! ตะตะตะตะ... แต่... ว่า...!"
62070-57 = "ก็เราอยู่ชั้นปีที่ 1 เหมือนกันไม่ใช่เหรอ? ใช่มั้ยล่ะ ไมอา?"
62070-58 = "มะ... มันก็จริงอยู่หรอกค่ะ! แต่ถึงยังไงก็...!"
62070-59 = "ไหนลองฝึกดูซิ อา สึ โกะ"
62070-63 = "คะ... คุณอาสึโกะ..."
62070-64 = "อื้อ เรียกแบบนี้ได้เลย ต่อไปก็มาจับมือกัน"
62070-65 = "เฮือก..."
62070-70 = "สรุปว่า... อาสึโกะรู้ในสิ่งที่พวกเราไม่เคยรู้มาก่อนงั้นเหรอ..."
62070-71 = "ก็เข้าใจได้นะ คนที่อยู่ในตำแหน่งนั้นน่ะ ย่อมต้องรู้เรื่องบางอย่างมากกว่าคนที่ไม่ได้อยู่ในตำแหน่งนั้น#nอยู่แล้ว"
62070-72 = "เพราะงั้น... ก็เลยไม่เคยบอก... พวกฉันสินะคะ..."
62070-73 = "เรื่องนั้นฉันขอโทษนะ แต่ถ้าฉันผลีผลามพูดออกไปละก็..."
62070-74 = "อื้อ บางทีพวกเราอาจตกอยู่ในอันตรายก็ได้ ใช่มั้ยล่ะ?"
62070-75 = "ฮะ... เฮือกกก..."
62070-76 = "แต่หลังจากออกมาจากอาเรียสแล้วก็น่าจะพูดได้สิ... แต่ก็นะ ยังไงเรื่องมันก็ผ่านไปแล้วนี่"
62070-77 = "อื้อ แต่ตอนนี้คงไม่ใช่อย่างนั้นแล้วละ"
62070-78 = "[s] \"เข้าใจแล้ว อาสึโกะ\""
62070-82 = "[ns] \"งั้นครูจะลองติดต่ออุยให้เอง\""
62070-83 = "คนคนนั้นชื่อคุณอุยสินะ"
62070-88 = "งั้นก็รบกวนด้วยนะ คุณครู"
62070-97 = "ทำกับคนอื่นเหมือนเป็นสารานุกรมเดินได้ที่จะถามได้ทุกเรื่องเลยนะคะ?!?!"
62070-102 = "ฮะ... เฮือก...! น่ากลัว... น่ากลัวจังเลยค่ะ...!"
62070-103 = "ฮะ... ฮืออออ... น่ากลัวจัง... แค่นี้ก็กลัวแล้วค่ะ..."
62070-104 = "คะ... คุณฮิโยริก็ด้วยเหรอคะ...? ฉันคิดว่าสควอดจะไม่กลัวอะไรเลยเสียอีกค่ะ..."
62070-105 = "พวกฉันก็กลัวในสิ่งที่น่ากลัวเหมือนกันค่ะ... แล้วโลกนี้ก็มีสิ่งที่น่ากลัวเต็มไปหมดเลยด้วย..."
62070-111 = "[ns1] \"ขอโทษนะ ไว้เดี๋ยวครูเลี้ยงอเมริกาโน่...\"\n[ns2] \"คะ... ครูจะส่งคูปองกาแฟร้าน <ไวท์&เมสัน> ให้ 20 ใบเลย!\""
62070-117 = "ไม่ได้นะคะ หัวหน้า! คุณครูก็ให้ความช่วยเหลือพวกเราไว้ตั้งเยอะแยะนะคะ! เราต้องขอบคุณสิคะ ที่มีโอกาสได้ช่วยเหลืออะไรเป็นการตอบแทนบ้าง!"
62070-119 = "ตะ... แต่ว่า..."
62070-120 = "ถ้ายังเป็นแบบนี้ ฉันจะลากหัวหน้าไป 'ดูงาน' ถึงที่ที่คุณครูอยู่เลยนะคะ"
62070-121 = "หา?!"
62070-127 = "เป็นคนที่น่าทึ่งตามที่ได้ยินมาเลยนะ..."
62070-128 = "[s] \"ครูขอโทษที่อุยเป็นแบบนี้นะ...\""
62070-129 = "สวัสดี คุณอุย คุณชิมิโกะ ฉันคือฮาคาริ อาสึโกะ จากโรงเรียนสาขาอาเรียส ฝากตัวด้วยนะ"
62070-130 = "ฉันโจมาเอะ ซาโอริ"
62070-131 = "อิมาชิโนะ มิซากิ..."
62070-132 = "ฉันสึจินากะ ฮิโยริ... ค่ะ... แหะ... แหะๆ... ฉันได้ยินมาว่าห้องสมุดเก่าทรีนิตี้เป็นห้องสมุดที่มีชื่อเสียง#nในคิโวทอสเลย..."
62070-133 = "ไม่ทราบว่าที่นั่นมีนิตยสารเก่าๆ... หรืออะไรทำนองนั้นมั้ยคะ?"
62070-134 = "ค่ะ คุณฮิโยริ เรามีข้อมูลจากนิตยสารที่เก็บรักษาไว้ในรูปแบบอิเล็กทรอนิกส์ค่ะ ไว้ฉันส่งไปทางฝั่งคุณครูให้มั้ยคะ?"
62070-138 = "จะ... จริงเหรอคะ?! ขะ... ขอบคุณค่ะ! ตะ... แต่ว่าพวกฉันไม่มีอะไรให้เป็นการตอบแทนเลย..."
62070-139 = "ไม่เป็นไรค่ะ คนที่รักในตัวหนังสือและความรู้ก็เป็นเหมือนสหายของพวกฉันค่ะ"
62070-140 = "แงงงง~ ดีใจที่ได้ยินแบบนี้จังเลยค่ะ...!"
62070-141 = "ฉันแนะนำตัวช้าไปสินะคะ ขอแนะนำตัวอย่างเป็นทางการค่ะ ฉันชื่อเอ็นโดะ ชิมิโกะค่ะ"
62070-146 = "คะ? ฉะ... ฉันก็ด้วยเหรอคะ?! อะ... อ่า... ฉันชื่อทะชิกิ ไมอา... ค่ะ... ขะ... ขอฝากตัวด้วยนะคะ..."
62070-151 = "..."
62070-152 = "หัวหน้า?"
62070-156 = "อะ... เอ่อ... เฮ้อ... ฉันโคเซกิ อุย... เรารีบเข้าประเด็นกันเถอะค่ะ..."
62070-157 = "[s] \"เห็นที่ครูอธิบายไปใน MOMOTALK แล้วใช่มั้ย?\""
62070-158 = "ค่ะ พอเห็นข้อความ พวกฉันก็พยายามหาข้อมูลกัน และคิดว่าพบสิ่งที่คุณครูกำลังมองหาแล้วค่ะ"
62070-159 = "ที่นั่นมีข้อมูลแบบนั้นด้วยเหรอ?! แต่ว่า..."
62070-160 = "แต่ต้องยอมรับว่าข้อมูลบางอย่างอยู่ในหนังสือกึ่งต้องห้ามของทรีนิตี้ค่ะ... "
62070-161 = "คงต้องบอกว่าขึ้นอยู่กับมุมมองค่ะ จะมองว่ามันสมควรเป็นอย่างนั้นก็ไม่ผิด..."
62070-162 = "แล้วที่ผ่านมาพวกสภาน้ำชากับชมรมซิสเตอร์ก็จัดการงานกันแบบนี้มาตลอด... ก็เลยยิ่งน่าสงสัยขึ้นไปอีก..."
62070-163 = "แต่ที่นี่คือชมรมอ่านหนังสือของทรีนิตี้ และพวกฉันก็อยู่ใน 'ห้องสมุดเก่า' กันด้วย... พวกฉันก็เลยหาข้อมูลแทบทุกอย่างได้จากที่นี่ค่ะ"
62070-164 = "แต่ถ้าเป็นข้อมูลเกี่ยวกับโรงเรียนอื่น ก็อาจไม่ครบถ้วนเท่าไรค่ะ..."
62070-165 = "ในอีกแง่หนึ่ง จะเรียกว่าที่นี่คืออดีตของทรีนิตี้... ก็ได้ค่ะ"
62070-166 = "คนที่มีอำนาจมักต้องการสร้างสถานการณ์ที่เอื้อประโยชน์ต่อตัวเองอยู่แล้ว..."
62070-167 = "เพราะงั้นก็เลยยิ่งปกปิดและปลอมแปลงเรื่องแบบนี้ แล้วก็พยายามกลบความจริงด้วยเรื่องโกหก#nที่ยิ่งใหญ่กว่าเดิม...!"
62070-168 = "แต่พวกฉันไม่ยอมรับเรื่องแบบนั้นหรอกค่ะ..."
62070-169 = "คุณอุยช่วยบอกได้มั้ยว่าเจอข้อมูลอะไรมาบ้าง?"
62070-170 = "ถือว่าฉันขอร้องในฐานะ 'อดีต' สายเลือดราชวงศ์ของอาเรียสเถอะนะ"
62070-174 = "คุณคือ...? สายเลือด... ราชวงศ์งั้นเหรอ...?"
62070-175 = "[s] \"อื้อ ครูรับรองให้ได้\""
62070-179 = "..."
62070-180 = "ได้ค่ะ... ยังไงฉันก็จะบอกในสิ่งที่บอกได้อยู่แล้ว..."
62070-181 = "ถ้างั้นพวกฉันก็ไม่จำเป็นต้องปกปิด... หรือไม่พูดในบางสิ่งอีกต่อไปแล้วสินะคะ... แล้วคุณครูก็ช่วยรับรองให้แล้วด้วย..."
62070-185 = "เดิมทีแล้วปอร์ตาปาซิสเป็นอาคารที่มีจุดประสงค์ในการใช้งานตามชื่อนั้นเลยค่ะ"
62070-186 = "ใช่ค่ะ ใช้เป็นประตูแห่งสันติภาพนั่นเอง"
62070-187 = "ปอร์ตาปาซิสเป็นอาคารที่สร้างขึ้นตอนโรงเรียนสาขาอาเรียสแยกออกจากโรงเรียนสามัญทรีนิตี้ค่ะ..."
62070-188 = "นั่นเป็นเพราะตอนนั้น... ทั้งทรีนิตี้และอาเรียส ต่างก็คิดว่าในที่สุดแล้วก็จะคลี่คลายปัญหานี้ได้อย่าง#nสันติค่ะ น่าประหลาดใจใช่มั้ยล่ะคะ..."
62070-189 = "แต่มันก็ไม่เป็นอย่างนั้นใช่มั้ย...?"
62070-190 = "ค่ะ..."

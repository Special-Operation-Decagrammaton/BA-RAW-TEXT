62070-34 = "[s] \"아츠코?\""
62070-35 = "3;아츠코;S2_01;응? 왜 그래, 선생님?\n#3;em;[?]"
62070-36 = "3;아츠코;S2_02;뭔가 할 말이 있느냐고?"
62070-37 = "3;아츠코;S2_99;……."
62070-38 = "3;아츠코;S2_01;있잖아, 선생님.\n#3;em;[반응]"
62070-39 = "3;아츠코;S2_02;혹시, 트리니티와 아리우스 양쪽 모두의 역사…… '숨겨진' 부분의 역사에 대해, 잘 알고 있는 학생이 있을까?"
62070-40 = "3;미사키;05;……그런 게 있을 리 없잖아, 아츠코. 그쪽 애들도 자기가 배운 대로만 배워 왔을 텐데.\n#3;em;[한숨]"
62070-41 = "3;아츠코;S2_99;물론 그렇겠지만, 혹시나 해서. 스스로 '진실'을 찾아가는 사람들은, 어디에나 있기 마련이잖아?"
62070-42 = "3;아츠코;S2_02;가령, 트리니티의 '도서부'라던가?"
62070-43 = "[s] \"……! 도서부 아이들을, 알고 있어?\""
62070-44 = "3;아츠코;S2_01;그곳의 학생들에 대해서는 잘 모르지만, 트리니티의 도서부에 대해서는 들은 것들이 있어."
62070-45 = "3;아츠코;S2_03;그리고 거기의 부장님은…… 여러 가지 의미로, 엄청난 성격의 학생이라는 것도."
62070-46 = "[s] (……틀린 말은…… 아니긴 하지…….)"
62070-47 = "3;사오리;S2_04;어, 어떻게? 그런 거, 우리는 전혀 알 수 없었는데…….\n#3;em;[땀]"
62070-48 = "3;아츠코;S2_99;후훗. 글쎄."
62070-49 = "3;아츠코;S2_03;어떤 의미로는, 이른바 '로열 블러드'의 특권 같은 것이었다고 해 둘까?"
62070-50 = "3;미사키;99;……그래. 아츠코는 '공주'였으니까.\n#3;em;[속상함]"
62070-51 = "3;마이아;04;그, 그렇죠……. 원래대로였다면, 저 같은 것은 감히, 공주님을 올려다보는 것도…….\n#3;stiff"
62070-52 = "5;아츠코;S2_03;자, 자. 나는 더 이상 그런 게 아니야. 그리고 그냥 편하게 아츠코라고 불러 줘.\n#5;em;[반짝]\n#5;al\n#3;m1"

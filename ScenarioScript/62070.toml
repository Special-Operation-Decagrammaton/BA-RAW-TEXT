[translation]
62070-1 = "第7話;波塔帕西斯（１）"
62070-3 = "[ns]「那是……什麼地方？」"
62070-4 = "其，其實……我也不太清楚。#n只是奧利斯有一棟叫做「波塔帕西斯」的建築……"
62070-5 = "我所知道的，就只有那棟建築非常古老而已。#n或許小隊的各位會比較清楚……"
62070-7 = "我們知道的也不多……#n只知道那個名字的意思是「和平之門」……"
62070-8 = "……還有就是絕對不能打開那裡的門而已。"
62070-10 = "沒錯。雖然奧利斯……因為不知從何時開始的內戰，導致統治勢力不斷更迭。"
62070-11 = "然而無論是哪股勢力，都一致將「不要接近波塔帕西斯」奉為鐵則。"
62070-12 = "……現在想想還真奇怪。#n那裡究竟隱藏著什麼無法明說的東西……"
62070-13 = "才會讓那些彼此鬥得你死我活的人，唯獨死守著這條規定呢。"
62070-14 = "就，就是說啊……#n那個時候，大家光是撐過每一天就夠忙的了，根本沒有餘力思考其他事情……"
62070-15 = "因為我是一年級的關係……總是被告誡說不需要知道那種事情，也最好別去打聽……"
62070-16 = "……"
62070-17 = "雖然這也只是我道聽途說來的……"
62070-18 = "不過我曾經聽說過，那裡藏著奧利斯無人知曉的過去。"
62070-19 = "[s]「奧利斯的過去？」"
62070-23 = "是嗎……？#n可是那種事情，一般不都是從前輩口中聽說的嗎……"
62070-24 = "或許是吧。#n我們奧利斯的過去，至少對外而言只留存在三一的官方紀錄之中。"
62070-25 = "雖然沒有機會能詳細了解裡面的內容……#n不過根據我們受過的教育，那些紀錄裡似乎充滿了捏造和欺瞞。"
62070-26 = "比，比方在公會議上是奧利斯先引發物理衝突，所以才不得不處以破門律……"
62070-27 = "……或是之所以把奧利斯送到這裡來，都是奧利斯自作自受之類的說詞。"
62070-28 = "雖然說歷史是由勝利者書寫的，但這種情況……應該算是特別顯著的例子了吧。"
62070-33 = "……"
62070-34 = "[s]「敦子？」"
62070-35 = "嗯？怎麼了嗎，老師？"
62070-36 = "問我是不是有話想說？"
62070-37 = "……"
62070-38 = "老師，我在想……"
62070-39 = "會不會有一名學生……很了解三一和奧利斯雙方「隱藏的歷史」呢？"
62070-40 = "……怎麼可能會有呢，敦子。#n那邊的學生也只學過自己學園教的東西而已。"
62070-41 = "這點我當然也清楚，所以只是提出來以防萬一而已。#n畢竟天底下總是有人會主動追尋「真相」，不是嗎？"
62070-42 = "就比如……三一的「圖書委員會」之類的？"
62070-43 = "[s]「你認識圖書委員會的學生嗎！？」"
62070-44 = "那裡的學生我不太清楚，不過有聽說過一些關於三一圖書委員會的事。"
62070-45 = "他們的委員長……似乎從各種層面來說，都是位相當有個性的學生呢。"
62070-46 = "[s]（這話……好像也沒說錯……）"
62070-47 = "怎，怎麼會？#n那種事，我們完全不知道啊……"
62070-48 = "呵呵，怎麼說呢……"
62070-49 = "就當作是「皇家血統」的特權吧？"
62070-50 = "……說的也是。敦子畢竟是曾經的「公主」嘛。"
62070-51 = "對，對耶……#n原本像我這種人，恐怕就連仰望公主大人都……"
62070-52 = "沒事沒事，我現在已經不是那種身分了。#n隨意叫我敦子就可以了。"
62070-56 = "咦，咦咦！？#n可可可可，可是……！"
62070-57 = "我們不都是一年級嗎，舞彩？"
62070-58 = "雖，雖然是這樣沒錯！但這實在有點……！"
62070-59 = "跟我一起練習吧。敦．子。"
62070-63 = "敦，敦子……同學。"
62070-64 = "嗯，做得很好。#n來，握手。"
62070-65 = "噫噫……"
62070-70 = "……也就是說，敦子其實一直都知道那些我們無從得知的事嗎？"
62070-71 = "……這也不是不能理解。#n身處那種位置的人，自然會比其他人知道得更多。"
62070-72 = "所以……才沒有告訴我們啊……"
62070-73 = "關於這點我很抱歉。#n不過要是我輕易說出去的話……"
62070-74 = "是啊。那樣搞不好會危及我們的性命吧。"
62070-75 = "噫，噫噫……"
62070-76 = "雖然可以在離開奧利斯之後告訴我們……#n不過等到那個時候，那些事情也已經無所謂了吧。"
62070-77 = "嗯，但現在看來好像不是那樣了。"
62070-78 = "[s]「我知道了，敦子。」"
62070-82 = "[ns]「憂那邊就由我來聯絡吧。」"
62070-83 = "原來那個人是憂同學啊。"
62070-88 = "那就拜託你了，老師。"
62070-97 = "你們是把我當成方便又萬能的百科全書了嗎！？！？"
62070-102 = "噫，噫噫……！#n好可怕……好可怕哦……！"
62070-103 = "嗚，嗚哇啊啊……#n好恐怖……好嚇人……"
62070-104 = "連，連日和同學也……？#n我還以為小隊的各位什麼都不怕呢……"
62070-105 = "我們也會害怕恐怖的東西啊……#n而且，世界上恐怖的東西實在太多了……"
62070-111 = "[ns1]「抱歉抱歉……」\n[ns2]「不，不然我送20張黑咖啡兌換券給你吧？『White&Mason』的！」"
62070-117 = "不行哦，委員長！#n老師平常幫了我們很多，我們應該高興能夠上忙才對！"
62070-119 = "可，可是……"
62070-120 = "要是再繼續這樣，我就直接把委員長拖去找老師「出差」了哦？"
62070-121 = "唔呃啊！？"
62070-127 = "和傳聞一樣，是個不得了的人呢……"
62070-128 = "[s]「不好意思，憂這孩子平常就是這樣……」"
62070-129 = "你們好，憂同學、志美子同學。#n我是奧利斯分校的秤敦子。請多指教。"
62070-130 = "我是錠前沙織。"
62070-131 = "……戒野美咲。"
62070-132 = "我，我是槌永日和……耶，耶嘿嘿……#n那個，我聽說三一的古書館，是奇普托斯很有名的圖書館……"
62070-133 = "不知道你們那邊……有沒有過期的雜誌之類的呢？"
62070-134 = "有的，日和同學。#n我們有用於剪報用途而電子化保存的雜誌。#n需要之後請老師將資料轉寄給你嗎？"
62070-138 = "真，真的嗎！？謝，謝謝你！#n啊，可是我沒有什麼能回報你的東西……"
62070-139 = "沒關係。凡是熱愛文字與知識的人，都是我們的同伴。"
62070-140 = "嗚嗚嗚～活著真是太好了……！"
62070-141 = "抱歉現在才跟各位問好。#n正式向各位自我介紹，我是円堂志美子。"
62070-146 = "咦？我，我也要嗎！？#n那個……我叫做立木舞彩……請，請多指教……"
62070-151 = "……"
62070-152 = "委員長？"
62070-156 = "那，那個……唉……我是古関憂……#n我們趕緊進入正題吧……"
62070-157 = "[s]「你們有從MomoTalk上得知大致的情況吧？」"
62070-158 = "是的。我們這邊也盡可能進行了調查，應該有找到老師想要的情報才對。"
62070-159 = "真的有那種資料嗎！？#n可是……"
62070-160 = "當然，那些在三一也都被指定為了準禁書……"
62070-161 = "雖然某方面而言，這麼做的理由也不是無法理解……"
62070-162 = "都怪死板的茶會，還有修女會那些傢伙……#n就是因為他們一直用這種手法處理事情，才更容易招人懷疑……"
62070-163 = "……這裡是三一的圖書委員會，而且還是其中的「古書館」。#n幾乎所有資料都能在這裡找到。"
62070-164 = "當然如果是有關其他學園的情報，或許會不太完整就是了……"
62070-165 = "這裡在某種層面上，可以稱得上是三一的過去……"
62070-166 = "畢竟掌權者們，總是會想創造對自己有利的局面……"
62070-167 = "所以尤其喜歡隱瞞或扭曲這些事實，甚至編造出更大的謊言來掩蓋真相……！"
62070-168 = "……我不會讓他們稱心如意的。"
62070-169 = "能告訴我們你所知道的事情嗎，憂同學？"
62070-170 = "我以奧利斯「前」皇家血統的身分拜託你。"
62070-174 = "你是……皇家血統？"
62070-175 = "[s]「嗯，這是真的。」"
62070-179 = "……"
62070-180 = "好吧……反正我本來就打算把能說的部分都告訴你們……"
62070-181 = "既然如此，我也沒必要隱瞞什麼……或者乾脆閉口不談了……#n畢竟老師都替你們做保證了嘛……"
62070-185 = "波塔帕西斯……這座建築原本的用途，就和它的名稱所代表的意義一樣。"
62070-186 = "沒錯──也就是「和平之門」。"
62070-187 = "……那是奧利斯分校與三一綜合學園最初分裂時所建造的。"
62070-188 = "雖然現在可能會覺得難以置信……#n不過在當時，三一與奧利斯都認為這個問題……遲早能夠和平地解決……"
62070-189 = "……然而事情的發展卻並非如此對吧？"
62070-190 = "……是的。"
62070-191 = "其實有關這部分的紀錄，就連我們這邊也不是很清楚。"
62070-192 = "……難怪有人說「權力真正可怕的並不是『紀錄了什麼』，而是『不紀錄什麼』」。"
62070-193 = "因此這個部分……"
62070-194 = "……整體來看並不算特別重要，我就簡單帶過吧。"
62070-195 = "奧利斯延續至今的內戰，其最初的導火線……就是與波塔帕西斯的竣工有關的爭議。"
62070-199 = "那，那不是和平之門嗎！？#n怎麼效果反而完全相反啊！？"
62070-200 = "這些事情，我真的可以聽嗎……"
62070-202 = "雖然可能讓人有點意外……#n不過這種具有紀念性的建築物，在落成之後反而背離初衷的情況並不少見。"
62070-203 = "也許是因為「象徵」這個概念所具有的特性……或者說是侷限性吧。#n人們如果被強迫接受某種概念，反而會因此產生反抗的心態。"
62070-204 = "嗯。當時有一派人認為即使建造了「和平之門」，和平也絕對不會到來。"
62070-205 = "同時，也有另一派人相信就算和平尚未到來，人們也終究會在遙遠的未來實現和平。"
62070-206 = "而這兩種想法的基礎，就是「還能與三一溝通」……"
62070-207 = "以及「絕不可能互相理解」的觀點。#n於是……"
62070-209 = "原來這就是內戰的開端啊……"
62070-210 = "嗯。原本對外的憤怒開始轉向了內部。"
62070-211 = "這個部分就說到這裡吧。"
62070-212 = "因為當時的局勢過於混亂，又是很久以前的事……#n就連奧利斯這邊也幾乎沒有留下完整的史料。"
62070-213 = "不過當時所產生的憤怒……就這樣隨著時間延續到了現在。"
62070-214 = "對三一的憤怒……以及對我們內部的憤怒。"
62070-215 = "……明明那都已經是非常遙遠的過去了。"
62070-216 = "畢竟我們人類，是能對其他個體共情的存在……"
62070-217 = "也是因為朝著能與他人共情的方向演化，才能佔據如今的地位……"
62070-218 = "是啊。其中也包含藉由回顧歷史，與當時人們的情緒產生共鳴……"
62070-219 = "或者望著相同的物品，體會相同的情緒。"
62070-220 = "沒錯。奧利斯的憤怒，就是以這樣的形式不斷延續下來的。"
62070-221 = "最初勝利的一方，也就是認為「和平之門無法繼續作為和平的象徵」的那群人……"
62070-222 = "為了作為借鑑和標竿，決定在其地下建造一座巨大的「紀錄保管庫」。"
62070-223 = "在波塔帕西斯的地底，有一座紀錄保管庫！？"
62070-224 = "嗯。於是那座紀錄保管庫……開始將在奧利斯發生的事一一記錄下來。"
62070-225 = "……簡直就像三一的圖書館一樣呢。"
62070-226 = "畢竟想紀錄事物並保存下來的行為……幾乎能稱得上是人類的本能……#n也算是一種普遍的行為吧……"
62070-228 = "在此之後，波塔帕西斯和紀錄保管庫，便成為了奧利斯的圖書館。"
62070-229 = "然而，如果我知道的沒錯的話，約莫在150多年前……"
62070-230 = "當時統治奧利斯的勢力，將波塔帕西斯和紀錄保管庫指定成了禁止出入的區域。"
62070-231 = "[s]「那是為什麼呢？」"
62070-232 = "我也不知道確切的原因。#n所以，這只是我個人的推測而已……"
62070-233 = "也許……是認為無法再承受下去了吧。"
62070-234 = "那些長年以來累積的故事，以及其中糾葛不清的黑暗情緒。"
62070-235 = "[s3]「……這樣啊。」\n[s4]「我好像多少能理解那種感覺……」"
62070-238 = "……也就是實施了資訊管制啊。#n要說這個問題，三一也沒好到哪裡去。"
62070-239 = "唉，這些掌權者實在是……"
62070-240 = "如果單純從統治和支配的角度來看……#n適度的憤怒確實有助於統治，不過要是過當就可能適得其反。"
62070-241 = "煽動組織掌握權力之後，再若無其事地將其剷除……#n這種事在歷史上已經多到讓人見怪不怪了……"
62070-243 = "原，原來外面的世界是這樣運作的嗎……？#n好可怕哦，日和同學……我好害怕……"
62070-244 = "我，我也是……突然感覺自己好像沒自信活下去了……嗚嗚嗚……"
62070-245 = "不過志美子同學說會給我雜誌的資料，所以還是抱著一點希望好了……"
62070-247 = "不是，那種事情在我們這裡也一樣發生過啦……"
62070-248 = "原來如此啊……所以在那之後，奧利斯的歷史才會以「口耳相傳」的方式流傳下來。"
62070-249 = "沒錯。在夫人……貝雅特里榭支配奧利斯之前，即便奧利斯的統治者不斷更替……"
62070-250 = "他們卻始終管制著奧利斯資訊的理由，恐怕就是因為這樣吧。"
62070-251 = "……你已經能直接叫出那個名字了嗎。"
62070-252 = "嗯，我想現在是時候了。"
62070-253 = "不過以口耳相傳的方式傳承歷史，也會產生相應的副作用。"
62070-254 = "……簡單來說，就是每個人的說法都會略有不同。"
62070-256 = "畢竟是以口述的方式流傳，會有這種情況也很正常。"
62070-257 = "有些事情被誇大，有些事情則被省略……或者因為摻雜口述者自身的情緒而被曲解。"
62070-258 = "我們所聽過的奧利斯的歷史，恐怕會比事實更加扭曲吧。"
62070-259 = "是啊。就算現在公開波塔帕西斯的紀錄，應該也沒什麼大不了的。"
62070-260 = "重新檢視那些紀錄，反而有可能成為讓奧利斯走向正常的第一步也說不定。"
62070-261 = "既然如此……為什麼昴前輩要去那裡呢……？"
62070-262 = "我想，昴可能是得知了「某些事」吧。"
62070-263 = "雖然無法推測出具體的過程，不過在貝雅特里榭消失之後……#n奧利斯應該會變成一個「一切皆被允許的地方」才對。"
62070-264 = "那，那個……確實是這樣沒錯……#n所以在昴前輩重整秩序之前……這裡……"
62070-265 = "嗚……"
62070-266 = "別哭別哭，抱歉讓你難過了。#n那麼接下來我要說的……是只有我才知道的事。"
62070-267 = "雖然昴現在可能也已經知道了吧。"
62070-272 = "那是……什麼事？"
62070-277 = "是與隱藏在波塔帕西斯的……奧利斯的「祕儀」有關的事。"
62070-281 = "下一話;波塔帕西斯（２）"

[translation]
1011102-1 = "ความธรรมดาที่น่าทึ่ง"
1011102-2 = "สวนสาธารณะในเขตปกครองตนเองมิลเลเนียม"
1011102-5 = "[ns] \"สวัสดี เนรุ\""
1011102-6 = "อ๊ะ ครู"
1011102-7 = "ไม่รู้เลยนะเนี่ยว่าครูมา ฉันเกือบจะผล็อยหลับไปแล้วสิ"
1011102-8 = "[s] \"ใส่ชุดนักเรียนเหรอวันนี้?\""
1011102-9 = "อ่า นี่เป็นครั้งแรกเลยมั้ยนะนี่ฉันแต่งตัวแบบนี้แล้วเรามาเจอกันสองคน?"
1011102-10 = "ก็นะ ฉันได้มาใส่ชุดนักเรียนน่ะ"
1011102-11 = "ก็นักบัญชีแห่งเซมิน่าน่ะสิ ดันมาขอไว้ว่าให้ใส่ชุดนักเรียนในระหว่างงานโรงเรียน"
1011102-12 = "ถ้าเป็นเวลาปกติ ฉันก็คงไม่ทำตามหรอก..."
1011102-13 = "ฉันไม่รู้หรอกนะว่างานนี้มันสำคัญขนาดไหน แต่ทางนั้นมาอ้อนวอนจนฉันปฏิเสธไม่ลง"
1011102-14 = "อืม... ที่จริงที่ฉันเรียกครูมาก็เพราะเรื่องชุดนี่แหละ"
1011102-15 = "พอไม่มีซูคาจัน ฉันก็รู้สึกว่างเปล่านิดหน่อย"
1011102-16 = "ฉันก็เลย... อยากได้คำแนะนำ... จากครู..."
1011102-17 = "..."
1011102-21 = "อ๊ากกกก!"
1011102-22 = "[s] \"ระ... ระเบิดเหรอ?!\""
1011102-23 = "ไม่ใช่แค่นิดหน่อยหรอก รู้สึกว่างเปล่ามากๆ เลยต่างหาก!"
1011102-24 = "ไม่ชินเลย! แบบนี้มันแปลกมากเลย! รู้สึกเหมือนไม่ได้ใส่เสื้อผ้างั้นแหละ!"
1011102-25 = "แล้วครูล่ะคิดยังไง? ฉันที่ใส่แค่ชุดนักเรียนมันดูแปลกๆ ใช่มั้ยล่ะ? ไปแอบใส่ซูคาจันจะดีกว่าเนอะ?!"
1011102-26 = "[s] \"ครูว่าความธรรมดาแบบนี้ก็น่ารักดีออก\""
1011102-27 = "วะ... ว่าไงนะ?!"
1011102-28 = "อย่ามาล้อกันเล่นสิ! นี่ฉันจริงจังนะ!"
1011102-29 = "[s] \"ความธรรมดาแบบนี้เข้ากับเนรุดีนะ...\""
1011102-30 = "มะ... ไม่มีทางหรอก..."
1011102-31 = "อะแฮ่ม อะ... เอาเถอะ!"
1011102-32 = "ฉันติดต่อครูไปก็เพราะเรื่องนี้"
1011102-33 = "แต่ถ้าครูไม่มองว่ามันแปลกมาก งั้นก็เอาตามนั้น"
1011102-34 = "แต่ยังไงก็โล่งอกไปทีนะ ถึงฉันจะไม่คิดว่ามันน่ารักหรือเข้ากับฉันก็เถอะ"
1011102-35 = "[s] \"ไม่ต้องกังวลนะ\""
1011102-37 = "[ns] \"ไม่ว่าจะใส่อะไร เนรุก็เป็นเนรุคนเดิมไม่ใช่เหรอ?\""
1011102-38 = "หืม? มันก็ใช่น่ะสิ!"
1011102-39 = "ถึงจะไม่มีซูคาจัน แต่ยังไงก็จัดการพวกแยงกี้สาวกลุ่มหรือสองกลุ่มได้สบายๆ! ให้มาตอนนี้ก็ยังได้!"
1011102-40 = "หืม? สบายใจแล้วเพราะเหมือนฉันคนเดิมจะกลับมาแล้วงั้นเหรอ?"
1011102-41 = "ฮึ่ย...!"
1011102-42 = "ฉันตัดสินใจถูกแล้วละนะที่มาคุยกับครู ตอนนี้ฉันรู้สึกดีขึ้นมากเลย"
1011102-43 = "ถึงฉันจะหมดธุระแล้ว แต่ถ้าจะบอกลากันแค่นี้มันก็น่าเสียดาย งั้นครูมานั่งตรงนี้ด้วยกันอีกหน่อย#nมั้ยล่ะ?"
1011102-48 = "เอ้า มาทางนี้สิ"
1011102-50 = "จะว่าไปแล้ว วันนี้โรงเรียนดูเงียบสงบจังเลยนะ"
1011102-51 = "เพราะมีงานหรือเปล่านะ หรือว่าฉันจะคิดไปเอง..."
1011102-52 = "[s] \"ครูว่ามันก็เหมือนปกตินะ...\""
1011102-53 = "ไม่หรอกๆ บรรยากาศมันต่างออกไปอย่างเห็นได้ชัดเลย"
1011102-54 = "ฉันว่าในมิลเลเนียมต้องเกิดเรื่องอะไรที่ฉันไม่รู้แน่ๆ"
1011102-55 = "อ๊ะ มาทางโน่นแล้ว ครูดูให้ดีนะ"
1011102-65 = "[ns] \"ไม่เห็นจะเข้าใจเลย...\""
1011102-66 = "เมื่อกี้ฉันก็นั่งอยู่ที่ม้านั่งตัวนี้ แต่ว่าพวกนักเรียนก็เดินผ่านหน้าไปเฉยๆ เลย"
1011102-67 = "หืม? มันแปลกยังไงน่ะเหรอ ก็ปกติแล้วเวลาใครเจอฉัน ก็จะพูดกันว่า \"นั่นหัวหน้า C&C นะ\" หรือไม่ก็ \"กลัวว่าจะเผลอไปสบตารุ่นพี่คนนั้นจัง...!\" ประมาณนี้น่ะ"
1011102-68 = "ใครเจอฉันก็ตื่นตระหนกกันทั้งนั้นละ"
1011102-69 = "[ns] (ปกติใส่ชุดเมดเพื่อพรางตัว แต่ก็ไม่มีความหมายสินะ...)"
1011102-70 = "แต่ว่าวันนี้ไม่เกิดเรื่องอะไรแบบนั้นเลย~ สักนิด"
1011102-71 = "แน่นอนว่าฉันก็ไม่ได้อยากเป็นที่สนใจหรอกนะ แล้วต่อให้คนอื่นพูดอะไรฉันก็ไม่แคร์เท่าไร แต่ว่าพอมันต่างจากปกติ มันก็รู้สึกแปลกๆ ขึ้นมาน่ะสิ"
1011102-72 = "เหมือนกับว่ามีเรื่องที่สำคัญเกิดขึ้น แต่มีแค่ฉันคนเดียวที่ไม่รู้..."
1011102-73 = "ฮึ่ย น่าอึดอัดชะมัด! หรือว่าที่ฉันกระสับกระส่ายแบบนี้เพราะไม่ได้ใส่ซูคาจันนะ?"
1011102-74 = "[s3] \"เดี๋ยวก่อนๆ ใจเย็นๆ\"\n[s4] \"ครูว่าใจเย็นๆ ก่อนนะ...\""
1011102-77 = "ฮู่ว..."
1011102-78 = "ครูพอหาสาเหตุได้บ้างมั้ย? ไม่ว่าจะคิดยังไง ฉันก็ว่านี่มันแปลกจริงๆ"
1011102-79 = "[s] \"ไม่รู้สิ...\""
1011102-86 = "อุ๊ย มีแขกมาเยี่ยมที่ซ่อนตัวของเราเหรอเนี่ย?"
1011102-90 = "คิกคิกคิก สวนสาธารณะตรงนี้เป็นเขตของพวกเรานะ ถ้าจะนั่งที่ม้านั่งตัวนี้ ก็ต้องจ่ายค่าเช่าที่ด้วยสิ"
1011102-91 = "เอาแค่ราคาเครปที่ขายที่ร้านตรงสี่แยกนั่นก็น่าจะพอนะ ขอเก็บเงินเท่านี้ก่อนแล้วกัน"
1011102-92 = "...?"
1011102-93 = "นี่พวกเธอ... พูดกับฉันอยู่เรอะ?"
1011102-94 = "แล้วถ้าไม่ใช่เธอจะเป็นใคร..."
1011102-99 = "เอ๋? เธอคือ..."
1011102-100 = "หืม? เหมือนเคยเห็นหน้าที่ไหนเลย... ซะ... ซวยแล้วไง นี่มิคาโมะ เนรุนี่นา!"
1011102-104 = "ฉันจำเธอได้นะ เคยโดนฉันสั่งสอนไปครั้งหนึ่งแล้วไม่ใช่รึไง?"
1011102-105 = "กะ... ก็ใครจะไปจำได้ล่ะ! แล้วทำไมไม่ใส่ซูคาจันเหมือนปกติ!"
1011102-106 = "แบบนี้มันผิดกฎนะ! นี่มันกับดักนี่นา! ทำเกินไปแล้ว!"
1011102-107 = "อย่างน้อยก็ใส่ซูคาจันไว้สิ ตอนเห็นจะได้วิ่งหนีได้ไง!"
1011102-108 = "ทำไงได้ล่ะ วันนี้ฉันมีเหตุผลส่วนตัวน่ะสิ"
1011102-109 = "เรื่องนั้นช่างมันเถอะ ว่าแต่ยังจำได้รึเปล่าว่าครั้งที่แล้วฉันบอกเธอไปว่าอะไร?"
1011102-110 = "เฮือก?!"
1011102-111 = "ฉันบอกว่าถ้าทำตัวไม่ดีอีก จะโดนลงโทษใช่มั้ย?"
1011102-123 = "อึก..."
1011102-124 = "ฝะ... ฝากไว้ก่อนเถอะ!"
1011102-131 = "[ns] \"ผะ... เผ่นแนบไปเลย\""
1011102-132 = "ที่ยกโทษให้เพราะเห็นแก่ความกล้าหาญนั้นหรอกนะ ฮ่าฮ่าฮ่า!"
1011102-133 = "จะมาไถเงินจากฉันงั้นเรอะ เป็นประสบการณ์ที่แปลกใหม่ดีนะเนี่ย"
1011102-134 = "[s] \"ทางนั้นเหมือนจะจำเนรุไม่ได้ใช่มั้ย?\""
1011102-135 = "คงงั้นนะ? ถ้ารู้ว่าเป็นฉันน่ะนะ คงไม่กล้าเข้ามาหาเรื่องแบบเมื่อกี้หรอก..."
1011102-136 = "แล้วทำไมถึงจำไม่ได้นะ..."
1011102-137 = "[s] \"เพราะซูคาจันหรือเปล่า?\""
1011102-138 = "ก็น่าจะใช่นะ ซูคาจันมีสีสันโดดเด่น ต่อให้มองจากไกลๆ ก็รู้ได้ว่าเป็นฉัน..."
1011102-139 = "เดี๋ยวนะ งั้นที่ฉันรู้สึกว่าบรรยากาศในโรงเรียนมันแตกต่างจากเดิม ก็ไม่ใช่ว่าเพราะมีเรื่องอะไรเกิดขึ้น#nกับคนอื่น..."
1011102-140 = "แต่เป็นเพราะคนอื่นต่างหากที่จำฉันไม่ได้?"
1011102-141 = "[s] \"ก็คงจะอย่างนั้นละ...\""
1011102-142 = "ไม่มีใครจำฉันได้งั้นเหรอ... แบบนี้มันก็..."
1011102-146 = "อาจจะไม่แย่เท่าไรก็ได้นะ?"
1011102-147 = "เป็นความรู้สึกที่แปลกจนน่าทึ่งเลยละ ที่ผ่านมาฉันไม่เคยรู้สึกแบบนี้มาก่อนเลย"
1011102-148 = "ไหนจะยังได้เปิดประสบการณ์ใหม่ๆ แบบเมื่อกี้ด้วย ฮ่าฮ่าฮ่า!"
1011102-149 = "[s] \"ตะ... ตกลงว่าชอบแล้วเหรอ?\""
1011102-150 = "ถ้าจะให้เลือกว่าแบบไหนดีกว่า ฉันก็คงเลือกแบบที่ตัวเองได้ใส่ซูคาจันนั่นละ..."
1011102-151 = "แต่ว่าตอนนี้มันเริ่มจะสนุกแล้วสิ!"
1011102-152 = "อ๊ะ จริงสิ!"
1011102-153 = "ฉันแต่งตัวแบบนี้เข้าโรงเรียนดีมั้ย? จะมีใครจำฉันได้มั้ยนะ?"
1011102-158 = "ชักจะสงสัยแล้วสิ! ไปด้วยกันเถอะนะ ครู! เร็วเข้า!"
1011102-160 = "(แล้วคุณครูก็ไปเดินเล่นรอบโรงเรียนมิลเลเนียมพร้อมกับเนรุที่ตื่นเต้น)"

[translation]
1011102-1 = "驚人的平凡"
1011102-2 = "千年自治區公園"
1011102-5 = "[ns]「嗨，寧瑠。」"
1011102-6 = "啊，老師。"
1011102-7 = "我沒注意到你已經來了，差點就睡著了呢。"
1011102-8 = "[s]「你穿著制服耶？」"
1011102-9 = "啊，這是我第一次穿這樣跟老師見面嗎？"
1011102-10 = "總之大概就是這樣。"
1011102-11 = "研討會的會計拜託我在活動期間穿著制服。"
1011102-12 = "要是平常的話，我肯定會無視他……"
1011102-13 = "不曉得那個活動到底有多重要……#n他一直苦苦哀求，害我實在沒辦法拒絕。"
1011102-14 = "唔唔……其實請老師過來也是因為衣服的關係。"
1011102-15 = "沒穿著絲卡將，總覺得有點空虛。"
1011102-16 = "所以……老師你有沒有……什麼建議……"
1011102-17 = "……"
1011102-21 = "呃啊啊啊啊！"
1011102-22 = "[s]「爆，爆炸了！？」"
1011102-23 = "不是有點空虛，而是非常空虛！"
1011102-24 = "好尷尬！超奇怪！有種被脫光了的感覺！"
1011102-25 = "老師覺得怎樣？只穿制服果然很奇怪吧？#n我是不是應該硬穿上絲卡將才對！？"
1011102-26 = "[s]「……很平凡很可愛啊。」"
1011102-27 = "什，什麼！？"
1011102-28 = "別鬧了！現在可不是開玩笑的時候！"
1011102-29 = "[s]「……很平凡很適合啊。」"
1011102-30 = "怎，怎麼可能……？"
1011102-31 = "咳哼，總，總之！"
1011102-32 = "我找你出來就是為了這件事。"
1011102-33 = "算了，老師看起來也不會覺得奇怪就好。"
1011102-34 = "總算能鬆一口氣了。#n當然我並不覺得這樣可愛或適合我之類的。"
1011102-35 = "[s]「不用擔心。」"
1011102-37 = "[ns]「無論身上穿著什麼衣服，寧瑠就是寧瑠啊？」"
1011102-38 = "啊？那還用說嗎！"
1011102-39 = "就算沒穿著絲卡將，要打倒一兩群太妹也是輕輕鬆鬆！"
1011102-40 = "嗯？我好像變回原本的樣子了？"
1011102-41 = "……哈哈！"
1011102-42 = "果然跟老師聊聊是正確的決定。#n現在我心情好多了。"
1011102-43 = "那老師，雖然事情已經解決，但就這樣告別實在有點可惜……要不要再一起坐坐？"
1011102-48 = "來吧，跟我來。"
1011102-50 = "話說今天學園裡好像特別安靜耶。"
1011102-51 = "不知道是因為活動的關係，還是只是我的錯覺……"
1011102-52 = "[s]「我覺得跟平常差不多啊……」"
1011102-53 = "不不不，氣氛確實不一樣。"
1011102-54 = "看來千年發生了某些我不知道的事。"
1011102-55 = "啊，又來了。你仔細看。"
1011102-65 = "[ns]「我不太懂耶……」"
1011102-66 = "我明明從剛才就坐在這張長椅上，結果學生們居然直接從我面前經過。"
1011102-67 = "啊？你問那又怎樣？#n平常看到我的時候，他們總是會說「C&C的部長怎麼會在這裡……？」，#n或者「對到眼了，好可怕……！」之類的。"
1011102-68 = "真愛大驚小怪。"
1011102-69 = "[ns]（女僕裝完全沒有發揮偽裝功能……）"
1011102-70 = "不過今天卻完～全沒有聽見那些話。"
1011102-71 = "當然我也不想引人注目，其他人說什麼我也不在意……#n只是跟平常不一樣，總讓人覺得有點奇怪。"
1011102-72 = "就好像有什麼重要的事情，卻只有我不知道一樣……"
1011102-73 = "啊啊，該死！會這樣心神不寧也是因為沒有穿絲卡將嗎？"
1011102-74 = "[s3]「你，你先冷靜。」\n[s4]「先平復一下情緒……」"
1011102-77 = "呼……"
1011102-78 = "老師有什麼頭緒嗎？#n我不管怎麼想都覺得怪怪的。"
1011102-79 = "[s]「這個嘛……」"
1011102-86 = "哎呀，我們的基地有客人啊？"
1011102-90 = "嘻嘻嘻，這個公園是我們的地盤。#n想坐長椅就要付出代價！"
1011102-91 = "先要一點能在十字路口的路邊攤買可麗餅吃的錢吧？"
1011102-92 = "……？"
1011102-93 = "剛才那些話是對我說的嗎？"
1011102-94 = "除了你還能是誰──"
1011102-99 = "咦？你……"
1011102-100 = "嗯？好像很常在哪裡看到……不對，你不是美甘寧瑠嗎！"
1011102-104 = "我記得你耶？之前不是被我教訓過了嗎？"
1011102-105 = "怎麼沒穿絲卡將啊！"
1011102-106 = "犯規！這是陷阱！太過分了！"
1011102-107 = "至少要穿著絲卡將，讓人看到之後有時間可以逃跑啊！"
1011102-108 = "今天穿這身衣服是有原因的。"
1011102-109 = "話又說回來，還記得之前見面的時候，我說了什麼嗎？"
1011102-110 = "咦咦！？"
1011102-111 = "我說過要是敢再為非作歹，就要把你痛扁一頓吧？"
1011102-123 = "可惡……"
1011102-124 = "我，我們走著瞧！"
1011102-131 = "[ns]「一，一下子就……」"
1011102-132 = "看在他們敢主動挑戰的勇氣上，這次就放過他們吧。哈哈！"
1011102-133 = "居然會被別人討保護費，還真是個新鮮的經驗。"
1011102-134 = "[s]「他們好像沒認出是寧瑠？」"
1011102-135 = "是嗎？如果知道是我，剛才就不會像那樣接近了吧……"
1011102-136 = "沒認出來的原因……"
1011102-137 = "[s]「是因為絲卡將？」"
1011102-138 = "畢竟絲卡將很華麗，就算在遠處也很容易認出來……"
1011102-139 = "等等，所以我之所以覺得學園的氣氛不一樣，並不是因為出了什麼事……"
1011102-140 = "而是因為大家不知道是我嗎？"
1011102-141 = "[s]「我想應該是吧……」"
1011102-142 = "誰也認不出我來……這……"
1011102-146 = "好像也不是壞事？"
1011102-147 = "真是種不可思議的感覺耶？我從來沒遇過這種事。"
1011102-148 = "就連剛才那種少見的體驗也是。哈哈哈！"
1011102-149 = "[s]「你，你喜歡這樣嗎？」"
1011102-150 = "這個嘛，如果問我要選哪邊的話，我當然覺得有絲卡將比較好……"
1011102-151 = "不過我開始覺得有點興奮了！"
1011102-152 = "啊，對了！"
1011102-153 = "如果穿成這樣去上課會怎麼樣？大家會都認不出我嗎？"
1011102-158 = "真想趕快試試看！#n我們一起走吧，老師！快點！"
1011102-160 = "（之後便和興奮的寧瑠一起，在千年學園裡四處閒逛）"

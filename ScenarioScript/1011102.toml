[translation]
1011102-1 = "Amazing Mundanity"
1011102-2 = "Millennium District Park"
1011102-5 = "[ns] \"Hi, Neru.\""
1011102-6 = "Ah, Sensei."
1011102-7 = "I didn't know you were here. I almost fell asleep."
1011102-8 = "[s] \"Is that your school uniform?\""
1011102-9 = "Ah, you haven't seen me dressed like this before, have you?"
1011102-10 = "Guess not."
1011102-11 = "Seminar's treasurer asked me to wear it, just for the event."
1011102-12 = "Normally, I would have ignored her..."
1011102-13 = "I don't even know much about this event or how important it is, but she was so damn sincere about it, I couldn't say no."
1011102-14 = "Actually...the uniform's the reason I called you."
1011102-15 = "Without the bomber jacket, I feel like something's missing."
1011102-16 = "So...I wanted to...ask for your advice..."
1011102-17 = "..."
1011102-21 = "Aaargh!"
1011102-22 = "[s] \"A-Are you okay?!\""
1011102-23 = "It's not just the jacket that's missing. It's like there's a part of me gone!"
1011102-24 = "It's so awkward! It's weird! It feels like I'm naked!"
1011102-25 = "What do you think? I look awkward in just the uniform, right? I should do whatever it takes to get the jacket back on, right?"
1011102-26 = "[s] \"...I think you look cute, actually.\""
1011102-27 = "Wh-What?!"
1011102-28 = "Don't joke with me! I'm serious right now!"
1011102-29 = "[s] \"...It's a good look for you.\""
1011102-30 = "I-I don't believe you."
1011102-31 = "*ahem* A-Anyway!"
1011102-32 = "That's what I messaged you for."
1011102-33 = "I mean, at least you don't think I look weird..."
1011102-34 = "So that's a relief, but this definitely doesn't look \"cute\" on me."
1011102-35 = "[s] \"It's okay...\""
1011102-37 = "[ns] \"...regardless of what you're wearing, you're still Neru.\""
1011102-38 = "Huh?! I mean, yeah, that's a given!"
1011102-39 = "I can take down a pack of thugs or two, with or without the jacket!"
1011102-40 = "...Why are you smiling? It's good to see me acting normal again?"
1011102-41 = "...Haha!"
1011102-42 = "It's good to have you here. I always feel better when I talk to you."
1011102-43 = "Anyway, that concludes our business, but, uh, we don't have to call it here. Why don't you come sit with me?"
1011102-48 = "Here, this way."
1011102-50 = "Hmm, is it me, or is everything quiet around here today?"
1011102-51 = "Maybe it's the event, or I don't know, maybe I'm just imagining things."
1011102-52 = "[s] \"It seems normal to me.\""
1011102-53 = "No, no. Something's definitely off."
1011102-54 = "Maybe something's going on with Millennium, and I just missed it."
1011102-55 = "Ah, there's people coming. Let's just watch 'em."
1011102-65 = "[ns] \"I don't get it...\""
1011102-66 = "I was sitting on this bench earlier too, and people would just walk right in front of me."
1011102-67 = "Huh? What do you mean, \"What's weird about that?\" Usually, people go, \"What's C&C's president doing here?\" or \"Oh no, she saw me! Run!\""
1011102-68 = "That kind of thing."
1011102-69 = "[ns] \"(Maybe they don't recognize you in regular clothes...)\""
1011102-70 = "But there's been nooone of that today."
1011102-71 = "It's not like I WANT the attention, and I don't really care what they say, it's just weird that it was all so different."
1011102-72 = "It feels like there's something important, and I'm the only one out of the loop."
1011102-73 = "Ugh, not wearing the jacket is REALLY throwing me off!"
1011102-74 = "[s3] \"Whoa, whoa. Calm down.\"\n[s4] \"Let's just take a deep breath...\""
1011102-77 = "*sigh*"
1011102-78 = "What do you think, Sensei? It's just weird, any way I look at it."
1011102-79 = "[s] \"I wonder...\""
1011102-86 = "Well, looky here. Who invited her?"
1011102-90 = "Kekeke, this is our turf, kid. You'd better pay up if you want to sit there, know what I mean?"
1011102-91 = "Yeah, that'll cost you... How much are those crepes at the food stall down the street?"
1011102-92 = "Hm?"
1011102-93 = "Was that to me?"
1011102-94 = "Well, yeah, who else is he—"
1011102-99 = "...Huh? Aren't you...?"
1011102-100 = "Your face looks familiar... Oh crud, it's Mikamo Neru!"
1011102-104 = "Yours looks familiar too. I'm sure I've taught you this lesson before."
1011102-105 = "I-I didn't know! Why aren't you wearing your bomber jacket?!"
1011102-106 = "That's, like, against the rules! You tricked us! No fair!"
1011102-107 = "At least wear the jacket so we can all run away when we see it!"
1011102-108 = "I have my reasons for not wearing it today."
1011102-109 = "That said, let's go over what we talked about last time."
1011102-110 = "Eek!"
1011102-111 = "I think my words were, \"If I see you up to no good again, you're gonna take a beating.\" Does that sound about right?"
1011102-123 = "Ugh..."
1011102-124 = "W-We'll get you next time!"
1011102-131 = "[ns] \"Th-That ended quickly...\""
1011102-132 = "Yeah, I cut it short. Went easy on 'em for having the guts to come at me."
1011102-133 = "No one's ever tried to mug me before. That was new."
1011102-134 = "[s] \"Well, they didn't know who you were at first.\""
1011102-135 = "I guess. I mean, yeah, if they knew who I was, they probably would've stayed away."
1011102-136 = "And the reason they didn't know..."
1011102-137 = "[s] \"...was because of the jacket again?\""
1011102-138 = "Yeah, the jacket stands out. It's easy to spot from a distance."
1011102-139 = "Oh hey, wait a minute. Maybe that's the reason everything feels all different today. It's not that something happened..."
1011102-140 = "...it's that nobody recognizes me."
1011102-141 = "[s] \"That could be it.\""
1011102-142 = "People aren't even looking at me twice today. It's..."
1011102-146 = "...kind of nice?"
1011102-147 = "It's interesting, at least. A big change of pace."
1011102-148 = "Like I said, I'm having all-new experiences too. Ahaha!"
1011102-149 = "[s] \"S-So you like it?\""
1011102-150 = "Well, given the CHOICE, I'd definitely have the jacket on..."
1011102-151 = "...but this IS getting kind of fun."
1011102-152 = "Oh, you know what?"
1011102-153 = "What if I just go to school in this outfit? Think anybody would recognize me there?"
1011102-158 = "I have to find out! Come on, Sensei! Let's go!"
1011102-160 = "After that, I walked around Millennium with an excited Neru."

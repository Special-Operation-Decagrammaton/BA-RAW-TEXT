[translation]
10035060-1 = "ตอนที่ 6;จระเข้ออกมาแล้วค่ะ!"
10035060-3 = "[ns1] \"ร้อนจัง...\"\n[ns2] \"ร้อนจนจะละลายแล้ว...\""
10035060-6 = "ขอโทษด้วยนะคะคุณครู"
10035060-7 = "มากินทาโกะยากิกันสิคะ..."
10035060-8 = "ไม่มีใครมาเลยนะคะเนี่ย"
10035060-9 = "อากาศร้อนแบบนี้ ใครจะมากินอาหารร้อนๆ กันล่ะ"
10035060-10 = "พวกเธอต้องลำบากเพราะฉันอีกแล้ว... ฉันละขายหน้าจริงๆ"
10035060-11 = "ไม่เป็นไรหรอกค่ะ! ทาโกะยากิที่หัวหน้ากรมฯ ทำไม่ใช่ของที่หากินได้บ่อยๆ นี่คะ!"
10035060-12 = "ใช่แล้ว ถ้าไปกรมความมั่นคงสาธารณะแล้วเล่าให้ใครฟังว่าได้กินทาโกะยากิฝีมือ 'หมาบ้า' คงไม่มีใคร#nเชื่อฉันแน่"
10035060-13 = "ฉันเป็นหนี้บุญคุณพวกเธอเยอะเลย"
10035060-14 = "กับคุณครูก็ด้วย..."
10035060-15 = "นี่เป็นทาโกะยากิที่ฉันเพิ่งทำมาเมื่อกี้ค่ะ... ลองชิมดูสักชิ้นมั้ยคะ?"
10035060-16 = "ตอนนี้สิ่งที่ฉันตอบแทนได้ก็มีแต่ทาโกะยากินี่ละค่ะ"
10035060-17 = "[s3] \"จะกินของซื้อของขายฟรีๆ มันก็กระไรอยู่นะ\"\n[s4] \"เดี๋ยวครูซื้อเอง มากินด้วยกันมั้ย?\""
10035060-20 = "แต่ว่าฉันต้องรับลูกค้า..."
10035060-21 = "ยังไงก็ไม่มีใครมาอยู่แล้วนี่"
10035060-22 = "อีกอย่าง ถ้าเอาแต่ยืนอยู่หน้าเตาแบบนั้นเดี๋ยวก็หมดแรงไปซะก่อนหรอก"
10035060-23 = "ตอนนี้ก็เหงื่อตกอยู่เลยนะคะ..."
10035060-24 = "ถ้างั้นก็พักสักหน่อยแล้วกัน..."
10035060-26 = "ฮู่ว... พอได้พักก็เลยรู้สึกดีขึ้นมาหน่อยนะคะ"
10035060-27 = "ก็วันนี้ทั้งวันยังไม่ได้พักกันจริงๆ จังๆ เลยนี่นะ"
10035060-28 = "..."
10035060-29 = "[s] \"ทุกคนทำได้ดีมากเลยนะ\""
10035060-30 = "นึกว่าจะได้มานอนแช่เท้าในน้ำชิลๆ ซะอีก งานนี้ไม่เป็นไปอย่างที่คิดเลยนะ~"
10035060-31 = "แบบนี้นั่งตากแอร์อยู่ในห้องเหมือนที่เคยทำคงจะดีกว่า"
10035060-32 = "แต่ฉันรู้สึกว่างานนี้มีคุณค่านะคะ!"
10035060-33 = "ฉันเห็นชาวเมืองเล่นสนุกกันได้อย่างใกล้ชิดเลยละค่ะ!"
10035060-34 = "..."
10035060-35 = "[s] \"แล้วคันนะล่ะ?\""
10035060-36 = "ถ้าจะให้พูดตรงๆ ละก็..."
10035060-37 = "หลังจากเข้ามาในวัลคิรี่ ฉันไม่เคยมีวันที่ไร้ความสามารถแบบนี้มาก่อนเลยค่ะ"
10035060-38 = "ตอนรับมือกับผู้คนก็เต็มไปด้วยความผิดพลาด"
10035060-39 = "แถมยังก่อความเสียหายให้สวนน้ำเพราะความเข้าใจผิดของตัวเองอีก"
10035060-40 = "คนเราไม่ควรจะทำอะไรเกินความสามารถของตัวเองสินะคะ"
10035060-41 = "[s] \"ไม่รู้สิ แต่ครูคิดว่าคันนะก็ทำได้ดีอยู่นะ\""
10035060-45 = "โกหกเก่งจังเลยนะคะคุณครู"
10035060-46 = "ฉันรู้ตัวดีค่ะว่าตัวเองไม่มีพรสวรรค์ในการเป็นไลฟ์การ์ดเลย"
10035060-47 = "ถ้าฉันไม่ใจอ่อนกับคำพูดของยัยโคโนกะเข้าละก็ มันคงไม่ต้องมามีเรื่องเละเทะแบบนี้เกิดขึ้น"
10035060-49 = "หมายถึงรองหัวหน้ากรมฯ เหรอคะ? รองพูดอะไรให้ฟังเหรอ...?"
10035060-50 = "จะว่าไป หัวหน้ากรมฯ ยังไม่ได้บอกพวกเราเลยนี่นาว่าทำไมถึงถูกส่งตัวมาเป็นไลฟ์การ์ด"
10035060-51 = "โดนรองหัวหน้ากรมฯ โน้มน้าวมาเหรอ?"
10035060-52 = "..."
10035060-53 = "ตอนนี้คงไม่มีเหตุผลที่ฉันต้องปกปิดแล้วสินะ"
10035060-58 = "ถ้าจะให้พูดตรงๆ จริงๆ ฉันจะไม่มาก็ได้"
10035060-59 = "แต่ที่ฉันใจอ่อนก็เพราะ..."
10035060-60 = "เพราะคำที่บอกว่า... ถ้ายังมีความตั้งใจในตอนแรกที่สมัครเข้าสำนักรักษาความปลอดภัยอยู่ นี่ก็จะเป็นโอกาสที่ดีเลย ฉันก็เลยมาทำงานครั้งนี้"
10035060-61 = "คำพูดนั่นเหลวไหลชะมัด"
10035060-62 = "ฮุฮุ ถ้ายังมีอะไรหลงเหลืออยู่ตอนนี้ คงไม่ใช่ความตั้งใจ แต่เป็นความฝังใจโง่ๆ มากกว่า"
10035060-65 = "..."
10035060-67 = "ช่างมันเถอะ"
10035060-68 = "บางทีอาจจะดีแล้วก็ได้ที่เป็นอย่างนี้"
10035060-69 = "เพราะนี่เป็นโอกาสที่ทำให้ฉันตระหนักได้อีกครั้งว่าตัวเองไม่เหมาะกับงานให้บริการประชาชนของ#nสำนักรักษาความปลอดภัยเอาซะเลย"
10035060-70 = "[s] \"ไม่หรอก\""
10035060-71 = "คะ?"
10035060-72 = "[s] \"คันนะยังอยากช่วยเหลือคนอื่นอยู่ไม่ใช่เหรอ?\""
10035060-73 = "แต่นั่นเป็นงานยากสำหรับคนอย่างฉันนี่คะ แค่จะฉีกยิ้มยังทำไม่ได้เลย..."
10035060-74 = "ตอนที่ฉันสมัครเข้ามา ฉันก็ถูกปฏิเสธเพราะว่าหน้าดุ..."
10035060-75 = "[s] \"ครูว่าปัญหามันไม่ได้อยู่ที่ทำได้หรือทำไม่ได้\""
10035060-77 = "[ns] \"แต่อยู่ที่อยากทำหรือเปล่ามากกว่านะ\""
10035060-79 = "ยะ... อย่างนั้นเหรอคะ"
10035060-80 = "คุณครูมักพูดในสิ่งที่ฉันคาดไม่ถึงเสมอเลยนะคะ"
10035060-81 = "[s] \"ทุกคนก็คิดอย่างนี้นะ\""
10035060-85 = "[ns] \"คิริโนะด้วย\""
10035060-87 = "[ns] \"ฟุบุกิด้วย\""
10035060-89 = "[ns] \"ราบุก็ด้วย\""
10035060-91 = "[ns] \"หืม...?\""
10035060-93 = "เฮือก?!"
10035060-94 = "ฉะ... ฉันพลั้งปากไปเหรอเนี่ย...!"
10035060-98 = "หน้าคุ้นๆ นะ โคะมาคาเสะ ราบุ หัวหน้ากลุ่มเด็กเกเรที่เรียกตัวเองว่าแก๊งหมวกกันน็อก!"
10035060-99 = "อ๊ะ! หมวกกันน็อกนั่น! เมื่อกี้ฉันก็เห็นค่ะ!"
10035060-100 = "ปกปิดตัวตนแล้วมาเล่นสไลเดอร์งั้นเหรอ!"
10035060-102 = "แล้วใครกันเล่าที่ยังนับไม่ทันถึงสาม แต่ก็ปล่อยตัวก่อนจนฉันใจตกไปอยู่ตาตุ่มเลยน่ะ!"
10035060-103 = "ชิ! พวกวัลคิรี่ตามมาถึงที่นี่เลยงั้นเหรอ...!"
10035060-107 = "[ns5] \"ดะ... เดี๋ยวก่อน!\"\n[ns6] \"นะ... หนีไปซะแล้ว?!\""
10035060-110 = "ฉันจะตามไปเองค่ะ! ฟุบุกิ! ไปด้วยกันค่ะ!"
10035060-111 = "ทาโกะยากิเพิ่งจะเย็นเลยนะ..."
10035060-117 = "หยุดนะ หยุดเดี๋ยวนี้! มีสัญญาณเตือนแล้ว!"
10035060-118 = "ยัยแก๊งหมวกกันน็อกก่อเรื่องอะไรเข้าแล้วงั้นเหรอ?"
10035060-119 = "อ๊ะ ดะ... ดูทางนั้นสิคะ!"
10035060-120 = "ตรงสระว่ายน้ำหลัก...!"
10035060-128 = "ว้ายยยย!"
10035060-129 = "จระเข้! มีจระเข้อยู่ในน้ำ!"
10035060-130 = "หนีเร็ว! ทุกคนรีบขึ้นจากสระเร็วเข้า!"
10035060-131 = "เจ้าตัวนั้นแหละ!"
10035060-132 = "สัตว์ประหลาดที่ฉันเห็นเมื่อกี้!"
10035060-133 = "แต่มันดูเหมือนหุ่นยนต์มากกว่านะคะ!"
10035060-134 = "เฮือก! มันออกมาจากสระแล้วมาแทะสไลเดอร์แล้วค่ะ!"
10035060-135 = "จะ... จระเข้จริงเหรอเนี่ย?!"
10035060-136 = "ทำไมยัยพวกแก๊งหมวกกันน็อกถึงเอาอะไรแบบนี้มาได้ล่ะ?"
10035060-137 = "[s] \"ทุกคนตกอยู่ในอันตรายนะ\""
10035060-138 = "ค่ะ! เจ้าหน้าที่ตำรวจจากสำนักรักษาความปลอดภัยไม่อาจปล่อยให้ชาวเมืองตกอยู่ในอันตรายได้ค่ะ!"
10035060-140 = "ไปกันเถอะค่ะ!"

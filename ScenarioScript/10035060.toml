[translation]
10035060-1 = "Episode 6;An Alligator Appears!"
10035060-3 = "[ns1] \"It's so hot...\"\n[ns2]\"I feel like I'm gonna melt...\""
10035060-6 = "...I'm sorry, Sensei."
10035060-7 = "Takoyaki, come and get it..."
10035060-8 = "No one's coming."
10035060-9 = "You think anybody wants hot food in this heat wave?"
10035060-10 = "I'm sorry to have put you all through this..."
10035060-11 = "No worries! You make fine takoyaki, Director. Better than we usually get a chance to eat!"
10035060-12 = "Right? Who's going to believe the Feral Hound even makes takoyaki, let alone that we got to have some?"
10035060-13 = "I'm deeply indebted to all of you."
10035060-14 = "And to you as well, Sensei..."
10035060-15 = "Here, I just made some takoyaki... Would you like some?"
10035060-16 = "It's all I can offer you right now."
10035060-17 = "[s3] \"It doesn't feel right to take this for free...\"\n[s4]\"Why don't I buy it, and we can share?\""
10035060-20 = "But I have to handle the customers..."
10035060-21 = "What customers? There aren't going to be any customers."
10035060-22 = "And Director, if you keep standing in front of the fire like that, you're going to wear yourself out."
10035060-23 = "You're already dripping with sweat..."
10035060-24 = "...I suppose I can take a short break."
10035060-26 = "Phew, I do feel a bit better now."
10035060-27 = "Breaks do help with that. You should try them more often."
10035060-28 = "..."
10035060-29 = "[s] \"You all really pulled through. Great job.\""
10035060-30 = "I thought I could just come here and dip my feet in the water, but it's not quite what I expected."
10035060-31 = "Maybe I should've just stayed in the usual air-conditioned room."
10035060-32 = "I actually found it quite rewarding!"
10035060-33 = "I got to watch so many people having a wonderful time!"
10035060-34 = "..."
10035060-35 = "[s] \"What did you think, Kanna?\""
10035060-36 = "To be honest..."
10035060-37 = "Since starting at Valkyrie, this is the first time I've had such a complete mess of a day."
10035060-38 = "I've been making mistake after mistake dealing with people..."
10035060-39 = "I had a lapse in judgment and disrupted the whole park..."
10035060-40 = "It's true what they say, people shouldn't take on tasks that exceed their capabilities."
10035060-41 = "[s] \"Well, I think you're doing just fine, Kanna.\""
10035060-45 = "You're not a very good liar, Sensei."
10035060-46 = "I lack the skills to be a lifeguard, obviously."
10035060-47 = "If Konoka's words hadn't caught me off guard, things wouldn't have turned out so messy."
10035060-49 = "Konoka, the Deputy Director? What did she say...?"
10035060-50 = "Come to think of it, Director, you never told us why your name was on the dispatch list in the first place."
10035060-51 = "Did the Deputy Director push you into it or something?"
10035060-52 = "..."
10035060-53 = "There's no point in hiding it now."
10035060-58 = "...To be perfectly honest, I still didn't HAVE to come here."
10035060-59 = "But those words..."
10035060-60 = "I ended up here because I thought it might bring my old passion back. Like when I first applied for the Public Safety Bureau."
10035060-61 = "Like an idiot..."
10035060-62 = "Here I am, still clinging to that idea, just out of stubbornness."
10035060-65 = "..."
10035060-67 = "Anyway, it's fine."
10035060-68 = "Maybe it's a blessing in disguise."
10035060-69 = "If nothing else, it's good to know I'm still not cut out to work with the public face to face."
10035060-70 = "[s] \"That's not true.\""
10035060-71 = "Hmm?"
10035060-72 = "[s] \"You still want to help others, don't you?\""
10035060-73 = "...That's hard when I can't even smile right."
10035060-74 = "Back when I applied, I got turned down because of my \"fierce\" appearance."
10035060-75 = "[s] \"It's not so much about whether you CAN do it...\""
10035060-77 = "[ns] \"...but whether you WANT to do it.\""
10035060-79 = "You think so?"
10035060-80 = "You keep on surprising me, Sensei."
10035060-81 = "[s] \"It's not just me. We all think so.\""
10035060-85 = "[ns] \"Kirino...\""
10035060-87 = "[ns] \"Fubuki...\""
10035060-89 = "[ns] \"...even Rabu.\""
10035060-91 = "[ns] \"...Did I just hear a 'yes' from Rabu?\""
10035060-93 = "Huh?!"
10035060-94 = "Crud, I should've kept quiet..."
10035060-98 = "I know that face. Komakaze Rabu, from that no-good \"Helmet Gang.\""
10035060-99 = "Oh, right, I saw that helmet earlier!"
10035060-100 = "You were wearing it when you went on the slide!"
10035060-102 = "And YOU were the one who sent me down on the count of TWO! You almost gave me a heart attack!"
10035060-103 = "Tsk! What's Valkyrie doing, stalking me now?"
10035060-107 = "[ns5] \"Huh? W-Wait!\"\n[ns6] \"She's running away?!\""
10035060-110 = "Let's go after her! Come on, Fubuki!"
10035060-111 = "But the takoyaki's just the right temperature finally..."
10035060-117 = "Wait a minute...the alarm's going off!"
10035060-118 = "You think the Helmet Gang's already causing trouble?"
10035060-119 = "Oh! L-Look over there!"
10035060-120 = "The main pool...!"
10035060-128 = "Aaahh!"
10035060-129 = "Alligator! There's an alligator monster in the water!"
10035060-130 = "Run! Everybody out of the pool!"
10035060-131 = "That's it!"
10035060-132 = "That's the creature I saw!"
10035060-133 = "Wait, is it some kind of robot?"
10035060-134 = "*gasp* Whatever it is, it's eating the slide!"
10035060-135 = "I-Is this for real?!"
10035060-136 = "Where did the Helmet Gang even get that thing?"
10035060-137 = "[s] \"The people are in danger.\""
10035060-138 = "Right! And as a Public Safety Bureau officer, I can't allow that."
10035060-140 = "Hang on, we're coming to help!"

[translation]
10035060-1 = "第6話;鱷魚，出現了！"
10035060-3 = "[ns1]「好熱……」\n[ns2]「快要融化了……」"
10035060-6 = "……對不起，老師。"
10035060-7 = "來買章魚燒喔……"
10035060-8 = "都沒有人來呢。"
10035060-9 = "這種天氣會有人吃熱食才怪。"
10035060-10 = "都怪我連累了你們……真的很抱歉。"
10035060-11 = "沒關係！畢竟局長親手做的章魚燒，可不是天天都能吃到的！"
10035060-12 = "對啊對啊。#n要是去公安局說我吃過「狂犬」做的章魚燒，絕對會被當成是在吹牛呢。"
10035060-13 = "我欠了你們一個大人情。"
10035060-14 = "老師也是……"
10035060-15 = "老師，這是剛做好的章魚燒……要來一個嗎？"
10035060-16 = "我現在能給您的只有這個了。"
10035060-17 = "[s3]「白吃東西怪不好意思的。」\n[s4]「我買單，大家一起吃吧？」"
10035060-20 = "但是我們還得招呼客人……"
10035060-21 = "反正現在又沒客人上門。"
10035060-22 = "而且局長你一直站在火爐前，這樣會把身體搞壞的。"
10035060-23 = "現在已經汗流浹背了……"
10035060-24 = "……那就休息一下吧。"
10035060-26 = "呼，總算活過來了。"
10035060-27 = "畢竟一直馬不停蹄地工作到現在嘛～"
10035060-28 = "……"
10035060-29 = "[s] 「大家辛苦了。」"
10035060-30 = "本以為只是來泡泡腳就好，結果好像跟我預想的不太一樣～"
10035060-31 = "早知道會這樣的話，還不如跟平常一樣在待室內吹冷氣。"
10035060-32 = "不過本官還是覺得很有意義！"
10035060-33 = "因為能夠近距離看到市民們開心的樣子！"
10035060-34 = "……"
10035060-35 = "[s]「環奈覺得呢？」"
10035060-36 = "老實說……"
10035060-37 = "這是我進入女武神後，第一次這麼狼狽。"
10035060-38 = "對應市民們的時候也狀況百出。"
10035060-39 = "甚至還因為誤會而對樂園造成損害。"
10035060-40 = "人果然不該做超出自己能力範圍外的事。"
10035060-41 = "[s]「是嗎？我覺得環奈做得很好哦。」"
10035060-45 = "您說謊的技巧太差了，老師。"
10035060-46 = "我很清楚自己沒有當救生員的天分。"
10035060-47 = "要不是因為木乃香那傢伙，我也不會變得這麼狼狽了。"
10035060-49 = "副局長嗎？他說了什麼呢……？"
10035060-50 = "這麼說來，局長還沒有告訴我們為什麼派遣名單上有你的名字呢。"
10035060-51 = "是副局長一手促成的嗎？"
10035060-52 = "……"
10035060-53 = "事到如今也沒什麼好隱瞞的了。"
10035060-58 = "……老實說，即使在那種情況之下，我還是有辦法拒絕的。"
10035060-59 = "但是一聽到他說……"
10035060-60 = "「如果當時申請生活安全局的心情還在，趁著這次機會體驗一下也不錯」……#n我就被說服了。"
10035060-61 = "真是個傻瓜。"
10035060-62 = "呵呵，即使那樣的心情還在──#n其本質也不再只是純真的心意，而是醜陋的執念了吧。"
10035060-65 = "……"
10035060-67 = "總之就是這樣。"
10035060-68 = "說不定這反而是好事一樁。"
10035060-69 = "藉著這個機會，讓我再次了解到自己並不適合生活安全局的對民業務。"
10035060-70 = "[s]「不是這樣的。」"
10035060-71 = "嗯？"
10035060-72 = "[s]「環奈想幫助他人的心情，自始至終都沒有變過吧？」"
10035060-73 = "……但是，連微笑都做不到的我，勝任不了這份工作。"
10035060-74 = "當初申請的時候，也是因為長相而被拒絕……"
10035060-75 = "[s]「能不能做到是一回事。」"
10035060-77 = "[ns]「重點是有沒有想付出的那份心。」"
10035060-79 = "是，是嗎……"
10035060-80 = "老師總是會說出我意料之外的話呢。"
10035060-81 = "[s]「大家也都是這麼想的哦。」"
10035060-85 = "[ns]「不管是桐乃。」"
10035060-87 = "[ns]「還是吹雪。」"
10035060-89 = "[ns]「就連良舞也是。」"
10035060-91 = "[ns]「……嗯？」"
10035060-93 = "哈！？"
10035060-94 = "情，情不自禁地就……！"
10035060-98 = "我記得你的臉。#n問題學生集團──俗稱「頭盔團」的幹部，河駒風良舞。"
10035060-99 = "啊！那個頭盔我有印象！"
10035060-100 = "居然為了玩滑水道隱藏身份！"
10035060-102 = "也不想想是誰沒數到三就按按鈕，嚇得我心臟差點要跳出來了！"
10035060-103 = "呿！沒想到女武神的傢伙竟然會追到這裡來……！"
10035060-107 = "[ns5]「啊，等等！」\n[ns6]「跑，跑掉了！？」"
10035060-110 = "我去追他！吹雪！我們走吧！"
10035060-111 = "可是章魚燒現在好不容易涼了……"
10035060-117 = "等等！警報響了！"
10035060-118 = "難道頭盔團已經闖出什麼禍了嗎？"
10035060-119 = "啊，你們快看！"
10035060-120 = "主泳池那邊……！"
10035060-128 = "呀啊啊啊！"
10035060-129 = "鱷魚！水裡有鱷魚！"
10035060-130 = "快逃！大家快離開泳池！"
10035060-131 = "就是那傢伙！"
10035060-132 = "是我剛才看到的鱷魚怪物！"
10035060-133 = "看起來更像是機器人呢！"
10035060-134 = "哇！才冒出水面就開始啃滑水道了！"
10035060-135 = "居，居然是真的！？"
10035060-136 = "頭盔團那些傢伙，到底從哪裡弄來這種東西的？"
10035060-137 = "[s]「民眾們有危險。」"
10035060-138 = "是！身為生活安全局的警官，不能坐視市民陷入危險！"
10035060-140 = "我們上吧！"

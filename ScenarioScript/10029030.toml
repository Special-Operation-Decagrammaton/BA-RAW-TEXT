10029030-54 = "3;히마리;08;기뻐하셔도 좋아요. 여러분을 이곳으로 불러온 설비와 재가동 방법에 대해서도 파악이 모두 끝났으니까요.\n#3;em;[음표]\n#2;hide\n#4;hide"

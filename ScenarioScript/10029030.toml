[translation]
10029030-1 = "Episode 3;Like a Tour"
10029030-2 = "After receiving word from Himari, we headed back to the Super Phenomenon Task Force control room."
10029030-11 = "...! A new world!!"
10029030-12 = "It's really a whole other world! Look at this!! How could this...!!"
10029030-13 = "Th-This isn't a dream. It's different! And it's not Indian Poker, either!! It's a real...occult...!!"
10029030-14 = "I'd appreciate if you could calm down a bit. I understand that you're thrilled to meet a delicate-yet-beautiful super genius hacker like me..."
10029030-15 = "But as visitors from another world, you're just as thrilling to me..."
10029030-16 = "Look, out the window! There's something floating in the sky! And the people...! They're a-animals and robots?!"
10029030-18 = "You're not listening at all..."
10029030-22 = "...Ah. There you are, Sensei."
10029030-23 = "[s1] \"We're back, Himari...\"\n[s2] \"Is she the one...?\""
10029030-26 = "That's right. One of the three people that Eimi brought back from Millennium's ruins."
10029030-27 = "She says her name is Saten Ruiko... And she is thrilled to be here."
10029030-28 = "...!! Ah! Another otherworlder!"
10029030-29 = "Oh! And this one's an adult! Hello!"
10029030-30 = "Oh, there's more... Hey, that's the Tokiwadai Middle School uniform!"
10029030-31 = "...?! Misaka...?!"
10029030-32 = "[s3] \"Do you know each other?\"\n[s4] \"She seems like a friendly sort.\""
10029030-35 = "Ahh. So you were the third one, Saten."
10029030-36 = "*sigh*"
10029030-37 = "What's with the sigh? A-Are you disappointed?! It's because I'm not Shirai, isn't it...!"
10029030-38 = "Why are you bringing up Kuroko out of the blue?! That was a sigh of relief!"
10029030-39 = "I'm glad it's you! You won't stir up trouble!"
10029030-41 = "Like I said, I haven't done anything wrong..."
10029030-42 = "If you're going to keep accusing me, maybe I will try my hand at some mischief, since you won't believe me either way..."
10029030-43 = "[s5] \"Sh-Shall we change the subject?!\"\n[s6] \"H-Himari! Please share your findings!\""
10029030-46 = "Heehee. As expected... You look to me when you get desperate, Sensei. It can't be helped. I'm the one you need, after all."
10029030-47 = "I don't mind. It's me you've chosen to rely on, and that means that you're making the right decision."
10029030-48 = "Of course, I've got all the answers to what's going on right now at... It's all ready to go."
10029030-49 = "You're talking about the machinery in the ruins? It sounds like you've finished your analysis."
10029030-50 = "Of course. As I've said before, nothing is impossible for this delicate-yet-beautiful super genius hacker."
10029030-52 = "...Wait. Is she going to tell us or..."
10029030-53 = "Miss Misaka, I think it's better to leave these types alone. The more you engage, the longer they talk."
10029030-54 = "Rejoice, for I already have a full understanding of the machinery that brought you here and how to restart it."
10029030-55 = "It will be a simple matter to fix what's broken, get it back up and running, and send you back to where you belong."
10029030-56 = "Wait... We need to fix it ourselves? How are we going to..."
10029030-57 = "I've prepared a solution for that, too! I've made it so simple that even a child could do it."
10029030-58 = "Sensei. Please take this chip."
10029030-59 = "[s7] \"So all I have to do is plug this in?\"\n[s8] \"It just slots into the machinery...?\""
10029030-62 = "Yes, it is that simple. I am perfect in every way, of course, but when it comes to this kind of thing, I'm especially perfect."
10029030-63 = "I'm nearly done pinpointing the machinery's position and mapping the shortest route to it. I'll have that information for you by the time you're ready to leave."
10029030-64 = "Certainly, we could neutralize any danger by simply smashing the machinery to pieces, but..."
10029030-65 = "We don't want any surprises, so it's probably best to make sure you all make it home in one piece."
10029030-66 = "Anyway, with the arrival of you three, our two worlds have blended together, if only slightly."
10029030-67 = "Besides which..."
10029030-73 = "...It's only polite to see a visitor home safely, right?"
10029030-74 = "Since you've come this far, why not take some time to explore before you leave?"
10029030-75 = "It was dangerous for you to wander before, but now that Sensei is here, it shouldn't be a problem."
10029030-79 = "...Though it is a shame you won't remember any of this after you're gone."
10029030-80 = "Excuse me?"
10029030-81 = "What do you mean by that, exactly? We won't remember this?"
10029030-82 = "That's precisely what I mean. You will be physically returned to a moment before any of this physically happened to you."
10029030-83 = "After you go back, you'll each pick up where you left off, exactly as you were..."
10029030-84 = "As your brains are also physical organs, the new memories you've formed will also be lost. Of course you wouldn't remember something that didn't happen in the first place."
10029030-85 = "What?! Then all this, it'll be just like dream then? No, worse than a dream!"
10029030-86 = "This whole thing is a once-in-a-lifetime, out-of-this-world experience...! Isn't there something we can do? What a waste!"
10029030-87 = "S-Saten... You're treating this like it's some kind of vacation..."
10029030-88 = "Heehee. I see. A vacation..."
10029030-89 = "That's a pleasant way to look at it. And as a local, of course I want to leave a good impression."
10029030-90 = "But I'm afraid that's out of my hands, no matter how incredible I am. I've got my own work to busy myself with."
10029030-91 = "In a situation like this, there's only one thing to do..."
10029030-92 = "Sensei?"
10029030-93 = "[s9] \"Leave it to me.\"\n[s10] \"Being a tour guide sounds fun.\""
10029030-96 = "Heehee... Yes. I'm sure you'll do very well."
10029030-101 = "...? What are you all talking about?"
10029030-102 = "A tour guide? A vacation? Aren't we going to the ruins right now?"
10029030-103 = "Well, I suppose you could. But it's already late, and..."
10029030-104 = "Surely it's okay, isn't it? Giving everyone a chance to enjoy themselves, even if just for a day or two."
10029030-105 = "...Hm."
10029030-106 = "I don't understand."
10029030-107 = "You said they wouldn't even remember coming here. If they don't remember, what's the point?"
10029030-108 = "I don't think it's a very efficient thing to do."
10029030-109 = "Heehee... Yes. That's what I thought you would say, Eimi."
10029030-110 = "On that note, I'd like to invite Eimi to join you on this little vacation, Sensei."
10029030-111 = "Is that okay, Eimi?"
10029030-113 = "...? I have no idea what this is all about."
10029030-114 = "If you tell me to, I'll do it, President. But I have no idea what your intention is."
10029030-115 = "Am I their bodyguard?"
10029030-116 = "Hm... Sure. Let's go with that. And what about the rest of you? You three?"
10029030-117 = "...? Ah, me?"
10029030-118 = "I guess it's okay, right? It sounds like getting us home isn't going to be that hard, after all..."
10029030-119 = "It sounds like it's all working out. Taking a day or two to relax doesn't sound that bad, either."
10029030-120 = "That's right! After we've come this far! It would be a waste to just go back! It's already a waste that we won't remember anything!"
10029030-121 = "...So why bother...if you won't remember..."
10029030-122 = "...I'm completely unknown in this world. In a way, spending some time here feels like it's going to be healing."
10029030-123 = "So then... We simply go out exploring and come back before nightfall?"
10029030-124 = "And Sensei is escorting us? ...Perhaps we should all pursue individual activities."
10029030-125 = "..."
10029030-126 = "Heehee... You are all quite adaptable. Your world must be a fun place as well, hm?"
10029030-127 = "Fun...? Haha... I guess it depends on how you look at it... Well, it's lively, I'll give it that."
10029030-128 = "W-Well, then! Sensei, if you don't mind...!"
10029030-129 = "We're running out of time! The seconds are slipping away as we speak! Let's get out of here!"
10029030-130 = "Be sure to pick some fun places to take us, Sensei!"
10029030-131 = "...Oh?"
10029030-132 = "There's something you need to give me first? Uh... What might that be?"
10029030-133 = "...Ah. Yeah, I've heard this line before."
10029030-134 = "Misaka? Do you know what they're talking about?"
10029030-135 = "They're talking about this. See?"
10029030-136 = "Sensei's going to give you one too. They call it a \"local custom.\""
10029030-137 = "Uh... Ah. Okay..."
10029030-144 = "So... This gun is...a \"local custom?\""
10029030-145 = "Just when I forget that this is another world, things like this remind me..."
10029030-146 = "Apparently, in this world, these things are as common as book bags and earrings. It can't believe I'm saying this, but..."
10029030-147 = "They say walking around without one of these is weirder than being naked in public..."
10029030-148 = "...?"
10029030-149 = "There's no way I heard that right."
10029030-150 = "...Huh?!"
10029030-154 = "Huh?! R-Really?!"
10029030-155 = "It's worse than being naked...?!"
10029030-156 = "[s11] \"No, that's an exaggeration...\"\n[s12] \"Come on, let's get out of here. There's a whole city to see!\""
10029030-161 = "..."
10029030-162 = "Eimi."
10029030-163 = "Yes, President."
10029030-164 = "...I'll be back soon."
10029030-170 = "I spent the rest of the day walking around, showing our three guests all over Kivotos."
10029030-171 = "We didn't return until well into the night. Exhausted, we fell into a deep sleep."

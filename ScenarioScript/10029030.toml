[translation]
10029030-1 = "ตอนที่ 3;เหมือนกับนักท่องเที่ยว"
10029030-2 = "(คุณครูและเอมิได้รับการติดต่อจากฮิมาริ จึงมุ่งหน้ากลับไปยังห้องควบคุมของชมรมปรากฏการณ์ลี้ลับ#nที่ฮิมาริอยู่)"
10029030-11 = "...!!  อีกโลกหนึ่ง!!!"
10029030-12 = "นี่มันอีกโลกหนึ่งจริงๆ ด้วยค่ะ ดูนี่สิคะ!!  ไม่อยากจะเชื่อเลย...!!"
10029030-13 = "นะ... นี่มันไม่ใช่ความฝัน มันต่างกันค่ะ! นี่ไม่เหมือนกับอินเดียนโปกเกอร์!!  ลึกลับจริงๆ เลย...!!"
10029030-14 = "เพราะงั้นก็ช่วยอยู่ให้มันนิ่งๆ กว่านี้หน่อยเถอะค่ะ ต่อให้ตื้นตันใจที่ได้เจอแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใส#nอย่างฉันก็เถอะ..."
10029030-15 = "สำหรับพวกฉันแล้ว พวกคุณเองก็เป็น 'คนจากโลกอื่น' เพราะงั้นพวกฉันก็ประหลาดใจไม่แพ้กัน..."
10029030-16 = "ดูนอกหน้าต่างนั่นสิคะ! มีอะไรบางอย่างลอยอยู่บนท้องฟ้าด้วยค่ะ! แล้วก็มีผู้คนด้วย...! หะ... หุ่นยนต์!?  หุ่นยนต์สัตว์เหรอ!?"
10029030-18 = "ไม่ฟังกันเลยนะคะ..."
10029030-22 = "... อ่า มาแล้วเหรอคะคุณครู?"
10029030-23 = "[s1] \"พวกเรากลับมาแล้ว ฮิมาริ ว่าแต่...\"\n[s2] \"เด็กคนนั้นคือ...?\""
10029030-26 = "... ค่ะ ถูกต้องแล้วค่ะ หนึ่งในสามคนที่เอมิพากลับมาจากพื้นที่รกร้างมิลเลเนียม"
10029030-27 = "เธอบอกว่าชื่อ... ซาเต็น รุยโกะน่ะค่ะ แนะนำตัวอย่างร่าเริงเลยละค่ะ"
10029030-28 = "...!!  อ๊ะ! มีคนจากโลกอื่นมาเพิ่ม!!"
10029030-29 = "เอ๋? มีคนหนึ่งเป็นผู้ใหญ่เหรอคะเนี่ย? ... สวัสดีค่ะ!"
10029030-30 = "จะว่าไปแล้ว... เอ๋... นั่นคนจากโรงเรียนมัธยมต้นโทคิวะได...?"
10029030-31 = "...!? เอ๋... คุณมิซากะ...!?"
10029030-32 = "[s3] \"รู้จักกันเหรอ?\"\n[s4] \"รู้สึกเหมือนสนิทสนมกันเลยนะ\""
10029030-35 = "อ่า อะไรเนี่ย คุณซาเต็นหรอกเหรอ"
10029030-36 = "... เฮ้อ"
10029030-37 = "ทำไมถึงถอนหายใจแบบนั้นกันล่ะ!?  ทำไม... ทำไมถึงทำท่าเหมือนกับว่ามันน่าเสียดายด้วยล่ะคะ!?  เพราะฉันไม่ใช่คุณชิราอิเหรอ...!"
10029030-38 = "มันเกี่ยวอะไรกับคุโรโกะด้วยล่ะ!?  ตรงกันข้ามเลยต่างหาก! ฉันถอนหายใจเพราะโล่งอกต่างหากล่ะ!!"
10029030-39 = "ถ้าเกิดว่าเป็นคุณซาเต็นก็เบาใจได้หน่อยไง! เพราะฉันไม่ต้องกังวลว่าจะไปทำเรื่องน่าสงสัยเหมือน#nใครบางคนหรือเปล่า!"
10029030-41 = "แต่ฉันก็ไม่ได้ทำอะไรเลยนะ...?"
10029030-42 = "ถ้าจะเอาแต่พูดเหน็บแบบนี้ ฉันคงเสียใจที่ถูกใส่ร้ายจนต้องลงมือทำอะไรสักอย่างขึ้นมาจริงๆ..."
10029030-43 = "[s5] \"ปะ... เปลี่ยนเรื่องคุยกันไหม!\"\n[s6] \"ฮะ... ฮิมาริ! เข้าประเด็นเลยดีกว่า!\""
10029030-46 = "ฮุฮุ ว่าแล้วเชียว... พอเจอเรื่องจวนตัวก็คิดถึงฉันขึ้นมาเลยเหรอคะ คุณครู? งั้นก็ช่วยไม่ได้นะคะ ก็มันมีฉันคนเดียวที่ทำได้นี่เนอะ"
10029030-47 = "แต่ก็ไม่เป็นไรหรอกค่ะ มันเป็นความจริงอยู่แล้วที่ไม่มีใครตัดสินอะไรได้เหมาะสมกว่าฉัน"
10029030-48 = "แต่แน่นอนว่าการทำความเข้าใจและหาคำตอบเกี่ยวกับเรื่องนี้... มันมาจากการช่วยเหลือของทุกคนค่ะ"
10029030-49 = "หมายถึงเรื่อง 'เครื่องมือ' นั่นน่ะเหรอ? ท่าทางจะวิเคราะห์เสร็จแล้วสินะ"
10029030-50 = "แน่นอนค่ะ ไม่มีอะไรที่เป็นไปไม่ได้สำหรับแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสคนนี้อยู่แล้ว"
10029030-52 = "... เดี๋ยวก่อน กล้าพูดออกมาจากปากตัวเองเลยเหรอ..."
10029030-53 = "คุณมิซากะ คนประเภทนั้นน่ะ ยิ่งไปหาเรื่องมากเท่าไรก็จะมีแต่พูดอะไรยืดเยื้อขึ้น ฉันว่าปล่อยๆ ไป#nจะดีกว่านะ"
10029030-54 = "จะดีใจรอกันก็ได้นะคะ ฉันสืบหาเครื่องมือที่เรียกพวกคุณมาที่นี่ แล้วก็วิเคราะห์วิธีเปิดใช้เครื่องนั้น#nเสร็จหมดแล้วละค่ะ"
10029030-55 = "แค่ซ่อมแซมส่วนที่ทำงานผิดพลาด ปรับให้เป็นปกติ และเปิดใช้งานอีกครั้ง ก็สามารถพาทุกคนกลับ#nไปยังที่ที่ควรอยู่ได้ค่ะ"
10029030-56 = "... แปลว่าต้องซ่อมมันก่อนเหรอคะ? งั้นจะซ่อมได้ยังไง..."
10029030-57 = "เรื่องนั้นพวกฉันก็เตรียมการกันเสร็จหมดแล้วค่ะ ทำให้ใช้งานได้ง่ายๆ ที่แม้แต่เด็กๆ ก็ทำได้น่ะค่ะ"
10029030-58 = "... คุณครู ช่วยรับชิปนี้ไปได้ไหมคะ?"
10029030-59 = "[s7] \"แค่เอาอันนี้ไปใส่ก็พอเหรอ?\"\n[s8] \"ตรงเครื่องมือมีที่ให้ใส่ชิปด้วยเหรอ...?\""
10029030-62 = "ค่ะ ง่ายใช่ไหมล่ะคะ? เดิมทีฉันก็เป็นคนสมบูรณ์แบบอยู่แล้ว แต่ถ้าเป็นเรื่องแบบนี้ฉันยิ่งเชี่ยวชาญเป็น#nพิเศษค่ะ"
10029030-63 = "เรื่องตำแหน่งของเครื่องมือและรูทการเดินทางที่สั้นที่สุดก็เกือบเสร็จแล้วค่ะ แล้วฉันจะแจ้งให้ทราบ#nต่างหากก่อนออกเดินทางนะคะ"
10029030-64 = "ที่จริงถ้าจะไปที่นั่นแล้วทำลายมันซะเลย ทางฉันก็ไม่มีปัญหาหรอก..."
10029030-65 = "แต่ถ้าจะป้องกันปัญหาที่อาจเกิดได้ล่วงหน้า การส่งคนที่มาที่นี่กลับไปอย่างปลอดภัยน่าจะดีกว่าน่ะค่ะ"
10029030-66 = "จากจุดเวลาที่พวกคุณทั้งสามคนปรากฏตัวที่นี่ โลกทั้งสองค่อนข้างปนเปกันอยู่นิดหน่อย"
10029030-67 = "อีกอย่าง..."
10029030-73 = "... การไปส่งแขกที่มาเยี่ยมเยือนอย่างสุภาพ ก็ถือเป็นมารยาทที่ดีของเจ้าบ้านไม่ใช่เหรอคะ?"
10029030-74 = "แต่ไหนๆ ก็มาที่นี่แล้ว ลองออกไปเที่ยวเล่นดูก่อนออกเดินทางไหมล่ะคะ?"
10029030-75 = "ถึงก่อนหน้านี้จะดูเหมือนพวกคุณหลบหนีไปโดยไม่ได้รับอนุญาต แต่ตอนนี้ก็มีคุณครูอยู่ด้วยแล้ว คงไม่มีปัญหาอะไรหรอกค่ะ"
10029030-79 = "... เพราะถ้ากลับไปแล้ว ฉันว่ามีความเป็นไปได้สูงที่จะจำอะไรไม่ได้เลยค่ะ"
10029030-80 = "... หืม?"
10029030-81 = "จำไม่ได้งั้นเหรอ? หมายความว่ายังไง?"
10029030-82 = "ก็อย่างที่บอกเลยค่ะ เรื่องที่เกิดขึ้นที่นี่ สำหรับทุกคนแล้วจะกลายเป็นเรื่องที่ 'ไม่เคยเกิดขึ้นเลย' ในทางกายภาพค่ะ"
10029030-83 = "หลังจากที่กลับไปแล้ว แต่ละคนจะได้กลับไปดำเนินสถานการณ์ของตัวเองก่อนที่จะมาที่นี่..."
10029030-84 = "พวกคุณจะถูกเคลื่อนย้ายกลับไปอยู่ในสภาวะที่ไร้ตัวกระตุ้นความทรงจำนี้ในสมอง และคุณก็จะไม่#nสามารถจำ 'สิ่งที่ไม่เคยเกิดขึ้น' ได้ค่ะ"
10029030-85 = "ว่าไงนะคะ!?  งั้นนี่ก็ไม่ต่างจากความฝันสิคะ เผลอๆ มันแย่กว่าความฝันอีกนะคะ!?"
10029030-86 = "อุตส่าห์ได้มามีประสบการณ์ในอีกโลกหนึ่งแล้วแท้ๆ...! ไม่มีวิธีอะไรให้จำได้เลยเหรอคะ? แบบนี้มันน่าเสียดายนะคะ!!"
10029030-87 = "คะ... คุณซาเต็น ทำไมถึงทำตัวเหมือนคนที่มาเที่ยวสถานที่ท่องเที่ยวอย่างนั้นล่ะ..."
10029030-88 = "ฮุฮุ จริงด้วยนะคะ สถานที่ท่องเที่ยวงั้นเหรอ..."
10029030-89 = "ตรงกันข้าม ถ้าพวกคุณรู้สึกแบบนั้น พวกฉันก็คงจะสบายใจได้เหมือนกันนะคะ ถ้ามีความประทับใจดีๆ ต่อสถานที่แห่งนี้ ก็คงเป็นเรื่องดีต่อเจ้าบ้านด้วย"
10029030-90 = "แต่ว่าในเรื่องความทรงจำน่ะ ต่อให้ฉันจะเลิศเลอแค่ไหน แต่ก็คงจะช่วยอะไรไม่ได้อยู่ดีค่ะ ก็มันไม่ใช่#nเรื่องของทางนี้ตั้งแต่แรกอยู่แล้วนี่คะ"
10029030-91 = "แต่อย่างน้อยก็..."
10029030-92 = "... คุณครูคะ?"
10029030-93 = "[s9] \"... ได้เลย ให้เป็นหน้าที่ของครูเอง\"\n[s10] \"เรื่องเป็นไกด์น่ะน่าสนุกอยู่แล้ว\""
10029030-96 = "ฮุฮุ ค่ะ เรื่องนั้นคุณครูน่าจะช่วยจัดการให้อย่างดีอยู่แล้ว งั้นก็ขอฝากด้วยนะคะ"
10029030-101 = "......? หมายความว่ายังไง?"
10029030-102 = "ไกด์? นำเที่ยว? เราไม่ได้จะไปยังพื้นที่รกร้างเลยหรอกเหรอ?"
10029030-103 = "อืม จะไปเลยก็ได้อยู่นะคะ แต่เวลาวันนี้มันก็ล่วงเลยไปมากแล้ว..."
10029030-104 = "แค่ 1-2 วัน... ไม่เห็นเป็นไรเลยนี่คะ? เที่ยวเล่นก่อนค่อยไปก็ได้"
10029030-105 = "... อืม"
10029030-106 = "ไม่เห็นจะเข้าใจเลย"
10029030-107 = "ไหนบอกว่าต่อให้กลับไปก็จำอะไรไม่ได้อยู่ดี ถ้าจะเป็นเรื่องที่ไม่เคยเกิดขึ้น แล้วทำไมจะต้องสร้าง#nความทรงจำด้วยล่ะ?"
10029030-108 = "ฉันว่ามันไม่ใช่สิ่งที่มีประสิทธิภาพเท่าไรเลยนะ"
10029030-109 = "ฮุฮุ... ก็ใช่ค่ะ คิดไว้แล้วเชียวว่าเอมิจะต้องพูดแบบนี้"
10029030-110 = "เพราะฉะนั้นฉันเลยอยากขอร้องให้เอมิไปช่วยงานไกด์นำเที่ยวกับคุณครูด้วยค่ะ"
10029030-111 = "พอจะไหวไหมคะ เอมิ?"
10029030-113 = "...???  พูดอะไรไม่เห็นจะเข้าใจเลย"
10029030-114 = "แต่แน่นอนว่าถ้าหัวหน้าสั่งให้ทำ ฉันก็ไม่มีปัญหาหรอก แต่ฉันไม่รู้เจตนาเลย"
10029030-115 = "ให้ฉันไปเป็นบอดี้การ์ดเหรอ?"
10029030-116 = "อืม... ใช่ค่ะ ตอนนี้ทำแบบนั้นก็น่าจะพอค่ะ แล้วทั้งสามคนล่ะคะ?"
10029030-117 = "...? หืม ฉันเหรอ?"
10029030-118 = "เอ่อ ก็... ก็ไม่เห็นเป็นไรนี่? ดูแล้วก็ไม่น่าจะเป็นเรื่องร้ายแรงอะไร ถือว่าดีด้วยซ้ำ..."
10029030-119 = "ดีแล้วแหละ ในทางกลับกัน ถ้าคิดว่าได้มาพักใจสัก 1-2 วันก็ไม่น่าจะเสียหายอะไร"
10029030-120 = "ใช่เลยค่ะ!!  เพราะไหนๆ ก็ได้มาที่นี่แล้ว!!  ถ้าจะให้กลับไปทันทีก็น่าเสียดายแย่ ว่าไหมคะ! แค่จำอะไรไม่ได้ก็น่าเสียดายอยู่แล้ว!!"
10029030-121 = "... ไหนๆ ก็จะจำไม่ได้อยู่แล้ว แล้วทำไมถึงต้อง..."
10029030-122 = "... ก็นะ การได้มาในที่ที่ไม่เกี่ยวข้องกับฉันเลยแบบนี้ บางทีมันอาจจะเป็นวันหนึ่งที่ได้มาฮีลใจก็ได้นะ งั้นก็ไม่เห็นเป็นไรเลยนี่?"
10029030-123 = "ถ้างั้นก็... พวกฉันจะไปที่ไหนก็ได้ แต่ขอแค่กลับมาก่อนที่พระอาทิตย์จะตกก็ได้ใช่มั้ย?"
10029030-124 = "ขอแค่มีคุณครูไปด้วย? ... เราจะแยกย้ายกันไปก็ได้ใช่มั้ย?"
10029030-125 = "......"
10029030-126 = "ฮุฮุ... ใช่ค่ะ ทุกคนปรับตัวได้ดีจังเลยค่ะ โลกทางนั้นก็คงจะเป็นที่ที่น่าสนุกเหมือนกันสินะคะ?"
10029030-127 = "สนุก... หรือเปล่านะ แหะๆ... ฉันคิดว่าน่าจะแตกต่างกันไปตามหน้างานน่ะ... แต่ก็มีเรื่องอะไรหลายๆ เรื่องอยู่นะ"
10029030-128 = "... ถะ... ถ้างั้น คุณครู...! ถ้าสะดวกก็ไปกันเลยไหมคะ...!"
10029030-129 = "ไม่มีเวลาแล้วค่ะ ในระหว่างที่อยู่เฉยๆ กันแบบนี้ เวลาส่วนตัวของพวกฉันก็กำลังหมดไปนะคะ! รีบไปเถอะค่ะ!"
10029030-130 = "รบกวนคุณครูแนะนำหน่อยนะคะว่าควรไปเที่ยวที่ไหนบ้าง!"
10029030-131 = "... คะ?"
10029030-132 = "ก่อนจะไป ฉันต้องรับอะไรไปก่อนด้วยเหรอคะ? หืม...? มันคืออะไรเหรอคะ?"
10029030-133 = "... อ่า จริงสิ ฉันก็ได้ยินอะไรแบบนี้มาเหมือนกัน"
10029030-134 = "คุณมิซากะ? ... ทราบไหมคะว่าเป็นเรื่องอะไร?"
10029030-135 = "อืม ก็เรื่องนี้ไง เห็นนี่ใช่มั้ย?"
10029030-136 = "เดี๋ยวคุณครูคนนั้นก็เอาให้คุณซาเต็นด้วยเหมือนกัน 'ของพื้นๆ' ของเมืองนี้น่ะ"
10029030-137 = "อ่า... อ่า ค่ะ..."
10029030-144 = "โอ้... นี่มันเรื่องแปลกใหม่เลยนะคะ... ปืน... คือของพื้นๆ... งั้นเหรอคะ?"
10029030-145 = "ทุกครั้งที่ฉันเริ่มจะชินกับที่นี่ ก็เกิดความรู้สึกใหม่ๆ ตลอดว่าที่นี่เป็นอีกโลกหนึ่งนะคะเนี่ย..."
10029030-146 = "ก็นะ เหมือนโลกนี้จะมองว่านี่เป็นของทั่วๆ ไปอย่างกระเป๋านักเรียนหรือเครื่องประดับอย่างนั้นแหละ นี่ฉันพูดกับปากตัวเองยังฟังดูไม่น่าเชื่อเลย"
10029030-147 = "ที่ได้ยินมาคืออะไรนะ... การไม่มีสิ่งนี้ติดตัวมันแปลกกว่าการเดินโป๊ๆ ล่อนจ้อนอีก... ใช่มั้ยนะ"
10029030-148 = "...??"
10029030-149 = "... ว่าไงนะคะ?"
10029030-150 = "... โป๊ๆ ล่อนจ้อน?"
10029030-154 = "ปะ... เป็นไปได้ยังไงคะ!?  ถ้างั้น..."
10029030-155 = "ตอนอยู่ข้างนอก ฉันอยู่ในสภาพที่หนักกว่าโป๊ๆ ล่อนจ้อนๆ อีกเหรอ?!"
10029030-156 = "[s11] \"ไม่ใช่หรอก นั่นก็พูดเกินไป...\"\n[s12] \"เอาละๆ! รีบไปกันเถอะ! แค่ 1 นาทีก็มีค่านะ!\""
10029030-161 = "......"
10029030-162 = "... เอมิ"
10029030-163 = "อืม หัวหน้า"
10029030-164 = "งั้นเดี๋ยวฉันมานะ"
10029030-170 = "(จากนั้นคุณครูก็แนะนำสถานที่ที่ทั้งสามคนอยากไป และเดินเที่ยวเล่นกันทั้งวัน)"
10029030-171 = "(กว่าทั้งสามคนจะกลับมา พระอาทิตย์ก็ตกดินไปแล้ว และเมื่อมาถึงก็พากันล้มตัวลงนอนเพราะความ#nเหนื่อยล้า)"

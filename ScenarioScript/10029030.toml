[translation]
10029030-1 = "第3話;就像觀光客一樣"
10029030-2 = "（接到陽葵的聯絡後，一同趕往了陽葵所在的特異現象搜查部管制室）"
10029030-11 = "……異世界！！！"
10029030-12 = "真的是異世界，快看！！#n哇，竟然真的有這種事……！！"
10029030-13 = "這，這不是夢！絕對不是！#n跟印地安撲克不同，是真正的超自然現象……！！"
10029030-14 = "麻煩請你稍微安分一點……#n雖然突然見到像我這樣的超天才病弱美少女駭客，會覺得驚慌也不是不能理解……"
10029030-15 = "不過對我而言，你也同樣是「異世界的人」。#n我想我們對彼此的好奇應該是不相上下的……"
10029030-16 = "那個是……！窗外的天空中好像漂浮著什麼東西！#n還有外面的人……動，動物！？機器人！？"
10029030-18 = "完全沒在聽呢……"
10029030-22 = "……啊，老師，您回來了啊。"
10029030-23 = "[s1]「我回來了，陽葵。不過……」\n[s2]「這個人就是……？」"
10029030-26 = "……是的。這位就是英美從千年廢墟帶回來的三人中的最後一人。"
10029030-27 = "名為……佐天涙子同學。#n真是一段充滿活力的自我介紹呢。"
10029030-28 = "……啊！是新的異世界人！！"
10029030-29 = "咦？其中一個是大人呢……你好！"
10029030-30 = "話說，咦……常盤台中學的學生……？"
10029030-31 = "……！？哎呀，御坂學姊……！？"
10029030-32 = "[s3]「你們認識嗎？」\n[s4]「感覺是個友善的孩子呢。」"
10029030-35 = "啊啊，什麼嘛，原來是佐天學妹啊。"
10029030-36 = "……唉。"
10029030-37 = "為什麼要嘆氣！？啊，是覺得可惜嗎！？因為不是白井同學……！"
10029030-38 = "為什麼要突然提到黑子啊！？#n不是那樣啦！！是因為鬆了一口氣！！"
10029030-39 = "很慶幸是佐天學妹！#n這樣我就不用擔心會像某人一樣做出奇怪的事了！"
10029030-41 = "我不是已經說過我目前為止什麼都沒做了嗎……？"
10029030-42 = "再繼續冤枉我的話，乾脆真的露一手給你瞧瞧好了……"
10029030-43 = "[s5]「我，我們還是換個話題吧！」\n[s6]「陽，陽葵！我們直接切入正題吧！」"
10029030-46 = "呵呵，果然……您每次著急的時候都會想起我呢，老師。#n真拿您沒辦法，畢竟也就只有我能做到了對吧？"
10029030-47 = "不過沒關係，因為您依賴的不是別人而是我。#n沒有比這更合理的判斷了。"
10029030-48 = "當然，關於目前情況的情報和答案……我也早已準備完畢。"
10029030-49 = "是跟那個「設施」有關的事嗎？#n看來分析工作已經完成了。"
10029030-50 = "那當然。就像我再三強調的一樣，超天才病弱美少女駭客的字典裡沒有不可能。"
10029030-52 = "……我說，他剛才是自己……"
10029030-53 = "御坂同學，越是去理會那種類型的人只會讓他越說越久而已。#n我看還是別搭理他比較好哦？"
10029030-54 = "感到高興吧各位。#n我已經查出是什麼設施把你們帶來這個世界，以及該如何重新啟動那台設施了。"
10029030-55 = "只要把造成異常啟動的部分修理好並重新啟動，你們就能回去原本所在的世界了。"
10029030-56 = "……你是說那個設施需要修理嗎？#n那修理的方法……"
10029030-57 = "這點我當然也已經準備好了，而且我設計得非常簡單，就連小孩也能輕鬆修好。"
10029030-58 = "……老師，請您收下這個晶片。"
10029030-59 = "[s7]「只要把這個插進去就行了嗎？」\n[s8]「那個設施有晶片的插槽嗎……？」"
10029030-62 = "沒錯，很簡單吧？#n雖然我本來就很完美，但這個部分剛好是我的拿手領域。"
10029030-63 = "設施的位置和最短路線也即將計算完成，我會在出發之前另行告知。"
10029030-64 = "雖然站在我們的立場上，只要直接破壞掉設施就行了……"
10029030-65 = "但如果想要防止未知的意外發生，我認為最好還是將異世界的人送回去。"
10029030-66 = "畢竟從他們三人來到這裡的時間點開始，我們兩個世界就已經產生了些微的連結。"
10029030-67 = "而且……"
10029030-73 = "……將前來拜訪的客人慎重地送回家，本來就是身為主人的義務。"
10029030-74 = "反過來想，各位既然都來到這裡了，要不要在出發前多逛逛我們的世界呢？"
10029030-75 = "先前各位雖然私自離席，不過如今老師也在，我想應該不會有什麼問題。"
10029030-79 = "──儘管在離開之後，各位很可能什麼都想不起來。"
10029030-80 = "……咦？"
10029030-81 = "你說想不起來？那是什麼意思？"
10029030-82 = "就是字面上的意思。#n在這裡發生的一切，對各位而言都將變成物理上「從未發生過的事」。"
10029030-83 = "回歸原本的世界時，各位將會恢復抵達這裡之前的狀態……"
10029030-84 = "由於腦海中並不會留下這些記憶所造成的刺激，#n轉移之後自然不會記得這些「從來沒發生過的事」。"
10029030-85 = "什麼！？那不就跟做夢沒兩……不對，甚至比做夢還糟嗎！？"
10029030-86 = "我們好不容易才能擁有這種來到異世界的神奇經歷……！#n不能想想辦法嗎？這樣實在太可惜了！！"
10029030-87 = "佐，佐天學妹，你這樣說感覺我們就像來旅遊景點的觀光客一樣……"
10029030-88 = "呵呵，旅遊景點……這麼說也對。"
10029030-89 = "如果各位能這麼想的話，對我們而言也是件值得欣慰的事。#n能夠讓外地人留下好的印象，對本地人來說並不是壞事對吧？"
10029030-90 = "唯獨這一點，是無論我再怎麼萬能也無從影響的。#n況且這也不是我該做的事。"
10029030-91 = "因此雖然談不上是補償……"
10029030-92 = "……老師？"
10029030-93 = "[s9]「……嗯，交給我吧。」\n[s10]「如果是當這種導遊的話，我很樂意。」"
10029030-96 = "呵呵，好的。#n我相信老師您一定能處理得很好，那麼這件事就麻煩您了。"
10029030-101 = "……什麼意思？"
10029030-102 = "導遊？旅行？我們現在不是要出發去廢墟嗎？"
10029030-103 = "雖然這麼做也不是不行，不過今天時間已經很晚了……"
10029030-104 = "多玩個一兩天……應該也無所謂吧？"
10029030-105 = "唔嗯……"
10029030-106 = "我實在不明白。"
10029030-107 = "部長不是說在這裡做過的事都會被忘記嗎？#n既然終究會變成沒發生過，又何必去做呢？"
10029030-108 = "我認為這麼做很沒有效率。"
10029030-109 = "呵呵……我就知道英美會這麼說。"
10029030-110 = "既然你這麼認為的話，就請你跟老師一起擔任導遊吧。"
10029030-111 = "可以吧，英美？"
10029030-113 = "……？？？#n我完全聽不懂部長的意思。"
10029030-114 = "部長要我這麼做的話當然沒問題，但我不明白這麼做的用意。"
10029030-115 = "是要我擔任保鏢嗎？"
10029030-116 = "嗯……要這麼理解也沒關係。#n三位客人意下如何呢？？"
10029030-117 = "……咦，我嗎？"
10029030-118 = "嗯……無所謂吧？#n反正事情看起來似乎沒有那麼急迫……"
10029030-119 = "這樣也不錯吧？#n暫時放下一切，休息一兩天轉換心情。"
10029030-120 = "就是說啊！！難得能來到這裡，就這樣回去太可惜了！#n就算想不起來也很可惜！！"
10029030-121 = "……明明遲早會忘記，為什麼還要特地……"
10029030-122 = "……也對，畢竟來到了一個與自己完全無關的地方。#n從某種意義上來看，不覺得將會是段療癒的時間嗎？"
10029030-123 = "所以……我們只要隨便找個地方晃晃，在日落之前回來就行了嗎？"
10029030-124 = "只要有老師陪著……各做各的事也沒關係？"
10029030-125 = "…………"
10029030-126 = "呵呵……沒錯，大家的適應力還真強呢。#n各位的世界想必也是個有趣的地方吧？"
10029030-127 = "有趣……嗎？#n哈哈……這就取決於你怎麼看了……事情很多倒是真的。"
10029030-128 = "那，那老師……！既然這麼決定了，我們就趕緊……！"
10029030-129 = "沒時間了！就連我們在這裡討論的時候，自由活動時間也在一分一秒地流逝啊！#n趕快出發吧！"
10029030-130 = "麻煩老師推薦適合去的景點囉！"
10029030-131 = "……嗯？"
10029030-132 = "你說在那之前，要先給我一個東西？#n嗯……？是什麼呢？"
10029030-133 = "……啊，也對，我之前也被這麼說過。"
10029030-134 = "御坂學姊？#n你知道……老師是什麼意思嗎？"
10029030-135 = "嗯，就是這個哦。"
10029030-136 = "等等老師也會拿給你的，佐天學妹。#n這是這座都市的「常識」。"
10029030-137 = "哦……啊，我知道了……"
10029030-144 = "哦……這還真新奇呢……槍……竟然是……這裡的常識？"
10029030-145 = "每當快要忘記的時候，就會有事情提醒我這裡是異世界呢……"
10029030-146 = "聽說在這個世界，槍就跟書包或飾品一樣是很稀鬆平常的東西呢。#n雖然這種話連我自己都不太相信……"
10029030-147 = "但他們是怎麼說的來著……沒帶槍比全裸出門還奇怪……之類的。"
10029030-148 = "……？？"
10029030-149 = "……什麼？"
10029030-150 = "…………全裸？"
10029030-154 = "是，是這樣嗎！？所以我……"
10029030-155 = "到剛才為止都用比全裸還詭異的狀態在外面亂晃……！！"
10029030-156 = "[s11]「再，再怎麼說都沒有那麼誇張啦……」\n[s12]「好了好了！我們快點出發吧！玩越多賺越多哦！」"
10029030-161 = "…………"
10029030-162 = "……英美。"
10029030-163 = "嗯，部長。"
10029030-164 = "……那我去去就回。"
10029030-170 = "（於是便四處東奔西跑，為三人介紹他們有興趣的景點）"
10029030-171 = "（直到太陽下山才回來的三人，也許是因為玩得太累的關係，幾乎是倒頭就睡）"

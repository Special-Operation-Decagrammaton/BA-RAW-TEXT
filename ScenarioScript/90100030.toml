[translation]
90100030-1 = "第3話;小隊は腹ごしらえしてから行進する"
90100030-2 = "D.U.外縁・予約制の高級焼肉店"
90100030-6 = "[ns1] \"……まずはハラミからいこうかな。\"\n[ns2] \"それと、冷たいウーロン茶をひとつ。\""
90100030-9 = "かしこまりました～！"
90100030-13 = "えっと……。"
90100030-14 = "うん……。"
90100030-15 = "あはは……。"
90100030-17 = "[ns3] \"あ、牛タンも頼んじゃおう。\"\n[ns4] \"それと野菜の盛り合わせもお願いします。\""
90100030-20 = "かしこまりました～～！"
90100030-24 = "……[USERNAME]先生。"
90100030-25 = "追加の注文をされる前に、お伺いしたいことがあります。"
90100030-26 = "[s5] \"あ、もしかして別の部位が食べたい？\"\n[s6] \"遠慮しないで頼んでいいからね。\""
90100030-29 = "いえ。お肉の話ではありません。"
90100030-30 = "今日は、作戦の打ち合わせのために集まったかと思うのですが……。"
90100030-32 = "どうして私たちは高級焼肉店にいるのでしょうか？"
90100030-33 = "[s7] \"まぁまぁ、お肉でも食べながら話そうよ。\"\n[s8] \"……お、ハラミはもう焼けたね。どうぞ。\""
90100030-36 = "あ、ありがとうございます……。"
90100030-37 = "出された以上は美味しくいただくけど……。"
90100030-41 = "んんっ！？な、なに……このお肉。"
90100030-42 = "舌の上で溶けちゃいそうなのに、噛むと濃厚な肉汁があふれてきて……#nんん……口の中が占領されちゃう……！"
90100030-43 = "う～ん……美味しい。こんなに良いお肉は生まれて初めて食べたかも。#nSRTで出てたのも悪くはなかったけど、これと比べたら……。"
90100030-44 = "[s] \"次は牛タンだよ。\""
90100030-45 = "まぁ……牛タン特有の香ばしさと、甘酸っぱいレモンのタレがよく合いますね。"
90100030-46 = "これだけ分厚いなら、細かく刻んでいなり寿司に添えても良いかも……？"
90100030-47 = "牛タンって、こんなに美味しかったんだねぇ。#nタレとのマリアージュが最高～！"
90100030-51 = "……あ。これって牛の舌なんだよね？#n牛タンを食べるってことは牛と舌を――"
90100030-52 = "食欲なくなること言わないで！！"
90100030-57 = "[ns9] \"ユキノはあんまり食べてないけど……。\"\n[ns10] \"もしかしてホルモンのほうが好き？\""
90100030-60 = "いえ、内臓系はそれほど……。"
90100030-61 = "重ねて申し上げますが、お肉の話ではないのです。"
90100030-65 = "今回の作戦は、可能な限り先生にご負担をおかけしないよう、#n私たちだけで目標を決めるつもりでした。"
90100030-66 = "ですが、直接の指揮を先生が希望されたと連邦生徒会長から伺っています。"
90100030-67 = "[s11] \"名前を貸したからには、それに見合う責任も取らないとね。\"\n[s12] \"迷惑かもしれないけど、これくらいの口出しは許してほしいな。\""
90100030-70 = "口出し、ですか……。"
90100030-71 = "そうはおっしゃいますが、この作戦は私たちにとって「罪を償うための行為」です。#n先生もご理解くださっているのでは？"
90100030-72 = "つまるところ先生の「口出し」とは、私たちの償いを一部肩代わりすることに他なりません。"
90100030-76 = "……先生。"
90100030-77 = "どうして、私たちにここまでしてくださるのですか？"
90100030-78 = "手を差し伸べるだけならまだしも、このような身に余るご厚意まで……。"
90100030-79 = "正直に申し上げれば、感謝よりも困惑が勝っています。恐怖さえ感じるほどに。"
90100030-80 = "[s] \"気にしなくていいよ。ただの食事なんだから。\""
90100030-85 = "[ns] \"……あ、お肉が毒入りかもって心配してる？\""
90100030-86 = "毒、ですか？それはどういう――"
90100030-90 = "げほっ、げほっ！"
90100030-91 = "もうちょいゆっくり食べなって。"
90100030-92 = "ほらお水飲んで……まったく、どう食べたらむせるのさ？"
90100030-93 = "ち、違っ……そういうんじゃなくて……！"
90100030-94 = "そういえば、以前も似たようなお話をしたことがありましたね。"
90100030-95 = "……何の話か、私にはさっぱりなんだが。"
90100030-97 = "網交換失礼します。"
90100030-98 = "[s] \"あ、それとカルビを3人前追加で。\""
90100030-99 = "カルビ3人前、かしこまりました！"
90100030-105 = "……毒のように分かりやすいものであれば、どれだけ良かったことか。"
90100030-106 = "一方的に与えられる善意。これほど恐ろしいものはありません。"
90100030-107 = "先生は、私たちを底なしの奈落から引っ張り上げてくださいました。#nおかげで取り返しのつかない過ちを重ねずに済みましたし、#n後輩と私たちの命は助かりました。"
90100030-108 = "すでに一生をかけてもお返ししきれないほどのご恩があるというのに……#n先生はなおも親切にしてくださります。"
90100030-109 = "一体、何を望んでおられるのだろう、と……いまだに測りかねているのです。"
90100030-110 = "[s] \"なんだか懐かしい質問だね。\""
90100030-114 = "[ns14] \"私は、先生だから。\"\n[ns15] \"見返りを期待してやってるわけじゃないよ。\""
90100030-117 = "……理解に苦しみます。"
90100030-118 = "豪華な焼肉を振る舞うことが、先生のお仕事なのでしょうか？"
90100030-119 = "[s16] \"もちろん。\"\n[s17] \"子どもをちゃんと食べさせるのは大人の義務といっていい。\""
90100030-124 = "[ns18] \"よく食べれば元気が出る。\"\n[ns19] \"よく食べれば成長できる。\"\n[ns20] \"……よく食べてこそ、大人になれるんだから。\""
90100030-128 = "……。"
90100030-129 = "よく食べるべきだ、という点は否定しません。"
90100030-130 = "「軍は胃袋によって行進する」という格言があるくらいですから。"
90100030-134 = "[ns] \"お、カルビがいい感じだよ。\""
90100030-136 = "……良いお肉ですね。"
90100030-137 = "ちょっと待って！感想それだけ！？"
90100030-138 = "……何かおかしなことを言ったか？"
90100030-139 = "臭みもなく、固すぎない。#nだから良い肉だと言ったが……。"
90100030-140 = "最上級の霜降りカルビを「臭くない」で済ませるなんて信じらんない！"
90100030-141 = "なんという暴挙！なんと絶望的な味覚の持ち主なのだろう！"
90100030-142 = "先生、ユキノには高いお肉あげないで！#nたぶん100グラム100円のお肉でも同じこと言うわよ！"
90100030-143 = "クルミちゃん、さすがにそれは言い過ぎじゃないかな……。"
90100030-144 = "毎日戦闘糧食でも平然としてたから、我慢強いのかなって思ってたけど……#nただの味音痴だったとは……。"
90100030-145 = "待て。いくら私が食に興味がないとはいえ、それは聞き捨てならない。"
90100030-146 = "知らないだろうが、SRTの支給品にあるシーフードの缶詰は時間が経つほど魚の旨味が増す。だから賞味期限が切れても美味しく――"
90100030-147 = "賞味期限切れたものは捨てなさいよ！"
90100030-148 = "だめだ。こうなったら正常な味覚が残ってる副小隊長に決定権を委ねるしかない。"
90100030-149 = "ニコ！次のオーダーは君に任せた！"
90100030-150 = "うーん。私も別に味覚が特別優れてるってわけじゃないけど……。"
90100030-154 = "じゃあ、オススメにある油揚げのお吸い物を――"
90100030-155 = "汁物はやめて！お腹いっぱいになっちゃう！"
90100030-157 = "（その後もFOX小隊のみんなと、賑やかな夕食を続けた）"
90100030-159 = "次回;新しい拠点"

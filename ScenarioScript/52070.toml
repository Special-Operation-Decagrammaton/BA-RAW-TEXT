[translation]
52070-1 = "ตอนที่ 7;แดนหิมะ"
52070-7 = "สถานีใกล้โรงเรียนสาขาเอบิสุ"
52070-10 = "นะ... นะ... หนาวจัง เราก็ไม่ได้ออกมาไกลขนาดนั้น แต่ทำไมอุณหภูมิถึงลดฮวบได้ขนาดนี้ล่ะ?"
52070-15 = "ก็บอกตั้งแต่ก่อนออกมาแล้วไงว่าให้ใส่เสื้อผ้าหนาๆ มา"
52070-16 = "ลมหนาวจากทางเหนือพัดมาชนเทือกเขาที่อยู่ทั่วบริเวณนี้จนทำให้หิมะตกลงมา สภาพอากาศในเขต#nปกครองตนเองทางเหนือก็เลยแปรปรวนมากจนว่ากันว่าฤดูกาลเปลี่ยนแปลงไปตามแนวภูเขา"
52070-17 = "อย่างที่นักเขียนนิยายคนหนึ่งในอดีตกล่าวไว้ว่า เมื่อก้าวเท้าออกมาจากอุโมงค์ยาวแห่งชายแดน..."
52070-22 = "แดนหิมะละเจ้าคะ!"
52070-23 = "สวยงามได้ถึงเพียงนี้เลย...! ข้าไม่เคยเห็นวิวหิมะที่งดงามเช่นนี้มาก่อนเลยเจ้าค่ะ!"
52070-28 = "ท่านอาจารย์ ท่านอาจารย์! เห็นตรงนั้นมั้ยเจ้าคะ? เพียงพอนไซบีเรียที่น่ารักน่าชังกำลังกระโจนไปใน#nทุ่งหิมะ..."
52070-29 = "ยูคาริ... อากาศหนาวจนน้ำมูกไหลแล้ว เอ้า เอาผ้าเช็ดหน้าไปเช็ด"
52070-33 = "ข้าสะเพร่าเอง! ทำเรื่องที่น่าอายต่อหน้าคนอื่นเสียได้..."
52070-38 = "เป็นหมู่บ้านที่สวยจังเลยนะ... ฉันไม่รู้มาก่อนเลยว่ามีหมู่บ้านแบบนี้แถวๆ ทุ่งหิมะใหญ่ด้วย"
52070-39 = "[s] \"ตอนมาทุ่งหิมะใหญ่คราวก่อนไม่ได้ผ่านหมู่บ้านนี้เหรอ?\""
52070-40 = "อื้อ ตอนนั้นฉันคิดแค่ว่าต้องตามหาอายาเมะให้เจอ ก็เลยเอาแต่เดินขึ้นเหนือไปเรื่อยๆ และไม่ได้คิดจะแวะหมู่บ้านใกล้เคียงเลย"
52070-41 = "ถ้านั่งรถไฟไปก็จะไปถึงได้เร็วกว่าเดิมสินะ...?"
52070-42 = "[s1] \"เดินเท้าข้ามภูเขาหิมะเลยเหรอ เก่งไม่ใช่เล่นเลยนะ...\"\n[s2] \"เดินเท้าข้ามภูเขาหิมะมันอันตรายนะ คราวหน้าอย่าทำอีกล่ะ\""
52070-45 = "อื้อ ฉันจะจำเอาไว้"
52070-46 = "ว่าแต่เราต้องไปที่ไหนเหรอ ถึงจะได้เจอตำนานร้อยเรื่องราวนั่นน่ะ? หรือว่าต้องรออยู่ที่นี่ไปเรื่อยๆ จนกว่าพระอาทิตย์จะตกดิน...?"
52070-47 = "แต่หัวหน้านิยะบอกไว้ว่าโรงเรียนสาขาเอบิสุจะส่งคนออกมารับนี่นา"
52070-48 = "รถไฟก็มาถึงแล้ว งั้นนักเรียนจากทางนั้นก็คงใกล้มาถึงเร็วๆ นี้สินะ..."
52070-53 = "ไม่ทราบว่าพวกคุณคือคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันที่มาจากเฮียกคิยาโคหรือเปล่าคะ?"
52070-63 = "สวัสดีค่ะเฮียกกะเรียวรันทุกคน ฉันเฝ้ารอการมาถึงของทุกคนอยู่ค่ะ"
52070-64 = "เธอคือคนจากโรงเรียนสาขาเอบิสุเหรอ...?"
52070-65 = "ใช่ค่ะ ฉันชื่อฮาบุ อาซามิ เป็นประธานคณะกรรมการปกครองตนเองของโรงเรียนสาขาเอบิสุค่ะ"
52070-66 = "ถึงจะอยู่ในตำแหน่งประธาน แต่นักเรียนคนอื่นก็ออกไปหมดแล้ว ตอนนี้ก็เลยเหลือแค่ฉันคนเดียวค่ะ"
52070-68 = "คงต้องเหนื่อยน่าดูเลยนะ..."
52070-69 = "คุณต้องดูแลโรงเรียนตามลำพังท่ามกลางอากาศหนาวเย็นแบบนี้เหรอเจ้าคะ... เก่งมากจริงๆ เลยเจ้าค่ะ!"
52070-70 = "ฮุฮุ ชมกันเกินไปแล้วค่ะ"
52070-71 = "ที่จริงที่นี่ก็ไม่ได้มีงานยุ่งมากขนาดนั้นหรอกค่ะ สำหรับพื้นที่ห่างไกลที่ไม่มีอะไรให้ทำมากนัก การทำอะไรฆ่าเวลาคนเดียวก็เป็นงานที่น่าเบื่อค่ะ"
52070-75 = "อ๊ะ คุณคือคุณครู [USERNAME] จากชาเล่ต์ใช่มั้ยคะ?"
52070-76 = "หัวหน้านิยะเล่าเรื่องของคุณครูให้ฉันฟังแล้วค่ะ ได้ยินว่าสร้างผลงานยอดเยี่ยมไว้ในคิโวทอสมากมาย#nเลยนะคะ"
52070-77 = "[s] \"ครูไม่ใช่คนยอดเยี่ยมอะไรขนาดนั้นหรอก...\""
52070-78 = "ไม่หรอกค่ะ ได้ยินว่าคุณครูทั้งกล้าหาญและไม่เกรงกลัวอะไรเลยนี่คะ"
52070-79 = "หัวหน้านิยะบอกว่าคุณครูเคยวิ่งตัดทุ่งโดยไม่ใส่อะไรเลยด้วยค่ะ..."
52070-80 = "[s3] \"นั่นน่ะเหรอผลงานที่ยอดเยี่ยมน่ะ?!\"\n[s4] \"ที่พูดมามันก็ไม่ผิดหรอกนะ แต่ว่ามัน...!\""
52070-83 = "ฮุฮุ ถ่อมตัวจริงๆ เลยนะคะ ไม่จำเป็นต้องพูดแบบนั้นก็ได้ค่ะ"
52070-84 = "ข่าวลือที่ว่าคุณครูดับเพลิงไหม้ขนาดใหญ่ที่เกิดกลางงานเทศกาล แล้วระดมเฮียกกะเรียวรันที่ตกอยู่#nในความโกลาหลมาปราบตำนานร้อยเรื่องราวได้สำเร็จน่ะ แพร่กระจายข้ามภูเขาหลายลูกเลยค่ะ"
52070-85 = "พอคุณครู [USERNAME] กับเฮียกกะเรียวรันทุกคนมาที่โรงเรียนสาขาเอบิสุของฉันแบบนี้ เรื่องลึกลับที่แพร่กระจายไปทั่วบริเวณนี้ก็น่าจะหายไปได้นะคะ"
52070-86 = "ได้ยินมาว่าแถวนี้มีตำนานร้อยเรื่องราวที่เปลี่ยนรูปร่างได้โผล่มาทำร้ายคนด้วย"
52070-87 = "ต้องไปที่ไหนถึงจะตามหาร่องรอยของพวกนั้นได้เหรอ?"
52070-88 = "นั่นสิคะ มีคนที่เห็นสิ่งลึกลับน่าขนลุกนั่นทั่วทุกหนแห่ง ถ้าจะให้บอกอย่างเจาะจงก็คงยากค่ะ..."
52070-89 = "ยังไงตำนานร้อยเรื่องราวก็ไม่ปรากฏตัวจนกว่าพระอาทิตย์จะตกดินอยู่แล้ว ลองไปสำรวจรอบๆ สถานที่ที่มีคนเคยเจอมั้ยล่ะคะ?"
52070-90 = "ฉันจะพาไปชมหมู่บ้านเพื่อเป็นการแนะนำเขตปกครองตนเองที่นี่ด้วยค่ะ"
52070-92 = "อื้อ งั้นก็รบกวนด้วยนะ!"
52070-95 = "ข้าตื่นเต้นเหมือนกับจะได้ไปออกผจญภัยครั้งใหม่เลยเจ้าค่ะ!"
52070-96 = "ฉันไม่ค่อยชอบการเดินเท้าเท่าไร... แต่ถ้าเป็นงานของเฮียกกะเรียวรันก็ช่วยไม่ได้น่ะนะ"
52070-102 = "[ns] \"งั้นก็รบกวนด้วยนะ อาซามิ\""
52070-103 = "ค่ะ เชิญทางนี้เลยค่ะ..."
52070-109 = "ย่านการค้าใกล้โรงเรียนสาขาเอบิสุ"
52070-112 = "ที่นี่คือย่านการค้าที่ชาวเมืองของเขตปกครองตนเองทางเหนือแวะเวียนมาบ่อยๆ ค่ะ"
52070-113 = "ถึงจะมีขนาดเล็กกว่ามากเมื่อเทียบกับย่านการค้าของเฮียกคิยาโค แต่ที่นี่ก็มีสิ่งที่จำเป็นครบครัน ตั้งแต่ร้านค้าต่างๆ ตลอดจนสถานที่ประกอบธุรกิจที่พักแรมเลยค่ะ"
52070-119 = "อุ๊ย รูปปั้นหิมะที่ตั้งโชว์ในร้านนี้ทำจากแก้วเหรอเจ้าคะ? ตอนเปล่งประกายใต้แสงไฟ มันงดงามเหมือนอัญมณีเลยเจ้าค่ะ!"
52070-120 = "ค่ะ สินค้าขึ้นชื่ออย่างหนึ่งของเขตปกครองตนเองเอบิสุก็คือผลิตภัณฑ์จากการเป่าแก้วที่ปราณีตน่ะค่ะ"
52070-121 = "สินค้าแฮนด์เมดเหล่านี้ทำโดยช่างฝีมือท้องถิ่นที่ฝึกฝนการเป่าแก้วมาอย่างยาวนานค่ะ"
52070-122 = "ที่จริงคนที่เห็นตำนานร้อยเรื่องราวแถวๆ โรงเรียนสาขาเอบิสุเป็นคนแรกก็คือช่างฝีมือที่ออกมา#nโรงหัตถกรรมตอนเช้ามืดค่ะ..."
52070-123 = "ตำนานร้อยเรื่องราวที่เห็นเป็นครั้งแรกมีรูปร่างยังไงเหรอ?"
52070-124 = "ฉันก็ไม่แน่ใจค่ะ แต่ได้ยินมาว่ามีรูปร่างคล้ายเพียงพอนไซบีเรียสีขาวนะคะ..."
52070-125 = "เพียงพอนไซบีเรียสีขาวเนี่ยนะ...? ปกติมันไม่ได้อยู่ในรูปร่างที่น่าสะพรึงกลัวหรอกเหรอ?"
52070-126 = "ที่จริงแล้ว..."
52070-132 = "อ๊ะ ช่างฝีมือท่านนั้นอยู่ที่นี่พอดีเลย ลองถามเองเลยน่าจะดีกว่าค่ะ"
52070-139 = "สวัสดีค่ะลุงช่าง อรุณสวัสดิ์ค่ะ"
52070-143 = "หืม...? ใครกันล่ะเนี่ย?"
52070-144 = "ฉันชื่อฮาบุ อาซามิ ประธานคณะกรรมการปกครองตนเอง โรงเรียนสาขาเอบิสุค่ะ ลืมฉันแล้วเหรอคะ?"
52070-145 = "โรงเรียนสาขาเอบิสุยังมีนักเรียนเหลืออยู่อีกเหรอ...? หมู่นี้ความจำของฉันมันเลือนลางมากน่ะ..."
52070-146 = "เมื่อวานเราก็เจอกันนะคะ ลืมกันไวไปหรือเปล่าคะ?"
52070-147 = "ถ้างั้นยังจำได้หรือเปล่าคะว่าเห็นปีศาจแถวๆ โรงหัตถกรรมน่ะค่ะ?"
52070-151 = "ปีศาจเหรอ...? อ้อ! หมายถึงเพียงพอนไซบีเรียสีขาวใช่มั้ย?"
52070-152 = "ฉันจำได้อยู่แล้ว เจ้านั่นดุร้ายมากเลยละ!"
52070-153 = "ตอนเด็กๆ ฉันเคยถูกเพียงพอนภูเขากัดจนได้แผลสาหัส หลังจากนั้นแค่ได้เห็นเพียงพอน ฉันก็ขนลุกไปทั้งตัวแล้ว"
52070-168 = "แล้วเช้ามืดวันหนึ่งตอนที่ฉันกำลังเข้าไปในโรงหัตถกรรม ก็มีเพียงพอนไซบีเรียโผล่มาให้เห็น#nจนฉันตกใจและทำขวดแก้วร่วงจากมือหมดเลย"
52070-179 = "แต่ที่น่าแปลกก็คือต่อให้เศษแก้วกระเด็นไปทั่ว เจ้านั่นก็ไม่ตกใจหรือหนีไปเลย มันกลับเดินเหยียบเศษแก้วอยู่อย่างนั้นละ"
52070-180 = "ตอนนั้นฉันก็เลยรู้ว่านั่นไม่ใช่เพียงพอนไซบีเรียภูเขาธรรมดาๆ"
52070-181 = "เพียงพอนไซบีเรียสีขาวที่โผล่มาตอนเช้ามืดงั้นเหรอ..."
52070-182 = "เพราะทุกคนล้วนมีสิ่งที่ตัวเองกลัวแตกต่างกันออกไปน่ะ..."
52070-183 = "คุณพระ... ขวดแก้วล้ำค่าที่ช่างฝีมือทำแตกหมดเลย แบบนี้น่าเสียดายแย่เลยเจ้าค่ะ"
52070-184 = "แค่ดูจากแจกันที่จัดแสดงในร้านก็รู้แล้วเจ้าค่ะว่าผลงานแต่ละชิ้นต้องทุ่มเทความพยายามมากแค่ไหน"
52070-188 = "ฮ่าฮ่า เรื่องนั้นน่ะไม่ต้องกังวลหรอก ขวดแก้วที่ทำตกวันนั้นเป็นแค่ขวดธรรมดาๆ น่ะ"
52070-189 = "จะว่าไป แม่หนูตาถึงจังเลยนะที่มองเห็นคุณค่าของแจกันนี้ด้วย"
52070-190 = "ผลงานอื่นๆ ก็มีอีกนะ เข้ามาดูในร้านก่อนมั้ยล่ะ?"
52070-194 = "เจ้าค่ะ งั้นข้าขอเข้าไปชมหน่อยนะเจ้าคะ"
52070-201 = "พื้นที่การเกษตรใกล้โรงเรียนสาขาเอบิสุ"
52070-202 = "ที่นี่คือพื้นที่การเกษตรที่ปลูกพืชผลต่างๆ ที่เติบโตในเขตปกครองตนเองเอบิสุค่ะ"
52070-203 = "ทุกคนอาจเคยได้ยินแล้วว่าผลิตผลทางการเกษตรอย่างข้าวโพด มันฝรั่งและแคร์รอตที่ใช้ใน#nงานเทศกาลของเฮียกคิยาโคเป็นพืชที่ปลูกในไร่ของที่นี่"
52070-204 = "ที่จริงผลิตผลทางการเกษตรจากเอบิสุที่ทางเฮียกคิยาโคได้รับทั้งหวานและอร่อย แต่รสหวานในพืช#nจะค่อยๆ ลดลงหลังจากเก็บเกี่ยว ดังนั้นพืชที่อร่อยที่สุดคือพืชที่เพิ่งเก็บเกี่ยวใหม่ๆ ค่ะ"
52070-208 = "นี่เป็นข้าวโพดที่เพิ่งเด็ดมาจากต้นเลยค่ะ ลองชิมกันดูสิคะ"
52070-209 = "ไหนชิมหน่อยซิ..."
52070-216 = "ว้าว หวานจัง! ทั้งหวานและกรอบมากๆ เลยละ เหมือนได้กินข้าวโพดโรยน้ำตาลยังไงยังงั้นเลย"
52070-217 = "ข้าไม่เคยลิ้มรสข้าวโพดแบบนี้มาก่อนเลย เดลิชาสึ~ มากเจ้าค่ะ!"
52070-218 = "ฮุฮุ น่าดีใจจังเลยนะคะที่เฮียกกะเรียวรันทุกคนได้ชิมรสอร่อยนี้"
52070-219 = "ที่นี่ก็เคยมีตำนานร้อยเรื่องราวปรากฏตัวเหรอ?"
52070-220 = "ใช่ค่ะ ผู้สูงอายุที่อาศัยที่นี่เล่าว่าเคยเจอตำนานร้อยเรื่องราวที่มีลักษณะเหมือนหมีตัวใหญ่..."
52070-223 = "ใช่ ฉันเห็นมันเต็มสองตาเลยละ"
52070-224 = "สุดสัปดาห์ที่แล้วฉันออกมาทำงานในไร่ แต่จู่ๆ ก็รู้สึกเย็นยะเยือกขึ้นมาก็เลยหันไปดู ปรากฏว่ามีหมีตัวใหญ่ยืนจ้องฉันอยู่น่ะสิ แล้วมันก็อยู่ใกล้ในระยะ 10 เมตรเลยด้วย!"
52070-242 = "ฉันคิดว่ามันเป็นสัตว์ที่บุกมาทำลายไร่ของเราเมื่อครั้งก่อน ก็เลยยิงมันด้วยปืนล่าสัตว์ อย่าว่าแต่มันจะ#nได้แผลกลับไปเลย มันยืนนิ่งเหมือนไม่เจ็บแม้แต้น้อยด้วยซ้ำ... อึก คิดแล้วก็น่าขนลุก"
52070-243 = "ฉันก็เลยรู้ว่านั่นไม่ใช่หมีจริงๆ แต่เป็นปีศาจที่เขาร่ำลือกัน"
52070-245 = "แต่ก็มีหมีดุร้ายหลายตัวที่ปืนล่าสัตว์ทำอะไรพวกมันไม่ได้นะ..."
52070-246 = "ที่บอกว่าคิดว่าเป็นสัตว์ที่มาทำลายไร่เมื่อคราวก่อน แสดงว่าปกติที่นี่มีหมีมาปรากฏตัวบ่อยเหรอ?"
52070-248 = "ปีนี้อากาศแห้งแล้ง ลูกโอ๊กหรือเกาลัดป่าก็เลยมีไม่ค่อยเยอะน่ะ พวกหมีก็เลยลงมาจากเขาแล้วขโมย#nมันฝรั่งกับหัวผักกาดที่เราเก็บไว้กันไปเยอะทีเดียว"
52070-249 = "แต่ก็ไม่แปลกหรอก... ก็มันฝรั่งที่เติบโตในไร่ของเรามันหวานพอๆ กับมันเทศเลยน่ะสิ"
52070-250 = "ถ้าเอาไปย่างบนกองไฟ กลิ่นจะหอมฟุ้งไป 10 ลี้เลยละ คิดว่าปีศาจจะอดใจไหวมั้ยล่ะ?"
52070-254 = "จริงสิ ฉันเอามันเผามากินเป็นของว่างด้วย ทุกคนลองชิมดูมั้ย?"
52070-258 = "เจ้าค่ะ ข้าขอชิมด้วยค่ะ!"
52070-261 = "อ่า หวานจัง... ความหวานเข้มข้นกระจายไปทั่วปากในทุกคำที่กัดเลย รู้สึกเหมือนได้กินของหวาน#nชั้นเลิศเลยละ..."
52070-262 = "เนื้อสัมผัสหนึบหนับของมันเทศที่เย็นลงเล็กน้อยมีเสน่ห์เหมือนของว่างตะวันตกเลยเจ้าค่ะ!"
52070-263 = "ฮ่าฮ่า ดีจังเลยนะที่นักเรียนทุกคนกินกันอร่อย! ฉันไม่ได้เห็นนักเรียนมานานแค่ไหนแล้วนะ"
52070-264 = "รอเดี๋ยวนะ ฉันจะไปต้มมันฝรั่งกับข้าวโพดมาให้ด้วย!"
52070-271 = "ที่นี่คือ..."
52070-272 = "ที่นี่ก็คือท่าเรือที่รวบรวมอาหารทะเลต่างๆ ที่จับมาได้จากทะเลชายฝั่งของเขตปกครองตนเองเอบิสุค่ะ"
52070-273 = "แม้จะมีขนาดเล็ก แต่แหล่งจับปลาอันอุดมสมบูรณ์ที่ทะเลชายฝั่งก็เต็มไปด้วยสัตว์และพืชทางทะเล#nมากมายหลายชนิด พวกเราก็เลยส่งออกของทะเลไปทั่วคิโวทอสเลยค่ะ"
52070-274 = "อาหารยอดนิยมในงานเทศกาลของเฮียกคิยาโค อย่างพวกปลาหมึกย่างก็ใช้ปลาหมึกที่จับได้ในทะเล#nชายฝั่งของเอบิสุนะคะ!"
52070-275 = "ที่นี่ก็มีคนเจอตำนานร้อยเรื่องราวเหมือนกันงั้นเหรอ?"
52070-276 = "ใช่ค่ะ ชาวประมงคนหนึ่งที่กลับมาจากการทำงานตอนเช้าเล่าว่าเห็นปูแมงมุมขนาดยักษ์ที่ท่าเรือค่ะ..."
52070-277 = "ปูแมงมุม...? ตำนานร้อยเรื่องราวปรากฏตัวในรูปร่างนั้นจริงเหรอ?"
52070-278 = "งั้นก็แปลว่าชาวประมงกลัวปูน่ะสิ ฉันไม่ค่อยเข้าใจเลย"
52070-279 = "ฉันเองก็ไม่ค่อยเข้าใจเหมือนกันค่ะ... แต่ปูแมงมุมน่ะ ถ้ามองเผินๆ มันก็เหมือนแมงมุมเลยนี่คะ?"
52070-280 = "เรื่องปูน่ะฉันไม่รู้หรอก แต่ก็มีหลายคนที่กลัวแมงมุมนะคะ"
52070-281 = "ว่าแต่เราไปเจอชาวประมงคนที่เจอตำนานร้อยเรื่องราวคนนั้นไม่ได้เหรอเจ้าคะ?"
52070-282 = "ค่ะ น่าเสียดายที่ผู้อาวุโสคนนั้นออกไปเดินเรือที่ทะเลห่างไกล วันนี้เลยไม่น่าจะได้เจอค่ะ"
52070-283 = "งั้นก็ไม่จำเป็นต้องมาที่นี่ก็ได้นี่? เราไม่มีเวลามาก งั้นก็รีบไปดูพื้นที่อื่นเถอะ..."
52070-284 = "เรื่องนั้น... ที่จริงแล้ว สาเหตุที่ฉันพาทุกคนมาที่ท่าเรือ ก็เพราะที่นี่มีร้านปลาเผาที่ฉันชอบมากๆ เป็นการส่วนตัวค่ะ"
52070-285 = "ตอนนี้ก็เกือบจะถึงเวลาอาหารเที่ยงแล้ว ฉันก็เลยคิดว่าทุกคนควรได้พักกินอะไรกันสักหน่อยน่ะค่ะ"
52070-287 = "ปลาเผาเหรอ...?"
52070-288 = "ค่ะ ปลาเผาร้านนี้ทำด้วยกรรมวิธีท้องถิ่นของเอบิสุค่ะ"
52070-289 = "ความพิเศษอยู่ที่การเอาน้ำมันเคลือบตัวปลาแล้วเอาไปเผาให้หนังกรอบ เมื่อสุกพอประมาณก็ปรุงรส ด้วยเต้าเจี้ยวแล้วเอาฟอยล์ห่อไว้ จากนั้นก็นำไปนึ่งอีกทีค่ะ!"
52070-290 = "ตอนนี้ที่ร้านใช้ปลาฮอกเกะเพราะช่วงนี้เป็นฤดูของปลาฮอกเกะค่ะ... หนังปลาหนาๆ กับเครื่องปรุงเต้าเจี้ยว ความกรอบกับรสชาติกลมกล่อมที่ได้มันยอดเยี่ยมมากเลยละค่ะ~"
52070-291 = "......"
52070-292 = "แต่ก็คงช่วยไม่ได้นะคะ ถ้าเฮียกกะเรียวรันทุกคนไม่มีเวลา ก็คงได้แค่กินข้าวปั้นหรืออะไรทำนองนั้น#nตอนกลับไปถึงเฮียกคิยาโคแล้ว..."
52070-293 = "ไม่หรอก ไหนๆ ก็มาถึงที่นี่แล้ว จะแวะพักสักหน่อยก็ไม่ได้เสียหายอะไรนี่นะ"
52070-297 = "การจัดเสบียงทหารให้เพียงพอก็เป็นพื้นฐานของยุทธศาสตร์ไม่ใช่เหรอ? วันนี้เราเดินทางมาตั้งไกลแล้ว งั้นก็หาอะไรกินให้อิ่มท้องสักหน่อยดีกว่า"
52070-302 = "หืม? แต่ว่าวันนี้เราโดยสารด้วยรถไฟเป็นส่วนใหญ่ ก็เลยไม่ค่อยได้เดินเท่าไรนะ..."
52070-303 = "แต่ฉันเดินเยอะแล้วนะ"
52070-304 = "เอาเถอะน่า... ยังไงฉันก็คิดว่าการแวะกินปลาเผาก็ไม่ใช่ความคิดที่แย่อะไร"
52070-305 = "ข้าก็เห็นด้วยเจ้าค่ะ!"

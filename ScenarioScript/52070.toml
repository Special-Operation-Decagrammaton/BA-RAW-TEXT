[translation]
52070-1 = "第7話;雪國"
52070-7 = "惠比壽分校附近．簡易車站"
52070-10 = "嗚嗚……好冷哦。#n明明才沒走多遠，氣溫怎麼就低了這麼多啊？"
52070-15 = "所以我才說出發前要穿暖一點。"
52070-16 = "從北方吹來的寒氣，在碰上這一帶的山脈後就會降下大雪。#n因此北方自治區的天氣才會變化無常，甚至有「季節會以山為界而改變」的說法。"
52070-17 = "某位小說家曾經說過，穿過國境的長隧道之後──"
52070-22 = "就是雪國！"
52070-23 = "多麼美麗……！#n如此壯麗的雪景，小女子還是第一次看見呢！"
52070-28 = "老師，老師！您看見了嗎？#n有一隻可愛的白鼬正奮力穿越雪地──"
52070-29 = "……紫，你鼻水都流下來了。#n來，手帕。"
52070-33 = "失，失禮了！#n小女子竟在眾人面前露出這般丟臉的模樣……"
52070-38 = "……真是個美麗的城鎮。#n沒想到大雪原附近還有這樣的地方啊。"
52070-39 = "[s]「上次去大雪原的時候沒經過這裡嗎？」"
52070-40 = "嗯，那時我滿腦子只想著往北方尋找菖蒲，根本沒想過要進入城鎮。"
52070-41 = "……如果搭火車的話，應該能更快到吧？"
52070-42 = "[s1]「居然能徒步翻越雪山，體力還真驚人……」 \n[s2]「但這樣很危險，之後別再這樣了哦。」"
52070-45 = "嗯，我會記住的。"
52070-46 = "話說該去哪裡才能找到百物語？#n難道得在這裡等到天黑嗎？"
52070-47 = "仁耶部長之前說過，惠比壽分校會有人來接應。"
52070-48 = "既然列車已經抵達，對方想必也快到了才對……"
52070-53 = "請問各位是來自本館的百花繚亂紛爭調停委員會嗎？"
52070-63 = "恭候多時了，百花繚亂的各位。"
52070-64 = "你是惠比壽分校的……？"
52070-65 = "是的，我是惠比壽分校自治委員會會長，名叫土生薊。"
52070-66 = "雖然說是會長，其實因為其他學生都已經離開的關係，現在只剩下我一個人就是了。"
52070-68 = "聽起來還真辛苦啊……"
52070-69 = "居然獨自在這麼寒冷的地方守護學園，真令人敬佩！"
52070-70 = "呵呵，過獎了。"
52070-71 = "坦白說其實也沒什麼事可忙。#n在這種缺乏娛樂的偏鄉地區，要一個人打發時間反而更不容易呢。"
52070-75 = "啊，那位就是夏萊的[USERNAME]老師吧？"
52070-76 = "我從仁耶部長那裡聽過許多關於您的事。#n據說您在奇普托斯立下了赫赫戰功呢。"
52070-77 = "[s]「我其實沒有那麼厲害……」"
52070-78 = "不，我聽說您擁有難以想像的膽識與勇氣。"
52070-79 = "仁耶部長之前說過，您曾經一絲不掛地在原野上奔跑……"
52070-80 = "[s3]「戰功指的是這個嗎！？」 \n[s4]「雖然是這樣沒錯，但也不完全是這樣好嗎！？」"
52070-83 = "呵呵，您太謙虛了。"
52070-84 = "撲滅中央大火、整合混亂的百花繚亂、擊退百物語……#n關於老師的傳聞早已傳遍了群山。"
52070-85 = "既然[USERNAME]老師與百花繚亂來到惠比壽分校，#n這一帶流傳的怪談想必很快就會煙消雲散了吧。"
52070-86 = "聽說這附近有會變換模樣、襲擊人的百物語。"
52070-87 = "要去哪裡才能找到它的痕跡呢？"
52070-88 = "怎麼說呢……因為目擊地點四散各處的緣故，難以歸納出特定的地點。"
52070-89 = "反正百物語要到天黑才會出現，不如先去巡視曾有目擊情報的地方吧？"
52070-90 = "正好也能讓我為各位介紹一下自治區。"
52070-92 = "嗯，那就拜託你了！"
52070-95 = "感覺就像即將展開新的冒險一樣，小女子的心情非常雀躍！"
52070-96 = "雖然不是很想四處奔波……不過既然是百花繚亂的任務也沒辦法。"
52070-102 = "[ns] 「拜託你了，薊。」"
52070-103 = "好的，請跟我來……"
52070-109 = "惠比壽分校附近．商店街"
52070-112 = "這裡是北方自治區的居民經常光顧的商店街。"
52070-113 = "雖然比不上百花繚亂所在的本館商店街，依然是從商會到旅館一應俱全哦。"
52070-119 = "哎呀，這間店展示的雪花雕刻是用玻璃製成的嗎？#n在光線下閃閃發亮，就像寶石一樣美麗呢！"
52070-120 = "沒錯，惠比壽自治區的特產之一，就是精緻的玻璃工藝品。"
52070-121 = "這些都是由長年在本地鑽研技藝的職人們手工製作的。"
52070-122 = "……其實最先目擊到百物語的，就是一名為了工作而在黎明時分趕到工坊的職人。"
52070-123 = "第一個被目擊到的百物語是什麼模樣？"
52070-124 = "據目擊者所述……它的外表就像一隻白鼬一樣。"
52070-125 = "……白鼬？不是說會變成令人恐懼的模樣嗎？"
52070-126 = "其實──"
52070-132 = "啊，那位職人正好來了，不妨直接問他吧。"
52070-139 = "您好。"
52070-143 = "……嗯？你是哪位？"
52070-144 = "我是惠比壽分校自治委員會會長，名叫土生薊。#n您忘記我了嗎？"
52070-145 = "……惠比壽分校還有學生嗎？#n我最近的記性實在有點差……"
52070-146 = "明明昨天才見過面而已，您就已經忘了嗎？"
52070-147 = "那麼您是否還記得半個月前，在工坊附近見到妖怪的事呢？"
52070-151 = "……妖怪？#n啊啊！是說那隻白鼬吧？"
52070-152 = "我當然還記得！#n那傢伙可是相當兇殘啊！"
52070-153 = "小時候我曾在山裡被白鼬咬傷，因而吃了不少苦頭……#n從那之後，我只要看到白鼬就會嚇得汗毛直豎。"
52070-168 = "那天清晨，我正打算進工坊時就看見了牠，嚇得連手裡的玻璃瓶都掉到了地上。"
52070-179 = "不過奇怪的是……#n那傢伙連被碎片濺到也一副不疾不徐的樣子，甚至還若無其事地在碎片上走來走去。"
52070-180 = "這時我才意識到，牠並不是普通的白鼬。"
52070-181 = "……黎明時出現的白鼬啊。"
52070-182 = "每個人害怕的東西都不一樣呢……"
52070-183 = "怎麼會……職人精心製作的玻璃瓶居然碎了，真可惜。"
52070-184 = "光是看著店裡展示的花瓶，就能感覺到其中肯定花費了不少心思。"
52070-188 = "哈哈，這點你倒不用擔心。#n當時碎掉的只是普通的牛奶瓶而已。"
52070-189 = "不過居然能看出這花瓶的價值，小姐的眼光可真不錯啊。"
52070-190 = "店裡面還有其他作品，要不要進來看看？"
52070-194 = "嗯，小女子非常樂意！"
52070-201 = "惠比壽分校附近．農耕地"
52070-202 = "這裡是惠比壽自治區的農地，種植著各式各樣的作物。"
52070-203 = "各位應該有聽說過，百鬼夜行祭典中所使用的玉米、馬鈴薯、紅蘿蔔等等農作物，#n都是在這一帶的田地裡栽培的。"
52070-204 = "……雖然百花繚亂收到的惠比壽農產品應該也相當甜美，#n但農作物的甜度從採收後就會開始下降，味道恐怕還是比不上產地現摘的。"
52070-208 = "來，要不要嘗一口剛摘下的玉米？"
52070-209 = "那我就……"
52070-216 = "哇，好甜哦！#n這種又脆又甜的感覺，簡直像是撒了糖一樣！"
52070-217 = "而且還能感受到平常吃不到的玉米香氣，真是太[ruby=Gorgeous]豪～華[/ruby]了！"
52070-218 = "呵呵，能讓百花繚亂的各位品嘗到這股美味，我也感到很高興呢。"
52070-219 = "這裡也出現過百物語嗎？"
52070-220 = "是的。這位長輩曾說他遇到過長得像一隻巨大的熊的百物語──"
52070-223 = "沒錯，是我親眼看見的！"
52070-224 = "上週末在田裡幹活的時候，我突然感受到了一股陰森的氣息……#n回頭一看才發現，居然有頭熊就在距離不到10m的地方盯著我看！"
52070-242 = "本來以為是之前襲擊過田地的那傢伙，於是就朝牠開了槍……#n結果牠不只沒有感覺到痛，甚至連一點反應都沒有……唉，光想就讓人起雞皮疙瘩。"
52070-243 = "也是因為這樣，我才意識到那傢伙並不是普通的熊，而是傳聞中的那個妖怪。"
52070-245 = "某些兇猛的熊，其實也能抵擋獵槍的攻擊吧……"
52070-246 = "你說之前也襲擊過田地……所以平時這附近就經常有熊出沒嗎？"
52070-248 = "今年因為乾燥的關係，野生的橡實和栗子都沒怎麼成熟……#n所以牠們常常會為了儲存在倉庫裡的馬鈴薯和蘿蔔而跑到山下。"
52070-249 = "……畢竟我們田裡種的馬鈴薯，甜得就跟地瓜沒兩樣。"
52070-250 = "只要用營火烤一下，那香甜味甚至能飄出十里遠，就算是妖怪也忍不住吧？"
52070-254 = "對了，我正好帶了烤地瓜當點心，大家要不要嚐嚐看？"
52070-258 = "嗯，麻煩您了！"
52070-261 = "哇，真的很甜耶……#n每咬一口都能感覺到濃郁的甜味在嘴裡擴散，簡直像是在吃高級甜點一樣……"
52070-262 = "烤地瓜稍微放涼後的軟糯口感就像洋菓子一樣，真是迷人極了！"
52070-263 = "哈哈，能看見學生們吃得這麼香，真讓人高興！#n多少年沒見到這副景象了啊？"
52070-264 = "你們稍等一下，我馬上把馬鈴薯和玉米也煮好端過來！"
52070-271 = "這裡是……"
52070-272 = "這裡是在惠比壽自治區的近海，捕撈各式海產的碼頭。"
52070-273 = "雖然規模不大，但由於近海漁場資源豐富的關係，#n得以捕獲各式海鮮並配送至奇普托斯各地。"
52070-274 = "百鬼夜行祭典中最受歡迎的烤魷魚，也是使用在惠比壽近海捕獲的魷魚哦！"
52070-275 = "所以這裡也有人目擊到百物語嗎？"
52070-276 = "是的。有位清晨結束作業返航的漁夫表示，在碼頭見到了一隻巨大的長腳蟹……"
52070-277 = "……長腳蟹？#n百物語真的會用那種模樣現身嗎？"
52070-278 = "而且身為漁夫居然會害怕螃蟹，我實在有點難以理解。"
52070-279 = "雖然我也有同感……不過長腳蟹乍看之下不是有點像蜘蛛嗎？"
52070-280 = "螃蟹的話倒還不好說，但害怕蜘蛛的人可不少呢。"
52070-281 = "這次沒辦法直接見到那位目擊百物語的居民嗎？"
52070-282 = "是的。不巧那位老漁夫正出海到遠洋作業，今天應該見不到他了。"
52070-283 = "那我們也沒必要親自跑來這裡吧？#n現在時間緊迫，還是快點去其他地區看看──"
52070-284 = "其實我之所以帶大家來到這個碼頭，是因為前面有一間我個人非常喜歡的烤魚店。"
52070-285 = "現在也差不多到午餐時間了，大家正好可以稍微吃點東西。"
52070-287 = "烤魚……？"
52070-288 = "沒錯。這裡的烤魚是用惠比壽傳統的做法製作而成。"
52070-289 = "先把魚皮用油煎得酥脆，等快熟了再淋上味噌醬，用鋁箔蓋著蒸煮就是它的特色！"
52070-290 = "最近正值竹筴魚的季節，因此會用竹筴魚來製作……#n厚實的魚皮配上味噌醬既香脆又美味，堪稱絕品哦～"
52070-291 = "……"
52070-292 = "不過這也沒辦法。#n既然百花繚亂的各位時間緊迫，也只好回分校吃飯糰之類的簡餐──"
52070-293 = "不，來都來了，稍微休息一下也不錯。"
52070-297 = "補充足夠的糧食是兵法的基本吧？#n考慮到今天的活動量並不低，也是時候該填飽肚子了。"
52070-302 = "嗯？可是今天大部分時間都在搭火車，其實也沒走多少路吧……"
52070-303 = "對我來說已經夠多了。"
52070-304 = "……而且吃個烤魚再走也無傷大雅。"
52070-305 = "小女子也贊成！"
52070-306 = "那就慢慢吃點東西再走吧？"
52070-314 = "（之後又在分校附近繞了一會，可惜並沒有什麼收穫……）"
52070-315 = "（……天色逐漸暗了下來）"
52070-320 = "……天色變暗了呢。"
52070-321 = "根據目擊者的證言，百物語是在日落後出現的。#n我們現在開始巡邏就行了嗎？"
52070-325 = "啊，不不不！怎麼能一開始就對遠道而來的各位提出這麼失禮的請求呢？"
52070-326 = "今天才第一天，大家來的路上應該也累了……請到宿舍的房間休息一下吧。#n現在沒有其他學生，房間十分充足哦。"
52070-327 = "沒關係，其實也沒那麼累……"
52070-328 = "對了，惠比壽分校的宿舍有附設溫泉……#n如果大家不介意的話，不如去泡個溫泉吧？"
52070-329 = "平常都是我一個人獨享這風雅的溫泉，多少讓人有點罪惡感呢。"
52070-334 = "溫泉！？"
52070-335 = "宿舍裡竟然有溫泉嗎？"
52070-337 = "沒錯，是個能容納十人以上的大型溫泉。#n以前惠比壽分校的學生會當作大浴場來使用……現在則變得像我個人的專屬浴池了。"
52070-338 = "我會在各位泡湯的時候準備好晚餐，請慢慢消除旅途的疲憊吧。"
52070-339 = "哇……部員們一起合宿泡溫泉，根本是漫畫裡的青春場景吧？"
52070-340 = "大家快一起去吧！#n我已經期待到身體都熱起來了！"
52070-346 = "光是聽到溫泉就這麼興奮……這次外出可是百花繚亂的作戰，不是什麼合宿活動。"
52070-347 = "我會在房間裡看書，你們就自己去吧。"
52070-351 = "咦～這也太掃興了吧？"
52070-352 = "桔梗前輩別這樣，一起來嘛～！#n小女子一直夢想著能跟前輩們一起泡湯聊天呢！"
52070-353 = "就算你這麼說……"
52070-354 = "我以後都會準時刷牙，一天也只吃一支冰淇淋的！"
52070-355 = "那不是本來就約定好的事嗎？"
52070-360 = "桔梗前輩～"
52070-365 = "好好好，但我只泡一個小時哦。#n超過我就不泡了。"
52070-366 = "那就趁身體還暖和的時候快點進去吧！"
52070-367 = "小女子泡完澡後想喝水果牛奶！"
52070-373 = "我幫大家準備換洗衣物吧？"
52070-377 = "……啊，嗯。麻煩你了。"
52070-378 = "老師接下來打算做什麼呢？"
52070-379 = "[s5] 「唔嗯，我想思考一些事情。」\n[s6]「今天有點累，想早點休息了。」"
52070-382 = "嗯，那我就先告辭了。"
52070-392 = "哈啊……極樂極樂～"
52070-393 = "身體暖呼呼的，鼻尖卻有冷風拂過。#n這種溫差真讓人放鬆，感覺都快融化了……"
52070-394 = "能夠一邊泡湯一邊欣賞這麼美的風景，真是太[ruby=Romantic]浪～漫[/ruby]了。"
52070-395 = "而且小女子還是第一次體驗這麼大的浴場，#n比起洗澡好像更像在玩水，真是新奇的感覺！"
52070-402 = "…………"
52070-403 = "桔梗，你在水邊磨蹭什麼啊？"
52070-404 = "快點進來泡湯吧。#n你該不會害怕下水吧？"
52070-405 = "怕什麼怕，百花繚亂的參謀怎麼可能因為一點水就──！"
52070-409 = "……別誤會好嗎？我只是想按照順序享受溫泉而已。"
52070-410 = "聽說進水的時候要從離身體遠的部位開始慢慢浸濕，才能把刺激降到最低。"
52070-411 = "是哦……我反而比較喜歡從寒冷中跳進熱水裡那種酥麻的感覺耶。"
52070-412 = "名草前輩不這麼覺得嗎？"
52070-413 = "……嗯。溫熱的水感覺真舒服。"
52070-414 = "把這當成結束一天的例行儀式好像也不錯。"
52070-415 = "雖然今天好像只開心地觀光了一整天就是了。"
52070-416 = "就是說啊～#n比如在場的某人看起來最開心了呢～"
52070-417 = "……蓮華！"

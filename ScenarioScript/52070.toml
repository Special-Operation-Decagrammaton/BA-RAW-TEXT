52070-314 = "(หลังจากนั้นทุกคนก็ได้สำรวจรอบๆ โรงเรียนสาขา แต่ก็ไม่ได้เบาะแสอะไรมากนัก...)"
52070-315 = "(ใกล้ถึงเวลาที่พระอาทิตย์เริ่มลับขอบฟ้า...)"
52070-320 = "พระอาทิตย์ตกแล้ว..."
52070-321 = "ผู้คนที่นี่เล่าว่าตำนานร้อยเรื่องราวจะปรากฏตัวหลังจากพระอาทิตย์ตกดิน งั้นจากนี้ไปพวกเราก็น่าจะ#nต้องลาดตระเวนกันอย่างจริงจังแล้วสินะ"
52070-325 = "มะ... ไม่ค่ะ! ฉันจะขอให้แขกที่เดินทางมาไกลต้องทำงานหนักตั้งแต่วันแรกที่มาถึงไม่ได้หรอกค่ะ"
52070-326 = "วันนี้เป็นวันแรกของพวกคุณและพวกคุณก็คงจะเหนื่อยมาก เชิญพักผ่อนในหอพักนี้ก่อนเถอะค่ะ ตอนนี้เรามีห้องว่างเหลือเฟือเพราะไม่มีนักเรียนแล้วน่ะค่ะ"
52070-327 = "แต่ฉันไม่ได้เหนื่อยขนาดนั้นนะ..."
52070-328 = "จริงสิ หอพักของโรงเรียนสาขาเอบิสุมีออนเซ็นด้วยนะคะ... ถ้าไม่รังเกียจก็ลองไปแช่ออนเซ็นให้#nผ่อนคลายดูสิคะ"
52070-329 = "ออนเซ็นที่นี่กว้างใหญ่และสวยมาก ฉันใช้อยู่คนเดียวก็รู้สึกผิดน่ะค่ะ"
52070-334 = "ออนเซ็นเหรอ?!"
52070-335 = "มีออนเซ็นอยู่ในหอพักเลยเหรอเจ้าคะ?"
52070-337 = "ใช่ค่ะ เป็นบ่อขนาดใหญ่พอสำหรับ 10 คนเลย เมื่อก่อนเหมือนว่านักเรียนของโรงเรียนสาขาเอบิสุจะ#nใช้ออนเซ็นนี้แทนโรงอาบน้ำน่ะค่ะ... แต่ตอนนี้มันไม่ต่างจากห้องอาบน้ำส่วนตัวของฉันหรอกค่ะ"
52070-338 = "ระหว่างที่พวกคุณไปอาบน้ำ ฉันจะไปเตรียมอาหารเย็นไว้ให้ค่ะ เชิญไปพักผ่อนให้เต็มที่เลยนะคะ"
52070-339 = "ว้าว... ให้แช่น้ำด้วยกันเหมือนไปออกแคมป์ด้วยกันน่ะเหรอ นี่มันเหมือนฉากหนึ่งของวัยรุ่นในหนังสือ#nการ์ตูนเลย"
52070-340 = "รีบไปแช่ออนเซ็นกันเถอะทุกคน! ฉันตื่นเต้นจนร่างกายเริ่มร้อนผ่าวแล้วละ!"
52070-346 = "ดูเธอจะตื่นเต้นกับคำว่าออนเซ็นนะ แต่นี่เรามาทำปฏิบัติการของเฮียกกะเรียวรันนะ ไม่ได้มาออกแคมป์กันสักหน่อย"
52070-347 = "ฉันจะอ่านหนังสืออยู่ในห้อง พวกเธอไปกันเถอะ"
52070-351 = "อะไรกัน... ทำไมถึงจะทำเสียบรรยากาศอยู่คนเดียวล่ะ?"
52070-352 = "รุ่นพี่คิเคียว ไปด้วยกันเถอะเจ้าค่ะ ข้าก็เคยฝันอยากอาบน้ำกับรุ่นพี่และพูดคุยเจื้อยแจ้วด้วยกันใน#nอ่างอาบน้ำนะเจ้าคะ!"
52070-353 = "ถึงเธอจะพูดอย่างนั้น..."
52070-354 = "ต่อไปข้าจะหมั่นแปรงฟันให้ตรงเวลา แล้วก็จะกินไอศกรีมแค่วันละแท่งพอเจ้าค่ะ!"
52070-355 = "ได้ไงล่ะ นั่นมันเป็นเรื่องที่เราสัญญากันไว้แล้วต่างหาก"
52070-360 = "รุ่นพี่คิเคียวเจ้าคะ~"
52070-365 = "ก็ได้ๆ แต่ฉันอยู่ด้วยแค่ชั่วโมงเดียวนะ ฉันไม่แช่น้ำนานมากกว่านั้นหรอก"
52070-366 = "งั้นก็รีบไปก่อนที่จะหนาวกว่านี้เถอะ!"
52070-367 = "ข้าอยากกินนมรสฟุรุตี้~ หลังจากอาบน้ำเสร็จด้วยเจ้าค่ะ!"
52070-373 = "ฉันเตรียมผ้าสำหรับใช้ตอนอาบน้ำให้มั้ยคะ?"
52070-377 = "อ่า... อืม... รบกวนด้วยนะ"
52070-378 = "แล้วคุณครูล่ะจะทำอะไร?"
52070-379 = "[s5] \"อืม ครูมีเรื่องให้คิดเยอะน่ะ ครูขอตัวดีกว่า\"\n[s6] \"วันนี้ครูเหนื่อย ขอไปนอนก่อนแล้วกัน\""
52070-382 = "อื้อ งั้นฉันขอตัวก่อนนะ"
52070-392 = "อ่า... นี่มันสวรรค์บนดินชัดๆ"
52070-393 = "ลมหนาวเพิ่งพัดผ่านจมูกไป แต่ทั้งตัวฉันอบอุ่น ร่างกายที่เหนื่อยล้าเหมือนจะละลายไปกับอุณหภูมิน้ำ#nเลยละ..."
52070-394 = "เราได้สนุกกับการอาบน้ำและชมวิวทิวทัศน์ที่สวยงามไปด้วยกันแบบนี้ โรแมนทิกคุ~ จังเลยนะเจ้าคะ"

52070-402 = "......"
52070-403 = "คิเคียว ทำไมยังนั่งอืดอาดอยู่ตรงนั้นล่ะ?"
52070-404 = "รีบลงมาแช่น้ำกับพวกเราสิ อย่าบอกนะว่ากลัวที่จะลงน้ำน่ะ?"
52070-405 = "กลัวอะไรกันล่ะ ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันไม่มีทางกลัวน้ำแค่นี้หรอก!"
52070-409 = "แล้วก็อย่าคิดเอาเองตามอำเภอใจสิ! ฉันกำลังเพลิดเพลินกับการค่อยๆ ลงบ่อออนเซ็นอยู่ต่างหาก"
52070-410 = "ตอนลงน้ำ ว่ากันว่าต้องค่อยๆ ทำให้ส่วนนอกสุดของร่างกายเปียกก่อน จะได้ลดการกระตุ้นต่อร่างกายน่ะ"

52070-413 = "อื้อ... น้ำอุ่นทำให้รู้สึกดีจัง"
52070-414 = "ได้จบวันด้วยการแช่น้ำอุ่นแบบนี้ก็ไม่ใช่กิจวัตรที่แย่เท่าไรนะ"
52070-415 = "ถึงจะพูดเหมือนเราเหนื่อยมาทั้งวัน แต่วันนี้ฉันรู้สึกเหมือนได้เที่ยวอย่างเดียวเลย"
52070-416 = "นั่นสินะ แต่มีคนหนึ่งนะที่ดูสนุกที่สุดเลย~"
52070-417 = "เรนเกะ...!"
52070-418 = "แต่วันนี้ข้าก็สนุกมากๆ เลยเจ้าค่ะ"
52070-419 = "ย่านการค้าก็น่าตื่นตาตื่นใจ การได้พูดคุยกับชาวบ้านที่นี่ก็สนุกดี ปลาเผาที่กินในท่าเรือก็อร่อยมากๆ ด้วยเจ้าค่ะ!"

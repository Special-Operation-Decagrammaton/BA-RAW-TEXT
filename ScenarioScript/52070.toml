[translation]
52070-1 = "Episode 7;Snow Country"
52070-7 = "Way Station near Ebisu Satellite School"
52070-10 = "Ah... It's cold. How did it get so cold? We didn't even travel that far!"
52070-15 = "I told you to dress in layers, but you didn't listen."
52070-16 = "The cold air from the north gets trapped at the mountains nearby, causing snow and...cooler temperatures."
52070-17 = "It reminds me of a famous opening line: \"The train came out of the long tunnel into...\""
52070-22 = "\"...the snow country!\""
52070-23 = "It's so beautiful...! It's magnificent! I've never seen anything like it!"
52070-28 = "Sensei, Sensei! Did you see that? A white weasel is dancing across the snow—"
52070-29 = "...Yukari, your nose is running. Blow into this tissue."
52070-33 = "M-My goodness! How embarrassing!"
52070-38 = "...It's a beautiful village. I'm surprised to see that it's so close to the Great Snowfield."
52070-39 = "[s] \"You didn't notice it the last time you were here?\""
52070-40 = "No. At the time, I was so focused on finding Ayame that I didn't even think to rest."
52070-41 = "...In retrospect, I could have drastically shortened my trip if I had thought to take the train."
52070-42 = "[s1] \"You climbed the mountain on foot?\"\n[s2] \"That's so dangerous! Don't do that!\""
52070-45 = "Duly noted."
52070-46 = "More importantly, where are the Artifact Spirits? Do we just wait until the sun goes down...?"
52070-47 = "President Niya promised that someone from the Ebisu School would guide us."
52070-48 = "Our train was on time. They should be here..."
52070-53 = "Such exquisite haori! You must be the Hyakkaryouran!"
52070-63 = "Greetings! I trust your trip went well?"
52070-64 = "Are you from the Ebisu Satellite School...?"
52070-65 = "Indeed. I am Habu Azami, President of Ebisu Satellite School's Self-Government Committee."
52070-66 = "...And by \"president,\" I also mean the sole remaining member."
52070-68 = "That sounds like a lot of work..."
52070-69 = "She admirably guards her school, all alone in the chilling tundra!"
52070-70 = "Heehee. You are much too kind."
52070-71 = "Frankly, most days are rather boring. Meeting you five is the highlight of my week!"
52070-75 = "Speaking of, you must be Schale's [USERNAME] Sensei?"
52070-76 = "President Niya told me some astounding stories about you. I'm honored to meet such a courageous person."
52070-77 = "[s] \"Oh, I wouldn't say that...\""
52070-78 = "Niya isn't known to exaggerate, is she?"
52070-79 = "She told me you boldly ran across a field, fully exposed and baring your soul!"
52070-80 = "[s3] \"THAT'S what you meant by courageous?!\"\n[s4] \"It's not what it sounds like!\""
52070-83 = "Heehee. And you're so humble, too."
52070-84 = "I've heard rumors that you put out a raging fire at Central and defeated some...frightful spirits by rallying the formerly-disbanded Hyakkaryouran Council."
52070-85 = "And now that [USERNAME] Sensei and the Hyakkaryouran are here, I'm sure our paranormal problems are soon to be solved!"
52070-86 = "We were told that you were being plagued by shapeshifting Artifact Spirits."
52070-87 = "Where were they last seen?"
52070-88 = "Oh...I've heard so many reports all over town. I can't give you a precise location."
52070-89 = "But they don't show up until nightfall, so why don't I give you a tour in the meantime? We should cover MANY sighting locations."
52070-90 = "I would be honored to show you all our lovely village!"
52070-92 = "Sure! That's a great idea!"
52070-95 = "Our next adventure awaits! Let us venture forth!"
52070-96 = "I suppose the tour might provide some clues..."
52070-102 = "[ns] \"Lead the way, Azami.\""
52070-103 = "Delightful. This way, please."
52070-109 = "Shopping District Near Ebisu Satellite School"
52070-112 = "Here's our shopping district. We have a small inn and a lovely promenade."
52070-113 = "While I know it's nothing like the Hyakkiyako's bustling district, I'm sure you see its inherent charm."
52070-119 = "Oh, look at this glass snowflake in the shop window! It shines like a fine jewel!"
52070-120 = "Indeed. The Ebisu District specializes in artisanal glasswork."
52070-121 = "Many of our glass blowers have been working here for generations."
52070-122 = "...In fact, it was a glass blower who encountered the first Artifact Spirit. They were opening their workshop at dawn."
52070-123 = "And what did this spirit look like?"
52070-124 = "I didn't see it, but I heard it resembled a white weasel..."
52070-125 = "...White weasel? I thought these things were supposed to be scary?"
52070-126 = "Well—"
52070-132 = "Oh! The artisan is here! Why don't we ask him directly?"
52070-139 = "Good morning, sir!"
52070-143 = "Huh...? Who are you?"
52070-144 = "I'm Habu Azami, President of the Ebisu Satellite School's Self-Government Committee. Did you forget me already?"
52070-145 = "...That school has STUDENTS?! Ah...my memory isn't what it used to be."
52070-146 = "...Sir, I talked to you yesterday."
52070-147 = "My friends here would like to hear about the monster you met two weeks ago."
52070-151 = "...Monster? Ah, oh! You mean the white weasel!"
52070-152 = "I remember it like it was yesterday! It was a treacherous thing!"
52070-153 = "I've always hated weasels, those nasty little creatures. One bit me on a childhood camping trip...I was traumatized."
52070-168 = "It was the crack of dawn. I was opening my shop and I saw a weasel, right in front of me! I was so spooked that I dropped a glass bottle!"
52070-179 = "But oddly enough, that wretched weasel wasn't scared by the noise. In fact, it kept walking to me, right on top of the scattered glass, no flinching, no blood."
52070-180 = "And that's when I knew that this wasn't your typical weasel... It was unnatural."
52070-181 = "...A white weasel that emerged at dawn."
52070-182 = "That's...a unique fear."
52070-183 = "Oh no... What a pity that you lost your glass bottle."
52070-184 = "Just looking at this flower vase shows me the depth of effort you put into your creations."
52070-188 = "Haha. Sweet girl, it was just a milk bottle! No sense in crying over it!"
52070-189 = "But you like my vase, do you? It's nice to finally meet someone with taste!"
52070-190 = "But the REALLY great stuff's behind the counter. Do you want to come in and look?"
52070-194 = "I'd be positively delighted!"
52070-201 = "Farmland Near Ebisu Satellite School"
52070-202 = "And these verdant fields are where we grow our produce."
52070-203 = "We regularly supply corn, potatoes, and carrots to the Hyakkiyako festivals."
52070-204 = "While I'm sure the Hyakkiyako chefs prepare delectable meals, nothing compares to freshly-picked produce!"
52070-208 = "Here, this corn was harvested this morning. Try it!"
52070-209 = "All right..."
52070-216 = "Wow! It's so sweet, like you put sugar on it! And that crunch!"
52070-217 = "I had no idea corn could be so...flavorful!"
52070-218 = "Heehee. I'm glad to see that the Council approves."
52070-219 = "Did any Artifact Spirits appear here?"
52070-220 = "Indeed. It came in the shape of a giant bear—"
52070-223 = "That's right! Big as a house!"
52070-224 = "I was plowing my field and a chill ran down my spine. I looked up, and this ferocious bear was hunched, staring right at me!"
52070-242 = "I shot it with my hunting gun, thinking it was the one that wrecked my field a few years back. It didn't flinch. It was...eerie."
52070-243 = "And that's when I knew this wasn't a real bear. It wasn't alive...so it couldn't be killed."
52070-245 = "One shot? That could hardly be expected to stop even a typical bear."
52070-246 = "Wait, you said there was a bear before. Does this happen frequently?"
52070-248 = "We had a drought earlier this year, so they'd come down to forage. They'd usually go for the potatoes and turnips on the truck."
52070-249 = "...Not that I blame them. My potatoes are sweeter than yams!"
52070-250 = "You wouldn't believe how good it smells when I roast a rack. I suppose even the monsters wanted a taste!"
52070-254 = "Actually, I have some here in my lunch box! Would you like some?"
52070-258 = "Yes, please!"
52070-261 = "It's so sweet...and with a soft, cake-like texture. It's like eating a gourmet dessert..."
52070-262 = "It's so delightful! Ah, the charms of the farm!"
52070-263 = "It's good to see you students eat so well! Ah, it's been so long..."
52070-264 = "Wait right here. I'll boil up some potatoes and corn!"
52070-271 = "This place is..."
52070-272 = "The wharf! Home of countless varieties of beautiful and delicious sea life!"
52070-273 = "While it may look small, our waters are blessedly abundant. We deliver seafood to all of Kivotos."
52070-274 = "Your Hyakkiyako festivals are known for their roasted squid, correct? Those are all caught here, in Ebisu!"
52070-275 = "And I suppose someone also encountered an Artifact Spirit here?"
52070-276 = "Indeed. It was a fisherman returning from his morning trip. He spotted a giant spider crab!"
52070-277 = "...A spider crab? Truly?"
52070-278 = "And I am to understand that a fisherman's greatest fear was...a crab?"
52070-279 = "I thought the same...but I suppose a spider crab looks like a spider, right?"
52070-280 = "And many, many people are scared of spiders. Also he said it was quite large."
52070-281 = "Is this frightful fisherman available? I would like to interview him."
52070-282 = "Unfortunately not. He's deep-sea fishing and will be gone all day."
52070-283 = "Then why are we here? Time is short, so let's see the other regions—"
52070-284 = "Well, truthfully, I brought you here because there's a delightful cafe nearby. You MUST try their grilled fish."
52070-285 = "It's nearly lunchtime, so why don't we stop for a meal?"
52070-287 = "Grilled fish...?"
52070-288 = "Yes. It's another Ebisu specialty!"
52070-289 = "Here, they fry the fish until crispy, and, halfway through cooking, they pour on a miso marinade, wrap it in foil, then steam it!"
52070-290 = "It's currently mackerel season... The thick skin mixed with the miso seasoning provides a savory, crispy taste that can't be beat!"
52070-291 = "..."
52070-292 = "But, I understand. If the Hyakkaryouran is on a tight schedule, then I'll take you back to the satellite school and we can get some onigiri out of the vending machine—"
52070-293 = "Well, we've already come so far."
52070-297 = "There's no sense in turning down a good meal, especially if we'll be working tonight. And we've been walking all day..."
52070-302 = "Huh? We mostly took the train. This is barely a stroll!"
52070-303 = "I have walked enough."
52070-304 = "And I think it would be wise to at least sample the grilled fish."
52070-305 = "I wholeheartedly agree!"
52070-306 = "That's a consensus! Very well. Let's eat!"
52070-314 = "We continued touring the outskirts of the satellite school, but didn't learn much..."
52070-315 = "...and soon the day was over."
52070-320 = "Night has fallen."
52070-321 = "The witnesses all claimed to encounter the Artifact Spirits under cover of darkness. Shall we start our patrol in earnest?"
52070-325 = "N-No! I couldn't possibly make you work more! You've been traveling all day!"
52070-326 = "This is only the first night, and you must be tired. Please, take this dormitory. We have plenty of room!"
52070-327 = "Thank you, but we do not require it. I, for one, am not tired."
52070-328 = "Oh! I know! Why don't you enjoy the hot springs? They're right outside."
52070-329 = "I've had them all to myself for so long. You really must take a dip!"
52070-334 = "Hot springs?!"
52070-335 = "This dorm has...a hot spring?"
52070-337 = "Indeed. It can fit roughly ten people. The Ebisu Satellite School students used it communally back in the day."
52070-338 = "I'll prepare dinner while you're in the springs, so please relax."
52070-339 = "Ahh... Relaxing in the hot springs with my girls at a sleepover...Now, THIS is enjoying my youth!"
52070-340 = "Let's get moving! It's girls' night!"
52070-346 = "Renge, this is an official Hyakkaryouran mission, not a sleepover."
52070-347 = "I'll be reading in my room, so you guys go ahead."
52070-351 = "Aww... Don't be such a party pooper."
52070-352 = "Kikyou, please. I've long dreamed of a night of leisure spent with my beloved seniors!"
52070-353 = "That may be true, but..."
52070-354 = "And I'll brush my teeth...and even floss! And only have one ice cream a day."
52070-355 = "...You already promised that."
52070-360 = "Kikyou, pretty please?"
52070-365 = "Very well, for an hour. And not a minute more."
52070-366 = "Then what are we waiting for? The water's hot!"
52070-367 = "And we can have fruit milk after!"
52070-373 = "Lovely. Do you four require...bathing suits?"
52070-377 = "Oh, um... Yes, if it's not overly troublesome."
52070-378 = "And Sensei... What will you do?"
52070-379 = "[s5] \"Oh...reviewing reports, maybe.\"\n[s6] \"I better go to bed.\""
52070-382 = "Very well. Then we shall see you in the morning."
52070-392 = "Ah... Now, THIS is relaxing..."
52070-393 = "My body's warm, but the cool air braces my lungs. I could just melt..."
52070-394 = "What a privilege to enjoy such a natural wonder! Look at that view!"
52070-395 = "This is my first time in a hot spring. And with all of you, it feels more like playing than bathing!"
52070-402 = "..."
52070-403 = "Kikyou, what are you doing? You'll freeze up there!"
52070-404 = "Come on in. Don't tell me you're scared of drowning?"
52070-405 = "Scared? I will have you remember that I am a Hyakkaryouran officer—!"
52070-409 = "...Clearly, I am simply enjoying the hot springs on my own terms."
52070-410 = "Experts say that it is best to enter...gradually...to minimize shock. Did you not know that?"
52070-411 = "Please! I like the shock! Sometimes you just have to jump in, Kikyou!"
52070-412 = "Isn't that right, Nagusa?"
52070-413 = "...Yes. The warm water is quite soothing."
52070-414 = "There are certainly worse ways to end the day."
52070-415 = "We didn't do much. We were essentially tourists."
52070-416 = "Tell me about it. At least the kid had fun, right?"
52070-417 = "...Renge!"
52070-418 = "It's true! I did!"
52070-419 = "The streets at the shopping district were charmingly quaint, it was fun talking to the locals, and the grilled fish was exceptionally delicious."
52070-420 = "However..."
52070-421 = "You seemed quite preoccupied, Nagusa. Are you well?"
52070-422 = "...Preoccupied?"
52070-423 = "I tried to be polite, but of course I noticed how...serious you seemed. Even more than usual."
52070-424 = "...Is this about the Great Snowfield?"
52070-425 = "Maybe you sensed some Artifact Spirits?"
52070-426 = "No, I wasn't bothered by any of those things."
52070-427 = "However..."
52070-428 = "The weasel, the bear, the crab... I kept wondering how MY fear would manifest."
52070-429 = "And I further wondered if I would be courageous enough to pull the trigger. After all, I possess the Authority."
52070-430 = "Your greatest fears, manifested. Clearly, that's not something pleasant to think about."
52070-431 = "Renge, what do you think yours would look like?"
52070-432 = "Oh me... Hmm, what am I afraid of..."
52070-433 = "...Perhaps a leaking bento box with a loose lid. That happened once and it ruined my bag!"
52070-434 = "What in the world are you talking about?"
52070-435 = "You know what I mean! You lift your lunch, and you see soup dripping down your hands, broth pooling in the seams... Ugh! It still haunts me."
52070-436 = "I think about it every time I pack tonjiru or curry... I can't get over it."
52070-437 = "I would hate to fight a giant leaking bento box! Imagine the stains!"
52070-438 = "Honestly, I think you all need to straighten your priorities. A bento box, truly?"
52070-439 = "Sure, Kikyou. Then what would be good enough to appear for you?"
52070-440 = "Well, if it were to happen to me, which I find unlikely..."
52070-441 = "Oh, I know!"
52070-442 = "Kikyou fears loud noises and screaming, like from a heavy metal concert!"
52070-443 = "Perhaps Kikyou would see an aggressive rockstar clad in white makeup and bearing a screeching guitar?"
52070-444 = "Yukari, as I have told you, I am not scared of loud noises. I simply find them quite irritating."
52070-445 = "As an officer of the Hyakkaryouran, how could I be afraid of loud noises, especially with you all firing guns constantly—?"
52070-447 = "WAAAAAAH!"
52070-451 = "?!?!"
52070-452 = "See? THAT got her."
52070-457 = "Renge!"
52070-461 = "...Ha. Well played."
52070-462 = "I only hope that I can be as brave as you all."
52070-468 = "Next Episode;Nightmare"

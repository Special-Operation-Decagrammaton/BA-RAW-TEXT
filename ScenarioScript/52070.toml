52070-421 = "ข้าแอบเป็นห่วงนิดหน่อยเพราะรุ่นพี่นางุสะดูเหมือนมีเรื่องกังวล"
52070-422 = "ฉันดูเป็นอย่างนั้นเหรอ...?"
52070-423 = "ที่จริงฉันไม่ได้พูดออกไป แต่ฉันก็กังวลเหมือนกันเพราะรุ่นพี่นางุสะมีสีหน้าตึงเครียดตั้งแต่มาถึง#nโรงเรียนสาขาเอบิสุแล้ว"
52070-424 = "นึกถึงความทรงจำอะไรตอนมาทุ่งหิมะใหญ่คราวก่อนอยู่งั้นเหรอ...?"
52070-425 = "หรือว่ารู้สึกถึงลางสังหรณ์เกี่ยวกับตำนานร้อยเรื่องราวแถวนี้?"
52070-426 = "ไม่หรอก ฉันไม่ได้หวนคิดถึงอะไรแบบนั้น แล้วก็ไม่รู้สึกถึงตำนานร้อยเรื่องราวด้วย"
52070-427 = "แต่ว่า..."
52070-428 = "ถ้าตำนานร้อยเรื่องราวที่ปรากฏตัวครั้งนี้เลียนแบบความกลัวของมนุษย์แล้วเปลี่ยนแปลงรูปร่างไปตาม#nความกลัวนั้น ฉันสงสัยว่ามันจะหน้าตาเป็นยังไงเมื่ออยู่ต่อหน้าฉันน่ะ"
52070-429 = "ต่อให้มันอยู่ในรูปร่างไหน ฉันจะดึงไกปืนไปยังความกลัวนั้นโดยไม่ลังเลได้หรือเปล่า... ฉันคิดอะไรแบบนั้นน่ะ"
52070-430 = "สิ่งที่ตัวเองกลัวที่สุด... มันก็เป็นภาพที่ยากที่จะจินตนาการขึ้นมาเหมือนกันนะ"
52070-431 = "เรนเกะ ถ้าตำนานร้อยเรื่องราวปรากฏต่อหน้าเธอ คิดว่ามันจะเป็นตัวอะไรเหรอ?"
52070-432 = "ฉันเหรอ? สิ่งที่ฉันกลัวที่สุดคงเป็น..."
52070-433 = "กล่องข้าวที่ปิดฝาไม่สนิทจนน้ำแกงไหลออกมา...?"
52070-434 = "หา? พูดอะไรเหลวไหล?"
52070-435 = "ทำไมล่ะ ทุกคนก็น่าจะเคยมีประสบการณ์แบบนั้นนี่ ลองนึกภาพดูนะ เรากำลังเดินถือห่อผ้าใส่#nข้าวกล่องมาตอนเที่ยง แต่ระหว่างนั้นก็เห็นน้ำแกงหยดลงมาตามขอบกล่อง แค่นั้นก็ขนลุกแล้ว..."
52070-436 = "แล้วถ้าสิ่งที่อยู่ในกล่องเป็นซุปทงจิรุข้นๆ หรือซุปแกงกะหรี่ละก็... อึก ฉันไม่อยากจะจินตนาการเลย"
52070-437 = "ข้าก็ไม่อยากต่อสู้กับข้าวกล่องขนาดยักษ์ที่มีน้ำซุปทงจิรุไหลออกมาเจ้าค่ะ..."
52070-438 = "กลัวว่าข้าวกล่องจะหกเลอะเทอะแค่นั้นน่ะเหรอ พวกเธอหัดอยู่กับความเป็นจริงกันบ้างเถอะนะ"
52070-439 = "งั้นแล้วเธอล่ะ คิดว่าจะมีตัวอะไรออกมา?"
52070-440 = "ไม่รู้สิ ถ้าเป็นฉัน..."
52070-441 = "ข้าเคยได้ยินมาเจ้าค่ะ!"
52070-442 = "รุ่นพี่คิเคียวเคยบอกเอาไว้ว่าแค่ได้ฟังการแสดงของวงเฮบี้~ เมทะรุ~ ที่เล่นเพลงเสียงดังก็ทำให้ขนลุก#nได้แล้ว..."
52070-443 = "เพราะงั้นตำนานร้อยเรื่องราวที่รุ่นพี่คิเคียวจะได้เห็นก็น่าจะเป็นร็อกเกอร์~ ที่ทาหน้าขาวๆ นะเจ้าคะ"
52070-444 = "ยูคาริ ต้องให้ฉันบอกอีกกี่ครั้งว่าฉันไม่ได้กลัวเสียงดัง แต่แค่ไม่ชอบน่ะ"
52070-445 = "เป็นถึงที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน จะให้กลัวเสียงดังๆ ได้ไง..."
52070-447 = "ย้าห์!"
52070-451 = "?!!?!"
52070-452 = "จริงด้วยแฮะ เป็นครั้งแรกเลยนะที่ฉันเห็นคิเคียวทำหน้าตกใจขนาดนั้น"
52070-457 = "เรนเกะ~!!!"
52070-461 = "ฮุฮุ นั่นสินะ..."
52070-462 = "ถ้าสิ่งที่เรากลัวเป็นสิ่งที่มองเห็นได้และสัมผัสได้ก็น่าจะดีสินะ"
52070-468 = "ตอนต่อไป;ฝันร้าย"

[translation]
10042040-1 = "Episode 4;Lili Marleen"
10042040-2 = "Gehenna Prefect Team Room"
10042040-3 = "..."
10042040-4 = "[s1] \"Uh... Are you okay, Ako?\"\n[s2] \"Do you need me to repeat that?\""
10042040-7 = "No, and I heard you. No need to say it twice. It won't change anything."
10042040-8 = "I'm just...surprised, let's say, that you used the Prefect Team hotline to call in..."
10042040-9 = "...a \"rogue pancake.\" Am I missing anything?"
10042040-10 = "[s] \"Understandable reaction, but...\""
10042040-11 = "Excuse me, everyone. Can I just say something? I haven't been able to sleep for two days."
10042040-15 = "Yes, we're aware, Senior Administrator. Once again, our sudden deployment leaves you picking up the slack at the office."
10042040-16 = "No, that's... I'm not trying to scold anyone..."
10042040-20 = "...Whew."
10042040-21 = "Don't misunderstand. Picking up the slack is part of my job when this happens. That's not a problem."
10042040-22 = "What I do want to mention is that this kind of \"crisis\" is nothing new for Gehenna..."
10042040-23 = "...and I believe you all SHOULD be able to handle it yourselves."
10042040-24 = "...Especially since you're there with them, Sensei."
10042040-25 = "[s3] \"Fair enough, but this is way beyond normal...\"\n[s4] \"I think you might change your mind when you get here...\""
10042040-28 = "What...? "
10042040-29 = "I never thought I'd hear that from you, Sensei."
10042040-30 = "Usually, you'd just say, \"Leave it to me!\" and that'd be that."
10042040-34 = "So either this IS incredibly serious..."
10042040-35 = "...or this is all some secret plan of yours."
10042040-36 = "How do I know you're not trying to draw me out to some secret party, with hidden cameras or something?"
10042040-37 = "[s5] \"Give me more credit than that, please.\"\n[s6] \"No, I mean it. This is really serious.\""
10042040-40 = "Like I said...!"
10042040-44 = "*sigh*"
10042040-45 = "Fine, all right, just hold on. Let me take a breath here..."
10042040-46 = "I'm just on edge right now because I haven't had enough sleep."
10042040-47 = "AND because a certain someone called the hotline over a \"rogue pancake.\""
10042040-48 = "[s7] \"If you're a good sport about it, I'll treat you to something nice.\"\n[s8] \"Oh, now you're just being mean!\""
10042040-49 = "...? Hmm, is that so?"
10042040-50 = "I'm sure I won't have to remind you later, will I? Will I?"
10042040-51 = "Well, SOMEONE's being mean here..."
10042040-52 = "Anyway, we'll carve some time out of your schedule later you can make this up to me. Got it?"
10042040-53 = "[s] \"Sena took these photos for evidence. Look.\""
10042040-54 = "...? Photo evidence from the head of the Medical Emergency Club...?"
10042040-55 = "All right. I'll check it out."
10042040-60 = "...Are you sure this isn't doctored somehow?"
10042040-64 = "I would never do such a thing."
10042040-65 = "Oh, I know. It's just so unbelievable. I hope you weren't insulted."
10042040-66 = "Hm... I see."
10042040-67 = "I can only ever believe half of what Sensei says, but the head of the Medical Emergency Club? You have my utmost faith."
10042040-68 = "So I have no choice here but to believe you."
10042040-69 = "[s] \"...? What was that about what I have to say?\""
10042040-70 = "I told you I believe half! Act your age, will you?"
10042040-71 = "Anyway, I see the problem now."
10042040-72 = "Based on the Medical Emergency Club's testimony and the photographic evidence, the Prefect Team will do what it can to prepare. I'll head to the scene myself."
10042040-73 = "(I swear, if this is some kind of hidden camera nonsense...)"
10042040-74 = "As for you, Sensei, I'll have you work for two days with the Prefect Team... No, to make this even, I'll have you work directly for me."
10042040-75 = "What do you plan to do, Senior Administrator...?"
10042040-76 = "It's simple, really."
10042040-77 = "If it's this big of a deal, it's going to take an equally big solution."
10042040-78 = "[s9] \"Equally big...?\"\n[s10] \"Ako...?\""
10042040-81 = "I have to go make some logistical arrangements, so if you'll excuse me..."
10042040-82 = "(At least we won't have to worry about lack of firepower...)"
10042040-83 = "S-Senior Administrator...?"
10042040-84 = "Senior Administrator Ako—"
10042040-91 = "Alert. All Prefect Team members currently on standby."
10042040-92 = "Prepare as many 88mm FlaK 36 units as you can!"
10042040-93 = "The 88mm FlaK 36's? All of them?"
10042040-94 = "That's right. I want every available Acht-Achts!"
10042040-95 = "Wh-What kind of mission would require this much firepower...? Are you sure?"
10042040-96 = "We received no such orders all morning..."
10042040-97 = "It's a personal request from Sensei. Does that answer your questions?"
10042040-98 = "F-From Sensei?!"
10042040-99 = "Understood. We'll get them ready on the double!"
10042040-103 = "...Since Sensei's made it very clear how serious this is..."
10042040-104 = "...it's only right to be just as serious ourselves."
10042040-105 = "Besides, it'll be nice for Sensei to owe us something."
10042040-106 = "Ha, yeah. That's something to look forward to!"
10042040-108 = "Gehenna District"
10042040-109 = "[ns] \"Just what is Ako up to?\""
10042040-110 = "I have an inkling."
10042040-111 = "She mentioned firepower at the end, so I suspect she'll bring out the 88mm."
10042040-112 = "But I'm not sure such artillery will have the desired effect in urban terrain, with numerous buildings in the way."
10042040-113 = "If the target were to find cover between the buildings while on the move, it'd be hard to line up a clear shot."
10042040-114 = "...If that's a concern for them, of course."
10042040-115 = "[s] \"This is starting to sound like a bad idea.\""
10042040-116 = "Who can say? Another academy might handle it differently, of course."
10042040-117 = "But here in Gehenna, this is just everyday life."
10042040-118 = "...Assuming Makoto of the Pandemonium Society stays out of it, that is."
10042040-119 = "[s] \"Ah.\""
10042040-120 = "Yes. If the Prefect Team's actions caused any reports of substantial damage..."
10042040-121 = "...I can't even begin to imagine what Chairman Makoto might do about it."
10042040-122 = "I'm sure the Senior Administrator is keeping that in mind."
10042040-123 = "But she did seem out of sorts, so she might not be using her best judgment..."
10042040-124 = "I'm sorry... Everyone else is in trouble because of me... Even Sensei..."
10042040-125 = "I've said this once and I'll say it again. You were preoccupied in the moment, Juri. There was nothing that could have been done."
10042040-126 = "And, well..."
10042040-127 = "I'm sure things will be fine. Other than a few more bodies..."
10042040-128 = "...I mean, a few more injured being shipped off to the Medical Emergency Club."
10042040-129 = "A-Are you sure that counts as \"fine\"?!"
10042040-130 = "I don't see why it wouldn't be. I know this is impertinent to say, but making regular trips to the Medical Emergency Club is..."
10042040-131 = "...well, at least in Gehenna, it's as natural as breathing."
10042040-132 = "Um, excuse me. I do get your point, but please do remember that we're all right here listening."
10042040-133 = "...Pardon me."
10042040-139 = "Sensei? The Senior Administrator has messaged us again."
10042040-140 = "She orders us to triangulate the position of the pancake by the time she arrives."
10042040-141 = "I see. Well, we were already tracking it down anyway."
10042040-142 = "Let's proceed as planned, then."

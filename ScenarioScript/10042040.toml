[translation]
10042040-1 = "第4話;《莉莉瑪蓮》"
10042040-2 = "格黑娜．風紀委員會部室"
10042040-3 = "……"
10042040-4 = "[s1]「那個……你還好嗎，亞子？」\n[s2]「要不要我再解釋一次？」"
10042040-7 = "不必了。就算再聽一次也不會讓我的心情好一點。"
10042040-8 = "所以老師是這個意思嗎？#n不惜動用風紀委員會的熱線聯絡我的原因……"
10042040-9 = "……是為了「離家出走的鬆餅」？"
10042040-10 = "[s]「我就知道會是這種反應……」"
10042040-11 = "那個，請各位看看我現在的樣子……我已經兩天沒有好好睡覺了。"
10042040-15 = "我們清楚，上級行政官。#n由於我們出動，導致原先負責的業務更加重了行政官的負擔……"
10042040-16 = "不……我不是那個意思……"
10042040-20 = "……唉。"
10042040-21 = "你們似乎誤會了。#n那些只是行政官份內的工作而已，所以請不用在意。"
10042040-22 = "我真正想說的是，這種程度的事情在格黑娜已經發生過好幾次了。"
10042040-23 = "所以……你們難道不能自己想辦法解決嗎。"
10042040-24 = "……而且現在不是還有老師在嗎？"
10042040-25 = "[s3]「那個……雖然是這樣沒錯，但情況和平常不太一樣……」\n[s4]「亞子親自去看看就知道了……」"
10042040-28 = "嗯……？"
10042040-29 = "這是怎麼回事？#n老師的反應和平常不太一樣呢。"
10042040-30 = "平常明明都會說「交給我吧！」之類的……"
10042040-34 = "啊，真是的！#n居然連老師都這樣，不就更像真的發生什麼大事了嗎！"
10042040-35 = "我甚至都懷疑老師是不是在偷偷安排什麼計畫了。"
10042040-36 = "比如整人大作戰之類的！"
10042040-37 = "[s5]「為什麼只懷疑我……」\n[s6]「不是啦，是真的出事了……」"
10042040-40 = "就說了……！"
10042040-44 = "……唉。"
10042040-45 = "知道了知道了，請先讓我冷靜一下……"
10042040-46 = "我現在之所以這麼暴躁，純粹是因為睡眠不足的關係。"
10042040-47 = "……不，硬要說的話還是因為某人「為了鬆餅而撥打熱線」吧。"
10042040-48 = "[s7]「冷靜，冷靜。下次我請你吃好吃的嘛。」\n[s8]「嗚嗚嗚！壓迫，這是壓迫！」"
10042040-49 = "……咦？是嗎？"
10042040-50 = "老師的意思是，之後會另外抽時間對我負責對吧？我沒說錯吧？"
10042040-51 = "到底是誰在壓迫誰……"
10042040-52 = "總之這次的事，老師之後要另外抽時間對我負責，知道了嗎！？"
10042040-53 = "[s]「瀬奈有拍下照片作為證據。」"
10042040-54 = "……？#n急救醫學部部長的證據照片……？"
10042040-55 = "好，那我就來看看吧。"
10042040-60 = "……這是合成照嗎？"
10042040-64 = "我不是那種人。"
10042040-65 = "我知道，只是單純感嘆一下而已，不用每句話都認真回應。"
10042040-66 = "嗯……好吧。"
10042040-67 = "老師的話大約只能相信一半……但急救醫學部部長確實可以完全信任。"
10042040-68 = "或者應該說是不得不信任吧……"
10042040-69 = "[s]「……那我呢？」"
10042040-70 = "真是的，我不是說會信一半了嗎！#n明明已經是大人了，怎麼還這麼小氣！"
10042040-71 = "總之我明白了。"
10042040-72 = "我會根據急救醫學部部長的話和照片，做好風紀委員會能做的準備。#n隨後再親自前往現場。"
10042040-73 = "不過如果這一切都是整人大作戰之類的……"
10042040-74 = "老師就必須向風紀委員會……不，是向我付出相應的代價哦？"
10042040-75 = "行政官打算怎麼做呢……？"
10042040-76 = "這個嘛，其實很簡單啊。"
10042040-77 = "既然是重大的問題，就該用相應的重大手段來處理。"
10042040-78 = "[s9]「重大的問題……？」\n[s10]「亞子……？」"
10042040-81 = "那麼我就先離開去做準備了。"
10042040-82 = "……我不會帶火力不足的傢伙去，請不用擔心。"
10042040-83 = "行，行政官……？"
10042040-84 = "亞子行政官──"
10042040-91 = "所有待命中的風紀委員注意。"
10042040-92 = "請立刻準備好所有可用的88mm FlaK 36！"
10042040-93 = "88mm FlaK 36？全部都要嗎？"
10042040-94 = "沒錯。請把所有能用的Acht-Acht都搬出來！"
10042040-95 = "什，什麼事情需要動用那麼大的火力啊……？"
10042040-96 = "今天早上不是還風平浪靜的嗎……"
10042040-97 = "這是老師的要求──這樣回答可以嗎？"
10042040-98 = "老，老師！？"
10042040-99 = "知道了。我們會迅速將準備工作確實完成！"
10042040-103 = "……既然對方都那麼「大驚小怪」了。"
10042040-104 = "我們這邊當然也只能誠意十足地配合了。"
10042040-105 = "……仔細想想，趁著這次機會讓他欠我一個人情也不錯。"
10042040-106 = "嗯！這點倒是讓我很期待呢！"
10042040-108 = "格黑娜自治區"
10042040-109 = "[ns]「亞子打算怎麼做呢……」"
10042040-110 = "我大概能猜得到。"
10042040-111 = "既然他提到了火力，應該會拿出88mm的高射砲才對。"
10042040-112 = "不過我有點擔心，那種大砲究竟能不能在建築林立的地形中發揮應有的作用。"
10042040-113 = "要是目標迅速在建築物之間躲藏的話，恐怕很難掌握開砲的時機。"
10042040-114 = "……或者他也可能選擇無視這些問題，直接連建築物一起破壞。"
10042040-115 = "[s]「那樣不是很不妙嗎！？」"
10042040-116 = "怎麼說呢……如果是其他學園的話，可能算是挺麻煩的吧。"
10042040-117 = "不過在「格黑娜」只是一週會發生一兩次的「日常」事件而已。"
10042040-118 = "……前提是萬魔殿的真琴議長沒有介入。"
10042040-119 = "[s] 「……」"
10042040-120 = "如果真琴議長得知風紀委員會的正式行動造成破壞的話……"
10042040-121 = "……不曉得他會抓住哪個地方大作文章。"
10042040-122 = "如果是平時的行政官，這種事他應該很清楚才對。"
10042040-123 = "不過他現在的狀態看起來不是很好，有可能無法做出正常的判斷……"
10042040-124 = "對不起……都是因為我害大家……害老師……"
10042040-125 = "請容我再重申一次──這並不是你的錯，茱莉。#n茱莉當時顯然很忙，那不過是情勢所逼罷了。"
10042040-126 = "況且……"
10042040-127 = "還能出什麼大事呢。#n頂多就是被送到急救醫學部的屍……"
10042040-128 = "……傷患人數再增加一點而已。"
10042040-129 = "那，那樣沒關係嗎！？"
10042040-130 = "倒也無所謂吧。#n雖然這麼說或許不太妥當，不過格黑娜學生因為各種原因進出急救醫學部的頻率……"
10042040-131 = "就跟呼吸差不多。"
10042040-132 = "那個，前輩……#n我明白前輩這麼說是出於好意，但以我們立場聽到這種話還是有點……"
10042040-133 = "……抱歉。"
10042040-139 = "老師？我收到亞子行政官的後續聯絡了。"
10042040-140 = "他希望我們能在他抵達現場之前，繼續追蹤鬆餅的去向和座標……"
10042040-141 = "這樣啊。我們本來就一直在追蹤它。"
10042040-142 = "很好，那麼繼續吧。"

[translation]
10042040-1 = "ตอนที่ 4;ลิลลี่ มาร์ลีน"
10042040-2 = "ห้องคณะกรรมการวินัยเกเฮนน่า"
10042040-3 = "..."
10042040-4 = "[s1] \"เอ่อ... อาโกะ? ให้อธิบายอีกรอบมั้ย?\" \n[s2] \"อาโกะ? ให้ครูอธิบายอีกรอบมั้ย?\""
10042040-7 = "ไม่ค่ะ ไม่มีประโยชน์หรอกค่ะ ต่อให้ฟังอีกรอบ ฉันก็คงรู้สึกเหมือนเดิมนี่ละค่ะ"
10042040-8 = "ว่าแต่นี่มันอะไรกันคะ? ถึงกับโทรหาสายด่วนคณะกรรมการวินัย..."
10042040-9 = "เพราะ 'แพนเค้กที่หนีออกจากบ้าน'... อย่างนั้นเหรอคะ...?"
10042040-10 = "[s] \"ครูกะไว้แล้วว่าต้องมีปฏิกิริยาแบบนี้...\""
10042040-11 = "ทุกคนคะ เห็นใจฉันบ้างเถอะค่ะ... ฉันแทบจะไม่ได้นอนมาสองวันสองคืนแล้วนะคะ"
10042040-15 = "ฉันรู้ค่ะ เจ้าหน้าที่อาวุโส แล้วก็รู้ด้วยว่าพอพวกฉันถูกเรียกตัวไปหน้างาน งานของพวกฉันก็เลยถูกโอนไปให้เจ้าหน้าที่อาวุโสจัดการแทน ภาระงานก็เลยหนักกว่าเดิมอีก..."
10042040-16 = "ไม่หรอกค่ะ... ฉันไม่ได้จะมาบ่นเรื่องนั้นหรอกค่ะ..."
10042040-20 = "ฮู่ว..."
10042040-21 = "น่าจะมีการเข้าใจผิดนะคะ นั่นเป็นงานที่เจ้าหน้าที่อย่างฉันต้องรับผิดชอบอยู่แล้ว ไม่ต้องกังวลหรอกค่ะ"
10042040-22 = "แต่สิ่งที่ฉันอยากบ่นก็คือ ที่ผ่านมาในเกเฮนน่าก็เกิดเรื่องแบบนั้นหลายครั้งหลายคราแล้ว"
10042040-23 = "งั้นเหตุการณ์นี้ ทางนั้นก็ช่วยจัดการกันเองไม่ได้เหรอคะ?"
10042040-24 = "ตอนนี้คุณครูก็อยู่ด้วยไม่ใช่เหรอคะ...?"
10042040-25 = "[s3] \"เอ่อ... แต่ครั้งนี้มันต่างจากทั่วไป...\"\n[s4] \"แต่ถ้าได้มาเห็นเอง ก็อาจเปลี่ยนความคิดก็ได้นะ...\""
10042040-28 = "คะ...? "
10042040-29 = "ทำไมถึงมีท่าทีต่างจากปกติล่ะคะ"
10042040-30 = "ปกติแล้วคุณครูมักจะบอกว่า 'ให้เป็นหน้าที่ของครูเอง!' หรืออะไรทำนองนั้นนี่คะ..."
10042040-34 = "เฮ้อ จริงๆ เลย! พอคุณครูพูดแบบนั้นไปด้วยอีกคน ทำเอาฉันอดคิดไม่ได้เลยนะคะ ว่ามันมีเรื่องอะไรเกิดขึ้นจริงๆ!"
10042040-35 = "ทำเอาฉันสงสัยเลยนะคะว่าคุณครูกำลังแอบวางแผนการอะไร"
10042040-36 = "แล้วก็ซ่อนกล้องเอาไว้เซอร์ไพรส์อะไรสักอย่างหรือเปล่าน่ะ?!"
10042040-37 = "[s5] \"ทำไมคิดกับครูอย่างนั้นล่ะ\"\n[s6] \"มีเรื่องใหญ่เกิดขึ้นจริงๆ นะ...\""
10042040-40 = "ถ้างั้นก็...!"
10042040-44 = "เฮ้อ..."
10042040-45 = "ก็ได้ค่ะ ก็ได้ ขอเวลาฉันสักเดี๋ยวนะคะ ฉันขอสงบสติอารมณ์ก่อน..."
10042040-46 = "สาเหตุที่ฉันหงุดหงิดตอนนี้ก็เพราะฉันไม่ค่อยได้นอนค่ะ"
10042040-47 = "แล้วก็เพราะ 'มีคนโทรเข้าสายด่วนด้วยเรื่องแพนเค้ก' น่ะค่ะ..."
10042040-48 = "[s7] \"ใจเย็นๆ ก่อน ไว้ครูจะซื้อของอร่อยๆ ให้กินนะ\"\n[s8] \"ใจร้ายกับครูเกินไปแล้ว!\""
10042040-49 = "...? หืม? จริงนะคะ?"
10042040-50 = "พูดแบบนั้นหมายความว่าจะสละเวลาแล้วมารับผิดชอบฉันในภายหลังใช่มั้ยคะ? ใช่มั้ย?"
10042040-51 = "ตอนนี้ใครใจร้ายกับใครกันแน่คะ..."
10042040-52 = "เอาเป็นว่าเรื่องนี้น่ะ คุณครูต้องหาเวลามาให้ฉันและรับผิดชอบฉันด้วยค่ะ เข้าใจใช่มั้ยคะ?!"
10042040-53 = "[s] \"ก็ได้ๆ ว่าแต่เซนะถ่ายรูปหลักฐานไว้ด้วย อยากดูมั้ย?\""
10042040-54 = "...? รูปหลักฐาน... จากหัวหน้าชมรมหน่วยแพทย์ฉุกเฉินเหรอคะ?"
10042040-55 = "ดีเลยค่ะ ถ้างั้นฉันขอดูหน่อยค่ะ"
10042040-60 = "นี่มันรูปจริงหรือเปล่าเนี่ย...?"
10042040-64 = "ฉันไม่ใช่คนอย่างนั้นนะคะ"
10042040-65 = "ฉันรู้ค่ะ ฉันแค่ประหลาดใจเท่านั้นเองค่ะ ไม่ต้องตอบโต้กับทุกอย่างก็ได้ค่ะ"
10042040-66 = "อืม... นั่นสินะคะ"
10042040-67 = "ถ้าคุณครูพูด ฉันคงเชื่อได้ครึ่งเดียว แต่พอได้หลักฐานจากหัวหน้าชมรมหน่วยแพทย์ฉุกเฉิน..."
10042040-68 = "ฉันก็เชื่อได้อย่างเต็มอกเลยค่ะ"
10042040-69 = "[s] \"แล้วทำไมถึงไม่เชื่อครูล่ะ...?\""
10042040-70 = "ก็บอกแล้วนี่คะว่าเชื่อตั้งครึ่งหนึ่ง! เป็นผู้ใหญ่แท้ๆ แต่ทำไมจิตใจแคบนักล่ะคะ!"
10042040-71 = "เอาเถอะค่ะ เอาเป็นว่าฉันเข้าใจสถานการณ์แล้ว"
10042040-72 = "เท่าที่ฟังจากคำบอกเล่าและภาพหลักฐานของหัวหน้าชมรมหน่วยแพทย์ฉุกเฉินแล้ว ฉันจะเตรียมมาตรการที่คณะกรรมการวินัยจะทำได้ และจะลงไปที่หน้างานด้วยตัวเองค่ะ"
10042040-73 = "แต่ถ้าไปแล้วเป็นเรื่องซ่อนกล้องเซอร์ไพรส์จริงๆ ละก็..."
10042040-74 = "อย่างน้อยคุณครูต้องมาทำงานที่คณะกรรมการวินัยสองวัน... ไม่สิ ให้มาทำงานให้ฉันโดยตรงเลยจะดีกว่า"
10042040-75 = "คิดจะทำยังไงเหรอคะ เจ้าหน้าที่อาวุโส...?"
10042040-76 = "ไม่มีอะไรยุ่งยากหรอกค่ะ"
10042040-77 = "ถ้าเป็นปัญหาใหญ่ขนาดนั้น เราก็ต้องจัดการแบบเล่นใหญ่"
10042040-78 = "[s9] \"เล่นใหญ่เหรอ...?\"\n[s10] \"อาโกะ...?\""
10042040-81 = "ฉันคงต้องรีบไปเตรียมตัวแล้วละค่ะ ขอวางสายเท่านี้นะคะ"
10042040-82 = "อ้อ อย่างน้อยก็ไม่ต้องกังวลเรื่องอาวุธนะคะ ฉันจะจัดไปให้หนักเลย"
10042040-83 = "จะ... เจ้าหน้าที่อาวุโส...?"
10042040-84 = "เจ้าหน้าที่อาโกะ...?"
10042040-91 = "ประกาศถึงคณะกรรมการวินัยทุกคนที่สแตนด์บายอยู่ค่ะ"
10042040-92 = "เตรียมปืน FlaK 36 ขนาด 88 มม. ทั้งหมดที่ใช้ได้ค่ะ!"
10042040-93 = "ปืน FlaK 36 ขนาด 88 มม.? ทั้งหมดเลยเหรอคะ?"
10042040-94 = "ใช่ค่ะ ใช่ค่ะ ปืน 88 มม. มีเท่าไรขนมาให้หมดเลยค่ะ!"
10042040-95 = "กะ... เกิดเรื่องอะไรเหรอคะ ทำไมถึงต้องใช้อาวุธใหญ่ขนาดนั้น...  จริงเหรอคะ?"
10042040-96 = "แต่เช้านี้ยังไม่มีเรื่องอะไรเลย..."
10042040-97 = "คุณครูขอมาน่ะค่ะ ตอบเท่านี้เพียงพอหรือยังคะ?"
10042040-98 = "คะ... คุณครูเหรอคะ?!"
10042040-99 = "เข้าใจแล้วค่ะ จะดำเนินการให้อย่างเร็วที่สุดเลยค่ะ!"
10042040-103 = "ในเมื่อคุณครูตื่นตระหนกกับสถานการณ์ถึงขนาดนี้"
10042040-104 = "ทางฉันก็ต้องเตรียมมาตรการรับมือให้เหมาะสมสิคะ"
10042040-105 = "พอมาคิดดู... ใช้โอกาสนี้ให้คุณครูติดหนี้พวกเราก็ไม่เลวเลยนะ"
10042040-106 = "อื้อ! ชักจะตื่นเต้นขึ้นมาแล้วสิคะ!"
10042040-108 = "ถนนเขตปกครองตนเองเกเฮนน่า"
10042040-109 = "[ns] \"อาโกะคิดจะทำอะไรนะ...\""
10042040-110 = "ฉันพอเดาได้บ้างค่ะ"
10042040-111 = "เจ้าหน้าที่อาโกะเอ่ยถึงกำลังอาวุธในตอนท้าย ถ้างั้นก็คงหมายถึงปืนขนาด 88 มม. ค่ะ"
10042040-112 = "แต่ฉันก็กังวลว่าในพื้นที่ที่มีอาคารเป็นสิ่งกีดขวางตั้งมากมายแบบนี้ ปืนใหญ่ขนาดนั้นจะมีประสิทธิภาพตอบโจทย์หรือเปล่าน่ะค่ะ"
10042040-113 = "ถ้าเป้าหมายเคลื่อนไหวไปทางโน้นทีทางนี้ทีแล้วไปซ่อนตัวอยู่ตามอาคาร การกำหนดเวลายิงก็อาจเป็นเรื่องยากด้วยค่ะ"
10042040-114 = "แต่ถ้าไม่สนใจว่าจะเก็บอาคารไว้ละก็นะ..."
10042040-115 = "[s] \"ถ้าอาคารถล่มหมดก็แย่เลยไม่ใช่เหรอ?!\""
10042040-116 = "ก็คงจะอย่างนั้นค่ะ แน่นอนว่าคงเป็นเรื่องใหญ่เลยในโรงเรียนอื่นค่ะ"
10042040-117 = "แต่สำหรับ 'เกเฮนน่า' แล้ว... เรื่องแบบนี้เกิดขึ้นเป็น 'ปกติ' สัปดาห์ละครั้งสองครั้งอยู่แล้วค่ะ"
10042040-118 = "แต่ก็น่ากังวลนะคะ ถ้าเรื่องนี้ไปถึงหูประธานมาโคโตะแห่งแพนเดโมเนียม โซไซตี้ละก็..."
10042040-119 = "[s] \"อ่า...\""
10042040-120 = "ค่ะ ถ้าปฏิบัติการของคณะกรรมการวินัยไปสร้างความเสียหายอะไรละก็..."
10042040-121 = "ฉันไม่อยากจินตนาการเลยค่ะว่าประธานมาโคโตะจะเคลื่อนไหวยังไง"
10042040-122 = "เจ้าหน้าที่อาวุโสก็คงตระหนักในเรื่องนี้ดีค่ะ"
10042040-123 = "แต่ตอนนี้เจ้าหน้าที่อาวุโสสภาพร่างกายไม่ค่อยดี เลยมีความเป็นไปได้ที่จะตัดสินใจอะไรผิดพลาด..."
10042040-124 = "ขอโทษนะคะ... ฉันทำให้คุณครูและทุกคนพลอยเดือดร้อนไปด้วย..."
10042040-125 = "ไม่ถึงขนาดนั้นหรอกค่ะ จูริ ตอนนั้นจูริก็คงงานยุ่งและอยู่ในสถานการณ์ที่ไม่มีทางเลือกเหมือนกันค่ะ"
10042040-126 = "อีกอย่าง..."
10042040-127 = "คงไม่มีอะไรมากหรอกค่ะ ก็แค่มีศพ... ไม่สิ"
10042040-128 = "มีผู้ได้รับบาดเจ็บที่ต้องขึ้นรถของชมรมหน่วยแพทย์ฉุกเฉินมากขึ้นก็เท่านั้นค่ะ"
10042040-129 = "คะ... คิดแบบนั้นก็ได้เหรอ?!"
10042040-130 = "ได้สิคะ มันอาจฟังดูทะนงตนไปก็ได้ แต่การมีคนไข้เข้าออกห้องชมรมหน่วยแพทย์ฉุกเฉิน#nด้วยเหตุผลแบบนี้..."
10042040-131 = "ในเกเฮนน่าถือว่าเป็นเรื่องตามธรรมชาติน้อยกว่าการหายใจเข้าออกนิดเดียวเองค่ะ"
10042040-132 = "คือว่ารุ่นพี่คะ ฉันเข้าใจที่รุ่นพี่จะสื่ออยู่หรอกนะคะ แต่จากมุมมองของเราในฐานะผู้ฟังแล้ว มันค่อนข้างจะ..."
10042040-133 = "ขออภัยด้วย..."
10042040-139 = "คุณครูคะ มีคำสั่งมาจากเจ้าหน้าที่อาวุโสอาโกะค่ะ"
10042040-140 = "สั่งว่า... ให้ติดตามร่องรอยและพิกัดของแพนเค้กตัวนั้นจนกว่าเธอจะมาถึงค่ะ"
10042040-141 = "อย่างนั้นสินะคะ ยังไงพวกเราก็ติดตามร่องรอยกันมาถึงตอนนี้แล้ว"
10042040-142 = "ดีเลย งั้นก็ไปต่อกันเลยค่ะ"

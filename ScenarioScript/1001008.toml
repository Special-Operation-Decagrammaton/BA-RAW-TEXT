[translation]
1001008-1 = "都市參觀"
1001008-2 = "阿拜多斯附近的街道"
1001008-4 = "（偶然發現了路過的白子）"
1001008-5 = "下午1點30分……凱薩便利商店的物流貨車抵達。從重物開始裝載……"
1001008-6 = "店員出來外面的時候，倉庫產生了死角。"
1001008-7 = "如果這個時候經由後門進入建築物的話…… #n根據狀況也要考量安排車輛……"
1001008-8 = "嗯……首先這個區域，流動人口太多了。關於最佳的時間帶還需要再思考一下。"
1001008-9 = "好，往下一個區域移動吧。"
1001008-11 = "[s] 白子的樣子很可疑……跟在她後面看看"
1001008-13 = "另一個街道"
1001008-15 = "（果然白子隱藏了身影，注視著高架橋）"
1001008-16 = "下午2點10分……那輛柯基電器貨車的駕駛，每天這個時間都會把車停在KV高速公路下方睡午覺。 "
1001008-17 = "如果這個時候可以進入貨車車廂的話……就能輕鬆進入總公司建築物……"
1001008-18 = "嗯……不過，這台貨車馬上就要在外圍道路上連續行駛5小時以上，可能得準備飲食才行……"
1001008-19 = "嗯，往下一個區域移動吧。"
1001008-21 = "[s] 果然可疑……繼續跟在後面看看"
1001008-23 = "某棟大樓的屋頂"
1001008-25 = "（白子又隱藏起身影，俯瞰著地區銀行）"
1001008-26 = "下午3點整。雖然戒備森嚴……不過到了警衛換班時間時還是會出現死角才對。"
1001008-27 = "如果能在5分鐘的業務交接時間內壓制住正門的警衛的話，到金庫的路就一瀉千里……"
1001008-30 = "[s] 「妳在做什麼……？」"
1001008-31 = "（驚！？）"
1001008-32 = "……"
1001008-33 = "老，老師！？"
1001008-34 = "嗯……那個……所以說……"
1001008-35 = "那個……嗯……該怎麼說明才好呢，這是……"
1001008-36 = "[s] 「不可以。」"
1001008-37 = "……"
1001008-38 = "果然不能搶銀行嗎……"
1001008-39 = "[s] 「不可以犯罪。」"
1001008-40 = "……不被發現的話……"
1001008-41 = "[s] 「不行。」"
1001008-42 = "嗯……抱歉。我知道了……"
1001008-43 = "嗯……我沒有要辯解的意思，不過與其說是真的要做，不如說這是興趣之類的東西……"
1001008-44 = "……"
1001008-45 = "……抱歉。"
1001008-47 = "（白子有點沮喪的樣子）"

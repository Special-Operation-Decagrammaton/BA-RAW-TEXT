[translation]
1001008-1 = "Scoping Out the City"
1001008-2 = "Street Near Abydos"
1001008-4 = "(I stumbled across Shiroko on my way.)"
1001008-5 = "It's 1:30 PM... Kaiser's delivery truck is right on time. They're going to load the heaviest items first."
1001008-6 = "Part of the warehouse will be unattended once the clerk leaves. "
1001008-7 = "That leaves me a window to infiltrate the building through the back door. I might need to have a car ready, depending on how things go..."
1001008-8 = "Hmm. It's too crowded right now, so I'll need to pick a better time."
1001008-9 = "Great. On to the next area."
1001008-11 = "[s] Tail Shiroko to find out why she's acting suspiciously."
1001008-13 = "Another Street"
1001008-15 = "(Shiroko is purposefully staying out of sight and watching the highway.)"
1001008-16 = "Now 2:10 PM... The Kouki Electric truck driver always takes a nap at this time under the overpass of the KV highway."
1001008-17 = "That could be my way into the building...if I could just make it into the truck's cargo hold."
1001008-18 = "Hmm. That would require bringing food, since the truck will be driving nonstop for five hours on the outskirts..."
1001008-19 = "Hmm. Moving to the next area."
1001008-21 = "[s] Keep tailing Shiroko to get to the bottom of her strange behavior."
1001008-23 = "Building Rooftop"
1001008-25 = "(Shiroko is covertly looking down at a bank.)"
1001008-26 = "Now 3:00 PM. Heavily guarded...but there's always an opening when the guards change shifts."
1001008-27 = "If I strike in the five minutes they're transferring duties, I'll have an open path to the safe..."
1001008-30 = "[s] \"What are you doing?\""
1001008-31 = "?!"
1001008-32 = "..."
1001008-33 = "S-Sensei?!"
1001008-34 = "Um, well... I can explain..."
1001008-35 = "I, uh... How should I explain? This is..."
1001008-36 = "[s] \"I don't think I can overlook this, Shiroko.\""
1001008-37 = "..."
1001008-38 = "So you're saying robbing a bank is against the rules?"
1001008-39 = "[s] \"I think that goes for all crime in general.\""
1001008-40 = "It's not a crime if you don't get caught..."
1001008-41 = "[s] \"Consider this being caught.\""
1001008-42 = "But... I'm sorry. I understand..."
1001008-43 = "To tell you the truth, I wasn't actually planning on going through with it. This is more like...a hobby."
1001008-44 = "..."
1001008-45 = "...Sorry."
1001008-47 = "(Shiroko seemed a little depressed.)"

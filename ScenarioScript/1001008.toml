[translation]
1001008-1 = "การสังเกตการณ์ในเมือง"
1001008-2 = "ถนนใกล้ๆ กับอะบิดอส"
1001008-4 = "(บังเอิญเจอชิโรโกะระหว่างทาง)"
1001008-5 = "13.30 น. รถขนสินค้าของไคเซอร์คอนวีเนียนมาถึง... เริ่มขนสินค้าหนักลงมาก่อน..."
1001008-6 = "พนักงานออกมาข้างนอกร้าน เกิดจุดบอดขึ้น"
1001008-7 = "ถ้าบุกเข้าไปในอาคารโดยใช้เส้นทางด้านหลังละก็น่าจะได้ แต่ว่าก็ควรหาข้อมูลเตรียมพร้อมไว้#nเผื่อเกิดเหตุการณ์ต่างๆ ขึ้น..."
1001008-8 = "อืม... อย่างแรก พื้นที่นี้มีผู้คนพลุกพล่านมาก ต้องหาช่วงเวลาที่เหมาะที่สุดเอาไว้ด้วย"
1001008-9 = "ดีละ ไปพื้นที่ต่อไปกันเถอะ"
1001008-11 = "[s] ท่าทางของชิโรโกะดูแปลกไป ลองตามไปดีกว่า"
1001008-13 = "ถนนแห่งหนึ่ง"
1001008-15 = "(ชิโรโกะแอบอำพรางตัวและจับตาดูทางยกระดับอยู่)"
1001008-16 = "14.10 น. คนขับรถของโคกิ อิเล็กทรอนิกส์มักจะพักงีบที่จุดจอดรถใต้ทางด่วน KV ในช่วงเวลานี้"
1001008-17 = "ในตอนนี้ถ้าลอบเข้าไปในตู้บรรทุกของบนรถได้... ก็จะเข้าไปในอาคารหลักได้ง่ายดาย..."
1001008-18 = "อืม... แต่ว่ารถบรรทุกจะขับไปบนถนนชานเมืองห้าชั่วโมงโดยไม่หยุดพัก เพราะงั้นอาจต้องเตรียม#nอาหารไว้ด้วย...."
1001008-19 = "อืม... ไปพื้นที่ต่อไปกันเถอะ"
1001008-21 = "[s] ชิโรโกะดูแปลกไปจริงๆ ด้วย ลองตามไปดีกว่า"
1001008-23 = "ดาดฟ้าของอาคารแห่งหนึ่ง"
1001008-25 = "(เช่นเดิม ชิโรโกะอำพรางตัวและจ้องมองไปยังธนาคารเขต)"
1001008-26 = "15.00 น. ระบบรักษาความปลอดภัยแน่นหนาก็จริง... แต่ก็มีจุดบอดตอนที่เจ้าหน้าที่เปลี่ยนกะกันอยู่"
1001008-27 = "ถ้าจัดการเจ้าหน้าที่ที่หน้าประตูได้ภายในช่วง 5 นาทีที่พวกเขาเปลี่ยนกะกันละก็... จะเข้าถึงห้อง#nนิรภัยได้อย่างง่ายดาย..."
1001008-30 = "[s] \"ทำอะไรอยู่เหรอ...\""
1001008-31 = "(เฮือก?!)"
1001008-32 = "......"
1001008-33 = "คะ...คุณครู?!\n"
1001008-34 = "อืม... คือว่า... เอ่อ คือ...."
1001008-35 = "คือว่า... อืม... จะอธิบายยังไงดีล่ะ คือมัน..."
1001008-36 = "[s] \"ไม่ได้นะ\""
1001008-37 = "......."
1001008-38 = "การปล้นธนาคารคงไม่ใช่ความคิดที่ดีสินะ...."
1001008-39 = "[s] \"ห้ามทำอะไรที่เป็นอาชญากรรมเด็ดขาด\""
1001008-40 = "แต่ถ้าไม่ถูกจับได้..."
1001008-41 = "[s] \"ยังไงก็ไม่ได้\""
1001008-42 = "เอ่อ... ขะ... ขอโทษ เข้าใจแล้ว..."
1001008-43 = "อืม... ไม่ได้แก้ตัวหรอกนะ แทนที่จะเรียกว่าตั้งใจ มันเหมือนกับ... งานอดิเรกมากกว่า... น่ะ"
1001008-44 = "......."
1001008-45 = "ขอโทษ...."
1001008-47 = "(ชิโรโกะดูหดหู่นิดหน่อย)"

[translation]
10008050-1 = "Episode 5;The Prefect Team Joins the Fray"
10008050-3 = "Which way did those Kaitenger weirdos go?"
10008050-4 = "Considering their escape route up to this point, they must have gone—"
10008050-9 = "Stop! Suspicious targets spotted!"
10008050-10 = "Suspicious? Is it the Kaitengers? Where?!"
10008050-11 = "Tell us where they went!"
10008050-13 = "Surround and capture them!"
10008050-24 = "Boss, I think she meant..."
10008050-25 = "Don't tell me!"
10008050-26 = "Are we the suspicious targets...?"
10008050-31 = "We finally caught you. There's nowhere left to run!"
10008050-32 = "[s] \"Iori?\""
10008050-33 = "Sensei? I thought one of you seemed familiar."
10008050-34 = "Happy New Year, Sensei... But what are you doing here? Along with these miscreants, no less?"
10008050-35 = "D-Don't call us miscreants!"
10008050-36 = "What else should I call you? Problem Creator 68?"
10008050-37 = "[s] \"What are you doing working so late, Iori?\""
10008050-38 = "It should be obvious."
10008050-39 = "Going by how many of you were on patrol..."
10008050-40 = "Hahaha!"
10008050-41 = "Now I get it! You all had nothing better to do tonight, so you were having a little pity party."
10008050-42 = "What?!"
10008050-43 = "We're working BECAUSE it's New Year's!"
10008050-44 = "[s] \"The Prefect Team didn't have the day off?\""
10008050-45 = "Of course not. Things have been a mess because of that Daikichiden broadcast."
10008050-46 = "Everyone is going after that offering box. It's complete mayhem."
10008050-47 = "*sigh* Troublemakers from our academy are running amok. Ako said to not even bother returning until the situation is under control."
10008050-48 = "Why did this have to happen while I'm on night duty?! This isn't how I planned to spend New Year's!"
10008050-49 = "And it's all these miscreants' fault."
10008050-50 = "What did we do?!"
10008050-51 = "We're just as much victims in this as you are."
10008050-52 = "Yeah! Victims who don't have time for this!"
10008050-53 = "You can't be serious."
10008050-54 = "Don't you have any shame? I know you all want the offering box for yourselves, just like anyone else."
10008050-55 = "Th-That's not true. There's a perfectly good explanation."
10008050-56 = "So you admit it! Even worse, you're obstructing justice by resisting#nthe Prefect Team. You're miscreants just like I said you were!"
10008050-58 = "I'll stop you right here in the name of the Prefect Team and in the name of taking back my day off!"
10008050-60 = "You're not even listening to us!"
10008050-61 = "[s] \"Let's all just calm down...\""
10008050-63 = "Hahaha! So you wanna fight?!"
10008050-64 = "Preparing for combat, Boss."
10008050-65 = "A-Aru! You can count on me!"
10008050-70 = "WHAT ARE YOU ALL DOING?!"

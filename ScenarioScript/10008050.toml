[translation]
10008050-1 = "第5話;風紀委員會參戰"
10008050-3 = "該，該往哪走才好！？"
10008050-4 = "從目前為止的逃跑路線來看，應該是──"
10008050-9 = "發現可疑人士！"
10008050-10 = "咦，可疑人士？是凱坦澤嗎！？"
10008050-11 = "哪裡哪裡，他們在哪裡啊！？"
10008050-13 = "擺出陣形A，展開包圍網！"
10008050-24 = "這個情況是，難道說……"
10008050-25 = "先，先等一下！"
10008050-26 = "你說的可疑人士，難不成是……！？"
10008050-31 = "終於被我逮到了啊，你們這些問題兒童！不會再讓你們逃──"
10008050-32 = "[s]「啊，是伊織。」"
10008050-33 = "呃，老師……？#n那個，新年快樂……"
10008050-34 = "老師怎麼會在這裡呢？#n而且還跟那群問題兒童在一起……"
10008050-35 = "誰，誰是問題兒童啊！？"
10008050-36 = "除了你們還會有誰啊，便利屋！"
10008050-37 = "[s]「新年快樂。伊織才是，怎麼會來這裡呢？」"
10008050-38 = "這個嘛，我當然是因為……"
10008050-39 = "這種深夜還這麼多人就代表……"
10008050-40 = "啊哈～"
10008050-41 = "難道是因為風紀委員都很閒，所以聚在一起交流感情？"
10008050-42 = "那怎麼可能嘛！"
10008050-43 = "我們可是年初就在工作了啊！"
10008050-44 = "[s]「果然是因為風紀委員會的工作嗎？」"
10008050-45 = "嗯。因為剛才「大吉殿」直播的關係，現在這附近整個亂成一團……"
10008050-46 = "衝著賽錢箱來的人大量湧現，到處都變得亂七八糟的。"
10008050-47 = "以這些傢伙為源頭，我們學園的問題兒童們也開始四處鬧事。#n亞子醬還說沒收拾他們就不准回來……"
10008050-48 = "大過年的，真受不了！"
10008050-49 = "……這全都是你們害的！"
10008050-50 = "才不是！？"
10008050-51 = "事情的元凶不是我們，真要說的話我們也是受害者……！"
10008050-52 = "沒錯！現在不是爭吵的時候！"
10008050-53 = "……受害者？"
10008050-54 = "你們明明也盯上了賽錢箱，還敢說那些不要臉的話……"
10008050-55 = "那，那是因為，因為某些原因……！"
10008050-56 = "果然還是在覬覦賽錢箱嘛！你們這些問題兒童！"
10008050-58 = "為了維持風紀，我要在這裡擊退你們！還有為了我的新年假期！"
10008050-60 = "都說了是有原因……啊啊！真是的！"
10008050-61 = "[s]「那個，大家先冷靜一點……」"
10008050-63 = "啊哈哈！很好很好，來打架吧！"
10008050-64 = "戰鬥準備OK。"
10008050-65 = "亞，亞瑠大人！請儘管交給我吧！"
10008050-70 = "都說了等等啊！"

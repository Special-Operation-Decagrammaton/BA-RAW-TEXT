[translation]
10008050-1 = "ตอนที่ 5;คณะกรรมการวินัยก็ด้วยเหรอ?!"
10008050-3 = "เจ้าพวกไคเทนเจอร์ไปทางไหนแล้วน่ะ?!"
10008050-4 = "ดูจากเส้นทางการหลบหนีจนถึงตอนนี้... บางทีสถานที่ที่เจ้าพวกนั้นจะมุ่งหน้าไป..."
10008050-9 = "อ๊ะ ตรงนั้น! เจอกลุ่มคนที่น่าสงสัยแล้วค่ะ!"
10008050-10 = "ว่าไงนะ? คนที่น่าสงสัยงั้นเหรอ?! ไหน? อยู่ที่ไหนล่ะ?!"
10008050-11 = "พวกไคเทนเจอร์อยู่ที่ไหนกันน่ะ?!"
10008050-13 = "จะใช้รูปแบบปิดล้อมศัตรูตามแผนดำเนินการค่ะ!"
10008050-24 = "ประธาน... แบบนี้มัน..."
10008050-25 = "เอ๋...?!"
10008050-26 = "ดะ...เดี๋ยวก่อน! หรือที่บอกว่าคนน่าสงสัยที่พูดถึงนั่น...?!"
10008050-31 = "ในที่สุดก็จับได้แล้ว! เจ้าพวกตัวปัญหา! คราวนี้หนีไม่รอดแล้ว!!"
10008050-32 = "[s] \"อิโอริ...\""
10008050-33 = "อะไรเนี่ย ก็คิดอยู่ว่าหน้าคุ้นๆ คุณครูนี่นา?"
10008050-34 = "คุณครูมาทำอะไรอยู่ที่นี่ล่ะ? แถมยังอยู่กับพวกเด็กเกเรนี่ด้วย"
10008050-35 = "คะ...ใครเป็นเด็กมีปัญหากัน?!"
10008050-36 = "แล้วที่นี่มีคนอื่นอีกรึยังไง? พวกหน่วยรับจ้างสารพัด!"
10008050-37 = "[s] \"แล้วอิโอริล่ะ มาทำอะไรที่นี่?\""
10008050-38 = "หืม? ฉันเหรอ? ก็แน่อยู่แล้ว..."
10008050-39 = "ดึกดื่นป่านนี้ยังยกโขยงกันออกมาแบบนี้อีกเหรอ..."
10008050-40 = "อ่ะฮะฮะ~!"
10008050-41 = "ดูเหมือนคณะกรรมการวินัยของเกเฮนน่าจะว่างกว่าที่คิดไว้อีกนะ?"
10008050-42 = "หาาา?!"
10008050-43 = "ไม่ใช่อย่างนั้นสักหน่อย! ถึงจะเป็นช่วงปีใหม่ แต่ถ้ามีงานมารอตรงหน้าก็ต้องจัดการสิ!"
10008050-44 = "[s] \"มีงานของคณะกรรมการวินัยเหรอ?\""
10008050-45 = "ใช่แล้ว เกิดเรื่องวุ่นวายเพราะการถ่ายทอดสดที่งาน <ไดคิจิเดน> เมื่อกี้นี้ไม่ใช่รึไง"
10008050-46 = "เพราะงั้นถึงมีแต่พวกที่คิดจะเข้าไปแย่งตู้บริจาคหรืออะไรสักอย่างอยู่เต็มไปหมด..."
10008050-47 = "เฮ้อ... พวกเด็กมีปัญหาของโรงเรียนเราก็เลยอาละวาดวุ่นวายกันใหญ่เลยน่ะสิ อาโกะจังยื่นคำขาดว่า#nถ้าจัดการเรื่องนี้ไม่ได้ ก็ห้ามกลับบ้านเด็ดขาด..."
10008050-48 = "ไม่รู้ทำไมเวลาที่ฉันเข้าเวรต้องมีเรื่องแบบนี้เกิดขึ้นทุกวันกันนะ? แถมยังตั้งแต่วันปีใหม่เลยด้วย!"
10008050-49 = "ว่าแล้วเชียวว่าเรื่องนี้ก็เป็นฝีมือของพวกเด็กมีปัญหาอย่างพวกเธอ!"
10008050-50 = "ทำไมจู่ๆ มากล่าวหากันแบบนี้ล่ะ?!"
10008050-51 = "เรื่องคราวนี้น่ะ พวกเราเป็นผู้เสียหายต่างหาก..."
10008050-52 = "ใช่แล้ว! แต่ตอนนี้ไม่ใช่เวลาที่จะมามัวเถียงกันแบบนี้นะ...!"
10008050-53 = "ว่าไงนะ? ผู้เสียหายงั้นเหรอ?"
10008050-54 = "กล้าพูดแบบนั้นด้วย หน้าหนากว่าผนังปูนอีกมั้งน่ะ! พวกเธอเองก็เล็งตู้บริจาคเอาไว้เหมือนกันนี่"
10008050-55 = "อ๊ะ เรื่องนั้นมัน..."
10008050-56 = "นั่นไงๆ! สุดท้ายก็คิดจะขัดขวางคณะกรรมการวินัยอยู่ดีใช่มั้ยล่ะ! เจ้าพวกตัวปัญหา!"
10008050-58 = "ฉันจะจัดการเจ้าพวกตัวปัญหาให้หมด! เพื่อทำหน้าที่ของคณะกรรมการวินัย และเพื่อวันหยุดพักผ่อน#nปีใหม่ของฉัน!"
10008050-60 = "เดี๋ยวสิ ที่พูดไปมันก็ไม่ได้ผิดหรอกนะ แต่ว่ามันก็ไม่ได้ถูกทั้งหมดเหมือนกัน... อ๊าาา! จริงๆ เลยเชียว!"
10008050-61 = "[s] \"ดะ...เดี๋ยวก่อน! ทุกคนใจเย็นๆ ก่อน...\""
10008050-63 = "อ่ะฮะฮะ! จะหาเรื่องกันสินะ!"
10008050-64 = "ประธาน เตรียมพร้อมต่อสู้แล้วละ"
10008050-65 = "ทะ...ท่านอารุ...! ไว้ใจฉันได้เลยค่ะ!"
10008050-70 = "อ๊าาา! อะไรกันเนี่ย?!"

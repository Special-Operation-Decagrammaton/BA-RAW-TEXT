[translation]
10009060-1 = "ตอนที่ 6;บทสรุปสุดท้าย!"
10009060-2 = "ห้องคุมขังฝั่งตะวันตก หมายเลข 9"
10009060-8 = "ดูเหมือนคนจากสำนักความมั่นคงจะงานยุ่งมากกว่าเดิมอีกนะคะ"
10009060-9 = "มาตรฐานอุปกรณ์ในห้องคุมขังตอนนี้ดีขึ้นเยอะจนเทียบกับก่อนหน้านี้ไม่ติดเลยล่ะ"
10009060-10 = "ถ้าคราวนี้วาคาโมะยังหนีออกไปจากที่นี่ได้อีก..."
10009060-11 = "อืม... ถ้าเป็นแบบนั้นคงจะไม่จบแค่เรื่องความผิดพลาดแน่นอน"
10009060-12 = "เพราะงั้นหัวหน้าฝ่ายรักษาความปลอดภัยเลยปรับปรุงระบบการรักษาความปลอดภัยให้แข็งแรงขึ้น#nจนไม่มีช่องโหว่แม้แต่นิดเดียวเลยล่ะ"
10009060-13 = "ค่ะ นักเรียนของทางมิลเลเนียมก็มาตรวจสอบอุปกรณ์รักษาความปลอดภัยให้แล้ว คราวนี้ทั้งกำลังพลและอุปกรณ์อิเล็กทรอนิกส์เองก็ได้รับการปรับปรุงให้ดีขึ้นมากแล้วค่ะ"
10009060-14 = "แน่นอนว่าพอพวกผู้เกี่ยวข้องมาถึงต่างก็พูดกันว่า \"นี่เป็นแค่ระดับความปลอดภัยจริงๆ งั้นเหรอ\" แล้วก็ทำหน้าตกใจกันมากเลยล่ะ"
10009060-15 = "อืม ทุกอย่างก็ไปได้สวยแล้วแท้ๆ"
10009060-16 = "มีอะไรเหรอคะ ฟุบุกิ?"
10009060-17 = "เหมือนมีบางอย่างที่ไม่ถูกต้องน่ะ มีอะไรบางอย่างที่กวนใจฉันอยู่..."
10009060-18 = "ช่างเถอะ ฉันอาจจะกังวลมากเกินไปเองก็ได้ อื้อ"
10009060-25 = "แต่ว่า... ตั้งแต่เราจับตัวเธอมาได้ เธอก็ไม่ยอมพูดอะไรเลย นะ...น่ากลัวจัง"
10009060-26 = "จะไม่เป็นไรแน่ใช่มั้ยคะ ฟุบุกิ?! (กระซิบกระซาบ)"
10009060-27 = "แต่บางทีการที่เธอไม่พูดอะไรเลยก็อาจจะเป็นเรื่องดีก็ได้นะ ก็ยัยนั่นเป็นคนที่พูดเล่นลิ้นได้น่ากลัวมากเลยนี่นา (กระซิบกระซาบ)"
10009060-28 = "เรื่องนั้นคนที่บอกว่าเป็นแค่ข่าวลือก็คือฟุบุกิไม่ใช่รึไงคะ..."
10009060-29 = "งะ...งั้นเหรอ?"
10009060-30 = "เอาเถอะ!"
10009060-36 = "ฮึ่ม!"
10009060-37 = "จะยังไงก็เถอะ นี่ ยัยจิ้งจอกแห่งความพินาศ! ฉันขอเตือนเอาไว้เลยนะ"
10009060-38 = "มาถึงขนาดนี้แล้ว คราวนี้อย่าคิดทำอะไรเลยจะดีกว่า! "
10009060-39 = "ที่เธอหลบหนีออกจากห้องคุมขังไปหลายครั้ง พวกเราเลยต้องเขียนหนังสือขอโทษ แล้วก็จะถูก#nลดวันหยุด โดนตัดคะแนน แถมโดนลดค่าตอบแทนอีกด้วย! คราวนี้เราเตรียมพร้อมไว้หมดแล้ว!"
10009060-41 = "คะ? ฟุบุกิ เคยได้รับค่าตอบแทนด้วยเหรอคะ?"
10009060-42 = "คะ...คิริโนะ! ตอนนี้ที่เราต้องทำคือต้องบลัฟฟ์เธอไว้นะ! บลัฟฟ์น่ะ! แบบพูดขู่เตือนน่ะ!"
10009060-43 = "อ๊ะ งะ...งั้นเหรอคะ! ค่ะ! ฉะ...ฉันเองก็เสี่ยงเหมือนกันนะคะ! เอ่อ... คราวนี้ฉันต้องเขียนหนังสือ#nสำนึกผิดมากกว่า 100 แผ่นเลยนะคะ!"
10009060-44 = "ฮือ... หนังสือสำนึกผิด 100 แผ่น..."
10009060-45 = "คิริโนะ! ทำหน้าหดหู่ก่อนที่จะพูดบลัฟฟ์ได้ยังไงเล่า!"
10009060-46 = "เฮ้อ..."
10009060-47 = "จะยังไงก็ช่างเถอะ มาทำให้พวกเด็กเกเรปั่นป่วนในวันวาเลนไทน์แบบนี้ได้"
10009060-48 = "เรื่องนั้นค่อนข้างน่าประทับใจอยู่มากทีเดียว ใช้ได้เลยนี่นา"
10009060-49 = "จิ้งจอกแห่งความพินาศนี่ดูถูกไม่ได้เลยนะ "
10009060-51 = "..."
10009060-52 = "ว่าแล้วเชียว เป้าหมายที่เธอเล็งอยู่คือคุณครูจากชาเล่ต์ใช่ไหม?"
10009060-53 = "เหตุผลล่ะ? เพื่อแก้แค้นเรื่องในอดีตงั้นเหรอ? หรือว่าแค่ทำไปเพราะโกรธแค้น? ไม่ว่ามันจะคืออะไรก็ไม่สำคัญหรอก"
10009060-54 = "ยังไงคราวนี้เธอก็หนีออกไปไม่ได้แล้วล่ะ เพราะครั้งนี้นอกจากโรงเรียนวัลคิรี่ ยังมีโรงเรียนอื่นๆ ให้ความร่วมมือกับเราด้วย"
10009060-55 = "ใช่แล้วค่ะ! ถึงจะเป็นคุณจิ้งจอกแห่งความพินาศก็ตาม ถ้ามีคนคอยสอดส่องเยอะขนาดนี้ก็คงหนี#nออกไปไม่ได้แน่ๆ ค่ะ!"
10009060-56 = "..."
10009060-57 = "ยังไม่ยอมปริปากพูดเหมือนเดิมเลยนะ..."
10009060-58 = "อ๊ะ หรือว่ากลัว?"
10009060-59 = "อ่ะฮ่า~ ช่วยไม่ได้ละนะ ทั้งที่คิดว่าจะได้รับอิสรภาพหลังจากหนีออกไปแล้ว แต่ก็ต้องสิ้นหวัง#nเพราะถูกจับตัวกลับมาได้อีกสินะ"
10009060-60 = "ไม่ใช่แค่พวกเรานะ ตอนนี้ทุกคนในห้องคุมขังก็จับตามองเธออยู่ หรือรู้สึกหมดหวังและยอมรับ#nชะตากรรมของตัวเองแล้วรึเปล่านะ?"
10009060-62 = "คือว่า... ฟุบุกิ คือว่าเรื่องนั้น..."
10009060-63 = "หืม? มีอะไรเหรอ? คิริโนะ"
10009060-64 = "เรื่องที่ฟุบุกิพูด... ถ้าพูดไปถึงเรื่องนั้นละก็... จะเป็นลางไม่ดีนะคะ"
10009060-65 = "ลางไม่ดีเหรอ?"
10009060-66 = "อะไรกัน คิริโนะ เธอเชื่อเรื่องโชคลางอะไรแบบนี้ด้วยเหรอ?"
10009060-67 = "ไม่มีทางที่เรื่องไร้สาระแบบนั้นจะเกิด..."
10009060-71 = "อะไรกัน?!"
10009060-72 = "กะ...เกิดเรื่องอะไรขึ้นคะ?!"
10009060-80 = "เดี๋ยวก่อน! นี่! แน่ใจนะว่าวาคาโมะถูกคุมตัวอยู่ในห้องคุมขังน่ะ?!"
10009060-81 = "หืม...?"
10009060-82 = "คะ? คะ...ค่ะ! ธะ...เธออยู่ที่นี่นะคะ"
10009060-83 = "ถ้างั้นแล้วสถานการณ์นี่มันอะไรกันน่ะ? ทำไมกล้องวงจรปิดของสถานที่จัดงานเทศกาลถึงจับภาพ <วาคาโมะ> ได้ล่ะ..."
10009060-84 = "เดี๋ยวก่อนนะ ไม่ได้มีแค่คนเดียวด้วย?"
10009060-85 = "สอง สาม... เยอะขึ้นเรื่อยๆ เลย?"
10009060-89 = "...!! เดี๋ยวนะ หรือว่า...!"
10009060-90 = "คิริโนะ! ถอดหน้ากากยัยนั่นดูเร็วเข้า!"
10009060-91 = "คะ...คะ?"
10009060-92 = "ดะ...เดี๋ยวก่อนสิคะ!"
10009060-103 = "อา... โดนจับได้ซะแล้ว"
10009060-104 = "คะ...คะ...คะ... คุณเป็นใครกันคะ?!"
10009060-109 = "โดนต้มซะแล้ว...! ใส่ชุดเหมือนกันแล้วก็สลับตัวกันงั้นเหรอ?!"
10009060-110 = "เดี๋ยวนะ แล้วถ้างั้นวาคาโมะตัวจริงล่ะ?!"
10009060-111 = "คะ? คะ? คะะะะ?!"
10009060-116 = "หรือว่า...!"
10009060-120 = "อา ใช้เวลานานจริงๆ เลยนะคะ"
10009060-121 = "ฉัน... วาคาโมะผู้นี้รอคอยช่วงเวลานี้มาตลอดเลยละค่ะ"
10009060-122 = "ในเวลานี้ที่ทุกคนต่างพุ่งความสนใจไปที่ห้องคุมขัง"
10009060-123 = "ตอนนี้ฉันจะไปหาคุณด้วยตัวเองแล้วค่ะ "
10009060-124 = "คุณครู ♡"

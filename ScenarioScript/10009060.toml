[translation]
10009060-1 = "第6話;了結"
10009060-2 = "矯正局南分部．第9矯正設施"
10009060-8 = "警備局的各位似乎都很忙呢。"
10009060-9 = "畢竟矯正局設施的警備程度，已經提升到和之前無法相提並論了嘛……"
10009060-10 = "做到這種程度還被逃獄的話……"
10009060-11 = "不是一句「搞砸了」就能交差的……"
10009060-12 = "正是知道這一點，防衛才會如此滴水不漏吧。"
10009060-13 = "就是啊。而且千年的兩位同學也特別加強了網路相關的安全！"
10009060-14 = "雖然他們兩位剛才一到這裡，#n就露出「這種東西真的能稱為保全系統……？」的傻眼表情就是了。"
10009060-15 = "做到這種程度總算沒問題……了吧。"
10009060-16 = "吹雪，有什麼讓你在意的事嗎？"
10009060-17 = "該說有點放心不下嗎……"
10009060-18 = "……是我想太多了吧。"
10009060-25 = "話說回來，吹雪。"
10009060-26 = "雖然才剛被抓回來，但「災厄之狐」同學從剛剛開始就不發一語，不覺得很恐怖嗎！？"
10009060-27 = "……他似乎能用三寸不爛之舌迷惑對方，就這樣不說話反而比較好吧？"
10009060-28 = "吹雪剛才不是才說那些都是騙人的嗎……！？"
10009060-29 = "咦，有嗎。"
10009060-30 = "沒事啦沒事啦……"
10009060-36 = "呃，那位災厄之狐。"
10009060-37 = "姑且先警告你一聲。"
10009060-38 = "最好是別再打什麼歪主意比較好哦。"
10009060-39 = "我們可是因為你逃獄的關係，別說是寫報告了，連特休和獎金都差點就沒了啊！"
10009060-41 = "咦？吹雪，你有拿過獎金嗎？"
10009060-42 = "別在意這些啊！都說是警告了，稍微誇大一點有什麼關係！"
10009060-43 = "原，原來如此！那……我，我也是，被你害的要寫100份悔過書啊！"
10009060-44 = "嗚，100份悔過書……"
10009060-45 = "為什麼要因為自己的誇大其辭受傷啊！又不是真的！？"
10009060-46 = "總而言之……"
10009060-47 = "怎麼說呢，真虧你能搗亂到這種程度啊。"
10009060-48 = "雖然我們一開始做的很隨便，但老實說嚇到我了。"
10009060-49 = "看來「災厄之狐」並非浪得虛名呢。"
10009060-51 = "……"
10009060-52 = "吶，你的目標是夏萊的老師對吧？"
10009060-53 = "理由是什麼？因為之前輸了所以要報仇？#n雖然對我來說都無所謂就是了。"
10009060-54 = "總之，你還是放棄吧。這次除了女武神，還有從各地來的大家啊。"
10009060-55 = "說的對。就算是災厄之狐同學，面對這麼嚴密的警備也是無能為力的！"
10009060-56 = "……"
10009060-57 = "……保持沉默？"
10009060-58 = "還是說你很難過？"
10009060-59 = "不過我也不是不能理解。好不容易成功從矯正局逃獄，被抓回來的話難免會難過吧。"
10009060-60 = "不過很抱歉，你還是死了這條心吧。現在不只是我們，大家的視線都集中在這裡啊。"
10009060-62 = "吹雪，那個……"
10009060-63 = "嗯？怎麼了桐乃？"
10009060-64 = "那個，該怎麼說呢。吹雪說的那些話聽起來總覺得完全是在立Flag……"
10009060-65 = "Flag？"
10009060-66 = "什麼嘛，桐乃。#n你居然會相信那種迷信？"
10009060-67 = "怎麼可能因為我剛才的發言就被逃獄──"
10009060-71 = "噫！？"
10009060-72 = "發，發生什麼事了！？"
10009060-80 = "吶，若藻真的有在你們那邊吧！？"
10009060-81 = "……咦？"
10009060-82 = "是，是的！就在我們面前……！？"
10009060-83 = "……那現在這個情況是怎麼回事？監視器拍到了若藻……"
10009060-84 = "等等，不只一個！？"
10009060-85 = "兩個，不，三個……！？"
10009060-89 = "……！"
10009060-90 = "桐乃，把他的面具拿下來！"
10009060-91 = "咦？"
10009060-92 = "咦咦！？"
10009060-103 = "啊，被發現了。"
10009060-104 = "你，你你你是誰啊！？"
10009060-109 = "……中計了。居然是替身……！"
10009060-110 = "等等，那若藻本人呢……！？"
10009060-111 = "這到底是怎麼回事啊！？"
10009060-116 = "……該不會！"
10009060-120 = "啊啊，真是花費了許多時間……"
10009060-121 = "若藻我，一直等待著此時此刻的到來……"
10009060-122 = "所有人的目光總算從我身上移開，集中到了矯正局。"
10009060-123 = "來吧，總算可以拜訪您了……"
10009060-124 = "……老師♡"

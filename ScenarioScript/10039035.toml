[translation]
10039035-2 = "ทำได้ดีมากเลยค่ะ คุณซิสเตอร์!"
10039035-3 = "ขอบคุณสำหรับความร่วมมือนะคะ...!!"
10039035-4 = "ค่อยยังชั่วหน่อยที่การเต้นเป็นประโยชน์นะคะ ฉันเองก็ลองเต้นๆ ตามที่เห็นมา เผื่อว่าจะช่วยได้น่ะค่ะ..."
10039035-5 = "ยอดเยี่ยมเลยละ ไม่ใช่ว่าจะได้ผลกับแค่พวกแก๊งหมวกกันน็อกนะ ตอนแรกพวกฉันก็เอาแต่ยืนเหม่อๆ ดูอยู่เลย"
10039035-6 = "[s1] \"ท่าเต้นเหมือนของคิริโนะเลยละ จำเก่งมากเลย\"\n[s2] \"มารีดูจะมีพรสวรรค์ในด้านนี้นะ...\""
10039035-9 = "งะ... งั้นเหรอคะ...? ฉันปล่อยใจเต้นไปจนไม่รู้ตัวค่ะ... แหะๆ..."
10039035-10 = "อ้อ เกือบลืมไปแล้วสินะ คุณครูกับคุณซิสเตอร์กำลังศึกษาเกี่ยวกับไอดอลใช่มั้ย?"
10039035-11 = "จะให้สอนแค่การเต้นมันก็ยังไงๆ อยู่นะ เราได้รับความช่วยเหลือมาทั้งที"
10039035-12 = "คะ... คะ? มะ... ไม่เลยค่ะ! ฉันไม่ได้ตั้งใจให้คุณรู้สึกแบบนั้นนะคะ...!"
10039035-13 = "ไม่หรอกๆ พวกฉันไม่เป็นไรจริงๆ สำหรับพวกเราแล้ว วิธีนั้นมันน่าจะสบายใจกว่าน่ะ"
10039035-14 = "หืม...? 'วิธีนั้น' คืออะไรน่ะเหรอ?"
10039035-15 = "ไม่มีอะไรซับซ้อนหรอก ถ้าจะเรียนเต้น ก็ควรเรียนจากผู้เชี่ยวชาญสิ ไม่ใช่จากมือใหม่อย่างพวกฉัน"
10039035-16 = "ห้องซ้อมเต้นเราก็เช่าไว้แล้วด้วย..."
10039035-17 = "พวกฉันจะไปคุยให้เอง จากนี้คุณซิสเตอร์ก็มาซ้อมเต้นกับครูสอนเต้นคนเดียวกับเรานะ"
10039035-19 = "ฟุบุกิ...! ในที่สุดก็เกิดแพชชั่นแล้วสินะคะ...!!"
10039035-20 = "ก็ถ้านักเรียนเยอะขึ้น ครูสอนเต้นจะได้มีเวลามาจับผิดฉันน้อยลงไง"
10039035-21 = "[s3] (สมกับเป็นฟุบุกิจริงๆ เลย)\n[s4] \"อื้อ แบบนี้ก็ดีกับมารีเลยนะ\""
10039035-24 = "ทุกคน...!"
10039035-25 = "ฟุ~ บุกิ~!! คิริโนะ~!!"
10039035-28 = "อึก..."
10039035-32 = "ขอบคุณที่ช่วยนะ ทั้ง 2 คนเลย!! สมกับที่เป็นลูกค้าประจำของร้านเลย!!"
10039035-33 = "แล้วฉันจะไปเชียร์ตอนประกวดนะ! จะลางานไปให้กำลังใจถึงที่เลยละ! จริงสิ วันนั้นผู้จัดการร้านอาจ#nปิดร้านไปเชียร์ก็ได้!"
10039035-34 = "อะ... อึก..."
10039035-39 = "[ns5] \"มีแฟนคลับแล้วสินะเนี่ย\"\n[ns6] \"เยี่ยมไปเลยนะ สำนักรักษาความปลอดภัย\""
10039035-44 = "นี่สินะ..."
10039035-45 = "ไอดอล... คืออะไรแบบนี้สินะ..."
10039035-46 = "ฮุฮุ..."
10039035-47 = "น่าสนุกเหมือนกันนะคะ..."
10039035-59 = "- การเต้น เคลียร์ -"

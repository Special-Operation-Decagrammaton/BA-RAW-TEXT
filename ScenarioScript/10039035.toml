[translation]
10039035-2 = "實在太厲害了，修女同學！"
10039035-3 = "真不知道該怎麼感謝你的幫忙……！！"
10039035-4 = "能，能幫上忙就好。#n我也是在半信半疑的情況下嘗試的……"
10039035-5 = "真厲害。#n不僅是頭盔團，連我們都看呆了呢。"
10039035-6 = "[s1]「和桐乃的舞蹈一模一樣。」\n[s2]「也許你很有天分呢……」"
10039035-9 = "是，是嗎……？#n我不由自主地就跳起來了……哈哈……"
10039035-10 = "啊啊～這麼說來，老師和修女同學正在學習有關偶像的事情對吧？"
10039035-11 = "不管怎麼說，只教那個舞蹈好像還是有點不妥……畢竟我們也受到了幫助。"
10039035-12 = "咦，咦？別，別這麼說！#n我絕對沒有想給你們添麻煩的意思……！"
10039035-13 = "不不不，真的沒關係。#n而且這麼做對我們來說也比較方便。"
10039035-14 = "……嗯？問我「這麼做」是什麼意思？"
10039035-15 = "很簡單呀～#n舞蹈教學就應該交給專家，而不是我們這些初學者。"
10039035-16 = "……順便還能租用練舞室。"
10039035-17 = "我們會好好幫你說明的，所以修女同學也來跟我們一起練舞吧。"
10039035-19 = "……吹雪！你終於有幹勁了……！！"
10039035-20 = "……只要一起學的人變多，被監督的時間也會減少嘛。"
10039035-21 = "[s3]（真像吹雪的作風）\n[s4]「嗯，對瑪麗來說也是好事一樁吧。」"
10039035-24 = "大家……！"
10039035-25 = "吹～雪～！！桐乃～！！"
10039035-28 = "……糟糕。"
10039035-32 = "謝謝你們救了我！！不愧是我們店的常客！！"
10039035-33 = "我很期待你們的現場演出唷！一定會請假去看的！#n說不定店長那天還會公休呢！"
10039035-34 = "唔，唔嗯……"
10039035-39 = "[ns5]「你們真受歡迎呢。」\n[ns6]「……很了不起哦，生活安全局。」"
10039035-44 = "原來如此……"
10039035-45 = "偶像……也許，就是那種感覺……"
10039035-46 = "……呵呵。"
10039035-47 = "……真是件愉快的事呢。"
10039035-59 = "- 舞蹈完成 -"

10039035-15 = "1;후부키;01;간단한 이야기야. 춤을 가르쳐주는 건, 우리 같은 초보가 아니라 전문 강사여야지."
10039035-16 = "1;후부키;99;……춤 연습할 연습실도 겸사겸사 빌리고 말이지.\n#1;em;[...]"

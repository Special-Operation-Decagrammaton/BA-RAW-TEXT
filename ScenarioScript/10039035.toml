[translation]
10039035-2 = "Beautifully done, Sister!"
10039035-3 = "I don't know how to thank you...!"
10039035-4 = "Heh, I'm just glad it worked."
10039035-5 = "You nailed it. We were almost as distracted as they were."
10039035-6 = "[s1] \"You moved just like Kirino did.\"\n[s2] \"Maybe you have a talent for learning by watching.\""
10039035-9 = "I-Is that right...? I just kind of got carried away... Haha..."
10039035-10 = "Oh, you know, that's right. Sister, Sensei, weren't you talking about being pop idols?"
10039035-11 = "I mean, not that teaching you a dance would be enough to thank you, but..."
10039035-12 = "H-Huh? Ah, no, please don't feel obligated..."
10039035-13 = "Don't worry about that. We're happy to. Although, there is one caveat..."
10039035-14 = "What caveat, you ask?"
10039035-15 = "Well, you ought to learn the dance from a professional instructor, not beginners like us."
10039035-16 = "...And it helps to have a studio to practice in."
10039035-17 = "Why don't you join our next lesson? We can get it all set up for you."
10039035-19 = "Fubuki, is that motivation I hear?"
10039035-20 = "...Well, if the teacher has more students, she'll pay less attention to me."
10039035-21 = "[s3] \"(Very Fubuki-like, but sure.)\"\n[s4] \"This'll be great for you, Mari.\""
10039035-24 = "Aw, thanks, everybody..."
10039035-25 = "Fubukiii! Kirinooo!"
10039035-28 = "...Ugh."
10039035-32 = "Thank you so much, both of you. Best customers ever!"
10039035-33 = "I can't wait to see your show! I'll take some time off to go watch. Maybe I can get the manager to close the store that day!"
10039035-34 = "U-Um..."
10039035-39 = "[ns5] \"You two are really popular.\"\n[ns6] \"Another win for the Public Safety Bureau.\""
10039035-44 = "...I see."
10039035-45 = "So that's what it's like being a pop idol..."
10039035-46 = "Heehee..."
10039035-47 = "...It must be wonderful."
10039035-59 = "- The Dance Cleared -"

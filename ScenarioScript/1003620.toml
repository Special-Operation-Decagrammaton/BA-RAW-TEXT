[translation]
1003620-1 = "ผ้าห่อของปิกนิก"
1003620-2 = "(คุณครูออกไปที่สวนสาธารณะตามเวลาที่นัดไว้ และก็พบว่าฮินาตะมารออยู่ก่อนแล้ว)"
1003620-3 = "(ในมือของฮินาตะข้างหนึ่งถือกระเป๋าใบใหญ่ไว้ และอีกมือหนึ่งก็โบกทักทายคุณครูอย่างร่าเริง)"
1003620-7 = "คุณครูคะ! ทางนี้ค่ะ ทางนี้!"
1003620-8 = "อ๊ะ ไม่สิ"
1003620-9 = "เดี๋ยวฉันไปหาตรงนั้นเองค่ะ! ช่วยรออยู่ตรงนั้นด้วยนะคะ!"
1003620-18 = "ขอบคุณที่มานะคะคุณครู ฉันกำลังรออยู่เลยค่ะ!"
1003620-19 = "[s1] \"ขอโทษที่ครูมาช้านะ\"\n[s2] \"อ๊ะ รอนานรึเปล่า?\""
1003620-20 = "คะ...?"
1003620-21 = "คะ...?"
1003620-22 = "มะ... ไม่เลยค่ะ ฉันไม่ได้รอนานเลยค่ะ คุณครูไม่ได้มาช้าเลย! ฉะ... ฉันเพิ่งมาถึงเองค่ะ...!"
1003620-23 = "ฮือ... ฉันไม่ได้คิดโทษคุณครูเลยนะคะ ขอโทษด้วยค่ะ..."
1003620-24 = "ไม่ต้องขอโทษงั้นเหรอคะ?"
1003620-25 = "ตะ... แต่ว่า... "
1003620-26 = "คะ...?"
1003620-27 = "ฉันดูประหม่านิดหน่อยเหรอคะ? งะ...งั้นเหรอคะ? ที่จริงฉันกำลังพยายามทำตัวเป็นปกติอยู่น่ะค่ะ..."
1003620-31 = "มะ... ไม่สิ!"
1003620-32 = "ถ้าพูดแบบนี้ก็หมายความว่าฉันตื่นเต้นนี่นา คะ...คือว่า...!"
1003620-36 = "...ฮิฮิฮิ..."
1003620-37 = "[s3] \"ดีจังน้า ที่ฮินาตะดูมีความสุข\"\n[s4] \"ไม่เห็นแปลกเลย ครูก็ตื่นเต้นเหมือนกัน\""
1003620-38 = "คุณครู..."
1003620-39 = "คุณครู..."
1003620-43 = "อ๊ะ! ฉันนี่ขี้ลืมจริงๆ เลย ตอนนี้ไม่ใช่เวลามัวมาทำอะไรแบบนี้สักหน่อย"
1003620-44 = "คุณครูคงจะหิวแล้วสินะคะ วันนี้ฉันก็เอาข้าวกล่องมาด้วยนะคะ! ถ้าคุณครูไม่ว่าอะไร มารับประทาน#nด้วยกันมั้ยคะ?"
1003620-48 = "ปูเสื่อตรงนี้... แล้วก็เอาข้าวกล่องออกมาจากกระเป๋า..."
1003620-53 = "[ns5] \"ข้าวกล่อง? มันใหญ่เกินไปรึเปล่า?\"\n[ns6] \"กล่องเท่าสารานุกรมเลยนะเนี่ย...?\""
1003620-54 = "ฮุฮุฮุ จะได้กินให้อิ่มๆ เลยยังไงล่ะคะ"
1003620-55 = "ฮุฮุฮุ จะได้กินให้อิ่มๆ เลยยังไงล่ะคะ"
1003620-56 = "ไม่ต้องห่วงนะคะ คุณครูรับประทานเท่าที่ไหวได้เลยค่ะ เดี๋ยวที่เหลือฉันจัดการเองค่ะ..."
1003620-60 = "เอ๊ะ..."
1003620-61 = "รู้สึกเหมือนบอกเป็นนัยๆ ว่าฉันกินจุเลยแฮะ..."
1003620-62 = "ชะ... ช่างเถอะค่ะ!"
1003620-63 = "นะ... นี่ค่ะคุณครู... เชิญรับประทานให้อร่อยเลยนะคะ"
1003620-69 = "ข้าวกล่องที่แสนภาคภูมิใจของ..."
1003620-74 = "ฉัน...?"
1003620-78 = "ข้าว...กล่อง... เอ๊ะ...? "
1003620-84 = "หนังสือ...?"
1003620-85 = "[s7] \"นี่ไม่ใช่ข้าวกล่อง แต่เป็นหนังสือนี่นา...?\"\n[s8] \"หนังสือเล่มบิ๊กเบิ้มเลยนะเนี่ย...\""
1003620-86 = "เอ๋...?"
1003620-87 = "เอ๋...?"
1003620-88 = "เอ่อ... เอ๋? ทำไม... ทำไม <สมุดบัญชีคัดแยกอุปกรณ์> ถึงมาอยู่ที่นี่ล่ะ..."
1003620-92 = "เอ๋? ฉัน... ฉันว่าฉัน... ฉันหยิบข้าวกล่องมาแล้วนะ... ทำไมล่ะ? เอ๋...? เอ๋~~~~?"
1003620-93 = "ทำไมล่ะ... เอ๋...?"
1003620-94 = "[s9] \"ใจเย็นๆ นะ ฮินาตะ\"\n[s10] \"ใครๆ ก็พลาดกันได้ ครูก็หยิบพลาดบ่อยๆ\""
1003620-95 = "คะ... ค่ะ ใจเย็นๆ ตะ... แต่ว่า... ถ้างั้นข้าวกล่อง..."
1003620-96 = "ตะ... แต่ว่า... ถ้างั้นข้าวกล่อง..."
1003620-97 = "คุณครูยังไม่ได้รับประทานข้าวเลยแท้ๆ... แต่ฉันกลับทำเรื่องผิดพลาดแบบนี้..."
1003620-98 = "..."
1003620-99 = "ขอโทษด้วยค่ะ..."
1003620-103 = "[ns11] หยิบสมุดบัญชีออกมาจากกระเป๋า\n[ns12] \"หนังสือเล่มใหญ่มากเลย... ครูขอดูได้มั้ย?\""
1003620-110 = "อ่า... คือ... คือว่า..."
1003620-111 = "คุณครูดูได้เลยค่ะ แต่ว่ามันไม่ได้มีอะไรน่าสนุกหรอกนะคะ..."
1003620-112 = "มันเป็นสมุดบัญชีคัดแยกอุปกรณ์ของทางวิหารของเราค่ะ พอดีฉันกำลังดูว่าจะจัดการคัดแยกอุปกรณ์#nไว้ยังไงดี..."
1003620-117 = "คุณครู...? ทำไมทำสีหน้าจริงจังแบบนั้น..."
1003620-118 = "คะ? คัดแยกหมวดหมู่ไว้ได้เรียบร้อยมากเลยงั้นเหรอคะ? อา..."
1003620-119 = "นะ...นั่นเป็นเพราะวิหารของเราใหญ่มาก... เลยมีอุปกรณ์ที่ต้องจัดการดูแลอยู่เยอะเลยค่ะ"
1003620-120 = "หนึ่งพัน... ไม่สิ น่าจะอยู่ราวๆ หลักหมื่นค่ะ..."
1003620-121 = "ถึงฉันจะเป็นผู้รับผิดชอบ แต่ก็คงดูแลคนเดียวไม่ไหว... ก็เลยจัดทำเป็นรายการแบบนี้ไว้ค่ะ"
1003620-122 = "ฉันมักจะซุ่มซ่าม ไม่เหมือนคนอื่นๆ น่ะค่ะ ถ้าไม่ทำบันทึกเอาไว้แบบนี้ คงจะลืมไปหมดแน่ๆ ค่ะ"
1003620-123 = "แหะๆๆ..."
1003620-124 = "[s13] \"อื้อ จริงด้วยนะ ฮินาตะนี่เป็นคนละเอียดจังเลยน้า\"\n[s14] \"นั่นสิ ละเอียดมากเลยนะเนี่ย\""
1003620-130 = "คุณครู...? เมื่อกี้ว่ายังไงนะคะ 'ละเอียด' เหรอคะ? ฉันน่ะเหรอคะ?"
1003620-131 = "จะเป็นไปได้ยังไงล่ะคะ...!! ฉันน่ะเป็นเด็กโก๊ะกังต่างหากค่ะ!? อย่างวันนี้ฉันก็ดันลืมหยิบข้าวกล่องมา..."
1003620-132 = "ฉันไม่เคยได้ยินใครบอกว่าฉันเป็นคน \"ละเอียด\" มาก่อนเลยค่ะ ฉันถึงต้องจัดทำบันทึกแบบนี้ยังไงล่ะคะ!"
1003620-136 = "คะ...? รวมเรื่องพวกนั้นด้วยเหรอคะ...?"
1003620-137 = "หมายความว่ายังไงคะ..."
1003620-138 = "[s15] \"ความละเอียดคือการเตรียมพร้อมยังไงล่ะ\"\n[s16] \"มันไม่เกี่ยวกับความจำ แต่เป็นเรื่องของการวางตัวต่างหาก\""
1003620-143 = "คุณครู..."
1003620-147 = "เอ๊ะ? คุณครู... จู่ๆ ก็หยิบอะไรออกมาเหรอคะ..."
1003620-148 = "อ๊ะ..."
1003620-152 = "ข้าวกล่อง...!?"
1003620-153 = "คุณครูเอาข้าวกล่องมาด้วยเหรอคะ?"
1003620-154 = "[s17] \"นี่คือ 'ความละเอียด' ยังไงล่ะ\"\n[s18] \"พอดีมีเมนูที่ครูอยากกินกับฮินาตะอยู่เลยซื้อมาน่ะ\""
1003620-157 = "อ่า..."
1003620-158 = "ถ้างั้น... ก็ค่อยยังชั่วหน่อย... นะคะ เฮ้อ..."
1003620-159 = "อันที่จริง จนถึงเมื่อกี้นี้ฉันไม่รู้เลยว่าควรจะทำยังไงดี... คราวนี้ก็ผ่านมาได้ เพราะได้คุณครูช่วยไว้อีก#nแล้วนะคะ"
1003620-160 = "แหะๆ..."
1003620-161 = "ขอบคุณนะคะ!"
1003620-163 = "(หลังจากนั้น คุณครูก็นั่งกินมื้อเที่ยงกับฮินาตะและอ่านสมุดบัญชีคัดแยกอุปกรณ์ไปเพลินๆ...)"
1003620-164 = "(พออ่านไปก็พบว่ามีอุปกรณ์ขนาดใหญ่ต่างๆ มากมาย และระหว่างที่อ่านคุณครูก็คุยกับฮินาตะอย่าง#nสนุกสนาน)"
1003620-168 = "(หลังจากใช้เวลาร่วมกันอย่างเพลิดเพลิน คุณครูก็เดินไปส่งฮินาตะกลับวิหาร)"

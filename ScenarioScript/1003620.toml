[translation]
1003620-1 = "野餐包袱布"
1003620-2 = "（依照約定時間抵達公園時，日向已經在和之前一樣的地方等了）"
1003620-3 = "（日向一隻手拿著大包包，同時向我奮力揮動著另一隻手）"
1003620-7 = "啊，老師！"
1003620-8 = "我馬上就過去那邊。"
1003620-9 = "請等我一下！"
1003620-18 = "非常感謝您總是在百忙中前來！#n恭候多時了！"
1003620-19 = "[s1]「抱歉，稍微遲到了。」\n[s2]「讓妳久等了呢……」"
1003620-20 = "……？"
1003620-21 = "……？"
1003620-22 = "不，不不不！我不是那個意思……！#n我也才到幾分鐘而已……！"
1003620-23 = "我沒有那種意思，那個……對不起。"
1003620-24 = "……？抱，抱歉？"
1003620-25 = "怎麼好像變成互相道歉的情況……"
1003620-26 = "……我，我好像很興奮？"
1003620-27 = "看起來是這樣嗎……？"
1003620-31 = "雖然覺得行為舉止都和往常一樣……"
1003620-32 = "不過還是被老師看穿了呢。"
1003620-36 = "……呵呵。"
1003620-37 = "[s3]「日向看起來很開心，真是太好了。」\n[s4]「我也很期待能夠見面唷。」"
1003620-38 = "老師……"
1003620-39 = "老師……"
1003620-43 = "啊，我真是的！在聊天之前還有事情要做才對。"
1003620-44 = "肚子餓了嗎？我今天和上次一樣準備了便當！#n不介意的話，要不要一起……！"
1003620-48 = "非常感謝！#n那麼就把餐點給鋪開，嘿……"
1003620-53 = "[ns5]「……真，真大呢？」\n[ns6]「這個，簡直是像很大的百科全書一樣的尺寸呢……？」"
1003620-54 = "因，因為不夠吃的話會很困擾的……"
1003620-55 = "因，因為不夠吃的話會很困擾的……"
1003620-56 = "啊，請放心。#n剩下的食物我會全部吃掉的！"
1003620-60 = "……"
1003620-61 = "總覺得照剛才的說法，我就像個超級大食客之類的……"
1003620-62 = "總，總之！"
1003620-63 = "請老師放心享用吧！"
1003620-69 = "這是我拚盡全力，傾注心力準備的……"
1003620-74 = "……咦？"
1003620-78 = "咦，咦……便當是……？"
1003620-84 = "……書？"
1003620-85 = "[s7]「我還以為是便當，原來是書呀……？」\n[s8]「是本超厚的書……」"
1003620-86 = "……咦？"
1003620-87 = "……咦？"
1003620-88 = "怎，怎麼會……為什麼《物品管理帳簿》會在這裡……"
1003620-92 = "我，我明明把便當做好放進去了……？"
1003620-93 = "為，為什麼……！？"
1003620-94 = "[s9]「冷，冷靜點，日向！」\n[s10]「沒關係，我也經常這樣！（？）」"
1003620-95 = "但，但是便當……！"
1003620-96 = "但，但是便當……！"
1003620-97 = "唔，都讓老師空腹過來了……結果又給您添麻煩……"
1003620-98 = "……"
1003620-99 = "對，對不起……"
1003620-103 = "[ns11] 拿出包袱布裡的《物品管理帳簿》\n[ns12]「這本書真厚呢。這個，我可以看嗎？」"
1003620-110 = "啊，那個嘛……"
1003620-111 = "雖然可以看，不過我想應該不太有趣……"
1003620-112 = "畢竟它顧名思義，就是紀錄我所管理的教堂備品而已……"
1003620-117 = "……老師？#n您看得這麼認真……發現什麼了嗎？"
1003620-118 = "是，是的，確實是紀錄的很詳細……"
1003620-119 = "因為我們的教堂相當大……所以相對地，需要管理的備品也特別多……"
1003620-120 = "有數千……不，也許有數萬也說不定。"
1003620-121 = "再怎麼說都是無法記住的數量，所以才需要像這樣做紀錄。"
1003620-122 = "而且我時常冒冒失失的……所以說，也是為了避免自己忘記。"
1003620-123 = "耶嘿嘿……"
1003620-124 = "[s13]「我覺得一絲不苟是好事哦。」\n[s14]「日向做事真細心呢。」"
1003620-130 = "……？"
1003620-131 = "我，我還是第一次被這麼說……！明明我總是十分笨拙……就連今天也把便當和帳本搞錯了……"
1003620-132 = "而且那些也只不過是記錄下來而已……"
1003620-136 = "……？"
1003620-137 = "那很重要……？"
1003620-138 = "[s15]「之所以能夠彌補缺點，也是因為日向的一絲不苟唷。」\n[s16]「我認為面對自己的態度是很重要的。」"
1003620-143 = "……！"
1003620-147 = "……咦，老師？那是什麼呢？"
1003620-148 = "……啊。"
1003620-152 = "是，是便當……！？"
1003620-153 = "老師也有，帶便當過來嗎？"
1003620-154 = "[s17]「雖然我平時可能沒有給人做事嚴謹的感覺……」\n[s18]「不過我想讓日向品嘗看看我做的便當。」"
1003620-157 = "老師……"
1003620-158 = "怎麼說呢，非常感謝……"
1003620-159 = "托您的福，可以不用餓肚子了。"
1003620-160 = "……呵呵。"
1003620-161 = "真的，非常感謝您……！"
1003620-163 = "（之後一邊和日向一起吃著便當，一邊過目了物品管理帳簿）"
1003620-164 = "（在龐大的頁數中，令人意外的物品也不少，所以在吃完便當後依然持續著快樂的對話）"
1003620-168 = "（雖然開心得令人忘記了時光的流逝，還是在太晚之前將日向送了回去）"

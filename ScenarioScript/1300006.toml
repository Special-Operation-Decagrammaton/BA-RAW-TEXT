[translation]
1300006-1 = "沉睡森林中的女僕"
1300006-2 = "神祕的辦公室"
1300006-3 = "呼……"
1300006-4 = "咕噥咕噥……"
1300006-5 = "（Zzz……）"
1300006-6 = "嗚嗯……花凜……那是寧瑠前輩的布丁……不可以吃掉……"
1300006-7 = "[s] 叫醒她"
1300006-8 = "嗯？"
1300006-9 = "[s] 「該起床囉。」"
1300006-10 = "……咦？"
1300006-11 = "啊！？主，主人！？"
1300006-12 = "這，這樣我很困擾的，突然就這樣跑到人家的寢室裡……"
1300006-13 = "但是，如果是主人的話……呵呵。"
1300006-14 = "……哎呀？這，不是我在作夢嗎？"
1300006-16 = "哼嗯……睡的真好。"
1300006-17 = "哎呀，難道現在不是說「哼嗯……睡的真好。」的時候？哼嗯，確實是這樣。"
1300006-18 = "話說回來，全身都被綁住了……"
1300006-19 = "對了，我們──"
1300006-21 = "千年近郊．鬧區"
1300006-22 = "（幾小時前）"
1300006-23 = "這就是之前，命令手下偷走文件，還將上面的機密洩漏出去的……"
1300006-24 = "委託人所在的大樓。"
1300006-25 = "凱薩公司……實在是不太想與他們敵對呢。"
1300006-26 = "總之，我先試著潛入看看。主人，請等候我的聯絡。"
1300006-30 = "要是太久沒有聯絡，或是我很久都沒有逃出來的話……就拜託您了。"
1300006-32 = "神祕的辦公室"
1300006-33 = "呃，那個……"
1300006-34 = "我的意思是如果我很久都沒有逃出來，就麻煩您聯絡C&C。"
1300006-35 = "老師為了救我而入侵了這棟大樓，結果引發了混亂導致我也被發現了，所以才會變成這樣。"
1300006-36 = "呵呵，我並不是在責怪您唷。"
1300006-37 = "您願意來救我，我感到非常高興。"
1300006-38 = "但是……從窗外的景色看來，已經過了好一段時間了。怎麼辦才好呢，這棟大樓可是相當的高……"
1300006-39 = "該怎麼辦呢……沒辦法，只好用炸彈了。"
1300006-40 = "只要運氣好一點的話，應該是能活下來的。"
1300006-41 = "啊，等等……但是如果，主人也被波及到的話……那樣的話就……"
1300006-42 = "……非常抱歉。"
1300006-43 = "因為我的關係讓主人……陷入這麼危險的局面。"
1300006-44 = "……嗚嗚。"
1300006-45 = "哎？沒關係嗎？被，被綁架也不是什麼需要驚慌的事，是這樣嗎！？"
1300006-46 = "唔嗯……好像並不是為了安慰我而說的謊呢……"
1300006-47 = "呵呵……也是呢。"
1300006-48 = "其實，我也沒有那麼不安。"
1300006-49 = "至於理由是什麼，我稍微想了一下。"
1300006-50 = "我想，肯定是因為主人就在我的身邊。而且，"
1300006-51 = "通常到了這個時候……"
1300006-53 = "（哐哐哐哐！）"
1300006-54 = "是，是寧瑠！"
1300006-55 = "快，快逃啊！C&C出現了！！"
1300006-56 = "可惡！剛才那個戴眼鏡的女僕，真的是C&C的人嗎！？"
1300006-57 = "所以我才一直說不要跟女僕扯上關係的，呃啊啊啊！"
1300006-58 = "……"
1300006-59 = "通常，都會變成這種情況。"
1300006-60 = "接著，馬上大家就會打開這扇門，說著：「哈，你們休想得逞」之類的話……"
1300006-61 = "呃啊啊！可惡，不能就這樣坐以待斃！至少要把人質在的那層樓給炸了！"
1300006-62 = "！？"
1300006-63 = "不，不行！等，等等──"
1300006-65 = "（轟隆隆隆隆！）"
1300006-66 = "主人！"
1300006-73 = "主人！主人！"
1300006-75 = "主，主人，您還好嗎！？"
1300006-76 = "[s] 「哼嗯……睡的真好。」"
1300006-77 = "才不是「哼嗯……睡的真好。」吧！"
1300006-78 = "呼……但是……"
1300006-79 = "太好了，爆炸並沒有想像中的厲害。"
1300006-80 = "雖然有點痛，幸好附近有護欄，總算是得救了。"
1300006-81 = "而且……"
1300006-82 = "從護欄掉下來時，您還當了我的緩衝墊呢。"
1300006-83 = "……呵呵……主人真不愧是主人。"
1300006-84 = "謝謝您保護了我，主人。"
1300006-85 = "未來也請您多多指教了。"

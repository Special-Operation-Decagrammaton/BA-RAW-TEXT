[translation]
1300006-1 = "เมดที่หลับใหล"
1300006-2 = "สำนักงานหน่วยรับจ้างสารพัด"
1300006-3 = "zzZ"
1300006-4 = "งืม งืม... zzZ"
1300006-5 = "zZZ..."
1300006-6 = "คาริน... นั่นมันพุดดิ้งของรุ่นพี่เนรุ... ห้าม... กินนะ..."
1300006-7 = "[s] ปลุกให้ตื่น"
1300006-8 = "งืม?"
1300006-9 = "[s] \"ตื่นได้แล้ว\""
1300006-10 = "...หืม?"
1300006-11 = "อ๊ะ?! นะ... นายท่าน?!"
1300006-12 = "นายท่านเนี่ย! เข้ามาในห้องที่เด็กสาวนอนหลับอยู่ได้ยังไงคะ?"
1300006-13 = "แต่ว่า... ถ้าเป็นนายท่านแล้วล่ะก็... ฮุฮุ"
1300006-14 = "...เอ๋? หรือว่านี่ไม่ใช่ความฝัน?"
1300006-16 = "ฮ้าว~ ได้นอนเต็มอิ่มเลย~"
1300006-17 = "คะ? นี่ไม่ใช่เวลามาพูดว่า \"ฮ้าว~ ได้นอนเต็มอิ่มเลย~\" เหรอคะ? อืม... ก็อาจจะใช่..."
1300006-18 = "ตอนนี้เหมือนเราโดนมัดติดกันเลยค่ะ"
1300006-19 = "จะ... จะว่าไปแล้ว... ฉัน..."
1300006-21 = "เมืองแถวๆ มิลเลเนียม"
1300006-22 = "(ไม่กี่ชั่วโมงก่อนหน้านี้)"
1300006-23 = "ที่นี่คือตึกของผู้ว่าจ้าง..."
1300006-24 = "ที่สั่งให้คนไปขโมยข้อมูลส่วนตัวแล้วเปิดเผยความลับค่ะ"
1300006-25 = "การเผชิญหน้าองค์กรใหญ่ๆ...อย่างไคเซอร์ คอร์เปอเรชั่นไม่ใช่เรื่องง่ายเลยค่ะ..."
1300006-26 = "ฉันจะลองลักลอบเข้าไปก่อนค่ะ นายท่านช่วยคอยการติดต่อกลับมาด้วยนะคะ"
1300006-30 = "หากฉันยังไม่ออกมา หรือยังไม่ติดต่อกลับมา... ก็รบกวนด้วยนะคะ"
1300006-32 = "สำนักงานลึกลับ"
1300006-33 = "อืม..."
1300006-34 = "ฉันจะบอกว่า ถ้าฉันออกมาช้า ให้ติดต่อขอความช่วยเหลือจาก C&C ต่างหาก"
1300006-35 = "ไม่คิดเลยค่ะว่านายท่านจะบุกเข้ามาช่วยจนฉันถูกเปิดเผยตัว ตอนนี้เราลงเรือลำเดียวกันแล้วค่ะ"
1300006-36 = "ฮุฮุ ฉันไม่ได้โทษนายท่านหรอกค่ะ"
1300006-37 = "กลับดีใจซะอีกค่ะที่นายท่านเข้ามาช่วยฉัน"
1300006-38 = "แต่ดูบรรยากาศข้างนอกแล้ว นี่เวลาก็ผ่านไปนานแล้ว แถมเรายังอยู่บนอาคารที่ค่อนข้างสูงเลยด้วย"
1300006-39 = "ฉันไม่มีทางเลือกอื่นนอกจาก... ใช้ระเบิดค่ะ"
1300006-40 = "ถ้าโชคดีเราก็อาจจะมีชีวิตรอดออกไปได้ค่ะ"
1300006-41 = "อ๊ะ จริงสิ... นี่อาจจะเป็นอันตรายต่อนายท่านก็ได้..."
1300006-42 = "อืม... รู้สึกผิดขึ้นมาเลยล่ะค่ะ"
1300006-43 = "ทำไมนายท่านต้องมาเสี่ยงอันตรายเพื่อฉันด้วยล่ะ..."
1300006-44 = "ฮือ..."
1300006-45 = "คะ? ไม่เป็นไรงั้นเหรอคะ? มะ... ไม่กลัวที่โดนลักพาตัวเหรอคะ?!"
1300006-46 = "พูดโกหกเพราะอยากจะปลอบฉันใช่มั้ยคะ?"
1300006-47 = "ฮุฮุ... รู้สึกดีจัง"
1300006-48 = "จริงๆ แล้วฉันก็ไม่ได้กลัวมากหรอกค่ะ"
1300006-49 = "อยากรู้ว่าเพราะอะไรน่ะเหรอคะ?"
1300006-50 = "อาจจะเพราะว่าได้อยู่กับนายท่าน แล้วก็..."
1300006-51 = "ปกติในเวลาแบบนี้..."
1300006-53 = "(ตู้มมมม!)"
1300006-54 = "นะ... เนรุมา!"
1300006-55 = "หนีเร็ว! พวก C&C มาแล้ว!!"
1300006-56 = "ซวยแล้ว! เมดที่ใส่แว่นเมื่อกี้คือ C&C จริงๆ เหรอ?!"
1300006-57 = "บอกแล้วไงว่าอย่าไปยุ่งกับพวกเมด... โธ่เอ๊ยยย!"
1300006-58 = "......"
1300006-59 = "ปกติแล้วจะเป็นแบบนี้ค่ะ"
1300006-60 = "สมาชิกในชมรมจะเปิดประตูนี้แล้วบอกว่า 'หึหึ ไม่ปล่อยไปง่ายๆ แบบนี้หรอก'..."
1300006-61 = "อ๊ากก! ไม่ยอมถูกเล่นงานง่ายๆ แบบนี้หรอก! ระเบิดชั้นที่มีตัวประกันเลย!"
1300006-62 = "!?"
1300006-63 = "มะ... ไม่ได้นะ! เดี๋ยวก่อน!"
1300006-65 = "(ตู้มมม!)"
1300006-66 = "นายท่าน!!"
1300006-73 = "นายท่าน! นายท่าน!"
1300006-75 = "เป็นยังไงบ้างคะนายท่าน?!"
1300006-76 = "[s] \"ฮ้าว... ได้นอนเต็มอิ่มเลย~\""
1300006-77 = "มันใช่เวลาพูดแบบนี้ซะทีไหนล่ะคะ!"
1300006-78 = "เฮ้อ... แต่ยังไงก็เถอะ..."
1300006-79 = "ถือว่ายังโชคดีนะคะที่ระเบิดไม่ได้รุนแรงมาก"
1300006-80 = "ดีที่มีราวข้างบันไดอยู่ข้างล่าง ถึงจะเจ็บตัวนิดหน่อยแต่เราก็ยังปลอดภัยค่ะ"
1300006-81 = "แล้วก็..."
1300006-82 = "ตอนที่ตกลงมา นายท่านเป็นเบาะให้ฉันด้วยค่ะ..."
1300006-83 = "ฮุฮุ... สมกับที่เป็นนายท่านของฉัน..."
1300006-84 = "ขอบคุณที่ปกป้องฉันนะคะ"
1300006-85 = "ต่อไปก็ฝากเนื้อฝากตัวด้วยค่ะ"

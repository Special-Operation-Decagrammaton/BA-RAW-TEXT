[translation]
10010045-1 = "Episode 4;Battle of the Slum Fortress Part 2"
10010045-3 = "What's with these punks?!"
10010045-5 = "Fall back! Retreat!"
10010045-11 = "The battle with the Helmet Gangsters went smoother than I expected after our surprise attack."
10010045-13 = "Ha! Look at 'em scurry like cockroaches! Serves them right!"
10010045-14 = "Y-Yoshimi... Remember we're supposed to be the good guys.#nYou don't have to be so mean."
10010045-15 = "Leave her be. The villain role suits her."
10010045-16 = "Hahahaha!"
10010045-20 = "Anyway, the food truck and owner should be safe now. Mission accomplished."
10010045-21 = "And it's all thanks to our commander. Thank you, Sensei!"
10010045-22 = "[s1] \"Great job, everyone.\"\n[s2] \"I'm glad it ended well.\""
10010045-23 = "Oh."
10010045-24 = "Oh."
10010045-25 = "There is one other matter."
10010045-33 = "...?"
10010045-34 = "C-Can I help you? Why are you staring at me like that?"
10010045-35 = "I've never seen anyone fight the way you do. Are all Sisters like that?"
10010045-36 = "L-Like what? What do you mean by that?"
10010045-37 = "She doesn't mean any offense by it. Natsu is always inquisitive about stuff like that."
10010045-38 = "Basically, she's just trying to say that you looked cool out there."
10010045-39 = "Oh, totally! It was awesome the way you shredded the front door to bits with your machine gun!"
10010045-40 = "You account for a large percentage of our unit's core strength.#nYou were practically a tank..."
10010045-42 = "A-A tank?! Me? No, I wouldn't go that far... I was just desperate to help because we all wanted the cake."
10010045-43 = "Is that really how you all see me?!"
10010045-44 = "*sigh* Natsu."
10010045-45 = "What? I meant it as a compliment."
10010045-46 = "As such, I believe the spoils should go to the Siege—I mean, Sister."
10010045-54 = "Huh? Is this...?"
10010045-55 = "The Miracle 5,000. It's the only one left."
10010045-56 = "This is what we all came here for. As much as we would all like it for ourselves, you seem to have a greater cause you were fighting for."
10010045-57 = "I believe that's why you played such a large role in our battle."
10010045-58 = "Does anyone disagree?"
10010045-60 = "I don't!"
10010045-61 = "Besides, now that the truck and owner have been freed, it's only a matter of time before they get back to baking as usual. We can wait."
10010045-62 = "Yeah, it's no big deal. We already waited for five days. What's one more?"
10010045-64 = "Y-You guys..."
10010045-65 = "No need for that. It won't be necessary."
10010045-66 = "Huh?"
10010045-71 = "And you are...?"
10010045-72 = "You all swung the sword of justice down on those hooligans, so now I'm champing at the bit to get back to baking."
10010045-73 = "The gales of freedom have never felt so exhilarating!"
10010045-77 = "In fact, I'm feeling generous today. I'll bake as many as you want!"
10010045-78 = "For one day only, the Miracle 5,000 is anything but limited!"
10010045-87 = "..."
10010045-88 = "Fitting."
10010045-89 = "It truly is a miracle."

[translation]
10010045-1 = "第4話;前往貧民窟的要塞（２）"
10010045-3 = "這，這是怎麼回事啊！"
10010045-5 = "總之先撤退吧！快逃！"
10010045-11 = "（也許是被突如其來的襲擊嚇了一跳，頭盔團接二連三地逃走了）"
10010045-13 = "啊哈哈，是你們活該！"
10010045-14 = "喜美醬，那句台詞超像不良少女的……"
10010045-15 = "也沒什麼不好吧，反正很適合他。"
10010045-16 = "啊哈哈哈哈哈哈！！之後別再回來了！"
10010045-20 = "唔哇，整個得意起來了……#n總之順利找回老闆跟卡車了，這樣事情就解決了吧。"
10010045-21 = "老師，非常謝謝你！"
10010045-22 = "[s1]「不客氣，大家辛苦了。」\n[s2]「幸好大家也沒受什麼傷。」"
10010045-23 = "啊。"
10010045-24 = "啊。"
10010045-25 = "這麼說來……"
10010045-33 = "……？"
10010045-34 = "那個，怎麼了嗎？#n那樣一直盯著我看……"
10010045-35 = "我好像還是第一次看到修女同學認真作戰的樣子。真厲害呢。"
10010045-36 = "真，「真厲害」指的是……！？"
10010045-37 = "抱歉，他其實沒有惡意。"
10010045-38 = "大概只是想說一聲「真帥啊」之類的吧。"
10010045-39 = "啊，說的沒錯！一開始就用機關槍把正門轟開的時候真是太痛快了！"
10010045-40 = "而且事實上也擔任了我們相當程度的戰力呢。光是一個人就像戰車一樣的感覺。"
10010045-42 = "戰，戰車！？#n不是，怎麼會，我只是……！"
10010045-43 = "……咦？仔細想想，那真的可以當成是稱讚的話嗎！？"
10010045-44 = "……夏。"
10010045-45 = "嗯，對不起。我只是想稱讚你而已。"
10010045-46 = "不過不管怎麼說……這個勳章就由修女同學收下吧。"
10010045-54 = "那個，這是……"
10010045-55 = "「Miracle5000」，這是最後一個。"
10010045-56 = "我們當然也很想吃，但修女同學看起來似乎還有除此之外的某些隱情。"
10010045-57 = "再加上看見了你剛才戰鬥的英姿……"
10010045-58 = "我想大家應該都會一致同意的……對吧？"
10010045-60 = "我贊成！"
10010045-61 = "反正老闆已經救出來了，之後也還能吃到吧。其實也沒必要那麼急。"
10010045-62 = "而且都已經忍五天了，再多忍一天也無所謂！"
10010045-64 = "大，大家……"
10010045-65 = "……不，沒有那個必要。"
10010045-66 = "……？"
10010045-71 = "那個，你是……？"
10010045-72 = "……畢竟是多虧大家才能重獲自由啊！"
10010045-73 = "面對現在這種狀況，身為老闆的我也不能袖手旁觀。#n況且最近都做不了蛋糕，早就讓我覺得心癢難耐了……"
10010045-77 = "好，現在就開始做蛋糕吧！"
10010045-78 = "數量不限，做到材料用完為止！來個「Miracle5000」派對吧！"
10010045-87 = "……"
10010045-88 = "……嘻嘻。"
10010045-89 = "這正是[ruby=奇蹟]「Miracle」[/ruby]……對吧。"

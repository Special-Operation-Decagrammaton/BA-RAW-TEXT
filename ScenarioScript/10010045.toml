[translation]
10010045-1 = "ตอนที่ 4;การต่อสู้ในย่านแออัด 2"
10010045-3 = "ฮะ... เฮือก นี่มันอะไรกันเนี่ย...! เจ้านักเรียนพวกนี้!?"
10010045-5 = "ถอยก่อน! ถอนกำลัง!!"
10010045-11 = "(การต่อสู้จบลงอย่างง่ายดายกว่าที่คิด แก๊งหมวกกันน็อกตกใจกับการแข็งข้อที่คาดไม่ถึงของนักเรียน แล้วหนีเตลิดไป)"
10010045-13 = "ฮ่าฮ่า! ทำเป็นเก่ง! โดนไปนิดเดียวก็เผ่นแล้ว!"
10010045-14 = "ยะ... โยชิมิจัง... นี่มันบทพูดของอันธพาล..."
10010045-15 = "ก็เหมาะสมดีแล้วนี่ ปล่อยไปเถอะ"
10010045-16 = "ฮ่ะฮ่ะฮ่ะฮ่า!"
10010045-20 = "เราได้รถบรรทุกคืนมาและช่วยคุณลุงเจ้าของร้านได้อย่างปลอดภัยแล้ว ภารกิจเสร็จสิ้น!"
10010045-21 = "เพราะได้คุณครูมาช่วยยังไงล่ะคะ... ขอบคุณนะคะคุณครู"
10010045-22 = "[s1] \"ทุกคนทำได้ดีมาก\"\n[s2] \"โชคดีที่จบอย่างปลอดภัยนะ\""
10010045-23 = "อืม..."
10010045-24 = "อืม..."
10010045-25 = "จะว่าไปแล้ว..."
10010045-33 = "...?"
10010045-34 = "คะ...? มีอะไรเหรอคะ? ทำไมจู่ๆ ก็มองฉันแบบนี้..."
10010045-35 = "เอ่อ... ก็แค่.. เพิ่งเคยเห็นซิสเตอร์ต่อสู้เป็นครั้งแรกน่ะ ปกติเป็นแบบนี้กันทุกคนไหมนะ..."
10010045-36 = "แบบนี้...!? เป็นแบบนี้ หมายถึงแบบไหนเหรอคะ...?"
10010045-37 = "อ่า ต้องขออภัยด้วยจริงๆ ยัยนี่พูดอะไรเพี้ยนๆ แบบนี้เรื่อยเลยค่ะ แต่ก็ไม่ได้มีความหมายไม่ดีหรอกนะคะ..."
10010045-38 = "แค่จะบอกว่าเท่ดีน่ะค่ะ"
10010045-39 = "จริงๆ นะ ตอนที่เห็นฉากใช้ปืนกลกระหน่ำยิงประตู ฉันรู้สึกสะใจมากเลยล่ะ! ความโกรธที่เคยมีจู่ๆ ก็หายไปเลย…!"
10010045-40 = "เพราะคุณซิสเตอร์คือแกนกลางของความแข็งแกร่งไง เมื่อกี๊เหมือนอาวุธโจมตีมากกว่าคนอีกนะ..."
10010045-42 = "อะ... อาวุธโจมตีเหรอคะ!? มะ... ไม่ใช่หรอกค่ะ! ฉันก็แค่ซิสเตอร์ที่มาช่วยเพราะอยากได้เค้ก ไปทำธุระบางอย่างก็เท่านั้น...!"
10010045-43 = "ทุกคนไม่ได้มองภาพลักษณ์ฉันเป็นแบบนั้นหรอกเหรอคะ? จริงเหรอคะ!?"
10010045-44 = "นัตสึ..."
10010045-45 = "ก็ได้ๆ ขอโทษที แต่มันคือคำชมนะ"
10010045-46 = "อืม... การล้อมโจมตีของพวกเราครั้งนี้ คงต้องยกเครดิตให้คุณซิสเตอร์แล้ว"
10010045-54 = "เอ๋.. ทะ... ทุกคนคะ? นี่มัน..."
10010045-55 = "มิราเคิล 5000... แถมเป็นชิ้นสุดท้ายที่เหลืออยู่ด้วย"
10010045-56 = "ทุกคนมาที่นี่เพราะอยากกินเค้กนี้ก็จริง แต่คุณซิสเตอร์บอกว่า 'มีธุระ' ที่ต้องใช้เค้ก \n"
10010045-57 = "แถมยังเป็นใจกลางสำคัญที่สุดในการต่อสู้วันนี้ด้วย..."
10010045-58 = "มีใครที่... ไม่เห็นด้วยไหม?"
10010045-60 = "ฉันเห็นด้วย~"
10010045-61 = "ทั้งรถบรรทุกเค้กทั้งคุณลุงเจ้าของร้านก็ออกมาได้แล้ว อีกหน่อยก็คงมีขายอีก ไม่ต้องรีบกินวันนี้ก็ได้"
10010045-62 = "ไม่เป็นไรหรอก! อดทนมาได้ตั้ง 5 วันแล้ว แค่อีกสักวันจะเป็นอะไรไป!"
10010045-64 = "ทะ... ทุกคนคะ"
10010045-65 = "ไม่เป็นไร ไม่ต้องทำอย่างนั้นหรอก"
10010045-66 = "...? หืม?"
10010045-71 = "คุณคือ...?"
10010045-72 = "ที่ฉันกลับมาได้อย่างปลอดภัยแบบนี้เพราะได้ทุกคนช่วยไว้ จะให้อยู่เฉยๆ คงไม่ได้"
10010045-73 = "เจ้าพวกนั้นไม่ให้ฉันทำเค้กอยู่นานจนคันไม้คันมือไปหมดแล้ว..."
10010045-77 = "ดีเลย! ฟีลมาแล้ว! จะทำเค้กให้กินจนต้องตัดขากันไปข้าง!"
10010045-78 = "วันนี้เค้กมิราเคิล 5000 จะเปิดขายแบบไม่จำกัดจำนวน!"
10010045-87 = "......"
10010045-88 = "ว้าว..."
10010045-89 = "... \"มิราเคิล\" สมชื่อเลยนะ"

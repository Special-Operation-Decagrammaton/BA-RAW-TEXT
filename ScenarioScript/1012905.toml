[translation]
1012905-1 = "閃光未發行動"
1012905-6 = "老師，我在這裡。"
1012905-7 = "[s]「哦，鈴美！你來得正好！」"
1012905-12 = "[ns]「Beautiful。」"
1012905-13 = "請，請不要捉弄我了！"
1012905-14 = "您明明跟我說「穿著符合現場氛圍的服裝會比較好」的……"
1012905-15 = "[s1]「我指的是像我這樣的衣服……」\n[s2]「不過這樣反而更好。」"
1012905-18 = "嗚嗚……"
1012905-23 = "那，那個……請問你是《魔法少女 Heavy Caliber》裡的「Thermite White」嗎？"
1012905-27 = "啊，是的！！#n是這樣沒錯……？"
1012905-28 = "我超喜歡這個角色的！！#n請問可以跟你一起拍照嗎！？"
1012905-29 = "拍，拍照是嗎？"
1012905-30 = "[s]「自然一點，自然一點！」"
1012905-31 = "這，這樣嗎……？"
1012905-36 = "接下來可以幫我拍嗎！！"
1012905-37 = "我也要！！"
1012905-51 = "太感謝了！！我會沖洗出來掛在家裡的！！"
1012905-56 = "這個角色的人氣還真高呢……"
1012905-57 = "[s]「應該是因為鈴美很漂亮的關係吧。」"
1012905-58 = "……我還是專心巡邏吧。"
1012905-59 = "（老師他……又若無其事地說我漂亮……）"
1012905-69 = "喂，你的相機還挺不賴的嘛？借來用一下可以吧？"
1012905-70 = "之後會用快遞寄還給你的，趕快拿來吧。"
1012905-72 = "不，不行！！這是在下重要的相機……！"
1012905-73 = "我說可以就可以！"
1012905-78 = "看來那些就是來妨礙活動的人呢。"
1012905-79 = "我去去就回。"
1012905-86 = "到此為止了！"
1012905-91 = "怎麼？是Cosplay嗎？"
1012905-92 = "想拍照的話就先等著，我搶到相機之後馬上幫你拍。"
1012905-93 = "你剛才說了「搶」對吧！！"
1012905-94 = "借跟搶都差不多啦，混蛋！"
1012905-96 = "原來有兩個人啊。"
1012905-97 = "請你們一起上吧。這樣比較節省時間。"
1012905-98 = "少廢話，吃我的閃光彈吧！！"
1012905-107 = "你，你在做什麼！！#n可惡，這個握力也太誇張了吧！！"
1012905-108 = "閃光彈還在我手上耶！！#n要在手裡爆炸了啦！！！快點放開！！"
1012905-109 = "我來幫你吧。"
1012905-116 = "啊，啊啊啊──！！！！"
1012905-117 = "哇啊！！我的手啊！！"
1012905-118 = "可惡，給我記住！！"
1012905-126 = "請不要隨便使用神聖的閃光彈。"
1012905-132 = "他剛才是徒手把閃光彈捏扁了嗎？"
1012905-133 = "所以才會因為故障而沒有引爆……？"
1012905-134 = "該不會是在演戲吧？"
1012905-136 = "老師，目標已經達成了。我們回去吧。"
1012905-137 = "[s3]「啊，嗯……」\n[s4]「好，好的……」"
1012905-143 = "（之後和鈴美一起離開了公園）"
1012905-144 = "（途中就算被其他太妹們看見，他們也都遠遠地避開了）"

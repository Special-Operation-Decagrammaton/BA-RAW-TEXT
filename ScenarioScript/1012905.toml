[translation]
1012905-1 = "ไฟแฟลชที่ไม่ทำงาน"
1012905-6 = "คุณครู ทางนี้ค่ะ"
1012905-7 = "[s] \"โอ้ สึซึมิ! มาตรงเวลาเลยนะ น่ารักเชียว!\""
1012905-12 = "[ns] \"แต่งตัวน่ารักเชียว\""
1012905-13 = "ยะ... อย่ามาล้อกันสิคะ"
1012905-14 = "ก็คุณครูบอกว่า 'แต่งตัวให้เข้ากับสถานที่' เป็นเรื่องที่ดีนี่นา..."
1012905-15 = "[s1] \"ครูหมายถึงตัวเองน่ะ...\"\n[s2] \"สึซึมิใส่ชุดนี้มาก็ดีนะ แต่ที่ครูพูดน่ะครูหมายถึงตัวเอง...\""
1012905-18 = "อั่ก..."
1012905-23 = "นะ... นั่น... นั่นใช่ <เทอร์ไมต์ ไวต์> จาก <สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์> รึเปล่าคะ?"
1012905-27 = "อ๊ะ ค่ะ! ใช่แล้วค่ะ..."
1012905-28 = "ฉันชอบคุณมากๆ เลยค่ะ!! ขอถ่ายรูปด้วยได้มั้ยคะ?!"
1012905-29 = "ถะ... ถ่ายรูปคู่เหรอคะ?"
1012905-30 = "[s] \"ทำตัวสบายๆ นะ!\""
1012905-31 = "คะ...? เข้าใจแล้วค่ะ..."
1012905-36 = "ถ้างั้นฉันขอถ่ายด้วยคนนะคะ!!"
1012905-37 = "ฉันด้วยค่ะ!!"
1012905-51 = "ขอบคุณค่ะ!! ฉันจะปริ้นออกมาใส่กรอบติดผนังห้องเลย!!"
1012905-56 = "เป็นตัวละครที่ฮิตมากเลยสินะคะ..."
1012905-57 = "[s] \"อาจเป็นเพราะสึซึมิน่ารักก็ได้นะ\""
1012905-58 = "ขอกลับไปโฟกัสเรื่องการลาดตระเวนก่อนนะคะ..."
1012905-59 = "(คุณครู... จู่ๆ ก็มาชมกันว่าน่ารักอีกแล้ว...)"
1012905-69 = "เอ๋ กล้องสวยดีนี่? ขอยืมหน่อยได้รึเปล่า?"
1012905-70 = "เอาไว้จะเรียกแกร๊บไปส่งคืนให้แล้วกัน เอามานี่"
1012905-72 = "มะ... ไม่ได้นะ! นี่เป็นกล้องที่สำคัญกับข้าน้อยมากนะ...!"
1012905-73 = "ต้องได้เซ่!"
1012905-78 = "นั่นพวกกลุ่มคนที่ก่อกวนในงานนี่คะ"
1012905-79 = "เดี๋ยวฉันจะรีบกลับมานะคะ"
1012905-86 = "หยุดนะคะ!"
1012905-91 = "อะไรน่ะ? แต่งคอสเพลย์เหรอ?"
1012905-92 = "ถ้าอยากถ่ายรูปก็รอแล้วกัน เดี๋ยวฉันจะเอามาคืนให้ทีหลัง"
1012905-93 = "คุณเพิ่งแย่งกล้องข้าน้อยไปนะ!!"
1012905-94 = "แย่งกับยืมมันก็เหมือนกันนั่นแหละ!"
1012905-96 = "มีสองคนสินะคะ"
1012905-97 = "ฉันจะซัดให้หมอบในรวดเดียวเลยค่ะ แบบนั้นน่าจะเร็วกว่า"
1012905-98 = "เลิกพูดอะไรไร้สาระแล้วเอาระเบิดแสงไปกินซะ!!"
1012905-107 = "อะ... อะไรน่ะ!! อึก ทำไมแรงเยอะอะไรขนาดนี้เนี่ย!!"
1012905-108 = "ถือระเบิดแสงอยู่ด้วยนี่!! ระเบิดในมือเลยเรอะ!!! ปล่อยนะ!!"
1012905-109 = "เดี๋ยวฉันจะช่วยเองค่ะ"
1012905-116 = "อ๊าาาา!!!!"
1012905-117 = "อ๊ากกก!! มือฉัน!!"
1012905-118 = "หนอย ฝากไว้ก่อนเถอะ!!"
1012905-126 = "หวังว่าจะไม่ใช้ระเบิดแสงศักดิ์สิทธิ์มั่วซั่วอีกนะคะ"
1012905-132 = "เมื่อกี้จับระเบิดแสงด้วยมือเปล่าเลยเรอะ?"
1012905-133 = "หรือว่าระเบิดด้าน...?"
1012905-134 = "หรือนี่เป็นการแสดงอะไรสักอย่างรึเปล่า?"
1012905-136 = "คุณครู เรียบร้อยแล้วค่ะ เรากลับกันเถอะค่ะ"
1012905-137 = "[s3] \"อ้อ... อื้อ...\"\n[s4] \"ระ... รับทราบ...\""
1012905-143 = "(จากนั้นคุณครูกับสึซึมิก็ออกมาจากสวนสาธารณะด้วยกัน)"
1012905-144 = "(กลุ่มนักเลงก็คอยเลี่ยงไม่เข้ามาใกล้ทั้งสองคนอีก)"

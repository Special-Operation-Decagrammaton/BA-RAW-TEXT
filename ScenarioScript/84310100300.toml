[translation]
84310100300-8 = "นั่นมัน..."
84310100300-14 = "แปด...! เก้า...!"
84310100300-15 = "อะ... อึก... กะ... เก้า...!!"
84310100300-16 = "เก้าครึ่ง!"
84310100300-21 = "เก้าเศษสามส่วนสี่!!"
84310100300-22 = "เก้าเศษสามส่วนสี่ กับอีกนิด...!"
84310100300-26 = "หืม? ว่าไงนะ...??"
84310100300-28 = "อะไรกัน...?! "
84310100300-29 = "แล้วเมื่อไรจะถึงสิบสักที!? เก้าแล้วมันก็ควรสิบเลยสิ!!"
84310100300-30 = "ปกติแล้วการเทรนจะเริ่มจากเก้าค่ะ"
84310100300-31 = "หรือว่าเหนื่อยแล้วคะ? ถ้ายังไหวอยู่ เราก็มาเริ่มออกกำลังกายกันเลยค่ะ! อดทนอีกนิดนะคะ!!"
84310100300-32 = "สาม...!!"
84310100300-33 = "สี่...!!"
84310100300-35 = "ทำไมเก้าเศษสามส่วนสี่แล้วถึงกลับมาสามล่ะ!!!! นับเลขแปลกๆ หรือเปล่า!!"
84310100300-36 = "บ้าจริง มาตกหลุมพรางที่น่ากลัวได้ยังไง! นี่มันนรกชัดๆ ฉันปวดตัวไปหมดแล้ว!!"
84310100300-38 = "...???"

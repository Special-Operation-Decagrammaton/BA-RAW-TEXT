84310100300-32 = "三……！！"
84310100300-33 = "四……！！"
84310100300-35 = "為什麼九的一半的一半後面是三啊！！！！#n數字的概念也太詭異了吧！！"
84310100300-36 = "該死，我居然會掉進這可怕的陷阱！#n這裡是地獄啊，無限地獄！！"

[translation]
1011506-1 = "#title;남겨진 것, 이어지는 것"
1011506-2 = "3;레이;01\n#3;a\n#3;greeting\n#3;closeup\n#wait;2000"
1011506-3 = "3;레이;09\n#3;closeup\n#3;stiff\n#wait;1500"
1011506-4 = "3;레이;12\n#3;em;[한숨]\n#3;closeup\n#wait;1500"
1011506-5 = "3;레이;09;우아……. 모아 놓고 보니 엄청나게 많네요.\n#3;a"
1011506-6 = "3;레이;07;실밥이 터진 야구공, 찢어진 글러브, 휘어진 알루미늄 배트……."
1011506-7 = "3;레이;09;이건 뭐야. 흙 얼룩이 지워지지 않게 된 유니폼……? 아니, 이런 건 좀 스스로 하는 데까지 해 보고 나서…….\n#3;em;[세로선]\n#3;greeting"
1011506-8 = "3;레이;06;애초에 흙이 깊이 묻은 유니폼은, 손빨래로 세탁하는 것밖에 방법이 없는데……."
1011506-9 = "3;레이;12;하아. 일단 장비 위주로 수선 물품의 리스트를 작성해 봐야겠네요. \n#3;em;[한숨]"
1011506-10 = "[ns] \"나도 좀 도와줄게.\""
1011506-11 = "3;레이;04;네? 서, 선생님이요? 그렇지만 이건 저희 밀레니엄 야구부가 할 일이고, 그중에서도 오늘은 제가 당번이고…….\n#3;em;[?]"
1011506-12 = "#st;[0,0];instant;1;"
1011506-13 = "#clearST"
1011506-14 = "#wait;1000"
1011506-15 = "3;레이;02\n#3;em;[!]\n#wait;1000"
1011506-16 = "3;레이;08;그렇다고 할까, 벌써 분류를 시작하셨잖아요? 기, 기다려 주세요! 할 거면 저도 같이–\n#3;m2\n#3;jump"
1011506-17 = "#all;hide"
1011506-18 = "3;레이;01\n#3;a\n#wait;1000"
1011506-19 = "3;레이;01;이 글러브의 찢어진 각도와 입사각, 그리고 캐치 순간에 발생했을 것으로 보이는 충돌에너지의 예상치를 대입하여 역산해 보면……!\n#3;em;…"
1011506-20 = "[s] \"역산해 보면……?\""
1011506-21 = "3;레이;05;이건, 플라이 볼이 아니라 직선타를 잡다가 찢어진 글러브일 거예요!\n#3;em;[!]"
1011506-22 = "3;레이;01;플라이 볼은 결국 중력 가속도로 떨어지는 공이다 보니, 종단 속도에 한계가 있기 마련이거든요."
1011506-23 = "3;레이;11;그 정도로는 이렇게 크고 인상적인 흔적을 남길 수 없죠.\n#3;em;[재잘]"
1011506-24 = "#st;[0,0];instant;1;"
1011506-25 = "#clearST"
1011506-26 = "3;레이;14\n#3;greeting\n#wait;1000"
1011506-27 = "3;레이;14;보세요. 엄지손가락과 집게손가락 사이를 채워 주는 부위인 웹(web)이, 가죽 끈인 레이스(Lace)째로 뜯겨 나가 있잖아요?"
1011506-28 = "3;레이;11;분명 엄청나게 잘 맞은 직선타였을 거예요. 방향만 수비수 쪽이 아니었다면 그대로 쭉 뻗은 안타가 되었을지도 몰랐겠네요.\n#3;em;[음표]"
1011506-29 = "#all;hide"
1011506-30 = "3;레이;99\n#3;a\n#3;closeup\n#wait;1000"
1011506-31 = "3;레이;99;이 야구공의 실밥이 뜯어진 개수와 위치를 세어 보니…….\n#3;closeup"
1011506-32 = "3;레이;02;분명, 각도 큰 스위퍼를 던지다가 실밥이 상한 걸 거예요!\n#3;closeup\n#3;em;[!]"
1011506-33 = "[s] \"스위퍼?\""
1011506-34 = "3;레이;13;슬라이더라는 변화구의 일종이에요. 그중에서도 옆으로 휘는 횡 슬라이더의 일종이죠.\n#3;a\n#3;em;[재잘]"
1011506-35 = "3;레이;10;기존 슬라이더의 포심 그립과 달리 투심 그립으로 던지는 게 특징인데…… 횡적인 무브먼트가 엄청나게 중요하거든요!"
1011506-36 = "3;레이;11;잘 꺾인 스위퍼는 타자가 커트하기도 힘든 바깥쪽으로 흘러 나가버리곤 해서, 자연스럽게 헛스윙률이 높아지게 되고요!\n#3;hophop"
1011506-37 = "3;레이;10;그거 아세요? 세이버메트릭스의 통계 중 피치 밸류에서, 슬라이더는 단 한 번도 1위의 자리에서 내려온 적이 없어요!"
1011506-38 = "[s1] \"그건 정말 대단한데…….\"\n[s2] \"밀레니엄 야구부에 그런 구종을 던질 수 있는 투수가 있었어?\""
1011506-39 = "#wait;100"
1011506-40 = "#wait;100"

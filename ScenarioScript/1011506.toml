[translation]
1011506-1 = "สิ่งที่ยังคงอยู่ สิ่งที่ดำเนินต่อไป"
1011506-5 = "เฮ้อ... พอเอามารวมกันก็มีเยอะเลยนะเนี่ย"
1011506-6 = "ทั้งลูกเบสบอลที่ด้ายหลุด ถุงมือขาดๆ ไหนจะไม้อะลูมิเนียมงอๆ นี่อีก..."
1011506-7 = "แล้วนี่อะไรกัน? ชุดกีฬาที่เปื้อนดินจนเอาไม่ออก...? ทำไมฉันต้องเป็นคนซักให้ล่ะ คนใส่ทำไมไม่รับ#nผิดชอบ..."
1011506-8 = "ชุดที่เปื้อนดินเยอะๆ แบบนี้ต้องซักมือเสียด้วยสิ..."
1011506-9 = "เฮ้อ ฉันคงต้องเขียนรายการสิ่งที่ต้องซ่อมแซม โดยเน้นพวกอุปกรณ์กีฬาก่อนแล้วละค่ะ "
1011506-10 = "[ns] \"ครูจะช่วยอีกแรงนะ\""
1011506-11 = "คะ? คะ... คุณครูเหรอคะ? แต่นี่เป็นงานของชมรมเบสบอลมิลเลเนียมนะคะ แล้ววันนี้ก็เป็นเวร#nของฉันด้วย..."
1011506-16 = "คุณครูเริ่มแยกประเภทอุปกรณ์แล้วเหรอคะ? ระ... รอฉันด้วยสิ! ให้ฉันทำด้วยค่ะ"
1011506-19 = "ถ้าเราเอาองศากับมุมตกกระทบของรอยขาด และค่าพลังงานของการชนตอนที่รับลูกได้มาคำนวณย้อน#nกลับ...!"
1011506-20 = "[s] \"ก็จะได้...?\""
1011506-21 = "ได้รู้ว่าถุงมืออันนี้ขาดระหว่างรับลูกแนวตรง ไม่ใช่ลูกฟลายที่ลอยขึ้นค่ะ!"
1011506-22 = "ฟลายบอลเป็นลูกที่ตกลงมาด้วยความเร่งของแรงโน้มถ่วง ความเร็วสุดท้ายก็เลยมีขีดจำกัดค่ะ"
1011506-23 = "เพราะงั้นมันจึงทิ้งร่องรอยใหญ่ๆ ที่น่าประทับใจแบบนี้ไม่ได้หรอกค่ะ"
1011506-27 = "ดูสิคะ พื้นที่ระหว่างนิ้วโป้งและนิ้วชี้มันฉีกออกจนเห็นสายหนังเลยค่ะ"
1011506-28 = "ต้องเป็นลูกแนวตรงที่พุ่งมาเต็มแรงแน่ๆ ถ้าลูกไม่ได้มาในทิศของผู้ตั้งรับ ก็น่าจะเป็นลูกที่ตีได้อย่าง#nสวยงามเลยค่ะ"
1011506-31 = "ถ้าดูจากตำแหน่งและจำนวนรอยขาดของด้ายที่ลูกเบสบอลนี้ ก็จะรู้ได้ว่า..."
1011506-32 = "ด้ายขาดเพราะขว้างลูกสวีปเปอร์องศาสูงค่ะ!"
1011506-33 = "[s] \"ลูกสวีปเปอร์?\""
1011506-34 = "ลูกสวีปเปอร์เป็นประเภทหนึ่งของลูกสไลเดอร์ที่เปลี่ยนทิศทาง เป็นลูกสไลเดอร์ที่โค้งลงด้านข้างแบบ#nกว้างน่ะค่ะ"
1011506-35 = "มันแตกต่างจากลูกสไลเดอร์ทั่วไปตรงการจับลูกให้เป็นแบบทูซีม (Two-seam) แทนที่จะเป็นโฟร์ซีม (Four-seam)... ซึ่งจะโค้งออกด้านข้างอย่างแรงค่ะ"
1011506-36 = "ลูกสวีปเปอร์ที่โค้งดีๆ จะออกไปด้านข้างจนทำให้แบตเตอร์ตีได้ยาก พอเจอลูกแบบนี้ก็เลยตีไม่โดน#nเอาดื้อๆ ค่ะ!"
1011506-37 = "คุณครูรู้หรือเปล่าคะ? ในบรรดาสถิติของเซเบอร์เมตริกส์แล้ว ลูกสไลเดอร์ครองอันดับ 1 ของสถิติลูกที่#nขว้างได้อย่างมีประสิทธิภาพที่สุดเลยนะคะ แล้วก็ไม่เคยตกอันดับแม้แต่ครั้งเดียวด้วย!"
1011506-38 = "[s1] \"แล้วในชมรมมีพิชเชอร์ที่ขว้างลูกแบบนั้นได้หรือเปล่า?\"\n[s2] \"มีพิชเชอร์คนไหนในชมรมที่ขว้างลูกแบบนั้นได้มั้ย?\""
1011506-41 = "อ่า"
1011506-42 = "..."
1011506-43 = "น่าจะได้แต่หุ่นยนต์พิชเชอร์ & แบตเตอร์ของมิลเลเนียมน่ะค่ะ..."
1011506-46 = "ส่วนไม้ตีอะลูมิเนียมที่งออันนี้ คุณครูว่ามันไม่น่าสงสัยเหรอคะ?"
1011506-47 = "น่าสงสัยตรงไหนน่ะเหรอคะ? ถ้าเป็นความเสียหายระหว่างซ้อมตีลูก ตรงนี้ไม่มีทางงอแบบนี้หรอกค่ะ!"
1011506-48 = "ถ้าคำนวณความเค้นกับจุดที่แรงกระทำต่อวัตถุ จะรู้ว่าตรงนี้ไม่ใช่ความเสียหายที่เกิดเมื่อตีลูกค่ะ! หรือว่าแบตเตอร์จะเหวี่ยงไม้แบบแผลงๆ นะ?"
1011506-52 = "แต่ที่เป็นไปได้มากกว่านั้นก็คือ แบตเตอร์เดินลากไม้ไปกับพื้นแล้วสะดุดล้มเข้า ไม้ก็เลยงอแบบนี้ค่ะ..."
1011506-53 = "ไม่ได้การละ ฉันต้องไปบอกกัปตันทีมว่าให้ใช้อุปกรณ์ถนอมๆ หน่อยแล้วละค่ะ!"
1011506-54 = "[s3] \"แต่ละค่าที่พูดมา ครูเหมือนเพิ่งเคยได้ยินเป็นครั้งแรกเลย\"\n[s4] \"แต่ละค่าที่พูดมา นี่สินะเด็กมิลเลเนียม...\""
1011506-57 = "คะ? หมายถึงอะไรเหรอคะ คุณครู?"
1011506-58 = "อ้อ หมายถึงที่ฉันวิเคราะห์อุปกรณ์กีฬาในทางพลวัตสินะคะ แต่นั่นเป็นเรื่องปกติในมิลเลเนียมนะ?"
1011506-59 = "คุณครู? ทำไมถึงจ้องฉันด้วยสีหน้าที่บอกว่าเข้าใจทุกอย่างแล้วล่ะคะ...?"
1011506-61 = "อ๊ะ นี่มัน...!"
1011506-67 = "ไม่ใช่ของที่จะส่งไปซ่อมนี่นา พวกรุ่นพี่นี่ก็ จริงๆ เลย..."
1011506-68 = "[ns] \"ลูกเบสบอลนี้มีอะไรเหรอ?\""
1011506-69 = "..."
1011506-70 = "ลูกเบสบอลนี้เหรอคะ..."
1011506-75 = "― [log=레이]นี่คือลูกที่ฉันคว้าได้เป็นครั้งแรก...[/log][wa:2110] "
1011506-76 = "― [log=레이]มันเป็นลูกโฮมรันในตอนนั้นค่ะ[/log][wa:2580] "
1011506-79 = "― [log=레이]หลังจากเริ่มเล่นเบสบอลจริงจัง[/log][wa:680] "
1011506-80 = "― [log=레이]ฉันก็พกติดตัวตลอดเลยค่ะ[/log][wa:1020] "
1011506-83 = "― [log=레이]โฮมรันที่เห็นตอนนั้น...[/log][wa:850] "
1011506-84 = "― [log=레이]ฉันคิดว่าอยากตีแบบนั้นให้ได้สักครั้งค่ะ[/log][wa:4310] "
1011506-87 = "― [log=레이]ตอนนี้ [/log][wa:1540] "
1011506-88 = "― [log=레이]ฉันเก็บมันไว้อย่างดีในตู้ล็อกเกอร์ค่ะ[/log][wa:1220] "
1011506-91 = "― [log=레이]ตอนที่เหมือนจะถอดใจ ถ้าได้เห็นลูกเบสบอลนี้[/log][wa:1970] "
1011506-94 = "― [log=레이]มันจะทำให้ฉันกลับมามีความตั้งใจแรกอีกครั้ง... ฉันเลยได้กำลังใจค่ะ[/log][wa:1490] "
1011506-95 = "― [log=레이]มันเป็นลูกเบสบอลล้ำค่า... เหมือนเครื่องรางเลยค่ะ[/log][wa:3460] "
1011506-99 = "[ns] \"เป็นลูกเบสบอลแห่งความทรงจำสินะ\""
1011506-100 = "น่าทึ่งใช่มั้ยล่ะคะ คุณครู?"
1011506-101 = "ถ้าวิเคราะห์ในทางวัสดุศาสตร์ มันก็แค่หนังที่เก่ามากๆ กับด้าย 108 เส้น"
1011506-102 = "ส่วนข้างในก็เป็นเพียงวัสดุกลมๆ ที่ทำจากไม้ก๊อกและแกนยาง"
1011506-103 = "ถึงจะเป็นของธรรมดา แต่แค่ได้เอาออกมาถือแบบนี้ ก็ให้ความรู้สึกที่แสนพิเศษได้..."
1011506-104 = "แล้วยังทำให้ฉันมีความตั้งใจที่จะเล่นเบสบอลอีกครั้งด้วย"
1011506-105 = "[s] \"เพราะงั้นการได้มีของล้ำค่าถึงเป็นสิ่งที่ดีไง\""
1011506-106 = "เป็นอย่างที่คุณครูว่าจริงๆ ค่ะ"
1011506-107 = "ค่ะ เป็นอย่างนั้นเลย..."
1011506-108 = "เอ่อ คุณครูคะ?"
1011506-109 = "เพราะงั้น ฉันเลยหวังว่า..."
1011506-113 = "สักวันหนึ่งฉันจะ... ได้เป็น..."
1011506-114 = "ใครบางคน... ที่มีค่า..."
1011506-115 = "สำหรับคุณครูบ้างนะคะ"
1011506-116 = "[s] \"ก็เป็นแล้วนะ?\""
1011506-117 = "คะ?!?!"
1011506-118 = "[ns] \"ก็เรย์เป็นนักเรียนของครูนี่นา\""
1011506-119 = "..."
1011506-123 = "งั้นเหรอคะ? งั้นสินะคะ แหะๆ แบบนั้นก็ไม่เลวนะคะ"
1011506-124 = "อย่างน้อยก็... ในตอนนี้"
1011506-125 = "ค่ะ 'ในตอนนี้' ค่ะ"

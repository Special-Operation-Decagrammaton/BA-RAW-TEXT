[translation]
1011506-1 = "What Remains, What Continues"
1011506-5 = "Whoa... Now that I've got them all together, there's a LOT of them."
1011506-6 = "One baseball with ripped thread, one torn glove, one bent aluminum bat..."
1011506-7 = "What's this? A uniform with a dirt stain that doesn't come off...? Seriously, they should try hand washing these first..."
1011506-8 = "Everyone knows hand washing is the only way to get this much dirt out..."
1011506-9 = "*sigh* I should start by writing a list of what to repair. Equipment first. "
1011506-10 = "[ns] \"Let me help you with that.\""
1011506-11 = "Hm? S-Sensei? ...Oh no, this is my job. Just standard Millennium Baseball Club grunt work."
1011506-16 = "Hey, are you already sorting them? H-Hold on! If you're going to help, then let's do it together, at least..."
1011506-19 = "Now, based on this glove's tear angle, angle of incidence, and estimated collision energy at the time of the catch..."
1011506-20 = "[s] \"Go on...\""
1011506-21 = "...this glove must've been torn catching a liner, rather than a fly ball."
1011506-22 = "Fly balls' downward acceleration comes from gravity, of course. Which means there's a limit to how fast they can fall."
1011506-23 = "Even at terminal velocity, a falling ball wouldn't leave this much of an impression."
1011506-27 = "Look. You see how the whole leather lace got torn from the web? That's the filler part between the thumb and the index finger."
1011506-28 = "It must've been a clean liner. Probably would've been a base hit, if it hadn't gone straight to the defender."
1011506-31 = "Now, for this one, see all these torn threads?"
1011506-32 = "These must have come from a wide sweeper."
1011506-33 = "[s] \"Sweeper?\""
1011506-34 = "It's a breaking ball, one of the slider types. It curves horizontally."
1011506-35 = "See, the original slider uses a four-seam grip. With the sweeper, it's two-seam. And you've got to get the horizontal movement just right!"
1011506-36 = "If you pull it off, the ball naturally flows toward the outside, where it's harder for the batter to cut. It's great for the whiff rate."
1011506-37 = "You know about sabermetrics pitch-value statistics? Sliders are always number one."
1011506-38 = "[s1] \"That's amazing...\"\n[s2] \"So the Millennium Baseball Club has a pitcher who can throw like that?\""
1011506-41 = "Ah."
1011506-42 = "..."
1011506-43 = "Yes, if you count the Millennium Pitching & Hitting Machine..."
1011506-46 = "Now check out this bat. The bent angle. Kind of suspicious, don't you think?"
1011506-47 = "How so? Well, if it was damaged during the batting process, it would've bent here, not here!"
1011506-48 = "When you run the numbers on the stress and the point of application, the ball just wouldn't have hit that spot! Unless the batter swung at some crazy angle."
1011506-52 = "More likely, they were dragging the bat, fell down, and that's how it got bent."
1011506-53 = "I should ask the captain to remind everyone, they need to take better care of their equipment."
1011506-54 = "[s3] \"'Angle of incidence,' 'stress,' 'point of application'...\"\n[s4] \"You really are a Millennium student, Rei.\""
1011506-57 = "Hm? What do you mean, Sensei?"
1011506-58 = "Oh, you mean like when I use dynamics to analyze the equipment? Yeah, that's par for the course around here, I'd say."
1011506-59 = "You...seem like you understand."
1011506-61 = "Ah, now we have this."
1011506-67 = "This one is not for repair."
1011506-68 = "[ns] \"Is there something special about that ball?\""
1011506-69 = "..."
1011506-70 = "There is, actually..."
1011506-75 = "― [log=레이]This is the first...[/log][wa:2790] "
1011506-76 = "― [log=레이]homerun ball I ever caught.[/log][wa:2620] "
1011506-79 = "― [log=레이]Ever since I started playing, [/log][wa:640] "
1011506-80 = "― [log=레이]I've always kept it with me.[/log][wa:820] "
1011506-83 = "― [log=레이]When I witnessed that first home run...[/log][wa:210] "
1011506-84 = "― [log=레이]I told myself I'd hit one too, someday.[/log][wa:4310] "
1011506-87 = "― [log=레이]Right now...  [/log][wa:1260] "
1011506-88 = "― [log=레이]I have it enshrined in my cabinet.[/log][wa:1340] "
1011506-91 = "― [log=레이]Whenever I feel like I want to give up, I look at it.[/log][wa:1530] "
1011506-94 = "― [log=레이]It reminds me of when I first started. It always lifts my spirits up.[/log][wa:1330] "
1011506-95 = "― [log=레이]...To me, it's both a memento and a good luck charm.[/log][wa:3300] "
1011506-99 = "[ns] \"It's like it holds your precious memories.\""
1011506-100 = "It's funny, isn't it, Sensei?"
1011506-101 = "Scientifically, it's just a small round object."
1011506-102 = "Old leather, with 108 stitches, wrapped around cork and a rubber core."
1011506-103 = "But still, just looking at it makes me feel warm and ready."
1011506-104 = "It picks me up and makes me want to try again."
1011506-105 = "[s] \"It's always great to have something so precious.\""
1011506-106 = "It really is."
1011506-107 = "Really..."
1011506-108 = "Um, Sensei?"
1011506-109 = "You know, um..."
1011506-113 = "I hope...one day, I can be..."
1011506-114 = "...someONE precious."
1011506-115 = "To you, Sensei."
1011506-116 = "[s] \"But you already are.\""
1011506-117 = "What?!!"
1011506-118 = "[ns] \"You're my student, Rei.\""
1011506-119 = "..."
1011506-123 = "Is that so? Well... Heehee. Sure that's good."
1011506-124 = "For now...at least."
1011506-125 = "Yeah. \"For now.\""

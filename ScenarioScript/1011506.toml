1011506-47 = "3;레이;04;어디가 그렇냐고요? 타격 연습 중에 손상이 갔다면, 이 자리가 휘어졌을 리가 없어요!\n#3;em;[?]"
1011506-48 = "3;레이;10;응력과 작용점을 계산해 보면, 이건 절대 공이 맞을 자리가 아니니까요! 아니면 타자가 정말 말도 안 되는 궤도로 배트를 휘둘렀던가요.\n#3;jump\n#3;m3"
1011506-49 = "#st;[0,0];instant;1;"
1011506-50 = "#clearST"
1011506-51 = "3;레이;10\n#3;em;…\n#wait;2500"
1011506-52 = "3;레이;09;하지만 그보다 가능성이 높은 건, 배트를 땅에 끌고 다니다가 넘어져서 휘어지고 만 것이겠죠…….\n#3;em;[한숨]"
1011506-53 = "3;레이;15;안 되겠어요. 다들 장비를 좀 소중히 해 달라고, 주장에게 이야기해 둬야겠어요!"
1011506-54 = "[s3] \"입사각, 충돌에너지, 종단 속도, 응력, 작용점…….\"\n[s4] \"레이도 정말, 밀레니엄 학생이구나…….\""

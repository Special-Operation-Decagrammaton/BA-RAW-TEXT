[translation]
1011506-1 = "留下的，以及延續的"
1011506-5 = "哇……堆積起來還真不少呢。"
1011506-6 = "縫線斷掉的棒球、裂開的手套、變形的鋁棒……"
1011506-7 = "這是什麼！泥巴污漬洗不掉的制服……？#n不是，至少自己先試著洗過再拿來吧……"
1011506-8 = "泥土滲透得很深的制服，本來就只有用手洗才能洗掉啊……"
1011506-9 = "唉，總之先以裝備為主，列出修繕清單吧。"
1011506-10 = "[ns]「我也來幫忙。」"
1011506-11 = "咦？老，老師嗎？#n可是這本來就是我們千年棒球部的工作，而且今天又輪到我值班……"
1011506-16 = "不是，老師怎麼已經開始分類了啊？#n請，請等一下！要做的話我也一起──"
1011506-19 = "從這個手套的撕裂方向、入射角度，還有接球瞬間的碰撞能量代入計算的話……！"
1011506-20 = "[s]「計算的話……？」"
1011506-21 = "這個手套應該是在接直線球時裂開的，而不是接飛球！"
1011506-22 = "因為飛球是受重力加速度的影響而落下，速度相對有限。"
1011506-23 = "所以無法留下這麼大且明顯的的痕跡。"
1011506-27 = "你看，連結拇指與食指之間的網狀部位，連同皮繩都被撕裂了對吧？"
1011506-28 = "這顆球肯定打得非常紮實。#n如果不是飛向守備球員的方向，可能會直接落到外野變成安打。"
1011506-31 = "從這顆棒球縫線脫落的孔數和位置來看……"
1011506-32 = "肯定是投大角度橫掃球時造成的破壞！"
1011506-33 = "[s]「橫掃球？」"
1011506-34 = "是滑球的其中一種，也被稱作橫向滑球哦。"
1011506-35 = "和一般滑球的四縫線握法不同，這種球的特徵是使用二縫線握法投球……#n因為這個球種更注重橫向的位移！"
1011506-36 = "完美的橫掃球會滑向打者難以觸擊的外角，提高揮空的機率！"
1011506-37 = "你知道嗎？#n在賽伯計量學的投球價值統計中，滑球從來不曾離開第一名的寶座哦！"
1011506-38 = "[s1]「那還真厲害呢……」\n[s2]「千年棒球部有能投出那種球的投手嗎？」"
1011506-41 = "呃……"
1011506-42 = "……"
1011506-43 = "千年製的投擊球機器應該能投出來吧……"
1011506-46 = "請看這根鋁棒彎曲的角度。#n不覺得很奇怪嗎？"
1011506-47 = "問我哪裡奇怪？#n如果是在打擊練習的過程中損壞的話，彎曲不可能會出現在這個地方！"
1011506-48 = "從應力和作用點來計算……#n除非打者的揮棒軌道真的荒謬到離譜，不然這絕對不是球會打到的地方！"
1011506-52 = "比較有可能的情況，應該是有人拖著球棒走路，結果不小心跌倒而把球棒折彎了……"
1011506-53 = "我得去跟隊長報告，請他叫大家珍惜裝備才行！"
1011506-54 = "[s3]「入射角、碰撞能量、速度、應力、作用點……」\n[s4]「莉果然是名符其實的千年學生呢……」"
1011506-57 = "咦？這是什麼意思，老師？"
1011506-58 = "啊，你指的是用動力學分析受損裝備嗎？#n這在千年是很稀鬆平常的事哦？"
1011506-59 = "老師？為什麼要用那種好像明白一切的表情看著我……？"
1011506-61 = "啊，這個……！"
1011506-67 = "這又不是要送修的裝備。#n前輩們也真是的……"
1011506-68 = "[ns]「那顆棒球，有什麼特別之處嗎？」"
1011506-69 = "……"
1011506-70 = "這顆棒球……"
1011506-75 = "― [log=레이]這個是我第一次接到的……[/log][wa:3110] "
1011506-76 = "― [log=레이]充滿回憶的全壘打球。[/log][wa:3300] "
1011506-79 = "― [log=레이]剛開始打棒球的時候，[/log][wa:1440] "
1011506-80 = "― [log=레이]我很常把它帶在身邊。[/log][wa:1540] "
1011506-83 = "― [log=레이]希望那天看到的全壘打──[/log][wa:1290] "
1011506-84 = "― [log=레이]總有一天，我也能打出一樣的球。[/log][wa:5270] "
1011506-87 = "― [log=레이]因為現在已經變得破破爛爛的關係，[/log][wa:1180] "
1011506-88 = "― [log=레이]所以就放在置物櫃裡。[/log][wa:2300] "
1011506-91 = "― [log=레이]每當快撐不下去的時候，只要看到這顆球……[/log][wa:2850] "
1011506-94 = "― [log=레이]就有種能找回初心的感覺……可以讓我獲得力量。[/log][wa:3210] "
1011506-95 = "― [log=레이]……這是我，重要的護身符。[/log][wa:4860] "
1011506-99 = "[ns]「真的是顆很珍貴的棒球呢。」"
1011506-100 = "你不覺得很神奇嗎，老師？"
1011506-101 = "明明從物質層面來看，那只不過是老化的皮革和108條縫線……"
1011506-102 = "再往裡面塞進軟木和橡膠芯組成的圓形物體而已。"
1011506-103 = "然而光是把它拿出來看，就能帶給我特別的感覺……"
1011506-104 = "甚至可以讓我鼓起再嘗試一次的勇氣。"
1011506-105 = "[s]「擁有珍貴的寶物，是件幸福的事呢。」"
1011506-106 = "嗯。"
1011506-107 = "確實，是這樣沒錯呢……"
1011506-108 = "那個……老師？"
1011506-109 = "就是……"
1011506-113 = "要是總有一天……我也能成為老師……"
1011506-114 = "珍貴的……"
1011506-115 = "某個人……就好了呢。"
1011506-116 = "[s]「你已經是了哦？」"
1011506-117 = "咦！？！？"
1011506-118 = "[ns]「莉是我的學生啊。」"
1011506-119 = "……"
1011506-123 = "這，這樣啊……原來如此。#n嘿嘿，那也不錯。"
1011506-124 = "至少……現在是這樣。"
1011506-125 = "嗯，以「現在」來說。"

[translation]
84304100602-6 = "ปะ... เป็นยังไงบ้างคะ รุ่นพี่...? บาดเจ็บตรงไหนหรือเปล่าคะ?"
84304100602-7 = "ฉันไม่เป็นไรค่ะ โคฮารุ ขอบคุณที่เป็นห่วงนะคะ"
84304100602-8 = "โคฮารุนี่อ่อนโยนจังเลยนะคะ"
84304100602-10 = "ต้องขอโทษด้วยนะคะ ก่อนมีการสาธิต เราก็ตรวจสอบลู่วิ่งไปแล้วรอบหนึ่ง..."
84304100602-11 = "ฉันจะไปตรวจสอบเครื่องออกกำลังกายเครื่องอื่นดูนะคะว่ามีปัญหาเดียวกันหรือเปล่า!"
84304100602-12 = "ฮุฮุ รบกวนด้วยนะคะ ไหนๆ ฉันก็แต่งตัวมาแล้ว ก็เลยอยากออกกำลังกายให้เท่ากับที่ตั้งใจไว้น่ะค่ะ"
84304100602-13 = "จริงสิ แล้วโคฮารุล่ะคะ? ฉันว่าออกเบาๆ ก็น่าจะดีนะคะ ถ้าไม่ว่าอะไรละก็ ฉันจะช่วยดูให้ค่ะ"
84304100602-14 = "ฉะ... ฉันเหรอคะ!? รุ่นพี่จะ... เทรนฉันเหรอ!?"
84304100602-15 = "ค่ะ... ก็ได้ค่ะ...!!"

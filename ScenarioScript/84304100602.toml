[translation]
84304100602-6 = "你，你沒事吧，前輩……？有沒有哪裡受傷？"
84304100602-7 = "我沒事，小春。謝謝你這麼關心我。"
84304100602-8 = "小春果然很善良呢。"
84304100602-10 = "非常抱歉。#n機器的速度我明明在演示之前調過一輪了……"
84304100602-11 = "我去看看其他機器是否也有同樣的問題！"
84304100602-12 = "呵呵，麻煩你了。#n既然來都來了，我想把目標做完。"
84304100602-13 = "那小春你呢？#n稍微運動一下應該沒問題。如果不介意的話，我可以幫你看看。"
84304100602-14 = "我，我嗎！？前輩……要幫我！？"
84304100602-15 = "嗯……！！"

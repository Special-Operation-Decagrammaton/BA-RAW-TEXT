[translation]
10034120-1 = "6天前：王道的解決方案"
10034120-3 = "……啊啊，累死我了。"
10034120-4 = "怎麼比起練習彈吉他，學習樂理感覺還更累人呢……"
10034120-5 = "我也有同感，真是完全出乎意料……"
10034120-9 = "啊哈哈……"
10034120-10 = "不，不過如果一直在相同的地方出錯，或是遇到光靠練習也無法改善的時候……#n大部分都是樂理方面出了問題。"
10034120-11 = "這種時候從樂理的部分著手，反而能讓問題迎刃而解！"
10034120-12 = "這是只有同時學習過樂理的人才能給出的經驗談呢……真棒。"
10034120-13 = "結果還是得「學習」嗎？#n唔唔……"
10034120-14 = "沒想到在這裡也要和紙筆打交道……"
10034120-19 = "怎麼啦～？看你一臉沒自信的樣子耶？"
10034120-20 = "……怎樣？剛剛不是你先抱怨的嗎……？"
10034120-21 = "吵，吵死了！！"
10034120-22 = "廢話少說，趕快繼續吧！！"

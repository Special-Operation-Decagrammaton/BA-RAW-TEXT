[translation]
10034120-1 = "[D-6]: วิธีแก้ปัญหาที่ถูกต้อง"
10034120-3 = "เฮ้อ... ไม่ไหวแล้ว"
10034120-4 = "ทำไมการเขียนตัวโน้ตถึงยากกว่าการฝึกดีดกีตาร์อีกนะ..."
10034120-5 = "เห็นด้วยเลย นึกไม่ถึงเลยว่าเรียนทฤษฎีมันจะยากขนาดนี้..."
10034120-9 = "อะฮ่าฮ่า..."
10034120-10 = "ตะ... แต่เวลาเราผิดจุดเดิมซ้ำๆ หรือเล่นแล้วเสียงไม่ประสานกัน ส่วนใหญ่จะเกิดจากปัญหาทางทฤษฎีนะ"
10034120-11 = "ในเวลาแบบนี้ การศึกษาภาคทฤษฎีอาจจะช่วยแก้ปัญหาที่เราติดขัดอยู่ก็ได้นะ!"
10034120-12 = "นี่เป็นสิ่งที่คนที่เรียนทั้งภาคทฤษฎีและปฏิบัติควบคู่กันไปเท่านั้นที่จะแนะนำได้นะ และฉันก็เข้าถึงมันถึงรูขุมขนเลยละ เยี่ยมไปเลย"
10034120-13 = "หนีไม่พ้นเรื่อง 'เรียน' จนได้สินะ... อึก..."
10034120-14 = "ทำไมกระดาษกับตัวหนังสือถึงได้ตามมาหลอกหลอนถึงที่นี่เลย..."
10034120-19 = "อะไรกัน~? ทำไมทำหน้าเหมือนไม่มั่นใจเลยล่ะ?"
10034120-20 = "อะไรของเค้า...? เธอไม่ใช่เหรอที่เริ่มบ่นคนแรกเลยน่ะ...?"
10034120-21 = "นะ... หนวกหูน่า!!"
10034120-22 = "เอาละๆ! หยุดพูดอะไรไร้สาระได้แล้ว มาเริ่มกันอีกรอบ!!"

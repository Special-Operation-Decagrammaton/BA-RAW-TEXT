[translation]
80000096-1 = "หญิงสาวที่ค้นหาเส้นทางของตนอย่างสุดกำลัง"
80000096-2 = "(ในช่วงบ่ายวันหนึ่งที่คุณครูกำลังตั้งใจทำงานอยู่)"
80000096-6 = "[ns1] \"พัสดุ...?\"\n[ns2] \"พัสดุจากมิลเลเนียมเหรอ?\""
80000096-16 = "[log=코유키]\"ถึงคุณครู...\"[/log]"
80000096-19 = "[log=코유키]\"ฉันขอแสดงความขอบคุณคุณครูที่คอยช่วยเหลืองานของเซมิน่ามาโดยตลอดค่ะ\"[/log]"
80000096-22 = "[log=코유키]\"ทานให้อร่อยนะคะ และขอให้มีช่วงเวลาที่เพลิดเพลินในวันวาเลนไทน์ค่ะ\"[/log]"
80000096-25 = "[log=코유키]\"ด้วยความเคารพ จากโคยูกิ สังกัดเซมิน่า\"[/log]"
80000096-30 = "[ns3] \"รู้สึกสังหรณ์ใจแปลกๆ แฮะ...\"\n[ns4] ลองแบ่งช็อกโกแลตออก"
80000096-33 = "[ns5] \"ข้างในช็อกโกแลตมีกระดาษอยู่ด้วย!?\"\n[ns6] \"อ๊ะ ของจริงคืออันนี้สินะ...!?\""
80000096-36 = "\"ดีใจจังเลยค่ะ...\""
80000096-37 = "\"การที่คุณครูเจอกระดาษใบนี้ แสดงว่าข้อความหลุดรอดสายตาพวกรุ่นพี่ไปได้อย่างปลอดภัยสินะคะ\""
80000096-38 = "\"คุณครูคะ ตอนนี้ฉันถูกกักตัวไว้ในห้องสำนึกผิดค่ะ คิดว่าคุณครูก็น่าจะพอทราบอยู่แล้ว... แต่ฉันอยากขอให้คุณครูมาช่วยโดยเร็วที่สุดเลยค่ะ\""
80000096-39 = "\"ฉันพบเส้นทางและเวลาที่จะหนีจากเครือข่ายการจับตาดูของพวกรุ่นพี่ได้อย่างยากลำบาก แต่ในที่สุดก็เจอช่องโหว่แล้วค่ะ\""
80000096-40 = "\"คุณครู...\""
80000096-41 = "\"ช่วยด้วย...!!\""
80000096-42 = "\"คราวนี้...! นี่คือความหวังสุดท้ายของฉันแล้วค่ะ!!\""
80000096-43 = "\"ได้โปรดอย่าทอดทิ้งนักเรียนที่น่าสงสารคนนี้เลยนะคะ ด้วยความเคารพ โคยูกิ\""
80000096-48 = "อ่า~~ อุวะฮ่าฮ่า!! นี่คืออากาศภายนอก ทิวทัศน์แห่งอิสระภาพ...!!"
80000096-49 = "ฮ่าาาา จริงๆ เลยเชียว..."
80000096-50 = "นึกว่าทุกอย่างจะจบสิ้นแค่นี้แล้วซะอีกค่ะ...!"
80000096-51 = "แต่ยังไงซะ คุโรซากิ โคยูกิ เด็กสาวผู้แสวงหาเส้นทางอยู่เสมอคนนี้... ไม่ใช่คนที่จะยอมแพ้อะไรง่ายๆ หรอกนะคะ"
80000096-52 = "ขอบคุณนะคะคุณครูที่ช่วยชีวิตฉันมานับครั้งไม่ถ้วนเลยนะคะ!"
80000096-53 = "[s7] \"คราวนี้ก็คงจะ <สำนึกผิด>...\"\n[s8] \"เลิกก่อเรื่องซะทีเถอะ...\""
80000096-54 = "...??? คิดว่าฉันสำนึกผิดตั้งแต่เมื่อไรกันคะ?"
80000096-55 = "ฮะฮ่า! พูดอะไรน่ะ...!"
80000096-56 = "อ๊ะ...!"
80000096-57 = "ว่าแต่ว่า... ช็อกโกแลตเป็นยังไงบ้างคะ? ทานหมดรึเปล่าคะ?"
80000096-58 = "อร่อยงั้นเหรอคะ? ค่อยยังชั่วหน่อย! เท่านี้ก็ค่อยคุ้มค่าเหนื่อยหน่อยค่ะ ทั้งเรื่องรสชาติ และการใช้งาน!"
80000096-59 = "[s9] \"หืม...? คุ้มค่าเหนื่อยของโคยูกิเหรอ?\"\n[s10] \"หมายความว่าโคยูกิทำเองงั้นเหรอ?\""
80000096-62 = "หืม...?"
80000096-63 = "ค่ะ ฉันทำเองค่ะ"
80000096-64 = "คะ...? "
80000096-65 = "ทำไมถึงต้องลงทุนทำแล้วใส่กระดาษไว้ข้างในน่ะเหรอคะ? ระ... เรื่องนั้น..."
80000096-69 = "จะ...จะมาถามเรื่องนั้นอีกทำไมล่ะคะ!? เมื่อกี้ฉันก็บอกแล้วนี่คะว่า 'การใช้งาน' น่ะ! "
80000096-70 = "แน่นอนว่าเพื่อซ่อนจดหมายเอาไว้ข้างในยังไงล่ะคะ! ชะ... ใช่แล้วค่ะ เพราะแบบนั้นแหละค่ะ!!"
80000096-71 = "[s11] \"อ้อ~! นั่นสินะ ก็คงเป็นอย่างนั้นแหละเนอะ!\"\n[s12] \"มีเหตุผลที่ลึกซึ้งซ่อนอยู่นี่เอง!!\""
80000096-74 = "ฮุฮุฮุ...!! เข้าใจแล้วสินะคะ คุณครู! กะ...ก็เพราะอย่างนั้นแหละค่ะ!"
80000096-75 = "อ่า~ อะไรกันๆ โดนรู้เรื่องดีๆ เข้าซะแล้ว คราวนี้... วะฮะฮะฮ่าฮ่า~!"
80000096-76 = "วิธีนี้ถ้าใช้อย่างให้มีชั้นเชิงจริงๆ ละก็จะไม่มีวันถูกจับได้เลย..."
80000096-77 = "เพราะงั้นต่อไป..."
80000096-81 = "ก็อาจมาขอรบกวนแบบนี้อีกนะคะ คุณครู? แหะๆๆ~!"
80000096-83 = "(หลังจากนั้นคุณครูกับโคยูกิก็ค่อยๆ ออกไปจากอาคารด้วยกันอย่างระมัดระวัง)"
80000096-84 = "(แน่นอนว่าสุดท้ายแล้ว ข้อมูลทุกอย่างก็ถูกบันทึกไว้ในเครือข่ายข้อมูลของเซมิน่า และโคยูกิก็จะไม่#nสามารถใช้วิธีเดิมแบบนี้ได้อีก...)"

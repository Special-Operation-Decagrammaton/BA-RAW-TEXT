[translation]
80000096-1 = "總能找到出路的少女"
80000096-2 = "（白天正集中於工作時）"
80000096-6 = "[ns1]「……快遞？」\n[ns2]「從千年寄來的？」"
80000096-16 = "[log=코유키]「……給老師」[/log]"
80000096-19 = "[log=코유키]「這段期間以來，真的很感謝老師對研討會任務的各種幫助」[/log]"
80000096-22 = "[log=코유키]「希望您能喜歡，並度過愉快的情人節」[/log]"
80000096-25 = "[log=코유키]「在此向您致上敬意──研討會的小雪敬上」[/log]"
80000096-30 = "[ns3]「感覺有點奇怪……」\n[ns4] 將巧克力折成一半"
80000096-33 = "[ns5]「……巧克力裡面還有紙！？」\n[ns6]「啊，這才是重點嗎……！？」"
80000096-36 = "「……我很高興」"
80000096-37 = "「當你看到這張紙的時候，就代表這則訊息成功脫離前輩們的掌控了吧」"
80000096-38 = "「老師，我現在被關在反省室裡。雖然你應該也有所預期，但我非常需要你的幫助」"
80000096-39 = "「我歷經千辛萬苦找出的、能夠避開前輩們監視的時間及路線就在下方的空白處」"
80000096-40 = "「……老師」"
80000096-41 = "「……請幫幫我！！」"
80000096-42 = "「現在！這個方法！是我最後的！希望了！！」"
80000096-43 = "「……希望你不要拋下我這可憐的學生──滿懷迫切的小雪」"
80000096-48 = "噗哈～～！尼哈哈哈哈！！#n這就是外面的空氣，自由的世界……！！"
80000096-49 = "哈啊啊啊，真的是……"
80000096-50 = "本來還以為這次真的要走投無路了呢……！"
80000096-51 = "但是我黑崎小雪──a.k.a總是能找到出路的少女──可不會這麼輕易就放棄！"
80000096-52 = "謝謝你，老師。真是被老師拯救了好幾次呢！"
80000096-53 = "[s7]「這次果然也沒有『反省』……」\n[s8]「不要闖禍不就好了嗎……」"
80000096-54 = "……？？？#n為什麼會覺得我在反省？"
80000096-55 = "尼哈哈！真搞不懂老師的意思呢……！"
80000096-56 = "……啊！"
80000096-57 = "這麼說來，巧克力後來是怎麼處理的？你都吃掉了嗎？"
80000096-58 = "很好吃是嗎？太好了！#n不管是味道層面還是功能層面，努力做果然是值得的啊！"
80000096-59 = "[s9]「……嗯？小雪你說值得？」\n[s10]「所以那是你親手做的嗎？」"
80000096-62 = "……嗯？"
80000096-63 = "對啊，怎麼了嗎？"
80000096-64 = "……嗯？"
80000096-65 = "問我為什麼要特地親手做？#n這，這個……"
80000096-69 = "為，為什麼要問那種事啊！？#n我剛才不是已經說過是為了「功能」嗎！"
80000096-70 = "當然是為了把信藏進去囉！就，就是這樣而已！！"
80000096-71 = "[s11]「啊，啊啊～！原來是這樣啊！」\n[s12]「原來藏有那種小巧思啊！！」"
80000096-74 = "哼，哼哼……！你果然能看出來啊，老師！#n沒，沒錯！就是那樣！！"
80000096-75 = "啊～這，這次嘗試真是讓我有了不錯的發現呢？尼．哈．哈．哈．哈～！"
80000096-76 = "這個方法被逮到可能性實在很低……"
80000096-77 = "所以……老師？"
80000096-81 = "……之後也要繼續麻煩你囉？尼哈哈～？"
80000096-83 = "（之後便和小雪一起小心翼翼地逃到建築物外面）"
80000096-84 = "（當然，所有過程都被記錄在研討會的情報網中，#n　因此小雪再也無法使用同樣的辦法了……）"

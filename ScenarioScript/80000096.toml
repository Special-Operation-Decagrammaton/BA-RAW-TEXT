[translation]
80000096-1 = "A Woman Who Always Finds a Way"
80000096-2 = "It was the middle of the day, so I was focused on work."
80000096-6 = "[ns1] \"...I've got mail?\"\n[ns2] \"From Millennium?\""
80000096-16 = "[log=코유키]\"...Dear Sensei.\"[/log]"
80000096-19 = "[log=코유키]\"We sincerely thank you for all your work with Seminar, as well as all your help.\"[/log]"
80000096-22 = "[log=코유키]\"Enjoy your meal! I hope you have a happy Valentine's Day.\"[/log]"
80000096-25 = "[log=코유키]\"Respectfully, Seminar's Koyuki.\"[/log]"
80000096-30 = "[ns3] \"Something's fishy...\"\n[ns4] Break the chocolate in half."
80000096-33 = "[ns5] \"...There's a piece of paper in the chocolate!\"\n[ns6] \"Oh. Is this the point of the gift?!\""
80000096-36 = "\"...I'm happy.\""
80000096-37 = "\"If you're looking at this paper, it means my message made it past the seniors safely.\""
80000096-38 = "\"Sensei. They have me held in the Self-Reflection Room. As you can imagine, I'm in dire need of assistance.\""
80000096-39 = "\"It was hard to find a place and time to write this. The prying eyes of my seniors are always watching.\""
80000096-40 = "\"Sensei....\""
80000096-41 = "\"HELP!!\""
80000096-42 = "\"You! are! my! last! hope!\""
80000096-43 = "\"...Please don't abandon your poor student. Desperately, Koyuki.\""
80000096-48 = "Fuwaaah! Ahahaha!! Fresh air! This view! I'm free!!"
80000096-49 = "*sigh* Geez..."
80000096-50 = "I really thought that it was the end back there. Really!"
80000096-51 = "But never count out Kurosaki Koyuki. I never give up. I always find a way!"
80000096-52 = "Thank you, Sensei. You've saved my life many times now!"
80000096-53 = "[s7] \"Once again...reflection means...\"\n[s8] \"...being better the next time.\""
80000096-54 = "Did you really think I was actually reflecting in there?"
80000096-55 = "Haha! What are you even saying?!"
80000096-56 = "...Oh!"
80000096-57 = "By the way, what happened to the chocolate? Did you eat it all?"
80000096-58 = "You enjoyed it? Glad to hear! I put in a lot of work to make it tasty and functional!"
80000096-59 = "[s9] \"...Huh? You put in a lot of work? You, Koyuki?\"\n[s10] \"You mean, you made it yourself?\""
80000096-62 = "...Huh?"
80000096-63 = "Yeah. And?"
80000096-64 = "...Huh?"
80000096-65 = "Why did I have to make it myself? Well, th-that's because..."
80000096-69 = "Wh-Why are you asking stupid questions? I just told you it needed to be functional didn't I? "
80000096-70 = "I had a letter to hide! Th-That's right! Yup, yup!!"
80000096-71 = "[s11] \"Ah-haa! But of course!\"\n[s12] \"That was the true plan!!\""
80000096-74 = "H-Heehee! You nailed it, Sensei! Th-That's it! Yup."
80000096-75 = "Ah! My, oh my. I can't believe this plan worked! It's worthy of an evil laugh... Nya! Ha! Ha! Ha!"
80000096-76 = "Plus this method seems hard to track, so I should be able to use it for a while..."
80000096-77 = "Sensei, from here on..."
80000096-81 = "...I'll be in your care, all right? Heeheehee."
80000096-83 = "Afterwards, I carefully left the building with Koyuki."
80000096-84 = "Of course, the situation was exposed by Seminar's information network, so Koyuki was unable to use that escape method ever again."

[translation]
10008125-3 = "哈哈哈哈哈哈！果然還是不行啊！"
10008125-4 = "唔呣！機體的調整還是不夠！"
10008125-5 = "Red！下次調整更多性能和輸出功率吧！"
10008125-10 = "……我每次都在想，有在拚命的是不是只有我一個人啊？#n你們好像一直都在胡鬧？是我的錯覺嗎？"
10008125-11 = "話說Red，合約也快到期了，要不要續約啊？"
10008125-12 = "哎呀這可真困擾！那筆錢已經都花在Mk.1上了，該怎麼辦才好！"
10008125-13 = "總之現在先從這裡撤退吧！"
10008125-14 = "但是可別以為這樣就結束了！我們的戰鬥還會一直持續下去！"
10008125-16 = "無限迴轉的軌道……終將通向正義的未來！"
10008125-17 = "無限迴轉壽司戰隊．凱坦澤！撤退！"
10008125-23 = "結果，到頭來……"
10008125-24 = "我，我們的錢全都飛了嗎！？騙人的吧──！？"
10008125-25 = "亞，亞瑠大人！#n我，我沒關係的！我會再去賺錢的！"
10008125-26 = "唉，真是……"
10008125-28 = "啊哈！最後果然還是變成這樣了呢！"
10008125-29 = "……那個，我可以回去了嗎？"
10008125-30 = "[s]「呃……辛苦了。」"
10008125-32 = "（新年第一天的大騷動，就這麼拉下了帷幕）"

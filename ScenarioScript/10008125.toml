[translation]
10008125-3 = "ฮ่ะฮ่ะฮ่า! ระเบิดไปซะแล้ว!"
10008125-4 = "อื้ม! ดูเหมือนจะยังปรับแต่งช่วงลำตัวได้ไม่ดีพอนะ!"
10008125-5 = "เรด! เราต้องปรับการแสดงผลกับประสิทธิภาพอีกหน่อยแล้วละ!"
10008125-10 = "เรื่องนั้นน่ะ... ได้แต่คิดแบบนั้นทุกครั้ง แต่สุดท้ายก็มีแต่ฉันที่ลงมือทำอยู่คนเดียวไม่ใช่รึไง? หืม? หรือว่าฉันเข้าใจผิดไปเอง?"
10008125-11 = "เรด ใกล้หมดเวลาทำงานตามที่ตกลงกันไว้แล้วนะ อยากจะเพิ่มเวลาจ้างงานต่ออีกหรือเปล่า?"
10008125-12 = "โธ่เอ๊ย! ตอนนี้ใช้เงินไปกับ Mk.1 หมดแล้วน่ะ! "
10008125-13 = "ช่วยไม่ได้นะ ตอนนี้ก็ถอนกำลังก่อนแล้วกัน!"
10008125-14 = "แต่อย่าคิดว่าการล่าถอยครั้งนี้คือจุดจบล่ะ! การต่อสู้ของพวกเราจากนี้ไปมันยังไม่จบเพียงเท่านี้หรอก!"
10008125-16 = "เส้นทางแห่งชีวิตที่ไม่สิ้นสุดนี้จะพาไปสู่อนาคตของความยุติธรรมในที่สุด!"
10008125-17 = "ขบวนการซูชิจุใจ ไคเทนเจอร์ ถอนกำลัง...!"
10008125-23 = "ดะ...เดี๋ยวสิ... ถ้าเป็นแบบนั้น... สุดท้ายแล้ว..."
10008125-24 = "แสดงว่าเงินปีใหม่ของพวกเราก็หายไปหมดแล้วไม่ใช่รึไง!!"
10008125-25 = "ทะ...ท่านอารุ...! ฉะ...ฉันไม่เป็นไรค่ะ! ยะ...ยังไงก็ไปทำงานหาเงินใหม่ได้นี่คะ!"
10008125-26 = "เฮ้อ..."
10008125-28 = "อ่ะฮะฮะฮ่า!! สุดท้ายก็จบลงแบบนี้สินะ!!"
10008125-29 = "...ทีนี้ก็กลับกันได้แล้วสินะ?"
10008125-30 = "[s] \"ใช่...\""
10008125-32 = "(สุดท้ายเหตุความวุ่นวายใหญ่โตที่เกิดขึ้นในคืนสิ้นปีและเช้าวันใหม่ของปีก็จบลง...)"

[translation]
84303300600-7 = "นี่มันอะไรกัน! ฉันโกรธจนทนไม่ไหวแล้ว...!!"
84303300600-8 = "ไม่ว่าจะเป็นใครก็ไม่สนแล้ว ฉันจะจัดการให้เรียบเลย!!"
84303300600-14 = "อ๊ากกกกก!! เข้ามาเลย!! มาสู้กันให้รู้ดำรู้แดงไปเลย!!"
84303300600-18 = "ฮะ... เฮือก...!"
84303300600-19 = "ทำไมถึงเป็นแบบนี้ไปได้...! ตอนเราเทสเกมครั้งสุดท้าย ทุกคนก็เล่นผ่านกันทุกด่านนี่นา...!!"
84303300600-22 = "นะ... นี่มันอะไรกัน...!?"
84303300600-23 = "(ถึงจะบอกว่าเป็นเพราะโกรธ แต่ก็ไม่ใช่สถานการณ์ปกติแล้วนะ)"
84303300600-24 = "(น่าจะเพราะได้รับผลกระทบบางอย่างจากเกมที่เพิ่งเล่นมา... แล้วสูญเสียการควบคุมตัวเองไปชั่วขณะ#nหนึ่ง)"
84303300600-25 = "(ถึงจะไม่แน่ใจว่าหลักการคืออะไร... แต่นี่ต้องเป็นสิ่งที่น่าสงสัยที่ริโอะพูดถึงอย่างแน่นอน...)"
84303300600-30 = "อ๊ากกกก!! จะอะไรก็ช่าง ขอทำลายสิ่งที่อยู่ใกล้มือก่อนเลย!!"
84303300600-31 = "...!!!"
84303300600-32 = "คงต้องทำให้ทุกคนสงบลงก่อนแล้วละค่ะ..."

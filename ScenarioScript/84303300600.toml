[translation]
84303300600-7 = "這到底是怎麼回事！無法克制的憤怒……！！"
84303300600-8 = "誰都無所謂，我要通通毀掉！！"
84303300600-14 = "啊啊啊啊啊──！！放馬過來──！！和我比一場吧！！"
84303300600-18 = "噫，噫噫……！"
84303300600-19 = "怎麼會發生這種事……！#n明明在最終測試的時候，測試者也順利過關了啊……！！"
84303300600-22 = "這，這到底是……！？"
84303300600-23 = "（就算是生氣，這個情況也很不正常）"
84303300600-24 = "（看來是受到剛才玩過的遊戲的影響……導致瞬間失去了理智）"
84303300600-25 = "（不知道是什麼原理……但這肯定是莉央所說的可疑之處……）"
84303300600-30 = "啊啊啊啊啊──！！什麼都好，我要毀掉碰到的一切！！"
84303300600-31 = "……！！！"
84303300600-32 = "……得先讓所有人冷靜下來。"

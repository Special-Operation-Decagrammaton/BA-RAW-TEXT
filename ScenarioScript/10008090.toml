10008090-71 = "D-Don't be ridiculous. I just got some dust in my eye—that's all!"
10008090-73 = "Also, we heard on the broadcast that whoever recovered the offering box would get to keep it. So we came prepared."
10008090-80 = "Why did you have to bring THAT with you?!"
10008090-81 = "For the operation, obviously."
10008090-82 = "[s] \"Well, about that...\""
10008090-83 = "The offering box was..."
10008090-84 = "...a total scam."
10008090-85 = "...A scam?"
10008090-88 = "Who'd have guessed? So the real villains here aren't the Kaitengers,#nbut the Kurokame Gang. "
10008090-89 = "Talk about a mess. The world of adults can be cold, cruel, and hard."
10008090-90 = "They're despicable!"
10008090-91 = "They're swindling money out of innocent people! Isn't that right, Shiroko?"
10008090-95 = "The offering box was a scam?"

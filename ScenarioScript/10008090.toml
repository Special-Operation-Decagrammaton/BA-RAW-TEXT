10008090-97 = "Poor thing really got her hopes up."
10008090-98 = "It was a ruse from the very beginning. They're going to pay for this."
10008090-100 = "That's right—they will. We're not going to let them get away with it.#nI say we teach that Daikichiden manager a lesson."
10008090-101 = "So with that in mind..."
10008090-102 = "...can we count on your help?"
10008090-103 = "Oooh! Are you suggesting we team up again?"
10008090-104 = "Yes. They're small fry, but they do have the advantage in numbers.#nWe could use the extra firepower."
10008090-106 = "We don't really have a reason to turn ya down, so..."

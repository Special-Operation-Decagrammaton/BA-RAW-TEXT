[translation]
10008090-1 = "ตอนที่ 9;รวมพลคณะกรรมการแผนงาน!"
10008090-3 = "ยะ...ยัยเปี๊ยกพวกนี้...! ขะ...แข็งแกร่งสุดๆ ไปเลย!"
10008090-4 = "ก็บอกแล้วงาย~ ตาลุงคนนี้น่ะถ้าจำเป็นก็ทำได้เหมือนกันนะ~"
10008090-5 = "กำลังหนุน...! ระ...เรียกกองกำลังเสริมมาอีกเร็วเข้า!"
10008090-13 = "ถ้าเป็นแบบนี้คงไม่จบไม่สิ้นกันแน่...!"
10008090-15 = "เล่นรุมรังแกกันแบบนี้เลยเหรอคะ!"
10008090-17 = "...!"
10008090-25 = "อึก?!"
10008090-29 = "[ns] \"ปืนกลที่ทรงพลังแบบนี้ หรือว่า...!\""
10008090-32 = "อ๊ะ! รุ่นพี่โนโนมิก็มาด้วย!"
10008090-33 = "ว้าว~☆ เซริกะจัง! พวกเรามาช่วยแล้วค่ะ!"
10008090-34 = "พวกเรางั้นเหรอ..."
10008090-39 = "อื้อ ฉันก็มานะ เซริกะ"
10008090-40 = "รุ่นพี่ชิโรโกะก็มาด้วยงั้นเหรอ?!"
10008090-42 = "หะ...หืม? วะ...ว่าไงนะ? พวกเธอมาที่นี่ได้ยังไง..."
10008090-43 = "หืม? พวกที่อยู่กับเซริกะจังคือหน่วยรับจ้างสารพัดงั้นเหรอ?"
10008090-44 = "อา~ คุณครู เป็นการรวมกลุ่มที่เหนือความคาดหมายเลยนะ ลุงคนนี้ตกใจจริงๆ อ๊ะ จริงสิ... สวัสดีปีใหม่นะ~"
10008090-45 = "[s] \"สวัสดีปีใหม่นะ... ไม่ใช่สิ เธอมาที่นี่ได้ยังไง?\""
10008090-47 = "พวกเราได้รับข้อความขอให้ช่วยจากเซริกะน่ะ"
10008090-48 = "ข้อความงั้นเหรอ...?"
10008090-49 = "อ๊ะ!"
10008090-52 = "ไหนๆ ก็เป็นแบบนี้แล้ว ก็ขอเรียกกำลังเสริมมาแล้วกัน!"
10008090-58 = "มาที่นี่กันเพราะข้อความนั้นแค่ข้อความเดียวเหรอ..."
10008090-59 = "บังเอิญว่าตอนที่ดูทีวีอยู่ก็เห็นสถานที่จัดงานที่เซริกะจังมาทำงานพิเศษเกิดเรื่องวุ่นวายพอดีน่ะค่ะ"
10008090-60 = "เกิดเรื่องวุ่นวายใหญ่โตเลยนะ เซริกะจัง... ลุงก็เป็นห่วงนึกว่าจะเกิดอันตรายอะไรขึ้นน่ะ~"
10008090-61 = "เซริกะชอบโดนลากเข้าไปเอี่ยวกับเรื่องพวกนี้บ่อยๆ น่ะสิ"
10008090-63 = "เห็นฉันมีภาพลักษณ์เป็นอย่างนั้นเหรอ?!"
10008090-69 = "เพื่อช่วยพวกพ้อง... ทั้งที่ได้รับข้อความเพียงข้อความเดียวแต่ก็มาที่นี่กันทันที..."
10008090-70 = "อารุจัง สีหน้าดูประทับใจมากเลยน้า~"
10008090-71 = "ปะ...เปล่า ฉะ...ฉันไม่ได้ประทับใจหรือนับถืออะไรหรอกนะ!"
10008090-73 = "ส่วนฉันก็มาเพื่อรับรางวัลของตู้บริจาคแบบที่ได้ยินในรายการข่าวน่ะ"
10008090-80 = "เดี๋ยวสิ ทำไมถึงมาพูดอะไรแบบนั้นที่นี่อีกเล่า?!"
10008090-81 = "ก็เพื่อทำให้แผนการสำเร็จน่ะ"
10008090-82 = "[s] \"อา เรื่องนั้น...\""
10008090-83 = "คือว่า... รุ่นพี่ชิโรโกะ... เรื่องตู้บริจาคนั่น..."
10008090-84 = "มันเป็นเรื่องหลอกลวงน่ะ"
10008090-85 = "หลอกลวงเหรอ?"
10008090-88 = "อา~ คนร้ายตัวจริงของความวุ่นวายนี้ไม่ใช่พวกไคเทนเจอร์ แต่เป็นพวกคนชั่ว แก๊งคุโรคาเมะสิ...นะ "
10008090-89 = "น่าสนุกดีนะ~ การเล่นตลกร้ายของพวกผู้ใหญ่นี่เอง~"
10008090-90 = "แบบนั้น... ยกโทษให้ไม่ได้เด็ดขาดค่ะ!"
10008090-91 = "มาหลอกผู้คนแล้วขโมยเงินไปแบบนี้น่ะ! ใช่มั้ยคะ ชิโรโกะจัง?!"
10008090-95 = "เรื่องตู้บริจาคเป็นเรื่องหลอกลวงงั้นเหรอ?"
10008090-96 = "[s] \"ดูเหมือนชิโรโกะจะช็อกหนักเลยนะ\""
10008090-97 = "ชิโรโกะจัง~ คาดหวังเอาไว้เยอะเลยนี่นะ~"
10008090-98 = "ถ้าวางแผนหลอกลวงมาตั้งแต่แรกแบบนี้ ยกโทษให้ไม่ได้"
10008090-100 = "ถูกต้อง อภัยให้ไม่ได้เด็ดขาด เพราะงั้นตอนนี้พวกเราเลยคิดจะไปจัดการเจ้าคนที่อ้างว่าเป็น ผู้จัดการของไดคิจิเดนยังไงล่ะ"
10008090-101 = "เพราะงั้น..."
10008090-102 = "พวกเธอจะมาร่วมมือกับเราหรือเปล่าล่ะ?"
10008090-103 = "อ่ะฮ่า~ อารุจัง ข้อเสนอให้ร่วมมือกันงั้นเหรอ?"
10008090-104 = "อืม ถึงอีกฝ่ายจะเป็นแค่พวกปลาซิวปลาสร้อย แต่ก็มีกองกำลังอยู่จำนวนมาก เพราะงั้นถ้าร่วมมือกัน#nได้ก็คงจะดีกว่ากัน"
10008090-106 = "ถ้าแบบนั้นเราก็คงไม่มีเหตุผลที่จะปฏิเสธหรอก"
10008090-107 = "ค่ะ! ถ้าเพื่อเซริกะจังกับชิโรโกะจังที่ต้องผิดหวังแล้วละก็ ฉันพร้อมลุยอยู่แล้วค่ะ!"
10008090-113 = "ไม่ได้ผิดหวังอะไรสักหน่อย..."
10008090-114 = "อา~ รวมเรื่องนั้นเข้าไปด้วยแล้วก็ไปเอาคืนทีเดียวเลยแล้วกัน"
10008090-115 = "ตาลุงคนนี้ยินดีจะช่วยอีกแรง"
10008090-117 = "เอาละ! ถ้าตัดสินใจกันแบบนั้นแล้วละก็...!"
10008090-125 = "ทุกคน! ปลอดภัยดีกันใช่ไหมคะ?!"
10008090-126 = "มัวแต่เชื่อมต่อสัญญาณเลยทำให้ล่าช้าไปสักหน่อย..."
10008090-127 = "อายาเนะจังช้าไปก้าวหนึ่งนะ! แถมอายาเนะจังยังใส่หน้ากากกับเขาด้วย?!"
10008090-128 = "เอ่อ... รุ่นพี่ชิโรโกะบอกว่าเป็นของที่ต้องใส่เตรียมไว้ให้พร้อมก่อนจะเกิดเรื่องอะไรน่ะค่ะ..."
10008090-129 = "ตอนนี้ไม่มีประโยชน์แล้วล่ะ"
10008090-130 = "คะ...?"
10008090-132 = "อ่ะฮะฮะฮ่า! น้องแว่นก็มาด้วยเหรอ! น่าสนุกจังเลยน้า!"
10008090-133 = "หืมมม~ แสดงว่าเราก็ตัดสินใจสิ่งที่จะทำต่อไปได้แล้วสินะ?"
10008090-134 = "[s] \"หืม? มุสึกิ?\""
10008090-135 = "\"รวมพลังกันแล้วก็โต้กลับ!\" แบบนี้ต้องสนุกแน่เลย~"
10008090-141 = "อืม~ แต่แค่นั้นก็ยังไม่พอหรอกนะ~ เพราะงั้น~♪"
10008090-145 = "ส่งข้อความ... เรียบร้อย!"
10008090-146 = "มุสึกิ นั่นมัน..."
10008090-147 = "ถ้าไปสนุกกันแค่พวกเราก็น่าเสียดายอยู่นะ"
10008090-148 = "เพราะงั้นเค้าเลยเตรียมอะไรสนุกๆ เอาไว้แล้วล่ะ"
10008090-149 = "คำสั่งจากบอส! กำจัดเจ้าพวกนี้ให้หมดที่นี่ซะ!"
10008090-158 = "คิคิคิ... ถ้างั้นก็มาเริ่มงานเทศกาลแห่งความสนุกกันเถอะ"
10008090-159 = "หืม? คุณครู♡\n"

[translation]
10008090-1 = "第9話;對策委員會，集結！"
10008090-3 = "這，這些傢伙強的可怕……！？"
10008090-4 = "唔嘿～大叔我在這種時候還是派得上用場的啊～？"
10008090-5 = "唔，這樣不夠……！請求支援！"
10008090-13 = "這樣會沒完沒了的……！？"
10008090-15 = "居然仗著人多欺負人少，真狡猾呢～"
10008090-17 = "……！"
10008090-25 = "嘎啊！？"
10008090-29 = "[ns]「是格林機槍，也就是說……！」"
10008090-32 = "連野乃美前輩都來了！"
10008090-33 = "讓你久等了茜香醬！還有老師，新年快樂☆"
10008090-34 = "也就是說難道……"
10008090-39 = "茜香，讓你久等了。"
10008090-40 = "白子前輩！"
10008090-42 = "你，你們怎麼會來這裡……！？"
10008090-43 = "話說回來，沒想到便利屋的各位會跟茜香醬在一起呢。"
10008090-44 = "而且連老師也在。真是令人意外的組合，大叔我也嚇了一跳唷。啊，還有新年快樂～"
10008090-45 = "[s]「新年快樂……比起那個，你怎麼會知道這裡……？」"
10008090-47 = "因為茜香有聯絡我。"
10008090-48 = "聯絡是指……"
10008090-49 = "啊！"
10008090-52 = "既然如此就請求支援……！"
10008090-58 = "啊啊，你的確說過有傳訊息了呢。"
10008090-59 = "不過沒寫有什麼事就是了☆#n正好看見了茜香醬打工地點的直播，我們就想「會不會是那樣？」。"
10008090-60 = "嗯，如果被捲進來的話就麻煩了啊～"
10008090-61 = "畢竟茜香給人經常被捲入這種事件的印象。"
10008090-63 = "是，是嗎！？"
10008090-69 = "就算沒有全部寫清楚，居然也願意為了拯救夥伴挺身而出……"
10008090-70 = "亞瑠醬，你看起來超感動的～♪"
10008090-71 = "才，才沒有那種事！？"
10008090-73 = "而且，我聽說賽錢箱裡的錢是先搶先贏。"
10008090-80 = "為什麼會拿著那個啊！？"
10008090-81 = "我做了很多準備。"
10008090-82 = "[s]「啊，不過關於那件事……」"
10008090-83 = "白子前輩，那個賽錢箱的事……"
10008090-84 = "全部都是騙人的。"
10008090-85 = "……騙人的？"
10008090-88 = "原來如此～#n這場騷動的主犯不是凱坦澤，而是黑龜組啊～"
10008090-89 = "哎呀～真是場災難呢。大人的惡意真讓人困擾。"
10008090-90 = "原來是這樣啊……竟敢欺騙大家還試圖把錢搶走，不可原諒！"
10008090-91 = "對吧，白子醬！"
10008090-95 = "全部，都是騙人的……"
10008090-96 = "[s]「白子，你還好嗎……？」"
10008090-97 = "白子醬可是非常期待的啊～"
10008090-98 = "居然從一開始就是場騙局，不可饒恕。"
10008090-100 = "沒錯，不能饒了他們。#n得去找那個大吉殿的負責人還是什麼的，給他來上一槍才行。"
10008090-101 = "所以……"
10008090-102 = "你們願意幫忙嗎？"
10008090-103 = "啊哈～再組成一次共同戰線？"
10008090-104 = "沒錯，對方雖然都是雜魚但數量很多。光靠我們不好處理。"
10008090-106 = "嘛，也沒什麼理由拒絕吧？"
10008090-107 = "是！這也是為了茜香醬和失望的白子醬！"
10008090-113 = "……我沒有失望。"
10008090-114 = "哎呀哎呀～雖然不能真的那麼做，不過你的心情我能理解。"
10008090-115 = "連這個部分一起奉還，好嗎？大叔我也會幫忙的。"
10008090-117 = "好，既然這麼決定了……！"
10008090-125 = "各位都沒事吧！？"
10008090-126 = "不好意思，通訊莫名地不太穩定……！#n啊，老師新年快樂！"
10008090-127 = "綾音醬……！#n呃，為什麼連綾音醬都蒙面啊！？"
10008090-128 = "因，因為白子前輩說這是必要的……！"
10008090-129 = "已經不需要了。"
10008090-130 = "是，是嗎……？"
10008090-132 = "啊哈哈哈，連眼鏡娘也加入了！越來越有趣了～！"
10008090-133 = "那～我再來多做點準備吧？"
10008090-134 = "[s]「無月？」"
10008090-135 = "大家一起合力反擊！這樣當然很不錯～"
10008090-141 = "但難得有這種機會，就弄得更有趣一點吧～♪"
10008090-145 = "傳送完畢～！"
10008090-146 = "無月，剛才那個難道是……"
10008090-147 = "這麼歡樂的鬧劇，只有我們享受到就太可惜了對吧？"
10008090-148 = "這也是為了讓事情更有趣哦？"
10008090-149 = "找到了，在這裡壓制他們吧！"
10008090-158 = "咯呵呵♪來～開始慶典吧？"
10008090-159 = "吶，老師♡"

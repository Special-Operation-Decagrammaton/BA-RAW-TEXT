1601405-20 = "3;이부키;99;그래서 샬레에 오는 동안 이부키가 어떤 일을 할 수 있을지, 어떤 일을 하면 재미있을지 생각해 봤는데……."
1601405-21 = "3;이부키;10;생각하고 생각해도 도저히 모르겠어."
1601405-22 = "[s] \"얼른 정하려고 조급해할 필요는 없어. 이부키에겐 아직 시간이 많으니까.\""

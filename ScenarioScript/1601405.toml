[translation]
1601405-1 = "跟伊吹一起體驗工作！"
1601405-4 = "哈囉～老師！"
1601405-5 = "就像在MomoTalk說的一樣，我專程來跟你說了！"
1601405-6 = "[s1]「嗯，我在等你哦。」\n[s2]「你對老師的工作很好奇嗎？」"
1601405-9 = "其實我最近在學校……？收到了調查書！"
1601405-10 = "就是這個！"
1601405-14 = "[ns]「『未來志願調查書』？」"
1601405-15 = "嗯！是那個名字沒錯！"
1601405-16 = "只要寫上伊吹長大之後想做什麼工作，再帶回學校就行了！"
1601405-17 = "因為我最先想到老師，所以才會問老師！"
1601405-18 = "[s]「伊吹……將來長大之後希望做什麼工作呢？」"
1601405-19 = "嗯……其實伊吹還沒想過這件事。"
1601405-20 = "所以在來夏萊的途中，伊吹想了自己能做的事，還有做哪些事會比較有趣……"
1601405-21 = "可是還是想不到答案。"
1601405-22 = "[s]「不需要急著在短時間內決定，伊吹還有時間能慢慢思考哦。」"
1601405-23 = "唔……是嗎？"
1601405-24 = "可是……"
1601405-25 = "[s3]「如果一直覺得煩惱的話，要不要現在去找找看呢？」\n[s4]「老師也會幫忙。」"
1601405-28 = "哇！真的嗎？"
1601405-29 = "嗯！那伊吹也要和老師一起體驗各種事！"
1601405-32 = "你好！我是伊吹！"
1601405-33 = "哈囉，你就是伊吹呀。"
1601405-34 = "[s]「謝謝你挪出時間，還請多多指教。」"
1601405-35 = "是，老師。就向事先聯絡的一樣，我會大概說明一下警察的工作。"
1601405-36 = "嗯！我會認真聽的！"
1601405-37 = "我們會為了市民的安全，進行巡邏、逮捕和取締犯罪者之類的工作。"
1601405-38 = "想執行警察工作，最重要的就是強烈的正義感與責任心！"
1601405-39 = "來，試著戴上警察的帽子吧。"
1601405-43 = "哇！這樣就像是警察一樣呢！"
1601405-44 = "我要逮捕犯人！嘿嘿！"
1601405-47 = "招待大家享受美食就是我們的工作。"
1601405-48 = "客人滿意的笑容，對我來說就是最大的喜悅！"
1601405-49 = "伊吹也能成為廚師嗎？"
1601405-50 = "當然！只要擁有堅韌的耐心與敏銳的感性，任何人都能成為偉大的廚師！"
1601405-51 = "好，試著用兒童專用刀來切材料吧？"
1601405-52 = "嗯！老師，等等我哦！伊吹會幫忙製作料理的！"
1601405-55 = "就像伊吹大人知道的一樣，#n戰車的操作要由很多人一起互相配合，是件相當複雜的工作。"
1601405-56 = "伊吹也知道！我有在旁邊看過伊呂波前輩操作的樣子！也一起搭過戰車了！"
1601405-57 = "那說明起來就簡單多了！今天要體驗一下戰車長的職務嗎？"
1601405-58 = "伊吹可以去自己想去的地方嗎？#n好！我試試看！"
1601405-61 = "（和伊吹探索各種職業後，不知不覺已經到了日落時刻）"
1601405-63 = "[ns5]「覺得今天怎麼樣呢，伊吹？」\n[ns6]「你最滿意哪個部分呢？」"
1601405-66 = "嗯……"
1601405-67 = "我還不知道！"
1601405-68 = "[s]「也對，只有一天應該很難決定吧……」"
1601405-69 = "可是……"
1601405-70 = "嗯，我感覺稍微能理解了！"
1601405-71 = "[s]「不知道卻能理解……？」"
1601405-72 = "那今天就先回去吧，老師！"
1601405-73 = "能學習各種事，真的很謝謝你！下次見哦～！"

[translation]
1601405-1 = "มาลองทำงานกับอิบูกิกันเถอะ!"
1601405-4 = "สวัสดี คุณครู!"
1601405-5 = "อิบูกิมาเล่าเรื่องต่อจากที่บอกใน MOMOTALK น่ะ!"
1601405-6 = "[s1] \"อื้อ ครูกำลังรออยู่เลย\"\n[s2] \"สงสัยเรื่องงานของครูเหรอ?\""
1601405-9 = "ที่จริง เมื่อเร็วๆ นี้... อิบูกิได้รับแบบสำรวจจากที่โรงเรียนมาด้วยล่ะ!"
1601405-10 = "นี่ไง!"
1601405-14 = "[ns] \"<แบบสำรวจการเลือกอาชีพในอนาคต> งั้นเหรอ?\""
1601405-15 = "อื้อ ใช่แล้ว! เห็นเขียนไว้แบบนั้นนะ!"
1601405-16 = "บอกว่าให้เขียนลงไปว่าในอนาคตพอโตขึ้นแล้วอยากทำงานอะไรน่ะ!"
1601405-17 = "อิบูกินึกถึงคุณครูเป็นคนแรกก็เลยมาถามก่อนไงล่ะ!"
1601405-18 = "[s] \"อาชีพในอนาคตงั้นเหรอ... แล้วอิบูกิโตขึ้นอยากทำงานอะไรล่ะ?\""
1601405-19 = "อืม... ที่จริงก็ยังไม่เคยคิดถึงเรื่องนั้นมาก่อนเลย"
1601405-20 = "เพราะงั้นระหว่างทางที่มาชาเล่ต์ อิบูกิก็ลองทบทวนดูว่าตัวเองทำอะไรได้ และสนุกกับงานอะไร..."
1601405-21 = "แต่ถึงจะคิดทบทวนดูยังไง... ก็คิดไม่ออกเลย"
1601405-22 = "[s] \"ไม่ต้องรีบร้อนหรอก อิบูกิยังมีเวลาให้คิดอีกเยอะ\""
1601405-23 = "ฮือ... งั้นเหรอ?"
1601405-24 = "แต่ว่า..."
1601405-25 = "[s3] \"แต่ถ้ายังกังวลอยู่ละก็ เราออกไปลองกันดูมั้ย?\"\n[s4] \"ครูจะช่วยเอง\""
1601405-28 = "ว้าว! จริงเหรอ?"
1601405-29 = "อื้อ! ถ้างั้นอิบูกิก็จะออกไปลองทำอะไรหลายๆ อย่างกับคุณครูด้วย!"
1601405-32 = "สวัสดีค่ะ อิบูกิค่ะ!"
1601405-33 = "สวัสดี เธอคืออิบูกิสินะ"
1601405-34 = "[s] \"ขอบคุณที่แบ่งเวลาให้นะ รบกวนด้วย\""
1601405-35 = "ค่ะ คุณครู ฉันจะอธิบายงานของทางตำรวจให้ฟังคร่าวๆ ตามที่ขอมานะคะ"
1601405-36 = "อื้อ! อิบูกิจะตั้งใจฟังเลย!"
1601405-37 = "เราจะออกลาดตระเวนในที่ต่างๆ ตรวจตราดูแล และจับกุมอาชญากรเป็นประจำ เพื่อความปลอดภัย#nของประชาชน"
1601405-38 = "งานของตำรวจน่ะ เป็นงานที่ต้องอาศัยความรับผิดชอบและความยุติธรรมอย่างแท้จริง! "
1601405-39 = "เอ้า ลองใส่หมวกตำรวจดูสิ"
1601405-43 = "อื้อ! รู้สึกเหมือนได้เป็นคุณตำรวจจริงๆ แล้วเลย!"
1601405-44 = "จะจับกุมคนร้ายแล้วนะคะ! ฮิฮิ"
1601405-47 = "งานของเราคือการปรุงอาหารอร่อยๆ ให้กับทุกคนยังไงล่ะ"
1601405-48 = "เวลาลูกค้ายิ้มอย่างพึงพอใจในรสชาติอาหาร ทำให้ฉันมีความสุขที่สุดเลย!"
1601405-49 = "อิบูกิจะเป็นเชฟได้รึเปล่านะ?"
1601405-50 = "แน่นอน! ขอแค่มีความมุ่งมั่นไม่ย่อท้อ ไม่ว่าใครก็เป็นเชฟที่ยอดเยี่ยมได้!"
1601405-51 = "เอ้า อยากลองใช้มีดสำหรับเด็กหั่นวัตถุดิบดูหน่อยมั้ย?"
1601405-52 = "อื้อ! คุณครู รอแป๊บหนึ่งนะ! อิบูกิจะทำอาหารอร่อยๆ ให้เอง!"
1601405-55 = "คุณอิบูกิเองก็คงทราบดี การบังคับรถถังเป็นงานที่ละเอียดอ่อนที่ต้องทำอย่างพร้อมเพรียงกันค่ะ"
1601405-56 = "เรื่องนั้นอิบูกิก็รู้นะ! อิบูกิเคยเห็นรุ่นพี่อิโรฮะทำบ่อยๆ แถมเคยนั่งข้างๆ มาแล้วด้วย!"
1601405-57 = "ถ้าอย่างนั้นก็คงจะคุยกันง่ายหน่อยนะคะ ถ้างั้นวันนี้ลองรับหน้าที่เป็นผู้บัญชาการรถถังดูมั้ยคะ?"
1601405-58 = "บังคับไปไหนก็ได้ที่อิบูกิอยากไปเหรอ? เอาสิ! อิบูกิจะลองดู!"
1601405-61 = "(พออิบูกิได้ลองทดลองทำงานประเภทต่างๆ ดู เวลาก็ผ่านไปจนถึงช่วงเย็นแล้ว)"
1601405-63 = "[ns5] \"วันนี้เป็นไงบ้าง อิบูกิ?\"\n[ns6] \"ชอบงานไหนที่สุดเหรอ?\""
1601405-66 = "อืม..."
1601405-67 = "ที่จริง... อิบูกิก็ยังไม่รู้เลย!"
1601405-68 = "[s] \"นั่นสินะ คงตัดสินใจไม่ได้ภายในวันเดียวหรอก...\""
1601405-69 = "แต่ว่า..."
1601405-70 = "อื้อ รู้สึกเหมือนเข้าใจขึ้นมานิดหน่อยแล้วละ!"
1601405-71 = "[s] \"ยังไม่รู้แต่พอเข้าใจขึ้นมานิดหน่อยเหรอ...?\""
1601405-72 = "ถ้างั้นวันนี้ก็กลับกันเถอะ คุณครู!"
1601405-73 = "ขอบคุณที่ช่วยให้อิบูกิได้เรียนรู้อะไรหลายๆ อย่างเลยนะ! ไว้เจอกันใหม่น้า~!"

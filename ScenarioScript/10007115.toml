[translation]
10007115-1 = "บทส่งท้าย;วันธรรมดาๆ ของสหภาพเรดวินเทอร์"
10007115-4 = "ออนเซ็น No.227 เก่า"
10007115-7 = "[ns] \"...\""
10007115-9 = "คะ... คุณครู เมื่อกี้ระเบิดแรงมาก เป็นอะไรรึเปล่าคะ?"
10007115-10 = "[s1] \"ครูรีบหนีออกมาก่อนเลยปลอดภัยดีน่ะ\"\n[s2] \"ครูไม่ได้บาดเจ็บหรอก\""
10007115-11 = "ค่อยยังชั่วที่คุณครูไม่บาดเจ็บค่ะ"
10007115-12 = "ค่อยยังชั่วที่คุณครูไม่บาดเจ็บค่ะ"
10007115-13 = "แต่ว่าตึกออนเซ็น..."
10007115-14 = "ถูกระเบิดจนไม่เหลือแม้แต่เสาสักต้น ช่างเป็นภาพที่น่าเศร้าอะไรแบบนี้..."
10007115-21 = "แย่ที่สุด..."
10007115-22 = "ออนเซ็นที่ฉันรอคอยมานานต้องมาพังไปแบบนี้ ทั้งที่ประธานเชริโน่บอกว่ายอมให้เหลือตัวอาคาร#nไว้ให้แล้วแท้ๆ แต่กลับถูกระเบิดทิ้งไปแบบนี้..."
10007115-23 = "ชีวิตตอนนี้ก็คงไม่ต่างกับตอนที่อยู่ที่อาคารเรียนเก่าแล้วละค่ะ..."
10007115-24 = "ไม่สิ... อาจเลวร้ายกว่าเก่าด้วยซ้ำ เพราะตอนนี้ที่นี่ไม่เหลืออะไรนอกจากเศษขี้เถ้าแล้ว"
10007115-28 = "แต่ว่า... ก็ช่วยไม่ได้นะคะ "
10007115-29 = "เราจะยอมแพ้เพราะเรื่องแค่นี้ไม่ได้ ยังไงซะในโลกใบนี้ก็ยังมีสิ่งสวยงามที่เรายังไม่เคยได้เห็นอยู่เต็มไป#nหมดเลยนี่คะ"
10007115-35 = "แล้วอีกอย่างคุณครูกับเพื่อนๆ คนสำคัญของฉันก็ปลอดภัยทุกคน แค่นี้ฉันก็พอใจแล้วค่ะ!"
10007115-36 = "อื้อ ค่อยยังชั่วที่ทุกคนปลอดภัย!"
10007115-37 = "[s] \"ครูจะคอยเป็นกำลังใจให้โนโดกะเอง\""
10007115-38 = "ฮิฮิ ขอบคุณนะคะคุณครู"
10007115-39 = "แต่ก่อนอื่น ตอนนี้ตัวฉันมีแต่ขี้เถ้าจากระเบิดเมื่อกี้เต็มไปหมดเลยค่ะ"
10007115-40 = "ต้องรีบไปอาบน้ำแล้ว น่าเสียดายนะคะ ที่เราไม่มีออนเซ็นให้แช่ได้สบายๆ อีกแล้ว"
10007115-42 = "ตัวเราก็เลอะไปหมดแล้วเหมือนกัน!"
10007115-43 = "ฮือออ มีอะไรเหนียวๆ ติดอยู่ที่หนวดเต็มไปหมดเลย รู้สึกแย่ชะมัด..."
10007115-44 = "ที่อาคารเรียนเก่าไม่มีห้องอาบน้ำเลยเหรอคะ?"
10007115-45 = "ที่อาคารเรียนเก่ามีห้องน้ำอยู่ห้องหนึ่ง แต่ว่าน้ำประปาไม่ไหลมานานแล้ว พวกเราเลยต้องใช้ถัง#nไปตักน้ำมาใช้กันค่ะ"
10007115-46 = "งั้นหมายความว่าเราที่เป็นถึงผู้ยิ่งใหญ่ของสหภาพเรดวินเทอร์ จะต้องกลับไปที่สำนักเลขาธิการ ด้วยสภาพที่ยับเยินแบบนี้น่ะเหรอ? แบบนั้นถือเป็นการดูหมิ่นอำนาจของเรานะ!"
10007115-52 = "โนโดกะ... ด้านโน้นมีบ่อออนเซ็นกลางแจ้งที่ไม่ถูกระเบิดอยู่ด้วยละ"
10007115-53 = "น้ำก็ดูไม่สกปรก น่าจะลงไปแช่ได้นะ\n"
10007115-54 = "จริงเหรอคะ?"
10007115-55 = "ดีจังเลยค่ะ!"
10007115-56 = "ถ้างั้นรีบไปแช่น้ำล้างคราบสกปรกบนตัว—"
10007115-57 = "เดี๋ยวก่อน! นักเรียนที่ถูกพักการเรียนอย่างพวกเธอ คิดจะไปแช่น้ำก่อนเรางั้นเหรอ ไม่มีทางเด็ดขาด!"
10007115-58 = "เราจะลงไปแช่ด้วย!"
10007115-60 = "ถ้าท่านประธานเชริโน่จะแช่น้ำละก็ ฉันเองก็จะลงไปแช่น้ำด้วยค่ะ..."
10007115-61 = "ตอนนี้ฉันขอพักเรื่องวุ่นวายต่างๆ ไว้ก่อนแล้วกัน... ฉันอยากพักแช่น้ำอุ่นๆ ..."
10007115-62 = "คิดจะมาอ้างสิทธิ์ในการลงแช่น้ำตอนนี้งั้นเหรอ?"
10007115-63 = "ถ้าพวกสำนักเลขาธิการคิดจะลงไปแช่ละก็ พวกเราก็จะลงด้วยเหมือนกัน!"
10007115-65 = "ดะ...เดี๋ยวก่อนสิคะ! ถ้าลงไปพร้อมกันหมดแบบนี้ ต้องเบียดกันแน่ๆ เลยค่ะ!"
10007115-66 = "แล้วยังไงล่ะ เบียดๆ กันแช่น้ำในบ่อออนเซ็นด้วยกันแบบนี้ ฉันโอเคนะ"
10007115-67 = "อีกอย่างถ้ามีบ่อออนเซ็นเหลืออยู่แสดงว่า <ออนเซ็น No.227> ก็ยังไม่ถือว่าปิดกิจการใช่มั้ยล่ะ?"
10007115-68 = "งั้นก็ขอรบกวนด้วยแล้วกันนะ \"คุณผู้จัดการ\""
10007115-69 = "เฮ้อ..."
10007115-70 = "ถ้าชิกุเระจังพูดขนาดนี้แล้วก็ช่วยไม่ได้นะคะ"
10007115-74 = "<ออนเซ็น No.227> จะเปิดให้บริการชั่วคราวค่ะ!"
10007115-78 = "ฮู่ว... บ่อออนเซ็นนี่ดีจริงๆ พอได้ลงมาแช่ ความเหน็ดเหนื่อยที่สะสมมาทั้งวันก็หายไปแทบหมดเลยค่ะ"
10007115-79 = "อืม... น่าเสียดายที่ต่อไปจะมาแช่น้ำสบายๆ แบบนี้ไม่ได้อีกแล้ว"
10007115-80 = "ไม่มีวิธีสร้างออนเซ็นขึ้นมาใหม่ โดยไม่ก่อให้เกิดความเสียหายกับสำนักเลขาธิการเลยรึไงนะ?"
10007115-81 = "เชริโน่จัง ถ้าล้างหน้าลวกๆ แบบนั้น จะล้างคราบสกปรกออกไม่หมดนะคะ"
10007115-82 = "ดะ... เดี๋ยวฉันจะเช็ดให้เองค่ะ"
10007115-83 = "อึก! เราไม่ใช่เด็กๆ แล้วนะ! อย่ามาจับหนวดของเรานะ!"
10007115-88 = "ฮิฮิ ชามอร์สที่ดื่มตอนแช่ออนเซ็นนี่อร่อยดีจังเลยน้า~"
10007115-89 = "หืม? เครื่องดื่มในเหยือกนั่นคืออะไรน่ะ?"
10007115-90 = "คงไม่ได้คิดอุกอาจดื่มเครื่องดื่มแอลกอฮอล์ต่อหน้าสมาชิกคณะความมั่นคงหรอกใช่มั้ย?"
10007115-91 = "ไม่รู้สิ นี่เป็นชามอร์สที่ฉันบ่มไว้เมื่อฤดูใบไม้ผลิที่แล้วต่างหาก"
10007115-92 = "ถึงจะบ่มไว้นานเกินไปนิดหนึ่งก็เถอะ"
10007115-93 = "หืม? เมื่อกี้ว่ายังไงนะ?"
10007115-94 = "ฮิฮิ ไม่มีอะไรหรอกน่า"
10007115-95 = "ถ้าสงสัยมาก คุณหัวหน้าคณะความมั่นคงจะลองดื่มสักแก้วมั้ย?"
10007115-96 = "ก็นะ ถ้าแค่นิดเดียว... ก็คงพอได้"
10007115-101 = "เหล่าสหาย! ถึงวันนี้เราจะต้องล่าถอยเมื่อเผชิญกับอาวุธชิ้นใหม่ของผู้กดขี่ที่แสนชั่วร้าย แต่นี่ไม่ใช่#nความพ่ายแพ้ของเราหรอกนะ! เราแค่ล่าถอยมาตั้งหลักเพื่อคิดแผนการครั้งที่สองต่างหาก!"
10007115-102 = "คราวหน้าเราจะทำลายเจ้ารถถังเจ้าปัญหานั่นก่อน จะได้กำจัดเสี้ยนหนามไป และเราก็จะคว้าชัยชนะ#nในการปฏิวัติมาครองได้!"
10007115-103 = "ทำลายเจ้ารถถัง! นี่คือการปฏิวัติ!"
10007115-108 = "เฮ้อ... เสียงดังกันจริงๆ เลยนะคะ เพราะแบบนี้ถึงไม่อยากให้ลงมาแช่พร้อมๆ กัน..."
10007115-109 = "[s] \"แต่ค่อยยังชั่วหน่อยนะที่ทุกคนดูร่าเริงกัน\""
10007115-110 = "ฮ่าฮ่า... ฉันนึกภาพนักเรียนของสหภาพเรดวินเทอร์นั่งห่อเหี่ยวไม่ออกเลยค่ะ"
10007115-112 = "คุณครู..."
10007115-113 = "ถึงวันนี้จะเกิดเรื่องวุ่นวายขึ้นมากมาย แต่คุณครูก็สนุกที่ได้มาพักผ่อนที่ออนเซ็นใช่มั้ยคะ"
10007115-114 = "[s3] \"วันนี้สนุกมากเลยละ\"\n[s4] \"เป็นวันที่ดีสุดๆ เลย\""
10007115-115 = "ค่อยยังชั่วหน่อยค่ะ ฮิฮิ"
10007115-116 = "ค่อยยังชั่วหน่อยค่ะ ฮิฮิ"
10007115-117 = "ถึงตอนนี้จะไม่มีออนเซ็นแล้ว คราวหน้าคุณครูแวะมาที่อาคารเรียน..."
10007115-118 = "ไม่สิ แวะมาที่ห้องพิเศษ 227 ของพวกเราบ้างนะคะ"
10007115-124 = "ไม่ว่าเมื่อไรพวกเราก็จะรอคุณครูค่ะ!"
10007115-125 = "บันทึกละมุน ออนเซ็น No.227!"

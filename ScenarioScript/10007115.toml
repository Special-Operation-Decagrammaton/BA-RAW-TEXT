[translation]
10007115-1 = "尾聲;赤冬聯邦學園的某一天"
10007115-4 = "舊227號溫泉浴場"
10007115-7 = "[ns]「……」"
10007115-9 = "那個，爆炸相當驚人呢……老師，您還好嗎？"
10007115-10 = "[s1]「和大家一起立刻逃出來了所以沒問題。」\n[s2]「嗯，勉勉強強……」"
10007115-11 = "那真是太好了。"
10007115-12 = "那真是太好了。"
10007115-13 = "建築物都……"
10007115-14 = "連根柱子都沒留下，嗎。#n竟然在轉眼之間變成如此殘酷的景象……"
10007115-21 = "……真是糟透了。"
10007115-22 = "不只溫泉枯竭，連潔莉諾會長最後寬容留下的建築也通通被炸掉……"
10007115-23 = "又要回到那個時候的生活……"
10007115-24 = "而且還因為爆炸讓全身都是灰塵……"
10007115-28 = "……不過這也沒辦法。"
10007115-29 = "人生還很長遠，說不定某天這種千載難逢的機會還會再次來臨……#n為了能在今後見到許多美好的事物，也只能努力走下去了。"
10007115-35 = "而且老師和朋友都沒事……我已經很滿足了！"
10007115-36 = "嗯，大家沒事最重要。"
10007115-37 = "[s]「……今後也一起加油吧，和香。」"
10007115-38 = "……是！謝謝您，老師。"
10007115-39 = "嗚，不過話說回來……#n不知道是不是因為爆炸的塵埃，衣服跟頭髮都亂七八糟的……"
10007115-40 = "就算想洗乾淨，溫泉又正好沒了……"
10007115-42 = "咱身上也黏呼呼的！真是！"
10007115-43 = "鬍子上好像還沾到了各種奇怪的東西，真讓人不舒服……"
10007115-44 = "舊校舍有可以清洗身體的設備嗎……？"
10007115-45 = "雖然有洗手間和洗臉台，但是很久以前就已經斷水了……#n我們平時都是在鐵桶裡燒熱水洗澡的。"
10007115-46 = "那，那你是要擁有赤冬聯邦學園最高權威的咱，用這麼狼狽的模樣回事務局嗎？#n那樣咱的面子要怎麼辦！"
10007115-52 = "吶和香，那邊好像還有一個幸運沒受影響的露天溫泉。"
10007115-53 = "水也很乾淨，應該還可以使用。"
10007115-54 = "真的嗎！？"
10007115-55 = "好耶！"
10007115-56 = "那就趕快去洗洗身體……"
10007115-57 = "先等一下！怎麼可以把咱丟在一邊，讓舊校舍的停學生先去洗！"
10007115-58 = "至少要讓咱一起去！"
10007115-60 = "潔莉諾醬要去的話，我也……"
10007115-61 = "呼，忙了好一陣子……真想在溫暖的浴池裡休息……"
10007115-62 = "你們該不會連清洗身體的權利也想獨佔吧……！？"
10007115-63 = "事務局的學生們要去的話，我們也要一起去！"
10007115-65 = "請，請等一下！這麼多人一起去的話有點……！"
10007115-66 = "算了，也沒什麼不好吧？偶爾像這樣大家擠一擠，熱熱鬧鬧地泡澡也很開心。"
10007115-67 = "而且……既然還有溫泉，這裡就還是「227號溫泉浴場」對吧？"
10007115-68 = "直到營業結束都麻煩你囉，「經理」。"
10007115-69 = "……唉。"
10007115-70 = "既然這麼說也沒辦法了……"
10007115-74 = "「227號溫泉浴場」，臨時營業開始！"
10007115-78 = "呼……真是個好溫泉呢。彷彿能洗去一天的疲勞……"
10007115-79 = "唔呣。果然以後享受不到這種溫泉還是有點遺憾呢。"
10007115-80 = "有沒有什麼在不波及事務局的前提下，建造新溫泉浴場的方法呢？"
10007115-81 = "比起那個，潔莉諾醬，那種洗法是洗不乾淨的唷？"
10007115-82 = "請來這裡，我直接幫您洗吧。"
10007115-83 = "唔唔！咱又不是小孩子，咱可以自己洗！#n啊，喂，剛才碰咱鬍子的是誰！？"
10007115-88 = "呵呵，邊泡溫泉邊喝的漿果汁最棒了呢。"
10007115-89 = "嗯？那是什麼飲料？"
10007115-90 = "難不成是在事務局的保安委員面前光明正大的喝酒……？"
10007115-91 = "這是去年春天我釀的特製漿果汁唷。"
10007115-92 = "雖然可能有點發酵了。"
10007115-93 = "嗯？你剛才說什麼？"
10007115-94 = "呵呵，別在意別在意。"
10007115-95 = "那麼在意的話，要不要一起喝一杯啊？"
10007115-96 = "只喝一口的話……應該沒問題吧。"
10007115-101 = "同志們！今天雖然在邪惡獨裁者和他的新兵器前屈服了……#n但這並不是我們的敗北！只不過是為了下次勝利的準備而已！"
10007115-102 = "下次一定要事先破壞掉那令人鬱悶的戰車，取得革命性的勝利！"
10007115-103 = "哦──！！"
10007115-108 = "真吵鬧呢……所以我才不想像這樣所有人一起進來的……"
10007115-109 = "[s]「但是大家看起來都很開心呢。」"
10007115-110 = "啊哈哈……該說赤冬的學生一直都是這樣嗎……"
10007115-112 = "……老師。"
10007115-113 = "雖然被各種事情搞的手忙腳亂的，那個……"
10007115-114 = "[s3]「我很開心唷。」\n[s4]「謝謝你，和香。」"
10007115-115 = "……您能這麼想真是太好了。耶嘿嘿。"
10007115-116 = "……您能這麼想真是太好了。耶嘿嘿。"
10007115-117 = "雖然已經沒有溫泉了，希望老師還能再來舊校舍……"
10007115-118 = "不，請再來我們227號特別班哦。"
10007115-124 = "就算不再是溫泉浴場……我們也會永遠歡迎老師！"
10007115-125 = "227號溫泉浴場營運日誌！"

[translation]
2004703-1 = "別放手"
2004703-2 = "（隔天在海灘上）"
2004703-7 = "[ns]「那個，桔梗？」"
2004703-9 = "[ns]「你還在生氣嗎？」"
2004703-10 = "嗯……？"
2004703-11 = "我生氣？為什麼？"
2004703-12 = "撲鼻而來的海風、令人平靜的浪聲、閃耀的海景──"
2004703-13 = "還有漂在海面上的老師。"
2004703-14 = "在這種情況下，我為什麼要生氣呢？"
2004703-15 = "[s]「那就別只在那邊看著，過來這邊吧。」"
2004703-16 = "這，這個嘛……"
2004703-17 = "我只是想在下水之前做好暖身運動而已。"
2004703-18 = "沒有什麼特別的理由。"
2004703-19 = "[s]「在陽傘下看書能算暖身運動嗎……？」"
2004703-20 = "吸收知識也是很棒的暖身運動。"
2004703-21 = "尤其這本書，可是從游泳基礎到應用技巧都一應俱全的教本。"
2004703-22 = "還被選為暑假必讀的100本書之一呢。"
2004703-23 = "只要有了這本書，無論遇到任何情況都不會有溺水的風險。"
2004703-24 = "[s]「不是有句話叫『車到山前必有路』嗎？」"
2004703-25 = "也有人說「無論再穩固的橋也要敲敲看再過」對吧？"
2004703-26 = "我可是百花繚亂的作戰參謀。#n只要是能夠預測的風險，就應該事先做好準備。"
2004703-27 = "[s]「今天的氣象預報說海浪很平靜喔？」"
2004703-28 = "……如果突然有巨型章魚從海裡冒出來怎麼辦？"
2004703-29 = "最近好像還挺常出現的。"
2004703-30 = "今天也不是完全不可能發生吧……"
2004703-31 = "[s]「沒事沒事！一定沒問題的！」"
2004703-32 = "沒問題？這麼說的根據何在……"
2004703-36 = "唉……你就這麼想跟我一起游泳嗎？"
2004703-37 = "……知道了知道了，不用點頭點得那麼激動。"
2004703-38 = "（沒問題……我有記住教本的內容……）"
2004703-39 = "但我不打算游太深，最多就到腰部的高度為止。"
2004703-40 = "無論如何都要保持在能夠馬上回來的距離。知道嗎？"
2004703-41 = "……"
2004703-42 = "……我說，你是不是在想什麼奇怪的事情？"
2004703-43 = "我可沒有討厭水哦。"
2004703-44 = "[s3]「奇怪的事情啊……例如什麼？」\n[s4]「像貓一樣好可愛！」"
2004703-47 = "……！！"
2004703-48 = "你，你突然在說什麼啦！"
2004703-49 = "受不了，你這個人真讓人摸不透。"
2004703-50 = "那麼……"
2004703-54 = "……請你護送我吧。"
2004703-55 = "貓在陌生的地方會變得膽小。"
2004703-56 = "所以你要好好帶路，知道嗎？"
2004703-57 = "[s5]「那可以幫你戴上貓用牽繩嗎？」\n[s6]「這樣才不會走丟嘛！」"
2004703-60 = "這種時候哪來的牽繩……"
2004703-61 = "[s]「不是有繩結遊戲用的線嗎？」"
2004703-62 = "……呵呵，雖然你老是愛開玩笑，但我勸你還是想清楚比較好喔。"
2004703-63 = "你真的以為你能做到嗎？"
2004703-64 = "要是用線綁住我的話，我也不會乖乖站著不動的。"
2004703-65 = "[s]「那我們牽著手總行了吧！」"
2004703-66 = "……原來如此。"
2004703-67 = "先提出較大的要求，再退一步提出真正的目的……談判技巧還算不錯嘛。"
2004703-71 = "……好吧。#n但你絕對不能放手哦。"
2004703-76 = "涼涼的感覺真舒服……#n雖然浪有點可怕……"
2004703-77 = "如果只有自己一個人，根本不可能來到這種地方──"
2004703-78 = "……等等，你打算走到哪裡去？"
2004703-79 = "我不是說過只到腰部的深度嗎？"
2004703-80 = "……你說前面有隻海龜？"
2004703-81 = "這……是有點好奇啦。"
2004703-82 = "不，不行。好奇的話你就自己去看吧。我待在這裡就好。"
2004703-83 = "……嗯？"
2004703-84 = "等等，我又沒說你可以放手？"
2004703-85 = "要好好抓緊我。"
2004703-90 = "嗯？你現在要做什麼……"
2004703-91 = "呀啊──！"
2004703-99 = "（於是以公主抱的方式，帶著不安的桔梗一起去看了海龜）"
2004703-100 = "（接著直到夕陽西下之前，都在淺灘享受著只有彼此的時光）"

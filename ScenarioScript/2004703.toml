[translation]
2004703-1 = "Don't Let Go"
2004703-2 = "The next day, at the beach."
2004703-7 = "[ns] \"Um, Kikyou?\""
2004703-9 = "[ns] \"Are you mad at me?\""
2004703-10 = "Huh?"
2004703-11 = "Me? Why?"
2004703-12 = "The fresh sea breeze, the sound of waves crashing before me, the view of a shining ocean..."
2004703-13 = "...and you, floating in the water."
2004703-14 = "What could possibly irritate me in this scenario?"
2004703-15 = "[s] \"Then stop staring and come over here.\""
2004703-16 = "Th-That's..."
2004703-17 = "All exercise requires a proper warm-up before engaging."
2004703-18 = "That's all."
2004703-19 = "[s] \"Reading a book under a parasol is warming up...?\""
2004703-20 = "Knowledge is a warm-up of its own."
2004703-21 = "This manual includes all one could wish to know about swimming, from fundamentals to application."
2004703-22 = "It was nominated as one of the \"Summer Break Must-Reads\" as well."
2004703-23 = "I must conduct the proper research, to ensure I do not drown in the water."
2004703-24 = "[s] \"They say a picture is worth a thousand words, right?\""
2004703-25 = "People also say you should look before you leap."
2004703-26 = "I'm the Hyakkaryouran's operations officer. It is my job to prepare for any potential risks."
2004703-27 = "[s] \"The forecast predicted calm seas today.\""
2004703-28 = "Oh? And what will you do if a colossal squid decides to take advantage of the pleasant weather?"
2004703-29 = "There have been many sightings recently, I'll have you know."
2004703-30 = "You cannot guarantee that one will not make an appearance today."
2004703-31 = "[s] \"It'll be fine! Totally fine!\""
2004703-32 = "Is that so? And on what research are you—"
2004703-36 = "*sigh* Did you truly wish so badly to swim with me?"
2004703-37 = "...Fine. Please don't nod your head so intensely. It's embarrassing."
2004703-38 = "(All will be well... I memorized the manual...)"
2004703-39 = "I will go until I am waist-level. That's it."
2004703-40 = "I will immediately retreat to shore in case of any incident, understood?"
2004703-41 = "..."
2004703-42 = "...What strange thought just crossed your mind?"
2004703-43 = "I do not dislike water."
2004703-44 = "[s3] \"What do you mean by 'strange'...?\"\n[s4] \"You're just like a cat, so cute!\""
2004703-47 = "...!"
2004703-48 = "Wh-What nonsense are you blathering about now?"
2004703-49 = "You're truly unpredictable. In every way."
2004703-50 = "Well..."
2004703-54 = "Then, escort me."
2004703-55 = "Cats are known to become timid in unfamiliar territory."
2004703-56 = "It is therefore your responsibility to escort me today."
2004703-57 = "[s5] \"Can I put you on a cat harness then?\"\n[s6] \"So that we don't get separated!\""
2004703-60 = "A harness? Where would you even find such a thing?"
2004703-61 = "[s] \"We can use the string you use for cat's cradle!\""
2004703-62 = "...Sensei, you should tread carefully with your teasing."
2004703-63 = "Do you truly believe you can execute this plan of yours?"
2004703-64 = "I'm hardly going to sit idly by as you tie me up with a string."
2004703-65 = "[s] \"Then let's settle with holding hands!\""
2004703-66 = "...I see."
2004703-67 = "Make larger demands first, and then make the small, \"actual\" demand later... I suppose I'll give you a passing grade on your negotiation skills today."
2004703-71 = "...Okay.#nBut, no matter what, don't let go."
2004703-76 = "It's cool and nice... The waves are a little intimidating, however."
2004703-77 = "I likely would never have ventured this far on my—"
2004703-78 = "...Halt. How far exactly do you intend to go?"
2004703-79 = "I made it very clear that I would not go further than waist level."
2004703-80 = "...You see a turtle deeper in?"
2004703-81 = "I suppose...that piques my interest."
2004703-82 = "No. Absolutely not. If you're curious, go alone. I shall remain exactly where I stand."
2004703-83 = "...Huh?"
2004703-84 = "Excuse me. Did I grant you permission to release my hand?"
2004703-85 = "Hold it tightly."
2004703-90 = "Hm? What are you trying to...?"
2004703-91 = "Kyah...!"
2004703-99 = "I swooped a very nervous Kikyou up in a princess carry and took her to the turtle."
2004703-100 = "Afterwards, the two of us enjoyed our time in the shallow waters until the sun set."

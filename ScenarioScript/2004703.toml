[translation]
2004703-1 = "อย่าปล่อยนะ"
2004703-2 = "(วันรุ่งขึ้น ณ ชายหาด)"
2004703-7 = "[ns] \"นี่ คิเคียว?\""
2004703-9 = "[ns] \"ยังโกรธอยู่อีกเหรอ?\""
2004703-10 = "หืม...?"
2004703-11 = "ฉันน่ะเหรอ? ทำไมล่ะ?"
2004703-12 = "ลมทะเลที่พัดมาจั๊กจี้จมูก เสียงคลื่นที่ทำให้ผ่อนคลาย น้ำทะเลที่ระยิบระยับ..."
2004703-13 = "คุณครูที่ลอยอยู่ในทะเล"
2004703-14 = "อยู่ในบรรยากาศแบบนี้ ฉันจะไปมีเรื่องอะไรให้โกรธล่ะ?"
2004703-15 = "[s] \"งั้นก็ลงมาเล่นด้วยกันสิ\""
2004703-16 = "คะ... คือว่า..."
2004703-17 = "ฉันแค่อยากจะวอร์มร่างกายให้ดีก่อนลงน้ำน่ะ"
2004703-18 = "ไม่มีเหตุผลอื่นเป็นพิเศษหรอก"
2004703-19 = "[s] \"วอร์มร่างกายด้วยการอ่านหนังสือในร่มกันแดดเหรอ...?\""
2004703-20 = "การได้รับความรู้ถือเป็นการวอร์มร่างกายที่ยอดเยี่ยมเหมือนกันนะ"
2004703-21 = "นี่คือหนังสือที่บอกเทคนิคตั้งแต่การว่ายน้ำขั้นพื้นฐานไปจนถึงการว่ายน้ำขั้นสูงเลยละ"
2004703-22 = "แถมยังถูกเลือกให้เป็น 1 ใน 100 หนังสือที่ควรอ่านตอนปิดเทอมฤดูร้อนด้วย"
2004703-23 = "ถ้าได้อ่านเทคนิคพวกนี้ไป ไม่ว่าจะอยู่ในสถานการณ์ไหนก็ไม่ต้องกลัวว่าจะจมน้ำแน่นอน"
2004703-24 = "[s] \"มีคำที่ว่า 'สิบปากว่าไม่เท่าตาเห็น' นะ\""
2004703-25 = "แล้วก็มีคำว่า 'วัวหายล้อมคอก' เหมือนกัน ฉันไม่ยอมเป็นแบบนั้นหรอก"
2004703-26 = "ฉันคือที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันนะ ฉันต้องเตรียมรับมือกับความเสี่ยงที่อาจ#nเกิดขึ้นได้สิ"
2004703-27 = "[s] \"แต่พยากรณ์อากาศบอกว่าวันนี้คลื่นสงบนะ\""
2004703-28 = "แล้วถ้าจู่ๆ มีปลาหมึกยักษ์โผล่ขึ้นมาจากทะเลล่ะจะทำยังไง...?"
2004703-29 = "หมู่นี้เหมือนจะโผล่มาให้เห็นบ่อยๆ ด้วย"
2004703-30 = "ไม่มีใครรับประกันได้หรอกว่าวันนี้จะไม่เกิดเรื่องแบบนั้นน่ะ..."
2004703-31 = "[s] \"ไม่เป็นไรหรอกน่า! เชื่อครูเถอะ!\""
2004703-32 = "ไม่เป็นไรงั้นเหรอ? เอาอะไรมาเชื่อ..."
2004703-36 = "เฮ้อ... คุณอยากว่ายน้ำกับฉันขนาดนั้นเลยเหรอ?"
2004703-37 = "งั้นก็ได้... เข้าใจแล้ว ไม่ต้องพยักหน้าแรงขนาดนั้นหรอก"
2004703-38 = "(ไม่เป็นไรหรอกน่า... ฉันจำเนื้อหาในตำราได้หมดแล้ว...)"
2004703-39 = "แต่ฉันจะไม่ลงไปลึกนะ เอาแค่น้ำถึงเอวพอ"
2004703-40 = "อยู่แค่ความลึกที่ไม่ว่าจะเกิดเรื่องอะไรก็ต้องขึ้นมาจากน้ำได้ทันทีเลยนะ เข้าใจมั้ย?"
2004703-41 = "......"
2004703-42 = "เอ่อ... ไม่ได้คิดอะไรแปลกๆ อยู่ใช่มั้ย?"
2004703-43 = "ฉันไม่ได้ไม่ชอบน้ำหรอกนะ"
2004703-44 = "[s3] \"ความคิดที่คิเคียวเหมือนแมวน่ะเหรอ...?\"\n[s4] \"น่ารักเหมือนแมวเลย!\""
2004703-47 = "...!!"
2004703-48 = "จู่ๆ ก็พูดเรื่องอะไรเนี่ย!"
2004703-49 = "คุณเป็นคนที่ยากเกินเข้าใจจริงๆ"
2004703-50 = "ถ้างั้น..."
2004703-54 = "ก็ดูแลฉันด้วยนะ..."
2004703-55 = "เวลาแมวอยู่ในที่ที่ไม่คุ้นเคยก็จะขี้กลัวน่ะ"
2004703-56 = "ฉันหมายถึง คุณต้องนำฉันว่ายน้ำ เข้าใจหรือยัง?"
2004703-57 = "[s5] \"งั้นขอใส่สายรัดของแมวให้ได้มั้ย?\"\n[s6] \"งั้นใส่สายรัดนิรภัยไว้ด้วยมั้ยล่ะ?\""
2004703-60 = "พูดอย่างกับมีสายรัดอย่างนั้นละ..."
2004703-61 = "[s] \"มีด้ายที่ใช้เล่นพันด้ายไม่ใช่เหรอ?\""
2004703-62 = "ฮุฮุ... การพูดล้อเล่นมันก็สนุกอยู่หรอก แต่คิดให้ดีๆ จะดีกว่านะ"
2004703-63 = "คุณคิดว่าจะทำได้เหรอ?"
2004703-64 = "ถ้าเป็นเรื่องการพันด้าย ฉันไม่ยอมเป็นฝ่ายถูกพันอยู่คนเดียวหรอกนะ"
2004703-65 = "[s] \"งั้นเปลี่ยนมาเป็นจับมือกันไว้แล้วกัน!\""
2004703-66 = "เอาอย่างนั้นสินะ..."
2004703-67 = "ตอนแรกได้คืบจะเอาศอก สุดท้ายก็ขอกลับมาเอาคืบแทน... ก็นะ ถือว่าทักษะการเจรจาก็พอใช้ได้"
2004703-71 = "ดีละ... งั้นก็อย่าปล่อยมือเด็ดขาดเลยนะ"
2004703-76 = "สดชื่นดีจังเลย... ถึงจะยังกลัวคลื่นอยู่นิดหน่อยก็เถอะ"
2004703-77 = "ถ้าฉันฝึกคนเดียว ก็คงว่ายมาไม่ถึงที่นี่..."
2004703-78 = "เดี๋ยวนะ... คิดจะพาฉันไปถึงไหนน่ะ?"
2004703-79 = "ฉันบอกแล้วไม่ใช่เหรอว่าขอลึกถึงแค่เอวน่ะ"
2004703-80 = "ข้างหน้ามีเต่างั้นเหรอ...?"
2004703-81 = "อืม... อยากเห็นเหมือนกันแฮะ"
2004703-82 = "ไม่สิ ไม่ได้ ถ้าคุณอยากดูก็ไปดูคนเดียวเถอะ ฉันจะรออยู่ตรงนี้"
2004703-83 = "หืม...?"
2004703-84 = "เดี๋ยวนะ แล้วใครบอกให้ปล่อยมือฉันน่ะ?"
2004703-85 = "จับไว้ให้ดีๆ สิ"
2004703-90 = "หืม? จะทำอะไรน่ะ..."
2004703-91 = "ว้าย...!"
2004703-99 = "(คุณครูเข้ามาอุ้มคิเคียวที่ตกใจเหมือนอุ้มเจ้าหญิง แล้วก็ไปดูเต่าด้วยกัน)"
2004703-100 = "(หลังจากนั้นทั้งคู่ก็ใช้เวลาด้วยกันในทะเลตื้นๆ จนพระอาทิตย์ตกดิน)"

[translation]
51205-5 = "That should be it for all the live stream equipment."
51205-9 = "Let's see, what's next?"
51205-14 = "...A phone call? Oh, it's from the Yin-Yang Club."
51205-18 = "Hello? Hello? ...They hung up? "
51205-19 = "Maybe it was a butt dial."
51205-23 = "I'm going to go make sure all the recording equipment is ready, Pina, Umika! Can you do a last check on staging and props?"
51205-25 = "You can count on me, President."
51205-26 = "I'll ensure everything is up to your standards, Boss! "
51205-28 = "You really need to stop calling me Boss!"
51205-29 = "Urgh! A-Anyways!"
51205-33 = "I'll be back, okay?"
51205-38 = "All right! We've got a lot to get done before midnight!"
51205-39 = "Let's do it, Pina!"
51205-45 = "At long last, my lady."
51205-46 = "We will finally finish the story the Kadenokoujis began twenty years ago."
51205-47 = "I'm so thrilled we are righting the family's history."
51205-48 = "I can't help but to be curious... Twenty years ago..."
51205-52 = "I heard that a Kadenokouji miko was meant to conduct the ritual and dance, as I am today."
51205-53 = "But misfortune befell the festival, and it was ruined."
51205-54 = "Why? What happened?"
51205-55 = "Um... Well, it's all rather hush hush..."
51205-56 = "I'd like to know, please. After all, I now find myself in the same position they were all those years ago."
51205-57 = "I can hardly argue that. "
51205-58 = "It happened so long ago, and you've embraced your role as our lady. I don't see why not."
51205-60 = "As you said, the Kadenokouji family was meant to host the ritual twenty years ago."
51205-61 = "The preparations were in place. But the day of the festival..."
51205-64 = "The Kadenokouji miko disappeared."
51205-67 = "Perhaps they folded under the pressure and refused to attend."
51205-68 = "...Or perhaps the many conflicts within the family got in the way."
51205-69 = "We can only speculate on what exactly happened that day."
51205-70 = "But the effects of it were certain. We have not had another miko since then."
51205-72 = "That must've been..."
51205-73 = "Yes... It was unbelievable."
51205-75 = "She brought dishonor upon the family. The Kadenokouji name and disgrace went hand-in-hand for a very long time."
51205-79 = "...Disgrace?"
51205-80 = "Ah, but none of that matters anymore."
51205-81 = "After all, tonight you will finally cleanse the Kadenokouji name."
51205-82 = "That's why?"
51205-83 = "Hm?"
51205-84 = "The reason I'm to perform on stage, to endure all of this, is simply due to—"
51205-89 = "Ta-da! The stage is ready for you! "
51205-90 = "Right this way, Lady Kadenokouji!"
51205-92 = "Ah. It's time... "
51205-93 = "We're all counting on you, my lady! Please regain our honor!"
51205-94 = "Your performance will finally wash away the stain of disgrace from twenty years ago!"
51205-101 = "(This was the reasoning behind my presence here?)"
51205-102 = "(My presence here as a Kadenokouji miko was simply...for this?)"
51205-103 = "(Over an incident dating back twenty years ago...)"
51205-104 = "(I cannot comprehend it.)"
51205-105 = "Me, being here... "
51205-107 = "..Why am I here?"
51205-111 = "Poor, poor little Kadenokouji. "
51205-117 = "They claimed you were valued. You gave up everything you cared about for them. But all they wanted was to use you to clear the Kadenokouji name."
51205-118 = "It could've been anyone. They don't care about you, as a person. Your suffering matters to them as much as a fly landing on their haori."
51205-120 = "My heart bleeds for you! The tragedy! "
51205-126 = "All that pain, all that indignation..."
51205-128 = "[log=???][ff4444]Make them suffer, the way you have suffered.[-][/log]"
51205-132 = "I—"
51205-135 = "I heard a whisper."
51205-137 = "Next Episode;Yours, Nevertheless"

[translation]
51205-5 = "播放設備大致設定完畢……"
51205-9 = "如果要在這裡正式進行準備……"
51205-14 = "咦？有電話……是陰陽部打來的？"
51205-18 = "唔嗯……？一下就掛斷了。"
51205-19 = "會不會是有什麼特別的事……？"
51205-23 = "菲娜！海花，這裡先交給你們！#n我去確認播放器材！"
51205-25 = "是！部長！請交給我們，我們會完美完成的！"
51205-26 = "我們會準備好符合社長期待的完美舞台！"
51205-28 = "就說了我不是社長啦──！"
51205-29 = "真是的～～總之交給你們了！"
51205-33 = "我去去就回！"
51205-38 = "那麼，海花！在晚上12點之前開始重點整理吧！"
51205-39 = "是！菲娜！"
51205-45 = "終於要開始了。"
51205-46 = "20年前勘解由小路家沒能實現的夙願，終於要再次……"
51205-47 = "啊啊，真是太感人了。#n這是我們勘解由小路往前邁進的正確方向！"
51205-48 = "這麼說來，20年前……"
51205-52 = "我聽說在遭到廢止的慶典當天，原本也預計由我們勘解由小路家獻上舞蹈。"
51205-53 = "然而最後卻連同慶典一起不了了之。"
51205-54 = "究竟是為什麼呢？"
51205-55 = "啊，這個……該說是不好意思向外部公開，還是不好貿然說出口呢……"
51205-56 = "我想現在站在這裡的我，應該有資格知道才對。"
51205-57 = "……嗯，說的也是。"
51205-58 = "小姐已經成長茁壯並願意出面幫忙……#n況且事情已經過去，現在應該能告訴您了。"
51205-60 = "20年前的那天正如小姐所說，是由我們勘解由小路家負責慶典儀式。"
51205-61 = "然而就在當天，活動即將開始的那一刻……"
51205-64 = "本該負責舞蹈的巫女卻遲遲不見身影，直到最後也沒有出現。"
51205-67 = "不知道是因為負責祭典儀式的壓力太大……"
51205-68 = "還是因為之前就一直和家裡起衝突……"
51205-69 = "不，那都已經是好久以前的往事了。#n箇中的原因和理由，現在已經不得而知。"
51205-70 = "不過可以確定的是，從那天起……當代的巫女便消聲匿跡，再也沒有出現。"
51205-72 = "這……"
51205-73 = "是啊，這實在……"
51205-75 = "對家族太失禮了，簡直能說是恥辱。"
51205-79 = "……恥辱……？"
51205-80 = "啊，不過現在都無所謂了。"
51205-81 = "因為20年後的今天，紫小姐將會把那份恥辱全部一掃而空，對吧？"
51205-82 = "……只有這樣而已嗎？"
51205-83 = "咦……？"
51205-84 = "小女子站上舞台的理由，就只有這樣而已嗎……"
51205-89 = "好！舞台整理完畢！"
51205-90 = "收到！請直接上台吧！"
51205-92 = "啊，這麼快…… "
51205-93 = "紫小姐！萬事拜託了！#n請務必要挽回勘解由小路家的名譽！"
51205-94 = "為了洗刷20年前的恥辱……請一定要讓大家看到精彩的「舞」！"
51205-101 = "（打從一開始……希望我回到家裡的原因……）"
51205-102 = "（只是需要我扮演勘解由小路巫女的角色……）"
51205-103 = "（只是為了洗刷20年前的恥辱……？）"
51205-104 = "（如果只是為了這種事……）"
51205-105 = "小女子究竟……"
51205-107 = "為何要站在這裡呢？"
51205-111 = "你的心情，我完全能夠理解。"
51205-117 = "明明口口聲聲說需要你，結果到頭來他們所需要的……#n只是能洗刷勘解由小路家族20年來累積的恥辱、挽回家族名譽的人而已。"
51205-118 = "沒有人──沒有任何人在乎你的心情，在意你為何煩惱。"
51205-120 = "啊啊，真是太悲慘、太煎熬、太委屈了。"
51205-126 = "既然如此──"
51205-128 = "[log=???][ff4444]「將那份『感情』原封不動地奉還──難道不想嗎？」[-][/log]"
51205-132 = "小女子──"
51205-135 = "聽見了聲音──"
51205-137 = "下一話;即便如此也想對你訴說"

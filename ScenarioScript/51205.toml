[translation]
51205-5 = "อุปกรณ์ออกอากาศก็เตรียมพร้อมแล้ว..."
51205-9 = "งั้นการเตรียมพร้อมที่จำเป็นจากนี้ก็..."
51205-14 = "เอ๋? มีโทรศัพท์เข้ามา... จากชมรมหยินหยาง?"
51205-18 = "อืม... สายตัดไปแล้ว"
51205-19 = "มีธุระอะไรเป็นพิเศษ... หรือไม่มีกันแน่นะ?"
51205-23 = "พีน่า อุมิกะ ฝากเรื่องจัดการเวทีด้วยนะ! ฉันจะไปตรวจสอบเครื่องมือส่งสัญญาณสำหรับออกอากาศน่ะ!"
51205-25 = "ได้ค่ะ! หัวหน้า! วางใจได้เลยค่ะ เราจะทำให้เต็มที่เลย!"
51205-26 = "ฉันจะเนรมิตเวทีที่สมบูรณ์แบบให้สมกับความคาดหวังของท่านประธานเลยค่ะ!"
51205-28 = "บอกแล้วไงว่าไม่ใช่ท่านประธาน-!"
51205-29 = "อื้ม~~ เอาเถอะ!"
51205-33 = "งั้นเดี๋ยวฉันมานะ!"
51205-38 = "เอาละ อุมิกะ! เราต้องเช็กเวทีก่อนเที่ยงคืนนะคะ!"
51205-39 = "ได้ค่ะ! พีน่า"
51205-45 = "ในที่สุดก็จะเริ่มอีกครั้งแล้วสินะเจ้าคะ"
51205-46 = "สิ่งที่ตระกูลคาเดโนะโคจิของเรายังทำไม่สำเร็จเมื่อ 20 ปีก่อน..."
51205-47 = "น่าซาบซึ้งใจเหลือเกิน นี่แหละเจ้าค่ะ ทิศทางที่ถูกต้องของตระกูลคาเดโนะโคจิ"
51205-48 = "จะว่าไป เมื่อ 20 ปีก่อน..."
51205-52 = "ได้ยินว่าตระกูลคาเดโนะโคจิของเราก็จะแสดงระบำในเทศกาลที่ถูกยกเลิกไปตอนนั้นใช่ไหมเจ้าคะ?"
51205-53 = "แต่สุดท้ายก็ไม่ได้ขึ้นแสดง และงานเทศกาลก็จบไปอย่างคลุมเครือ"
51205-54 = "ทำไมตอนนั้นถึงเป็นแบบนั้นล่ะเจ้าคะ?"
51205-55 = "อ่า... เรื่องนั้น... มันทั้งพูดยาก... และน่าละอายที่จะบอกให้คนนอกรู้ด้วย"
51205-56 = "ในเมื่อข้าได้มายืนอยู่ตรงนี้แล้ว ข้าคิดว่าข้ามีสิทธิ์ที่จะได้รับรู้เจ้าค่ะ"
51205-57 = "อืม ก็ใช่เจ้าค่ะ"
51205-58 = "คุณหนูก็เติบโตและออกมาสืบทอดงานของตระกูลขนาดนี้แล้ว ตอนนี้ก็คงรับรู้เรื่องในอดีตได้แล้วสินะ#nเจ้าคะ"
51205-60 = "เมื่อ 20 ปีก่อน ตระกูลคาเดโนะโคจิของเราได้รับบทบาทในการทำพิธีกรรมในเทศกาลตามที่คุณหนูว่า#nเจ้าค่ะ"
51205-61 = "แต่ในวันนั้นเอง ณ วินาทีที่งานเริ่มขึ้น"
51205-64 = "คุณมิโกะที่รับหน้าที่ในวันนั้นไม่มาปรากฏตัวเจ้าค่ะ"
51205-67 = "ไม่รู้ว่าเป็นเพราะความกดดันที่ต้องทำพิธีกรรม"
51205-68 = "...หรือเป็นเพราะความขัดแย้งกับคนในตระกูลที่มีมาตั้งแต่ก่อนหน้านั้น"
51205-69 = "เราคงไปล่วงรู้เหตุผลของความหลังที่ผ่านมานานแล้วไม่ได้หรอกเจ้าค่ะ"
51205-70 = "แต่สิ่งที่แน่นอนก็คือ... เรื่องในวันนั้นเป็นบ่อเกิดให้คุณมิโกะคนนั้นหายตัวไปเจ้าค่ะ"
51205-72 = "งั้นเหรอเจ้าคะ..."
51205-73 = "เจ้าค่ะ มันช่าง..."
51205-75 = "ช่างเป็นการกระทำที่เสียมารยาท ทำให้ตระกูลเสื่อมเสียเกียรติเจ้าค่ะ"
51205-79 = "เสื่อมเสียเกียรติ...?"
51205-80 = "แต่ตอนนี้ไม่เป็นไรแล้วละเจ้าค่ะ"
51205-81 = "เพราะวันนี้คุณหนูยูคาริจะได้กอบกู้เกียรติภูมิที่เสียไปเมื่อ 20 ปีก่อน ใช่ไหมล่ะเจ้าคะ?"
51205-82 = "...แค่เรื่องนั้นเหรอเจ้าคะ?"
51205-83 = "เจ้าคะ?"
51205-84 = "เหตุผลที่ข้าต้องไปอยู่บนเวที มันมีแค่..."
51205-89 = "ยะโฮ้! จัดเวทีเสร็จเรียบร้อยแล้วค่ะ!"
51205-90 = "ค่ะ! ขึ้นมาได้เลยค่ะ!"
51205-92 = "อ่า... ถึงเวลาแล้วสินะ..."
51205-93 = "คุณหนูยูคาริ! ฝากด้วยนะเจ้าคะ! เพื่อศักดิ์ศรีของตระกูลคาเดโนะโคจิ!"
51205-94 = "ได้โปรดกอบกู้เกียรติภูมิที่เสียไปเมื่อ 20 ปีก่อน...! ด้วย <ระบำ> ที่งดงามด้วยเจ้าค่ะ!"
51205-101 = "(ที่บอกว่าอยากให้ข้ากลับเข้ามาสานต่องานของตระกูลตั้งแต่ทีแรก...)"
51205-102 = "(ที่อยากให้ข้ามาเป็นมิโกะของตระกูลคาเดโนะโคจิ ก็เพราะแค่...)"
51205-103 = "(นั่นก็เพื่อกอบกู้เกียรติภูมิที่เสื่อมเสียไปในวันนั้นเมื่อ 20 ปีก่อนเหรอ...?)"
51205-104 = "(ถ้าเป็นการทำเพื่อสิ่งนั้น แล้วทำไม...)"
51205-105 = "...ทำไมข้า..."
51205-107 = "ถึงต้องมาอยู่ที่นี่ด้วย?"
51205-111 = "ฉันเข้าใจความรู้สึกนั้นค่ะ"
51205-117 = "ถึงจะบอกว่าเราเป็นที่ต้องการ แต่สุดท้ายเราก็เป็นได้แค่คนที่จะชำระล้างความเจ็บใจจากการเสีย#nเกียรติของตระกูลคาเดโนะโคจิที่คนพวกนั้นไม่ยอมปล่อยไปตลอด 20 ปี"
51205-118 = "ไม่มีใครที่จะมาสนใจเรื่องของคุณ ไม่มีใครที่พยายามเข้าใจว่าคุณรู้สึกอย่างไร ไม่มีใครรับรู้ว่าคุณต้อง#nทุกข์ใจด้วยเรื่องอะไร"
51205-120 = "ช่างน่าเวทนา ช่างน่าเศร้า น่าเสียใจ..."
51205-126 = "ถ้าอย่างนั้นแล้ว ภายในใจของคุณน่ะ "
51205-128 = "[log=???][ff4444]<ไม่คิดอยากให้คนอื่นรับรู้ถึง 'ความรู้สึก' นั้นบ้างเลยเหรอคะ?>[-][/log]"
51205-132 = "ข้า......"
51205-135 = "ข่าวลือแว่วเข้ามา..."
51205-137 = "ตอนต่อไป;ถึงกระนั้นก็ตาม"

[translation]
13020-1 = "第2話;不速之客"
13020-5 = "咳咳，咳咳。#n唔，現在……"
13020-6 = "先把這個移到這裡就行了嗎？"
13020-7 = "嗯，這是最後一個倉庫了。#n不過為什麼偏偏在這個時候換倉庫……"
13020-8 = "咳咳，咳咳……這裡好像很久沒用了。"
13020-9 = "就是說啊。#n這個地方原本是做什麼用的啊？"
13020-10 = "聽說是保管跟產學合作相關的機密文件的儲藏室……#n反正就是個保管重要文件的地方吧。"
13020-11 = "以前可能是那樣沒錯，但現在八成已經不重要了吧。#n畢竟如果是重要文件，怎麼可能這樣隨便亂放呢？"
13020-12 = "總之就把這些文件箱搬到銷毀室吧。"
13020-13 = "可以把箱子打開看看裡面裝了什麼嗎？"
13020-14 = "哎呀～都沒時間了，何必還做這種事呢？動作快。"
13020-15 = "是……咦，咦？"
13020-20 = "嗯？這，這是……？#n快躲開！層架的柱子斷了……！"
13020-21 = "搞，搞什麼！？你碰了什麼嗎？"
13020-22 = "我沒有碰！原本還好好的，結果就突然……！"
13020-27 = "嗚哇……差點就受傷了……"
13020-28 = "怎，怎麼回事？鋼架怎麼會突然斷了……"
13020-29 = "唉，這下該怎麼收拾……"
13020-30 = "嗯？這是什麼……？"
13020-34 = "也太衰了吧。#n話說那是什麼？"
13020-35 = "好像是箱子裡的資料……"
13020-36 = "買賣契約……？阿拜多斯高中……？"
13020-37 = "嗯？"
13020-53 = "這裡是……"
13020-59 = "那個人……那個副學生會長……"
13020-60 = "……"
13020-61 = "都只剩下一個人了……怎麼還不……"
13020-62 = "……哼嗯？"
13020-69 = "奇怪……總覺得有人在看我……"
13020-70 = "……"
13020-71 = "是我的錯覺嗎……"
13020-73 = "呼……"
13020-74 = "……差，差點就被發現了……"
13020-75 = "居然在這裡也能感覺得到……？#n呼……雖然有聽說過，沒想到真的……"
13020-76 = "你聽說過什麼？"
13020-78 = "……咦，就是那位叫作星野的……"
13020-82 = "！？"
13020-84 = "嘿～？怎麼？你知道我的名字啊？"
13020-86 = "啊，那個……我……"
13020-87 = "你是誰？找我有事嗎？"
13020-88 = "我，我是……"
13020-89 = "還是你是其他自治區的學園派來打探的？#n報上你的所屬跟年級。"
13020-90 = "你好像知道我的一些事情，所以應該很清楚吧？#n──就算你年紀比我大，我也不會手下留情。"
13020-91 = "……嗯？#n不，不是那樣的……"
13020-92 = "等等……那個校徽……好像在哪看過……"
13020-93 = "是，是的。#n我也是……阿拜多斯自治區的學生……"
13020-94 = "而且我還只是國中生。#n雖然馬上就要畢業了……"
13020-98 = "什麼～？你是國中生……？#n真的嗎？怎麼看起來比我還像前輩！？"
13020-99 = "啊，啊哈哈……"
13020-100 = "……對了，我想起來了。#n是私立奈芙蒂斯中學對吧？"
13020-101 = "啊，那，那個……"
13020-102 = "不過有點奇怪……奈芙蒂斯的總部早就搬離自治區了吧？#n他們旗下的學校應該也已經廢校了才對。"
13020-103 = "……"
13020-104 = "在我畢業之後，我的國中也會廢校……我是最後一屆畢業生……"
13020-108 = "……私立奈芙蒂斯中學。"
13020-109 = "奈芙蒂斯集團旗下的頂尖菁英學校。"
13020-110 = "我聽說奈芙蒂斯集團的繼承人還在念國小還是國中……哼～原來如此。"
13020-112 = "……"
13020-113 = "原來你還沒離開自治區啊，十六夜野乃美同學？"
13020-117 = "還是馬上就要離開了？#n雖然對我來說都無所謂。"
13020-118 = "那個惡名昭彰的奈芙蒂斯集團千金找我有什麼事？#n為什麼要來這所學校？"
13020-119 = "我，我……"
13020-120 = "勸你最好謹慎回答哦？#n要是奈芙蒂斯打算對這所學校出手……"
13020-121 = "……！！？"
13020-122 = "就算你是奈芙蒂斯的千金，我也不保證你的光環會安然無恙。"
13020-123 = "對……對不起……我……"
13020-124 = "我……"
13020-135 = "……說得太過分了嗎？"
13020-137 = "……"
13020-138 = "奈芙蒂斯……"
13020-139 = "[s]「如果是奈芙蒂斯集團……」"
13020-140 = "綾音醬，怎麼了嗎？#n奈芙蒂斯的那些傢伙買我們的債券會有什麼問題？"
13020-141 = "那個……"
13020-142 = "聖奈芙蒂斯公司，或者說奈芙蒂斯集團……"
13020-144 = "……是一間從很久以前，就以阿拜多斯為據點發展的本土企業。#n某段時期甚至可以說是奇普托斯最成功的公司。"
13020-145 = "真的假的？那種企業竟然會在阿拜多斯！？"
13020-146 = "這也代表曾經的阿拜多斯有多麼繁榮吧。"
13020-148 = "嗯……據說阿拜多斯……以前曾是奇普托斯最強大、最龐大的學園。"
13020-149 = "足以讓所有學園都感到既畏懼又嚮往……#n歷史最悠久、最強大、最偉大的學園……指的就是以前的阿拜多斯。"
13020-150 = "雖然這都是在氣候異常發生之前，非常久遠的故事～♧"
13020-151 = "……至於聖奈芙蒂斯公司，則是與阿拜多斯一同經歷全盛時期的本土企業。"
13020-153 = "然而……由於氣候異常造成沙漠化加速，奈芙蒂斯和阿拜多斯一同面臨了衰敗。"
13020-155 = "為了「沙漠橫貫鐵路」這個失敗的事業而勉強籌措資金……被逼到破產邊緣。"
13020-158 = "後來這項事業遭到中止，勉強籌措而來的資金成為了經濟危機的炸彈，#n對走向沒落的阿拜多斯造成了難以挽回的打擊……"
13020-159 = "由於此事引發的連鎖效應，學生和居民們開始逃離阿拜多斯……#n而阿拜多斯學生會也開始硬著頭皮借錢……"
13020-161 = "最終……奈芙蒂斯清算旗下所有事業，離開了阿拜多斯。"
13020-162 = "是啊～沒錯。#n從我一年級的時候開始，自治區內就幾乎看不到奈芙蒂斯的痕跡了。"
13020-164 = "所以意思就是奈芙蒂斯的事業搞垮了我們的自治區嗎！？"
13020-165 = "不是這樣的，茜香醬。#n奈芙蒂斯只是阿拜多斯沒落的原因之一而已。"
13020-166 = "不過……要不是因為奈芙蒂斯的錯誤決定，阿拜多斯應該有很多機會可以克服危機。"
13020-167 = "從結果來看，奈芙蒂斯的確是造成阿拜多斯沒落的罪魁禍首。"
13020-168 = "奈芙蒂斯就是禍害阿拜多斯的兇手……#n是導致阿拜多斯沒落的始作俑者……同時……"
13020-169 = "也是我的家族所經營的事業。"
13020-174 = "什，什麼！？"
13020-175 = "……"
13020-176 = "我……是奈芙蒂斯集團的人。"
13020-177 = "[s]「野乃美……」"
13020-181 = "……果然沒錯。"
13020-182 = "綾，綾音醬？你早就知道了嗎？"
13020-183 = "沒有……不過想想前輩的金卡，大概就能猜到了……而且……"
13020-185 = "而且──那部列車，可以說是加速阿拜多斯衰退的契機……"
13020-186 = "如果它能為拯救世界派上用場……那就再好不過了♧"
13020-187 = "……"
13020-189 = "當我看見野乃美前輩連上廢棄的沙漠橫貫鐵路系統的時候，我心裡就大致能確定了。"
13020-190 = "是，是嗎？所以只有我不知道？#n星野前輩知道這件事嗎？"
13020-195 = "啊……還好白子前輩看起來也不知道。"
13020-196 = "唔，嗯。"
13020-197 = "不過前輩為什麼要隱瞞這件事呢？"
13020-199 = "那，那個……"
13020-200 = "不……仔細想想，這種事情本來就沒必要刻意提起對吧……？#n對不起，是我神經太大條了。"
13020-201 = "別這麼說，茜香醬……"
13020-202 = "不過就算奈芙蒂斯集團離開了阿拜多斯，野乃美前輩還是留在這裡呢？"
13020-203 = "……"
13020-205 = "先整理一下目前的狀況吧！"
13020-206 = "凱薩公司今天透過債券市場，出售了其持有約45%的阿拜多斯債權。"
13020-207 = "結果造成阿拜多斯出現許多新的債權人……而凱薩則從中獲得了龐大的利益。"
13020-208 = "目前已確認「聖奈芙蒂斯」集團──#n在市場上大量收購了以阿拜多斯基礎建設產業為擔[ruby=Derivatives Linked Bond]保的DLB。　[/ruby]"
13020-209 = "價格比原本的金額多出了4到5倍……"
13020-210 = "嗯，但問題是進行這些交易的原因……得調查一下才行。"
13020-211 = "綾音醬，可以請你分析奈芙蒂斯藉由收購DLB獲得的權利嗎？"
13020-212 = "啊，嗯……！"
13020-216 = "……該債券擔保的，是阿拜多斯自治區內特定設施和基礎設施的所有權、開發權，#n以及其附屬設施的所有權利……"
13020-217 = "也就是除了土地所有權以外的所有權利呢。#n也對，土地的所有權依舊是凱薩所有……"
13020-218 = "那「特定設施」包含了什麼呢？"
13020-219 = "包含……用於物流的交通基礎建設，還有相關的附加設施……"
13020-220 = "用於物流的交通基礎建設……？#n自治區裡還有那種東西嗎？"
13020-225 = "……「沙漠橫貫鐵路」。"
13020-226 = "什麼！？"
13020-227 = "除了那個之外，沒有相符的基礎設施了……"
13020-228 = "不，不過野乃美前輩，那不是還沒完工就被放棄了嗎……？#n居然花大錢買那種東西……？"
13020-229 = "而且這也代表……奈芙蒂斯以數倍的價格，重新買回了他們曾經放棄的事業……"
13020-230 = "目的是什麼？"
13020-232 = "……我也不清楚。#n究竟為什麼要做這種事……"
13020-233 = "難，難道說……！！"
13020-238 = "是不是……在那裡發現了石油之類的東西？"
13020-243 = "不是不是，茜香醬。#n要是有那種東西的話，阿拜多斯就不會變成這副德性了。"
13020-244 = "啊，還是發現了最近很流行的稀土類之類的東西……像是鍺之類的……"
13020-245 = "唔嘿～茜香醬果然在某些地方很可愛呢。#n看起來值錢的東西已經被大叔我全都找遍了哦。"
13020-246 = "不過卻什麼都沒有找到。#n無論是石油、昂貴的地下資源、稀有礦物、鍺……自治區裡什麼都沒有。#n話說鍺不是很便宜嗎？"
13020-248 = "那，那他們為什麼要這麼做啊？"
13020-249 = "這點我也想不通呢。唔嗯……"
13020-254 = "警報聲？"
13020-255 = "怎，怎麼這麼突然！？"
13020-257 = "有入侵者！自治區出現了爆炸反應！！"
13020-258 = "難道是凱薩公司……！？"
13020-259 = "不，不是的！爆炸的模式與其說是攻擊……"
13020-260 = "好像更接近施工炸彈？#n綾音醬，反應是出現在挖掘地帶嗎？"
13020-261 = "不，位置並不在挖掘地帶……而是在別的方向。#n請稍等！"
13020-265 = "……"
13020-266 = "確認完畢！是其他學園的學生……！#n規模有數十人……是我們沒看過的學園！"
13020-267 = "什麼！？"
13020-269 = "確認到了！他們是……！！"
13020-278 = "噗哈哈哈哈！還挺不錯的嘛？"
13020-280 = "下一話;高地人鐵道學園"

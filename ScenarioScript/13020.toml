[translation]
13020-1 = "ตอนที่ 2;แขกที่ไม่ได้รับเชิญ"
13020-5 = "แค่ก แค่ก อึก... ฝุ่นเต็มไปหมดเลย..."
13020-6 = "แค่ขนของตรงนี้ไปก็พอใช่มั้ย?"
13020-7 = "ค่ะ นี่เป็นห้องสุดท้ายแล้วค่ะ ทำไมถึงต้องมาย้ายโกดังในเวลาแบบนี้ด้วยนะ..."
13020-8 = "แค่ก แค่ก... ดูเหมือนที่นี่จะถูกละเลยมานานมากเลยนะคะ "
13020-9 = "นั่นสิ เป็นที่ที่เอาไว้ทำอะไรกันแน่นะ? "
13020-10 = "เห็นว่าเป็นห้องเก็บเอกสารลับที่เกี่ยวกับความร่วมมือด้านอุตสาหกรรมและการศึกษา... คงเป็นที่เก็บเอกสารสำคัญๆ ละมั้งคะ "
13020-11 = "ไม่หรอก มันอาจจะเป็นของสำคัญเมื่อในอดีต แต่ตอนนี้อาจจะไม่สำคัญแล้วก็ได้ ถ้าเป็นเอกสารสำคัญ คงไม่ถูกปล่อยปละละเลยไว้แบบนี้หรอก"
13020-12 = "ช่างเถอะน่า มาเริ่มงานกันเถอะ เราต้องย้ายกล่องเอกสารพวกนี้ไปไว้ในห้องทำลายเอกสาร"
13020-13 = "เราเปิดกล่องดูได้ไหมคะว่าข้างในมีอะไรอยู่? "
13020-14 = "ไม่เอาน่า~ แค่เวลาขนย้ายก็ไม่ค่อยมีอยู่แล้ว จะเอาเวลาที่ไหนมาเปิดดูล่ะ เร่งมือเข้าเถอะ"
13020-15 = "ค่ะ... เอะ... เอ๋?"
13020-20 = "หืมมม? อะ... อะไรเนี่ย? ละ... หลบเร็วค่ะ! เสาชั้นวางของหักแล้ว..."
13020-21 = "อะ... อะไรน่ะ?! ไปโดนอะไรเข้างั้นเหรอ?"
13020-22 = "ฉันไม่ได้ทำอะไรเลยนะคะ! เมื่อกี้ยังไม่เห็นเป็นอะไรเลย แต่จู่ๆ มันก็...!"
13020-27 = "เฮ้อ... เกือบเจ็บตัวซะแล้ว..."
13020-28 = "อะ... อะไรกัน? ทำไมจู่ๆ ชั้นเหล็กถึงหักได้ล่ะ..."
13020-29 = "เฮ้อ แล้วจะเก็บยังไงเนี่ย..."
13020-30 = "หืม? แล้วนี่อะไรอีก...?"
13020-34 = "ดวงซวยจริงๆ เลย ว่าแต่นั่นมันอะไรน่ะ?"
13020-35 = "เหมือนเอกสารที่อยู่ในกล่องเลยนะ... "
13020-36 = "สัญญาซื้อขาย...? โรงเรียนมัธยมอะบิดอส...?"
13020-37 = "หืม?"
13020-53 = "ที่นี่มัน..."
13020-59 = "คนคนนั้นคือ... รองประธานนักเรียนเหรอ...?"
13020-60 = "......"
13020-61 = "ตอนนี้ก็เหลือตัวคนเดียวแล้ว... แล้วทำไมถึงยัง... "
13020-62 = "หืม...? "
13020-69 = "แปลกจัง... เหมือนมีใครมองอยู่เลย..."
13020-70 = "......"
13020-71 = "คงจะคิดไปเองละมั้ง..."
13020-73 = "เฮ้อ..."
13020-74 = "กะ... เกือบเป็นเรื่องแล้วค่ะ..."
13020-75 = "รู้สึกตัวได้จนถึงถนนตรงนี้เลยเหรอคะ...? ฮู่ว... ถึงจะเคยได้ยินเรื่องนั้นมาอยู่บ้างแล้วก็เถอะ..."
13020-76 = "ได้ยินเรื่องอะไรมาเหรอ?"
13020-78 = "เรื่อง... ของคนที่ชื่อโฮชิโนะน่ะค่ะ... "
13020-82 = "?!"
13020-84 = "หืม? อะไรกัน รู้จักชื่อฉันด้วยเหรอ?"
13020-86 = "อ่า... คะ... คือว่า... ฉัน..."
13020-87 = "เธอเป็นใครน่ะ? มีธุระอะไรกับฉัน?"
13020-88 = "ฉะ... ฉัน..."
13020-89 = "ถ้าไม่ได้มาหาฉัน งั้นเธอมาสอดแนมโรงเรียนที่อยู่ในเขตปกครองตนเองอื่นหรือไง? บอกโรงเรียนที่สังกัดกับชั้นปีมาเลยนะ"
13020-90 = "ถ้าเธอรู้เรื่องอะไรเกี่ยวกับฉันมา เธอก็น่าจะเข้าใจดีอยู่แล้วนี่? ฉันไม่ยอมใครถึงต่อให้อายุมากกว่าฉัน#nก็ตามหรอกนะ"
13020-91 = "คะ...? มะ... ไม่ใช่อย่างนั้นค่ะ ฉะ... ฉัน..."
13020-92 = "เดี๋ยวนะ... สัญลักษณ์โรงเรียนนั่น... เหมือนเคยเห็นจากที่ไหนมาก่อนเลย..."
13020-93 = "ค่ะ ฉะ... ฉันก็เป็นนักเรียนของเขตปกครองตนเองอะบิดอสค่ะ"
13020-94 = "แล้วก็... ไม่ได้อายุมากกว่าด้วยค่ะ ฉันยังอยู่มัธยมต้นอยู่ค่ะ ถึงจะใกล้จบแล้วก็เถอะ..."
13020-98 = "เอ๋~? มัธยมต้นงั้นเหรอ...? จริงรึเปล่า? แต่เธอดูเหมือนเป็นรุ่นพี่ฉันเลยนะ?!"
13020-99 = "อ่า... ฮะฮ่าฮ่า..."
13020-100 = "จริงด้วย... นึกออกแล้วละ ที่นั่นคือโรงเรียนเอกชนมัธยมต้นเนฟธิสใช่มั้ย?"
13020-101 = "อ่า คะ... คือว่า... "
13020-102 = "แต่มันก็แปลกๆ อยู่นะ? สำนักงานใหญ่ของเนฟธิสย้ายไปอยู่นอกเขตปกครองตนเองนานแล้วนี่นา ส่วนโรงเรียนในสังกัดก็น่าจะถูกปิดไปหมดแล้วด้วย"
13020-103 = "...... "
13020-104 = "หลังจากฉันเรียนจบ โรงเรียนมัธยมต้นของฉันก็จะปิดลงเหมือนกันค่ะ... นั่นก็เพราะว่าฉันเป็นนักเรียน#nคนสุดท้ายที่จะเรียนจบ..."
13020-108 = "โรงเรียนมัธยมต้นเนฟธิส... "
13020-109 = "โรงเรียนเอกชนชั้นยอดภายใต้การควบคุมของบริษัทเนฟธิส"
13020-110 = "ได้ยินมาว่าทายาทของบริษัทเนฟธิสอยู่โรงเรียนประถมหรือมัธยมต้นด้วยนี่นา... อืม~ อย่างนี้นี่เอง"
13020-112 = "......"
13020-113 = "สงสัยจะยังไม่ออกไปจากเขตปกครองตนเองสินะ คุณอิซาโยอิ โนโนมิ?"
13020-117 = "หรือว่าใกล้จะไปแล้วล่ะ? แต่ถึงยังไงมันก็ไม่เกี่ยวอะไรกับฉันหรอก"
13020-118 = "ว่าแต่คุณหนูจากเนฟธิสที่ร้ายกาจมีธุระอะไรกับฉันเหรอ? หืม? หรือว่ามีธุระกับโรงเรียนนี้?"
13020-119 = "ฉะ... ฉัน..."
13020-120 = "แต่ระวังไว้หน่อยก็ดีนะ เพราะถ้าเนฟธิสคิดจะขยายอำนาจมาถึงโรงเรียนนี้ละก็..."
13020-121 = ".....!!?"
13020-122 = "ต่อให้เป็นคุณหนูจากเนฟธิส ก็ใช่ว่าฮาโลของเธอจะปลอดภัยหรอกนะ"
13020-123 = "ขะ... ขอโทษค่ะ... ฉัน..."
13020-124 = "ฉัน..."
13020-135 = "ฉันพูดแรงเกินไปรึเปล่านะ..."
13020-137 = "......"
13020-138 = "เนฟธิส..."
13020-139 = "[s] \"เนฟธิสกรุ๊ปงั้นเหรอ...\""
13020-140 = "อายาเนะจัง นี่มันอะไรกันน่ะ? ถ้าพวกเนฟธิสอะไรนั่นมากวาดซื้อพันธบัตรของเรา มันจะเป็นปัญหาอะไรเหรอ?"
13020-141 = "เรื่องนั้นน่ะ..."
13020-142 = "เซนต์ เนฟธิส คอมพะนี... เนฟธิส กรุ๊ปน่ะ..."
13020-144 = "เป็นบริษัทท้องถิ่นที่ใช้อะบิดอสเป็นฐานเมื่อนานมาแล้ว... ในตอนนั้นน่าจะเป็นบริษัทที่รุ่งเรืองที่สุดใน#nคิโวทอสเลยละ"
13020-145 = "จริงเหรอ? บริษัทแบบนั้นมาอยู่ในอะบิดอสเลยเหรอ?!"
13020-146 = "ไม่ใช่อย่างนั้นสิ ต้องบอกว่าอะบิดอสน่ะเยี่ยมยอดจนมีบริษัทแบบนั้นมาตั้งรกรากต่างหาก"
13020-148 = "ใช่ค่ะ ฉันได้ยินมาว่าในอดีต อะบิดอสเป็นโรงเรียนที่ยิ่งใหญ่และมีอำนาจมากที่สุดในคิโวทอสเลยค่ะ"
13020-149 = "โรงเรียนที่โรงเรียนอื่นๆ ต่างหวาดกลัวและอิจฉา... โรงเรียนที่ยิ่งใหญ่และมีประวัติศาสตร์ยาวนานที่สุด ... นั่นละค่ะโรงเรียนอะบิดอสของพวกเราในอดีต"
13020-150 = "ถึงจะเป็นเรื่องราวในอดีตตั้งแต่ก่อนเกิดภัยพิบัติดินฟ้าอากาศก็เถอะค่ะ~♧"
13020-151 = "เซนต์ เนฟธิส คอมพะนีเป็นบริษัทท้องถิ่นที่มียุคเฟื่องฟูมาพร้อมๆ กับอะบิดอสค่ะ"
13020-153 = "แต่ว่า... เมื่อเกิดภัยพิบัติทางดินฟ้าอากาศจนพื้นที่กลายเป็นทะเลทรายหนักเข้าๆ ชะตากรรมของ#nเนฟธิสก็พังพินาศไปพร้อมกับอะบิดอสค่ะ"
13020-155 = "จากนั้นก็มีการรวบรวมเงินทุนอย่างเกินควรเพื่อกิจการ <ทางรถไฟข้ามทะเลทราย> ที่ไม่ประสบความ#nสำเร็จ... จนพวกเขาเกือบล้มละลายค่ะ"
13020-158 = "สุดท้ายกิจการนั่นก็ถูกระงับไป ส่วนเงินทุนที่รวบรวมมาอย่างหนักก็กลายเป็นระเบิดที่ชื่อว่า#nวิกฤตเศรษฐกิจ และส่งผลเสียอย่างไม่อาจแก้ไขได้ต่ออะบิดอสที่กำลังย่อยยับ..."
13020-159 = "นั่นทำให้เกิดผลลูกโซ่ นักเรียนและชาวเมืองเริ่มพากันย้ายออกจากอะบิดอส... ส่วนสภานักเรียนอะบิดอสก็เริ่มติดหนี้ล้นพ้นตัว... "
13020-161 = "และสุดท้าย... เนฟธิสก็ทิ้งกิจการทั้งหมดแล้วออกจากอะบิดอสไป"
13020-162 = "มันก็เป็นอย่างนั้นละ~ เนฟธิสแทบจะไม่ได้อยู่ในเขตปกครองตนเองของเราเลยตั้งแต่ฉันอยู่ชั้นปีที่ 1 แล้ว"
13020-164 = "เท่ากับว่าเขตปกครองตนเองของเราต้องป่นปี้เพราะกิจการของพวกเนฟธิสน่ะสิ?!"
13020-165 = "ไม่ใช่แบบนั้นหรอก เซริกะจัง เนฟธิสเป็นแค่หนึ่งในสาเหตุที่อะบิดอสล่มจมน่ะ"
13020-166 = "อื้ม ไม่ใช่หรอกค่ะ เพราะถ้าเนฟธิสไม่ล้มเหลวไปซะก่อน อะบิดอสก็มีโอกาสมากมายที่จะเอาชนะ#nวิกฤตนี้ได้ค่ะ"
13020-167 = "สุดท้ายแล้วสิ่งที่ตอกลิ่มแห่งความหายนะของอะบิดอสก็คือเนฟธิสนั่นละค่ะ"
13020-168 = "เนฟธิสเป็นฝ่ายที่ทำให้อะบิดอสเสียหาย... เป็นผู้นำแห่งความพังพินาศ... และก็..."
13020-169 = "เป็นบริษัทของครอบครัวฉันด้วยค่ะ"
13020-174 = "หะ... หา? ว่าไงนะ?!"
13020-175 = "......"
13020-176 = "ฉัน... มาจากเซนต์ เนฟธิส กรุ๊ปค่ะ"
13020-177 = "[s] \"โนโนมิ...\""
13020-181 = "กะแล้วเชียว... "
13020-182 = "อะ... อายาเนะจัง? ระ... รู้เรื่องนี้อยู่แล้วงั้นเหรอ?"
13020-183 = "ไม่หรอก... แต่พอคิดถึงบัตรโกลเด้นการ์ดของรุ่นพี่ก็พอจะรู้อยู่บ้างน่ะ... ไม่ใช่แค่นั้นนะ..."
13020-185 = "รถไฟข้ามทะเลทรายนั่นเป็นกิจการที่ทำให้อะบิดอสเข้าใกล้สู่ความพังพินาศเร็วขึ้นด้วย..."
13020-186 = "ในทางกลับกัน ถ้ามันสามารถเอามาใช้กอบกู้โลกได้... ฉันก็น่าจะดีใจอย่างถึงที่สุดเลยละค่ะ♧"
13020-187 = "......"
13020-189 = "ตอนฉันเห็นรุ่นพี่โนโนมิเข้าถึงระบบเคลื่อนที่ของทางรถไฟข้ามทะเลทรายที่ถูกทิ้งไว้ ฉันก็มั่นใจค่ะ"
13020-190 = "งะ... งั้นเหรอ? นี่ฉันไม่รู้อยู่คนเดียวเหรอเนี่ย? รุ่นพี่โฮชิโนะก็รู้แล้วใช่มั้ย?"
13020-195 = "ฮู่ว... ค่อยยังชั่วหน่อย รุ่นพี่ชิโรโกะยังไม่รู้สินะ"
13020-196 = "อะ... อืม"
13020-197 = "แต่ว่า ทะ... ทำไมถึงปิดเรื่องนี้ไว้ล่ะรุ่นพี่?"
13020-199 = "คะ... คือว่า..."
13020-200 = "เดี๋ยวนะ... แต่มาพอคิดๆ ดูแล้ว มันก็ไม่ใช่เรื่องที่จู่ๆ จะมาบอกคนอื่นก่อนนี่เนอะ? ขอโทษนะ ฉันคิดน้อยไปหน่อยน่ะ"
13020-201 = "ไม่หรอกค่ะ เซริกะจัง..."
13020-202 = "จะว่าไป เนฟธิสกรุ๊ปก็ออกจากอะบิดอสไปแล้ว แต่รุ่นพี่โนโนมิก็ยังอยู่ที่นี่ต่อสินะ?"
13020-203 = "......"
13020-205 = "ถ้างั้นฉันจะขอสรุปสถานการณ์ก่อนนะคะ!"
13020-206 = "วันนี้ไคเซอร์ คอร์เปอเรชั่นขาย 45% ของหนี้อะบิดอสที่ตัวเองเป็นเจ้าของอยู่ในตลาดตราสารหนี้ค่ะ"
13020-207 = "และนั่นส่งผลให้เจ้าหนี้รายใหม่ของอะบิดอสมีเพิ่มมากขึ้น... ส่วนไคเซอร์ก็จะได้รายได้มหาศาลจาก#nการซื้อขายครั้งนี้ค่ะ"
13020-208 = "แล้วก็ยืนยันแล้วว่าผู้ที่เข้าซื้อพันธบัตรที่ให้กู้ยืมสิทธิ์อุตสาหกรรมโครงสร้างพื้นฐานของอะบิดอสก็คือ <เซนต์ เนฟธิส> ค่ะ"
13020-209 = "แถมยังซื้อในราคาสูงกว่าเดิมถึง 4-5 เท่าเลยด้วย..."
13020-210 = "ค่ะ ปัญหาก็คือทำไมทางนั้นถึงได้เข้ามาซื้อ... จากนี้ไปนี่คือสิ่งที่เราต้องตรวจสอบค่ะ"
13020-211 = "อายาเนะจัง ช่วยตรวจสอบสิทธิ์ของพันธบัตรที่เนฟธิสซื้อไปให้หน่อยได้ไหมคะ?"
13020-212 = "อ๊ะ... ได้ค่ะ...! "
13020-216 = "สิทธิ์พันธบัตรที่ว่ามีตั้งแต่สิทธิ์การเป็นเจ้าของอาคารและโครงสร้างพื้นฐานเฉพาะของเขตปกครองตน#nเองอะบิดอส... สิทธิ์ในการพัฒนา ไปจนถึงสิทธิ์ทุกอย่างในสิ่งอำนวยความสะดวกที่เกี่ยวข้องค่ะ"
13020-217 = "ได้สิทธิ์อื่นทั้งหมดยกเว้นแต่สิทธิ์การเป็นเจ้าของที่ดินสินะคะ แต่สิทธิ์การเป็นเจ้าของที่ดินก็คงจะเป็น#nของไคเซอร์เหมือนเดิม... "
13020-218 = "แล้ว <โครงสร้างพื้นฐานเฉพาะ> ที่ว่านี้มีอะไรบ้างเหรอคะ?"
13020-219 = "อ่า... โครงสร้างพื้นฐานด้านการคมนาคมที่มุ่งเป้าเรื่องโลจิสติกส์และสิ่งอำนวยความสะดวกเพิ่มเติมที่#nเกี่ยวข้องค่ะ..."
13020-220 = "โครงสร้างพื้นฐานด้านการคมนาคมและโลจิสติกส์? เขตปกครองตนเองของเรายังมีอะไรแบบนั้นอยู่อีก#nเหรอ?"
13020-225 = "<ทางรถไฟข้ามทะเลทราย> ..."
13020-226 = "ว่าไงนะ?!"
13020-227 = "โครงสร้างพื้นฐานที่สอดคล้องกันก็มีแค่ทางรถไฟค่ะ..."
13020-228 = "ตะ... แต่ว่า รุ่นพี่โนโนมิ... แต่ตรงนั้นมันไม่ต่างจากพื้นที่ทิ้งร้างที่ยังสร้างไม่เสร็จสมบูรณ์เลยนะ...? ทำไมถึงขายในราคาแพงลิบลิ่วขนาดนั้นล่ะ...?"
13020-229 = "เท่ากับว่าเนฟธิสมาซื้อคืนธุรกิจของตัวเองในราคาแพงหลายเท่าเอาตอนนี้ด้วยค่ะ..."
13020-230 = "ทำไมนะ? มีเป้าหมายอะไรกัน?"
13020-232 = "เรื่องนั้นฉันก็ไม่รู้ค่ะ..."
13020-233 = "ระ... หรือว่า...!?"
13020-238 = "หรือว่า... มีการขุดค้นพบน้ำมันที่นั่นน่ะ?"
13020-243 = "ไม่มีหรอก เซริกะจัง ถ้ามันมีน้ำมันที่นั่นจริงๆ อะบิดอสคงไม่ตกอยู่ในสภาพแบบนี้หรอก"
13020-244 = "หรือว่าจะเจอแร่ธาตุหายากที่เป็นที่พูดถึงตอนนี้... หรือจะเป็นเจอร์เมเนียมอะไรทำนองนั้น..."
13020-245 = "เซริกะจังนี่ก็~ ชอบทำตัวน่ารักแล้วมาพร้อมความคิดแปลกๆ แบบนี้อยู่เรื่อยเลย สมัยก่อนน่ะ ลุงคนนี้ไปพลิกแผ่นดินหามาหมดแล้วละว่ามีอะไรที่ทำเงินได้บ้าง"
13020-246 = "แต่ก็ไม่มีอะไรเลย ทั้งน้ำมัน ทรัพยากรใต้ดินที่มีค่า แร่หายาก เจอร์เมเนียมอะไรนั่นด้วย เขตปกครองตนเองของเราไม่มีอะไรเลย อีกอย่าง เจอร์เมเนียมก็ไม่ได้แพงด้วยนะ"
13020-248 = "ละ... แล้วคนพวกนั้นมาทำแบบนี้ทำไมล่ะ?"
13020-249 = "เรื่องนั้นเรายังไม่รู้กันหรอก อืม..."
13020-254 = "สัญญาณเตือน?"
13020-255 = "อะ... อะไรน่ะ จู่ๆ ก็มีสัญญาณเตือน!!"
13020-257 = "มีผู้บุกรุกค่ะ! พบปฏิกิริยาจากระเบิดในเขตปกครองตนเอง!!"
13020-258 = "อย่าบอกนะว่าเป็นพวกไคเซอร์ คอร์เปอเรชั่น...?!"
13020-259 = "มะ... ไม่ใช่ค่ะ! รูปแบบของการระเบิด... ไม่ใช่เป็นการโจมตี..."
13020-260 = "เหมือนการก่อสร้างมากกว่างั้นเหรอ? ดังมาจากเขตขุดค้นเหรอ อายาเนะจัง?"
13020-261 = "ไม่ใช่ค่ะ ตำแหน่งไม่ได้อยู่ที่เขตขุดค้น... แต่เป็นอีกฝั่งไปเลยค่ะ สักครู่นะคะ! "
13020-265 = "...... "
13020-266 = "ได้ข้อมูลแล้วค่ะ! ปะ... เป็นกลุ่มนักเรียนจากโรงเรียนอื่นค่ะ...! มีหลายสิบคนเลย... ส่วนโรงเรียนก็... เป็นโรงเรียนที่เราไม่เคยรู้จักมาก่อนค่ะ! "
13020-267 = "ว่าไงนะ?!"
13020-269 = "พวกนั้นคือ...!!"
13020-278 = "วะฮะฮะฮะฮ่า! รู้สึกดีชะมัด!"
13020-280 = "ตอนต่อไป;สถาบันการรถไฟไฮแลนเดอร์"

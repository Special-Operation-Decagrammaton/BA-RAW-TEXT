13020-148 = "3;노노미;02;네 맞아요. 아비도스는…… 예전에는 키보토스에서 가장 강력하고 거대한 학원이었다고 해요.\n#3;em;…"
13020-149 = "3;노노미;01;모든 학원들이 이곳을 두려워하고 또 선망해 온……. 가장 오래된 역사를 가진 가장 강력하고 위대한 학원……. 그게 예전의 우리 아비도스였다고 해요."
13020-150 = "3;노노미;13;뭐, 기상 이변이 발생하기도 전의, 아주 오래 전 이야기지만요~♧"
13020-151 = "3;노노미;13;……세인트 네프티스 컴퍼니는, 그런 아비도스의 전성기를 함께 해온 토착 기업이었어요."
13020-152 = "#all;hide"
13020-153 = "#na;노노미;하지만…… 결과적으로 기상 이변으로 사막화가 가속되면서, 네프티스의 운명은 아비도스와 함께 몰락해 갔어요."
13020-154 = "#all;hide"
13020-155 = "#na;노노미;그러다 <사막횡단철도>라는 실패한 사업을 위해 무리하게 자본을 끌어모았다가…… 파산 직전까지 몰려버렸고요."
13020-156 = "#all;hide"
13020-157 = "#wait;300"
13020-158 = "#na;노노미;결국 사업은 중단되고, 무리하게 끌어모은 자본은 곧 경제 위기라는 폭탄이 되어서 몰락해 가는 아비도스에 돌이킬 수 없는 타격을 주었고……."
13020-159 = "#na;노노미;그것이 연쇄효과를 일으켜서, 학생들과 주민들이 아비도스를 떠나기 시작했고…… 아비도스 학생회는 무리하게 빚을 내기 시작했고……."

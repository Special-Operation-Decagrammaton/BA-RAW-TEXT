[translation]
13020-1 = "Episode 2;Uninvited Guests"
13020-5 = "*cough* *cough* Ugh. The dust is getting in my throat."
13020-6 = "This the last one?"
13020-7 = "Should be. Why did they have to schedule a cargo transport now of all times? "
13020-8 = "*cough* These storage rooms haven't been touched in ages. "
13020-9 = "Seriously though. What's this place even for? "
13020-10 = "I guess they store inscriptions about academic industrial cooperation... Whatever that means. It's for important documents. "
13020-11 = "These ancient things are important? They wouldn't be sitting here collecting dust if that were true."
13020-12 = "Eh. Doesn't matter either way. Let's just get this over with. The boxes in that corner are marked for disposal."
13020-13 = "Are you sure? Maybe we should open them up and double check... "
13020-14 = "It'll be fine. We're on a tight schedule, so get a move on."
13020-15 = "If you say— Eek?!"
13020-20 = "M-Move! Those shelves are gonna fall!"
13020-21 = "How did the supports break?! What did you do?"
13020-22 = "M-Me?! I didn't even touch it!"
13020-27 = "Whoa. That was a close one."
13020-28 = "How does a metal shelf just snap like that?"
13020-29 = "More importantly, how're we going to clean this all up?"
13020-30 = "Huh? What's this?"
13020-34 = "Ugh. I can't believe this... What're you looking at?"
13020-35 = "I don't know. A document that fell out of one of the boxes."
13020-36 = "A sales contract of some kind? From Abydos High School?"
13020-37 = "Huh?"
13020-53 = "Is this the place?"
13020-59 = "That student must be...the vice president..."
13020-60 = "..."
13020-61 = "She's still persevering, all by herself. But...why...?"
13020-62 = "Huh?"
13020-69 = "Hm. I thought someone was there."
13020-70 = "..."
13020-71 = "Must've been my imagination..."
13020-73 = "*sigh*"
13020-74 = "Th-That was too close."
13020-75 = "I heard she's a generational talent and all that, but how'd she notice me?!"
13020-76 = "Generational talent? What else did you hear?"
13020-78 = "I heard that Hoshino is—"
13020-82 = "?!"
13020-84 = "Wow. You know my name too?"
13020-86 = "A-About that! You see...!"
13020-87 = "You know me, but I don't know you. What's your business here?"
13020-88 = "I-I..."
13020-89 = "Nothing? Are you a spy? Who sent you? State your affiliation and year."
13020-90 = "I'm sure you've heard the rumors. You might be older than me, but I won't go easy on you."
13020-91 = "...M-Me? N-No, I'm not—"
13020-92 = "Wait. I know that school emblem."
13020-93 = "Y-Yup! I'm from the Abydos District too..."
13020-94 = "A-And I'm actually younger than you... I'm graduating middle school this year."
13020-98 = "You? A middle schooler? You look way older than me."
13020-99 = "Aha...haha..."
13020-100 = "Oh, right. I know where I've seen it. Nephthys Private Middle School?"
13020-101 = "Y-Yup! That's me...!"
13020-102 = "That doesn't explain much though. The Nephthys main office left the district ages ago, and all affiliated schools along with it."
13020-103 = "..."
13020-104 = "We're scheduled to close after my graduation. I'll be the last graduating class..."
13020-108 = "...Nephthys Private Middle School. "
13020-109 = "An elite private school owned and operated by the Nephthys Group."
13020-110 = "I get it now. I did hear that the Nephthys Group successor was around middle school age."
13020-112 = "..."
13020-113 = "So why haven't you left the district yet, Izayoi Nonomi?"
13020-117 = "Taking one last tour before you leave? Doesn't matter either way, I guess."
13020-118 = "But what's the infamous Nephthys Group's precious little daughter bothering me for? Or are you after the school?"
13020-119 = "I-I..."
13020-120 = "If Nephthys is trying to come after this school..."
13020-121 = "...?!"
13020-122 = "Their little successor is going to find out just how easily a halo can shatter."
13020-123 = "I-I'm sorry... I..."
13020-124 = "I...!"
13020-135 = "...I went a little too far."
13020-137 = "..."
13020-138 = "Nephthys..."
13020-139 = "[s] \"The Nephthys Group...\""
13020-140 = "Can you explain already, Ayane? What's with this Nephthys thing buying up our bonds?!"
13020-141 = "That's... Well..."
13020-142 = "Saint Nephthys Company, or Nephthys Group..."
13020-144 = "It's a business that started out in Abydos and grew like crazy. It was one of the most successful companies in all of Kivotos at one point."
13020-145 = "All of Kivotos? From Abydos?!"
13020-146 = "Mm. You're underestimating how influential Abydos was in the past."
13020-148 = "She's right. Abydos was...the best of the best."
13020-149 = "Once upon a time, we were a force to be reckoned with. We were an academy with a rich history, the strongest students, and the best education. Once upon a time..."
13020-150 = "Well, then the sandstorms happened, and you know the rest!"
13020-151 = "And during that golden age, the Saint Nephthys Company flourished right alongside Abydos High School."
13020-153 = "But the sand...wouldn't stop coming. The desertification of the district bled us dry, and Nephthys came tumbling down along with Abydos."
13020-155 = "The Trans-Desert Railway was a desperate attempt to bring in more commerce to the area...but it was too late. The venture nearly bankrupted them."
13020-158 = "Business came to a screeching halt, and Nephthys spread their money too thin trying to make up for it. The result was an economic collapse that Abydos...well, it simply couldn't recover from."
13020-159 = "The Abydos Student Council did the best it could to offset the fallout, but both students and residents left Abydos in a mass exodus."
13020-161 = "And after all that...Nephthys decided to cut its losses. The company sold off all its business interests and left Abydos behind."
13020-162 = "Them's the breaks! By the time I started my first year, Nephthys was just a bad memory."
13020-164 = "So you're telling me our district got totally screwed because of Nephthys' greed?!"
13020-165 = "Hold your horses, Serika. They were just one piece in a long domino of disasters."
13020-166 = "It's okay, Hoshino. She's entirely correct. Nephthys took a dangerous risk, and it was Abydos that paid the consequences."
13020-167 = "Nephthys was the final nail in the coffin that entombed Abydos."
13020-168 = "It was the core of Abydos' downfall. The antagonist in the story."
13020-169 = "And my family was its founder."
13020-174 = "Wh-Wh-What?!"
13020-175 = "..."
13020-176 = "Yes... I'm the successor to the Saint Nephthys Group."
13020-177 = "[s] \"Nonomi...\""
13020-181 = "...I sort of knew. "
13020-182 = "Y-You did, Ayane?! And you didn't tell me this entire time?"
13020-183 = "No, no. It was just from the context clues. Her gold card was the initial indicator. But then..."
13020-185 = "The trans-desert railway was the project that accelerated the downfall of Abydos..."
13020-186 = "If we can use it to save the world... There would be nothing more gratifying for me. ♧"
13020-187 = "..."
13020-189 = "And when Nonomi was able to access the railway system, that essentially confirmed it for me."
13020-190 = "S-So I was the only one who didn't know?! What about Hoshino and Shiroko?"
13020-195 = "Oh, okay. Good. Shiroko didn't know either."
13020-196 = "U-Um."
13020-197 = "But WHY would you hide that this whole time?"
13020-199 = "W-Well, I... Um..."
13020-200 = "Ack! Sorry, that was super insensitive of me. I guess it's not the easiest thing to just bring up out of nowhere."
13020-201 = "Don't worry, Serika."
13020-202 = "And at the end of the day, you stayed! You had every reason to leave with Nephthys, but you stayed this whole time."
13020-203 = "..."
13020-205 = "With that settled, I'll present the facts of the case."
13020-206 = "The Kaiser Corporation sold off 45% of Abydos bonds to the black market today."
13020-207 = "Kaiser likely made an exorbitant profit with these sales...and we now have a huge increase in creditors."
13020-208 = "I've confirmed that Saint Nephthys bought up all the derivative bonds that were previously loaned out using Abydos' industrial facilities as collateral."
13020-209 = "At four to five times its original value, no less..."
13020-210 = "Which begs the question as to why... I'll have to look into it."
13020-211 = "Would you be able to look at the collateral rights for the derivative bonds Nephthys purchased?"
13020-212 = "Yes! Let me see..."
13020-216 = "The collateral appears to include the following: development rights, ownership of specific facilities and infrastructure, as well as all ancillary facilities."
13020-217 = "Essentially everything except real estate. That's expected. Kaiser wouldn't let go of that so easily."
13020-218 = "Do you know which facilities were included?"
13020-219 = "I saw it somewhere... Here! Infrastructure for transportation and its subsidiary facilities..."
13020-220 = "Since when did we have transportation stuff left over?"
13020-225 = "...The Trans-Desert Railway."
13020-226 = "What?!"
13020-227 = "There's nothing else in the district that fits the description."
13020-228 = "B-But that doesn't make any sense! Why would they buy a project they left to rot in the desert? And for five times the price they sold it for?"
13020-229 = "It makes no sense on a business level. There has to be a motive we're not seeing..."
13020-230 = "What could they possibly be trying to achieve?"
13020-232 = "...It's incomprehensible. I can't think of a single justification."
13020-233 = "W-Wait! What if...?"
13020-238 = "What if they found an oil reservoir deep under the construction sites?"
13020-243 = "No chance, Serika. If that were even remotely possible, Abydos wouldn't be a ghost town right now."
13020-244 = "O-Okay. Well, what if it's some kind of super rare gem? Or element? Maybe they found germanium!"
13020-245 = "You're as silly as you are adorable, Serika. I promise this desert's been squeezed of every last drop of value it could possibly hold."
13020-246 = "And it's not like people didn't try. There was just nothing to be found. No oil, no super rare gems, no germanium... Wait, Serika, germanium isn't really worth anything to begin with."
13020-248 = "W-Well, it's not like anyone else is coming up with an explanation!"
13020-249 = "It really is a mystery..."
13020-254 = "The emergency alarm?"
13020-255 = "Wh-What happened?!"
13020-257 = "There's been explosions within the district! Intruders!"
13020-258 = "Kaiser?! Is it Kaiser?"
13020-259 = "I-It doesn't appear so! They're not targeting any buildings or causing any particular destruction."
13020-260 = "Controlled detonations, maybe? Were they near the excavation site?"
13020-261 = "It doesn't appear so... Wait! One moment..."
13020-265 = "..."
13020-266 = "I found them!#nStudents from another academy?! I haven't seen those uniforms before...and there's dozens of them! "
13020-267 = "What?!"
13020-269 = "It appears that they're..."
13020-278 = "Pahyahyahya! That felt great!"
13020-280 = "Next Episode;Highlander Railroad Academy"

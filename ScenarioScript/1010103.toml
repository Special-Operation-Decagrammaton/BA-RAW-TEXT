1010103-15 = "3;사오리 수영복;02;물론, 다른 사람이 작곡한 음악이니 저작권료를 주고 사용 허가를 받아야 한다.\n#3;em;[반응]"
1010103-16 = "3;사오리 수영복;00;<DJ 입문 가이드>에 그렇게 쓰여 있었지."
1010103-17 = "3;사오리 수영복;06;하지만, 나는 저작권료를 지불할 만큼의 돈이 없어서…….\n#3;stiff"

[translation]
1010103-1 = "尋找慶典的聲音"
1010103-4 = "啊，老師，我在這裡。"
1010103-5 = "謝謝你答應幫忙。"
1010103-6 = "[s]「你剛才說有別的事情要找我，對吧？」"
1010103-7 = "沒錯，雖然這次的事也跟打工有關……"
1010103-8 = "我正在準備慶典的DJ表演，但是現在需要一點幫助。"
1010103-9 = "包括唱盤在內的器材都已經準備完畢，不過卻缺少了最重要的取樣片段。"
1010103-10 = "你問取樣片段是什麼？"
1010103-11 = "啊，DJ通常會以既有的音樂來混音或改編，並製作出全新的樂曲。"
1010103-12 = "而這個過程就叫做取樣。"
1010103-13 = "所以無論有多好的器材……只要沒有適合的取樣片段，表演就無法開始。"
1010103-14 = "[s]「那取樣片段該去哪裡找呢？」"
1010103-15 = "取樣片段通常是別人製作的音樂，#n因此使用時不僅需要取得作者的同意，同時也要支付版權費……"
1010103-16 = "《DJ入門指南》裡是這麼寫的。"
1010103-17 = "不過因為我沒有錢支付版權費……"
1010103-18 = "所以我打算自己尋找可以取樣的音樂。"
1010103-19 = "[s]「意思是說你要自己作曲嗎？」"
1010103-20 = "唔嗯，可以的話那當然再好不過，但是以我的能力實在沒辦法作曲。"
1010103-21 = "所以我打算去找能代替樂曲使用的各種聲音，並把它們錄下來。"
1010103-22 = "慶典會場附近什麼事都有可能發生，因此能取樣的聲音也很多。"
1010103-23 = "換句話說，我打算就地取材。"
1010103-24 = "[s]「嗯，那我也來幫你。」"
1010103-25 = "謝謝你。"
1010103-29 = "那我們就去慶典會場附近逛逛吧。"
1010103-33 = "唔，該先去什麼地方好呢……"
1010103-34 = "老師有什麼想法嗎？"
1010103-35 = "[s]「要不要先去那邊的小吃攤看看？」"
1010103-36 = "有道理。#n既然連這個距離都能感受到那裡的活力……"
1010103-37 = "我相信那裡一定有很多不錯的聲音。"
1010103-44 = "歡迎光臨！#n烤魷魚、雞肉串、炒麵……這裡各式各樣的東西都有！"
1010103-45 = "而且全都便宜又好吃喔！"
1010103-46 = "[s]「我光聽就覺得肚子餓了。」"
1010103-52 = "烹飪的聲音……"
1010103-53 = "嗯，應該能派上用場。"
1010103-57 = "那我先把它錄下來。"
1010103-58 = "……嗯？"
1010103-59 = "老師，這是……雞肉串？要請我吃嗎？"
1010103-60 = "沒，沒關係。#n老師今天是特地來幫忙的，要是還讓你請客的話……"
1010103-61 = "[s]「這是感謝你讓我欣賞取樣過程的謝禮。」"
1010103-62 = "唔嗯，這又不是什麼了不起的事，說是謝禮實在有點……"
1010103-63 = "不過如果只錄音卻不買東西吃的話，對老闆好像也不太禮貌。"
1010103-64 = "謝謝你，老師。下次就換我來請吧。"
1010103-68 = "大海……"
1010103-69 = "對了，海浪規律的拍打聲也是個不錯的取樣對象。"
1010103-73 = "好，把錄音機打開……"
1010103-77 = "唔嗯，不知道是不是距離太遠，好像錄不太到。"
1010103-78 = "[s]「可以讓我幫忙嗎？」"
1010103-79 = "嗯？老師？#n雖然只要按下按鍵就能開始錄音，不過你打算怎麼做……？"
1010103-86 = "你怎麼把鞋子脫掉……還跑進水裡！？"
1010103-87 = "[s1]「冰冰涼涼的真舒服。」\n[s2]「這樣錄的效果應該會更好吧？」"
1010103-90 = "如果老師不介意的話，我當然感激不盡。"
1010103-91 = "這樣又多收集到了一個取樣片段──"
1010103-95 = "[ns]「哇！」"
1010103-101 = "老師，你沒事吧！？怎麼突然跌進水裡了！"
1010103-102 = "[s]「我沒事，只是不小心踩空而已。」"
1010103-103 = "不過你的衣服都溼了，得先找個曬衣服的地方才行……"
1010103-104 = "嗯？你說什麼？"
1010103-105 = "剛才下意識地把手抬高了，所以不用擔心錄音機會進水？"
1010103-106 = "咳哼，在這種狀況下，我覺得老師還是應該先擔心自己比較好。"
1010103-107 = "要是老師因此感冒的話，我可就沒臉見你了。"
1010103-108 = "……話雖如此，還是謝謝你，老師。#n這樣就能繼續收集取樣片段了。"
1010103-114 = "這次是海邊的森林嗎……"
1010103-118 = "才剛踏進森林沒幾步，就已經被蟲鳴和鳥叫聲包圍了呢。"
1010103-119 = "[s]「這個聲音也能用嗎？」"
1010103-120 = "這就得等試過才知道了。#n因此我打算先多收集一些聲音。"
1010103-124 = "好，我們就安靜地往前走一會吧。"
1010103-131 = "……像這樣安靜地走著，感覺還挺奇妙的呢。"
1010103-132 = "既不用追趕任何事物，也不用被任何人追趕，更不用為了趕時間而疲於奔命。"
1010103-133 = "仔細想想，我好像從來沒有度過這麼悠閒的時光。"
1010103-134 = "畢竟這段期間一直都在忙著打工啊。"
1010103-135 = "[s]「如果你想要散步的話，隨時都可以找我。」"
1010103-139 = "……就知道老師會這麼說。"
1010103-140 = "嗯，我會記住你這句話的。"
1010103-151 = "呼，時間竟然已經這麼晚了。"
1010103-152 = "我們好像也差不多該道別了。"
1010103-153 = "[s]「竟然為了打工做到這種地步，沙織還真認真呢。」"
1010103-154 = "打工……對，對哦，我今天是為了打工才會……"
1010103-155 = "謝謝老師的提醒，我差點就忘得一乾二淨了。"
1010103-156 = "會忘記任務就代表我放下了心防……這是為什麼呢？"
1010103-161 = "原來如此，我鬆懈的原因……"
1010103-162 = "[s]「是什麼呢？」"
1010103-166 = "這，這是機密。"
1010103-167 = "總，總之我之後會把用這些素材製作的音樂傳給你聽。#n畢竟想將聲音製作成音樂的話，還需要再進行一些修正。"
1010103-168 = "時間也不早了，我們就在這裡道別吧。"
1010103-174 = "辛苦你了，老師。謝謝你今天陪我。"

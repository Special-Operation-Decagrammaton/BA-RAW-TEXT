[translation]
1010103-1 = "In Search of the Festival Sounds"
1010103-4 = "Ah, Sensei. Right here."
1010103-5 = "Thanks for coming."
1010103-6 = "[s] \"You got a new job?\""
1010103-7 = "Yes, exactly. But some problems have arisen with it."
1010103-8 = "I'll be DJing in the festival for this job. I was hoping you could help me with something, though."
1010103-9 = "I've already prepared all of the equipment, including the turntable. However, I still don't have the most important part: a sample."
1010103-10 = "You don't know what a sample is?"
1010103-11 = "DJs will splice parts of existing audio tracks and modify or mash them up with other tracks. That's how they make new mixes."
1010103-12 = "They call it \"sampling.\""
1010103-13 = "I can use the fanciest equipment in the world, but it won't matter at all if I don't have the right tracks for my performances."
1010103-14 = "[s] \"How does one obtain audio tracks?\""
1010103-15 = "You have to get permission from whoever composed it, which means negotiating and paying royalties."
1010103-16 = "That's what's written in \"The DJ Beginner's Guide.\""
1010103-17 = "However, I don't have the funds for royalties."
1010103-18 = "Instead, I've decided I'll find audio to sample myself."
1010103-19 = "[s] \"You're going to compose your own music?\""
1010103-20 = "Um...I'd love to, but composing is likely beyond my capabilities."
1010103-21 = "Instead, I was planning on recording sounds from around the area to use for my tracks."
1010103-22 = "Festival grounds are always bustling with activity, so I believe I'll be able to find a wide variety of sounds I can sample."
1010103-23 = "Put simply, I'll source them locally."
1010103-24 = "[s] \"Good idea! I'll help.\""
1010103-25 = "Thank you."
1010103-29 = "Then, let's head into the festival grounds."
1010103-33 = "Um, where should be our first target?"
1010103-34 = "What do you think, Sensei?"
1010103-35 = "[s] \"How about that food stall over there?\""
1010103-36 = "Right. There's a boisterous environment around it."
1010103-37 = "There'll likely be some good sounds we can sample."
1010103-44 = "Welcome! Grilled squid, chicken skewers, yakisoba, anything you want!"
1010103-45 = "Cheap, cheap prices! Delicious quality!"
1010103-46 = "[s] \"I'm suddenly getting hungry...\""
1010103-52 = "The sizzle of cooking food..."
1010103-53 = "I think this is usable."
1010103-57 = "I just need to record it."
1010103-58 = "...Hm?"
1010103-59 = "What're you doing, Sensei? You're...buying me a chicken skewer?"
1010103-60 = "N-No, no. You're already doing me a favor, I should be buying you one..."
1010103-61 = "[s] \"Consider this my thanks for letting me watch you get samples.\""
1010103-62 = "Um... I wouldn't say that's worthy of appreciation, but..."
1010103-63 = "It would be disrespectful to record here without purchasing something from the merchant."
1010103-64 = "Thank you, Sensei. I'll be sure to pay you back."
1010103-68 = "The beach..."
1010103-69 = "The waves crashing on the shore will make for an excellent sample."
1010103-73 = "Let's see...my recorder..."
1010103-77 = "Um, we're a little too far, I think. The audio quality is rather poor."
1010103-78 = "[s] \"Is it okay if I help?\""
1010103-79 = "Huh? What do you mean, Sensei? Recording just requires me to push this button..."
1010103-86 = "Why're you removing your shoes? You're...going in the water?!"
1010103-87 = "[s1] \"It feels nice and cool.\"\n[s2] \"Isn't this the best way to record?\""
1010103-90 = "As long as you're okay with it, I'm very grateful, Sensei."
1010103-91 = "Another sample record—"
1010103-95 = "[ns] \"Whoa!\""
1010103-101 = "You fell so suddenly! Are you okay, Sensei?!"
1010103-102 = "[s] \"I just tripped. It's okay.\""
1010103-103 = "You say that, but your clothes are soaked. We need to find somewhere for you to dry off."
1010103-104 = "Huh? What do you want me to look at?"
1010103-105 = "Oh, the recorder. You managed to keep it dry when you fell..."
1010103-106 = " You need to learn to prioritize your own well being, Sensei."
1010103-107 = "I'd feel very guilty if you were to catch a cold."
1010103-108 = "...Regardless, I appreciate all your effort, Sensei. It's thanks to you that I can continue collecting samples."
1010103-114 = "And now, the seaside forest."
1010103-118 = "We've just entered the terrain, yet the sounds of insects chirping are already so loud."
1010103-119 = "[s] \"Will they work for a sample?\""
1010103-120 = "The only way to know is to try. I'd like to have a wide variety of sounds to work with."
1010103-124 = "Let's proceed as quietly as possible."
1010103-131 = "It feels foreign to just go on a leisurely stroll like this."
1010103-132 = "I'm not in pursuit, being pursued, nor scrambling to make a deadline."
1010103-133 = "Upon reflection, I don't believe that kind of leisure has ever been an option for me."
1010103-134 = "I've always had a job to preoccupy me."
1010103-135 = "[s] \"If you ever want to go on a walk, just call me.\""
1010103-139 = "That's a very typical response from you, Sensei."
1010103-140 = "I'll keep that in mind."
1010103-151 = "Time went very quickly today."
1010103-152 = "It's about time for us to say good night."
1010103-153 = "[s] \"You're always so diligent, going this far for a part-time job.\""
1010103-154 = "Ah, right... This was all for my work..."
1010103-155 = "Thank you for the reminder. It nearly slipped my mind."
1010103-156 = "I must be truly relaxed, to be forgetting my mission. The source of that..."
1010103-161 = "I see... The reason I'm so relaxed..."
1010103-162 = "[s] \"What is it?\""
1010103-166 = "Consider it a business secret."
1010103-167 = "A-Anyways... I'll create a finished product with the samples we collected and send it to you. I'll need to turn everything into an actual song with some post-processing."
1010103-168 = "Let's say our farewells. It's late."
1010103-174 = "Thank you for your time today, Sensei."

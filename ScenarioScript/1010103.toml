[translation]
1010103-1 = "เสียงในงานเทศกาล"
1010103-4 = "อ๊ะ ครู ทางนี้"
1010103-5 = "ขอบคุณที่มาช่วยนะ"
1010103-6 = "[s] \"เห็นว่ามีงานต้องไปทำเหรอ?\" "
1010103-7 = "ใช่แล้วละ รอบนี้ก็เป็นเรื่องงานพาร์ทไทม์อีกเหมือนกัน..."
1010103-8 = "ในงานเทศกาลจะมีการแสดงดนตรีของดีเจน่ะ ฉันเองก็ช่วยเตรียมงานอยู่ แต่ก็มีเรื่องที่อยากขอให้#nช่วยหน่อย"
1010103-9 = "อุปกรณ์ต่างๆ และเครื่องเล่นแผ่นเสียงก็เตรียมไว้หมดแล้ว แต่ที่สำคัญที่สุดคือเราไม่มีเพลงแซมเพิล"
1010103-10 = "เพลงแซมเพิลคืออะไรงั้นเหรอ?"
1010103-11 = "อ้อ ปกติแล้วดีเจจะเอาเพลงที่มีอยู่แล้วมามิกซ์หรือดัดแปลงเพื่อให้เป็นเพลงใหม่น่ะ"
1010103-12 = "นั่นเรียกว่าการแซมพลิง"
1010103-13 = "ต่อให้มีอุปกรณ์คุณภาพดีแค่ไหน แต่ถ้าไม่มีเพลงดีๆ ก็ทำการแสดงไม่ได้หรอก"
1010103-14 = "[s] \"แล้วจะหาเพลงได้ยังไงเหรอ?\""
1010103-15 = "ถ้าเป็นเพลงที่คนอื่นแต่ง เราก็ต้องจ่ายค่าลิขสิทธิ์แล้วขออนุญาตใช้เพลงนั้น"
1010103-16 = "รายละเอียดนี้มีเขียนไว้ใน <คู่มือดีเจเบื้องต้น> น่ะ"
1010103-17 = "แต่ว่าฉันไม่มีเงินพอที่จะจ่ายค่าลิขสิทธิ์..."
1010103-18 = "ฉันก็เลยคิดว่าจะหาเพลงที่จะเอามาแซมพลิงเองน่ะ"
1010103-19 = "[s] \"แปลว่าจะแต่งเพลงเองเหรอ?\""
1010103-20 = "อืม ถ้าทำได้อย่างนั้นก็ดีหรอกนะ แต่ฉันคงแต่งเพลงไม่ไหวหรอก"
1010103-21 = "ฉันก็เลยคิดว่าจะออกไปบันทึกเสียงต่างๆ ที่พอจะเอามาใช้แทนเสียงเพลงได้"
1010103-22 = "มีเรื่องเกิดขึ้นมากมายในงานเทศกาล งั้นก็น่าจะมีเสียงที่พอจะเอามาใช้เป็นเพลงแซมเพิลได้เยอะ#nเหมือนกัน"
1010103-23 = "มันก็คล้ายๆ การหาวัตถุดิบในท้องถิ่นน่ะ"
1010103-24 = "[s] \"ดีเลย งั้นครูจะช่วยเอง\""
1010103-25 = "ขอบคุณนะ"
1010103-29 = "งั้นเราเข้าไปในสถานที่จัดงานเทศกาลกันเถอะ"
1010103-33 = "อืม ควรเริ่มจากที่ไหนก่อนนะ..."
1010103-34 = "ครูมีไอเดียดีๆ บ้างมั้ย?"
1010103-35 = "[s] \"ไปร้านอาหารแผงลอยตรงโน้นกันก่อนมั้ย?\""
1010103-36 = "อืม ดูจากไกลๆ ก็ดูมีชีวิตชีวานะ"
1010103-37 = "อาจจะได้เสียงดีๆ จากตรงนั้นก็ได้"
1010103-44 = "เชิญครับ! เรามีทุกอย่างเลยครับ ทั้งปลาหมึกย่าง ไก่เสียบไม้ ยากิโซบะก็มีนะครับ!"
1010103-45 = "เชิญมาทานอาหารราคาประหยัด รสชาติอร่อยเลยครับ!"
1010103-46 = "[s] \"แค่ฟังก็หิวแล้วแฮะ\""
1010103-52 = "เสียงทำอาหาร..."
1010103-53 = "อืม น่าจะเอาไปใช้ได้นะ"
1010103-57 = "งั้นฉันจะบันทึกเสียงจากที่นี่แล้วกัน"
1010103-58 = "หืม...?"
1010103-59 = "ครู นี่มัน... ไก่เสียบไม้นี่นา? ซื้อให้ฉันเหรอ?"
1010103-60 = "มะ... ไม่เห็นต้องซื้อเลย วันนี้ครูมาช่วยฉันแท้ๆ ถ้าจะซื้อ ฉันควรเป็นคนซื้อสิ..."
1010103-61 = "[s] \"นี่เป็นของตอบแทนที่ครูได้เห็นซาโอริแซมพลิงเพลงน่ะ\""
1010103-62 = "อืม ฉันไม่ได้ทำอะไรยิ่งใหญ่ขนาดที่ต้องได้รับของตอบแทนนะ..."
1010103-63 = "จะว่าไป การบันทึกเสียงก็อาจจะเป็นการเสียมารยาทกับพ่อค้าแม่ค้าก็ได้..."
1010103-64 = "ขอบคุณนะครู คราวหน้าฉันจะซื้อให้เองนะ"
1010103-68 = "ทะเล..."
1010103-69 = "จริงสิ เสียงคลื่นที่ซัดสาดเป็นจังหวะก็น่าจะเป็นเสียงแซมเพิลที่ดีเลยนะ"
1010103-73 = "ไหนลองเปิดเครื่องบันทึกเสียงซิ..."
1010103-77 = "อืม อาจเป็นเพราะเราอยู่ไกลเกินไป ก็เลยบันทึกเสียงได้ไม่ดีเท่าไรแฮะ"
1010103-78 = "[s] \"ให้ครูช่วยได้มั้ย?\""
1010103-79 = "หืม? ครูเหรอ? แต่นี่เป็นงานง่ายๆ ฉันแค่ต้องกดปุ่มบันทึกเสียงก็เท่านั้นเอง... ว่าแต่ครูจะช่วยยังไง?"
1010103-86 = "ถอดรองเท้า... แล้วลงไปบันทึกเสียงในทะเลเหรอ?!"
1010103-87 = "[s1] \"มันน่าจะสดชื่นดีนะ ให้ครูไปเถอะ\"\n[s2] \"น่าจะบันทึกเสียงได้ชัดกว่าเดิมนะ\""
1010103-90 = "ถ้าครูจะทำแบบนั้นให้ ฉันก็จะขอบคุณเลยละ"
1010103-91 = "งั้นก็บันทึกเสียงแซมเพิลอีก—"
1010103-95 = "[ns] \"เหวอ!\""
1010103-101 = "ครู เป็นอะไรหรือเปล่า?! หกล้มจนลงไปจุ่มน้ำทะเลแล้ว!"
1010103-102 = "[s] \"ไม่เป็นไรๆ ครูแค่ก้าวพลาดนิดเดียวน่ะ\""
1010103-103 = "แต่เสื้อผ้าของครูเปียกหมดแล้วนะ ต้องไปหาที่ผึ่งตัวให้แห้งแล้ว..."
1010103-104 = "หืม? ว่าไงนะ?"
1010103-105 = "ครูยกมืออย่างอัตโนมัติตอนที่ล้ม เครื่องบันทึกเสียงก็เลยไม่เปียกน้ำอย่างงั้นเหรอ...?"
1010103-106 = "ฮึ่ม ต่อให้เป็นอย่างนั้นก็เถอะ แต่ยังไงครูก็ควรเป็นห่วงตัวเองก่อนนะ"
1010103-107 = "ถ้าครูเป็นหวัดขึ้นมา ฉันคงไม่มีหน้าไปเจอครูอีกแน่ๆ"
1010103-108 = "แต่ยังไงก็... ขอบคุณนะครู ถ้าเครื่องไม่เสียหาย ฉันก็น่าจะบันทึกเสียงแซมเพิลต่อได้น่ะ"
1010103-114 = "ครั้งนี้เป็นเสียงในป่าข้างชายหาดงั้นเหรอ..."
1010103-118 = "เราเดินเข้ามาแค่ไม่กี่ก้าวเอง แต่ก็ได้ยินเสียงแมลงดังก้องเลยนะ"
1010103-119 = "[s] \"เสียงในป่าก็ใช้ได้มั้ย?\""
1010103-120 = "อืม คงต้องลองบันทึกไปฟังดูก่อน ฉันว่าจะบันทึกเสียงหลายๆ อย่างแล้วค่อยไปเลือกน่ะ"
1010103-124 = "งั้นเราก็เดินเงียบๆ กันสักพักแล้วกัน"
1010103-131 = "พอได้มาเดินแบบนี้ ก็เกิดความรู้สึกแปลกๆ แฮะ..."
1010103-132 = "ฉันไม่จำเป็นต้องไล่ล่าบางสิ่งบางอย่าง ฉันไม่ต้องถูกใครไล่ล่า แล้วก็ไม่ต้องวิ่งวุ่นทำอะไรให้ทันตาม#nเวลาด้วย"
1010103-133 = "มาคิดดูแล้ว ฉันยังไม่เคยมีเวลาชิลๆ แบบนี้มาก่อนเลย"
1010103-134 = "ปกติก็จะยุ่งอยู่แต่กับงานพาร์ทไทม์น่ะ"
1010103-135 = "[s] \"ถ้าอยากออกมาเดินเล่น ก็เรียกครูได้ตลอดเลยนะ\""
1010103-139 = "กะไว้แล้วว่าครูต้องพูดแบบนี้..."
1010103-140 = "อืม ฉันจะจำเอาไว้"
1010103-151 = "เวลาล่วงเลยมาขนาดนี้แล้วเหรอเนี่ย"
1010103-152 = "เราคงต้องบอกลากันเท่านี้แล้วละ"
1010103-153 = "[s] \"ซาโอริทุ่มเทเพื่องานพาร์ทไทม์ขนาดนี้เลยสินะ ขยันจังเลย\""
1010103-154 = "เพื่องานพาร์ทไทม์... จะ... จริงสินะ ฉันกำลังทำเพื่องานพาร์ทไทม์..."
1010103-155 = "ขอบคุณที่เตือนฉันนะ ฉันเกือบลืมไปแล้วละ"
1010103-156 = "การลืมไปว่ากำลังทำงานอยู่คือการพิสูจน์ว่าเราสบายใจอยู่... เพราะอะไรกันนะ..."
1010103-161 = "หรือว่า... สาเหตุที่ฉันรู้สึกสบายใจ..."
1010103-162 = "[s] \"ก็คือ...?\""
1010103-166 = "อืม มันเป็นความลับในการทำงานน่ะ"
1010103-167 = "อ่า เอาไว้คราวหน้าฉันจะให้ฟังเพลงจากเสียงที่บันทึกได้วันนี้นะ ตอนนี้ฉันต้องไปจัดการเสียงพวกนี้#nก่อน"
1010103-168 = "นี่ก็เย็นมากแล้ว ฉันคงต้องกลับแล้วละ"
1010103-174 = "ขอบคุณที่มาช่วยกันวันนี้นะครู"

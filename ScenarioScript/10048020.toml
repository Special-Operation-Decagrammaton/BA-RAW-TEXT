[translation]
10048020-1 = "ตอนที่ 2;ลองฟังดูสิ"
10048020-2 = "ภายในหอพัก ชมรมการค้าพิเศษ"
10048020-5 = "[ns] \"ไปฝังใคร... ไม่สิ ไปฝังอะไรไว้งั้นเหรอ?\""
10048020-6 = "อ่าาา! ไม่ใช่อย่างที่คุณครูคิดนะคะ!"
10048020-7 = "ไปหว่านไว้ต่างหาก! ใช่แล้วละ จะบอกว่าไปหว่านไว้แล้วใช่มั้ยคะ ริตสึจัง?"
10048020-8 = "อื้อ ใช่เลย! หว่านมาเรียบร้อยแล้ว!"
10048020-9 = "ฉันเอาพวกสินค้าไปหว่านไว้ในจุดที่มิโยะจังบอกมาแล้วน่ะ!"
10048020-10 = "ทะ... ทำได้ดีมากค่ะ...!"
10048020-11 = "คงเหนื่อยน่าดูเลยนะ ริตสึจัง"
10048020-12 = "ขอบใจนะ!"
10048020-13 = "หืม? คนนี้คือใครเหรอ?"
10048020-14 = "[s] \"สวัสดี ครูเป็นครูจากชาเล่ต์น่ะ\""
10048020-15 = "สวัสดีค่ะ! ฉันชื่ออุสุบะ ริตสึ!"
10048020-16 = "งานอดิเรกคือการค้า! ความสามารถพิเศษก็คือการค้า!"
10048020-17 = "ส่วนวิชาเอกก็ประติมากรรม!"
10048020-18 = "[s] \"ฝะ... ฝากตัวด้วยนะ!\""
10048020-19 = "จะว่าไป ฉันเคยเห็นคุณครูจากในข่าวด้วยนะ! "
10048020-20 = "เห็นว่าวิ่งตัดทุ่งแบบไม่ใส่อะไรเลย...!"
10048020-21 = "[s] \"เรื่องนั้น...! ครูปฏิเสธไม่ได้เลยแฮะ...!\""
10048020-22 = "ตอนเห็นข่าว ฉันทึ่งไปเลยละ นอกไวลด์ฮันต์ก็ทำเรื่องแบบนี้ได้สินะ!"
10048020-23 = "[s] \"ในไวลด์ฮันต์ก็ทำเรื่องแบบนี้ได้เหรอ...?\""
10048020-24 = "ใช่ว่าโรงเรียนเราจะไม่มีเด็กที่แสดงออกในทางศิลปะนี่คะ..."
10048020-25 = "คุณครูไม่ค่อยมีเสื้อผ้าจะใส่เหรอ?"
10048020-26 = "ให้ฉันหาให้มั้ย?"
10048020-27 = "[s] \"ขอรับไว้แต่น้ำใจแล้วกัน...\""
10048020-28 = "จะว่าไป ดีเลยนะที่ไปหว่านสินค้ามาเสร็จพอดี"
10048020-29 = "ริตสึ ช่วยระบุจุดที่ไปหว่านสินค้ามาให้หน่อยได้มั้ย?"
10048020-30 = "หืม? ได้สิ ว่าแต่ ทำไมเหรอ?"
10048020-31 = "ฉันอยากให้คุณครูได้สังเกตการณ์กิจกรรมของชมรมการค้าพิเศษน่ะ"
10048020-32 = "สังเกตการณ์?"
10048020-33 = "ว้าว! น่าสนุกเลยนะ!"
10048020-38 = "ว่าแต่จะไม่เป็นไรเหรอ?"
10048020-39 = "มิโยะจังกำชับเรื่องความปลอดภัยมาตลอดเลยไม่ใช่เหรอ? "
10048020-40 = "ฮุฮุ ริตสึจัง คุณครูเป็นผู้ใหญ่นะ"
10048020-41 = "แล้วผู้ใหญ่ก็... เป็นคนที่ถ้าโดนอะไรตก ก็จะยอมเปย์ให้ไม่อั้นเลยละ?"
10048020-42 = "เพราะงั้นการสร้างความไว้วางใจในระดับหนึ่งก่อนก็จะเป็นประโยชน์กับเรา..."
10048020-43 = "[s] \"เอ่อ ที่พูดมาครูได้ยินหมดเลยนะ?\""
10048020-45 = "ใช่ค่ะ มาพูดอะไรแบบนี้ซึ่งๆ หน้าได้ยังไง..."
10048020-46 = "แต่ก็เอาเถอะค่ะ... ในเมื่อตัดสินใจกันได้แล้ว งั้นเราก็ไปดูงานกันเลยมั้ยคะ คุณครู?"
10048020-50 = "ไปกันเลยค่ะทุกคน"
10048020-52 = "สนามไวลด์ฮันต์"
10048020-56 = "ถึงจุดแรกที่หว่านไว้แล้ว!"
10048020-57 = "[s] \"ครูว่าจะถามตั้งแต่เมื่อกี้แล้ว การ <หว่าน> ที่ว่าคืออะไรเหรอ?\""
10048020-58 = "ปะ... เป็นหนึ่งในหลายๆ วิธีในการส่งสินค้าที่ลักลอบนำเข้ามาให้ลูกค้าน่ะ"
10048020-59 = "ถ้าพวกฉันเอาสินค้าไปไว้ในสถานที่ที่ตกลงกันไว้ ลูกค้าก็จะมารับสินค้านี้ไป... แบบนี้น่ะค่ะ"
10048020-60 = "การทำแบบนี้ก็เลยเรียกว่าเป็นการหว่าน พวกฉันมาหว่านและปลูกสินค้าไว้ แล้วลูกค้าก็มาเก็บเกี่ยวสินค้ากันเองค่ะ"
10048020-61 = "ในสวนนี้... สินค้าน่าจะอยู่ใต้รูปปั้นอันนั้นนะคะ..."
10048020-62 = "อ๊ะ มาโน่นแล้ว ทุกคน เงียบก่อน"
10048020-71 = "เจอแล้ว...!"
10048020-72 = "โอ้ ในที่สุดก็ได้ชิ้นส่วนสุดท้ายที่จะมาเติมเต็มความบันเทิงทางสุนทรียศาสตร์ของเราแล้ว...!"
10048020-73 = "ลูกค้าคนนั้นสั่งอะไรไปนะ?"
10048020-74 = "ไก่ทอดรสระเบิดนาปาล์มค่ะ"
10048020-75 = "[s] \"รับหาของแบบนั้นด้วยเหรอ...?\""
10048020-80 = "ค่ะ ที่ไวลด์ฮันต์มีมาตรฐานที่เข้มงวดมากในการนำอาหารจากภายนอกเข้ามาค่ะ"
10048020-81 = "การออกไปนอกโรงเรียนก็ไม่ใช่เรื่องง่าย เราก็เลยไม่ค่อยได้กินอาหารข้างนอกกันตามที่ต้องการ..."
10048020-82 = "นักเรียนที่นี่ก็เลยสั่งอาหารข้างนอกผ่านพวกฉันกันเยอะเลยค่ะ"
10048020-83 = "เอาละ งั้นไปจุดต่อไปกันเลยมั้ยคะ?"
10048020-85 = "ป่าแห่งหนึ่งในไวลด์ฮันต์"
10048020-86 = "(จุดหว่านสินค้าชิ้นต่อไปคือโพรงในต้นไม้เก่า)"
10048020-93 = "เจอแล้ว!"
10048020-94 = "ในที่สุดก็จะได้วาดรูปให้เสร็จสักที...!"
10048020-95 = "ลูกค้าคนนั้นอยากได้สีวาดรูปยี่ห้อหนึ่งโดยเฉพาะสินะคะ"
10048020-96 = "มันเป็นสีที่ห้ามนำเข้ามาในไวลด์ฮันต์น่ะค่ะ"
10048020-97 = "[s] \"ทำไมเหรอ...?\""
10048020-98 = "สีพวกนั้นมีสารกำจัดศัตรูพืชผสมอยู่นิดหน่อยน่ะค่ะ แล้วมันก็เป็นอันตรายต่อสุขภาพด้วย"
10048020-100 = "(หลังจากนั้นคุณครูกับชมรมการค้าพิเศษก็ไปตามจุดหว่านสินค้าอีก 2-3 จุด)"
10048020-101 = "(จากการสังเกตการณ์การลักลอบขนส่งสินค้าที่หน้างาน...)"
10048020-102 = "(ก็ได้รู้ว่าแทบจะไม่มีสินค้าอันตรายเลย)"
10048020-104 = "สนามไวลด์ฮันต์"
10048020-105 = "(หลังสิ้นสุดการสังเกตการณ์ ทุกคนก็มานั่งพักที่ม้านั่งที่อยู่ใกล้ๆ)"
10048020-106 = "งานเสร็จหมดแล้ว! วันนี้ขอปิดประตูชมรมการค้าพิเศษเพียงเท่านี้ค่ะ!"
10048020-107 = "เป็นไงคะ คุณครู?"
10048020-108 = "พอได้มาสังเกตการณ์แล้ว รู้สึกยังไงกับการลักลอบขนส่งสินค้าของพวกฉันคะ?"
10048020-109 = "[s1] \"มีชมรมที่ทำกิจกรรมแบบนี้อยู่ด้วยสินะ\"\n[s2] \"กิจกรรมดูไม่น่าเป็นห่วงอย่างที่คิดนะ...\""
10048020-112 = "ฮุฮุ ที่เห็นในวันนี้เป็นแค่ส่วนหนึ่งของงานทั้งหมดของพวกฉันค่ะ"
10048020-113 = "ที่จริงแล้วมีเส้นทางลักลอบนำเข้าและวิธีการขนส่งสินค้าเยอะกว่านี้มากค่ะ"
10048020-114 = "น่าภูมิใจเหลือเกินนะคะ จริงๆ เลยเชียว"
10048020-115 = "แน่นอนอยู่แล้ว ก็ต้องภูมิใจสิ"
10048020-116 = "ว่าแต่ทำไมถึงทำหน้าบูดมาตั้งแต่เมื่อกี้แล้วละ มิโยะ?"
10048020-117 = "ทั้งหมดที่เห็นวันนี้คือผลงานของมิโยะเลยนะ?"
10048020-118 = "[s] \"หืม...?\""
10048020-119 = "เดี๋ยวก่อน... คะ... คือว่า..."
10048020-120 = "ทั้งเส้นทางการลักลอบนำเข้าสินค้า วิธีต่างๆ ในการขนส่งสินค้า แล้วก็แผนสำรองที่เตรียมเผื่อไว้#nกรณีที่ไปเกี่ยวพันกับฝ่ายดูแลหอพัก..."
10048020-121 = "ทั้งหมดนี้เป็นผลงานที่เธอเขียนให้ชมรมนะ มิโยะ"
10048020-122 = "ฮืออ..."
10048020-123 = "ฉันอายนะ เลิกพูดเถอะ..."
10048020-124 = "คุณครู หัวหน้าของเราไม่ใช่ว่าจะได้ตำแหน่งนี้มาโดยไม่มีเหตุผลหรอกนะคะ"
10048020-125 = "สมองที่ช่วยวางรากฐานให้ชมรมการค้าพิเศษดำเนินงานได้ ทั้งช่วยวางแผนปฏิบัติการทั้งหมดให้เรา..."
10048020-126 = "ก็คือมิโยะจัง หัวหน้าของพวกฉันนี่ละค่ะ"
10048020-127 = "อ่าาา...!"
10048020-128 = "ยอมรับเถอะ มิโยะ"
10048020-129 = "เธอน่ะ... คือจิตวิญญาณของการลักลอบขนส่งสินค้าดีๆ นี่เอง...!"
10048020-130 = "ใช่ๆ! แล้วแผนการของมิโยะจังก็ไม่เคยผิดพลาดเลยสักครั้งเดียว! "
10048020-131 = "อ๊าาาาาาา...!"
10048020-135 = "และนี่ก็ทำให้ฉันอยากได้พลังจากเธออีกสักครั้งน่ะ มิโยะ"
10048020-137 = "...?"
10048020-138 = "ทำไมจู่ๆ ก็...?"
10048020-139 = "ฮุฮุ"
10048020-140 = "ที่จริงฉันเพิ่งรับงานชิ้นใหญ่มาน่ะ"
10048020-141 = "แล้วค่าจ้างก็..."
10048020-142 = "ไม่อนุมัติ"
10048020-143 = "เดี๋ยวสิ ลองฟังดูก่อนสิ?"
10048020-144 = "ถ้าฟุยุถึงกับพูดเองว่าเป็นงานชิ้นใหญ่ ฉันก็พอเดาได้ค่ะว่าเป็นงานที่หนักหนาแค่ไหน...!"
10048020-148 = "ที่พูดมาก็ไม่ผิดหรอก..."
10048020-149 = "มันเป็นคำขอที่ไม่ง่ายเลยละ"
10048020-150 = "แต่สิ่งสำคัญสำหรับเธอไม่ใช่คำขอนี้หรอกนะ มิโยะ"
10048020-151 = "...?"
10048020-152 = "สิ่งที่สำคัญก็คือ..."
10048020-154 = "มีข่าวว่า <คิวท์ตี้เบอร์รี่ 87> ไปปรากฏอยู่ในเว็บไซต์ซื้อขายของมือสองน่ะสิ"
10048020-155 = "...!!"
10048020-156 = "ยังมีของเหลืออยู่อีกเหรอคะ?!"
10048020-157 = "แน่นอนสิ ไม่เชื่อก็เข้าไปดูในเว็บไซต์ได้เลย"
10048020-162 = "[ns] \"คิวตี้เบอร์รี่ 87 คืออะไรเหรอ?\""
10048020-163 = "มันได้ชื่อว่าเป็นผลงานชิ้นเอกที่ต้องคำสาปค่ะ คุณครู"
10048020-164 = "แต่มันก็เป็นของหรูหราที่ล้ำยุคเกินไปจนไม่เข้าตาผู้บริโภค ก็เลยหายไปจากตลาด...!"
10048020-165 = "พูดอีกอย่างหนึ่ง มันก็แค่คือเครื่องพิมพ์ดีดเก๋ากึ๊กเลยน่ะค่ะ"
10048020-166 = "เดี๋ยวเถอะ!"
10048020-167 = "[s] \"เครื่องพิมพ์ดีด...?\""
10048020-171 = "ค่ะ มันเป็นเครื่องพิมพ์ดีดที่ฉันตามหามานานแล้ว"
10048020-173 = "ฉันสะสมเครื่องพิมพ์ดีดเป็นงานอดิเรกน่ะค่ะ..."
10048020-175 = "[ns] \"อ้อ...\""
10048020-176 = "แต่บอกตามตรงนะ ฉันว่ามันสมควรแล้วที่ขายไม่ออก"
10048020-177 = "จะไปใส่ฟังก์ชันทุ่นระเบิดสังหารบุคคลแบบระบุทิศทางในเครื่องพิมพ์ดีดทำไมก็ไม่รู้..."
10048020-178 = "ฉันไม่อยากฟังคำพูดแบบนั้นจากคนที่ใช้เครื่องยิงเพียงเพราะว่ามันเท่ดีหรอกนะคะ..."
10048020-179 = "เอาเถอะน่า สรุปว่าอยากซื้อคิวท์ตี้เบอร์รี่ 87 ใช่มั้ยล่ะ?"
10048020-180 = "แต่ว่า... เงินก็ไม่ค่อยจะมี"
10048020-181 = "พูดเหมือนรู้ว่าเงินในบัญชีฉันเหลือเท่าไรเลยอย่างนั้นละ..."
10048020-182 = "เราไม่จำเป็นต้องตอกไข่เพื่อดูว่าข้างในมีไข่แดงกี่ลูกไม่ใช่หรือไง?"
10048020-183 = "บางฟองก็เป็นไข่แฝดเถอะนะคะ?"
10048020-184 = "แต่บัญชีก็มีบัญชีเดียวนี่?"
10048020-188 = "ชิ...!"
10048020-189 = "ยอมรับเถอะ มิโยะ เธออยากซื้อคิวท์ตี้เบอร์รี่ 87 แต่ว่าไม่มีเงิน"
10048020-190 = "แต่ถ้าเราทำงานตามคำขอนี้สำเร็จละก็..."
10048020-191 = "น่าจะได้เงินเหลือเฟือจนซื้อได้สัก 5 เครื่องเลยนะ"
10048020-192 = "......"
10048020-196 = "ก็ได้..."
10048020-197 = "งั้นฉันจะลองรับฟังดูค่ะ... ว่าเป็นคำขอแบบไหน"

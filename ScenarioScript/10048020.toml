[translation]
10048020-1 = "第2話;聽聽看吧"
10048020-2 = "特殊交易部宿舍內部"
10048020-5 = "[ns]「你把誰……不對，是把什麼東西埋好了？」"
10048020-6 = "哇啊啊啊！#n不是你想的那樣啦！"
10048020-7 = "是播種才對！你想說的是播種對吧，律醬？"
10048020-8 = "嗯，沒錯！播種結束囉！"
10048020-9 = "我把東西都好好地埋在美代醬說的那些地方了！"
10048020-10 = "辛，辛苦你了……！"
10048020-11 = "辛苦啦，律醬。"
10048020-12 = "謝啦！"
10048020-13 = "咦？這位是誰啊？"
10048020-14 = "[s]「你好，我是夏萊的老師。」"
10048020-15 = "你好！我是薄葉律！"
10048020-16 = "興趣是交易！特技也是交易！"
10048020-17 = "主修是雕刻！"
10048020-18 = "[s]「請，請多指教！」"
10048020-19 = "話說，我好像有在新聞上看過老師耶！"
10048020-20 = "就是在原野上全裸奔跑的那位……！"
10048020-21 = "[s]「確實有這麼回事……！我無法否認……！」"
10048020-22 = "那時候我就想說，原來在狂獵以外的地方也能做那種事啊！真神奇！"
10048020-23 = "[s]「意思是在狂獵裡面就沒問題嗎……？」"
10048020-24 = "那個……也不是沒有人會嘗試那種行為藝術啦……"
10048020-25 = "老師，你該不會沒什麼衣服穿吧？"
10048020-26 = "要我幫你準備一套嗎？"
10048020-27 = "[s]「你的好意我心領了……」"
10048020-28 = "既然已經播種完了，那正好。"
10048020-29 = "律，可以帶我們去播種地點嗎？"
10048020-30 = "嗯？可以是可以，但為什麼呢？"
10048020-31 = "因為我想讓老師參觀一下特殊交易部的活動。"
10048020-32 = "參觀？"
10048020-33 = "哇──！聽起來好像很好玩！"
10048020-38 = "可是這樣真的沒問題嗎？"
10048020-39 = "美代醬之前不是一直強調說要保密嗎？"
10048020-40 = "呵呵，律醬。老師可是大人哦。"
10048020-41 = "大人啊……只要被勾起了興趣，就會花很多很多錢唷？"
10048020-42 = "這種時候先主動示好建立信任，對我們才是更有利的……"
10048020-43 = "[s]「那個，我都聽到囉？」"
10048020-45 = "就是說啊，怎麼會在本人面前討論這些呢……"
10048020-46 = "……總之既然已經決定了，我們就一起行動吧，老師。"
10048020-50 = "大家，要走囉。"
10048020-52 = "狂獵空地"
10048020-56 = "第一個播種地點，到達！"
10048020-57 = "[s]「我從剛才就想問了……『播種』是什麼？」"
10048020-58 = "是，是我們將走私品交給委託人的方式之一。"
10048020-59 = "我們會先在約定好的地點把物品放好，再請委託人自己來取走……"
10048020-60 = "由我們「種下」、由客人「收穫」……所以才稱之為播種。"
10048020-61 = "這裡的話……應該是埋在那個雕像下面……"
10048020-62 = "啊，來了。大家安靜。"
10048020-71 = "有了……！"
10048020-72 = "哦哦，終於拿到了！#n讓我們的美感臻於完美的最後一片拼圖……！"
10048020-73 = "那位客人委託的是什麼來著？"
10048020-74 = "是凝固汽油彈風味的炸雞。"
10048020-75 = "[s]「……連那種東西也有人委託啊？」"
10048020-80 = "是的。畢竟狂獵對攜入外食的規定非常嚴格。"
10048020-81 = "再加上要進出學院本來就不容易，所以沒辦法隨意買到外食……"
10048020-82 = "因此有不少學生會透過我們來訂購。"
10048020-83 = "好，接著去下一個地點吧？"
10048020-85 = "狂獵某處的森林"
10048020-86 = "（這次的播種地點是某棵大樹的樹瘤洞）"
10048020-93 = "有了！"
10048020-94 = "這樣我總算能完成這幅畫了……！"
10048020-95 = "那位客人想要的是某個品牌的顏料。"
10048020-96 = "而那恰好又是不能帶進狂獵的品項之一。"
10048020-97 = "[s]「為什麼不能帶進來呢……？」"
10048020-98 = "似乎是因為含有微量的殺蟲劑成分，被認為對身體不好的關係。"
10048020-100 = "（之後又巡視了幾個播種地點）"
10048020-101 = "（在見到的走私現場裡……）"
10048020-102 = "（意外地幾乎沒有什麼危險物品）"
10048020-104 = "狂獵空地"
10048020-105 = "（參觀結束後，在附近的長椅上稍作休息）"
10048020-106 = "收工收工！特殊交易部今天關門打烊囉！"
10048020-107 = "老師覺得怎麼樣？"
10048020-108 = "觀察我們的走私之後的感想如何呢？"
10048020-109 = "[s1]「原來你們都是以這種方式活動的啊。」\n[s2]「感覺微妙地比想像中……更樸實一點……」"
10048020-112 = "呵呵，畢竟老師今天看到的，只是我們業務中的一小部分而已。"
10048020-113 = "實際上我們擁有的走私路線和方式，可遠遠不只這些哦。"
10048020-114 = "虧你好意思炫耀那種事情。"
10048020-115 = "那當然。這是值得炫耀的事嘛。"
10048020-116 = "話說美代……你為什麼從剛才就一臉不滿的樣子？"
10048020-117 = "我們目前為止看到的那些，明明全都是美代你的作品呀？"
10048020-118 = "[s]「咦……？」"
10048020-119 = "等一下，那，那是……"
10048020-120 = "無數的走私路線、數十種傳遞物品的方式、不慎被舍監隊撞見時的緊急應對方案……"
10048020-121 = "全都是你寫出來的作戰守則啊，美代。"
10048020-122 = "唔唔唔……"
10048020-123 = "別再說下去了，很丟臉耶……"
10048020-124 = "老師，我們的部長可不只是掛名的吉祥物哦。"
10048020-125 = "讓特殊交易部能正常運作的基礎、所有作戰方案的設計者……"
10048020-126 = "就是我們的部長，美代醬。"
10048020-127 = "嗚哇啊啊……！"
10048020-128 = "差不多也該認命了吧，美代。"
10048020-129 = "你……就是走私的靈魂本身啊……！"
10048020-130 = "沒錯沒錯！美代醬的作戰從來沒有失敗過哦！"
10048020-131 = "嗚哇哇哇哇……！"
10048020-135 = "所以──我必須再借助一次你的力量，美代。"
10048020-137 = "……？"
10048020-138 = "怎麼突然說這些……？"
10048020-139 = "呵呵。"
10048020-140 = "其實呢，我這次接到了一件相當大的案子。"
10048020-141 = "委託費竟然高達──"
10048020-142 = "駁回。"
10048020-143 = "不是，你先聽我講完嘛？"
10048020-144 = "連冬都說是「大案子」的話，我根本無法想像會有多不得了……！"
10048020-148 = "確實……就像你說的一樣。"
10048020-149 = "這次委託的難度的確不低。"
10048020-150 = "可是美代，對你來說重要的並不是這個委託本身。"
10048020-151 = "……？"
10048020-152 = "重要的是──"
10048020-154 = "「CutieBerry87」在交易網站上出現了。"
10048020-155 = "……！？"
10048020-156 = "那東西還有存貨嗎！？"
10048020-157 = "沒錯。你自己到網站上看看吧。"
10048020-162 = "[ns]「CutieBerry87是什麼？」"
10048020-163 = "就是大家俗稱的「被詛咒的傑作」哦，老師。"
10048020-164 = "因為過於超前時代而被消費者嫌棄，最終從市場上消失的悲劇名品……！"
10048020-165 = "簡單來說就是老式打字機啦。"
10048020-166 = "喂！"
10048020-167 = "[s]「打字機……？」"
10048020-171 = "是的。是我長久以來一直苦苦尋找的一款打字機。"
10048020-173 = "興趣是收集打字機……"
10048020-175 = "[ns]「原來如此……」"
10048020-176 = "不過老實說，那台機器會賣不出去也不奇怪啦。"
10048020-177 = "到底誰會在打字機裡加入定向式反人員地雷啊……"
10048020-178 = "我可不想被一個覺得投石機很帥的人講這種話……"
10048020-179 = "總之，美代想買CutieBerry87對吧？"
10048020-180 = "只可惜……你身上大概沒什麼錢。"
10048020-181 = "你又不知道我帳戶的狀況……"
10048020-182 = "不是非得把蛋敲開，才能知道裡面有幾顆蛋黃吧？"
10048020-183 = "世界上可是有雙黃蛋的哦？"
10048020-184 = "然而你並不是。"
10048020-188 = "嘖……！"
10048020-189 = "承認吧，美代。#n你想買CutieBerry87卻沒有錢。"
10048020-190 = "不過只要完成這件委託……"
10048020-191 = "那筆錢就算要買五台都不成問題。"
10048020-192 = "……"
10048020-196 = "……好吧。"
10048020-197 = "……是什麼委託，就說來聽聽吧。"

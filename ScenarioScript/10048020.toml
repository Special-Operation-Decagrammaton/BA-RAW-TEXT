[translation]
10048020-1 = "Episode 2;Let's Hear You Out"
10048020-2 = "Inside Free Trade Cartel Dormitory"
10048020-5 = "[ns] \"Who...I mean, WHAT did you bury?\""
10048020-6 = "Waah! It's not what you think!"
10048020-7 = "Sowing! Yes, you mean SOWING! Right, Ritsu?"
10048020-8 = "Yes! The sowing is done!"
10048020-9 = "I made sure to plant the things where Miyo said!"
10048020-10 = "G-Good work...!"
10048020-11 = "Yeah. Nice job, Ritsu."
10048020-12 = "Thanks!"
10048020-13 = "Huh? Wait, who're you?"
10048020-14 = "[s] \"Hello, I am Schale's Sensei.\""
10048020-15 = "Hello! I am Usuba Ritsu!"
10048020-16 = "My hobby is trade! My specialty is also trade!"
10048020-17 = "And my major is...Sculpture!"
10048020-18 = "[s] \"N-Nice to meet you!\""
10048020-19 = "Come to think of it, I think I saw you in the news! "
10048020-20 = "I heard you streaked butt-naked across a field!"
10048020-21 = "[s] \"You're not wrong...! But—\""
10048020-22 = "It was so cool to see that people do stuff like that outside Wildhunt too!"
10048020-23 = "[s] \"That's...common in Wildhunt?\""
10048020-24 = "We have a Performing Arts Department..."
10048020-25 = "Sensei, do you not have a lot of clothes? Were you doing laundry?"
10048020-26 = "Should I get you something you can wear later?"
10048020-27 = "[s] \"That's very thoughtful, but...\""
10048020-28 = "More importantly, you're already done with the sowing! Excellent timing."
10048020-29 = "Ritsu, would you kindly guide us to the sowing location?"
10048020-30 = "Hm? Yeah, sure. But why?"
10048020-31 = "Sensei wants to observe what we do in the Free Trade Cartel."
10048020-32 = "Observe?"
10048020-33 = "Wow! That sounds fun!"
10048020-38 = "But...are you sure it's okay?"
10048020-39 = "Miyo, you always emphasized \"security and discretion,\" remember?"
10048020-40 = "Fufu, Ritsu...Sensei is a responsible adult."
10048020-41 = "And adults...have jobs that pay money. If you get a responsible adult hooked, you can make bank."
10048020-42 = "But, to get a decent ROI, we need to show them that we're...trustworthy."
10048020-43 = "[s] \"Hey, I can hear you.\""
10048020-45 = "Ladies...please. Sensei is RIGHT there."
10048020-46 = "...Anyway, since we're decided, we'd best band together."
10048020-50 = "Let's go, everyone."
10048020-52 = "Wildhunt Park"
10048020-56 = "Here's the first sowing location!"
10048020-57 = "[s] \"So...what does 'sowing' actually mean?\""
10048020-58 = "It's a method of delivering smuggled goods to a client."
10048020-59 = "We drop the item at a specific location that all parties agree on, then the client retrieves the item later."
10048020-60 = "That's why we call it \"sowing.\" We plant the item, then the customer harvests it."
10048020-61 = "Right there... It should be buried under that statue."
10048020-62 = "Shh... Here she comes..."
10048020-71 = "Found it...!"
10048020-72 = "Oh, at last, I have the final piece to complete my aesthetic euphoria...!"
10048020-73 = "What did she order?"
10048020-74 = "Napalm-flavored fried chicken."
10048020-75 = "[s] \"...You deliver takeout, too?\""
10048020-80 = "Of course. Wildhunt is VERY strict about outside food."
10048020-81 = "Since it's not easy to go in and out..."
10048020-82 = "...a lot of students get their cravings satiated through us."
10048020-83 = "Now, shall we continue to our next stop?"
10048020-85 = "Wildhunt Forest Outskirts"
10048020-86 = "This time, we stopped at a hole near an old tree."
10048020-93 = "Eureka!"
10048020-94 = "At last, I can complete my masterpiece!"
10048020-95 = "See, she needed a specific paint for her artwork. Gorgeous stuff."
10048020-96 = "But it isn't \"currently permitted\" within Wildhunt."
10048020-97 = "[s] \"Why...?\""
10048020-98 = "It contains a small amount of pesticide, basically. As if she's dumb enough to eat it..."
10048020-100 = "After that, they showed me several other sowing sites."
10048020-101 = "And, as I watched every desperate student pick up their smuggled items..."
10048020-102 = "...I rarely saw anything remotely dangerous."
10048020-104 = "Wildhunt Park"
10048020-105 = "At the end, we decided to rest on a bench."
10048020-106 = "And now we're...closing up shop! The Free Trade Cartel is all wrapped up for the day!"
10048020-107 = "So, what do you think, Sensei?"
10048020-108 = "What was your honest impression of our...smuggling?"
10048020-109 = "[s1] \"It was interesting to see.\"\n[s2] \"Most of it seemed so trivial...\""
10048020-112 = "Ha, \"trivial.\" This was only a small part of our overall workflow."
10048020-113 = "We employ a variety of innovative smuggling routes and delivery methods."
10048020-114 = "Why do you sound like you're bragging?"
10048020-115 = "Because I am! And with good reason!"
10048020-116 = "Why such a frown, dear Miyo?"
10048020-117 = "Everything we saw today was YOUR work, wasn't it?"
10048020-118 = "[s] \"Hm...?\""
10048020-119 = "Wait, th-that's..."
10048020-120 = "The clever delivery methods, the extensive smuggling routes, the emergency escape plans in the event we're caught by the Council..."
10048020-121 = "That's all your doing, Miyo."
10048020-122 = "Ugh..."
10048020-123 = "Please stop embarrassing me."
10048020-124 = "Sensei, there's a reason why Miyo is our leader, our beloved president."
10048020-125 = "The mastermind behind the Free Trade Cartel, the chief operator and planner..."
10048020-126 = "...That's President Miyo."
10048020-127 = "Gah...!"
10048020-128 = "Just accept it, Prez."
10048020-129 = "You're the queen of smuggling! You're its embodiment. An irreplaceable icon."
10048020-130 = "That's right! Miyo's plans never go wrong! "
10048020-131 = "Aaaaahhh...!"
10048020-135 = "And that is why, with humility, I must ask for your help once more, Miyo."
10048020-137 = "...Hm?"
10048020-138 = "What are you...?"
10048020-139 = "Ha."
10048020-140 = "It turns out that we snagged a big score."
10048020-141 = "The pay is—"
10048020-142 = "Denied."
10048020-143 = "Aw, just hear me out!"
10048020-144 = "If even YOU think it's big, Fuyu, then it must be astronomical."
10048020-148 = "...You're not wrong."
10048020-149 = "It won't be easy."
10048020-150 = "But that's not what matters to you, is it, Miyo?"
10048020-151 = "...Hm?"
10048020-152 = "What matters is..."
10048020-154 = "...a Cutey Berry 87 is finally back up for sale on your preferred second-hand site."
10048020-155 = "...!"
10048020-156 = "Truly? A genuine piece? Not a replica?"
10048020-157 = "Indeed. Look it up for yourself."
10048020-162 = "[ns] \"What is a Cutey Berry 87?\""
10048020-163 = "It...is a cursed masterpiece, Sensei."
10048020-164 = "The Cutey Berry 87 is a luxurious, elegant, tragically beautiful piece that was so ahead of its time that it was barely on the market...!"
10048020-165 = "Translation—an old typewriter."
10048020-166 = "Hey!"
10048020-167 = "[s] \"A typewriter...?\""
10048020-171 = "Yes, it's a VINTAGE typewriter that I have been pursuing for a long time."
10048020-173 = "I enjoy collecting typewriters..."
10048020-175 = "[ns] \"Aha...\""
10048020-176 = "There's a good reason why it didn't sell, Sensei."
10048020-177 = "Why would a typewriter need directional anti-personnel mines?"
10048020-178 = "I will not hear this from someone who deploys a catapult for \"coolness\" reasons."
10048020-179 = "Point is, you want that Cutey Berry 87, don't you?"
10048020-180 = "But...you're short on funds. Way short."
10048020-181 = "You know nothing of my finances."
10048020-182 = "I don't need to crack an egg to know how many yolks there are."
10048020-183 = "You've never heard of double yolks?"
10048020-184 = "...Not from you."
10048020-188 = "Tsk!"
10048020-189 = "Be real, Miyo. You want to buy the Cutey Berry 87, but you don't have the money."
10048020-190 = "But, as soon as we complete this mission..."
10048020-191 = "You'll have enough money to buy five of them. And a display case."
10048020-192 = "..."
10048020-196 = "...Very well."
10048020-197 = "...I'll hear you out. What is the request?"

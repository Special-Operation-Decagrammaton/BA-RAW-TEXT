[translation]
10046060-1 = "第6話;惡魔總是發問"
10046060-3 = "……完全不行了呢。"
10046060-4 = "地面整個塌陷了。#n這樣別說是要重建建築了，連能不能繼續待在這片海灘都是個問題……"
10046060-9 = "……為什麼會變成這樣？"
10046060-10 = "為什麼偏偏是今天……偏偏是我們呢？"
10046060-11 = "彌香大人……"
10046060-12 = "…………"
10046060-13 = "……沒關係，這不是誰的錯。"
10046060-14 = "這點我也很清楚，所以真的沒關係。"
10046060-15 = "……對不起。明明都讓大家這麼努力幫忙了。"
10046060-16 = "果然要讓別人幸福……對我來說還是有點困難吧。"
10046060-20 = "別，別這麼說！#n這真的……真的只是場意外罷了！"
10046060-21 = "彌香大人已經盡了全力……"
10046060-22 = "謝謝你，一花醬。"
10046060-23 = "不過既然別墅已經變成這樣，想繼續渡假應該是不可能了。"
10046060-24 = "嗯……等渚醬和聖亞醬回來，我們就老實跟他們說吧。"
10046060-25 = "然後……再來做回去的準備。#n說不定回到宿舍的時候還不算太晚呢。"
10046060-31 = "雖然建築倒了，但渡假其實……"
10046060-32 = "…………"
10046060-33 = "老師……那個，你平常不是很擅長那種事嗎？"
10046060-34 = "就是……講些話讓人振作起來之類的。"
10046060-35 = "[s1]「雖然我也很想這麼做……」\n[s2]「但我不能讓學生們身陷危險之中。」"
10046060-40 = "……老師說得對。#n冷靜想想，這樣才是正確的判斷。"
10046060-41 = "如果地基不穩的話，就代表這一帶都是危險區域。"
10046060-42 = "從老師的立場來看……#n不，就連身為護衛的我，也認為應該中止這次的渡假才對。"
10046060-47 = "…………"
10046060-48 = "……地基。"
10046060-49 = "只要能確保地基的安全，渡假就能繼續下去對吧？"
10046060-50 = "或許……還有辦法也說不定。"
10046060-51 = "老實說……我本來是不想用這招的……"
10046060-52 = "…………"
10046060-53 = "……………………"
10046060-54 = "……………………………………………………"
10046060-55 = "我真的很不想用！！！"
10046060-56 = "[s3]「到底是哪一招……？」\n[s4]「如果這麼抗拒的話，也不必勉強自己……」"
10046060-59 = "不，我已經下定決心了。"
10046060-60 = "就算是我這種總是得過且過、隨波逐流的人……"
10046060-61 = "也知道什麼時候該拿出誠意。"
10046060-66 = "老師，我有件事想請你幫忙。"
10046060-73 = "…………"
10046060-74 = "簡單來說，是因為那棟建築倒塌才來找我們的吧？"
10046060-75 = "委託內容是地基調查……還有在情況允許的前提下重建別墅啊。"
10046060-77 = "雖然不是很想承認……#n不過在土木工程方面，沒有比溫泉開發部更專業的了。"
10046060-78 = "哎呀～能被認可真開心呢～#n我也是一路摸著石頭過河的嘛～"
10046060-82 = "不過……這世間的道理是「有付出才有收穫」對吧？"
10046060-83 = "…………"
10046060-84 = "首先，被沒收的建材應該能還給我們吧？"
10046060-85 = "……知道了。這點我可以保證。"
10046060-86 = "是嗎？既然如此，如果能讓我們接手原本打算開發的那片海灘就更好了呢……#n畢竟那邊還有些地方沒開發完畢啊。"
10046060-87 = "……這就不是我能獨自決定的事了。"
10046060-88 = "真的嗎？看來事情也沒有多嚴重嘛？#n那麼雖然可惜，談判也只能到此為止囉～"
10046060-89 = "…………"
10046060-90 = "哎呀？你現在是在瞪我嗎？"
10046060-91 = "…………不是。"
10046060-92 = "海灘的事，我會想辦法說服的。#n彌香大人應該也會優先考慮別墅的事情才對。"
10046060-96 = "居然連這種條件也願意接受？"
10046060-100 = "這下該怎麼辦呢？我這個人可是很貪心的啊。#n一旦胃口被養大可就回不去了呢～"
10046060-104 = "…………只。"
10046060-105 = "嗯？"
10046060-106 = "只要是我能做的，我什麼都願意做。"
10046060-112 = "哦？"
10046060-113 = "瞧瞧這小姑娘，還真敢說呢？"
10046060-114 = "好吧，就這麼說定了。#n只要幫忙就行了吧？"
10046060-118 = "真的嗎！？"
10046060-119 = "畢竟這可不是別人，而是我們一花醬的請求，我怎麼可能無視呢～"
10046060-120 = "不過你得先告訴我這件事才行，因為我現在真的很好奇。"
10046060-121 = "究竟是什麼原因讓你不惜做到這種地步？"
10046060-122 = "我沒有回答這個問題的必要。"
10046060-123 = "不，當然有。"
10046060-129 = "你剛才不是說「什麼都願意做」嗎？"
10046060-130 = "以實現正義部的「什麼都願意」而言，這個要求的容易程度……你應該明白吧？"
10046060-131 = "所以在我改變心意之前，勸你還是老實回答比較好哦。"
10046060-137 = "…………唉，居然偏偏挑這個問題，真是個討人厭的傢伙。"
10046060-138 = "我想幫助彌香大人。理由就只有這樣而已。"
10046060-139 = "哦，這不是能好好說出口嗎？"
10046060-140 = "不過這個理由剛才已經聽過了。#n我想知道的是「真正的理由」。"
10046060-141 = "看來我們一花醬害羞得說不出口，不如就先來聽聽我說的對不對吧？"
10046060-142 = "你應該也知道……像我這種人呢，總是時不時會聽到一些「風聲」。#n據說那位叫彌香的大小姐啊～以前可是個不得了的麻煩製造者呢？"
10046060-143 = "……"
10046060-144 = "喂喂～開開玩笑而已，沒必要這麼認真吧～#n我也沒有要揭露三一醜聞的意思。"
10046060-145 = "該怎麼說呢～#n我只是在想，那位傳聞中的麻煩大小姐──"
10046060-146 = "真的是值得我們一花醬如此忠心耿耿的對象嗎？"
10046060-147 = "……這與忠誠無關。"
10046060-148 = "哦？所以是以朋友的身分囉？"
10046060-149 = "……朋友。"
10046060-150 = "朋友嗎……哈哈。"
10046060-160 = "反正雙方都清楚彼此的底細，我又何必繼續裝傻呢？"
10046060-161 = "…………哈哈！現在總算能好好對話了是吧！"
10046060-162 = "所以呢，你的理由是什麼？"
10046060-163 = "……如果要說自己在這之前並不認識彌香大人的話，那是騙人的。#n我因為工作的關係見過他幾次，也在某些事件後頻繁聽見他的名字……"
10046060-164 = "不過今天一整天，我都在他身邊輔佐他。"
10046060-165 = "一開始我心裡想的是──這個人真的是那位傳聞中的茶會成員嗎？"
10046060-166 = "於是我一直觀察著他……後來我明白了。"
10046060-171 = "…………"
10046060-172 = "這個人與我不同……是個非常耀眼的人。"
10046060-173 = "一般人會為了朋友做到這種程度嗎？我能做到嗎？#n……哈，當然不可能。"
10046060-174 = "我不想讓那股光芒消失……不想看見這樣的人失敗的模樣。"
10046060-175 = "就只是這樣而已。"
10046060-180 = "…………"
10046060-181 = "原來是這樣的理由啊……這可真是湊巧。"
10046060-182 = "我也知道自己不適合說這些話，你就少挖苦我了。"
10046060-186 = "挖苦？怎麼會呢～#n我只是想起了自己認識的某個傻瓜而已。"
10046060-187 = "…………"
10046060-188 = "好吧。既然答應了就要說到做到。"
10046060-192 = "真的嗎！？"
10046060-193 = "畢竟這行業最重要的就是信任嘛。"
10046060-194 = "不過呢～不好意思，只有我一個人可能幫不上什麼忙哦？"
10046060-199 = "別急別急～等人家把話說完嘛～"
10046060-200 = "我只是覺得，自己也是時候該拿出點誠意了。"
10046060-208 = "咳哼。"
10046060-209 = "那個～不好意思～#n大家可以過來一下嗎？"
10046060-216 = "怎麼了，部長？發生什麼事了？"
10046060-217 = "不是說奪還作戰晚上才要進行嗎？"
10046060-219 = "啊，那個取消了。"
10046060-220 = "……奪還作戰？"
10046060-221 = "哎呀～其實是我不小心答應了某項委託啦～#n現在得幫人家蓋一棟建築物才行。"
10046060-222 = "先說好，這跟溫泉一點關係都沒有，也不是什麼命令。#n不想做的話完全可以不做。"
10046060-223 = "所以有沒有人……願意在這炎熱的夏天流汗做點義工呢？"
10046060-228 = "算我一個吧。#n既然佳澄部長會向我們開口，肯定有什麼理由才對。"
10046060-229 = "反正我們開發失敗的溫泉也不只一個兩個了，再多蓋一棟也無所謂啦～"
10046060-231 = "唔嗯～雖然從中間開始我就有聽沒有懂……#n簡單來說，就是要幫助佳澄部長的朋友對吧？"
10046060-232 = "這種事我超歡迎的啦！"
10046060-238 = "哈……"
10046060-239 = "……哈哈，哈～哈哈哈哈！！#n我果然是有「部員緣」的人啊！"
10046060-240 = "真是可喜可賀。#n你說對吧，一花醬？"
10046060-245 = "誰……"
10046060-246 = "誰是你朋友啊！！！"

[translation]
10046060-1 = "ตอนที่ 6;คนร้ายมักจะถามเสมอ"
10046060-3 = "เกิดเรื่องใหญ่แล้วละค่ะ..."
10046060-4 = "พื้นทรุดฮวบไปหมดเลย อย่าว่าแต่ให้สร้างอาคารใหม่เลยค่ะ ฉันว่าแค่อยู่ที่นี่ต่อก็ไม่ปลอดภัยแล้ว..."
10046060-9 = "ทำไมถึงเกิดเรื่องแบบนี้ล่ะ...?"
10046060-10 = "ทำไมกัน? แล้วทำไมต้องเป็นวันนี้ด้วย? ทำไมต้องเกิดเรื่องนี้กับพวกเราด้วยล่ะ?"
10046060-11 = "คุณมิกะ..."
10046060-12 = "......"
10046060-13 = "ไม่เป็นไร นี่ไม่ใช่ความผิดของใครหรอก..."
10046060-14 = "ฉันเองก็รู้ดี เพราะงั้นไม่เป็นไรหรอก"
10046060-15 = "ขอโทษนะทุกคน... เมื่อกี้อุตส่าห์ช่วยกันทำความสะอาดแท้ๆ"
10046060-16 = "การทำให้คนอื่นมีความสุขคงเป็นเรื่องยากสำหรับฉันน่ะ"
10046060-20 = "มะ... ไม่ใช่นะคะ! นี่มันเป็นอุบัติเหตุต่างหากค่ะ"
10046060-21 = "ถึงยังไงคุณมิกะก็ทำเต็มที่แล้วนะคะ"
10046060-22 = "ขอบใจนะ อิจิกะจัง"
10046060-23 = "แต่ถ้าบ้านพักอยู่ในสภาพนี้ เราคงเพลิดเพลินกับวันหยุดพักร้อนต่อไม่ได้"
10046060-24 = "อืม... ไว้ถ้านางิจังกับเซอาจังกลับมา เราค่อยบอกไปตามความจริงแล้วกัน"
10046060-25 = "จากนั้นก็... คงต้องกลับกันละเนอะ ถ้ารีบกลับ ก็น่าจะถึงหอพักก่อนค่ำมืดก็ได้"
10046060-31 = "ถึงบ้านพักจะถล่ม... แต่ทริปนี้ก็..."
10046060-32 = "......"
10046060-33 = "คุณครู... ปกติคุณครูทำแบบนั้นเก่งไม่ใช่เหรอคะ?"
10046060-34 = "พวกการพูดอะไรที่ให้กำลังใจน่ะ..."
10046060-35 = "[s1] \"ครูก็อยากทำอย่างนั้นหรอกนะ...\"\n[s2] \"แต่ครูจะให้นักเรียนตกอยู่ในอันตรายไม่ได้หรอก\""
10046060-40 = "อย่างที่ว่าเลยนะคะ ถ้าคิดให้รอบคอบ มันก็จริงค่ะ"
10046060-41 = "ถ้าพื้นผิวตรงนี้ไม่มั่นคง ทั่วบริเวณนี้ก็ไม่ต่างจากเขตอันตรายเลยค่ะ"
10046060-42 = "จากมุมมองของคุณครูแล้ว ไม่สิ แม้แต่จากมุมมองของพวกฉันที่มาเป็นบอดี้การ์ด การยุติทริปชายหาดนี้ถือเป็นสิ่งที่ถูกต้องแล้วค่ะ"
10046060-47 = "......"
10046060-48 = "แต่ถ้าพื้นผิวดิน..."
10046060-49 = "ถ้าตรวจสอบแล้วว่าพื้นผิวดินตรงนี้ปลอดภัย เราก็จะจัดทริปต่อได้ใช่มั้ยคะ?"
10046060-50 = "ถ้างั้นก็อาจมีวิธีก็ได้ค่ะ"
10046060-51 = "แต่บอกตามตรงว่า... ฉันไม่อยากใช้วิธีนี้เลยค่ะ..."
10046060-52 = "......"
10046060-53 = "............"
10046060-54 = ".................."
10046060-55 = "ไม่อยากใช้วิธีนี้เลย!!!"
10046060-56 = "[s3] \"วิธีที่ว่าคืออะไรเหรอ ทำไมไม่อยากทำขนาดนั้นเลย...?\"\n[s4] \"ถ้าไม่อยากทำขนาดนั้น ก็ไม่ต้องฝืนก็ได้...\""
10046060-59 = "ไม่หรอกค่ะ ฉันเตรียมใจไว้แล้วค่ะ"
10046060-60 = "ถึงฉันจะเป็นคนที่ทำอะไรแต่พอดี และทำอะไรตามน้ำไปเรื่อยๆ..."
10046060-61 = "แต่ฉันก็รู้ว่าเมื่อไรที่ควรแสดงความจริงใจให้เห็นค่ะ"
10046060-66 = "คุณครู ฉันมีเรื่องจะขอร้องอย่างหนึ่งค่ะ"
10046060-73 = "......"
10046060-74 = "สรุปว่ามาหาพวกเราเพราะบ้านพักที่ถล่มลงมาใช่มั้ย?"
10046060-75 = "ส่วนเรื่องที่อยากขอร้องก็คือให้สำรวจพื้นผิวดิน... และถ้าเป็นไปได้ก็ให้ซ่อมแซมบ้านพักตากอากาศ#nให้ด้วย"
10046060-77 = "ฉันก็ไม่ได้อยากจะยอมรับหรอกนะคะ แต่เมื่อพูดถึงงานวิศวกรรมโยธาแล้ว ก็คงไม่มีใครที่เชี่ยวชาญ#nมากไปกว่าชมรมพัฒนาออนเซ็น"
10046060-78 = "แหมๆ~ ดีใจจังเลยนะเนี่ยที่ได้รับการยอมรับ~ เห็นอย่างนี้ฉันก็ศึกษาเรื่องนี้มาเยอะเลยละ~"
10046060-82 = "แต่ว่า... เรื่องแบบนี้ต้องมีค่าตอบแทนสิ โลกมันก็เป็นอย่างนี้ละ ว่ามั้ย?"
10046060-83 = "......"
10046060-84 = "เอาเป็นว่า ฉันขออุปกรณ์ก่อสร้างที่ถูกยึดไว้กลับมาก่อนดีมั้ย?"
10046060-85 = "ได้ค่ะ... ฉันรับรองให้ว่าจะได้คืนค่ะ"
10046060-86 = "งั้นเหรอ? ถ้างั้นฉันก็อยากได้ชายหาดที่พวกเราตั้งใจจะพัฒนาออนเซ็นด้วย พอดีว่ายังมีจุดที่ยังไม่ได้#nพัฒนาเลยน่ะ"
10046060-87 = "เรื่องนั้นฉันตัดสินใจเองไม่ได้หรอกค่ะ..."
10046060-88 = "งั้นหรอกเหรอ? สงสัยจะไม่ใช่เรื่องสำคัญเท่าไรสินะ? งั้นก็เสียใจด้วยนะ ฉันคงต้องจบการเจรจา แต่เพียงเท่านี้ละนะ~"
10046060-89 = "......"
10046060-90 = "หืม? จ้องกันขนาดนั้นเลยเหรอ?"
10046060-91 = "ไม่ใช่ค่ะ..."
10046060-92 = "เรื่องชายหาด... ฉันจะลองไปโน้มน้าวดูค่ะ คุณมิกะก็คงอยากแก้ปัญหาเรื่องนั้นก่อนอยู่แล้วด้วย"
10046060-96 = "เอาเป็นว่าได้เนอะ?"
10046060-100 = "แต่ว่า จะทำยังไงดีล่ะ? ก็ฉันเป็นคนโลภน่ะสิ ยิ่งได้อะไรมากเข้า ก็ยิ่งอยากได้มากกว่าเดิมไปอีกนะ"
10046060-104 = "ถ้า..."
10046060-105 = "หืม?"
10046060-106 = "ถ้าเป็นสิ่งที่ฉันทำให้ได้ ไม่ว่าอะไรฉันก็จะทำให้ค่ะ"
10046060-112 = "เฮอะ?"
10046060-113 = "ดูเด็กคนนี้เข้าสิ? ใจกล้ามากเลยนะเนี่ย?"
10046060-114 = "ก็ดี งั้นก็เอาตามนั้น แค่พวกฉันไปช่วยตามที่ขอใช่มั้ย?"
10046060-118 = "พูดจริงเหรอคะ?!"
10046060-119 = "อิจิกะจังไม่ใช่คนอื่นไกลสักหน่อย ถ้าใจกล้ามาขอร้องกันแบบนี้ เราจะเมินเฉยได้ยังไงกันล่ะ~"
10046060-120 = "แต่ฉันคงต้องถามอะไรหน่อย เพราะตอนนี้ฉันสงสัยเอามากๆ เลยละ"
10046060-121 = "ทำไมถึงได้ยอมทำอะไรตั้งขนาดนี้เลยล่ะ?"
10046060-122 = "ไม่มีเหตุผลอะไรค่ะ"
10046060-123 = "ต้องมีสิ"
10046060-129 = "ไหนบอกว่าถ้าเป็นสิ่งที่ตัวเองทำได้ ไม่ว่าอะไรก็จะทำให้ไง?"
10046060-130 = "เธอก็รู้ดีนี่ว่าฉันจะขอ <อะไรก็ตาม> จากชมรมทวงความยุติธรรมได้มากกว่านี้อีก แต่ฉันถามแค่นี้เองนะ?"
10046060-131 = "เพราะงั้นก็อย่ามัวแต่ลังเลแล้วตอบฉันมาตามตรงก่อนที่ฉันจะเปลี่ยนใจดีกว่า"
10046060-137 = "เฮ้อ... สนใจแต่สิ่งที่ฉันอยากหลีกเลี่ยง คนคนนี้นี่นะ จริงๆ เลย"
10046060-138 = "ฉันอยากช่วยคุณมิกะน่ะค่ะ เหตุผลมีแค่นี้ค่ะ"
10046060-139 = "อ้อ งั้นเหรอ เป็นเหตุผลที่ดีเลยนะ"
10046060-140 = "แต่เรื่องนี้ฉันเคยได้ยินมาแล้วละ อย่าตอบห้วนๆ แบบนี้สิ"
10046060-141 = "สงสัยอิจิกะจังของเราจะขี้อายจนไม่กล้าพูดออกมานะ งั้นฉันเริ่มพูดให้ก่อนดีมั้ย?"
10046060-142 = "อย่างที่รู้ว่าคนอย่างฉันน่ะมักบังเอิญได้ยินเรื่องโน้นเรื่องนี้มาเยอะมากๆ แต่กับคุณหนูที่ชื่อมิกะน่ะ~ ดูท่าเธอจะชอบก่อปัญหาทีเดียวเลยสินะ?"
10046060-143 = "......"
10046060-144 = "ไม่เอาน่า~ ฉันพูดเอาสนุกแค่นั้นเอง ทำไมต้องทำหน้าจริงจังขนาดนั้นด้วย~ ฉันเองก็ไม่ได้อยากเปิด#nเผยความน่าอับอายของทรีนิตี้หรอกน่า"
10046060-145 = "แต่จะว่ายังไงดีล่ะ~ พอได้เห็นอิจิกะจังที่ฉันรู้จักกับคุณหนูสุดห้าวที่เขาร่ำลือกัน ฉันก็คิดว่า~"
10046060-146 = "อีกฝ่ายเป็นคนที่ควรจะจงรักภักดีขนาดนั้นหรือเปล่าน่ะ"
10046060-147 = "ฉันไม่ได้ทำเพราะจงรักภักดีค่ะ..."
10046060-148 = "โอ้โห? หรือว่าเป็นเพื่อนกันไปแล้ว?"
10046060-149 = "เพื่อน..."
10046060-150 = "เพื่อนเหรอคะ... เฮ้อ"
10046060-160 = "คุณก็รู้จักฉันดี แล้วทำไมถึงมาถามอย่างนี้ล่ะคะ?"
10046060-161 = "ฮ่าฮ่า...! ค่อยคุยกันรู้เรื่องหน่อยนะ!"
10046060-162 = "ตกลงว่าทำไมล่ะ?"
10046060-163 = "ถ้าจะบอกว่าฉันไม่รู้จักคุณมิกะ ก็คงเป็นเรื่องโกหกค่ะ... ฉันเคยเจอคุณมิกะบ้างเวลาทำงาน หลังจากเกิดเหตุการณ์บางอย่าง ฉันก็ได้ยินชื่อของคุณมิกะบ่อยขึ้น..."
10046060-164 = "แล้ววันนี้ฉันก็ได้มาคอยช่วยเหลืออยู่ข้างๆ คุณมิกะค่ะ"
10046060-165 = "ตอนแรกฉันก็คิดนะคะ คิดว่าเธอคนนี้คือสภาน้ำชาที่ผู้คนร่ำลือกัน"
10046060-166 = "ก็เลย... เฝ้าดูอยู่เรื่อยๆ จนฉันคิดว่า"
10046060-171 = "......"
10046060-172 = "เธอคนนี้ช่างเปล่งประกายสดใส ผิดกันกับฉัน"
10046060-173 = "ปกติแล้วเราทำเพื่อเพื่อนได้ขนาดนี้เลยเหรอ? แล้วฉันจะทำแบบนั้นได้มั้ยนะ? เฮ้อ... เป็นฉันคงทำไม่ได้หรอกค่ะ"
10046060-174 = "ฉันไม่อยากให้ความสดใสอย่างนั้นหายไป แล้วก็ไม่อยากให้คนแบบนั้นต้องผิดหวังด้วยค่ะ"
10046060-175 = "เหตุผลมีเท่านี้ค่ะ"
10046060-180 = "......"
10046060-181 = "งั้นเหรอ เหตุผลนั้นสินะ เป็นเรื่องบังเอิญที่น่าสนุกเลยนะเนี่ย"
10046060-182 = "ฉันรู้ค่ะว่าการทำแบบนั้นไม่เหมือนตัวฉันเท่าไร เพราะงั้นก็อย่าพูดเหน็บแนมเลยค่ะ"
10046060-186 = "เหน็บแนมงั้นเหรอ? เปล่าสักหน่อย~ ฉันแค่คิดถึงคนซื่อบื้อคนหนึ่งที่ฉันรู้จักน่ะ"
10046060-187 = "......"
10046060-188 = "ดีละ ในเมื่อสัญญาไว้แล้วก็ต้องรักษาสัญญา"
10046060-192 = "พูดจริงเหรอคะ?!"
10046060-193 = "อื้อ ในโลกนี้น่ะความไว้วางใจคือสิ่งที่สำคัญที่สุด"
10046060-194 = "แต่ว่า~ ขอโทษนะ จะทำยังไงดีล่ะ ก็งานนี้ฉันทำคนเดียวไม่ได้น่ะสิ?"
10046060-199 = "เดี๋ยวสิ เดี๋ยวก่อน~ ฟังที่ฉันจะพูดจบก่อนสิ เธอนี่ก็นะ~"
10046060-200 = "ฉันเองก็คิดว่าถึงเวลาที่ต้องแสดงความจริงใจของฉันบ้างน่ะ"
10046060-208 = "อะแฮ่ม"
10046060-209 = "นี่ทุกคน~ ขอโทษนะ~ มารวมตัวกันสักเดี๋ยวได้มั้ย?"
10046060-216 = "ทำไมเหรอ หัวหน้า? มีเรื่องอะไรเหรอ?"
10046060-217 = "แผนการแก้มือของเราไม่ได้จะทำตอนกลางคืนหรอกเหรอ?"
10046060-219 = "อ่า แผนการนั้นยกเลิกไปแล้วละ"
10046060-220 = "แผนการแก้มือ...?"
10046060-221 = "คือว่า~ ฉันดันไปให้คำสัญญาบางอย่างไว้น่ะสิ~ เราก็เลยต้องไปสร้างอาคารกัน"
10046060-222 = "ขอบอกไว้ก่อนนะว่างานนี้ไม่เกี่ยวกับออนเซ็น แล้วนี่ก็ไม่ใช่คำสั่งด้วย ถ้าไม่อยากทำก็ไม่ต้องทำก็ได้"
10046060-223 = "เอาเป็นว่า... มีใครสนใจอยากไปเป็นอาสาสมัครฟรีๆ ในงานก่อสร้างกลางฤดูร้อนที่แดดเปรี้ยงแบบนี้#nหรือเปล่าล่ะ?"
10046060-228 = "ฉันสนใจ ถ้าหัวหน้าคาสุมิขอร้อง ไม่ว่างานอะไรฉันก็อยากช่วย"
10046060-229 = "เราสร้างออนเซ็นกันไปตั้งหลายบ่อแล้ว แค่อาคารหลังเดียวคงไม่เกินกำลังหรอก~"
10046060-231 = "อื้อ~ ถึงเรื่องจะซับซ้อนจนตามไม่ทัน แต่สรุปง่ายๆ ก็คืองานนี้หัวหน้าคาสุมิอยากช่วยเพื่อนใช่มั้ยล่ะ?"
10046060-232 = "ถ้าเป็นเรื่องแบบนั้น มีเหรอที่ฉันจะปฏิเสธ!"
10046060-238 = "ฮ่าฮ่า..."
10046060-239 = "ฮ่าฮ่า... วะฮะฮะฮ่า!! ฉันนี่ดวงดีเรื่องบริวารจริงๆ!"
10046060-240 = "ได้คนมาช่วยงานของเพื่อนแล้วละ อิจิกะจัง"
10046060-245 = "คะ..."
10046060-246 = "ใครเป็นเพื่อนของคุณกันคะ!!!!"

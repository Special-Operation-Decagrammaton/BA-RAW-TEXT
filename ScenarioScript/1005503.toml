[translation]
1005503-1 = "อย่างมีเล่ห์เหลี่ยม"
1005503-8 = "(......งานเข้าแล้วไง)"
1005503-14 = "(......!?)"
1005503-26 = "[ns1] \"นะ... นั่นมัน...!\"\n[ns2] \"มะ... หมีเหรอ?!\""
1005503-30 = "......หมี?"
1005503-36 = "หมีงั้นเหรอ? หมีอยู่ไหนน่ะ?"
1005503-40 = "หวัดดี คุณครู! ไม่ได้เจอกันนานเลยนะ"
1005503-41 = "ว่าแต่คุณครูมาทำอะไรในที่แบบนี้เหรอ? ที่นี่มันไม่ใช่ทางไปอาคารเรียนเก่าหรือโรงเรียนสักหน่อย..."
1005503-42 = "[s3] \"อ่า... ชิกุเระหรอกเหรอ\"\n[s4] \"เฮ้อ... ตกใจหมดเลย\""
1005503-45 = "ทำไมมองฉันแล้วทำหน้าแบบนั้นล่ะ? แบบนี้เสียมารยาทนะ"
1005503-46 = "หืม? คิดว่าฉันเป็นหมีงั้นเหรอ?"
1005503-47 = "ฮ่าๆ ก็ว่าอยู่ว่าพูดตอบแปลกๆ แต่จริงๆ แล้วแถวนี้ก็มีหมีออกมาจริงๆ นะ"
1005503-48 = "ตกลงคุณครูมาทำอะไรในที่ห่างไกลแบบนี้เหรอ?"
1005503-51 = "หลงทางงั้นเหรอ? เดินหลงมา 4 ชั่วโมงแล้ว...?"
1005503-55 = "ตายจริง... มือเท้าเย็นเป็นน้ำแข็งเลย"
1005503-56 = "ก็เพราะแบบนี้ไง ฉันถึงได้บอกว่าถ้าจะมาสหภาพเรดวินเทอร์ให้บอกฉันก่อน..."
1005503-57 = "คุณครู สหภาพเรดวินเทอร์น่ะกว้างกว่าคนทั่วไปจะจินตนาการได้เลยนะ ถ้าไปซ่อนตัวในที่ราบ#nแม้แต่พวกสำนักเลขาธิการก็ยังหาไม่เจอเลย"
1005503-58 = "แต่ยังไงก็โชคดีที่เจอฉันนะ ไม่งั้นคงเกิดเรื่องใหญ่แล้ว"
1005503-59 = "หืม...? ฉันเป็นอะไรหรือเปล่างั้นเหรอ?"
1005503-60 = "ฉันไม่เป็นอะไรอยู่แล้ว ฉันคุ้นเคยกับที่นี่ดี ถนนหนทางแถวนี้ฉันจำได้หมดแล้ว"
1005503-61 = "เพราะฉันต้องมาทั้งหาผลไม้ ทั้งล่าสัตว์... ก็เลยออกมาแถวนี้บ่อยๆ น่ะ"
1005503-62 = "แน่นอนว่าทางกลับโรงเรียนฉันก็รู้จักดีเลยนะ แต่ว่า..."
1005503-63 = "การเดินลุยบนถนนที่มีแต่หิมะแบบนี้คงไม่ดีเท่าไหร่ แถมระยะทางก็ไม่ได้ใกล้ๆ ด้วย"
1005503-64 = "ถ้ายังเดินทางต่อทั้งที่อุณหภูมิร่างกายต่ำลงเรื่อยๆ แบบนี้ อาจจะโดนหิมะกัดก็ได้"
1005503-65 = "[s] \"ครูไม่เป็นไรหรอก\""
1005503-66 = "เดี๋ยวเหอะ... ก็บอกอยู่ว่าเดี๋ยวหิมะกัด ถึงจะเป็นคุณครูก็เถอะ แต่เรื่องเกี่ยวกับทุ่งหิมะน่ะ ฉันรู้ดี#nกว่าคุณครูหลายเท่า เพราะงั้นอย่ามาดื้อรู้มั้ย?"
1005503-67 = "ดูสิ ตัวสั่นแล้วน่ะ"
1005503-68 = "ไหนจะเรื่องการเตรียมอุปกรณ์ป้องกันความหนาว ไหนจะเรื่องการเพิ่มอุณหภูมิร่างกายอีก...#nคงปล่อยให้คุณครูเดินต่อไปทั้งแบบนี้ไม่ได้หรอก"
1005503-69 = "หืม...? วิธีดีๆ ที่สามารถแก้ปัญหาได้งั้นเหรอ?"
1005503-70 = "ก็... มันก็พอมีวิธีในแบบฉบับของฉันอยู่หรอก..."
1005503-74 = "ฮิฮิ..."
1005503-78 = "วิธีที่ได้ผลที่สุดก็คือการดื่มวอดก้าเพื่อเพิ่มอุณหภูมิร่างกาย..."
1005503-79 = "[s5] \"ไม่ได้เด็ดขาด!\"\n[s6] \"ไม่มีวิธีอื่นแล้วเหรอ?\""
1005503-80 = "เอ้า... ไม่ซื้อวิธีนี้เหรอ? ฉันว่ามันเป็นวิธีที่ดีเลยนะ..."
1005503-81 = "เอ้า... ไม่ซื้อวิธีนี้เหรอ? ฉันว่ามันเป็นวิธีที่ดีเลยนะ..."
1005503-82 = "ถ้าไม่ชอบวิธีนี้ละก็... ไหนดูซิ... มีวิธีอื่นอีกมั้ยนะ..."
1005503-91 = "งั้น..."
1005503-92 = "...กอดกันมั้ยล่ะ? ไม่มีวิธีไหนดีไปกว่าการแบ่งปันความอบอุ่นด้วยร่างกายให้กันและกันแล้วละ"
1005503-93 = "ในเมื่อสถานการณ์มันเป็นอย่างนี้ ฉันก็ไม่ติดอะไรนะ ถ้าคุณครูโอเคก็ถอดเสื้อผ้าที่มันเกะกะออก..."
1005503-94 = "[s7] \"เดี๋ยว! หยุด! มือเธอแตะตรงไหนน่ะ!!\"\n[s8] ปฏิเสธอย่างเอาเป็นเอาตายและถามหาวิธีอื่น"
1005503-97 = "ฮึ่ม... เป็นคนใจแข็งอะไรขนาดนี้เนี่ย"
1005503-98 = "ก็ได้ๆ ฉันล้อเล่นน่า ฉันรู้อยู่แล้วว่าคุณครูต้องมีปฏิกิริยาแบบนั้น"
1005503-99 = "หืม...? ที่ผ่านมาฉันล้อคุณครูเล่นตลอดหรือเปล่างั้นเหรอ?"
1005503-100 = "ไม่รู้สิ~ ล้อเล่นด้วย แล้วก็มีจริงจังด้วยหรือเปล่านะ..."
1005503-101 = "แต่ถึงจะทำแบบนั้นก็ไม่เป็นไรไม่ใช่เหรอ? เพราะคุณครูผิดเองที่ไม่ฟังคำเตือนของฉันตั้งแต่แรกนี่นา"
1005503-102 = "ฉันบอกแล้วว่าสหภาพเรดวินเทอร์เป็นที่อันตราย ถ้ามาโดยไม่มีคนนำทาง แล้วก็กำชับเสียดิบดี#nแล้วว่าก่อนมาให้ติดต่อฉันก่อน..."
1005503-103 = "อย่าลืมสิ ว่าจะมีนักเรียนหลายๆ คนต้องเป็นห่วง ถ้าเกิดอะไรขึ้นกับคุณครูน่ะ..."
1005503-104 = "[s9] \"อืม... ขอโทษนะ ครูจะไม่ทำแบบนี้อีกแล้ว\"\n[s10] \"ไว้คราวหน้าครูจะติดต่อมาก่อน\""
1005503-107 = "ฮิฮิ ดีมาก ถ้าสัญญากันแบบนี้ละก็ ครั้งนี้ฉันก็จะยอมปล่อยผ่านให้"
1005503-108 = "แต่ถ้าคราวหน้ายังเกิดเรื่องอันตรายๆ แบบนี้อีกละก็..."
1005503-109 = "ฉันไม่ยอมหยุดเหมือนครั้งนี้หรอกนะ คุณครูจะต้องทำตามวิธีคลายหนาวของฉันทั้งสองวิธี เข้าใจมั้ย?"
1005503-113 = "[ns] \"เข้าใจแล้ว...\""
1005503-114 = "อืม งั้นฉันจะเลิกล้อเล่นก่อนแล้วกัน"
1005503-118 = "เอาละ... ขึ้นมาบนหลังฉันสิคุณครู ฉันจะพาไปส่งในย่านชุมชนให้"
1005503-119 = "หืม? กลัวว่าจะหนักงั้นเหรอ? ฮะฮ่าฮ่า พูดอะไรของคุณครูเนี่ย"
1005503-120 = "เห็นอย่างนี้ก็เถอะ ฉันเป็นนักเรียนที่ล่ากวางหรือหมีตัวใหญ่แล้วแบกกลับเองอยู่ตลอดนะ"
1005503-121 = "แค่แบกผู้ใหญ่ขึ้นหลังคงไม่ได้ครึ่งของการออกกำลังกายด้วยซ้ำ ไม่ต้องห่วงหรอก"
1005503-122 = "ถ้างั้นก็..."
1005503-123 = "...ไปกันเลยมั้ย?"
1005503-125 = "(จากนั้นคุณครูก็ขี่หลังชิกุเระกลับมาถึงย่านชุมชน)"
1005503-126 = "(พอกลับมาถึง อุณหภูมิร่างกายก็กลับมาปกติจนสามารถกลับไปชาเล่ต์เองได้)"

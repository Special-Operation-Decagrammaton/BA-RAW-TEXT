[translation]
1005503-1 = "Slyly"
1005503-8 = "...I was in a very bad situation."
1005503-14 = "...?!"
1005503-26 = "[ns1] \"What?! Don't hurt me, bear!\" \n[ns2] \"Is that a b-bear?!\""
1005503-30 = "...A bear?"
1005503-36 = "Where's the bear?"
1005503-40 = "It's just me! It's been a while, Sensei."
1005503-41 = "What're you doing all the way out here, though? You shouldn't be wandering off the school grounds."
1005503-42 = "[s3] \"Oh... it's just you, Shigure.\"\n[s4] \"Phew, that was scary.\""
1005503-45 = "What do you mean? That's a little rude, you know."
1005503-46 = "You thought I was a bear? Really?"
1005503-47 = "Hahaha! That's hilarious. Well, it's not totally out of the realm of possibility to run into a bear out here."
1005503-48 = "Which begs the question, again, why are you so off the beaten path?"
1005503-51 = "You've been out here for four hours?! You got lost?"
1005503-55 = "Look at your hands! You're going to get frostbite."
1005503-56 = "Didn't I tell you to give me a heads up if you come to Red Winter?"
1005503-57 = "Sensei, Red Winter Academy is way bigger than you can even comprehend. If you get lost out here in the wilderness, it's pretty much over."
1005503-58 = "It's a good thing I ran into you. Who knows what could've happened."
1005503-59 = "Huh? What about me?"
1005503-60 = "I know the roads around here like the back of my hand."
1005503-61 = "Living at the Former Institute means we have to forage for our own food, so I'm out here pretty often."
1005503-62 = "And, unlike someone, I know the way back to the academy."
1005503-63 = "But, considering the situation, I don't think we'll make it all the way back there right now."
1005503-64 = "You've been out here too long already. If we try to walk back, you could get frostbite. Or worse. "
1005503-65 = "[s] \"It's okay. I can make it.\""
1005503-66 = "Don't put on a brave face. You might be the teacher, but you aren't used to these kinds of weather conditions."
1005503-67 = "Look, you're shivering!"
1005503-68 = "We've got to find some kind of way to warm you up before we do anything else..."
1005503-69 = "What? What's the fastest way to do that?"
1005503-70 = "Well... I do have a quick and easy solution"
1005503-74 = "Heehee."
1005503-78 = "The most effective way to raise body temperature is to indulge in a good old bottle of vodka."
1005503-79 = "[s5] \"Absolutely not!\"\n[s6] \"You really have no other options?!\""
1005503-80 = "What? Why not? You're the one who asked for the fastest solution."
1005503-81 = "What? Why? You're the one who asked for the fastest solution."
1005503-82 = "Okay, okay, fine. Let me think."
1005503-91 = "How about a hug?"
1005503-92 = "Using our body heat to stave off the cold is the most tried and true method of survival."
1005503-93 = "Considering the situation, it might be our best option. Of course, we'll have to take off all our wet clothes..."
1005503-94 = "[s7] \"Stop, stop! Stop right there!\"\n[s8] Desperately refuse and ask for another way."
1005503-97 = "Hmph. You're so close-minded."
1005503-98 = "Heehee. Sorry, Sensei. I was just kidding. I just wanted to see your reaction."
1005503-99 = "Hm? Was I teasing you?"
1005503-100 = "Hmm, well..."
1005503-101 = "And if I was? That's what you get for ignoring my advice."
1005503-102 = "Don't you remember? I told you not to wander around Red Winter Academy without a guide and to let me know when you got here!"
1005503-103 = "You need to be careful. A lot of people would be really sad if something happened to you."
1005503-104 = "[s9] \"Hmm... You're right. I apologize.\"\n[s10] \"I'll contact you next time.\""
1005503-107 = "Heehee. As long as you've learned from your mistake, I'll forgive you."
1005503-108 = "But if you act without thinking like that again..."
1005503-109 = "You're going to get some serious punishment, okay?"
1005503-113 = "[ns] \"Got it...\""
1005503-114 = "Okay, okay. Since that's settled..."
1005503-118 = "It's time for a piggy back ride, Sensei. I'll get you downtown."
1005503-119 = "You think you're too heavy? Hahaha! You're so silly, Sensei."
1005503-120 = "I've killed, carried, and skinned bears bigger than you."
1005503-121 = "I can carry an adult like you with one arm. Stop your worrying."
1005503-122 = "So..."
1005503-123 = "...Shall we go?"
1005503-125 = "Shigure carried me all the way downtown on her back."
1005503-126 = "Once I was indoors, I warmed up my frozen body and finally made it back to Schale."

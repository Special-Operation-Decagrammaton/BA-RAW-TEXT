[translation]
1005503-1 = "泰然自若"
1005503-8 = "（……迷路了）"
1005503-14 = "（……！？）"
1005503-26 = "[ns1]「難，難道是……！」\n[ns2]「熊！？」"
1005503-30 = "……咦？"
1005503-36 = "熊？哪裡有熊？"
1005503-40 = "好久不見了呢，老師。"
1005503-41 = "怎麼會在這種地方？#n這裡不是主校舍，舊校舍也在別的方向哦。"
1005503-42 = "[s3]「還好是時雨……」\n[s4]「我放心了……」"
1005503-45 = "怎麼了，還好嗎？"
1005503-46 = "咦，以為是熊？"
1005503-47 = "啊……不過這附近確實會出現呢。"
1005503-48 = "話說雖然是一樣的問題，老師在這種地方做什麼呢？"
1005503-51 = "……迷路了？已經流浪了4個小時？"
1005503-55 = "嗚哇，手腳都凍得跟冰一樣……"
1005503-56 = "所以我才說來赤冬之前要告訴我一聲啊。"
1005503-57 = "這裡實在太大了，有時候可能會連事務局的人都找不到你的。"
1005503-58 = "……不過，能在出大事之前遇到真是太好了。"
1005503-59 = "……我？"
1005503-60 = "嗯，我常經過這裡所以沒問題的。"
1005503-61 = "這裡是採集果實和狩獵的好地方……"
1005503-62 = "所以多少還是知道回去的路……"
1005503-63 = "不過離這裡有段距離，以老師的狀態在雪上走也有點困難。"
1005503-64 = "再這樣活動下去的話可能會凍傷的。"
1005503-65 = "[s]「沒關係，我還撐得住唷。」"
1005503-66 = "別逞強了。就算是老師，我也比你更清楚雪原的可怕。"
1005503-67 = "你看，身體都在發抖了……"
1005503-68 = "總之，再這樣下去不行。#n得想想辦法……"
1005503-69 = "……嗯？解決方法？"
1005503-70 = "是有幾個啦。"
1005503-74 = "……呵呵。"
1005503-78 = "果然最確實的辦法還是把能讓身體熱起來的液體給──"
1005503-79 = "[s5]「那個絕對不行！」\n[s6]「可，可以的話請用其他方法……」"
1005503-80 = "唔嗯，我還以為是個好方法的……"
1005503-81 = "唔嗯，我還以為是個好方法的……"
1005503-82 = "那，其他還有……"
1005503-91 = "抱抱，之類的？"
1005503-92 = "抱抱的話基本上就很安全了。只是分享體溫而已。"
1005503-93 = "非常時期就要用非常手段，老師同意的話就把衣服──"
1005503-94 = "[s7]「STOP！！！」\n[s8] 設法找出其他方法"
1005503-97 = "真是的，老師真不知變通。"
1005503-98 = "算了，本來就覺得老師會這麼說。"
1005503-99 = "……嗯？我是不是在捉弄你？"
1005503-100 = "嗯～誰知道呢？"
1005503-101 = "但是，得想想辦法是真的哦？#n而且我明明有事前給你忠告了……"
1005503-102 = "沒有嚮導很危險，所以來的時候一定要通知我。"
1005503-103 = "如果老師出了什麼事，會讓很多學生擔心的唷。"
1005503-104 = "[s9]「我很抱歉……」\n[s10]「下次一定會聯絡你的。」"
1005503-107 = "嗯，那就好。"
1005503-108 = "但是，如果下次又遇到這種危險狀況……"
1005503-109 = "到那個時候，我就會強制採取剛剛說的那兩種方法哦？"
1005503-113 = "[ns]「我一定會馬上聯絡你……」"
1005503-114 = "那，玩笑先說到這裡……"
1005503-118 = "……來，我背你，到我背上來吧，老師。"
1005503-119 = "咦，很重？#n啊哈哈，老師在說什麼。"
1005503-120 = "我平常可是能扛著鹿和熊行動的唷？"
1005503-121 = "老師一個人不算什麼。別擔心。"
1005503-122 = "那……"
1005503-123 = "我們走吧。"
1005503-125 = "（就這樣讓時雨背回了街上）"
1005503-126 = "（到達時體溫已經回暖，得以安全地回到夏萊）"

1005503-40 = "3;시구레;07;안녕, 선생님. 오랜만이네.\n#3;em;[음표]"
1005503-41 = "3;시구레;02;그나저나 선생님은 왜 이런 곳에 있어? 여기는 구교사도 학교 쪽도 아닌데……."

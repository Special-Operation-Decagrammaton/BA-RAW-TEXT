1005503-45 = "3;시구레;05;왜 사람을 보고 그런 표정을 짓는 거야. 실례라고, 그거."
1005503-46 = "3;시구레;10;응? 내가 곰인 줄 알았다고?\n#3;em;[반응]"
1005503-47 = "3;시구레;03;아하하……. 어쩐지 대답하기 곤란하네. 이 근처에서는 실제로 곰이 나오기도 하니까."
1005503-48 = "3;시구레;00;그보다 다시 묻는 거지만, 어째서 이런 외진 곳에 있는 거야?"

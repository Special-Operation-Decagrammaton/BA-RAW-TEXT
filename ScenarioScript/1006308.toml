1006308-44 = "3;코유키;03;니하하하……. 역시 그런 거겠죠? 애초에 운 없는 녀석이 그거 찾는다고 운이 생길 거였으면, 세상에 운 없는 사람이 어디 있겠어요?\n#3;em;[반응]"
1006308-45 = "3;코유키;12;역설적으로 '운이 있는 사람의 징표'가 '운을 가져다주는 것'처럼 보이고 있는 것뿐이니까요."
1006308-46 = "3;코유키;03;운 없는 녀석한테는……. 애초에 나타나질 않는 거라는 거죠. 니하하…….\n#3;em;[재잘]\n#3;greeting"

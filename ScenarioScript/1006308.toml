1006308-51 = "3;코유키;02;글쎄요. 어떨까요? 선생님이 보시기에는 그래 보이나요?\n#3;em;[?]"
1006308-52 = "3;코유키;01;사실 저도 제가 진짜 믿는지 아닌지 잘 몰라요! 진지하게 생각해 본 적도 별로 없고요!\n#3;greeting"
1006308-53 = "3;코유키;00;대부분의 경우에는 세상 일들이라는 게 그냥 딱딱 맞게 돌아가잖아요? 그게 맞으니까요! 원인과 결과니까요!\n#3;em;[반응]"
1006308-54 = "3;코유키;01;문제가 있고, 풀면 풀리는 거고. 정답은 정해져 있고……. 늘 그런……. 어렵지 않은 일이죠."

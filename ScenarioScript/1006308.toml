[translation]
1006308-1 = "เพราะมันสนุกกว่า"
1006308-2 = "(คุณครูออกไปหาโคยูกิเพราะสงสัยว่าเกิดเรื่องอะไร เมื่อไปถึงก็พบว่าโคยูกินั่งอยู่ที่สนามหญ้า)"
1006308-4 = "(โคยูกิกำลังจ้องสนามหญ้าด้วยสีหน้าเอาจริงเอาจัง...)"
1006308-5 = "อืม..."
1006308-6 = "คงจะไม่มีจริงๆ สินะ... ฉันจะไม่มีโชคกับเขาบ้างเลยเหรอเนี่ย... โธ่...!!"
1006308-8 = "[ns1] \"โคยูกิ?\"\n[ns2] \"มีอะไรเหรอ?\""
1006308-11 = "เอ๋...? คุณครู?"
1006308-15 = "อ่า... มาหาฉันเพราะเรื่องข้อความที่ส่งไปงั้นเหรอคะ? แต่มันไม่ใช่เรื่องใหญ่อะไรเลยนะ... อุวะฮ่าฮ่า..."
1006308-16 = "รู้สึกเหมือนว่าช่วงนี้ฉันติดต่อคุณครูบ่อยเกินไปเลย... "
1006308-17 = "ถ้าเอาแต่ทำให้คุณครูกังวลกับเรื่องไร้สาระแบบนี้ ฉันกลัวว่าต่อไปคุณครูจะรำคาญจนเบื่อฉันขึ้นมา..."
1006308-18 = "ไม่มีทางเป็นอย่างนั้นงั้นเหรอคะ? ฮะฮ่าฮ่า... แค่คุณครูพูดแบบนั้นฉันก็ขอบคุณแล้วค่ะ~"
1006308-19 = "คะ?"
1006308-20 = "ฉันกำลังทำอะไรอยู่น่ะเหรอคะ? อืม... คือว่า..."
1006308-24 = "ถ้าฉันบอกคุณครูไป คุณครูอาจคิดว่ามันแปลกก็ได้..."
1006308-25 = "เอ่อ... ฉันกำลังพยายามหาใบโคลเวอร์สี่แฉกอยู่น่ะค่ะ..."
1006308-26 = "อุวะฮ่าฮ่า... มันค่อนข้างดูอนาล็อกไปหน่อยใช่มั้ยคะ?"
1006308-27 = "[s3] \"โคลเวอร์สี่แฉกเหรอ?\"\n[s4] \"คาดไม่ถึงเลยแฮะ\""
1006308-30 = "ชะ... ใช่มั้ยล่ะคะ? คิดไว้แล้วเชียวว่าคุณครูจะต้องตกใจ!"
1006308-31 = "คือว่า... ถ้าให้อธิบาย... มันอาจฟังดูเป็นเรื่องตลกก็ได้ค่ะ แต่ยังไงฉันก็จะลองอธิบายดูค่ะ"
1006308-35 = "ก็ฉัน... ไม่ค่อยมีโชคในการเล่นเกมเลย อืม... อันที่จริงก็ไม่ค่อยมีโชคในทุกๆ เรื่องแหละค่ะ"
1006308-36 = "ฉันก็เลยมาคิดว่า \"ทำยังไงถึงจะโชคดีขึ้นได้นะ?\" จนสุดท้ายก็เจอวิธีค่ะ!"
1006308-37 = "โคลเวอร์สี่แฉกคือสัญลักษณ์แห่งความโชคดี ถ้าเก็บใบโคลเวอร์สี่แฉกมาได้ก็อาจโชคดีขึ้นบ้าง#nก็ได้ค่ะ"
1006308-38 = "แต่ว่า... ฉันเจอปัญหาใหญ่ตั้งแต่มาถึงที่นี่เลยค่ะ"
1006308-39 = "ที่ใบโคลเวอร์สี่แฉกเป็นสัญลักษณ์แห่งความโชคดี ก็คงเพราะมีแค่คนที่โชคดีเท่านั้นที่จะหามันเจอ"
1006308-44 = "อุวะฮ่าฮ่า... คงจะเป็นอย่างนั้นใช่ไหมคะ? ถ้าคนที่ไม่มีดวงเป็นทุนอยู่แล้วมานั่งหาใบไม้เพื่อให้#nตัวเองโชคดีขึ้น แล้วเกิดโชคดีขึ้นได้จริงๆ แบบนั้นโลกนี้ก็คงไม่มีคนที่ดวงกุดหรอกค่ะ"
1006308-45 = "ที่จริงแล้วการที่เรา \"จะโชคดีขึ้น\" ได้ เราก็ต้องเป็นคนที่ \"โชคดี\" อยู่ก่อนแล้ว..."
1006308-46 = "ฮะฮะฮะ... และสำหรับคนที่ไม่มีโชคเลยนั้น คงหามันไม่เจอหรอกค่ะ..."
1006308-47 = "[s5] \"โคยูกิเป็นสายมูด้วยเหรอเนี่ย?\"\n[s6] \"เชื่อเรื่องโชคลางกับเขาด้วยเหรอ?\""
1006308-50 = "อืม..."
1006308-51 = "ไม่รู้สิคะ คุณครูคิดว่ายังไงเหรอคะ?"
1006308-52 = "ที่จริงแล้วฉันเองก็ไม่รู้เหมือนกันค่ะว่าฉันเชื่อเรื่องแบบนี้จริงๆ หรือเปล่า เพราะฉันไม่เคยคิดเรื่อง#nโชคหรือดวงแบบจริงจังมาก่อน"
1006308-53 = "เหตุการณ์ส่วนใหญ่ในโลกล้วนเกิดขึ้นตามหลักของเหตุและผลนี่คะ!"
1006308-54 = "มีปัญหา และมีวิธีแก้ปัญหา... คำตอบมันตายตัวอยู่แล้ว ไม่ได้เกี่ยวอะไรกับเรื่องดวงหรอกค่ะ"
1006308-55 = "แต่ว่า..."
1006308-56 = "แต่ถ้าโลกนี้ไม่มีพวกเรื่องโชคอยู่จริงๆ ละก็... อืม..."
1006308-57 = "ฉันคิดว่ามัน... ดูจะขาดสีสันและความสนุกไปหน่อยค่ะ...!"
1006308-58 = "เพราะงั้น... ถึงไม่รู้ว่ามันมีจริงหรือเปล่า แต่ฉันก็อยากจะลองเชื่อดูค่ะ!! อุวะฮ่าฮ่าฮ่าฮ่า!!"
1006308-59 = "[s] \"......\""
1006308-60 = "อุวะฮ่าฮ่า... อืม... ฉันเผลอพูดอะไรไปเรื่อยเลยนะคะเนี่ย ปกติไม่เป็นแบบนี้เลยแท้ๆ..."
1006308-61 = "[ns] \"โคยูกิ...\""
1006308-63 = "[ns7] \"ดูข้างหลังสิ\"\n[ns8] นั่งยองๆ แล้วชี้ไปที่ด้านหลังโคยูกิ"
1006308-66 = "หืม...? ข้างหลังเหรอคะ?"
1006308-72 = "ข้างหลัง...? เอ๋?"
1006308-73 = "เอ๋...?"
1006308-74 = "อ๊ะ...! นั่นมัน..."
1006308-79 = "― คุณครู! ดูนี่สิคะ!! โคลเวอร์สี่แฉกจริงๆ ด้วยค่ะ![wa:1160] "
1006308-82 = "― เป็นไปได้ยังไงกันน่ะ!? เมื่อกี้ยังไม่เห็นมีเลยนี่นา![wa:10] "
1006308-84 = "― หรือว่า... จู่ๆ มันก็โผล่ขึ้นมางั้นเหรอ?[wa:240] "
1006308-87 = "― ไม่ละ... เรื่องแบบนั้นเป็นไปไม่ได้แน่...[wa:540] "
1006308-89 = "― หรือว่าฉันมองไม่เห็นเองนะ...? คุณครูเห็นตั้งแต่เมื่อไหร่เหรอคะ?[wa:800] "
1006308-92 = "― อีกอย่าง... ทำไม... ถึงได้...[wa:1930] "
1006308-94 = "― หาเจอในเวลา...ที่เหมาะเจาะแบบนี้นะ...!?[wa:160] "
1006308-97 = "[ns9] \"เพราะเชื่อว่าจะหาเจอยังไงล่ะ\"\n[ns10] \"เพราะแบบนี้มันสนุกกว่าน่ะสิ...\""
1006308-98 = "― ...!!![wa:410] "
1006308-99 = "― ...!!![wa:410] "
1006308-101 = "― นะ...นั่นสิ... จริงด้วยค่ะ...![wa:840] "
1006308-104 = "― ค่ะ...! การคิดแบบนั้น...แน่นอนว่า...[wa:3220] "
1006308-106 = "― มันจะต้องสนุกกว่าแน่เลยค่ะ!"
1006308-111 = "(หลังจากนั้นคุณครูก็ใช้เวลาพูดคุยกับโคยูกิอีกสักพักแล้วกลับมาที่ชาเล่ต์)"

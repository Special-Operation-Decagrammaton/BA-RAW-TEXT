1006308-14 = "3;코유키;02\n#3;jump\n#3;a\n#wait;1500"
1006308-15 = "3;코유키;02;아……. 연락 때문에 신경 쓰여서 오신 거예요? 진짜 별일 아닌데…… 니하하하…….\n#3;em;[?]"
1006308-16 = "3;코유키;01;뭔가 안 그래도 최근 너무 자주 연락 드린 거 같아서요."
1006308-17 = "3;코유키;99;자꾸 이렇게 별것도 아닌 걸로 신경 쓰이게 해드리면, 나중에는 신경 안 쓰실까 봐 걱정이 좀……."
1006308-18 = "3;코유키;03;아. 그럴 일은 없을 거라고요? 니하……. 말씀만이라도 고맙습니다~.\n#3;em;[반응]"
1006308-19 = "3;코유키;02;네?"
1006308-20 = "3;코유키;02;그래서 뭘 하고 있었냐고요? 음……. 그, 그게 말이죠……."
1006308-21 = "#st;[0,0];instant;1;"

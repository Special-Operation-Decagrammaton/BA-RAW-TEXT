1006308-35 = "#na;코유키;제가 그, 게임 할 때 운이 좀 없잖아요? 아니, 뭐 굳이 게임에 한정된 이야기는 아니지만……."
1006308-36 = "#na;코유키;그래서 운이 좋아지려면 어떻게 해야 할까? 하다가 생각해 낸 게 이거거든요!"
1006308-37 = "#na;코유키;행운의 상징하면 역시 네잎클로버! 네잎클로버를 얻으면 행운이 생길 거야! 라고."
1006308-38 = "#na;코유키;근데, 그……. 여기엔 시작부터 하나의 큰 문제가 있는데."
1006308-39 = "#na;코유키;……애초에 네잎클로버 자체가 행운의 상징이고 운이 좋은 사람들한테 나타난다……는……?"

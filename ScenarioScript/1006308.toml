1006308-5 = "#zmc;instant;0,-222;2000\n#na;코유키;…………으음."
1006308-6 = "#zmc;instant;0,-222;2000\n#na;코유키;역시 없나……. 어떻게 보면 완전 데드엔드인데, 이거……. 으이씨……!!"

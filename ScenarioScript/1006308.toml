1006308-30 = "3;코유키;04;그, 그렇죠? 역시 그렇게 반응하실 거 같았거든요!\n#3;hophop"
1006308-31 = "3;코유키;12;이게, 그……. 그러니까 설명하면 되게 웃기는 이야기가 되는데요? 그래도 일단 말해 볼게요.\n#3;greeting"

1006308-25 = "3;코유키;03;그……. 네잎클로버를…… 좀……? 손으로 찾고 있었다고 해야 하나?\n#3;closeup\n#3;em;[///]"
1006308-26 = "3;코유키;03;니하하하……. 조금 아날로그적이려나요? 여러 의미로…….\n#3;closeup"

[translation]
1006308-1 = "幸運之証"
1006308-2 = "（出於好奇便去了一趟，發現小雪似乎在草地上做些什麼）"
1006308-4 = "（表情看起來相當認真）"
1006308-5 = "…………唔嗯。"
1006308-6 = "差不多也該找到了吧……"
1006308-8 = "[ns1]「小雪？」\n[ns2]「怎麼了嗎？」"
1006308-11 = "……咦，老師？"
1006308-15 = "啊，是因為我的聯絡才會過來嗎？#n尼哈哈……真的沒什麼啦。"
1006308-16 = "唔，總覺得最近好像太常連絡你了……"
1006308-17 = "想說如果連這種小事都一一報備，會不會哪天老師就不理我了……"
1006308-18 = "不會發生那種事……？#n尼，尼哈哈……有點害羞呢。"
1006308-19 = "嗯？"
1006308-20 = "問我在做什麼？#n嗯～這是……那個。"
1006308-24 = "突然做這種事，你可能會覺得奇怪……"
1006308-25 = "其實我正在找四葉幸運草……"
1006308-26 = "尼哈哈……現在已經不流行這個了對吧……"
1006308-27 = "[s3]「四葉幸運草？」\n[s4]「這我倒是沒想到……」"
1006308-30 = "對，對吧？#n我就覺得你會有那種反應！"
1006308-31 = "我會好好說明的……請，請不要取笑我哦！"
1006308-35 = "我玩遊戲的運氣不太好對吧？#n不，遊戲之外的運氣也差不多就是了……"
1006308-36 = "所以我想過要怎麼讓運氣變好……#n於是就決定來找四葉幸運草！"
1006308-37 = "說到四葉幸運草就是幸運之證對吧！#n只要找到它，我就會獲得幸運。"
1006308-38 = "不過，遇到了一點問題……"
1006308-39 = "聽說四葉幸運草本來就只會在運氣好的人面前出現……"
1006308-44 = "而且如果找到四葉幸運草就能獲得好運，這個世界上就不會有不幸的人了吧。"
1006308-45 = "也就是說幸運之證只會出現在好運的人面前……"
1006308-46 = "像我這種運氣不好的人是找不到的吧……#n尼哈哈……"
1006308-47 = "[s5]「小雪是個迷信的人嗎？」\n[s6]「你認為存在好運跟厄運嗎？」"
1006308-50 = "嗯……"
1006308-51 = "老師怎麼看呢？"
1006308-52 = "至於我的話……我自己也不是很清楚！#n畢竟我也沒有仔細想過！"
1006308-53 = "不過，幾乎每件事情都有因果關係……#n就算真的是那樣也很自然吧。"
1006308-54 = "就像問題永遠都有正確解答一樣？"
1006308-55 = "……但是。"
1006308-56 = "如果斷定運氣或迷信之類的東西一定不存在的話……"
1006308-57 = "好像也不太有趣……"
1006308-58 = "……所以我想相信它們存在！#n尼哈！"
1006308-59 = "[s] 「……」"
1006308-60 = "尼哈哈……#n唔，總覺得好像有點在鑽牛角尖呢。"
1006308-61 = "[ns]「……小雪。」"
1006308-63 = "[ns7]「轉身看看後面。」\n[ns8] 指向小雪身後不遠的地方"
1006308-66 = "……嗯？後面嗎？"
1006308-72 = "……咦？"
1006308-73 = "咦？"
1006308-74 = "咦咦咦咦咦咦咦咦咦咦！！！！！"
1006308-79 = "― 老師！請看！！是四葉的幸運草唷！！[wa:2400] "
1006308-82 = "― 這是怎麼回事！？剛才明明沒有的說！[wa:1160] "
1006308-84 = "― 難道……是突然長出來的？[wa:1360] "
1006308-87 = "― 不，那應該不可能吧……[wa:1700] "
1006308-89 = "― 是我漏看了嗎……？老師是什麼時候注意到的呢？[wa:2440] "
1006308-92 = "― 況且又是怎麼像這樣……[wa:2650] "
1006308-94 = "― 在這麼好的時機……找到的……！？[wa:1080] "
1006308-97 = "[ns9]「因為相信著幸運吧？」 \n[ns10]「這樣會更開心哦。」"
1006308-98 = "― ……！！！[wa:450] "
1006308-99 = "― ……！！！[wa:450] "
1006308-101 = "― ……原來如此……！確實是呢……！！[wa:1360] "
1006308-104 = "― ……嗯！這麼想的話，肯定……[wa:4100] "
1006308-106 = "― ……會更快樂的！！"
1006308-111 = "（在那之後，和小雪稍微閒聊了一下便回到了夏萊）"

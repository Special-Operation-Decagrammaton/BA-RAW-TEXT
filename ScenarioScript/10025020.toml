[translation]
10025020-1 = "Episode 2;Shadow over Yatoura Village"
10025020-2 = "Yatoura Dock"
10025020-14 = "Hello, sir."
10025020-15 = "..."
10025020-16 = "Do you live around here?"
10025020-17 = "..."
10025020-18 = "I'm on vacation with my friends, but the water is a bit choppy."
10025020-19 = "Is there a beach nearby that's better for swimming?"
10025020-20 = "...If you're here for swimming, you came to the wrong town."
10025020-21 = "Yatoura Village ain't for young folks like you. All we got here is shrimp."
10025020-22 = "R-Really? I think Yatoura is pretty..."
10025020-23 = "...There's no accounting for taste."
10025020-27 = "Do what you will. Just don't get in the way of my work."
10025020-28 = "Oh, uh, thank you."
10025020-32 = "Is this your shrimp boat?"
10025020-33 = "Yeah."
10025020-34 = "It's bigger than I expected. The anchor's up... Are you about to set out?"
10025020-36 = "What kinda lazy fisherman goes fishing in the middle of the day?"
10025020-37 = "Uh... Huh?"
10025020-39 = "We finish our day before young 'uns like you've even had breakfast. I was about to drop anchor."
10025020-40 = "I-I see..."
10025020-41 = "Did you catch a lot of shrimp today?"
10025020-43 = "Why do you care?"
10025020-44 = "J-Just curious... I'm sorry if I've made you uncomfortable."
10025020-46 = "It's just...we haven't seen much shrimp in the D.U. lately..."
10025020-47 = "And folks on social media are saying Yatoura Village must be in trouble, since all the shrimp are caught here..."
10025020-51 = "There's no trouble here."
10025020-52 = "But—"
10025020-53 = "Oh, so you think catching shrimp is easy, do you?"
10025020-54 = "All's I know is we're at the mercy of the sea. I catch what I catch, and what the world does with my catch is no concern of mine."
10025020-56 = "And no whippersnapper like you is gonna tell me how to do my business."
10025020-58 = "I didn't..."
10025020-66 = "Like I said, don't get in the way of my work."
10025020-67 = "If you stick your nose where it don't belong, don't be surprised if the Deep Ones come looking for you..."
10025020-73 = "Deep...Ones...?"
10025020-78 = "Yatoura Valkyrie Coast Guard Station"
10025020-82 = "Hey! Anyone there?"
10025020-90 = "Ugh... Who's making all that racket so early in the morning...?"
10025020-97 = "Huh? I've never seen you around here before. Who are you?"
10025020-98 = "Oh, I'm just a tourist. I heard this village is great for swimming."
10025020-99 = "Swimming? Here?"
10025020-100 = "You, uh, sure you got the right place? There are lots of little towns in the area, easy to get 'em mixed up..."
10025020-101 = "I mean, it's not impossible that someone would come here to swim..."
10025020-102 = "But a tourist in this armpit of a town... It's been a minute."
10025020-103 = "We don't have a choice, but believe me, I'd request a transfer in an instant if I thought it'd go through."
10025020-105 = "A boring town like this doesn't give many opportunities to show off, y'know? No chance for promotion..."
10025020-107 = "(I've never seen Valkyrie students with such irresponsible attitudes before...)"
10025020-109 = "Well, is there anything a tourist should know about the area? Dangerous stretches of shore? Local crime sprees?"
10025020-110 = "Have there been any incidents in town lately?"
10025020-111 = "Beats me."
10025020-112 = "...?!"
10025020-113 = "If you want the latest news, get a newspaper. Don't bother us about it."
10025020-114 = "Yeah. We've got more important things to do than entertain tourists."
10025020-115 = "You just said you have nothing to do?!"
10025020-117 = "I didn't know the students of Valkyrie Police School were like this..."
10025020-122 = "Hey, it's not like we chose to—"
10025020-127 = "...Forget it. Forget we said anything."
10025020-128 = "We've got work to do. Please don't start any trouble."
10025020-130 = "If some random tourist angers the Deep Ones, we'll all have to pay for it."
10025020-139 = "The nerve of them...!"
10025020-140 = "But what did they mean by \"Deep Ones\"...?"
10025020-148 = "...No one's watching me, right?"
10025020-149 = "Aaah, what a cranky village. All I want is help catching one little fish, and they give me those dirty looks..."
10025020-150 = "But I learned what I needed to. It's only a matter of time until I catch the biggest—"
10025020-151 = "Um..."
10025020-155 = "E-Excuse me, but you're standing on my fishing line..."
10025020-156 = "W-Whoa!! When did you get here?!"
10025020-160 = "I've been here this whole time... "
10025020-161 = "I understand wh-why you wouldn't notice a boring, insignificant person like me..."
10025020-163 = "I might as well be a starfish on a pier..."
10025020-165 = "N-No! You've got it wrong!"
10025020-166 = "I just, uh, have a lot on my mind. I wasn't looking where I was going. I'm sorry!"
10025020-167 = "Here, I'll let you have a few of my lures, so...please stop saying stuff like that..."
10025020-171 = "Th-Thank you..."
10025020-172 = "Are you here to fish, by the way? You're dressed for it..."
10025020-173 = "Oh, yeah. They say you can catch a big one here."
10025020-174 = "I-I see... My friends d-dragged me here. I didn't know this town was famous for its fishing..."
10025020-175 = "What kind of fish can you catch here?"
10025020-176 = "Wh-What kind? Um..."
10025020-177 = "Uh... Mackerel?"
10025020-178 = "Well, mackerel are small fish, so I don't know if you'll catch a, uh, big one..."
10025020-179 = "And the lure you're using is t-too big for mackerel..."
10025020-180 = "R-Really...?"
10025020-181 = "But maybe there's an extra big mackerel I can catch with this lure...right?"
10025020-183 = "Heck, if the Deep Ones help me, I might even catch one that's a whole meter long!"
10025020-185 = "Deep Ones...?"
10025020-187 = "Whoops...!"
10025020-188 = "I didn't say that! I mean, I was just mumbling to myself."
10025020-189 = "Oh, I just remembered a different spot where I can catch fish. I'll go alone. If we both go, they'll get scared off..."
10025020-190 = "Don't mention me to the townsfolk! Okay bye!"
10025020-197 = "Something seems off..."

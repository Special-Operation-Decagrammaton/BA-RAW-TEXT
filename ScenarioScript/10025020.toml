[translation]
10025020-1 = "ตอนที่ 2;เงาแห่งหมู่บ้านยาโตอูระ"
10025020-2 = "ท่าเรือยาโตอูระ"
10025020-14 = "...สวัสดีค่ะ คุณนักตกปลา..."
10025020-15 = "......"
10025020-16 = "ใช่คนของหมู่บ้านนี้หรือเปล่าคะ?"
10025020-17 = "......"
10025020-18 = "คือว่าฉันตั้งใจว่าจะมาเล่นน้ำทะเลที่หมู่บ้านนี้กับพวกเพื่อนๆ แต่ว่าวันนี้อากาศดูไม่เหมาะจะลงไปเล่น#nน้ำเลยน่ะค่ะ"
10025020-19 = "แถวนี้มีชายหาดดีๆ คลื่นไม่แรงที่พอจะลงไปเล่นน้ำได้บ้างมั้ยคะ?"
10025020-20 = "ถ้าอยากเล่นน้ำสนุกๆ ก็เชิญไปหมู่บ้านอื่นเถอะ"
10025020-21 = "หมู่บ้านยาโตอูระเป็นแค่หมู่บ้านเล็กๆ ที่มีแต่คนค้าคนขายกุ้งเท่านั้นแหละ"
10025020-22 = "งะ...งั้นเหรอคะ? ฉันคิดว่าที่นี่เป็นหมู่บ้านที่สวยดีแท้ๆ..."
10025020-23 = "...รสนิยมแปลกดีจังเลยนะ"
10025020-27 = "งั้นก็ตามใจ จะทำอะไรก็ตามสบาย ขอแค่ไม่รบกวนการจับกุ้งก็พอ"
10025020-28 = "ขอบคุณที่เข้าใจนะคะ"
10025020-32 = "คะ...คือว่าเรือลำนี้เป็นเรือสำหรับจับกุ้งเหรอคะ?"
10025020-33 = "...ใช่น่ะสิ"
10025020-34 = "ใหญ่กว่าที่คิดอีกนะคะเนี่ย ดูจากที่คุณกำลังยกสมอขึ้นแบบนี้ แสดงว่ากำลังจะออกไปจับกุ้งใช่มั้ยคะ?"
10025020-36 = "มีชาวประมงที่ไหนเขาออกไปจับกุ้งตอนพระอาทิตย์ขึ้นสูงแสกหน้าผากแบบนี้แล้วกันบ้างน่ะ?"
10025020-37 = "คะ...คะ?"
10025020-39 = "การจับกุ้งวันนี้น่ะเสร็จไปตั้งแต่เช้ามืดแล้ว ฉันกำลังจะผูกเรือเก็บแล้วต่างหาก"
10025020-40 = "งะ...งั้นหรอกเหรอคะ..."
10025020-41 = "แล้ววันนี้จับกุ้งได้เยอะหรือเปล่าคะ?"
10025020-43 = "เธอจะสงสัยไปทำไมน่ะ...?"
10025020-44 = "อ่า... ฉันไม่ได้มีเจตนาอะไรเป็นพิเศษหรอกค่ะ ขอโทษด้วยนะคะที่ทำให้รู้สึกไม่ดีน่ะค่ะ"
10025020-46 = "ก็แค่ช่วงนี้ฉันไม่ค่อยเห็นกุ้งที่ส่งไปจากหมู่บ้านยาโตอูระในเขต D.U. เลย..."
10025020-47 = "แถมในโซเชียลก็มีข่าวลือกับข้อสงสัยแปลกๆ ว่าเกิดปัญหาอะไรกับหมู่บ้านที่โด่งดังเรื่องกุ้งหรือเปล่า#nด้วยน่ะค่ะ"
10025020-51 = "...หมู่บ้านเราไม่มีปัญหาอะไรหรอก"
10025020-52 = "แต่ว่า—"
10025020-53 = "ถ้าจับกุ้งได้ตามที่ต้องการตลอดเวลาจริงๆ ละก็ จะมีใครมาทนลำบากลำบนทำงานบนเรืออยู่อีกล่ะ?"
10025020-54 = "ปริมาณกุ้งที่จับได้จะขึ้นอยู่กับความเปลี่ยนแปลงของทะเล แล้วอีกอย่าง มันก็ไม่ใช่เรื่องของฉันที่จะ#nต้องมาสนใจด้วยว่าพวกคนนอกจะคิดยังไงกับกุ้งที่ฉันจับได้"
10025020-56 = "...ถึงฉันจะอายุมากแล้ว แต่ฝีมือของฉันก็ยังไม่ขึ้นสนิมจนถึงขนาดต้องไปฟังคำพูดของพวกคนที่ไม่#nเคยทำงานบนเรือมาก่อนหรอกนะ"
10025020-58 = "ค่ะ..."
10025020-66 = "ขอบอกไว้ก่อนล่ะ อย่าคิดแม้แต่จะขัดขวางการจับกุ้งของฉันเชียว"
10025020-67 = "หากย่างกรายเข้าไปใกล้สถานที่ที่ไม่ควรเข้าไป เพราะความอยากรู้อยากเห็นละก็...#nพวก <ตัวตนแห่งห้วงลึก> ไม่มีทางอยู่เฉยแน่ๆ"
10025020-73 = "ตัวตนแห่งห้วงลึก...?"
10025020-78 = "ด้านหน้าสถานีรักษาชายฝั่งวัลคิรี่ สาขายาโตอูระ"
10025020-82 = "นี่ มีใครอยู่บ้างมั้ย?"
10025020-90 = "คะ... ใครมาส่งเสียงน่ารำคาญอะไรแต่เช้าเนี่ย?"
10025020-97 = "หืม...? หน้าไม่คุ้นเลย... ใครน่ะ?"
10025020-98 = "เอ่อ ฉันเป็นนักท่องเที่ยวที่อยากมาเล่นน้ำทะเลที่หมู่บ้านนี้—"
10025020-99 = "...มาเล่นน้ำที่หมู่บ้านยาโตอูระเนี่ยนะ?"
10025020-100 = "แปลกแฮะ... แน่ใจว่ามาถูกที่แน่นะคะ? ไม่ได้คิดจะไปหมู่บ้านใกล้เคียงที่อื่นแน่นะคะ?"
10025020-101 = "ฉันก็แค่อยากมาว่ายน้ำที่ชายหาดหมู่บ้านนี้เอง ไม่เห็นต้องตกใจอะไรขนาดนั้นเลย"
10025020-102 = "พอดีฉันไม่ได้เห็นนักท่องเที่ยวในเมืองน่าขนลุกแบบนี้มานานแล้ว... ก็เลยตื่นเต้นนิดหน่อยน่ะค่ะ"
10025020-103 = "พวกเราโชคไม่ค่อยดีเลยถูกจับให้มาประจำการอยู่ที่นี่ ไม่สิ... โดนบังคับให้มาอยู่มากกว่า และถ้าเป็นไปได้ ก็อยากทำเรื่องย้ายไปที่สาขาอื่นให้เร็วที่สุดด้วยค่ะ"
10025020-105 = "แต่ว่าในหมู่บ้านที่ห่างไกลและเคว้งคว้างแบบนี้ เราไม่มีทางสร้างผลงานดีๆ ได้เลย... ทำได้แค่นั่ง#nร้องไห้น้ำตาตกและกินมัสตาร์ดไปวันๆ เพื่อให้ทนต่อไปได้..."
10025020-107 = "(นี่เป็นครั้งแรกเลยนะเนี่ยที่ได้ยินนักเรียนโรงเรียนวัลคิรี่พูดถึงพื้นที่ที่ดูแลในลักษณะแบบนี้...)"
10025020-109 = "ยังไงก็เถอะ ที่ฉันแวะมาที่สถานีตำรวจก็เพราะแค่อยากตรวจสอบว่ามีจุดอันตรายที่ต้องระวังเวลาลง#nเล่นน้ำหรือเปล่าน่ะ"
10025020-110 = "เมื่อเร็วๆ นี้มีอุบัติเหตุหรือเกิดเรื่องอะไรขึ้นในหมู่บ้านบ้างรึเปล่า?"
10025020-111 = "...รู้ไปแล้วจะได้อะไรล่ะคะ"
10025020-112 = "ว่าไงนะ...?"
10025020-113 = "พวกบันทึกเหตุการณ์ต่างๆ หาอ่านเอาจากหนังสือพิมพ์ท้องถิ่นได้ เพราะงั้นอย่ามาถามพวกเราเลย ไปหาอ่านด้วยตัวเองเถอะค่ะ"
10025020-114 = "นอกจากงานบริการนักท่องเที่ยวแล้ว พวกเรายังมีงานอื่นๆ ที่ต้องจัดการกองอยู่ท่วมหัวเลยนะคะ"
10025020-115 = "เมื่อกี้ยังบอกว่าว่างอยู่เลยไม่ใช่รึไง?!"
10025020-117 = "เพราะแบบนี้ไง นักเรียนของสถาบันฝึกตำรวจวัลคิรี่ถึงได้..."
10025020-122 = "ถึงจะเป็นพวกเรา แต่ก็ไม่ได้อยากที่จะ...!"
10025020-127 = "...ไม่มีอะไรค่ะ ไม่ต้องใส่ใจหรอกนะคะ"
10025020-128 = "เอาเป็นว่า ตอนนี้พวกเรามีเรื่องที่ต้องจัดการอยู่เยอะมาก ช่วยอย่ามาเพิ่มปัญหาให้พวกเราเลยนะคะ"
10025020-130 = "ถ้าเกิดว่ามีคนนอกเข้ามาแล้วทำให้ <ตัวตนแห่งห้วงลึก> เกิดโกรธแค้นและทำให้เกิดอุบัติเหตุขึ้นมาละก็ มันจะสร้างความเดือดร้อนให้กับทุกคนได้ค่ะ"
10025020-139 = "พูดอะไรของเธอ...!"
10025020-140 = "จะว่าไป <ตัวตนแห่งห้วงลึก> อะไรนั่นมันหมายความว่ายังไงกันน่ะ?"
10025020-148 = "...คงไม่มีใครเห็นหรอกใช่มั้ย?"
10025020-149 = "เป็นหมู่บ้านที่ไม่เป็นมิตรเลยจริงๆ ขอแค่เข้ามาตกปลาตัวเดียวเองแท้ๆ แต่กลับมองกันด้วยสีหน้า#nเย็นชาแบบนั้น..."
10025020-150 = "แต่ว่าก็ได้ข้อมูลทั้งหมดมาแล้ว ขอแค่มีข้อมูลพวกนี้ การตกปลาตัวใหญ่ก็คงไม่ใช่ความฝัน—"
10025020-151 = "คือว่า..."
10025020-155 = "ขอโทษด้วยนะคะที่ขัดจังหวะ แต่ว่าคุณเหยียบสายเบ็ดของฉันมาตั้งแต่เมื่อกี้แล้ว..."
10025020-156 = "วะ...ว้าก...! โผล่มาตั้งแต่เมื่อไรกันเนี่ย?!"
10025020-160 = "ฉันนั่งตกปลาอยู่ตรงนี้มาตั้งแต่เมื่อกี้แล้วค่ะ... "
10025020-161 = "คิดแล้วเชียว ถึงจะมาสถานที่พักผ่อนแบบนี้ แต่คนไร้ค่าและน่าเกลียดอย่างฉันก็คงไม่อาจแสดงตัวตน#nให้ใครเห็นได้อยู่ดีสินะคะ"
10025020-163 = "ถ้าฉันยังถูกผู้คนลืมเลือนต่อไปแบบนี้ละก็... สักวันหนึ่ง ฉันคงจะต้องทนทุกข์เหมือนปลาดาวที่เกยตื้น#nบนท่าเรือ..."
10025020-165 = "มะ...ไม่ใช่แบบนั้นสักหน่อย!"
10025020-166 = "ฉันก็แค่กำลังยุ่งๆ อยู่จนไม่ได้ใส่ใจเรื่องอื่นแล้วก็ลืมมองทางเดินไปเลย ขอโทษด้วยนะที่รบกวนการ#nตกปลาน่ะ"
10025020-167 = "ถึงจะทดแทนกันไม่ได้ แต่ฉันขอแบ่งเหยื่อตกปลาให้เป็นการขอโทษแล้วกัน"
10025020-171 = "ขะ...ขอบคุณค่ะ..."
10025020-172 = "ดูจากชุดของคุณแล้ว... คุณจะมาตกปลาที่นี่ใช่มั้ยคะ?"
10025020-173 = "อื้อ ฉันได้ยินข่าวลือว่ามาตกปลาตัวใหญ่มากๆ ได้ที่หมู่บ้านนี้น่ะ"
10025020-174 = "งะ...งั้นเหรอคะ... คือว่าฉันแค่มาเที่ยวกับพวกเพื่อนๆ... เลยไม่รู้ว่าที่หมู่บ้านนี้มีชื่อเสียงเรื่องสถานที่#nตกปลาด้วยเลยค่ะ"
10025020-175 = "ส่วนใหญ่ตกได้ปลาอะไรเหรอคะ?"
10025020-176 = "ปะ...ปลาเหรอ? เอ่อ คือว่าเรื่องนั้น..."
10025020-177 = "ปลาอาจิรึเปล่านะ...?"
10025020-178 = "ปลาอาจิเป็นปลาขนาดเล็ก ไม่น่าจะใช้เหยื่อแบบนี้ตกได้หรอกนะคะ...?"
10025020-179 = "อีกอย่าง คันเบ็ดที่คุณพกมามันก็ดูใหญ่เกินสำหรับจะเอาไว้ตกปลาอาจิด้วย..."
10025020-180 = "งะ... งั้นเหรอ..?"
10025020-181 = "แต่ว่าในหมู่ปลาอาจิก็อาจมีพวกที่ชอบกินเหยื่อแบบนี้อยู่ก็ได้นะ!"
10025020-183 = "อีกอย่างถ้า <ตัวตนแห่งห้วงลึก> คอยช่วยเหลือละก็ ฉันอาจจะตกปลาอาจิใหญ่ 1 เมตรได้ก็ได้นะ"
10025020-185 = "ตัวตนแห่งห้วงลึก...?"
10025020-187 = "อ๊ะ..."
10025020-188 = "มะ...ไม่ต้องสนใจหรอก! ฉันก็แค่พูดคนเดียวเท่านั้นแหละ..."
10025020-189 = "ยังไงก็เถอะ ฉันไปหาจุดตกปลาดีๆ ก่อนดีกว่า พวกปลามันไวต่อเสียง เพราะงั้นเธอห้ามตามฉันมานะ!"
10025020-190 = "แล้วก็เก็บเรื่องที่ฉันพูดไว้เป็นความลับจากพวกคนในหมู่บ้านด้วยล่ะ!"
10025020-197 = "...รู้สึกแปลกๆ จัง"

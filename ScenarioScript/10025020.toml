[translation]
10025020-1 = "第2話;夜戶浦村的黑影"
10025020-2 = "夜戶浦．碼頭"
10025020-14 = "那個……您好。"
10025020-15 = "……"
10025020-16 = "請問您是這裡的居民嗎？"
10025020-17 = "……"
10025020-18 = "那個……我和朋友來這個村子玩水，碰巧天氣不是很好……"
10025020-19 = "請問附近有沒有浪比較平靜的海岸呢？"
10025020-20 = "……想玩水還是去其他地方吧。"
10025020-21 = "畢竟夜戶浦是個只能拿蝦子說嘴的無聊村落。"
10025020-22 = "是，是嗎？#n我認為是個很棒的村子啊……"
10025020-23 = "哼……喜好還真怪。"
10025020-27 = "隨你高興吧。#n不過不要妨礙捕撈作業。"
10025020-28 = "……謝謝您。"
10025020-32 = "啊……請問這艘就是用於捕蝦的船嗎？"
10025020-33 = "……沒錯。"
10025020-34 = "比想像中還大呢。#n是要出海捕蝦了嗎？"
10025020-36 = "……你以為會有人在這種時間才出海嗎？"
10025020-37 = "不，不是的……"
10025020-39 = "捕撈作業凌晨就結束了。#n現在只是在固定船隻而已。"
10025020-40 = "這，這樣啊……"
10025020-41 = "……有捕到蝦子嗎？"
10025020-43 = "……問這個要做什麼。"
10025020-44 = "我沒有特別的意思……如果冒犯到您的話，我很抱歉。"
10025020-46 = "只是最近在D.U.都沒看到夜戶浦產的蝦子，所以有點好奇……"
10025020-47 = "社群網站上也在討論是不是發生了什麼問題……"
10025020-51 = "……老夫不清楚。"
10025020-52 = "那個──"
10025020-53 = "老夫的對手可是活生生的動物。#n如果能想捕多少就能捕多少，大家早就都來捕蝦了吧？"
10025020-54 = "一切都取決於大海的心情。#n況且老夫的工作只到捕蝦為止，之後的事老夫管不著。"
10025020-56 = "再說了，一介外人跑來關心老夫等人的工作又有何用。#n要隨意觀光倒無所謂，說話還是注意點吧。#n無謂的打聽可不是件令人愉快的事。"
10025020-58 = "是……我很抱歉。"
10025020-66 = "聽清楚了，務必注意不要妨礙捕撈。"
10025020-67 = "不是有句話說好奇心會殺死貓嗎。#n……當心「深處的存在」。"
10025020-73 = "……「深處的存在」？"
10025020-78 = "女武神海洋警備局．夜戶浦分局前"
10025020-82 = "喂～有人在嗎？"
10025020-90 = "唔……誰啊，在這種時間跑來……"
10025020-97 = "……嗯？#n是張陌生的臉呢……那個，請問你是哪位？"
10025020-98 = "啊啊，我是來這邊玩水的──"
10025020-99 = "……玩水？來[ruby=這裡]夜戶浦村[/ruby]？"
10025020-100 = "你確定？沒有跑錯村子？"
10025020-101 = "你這說法還真過分啊。#n這個村子也是會有觀光客的吧。"
10025020-102 = "不……是因為這種村子會有觀光客來訪真的很少見……"
10025020-103 = "我們只是因為被分派到這裡才勉強留下來而已，只希望能盡早調到別的分局去。"
10025020-105 = "在這種窮鄉僻壤基本上沒什麼工作，根本做不出什麼績效……"
10025020-107 = "（還是第一次看到女武神的學生這麼嫌棄自己負責的區域……）"
10025020-109 = "原來是這樣啊。#n總之，我想先問問有沒有什麼在這裡游泳的時候需要注意的事……"
10025020-110 = "最近這裡有發生什麼事故或事件嗎？"
10025020-111 = "……誰知道呢？"
10025020-112 = "啊……？"
10025020-113 = "如果有發生海難事故的話，新聞應該會有報吧。"
10025020-114 = "我們可是很忙的。那麼你慢慢玩吧。"
10025020-115 = "剛剛不是才說沒工作嗎！？"
10025020-117 = "所以我才說女武神的傢伙實在是……"
10025020-122 = "我們一開始也是──"
10025020-127 = "不……沒什麼，請別在意。"
10025020-128 = "總之我們的工作很忙，拜託請至少不要製造麻煩哦。"
10025020-130 = "要是因為「深處的存在」的制裁而引發海難事故的話，#n會造成村裡大家的麻煩的。"
10025020-139 = "真是討人厭的傢伙……！"
10025020-140 = "……「深處的存在」是什麼東西？"
10025020-148 = "……應該沒有人看見吧？"
10025020-149 = "啊～啊，對外地人也太冷漠了吧。#n只是希望他們稍微透露一下而已，沒必要做到那種程度吧。"
10025020-150 = "不過反正情報也已經到手了……#n這樣一來釣隻大魚也不是夢──"
10025020-151 = "那，那個……"
10025020-155 = "抱歉打斷你說話……那個，我的釣線從剛剛就被你的腳給……"
10025020-156 = "哦哇！？什麼時候冒出來的！？"
10025020-160 = "這……我在這裡釣魚釣一段時間了…… "
10025020-161 = "果然……我就算穿著泳裝也沒有存在感……"
10025020-163 = "總有一天會被大家忘記……最後變得像被曬乾的海星一樣……"
10025020-165 = "不是不是！我沒有那個意思！"
10025020-166 = "我只是因為在想事情，所以沒注意到你而已。#n該道歉的是我才對，抱歉打擾到你了。"
10025020-167 = "雖然說不上是補償……我分幾個假餌給你吧。#n聽說這附近好像都是用這個來釣魚的。"
10025020-171 = "謝，謝謝……"
10025020-172 = "……看你的穿著，難道你也是來這裡釣魚的嗎？"
10025020-173 = "沒錯！#n我聽說這裡有機會釣到大魚！"
10025020-174 = "原，原來是這樣啊……我只是跟朋友一起來觀光而已……#n所以不知道這裡是個釣點……"
10025020-175 = "請問，這個村子能釣到什麼魚呢……？"
10025020-176 = "魚，魚啊……"
10025020-177 = "……竹莢魚之類的？"
10025020-178 = "竹莢魚……用這種大魚用的餌，應該有點難釣吧……"
10025020-179 = "畢竟是小型魚……#n用這種餌實在……"
10025020-180 = "是，是嗎……？"
10025020-181 = "不，不過……說不定也會有不用這麼大的餌就釣不到的大魚不是嗎！"
10025020-183 = "而且只要有「深處的存在」的幫忙，應該連1m級的竹莢魚都釣的到才對！"
10025020-185 = "「深處的存在」……？"
10025020-187 = "哎呀……"
10025020-188 = "沒什麼，別在意。#n只是自言自語而已。"
10025020-189 = "總之我要去找釣點了，你可不要跟過來哦！#n聽到了嗎？魚對聲音可是很敏感的啊！"
10025020-190 = "……啊，對了。#n剛才說的那些，可別告訴村裡的人是從我這裡聽到的！"
10025020-197 = "……有點奇怪。"

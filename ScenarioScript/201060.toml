201060-44 = "3;가짜 총학생회장;99;다른 점은 몰라도, 이 문서에 적힌 사인의 필체만큼은 제 것이 맞군요."
201060-45 = "3;가짜 총학생회장;02;게다가 부재 중에 샬레가 키보토스 각지에서 활약한 내용에 대해서는 이미 서면을 통해 충분히 전해 들었고……"
201060-46 = "3;가짜 총학생회장;01;권한을 남용하지 않고 학생들의 자치와 안전을 위해 힘써 준 샬레의 존재 의의를 부정할 생각은 없답니다.\n#3;m3\n#1;dl"

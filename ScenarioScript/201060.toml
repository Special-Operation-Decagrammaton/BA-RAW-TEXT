201060-79 = "3;가짜 총학생회장;02;린. 앞으로 시간이 되는 대로 저와 계속 이야기를 나누시지요."
201060-80 = "3;가짜 총학생회장;00;당신이 납득하는 총학생회장을 찾을 때까지 전력으로 협력하겠습니다."
201060-81 = "3;가짜 총학생회장;09;설령 그 결과, 제가 영원히 당신에게 가짜로 기억된다 할지라도…… 제게 주어진 책무를 회피하지는 않겠습니다.\n#3;em;[반짝]\n#3;greeting"

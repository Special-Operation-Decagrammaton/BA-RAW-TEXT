201060-62 = "3;린;99;만약 당신이 ‘진짜’ 총학생회장이라면……\n#3;stiff"
201060-63 = "3;린;19;어째서 갑자기 예고도 없이 공무를 내버린 채 사라져 버렸던 건가요?\n#3;em;[?]"
201060-64 = "3;린;05;그리고 그동안 어디서, 무엇을 하며 지냈었던 건가요?"
201060-65 = "3;가짜 총학생회장;08;유감이지만 그 질문에 대해서는 저도 확실하게 답변을 드릴 수가 없습니다.\n#3;em;…"
201060-66 = "3;가짜 총학생회장;04;기록상 제가…… 그러니까 총학생회장이 사라지기 전, 마지막 공무를 수행했던 날의 기억만큼은 또렷이 남아있습니다."
201060-67 = "3;가짜 총학생회장;99;그날도 평소처럼 새로 올라온 공문서를 검토하고, 서명을 하고, 책상을 떠났었지요."
201060-68 = "3;가짜 총학생회장;06;하지만 그 이후로의 기억은…… 머리속에 짙은 안개가 낀 것처럼 아무것도 떠올릴 수가 없었습니다.\n#3;em;[속상함]"
201060-69 = "3;가짜 총학생회장;08;혹 저도 모르는 사이에 깊은 잠이 든 게 아닐까 생각도 해 보았지만, 정신을 차렸을 때는 오랜 시간이 흐른 뒤였고…… 키보토스의 상황은 크게 바뀌어 있었습니다.\n#3;m4"
201060-70 = "3;가짜 총학생회장;00;그리고 저를 기억하지 못하는 당신을 만나게 되었지요."
201060-71 = "1;린;19;그런 이해할 수 없는 말을 하셔도……\n#1;em;[땀]\n#1;ar\n#3;m5"
201060-72 = "3;가짜 총학생회장;02;네. 이렇게 말씀 드셔도 이해하기 어려우시겠지요."
201060-73 = "3;가짜 총학생회장;00;……지금의 저조차도 스스로를 이해할 수 없으니까요."
201060-74 = "3;가짜 총학생회장;99;하지만 이러한 불가해야 말로 이 세계의 핵심.\n#3;em;[...]\n#3;m3\n#1;dl"
201060-75 = "3;가짜 총학생회장;01;키보토스에서 벌어지는 수많은 문제와 사고들에 비하면, 기억의 상실은 특별한 사건조차 되지 못합니다."
201060-76 = "3;가짜 총학생회장;02;하지만 이해할 수 없다고 하여 그 자리에 언제까지나 머물러 있을 수는 없습니다."
201060-77 = "3;가짜 총학생회장;09;제게는 총학생회장의 책무를 다해야 할 책임이 있으니까요.\n#3;em;[반응]\n#3;closeup"

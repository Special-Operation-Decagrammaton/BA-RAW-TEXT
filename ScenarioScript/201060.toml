201060-111 = "3;통신나기사;00;이 조례는 유통망을 간소화하여 본교 학생들에게 안정적으로 기호품을 제공하기 위한 최소한의 조치인 바.\n#3;h"
201060-112 = "3;통신나기사;99;이에 더해 본교가 자랑하는 찻잎의 가치를 보존하고 평가가 절하되는 일을 막기 위한 목적이 있사오니, 총학생회에서는 부디 너른 양해 부탁드리겠습니다."
201060-113 = "3;통신나기사;19;게다가 각 학원의 자치구에서 발의하는 조례에는 총학생회가 개입하지 않는 것으로 알고 있습니다만……"
201060-114 = "3;통신나기사;20;이제 와서 정책이 바뀌기라도 한 걸까요?\n#3;em;…"
201060-115 = "1;가짜 총학생회장;00;아니요, 그렇지 않습니다. 당연히 각 자치구는 필요에 따라 조례를 발의할 권한이 있으며, 총학생회는 이를 존중합니다.\n#1;ar\n#3;m5"
201060-116 = "1;가짜 총학생회장;99;다만 키보토스의 찻잎 시장에서 큰 규모를 차지하던 트리니티 산 찻잎의 유통이 끊기자, 전반적으로 찻잎 가격이 폭등하여……"
201060-117 = "1;가짜 총학생회장;02;붉은겨울 학원처럼 찻잎의 공급을 외부에 의존하던 학원의 학생들이 따듯한 차를 즐기지 못해 곤란해 하고 있는 모양입니다."
201060-118 = "3;통신나기사;17;……다른 학원의 문제를 저희가 신경 써야 할 의무는 없다고 생각됩니다만."
201060-119 = "1;가짜 총학생회장;03;아, 그러고 보니 지난 번 <티파티>에서 보내주신 홍차는 정말 괜찮더군요.\n#1;em;[반응]"
201060-120 = "1;가짜 총학생회장;09;그 전에 마셨던 것에 비해 산뜻하고 부드러운 단맛이 가미된 것처럼 느껴지던데…… 혹시 새로운 블렌드를 시도하셨나요?"
201060-121 = "#st;[0,0];instant;1;"
201060-122 = "#clearST"
201060-123 = "1;가짜 총학생회장;09\n3;통신나기사;19\n#3;em;[?]\n#1;h\n#3;h\n#wait;1200"
201060-124 = "3;통신나기사;02;……미각이 예민하시군요. 네, 전에 보내 드린 홍차는 레이디 그레이에 쓰이는 시트러스 오일을 조금 더해 새롭게 블렌딩 했답니다."
201060-125 = "3;통신나기사;11;입에 맞으셨다니 다행입니다만, 어째서 갑자기 그 이야기를……?\n#3;em;…"
201060-126 = "1;가짜 총학생회장;99;산뜻하고 부드러운 레이디 그레이를 마시고 있노라니, 어쩐지 달콤한 맛이 강한 디저트를 곁들이면 좋을 것 같다는 생각이 들더군요."
201060-127 = "1;가짜 총학생회장;03;예를 들자면— 붉은겨울 산 링곤베리가 잔뜩 올라간 초콜릿 파이라던가?"
201060-128 = "3;통신나기사;19;……"
201060-129 = "1;가짜 총학생회장;02;평소에도 맛 좋은 과실을 소비하던 붉은겨울의 학생들이, 그 과일과 잘 어우러지는 트리니티 산 홍차를 맛보게 된다면. 트리니티 종합학원에 더 좋은 인상을 갖게 될 텐데…… "

201060-101 = "3;가짜 총학생회장;00\n#3;a\n#wait;1500"
201060-102 = "3;가짜 총학생회장;99;……오랜만에 안부를 전하는 것과 동시에 갑작스럽게 요청을 드리게 되어 대단히 송구합니다만……"

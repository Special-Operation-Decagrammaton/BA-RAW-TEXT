[translation]
1012602-1 = "特製靈藥"
1012602-2 = "（因為鹿江沒有回覆，決定先前往神秘研所在的宿舍）"
1012602-8 = "神秘研宿舍"
1012602-10 = "歡迎你……老師。"
1012602-11 = "我們果然是從前世就相愛的戀人呢。#n你居然立刻就趕來了。"
1012602-12 = "[s1]「前，前世……？」\n[s2]「相愛！？」"
1012602-15 = "沒錯。我們在前世是戀人。"
1012602-16 = "……嗯？看來你完全不記得了呢。"
1012602-17 = "明明……曾經對我訴說過自己是多麼喜歡的……"
1012602-23 = "連你喜歡的……我冰冷的體溫都忘了嗎？"
1012602-24 = "[s]「咦？為什麼手這麼冰……？」"
1012602-25 = "你真的不記得了啊。"
1012602-26 = "雖然手很冰……內心卻很火熱的女人……"
1012602-27 = "不曾忘記與你前世羈絆的……深情的女人……"
1012602-32 = "也是精通各種神秘學的女人……咿嘻。"
1012602-33 = "來吧……我現在就讓你回想起來。"
1012602-34 = "也是為了這個……才請老師過來的。"
1012602-35 = "拭目以待吧。#n我要用鍊金術……製作能喚醒前世記憶的藥。"
1012602-36 = "不過空手是沒辦法開始的。"
1012602-37 = "所以……我需要材料。#n帶有老師記憶的特別材料。"
1012602-38 = "[s]「材料指的是……？」"
1012602-39 = "老師的隨身物品。"
1012602-40 = "來，把你身上所有東西都給我。#n當然連穿著的衣服也要……一件不留。"
1012602-41 = "現在全都是我的了。咿嘻嘻……"
1012602-42 = "[s]「……！？」"
1012602-49 = "嚇到你了嗎……抱歉。"
1012602-50 = "剛才是開玩笑的……#n不需要全部，只要一件就夠了。"
1012602-51 = "比如口袋裡的硬幣……或者小紙條也可以。"
1012602-52 = "[s]「真的需要那些嗎……？」"
1012602-53 = "當然……"
1012602-54 = "我已經準備好鍊金用的鍋子了。"
1012602-55 = "只要把材料放進去攪拌……就能做出想要的東西的神奇鍋子。"
1012602-56 = "咿嘻，怎麼樣？#n老師你……也想看看吧？"
1012602-60 = "[ns3] 在好奇心的驅使下忍不住點頭\n[ns4] 覺得像在開玩笑，於是決定先配合他"
1012602-63 = "……很好，總算能溝通了呢。"
1012602-64 = "那就給我一件隨身物品吧……我會做出最棒的靈藥。"
1012602-65 = "[ns5] 遞出口袋裡的手帕\n[ns6] 遞出包包裡的一支筆"
1012602-68 = "老師的隨身物品……能成為很好的催化劑呢。"
1012602-69 = "得好好放進口袋才行……"
1012602-70 = "[s]「不是要放進鍋子嗎？」"
1012602-71 = "靈藥可是要放進嘴裡的東西哦？"
1012602-72 = "不能吃的東西……不可以放進去。"
1012602-73 = "我不會在吃的東西上開玩笑的……咿嘻……"
1012602-74 = "[s]（意外地還挺有常識……）"
1012602-75 = "那麼正式開始製作靈藥吧……"
1012602-76 = "首先……把燙過的番茄和各種蔬菜切好……"
1012602-80 = "[ns]「番，番茄是什麼時候燙好的？」"
1012602-81 = "咿嘻，我可是個做事周到的女人啊……"
1012602-82 = "接著……把醃過的牛肉炒一下，再加上調味醬……"
1012602-88 = "[ns]「唔嗯……這真的是在做靈藥嗎？」"
1012602-89 = "當然……這絕對是靈藥。"
1012602-90 = "能讓你回想起前世愛情的靈藥。"
1012602-91 = "然後……把準備好的材料放進鍋裡煮……"
1012602-93 = "（之後鹿江繼續往鍋裡加入各種材料）"
1012602-97 = "[ns]「真香……」"
1012602-98 = "（不久之後……）"
1012602-101 = "好……完成了。"
1012602-102 = "這就是能喚醒前世愛情的靈藥……"
1012602-106 = "我滿懷愛意做出的番茄牛肉燉菜。"
1012602-107 = "[s]「這不是靈藥吧！」"
1012602-108 = "是靈藥。老師吃了之後，就會明白我的心意了。"
1012602-109 = "來，儘管吃吧……能讓精神為之一振哦……"
1012602-110 = "[ns7] 雖然不確定是不是靈藥，但還是先吃一口\n[ns8] 被迷人的香氣吸引，不由自主地吃了燉菜"
1012602-117 = "[ns]「這個味道是……！！」"
1012602-118 = "咿嘻，怎麼樣？#n是不是開始浮現前世的記憶了……？"
1012602-119 = "在現世也能有像我這樣的好女人陪在身邊……不覺得很幸福嗎？"
1012602-120 = "[s]「超級好吃！！」"
1012602-124 = "[ns]「是小時候常吃的味道……」"
1012602-125 = "咦，小時候？#n我本來希望能再往前追溯一點的說……"
1012602-129 = "原來如此……看來我也有失敗的時候……"
1012602-130 = "咿嘻，但我不會放棄。"
1012602-131 = "如果靈藥不管用，那就用對話喚醒你的回憶……"
1012602-132 = "讓老師無論去哪裡，都能想起我的強烈記憶。"
1012602-133 = "咿嘻……咿嘻嘻……"
1012602-134 = "咿嘻嘻嘻……！"
1012602-136 = "（……之後和鹿江一邊享用燉菜，一邊聊了許多話題）"

[translation]
1012602-1 = "Special Potion"
1012602-2 = "Kanoe didn't reply, so I headed to the Occult Society dorm."
1012602-8 = "Occult Society Dorm"
1012602-10 = "Welcome, Sensei..."
1012602-11 = "You came to me so quickly. You must remember our previous lives...as lovers."
1012602-12 = "[s1] \"P-Previous lives...?\"\n[s2] \"Lovers?!\""
1012602-15 = "Yes, indeed. You and I were inseparable."
1012602-16 = "...Hm? You look as if you might not remember after all."
1012602-17 = "After all you've said to me, all that affection..."
1012602-23 = "...have you truly forgotten everything? Even my touch, like fresh-fallen snow...?"
1012602-24 = "[s] \"Huh? Why is your hand so cold...?\""
1012602-25 = "So you have forgotten, then."
1012602-26 = "My hands may be cold, but this woman has a warm, warm heart."
1012602-27 = "And a mind full of memories. Memories of you."
1012602-32 = "Not to mention a knack for the occult."
1012602-33 = "Here...I'll help you remember."
1012602-34 = "This...is why I called you here, Sensei."
1012602-35 = "Observe.#nWith alchemy and a bit of culinary skill...I'll concoct a potion to restore every one of those precious memories."
1012602-36 = "Once we have the proper ingredients, of course."
1012602-37 = "And I need one from you. A special ingredient, imbued with your memories."
1012602-38 = "[s] \"What kind of ingredient are we talking about specifically?\""
1012602-39 = "A possession of yours."
1012602-40 = "All of them, in fact. Including your clothes, naturally."
1012602-41 = "They belong to me now."
1012602-42 = "[s] \"Uh...?!\""
1012602-49 = "Ha. Forgive me, I've frightened you."
1012602-50 = "I was joking. Keep your clothes. All I need is a single trinket of your choice."
1012602-51 = "It could be a coin in your pocket, or a scrap of paper."
1012602-52 = "[s] \"You really need it, huh...?\""
1012602-53 = "Of course."
1012602-54 = "My cauldron is ready for it."
1012602-55 = "Drop in the proper ingredients, stir it just right, and whatever you desire will be yours."
1012602-56 = "Heehee, you must be at least curious."
1012602-60 = "[ns3] Nod out of curiosity.\n[ns4] Play along for now."
1012602-63 = "...Good. We understand each other."
1012602-64 = "One of your belongings, please. You won't believe what I'm about to brew for you."
1012602-65 = "[ns5] Hand her a handkerchief.\n[ns6] Hand her a pen."
1012602-68 = "Ah, what an excellent catalyst you've given me."
1012602-69 = "I'll just keep it in my pocket..."
1012602-70 = "[s] \"Weren't you going to put it in the cauldron?\""
1012602-71 = "...You're meant to DRINK this potion, you understand."
1012602-72 = "Its ingredients all have to be digestible."
1012602-73 = "Anything else would be a waste."
1012602-74 = "[s] \"(That actually makes sense...)\""
1012602-75 = "Now then, let's begin."
1012602-76 = "First...I add the boiled tomatoes."
1012602-80 = "[ns] \"Wh-When did you boil the tomatoes?\""
1012602-81 = "Heehee, I'm a well-prepared woman."
1012602-82 = "Next, the stir-fried marinated beef, with a mix of seasoning..."
1012602-88 = "[ns] \"Um...you ARE concocting a potion, right?\""
1012602-89 = "Unquestionably."
1012602-90 = "One to inspire love and memories, indeed."
1012602-91 = "Now, we add the rest and bring it to a boil..."
1012602-93 = "Kanoe continued to put various ingredients into the cauldron."
1012602-97 = "[ns] \"It smells nice...\""
1012602-98 = "A little while later..."
1012602-101 = "Here... It's ready."
1012602-102 = "A potion of love across lifetimes."
1012602-106 = "Tomato beef stew, filled to the brim with my adoration."
1012602-107 = "[s] \"This isn't a potion, though...\""
1012602-108 = "Oh, it certainly is. Try it, and you'll be flooded with the understanding of my true, deepest feelings."
1012602-109 = "Come now, don't be shy... To come to your senses, you must first indulge your senses."
1012602-110 = "[ns7] Shrug and try the potion.\n[ns8] Give in to the amazing aroma and wolf it down."
1012602-117 = "[ns] \"This taste...!!!\""
1012602-118 = "Heehee, what do you think? Does it take you back?"
1012602-119 = "Does it make you long for an amazing woman like me, by your side as she always was and will be?"
1012602-120 = "[s] \"It's delicious!!\""
1012602-124 = "[ns] \"It's just like what I had as a kid.\""
1012602-125 = "\"A-As a kid?\"#nI was hoping you'd go back a bit further..."
1012602-129 = "I see... Even my talents can fail on occasion."
1012602-130 = "Heehee, but this is only the beginning."
1012602-131 = "If my potions won't work, then my charms will. My wit, my eloquence."
1012602-132 = "Our conversations will inspire memories so bright, so blazing...that you'll think of me wherever you are."
1012602-133 = "Heehee... Eheehee..."
1012602-134 = "Eheeheehee...!"
1012602-136 = "...Afterwards, Kanoe and I had a pleasant chat over a second helping of her stew."

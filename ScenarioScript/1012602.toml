[translation]
1012602-1 = "ยาวิเศษ"
1012602-2 = "(คาโนเอะไม่ตอบข้อความ คุณครูเลยมุ่งหน้าไปที่หอพักของชมรมวิจัยรหัสยศาสตร์)"
1012602-8 = "ชมรมวิจัยรหัสยศาสตร์"
1012602-10 = "เข้ามาสิ... ครู"
1012602-11 = "ตามที่คิดไว้เลยนะ พอเป็นคนรักกันตั้งแต่ชาติก่อนเลยรีบมาหากันเลยสินะ"
1012602-12 = "[s1] \"ชะ... ชาติก่อน...?\"\n[s2] \"คนรักเรอะ?!\""
1012602-15 = "ใช่ ชาติที่แล้วเราเคยเป็นคนรักกัน"
1012602-16 = "หืม...? สายตาว่างเปล่าเหมือนจำอะไรไม่ได้เลยนะ"
1012602-17 = "ทั้งที่บอกว่าชอบฉันแท้ๆ..."
1012602-23 = "ลืมไปแล้วเหรอว่าคุณเคยชอบสัมผัสและอุณหภูมิร่างกายที่เย็นสบายของฉันน่ะ?"
1012602-24 = "[s] \"เอ๊ะ? ทำไมมือเย็นขนาดนี้ล่ะ...?\""
1012602-25 = "ลืมไปแล้วจริงๆ สินะ"
1012602-26 = "ถึงมือของฉันจะเย็น... แต่ฉันเป็นผู้หญิงที่มีจิตใจอบอุ่นนะ..."
1012602-27 = "หญิงสาวที่มีจิตใจลึกซึ้ง... ซึ่งจดจำและไม่เคยลืมเลือนความทรงจำกับชาติก่อนที่มีร่วมกันกับคุณ..."
1012602-32 = "และยังเป็นหญิงสาวที่มีความรู้ความเข้าใจในเรื่องรหัสยศาสตร์หลายแขนงด้วย... ฮิฮิ"
1012602-33 = "เอาละ... ฉันจะทำให้คุณจำได้เอง"
1012602-34 = "เพราะงั้น... ถึงเรียกครูมาที่นี่ไง"
1012602-35 = "คอยดูให้ดีล่ะ#nด้วยศาตร์แห่งการเล่นแร่แปรธาตุ... ฉันจะปรุงยาที่ฟื้นความทรงจำในชาติที่แล้วให้เอง"
1012602-36 = "แต่เราต้องเตรียมวัตถุดิบกันก่อน"
1012602-37 = "ใช่... ฉันต้องการวัตถุดิบน่ะ วัตถุดิบพิเศษที่มีความทรงจำของครูอยู่ในนั้น"
1012602-38 = "[s] \"แล้ววัตถุดิบนั่นคืออะไรล่ะ...?\""
1012602-39 = "ของใช้ของครู"
1012602-40 = "เอ้า ส่งของทุกอย่างที่มีมาสิ#nแน่นอนว่ารวมเสื้อผ้าที่ใส่อยู่ด้วยนะ... ถอดมาให้หมด"
1012602-41 = "ตอนนี้ทุกอย่างเป็นของฉันแล้ว อิฮิฮิ..."
1012602-42 = "[s] \"...?!\""
1012602-49 = "คงกลัวสินะ... โทษที"
1012602-50 = "ฉันล้อเล่นน่ะ... ไม่ต้องถอดเสื้อผ้ามาหรอก ขอแค่ของที่พกมาชิ้นเดียวก็พอ"
1012602-51 = "เหรียญในกระเป๋า... หรือกระดาษแผ่นเล็กๆ ก็ได้"
1012602-52 = "[s] \"จำเป็นต้องใช้ด้วยเหรอ...?\""
1012602-53 = "ต้องใช้สิคะ..."
1012602-54 = "ฉันเตรียมเตาหลอมสำหรับการเล่นแร่แปรธาตุไว้แล้ว"
1012602-55 = "ใส่วัตถุดิบที่จำเป็นลงไป... และผสมให้เข้ากันอย่างถูกวิธีก็จะได้ในสิ่งที่ปรารถนา"
1012602-56 = "ฮิฮิ ว่าไง? ครู... อยากดูรึเปล่า?"
1012602-60 = "[ns3] พยักหน้าเพราะทนความอยากรู้ไม่ไหว\n[ns4] ดูเหมือนกำลังเล่นอะไรสักอย่าง เลยเล่นตามน้ำไป"
1012602-63 = "ดีละ... ตอนนี้ก็เข้าใจตรงกันแล้วนะ"
1012602-64 = "เอาของติดตัวมาสิ... ฉันจะปรุงยาที่ยอดเยี่ยมให้เอง"
1012602-65 = "[ns5] หยิบผ้าเช็ดหน้าในกระเป๋ายื่นให้\n[ns6] หยิบปากกายื่นให้"
1012602-68 = "ของใช้ของครู... ถ้าเป็นเจ้านี่คงเป็นตัวเร่งปฏิกิริยาที่ดีได้แน่ๆ"
1012602-69 = "ฉันจะเก็บเข้านี่ไว้ในกระเป๋า..."
1012602-70 = "[s] \"ไม่ใส่มันลงในหม้อเหรอ?\""
1012602-71 = "คุณจะต้องดื่มยานี่นะ"
1012602-72 = "จะใส่สิ่งของที่กินไม่ได้... ลงไปได้ยังไงล่ะ"
1012602-73 = "ฉันไม่ล้อเล่นกับของกินหรอกนะ... ฮิฮิ..."
1012602-74 = "[s] (ไหวพริบดีทีเดียวเลยนะ...)"
1012602-75 = "งั้นเรามาเริ่มปรุงยากันเถอะ..."
1012602-76 = "ก่อนอื่น... หั่นมะเขือเทศต้มและผักต่างๆ ใส่ลงไป..."
1012602-80 = "[ns] \"ไปต้มมะเขือเทศมาตั้งแต่ตอนไหนเนี่ย?\""
1012602-81 = "ฮิฮิ ฉันเป็นหญิงสาวที่รอบคอบในทุกๆ ด้านนะ..."
1012602-82 = "จากนั้น... ก็นำเนื้อวัวหมักไปผัดแล้วนำไปใส่เครื่องเทศ..."
1012602-88 = "[ns] \"เอ่อ... ปรุงยาวิเศษอยู่ใช่มั้ย?\""
1012602-89 = "ใช่สิ... ฉันกำลังปรุงยาวิเศษอยู่"
1012602-90 = "ยาวิเศษที่จะดึงความทรงจำและความรักในชาติก่อนให้กลับมาได้"
1012602-91 = "ต่อไป... ก็เอาวัตถุดิบใส่ลงไปและต้มให้เดือด..."
1012602-93 = "(หลังจากนั้น คาโนเอะก็ยังคงใส่วัตถุดิบต่างๆ ลงไปในหม้ออย่างต่อเนื่อง)"
1012602-97 = "[ns] \"กลิ่นหอมจัง...\""
1012602-98 = "(ผ่านไปพักใหญ่...)"
1012602-101 = "เอ้า... เสร็จแล้วละ"
1012602-102 = "ยาวิเศษที่จะทำให้ความรักในชาติก่อนหวนกลับมา..."
1012602-106 = "สตูว์เนื้อมะเขือเทศที่อัดแน่นด้วยความรักของฉัน"
1012602-107 = "[s] \"นี่มันไม่ใช่ยาวิเศษสักหน่อย!\""
1012602-108 = "ยาวิเศษต่างหาก ถ้าครูลองกินดูก็จะรับรู้ได้ถึงความจริงใจของฉันเองนั่นละ"
1012602-109 = "เอ้า ลองกินดู อย่าได้คิดปฏิเสธเลย... จะได้สติทันทีเลยแหละ..."
1012602-110 = "[ns7] ไม่รู้ว่ายาวิเศษจริงรึเปล่า แต่ก็ลองกินดูก่อน\n[ns8] กลิ่นอันน่าดึงดูดทำให้เผลอตักสตูว์กินโดยไม่รู้ตัว"
1012602-117 = "[ns] \"เดี๋ยวนะ รสชาตินี้มัน...!!!\""
1012602-118 = "ฮิฮิ เป็นไง? ความทรงจำของชาติที่แล้วกลับมาแล้วใช่มั้ย...?"
1012602-119 = "ทั้งในชาติที่แล้วและในชาตินี้... ก็คงอยากมีหญิงสาวแสนดีอย่างฉันอยู่เคียงข้างใช่มั้ยล่ะ...?"
1012602-120 = "[s] \"อร่อยลืมตายเลย!!\""
1012602-124 = "[ns] \"เหมือนรสชาติที่เคยกินสมัยเด็กๆ เลย...\""
1012602-125 = "สะ... สมัยเด็กๆ?#nนึกว่าจะย้อนกลับไปได้มากกว่านี้อีกสักหน่อย..."
1012602-129 = "อย่างนี้นี่เอง... คนอย่างฉันก็มีช่วงเวลาแห่งความล้มเหลวเหมือนกันสินะ"
1012602-130 = "ฮิฮิ แต่ฉันไม่ยอมแพ้หรอก"
1012602-131 = "ถ้ายาวิเศษใช้ไม่ได้ผล ฉันจะใช้วิธีพูดคุยเพื่อฟื้นความทรงจำแทน..."
1012602-132 = "การพูดคุยที่จะทำให้ไม่ว่าครูจะไปที่ไหน... ความทรงจำเกี่ยวกับฉันก็จะกระจ่างชัดเจนเสมอ"
1012602-133 = "ฮิฮิ... อิฮิฮิ..."
1012602-134 = "อิฮิฮิฮิ...!"
1012602-136 = "(หลังจากนั้นคุณครูกับคาโนเอะก็พูดคุยเรื่องต่างๆ และทานสตูว์ด้วยกันอย่างเอร็ดอร่อย)"

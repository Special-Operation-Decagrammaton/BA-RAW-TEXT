[translation]
52210-1 = "Episode 21;Another's Gaze"
52210-2 = "At the Hyakkaryouran, it felt like everyone's eyes were on me."
52210-6 = "Ayame."
52210-7 = "Big Sis Ayame..."
52210-8 = "...President Ayame!"
52210-12 = "Those stares, flooded with both envy and adoration, curse and blessing... Their eyes pinned me into my role."
52210-13 = "My mask... The mask of the president of the Hyakkaryouran felt stitched into my skin. I could never bend under the scrutiny, could never let them see just how heavy and painful the burden was."
52210-16 = "The very embodiment of the presidency, that Ayame."
52210-17 = "Beauty, propriety, impeccable conduct..."
52210-18 = "That's what you'd expect of the head of the Hyakkaryouran!"
52210-19 = "Nothing is too hard for President Ayame, right?"
52210-20 = "...She'll receive all of our feelings, good and bad, without raising an eyebrow."
52210-21 = "...Obviously! She's the president, after all."
52210-22 = "Of course! I'm just fine!"
52210-23 = "...Lies. All lies."
52210-24 = "I slowly suffocated under that mask, bit by bit. They welded it onto my face, chiseling and designing it into whatever shape they pleased."
52210-25 = "Smile, Ayame. Be calm, Ayame. Smile. Keep smiling."
52210-26 = "It was my responsibility to respond to every conflict at the drop of a hat. Where others would throw up their hands and turn their heads, I was there to pick up the pieces."
52210-27 = "And on the days when the exhaustion crept in, and the cracks in my mask deepened..."
52210-30 = "You're not your usual self today, President Ayame."
52210-31 = "Is something the matter?"
52210-32 = "Go and get some rest! So you can hurry and get back to your usual self."
52210-36 = "...My mask had melted into my skin. To others, there was no distinction between me and the part I played."
52210-37 = "Why did I decide to don this mask?"
52210-38 = "Why did they decide that this mask was who I am?"
52210-39 = "Why is everyone incapable of solving their own problems?"
52210-42 = "I could never be as good as President Ayame..."
52210-43 = "President Ayame can do anything... She's amazing!"
52210-44 = "Only President Ayame can bear that mask!"
52210-48 = "Soon, the line between me and my mask became blurred...even for me."
52210-63 = "That was when I faced my shadow in the dark of the night, and I realized I couldn't wield the Hundred Lotus."
52210-64 = "That was when I realized I wasn't perfect."
52210-65 = "As the president, I was a failure. And I felt...relief."
52210-67 = "[log=아야메 황혼 1]I see.[/log]"
52210-70 = "[log=아야메 황혼 1]This perfect mask[/log]"
52210-71 = "[log=아야메 황혼 1]is just a mask.[/log]"
52210-74 = "[log=아야메 황혼 1]This responsibility[/log]"
52210-75 = "[log=아야메 황혼 1]was never mine to bear.[/log]"
52210-79 = "Kuzunoha will solve everything."
52210-80 = "The scrutiny, the demands... Kuzunoha will take what was never mine to begin with."
52210-83 = "...Come back with me, Ayame."
52210-84 = "You know, don't you? Kuzunoha is just a legend."
52210-85 = "But she said that to me with no hesitation."
52210-86 = "Even though she's nothing but a crybaby."
52210-87 = "Even though she could never beat me in a duel."
52210-88 = "Even though she could never escape the expectations and remove her mask."
52210-90 = "..."
52210-94 = "...Stupid girl."
52210-95 = "That's why you'll never move on."
52210-100 = "What's on your mind?"
52210-106 = "Reminiscing."
52210-107 = "I was remembering the feeling of the gazes of all those who once looked towards me."
52210-108 = "Their gazes?"
52210-109 = "Mhm. Their scrutiny, their pleading eyes. Begging for my help."
52210-110 = "This place hasn't changed at all."
52210-111 = "They live their lives terrified of taking action, for fear of judgment and castigation."
52210-112 = "And I couldn't play that role for them forever."
52210-113 = "In the end, I was crushed under their expectations."
52210-114 = "But you're not anymore, are you?"
52210-115 = "You've blossomed into something exquisite: a monster fueled by regret and hatred. You are an unstoppable force."
52210-116 = "...Yes."
52210-121 = "I used to be at the center of their scrutiny..."
52210-122 = "...but now it will be my gaze that they are under."
52210-147 = "Ahhh... How beautiful! How exquisite."
52210-148 = "Yes. Just as I imagined it."
52210-149 = "And in the end, I was right."
52210-150 = "No matter how monstrous or incomprehensible, if you can't see it for yourself, it's not your concern."
52210-151 = "Unlike that brat's tome, Toutei's Phantom Illustrations creates Ghost Stories that will flood this district with vivid, picture‑perfect terror."
52210-152 = "Run. Hide and avert your eyes. Try as you may, our gaze is ubiquitous."
52210-153 = "Ah, what name would suit this beautiful Phantom Fable?"
52210-154 = "Amongst the countless eyes opening across the city, they will all see this and only this."
52210-159 = "Exquisite. We shall call it the single eye, Hitotsume."
52210-161 = "Ayame...no, Hitotsume."
52210-162 = "Focus your gaze upon the pathetic people of this academy."
52210-163 = "Show them that those who hide behind others' gazes don't have the right to their own."
52210-167 = "..."
52210-169 = "Next Episode;The Festival Must Go On"

[translation]
52210-1 = "ตอนที่ 21;สายตาของคนอื่น"
52210-2 = "ตอนอยู่ในเฮียกกะเรียวรัน ฉันอยู่ท่ามกลางสายตาของคนอื่นเสมอ"
52210-6 = "อายาเมะ"
52210-7 = "รุ่นพี่อายาเมะ..."
52210-8 = "หัวหน้าอายาเมะ...!"
52210-12 = "สายตาที่มองมาที่ฉันเป็นสายตาแห่งความปรารถนาและความชื่นชมในเวลาเดียวกัน แต่มันก็เป็นสิ่งที่ผูกมัดฉันไม่ให้มีตัวตนเป็นอย่างอื่นด้วย"
52210-13 = "เมื่อถูกสายตาเหล่านั้นมองมา ฉันก็ไม่อาจหลีกหนีจากหน้ากากแห่งการเป็นหัวหน้าเฮียกกะเรียวรัน และไม่อาจแม้แต่จะแสดงความอึดอัดใจต่อหน้ากากนี้ได้"
52210-16 = "ดูความภูมิฐานของหัวหน้าอายาเมะสิ ขนาดดอกไม้ผลิบานอย่างงดงามยังต้องพ่ายแพ้ให้เลย"
52210-17 = "บุคลิกดี ตรงบรรทัดฐาน มีคุณธรรมเหนือใคร"
52210-18 = "หัวหน้าของเฮียกกะเรียวรันจะเป็นใครอื่นไม่ได้นอกจากหญิงสาวมากความสามารถเช่นนี้"
52210-19 = "ถ้าเป็นหัวหน้าอายาเมะ ไม่ว่าจะเป็นคำขอร้องที่หนักหนาแค่ไหนก็คงตอบรับ"
52210-20 = "ต่อให้ต้องฟังคำที่ทำให้หน้านิ่วคิ้วขมวด แต่ก็ไม่แสดงท่าทีโกรธเลยแม้แต่น้อย"
52210-21 = "เป็นถึงหัวหน้าอายาเมะ ยังไงก็ไม่เป็นไรอยู่แล้ว ใช่มั้ยล่ะคะ?"
52210-22 = "อื้อ ฉันไม่เป็นไรหรอก!"
52210-23 = "ไม่เป็นไรที่ไหนกันล่ะ..."
52210-24 = "หน้ากากที่กดทับใบหน้าที่ยิ้มแย้มของฉันจนเหมือนฉันยืมหน้าคนอื่นมาใช้ทำให้ฉันหายใจไม่ออก ส่วนสายตาของคนอื่นที่มองมาก็เหมือนกับสิ่วแหลมๆ ที่มาสลักหน้ากากให้เป็นรูปร่างตามที่ต้องการ"
52210-25 = "ยกมุมปากขึ้นเพื่อไม่ให้คว่ำลง และดึงคิ้วลงมาเพื่อรักษารูปหน้าให้ภูมิฐานอยู่ตลอด"
52210-26 = "พอได้รับคำขอร้องก็ต้องตอบสนองอย่างรวดเร็ว ถ้าเจอสิ่งไม่เหมาะสมก็ต้องหลับหูหลับตาให้"
52210-27 = "ถ้าความเหนื่อยล้าเผยให้เห็นตัวตนที่แท้จริงของสิ่งที่อยู่ภายใต้หน้ากากแม้เพียงเล็กน้อย..."
52210-30 = "วันนี้ดูไม่เหมือนหัวหน้าอายาเมะเลยค่ะ"
52210-31 = "มีเรื่องอะไรหรือเปล่าคะ?"
52210-32 = "ลองพักสักหน่อยเพื่อให้กลับไปเป็น 'เหมือนเดิม' ดีมั้ยคะ?"
52210-36 = "สุดท้ายทุกคนก็คิดว่าหน้ากากนั่นคือใบหน้าที่แท้จริงของฉัน..."
52210-37 = "ทำไมฉันถึงตัดสินใจใส่หน้ากากนี่กันนะ"
52210-38 = "ทำไมผู้คนถึงอยากให้ฉันใส่หน้ากากนี่ด้วยล่ะ"
52210-39 = "แล้วทำไมทุกคนถึงแก้ไขปัญหาของตัวเองไม่ได้กันเลย"
52210-42 = "ฉันไม่ได้เก่งไปหมดทุกเรื่องเหมือนหัวหน้าอายาเมะหรอกค่ะ..."
52210-43 = "ก็หัวหน้าอายาเมะเก่งไปเสียทุกอย่างเลยนี่คะ"
52210-44 = "เพราะมีแต่หัวหน้าอายาเมะที่สวมหน้ากากนั่นได้ยังไงล่ะ!"
52210-48 = "ใบหน้าที่อยู่ภายใต้หน้ากากนั่นก็ต้องเป็นแม่พระที่จิตใจงามและไร้เดียงสางั้นเหรอ?"
52210-63 = "แต่เมื่อฉันเผชิญกับเงาในความมืด ฉันก็รู้ว่าตัวเองใช้พลังของเฮียกกุเร็นไม่ได้"
52210-64 = "ฉันตระหนักได้ว่าตัวเองไม่ใช่คนสมบูรณ์แบบ"
52210-65 = "แม้จะกังวลว่าไม่ควรปล่อยให้เป็นแบบนี้ แต่ความรู้สึกโล่งใจก็ผลิบานขึ้นจากมุมหนึ่งในหัวใจฉัน"
52210-67 = "[log=아야메 황혼 1]ไม่แปลกหรอก[/log]"
52210-70 = "[log=아야메 황혼 1]ก็เพราะหน้ากากที่สมบูรณ์แบบอันนี้[/log]"
52210-71 = "[log=아야메 황혼 1]ไม่ใช่ใบหน้าของฉัน[/log]"
52210-74 = "[log=아야메 황혼 1]หน้าที่นี้[/log]"
52210-75 = "[log=아야메 황혼 1]ไม่ใช่หน้าที่ของฉัน[/log]"
52210-79 = "ท่านคุซึโนฮะจะแก้ไขทุกอย่างให้เอง"
52210-80 = "ทั้งคำขอร้องที่น่ารำคาญ ทั้งสายตาที่มองมา ท่านคุซึโนฮะจะเป็นผู้รับแทนทั้งหมด"
52210-83 = "กลับไปกันเถอะ อายาเมะ"
52210-84 = "เธอเองก็รู้ดีไม่ใช่เหรอว่าท่านคุซึโนฮะมีอยู่แค่ในตำนานเท่านั้น"
52210-85 = "แต่เด็กคนนั้นก็พูดกับฉันแบบนั้นโดยไม่ลังเล"
52210-86 = "เด็กที่ขี้กลัวจนอะไรนิดอะไรหน่อยก็ร้องไห้"
52210-87 = "เด็กที่ไม่เคยชนะฉันจากการดวลเลยแม้แต่ครั้งเดียว"
52210-88 = "ต่อให้ถูกมองด้วยสายตาที่ไม่อาจรับไหว แต่เด็กคนนั้นก็ไม่วิ่งหนีและปฏิเสธที่จะถอดหน้ากากออก"
52210-90 = "......"
52210-94 = "ยัยเด็กโง่..."
52210-95 = "เพราะแบบนี้ไงเธอถึงได้ยังติดอยู่แต่ที่เดิมตลอดมา"
52210-100 = "คิดอะไรอยู่เหรอ?"
52210-106 = "คิดถึงเรื่องเมื่อก่อนน่ะ"
52210-107 = "ฉันกำลังนึกถึงสายตาของคนอื่นที่มองมาที่ฉันน่ะ"
52210-108 = "สายตาของคนอื่นเหรอ?"
52210-109 = "อื้อ สายตาของคนอื่นที่มองฉันและคาดหวังในตัวฉัน"
52210-110 = "ที่แห่งนี้ยังคงไม่เปลี่ยนแปลงไปเลยแม้แต่น้อยสินะ"
52210-111 = "ผู้คนต่างหวาดกลัวสายตาของกันและกัน และไม่พยายามแก้ไขปัญหาใดๆ ด้วยตัวเอง"
52210-112 = "แต่ฉันปกป้องทุกคนไปตลอดไม่ได้หรอก"
52210-113 = "ฉันตอบสนองต่อทุกสายตาจากทุกคนไม่ได้"
52210-114 = "แต่ถ้าเป็นเธอในตอนนี้ก็น่าจะทำได้นะ"
52210-115 = "เรื่องลึกลับที่ผลิบานอย่างสวยงามจากความเสียใจและความเกลียดชัง เธอในตอนนี้ทำได้ทุกอย่าง อย่างที่หวังนั่นละ"
52210-116 = "ใช่..."
52210-121 = "เมื่อก่อนฉันอยู่ท่ามกลางสายตาของผู้คน"
52210-122 = "แต่ตอนนี้คนพวกนั้นจะอยู่ภายใต้การจับจ้องของฉัน"
52210-147 = "อ่า... ช่างงดงามยิ่งนัก"
52210-148 = "ใช่ นี่ละภาพที่ฉันต้องการมาตลอด!"
52210-149 = "ฉันคิดเอาไว้ไม่ผิดจริงๆ ด้วย"
52210-150 = "ต่อให้มันจะพิลึกพิลั่นแค่ไหน แต่ถ้าไม่ได้เห็นและรู้สึกด้วยตัวเอง เราก็ไม่อาจเข้าใจมันได้ ราวกับมันเป็นเรื่องราวของคนอื่น"
52210-151 = "<โทเท บุคไค โรคุ> เล่มนี้ต่างจากหนังสือลึกลับของเด็กน้อยคนนั้น เพราะตำนานร้อยเรื่องราวที่จะ#nเกิดจากหนังสือเล่มนี้จะบังคับให้ผู้คนเห็นความกลัวอย่างชัดเจนเหมือนเห็นรูปภาพเลยละ"
52210-152 = "ไม่ว่าจะวิ่งหนีหรือพยายามหลบสายตาของมันเท่าไร ก็ไม่อาจหนีสายตาของมันได้หรอก"
52210-153 = "อ่า... จะตั้งชื่อตำนานร้อยเรื่องราวที่งดงามนี้ว่าอะไรดีนะ?"
52210-154 = "แม้จะมีหิมะตกมากมายบนท้องถนน แต่ท่ามกลางหิมะทั้งหมดนั่น ทิวทัศน์ที่ทุกคนจะได้เห็นในที่สุด#nมีเพียงอย่างเดียว"
52210-159 = "ใช่ ปีศาจตาเดียว ฉันจะเรียกมันว่าฮิโตสึเมะ"
52210-161 = "อายาเมะ ไม่สิ ฮิโตสึเมะ"
52210-162 = "พุ่งสายตาของเธอไปที่ผู้คนที่อ่อนแอซะสิ"
52210-163 = "มาทำให้พวกคนอ่อนแอที่ต้องมีชีวิตอยู่ในสายตาของคนอื่นได้รู้ว่าพวกนั้นไม่มีสิทธิ์อะไรกันดีกว่า"
52210-167 = "......"
52210-169 = "ตอนต่อไป;งานเทศกาลต้องดำเนินต่อไป"

[translation]
52210-1 = "第21話;他人的視線"
52210-2 = "在百花繚亂的時候，我總是被眾人的視線所壟罩。"
52210-6 = "菖蒲。"
52210-7 = "菖蒲前輩……"
52210-8 = "……菖蒲委員長！"
52210-12 = "那些視線除了憧憬和仰慕之外……也是束縛我無法成為其他存在的枷鎖。"
52210-13 = "不僅無法卸下「百花繚亂委員長」的面具……#n甚至連露出對這副面具感到不適的神情都不被允許。"
52210-16 = "那閉月羞花的優雅姿態……真不愧是菖蒲委員長。"
52210-17 = "容貌端正，舉止合宜，品行方正……"
52210-18 = "百花繚亂的領袖，果然就得有這樣的資質吧。"
52210-19 = "像菖蒲委員長這樣的人，無論多麼困難的請求都會答應吧？"
52210-20 = "……就算聽到讓人皺眉的話也不會生氣吧？"
52210-21 = "……既然是菖蒲委員長，肯定沒問題吧？"
52210-22 = "當然沒問題囉！"
52210-23 = "──怎麼可能會沒問題。"
52210-24 = "緊貼在笑臉上的面具，就像借來的臉一樣令我無法呼吸。#n那些視線宛如鋒利的鑿子一般，不斷將這副面具雕刻成他們期望的模樣。"
52210-25 = "隨時都必須揚起嘴角，將眉毛固定成八字形。"
52210-26 = "接受請求時要像閃電般迅速，對誘惑人心的不正之事則要像石佛般視而不見。"
52210-27 = "若是因為疲憊，導致稍稍露出了面具底下的真面目──"
52210-30 = "今天的菖蒲委員長跟平時不太一樣呢。"
52210-31 = "發生什麼事了嗎？"
52210-32 = "應該稍微休息一下之後，就會恢復「原本的模樣」了吧？"
52210-36 = "……最終所有人都把那副面具當成了我的真面目。"
52210-37 = "我為什麼會決定戴上這副面具呢？"
52210-38 = "為什麼人們會希望我戴上這副面具呢？"
52210-39 = "為什麼大家都無法自己解決問題呢？"
52210-42 = "因為我沒辦法像菖蒲委員長那樣，什麼都做得很好……"
52210-43 = "因為菖蒲委員長什麼都做得到。"
52210-44 = "因為能戴上那副面具的，就只有菖蒲委員長而已！"
52210-48 = "難道連我面具下的臉都如他們所說，是個完美無瑕的聖人嗎？"
52210-63 = "當我在黑暗中直面自己的影子時，我才發覺自己無法使用百蓮的力量。"
52210-64 = "明白自己並不是個完美的人。"
52210-65 = "在「這樣下去不行」的焦躁之中……心底卻也浮現了一絲安心的感覺。"
52210-67 = "[log=아야메 황혼 1]那當然。[/log]"
52210-70 = "[log=아야메 황혼 1]畢竟這副完美的面具──[/log]"
52210-71 = "[log=아야메 황혼 1]並不是真正的我。[/log]"
52210-74 = "[log=아야메 황혼 1]這份責任──[/log]"
52210-75 = "[log=아야메 황혼 1]也不是我的責任。[/log]"
52210-79 = "葛葉大人會解決一切。"
52210-80 = "那些令人厭煩的請求和視線……葛葉大人會替我承擔。"
52210-83 = "……跟我回去吧，菖蒲。"
52210-84 = "菖蒲應該也知道才對。#n葛葉大人只是古老記錄中的傳聞──"
52210-85 = "然而那孩子，卻毫不猶豫地對我說出了那句話。"
52210-86 = "明明是個動不動就流淚的膽小鬼。"
52210-87 = "明明從來沒有在對練中贏過任何一次。"
52210-88 = "明明承受著無法負荷的視線卻沒有逃跑，甚至拒絕摘下面具。"
52210-90 = "……"
52210-94 = "……真是愚蠢。"
52210-95 = "所以你才會一直停留在原地。"
52210-100 = "在想什麼事情嗎？"
52210-106 = "只是在回憶過去而已。"
52210-107 = "回憶那些注視著我的視線。"
52210-108 = "視線？"
52210-109 = "嗯。那些看著我、對我有所期待的──人們的視線。"
52210-110 = "這裡依然一點也沒變呢。"
52210-111 = "人們仍然害怕著彼此的視線，什麼事都不願自己解決。"
52210-112 = "但我無法永遠守護所有人。"
52210-113 = "無法回應所有視線。"
52210-114 = "現在的你，應該能做到才對。"
52210-115 = "從後悔與憎恨中綻放的[ruby=你]怪談[/ruby]，想必能得償所願吧。"
52210-116 = "……說的也是。"
52210-121 = "從前，是我處於人們的視線之中"
52210-122 = "而現在，該輪到人們籠罩在我的視線之下了。"
52210-147 = "啊啊，真是太美了……"
52210-148 = "這就是我渴望的色彩！"
52210-149 = "果然我的想法並沒有錯。"
52210-150 = "無論再怎麼詭異難解的事物，缺乏親身感受就無法真正產生共鳴。"
52210-151 = "和那小鬼頭的怪書不同，這本《稻亭物怪錄》所創造的百物語──#n將向人們強行灌輸這宛如畫卷般鮮明的恐懼之色，並迫使他們理解。"
52210-152 = "無論再怎麼逃也無法迴避這股視線。"
52210-153 = "啊啊，該為這美麗的百物語取什麼名字好呢？"
52210-154 = "儘管街道上綻放著無數的眼睛，但透過它們所看見的風景就只有一個。"
52210-159 = "沒錯，只有一隻眼睛──就稱呼你為「一目」吧。"
52210-161 = "菖蒲──不，一目啊。"
52210-162 = "將你的視線回敬給那些軟弱之人吧。"
52210-163 = "讓那些只能依賴他人視線而活的脆弱存在，明白自己根本不配睜開雙眼吧。"
52210-167 = "……"
52210-169 = "下一話;祭典必須繼續"

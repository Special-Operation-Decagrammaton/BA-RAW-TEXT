[translation]
1301003-1 = "#title;계산할 수 없는 가치"
1301003-2 = "#place;밀레니엄 <세미나> 학생 사무실"
1301003-3 = "3;유우카;02;선생님, 와 주셨군요.\n#3;greeting\n#3;a"
1301003-4 = "3;유우카;99;이 문제는 밀레니엄의 재정과 관련된 문제라 다른 학생에게 물어보기도 어려워서…… #n선생님이 오시기만을 기다리고 있었어요.\n#3;em;…"
1301003-5 = "3;유우카;01;한나절을 넘게 고민해봤지만 도통 뾰족한 답을 떠올릴 수가 없어서요."
1301003-6 = "3;유우카;01;우선 이 그림부터 봐 주시겠어요?\n#3;m5"
1301003-7 = "#wait;1000"
1301003-8 = "3;유우카;02;선생님이 보시기에는 이 그림에 그려진 게 무엇처럼 보이시나요?\n#3;em;[?]"
1301003-9 = "3;유우카;02\n#3;d\n#wait;1000"
1301003-10 = "#all;hide\n[ns1] \"어린아이가 그린 낙서.\"\n[ns2] \"코끼리를 삼킨 보아뱀!\"\n[ns3] \"커피 얼룩……?\""
1301003-11 = "3;유우카;99;(한숨) 선생님의 눈에도 그렇게 보이시는군요.\n#3;em;[속상함]\n#3;a"
1301003-12 = "3;유우카;99;인상적인 대답이네요. 전혀 그렇게 보이지는 않지만.\n#3;em;[땀]\n#3;a"
1301003-13 = "3;유우카;05;물론 추측하기 어려운 그림이라는 건 맞지만, 그 말은 너무 심하지 않나요?\n#3;em;[반응]\n#3;a"
1301003-14 = "3;유우카;01;결론부터 말씀드리자면, 이 그림은 밀레니엄 학원에 빚을 지고 있는 한 사업가가 담보로 맡겨 둔 추상화 작품이에요."
1301003-15 = "3;유우카;02;그 사업가의 주장에 의하면 이 작품은 와일드헌트 예술 학원의 마쓰모토라는 천재 화가가 그린 추상화로, 무려 1억엔의 가치가 있다고 해요."
1301003-16 = "3;유우카;99;하지만 제 눈에는 아무리 보아도 평범한 어린아이의 낙서로 밖에 보이지 않아서…….\n#3;em;…"
1301003-17 = "[s] \"예술이라는 것이 원래 그런 법이지.\""
1301003-18 = "3;유우카;01;그렇다고는 하지만 막상 제 손에 들어오게 되니 당혹스럽네요."
1301003-19 = "3;유우카;05;분명 이 그림을 그리는 데 들어간 비용은 물감 값을 더해도 1만엔을 넘기지 않을테죠."
1301003-20 = "3;유우카;05;그런데 유명 화가의 손이 닿았다는 이유만으로 만 배가 넘는 가치를 갖게 된다니…… 저는 이 사실을 도저히 받아들일 수가 없어요.\n#3;em;[반응]"
1301003-21 = "3;유우카;99;하지만 세미나의 회계로서 귀중품의 가치를 부당하게 평가절하할 수도 없는지라. 이 담보를 받아들여야 할지 말지 고민이 되네요."
1301003-22 = "[s] \"예술의 가치는 수학처럼 공식으로 계산할 수 없어.\""
1301003-23 = "3;유우카;01;공식으로 계산할 수 없다면 어떤 기준으로 값을 매겨야 하나요?"
1301003-24 = "3;유우카;02;작품을 평가할 때는 그 작품을 만드는 데 들어간 사람의 노력과 창의성을 살펴야 한다고요?\n#3;em;[?]"
1301003-25 = "3;유우카;01;……그렇군요. 확실히 무게가 같다는 이유만으로 정밀한 로봇과 가공되지 않은 쇳덩어리를 같은 값으로 치면 저라도 화가 날 것 같아요.\n#3;greeting"
1301003-26 = "3;유우카;99;다만 저는 예술에는 문외한이니 선생님께서 대신 이 그림의 가치를 판단해 주셨으면 좋겠어요."
1301003-27 = "3;유우카;02;선생님께서는 이 그림이 얼마의 가치를 갖고 있다고 생각하시나요?\n#3;em;[반응]"
1301003-28 = "#all;hide\n#wait;2000"
1301003-29 = "[s] \"0엔.\""
1301003-30 = "3;유우카;06;……네? 그게 무슨 말씀이신가요?\n#3;em;[?!]\n#3;shake"
1301003-31 = "3;유우카;04;……와일드헌트 예술 학원에는 마쓰모토라는 학생이 없다고요? #n그러므로 이 작품은 가치가 없는 위조품일 게 분명하다고요?\n#3;em;[땀]"
1301003-32 = "3;유우카;05;그럼…… 그렇다고 먼저 말씀해 주셨어야죠!\n#3;hophop"
1301003-33 = "#all;hide"
1301003-34 = "#na;이후, 그림은 쓸모를 잃었지만 둘 곳을 찾지 못해 벽에 장식으로 계속 걸어 두기로 했다."

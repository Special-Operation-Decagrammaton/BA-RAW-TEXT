[translation]
1301003-1 = "Priceless"
1301003-2 = "Millennium Seminar Office"
1301003-3 = "There you are, Sensei."
1301003-4 = "Today's agenda pertains to Millennium's finances, so I can't really discuss it with the other students. I've been waiting for you to arrive."
1301003-5 = "I've been mulling it over all day, but haven't come up with a suitable solution."
1301003-6 = "Could you take a look at this picture?"
1301003-8 = "What do you think it looks like?"
1301003-10 = "[ns1] \"A child's scribbling.\"\n[ns2] \"A boa constrictor that swallowed an elephant!\"\n[ns3] \"Coffee stains...?\""
1301003-11 = "*sigh* So you agree."
1301003-12 = "Huh. I never thought of it that way."
1301003-13 = "I know it's abstract, but would it kill you to be a little considerate?"
1301003-14 = "Let me get to the point. This abstract painting was given to us as collateral by an entrepreneur who owes the Millennium School money."
1301003-15 = "According to this entrepreneur, it was painted by a genius painter named Matsumoto from Wildhunt Art Academy, and it's worth at least 100 million yen."
1301003-16 = "But no matter how much I stare at it, it looks like it was scribbled by a toddler."
1301003-17 = "[s] \"Some art is just like that.\""
1301003-18 = "I'm aware, but I can't shake my disappointment. That's all."
1301003-19 = "Taking all supplies into account, it couldn't have cost more than 10,000 yen to produce."
1301003-20 = "But it becomes thousands of times more valuable just because the artist was supposedly famous...? I can't fathom why that would be."
1301003-21 = "Then again, I'm only Seminar's treasurer. It's not my job to appraise art. I only wonder whether or not this art qualifies as collateral."
1301003-22 = "[s] \"You can't calculate the value of art with conventional math.\""
1301003-23 = "If it can't be calculated with a formula, then how DOES one calculate it?"
1301003-24 = "Are you saying that when appraising art, you need to examine the artist's effort and creativity?"
1301003-25 = "Interesting... I suppose I'd be angry if a fully functional robot and a pile of scrap metal were considered equal in value just because they weighed the same."
1301003-26 = "But that brings us back to square one. Since I can't evaluate art, I want you to appraise this painting."
1301003-27 = "How much do you think it's worth?"
1301003-29 = "[s] \"Zero yen.\""
1301003-30 = "...What? How can that be?"
1301003-31 = " Wildhunt Art Academy doesn't have a famous artist named Matsumoto?#nThat would mean this artwork is just a counterfeit?"
1301003-32 = "Then why didn't you tell me that from the start?!"
1301003-34 = "Though the painting is worthless, we decided to hang it up anyway since there was nowhere else to store it."

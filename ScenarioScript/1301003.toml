[translation]
1301003-1 = "無法計算的價值"
1301003-2 = "千年．「研討會」學生會辦公室"
1301003-3 = "老師，你來啦。"
1301003-4 = "因為是和千年的財務相關的問題，所以不太好問其他的學生…… #n在老師來之前，我不敢貿然出手。"
1301003-5 = "雖然煩惱了一整天，但怎麼也浮現不出像是「就是這個！」之類的答案……"
1301003-6 = "首先，可以看看這幅畫嗎？"
1301003-8 = "在老師看來，你覺得這幅畫是什麼？"
1301003-10 = "[ns1] 「小孩畫的塗鴉。」\n[ns2] 「吞大象的蛇！」\n[ns3] 「咖啡的污漬……？」"
1301003-11 = "哈啊……老師看起來也是這樣啊。"
1301003-12 = "真是獨特的回答啊，我是完全看不出來。"
1301003-13 = "雖說確實是很難明白的畫，但不管怎麼說也太過分了吧……？"
1301003-14 = "簡單來說，這幅畫是某位向千年科學學園借錢的企業家，作為擔保而寄存的抽象畫。"
1301003-15 = "根據那位企業家的主張，這幅作品是由狂獵藝術學院的天才畫家松本所畫的抽象畫，價值竟然有1億元左右。"
1301003-16 = "但是在我看來，這只是隨處可見的小孩子的塗鴉……"
1301003-17 = "[s] 「藝術就是這樣吧。」"
1301003-18 = "也許是這樣，但真的要像這樣做出判斷的時候……"
1301003-19 = "畫這幅畫所花的費用，即使將顏料費也包含進去，估計也不會超過1萬元吧。"
1301003-20 = "然而，光憑它是著名畫家親手繪製的，就價值1萬倍以上……我實在是無法接受這個事實。"
1301003-21 = "但是身為研討會的會計，也不能不當地降低貴重物品的價值，我原本也在煩惱是否該接受這個擔保。"
1301003-22 = "[s] 「因為藝術的價值不能像數學公式一樣計算。」"
1301003-23 = "如果不能那樣計算的話，能用什麼標準來計算價值呢？"
1301003-24 = "……在評估作品的時候，必須深入了解那幅作品的製作經過和獨創性嗎？"
1301003-25 = "……原來如此。即使兩者重量相同，但如果精密的機器人和未加工的鐵塊具有相同價值的話，我可能也無法接受。"
1301003-26 = "不過說到底，我對藝術是外行……我想請老師代為判斷這幅畫的價值。"
1301003-27 = "老師認為這幅畫有多大的價值？"
1301003-29 = "[s] 「0元。」"
1301003-30 = "……耶？那是怎麼回事？"
1301003-31 = "……狂獵藝術學院裡沒有名叫松本的學生嗎？ #n所以這幅作品是沒有價值的贗品嗎？"
1301003-32 = "老師……請你先說一聲啊！"
1301003-34 = "（在那之後，雖然那幅畫變得沒有任何價值，但因為找不到地方放，所以決定掛在學生會辦公室的牆上當作裝飾）"

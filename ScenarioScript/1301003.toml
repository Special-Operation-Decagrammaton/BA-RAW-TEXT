[translation]
1301003-1 = "มูลค่าที่ประเมินไม่ได้"
1301003-2 = "ห้องขององค์การนักเรียน <เซมิน่า> มิลเลเนียม"
1301003-3 = "มาแล้วเหรอคะคุณครู"
1301003-4 = "เรื่องนี้เป็นเรื่องเกี่ยวกับปัญหาด้านการเงินของทางมิลเลเนียม ฉันเลยไปคุยกับนักเรียนคนอื่นไม่ได้... เพราะงั้นฉันเลยรอให้คุณครูมาที่นี่ค่ะ"
1301003-5 = "ฉันนั่งคิดมาตลอดทั้งวันแล้ว แต่ก็ยังคิดวิธีดีๆ ไม่ออกเลยค่ะ"
1301003-6 = "ถ้างั้นช่วยดูรูปนี้ก่อนนะคะ"
1301003-8 = "คุณครูคิดว่ามันเป็นรูปอะไรเหรอคะ?"
1301003-10 = "[ns1] \"รูปวาดของเด็กๆ\"\n[ns2] \"งูเหลือมที่กำลังกินช้าง!\"\n[ns3] \"คราบกาแฟ....?\""
1301003-11 = "(ถอนหายใจ) คุณครูก็คิดแบบนั้นเหรอคะ"
1301003-12 = "เป็นคำตอบที่น่าทึ่งดีนะคะ ถึงฉันจะไม่เคยคิดว่าเป็นรูปแบบนั้นเลยก็เถอะ"
1301003-13 = "มันอาจเป็นรูปวาดที่ดูออกยากไปสักหน่อย แต่ว่า...พูดแบบนี้มันไม่เกินไปหน่อยเหรอคะ?"
1301003-14 = "ฉันจะเข้าประเด็นเลยแล้วกันค่ะ นี่เป็นรูปวาดที่นักธุรกิจที่ติดหนี้กับโรงเรียนของเรามอบให้ไว้#nเป็นหลักประกันค่ะ"
1301003-15 = "เขาบอกว่ารูปนี้เป็นผลงานของมัตสึโมโตะ จิตรกรอัจฉริยะจากสถาบันศิลปะไวลด์ฮันต์ค่ะ#nและบอกว่ารูปนี้มีมูลค่าสูงถึงหนึ่งร้อยล้านเยน"
1301003-16 = "แต่ไม่ว่าฉันจะดูยังไง มันก็เหมือนกับรูปวาดของเด็กประถม..."
1301003-17 = "[s] \"นี่แหละถึงเรียกว่างานศิลปะ\""
1301003-18 = "เรื่องนั้นฉันรู้ดีค่ะ แต่ว่าฉันแค่รู้สึกผิดหวังนิดหน่อย..."
1301003-19 = "รวมค่าอุปกรณ์ที่ใช้วาดแล้ว ฉันคิดว่าคงมูลค่าไม่ถึงหนึ่งหมื่นเยนแน่ๆ"
1301003-20 = "แต่ว่าแค่เพราะเป็นผลงานของจิตรกรชื่อดังก็เลยมีมูลค่าเพิ่มอีกหมื่นเท่าเลยงั้นเหรอ...#nฉันไม่เข้าใจเลยจริงๆ ค่ะ"
1301003-21 = "ในฐานะของนักบัญชีของเซมิน่า ฉันไม่ได้มีหน้าที่ประเมินมูลค่าของงานศิลปะ แต่ฉันกำลังคิด#nเรื่องที่จะรับผลงานชิ้นนี้ไว้เป็นหลักประกันดีรึเปล่าน่ะค่ะ"
1301003-22 = "[s] \"งานศิลปะประเมินด้วยสูตรทางคณิตศาสตร์ไม่ได้หรอกนะ\""
1301003-23 = "ถ้าประเมินไม่ได้ด้วยหลักการทางคณิตศาสตร์ แล้วจะประเมินได้ยังไงล่ะคะ?"
1301003-24 = "เวลาที่จะประเมินมูลค่าของงานศิลปะ จะต้องดูถึงความพยายามและความคิดสร้างสรรค์ของจิตรกร#nผู้สร้างผลงานด้วยเหรอคะ?"
1301003-25 = "...อย่างนี้นี่เอง ฉันคงไม่พอใจแน่ๆ ถ้าหุ่นยนต์ที่ถูกสร้างขึ้นโดยช่างผู้ชำนาญกับกองเศษเหล็ก#nเก่าๆ มีมูลค่าเท่ากัน"
1301003-26 = "แต่ว่าฉันไม่มีความรู้ทางศิลปะเลย เพราะงั้นฉันเลยอยากขอให้คุณครูช่วยประเมินมูลค่ารูปนี้ให้#nหน่อยค่ะ"
1301003-27 = "คุณครูคิดว่ารูปนี้มีมูลค่าเท่าไหร่เหรอคะ?"
1301003-29 = "[s] \"0 เยน\""
1301003-30 = "...คะ? หมายความว่ายังไงคะ?"
1301003-31 = "...ที่สถาบันไวลด์ฮันต์ไม่มีจิตรกรที่ชื่อว่ามัตสึโมโตะเหรอคะ? คุณครูแน่ใจเหรอคะว่ารูปนี้เป็นรูป#nที่ไม่มีมูลค่าเลย?"
1301003-32 = "ถ้างั้น... ก็น่าจะบอกฉันให้เร็วกว่านี้สิคะ!"
1301003-34 = "ถึงภาพวาดนั้นจะไม่มีมูลค่า แต่เนื่องจากหาที่เก็บไม่ได้ ทั้งคู่เลยนำไปแขวนไว้เป็นของตกแต่ง#nผนังแทน"

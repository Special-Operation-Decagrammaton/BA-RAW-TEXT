[translation]
1010002-1 = "ผู้เชี่ยวชาญ"
1010002-4 = "สวัสดี คุณครู"
1010002-5 = "[s] \"ได้เจอกันในที่ที่ธรรมดาจนผิดคาดเลยนะ!\""
1010002-6 = "อืม... งั้นเหรอ"
1010002-7 = "แค่พอดีมีของที่ฉันต้องซื้ออยู่น่ะ"
1010002-8 = "ถ้าไม่ซื้อไว้เลยตอนแวะมาย่านการค้าอะบิดอส มันจะลำบากในหลายๆ อย่างน่ะ"
1010002-9 = "ไหนๆ ก็มาแล้ว คุณครูจะซื้ออะไรหรือเปล่า? ไม่นานมานี้ฉันได้เงินสดมาจำนวนหนึ่ง ตอนนี้ก็เลย#nไม่ค่อยลำบากเท่าไรแล้ว เดี๋ยวฉันซื้อให้เอง"
1010002-10 = "[s1] \"......\"\n[s2] \"เงินสด... งั้นเหรอ...?\""
1010002-13 = "อื้อ"
1010002-14 = "[s] \"เมื่อกี้พูดว่าเงินสด... งั้นเหรอ...?\""
1010002-18 = "อื้อ แต่ฉันไม่ได้ไปก่อเรื่อง หรือสร้างปัญหาอะไรหรอกนะ "
1010002-19 = "เพราะถ้าทำแบบนั้นก็จะทำให้ทางคณะกรรมการแผนงานตกที่นั่งลำบาก และถ้าถูกจับได้ก็จะยิ่งทำให้#nชิโรโกะทางนี้ถูกเข้าใจผิดขึ้นไปอีก"
1010002-20 = "ถึงฉันจะไม่มีวันถูกจับได้ก็เถอะ"
1010002-21 = "นี่เป็นเงินที่ได้รับมาจากการทำงานที่ถูกต้องตามกฎหมาย เพราะงั้นไม่ต้องกังวลหรอกนะ คุณครู"
1010002-22 = "[s] \"ตอนนี้ทำงานพาร์ทไทม์อยู่เหรอ?\""
1010002-23 = "ก็คล้ายๆ กันน่ะ"
1010002-24 = "เมื่อเร็วๆ นี้ จำนวนคนที่อยู่ในเขตอะบิดอสเพิ่มขึ้น ก็เลยพอหาเงินได้จากอะไรหลายๆ อย่างน่ะ"
1010002-28 = "[ns] \"อย่างนี้นี่เอง...\""
1010002-30 = "(หลังซื้อของและจ่ายเงินเรียบร้อยแล้ว ทั้งสองคนก็ออกมาจากย่านการค้า)"
1010002-35 = "ฉันไม่ได้คาดหวังอะไรแท้ๆ แต่เพราะมีคุณครูอยู่ก็เลยสนุกกับการซื้อของมากเลยละ ขอบคุณนะ คุณครู"
1010002-36 = "ว่าแต่ว่าถุงใส่ของมันหนักหรือเปล่า? เดี๋ยวฉันถือให้เอง ส่งมาสิ"
1010002-37 = "[s] \"ไม่หรอก แบ่งกันถือแบบนี้ดีกว่า ชิโรโกะก็มีแค่สองมือเองนี่นา\""
1010002-38 = "อื้อ... แต่ว่า..."
1010002-39 = "[s] \"ช้อปปิ้งเสร็จแล้ว ตอนนี้ก็ไปที่ที่ชิโรโกะพักอยู่ได้แล้วสินะ\""
1010002-40 = "หืม? ไปที่ที่ฉันพักอยู่...?"
1010002-41 = "อะ...อืม แต่ว่า... เรื่องนั้น... "
1010002-42 = "ฉันยังไม่ได้เก็บกวาดเลย... แถมยังมีอะไรหลายๆ อย่างที่ไม่ได้จัดให้เป็นระเบียบด้วย..."
1010002-43 = "[s] \"ไม่เป็นไร ครูแค่อยากไปดูความเป็นอยู่ของชิโรโกะน่ะ\""
1010002-47 = "อื้อ เข้าใจแล้ว..."
1010002-48 = "เหมือนกับการไปเยี่ยมบ้านสินะ เข้าใจแล้วละ"
1010002-52 = "งั้นตามมาทางนี้สิ คุณครู"
1010002-57 = "[ns] เดินตามชิโรโกะไป"
1010002-62 = "ทางเข้าแยกที่ถูกทิ้งร้าง"
1010002-64 = "ทางนี้ละ"
1010002-65 = "[s3] \"อาคารร้าง...\"\n[s4] \"ชิโรโกะอยู่ที่นี่เหรอ?\""
1010002-68 = "หืม? เปล่าหรอก นี่เป็นทางลัดน่ะ"
1010002-69 = "ถ้าเดินเลยเข้าไปทางด้านโน้นก็จะไปถึงได้เร็วขึ้น"
1010002-70 = "[s] \"อ้อ... อื้ม\""
1010002-71 = "ยังต้องไปต่ออีกนิดหน่อย"
1010002-76 = "ระวังหัวด้วยนะ คุณครู "
1010002-77 = "[s] \"ชิโรโกะ... เธออยู่ในบ้านที่ทำจากกระดาษหรือเต้นท์เหรอ?\""
1010002-78 = "หืม? เปล่า ไม่ใช่แบบนั้นหรอก ที่ฉันอยู่ตอนนี้เป็นบ้านจริงๆ ถึงจะเคยอยู่แบบนั้นมาสักสองสามวัน#nก็เถอะ..."
1010002-79 = "[s] \"เคยอยู่แบบนั้นด้วยเรอะ!\""
1010002-80 = "อืม... ทางนี้ "
1010002-83 = "บ้านเดี่ยวที่ถูกทรายฝัง"
1010002-87 = "[ns5] \"บ้านเดี่ยวที่ถูกทิ้งร้าง...\" \n[ns6] \"อย่างนี้นี่เอง ที่นี่มีบ้านร้างอยู่เยอะเลยนี่เนอะ\""
1010002-90 = "อื้อ บ้านที่ถูกปล่อยทิ้งร้างแบบบ้านหลังนี้มีอยู่เยอะมากในอะบิดอส"
1010002-91 = "[s7] \"ไม่ลำบากเหรอ?\" \n[s8] \"คงไม่มีทั้งไฟฟ้า น้ำประปาและห้องน้ำ...\""
1010002-94 = "หืม? เรื่องนั้น.... ถ้าอยู่ในที่แบบนี้ก็ต้องไม่มีอยู่แล้วสิ"
1010002-95 = "[s] \"......??\""
1010002-96 = "อ้อ ไม่ใช่ที่นี่หรอก คุณครู"
1010002-97 = "อย่างที่พูดนั่นแหละว่าที่นี่ไม่เหมาะที่จะอยู่อาศัยน่ะ เพราะงั้นต้องไปต่ออีกหน่อย"
1010002-102 = "[ns] \"......\""
1010002-106 = "มาถึงแล้ว ที่นี่ละ"
1010002-110 = "เข้ามาสิ คุณครู"
1010002-122 = "ที่นี่คือห้องของฉันในตอนนี้"
1010002-123 = "ฉันไม่ได้ทำความสะอาดมาหลายวัน มันเลยจะรกนิดหน่อยนะ ขอโทษด้วย"
1010002-127 = "[ns9] \"ที่นี่งั้นเหรอ?\"\n[ns10] \"ดูปกติธรรมดาสุดๆ!?\""
1010002-130 = "อื้อ ก็ปกติน่ะสิ...? ก็มันเป็นบ้านนี่นา...?"
1010002-131 = "[s] \"มันก็ใช่แหละ... อย่างนี้เองสินะ\""
1010002-132 = "ช่วยเอาของไปเก็บไว้ในตู้เย็นให้หน่อยได้มั้ย? ส่วนผงซักฟอกวางไว้บนชั้นตรงเครื่องซักผ้านั่นก็ได้ แล้วก็..."
1010002-133 = "[s11] \"มีไฟฟ้าใช้ด้วยสินะ?!\"\n[s12] \"น้ำประปาไหลด้วยสินะ?!\""
1010002-136 = "อ้อ ถ้าร้อนเดี๋ยวเปิดแอร์ให้ รอแป๊บหนึ่งนะ"
1010002-141 = "[ns] \"มีแอร์ด้วย...?!\""
1010002-142 = "อื้อ... ฉันไม่รู้ว่ากำลังคาดหวังอะไรหรอกนะ... "
1010002-143 = "[s] \"เปล่าๆ ครูคาดหวังเรื่องพวกนี้ละ โล่งอกจนน้ำตาจะไหลเลย!\""
1010002-144 = "อื้อ ตอนแรกที่บริเวณนี้ไม่มีน้ำหรือไฟฟ้าหรอกแต่ว่า... วิธีหาไฟฟ้าใช้มันก็มีอยู่หลายวิธี"
1010002-145 = "ใกล้ๆ แถวนี้มีโรงไฟฟ้าพลังงานแสงอาทิตย์ที่สภานักเรียนสร้างเอาไว้ ฉันเลยเชื่อมต่อระบบจ่ายไฟ#nจากที่นั่นมา แล้วก็มีเครื่องปั่นไฟฉุกเฉินด้วย"
1010002-146 = "มีแบบที่ใช้น้ำมันดีเซลกับอีกอันหนึ่งที่ใช้น้ำมันเบนซิน และส่วนอันนี้คืออันที่ฉันดัดแปลงเอง... มันจะผลิตไฟฟ้าให้เมื่อปั่นจักรยานน่ะ"
1010002-147 = "[s] \"งั้นเหรอ?!\""
1010002-148 = "และถึงเขตนี้จะไม่มีน้ำ แต่ก็มีแทงก์น้ำหลายสิบแทงก์ที่เชื่อมต่ออยู่ ถึงฝนไม่ตกติดต่อกัน 2-3 เดือน ก็ไม่ขาดน้ำหรอก"
1010002-149 = "ฉันทำระบบกรองน้ำไว้แล้ว ดื่มได้ไม่ต้องกังวล"
1010002-150 = "ส่วนโรงรถทางด้านนี้ ฉันดัดแปลงเป็นห้องซ่อมจักรยาน ส่วนชั้นบนก็ทำเป็นห้องฝึกร่ายกาย "
1010002-151 = "ถ้านำจักรยานที่ถูกทิ้งหลายๆ คันมาแยกชิ้นส่วนออกแล้วรวบรวมชิ้นส่วนที่ยังพอใช้ได้ไว้ ก็จะประกอบเป็นจักรยานคันใหม่ขึ้นมาได้ด้วย"
1010002-152 = "[s] \"อืม... ชิโรโกะนี่เก่งงานหลายอย่างเลยนะ...\""
1010002-153 = "อืม เพราะในอะบิดอสมีของที่พังและของที่ถูกทิ้งอยู่เยอะนี่นา ถ้านำของพวกนั้นมาซ่อมแล้วเอาไป#nขายที่ย่านการค้า ก็พอหาเงินได้อยู่น่ะ"
1010002-154 = "[s] \"อ้อ เพราะงั้นก็เลย...\""
1010002-155 = "อื้อ ช่วงนี้มีคนมาที่อะบิดอสเยอะขึ้น เลยมีคนที่ต้องการของพวกนี้อยู่น่ะ"
1010002-159 = "[ns] \"ครูคงเป็นห่วงมากเกินไปเองแหละนะ ชิโรโกะ\""
1010002-160 = "อื้อ"
1010002-162 = "ฉันเป็นมืออาชีพที่มีประสบการณ์พอสมควร เพราะงั้นไม่ต้องเป็นห่วงมากเกินไปก็ได้นะ คุณครู"
1010002-172 = "(เวลาล่วงเลยมาจนฟ้ามืด คุณครูจึงตัดสินใจกลับไปยังชาเล่ต์)"
1010002-177 = "[ns] \"งั้นไว้ครูจะติดต่อมาใหม่นะ ชิโรโกะ\""
1010002-178 = "อาจติดต่อไม่ค่อยได้นะ... เพราะฉันอาจจะต้องไปจากที่นี่สักพักน่ะ"
1010002-179 = "[s13] \"ไปจากที่นี่? จะไปปั่นจักรยานเหรอ?\"\n[s14] \"จะไปปั่นจักรยานระยะไกลเหรอ?\""
1010002-184 = "เป็นคำเรียกที่ชวนคิดถึงจังเลยนะ... แต่ตอนนี้ฉันไม่ปั่นจักรยานแล้วละ"
1010002-185 = "[s] \"เลิกปั่นแล้วเหรอ? ทำไมล่ะ?\""
1010002-186 = "......"
1010002-187 = "[ns] \"ชิโรโกะจังเลิกปั่นจักรยานแล้ว หมายความว่ายังไงน่ะ?\""
1010002-191 = "เหตุผลที่ฉันจะไม่อยู่ เพราะมีสิ่งที่ฉันต้องมาหาที่นี่น่ะ ถึงมันจะยังไม่แน่ชัดก็เถอะ..."
1010002-192 = "ฉันไม่รู้ว่าจะอยู่ที่นี่อีกนานแค่ไหนแต่ว่า... ไว้แวะมาหากันบ้างนะ คุณครู"
1010002-196 = "ขอตัวนะ..."

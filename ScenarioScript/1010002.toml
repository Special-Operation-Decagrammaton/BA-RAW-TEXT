[translation]
1010002-1 = "專家"
1010002-4 = "你好，老師。"
1010002-5 = "[s]「沒想到你竟然約在這麼普通的地方！」"
1010002-6 = "嗯……是嗎？"
1010002-7 = "因為我剛好要買點東西。"
1010002-8 = "要是不趁路過阿拜多斯商店街的時候買好，之後要買會很麻煩。"
1010002-9 = "既然都來了，老師要不要也買點東西？#n我現在手邊有很多現金，經濟情況還算寬裕，我買給你。"
1010002-10 = "[s1]「……………………」\n[s2]「……你剛才是說現金嗎？」"
1010002-13 = "嗯。"
1010002-14 = "[s]「真的是現金？那個……」"
1010002-18 = "唔嗯……我並沒有闖禍或製造麻煩。"
1010002-19 = "因為這樣會造成對策委員會的困擾。#n而且要是被人發現，會害這個世界的白子被誤會。"
1010002-20 = "雖然我根本不會被抓到就是了。"
1010002-21 = "這些是我靠正當勞動賺來的錢，所以你不用擔心，老師。"
1010002-22 = "[s]「你找了什麼打工之類的嗎？」"
1010002-23 = "類似吧。"
1010002-24 = "最近來往阿拜多斯的人越來越多，因此能賺錢的工作也跟著增加了。"
1010002-28 = "[ns]「原來如此……」"
1010002-30 = "（稍微逛逛並買完東西之後，跟白子一起離開了商店街）"
1010002-35 = "其實我本來沒抱太大的期待，但多虧有老師在，我逛得很愉快。#n謝謝你，老師。"
1010002-36 = "購物袋很重吧？來，交給我提。"
1010002-37 = "[s]「沒關係，我們分工合作比較輕鬆。更何況你也只有兩隻手。」"
1010002-38 = "嗯……可是……"
1010002-39 = "[s]「既然東西都買完了，我們現在該回你住的地方了吧？」"
1010002-40 = "嗯？我住的地方……？"
1010002-41 = "唔……可是……那個……"
1010002-42 = "我的東西都沒有整理……所以那裡現在有點亂……"
1010002-43 = "[s]「沒關係，我只是想親眼看看你平常的生活。」"
1010002-47 = "嗯，我知道了。"
1010002-48 = "就像是家庭訪問一樣對吧。"
1010002-52 = "往這邊。跟我來，老師。"
1010002-57 = "[ns] 跟著白子走"
1010002-62 = "廢棄大樓入口"
1010002-64 = "往這邊走。"
1010002-65 = "[s3]「這座廢墟是……」\n[s4]「你住在這裡嗎？」"
1010002-68 = "嗯？沒有，我只是想抄捷徑而已。"
1010002-69 = "從這裡穿過去會比較快。"
1010002-70 = "[s]「啊啊……原來如此。」"
1010002-71 = "還要再走一下子。"
1010002-76 = "小心撞到頭哦，老師。"
1010002-77 = "[s]「白子……你該不會住在瓦楞紙堆或帳篷裡吧？」"
1010002-78 = "嗯？沒有，我住在正常的房子裡。#n雖然之前的確有幾天是住在那種地方……"
1010002-79 = "[s]「我就知道！」"
1010002-80 = "唔嗯……這邊。"
1010002-83 = "被沙子掩埋的住宅區"
1010002-87 = "[ns5]「廢棄的住宅區……」\n[ns6]「原來如此，這種地方的確有很多空屋。」"
1010002-90 = "嗯，阿拜多斯本來就有很多這種廢棄的房屋。"
1010002-91 = "[s7]「住在這裡不會很不方便嗎？」\n[s8]「除了沒水沒電以外，這裡應該也沒有廁所吧……」"
1010002-94 = "嗯？如果住在這種地方的話……應該是吧。"
1010002-95 = "[s]「……？？」"
1010002-96 = "啊啊，這裡也不是我住的地方，老師……"
1010002-97 = "畢竟就像你剛才說的一樣，這裡的環境並不適合久住。#n還要再走一小段路。"
1010002-102 = "[ns]「…………」"
1010002-106 = "到了，就是這裡。"
1010002-110 = "進來吧。老師。"
1010002-122 = "這裡就是我現在住的地方。"
1010002-123 = "不過最近這幾天都沒整理，所以可能會有點亂，抱歉。"
1010002-127 = "[ns9]「你住在這裡？」\n[ns10]「看起來超級普通！？」"
1010002-130 = "嗯，很普通對吧……？#n畢竟就是一般的房子……"
1010002-131 = "[s]「是沒錯啦……原來如此……」"
1010002-132 = "可以幫我把東西放到冰箱裡嗎？#n洗衣精的話放在那邊的架子上就行了，然後……"
1010002-133 = "[s11]「這種地方竟然有電！？」\n[s12]「而且連水都有！？」"
1010002-136 = "啊，如果會熱的話，我幫你開個冷氣。你等我一下。"
1010002-141 = "[ns]「甚至還有冷氣……！？」"
1010002-142 = "唔嗯……雖然我不知道老師期待的是什麼樣的景象……"
1010002-143 = "[s]「不不不，這就是我想看到的！太好了！老師我很感動！」"
1010002-144 = "嗯，其實這一區本來是沒水沒電的……但是電力這種東西並不難取得。"
1010002-145 = "以前學生會設立的太陽能區域發電廠就在這附近，#n所以這間房子本來就有拉電線，甚至還有備用的發電機。"
1010002-146 = "除了使用柴油和汽油的發電機以外，#n還有這台我自己改造的，只要踩踏板就能發電的發電機。"
1010002-147 = "[s]「原來如此！？」"
1010002-148 = "另外雖然沒有自來水，#n不過屋子的水管連接著數十個水桶，就算幾個月不下雨也不用擔心會有斷水的可能。"
1010002-149 = "而且我還加裝了淨水系統和軟水器，所以那些水是可以直接喝的。"
1010002-150 = "至於這邊的車庫被我改造成了修理自行車的工作坊，樓上則是健身空間。"
1010002-151 = "我平時會把廢棄的自行車帶回來，用拆下來的零件重新組裝成新的自行車。"
1010002-152 = "[s]「唔嗯……你的手果然很巧……」"
1010002-153 = "嗯，阿拜多斯有很多損壞或遺棄的廢棄物。#n只要把那些東西修理一下拿去商店街賣，就能賺到生活費了。"
1010002-154 = "[s]「啊啊，所以你是……」"
1010002-155 = "嗯，隨著阿拜多斯的居民越來越多，需要這些東西的人也變多了。"
1010002-159 = "[ns]「……看來是我白擔心了，白子。」"
1010002-160 = "嗯。"
1010002-162 = "我畢竟是個經驗老到的專家，所以你真的不必太擔心我，老師。"
1010002-172 = "（因為時間有點晚了，於是準備動身回家）"
1010002-177 = "[ns]「那我們之後再聯絡哦，白子。」"
1010002-178 = "……我不確定你能不能聯絡得到我，因為我可能會離開一陣子。"
1010002-179 = "[s13]「你要離開？」\n[s14]「是要去長途騎行嗎？」"
1010002-184 = "真是個令人懷念的詞語……不過我現在已經不騎自行車了。"
1010002-185 = "[s]「……已經不騎了？為什麼呢？」"
1010002-186 = "……"
1010002-187 = "[ns]「白子竟然不再騎自行車了……為什麼呢？」"
1010002-191 = "我之所以要離開，是因為有了想在這個世界尋找的東西。#n雖然不是現在……"
1010002-192 = "我也不確定會在這裡待多久，但是歡迎你之後再來找我，老師。"
1010002-196 = "再見……"

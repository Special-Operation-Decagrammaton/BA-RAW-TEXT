[translation]
1010002-1 = "Expert"
1010002-4 = "Hello, Sensei."
1010002-5 = "[s] \"This is a weirdly normal setting to see you in!\""
1010002-6 = "Um... Is that so?"
1010002-7 = "I had need for some supplies."
1010002-8 = "I have to purchase them during my visits to the Abydos shopping district, or it becomes a rather large inconvenience later."
1010002-9 = "Since we've run into each other like this, shall I treat you to something, Sensei? I've recently come into some money."
1010002-10 = "[s1] \"...\"\n[s2] \"Money...?\""
1010002-13 = "Yes."
1010002-14 = "[s] \"You have...money...? So you're saying...?\""
1010002-18 = "I have not undertaken any illegal activities. "
1010002-19 = "I wouldn't want to get caught and incite a situation where people mistake me for this world's Shiroko, creating trouble for her and the Foreclosure Task Force."
1010002-20 = "To clarify, I have not given anyone a reason to pursue me."
1010002-21 = "I've earned this money through legitimate means. Please do not worry, Sensei."
1010002-22 = "[s] \"Did you get a part-time job or something?\""
1010002-23 = "Along those lines."
1010002-24 = "With an increase of visitors coming to Abydos, comes an increase in opportunities to make money."
1010002-28 = "[ns] \"I see...\""
1010002-30 = "We left the shopping district together after purchasing everything we needed."
1010002-35 = "This shopping experience was unexpectedly enjoyable, thanks to your presence, Sensei."
1010002-36 = "Your bag must be heavy. Allow me to carry it for you."
1010002-37 = "[s] \"No, it's easier if both of us carry one. You only have two hands, after all.\""
1010002-38 = "Well, I suppose..."
1010002-39 = "[s] \"Since we're all done, why don't we head over to wherever you're staying?\""
1010002-40 = "Where...I'm staying?"
1010002-41 = "But...um...well... "
1010002-42 = "I've been neglecting cleaning...so it's a bit messy..."
1010002-43 = "[s] \"That doesn't matter. I just want to make sure you're doing well, Shiroko.\""
1010002-47 = "Oh... I see."
1010002-48 = "A home visit, of sorts. Understood."
1010002-52 = "Follow me this way, then, Sensei."
1010002-57 = "[ns] Follow Shiroko."
1010002-62 = "Abandoned Building Entrance"
1010002-64 = "This way."
1010002-65 = "[s3] \"Abandoned ruins...?\"\n[s4] \"This is where you've been staying?\""
1010002-68 = "Hm? No. This is a shortcut."
1010002-69 = "We'll get there faster this way."
1010002-70 = "[s] \"Ah...okay.\""
1010002-71 = "A little further."
1010002-76 = "Watch your head, Sensei. "
1010002-77 = "[s] \"Shiroko... You're not living in a tent or a cardboard house, are you?\""
1010002-78 = "No, not anymore. In the beginning, I did, but I now inhabit a proper house."
1010002-79 = "[s] \"You were living in a tent?!\""
1010002-80 = "Um... This way. "
1010002-83 = "Neighborhood Buried in Sand"
1010002-87 = "[ns5] \"An abandoned neighborhood...\" \n[ns6] \"There are a lot of vacant homes in these areas...\""
1010002-90 = "Yes. There are many unoccupied homes in Abydos."
1010002-91 = "[s7] \"Isn't it difficult to live like this?\" \n[s8] \"If you have no electricity, running water, or plumbing...\""
1010002-94 = "Hm? I suppose that would be difficult for someone."
1010002-95 = "[s] \"...?\""
1010002-96 = "Oh. This isn't it either, Sensei."
1010002-97 = "As you said, it'd be rather uncomfortable to live in this abandoned neighborhood. My home is further ahead."
1010002-102 = "[ns] \"...\""
1010002-106 = "We're here."
1010002-110 = "Come inside, Sensei."
1010002-122 = "This is my room."
1010002-123 = "I apologize for the mess. I've been unable to clean the last several days."
1010002-127 = "[ns9] \"This is it?\"\n[ns10] \"It looks so ordinary!\""
1010002-130 = "Houses...are rather ordinary..."
1010002-131 = "[s] \"Well, that's true, but... I see...\""
1010002-132 = "Would you please place the groceries in the refrigerator? And there is a shelf above the washing machine for the detergent. And—"
1010002-133 = "[s11] \"You have electricity?!\"\n[s12] \"And plumbing?!\""
1010002-136 = "Ah, it must be hot. I will turn on the air conditioner, just a moment."
1010002-141 = "[ns] \"You even have air conditioning...?!\""
1010002-142 = "Yes. Were you not expecting me to have these kinds of basic necessities? "
1010002-143 = "[s] \"No, no. This is exactly what I hoped for! I'm thrilled!\""
1010002-144 = "Electricity and water doesn't normally run to these areas, but it was an easy remedy."
1010002-145 = "The student council established a solar power station nearby, so I wired this building up to it. I've set up emergency generators as well."
1010002-146 = "One diesel, and one gasoline. I've modified a third one to generate electricity with bicycle pedals, for true emergencies."
1010002-147 = "[s] \"I-I see!\""
1010002-148 = "While it's not an endless water supply, I've also hooked up several water tanks. Even if we have no rain, I have a sufficient amount for several months. "
1010002-149 = "I've connected the system to a filter and water softener, making it safe to drink."
1010002-150 = "There is a fitness room upstairs, and I converted the garage into a workshop for repairing bicycles. "
1010002-151 = "I collect spare parts from abandoned bikes and fix up new ones."
1010002-152 = "[s] \"Wow... You're really handy!\""
1010002-153 = "Yes. The Abydos District is a graveyard of abandoned items. I fix them, and sell them in the shopping district."
1010002-154 = "[s] \"Oh, that's how...\""
1010002-155 = "With many people entering the district, demand has been considerable."
1010002-159 = "[ns] \"...I think I was worried about you for no reason, Shiroko.\""
1010002-160 = "Yes."
1010002-162 = "I'm an expert when it comes to surviving, so please don't worry about me, Sensei."
1010002-172 = "It got late eventually, and I got ready to head back."
1010002-177 = "[ns] \"I'll be in touch, Shiroko.\""
1010002-178 = "I may be difficult to contact. I must leave...for a while."
1010002-179 = "[s13] \"You're leaving\"\n[s14] \"Are you going for one of your long rides?\""
1010002-184 = "How nostalgic... No. I don't ride bicycles anymore."
1010002-185 = "[s] \"...You don't— Why?!\""
1010002-186 = "..."
1010002-187 = "[ns] \"What do you mean you don't ride anymore?\""
1010002-191 = "...I'll be leaving to find something I may need. Not quite yet, though."
1010002-192 = "I don't know how much longer I'll be here, but please feel free to come visit me, Sensei."
1010002-196 = "Goodbye..."

[translation]
84303100400-6 = "คุยธุระเสร็จแล้วเหรอ?"
84303100400-7 = "กลับมาจริงๆ ด้วยแฮะ! นึกว่าจะไปซ่อนที่ไหน แล้วจะส่ง MOMOTALK มาบอกว่า 'หาฉันให้เจอสิคะ!' แล้วเสียอีก! "
84303100400-8 = "รุ่นพี่ไม่ได้ประชดหรอก แค่พูดตามที่คิดจริงๆ น่ะ ไม่ต้องคิดมากหรอกนะ"
84303100400-10 = "ฉันรู้ค่ะ รู้สึกเหมือนฉันเอาแต่รบกวนทั้งสองคนเลยนะคะ ต่อไปถ้าฉันมีโอกาสแสดงความขอบคุณได้ ฉันก็จะทำอย่างแน่นอนค่ะ"
84303100400-11 = "ไม่เป็นไร ฉันไม่ได้หวังจะได้อะไรตอบแทนหรอก... ถ้าให้อะไรตอบแทน ฉันอาจจะลำบากใจก็ได้"
84303100400-12 = "งั้นต่อไปอยากไปดูอะไรล่ะ? ถ้ายังไม่มีที่ที่คิดไว้ในใจ งั้นก็ไปดูจากแถวนี้ก่อนมั้ย?"
84303100400-13 = "หรือว่าจะไปรวมกลุ่มกับนักเรียนทรีนิตี้คนอื่นก็ไม่เลวนะ แบบนั้นน่าจะปลอดภัยด้วย"
84303100400-14 = "ขอบคุณค่ะ แต่อย่างที่ฉันบอกไปว่าตอนนี้ฉันมีที่ที่สนใจเป็นการส่วนตัวค่ะ"
84303100400-15 = "พวกคุณสองคนพอจะรู้มั้ยคะว่าชมรมพัฒนาเกมอยู่ตรงไหน?"
84303100400-16 = "ชมรมพัฒนาเกมเหรอ? อ่า... ชมรมนั้นน่ะ..."
84303100400-17 = "อื้อ! ต้องรู้อยู่แล้ว!!"
84303100400-18 = "อยากไปที่นั่นเหรอ? แต่หมายถึงห้องชมรมพัฒนาเกม หรือว่าห้องสาธิตการเล่นเกมล่ะ?"
84303100400-19 = "คะ? ห้องชมรม? ห้องสาธิตการเล่นเกม...? อืม..."
84303100400-21 = "นี่คืองานเอ็กซ์โปนะ ต้องอยากไปดูห้องสาธิตการเล่นเกมอยู่แล้วสิ รุ่นพี่"
84303100400-26 = "(แย่ละสิ... น่าจะถามจากริโอะให้เจาะจงมากกว่านี้นะ)"
84303100400-27 = "(ปกติแล้วถ้าเป็นงานแบบนี้ก็ควรไปดูการสาธิตอย่างที่คุณคารินบอก แต่ก็...)"
84303100400-28 = "ขอไปที่ห้องชมรมก่อนค่ะ... ฉันมีเรื่องส่วนตัวที่อยากคุยกับคนในชมรมนั้นน่ะค่ะ"
84303100400-32 = "หืม...? ห้องชมรม? จะไปห้องชมรมจริงๆ เหรอ?"
84303100400-33 = "อ่า... หรือว่าฉันขอมากเกินไปคะ?"
84303100400-34 = "ไม่หรอก ไม่ใช่อย่างนั้น... ที่นั่นไม่น่าจะเป็นอะไรหรอก แต่ถ้าจะแวะไปที่นั่นเป็นการส่วนตัว ถ้าพวกเราติดตามไปด้วยก็คงทำให้อึดอัดเปล่าๆ"
84303100400-35 = "งั้นฉันจะบอกตำแหน่งให้แล้วกัน ห้องชมรมนั้นอยู่ไม่ไกลจากที่นี่หรอก เดินไปเดี๋ยวเดียวก็ถึงแล้วละ"
84303100400-36 = "ขอบคุณมากนะคะ แล้วฉันจะรีบกลับมาค่ะ"
84303100400-38 = "อื้อ! ไม่ต้องห่วงพวกเราหรอก พวกเราจะเดินดูอะไรอยู่แถวนี้ละ!"
84303100400-39 = "ถ้ามีเรื่องอะไรก็บอกพวกเรานะ"

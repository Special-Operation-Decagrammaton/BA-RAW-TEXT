84303100400-32 = "3;카린 교복;04;……응? 부실? 정말로 부실이었어?\n#3;stiff"
84303100400-33 = "3;세이아;02;아, 혹시 무리한 요구였을까요?"
84303100400-34 = "1;카린 교복;06;아니, 그런 건 아닌데…… 뭐. 상관은 없겠지. 개인적인 방문이라면 굳이 우리가 동행하는 것도 부담스러울 테고.\n#1;ar\n#3;m5"
84303100400-35 = "1;카린 교복;01;위치만 가르쳐줄게. 여기서 멀지 않으니까, 찾아가는 것도 금방일 거야."
84303100400-36 = "3;세이아;02;정말 감사해요. 금방 다녀오겠습니다.\n#3;greeting"

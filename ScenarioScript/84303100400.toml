84303100400-26 = "3;세이아;06;(이런…… 리오에게 조금 더 정확하게 물어볼 걸 그랬군요.)\n#3;stiff"
84303100400-27 = "3;세이아;01;(말씀대로 보통은 여기서 시연장을 말한 거겠지만……)"
84303100400-28 = "3;세이아;02;……부실부터 부탁드릴게요. 부원분들과 개인적으로 말씀드릴 것도 있고 말이에요.\n#3;em;[반응]"

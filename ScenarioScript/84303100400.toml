[translation]
84303100400-6 = "電話講完了嗎？"
84303100400-7 = "居然真的回來了耶！#n我還以為你會躲起來，用MomoTalk傳訊息說「來找我吧！」呢！"
84303100400-8 = "……他這麼說並不是在諷刺你，單純就是字面上的意思而已。#n還請你不要想太多。"
84303100400-10 = "我知道。我畢竟也給兩位添了許多麻煩。#n希望日後能有機會報答。"
84303100400-11 = "不是，我也沒有這個意思……要是真的那樣會讓我有點為難。"
84303100400-12 = "總之，你現在想去哪裡看看呢？#n如果還沒決定的話，要不要從附近開始逛？"
84303100400-13 = "或者也可以加入其他三一學生的行列。這樣也比較安全。"
84303100400-14 = "謝謝。不過就像你說的一樣，我個人對某個地方頗有興趣。"
84303100400-15 = "兩位知道遊戲開發部在什麼地方嗎？"
84303100400-16 = "遊戲開發部？啊啊，那裡是……"
84303100400-17 = "嗯！當然知道！！"
84303100400-18 = "不過為什麼要去那裡？#n還有你指的是遊戲開發部的部室，還是遊戲展示場呢？"
84303100400-19 = "嗯？部室？展示場……？#n唔嗯……"
84303100400-21 = "現在是博覽會期間，他當然是在說展示場啊，前輩。"
84303100400-26 = "（糟糕……早知道就跟莉央問得詳細一點了）"
84303100400-27 = "（雖然他們說的也有道理，一般都會想到展示場……）"
84303100400-28 = "……請先帶我去部室吧。#n我有點私事想跟他們的成員說。"
84303100400-32 = "……嗯？部室？真的是部室嗎？"
84303100400-33 = "啊，這個請求會太過分嗎？"
84303100400-34 = "不，那倒不至於……應該沒關係吧。#n如果是私事的話，我們要是同行感覺會造成你們的壓力。"
84303100400-35 = "我把位置告訴你吧。#n離這裡不遠，應該很快就能找到。"
84303100400-36 = "感激不盡。那我快去快回。"
84303100400-38 = "嗯！不用放在心上，我們也會到處逛逛的！"
84303100400-39 = "有什麼事就馬上告訴我們吧。"

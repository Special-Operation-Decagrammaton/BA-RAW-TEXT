[translation]
84303100400-6 = "Are you done with your call?"
84303100400-7 = "Ah, great, you're back! I thought you were going to hide somewhere and send a MomoTalk telling us to come find you!"
84303100400-8 = "...She doesn't mean that in a bad way. That's literally what she thought was happening."
84303100400-10 = "I know. I must be giving you both headaches, to say the least. Next time, I'll find a way to make it up to you."
84303100400-11 = "No, we're not doing this to get rewarded...and actually, if you did give us anything, that'd probably just cause more issues."
84303100400-12 = "Anyway, where do you plan on looking around next? If you don't have any plans, we could start around here."
84303100400-13 = "Or we can join the other Trinity students. That'd be easier. Probably safer, too."
84303100400-14 = "I appreciate the suggestion, but I do have somewhere else I'm interested to go."
84303100400-15 = "Do you two happen to know where the Game Development Department is?"
84303100400-16 = "Game Development Department? Ahh. That place..."
84303100400-17 = "Yeah! Of course I know!"
84303100400-18 = "But why do you want to go? And do you mean the Game Development Department club room, or the game exhibition hall?"
84303100400-19 = "Huh? Club room? Exhibition Hall...? Hm..."
84303100400-21 = "It's the Expo. Of course she's asking about the Exhibition Hall."
84303100400-26 = "(Ah...I should have asked Rio for more details.)"
84303100400-27 = "(The Exhibition Hall would make the most sense, in context, but...)"
84303100400-28 = "...I'd like to visit the club room first. I have something personal to talk to the club members about."
84303100400-32 = "...Huh? The club room? You really want to go there?"
84303100400-33 = "Ah, was that too much of an ask?"
84303100400-34 = "No, it's not like that... Well, I guess it doesn't matter. If it's a personal visit, then we probably shouldn't crowd you."
84303100400-35 = "Let me give you directions. It's actually not that far."
84303100400-36 = "Thank you. I'll be right back."
84303100400-38 = "Yeah! Don't worry about us. We'll just be hanging around!"
84303100400-39 = "Let us know if anything comes up."

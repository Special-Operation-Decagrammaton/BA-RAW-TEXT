84303100400-5 = "5;아스나 교복;08\n1;카린 교복;01\n#5;a\n#1;a\n#5;h\n#1;h\n#wait;1000"
84303100400-6 = "5;아스나 교복;08\n1;카린 교복;02;통화 끝난 거야?\n#1;em;[?]"
84303100400-7 = "5;아스나 교복;03;진짜로 돌아왔네! 어딘가 숨어서 '자 이제 찾아봐요!'라고 모모톡 보낼 줄 알았는데!\n#5;jump"
84303100400-8 = "1;카린 교복;06;……비꼬는 게 아니라 진짜 순수한 의도야. 제발 그대로 받아들여 줘.\n#1;stiff"
84303100400-9 = "#all;hide"
84303100400-10 = "3;세이아;01;알고 있어요. 두 분께는 계속해서 폐를 끼치고 있네요. 다음에 사례라도 할 수 있다면 반드시 해드리고 싶습니다.\n#3;a"
84303100400-11 = "1;카린 교복;04;아니, 그런 걸 바라는 건 아니니까……. 진짜 줘도 곤란해지고.\n#1;ar\n#3;m5"
84303100400-12 = "1;카린 교복;02;아무튼 그래서, 이제부터는 어디를 볼 생각이야? 따로 생각해 둔 곳이 없다면, 근처부터 돌아보도록 할까."
84303100400-13 = "1;카린 교복;01;아니면 다른 트리니티 학생들의 대열에 합류하는 것도 나쁘지 않겠지. 안전하기도 하고."
84303100400-14 = "3;세이아;03;감사해요. 하지만 말씀하셨던 대로, 지금은 개인적으로 흥미가 있는 곳이 따로 있어요.\n#3;greeting"
84303100400-15 = "3;세이아;02;두 분은 혹시 게임개발부가 어딘지 알고 계신가요?\n#3;em;[?]"
84303100400-16 = "1;카린 교복;02;게임개발부? 아아. 거긴……."
84303100400-17 = "5;아스나 교복;03;응! 당연히 알고 있지!!\n#5;al\n#1;dl\n#3;m1\n#5;hophop"
84303100400-18 = "5;아스나 교복;02;그런데 거기는 왜? 게임개발부 부실을 말하는 거야, 게임 시연장을 말하는 거야?\n#5;em;[반응]"
84303100400-19 = "3;세이아;04;네? 부실? 시연장……? 음……\n#3;stiff"
84303100400-20 = "#all;hide"
84303100400-21 = "3;카린 교복;06;아니, 엑스포 중이니까 지금은 당연히 시연장을 물어보는 거잖아. 선배.\n#3;em;[한숨]"

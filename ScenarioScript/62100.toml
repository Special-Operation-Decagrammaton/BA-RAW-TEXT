[translation]
62100-1 = "第10話;巢穴"
62100-3 = "拜託了，沙織前輩！請你回去吧！"
62100-4 = "我們接到命令要看好這裡！不能讓任何人進來！"
62100-6 = "一味的對立，沒辦法改變任何事！"
62100-7 = "我知道你們不喜歡我們……可是，還是希望你們可以讓出路來！"
62100-8 = "我們只是……來和拒絕上課的梯昴談談而已！"
62100-9 = "況且這裡本來不就是不允許任何人出入的地方嗎！"
62100-11 = "這，這倒是沒錯……！"
62100-12 = "怎麼辦……？"
62100-13 = "可是昴前輩他……說要守好這裡。"
62100-14 = "其實好像只有說要築起陣地而已……"
62100-15 = "但他也有說要防範來自內外的攻擊，意思應該差不多吧！"
62100-16 = "總之還是請回吧！#n否則我們也只能選擇開火──"
62100-21 = "是，是誰！？"
62100-22 = "啊，抱歉……我一聽到開火就……"
62100-27 = "……開槍了嗎。"
62100-28 = "沒錯，確實開了。"
62100-29 = "雖然本來就覺得事情會變成這樣……"
62100-31 = "沒，沒問題嗎！？#n人數的差距這麼大……"
62100-32 = "不必擔心。"
62100-33 = "請問有什麼根據嗎！？"
62100-35 = "根據啊……"
62100-36 = "果然還是直接給你看比較快吧？"
62100-37 = "麻煩你了，老師。"
62100-38 = "[s]「為什麼每次關鍵的時候都是這種結論！」"
62100-39 = "這……"
62100-41 = "從某種角度來說，這就是奧利斯的作風吧？"

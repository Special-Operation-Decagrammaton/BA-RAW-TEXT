[translation]
62100-1 = "Episode 10;Nest"
62100-3 = "Please, Saori! Please, go back!"
62100-4 = "We were ordered to guard this place! We're not allowed to let anyone enter!"
62100-6 = "Fighting now will change nothing!"
62100-7 = "I understand how you feel about us, but we still ask that you clear the way!"
62100-8 = "We only wish to speak with Kakehashi Subaru, who skipped class today!"
62100-9 = "In fact, none of you should be here to begin with!"
62100-11 = "Th-That's true, but...!"
62100-12 = "What do we do...?"
62100-13 = "Still, Subaru...told us to secure the area."
62100-14 = "I think she just told us to set up a camp..."
62100-15 = "She said don't let anyone in or out! That's basically the same thing!"
62100-16 = "Okay, yeah! That's why you have to go back! Otherwise, we'll have to open fire—"
62100-21 = "Wh-Who was that?!"
62100-22 = "Ah, sorry... I heard someone say \"open fire\"..."
62100-27 = "...She fired."
62100-28 = "Yep. Definitely fired."
62100-29 = "Here we go AGAIN..."
62100-31 = "A-Are you sure about this?! We're really, super outnumbered..."
62100-32 = "Don't worry."
62100-33 = "Why are you NOT worried?!"
62100-35 = "Why...?"
62100-36 = "I believe a teacher would say, \"Show, don't tell,\" correct?"
62100-37 = "We'll leave it to you, Sensei."
62100-38 = "[s] \"Why do we ALWAYS solve things with fighting?!\""
62100-39 = "Because..."
62100-41 = "That's the Arius way, in a sense?"

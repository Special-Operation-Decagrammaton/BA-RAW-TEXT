[translation]
62100-1 = "ตอนที่ 10;รัง"
62100-3 = "ขอร้องละค่ะ รุ่นพี่ซาโอริ! ช่วยกลับไปเถอะค่ะ!"
62100-4 = "พวกฉันได้รับคำสั่งให้คุ้มกันที่นี่ค่ะ! ต้องไม่ให้ใครเข้ามาเด็ดขาดค่ะ!"
62100-6 = "ถ้าเอาแต่ขัดแย้งกัน ก็ไม่มีอะไรเปลี่ยนแปลงหรอก!"
62100-7 = "ฉันรู้ว่าพวกเธอไม่พอใจพวกฉันเท่าไร... แต่ยังไงก็ช่วยเปิดทางให้ทีเถอะ!"
62100-8 = "พวกฉันแค่... มาคุยกับคาเกฮาชิ สุบารุที่ปฏิเสธชั้นเรียนก็เท่านั้น!"
62100-9 = "และที่นี่ก็เป็นที่ที่ไม่มีใครได้รับอนุญาตให้เข้าไปตั้งแต่แรกอยู่แล้วด้วย!"
62100-11 = "มะ... มันก็จริงอยู่หรอกนะ...!"
62100-12 = "ทำยังไงดีล่ะ...?"
62100-13 = "แต่ว่ารุ่นพี่สุบารุ... สั่งให้เราเฝ้าที่นี่ไว้นะ"
62100-14 = "คำสั่งคือให้สร้างฐานที่มั่นเฉยๆ ไม่ใช่เหรอ..."
62100-15 = "รุ่นพี่บอกว่าไม่ให้เราออกไปข้างนอก ไม่ให้ใครเข้ามาข้างใน ถ้างั้นก็เหมือนกันนั่นละ!"
62100-16 = "ช่วยกลับไปเถอะค่ะ! ถ้างั้นพวกฉันก็คงต้องยิง..."
62100-21 = "คะ... ใครน่ะ?!"
62100-22 = "อ๊ะ ขอโทษที... พอดีพวกเราได้ยินคำว่ายิงน่ะ..."
62100-27 = "ลั่นไกแล้วเหรอ..."
62100-28 = "อื้อ ลั่นไกไปแล้ว"
62100-29 = "กะไว้แล้วเชียวว่าต้องเป็นแบบนี้..."
62100-31 = "จะ... จะไม่เป็นไรเหรอคะ?! จำนวนเราต่างกันมากเลยนะคะ..."
62100-32 = "ไม่ต้องห่วงหรอก"
62100-33 = "ทำไมถึงมั่นใจขนาดนั้นล่ะคะ?!"
62100-35 = "ทำไมถึงมั่นใจน่ะเหรอ..."
62100-36 = "ทำให้เห็นเลยน่าจะได้คำตอบเร็วกว่านะ?"
62100-37 = "ฝากด้วยนะ คุณครู"
62100-38 = "[s] \"ในเวลาสำคัญที่สุด ทำไมถึงได้ข้อสรุปแบบนี้ตลอดเลยล่ะ!\""
62100-39 = "เรื่องนั้นมัน..."
62100-41 = "ก็ในบางมุม นี่คือวิถีของอาเรียสนี่นา?"

[translation]
33240-1 = "Episode 24;Hatred That Is Not Our Own"
33240-2 = "Gah..."
33240-3 = "Shirasu...Azu...sa..."
33240-7 = "*pant*... *pant*... *pant*..."
33240-12 = "[s] \"Azusa!\""
33240-13 = "I can't move, Sensei..."
33240-16 = "..."
33240-17 = "Atsuko..."
33240-18 = "*cough* Hime... Why didn't you run away?"
33240-19 = "We've lost, Azusa."
33240-23 = "N-No, Hime! If you speak, she'll—"
33240-24 = "It's okay. It's over now."
33240-25 = "She wasn't going to let me live regardless of the outcome anyway. So it's fine."
33240-26 = "...?"
33240-27 = "Let's end things here, Saori."
33240-28 = "End...?"
33240-29 = "You can't mean returning to Arius. We'll be killed if we go back..."
33240-30 = "Then let's run away. Together."
33240-31 = "Flee...?"
33240-32 = "Yes."
33240-33 = "Azusa taught me something."
33240-34 = "The hatred we've carried for so long...is not our own."
33240-35 = "It was never ours from the beginning. It was instilled into us, and we falsely accepted it as ours."
33240-36 = "Azusa realized that before us."
33240-37 = "..."
33240-38 = "You've learned and experienced a lot while you've been gone."
33240-39 = "I can see now. You were blessed to have an excellent teacher, Azusa."
33240-40 = "And now Azusa's found somewhere she belongs."
33240-41 = "So, Saori..."
33240-42 = "...let's run away together."
33240-43 = "Away from here. Away from Arius."
33240-44 = "Away from that hatred that is not our own."
33240-45 = "But...we can't just leave like this..."
33240-48 = "Splendid. So the potential of adulthood is on display once again."
33240-49 = "Intelligence and dignity. Courtesy and conviction. Experience and wisdom...#nAll admirable qualities."
33240-50 = "Yes... You are the one. It's you..."
33240-51 = "You're the one who holds the answer to the sublime which I seek!"
33240-54 = "What's happening?"
33240-55 = "It can't be..."
33240-56 = "Has the doctrine been realized?"
33240-57 = "[s] \"(This feels like...)\""
33240-58 = "We're dealing with something beyond our level."
33240-59 = "What's going on...?"
33240-64 = "S-Sensei..."
33240-65 = "This is...bad. We have to run. We have to get away from here."
33240-66 = "[s] \"Right. Someone has stacked the deck against us.\""
33240-67 = "Sensei?"
33240-68 = "[ns1] \"I was hoping not to use this.\"\n[ns2] Reach for your wallet."
33240-73 = "Ah... That must be it!"
33240-74 = "So this is the card I've heard so much about!"
33240-75 = "Power gained in exchange for your life and time... An incomprehensible force with origins and limitations even we can't understand!"
33240-76 = "I wonder what Golconde would have called it... He'd probably say that it requires metacognition to understand it."
33240-77 = "Very well. Show me, Sensei. Show me the price you have paid."
33240-78 = "Show me power worth pawning your life over!"
33240-83 = "Respond to my work with all your might!"

[translation]
33240-1 = "第24話;誰的憎恨"
33240-2 = "唔，咕……"
33240-3 = "梓……"
33240-7 = "哈啊，哈啊，哈啊……"
33240-12 = "[ns]「梓！」"
33240-13 = "老師……"
33240-16 = "……"
33240-17 = "敦子……"
33240-18 = "咳咳！公主，為什麼沒有逃跑……"
33240-19 = "是我們輸了，梓。"
33240-23 = "不，不行，公主！說話的話，她──"
33240-24 = "沒關係，已經全都結束了。"
33240-25 = "而且無論如何，她應該也沒有打算放過我。所以，沒關係。"
33240-26 = "……？"
33240-27 = "到此為止吧，沙織。"
33240-28 = "……到此為止？"
33240-29 = "意思是回奧利斯嗎……？就算回去了，我們也只會被殺……"
33240-30 = "所以逃走吧，一起。"
33240-31 = "逃走……"
33240-32 = "嗯。"
33240-33 = "梓讓我知道了。"
33240-34 = "不知何時持有的這個……不是我們的憎恨。"
33240-35 = "這股憎恨，我們學到了。那之後一直，誤以為是我們的東西。"
33240-36 = "……梓肯定是，注意到了吧？"
33240-37 = "……"
33240-38 = "梓學習了各種事物，獲得了各種經驗……"
33240-39 = "遇到了好大人了呢，梓。"
33240-40 = "而且，找到了自己應該待的地方……"
33240-41 = "所以，沙織。"
33240-42 = "……逃走吧。"
33240-43 = "從這裡，從奧利斯。"
33240-44 = "從不知何時被植入的，不應該屬於我們的憎恨。"
33240-45 = "逃走什麼的，那種事……"
33240-48 = "真美妙……"
33240-49 = "知性和品行，禮儀和信念，還有培育起來的經驗和智慧……"
33240-50 = "果然，如果是妳的話……"
33240-51 = "一定可以理解我的「崇高」……！"
33240-54 = "這，這是……"
33240-55 = "……難道。"
33240-56 = "那個「教義」，完成了……？"
33240-57 = "[s]（這是……）"
33240-58 = "這是，水準不同……"
33240-59 = "怎麼回事……"
33240-64 = "老，老師。這是……"
33240-65 = "糟了，不逃的話……！"
33240-66 = "[s]「……看來，是作弊行為呢。」"
33240-67 = "老師……？"
33240-68 = "[ns1]「本來想在不拿出來的情況下搞定的……」\n[ns2] 拿出大人的卡片"
33240-73 = "哦哦，哦哦哦哦……！"
33240-74 = "是嗎，那就是那張「卡片」……！"
33240-75 = "將人生、時間作為代價獲得的力量……那個根源和界限，是連我們都無法掌握無解的東西……！！"
33240-76 = "啊啊，戈爾孔特的話會如何稱呼那個呢……會以什麼高次元的表現告訴我嗎……"
33240-77 = "讓我看看吧，老師。你支付的代價……"
33240-78 = "以此獲得的東西的光輝……！"
33240-83 = "以全力，回應我的作品吧！"

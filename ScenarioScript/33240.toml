[translation]
33240-1 = "ตอนที่ 24;ความเกลียดชังที่เราไม่ได้เป็นเจ้าของ"
33240-2 = "หนอย..."
33240-3 = "ชิราสึ...อา...ซึสะ..."
33240-7 = "แฮ่ก... แฮ่ก..."
33240-12 = "[ns] \"อาซึสะ!\""
33240-13 = "ฉัน...ขยับไม่ไหวแล้ว คุณครู..."
33240-16 = "..."
33240-17 = "อาสึโกะ..."
33240-18 = "แค่กๆ... องค์หญิง... ทำไม... ถึงไม่หนี..."
33240-19 = "พวกเราแพ้แล้ว อาซึสะ"
33240-23 = "มะ...ไม่ได้นะ องค์หญิง... ถ้าพูดละก็... ผู้หญิงคนนั้น..."
33240-24 = "ไม่เป็นไร ตอนนี้มันจบแล้วล่ะ"
33240-25 = "ยังไงซะผู้หญิงคนนั้นก็ไม่ได้คิดจะช่วยชีวิตฉันอยู่แล้ว ตอนนี้มันไม่สำคัญแล้วล่ะ"
33240-26 = "...?"
33240-27 = "เพราะงั้น... พวกเราหยุดเถอะนะ ซาโอริ..."
33240-28 = "หยุดงั้นเหรอ?"
33240-29 = "จะให้กลับไปอาเรียสงั้นเหรอ? กลับไปพวกเราจะถูกฆ่านะ... องค์หญิง..."
33240-30 = "อื้อ หนีไปกันเถอะ ไปด้วยกัน..."
33240-31 = "หนีงั้นเหรอ...?"
33240-32 = "อื้อ"
33240-33 = "อาซึสะทำให้ฉันเข้าใจ"
33240-34 = "ว่านี่มัน... ไม่ใช่ความแค้นของพวกเรา"
33240-35 = "มันไม่ใช่ความแค้นของพวกเราตั้งแต่แรกแล้ว พวกเราแค่ได้เรียนรู้... และได้ซึมซับมา จนเชื่อว่ามันเป็นความแค้นของเรา"
33240-36 = "อาซึสะคงจะรู้เรื่องนี้ดี"
33240-37 = "..."
33240-38 = "ความรู้ที่แท้จริงที่อาซึสะอยากจะเรียน ความรู้ที่อยากได้รับการเติมเต็ม"
33240-39 = "แบบนี้เองสินะ อาซึสะได้เจอผู้ใหญ่ที่ใจดีแล้ว"
33240-40 = "อาซึสะได้พบ <โรงเรียน> ที่เธอควรจะอยู่แล้วล่ะ"
33240-41 = "เพราะงั้นซาโอริ..."
33240-42 = "เราหนีไปกันเถอะ..."
33240-43 = "หนีไปจากอาเรียส..."
33240-44 = "และความแค้นที่ไม่ใช่ของพวกเรา..."
33240-45 = "แต่เราจะปล่อยให้เป็นแบบนี้ไม่ได้นะ..."
33240-48 = "สุดยอดจริงๆ นั่นคือผู้ใหญ่งั้นหรือ..."
33240-49 = "สติปัญญา ความเฉียบแหลม และประสบการณ์ที่สั่งสมมา... อดนับถือไม่ได้จริงๆ"
33240-50 = "แบบนี้นี่เอง ถ้าเป็นคนคนนั้น... ถ้าหากเป็นคนคนนั้นแล้วละก็..."
33240-51 = "บางทีอาจจะตอบรับ <ความสูงส่ง> ของผมก็ได้...!!"
33240-54 = "นะ...นี่มัน..."
33240-55 = "หรือว่า..."
33240-56 = "<หลักคำสอน> นั่น... เสร็จสมบูรณ์แล้ว...?"
33240-57 = "[s] (นี่มัน...)"
33240-58 = "ตอนนี้มันมีบางอย่างแตกต่างไปจากเดิม..."
33240-59 = "เกิดอะไรขึ้น..."
33240-64 = "คะ... คุณครู... นี่มัน..."
33240-65 = "นี่มันต่างออกไปจากตอนนี้... นี่มัน... ถ้าไม่รีบหนีไปละก็... แบบนี้มัน..."
33240-66 = "[s] \"รีบไปกันเถอะ มีคนลอบซ้อนแผนพวกเรา\""
33240-67 = "คุณครู..."
33240-68 = "[ns1] \"ครูไม่ได้อยากใช้มันเลยแท้ๆ\"\n[ns2] หยิบบัตรประจำตัวผู้ใหญ่ออกมา"
33240-73 = "โอ้... โอ้.... นี่มัน... นี่มัน..."
33240-74 = " <บัตร> ที่เคยได้ยินมา...!"
33240-75 = "พลังที่ได้รับมาจากการแลกเปลี่ยนด้วยชีวิตและเวลา... พลังที่ยากจะหยั่งถึงและไร้ขีดจำกัด...!!"
33240-76 = "ผมก็สงสัยอยู่เหมือนกันว่าโกลคอนดาเรียกสิ่งนั้นว่าอะไร... จะบอกว่ามันเหมือนกับเมต้า... ได้รึเปล่านะ"
33240-77 = "ยอดเยี่ยม แสดงให้ผมเห็นเลยสิ ครู! แสดงให้เห็นถึงราคาค่าแลกเปลี่ยนที่คุณต้องจ่าย...!!"
33240-78 = "แสดงพลังออกมาให้เราได้เห็น!"
33240-83 = "ตอบโต้ผลงานของผมด้วยกำลังทั้งหมดที่มี...!!"

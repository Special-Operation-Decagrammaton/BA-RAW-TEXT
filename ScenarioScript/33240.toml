[translation]
33240-1 = "第24話;誰の憎しみ"
33240-2 = "う、くっ……。"
33240-3 = "アズ、サ……。"
33240-7 = "はぁ、はぁ、はぁ……。"
33240-12 = "[ns] \"アズサ！\""
33240-13 = "先生……。"
33240-16 = "……。"
33240-17 = "アツコ……。"
33240-18 = "げほっ！姫、どうして逃げなかった……。"
33240-19 = "私たちの負けだよ、アズサ。"
33240-23 = "だ、ダメだ、姫！喋ると、彼女が――"
33240-24 = "大丈夫、もう全部終わりだから。"
33240-25 = "それにどちらにせよ、彼女は私を生かしておくつもりは無かったはず。だから、良いの。"
33240-26 = "……？"
33240-27 = "もうやめよう、サオリ。"
33240-28 = "……やめる？"
33240-29 = "アリウスに帰るということか……？帰ったところで、私たちは殺されるだけ……。"
33240-30 = "だから逃げよう、一緒に。"
33240-31 = "逃げる……。"
33240-32 = "うん。"
33240-33 = "アズサが教えてくれた。"
33240-34 = "いつからか持っていたこれは……私たちの憎しみじゃない。"
33240-35 = "この憎しみを、私たちは習った。それからずっと、私たちのものだと思い込んでいた。"
33240-36 = "……アズサはきっと、それに気づいたんでしょう？"
33240-37 = "……。"
33240-38 = "アズサは色々なことを学び、様々な経験を得た……"
33240-39 = "良い大人に出会えたんだね、アズサ。"
33240-40 = "そして、自分のいるべき場所を見つけた……。"
33240-41 = "だから、サオリ。"
33240-42 = "……逃げよう。"
33240-43 = "この場から、アリウスから。"
33240-44 = "いつの間に植え付けられた、私たちのものじゃないはずの憎しみから。"
33240-45 = "逃げるだなんて、そんな……。"
33240-48 = "素晴らしい……。"
33240-49 = "知性と品格、礼儀と信念、そして培ってきた経験と知恵……。"
33240-50 = "やはり、そなたならば……。"
33240-51 = "私の「崇高」を、理解してくれるに違いない……！"
33240-54 = "こ、これは……。"
33240-55 = "……まさか。"
33240-56 = "あの「教義」が、完成した……？"
33240-57 = "[s] （これは……）"
33240-58 = "これは、レベルが違う……。"
33240-59 = "どういうことだ……。"
33240-64 = "せ、先生。これは……。"
33240-65 = "マズい、逃げないと……！"
33240-66 = "[s] \"……どうやら、反則みたいだね。\""
33240-67 = "先生……？"
33240-68 = "[ns1] \"出さないで終わらせたかったけど……。\"\n[ns2] 大人のカードを取り出す。"
33240-73 = "おお、おおおおっ……！"
33240-74 = "そうか、あれが例の「カード」……！"
33240-75 = "人生を、時間を代価として得られる力……その根源も限界も、私たちですら把握できない不可解なもの……！！"
33240-76 = "嗚呼、ゴルコンダならあれをどう呼称しただろう……何か高次的な表現を教えてくれたのであろうか……。"
33240-77 = "見せてくれたまえ、先生。そなたが払ってきた代価を……"
33240-78 = "そうして手に入れたものの輝きを……！"
33240-83 = "私の作品に、全力で応えてくれたまえ！"

[translation]
1301203-1 = "เสียงปืนและเซอร์โคเนีย"
1301203-2 = "หน้าร้านอัญมณีขนาดใหญ่ ชิบะทาวน์"
1301203-3 = "ตู้ม! ตู้มมมม!"
1301203-5 = "อย่าเข้ามานะ! ฉันเอาจริงนะ!"
1301203-6 = "ถ้าเล่นตุกติกละก็ ฉันจะระเบิดอาคารนี้ทิ้งให้หมดเลย!"
1301203-7 = "ชะ... ช่วยด้วย!"
1301203-9 = "อาชญากรคนนี้เตรียมการมาอย่างรอบคอบเลยค่ะ พวกเขาติดตั้งระเบิดที่พร้อมจุดระเบิดได้ทุกที่#nด้วยเครื่องจุดระเบิดไร้สายไว้ด้วยค่ะ"
1301203-10 = "เราสามารถจู่โจมได้เลยถ้านี่เป็นแค่งานช่วยตัวประกัน แต่หากเผลอทำอะไรผิดจังหวะขึ้นมาละก็#nศูนย์การค้าแถวนี้จะต้องถูกระเบิดเป็นจุลแน่ค่ะ"
1301203-11 = "[s] \"เราควรรอผู้เชี่ยวชาญด้านการเจรจานะ...\""
1301203-12 = "ไม่ได้หรอกค่ะคุณครู เราไม่รู้เลยว่าคนร้ายจะหมดความอดทนเมื่อไร เราจะเสียเวลารอต่อไปไม่ได้แล้วค่ะ"
1301203-13 = "ถึงจะเห็นอย่างนั้น ฉันไม่เคยแพ้ในการเจรจาต่อรองโดนัทของสำนักรักษาความปลอดภัยเลยนะคะ"
1301203-18 = "[ns] \"แต่นี่มันต่างจากการคุยเพื่อแบ่งขนมกันกินนะ...\""
1301203-23 = "หยุดการดื้อดึงที่ไร้ความหมายเถอะค่ะ! ถ้ายอมจำนนแต่โดยดี ฉันจะรับประกันความปลอดภัยให้ค่ะ!"
1301203-24 = "อะไรเนี่ย? นักเจรจามาถึงแล้วเหรอ?"
1301203-25 = "เธอเป็นใคร? ถ้าเป็นนักเจรจาก็แสดงตัวมาซะ!"
1301203-26 = "ฉันชื่อคิริโนะ จากสำนักรักษาความปลอดภัย สถาบันฝึกตำรวจวัลคิรี่"
1301203-27 = "ฉันมาเพื่อเจรจากับคุณเพื่อช่วยตัวประกันค่ะ"
1301203-28 = "หา? สำนักรักษาความปลอดภัย? นักเจรจาจากสำนักรักษาความปลอดภัยงั้นเรอะ?#nไม่ใช่คนจากสำนักความมั่นคงหรือกรมความมั่นคงสาธารณะเหรอ?!"
1301203-29 = "อย่ามาตลก! คิดว่าฉันโง่นักหรือไง? ไปพานักเจรจาตัวจริงมาเดี๋ยวนี้!"
1301203-30 = "สะ... เสียมารยาท! เห็นอย่างนี้ฉันก็เป็นสมาชิกของสถาบันฝึกตำรวจวัลคิรี่ที่มีเกียรตินะคะ!#nอย่ามาดูถูกกันสิคะ!"
1301203-31 = "โธ่เอ๊ย ส่งเด็กน้อยจากสำนักรักษาความปลอดภัยมาทำไมเนี่ย..."
1301203-32 = "งั้นก็ช่วยไม่ได้ ไหนลองบอกข้อตกลงมาซิ แต่บอกไว้ก่อนเลยนะว่าถ้าคิดตุกติกละก็ ฉันจะกด#nเครื่องจุดระเบิดนี่ทันที!"
1301203-33 = "ดีล่ะ งั้นต่อไปก็แค่เจรจาต่อรองตามคู่มือ..."
1301203-34 = "กะ... ก่อนอื่น คุณมาก่ออาชญากรรมทำไมคะ?"
1301203-35 = "ของมันก็แน่อยู่แล้ว ก็เพราะเงินไงล่ะ!"
1301203-36 = "ให้ตายเถอะ อาทิตย์ก่อนดันถลุงเงินในคาเฟ่แมวเยอะไปหน่อย..."
1301203-37 = "ฉันเอาเงินไปซื้อลูกมาทาทาบิกับกัญชาแมวให้น้องแมวสามสีที่เพิ่งมาใหม่ จนแทบไม่เหลือเงิน#nค่าขนมสำหรับอาทิตย์นี้เลย..."
1301203-38 = "ถ้าฉันมีเงินพอใช้ก็คงไม่มาก่อเหตุอะไรแบบนี้หรอก!"
1301203-39 = "แต่มันก็เป็น... ความรับผิดชอบของคุณนี่คะ?"
1301203-41 = "หา~?!"
1301203-42 = "บ้าไปแล้วเหรอ? มาพูดจายั่วยุคนร้ายที่จับตัวประกันไว้ทำไม?!"
1301203-43 = "แต่ก็ไม่มีใครบังคับคุณให้ใช้เงินนี่คะ?"
1301203-44 = "คุณควรวางแผนการใช้จ่าย และถ้ามีรายจ่ายสูงละก็ควรไปทำงานพาร์ทไทม์หาเงินมาให้พอสิคะ"
1301203-45 = "นั่นมันก็จริงอยู่หรอก แต่ว่า..."
1301203-46 = "แต่ถึงอย่างนั้นก็เถอะ แต่การเจรจาที่ดีไม่ควรยั่วโมโหคนร้ายที่จับตัวประกันไว้ในที่เกิดเหตุสิ!"
1301203-47 = "เด็กน้อยจากสำนักรักษาความปลอดภัยก็เป็นกันซะอย่างนี้!"
1301203-49 = "อย่างนี้เองเหรอ? ขอบคุณสำหรับข้อมูลนะคะ"
1301203-50 = "[s] \"แล้วทำไมถึงได้มาเรียนเทคนิคการต่อรองจากอาชญากรล่ะเนี่ย!\""
1301203-51 = "ต่อไปก็ต้อง 'ตรวจสอบสิ่งที่คนร้ายต้องการ' อืม... อื้ม..."
1301203-52 = "แล้วคุณต้องการอะไรถึงได้จับตัวประกันเอาไว้แบบนี้ล่ะคะ?"
1301203-53 = "ถามได้ดี! ฉันต้องการเงินสดที่มีมูลค่าเท่ากับเพชรพวกนี้ รถสปอร์ตสำหรับใช้หลบหนี..."
1301203-54 = "แล้วก็ลูกมาทาทาบิที่น้องแมวชอบด้วย เอามาเยอะๆ เลย!"
1301203-55 = "แบบนั้นคงไม่ได้หรอกนะคะ..."
1301203-56 = "ว่าไงนะ? หรือจะให้ฉันเผาเครื่องเพชรที่อยู่ที่นี่ให้หมดไปเลย?!"
1301203-57 = "ฉันแค่จะบอกว่าตอนนี้การจราจรมันติดขัดมาก ถึงจะขับรถสปอร์ตไปก็คงจะหนีลำบากอยู่ดีแหละค่ะ"
1301203-58 = "แถมของที่คุณขโมยไปก็ไม่ใช่เครื่องเพชร แต่เป็นเซอร์โคเนียราคาถูกๆ ก็เท่านั้นเอง..."
1301203-59 = "ลืมข้อเรียกร้องเงินสดเพื่อแลกกับอัญมณีราคาถูกนั่นไปเถอะค่ะ ฉันว่าค่าเช่ารถสปอร์ตอาจจะ#nแพงกว่านั้นด้วยค่ะ"
1301203-61 = "บ้าจริง! นี่ฉันทำแบบนี้เพื่ออะไรกันนะ..."
1301203-66 = "ย้ากกก!"
1301203-67 = "ฮะ... เฮือก!"
1301203-69 = "คนจับตัวประกันสติหลุดไปแล้วค่ะ! เราต้องรีบทำอะไรสักอย่างแล้ว!"
1301203-70 = "[s] \"ก็เพราะเธอนั่นล่ะ\""
1301203-71 = "มะ... ไม่ใช่สักหน่อยค่ะ! อาชญากรที่ก่อเรื่องไม่ดีต่างหากล่ะคะที่เป็นคนผิดตั้งแต่แรก!"
1301203-72 = "แต่ในเมื่อเป็นแบบนี้แล้ว เราต้องรีบยิงเครื่องจุดระเบิดก่อนที่คนร้ายคิดจะจุดชนวนระเบิดค่ะ!"
1301203-73 = "เล็งไปที่มือของคนร้าย... แล้วยิง!"
1301203-84 = "อั่ก!"
1301203-85 = "อะ...อะไรเนี่ย? ยิงตัวประกันทำไม?"
1301203-87 = "อึ้ก... ยิงพลาดอีกแล้วเหรอ..."
1301203-88 = "ครั้งนี้ต้องไม่พลาดแน่ค่ะ!"
1301203-98 = "อ๊ากกก!"
1301203-99 = "อย่ายิงฉันเลย! ฉันคือตัวประกันนะ!"
1301203-100 = "อะไรของยัยเด็กคนนี้เนี่ย?!"
1301203-101 = "(นักเจรจาคนนี้เป็นอะไรเนี่ย? เอาแต่พูดยั่วโมโหฉันทั้งๆ ที่มีฉันตัวประกันอยู่ในมือ แล้วตอนนี้ยัง#nจงใจยิงตัวประกันอีก?!)"
1301203-102 = "(ปกติแล้วต้องระมัดระวังเป็นพิเศษเพราะกลัวว่าตัวประกันจะได้รับบาดเจ็บไม่ใช่หรือไง...)"
1301203-103 = "(หรือว่านี่... หมายความว่าจะไม่ยอมเจรจากับอาชญากร และไม่สนความปลอดภัยของตัวประกัน#nเลยงั้นเหรอ?)"
1301203-106 = "(จะว่าไปก็เคยได้ยินมาเหมือนกันว่าที่สถาบันฝึกตำรวจวัลคิรี่มีนักเรียนคลั่ง... ที่เอาแต่ไล่ล่าอาชญากร#nอย่างโหดร้ายโดยไม่ใส่ใจความเป็นความตายของตัวประกัน...)"
1301203-107 = "(หรือว่านักเจรจาซื่อบื่อคนนี้จะเป็นนักเรียนคลั่งคนนั้น?)"
1301203-108 = "(แย่ละ... ถ้าเป็นแบบนี้การจับตัวประกันก็คงเปล่าประโยชน์แน่ๆ เราก็คงโดนรวบตัวไปแน่ๆ!)"
1301203-110 = "กะ... ก็ได้! ยอมจำนนก็ได้!"
1301203-111 = "ฉันไม่เอาทั้งอัญมณีทั้งตัวประกันเลย... ขอแค่ไว้ชีวิตฉันก็พอ!"
1301203-113 = "เอ๋? อยู่ๆ คนร้ายก็ยอมวางเครื่องจุดระเบิดแล้วก็ปล่อยตัวประกันค่ะ"
1301203-114 = "ทำไมเกิดเปลี่ยนใจขึ้นมากะทันหันแบบนี้ล่ะคะ?"
1301203-116 = "ฮิฮิ... คงเป็นเพราะทักษะการเจรจาที่ยอดเยี่ยมของฉันแน่เลยค่ะ"
1301203-117 = "[s1] \"ครูว่าไม่น่าใช่นะ...\"\n[s2] \"มันมีบางอย่างแปลกๆ นะ...\""
1301203-118 = "ถึงอาชญากรจะเหี้ยมโหดแค่ไหน แต่ถ้าพยายามคุยด้วยความจริงใจก็จะเข้าถึงกันได้"
1301203-119 = "ถึงอาชญากรจะเหี้ยมโหดแค่ไหน แต่ถ้าพยายามคุยด้วยความจริงใจก็จะเข้าถึงกันได้"
1301203-120 = "วันนี้ก็เป็นชัยชนะของความยุติธรรมค่ะ!"
1301203-122 = "(นักเจรจาตัวจริงกับนักเรียนจากสำนักความมั่นคงมาถึงช้ากว่านั้นไม่นาน และพวกเขาก็คุมตัว#nอาชญากรไป)"
1301203-123 = "(ส่วนคิริโนะต้องไปเขียนหนังสือขอโทษเพราะทำให้ตัวประกันบาดเจ็บ...)"

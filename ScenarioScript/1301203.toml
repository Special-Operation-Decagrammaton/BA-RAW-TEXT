[translation]
1301203-1 = "槍聲與氧化鋯"
1301203-2 = "芝町．大型珠寶店前"
1301203-3 = "（咚哐────！！！）"
1301203-5 = "別靠近我！我是認真的！"
1301203-6 = "剛才的爆炸都看見了吧！要是再看到任何可疑的舉動，這次就會把這棟建築物整個炸飛！"
1301203-7 = "救，救命啊……！"
1301203-9 = "……原來如此。看似亂無章法，但犯人其實非常縝密。四處都有設置了炸彈，看來應該是能無線引爆的種類。"
1301203-10 = "如果只是要拯救人質，就算強行突破應該也沒問題……但只要一有差池，周遭一帶很可能會被炸得粉碎。"
1301203-11 = "[s] 「果然還是等待談判專家……」"
1301203-12 = "……不行，犯人的神經已經相當緊繃了。再這樣下去，不知道她還能忍到什麼時候。"
1301203-13 = "請放心吧！本官好歹在生活安全局的甜甜圈談判中從未輸過！"
1301203-18 = "[ns] 「這件事的層級不能和分點心畫上等號吧……？」"
1301203-23 = "犯人！請停止毫無意義的抵抗！乖乖投降的話，我能保障你的安全！"
1301203-24 = "什麼？談判專家已經到了嗎……？挺快的嘛……"
1301203-25 = "報上名來！你就是談判專家嗎！？"
1301203-26 = "本官是女武神警察學園生活安全局的桐乃。"
1301203-27 = "我是來和你進行談判的。"
1301203-28 = "生活安全局……？不是警備局或公安局，區區生活安全局也敢自稱談判專家……！？"
1301203-29 = "少說笑了！你以為我是笨蛋嗎？立刻帶真正的談判專家來！"
1301203-30 = "太，太失禮了吧！？雖然看起來不怎麼樣，但本官好歹也是女武神警察學園的一員吧？請好好聽我說！"
1301203-31 = "可惡，怎麼是生活安全局的小人物……"
1301203-32 = "沒辦法……沒時間了，妳來也行吧。但如果妳敢耍手段，我會立刻啟動引爆裝置，把這附近全部剷平！"
1301203-33 = "了解，請多多包涵了！……很好，現在只要依照手冊談判……"
1301203-34 = "那個……首，首先，你為何要犯罪呢？"
1301203-35 = "當然是因為錢呀！"
1301203-36 = "我上星期在貓咪咖啡廳花太多錢了……！"
1301203-37 = "因為給新來的三毛貓買太多木天蓼和貓薄荷，連這星期的伙食費都沒了……"
1301203-38 = "如果有足夠的錢，我就不會做出這種事了！"
1301203-39 = "呃……可是這，不是你自己造成的嗎？"
1301203-41 = "哈啊！？"
1301203-42 = "你，你是笨蛋嗎！？怎麼能刺激犯人啊！？"
1301203-43 = "但是並沒有人強迫你花錢，你的錢也沒有被人搶走對吧？"
1301203-44 = "消費時做好規劃，就算支出突然地增加，也只要降低後續的支出，應該就不會有什麼大問題了吧？"
1301203-45 = "是，是那樣沒錯……"
1301203-46 = "現在那些不是重點吧！？就算你說的是對的，但在現場怎麼可以刺激犯人！！這是談判的基礎吧！？"
1301203-47 = "少在那邊說教！所以我才討厭像你這種沒經驗的傢伙……！"
1301203-49 = "原來是這樣……謝謝你！我上了一課！"
1301203-50 = "[s] 「犯人竟然在教她談判技巧……」"
1301203-51 = "我看看，再來是……原來如此，是「確認犯人的要求」嗎。"
1301203-52 = "下一個問題，請問你有什麼要求呢？為什麼會需要挾持人質呢？"
1301203-53 = "問得好！我要求和這些鑽石一樣價值的現金、逃走時要開的跑車，還有……"
1301203-54 = "還有大量的「木天蓼果實」！以上就是我的要求！"
1301203-55 = "我覺得這要求不太好。"
1301203-56 = "你，你說什麼！？就算這裡的鑽石全都被燒毀也沒關係嗎！？"
1301203-57 = "不，我不是那個意思，只是因為目前交通有幾處雍塞路段。而且這附近的交通規劃上跑車會有很多無法通行的地方，用這種方式會難以逃走。"
1301203-58 = "而且你手上抓的那些並不是鑽石，而是價值低廉的氧化鋯……我能理解你想將寶石換成現金的想法，但明確指示要多少金額應該會比較好。"
1301203-59 = "恐怕一台跑車的價格還比較高喔。"
1301203-61 = "什，哈啊……！？該死，該死啊！搞什麼啊真是，怎麼每件事都不順利！？"
1301203-66 = "喵啊啊啊──！！！"
1301203-67 = "噫噫！？"
1301203-69 = "糟糕，犯人失去理智了！必須快點採取行動……！"
1301203-70 = "[s] 「基本上都是桐乃的錯……」"
1301203-71 = "沒，沒那回事！就算我有犯什麼錯，追根究柢現在犯錯犯最多的應該是那位犯人才對！"
1301203-72 = "事到如今……只能趁犯人引爆炸彈之前，奪走引爆裝置了！"
1301203-73 = "瞄準犯人的手……進行狙擊！喝！"
1301203-84 = "呃啊！？"
1301203-85 = "什……！？不是我，而是射人質！？"
1301203-87 = "呃……我又打偏了……"
1301203-88 = "這次一定……！"
1301203-98 = "呃啊！？"
1301203-99 = "為，為什麼……！？我是人質啊！？"
1301203-100 = "現，現在這到底是什麼情形啊……！？"
1301203-101 = "（這傢伙是怎樣！？先是處處惹火我，現在還開槍射人質！？）"
1301203-102 = "（現在這狀況一般來說，都是害怕人質受傷而無法開槍才對啊……！）"
1301203-103 = "（難道……是想要表達就算人質發生任何閃失，也不肯在談判上讓步的意思嗎！？）"
1301203-106 = "（對了，我曾經聽說過……女武神警察學園有個完全不在乎人質安危，#n　只會一昧追擊犯罪者到天涯海角的「狂犬」……）"
1301203-107 = "（難道……這傢伙就是那個「狂犬」嗎！？）"
1301203-108 = "（真是如此那我就完了……！代表目前為止她都只是在玩，一定是在裝傻。之後她要是認真起來，我下場一定會比現在還慘！）"
1301203-110 = "我，我知道了……！"
1301203-111 = "不管是人質或寶石我都不要了……拜託請饒我一命！"
1301203-113 = "……？犯人怎麼突然釋放人質了……？"
1301203-114 = "還放下引爆裝置了……是有什麼心境上的轉變嗎？"
1301203-116 = "這是……原來如此，果然是因為本官的心意讓犯人敞開心房了對吧！"
1301203-117 = "[s1] 「是……嗎？」\n[s2] 「算了，狀況能平靜下來就好……」"
1301203-118 = "面對任何犯罪者，只要嘗試真心交談，就能敞開對方的心房……"
1301203-119 = "面對任何犯罪者，只要嘗試真心交談，就能敞開對方的心房……"
1301203-120 = "也就是說，是正義的勝利！"
1301203-122 = "（後來，稍晚抵達的談判專家和警備局的學生逮捕了犯人，事件正式獲得解決了）"
1301203-123 = "（……另一方面，桐乃因為射傷人質而寫了悔過書）"

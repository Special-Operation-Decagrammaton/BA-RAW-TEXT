1301203-41 = "2;퍼그 인질;01\n5;키리노;02\n1;헬멧단 인질범;01;하아~?!\n#fontsize;80\n#1;stiff\n#1;em;[빠직]"
1301203-42 = "2;퍼그 인질;01\n5;키리노;02\n1;헬멧단 인질범;01;넌 바보냐! 인질범을 자극하면 어쩌자는 거야?!\n#fontsize;80\n#1;hophop"

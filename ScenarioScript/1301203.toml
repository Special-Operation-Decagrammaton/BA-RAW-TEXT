[translation]
1301203-1 = "Gunfire and Zirconia"
1301203-2 = "Shiba Town Jeweler"
1301203-3 = "*boom*"
1301203-5 = "Don't come any closer! I mean it!"
1301203-6 = "Do anything suspicious, and this one's a goner!"
1301203-7 = "S-Save me!"
1301203-9 = "They have the upper hand. All of the bombs they planted can be set off from anywhere with that wireless detonator of theirs."
1301203-10 = "We could risk it if that hostage was our only concern, but the slightest mistake could destroy the entire nearby shopping center."
1301203-11 = "[s] \"Maybe we should wait for the professional negotiator.\""
1301203-12 = "There's no time for that. The culprit could run out of patience at any moment. We have to begin the negotiations now."
1301203-13 = "Besides, I've never once lost a donut negotiation at the Public Safety Bureau!"
1301203-18 = "[ns] \"Isn't this a little different than fighting over snacks?\""
1301203-23 = "Stop resisting! All you have to do is surrender and your safety is guaranteed!"
1301203-24 = "What was that? Did a negotiator arrive already?"
1301203-25 = "Who are you? Identify yourself immediately!"
1301203-26 = "I'm Kirino, from the Public Safety Bureau of Valkyrie Police School!"
1301203-27 = "I'm here to negotiate with you for the hostage."
1301203-28 = "The Public Safety Bureau? Not the Security Bureau or the Public Peace Bureau? What are they doing sending someone like you?!"
1301203-29 = "Do you think I'm some kind of idiot?! Stop joking around and get a real negotiator in here!"
1301203-30 = "E-Excuse you! I may be from Public Safety, but I'm still a respectable member of Valkyrie!"
1301203-31 = "Damn it. What am I supposed to do with a little runt like this?"
1301203-32 = "Guess I don't have a choice. Spill it already. Say what you gotta say, but if I see you planning anything funny, I'll blow this place sky high!"
1301203-33 = "Good. Now I just need to follow the manual and proceed with the negotiations..."
1301203-34 = "F-For starters, what caused you to commit this crime in the first place?"
1301203-35 = "Money, of course!"
1301203-36 = "I splurged way too much at the cat cafe last week..."
1301203-37 = "This week's food expenses have been low because I was buying silver vine fruit and catnip for the new calico that came in."
1301203-38 = "I wouldn't have done this if only I had money!"
1301203-39 = "But that's...your responsibility, isn't it?"
1301203-41 = "Huh?!"
1301203-42 = "Are you an idiot?! Are you trying to provoke someone with a hostage?!"
1301203-43 = "Nobody forced you to spend money like that, did they?"
1301203-44 = "You should spend responsibly, and if your expenditures are too high, then take on a part-time job."
1301203-45 = "Th-That's true, but..."
1301203-46 = "But it doesn't matter! Everyone knows you don't provoke someone with a hostage at the scene of a crime!"
1301203-47 = "This is why Public Safety Bureau runts are...!"
1301203-49 = "You've got a good point too. Let me note that down."
1301203-50 = "[s] \"Are you taking notes on how to negotiate from the criminal?\""
1301203-51 = "And after that I have...\"Check if the criminal has any demands.\" Hmm."
1301203-52 = "Do you have any demands in exchange for that hostage?"
1301203-53 = "Glad you asked! My demands are cash to equal the value of these diamonds here, and a sports car to use for my getaway."
1301203-54 = "And also copious amounts of silver vine fruit!"
1301203-55 = "That's going to be hard to do..."
1301203-56 = "What? How come?! Don't you care if all of the diamonds here get blown into oblivion?!"
1301203-57 = "Well, due to traffic congestion, cars will be difficult to access. Even if we got you a sports car, it'd be hard for you to escape."
1301203-58 = "Furthermore, the things you stole aren't diamonds. You have a bunch of cheap zirconia, so..."
1301203-59 = "Forget the cash you'll get from exchanging the jewels. It might be more cost-efficient to just rent a sports car."
1301203-61 = "Damn it! Then why the heck am I doing this...?"
1301203-66 = "GAHHH!"
1301203-67 = "H-Huh?"
1301203-69 = "They're going berserk! I have to do something right away!"
1301203-70 = "[s] \"You're the one that caused this, Kirino.\""
1301203-71 = "N-Not true! It's the criminal who's bad here!"
1301203-72 = "There's no other choice. We'll have to shoot the detonator before the culprit can set off the bomb."
1301203-73 = "Aiming at the culprit's hand... Fire!"
1301203-84 = "UAAAH!"
1301203-85 = "Wh-What was that for? Why would you shoot the hostage instead of me?"
1301203-87 = "Ugh... I missed again."
1301203-88 = "But not this time!"
1301203-98 = "Ack!"
1301203-99 = "S-Stop shooting me! I'm the hostage!"
1301203-100 = "What is WITH this girl...?"
1301203-101 = "(This is the worst negotiation I've ever seen. She keeps provoking me, and now she's shooting the hostage.)"
1301203-102 = "(It's more common that the negotiator freezes up from fear of potentially hurting the hostage...)"
1301203-103 = "(Wait. Is this her way of showing that the she has no intention of negotiating, no matter what happens to the hostage?)"
1301203-106 = "(This reminds me. They say there's some crazy runt at Valkyrie Police School who apparently doesn't care about the safety of hostages and viciously chases after culprits.)"
1301203-107 = "(Don't tell me this air-headed negotiator is THAT psychopath!)"
1301203-108 = "(This is going to end terribly before I can even get anything out of taking this hostage at this rate.)"
1301203-110 = "A-All right! I-I surrender!"
1301203-111 = "I'll give up the pug, the jewels, all of it... Please spare me!"
1301203-113 = "Huh? The culprit suddenly dropped the detonator and released the hostage."
1301203-114 = "Did they have some kind of change of heart?"
1301203-116 = "It must have been because of my excellent negotiation skills!"
1301203-117 = "[s1] \"I don't think that's it...\"\n[s2] \"Something feels off...\""
1301203-118 = "Sometimes all someone needs is a heartfelt conversation, even if they are a hardened criminal."
1301203-119 = "Sometimes all someone needs is a heartfelt conversation, even if they are a hardened criminal."
1301203-120 = "Today was a victory for justice!"
1301203-122 = "The professional negotiator eventually arrived and the Security Bureau students safely arrested the criminal."
1301203-123 = "Meanwhile, Kirino wrote a letter of apology for injuring the hostage."

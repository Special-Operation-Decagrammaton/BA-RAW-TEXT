1301203-53 = "2;퍼그 인질;01\n5;키리노;09\n1;헬멧단 인질범;01;잘 물어보았다! 내가 요구하는 것은 여기 있는 다이아몬드와 같은 가치의 현금과, 도주에 사용할 스포츠카……."

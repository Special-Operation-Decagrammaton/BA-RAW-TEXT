1301203-44 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;08;소비는 계획적으로 하고, 지출이 심한 달에는 아르바이트를 했더라면 돈이 부족할 일은 없었을 텐데요."
1301203-45 = "2;퍼그 인질;01\n5;키리노;08\n1;헬멧단 인질범;01;그, 그건 그렇지만…….\n#1;em;[땀]"

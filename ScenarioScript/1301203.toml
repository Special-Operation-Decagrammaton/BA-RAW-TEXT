1301203-9 = "3;키리노;09;대단히 용의주도한 범죄자로군요. 곳곳에 무선 기폭 장치로 폭파할 수 있는 폭탄이 설치되어 있습니다.\n#3;em;[땀]\n#3;stiff\n#3;a"
1301203-10 = "3;키리노;09;퍼그 인질을 구하는 일뿐이라면 돌격을 감행해도 상관없겠지만…… 자칫했다가는 인근의 상가가 모두 폭발에 휘말릴지도 모르겠습니다."
1301203-11 = "[s] \"역시 전문 교섭인을 기다리는 편이…….\""
1301203-12 = "3;키리노;05;아뇨. 범인의 인내력이 언제 바닥날지 모르는 상황. 교섭은 조금도 지체할 수는 없습니다.\n#3;em;[반응]"
1301203-13 = "3;키리노;08;게다가 이래 봬도 본관은 생활안전국의 도넛 협상에서 한 번도 밀려본 적이 없거든요!\n#3;hophop\n#3;em;[반짝]"

1301203-23 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;05;무의미한 저항은 그만두세요! 순순히 투항한다면 안전을 보장하겠습니다!\n#5;em;[!]"
1301203-24 = "2;퍼그 인질;01\n5;키리노;05\n1;헬멧단 인질범;01;뭐지? 벌써 교섭인이 도착한 건가?\n#1;em;[?]"
1301203-25 = "2;퍼그 인질;01\n5;키리노;05\n1;헬멧단 인질범;01;네 녀석은 누구냐? 교섭인이라면 당장 신분을 밝혀!\n#1;hophop"
1301203-26 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;08;본관은 발키리 경찰학교, 생활안전국의 키리노라고 합니다.\n#5;em;[반응]"
1301203-27 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;05;당신과 교섭하여 인질을 구출하기 위해 이 자리에 왔습니다."
1301203-28 = "2;퍼그 인질;01\n5;키리노;05\n1;헬멧단 인질범;01;뭐? 생활안전국? 경비국이나 공안국이 아니라 생활안전국에서 교섭인을 보냈다고?!\n#1;em;[?]"
1301203-29 = "2;퍼그 인질;01\n5;키리노;05\n1;헬멧단 인질범;01;웃기지 마! 나를 바보로 아는 거야? 당장 제대로 된 교섭인을 데려와!\n#1;hophop\n#1;em;[빠직]"
1301203-30 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;08;시, 실례네요! 이래 봬도 본관은 어엿한 발키리 경찰학교의 일원이라고요? 무시하지 말아주세요!\n#5;em;[빠직]"
1301203-31 = "2;퍼그 인질;01\n5;키리노;08\n1;헬멧단 인질범;01;젠장, 어째서 생활안전국의 조무래기가…….\n#1;em;[속상함]\n#1;stiff"
1301203-32 = "2;퍼그 인질;01\n5;키리노;08\n1;헬멧단 인질범;01;할 수 없지. 협상안을 말해봐. 하지만 엉뚱한 수작을 보이려는 것 같으면 바로 이 기폭 장치를 터트릴 줄 알아!"
1301203-33 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;05;좋았어. 이제 매뉴얼에 따라 교섭을 진행하면…….\n#5;em;[...]"
1301203-34 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;09;우, 우선 당신은 어째서 범행을 저지른 건가요?\n#5;em;[?]"
1301203-35 = "2;퍼그 인질;01\n5;키리노;09\n1;헬멧단 인질범;01;그야 당연히 돈 때문이지!\n#1;em;[!]"
1301203-36 = "2;퍼그 인질;01\n5;키리노;09\n1;헬멧단 인질범;01;젠장, 지난주에는 고양이 카페에서 너무 많은 돈을 탕진하고 말았어…….\n#1;stiff\n#1;em;[속상함]"
1301203-37 = "2;퍼그 인질;01\n5;키리노;09\n1;헬멧단 인질범;01;새로 들어온 삼색 고양이에게 개다래 열매와 캣닙을 사주느라 이번 주 식비가 곤궁해져서……."
1301203-38 = "2;퍼그 인질;01\n5;키리노;09\n1;헬멧단 인질범;01;나도 돈만 충분했다면 이런 귀찮은 일은 저지르지 않았을 거라고!\n#1;hophop"

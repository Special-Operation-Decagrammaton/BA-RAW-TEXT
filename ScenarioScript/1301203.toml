1301203-56 = "2;퍼그 인질;01\n5;키리노;05\n1;헬멧단 인질범;01;뭐? 어째서! 이곳에 있는 다이아몬드가 모두 불타도 상관없다는 거냐?!\n#1;em;[빠직]\n#1;hophop"
1301203-57 = "2;퍼그 인질;01\n1;헬멧단 인질범;01\n5;키리노;02;그렇다기보다는 교통 정체 때문에 차량 접근이 어려워서요. 스포츠카를 타더라도 도망치기는 어려울 겁니다.\n#5;em;[반응]"

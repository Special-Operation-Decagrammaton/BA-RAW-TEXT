[translation]
13320-1 = "第32話;唯一的真相（２）"
13320-3 = "雷帝的兵器雖然很難對付……不過對策委員會和老師會想辦法處理的。"
13320-4 = "確定蘇芳的安全之後，老師就會到這裡來。#n你只要在這裡乖乖等著就行了。"
13320-5 = "你也很清楚，這些問題遲早會迎刃而解，小鳥遊星野。"
13320-9 = "……"
13320-10 = "說的你好像什麼都知道似的，風紀委員長醬。"
13320-12 = "……我說的沒錯吧？"
13320-13 = "把話說得那麼好聽……但這個世界上還是有無法解決的事。"
13320-14 = "……"
13320-15 = "已經死去的人不可能回來。"
13320-16 = "已經發生的事不可能推翻。"
13320-17 = "夢前輩死去的事實絕對不會改變。"
13320-18 = "這……"
13320-19 = "為什麼……"
13320-20 = "夢前輩為什麼非死不可……？"
13320-21 = "到底是從哪裡出了差錯……？#n以至於前輩不得不落得那種下場……？"
13320-22 = "為什麼……？"
13320-23 = "（……情況不太對勁。難道是……看到幻影了嗎？）"
13320-24 = "手冊呢……？"
13320-25 = "手冊……？"
13320-30 = "到底在哪裡？"
13320-31 = "夢前輩在上面寫了什麼？"
13320-32 = "前輩說的「那裡」到底是哪裡……？"
13320-33 = "……？"
13320-34 = "我永遠都沒辦法知道手冊上寫了什麼嗎……？"
13320-35 = "（星野的狀態有點奇怪）"
13320-37 = "哦哦，就差一點，就差一點點了……！！"
13320-38 = "現在老師不在……沒有人會來礙事。"
13320-39 = "我們對「死亡」這絕對的真相一無所知。"
13320-40 = "小鳥遊星野永遠無法得知梔子夢死去的真相。"
13320-41 = "手冊？那種東西更不用說！"
13320-42 = "世界上的所有人都無法得知梔子夢死亡的真相！"
13320-43 = "死亡就是這麼回事！！"
13320-52 = "而這世界上最接近那裡的人就是祢。#n奇普托斯的最高神祕──曉之荷魯斯！被拂曉束縛的太陽之神啊！"
13320-53 = "祢就是連接第六項古則答案的線索！"
13320-54 = "請告訴我吧──像祢這樣的神聖存在，如果遭遇死亡將會發生什麼！"
13320-55 = "那就是賜予我的勝利獎勵，也就是獎盃！"
13320-57 = "我所知道的真相……就只有一個……"
13320-58 = "（是啊……這是祢唯一知道的真相）"
13320-59 = "那本手冊上……或許就寫著那個真相。"
13320-60 = "（沒錯。祢不得不承認的真相……祢所期望的內容想必都寫在上面吧）"
13320-61 = "……小鳥遊星野？#n你在跟誰說話……？"
13320-64 = "學生會已經結束了！我要停止這種扮家家酒！"
13320-65 = "如果我當時沒有生氣……"
13320-68 = "你看，星野醬。#n是能像背包一樣背在背上的水壺，看起來很方便吧？要不要買一個？"
13320-69 = "不……要是我當時沒有拒絕……"
13320-72 = "來……前輩，請收下。"
13320-74 = "嗯？這是什麼？"
13320-75 = "要是我當時沒加入學生會……"
13320-78 = "等，等一下！不要逃走！！#n等等！我有話要說！"
13320-82 = "噫……！？"
13320-90 = "要是我當時沒向夢前輩伸出手……"
13320-93 = "為了改善阿拜多斯的環境，需要各位居民的簽名！"
13320-94 = "為了勸導企業，需要各位的幫助。"
13320-95 = "……"
13320-96 = "不，要是當初我沒和夢前輩相遇……"
13320-97 = "前輩……就不會死了。"
13320-105 = "啊啊……原來如此。"
13320-106 = "我總算明白了。"
13320-107 = "夢前輩──"
13320-110 = "就是被我殺死的。"
13320-115 = "是我。"
13320-116 = "是我殺死的……"
13320-125 = "是我。"

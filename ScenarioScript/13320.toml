[translation]
13320-1 = "ตอนที่ 32;ความจริงมีเพียงหนึ่งเดียว 2"
13320-3 = "อาวุธของผู้เหี้ยมโหดนั่นคงยากที่จะรับมือไหว... แต่คณะกรรมการแผนงานกับคุณครูคงหาวิธีขวางมัน#nไว้ได้"
13320-4 = "หลังจากสุโอปลอดภัยแล้ว คุณครูก็คงมาที่นี่ เพราะงั้นเธอก็รออยู่ที่นี่อย่างสงบเสงี่ยมเถอะ"
13320-5 = "เธอเองก็รู้ดีนี่ว่าปัญหาพวกนี้มันจะได้รับการคลี่คลายในที่สุด ทาคานาชิ โฮชิโนะ"
13320-9 = "..."
13320-10 = "พูดเหมือนกับว่ารู้ทุกอย่างดีไปหมดเลยนะ ประธานกรรมการวินัยจัง"
13320-12 = "แต่ก็นะ..."
13320-13 = "ถึงเธอจะพูดเหมือนคนรู้ทุกอย่าง... แต่ในโลกนี้ก็ยังมีสิ่งที่แก้ไขไม่ได้อยู่ดี"
13320-14 = "..."
13320-15 = "คนตายไปแล้วฟื้นขึ้นมาไม่ได้"
13320-16 = "และสิ่งที่เกิดขึ้นไปแล้ว ก็ไม่สามารถย้อนกลับได้"
13320-17 = "ความจริงที่รุ่นพี่ยูเมะตายไปแล้วน่ะ ยังไงมันก็ไม่เปลี่ยนแปลง"
13320-18 = "เรื่องนั้น..."
13320-19 = "ทำไมกัน...?"
13320-20 = "ทำไมรุ่นพี่ยูเมะต้องตายด้วย...?"
13320-21 = "มันเกิดเรื่องผิดพลาดตั้งแต่ตรงไหนกันแน่...? ทำไมรุ่นพี่ต้องตายอย่างน่าเวทนาแบบนั้นด้วย...?"
13320-22 = "ทำไม...?"
13320-23 = "(ดูแปลกๆ ไปแฮะ... หรือว่า... กำลังเห็นภาพหลอนอะไรอยู่?)"
13320-24 = "แล้วสมุดโน้ตล่ะ...?"
13320-25 = "สมุดโน้ต...?"
13320-30 = "มันอยู่ที่ไหนกันแน่?"
13320-31 = "แล้วรุ่นพี่ยูเมะเขียนอะไรไว้ในนั้น?"
13320-32 = "แล้ว <ตรงนั้น> ที่บอกว่าวางสมุดโน้ตไว้มันคือตรงไหน...?"
13320-33 = "...?"
13320-34 = "ฉันต้องใช้ชีวิตต่อไปโดยที่ไม่รู้ว่าในนั้นเขียนอะไรไว้งั้นเหรอ...?"
13320-35 = "(โฮชิโนะดูไม่ปกติเลย)"
13320-37 = "โอ้ อีกนิด อีกนิดเดียว...!!"
13320-38 = "ไม่มีครู ไม่มีใครมาขัดขวาง"
13320-39 = "พวกเราน่ะ ไม่รู้อะไรเลยเกี่ยวกับความจริงไร้ข้อจำกัดที่เรียกว่าความตาย"
13320-40 = "ทาคานาชิ โฮชิโนะ ไม่อาจรู้ความจริงเกี่ยวกับการตายของคุจินาชิ ยูเมะได้ตลอดกาล"
13320-41 = "ส่วนสมุดโน้ตน่ะเหรอ? ก็ไม่ต่างกันหรอก!"
13320-42 = "ไม่มีใครในโลกนี้ที่รู้เกี่ยวกับการตายของคุจินาชิ ยูเมะ!"
13320-43 = "นี่แหละความตาย!!"
13320-52 = "และเธอก็เป็นคนเดียวในโลกที่ได้เข้าใกล้สิ่งนั้นมากที่สุด ความลึกลับขั้นสุดของคิโวทอส ฮอรัสแห่งรุ่งอรุณ! เทพแห่งดวงอาทิตย์ที่ถูกมัดไว้ในยามรุ่งอรุณ!"
13320-53 = "เธอคือเบาะแสที่นำไปสู่คำตอบของกฎโบราณข้อที่ 6!"
13320-54 = "บอกกระผมหน่อยว่าถ้าสิ่งที่ศักดิ์สิทธิ์อย่างเธอได้เผชิญหน้ากับความตายแล้วจะเกิดอะไรขึ้น!"
13320-55 = "แล้วคำตอบนั้นจะเป็นรางวัลแห่งชัยชนะของกระผม!"
13320-57 = "แต่ว่า... ฉันมีความจริงอย่างหนึ่ง... ที่รู้ดี..."
13320-58 = "(ใช่แล้วละ... เธอเป็นคนเดียวที่รู้มัน)"
13320-59 = "และบางทีในสมุดโน้ตนั่น... ก็อาจจะเขียนความจริงที่ว่าไว้"
13320-60 = "(ใช่ ความจริงที่เธอไม่มีทางเลือกอื่นนอกจากยอมรับมัน... ในนั้นคงมีข้อความที่เธอต้องการอยู่สินะ)"
13320-61 = "ทาคานาชิ โฮชิโนะ? เธอกำลังพูดอยู่กับใครน่ะ...?"
13320-64 = "ตอนนี้ไม่มีสภานักเรียนอะไรนั่นแล้วค่ะ! เพราะฉันจะเลิกเล่นอะไรเหมือนเด็กเล็กๆ แบบนี้แล้ว!"
13320-65 = "ถ้าตอนนั้นฉันไม่ระบายความโกรธออกไป..."
13320-68 = "ดูนี่สิ โฮชิโนะจัง นี่เป็นขวดน้ำที่สะพายไว้ข้างหลังเหมือนสะพายเป้น่ะ ดูสะดวกดีเนอะ? ซื้อสักขวดมั้ย?"
13320-69 = "ไม่สิ... ถ้าตอนนั้นฉันยอมให้รุ่นพี่ซื้อขวดน้ำนั่นละก็..."
13320-72 = "นี่ค่ะรุ่นพี่ รับไปสิคะ"
13320-74 = "หืม? นี่มันอะไรเหรอ?"
13320-75 = "ถ้าตอนนั้นฉันไม่สมัครเข้าสภานักเรียน..."
13320-78 = "ระ... รอด้วย! อย่าหนีสิ!! เดี๋ยวก่อน! ฉันมีเรื่องคุยด้วยนะ!"
13320-82 = "อะ... อ้าย?!"
13320-90 = "ถ้าตอนนั้นฉันไม่เข้าไปช่วยรุ่นพี่ยูเมะละก็..."
13320-93 = "นี่คือการลงชื่อเพื่อการปรับปรุงสภาพแวดล้อมของอะบิดอสค่ะ!"
13320-94 = "เราต้องการความช่วยเหลือจากทุกคนเพื่อไปโน้มน้าวกลุ่มธุรกิจค่ะ!"
13320-95 = "..."
13320-96 = "ไม่สิ ถ้าฉันไม่ได้เจอรุ่นพี่ยูเมะตั้งแต่แรก..."
13320-97 = "รุ่นพี่ก็คง... ไม่ต้องตาย"
13320-105 = "อา... อย่างนี้นี่เองสินะ"
13320-106 = "ตอนนี้ฉันเข้าใจแล้วละ"
13320-107 = "รุ่นพี่ยูเมะน่ะ"
13320-110 = "ถูกฉันฆ่าตายจริงๆ"

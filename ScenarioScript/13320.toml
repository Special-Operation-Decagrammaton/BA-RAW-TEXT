13320-1 = "Episode 32;One Truth 2"
13320-3 = "The Tyrant Emperor's weapon will be difficult to handle, but...Sensei and the Foreclosure Task Force will manage somehow."
13320-4 = "Sensei will secure Suou, then rendezvous with us here. Your only job from here on out is to wait quietly."
13320-5 = "You must know...things will work out, Takanashi Hoshino."
13320-9 = "..."
13320-10 = "You act like you know everything, Head Prefect."
13320-12 = "...But you see..."
13320-13 = "...you think you have all the answers...but there are things in this world that can't be worked out."
13320-14 = "..."
13320-15 = "You can't bring the dead back to life."
13320-16 = "And you can't undo what's already been done."
13320-17 = "The fact that Yume is dead will never change. Ever."
13320-18 = "That's..."
13320-19 = "Why...?"
13320-20 = "Why did Yume have to die...?"
13320-21 = "Where did things go wrong? Why did Yume have to meet such a tragic end...?"
13320-22 = "Why...?"
13320-23 = "(...Something's off. It's as if she's looking past me...at something not there...)"
13320-24 = "...What about the notebook?"
13320-25 = "Notebook...?"
13320-30 = "Where could it be?"
13320-31 = "And what did Yume write in there?"
13320-32 = "Where is this supposed place she left the notebook...?"
13320-33 = "...?"
13320-34 = "Will I live the rest of my life, never knowing what she wrote in there?"
13320-35 = "(There's something wrong with Hoshino.)"
13320-37 = "Ah! Ah! Just a little more, a little push...!"
13320-38 = "Sensei is not present. No one can meddle."
13320-39 = "We know naught about the absolute truth that is death."
13320-40 = "And so, Takanashi Hoshino will never know the truth behind the death of Kuchinashi Yume."
13320-41 = "Notebook? It holds no bearing!"
13320-42 = "Not a single person in this world can comprehend the death of Kuchinashi Yume!"
13320-43 = "That is the very nature of death!"
13320-52 = "And you have come closest to it, closer than anyone else in this world. The Great Mystery of Kivotos. The Horus of Dawn! The sun god bound by dawn!"
13320-53 = "You are the clue to the sixth koan's answer!"
13320-54 = "Now, show me! What comes of you, of the divine, confronting the mystery of death?"
13320-55 = "This is my ultimate trophy! I will reap the sweet rewards of my victory!"
13320-57 = "…But...there is just one thing...I know to be true..."
13320-58 = "(Yes...there is a truth that only you know of.)"
13320-59 = "And that truth...must be written in that notebook."
13320-60 = "(Yes. The truth you cannot help but to see! The answers you so desperately crave, they must be written there!)"
13320-61 = "...Takanashi Hoshino? Who are you talking to...?"
13320-64 = "Forget this student council game! I'm done playing house with you!"

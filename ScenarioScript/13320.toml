13320-157 = "……你們不可能理解我的痛苦。"
13320-161 = "你們什麼都不懂。"
13320-187 = "成功了！！"
13320-188 = "哦哦哦哦哦哦哦哦──！！！是嗎！！是那個嗎！！"
13320-189 = "那就是古則的答案嗎！！"
13320-197 = "[ns]「……！！！」"
13320-198 = "這，這是……！？"
13320-199 = "爆炸的方向是那邊！那邊的天空……？"
13320-200 = "……！！"
13320-201 = "這究竟是……"
13320-205 = "唔唔……"
13320-209 = "喂，快醒醒，監察官！現在不是睡覺的時候！"
13320-210 = "醒不來～完全暈過去了～"
13320-215 = "老師……這是……"
13320-216 = "好不容易才讓列車砲停下來的說……這次又怎麼了……"
13320-217 = "不，現在列車砲已經無所謂了吧……"
13320-222 = "[ns]「星野……！！陽奈……！！」"
13320-232 = "下一話;顯現"

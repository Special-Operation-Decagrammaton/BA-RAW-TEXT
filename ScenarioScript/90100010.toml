[translation]
90100010-1 = "第1話;くねくねくね"
90100010-7 = "ねぇ、あの噂……聞いた？"
90100010-8 = "え、どの噂？"
90100010-9 = "シロウナギ駅の南口にさ、遊歩道があるじゃん？"
90100010-10 = "あの川沿いのやつ？日差しを遮るものが全然ないから夏は暑いとこだよね。"
90100010-12 = "そうそう。別に街路樹があるわけでもないから、あんまり散歩してる人もいないんだけど……。"
90100010-13 = "最近、お昼になるとそこで体操してる人がいるんだって。"
90100010-14 = "別にそういう人もいるんじゃない？"
90100010-15 = "いや、それがさ……。"
90100010-17 = "なんか、白い全身タイツを着てるんだって。#n遠くからだと「白いかかし」みたいに見えるとか。"
90100010-18 = "まぁ、変だとは思うけど……言うほどかなぁ。"
90100010-19 = "声をかけようとしても、いつの間にかいなくなっちゃうんだって。#n気づいたら陽炎みたいに遠くに行っちゃうから、顔を見た人はほとんどいないんだとか。"
90100010-20 = "なんかそれはちょっと……変だね。"
90100010-22 = "……あれ？「ほとんどいない」ってことは、顔を見た人もいるの？"
90100010-23 = "うん。近くを走ってた陸上部の子が見たって。"
90100010-24 = "近づいてもすぐ遠くに行くから、勝負魂に火がついたみたいで……#n必死で追いかけたらしいよ。それで、正面から顔を見たら――"
90100010-28 = "――それ以降、口がきけなくなっちゃったんだって。"
90100010-29 = "ど、どういうこと！？"
90100010-30 = "かかしの顔を間近で見た後、そのまま気を失っちゃったらしいよ。"
90100010-31 = "なんか……その日を境に、悪夢でも見てるのかずっと身体を揺すってるらしくて。"
90100010-32 = "――くねくね、ってこう……。"
90100010-33 = "くねくね……？"
90100010-34 = "うん、くねくね。"
90100010-39 = "次回;超人と狐の間"

[translation]
1003405-1 = "#title;신부수행 Ⅱ : 청소 편"
1003405-2 = "#place;백귀야행 제18 구교사"
1003405-3 = "3;미모리;09;오늘 청소할 곳은 이곳이에요.\n#3;a\n#3;em;[반짝]\n#3;greeting"
1003405-4 = "[s] \"제법 먼지가 많이 쌓였네.\""
1003405-5 = "3;미모리;00;꽤 오랫동안 쓰이지 않은 백귀야행의 구교사라고 해요."
1003405-6 = "3;미모리;00;하지만 쓰지 않는다고 해서, 더러운 채로 내버려둘 수는 없죠."
1003405-7 = "3;미모리;08;오늘은 이곳을 깔끔하게 청소해서 반짝반짝하게 만들 거예요.\n#3;em;[하트]"
1003405-8 = "[s] \"그런데 청소 같은 것도 수행이 되는 거야?\""
1003405-9 = "3;미모리;00;후훗, 물론이에요."
1003405-10 = "3;미모리;99;요조숙녀……"
1003405-11 = "3;미모리;00;새신부로서 쌓아야 하는 소양이라면 단연코 청소, 요리, 세탁, 재봉, 가정 돌보기 등등……!"
1003405-12 = "3;미모리;08;그 분야는 파고들면 파고들수록 끝이 보이지 않는 전문가의 영역이니까요……!\n#3;em;[반짝]"
1003405-13 = "[s] \"어, 어렵구나. 요조숙녀의 길!\""
1003405-14 = "3;미모리;00;네에, 쉽지 않답니다~"
1003405-15 = "3;미모리;09;그럼 시작해볼까요? 후후.\n#3;em;[하트]"
1003405-16 = "#all;hide"

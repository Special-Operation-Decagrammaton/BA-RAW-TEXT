[translation]
1003405-1 = "การฝึกของเลดี้ II: ทำความสะอาด"
1003405-2 = "อาคารเรียนเก่า 18 เฮียกคิยาโค"
1003405-3 = "สถานที่ที่จะมาทำความสะอาดกันในวันนี้คืออาคารเรียนแห่งนี้ค่ะ"
1003405-4 = "[s] \"ฝุ่นจับหนาเลยนะ\""
1003405-5 = "ได้ยินว่าเป็นอาคารเรียนเก่าที่ไม่ได้ใช้งานมานานแล้วค่ะ"
1003405-6 = "แต่ถึงจะไม่ได้ใช้งาน เราก็ไม่ควรปล่อยให้อาคารสกปรกแบบนี้"
1003405-7 = "วันนี้ฉันจะทำความสะอาดที่นี่ให้เอี่ยมอ่องเลยค่ะ"
1003405-8 = "[s] \"ว่าแต่... การทำความสะอาดก็เป็นการฝึกฝนเหรอ?\""
1003405-9 = "ฮุฮุ ใช่แล้วค่ะ"
1003405-10 = "ทั้งการเป็นกุลสตรีที่เพียบพร้อม..."
1003405-11 = "และทักษะสำคัญของว่าที่เจ้าสาวคือการทำความสะอาด การทำอาหาร การซักผ้า การเย็บปักถักร้อย การดูแลครอบครัว และอื่นๆ อีกมากมายเลยค่ะ!"
1003405-12 = "การเป็นกุลสตรีที่เพียบพร้อมมีอะไรหลายอย่างที่ต้องทำให้ชำนาญค่ะ"
1003405-13 = "[s] \"การเป็นกุลสตรีที่เพียบพร้อมนี่... ไม่ง่ายเลยนะ\""
1003405-14 = "ใช่ค่ะ ไม่ง่ายเลยค่ะ"
1003405-15 = "เรามาเริ่มกันเลยไหมคะ? ฮุฮุ"
1003405-27 = "(ทำความสะอาดอาคารเรียนเก่ากับมิโมริมาเกือบสามชั่วโมง)"
1003405-30 = "[ns1] \"ถูพื้นเงาวิบ เช็ดกระจกเงาวับ\"\n[ns2] \"เก็บขยะได้ตั้ง 30 ถุงแล้ว แค่นี้คงเสร็จแล้วนะ...?\""
1003405-31 = "เกือบเสร็จแล้วค่ะ... "
1003405-32 = "เกือบเสร็จแล้วค่ะ... "
1003405-33 = "แต่ยังเหลือส่วนที่สำคัญที่สุดอยู่ค่ะ"
1003405-34 = "[s] \"ส่วนที่สำคัญที่สุด?\""
1003405-35 = "กรอบหน้าต่างค่ะ"
1003405-36 = "เราเช็ดกระจกแล้วก็จริง แต่ยังไม่ได้เช็ดฝุ่นที่กรอบหน้าต่างเลยค่ะ"
1003405-37 = "[s3] \"ใส่ใจรายละเอียดอะไรเบอร์นี้...!\"\n[s4] \"กุลสตรีที่เพียบพร้อม...! ไม่สิ เหมือนแม่ยายมากกว่าอีก?\""
1003405-38 = "ฉันเตรียมอุปกรณ์ที่จำเป็นไว้แล้วค่ะ"
1003405-39 = "ฉันเตรียมอุปกรณ์ที่จำเป็นไว้แล้วค่ะ"
1003405-40 = "ทั้งกระบอกฉีด ฟองน้ำ ตะเกียบไม้..."
1003405-41 = "ใช้ของพวกนี้แล้วทำความสะอาดแบบนี้นะคะ"
1003405-44 = "(ขัดๆ ถูๆ)"
1003405-45 = "ดูนี่สิคะ คุณครู! "
1003405-46 = "ขัดออกได้ง่ายมากเลยค่ะ!"
1003405-47 = "[s] \"คราบฝุ่นในกรอบหน้าต่างหลุดออกมาหมดเลย\""
1003405-48 = "ฉันเจอเคล็ดลับนี้มาจากในอินเทอร์เน็ตค่ะ"
1003405-49 = "พอทำความสะอาดแล้วรู้สึกสดชื่นขึ้นมาเลย ฮุฮุฮุ"
1003405-50 = "แต่ว่ายังไม่พอหรอกค่ะ"
1003405-51 = "ของพวกนี้ใช้ขัดได้แต่พื้นด้านนอกของกรอบหน้าต่าง"
1003405-52 = "เพราะตามซอกกรอบเป็นที่ที่ฟองน้ำเข้าไปไม่ถึงค่ะ"
1003405-53 = "[s] \"แล้วจะทำยังไงล่ะ ท่านมิโมริ!\""
1003405-54 = "ต้องใช้สิ่งนี้เข้าช่วยค่ะ!"
1003405-55 = "พู่กันสำหรับวาดภาพ!"
1003405-56 = "[s] \"ไอเทมเด็ด!\""
1003405-57 = "พู่กันเรียวเล็กที่ใช้เก็บรายละเอียดของงานศิลปะนี่..."
1003405-58 = "จะช่วยทำความสะอาดได้อย่างหมดจดแม้ในซอกมุมลึกๆ ค่ะ~"
1003405-59 = "และนี่ก็คือสุดยอดเคล็ดลับของกุลสตรีที่เพียบพร้อมที่ฉันเจอมาจากในอินเทอร์เน็ตค่ะ!"
1003405-60 = "[s] \"เยี่ยมไปเลย! กุลสตรีที่เพียบพร้อมยุค 4.0!\""
1003405-64 = "(ขัดๆ ถูๆ)"
1003405-65 = "ฮุฮุ~♪ ถ้าเสร็จตรงนี้ก็ถือว่าเสร็จหมดแล้วค่ะ~"
1003405-66 = "[s] \"ดูสนุกกับการฝึกฝนจังเลยนะ\""
1003405-67 = "งะ...งั้นเหรอคะ?"
1003405-68 = "อืม... ฉันขัดกรอบหน้าต่างฝุ่นเขรอะจนสะอาดแล้ว..."
1003405-69 = "ความรู้สึกแบบนี้... มันรู้สึกเหมือนทำอะไรสักอย่างสำเร็จลุล่วงค่ะ"
1003405-70 = "[s] \"มิโมริสนุกกับงานทำความสะอาดสินะ\""
1003405-71 = "ใช่ค่ะ ฉันรู้สึกว่าตัวเองเริ่มชำนาญในงานบ้านมากขึ้นเรื่อยๆ"
1003405-72 = "แต่ตอนทำคนเดียวฉันไม่ได้สนุกแบบนี้หรอกนะคะ..."
1003405-73 = "[s] \"งั้นเหรอ? แต่ตอนนี้ดูสนุกมากเลยนะ\""
1003405-74 = "นั่นคงเป็นเพราะว่า..."
1003405-75 = "[s] \"เพราะว่า...?\""
1003405-76 = "ฮุฮุ ไม่มีอะไรค่ะ"
1003405-77 = "มาเถอะค่ะ คุณครู! มาทำความสะอาดให้เสร็จกันเถอะค่ะ!"
1003405-79 = "(จากนั้นคุณครูก็ทำความสะอาดอย่างสนุกสนานกับมิโมริต่ออีกสองชั่วโมง)"

[translation]
1003405-1 = "新娘修行其二：打掃篇"
1003405-2 = "百鬼夜行．第18舊校舍"
1003405-3 = "今天要打掃的地方就是這裡呢。"
1003405-4 = "[s]「積了挺多灰塵的呢。」"
1003405-5 = "這裡似乎是百鬼夜行已經很久沒使用的舊校舍。"
1003405-6 = "話雖如此，也不能因為沒在使用就任其髒亂。"
1003405-7 = "今天就把這裡打掃乾淨，讓它閃閃發光吧。"
1003405-8 = "[s]「話說打掃也算修行嗎？」"
1003405-9 = "呵呵，那當然。"
1003405-10 = "一名大和撫子……"
1003405-11 = "一名新娘應該具備的素養就是打掃、料理、洗衣、裁縫等等……！"
1003405-12 = "修行之道可是越是挖掘就看不見盡頭的專家領域呢！"
1003405-13 = "[s]「成，成為大和撫子的道路真不容易呢！」"
1003405-14 = "沒錯，這絕不是件容易的事哦～"
1003405-15 = "呵呵，那麼開始吧？"
1003405-27 = "（就這樣和三森一起，打掃了舊校舍的教室將近3個小時）"
1003405-30 = "[ns1]「地板和窗戶都擦乾淨了……」\n[ns2]「垃圾也收集了30袋，這樣大致上結束了吧……？」"
1003405-31 = "是的，雖然大致上已經完成……"
1003405-32 = "是的，雖然大致上已經完成……"
1003405-33 = "不過還剩下最重要的地方沒有清理。"
1003405-34 = "[s]「最重要的地方？」"
1003405-35 = "就是窗戶的邊框。"
1003405-36 = "雖然窗戶已經擦過，但累積在窗框部分的灰塵還沒清理乾淨。"
1003405-37 = "[s3]「任何細節都不放過的細心……！」\n[s4]「這就是大和撫子……或者說是……婆婆？」"
1003405-38 = "需要的東西已經準備好了。"
1003405-39 = "需要的東西已經準備好了。"
1003405-40 = "噴霧器和打掃用的海綿，還有木筷。"
1003405-41 = "將這個組合起來，像這樣……"
1003405-44 = "（刷刷……）"
1003405-45 = "老師請看！"
1003405-46 = "變得這麼乾淨了！"
1003405-47 = "[s]「哦哦，連老舊的髒污都脫落了呢。」"
1003405-48 = "雖然是在網路上找到的方法……"
1003405-49 = "擦得這麼乾淨，就連心情都舒暢了呢。呵呵。"
1003405-50 = "不過……還不夠。"
1003405-51 = "現在只是將窗框上大部分的髒污擦除而已。"
1003405-52 = "邊框的角落……海綿無法觸及的角落部分還沒清乾淨。"
1003405-53 = "[s]「那，那麼該怎麼辦呢！？三森中士！」"
1003405-54 = "問得很好，這種時候要使用這邊的……"
1003405-55 = "用在繪畫上的，「筆」！"
1003405-56 = "[s]「意外的道具出現了！」"
1003405-57 = "只要利用這為了描繪出纖細筆觸的細筆筆尖……"
1003405-58 = "就可以把任何角落打掃得乾乾淨淨！"
1003405-59 = "不覺得正是大和撫子的智慧嗎！雖然這也是在網路找到的！"
1003405-60 = "[s]「好厲害！大和撫子的智慧 feat. Internet！」"
1003405-64 = "（刷刷……）"
1003405-65 = "呵呵～♪這樣打掃就全部結束了～"
1003405-66 = "[s]「三森，看起來有點開心呢。」"
1003405-67 = "我，我有露出，那麼開心的表情嗎……？"
1003405-68 = "不過看見如此髒亂的窗框因為自己的努力變得這麼乾淨……"
1003405-69 = "這部分似乎……確實讓人很有成就感呢。"
1003405-70 = "[s]「就像打掃本身就讓人很開心呢。」"
1003405-71 = "是呢，有種越來越擅長家事的感覺……"
1003405-72 = "啊，不過，一個人打掃的時候不會這麼興奮唷……？"
1003405-73 = "[s]「是嗎？你現在看起來好像非常開心。」"
1003405-74 = "現在之所以這麼開心，想必是因為……"
1003405-75 = "[s]「因為……？」"
1003405-76 = "呵呵，沒什麼。"
1003405-77 = "我去把剩下的地方也打掃乾淨哦，老師！"
1003405-79 = "（之後，和三森一起快樂地打掃了將近2小時）"

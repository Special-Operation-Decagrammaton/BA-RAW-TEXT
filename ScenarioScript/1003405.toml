1003405-30 = "[ns1] \"바닥 청소도 끝냈고, 창문도 닦았고.\"\n[ns2] \"쓰레기도 30봉이나 모아 버렸으니, 대충 끝났나……?\""
1003405-31 = "3;미모리;99;어느 정도는 끝마쳤지만…….\n#3;a"
1003405-32 = "3;미모리;99;어느 정도는 끝마쳤지만…….\n#3;a"
1003405-33 = "3;미모리;00;아직 가장 중요한 부분이 남아있어요.\n#3;em;[반짝]\n#3;greeting"
1003405-34 = "[s] \"가장 중요한 부분?\""
1003405-35 = "3;미모리;03;바로 창틀이에요.\n#3;em;[반응]"
1003405-36 = "3;미모리;00;창문은 닦았지만, 창틀 속 깊은 곳에 있는 먼지를 닦아낸 건 아니니까요."
1003405-37 = "[s3] \"과연 그런 부분까지 놓치지 않는 세심함……!\"\n[s4] \"이것이 요조숙녀……! 아니, 그보다는 시어머니인가?\""
1003405-38 = "3;미모리;08;필요한 물건은 이미 준비해 뒀어요.\n#3;em;[하트]"
1003405-39 = "3;미모리;08;필요한 물건은 이미 준비해 뒀어요.\n#3;em;[하트]"
1003405-40 = "3;미모리;00;분무기랑 청소용 스펀지, 그리고 나무젓가락까지……."
1003405-41 = "3;미모리;00;이걸 이용해서, 이렇게 청소를 하면.\n#3;m4"
1003405-42 = "3;미모리;00\n#3;greeting\n#wait;800"
1003405-43 = "3;미모리;00\n#3;greeting\n#wait;1000"
1003405-44 = "#na;(쓱삭쓱삭)"
1003405-45 = "3;미모리;09;이, 이것 좀 보세요. 선생님! \n#3;em;[반짝]"
1003405-46 = "3;미모리;09;이렇게나 깨끗하게 싸악~ 닦여요!\n#3;m3\n#3;hophop"
1003405-47 = "[s] \"오오, 창틀 속에 잠들어 있던 묵은 때가 싹 벗겨지네?\""
1003405-48 = "3;미모리;00;인터넷에서 찾아본 방법이지만,"
1003405-49 = "3;미모리;08;이렇게까지 깔끔하게 닦이는 게, 속이 다 시원해지네요. 후후훗.\n#3;em;[하트]"
1003405-50 = "3;미모리;00;하지만 그래도 이것만으로는 부족해요."
1003405-51 = "3;미모리;99;이것들로는 창틀의 표면 부분만 닦아낼 수 있을 뿐.\n#3;em;…"
1003405-52 = "3;미모리;10;창틀 구석……. 스펀지가 닿지 못하는 깊은 곳까지는 닦아내지 못하니까요."
1003405-53 = "[s] \"헉, 그, 그러면 어떡하죠?! 미모리 중사!\""
1003405-54 = "3;미모리;05;이럴 때 필요한 것이 바로 이것!\n#3;closeup"
1003405-55 = "3;미모리;00;미술용 붓이랍니다!\n#3;closeup\n#3;em;[!]"
1003405-56 = "[s] \"의외의 아이템, 떴다!\""
1003405-57 = "3;미모리;99;미술의 세심한 붓 터치를 위해 쓰는 이 가느다란 붓이라면,"
1003405-58 = "3;미모리;08;구석 모서리까지도 털어내서 깔끔하게 청소할 수 있으니까요~\n#3;em;[음표]\n#3;greeting"
1003405-59 = "3;미모리;00;이게 바로 요조숙녀의 지혜예요! 인터넷에서 찾은!"
1003405-60 = "[s] \"굉장해! 요조숙녀의 지혜 주머니! Feat 인터넷!\""
1003405-61 = "3;미모리;00\n#3;m4\n#wait;1000"
1003405-62 = "3;미모리;00\n#3;greeting\n#wait;800"
1003405-63 = "3;미모리;00\n#3;greeting"
1003405-64 = "#na;(슥슥슥슥)"
1003405-65 = "3;미모리;08;후후~♪ 청소는 이것으로 전부 마무리랍니다~\n#3;m3\n#3;em;[음표]"
1003405-66 = "[s] \"그런데 미모리, 어째 즐거워 보이네.\""
1003405-67 = "3;미모리;07;그, 그런 표정을 지었나요?\n#3;em;[///]\n#3;stiff"
1003405-68 = "3;미모리;99;확실히, 으음. 이렇게 더러운 창틀이 제 노력으로 깨끗해진다거나."
1003405-69 = "3;미모리;00;이런 부분이 조금은……. 성취감이 드는 걸지도 모르겠어요."
1003405-70 = "[s] \"청소 자체가 즐거운 거구나.\""
1003405-71 = "3;미모리;09;네, 가사에 점점 능숙해져 가고 있다는 실감이 나서…….\n#3;em;[반짝]"
1003405-72 = "3;미모리;07;아, 하지만 혼자 할 때는 이 정도로 들뜨는 건 아닌데……."
1003405-73 = "[s] \"그래? 지금 엄청 들뜬 거 같은데.\""
1003405-74 = "3;미모리;99;아마, 제가 이렇게까지 즐거운 이유는 분명…….\n#3;em;…"
1003405-75 = "[s] \"분명?\""
1003405-76 = "3;미모리;08;후훗, 아니요. 아무것도 아니에요."
1003405-77 = "3;미모리;09;자아, 나머지도 착착 청소해 나가요. 선생님!\n#3;em;[하트]\n#3;hophop"
1003405-78 = "#all;hide"
1003405-79 = "#na;(그 뒤로도 약 2시간에 걸쳐, 미모리와 함께 즐겁게 청소를 끝마쳤다.)"

[translation]
1003405-1 = "Etiquette II: The Cleaning Episode"
1003405-2 = "Hyakkiyako Old Schoolhouse 18"
1003405-3 = "Cleaning is also an important component to my duties as a proper lady."
1003405-4 = "[s] \"It's pretty dusty in here.\""
1003405-5 = "Yes, the place is technically no longer in use."
1003405-6 = "But that doesn't mean we should allow it to fall into disarray like this."
1003405-7 = "I'll make this place shine like the rest of the building."
1003405-8 = "[s] \"Is this a part of your training?\""
1003405-9 = "Naturally."
1003405-10 = "A proper lady..."
1003405-11 = "Or rather, a new bride and homemaker, must know everything about cleaning, cooking, laundry, sewing, homemaking, and more."
1003405-12 = "There is truly no end to the required skills and knowledge!"
1003405-13 = "[s] \"The path of a proper lady is a hard one, huh?\""
1003405-14 = "Yes, it certainly is! That's what makes it so rewarding."
1003405-15 = "Then, shall we?"
1003405-27 = "Mimori and I spent three hours on cleaning just the Former Institutes' classroom."
1003405-30 = "[ns1] \"We've done the floor, windows, desks, chalkboard, seats...\"\n[ns2] \"My arms are about to fall off. Please say it's over.\""
1003405-31 = "We're nearly done, however..."
1003405-32 = "We're nearly done, however..."
1003405-33 = "We mustn't forget the most important part."
1003405-34 = "[s] \"And what's that?\""
1003405-35 = "The window frames!"
1003405-36 = "It's easy to just wipe the windows, and forget about all the dust that accumulates in the frames themselves."
1003405-37 = "[s3] \"Wow, you're so detail-oriented!\"\n[s4] \"Truly the mindset of a proper lady!\""
1003405-38 = "I've prepared everything we need."
1003405-39 = "I've prepared everything we need."
1003405-40 = "Spray bottles, cleaning sponges, and wooden chopsticks..."
1003405-41 = "All the supplies are here!"
1003405-44 = "*wiping*"
1003405-45 = "Sensei, look! "
1003405-46 = "It's absolutely sparkling!"
1003405-47 = "[s] \"Wow, cleaning the window frames really makes a difference.\""
1003405-48 = "I found this method on the internet."
1003405-49 = "It's refreshing how clean it is..."
1003405-50 = "...but we're not done yet."
1003405-51 = "We've only just barely scratched the surface."
1003405-52 = "The sponge doesn't reach the deep crevices of the window frame."
1003405-53 = "[s] \"*gasp* Th-Then, what do we do, Sergeant Mimori?!\""
1003405-54 = "In situations like this, we have our secret weapon!"
1003405-55 = "A paint brush!"
1003405-56 = "[s] \"How unexpected!\""
1003405-57 = "This is a thin brush used for detailed painting."
1003405-58 = "This way, not even the deepest of crevices stands a chance."
1003405-59 = "The internet has a lot of tips teaching you how to be a proper lady!"
1003405-60 = "[s] \"The wisdom of a proper lady, featuring the internet!\""
1003405-64 = "*wiping*"
1003405-65 = "Heehee. And we're done!"
1003405-66 = "[s] \"You look happy.\""
1003405-67 = "D-Do I?"
1003405-68 = "I suppose cleaning the window frames so thoroughly..."
1003405-69 = "...gave me a sense of accomplishment."
1003405-70 = "[s] \"You seem to enjoy cleaning.\""
1003405-71 = "Oh, yes! I've gotten rather good at housekeeping, I think."
1003405-72 = "But, it's not as exciting when I'm alone..."
1003405-73 = "[s] \"Really? Because you look pretty excited right now.\""
1003405-74 = "Well, it's a bit different because..."
1003405-75 = "[s] \"Because...?\""
1003405-76 = "Heehee. Just because."
1003405-77 = "Okay, Sensei. On to the next room!"
1003405-79 = "Mimori and I cleaned for two more hours and enjoyed every moment of it."

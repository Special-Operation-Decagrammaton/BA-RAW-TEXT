[translation]
11134050-1 = "#Y-04"
11134050-3 = "จะว่าไป ทุกคนยอมใส่เสื้อที่ฉันทำให้อย่างไม่อิดออดเลยนะ"
11134050-4 = "โดยเฉพาะคาซึสะ... นึกว่าจะไม่เต็มใจใส่ซะอีก อุตส่าห์แอบหวังไว้ว่าจะได้ฉอดกันสักยก น่าเสียดายจริงๆ"
11134050-5 = "เห็นไอริบอกไว้ว่า 'น่ารักเหมือนกันกับคาซึสะเลย' น่ะ"
11134050-6 = "ก็บอกแล้วไงว่าไม่เกี่ยวกับที่ไอริพูด..."
11134050-10 = "งั้นถอดเลยมั้ยล่ะ?"
11134050-11 = "ถอดแล้วจะให้ใส่อะไรล่ะ!?"

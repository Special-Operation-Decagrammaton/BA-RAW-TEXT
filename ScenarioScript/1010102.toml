[translation]
1010102-1 = "餐廳打工"
1010102-4 = "（接到沙織的聯絡後突然覺得有點餓，於是便朝著海邊的餐廳走去）"
1010102-10 = "這是你點的御好燒，請慢用。"
1010102-11 = "哦，看起來很好吃耶！"
1010102-12 = "不過你不幫我淋美乃滋嗎？"
1010102-16 = "對，對哦！抱歉！我馬上去拿來！"
1010102-21 = "不好意思～！我們這裡沒有菜單耶～！"
1010102-22 = "對不起！請稍等一下！"
1010102-27 = "[ns]（唔，是不是應該等他一下呢……）"
1010102-32 = "哈啊，哈啊……"
1010102-33 = "歡迎光臨。請先參考菜單……"
1010102-37 = "嗯？老師？"
1010102-38 = "是來看我的嗎？謝謝你。"
1010102-39 = "[s]「你看起來好像很忙。」"
1010102-40 = "連老師都看得出來嗎？#n雖然我的工作量不多，但是因為現在還不是很上手……"
1010102-41 = "所以有點手忙腳亂的。"
1010102-42 = "來，菜單在這裡。"
1010102-43 = "選好想吃的東西之後再跟我說吧。"
1010102-44 = "[s1]「唔嗯……品項還真多。」\n[s2]「你有什麼推薦的嗎？」"
1010102-47 = "嗯，被老師你這麼一問……"
1010102-51 = "對了，我可以推薦你最多人點的東西。"
1010102-52 = "就是這個「特製蛋包飯+一級棒服務」。"
1010102-53 = "這個套餐很受歡迎。"
1010102-54 = "嗯？一級棒服務是什麼？"
1010102-55 = "就是用番茄醬在蛋包飯上作畫的服務。#n雖然我實在不太理解，對馬上要吃下肚的食物做這種事情有什麼意義……"
1010102-59 = "[ns]「就給我那個吧！」"
1010102-60 = "嗯！？連老師也要點這個套餐嗎？"
1010102-61 = "我知道了……#n不過我現在畫得還不是很好，說不定看起來會很奇怪……"
1010102-62 = "[s3]「那樣反而更好……！」\n[s4]「竟然是沙織親手畫的畫……！」"
1010102-65 = "是嗎……？"
1010102-66 = "好吧，那你稍等一下──"
1010102-71 = "喂！這是什麼意思啊！"
1010102-75 = "那邊好像出了點狀況。"
1010102-76 = "[s]「不過去看看沒關係嗎？」"
1010102-77 = "唔嗯，雖然有點在意，不過我現在還在幫你點餐。"
1010102-78 = "老師你也同樣是客人，我必須要盡全力服務才行……"
1010102-83 = "馬上叫你們負責人給我出來！"
1010102-84 = "唔嗯……"
1010102-85 = "[s]「你還是過去看看吧……」"
1010102-86 = "抱歉，我會盡快回來的。"
1010102-90 = "[ns] 因為覺得有點不安，還是跟著沙織一起過去"
1010102-98 = "你們這間餐廳也太糟糕了吧！#n端出來的料理跟菜單上寫的完全不一樣！這根本是詐欺！"
1010102-99 = "別想要我付錢給這種餐廳！"
1010102-104 = "我記得你點的蛋包飯，我不久前才剛送上桌……"
1010102-105 = "餐點有什麼問題嗎？"
1010102-106 = "沒錯，這個蛋包飯有非常嚴重的問題！"
1010102-110 = "你給我睜大眼睛看清楚！"
1010102-114 = "……蛋包飯看起來很普通啊。#n抱歉，我不太明白你所謂的問題是什麼。"
1010102-115 = "[s]（……看起來就只是盤吃剩的蛋包飯啊？）"
1010102-116 = "你看！連問題出在哪裡都不知道！"
1010102-117 = "菜單上明明寫說會用番茄醬在蛋包飯上畫一隻貓！"
1010102-121 = "但這哪是貓啊，明明就是兔子！"
1010102-122 = "[ns]「這根本是在找碴吧！」"
1010102-123 = "竟然敢欺騙顧客！"
1010102-124 = "我才不會付錢給這種餐廳！"
1010102-128 = "什麼……！"
1010102-132 = "原來如此，在某些人的眼裡，這看起來可能確實不太像貓。"
1010102-133 = "送上錯誤的餐點是我的問題，我會為此負起全責。"
1010102-134 = "很好很好，你總算聽懂了。"
1010102-135 = "[s]「沙織，你不需要──」"
1010102-140 = "所以就由我重新幫你畫一隻貓，直到你滿意為止吧！"
1010102-145 = "啊？你，你說什麼……！"
1010102-146 = "我才不是要你那麼做……！"
1010102-147 = "不必擔心。我一定會在能力所及的範圍內──"
1010102-148 = "畫出史上最完美的貓……！"
1010102-152 = "哈啊啊！"
1010102-153 = "等，等等……！"
1010102-155 = "（一小時後……）"
1010102-159 = "這，這是我畫過最像貓的一次……怎麼樣？"
1010102-160 = "那，那個，就說我不是那個意思了……！"
1010102-161 = "你還是不滿意嗎？"
1010102-162 = "好，我會奉陪到底！"
1010102-168 = "（四小時後……）"
1010102-172 = "如何！這樣應該稱得上是史上最完美的貓了吧！"
1010102-173 = "夠……夠了……！"
1010102-174 = "還是不行嗎？"
1010102-178 = "那我就再畫一次……！"
1010102-182 = "拜託你別再畫了！我認錯還不行嗎！"
1010102-183 = "這些錢給你！不用找了！"
1010102-188 = "等，等等！"
1010102-189 = "我這次真的畫得很好……！"
1010102-193 = "……走掉了。"
1010102-194 = "老師，我的畫功真的有那麼差嗎？"
1010102-195 = "[s]「……我覺得問題並不是出在這裡。」"
1010102-196 = "嗯？"
1010102-197 = "……原來是那樣嗎？#n那個人只是不想付錢，所以才拿貓的事當作藉口？"
1010102-198 = "這樣啊……所以他才會在發現無法得逞之後，趕快付錢逃跑。"
1010102-199 = "謝謝你，老師。我又學到了一課。#n今天的事我會銘記在心。"
1010102-200 = "……然後為了不再被人拿這點找碴，我以後也會多多練習如何用番茄醬作畫的。"

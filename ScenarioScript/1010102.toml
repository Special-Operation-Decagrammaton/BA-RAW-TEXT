[translation]
1010102-1 = "งานพาร์ทไทม์ที่ร้านอาหาร"
1010102-4 = "(พอได้รับข้อความของซาโอริ คุณครูก็รู้สึกหิว จึงมุ่งหน้าไปยังร้านอาหารที่ชายหาด)"
1010102-10 = "โอโคโนมิยากิที่สั่งได้แล้ว ทานให้อร่อยนะคะ"
1010102-11 = "โอ้ น่ากินจังเลย!"
1010102-12 = "ว่าแต่ ไม่ใส่มายองเนสให้เหรอ?"
1010102-16 = "อ๊ะ จริงสิ! ขอโทษนะ! เดี๋ยวฉันรีบไปเอามาให้!"
1010102-21 = "ขอโทษนะครับ! ผมยังไม่ได้เมนูเลยครับ!"
1010102-22 = "ขอโทษที! รอแป๊บหนึ่งนะ!"
1010102-27 = "[ns] (อืม ควรรอให้งานยุ่งน้อยกว่านี้มั้ยนะ...)"
1010102-32 = "แฮ่ก... แฮ่ก..."
1010102-33 = "เชิญค่ะ คุณลูกค้า เลือกเมนูเสร็จแล้วเรียกฉันนะคะ..."
1010102-37 = "หืม? ครู?"
1010102-38 = "แวะมากินข้าวเหรอ? ขอบคุณนะ"
1010102-39 = "[s] \"ดูงานยุ่งมากเลยนะ\""
1010102-40 = "ครูก็รู้สึกอย่างนั้นเหรอ? งานมีไม่ค่อยเยอะเท่าไรหรอก แต่ฉันแค่ยังไม่ชินน่ะ"
1010102-41 = "ฉันยังเป็นเด็กพาร์ทไทม์ที่เงอะงะอยู่เลย"
1010102-42 = "นี่เมนูนะ"
1010102-43 = "เลือกอาหารที่อยากกินแล้วบอกฉันได้เลย"
1010102-44 = "[s1] \"อืม... มีเยอะมากจนเลือกไม่ถูกเลย แนะนำหน่อยสิ\"\n[s2] \"มีเมนูแนะนำของทางร้านมั้ย?\""
1010102-47 = "อืม ถามแบบนี้ฉันก็หนักใจนะ..."
1010102-51 = "จริงสิ ฉันแนะนำเมนูที่ลูกค้าสั่งกันเยอะๆ ให้ได้"
1010102-52 = "ลองเมนูนี้สิ <ข้าวห่อไข่พิเศษ + การบริการที่จริงใจ>"
1010102-53 = "เมนูนี้ได้รับความนิยมมากที่สุดเลยละ"
1010102-54 = "หืม? การบริการที่จริงใจคืออะไรน่ะเหรอ?"
1010102-55 = "บริการวาดรูปบนข้าวห่อไข่ด้วยซอสมะเขือเทศน่ะ ยังไงก็ต้องกินอยู่ดี ฉันไม่รู้เลยว่าทำไมต้องวาดรูป#nให้ลำบากแบบนั้นด้วย..."
1010102-59 = "[ns] \"ครูขอเป็นเมนูนี้เลย!\""
1010102-60 = "หะ... หืม?! ครูก็จะสั่งเมนูนี้เหรอ?"
1010102-61 = "เข้าใจแล้ว... แต่ฉันยังวาดรูปไม่เก่ง อาจจะออกมาไม่สวยก็ได้นะ..."
1010102-62 = "[s3] \"แบบนั้นสิยิ่งดี...!\"\n[s4] \"มันคือรูปที่ซาโอริจะวาดให้เลยนะ...!\""
1010102-65 = "งั้นเหรอ...?"
1010102-66 = "งั้นก็... เข้าใจแล้ว รอเดี๋ยว—"
1010102-71 = "นี่! นี่มันอะไรกัน!"
1010102-75 = "ดูเหมือนโต๊ะนั้นจะมีปัญหานะ"
1010102-76 = "[s] \"ไม่ไปดูหน่อยเหรอ?\""
1010102-77 = "อืม มันก็กวนใจฉันอยู่หรอก แต่ฉันกำลังรับออร์เดอร์จากครูอยู่นี่นา"
1010102-78 = "ตอนนี้ครูก็เป็นลูกค้าของฉัน และฉันก็ต้องเอาใจใส่ลูกค้า..."
1010102-83 = "เรียกคนรับผิดชอบมาเลย เรียกมาเดี๋ยวนี้!"
1010102-84 = "อืม..."
1010102-85 = "[s] \"ครูว่าเข้าไปดูหน่อยน่าจะดีกว่านะ...\""
1010102-86 = "ขอโทษนะ งั้นฉันจะรีบมา"
1010102-90 = "[ns] รู้สึกกังวลจึงตามซาโอริไป"
1010102-98 = "นี่มันร้านอาหารอะไรกัน! ถ้าได้อาหารไม่ตรงปกกับเมนูก็ถือว่าหลอกลวงผู้บริโภคนะ!"
1010102-99 = "ฉันไม่ยอมจ่ายเงินให้ร้านแบบนี้หรอก!"
1010102-104 = "อาหารที่ลูกค้าสั่งคือข้าวห่อไข่..."
1010102-105 = "มีปัญหาอะไรกับอาหารงั้นเหรอ?"
1010102-106 = "ก็มีน่ะสิ ปัญหาก็อยู่บนข้าวห่อไข่นี่ไง!"
1010102-110 = "เธอมาดูให้เต็มสองตาเลย!"
1010102-114 = "ก็เป็นข้าวห่อไข่ปกตินี่นา... ขอโทษนะ แต่ฉันไม่รู้ว่าปัญหาอยู่ที่ตรงไหน"
1010102-115 = "[s] (นั่นมันข้าวห่อไข่ที่กินไปแล้วนี่นา...?)"
1010102-116 = "เฮอะ! เธอไม่รู้ด้วยซ้ำว่าปัญหาอยู่ที่ตรงไหน!"
1010102-117 = "ในเมนูเขียนไว้ว่าจะวาดรูปแมวด้วยซอสมะเขือเทศให้!"
1010102-121 = "นี่ไม่ใช่แมว แต่เป็นกระต่ายต่างหาก!"
1010102-122 = "[ns] \"เรื่องแค่นี้เนี่ยนะ!\""
1010102-123 = "นี่เธอกำลังหลอกลวงลูกค้าอยู่นะ!"
1010102-124 = "ฉันไม่ยอมจ่ายเงินให้ร้านแบบนี้หรอก!"
1010102-128 = "ว่าไงนะ...!"
1010102-132 = "งั้นสินะ อาจจะมองเป็นกระต่ายก็ได้"
1010102-133 = "ฉันผิดเองที่เสิร์ฟอาหารไม่ตรงตามที่สั่ง ฉันจะรับผิดชอบเรื่องนี้เอง"
1010102-134 = "อื้ม ต้องอย่างนี้ละ พอคุยกันรู้เรื่องแล้วสินะ"
1010102-135 = "[s] \"ซาโอริ ไม่ต้อง...\""
1010102-140 = "งั้นฉันจะวาดรูปแมวให้จนกว่าลูกค้าจะพอใจเลย!"
1010102-145 = "ว่าไงนะ? มะ... หมายความว่ายังไง...!"
1010102-146 = "ฉะ... ฉันไม่ได้อยากได้อะไรแบบนั้น...!"
1010102-147 = "ไม่ต้องห่วงนะ ฉันจะวาดแมวที่สมบูรณ์แบบที่สุดเท่าที่ฉันเคยวาดมาให้เลย...!"
1010102-148 = "ขอข้าวห่อไข่กับซอสมะเขือเทศ 1 ขวด!"
1010102-152 = "ฮึบ!"
1010102-153 = "ดะ... เดี๋ยวก่อน...!"
1010102-155 = "(1 ชั่วโมงต่อมา...)"
1010102-159 = "วาดได้ดีที่สุดเท่าที่เคยวาดมาเลย...! ว่ายังไงล่ะ?"
1010102-160 = "มะ... ไม่ใช่นะ ฉันไม่ได้อยากให้เป็นแบบนี้...!"
1010102-161 = "ยังไม่พอใจเหรอ?"
1010102-162 = "ก็ได้ จะวาดให้จนกว่าจะพอใจเลย!"
1010102-168 = "(4 ชั่วโมงต่อมา...)"
1010102-172 = "เป็นยังไงล่ะ! นี่น่าจะเป็นแมวที่สมบูรณ์แบบที่สุดแล้วนะ!"
1010102-173 = "พอที... พอแล้ว...!"
1010102-174 = "ยังไม่ชอบอีกเหรอ?"
1010102-178 = "งั้นขออีกรอบ...!"
1010102-182 = "พอได้แล้ว ขอร้องละ! ฉันผิดเอง!"
1010102-183 = "เอ้า รับเงินนี่ไป! แล้วก็ไม่ต้องทอนนะ!"
1010102-188 = "ระ... รอเดี๋ยวสิ!"
1010102-189 = "รอบนี้ฉันวาดมาสวยจริงๆ นะ...!"
1010102-193 = "ไปซะแล้วเหรอ...?"
1010102-194 = "ครู รูปแมวของฉันมันห่วยขนาดนั้นเลยเหรอ?"
1010102-195 = "[s] \"ครูว่าไม่ได้เป็นที่รูปหรอกนะ...\""
1010102-196 = "หืม?"
1010102-197 = "ครูพูดจริงเหรอ...? ลูกค้าคนนั้นแค่ใช้รูปแมวเป็นข้ออ้าง เพราะไม่อยากจ่ายเงินงั้นเหรอ?"
1010102-198 = "งั้นสินะ... พอไม่เป็นอย่างที่ต้องการ ก็เลยจ่ายเงินแล้วหนีไปสินะ"
1010102-199 = "ขอบคุณนะครู ถือว่าฉันได้เรียนรู้แล้ว ฉันจะจำเรื่องที่เกิดขึ้นวันนี้ให้ขึ้นใจเลย"
1010102-200 = "อีกอย่าง... ฉันต้องตั้งใจฝึกวาดรูปด้วยซอสมะเขือเทศให้ออกมาดีกว่านี้แล้วละ"

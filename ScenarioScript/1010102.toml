[translation]
1010102-1 = "Restaurant Job"
1010102-4 = "I got hungry a little after Saori reached out to me, so I headed to the beachside restaurant."
1010102-10 = "The okonomiyaki you ordered. Enjoy."
1010102-11 = "It looks delicious!"
1010102-12 = "But I believe it's missing the mayonnaise..."
1010102-16 = "Ah, my sincerest apologies. I'll correct my mistake immediately."
1010102-21 = "Excuse me! We still haven't gotten our menus!"
1010102-22 = "I apologize! Just one moment, please!"
1010102-27 = "[ns] \"(Hm... I think I'll wait a little...)\""
1010102-32 = "*pant* *pant*"
1010102-33 = "Welcome. Please look at the menu and..."
1010102-37 = "Sensei?"
1010102-38 = "You came to visit me? Thank you."
1010102-39 = "[s] \"You look really busy.\""
1010102-40 = "Does it appear that way, Sensei? Rather than having a large workload, I'm just unaccustomed to the work."
1010102-41 = "I'm still trying to learn the ins and outs of the job."
1010102-42 = "Here is your menu."
1010102-43 = "Let me know when you're ready to order."
1010102-44 = "[s1] \"Hm... What a big menu...\"\n[s2] \"Is there anything you'd recommend?\""
1010102-47 = "Um, I may not be the most qualified person to answer that question..."
1010102-51 = "Ah. Of course. I should recommend our most ordered item."
1010102-52 = "It's the \"Omurice & Care Service Special.\""
1010102-53 = "This is the most popular item on our menu."
1010102-54 = "Huh? What is \"care service\"?"
1010102-55 = "It's simply the server drawing a picture on the omurice with ketchup. It seems rather inane to me, since the customer is just going to eat it anyways..."
1010102-59 = "[ns] \"That one! I want that one, please!\""
1010102-60 = "Y-You do?! Are you sure that's what you'd like to order, Sensei?"
1010102-61 = "Understood...however, I can't guarantee the results... My ketchup-drawing skills are subpar."
1010102-62 = "[s3] \"That'll make it even better!\"\n[s4] \"A personalized Saori-drawing!\""
1010102-65 = "Is...that so?"
1010102-66 = "Well, if that's what you'd like. Please wait for just—"
1010102-71 = "Hey! What the heck is this?!"
1010102-75 = "There appears to be a situation over there..."
1010102-76 = "[s] \"Don't you have to go check it out?\""
1010102-77 = "Um... I am a bit concerned, but I'm still taking your order."
1010102-78 = "You're a customer too, Sensei, so I have to do my job properly—"
1010102-83 = "I want to speak to a manager! RIGHT NOW!"
1010102-84 = "U-Um..."
1010102-85 = "[s] \"It's okay. Go see what's happening.\""
1010102-86 = "I'm sorry. I'll return as soon as I can."
1010102-90 = "[ns] Follow Saori out of concern."
1010102-98 = "The food doesn't look like the picture at all! This establishment is a disgrace!"
1010102-99 = "I'm not giving my money to this abysmal restaurant!"
1010102-104 = "I just dropped off an omurice special to you..."
1010102-105 = "Was there an issue with your dish?"
1010102-106 = "Obviously! This omurice is a disaster!"
1010102-110 = "Take a proper look, with your own two eyes!"
1010102-114 = "It's our standard omurice. I fail to see the problem here."
1010102-115 = "[s] \"(...And it's half-eaten, at that.)\""
1010102-116 = "Of course! You can't even tell what the issue is!"
1010102-117 = "The item description clearly says it comes with a hand-drawn ketchup cat!"
1010102-121 = "But this isn't a cat! It's a rabbit!"
1010102-122 = "[ns] \"That's totally ridiculous!\""
1010102-123 = "No, it's not! It's false advertising!"
1010102-124 = "As I said, I'm not giving you a single cent!"
1010102-128 = "What...?"
1010102-132 = "I see... I can understand your perspective."
1010102-133 = "It is my responsibility to ensure that you receive what you ordered. This is a dereliction of my duty."
1010102-134 = "Hm, yes, yes. Naturally, I'm in the right here."
1010102-135 = "[s] \"Saori, you really don't need to—\""
1010102-140 = "Therefore, I will draw as many cats as it takes for you to be satisfied!"
1010102-145 = "Wh-What? Wait a second!"
1010102-146 = "That wasn't what I was angling for at all..."
1010102-147 = "Don't worry. I will draw you the most perfect ketchup cat to have ever been drawn."
1010102-148 = "Omurice and ketchup bottle, please!"
1010102-152 = "Hiyah!"
1010102-153 = "W-Wait...!"
1010102-155 = "One hour later..."
1010102-159 = "Yes. I believe this is the best one yet. Do you approve?"
1010102-160 = "I-I'm trying to tell you, this isn't what I wanted!"
1010102-161 = "I see. It still doesn't measure up to your standards."
1010102-162 = "Then I will persevere until you are happy with your ketchup cat!"
1010102-168 = "Four hours later..."
1010102-172 = "For your approval! I believe this is the best ketchup cat ever drawn!"
1010102-173 = "Stop... Please, stop!"
1010102-174 = "...Still not enough."
1010102-178 = "Then, again!"
1010102-182 = "I beg of you! Stop! I was in the wrong! Okay?!"
1010102-183 = "Here's your money! And keep the change!"
1010102-188 = "W-Wait! Come back!"
1010102-189 = "I thought this one was rather good...!"
1010102-193 = "...He left."
1010102-194 = "Are my drawing skills really so abysmal as to drive away customers, Sensei?"
1010102-195 = "[s] \"...I don't think it was your drawing at all.\""
1010102-196 = "Huh?"
1010102-197 = "...That was the situation? He was trying to use the ketchup cat as an excuse to not pay his bill?"
1010102-198 = "I see... When his scheme didn't play out as expected, he just paid and escaped..."
1010102-199 = "Thank you, Sensei. This was a great learning experience. I'll remember it forever."
1010102-200 = "...Regardless, I'll need to practice my ketchup cat even more, so no one will even think to complain about it."

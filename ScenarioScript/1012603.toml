[translation]
1012603-1 = "少女的聲音"
1012603-2 = "（像平常一樣處理工作時……）"
1012603-6 = "[ns]「是陌生的號碼……」"
1012603-7 = "（……決定先接起來）"
1012603-11 = "咦？接通了……？"
1012603-12 = "你，你好……？是[USERNAME]老師嗎？"
1012603-13 = "[s]「嗯，你好。」"
1012603-14 = "哇！真的是[USERNAME]老師！嘿嘿嘿……"
1012603-15 = "老師，不好意思，可以跟你稍微聊一下嗎？"
1012603-16 = "[s]「可以是可以……不過你是誰？」"
1012603-17 = "啊！抱歉！我，我太害羞了，所以說不出口……！"
1012603-18 = "其實我……從很久以前就一直在關注老師。"
1012603-19 = "雖然老師不認識我，但我很了解老師。"
1012603-20 = "看著你總是溫柔照顧學生的樣子，我不知不覺就被吸引了……"
1012603-21 = "所，所以……可以和我見一面嗎？"
1012603-22 = "能和老師單獨見面，是我一直以來的願望！"
1012603-23 = "[s]（……真傷腦筋）"
1012603-24 = "嗚嗚……果然不行嗎……？"
1012603-25 = "[s1]（……還是見面之後好好勸勸他吧）\n[s2]「好吧，那我們在夏萊附近的公園見。」"
1012603-28 = "哇！太感謝了！我會在那裡等你來的！"
1012603-34 = "（匆忙結束工作，前往約定的公園）"
1012603-37 = "[ns]「他應該就在這附近……」"
1012603-38 = "喵嗚～喵嗚嗚～"
1012603-39 = "嘎啊～嘎嘎嘎～"
1012603-40 = "[ns]「……這公園的貓和烏鴉怎麼這麼多？」"
1012603-41 = "我只要一出門……黑貓和烏鴉就會神奇地聚過來……"
1012603-45 = "所以聽到牠們的叫聲，就是我來了的信號。"
1012603-46 = "[s]「鹿江怎麼會在這裡……？」"
1012603-47 = "老師……我一直在等你哦。"
1012603-48 = "[ns3]（感覺有點不對勁……）\n[ns4]（還是先確保退路吧……）"
1012603-51 = "咿嘻嘻，不會讓你逃走的唷。"
1012603-52 = "抓住他，孩子們。"
1012603-53 = "喵嗚！喵嗚嗚！！"
1012603-54 = "嘎啊！嘎嘎嘎！！"
1012603-67 = "（……結果沒跑多遠就被貓和烏鴉包圍了）"
1012603-69 = "[ns]「這，這是怎麼回事？我只是來見學生而已啊！」"
1012603-70 = "那個學生就是我……"
1012603-74 = "你好，老師！真的很感謝你願意出來見我！"
1012603-75 = "嘿嘿嘿，我的願望終於實現了！"
1012603-76 = "[s5]「那，那個孩子竟然是鹿江……？」\n[s6]「聲音完全不一樣啊！？」"
1012603-79 = "你應該已經猜到了吧……我是名專攻聲優的演員。"
1012603-80 = "剛才嘗試扮演了可愛少女的角色。"
1012603-81 = "結果老師一聽見聲音就跑了出來……看來你喜歡這種類型啊。"
1012603-82 = "[s]「我，我只打算見面勸勸他就回去的！」"
1012603-86 = "原來如此……是想拒絕其他女人，好讓身為前世戀人的我安心吧……"
1012603-87 = "咿嘻，果然我們是命中注定……我懂你的心意。"
1012603-88 = "[s]「沒有什麼前世啦！」"
1012603-89 = "總之，不能就這樣讓老師回去……"
1012603-90 = "其實我請老師過來，還有另一個目的。"
1012603-94 = "今天是我負責的ASMR的發售日。"
1012603-95 = "我希望……能聽聽老師的評價。"
1012603-96 = "[s]「是鹿江錄的……ASMR嗎？」"
1012603-97 = "沒錯。我在這個領域可是頗具潛力的新人哦。"
1012603-98 = "咿嘻，好奇吧？要不要聽聽看？"
1012603-104 = "來，把這副耳機戴上。"
1012603-106 = "（戴上耳機後，閉上眼睛仔細聆聽）"
1012603-114 = "（……內容是冷淡系少女害羞地唱著搖籃曲）"
1012603-116 = "[ns]「……這，這也是鹿江的聲音？」"
1012603-117 = "嗯，沒錯。是我的聲音。"
1012603-118 = "老師果然不喜歡冷淡系少女唱的搖籃曲嗎……？"
1012603-119 = "[s]「不，不會！非常適合你！」"
1012603-123 = "咿嘻，這樣啊……謝謝你……"
1012603-124 = "作為回禮，這段ASMR就送給你吧。"
1012603-125 = "[s]「完全沒想到這是鹿江的聲音。」"
1012603-126 = "如果你想的話，我還能演出其他聲音哦。"
1012603-127 = "比如怪物或幽靈……甚至連環境音都沒問題。"
1012603-128 = "老師你……喜歡什麼聲音？"
1012603-129 = "只要你開口，我什麼都能做到。"
1012603-130 = "什．麼．都．能．哦。"
1012603-131 = "咿嘻……咿嘻嘻嘻……"
1012603-133 = "（……之後聽著鹿江的各種聲音，被迫享受了一段休息時光）"
1012603-134 = "（周圍聚集的貓和烏鴉似乎也在一起享受的樣子……）"

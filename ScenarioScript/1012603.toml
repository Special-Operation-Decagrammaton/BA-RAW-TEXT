[translation]
1012603-1 = "เสียงของเด็กสาว"
1012603-2 = "(คุณครูกำลังนั่งทำงานตามปกติ...)"
1012603-6 = "[ns] \"เบอร์นี้ไม่รู้จักเลยแฮะ...\""
1012603-7 = "(รับสายก่อนแล้วกัน...)"
1012603-11 = "เอ๋? รับสายแล้วเหรอ...?"
1012603-12 = "สะ... สวัสดีค่ะ? คุณครู [USERNAME] ใช่รึเปล่าคะ?"
1012603-13 = "[s] \"อื้อ ว่าไง\""
1012603-14 = "ว้าว! คุณครู [USERNAME] จริงๆ ด้วย! แหะๆ…"
1012603-15 = "คุณครู... ขอโทษนะคะ แต่ขอคุยแป๊บหนึ่งได้รึเปล่าคะ?"
1012603-16 = "[s] \"ก็ได้อยู่หรอก... ว่าแต่นั่นใครน่ะ?\""
1012603-17 = "อ๊ะ ขอโทษด้วยค่ะ! ฉันเขินมากคงบอกไปไม่ได้หรอกค่ะ...!"
1012603-18 = "ที่จริงแล้วฉัน... เฝ้าดูคุณครูมาตั้งนานแล้วค่ะ"
1012603-19 = "คุณครูอาจจะไม่รู้จักฉัน แต่ฉันรู้จักคุณครูเป็นอย่างดีเลยค่ะ"
1012603-20 = "ฉันตกหลุมรักความใจดีของคุณครูที่คอยดูแลเด็กนักเรียนอย่างใส่ใจเสมอๆ..."
1012603-21 = "วะ... ว่าแต่ว่าคุณครูจะออกมาพบกับฉันหน่อยได้มั้ยคะ?"
1012603-22 = "การได้พบกับคุณครูตามลำพังเป็นสิ่งที่ฉันใฝ่ฝันมาตลอดเลยค่ะ!"
1012603-23 = "[s] (เป็นคำขอที่น่าลำบากใจแฮะ...)"
1012603-24 = "ฮือออ... คะ... คิดแล้วเชียวว่าคงไม่ได้สินะคะ...?"
1012603-25 = "[s1] (เอาเป็นว่าออกไปเจอแล้วพูดให้เข้าใจก่อนดีกว่า...)\n[s2] \"เข้าใจแล้ว งั้นเจอกันที่สวนสาธารณะใกล้ๆ ชาเล่ต์นะ\""
1012603-28 = "ว้าว! ขอบคุณมากเลยค่ะ งั้นฉันจะรอนะคะ!"
1012603-34 = "(คุณครูรีบทำงานให้เสร็จและออกไปที่สวนสาธารณะตามนัด)"
1012603-37 = "[ns] \"เด็กคนนั้นน่าจะอยู่แถวๆ นี้นะ...\""
1012603-38 = "เหมียว~ เหมียวววว~"
1012603-39 = "ก๊าาา~ ก๊าาาา~"
1012603-40 = "[ns] \"ที่สวนนี้มีแมวกับอีกาด้วยเหรอ?\""
1012603-41 = "แปลกจังเวลาที่ออกไปข้างนอก... มักจะมีแมวกับอีกามาอยู่รอบๆ ตัวเสมอเลย..."
1012603-45 = "ถ้าได้ยินเสียงพวกมันแสดงว่าฉันอยู่ที่นั่นด้วย"
1012603-46 = "[s] \"ทำไมคาโนเอะอยู่ที่นี่ล่ะ...?\""
1012603-47 = "ครู... ฉันกำลังรออยู่เลย"
1012603-48 = "[ns3] (รู้สึกถึงอะไรแปลกๆ...)\n[ns4] (หาเส้นทางหลบหนีไว้หน่อยดีกว่า...)"
1012603-51 = "อิฮิฮิ ไม่มีทางหนีหรอกค่ะ"
1012603-52 = "เด็กๆ... ไปจับมา"
1012603-53 = "แง๊ววว! แง๊วๆๆ!!"
1012603-54 = "ก๊าาา! ก๊าาาา!!"
1012603-67 = "(สุดท้ายก็ถูกฝูงแมวกับฝูงอีกาล้อมจับไว้จนหนีไปไหนไม่ได้)"
1012603-69 = "[ns] \"นะ... นี่มันอะไรกัน? ครูแค่มาเจอนักเรียนเฉยๆ นะ!\""
1012603-70 = "นักเรียนคนนั้นคือฉันเอง..."
1012603-74 = "สวัสดีค่ะคุณครู! ขอบคุณที่ออกมานะคะ!"
1012603-75 = "แหะๆ แบบนี้ความฝันของฉันก็เป็นจริงแล้วสินะคะ!"
1012603-76 = "[s5] \"ดะ... เด็กคนนั้นคือคาโนเอะเองเหรอ...?\"\n[s6] \"สะ... เสียงต่างกันสุดๆ เลย?!\""
1012603-79 = "ฉันว่าคุณรู้แล้ว... ฉันเป็นนักแสดงนะ แถมเป็นเด็กเอกวิชาพากย์เสียงด้วย"
1012603-80 = "คราวนี้ก็แค่ลองฝึกเสียงสาวน้อยน่ารักๆ น่ะ"
1012603-81 = "พอได้ยินเสียงน่ารักๆ ก็ออกมาเลยเหรอเนี่ย... ครูมีรสนิยมแบบนี้นี่เอง"
1012603-82 = "[s] \"คะ... ครูคิดว่าจะออกมาคุยด้วยแล้วก็ส่งกลับโรงเรียนต่างหาก!\""
1012603-86 = "อย่างนี้นี่เอง... คุณพยายามปฏิเสธผู้หญิงคนอื่นเพื่อคนรักในชาติก่อนอย่างฉันสินะ..."
1012603-87 = "ฮิฮิ เราสองคนเกิดมาเพื่อกันและกันอย่างที่คิดเลย... ฉันเข้าใจดีเลยละ"
1012603-88 = "[s] \"เราไม่ได้มีเรื่องราวชาติก่อนอะไรสักหน่อย!\""
1012603-89 = "ยังไงก็เถอะ ฉันคงให้ครูกลับไปเฉยๆ ไม่ได้..."
1012603-90 = "ความจริงที่ฉันเรียกครูมา... ฉันมีเหตุผลอื่นด้วยน่ะ"
1012603-94 = "วันนี้เป็นวันที่ ASMR ของฉันวางขายน่ะ"
1012603-95 = "ฉันอยากให้ครูรีวิวสักหน่อย..."
1012603-96 = "[s] \"ASMR... เสียงตัวละครของคาโนเอะเหรอ?\""
1012603-97 = "อื้อ ฉันเป็นดาวรุ่งในวงการนี้เลยนะ"
1012603-98 = "ฮิฮิ อยากรู้ล่ะสิ? ลองฟังหน่อยมั้ยล่ะ?"
1012603-104 = "เอ้า ใส่หูฟังนี่สิ"
1012603-106 = "(หลังใส่หูฟังแล้ว คุณครูก็หลับตาและฟังเสียงจากเครื่องเล่น)"
1012603-114 = "(...เสียงที่ได้ยินเป็นเด็กสาวสายซึนที่กำลังร้องเพลงกล่อมเด็กด้วยความเขินอาย...)"
1012603-116 = "[ns] \"นะ... นี่เสียงคาโนเอะเหรอ?\""
1012603-117 = "อะ... อื้ม เสียงฉันเอง"
1012603-118 = "คิดแล้วเชียวว่าเด็กซึนๆ ที่ร้องเพลงกล่อมเด็กคงไม่ใช่สไตล์ที่คุณชอบสินะ...?"
1012603-119 = "[s] \"ปะ... เปล่านะ! มันก็เหมาะกับเธอดีออก!\""
1012603-123 = "ฮิฮิ งั้นเหรอ... ขอบคุณนะ..."
1012603-124 = "งั้นฉันให้ไฟล์ ASMR อันนั้นเป็นของขวัญแล้วกัน "
1012603-125 = "[s] \"นึกไม่ถึงเลยว่าจะเป็นเสียงของคาโนเอะน่ะ\""
1012603-126 = "ฉันทำเสียงอื่นได้ด้วยนะ ถ้าอยากได้น่ะ"
1012603-127 = "เสียงสัตว์ประหลาดหรือเสียงผี... หรือเสียงสภาพแวดล้อมทั่วไปก็ได้"
1012603-128 = "ครู... ชอบเสียงแบบไหนเหรอ?"
1012603-129 = "บอกมาสิ ฉันทำได้ทุกเสียงเลย"
1012603-130 = "ได้-ทุก-เสียง-เลย"
1012603-131 = "ฮิฮิ... อิฮิฮิฮิ...!"
1012603-133 = "(หลังจากนั้นคุณครูถูกบังคับให้นั่งพักและฟังคาโนเอะทำเสียงต่างๆ)"
1012603-134 = "(ฝูงแมวและฝูงอีกาที่มารวมตัวกันอยู่รอบๆ ก็ดูจะเพลิดเพลินไปกับการพักผ่อนเช่นกัน...)"

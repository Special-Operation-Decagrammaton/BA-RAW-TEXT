[translation]
1012603-1 = "A Girl's Voice"
1012603-2 = "I was having a normal work day when..."
1012603-6 = "[ns] \"I don't know this number...\""
1012603-7 = "...I decided to pick up for now."
1012603-11 = "Huh? Are you there...?"
1012603-12 = "H-Hello? Is this [USERNAME]-Sensei?"
1012603-13 = "[s] \"Yes it is. Hello.\""
1012603-14 = "Whoa! It really is you, [USERNAME]-Sensei! Heehee..."
1012603-15 = "Sensei, listen. Sorry to bother you, but can we talk for a minute?"
1012603-16 = "[s] \"Sure...but who is this?\""
1012603-17 = "Ah! I'm sorry! I-I'm too shy to tell you...!"
1012603-18 = "The thing is...I've been watching you for a while."
1012603-19 = "I don't think you know me, but I feel like I know you pretty well."
1012603-20 = "You're always so good to your students, and I... I think I feel a certain way about you..."
1012603-21 = "S-So...would you be able to come see me?"
1012603-22 = "That's my biggest wish, to meet you, just the two of us."
1012603-23 = "[s] \"(This could be trouble.)\""
1012603-24 = "Uhh... I-If it's not any trouble, of course..."
1012603-25 = "[s1] \"(...I should meet her just to set her straight.)\"\n[s2] \"Okay. I'll see you at the park near Schale.\""
1012603-28 = "Yay! Thank you so much! I'll be waiting for you!"
1012603-34 = "I got caught up with work, took a break, and went out to the park."
1012603-37 = "[ns] \"She should be somewhere around here...\""
1012603-38 = "Meow. Meooow."
1012603-39 = "Caw. Cacaw."
1012603-40 = "[ns] \"...Have there always been this many cats and crows around here?\""
1012603-41 = "It's strange... Crows and black cats always gather when I step outside."
1012603-45 = "When you hear their calls, you can expect to see me."
1012603-46 = "[s] \"Kanoe... Can I ask why you're here?\""
1012603-47 = "I've been waiting for you, Sensei."
1012603-48 = "[ns3] \"(Something doesn't feel right...)\"\n[ns4] \"(Okay, what's the best escape route...?)\""
1012603-51 = "Eheehee, I'm afraid there's no escape."
1012603-52 = "Everyone, after Sensei!"
1012603-53 = "Meow! Meooow!!"
1012603-54 = "Caw! Cacaw!!"
1012603-67 = "...The cats and crows surrounded me until I gave up on running."
1012603-69 = "[ns] \"Wh-What's happening? I just came here to see a student!\""
1012603-70 = "Yes. And that student was me..."
1012603-74 = "So hello, Sensei! Thank you for coming!"
1012603-75 = "Heehee, my wish has been granted!"
1012603-76 = "[s5] \"Th-That girl was you...?\"\n[s6] \"B-But your voices were completely different!\""
1012603-79 = "I thought you knew I was an actress. A voice actress as well."
1012603-80 = "What you heard was my \"cute girl\" voice."
1012603-81 = "And it brought you out here, so...that cuteness must be what appeals to you, Sensei."
1012603-82 = "[s] \"I-I was going to talk it out with her and send her back!\""
1012603-86 = "I see. So you were going to turn down other girls for me, your lover from our past life."
1012603-87 = "Heehee, truly, fate has spun us a wonderful web. And I understand you just as well I did so many years ago..."
1012603-88 = "[s] \"We had no such previous lives!\""
1012603-89 = "In any case, I can't send you back like this, Sensei..."
1012603-90 = "I called you here...for a different reason."
1012603-94 = "I produced an ASMR track, and it's just been released today."
1012603-95 = "So I wanted to...hear your opinion of it."
1012603-96 = "[s] \"ASMR, huh? Is it your voice, as one of your characters?\""
1012603-97 = "Indeed. Within that niche, they apparently consider me a prodigy."
1012603-98 = "Heehee, does that intrigue you enough to take a listen?"
1012603-104 = "Here, take these earbuds."
1012603-106 = "I put in the earbuds, then slowly closed my eyes and listened."
1012603-114 = "...I heard a blunt girl bashfully singing a lullaby."
1012603-116 = "[ns] \"Is that really your voice?\""
1012603-117 = "One of my voices, yes."
1012603-118 = "Perhaps that particular character might not be to your taste, but..."
1012603-119 = "[s] \"Oh, I didn't mean that! You sound great!\""
1012603-123 = "Heehee, I see... Thank you..."
1012603-124 = "Please keep that recording as a gift."
1012603-125 = "[s] \"I wouldn't have known that was you. Good range.\""
1012603-126 = "I can do other voices if you like."
1012603-127 = "Monsters, ghosts...even environmental sounds."
1012603-128 = "What kind of voice do you like, Sensei?"
1012603-129 = "Tell me. I can do anything."
1012603-130 = "A-ny-thing."
1012603-131 = "Heehee... Eheeheehee..."
1012603-133 = "I listened to Kanoe's different voices. The break ran longer than I planned."
1012603-134 = "The cats and crows also gathered around to listen too."

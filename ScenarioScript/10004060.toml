[translation]
10004060-1 = "第6話;亂糟糟捕獲大作戰"
10004060-2 = "首先，第一個作戰計畫……"
10004060-3 = "名為「起司作戰」！"
10004060-4 = "[s] 「起司作戰……？」"
10004060-5 = "沒錯。就像老鼠無法忽略起司一樣，小孩子看到糖果或甜食也無法無視對吧？"
10004060-6 = "所以我準備了塗上解藥的特製糖果！"
10004060-11 = "對年幼的旬來說，這肯定是無法抗拒的誘惑！"
10004060-12 = "[s] 「這個作戰，能釣到的只有沙耶吧……？」"
10004060-13 = "少，少囉嗦！#n我也不是看到任何起司都會往嘴裡塞的！"
10004060-14 = "啊，為了執行這個作戰，穿平時的衣服是行不通的，所以我準備了面罩。#n來，戴上試試吧！"
10004060-20 = "嗯，很完美！任誰都看不出是[USERNAME]老師！"
10004060-21 = "[s] 「總覺得這個面罩……呼吸起來很困難……」"
10004060-22 = "這也是作戰的一環，不用在意這種小細節！"
10004060-23 = "來，作戰開始！"
10004060-28 = "嗚……一定被老師發現了……"
10004060-29 = "知道至今為止的事都是我做的話，應該會幻滅吧……"
10004060-30 = "[s] 「哈啊，哈啊……那邊的，小妹妹…」"
10004060-32 = "……咦？"
10004060-33 = "你，你是誰？為什麼戴著面罩，而且還氣喘吁吁的……？"
10004060-34 = "[s] 「哈啊，哈啊……要不要，吃糖果呀……？」"
10004060-40 = "……不用了。"
10004060-41 = "老師說過，不要輕易接受陌生人的食物。"
10004060-42 = "[s1] 「不要緊，我不會做什麼奇怪的事……哈啊，哈啊……」\n[s2] 「求你了，舔一口就好，好嗎……？」"
10004060-43 = "……不要。"
10004060-44 = "……不要。"
10004060-45 = "再靠近的話，我就要叫警察姐姐了！"
10004060-50 = "……行不通嗎。"
10004060-51 = "[s] 「……行不通呢。」"
10004060-52 = "嘛，沒關係！任何天才都不是一開始就成功的！"
10004060-53 = "重振精神，繼續下一個作戰！"
10004060-55 = "第二個作戰……"
10004060-56 = "名為「陷阱作戰」！"
10004060-57 = "[s] 「陷阱作戰？」"
10004060-58 = "嗯。儘管很老套，但要抓老鼠的話，捕鼠器在某種程度上來說是最佳方法。"
10004060-59 = "基於同樣的靈感，我製作了這個特製陷阱！"
10004060-64 = "一旦被踩到就會釋放具有強力麻痺效果的氣體，讓人暫時無法動彈。"
10004060-65 = "[s] 「不會很危險嗎……？」"
10004060-66 = "沒事沒事。這個氣體的威力雖然很強，但持續時間不長，很快就會恢復正常。"
10004060-67 = "……應該吧。"
10004060-68 = "[s] 「應該！？」"
10004060-69 = "這，這種細節就別在意了！當務之急是抓到旬！"
10004060-70 = "那麼，先來設置一下吧？"
10004060-76 = "設置完成，剩下就等旬出現了！"
10004060-77 = "[s] 「對學生使用這麼兇惡的東西真的好嗎……」"
10004060-78 = "別說那種喪氣話啊。#n再說了，這一切都是為了旬！"
10004060-79 = "啊，旬來了！老師，快躲起來！"
10004060-86 = "我應該沒有做什麼壞事吧……"
10004060-87 = "我只是想跟梅花園的孩子們一樣自由自在地生活……"
10004060-92 = "……？"
10004060-93 = "（踩到了……！）"
10004060-97 = "哎呀，好險。差點就踩到……看起來很貴的機器了呢。"
10004060-99 = "哎呀，這裡也有……？"
10004060-102 = "這裡也是？"
10004060-104 = "看來是有人在搬東西的時候不小心灑了一地呢。"
10004060-109 = "迴避速度竟然比陷阱觸發的速度還快！？"
10004060-110 = "好，既然如此，就直接用扔的吧！"
10004060-111 = "看招！"
10004060-121 = "在路上亂丟東西的壞孩子是誰？#n差點就害別人受傷了哦！"
10004060-122 = "……真是的，回去之後得好好提醒梅花園的孩子們做好資源回收才行。"
10004060-128 = "居然能狙擊半空中的投擲物……真不簡單。"
10004060-129 = "[s] 「不愧是旬……」"
10004060-130 = "不管怎樣，快點繼續下一個作戰吧！"
10004060-131 = "[s3] 「話說回來，沙耶，我們的身體好像……」\n[s4] 「感覺四肢都麻痺了……」"
10004060-134 = "哼～哼哼哼……"
10004060-135 = "只是在空中爆炸就能讓身體麻痺成這樣……不愧是我的發明，麻痺效果顯著！"
10004060-136 = "……還真是厲害，我的身體到現在還是麻的。"
10004060-137 = "總之就先等麻痺感退去吧……"
10004060-139 = "果然就算變年輕了，依然還是梅花園的教官呢。"
10004060-140 = "居然能接連破解我想出的方法……"
10004060-141 = "沒辦法，本來是不想使用這個方法的……#n但面對不聽話的孩子，也只能使用這個最終手段了。"
10004060-142 = "[s5] 「是，是什麼方法……？」\n[s6] （吞口水）"
10004060-145 = "不聽話的孩子……"
10004060-146 = "就要用大人的力量壓制！"
10004060-147 = "即便是旬，只要出其不意的話，也能靠體型的差距讓他暫時無法動彈吧？"
10004060-148 = "我傳達出手的時機點後，老師讓旬暫時停下動作，我再趁機強行餵藥……"
10004060-149 = "[s] 「有必要做到這種程度嗎……？」"
10004060-150 = "這也是不得已的！為了我的研究……"
10004060-151 = "不，是為了旬！"
10004060-152 = "不讓他好好吃下解藥的話，旬可是有可能無法復原的哦……！"
10004060-153 = "[s] 「唔嗯，光憑我的力氣壓得住嗎……」"
10004060-154 = "那麼，我先去那邊監視，老師先躲在這裡，一收到信號就襲擊旬！"
10004060-156 = "……總覺得今天遇到特別多奇怪的人。#n只要身體小就容易遇到怪人嗎……必須小心一點。"
10004060-157 = "尤其是剛才蒙面的人，看起來相當危險……"
10004060-158 = "趁現在，老師！抓住旬！"
10004060-164 = "[ns] 「嗨，旬。」"
10004060-165 = "老，老師？嚇我一大跳，你怎麼突然出現在這裡……？"
10004060-166 = "啊，那個，話說回來，這副身體，是因為……"
10004060-168 = "咦，老師？怎麼突然抓住我的手臂……？"
10004060-169 = "[s7] 「……抱歉了，旬。」\n[s8] 「這都是為了你啊！」"
10004060-170 = "等等，咦！？#n不，那個，這是怎麼回事……！？"
10004060-171 = "等等，咦！？#n不，那個，這是怎麼回事……！？"
10004060-173 = "哈～哈哈！做得好，老師！不能放過這個機會！"
10004060-174 = "是時候吃藥了！來，做好覺悟吧！"
10004060-175 = "什麼，沒想到老師竟然會……！我明明這麼相信老師！"
10004060-176 = "不要！我不想回到原本的身體！"
10004060-177 = "喂，別鬧了！乖乖地張開嘴！"
10004060-178 = "嗚……誰，誰來……！"
10004060-180 = "誰來救救我啊啊啊啊！！！"
10004060-182 = "……老師？"
10004060-185 = "為什麼在路中央抓著年幼少女的手臂，還強迫他張開嘴巴呢……？"
10004060-186 = "[s9] 「這，這是誤會，桐乃！」\n[s10] 「不，後半段不是我，是沙耶……」"
10004060-195 = "警察姐姐！請救救我……！"
10004060-199 = "……我大致了解情況了。"
10004060-201 = "詳細情形等回到局裡再跟我解釋吧！"
10004060-202 = "[s] 「等等，我沒有做壞事啊！？」"
10004060-208 = "（之後被桐乃帶走，和沙耶一起以正坐的姿勢被教訓了好長一段時間）"

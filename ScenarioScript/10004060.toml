[translation]
10004060-1 = "ตอนที่ 6;กลยุทธ์การจับกุมที่หละหลวม"
10004060-2 = "วิธีแรกที่จะทำให้ชุนยอมกินยา..."
10004060-3 = "นั่นก็คือ \"ปฏิบัติการชีสแสนอร่อย\" ไงล่ะ!"
10004060-4 = "[s] \"ปฏิบัติการชีสแสนอร่อย?\""
10004060-5 = "อื้อ เหมือนกับพวกหนูที่ไม่สามารถอดทนต่อชีสแสนอร่อยได้ พวกเด็กเล็กๆ น่ะ เวลาเจอลูกกวาดอร่อยๆ ก็เป็นต้องยอมสยบทุกรายนั่นแหละ"
10004060-6 = "เพราะงั้นฉันเลยเตรียมลูกกวาดพิเศษที่เคลือบยาแก้ผลข้างเคียงมาด้วยไงล่ะ!"
10004060-11 = "ถ้าเอาลูกกวาดนี่ให้ลิตเติ้ลชุนกินล่ะก็ เธอคงจะยอมกินโดยไม่สงสัยอะไรแน่นอน!"
10004060-12 = "[s] \"คนที่จะตกหลุมพรางแบบนั้นมีแค่เธอนั่นแหละ\""
10004060-13 = "หนวกหูน่า! ฉันไม่ได้กินชีสทุกอันที่ขวางหน้าสักหน่อยนะ!"
10004060-14 = "แต่ว่าถ้าเดินเข้าไปหาชุนแบบโต้งๆ เธอคงจะสงสัยฉันแน่นอน เพราะงั้นฉันเลยเตรียมหน้ากากปกปิดใบหน้ามาด้วยแล้วไงล่ะ ลองใส่ดูสิ!"
10004060-20 = "โอ้ เป็นการปลอมตัวที่สมบูรณ์แบบเลยล่ะ เธอต้องคิดไม่ถึงแน่ๆ ว่าเป็นคุณครู [USERNAME]!"
10004060-21 = "[s] \"ใส่หน้ากากแบบนี้มันหายใจไม่ออกนะ...\""
10004060-22 = "อย่าคิดเล็กคิดน้อยไปเลยน่า ทั้งหมดนี่ก็เพื่อแผนการที่สมบูรณ์แบบนะ"
10004060-23 = "งั้นก็รีบๆ ไปซะล่ะ!"
10004060-28 = "สะ... สุดท้ายคุณครูก็รู้ตัวจริงของฉันจนได้..."
10004060-29 = "คุณครูคงจะเกลียดที่ฉันแกล้งทำเป็นเด็กๆ งอแงแบบนี้แน่ๆ เลย..."
10004060-30 = "[s] \"แฮ่กๆ... นี่... แม่หนูน้อย\""
10004060-32 = "คะ...?"
10004060-33 = "คะ... ใครน่ะ? สะ...ใส่หน้ากากตอนกลางวันแบบนี้ทำไมกันน่ะคะ?"
10004060-34 = "[s] \"คือว่า... ลองกินขนมนี่หน่อยมั้ย?\""
10004060-40 = "ไม่เอาค่ะ..."
10004060-41 = "คุณครูสอนเอาไว้ว่าไม่ให้กินขนมที่คนแปลกหน้าเอามาให้ค่ะ"
10004060-42 = "[s1] \"ครู...เอ้ย ฉันไม่ใช่คนแปลกหน้านะ แฮ่กๆ...\"\n[s2] \"ไม่เป็นไรหรอก กินแค่อันเดียวก็ได้\""
10004060-43 = "ผู้ใหญ่ที่ดูน่าสงสัยนี่..."
10004060-44 = "ผู้ใหญ่ที่ดูน่าสงสัยนี่..."
10004060-45 = "ถะ...ถ้าเข้ามาใกล้จะเรียกตำรวจนะคะ!"
10004060-50 = "ล้มเหลวสินะ..."
10004060-51 = "[s] \"อื้อ ไม่ได้ผลล่ะ...\""
10004060-52 = "ก็นะ ไม่เป็นไรหรอก! ฉันเองก็ไม่คิดว่ามันจะสำเร็จตั้งแต่แรกอยู่แล้วล่ะ!"
10004060-53 = "ถ้างั้นเราใช้แผนต่อไปกันเถอะ!"
10004060-55 = "วิธีที่สองที่จะทำให้ชุนยอมกินยา..."
10004060-56 = "นั่นก็คือ \"ปฏิบัติการกับดัก\" ไงล่ะ!"
10004060-57 = "[s] \"ปฏิบัติการกับดัก?\""
10004060-58 = "อื้อ ก็กับดักที่จะใช้จับหนูและทำให้มันเคลื่อนที่ไม่ได้น่ะมีตั้งหลายรูปแบบ..."
10004060-59 = "ฉันได้ไอเดียมาจากกับดักหนูเลยเตรียมอุปกรณ์มาแล้ว อุปกรณ์พิเศษสำหรับดักจับคนของท่านซายะ!"
10004060-64 = "ถ้าเหยียบลงบนกับดักอันนี้ล่ะก็ มันจะปล่อยก๊าซที่ทำให้เคลื่อนไหวไม่ได้สักพักหนึ่งออกมา"
10004060-65 = "[s] \"ใช้กับดักแบบนั้นกับเด็กตัวเล็กๆ ได้งั้นเหรอ?\""
10004060-66 = "ไม่เป็นไรหรอก ไม่เป็นไรๆ ถึงจะเป็นก๊าซพิษรุนแรงที่ทำให้เคลื่อนไหวไม่ได้ แต่พอเวลาผ่านไป#nสักพักหนึ่งก็จะกลับมาเป็นปกติ"
10004060-67 = "คิดว่างั้นนะ..."
10004060-68 = "[s] \" \"คิดว่า\" งั้นเรอะ?!\""
10004060-69 = "อืม... อย่าไปสนใจเรื่องเล็กๆ น้อยๆ เลยน่า!"
10004060-70 = "ถ้างั้นเรามาติดตั้งกับดักกันในเส้นทางที่ชุนจะเดินผ่านดีมั้ย?"
10004060-76 = "ติดตั้งเสร็จแล้วล่ะ! ตอนนี้ก็เหลือแค่รอให้ชุนเดินผ่านมาเท่านั้นแล้ว"
10004060-77 = "[s] \"ใช้อุปกรณ์ที่ดูโหดร้ายแบบนี้กับเด็กได้ใช่มั้ยนะ...\""
10004060-78 = "อย่ามาพูดจาอ่อนแอน่า! เราทำเพื่อชุนต่างหากล่ะ"
10004060-79 = "อ๊ะ ชุนมาแล้ว! รีบไปหลบเร็วๆ เข้าเถอะครู!"
10004060-86 = "พอมาคิดดูแล้ว... ฉันก็ไม่ได้ทำผิดอะไรขนาดนั้นสักหน่อยนี่นา?"
10004060-87 = "ฉันก็แค่อยากจะวิ่งเล่นได้อย่างอิสระเหมือนเด็กๆ ในสวนต้นบ๊วยบ้างก็แค่นั้นเอง..."
10004060-92 = "เอ๊ะ...?"
10004060-93 = "(เหยียบแล้ว!)"
10004060-97 = "กะ...เกือบไปแล้วสินะ มัวแต่คิดเรื่องอื่นซะจนเกือบเผลอเดินเหยียบอุปกรณ์ไฟฟ้าราคาแพงเข้าแล้ว"
10004060-99 = "เอ๊ะ? ตรงนี้ก็มี...?"
10004060-102 = "ตรงนี้ก็มีเหมือนกัน?"
10004060-104 = "เหมือนจะมีใครขนของแล้วทำตกเอาไว้สินะคะ..."
10004060-109 = "ทำไมถึงหลบกับดักได้รวดเร็วแบบนั้นเลยล่ะ?"
10004060-110 = "ฮึ่ย ถ้าเป็นแบบนี้คงไม่มีทางเลือกอื่นนอกจากโยนระเบิดที่ทำให้เป็นอัมพาตไปซะ!"
10004060-111 = "เจอนี่ซะ!"
10004060-121 = "เด็กนิสัยเสียที่ไหนโยนขวดลงมาบนถนนตามอำเภอใจแบบนี้กันนะ? เกือบมีคนบาดเจ็บแล้วนะคะ!"
10004060-122 = "จริงๆ เลยเชียว ถ้ากลับไปแล้ว คงจะต้องเตือนนักเรียนเรื่องกฎการแยกขยะกันสักหน่อยแล้วล่ะค่ะ"
10004060-128 = "ไม่คิดเลยว่าจะหลบระเบิดแบบนั้นได้... ไม่ได้ผลอีกแล้วแหะ"
10004060-129 = "[s] \"อื้อ ไม่ได้ผลล่ะ...\""
10004060-130 = "ถ้างั้นเราใช้แผนต่อไปกันเถอะ!"
10004060-131 = "[s3] \"แต่ว่าตอนนี้ตัวครูขยับไม่ได้เลยนะ...\"\n[s4] \"แขนกับขาครูมันไม่ยอมขยับเลย...\""
10004060-134 = "ฮุฮุฮุ..."
10004060-135 = "ถึงจะระเบิดในอากาศแต่ก็ยังทำให้เคลื่อนไหวไม่ได้แบบนี้... สมแล้วที่เป็นสิ่งประดิษฐ์ของท่านซายะ!"
10004060-136 = "ถึงจะพูดแบบนั้นก็เถอะ... แต่ตอนนี้ฉันเองก็ขยับตัวไม่ได้เหมือนกัน..."
10004060-137 = "ก่อนอื่นตอนนี้เราก็ต้องรอจนกว่าร่างกายจะขยับได้..."
10004060-139 = "สมแล้วที่เป็นผู้ฝึกสอนแห่งสวนต้นบ๊วย ถึงร่างกายจะหดเล็กลงแต่ก็ยังเก่งกาจเหมือนเดิมเลยนะ"
10004060-140 = "ฉันไม่เคยคิดมาก่อนเลยว่าเธอจะหลบกับดักได้รวดเร็วขนาดนั้น..."
10004060-141 = "ฉันไม่อยากใช้วิธีนี้หรอกนะ... แต่คงช่วยไม่ได้แล้วล่ะ วิธีรับมือกับเด็กดื้อที่พูดไม่ฟัง!"
10004060-142 = "[s5] \"เด็กดื้อต้องโดนอะไรเหรอ...?\"\n[s6] กลืนน้ำลายแห้งด้วยสีหน้าที่หวาดกลัว"
10004060-145 = "นั่นก็คือ..."
10004060-146 = "ใช้กำลังของผู้ใหญ่จับกดยังไงล่ะ!"
10004060-147 = "ถึงลิตเติ้ลชุนจะแรงเยอะแค่ไหน แต่ถ้าผู้ใหญ่อย่างคุณครูจับเธอกดไว้กับพื้นก็คงจะขยับตัวไม่ได้อยู่ดี"
10004060-148 = "ฉันจะคอยให้สัญญาณจากตรงนั้น คุณครูก็จับลิตเติ้ลชุนเอาไว้ให้ดีล่ะ แล้วฉันจะบังคับป้อนยาให้เธอเอง"
10004060-149 = "[s] \"ต้องทำถึงขั้นนั้นเลยเหรอ...\""
10004060-150 = "พูดอะไรน่ะ! นี่ก็เพื่องานวิจัยของฉัน..."
10004060-151 = "ไม่สิ เพื่อชุนต่างหากล่ะ!"
10004060-152 = "ถ้าไม่ตัดใจทำแบบนี้ล่ะก็ ชุนอาจจะไม่กลับมาเป็นเหมือนเดิมก็ได้นะ!"
10004060-153 = "[s] \"ถ้างั้นก็ช่วยไม่ได้นะ...\""
10004060-154 = "เอาล่ะ ฉันจะออกไปดูลาดเลาให้เอง คุณครูก็ซ่อนตัวอยู่ตรงนี้เงียบๆ พอฉันให้สัญญาณ#nคุณครูก็ไปจับเธอกดไว้เลยนะ!"
10004060-156 = "เหมือนรู้สึกว่าวันนี้จะเจอคนแปลกๆ เยอะจังเลยนะคะ..."
10004060-157 = "เมื่อกี้ก็เจอคนสวมหน้ากากที่มีท่าทางแปลกๆ... ต้องระวังตัวหน่อยแล้วล่ะค่ะ"
10004060-158 = "เอาล่ะ ตอนนี้ล่ะคุณครู! รีบออกมาจับตัวชุนไว้เร็ว!"
10004060-164 = "[ns] \"ว่าไง ชุน\""
10004060-165 = "คะ... คุณครู? หายไปไหนมาคะ?"
10004060-166 = "คือว่าเรื่องเมื่อก่อนหน้านี้..."
10004060-168 = "เอะ.. เอ๋? คุณครู? ทำไมจู่ๆ ถึงมาจับแขนฉันไว้ล่ะคะ?"
10004060-169 = "[s7] \"ขอโทษนะ ชุน...\"\n[s8] \"ครูทำแบบนี้ก็เพื่อตัวเธอนะ!\""
10004060-170 = "คะ? คุณครูพูดถึงเรื่องอะไร..."
10004060-171 = "คะ? คุณครูพูดถึงเรื่องอะไร..."
10004060-173 = "ฮ่าฮ่าฮ่า! ทำได้ดีมากคุณครู! ถึงจะเป็นเด็กที่ว่องไวแค่ไหน แต่ถ้าถูกผู้ใหญ่จับเอาไว้ล่ะก็#nคงจะหนีไม่ได้หรอกใช่มั้ยล่ะ!"
10004060-174 = "ถ้าเป็นแบบนี้ก็ทำให้เธอกินยาได้อย่างสบายใจแล้วล่ะ!"
10004060-175 = "คุณครูหลอกฉันเหรอคะ! ฉันอุตส่าห์ไว้ใจคุณครูนะคะ!"
10004060-176 = "ปะ...ปล่อยนะคะ! ฉันไม่อยากกลับไปเป็นเหมือนเดิมค่ะ!"
10004060-177 = "ยัยเปี๊ยกนี่ เลิกดิ้นซะทีสิ! แบบนี้ฉันให้เธอกินยาไม่ได้นะ!"
10004060-178 = "ฮือ... ไม่เอา... ใครก็ได้..."
10004060-180 = "ใครก็ได้ช่วยฉันด้วยค่ะ!"
10004060-182 = "คุณครู...?"
10004060-185 = "ทำไมถึงล็อกตัวเด็กตัวเล็กๆ กลางถนนแบบนี้แล้วพยายามให้เธออ้าปากแบบนั้นล่ะคะ?"
10004060-186 = "[s9] \"นี่...นี่มันเรื่องเข้าใจผิดนะ คิริโนะ\"\n[s10] \"ให้อธิบายตอนนี้คงลำบาก...\""
10004060-195 = "อ๊ายยย พี่สาวตำรวจ! นะ...น่ากลัวจังเลยยยย!"
10004060-199 = "ฉันเข้าใจสถานการณ์แล้วค่ะ"
10004060-201 = "ขอเชิญคุณครูไปให้ปากคำที่สถานีแล้วกันนะคะ!"
10004060-202 = "[s] \"ครูไม่ได้ทำอะไรผิดสักหน่อย!\""
10004060-208 = "(หลังจากนั้นคุณครูก็ถูกคิริโนะพาตัวไปที่สถานีตำรวจและถูกสอบปากคำอย่างละเอียด)"

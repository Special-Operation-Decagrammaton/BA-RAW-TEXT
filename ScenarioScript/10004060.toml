[translation]
10004060-1 = "Episode 6;Reckless Capture Mission"
10004060-2 = "The easiest way to make Shun take the antidote is..."
10004060-3 = "...Operation: Cheese!"
10004060-4 = "[s] \"Operation: Cheese?\""
10004060-5 = "Yes. Just like rats can't resist a piece of cheese, little kids can't say no to candy!"
10004060-6 = "So I've prepared a special candy coated with the antidote!"
10004060-11 = "I'm sure she'll pop it into her mouth the moment I hand it to her!"
10004060-12 = "[s] \"I think only you would fall for something like that.\""
10004060-13 = "Shut up! It's not like I'll put just any old cheese in my mouth!"
10004060-14 = "Anyway, Shun won't trust you if you show up as yourself, so I've prepared a mask for you. Try it!"
10004060-20 = "Oh, what a perfect disguise! No one would ever think you're [USERNAME] Sensei!"
10004060-21 = "[s] \"It's kind of hard to breathe in this mask...\""
10004060-22 = "Don't sweat the details. It's all in the name of a perfect operation."
10004060-23 = "Well, good luck!"
10004060-28 = "Ugh. Sensei found out about everything in the end."
10004060-29 = "They must hate me for pretending to be a kid and throwing those tantrums."
10004060-30 = "[s] \"*pant* *pant* Hey there, little lady.\""
10004060-32 = "Huh?"
10004060-33 = "Wh-Who are you? And why are you wearing a mask in broad daylight?"
10004060-34 = "[s] \"Do you want some candy?\""
10004060-40 = "No."
10004060-41 = "You are a literal stranger with candy."
10004060-42 = "[s1] \"I'm not suspicious! *pant* *pant*\"\n[s2] \"It's okay. Just take it.\""
10004060-43 = "How dumb do you think I am?!"
10004060-44 = "How dumb do you think I am?!"
10004060-45 = "If I see you or your stupid candy ever again, you're going on a watch list!"
10004060-50 = "Failure."
10004060-51 = "[s] \"Failure.\""
10004060-52 = "Well, that's okay! You can't always expect the trial run to work out!"
10004060-53 = "On to our next operation!"
10004060-55 = "The second way to make Shun take the antidote is..."
10004060-56 = "...Operation: Trap!"
10004060-57 = "[s] \"Operation: Trap?\""
10004060-58 = "Yeah. A mousetrap has several devices to immobilize a mouse and catch it, right?"
10004060-59 = "That gave me an idea. It's a special oversized trap, prepared by yours truly!"
10004060-64 = "When the target steps on this trap, a powerful paralytic gas is expelled and renders them unable to move for a short time."
10004060-65 = "[s] \"This sounds incredibly illegal.\""
10004060-66 = "It's fine, it's fine. I can assure you this paralytic gas falls squarely into regulatory gray areas. Also, no side effects!"
10004060-67 = "...Probably."
10004060-68 = "[s] \"Probably?!\""
10004060-69 = "You're getting hung up on the details again. Focus, please!"
10004060-70 = "Let's place the traps where Shun might pass."
10004060-76 = "Placement complete! Now, all we gotta do is wait for Shun to show up."
10004060-77 = "[s] \"This seems like a bit much...\""
10004060-78 = "Don't be such a baby. If Shun didn't want to be incapacitated, she should have cooperated the first time."
10004060-79 = "Oh, she's coming! Hide, Sensei!"
10004060-86 = "You know, is what I'm doing so wrong?"
10004060-87 = "All I want is to live freely, like the kids at Plum Blossom Garden..."
10004060-92 = "Huh?"
10004060-93 = "(She stepped on it!)"
10004060-97 = "Th-That was close. I was so distracted that I almost stepped on that. What is it?"
10004060-99 = "Huh? Here too..."
10004060-102 = "And here?"
10004060-104 = "Someone must have dropped a bunch of stuff they were carrying."
10004060-109 = "How can she react faster than the traps?"
10004060-110 = "All right, no matter! That's why I prepared my own paralytic bomb!"
10004060-111 = "Take this!"
10004060-121 = "Who's the punk throwing bottles into the street? I almost got hurt!"
10004060-122 = "Seriously, I'm gonna have to remind the students about the recycling rules when I get back."
10004060-128 = "Okay, well, that's another failure."
10004060-129 = "[s] \"Failure.\""
10004060-130 = "We'd better prepare the next operation."
10004060-131 = "[s3] \"I can't move a muscle.\"\n[s4] \"I can't feel my arms or legs.\""
10004060-134 = "Hahaha..."
10004060-135 = "You've got to admit, I make some pretty potent stuff!"
10004060-136 = "Yep! I'm so impressed...that I can't move my arms or legs either!"
10004060-137 = "New plan: Let's wait until the paralysis wears off."
10004060-139 = "They say an old eagle is better than a young crow. I guess she's still the senior instructor of Plum Blossom Garden."
10004060-140 = "I never expected her to navigate my traps so quickly..."
10004060-141 = "I was holding one final plan in reserve. I had no intention of unleashing it...until now."
10004060-142 = "[s5] \"Wh-What is it?\"\n[s6] Gulp nervously and look afraid."
10004060-145 = "I shall..."
10004060-146 = "...crush her with the power of adulthood!"
10004060-147 = "No matter how young and nimble Shun is now, you can still overpower her, Sensei."
10004060-148 = "I'll signal you from over there. Then, you grab Shun, and I'll get her with the antidote."
10004060-149 = "[s] \"Is this really necessary?\""
10004060-150 = "What are you saying? This is all for my research."
10004060-151 = "I mean, it's for Shun!"
10004060-152 = "We have to be resolute, or Shun may never return to her original form!"
10004060-153 = "[s] \"I guess that's true, but...\""
10004060-154 = "All right. I'll go ahead and keep watch. You go hide quietly, and when I give you the signal, grab Shun!"
10004060-156 = "I've been seeing a lot of weird people on the streets today for some reason."
10004060-157 = "Like that total creeper in the mask... I need to be careful."
10004060-158 = "Now, Sensei. Get Shun!"
10004060-164 = "[ns] \"Hi, Shun.\""
10004060-165 = "S-Sensei? Where have you been?"
10004060-166 = "So, about before..."
10004060-168 = "H-Huh? Sensei? Why are you grabbing my arm all of a sudden?"
10004060-169 = "[s7] \"Sorry, Shun...\"\n[s8] \"We're just trying to help you!\""
10004060-170 = "What? I-I don't understand..."
10004060-171 = "What? I-I don't understand..."
10004060-173 = "Hahaha! Great job, Sensei! She's not going anywhere now!"
10004060-174 = "You're taking this antidote, and that's that!"
10004060-175 = "You tricked me, Sensei! I trusted you!"
10004060-176 = "L-Let me go! I don't want to go back to who I was!"
10004060-177 = "Hey, stop squirming! You're making this impossible!"
10004060-178 = "I don't wanna. Somebody, please..."
10004060-180 = "Somebody! Please help me!"
10004060-182 = "Sensei?"
10004060-185 = "Why, exactly, are you grabbing a small girl in the middle of the street and trying to force her mouth open?"
10004060-186 = "[s9] \"Th-This isn't what it looks like, Kirino!\"\n[s10] \"I have a perfectly good explanation...\""
10004060-195 = "Police lady! I was so scared!"
10004060-199 = "I think I know what's going on."
10004060-201 = "You can explain at the station!"
10004060-202 = "[s] \"I didn't do anything wrong!\""
10004060-208 = "I was dragged to the police station and got an earful from Kirino."

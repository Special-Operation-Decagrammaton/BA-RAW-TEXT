[translation]
1300405-1 = "ถึงเวลาตอบแทน"
1300405-2 = "ห้างสรรพสินค้า"
1300405-5 = "คุณครูคะ! ทางนี้ค่า~ ทางนี้~"
1300405-7 = "กำลังรอคุณครูอยู่เลยค่ะ☆"
1300405-8 = "คะ? รอนานหรือเปล่าน่ะเหรอคะ? ไม่เลยค่ะ ประมาณ 30 นาทีเองมั้ง?"
1300405-9 = "หือ? ไม่หรอกค่ะ คุณครูมาตรงเวลาแล้ว ฉันต่างหากที่มาเร็วเองค่ะ☆"
1300405-10 = "เอาละค่ะ ถ้างั้นก็ไปกันเลย~☆"
1300405-11 = "เวลาแห่งการเดตแสนสนุก... ไม่สิ ช้อปปิ้งแสนสนุก!"
1300405-13 = "อ๊ะ! คุณครูคะ! ไปดูทางโน้นกันด้วยเถอะค่ะ!"
1300405-14 = "อืม.. เราควรซื้อเครื่องพ่นน้ำมันหอมระเหยด้วยไหมคะ? เอาไปวางในห้องชมรมคงจะหอมดีนะคะ"
1300405-15 = "อุ๊ย ชุดโอเทลโล่? ถ้ามีติดไว้สักชุดก็น่าจะดีนะ..."
1300405-16 = "[s1] \"ดะ... เดี๋ยวก่อนสิ\"\n[s2] \"ซื้อเยอะไปแล้วหรือเปล่า?\""
1300405-18 = "แต่โรงเรียนเราอยู่ไกลจากห้างสรรพสินค้ามากเลยนะคะ!"
1300405-19 = "แต่โรงเรียนเราอยู่ไกลจากห้างสรรพสินค้ามากเลยนะคะ!"
1300405-20 = "เราไม่ได้มากันบ่อยๆ เพราะงั้นมาแล้วก็ต้องซื้อประมาณนี้ละค่ะ"
1300405-21 = "อีกอย่าง... ทุกคนก็ใช้เงินที่ได้จากการทำงานพิเศษมาช่วยจ่ายหนี้ให้โรงเรียนกัน..."
1300405-22 = "ตอนนี้ชมรมเราดูเหมือนศูนย์รวมพนักงานพาร์ทไทม์มากกว่าชมรมของโรงเรียนอีก#nพอเป็นแบบนี้ฉันก็รู้สึกเศร้าใจนะคะ..."
1300405-23 = "เอาละค่ะ! ไปช้อปปิ้งกันเถอะค่ะ!"
1300405-24 = "บัตรฉันยังมีวงเงินเหลืออีกเยอะเลยค่ะ!"
1300405-27 = "(จากนั้นทั้งสองคนก็ไปเดินกระหน่ำช้อปปิ้งด้วยกัน)"
1300405-29 = "ห้องชมรมคณะกรรมการแผนงาน"
1300405-30 = "(เนื่องจากที่ห้างไม่มีบริการจัดส่งมาที่อะบิดอส ทั้งคู่จึงต้องถือของหนักๆ ทั้งหมดกลับมาเอง)"
1300405-31 = "(ล้มฟุบ)"
1300405-32 = "คะ... คุณครูคะ"
1300405-33 = "มะ...ไม่เป็นไรใช่ไหมคะ? คุณครูน่าจะเหนื่อยมากเลย!"
1300405-34 = "ขะ... ขอโทษนะคะ ดูเหมือนฉันจะซื้อของเยอะเกินไปจริงๆ"
1300405-35 = "ปกติฉันไม่ซื้อเยอะขนาดนี้นะคะ...."
1300405-36 = "แต่วันนี้... เอ่อ... ฉันช้อปเพลินไปหน่อยค่ะ"
1300405-39 = "(ตุบ)"
1300405-40 = "(ดัมเบลตกลงบนพื้น)"
1300405-41 = "....."
1300405-42 = "ดัมเบลที่ซื้อมาเป็นของขวัญให้ชิโรโกะจัง... อยู่นี่เอง"
1300405-43 = "(ตุบ...ตุบ...)"
1300405-44 = "ส่วนนี่คือแจกันดอกไม้ที่จะให้เซริกะจัง...."
1300405-45 = "อ๊ะ คุณครูคะ! อย่าทำของหล่นสิคะ! ของบางอย่างมันแตกได้นะคะ!"
1300405-46 = "เอ๊ะ... นี่มัน...."
1300405-47 = "อ่า... ฉันใส่ไว้ตรงนี้นี่เอง ใช่แล้วค่ะ ไม้ปั่นหูไงล่ะคะ"
1300405-48 = "แต่นแต๊น~☆ อันนี้ฉันซื้อมาเพื่อคุณครูเลยค่ะ"
1300405-49 = "[s] \"เพื่อครูเหรอ?\""
1300405-50 = "ค่ะ! ก็ต้องเพื่อคุณครูสิคะ! รอเดี๋ยวนะคะ!"
1300405-52 = "(เช็ดๆ)"
1300405-53 = "ฉันปูผ้ารองบนพื้นให้แล้วค่ะ"
1300405-54 = "มาสิคะคุณครู"
1300405-55 = "มานอนหนุนตักได้เลยค่ะ"
1300405-56 = "[s] \"ให้นอนลงเหรอ?\""
1300405-57 = "ใช่แล้วค่า คุณครูคนเก่ง มาเร็วสิคะ~"
1300405-58 = "[s] นอนลง"
1300405-62 = "― เอาละค่ะ เดี๋ยวฉันจะปั่นหูให้นะคะ[wa:540] "
1300405-64 = "― อยู่นิ่งๆ นะคะคุณครู[wa:1640] "
1300405-67 = "― ห้ามขยุกขยิกนะคะ เดี๋ยวฉันจะค่อยๆ ปั่นหูให้นะคะ[wa:2240] "
1300405-70 = "― ถ้ารู้สึกจั๊กจี้เกินไปบอกได้นะคะ"
1300405-72 = "― อื้อ เก่งมากค่ะ เก่งมาก~[wa:2020] "
1300405-75 = "― อ่า...พอมาคิดดูแล้วมันก็......รู้สึกเขินนิดหน่อยนะคะ[wa:5460] "
1300405-78 = "― คือว่า...หน้าของคุณครูอยู่ใกล้มากๆ เลยค่ะ.....[wa:2240] "
1300405-80 = "― คือว่า...."
1300405-83 = "― นี่เป็นบริการพิเศษสำหรับคุณครูเท่านั้น เพราะงั้นเป็นความลับระหว่างพวกเรา...สองคน...นะคะ[wa:5160] "
1300405-87 = "― อื้อ?.. ถ้าคุณครูนอนแบบนี้ฉันก็จะเห็นแค่ด้านหลังของคุณครู...[wa:2420] "
1300405-89 = "― อืม...แล้วก็...ลมหายใจของคุณครู...[wa:2280] "
1300405-93 = "― ไม่ได้นะคะคุณครู! นอนดีๆ สิคะ![wa:1600] "
1300405-96 = "เอาละ เรียบร้อยแล้วค่ะ"
1300405-97 = "เป็นยังไงบ้างคะ? รู้สึกดีไหมคะ?"
1300405-98 = "[s] \"ไม่รู้สินะ แต่เขินนิดหน่อยน่ะ...\""
1300405-99 = "...ฮิฮิฮิ"
1300405-100 = "พอมาคิดดูแล้ว... ที่จริง... ฉันก็เขินมากๆ เหมือนกันนะคะ...."
1300405-101 = "แต่มันก็... ฮุฮุ♡"
1300405-102 = "หืม? ไม่มีอะไรหรอกค่ะ"

[translation]
1300405-1 = "Time to Repay"
1300405-2 = "Shopping Mall"
1300405-5 = "Sensei! Over here! Here!"
1300405-7 = "There you are. ☆"
1300405-8 = "Did you keep me waiting? Not really. Maybe about half an hour."
1300405-9 = "Huh? No, you were the one on time, Sensei. I chose to come early and wait. ☆"
1300405-10 = "All right, then. Let's go! ☆"
1300405-11 = "I was looking forward to our date—I mean, I can't wait to go shopping!"
1300405-13 = "Look, Sensei! We should go check that out too!"
1300405-14 = "Hmm. Maybe we should buy a diffuser too? The club room could use one, right?"
1300405-15 = "Is this a reversi set? This could come in handy..."
1300405-16 = "[s1] \"S-Slow down.\"\n[s2] \"Do we really need that?\""
1300405-18 = "Do you know how far this shopping mall is from Abydos High School?!"
1300405-19 = "Do you know how far this shopping mall is from Abydos High School?!"
1300405-20 = "We don't get to come here often, so that means buying in bulk."
1300405-21 = "Besides... The others are paying off the school's debt out of their own pockets."
1300405-22 = "I feel sorry for them. We feel more like a temp agency than a school club..."
1300405-23 = "Anyway! Let's continue shopping."
1300405-24 = "I still have a lot more budget to spend on things we need!"
1300405-27 = "(We shopped for quite a while after that.)"
1300405-29 = "Foreclosure Task Force Room"
1300405-30 = "(We had to carry everything back ourselves because Abydos was out of their delivery range.)"
1300405-31 = "(collapses)"
1300405-32 = "S-Sensei."
1300405-33 = "Are you all right? I appreciate you carrying all of that!"
1300405-34 = "...Sorry. Maybe I did go overboard."
1300405-35 = "I swear I don't usually buy this much..."
1300405-36 = "I may have...gotten carried away back there."
1300405-39 = "*thump*"
1300405-40 = "(...The dumbbells fell to the floor.)"
1300405-41 = "..."
1300405-42 = "I picked these dumbbells out...to give as a gift to Shiroko... "
1300405-43 = "*thump* *thump*"
1300405-44 = "That's a flowerpot for Serika..."
1300405-45 = "Careful, Sensei! Some of this is too fragile to be dropped like that!"
1300405-46 = "Huh...? This is..."
1300405-47 = "Oh, right. I forgot I put this in here. They're ear swabs."
1300405-48 = "Ta-da! I actually bought them as a gift for you! ☆"
1300405-49 = "[s] \"For me?\""
1300405-50 = "Uh-huh! Just wait a minute!"
1300405-52 = "*swoosh*"
1300405-53 = "Here, I placed a blanket on the floor."
1300405-54 = "Come on, Sensei... "
1300405-55 = "Lie down on my lap."
1300405-56 = "[s] \"Lie down?\""
1300405-57 = "That's right, hurry up!"
1300405-58 = "[s] Lie down."
1300405-62 = "― Here we go. One ear cleaning coming right up.[wa:60] "
1300405-64 = "― You have to stay still. All right, Sensei?[wa:760] "
1300405-67 = "― Don't fidget. I'm putting it in now, okay?[wa:2440] "
1300405-70 = "― Let me know if it tickles."
1300405-72 = "― There we go. That's good. Perfect.[wa:1620] "
1300405-75 = "― Um... Come to think of it... Do you find this a little embarrassing?[wa:4820] "
1300405-78 = "― Our faces are pretty close to one another...[wa:2320] "
1300405-80 = "― Well..."
1300405-83 = "― This is a special service just for you. It's our little secret. Okay?[wa:5880] "
1300405-87 = "― Hmm? If you lie like that, I can only see the back of your head...[wa:2180] "
1300405-89 = "― Uh... More importantly...I can feel your breath...[wa:1640] "
1300405-93 = "― This isn't working, Sensei! Go back to the other position![wa:480] "
1300405-96 = "There. All clean."
1300405-97 = "So? How do you feel now? "
1300405-98 = "[s] \"I don't know. A little embarrassed?\""
1300405-99 = "...Ahaha."
1300405-100 = "Now that I think about it...I suppose it was pretty embarrassing..."
1300405-101 = "But...oh! ♥"
1300405-102 = "No, it's nothing."

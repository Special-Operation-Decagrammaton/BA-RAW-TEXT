[translation]
1300405-1 = "報恩的時間"
1300405-2 = "購物中心"
1300405-5 = "啊，老師！是這邊～在這兒～"
1300405-7 = "我在等你哦☆"
1300405-8 = "什麼？是不是等很久了？不會不會，也才30分鐘左右。"
1300405-9 = "不，怎麼會，老師準時抵達了，是我擅自先在這裡等的☆"
1300405-10 = "好。那麼，出發～☆"
1300405-11 = "是開心的約會……不對，購物時間呢！"
1300405-13 = "啊！老師！也去那邊看看吧！"
1300405-14 = "嗯……果然買個香芬機比較好嗎？放在教室的話感覺不錯。"
1300405-15 = "啊啦，黑白棋？果然這種東西有一個的話……"
1300405-16 = "[s1] 「等，等一下。」\n[s2] 「是不是買太多了？」"
1300405-18 = "因為，阿拜多斯距離這間購物中心，這麼遠啊！"
1300405-19 = "因為，阿拜多斯距離這間購物中心，這麼遠啊！"
1300405-20 = "沒辦法頻繁地過來，不買這麼多的話不行。"
1300405-21 = "而且……大家把自己的打工薪水，都用在償還學校的債務上了……"
1300405-22 = "這樣下去的話就不是學校的教室了，完全是打工的休息室一樣，好可憐……"
1300405-23 = "好！繼續購物吧！"
1300405-24 = "距離我的信用卡額度，還早得很呢！"
1300405-27 = "（在那之後，以怒濤般的氣勢購物了）"
1300405-29 = "對策委員會．教室"
1300405-30 = "（似乎沒有配送到阿拜多斯的服務，只好提著沉重的行李回來了）"
1300405-31 = "（砰咚！）"
1300405-32 = "老，老師。"
1300405-33 = "沒，沒事吧？……是，辛苦了！"
1300405-34 = "……不好意思，有點買太多了呢。"
1300405-35 = "平時不會買那麼多的……"
1300405-36 = "今天似乎有點……過於興奮了。"
1300405-39 = "（咚）"
1300405-40 = "（……啞鈴掉出來了）"
1300405-41 = "……"
1300405-42 = "要送給白子醬當禮物的啞鈴，確實還有這個呢……"
1300405-43 = "（咻，咻）"
1300405-44 = "那是要給茜香醬的花盆……"
1300405-45 = "啊。老師！請小心點！裡面也有碎裂物！"
1300405-46 = "啊咧……這是……"
1300405-47 = "啊，原來這放在這裡啊。對，沒錯。是挖耳棒。"
1300405-48 = "鏘──☆其實，這是為了老師而買的。"
1300405-49 = "[s] 「為了我？」"
1300405-50 = "是！沒錯！請等一下唷！"
1300405-52 = "（咻，咻）"
1300405-53 = "在地板鋪上地毯……"
1300405-54 = "來，老師。 "
1300405-55 = "這裡，請躺在我的膝蓋上。"
1300405-56 = "[s] 「咦……？」"
1300405-57 = "來，乖孩子，快點～"
1300405-58 = "[s] 躺下"
1300405-62 = "― 好，現在是清理耳朵的時間唷。[wa:1300] "
1300405-64 = "― 不可以亂動唷，老師？[wa:2040] "
1300405-67 = "― 不可以動來動去。因為現在要放這個進去唷？[wa:3320] "
1300405-70 = "― 覺得癢的話要跟我說唷？"
1300405-72 = "― 嗯嗯。乖孩子，好乖好乖。[wa:2500] "
1300405-75 = "― 那個……仔細想想，這個有點……讓人害羞呢？[wa:6700] "
1300405-78 = "― 總覺得老師的臉靠得很近……[wa:3560] "
1300405-80 = "― 那個……"
1300405-83 = "― 這是只提供給老師的服務，是我們兩個的秘．密．唷？[wa:7680] "
1300405-87 = "― 嗯？那樣躺著的話只能看到老師的背後……[wa:4060] "
1300405-89 = "― 那個……那樣的話……鼻子呼吸的氣息……[wa:2880] "
1300405-93 = "― 老師，不行！請躺好！[wa:2400] "
1300405-96 = "好，變乾淨了唷。"
1300405-97 = "怎麼樣呢？舒服嗎？"
1300405-98 = "[s] 「雖然不是很清楚，不過有點害羞。」"
1300405-99 = "……啊，啊哈哈。"
1300405-100 = "被那樣說的話，其實我也……非常的害羞……"
1300405-101 = "但是……呵呵♡"
1300405-102 = "不，沒什麼事。"

[translation]
1004202-1 = "廢墟中的公主"
1004202-2 = "（比來比去──）"
1004202-3 = "[s]「啊……早安，敦子。」"
1004202-4 = "（…………）"
1004202-9 = "……啊。"
1004202-14 = "抱歉，我習慣了。"
1004202-15 = "現在已經不需要比手語，也不需要口罩了。"
1004202-16 = "……那我們重新來過。"
1004202-17 = "老師，早安。"
1004202-18 = "[s1]「……嗯，早安。」\n[s2]「早安……不過已經晚上了。」"
1004202-19 = "因為……打招呼很重要。"
1004202-20 = "因為……打招呼很重要。"
1004202-21 = "這裡是廢棄的學校大樓，很適合躲藏……我們預計在這裡待一個禮拜。"
1004202-22 = "大家似乎都有事要忙而出去了。#n不過留了很多食物和飲料在這裡……"
1004202-23 = "所以我才偷偷叫老師來。#n不能被發現唷，[USERNAME]老師是我的祕密朋友。"
1004202-24 = "[s]「祕，祕密朋友……」"
1004202-25 = "嗯，祕密。#n被大家知道會很麻煩的，明白嗎？"
1004202-26 = "那麼老師，我們要玩什麼？"
1004202-27 = "[s]「這個嘛……」"
1004202-28 = "……我想到一個好主意。我們來玩「學校遊戲」。"
1004202-29 = "[s]「學校遊戲？」"
1004202-30 = "我從來都沒有在教室聽老師上課。"
1004202-31 = "這裡以前也是學校，也有教室。"
1004202-32 = "然後現在，有學生也有老師。"
1004202-33 = "來吧。"
1004202-37 = "[ns] 跟上去"
1004202-41 = "……"
1004202-42 = "[s]「這好像沒辦法坐呀……」"
1004202-43 = "嗯。原本還想至少體驗氣氛，看來不行呢。"
1004202-44 = "沒辦法。只好放棄學校遊戲了。"
1004202-45 = "嗯……還能玩什麼呢？"
1004202-49 = "……嗯？"
1004202-50 = "老師。其他人要回來了。"
1004202-51 = "今天就玩到這裡吧。如果大家發現老師跑來這裡，我會挨罵的。"
1004202-52 = "[s]「呃，嗯……」"
1004202-53 = "對不起。下次再一起玩吧。"
1004202-55 = "（留下一臉遺憾的敦子，離開了廢棄學校）"

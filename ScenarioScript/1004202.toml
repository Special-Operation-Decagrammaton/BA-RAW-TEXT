1004202-17 = "3;아츠코;S2_03;안녕. 선생님. 좋은 아침.\n#3;greeting\n#3;em;[반짝]"
1004202-18 = "[s1] \"……응. 좋은 아침.\"\n[s2] \"좋은 아침. ……그런데 지금은 밤이지?\""
1004202-19 = "3;아츠코;S2_03;응. 인사는 중요하니까. 어서 오세요.\n#3;em;[음표]"
1004202-20 = "3;아츠코;S2_03;응. 인사는 중요하니까. 어서 오세요.\n#3;em;[음표]"
1004202-21 = "3;아츠코;S2_01;여기는 방치된 학교 폐건물인데, 숨어있기는 딱 좋은 거 같아. 그런데 여기서 일주일이나 혼자 있으래."
1004202-22 = "3;아츠코;S2_99;다들 바쁜지 어디론가 가버렸거든. 먹을 거나 음료는 잔뜩 준비해 두고 갔지만……."
1004202-23 = "3;아츠코;S2_03;그러니까 선생님을 몰래 불러낸 거야. 들키면 안 돼. 비밀 친구 [USERNAME] 선생님인 거야."
1004202-24 = "[s] \"비, 비밀 친구…….\""
1004202-25 = "3;아츠코;S2_00;비밀. 응. 다들 잔소리가 심하거든. 알겠지?"
1004202-26 = "3;아츠코;S2_03;그러니까 선생님. 뭐 하고 놀까?"
1004202-27 = "[s] \"그, 글쎄…….\""
1004202-28 = "3;아츠코;S2_02;아. 좋은 생각이 났어. 학교 놀이하자!\n#3;em;[반응]"
1004202-29 = "[s] \"학교 놀이?\""
1004202-30 = "3;아츠코;S2_03;교실에서 선생님과 이런저런 수업하는 거. 한번도 해본 적 없으니까."
1004202-31 = "3;아츠코;S2_03;여기도 예전엔 학교였을 테니, 교실이 있겠지?"
1004202-32 = "3;아츠코;S2_03;그리고 학생도 있고, 선생님도 있으니 딱이야.\n#3;em;[음표]"

1004202-43 = "3;아츠코;S2_99;응. 그냥 기분만 내 보고 싶었던 건데. 안 되겠네.\n#3;em;[속상함]"
1004202-44 = "3;아츠코;S2_01;어쩔 수 없지. 학교 놀이는 그만두고."
1004202-45 = "3;아츠코;S2_01;음……. 뭐가 있을까."

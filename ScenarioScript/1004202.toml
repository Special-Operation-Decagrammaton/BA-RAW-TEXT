[translation]
1004202-1 = "องค์หญิงในพื้นที่รกร้าง"
1004202-2 = "(ส่งภาษามือ)"
1004202-3 = "[s] \"ว่าไง อาสึโกะ\""
1004202-4 = "(ส่งภาษามือ)"
1004202-9 = "อา..."
1004202-14 = "ขอโทษที พอดีมันติดเป็นนิสัยไปแล้วน่ะ"
1004202-15 = "ทั้งที่ตอนนี้ไม่ต้องใช้ภาษามือ หรือว่าต้องใส่หน้ากากอีกแล้วแท้ๆ"
1004202-16 = "งั้นเอาใหม่แล้วกัน"
1004202-17 = "อรุณสวัสดิ์ คุณครู"
1004202-18 = "[s1] \"อื้อ อรุณสวัสดิ์\"\n[s2] \"อรุณสวัสดิ์... แต่ว่าตอนนี้มันมืดแล้วนะ?\""
1004202-19 = "การทักทายเป็นมารยาทสำคัญทางสังคมนี่นะ เข้ามาก่อนสิ"
1004202-20 = "อื้อ การทักทายเป็นมารยาทสำคัญทางสังคมนี่นะ เข้ามาก่อนสิ"
1004202-21 = "ที่นี่เป็นตึกเก่าของโรงเรียนร้าง ฉันเลยคิดว่ามันเหมาะจะใช้เป็นที่ซ่อนตัวน่ะ แต่ว่าฉันก็อยู่ที่นี่คนเดียว#nมาทั้งอาทิตย์แล้ว"
1004202-22 = "ทุกคนงานยุ่งต้องไปที่อื่นกันหมด พวกเขาเตรียมของกินกับเครื่องดื่มเอาไว้ให้พร้อมแล้วล่ะ"
1004202-23 = "เรื่องที่ฉันแอบเรียกคุณครูมาจะให้คนอื่นรู้ไม่ได้นะ เพื่อนลับๆ ของฉัน คุณครู [USERNAME]..."
1004202-24 = "[s] \"เพื่อนลับๆ เหรอ?\" "
1004202-25 = "อื้อ ต้องเก็บเป็นความลับนะ ถ้าทุกคนรู้อาจจะโดนบ่นยกใหญ่เลย เข้าใจมั้ย?"
1004202-26 = "แล้ว... เราจะมาเล่นอะไรกันดีล่ะ คุณครู? "
1004202-27 = "[s] \"นะ...นั่นสินะ\""
1004202-28 = "อ๊ะ คิดอะไรดีๆ ออกแล้ว มาเล่นเรียนหนังสือกันเถอะ!"
1004202-29 = "[s] \"เล่นเรียนหนังสือเหรอ?\""
1004202-30 = "ฉันไม่เคยได้เรียนกับคุณครูในห้องเรียนจริงๆ มาก่อนเลย"
1004202-31 = "และที่นี่เองก็เคยถูกใช้เป็นโรงเรียนจริงๆ มาก่อน คงจะต้องมีห้องเรียนอยู่สินะ?"
1004202-32 = "ตอนนี้มีทั้งนักเรียน และมีคุณครูอยู่ด้วย พอดีเลยนะ"
1004202-33 = "ไปกันเถอะ"
1004202-37 = "[ns] เดินตามอาสึโกะไป"
1004202-41 = "..."
1004202-42 = "[s] \"ถ้าเป็นแบบนี้คงนั่งเรียนไม่ได้แล้วล่ะ...\""
1004202-43 = "อื้อ ฉันแค่อยากลองสัมผัสความรู้สึกที่ได้นั่งเรียนแบบปกติดูบ้าง แต่ก็ช่วยไม่ได้ล่ะนะ"
1004202-44 = "ไม่เป็นไรหรอก หาอย่างอื่นทำก็ได้"
1004202-45 = "อืม... ขอคิดก่อนนะ"
1004202-49 = "หืม...?"
1004202-50 = "คุณครู... ตอนนี้คนอื่นๆ กำลังกลับมาแล้ว"
1004202-51 = "วันนี้คงต้องเลิกเล่นกันเท่านี้ก่อน ถ้าคนอื่นรู้ว่าวันนี้ฉันมาพบกับคุณครูจะโดนดุเอาได้น่ะ"
1004202-52 = "[s] \"อะ...อื้อ...\""
1004202-53 = "ขอโทษนะ ไว้มาเล่นกันใหม่คราวหน้าเถอะ"
1004202-55 = "(อาสึโกะเดินกลับออกไปนอกอาคารร้างด้วยท่าทางที่ดูเสียดายนิดๆ)"

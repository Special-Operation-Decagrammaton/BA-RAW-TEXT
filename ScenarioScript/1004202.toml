[translation]
1004202-1 = "Princess in the Ruins"
1004202-2 = "(sign language)"
1004202-3 = "[s] \"Oh... Hello, Atsuko.\""
1004202-4 = "(more sign language)"
1004202-9 = "...!"
1004202-14 = "Apologies. Force of habit."
1004202-15 = "I have the freedom to speak and show my face here."
1004202-16 = "Please, allow me."
1004202-17 = "Good morning, Sensei."
1004202-18 = "[s1] \"...Uh. Good morning?\"\n[s2] \"I-Isn't it evening?\""
1004202-19 = "Yes. Greetings are an important social gesture. Welcome, Sensei!"
1004202-20 = "Yes. Greetings are an important social gesture. Welcome, Sensei!"
1004202-21 = "This abandoned school building is my home for the next week."
1004202-22 = "They stationed me here with provisions and rushed off."
1004202-23 = "It is essential my location remain hidden. Therefore, you will be my secret friend, [USERNAME] Sensei."
1004202-24 = "[s] \"S-Secret friend??\" "
1004202-25 = "Have you not heard the phrase? It is a friend others do not know about."
1004202-26 = "Now that you're here, what should we do for fun?"
1004202-27 = "[s] \"Well... What's fun for you?\""
1004202-28 = "I've decided. We will play school."
1004202-29 = "[s] \"Play school?\""
1004202-30 = "Other students get to be in Sensei's classroom, am I correct?"
1004202-31 = "I'd like to be as well. There must be classrooms throughout the building."
1004202-32 = "And with you as the teacher, and me as the student, we have all the pieces."
1004202-33 = "Let us go play."
1004202-37 = "[ns] Follow her."
1004202-41 = "..."
1004202-42 = "[s] \"I guess an abandoned building wouldn't have desks.\""
1004202-43 = "Yes. It seems I won't get to try being an ordinary schoolgirl."
1004202-44 = "It's fine. There must be other things we can do."
1004202-45 = "Allow me to think."
1004202-49 = "Hm?"
1004202-50 = "Ah. The others are returning soon."
1004202-51 = "We'll have to stop here. Saori would never let me hear the end of it if she found out you were here."
1004202-52 = "[s] \"I wouldn't want to get you in trouble.\""
1004202-53 = "Sorry. Maybe next time."
1004202-55 = "I left Atsuko at the abandoned building, but I couldn't avoid her disappointed expression as I walked out."

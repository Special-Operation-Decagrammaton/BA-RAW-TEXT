[translation]
32010-1 = "Episode 1;The Great Leviathan"
32010-3 = "[ns] \"Azusa is the traitor?\""
32010-4 = "That she is, and I would like you to protect her."
32010-5 = "I guess getting straight to the point doesn't make sense without all of the details. Nagi's bad habits might be rubbing off on me. "
32010-6 = "How about I explain it from the beginning?"
32010-7 = "I'm not as good at this kind of thing as Nagi or Seia are..."
32010-8 = "...but I'll give it my best shot!"
32010-9 = "[s] \"O-Okay.\""
32010-10 = "First is what defines Trinity General School. As I'm sure Nagi told you, our academy's history is built on several factions coming together."
32010-12 = "As the name would suggest, there are three such factions that comprise its center: Pater, Filius, and Sanctus."
32010-13 = "However, there were many other smaller factions, such as the Remedial Knights and the Sisterhood."
32010-14 = "Back then, those factions were just as hostile toward one another as Trinity and Gehenna are today."
32010-15 = "Conflict was a daily occurrence—growing worse by the day."
32010-16 = "Until finally they all came together and created a peace treaty."
32010-17 = "And so the First Council was held, where it was agreed to end the bloodshed and unite as one academy."
32010-18 = "[s] \"That sounds familiar.\""
32010-20 = "It does, doesn't it?"
32010-21 = "Trinity General School as we know it was born from that First Council."
32010-22 = "There are still traces of those factions even today, but most people would never know it. Over time, history tends to become rather faded."
32010-23 = "However, there was one academy that chose not to participate in the council."
32010-24 = "The Arius faction. "
32010-26 = "I say \"faction,\" but it's been an organized academy much like our own for a long time."
32010-27 = "The two sides had much in common, but were driven apart due to differences in how to interpret the ancient scriptures."
32010-28 = "Their academy also held chapel classes, kept a strict conservative uniform, and had a strong contempt for Gehenna."
32010-29 = "But Arius vehemently opposed the union...and that feud ultimately led to conflict."
32010-30 = "Trinity suppressed Arius following the unification. It simply couldn't withstand the combined might of the new academy."
32010-31 = "Such stories are commonplace in history. Those who hold great power tend to want to test it, and Arius made for a suitable target."
32010-32 = "Arius Academy fell to ruin."
32010-33 = "It was banished from the Trinity district, but rumors say its doors remain open, hiding somewhere in the underbelly of Kivotos."
32010-34 = "They've kept the location of their district a secret to avoid Trinity's watchful eye. Even the General Student Council doesn't know where Arius operates from currently."
32010-35 = "It wouldn't surprise me if those that know the story thought of it as nothing but an urban legend. How could such an academy truly exist? Then again, I think most of our students are completely unaware of the tale."
32010-36 = "That's the Arius Academy of today. A shadow forgotten to history."
32010-37 = "[s] \"And you're saying that's where Azusa is from?\""
32010-39 = "Correct."
32010-40 = "You said the story sounded familiar. As you suspect, the Eden Treaty that Nagi is proposing now is an homage to the First Council."
32010-41 = "This is a chance for two great academies to reconcile and come together in peace."
32010-42 = "If it sounds too good to be true, that's because it is. The real objective is to establish the Eden Treaty Organization, or ETO for short."
32010-43 = "The Eden Treaty is anything but a peace signing—it's the start of a formal military alliance."
32010-48 = "The creation of a single armed organization using the combined forces of Trinity and Gehenna."
32010-51 = "These are uncertain times we're living in—the General Student Council president is still missing. Now, from the shadows, rises a new overwhelming power."
32010-52 = "And what does Nagi intend to do with it, I wonder."
32010-53 = "Perhaps attack what remains of the General Student Council and assume control of Kivotos?"
32010-54 = "Or does she plan to uproot Millennium and stop its sudden emergence as Kivotos' rising new academy?"
32010-55 = "I can't say what her goal is for certain, but there is one thing I know."
32010-56 = "Power that immense can be used to silence any and all dissenters."
32010-57 = "Just as Trinity did to Arius long ago."
32010-58 = "Or just like Seia..."
32010-62 = "Uh, sorry. Pretend you didn't hear that."
32010-63 = "[s] \"Has something happened to Seia?\""
32010-64 = "..."
32010-65 = "She's...ill. Just as I told you."
32010-66 = "[s] \"Then where is she?\""
32010-67 = "Hmm."
32010-68 = "Do you really want to know?"
32010-69 = "Telling you would mean crossing a line I could never walk back from."
32010-70 = "So if you betrayed me, I truly would be completely abandoned."
32010-71 = "Do you still want to know?"
32010-72 = "[s] \"Betray you?\""
32010-73 = "Yes, but I'm sure it will be fine. You said you're on my side, didn't you?"
32010-74 = "If someone who said that went on to betray me, then...maybe I wouldn't mind so much. Heeehee."
32010-75 = "The truth is that Seia isn't fighting illness."
32010-80 = "Her halo was destroyed."
32010-81 = "[s] \"...?!\""
32010-82 = "..."
32010-84 = "I know. It's too horrible to be true, but it is."
32010-85 = "And it's been covered up since last year. Seia was attacked by an unknown assailant."
32010-86 = "Her illness is nothing but a facade—Seia's dead."
32010-87 = "And no one knows but the Tea Party."
32010-88 = "Well, it's possible the Sisterhood may be aware... Their intelligence-gathering has always been remarkable."
32010-89 = "Regardless, it's a secret that must be kept hidden."
32010-91 = "[ns] \"And no one knows who is responsible?\""
32010-92 = "There's an ongoing investigation, but it remains a mystery. Seia held no shortage of confidential information, so I'm sure that only makes it harder to narrow down the suspects."
32010-93 = "So there you have it."
32010-94 = "[s] \"...\""
32010-95 = "Personally, I have my own list of suspects, but it wouldn't be wise to share it without knowing for sure."
32010-96 = "Let's get back to talking about Shirasu Azusa."
32010-97 = "I was the one who arranged to have her transferred to Trinity."
32010-98 = "[s] \"You did, Mika?\""
32010-99 = "Uh-huh. I kept it a secret from Nagi. I registered Azusa as a student returning from break after falsifying her documents."
32010-100 = "You're probably wondering why."
32010-101 = "Arius still hates us, after all."
32010-102 = "While our students take the privileged environment around them for granted, their students scrape by under impoverished conditions, not knowing what it truly means to receive an education."
32010-103 = "They stubbornly cling to a grudge from years past and reject the help of anyone, including the General Student Council."
32010-104 = "I want Trinity to reconcile with Arius."
32010-105 = "But the hatred our schools have for each other is too great, and the misunderstandings too many. It's not a relationship I could ever hope to reconcile on my own."
32010-106 = "Nagi and Seia objected to my opinions for political reasons, but I never held it against them. That's the essence of what the Tea Party does."
32010-107 = "I'm not the best when it comes to politics...but I wish that we could all just get along."
32010-108 = "If only we could reconcile our misunderstandings over tea like in the past."
32010-112 = "What I really want is for Azusa to become a symbol of peace."
32010-113 = "I don't know her very well, but she was supposedly an outstanding student at Arius, and I want to foster her potential."
32010-114 = "Maybe I should have been more honest and tried to convince Nagi through the proper channels...but I had my doubts it was possible."
32010-115 = "I don't think she ever would have agreed to it."
32010-116 = "Reconciling with Arius will become impossible if the Eden Treaty is signed. I wanted to make amends before that happened at any cost."
32010-117 = "I want to show through Azusa that an Arius student can be happy and accepted at Trinity."
32010-118 = "But now Nagi has introduced the rumor of there being a traitor attending Trinity."
32010-119 = "I don't know how she came to that conclusion. Maybe it's all my fault."
32010-120 = "She became so paranoid that someone was interfering with her plans that she decided to form the Make-Up Work Club."
32010-121 = "Speaking of which, have you figured out why each student was forced to join?"
32010-122 = "It's because Nagi suspects every one of them."
32010-125 = "Hanako is a little eccentric, but she was an outstanding student with excellent grades. She was even a candidate to join the Tea Party once."
32010-126 = "The Sisterhood tried to recruit her as well, but that didn't work out."
32010-131 = "She attended a chapel class in nothing but a swimsuit and was dragged out by the Sisters. You should have seen the shock on people's faces. Hahaha."
32010-134 = "Hanako had so much potential in her first year, but then she began scoring the lowest grades in her class at the start of her second year."
32010-135 = "Why? Was she doing it on purpose?"
32010-137 = "She had already made inroads around Trinity and was aware of several academy secrets before her scores began tanking."
32010-138 = "It drew Nagi's suspicion."
32010-141 = "As for Koharu... She's a nice girl that really has nothing to do with politics."
32010-146 = "Her enrollment into the Make-Up Work Club has to do with Hasumi."
32010-147 = "[s] \"Hasumi?\""
32010-150 = "Nagi doesn't like there being such a powerful club with someone so influential outside of her direct control."
32010-151 = "So Koharu is her insurance policy."
32010-152 = "Anyone from the Justice Task Force would have worked. Koharu's poor grades just made her a convenient target."
32010-153 = "She's a hostage, in other words, and I bet Hasumi is aware of it. One wrong move could lead to expulsion."
32010-154 = "[s] \"But...\""
32010-155 = "But what? Are you surprised to hear that Hasumi would be considered a dangerous element?"
32010-156 = "There's one particular incident that may pique your interest, then."
32010-158 = "Justice Task Force Club Room"
32010-163 = "..."
32010-164 = "..."
32010-165 = "V-Vice President Hasumi, please calm down..."
32010-169 = "How dare they?! Pandemonium Society! Gehenna! Do they think they'll get away with this?!"
32010-170 = "Ahhhhhh!"
32010-171 = "*pant* *pant*..."
32010-172 = "Listen carefully."
32010-173 = "This isn't over..."
32010-175 = "Hasumi is the vice president of the Justice Task Force—Trinity's main armed force—and holds Gehenna in contempt."
32010-176 = "She would obviously oppose the Eden Treaty because it would require an alliance with her greatest enemies."
32010-177 = "And finally, there's Hifumi."
32010-180 = "She's just a sweet, cute, lovable girl, right? Even Nagi adores her."
32010-181 = "But that's also what landed her right in Nagi's crosshairs."
32010-183 = "Hifumi was caught sneaking out of the district and visiting suspicious places, such as the prohibited underground Black Market."
32010-184 = "There's even intel that connects her to a masked criminal group.#nCan you believe that? She seemed like such an innocent girl. "
32010-185 = "[s] \"...\""
32010-186 = "How like Nagi to keep her friends close and her enemies closer. Very predictable."
32010-187 = "There you have it. The whole story of how Nagi's paranoia..."
32010-188 = "...led to a full-blown conspiracy that a traitor is out to ruin Trinity."
32010-189 = "Nagi's absolutely certain that there must be a traitor in their midst."
32010-190 = "I know that explanation was a little long-winded, but that is the whole truth."
32010-191 = "[s] \"But you said that the traitor is really...\""
32010-192 = "I did. But think of it this way: How would you define what it means to be a \"traitor\"?"
32010-193 = "Nagi is under the assumption that someone is trying to deceive her, and thereby Trinity's Tea Party. She suspects there to be a spy."
32010-194 = "In that sense, Azusa, the one whose background is a complete fabrication, is the closest to fitting that description."
32010-195 = "Unlike the others, she truly is a transfer from one of Trinity's enemies: Arius."
32010-196 = "She's now at the eye of a complex political storm and has no idea that it's all my fault."
32010-197 = "That's why I'm fighting to prevent her expulsion."
32010-198 = "Or at least, that's what I'm attempting to do by pleading my case to you. I want you to prevent her from being expelled. That's something only you can do, Sensei."
32010-199 = "In a sense, you could argue that I'm the real traitor. After all, I'm the one who's opposing Nagi's Eden Treaty. "
32010-200 = "But since I'm not the host, I don't have any real power and have no means to prevent it."
32010-201 = "..."
32010-202 = "Then again, maybe that's not the truth either."
32010-203 = "You could just as easily argue that if anyone is betraying Trinity..."
32010-206 = "...it would be Nagi."
32010-207 = "She's attempting to transform Trinity and all the values, harmony, and unity it's enjoyed into something else. She wants to awaken a Leviathan."
32010-209 = "That's my take on things. Whether you believe or agree with anything I've said is completely up to you."
32010-210 = "Everything is in your hands now. Whether you'll protect Azusa or weed out the traitor... Whether you'll believe Nagi or myself..."
32010-211 = "[s] \"Is that everything you wanted to say?\""
32010-212 = "Pretty much. I'm responsible for Azusa enrolling at our academy, but this is as much as I can do to help her."
32010-213 = "Don't tell me you're worried about me, Sensei."
32010-214 = "Hahaha. How very sweet of you. I may fall for you after all. "
32010-215 = "You don't need to worry about me. I'm much stronger than I appear."
32010-216 = "Well then, I should be going. I really enjoyed talking with you today."
32010-217 = "People might start spreading salacious rumors if we spend too much time alone together...not that I would mind. Heehee."
32010-218 = "Until we meet again, Sensei."
32010-220 = "I went back to the classroom everyone was studying in after saying goodbye to Mika."
32010-222 = "Next Episode;The Sisterhood"

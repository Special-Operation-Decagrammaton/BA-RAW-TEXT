[translation]
32010-1 = "第1話;巨大的怪物"
32010-3 = "[ns] 「你說梓是叛徒……？」"
32010-4 = "沒錯，還有我希望你能保護那孩子。"
32010-5 = "……啊，這樣是不是有點太直接了？#n可能是被渚醬傳染了壞習慣也說不定。"
32010-6 = "為了讓老師更了解，我再說明清楚一點吧？"
32010-7 = "雖然我不像渚醬和聖亞醬一樣聰明……"
32010-8 = "不過為了能好好表達，我會加油的！"
32010-9 = "[s] 「嗯，拜託你了。」"
32010-10 = "首先，我們「三一綜合學園」就像之前渚醬說過的一樣，#n最大的特色就是「由眾多派系組成的學校」。"
32010-12 = "聖父、聖子、聖靈這三個派系，的確是三一的核心沒錯……"
32010-13 = "不過本來其實還有包含現在「救護騎士團」的前身，#n以及「修女會」這些大大小小的其他派系存在。"
32010-14 = "以前這些派系之間，就像現在的三一和格黑娜一樣……#n為了不被彼此吞噬而互相敵視。"
32010-15 = "每天都會發生大大小小的紛爭。"
32010-16 = "因此，當時的人們決定齊聚一堂，共同定下不再繼續爭鬥、一起和平共處的約定。"
32010-17 = "我們別繼續戰鬥了，成為一個學園吧──#n這句話就是出自我們所說的「第一次公會議」。"
32010-18 = "[s] 「嗯，這個我有聽過。」"
32010-20 = "……是嗎？"
32010-21 = "於是經由這第一次公會議誕生的，就是現在我們所在的「三一綜合學園」。"
32010-22 = "要說現在沒有受到派系時期的影響是騙人的……#n但現在這個時代，大部分人的反應都比較接近「派系？有這回事嗎？」的感覺。"
32010-23 = "……不過當時也有反對那場公會議的學園。"
32010-24 = "那就是「奧利斯派」。"
32010-26 = "雖然說是分派，其實和我們的差別並不算大。"
32010-27 = "據說只是對經典的解釋略有不同，其他部分都還挺相似的。"
32010-28 = "和我們一樣有著禮拜堂的課程，外表也幾乎一樣……而且也是打從心底討厭格黑娜。"
32010-29 = "但是，奧利斯強烈反對建立合作關係……最終因對立而引發了鬥爭。"
32010-30 = "藉由合作獲得強大力量的三一綜合學園，用那巨大的力量對奧利斯進行了徹底鎮壓。"
32010-31 = "擁有強大的力量之後就會想確認它的強度……這也是很正常的。#n而奧利斯則不幸地成為了絕佳的目標。"
32010-32 = "奧利斯分校因而就此沒落──"
32010-33 = "並且從三一的自治區中遭到流放……現在據說還潛藏在奇普托斯的某個地方。"
32010-34 = "由於和三一發生了相當激烈的戰鬥……他們在那之後一直極力隱藏自治區的位置。#n或許就連聯邦學生會也不清楚他們現在所在的位置。"
32010-35 = "對大部分的學生來說，應該只會覺得「有那個學園嗎？」而已吧。#n絕大多數的人就連有過那場戰鬥都不知道。"
32010-36 = "當時就這麼從舞台上離開，連影子都漸漸消失的存在……這就是奧利斯分校。"
32010-37 = "[s] 「梓就是來自那個奧利斯分校……」"
32010-39 = "嗯。"
32010-40 = "而渚醬正在推動的「伊甸園條約」……#n實際上就是剛才說過的「第一次公會議」的再現。"
32010-41 = "伊甸園條約……龐大的兩個學園，今後將和平共處的約定。"
32010-42 = "……雖然聽起來是件好事，但實際上又如何呢？#n畢竟它的核心將會是格黑娜和三一，結合雙方武力建立的[ruby=Eden Treaty Organization]伊甸園條約機構[/ruby]──#n簡稱「ETO」的全新武力集團。"
32010-43 = "……沒錯。雖然稱為伊甸園條約，實際上就是一種武力同盟。"
32010-48 = "結合三一和格黑娜的戰力，誕生出一個強大的武力集團才是它的目的……"
32010-51 = "這樣一個擁有壓倒性力量的集團……將會在聯邦學生會長行蹤不明的時期誕生。"
32010-52 = "擁有這麼強大的力量後，渚醬究竟想做什麼呢？"
32010-53 = "是要襲擊會長不在的聯邦學生會，自己當上聯邦學生會長嗎？"
32010-54 = "還是想要剷除名為千年的嫩芽呢？"
32010-55 = "當然我並不清楚他真正的目的……但有一點我能夠肯定。"
32010-56 = "擁有了強大的力量之後，肯定想會排除自己看不順眼的東西……"
32010-57 = "就像以前的三一對奧利斯做的一樣。"
32010-58 = "或者也有可能會像聖亞醬一樣……"
32010-62 = "……不，抱歉。我失言了。"
32010-63 = "[s] 「聖亞發生了什麼事？」"
32010-64 = "……"
32010-65 = "……就和我之前說過的一樣，聖亞醬現在正在住院。"
32010-66 = "[s] 「……我可以問問他在哪裡嗎？」"
32010-67 = "唔嗯……"
32010-68 = "……老師真的想知道嗎？"
32010-69 = "……如果說出來的話，我就沒有退路了。"
32010-70 = "如果知道了事情真相的老師背叛我的話……我一定會完蛋的。"
32010-71 = "即使如此，老師還是想知道嗎？"
32010-72 = "[s] 「背叛什麼的──」"
32010-73 = "……啊，不過沒問題的吧。#n畢竟老師剛才也說過是我的友方了嘛。"
32010-74 = "就算被背叛了，該怎麼說呢……嗯，或許也不是什麼壞事呢。嘿嘿。"
32010-75 = "……聖亞醬並沒有在住院。"
32010-80 = "他的光環被破壞了。"
32010-81 = "[s] 「……！？」"
32010-82 = "……"
32010-84 = "是真的，不是在開玩笑唷。"
32010-85 = "去年，聖亞醬被不明人士突然襲擊了。"
32010-86 = "雖然對外都是用「住院中」來說明……但剛才說的才是真的。"
32010-87 = "除了我們茶會的人之外，三一的任何人都不知道這件事。"
32010-88 = "不過或許已經被「修女會」知道了也說不定……畢竟他們的情報網也不是省油的燈。"
32010-89 = "總之，就是這種程度的機密事項。"
32010-91 = "[ns] 「犯人還沒有找到嗎……？」"
32010-92 = "……嗯，還不知道。#n該說還在調查中還是該說什麼都不知道呢……畢竟聖亞醬本來就是祕密很多的孩子。"
32010-93 = "……嗯，總之大概就是這樣。"
32010-94 = "[s] 「……」"
32010-95 = "雖然這麼說，我們也不是毫無線索……但現在這個階段也只能算是推測而已。"
32010-96 = "……接下來，讓我們回到之前的話題吧。"
32010-97 = "「白洲梓」……讓那個孩子轉學到我們學校的就是我。"
32010-98 = "[s] 「是彌香你？」"
32010-99 = "嗯，是瞞著渚醬做的喔。偽造了學生名單和各種文件讓他入學了。"
32010-100 = "……會想問我為什麼要這麼做對吧。"
32010-101 = "奧利斯分校直到現在仍然恨著我們。"
32010-102 = "我們在這麼富足的環境裡享受，#n而他們卻只能待在惡劣的環境裡，就連「學習」是什麼意思都不知道……"
32010-103 = "因為過去的憎恨，我們和聯邦學生會的幫助都不斷地被拒絕。"
32010-104 = "……我想要和奧利斯分校進行和解。"
32010-105 = "但是他們的憎恨，並不是輕易就能撫平的……#n至今為止累積的誤會和疑問實在太多，光靠我一個人沒有辦法承擔。"
32010-106 = "但是渚醬和聖亞醬都反對我的意見……因為一些政治上的理由。#n但我也不是無法理解，畢竟我們是茶會嘛。"
32010-107 = "我總是笨手笨腳的，不擅長那些政治的事情……#n但是，從現在開始好好相處真的是一件這麼困難的事嗎？"
32010-108 = "沒有辦法像之前一樣一邊進行茶會，一邊化解雙方的誤會嗎？"
32010-112 = "我希望那孩子……「白洲梓」這個存在能夠成為和解的象徵。"
32010-113 = "雖然我並不是非常熟悉那孩子……#n但他在奧利斯似乎也是相當優秀的學生，所以我想把可能性賭在他身上。"
32010-114 = "雖然也有說服渚醬，好好按規定進行的方法……但我也對此抱持著疑惑……"
32010-115 = "我想渚醬應該不會同意這種事情吧。"
32010-116 = "如果成功締結了伊甸園條約的話……到那個時候就真的不可能和奧利斯和解了。#n所以必須想辦法在那之前達成才行。"
32010-117 = "奧利斯的學生能夠好好在三一校園裡生活、能變得幸福……我想向大家證明這件事。"
32010-118 = "但是，就在這個時候，渚醬開始說在三一裡有「叛徒」存在……"
32010-119 = "……我不清楚渚醬為什麼會開始這麼想。#n或許是我在行動時露出了什麼馬腳也說不定。"
32010-120 = "於是渚醬為了不讓條約的締結被妨礙而設立了「補課部」。"
32010-121 = "一開始我還想「補課部」是什麼……#n啊，話說回來，老師你有問過為什麼會是那些孩子嗎？"
32010-122 = "在那個社團裡的就是渚醬懷疑的孩子們。"
32010-125 = "雖然花子有些非常奇怪的地方，但他真的是個非常優秀的學生，當然成績也是。#n不然也不會被推舉成為學生會長，也就是茶會的候補人選了。"
32010-126 = "聽說「修女會」也很努力地招募他，但似乎不太順利的樣子。"
32010-131 = "在禮拜堂課程那種虔誠的氛圍裡，穿著泳裝出現的時候可真是不得了。#n我當時正好也在，看到他被修女趕出去的時候，大家的表情都十分精彩呢。啊哈。"
32010-134 = "……但是，明明這麼有前途的孩子卻突然變了，甚至差點要因為成績而留級。"
32010-135 = "……究竟是為什麼呢？"
32010-137 = "我也能明白想要深入了解他的心情。#n畢竟那孩子已經和三一的高層有過許多交流，知道了不少祕密。"
32010-138 = "對渚醬來說，也不得不在意他吧。"
32010-141 = "至於小春醬……那孩子和骯髒的政治之類的事情完全無關，純粹是個好孩子。"
32010-146 = "那孩子之所以進入補課部的原因……嚴格來說並非他本人，而是因為蓮實醬他們。"
32010-147 = "[s] 「蓮實他們……？」"
32010-150 = "擁有強大武力的存在將不受自己控制的不安……"
32010-151 = "我想渚醬也是想為此做一些準備吧。"
32010-152 = "只要是實現正義部的人，不管是誰都無所謂。#n只是碰巧因為成績不好的關係而選上了他。"
32010-153 = "也就是說那孩子是人質。對於「退學」這件事，我想蓮實醬應該也是知道的。"
32010-154 = "[s] 「……」"
32010-155 = "你的表情好像是在說蓮實醬不可能做出這種事呢？#n唔嗯，雖然不知道老師和蓮實醬的關係有多好……"
32010-156 = "聽說之前發生過這樣的事唷……"
32010-158 = "實現正義部．教室"
32010-163 = "……"
32010-164 = "……"
32010-165 = "蓮，蓮實前輩，請冷靜──"
32010-169 = "絕對，絕對不能原諒！！萬魔殿！！格黑娜！！為什麼要做出那種事……！！"
32010-170 = "噫……！"
32010-171 = "哈啊，哈啊……"
32010-172 = "……請大家仔細聽。我現在在這裡宣誓。"
32010-173 = "從今以後，我……！"
32010-175 = "蓮實醬作為三一的武力集團「實現正義部」的副部長，非常憎恨格黑娜。"
32010-176 = "他會全力反對伊甸園條約也是理所當然的對吧？#n心想「竟然要跟那個格黑娜同盟」之類的。"
32010-177 = "接下來是……日步美醬。"
32010-180 = "日步美醬溫柔又可愛，也是個好孩子唷。渚醬也很喜歡他。"
32010-181 = "……但是，渚醬依然把懷疑的眼光放向了他。"
32010-183 = "他似乎有偷偷跑到學園外奇怪的地方，像是三一學生禁止進入的黑市之類的場所。"
32010-184 = "於是就有了他和某個犯罪集團有關係的傳聞。明明看起來是這麼善良單純的孩子……"
32010-185 = "[s] 「…………」"
32010-186 = "渚醬也很喜歡日步美，但即便如此還是對他投以懷疑的目光。#n不過這也很像渚醬的作風呢。"
32010-187 = "於是，渚醬心中「三一裡可能有叛徒」的懷疑，隨著情報的蒐集……"
32010-188 = "是不是漸漸變成了「這之中的誰是叛徒呢」？"
32010-189 = "已經不是懷疑是否存在叛徒了，對渚醬來說「叛徒」已經是既定存在的問題了。"
32010-190 = "……這就是現在的狀況。雖然有點長，但這樣應該有把我所知道的全都說出來了吧？"
32010-191 = "[s] 「到頭來『叛徒』究竟是……」"
32010-192 = "……要想得到答案，就必須先釐清「叛徒」所代表的意義。"
32010-193 = "渚醬現在一定想著「有人想要欺騙自己以及三一」還有誰是間諜吧。"
32010-194 = "從這個意義上來說，現在渚醬口中的「叛徒」就是偽造經歷混進來的「白洲梓」。"
32010-195 = "那孩子就跟剛剛說的一樣，其實是來自和三一敵對的奧利斯。"
32010-196 = "因為我的關係，那孩子已經在一無所知的情況下，處於複雜政治爭端的中心了……"
32010-197 = "不能讓那孩子以這種形式遭到退學。"
32010-198 = "所以我希望能夠保護他，現在這是只有老師能夠辦到的事了。"
32010-199 = "而且從某種意義上來說……我也是渚醬口中的「叛徒」。#n因為我並不贊成渚醬所推進的伊甸園條約。"
32010-200 = "不是主席的我沒有任何權力，想要妨礙之類的也做不到。"
32010-201 = "……"
32010-202 = "除此之外……"
32010-203 = "假設真的存在所謂「三一的叛徒」……"
32010-206 = "你不覺得也能用來形容渚醬嗎？"
32010-207 = "試圖把至今一直保持著平衡的三一變成[ruby=利維坦]巨大的怪物[/ruby]的存在……#n讓人產生這種想法也很正常吧。"
32010-209 = "……不過剛才說的這些，終究只是我單方面的說法罷了。"
32010-210 = "最終要做出決定的還是老師。#n是要保護梓醬還是找出叛徒……要相信渚醬，還是要相信我。"
32010-211 = "[s] 「彌香真的只要這樣就可以了嗎？」"
32010-212 = "那孩子的事情我也有責任……但是我也只能拜託老師你了。"
32010-213 = "……嗯？如果不是指這個的話……難道剛才老師是在擔心我嗎？"
32010-214 = "啊哈。老師真是溫柔呢。唔嗯，好像不小心誤會了呢。"
32010-215 = "不用擔心我的，別看我這樣，我可是挺強的哦♪"
32010-216 = "那麼，今天就先說到這裡吧。能和老師這樣聊天我很開心唷。"
32010-217 = "像這樣兩個人一直待在一起，可能會有不好的傳言呢。#n呵呵……雖然我完全不在意就是了。"
32010-218 = "那麼再見了，老師。"
32010-220 = "（目送彌香離開後，回到了大家身邊）"
32010-222 = "下一話;修女會"

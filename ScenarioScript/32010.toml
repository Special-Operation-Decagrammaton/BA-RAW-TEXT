[translation]
32010-1 = "第1話;巨大な怪物"
32010-3 = "[ns] \"アズサが、裏切り者……？\""
32010-4 = "うん。それで、あの子を守ってほしいの。"
32010-5 = "……あー、ごめんね。ちょっと単刀直入すぎたかな？ナギちゃんの悪い癖が移っちゃったのかも。"
32010-6 = "戸惑ってる先生のために、もう少し最初の方から説明してみようかな？"
32010-7 = "私はナギちゃんやセイアちゃんみたいに、あんまり頭が良いわけじゃないんだけど……。"
32010-8 = "ちゃんと伝わるように、頑張ってみるね！"
32010-9 = "[s] \"うん、お願い。\""
32010-10 = "まず、この「トリニティ総合学園」について。ナギちゃんがこの前言ってた通り、その一番の特徴は「たくさんの分派が集まってできた学校」だってこと。"
32010-12 = "パテル、フィリウス、サンクトゥス……この三つの分派がトリニティの中心になったっていうのは前も話した通り。"
32010-13 = "でも正確には他にも、今の「救護騎士団」の前身に当たる派閥とか、「シスターフッド」とかも含めた大小さまざまな派閥がいくつもあるの。"
32010-14 = "元々そういうたくさんの派閥が、まるで今のトリニティとゲヘナみたいな形で、お互いにお互いを敵視してて。"
32010-15 = "毎日毎日、紛争ばっかりの時代があったんだって。"
32010-16 = "そこで、もうこれ以上戦いを続けるんじゃなくて、仲良くしようっていう約束をすることになったの。"
32010-17 = "私たちはもう戦わなくて良い、一つの学園になろう……そんな話をしたのが、いわゆる「第一回公会議」。"
32010-18 = "[s] \"うん、どこかで聞いたことある。\""
32010-20 = "そうだよね、それで……"
32010-21 = "その会議を経て生まれたのが、今の私たちがいる「トリニティ総合学園」。"
32010-22 = "今でも分派だった頃の余波が無いと言えば噓だけど……時代の流れってところかな？今ではもう、そんなの全然気にしてないっていう声の方が多いはず。"
32010-23 = "でもその会議は、円満に話し合いが終わったわけじゃなくて……その時、最後まで反対していた学園があったの。"
32010-24 = "それが、「アリウス」。"
32010-26 = "元々は私たちとあんまり変わらなかったはずの、一つの分派。"
32010-27 = "経典に関するちょっとした解釈の違いがあったくらいで、結構色んなところが似てたんだって。"
32010-28 = "ちゃんとチャペルの授業もあったし、見た目もほとんど一緒で……それでいて、ゲヘナのことを心底嫌ってた。"
32010-29 = "でも、そのアリウスは連合を作ることに猛烈に反対して……最終的には、争いに繋がっちゃったの。"
32010-30 = "連合になって強大な力を持つようになったトリニティ総合学園は、その大きな力でアリウスを徹底的に弾圧し始めた。"
32010-31 = "あまりにも大きな力を持ちすぎると、その強さを確認したがる……なんていうのはよくあるお話で。つまるところ、アリウスは悲しいことにちょうど良いターゲットだったって言えるのかもしれない。"
32010-32 = "そうして、アリウスは潰された。"
32010-33 = "トリニティの自治区から追放されて、今は……詳細は分からないけど、キヴォトスのどこかに隠れてるみたい。"
32010-34 = "相当激しい戦いだったんだろうね。その後全然見つからないような場所に隠れたみたいで、多分、連邦生徒会ですら未だにその自治区がどこにあるのか分かってないくらいなの。"
32010-35 = "大半の生徒たちにとっては、「そんな学園あったっけ？」って感じだと思う。ほとんどはきっと、そんな争いがあったことすら知らない。"
32010-36 = "そうして表舞台には姿を現さなくなって、今となってはその影すらも薄くなってしまった存在……それが、アリウス分校だよ。"
32010-37 = "[s] \"アズサがその、アリウス分校の出身……。\""
32010-39 = "うん。"
32010-40 = "それで……ナギちゃんが推進している「エデン条約」、あれはさっき話してた「第一回公会議」の再現なの。"
32010-41 = "エデン条約……大きな二つの学園が、これからは仲良くしようねって約束。"
32010-42 = "……何だか、良いお話に聞こえるよね？でも本当のところはどうだろ。だってその核心は、ゲヘナとトリニティの武力を合わせた[ruby=Eden Treaty Organization]エデン条約機構[/ruby]、通称「ETO」と呼ばれる全く新しい武力集団を作ることなのに。"
32010-43 = "……そう。エデン条約っていうのは、言ってみればある種の武力同盟。"
32010-48 = "トリニティとゲヘナの戦力を合わせた、一つの大きな武力集団の誕生が目的……。"
32010-51 = "そんな、圧倒的な力を持つ集団が誕生するの……連邦生徒会長が行方不明っていう、こんな混迷の時期に。"
32010-52 = "その大きな力を使って、ナギちゃんは果たして何をしようとしてるのかな？"
32010-53 = "会長が不在の連邦生徒会を襲撃して、自分が連邦生徒会長にでもなるとか？"
32010-54 = "それともミレニアムっていう新しい芽を摘んでおくとか？"
32010-55 = "もちろん細かい目的は知らないけど……でも、これだけはハッキリ言えるよ。"
32010-56 = "そんなに大きな力を手に入れたら、きっと自分が気に入らないものを排除する……"
32010-57 = "昔、トリニティがアリウスにしたみたいにね。"
32010-58 = "あるいはもしかしたら、セイアちゃんみたいに……"
32010-62 = "……ううん、ごめんね。今のは失言だったかな。"
32010-63 = "[s] \"セイアは、何があったの？\""
32010-64 = "……。"
32010-65 = "……前にお話しした通りだよ。セイアちゃんは、入院中なの。"
32010-66 = "[s] \"……今どこにいるのか、聞いても良い？\""
32010-67 = "うーん……。"
32010-68 = "……先生は、本当に知りたい？"
32010-69 = "……この話をしたら、もう私は戻れない。"
32010-70 = "もしこの先の事実を知った先生が、私のことを裏切ったら……私はきっともう終わり。"
32010-71 = "それでも、知りたい？"
32010-72 = "[s] \"裏切るだなんて――\""
32010-73 = "……ううん、でも大丈夫だね。だってさっき、先生は私の味方って言ってくれたもん。"
32010-74 = "もしこれで裏切られたって、何て言うのかな……うん、それはそれで悪くないと思う。えへへっ。"
32010-75 = "……セイアちゃんは入院中なんかじゃない。"
32010-80 = "ヘイローを、壊されたの。"
32010-81 = "[s] \"……っ！？\""
32010-82 = "……。"
32010-84 = "冗談じゃないよ、本当のこと。"
32010-85 = "去年、セイアちゃんは何者かの手によって唐突に襲撃された。"
32010-86 = "対外的には「入院中」ってことになってるけど……そっちの方が真実。"
32010-87 = "私たちティーパーティーを除けば、このことはまだトリニティの誰も知らない。"
32010-88 = "もしかしたら、「シスターフッド」には知られてるかもだけど……あそこの情報網は半端じゃないからね。"
32010-89 = "とにかく、それくらい秘匿事項なの。"
32010-91 = "[ns] \"犯人は、まだ……？\""
32010-92 = "……うん、分かってない。捜査中っていうか、何も分かってないっていうか……もともとセイアちゃんは、秘密の多い子だったこともあってね。"
32010-93 = "……うん、まあそういうことなんだ。"
32010-94 = "[s] \"………。\""
32010-95 = "とはいっても、目星が付いてないわけではないんだけど……今の段階でただの推測を口にするのもね。"
32010-96 = "……それで、話は戻るんだけど。"
32010-97 = "「[ruby=しらす]白洲[/ruby]アズサ」……あの子をこの学園に転校させたのは、私なの。"
32010-98 = "[s] \"ミカが？\""
32010-99 = "うん、ナギちゃんには内緒でね。生徒名簿とかそういう書類を全部捏造して、あの子を入学させた。"
32010-100 = "……どうして？って、思うよね。"
32010-101 = "アリウス分校は今もまだ、私たちのことを憎んでる。"
32010-102 = "私たちはこうして豊かな環境を謳歌しているのに、彼女たちは劣悪な環境の中で、「学ぶ」ということが何なのかも分からないままでいる……。"
32010-103 = "私たちから差し伸べた手も、連邦生徒会からの助けも拒絶し続けてるの。過去の憎しみのせいで。"
32010-104 = "……私は、アリウス分校と和解がしたかった。"
32010-105 = "でもその憎しみは、簡単には拭えないほど大きくて……これまでの間に積み上がった誤解と疑念もあまりに多い。私の手には、負えないくらいに。"
32010-106 = "けどナギちゃんもセイアちゃんも私の意見には反対だった……政治的な理由でね。でも、それも分からないわけじゃない。私たちは、ティーパーティーだから。"
32010-107 = "私は不器用だから、そういう政治とかはちょっと得意じゃないんだけど……でも、また今から仲良くするのってそんなに難しいのかな？"
32010-108 = "前みたいにお茶会でもしながら、お互いの誤解を解くことはできないのかな？"
32010-112 = "私はあの子……「白洲アズサ」という存在に、和解の象徴になってほしかったの。"
32010-113 = "あの子についてはそれほど詳しいわけでもないんだけど、アリウスでもかなり優秀な生徒だったみたいだし、その可能性に賭けたかった。"
32010-114 = "ナギちゃんを説得してちゃんと正式に進めるっていう手段もあったかもしれないけど……そこについてはちょっと疑っちゃったっていうか……"
32010-115 = "ナギちゃんはそういうの、聞いてくれないだろうなって思って。"
32010-116 = "もしエデン条約が締結されたら……その時はもう今度こそ本当に、アリウスとの和解は不可能なものになっちゃう。だから、どうにかその前に実現させたかった。"
32010-117 = "アリウスの生徒がトリニティでもちゃんと暮らしていけて、幸せになれるんだって……みんなに証明してみせたかった。"
32010-118 = "でも、そんな中でナギちゃんがトリニティに「裏切り者」がいるって言い始めて……。"
32010-119 = "……ナギちゃんが、どうしてそんなことを考え始めたのかは分からない。私がそうやって動いてる時に、何かやらかしちゃったのかもしれない。"
32010-120 = "それでナギちゃんは条約の邪魔をさせまいとして、「補習授業部」を作ったの。"
32010-121 = "最初は「補習授業部」って何のことかと思ったけど……あ、そういえば先生。何であの子たちなのかって、聞いたことある？"
32010-122 = "あそこにいるのは、ナギちゃんが疑った子。"
32010-125 = "ハナコちゃんはすごい変わったところがあるけど、本当に、本当に優秀な生徒。もちろん成績って意味でも。何なら生徒会長、つまりティーパーティーの候補として挙がってたこともあったくらいなの。"
32010-126 = "「シスターフッド」も、あの子を引き入れようと頑張ってたって聞いたな。上手くはいかなかったみたいだけど。"
32010-131 = "礼拝堂での授業で、あの敬虔な空気の中ひとり水着を着て現れた時なんかすごかったね。私たまたまそこにいたんだけど、シスターに追い出されて、みんなの表情もすごいことになっててさ。あはっ。"
32010-134 = "……でも、あんなに優秀で将来を見込まれてたのに、あの子は急に変わっちゃったの。落第直前の状態になるくらいに。"
32010-135 = "……どうしてだろうね？"
32010-137 = "たしかに、それで探りを入れたくなる気持ちはよく分かる。あの子は既にトリニティの上層部とか色んな所と交流があって、結構な数の秘密を知っちゃってたこともあって。"
32010-138 = "ナギちゃんにとっては、気にせざるを得ないだろうね。"
32010-141 = "コハルちゃんは……あの子はどろどろした政治とか、そんなこととは何の関係も無い、純粋で良い子なんだけど。"
32010-146 = "何であの子がって話をすると……ああ、そういう意味ではあの子は、「疑われたから」じゃないかな。その直接的な原因は本人じゃなくて、ハスミちゃんたちだね。"
32010-147 = "[s] \"ハスミたち……？\""
32010-150 = "巨大な武力を持った存在、それも特にハスミちゃんみたいにゲヘナに対して強い憎しみを持っている存在が、自分の統制下に無いという不安感……何かが起こるんじゃないかっていう疑念……"
32010-151 = "ナギちゃんはそこに対して、何かしらの備えが欲しかったんだと思う。"
32010-152 = "正義実現委員会だったら多分、誰でも良かったんじゃないかな。ただとりあえず成績が悪かったから、あの子が選ばれた。"
32010-153 = "つまりあの子は人質。「退学」の件については多分、ハスミちゃんも知ってたはずだよ。"
32010-154 = "[s] \"……。\""
32010-155 = "それはハスミちゃんがそんなことするはずない、っていう顔かな？うーん、先生がハスミちゃんとどれくらい仲が良いのかは知らないけど……。"
32010-156 = "前、こういうことがあったって聞いたよ。"
32010-158 = "正義実現委員会・教室"
32010-163 = "……。"
32010-164 = "……。"
32010-165 = "ハ、ハスミ先輩、落ち着いてくださ――"
32010-169 = "絶対に、絶対に許しません！！万魔殿！！ゲヘナっ！！どうして、どうしてあそこまで……！！"
32010-170 = "ひっ……！"
32010-171 = "はぁ、はぁ……。"
32010-172 = "……よく、よく聞いておいてください。私は今ここに、宣言します。"
32010-173 = "これから私は……私は……っ！"
32010-175 = "ハスミちゃんはトリニティの武力集団「正義実現委員会」の副委員長だし、ゲヘナのことをものすごく憎んでる。"
32010-176 = "エデン条約に全力で反対するだろうっていうのは、火を見るよりも明らかじゃない？あのゲヘナとの同盟なんてー、って。"
32010-177 = "あとは……ヒフミちゃんか。"
32010-180 = "ヒフミちゃん、優しくて可愛くて、良い子だよね。ナギちゃんもすっごく気に入ってる。"
32010-181 = "……でも、それでもナギちゃんの疑いの目が向いちゃったの。"
32010-183 = "どうやらこっそり学園の外に出て、怪しいところに行ってたみたい。トリニティの生徒は出入禁止になってるブラックマーケットとか、あちこちにね。"
32010-184 = "それに、どこかの犯罪集団と関わりがあるって情報も流れてきた。あんなに善良そうで、純粋な子に見えるのに……。"
32010-185 = "[s] \"……………………。\""
32010-186 = "ナギちゃんだってヒフミちゃんのことを気に入ってるのに、それでも疑いの目は向けられた。まあそれも、ナギちゃんらしいと言えばナギちゃんらしいんだけど。"
32010-187 = "それで、ナギちゃんの中にあった「トリニティの中に裏切り者がいるかもしれない」という疑いは、色々と情報が集められて進められていく中で、"
32010-188 = "「あの中の誰がトリニティの裏切り者なのか？」っていう疑念に変わったんじゃないかな。"
32010-189 = "もういるのかどうかなんて話はしてない、「裏切り者」はすでにナギちゃんにとっては確定路線の現実問題になってる。"
32010-190 = "……それが、今の状況。ちょっと長かったけど、これで今私が知っていることは全部話せたかな？"
32010-191 = "[s] \"裏切り者……。\""
32010-192 = "……「裏切り者」っていう言葉が何を指すのか。それを多少はっきりさせた上でなら、ちゃんと解答は出せるの。"
32010-193 = "まずナギちゃんは今きっと、「自分たちを、トリニティを騙そうとしている者がいる」って思ってる。誰かがスパイなんじゃないかって。"
32010-194 = "そういう意味で、今ナギちゃんが言ってる「裏切り者」は、経歴を偽って入り込んでるあの子、「白洲アズサ」。"
32010-195 = "あの子はさっき話した通り、本当はトリニティが敵対しているアリウス出身の子だから。"
32010-196 = "あの子は私のせいで何も知らないまま、こんな複雑で政治的な争いのど真ん中に立つことになっちゃって……。"
32010-197 = "でも、こんな形であの子を退学なんてことにさせちゃいけない。"
32010-198 = "だから、守ってほしいの。それは今、先生にしかできないことだから。"
32010-199 = "それから、ある意味では……ナギちゃんにとっての「裏切り者」は、私でもある。私は、ナギちゃんが進めてるエデン条約に賛成の立場じゃないから。"
32010-200 = "ホストじゃない私には何の力も無い以上、邪魔も何もできないんだけど。"
32010-201 = "……。"
32010-202 = "……それと。別の観点からは同時に、こういうことも言えるよね？"
32010-203 = "「トリニティの裏切り者」……"
32010-206 = "それは、ナギちゃんだって言うこともできる。そう思わない？"
32010-207 = "これまで調和を保っていたトリニティを、[ruby=リヴァイアサン]巨大な怪物[/ruby]に変えようとしてる存在……そういう見方があっても、そんなにおかしくはない。"
32010-209 = "……まあ、でもこれも含めて全部全部、私からの一方的なお話でしかないよ。"
32010-210 = "だから、もちろん最終的には先生が決めて。白洲アズサを守るのか、裏切り者を見つけるのか……ナギちゃんを信じるのか。それとも、私を信じるのか。"
32010-211 = "[s] \"ミカは、それだけで大丈夫？\""
32010-212 = "あの子のことについては私に責任があって……でも、私にはただお願いすることしかできないから。"
32010-213 = "……ん、あれ？そうじゃなくてもしかして今のって……私のことを心配してくれてる？"
32010-214 = "あはっ。本当に優しいね、先生は。うーん、何だかつい勘違いしちゃいそう。"
32010-215 = "私の心配は大丈夫。こう見えても私、結構強いんだから♪"
32010-216 = "じゃあ、今日はこんなところかな。先生とまたこうしてお話しできて、楽しかったよ。"
32010-217 = "それにあんまりふたりでずっといると、変な噂が立っちゃいそうだもんね。ふふっ……まあ私はそれでも全然構わないんだけど。"
32010-218 = "じゃ、またね。先生。"
32010-220 = "（ミカを見送った後、みんなの元へと戻った。）"
32010-222 = "次回;シスターフッド"

[translation]
32010-1 = "#title;제1화;거대한 괴물"
32010-2 = "3;미카;01\n#3;a\n#wait;1500"
32010-3 = "[ns] \"배신자가 아즈사라고……?\""
32010-4 = "3;미카;02;그래. 그리고 그 아이를 지켜주었으면 해."
32010-5 = "3;미카;06;……. 응, 거두절미하고 본론부터 말해버렸네. 나기 쨩의 나쁜 버릇을 닮아가는 걸지도. \n#3;em;[속상함]"
32010-6 = "3;미카;01;음, 선생님이 납득할 수 있도록 설명을 해볼게."
32010-7 = "3;미카;08;나는 나기 쨩이나 세이아 쨩처럼 똑똑하지가 않아서 자신은 없지만……."
32010-8 = "3;미카;10;그래도 최선을 다해보겠습니다!\n#3;em;[반짝]\n#3;greeting"
32010-9 = "[s] \"으, 으응.\""
32010-10 = "3;미카;02;일단 우리 트리니티 학원의 가장 큰 특징은 저번에 나기 쨩이 말한 대로, 굉장히 많은 분파들이 모여 있다는 거야."
32010-11 = "#all;hide"
32010-12 = "#na;미카;파테르, 필리우스, 상투스 세 분파가 트리니티의 중심이 된 건 맞지만,"
32010-13 = "#na;미카;원래는 구호기사단의 기원이 되는 분파, 시스터후드의 분파 등등 다른 군소 분파들도 많이 존재하고 있었어."
32010-14 = "#na;미카;그때 분파 학원들은 마치 지금의 트리니티와 게헨나처럼 서로를 잡아먹지 못해 안달이었지."
32010-15 = "#na;미카;매일 분쟁과 분쟁이 이어졌다고 해."
32010-16 = "#na;미카;그래서, 다 함께 모여서 싸우지 말고 화해하자, 라는 약속을 하게 된 거야."
32010-17 = "#na;미카;우리는 서로 싸울 필요가 없다. 하나의 학원으로 통합하자. 라고. 그게 1차 공의회라고 불리는 회의였어."
32010-18 = "[s] \"익숙한 이야기네.\""
32010-19 = "3;미카;01\n#3;h"
32010-20 = "3;미카;02;……그렇지?"
32010-21 = "3;미카;01;그렇게 1차 공의회를 거쳐 태어난 게 바로 트리니티 종합학원. 지금의 우리 학원이야."
32010-22 = "3;미카;09;지금도 분파라는 구분은 희미하게 이어져 내려오고 있지만, 요즘 시대에는 분파? 그런게 있었나? 하는 느낌이긴 해.\n#3;em;…"
32010-23 = "3;미카;06;……응. 그치만 그리고 그 때 그 공의회를 반대했던 학원이 있었어."
32010-24 = "3;미카;05;그게 바로 아리우스 분파. \n#3;em;[반응]"
32010-25 = "#all;hide"
32010-26 = "#na;미카;분파라고는 하지만, 아리우스도 우리와 별다를 게 없는 학원이었어."
32010-27 = "#na;미카;경전의 해석 차이가 있는 정도일 뿐이고…… 좋아하는 것도 싫어하는 것도 비슷했거든."
32010-28 = "#na;미카;거기도 채플 수업이 있고, 외형도 다들 비슷하고, 게헨나를 싫어한다는 것까지도 똑같았어."
32010-29 = "#na;미카;하지만 아리우스는 연합에 극렬하게 반대했고……. 결국 그 갈등은 분쟁으로 이어졌어."
32010-30 = "#na;미카;하나로 연합해서 강력한 힘을 가진 트리니티 학원은…… 그 거대한 힘으로 아리우스 학원을 철저하게 탄압하기 시작했어."
32010-31 = "#na;미카;흔한 일이지. 거대한 힘을 가지게 되면 그 힘을 확인하고 싶어지게 되니까. 아리우스는 적절한 타겟이었던 거지."
32010-32 = "#na;미카;아리우스 학원은 그렇게 몰락해버렸어."
32010-33 = "#na;미카;트리니티 자치구에서 추방되어서, 지금은 키보토스 어딘가에서 숨어 지내고 있다고 해."
32010-34 = "#na;미카;그 트리니티와의 분쟁이 격렬했기 때문에, 자신들의 자치구의 위치를 극비리로 숨겼고…… 지금도 총학생회는 아리우스 자치구의 위치를 알지 못할걸?"
32010-35 = "#na;미카;응, 아마 그런 학원이 있었나? 같은 느낌이지 않을까? 아마 우리 학원의 대부분 학생들도 그런 일이 있었는지도 모를 거야."
32010-36 = "#na;미카;그게 바로 아리우스 학원이야. 지금은 그 존재조차도 희미해져 버린."
32010-37 = "[s] \"아즈사가 그 아리우스 학원 출신이라고……?\""
32010-38 = "3;미카;01\n#3;h"
32010-39 = "3;미카;02;맞아."
32010-40 = "3;미카;01;익숙한 이야기라고 했지? ……나기 쨩이 추진하고 있는 이 에덴조약은 1차 공의회의 재현이야.\n#3;em;[반응]"
32010-41 = "3;미카;99;에덴조약. 거대한 두 학원이 이제부터 사이좋게 지내자고 화해를 한다."
32010-42 = "3;미카;05;……상냥한 이야기로 들리겠지만, 그게 아냐. 게헨나와 트리니티의 무력을 통합한 ETO라는 전혀 새로운 무력 집단을 만드는 게 핵심이지.\n#3;em;[!]"
32010-43 = "3;미카;05;……응. 에덴조약의 실체는 바로 무력 동맹."
32010-44 = "#st;[0,0];instant;1;"
32010-45 = "#clearST"
32010-46 = "3;미카;05\n#3;d\n#wait;1000"
32010-47 = "3;미카;05\n#3;a\n#wait;1500\n#3;closeup"
32010-48 = "3;미카;05;트리니티와 게헨나의 무력을 합한 단일 무력 집단의 탄생이 목적인 거지.\n#3;closeup\n#3;em;…"
32010-49 = "#all;hide"
32010-50 = "3;나기사;01\n#3;a\n#wait;1500"
32010-51 = "#na;미카;총학생회장이 사라진 지금처럼 혼란한 시기에…… 압도적인 힘을 가진 집단이 탄생한다."
32010-52 = "#na;미카;그 거대한 힘으로 대체 무엇을 하려는 걸까?"
32010-53 = "#na;미카;총학생회장이 사라져서 빈 껍데기만 남은 총학생회를 습격해서 자신이 총학생회장이 되려는 걸까?"
32010-54 = "#na;미카;아니면 밀레니엄이라는 신흥 학원의 뿌리를 밟아둘 생각인 걸까?"
32010-55 = "#na;미카;그 자세한 목적까진 나는 몰라. 하지만 이건 분명히 알 수 있어."
32010-56 = "#na;미카;그 거대한 힘으로 자신들의 마음에 들지 않는 것들을 배제하게 될 거야."
32010-57 = "#na;미카;그 옛날 트리니티가 아리우스에게 했던 것처럼."
32010-58 = "#na;미카;아니, 어쩌면…… 혹은 세이아 쨩처럼……."
32010-59 = "#st;[0,0];instant;1;"
32010-60 = "#clearST"
32010-61 = "3;미카;04\n#3;em;[반응]\n#wait;1500\n#3;stiff"
32010-62 = "3;미카;14;……응, 실례. 이건 실언이고.\n#3;em;[땀]"
32010-63 = "[s] \"세이아에게 무슨 일이 있었어?\""
32010-64 = "3;미카;14;……."
32010-65 = "3;미카;15;세이아 쨩은…… 말했잖아. 투병 중이라고."
32010-66 = "[s] \"세이아는 그럼 어디에 있어?\""
32010-67 = "3;미카;06;……으응."
32010-68 = "3;미카;09;……알고 싶어? 선생님?\n#3;em;[?]"
32010-69 = "3;미카;99;이 얘기를 한다는 건, 이제 나는 돌이킬 수 없는 강을 건너게 되는 거야."
32010-70 = "3;미카;01;이 사실을 알게 된 선생님이 나를 배신하게 되면, 나는 그야말로 사면초가에 빠지게 돼."
32010-71 = "3;미카;02;그래도 알고 싶어?"
32010-72 = "[s] \"……배신이라니.\""
32010-73 = "3;미카;99;……응, 그치만 괜찮아. 왜냐면 선생님은 내 편이 되어줄 거라고 말해줬잖아?"
32010-74 = "3;미카;03;그렇게 말해준 사람에게 배신당한다면 그건 그거대로 나쁘지 않은 결말이라고 생각해. 헤헤헤.\n#3;em;[음표]\n#3;greeting"
32010-75 = "3;미카;01;……사실 세이아는 투병 중인 게 아냐."
32010-76 = "#st;[0,0];instant;1;"
32010-77 = "#clearST"
32010-78 = "3;미카;01\n#3;d\n#wait;1500"
32010-79 = "3;미카;01\n#3;a\n#3;closeup\n#wait;1500"
32010-80 = "3;미카;05;그녀는 헤일로가 파괴당했어.\n#3;closeup"
32010-81 = "[s] \"……………??!!\""
32010-82 = "3;미카;06;…….\n#3;closeup"
32010-83 = "#all;hide"
32010-84 = "#na;미카;응. 이제부터는 무서운 이야기지? 그치만 사실이니까."
32010-85 = "#na;미카;이미 꽤 된 사건이야. 작년 어느 날, 세이아 쨩은 정체불명의 존재에게 습격당했어."
32010-86 = "#na;미카;대외적으로는 투병 중이라고 알려져 있지만, 그녀는 확실하게 누군가에게 살해당한 거야."
32010-87 = "#na;미카;티파티를 제외한 트리니티의 그 누구도 이 사실을 알지 못해."
32010-88 = "#na;미카;아니, 어쩌면 시스터후드는 알고 있을 수 있겠지만…… 그 아이들의 정보력은 상당하니까."
32010-89 = "#na;미카;어쨌든 반드시 숨겨야 하는 이야기인 거지."
32010-90 = "3;미카;06\n#3;h"
32010-91 = "[ns] \"범인은 모르는 거야?\""
32010-92 = "3;미카;05;……응. 몰라. 아직도 수사 중이긴 하지만, 모든 것은 오리무중. 애초에 세이아 쨩은 비밀이 많은 아이였으니까 더욱 수사가 어려웠던 거 같아.\n#3;em;…"
32010-93 = "3;미카;06;……세이아 쨩의 이야기는 이 정도야."
32010-94 = "[s] \"……….\""
32010-95 = "3;미카;06;의심가는 사람들은 꽤 있지만, 지금 단계에선 함부로 입에 올려서는 안 되겠지, 응."
32010-96 = "3;미카;15;……그럼 다시 시라스 아즈사 이야기로 돌아가 볼게.\n#3;em;[반응]"
32010-97 = "3;미카;02;아즈사 쨩을 이 학원에 전학시킨 사람이 바로 나야."
32010-98 = "[s] \"미카가?\""
32010-99 = "3;미카;01;응. 나기 쨩 몰래 추진한 일이었어. 서류를 조작하고 휴학 후 복학이라는 형태로 학생명부를 만들어서 아즈사 쨩을 입학시켰어.\n#3;greeting"
32010-100 = "3;미카;09;……왜 그랬냐고?\n#3;em;[?]"
32010-101 = "3;미카;05;아리우스 학원은 아직도 우리를 증오하고 있어."
32010-102 = "3;미카;05;우리가 누리는 윤택한 환경과는 다르게, 거기는 열악한 환경에서 학생들은 배움이라는 행위를 알지도 못한 채 그저 생존하고만 있어.\n#3;em;…"
32010-103 = "3;미카;05;우리의 도움도, 총학생회의 도움도 거절하고, 그렇게 고집스럽게 그러고 있는 거야. 과거의 증오 때문에."
32010-104 = "3;미카;99;……나는 아리우스 학원과 화해하고 싶었어."
32010-105 = "3;미카;06;하지만 서로의 증오는 너무나 거대했고, 쌓여 있는 오해도 너무 많았어. 내가 건들기 힘들 정도로.\n#3;em;[속상함]\n#3;stiff"
32010-106 = "3;미카;05;나기 쨩도, 세이아 쨩도 여러 정치적 이유 때문에 나의 의견에 반대했어. 그것도 이해해. 우리는 티파티니까."
32010-107 = "3;미카;15;응. 나는 정치 같은 건 서툴러서 잘 모르지만……. 그냥, 사이좋게 지내자는 게 그렇게 어려운 걸까?"
32010-108 = "3;미카;08;예전처럼 다 같이 티파티를 하면서 오해를 풀면 안 되는 걸까?"
32010-109 = "#st;[0,0];instant;1;"
32010-110 = "#clearST"
32010-111 = "3;미카;08\n#3;em;…\n#wait;2500"
32010-112 = "3;미카;15;나는 ……시라스 아즈사가 그 화해의 상징이 되어 주었으면 했어."
32010-113 = "3;미카;01;나는 그 아이를 잘 모르지만, 아리우스에서 뛰어난 학생이었다고 하고, 그 아이가 가진 가능성을 지켜주고 싶었어."
32010-114 = "3;미카;99;나기 쨩을 설득해서 정식으로 일을 진행시키는 방법도 있었겠지만…… 그런 게 가능할 거라고는 도저히 믿어지지가 않았어."
32010-115 = "3;미카;06;나기 쨩은 그런 건 절대로 들어주지 않을 거라고 생각해서……."
32010-116 = "3;미카;05;에덴조약이 체결되고 난 뒤에는 아리우스와의 화해는 불가능해져 버려. 그래서 그 전에 어떻게든 화해를 실행하고 싶었어.\n#3;em;[반응]"
32010-117 = "3;미카;05;아즈사라는 아리우스의 학생이 트리니티에서도 잘 지내며 행복할 수 있다는 걸 모두에게 증명하고 싶었어."
32010-118 = "3;미카;06;그런데 그 와중에 나기 쨩이 <트리니티의 배신자>가 있다…… 라는 의심에 빠지기 시작한 거야."
32010-119 = "3;미카;08;나기 쨩이 왜 그런 생각을 하는지는 잘 몰라. 아마 내가 이 일을 추진하면서 뭔가 실수한 게 있었나 봐.\n#3;em;[속상함]"
32010-120 = "3;미카;15;나기 쨩은 자신이 하려는 일을 누군가가 방해하고 있다는 생각에 빠져, 보충수업부라는 기이한 걸 만들어버렸어."
32010-121 = "3;미카;14;보충수업부…… 하하하, 왜 그런 멤버들로 모였는지 알고 있어?\n#3;em;[땀]"
32010-122 = "3;미카;01;그 아이들은 전부 나기 쨩의 의심을 받은 아이들이야."
32010-123 = "#all;hide"
32010-124 = "3;하나코;01\n#3;a\n#wait;1000"
32010-125 = "#na;미카;하나코 쨩은 상당히 괴짜이지만 정말 우수한 학생이었어. 성적도 뛰어났고. 티파티의 후보로도 거론되었던 적이 있었으니까."
32010-126 = "#na;미카;시스터후드 쪽에서도 그 아이를 영입하려고 노력했나 봐. 잘 되진 않았지만."

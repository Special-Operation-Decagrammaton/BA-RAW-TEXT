[translation]
32010-1 = "ตอนที่ 1;ปีศาจยักษ์"
32010-3 = "[ns] \"คนทรยศที่ว่าคืออาซึสะเหรอ...?\""
32010-4 = "ใช่ และฉันอยากให้ครูช่วยปกป้องเด็กคนนั้น"
32010-5 = "... อืม ฉันรวบรัดจนพูดบทสรุปไปจนได้ สงสัยจะได้นิสัยไม่ดีแบบนี้มาจากนางิจังน่ะ "
32010-6 = "ฉันจะลองอธิบายให้คุณครูเข้าใจดูนะ"
32010-7 = "ถึงฉันจะไม่มั่นใจเพราะไม่ได้ฉลาดเหมือนนางิจังหรือเซอาจังก็เถอะ..."
32010-8 = "แต่ก็จะพยายามให้ถึงที่สุดนะ!"
32010-9 = "[s] \"เอ่อ... อืม\""
32010-10 = "อย่างที่นางิจังเคยบอกไว้ ลักษณะเด่นที่สุดของสถาบันทรีนิตี้ก็คือ การที่มีกลุ่มหลายกลุ่มมารวมตัวกัน"
32010-12 = "ปาเตอร์ ฟีเลียสและซางตุส คือ 3 กลุ่มที่เป็นศูนย์กลางของทรีนิตี้"
32010-13 = "แต่เดิมทีแล้วเรามีกลุ่มเล็กๆ อีกหลายกลุ่ม อย่างเช่นชมรมซิสเตอร์ที่เป็นต้นกำเนิดของชมรม#nอัศวินบรรเทาทุกข์"
32010-14 = "ตอนนั้นโรงเรียนกลุ่มต่างๆ ไม่ถูกกันเหมือนทรีนิตี้และเกเฮนน่าในตอนนี้"
32010-15 = "ว่ากันว่าเกิดความขัดแย้งในทุกๆ วันเลยล่ะ"
32010-16 = "และเพราะเหตุนี้ถึงได้ทำสัญญากันว่าจะไม่ต่อสู้กันและหันมาคืนดีกันแทน"
32010-17 = "\"พวกเราไม่จำเป็นต้องสู้กัน มารวมตัวเป็นโรงเรียนเดียวกันดีกว่า\"#nนี่แหละการประชุมที่ได้ชื่อว่าเป็นการประชุมสภาครั้งที่ 1"
32010-18 = "[s] \"เรื่องนี้คุ้นๆ จัง\""
32010-20 = "ใช่ไหมล่ะ...?"
32010-21 = "และผลที่ได้จากการประชุมสภาครั้งที่ 1 ก็คือ โรงเรียนสามัญทรีนิตี้ โรงเรียนของเราตอนนี้ไงล่ะ"
32010-22 = "ถึงการแบ่งกลุ่มจะยังคงดำเนินต่อมาอย่างเลือนรางก็เถอะ แต่ถ้าจะถามเด็กในยุคนี้ก็คงจะแค่รู้สึกว่า#n\"เราเคยมีการแบ่งกลุ่มอะไรด้วยเหรอ?\""
32010-23 = "อื้ม... แต่ในตอนนี้มีอยู่โรงเรียนหนึ่งที่คัดค้านการประชุมสภา"
32010-24 = "และนั่นคือกลุ่มอาเรียส "
32010-26 = "ถึงจะเรียกว่ากลุ่มก็เถอะ แต่อาเรียสก็เป็นโรงเรียนที่ไม่ได้ต่างอะไรกับพวกเรามาก"
32010-27 = "เรื่องเดียวที่ต่างกันคือการตีความพระคัมภีร์ ส่วนเรื่องอื่นก็คล้ายๆ กัน ทั้งสิ่งที่ชอบและสิ่งที่ไม่ชอบ"
32010-28 = "ที่นั่นก็มีคลาสสวดมนต์ นักเรียนก็ดูเหมือนกับเรา แถมยังไม่ชอบเกเฮนน่าเหมือนกันอีก"
32010-29 = "แต่อาเรียสก็ต่อต้านสหพันธ์อย่างรุนแรง... และในที่สุดความไม่ลงรอยนั้นก็ก่อตัวเป็นความขัดแย้ง"
32010-30 = "และสถาบันทรีนิตี้ที่ได้อำนาจยิ่งใหญ่จากการรวมเป็นหนึ่งสหพันธ์#nก็เริ่มกดขี่โรงเรียนอาเรียสอย่างรุนแรง"
32010-31 = "เป็นเรื่องธรรมดาที่ผู้ที่มีอำนาจยิ่งใหญ่อยากจะลองใช้อำนาจของตัวเองดู#nและอาเรียสก็เป็นเป้าหมายที่เหมาะสม"
32010-32 = "สุดท้ายโรงเรียนอาเรียสก็พังย่อยยับ"
32010-33 = "อาเรียสถูกเนรเทศออกจากเขตปกครองตนเองทรีนิตี้ ว่ากันว่าตอนนี้กำลังซ่อนตัวอยู่สักที่ในคิโวทอส"
32010-34 = "เพราะความรุนแรงของความขัดแย้งที่มีต่อทรีนิตี้ พวกนั้นจึงซ่อนตัวและปิดตำแหน่ง#nเขตปกครองตนเองไว้เป็นความลับสุดยอด ตอนนี้ทางองค์การนักเรียนเองก็คงยังหาตำแหน่ง#nของเขตปกครองตนเองอาเรียสไม่เจอหรอก"
32010-35 = "อืม เผลอๆ อาจจะคิดแค่ว่า \"มีโรงเรียนแบบนั้นอยู่ด้วยเหรอ?\" ล่ะนะ#nฉันว่านักเรียนส่วนใหญ่ของทรีนิตี้ก็คงไม่รู้หรอกว่าแต่ก่อนเคยเกิดเรื่องแบบนี้"
32010-36 = "นี่แหละเรื่องราวของโรงเรียนอาเรียส โรงเรียนที่ตัวตนเลือนรางลงทุกวันๆ"
32010-37 = "[s] \"อาซึสะเป็นเด็กจากโรงเรียนอาเรียสเหรอ...?\""
32010-39 = "ถูกต้อง"
32010-40 = "คุณครูบอกว่าเป็นเรื่องคุ้นๆ ใช่ไหม? สนธิสัญญาเอเดนที่นางิจังกำลังผลักดันอยู่#nคือทำให้การประชุมสภาครั้งที่ 1 เกิดขึ้นอีกครั้งนั่นล่ะ"
32010-41 = "สนธิสัญญาเอเดน... โรงเรียนขนาดใหญ่ 2 แห่งจะคืนดีและอยู่ด้วยกันอย่างปรองดอง"
32010-42 = "ถึงจะฟังดูเป็นมิตร แต่ไม่ใช่อย่างนั้นหรอก เพราะแก่นแท้ของมันคือการสร้าง ETO#nกลุ่มกองกำลังใหม่ที่เป็นการรวมกำลังของเกเฮนน่าและทรีนิตี้"
32010-43 = "อื้ม... ใบหน้าที่แท้จริงของสนธิสัญญาเอเดนก็คือพันธมิตรทางทหาร"
32010-48 = "เป้าหมายคือการก่อกำเนิดกลุ่มกองกำลังเดี่ยวที่รวมกำลังของทั้งทรีนิตี้ และเกเฮนน่าไว้ด้วยกัน"
32010-51 = "การสร้างกลุ่มใหม่ที่เหนือกว่าในช่วงเวลาปัจจุบันที่น่าสับสน เพราะประธานองค์การนักเรียน#nหายตัวไป..."
32010-52 = "จะเอาพลังอำนาจมากมายขนาดนั้นไปใช้ทำอะไรกันนะ?"
32010-53 = "จะถล่มองค์การนักเรียนที่เหลือแค่เปลือกนอกเพราะประธานองค์การนักเรียนหายไป แล้วขึ้นมาเป็นประธานองค์การนักเรียนแทนงั้นเหรอ?"
32010-54 = "หรือคิดจะหยั่งรากลงไปที่โรงเรียนใหม่อย่างมิลเลเนียม?"
32010-55 = "ฉันเองก็ไม่รู้เป้าหมายอย่างละเอียดหรอก แต่มันก็มีอย่างหนึ่งที่ชัดเจนอยู่นะ"
32010-56 = "นั่นก็คือ การใช้พลังอำนาจมหาศาลนั้นในการกำจัดสิ่งที่ตัวเองไม่ชอบ"
32010-57 = "เหมือนกับที่ทรีนิตี้เคยทำกับอาเรียสเมื่อก่อนไงล่ะ"
32010-58 = "หรือไม่ก็... อาจจะเหมือนกับที่ทำกับ... เซอาจัง..."
32010-62 = "อ๊ะ... ขอโทษที ฉันพูดผิดน่ะ"
32010-63 = "[s] \"เกิดอะไรขึ้นกับเซอาเหรอ?\""
32010-64 = "..."
32010-65 = "ฉันก็บอกไปแล้วนี่นา... เซอาจังน่ะ... กำลังต่อสู้กับโรคอยู่"
32010-66 = "[s] \"แล้วเซอาอยู่ที่ไหนล่ะ?\""
32010-67 = "อืม..."
32010-68 = "คุณครูอยากรู้เหรอ?"
32010-69 = "การที่ฉันเล่าเรื่องนี้มันเหมือนกับการข้ามแม่น้ำที่กลับไปไม่ได้เลยนะ"
32010-70 = "หากคุณครูรู้ความจริงนี้แล้วคิดจะหักหลังฉันละก็ ฉันก็คงจนมุมเข้าแล้วล่ะ"
32010-71 = "แต่ครูก็ยังอยากรู้เหรอ?"
32010-72 = "[s] \"ครูจะหักหลังไปทำไม...\""
32010-73 = "อื้ม แต่จะให้ฉันเล่าก็ได้ เพราะยังไงคุณครูก็บอกไว้แล้วนี่นาว่าจะอยู่ข้างฉัน"
32010-74 = "หากโดนหักหลังโดยคนที่พูดแบบนั้นล่ะก็ ฉันว่าคงเป็นตอนจบที่ไม่เลวเท่าไรหรอก แหะๆๆ"
32010-75 = "ที่จริงแล้ว... เซอาไม่ได้กำลังต่อสู้กับโรคร้ายอยู่หรอกนะ"
32010-80 = "เธอโดนทำลายฮาโลน่ะ"
32010-81 = "[s] \".........??!!\""
32010-82 = "..."
32010-84 = "อื้ม ช่างเป็นเรื่องที่น่ากลัวใช่ไหม? แต่มันคือความจริงล่ะ"
32010-85 = "ความจริงที่เกิดขึ้นเมื่อนานมาแล้ว วันหนึ่งในปีก่อน เซอาจังถูกบุคคลปริศนาโจมตี"
32010-86 = "ภายนอกต่างเข้าใจว่าเธอกำลังต่อสู้กับอาการป่วยอยู่ แต่จริงๆ แล้วเธอถูกฆาตกรรม"
32010-87 = "ในทรีนิตี้ไม่มีใครรู้ถึงความจริงนี้เลย ยกเว้นสภาน้ำชา"
32010-88 = "ไม่สิ บางทีชมรมซิสเตอร์อาจจะรู้ก็ได้ เพราะพวกนั้นเข้าถึงข่าวกรองได้ดีมาก"
32010-89 = "เอาเถอะ สรุปว่านี่คือเรื่องที่ต้องปิดเป็นความลับ"
32010-91 = "[ns] \"ไม่รู้ตัวคนร้ายเหรอ?\""
32010-92 = "อื้ม... ไม่รู้ ถึงจะยังสืบสวนอยู่ก็เถอะ แต่มันก็มืดแปดด้าน เพราะเดิมทีเซอาจังเป็นคนที่มี#nความลับเยอะอยู่แล้ว การสืบสวนก็เลยยิ่งยากเข้าไปใหญ่"
32010-93 = "เรื่องของเซอาจังก็มีประมาณนี้แหละ"
32010-94 = "[s] \"......\""
32010-95 = "มีหลายคนที่เราสงสัย แต่จะให้พูดอะไรพล่อยๆ ออกไปตอนนี้ก็คงไม่ได้"
32010-96 = "งั้นฉันจะกลับมา... ที่เรื่องของ ชิราสึ อาซึสะ อีกครั้งแล้วกัน"
32010-97 = "คนที่ส่งอาซึสะจังมาโรงเรียนนี้ คือฉันเอง"
32010-98 = "[s] \"มิกะเหรอ?\""
32010-99 = "อื้ม ฉันแอบจัดการเรื่องนี้โดยไม่ให้นางิจังรู้ ทั้งปลอมเอกสารและจัดทำรายชื่อนักเรียน#nในทำนองที่ว่าจะกลับมาเรียนหลังจากพักการเรียนชั่วคราว แล้วก็ให้อาซึสะจังเข้าเรียนที่นี่"
32010-100 = "ทำไมถึงทำแบบนั้นน่ะเหรอ...?"
32010-101 = "เพราะโรงเรียนอาเรียสยังคงเกลียดชังพวกเราอยู่ไงล่ะ"
32010-102 = "นักเรียนของที่นั่นไม่ได้แม้แต่จะรับการศึกษา แถมยังต้องดิ้นรนในสภาพแวดล้อมแร้นแค้น#nต่างจากพวกเราที่สุขสบายในสภาพแวดล้อมที่อุดมสมบูรณ์"
32010-103 = "แต่ความเกลียดชังในอดีตทำให้พวกเธอดื้อดึงและปฏิเสธการรับความช่วยเหลือจากทั้งทางเรา และองค์การนักเรียน"
32010-104 = "ส่วนตัวฉันอยากคืนดีกับโรงเรียนอาเรียส"
32010-105 = "แต่ความเกลียดชังระหว่างกันมันก็มากเหลือเกิน แถมความเข้าใจผิดก็ก่อตัวมากเกินไปทุกที มันยากที่ฉันจะไปแตะต้องอะไรได้"
32010-106 = "ทั้งนางิจังและเซอาจังก็ยกเหตุผลทางการเมืองมากมายมาคัดค้านความเห็นของฉัน#nแต่ฉันก็เข้าใจนะ เพราะพวกเราคือสภาน้ำชา"
32010-107 = "อื้ม ถึงฉันจะไม่ค่อยสันทัดเรื่องการเมืองเท่าไร แต่การอยู่ร่วมกันอย่างสงบสุขน่ะ มันยากขนาดนั้นเลยเหรอ?"
32010-108 = "เราจัดสภาน้ำชาแล้วมาคลายความเข้าใจผิดเหมือนเมื่อก่อนไม่ได้รึไง?"
32010-112 = "ฉันอยากให้... อยากให้ ชิราสึ อาซึสะ เป็นสัญลักษณ์ของการคืนดี"
32010-113 = "ถึงฉันจะไม่รู้จักเด็กคนนี้ดีนัก แต่ก็ว่ากันว่าเป็นนักเรียนชั้นเลิศของอาเรียส#nและฉันก็อยากจะปกป้องความเป็นไปได้ของเด็กคนนี้"
32010-114 = "ที่จริงฉันน่าจะไปเกลี้ยกล่อมนางิจังแล้วจัดการเรื่องนี้อย่างเป็นทางการ... แต่ฉันไม่คิดว่าวิธีนั้นจะเป็นไปได้น่ะ"
32010-115 = "เพราะฉันคิดว่านางิจังไม่มีทางรับฟังเรื่องแบบนี้เด็ดขาด..."
32010-116 = "หลังจากการลงนามในสนธิสัญญาเอเดน การคืนดีกับอาเรียสกลายเป็นสิ่งที่เป็นไปได้ยากมากขึ้น ฉันก็เลยอยากทำอะไรเพื่อให้เกิดการคืนดีกัน ไม่ว่าจะด้วยวิธีใดก็ตาม"
32010-117 = "ฉันอยากพิสูจน์ให้ทุกคนเห็นว่านักเรียนจากอาเรียสอย่างอาซึสะก็สามารถใช้ชีวิตปกติสุขได้#nในทรีนิตี้เหมือนกัน"
32010-118 = "แต่อยู่ๆ นางิจังก็เริ่มสงสัยแล้วว่ามี <คนทรยศในทรีนิตี้>"
32010-119 = "ฉันไม่รู้เลยว่าทำไมนางิจังถึงสงสัยแบบนั้น บางทีฉันคงทำบางอย่างผิดพลาดระหว่างทางไปก็ได้"
32010-120 = "นางิจังคิดว่ามีคนกำลังขัดขวางสิ่งที่ตัวเองจะทำอยู่ และจัดตั้งชมรมชั้นเรียนเสริมพิลึกๆ นี้ขึ้นมา"
32010-121 = "ชมรมชั้นเรียนเสริมงั้นเรอะ...? ฮ่าฮ่าฮ่า คุณครูรู้ไหมว่าทำไมชมรมนั้นถึงได้มีสมาชิกกลุ่มนี้?"
32010-122 = "เพราะทุกคนในนั้นคือเด็กที่นางิจังสงสัยไงล่ะ"

[translation]
2005002-1 = "ก้อนหินพูดได้!"
2005002-2 = "สำนักงานชาเล่ต์"
2005002-3 = "(วันต่อมา)"
2005002-7 = "(เลยเวลาที่ควรจะมาถึงไป 30 นาทีแล้ว...)"
2005002-8 = "(แต่ริตสึก็ยังไม่มา)"
2005002-9 = "[ns] \"ลองโทรหาแล้ว แต่ไม่รับสายเลยแฮะ\""
2005002-10 = "(ในขณะที่เดินไปมาในห้องทำงานด้วยความกังวลใจ คุณครูก็มองออกไปนอกหน้าต่าง)"
2005002-14 = "[ns] \"ริตสึ...?\""
2005002-15 = "(ริตสึอยู่ข้างนอกนั่น)"
2005002-16 = "(และกำลังใช้ค้อนกับสิ่วทุบก้อนหินในสวนหน้าสำนักงาน)"
2005002-17 = "[ns] \"ทำอะไรอยู่น่ะ...?\""
2005002-20 = "สวนหน้าชาเล่ต์"
2005002-21 = "(สิ่งที่คุณครูเห็นจากการมองลงมาที่ชั้น 1 ก็คือ)"
2005002-22 = "(ริตสึที่กำลังแกะสลักหินจัดสวนที่มีขนาดใหญ่กว่าตัวของเธอมาก)"
2005002-23 = "[ns] \"นี่ ริตสึ...?\""
2005002-25 = "อ๊ะ! คุณครูนี่นา!"
2005002-26 = "สวัสดีค่ะ!"
2005002-27 = "จริงสิ! ฉันต้องไปเข้าเวรนี่เนอะ!"
2005002-28 = "[ns1] \"ไปทำอะไรอยู่ตรงนั้นน่ะ? แกะสลักหินเหรอ?\"\n[ns2] \"ว่าแต่... กำลังแกะสลักหินจัดสวนอยู่เหรอ?\""
2005002-31 = "อื้อ! หินก้อนนี้พูดกับฉันน่ะ!"
2005002-32 = "[s] \"หินพูดได้งั้นเหรอ...?\""
2005002-33 = "อื้อ! หินทุกก้อนมีรูปทรงของมันซ่อนอยู่ข้างในน่ะ"
2005002-34 = "แล้วหินจัดสวนก้อนนี้ก็พูดถึงความงดงามที่ซ่อนอยู่ภายในกับฉัน"
2005002-35 = "ฉันก็เลย..."
2005002-36 = "ทุบมันซะเลย!"
2005002-37 = "[s] \"ว่าไงนะ?!\""
2005002-38 = "เราต้องทุบพื้นผิวด้านนอกออกก่อน ถึงจะแกะสลักจนได้รูปทรงที่ซ่อนอยู่ภายในยังไงล่ะ"
2005002-39 = "เดิมทีแล้วพื้นผิวของหินก้อนนี้ขรุขระและไม่เรียบเนียน รูปทรงที่สวยงามก็เลยปรากฏออกมาสู่ภายนอก#nไม่ได้..."
2005002-40 = "[ns3] \"เป็นแบบนี้สินะ...\"\n[ns4] \"ถ้างั้นก็ควรบอกครูก่อนสิ...!\""
2005002-43 = "[ns] \"ว่าแต่... แบบนี้ไม่ผิดกฎของโรงเรียนเหรอ?\""
2005002-44 = "อืม ก็ต้องผิดอยู่แล้ว..."
2005002-45 = "..."
2005002-46 = "แต่ว่านะ คุณครู!"
2005002-47 = "[s] \"อย่ามาพูดเปลี่ยนเรื่องเลย!\""
2005002-53 = "ฉันขอขี่คอหน่อยได้มั้ย?"
2005002-54 = "[s] \"แต่ก็ขึ้นมาแล้วไม่ใช่เหรอ?\""
2005002-55 = "สูงจัง!"
2005002-56 = "ฮิฮิ ฉันตัวเตี้ย มือก็เลยไม่ถึงส่วนยอดของก้อนหินน่ะ!"
2005002-57 = "ทีนี้ก็แกะสลักต่อได้แล้ว! ขอบคุณนะ คุณครู!"
2005002-60 = "(แล้วริตสึก็แกะสลักก้อนหินต่อในขณะที่ขี่คอคุณครูอยู่...)"
2005002-61 = "(ส่วนคุณครูก็ได้แต่ดูเศษก้อนหินที่ร่วงลงมาไม่หยุด...)"
2005002-65 = "อืม ทีนี้แค่เก็บงานนิดหน่อยก็น่าจะเสร็จแล้ว!"
2005002-66 = "สุดท้ายก็เก็บด้านข้างนี้... หืม?"
2005002-67 = "เฮือก คุณครู ยังโอเคหรือเปล่า? ฝุ่นหินเกาะเต็มหน้าเลย?!"
2005002-68 = "[s] \"แค่ก... แค่กๆ\""
2005002-69 = "ทะ... ทำยังไงดีล่ะ?"
2005002-70 = "อ๊ะ! งั้นเปลี่ยนเป็นขี่คอแบบกลับหลังหัน! "
2005002-71 = "อย่างน้อยจะได้ไม่มีฝุ่นหินไปเกาะหน้าไง!"
2005002-72 = "[s] \"ไม่เอาดีกว่า! ไม่เป็นไร!!\""
2005002-73 = "อ่า เอางั้นเหรอ? คิดว่าเป็นไอเดียที่ดีซะอีก"
2005002-74 = "งั้นฉันขอทำต่อเลยนะคะ!"
2005002-77 = "(แล้วงานแกะสลักของริตสึก็เสร็จสมบูรณ์)"
2005002-79 = "ดีละ! เสร็จแล้ว!"
2005002-80 = "[s] \"เหนื่อยแย่เลยนะ ริตสึ\""
2005002-81 = "ขอบคุณค่ะ คุณครู ฮิฮิ"
2005002-82 = "[s5] \"จะว่าไป รูปสลักนี้มัน...\"\n[s6] \"แต่จะว่ายังไงกับรูปสลักหินนี้ดีนะ...\""
2005002-85 = "จะบอกความประทับใจต่อผลงานเหรอ?"
2005002-86 = "ไม่ต้องพูดออกมาก็ได้!"
2005002-87 = "[s] \"หืม?\""
2005002-88 = "การถ่ายทอดความประทับใจต่อหน้าผลงานที่เพิ่งได้เห็นเป็นครั้งแรก"
2005002-89 = "เป็นงานที่ยากมากเลยไม่ใช่เหรอ?"
2005002-90 = "ถ้าเป็นฉัน ฉันน่าจะไม่รู้ว่าจะตีความผลงานชิ้นนั้นในบริบทไหน แล้วก็ไม่รู้ว่าควรเลือกใช้คำไหน#nให้เหมาะสมดี"
2005002-91 = "ยิ่งคนที่สร้างสรรค์ผลงานชิ้นนั้นยืนอยู่ข้างๆ แล้วด้วย จะให้พูดตามตรงก็น่าจะลำบาก"
2005002-92 = "เพราะงั้น ฉันว่าคุณครูค่อยๆ สะสมความคิดจากการมองหินสลักก้อนนี้หลายๆ ครั้ง..."
2005002-93 = "แล้วค่อยพูดบอกความประทับใจทีหลังก็ได้!"
2005002-94 = "[s] \"ขอบใจที่เห็นใจกันนะ ริตสึ\""
2005002-95 = "งั้นให้ฉันเอาหินสลักก้อนนี้ไปไว้ในห้องทำงานให้มั้ย?"
2005002-96 = "[s] \"ก็เป็นข้อเสนอที่น่าสนใจอยู่หรอกนะ...\""
2005002-100 = "[ns7] \"แต่ครูว่าเอาไว้ในสวนแบบนี้น่าจะสวยกว่า\"\n[ns8] \"แต่ครูว่าตั้งไว้ในสวนให้หลายๆ คนได้ชมจะดีกว่า\""
2005002-103 = "อ่า..."
2005002-104 = "ขอบคุณนะ คุณครู..."
2005002-105 = "ฉันจะจดจำวันนี้ที่น่าภาคภูมิใจไว้เลยละ!"
2005002-106 = "[s9] \"วันนี้ยังไม่จบแค่นี้หรอกนะ ริตสึ\"\n[s10] \"วันนี้ยังมีงานที่นักเรียนเวรต้องทำอยู่เป็นกองเลยละ\""
2005002-109 = "อ่า..."
2005002-110 = "[s] \"งั้นเราไปกันเถอะ! ไปยังโลกของงานเอกสาร!\""
2005002-111 = "แง...!"
2005002-113 = "(แล้วคุณครูก็ทำงานจนตกเย็น โดยมีริตสึคอยช่วยเหลืออยู่ข้างๆ)"

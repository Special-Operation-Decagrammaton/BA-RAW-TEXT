[translation]
2005002-1 = "石頭說話了！"
2005002-2 = "夏萊辦公室"
2005002-3 = "（隔天）"
2005002-7 = "（離約好的時間已經過了30分鐘……）"
2005002-8 = "（律卻還是不見人影）"
2005002-9 = "[ns]「打電話也沒接……」"
2005002-10 = "（擔心得在辦公室踱步，不經意地往窗外一看）"
2005002-14 = "[ns]「……律？」"
2005002-15 = "（在窗外看見了律的身影）"
2005002-16 = "（律正用鎚子與鑿子敲打著前院的石頭）"
2005002-17 = "[ns]「……他在做什麼？」"
2005002-20 = "夏萊前院"
2005002-21 = "（下到一樓之後，映入眼簾的是──）"
2005002-22 = "（律正在雕刻一塊比自己身體還大的造景石的身影）"
2005002-23 = "[ns]「那個，律……？」"
2005002-25 = "哦！是老師！"
2005002-26 = "老師好！"
2005002-27 = "對吼！我今天是值日生耶！"
2005002-28 = "[ns1]「你好呀，律。」\n[ns2]「話說……你在雕刻造景石嗎？」"
2005002-31 = "嗯！因為這塊石頭跟我說話了！"
2005002-32 = "[s]「石頭跟你說話……？」"
2005002-33 = "對呀！每塊石頭裡面都隱藏著各自的形象。"
2005002-34 = "而剛才這塊造景石，就跟我說了它蘊藏的美哦。"
2005002-35 = "所以……"
2005002-36 = "我要打破它！"
2005002-37 = "[s]「你說什麼！？」"
2005002-38 = "必須把外表打破、鑿開，才能展現出裡面蘊含的形象呀。"
2005002-39 = "不然它美麗的形象，就都被粗糙不平的表面給掩蓋住了。"
2005002-40 = "[ns3]「原來是這個意思啊……」\n[ns4]「你要說得清楚一點嘛……！」"
2005002-43 = "[ns]「不過……這樣在校規上沒問題嗎？」"
2005002-44 = "嗯？當然有問……"
2005002-45 = "……"
2005002-46 = "先不說這個了，老師！"
2005002-47 = "[s]「居然糊弄過去！」"
2005002-53 = "可以讓我騎在你的肩膀上嗎？"
2005002-54 = "[s]「你不是已經騎上去了嗎……？」"
2005002-55 = "好高哦！"
2005002-56 = "嘿嘿，我個子比較矮，所以手碰不到石頭的上面！"
2005002-57 = "現在這樣就能好好雕刻了！謝謝老師！"
2005002-60 = "（就這樣讓律騎在肩膀上雕刻石頭……）"
2005002-61 = "（……過程中，石粉不停地往下掉）"
2005002-65 = "嗯，再稍微修一下就好了！"
2005002-66 = "最後把這邊的側面……嗯？"
2005002-67 = "哇，老師你沒事吧？#n臉上沾滿了石粉耶！"
2005002-68 = "[s]「呸呸！呸！呸呸呸！」"
2005002-69 = "怎，怎麼辦？"
2005002-70 = "啊！反過來騎應該就可以了吧！"
2005002-71 = "至少老師的臉上不會再沾到石粉！"
2005002-72 = "[s]「不用了！沒關係！！」"
2005002-73 = "咦，真的嗎？#n我還以為是個好辦法的說。"
2005002-74 = "那就繼續這樣吧！"
2005002-77 = "（之後順利完成了雕刻）"
2005002-79 = "好！雕刻完成！"
2005002-80 = "[s]「辛苦了，律。」"
2005002-81 = "謝謝老師，嘿嘿。"
2005002-82 = "[s5]「話說這座雕像……」\n[s6]「該怎麼說才好呢……」"
2005002-85 = "在思考感想嗎？"
2005002-86 = "其實不說也沒關係哦！"
2005002-87 = "[s]「嗯？」"
2005002-88 = "要別人當場對第一次見到的作品說出感想……"
2005002-89 = "不覺得有點強人所難嗎？"
2005002-90 = "既不知道該從什麼脈絡來解讀作品，也不知道當下該用什麼詞彙比較恰當……"
2005002-91 = "假如作品的創作者在旁邊的話，又很難坦率地發表自己的心得。"
2005002-92 = "所以老師就慢慢觀賞這個雕刻，等到想把累積起來的想法說出來的時候……"
2005002-93 = "再把感想告訴我吧！"
2005002-94 = "[s]「謝謝你的體貼，律。」"
2005002-95 = "既然這樣，要不要幫老師把雕像搬進辦公室呢？"
2005002-96 = "[s]「這個提議雖然很吸引人……」"
2005002-100 = "[ns7]「不過為了讓更多人看見這樣的作品……」\n[ns8]「我覺得放在前院這裡才是更好的選擇。」"
2005002-103 = "啊……"
2005002-104 = "……謝謝你，老師。"
2005002-105 = "感覺今天會讓我留下非常滿足的回憶哦！"
2005002-106 = "[s9]「現在下定論還太早囉，律。」\n[s10]「還有堆積如山的值日生工作在等著呢。」"
2005002-109 = "……啊。"
2005002-110 = "[s]「一起前往工作的世界吧！」"
2005002-111 = "嗚嗚……！"
2005002-113 = "（於是直到傍晚才跟值日生律處理完剩下的工作）"

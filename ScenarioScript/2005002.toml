[translation]
2005002-1 = "The Rock Spoke!"
2005002-2 = "Schale Office"
2005002-3 = "The next day."
2005002-7 = "Ritsu had been scheduled to come in 30 minutes prior, but still hadn't appeared."
2005002-8 = "Where could she have gone?"
2005002-9 = "[ns]\"She's not picking up her phone...\""
2005002-10 = "As I worriedly paced, I looked out the window."
2005002-14 = "[ns]\"...Ritsu?\""
2005002-15 = "I could see her outside."
2005002-16 = "Ritsu was tapping on a boulder in the front yard with a hammer and chisel."
2005002-17 = "[ns]\"...What is she doing?\""
2005002-20 = "Schale Front Yard"
2005002-21 = "I rushed outside."
2005002-22 = "And I saw Ritsu chiseling away at a rock that dwarfed her frame."
2005002-23 = "[ns]\"Uh, Ritsu...?\""
2005002-25 = "Oh! It's Sensei!"
2005002-26 = "Hello!"
2005002-27 = "Oh! I'm the Student Rep today, right?"
2005002-28 = "[ns1]\"Hi, Ritsu.\"\n[ns2]\"Um... Are you sculpting the garden decorations?\""
2005002-31 = "Yeah! This rock spoke to me!"
2005002-32 = "[s]\"The rock spoke to you...?\""
2005002-33 = "Yes! Every rock has its own shape underneath."
2005002-34 = "This one told me that it had true beauty lying within!"
2005002-35 = "Which is why..."
2005002-36 = "...I broke it!"
2005002-37 = "[s]\"You what?!\""
2005002-38 = "Its true form can only come out after you chip away at the outer shell."
2005002-39 = "So I had to work through the rough and bumpy surface to reveal its true form!"
2005002-40 = "[ns3]\"So that's what you meant...\"\n[ns4]\"Please lead with that next time...!\""
2005002-43 = "[ns]\"Anyway... Is this within school rules?\""
2005002-44 = "Hm? Of course n—"
2005002-45 = "..."
2005002-46 = "So, it's good to see you, Sensei!"
2005002-47 = "[s]\"You dodged my question!\""
2005002-53 = "Can you boost me up?"
2005002-54 = "[s] \"But you're already climbing on me!\""
2005002-55 = "Higher!"
2005002-56 = "Heehee. I wasn't tall enough to hit the top of the rock!"
2005002-57 = "Now I can sculpt properly! Thank you, Sensei! Close your eyes!"
2005002-60 = "Ritsu continued to sculpt the rock while positioned on my shoulders."
2005002-61 = "An endless stream of stone dust fell from above."
2005002-65 = "Okay, just have to refine this part...!"
2005002-66 = "And, finally, this side needs a little more..."
2005002-67 = "Oh my. Sensei, are you okay? Your face is covered in dust! Don't lick it!"
2005002-68 = "[s]\"Pfff. Pfff.\""
2005002-69 = "Wh-What should we do?"
2005002-70 = "Ah! What if we rotate? I'll sit on your shoulders, but you face the other way? "
2005002-71 = "Then the dust will fall on your back!"
2005002-72 = "[s]\"No! We shouldn't!\""
2005002-73 = "Eh, really? I thought it'd be a good idea."
2005002-74 = "I'll wrap this up, then!"
2005002-77 = "At last, she finished the sculpture."
2005002-79 = "Okay! And my work is...done!"
2005002-80 = "[s]\"Looks great, Ritsu.\""
2005002-81 = "Thank you, Sensei. Heehee."
2005002-82 = "[s5]\"Anyway, this sculpture...\"\n[s6]\"It's so... How should I put it...\""
2005002-85 = "Are you trying to tell me how you feel about it?"
2005002-86 = "You don't have to do that!"
2005002-87 = "[s]\"Hm?\""
2005002-88 = "You just saw it for the first time, and I'm right here."
2005002-89 = "I think that would make speaking your feelings difficult, huh?"
2005002-90 = "Give yourself time to think about how it makes you feel."
2005002-91 = "Especially how it makes you feel when I'm not staring at you!"
2005002-92 = "And, however long it takes you to think it out is fine. Once you have the right words..."
2005002-93 = "...Then you can tell me how you feel, Sensei!"
2005002-94 = "[s]\"That's very considerate, Ritsu.\""
2005002-95 = "Speaking of which, would you like me to move it? I can put it in your office."
2005002-96 = "[s]\"It's an interesting offer...\""
2005002-100 = "[ns7]\"But still, I think a work like this would be most beautiful...\"\n[ns8]\"...Where people can see it, like out here.\""
2005002-103 = "Ah..."
2005002-104 = "...Thank you, Sensei."
2005002-105 = "I think this has been a very fulfilling day!"
2005002-106 = "[s9]\"Not so fast, Ritsu.\"\n[s10]\"You still have Student Rep duties.\""
2005002-109 = "...Ah."
2005002-110 = "[s]\"It'll be fun. Let's embark on a journey of paperwork!\""
2005002-111 = "...Wah!"
2005002-113 = "I assisted Ritsu with the Student Rep work until night fell."

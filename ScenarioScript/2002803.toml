[translation]
2002803-1 = "Unstoppable"
2002803-2 = "I looked around camp in search of Hinata to help her with moving luggage."
2002803-6 = "I finally found her effortlessly carrying around luggage twice her size, wandering about the forest."
2002803-10 = "All right... Hmm. This would go there..."
2002803-15 = "That was lot lighter than I thought."
2002803-16 = "Maybe because it's so much smaller than what I'm used to at the Cathedral?"
2002803-20 = "...Huh?"
2002803-24 = "...Wha?! S-Sensei...?!"
2002803-25 = "Have you been standing there for very long?  "
2002803-26 = "You just arrived?"
2002803-27 = "I see... That's a relief."
2002803-28 = "Oh? You were looking for me so you could lend a hand?"
2002803-29 = "No need! I told you over and over again that I'll be fine, because I was worried about this outcome!"
2002803-30 = "It was hard enough turning down everyone else's help and now even you..."
2002803-31 = "Now I just feel like I'm causing trouble with my determination to do everything on my own."
2002803-32 = "Perhaps my stubbornness is a vice..."
2002803-33 = "[s1] \"I genuinely just wanted to help you.\"\n[s2] \"You're doing ME a favor by letting me help!\""
2002803-36 = "Well... I don't have a good rebuttal to that..."
2002803-37 = "Hmm..."
2002803-42 = "*sigh* All right... I guess there's nothing I can do."
2002803-43 = "In that case, I'm very pleased to work with you, Sensei."
2002803-48 = "On one condition! Please promise me you will only handle the lighter loads. I don't want you to injure yourself."
2002803-49 = "Is that okay...?"
2002803-50 = "[s3] \"Thanks, I'll do just that.\"\n[s4] \"All right! Working with Hinata!\""
2002803-53 = "Pfft."
2002803-54 = "Heehee. Heeheehee...!"
2002803-58 = "Oh, dear. My apologies. I don't know where that all came from."
2002803-59 = "Somehow, you truly do have a knack for making me feel more at ease."
2002803-60 = "I know you're showing your compassion in your own way, despite what you say. So, thank you."
2002803-64 = "Now then, let's get lifting, Sensei! While you have offered me your time, I certainly do not want to take too much of it!"
2002803-65 = "I'll take the lead. Allow me..."
2002803-66 = "Hup!"
2002803-75 = "...Huh? That's..."
2002803-76 = "[s5] \"It's a huge boulder.\"\n[s6] \"The way forward is blocked... What to do...\""
2002803-79 = "This is our best route to get back to camp..."
2002803-80 = "...What? We should look for another route?"
2002803-81 = "Hmm."
2002803-82 = "I don't believe that will be necessary."
2002803-83 = "It doesn't appear anyone has intentionally placed it here, and a boulder of this size should be no problem to move."
2002803-84 = "[s] \"Oh, I see...?\""
2002803-88 = "[ns7] \"...Wait, what?\"\n[ns8] \"Moving what now?\""
2002803-91 = "Just one moment. Please allow me to put down these boxes."
2002803-96 = "And I'll just move this over to the side!"
2002803-100 = "Heave... ho!"
2002803-109 = "Whew! And the path is clear!"
2002803-114 = "My apologies for the wait, Sensei. Shall we?"
2002803-118 = "[ns] \"...\""
2002803-123 = "Huh... This time it's a fallen tree on the path..."
2002803-127 = "It looks like it collapsed due to old age. I don't think we can maneuver around it."
2002803-128 = "And it's too big to simply push off to the side..."
2002803-129 = "...What? Do I think we should find another way around?"
2002803-130 = "Haha... Well, we could certainly do that, but it'll take us quite a while to get back then."
2002803-131 = "Hm. How should we approach this situation?"
2002803-135 = "Since it's an old tree and not a boulder, perhaps I could just..."
2002803-139 = "Hup... ha!"
2002803-148 = "[ns9] \"The tree trunk just broke like a twig...\"\n[ns10] \"...Oh... um...\""
2002803-151 = "...Whew! It wasn't that sturdy! How lucky!"
2002803-152 = "Now, Sensei! Should we keep moving? We're almost there!"
2002803-156 = "...Huh?"
2002803-157 = "Sensei...? You have a rather strange expression on your face..."
2002803-158 = "[s] \"...Hinata.\""
2002803-159 = "Y-Yes?"
2002803-165 = "[ns11] \"I'm very glad that you're a good student.\"\n[ns12] \"If you ever run into a problem, please tell me first.\""
2002803-170 = "Y-Yes?"
2002803-171 = "Oh, um... thank...you...?"
2002803-175 = "...Sensei?"
2002803-177 = "I returned to camp with Hinata safely, who continued to be confused about what I said."
2002803-178 = "I just couldn't find the words to explain it to Hinata, after seeing her move a massive boulder and split a tree trunk with her bare hands."

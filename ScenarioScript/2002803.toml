[translation]
2002803-1 = "勢不可擋"
2002803-2 = "（環視營地周圍尋找搬運行李的日向）"
2002803-6 = "（發現日向正雙手拿著超大量的行李走在森林裡）"
2002803-10 = "嘿咻……這個……"
2002803-15 = "比想像中輕很多呢……"
2002803-16 = "與教堂相比，量似乎也比較少的樣子……？"
2002803-20 = "……嗯？"
2002803-24 = "……哇！？老，老師……！？"
2002803-25 = "您，您什麼時候來的！？"
2002803-26 = "剛，剛剛才來是嗎？"
2002803-27 = "原，原來如此……"
2002803-28 = "咦？是來幫忙的？"
2002803-29 = "怎麼這樣！！明明已經跟您說不必幫忙的……！"
2002803-30 = "其他人也這麼跟我說過，我好不容易才拒絕他們的，沒想到居然連老師也……"
2002803-31 = "這樣……我想幫忙的心意好像反而給老師添了麻煩……"
2002803-32 = "我真固執……"
2002803-33 = "[s1]「我是自己想幫忙的，別在意。」\n[s2]「把工作都推給日向也會讓我過意不去的。」"
2002803-36 = "嗚，嗚嗚……老師都這麼說了……繼續拒絕反而會很失禮的吧……"
2002803-37 = "嗯……"
2002803-42 = "呼……好吧……這也沒辦法。"
2002803-43 = "我知道了……那麼就拜託了。#n謝謝您，老師。"
2002803-48 = "但是請您只幫忙搬輕的行李哦。#n不然我真的會無法釋懷的。"
2002803-49 = "這樣可以嗎……？"
2002803-50 = "[s3]「謝謝，就這麼做吧。」\n[s4]「好耶！可以跟日向在一起了！」"
2002803-53 = "…………呵呵。"
2002803-54 = "呵呵，呵呵呵……"
2002803-58 = "啊，不好意思。#n不自覺地笑出來了……"
2002803-59 = "雖然不是很清楚原因，但心裡莫名有股開心的感覺，下意識地就……"
2002803-60 = "這想必也是老師的用心良苦吧。#n這種事我還是知道的。"
2002803-64 = "那麼總之，我們出發吧？#n既然都請老師幫忙了，要是反而花費更多時間就本末倒置了。"
2002803-65 = "由我走在前面吧。#n那麼……"
2002803-66 = "嘿～～咻！"
2002803-75 = "……哎呀？#n那個是……"
2002803-76 = "[s5]「有顆巨大的岩石。」\n[s6]「路被堵住了呢，這下糟糕了。」"
2002803-79 = "就是說啊，這裡明明是回到營地的最短路徑……"
2002803-80 = "……什麼？一起找其他回去的路？"
2002803-81 = "唔嗯……"
2002803-82 = "不，我想不必那麼做。"
2002803-83 = "這似乎不是有意放置在這裡的石頭，既然如此，只要用手挪開它就行了……"
2002803-84 = "[s]「啊啊，原來如……」"
2002803-88 = "[ns7]「……你剛才說什麼？」\n[ns8]「你說用什麼挪開？」"
2002803-91 = "請您稍等。#n我先把行李放下來……"
2002803-96 = "這點程度，只要這樣……嗯嗯……！！"
2002803-100 = "哼……！#n嘿……咻！！"
2002803-109 = "……呼，這樣就沒問題了。"
2002803-114 = "讓您久等了，我們繼續前進吧？"
2002803-118 = "[ns]「……」"
2002803-123 = "哎呀……這次是枯樹倒在路上……"
2002803-127 = "似乎是棵壽終正寢的樹呢。"
2002803-128 = "要移動它好像有點困難……"
2002803-129 = "……咦？這次總該繞路了？"
2002803-130 = "呵呵……那雖然也是一種方法，但讓老師走那麼遠就太不好意思了……"
2002803-131 = "嗯～該怎麼辦才好呢？這種情況……"
2002803-135 = "啊，這畢竟不是岩石而是樹，也許……？"
2002803-139 = "嘿……咻！！"
2002803-148 = "[ns9]「把那麼粗壯的樹幹像牙籤一樣……」\n[ns10]「……呃……嗯……」"
2002803-151 = "……呼！沒有想像中的硬呢！運氣真不錯！"
2002803-152 = "來，老師！繼續前進吧！營地就快到了唷！"
2002803-156 = "……嗯？"
2002803-157 = "老師……？#n怎麼了嗎……？為什麼露出那種表情……"
2002803-158 = "[s]「……日向。」"
2002803-159 = "是，是……？"
2002803-165 = "[ns11]「日向是乖孩子，所以老師很開心。」\n[ns12]「如，如果有什麼事的話一定要告訴老師哦。」"
2002803-170 = "呃，嗯……？"
2002803-171 = "好，好的……謝謝……老師……？"
2002803-175 = "……老師？"
2002803-177 = "（之後，與滿頭問號的日向一起帶著行李回到了營地）"
2002803-178 = "（對於日向徒手移開岩石、把樹木劈成兩半，#n　卻說那只是小石頭、小樹枝的事決定少說幾句）"

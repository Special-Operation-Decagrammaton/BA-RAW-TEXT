[translation]
2002803-1 = "หยุดไม่อยู่"
2002803-2 = "(คุณครูมองไปรอบๆ แคมป์ก็เจอฮินาตะที่กำลังขนกระเป๋าสัมภาระอยู่)"
2002803-6 = "(ในมือทั้งสองข้างของเธอถือสัมภาระจำนวนมากเดินผ่านป่าไป)"
2002803-10 = "ฮึบ... อื้ม อันนี้..."
2002803-15 = "มันเบากว่าที่คิดไว้เยอะเลยนะคะเนี่ย"
2002803-16 = "เป็นเพราะสัมภาระตรงนี้มีจำนวนน้อยกว่าของที่วิหารหรือเปล่านะ...?"
2002803-20 = "...หืม?"
2002803-24 = "หะ...หืม!? คะ... คุณครู...!?"
2002803-25 = "มะ...มาอยู่ตรงนั้นตั้งแต่เมื่อไรคะ!? "
2002803-26 = "พะ...เพิ่งมาถึงเมื่อกี้เองงั้นเหรอคะ?"
2002803-27 = "ยะ... อย่างนี้นี่เอง... ค่ะ..."
2002803-28 = "คะ? มาช่วยฉันงั้นเหรอคะ?"
2002803-29 = "ไม่เป็นไรค่ะ!! ฉันบอกไปแล้วนี่คะว่าไม่เป็นไรเลยน่ะค่ะ..."
2002803-30 = "อุตส่าห์ลำบากแทบตายกว่าจะปฏิเสธคนอื่นๆ ที่จะมาช่วยได้ แต่คุณครูกลับจะมาช่วยแบบนี้..."
2002803-31 = "ถ้าแบบนี้... ความตั้งใจที่จะช่วยของฉันจะกลายเป็นการสร้างภาระให้คุณครูแทนนะคะ..."
2002803-32 = "ฉันมันไม่เอาไหนจริงๆ..."
2002803-33 = "[s1] \"ครูทำเพราะอยากช่วยเอง ไม่ต้องกังวลหรอก\"\n[s2] \"ครูไม่ได้อยากทำให้ลำบากใจเลย งั้นทำเป็นมองผ่านๆ ไปก็แล้วกันนะ\""
2002803-36 = "ฮะ... ฮือ... ถ้าคุณครูพูดถึงขั้นนี้... ฉันก็คงทำอะไรไม่ได้..."
2002803-37 = "อืม..."
2002803-42 = "เฮ้อ... ค่ะ... แบบนี้ก็ช่วยไม่ได้นะคะ"
2002803-43 = "เข้าใจแล้วค่ะ... ถ้างั้นก็ขอรบกวนด้วยค่ะ แล้วก็...ขอบคุณนะคะ คุณครู"
2002803-48 = "แต่ว่ารบกวนช่วยขนแค่สัมภาระเบาๆ ก็พอนะคะ พวกของหนักๆ ให้เป็นหน้าที่ฉันเอง ไม่งั้นฉันคงจะ#nลำบากใจแย่เลยน่ะค่ะ"
2002803-49 = "เข้าใจมั้ยคะ...?"
2002803-50 = "[s3] \"เอางั้นก็ได้ ขอบคุณนะ\"\n[s4] \"เอาละ! ครูพร้อมช่วยฮินาตะแล้ว!\""
2002803-53 = "....ฮุ"
2002803-54 = "....ฮุฮุ ฮุฮุฮุ..."
2002803-58 = "อ่า ขอโทษค่ะ ไม่รู้ทำไมจู่ๆ ก็เผลอหลุดหัวเราะออกมา..."
2002803-59 = "อาจเป็นเพราะสบายใจขึ้นรึเปล่านะ... เลยทำให้หัวเราะออกมาโดยไม่รู้ตัวแบบนี้..."
2002803-60 = "ฉันทราบดีค่ะว่าที่คุณครูทำแบบนี้เป็นเพราะคุณครูเป็นห่วง"
2002803-64 = "เอาละค่ะ เรายกสัมภาระไปกันเลยมั้ยคะ? คุณครูอุตส่าห์มาช่วยทั้งที ถ้าทำให้คุณครูเสียเวลาไป#nมากกว่านี้คงไม่ดีแน่ๆ"
2002803-65 = "ถ้างั้นก็... ขอรบกวนด้วยนะคะ"
2002803-66 = "เอ้า ฮึบ!"
2002803-75 = "...หืม? นั่นมัน..."
2002803-76 = "[s5] \"มีก้อนหินใหญ่ๆ อยู่ด้วยละ\"\n[s6] \"ทางเดินโดนขวางไว้นี่นา เรื่องใหญ่เลยแฮะ\""
2002803-79 = "นั่นสิคะ ถ้าจะไปที่แคมป์ละก็ต้องเดินผ่านตรงนี้ไปค่ะ"
2002803-80 = "...คะ? ให้ลองหาทางอ้อมทางอื่นงั้นเหรอคะ?"
2002803-81 = "อืมมม..."
2002803-82 = "ไม่ค่ะ ฉันว่าไม่ต้องทำแบบนั้นหรอกค่ะ"
2002803-83 = "มันแค่ก้อนหินธรรมดา ไม่ได้มีใครจงใจเอามาวางขวางทางไว้สักหน่อย เพราะงั้นก็แค่ยกออกไปก็พอ#nแล้วค่ะ..."
2002803-84 = "[s] \"อ้อ นั่นสิ...\""
2002803-88 = "[ns7] \"...เอาใหม่ซิ? เมื่อกี้ว่ายังไงนะ?\"\n[ns8] \"เมื่อกี้พูดว่าจะทำยังไงกับหินยักษ์นี่นะ?\""
2002803-91 = "รอสักครู่นะคะ ขอฉันวางสัมภาระลงก่อนนะคะ..."
2002803-96 = "หินก้อนแค่นี้น่ะ ก็แค่.... เอ้า ฮึบบบ...!!"
2002803-100 = "อื้ออออ...! ฮะ...ฮึบ!!"
2002803-109 = "...ฮู่ว น่าจะได้แล้วค่ะ แบบนี้เราน่าจะเดินผ่านไปได้แล้วนะคะ"
2002803-114 = "รอนานหรือเปล่าคะ? เราเดินไปกันต่อเลยมั้ยคะ?"
2002803-118 = "[ns] \"...\""
2002803-123 = "เอ๋... คราวนี้เป็นซากต้นไม้..."
2002803-127 = "ดูเหมือนจะเป็นซากของต้นไม้อายุมากที่ล้มลงมาน่ะค่ะ แบบนี้คงเดินผ่านไปไม่ได้แน่ๆ เลยค่ะ"
2002803-128 = "มันดูใหญ่เกินไปที่จะดันไปไว้ข้างๆ ทาง..."
2002803-129 = "...คะ? หาทางอ้อมกันดีกว่างั้นเหรอคะ?"
2002803-130 = "ฮ่าฮ่า... วิธีนั้นก็เป็นวิธีที่ดีอย่างหนึ่งค่ะ แต่ฉันไม่อยากทำให้คุณครูลำบากขึ้นหรอกค่ะ..."
2002803-131 = "อืม ทำยังไงดีคะ? ถ้างั้นละก็..."
2002803-135 = "แต่ยังไงมันก็เป็นซากต้นไม้ ไม่ใช่ก้อนหินสักหน่อย งั้นลองแบบนี้ดูแล้วกัน...?"
2002803-139 = "เอ้า...ฮึบ!!"
2002803-148 = "[ns9] \"หักท่อนไม้หนาๆ ได้เหมือนหักกิ่งไม้เลย...\"\n[ns10] \"โอ้... อืม...\""
2002803-151 = "...ฮู่ว! ท่อนไม้มันเปราะกว่าที่คิดไว้อีก ค่อยยังชั่วหน่อยค่ะ!"
2002803-152 = "เอาละค่ะ คุณครู ไปกันต่อเลยมั้ยคะ? ตอนนี้เราน่าจะใกล้ถึงแล้วละค่ะ!"
2002803-156 = "...หืม?"
2002803-157 = "คุณครู...? เอ๋... ทำไมทำหน้าแบบนั้นล่ะคะ..."
2002803-158 = "[s] \"ฮินาตะ...\""
2002803-159 = "คะ...คะ...?"
2002803-165 = "[ns11] \"ครูดีใจมากเลยที่ฮินาตะเป็นเด็กดี\"\n[ns12] \"ถ้ามีเรื่องอะไรละก็ ติดต่อครูมาได้เลยนะ\""
2002803-170 = "คะ...คะ...?"
2002803-171 = "เอ่อ... ค่ะ ขอบคุณค่ะ..."
2002803-175 = "...คุณครู?"
2002803-177 = "(หลังจากนั้น คุณครูกับฮินาตะก็กลับไปที่แคมป์ได้อย่างปลอดภัย ถึงฮินาตะดูจะยังไม่เข้าใจในสิ่งที่#nคุณครูพูดก็ตาม)"
2002803-178 = "(คุณครูไม่ได้พูดถึงเรื่องที่ฮินาตะดันก้อนหินยักษ์ไปไว้ข้างทาง และหักท่อนไม้ใหญ่ได้เหมือน#nหักกิ่งไม้เล็กๆ ด้วยมือเปล่าขึ้นมาอีกเลย)"

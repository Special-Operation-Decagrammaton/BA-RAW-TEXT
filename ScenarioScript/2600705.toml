[translation]
2600705-1 = "A Reason for Urgency"
2600705-2 = "At Ayane's request, I went to meet her with a toolbox and screws."
2600705-3 = "The location was where our helicopter first crashed, so it was easy to find."
2600705-8 = "......"
2600705-9 = "I thought she'd be working, but I didn't hear anything."
2600705-13 = "[ns] \"Earth to Ayane?\""
2600705-14 = "Ugh..."
2600705-15 = "Hnnngh...!"
2600705-16 = "[ns] \"...Ayane?!\""
2600705-24 = "I'm sorry, Sensei... I asked you to come and then passed out..."
2600705-25 = "I mean, it happens. We are on an island, but it's extra hot today..."
2600705-26 = "The helicopter is metal, so the radiating heat is unbearable under the scorching sun... How did I not think of that...?"
2600705-27 = "Sorry..."
2600705-28 = "[s1] \"You shouldn't work alone on a day like this.\"\n[s2] \"You need to take care of yourself.\""
2600705-29 = "Yes..."
2600705-30 = "Yes..."
2600705-31 = "Hm...?"
2600705-32 = "What is in your hand?"
2600705-33 = "Oh, right. I asked you to bring screws and..."
2600705-34 = "Thank you, Sensei. I'm okay now. Please give them to me and I'll finish up here."
2600705-35 = "Hm?"
2600705-36 = "You'll do it with me? The helicopter repairs?"
2600705-37 = "You don't have to do that... I can do this alone..."
2600705-38 = "I should just call it a day? Rest does sound nice..."
2600705-39 = "Hm?"
2600705-40 = "You'll do the repairs for me?"
2600705-41 = "That's too much... Bringing me the tools was more than enough..."
2600705-45 = "But is it rude for me to turn down your offer...?"
2600705-46 = "Okay! Let's do it together, Sensei!"
2600705-52 = "Thank you for helping!"
2600705-54 = "Ayane and I worked on repairing the helicopter for the rest of the day."
2600705-55 = "It was a lot of work, so we didn't finish it by the evening."
2600705-60 = "We got through quite a bit though."
2600705-61 = "It does look a lot better now."
2600705-65 = "Should we stop for today, Sensei?"
2600705-66 = "[s3] \"Sure, should be good enough for today.\"\n[s4] \"Yeah. Seems a lot better now.\""
2600705-67 = "We still have a long way to go though..."
2600705-68 = "We still have a long way to go though..."
2600705-69 = "Hm?"
2600705-70 = "You meant me? What do you mean...?"
2600705-71 = "[s5] \"You seem much more satisfied.\"\n[s6] \"How would you have felt if we quit sooner?\""
2600705-76 = "Sensei... I was wondering why you offered to help..."
2600705-77 = "That's why you said we should work on it more."
2600705-78 = "I always try not to inconvenience you, but you even take that into account."
2600705-79 = "I end up thanking you every time, but I'm not sure if it's enough..."
2600705-80 = "...Huh? It's okay because you're my teacher?"
2600705-81 = "...Haha."
2600705-82 = "Sensei... Don't you think you say that too often?"
2600705-83 = "Anyway, thank you. Like you said, I'll be able to rest well tonight."
2600705-84 = "And also..."
2600705-85 = "Huh? You want me to stand next to it? Why...?"
2600705-86 = "A commemorative photo?"
2600705-87 = "Wh-What?! N-No thank you! I don't wanna take a picture..."
2600705-88 = "[s7] \"It's nice to remember the moment.\"\n[s8] \"Not even one photo after all those repairs?\""
2600705-89 = "Oh... Th-That's... Um..."
2600705-90 = "Oh... Th-That's... Um..."
2600705-94 = "Heehee... Okay."
2600705-100 = "If you insist, guess I have no choice."
2600705-103 = "― Umm, I can go here.[wa:5050] "
2600705-105 = "― From this side maybe...?[wa:1050] "
2600705-108 = "― Like this... How does it look?[wa:760] "
2600705-111 = "― Wh-What's the best angle for the helicopter?[wa:1310] "
2600705-114 = "― I'm sorry."
2600705-116 = "― I'm not used to things like this...[wa:90] "
2600705-119 = "― Um... Sensei?[wa:2590] "
2600705-121 = "― If this is to document the helicopter repairs...[wa:10] "
2600705-124 = "― ...shouldn't the helicopter be in the center of the photo...?[wa:170] "
2600705-127 = "― I-It's not about the helicopter, but about me...?[wa:1690] "
2600705-130 = "― Oh, r-really?! Whaaa?![wa:1940] "
2600705-133 = "― I mean... That's kind of... I mean, I'm not saying I don't like it, but...![wa:1720] "
2600705-136 = "― I feel like I'm blushing all of a sudden...[wa:960] "
2600705-139 = "It's taking a long time to take one photo for some reason..."
2600705-140 = "Thank you again, Sensei. Today was my lucky day."
2600705-141 = "I don't have much to offer, but I can offer my helicopter services whenever you need!"
2600705-142 = "Call me any time, and I'll fly straight to you!"
2600705-143 = "[s9] \"Can you use the helicopter that often?\"\n[s10] \"Are you sure? I bet the fuel costs a lot...\""
2600705-148 = "Um..."
2600705-149 = "Um, now that you mention it..."
2600705-150 = "Oh... Hahaha... Ahahaha..."
2600705-151 = "Hmm."
2600705-153 = "I-I guess not too often..."

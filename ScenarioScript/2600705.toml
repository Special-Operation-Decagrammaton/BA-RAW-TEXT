[translation]
2600705-1 = "著急的理由"
2600705-2 = "（在綾音的拜託之下，我帶著工具箱和螺絲釘前去會合）"
2600705-3 = "（地點就在之前直升機墜落的地方，因此我大致知道路該怎麼走）"
2600705-8 = "（…………）"
2600705-9 = "（照理說應該有人在動工，但是卻沒聽到任何聲音）"
2600705-13 = "[ns] 「……綾音？」"
2600705-14 = "………唔………"
2600705-15 = "……唔唔。"
2600705-16 = "[ns] 「……綾音，還好吧！？」"
2600705-24 = "對不起，老師……請你來幫忙，我卻這副德性……"
2600705-25 = "仔細想想這也的確……雖然是渡假勝地，但畢竟一直頂著大太陽工作……"
2600705-26 = "加上直升機是金屬打造的很容易吸熱……我應該早點想到這些的……"
2600705-27 = "我很抱歉……"
2600705-28 = "[s1] 「我才該道歉，我也沒有注意到。」\n[s2] 「要好好照顧自己的身體才行呢。」"
2600705-29 = "是……"
2600705-30 = "是……"
2600705-31 = "啊，話說回來老師……"
2600705-32 = "你拿的那些是……"
2600705-33 = "我拜託你帶來的螺絲釘……"
2600705-34 = "謝謝老師，我不要緊了。差一點就能修好了，我馬上處理好剩下的部分。"
2600705-35 = "……咦？老師也要一起……？"
2600705-36 = "要幫我修理直升機……？"
2600705-37 = "不，不用啦！這點工作我自己就可以……"
2600705-38 = "那，那不然，今天就做到這兒吧？剩下的明天再……"
2600705-39 = "……咦？"
2600705-40 = "老師要代替我修……？"
2600705-41 = "不但幫我帶零件來……"
2600705-45 = "甚至連工作都……"
2600705-46 = "……沒什麼，非常謝謝老師。"
2600705-52 = "那就萬事拜託了！"
2600705-54 = "（後來我便照著綾音的指示，接手修理直升機）"
2600705-55 = "（畢竟不是一天就能完成的工作量，一直到晚上都沒結束，但確實向前推進了工作進度）"
2600705-60 = "嘿咻……"
2600705-61 = "完成了不少呢……"
2600705-65 = "我們今天就做到這裡吧，正好告一段落。"
2600705-66 = "[s3] 「嗯，看來沒什麼問題了。」\n[s4] 「嗯，狀態好多了呢。」"
2600705-67 = "距離完全修好直升機還要好一段時間就是了……啊哈哈……"
2600705-68 = "距離完全修好直升機還要好一段時間就是了……啊哈哈……"
2600705-69 = "……嗯？……老師說的不是直升機，是說我……？"
2600705-70 = "那是什麼意思……"
2600705-71 = "[s5] 「雖然健康很重要，但硬要你中斷工作好像也不太好。」\n[s6] 「要是剛才就這麼回去的話，感覺你一定一直放在心上。」"
2600705-76 = "老師……原來你為我想這麼多……"
2600705-77 = "難怪老師才會說要代替我修理而不回去……"
2600705-78 = "開心是開心……但一方面，我也擔心這樣真的好嗎……"
2600705-79 = "我總是覺得，要盡量不給老師造成負擔……"
2600705-80 = "……你說因為你是老師，所以沒關係……？"
2600705-81 = "……啊哈哈。"
2600705-82 = "老師……你不覺得太常講這句話了嗎？"
2600705-83 = "……不過真的很感謝。今晚我可以放心睡覺了。"
2600705-84 = "然後明天再……"
2600705-85 = "咦……？要我站到直升機旁邊……？好，好的。是像這樣嗎？"
2600705-86 = "……紀念照？"
2600705-87 = "不，不用啦！這種事情沒必要拍照……！"
2600705-88 = "[s7] 「作為努力的紀念。」\n[s8] 「機會難得嘛。」"
2600705-89 = "是，是嗎？……唔～嗯。"
2600705-90 = "是，是嗎？……唔～嗯。"
2600705-94 = "呵呵……好吧。"
2600705-100 = "既然老師都這麼說，那就沒辦法了。"
2600705-103 = "― 那個，我只要，[wa:5530] "
2600705-105 = "― 站在這旁邊就可以了嗎……？[wa:1490] "
2600705-108 = "― 像這樣，可以嗎……？[wa:1560] "
2600705-111 = "― 要，要怎麼做，才能更加強調直升機呢……？[wa:2270] "
2600705-114 = "― 對不起，"
2600705-116 = "― 我不太習慣做這種事……[wa:1050] "
2600705-119 = "― 那個……老師？[wa:2830] "
2600705-121 = "― 既然是修理紀念照的話……[wa:670] "
2600705-124 = "― 還是以直升機為中心來拍比較好吧……？[wa:1890] "
2600705-127 = "― ……咦，不是直升機，而是我的紀念照……？[wa:2850] "
2600705-130 = "― 原，原來是這樣嗎！？ 咦咦！？[wa:2220] "
2600705-133 = "― 這，這樣有點，不，我並不討厭……！[wa:4040] "
2600705-136 = "― 只，只是突然，覺得臉好燙……[wa:2120] "
2600705-139 = "明明只是拍一張照片，竟然花了這麼多時間……"
2600705-140 = "謝謝老師。看來我今天的運氣非常好呢。"
2600705-141 = "……為了表示謝意，我會為了老師盡量出動這台直升機！"
2600705-142 = "只要老師有需要，請隨時呼叫我！我會立刻飛過去！"
2600705-143 = "[s9] 「這麼頻繁出動直升機沒關係嗎？」\n[s10] 「這樣好嗎？燃料費應該挺貴的吧……」"
2600705-148 = "……啊。"
2600705-149 = "……這麼說來。"
2600705-150 = "啊……啊哈哈"
2600705-151 = "……那個。"
2600705-153 = "確，確實不能太頻繁……"

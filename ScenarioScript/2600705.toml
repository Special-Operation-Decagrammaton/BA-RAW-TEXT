[translation]
2600705-1 = "เหตุผลที่ใจร้อน"
2600705-2 = "(คุณครูหยิบกล่องเครื่องมือและสกรูมาตามคำขอของอายาเนะ)"
2600705-3 = "(ใช้เวลาเดินมาไม่นาน เพราะคุณครูจำจุดที่ตกลงมาได้อย่างแม่นยำ...)"
2600705-8 = "(....)"
2600705-9 = "(อายาเนะคงจะใช้สมาธิอยู่ เลยไม่ได้ยินเสียงอะไร)"
2600705-13 = "[ns] \"อายาเนะ...?\""
2600705-14 = "ขะ..."
2600705-15 = "ขะ..."
2600705-16 = "[ns] \"อายาเนะ...?\""
2600705-24 = "ขอโทษค่ะ คุณครู... ฉันไม่คิดว่าจะเป็นลมไปแบบนี้..."
2600705-25 = "พอมาคิดๆ ดูแล้วก็เป็นเรื่องปกตินะคะ... ถึงจะเป็นที่รีสอร์ต แต่อากาศมันก็ร้อนมากๆ..."
2600705-26 = "ด้านในเฮลิคอปเตอร์เป็นโลหะทั้งหมด พอต้องซ่อมแซมตอนอากาศร้อนๆ แบบนี้ก็เลยเป็นลม... ทำไมฉันไม่คิดให้ได้เร็วกว่านี้นะ"
2600705-27 = "ต้องขอโทษด้วยจริงๆ ค่ะ..."
2600705-28 = "[s1] \"วันแบบนี้จะทำงานคนเดียวไม่ได้นะ\"\n[s2] \"ดูแลตัวเองหน่อยสิ\""
2600705-29 = "ค่ะ..."
2600705-30 = "ค่ะ..."
2600705-31 = "หืม...?"
2600705-32 = "ในมือคุณครูนั่นมัน..."
2600705-33 = "อ๋อ จริงด้วยสิคะ ฉันขอให้เอาสกรูกับอุปกรณ์มาให้นี่นา"
2600705-34 = "ขอบคุณค่ะคุณครู ตอนนี้ฉันไม่เป็นไรแล้วค่ะ ถ้าอุปกรณ์ครบแบบนี้คงจะซ่อมเสร็จได้เร็วๆ นี้แหละค่ะ"
2600705-35 = "คะ...?"
2600705-36 = "คุณครูก็จะช่วยซ่อมด้วยเหรอคะ? ซ่อมเฮลิคอปเตอร์นี่น่ะเหรอคะ...?"
2600705-37 = "ไม่ต้องก็ได้นะคะ... เรื่องแค่นี้ฉันทำคนเดียวก็ได้..."
2600705-38 = "ถะ...ถ้างั้นวันนี้เราพอแค่นี้ดีมั้ยคะ แล้วกลับไปพักผ่อน..."
2600705-39 = "คะ...?"
2600705-40 = "ไม่ได้จะช่วยซ่อม แต่จะซ่อมแทนฉันเหรอคะ...?"
2600705-41 = "ระ...เรื่องนั้นมัน... แค่คุณครูช่วยเอาของมาให้ก็รู้สึกซาบซึ้งแล้ว นี่จะช่วยซ่อมให้อีก..."
2600705-45 = "ทำสีหน้าแบบนี้ คงปฏิเสธไม่ได้แล้วสินะคะ..."
2600705-46 = "ขอบคุณมากนะคะ"
2600705-52 = "ถ้างั้น... ขอรบกวนหน่อยนะคะ คุณครู!"
2600705-54 = "(จากนั้นคุณครูก็เริ่มลงมือซ่อมเฮลิคอปเตอร์กับอายาเนะ)"
2600705-55 = "(เนื่องจากไม่ใช่งานเล็กๆ ที่จะทำเสร็จได้ภายในวันเดียว แม้จะซ่อมกันมาถึงช่วงเย็นก็ยังไม่เสร็จอยู่ดี ทว่าก็คืบหน้าไปมากกว่าที่คิดไว้)"
2600705-60 = "อืม... ถ้าแบบนี้คงใกล้เสร็จแล้วละค่ะ"
2600705-61 = "ดูน่าจะใช้ได้แล้วนะคะ"
2600705-65 = "ถ้างั้นวันนี้เราพอแค่นี้ก่อนดีมั้ยคะ คุณครู?"
2600705-66 = "[s3] \"นั่นสิ ครูว่าใช้ได้เลยนะ\"\n[s4] \"อื้อ ดูดีขึ้นเยอะเลยละ\""
2600705-67 = "อา ถึงจะดูใช้ได้แล้ว แต่กว่าจะเสร็จก็คงใช้เวลาอีกสักพักค่ะ ฮะฮะฮะ..."
2600705-68 = "อา ถึงจะดูใช้ได้แล้ว แต่กว่าจะเสร็จก็คงใช้เวลาอีกสักพักค่ะ ฮะฮะฮะ..."
2600705-69 = "คะ...?"
2600705-70 = "คะ? หมายถึงฉัน ไม่ใช่เฮลิคอปเตอร์เหรอคะ? หมายความว่ายังไงคะ..."
2600705-71 = "[s5] \"ก็อายาเนะดูชอบใจนี่นา\"\n[s6] \"ถ้ากลับไปกลางคันก็จะรู้สึกไม่ดีใช่มั้ยล่ะ\""
2600705-76 = "คุณครู... ฉันคิดแล้วเชียวว่ามันแปลกๆ..."
2600705-77 = "เพราะงั้นคุณครู... เลยอาสาที่จะมาช่วยสินะคะ"
2600705-78 = "ฉันคิดว่าไม่ควรสร้างภาระเพิ่มให้คุณครูแล้วแท้ๆ แต่กลับกลายเป็นว่าต้องคอยให้คุณครูช่วย#nอยู่เรื่อยเลยนะคะ"
2600705-79 = "และก็ได้แต่ขอบคุณคุณครูแบบนี้ทุกครั้ง แบบนี้ไม่เป็นไรจริงๆ เหรอคะ..."
2600705-80 = "คะ...? ไม่เป็นไรเหรอคะ...? เพราะว่าคุณครูเป็นครู?"
2600705-81 = "ฮะฮะ..."
2600705-82 = "คุณครูคะ ไม่คิดว่าคุณครูพูดแบบนี้บ่อยเกินไปหน่อยบ้างเหรอคะ?"
2600705-83 = "แต่ก็ขอบคุณนะคะ เป็นอย่างที่คุณครูพูดนั่นแหละค่ะ วันนี้คงกลับไปพักได้แบบสบายใจแน่นอนค่ะ"
2600705-84 = "แล้วอีกอย่าง..."
2600705-85 = "คะ...? ให้ฉันไปยืนข้างๆ งั้นเหรอคะ? ทำไมเหรอคะ..."
2600705-86 = "ถ่ายรูปที่ระลึก?"
2600705-87 = "อะ...อะไรกันคะ...! มะ...ไม่ดีกว่าค่ะ ถ่ายรูปงั้นเหรอ สภาพแบบนี้น่ะมัน...!"
2600705-88 = "[s7] \"การจดจำช่วงเวลาดีๆ ก็เป็นเรื่องสำคัญนะ\"\n[s8] \"คิดจะซ่อมให้เสร็จโดยไม่ถ่ายรูปไว้เลยเหรอ?\""
2600705-89 = "เอ่อ... คือว่าเรื่องนั้น... อืม..."
2600705-90 = "เอ่อ... คือว่าเรื่องนั้น... อืม..."
2600705-94 = "ฮิฮิ... ค่ะ"
2600705-100 = "ถ้าคุณครูพูดแบบนั้นก็คงเลี่ยงไม่ได้สินะคะ"
2600705-103 = "― อืม... ถ้างั้นฉัน...[wa:5010] "
2600705-105 = "― ถ่ายจากมุมข้างๆ ได้หรือเปล่าคะ?[wa:770] "
2600705-108 = "― ถ้าทำแบบนี้... จะดูดีรึเปล่าคะ?[wa:720] "
2600705-111 = "― เอ่อ ฉันต้องทำยังไง...เพื่อให้เห็นเฮลิคอปเตอร์ดีคะ...?[wa:910] "
2600705-114 = "― ขอโทษด้วยค่ะ"
2600705-116 = "― ฉันไม่ค่อยถนัดกับเรื่องพวกนี้เท่าไร...[wa:10] "
2600705-119 = "― คือว่า... คุณครูคะ?[wa:2350] "
2600705-121 = "― ถ้าจะถ่ายรูปเพื่อเป็นที่ระลึก...[wa:10] "
2600705-124 = "― ช่วยถ่าย... ให้เห็นเฮลิคอปเตอร์อีกหน่อย จะดีกว่ามั้ยคะ...?[wa:290] "
2600705-127 = "― มะ... ไม่ได้ถ่ายเฮลิคอปเตอร์แต่ถ่ายรูปที่ระลึกของฉันเหรอคะ...?[wa:1170] "
2600705-130 = "― ยะ... อย่างนั้นเหรอคะ!? อะ...เอ๋...!?[wa:1340] "
2600705-133 = "― คือ...คือว่าเรื่องนั้น เปล่าค่ะ... ก็ไม่ได้ไม่ชอบหรอกค่ะ...[wa:2360] "
2600705-136 = "― แต่จู่ๆ... ก็รู้สึกร้อนๆ ที่หน้าขึ้นมาค่ะ...[wa:920] "
2600705-139 = "นานๆ ทีจะได้ถ่ายรูปแบบนี้น่ะค่ะ..."
2600705-140 = "ขอบคุณนะคะ คุณครู วันนี้เป็นวันที่ฉันโชคดีในหลายๆ เรื่องเลยค่ะ"
2600705-141 = "และเพื่อเป็นการตอบแทน... ฉันจะใช้เฮลิคอปเตอร์ลำนี้เพื่อคุณครูบ่อยๆ เลยค่ะ!"
2600705-142 = "ถ้าคุณครูต้องการ แค่บอกฉันก็พอค่ะ ฉันจะรีบบินไปหาเลยค่ะ!"
2600705-143 = "[s9] \"ขับเฮลิคอปเตอร์บ่อยๆ แบบนั้นได้เหรอ?\"\n[s10] \"ไม่เป็นไรแน่เหรอ น่าจะใช้น้ำมันเยอะเลยนะ\""
2600705-148 = "อ่า..."
2600705-149 = "เอ่อ... นั่นสินะคะ..."
2600705-150 = "อา... ฮะฮะฮะ... อะฮ่ะฮ่ะฮ่ะ..."
2600705-151 = "อืม..."
2600705-153 = "แบบว่า... งั้นเรียกบ่อยๆ ไม่ได้นะคะ..."

[translation]
80000107-1 = "過程、演出、結果"
80000107-2 = "重要的是演出！！！"
80000107-3 = "[s]「突然說這話是什麼意思！？」"
80000107-4 = "是這樣的，老師。"
80000107-5 = "如果結果已經大致底定，導致無法從中感受到興奮或滿足……"
80000107-6 = "那麼達到結果的過程，或許才是能做出區別的關鍵所在吧？"
80000107-7 = "[s]「嗯，我還是不明白前因後果。」"
80000107-8 = "好吧，畢竟百聞不如一見……"
80000107-9 = "那麼接下來！就讓老師看看我的表演吧！"
80000107-13 = "（愛瑠一邊說著，一邊拿出的東西是……）"
80000107-14 = "（一堆散發著淡淡甜味的白色輕薄板材……！）"
80000107-15 = "[ns]「這些是……！？」"
80000107-17 = "哼哼哼……"
80000107-18 = "是以巧克力製成的圖畫紙……"
80000107-19 = "也就是白巧克力板！"
80000107-20 = "很好，很好。#n現在紙張已經準備好了，接下來就輪到……"
80000107-21 = "這隻黑巧克力筆登場囉！"
80000107-22 = "[s]「是要在巧克力上用巧克力來作畫嗎！」"
80000107-23 = "沒錯，老師。"
80000107-24 = "今天可是那個日子，你該不會以為我不知道吧？"
80000107-25 = "……雖然在我們這個領域，這個日子早就被用到想不知道都難了……"
80000107-26 = "[s]「確實是這樣呢……」"
80000107-27 = "不過總而言之！接下來的巧克力繪畫秀，請你好好欣賞哦！"
80000107-28 = "這是同人畫家Meruri的親筆畫作……咳哼，雖然價值尚未獲得認可……"
80000107-29 = "但是總有一天，肯定會「大紅大紫」的！"
80000107-35 = "（如此說著的愛瑠，開始進行巧克力畫作的繪製）"
80000107-40 = "[ns1]「哦，開始有點感覺了耶？」\n[ns2]「轉眼間就完成了……這是愛瑠的臉吧？」"
80000107-45 = "……"
80000107-46 = "這樣不對！"
80000107-47 = "[s]「怎，怎麼了嗎？我覺得畫得很好啊？」"
80000107-48 = "不行不行！這樣還不夠！而且眉毛這裡根本就糊開了不是嗎！"
80000107-49 = "唔……巧克力畫作的缺點就在於幾乎無法修正。"
80000107-50 = "但是我姬木愛瑠，可不會這麼輕易就放棄！"
80000107-51 = "我一開始就知道會發生這種事，所以才準備了一大堆巧克力紙！"
80000107-53 = "（如此說著的愛瑠，再次開始進行巧克力畫作的繪製）"
80000107-55 = "……"
80000107-56 = "線條不統一！"
80000107-58 = "（如此說著的愛瑠，再次開始進行巧克力……）"
80000107-60 = "……"
80000107-61 = "畫歪了！"
80000107-63 = "（如此說著的愛瑠，再次開始……）"
80000107-65 = "不夠一氣呵成！"
80000107-70 = "……"
80000107-71 = "[s3]「那個，愛瑠……？」\n[s4]「巧克力紙好像都用完了耶……？」"
80000107-74 = "怎麼會……耗費了這麼多資源，竟然畫不出一幅像樣的作品……"
80000107-75 = "這就是……我的極限嗎？#n雖然畫起來的感覺，和在平板或紙上完全不同……"
80000107-76 = "呃……唔……"
80000107-80 = "（靜靜地靠近愛瑠繪製的那些成品）"
80000107-81 = "（拿起了覺得畫得最好的一幅畫）"
80000107-87 = "……！？你，你在做什麼？老師！#n那是……我的失敗作！不是最棒的畫啊！"
80000107-88 = "[s]「在我看來，這已經是最棒的畫了呀？」"
80000107-89 = "就，就算老師這麼說……還是不行！這種完成度……！"
80000107-90 = "[s]「重要的不是過程……也就是演出嗎？」"
80000107-91 = "……！"
80000107-92 = "哇……被反將了一軍。#n居然用我的話來對付我……？"
80000107-93 = "……"
80000107-94 = "哎咿……！"
80000107-99 = "（愛瑠突然把巧克力畫搶走了！）"
80000107-100 = "[ns]「怎，怎麼了嗎，愛瑠！？」"
80000107-102 = "什麼怎麼了！至少要由我親自送給你吧！"
80000107-103 = "畢竟……今天不是那個日子嗎？#n我說的是情人節！"
80000107-104 = "嗯……雖然巧克力的含意有很多種……"
80000107-105 = "總之最重要的！是我把巧克力交給老師的過程！"
80000107-106 = "[s]「聽起來確實是這樣！」"
80000107-107 = "對吧？"
80000107-108 = "那麼……雖然實在不夠滿意。"
80000107-114 = "來，這個巧克力送你。希望你會喜歡。"
80000107-115 = "嗯？你問要從哪裡吃起才不會對我太失禮？"
80000107-116 = "怎麼還問這種問題呢？#n反正就……"
80000107-117 = "……就……"
80000107-118 = "……"
80000107-119 = "這個問題好像還真的要好好想想耶！？"
80000107-121 = "（之後針對愛瑠的巧克力畫像的該從何吃起的問題，討論了好一陣子……）"

[translation]
80000107-1 = "Process and Results"
80000107-2 = "It's all about performance!!!"
80000107-3 = "[s] \"What are you shouting about?!\""
80000107-4 = "Listen, Sensei."
80000107-5 = "If the results stay the same, and it's clear that people won't be impressed by them..."
80000107-6 = "Doesn't that mean that the process of how you get your result is the key piece?"
80000107-7 = "[s] \"Right. But what are you talking about?\""
80000107-8 = "Phew. Like they say... Better to see something once than to hear about it a hundred times..."
80000107-9 = "Now then! Let me show you my performance, Sensei!"
80000107-13 = "And what Meru pulled out of her lab coat was..."
80000107-14 = "A bunch of thin white panels that somehow gave off a strange, sweet scent."
80000107-15 = "[ns] \"These are...?!\""
80000107-17 = "Heh. Heh. Heh..."
80000107-18 = "It's drawing paper made out of chocolate..."
80000107-19 = "It's a white chocolate panel!"
80000107-20 = "Okay, now that we have a canvas ready. All we need is a pen..."
80000107-21 = "And that's where our dark chocolate pen comes in!"
80000107-22 = "[s] \"So you're sketching chocolate on top of chocolate!\""
80000107-23 = "So you can have chocolate with your chocolate, Sensei."
80000107-24 = "It's the kind of day that deserves it. Did you think I'd forget a day so critical?"
80000107-25 = "...It's such a cliché in my industry, I couldn't forget about it if I tried."
80000107-26 = "[s] \"You're certainly right about that...\""
80000107-27 = "Anyways! We will be starting our chocolate drawing show now, so don't change that dial!"
80000107-28 = "They say the hand-drawn art from the fan fiction author Meruri... *ahem*...is not getting the respect it deserves..."
80000107-29 = "But one day, it'll become a smash hit!"
80000107-35 = "As Meru shouted, she started drawing on her chocolate canvas."
80000107-40 = "[ns1] \"Oh? Looks like something's coming together.\"\n[ns2] \"That was fast... Meru, is that a self-portrait?\""
80000107-45 = "..."
80000107-46 = "This isn't it!"
80000107-47 = "[s] \"Wh-What's wrong? It looks like a nice drawing to me.\""
80000107-48 = "Not at all! It's got so many problems! First of all, the eyebrows got mashed up here!"
80000107-49 = "Ugh... The problem with chocolate drawing is that it's almost impossible to erase your mistakes."
80000107-50 = "But I, Himeki Meru, will not be dissuaded by something like this!"
80000107-51 = "I expected this to happen, so I brought some extra chocolate drawing paper with me!"
80000107-53 = "Meru started her drawings again."
80000107-55 = "..."
80000107-56 = "The lines are uneven!"
80000107-58 = "And again..."
80000107-60 = "..."
80000107-61 = "This one's anatomy is all wrong!"
80000107-63 = "And AGAIN..."
80000107-65 = "I didn't complete it in a single stroke!"
80000107-70 = "..."
80000107-71 = "[s3] \"Um, Meru?\"\n[s4] \"I think you're out of chocolate drawing paper...\""
80000107-74 = "No way... All that wasted paper and I couldn't make one decent drawing..."
80000107-75 = "Is this my limit? It was so different from drawing on paper or a tablet, but I thought I could overcome it..."
80000107-76 = "Ugh... Argh..."
80000107-80 = "I approached Meru's art..."
80000107-81 = "Then picked the one I thought looked the best."
80000107-87 = "...?! Wh-What are you doing, Sensei?! That thing is a miserable failure!"
80000107-88 = "[s] \"It looks like some of your best work to me.\""
80000107-89 = "E-Even if you subjectively like... It just won't do! There's so many things wrong—"
80000107-90 = "[s] \"Isn't it just the process that matters? The overall performance?\""
80000107-91 = "*gasp*"
80000107-92 = "Wow... You got me. And with my own words?"
80000107-93 = "..."
80000107-94 = "Hiyah!"
80000107-99 = "Meru snatched her chocolate drawing away from me."
80000107-100 = "[ns] \"Wh-What's wrong, Meru?!\""
80000107-102 = "What do you mean what's wrong? At the very least I have to give this to you myself!"
80000107-103 = "Because today's...you know...Valentine's Day!"
80000107-104 = "I mean... Chocolate can symbolize a lot of things..."
80000107-105 = "But what matters most is that I give it to you myself!"
80000107-106 = "[s] \"Yeah, you're absolutely right!\""
80000107-107 = "I am?"
80000107-108 = "That said... Although I think it's a mess..."
80000107-114 = "Here, take it. Enjoy your chocolate painting."
80000107-115 = "Hm? Where would be the least rude place to start eating your gift?"
80000107-116 = "You're worried over something so trivial. Obviously..."
80000107-117 = "...Obviously..."
80000107-118 = "..."
80000107-119 = "I may have to think on that one for a while!"
80000107-121 = "Meru and I shared a lengthy debate on the ideal spot to begin eating her chocolate portrait."

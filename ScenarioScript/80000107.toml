[translation]
80000107-1 = "กระบวนการ ประสิทธิภาพและผลลัพธ์"
80000107-2 = "สิ่งที่สำคัญคือกระบวนการนะ!!!"
80000107-3 = "[s] \"จู่ๆ ก็พูดถึงอะไรน่ะ?!\""
80000107-4 = "ก็เรื่องนี้ไง ครู"
80000107-5 = "ถ้าผลลัพธ์ถูกกำหนดเอาไว้แล้ว มันก็แน่อยู่แล้วว่าเราจะไม่รู้สึกตื่นเต้นกับผลลัพธ์จริงที่เกิดขึ้นเท่าไร..."
80000107-6 = "กระบวนการที่ไปให้ถึงผลลัพธ์นั้นควรเป็นสิ่งที่ทำให้เกิดความแตกต่างไม่ใช่เหรอ?"
80000107-7 = "[s] \"อืม ครูยังไม่เข้าใจบริบทของเรื่องนี้อยู่ดี\""
80000107-8 = "ฮุฮุ แต่สิบปากว่าก็ไม่เท่าตาเห็นหรอกนะ..."
80000107-9 = "ถ้าอย่างนั้นจากนี้ไป! ฉันจะทำให้คุณครูได้เห็นการกระทำที่ทำให้บรรลุผลสำเร็จเอง!"
80000107-13 = "(และสิ่งที่เมรุหยิบออกมาระหว่างที่พูดก็คือ...)"
80000107-14 = "(แผ่นกระดาษบางๆ สีขาวขนาดใหญ่ที่มีกลิ่นหอมหวาน...!)"
80000107-15 = "[ns] \"นี่มัน...??\""
80000107-17 = "ฮุ... ฮุ... ฮุ..."
80000107-18 = "นี่ก็คือกระดาษวาดรูปที่ทำจากช็อกโกแลต..."
80000107-19 = "กระดาษไวท์ช็อกโกแลตยังไงล่ะ!"
80000107-20 = "ดีละ ในเมื่อมีกระดาษแล้ว ตอนนี้ก็เหลือแค่ปากกา..."
80000107-21 = "งั้นก็ถึงเวลาของปากกาดาร์กช็อกโกแลต!"
80000107-22 = "[s] \"จะใช้ช็อกโกแลตวาดรูปลงบนช็อกโกแลตเหรอ!\""
80000107-23 = "ใช่แล้ว แบบนั้นแหละครู"
80000107-24 = "ก็วันนี้เป็นวันแบบนั้นนี่นา อย่าบอกนะว่าครูคิดว่าฉันไม่รู้น่ะ?"
80000107-25 = "ที่นี่ไม่มีใครไม่รู้เรื่องนี้หรอกนะ และต่อให้ไม่อยากรู้ก็ปิดหูปิดตาให้ไม่รู้ไม่ได้ด้วย..."
80000107-26 = "[s] \"ก็น่าจะเป็นอย่างที่ว่าจริงๆ นะ...\""
80000107-27 = "เอาเถอะ! ต่อไปนี้ฉันจะเริ่มโชว์การวาดช็อกโกแลตให้ดู ตั้งใจดูด้วยล่ะ!"
80000107-28 = "แม้ว่าภาพจากฝีมือของนักวาดเมรูริ... อะแฮ่ม จะยังไม่ถูกยอมรับคุณค่าถึงขนาดนั้นก็เถอะ..."
80000107-29 = "แต่ว่าต้องมีสักวันที่มันจะ 'เป็นกระแสขึ้นมา'! "
80000107-35 = "(ทันทีที่พูดจบ เมรุก็ลงมือวาดรูปจากช็อกโกแลต)"
80000107-40 = "[ns1] \"โอ้ ใช้ได้อยู่นะ?\"\n[ns2] \"วาดเสร็จในพริบตาเลย... นี่คือหน้าของเมรุใช่มั้ย?\""
80000107-45 = "......"
80000107-46 = "ใช้ไม่ได้!"
80000107-47 = "[s] \"ทะ... ทำไมล่ะ? ครูว่าวาดสวยดีนะ?\""
80000107-48 = "ไม่ ใช้ไม่ได้! ยังไม่ดีพอ! คิ้วยังเป็นกิ้งกืออยู่เลย!"
80000107-49 = "อึก... ปัญหาของการวาดรูปด้วยช็อกโกแลตก็คือเราแก้ไขแทบจะไม่ได้เลย"
80000107-50 = "แต่ว่าฉัน ฮิเมกิ เมรุ จะไม่ยอมแพ้แค่นี้หรอกนะ!"
80000107-51 = "ฉันคิดไว้แล้วละว่าจะเกิดเรื่องแบบนี้ ก็เลยเตรียมกระดาษช็อกโกแลตมาไว้เพียบ!"
80000107-53 = "(ทันทีที่พูดจบ เมรุก็ลงมือวาดรูปจากช็อกโกแลตอีกครั้ง)"
80000107-55 = "......"
80000107-56 = "น้ำหนักเส้นไม่เท่ากัน!"
80000107-58 = "(ทันทีที่พูดจบ เมรุก็ลงมือวาดรูปจากช็อกโกแลตอีกครั้ง)"
80000107-60 = "......"
80000107-61 = "ทำไมออกมาเบี้ยวแบบนี้ล่ะ!"
80000107-63 = "(ทันทีที่พูดจบ เมรุก็...)"
80000107-65 = "ควรจะได้เส้นที่ต่อเนื่องสิ!"
80000107-70 = "......"
80000107-71 = "[s3] \"นี่... เมรุ...?\"\n[s4] \"เหมือนจะใช้กระดาษช็อกโกแลตหมดแล้วนะ...?\""
80000107-74 = "เป็นไปไม่ได้... ฉันใช้ทรัพยากรไปตั้งมากขนาดนี้ แต่ไม่มีภาพไหนที่วาดออกมาใช้ได้เลยงั้นเหรอ..."
80000107-75 = "หรือว่า... ฉันทำได้ดีที่สุดแค่นี้? ถึงจะบอกว่าการวาดรูปในแท็บเล็ตกับบนกระดาษจะให้ความรู้สึกที่ต่าง#nกันโดยสิ้นเชิงก็เถอะ..."
80000107-76 = "อึก... อึก...."
80000107-80 = "(คุณครูเดินไปดูผลงานของเมรุอย่างเงียบๆ)"
80000107-81 = "(จากนั้นก็หยิบผลงานที่ดีที่สุดออกมาหนึ่งชิ้น)"
80000107-87 = "ทำอะไรของครูน่ะ...?! นั่นมันรูปที่ฉันวาดเสียนะ! ไม่ใช่ผลงานที่ยอดเยี่ยมของฉันสักหน่อย!"
80000107-88 = "[s] \"ครูว่านี่ก็ยอดเยี่ยมแล้วนะ\""
80000107-89 = "ถะ... ถึงครูจะพูดแบบนั้นก็เถอะ... แต่ฉันว่าไม่! ถ้าทำออกมาได้แค่นี้ละก็...!"
80000107-90 = "[s] \"สิ่งที่สำคัญไม่ใช่ผลลัพธ์ แต่เป็นกระบวนการไม่ใช่เหรอ?\""
80000107-91 = "......!"
80000107-92 = "โห... เหมือนโดนแทงด้วยมีดของตัวเองเลย..."
80000107-93 = "......"
80000107-94 = "เดี๋ยวเหอะ...!"
80000107-99 = "(จู่ๆ เมรุก็แย่งภาพวาดช็อกโกแลตจากคุณครูไป)"
80000107-100 = "[ns] \"เอาไปทำไมน่ะ เมรุ?!\""
80000107-102 = "ถามมาได้ ถ้าจะให้ อย่างน้อยฉันก็ต้องเป็นคนให้สิ!"
80000107-103 = "ก็วันนี้เป็นวันวาเลนไทน์ทั้งทีนี่นา!"
80000107-104 = "แต่ก็นะ... ยังไงความหมายที่อยู่ในช็อกโกแลตก็มีมากมายอยู่แล้ว..."
80000107-105 = "สิ่งที่สำคัญก็คือฉันต้องเป็นคนให้ช็อกโกแลตกับครูต่างหาก!"
80000107-106 = "[s] \"ฟังดูแล้ว มันก็จริงอยู่นะ!\""
80000107-107 = "ใช่มั้ยล่ะ?"
80000107-108 = "ถ้างั้นก็... ถึงมันจะไม่ถูกใจฉันเท่าไร"
80000107-114 = "เอ้า รับช็อกโกแลตไปสิ กินให้อร่อยด้วยนะ"
80000107-115 = "หืม? ตอนกินส่วนใบหน้า ต้องคิดว่าจะกินตรงไหนก่อนถึงจะไม่เป็นการเสียมารยาทต่อฉันงั้นเหรอ?"
80000107-116 = "คิดอะไรมากน่ะครู เรื่องนั้นน่ะ..."
80000107-117 = "อืม... เรื่องนั้นน่ะ..."
80000107-118 = "......"
80000107-119 = "ดูเป็นปัญหาที่ต้องคิดหนักเหมือนกันแฮะ?!"
80000107-121 = "(หลังจากนั้นคุณครูกับเมรุก็นั่งหารือกันอยู่พักใหญ่ว่าควรกินส่วนไหนของใบหน้าก่อนดี...)"

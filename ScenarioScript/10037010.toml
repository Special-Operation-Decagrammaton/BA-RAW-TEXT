10037010-14 = "3;키사키;00\n#3;a\n#wait;1500"
10037010-15 = "3;키사키;99;갑작스러운 부름에 응해 주어 고맙다. 선생."
10037010-16 = "[s1] \"간만에 정중한데다 고풍스럽기까지 한 문장을 받아서…….\"\n[s2] \"이건 지나칠 수 없는 안건이라는 생각이 들었거든.\""
10037010-17 = "#wait;10"
10037010-18 = "#wait;10"
10037010-19 = "3;키사키;02;그러한가? 현룡문에서 외부로 보내는 문장이라면 그 정도가 보통이거늘.\n#3;em;[?]"
10037010-20 = "3;키사키;08;아무튼, 좋다. 선생을 부른 것은, 현룡문의 이름으로 그대에게 의뢰하고 싶은 것이 있었기 때문이다."
10037010-21 = "#all;hide"
10037010-22 = "4;현룡문 부원 B;00\n2;현룡문 부원 A;00;…….\n#2;stiff"
10037010-23 = "4;현룡문 부원 B;00;……."
10037010-24 = "#all;hide"
10037010-25 = "3;키사키;00;그래. 짐작하고 있듯이 개인적인 일은 아니다. 이것은 현룡문의 문주가 샬레의 선생에게 보내는, 공식적인 안건이다."
10037010-26 = "3;키사키;02;우리 산해경은, 근시일 내에 붉은겨울과의 교류회를 개최하려 한다."
10037010-27 = "#all;hide"
10037010-28 = "4;현룡문 부원 B;00\n2;현룡문 부원 A;04;정말로…… 그럴 생각이셨나…….\n#2;em;[땀]\n#2;h\n#fontsize;50"
10037010-29 = "4;현룡문 부원 B;06;문주님께서 하시는 일이니, 뜻이 있겠지만…….\n#fontsize;50"
10037010-30 = "#all;hide"
10037010-31 = "3;미나;11;……모두들, 문주님의 안전이다. 삼가라.\n#3;em;[반응]\n#3;a"

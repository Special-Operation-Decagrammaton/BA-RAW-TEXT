[translation]
10037010-1 = "第1話;淨手整裝"
10037010-7 = "門主大人駕～到～！！！"
10037010-8 = "門主大人駕～到～！！！"
10037010-15 = "老師願意回應如此唐突的要求，實屬感謝。"
10037010-16 = "[s1]「難得收到這麼正式又文謅謅的訊息……」\n[s2]「總覺得不能錯過。」"
10037010-19 = "是嗎？這與玄龍門平日發往外部的文件並無二致。"
10037010-20 = "總之，很好。#n今日邀請汝遠道而來，乃是為以玄龍門的名義向老師提出委託。"
10037010-22 = "……"
10037010-23 = "……"
10037010-25 = "如老師所料，此事並非私事。#n實乃玄龍門門主向夏萊提出的正式委託。"
10037010-26 = "吾等山海經，計畫於近期舉辦與赤冬的交流會。"
10037010-28 = "真的……打算這麼做嗎……"
10037010-29 = "既然是門主大人的決定，一定有其用意……"
10037010-31 = "……各位，這可是在門主大人尊前。發言前請三思。"
10037010-37 = "……"
10037010-38 = "[s]（這個氣氛讓人很難開口呢……）"
10037010-39 = "（雖然在意料之內，但這也沒辦法……）"
10037010-43 = "那麼，老師。請先移駕至內堂吧。"
10037010-48 = "門，門主大人！？請您三思！若讓外人進入六和閣的內堂……！"
10037010-49 = "沒錯！這麼做可能會動搖玄龍門的傳統與權威……甚至危及安全與機密！"
10037010-51 = "此等說法似乎略為欠妥呢。"
10037010-52 = "諸位有權將夏萊的老師定義為完全的外人嗎？#n即便有，又是誰賦予了諸位這種權限呢？"
10037010-54 = "……！"
10037010-55 = "這，這……！"
10037010-57 = "老師早已在解決萬年蔘一案上立下大功，這可是有憑有據的事實。"
10037010-58 = "「報恩」之美德乃山海經的重要傳統之一。#n諸位難道都忘了嗎？"
10037010-60 = "小，小的僭越了！"
10037010-61 = "小的無顏面對門主大人！"
10037010-66 = "那麼，我們到內堂去吧，老師。#n請往這邊。"
10037010-67 = "對了，關於這點。"
10037010-68 = "此次就由妾身親自為老師帶路吧。#n汝可以先退下去休息了，美奈。"
10037010-69 = "門主大人！？"
10037010-71 = "（他們究竟要討論什麼話題，竟然連執行部長都需要迴避……！？）"
10037010-72 = "（與赤冬的交流會之中，究竟隱藏著多少迫在眉睫又不可告人的隱情……！）"
10037010-73 = "那，那麼我們先告退了。"
10037010-74 = "我們會嚴密看守，連一隻螞蟻都不會放過！"
10037010-76 = "門，門主大人……門主大人啊啊啊啊……！"
10037010-83 = "……那麼，走吧。"
10037010-89 = "方才招待不周，在此向汝致歉，老師。#n還請老師不必感到拘束。"
10037010-90 = "[s]「這沒什麼……話說這個房間裡有一股奇妙的香味呢？」"
10037010-91 = "汝也注意到了嗎？#n呵呵，此乃鍊丹術研究會叮囑妾身務必要點的香。"
10037010-92 = "據說是有助於安定心神和療癒身心的藥香，不過實際上又是如何呢？"
10037010-93 = "若讓老師感到不適，要先熄掉也無妨。"
10037010-94 = "[s]「沒關係，味道很好聞。」"
10037010-95 = "……是嗎，那就好。"
10037010-96 = "妾身打算直接切入正題，汝意下如何呢？"
10037010-97 = "呵呵，似乎問了多餘的問題呢。#n普遍而言，老師面對此類情況想必都會答應的吧。"
10037010-98 = "或許老師早已心裡有數……#n沒錯，妾身想談論的……正是與赤冬聯邦學園的交流會。"
10037010-99 = "[s]「交流會啊……就正常舉辦不就好了嗎？」"
10037010-100 = "果然得到了這個回答。這的確是世間會有的認知。"
10037010-101 = "然而在山海經這個地方，此類認知並不太適用。"
10037010-102 = "不明白是什麼意思？#n那就讓妾身用這句話來回答吧。"
10037010-106 = "……過去這些年，山海經幾乎從未與外校有過交流。"
10037010-107 = "[s]「是嗎？」"
10037010-108 = "沒錯。而人們之所以沒有產生質疑，是因為一直都有外部人員經由玄武商會進出。"
10037010-109 = "然而，那也不過是由於內部並未採取管制措施，強硬阻止外部人來訪山海經罷了。"
10037010-110 = "如本次的交流會這般……#n由山海經主動邀請外校的交流形式，綜觀山海經的校史也相當罕見。"
10037010-111 = "[s]「長期避免與外部交流，是有什麼特殊的原因嗎？」"
10037010-112 = "稱不上是什麼原因。#n不過是不希望山海經的歷史和傳統受到侵犯罷了。"
10037010-114 = "智惠智惠！山海經有什麼東西比較有名的嗎？那裡是個什麼樣的地方？"
10037010-115 = "那裡相當神祕，是個謎團比已知事實還多的地方……"
10037010-116 = "不過有一件事能夠確定。#n聽說「玄武商會」的料理非常好吃哦！"
10037010-117 = "是嗎……原來如此！很好！一開始就得到了這麼棒的情報！"
10037010-118 = "還有呢？沒有別的了嗎？"
10037010-119 = "這部分倒是沒有玄武商會方面的情報那麼確定……"
10037010-120 = "不過聽說山海經的學生會長，應該會和潔莉諾醬很合得來哦。"
10037010-121 = "是嗎？唔嗯……他會是個什麼樣的學生呢！咱已經開始期待了！"
10037010-124 = "關於這點，妾身與瑠美可算是有某種程度的共識。"
10037010-125 = "妾身認為所謂傳統，意味著「值得保存的好風俗」。"
10037010-126 = "僅是一味地因襲成規，未必就是最佳的做法。"
10037010-127 = "[s]「不過以妃姬的立場，實在不適合直接說這種話對吧？」"
10037010-128 = "能有像汝一般一點就通的談話對象，實乃一大樂事。"
10037010-129 = "啊，不過也請莫要誤會。#n美奈在其擅長的領域表現非常優秀，玄龍門的成員們也都有做好自己的本分。"
10037010-130 = "只不過，不過……"
10037010-131 = "[s3]「嗯，我明白你想表達的意思。」\n[s4]「每個人都盡其所能，努力生活著呢……」"
10037010-134 = "……能有向汝一般一點就通的談話對象，果真是一大樂事。"
10037010-135 = "言歸正傳吧。#n妾身……希望山海經能夠明白。"
10037010-136 = "在吾等的世界之外還有更廣闊的世界──其中充滿各式超乎想像、令人驚奇的事物。"
10037010-137 = "越是想強行保留所有傳統……只會更加得不償失。"
10037010-138 = "[s5]「所以你才會主動以玄龍門的名義……」\n[s6]「邀請赤冬舉辦交流會吧。」"
10037010-141 = "呵呵……妾身若能那麼做的話，也許事情會簡單一些吧。"
10037010-142 = "不明白是什麼意思？請再仔細看一下公文吧。"
10037010-146 = "沒錯，妾身所代表的並非「玄龍門」而是「玄龍門門主」。"
10037010-147 = "汝能明白其中的差異嗎？"
10037010-148 = "[ns7]「……我明白。」\n[ns8]「抱歉，我不太懂……」"
10037010-149 = "這樣啊……在此先向汝致上謝意。"
10037010-150 = "也許老師並沒有這樣的意圖，不過光是汝身處此地的事實……"
10037010-151 = "就已經帶給妾身莫大的力量。#n這點希望汝能銘記於心。"
10037010-152 = "呵呵，這樣啊。#n無妨，這也是一種餘興。"
10037010-153 = "好了。光是能見到老師此般神態，此事也並非毫無意義。"
10037010-154 = "汝無須掛心。#n無論何時，老師都能帶給妾身很大的力量。"
10037010-157 = "不過坦白說……這場交流會，造成了玄龍門相當大的壓力。"
10037010-158 = "而其中要因，乃源自於經驗的匱乏。#n當然，期望迴避交流會的心情也不容忽視。"
10037010-161 = "……就缺乏經驗這點而言，妾身與玄龍門的各位並無二致。"
10037010-162 = "畢竟玄龍門屬於玄龍門──即便身為門主也沒有例外。"
10037010-165 = "話說山海經的天氣跟赤冬比起來，是比較冷還是比較暖呢？"
10037010-167 = "呵呵。我想應該很難找到比赤冬更冷的學園哦？潔莉諾醬……不，書記長。"
10037010-168 = "我也同意，潔莉諾會長。#n赤冬是最強大也最偉大的學園！就連寒冷程度都立於不敗之地！"
10037010-169 = "山海經的任何學生只要感受過赤冬的嚴寒，肯定再也不敢對赤冬有所質疑了！"
10037010-171 = "果然如此啊！#n呵呵，畢竟是咱潔莉諾大人的學園，這也是天經地義的！"
10037010-175 = "唔……不過，要是在咱離開學園的期間發生政變的話怎麼辦？"
10037010-176 = "這點也請您放心，潔莉諾會長！#n政變這種事，需要有必須推翻的對象才有可能發生！"
10037010-177 = "如果要推翻的對象不存在的話，政變本身就無法成立了！"
10037010-181 = "有道理！你今天的發言很有貢獻哦，瑪麗娜委員長！"
10037010-182 = "只要繼續精進，你被授予「一級鬍子勞動勳章」的那天也不遠了吧！"
10037010-186 = "謝謝會長的不吝讚美。#n不肖瑪麗娜，將永遠效忠於會長！"
10037010-188 = "（就算真的發生政變，要讓潔莉諾醬復位也不是什麼難事。#n　畢竟之前也做過好幾次了）"
10037010-191 = "[ns]「情況我明白了，妃姬。」"
10037010-193 = "[ns]「需要我幫忙讓這次交流會成功舉辦對吧？」"
10037010-194 = "……是的。#n就像萬年蔘事件那時一般，又得勞煩老師了。"
10037010-195 = "嗯？對老師而言，學生願意向自己求助反倒值得慶幸……？"
10037010-196 = "呵呵，這倒是個新奇的觀點呢。#n妾身會將其納入參考的。"
10037010-197 = "所以汝的言下之意──是哪怕妾身盡情使喚老師也無妨嗎？"
10037010-198 = "[s]「唔嗯……可以的話希望你能稍微手下留情？」"
10037010-199 = "無須擔心。#n妾身並不會提出超出常識範圍的無理要求。"
10037010-204 = "當然妾身所謂的「常識」……自然是以山海經為標準。"
10037010-209 = "[ns]「果然還是請你多多手下留情吧！」"

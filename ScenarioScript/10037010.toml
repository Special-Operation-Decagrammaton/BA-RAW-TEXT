[translation]
10037010-1 = "ตอนที่ 1;เตรียมตัวให้พร้อม"
10037010-7 = "ท่านประมุขมาแล้ว!"
10037010-8 = "ท่านประมุขมาแล้ว!"
10037010-15 = "ขอบคุณที่ตอบรับการเรียกตัวอย่างกะทันหันนะ ครู"
10037010-16 = "[s1] \"ครูไม่ได้รับเอกสารที่ใช้ภาษาสุภาพและโบราณมานานเลย\"\n[s2] \"ครูคิดว่าไม่ควรมองข้ามเอกสารราชการน่ะ\""
10037010-19 = "เช่นนั้นหรือ? แต่หนังสือที่มังกรดำส่งออกไปข้างนอก ก็ใช้ภาษาแบบนั้นทั้งหมดนะ"
10037010-20 = "แต่ก็เอาเถอะ เหตุผลที่เราเรียกครูมา ก็เพราะเรามีเรื่องอยากขอร้องในนามของมังกรดำ"
10037010-22 = "..."
10037010-23 = "..."
10037010-25 = "ใช่แล้วละ ไม่ใช่เรื่องส่วนตัวตามที่คาดนั่นละ นี่คือข้อเรียกร้องอย่างเป็นทางการที่ประมุขแห่งมังกรดำ#nมีต่อครูจากชาเล่ต์"
10037010-26 = "ทางซานไห่จิงจะจัดงานแลกเปลี่ยนกับเรดวินเทอร์ในเร็วๆ นี้"
10037010-28 = "ท่านประมุข... คิดจะทำอย่างนั้นจริงๆ เหรอเนี่ย..."
10037010-29 = "ถ้าท่านประมุขจะลงมือทำเอง ก็คงมีจุดประสงค์อะไรในใจนั่นแหละนะ..."
10037010-31 = "ทุกคน... เรื่องนี้เกี่ยวกับความปลอดภัยของท่านประมุข ระวังคำพูดกันด้วย"
10037010-37 = "..."
10037010-38 = "[s] (เป็นบรรยากาศที่ไม่ควรพูดอะไรผลีผลามแฮะ...)"
10037010-39 = "(ถึงจะคาดไว้แล้ว แต่ก็คงช่วยไม่ได้สินะ...)"
10037010-43 = "ถ้าเช่นนั้น ครู... ไปคุยต่อในห้องพักของเราเถอะ"
10037010-48 = "ทะ... ท่านประมุข?! ไตร่ตรองใหม่เถอะค่ะ! จะให้คนนอกเข้าไปในห้องพักในอาคารหกเหลี่ยม อย่างนั้นเหรอคะ...!"
10037010-49 = "ใช่ค่ะ! การทำแบบนั้นอาจสั่นคลอนประเพณีและอำนาจของมังกรดำ... ยิ่งไปกว่านั้น นี่อาจเป็นปัญหา#nต่อความปลอดภัยและความลับได้นะคะ!"
10037010-51 = "เหมือนจะมีคำที่เสี่ยงต่อการเข้าใจผิดอยู่เลยนะ"
10037010-52 = "เธอนิยามครูจากชาเล่ต์ว่าเป็นคนนอกโดยสิ้นเชิงได้อย่างนั้นหรือ? แล้วถ้านิยามได้ ใครเป็นคนให้สิทธิ์#nนั้นแก่เธอ?"
10037010-54 = "...!"
10037010-55 = "ระ... เรื่องนั้น...!"
10037010-57 = "เราเคยได้รับความช่วยเหลือจากครูในการคลี่คลายเรื่องโสมหมื่นปีมาแล้ว และนี่ก็เป็นข้อเท็จจริงที่มี#nการบันทึกไว้"
10037010-58 = "นอกจากนี้ หนึ่งในธรรมเนียมสำคัญที่ซานไห่จิงยึดถือก็คือการตอบแทนคุณ หรือเธอเห็นต่างออกไป#nกันเล่า?"
10037010-60 = "ฉะ... ฉันทำเกินหน้าที่ไปแล้วค่ะ! "
10037010-61 = "ขออภัยด้วยค่ะ ท่านประมุข!"
10037010-66 = "ถ้าอย่างนั้นฉันจะพาไปที่ห้องพักเอง คุณครู ตามมาทางนี้สิ"
10037010-67 = "จริงสิ เรื่องนั้นน่ะ"
10037010-68 = "ครั้งนี้เราจะนำทางครูไปด้วยตัวเอง เธอออกไปพักผ่อนเถอะ มินะ"
10037010-69 = "ท่านประมุข?!"
10037010-71 = "(เป็นการสนทนาที่แม้แต่หัวหน้าคณะกรรมการเองก็ต้องปลีกตัวออกมางั้นเหรอ...?!)"
10037010-72 = "(งานแลกเปลี่ยนกับเรดวินเทอร์คงมีประเด็นเร่งด่วนหรือความลับซ่อนอยู่สินะ...!)"
10037010-73 = "ถะ... ถ้างั้นพวกฉันจะออกไปก่อนค่ะ"
10037010-74 = "พวกฉันจะคุ้มกันอย่างแน่นหนา ไม่ให้มีใครเข้าไปได้เลยค่ะ!"
10037010-76 = "ทะ... ท่านประมุข... ท่านประมุขขขขข...!"
10037010-83 = "งั้นพวกเราก็ไปกันเถอะ"
10037010-89 = "ขอโทษที่ต้อนรับได้ไม่ดีนะ ครู ทำตัวตามสบายได้เลย"
10037010-90 = "[s] \"เรื่องนั้นไม่เป็นไรหรอก... ว่าแต่ห้องนี้มีกลิ่นหอมแปลกๆ นะ?\""
10037010-91 = "ได้กลิ่นอย่างนั้นหรือ? ฮุฮุ มันเป็นกลิ่นจากธูปที่ชมรมวิจัยศาสตร์การปรุงยากำชับให้จุดน่ะ"
10037010-92 = "เห็นว่าเป็นกลิ่นที่ช่วยรักษาเสถียรภาพของร่างกายและจิตใจ"
10037010-93 = "แต่ถ้ากลิ่นนี้ทำให้ครูอึดอัด เราจะไปดับธูปให้"
10037010-94 = "[s] \"ไม่เป็นไร กลิ่นหอมดีน่ะ\""
10037010-95 = "เช่นนั้นหรือ? โล่งอกไปทีนะ"
10037010-96 = "เราจะเข้าประเด็นเลย จะว่าอะไรหรือเปล่า?"
10037010-97 = "ฮุฮุ เราถามอะไรที่ไม่ควรถามสินะ เพราะในกรณีส่วนใหญ่ ครูก็จะตอบในเชิงยอมรับอยู่แล้ว"
10037010-98 = "ก็อย่างที่ครูเดาไว้นั่นแหละ เราอยากคุยด้วยเรื่อง... ปัญหางานแลกเปลี่ยนกับสถาบันสหภาพ#nเรดวินเทอร์"
10037010-99 = "[s] \"งานแลกเปลี่ยน... ก็แค่จัดขึ้นก็เท่านั้นนี่?\""
10037010-100 = "คิดเช่นนั้นสินะ คนทั่วไปก็คงคิดกันเช่นนั้นละ"
10037010-101 = "แต่สำหรับซานไห่จิงแห่งนี้แล้ว คนที่นี่มีความคิดที่ไม่ค่อยจะเหมือนกับคนทั่วไปสักเท่าไร"
10037010-102 = "หมายความว่าอย่างไรน่ะหรือ? เราขอตอบเช่นนี้แล้วกัน"
10037010-106 = "ที่ผ่านมา... ซานไห่จิงแทบไม่มีการแลกเปลี่ยนกับโรงเรียนภายนอกเลย"
10037010-107 = "[s] \"อย่างนั้นเหรอ?\""
10037010-108 = "เป็นเช่นนั้นละ เราไม่เคยตั้งคำถามถึงเรื่องนั้นเลย นั่นเป็นเพราะย่านการค้าเทพเต่าดำเองก็เปิดกว้างสู่#nภายนอก"
10037010-109 = "แต่นั่นก็เป็นเพียงแค่การไม่ขัดขวางให้คนนอกเข้ามาในซานไห่จิงน่ะ ไม่ปฏิเสธ แต่ก็ไม่ได้เชื้อเชิญ#nตั้งแต่แรก"
10037010-110 = "กรณีของการเชิญโรงเรียนอื่นมาเยือนซานไห่จิงอย่างงานแลกเปลี่ยนครั้งนี้... ต่อให้ไปเปิดหาใน#nประวัติศาสตร์ของซานไห่จิงดู ก็คงไม่พบว่ามีบ่อยนักหรอก"
10037010-111 = "[s] \"มีเหตุผลที่ต้องหลีกเลี่ยงการแลกเปลี่ยนกับภายนอกด้วยเหรอ?\""
10037010-112 = "จะมองว่าเป็นเหตุผลไม่ได้หรอก เพราะนั่นเป็นแค่การไม่อยากให้ประวัติศาสตร์และประเพณีของ#nซานไห่จิงมีการถูกล่วงล้ำน่ะ"
10037010-114 = "โทโมเอะ โทโมเอะ! ที่ซานไห่จิงมีอะไรดังๆ บ้างเหรอ? แล้วที่นั่นเป็นที่แบบไหนน่ะ?"
10037010-115 = "เป็นสถานแห่งความลึกลับ ที่มีสิ่งที่ถูกเก็บเป็นความลับมากกว่าสิ่งที่ถูกเปิดเผยอีกค่ะ..."
10037010-116 = "แต่ก็มีสิ่งหนึ่งที่ฉันแน่ใจ ได้ยินมาว่าอาหารของ 'ย่านการค้าเทพเต่าดำ' นั้นอร่อยมากเลยละค่ะ!"
10037010-117 = "งั้นเหรอ... อย่างนั้นเองเหรอ! อืม ดีละ! ถือเป็นข่าวดีมากๆ ตั้งแต่เริ่มเลยนะ!"
10037010-118 = "แล้วอย่างอื่นล่ะ? มีอย่างอื่นน่าสนใจอีกหรือเปล่า?"
10037010-119 = "เรื่องนี้อาจจะไม่แน่นอนเหมือนเรื่องอาหารของย่านการค้าเทพเต่าดำนะคะ..."
10037010-120 = "แต่มีการพูดคุยกันว่าประธานนักเรียนของซานไห่จิงน่าจะเข้ากับเชริโน่จังได้ดีเลยค่ะ"
10037010-121 = "งั้นเหรอ? อืม...! จะเป็นนักเรียนแบบไหนกันนะ! เริ่มจะตื่นเต้นขึ้นมาแล้วสิ!"
10037010-124 = "สำหรับเรื่องนี้ คงต้องบอกว่าเรากับรูมิก็มีส่วนที่คล้ายกันน่ะ"
10037010-125 = "เราคิดว่าประเพณีก็คือ 'ขนบธรรมเนียมอันดีงามที่ควรค่าแก่การรักษา'"
10037010-126 = "แต่เราก็ไม่อาจรักษาทุกอย่างให้เป็นเหมือนเดิมอย่างที่เคยเป็นมาหรอก"
10037010-127 = "[s] \"แต่คิซากิจะพูดสิ่งนั้นออกมาด้วยตัวเองไม่ได้ใช่มั้ย?\""
10037010-128 = "เป็นเพื่อนคุยที่อ่านสถานการณ์ได้ไวเสียจริง ช่างน่ายินดี"
10037010-129 = "อ่า ฟังเรื่องจากเราแล้วอย่าเข้าใจผิดจนเกินไปเล่า มินะน่ะเป็นเด็กที่ยอดเยี่ยมในด้านที่ตัวเองถนัด เด็กๆ ในมังกรดำก็ทำงานในส่วนของตัวเองได้เป็นอย่างดี"
10037010-130 = "ทว่า..."
10037010-131 = "[s3] \"อืมๆ เข้าใจแล้ว เข้าใจแล้ว\"\n[s4] \"ทุกคนต่างก็พยายามกันอย่างดีที่สุดนั่นละ...\""
10037010-134 = "เป็นเพื่อนคุยที่อ่านสถานการณ์ได้ไวเสียจริง ช่างน่ายินดีเสียจริง"
10037010-135 = "เราจะเล่าเรื่องในสมัยก่อนให้ฟัง เราแค่... อยากให้ครูรู้จักซานไห่จิงน่ะ"
10037010-136 = "นอกจากโลกใบนี้แล้วยังมีโลกอื่นอยู่อีกด้วย และในโลกก็เต็มไปด้วยสิ่งน่าอัศจรรย์ใจมากกว่าที่จะ#nจินตนาการได้"
10037010-137 = "และถ้าพยายามจะรักษาทุกอย่างไว้ให้เป็นดังเดิม... เราก็จะสูญเสียสิ่งที่มีไปได้"
10037010-138 = "[s5] \"มังกรดำจึงเป็นฝ่ายเชิญให้เรดวินเทอร์มาเยือนสินะ\"\n[s6] \"มังกรดำจึงเป็นเจ้าบ้านจัดงานแลกเปลี่ยนสินะ\""
10037010-141 = "ฮุฮุ... หากเราทำเช่นนั้นได้ งานก็อาจจะง่ายขึ้นกว่านี้สักหน่อยก็ได้นะ"
10037010-142 = "หมายความว่าอย่างไรน่ะหรือ? ลองอ่านเอกสารราชการอีกครั้งสิ"
10037010-146 = "ใช่แล้วละ เราเชิญมาในนามของ 'ประมุขมังกรดำ' ไม่ใช่ 'มังกรดำ' เฉยๆ"
10037010-147 = "ครูพอจะรู้ความแตกต่างมั้ยเล่า?"
10037010-148 = "[ns7] \"ไม่แน่ใจแฮะ...\"\n[ns8] \"ขอโทษนะ ครูไม่รู้หรอก...\""
10037010-149 = "เช่นนั้นหรือ? เราจะบอกให้แล้วกัน"
10037010-150 = "ครูอาจจะไม่รู้สึกเช่นนั้นก็ได้ แต่การที่ครูมาอยู่ที่นี่"
10037010-151 = "มันเป็นกำลังใจให้เราไม่น้อยเลย เราอยากให้รู้สิ่งนี้ไว้น่ะ"
10037010-152 = "ฮุฮุ เช่นนั้นก็ช่วยไม่ได้ นั่นก็เป็นเรื่องน่าสนุกเหมือนกัน"
10037010-153 = "เอาละ แค่ได้เห็นสีหน้าแบบนั้นของครู ก็ถือว่าวันนี้ไม่ไร้ความหมายแล้วละ"
10037010-154 = "คงไม่เป็นไรหรอก มีครูเป็นกำลังใจให้เราอยู่เสมอนี่นะ"
10037010-157 = "แต่ถึงอย่างนั้น ในฐานะของมังกรดำแล้ว... ขอบอกตามตรงว่าเรารู้สึกกดดันกับงานแลกเปลี่ยนในครั้งนี้"
10037010-158 = "สาเหตุใหญ่ที่สุดคงเป็นเพราะเราขาดประสบการณ์ ส่วนเรื่องการทำเป็นยอมรับทั้งๆ ที่รู้สึกไม่เต็มใจ ก็เป็นเรื่องที่เราไม่อาจเมินเฉยได้"
10037010-161 = "เรื่องการขาดประสบการณ์น่ะ ไม่ว่าเราหรือมังกรดำคนอื่นก็คงไม่ต่างกัน..."
10037010-162 = "มังกรดำเป็นของของมังกรดำ และต่อให้เป็นประมุขก็ไม่มีข้อยกเว้น"
10037010-165 = "จะว่าไป ที่ซานไห่จิงหนาวกว่าเรดวินเทอร์หรือเปล่า? หรือว่าที่นั่นจะอากาศอบอุ่นนะ?"
10037010-167 = "ฮุฮุ ฉันว่าคงหาโรงเรียนที่หนาวกว่าเรดวินเทอร์ได้ยากนะคะเชริโน่จัง ไม่สิ ท่านเลขาธิการ..."
10037010-168 = "ใช่แล้วค่ะ ท่านประธานเชริโน่ เรดวินเทอร์ของเราแข็งแกร่งและยิ่งใหญ่ที่สุด! ในเรื่องความหนาว เราก็ยืนหนึ่งค่ะ!"
10037010-169 = "ถ้านักเรียนจากซานไห่จิงได้สัมผัสความหนาวของเรดวินเทอร์ ก็คงต้องสยบให้เราอย่างแน่นอนค่ะ!"
10037010-171 = "อย่างนั้นเหรอ! ฮุฮุ เป็นถึงโรงเรียนของท่านเชริโน่ทั้งที เรื่องแบบนั้นมันก็แน่นอนอยู่แล้วละ!"
10037010-175 = "อ่า... จะว่าไป ถ้าเกิดการปฏิวัติระหว่างที่เราไม่อยู่ที่โรงเรียนล่ะ...?"
10037010-176 = "ไม่มีปัญหาหรอกค่ะท่านประธานเชริโน่! การปฏิวัติจะเกิดขึ้นได้ก็ต่อเมื่อมีเป้าหมายให้ล้มล้าง!"
10037010-177 = "ถ้าเป้าหมายที่จะล้มล้างไม่อยู่ การปฏิวัติก็เกิดขึ้นไม่ได้ตั้งแต่แรกค่ะ!"
10037010-181 = "นั่นสินะ! วันนี้หัวหน้าคณะฯ มารินะพูดจาเข้าหูเราเสียจริง!"
10037010-182 = "ถ้าพูดดีเป็นศรีแก่ปากอย่างนี้ต่อไปละก็ <เหรียญตราแรงงานหนวดขั้นที่ 1> ก็คงอยู่ไม่ไกลเกินเอื้อม!"
10037010-186 = "ขอบคุณค่ะท่านประธาน ฉันจะซื่อสัตย์และภักดีต่อหน้าที่เพื่อท่านประธานค่ะ!"
10037010-188 = "(ถึงจะเกิดการปฏิวัติขึ้นมา เราก็แค่ต้องให้เชริโน่จังกลับมาที่นี่ และนั่นก็ไม่ใช่ปัญหาใหญ่ เพราะเราก็ทำมาตั้งหลายครั้งแล้วนี่เนอะ)"
10037010-191 = "[ns] \"ครูเข้าใจสถานการณ์แล้วละ คิซากิ อยากให้ครูช่วยใช่มั้ย?\""
10037010-193 = "[ns] \"อยากให้ครูช่วยให้งานแลกเปลี่ยนครั้งนี้สำเร็จลุล่วงใช่มั้ย?\""
10037010-194 = "ใช่แล้ว... เราเอาแต่เป็นหนี้บุญคุณครูสินะ เรื่องโสมหมื่นปีครั้งก่อนก็ด้วย"
10037010-195 = "หืม? ในฐานะครูแล้ว การที่นักเรียนมาขอความช่วยเหลือเป็นเรื่องน่ายินดีอย่างนั้นหรือ?"
10037010-196 = "ฮุฮุ เป็นมุมมองที่น่าสนใจนะ เราจะจดจำไว้แล้วกัน"
10037010-197 = "แต่นั่นก็หมายความว่า... จากนี้เราจะเรียกครูมาใช้งานได้เต็มที่เลยใช่หรือไม่?"
10037010-198 = "[s] \"อ่า... อืม... เอาแต่พอควรก็ได้...\""
10037010-199 = "ไม่ต้องกังวลนะ เราจะไม่ขอร้องจนเกินขอบเขตที่สมควรหรอก"

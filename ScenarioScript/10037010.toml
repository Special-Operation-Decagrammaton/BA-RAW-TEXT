10037010-48 = "2;현룡문 부원 A;05;무, 문주님?! 재고해 주십시오! 육화각의 내실에 외부인을 들인다는 것은……!"
10037010-49 = "4;현룡문 부원 B;00;그렇습니다! 그것은 현룡문의 전통과 권위와…… 나아가 보안과 기밀마저 흔들리는 일이 될 수 있습니다!\n#4;hophop"
10037010-50 = "#all;hide"
10037010-51 = "3;키사키;99;거기에는 약간의 어폐가 있는 것처럼 보이는구나."
10037010-52 = "3;키사키;02;샬레의 선생을, 완전한 외부인으로 정의할 수 있다는 것이냐? 그것이 가능하다면, 누가 너희에게 그런 권한을 주었느냐."
10037010-53 = "#all;hide"
10037010-54 = "4;현룡문 부원 B;04\n2;현룡문 부원 A;04;……!\n#2;shake\n#2;em;[?!]"
10037010-55 = "4;현룡문 부원 B;04;그, 그것은……!\n#4;stiff"
10037010-56 = "#all;hide"
10037010-57 = "3;키사키;07;이미 선생에게는, 만년삼 사건 해결의 조력을 받은 적이 있다. 이는 기록된 사실이기도 할 터."
10037010-58 = "3;키사키;05;우리 산해경의 중요한 전통 중 하나에는, 보은(報恩)이라는 개념도 분명 포함되어 있을 게다. 그렇지 아니한가?\n#3;em;[?]"
10037010-59 = "#all;hide"
10037010-60 = "4;현룡문 부원 B;04\n2;현룡문 부원 A;04;주, 주제넘었습니다! \n#2;greeting"
10037010-61 = "4;현룡문 부원 B;04;면목 없습니다, 문주님!\n#4;em;[땀]"
10037010-62 = "#st;[0,0];instant;1;"
10037010-63 = "#clearST"
10037010-64 = "4;현룡문 부원 B;04\n2;현룡문 부원 A;04\n#2;d\n#4;d\n#wait;1200"
10037010-65 = "#all;hide"
10037010-66 = "3;미나;02;그러면, 내실로 안내하지. 선생님. 길은 이쪽이다.\n#3;em;[반응]\n#3;a"
10037010-67 = "1;키사키;08;그렇지. 그 문제 말이다만.\n#1;ar\n#3;m5"
10037010-68 = "1;키사키;00;이번만큼은 내가 몸소 선생을 안내하도록 하마. 그대는 물러가 쉬고 있어라. 미나."
10037010-69 = "3;미나;04;문주님?!\n#3;shake\n#3;em;[?!]"
10037010-70 = "#all;hide"
10037010-71 = "4;현룡문 부원 B;04\n2;현룡문 부원 A;04;(집행부장님까지 물릴 만한 대화를 나누셔야 하는 건가……?!)\n#2;stiff"
10037010-72 = "4;현룡문 부원 B;00;(도대체 붉은겨울과의 교류회라는 것에, 얼마나 긴급하고 비밀스러운 사항이 숨겨져 있기에……!)\n#4;em;[땀]"
10037010-73 = "2;현룡문 부원 A;05;그, 그러면 저희는 먼저 물러나겠습니다.\n#2;em;[반응]"
10037010-74 = "4;현룡문 부원 B;05;누구도 드나들 수 없도록 철통같이 지키겠습니다!\n#4;greeting"
10037010-75 = "#all;hide"
10037010-76 = "3;미나;04;무, 문주님……. 문주니이이이임……!\n#3;em;[땀]\n#3;stiff"
10037010-77 = "#st;[0,0];instant;1;"
10037010-78 = "#clearST"
10037010-79 = "#2;hide\n4;현룡문 부원 A;05\n5;현룡문 부원 B;05\n3;미나;04\n#4;al\n#5;al\n#4;h\n#5;h\n#3;h\n#wait;300\n#bgshake"
10037010-80 = "4;현룡문 부원 A;05\n5;현룡문 부원 B;05\n3;미나;04\n#3;dl\n#4;dl\n#5;dl\n#3;h\n#4;h\n#5;h\n#wait;3000\n#bgshake"
10037010-81 = "#all;hide"
10037010-82 = "3;키사키;99\n#3;greeting\n#3;a\n#wait;1300"
10037010-83 = "3;키사키;02;……그러면, 우리도 가도록 하지.\n#3;m4"
10037010-84 = "#all;hide"
10037010-85 = "#wait;150"
10037010-86 = "#wait;1500"
10037010-87 = "#all;hide"
10037010-88 = "#wait;500"
10037010-89 = "3;키사키;10;변변치 못한 대접을 사과하지. 선생. 마음이라도 편히 있었으면 한다.\n#3;em;[반응]\n#3;a"
10037010-90 = "[s] \"그런 건 괜찮은데…… 묘한 향이 나네. 이 방?\""
10037010-91 = "3;키사키;03;눈치챘는가? 후후. 연단방에서 반드시 피워 두라고 당부한 향이어서 말이지."
10037010-92 = "3;키사키;99;심신의 안정과 치유에 도움이 되는 약향(藥香)이라는 모양이지만, 그것은 또한 어떨까.\n#3;em;…"
10037010-93 = "3;키사키;02;선생의 심기를 거스른다면, 꺼 두도록 하겠지만."
10037010-94 = "[s] \"괜찮아. 좋은 향이네.\""
10037010-95 = "3;키사키;08;……그러한가. 그것은 다행이로군."
10037010-96 = "3;키사키;01;곧장 본론으로 들어가고자 하지만, 괜찮겠는가?\n#3;em;[?]"
10037010-97 = "3;키사키;03;후후. 괜한 것을 물었군. 선생은 웬만한 경우에는 지금처럼 '그렇다'고 대답할 것일 텐데."
10037010-98 = "3;키사키;99;짐작하고 있겠지만, 그러하다. 붉은겨울 연방학원과의 교류회 문제로…… 말을 나누고 싶어서 말이지."
10037010-99 = "[s] \"교류회는…… 그냥 하면 되는 거 아냐?\""
10037010-100 = "3;키사키;01;과연, 그렇게 나오는군. 그것이 세간의 인식이겠지.\n#3;em;…"
10037010-101 = "3;키사키;08;하지만 그것이 이곳, 산해경에서는 약간 통용되지 않는 인식이기도 해서 말이다."
10037010-102 = "3;키사키;01;무슨 의미이냐고? 이 말로 대답을 대신하고 싶구나."
10037010-103 = "#st;[0,0];instant;1;"
10037010-104 = "#clearST"
10037010-105 = "3;키사키;01\n#3;m4\n#wait;1500"
10037010-106 = "3;키사키;99;……지난 세월, 산해경에서는 외부 학교와의 교류가 거의 이루어지지 않았다."
10037010-107 = "[s] \"그랬어?\""
10037010-108 = "3;키사키;02;그러했지. 그럼에도 그 사실에 위화감을 보통 느끼지 않는 것은, 현무상회를 통해 외부인의 출입이 이루어지고 있었기 때문이었고.\n#3;em;[반응]"
10037010-109 = "3;키사키;01;하지만 그것은 어디까지나 외부에서의 산해경 방문을, 내부에서 가로막지 않은 것에 불과했다."
10037010-110 = "3;키사키;07;이번의 교류회처럼…… 산해경으로부터 외부 학교를 초청하는 형식은, 산해경의 역사를 되돌아보아도, 그다지 흔치 않은 일이었다.\n#3;m3"
10037010-111 = "[s] \"그렇게까지 외부와의 교류를 피했던 이유가 있어?\""
10037010-112 = "3;키사키;01;이유라고 할 것까지도 없었다. 산해경의 역사와 전통을 침범받고 싶지 않다는 것이었지."
10037010-113 = "#all;hide"
10037010-114 = "3;체리노;03;토모에, 토모에! 산해경은 뭐가 유명해? 어떤 곳이야?\n#3;em;[반짝]\n#3;hophop\n#3;h\n#3;a"
10037010-115 = "5;토모에;99;알려진 것보다 알려지지 않은 것이 더 많은, 수수께끼 같은 곳이지만…….\n#5;al\n#3;m1"
10037010-116 = "5;토모에;03;한 가지는 확실한 것 같더군요. 그곳 '현무상회'의 음식이, 그렇게 맛있대요!\n#5;greeting"
10037010-117 = "3;체리노;02;그런가…… 그러한가! 음, 좋지! 시작부터 매우 좋은 소식을 들었다!"
10037010-118 = "3;체리노;03;다른 것은? 다른 것은 없어?\n#3;em;[음표]\n#3;jump"
10037010-119 = "5;토모에;99;이것은 현무상회의 음식만큼 확실한 소식은 아니지만……."
10037010-120 = "5;토모에;00;산해경의 학생회장은, 체리노 쨩과 잘 어울릴 것 같다는 이야기도 있었고요."
10037010-121 = "3;체리노;02;그래? 으음……! 어떤 학생일까! 벌써부터 기대되기 시작했어!\n#3;em;[///]\n#3;stiff"
10037010-122 = "#all;hide"
10037010-123 = "#wait;500"
10037010-124 = "3;키사키;99;이 부분에 있어서만큼은, 어느 정도 루미와 내가 통하는 부분이 있었다고 해야겠군.\n#3;a"
10037010-125 = "3;키사키;02;전통이란 본디, '지킬 만한 좋은 풍습'을 뜻하는 것이라고, 나는 생각한다.\n#3;em;[반응]"
10037010-126 = "3;키사키;00;모든 것을 이전에 존재했던 그대로 지키기만 하는 것이, 능사일 수는 없다는 이야기다."
10037010-127 = "[s] \"하지만 그걸 직접 키사키의 입으로 이야기할 수는 없단 거지?\""
10037010-128 = "3;키사키;03;이야기가 빠르게 통하는 말벗이란, 참으로 기쁜 것이로구나."
10037010-129 = "3;키사키;02;아, 너무 오해하지 말아 주었으면 한다. 미나는 자기 영역에서는 우수한 아이이고, 현룡문의 아이들도 각자 제 몫을 다 해 주고 있다."
10037010-130 = "3;키사키;99;다만 말이다. 다만…….\n#3;em;…"
10037010-131 = "[s3] \"응. 응. 이해했어. 이해했어.\"\n[s4] \"모두 최선을 다하면서 살아가는 법이지…….\""
10037010-132 = "#wait;10"
10037010-133 = "#wait;10"
10037010-134 = "3;키사키;03;……이야기가 빠르게 통하는 말벗이란, 참으로 기쁜 것이로구나."
10037010-135 = "3;키사키;02;이야기를 되돌리도록 하지. 나는…… 산해경이 알아주었으면 하는 게다.\n#3;em;[반응]"
10037010-136 = "3;키사키;01;세계 밖에는 또 다른 세계가 있다는 것을. 그리고 세상에는 상상하는 것보다 더 경이로운 것들로 가득하다는 것을."
10037010-137 = "3;키사키;99;그리고 모든 것을 있는 그대로 지키려다가는…… 가지고 있는 것마저 잃어버리기 마련이라는 것을 말이다."
10037010-138 = "[s5] \"그래서, 현룡문의 이름으로 붉은겨울에.\"\n[s6] \"먼저 교류회 신청을 한 거구나.\""
10037010-139 = "#wait;10"
10037010-140 = "#wait;10"
10037010-141 = "3;키사키;03;후후……. 그리할 수 있었다면, 조금 더 일이 수월했을지도 모르겠구나."
10037010-142 = "3;키사키;00;무슨 뜻이냐고? 다시 한번 공문을 살펴보아라."
10037010-143 = "#st;[0,0];instant;1;"
10037010-144 = "#clearST"

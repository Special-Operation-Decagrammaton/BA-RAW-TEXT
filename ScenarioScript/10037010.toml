[translation]
10037010-1 = "Episode 1;Wash Your Hands, Spruce Yourself Up"
10037010-7 = "The president is coming!"
10037010-8 = "The president is coming!"
10037010-15 = "Thank you for responding to our summons on such short notice, Sensei."
10037010-16 = "[s1] \"Of course. I rarely receive such polite, elegantly-written messages.\"\n[s2] \"Something told me that I shouldn't ignore this matter.\""
10037010-19 = "Is that so? I wasn't aware our message was different from any other we send."
10037010-20 = "But back to the point. The reason I called you here is because I must ask a favor of you in the name of Genryumon."
10037010-22 = "..."
10037010-23 = "..."
10037010-25 = "As you may have surmised, this isn't a personal matter. It is a formal request issued from the president of Genryumon to Schale's Sensei."
10037010-26 = "Shanhaijing will have an exchange meeting with Red Winter in the near future."
10037010-28 = "So she really was serious about that..."
10037010-29 = "I'm sure the president has her reasons..."
10037010-31 = "...We are in the presence of the president. Hold your tongues."
10037010-37 = "..."
10037010-38 = "[s] \"(It doesn't seem like we can speak freely here...)\""
10037010-39 = "(I anticipated this. I have no choice...)"
10037010-43 = "Sensei. Please join me in my office. "
10037010-48 = "M-Madam?! Please, reconsider! To invite an outsider into the Rikkagaku is...!"
10037010-49 = "Yes! Doing such a thing violates the very foundations of our tradition and authority... It could even threaten the safety and closely guarded secrets of Genryumon!"
10037010-51 = "Yet I sense more than concern in your words."
10037010-52 = "Are you implying that Schale's Sensei is a complete outsider? If that is indeed your intention, then upon what authority are you making such claims?"
10037010-54 = "...!"
10037010-55 = "Th-That's...!"
10037010-57 = "We have already received Sensei's help with the ten-thousand-year ginseng incident. That much is a matter of record."
10037010-58 = "Furthermore, repaying an act of kindness is one of Shanhaijing's storied traditions, is it not?"
10037010-60 = "P-Please forgive our impudence! "
10037010-61 = "We are humbled by your wisdom!"
10037010-66 = "Please follow me inside, Sensei."
10037010-67 = "Yes. About that..."
10037010-68 = "I will personally escort Sensei inside. You may be at ease, Mina."
10037010-69 = "Madam President?!"
10037010-71 = "(Are they discussing something beyond even the Executive Officer...?!)"
10037010-72 = "(What kind of top secret information is being traded in this meeting with Red Winter...?!)"
10037010-73 = "W-We shall take our leave then."
10037010-74 = "None will cross our line of protection!"
10037010-76 = "M-M-Madam... Madam!"
10037010-83 = "...Shall we?"
10037010-89 = "I apologize for the less than satisfactory reception, Sensei. It would please me to know your heart is at ease."
10037010-90 = "[s] \"It's fine, but... What is the scent in this room?\""
10037010-91 = "You noticed that? Fufu... The Eastern Alchemy Society insisted that I use this particular incense."
10037010-92 = "I am told that it is a medicinal scent that calms the nerves and aids the body's healing cycle. But I can't be certain of its efficacy."
10037010-93 = "If it bothers you, Sensei, I would be happy to extinguish it."
10037010-94 = "[s] \"No, that's all right. It smells quite nice.\""
10037010-95 = "...I see. Then I am relieved."
10037010-96 = "Now... I'd like to cut to the chase, if you don't mind."
10037010-97 = "I guess there was no need for the preamble. Of course you'd say, \"Of course\". Fufu."
10037010-98 = "As you know, I would like to discuss my thoughts about this...exchange meeting with the Red Winter Federal Academy."
10037010-99 = "[s] \"You can just...hold an exchange meeting, can't you?\""
10037010-100 = "Yes, that would make the most sense."
10037010-101 = "Yet, it's also not easily accepted here, in Shanhaijing."
10037010-102 = "What I mean is... Let me put it this way."
10037010-106 = "...In the past, Shanhaijing had little to no interactions with other schools."
10037010-107 = "[s] \"Really?\""
10037010-108 = "Yes. The reason it doesn't cause unease is mostly due to the fact that outsiders are allowed entry through the Black Tortoise Promenade."
10037010-109 = "However, that only means that no one actively prevents any outsiders from visiting Shanhaijing."
10037010-110 = "This exchange meeting... Well, an invitation for an outside academy to visit Shanhaijing is historic in its rarity."
10037010-111 = "[s] \"Is there a reason you've avoided contact with the outside?\""
10037010-112 = "There was no grand reason. We only wished to minimize any disruptions to Shanhaijing's history and traditions."
10037010-114 = "Tomoe, Tomoe! What's Shanhaijing known for? What kind of place is it?"
10037010-115 = "Well, it is a mysterious place about which we have more questions than answers..."
10037010-116 = "But if one thing is certain... Food from the Black Tortoise Promenade is to die for!"
10037010-117 = "I see... I see! Good! We are already off to a great start!"
10037010-118 = "Anything else?"
10037010-119 = "Well, this isn't as certain as the Black Tortoise Promenade's food, but..."
10037010-120 = "If rumors are any indication, you and Shanhaijing's student council president would get along well."
10037010-121 = "Really? Hmm...! I wonder what kind of person she is! I'm already looking forward to our meeting!"
10037010-124 = "In that regard, I must admit I agree with Rumi."
10037010-125 = "Tradition means \"customs that are worthy of being preserved.\""
10037010-126 = "At the same time, rigidly adhering to tradition can't always be the right direction."
10037010-127 = "[s] \"But considering your position, you can't just say that, can you?\""
10037010-128 = "What a blessing it is to have a friend who understands me so well."
10037010-129 = "Please don't misunderstand. Mina is an incredibly capable person in her area of expertise, and every student of Genryumon is doing what is expected of them."
10037010-130 = "Still..."
10037010-131 = "[s3] \"Yes, I understand.\"\n[s4] \"Everyone really does their best every day...\""
10037010-134 = "...What a blessing it is to have a friend who understands me so well."
10037010-135 = "To return to the matter at hand... I want Shanhaijing to understand something."
10037010-136 = "There is another world outside of our own—a world full of things beyond our wildest imaginations."
10037010-137 = "If we work only to preserve what we have...we risk one day losing the very thing we fought so hard to protect."
10037010-138 = "[s5] \"Ah. That explains it.\"\n[s6] \"That's why Genryumon invited Red Winter to an exchange meeting.\""
10037010-141 = "Fufu... Perhaps if I had, things would have gone more smoothly."
10037010-142 = "What do I mean...? Here. Take another look at the message."
10037010-146 = "Yes, indeed. It was signed not as Genryumon, but as the president of Genryumon."
10037010-147 = "Do you understand the difference that makes?"
10037010-148 = "[ns7] \"...I think so.\"\n[ns8] \"Sorry. I don't get it...\""
10037010-149 = "Is that so...? I see. My respects to you, Sensei."
10037010-150 = "You may not understand it, but simply by being here..."
10037010-151 = "It is immensely helpful to me. I want you to know that."
10037010-152 = "Fufu! I see. I guess that is one more thing for me to enjoy."
10037010-153 = "It's all right. Seeing your expression just now made all of this worth it."
10037010-154 = "You're always a great help to me."
10037010-157 = "Anyway, Genryumon itself is, to be frank...uncomfortable with this exchange meeting."
10037010-158 = "The lack of any such experience is the largest factor. Others may want to remain more aloof about the entire exchange meeting."
10037010-161 = "...As for the lack of experience, I am no different from the rest of Genryumon."
10037010-162 = "Genryumon has always belonged to Genryumon alone. The same can be said about its president."
10037010-165 = "Do you think Shanhaijing is colder or warmer than Red Winter?"
10037010-167 = "Heehee! It would be rather difficult to find an academy colder than Red Winter. Cherino—I mean, Great Leader?"
10037010-168 = "Yes, Great Leader Cherino. Red Winter is the strongest and the greatest—much like its climate!"
10037010-169 = "No student from Shanhaijing will scoff at Red Winter once they have a taste of our weather!"
10037010-171 = "I knew it! Heh heh... Of course, I would expect nothing less of the academy of the great Cherino!"
10037010-175 = "Oh, wait, um... What if there's a coup d'etat while I'm gone...?"
10037010-176 = "There's no need to worry about that, Great Leader Cherino! A coup d'etat cannot happen when there is no one present to overthrow!"
10037010-177 = "Without a target for their ire, a coup d'etat will be impossible!"
10037010-181 = "Ah, of course! You're speaking a lot of sense today, Chairman Marina!"
10037010-182 = "Keep it up, and it won't be long before I pin the First-Class Mustache Labor Medal on your chest!"
10037010-186 = "Thank you, President. I, Marina, will do my best to be more loyal to you."
10037010-188 = "(Even if there is a coup d'etat, it shouldn't be too difficult to reinstate Cherino. We have plenty of experience with that.)"
10037010-191 = "[ns] \"I understand the situation, Kisaki.\""
10037010-193 = "[ns] \"So my job is to help you make the exchange meeting a success, right?\""
10037010-194 = "...Yes. Just as I did with the ten-thousand-year ginseng incident, I must rely on you."
10037010-195 = "Hm? As an educator, you think it's good for students to ask for help...?"
10037010-196 = "Fufu... That is a refreshing perspective. I'll make note of it."
10037010-197 = "And, I suppose, that means I can put you to work as much as I'd like?"
10037010-198 = "[s] \"Uh... Umm... Would you at least go easy on me...?\""
10037010-199 = "No need to worry. I'll only ask you to do what is within the realm of reasonable."
10037010-204 = "...I mean, what is reasonable for Shanhaijing, of course."
10037010-209 = "[ns] \"Mercy!\""

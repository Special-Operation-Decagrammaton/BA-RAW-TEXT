10007080-4 = "#na;(치나츠를 쫓아 온천장 밖에 조성된 산책로로 나왔다.)"
10007080-5 = "#na;(하지만 치나츠는 물론이고, 산책로에서는 학생들의 인적이 거의 느껴지지 않았다.)"
10007080-6 = "[s] \"다들 어디로 간 거지…….\""
10007080-7 = "#na;???;무얼 그리 열심히 찾고 있는 건가, 콤라드?"
10007080-8 = "#st;[0,0];instant;1;"

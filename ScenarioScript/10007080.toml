10007080-30 = "#clearST"
10007080-31 = "5;토모에;99\n#5;dr\n#wait;3500"
10007080-32 = "[ns] \"생각보다 온천을 즐기고 있는 모양이네.\""
10007080-33 = "3;체리노 온천ND;07;으음…… 분한 사실이지만, 확실히 이 온천장에는 즐길 거리가 가득하군. 하루 종일 놀아도 질리지가 않을 정도야.\n#3;m3\n#3;em;[땀]\n#5;hide"
10007080-34 = "3;체리노 온천ND;99;다양한 컨셉의 욕탕은 물론이고, 휴게실에는 탁구대나 게임기기 같은 휴게 시설도 완벽히 구비되어 있지. 게다가 놀다 지치면 다시 탕에 들어가 피로를 풀 수 있으니……"
10007080-35 = "3;체리노 온천ND;01;특별반의 가난뱅이들이 급히 만든 시설이라고 해서 우습게 보았는데, 제법이잖아?"
10007080-36 = "[s] \"시설의 대부분은 온천개발부가 지은 모양이지만.\""
10007080-37 = "3;체리노 온천ND;02;음, 그러고보니 이 몸도 그 이야기는 들었다. 게헨나의 학생들이 이 온천장을 건설했다면서?\n#3;em;[반응]"
10007080-38 = "3;체리노 온천ND;01;본래 원칙대로라면 붉은겨울의 자치구 내에서 허가 없이 공사를 진행한 게헨나의 괴뢰 일당은 엄중히 숙청해야 마땅하지만……"
10007080-39 = "3;체리노 온천ND;99;짧은 시간 내에 이토록 훌륭한 온천장을 짓다니, 그 능력만큼은 무척 탐이 나."
10007080-40 = "3;체리노 온천ND;05;……최소한 수시로 파업을 일삼는 <용역부>의 노동자들보다는 훨씬 쓸모가 있겠지.\n#3;stiff\n#3;em;[빠직]"
10007080-41 = "3;체리노 온천ND;99;어떻게 하면 온천개발부를 붉은겨울 연방학원으로 끌어들일 수 있을까?"

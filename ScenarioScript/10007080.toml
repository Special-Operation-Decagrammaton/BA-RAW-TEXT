10007080-10 = "#wait;2000"
10007080-11 = "3;체리노 온천ND;00\n#3;a\n#wait;1500"
10007080-12 = "3;체리노 온천ND;02;그런 얇은 옷차림으로 이 주위를 돌아다녔다가는 감기에 걸릴 게 분명하네. \n#3;em;[반응]"
10007080-13 = "3;체리노 온천ND;01;붉은겨울 학원의 겨울을 우습게 보았다가는 큰일난다고?"
10007080-14 = "[s] \"그렇게 말하는 체리노의 옷차림이 더 추워 보이는걸…….\""
10007080-15 = "3;체리노 온천ND;02;응? 지금 이 몸이 춥지 않을까 걱정해 주는 건가?\n#3;em;[?]"
10007080-16 = "3;체리노 온천ND;99;후후후…… 쓸데없는 걱정이구나, 콤라드."
10007080-17 = "3;체리노 온천ND;01;이 몸은 붉은겨울 학원의 학생회장이자, 서기장이자, 미화부장이자……"
10007080-18 = "3;체리노 온천ND;02;어……\n#3;em;…"
10007080-19 = "3;체리노 온천ND;05;여하튼 온갖 대단한 직책들을 모조리 도맡고 있는 위대한 몸!\n#3;em;[빠직]\n#3;hophop"
10007080-20 = "3;체리노 온천ND;03;이 정도의 추위쯤은 반소매 차림으로도 끄떡없느니라!"
10007080-21 = "3;체리노 온천ND;00;에, 에,\n#3;stiff"
10007080-22 = "3;체리노 온천ND;04;엣-취!\n#3;jump\n#fontsize;100"
10007080-23 = "5;토모에;02;그런 차림으로는 감기에 걸리겠어요, 체리노 쨩. 좀 더 옷차림을 따듯하게 하는 게 좋겠어요.\n#5;em;[반응]\n#5;al\n#3;m1"
10007080-24 = "5;토모에;01;아니면 따듯하게 데운 커피 우유를 가져다 드릴까요?"
10007080-25 = "3;체리노 온천ND;01;우읏……\n#3;stiff"
10007080-26 = "3;체리노 온천ND;05;쓸데없는 참견이다, 토모에! 이 몸은 조금도 추위를 타지 않는다고 이미 말하지 않았느냐!\n#3;hophop\n#3;em;[빠직]"
10007080-27 = "3;체리노 온천ND;99;……하지만 따듯하게 데운 커피 우유는 마시겠어. 설탕을 듬뿍 쳐서 말이야!"
10007080-28 = "5;토모에;99;네, 금방 준비해 오겠습니다.\n#5;greeting\n#5;em;[반짝]"

10007080-45 = "3;체리노 온천ND;02\n#3;em;[반응]\n#wait;1200"
10007080-46 = "3;체리노 온천ND;05;그래! 그들에게 명예로운 훈장을 수여 한다면 감동하며 이 몸에게 충성을 맹세하지 않을까? <1급 수염노동훈장> 정도면 충분하겠지!\n#3;em;[반짝]"
10007080-47 = "3;체리노 온천ND;02;온천개발부가 붉은겨울 학원으로 편입해 온다면……"
10007080-48 = "3;체리노 온천ND;01;기존의 온천장 옆에 이 몸의 전용 온천장을 더욱 성대한 규모로 건설하는 거야!\n#3;em;[!]"
10007080-49 = "3;체리노 온천ND;99;새로 건설한 온천장에 이름을 붙인다면…… 음, <수염 온천장>이 좋겠군!"
10007080-50 = "3;체리노 온천ND;03;이 몸의 전용 온천장인 만큼, 이 몸의 권위를 드러낼 수 있는 장식물도 빼놓을 수 없지!\n#3;hophop\n#3;em;[재잘]"
10007080-51 = "3;체리노 온천ND;99;온천수를 뿜어내는 수염 동상이랑, 수염 모양의 석등이랑, 그리고 또……."

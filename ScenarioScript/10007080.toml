[translation]
10007080-1 = "ตอนที่ 8;แผนลับของชมรมพัฒนาออนเซ็น"
10007080-2 = "ทางเดินเขาใกล้ออนเซ็น No.227"
10007080-4 = "(คุณครูเดินตามชินัตสึออกไปทางเส้นทางเดินเขาใกล้ๆ ออนเซ็น)"
10007080-5 = "(นอกจากคุณครูจะไม่เจอชินัตสึแล้ว ก็ยังไม่เจอนักเรียนคนอื่นๆ ที่ทางเดินเขาเลย)"
10007080-6 = "[s] \"ทุกคนหายไปไหนกันหมดนะ...\""
10007080-7 = "มองหาอะไรอยู่งั้นเหรอสหาย?"
10007080-12 = "แล้วใส่ชุดบางๆ แบบนั้นออกมาเดินกลางอากาศหนาวแบบนี้ เดี๋ยวก็เป็นหวัดจนได้หรอก "
10007080-13 = "ถ้าสบประมาทความหนาวเย็นของสหภาพเรดวินเทอร์จะเป็นเรื่องเอานะ"
10007080-14 = "[s] \"แต่ว่าชุดของเชริโน่น่าจะหนาวกว่านะ...\""
10007080-15 = "หืม? สหายเป็นห่วงกลัวว่าเราจะหนาวงั้นเหรอ?"
10007080-16 = "ฮุฮุฮุ... เป็นห่วงไม่เข้าเรื่องเลยนะสหาย "
10007080-17 = "เราเป็นถึงประธานนักเรียนของสหภาพเรดวินเทอร์ เลขาธิการ หัวหน้าฝ่ายตกแต่ง และก็..."
10007080-18 = "เอ่อ..."
10007080-19 = "เอาเป็นว่าเราครองตำแหน่งที่ยิ่งใหญ่ต่างๆ อยู่ทั้งหมดเลย!"
10007080-20 = "ความหนาวเย็นแค่นี้ไม่สะทกสะท้านหรอก!"
10007080-21 = "ฮะ...ฮะ..."
10007080-22 = "ฮัดชิ่ว!"
10007080-23 = "ถ้าใส่ชุดแบบนั้นจะเป็นหวัดเอานะคะเชริโน่จัง ใส่ชุดที่หนาๆ กว่านี้หน่อยดีกว่านะคะ"
10007080-24 = "หรือว่าจะรับกาแฟนมร้อนๆ สักหน่อยมั้ยคะ?"
10007080-25 = "อึ่ก...!"
10007080-26 = "ยุ่งไม่เข้าเรื่องเลยนะโทโมเอะ! เราบอกแล้วยังไงล่ะว่าเราไม่รู้สึกหนาวเลยสักนิดเดียว!"
10007080-27 = "แต่ว่า... เราจะดื่มกาแฟนมร้อนๆ นั่นก็แล้วกัน ใส่น้ำตาลมาพูนๆ ด้วยนะ!"
10007080-28 = "ค่ะ เดี๋ยวฉันจะไปเตรียมมาให้นะคะ"
10007080-32 = "[ns] \"ดูเธอสนุกกับออนเซ็นกว่าที่คิดอีกนะ\""
10007080-33 = "อืม... ถึงจะน่าหงุดหงิดแต่ก็เป็นเรื่องจริง เรากำลังเพลิดเพลินกับออนเซ็นนี่มากเลยละ#nอยู่เที่ยวเล่นได้ทั้งวันไม่เบื่อเลย"
10007080-34 = "นอกจากบ่อออนเซ็นจะมีหลายแบบแล้ว ที่ห้องพักผ่อนก็มีเครื่องเล่นอย่างพวกโต๊ะปิงปอง#nและเครื่องเกมให้เล่นด้วยนะ แถมพอเล่นจนเหนื่อยแล้วก็ไปแช่ออนเซ็นได้... "
10007080-35 = "ตอนแรกเราคิดว่ามันน่าขำเพราะเป็นสถานที่ที่พวกยาจกอย่างห้องเรียนพิเศษสร้าง#nแต่ก็สร้างขึ้นมาได้ดีเลยนะ"
10007080-36 = "[s] \"อุปกรณ์ต่างๆ ชมรมพัฒนาออนเซ็นเป็นคนหามาให้น่ะ\""
10007080-37 = "อืม พอมาคิดดูแล้วเราก็เคยได้ยินเรื่องแบบนั้นเหมือนกันนะ ว่าเด็กนักเรียนจากเกเฮนน่า#nสร้างออนเซ็นนี้ขึ้นมาน่ะ?"
10007080-38 = "ตามหลักการแล้ว พวกเด็กนักเรียนของเกเฮนน่าที่เข้ามาก่อสร้างในเขตปกครองตนเอง#nของสหภาพเรดวินเทอร์ จะต้องถูกกวาดล้างจนถึงที่สุดนะ แต่ว่า..."
10007080-39 = "พวกนั้นสามารถสร้างออนเซ็นได้อย่างยอดเยี่ยมในระยะเวลาสั้นๆ แบบนี้ เราอดชื่นชมในความ#nสามารถนั้นไม่ได้จริงๆ"
10007080-40 = "...อย่างน้อยก็มีประโยชน์มากกว่าพวก <ชมรมผู้รับจ้าง> ที่ชอบนัดหยุดประท้วงกันเป็นว่าเล่นละนะ"
10007080-41 = "ทำยังไงถึงจะดึงพวกชมรมพัฒนาออนเซ็นมาที่สหภาพเรดวินเทอร์ได้นะ?"
10007080-46 = "ใช่แล้ว! ถ้าให้เหรียญตราเกียรติยศละก็ พวกเธอจะต้องซาบซึ้งใจและนับถือเราแน่นอน#nให้ <เหรียญตราแรงงานหนวดขั้นที่ 1> ก็คงจะพอ!"
10007080-47 = "ถ้าชมรมพัฒนาออนเซ็นย้ายมาที่สหภาพเรดวินเทอร์ละก็..."
10007080-48 = "เราจะสร้างออนเซ็นส่วนตัวของเราแบบอลังการไว้ข้างๆ ออนเซ็นนี่เลยละ!"
10007080-49 = "ส่วนชื่อของออนเซ็นส่วนตัวที่จะสร้างใหม่ อืม... <ออนเซ็นหนวด> ก็แล้วกัน!"
10007080-50 = "ออนเซ็นส่วนตัวของเรา... จะต้องมีของตกแต่งที่แสดงถึงอำนาจของเราด้วยสิ!"
10007080-51 = "รูปปั้นหนวดพ่นน้ำพุร้อน... โคมไฟหินรูปหนวด แล้วก็..."
10007080-56 = "ตู้มมมมม!"
10007080-57 = "หา?! สะ...เสียงอะไรน่ะ? แผ่นดินไหวอีกแล้วเหรอ?"
10007080-64 = "อะฮ่าฮ่า โทษทีๆ ไม่รู้ว่ามีคนอยู่ตรงทางเดินเขาตรงนี้ด้วย พวกเรากำลังระเบิดภูเขากันอยู่น่ะ"
10007080-65 = "ทำการก่อสร้างโดยไม่ได้รับอนุญาตจากเรางั้นเหรอ... มาจากชมรมไหนกันน่ะ?"
10007080-66 = "เราจะกวาดล้างสมาชิกทุกคนให้หมด!"
10007080-67 = "หืม...? นั่นมันตราของสถาบันเกเฮนน่า..."
10007080-68 = "อื้อ พวกเราคือชมรมพัฒนาออนเซ็นของสถาบันเกเฮนน่า! แน่นอนว่าเรามาพัฒนาออนเซ็นที่นี่ไงล่ะ!"
10007080-69 = "ว่าแต่ว่าเด็กน้อยติดหนวดปลอมนั่นใครน่ะ?"
10007080-70 = "เด็กน้อยงั้นเรอะ! เราคือประธานนักเรียนผู้ยิ่งใหญ่ของสถาบันสหภาพเรดวินเทอร์นะ!"
10007080-71 = "เดี๋ยวนะ... ชมรมพัฒนาออนเซ็นงั้นเหรอ? พวกที่สร้างออนเซ็นนี้ขึ้นมาน่ะเหรอ?"
10007080-72 = "อื้อๆ พวกเราเป็นคนสร้างออนเซ็นนี้ขึ้นมาเองแหละ"
10007080-73 = "พอทุ่มเทจิตวิญญาณทั้งหมดลงไป มันก็ใหญ่โตและสวยงามกว่าที่ฉันคิดเอาไว้เยอะเลย..."
10007080-74 = "เป็นยังไงล่ะ ท่านประธานตัวน้อยคิดว่าออนเซ็นนี่ดูดีรึเปล่า?"
10007080-75 = "อื้ม... ถึงจะไม่อยากยอมรับเท่าไร แต่ก็เป็นออนเซ็นที่หรูหรามาก ดูๆ ไปแล้วนักเรียนของ#nสหภาพเรดวินเทอร์ก็พอใจมาก ส่วนเราเองก็เพลิดเพลินดี..."
10007080-76 = "ถึงจะไม่ค่อยมีเหตุการณ์ที่เราจะมอบเหรียญตราให้เด็กโรงเรียนอื่นบ่อยเท่าไร#nแต่คราวนี้เป็นกรณียกเว้นแล้วกัน"
10007080-81 = "โทโมเอะ!"
10007080-85 = "ค่ะ ท่านประธาน"
10007080-86 = "ขอแสดงความยินดีกับความสำเร็จในการสร้างสถานที่ท่องเที่ยวแห่งใหม่ขึ้นที่สหภาพเรดวินเทอร์..."
10007080-88 = "เราขอมอบ <เหรียญตราแรงงานหนวดขั้นที่ 1> และ <เหรียญตรามิตรภาพ> ให้กับสมาชิก#nชมรมพัฒนาออนเซ็น!"
10007080-95 = "เหรียญตราหนวดอะไรนะ...?"
10007080-96 = "ถือว่าเป็นของดีหรือเปล่าน่ะ?"
10007080-98 = "ถึงได้เหรียญตราแรงงานหนวดไปก็ยังไม่ดีใจงั้นเหรอ?"
10007080-99 = "ทำไมล่ะ? นี่เป็นเหรียญตราที่พวกชมรมผู้รับจ้างจะได้รับแค่ 7 ครั้งใน 1 ปีเลยนะ"
10007080-100 = "(กระซิบ) ท่านประธานคะ สถาบันเกเฮนน่าไม่มีการมอบเหรียญตราเหมือนกับทางสถาบัน#nสหภาพเรดวินเทอร์ของเราค่ะ"
10007080-101 = "ไม่รู้คุณค่าของเหรียญตรางั้นเหรอ?"
10007080-102 = "เพราะงั้นพวกนักเรียนของเกเฮนน่าถึงได้..."
10007080-103 = "ว่าแต่ว่าพวกเธอกำลังก่อสร้างอะไรที่นี่กันอยู่ล่ะ? <ออนเซ็น No.227> ก่อสร้างเสร็จแล้วไม่ใช่รึไง?"
10007080-104 = "อาจเป็นเพราะสายน้ำพุร้อนใต้ดินมีการเปลี่ยนแปลงไป ทำให้แรงดันน้ำในออนเซ็นอ่อนลง#nตั้งแต่เมื่อวาน..."
10007080-105 = "ถ้าปล่อยเอาไว้แบบนี้อาจจะไม่มีน้ำพุร้อนเหลือในออนเซ็นเลยก็ได้!"
10007080-106 = "ระ...เรื่องใหญ่เลยนะ ออนเซ็นที่ทุ่มเทแรงกายแรงใจสร้างขึ้นมากำลังจะเหือดแห้งไปงั้นเหรอ..."
10007080-107 = "แต่ว่าไม่ต้องห่วงหรอก หัวหน้าคาสุมิของเราน่ะ ไม่ว่าจะอยู่ในสถานการณ์ไหน เธอก็หาวิธีรับมือได้เสมอนั่นแหละ"
10007080-108 = "ตามข้อมูลที่หัวหน้าส่งมาให้เมื่อกี้..."
10007080-109 = "ที่ใต้ดินของสหภาพเรดวินเทอร์มีสายแมกม่าขนาดมหึมาซ่อนอยู่!"
10007080-110 = "ถ้าระเบิดสายแมกม่านี่ละก็ นอกจากจะเอาตาน้ำพุร้อนของ <ออนเซ็น No.227> กลับมาได้แล้ว แต่ยังจะสร้างออนเซ็นใหม่ๆ ได้ทั่วทั้งสหภาพเรดวินเทอร์เลยละ!"
10007080-111 = "อืม เรื่องนั้นก็เป็นความคิดที่ดีนะ"
10007080-112 = "ระเบิดสายแมกม่าแล้ว ตาน้ำพุร้อนก็จะกลับมา แถมยังสร้างออนเซ็นแห่งใหม่ได้อีก..."
10007080-116 = "เดี๋ยวนะ... เมื่อกี้ว่ายังไงนะ? จะทำอะไรนะ?"
10007080-117 = "ระเบิดไงล่ะ"
10007080-118 = "ระเบิดอะไรนะ?"
10007080-119 = "ก็สายแมกม่าที่อยู่ใต้พื้นดินของสหภาพเรดวินเทอร์น่ะสิ"
10007080-120 = "ถะ...ถ้างั้นโรงเรียนที่อยู่ข้างบนจะเป็นยังไง? เขตปกครองตนเองล่ะ? สำนักเลขาธิการของเราล่ะ?"
10007080-121 = "บางทีคงจะโดนถล่มจนหายไปเลยมั้ง...?"
10007080-122 = "แต่ไม่ต้องห่วงหรอกนะ พวกเราจะสร้างออนเซ็นขึ้นให้ใหม่เอง จะสร้างให้ใหญ่กว่า หรูหรากว่า#nออนเซ็นนี่หลายเท่าเลย!"
10007080-126 = "ไม่เป็นอะไร..."
10007080-128 = "จะไม่เป็นอะไรได้ยังไงกันเล่า!"
10007080-130 = "ทำไมถึงไม่ชอบล่ะ? นี่เป็นโอกาสที่จะได้สถานที่ท่องเที่ยวแห่งใหม่ฟรีๆ เลยนะ?"
10007080-131 = "ถ้าไม่มีสำนักเลขาธิการของเรา ถึงจะมีสถานที่พักผ่อนที่ยอดเยี่ยมแค่ไหนก็ไม่มีความหมายหรอก!"
10007080-132 = "โธ่เอ๊ย... แต่ถ้าไม่ทำแบบนี้ น้ำในออนเซ็น No.227 ก็จะแห้งหมดนะ!"
10007080-133 = "มันเรื่องที่เราต้องสนใจรึไง? ตอนนี้เราก็เหลืออดกับพวกห้องเรียนพิเศษที่กำลังหลงระเริงอยู่ด้วย!"
10007080-134 = "เลิกพัฒนาออนเซ็นเดี๋ยวนี้ หยุดซะ! เราจะรื้อถอนออนเซ็นนี่ตามที่วางแผนไว้ในตอนแรก!"
10007080-138 = "มารินะ! รีบไปขับ <ผู้กวาดล้าง No.1> ของเรามาเดี๋ยวนี้!"
10007080-140 = "ค่ะ ท่านประธาน"
10007080-141 = "จัดการทำลายให้หมด อย่าให้เหลือแม้แต่อิฐสักก้อนเดียว!"
10007080-143 = "โอ้ววว พวกเธอคิดจะขัดขวางการพัฒนาออนเซ็นงั้นเหรอ?!"
10007080-144 = "ช่วยไม่ได้นะ... ถ้าประธานของสหภาพเรดวินเทอร์ไม่ให้ความร่วมมือในการพัฒนาออนเซ็นละก็..."
10007080-146 = "ต่อให้ต้องบังคับ เราก็จะพัฒนาออนเซ็นต่อไป!"

[translation]
10007080-1 = "Episode 8;The Hot Springs Department's Conspiracy"
10007080-2 = "Trail near the Hot Springs Resort No. 227"
10007080-4 = "I followed Chinatsu to a trail outside the hot springs resort."
10007080-5 = "However, there were no signs of any students, let alone Chinatsu."
10007080-6 = "[s] \"I wonder where everyone went...\""
10007080-7 = "What are you looking for so diligently, Comrade?"
10007080-12 = "You'll catch a cold, walking around in practically nothing. "
10007080-13 = "Those who underestimate the winters at Red Winter Academy always pay the price."
10007080-14 = "[s] \"Look who's talking. You look colder than me...\""
10007080-15 = "What? Are you worried that I'll be cold?"
10007080-16 = "Heeheehee! Don't waste your time worrying about useless things, Comrade."
10007080-17 = "I am the student council president of Red Winter Academy, the Great Leader, the Beautifier of Lands..."
10007080-18 = "Uhhh..."
10007080-19 = "Anyway, I am someone magnificent in charge of all kinds of great positions!"
10007080-20 = "I can stand this cold even in short sleeves!"
10007080-21 = "A-A-"
10007080-22 = "Achoo!"
10007080-23 = "You'll catch a cold like that, Cherino. I wish you would at least wear a jacket."
10007080-24 = "Or would you like me to bring you some warm coffee milk?"
10007080-25 = "Ugh..."
10007080-26 = "Cease your pointless meddling, Tomoe! Didn't I already say that I don't feel cold at all?!"
10007080-27 = "However, I will have a warm cup of coffee milk. With lots of sugar!"
10007080-28 = "Yes, I will bring it right away."
10007080-32 = "[ns] \"You seem to be enjoying the hot springs more than I thought you would.\""
10007080-33 = "Mmm... I hate to admit it, but there's definitely a lot to enjoy in this hot springs resort. I can play all day and still not get tired of it."
10007080-34 = "In addition to the different types of baths, the lounge is fully equipped with entertainment such as table tennis and game machines. And when you get tired, you can just go back to the baths! "
10007080-35 = "I looked down on this facility because it was something the Spec Ops cheapskates built, but it's actually pretty good."
10007080-36 = "[s] \"Most of the facility was built by the Hot Springs Department, though.\""
10007080-37 = "Yeah, come to think of it, I also heard about that. So, the Gehenna students built this hot springs resort, right?"
10007080-38 = "Normally, the idiots of Gehenna who carried out construction in the Red Winter district without permission would be severely purged, but..."
10007080-39 = "They built a wonderful hot springs resort in such a short time. I am somewhat envious."
10007080-40 = "At least they would be more useful than the workers of the Labor Party! They strike more often than they work!"
10007080-41 = "How can I get the Hot Springs Department to join our academy?"
10007080-46 = "That's right! If I award them an honorary medal, wouldn't they be moved and pledge their allegiance to me? The First-Class Mustache Labor Medal should be good enough!"
10007080-47 = "If the Hot Springs Department transfers to Red Winter Academy..."
10007080-48 = "I'll make them build a large-class, private hot springs resort just for me, next to the existing hot springs resort!"
10007080-49 = "If I were to give a name to the newly built hot springs resort... The Mustache Hot Springs Resort!"
10007080-50 = "Since it's my own private hot springs resort, I can't forget to fill it with decorations that reflect my authority!"
10007080-51 = "A statue of a mustache spouting hot spring water, a stone lantern in the shape of a mustache, and also..."
10007080-56 = "*BOOM*"
10007080-57 = "Ahh! Wh-What was that noise? Is it another earthquake?"
10007080-64 = "Hahaha, sorry, I'm sorry. I didn't know there were people on this trail. We were doing some blasting work."
10007080-65 = "I-I haven't heard about any kind of construction! How dare you! Which club do you belong to?"
10007080-66 = "I will purge all the members!"
10007080-67 = "Huh? That's Gehenna Academy's emblem..."
10007080-68 = "Yep! We're Gehenna Academy's Hot Springs Department! We are here to develop hot springs!"
10007080-69 = "But who is this kid with a mustache?"
10007080-70 = "K-Kid?! I am the great Student Council President of Red Winter Federal Academy!"
10007080-71 = "More importantly, did you say the Hot Springs Department? Then are you the ones who built this hot springs resort?"
10007080-72 = "Yep, yep. Hot Springs Department, at your service."
10007080-73 = "We were a bit enthusiastic and ended up building a much bigger resort than originally planned..."
10007080-74 = "What do you think? It's pretty great, even in your opinion, right?"
10007080-75 = "Hmm, I hate to admit it, but it is a great hot springs resort. The students of Red Winter Academy seem to be satisfied, and I enjoyed it as well..."
10007080-76 = "I don't usually award medals to students from other schools, but I will make an exception this time."
10007080-81 = "Tomoe!"
10007080-85 = "Yes, President?"
10007080-86 = "In recognition of their achievement of building a new tourist attraction at Red Winter Academy..."
10007080-88 = "Award the First-Class Mustache Labor Medal and the Special Student Friendship Medal to Gehenna's Hot Springs Department!"
10007080-95 = "The what mustache what medal?"
10007080-96 = "Is it something good?"
10007080-98 = "Y-You're not happy after receiving the Mustache Labor Medal?"
10007080-99 = "Why? It's a medal that the Labor Party only receives like 7 times a year!"
10007080-100 = "*whisper* President, Gehenna Academy does not have the same reward system as Red Winter Federal Academy."
10007080-101 = "They don't know the value of medals?"
10007080-102 = "This is why the students of Gehenna..."
10007080-103 = "By the way, what kind of construction are you guys doing? Didn't you already finish?"
10007080-104 = "The hot springs' water veins may have changed course because the water pressure has started to decrease since yesterday..."
10007080-105 = "If things continue, the baths at the hot springs resort may dry out!"
10007080-106 = "Th-That's not good. We can't let the baths in the hot springs resort dry up."
10007080-107 = "But don't worry. Our President Kasumi always comes up with the best solution for any situation."
10007080-108 = "According to the information we just received from the president..."
10007080-109 = "A huge magma province is hidden underneath Red Winter Academy!"
10007080-110 = "Blowing up this province will not only bring back the water veins of the Hot Springs Resort No. 227, but it will also allow us to build a bunch of new hot springs throughout Red Winter Academy!"
10007080-111 = "Hmm, that's a good idea."
10007080-112 = "By blowing up the magma province, water veins are restored, and a new hot spring is built..."
10007080-116 = "Wait, back up. You're going to do what?"
10007080-117 = "We're gonna blow it up."
10007080-118 = "Blow what up?"
10007080-119 = "The magma province underneath Red Winter Academy."
10007080-120 = "Then what happens to the school above it? The district? Or my Secretariat?!"
10007080-121 = "...Ka-boom? Naturally?"
10007080-122 = "But don't worry. Instead, we'll build a new brand new hot springs resort. It'll be way bigger and better than this hot springs resort!"
10007080-126 = "There's no way..."
10007080-128 = "...that'd be okay!"
10007080-130 = "Why wouldn't it be? It's a chance to get a great resort for free."
10007080-131 = "No matter what kind of wonderful resort is built, it's meaningless without my Secretariat!"
10007080-132 = "Aww... But if we don't do this, the baths in the Hot Springs Resort No. 227 will dry up!"
10007080-133 = "I don't care! I was getting annoyed by the Former Institute Spec Ops guys showing off anyway!"
10007080-134 = "Stop the hot springs development! Stop! This hot springs resort will be demolished as planned!"
10007080-138 = "Marina! Bring me the Purginator No. 1 immediately!"
10007080-140 = "Yes, President."
10007080-141 = "I will purge it without leaving a single brick behind!"
10007080-143 = "Ugh, why is everyone trying to interfere with our hot springs development?!"
10007080-144 = "We have no other choice. If the president of Red Winter Academy won't cooperate peacefully..."
10007080-146 = "We'll just have to force them to!"

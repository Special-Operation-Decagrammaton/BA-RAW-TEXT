[translation]
10007080-1 = "第8話;溫泉開發部的陰謀"
10007080-2 = "227號溫泉浴場．附近的散步步道"
10007080-4 = "（一邊尋找千夏和其他人，來到了溫泉浴場外的散步步道）"
10007080-5 = "（但是別說是千夏，幾乎感覺不到其他學生們的氣息）"
10007080-6 = "[s]「大家都到哪去了呢……」"
10007080-7 = "那麼認真在找什麼呀，同志？"
10007080-12 = "穿那麼薄的衣服在附近走動，可是會感冒的喔？ "
10007080-13 = "小看赤冬聯邦學園的冬天的話，可是會吃不完兜著走。"
10007080-14 = "[s]「潔莉諾看起來更冷吧……沒問題嗎？」"
10007080-15 = "嗯？是在擔心咱會不會冷嗎？"
10007080-16 = "哼哼哼……那是無謂的擔心啊，同志。"
10007080-17 = "咱可是赤冬聯邦學園的學生會長、兼書記長、兼環境美化部部長……"
10007080-18 = "還有，那個……"
10007080-19 = "總之，是肩負各種重大職責的偉大人物！"
10007080-20 = "這點程度的寒冷……"
10007080-21 = "就算穿短袖也──"
10007080-22 = "……哈啾！"
10007080-23 = "再這樣下去會感冒的唷，潔莉諾醬。#n還是多穿點比較好……"
10007080-24 = "還是要幫您拿一杯溫暖的咖啡牛奶呢？"
10007080-25 = "別……"
10007080-26 = "別多管閒事，智惠！咱不是說咱一點也不冷嗎！"
10007080-27 = "……不過，溫熱的咖啡牛奶還是可以喝的。#n記得要放很多糖哦！"
10007080-28 = "好的，馬上為您準備。"
10007080-32 = "[ns]「看來你很享受溫泉呢，太好了。」"
10007080-33 = "唔呣，雖然不想承認……不過這個溫泉浴場確實很有趣。#n就算玩一整天都不會膩。"
10007080-34 = "除了各種主題的溫泉之外，桌球和遊戲機之類的休閒設施也很齊全。#n玩累了就再回去泡溫泉，這樣無限循環……"
10007080-35 = "雖然曾經瞧不起「227號特別班的貧窮學生們突然建造的設施」，不過確實還不錯。"
10007080-36 = "[s]「設施似乎大部分都是溫泉開發部建造的就是了。」"
10007080-37 = "啊啊，咱也聽說了。似乎是格黑娜的學生啊？"
10007080-38 = "依照校規，未經咱的許可就在赤冬自治區進行工程什麼的，#n一般來說是要嚴格肅清才對……"
10007080-39 = "但是短時間內就能蓋出如此了不起的溫泉浴場的能力，咱可是很想得到。"
10007080-40 = "……至少比那些從早到晚都在罷工的「工務部」的勞動者們有用多了。"
10007080-41 = "唔呣……該怎麼做才能把那個溫泉開發部挖角到赤冬聯邦學園呢……？"
10007080-46 = "對了！如果授予榮譽勛章的話，他們一定會感動地向咱宣誓效忠吧？#n「1級鬍鬚勞動勳章」應該夠吧！"
10007080-47 = "只要能把溫泉開發部編入赤冬學園……"
10007080-48 = "就可以在這附近，蓋一個咱專用且更大規模的溫泉浴場……！"
10007080-49 = "唔呣，真不錯……到了那個時候，就命名為「鬍鬚．溫泉浴場」吧！"
10007080-50 = "既然是咱專用的溫泉浴場，當然不能缺少能展現咱權威的裝飾！"
10007080-51 = "能流出溫泉水的鬍鬚銅像、鬍鬚形狀的燈籠，還有……"
10007080-56 = "（咚哐──！）"
10007080-57 = "噫，噫啊！？這是什麼聲音？又是地震嗎！？"
10007080-64 = "啊哈哈～抱歉抱歉！我沒想到會有人跑到這裡來！#n現在正好在進行引爆作業，要小心一點哦～"
10007080-65 = "你以為咱會允許那種事嗎！？#n竟敢未經咱的許可就擅自進行工程，到底是哪個社團的傢伙！？"
10007080-66 = "咱要把社團裡的所有人通通肅清！快老實報上社團所屬……嗯？"
10007080-67 = "格黑娜學園的校徽……？"
10007080-68 = "嗯，我們是格黑娜學園的溫泉開發部唷！#n我想你應該也知道，是來開發溫泉的！"
10007080-69 = "……話說，那個貼了鬍子的小不點是誰啊？"
10007080-70 = "你，你說誰是小不點！#n咱可是赤冬聯邦學園偉大的學生會長！"
10007080-71 = "話說回來……你說是溫泉開發部？#n所以蓋出這個溫泉浴場的就是你們嗎？"
10007080-72 = "沒錯沒錯！這個溫泉浴場是我們建設的哦～！"
10007080-73 = "只是不小心太認真，所以蓋的比想像中更大更豪華了……#n不過既然要蓋還是大一點好對吧！"
10007080-74 = "怎麼樣啊？會長也覺得是個很棒的溫泉浴場對吧？"
10007080-75 = "唔呣，雖然不想承認，但的確是很棒的溫泉浴場。#n赤冬聯邦學園的學生們似乎也很滿意，咱也多少享受了一下……"
10007080-76 = "雖然幾乎沒有將勳章授予其他學校的學生過，這次就算是例外吧。"
10007080-81 = "智惠！"
10007080-85 = "是的，潔莉諾會長。"
10007080-86 = "考量為赤冬聯邦學園建造新的觀光聖地之功績……"
10007080-88 = "在此授予格黑娜溫泉開發部#n「1級鬍鬚勞動勳章」和「特別友好勳章」！"
10007080-95 = "1級鬍鬚……為什麼？話說……"
10007080-96 = "勳章？那是什麼好東西嗎？"
10007080-98 = "得，得到鬍鬚勞動勳章居然沒有開心！？"
10007080-99 = "怎麼會？那可是工務部1年只能拿到7次的珍貴勳章啊？"
10007080-100 = "會長，格黑娜學園不像赤冬聯邦學園一樣有敘勳制度……"
10007080-101 = "……也就是說，他們不懂勳章的價值？"
10007080-102 = "難怪格黑娜的學生們會……"
10007080-103 = "話說回來，你們在這裡進行什麼工程？#n「227號溫泉浴場」的建設不是已經結束了嗎？"
10007080-104 = "那個啊，水脈不知道是不是出了什麼問題，從昨天開始浴室的水壓就變得很弱～"
10007080-105 = "再這樣下去的話，這周邊的溫泉可能會全部乾枯的哦！"
10007080-106 = "那，那還真糟糕……難得的溫泉居然會枯竭……"
10007080-107 = "但是別擔心！交給我們佳澄部長總會有辦法的！"
10007080-108 = "根據部長的情報，那個……"
10007080-109 = "赤冬聯邦學園的地下，似乎隱藏著巨大的岩漿地帶哦！"
10007080-110 = "只要一口氣引爆那個區域，別說是恢復「227號溫泉浴場」的水脈，#n甚至還能在整個赤冬建設一堆新的溫泉哦！這樣就諸事大吉了對吧！"
10007080-111 = "唔呣，是個不錯的想法啊。"
10007080-112 = "引爆岩漿地帶讓水脈恢復，還能蓋新的溫泉……"
10007080-116 = "……等等，你剛剛説什麼？你說要做什麼？"
10007080-117 = "要引爆。"
10007080-118 = "引爆什麼？"
10007080-119 = "赤冬的地下。"
10007080-120 = "那，那樣一來，在上面的學校會怎麼樣？這個自治區呢？咱的事務局呢？"
10007080-121 = "雖然不太確定……大概會灰飛煙滅吧？"
10007080-122 = "但是別擔心別擔心！作為代替，我們會建設新的溫泉浴場！#n比這個大好幾倍又豪華的那種哦！"
10007080-126 = "那……"
10007080-128 = "……那怎麼可以呢！？"
10007080-130 = "嗯？為什麼生氣了？可以免費的獲得很棒的度假勝地哦？"
10007080-131 = "就算有再怎麼棒的度假勝地，咱的事務局沒了的話不就沒有任何意義了嗎！"
10007080-132 = "咦咦～可是不那麼做的話，「227號溫泉浴場」的溫泉會枯竭的唷？#n溫泉跟事務局，到底哪邊比較重要啊？"
10007080-133 = "肯定是事務局啊！反正咱早就看舊校舍特別班的那些傢伙奢華的樣子不爽很久了！"
10007080-134 = "溫泉開發什麼的立刻中止，中止！這個溫泉浴場就按照最初的計畫拆除！"
10007080-138 = "瑪麗娜！立刻去把咱的「肅清君1號」開過來！"
10007080-140 = "是，會長。"
10007080-141 = "把那裡清理得一乾二淨，不留任何痕跡吧！"
10007080-143 = "咦～溫泉明明絕對比事務局重要的說～"
10007080-144 = "沒辦法了，既然你們不協助溫泉開發……"
10007080-146 = "只好強行讓開發繼續下去了！#n來吧來吧，開發時間到了！！"

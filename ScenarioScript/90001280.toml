[translation]
90001280-1 = "Episode 28;Tiphareth"
90001280-2 = "S-Sensei? Why would you want to do that...?"
90001280-3 = "Th-That is very mean to the person who built this facility! I...I do not like it!"
90001280-4 = "Sh-She's right. That second storage is the very reason for this place's existence. And even if I tried..."
90001280-6 = "...I don't think I'd be able to break it."
90001280-8 = "What? That's exactly why it'll be effective? What in the world are you saying...?"
90001280-15 = "Could it be...!"
90001280-19 = "K-Kei? What are you planning to do?"
90001280-21 = "(If that's what Sensei is thinking...!)"
90001280-28 = "Even so, are you serious?! With all the guns there are in Kivotos, you want me to do this completely unarmed?"
90001280-29 = "*sigh* Poor me..."
90001280-35 = "Anyways, what are you doing?! Tiphareth, or whatever your name was! "
90001280-36 = "Your seeds are in danger, you know!"
90001280-38 = "Wh-What...are they...doing?"
90001280-39 = "I have no clue..."
90001280-40 = "Well, I suppose that's what they call \"beating a dead horse\"!"
90001280-42 = "And they believe that beating a horse will open the door? Aren't they being too naive?"
90001280-43 = "Even if they were to open the door, what is their objective? To steal seeds?"
90001280-44 = "This is why I don't understand the foolishness of living beings. They have no clue what they're doing, nor what it'll lead to..."
90001280-55 = "?!?!"
90001280-57 = "Wh-What? What's wrong, Ein?"
90001280-58 = "T-Tiphy sent us a message...!"
90001280-59 = "\"Threat to second storage detected.\""
90001280-60 = "\"Resource distribution adjustments are necessary.\""
90001280-61 = "\"Allocating all power...to second storage defense\"?!"
90001280-62 = "So it's going to install a septum, readjust temperature and humidity to secure the storage's safety..."
90001280-63 = "And in order to do that, it plans to cease the release of the nerve agent?!"
90001280-66 = "Aah?!"
90001280-67 = "That surprised me... It almost short-circuited this body as well. But more importantly..."
90001280-68 = "...As expected. The gas emission stopped."
90001280-69 = "[ns] \"Great job, Kei!\""
90001280-70 = "..."
90001280-71 = "No need for praise. I didn't do much."
90001280-72 = "Huh? I...am beginning to regain my strength as well."
90001280-78 = "!!!"
90001280-79 = "Momoi! Midori! Yuzu! Everyone! Are you okay?"
90001280-82 = "Mmm...wanna sleep more... Don't wake me up..."
90001280-83 = "Huh...? Sensei? Aris...?"
90001280-87 = "Ugh... What happened?"
90001280-88 = "Uh, what just happened...?"
90001280-89 = "I'm not sure if this statement is appropriate given the current circumstances and the level of danger."
90001280-91 = "But I slept very well. I can say that right now, I, Asuma Toki, am invincible."
90001280-93 = "Sensei... Are you okay? I think I fainted..."
90001280-94 = "My status is back to normal! I am in perfect condition! "
90001280-96 = "[ns] \"I'm glad everyone's safe. So what happened was...\""
90001280-105 = "...I'm sorry."
90001280-106 = "This is all my fault. Because of me..."
90001280-107 = "If I... If only I hadn't insisted on letting Tiphareth preserve the seeds..."
90001280-108 = "Ugh..."
90001280-112 = "..."
90001280-113 = "Return to your senses, Sof!"
90001280-120 = "A-Ack?!"
90001280-121 = "Ohr...?"
90001280-122 = "Stop that whimpering, Sof. Nothing is yet over!"
90001280-123 = "Above all, we believe in you, Sof. Ein, Elder Sister, and Tiphareth. Even myself."
90001280-124 = "Mm, well. I cannot speak for the other prophets, but they feel the same way. Likely."
90001280-125 = "You really had to ruin it with the \"likely\"..."
90001280-126 = "And above all, Sof, if you say that, then Tiphareth's wish and decision will all be in vain!"
90001280-127 = "But..."
90001280-128 = "I-I-I-I-I think we can still...do what we can do. "
90001280-129 = "We...We will help you. However we can. B-Because, that's why we're here...right?"
90001280-131 = "She is correct, Sof. It is not our place to judge one's superiority or inferiority to another."
90001280-132 = "Harmony cannot be defined as uniformity and uncritical conformity. Such conditions would be closer to coercion, oppression, and violence."
90001280-133 = "Rather, harmony is compromise. For each individual to seek agreement within their own terms."
90001280-134 = "Without such respect, we cannot proceed as one."
90001280-136 = "An individual's responsibility is the responsibility of the whole. The happiness of the whole is individual happiness."
90001280-137 = "Elder Sister..."
90001280-138 = "Uwaaah...!"
90001280-139 = "Strength is not found in isolation. Whether living or conscious."
90001280-140 = "Our duty is to lend an aiding hand to the suffering."
90001280-141 = "...Perhaps we could scrutinize this with malicious intent and label it as a mistake derived from Tiphareth and Sof's actions."
90001280-142 = "Even then, we exist to support such mistakes."
90001280-143 = "Therefore, Ein? Would you please commune with Tiphareth?"
90001280-144 = "Y-Yes! Elder Sister!"
90001280-145 = "Tiphy... I'm sorry. Please listen..."
90001280-146 = "Those people aren't trying to ruin your seeds. They're...they're just pretending!"
90001280-147 = "They're like...mean, grumpy people who are trying to trick you!"
90001280-148 = "That's why, Tiphy, you don't need to redirect your resources."
90001280-149 = "But if those people don't leave Tiphy alone, even we don't know what will happen..."
90001280-150 = "We want to protect your precious seeds too, Tiphy. That's why we have to..."
90001280-151 = "...very politely send them back to where they were."
90001280-155 = "Please, Tiphy... We'll also help you as much as we can..."
90001280-164 = "...Thus, Tiphareth follows its course. Shall we entrust this to its will? Sof?"
90001280-165 = "Yes... Thank you, everyone..."
90001280-166 = "Yes, yes, yes! Now, now, let's not be so dreary. Such things happen, so simply consider this a favor owed."
90001280-167 = "O-Ohr... You sounded like a human just now... Ehehe..."
90001280-168 = "Blech?!"
90001280-169 = "Um, this leads to my next concern. This might sound odd, but I want us to make some other preparations as well."
90001280-170 = "Other preparations?"
90001280-171 = "What...kind?"
90001280-174 = "Y-You're saying that...!"
90001280-175 = "...I know. It's rather shameless of me, but..."
90001280-176 = "..."
90001280-177 = "Well, it's fine, is it not?"
90001280-178 = "It's...fine?!"
90001280-179 = "Regardless of such semantics, do you not remember your own words, Sof?"
90001280-180 = "You once said, \"We might have to consider making Tiphareth retreat to the Steel Continent.\""
90001280-181 = "Even from the perspective of conserving forces, recovering Tiphareth seems to be the correct course of action."
90001280-183 = "Ah...! N-Now that I think about it... I was supposed to be in charge of that...! I-I'm sorry, Sof...!"
90001280-184 = "No, I'm the one who's sorry..."
90001280-188 = "Therefore, shame does not exist here! This is still as we planned, is it not?"
90001280-189 = "Well, I suppose in an ideal world, we wouldn't have gotten to this point!"
90001280-190 = "...Thank you, everyone. I just want to say..."
90001280-191 = "...With all of us together...this feels really nice."
90001280-192 = "Ehehe..."
90001280-194 = "There, there! Cease this embarrassing speech, and let us work!"
90001280-195 = "We will force those pests to face...the true terror of Tiphareth!"
90001280-200 = "Wh-What happened?"
90001280-204 = "Is this...? A signal from a new prophet? \"Tiphareth\"...?"
90001280-205 = "Everyone! Evacuate!"
90001280-207 = "Beginning evacuation! This way!"
90001280-208 = "Understood! Sensei, come this way!"
90001280-210 = "[ns] \"Come what may, safety is our top priority, everyone!\""

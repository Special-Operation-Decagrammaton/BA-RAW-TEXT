[translation]
90001280-1 = "第28話;提法瑞特"
90001280-2 = "老，老師？為什麼突然……？"
90001280-3 = "那樣會很對不起這座設施的建造者……#n愛麗絲……不喜歡那樣……！"
90001280-4 = "我，我也有同感。這座設施存在的意義，不就是為了守護第2保管所嗎？#n而且就算我做了什麼……"
90001280-6 = "好像也不會有任何改變……"
90001280-8 = "咦？就是因為這樣才有效果？#n那又是什麼意思……？"
90001280-15 = "難道說……！"
90001280-19 = "K，Kei？你要做什麼？"
90001280-21 = "（如果老師的想法沒錯的話……！）"
90001280-28 = "這也還是太過分了吧！#n在奇普托斯連把槍都不給，就要求我做這種事……！"
90001280-29 = "唉，我真命苦……"
90001280-35 = "那個叫提法瑞特還是什麼的！聽得見我說話吧！"
90001280-36 = "你的種子們可能會有危險哦！"
90001280-38 = "那，那些人……現在在做什麼……呢？"
90001280-39 = "完全看不懂……"
90001280-40 = "哎呀，那種行為就叫做「對牛彈琴」吧！"
90001280-42 = "難道他以為說那種話，提法瑞特就會開門嗎？#n未免也太天真了吧？"
90001280-43 = "況且就算門真的開了，他們又能做什麼呢？#n難不成是想把種子帶回去？"
90001280-44 = "所以我才會說生命體的愚蠢實在是無法理解。#n搞不清楚自己在做什麼，也不知道會引發什麼後果──"
90001280-55 = "！？！？"
90001280-57 = "什，什麼？怎麼了，Ain！？"
90001280-58 = "提，提法醬傳訊息來了……！"
90001280-59 = "「偵測到針對第2保管所的危險行為」"
90001280-60 = "「判斷需要重新分配資源」"
90001280-61 = "「將設施的所有動力……分配至第2保管所的防禦系統」？？？"
90001280-62 = "也就是要設置隔離牆、重新調整溫濕度，藉此確保保管所內部的安全性。#n然後……"
90001280-63 = "為了達到預期的結果……還會停止排放神經促效劑！？"
90001280-66 = "唔哇！？"
90001280-67 = "嚇我一跳……連我都差點短路了。#n話說回來……"
90001280-68 = "……氣體果然停止排放了呢。"
90001280-69 = "[ns]「做得好，Kei！」"
90001280-70 = "……"
90001280-71 = "這點小事不算什麼。"
90001280-72 = "咦？愛麗絲也感覺……好像漸漸恢復了。"
90001280-78 = "！！！"
90001280-79 = "桃井！綠！柚子！還有大家都沒事嗎？"
90001280-82 = "呼喵……我還要繼續睡……不要吵醒我……"
90001280-83 = "咦……老師？愛麗絲醬……？"
90001280-87 = "唔……發生什麼事了？"
90001280-88 = "咦，剛才究竟……？"
90001280-89 = "以目前的狀況和危險程度，不曉得說這種話恰不恰當──"
90001280-91 = "不過我睡得很好。#n現在的飛鳥馬季堪稱無敵。"
90001280-93 = "老師……你還好嗎？#n感覺剛才意識突然斷線了……"
90001280-94 = "愛麗絲，完全復活了！狀態全滿！"
90001280-96 = "[ns]「幸好大家都沒事。事情是這樣的──」"
90001280-105 = "……對不起。"
90001280-106 = "這都是我的責任。#n都是因為我……"
90001280-107 = "要是當初沒有依照提法瑞特的要求，做出保管種子的決定的話……"
90001280-108 = "唔唔……！"
90001280-112 = "……"
90001280-113 = "振作一點，Soph！！！"
90001280-120 = "呀，呀啊！？"
90001280-121 = "Aur……？"
90001280-122 = "Soph你不需要這樣。#n事情還沒有結束。"
90001280-123 = "我們大家都相信Soph。#nAin也是，我也是……姐姐大人和提法瑞特也都一樣。"
90001280-124 = "唔嗯，雖然不清楚其他預言者是怎麼想的……不過應該也會相信你的。大概吧。"
90001280-125 = "還要補一個大概哦……"
90001280-126 = "況且如果Soph你這麼說，提法瑞特的決定和意志又算什麼呢？"
90001280-127 = "可是……"
90001280-128 = "我，我我我，我覺得只要，盡力去做現在能做的事……就可以了。"
90001280-129 = "我，我們會幫忙的。#n我們，就是為了這個而存在的……不是嗎……？"
90001280-131 = "是啊，Soph。#n我們之所以在這裡，不是為了定義孰優孰劣。"
90001280-132 = "所謂的和諧，並不是要所有人都變得整齊劃一，身處安排好的位子上。#n那樣反而更接近強迫、壓制，甚至能算是一種暴力。"
90001280-133 = "真正的和諧是大家都以自己的樣貌共存，並摸索出能夠互相兼容的平衡點。"
90001280-134 = "假如不尊重彼此，是無法一起向前邁進的。"
90001280-136 = "從這個角度來說，個人的責任即是眾人的責任，眾人的喜悅即是個人的喜悅。"
90001280-137 = "姐姐大人……"
90001280-138 = "唔……！"
90001280-139 = "沒有人能獨自變強。#n無論生命體還是意識體皆是如此。"
90001280-140 = "如果有人正遭遇困難，我們理當向其伸出援手。"
90001280-141 = "即便將這一切惡意地解讀為提法瑞特和Soph的疏失──也不會有所改變。"
90001280-142 = "因為我們之所以身處此地，就是為了成為彼此的後盾。"
90001280-143 = "所以Ain，可以和提法瑞特談談嗎？"
90001280-144 = "是，是！姐姐大人！"
90001280-145 = "提法醬……對不起。請你聽我說……"
90001280-146 = "那些人沒有要破壞提法醬的種子……只是假裝要那麼做而已。"
90001280-147 = "從某個角度來說……他們只是一群想要欺騙提法醬的壞傢伙……！"
90001280-148 = "所以……提法醬不用把資源集中到那裡去沒關係。"
90001280-149 = "不過……如果那些人繼續糾纏提法醬的話，不知道會發生什麼事……"
90001280-150 = "所以提法醬。#n假如你想要保護珍貴的種子的話……請一定要鄭重地……"
90001280-151 = "將那些人送回原本的地方。"
90001280-155 = "拜託了，提法醬……#n我們也會盡全力幫忙的……"
90001280-164 = "……提法瑞特開始正常運作了呢。#n那麼剩下的事就交給它吧，Soph？"
90001280-165 = "嗯……大家，謝謝你們。"
90001280-166 = "好好好！那些會讓氣氛沉悶的喪氣話就到此為止！#n天有不測風雲！活著難免會遇到這種事的嘛！"
90001280-167 = "A，Aur……#n你剛才那樣有點像人類呢……耶嘿嘿……"
90001280-168 = "呃啊！？"
90001280-169 = "那個，就是……#n雖然聽起來可能有點奇怪，不過再稍微做點其他準備會不會比較好……"
90001280-170 = "其他準備？"
90001280-171 = "是指……什麼呢？"
90001280-174 = "那，那是……！"
90001280-175 = "……嗯。#n我也知道自己現在沒有臉說這種話，但是……"
90001280-176 = "……"
90001280-177 = "其實也沒什麼不好吧？"
90001280-178 = "沒關係……嗎！？！？"
90001280-179 = "這不是有沒有關係的問題……Soph不是也說過嗎？"
90001280-180 = "「為了以防萬一，必須考慮到讓提法瑞特撤退到鋼鐵大陸的方案。」"
90001280-181 = "考慮到戰力儲備，回收提法瑞特也是合理的判斷。"
90001280-183 = "啊……！這，這麼說來……那件事之前好像說要由我負責……！#n對，對不起，Soph……！"
90001280-184 = "沒關係，該道歉的人是我才對……"
90001280-188 = "先別說那些道不道歉的話了，我們原本就說好要這麼做了不是嗎？"
90001280-189 = "當然最好還是別發生那種事就是了。"
90001280-190 = "……大家，謝謝你們。#n這些話我只在這裡說……"
90001280-191 = "能跟大家在一起……真的太好了。"
90001280-192 = "耶嘿嘿……"
90001280-194 = "停停停！這種肉麻的話就到此為止，接下來可要來真的了！"
90001280-195 = "就讓他們好好見識見識……提法瑞特的可怕之處吧！"
90001280-200 = "怎，怎麼了！？"
90001280-204 = "這是……新預言者的信號？#n「提法瑞特」……？"
90001280-205 = "！！！#n大家，快離開這裡！"
90001280-207 = "我來開路！"
90001280-208 = "嗯！老師，往這邊！"
90001280-210 = "[ns]「不知道會出現什麼東西，大家小心一點！」"

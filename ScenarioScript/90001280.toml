[translation]
90001280-1 = "ตอนที่ 28;ทิฟาเร็ธ"
90001280-2 = "คะ... คุณครู? ทำไมจู่ๆ ถึงพูดอย่างนั้นล่ะคะ...?"
90001280-3 = "แบบนั้นมันเป็นการเสียมารยาทต่อคนที่สร้างคลังขึ้นมานะคะ อาริสึ... ไม่ชอบแบบนี้ค่ะ...!"
90001280-4 = "ชะ... ใช่ค่ะ สิ่งปลูกสร้างนี้มีเหตุผลในการสร้างขึ้นมานะคะ และต่อให้ฉันทำอะไร..."
90001280-6 = "ก็คงไม่เกิดอะไรขึ้นมาหรอกค่ะ..."
90001280-8 = "คะ? เพราะเป็นอย่างนั้น ก็เลยยิ่งดีงั้นเหรอคะ? หมายความว่ายังไง...?"
90001280-15 = "หรือว่า...!"
90001280-19 = "คะ... เคย์? จะทำอะไรคะ?"
90001280-21 = "(ถ้าสิ่งที่คุณครูคิดเป็นอย่างนั้นละก็...!)"
90001280-28 = "แต่ถึงจะอย่างนั้นก็เถอะ! ฉันต้องมาทำเรื่องแบบนี้ในคิโวทอสทั้งๆ ที่ไม่มีปืนเหรอเนี่ย...!"
90001280-29 = "เฮ้อ แล้วดูสภาพฉันสิ..."
90001280-35 = "แต่ก็เอาเถอะ ได้ยินฉันมั้ยคะ! ทิฟารงทิฟาเร็ธอะไรนั่นน่ะ! "
90001280-36 = "ฉันจะขอแตะต้องเมล็ดพันธุ์ของคุณนะคะ!"
90001280-38 = "คะ... คนพวกนั้น... ทำอะไรกัน... เหรอคะ?"
90001280-39 = "ไม่เห็นจะเข้าใจเลย..."
90001280-40 = "แบบนี้ละที่เรียกกันว่าเอามือเด็กมาเคาะประตู!"
90001280-42 = "ไร้เดียงสาเสียจริง คิดว่าทิฟาเร็ธจะเปิดประตูให้งั้นเหรอคะ?"
90001280-43 = "แต่ถึงประตูจะเปิดออก แต่ก็ไม่รู้เลยนะคะว่าทางนั้นคิดจะทำอะไรกันแน่ หรือว่าจะขโมยเมล็ดพันธุ์#nกลับไปคะ?"
90001280-44 = "แบบนี้ละค่ะถึงพูดกันว่าความโง่เขลาของสิ่งมีชีวิตนั้นยากแท้หยั่งถึง ไม่รู้ด้วยซ้ำว่าตัวเองกำลังทำ#nอะไรอยู่ แล้วก็ไม่รู้ว่าผลที่ตามมาจะเป็นยังไง..."
90001280-55 = "?!?!"
90001280-57 = "อะ... อะไรกัน? เกิดเรื่องอะไรน่ะ ไอน์?!"
90001280-58 = "ทะ... ทิฟาจังกำลังส่งข้อความเข้ามาค่ะ...!"
90001280-59 = "<ตรวจพบพฤติกรรมเสี่ยงที่มีต่อคลังเก็บเมล็ดพันธุ์ที่ 2>"
90001280-60 = "<ปรับปรุงการกระจายทรัพยากรใหม่>"
90001280-61 = "<จัดสรรพลังงานทั้งหมดของสิ่งปลูกสร้าง... มาเพื่อป้องกันคลังเก็บเมล็ดพันธุ์ที่ 2???>"
90001280-62 = "ก็เลยจะติดตั้งแผงกั้น แล้วปรับอุณหภูมิและความชื้นเพื่อความปลอดภัยภายในคลัง..."
90001280-63 = "จากนั้นก็จะ... สกัดการปล่อยสารออกฤทธิ์ต่อระบบประสาทเหรอคะ?!?!"
90001280-66 = "อ๊ะ?!"
90001280-67 = "ตกใจหมดเลย... ฉันเกือบโดนช็อตไปด้วยแล้ว แต่ที่สำคัญกว่านั้น..."
90001280-68 = "ว่าแล้วเชียว... เริ่มหยุดการปล่อยแก๊สแล้วค่ะ"
90001280-69 = "[ns] \"เก่งมากเลย เคย์\""
90001280-70 = "..."
90001280-71 = "เรื่องเล็กๆ น้อยๆ ค่ะ แค่นี้ไม่เหนือบ่ากว่าแรงฉันหรอก"
90001280-72 = "เอ๋? อาริสึก็... เหมือนจะค่อยๆ ได้พลังกลับมาแล้วค่ะ"
90001280-78 = "!!!"
90001280-79 = "โมโมอิ! มิโดริ! ยูสึ! แล้วก็ทุกคน! เป็นยังไงกันบ้างคะ?"
90001280-82 = "งืม... ขอนอนอีกหน่อยนะ... อย่ามาปลุกกันเลย..."
90001280-83 = "เอ๋...? คุณครู? อาริสึจัง...?"
90001280-87 = "อึก... เกิดเรื่องอะไรขึ้นงั้นเหรอ?"
90001280-88 = "เอ๋? เมื่อกี้ฉันยัง...?"
90001280-89 = "ดูจากสถานการณ์และระดับความเสี่ยงตอนนี้แล้ว ฉันไม่แน่ใจว่าถ้าพูดแบบนี้ไปจะเหมาะสมหรือเปล่า"
90001280-91 = "แต่ฉันได้นอนเต็มอิ่มเลยค่ะ เรียกได้ว่าอะซุมะ โทคิในตอนนี้เป็นเวอร์ชันที่ไร้เทียมทานเลยละ"
90001280-93 = "แล้วคุณครู... เป็นยังไงบ้างคะ? ฉันรู้สึกเหมือนตัวเองหมดสติไปเลย..."
90001280-94 = "อาริสึฟื้นคืนชีพแล้วค่ะ! ตอนนี้ค่า HP เต็มหลอดเลยค่ะ! "
90001280-96 = "[ns] \"โล่งอกไปทีนะทุกคน ส่วนเรื่องที่เกิดขึ้นเมื่อกี้น่ะ...\""
90001280-105 = "ขอโทษนะ..."
90001280-106 = "ทั้งหมดคือความรับผิดชอบของฉันแท้ๆ ฉันผิดเอง..."
90001280-107 = "ถ้าฉัน... ถ้าฉันไม่ตัดสินใจที่จะเก็บเมล็ดพันธุ์ไว้ตามเจตจำนงของทิฟาเร็ธ..."
90001280-108 = "อึก...!"
90001280-112 = "..."
90001280-113 = "ตั้งสติไว้ค่ะ ซอฟ!!!"
90001280-120 = "วะ... ว้าย?!"
90001280-121 = "ออร์...?"
90001280-122 = "แบบนั้นไม่ได้สิคะ ซอฟ! มันยังไม่จบสักหน่อยค่ะ"
90001280-123 = "เหนือสิ่งอื่นใด พวกเราเชื่อใจซอฟนะ ทั้งไอน์ ฉัน พี่มัลคูธ แล้วก็ทิฟาเร็ธด้วยค่ะ"
90001280-124 = "อืม ถึงจะยังไม่รู้ว่าผู้เลื่อมใสตนอื่นๆ มีความคิดยังไง แต่พวกเขาก็คงเชื่อใจเหมือนกันค่ะ น่าจะนะคะ"
90001280-125 = "น่าจะงั้นเหรอ..."
90001280-126 = "และเหนือสิ่งอื่นใด ถ้าซอฟพูดขอโทษอย่างนั้น งั้นการตัดสินใจของทิฟาเร็ธก็ไร้ค่าสิคะ!"
90001280-127 = "แต่ว่า..."
90001280-128 = "ฉะ... ฉะฉะฉะ... ฉันคิดว่าเรายังทำสิ่งที่เราทำได้... ได้อยู่ค่ะ "
90001280-129 = "พวกเรา... พวกเราจะช่วยเองค่ะ ให้ทำอะไรดีล่ะคะ? พวกเรามีตัวตนกันอยู่... ก็เพื่อสิ่งนี้ไม่ใช่เหรอคะ...?"
90001280-131 = "ใช่ค่ะ ซอฟ พวกเราไม่ได้มาอยู่ที่นี่เพื่อนิยามว่าใครเก่งหรืออ่อนด้อยกว่ากันนะคะ"
90001280-132 = "แนวคิดเรื่องความปรองดองไม่ได้หมายถึงการที่ทุกคนต้องมีเพียงรูปแบบเดียวและยืนเคียงข้างกันใน#nสถานที่เดียวกันหรอกค่ะ แบบนั้นน่ะมันใกล้เคียงกับการบังคับ การกดขี่ และความรุนแรงมากกว่าค่ะ"
90001280-133 = "ความปรองดองคือการกระทำร่วมกันตามรูปแบบของแต่ละคน ในขณะเดียวกันก็หาขอบเขตที่จะรวม#nเป็นอันหนึ่งอันเดียวกันค่ะ"
90001280-134 = "หากเราไม่เคารพกันและกัน เราก็ก้าวไปข้างหน้าด้วยกันไม่ได้หรอกค่ะ"
90001280-136 = "และในแง่นั้น ความรับผิดชอบของคนคนหนึ่งก็คือความรับผิดชอบของทุกคน และความสุขของทุกคน#nก็คือความสุขของคนคนหนึ่งค่ะ"
90001280-137 = "พี่มัลคูธ..."
90001280-138 = "อึก...!"
90001280-139 = "ไม่มีใครเข้มแข็งได้เพียงลำพังค่ะ ไม่ว่าจะเป็นสิ่งมีชีวิตหรือจิตสำนึกที่มีชีวิตก็ตาม"
90001280-140 = "หากใครกำลังทุกข์ทรมาน เราก็ควรยื่นมือเข้าช่วยเหลือค่ะ"
90001280-141 = "ต่อให้จะวิเคราะห์ทุกอย่างด้วยเจตนาร้ายแล้วสรุปว่านี่คือความผิดพลาดของทิฟาเร็ธกับซอฟ"
90001280-142 = "แต่พวกเราก็อยู่ที่นี่เพื่อสนับสนุนค่ะ"
90001280-143 = "ไอน์ ถ้างั้นก็ช่วยไปคุยกับทิฟาเร็ธให้หน่อยได้มั้ยคะ?"
90001280-144 = "ค่ะ ค่ะ! พี่มัลคูธ!"
90001280-145 = "ทิฟาจัง... ขอโทษนะคะ ช่วยตั้งใจฟังด้วยค่ะ..."
90001280-146 = "คนพวกนั้นไม่ได้พยายามทำลายเมล็ดพันธุ์ของทิฟาจังหรอกค่ะ พวกเขาก็แค่... แสร้งทำบางอย่างค่ะ"
90001280-147 = "ในบางมุม... พวกนั้นอาจเป็นจอมกลั่นแกล้งที่ตั้งใจจะหลอกทิฟาจังก็ได้ค่ะ...!"
90001280-148 = "เพราะงั้น... ทิฟาจังก็ไม่จำเป็นต้องระดมทรัพยากรไปที่นั่นที่เดียวหรอกค่ะ"
90001280-149 = "แต่ถ้าคนพวกนั้น... ยังคงตามแกล้งทิฟาจังไม่เลิก ฉันก็ไม่รู้ว่าจะเกิดเรื่องอะไรค่ะ..."
90001280-150 = "เพราะงั้น ทิฟาจังคะ ถ้าอยากปกป้องเมล็ดพันธุ์ที่มีค่า... ก็ต้อง..."
90001280-151 = "ส่งคนพวกนั้นกลับไปยังที่ที่จากมา... อย่างอ่อนน้อมค่ะ"
90001280-155 = "ขอร้องละค่ะ ทิฟาจัง... พวกเราก็จะช่วยอย่างสุดความสามารถค่ะ..."
90001280-164 = "ทิฟาเร็ธเริ่มเคลื่อนไหวตามปกติแล้วสินะคะ... งั้นที่เหลือก็ปล่อยให้จัดการเองได้ใช่มั้ยคะ? ว่าไงคะ ซอฟ?"
90001280-165 = "อื้อ... ขอบใจนะทุกคน..."
90001280-166 = "เอาอีกแล้ว! อย่าพูดอะไรเหมือนคนอ่อนแอสิคะ เสียบรรยากาศหมด! ฉันไม่ชินกับซอฟที่อ่อนแอนะคะ! คนเราเกิดมา จะเจอเรื่องแบบนี้บ้างก็ไม่เป็นไรหรอกค่ะ!"
90001280-167 = "มะ... เมื่อกี้ออร์... พูดเหมือนเป็นมนุษย์เลยค่ะ... แหะๆๆ..."
90001280-168 = "เหวอ?!"
90001280-169 = "คือ... นี่อาจฟังดูแปลกๆ ก็ได้... แต่ฉันอยากให้เตรียมอย่างอื่นเผื่อไว้ด้วยน่ะ"
90001280-170 = "เตรียมอย่างอื่นงั้นเหรอคะ?"
90001280-171 = "หมายถึง... อะไรคะ?"
90001280-174 = "มะ... หมายความว่า...!"
90001280-175 = "อื้อ... ที่ฉันพูดคำแบบนี้ตอนนี้ ฉันรู้ดีว่ามันน่าละอาย..."
90001280-176 = "..."
90001280-177 = "ก็ดูไม่เลวอยู่นะคะ?"
90001280-178 = "จะไม่เป็นไร... เหรอคะ?!?!"
90001280-179 = "ถึงจะไม่รู้ว่าจะโอเคหรือเปล่า... แต่นี่ก็เป็นสิ่งที่ซอฟก็พูดไปแล้วนี่คะ?"
90001280-180 = "ที่บอกว่า <ในกรณีฉุกเฉิน เราก็ต้องคิดแผนการที่จะให้ทิฟาเร็ธล่าถอยไปยังดินแดนเหล็กกล้าด้วย> ไงคะ"
90001280-181 = "ในแง่ของการรักษาพลังงาน การเรียกทิฟาเร็ธกลับคืนมาก็เป็นการตัดสินใจที่ถูกต้องด้วยค่ะ"
90001280-183 = "อ๊ะ...! จะ... จะว่าไปแล้ว... ฉันเป็นคนรับผิดชอบเรื่องนั้นนี่คะ...! ขะ... ขอโทษค่ะ ซอฟ...!"
90001280-184 = "ไม่หรอก ฉันต่างหากที่ต้องขอโทษ..."
90001280-188 = "เอาเถอะ ฉันว่าไม่ต้องมาพูดว่าละอายใจหรืออะไรหรอกค่ะ นั่นเป็นสิ่งที่พวกเราจะทำตั้งแต่แรกอยู่แล้ว ไม่ใช่เหรอคะ?"
90001280-189 = "แน่นอนว่าถ้าไม่เกิดเรื่องแบบนั้นก็จะดีที่สุด แต่ก็ช่วยไม่ได้ค่ะ"
90001280-190 = "ขอบคุณนะ ทุกคน... ฉันจะพูดแบบนี้แค่ที่นี่เท่านั้น..."
90001280-191 = "พอพวกเราอยู่ด้วยกันแบบนี้... มันดีจังเลยนะ"
90001280-192 = "แหะๆๆ..."
90001280-194 = "เอาละๆ! หยุดพูดอะไรน่าอาย แล้วจากนี้มาทำให้ถูกต้องกันเถอะค่ะ!"
90001280-195 = "เราต้องแสดงความน่ากลัวที่แท้จริงของทิฟาเร็ธ... ออกมาให้เห็นกันชัดๆ ไปเลยค่ะ!"
90001280-200 = "อะ... อะไรกันคะ?!"
90001280-204 = "นี่มัน...? สัญญาณของผู้เลื่อมใสตนใหม่? <ทิฟาเร็ธ> งั้นเหรอ...?"
90001280-205 = "ทุกคนออกไปจากตรงนี้!!!!"
90001280-207 = "ฉันจะช่วยอพยพเองค่ะ!"
90001280-208 = "อื้อ! คุณครู มาทางนี้ค่ะ!"
90001280-210 = "[ns] \"ถึงจะไม่รู้ว่าจะเกิดอะไรขึ้น แต่ก็ระวังกันด้วยนะ!\""

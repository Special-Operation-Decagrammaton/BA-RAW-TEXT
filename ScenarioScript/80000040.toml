[translation]
80000040-1 = "A Girl's Sincerity Never Fades"
80000040-3 = "I received a late call from Juri on Valentine's Day night."
80000040-4 = "Sensei, can we meet tonight for a bit? If you don't mind, that is."
80000040-5 = "I-I hope it's not a hassle...but I made some chocolate just for you."
80000040-6 = "Actually, you know what? It's probably a huge hassle.#nPlease just forget I said anything..."
80000040-7 = "[s] \"You made me chocolate?! I'll be there right away!\""
80000040-8 = "Y-You will?"
80000040-9 = "I-I'll be waiting then!"
80000040-13 = "Gehenna Institute 3"
80000040-14 = "I found Juri in a Gehenna classroom."
80000040-15 = "Oh, Sensei!"
80000040-16 = "U-Um...! You got here so quickly."
80000040-17 = "[s] \"I rushed over as soon as I got your message.\""
80000040-18 = "I didn't expect you to be so excited."
80000040-19 = "I-It's just ordinary chocolate..."
80000040-20 = "It makes me really happy but now I'm kind of shy."
80000040-21 = "Especially since it's chocolate I made..."
80000040-22 = "[s] \"I'm excited because it's from you.\""
80000040-23 = "Really? Th-Thanks, Sensei."
80000040-24 = "Well, here's your chocolate!"
80000040-29 = "[ns] \"Wow! Thank you Juri!\""
80000040-33 = "Do you like it?"
80000040-34 = "[s] \"Hmm. It's sweet like chocolate.\""
80000040-35 = "That's good, right...?"
80000040-39 = "I'm so glad you liked it. I'm real busy so I'm gonna..."
80000040-40 = "[s] \"You didn't make this chocolate, did you?\""
80000040-41 = "B-Busted?!"
80000040-42 = "I did try making you some, but I had to resort to store-bought..."
80000040-43 = "It's just because I couldn't give you mine!"
80000040-44 = "[s] \"Why not?\""
80000040-45 = "Well...I asked some others to taste test it before I gave it to you."
80000040-46 = "They tried it and immediately fainted."
80000040-47 = "[s] \"That's the Juri Effect!\""
80000040-48 = "The Juri Effect?!"
80000040-49 = "Anyway, that's why I couldn't give you my homemade chocolate."
80000040-50 = "What if you got sick from it?"
80000040-51 = "[s] \"You shouldn't worry about that.\""
80000040-52 = "I shouldn't?"
80000040-53 = "[s1] \"I was excited for YOUR chocolate.\"\n[s2] \"I didn't come here for store-bought chocolate.\""
80000040-54 = "Sensei, you really insist on trying my homemade chocolate?"
80000040-55 = "Sensei, you really insist on trying my homemade chocolate?"
80000040-56 = "[s] \"Yes! As long as you made it!\""
80000040-57 = "Heehee. I forgot the most important lesson you've taught me."
80000040-58 = "Whenever I start to doubt myself, you always tell me to be confident."
80000040-59 = "I'm sorry, Sensei. I understand now. My worries were so silly."
80000040-64 = "Here you go, Sensei!"
80000040-65 = "This is the chocolate I made just for you."
80000040-66 = "Will you accept it?"
80000040-67 = "[s] \"It's what I've been waiting for.\""
80000040-68 = "Ah!"
80000040-76 = "Sensei?! Are you okay? Oh, no!!!"
80000040-80 = "I was happy to taste Juri's chocolate, even as my consciousness faded and my stomach collapsed in on itself."

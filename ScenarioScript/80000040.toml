[translation]
80000040-1 = "ความจริงใจของสาวน้อยไม่มีวันจางหาย"
80000040-3 = "(ในตอนช่วงเย็นของวันวาเลนไทน์ คุณครูก็ได้รับข้อความติดต่อจากจูริ)"
80000040-4 = "คุณครูคะ สะดวกออกมาพบกันหน่อยรึเปล่าคะ?"
80000040-5 = "คือว่าฉันไม่รู้ว่าจะเป็นการรบกวนคุณครูรึเปล่า แต่ว่าฉันอยากให้ช็อกโกแลตโฮมเมด#nกับคุณครูค่ะ..."
80000040-6 = "มะ...มันคงจะเป็นการรบกวนคุณครูเกินไปสินะคะ#nระ...เรื่องช็อกโกแลตนี่ ชะ...ช่วยลืมไปด้วยนะคะ"
80000040-7 = "[s] \"จูริทำช็อกโกแลตให้ครูเหรอ?! จะรีบไปเดี๋ยวนี้เลย!\""
80000040-8 = "อ๊ะ คะ...คะ?! ตอบรับทันทีเลยเหรอคะ...?"
80000040-9 = "ฉันจะรอนะคะ คุณครู!"
80000040-13 = "อาคารเรียน 3 เกเฮนน่า"
80000040-14 = "(ไม่นานคุณครูก็มาพบกับจูริที่ห้องเรียนในเกเฮนน่า)"
80000040-15 = "อ๊ะ คุณครู!"
80000040-16 = "เอ่อ... คุณครูมาถึงเร็วมากเลยนะคะ"
80000040-17 = "[s] \"พอได้ข้อความก็วิ่งมาแบบเดอะแฟลชเลย!\""
80000040-18 = "คะ? ตะ...ตื่นเต้นขนาดนั้นเลยเหรอคะ...?"
80000040-19 = "ช็อกโกแลตของฉันก็แค่ช็อกโกแลตธรรมดาเองนะคะ..."
80000040-20 = "คุณครูตื่นเต้นแบบนี้... ฉันรู้สึกดีใจจังเลยค่ะ"
80000040-21 = "โดยเฉพาะช็อกโกแลตที่ฉันทำเอง..."
80000040-22 = "[s] \"ครูตื่นเต้นก็เพราะจูริบอกว่าทำเองนี่ล่ะ\""
80000040-23 = "งะ...งั้นเหรอคะ ขอบคุณนะคะ คุณครู"
80000040-24 = "นี่ค่ะ... ช็อกโกแลตของฉันค่ะ!"
80000040-29 = "[ns] \"ว้าว! ครูจะกินให้อร่อยเลย!\""
80000040-33 = "ปะ...เป็นยังไงบ้างคะ?"
80000040-34 = "[s] \"อืม รสชาติหวานอร่อยแบบทั่วไปดีนะ\""
80000040-35 = "งะ...งั้นเหรอคะ? คะ...ค่อยยังชั่วหน่อยค่ะ"
80000040-39 = "ในเมื่อให้ช็อกโกแลตคุณครูแล้ว วะ...วันนี้ฉันก็หมดธุระแล้วค่ะ#nถ้างั้นฉันขอตัวกลับก่อนนะคะ"
80000040-40 = "[s] \"ช็อกโกแลตนี่ จูริไม่ได้ทำเองใช่มั้ย?\""
80000040-41 = "ทำไมคุณครูถึงได้รู้เร็วขนาดนี้คะ?!"
80000040-42 = "ดะ...เดี๋ยวสิ... ถ้าถามว่าทำเองรึเปล่า... คือว่าฉันซื้อช็อกโกแลตสำเร็จรูปมาจากซูเปอร์... ก็เท่านั้นค่ะ"
80000040-43 = "ตะ...แต่ว่าช็อกโกแลตที่ฉันทำเองคงให้คุณครูไม่ได้หรอกค่ะ!"
80000040-44 = "[s] \"ทำไมล่ะ?\""
80000040-45 = "ฉันเองก็อยากให้ช็อกโกแลตโฮมเมดกับคุณครูเหมือนกันนะคะ แต่พอไปขอให้คนอื่นลองชิม#nช็อกโกแลตที่ทำ"
80000040-46 = "ทุกคนเป็นลมล้มพับไปทันทีที่กินเลยค่ะ..."
80000040-47 = "[s] \"พลังอาหารของจูริยังเหมือนเดิมเลยนะ!\""
80000040-48 = "พะ...พลังอาหารของจูริเหรอคะ?!"
80000040-49 = "ถึงจะลองทำช็อกโกแลตโฮมเมดแล้ว แต่ก็คิดว่าคงเอามาให้คุณครูไม่ได้หรอกค่ะ"
80000040-50 = "ถ้าเกิดคุณครูทานแล้วท้องเสียขึ้นมาจะทำยังไง..."
80000040-51 = "[s] \"คงไม่เกิดเรื่องแบบนั้นหรอก\""
80000040-52 = "คะ?"
80000040-53 = "[s1] \"ไม่ว่าเธอจะคิดยังไง แต่ครูก็อยากลองชิมนะ\"\n[s2] \"ครูดีใจนะที่จูริตั้งใจทำช็อกโกแลตโฮมเมดให้ครู\""
80000040-54 = "คุณครู... ถ้างั้นฉันจะให้ช็อกโกแลตที่ทำเองกับคุณครูโดยไม่ต้องกังวลได้ใช่มั้ยคะ?"
80000040-55 = "คุณครู... ถ้างั้นฉันจะให้ช็อกโกแลตที่ทำเองกับคุณครูโดยไม่ต้องกังวลได้ใช่มั้ยคะ?"
80000040-56 = "[s] \"อื้อ! ถ้าเป็นของที่จูริทำ ครูกินได้ตลอดเลย!\""
80000040-57 = "ฮิฮิ จริงๆ เลยนะคะ คุณครูเนี่ยไม่ว่าเมื่อไรก็พูดแบบนี้เสมอเลย"
80000040-58 = "ทั้งในตอนที่ฉันลังเล หรือตอนที่ถอดใจ คุณครูก็จะพูดด้วยความมั่นใจเสมอเลยนะคะ"
80000040-59 = "เข้าใจแล้วค่ะ ฉันงี่เง่าเองที่คิดมากไปค่ะ"
80000040-64 = "นี่ค่ะ คุณครู"
80000040-65 = "ช็อกโกแลตที่ฉันตั้งใจทำ... เพื่อคุณครูค่ะ"
80000040-66 = "ช่วยรับไว้ได้รึเปล่าคะ?"
80000040-67 = "[s] \"ต้องได้อยู่แล้ว!\""
80000040-68 = "ค่ะ!"
80000040-76 = "คะ... คุณครูคะ?! ทะ...ทานแล้วก็ล้มพับไปเลยเหรอเนี่ย!#nคะ...คุณครูคะ!! แงงงงงง!"
80000040-80 = "(คุณครูมีความสุขที่ได้ชิมช็อกโกแลตของจูริ จากนั้นก็สลบไปทันที)"

[translation]
80000040-1 = "少女的真心不會褪色"
80000040-3 = "（情人節當天晚上，收到了來自茱莉的聯絡）"
80000040-4 = "老師，現在方便稍微見個面嗎……？"
80000040-5 = "那個，不知道會不會給老師添麻煩，不過那個……#n我想把親手做的巧克力交給老師……"
80000040-6 = "算，算了，果然還是當我沒說過吧！我送的巧克力什麼的……"
80000040-7 = "[s]「茱莉做的巧克力！？我馬上過去！」"
80000040-8 = "咦，咦！？"
80000040-9 = "那，那不好意思，我在教室等老師來……！？"
80000040-13 = "格黑娜學園．第3校舍教室"
80000040-14 = "（連忙趕到茱莉所在的教室）"
80000040-15 = "啊，老師……！"
80000040-16 = "那，那個……來，來的真快呢……"
80000040-17 = "[s]「一接到茱莉的聯絡就跑過來了。」"
80000040-18 = "是，是嗎……"
80000040-19 = "可是，那個，該說其實也不是什麼了不起的東西嗎……"
80000040-20 = "老師這麼期待的話，有點……"
80000040-21 = "我做的只是，普通的巧克力而已唷……？"
80000040-22 = "[s]「因為是茱莉給的，所以我很開心唷。」"
80000040-23 = "啊……是。既然老師都這麼說了……"
80000040-24 = "請收下！"
80000040-29 = "[ns]「我要開動了！」"
80000040-33 = "老，老師覺得怎麼樣呢……？"
80000040-34 = "[s]「嗯，真好吃。」"
80000040-35 = "是，是嗎。太好了……"
80000040-39 = "既然巧克力已經交給老師了，我就先回去了……"
80000040-40 = "[s]「……是不是其實還有東西想要給我？」"
80000040-41 = "咦！？這，這個……"
80000040-42 = "難，難道已經穿幫了嗎……？剛才給老師的巧克力確實是從超市買來的……"
80000040-43 = "儘管如此我也不能把自己做的給老師……！"
80000040-44 = "[s]「為什麼？」"
80000040-45 = "……我也想送巧克力給老師。但是我一請身邊的人試吃我做的巧克力……"
80000040-46 = "大家都當場昏倒……"
80000040-47 = "[s]「真不愧是茱莉震撼……」"
80000040-48 = "茱，茱莉震撼……！？"
80000040-49 = "總，總之這個不能送給老師……"
80000040-50 = "不能讓老師因為我而把身體搞壞了……"
80000040-51 = "[s]「不用那麼想哦。」"
80000040-52 = "咦……？"
80000040-53 = "[s1]「今天茱莉叫我來我很開心。」\n[s2]「要是能收到茱莉自己做的巧克力就更開心了。」"
80000040-54 = "老師……我自己做的巧克力，真的可以給你嗎……？"
80000040-55 = "老師……我自己做的巧克力，真的可以給你嗎……？"
80000040-56 = "[s]「嗯，我會開心地收下的。」"
80000040-57 = "是，這樣嗎……呵呵。"
80000040-58 = "當我獨自一人猶豫不決的時候，老師總是會像這樣……"
80000040-59 = "好的，我了解了。"
80000040-64 = "請收下吧，老師。"
80000040-65 = "這是我做的，為老師做的巧克力。"
80000040-66 = "老師願意收下嗎……？"
80000040-67 = "[s]「當然。」"
80000040-68 = "謝謝老師……！"
80000040-76 = "老，老師！？你還好嗎！？"
80000040-80 = "（心想嚐到茱莉的巧克力真是太好了的同時，迅速失去了意識）"

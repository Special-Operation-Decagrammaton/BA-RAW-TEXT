[translation]
2600505-1 = "#title;스터디 인 카페"
2600505-2 = "3;요시미;01;……\n#3;a\n#3;em;…"
2600505-3 = "[s] \"……\""
2600505-4 = "#na;(낯익은 카페다.)"
2600505-5 = "3;요시미;00;……뭐, 뭐야. 왜 그런 눈으로 봐.\n#3;stiff"
2600505-6 = "[s1] \"이번엔 진짜 아니라고 했잖아요!\"\n[s2] \"이젠 변명할 생각조차 없는 거야?\""
2600505-7 = "3;요시미;09;아니야! 아니라고! 아니니까 걱정 마!\n#3;hophop\n#3;em;[반응]"
2600505-8 = "3;요시미;08;제대로 공부 때문에 부른 거니까! 먹는 거 때문 아니니까!\n#3;jump"
2600505-9 = "3;요시미;99;무슨 생각을 하는지는 대충 알겠지만…… 진짜 아니거든.\n#3;em;…"
2600505-10 = "3;요시미;00;오늘만큼은 정말 공부 때문에 부른 거라고."
2600505-11 = "3;요시미;01;요번에 친 시험 결과가 좀 맘에 안 들어서 답안지 점검이나 해보려고."
2600505-12 = "3;요시미;99;근데 아무래도 혼자 하려니 잘 안 돼서……"
2600505-13 = "3;요시미;01;내가 보기엔 맞춘 건 당연히 아는 거고, 틀린 건 본다고 바로 이해가 되는 것도 아니잖아?\n#3;em;[?]"
2600505-14 = "3;요시미;01;그래서 틀린 것들에 대해 설명해줄 사람이 필요했어. 괜찮지?\n#3;greeting"
2600505-15 = "3;요시미;00;서, 선생님이니까, 이정도는 해 줄 수 있잖아? 그치? 본분이잖아?\n#3;stiff\n#3;em;[///]"
2600505-16 = "3;요시미;00;……근데 왜 디저트 카페냐고? 디, 디저트 카페도 카페야! 공부하는 사람도 많다고!\n#3;hophop"
2600505-17 = "3;요시미;02;아니면 혹시 바쁜데 귀찮게 한 걸까? 선생님은 이거 말고도 해야 될 일이 많을 텐데."
2600505-18 = "3;요시미;00;잉여인력이라 괜찮다고? ……하아. 이젠 태클 걸기도 피곤해.\n#3;em;[땀]\n#3;stiff"
2600505-19 = "3;요시미;07;그래도 고마워. 그렇게 말해줘서. 역시 선생님한테 부탁하는 게 정답이었나 봐.\n#3;greeting"
2600505-20 = "3;요시미;07;가끔 말을 좀 이상하게 하지만 그래도 선생님은 선생님이다. 도움이 되네."
2600505-21 = "3;요시미;02;응? 내 성적? 글쎄? 나쁘냐……고 물으면 아닌데. 그래도 중간 정도는 간다고 생각해. 왜?\n#3;em;[반응]"
2600505-22 = "3;요시미;01;위험한 상황도 아닌 데도 열심이라고? 무슨 말을 하는 거야. 그런 건 사람마다 다른 거지."
2600505-23 = "3;요시미;02;성실하다고? 아니, 그러니까 아니래도? 이런 정도로 성실함 운운하는 건 좀 이상하잖아.\n#3;stiff"
2600505-24 = "3;요시미;99;성실함이라는 건 좀 더 뭐랄까. 음, 그러니까…… 예를 들자면……\n#3;em;…"
2600505-25 = "[s3] \"요시미가 부를 때마다 달려올 정도의 정성?\"\n[s4] \"매번 디저트 카페의 일정들을 챙기는 꾸준함?\""
2600505-26 = "3;요시미;03;그래! 그렇게 날 생각하는 선생님의 마음이라든가……\n#3;em;[재잘]\n#3;jump"
2600505-27 = "3;요시미;03;……?\n#3;stiff"
2600505-28 = "3;요시미;03;그래, 적어도 그런 정도의 수고가 들어가는 것이어야……!\n#3;em;[재잘]\n#3;greeting"
2600505-29 = "3;요시미;03;……!!\n#3;stiff"
2600505-30 = "3;요시미;09;장난 그만해애애애애애애애애!!\n#3;hophop\n#3;closeup\n#fontsize;80\n#bgshake"
2600505-31 = "3;요시미;09;더는 못 참아! 진짜 이 느끼한 치즈버터 같은 망할 선생!!\n#3;stiff\n#3;em;[빠직]"
2600505-32 = "3;요시미;09;매번 매번 말이야, 엉!? 대꾸하기 힘든 농담이나 해대고! 이쪽 심정을 당신이 알기나 해!?"
2600505-33 = "3;요시미;09;내가 매번 장난으로 넘어가주니까 진짜 장난인 줄 알고 말이야!!\n#3;hophop"
2600505-34 = "3;요시미;09;진정? 엉? 지금 진정하게 생겼냐! 아 절대 진정 못하지!!\n#3;em;[?!]\n#3;shake"
2600505-35 = "3;요시미;09;뭐? 사람들이 본다고? 그게 내 알 바냐, 이 상황에!!\n#3;jump"
2600505-36 = "3;요시미;09;뭐? 답안지 점검!? 그러니까 그런 게 지금 다 무슨 소용이……!\n#3;em;[반응]\n#3;shake"
2600505-37 = "3;요시미;08;……\n#3;em;…"
2600505-38 = "3;요시미;99;……후우…… 그래. 시험. 시험 점검……\n#3;em;[속상함]\n#3;stiff"
2600505-39 = "3;요시미;01;선생님이 일부러 여기까지 와준 것도 다 내 공부를 도와주기 위해서니까……"
2600505-40 = "3;요시미;00;진짜 이번만이야. 이번만 그냥 넘어가주는 거라고. 알겠지!?\n#3;em;[!]\n#3;jump"
2600505-41 = "3;요시미;04;크윽, 뭐지 이 기분…… 이것까지도 또 전부 손 안에서 놀아난 것 같은 기분인데……\n#3;stiff"
2600505-42 = "3;요시미;09;기분 탓이라고? 시끄러워! 쓸 데 없는 소리 그만하고 문제나 같이 봐 줘! 자!!\n#3;em;[빠직]\n#3;hophop"
2600505-43 = "#all;hide"
2600505-44 = "#na;(이후로 한참동안 요시미와 함께 틀린 문제들을 분석하며 개인수업을 진행했다.)"
2600505-45 = "#all;hide"
2600505-46 = "3;요시미;03;후아…… 어떻게든 다 끝냈다. 진짜 이게 다 되긴 하네!\n#3;a\n#3;em;[반짝]"
2600505-47 = "3;요시미;02;수고했다고? 무슨 소리야. 선생님이야말로 나 때문에 고생했지."
2600505-48 = "3;요시미;10;정말 고마워. 덕분에 거의 다 해결됐네. 나 혼자였으면 절대 못 했을 거야.\n#3;greeting"
2600505-49 = "3;요시미;02;뭐? ……가르쳐준 거에 내가 잘 따라와줬기 때문이라고?\n#3;em;[?]"
2600505-50 = "3;요시미;01;……흐으응~."
2600505-51 = "3;요시미;07;아니, 그렇게 순수하게 듣기 좋은 말도 할 수 있구나. 선생님은.\n#3;em;[음표]"
2600505-52 = "3;요시미;99;늘 놀리는 말만 해대서 이런 건 또 생각 못했네."
2600505-53 = "[s] \"요시미가 원한다면 얼마든지 다른 말들도 해줄 수 있는데.\""
2600505-54 = "3;요시미;00\n#3;em;[///]\n#3;stiff\n#wait;1500"
2600505-55 = "3;요시미;09;……!! 그, 그러니까…… 그런 거! 그런 거 좀 제발!!\n#3;hophop"
2600505-56 = "3;요시미;09;……"
2600505-57 = "3;요시미;07;……히히. 아니야. 됐어. 오늘만큼은 봐주도록 할게.\n#3;em;[재잘]"
2600505-58 = "3;요시미;07\n#3;greeting\n#wait;450"
2600505-59 = "3;요시미;07\n#3;closeup\n#wait;1000"
2600505-60 = "3;요시미;03;그러니까 가끔은, 오늘처럼 또 이것저것 도와줘야 해. 알겠지? 선생님.\n#3;em;[반짝]\n#3;closeup"

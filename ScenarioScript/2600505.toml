[translation]
2600505-1 = "นั่งเรียนในคาเฟ่"
2600505-2 = "......."
2600505-3 = "[s] \"...\""
2600505-4 = "(คาเฟ่ที่คุ้นเคย)"
2600505-5 = "อะ... อะไร? ทำไมถึงมองฉันแบบนั้นล่ะ?"
2600505-6 = "[s1] \"สัญญาแล้วนี่ว่าเราจะไม่ทำแบบนี้อีก!\"\n[s2] \"หยุดหาข้ออ้างได้แล้วหรือยังน่ะ?\""
2600505-7 = "ไม่นะ! ไม่ใช่! นี่ไม่ใช่แบบที่ครูคิดนะ ไม่ต้องห่วง!"
2600505-8 = "ฉันเรียกครูมาอ่านหนังสือกันที่นี่ต่างหากล่ะ ไม่ได้จะมากินอะไร!"
2600505-9 = "ฉันรู้ว่าครูต้องคิดแบบนั้น... แต่มันไม่ใช่สักหน่อย"
2600505-10 = "ที่ฉันเรียกครูออกมาในวันนี้ก็เพื่อจะมาอ่านหนังสือกันจริงๆ นะ!"
2600505-11 = "ผลการสอบครั้งล่าสุดของฉันไม่ค่อยดีเท่าไหร่ ฉันเลยอยากมาทบทวนคำตอบของฉัน"
2600505-12 = "แต่จะให้ดูคนเดียวมันก็ยากเกินไป..."
2600505-13 = "ฉันเข้าใจข้อที่ฉันตอบถูกก็จริง แต่ฉันไม่เข้าใจข้อที่ฉันผิดเลย"
2600505-14 = "ฉันก็เลยต้องการคนมาช่วยอธิบายว่าทำไมมันถึงผิด แบบนี้ครูโอเคหรือเปล่า?"
2600505-15 = "นะ... ในเมื่อเป็นคุณครู คงจะช่วยได้ใช่มั้ยล่ะ? ยังไงมันก็เป็นงานของครูอยู่แล้วนี่?"
2600505-16 = "ทำไมถึงเป็นคาเฟ่ขนมหวานเหรอ? ก็คาเฟ่ขนมหวานก็คือคาเฟ่ยังไงล่ะ!#nหลายๆ คนก็มาอ่านหนังสือกันที่นี่!"
2600505-17 = "หรือว่าฉันรบกวนงานของคุณครูหรือเปล่า? ฉันรู้ว่าครูมีหลายอย่างที่ต้องทำ..."
2600505-18 = "ไม่ได้รบกวนเพราะมีคนอื่นที่ทำได้เหมือนกันงั้นเหรอ? เฮ้อ... เหนื่อยจะถามต่อแล้วล่ะ"
2600505-19 = "ขอบคุณที่พูดแบบนั้นนะ ฉันคิดถูกแล้วล่ะที่มาขอให้ครูช่วย!"
2600505-20 = "ถึงคุณครูจะพูดอะไรแปลกๆ สักหน่อย แต่คำพูดของครูก็ยังคงทำให้ฉันอุ่นใจอยู่"
2600505-21 = "หื้ม? เกรดของฉัน? อืม... ฉันว่าก็ทั่วไปนะ ถามทำไมเหรอ?"
2600505-22 = "ฉันดูเหมือนจะขยันมากถึงแม้ว่าเกรดจะไม่อยู่ในขั้นวิกฤตงั้นเหรอ... พูดอะไรน่ะ?#nแต่ก็ละคนก็ไม่เหมือนกันนี่"
2600505-23 = "ครูคิดว่าฉันขยันงั้นเหรอ? ฉันไม่ได้ขยันจริงๆ นะ จะใช้คำว่า \"ขยัน\" กับเรื่องแบบนี้#nมันคงดูแปลกอยู่หน่อยเหมือนกัน"
2600505-24 = "ขยันมันเหมือนกับ... อืม... อย่างเช่น..."
2600505-25 = "[s3] \"เช่น ขยันก็เหมือนกับเวลาที่มาหาทุกครั้งที่โยชิมิเรียกหาใช่มั้ย?\"\n[s4] \"ขยันก็คือติดตามตารางเวลาของทุกคาเฟ่ขนมหวานใช่มั้ย?\""
2600505-26 = "ใช่! เหมือนกับที่คุณครูใส่ใจฉัน..."
2600505-27 = "...?"
2600505-28 = "ใช่แล้ว ความพยายามแบบนั้น.....!"
2600505-29 = "...!!"
2600505-30 = "หยุดแซวฉันได้แล้วววววววว!!"
2600505-31 = "ทนไม่ไหวแล้วนะ! ลื่นไหลเป็นปลาไหลเลย!!"
2600505-32 = "ทุกทีเลย!? ชอบปล่อยมุกที่ฉันไม่เข้าใจทุกครั้ง! รู้มั้ยว่ามันทำให้ฉันรู้สึกยังไง?!"
2600505-33 = "คงจะคิดว่ามันตลกเพราะว่าฉันไม่รู้ว่ามันคือมุกสินะ!"
2600505-34 = "ใจเย็นเหรอ? คิดจะให้ฉันเย็นลงได้ในตอนนี้งั้นเหรอ?! ฉันไม่เย็นหรอก!"
2600505-35 = "คนมองกันอยู่แล้วมันทำไมกันล่ะ? พวกเขามองแล้วมันเกี่ยวอะไรกับฉัน?!"
2600505-36 = "มาทบทวนคำตอบกันงั้นเหรอ?! ยังจะทบทวนกันอีกเหรอ....!"
2600505-37 = "......."
2600505-38 = "เฮ้อ ...ใช่ ข้อสอบ ต้องทบทวนข้อสอบ..."
2600505-39 = "คุณครูมาถึงที่นี่เพื่อช่วยฉันอ่านหนังสือ เพราะงั้นฉันจะยอมให้อภัยก็แล้วกัน..."
2600505-40 = "แต่แค่ครั้งนี้ครั้งเดียวนะ แค่ครั้งเดียว! เข้าใจมั้ย?!"
2600505-41 = "อึ่ก ทำไมรู้สึกแปลกๆ... เหมือนครูจะยังล้อฉันอยู่นะ..."
2600505-42 = "ฉันดูอารมณ์ไม่ดีงั้นเหรอ? หยุดพูดนะ! หยุดเล่นได้แล้ว แล้วดูโจทย์ของฉันซะทีสิ! เอ้า!!"
2600505-44 = "(หลังจากนั้นก็วิเคราะห์คำตอบที่ผิดกับโยชิมิทั้งหมด)"
2600505-46 = "เฮ้อ... จบหมดแล้ว... เราดูครบทั้งหมดแล้วจริงๆ ด้วย!"
2600505-47 = "ฉันทำได้ดีงั้นเหรอ? พูดอะไรน่ะ คุณครูต่างหากที่ทำได้ดี"
2600505-48 = "ขอบคุณจริงๆ นะ ฉันเข้าใจทั้งหมดก็เพราะคุณครูเลย ฉันไม่คิดว่าฉันจะทำได้ทั้งหมดนั่น#nด้วยตัวคนเดียวได้เลยล่ะ"
2600505-49 = "อะไรนะ? ...เป็นเพราะฉันตามสิ่งที่ครูสอนทันงั้นเหรอ?"
2600505-50 = "..... ฮืม~"
2600505-51 = "เปล่านี่ คุณครูก็พูดอะไรดีๆ ได้เหมือนกันนี่นา"
2600505-52 = "ฉันไม่คิดมาก่อนว่าคุณครูจะมีมุมแบบนี้เหมือนกัน ก็ครูมักจะแกล้งฉันอยู่เสมอเลยนี่!"
2600505-53 = "[s] \"ครูจะพูดในสิ่งที่โยชิมิต้องการนะ\""
2600505-55 = ".......!! นะ... นั่น.... ขอล่ะ หยุดเถอะ!"
2600505-56 = "........"
2600505-57 = ".....ฮิฮิ ไม่สิ ก็ได้ ฉันจะยอมให้วันนึงก็แล้วกัน"
2600505-60 = "แต่ถึงอย่างนั้นครูยังต้องช่วยฉันอยู่นะ เข้าใจมั้ยคุณครู?"
2600505-62 = "(หลังจากนั้นทุกอย่างก็กลับมาเป็นปกติ และทั้งสองก็จัดการขนมหวานทั้งหมดในร้าน)"

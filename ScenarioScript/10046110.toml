[translation]
10046110-5 = "พวกรุ่นพี่คนอื่นเดินลาดตระเวนกันแบบนี้ได้ยังไงนะ..."
10046110-6 = "ทำงานหนักขนาดนี้แล้ว ถ้าหลบไปพักสักหน่อยคงไม่มีใครว่าหรอกเนอะ..."
10046110-7 = "คุณนางิสะก็บอกว่าให้ทำตัวสบายๆ เหมือนนักท่องเที่ยวด้วย"
10046110-8 = "แม้แต่คุณนางิสะก็บอกให้ฉันไปพัก"
10046110-12 = "ฮ่าฮ่า... ฉันจะพูดแก้ตัวทำไมเนี่ย จริงๆ เลยเชียว"

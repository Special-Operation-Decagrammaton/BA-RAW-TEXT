[translation]
10049055-2 = "哈啊……哈啊……"
10049055-3 = "唔……哈啊……"
10049055-4 = "（澪紗同學的霰彈槍和我的閃光彈……都沒辦法發揮效果）"
10049055-5 = "（因為有孩子們在場，根本無法……）"
10049055-6 = "（而且在心慌意亂的情況下，根本無法專心戰鬥……）"
10049055-7 = "（現在的我如此無力，什麼都守護不了）"
10049055-8 = "（我果然……）"
10049055-12 = "[ns]「麻白，就算只是威嚇射擊也沒關係！」"
10049055-13 = "……對不起。老師、鈴美同學，還有澪紗同學。"
10049055-14 = "上層還沒有下達開火許可。"
10049055-15 = "況且這裡是格黑娜的區域，我們實在無法介入。"
10049055-16 = "對不起。真的……很對不起。"
10049055-17 = "正義……是不會輸的……再，再來……！"
10049055-25 = "住……住手……！"
10049055-27 = "這些傢伙是怎麼回事，也太弱了吧？"
10049055-28 = "本來還以為很強的說……害我白緊張了？"
10049055-29 = "不過這也已經夠煩人的了。#n天氣這麼好，就給我乖乖躺著休息吧。"
10049055-30 = "……！"
10049055-34 = "咦，魔法少女輸了嗎？"
10049055-35 = "怎麼可能～那樣表演會變得很奇怪吧？"
10049055-36 = "是嗎？可是動作看起來超真實、超逼真的耶。"
10049055-37 = "咦？"
10049055-38 = "表，表演……？是在說我們嗎……？"
10049055-40 = "Thermite White！Pink！"
10049055-41 = "不要輸！快反擊啊！嗚哇啊啊──！"
10049055-42 = "你們不是說魔法少女是站在正義的一方嗎！#n不是說正義不會輸嗎！嗚哇啊啊──！"
10049055-43 = "嗚哇啊啊──！討厭壞蛋，嗚哇啊啊！！"
10049055-45 = "唔……"
10049055-46 = "我明明……只是想問幾個問題而已……"
10049055-47 = "魔法少女的超級巨星，Pink……是不會輸的……！"
10049055-49 = "（這，這是什麼情況？）"
10049055-50 = "（小孩子哭成一片，這兩個人被打成那樣還能站得起來……）"
10049055-51 = "（然後我還變成了壞蛋？#n　雖然是這樣沒錯啦……可是……）"
10049055-55 = "唔……唔呃……！"
10049055-56 = "呃啊──！我被打敗了！"
10049055-58 = "隊長！？"
10049055-60 = "果然很強啊！#nTh-Ther……Thermite White？還有 Pink！"
10049055-61 = "只要有你們在的話，那個……啊！"
10049055-62 = "世界上就不會有犯罪了──！"
10049055-68 = "隊長你突然怎麼了！？"
10049055-69 = "明明是我們贏了啊！"
10049055-73 = "會不會看氣氛啊笨蛋！我們只要達成目標不就行了嗎！"
10049055-74 = "快把東西收一收開溜了！專心處理目標啦！"
10049055-75 = "是，是！！"
10049055-76 = "是你們贏了──！"
10049055-83 = "哇……"
10049055-84 = "哇啊啊啊啊！！！"
10049055-85 = "贏了！"
10049055-87 = "[ns1]「來！接下來是演員的休息時間！」\n[ns2]「孩子們，能站得起來嗎？」"
10049055-91 = "老師……"

[translation]
10049055-2 = "แฮ่ก... แฮ่ก..."
10049055-3 = "อึก... เฮ้อ..."
10049055-4 = "(ทั้งปืนลูกซองของคุณเรอิสะและระเบิดแสงของฉัน... ก็ใช้ไม่ได้เต็มที่)"
10049055-5 = "(พอมีเด็กๆ อยู่ด้วย ก็ไม่กล้า...)"
10049055-6 = "(ที่สำคัญก็คือ พอรู้สึกกังวล ก็ไม่มีสมาธิกับการต่อสู้เลย...)"
10049055-7 = "(ตอนนี้ฉันอ่อนแอจนปกป้องใครไม่ได้เลย)"
10049055-8 = "(ฉันมัน...)"
10049055-12 = "[ns] \"มาชิโระ ช่วยยิงขู่ได้มั้ย?\""
10049055-13 = "ขอโทษค่ะ... คุณครู คุณสึซึมิ แล้วก็คุณเรอิสะด้วย"
10049055-14 = "ฉันยังไม่ได้รับอนุญาตจากหัวหน้าให้ยิงค่ะ"
10049055-15 = "เหนือสิ่งอื่นใด ตอนนี้เหตุการณ์เกิดขึ้นในเขตเกเฮนน่า ฉันเลยเข้าแทรกแซงไม่ได้ค่ะ"
10049055-16 = "ขอโทษค่ะ ขอโทษจริงๆ นะคะ"
10049055-17 = "ความยุติธรรม... ไม่พ่ายแพ้หรอกค่ะ... ฉันจะสู้ต่อ...!"
10049055-25 = "ยะ... หยุดนะ...!"
10049055-27 = "อะไรน่ะ ยัยพวกนี้ เหลาะแหละมากเลยนี่?"
10049055-28 = "คิดว่าเก่งเสียอีก... รู้งี้ไม่ต้องหนีหัวซุกหัวซุนก็ดี"
10049055-29 = "พวกเธอขัดขวางฉันมากพอแล้วละ ทีนี้ก็กลับไปนอนพักกันเถอะ อากาศก็ดีด้วย"
10049055-30 = "...!"
10049055-34 = "อะไรกัน สาวน้อยเวทมนตร์แพ้เหรอ?"
10049055-35 = "ไม่หรอกน่า~ แบบนั้นก็แสดงต่อไม่ได้น่ะสิ?"
10049055-36 = "งั้นเหรอ? แต่ฉากแอกชั่นเมื่อกี้สมจริงมากเลยนะ จ้างร้อยเล่นล้านเลย"
10049055-37 = "หืม?"
10049055-38 = "กะ... การแสดงงั้นเหรอ...?"
10049055-40 = "เทอร์ไมต์ ไวต์! เทอร์ไมต์ พิงค์!"
10049055-41 = "อย่ายอมแพ้นะ! สู้กลับเลย! แงงง!"
10049055-42 = "สาวน้อยเวทมนตร์อยู่ข้างความยุติธรรมไม่ใช่เหรอ! ไหนว่าความยุติธรรมจะไม่แพ้ไง! แงงง!"
10049055-43 = "แงง! เกลียดพวกวายร้ายชะมัด!!"
10049055-45 = "อะ... อึก..."
10049055-46 = "ฉันบอกแล้วไม่ใช่เหรอคะ... ว่าจะขอถาม... อะไร... นิดหน่อยเอง..."
10049055-47 = "ซูเปอร์สตาร์แห่งสาวน้อยเวทมนตร์ พิงค์จะไม่ยอมแพ้ค่ะ...!"
10049055-49 = "(นะ... นี่มันอะไรน่ะ?)"
10049055-50 = "(เด็กๆ ร้องไห้ระงม ส่วนยัยพวกนั้นก็ลุกขึ้นมาได้อีก)"
10049055-51 = "(แล้วฉันเป็นวายร้ายเหรอ? หรือว่าก็ใช่... นะ? แต่ว่า...)"
10049055-55 = "อะ... อึกก...!"
10049055-56 = "ว้าก! โดนเข้าให้แล้ว!"
10049055-58 = "หัวหน้า?!"
10049055-60 = "กะ... เก่งจริงๆ ด้วยสินะ เทอร์ไวต์ อะไรนั่น? แล้วก็พิงค์ด้วย!"
10049055-61 = "ตราบใดที่พวกเธอยังอยู่ที่นี่ ก็... อ้อ!"
10049055-62 = "โลกนี้ก็ไม่มีอาชญากรรม!"
10049055-68 = "จู่ๆ ก็เป็นอะไรไปคะ หัวหน้า?!"
10049055-69 = "พวกเราชนะแล้วนะคะ?"
10049055-73 = "เล่นตามน้ำไปก่อน! สุดท้ายแค่เราบรรลุเป้าหมายของเราก็พอ!"
10049055-74 = "ขนของแล้วเผ่นไป! สนใจแค่เป้าหมายพอ!"
10049055-75 = "ค่ะ... ค่ะ!!"
10049055-76 = "พวกเธอชนะแล้ว!"
10049055-83 = "ว้าว..."
10049055-84 = "เยสสส!!!"
10049055-85 = "ชนะแล้ว!"
10049055-87 = "[ns1] \"เอาละๆ ได้เวลาพักของนักแสดงแล้ว!\"\n[ns2] \"ทุกคน พอลุกขึ้นกันไหวมั้ย?\""
10049055-91 = "คุณครู..."

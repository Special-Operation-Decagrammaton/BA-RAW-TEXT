[translation]
31080-1 = "第8話;第1次特別學力測驗"
31080-3 = "（太好了，考題都是在補課時做過的題目！）"
31080-4 = "（幾乎跟老師解說過的內容，還有大家一起學過的問題一模一樣……！）"
31080-5 = "（而且難度也是初級裡最基礎最簡單的等級！）"
31080-6 = "（雖然這陣子聽見了很多恐怖的話，#n　但這場考試，說不定是對補課部的救濟措施……！？）"
31080-10 = "這是……那個……"
31080-14 = "呵呵。"
31080-18 = "（唰唰）……"
31080-22 = "（不過不能大意！大家請好好加油，通過測驗後一起笑著從補課部畢業吧！）"
31080-29 = "[ns] 收到了測驗的結果"
31080-30 = "啊哈哈……大家都辛苦了。"
31080-31 = "只要拿到滿分100分中的60分以上就算合格！#n不必拿高分，只要及格就行了……難度也只是暖身等級……！"
31080-32 = "老師，請發表結果吧！"
31080-33 = "我們會笑著面對的！"
31080-34 = "[s] 發表結果"
31080-35 = "日步美：72分"
31080-36 = "結果──合格"
31080-37 = "嗯！成功了！那麼接下來是……"
31080-39 = "梓：32分"
31080-40 = "結果──不合格"
31080-41 = "……咦！？"
31080-42 = "呿，居然是一線之隔啊。"
31080-43 = "……請，請等一下！這分數不能算是「一線之隔」吧！？不是只有暖身難度嗎！？"
31080-45 = "小春：11分"
31080-46 = "結果──不合格"
31080-47 = "！？"
31080-48 = "小春醬！？你，你隱藏的實力呢！？這次有好好接受1年級的考試吧！？#n難，難道又考了2年級……不，3年級的考試了嗎！？"
31080-49 = "我，我只是不小心答錯而已！誰叫它出這麼難的問題……"
31080-50 = "明明很簡單吧！？幾乎是我考過最簡單的難度了呀！？"
31080-51 = "哎呀哎呀……"
31080-52 = "花子醬……該，該怎麼辦才好？#n只有我們兩個合格的話……就只能參加下一次測驗了……"
31080-53 = "花子：2分"
31080-54 = "結果──不合格"
31080-56 = "2分！！？！？！？！？"
31080-57 = "2分！？真的是2分沒錯嗎！？那種分數是怎麼考到的？#n請等一下，花子同學不是給人非常會念書的感覺嗎！？"
31080-58 = "我確實給人那種感覺呢。不過成績就是另外一回事了。"
31080-59 = "感覺！？只有感覺嗎！？和成績是兩回事是什麼意思！？"
31080-60 = "啊……"
31080-61 = "啊嗚嗚……"
31080-65 = "[ns]「日步美！振作一點……！」"
31080-70 = "第1次特別學力測驗，結果──"
31080-72 = "　花子──[FF6666]不合格[-]"
31080-74 = "　　梓──[FF6666]不合格[-]"
31080-76 = "　小春──[FF6666]不合格[-]"
31080-78 = "日步美──[007eff]合格[-]　"
31080-80 = "補課部──確定參加合宿！"
31080-84 = "下一話;水面下搖曳的影子"

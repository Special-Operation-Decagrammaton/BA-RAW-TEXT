[translation]
31080-1 = "Episode 8;The First Evaluation Exam"
31080-3 = "(Thank goodness these are all questions we covered in our make-up work!)"
31080-4 = "(The problems we studied with Sensei and the parts we went over together are exactly the same!)"
31080-5 = "(This exam should be easy for all of us!)"
31080-6 = "(Could they have designed it to give the Make-Up Work Club a break? Even though they were threatening to send us to boot camp, they really came through for us...)"
31080-10 = "*grunt* This is... Um..."
31080-14 = "Heehee."
31080-18 = "*scratch* *scratch* "
31080-22 = "(That's it, everyone! The finish line is within sight! Pass this test and we can all graduate from the Make-Up Work Club with smiles on our faces!)"
31080-29 = "[ns] The scores have been calculated."
31080-30 = "Good work, everyone."
31080-31 = "You just have to score a 60 out of 100 or better. Everything is fine as long as you didn't fail, and this test was practically a warm up. "
31080-32 = "Please tell us the test results, Sensei."
31080-33 = "We're ready whenever you are!"
31080-34 = "[s] Announce the results."
31080-35 = "Hifumi: 72. "
31080-36 = "Result: Pass."
31080-37 = "I did it! Next up is..."
31080-39 = "Azusa, 32. "
31080-40 = "Result: Fail."
31080-41 = "What?!"
31080-42 = "Hmph. So close."
31080-43 = "H-Hold on! That's barely even halfway to passing! Th-This was supposed to be an easy test!"
31080-45 = "Koharu: 11. "
31080-46 = "Result: Fail."
31080-47 = "...?!"
31080-48 = "Wait just a minute! Wh-What happened to unleashing your true potential?! Are you sure you took the first-year exam this time, Koharu?! You didn't take the second-year one again—or maybe the third-year exam?!"
31080-49 = "I-I can explain! The test was really hard..."
31080-50 = "No it wasn't! It was supposed to be easy!"
31080-51 = "Oh, my..."
31080-52 = "What are we going to do, Hanako? Even if the two of us passed...we'll still have no choice but to take the second exam."
31080-53 = "Hanako: 2. "
31080-54 = "Result: Fail."
31080-56 = "A TWO?!"
31080-57 = "Two! Did I hear that right? Is that grade even possible? What happened, Hanako?! You looked like you were in your element while studying!"
31080-58 = "I've been told I give off that vibe, but that doesn't mean I get good grades."
31080-59 = "Vibe?! Just a vibe?! It has nothing to do with your grades?!"
31080-60 = "Oh..."
31080-61 = "No..."
31080-65 = "[ns] \"Stay with us, Hifumi!\" "
31080-70 = "First Evaluation Exam Results"
31080-72 = "Hanako: [FF6666]Failed[-]"
31080-74 = "Azusa: [FF6666]Failed[-]"
31080-76 = "Koharu: [FF6666]Failed[-]"
31080-78 = "Hifumi: [007eff]Passed[-]"
31080-80 = "The Make-Up Work Club is going to boot camp!"
31080-84 = "Next Episode;What Lurks in the Depths"

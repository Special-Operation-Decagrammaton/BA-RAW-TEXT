[translation]
31080-1 = "ตอนที่ 8;การสอบประเมินครั้งที่ 1"
31080-3 = "(โชคดีจังเลย ข้อสอบมีโจทย์ที่ฝึกทำในชั้นเรียนเสริมด้วย!)"
31080-4 = "(ข้อสอบเป็นโจทย์ที่คุณครูสอนกับหัวข้อที่เรียนมาด้วยกัน... เป๊ะๆ เลย…!)"
31080-5 = "(แถมยังเป็นโจทย์ระดับพื้นฐานที่ง่ายที่สุดด้วย!)"
31080-6 = "(หรือว่าการสอบนี้ออกแบบมาเพื่อช่วยชมรมชั้นเรียนเสริมกันนะ?! ต้องบอกว่าช่วยพวกเรามากกว่าสิ..)"
31080-10 = "อื้ม..... ข้อนี้มัน..... อืม..."
31080-14 = "ฮุฮุ"
31080-18 = "(ฝนๆๆ) ......."
31080-22 = "(แต่จะประมาทไม่ได้! ทุกคนพยายามเข้านะคะ! ตั้งใจทำข้อสอบแล้วบอกลาชมรมนี้กันเถอะค่ะ!)"
31080-29 = "[ns] ผลการสอบออกมาแล้ว"
31080-30 = "อะฮ่ะฮ่า... ขอบคุณทุกคนที่พยายามนะคะ"
31080-31 = "แค่ได้เกิน 60 คะแนนจาก 100 คะแนนก็พอแล้ว! แค่สอบไม่ตกก็พอแล้ว...#nอีกอย่าง การสอบครั้งนี้ถือว่าเป็นการอุ่นเครื่องก่อน..."
31080-32 = "รีบบอกคะแนนสอบเถอะค่ะคุณครู!"
31080-33 = "ฉันจะยิ้มให้กับคะแนนสอบเลยล่ะค่ะ!"
31080-34 = "[s] ประกาศผลการสอบ"
31080-35 = "ฮิฟุมิ 72 คะแนน"
31080-36 = "สอบผ่าน"
31080-37 = "เย้! ทำได้แล้ว! คนต่อไปเลยค่ะ..."
31080-39 = "อาซึสะ 32 คะแนน"
31080-40 = "สอบไม่ผ่าน"
31080-41 = "หา...?!"
31080-42 = "หึ ก็แค่กระดาษแผ่นเดียวน่า"
31080-43 = "คะ...?! ดะ.. เดี๋ยวนะคะ! นี่ไม่ใช่กระดาษแค่แผ่นเดียวนะคะ!"
31080-45 = "โคฮารุ 11 คะแนน"
31080-46 = "สอบไม่ผ่าน"
31080-47 = "?!"
31080-48 = "คะ?! ดะ.. เดี๋ยวนะคะ! ไหนพลังที่ว่าล่ะคะ? ไหนว่าซ่อนพลังเอาไว้ไงคะ?!#nไม่ได้ทำข้อสอบของปี 1 หรอกเหรอคะ? โคฮารุจัง?! ไปสอบของปี 2 มาอีกแล้วเหรอ?#nเฮือก! อย่าบอกนะว่าปี 3?!"
31080-49 = "คะ... แค่ทำผิดพลาดน่ะ! ก็มันออกแต่อะไรยากๆ นี่....."
31080-50 = "มันง่ายมากเลยนะคะ?! ไม่เคยออกง่ายแบบนี้เลยนะ?!"
31080-51 = "อุ๊บส์....."
31080-52 = "ฮานาโกะจัง... ทำยังไงดีล่ะคะ? ถ้าเราสอบผ่านกันแค่สองคนล่ะก็... เราไปสอบครั้งที่ 2 กันไม่ได้แน่..."
31080-53 = "ฮานาโกะ 2 คะแนน"
31080-54 = "สอบไม่ผ่าน"
31080-56 = "2 คะแนน?!?!!"
31080-57 = "2 คะแนนเหรอคะ?! 2 คะแนน? ทำยังไงให้ได้ 2 คะแนนเหรอคะ? เดี๋ยวนะคะ#nฮานาโกะจังดูเรียนเก่งมากเลยนี่นา!?"
31080-58 = "ฉันก็ดูเป็นนักเรียนแบบนั้นล่ะค่ะ แต่ผลการสอบจริงๆ แล้ว..."
31080-59 = "ฉันคิดไปเองเหรอคะ?! รู้สึกไปคนเดียวเหรอคะ?! ทำไมผลออกมาไม่เหมือนที่ตั้งใจเรียนล่ะ?!"
31080-60 = "อ่า..."
31080-61 = "อ่า......"
31080-65 = "[ns] \"ฮิฟุมิ ใจเย็นๆ ก่อน!\""
31080-70 = "ผลการสอบประเมินครั้งที่ 1"
31080-72 = "ฮานาโกะ - [FF6666]ไม่ผ่าน[-]"
31080-74 = "อาซึสะ - [FF6666]ไม่ผ่าน[-]"
31080-76 = "โคฮารุ - [FF6666]ไม่ผ่าน[-]"
31080-78 = "ฮิฟุมิ - [007eff]ผ่าน[-]"
31080-80 = "ชมรมชั้นเรียนเสริม - ไปเข้าแคมป์ฝึกฝน!"
31080-84 = "ตอนต่อไป;สิ่งที่ซ่อนอยู่เบื้องลึก"

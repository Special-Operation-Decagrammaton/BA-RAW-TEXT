[translation]
84310100700-6 = "……怎麼了？發生什麼事了嗎？"
84310100700-7 = "看你的表情……就像經歷了生死關頭一樣。"
84310100700-11 = "難道是……碰上了緊急情況嗎？"
84310100700-12 = "我不是說過有事要跟我說嗎！到底怎麼了！？"
84310100700-14 = "不不不。兩位先冷靜，事情不是你們想的這樣。"
84310100700-15 = "不，雖然是這樣沒錯，但又不是這樣。#n其實只是……"
84310100700-18 = "（聖亞向寧瑠和莉央說明了在博覽會會場發生的事）"
84310100700-21 = "哦……原來是這樣啊……"
84310100700-22 = "我也知道他還是老樣子……"
84310100700-23 = "不過他還真了不起啊，乙花堇。"
84310100700-24 = "這傢伙能從那傢伙手中逃出來，反而更讓我佩服。#n真是不得了的天賦啊。"
84310100700-26 = "你們的表情都很沉重呢。#n要是被抓住的話，我也會被迫參與那可怕的訓練嗎？真的會很累嗎？"
84310100700-27 = "累？不，與其這麼說…… "
84310100700-29 = "（寧瑠向聖亞表示他的直覺很好，幸好沒有被堇抓住）"
84310100700-32 = "參加乙花堇訓練的學生，能順利完成的比例在2%以下。#n能夠自己走回家的比例則低於1%。"
84310100700-33 = "……那其餘的98%呢？"
84310100700-34 = "這個嘛……"
84310100700-36 = "（繼續聽著兩人說明的聖亞，即使沒有訓練也不禁冷汗直流）"

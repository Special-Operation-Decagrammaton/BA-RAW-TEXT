[translation]
84310100700-6 = "อะไรกัน มีเรื่องอะไรน่ะ...????"
84310100700-7 = "ดูทำหน้าเข้าสิ... ทำหน้าเหมือนคนที่เพิ่งผ่านความเป็นและความตายมาอย่างนั้นละ"
84310100700-11 = "หรือว่า...! เกิดเรื่องอะไรขึ้นงั้นเหรอ?"
84310100700-12 = "ฉันบอกแล้วนี่นาว่าถ้ามีเรื่องอะไรก็ให้บอกกันน่ะ! ตกลงมันเกิดเรื่องอะไรขึ้น??"
84310100700-14 = "ปะ... เปล่าค่ะ ใจเย็นๆ ก่อนเถอะค่ะ ไม่ได้เกิดปัญหาอะไรหรอก"
84310100700-15 = "ไม่สิ จริงๆ มันก็มีเรื่องอยู่บ้าง แต่ไม่ใช่เรื่องที่คิดกันหรอกค่ะ ก็แค่..."
84310100700-18 = "(เล่าให้เนรุกับริโอะฟังว่าไปเจอเรื่องอะไรในงานเอ็กซ์โปมาบ้าง)"
84310100700-21 = "อ่า... อืม... งั้นสินะ..."
84310100700-22 = "ฉันก็ได้ยินมาว่ายังฟิตแบบนั้นอยู่เหมือนเดิม..."
84310100700-23 = "ยอดเยี่ยมไปเลยนะ โอโทฮานะ สึมิเระ"
84310100700-24 = "ไม่สิ ฉันว่าคนที่ยอดเยี่ยมกว่าคือเซอาที่วิ่งหนีสึมิเระมาได้ต่างหาก ความสามารถน่าเหลือเชื่อเลยนะ"
84310100700-26 = "ทำไมทำสีหน้ามืดมนอย่างนั้นล่ะคะ ถ้าฉันหนีไม่รอด ฉันคงต้องไปเทรนสุดหฤโหดแบบนั้นใช่มั้ยคะ? ถ้าเป็นอย่างนั้นก็คงเหนื่อยมากๆ หรือเปล่าคะ?"
84310100700-27 = "เหนื่อยหรือเปล่าน่ะเหรอ? ไม่หรอก ต้องเรียกว่า... "
84310100700-29 = "(เนรุบอกเซอาว่าโชคดีแล้วที่ลางสังหรณ์ดี และไม่ถูกสึมิเระรั้งไว้ได้)"
84310100700-32 = "เปอร์เซ็นต์นักเรียนที่ผ่านโปรแกรมการเทรนของโอโทฮานะ สึมิเระมีไม่ถึง 2% แล้วคนที่กลับบ้านได้เองก็มีไม่ถึง 1%"
84310100700-33 = "แล้ว 98% ที่เหลือล่ะคะ...?"
84310100700-34 = "เรื่องนั้นน่ะ..."
84310100700-36 = "(เซอาฟังคำอธิบายต่อจากทั้งสองคน และถึงกับเหงื่อตก แม้ว่าตัวเองจะไม่ได้ไปเทรนด้วยก็ตาม)"

[translation]
33190-1 = "第19話;私たちの物語"
33190-4 = "はぁ、はぁ……。"
33190-5 = "くっ……"
33190-10 = "……何故だ、アズサ。"
33190-11 = "何故そこまで足掻く。そこに何の意味がある？何を証明しようとしている？"
33190-12 = "思い出せ、全ては――"
33190-16 = "……たとえ虚しくても、足掻くと決めた。"
33190-17 = "そこに、何の意味がある！！！"
33190-24 = "ぐっ……！！"
33190-30 = "……！？"
33190-31 = "……。"
33190-32 = "ヒフ、ミ……？"
33190-34 = "増員、ですね……数は4、いえ、後ろにそれ以上……。"
33190-35 = "あれは……。"
33190-43 = "……なんだ、お前は？"
33190-44 = "普通の、トリニティの生徒です。"
33190-45 = "ヒフミ、ダメだ……どうしてこんなところに……。"
33190-46 = "ここはヒフミみたいな、普通の人が来るべきところじゃ……。"
33190-47 = "……。"
33190-48 = "……はい、確かに私は普通で平凡です。"
33190-49 = "先日見せてくれたガスマスクの姿が、本当のアズサちゃんなのだと。そのことも理解しました。"
33190-50 = "そんなアズサちゃんは本当なら、私なんかには手の届かない世界に生きてるのだと……そう言いたいのも分かりました。"
33190-51 = "ヒフミ……？"
33190-52 = "でも！！！"
33190-53 = "アズサちゃんは一つ、大きな間違いをしています！！！"
33190-54 = "……！？"
33190-55 = "今ここで、私の本当の姿をお見せします！！！"
33190-56 = "私の正体、それは……"
33190-60 = "「覆面水着団」のリーダー、ファウストです！！"
33190-62 = "……え？"
33190-63 = "見てください、この恐ろしさ！アズサちゃんと並んだって、全然見劣りしないほど不気味でしょう！こっちの方が恐ろしくて怖いと言う人だっているはずです！"
33190-64 = "ひ、ヒフミ……？"
33190-66 = "……。"
33190-67 = "……！？"
33190-68 = "……。"
33190-70 = "ヒフミ、いったい何を――"
33190-71 = "だからっ！！"
33190-75 = "だから私たちは、違う世界にいるなんてことはありません！"
33190-76 = "……。"
33190-77 = "同じです！隣にだっていられます！"
33190-78 = "だから世界が違うだなんて、一緒にいられないだなんて……そんなことを言わないでください！"
33190-79 = "拒絶されても、すぐ近くに行ってみせます！私は……！"
33190-80 = "……私は、アズサちゃんのそばにいます！"
33190-81 = "こうやって、すぐ触れられるところに……！"
33190-82 = "ヒフミ……"
33190-83 = "でも、私のためにそんな嘘を言ってくれたところで……"
33190-84 = "誰が嘘だって！？"
33190-91 = "いや～、何だか大事なところみたいだね？"
33190-93 = "あの覆面、まさか……！？"
33190-94 = "！？"
33190-95 = "っ！？"
33190-99 = "目には目を、歯には歯を。無慈悲に、孤高に、#n我が道の如く[ruby=まきょう]魔境[/ruby]を行く……"
33190-100 = "ん、それが私たちのモットー。"
33190-101 = "普段はアイドルとして活動してますが、夜になると悪人を倒す副業をしてるグループなんです♧"
33190-102 = "別にそれ私たちのモットーじゃないから！？あと変な設定付けないで！"
33190-103 = "覆面水着団のリーダーであるファウストさんのご命令で、集合しました！"
33190-104 = "……！？"
33190-105 = "え、えっ！？"
33190-106 = "じ、実在したんですね……？"
33190-107 = "あいつらは……。"
33190-108 = "……分からない。詳細なデータは無し。"
33190-109 = "ふ、覆面水着団……噂に過ぎないと思ってましたが、本当にいたんですねえ……。"
33190-110 = "……リーダー、あいつらヘラヘラしてるけど注意した方が良さそう。少なくとも舐めてかかると痛い目に遭う。"
33190-111 = "……。"
33190-116 = "なーにうちのリーダーを泣かせようとしてるのかな～？ねぇ、そこの君たち？"
33190-117 = "どこの誰なのか知らないけど、知らないよ？うちのファウストさんは怒ると怖いんだから。"
33190-118 = "何せファウストちゃんは最終的に、カイザーコーポレーションの幹部を倒しちゃったようなものなんですよ♧"
33190-119 = "ブラックマーケットの銀行だって襲える。朝飯前みたいに。"
33190-120 = "それにこの間なんて、カイザーPMCを砲撃で吹っ飛ばしたんだからね！"
33190-121 = "そうだよ、恐ろしいんだよ～？生きて動く災いと言っても過言じゃないし、暗黒街を支配するボスみたいなものなんだから。"
33190-122 = "うん、それがファウスト。"
33190-128 = "ファウスト！ファウスト！！ファウスト！！！"
33190-133 = "……。"
33190-134 = "ああっ、ファウストちゃんが紙袋を取ってしまいました！？"
33190-138 = "あ～、流石に恥ずかしかったのかなー……？"
33190-142 = "せ、せっかく乗っかってあげたのに！"
33190-143 = "私は何も恥ずかしくないけど。"
33190-144 = "シロコ先輩も、堂々としてないで早く取って！"
33190-148 = "ん……。"
33190-149 = "ま、まあとにかく、あらためて……。"
33190-150 = "対策委員会、今度はヒフミさんのことを助けに来ました！！"
33190-152 = "ありがとうございます、対策委員会のみなさん……。"
33190-164 = "ひひひひひひ……。"
33190-165 = "正義実現委員会、助けに参りました。"
33190-166 = "い、委員長、怪我は……？"
33190-167 = "完治した。"
33190-168 = "さ、さすがです！"
33190-169 = "私はツルギほど丈夫ではないので、まだですが……とはいえ少しは役立つはずです。力になると、約束しましたから。"
33190-174 = "この間はよくも……！無事に帰れると思うなよ！"
33190-175 = "……委員長は？"
33190-176 = "……。"
33190-182 = "っ、先生……。"
33190-183 = "無事だった、のね……良かった……。"
33190-184 = "どうやってここを……？まあ先生には、今さらか……。"
33190-185 = "[s] \"ヒナ……。\""
33190-186 = "私は……もう……。"
33190-187 = "ごめん、先生……私には、もう無理。"
33190-188 = "私はもうダメ……だから……ガッカリさせて、悪いのだけど……。"
33190-189 = "今は、帰ってほしい……私はもう、引退したと思ってもらって……。"
33190-190 = "[ns] \"……ヒナ。\""
33190-192 = "[ns] \"違うよ。私はここに、お礼を言いに来た。\""
33190-193 = "お、お礼……？どうして……。"
33190-194 = "先生を助けたことについてなら、気にしなくて良い……。"
33190-195 = "それは当然私がやるべきことで、それにあの時私は……。"
33190-196 = "[s1] \"ううん。いつも頑張ってくれてありがとうって。\"\n[s2] \"もう頑張り過ぎなくても良いって、早く言ってあげたかった。\""
33190-197 = "……っ！"
33190-198 = "……っ！"
33190-199 = "[s] \"ヒナは、ずっと頑張ってたから。\""
33190-200 = "……。"
33190-201 = "[s] \"それを言いたかった。だから休んでて、あとは私が何とかする。\""
33190-202 = "ま、待って、何とかって……。"
33190-203 = "でも、私は……。"
33190-204 = "私……。"
33190-205 = "……。"
33190-206 = "私は……[ruby=たかなし]小鳥遊[/ruby]ホシノみたいには、なれない……。"
33190-207 = "[s] \"……ホシノ？\""
33190-208 = "私はあの、アビドスの副会長みたいな……強い人じゃない……。"
33190-209 = "アビドスの生徒会長……その遺体を発見したのは、小鳥遊ホシノだった。すごく、ものすごく大切な人だったはずなのに……。"
33190-210 = "あれだけの苦しみを味わっておきながら、彼女はまだアビドスで戦ってる……私には、そんなことできない……。"
33190-211 = "私は、そこまで強くなれない……あの瞬間私は、もう……。"
33190-212 = "[s] \"ヒナ……。\""
33190-213 = "私だって頑張った！！"
33190-214 = "いつも頑張って、どうにかしようとして……。"
33190-215 = "分かってもらえなくても、それでも……。"
33190-216 = "けど私は、大事なところで……。"
33190-217 = "先生は、ズルい……私はあの瞬間もう、ダメで……なのに、そんなことを言って……。"
33190-218 = "私だって、小鳥遊ホシノや補習授業部みたいに……"
33190-219 = "先生に構ってほしかった、褒められたかった！！"
33190-220 = "[s] \"…………。\""
33190-221 = "……あっ。"
33190-222 = "ご、ごめん……今のは、その……。"
33190-223 = "[s] \"ヒナ、本当にごめん！\""
33190-224 = "！？"
33190-225 = "[s3] \"ヒナも今度、補習授業しよう！\"\n[s4] \"それで成績が良かったらもちろん、たくさん褒めるから！\""
33190-226 = "……。"
33190-227 = "……。"
33190-228 = "え、いや私、成績は元々良いし……だいたい満点だけど……。"
33190-229 = "[s] \"それとも水着パーティする！？すぐにでも準備するよ！\""
33190-230 = "えっと、それも別に……。"
33190-231 = "……。"
33190-232 = "……はぁ。"
33190-233 = "ふふっ……。"
33190-234 = "……ところで先生、実は私に頼みたいことがあるんじゃない？"
33190-235 = "[s] \"でも、ヒナは引退したって考えると……\""
33190-236 = "……それは言ってみただけ。少し、みんなに甘えてみたかっただけ。"
33190-238 = "行こう、先生。"
33190-242 = "委員長……！"
33190-243 = "……待たせてごめん、アコ。みんなも無事で良かった。"
33190-244 = "いえ……はいっ！！"
33190-248 = "準備はできてるわね。先生の指示を待とう。"
33190-250 = "包囲、されてしまいましたねぇ……。"
33190-251 = "これはちょっと厳しいんじゃない、リーダー？"
33190-252 = "知ったことか。無限に増殖する「ユスティナ聖徒会」の前では等しく無意味。"
33190-253 = "……むしろ好都合だ。アズサだけでなく、この場の全員に知らせてやれ。"
33190-254 = "この世界の真実を……殺意と憎しみに満ちたこの世界で、あらゆる努力は無駄なのだと。"
33190-255 = "足掻こうと何の意味もない、全ては無駄なのだということを！！"
33190-259 = "……。"
33190-260 = "[s] 頷く。"
33190-261 = "ヒフミ……。"
33190-262 = "アズサちゃん、私は今すごく怒ってます。すっごくです。"
33190-263 = "……。"
33190-264 = "ですが……それ以上に、無事でよかったです。"
33190-265 = "すっごく怒ってましたが、よく考えてみればそれはアズサちゃんのせいではありません。ですから、私はもう怒っていません。"
33190-266 = "ヒフミ……。"
33190-270 = "ですが、あの方々についてはまだ怒っています。"
33190-271 = "殺意ですとか、憎しみですとか……それが、この世界の真実ですとか……"
33190-272 = "それを強要して、全ては虚しいのだと言い続けてましたが……"
33190-273 = "それでも、私は……！"
33190-276 = "ヒフミ"
33190-277 = "[7cd0ff]補習授業部[-]"
33190-278 = "アズサちゃんが人殺しになるのは嫌です……。"

33190-371 = "あ、雨雲が……。"
33190-372 = "気象の操作……？いや、これは……。"
33190-373 = "き、奇跡、ですか……？"
33190-374 = "っ、奇跡なんて無い！何これ……！"
33190-375 = "まさか、戒律が……？"
33190-378 = "[ns] \"ここに宣言する。\""
33190-380 = "[ns] \"私たちが、新しい[ruby=ETO]エデン条約機構[/ruby]。\""
33190-381 = "なっ……！？"
33190-383 = "まさか……"
33190-384 = "これはエデン条約……先生、君は……"
33190-385 = "元々は、連邦生徒会長が作るはずだった条約……"
33190-386 = "そしてその連邦生徒会長が設立した、超法規的機関「シャーレ」……"
33190-387 = "まさか「シャーレ」が連邦生徒会長を代行すると？いや、そう解釈できるように捻じ曲げた……？"
33190-388 = "アリウスと、同じ……。"
33190-389 = "条約の主体であるゲヘナ、ティーパーティー、正義実現委員会、そして風紀委員会たちが集まって……"
33190-390 = "かつて古聖堂があった廃墟で……"
33190-391 = "条約の発起人である連邦生徒会長の代わりに、先生が……"
33190-392 = "楽園の名を冠する約束を、再現した……？"
33190-393 = "……。"
33190-394 = "契約を曲解し、歪曲し、望み通りの結果を捏造する……"
33190-395 = "「大人」のやり方には「大人」のやり方で、か……"
33190-397 = "……リーダー、ユスティナの統制がおかしくなってる。"
33190-398 = "！！"
33190-411 = "こ、混乱してますね……[ruby=ETO]エデン条約機構[/ruby]を助けるというのが戒律、しかし今はETOが二つあって……。"
33190-412 = "っ、知ったことか！！！！"
33190-413 = "ハッピーエンドだと！？ふざけるな！そんな言葉で、世界が変わるとでも！？"
33190-414 = "それだけでこの憎しみが、不信の世界が変わるとでも言うつもりか！？何を夢のような話を……！"
33190-415 = "[s] \"生徒たちの夢を……その実現を助けるのは、大人の義務だから。\""
33190-416 = "……っ！"
33190-417 = "[s5] \"私は生徒たちが願う夢を信じて、それを支える。\"\n[s6] \"生徒たち自身が心から願う夢を。\""

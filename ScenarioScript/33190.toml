[translation]
33190-1 = "第19話;我們的故事"
33190-4 = "哈啊，哈啊……"
33190-5 = "咕……"
33190-10 = "……為什麼，梓。"
33190-11 = "為什麼要這麼掙扎。那其中有什麼意義？妳要證明什麼？"
33190-12 = "回想起來，全都是──"
33190-16 = "……就算是徒勞的，我也決定要掙扎。"
33190-17 = "那其中，有什麼意義！！！"
33190-24 = "咕……！！"
33190-30 = "……！？"
33190-31 = "……"
33190-32 = "日步，美……？"
33190-34 = "是增援，呢……數量有4，不，後面還有更多……"
33190-35 = "那是……"
33190-43 = "……什麼啊，妳是誰？"
33190-44 = "普通的，三一的學生。"
33190-45 = "日步美，不行……為什麼來這種地方……"
33190-46 = "這裡不是像日步美這樣，普通的人該來的……"
33190-47 = "……"
33190-48 = "……沒錯，我確實普通又平凡。"
33190-49 = "前幾天給我看的帶著防毒面罩的樣子，才是真正的梓醬。這件事我也理解了。"
33190-50 = "那樣的梓醬實際上，活在我這種人觸不可及的世界……我也理解了妳是想這麼說的。"
33190-51 = "日步美……？"
33190-52 = "但是！！！"
33190-53 = "梓醬有一個天大的錯誤！！！"
33190-54 = "……！？"
33190-55 = "現在在這裡，讓妳看看我真正的樣子！！！"
33190-56 = "我的真實身分，那就是……"
33190-60 = "「泳裝蒙面團」的隊長，浮士德！！"
33190-62 = "……咦？"
33190-63 = "請看，這個恐怖程度！就算和梓醬站在一起，也完全不會輸的讓人毛骨悚然吧！也應該會有人認為這樣更嚇人更恐怖才對！"
33190-64 = "日，日步美……？"
33190-66 = "……"
33190-67 = "……！？"
33190-68 = "……"
33190-70 = "日步美，到底在──"
33190-71 = "所以！！"
33190-75 = "所以我們，並沒有在不同的世界！"
33190-76 = "……"
33190-77 = "是一樣的！可以站在身邊！"
33190-78 = "所以世界不一樣什麼的，不能在一起什麼的……請不要說那種話！"
33190-79 = "就算被拒絕，也會立刻到妳身邊！我……！"
33190-80 = "……我，會待在梓醬身邊！"
33190-81 = "像這樣，可以馬上觸及到妳的地方……！"
33190-82 = "日步美……"
33190-83 = "但是，就算為了我說那種謊也……"
33190-84 = "妳說誰說謊了！？"
33190-91 = "咿呀～感覺是個重要的地方呢？"
33190-93 = "那個面罩，該不會……！？"
33190-94 = "！？"
33190-95 = "！？"
33190-99 = "以眼還眼，以牙還牙。不管人情世故，孤高地走在眾人所畏懼的魔境……"
33190-100 = "嗯，那就是我們的座右銘。"
33190-101 = "雖然平常作為偶像活動，不過到了晚上就會進行打倒惡黨的副業的集團♧"
33190-102 = "那才不是我們的座右銘！？還有別追加奇怪的設定！"
33190-103 = "遵照隊長浮士德的命令，泳裝蒙面團集合了！"
33190-104 = "……！？"
33190-105 = "咦，咦！？"
33190-106 = "實，實際存在呢……？"
33190-107 = "那些傢伙是……"
33190-108 = "……不知道。沒有詳細資料。"
33190-109 = "泳，泳裝蒙面團……還以為只是謠言，原來真的存在呢……"
33190-110 = "……隊長，那些傢伙雖然笑嘻嘻的不過還是注意一下比較好。至少低估的話會嚐到苦頭。"
33190-111 = "……"
33190-116 = "怎麼可以把我們的隊長弄哭呢～？吶，那邊的各位？"
33190-117 = "雖然不知道妳們是哪裡的誰，不過我不管唷？我們的浮士德隊長生起氣來可是很可怕的。"
33190-118 = "畢竟浮士德醬是，最終把凱薩公司的幹部打倒的人物唷♧"
33190-119 = "也會襲擊黑市的銀行，就像飯前運動一樣。"
33190-120 = "而且，上次還用砲擊把凱薩PMC轟飛了呢！"
33190-121 = "沒錯唷，很恐怖唷～？說是活著行走的災害也不言過，是個像支配暗黑街的BOSS一樣的人物。"
33190-122 = "嗯，那就是浮士德。"
33190-128 = "浮士德！浮士德！！浮士德！！！"
33190-133 = "……"
33190-134 = "啊啊，浮士德醬把紙袋脫掉了！？"
33190-138 = "啊～果然還是覺得丟臉嗎……？"
33190-142 = "虧，虧我都那麼配合了！"
33190-143 = "我完全不覺得丟臉。"
33190-144 = "白子前輩也是，不要正氣凜然了快點脫掉！"
33190-148 = "嗯……"
33190-149 = "呃，嘛總而言之，再重來一次……"
33190-150 = "對策委員會，這次前來幫助日步美同學了！！"
33190-152 = "謝謝妳們，對策委員會的各位……"
33190-164 = "嘻嘻嘻嘻嘻嘻……"
33190-165 = "實現正義部，前來幫忙了。"
33190-166 = "部，部長，傷勢呢……？"
33190-167 = "痊癒了。"
33190-168 = "不，不愧是部長！"
33190-169 = "我不像弦生那麼結實，所以還沒……不過應該能幫上一點忙。因為約定好了，要成為助力。"
33190-174 = "之前竟敢……！別想平安回去！"
33190-175 = "……委員長呢？"
33190-176 = "……"
33190-182 = "呃，老師……"
33190-183 = "你沒事，呢……太好了……"
33190-184 = "怎麼找到這裡的……？不過對老師來說，該說事到如今嗎……"
33190-185 = "[s]「陽奈……」"
33190-186 = "我……已經……"
33190-187 = "對不起，老師……我已經，不行了。"
33190-188 = "我不行了……所以……對不起，讓你失望……"
33190-189 = "現在，請你回去……就當作我，已經引退了……"
33190-190 = "[ns]「……陽奈。」"
33190-192 = "[ns]「不是唷，我是來這裡，向妳道謝的。」"

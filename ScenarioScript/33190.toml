33190-207 = "[s]「……星野？」"
33190-208 = "我不像，那個阿拜多斯的副會長一樣……是個堅強的人……"
33190-209 = "阿拜多斯的學生會長……找到那個遺體的，是小鳥遊星野。明明是重要的，非常重要的人……"
33190-210 = "在體會了那麼多痛苦之下，她還在阿拜多斯戰鬥著……我，沒辦法做到那種事……"

41050-85 = "3;미야코;05;저희가 발키리 경찰학교로의 전학을 거부하고 농성을 하게 된 이유는 총학생회의 결정에 항의하기 위함이었는데, 샬레의 숙소를 빌려 편안한 생활을 누리게 된다면 그 의미가 퇴색됩니다."

41050-12 = "3;모에;02;이제야 겨우 다시 모였네. 취조는 이걸로 다 끝난 건가?\n#3;em;[?]"
41050-13 = "3;모에;03;볼일이 다 끝났으면 빨리 내보내 주었으면 좋겠는데. 가지고 있던 사탕이 다 떨어진 참이었거든."
41050-14 = "5;사키 헬멧;05;한가한 소리 하지 마, 모에. 여유롭게 있을 상황이 아니거든?\n#5;em;[빠직]\n#5;al\n#3;m1"
41050-15 = "5;사키 헬멧;11;우리를 이렇게 한 자리에 불러 모았다는 건…… 이제 우리의 처분이 결정되었다는 뜻이야."
41050-16 = "5;사키 헬멧;99;홧김에 저지르긴 했지만, 발키리의 학생들과 그렇게 요란한 총격전을 벌였으니…… 최소한 퇴학은 각오해야겠지."
41050-17 = "3;모에;05;호들갑 떨기는. 어차피 SRT 학원은 사라졌잖아. 퇴학 처분을 당해 봤자 바뀌는 것도 없다고.\n#3;em;[반응]"
41050-18 = "#all;hide"
41050-19 = "3;미유ND;02;하, 하지만 최소한의 처분이 퇴학이라면…… 그 이상의 벌을 받을 수도 있다는 뜻 아냐?\n#3;em;[땀]\n#3;stiff\n#3;a"

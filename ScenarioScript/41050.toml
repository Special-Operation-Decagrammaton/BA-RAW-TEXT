[translation]
41050-1 = "第4話;揮之不散的疑心"
41050-2 = "女武神警察學園．大廳"
41050-8 = "啊……大家都沒事啊。"
41050-9 = "什麼啊，都子也在啊。"
41050-10 = "都子醬……"
41050-12 = "終──於結束了啊……結束了吧？"
41050-13 = "我想趕快回去，糖果已經吃完了……"
41050-14 = "是說那種閒話的時候嗎。"
41050-15 = "接下來才要告知我們的處分吧？"
41050-16 = "看那個感覺……至少要有被退學的覺悟呢。"
41050-17 = "就算那麼說，反正SRT特殊學園也不在了吧。就算被退學也什麼都沒變嘛。"
41050-19 = "可，可是，那是「至少」的話……"
41050-20 = "嘛，也有更糟的可能性呢。"
41050-21 = "被帶去地下的可疑設施被迫做各種事，被當成小白鼠之類的……"
41050-22 = "！？！？"
41050-23 = "已，已經完蛋啦……"
41050-29 = "對不起，如果我能做得更好……"
41050-30 = "大家就不用遭受這種待遇了……"
41050-31 = "……喂，你為什麼要道歉？"
41050-32 = "幹嘛，你有責任感啊？"
41050-33 = "都子，不要誤會了。從決定關閉學園的那個瞬間，你就不是小隊長了。"
41050-34 = "就算你擅自覺得有責任也只會讓人困擾。現在也沒有在期待那種事。"
41050-35 = "那是……但是，我……"
41050-36 = "[s] 「辛苦了。」"
41050-37 = "你，你是……"
41050-38 = "夏，夏萊的……？"
41050-39 = "噫……！？"
41050-40 = "[s] 「……感覺我得先說聲抱歉了。」"
41050-42 = "你還在啊，老師。"
41050-43 = "來女武神有什麼事嗎？"
41050-44 = "……還是說，難道你有事找我們？"
41050-45 = "[s]「嗯。要告訴大家行政委員會對這件事的處分。」"
41050-47 = "……！"
41050-48 = "嘛，不管是什麼樣的處分都無所謂。"
41050-49 = "……"
41050-53 = "[ns1] 「總之，全員釋放。」\n[ns2] 「已經自由了唷。要去哪裡都沒關係。」"
41050-56 = "……什麼？"
41050-57 = "……釋放？處罰呢？"
41050-58 = "等等，也就是我們可以回到SRT嗎？"
41050-59 = "[s]「不。那個沒辦法……」"
41050-60 = "什麼啊，白高興了。"
41050-64 = "意思是在公園的作戰成功……作為功績，變成由夏萊決定處分嗎？"
41050-65 = "……雖然難以理解，不過至少得知了現況。"
41050-66 = "所以，老師想讓我們做什麼呢？"
41050-67 = "[s] 「就算問我也……大家想做什麼呢？」"
41050-68 = "為什麼要反問我們……"
41050-69 = "不能回SRT的話，去哪裡也都一樣……"
41050-70 = "總之我想找地方休息。已經累到不行了……"
41050-71 = "[s] 「你們可以在夏萊休息，也可以在那裡生活唷？」"
41050-72 = "……哈啊？"
41050-73 = "把女學生聚集到自己家，是想做什麼？"
41050-75 = "……真不敢相信。"
41050-76 = "果，果然，老師還在記恨之前的事……"
41050-77 = "哎呀……肯定會被強迫做很多下流的事吧～"
41050-78 = "聽說夏萊設置了很多竊聽器。"
41050-79 = "竊，竊聽我們的生活，打算做什麼……！？"
41050-80 = "要強迫我們做普通的漫畫沒辦法畫的事情？"
41050-81 = "[s3] 「不會不會不會！！」\n[s4] 「事情往奇怪的方向加速了！！」"
41050-84 = "……雖然是難得的好意，不過我們沒辦法接受這個提案。"
41050-85 = "要是在夏萊度過舒適的生活，本來「對聯邦學生會進行抗議」的目的就無法成立了。"
41050-87 = "就算去夏萊，也不會有完善的規律和訓練吧？"
41050-88 = "一天兩天就算了，我無法忍受一直待在那種地方。"
41050-89 = "而且也一定禁止使用危險物品……"
41050-90 = "要，要人馬上相信，實在有點……"
41050-91 = "[s] 「那樣的話，在那座公園露營之類的如何？」"
41050-93 = "那座公園……進行示威的，那個地方嗎？"
41050-94 = "「兔寶寶公園」嗎……我無所謂。反正以環境來說，就像SRT的野戰訓練場一樣。"
41050-95 = "我也沒差。而且裝備都放在那邊了。"
41050-96 = "我，我也……"
41050-98 = "以某種意義來說也算示威的延續，對我們來說是沒關係……"
41050-99 = "但老師這樣沒問題嗎？"
41050-100 = "[s5] 「我當然沒問題……」\n[s6] 「大家才是，那樣沒問題嗎？如果有什麼我能幫忙的……」"
41050-101 = "沒關係。我們可不是無力的孩子。"
41050-102 = "沒關係。我們可不是無力的孩子。"
41050-103 = "而且……之前也說過了，我們並不信任老師。"
41050-104 = "就算像這樣對我們施展溫情，那也不會改變。"
41050-105 = "[s7]「嗯，關於那點沒關係。」\n[s8] 「大家不難受的話，那就好了。」"
41050-110 = "……奇怪的人。"
41050-111 = "那麼……"
41050-112 = "下次見面的時候就是敵人了！"
41050-113 = "不，一開始就是敵人啊。"
41050-120 = "等，等等……！？不要丟下我……！"
41050-122 = "下一話;開始籌措糧食吧"

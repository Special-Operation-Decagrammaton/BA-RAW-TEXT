[translation]
41050-1 = "ตอนที่ 5; ความไม่ไว้ใจที่ไม่อาจจางหายไป"
41050-2 = "ล็อบบี้อาคารส่วนกลาง สถาบันฝึกตำรวจวัลคิรี่"
41050-8 = "ทุกคน... ปลอดภัยใช่ไหมคะ?"
41050-9 = "อะไรเนี่ย มิยาโกะก็อยู่ตรงนี้ด้วยเหรอ"
41050-10 = "มิยาโกะจัง..."
41050-12 = "ในที่สุดก็มารวมตัวกันอีกครั้งสินะ สอบสวนเสร็จแล้วใช่ไหม?"
41050-13 = "ถ้าหมดธุระแล้วก็รีบๆ ปล่อยเราไปได้แล้วล่ะ ลูกอมที่พกมาด้วยไม่เหลือแล้วเนี่ย"
41050-14 = "อย่าพูดเหมือนนี่เป็นเรื่องชิลๆ สิโมเอะ เราไม่ได้มีเวลาว่างไปหาลูกอมกินนะ?"
41050-15 = "การที่พวกเราถูกเรียกมารวมตัวกันแบบนี้... หมายความว่าพวกนั้นตัดสินใจแล้วว่าจะลงโทษเรา"
41050-16 = "ถึงจะพลั้งก่อเรื่องไปด้วยความโมโหก็เถอะ แต่เราก็ดวลปืนกับนักเรียนวัลคิรี่ซะจนวุ่นวายเลย... อย่างน้อยที่สุดก็คงถูกไล่ออกล่ะนะ"
41050-17 = "อย่ากังวลให้มันมากไปเลยน่า ยังไงสถาบัน SRT ก็ไม่เหลือแล้ว ถึงจะโดนไล่ออกก็ไม่มีอะไรเปลี่ยน#nแปลงอยู่ดี"
41050-19 = "ถะ... ถ้าการถูกไล่ออกคือ 'อย่างน้อย' ... งั้นแปลว่าเราอาจได้รับโทษที่หนักกว่านั้นงั้นเหรอ?"
41050-20 = "ก็อาจจะเป็นไปได้"
41050-21 = "อาจจะโดนลากตัวไปชั้นใต้ดินที่เต็มไปด้วยอุปกรณ์น่าสงสัยแล้วโดนใช้แรงงาน หรืออาจจะให้เข้าร่วม#nการทดลองที่น่าสงสัยก็ได้..."
41050-22 = "??!!!"
41050-23 = "จบ... จบกัน... พวกเราจบเห่แล้ว..."
41050-29 = "ขอโทษด้วยนะคะ ถ้าฉันพยายามมากกว่านี้ละก็..."
41050-30 = "สมาชิกกองทหารทุกคนคงไม่ต้องมาเจอเรื่องยุ่งยากแบบนี้..."
41050-31 = "เดี๋ยวก่อนสิ... ทำไมเธอถึงต้องขอโทษด้วยล่ะ?"
41050-32 = "นั่นสิ คิดว่าพวกเราทำในสิ่งที่ไม่อยากทำเพราะคำสั่งของเธองั้นเหรอ?"
41050-33 = "อย่าเข้าใจผิดสิมิยาโกะ ตั้งแต่มีการสั่งปิดโรงเรียน เธอก็ไม่ได้เป็นหัวหน้ากองทหารอีกแล้วนะ"
41050-34 = "อย่ามาแกล้งทำเป็นรับผิดชอบเลยน่า ฉันไม่ได้คาดหวังอะไรจากเธอตั้งแต่แรกอยู่แล้ว"
41050-35 = "พอดีฉัน... เอ่อ..."
41050-36 = "[s] \"หวัดดีทุกคน\""
41050-37 = "เอ๋? คุณคือ...?"
41050-38 = "หาา? คุณครูจากชาเล่ต์?"
41050-39 = "เฮือกกก!?"
41050-40 = "[s] \"ดูจะยังไม่ต้อนรับกันเหมือนเดิมเลยนะ...\""
41050-42 = "ยังอยู่ที่นี่อีกเหรอคะคุณครู"
41050-43 = "ยังเหลืองานที่ต้องจัดการที่สถาบันฝึกตำรวจวัลคิรี่อีกเหรอคะ?"
41050-44 = "หรือว่า... มีธุระอะไรกับพวกฉันเหรอคะ?"
41050-45 = "[s] \"อื้ม ครูมาบอกผลการพิจารณาของคณะกรรมการบริหาร\""
41050-47 = "เฮือกก!"
41050-48 = "งั้นก็รีบบอกมาเลย ไม่ต้องลีลา ไม่ว่าจะได้รับโทษอะไร พวกเราก็ยังมีความคิดเดิมไม่เปลี่ยน"
41050-49 = "(กลืนน้ำลาย)......"
41050-53 = "[ns1] \"ปล่อยตัวกองทหาร RABBIT ทุกคน\"\n[ns2] \"พวกเธอเป็นอิสระแล้ว อยากไปไหนก็ไปได้เลย\""
41050-56 = "คะ...?"
41050-57 = "ปล่อยตัวเหรอ? ไม่ต้องรับโทษหรอกเหรอ?"
41050-58 = "เดี๋ยวนะ แปลว่าเรากลับไปเรียนต่อที่สถาบัน SRT ได้เหรอ?"
41050-59 = "[s] \"ไม่ใช่ แบบนั้นน่าจะยากนะ...\""
41050-60 = "ชิ... อุตส่าห์ดีใจ"
41050-64 = "เป็นแบบนี้นี่เองสินะ... ชาเล่ต์เข้าควบคุมสถานการณ์ที่สวนสาธารณะได้สำเร็จ ก็เลยได้มาจัดการ#nพวกเราแทน ใช่ไหมคะ?"
41050-65 = "ถึงจะเข้าใจได้ยาก แต่ก็รับทราบค่ะ"
41050-66 = "ถ้าอย่างนั้นคุณครูอยากสั่งให้พวกเราทำอะไรล่ะคะ?"
41050-67 = "[s] \"แล้วพวกเธออยากทำอะไรล่ะ?\""
41050-68 = "ถามกลับอย่างนั้นสินะ..."
41050-69 = "ถ้าไม่ได้กลับไปที่สถาบัน SRT... ไม่ว่าที่ไหนพวกฉันก็ไม่อยากไปหรอกค่ะ......"
41050-70 = "ฉันอยากกลับไปพักผ่อนที่หอพักก่อน โดนสอบสวนจนแทบไม่มีแรงแล้วเนี่ย~"
41050-71 = "[s] \"ไปอยู่ในที่พักชาเล่ต์สักระยะหนึ่งก่อนก็ได้นะ\""
41050-72 = "ต้องมีอะไรแน่ๆ..."
41050-73 = "ชวนนักเรียนผู้หญิงไปที่พักของตัวเองแบบนี้ คิดจะทำอะไรมิทราบ?"
41050-75 = "ใครจะไปเชื่อใจได้ล่ะคะ..."
41050-76 = "ยะ... ยังต้องมีจิตใจพยาบาทตั้งแต่เรื่องครั้งก่อนอยู่แน่..."
41050-77 = "ต้องทำอะไรไม่ดีกับพวกเราแน่เลย"
41050-78 = "จะว่าไป ฉันได้ยินมาว่าในที่พักของชาเล่ต์มีเครื่องดักฟังติดตั้งไว้เกลื่อนเลยด้วยนี่นะ"
41050-79 = "คะ... คิดจะใช้ประโยชน์จากจุดอ่อนของเราแล้วข่มขู่กันอย่างนั้นเหรอคะ?!"
41050-80 = "หรือว่าเอาเรื่องนี้มาเป็นข้ออ้างแล้วจะบังคับให้ทำเรื่องน่าอายแบบที่หาดูไม่ได้ในการ์ตูนโชเน็น..."
41050-81 = "[s3] \"คนเป็นครูไม่มีทางทำแบบนั้นอยู่แล้ว!\"\n[s4] \"นี่พวกเธอคิดว่าครูเป็นคนยังไงเนี่ย?!\""
41050-84 = "ขอบคุณสำหรับน้ำใจนะคะ แต่พวกฉันคงรับข้อเสนอไว้ไม่ได้หรอกค่ะ"
41050-85 = "ที่พวกฉันปฏิเสธการย้ายไปเรียนที่สถาบันฝึกตำรวจวัลคิรี่และไปประท้วงในสวนก็เพราะต้องการ#nคัดค้านการตัดสินใจขององค์การนักเรียน หากจะไปขอใช้ที่พักของชาเล่ต์แล้วใช้ชีวิตอย่างสุขสบาย#nอุดมการณ์ของเราคงหมดความหมายค่ะ"
41050-87 = "ใช่แล้ว อีกอย่างที่ชาเล่ต์ก็ไม่มีการฝึกพิเศษหรือการป้องกันเขตแดนด้วยนี่?"
41050-88 = "ถ้าวันสองวันคงไม่เป็นปัญหา แต่หากใช้ชีวิตหละหลวมไปเรื่อยๆ ระเบียบวินัยของ SRT ก็คงไม่เหลือ"
41050-89 = "แถมในชาเล่ต์ก็คงใช้อาวุธหรืออุปกรณ์ที่อันตรายไม่ได้..."
41050-90 = "จะให้เชื่อใจผู้ใหญ่ที่เพิ่งเคยเจองั้นเหรอ..."
41050-91 = "[s] \"งั้นไปตั้งค่ายในสวนสาธารณะนั้นไหม?\""
41050-93 = "สวนสาธารณะนั้น... หมายถึง 'โคะอุซางิ การ์เด้น' ที่พวกฉันไปประท้วงใช่ไหมคะ?"
41050-94 = "ถ้าเป็นที่นั่นฉันก็ไม่ติดอะไรหรอกนะ สภาพแวดล้อมมันก็คล้ายๆ กับสนามฝึกต่อสู้กลางแจ้งของ SRT"
41050-95 = "ฉันก็โอเคนะ อุปกรณ์ที่ต้องการก็อยู่ที่นั่นหมดแล้วด้วย"
41050-96 = "ฉะ... ฉันก็ไม่ติดอะไร..."
41050-98 = "คิดเสียว่าการไปตั้งค่ายที่นั่นคือการไปประท้วงต่อแล้วกัน แบบนี้คงไม่ขัดต่ออุดมการณ์ของพวกฉัน..."
41050-99 = "ว่าแต่คุณครูจะไม่ว่าอะไรเหรอคะ?"
41050-100 = "[s5] \"อืม ไม่ว่าอะไรหรอก\"\n[s6] \"แต่ไม่อยากให้ครูช่วยอะไรเหรอ?\""
41050-101 = "ถ้างั้นก็ดีค่ะ พวกฉันไม่ใช่เด็กไร้ทางสู้นี่คะ"
41050-102 = "ไม่เป็นไรค่ะ พวกฉันไม่ใช่เด็กไร้ทางสู้นี่คะ"
41050-103 = "และขอบอกอีกครั้งนะคะ พวกฉันยังไม่ไว้ใจคุณครูหรอกค่ะ..."
41050-104 = "ความหวังดีของคุณครูจะไม่มีทางทำให้พวกฉันเปลี่ยนใจค่ะ"
41050-105 = "[s7] \"ไม่เป็นไร ครูรู้แล้วล่ะ\"\n[s8] \"แค่พวกเธอได้สนุกกับการใช้ชีวิตก็พอ\""
41050-110 = "ผู้ใหญ่อะไรแปลกชะมัด..."
41050-111 = "งั้นไว้เจอกันใหม่นะคะ"
41050-112 = "เจอกันครั้งหน้าเราคือศัตรูกัน!"
41050-113 = "ไม่ได้เป็นศัตรูตั้งแต่แรกแล้วเหรอ...?"
41050-120 = "ซะ... ซากิจัง! โมเอะจัง! รอด้วย...!"
41050-122 = "ตอนต่อไป; แผนจัดหาอาหาร"

[translation]
2300802-1 = "優秀的修女"
2300802-2 = "三一大教堂的後方"
2300802-3 = "（依照瑪麗的指示，來到了三一大教堂的後方）"
2300802-4 = "……啊。我在這裡，老師。"
2300802-9 = "恭候多時了。"
2300802-10 = "感謝您，這麼臨時還願意過來。"
2300802-11 = "……咦？"
2300802-12 = "為什麼選這個時間嗎？不，並沒有什麼特別的原因……"
2300802-13 = "不好意思，是因為我只有這個時段有空……"
2300802-14 = "[s1] 「這樣啊，抱歉在你忙碌的時候過來。」\n[s2] 「應該在你更有空的時候過來的。」"
2300802-15 = "啊啊，不會，沒關係的。您能來我就很開心了。"
2300802-16 = "啊啊，不會，沒關係的。您能來我就很開心了。"
2300802-17 = "而且，我也只是和平常一樣在大教堂工作而已。"
2300802-18 = "……工作的內容是嗎？"
2300802-19 = "這個嘛，"
2300802-20 = "修女該做的事情有很多種……"
2300802-24 = "而我能做到的也就只有傾聽他人的懺悔，和他人分擔內心的傷痛而已。"
2300802-25 = "雖然不算是多偉大的事，不過也有藉由這樣的時間重新振作起來的人。"
2300802-26 = "……有點類似諮商師嗎？"
2300802-27 = "確，確實，說不定有點類似呢……"
2300802-28 = "但是，我無法做到諮商師那種程度……我能做到的，真的就只有傾聽而已。"
2300802-29 = "雖然我能做的僅只於此……但是如果能藉由傾聽，讓對方稍微向前邁進的話。"
2300802-30 = "我會打從心底感到高興的。"
2300802-31 = "所以……"
2300802-37 = "咳哼。如果老師願意的話，可以告訴我您有什麼煩惱嗎？"
2300802-38 = "……？"
2300802-39 = "啊，今天並不是因為有煩惱所以才會來……？只是想打個招呼……？"
2300802-40 = "失，失禮了……"
2300802-41 = "我似乎有點得意忘形而誤會了呢……？真是太羞恥了……"
2300802-42 = "嗯？看到我平時都很努力，就算有煩惱也已經消失了……？"
2300802-46 = "……呵呵。"
2300802-47 = "謝謝您，老師。"
2300802-48 = "聽到您這番話後，總覺得非常開心呢。"
2300802-49 = "[s3] 「瑪麗自己還好嗎？有沒有在逞強？」\n[s4] 「瑪麗也不要太勞累，要好好休息哦。」"
2300802-50 = "……不。"
2300802-51 = "……不。"
2300802-52 = "雖然您這麼說我很高興，但我不能就這麼放縱自己。我該做的事還有很多，離目標也還很遠。"
2300802-53 = "現在全力以赴的我……"
2300802-54 = "希望自己總有一天能成為優秀的「修女」。"
2300802-55 = "[s5] 「『成為』修女？」\n[s6] 「現在還不是修女嗎？」"
2300802-56 = "唔──嗯……該怎麼說呢……"
2300802-57 = "唔──嗯……該怎麼說呢……"
2300802-58 = "就像是，即使穿著修女服，也不代表誰都能立刻成為修女……的感覺？"
2300802-59 = "還有很多必須學習、必須知道的事……"
2300802-60 = "況且就算是現在，我被稱呼為「修女」都還會覺得有些羞愧。"
2300802-61 = "希望有朝一日，就算被他人稱為「瑪麗修女」也能問心無愧地回應……#n這就是我現在的夢想。"
2300802-62 = "所以現在得要把每件事情都盡全力做好才行。"
2300802-63 = "……？"
2300802-64 = "很了不起……是嗎？"
2300802-65 = "心境上已經完全是個修女了……？"
2300802-66 = "請，請別捉弄我了……！#n自己還完全不夠成熟這點，我比任何人都清楚……！"
2300802-67 = "雖，雖然很高興……但剛才那番話，我會當作沒聽見的。老師也真是的……"
2300802-68 = "[s7] 「但是，我真的這麼想喔。」\n[s8] 「瑪麗修女！瑪麗修女！」"
2300802-69 = "真，真是的……！"
2300802-70 = "真，真是的……！"
2300802-71 = "[s] 「瑪麗修女！！」"
2300802-72 = "請，請別再──"
2300802-78 = "……！？"
2300802-84 = "老，老師！？"
2300802-89 = "您，您沒事吧！？老師！？"
2300802-91 = "（幸好傷勢不重，過了一會就恢復意識，平安地回到了夏萊）"

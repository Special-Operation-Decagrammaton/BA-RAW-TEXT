[translation]
2300802-1 = "ซิสเตอร์ผู้ยิ่งใหญ่"
2300802-2 = "ด้านหลังวิหาร สถาบันทรีนิตี้"
2300802-3 = "(คุณครูเดินไปที่ด้านหลังวิหารของสถาบันทรีนิตี้ตามที่มารีบอก)"
2300802-4 = "ทางนี้ค่ะคุณครู"
2300802-9 = "ฉันกำลังรออยู่เลยค่ะ"
2300802-10 = "ทั้งที่เป็นคำขอร้องอย่างกะทันหันแท้ๆ แต่ขอบคุณที่มานะคะ"
2300802-11 = "คะ?"
2300802-12 = "ทำไมถึงเลือกเวลานี้เหรอคะ อ๊ะ ขอโทษค่ะ แต่ไม่มีเหตุผลพิเศษอะไรหรอกค่ะ"
2300802-13 = "พอดีวันนี้ฉันมีเวลาว่างแค่ช่วงเย็นแบบนี้..."
2300802-14 = "[s1] \"ขอโทษนะ เธอคงยุ่งน่าดูเลย\"\n[s2] \"ถ้างั้นไว้นัดกันวันที่มีเวลาว่างดีมั้ย?\""
2300802-15 = "อ่า... ไม่เป็นไรค่ะ ไม่เป็นไรหรอกค่ะ ฉันดีใจที่คุณครูมานะคะ"
2300802-16 = "อ่า... ไม่เป็นไรค่ะ ไม่เป็นไรหรอกค่ะ ฉันดีใจที่คุณครูมานะคะ"
2300802-17 = "ฉันก็แค่ทำงานต่างๆ ตามปกติที่วิหารน่ะค่ะ ไม่ได้มีอะไรพิเศษหรอกค่ะ"
2300802-18 = "คะ...? งานอะไรน่ะเหรอคะ?"
2300802-19 = "อ่า... นั่นสินะคะ"
2300802-20 = "งานที่ซิสเตอร์ต้องทำมีอยู่หลายอย่างก็จริง..."
2300802-24 = "แต่ส่วนใหญ่แล้วงานที่ฉันทำคือการฟังคำสารภาพบาปและคอยรับฟังความเจ็บปวดในจิตใจ#nของผู้ที่มาน่ะค่ะ"
2300802-25 = "ถึงจะไม่ใช่งานที่ยิ่งใหญ่ แต่ก็มีบางครั้งที่การทำแบบนี้ช่วยเยียวยาผู้อื่น และทำให้พวกเขากลับ#nมายืนหยัดได้อีกครั้งด้วยค่ะ"
2300802-26 = "คะ...? งานคล้ายๆ กับผู้ให้คำปรึกษารึเปล่าน่ะเหรอคะ?"
2300802-27 = "ค่ะ... อาจจะคล้ายๆ กันก็ได้นะคะ"
2300802-28 = "แต่อาจแตกต่างจากผู้ให้คำปรึกษาที่จะให้คำตอบได้... ฉันเพียงแค่รับฟังผู้คนที่มาก็เท่านั้นค่ะ"
2300802-29 = "ถ้าการทำอย่างนั้นเป็นประโยชน์กับคนอื่นๆ ละก็ ฉันก็ยินดีที่จะสละเวลาของตัวเองตลอดเลยค่ะ"
2300802-30 = "เหมือนกับตอนนี้ ที่ฉันออกมาพบกับคุณครูค่ะ"
2300802-31 = "ถ้าอย่างนั้นตอนนี้..."
2300802-37 = "ถ้าคุณครูไม่ว่าอะไร ฉันขอถามถึงเรื่องที่คุณครูกังวลอยู่ตอนนี้ได้รึเปล่าคะ?"
2300802-38 = "คะ...?"
2300802-39 = "คุณครูไม่ได้มาพบฉันเพราะมีเรื่องกังวลเหรอคะ...? แค่แวะมาทักทาย... เหรอคะ?"
2300802-40 = "อ่า... ยะ... อย่างนั้นเหรอคะ ขอโทษด้วยค่ะ ฉันเข้าใจผิดไปโดยไม่รู้ตัว..."
2300802-41 = "ไม่เป็นไรงั้นเหรอคะ...?"
2300802-42 = "การที่เห็นฉันพยายามอย่างเต็มที่แบบนี้ คุณครูรู้สึกเหมือนสบายใจขึ้นงั้นเหรอคะ?"
2300802-46 = "ฮิฮิฮิ..."
2300802-47 = "ขอบคุณนะคะคุณครู"
2300802-48 = "ได้ยินคุณครูพูดแบบนี้ ความเหนื่อยล้าที่สะสมมาทั้งวันก็หายไปหมดเลยค่ะ"
2300802-49 = "[s3] \"หักโหมเกินไปรึเปล่า?\"\n[s4] \"พักสักหน่อยแล้วค่อยทำต่อดีมั้ย?\""
2300802-50 = "อืมมม..."
2300802-51 = "อืมมม..."
2300802-52 = "ขอบคุณนะคะคุณครู แต่คงทำแบบนั้นไม่ได้หรอกค่ะ ตัวฉันในตอนนี้ยังต้องพยายามอีกมากเลยค่ะ"
2300802-53 = "จนถึงตอนนี้สิ่งเดียวที่ฉันทำได้มีเพียงแค่รับความรักจากผู้ศรัทธาทุกคนที่มาที่วิหาร..."
2300802-54 = "แต่สักวันหนึ่งฉันอยากจะก้าวไปเป็นหนึ่งใน \"ซิสเตอร์\" ที่น่านับถือให้ได้ค่ะ"
2300802-55 = "[s5] \"อยากเป็นซิสเตอร์งั้นเหรอ?\"\n[s6] \"ตอนนี้เธอก็เป็นซิสเตอร์อยู่แล้วไม่ใช่เหรอ\""
2300802-56 = "อืม... มันแตกต่างอยู่นิดหน่อยนะคะ..."
2300802-57 = "อืม... มันแตกต่างอยู่นิดหน่อยนะคะ..."
2300802-58 = "มันอาจจะไม่เหมาะสักหน่อย ถ้าเรียกทุกคนว่าซิสเตอร์ เพียงแค่เพราะว่าใส่ชุดซิสเตอร์น่ะค่ะ"
2300802-59 = "เพราะยังมีหลายๆ อย่างที่ต้องเรียนรู้ และมีหลายๆ อย่างที่ต้องทำ..."
2300802-60 = "ตอนนี้ฉันยังไม่สามารถเรียกตัวเองได้ว่า \"ซิสเตอร์\" เต็มปากหรอกค่ะ"
2300802-61 = "ความฝันของฉันคือการที่ถูกคนอื่นเรียกได้ว่า \"ซิสเตอร์มารี\" ได้อย่างไม่ละอายใจค่ะ"
2300802-62 = "ดังนั้น สิ่งที่ฉันทำได้ในตอนนี้... ฉันก็อยากจะทำให้ดีที่สุดค่ะ"
2300802-63 = "คะ...?"
2300802-64 = "ฉัน... ดูเป็นผู้ใหญ่เหรอคะ?"
2300802-65 = "จิตใจของฉันตอนนี้เป็นซิสเตอร์เต็มตัว... แล้วเหรอคะ?"
2300802-66 = "ยะ...อย่าล้อเล่นสิคะ! ฉันรู้ดีว่าฉันยังต้องเรียนรู้อีกมาก...!"
2300802-67 = "คำพูดเมื่อครู่ฉันจะถือว่าไม่เคยได้ยินแล้วกันนะคะ คุณครูก็นะ...!"
2300802-68 = "[s7] \"หึหึ แค่เรียกชื่อเอง สบายมาก\"\n[s8] \"ซิสเตอร์มารี! ซิสเตอร์มารี!\""
2300802-69 = "ยะ...หยุดนะคะ...! ช่วยหยุดด้วยค่ะ!"
2300802-70 = "ยะ...หยุดนะคะ...! ช่วยหยุดด้วยค่ะ!"
2300802-71 = "[s] \"ซิสเตอร์มารี~!!\""
2300802-72 = "หยุดนะ...!"
2300802-78 = "...!?"
2300802-84 = "คะ... คุณครู?"
2300802-89 = "เป็นอะไรรึเปล่าคะ!? คุณครู!?"
2300802-91 = "(โชคดีที่คุณครูไม่ได้รับบาดเจ็บสาหัส หลังจากนั้นไม่นานคุณครูก็ฟื้น แล้วก็กลับไปที่ชาเล่ต์)"

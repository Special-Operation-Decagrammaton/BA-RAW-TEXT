[translation]
2300802-1 = "A Noble Sister"
2300802-2 = "Behind Trinity Cathedral"
2300802-3 = "Following Mari's instructions, I found her in the back of the Trinity cathedral."
2300802-4 = "Over here, Sensei."
2300802-9 = "I've been waiting for you."
2300802-10 = "I know this is sudden, but thank you for coming."
2300802-11 = "Huh?"
2300802-12 = "The time? Ah. Sorry. There wasn't a special reason or anything."
2300802-13 = "This was just the only free moment I had today..."
2300802-14 = "[s1] \"Sorry. You must have been pretty busy.\"\n[s2] \"Should we have picked a less busy day to meet?\""
2300802-15 = "Not at all. I'm happy you came."
2300802-16 = "Not at all. I'm happy you came."
2300802-17 = "I was just working at the cathedral as always. It wasn't particularly busy."
2300802-18 = "You want to know more about my work?"
2300802-19 = "Ah. I see."
2300802-20 = "Of course, I have many duties as a Sister."
2300802-24 = "But my most important duty is listening to people's confessions and empathizing with their heart's sorrows."
2300802-25 = "It isn't much, but sometimes all people need to find healing is an ear willing to listen."
2300802-26 = "Pardon? Is it similar to counseling?"
2300802-27 = "I suppose it may be similar to that."
2300802-28 = "Of course, unlike counselors who give advice... I merely listen."
2300802-29 = "If I can be of any help, I am more than happy to give my time."
2300802-30 = "Sort of like how I came out to meet you, Sensei."
2300802-31 = "Now, then..."
2300802-37 = "If you don't mind, could I ask about your concerns, Sensei?"
2300802-38 = "Huh?"
2300802-39 = "You didn't come here for any specific concern? You just wanted to say hi...?"
2300802-40 = "O-Oh... F-Forgive me. I think I overstepped without realizing..."
2300802-41 = "You're okay with that?"
2300802-42 = "Just seeing how hard I work makes you feel at ease?"
2300802-46 = "Heehee."
2300802-47 = "Thank you. Sensei."
2300802-48 = "Just hearing your words is enough to melt the day's fatigue away."
2300802-49 = "[s3] \"Are you sure you aren't overdoing it?\"\n[s4] \"How about taking a little break?\""
2300802-50 = "Hmm."
2300802-51 = "Hmm."
2300802-52 = "Thank you for saying that, but I don't think I can. I still have much to do."
2300802-53 = "It may be nice to receive the affection of the believers who visit the cathedral, but..."
2300802-54 = "I too, wish to ascend through the Sisterhood and become a respectable Sister someday."
2300802-55 = "[s5] \"You want to become a Sister?\"\n[s6] \"Aren't you already a Sister?\""
2300802-56 = "Well...it's a little different from that."
2300802-57 = "Well...it's a little different from that."
2300802-58 = "It isn't quite accurate to say anyone wearing a Sister's garb is a Sister."
2300802-59 = "There's still much I have to learn and know."
2300802-60 = "It's still embarrassing for me to be called a Sister."
2300802-61 = "It's my dream to someday hear someone call me Sister Mari without feeling embarrassed."
2300802-62 = "That's why I want to give my best to everything I do."
2300802-63 = "Huh?"
2300802-64 = "I...sound mature to you?"
2300802-65 = "I already have the heart of a Sister?"
2300802-66 = "D-Don't tease me like that! I know better than anyone that I still have a long way to go!"
2300802-67 = "I-I'm going to pretend I didn't hear that. Sensei, you're too much!"
2300802-68 = "[s7] \"Ha. It's super easy to call you a Sister.\"\n[s8] \"Sister Mari! Sister Mari!\""
2300802-69 = "S-Stop...! Please, stop!"
2300802-70 = "S-Stop...! Please, stop!"
2300802-71 = "[s] \"Sister Mari!\""
2300802-72 = "S-Stop!"
2300802-78 = "...?!"
2300802-84 = "S-Sensei?"
2300802-89 = "Are you okay?! Sensei?!"
2300802-91 = "(Fortunately I wasn't badly hurt. After a moment, I woke up and returned to Schale.)"

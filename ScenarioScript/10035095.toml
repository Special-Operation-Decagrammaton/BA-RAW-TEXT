[translation]
10035095-3 = "哈啊，哈啊……"
10035095-4 = "已確認敵方機械鱷魚無法行動！"
10035095-5 = "功能停止運作了！"
10035095-6 = "嗯，引擎也已經開始冒煙，這次總算是成功制伏了吧。"
10035095-12 = "呼……呼！"
10035095-13 = "哈哈哈！"
10035095-14 = "什麼嘛臭鱷魚！這麼快就不行了嗎！#n給我再拿出點毅力來啊！哈哈哈！"
10035095-16 = "剛才明明丟完手榴彈後就跑得不見人影……"
10035095-19 = "[ns]「大家辛苦了。」"
10035095-20 = "這都多虧了老師的指揮。"
10035095-21 = "您也辛苦了。"
10035095-25 = "啊，鱷魚在那裡！開槍，開槍！"
10035095-26 = "老闆，它已經被擊倒了。"
10035095-27 = "……嗯？"
10035095-28 = "是嗎。已經摧毀掉了嗎……"
10035095-30 = "是的，機械鱷魚已被成功制伏。"
10035095-31 = "後續處理就交給您了。"
10035095-33 = "好，好的！"
10035095-34 = "這邊，這邊！快過來！"
10035095-40 = "先把傷患送到醫務室！優先滿足客人的需求！"
10035095-43 = "是！"
10035095-47 = "哎呀呀……在逃跑時扭傷了腳……"
10035095-48 = "我送您去醫務室吧。"
10035095-51 = "我，我在逃跑途中和朋友走散了！"
10035095-52 = "請告訴我朋友的特徵，我會幫您尋找的。"
10035095-55 = "[ns1]「雖然遲了一點……」\n[ns2]「不過事情算是告一段落了吧。」"
10035095-58 = "真是不幸中的大幸。"
10035095-59 = "要是再拖久一點，室內八成也會變得一片狼藉。"
10035095-60 = "是啊，幸好沒有人受太重的傷。"
10035095-61 = "這樣事情算是圓滿落幕了吧！"
10035095-67 = "雖然成功擊敗機械鱷魚是件好事沒錯……"
10035095-68 = "但你們不覺得有點不對勁嗎？"
10035095-70 = "嗯？"
10035095-72 = "剛才鱷魚衝向狂犬的時候……"
10035095-77 = "突然就變得一動也不動了。"
10035095-78 = "雖然也是因為這樣才有機會丟手榴彈……但當時到底發生了什麼事？"
10035095-80 = "應該是巧合吧？只是剛好在那個時候發生故障之類的。"
10035095-81 = "會不會是因為看到局長在那裡，所以才避開的呢？"
10035095-83 = "你覺得合理嗎？當時怎麼看都像是會被輾過去耶。"
10035095-87 = "狂犬，你耍了什麼花招？"
10035095-89 = "花招？我什麼都沒做。"
10035095-90 = "那你要怎麼解釋剛才發生的事？"
10035095-91 = "這個……我也不清楚。"
10035095-92 = "[s]「檢查一下機械鱷魚應該就知道了吧？」"
10035095-94 = "也是。反正也不能就這樣放著，來檢查一下吧。"
10035095-95 = "隨便亂碰沒問題嗎？"
10035095-97 = "打倒它的是我們，稍微檢查一下有什麼關係？#n而且現在它也只是塊廢鐵罷了。"
10035095-102 = "我看看……戰鬥的時候沒空注意，沒想到這東西的作工還挺不賴的。"
10035095-103 = "是啊，收尾和接縫都無可挑剔，簡直就像是某位名匠的作品一樣……"
10035095-105 = "哪個名匠會打造這種東西啊？"
10035095-106 = "總之先把它拆開來看看吧。"
10035095-115 = "[ns3]「看起來很複雜……」\n[ns4]「就算看了也看不出什麼頭緒。」"
10035095-118 = "哇，之前從沒見過這種電線和迴路……像我這種外行人實在看不出個所以然來。"
10035095-119 = "光，光看就覺得頭昏眼花……"
10035095-120 = "什麼嘛，這樣不就更搞不懂了嗎！至少寫個製造者的名字也好啊！"
10035095-125 = "啊，在那邊！"
10035095-129 = "[ns5]「……？」\n[ns6]「這個聲音是……？」"

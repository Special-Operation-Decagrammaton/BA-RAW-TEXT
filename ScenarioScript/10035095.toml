[translation]
10035095-3 = "แฮ่ก... แฮ่ก..."
10035095-4 = "จระเข้จักรกลเป็นอัมพาตไปแล้ว!"
10035095-5 = "มันหยุดทำงานแล้วค่ะ!"
10035095-6 = "อื้อ ดูจากควันที่ออกมาจากเครื่องยนต์แล้ว ครั้งนี้เราน่าจะปราบมันได้อยู่หมัดแล้วละ"
10035095-12 = "ฮุฮุ...!"
10035095-13 = "ฮ่าฮ่าฮ่า!"
10035095-14 = "ไงล่ะ! หมดฤทธิ์แล้วเรอะเจ้าจระเข้! โชว์เลือดนักสู้อีกหน่อยสิ! วะฮ่าฮ่า!"
10035095-16 = "ตอนโดนระเบิดมือยังวิ่งหนีอยู่เลย..."
10035095-19 = "[ns] \"ทุกคนทำได้ดีมาก\""
10035095-20 = "เพราะพวกเราได้รับการสั่งการจากคุณครูน่ะค่ะ"
10035095-21 = "ทุกคนทำได้ดีมากค่ะ"
10035095-25 = "อ๊ะ นั่นไงเจ้าจระเข้! ยิงเลย ยิงมัน!"
10035095-26 = "มันไม่ขยับแล้วครับ"
10035095-27 = "หืม...?"
10035095-28 = "งั้นเหรอ? หรือว่าเครื่องยนต์ถูกทำลายไปแล้ว..."
10035095-30 = "ค่ะ พวกฉันปราบจระเข้จักรกลได้สำเร็จแล้วค่ะ"
10035095-31 = "ฝากทางสวนน้ำจัดการที่เหลือด้วยนะคะ"
10035095-33 = "ดะ... ได้เลยครับ!"
10035095-34 = "ทางนี้ ทางนี้! รีบมาเร็วเข้า!"
10035095-40 = "รีบพาคนที่ได้รับบาดเจ็บไปห้องปฐมพยาบาล! ความสะดวกสบายของลูกค้าต้องมาก่อน!"
10035095-43 = "รับทราบ!"
10035095-47 = "โอ๊ย... ฉันข้อเท้าพลิกระหว่างวิ่งหนีค่ะ..."
10035095-48 = "เดี๋ยวจะพาไปที่ห้องปฐมพยาบาลนะครับ"
10035095-51 = "ฉะ... ฉันพลัดหลงกับเพื่อนระหว่างวิ่งหนีค่ะ!"
10035095-52 = "เพื่อนของคุณลักษณะเป็นยังไงเหรอครับ ผมจะช่วยหาอีกแรงครับ"
10035095-55 = "[ns1] \"ถึงจะช้าไปหน่อย แต่ก็ได้ทำตามหน้าที่แล้วนะ...\"\n[ns2] \"ปัญหาคลี่คลายได้แล้วสินะ\""
10035095-58 = "ถือเป็นโชคดีในโชคร้ายนะ"
10035095-59 = "ขืนปล่อยยืดเยื้อไปมากกว่านี้ ในอาคารต้องกลายเป็นศูนย์ประสบภัยขนาดย่อมแน่"
10035095-60 = "ค่ะ แต่ก็โชคดีนะคะที่ไม่มีใครบาดเจ็บอะไรมาก"
10035095-61 = "จัดการได้อีกคดีแล้วค่ะ!"
10035095-67 = "ก็นะ จัดการจระเข้จักรกลจนหงายเก๋งได้มันก็ดีอยู่หรอก"
10035095-68 = "แต่จะให้จบแบบนี้เลยมันก็มีเรื่องค้างคาใจอยู่นะ?"
10035095-70 = "คะ?"
10035095-72 = "ก็เมื่อกี้ตอนที่จระเข้พุ่งเข้ามาหาหมาบ้า..."
10035095-77 = "จู่ๆ เจ้าจระเข้ก็ชะงักไปเลยไม่ใช่หรือไง"
10035095-78 = "ถึงแม้จะอาศัยจังหวะนั้นปาระเบิดมือได้ก็เถอะ... แต่ทำไมมันถึงชะงักไปล่ะ?"
10035095-80 = "คงบังเอิญหรือเปล่า? หรือไม่เครื่องยนต์ก็คงติดขัดขึ้นมา"
10035095-81 = "หรือมันคาดไม่ถึงว่าหัวหน้ากรมฯ จะฉายเดี่ยวไปคะ?"
10035095-83 = "เหลวไหลน่า ไม่มีเหตุผลสักนิดเลยนะที่มันจะเป็นอย่างนั้น"
10035095-87 = "หมาบ้า เธอใช้อุบายอะไรกันแน่น่ะ?"
10035095-89 = "อุบายงั้นเหรอ ฉันไม่ได้ใช้อุบายอะไรเลย"
10035095-90 = "แล้วจะอธิบายเรื่องที่เกิดขึ้นเมื่อกี้ยังไง?"
10035095-91 = "นั่นสิ... ฉันก็ไม่รู้เหมือนกัน"
10035095-92 = "[s] \"ลองไปตรวจสอบจระเข้จักรกลดูก็น่าจะรู้นะ?\""
10035095-94 = "นั่นสินะ เพราะยังไงเราก็ปล่อยมันไว้อย่างนั้นไม่ได้อยู่ดี งั้นเข้าไปดูสักหน่อยมั้ย?"
10035095-95 = "แตะต้องได้ตามใจเลยเหรอคะ?"
10035095-97 = "พวกเราเป็นคนปราบมันได้ทั้งทีนะ อีกอย่าง ตอนนี้มันก็เป็นแค่กองเศษเหล็กด้วย"
10035095-102 = "ไหนดูซิ... ตอนสู้กันยังไม่เห็นรายละเอียดชัดเจนแบบนี้ ถูกสร้างมาอย่างดีเลยนะเนี่ย"
10035095-103 = "ใช่ค่ะ ดูรอยต่อและรอยเชื่อมพวกนี้สิคะ นี่ต้องเป็นผลงานของช่างฝีมือแน่เลยค่ะ..."
10035095-105 = "ช่างฝีมือที่ไหนจะไปสร้างอะไรแบบนี้กันเล่า?"
10035095-106 = "ช่างเถอะ เปิดเกราะมันดูเลย"
10035095-115 = "[ns3] \"ซับซ้อนมากเลย...\"\n[ns4] \"ดูยังไงก็ไม่เข้าใจแฮะ\""
10035095-118 = "โห ฉันไม่เคยเห็นสายไฟกับวงจรไฟฟ้าแบบนี้มาก่อนเลย... คนเป็นมือสมัครเล่นคงวิเคราะห์ไม่ออก#nหรอกนะนั่น"
10035095-119 = "คะ... แค่เห็นก็รู้สึกตาลายแล้วค่ะ..."
10035095-120 = "อะไรเนี่ย แบบนี้ยิ่งไม่รู้ไปกันใหญ่! ทำไมเจ้าของผลงานไม่เขียนชื่อตัวเองเอาไว้เลยล่ะ!"
10035095-125 = "อ๊ะ! อยู่ตรงนั้น!"
10035095-129 = "[ns5] \"...?\"\n[ns6] \"เสียงนี้มัน...?\""

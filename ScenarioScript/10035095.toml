[translation]
10035095-3 = "*pant* *pant*"
10035095-4 = "Enemy Mechagator: Confirmed deactivated!"
10035095-5 = "Functionality has been disabled!"
10035095-6 = "Yeah, if that smoke from the engine's any indication, I think we cooked it."
10035095-12 = "Phew...!"
10035095-13 = "Hahaha!"
10035095-14 = "Oh, what, you're done already? Couldn't take any more? Haha!"
10035095-16 = "Tough talk after all that running around like a maniac throwing grenades..."
10035095-19 = "[ns] \"Great job, everyone.\""
10035095-20 = "We owe it to you and your guidance, Sensei."
10035095-21 = "Thank you for all your hard work."
10035095-25 = "Th-There it is! Shoot, shoot!"
10035095-26 = "Boss, it's already down."
10035095-27 = "...Huh?"
10035095-28 = "Down, as in destroyed?"
10035095-30 = "That's right. The Mechagator shouldn't give you any more trouble."
10035095-31 = "I'm sure you can take it from here."
10035095-33 = "R-Right, of course!"
10035095-34 = "This way, over here! Hurry!"
10035095-40 = "Transport the injured to the infirmary first! Prioritize the comfort of our guests above all else!"
10035095-43 = "Yes, sir!"
10035095-47 = "Ow... I sprained my ankle in all that running."
10035095-48 = "Let's go to the infirmary."
10035095-51 = "I-I lost my friends in the crowd!"
10035095-52 = "If you tell me what they look like, I'll help you find them."
10035095-55 = "[ns1]\"Well, all's well that ends well.\"\n[ns2]\"At least it's over.\""
10035095-58 = "Yeah, I guess there's a silver lining."
10035095-59 = "Any more fighting, and the whole interior would have been wrecked beyond repair."
10035095-60 = "More importantly, it doesn't look like anyone was seriously injured."
10035095-61 = "One problem solved!"
10035095-67 = "I mean, it's great that we took it down, but..."
10035095-68 = "...don't you think we have some loose ends here?"
10035095-70 = "Hmm?"
10035095-72 = "You saw, right? When the alligator tried to attack the Feral Hound..."
10035095-77 = "...it froze up, didn't it?"
10035095-78 = "And yeah, that made it easier to throw the grenades, but...what exactly happened there?"
10035095-80 = "Maybe it happened to have a glitch at that exact moment."
10035095-81 = "Or maybe it spotted the director and decided to back down? Change course, maybe?"
10035095-83 = "Does that even make any sense? It was just about to strike."
10035095-87 = "So what kind of trick are you pulling here, Feral Hound?"
10035095-89 = "I don't pull tricks. I never have."
10035095-90 = "Then how do YOU explain it?"
10035095-91 = "I...have no idea."
10035095-92 = "[s] \"We should take a closer look at the Mechagator, see what makes it tick.\""
10035095-94 = "That makes sense. Not like we can just leave it lying around."
10035095-95 = "Is it safe to tamper with?"
10035095-97 = "We already \"tampered with it,\" and now it's just a pile of scrap. So who cares?"
10035095-102 = "Let's see... Wow, this thing isn't just tough, it's intricate on the inside."
10035095-103 = "Yes, the finishing and the smoothness of the joints definitely indicate a skilled craftsman."
10035095-105 = "So two questions, then: who could make this, and who would?"
10035095-106 = "Well, let's open it up."
10035095-115 = "[ns3]\"These circuits are...extremely complicated.\"\n[ns4]\"Even with a close look, I can't make any sense of it.\""
10035095-118 = "Wow, I have no idea how any of this works. All I know is it definitely wasn't an amateur project."
10035095-119 = "Just looking at it makes my head spin…"
10035095-120 = "I got nothing either. They could have been nice and at least stamped their name on it somewhere."
10035095-125 = "Oh! Over there!"
10035095-129 = "[ns5] \"What?\"\n[ns6]\"That voice...?\""

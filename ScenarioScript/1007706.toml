[translation]
1007706-1 = "สักระยะหนึ่ง"
1007706-3 = "(คุณครูออกไปที่สวนสาธารณะตามเวลาที่สัญญาไว้กับอิจิกะ)"
1007706-4 = "อ๊ะ... คุณครูนี่นา"
1007706-5 = "โอ้โห~ มาถึงในช่วงเวลาเหมาะๆ พอดีเลยนะคะเนี่ย"
1007706-6 = "[s1] \"เสียงนี้มัน... อิจิกะ?\"\n[s2] \"...? ทำไมเสียงถึงดังมาจากข้างบน...\""
1007706-9 = "อะฮะฮ่า! ตรงนี้ค่ะ ตรงนี้! ฉันอยู่ข้างบนคุณครูเลยค่ะ!"
1007706-10 = "รอเดี๋ยวนะคะ~ พอดีตอนนี้ฉันทำอย่างอื่นอยู่..."
1007706-11 = "ถ้าได้อันนี้แล้วจะรีบลงไปเลยค่ะ~!"
1007706-13 = "ฮึบ!"
1007706-16 = "― [log=이치카]ฮะฮ่า! คุณครู ตรงนี้ค่ะ! ตรงนี้![/log][wa:2200] "
1007706-18 = "― [log=이치카]เห็นฉันมั้ยคะ?[/log]"
1007706-21 = "― [log=이치카]อ๊ะ! นี่ก็แค่ลูกโป่งน่ะค่ะ...[/log][wa:1200] "
1007706-24 = "― [log=이치카]ฉันรู้สึกว่าพอถือเจ้านี่อยู่...[/log][wa:1020] "
1007706-26 = "― [log=이치카]ก็รู้สึกเหมือนเด็กร่าเริงที่อยู่ในสวนสนุกเลยค่ะ...ฮ่าๆ[/log][wa:1500] "
1007706-29 = "― [log=이치카]อ๊ะ! ไม่ใช่ของฉันหรอกค่ะ! [/log][wa:10] "
1007706-31 = "― [log=이치카]...คือว่า อยู่ๆ ฉันก็ อยากลองเล่นดูบ้าง[/log][wa:1380] "
1007706-34 = "[ns3] \"ขึ้นไปช่วยเก็บลูกโป่งให้คนอื่นใช่มั้ย?\"\n[ns4] \"กำลังช่วยคนอื่นอยู่อีกแล้วล่ะสิ?\""
1007706-35 = "― [log=이치카]อ่า... เอ่อ... มันก็จริงค่ะ…[/log][wa:1080] "
1007706-36 = "― [log=이치카]อ่า... เอ่อ... มันก็จริงค่ะ…[/log][wa:1080] "
1007706-38 = "― [log=이치카]รู้ได้ยังไงเหรอคะ?[/log]"
1007706-41 = "― [log=이치카]อะไรกัน...?[/log][wa:10] "
1007706-43 = "― [log=이치카]สีหน้าฉันมันฟ้องเหรอคะ...?[/log][wa:10] "
1007706-46 = "― [log=이치카]แต่ก็ไม่เป็นไรหรอก...[/log][wa:240] "
1007706-48 = "― [log=이치카]นี่เป็นครั้งแรกเลยนะคะที่ฉันได้เห็นคุณครูจากมุมนี้[/log][wa:720] "
1007706-51 = "― [log=이치카]ถ้ามุมมองต่างออกไป[/log]"
1007706-53 = "― [log=이치카]วิธีที่จะเห็นก็แตกต่างกันไปด้วยเนอะ...[/log][wa:340] "
1007706-56 = "― [log=이치카]...สนุกดีนะคะเนี่ย[/log][wa:1380] "
1007706-58 = "― [log=이치카]ฉันชอบความรู้สึกนี้จังเลยค่ะ! ฮะฮ่า![/log][wa:1240] "
1007706-61 = "(หลังจากนั้นไม่นาน อิจิกะก็กระโดดลงมาจากต้นไม้แล้วก้มหน้าลงและวิ่งไปไหนสักที่)"
1007706-62 = "(ไม่กี่นาทีต่อมา อิจิกะก็กลับมาโดยที่ไม่มีลูกโป่งอยู่ในมือ)"
1007706-64 = "แฮ่ก... แฮ่ก... กลับมาแล้วค่ะ~!"
1007706-65 = "ทำไมมาเร็วแบบนี้ล่ะคะ~ ถ้ารู้ว่าจะมาเร็ว ฉันก็คงออกไปรอแล้ว"
1007706-66 = "ลูกโป่งนั่นน่ะ... พอดีว่ามีเด็กคนหนึ่งเผลอทำหลุดมือ มันก็เลยไปติดอยู่บนต้นไม้..."
1007706-67 = "ถ้าให้เด็กฝืนปีนไปเดี๋ยวจะบาดเจ็บเปล่าๆ ค่ะ ฉันก็เลยบอกให้ไปนั่งรอที่เก้าอี้ก่อน แล้วฉันก็ไปเก็บ#nลูกโป่งให้แทนค่ะ"
1007706-68 = "...คะ?"
1007706-69 = "ยอดเยี่ยมอย่างเคยงั้นเหรอคะ? ฉันน่ะเหรอ...? ...ยอดเยี่ยมตรงไหนคะ?"
1007706-70 = "อ้อ ต้นไม้ที่สูงๆ นั่นน่ะเหรอคะ?"
1007706-71 = "เอาอีกแล้วนะ! ทำให้ฉันเหลิงเพราะคำพูดแบบนั้นอีกแล้ว"
1007706-72 = "เรื่องแค่นั้นน่ะ มีคนที่ทำได้ถมเถไปค่ะ ไม่เห็นจะยอดเยี่ยมตรงไหนเลย..."
1007706-73 = "ฉันก็แค่อยู่ตรงนั้นพอดี และรู้ว่าจะไปเก็บลูกโป่งมาได้ยังไง ก็เลยทำให้น่ะค่ะ มันเป็นเรื่องธรรมดาๆ ไม่ใช่เรื่องใหญ่อะไรเลย"
1007706-74 = "[s5] \"เรื่องนั้นมันก็ใช่อยู่...\"\n[s6] \"ครูไม่ได้หมายถึงความสูงของต้นไม้...\""
1007706-77 = "ฮู่ว~ พอเถอะค่ะ ไม่ต้องมาพูดแบบนั้นก็ได้"
1007706-78 = "...คะ?"
1007706-79 = "ไม่ได้แค่พูดไปงั้นๆ เหรอคะ? เรื่องที่คิดว่าเรื่องธรรมดาแบบนี้ก็ดูดีเหมือนกันงั้นเหรอคะ?"
1007706-80 = "ฮืม... ฉันก็ไม่ได้ไม่รู้สึกดีที่ได้รับคำชมหรอกนะคะ..."
1007706-81 = "ไม่สิ คิดซะว่าเป็นคำพูดที่จริงใจจากคุณครูแล้วกันค่ะ ขอบคุณนะคะคุณครู!"
1007706-82 = "ฮิฮิ..."
1007706-83 = "...เอ่อ..."
1007706-84 = "เอาเป็นว่า เหตุผลที่ฉันติดต่อไปน่ะค่ะ..."
1007706-85 = "ก็พอได้คุยเรื่องนั้นกับคุณครูไปบ้างแล้ว... ฉันก็เลยคิดว่าตอนนี้คุณครูอาจจะเดาใจฉันได้แล้วน่ะค่ะ"
1007706-86 = "ถ้าถามว่าเรื่องอะไรละก็... เรื่อง..."
1007706-87 = "...เฮ้อ จะอธิบายยังไงดีนะ พอดีว่าฉัน..."
1007706-88 = "[s7] \"อยาก 'จริงจัง' กับอะไรบางอย่าง?\"\n[s8] \"อยากมีบางอย่างที่ตั้งใจทำ?\""
1007706-94 = "...แหะๆ"
1007706-95 = "คุณครูรู้อยู่แล้วจริงๆ ด้วยนะคะ เหมือนกับกำลังรอพูดประโยคนั้นอยู่เลย"
1007706-96 = "นั่นเป็นความรู้สึกที่ฉันอาจแสดงออกโดยไม่รู้ตัว คุณครูก็เลยมองออกหรือเปล่าคะ?"
1007706-97 = "ค่ะ... ก็... อย่างที่คุณครูว่าเลยค่ะ ฉันกำลังคิดว่าถ้าไปขอคำปรึกษาเรื่องนั้นจากคุณครู บางทีฉันอาจจะ#nแก้ปัญหาได้ก็ได้ ก็เลยติดต่อเข้าไปน่ะค่ะ"
1007706-100 = "ถึงคุณครูหรือสมาชิกคนอื่นในชมรมทวงความยุติธรรมจะคอยชมว่าฉันทำนู่นทำนี่ได้ดีก็เถอะ..."
1007706-104 = "แต่เวลาฉันเห็นคนอื่นสนุกและมุ่งมั่นในเรื่องบางอย่าง ฉันก็จะคิดอิจฉาขึ้นมาน่ะค่ะ"
1007706-106 = "ฉันไม่รู้ว่าตัวเองอยากทำอะไรเลย สงสัยคงต้องลองทำอะไรหลายๆ อย่างดูแล้วละค่ะ"
1007706-107 = "คนที่รู้และจดจ่อในสิ่งที่ตัวเองอยากทำน่าจะโดดเด่นกว่าคนที่ไม่รู้ว่าตัวเองชอบอะไรใช่มั้ยคะ"
1007706-108 = "แต่ว่าเรื่องนี้น่ะ... ถ้าฉันไปคุยกับคนอื่น อย่าว่าแต่หวังให้คนอื่นเข้าใจเลยค่ะ แค่ไม่โดนดุด่ากลับมาก็#nถือว่าดีแล้ว..."
1007706-113 = "เพราะงั้น... ฉันก็เลย... จมอยู่ในสถานการณ์นี้น่ะค่ะ"
1007706-114 = "คุณครูอาจจะรู้แล้วก็ได้ แต่พอมาคิดดูแล้ว... ฉันคุยเรื่องนี้กับคุณครูแค่คนเดียวเลยนะคะ"
1007706-115 = "คนอย่างฉันต้องใส่ใจนู่นนี่เยอะเลยใช่มั้ยคะ? น่ารำคาญใช่มั้ยล่ะคะ?"
1007706-116 = "ไม่ใช่ว่าฉันไม่เชื่อใจคนอื่นหรอกนะคะ แต่ที่ฉันอยากคุยเพราะคุณครูเป็นคุณครูน่ะค่ะ..."
1007706-117 = "เรื่องแบบนี้เหมาะสมที่จะเอามาปรึกษากับคุณครูมากกว่าว่ามั้ยคะ? ไม่ได้ดูแปลกเลยใช่มั้ยคะ?"
1007706-118 = "ปรึกษาได้แน่นอนงั้นเหรอคะ? ฮ่าๆ ฉันรู้อยู่แล้วแหละว่าคุณครูต้องพูดแบบนี้"
1007706-119 = "เอาละ ถ้างั้น...."
1007706-120 = "คุณครูมีคำแนะนำอะไรให้คนอย่างฉันบ้างเหรอคะ?"
1007706-121 = "ถึงฉันจะได้เจอคุณครูไปแค่ไม่กี่ครั้ง แต่ฉันก็คิดว่าคุณครูน่าจะรู้ค่ะ... ว่ายังไงคะ?"
1007706-122 = "คิดว่าฉันเหมาะกับอะไรเหรอคะ? ต้องทำอะไรถึงจะเหมาะกับฉันที่สุดเหรอคะ?"
1007706-123 = "หรือว่าคุณครูเห็นว่า \"มีบางอย่างที่ฉันน่าจะชอบ\" โดยที่ฉันอาจจะไม่รู้ตัวมั้ยคะ?"
1007706-124 = "ฉันถามกะทันหันมากไปหรือเปล่านะ"
1007706-125 = "...คะ?"
1007706-126 = "คุณครูพอจะรู้ว่าฉันน่าจะชอบอะไร แต่บอกไม่ได้งั้นเหรอคะ...?"
1007706-127 = "......???  หะ... หืม? อะไรเหรอคะ? หมายความว่ายังไงน่ะ?"
1007706-128 = "ทำไม..."
1007706-129 = "...คะ?"
1007706-130 = "มีเรื่องอื่นที่ฉันต้องทำก่อนงั้นเหรอคะ? เรื่องอะไร?"
1007706-131 = "[s9] \"ก่อนอื่นเลิกคิดว่าต้อง 'หา' ก่อนดีกว่านะ\"\n[s10] \"หยุดคิดว่าเราต้องทำอะไร แต่ลองไปทำอะไรตามใจดูเลย\""
1007706-137 = "...คะ?"
1007706-138 = "อ่า... นี่ฉันหูฝาดไปหรือเปล่านะ...? เมื่อกี้คุณครูว่าอะไรนะคะ..."
1007706-139 = "ให้เลิกหาสิ่งที่ตัวเองต้องทำเหรอคะ? หมายความว่ายังไงคะ?"
1007706-140 = "หรือว่าฉันควรล้มเลิกความตั้งใจนี้..."
1007706-141 = "ก็ไม่ใช่เหรอคะ? คนละเรื่องกันเลยงั้นเหรอ?"
1007706-142 = "[s11] \"การไม่รู้ว่าตัวเองชอบอะไร มันไม่ผิดหรอกอิจิกะ\"\n[s12] \"ออกจากกรอบความคิดที่มองว่าเราต้อง 'ตามหา' อะไรดีกว่า\""
1007706-145 = "...หืม? อืม..."
1007706-146 = "เหมือนจะเข้าใจ แต่ก็เหมือนไม่เข้าใจเลยค่ะ"
1007706-147 = "...ฮืม..."
1007706-148 = "...ฮิฮิ"
1007706-149 = "ขอโทษค่ะ ฉันไม่อยากโกหกเลยค่ะ ขอบอกตามตรงเลยแล้วกันว่า... ฉันไม่เข้าใจเลยค่ะ"
1007706-150 = "ฉันก็คิดว่าฉันเป็นคนที่ค่อนข้างทำตามใจตัวเองอยู่แล้ว..."
1007706-151 = "แต่ก็... ไม่รู้สิคะ..."
1007706-152 = "แต่ถ้าคุณครูบอกฉันด้วยสีหน้าจริงจังแบบนั้น ก็คงมีเหตุผลอยู่แล้วละค่ะ"
1007706-153 = "เพราะงั้น... ฉันจะคิดว่าตัวเองต้องทำตามใจตัวเอง 'ให้มากขึ้นอีกหน่อย' แล้วกันค่ะ"
1007706-157 = "...ฉันจะลองเชื่อคุณครูดูค่ะ"
1007706-158 = "[s13] \"เอ๋ อิจิกะ...?\"\n[s14] \"เมื่อกี้เธอ...\""
1007706-161 = "เอาละๆ คุณครูเคยบอกว่าไม่ว่าจะอะไรก็ตาม ถ้าพูดถึงมันแล้ว ก็ให้เริ่มทำทันทีจะดีที่สุดใช่มั้ยคะ!"
1007706-162 = "งั้นไหนๆ ก็พูดแล้ว~ งั้นเรามาเริ่มกันเลยมั้ยคะ? มาทำตามใจตัวเองให้มากขึ้นกัน!"
1007706-163 = "ถ้างั้นวันนี้... "
1007706-164 = "คุณครูต้องมาเที่ยวเล่นกับฉันค่ะ!!"
1007706-166 = "(หลังจากนั้นคุณครูก็อยู่เที่ยวในสวนสาธารณะและสวนสนุกกับอิจิกะจนกว่าเธอจะบอกว่าเหนื่อยและ#nขอกลับบ้านไป)"
1007706-167 = "(ตอนอิจิกะกลับบ้าน เธอมีหน้าตาสดใสขึ้นกว่าเดิม)"

[translation]
1007706-1 = "一時之間"
1007706-3 = "（在和一花約好的時間前往了附近的公園）"
1007706-4 = "……啊，是老師。"
1007706-5 = "哇～居然剛好在這個時間經過這裡……"
1007706-6 = "[s1]「這個聲音是……一花？」\n[s2]「為什麼聲音是從上面傳來……？」"
1007706-9 = "啊哈哈！這裡這裡！在老師上面！"
1007706-10 = "稍等一下哦～現在剛好有點忙……"
1007706-11 = "等我拿到這個就馬上下去～！"
1007706-13 = "嘿～咻！"
1007706-16 = "― [log=이치카]哈哈！老師，我在這裡！這裡！[/log][wa:2920] "
1007706-18 = "― [log=이치카]有看到嗎？[/log]"
1007706-21 = "― [log=이치카]啊～其實這只是普通的氣球……[/log][wa:1800] "
1007706-24 = "― [log=이치카]總覺得只要拿著這個，[/log][wa:1860] "
1007706-26 = "― [log=이치카]看起來就像遊樂園裡興高采烈的孩子一樣呢……哈哈。[/log][wa:2700] "
1007706-29 = "― [log=이치카]啊！這不是我的哦！[/log][wa:680] "
1007706-31 = "― [log=이치카]……那個，只是因為一些原因，才會……[/log][wa:2220] "
1007706-34 = "[ns3]「是為了幫忙別人對吧？」\n[ns4]「又在幫誰的忙嗎？」"
1007706-35 = "― [log=이치카]咦，咦……是沒錯啦……[/log][wa:1760] "
1007706-36 = "― [log=이치카]咦，咦……是沒錯啦……[/log][wa:1760] "
1007706-38 = "― [log=이치카]不過你怎麼會知道呢？[/log]"
1007706-41 = "― [log=이치카]為什麼呢……？[/log][wa:10] "
1007706-43 = "― [log=이치카]是能從我的表情看出來嗎……？[/log][wa:10] "
1007706-46 = "― [log=이치카]算了……[/log][wa:920] "
1007706-48 = "― [log=이치카]從這個角度看老師，還是第一次呢。[/log][wa:2080] "
1007706-51 = "― [log=이치카]該說觀點不同，[/log]"
1007706-53 = "― [log=이치카]看法也會跟著改變嗎……[/log][wa:1420] "
1007706-56 = "― [log=이치카]……總覺得很有趣。[/log][wa:1740] "
1007706-58 = "― [log=이치카]這種感覺，我喜歡！……哈哈！[/log][wa:2120] "
1007706-61 = "（過了一會，一花從樹上跳下來，低頭跑向了某處）"
1007706-62 = "（沒多久後回來的一花，手上並沒有拿著氣球）"
1007706-64 = "哈啊，哈啊……我回來了～！"
1007706-65 = "話說老師來的真早呢～早知道我就等你了。"
1007706-66 = "剛才的氣球……是因為有個小孩沒拿好，結果就飛到樹上去了……"
1007706-67 = "我擔心他勉強爬上去會受傷，所以要他先坐在長椅上等，然後替他把氣球拿下來。"
1007706-68 = "……嗯？"
1007706-69 = "你說果然很棒……是在說我嗎？"
1007706-70 = "也對，總不會是在說樹的高度吧……？"
1007706-71 = "老師又來了！總是給人戴高帽子。"
1007706-72 = "能做到這種事的人世界上到處都是。#n根本就不算什麼……"
1007706-73 = "我只是剛好在場，而且正好是能力所及的事才會幫忙而已。"
1007706-74 = "[s5]「我是在稱讚一花沒錯……」\n[s6]「我指的不是樹的高度……」"
1007706-77 = "啊啊～沒關係，老師真的不必刻意說那種話。"
1007706-78 = "……咦？"
1007706-79 = "不是刻意這麼說的？#n認為理所當然反而更難能可貴？"
1007706-80 = "唔嗯……被稱讚確實是挺開心的沒錯啦……"
1007706-81 = "嗯，我就坦率地接受老師的稱讚吧。#n謝謝你，老師！"
1007706-82 = "嘿嘿……"
1007706-83 = "那，那個……"
1007706-84 = "就是，我之所以會聯絡老師……"
1007706-85 = "畢竟已經跟老師見過好幾次……我想老師應該已經知道了。"
1007706-86 = "我想說的是……那個……"
1007706-87 = "……唉。#n真不知道該怎麼說明才好……"
1007706-88 = "[s7]「你想對某件事『認真』對吧？」\n[s8]「你想有件能讓你熱衷的事，對吧？」"
1007706-94 = "……哈哈。"
1007706-95 = "老師果然早就知道了嗎？#n聽起來好像已經等很久了？"
1007706-96 = "也對，我早就在不知不覺中表現出來了，老師當然會察覺。"
1007706-97 = "嗯……事情就跟老師說的一樣。#n所以我想如果跟老師商量商量可能會有所改變。"
1007706-100 = "老師和實現正義部的大家總是說我什麼都做得很好……"
1007706-104 = "但是我的想法和大家不一樣……#n看到其他人熱衷於自己覺得有趣的事，我就會覺得很羨慕。"
1007706-106 = "就算我會做很多事又如何……我連自己想做什麼都不知道。"
1007706-107 = "比起什麼都做得好的人，明確知道自己想做什麼的人反而更耀眼。"
1007706-108 = "但是這種話如果告訴別人……別說是被諒解，不被罵就該感到慶幸了……"
1007706-113 = "所以……唔……大致就是這樣。"
1007706-114 = "雖然老師應該已經察覺了……#n但現在想想……這種話似乎只能直接跟老師說。"
1007706-115 = "像我這樣的學生果然很麻煩吧？"
1007706-116 = "唔，雖然你是老師也是一部分的原因……#n但我絕對沒有信不過其他人的意思。"
1007706-117 = "不過這種事……果然還是最適合跟老師商量對吧？這樣沒有很奇怪吧？"
1007706-118 = "當然沒有是嗎？#n哈哈，是是是，就知道老師會這麼說。"
1007706-119 = "好，那麼……"
1007706-120 = "可以請老師給我一些建議嗎？"
1007706-121 = "雖然見面的次數還不是很多，但我相信老師大概已經知道了……怎麼樣？"
1007706-122 = "什麼比較適合我呢？做什麼事最像我呢？"
1007706-123 = "或者老師有發現連我自己都沒發現的「可能會喜歡的事」嗎？"
1007706-124 = "這樣問果然太突然了吧……"
1007706-125 = "……嗯？"
1007706-126 = "你知道但是不能告訴我……？"
1007706-127 = "……？？？#n咦？那是什麼意思？"
1007706-128 = "為什麼不能告訴我呢……？"
1007706-129 = "……咦？"
1007706-130 = "在那之前有件事要先做？#n是什麼事……？"
1007706-131 = "[s9]「先放棄『尋找』的想法。」\n[s10]「停止去想自己該做什麼，試著再隨心所欲一點。」"
1007706-137 = "……嗯？"
1007706-138 = "那個……我好像沒聽清楚……？#n你剛才說……"
1007706-139 = "要我放棄尋找……？#n這是什麼意思？"
1007706-140 = "意思是要我死心嗎……"
1007706-141 = "你說不是這樣？完全是兩回事……？"
1007706-142 = "[s11]「這樣的情況並不是一花有問題而導致的。」\n[s12]「希望你別被『必須尋找』這個想法壓迫。」"
1007706-145 = "……嗯？"
1007706-146 = "感覺好像懂了……又好像沒懂。"
1007706-147 = "……呼呣……"
1007706-148 = "……嘿嘿。"
1007706-149 = "對不起，因為我不想說謊，所以就老實跟老師說了……其實我聽不太懂。"
1007706-150 = "我覺得我已經……夠隨心所欲了。"
1007706-151 = "不過……雖然還不是很清楚……"
1007706-152 = "但老師難得一臉正經地告訴我這些，一定是有原因的。"
1007706-153 = "所以……我決定要朝「更加」隨心所欲的方向思考。"
1007706-157 = "……我願意相信老師說的話。"
1007706-158 = "[s13]「哦，一花……？」\n[s14]「你剛才很……」"
1007706-161 = "好！有句話說擇日不如撞日！"
1007706-162 = "既然如此～就立刻開始吧！#n要更加隨心所欲！"
1007706-163 = "那今天一整天……"
1007706-164 = "老師都要一直陪我玩哦！！"
1007706-166 = "（之後陪著一花在公園和遊樂園玩耍，直到他說累了想回家為止）"
1007706-167 = "（一花在回程時的表情，看起來似乎釋懷了許多）"

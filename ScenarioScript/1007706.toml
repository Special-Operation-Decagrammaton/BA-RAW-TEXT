[translation]
1007706-1 = "For the Time Being"
1007706-3 = "I promised Ichika that I'd meet her in the park, so I headed that way."
1007706-4 = "Uh... Sensei."
1007706-5 = "Wow. How do you have such perfect timing?"
1007706-6 = "[s1] \"Is that...Ichika?\"\n[s2] \"Why is your voice coming from above me?\""
1007706-9 = "Ahaha! Because I'm over here! Sensei, up here!"
1007706-10 = "Hang on. I'm in the middle of something..."
1007706-11 = "I need to grab something, and then I'll be right down."
1007706-13 = "Hup!"
1007706-16 = "― [log=이치카]Haha! Sensei! Over here! Here![/log][wa:2280] "
1007706-18 = "― [log=이치카]Can you see me?[/log]"
1007706-21 = "― [log=이치카]Ah! This is just a balloon...[/log][wa:1200] "
1007706-24 = "― [log=이치카]But, when I'm holding it...[/log][wa:1180] "
1007706-26 = "― [log=이치카]I look like a kid having fun at an amusement parks... Haha.[/log][wa:1300] "
1007706-29 = "― [log=이치카]Oh! This isn't mine though![/log][wa:10] "
1007706-31 = "― [log=이치카]It's just... One thing led to another, and...[/log][wa:1140] "
1007706-34 = "[ns3] \"You climbed up there to help someone...\"\n[ns4] \"Someone needed help again, right?\""
1007706-35 = "― [log=이치카]Well, uh... Yes, that's it...[/log][wa:1040] "
1007706-36 = "― [log=이치카]Well, uh... Yes, that's it...[/log][wa:1040] "
1007706-38 = "― [log=이치카]How did you know?[/log]"
1007706-41 = "― [log=이치카]Huh...?[/log][wa:10] "
1007706-43 = "― [log=이치카]Am I really that easy to read?[/log][wa:10] "
1007706-46 = "― [log=이치카]Ah. Well, whatever...[/log][wa:240] "
1007706-48 = "― [log=이치카]You know, I've never seen you from this angle before.[/log][wa:600] "
1007706-51 = "― [log=이치카]It's a whole new perspective.[/log]"
1007706-53 = "― [log=이치카]Everything looks...different.[/log][wa:700] "
1007706-56 = "― [log=이치카]It's kinda fun.[/log][wa:1500] "
1007706-58 = "― [log=이치카]I think I like it! Haha![/log][wa:1720] "
1007706-61 = "Ichika abruptly jumped down from the tree, waved, and ran off."
1007706-62 = "She returned a few minutes later without the balloon."
1007706-64 = "*pant* *pant* ...Okay, I'm back!"
1007706-65 = "Phew! If I knew you were going to be early, I would have come sooner!"
1007706-66 = "But it worked out. I climbed the tree for that balloon because a kid lost it."
1007706-67 = "I was worried they'd get hurt trying to get it themselves, so I sat them on a bench to wait while I got it for them."
1007706-68 = "...Hm?"
1007706-69 = "You think that was impressive? Why?"
1007706-70 = "Because the tree is so tall?"
1007706-71 = "Ha! There you go exaggerating again."
1007706-72 = "It's nothing. Plenty of people can climb trees."
1007706-73 = "I just happened to be in the right place at the right time. It's no big deal."
1007706-74 = "[s5] \"That's not what I meant.\"\n[s6] \"No it wasn't the tree's height...\""
1007706-77 = "*sigh* You don't have to keep saying things like that just for my sake."
1007706-78 = "...Hm?"
1007706-79 = "Wait—You actually think I did a good thing?"
1007706-80 = "Well, everybody appreciates a compliment but—"
1007706-81 = "No, you know what? I'm just going to take what you said to heart. Thank you, Sensei!"
1007706-82 = "Heehee..."
1007706-83 = "Uh..."
1007706-84 = "Anyway, the reason I reached out to you..."
1007706-85 = "You may already know, since I've mentioned it before."
1007706-86 = "It's about... Uh..."
1007706-87 = "*sigh* I'm not really sure how to explain this. I want to..."
1007706-88 = "[s7] \"Get obsessed with something?\"\n[s8] \"Find your passion?\""
1007706-94 = "...Haha."
1007706-95 = "So you did already know. I guess you saw this coming."
1007706-96 = "I suppose I mentioned it once, or twice, or a bunch..."
1007706-97 = "Anyway, it's like you said. And I thought maybe you could offer some advice."
1007706-100 = "I know you and the other members of the Justice Task Force think I'm good at a lot of stuff."
1007706-104 = "The thing is, I'm always envious of people who seem really passionate about what they do."
1007706-106 = "Being decent at everything I try is nice and all, but what good is that if I can't figure out what I truly love? I'll never be great at anything."
1007706-107 = "Someone who knows who they are and what they're about... Well, they shine so much brighter, you know?"
1007706-108 = "It probably sounds silly. And I worry people wouldn't understand or would make fun of me for feeling that way."
1007706-113 = "So... Well... That's the situation."
1007706-114 = "And that's also why you're the only person I've talked to about it."
1007706-115 = "Ugh. You must think I'm such a bother."
1007706-116 = "It's not that I can't trust other people with this, but...you're Sensei."
1007706-117 = "If there's anyone I should get advice from, its you, right? It's not weird?"
1007706-118 = "...Of course. Haha! I should have known you'd say that."
1007706-119 = "Okay, then..."
1007706-120 = "What advice do you have for me?"
1007706-121 = "I know we've only gotten together a few times, but that's enough for you to have an idea, right?"
1007706-122 = "What's best? Which of my talents do you think would best represent who I am?"
1007706-123 = "Or maybe there's something I haven't tried yet that you think I would like?"
1007706-124 = "Ah, I kind of sprung this on you, didn't I?"
1007706-125 = "...Hm?"
1007706-126 = "...Oh, you have an idea?! But you...can't tell me..."
1007706-127 = "What?! Why not?"
1007706-128 = "I don't understand."
1007706-129 = "...Ah"
1007706-130 = "What do I need to do first?"
1007706-131 = "[s9] \"Stop trying to force it.\"\n[s10] \"Trust your heart.\""
1007706-137 = "...Huh?"
1007706-138 = "I'm sorry. You want me to do what?"
1007706-139 = "I don't understand what you mean by that."
1007706-140 = "Unless you just don't know what to say... You're giving up on me, aren't you?"
1007706-141 = "...Really? Because it sure sounds like you are. I knew it. I'm hopeless!"
1007706-142 = "[s11] \"No, you're not. There's nothing wrong with you.\"\n[s12] \"I just think you're expecting too much of yourself.\""
1007706-145 = "Oh. Hm..."
1007706-146 = "I think I understand...maybe..."
1007706-147 = "...Hm."
1007706-148 = "...Heehee."
1007706-149 = "Sorry. If I'm being honest, I'm still not sure I understand."
1007706-150 = "I thought I WAS trusting my heart..."
1007706-151 = "Um... But..."
1007706-152 = "You seem sincere, Sensei, and you usually know what you're talking about."
1007706-153 = "So, I'll think more about what trusting my heart means."
1007706-157 = "And for now, I'll trust you and your advice, Sensei!"
1007706-158 = "[s13] \"Ichika...?\"\n[s14] \"About earlier...\""
1007706-161 = "Oh, right! We're wasting daylight!"
1007706-162 = "We should get started! Time to follow my heart!"
1007706-163 = "For the rest of the day... "
1007706-164 = "You're all mine!"
1007706-166 = "We had a blast visiting the amusement park until Ichika got tired and went home."
1007706-167 = "She seemed extremely satisfied with how the day turned out."

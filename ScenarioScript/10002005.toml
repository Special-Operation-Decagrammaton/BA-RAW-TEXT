10002005-77 = "#zmc;instant;0,0;1700\n1;아즈사;02;아까웠어. 히후미. 마지막에 저격수의 매복을 방심하지만 않았어도 2시간은 더 버틸 수 있었을 거야.\n#1;ar\n#1;em;[반응]\n#3;m5"

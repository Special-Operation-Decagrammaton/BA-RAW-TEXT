[translation]
10002005-1 = "บทเริ่มต้น;เด็กสาวแห่งท้องทะเลฤดูร้อน"
10002005-6 = "ว้าว! ทะเลค่ะ ทะเล!"
10002005-7 = "ทะเลของจริงเลยนะ อาซึสะจัง! ในที่สุดพวกเราก็มาถึงทะเลแล้วค่ะ!"
10002005-8 = "อื้อ... ทะเลจริงๆ ด้วย"
10002005-9 = "เอ๋... ดูตอบนิ่งๆ กว่าที่คิดเอาไว้อีกนะคะ? ถ้าแสดงออกว่าดีใจกว่านี้ก็คงจะดี..."
10002005-10 = "อาซึสะจังเพิ่งจะเคยมาทะเลครั้งแรกใช่ไหมคะ? อาซึสะจัง นี่ทะเลยังไงล่ะคะ!#nหลังจากผ่านเรื่องยากลำบากต่างๆ มา นี่เป็นครั้งแรกที่ได้มาทะเลใช่ไหมคะ?"
10002005-11 = "ทุกคนพยายามอย่างหนักเพื่ออาซึสะจังเลยนะคะ!"
10002005-12 = "ใช่ไหมคะ คุณครู?"
10002005-13 = "[s1] \"ไม่ใช่ครูหรอก แต่เป็นเพราะทุกคนพยายามต่างหาก...\"\n[s2] \"ครูไม่เคยรู้เลยว่าเธอไม่เคยมาทะเลมาก่อน\""
10002005-14 = "เปล่าหรอก มันก็ไม่ได้แย่เท่าไหร่ ฉันเองก็รู้สึกประทับใจนิดหน่อยอยู่หรอกนะ..."
10002005-15 = "เปล่าหรอก มันก็ไม่ได้แย่เท่าไหร่ ฉันเองก็รู้สึกประทับใจนิดหน่อยอยู่หรอกนะ..."
10002005-16 = "แต่ว่า..."
10002005-17 = "เราเจอปัญหามาตั้งมากมายกว่าจะมาถึงตรงจุดนี้ได้"
10002005-18 = "และฉันก็เชื่อว่าเรายังไม่ผ่านจุดที่เลวร้ายสุดๆ ไปหรอกนะ"
10002005-19 = "..."
10002005-20 = "ระ...เรื่องนั้น..."
10002005-26 = "คิกคิก... คิคิคิ!!"
10002005-27 = "เฮ้อ... ทำไมฉันถึงได้มาเกี่ยวข้องกับเรื่องพวกนี้ด้วยนะ..."
10002005-28 = "คิกคิกคิกคิก!!"
10002005-30 = "คิกคิกๆๆๆ...!!!"
10002005-35 = "..."
10002005-36 = "..."
10002005-37 = "แล้วจากนี้..."
10002005-38 = "แล้วจากนี้จะทำยังไงต่อคะ... พวกเราน่ะ?"
10002005-43 = "เรื่อง[wa:200]ราว[wa:200]ของ[wa:400][wa:500]เหตุการณ์[wa:200]ทั้งหมด"
10002005-49 = "กรุณาเข้าไปเงียบๆ นะคะ อย่าคิดจะทำอะไรแผลงๆ ล่ะ"
10002005-50 = "อะ... อ๊ายยย?!"
10002005-51 = "อึ่ก..."
10002005-58 = "ขอบคุณที่พยายามอย่างหนักนะคะ รุ่นพี่"
10002005-59 = "แฮ่กๆ... ทำไม...พวกเราถึงต้องมาทำ..."
10002005-60 = "ความเสียหายที่นับได้ตอนนี้ พบว่าสมาชิกของชมรมทวงความยุติธรรมกว่า 30 คนได้รับบาดเจ็บ#nและจัตุรัสของโรงเรียนฝั่งตะวันออกถูกทำลายไปกว่าครึ่ง รวมถึงอาคารเรียนหมายเลข 12 ก็ถูก#nทำลายจนย่อยยับ..."
10002005-61 = "เอาไว้ค่อยรายงานความเสียหายทีหลังแล้วกันนะคะ มาชิโระ "
10002005-62 = "ว่าแต่ว่า... ความเสียหายทั้งหมดนี่เกิดขึ้นจากนักเรียนแค่สองคนเหรอคะ?#nไม่ใช่ต่อสู้กับกองกำลังขนาดกลางของศัตรูแน่นะคะ...?"
10002005-63 = "ถ้าเกิดว่าศัตรูจู่โจมสายฟ้าแลบและเข้ายึดรถถังของฝ่ายเราล่ะก็... ถ้าเราไม่มีอาวุธสำหรับจู่โจมรถถัง#nมันก็คงจะตอบโต้ลำบาก..."
10002005-64 = "อีกอย่าง พลแม่นปืนบนรถถังก็คอยแต่จะเล็งพลขว้างระเบิดท่าเดียว..."
10002005-65 = "น่าตกใจมากเลยค่ะ เทคนิคแบบนี้"
10002005-66 = "...นั่นสิคะ ไม่อยากเชื่อเลยว่าจะขโมยรถถังจริงๆ ทั้งสองคนกล้าหาญกว่าที่เห็นมากเลยนะคะ"
10002005-67 = "คะ!? มะ...ไม่ได้ขโมยนะคะ! ฉะ...ฉันแค่ขอยืมมาใช้แล้วก็ว่าจะเอาไปคืนทีหลัง..."
10002005-68 = "ปกติแบบนี้เรียกว่าขโมยไม่ใช่เหรอคะ...? คุณอะจิทานิ ฮิฟุมิ คุณชิราสึ อาซึสะ"
10002005-69 = "หืม..."
10002005-70 = "... เราจะหารือเกี่ยวกับเรื่องที่พวกคุณก่อเอาไว้เร็วๆ นี้ค่ะ จนกว่าจะถึงตอนนั้น#nช่วยไปรอในห้องอย่างสงบด้วยนะคะ"
10002005-76 = "อ่า...เอ่อ... เหมือนจะกำลังเข้าใจผิดร้ายแรงอยู่เลย..."
10002005-77 = "น่าเสียดายนะ ฮิฟุมิ ถ้าฉันไม่เผลอและเปิดช่องโหว่ให้พลซุ่มยิงของศัตรูในตอนสุดท้าย#nคงใช้เวลาไม่ถึงสองชั่วโมงแน่"
10002005-78 = "อะ...อาซึสะจัง ฉะ...ฉันว่าตอนนี้ไม่ควรพูดอะไรที่อาจทำให้คนอื่นเข้าใจผิดนะ...คะ..."
10002005-79 = "แล้วทำไมถึงได้โจมตีใส่กลุ่มสมาชิกชมรมทวงความยุติธรรมในตอนแรกกันล่ะคะ?!#nฉันคิดว่าควรยอมแพ้แต่โดยดีซะอีก..."
10002005-80 = "พวกนั้นไล่ตามมา ฉันก็เลยจัดการซะ แล้วก็เพราะฮิฟุมิควบคุมรถถังได้ดี#nเลยทำให้จัดการได้เกือบ 20 คนเลยน่ะ"
10002005-81 = "โดยเฉพาะตอนที่เร่งความเร็วดริฟต์ตอนเข้าโค้งนั่นน่ะ มันสุดยอดมากเลย"
10002005-82 = "ฉะ...ฉันไม่ได้บังคับนะคะ แค่แตะปุ่มไปมั่วๆ ก็เท่านั้นเอง... อ่า... "
10002005-83 = "ทะ...ทำยังไงดีคะ?! ถ้าเป็นแบบนี้ล่ะก็เราคงกลายเป็นจอมวายร้ายที่ขโมยรถถังบุกเข้าไปในโรงเรียน#nและจัดการสมาชิกชมรมทวงความยุติธรรมไปหลายสิบคนแน่เลยค่ะ...!"
10002005-84 = "ก็ถูกแล้วไม่ใช่รึไง?"
10002005-85 = "ปะ...เปล่านะคะ แผนการของฉันน่ะ...ไม่ใช่แบบนี้สักหน่อย..."
10002005-86 = "ฮือ..."
10002005-87 = "แล้วทีนี้จะเอายังไงกันต่อ? จะถูกจับไปทรมานถอดเล็บงั้นเหรอ? เธอเคยฝึกความอดทนการทรมาน#nมารึเปล่า? ฮิฟุมิ?"
10002005-88 = "ฉันไม่เคยฝึกอะไรแบบนั้นหรอกค่ะ... แล้วก็พวกเขาก็ไม่ได้คิดจะทรมานพวกเราหรอกนะคะ...#nหวังว่านะ..."
10002005-89 = "แล้วไหนจะหัวหน้าชมรมอีกล่ะ? หรือว่าเธอคนนั้นนิยมการสังหารมากกว่าการทรมาน..."
10002005-90 = "คะ...คุณซึรุกิน่ะ... ฉะ...ฉันไม่ค่อยแน่ใจเท่าไหร่...#nแต่คงจะไม่ทำอะไรเพื่อนร่วมสถาบันหรอกค่ะ..."
10002005-91 = "มีข่าวลือว่าสู่ขิตกันไปหลายคนแล้วนะ"
10002005-92 = "ฮะ... ฮือ... ฉันก็เคยได้ยินข่าวพวกนั้นมาบ้างนะแต่ว่า..."
10002005-93 = "ถ้าเป็นแบบนี้แล้ว คงไม่มีทางเลือกนอกจากสารภาพไปตามตรงแล้วก็ขอให้ยกโทษให้สินะคะ..."
10002005-95 = "..."
10002005-96 = "แล้วเหตุผลที่ขโมยรถถังนี่... "
10002005-97 = "จะบอกว่าเป็นเพราะ... อยากพาคุณอาซึสะไปทะเลงั้นเหรอคะ?"
10002005-98 = "ค่ะ... ฉันแค่จะขอยืมพาหนะของโรงเรียนไปใช้แล้วก็เอามาคืนเท่านั้นเอง...#nไม่ได้คิดจะขโมยอะไรเลยนะคะ..."
10002005-99 = "ถึงฉันจะไม่คิดว่านักเรียนตัวอย่างของชมรมชั้นเรียนเสริมอย่างคุณฮิฟุมิจะโกหกก็ตามหรอกนะคะ#nแต่ว่า..."
10002005-100 = "ถ้าเป็นทะเลล่ะก็ แค่นั่งรถบัสไปก็ได้แล้วนี่คะ? ทำไมต้องใช้รถถังด้วย...?"
10002005-101 = "มะ...ไม่ได้นะคะ! แบบนั้นไม่ได้เด็ดขาดค่ะ "
10002005-102 = "อาซึสะจังยังไม่เคยเห็นทะเลมาก่อนเลยสักครั้งนะคะ นี่เป็นการไปเที่ยวทะเลครั้งแรกของเธอค่ะ!#nเพราะงั้นก็ควรจะสร้างบรรยากาศดีๆ ให้เธอไม่ใช่เหรอคะ!?"
10002005-103 = "คะ...?"
10002005-104 = "ไหนๆ ก็ปิดเทอมฤดูร้อนแล้ว และเป็นการไปทะเลครั้งแรกของอาซึสะจังด้วยนะคะ#nไปที่ชายทะเลเลยนะคะ"
10002005-105 = "ชายทะเลแล้วมันยังไงกันคะ...?"
10002005-109 = "เพราะงั้นถึงได้ต้องนั่งรถถังไปยังไงล่ะคะ!"
10002005-115 = "เข้าใจแล้วค่ะ ปิดเทอมฤดูร้อน ทะเลแสนสวย หาดทรายระยิบระยับ การเที่ยวทะเลกับกลุ่มเพื่อนๆ..."
10002005-116 = "เพราะแบบนั้นถึงจะต้องใช้รถถังสินะคะ โรแมนติกมากเลยค่ะ ฉันเข้าใจดีค่ะ"
10002005-118 = "(พยักหน้า)"
10002005-119 = "งะ...งั้นเหรอคะ...?"
10002005-120 = "งั้นเหรอ?"
10002005-121 = "มิตรภาพ... ทะเล... ความโรแมนติก แล้วก็..."
10002005-125 = "...? อะ...อื้อ? อะไรน่ะ?? แผ่นดินไหวเหรอ?"
10002005-126 = "เปล่าค่ะ ไม่ใช่แผ่นดินไหวหรอกค่ะ เสียงแบบนี้..."
10002005-131 = "วัยรุ่นนนนน......!!!!"
10002005-132 = "(ตู้มมมมมม!!!)"
10002005-133 = "(ตู้ม!! ตู้มมมมมม!!)"
10002005-136 = "คิกๆ...ฮี่ๆๆ คิกๆ...!! "
10002005-138 = "เอ๋....!?! พะ...พังกำแพงเข้ามาเลยเหรอคะ?! "
10002005-139 = "ซึรุกิ...?"
10002005-141 = "รุ่นพี่ซึรุกิ!? รุ่นพี่หายไปไหนมาคะ!?"
10002005-142 = "อ๊ากกกกก!!!"
10002005-143 = "ทะเลลลลลลลลล!!"
10002005-144 = "ฤดูร้อน!! มิตรภาพ!! คิกๆๆๆ!!"
10002005-145 = "...???"
10002005-146 = "แงงงงง ฉันผิดไปแล้วค่ะ! ยกโทษให้ฉันด้วยนะคะ!#nจับฉันไปทรมานหรือถอดเล็บมันไม่สนุกหรอกค่ะ...!"
10002005-147 = "รุ่นพี่ซึรุกิ...? ดูเหมือนจะมีความเครียดสูงกว่าทุกวันเลยนะคะ..."
10002005-150 = "อืม..."
10002005-151 = "คือว่า... บางที..."
10002005-152 = "ซึรุกิน่ะ... "
10002005-153 = "เคี๊ยกๆๆ....!"
10002005-154 = "คิกๆ...?"
10002005-155 = "มาทางนี้หน่อยค่ะ... "
10002005-156 = "เอ๋? ...?"
10002005-161 = "ฟู่ว..."
10002005-162 = "น่ากลัว... น่ากลัวสุดๆ ไปเลย..."
10002005-163 = "ยังไม่จบหรอกนะ บางทีอาจจะต้องเตรียมตัวเพื่อต่อสู้ครั้งสุดท้ายก็ได้นะ เตรียมใจเอาไว้ด้วยล่ะ ฮิฟุมิ"
10002005-164 = "อะ...เอ๋~!!? งั้นเหรอคะ? พะ...พวกเรามาถึงจุดจบกันแล้วเหรอคะ!? คุณมาชิโระ...!"
10002005-165 = "อืม... นั่นสินะคะ... หลายวันที่ผ่านมารุ่นพี่ซึรุกิดูไม่ค่อยร่าเริงเท่าไหร่เลยค่ะ"
10002005-166 = "ดูจากท่าทางตอนนี้แล้วจะบอกว่าความเครียดสูงดี... หรือว่าบอกว่าอารมณ์บ่จอยดีนะ..."
10002005-167 = "แต่ดูยังไงก็คิดว่าอีกไม่นานคงจะเกิดเทศกาลละเลงเลือดครั้งใหญ่... ก็ได้นะคะ"
10002005-168 = "ฮะ...ฮือ... "
10002005-172 = "กลับมาแล้วค่ะ..."
10002005-173 = "ฮึ่ก!! เพื่อให้สมกับการต่อสู้ครั้งสุดท้าย!! เพราะงั้น... ขอเวลาให้ฉันเขียนคำสั่งเสียก่อนได้ไหมคะ!"
10002005-174 = "....คะ? คำสั่งเสียเหรอคะ?"
10002005-175 = "ถ้าเป็นเรื่องซึรุกิล่ะก็... ฉันคุยกับเธอแล้ว และให้เธอกลับไปแล้วล่ะค่ะ"
10002005-176 = "แต่ว่าฉันมีเรื่องที่อยากจะขอให้ทั้งสองคนช่วยอยู่ค่ะ"
10002005-177 = "คะ...คะ!? พวกเราเหรอคะ?"
10002005-180 = "เข้าใจแล้ว... คิดจะต่อรองกันใช่ไหมล่ะ?"
10002005-181 = "คงคิดจะให้พวกเราไปทำเรื่องผิดกฎหมายที่อันตรายๆ แล้วก็ไม่มีใครอยากทำสินะ"
10002005-182 = "อืม... จะคิดแบบนั้นก็ได้..."
10002005-183 = "แต่ถ้าพูดให้ถูกก็คือ เป็นการทำงานจิตอาสาเพื่อทดแทนเรื่องที่เกิดขึ้นในวันนี้..."
10002005-184 = "ทะ...ทำงานจิตอาสาเหรอคะ...?"
10002005-185 = "นอกจากนี้ทางเราจะเป็นคนออกค่าใช้จ่ายทั้งหมด และยินยอมให้นำรถถังไปได้ค่ะ#nถ้าแบบนี้ทุกคนก็คงจะมีความสุขกันสินะคะ"
10002005-190 = "นั่นคือข้อต่อรองในครั้งนี้สินะ..."
10002005-191 = "'ไปทะเลกับคุณซึรุกิ ทำภารกิจที่ได้รับมาให้สำเร็จ และถ่ายรูปมาเป็นหลักฐานยืนยันด้วยนะคะ'"
10002005-192 = "\"รายการด้านล่างนี้คือภารกิจที่มอบหมายให้กับพวกคุณค่ะ...\""
10002005-193 = "คือ... ทำไมคุณฮาสุมิถึงมอบหมายภารกิจนี้ให้กับพวกเรานะ..."
10002005-194 = "ฉันไม่รู้ว่าแค่พวกเราสองคนจะทำภารกิจนี้ให้สำเร็จได้ยังไง..."
10002005-195 = "ฉันก็เลยมาขอร้องคุณครูน่ะค่ะ..."
10002005-196 = "[s] \"ถึงจะไม่ค่อยเข้าใจเท่าไหร่ แต่ครูจะพยายามนะ\""
10002005-197 = "อ่า..."
10002005-198 = "แค่คุณครูมาด้วยก็อุ่นใจขึ้นเยอะแล้วล่ะค่ะ!"
10002005-202 = "อืม..."
10002005-203 = "ยัยนี่เป็นคนเฝ้างั้นเหรอ คงถูกส่งมาเฝ้าจับตาดูพวกเราไม่ให้หนีไปได้สินะ#nพวกชมรมทวงความยุติธรรมนี่ไม่ประมาทกันเลยจริงๆ สินะ"

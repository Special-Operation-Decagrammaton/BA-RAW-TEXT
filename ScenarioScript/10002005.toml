10002005-80 = "#zmc;instant;0,0;1700\n1;아즈사;99;쫓아오니까 공격했을 뿐이야. 그리고 히후미가 전차를 잘 조종해서 20명 가까이 해치울 수 있었고."
10002005-81 = "#zmc;instant;0,0;1700\n1;아즈사;02;특히 그 순간 가속 후 코너에서 한 드리프트는 엄청 훌륭했어. \n#1;em;[반응]"

[translation]
10002005-1 = "序幕;夏日海邊的少女們"
10002005-6 = "哇！是大海唷，大海！"
10002005-7 = "終於到了！是真正的海唷，梓醬！"
10002005-8 = "嗯……是海。"
10002005-9 = "咦……比想像中還平靜呢……？#n還以為會更興奮的說……"
10002005-10 = "梓醬是第一次來到海邊對吧？#n是好不容易才來到的大海唷！"
10002005-11 = "大家為了梓醬而辛苦的結果，感覺如何？"
10002005-12 = "對吧，老師？"
10002005-13 = "[s1]「我是不怎麼辛苦，反倒是你們……」\n[s2]「我沒想到她沒來過海邊。」"
10002005-14 = "嗯，我也還挺感動的。確實很不錯。"
10002005-15 = "嗯，我也還挺感動的。確實很不錯。"
10002005-16 = "但……"
10002005-17 = "可能是因為來到這裡之前引發了各種問題的關係……"
10002005-18 = "……還是該說現在也還在問題當中呢。"
10002005-19 = "……"
10002005-20 = "這，這麼說來確實如此呢……"
10002005-26 = "嘰嘻嘻……咯嘿嘿嘿嘿嘿嘿！！"
10002005-27 = "……哎呀，我怎麼也到這裡來了……"
10002005-28 = "咯哈哈哈！！"
10002005-30 = "嘰哈哈哈哈哈────！！！"
10002005-35 = "……"
10002005-36 = "……"
10002005-37 = "那個……"
10002005-38 = "我，我們，接下來該怎麼辦呢……？"
10002005-43 = "事[wa:200]件[wa:200]的[wa:400][wa:500]全[wa:200]貌"
10002005-49 = "請到裡頭去吧，勸你們最好不要抵抗比較好哦。"
10002005-50 = "呀啊！？"
10002005-51 = "……唔。"
10002005-58 = "您辛苦了，蓮實前輩。"
10002005-59 = "呼……真傷腦筋……"
10002005-60 = "光是目前掌握到的損害資料，就已經有30餘名實現正義部成員受輕重傷、#n東邊學園廣場半毀、第12校舍全毀，以及──"
10002005-61 = "詳細的損害報告晚點再說吧，麻白。"
10002005-62 = "但這些……真的是這兩名學生造成的損害規模嗎？#n不是跟武裝集團或是其他大規模敵人的戰鬥……？"
10002005-63 = "他們發動了如[ruby=Blitzkrieg]閃電戰[/ruby]一般的機動戰，#n因此在取得對戰車武器之前只能屈於被動……"
10002005-64 = "再加上戰車上[ruby=Designated Marksman]的精確射手又[/ruby]針對擲彈兵攻擊……"
10002005-65 = "真是驚人的戰術啊。"
10002005-66 = "原來如此……話說回來，居然會想在光天化日之下偷走學園的戰車。#n你們兩位，比我想像中還要大膽呢。"
10002005-67 = "不，不是的，那個……！我，我沒有偷！#n只是稍微借用一下，用完就會還的……"
10002005-68 = "一般來說，這就叫做「偷」不是嗎……？#n阿慈谷日步美同學、白洲梓同學。"
10002005-69 = "……哼。"
10002005-70 = "……對你們的處分還在討論中，在那之前請乖乖待著吧。"
10002005-76 = "啊，啊嗚……好像被嚴重地誤會了……"
10002005-77 = "不過真可惜啊，日步美。#n如果最後有察覺到狙擊手的埋伏，應該還能繼續周旋。"
10002005-78 = "梓，梓醬。我們還是先不要說些會引起誤會的話吧……"
10002005-79 = "不，不過話又說回來，為什麼要攻擊實現正義部的成員呢！？#n不是應該乖乖投降才對嗎……"
10002005-80 = "因為有人追來所以反擊而已。#n也是多虧了日步美精湛的戰車操控技術，才能讓我擊倒那麼多敵人。"
10002005-81 = "尤其是在彎道上緊急加速後的飄移。#n真厲害，那不是每個人都能做到的。"
10002005-82 = "與，與其說是操控，我只是隨便到處亂按而已……啊，啊嗚嗚……"
10002005-83 = "怎，怎麼辦！？這樣下去我們就要變成偷走學園的戰車，#n在校內四處亂闖還傷害幾十名實現正義部成員的，單純的壞人了哦……！"
10002005-84 = "完全沒錯不是嗎？"
10002005-85 = "有，有錯啦……！#n嗚嗚，不該是這樣的……"
10002005-86 = "啊嗚嗚……"
10002005-87 = "接下來會怎麼樣呢……會被拔指甲嗎？#n日步美，有做過應對拷問的訓練嗎？"
10002005-88 = "沒做過那種訓練，而且也不想做……#n況且實現正義部應該不會拷問我們……吧。"
10002005-89 = "實現正義部的部長也是？#n不，那與其說是拷問，不如說是處刑……"
10002005-90 = "弦，弦生同學我不是很熟……#n但，但應該不會對同學園的人做出那種……"
10002005-91 = "根據我聽過的傳言，已經有好幾個人「回不來了」。"
10002005-92 = "啊，啊嗚嗚……那個傳聞，我確實也聽說過……"
10002005-93 = "既然這樣，只能老實說出一切，請求原諒了……"
10002005-95 = "……"
10002005-96 = "所以總結來說，偷走戰車的原因……"
10002005-97 = "是因為想讓梓同學看看大海……是這樣沒錯嗎？"
10002005-98 = "是的……所以才想借用學園的備品到海邊去的……#n絕對沒有要偷走的意思……"
10002005-99 = "既然是日步美同學這麼說，應該不是謊話才對……"
10002005-100 = "不過想去海邊的話直接去不就行了，為何要特地搭戰車……？"
10002005-101 = "那，那樣是不行的！"
10002005-102 = "因為梓醬從來沒看過大海。#n這可是第一次看見大海的回憶唷！？"
10002005-103 = "什麼……？"
10002005-104 = "現在是難得的暑假，時機再好不過了。#n明媚的陽光、鬆軟的沙灘、波光粼粼的大海……那麼果然──"
10002005-105 = "果然……？"
10002005-109 = "果然就得搭戰車去不是嗎！？"
10002005-115 = "我明白了。#n暑假、閃耀的大海、明亮的沙灘、與朋友的旅行……"
10002005-116 = "確實不能少了戰車啊。海邊就是要有戰車，這就是浪漫。"
10002005-118 = "（點頭點頭！）"
10002005-119 = "是，是嗎……？"
10002005-120 = "是嗎？"
10002005-121 = "友情、大海、浪漫，也就是──"
10002005-125 = "……？#n咦，咦？怎麼了！？地震！？"
10002005-126 = "不，這個聲音恐怕是……"
10002005-131 = "青春──────！！！！"
10002005-132 = "（咚哐鏘────！）"
10002005-133 = "（哐鏘，哐鏘！！）"
10002005-136 = "嘰嘿嘿嘿嘿嘿嘿！！"
10002005-138 = "噫，噫噫！？#n竟，竟然破牆跑進來了！？"
10002005-139 = "弦生……？"
10002005-141 = "弦生前輩！？你之前都跑去什麼地方了啊？"
10002005-142 = "嘰嘿啊啊啊啊啊！！！"
10002005-143 = "大海咿咿咿咿啊啊啊啊啊啊啊！！"
10002005-144 = "夏天！！友情！！嘰哈啊啊啊啊啊啊啊！！"
10002005-145 = "……？？？"
10002005-146 = "很抱歉對不起請饒了我吧！#n拔指甲很痛的請放過我而且我想應該沒那麼有趣！！"
10002005-147 = "弦生前輩，今天好像特別興奮呢……？"
10002005-150 = "……原來如此。"
10002005-151 = "這……難道是……"
10002005-152 = "……弦生。"
10002005-153 = "咯科科科科……！"
10002005-154 = "……嘿？"
10002005-155 = "稍微借一步說話……"
10002005-156 = "啊啊……？"
10002005-161 = "呼……"
10002005-162 = "太，太可怕了……"
10002005-163 = "……還沒結束。別放鬆警戒，日步美。#n有可能會再次被突襲而進入戰鬥。"
10002005-164 = "咦，咦！？是這樣的嗎麻白同學！？"
10002005-165 = "唔嗯，我也不是很清楚……#n不過最近的弦生前輩常常看起來沒什麼精神。"
10002005-166 = "現在雖然看起來很興奮，卻給人一種不太高興的感覺……"
10002005-167 = "這麼想想，說不定有點危險呢……"
10002005-168 = "啊，啊嗚嗚……果然……"
10002005-172 = "……我回來了。"
10002005-173 = "噫噫！？請，請至少讓我們留下遺言吧……！"
10002005-174 = "……遺言？"
10002005-175 = "……我已經和弦生說明並請他今天先回去了，不必擔心。"
10002005-176 = "但有件事要麻煩兩位。"
10002005-177 = "呃，咦咦！？我，我們嗎？"
10002005-180 = "……原來如此，是司法交易吧？"
10002005-181 = "不追究我們的責任，但是要我們做些危險的事。"
10002005-182 = "這個嘛，我想應該並沒有那麼危險才對……"
10002005-183 = "準確來說，今天的事就以志工活動來代替懲處……"
10002005-184 = "志，志工活動是嗎……？"
10002005-185 = "除此之外，我們還會負責提供各種經費，並且正式將戰車借給兩位。#n這樣對彼此都好吧。"
10002005-190 = "……沒想到事情會變成這樣啊。"
10002005-191 = "「和弦生一起去海邊，並完成清單上所寫的任務吧」"
10002005-192 = "「此外，請提供照片作為證明」……"
10002005-193 = "雖然到現在還是搞不清楚狀況……"
10002005-194 = "不過只靠我們兩個人的話，實在沒有自信能順利完成……"
10002005-195 = "所以才會請老師幫忙……"
10002005-196 = "[s]「雖然不太清楚，但我會幫忙的。」"
10002005-197 = "啊，啊哈哈……"
10002005-198 = "不過老師能一起來，心裡感覺踏實多了！"
10002005-202 = "嗯……"
10002005-203 = "……我明白了，這位是來負責監視的啊。是為了避免我們逃走嗎？#n不愧是實現正義部，做的真徹底。"
10002005-204 = "其，其實不是那樣的……"
10002005-205 = "我不會大意的。#n雖然說是監視，也有從背後偷襲的可能。"
10002005-206 = "（好像被大大地誤會了……）"
10002005-209 = "……總而言之，是要我們去「暑期度假」的意思嗎？"
10002005-210 = "是的。如你所知，弦生最近似乎有點過於勞累了。"
10002005-211 = "（是這樣啊……）"
10002005-212 = "畢竟最近一直忙於工作……"
10002005-213 = "這樣下去恐怕會影響到實現正義部任務的執行。"
10002005-214 = "所以我想趁著這個機會，讓麻白也一起去好好放鬆一下。"
10002005-215 = "原來如此，休息確實也是任務……"
10002005-216 = "這也是為了正義。我明白了。#n我會盡力而為，前輩。"
10002005-219 = "要，要是沒能順利完成任務的話……指甲可能就……啊嗚嗚……"
10002005-220 = "目的也可能是「[ruby=MIA]任務中失蹤[/ruby]」。"
10002005-221 = "[s]「……我可以看一下那份清單嗎？」"
10002005-222 = "啊，好的！在這裡。"
10002005-227 = "「堆沙堡與沙浴」、「學會游泳」、「打沙灘排球」、「放煙火」、#n「打西瓜」、「去海之家」……"
10002005-228 = "一共有6項呢。#n要和弦生同學一起做這些事，然後拍下照片作為證據……"
10002005-229 = "[s3]「……還真是相當和平的任務呢。」\n[s4]「就像是夏天的必做清單之類的？」"
10002005-230 = "……老師還是一如既往地單純過頭了。"
10002005-231 = "……老師還是一如既往地單純過頭了。"
10002005-232 = "如果直接把目標寫出來，要是清單被敵人奪走該怎麼辦？"
10002005-233 = "暗號是交易的基礎。雖然表面上這麼寫，其背後應該隱藏著其他意圖才對。#n更何況對方不是別人，而是三一的實現正義部……"
10002005-234 = "要是在獲得的機會中被判斷為「派不上用場」，恐怕就見不到明天的太陽了吧。#n任何一刻都不能大意。"
10002005-235 = "啊嗚嗚……梓醬又在說可怕的話了……"
10002005-236 = "可，可是既然已經接受也只能硬著頭皮做了呢……"
10002005-237 = "不過也因此能正式借到十字軍醬……耶嘿嘿……"
10002005-238 = "大海、泳裝、陽光，還有戰車！"
10002005-239 = "這正是我所期望的，理想中的完美暑假！！"
10002005-240 = "……日步美可以接受的話，倒也沒什麼不好。"
10002005-241 = "所以說，暫時先停止那些複雜的推測吧？"
10002005-242 = "總之先試著按照清單，一件一件完成……"
10002005-250 = "嘰哈哈哈哈哈！！！"
10002005-251 = "海！是海！！咯哈哈哈哈哈！！！"
10002005-252 = "呀啊啊啊！什麼東西！？真嚇人！？"
10002005-253 = "……一件一……"
10002005-254 = "怪，怪物！？有怪物啊！！大家快逃！！！"
10002005-257 = "嘰哈哈哈哈哈哈哈哈啊啊────！！！"
10002005-260 = "……一件……"
10002005-264 = "……"
10002005-265 = "……一……"
10002005-266 = "……我們真的能做到嗎，老師？"
10002005-267 = "[s5]「加，加油吧日步美！加油！！」\n[s6] 靜靜移開視線"
10002005-268 = "嗚哇啊啊啊啊啊啊啊～！！救救我們吧老師～～！！"
10002005-269 = "嗚哇啊啊啊啊啊啊啊～！！救救我們吧老師～～！！"
10002005-274 = "……嗯。"
10002005-275 = "看來會是個比往常還要和平的暑假呢。"
10002005-277 = "（幾天前，在實現正義部的任務中……）"
10002005-278 = "嘰耶耶耶──────！！"
10002005-279 = "明明是夏天！！最後的夏天啊──！！"
10002005-280 = "夏天！！友情！！青春！！大海！！泳裝────！！"
10002005-281 = "到底在哪裡啊啊啊────！！"
10002005-285 = "（咚哐──！！咚────！！）"
10002005-286 = "我的青春，跑哪去了啊啊啊────！！"
10002005-287 = "（咚────！！！咻咚──────！！！！）"
10002005-288 = "弦生前輩，今天也是狀態絕佳呢。"
10002005-289 = "老實說，連日執行任務確實讓我覺得有點累，不過在這副模樣面前，我可不能洩氣。"
10002005-290 = "我也得以前輩為榜樣，更加努力才行！"
10002005-291 = "（弦生……）"
10002005-294 = "難得的假日……"
10002005-295 = "還請好好享受哦。"

10002005-83 = "#zmc;instant;0,0;1700\n3;히후미;04;어, 어떡해요?! 이대로라면 학원의 전차를 훔쳐서 교내를 질주하며 정의실현부 부원들을 수십명이나 해치운 대악당이 되어 버린다구요……!\n#3;hophop"

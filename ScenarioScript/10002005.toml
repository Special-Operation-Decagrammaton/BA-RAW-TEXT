10002005-68 = "Without permission, Miss Ajitani Hifumi. I believe that is what's called stealing, and you and Miss Shirasu Azusa are both guilty of it."
10002005-69 = "Hmph."
10002005-70 = "Your punishment will be decided soon, so just stay quiet as we deliberate."
10002005-76 = "This is bad. They don't realize this is a big misunderstanding."

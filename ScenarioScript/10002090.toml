[translation]
10002090-1 = "第9話;打西瓜（１）"
10002090-2 = "重，重整一下心情，接下來是「打西瓜」！"
10002090-3 = "其實我本來忘了帶西瓜……#n幸好海之家的店主以非常便宜的價格賣了很多給我！"
10002090-8 = "……普通的西瓜？不是什麼暗號？"
10002090-9 = "啊，啊哈哈……只是平凡的打西瓜而已……"
10002090-10 = "這樣啊，那就沒問題了。#n畢竟打西瓜我也很熟。"
10002090-11 = "這是海邊必玩的遊戲呢。"
10002090-12 = "話說棒子在哪裡呢？"
10002090-13 = "嗯？"
10002090-14 = "要打西瓜的話，不是需要球棒或是木刀之類的東西嗎？"
10002090-15 = "哎呀……這麼一說，我連那個也一起忘了……"
10002090-21 = "（喀嚓）"
10002090-23 = "（砰！！）"
10002090-25 = "西，西瓜粉碎了！？"
10002090-26 = "為什麼這麼驚訝？#n我精準打中了西瓜啊，而且還是正中紅心。"
10002090-27 = "不對啦！雖然實際上好像也不能說不對但不行啦梓醬！請不要開槍射西瓜！"
10002090-28 = "而且打西瓜得要遮住眼睛才行。#n難道梓醬要蒙眼射西瓜嗎？"
10002090-29 = "原來如此，還有這種地方規定啊？#n那就入境隨俗吧。"
10002090-39 = "哇啊啊……！！西，西瓜又四分五裂了……！"
10002090-45 = "佩服。不愧是你啊，梓。"
10002090-46 = "但我也是名狙擊手。"
10002090-51 = "（咻砰！！）"
10002090-52 = "……原來如此。"
10002090-53 = "即便使用的是反器材步槍也依舊如此精準。"
10002090-54 = "既然這個距離無法分出高下，那麼就增加一些限制……"
10002090-55 = "也好。#n任何挑戰我都接受，梓同學。"
10002090-62 = "對彼此燃起了競爭的念頭……！？"
10002090-63 = "沒問題嗎？這樣真的沒問題嗎，老師！？"
10002090-64 = "[s]「沒關係吧，反正他們看起來很高興。」"
10002090-65 = "咦，咦咦……"
10002090-69 = "我回來了……西瓜已經放置在目標地點……"
10002090-70 = "真的沒問題嗎？#n距離大約有500m……在我看來只剩一個小點了。"
10002090-71 = "完全沒問題。#n這種距離的射擊我已經成功過無數次了。"
10002090-72 = "不，不是……我指的是要蒙眼射擊……"
10002090-73 = "我畢竟是狙擊手，這點程度的負重不算什麼。"
10002090-74 = "我怎麼覺得遮住狙擊手的眼睛已經不是負重的程度了……？"
10002090-75 = "身為一名追求正義的狙擊手……"
10002090-76 = "必須時時謹記不斷挑戰自我的精神。"
10002090-77 = "啊嗚……已經不知道該說什麼才好了……"
10002090-78 = "總，總之……？"
10002090-79 = "就開始吧……？"
10002090-80 = "……嗯？"
10002090-81 = "[s]「……怎麼了？」"
10002090-82 = "那個……如果我沒看錯的話……？"
10002090-83 = "西瓜……放在那裡的西瓜好像不見了……？#n雖然本來就看得不是很清楚……"
10002090-84 = "該不會已經開槍了……不，不對。#n那應該會先聽到聲音……"
10002090-85 = "這是怎麼回事？"
10002090-86 = "哦？"
10002090-87 = "咦，難道是海之家的……！？"
10002090-95 = "你們到底在做什麼！！"
10002090-96 = "不可以玩食物啦～！"
10002090-97 = "要好好珍惜食物才行！！"
10002090-99 = "好有道理……！不對，這種話應該由你來說嗎！？"
10002090-100 = "……價值觀不同是嗎。"
10002090-101 = "要來妨礙的話，我不會手下留情。"
10002090-102 = "為，為什麼又變成這樣了……"

[translation]
10002090-1 = "Episode 9;Smashing Watermelons Part 1"
10002090-2 = "Now we're on to \"Smash watermelons.\""
10002090-3 = "Actually, I forgot to buy watermelons before we came, but I was able to buy one for cheap from Beach Shack."
10002090-8 = "Can we be sure this is a normal watermelon? Who's to say it isn't a bomb?"
10002090-9 = "N-No, it's just a regular watermelon. This is the one we're going to smash."
10002090-10 = "That shouldn't be a problem, then. I'm quite skilled at bomb defusion."
10002090-11 = "Watermelon smashing is a beach tradition."
10002090-12 = "Did anyone bring a stick?"
10002090-13 = "Hmm?"
10002090-14 = "We need something hard to split the watermelon with: a stick, a bat, a wooden sword... Something like that."
10002090-15 = "Now that you mention it, I forgot to bring that too..."
10002090-21 = "*click*"
10002090-23 = "*bang*"
10002090-25 = "Th-The watermelon!"
10002090-26 = "Why are you surprised? Our goal was to smash the watermelon. I did that."
10002090-27 = "No, Azusa! Shooting it defeats the whole point!"
10002090-28 = "Also, you're supposed to be blindfolded when you do it!"
10002090-29 = "So, we're to play by local rules, then? Have it your way."
10002090-39 = "Ahhh! Not again!"
10002090-45 = "You're quite an excellent shot, Azusa..."
10002090-46 = "...but you're not the only marksman here."
10002090-51 = "*bang*"
10002090-52 = "So I'm not."
10002090-53 = "I'm impressed at how accurate you are with a rifle of that caliber."
10002090-54 = "What should we challenge ourselves with next?"
10002090-55 = "Still not convinced I'm the best marksman here? Fine. I'll take you on, Azusa."
10002090-62 = "Please tell me they aren't about to do what I think they are."
10002090-63 = "We can't just let them do what they want, right, Sensei?"
10002090-64 = "[s] \"A little competition never hurt anyone.\""
10002090-65 = "W-Well..."
10002090-69 = "I'm back. I put the watermelon on the spot you wanted."
10002090-70 = "Can you really hit it? It's over 500 meters away. It's barely a dot in the distance from here."
10002090-71 = "I've hit countless targets from this distance, actually."
10002090-72 = "Wh-What? But you're still going to be blindfolded."
10002090-73 = "What kind of sniper would I be if I couldn't overcome such a simple handicap?"
10002090-74 = "I would think being completely blindfolded would be a big deal to a sniper!"
10002090-75 = "Nonsense. Striving for new heights is a given."
10002090-76 = "How else could I call myself a sniper of justice?"
10002090-77 = "This is getting a little out of hand."
10002090-78 = "I don't think there's any hope of talking them out of this."
10002090-79 = "So should we just get started, Sensei?"
10002090-80 = "Huh?"
10002090-81 = "[s] \"What's the matter?\""
10002090-82 = "Unless my eyes are deceiving me..."
10002090-83 = "...the watermelon I placed over there is gone!"
10002090-84 = "Did one of them already shoot? No, that doesn't make sense. We would have heard it."
10002090-85 = "What's going on?"
10002090-86 = "Huh?"
10002090-87 = "Is that the girl from the Beach Shack?"
10002090-95 = "What are all of you doing?! "
10002090-96 = "You can't play with your food like this! It's disrespectful to it!"
10002090-97 = "Only the lowest scum of the earth disrespects delicious food!"
10002090-99 = "What?! And I think you're the last person who should be saying that!"
10002090-100 = "Are you interfering? "
10002090-101 = "Very well. If you stand in our way, then we'll show you no mercy."
10002090-102 = "Why does every thing we do end in a firefight?"

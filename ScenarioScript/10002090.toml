[translation]
10002090-1 = "ตอนที่ 9;ปิดตาตีแตงโม 1 "
10002090-2 = "คราวนี้พวกเราจะมาเล่นเกม \"ปิดตาตีแตงโม\" กันนะคะ!"
10002090-3 = "คือว่าฉันลืมซื้อแตงโมติดมาด้วย แต่โชคดีที่คุณลุงเจ้าของร้านริมทะเลแบ่งขายมาให้ถูกๆ เลยค่ะ แค่นี้ก็เรียบร้อยแล้วละค่ะ"
10002090-8 = "...แตงโมธรรมดาแน่ใช่มั้ย?"
10002090-9 = "อ่า แหะๆ... ดูเหมือนจะเป็นแตงโมธรรมดาๆ นะคะ อีกอย่างเราจะเอามาเล่นตีให้แตกด้วยค่ะ..."
10002090-10 = "ถ้างั้นคงไม่มีปัญหา ถ้าเรื่องตีแตงโมให้แตกน่ะฉันพอเข้าใจอยู่"
10002090-11 = "ใช่แล้วค่ะ เป็นธรรมเนียมการละเล่นที่ชายหาดสินะคะ"
10002090-12 = "อืม... แล้วไม้ที่ใช้ตีล่ะคะ?"
10002090-13 = "หืม?"
10002090-14 = "ถ้าจะเล่นปิดตาตีแตงโมล่ะก็จะต้องใช้พวกไม้เบสบอล หรือท่อนไม้ด้วยไม่ใช่เหรอคะ?"
10002090-15 = "เอ๋... ฉันลืมไปซะสนิทเลย..."
10002090-21 = "(แกร็ก)"
10002090-23 = "ปังงงง!!"
10002090-25 = "ตะ... แตงโม?!"
10002090-26 = "พูดอะไรแบบนั้นน่ะ? ถ้าแค่ผ่าแตงโมล่ะก็แค่ใช้ปืนยิงให้แตกก็พอแล้วไม่ใช่รึไง?"
10002090-27 = "ไม่ใช่นะคะอาซึสะจัง! เราจะเล่นเกมผ่าแตงโมกันนะคะ เป็นเกมผ่าแตงโมค่ะ!#nไม่ใช่เกมยิงแตงโมสักหน่อยนะคะ!"
10002090-28 = "อีกอย่าง จุดสำคัญของเกมปิดตาตีแตงโมคือการปิดตาค่ะ ตอนที่ยิงใช้ผ้าปิดตาด้วยรึเปล่าคะ#nอาซึสะจัง!?"
10002090-29 = "นั่นเป็นกฎของพื้นที่นี้งั้นเหรอ ก็ได้ เข้าใจแล้ว"
10002090-39 = "อ๊าาาา...!! ตะ...แตงโม...!"
10002090-45 = "ยิงได้แม่นมากเลยค่ะ คุณอาซึสะ "
10002090-46 = "แต่ว่าถ้าพูดถึง \"การยิง\" แล้วน่ะ มันไม่ได้มีแค่คุณที่ยิงแม่นหรอกนะคะ..."
10002090-51 = "(ปังงงง!!)"
10002090-52 = "อย่างที่คิดเลย..."
10002090-53 = "ทั้งที่อยู่สูงแบบนั้น แต่สามารถเล็งเป้าหมายด้วยปืนไรเฟิลได้แม่นยำแบบนี้ น่าประทับใจจริงๆ"
10002090-54 = "ถ้างั้นต่อไปอะไรดีล่ะ...?"
10002090-55 = "ดีเลยค่ะ ไม่ว่าจะแข่งอะไร ฉันก็พร้อมเสมอค่ะ คุณอาซึสะ"
10002090-62 = "มีคนโดนยุแบบไม่คาดคิดอีกแล้ว...!"
10002090-63 = "จะไม่เป็นอะไรแน่ใช่ไหมคะ? ปล่อยไว้แบบนี้จะไม่เป็นอะไรแน่เหรอคะคุณครู??"
10002090-64 = "[s] \"ครูว่าไม่เป็นอะไรหรอก\""
10002090-65 = "อ่า..."
10002090-69 = "ฉันเอา... แตงโมไปไว้ที่ตรงเป้าหมายแล้วค่ะ..."
10002090-70 = "มันไกลกว่า 500 เมตรเลย... ไกลจนมองแทบไม่เห็นเลยนะคะ จะไม่เป็นอะไรแน่เหรอคะ?"
10002090-71 = "ไม่มีปัญหา ฉันเคยยิงเป้าหมายในระยะนี้มานับไม่ถ้วนแล้ว"
10002090-72 = "ดะ...เดี๋ยวสิ จะปิดตายิงอีกงั้นเหรอคะ..."
10002090-73 = "เห็นแบบนี้ฉันก็เป็นสไนเปอร์นะคะ บทลงโทษแค่นี้ต้องทนรับให้ได้สิคะ"
10002090-74 = "มีสไนเปอร์ที่ถูกลงโทษให้ลอบยิงทั้งที่ปิดตาด้วยเหรอคะ...?"
10002090-75 = "พวกเราจะต้องไม่หยุดท้าทายสิ่งใหม่ๆ ค่ะ"
10002090-76 = "โดยเฉพาะสไนเปอร์ที่ใฝ่หาความยุติธรรมอย่างฉัน ยิ่งต้องพยายามค่ะ..."
10002090-77 = "อ่า... เหมือนไปทำให้ทั้งสองคนฮึกเหิมขึ้นโดยไม่ได้ตั้งใจซะแล้ว..."
10002090-78 = "ช่วยไม่ได้นะคะ..."
10002090-79 = "ถะ...ถ้างั้นคุณครูช่วย... เอ๋?"
10002090-80 = "หืม...?"
10002090-81 = "[s] \"มีอะไรเหรอ?\""
10002090-82 = "หะ... หายไปไหนแล้ว? แตงโม...?"
10002090-83 = "แตงโม... ที่ฉันวางเอาไว้ตรงนั้นหายไปแล้วค่ะ! เอ๋...? หายไปได้ยังไง?"
10002090-84 = "หรือว่ามีใครยิงไปแล้ว... คงไม่ใช่หรอกค่ะ ถ้ามีคนยิงไปก่อนแล้วก็จะต้องได้ยินเสียงสิ..."
10002090-85 = "หายไปได้ยังไงกันนะ?"
10002090-86 = "เอ๋?"
10002090-87 = "คุณเจ้าของร้านริมทะเล?!"
10002090-95 = "ทำอะไรกันน่ะ!! "
10002090-96 = "เอาอาหารที่แสนสำคัญมาเล่นแบบนี้ไม่ได้นะ!! คิดว่าฉันจะยอมงั้นเหรอ?!"
10002090-97 = "พวกคนที่เอาอาหารมาเล่นน่ะ ฉันไม่มีทางยกโทษให้หรอก! พวกเธอต้องถูกลงโทษ!"
10002090-99 = "คะ?! คุณมีสิทธิ์ที่จะพูดแบบนี้ด้วยรึไงคะ?!"
10002090-100 = "คิดจะเข้ามาขวางงั้นเหรอ... เจ้าของร้านริมทะเล "
10002090-101 = "ก็ดี ถ้างั้นอย่าหาว่าไม่เตือนก็แล้วกัน"
10002090-102 = "เดี๋ยวสิ... ทำไมถึงจบด้วยการต่อสู้กันอีกแล้วล่ะ..."

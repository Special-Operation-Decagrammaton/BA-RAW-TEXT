[translation]
80000056-1 = "บนโต๊ะก็ไม่มีปัญหาหรอก"
80000056-3 = "อืม..."
80000056-4 = "เชิญค่ะ คุณครู ดึกขนาดนี้แล้วแท้ๆ ขอบคุณที่มานะคะ"
80000056-5 = "คะ...? อ๊ะ เปล่าค่ะ... ฉันไม่ได้เรียกมาเพราะเรื่องคืนหนังสือหรอกค่ะ"
80000056-6 = "ดูเหมือนภาพลักษณ์ของฉันจะกลายเป็นแบบนั้นไปแล้วสินะคะ อ่ะฮะฮะ..."
80000056-7 = "ธุระวันนี้ไม่ได้เกี่ยวกับเรื่องหนังสือหรอกค่ะ ไม่ต้องห่วงนะคะ"
80000056-8 = "วันนี้... ฉันขอให้คุณครูมาหาเพราะสิ่งนี้ค่ะ"
80000056-13 = "ที่จริงฉันควรเอาไปมอบให้คุณครูถึงที่มากกว่า... แต่ว่าวันนี้ฉันต้องเข้าเวรห้องสมุดก็เลยไปไม่ได้..."
80000056-14 = "[s1] \"กล่องหนังสือ?\"\n[s2] \"ช็อกโกแลตเคลือบ...?\""
80000056-15 = "ค่ะ ก็วันนี้เป็นวันวาเลนไทน์นี่คะ? ฉันเลยเตรียมช็อกโกแลตมาด้วยน่ะค่ะ"
80000056-16 = "ค่ะ ก็วันนี้เป็นวันวาเลนไทน์นี่คะ? ฉันเลยเตรียมช็อกโกแลตมาด้วยน่ะค่ะ"
80000056-17 = "จะว่ายังไงดีนะ... โอกาสที่จะตอบแทนคุณครูได้แบบนี้มีอยู่ไม่มากนัก... เพราะงั้นฉันเลยอยากเตรียมช็อกโกแลตนี่มาให้คุณครูค่ะ"
80000056-18 = "ถึงจะเห็นแบบนี้ แต่ช็อกโกแลตข้างในอร่อยมากเลยนะคะ ถึงฉันจะไม่ได้ทำเอง แต่ฉันก็อยาก#nให้คุณครูได้ลองชิมมากๆ เลยค่ะ"
80000056-19 = "หืม...? มีอะไรเหรอคะ คุณครู?"
80000056-20 = "ถามว่าเป็นอะไรรึเปล่างั้นเหรอคะ? หมายความว่ายังไงเหรอคะ?"
80000056-21 = "อ๊ะ..."
80000056-22 = "กินช็อกโกแลตพร้อมอ่านหนังสือไปด้วยได้รึเปล่างั้นเหรอคะ? กลัวจะเปื้อนมือแล้วไปทำให้หนังสือ#nเลอะงั้นเหรอคะ?"
80000056-23 = "ฮิฮิ สมกับที่เป็นคุณครูจริงๆ เลยค่ะ ขอบคุณที่ใส่ใจรายละเอียดเล็กๆ น้อยๆ นะคะ"
80000056-24 = "แต่ว่าไม่เป็นไรหรอกค่ะ ฉันคิดเรื่องนี้มาแล้วละค่ะ"
80000056-25 = "ถึงข้างในจะเป็นช็อกโกแลต แต่ว่าช็อกโกแลตลูกกลมแบบนี้เคลือบช็อกโกแลตมาอย่างดีทำให้#nไม่เปื้อนมือ หรือมีเศษผงร่วงลงมาตอนที่รับประทานค่ะ"
80000056-26 = "อันที่จริงสมาชิกชมรมอ่านหนังสือคนอื่นๆ ก็ชอบทานมากเลยค่ะ แน่นอนว่าช็อกโกแลตที่ทานประจำ กับที่ซื้อมาตอนวันวาเลนไทน์นี่ไม่เหมือนกันหรอกนะคะ"
80000056-27 = "คุณครู..."
80000056-28 = "คือ... ถ้าคุณครูไม่ว่าอะไร..."
80000056-29 = "[s3] \"ถ้างั้นครูขออยู่ที่นี่สักพักได้มั้ย?\"\n[s4] \"มาทำงานแล้วก็แบ่งช็อกโกแลตกินด้วยกันมั้ย?\""
80000056-30 = "...!!"
80000056-31 = "...!!"
80000056-32 = "คะ... คุณครู..."
80000056-33 = "..."
80000056-37 = "ได้ค่ะ...!!"
80000056-39 = "(หลังจากนั้นคุณครูกับชิมิโกะก็นั่งทำงานและแบ่งช็อกโกแลตกันจนเกือบโต้รุ่ง...)"
80000056-40 = "(พอกินช็อกโกแลตหมดแล้ว คุณครูก็หยิบผ้าห่มมาห่มให้ชิมิโกะที่เผลอหลับไป ก่อนจะกลับไปที่#nชาเล่ต์)"

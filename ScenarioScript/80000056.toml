[translation]
80000056-1 = "#title;책상에서도 문제없이"
80000056-2 = "#wait;1000"
80000056-3 = "5;시미코;02;……아.\n#5;em;[반응]\n#5;a"
80000056-4 = "5;시미코;03;어서 오세요, 선생님. 늦은 시간인데도 와 주셔서 감사해요.\n#5;m3"
80000056-5 = "5;시미코;04;……네? 아. 아뇨, 딱히 책 반납 때문에 부른 건 아닌데…….\n#5;stiff"
80000056-6 = "5;시미코;01;뭔가, 어느새 제 이미지는 그런 느낌으로 변해 있었던 모양이네요. 아하하…….\n#5;em;[땀]"
80000056-7 = "5;시미코;02;오늘 일은 전혀 그런 쪽은 아니니까 걱정하지 않으셔도 돼요."
80000056-8 = "5;시미코;99;오늘은……. 이것 때문에 와 달라고 부탁드렸던 거예요.\n#5;greeting"
80000056-9 = "#st;[0,0];instant;1;"
80000056-10 = "#clearST"
80000056-11 = "5;시미코;99\n#5;d\n#wait;1000"
80000056-12 = "#wait;2500"
80000056-13 = "3;시미코;01;원래라면 제가 직접 찾아가서 드리는 게 맞겠지만……. 하필 또 오늘이 당직이라…….\n#3;em;[...]\n#3;a"
80000056-14 = "[s1] \"……책 케이스?\"\n[s2] \"구슬 초콜릿……?\""
80000056-15 = "3;시미코;03;네. 오늘은 발렌타인 데이잖아요? 그래서 개인적으로 조금 준비해 봤어요.\n#3;em;[반응]"
80000056-16 = "3;시미코;03;네. 오늘은 발렌타인 데이잖아요? 그래서 개인적으로 조금 준비해 봤어요.\n#3;em;[반응]"
80000056-17 = "3;시미코;01;모처럼이랄까……. 이런 식으로라도 선생님께 보답해 드릴 기회가 많지는 않으니까요. 꼭 챙겨 드리고 싶었거든요.\n#3;stiff"
80000056-18 = "3;시미코;02;이게 이렇게 보여도, 안에 든 초코는 꽤 맛있다고요? 제가 만든 건 아니지만 자신 있게 권할 수 있어요!\n#3;em;[반짝]\n#3;greeting"
80000056-19 = "3;시미코;05;……음? 왜 그러세요, 선생님?"
80000056-20 = "3;시미코;04;괜찮냐고요? 갑자기 그게 무슨 말씀이세요?\n#3;em;[?]"
80000056-21 = "3;시미코;02;……아."
80000056-22 = "3;시미코;99;도서관에서, 책 보면서 초콜릿을 먹어도 괜찮냐고요? 손에 묻거나 책이 더러워지는 게 아니냐고요?"
80000056-23 = "3;시미코;01;……후훗. 역시 선생님이시군요. 세심한 배려 감사드려요.\n#3;em;[///]"
80000056-24 = "3;시미코;02;하지만 괜찮답니다. 저도 당연히 그 부분에 대해서 생각하지 않았던 게 아니니까요.\n#3;greeting"
80000056-25 = "3;시미코;03;내용물이 초콜릿이라고 해도, 이 구슬 초콜릿은 손에 묻거나 가루가 떨어지지 않도록 잘 코팅이 돼 있는 제품이거든요."
80000056-26 = "3;시미코;02;사실 도서부 부원들은 꽤나 즐겨 먹는 간식이에요. 물론 평소에 먹는 게, 지금처럼 발렌타인 버전은 아니지만요.\n#3;em;[재잘]"
80000056-27 = "3;시미코;01;……선생님."
80000056-28 = "3;시미코;99;그……. 괜찮으시면…….\n#3;em;[///]\n#3;stiff"
80000056-29 = "[s3] \"그럼 이왕 온 김에 앉아 있다 갈까?\"\n[s4] \"나란히 앉아서 나눠 먹을까? 각자 할 거 하며.\""
80000056-30 = "3;시미코;04;……!!\n#3;em;[?!]\n#3;shake"
80000056-31 = "3;시미코;04;……!!\n#3;em;[?!]\n#3;shake"
80000056-32 = "3;시미코;01;서, 선생님……."
80000056-33 = "3;시미코;01;……\n#3;em;[///]\n#3;stiff"
80000056-34 = "#st;[0,0];instant;1;"
80000056-35 = "#clearST"
80000056-36 = "3;시미코;01\n#3;d\n#wait;1000"
80000056-37 = "3;시미코;03;……네!!\n#3;closeup\n#3;a\n#fontsize;80"
80000056-38 = "#all;hide"
80000056-39 = "#na;(이후 새벽 늦은 시간까지 시미코와 나란히 앉아, 각자의 일을 하며 초콜릿을 나눠 먹었다.)"
80000056-40 = "#na;(초콜릿을 다 먹을 때쯤, 잠든 시미코에게 조용히 모포를 덮어주고 샬레로 돌아왔다.)"

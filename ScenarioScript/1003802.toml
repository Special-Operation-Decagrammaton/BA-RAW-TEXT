1003802-38 = "What is the issue, Sensei?"
1003802-39 = "You're a highly respected role model, so I'm not concerned we'll find anything."
1003802-40 = "As long as there's nothing to hide, there should be no problem with us searching."
1003802-41 = "[s] \"S-So, the thing is...\""
1003802-49 = "Hm? What is this book on your bed?"
1003802-50 = "MomoTalk 101 — How to Be Friends with Everyone...?"

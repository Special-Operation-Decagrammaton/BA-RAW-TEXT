1003802-52 = "[s3] \"N-Naturally, as a teacher...!\"\n[s4] \"W-Well, teachers should be friendly...\""
1003802-53 = "..."
1003802-54 = "..."
1003802-55 = "Considering our past, I'll give you the benefit of the doubt."
1003802-60 = "Why is this book hidden behind your bookshelf?"
1003802-61 = "\"Fashion Ideas for Popular Adults\"."
1003802-62 = "[s] \"...\""
1003802-67 = "...Let's consider this search complete."
1003802-68 = "While there aren't any illegal items or evidence of criminal activity..."

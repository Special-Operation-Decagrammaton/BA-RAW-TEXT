1003802-34 = "3;미야코;99;아무리 오해라고는 하지만, 신고가 들어온 이상 이 사무실이 수상하지 않다는 증거를 확보해야 합니다."
1003802-35 = "3;미야코;11;지인의 말만 믿고 현장에서 철수했다가 작전을 그르친 사례는 수도 없이 많으니까요."
1003802-36 = "3;미야코;05;소대원 여러분. 침대 밑과 책장 안을 중점적으로 수색하면서 수상한 물건이 없는지 확인합시다.\n#3;hophop"

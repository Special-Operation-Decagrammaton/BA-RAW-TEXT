[translation]
1003802-1 = "SRT，突入！"
1003802-2 = "夏萊．辦公室"
1003802-3 = "（某個夏萊和平的午後）"
1003802-7 = "炸藥設置完成，準備引爆。"
1003802-8 = "3……"
1003802-9 = "2……"
1003802-10 = "1……"
1003802-11 = "（咚哐──）"
1003802-14 = "我們是SRT！所有人趴下！"
1003802-18 = "……Clear，壓制完成。"
1003802-19 = "[s] 「……都子？」"
1003802-20 = "……老師？你怎麼會在這裡……？"
1003802-21 = "[s1] 「這個問題我也想問你呢……」\n[s2] 「因為這裡是夏萊的辦公室……」"
1003802-22 = "這裡不是邪惡犯罪者的巢穴，而是夏萊的辦公室……？"
1003802-23 = "這裡不是邪惡犯罪者的巢穴，而是夏萊的辦公室……？"
1003802-26 = "啊啊，原來如此……"
1003802-27 = "所以才會有那種傳聞……"
1003802-28 = "[s] 「『那種傳聞』……？」"
1003802-29 = "有個可疑的大人帶著女學生們進出某棟建築的傳聞。#n由於實在令人在意，RABBIT小隊便對此展開了調查……"
1003802-30 = "原來如此，可疑的大人原來就是老師啊。"
1003802-31 = "看來沒有在進行直銷或是誘拐犯罪之類的，那我就放心了。"
1003802-32 = "[s] 「既然誤會解除了，那我可以開始整理了嗎……？」"
1003802-33 = "不，任務還沒有結束。"
1003802-34 = "畢竟我們是SRT，既然任務已經開始，就得要徹底確認是否有任何可疑物品才行。"
1003802-35 = "因為相信了他人的話而撤退，導致作戰失敗的例子不勝枚舉。"
1003802-36 = "那麼首先就從床底下和書櫃開始進行重點搜查吧。"
1003802-37 = "[s] 「不，不可以……！」"
1003802-38 = "……有什麼問題嗎？"
1003802-39 = "我曾經聽說過，老師是其他學生的榜樣。#n既然如此，應該不會持有什麼可疑的東西對吧？"
1003802-40 = "當然，就算搜索這個房間也沒問題吧？"
1003802-41 = "[s] 「呃，那個……」"
1003802-49 = "啊，床底下好像有本可疑的書……"
1003802-50 = "《輕鬆和大家打好關係的101種MomoTalk必勝法》……？"
1003802-51 = "……老師，這是教學所必須的東西嗎？"
1003802-52 = "[s3] 「當，當然囉……！」\n[s4] 「和學生打好關係是很重要的嘛……！」"
1003802-53 = "……"
1003802-54 = "……"
1003802-55 = "既然老師這麼說的話，我就先睜一隻眼閉一隻眼吧……"
1003802-60 = "咦？在書櫃深處的可疑空間裡，還有一本書……？"
1003802-61 = "《能夠讓人受歡迎的時尚穿搭手冊》……"
1003802-62 = "[s] 「……」"
1003802-67 = "……搜索姑且到此結束。"
1003802-68 = "幸好沒有找出違禁品或是犯罪的證據，不過……"
1003802-69 = "看來「有個可疑的大人」這點是真的。"
1003802-71 = "（之後，一段時間裡都被都子用冷淡的視線看著……）"

[translation]
1003802-1 = "SRT เริ่มปฏิบัติการ!"
1003802-2 = "สำนักงานชาเล่ต์"
1003802-3 = "(ช่วงบ่ายวันหนึ่งที่สงบสุขของชาเล่ต์)"
1003802-7 = "ติดตั้งระเบิดสำเร็จ จะระเบิดในอีก..."
1003802-8 = "3..."
1003802-9 = "2..."
1003802-10 = "1..."
1003802-11 = "ตู้มมมมมมม!"
1003802-14 = "พวกเราคือ SRT ค่ะ! ทุกคนอย่าขยับ"
1003802-18 = "เคลียร์ ตรวจสอบพื้นที่เรียบร้อยค่ะ"
1003802-19 = "[s] \"มิยาโกะ? นี่มันอะไรกันเหรอ...?\""
1003802-20 = "คุณครู? ทำไมถึงมาอยู่ที่นี่ได้..."
1003802-21 = "[s1] \"ครูต้องเป็นฝ่ายถามเธอมากกว่านะ...\"\n[s2] \"ก็ที่นี่เป็นสำนักงานของชาเล่ต์นี่นา...\""
1003802-22 = "เอ๋? ที่นี่ไม่ใช่ศูนย์บัญชาการของอาชญากรชั่วร้าย แต่เป็นสำนักงานของคุณครูหรอกเหรอคะ?"
1003802-23 = "คะ? ที่นี่คือสำนักงานของคุณครูเหรอคะ...? ไม่ใช่ศูนย์บัญชาการของอาชญากรชั่วร้ายเหรอคะ?"
1003802-26 = "เอ๋ ทำไมกลายเป็นแบบนี้ไปได้นะ"
1003802-27 = "คือว่าฉันมาที่นี่ตามข้อมูลที่ได้รับแจ้งมาค่ะ"
1003802-28 = "[s] \"แจ้งงั้นเหรอ... แจ้งอะไรน่ะ?\""
1003802-29 = "มีข้อมูลแจ้งเข้ามาว่ามีเด็กนักเรียนหญิงหลายคนเข้าออกที่สำนักงานของผู้ใหญ่ที่น่าสงสัยอยู่ค่ะ ทางกองทหารของเราเลยตามสืบเรื่องนี้อยู่ค่ะ"
1003802-30 = "แต่กลายเป็นว่าผู้ใหญ่ที่น่าสงสัยคนนั้นกลับกลายเป็นคุณครูไปซะได้..."
1003802-31 = "แต่ฉันก็รู้สึกโล่งใจที่ดูเหมือนว่าจะไม่มีนักเรียนที่เข้าไปเกี่ยวข้องกับพวกคนร้ายลักพาตัวหรือพวก#nนักต้มตุ๋นค่ะ"
1003802-32 = "[s] \"ถ้าหายเข้าใจผิดแล้วก็กลับไปได้ไหม...\""
1003802-33 = "ไม่ค่ะ ภารกิจของฉันยังไม่เสร็จสิ้นค่ะ"
1003802-34 = "ถึงจะเป็นเรื่องที่เข้าใจผิด แต่ในเมื่อมีคนแจ้งข้อมูลเข้ามาแล้ว ฉันจะต้องตรวจสอบเพื่อหาหลักฐาน#nยืนยันว่าที่สำนักงานนี้ไม่มีเรื่องผิดปกติหรือน่าสงสัยก่อนค่ะ"
1003802-35 = "การเชื่อคำพูดของคนรู้จักและล้มเลิกภารกิจไปกลางคัน ทำให้เกิดข้อผิดพลาดมาหลายครั้งแล้วค่ะ"
1003802-36 = "สมาชิกทุกคน... ฉันจะขอตรวจสอบดูสักหน่อยนะคะ ว่าที่ใต้เตียงกับใต้โต๊ะทำงานมีสิ่งของแปลกๆ อยู่รึเปล่า?"
1003802-37 = "[s] \"ไม่ได้นะ ห้ามดูตรงนั้นนะ...!!\""
1003802-38 = "คะ? มีอะไรรึเปล่าคะ?"
1003802-39 = "คุณครูเป็นตัวอย่างที่ดีสำหรับคนอื่นๆ คงไม่ได้ครอบครองสิ่งของที่น่าสงสัยไว้หรอกใช่ไหมคะ?"
1003802-40 = "เพราะงั้นต่อให้ฉันค้นห้องนี้ทั้งห้องก็คงไม่มีปัญหาใช่ไหมคะ?"
1003802-41 = "[s] \"คือว่าเรื่องนั้น...\""
1003802-49 = "เอ๋...? ที่ใต้เตียงมีหนังสือที่หน้าปกดูน่าสงสัยอยู่ด้วย..."
1003802-50 = "<วิธีพิมพ์ MOMOTALK 101 วิธีเพื่อสนิทกับทุกคนได้ง่ายขึ้น>...?"
1003802-51 = "คุณครูคะ หนังสือนี่เป็นของจำเป็นสำหรับการสอนหนังสือเหรอคะ?"
1003802-52 = "[s3] \"ชะ...ใช่แล้ว...!\"\n[s4] \"การเป็นที่ชื่นชอบของนักเรียนเป็นเรื่องสำคัญนี่นา...\""
1003802-53 = "..."
1003802-54 = "..."
1003802-55 = "ถ้าคุณครูพูดแบบนั้น ฉันจะยอมเข้าใจก็ได้ค่ะ..."
1003802-60 = "เอ๋...? ที่ช่องว่างตรงโต๊ะหนังสือมีหนังสือซ่อนอยู่ด้วย...?"
1003802-61 = "<หนังสือแนะนำแฟชั่นสำหรับผู้ใหญ่สุดฮอต>..."
1003802-62 = "[s] \"...\""
1003802-67 = "ขอสิ้นสุดการตรวจสอบเพียงเท่านี้ค่ะ"
1003802-68 = "โชคดีที่สำนักงานของชาเล่ต์ไม่มีของต้องสงสัยหรือหลักฐานเกี่ยวกับการกระทำผิดอะไรนะคะ..."
1003802-69 = "แต่ดูเหมือนจะเป็น \"สำนักงานของผู้ใหญ่ที่น่าสงสัย\" ตามที่มีคนแจ้งเข้ามาไม่ผิดจริงๆ ค่ะ"
1003802-71 = "(หลังจากนั้นกลุ่มนักเรียนจากกองทหาร RABBIT ก็กลับไป แต่ว่าคุณครูถูกมิยาโกะมองด้วยสายตา#nแปลกๆ อยู่พักใหญ่...)"

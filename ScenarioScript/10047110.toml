[translation]
10047110-1 = "尾聲;日常仍在繼續"
10047110-3 = "[ns]「雖然做出了很棒的作品……」"
10047110-6 = "[ns]「……結果還是被關在這裡了呢。」"
10047110-7 = "這是自作自受。#n鬧出那麼多事情，能這樣收場就該偷笑了。"
10047110-12 = "這麼說來……玲奈醬為什麼會在這裡……？"
10047110-13 = "我自首了。#n因為擅闖禁止進入的區域，還敲響了那口鐘的關係。"
10047110-14 = "我和前輩們不同，是個非常有良心的學生。"
10047110-15 = "那口鐘果然是玲奈醬敲的呢。"
10047110-16 = "咿嘻，居然敢敲響毀滅之鐘……你還真大膽呢……？"
10047110-17 = "哪有什麼毀滅不毀滅的啊？#n那只是胡扯出來的都市傳說而已！"
10047110-18 = "不過，能實現願望的魔法不是發動了嗎？"
10047110-19 = "實現願望的就只有繪梨前輩吧。"
10047110-20 = "不，我的願望也實現了哦。"
10047110-21 = "本來我還在煩惱下次的「對邦」演唱會，該用哪首歌壓制對手……"
10047110-22 = "結果在歷經這次被舍監隊追逐在內的諸多緊急情況後，#n腦袋裡就自然浮現出了歌詞和旋律。"
10047110-23 = "呵呵，拜其所賜，煩惱被完美解決了～"
10047110-24 = "現在我心裡也哼唱著唷，要聽聽看嗎？"
10047110-25 = "不，不用了！我還是喜歡紬前輩溫柔的樣子！"
10047110-26 = "我一直都很溫柔呀？"
10047110-27 = "啊啊，意思是玲奈醬一直都喜歡著我對吧？"
10047110-34 = "嚇啊──！！"
10047110-35 = "其實我……也有了新的領悟。"
10047110-36 = "前輩又有什麼領悟？"
10047110-40 = "我想起了……前世的情人。#n咿嘻……"
10047110-44 = "一開始我還不敢肯定……不過現在已經越來越相信了。"
10047110-45 = "不想知道是誰嗎……？"
10047110-46 = "不用不用。#n反正前輩八成又打算說些沒意義的話吧？"
10047110-47 = "玲奈醬……不相信前世啊。"
10047110-48 = "居然連我那溫柔的撫摸都忘記了……真讓人傷心……"
10047110-49 = "什，什麼意思？溫柔的撫摸？"
10047110-50 = "前輩說的前世情人……該不會是我吧？"
10047110-51 = "我們……非常珍惜彼此……"
10047110-52 = "我是主人……"
10047110-57 = "玲奈醬是可愛的小貓……"
10047110-63 = "嚇啊──！快給我停下來！"
10047110-64 = "不過，玲奈醬很可愛是事實唷？"
10047110-65 = "嚇啊啊──！！"
10047110-67 = "總之謝謝你，玲奈醬。#n託你的福，大家才能更進一步。"
10047110-68 = "我其實什麼都沒得到吧？"
10047110-69 = "妞呵呵，怎麼會呢。#n玲奈醬也實現了願望呀。"
10047110-70 = "我……？什麼願望？"
10047110-71 = "希望能和我們相處得更開心的願望。"
10047110-72 = "誰，誰有那種願望啊！"
10047110-74 = "我說過要你們記住了吧！#n總有一天，我會證明神秘學這種迷信根本不存在的！"
10047110-75 = "呵呵，那就當作是這樣吧。"
10047110-76 = "玲奈醬最近睡前在努力翻星象書的事，我完全不記得哦。"
10047110-77 = "……！"
10047110-78 = "我在用鍊金鍋的時候……你偷偷盯著的事，我也不知道哦……"
10047110-79 = "……！！"
10047110-80 = "妞呵呵。你認真問我塔羅牌為什麼這麼準的事……真捨不得忘記呢。"
10047110-81 = "……！！！"
10047110-82 = "[s]「其實……玲奈也對神秘學有興趣吧？」"
10047110-83 = "我不知道啦！你們少在那邊囉哩八嗦的！"
10047110-88 = "妞呵呵，那麼就開始構思下一個作品吧。"
10047110-89 = "要用什麼來讓大家嚇一跳呢？"
10047110-90 = "……一定得嚇人嗎？就不能普通一點？"
10047110-91 = "如果不能震驚到所有人的話，就稱不上是創新的藝術了！"
10047110-92 = "創新啊……"
10047110-93 = "既然如此，下次要不要去評議會長的私人博物館？"
10047110-94 = "那裡是祕密收藏著狂獵神祕藝術品的地方。"
10047110-95 = "甚至連不對一般學生公開的理由都不曾說明的禁忌之地。"
10047110-96 = "如果能拼湊出那裡隱藏的情報，#n或許就能找到隱藏在《創世的肖像》中的學院的祕密。"
10047110-97 = "評議會長的私人博物館嗎……我也很好奇。"
10047110-98 = "那裡會隱藏著什麼樣的神秘學呢。咿嘻……"
10047110-99 = "鹿江前輩也沒去過嗎？"
10047110-100 = "嗯……除了評議會長之外……至今沒有人進去過……"
10047110-105 = "甚至連那位「慈愛的怪盜」也一樣。"
10047110-109 = "你，你們該不會打算潛入那種地方吧！？認真！？"
10047110-110 = "妞呵呵，只要大家一起就沒有不可能！對吧？"
10047110-115 = "啊啊，那個表情是認真的……！"
10047110-116 = "老師！你快想想辦法，不然又要出事了啦！"
10047110-117 = "[ns]「其實我聽著聽著也有點好奇……」"
10047110-121 = "[ns1]「不過還是先嘗試正常的方法吧。」\n[ns2]「為了讓一般學生也能進去，我會努力的。」"
10047110-124 = "那不正常的方法就交給我來想吧……"
10047110-125 = "咿嘻……咿嘻嘻……！"
10047110-126 = "鹿江前輩一旦變成這樣，就沒有人能夠阻止他了。#n連我也興奮起來了呢。"
10047110-127 = "妞呵呵，這樣下一個目標就決定好了！"
10047110-131 = "身為神秘學研究會的會長，我在此宣布！"
10047110-132 = "下一個目標是……「評議會長的博物館」！#n一起找出所有隱藏在那裡的神秘學吧！"
10047110-133 = "唉，拜託饒了我吧……"
10047110-135 = "（究竟神秘學研究會的下一個計畫能不能成功呢……）"
10047110-141 = "……在策劃有趣的事情呢。#n看來下次也很值得觀察。"
10047110-142 = "無論是以「舍監隊幹部」的身分──"
10047110-143 = "還是「慈愛的怪盜」皆是如此。"
10047110-144 = "那麼，我會等待再會之日的到來。"
10047110-153 = "至於舞台究竟會在何處，我也尚未知曉。#n呵呵呵……"
10047110-154 = "我們是神秘學研究會！～學園的不可思議與古老的咒語～"

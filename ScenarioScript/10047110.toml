[translation]
10047110-1 = "Epilogue;Everyday Life Continues"
10047110-3 = "[ns] \"While it was great to create a masterpiece...\""
10047110-6 = "[ns] \"...we're locked in here again.\""
10047110-7 = "You brought this on yourselves. You should be happy this is ALL you get after causing so much trouble."
10047110-12 = "But why...are you here, Rena...?"
10047110-13 = "I confessed, of course. I went into a restricted area and rang the bell."
10047110-14 = "I'm a very conscientious student, unlike YOU all."
10047110-15 = "As I thought. You were the one who made the bell sing."
10047110-16 = "Heehee, ringing the Doom's Day bell... You're too bold..."
10047110-17 = "Doom's Day? What Doom's Day? That's all stupid nonsense and urban legend!"
10047110-18 = "But it worked. It granted our wishes."
10047110-19 = "You're the only one who got your wish, Eri."
10047110-20 = "No. Mine also came true."
10047110-21 = "I have a battle of the bands coming up, and I was wondering how I could overwhelm my rival."
10047110-22 = "While running from the Prefectural Council, I was struck as new, raw lyrics and melodies came to me."
10047110-23 = "Heh. So, thanks to Eri, my problem was solved."
10047110-24 = "I've been mentally rehearsing it. Would you like to hear it aloud?"
10047110-25 = "N-No! It's fine! I like it when you're kind and gentle!"
10047110-26 = "I'm always kind...and gentle."
10047110-27 = "Ah, you mean that you always like me."
10047110-34 = "Shyaah...!"
10047110-35 = "Actually, I...also realized something."
10047110-36 = "You too?"
10047110-40 = "I remembered...a love of my past life. Heehee..."
10047110-44 = "I wasn't initially sure... But the more I observed, the more certain I became."
10047110-45 = "You're not curious who it is...?"
10047110-46 = "Not one bit. You're going to babble some nonsense again."
10047110-47 = "I see Rena...doesn't believe in past lives."
10047110-48 = "You've forgotten my gentle touch... I'm sad..."
10047110-49 = "Wh-What are you talking about? \"Gentle touch\"?"
10047110-50 = "...You're not saying I'M your past love, are you?"
10047110-51 = "We...deeply cherished each other..."
10047110-52 = "I was the master..."
10047110-57 = "...and Rena was a cute cat..."
10047110-63 = "Shyaah! Stop it!"
10047110-64 = "I see it. It's true that Rena is quite cute."
10047110-65 = "Shyaah...!"
10047110-67 = "Anyway, thank you, Rena. Everyone was blessed because you helped out."
10047110-68 = "Not everyone... I didn't get anything."
10047110-69 = "Nyuhuhu! Not true. You also had your wish granted."
10047110-70 = "I did? What wish?"
10047110-71 = "The wish to have even more fun with us."
10047110-72 = "Wh-When did I wish for that?!"
10047110-74 = "I swear to you...you'll see someday! I'll show you all that there's no such thing as the occult."
10047110-75 = "Heh, yes. I'll keep that in mind."
10047110-76 = "...And I swear that I haven't noticed Rena obsessively reading astrology books before bed."
10047110-77 = "...!"
10047110-78 = "And I swear...I didn't notice Rena watching from behind the pillar every time I use the athanor."
10047110-79 = "...!!"
10047110-80 = "Nyuhuhu. And I swear that I'll NEVER forget how passionately Rena asked how my tarot readings always come true!"
10047110-81 = "...!!!"
10047110-82 = "[s] \"Is...Rena actually interested in the occult?\""
10047110-83 = "Ah, whatever! You all talk too much!"
10047110-88 = "Nyuhuhu, then let's plan our next piece, shall we?"
10047110-89 = "How shall we wow everyone?"
10047110-90 = "...Does everyone have to be wowed? Can't we just be normal?"
10047110-91 = "If it doesn't wow, then it's not worth doing! We're trying to be revolutionary!"
10047110-92 = "Revolutionary..."
10047110-93 = "Then...how about we visit the Assembly President's personal museum?"
10047110-94 = "It's said to house Wildhunt's most mystical artwork."
10047110-95 = "It's absolutely forbidden to normal students. No explanation has ever been offered."
10047110-96 = "Perhaps we could find clues there...and they would help us uncover the secret behind the Portrait of Genesis."
10047110-97 = "The personal museum of the Assembly President... I'm curious as well."
10047110-98 = "I wonder what kind of occult mysteries are hidden inside. Heehee..."
10047110-99 = "You've never been, Kanoe?"
10047110-100 = "No... Other than the Assembly President... No one's ever been inside..."
10047110-105 = "Not even the Benevolent Thief."
10047110-109 = "Y-You want to sneak in there?! Are you serious?!"
10047110-110 = "Nyuhuhu. Nothing's impossible when we work together! Right?"
10047110-115 = "Ahh, those faces...! They're really going to do it!"
10047110-116 = "Sensei! Do something! We're already in enough trouble! Stop them! Be responsible!"
10047110-117 = "[ns] \"Hearing this makes me curious...\""
10047110-121 = "[ns1] \"But...let's try the normal channels first.\"\n[ns2] \"I'll see if I can arrange more access for students.\""
10047110-124 = "Even if it's not perfectly permissible, we'll make do somehow..."
10047110-125 = "Heehee... Eheeheehee...!"
10047110-126 = "Kanoe cannot be stopped once she's in this state. My heart is racing."
10047110-127 = "Nyuhuhu. Sounds like our next operation is decided!"
10047110-131 = "Now! I hereby announce as the president of the Occult Investigation Society...!"
10047110-132 = "Our next objective is...the Assembly President's Museum! We'll investigate all manner of occult secrets there!"
10047110-133 = "*sigh* What am I going to do with you all...?"
10047110-135 = "Will the Occult Investigation Society's next outing succeed...?"
10047110-141 = "...They're planning something fun. I'll enjoy seeing what they get into."
10047110-142 = "As an officer on the Prefectural Council..."
10047110-143 = "...and as the Benevolent Thief..."
10047110-144 = "I await the day we meet again."
10047110-153 = "...On whatever stage that may be. Fufufu..."
10047110-154 = "We Are the Occult Investigation Society! Ancient Spells and Mysteries"

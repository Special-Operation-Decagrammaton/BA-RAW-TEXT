[translation]
10047110-1 = "บทส่งท้าย;ชีวิตดำเนินต่อไป"
10047110-3 = "[ns] \"อุตส่าห์สร้างผลงานชิ้นเอกได้แล้วแท้ๆ\""
10047110-6 = "[ns] \"แต่ต้องมาถูกขังที่นี่อีกจนได้...\""
10047110-7 = "กรรมตามสนองยังไงล่ะ ไปก่อเรื่องไว้เยอะแยะขนาดนั้น โดนแค่นี้ถือว่าค่อยยังชั่วแล้วละ"
10047110-12 = "แต่จะว่าไป... ทำไมเรนะจังถึงมาอยู่ที่นี่ล่ะ...?"
10047110-13 = "ฉันไปมอบตัวมาน่ะสิ ก็ฉันแอบเข้าไปในเขตหวงห้ามแล้วลั่นระฆังไง"
10047110-14 = "ฉันเป็นเด็กที่มีจิตสำนึก ไม่เหมือนกับพวกรุ่นพี่หรอกนะ"
10047110-15 = "เสียงระฆังนั่นเป็นฝีมือของเรนะจังจริงๆ สินะคะ"
10047110-16 = "ฮิฮิ ไปลั่นระฆังวันสิ้นโลก... บ้าระห่ำเกินไปแล้วหรือเปล่า...?"
10047110-17 = "ไม่เห็นจะสิ้นโลกตรงไหนเลย มันเป็นแค่ตำนานเมืองเหลวไหลเท่านั้นละ!"
10047110-18 = "แต่ยังไงก็เกิดเวทมนตร์สมปรารถนาขึ้นจริงๆ นะคะ?"
10047110-19 = "คนที่สมความปรารถนามีแค่รุ่นพี่เอริคนเดียวไม่ใช่เหรอ?"
10047110-20 = "ไม่หรอกค่ะ ความปรารถนาของฉันก็เป็นจริงเหมือนกันค่ะ"
10047110-21 = "วงดนตรีของฉันจะมีแบตเทิลคอนเสิร์ตกับวงคู่แข่งน่ะค่ะ#nฉันก็เลยกังวลอยู่ว่าจะเลือกเพลงอะไรไปแข่งขันดี"
10047110-22 = "แต่ระหว่างที่เจอสถานการณ์เร่งด่วนและโดนฝ่ายดูแลหอพักไล่ตาม ฉันก็คิดเนื้อเพลงและทำนองขึ้นมาได้เองเลยค่ะ"
10047110-23 = "ฮุฮุ ความกังวลหายไปเป็นปลิดทิ้ง~"
10047110-24 = "ตอนนี้ฉันก็ฮัมเพลงนี้ในใจอยู่ ทุกคนอยากฟังมั้ยล่ะคะ?"
10047110-25 = "มะ... ไม่ละ! ไม่เป็นไร! ฉันชอบรุ่นพี่สึมุกิเวอร์ชันอ่อนโยนมากกว่า!"
10047110-26 = "ฉันก็อ่อนโยนตลอดนะคะ?"
10047110-27 = "อ๋อ งั้นแปลว่าเรนะจังก็ชอบฉันตลอดเวลาเลยสินะคะ?"
10047110-34 = "ว้ากก...!!"
10047110-35 = "ที่จริงฉันก็... ได้เรียนรู้อะไรใหม่ๆ จากเหตุการณ์ครั้งนี้เลยละ"
10047110-36 = "อะไรของรุ่นพี่อีกล่ะ?"
10047110-40 = "เรื่องนี้ทำให้ฉันยิ่งนึกถึง... เนื้อคู่จากชาติปางก่อนไงล่ะ ฮิฮิ..."
10047110-44 = "ตอนแรกฉันก็ไม่รู้หรอกนะ... แต่พอได้เห็นกันไปเรื่อยๆ ฉันก็ยิ่งแน่ใจ"
10047110-45 = "ไม่สงสัยเหรอว่าฉันหมายถึงใคร...?"
10047110-46 = "ไม่เห็นจะสงสัย ยังไงมันก็เป็นเรื่องที่ฟังไม่ขึ้นอยู่แล้วนี่?"
10047110-47 = "เรนะจัง... ไม่เชื่อเรื่องชาติที่แล้วสินะ"
10047110-48 = "ลืมสัมผัสมือที่นุ่มนวลของฉันไปได้ยังไง... น่าเสียใจจัง..."
10047110-49 = "มะ... หมายความว่ายังไงน่ะ? สัมผัสมือที่นุ่มนวล?"
10047110-50 = "ไม่ได้จะบอกว่าฉันคือเนื้อคู่แต่ชาติปางก่อนของรุ่นพี่ใช่มั้ย...?"
10047110-51 = "เรา... สนิทแนบแน่นกันมากเลยนะ..."
10047110-52 = "ฉันคือทาสแมว..."
10047110-57 = "ส่วนเรนะจังก็คือแมวน้อยน่ารักตัวนั้น..."
10047110-63 = "ว้ากก! หยุดเลยนะ!"
10047110-64 = "แต่เรนะจังก็น่ารักจริงๆ นะคะ"
10047110-65 = "ว้ากกกก...!!"
10047110-67 = "ยังไงก็ขอบคุณนะคะ เรนะจัง เรนะจังช่วยให้เราทุกคนก้าวไปข้างหน้าได้ค่ะ"
10047110-68 = "แต่ฉันไม่เห็นจะได้อะไรเลย?"
10047110-69 = "อุฮุฮุ ไม่หรอกค่ะ เรนะจังก็สมหวังเหมือนกันนี่คะ"
10047110-70 = "ฉันน่ะเหรอ? ฉันไปหวังอะไรไว้?"
10047110-71 = "เรนะจังอยากใช้เวลากับพวกเราให้สนุกสนานกว่าเดิมยังไงล่ะคะ"
10047110-72 = "คะ... ใครหวังอะไรแบบนั้นล่ะ!"
10047110-74 = "ฉันขอย้ำอีกครั้งเลยนะ! ฉันจะพิสูจน์ให้เห็นเองว่าเรื่องงมงายอย่างรหัสยศาสตร์น่ะไม่มีอยู่จริงหรอก!"
10047110-75 = "ฮุฮุ ค่ะ รู้แล้วค่ะ รู้แล้ว"
10047110-76 = "แต่ที่อาจจะไม่รู้ก็คือ... เรนะจังชอบอ่านหนังสือโหราศาสตร์ก่อนนอน"
10047110-77 = "...!"
10047110-78 = "ฉันก็ไม่รู้ด้วยว่าตอนเล่นแร่แปรธาตุ... เรนะจังชอบมาแอบดู..."
10047110-79 = "...!!"
10047110-80 = "อุฮุฮุ ส่วนฉันก็ไม่อยากลืมเลยค่ะ... ตอนเรนะจังมาเซ้าซี้ถามว่าทำไมไพ่ทาโร่ต์ถึงได้แม่นขนาดนั้น"
10047110-81 = "...!!!"
10047110-82 = "[s] \"ที่จริง... เรนะก็สนใจในรหัสยศาสตร์เหมือนกันเหรอ?\""
10047110-83 = "ฮึ่ย ไม่รู้ด้วยแล้ว! คนพวกนี้พูดอะไรหนวกหูชะมัด!"
10047110-88 = "อุฮุฮุ งั้นเรามาวางแผนสำหรับงานศิลปะชิ้นต่อไปกันเถอะค่ะ"
10047110-89 = "จะสร้างสรรค์อะไรให้ทุกคนเซอร์ไพรส์กันดีคะ?"
10047110-90 = "จำเป็นต้องทำให้ทุกคนเซอร์ไพรส์เลยเหรอ...? ขอเป็นชิ้นงานธรรมดาๆ ไม่ได้หรือไง?"
10047110-91 = "ถ้าทุกคนเห็นแล้วไม่ร้องว้าว นั่นก็ไม่ใช่ศิลปะที่แหวกแนวสิคะ!"
10047110-92 = "แหวกแนวงั้นเหรอ..."
10047110-93 = "งั้นครั้งหน้าเราไปพิพิธภัณฑ์ส่วนตัวของประธานสภาศิลปะกันมั้ยคะ?"
10047110-94 = "ที่นั่นเป็นสถานที่เก็บซ่อนผลงานศิลปะที่ลึกลับของไวลด์ฮันต์"
10047110-95 = "สถานที่ต้องห้ามที่ไม่เปิดให้นักเรียนทั่วไปเข้าชม และไม่บอกเหตุผลด้วยว่าทำไมถึงต้องปิดขนาดนั้น"
10047110-96 = "หากเราเอาข้อมูลที่ซ่อนอยู่ในนั้นมาปะติดปะต่อกัน เราก็อาจจะค้นพบความลับของโรงเรียนที่ซ่อนอยู่#nในภาพ <ภาพเหมือนการสร้างโลก> ก็ได้ค่ะ"
10047110-97 = "พิพิธภัณฑ์ส่วนตัวของประธานสภาศิลปะงั้นเหรอ... ฉันก็อยากเห็นเหมือนกันแฮะ"
10047110-98 = "จะมีเรื่องลึกลับอะไรซ่อนอยู่ที่นั่นนะ ฮิฮิ..."
10047110-99 = "รุ่นพี่คาโนเอะก็ไม่เคยไปมาก่อนเหรอคะ?"
10047110-100 = "อื้อ... นอกจากประธานสภาศิลปะแล้ว... ที่นั่นยังไม่เคยมีใครอื่นได้เข้าไปหรอก..."
10047110-105 = "แม้แต่ <จอมโจรแห่งความเสน่หา> ก็ด้วย"
10047110-109 = "จะ... จะแอบเข้าไปในที่แบบนั้นกันเหรอ?! จริงจังเหรอเนี่ย?!"
10047110-110 = "อุฮุฮุ ถ้าเราทำด้วยกันละก็ ฉันว่าไม่มีทางเป็นไปไม่ได้หรอกค่ะ! ใช่มั้ยล่ะคะ?"
10047110-115 = "อ่า... อย่าทำสีหน้าแบบนั้นกันสิ...! คิดจะทำจริงๆ งั้นเหรอ!"
10047110-116 = "คุณครู! ห้ามคนพวกนี้หน่อยสิ! เดี๋ยวก็ได้เป็นเรื่องใหญ่โตอีกพอดี!"
10047110-117 = "[ns] \"พอฟังๆ ดูแล้ว ครูก็สงสัยเหมือนกันนะ...\""
10047110-121 = "[ns1] \"แต่เราเข้าไปด้วยวิธีปกติจะดีกว่า\"\n[ns2] \"ถึงจะเป็นที่ที่นักเรียนทั่วไปเข้าไม่ได้ แต่ครูก็จะพยายามนะ\""
10047110-124 = "ต่อให้ต้องใช้วิธีที่ไม่ปกติ ฉันก็จะเข้าไปให้ได้เลย..."
10047110-125 = "ฮิฮิ... ฮิฮิฮิฮิ...!"
10047110-126 = "ถ้ารุ่นพี่คาโนเอะตั้งใจขนาดนี้แล้ว ก็คงไม่มีใครหยุดยั้งได้แล้วละ #nฉันก็ตื่นเต้นขึ้นมาแล้วค่ะ"
10047110-127 = "อุฮุฮุ สรุปว่าเราได้เป้าหมายต่อไปกันแล้วสินะคะ!"
10047110-131 = "เอาละ! ในฐานะหัวหน้าชมรมวิจัยรหัสยศาสตร์ ฉันขอประกาศ ณ ที่นี้ว่า!"
10047110-132 = "เป้าหมายต่อไปของพวกเราคือ... <พิพิธภัณฑ์ของประธานสภาศิลปะ>! เราจะไปหาสิ่งลึกลับทั้งหมดที่ซ่อนอยู่ในนั้นกันค่ะ!"
10047110-133 = "เฮ้อ... เชื่อเค้าเลย..."
10047110-135 = "(แผนการต่อไปของชมรมวิจัยรหัสยศาสตร์จะสำเร็จหรือเปล่านะ...)"
10047110-141 = "กำลังวางแผนทำเรื่องสนุกๆ อยู่สินะคะ... การติดตามดูในครั้งหน้าก็คงเป็นเรื่องสนุกอีกแน่เลย"
10047110-142 = "ทั้งในฐานะ <หัวหน้าฝ่ายดูแลหอพัก>"
10047110-143 = "และ <จอมโจรแห่งความเสน่หา>"
10047110-144 = "แล้วฉันจะรอวันที่เราจะได้พบกันอีกนะคะ"
10047110-153 = "ต่อให้จะยังไม่รู้ว่าจะได้เจอในสถานที่แบบไหนก็เถอะค่ะ ฮุฮุฮุ..."
10047110-154 = "พวกเราคือชมรมวิจัยรหัสยศาสตร์! ~เรื่องลึกลับและมนตราโบราณ~"

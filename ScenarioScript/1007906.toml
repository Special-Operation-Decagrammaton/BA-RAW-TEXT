1007906-38 = "3;미사카;02;……응? 매번 그러는 거냐고? 아니. 딱히 그런 건 또 아니지만……."
1007906-39 = "3;미사카;99;차라리 100% 그랬으면, 뭔가 원인이 있다고 찾아볼 수라도 있겠는데 말이지."

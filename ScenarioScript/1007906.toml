1007906-34 = "3;미사카;07;학원도시의 자판기들도 곧잘 내 돈을 먹었거든. 뭐랄까. 유독 나한테만 그런 일이 많이 일어난단 말이지……."
1007906-35 = "3;미사카;99;딱히 이유가 있는 건 아닌데……. 그냥 그런 일을 자주 겪게 된달까."
1007906-36 = "3;미사카;06;키보토스는 학원도시가 아니니까, 여기는 괜찮겠지-하고 별 생각 없이 하나 뽑아 봤는데……."

[translation]
1007906-1 = "這麼說也對"
1007906-2 = "（收到御坂求助的要求（？），於是前往了附近的公園）"
1007906-10 = "[ns1]「……？？？」\n[ns2] 走向聲音傳來的方向"
1007906-21 = "……唔，可惡……"
1007906-22 = "怎麼來到這裡還是被自動販賣機吃錢啊？這會不會太誇張了？"
1007906-23 = "到了這種程度，難道是我的問題嗎？"
1007906-24 = "感覺就像只要我人在自動販賣機旁邊，吃錢這件事就會自然而然地發生……"
1007906-25 = "[s3]「御坂？」\n[s4]「你在踢自動販賣機！？」"
1007906-28 = "……啊，老師。"
1007906-29 = "好像不太適合讓老師看到這種場面呢……抱歉。"
1007906-30 = "……嗯？自動販賣機？"
1007906-31 = "沒錯，我本來想在這台自動販賣機買飲料喝，結果又被吃錢了。"
1007906-32 = "唔嗯……「又」這個說法好像有點對不起它。"
1007906-33 = "……你問是什麼意思？#n啊啊，沒什麼，只是我個人的事。"
1007906-34 = "學園都市的自動販賣機也很常吃我的錢。#n該怎麼說呢，好像只有我特別常遇到這種事……"
1007906-35 = "明明沒什麼特別的原因……卻老是這樣。"
1007906-36 = "因為奇普托斯並不是我原先所在的學園都市，#n本來以為不會在這裡被吃錢，沒多想就把錢投下去了……"
1007906-37 = "……結果就如老師所見。"
1007906-38 = "……嗯？是不是每次都這樣？#n不，那倒也不是……"
1007906-39 = "我還寧願被吃錢的機率是100%呢，這樣也許更容易找到原因。"
1007906-40 = "[s5]「原來你是經常遇到這種事的類型。」\n[s6]「常遇到事件的類型……總覺得很有親切感。」"
1007906-43 = "總之，每當在學園都市遇到這種事，我就會像剛才一樣踢自動販賣機幾腳。#n這樣卡住的東西就會自己跑出來了。"
1007906-44 = "……也許機器只要敲幾下就會聽話吧。"
1007906-45 = "和給人的印象不太一樣？怎麼說？"
1007906-46 = "以為我會靠電力解決……？"
1007906-50 = "哈哈……"
1007906-51 = "老師，就算是我也不會把能力用在這種事情上。"
1007906-52 = "如果因為生氣就用電力攻擊或操作自動販賣機，機器可能就要一台都不剩了。"
1007906-53 = "況且大部分的自動販賣機其實並不是那麼精密的機械……#n不如踢它幾下，讓它把東西吐出來比較快。"
1007906-54 = "……嗯？什麼？"
1007906-55 = "……就算是這樣，敲打公物也不是好事……？"
1007906-56 = "…………"
1007906-57 = "呃，啊！？什，什麼，怎麼突然這麼正經？氣氛和剛才差太多了吧？"
1007906-58 = "話，話是這麼說沒錯……畢竟這裡是別人生活的區域……"
1007906-59 = "……什麼？"
1007906-60 = "不是區域的問題？在學園都市也不能那樣……！？"
1007906-61 = "什，什麼嘛，像個老師一樣說得那麼了不起……！"
1007906-62 = "[s7]「嗯，畢竟我身為教育者……」\n[s8]「這是兩回事。」"
1007906-68 = "…………啊。"
1007906-69 = "也，也對，你確實是老師……咦……"
1007906-70 = "等，等等？怎麼有一種上當了的感覺……？"
1007906-71 = "果，果然不該叫老師來的嗎……唔嗯……嗯……"
1007906-72 = "抱，抱歉……那總之先……"
1007906-73 = "[s9] 聯絡公園管理者\n[s10] 聯絡貼在自動販賣機上的售後服務處"
1007906-79 = "（修好機器後，買了一罐御坂原本想買的飲料給他）"
1007906-81 = "……叫人來修理，感覺還挺新鮮的。"
1007906-82 = "本來這樣做才是正常的？說，說的也是……嗯……"
1007906-83 = "託老師的福順利解決了。謝謝你，老師。"
1007906-84 = "雖然意外被老師教育了一下有點尷尬，#n不過老師說的確實沒錯，這件事就讓它過去吧。"
1007906-85 = "……嗯？"
1007906-86 = "如果再發生這種事，要我別用腳踢，先跟老師聯絡？"
1007906-87 = "…………呃，呃呃……知道了……"
1007906-89 = "好像在意想不到的地方……有點丟臉……"

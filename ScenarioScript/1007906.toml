1007906-31 = "3;미사카;16;맞아. 이 자판기, 음료수 하나 좀 뽑아 먹으려 했더니 또 내 돈을 먹었거든.\n#3;hophop\n#3;em;[스팀]"
1007906-32 = "3;미사카;99;으음…… '또' 라기에는 이 녀석에게는 좀 미안한 말일 수도 있지만 말이지."

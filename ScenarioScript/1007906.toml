[translation]
1007906-1 = "สิ่งที่ถูกต้อง"
1007906-2 = "(คุณครูมุ่งหน้าไปยังสวนสาธารณะใกล้ๆ หลังมิซากะติดต่อมาขอความช่วยเหลือ)"
1007906-10 = "[ns1] \"...???\"\n[ns2] เดินไปตามทางที่ได้ยินเสียง"
1007906-21 = "...ฮึ่ย โธ่เอ๊ย..."
1007906-22 = "มาถึงที่นี่แล้วยังจะโดนตู้ขายของอัตโนมัติกินเหรียญอีกเหรอเนี่ย? แบบนี้มีที่ไหนกัน?"
1007906-23 = "หรือปัญหามันอยู่ที่ตัวฉันกันนะ?"
1007906-24 = "เหมือนใครเขียนบทว่าถ้าฉันอยู่ข้างๆ ตู้ขายของอัตโนมัติแล้วจะต้องโดนกินเหรียญอยู่เรื่อยเลย..."
1007906-25 = "[s3] \"มิซากะ?\"\n[s4] \"เตะตู้ขายของทำไมน่ะ?!\""
1007906-28 = "...อ้อ คุณครู"
1007906-29 = "ฉันไม่น่าให้คุณครูได้เห็นมุมแย่ๆ ที่ไม่อยากจะให้ดูเลย... ขอโทษนะ"
1007906-30 = "...หืม? ฉันมีปัญหาอะไรกับตู้ขายของอัตโนมัติน่ะเหรอ?"
1007906-31 = "แหงละ ก็เจ้าตู้นี้น่ะสิ ฉันว่าจะกดเครื่องดื่มมาสักหน่อย แต่มันก็กินเหรียญของฉันไปอีกแล้ว"
1007906-32 = "อืม... จะพูดว่า 'อีกแล้ว' ก็น่าจะใจร้ายกับเจ้าตู้นี่ไปหน่อย"
1007906-33 = "หมายความว่ายังไงน่ะเหรอ? อ่า เรื่องที่เกิดขึ้นกับฉันน่ะ"
1007906-34 = "ตู้ขายของอัตโนมัติในเมืองแห่งการศึกษาที่โลกของฉันก็ชอบกินเงินของฉันเหมือนกัน จะว่ายังไง#nดีนะ เรื่องแบบนี้เหมือนจะเกิดขึ้นแต่กับฉันเท่านั้นน่ะ..."
1007906-35 = "ไม่เห็นจะมีสาเหตุอะไรเป็นพิเศษเลย... มีแต่ฉันที่เจอเรื่องแบบนี้ตลอด"
1007906-36 = "เห็นว่าคิโวทอสเป็นคนละโลกกับเมืองแห่งการศึกษาที่ฉันมา ก็เลยคิดว่าตู้ของที่นี่น่าจะไม่มีปัญหา#nอะไร ก็เลยลองกดน้ำดู..."
1007906-37 = "...แต่ผลลัพธ์ก็อย่างที่เห็น"
1007906-38 = "...หืม? ฉันเจอแบบนี้ทุกครั้งเลยรึเปล่าน่ะเหรอ? ไม่หรอก มันก็ไม่ถึงกับขนาดนั้น"
1007906-39 = "ถ้าฉันเจอแบบนั้น 100% ฉันก็คงจะไปหาสาเหตุแล้วแหละ"
1007906-40 = "[s5] \"เป็นคนที่เจอเรื่องแบบนี้บ่อยๆ สินะ\"\n[s6] \"เป็นคนประเภทที่เจอเรื่องนี้บ่อยๆ เหรอ... งั้นเราคือเพื่อนกัน\""
1007906-43 = "เอาเถอะ เอาเป็นว่าพอเจอเรื่องแบบนี้ในเมืองแห่งการศึกษา ฉันก็จะเตะตู้ขายของอัตโนมัติอย่างที่#nเห็นทุกครั้ง แล้วสุดท้ายเครื่องดื่มที่ค้างอยู่มันก็จะร่วงลงมา"
1007906-44 = "...เครื่องพวกนี้น่ะ ถ้าไม่ใช้กำลังก็ไม่เชื่อฟังกันเลย"
1007906-45 = "หืม? ต่างจากที่คิดเหรอ? ต่างยังไง?"
1007906-46 = "คิดว่าฉันจะใช้ไฟฟ้าในการแก้ปัญหางั้นเหรอ...?"
1007906-50 = "เฮ้อ"
1007906-51 = "คุณครู เห็นฉันเป็นแบบนี้ แต่ฉันก็ไม่ได้ใช้พลังไปกับทุกเรื่องที่เจอหรอกนะ"
1007906-52 = "ถ้าฉันหัวร้อนใส่ตู้ขายของอัตโนมัติแล้วปล่อยไฟฟ้าใส่หรือไปควบคุมมัน ก็คงไม่เหลือตู้อื่นให้เห็น#nแล้วละ"
1007906-53 = "อีกอย่าง ตู้ขายของอัตโนมัติส่วนใหญ่ก็ไม่ใช่เครื่องใช้ไฟฟ้าดีๆ ด้วย... สู้เตะไม่กี่ครั้งให้เครื่องดื่มมัน#nร่วงลงมาเลยน่าจะดีกว่า"
1007906-54 = "...หืม? ว่าไงนะ?"
1007906-55 = "...แต่ก็ไม่ควรทำลายข้าวของสาธารณะงั้นเหรอ...?"
1007906-56 = "......"
1007906-57 = "อะ... อ้าว!? อะ... อะไรกัน ทำไมจู่ๆ ก็มาเทศน์กันแบบนี้ล่ะ? บรรยากาศมันต่างจากเมื่อกี้เลยนะ"
1007906-58 = "นะ... แน่นอนว่าที่คุณครูพูดมามันก็ถูก... เพราะนี่ก็ไม่ใช่ถิ่นของฉัน..."
1007906-59 = "...ว่าไงนะ?"
1007906-60 = "ปัญหาไม่ได้อยู่กับสถานที่งั้นเหรอ? ต่อให้อยู่ในเมืองแห่งการศึกษาก็ไม่ควรทำแบบนั้น...!?"
1007906-61 = "อะ... อะไรเนี่ย พูดอะไรเหมือนคนเป็นครูเลย...!"
1007906-62 = "[s7] \"ก็ครูเป็นครูนี่นา...\"\n[s8] \"แล้วครูดูไม่เหมือนครูผู้สอนตรงไหนเนี่ย?\""
1007906-68 = "... อ่า"
1007906-69 = "นะ... นั่นสินะ เป็นครูจริงด้วย... เอ๋..."
1007906-70 = "อะ... อะไรกัน? ทำไมฉันรู้สึกเหมือนจนมุมแปลกๆ...?"
1007906-71 = "มะ... ไม่น่าเรียกมาเลย... เอ่อ... อืมม... อืม..."
1007906-72 = "เอาเป็นว่า... ฉะ... ฉันขอโทษ..."
1007906-73 = "[s9] ติดต่อผู้ดูแลสวนสาธารณะ\n[s10] ติดต่อฝ่ายบริการหลังการขายตามเบอร์ที่ติดอยู่"
1007906-79 = "(หลังจากซ่อมตู้แล้ว คุณครูก็กดเครื่องดื่มที่มิซากะตั้งใจจะกดตั้งแต่แรกให้เธอ)"
1007906-81 = "...เรียกคนมาช่วยซ่อมให้ก็เป็นเรื่องแปลกใหม่ดีแฮะ"
1007906-82 = "หืม? มันควรจะเป็นแบบนี้ตั้งแต่แรกงั้นเหรอ? กะ... ก็คงงั้น... อืม..."
1007906-83 = "แต่ก็ขอบคุณที่มาช่วยแก้ปัญหานะ ขอบคุณนะคุณครู"
1007906-84 = "ถึงฉันจะยังงงที่โดนดุก็เถอะ แต่ที่คุณครูสอนก็ไม่ใช่เรื่องที่ผิด เพราะงั้นฉันจะยอมๆ ฟังแล้วกัน"
1007906-85 = "...หืม?"
1007906-86 = "ถ้าเกิดเรื่องแบบนี้อีกก็อย่าเตะตู้อีก แต่ให้ติดต่อคุณครูก่อนงั้นเหรอ?"
1007906-87 = "...อ่า อืม... ก็ได้..."
1007906-89 = "พอโดนดุแบบนี้... มันก็น่าอายอยู่เหมือนกันนะ..."

[translation]
10034160-1 = "[D-3]: สิ่งมีชีวิตที่อ่อนแอ"
10034160-3 = "โอยย..."
10034160-4 = "ไอริ...? เป็นอะไรเหรอ?"
10034160-5 = "อ่า... ไม่มีอะไรหรอก ก็แค่เมื่อยๆ ตัวน่ะ... แหะๆ"
10034160-6 = "แบบนี้เรียกว่าไม่เป็นอะไรได้ไง เมื่อกี้ร้องโอดโอยซะขนาดนั้น"
10034160-7 = "แต่ที่จริงฉันก็รู้สึกปวดเนื้อเมื่อยตัวอยู่เหมือนกัน พอต้องขยับตัวและทำท่าเดิมๆ นานๆ เข้ามันก็เมื่อย#nอยู่นะ..."
10034160-9 = "พูดให้มันถูกสิ โยชิมิ ต้องบอกว่าเพราะได้ออกกำลังกายจากที่ปกติแล้วไม่เคยทำเลยต่างหากล่ะ"
10034160-10 = "ยุ่งไม่เข้าเรื่องน่า!! แล้วเธอน่ะไม่เป็นไรรึไง!?"
10034160-11 = "ฉันสบายมาก ไม่เห็นจะเมื่อยตรงไหน"
10034160-12 = "ได้ไงกัน!? เธอขยับตัวมากขนาดนั้นเลยนะ!?"
10034160-14 = "รู้ตัวเองหน่อยสิ! เจ้าสิ่งมีชีวิตที่อ่อนแอ!!"
10034160-15 = "คิดว่าร่างกายที่อ่อนแอของตัวเองจะเหมือนกันกับของแคทส์ พาลูครึไง..."
10034160-22 = "บอกแล้วใช่มั้ยว่าถ้าพูดถึงอีกจะเชือดทิ้งน่ะ!!!"
10034160-23 = "มันคือเสรีภาพในการแสดงความคิดเห็นนะ!! ไม่ว่าใครก็มีเสรีภาพในการแสดงความคิดเห็นกัน#nทั้งนั้นแหละ!!"
10034160-24 = "เสรีภาพนี้จะให้ใครมาจำกัดไม่ได้...!!"
10034160-28 = "อ๊ากกกก!!"
10034160-41 = "มาเริ่มซ้อมกันเถอะนะ โยชิมิจัง"
10034160-42 = "อืม"

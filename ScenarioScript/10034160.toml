[translation]
10034160-1 = "3天前：脆弱的生命體"
10034160-3 = "唔唔……"
10034160-4 = "……愛莉？怎麼了？"
10034160-5 = "沒，沒什麼。只是有點痠痛而已……嘿嘿。"
10034160-6 = "怎麼會沒什麼呢。都痛到發出了哀號不是嗎？"
10034160-7 = "老實說我也是全身上下都痠痛的不得了。#n誰叫我們一直維持相同的姿勢，做著同樣的動作……"
10034160-9 = "不，你少說了一點，喜美。#n那就是你平時缺乏運動。"
10034160-10 = "某，某部份確實是這樣沒錯！！那你呢，你就沒事嗎！？"
10034160-11 = "我好得很。"
10034160-12 = "怎麼可能！？你明明也動得不少！？"
10034160-14 = "認清自己的身分吧！脆弱的生命體！！"
10034160-15 = "竟然以為自己能和怪貓凱茜．帕魯格相提並論……"
10034160-22 = "我說過誰再提就宰了誰吧！！！"
10034160-23 = "言論自由！！所有人都應該享有自由發言的權利！！"
10034160-24 = "這項權利不該被公權力侵犯……！！"
10034160-28 = "啊啊啊啊──！！"
10034160-41 = "……我們先開始吧，喜美醬？"
10034160-42 = "嗯。"

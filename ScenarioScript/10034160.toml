[translation]
10034160-1 = "3 Days Ago: A Weak Spirit"
10034160-3 = "...Urgh..."
10034160-4 = "...Airi? What's wrong?"
10034160-5 = "N-Nothing. I'm just feeling a bit stiff... Heehee."
10034160-6 = "That's not nothing. I clearly heard you in pain just now."
10034160-7 = "I've been feeling stiff here and there too. I think it's because we've been doing pretty much the same thing, with the same posture..."
10034160-9 = "No, let's go ahead and say it, Yoshimi. It's because you started doing physical activities all of a sudden."
10034160-10 = "M-Mind your own business!! How are YOU feeling then, huh?!"
10034160-11 = "Totally fine."
10034160-12 = "How?! After moving that much?!"
10034160-14 = "Know your place! You weakling!!"
10034160-15 = "How dare you compare your feeble body to the feral Cath Palug?"
10034160-22 = "I WILL kill you!!"
10034160-23 = "Free speech! We all have the right to free speech!!"
10034160-24 = "And that right shall never be restricted by the authorities...!!"
10034160-28 = "Ahhh!!"
10034160-41 = "...Should we get started, Yoshimi?"
10034160-42 = "Yeah."

[translation]
11234010-1 = "#N-01"
11234010-6 = "สะ... สำเร็จ...!!"
11234010-7 = "สำเร็จแล้ว...! ทำได้แล้ว...!!"
11234010-8 = "ฉันหมุนไม้กลอง... เป็นแล้ว...!! แบบนี้ก็มั่นใจได้เลยว่าฉันต้องเป็นโปรมือกลองได้...!!"
11234010-12 = "อย่าไปพูดอะไรแบบนี้ข้างนอกนะ ถือว่าฉันขอละ..."
11234010-13 = "ไม่หรอก ถ้าจะพูดก็พูดได้ แต่ห้ามพูดตอนพวกเราอยู่ด้วยนะ"

[translation]
10016040-1 = "Episode 4;A Late Lunch"
10016040-2 = "Once Yuuka was feeling better, I left the stadium to find something to eat for lunch."
10016040-6 = "A large crowd gathering around one of the lounge areas caught my eye."
10016040-7 = "Thank you for your hard work in the morning games, everyone!"
10016040-8 = "The Executive Committee is handing out free drinks, so please help yourself!"
10016040-9 = "Thank you, Sister!"
10016040-10 = "I...I'm not a student, but I'm really thirsty. Can I have one too?"
10016040-11 = "We would never deny someone in need. Please stay hydrated!"
10016040-12 = "Sister! We're almost out of drinks."
10016040-13 = "Oh, dear. Already?"
10016040-14 = "That's no problem. I'll contact headquarters and ask for more."
10016040-15 = "Waaahhh... Where's my sister...?"
10016040-16 = "Why're you crying, little one? Are you lost?"
10016040-17 = "Dry those tears, I'll help you find your sister. If you close your eyes and count to ten, everything will be better!"
10016040-18 = "Sister, where's the nearest vending machine?"
10016040-19 = "It's on the first floor of the East Wing. Oh wait, but I think I heard it's broken. You'll have to go to the one at the West Wing instead."
10016040-20 = "If you don't mind waiting for a moment, I can take you there!"
10016040-21 = "Sister, what's the best way to get a good score in the afternoon relay?"
10016040-22 = "The best way to get a good score...?"
10016040-23 = "Um... My specialty is cheering on sports, not playing them, so I'm not too sure... But I think your body would need to be well-rested to perform at its best!"
10016040-24 = "Please drink some of this cold sports drink! It'll help you regain electrolytes and feel recharged. Good luck on the relay race! Okay, I have to help find this child's sister now..."
10016040-25 = "Sister! What is the meaning of justice?"
10016040-26 = "...That's a difficult question to answer."
10016040-27 = "[s] \"...You look busy.\""
10016040-28 = "Oh! Hello, [USERNAME] Sensei!"
10016040-29 = "How rude of me... I didn't even notice you arrive! My apologies, I've been a little busy with Executive Committee work."
10016040-30 = "Is there anything I can assist you with, Sensei?"
10016040-31 = "[s] \"No, not at all. You're already doing too much.\""
10016040-33 = "[ns] \"Have you eaten lunch yet?\""
10016040-34 = "Lunch...?"
10016040-38 = "Wow. It's already gotten so late."
10016040-39 = "I lost track of time because so many people needed assistance."
10016040-40 = "There's still a long line of requests, so I'll just eat later when I can find a spare moment."
10016040-41 = "[s] \"Put me to work, Sister.\""
10016040-42 = "Oh, no. I could never ask you to do that."
10016040-43 = "And just because one of us has to skip lunch, that doesn't mean you should suffer too."
10016040-44 = "You want to ask me for help then? The best street vendor in the area?"
10016040-45 = "Everyone says different things, but people are saying the Chinese rice bowl from the Black Tortoise Promenade is incredible!"
10016040-46 = "Their stall is very prominent in the front. It'll be easy to find."
10016040-47 = "[s1] \"I'm really bad with directions, so I might get lost.\"\n[s2] \"Can you take me there please, Mari?\""
10016040-52 = "Hmm... I suppose it can't be helped."
10016040-53 = "I'll finish up here, and then we'll head over to the food stalls."
10016040-55 = "I joined Mari in helping the many festival-goers and students that needed assistance."
10016040-57 = "You were dazzling, Sensei!"
10016040-58 = "I wouldn't have been able to assist every single person the way I did if not for you!"
10016040-59 = "[s3] \"You did great too, Mari. You really helped a lot of people.\"\n[s4] \"You're the type of person people turn to for help.\""
10016040-60 = "It's a Sister's duty to hear out everyone's troubles."
10016040-61 = "It's a Sister's duty to hear out everyone's troubles."
10016040-62 = "I'm very honored people feel safe sharing their struggles and concerns with me. I think there's a certain beauty to it."
10016040-63 = "Although, one would argue having to eat lunch late isn't quite as romantic. Heehee."
10016040-64 = "[s5] \"Lunch is on me since you worked so hard!\"\n[s6] \"Two Chinese rice bowls, please!\""
10016040-65 = "Sensei! Are you sure?"
10016040-66 = "Sensei! Are you sure?"
10016040-67 = "Two Chinese rice bowls? You got it!"
10016040-72 = "Order up! Here are your bowls."
10016040-73 = "What fast service...!"
10016040-74 = "And such high quality. Even these paper plates are unique."
10016040-75 = "A restaurant needs to not only serve the best food around, but they also need to be the fastest ones to do it! Especially in environments like this, where people are eager to get back to the stadium."
10016040-76 = "And since we knew people would be eating while watching the games, we made these special paper plates ourselves! They're designed to be easy to carry and eat from as you're moving about."
10016040-77 = "But my silly speeches won't fill your belly! Please enjoy before it gets cold."
10016040-78 = "What a unique experience! We're eating greasy, festival foods right here, in the hustle and bustle of the crowd."
10016040-79 = "Heehee. It feels a bit improper for some reason."
10016040-80 = "Well then, thank you for this meal!"
10016040-84 = "Oh my! Sensei, it's delicious!"
10016040-85 = "It's seasoned with exotic spices that I've never tried before..."
10016040-86 = "It's a foreign taste, but really addicting."
10016040-87 = "Hahaha! I'm glad to hear it! Our secret sauce is a recipe we've perfected over many years at the Black Tortoise Promenade."
10016040-88 = "Although, President Rumi wandered off right after the cooking contest, murmuring something or another about improving her recipes..."
10016040-89 = "I think she shouldn't give so much heed to some Gehenna students' opinions..."
10016040-90 = "[s] \"Can I have one more bowl, please?\""
10016040-91 = "Of course! Just a minute."
10016040-95 = "...Whoa! It's hot!"
10016040-97 = "A-Are you okay?"
10016040-98 = "Nothing to worry about, just perils of the trade. It's not the first time I've gotten hot oil on myself. Ow, ow, ow..."
10016040-99 = "That is absolutely something to worry about! Early treatment is very important in taking care of burns."
10016040-100 = "But I can't leave the stall unmanned, and I don't know where President Rumi went..."
10016040-101 = "That's okay! I'll take care of the stall, so please head to the Joint Medical Headquarters with Sensei."
10016040-102 = "[s7] \"It might leave a scar if you're not careful.\"\n[s8] \"I can take you there right now.\""
10016040-103 = "Um... Maybe it'll be okay since the lunch rush is mostly over..."
10016040-104 = "Um... Maybe it'll be okay since the lunch rush is mostly over..."
10016040-105 = "Okay! I'm very sorry, but can I leave the stall in your charge?"
10016040-106 = "Of course! What's important is that you get the care you need."
10016040-109 = "The last game caused a lot of injuries..."
10016040-110 = "Sena, can you please handle sterilizing any light scratches or wounds? And if any patients require further treatment, they can be moved to the cots."
10016040-111 = "Can do. I just need to get more sterile gauze from the supplies box, one moment."
10016040-112 = "[s] \"It's a little hectic in here...\""
10016040-113 = "Sensei? What brings you to the medical tent?"
10016040-114 = "Oh no! Are you injured somewhere?"
10016040-115 = "[s] \"No, not me. This student over here.\""
10016040-116 = "I'm so sorry to add to your workload. I'm a bit embarrassed about it, but I burned myself with some oil..."
10016040-117 = "Don't apologize at all! It's essential to treat burn wounds right away."
10016040-118 = "Even more so with hot oil. It can stick to your skin and cause deep scars."
10016040-119 = "Sena, are you busy? Could you prepare some burn dressings as well please?"
10016040-120 = "I can. I just need to cut a splint to set a hairline fracture."
10016040-121 = "I'll tend to your burns right after this."
10016040-122 = "[s9] \"...Do you need some help? I can get you first aid supplies.\"\n[s10] \"Maybe I can help sort through the first aid supplies...\""
10016040-126 = "No! (Absolutely not!)"
10016040-127 = "You cannot enter the first aid area! No matter what!"
10016040-128 = "[s] \"I-Is there something wrong there?\""
10016040-129 = "Well, you see..."
10016040-130 = "We're treating patients with critical injuries from some artillery shells."
10016040-131 = "The injuries are extremely grotesque, so it can be a difficult scene to stomach without prior experience."
10016040-132 = "You could have horrible nightmares!"
10016040-133 = "[s11] \"That sounds awful... Are they okay?\"\n[s12] \"But don't they need more care then?\""
10016040-134 = "Their injuries may be critical, but they're not untreatable."
10016040-135 = "Their injuries may be critical, but they're not untreatable."
10016040-136 = "And with medical staff from two academies on duty, they'll be back on their feet within the hour."
10016040-137 = "[s] \"Only one hour?!\""
10016040-138 = "Yes, just the one. So please, leave the patients to us and enjoy the festival enough for all of us!"
10016040-139 = "Okay, all set. Please bring the corpse..."
10016040-140 = "Uh, I mean, the burn patient here."
10016040-144 = "C-Corpse? Um... Okay, well, thank you."
10016040-146 = "I left the medical tent with Sena and Serina practically shooing me out the door."

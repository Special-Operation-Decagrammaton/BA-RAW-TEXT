[translation]
10016040-1 = "第4話;遲來的午餐"
10016040-2 = "（和優香分開後，為了解決午餐而再次來到運動場外）"
10016040-6 = "（不知為何，休憩廣場的中央擠滿了人群……）"
10016040-7 = "各位選手！上午的比賽辛苦了。"
10016040-8 = "這裡正在發送免費的飲料。#n請口渴的人多加利用！"
10016040-9 = "謝謝你，修女！"
10016040-10 = "我……我不是選手，也可以拿飲料嗎？"
10016040-11 = "當然沒問題。#n來，請收下。"
10016040-12 = "修女，這邊的箱子裡已經沒剩下幾瓶了……"
10016040-13 = "哎呀？已經沒有了嗎？"
10016040-14 = "請稍等……我立刻聯絡實行委員會總部進行補充──"
10016040-15 = "嗚哇～姊姊……你在哪裡……"
10016040-16 = "哎呀，是走失的孩子……？"
10016040-17 = "請別擔心。#n我馬上去找你的姊姊，在這裡等我一下哦。"
10016040-18 = "修女，離這裡最近的販賣機在哪裡呀？"
10016040-19 = "離這裡最近的販賣機在東館1樓，但目前正在維修中……#n請稍微繞點路，使用西館側邊的販賣機。"
10016040-20 = "可以的話，我晚點能帶您去──"
10016040-21 = "修女，有能在下午的接力賽中創下佳績的方法嗎？"
10016040-22 = "創，創下佳績的方法……嗎？"
10016040-23 = "我對體育方面不是很了解，所以不知道能不能給出好的建議呢……#n充分地休息，將狀態調整到最佳如何？"
10016040-24 = "來，請用運動飲料。#n然後不好意思，我現在先將走失的孩子──"
10016040-25 = "修女……正義是什麼呢？"
10016040-26 = "……這問題有點難呢。"
10016040-27 = "[s]「總，總覺得非常忙碌呢。」"
10016040-28 = "啊，[USERNAME]老師！您好。"
10016040-29 = "很抱歉這麼晚才跟您打招呼。#n實行委員會的工作實在讓我分身乏術……"
10016040-30 = "難道……老師也碰上什麼問題了嗎？"
10016040-31 = "[s]「我沒事，不用太在意我沒關係。」"
10016040-33 = "[ns]「話說回來……瑪麗吃過午餐了嗎？」"
10016040-34 = "午餐嗎……？"
10016040-38 = "哎呀，已經這麼晚了呢。"
10016040-39 = "一直忙著實行委員的工作，都忘了注意時間……"
10016040-40 = "因為還有許多事要處理……我打算晚點再吃。"
10016040-41 = "[s]「我也來幫忙吧。」"
10016040-42 = "沒，沒關係的。"
10016040-43 = "如果因為我而耽誤老師用餐，我會覺得很過意不去……"
10016040-44 = "嗯？這附近評價最好的攤販是嗎……？"
10016040-45 = "大家的意見雖然各不相同，不過幾乎都認為玄武商會賣的中華丼相當美味……"
10016040-46 = "玄武商會的攤販就在前面轉彎處，應該很快就能找到了。"
10016040-47 = "[s1]「我是路痴，說不定會迷路……」\n[s2]「如果瑪麗能帶我去的話就太好了……」"
10016040-52 = "呵呵……那就沒辦法了。"
10016040-53 = "那麼我會盡快把工作做完。#n稍後再親自帶老師去攤販那邊吧。"
10016040-55 = "（……之後便和瑪麗一起協助需要幫助的觀眾）"
10016040-57 = "老師，辛苦您了。"
10016040-58 = "託您的福，才能順利解決大家的問題。"
10016040-59 = "[s3]「瑪麗也辛苦了。」\n[s4]「大家都想跟瑪麗諮詢煩惱呢。」"
10016040-60 = "畢竟傾聽煩惱是修女的職責。"
10016040-61 = "畢竟傾聽煩惱是修女的職責。"
10016040-62 = "能說出隱藏在內心的煩惱和痛苦是一件好事。"
10016040-63 = "不過……已經過了午餐時間呢。呵呵。"
10016040-64 = "[s5]「為了犒賞我們的努力，午餐我請客。」\n[s6]「老闆，請給我2份中華丼。」"
10016040-65 = "啊，您其實不必……"
10016040-66 = "啊，您其實不必……"
10016040-67 = "2份中華丼。收到！多謝惠顧！"
10016040-72 = "來，2份中華丼！久等了！"
10016040-73 = "好，好快……！"
10016040-74 = "哇……這個紙碗的形狀真特別。"
10016040-75 = "畢竟不能讓來看比賽的客人們等太久。#n速度是餐飲業的命脈啊！"
10016040-76 = "再加上很多客人都喜歡邊吃邊看比賽。#n這個紙碗就是設計來方便客人外帶的。"
10016040-77 = "好了，說明到此為止……快趁涼掉之前享用吧。"
10016040-78 = "像這樣站在路邊吃著中華丼……"
10016040-79 = "呵呵，總覺得像是在做壞事一樣呢……讓人有些緊張。"
10016040-80 = "那麼……我要開動了。"
10016040-84 = "哇！這個中華丼真的很美味耶。"
10016040-85 = "這是山海經獨有的辛香料嗎……？#n微微的香料味在口腔中蔓延……"
10016040-86 = "這麼說雖然好像有些失禮，不過總感覺會對這種刺激且不膩的味道上癮呢。"
10016040-87 = "是吧是吧？#n這個中華丼，是用我們玄武商會開發的秘傳醬汁製成的新菜色！"
10016040-88 = "明明這麼好吃，瑠美會長卻在料理對決結束後突然說有需要改良的地方，#n接著就急急忙忙地回去了……"
10016040-89 = "是不是太在意那個格黑娜學生的話了？"
10016040-90 = "[s]「不好意思，請再來一碗！」"
10016040-91 = "感謝惠顧！請稍等一下唷。"
10016040-95 = "……好，好燙！"
10016040-97 = "沒，沒事吧？"
10016040-98 = "只是被油濺到而已，沒事。痛痛痛……"
10016040-99 = "怎麼會沒事！燙傷是很可怕的唷？#n得趕緊去聯合醫療本部……"
10016040-100 = "但是瑠美會長不在，我不能離開崗位……"
10016040-101 = "我會留在店裡請求客人諒解。#n請老師陪店員一起去聯合醫療本部吧！"
10016040-102 = "[s7]「稍有不慎可能會留下疤痕。」\n[s8]「我帶你去聯合醫療本部。」"
10016040-103 = "好吧……客人也幾乎都回去了，應該能暫時離開一下吧？"
10016040-104 = "好吧……客人也幾乎都回去了，應該能暫時離開一下吧？"
10016040-105 = "那就不好意思，麻煩你們了。"
10016040-106 = "好的，慢走！"
10016040-109 = "剛才的比賽又有大量的選手受傷……"
10016040-110 = "瀬奈同學，請先給輕微擦傷的傷患消毒！#n我會將需要額外措施的傷患搬運到簡易床上。"
10016040-111 = "收到。我再去醫藥箱內拿一些消毒過的紗布。"
10016040-112 = "[s]「這裡看起來也很忙呢。」"
10016040-113 = "哎呀，老師？你來聯合醫療本部有什麼事嗎？"
10016040-114 = "難不成受傷了……？"
10016040-115 = "[s]「受傷的不是我……」"
10016040-116 = "我在準備炸物時被油燙傷了……不好意思，給你添麻煩了。"
10016040-117 = "不麻煩！燙傷如果不快點治療的話，會很容易留下疤痕喔！"
10016040-118 = "特別是溫度高的油容易沾附在皮膚表面。#n滲入內部的話可是非常危險的。"
10016040-119 = "瀬奈同學，可以再幫我拿燙傷用的紗布嗎？"
10016040-120 = "請稍等一下。我正在幫骨折傷患上夾板……"
10016040-121 = "這邊一結束就會立刻處理。"
10016040-122 = "[s9]「……我能幫忙嗎？」\n[s10]「至少能幫忙拿一些醫藥品之類的……」"
10016040-126 = "不行！"
10016040-127 = "那，那個，救護室裡面……不能進去唷！"
10016040-128 = "[s]「救護室裡有什麼嗎……？」"
10016040-129 = "那個，因為……"
10016040-130 = "現在救護室裡正在治療被砲彈擊中的重症患者。"
10016040-131 = "因為是相當嚴重的傷勢，不建議身為一般人的老師去目睹那樣的景象。"
10016040-132 = "沒錯……看了可是會做惡夢的！"
10016040-133 = "[s11]「那可真是不得了啊……」\n[s12]「這樣的話，果然還是幫忙比較好吧……」"
10016040-134 = "雖，雖然是真的傷得很重……但光靠我們的能力就足以應付了！"
10016040-135 = "雖，雖然是真的傷得很重……但光靠我們的能力就足以應付了！"
10016040-136 = "兩所學園的醫療人員正全力治療當中，只需要大概一個小時就能痊癒了。"
10016040-137 = "[s]「有這麼簡單就能治好嗎……？」"
10016040-138 = "是的！所以，治療就交給我們，#n老師請好好享受大運動會吧！"
10016040-139 = "那邊的屍體……"
10016040-140 = "不對，燙傷患者請到這邊來。"
10016040-144 = "屍，屍體？那個……總之就麻煩你們了。"
10016040-146 = "（之後，被瀬奈和芹奈推出了聯合醫療本部……）"

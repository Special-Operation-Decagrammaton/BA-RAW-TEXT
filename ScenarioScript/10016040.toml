[translation]
10016040-1 = "ตอนที่ 4;อาหารมื้อบ่ายแก่ๆ"
10016040-2 = "(หลังจากแยกกับยูกะ คุณครูก็ออกมาจากสนามกีฬาเพื่อหาอาหารมื้อเที่ยงรับประทาน)"
10016040-6 = "(คุณครูสังเกตเห็นว่ามีผู้คนมากมายมารวมตัวกันอยู่ที่จุดพักผ่อน)"
10016040-7 = "นักกีฬาทุกคนคะ ขอบคุณที่เต็มที่กับการแข่งขันกีฬาในช่วงเช้านะคะ"
10016040-8 = "คณะกรรมการจัดงานกำลังแจกเครื่องดื่มให้ฟรีอยู่ด้วย ใครที่คอแห้งก็ไปรับเครื่องดื่มได้เลยค่ะ!"
10016040-9 = "ขอบคุณสำหรับเครื่องดื่มนะคะซิสเตอร์!"
10016040-10 = "ฉะ... ฉันไม่ได้ลงแข่งกับเขาด้วยแต่ก็เชียร์จนคอแห้ง... ฉันขอเครื่องดื่มบ้างได้มั้ยคะ?"
10016040-11 = "ได้แน่นอนค่ะ นี่ค่ะ รับไปสิคะ"
10016040-12 = "ซิสเตอร์ เครื่องดื่มในกล่องนี้แจกเกือบจะหมดแล้วค่ะ"
10016040-13 = "เอ๊ะ เอ๋...? หมดแล้วเหรอคะ?"
10016040-14 = "ช่วยรอก่อนสักครู่นะคะ ฉันจะติดต่อคณะกรรมการจัดงาน แล้วขอเครื่องดื่มเพิ่ม—"
10016040-15 = "แงงง... พี่จ๋าหายไปไหนแล้ว..."
10016040-16 = "อ๊ะ... มีเด็กหลงทางในที่แบบนี้ด้วย...?"
10016040-17 = "ไม่ต้องกังวลนะคะ ฉันจะรีบไปตามหาพี่สาวให้ค่ะ รออยู่ตรงนี้แป๊บหนึ่งนะคะ"
10016040-18 = "ซิสเตอร์ ตู้ขายของอัตโนมัติที่ใกล้ที่สุดอยู่ตรงไหนเหรอคะ?"
10016040-19 = "ตู้ขายของอัตโนมัติที่ใกล้ที่สุดอยู่ที่ชั้น 1 ค่ะ แต่ว่าตอนนี้กำลังซ่อมอยู่ น่าจะต้องอ้อมไปใช้ตู้ที่อยู่ทาง#nฝั่งตะวันตกแทนก่อนค่ะ"
10016040-20 = "ถ้ายังไม่รีบมาก ไว้ฉันจัดการงานตรงนี้เสร็จแล้วฉันจะบอกทางให้—"
10016040-21 = "ซิสเตอร์ มีวิธีดีๆ ในการทำสถิติในการแข่งวิ่งผลัดในช่วงบ่ายบ้างมั้ยคะ?"
10016040-22 = "วะ... วิธีดีๆ ในการทำสถิติเหรอคะ?"
10016040-23 = "ฉันไม่ค่อยสันทัดเรื่องกีฬา น่าจะให้คำแนะนำดีๆ ไม่ค่อยได้ค่ะ... แต่หากได้พักผ่อนอย่างเพียงพอ สภาพร่างกายก็น่าจะพร้อมสำหรับการแข่งขันนะคะ"
10016040-24 = "เติมพลังด้วยเครื่องดื่มเกลือแร่เย็นๆ นี่ก่อนแล้วกันค่ะ ตอนนี้ฉันต้องช่วยเด็กหลงทาง—"
10016040-25 = "ซิสเตอร์... ความยุติธรรมคืออะไรเหรอคะ?"
10016040-26 = "คำถามประกวดมิสคิโวทอสหรือเปล่าคะเนี่ย... มันค่อนข้างยากสำหรับฉันนะคะ..."
10016040-27 = "[s] \"ดูจะงานยุ่งมากเลยนะ...\""
10016040-28 = "อ๊ะ คุณครู [USERNAME] สวัสดีค่ะ"
10016040-29 = "ขอโทษที่ไม่ได้ทักทายก่อนนะคะ ก็อย่างที่คุณครูเห็นค่ะ ตอนนี้ฉันกำลังยุ่งกับงานของคณะกรรมการ#nจัดงานอยู่..."
10016040-30 = "ไม่ทราบว่าคุณครูมีเรื่องอะไรให้ฉันช่วยหรือเปล่าคะ?"
10016040-31 = "[s] \"ไม่ต้องเป็นห่วงนะ ครูโอเคดี\""
10016040-33 = "[ns] \"แล้วนี่มารีได้กินข้าวกลางวันหรือยัง?\""
10016040-34 = "ข้าวกลางวันเหรอคะ...?"
10016040-38 = "ตายจริง เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย"
10016040-39 = "ฉันเอาแต่ช่วยคนอื่นอยู่ทางนี้ จนไม่ได้ดูเวลาเลยค่ะ..."
10016040-40 = "แต่ฉันยังมีงานที่ต้องจัดการอยู่อีกเยอะเลย น่าจะต้องอดข้าวมื้อกลางวัน ไม่ก็เอาไว้กินตอนอื่นแทนค่ะ"
10016040-41 = "[s] \"งั้นเดี๋ยวครูช่วยเอง\""
10016040-42 = "ไม่ค่ะๆ ไม่ต้องช่วยก็ได้ค่ะคุณครู"
10016040-43 = "ฉันจะรู้สึกผิดถ้าหากว่าฉันทำให้คุณครูต้องรับประทานอาหารกลางวันช้าไปด้วยน่ะค่ะ..."
10016040-44 = "คะ? ขอให้แนะนำร้านอาหารข้างทางที่มีชื่อเสียงที่สุดของแถวนี้เหรอคะ?"
10016040-45 = "ฉันว่าแต่ละคนน่าจะมีความชอบต่างกัน แต่ส่วนใหญ่แล้วฉันได้ยินมาว่าข้าวราดแกงสูตรจีนที่ขายใน#nย่านการค้าเทพเต่าดำอร่อยที่สุดเลยละค่ะ"
10016040-46 = "ร้านของย่านการค้าเทพเต่าดำอยู่ข้างหน้านี้เองค่ะ เดินหาแป๊บเดียวก็เจอแล้วค่ะ"
10016040-47 = "[s1] \"ครูไม่ค่อยรู้เส้นทางน่ะ ไปคนเดียวอาจจะหลงทางก็ได้\"\n[s2] \"อยากให้มารีช่วยนำทางให้จัง...\""
10016040-52 = "ฮุฮุ... ถ้าอย่างนั้นก็ช่วยไม่ได้นะคะ"
10016040-53 = "ถ้าอย่างนั้นเดี๋ยวฉันจะรีบจัดการงานทางนี้ให้เสร็จ แล้วจะพาคุณครูไปที่ร้านอาหารข้างทางเองค่ะ"
10016040-55 = "(...... หลังจากนั้นคุณครูและมารีก็ช่วยคนที่มาชมการแข่งขันด้วยกัน)"
10016040-57 = "ขอบคุณที่ทำงานอย่างหนักค่ะ คุณครู"
10016040-58 = "เราช่วยแก้ปัญหาของผู้เข้าชมการแข่งขันได้หมดเพราะได้คุณครูมาช่วยอีกแรงเลยค่ะ"
10016040-59 = "[s3] \"มารีก็ทำงานหนักเหมือนกันนะ ช่วยเหลือคนได้เยอะเลย\"\n[s4] \"พอคนอื่นเห็นมารี ก็คงอยากเล่าเรื่องหนักใจของตัวเองให้ฟังน่ะ\""
10016040-60 = "ก็การช่วยเพื่อนมนุษย์คืองานของซิสเตอร์นี่คะ"
10016040-61 = "ก็การรับฟังปัญหาและช่วยเพื่อนมนุษย์คืองานของซิสเตอร์นี่คะ"
10016040-62 = "ฉันว่ามันออกจะน่ายินดีเสียด้วยซ้ำค่ะ ที่คนอื่นรู้สึกสบายใจที่จะคุยและระบายความทุกข์ที่อยู่ในใจให้#nฉันฟังค่ะ"
10016040-63 = "แต่ว่า... นี่ก็เลยเวลาอาหารกลางวันมาแล้วนะคะ ฮุฮุ"
10016040-64 = "[s5] \"ทำงานหนักมาขนาดนี้ เดี๋ยวครูเลี้ยงข้าวเอง!\"\n[s6] \"มื้อนี้ครูเป็นเจ้าภาพเอง ขอข้าวราดแกงสูตรจีน 2 ที่นะ\""
10016040-65 = "อ๊ะ ไม่ต้องเลี้ยงก็ได้..."
10016040-66 = "อ๊ะ ไม่ต้องเลี้ยงก็ได้..."
10016040-67 = "เอาข้าวราดแกงสูตรจีน 2 ที่ใช่มั้ย? รับออเดอร์!"
10016040-72 = "ข้าวราดแกงสูตรจีนร้อนๆ 2 ที่มาเสิร์ฟแล้วจ้า!"
10016040-73 = "ทำไมถึงเร็วขนาดนี้...?"
10016040-74 = "แถมภาชนะกระดาษนี่ก็รูปร่างแปลกตาด้วยค่ะ"
10016040-75 = "เราจะปล่อยให้ผู้ที่มาชมการแข่งขันรอนานได้ยังไงล่ะ หัวใจของธุรกิจขายอาหารคือการทำเวลานะ!"
10016040-76 = "นอกจากนี้ยังมีลูกค้ามากมายที่อยากกินอาหารไปพร้อมกับการดูการแข่งขัน เราก็เลยใช้จานกระดาษที่#nทำขึ้นพิเศษเพื่อความสะดวกในการเดินกินไงล่ะ"
10016040-77 = "เอาละ อธิบายแค่นี้ก็พอ... รีบกินก่อนที่จะเย็นหมดเถอะ"
10016040-78 = "คนอื่นๆ ไม่นั่งกินที่โต๊ะ แต่ซื้ออาหารมันๆ แล้วเดินกินกันเหรอคะเนี่ย..."
10016040-79 = "ฮุฮุ เหมือนเป็นการทำอะไรไม่ดีเลยค่ะ แอบตื่นเต้นอยู่เหมือนกันนะคะ"
10016040-80 = "ถ้างั้นก็ จะรับประทานให้อร่อยเลยนะคะ!"
10016040-84 = "โอ๊ะ อร่อยมากเลยค่ะ"
10016040-85 = "กลิ่นหอมของเครื่องเทศต่างชาติที่ฉันไม่เคยลองกินมาก่อนมันเตะจมูกมากเลย..."
10016040-86 = "ฉันไม่รู้ว่าพูดแบบนี้ได้หรือเปล่า แต่รสชาติที่ปลุกเร้านี่มัน..."
10016040-87 = "ใช่มั้ยล่ะ? ก็นี่น่ะ เป็นเมนูใหม่ที่เราใส่ซอสสูตรลับที่พวกเราคิดค้นขึ้นใหม่ไงล่ะ!"
10016040-88 = "รสชาติอร่อยขนาดนี้ แต่พอจบการแข่งขันทำอาหารเมื่อกี้ ประธานรูมิก็บอกว่ามีจุดที่ต้องปรับปรุงแล้วก็#nกลับไปดื้อๆ เลย..."
10016040-89 = "จะไปสนใจคำพูดของนักเรียนเกเฮนน่าขนาดนั้นทำไมก็ไม่รู้"
10016040-90 = "[s] \"คือว่า.. ขอสั่งเพิ่มอีกที่ได้มั้ย?\""
10016040-91 = "ได้สิ รอเดี๋ยวนะ"
10016040-95 = "อ๊ะ... ร้อนๆๆ"
10016040-97 = "ปะ... เป็นอะไรมั้ยคะ?"
10016040-98 = "ไม่เป็นไรหรอก แค่โดนน้ำมันลวกเหมือนทุกครั้งน่ะ โอ๊ย..."
10016040-99 = "ไม่เป็นไรที่ไหนคะ! อย่ามองว่าแผลน้ำมันลวกเป็นเรื่องเล็กสิคะ! ต้องรีบรักษา..."
10016040-100 = "แต่ประธานรูมิก็ไม่อยู่ ฉันทิ้งร้านไปไม่ได้หรอก..."
10016040-101 = "ฉันจะอยู่ที่ร้านและอธิบายเรื่องที่เกิดขึ้นให้ลูกค้าฟังเองค่ะ คุณพนักงานขายไปหน่วยพยาบาลสัมพันธ์#nกับคุณครูเถอะค่ะ"
10016040-102 = "[s7] \"ถ้าไม่รักษาดีๆ เดี๋ยวเป็นแผลเป็นเอานะ\"\n[s8] \"เดี๋ยวจะพาไปที่หน่วยพยาบาลสัมพันธ์ให้เอง\""
10016040-103 = "อืม... ลูกค้าก็ไม่ค่อยจะมีแล้วด้วย แวะไปสักพักก็น่าจะได้เนอะ"
10016040-104 = "อืม... ลูกค้าก็ไม่ค่อยจะมีแล้วด้วย แวะไปสักพักก็น่าจะได้เนอะ"
10016040-105 = "ถ้างั้นก็ขอฝากร้านสักแป๊บหนึ่งนะ"
10016040-106 = "ค่ะ รีบไปเถอะค่ะ!"
10016040-109 = "มีผู้ได้รับบาดเจ็บจากการแข่งขันเมื่อกี้หลายคนเลย..."
10016040-110 = "คุณเซนะ ถ้าเป็นผู้ป่วยแผลถลอกเล็กๆ รบกวนคุณเซนะช่วยฆ่าเชื้อให้ก่อนนะคะ ส่วนผู้ป่วยที่ต้องรักษา#nเพิ่มเติม ฉันจะย้ายไปที่เตียงชั่วคราวให้เองค่ะ"
10016040-111 = "ได้ค่ะ ฉันจะไปเอาผ้าก๊อซฆ่าเชื้อจากกล่องยามาเพิ่มก่อนค่ะ"
10016040-112 = "[s] \"ทางนี้ก็งานยุ่งกันน่าดูเลยนะ\""
10016040-113 = "เอ๋ คุณครู? มีธุระอะไรที่หน่วยพยาบาลสัมพันธ์เหรอคะ?"
10016040-114 = "หรือว่าบาดเจ็บตรงไหนมาหรือเปล่าคะ?"
10016040-115 = "[s] \"คนที่บาดเจ็บอยู่ทางนี้น่ะ\""
10016040-116 = "ฉันทอดอาหารจนโดนน้ำมันลวกน่ะ... กำลังยุ่งกันอยู่แท้ๆ เชียว ขอโทษด้วยนะ"
10016040-117 = "ไม่หรอกค่ะ! ถ้าไม่รีบรักษาแผลลวก ก็อาจจะเกิดแผลเป็นได้นะคะ"
10016040-118 = "โดยเฉพาะน้ำมันร้อนๆ จะเกาะติดกับผิวหนังได้ง่าย มันจะทำให้เกิดแผลลึกได้ค่ะ"
10016040-119 = "คุณเซนะ ถ้าไม่ติดอะไร ช่วยเตรียมผ้าปิดแผลเพิ่มให้ด้วยได้มั้ยคะ?"
10016040-120 = "ได้ค่ะ แต่รอสักครู่นะคะ ฉันกำลังตัดเฝือกให้คนไข้ที่กระดูกแตกมาอยู่ค่ะ..."
10016040-121 = "ถ้าจัดการตรงนี้เสร็จ ฉันจะรีบไปเอามาให้นะคะ"
10016040-122 = "[s9] \"ถ้างานยุ่งกันมาก ให้ครูช่วยแทนมั้ย?\"\n[s10] \"ให้ครูช่วยจัดยาของหน่วยพยาบาลให้มั้ย...\""
10016040-126 = "ไม่ได้นะคะ!"
10016040-127 = "คะ... คุณครูจะเข้าไปในหน่วยพยาบาลไม่ได้นะคะ!"
10016040-128 = "[s] \"มีเรื่องอะไรในหน่วยพยาบาลเหรอ?\""
10016040-129 = "เรื่องนั้นน่ะ... คือว่า..."
10016040-130 = "ตอนนี้เรากำลังรักษาผู้ป่วยหนักที่ถูกยิงมาจนได้รับบาดเจ็บสาหัสอยู่ในหน่วยพยาบาลค่ะ"
10016040-131 = "คนทั่วไปอย่างคุณครูอาจตกใจกับบาดแผลสาหัสจนทนดูไม่ได้ ฉันเลยไม่แนะนำให้เข้าไปในนั้นค่ะ"
10016040-132 = "ใช่ค่ะ เป็นแผลใหญ่น่ากลัวที่คนทั่วไปเห็นแล้วต้องนอนไม่หลับเลยละค่ะ!"
10016040-133 = "[s11] \"นั่นมันเรื่องใหญ่เลยนะ...\"\n[s12] \"แบบนี้ยิ่งต้องเข้าไปช่วยไม่ใช่เหรอ?\""
10016040-134 = "ถะ... ถึงจะเป็นแผลสาหัส... แต่พวกฉันก็ใช้วิชาชีพรักษากันได้ไม่ยากมากค่ะ"
10016040-135 = "ถะ... ถึงจะเป็นแผลสาหัส... แต่พวกฉันก็ใช้วิชาชีพรักษากันได้ไม่ยากมากค่ะ"

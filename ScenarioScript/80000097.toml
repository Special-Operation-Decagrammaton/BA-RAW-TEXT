[translation]
80000097-1 = "Sakurako's Limited"
80000097-3 = "...Over here, Sensei."
80000097-4 = "Thank you for coming. I'm sorry to make you come out this late on my behalf..."
80000097-5 = "...Hm?"
80000097-6 = "Oh, please don't misunderstand. There's no issue or threat."
80000097-7 = "I-It's just... Well..."
80000097-13 = "I called you out here...because of this..."
80000097-14 = "[s1] \"...Chocolate?\"\n[s2] \"Ahhh. Now I see...\""
80000097-17 = "Yes, I know. I'm quite a few days late."
80000097-18 = "Naturally, I suspect you must have already received countless sweets or that you may not have much interest in a holiday like this one..."
80000097-19 = "I considered a number of different possibilities. That said..."
80000097-20 = "Still, I decided that for once, I won't overthink things. I'll just follow my heart."
80000097-21 = "I apologize if all of this is unnecessary... But I had hoped you would understand."
80000097-22 = "[s3] \"Of course I do. Thank you.\"\n[s4] \"I know you're busy, Sakurako. So thank you for taking the time.\""
80000097-25 = "I-I see... I'm really relieved to hear you say that."
80000097-26 = "Th-There's.... One more thing..."
80000097-27 = "[s5] \"...Hm? And that is?\"\n[s6] \"What is it? Is something on your mind?\""
80000097-30 = "Well... You see... I..."
80000097-31 = "For once, I didn't turn to anyone else or comb the internet for advice."
80000097-32 = "I purposefully avoided popular trends like Alien Glasses or the Choco Time Dance..."
80000097-33 = "[s7] \"(Alien glasses? The Choco Time what?)\"\n[s8] \"(...What even are those?)\""
80000097-36 = "So..."
80000097-37 = "What I just gave you may not be too trendy..."
80000097-38 = "Quite the opposite honestly..."
80000097-39 = "...I'm truly sorry."
80000097-43 = "[ns] \"Sakurako.\""
80000097-45 = "[ns9] \"That's perfect! That's exactly the mindset you should have!\"\n[ns10] \"Don't do what others say! Trust in what your feelings have to say!\""
80000097-48 = "H-Huh? Uh... Sensei?"
80000097-49 = "I-I didn't expect you to react so strongly! I-Is something wrong? I just want to make sure I follow..."
80000097-50 = "Wh-What do you mean? I wasn't expecting this kind of reaction... U-Uh...? "
80000097-52 = "...Ahem."
80000097-53 = "A-Anyway. I think I understand what you're saying..."
80000097-54 = "But..."
80000097-55 = "[s11] \"...But?\"\n[s12] \"...Hm?\""
80000097-60 = "Yes, but..."
80000097-61 = "Hm..."
80000097-62 = "I'm sorry, Sensei. I... Even if it's you saying that..."
80000097-63 = "Doing what I want just means I'll only end up doing..."
80000097-64 = "..."
80000097-65 = "Sen...Se..."
80000097-66 = "...i... related...things..."

[translation]
80000097-1 = "สิ่งพิเศษเฉพาะของซากุระโกะ"
80000097-3 = "ทางนี้ค่ะ คุณครู"
80000097-4 = "ขอบคุณที่มานะคะ ดึกขนาดนี้แต่ฉันก็ยังขอให้คุณครูออกมา..."
80000097-5 = "คะ...?"
80000097-6 = "อ่า ไม่ได้มีเรื่องไม่ดี หรือว่ามีปัญหาอะไรหรอกค่ะ ได้โปรดอย่าเข้าใจผิดนะคะ"
80000097-7 = "ก็แค่... คือว่า..."
80000097-13 = "นี่ค่ะ... คือว่า..."
80000097-14 = "[s1] \"ช็อกโกแลต...?\"\n[s2] \"อ้อ พอนึกดูแล้ววันนี้...\""
80000097-17 = "ค่ะ ฉันทราบดีค่ะว่าอาจจะช้าไปสักหน่อย"
80000097-18 = "คุณครูอาจจะได้รับช็อกโกแลตมาเยอะแล้ว และอาจจะไม่สนใจวันแบบนี้เท่าไหร่นัก..."
80000097-19 = "ฉันเองก็ลองคิดถึงความเป็นไปได้ในทางต่างๆ เอาไว้เหมือนกันค่ะ"
80000097-20 = "แต่ว่าครั้งนี้ ฉันตัดสินใจว่าจะเลิกคิดอย่างอื่น แล้วทำตามสัญชาติญาณของตัวเองค่ะ"
80000097-21 = "แต่ถ้ามันดูมากเกินไปก็ขออภัยด้วยค่ะ... หวังว่าคุณครูจะเข้าใจฉันนะคะ"
80000097-22 = "[s3] \"จะเป็นแบบนั้นได้ยังไง ขอบคุณนะ\"\n[s4] \"ซากุระโกะเองก็คงยุ่งมากแท้ๆ ขอบคุณที่เตรียมมาให้ครูนะ\""
80000097-25 = "ยะ... อย่างนั้นเหรอคะ คุณครูอุตส่าห์พูดขนาดนี้ ฉันรู้สึกโล่งอกจริงๆ เลยค่ะ"
80000097-26 = "ตะ... แต่ว่ามีเรื่องหนึ่ง..."
80000097-27 = "[s5] \"หืม...? เรื่องหนึ่ง?\"\n[s6] \"มีอะไรเหรอ? มีอะไรอยากพูดรึเปล่า...?\""
80000097-30 = "คือว่า... เรื่องนั้นน่ะค่ะ... คือ..."
80000097-31 = "คือว่าวันวาเลนไทน์ครั้งนี้ ฉันรู้สึกไม่อยากถามคนอื่น แล้วก็ไม่อยากหาข้อมูลในอินเทอร์เน็ต..."
80000097-32 = "และไม่สนใจของยอดฮิตในตอนนี้อย่าง <แว่นมนุษย์ต่างดาว> หรือ <ช็อกโก้ ไทม์ แดนซ์> แล้ว..."
80000097-33 = "[s7] (แว่นมนุษย์ต่างดาว...? ช็อกโก้ ไทม์ แดนซ์...?)\n[s8] (พูดถึงเรื่องอะไรนะ...?)"
80000097-36 = "เพราะงั้น..."
80000097-37 = "ของที่ให้คุณครูไป มันก็อาจจะล้าหลัง..."
80000097-38 = "ไม่ใช่ของที่เป็นที่นิยมหรือของที่คนอื่นฮิตกัน..."
80000097-39 = "ต้องขออภัยในเรื่องนั้นด้วยนะคะ..."
80000097-43 = "[ns] \"ซากุระโกะ...\""
80000097-45 = "[ns9] \"แบบนั้นแหละ! ต่อไปก็คิดแบบนั้นไปเรื่อยๆ เลยนะ!\"\n[ns10] \"เลิกสนใจคนอื่น แล้วฟังเสียงในใจตัวเองกันเถอะ!\""
80000097-48 = "คะ... คะ? เอ่อ...? อะไรนะคะ คุณครู?"
80000097-49 = "ทำไมจู่ๆ ถึงตอบโต้รุนแรงแบบนั้นล่ะคะ...!? มะ... มีอะไรผิดไปงั้นเหรอคะ? มะ...ไม่นะ เรื่องที่บอกไป#nเมื่อก่อนหน้านี้ มันไม่ใช่อย่างนั้นนะคะ...!? "
80000097-50 = "ทะ... ทำไมถึง... แสดงท่าทางแบบนั้น...!? อะ... เอ๋... เอ๋~~~??? "
80000097-52 = "ฮึ่ม..."
80000097-53 = "ยะ... ยังไงก็เถอะค่ะ ฉันเข้าใจ...แล้วค่ะ..."
80000097-54 = "แต่..."
80000097-55 = "[s11] \"แต่...?\"\n[s12] \"หืม...?\""
80000097-60 = "ค่ะ ก็ใช่..."
80000097-61 = "อืม..."
80000097-62 = "ขอบคุณค่ะ คุณครู คือ... ถึงจะเป็นคำพูดของคุณครู..."
80000097-63 = "การที่ฉันทำตามที่ใจเรียกร้องอย่างซื่อตรงแบบนี้... คือมัน..."
80000097-64 = "......"
80000097-65 = "คุณ... คะ...ครู..."
80000097-66 = "ก็มีแค่เฉพาะเรื่องของคุณครูเท่านั้นแหละค่ะ"

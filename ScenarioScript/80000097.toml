[translation]
80000097-1 = "櫻子限定版"
80000097-3 = "……我在這邊，老師。"
80000097-4 = "非常感謝您這麼晚還願意赴約……"
80000097-5 = "……嗯？"
80000097-6 = "啊啊，並非有什麼壞事……或者問題發生，還請您別誤會。"
80000097-7 = "只，只是……因為……"
80000097-13 = "……希望……能將這個……"
80000097-14 = "[s1]「……巧克力？」\n[s2]「啊啊，這麼說來……」"
80000097-17 = "是，我也清楚現在交給您或許為時已晚。"
80000097-18 = "老師可能已經收到非常多這樣的東西，或者也可能不太過這種節日……"
80000097-19 = "其實我的心裡，已經閃過無數諸如此類的可能性。"
80000097-20 = "不過這次，比起其他想法，我更希望能跟隨自己的意志。"
80000097-21 = "如果讓您感到多此一舉，我在此向您致歉……還請老師寬容大量。"
80000097-22 = "[s3]「怎麼會呢，真的很謝謝你。」\n[s4]「櫻子應該很忙吧，謝謝你還能想到我。」"
80000097-25 = "是，是嗎……#n您的這番話，真是讓人感到如釋重負。"
80000097-26 = "不過那個……我還有一件事……"
80000097-27 = "[s5]「……嗯？是什麼事呢？」\n[s6]「怎麼了？有什麼煩惱嗎……？」"
80000097-30 = "那個……其實是……我……"
80000097-31 = "由於這次的事，我實在不想告訴任何人，或者在網路上進行查詢……"
80000097-32 = "因此我刻意避開了「外星人眼鏡」和「巧克力時光舞蹈」之類的最新流行……"
80000097-33 = "[s7]（外星人眼鏡……？巧克力時光舞蹈……？）\n[s8]（……那些都是什麼東西？）"
80000097-36 = "所以……"
80000097-37 = "這次送給您的東西……或許會與流行和潮流……"
80000097-38 = "顯得相去甚遠……也說不定……"
80000097-39 = "……非常抱歉。"
80000097-43 = "[ns]「……櫻子。」"
80000097-45 = "[ns9]「這樣很好！以後可以多多維持這種想法！」\n[ns10]「不必一味聽從別人的話，多遵從自己內心的聲音！」"
80000097-48 = "咦，咦咦？老師？"
80000097-49 = "您，您的反應為何突然如此激烈……！？#n是，是我做錯了什麼嗎？不，不對，我剛才說了什麼奇怪的話嗎……！？"
80000097-50 = "為，為什麼……會是那種反應……！？#n真，真奇怪……咦咦咦……？？？"
80000097-52 = "……咳哼。"
80000097-53 = "總，總之……您剛才說的那番話……我明白了……"
80000097-54 = "……不過……"
80000097-55 = "[s11]「……不過？」\n[s12]「……嗯？」"
80000097-60 = "……不過……"
80000097-61 = "嗯……"
80000097-62 = "非常抱歉，老師。#n那個……就算老師您這麼說……"
80000097-63 = "完全遵從自己內心的事……果然還是……"
80000097-64 = "…………"
80000097-65 = "……僅……僅限於……"
80000097-66 = "……跟老師……有關的事……就夠了。"

[translation]
34150-1 = "第15話;殘留之物"
34150-3 = "[ns1] 「彌香……快住手！！」\n[ns2] 「現在不是做這種事的時候……！」"
34150-4 = "……抱歉，老師。我本來就是不聽話的「壞孩子」對吧？"
34150-5 = "……抱歉，老師。我本來就是不聽話的「壞孩子」對吧？"
34150-6 = "雖然我大概知道老師現在的狀況……不過我無法聽從呢"
34150-7 = "我都已經背叛老師這麼多次了……事到如今就算再多個1次2次也沒什麼差別了吧，嗯。"
34150-11 = "……"
34150-12 = "該怎麼做？"
34150-13 = "老，老師……"
34150-17 = "[ns3] 「總之，先壓制彌香吧。」\n[ns4] 「總之，先教訓彌香吧。」"
34150-20 = "太好了。我正好也有點不爽。"
34150-22 = "咦？看你們這個樣子，接下來是我要被教訓的環節嗎？"
34150-23 = "真是的，惹人厭的角色總是只能被欺負呢。"

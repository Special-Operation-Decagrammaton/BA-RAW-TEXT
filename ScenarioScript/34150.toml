[translation]
34150-1 = "第15話;残されたもの"
34150-3 = "[ns1] \"ミカ……やめて！！\"\n[ns2] \"今はこうしてる場合じゃ……！\""
34150-4 = "……ごめんね先生。私、元々言うことを聞かない「悪い子」だったでしょう？"
34150-5 = "……ごめんね先生。私、元々言うことを聞かない「悪い子」だったでしょう？"
34150-6 = "先生が今どういう状況なのかは大体分かるけど……その言葉には従えないの。"
34150-7 = "私は何度も先生を裏切ってきたし……それが1回や2回増えたからって、いまさら変わることもないし、うん。"
34150-11 = "……。"
34150-12 = "どうする？"
34150-13 = "せ、先生……。"
34150-17 = "[ns3] \"とりあえず、ミカを制圧しよう。\"\n[ns4] \"とりあえず、ミカにお灸を据えよう。\""
34150-20 = "よかった。ちょっとムカついてきたところだったから。"
34150-22 = "あれ？これって私が怒られる流れ？"
34150-23 = "本当、嫌われ役って損するばっかりなんだから。"

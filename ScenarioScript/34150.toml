[translation]
34150-1 = "ตอนที่ 15;สิ่งที่เหลืออยู่"
34150-3 = "[ns1] \"มิกะ...... พอได้แล้ว!!\"\n[ns2] \"นี่ไม่ใช่เวลามาทำอย่างนี้นะ!\""
34150-4 = "ขอโทษนะคุณครู แต่ฉันเป็นเด็กเกเรที่ไม่ยอมเชื่อฟังตั้งแต่แรกแล้วนี่"
34150-5 = "ขอโทษนะคุณครู แต่ฉันเป็นเด็กเกเรที่ไม่ยอมเชื่อฟังตั้งแต่แรกแล้วนี่"
34150-6 = "ฉันก็พอจะรู้อยู่ว่าตอนนี้คุณครูอยู่ในสถานการณ์แบบไหน... แต่ฉันเชื่อฟังไม่ได้หรอก"
34150-7 = "ฉันทรยศต่อความเชื่อใจของคุณครูมาหลายครั้งแล้ว... จะให้ทำเพิ่มอีกครั้งสองครั้งก็คงไม่มีอะไร#nเปลี่ยนแปลงไปนักหรอก"
34150-11 = "...... "
34150-12 = "ทำยังไงดี? เราต้องหนีกันอีกแล้วเหรอ?"
34150-13 = "คะ... คุณครูคะ..."
34150-17 = "[ns3] \"คุมตัวมิกะก่อน\"\n[ns4] \"ทำให้มิกะหมดกำลังก่อน\""
34150-20 = "ดีเลย... กำลังหัวร้อนพอดี"
34150-22 = "เอ๋...? นี่ฉันต้องถูกลงโทษเหรอ...?"
34150-23 = "บทของตัวร้ายที่ถูกเกลียดมีแต่เสียกับเสียสินะ"

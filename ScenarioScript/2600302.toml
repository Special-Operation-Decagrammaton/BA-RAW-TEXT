[translation]
2600302-1 = "#title;트리니티의 천사"
2600302-2 = "#na;(하루 종일 일했더니 온몸이 쑤셔와 기분전환도 할 겸 바깥공기를 쐬러 공원에 나왔다.)"
2600302-3 = "#na;(확 트인 밖으로 나오니, 덩달아 시원한 사과 주스가 마시고 싶어 졌다.)"
2600302-4 = "3;세리나;03;아, 선생님! 안녕하세요. 이런 데에서 다 뵙네요.\n#3;greeting\n#3;em;[반짝]\n#3;a"
2600302-5 = "3;세리나;01;기분전환 겸 산책이라도 나오신 건가요? 좋네요! 역시 자기 몸은 스스로 챙기셔야죠!"
2600302-6 = "3;세리나;02;네? 저는 뭐 하고 있었냐고요? 아, 저는 그냥……\n#3;em;[?]"
2600302-7 = "#na;아이들;누나 고마워!"
2600302-8 = "#na;아이들;언니 고마워!"
2600302-9 = "3;세리나;03;아, 아하하…… 별 거 아니에요. 그냥 아이들이 좀 곤란해하고 있길래 도와줬을 뿐이에요.\n#3;stiff\n#3;em;[재잘]"
2600302-10 = "#na;아이들;언니가 나무에 걸린 풍선 찾아줬어!"
2600302-11 = "#na;아이들;공 차다 다친 것도 치료해줬어요! 누나 최고!!"
2600302-12 = "3;세리나;04;……으음. 좀 부끄럽네요. 정말 별 거 아닌데……\n#3;em;[///]"
2600302-13 = "3;세리나;02;자상하다고요? 아니에요. 이 정도는 다들 하는 걸요. 명색이 구호기사단이기도 하고."
2600302-14 = "3;세리나;99;게다가 곤란에 처해 있던 사람들이 기뻐하는 얼굴을 보면……"
2600302-15 = "3;세리나;03;……저도 괜히 기분이 좋거든요.\n#3;em;[반짝]"
2600302-16 = "3;세리나;01;후훗. 뭐랄까 설명이 잘 안 되네요. 그냥 천성이 그런 거라고 생각해주세요."
2600302-17 = "3;세리나;02;그러시는 선생님이야말로 최근 많이 피곤하신 거 같은데…… 괜찮으세요?\n#3;em;[?]"
2600302-18 = "3;세리나;05;똑같이 별 거 아니라고요? 우우…… 제 앞에서 그런 말은 안 통해요!\n#3;shake"
2600302-19 = "3;세리나;06;다 알고 있다고요. 매일 밤 늦게까지 일하시고, 끼니도 대충 간식거리로 때우시고,\n#3;em;[반응]"
2600302-20 = "3;세리나;06;다른 사람들 챙기느라 위험한 상황에도 곧잘 처하시고…… 그러다 정말 큰일 나요!\n#3;hophop"
2600302-21 = "3;세리나;05;제가 항상 구호물품을 들고 다니긴 하지만, 이런 건 사실 쓸 일 없는 편이 더 좋잖아요?"
2600302-22 = "3;세리나;02;……아.\n#3;em;…"
2600302-23 = "3;세리나;04;죄송해요. 저도 모르게 그만…… 선생님께 잔소리 같은 말을……\n#3;em;[땀]\n#3;stiff"
2600302-24 = "3;세리나;99;그러고 보니 지금까지 막상 선생님은 별로 챙겨드리지 못했던 거 같아요, 부끄럽게도."
2600302-25 = "3;세리나;01;아무래도 어른이시다 보니, 오히려 그런 부분에서 소홀해져 버린 걸지도……"
2600302-26 = "3;세리나;04;뭔가 반성해야 할 거 같은 기분이 드네요.\n#3;em;…"
2600302-27 = "[s1] \"괜찮아. 어른이니까.\"\n[s2] \"세리나는 다른 아이들도 챙겨야 하니 바쁘지.\""
2600302-28 = "3;세리나;04;우우…… 어른이라서 괜찮은 건 아니라고 방금 말씀드렸는데!\n#3;stiff"
2600302-29 = "3;세리나;04;이해해주시는 건가요? 우우…… 그래도……\n#3;stiff"
2600302-30 = "3;세리나;99\n#3;em;…\n#wait;2500"
2600302-31 = "3;세리나;01;……그 대신이라기엔 뭐하지만, 이거라도 드릴까요? 사과 주스인데.\n#3;greeting"
2600302-32 = "3;세리나;03;아, 마침 드시고 싶으셨던 거였다고요? 잘 됐다! 마침 딱이었네요!\n#3;hophop\n#3;em;[반짝]"
2600302-33 = "3;세리나;01;기뻐하시는 거 같아서 괜히 저도 더 기분이 좋아요, 정말로."
2600302-34 = "3;세리나;03;……헤헤.\n#3;em;[재잘]"
2600302-35 = "3;세리나;01;그럼 남은 일도 파이팅하시고! 그렇다고 너무 무리하신 마시고!\n#3;greeting"
2600302-36 = "3;세리나;03;어쩔 수 없다 싶으실 땐 언제든 저를 불러주세요, 선생님!\n#3;em;[반짝]"
2600302-37 = "3;세리나;01;곧장 선생님을 찾아갈 테니까요!"
2600302-38 = "[s] \"응. 고마워.\""
2600302-39 = "3;세리나;99;……후훗."
2600302-40 = "3;세리나;01;지금 약속하신 거예요."
2600302-41 = "3;세리나;03;그럼 그렇게 알고 있을 게요! 언제든 찾아주세요!\n#3;closeup\n#3;em;[반짝]"

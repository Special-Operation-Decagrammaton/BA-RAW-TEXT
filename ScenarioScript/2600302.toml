[translation]
2600302-1 = "三一的天使"
2600302-2 = "（因為工作了一整天而全身痠痛，為了轉換心情和呼吸新鮮空氣來到了公園）"
2600302-3 = "（總覺得突然很想喝蘋果汁……）"
2600302-4 = "啊，老師！你好呀，居然會在這裡遇到，真巧呢。"
2600302-5 = "是為了轉換心情出來散步嗎？我覺得這對健康是好事哦！"
2600302-6 = "咦？我在做什麼嗎？我在，那個……"
2600302-7 = "謝謝大姊姊！"
2600302-8 = "謝謝──！"
2600302-9 = "嗯，不客氣喔。……啊，其實也沒在做什麼特別了不起的事。只是這些孩子遇到了一些麻煩，所以就稍微幫了他們一下而已……"
2600302-10 = "大姊姊他幫我把卡在樹上的氣球拿下來了哦！"
2600302-11 = "還有在玩球時受的傷也幫我處理好了！謝謝大姊姊！！"
2600302-12 = "不用客氣的，真的沒什麼……聽你們這麼說都有點害羞了呢。"
2600302-13 = "你說我很溫柔……是嗎？不不，這很正常的唷。別看我這樣，我也是救護騎士團的一員喔。"
2600302-14 = "而且……"
2600302-15 = "看到有困難的人露出開心的樣子，果然是件令人開心的事呢。"
2600302-16 = "雖然這麼說有點老套，但或許我本來就是這種個性吧。"
2600302-17 = "話說回來，老師看起來好像很累呢……你沒事吧？"
2600302-18 = "你說沒什麼……老師，這種話對我可是行不通的唷？"
2600302-19 = "因為我全都知道的，每天晚上都工作到很晚，吃飯也都隨便吃……"
2600302-20 = "不只如此，還為了幫助別人跑到危險的地方……雖然最後一件是好事，但這樣下去身體遲早會撐不住的唷？"
2600302-21 = "雖然我們隨時都做好了救護的準備，但其實不需要我們出場才是最好的。"
2600302-22 = "……啊。"
2600302-23 = "對，對不起……不小心就對老師嘮叨了起來……"
2600302-24 = "……但是仔細想想，至今都沒有好好在意老師的生活和關心老師的健康。"
2600302-25 = "是因為老師已經是大人，所以才不自覺的疏忽掉了嗎……"
2600302-26 = "對不起，我會好好反省的。"
2600302-27 = "[s1] 「沒問題的唷，畢竟我是大人嘛。」\n[s2] 「每個人都要關心的話，很辛苦呢。」"
2600302-28 = "唔……才沒有因為是大人就沒關係這種事！"
2600302-29 = "是啊，謝謝老師……不過，還是很抱歉。"
2600302-31 = "……雖然不算是當作補償，但是這個給老師怎麼樣呀？是蘋果汁唷。"
2600302-32 = "咦？你說剛好想喝？那真是太好了！"
2600302-33 = "能讓老師開心的話，我也很開心。"
2600302-34 = "……嘿嘿。"
2600302-35 = "那麼接下來也請加油哦！不過也不要太勉強，剛剛好就好！"
2600302-36 = "那怕是有一點點覺得辛苦的時候，請隨時跟我說。"
2600302-37 = "我會立刻趕往老師身邊的！"
2600302-38 = "[s] 「嗯，謝啦。」"
2600302-39 = "……呵呵。"
2600302-40 = "約好了唷？"
2600302-41 = "隨時都歡迎叫我喔！"

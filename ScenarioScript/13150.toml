[translation]
13150-1 = "第15話;副學生會長的命令"
13150-7 = "吶，星野醬。"
13150-8 = "我啊……#n在第一次見到星野醬的時候，我還懷疑是不是在做夢，捏了自己的臉頰好幾次。"
13150-9 = "能有像星野醬這樣可愛又厲害的後輩陪在我身邊，實在太開心了……"
13150-10 = "唔嗯……因為我是笨蛋，所以也說不太清楚……"
13150-11 = "不過能和星野醬待在一起，對我來說就像奇蹟一樣……"
13150-13 = "……不是每天都會見面嗎。"
13150-14 = "不管是昨天、今天還是明天。#n這麼理所當然的事有什麼好大驚小怪的。"
13150-15 = "哈嗚……可是……"
13150-16 = "「奇蹟」應該是更厲害、更難得的東西才對。"
13150-17 = "……不，星野醬。"
13150-18 = "我不這麼認為。"
13150-22 = "雖然我是笨蛋……但這點我很確定。"
13150-23 = "吶，星野醬。如果哪天星野醬也有了可愛的後輩的話，到時候──"
13150-24 = "每天都能見到你……無論今天、明天還是未來都能和你在一起……"
13150-25 = "這些單純而微不足道的小事才是真正的奇蹟……星野醬以後也會明白的。"
13150-27 = "在這種學校居然還能有後輩……確實是奇蹟呢。#n畢竟所有人都在不斷離開自治區。"
13150-28 = "會有人想入學嗎？"
13150-29 = "嗚嗚，不是這樣啦，星野醬。#n日常才是……"
13150-30 = "是是是。既然前輩那麼想，就當成是那樣吧。"
13150-31 = "嗯，所以星野醬。#n如果真的發生奇蹟……星野醬有了後輩的話…… "
13150-32 = "星野醬一定要保護他們哦，知道了嗎？"
13150-33 = "這個嘛……我會努力。"
13150-45 = "咳咳，咳咳……#n唔……腳都軟了……"
13150-46 = "明明已經拿出了全力……"
13150-47 = "居然還毫髮無傷……？怎麼可能……"
13150-51 = "……抱歉，綾音醬、茜香醬。"
13150-52 = "對上3架戰鬥直升機，我也沒辦法手下留情了……"
13150-53 = "……綾音醬說的對，這樣的確跟以前沒兩樣呢。對不起。"
13150-54 = "另外，可以替我向老師說聲抱歉嗎？#n說大叔我又做了蠢事……"
13150-55 = "要恨我也沒關係。"
13150-58 = "……"
13150-59 = "……"
13150-62 = "……綾音醬、茜香醬。#n你們才是阿拜多斯的未來。"
13150-63 = "你們是出於對阿拜多斯的擔心才來到這裡的。"
13150-64 = "所以我必須守護你們的未來──後輩必須由前輩來保護。"
13150-70 = "……"
13150-71 = "……但是這也太過分了吧！#n這樣不就得承認那個學生會長是假冒的嗎？"
13150-72 = "而且還是由前輩親自……"
13150-74 = "沒關係的，茜香醬。#n其實那也是很自然的事。"
13150-75 = "我總有一天會畢業，到時候就該由你們來撐起這所學校了。"
13150-76 = "前輩保護後輩，為後輩開創未來──#n後輩則超越前輩往前邁進，這是理所當然的。"
13150-79 = "你們對策委員會，必須走向阿拜多斯嶄新的未來。"
13150-80 = "只要列車砲消失……#n不管是盯上阿拜多斯的傢伙、之前學生會的過錯，還是自治區企業的陰謀……#n一切都能得到解決。"
13150-81 = "相信在此之後，你們一定能做得更好。"
13150-84 = "野乃美醬、白子醬、茜香醬、綾音醬……大家一定能做到的。"
13150-85 = "夢前輩的「阿拜多斯學生會」就這麼消失也沒關係。#n對策委員會將會和老師一起通往嶄新的未來。"
13150-91 = "就這樣走向未來……走向光明吧。"
13150-92 = "這是現在已經不在的──阿拜多斯最後一位學生會長的意志……"
13150-94 = "同時也是[ruby= ・     ・ ]副學[/ruby][ruby= ・     ・     ・ ]生會長[/ruby]小鳥遊星野的命令。"
13150-103 = "大家還好嗎？"
13150-105 = "白子前輩……"
13150-106 = "我才想問你呢……前輩明明傷得最重。"
13150-108 = "嗯。星野前輩他……走掉了嗎？"
13150-109 = "……是。#n憑我的力量……沒辦法阻止他……"
13150-110 = "嗯……力量不足。"
13150-111 = "現，現在該怎麼辦，白子前輩……？"
13150-112 = "我也不知道……"
13150-114 = "前輩的那個樣子……我好像還是第一次看到……"
13150-115 = "總覺得……該怎麼說呢……"
13150-117 = "……"
13150-130 = "這麼說來，夢學生會長的契約……"
13150-132 = "嗯？"
13150-137 = "今天……是簽約後過了2年的日子。"
13150-138 = "也就是說……"
13150-140 = "夢學生會長的失蹤，就發生在2年前的今天……"
13150-156 = "……好，去救野乃美醬吧。"
13150-158 = "這次……"
13150-161 = "一定要完成2年前沒能做到的事。"
13150-163 = "下一話;反擊"

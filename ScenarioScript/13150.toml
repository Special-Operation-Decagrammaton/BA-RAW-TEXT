[translation]
13150-1 = "Episode 15;The Student Council Vice President's Orders"
13150-7 = "You know, Hoshino..."
13150-8 = "You know, I had to pinch my cheek to make sure I wasn't dreaming when we first met."
13150-9 = "I couldn't have been more thankful to have an underclassman that was so cute and reliable by my side. "
13150-10 = "I've never had a way with words, but if I had to explain it..."
13150-11 = "...I would say that being able to spend time with you like this feels like a miracle."
13150-13 = "But we see each other every day.  "
13150-14 = "I saw you yesterday, I saw you today, and I'll see you tomorrow too. What's the big deal?"
13150-15 = "I know that, but..."
13150-16 = "Miracles are supposed to be incredible and rare, aren't they?"
13150-17 = "Well...no. Not always, Hoshino."
13150-18 = "That's what I believe."
13150-22 = "There are a lot of things about life I don't understand, but this I'm sure of."
13150-23 = "One day, Hoshino, you're going to have cute underclassmen of your own. And when you do..."
13150-24 = "Being able to see their faces every day...make memories together today, tomorrow, and the day after that... "
13150-25 = "You'll find that those simple, seemingly insignificant everyday moments are the true miracles."
13150-27 = "Having underclassmen in a school like this...that'd be the real miracle. Especially considering how everyone's leaving the district."
13150-28 = "I mean, are we even gonna have new students?"
13150-29 = "Hm... That's not what I meant, Hoshino! I'm trying to say that everyday life... "
13150-30 = "Okay, okay. If you say so, Yume."
13150-31 = "Y-Yeah! So if you miraculously end up with some adorable underclassmen, Hoshino... "
13150-32 = "...Pinky promise you'll take good care of them. Okay?"
13150-33 = "All right, I got it. Promise. "
13150-45 = "*cough* *cough* Ugh... My legs...are giving out..."
13150-46 = "I really gave it my all..."
13150-47 = "...and we didn't even leave a scratch? How...?"
13150-51 = "...I'm sorry, Ayane, Serika. "
13150-52 = "I couldn't exactly take it easy on you with three combat helicopters."
13150-53 = "You're right, though, Ayane. I haven't changed a bit. I really am sorry. "
13150-54 = "Apologize to Sensei for me, will you? This old-timer just keeps making the same mistakes... "
13150-55 = "It's okay if you hate me for this..."
13150-58 = "..."
13150-59 = "..."
13150-62 = "You're Abydos' future. Ayane, Serika."
13150-63 = "You're the only ones who came here because you really, truly cared about Abydos."
13150-64 = "That's why I have to protect your future. That's my job as your upperclassman, after all."
13150-70 = "..."
13150-71 = "...But this is too much! You can't denounce the old student council and its president as fake!"
13150-72 = "And all by yourself..."
13150-74 = "That's all right, Serika. Yeah... This is the way it should be. "
13150-75 = "I'll graduate one day, you know? When that happens, it'll be your turn to step up to the plate, be responsible for Abydos."
13150-76 = "That's the way the world works. I, as your upperclassman, have to protect you, forge the path for you to walk towards your future. And you underclassman will outgrow me one day and keep on walking forward."
13150-79 = "You, the Foreclosure Task Force, have to keep moving forward to Abydos' future."
13150-80 = "Once I make the Train Cannon disappear...everything will be resolved. Abydos' threats, the past student council's mistakes, the district corporation's schemes... It'll finally be done with."
13150-81 = "After that, you'll all be just fine."
13150-84 = "Nonomi, Shiroko, Serika, Ayane... I know you'll do great."
13150-85 = "It's okay if Yume's Abydos Student Council fades into the past. That way, the Foreclosure Task Force and Sensei can walk the path to make a new future."
13150-91 = "Go forward, into the future...to the light..."
13150-92 = "That's the will of the departed, final Abydos Student Council President..."
13150-94 = "...and the order of the Student Council Vice President, Takanashi Hoshino."
13150-103 = "Everyone okay?"
13150-105 = "Shiroko... "
13150-106 = "You're the most injured out of all of us! Are YOU okay?"
13150-108 = "Yeah. Is...Is Hoshino gone?"
13150-109 = "...Yes. We couldn't stop her... She was too strong..."
13150-110 = "...and I wasn't strong enough."
13150-111 = "Wh-What do we do now, Shiroko...?"
13150-112 = "I don't know..."
13150-114 = "I've never seen Hoshino like that before..."
13150-115 = "It's like...how do I put it...?"
13150-117 = "..."
13150-130 = "If I remember correctly, the contract Yume wrote..."
13150-132 = "Yes?"
13150-137 = "Today is...the two-year anniversary of the contract's signing."
13150-138 = "Which means..."
13150-140 = "Today is the day Student Council President Yume disappeared..."
13150-156 = "All set. Time to go rescue Nonomi."
13150-158 = "And..."
13150-161 = "...finish what I couldn't two years ago."
13150-163 = "Next Episode;Counterattack"

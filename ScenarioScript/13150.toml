[translation]
13150-1 = "ตอนที่ 15;คำสั่งของรองประธานนักเรียน"
13150-7 = "นี่ โฮชิโนะจัง"
13150-8 = "ตอนที่เจอโฮชิโนะจังครั้งแรก ฉันต้องหยิกตัวเองหลายครั้งเลยละ เพราะฉันนึกว่ามันเป็นเรื่องฝันไป"
13150-9 = "ฉันดีใจมากเลยที่มีรุ่นน้องที่ทั้งน่ารัก แข็งแกร่ง และเชื่อใจได้อย่างโฮชิโนะจัง "
13150-10 = "อืม... ฉันหัวไม่ดีเท่าไร คงจะอธิบายออกมาเป็นคำพูดดีๆ ไม่ได้"
13150-11 = "แต่การที่มีโฮชิโนะจังมาให้ฉันนั่งมองตาด้วยแบบนี้ ถือว่าเป็นปาฏิหาริย์สำหรับฉันเลยละ..."
13150-13 = "แต่เราก็เจอกันทุกวันอยู่แล้วนี่คะ  "
13150-14 = "เมื่อวานก็เจอ วันนี้ก็เจอ พรุ่งนี้ก็เจออีก จะตื่นเต้นอะไรกับเรื่องที่ต้องเจอทุกวันแบบนี้กัน?"
13150-15 = "อ่า... แต่ว่า..."
13150-16 = "ปาฏิหาริย์มันยิ่งใหญ่และหายากกว่านั้นนะคะ"
13150-17 = "อืม... ไม่หรอกโฮชิโนะจัง"
13150-18 = "ฉันไม่คิดแบบนั้นนะ"
13150-22 = "ถึงฉันจะไม่ได้ฉลาดมากนัก... แต่เรื่องนั้นฉันมั่นใจนะ"
13150-23 = "โฮชิโนะจัง หากวันไหนโฮชิโนะจังได้มีรุ่นน้องที่น่ารักๆ บ้างละก็..."
13150-24 = "โฮชิโนะจังก็จะเข้าใจเองว่าการได้เจอหน้ากันทุกวัน... การที่เรามีกันทั้งในวันนี้ พรุ่งนี้ และในอนาคตข้างหน้า..."
13150-25 = "ตอนนั้นโฮชิโนะจังจะรู้เองว่า... เรื่องธรรมดาที่น่าเบื่อพวกนี้มันคือปาฏิหาริย์จริงๆ"
13150-27 = "มีรุ่นน้องในโรงเรียนที่แทบจะไม่เหลืออะไรเลยแบบนี้น่ะเหรอคะ... ก็คงเป็นปาฏิหาริย์อยู่หรอกค่ะ เพราะทุกคนต่างก็ออกจากที่นี่กันหมดแล้ว"
13150-28 = "จะมีใครมาเข้าเรียนหรือเปล่าเถอะ"
13150-29 = "ไม่ใช่แบบนั้นสักหน่อย โฮชิโนะจัง ฉันหมายถึงชีวิตประจำวันของเราน่ะ... "
13150-30 = "ค่ะๆ ถ้ารุ่นพี่คิดอย่างนั้น ก็คงเป็นอย่างนั้นละค่ะ"
13150-31 = "อืม เพราะงั้น ถ้าโฮชิโนะจังมีรุ่นน้อง... ที่เป็นเหมือนปาฏิหาริย์... "
13150-32 = "โฮชิโนะจังจะต้องปกป้องพวกเธอไว้นะ เข้าใจมั้ย?"
13150-33 = "ค่ะ ก็ได้ ฉันจะทำอย่างนั้นค่ะ "
13150-45 = "แค่ก... แค่ก... อึก... ขาไม่มีแรงเลย..."
13150-46 = "ฉันทุ่มไปสุดกำลังแล้วแท้ๆ..."
13150-47 = "แต่รุ่นพี่ไม่ได้แผลเลยงั้นเหรอคะ...? จริงๆ เหรอ...?"
13150-51 = "ขอโทษนะ... อายาเนะจัง เซริกะจัง "
13150-52 = "ถึงจะมีเฮลิคอปเตอร์ติดอาวุธ 3 ลำ ฉันก็ไม่อ่อนข้อให้หรอก..."
13150-53 = "นั่นสินะ... แบบนี้คงไม่มีอะไรต่างจากเมื่อก่อนอย่างที่อายาเนะจังว่าเลย ขอโทษนะ "
13150-54 = "แล้วก็... ฝากขอโทษครูให้ได้ด้วยมั้ย? ขอโทษที่ลุงคนนี้ทำตัวโง่ๆ ซ้ำแล้วซ้ำเล่าน่ะ... "
13150-55 = "จะเกลียดฉันก็ได้นะ"
13150-58 = "..."
13150-59 = "..."
13150-62 = "อายาเนะจัง เซริกะจัง... พวกเธอคืออนาคตของอะบิดอสนะ"
13150-63 = "พวกเธอน่ะมาที่นี่เพราะเป็นห่วงอะบิดอสจริงๆ"
13150-64 = "เพราะงั้นฉันเลยต้องปกป้องอนาคตของพวกเธอไว้ เป็นรุ่นพี่ก็ต้องปกป้องรุ่นน้อง"
13150-70 = "..."
13150-71 = "แต่แบบนี้มันเกินไปแล้วนะ...! นี่มันเป็นสารภาพเพื่อปฏิเสธการมีอยู่จริงของท่านประธานสภานักเรียน#nคนนั้นไม่ใช่หรือไง!"
13150-72 = "แถมตัวเองจะเป็นคนสารภาพอีก..."
13150-74 = "ไม่เป็นไรหรอก เซริกะจัง มันต้องเป็นแบบนี้ละ"
13150-75 = "สักวันฉันก็จะเรียนจบ แล้วพวกเธอก็จะต้องรับผิดชอบโรงเรียนนี้"
13150-76 = "มันเป็นเรื่องแน่นอนอยู่แล้วที่รุ่นพี่ต้องปกป้องรุ่นน้องและเปิดอนาคตให้รุ่นน้อง ส่วนรุ่นน้องก็ต้องก้าวข้ามรุ่นพี่ไปมีอนาคตข้างหน้า"
13150-79 = "คณะกรรมการแผนงานอย่างพวกเธอต้องก้าวไปสู่อนาคตใหม่ของอะบิดอส"
13150-80 = "ถ้าปืนแม่เหล็กไฟฟ้าหายไป... ทุกอย่างก็จะได้รับการจัดการ... ทั้งพวกคนที่เพ่งเล็งอะบิดอส ความผิดพลาดของสภานักเรียนในอดีต และแผนการร้ายของกลุ่มธุรกิจในเขตปกครองตนเองด้วย "
13150-81 = "และหลังจากนั้นพวกเธอต้องมีอนาคตที่สดใสกันแน่ๆ"
13150-84 = "โนโนมิจัง ชิโรโกะจัง เซริกะจัง อายาเนะจัง... พวกเธอทุกคนต้องทำได้ดีแน่นอน"
13150-85 = "ให้ <สภานักเรียนอะบิดอส> ของรุ่นพี่ยูเมะหายไปเถอะ แล้วคณะกรรมการแผนงานก็จะสร้างอนาคตขึ้น#nมาใหม่พร้อมกับคุณครู"
13150-91 = "ไปสู่อนาคตใหม่... ที่เปล่งประกาย..."
13150-92 = "นี่คือความต้องการของประธานสภานักเรียนคนสุดท้ายของอะบิดอสที่ไม่มีตัวตนในตอนนี้..."
13150-94 = "และเป็นคำสั่งของรองประธานนักเรียนทาคานาชิ โฮชิโนะด้วย"
13150-103 = "ทุกคนเป็นยังไงบ้าง?"
13150-105 = "รุ่นพี่ชิโรโกะ... "
13150-106 = "รุ่นพี่บาดเจ็บหนักที่สุดเลยนะ รุ่นพี่นั่นแหละ เป็นยังไงบ้าง?"
13150-108 = "อืม รุ่นพี่โฮชิโนะ... ไปแล้วเหรอ?"
13150-109 = "ค่ะ ลำพังแค่พวกเรา... ห้ามรุ่นพี่ไว้ไม่ได้หรอกค่ะ..."
13150-110 = "อืม... เรามีพลังไม่พอกันสินะ"
13150-111 = "ละ... แล้วตอนนี้เราจะทำยังไงกันดีคะ รุ่นพี่ชิโรโกะ...?"
13150-112 = "ฉันก็ไม่รู้เหมือนกัน..."
13150-114 = "ฉันเพิ่งเคยเห็นรุ่นพี่เป็นแบบนั้น... ครั้งแรกเลยค่ะ..."
13150-115 = "จะว่ายังไงดีนะ..."
13150-117 = "..."
13150-130 = "จะว่าไปแล้ว หนังสือสัญญาของประธานยูเมะ..."
13150-132 = "หืม?"
13150-137 = "วันนี้... เป็นวันครบ 2 ปีที่มีการลงนามในหนังสือสัญญาฉบับนั้นค่ะ"
13150-138 = "งั้นก็แปลว่า..."
13150-140 = "วันนี้เป็นวันครบรอบที่ประธานยูเมะหายตัวไปค่ะ..."
13150-156 = "ดีละ... ไปช่วยโนโนมิจังกัน"
13150-158 = "แล้วก็..."
13150-161 = "ไปสะสางเรื่องที่คั่งค้างไว้เมื่อ 2 ปีก่อนด้วย"
13150-163 = "ตอนต่อไป;จู่โจมกลับ"

[translation]
1002702-1 = "意料之外的角度"
1002702-4 = "（受委託帶著東西，來到了約好的地點，但卻沒有半個人……）"
1002702-8 = "[ns] 「……？」"
1002702-10 = "是我，花凛。"
1002702-11 = "啊，老師 ？"
1002702-12 = "那個，抱歉……我剛剛確認了，似乎是有些誤會……"
1002702-13 = "原本要來收東西的明日奈前輩，又不知道跑到哪裡去了……"
1002702-14 = "真的非常抱歉，還特地拜託您百忙中跑一趟。"
1002702-15 = "怎麼辦呢……"
1002702-16 = "……總之，能麻煩您幫我把東西先放在那邊嗎？不能再給您添麻煩了……"
1002702-17 = "晚點稍微有時間，我再下去拿就可以了。"
1002702-18 = "[s1] 「所以東西要拿去哪裡？」\n[s2] 「那花凛現在在哪裡？」"
1002702-19 = "……嗯？"
1002702-20 = "……嗯？"
1002702-21 = "我嗎？"
1002702-22 = "那個……老師現在所在的地方，旁邊有個巷子，走進來之後會看到一個廢棄大樓。"
1002702-23 = "我現在在頂樓。可是我現在必須監視目標，沒辦法離開……"
1002702-24 = "[s] 「那，你在那邊等著，我送過去吧。」"
1002702-25 = "耶？"
1002702-26 = "真，真的可以嗎？非常不好意思……"
1002702-27 = "感覺好像是在利用老師一樣……"
1002702-28 = "[s] 「不會的，等我吧。」"
1002702-29 = "那麼就……嗯。"
1002702-30 = "那就麻煩你。"
1002702-31 = "謝謝，老師。"
1002702-38 = "（這個廢墟真的很荒涼，看起來是個完全被遺棄的地方呢）"
1002702-39 = "（只有自己的腳步聲，迴盪在耳邊）"
1002702-40 = "老師該不會迷路了吧？"
1002702-41 = "……啊，聽到老師的腳步聲了。"
1002702-42 = "看來不需要擔心老師會迷路了呢。"
1002702-43 = "[s] 繼續前行。"
1002702-49 = "……啊，老師？"
1002702-50 = "[s] 「……！？」"
1002702-51 = "……？"
1002702-52 = "老師，怎麼了嗎？"
1002702-53 = "我的姿勢……？"
1002702-54 = "……唔耶！？"
1002702-57 = "― ……唔耶！？[wa:90] "
1002702-61 = "― 老，老師！？不是的，這是那個……！[wa:4620] "
1002702-64 = "― 等等！現在沒辦法改變姿勢……！[wa:2050] "
1002702-67 = "― 那個，我正在執行狙擊任務中……！[wa:2620] "
1002702-70 = "― 無法把準心移開目標，[wa:920] "
1002702-72 = "― 所以……！"
1002702-75 = "― ……耶，你沒關係……？[wa:2370] "
1002702-77 = "― ……倒不如說拜託我繼續保持這樣？等……！[wa:3030] "
1002702-80 = "― 總，總覺得你不知道在高興什麼，這畢竟是……！[wa:5270] "
1002702-82 = "― 果然還是不行，好害羞……！[wa:1850] "
1002702-85 = "― 耶？要我不用在意，繼續執行工作……？[wa:1870] "
1002702-87 = "― 我怎能不在意啊！笨蛋！[wa:2670] "
1002702-90 = "（在花凛完成任務之前，我乖乖地在後面等待）"
1002702-95 = "……總算，任務結束了。"
1002702-96 = "嗯？這身裝扮……？"
1002702-97 = "啊啊。那個，我想說反正今天是獨自出任務，所，所以……"
1002702-98 = "話說回來……哈啊，抱歉。我沒想到會變成這樣。"
1002702-99 = "明明知道老師要來，我卻沒想太多……"
1002702-100 = "那個，我還要繼續待在這一下。總之，謝謝老師。老師差不多也要回夏萊了吧？"
1002702-101 = "……要再多陪我一會兒？"
1002702-102 = "呵呵。老師，難道你是怕我一個人很寂寞，所以才這麼說的嗎？"
1002702-103 = "別擔心，狙擊手獨自待命早就是家常便飯了……"
1002702-104 = "……不是那個意思？那個，難道是……"
1002702-105 = "……養眼？"
1002702-109 = "……哈啊。"
1002702-110 = "老師真的是，真受不了……"

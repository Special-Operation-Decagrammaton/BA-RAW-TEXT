[translation]
1002702-1 = "ความสนใจที่คาดไม่ถึง"
1002702-4 = "(คุณครูนำของที่ถูกไหว้วานไปยังสถานที่ที่นัดเจอกัน แต่พอไปถึงก็ไม่พบใครที่นั่น)"
1002702-8 = "[ns] \".....?\""
1002702-10 = "อ๊ะ คุณครู นี่ฉันเอง คาริน"
1002702-11 = "เรื่องนั้นคือว่า..."
1002702-12 = "คือ... อืม ขอโทษนะ... ฉันขอโทษจริงๆ ฉันเป็นฝ่ายผิดเอง"
1002702-13 = "รุ่นพี่อาสึนะบอกว่าจะไปรับของให้ แต่ว่าตอนนี้หายไปไหนแล้วก็ไม่รู้ ติดต่อก็ไม่ได้น่ะ..."
1002702-14 = "ไม่สิ สุดท้ายแล้วมันก็เหมือนแก้ตัว... คุณครูอุตส่าห์เอามาให้ แต่ฉันก็คงพูดคำอื่นไม่ได้นอกจาก#nขอโทษ..."
1002702-15 = "ฉันไม่อยากรบกวนคุณครูไปมากกว่านี้แล้ว..."
1002702-16 = "ถ้างั้นช่วยวางของที่คุณครูเอามาไว้ตรงนั้นให้หน่อยได้มั้ย? อันที่จริงแค่นั้นก็น่าจะพอแล้วล่ะ"
1002702-17 = "ส่วนที่เหลือ... ก็แค่ให้ฉันหาเวลาไปที่นั่นได้เท่านั้น..."
1002702-18 = "[s1] \"ถ้างั้นตอนนี้คารินอยู่ที่ไหนล่ะ?\"\n[s2] \"เธอก็ต้องมาหยิบไปที่อื่นอีกเหรอ?\""
1002702-19 = "หืม...? ถามทำไมเหรอ?"
1002702-20 = "หืม...? ถามทำไมเหรอ?"
1002702-21 = "เรื่องนั่นน่ะ..."
1002702-22 = "จากบริเวณที่คุณครูอยู่ในตอนนี้ จะมองเห็นตรอกเล็กๆ ที่อยู่ด้านข้าง พอเดินเข้าไปแล้วจะเห็น#nอาคารร้างอยู่หลังหนึ่ง"
1002702-23 = "ฉันอยู่ที่ชั้นบนสุด แต่ว่าตอนนี้ฉันกำลังจับตาดูเป้าหมายอยู่คงจะขยับไปไหนไม่ได้หรอก"
1002702-24 = "[s] \"ไหนๆ ก็มาแล้วเดี๋ยวครูเอาไปให้เอง\""
1002702-25 = "หืม...?"
1002702-26 = "มะ...ไม่เป็นไรจริงๆ เหรอ? ถะ...ถ้าเอามาให้ที่นี่มันจะไม่เป็นไรจริงๆ ใช่มั้ย...?"
1002702-27 = "รู้สึกเหมือนฉันจะรบกวนคุณครูมากเกินไปน่ะ..."
1002702-28 = "[s] \"ไม่เป็นไร ไว้ใจครูได้เลย\""
1002702-29 = "อะ...อื้อ... ถ้าจะพูดแบบนั้นล่ะก็..."
1002702-30 = "เข้าใจแล้วล่ะ ถ้างั้นก็ขอรบกวนหน่อยนะ"
1002702-31 = "ขอบคุณนะ... คุณครู"
1002702-38 = "(อาคารที่มาถึงเป็นอาคารที่ถูกปล่อยทิ้งร้างอยู่)"
1002702-39 = "(ในขณะที่เดินขึ้นไปชั้นบนสุด เสียงที่ได้ยินรอบๆ มีเพียงเสียงฝีเท้าเท่านั้น)"
1002702-40 = "คุณครู ใกล้จะถึงหรือยัง?"
1002702-41 = "อา... ได้ยินแล้วล่ะ เสียงฝีเท้าของคุณครู"
1002702-42 = "อืม ใกล้จะถึงแล้วสินะ เดินตรงมาทางนั้นแหละ"
1002702-43 = "[s] เดินไปตามทางที่คารินบอก"
1002702-49 = "อา... ทางนี้ ขอบคุณนะคุณครู"
1002702-50 = "[s] \"...!?\""
1002702-51 = "...?"
1002702-52 = "หืม? คุณครู...? สีหน้าแบบนั้นคืออะไรน่ะ? ทำไมต้องหันหน้าหนีด้วย?"
1002702-53 = "ท่านั่งฉันเหรอ...?"
1002702-54 = "....!?"
1002702-57 = "― ...อึ่ก...!?[wa:10] "
1002702-61 = "― คะ...คุณครู!? เปล่านะ...! นะ...นี่มัน...![wa:3660] "
1002702-64 = "― เดี๋ยวสิ ตอนนี้...ฉันเปลี่ยนท่าไม่ได้หรอกนะ...![wa:770] "
1002702-67 = "― เอ่อ...ฉันกำลังทำภารกิจลอบยิงอยู่น่ะ...![wa:1660] "
1002702-70 = "― พอล็อกเป้าหมายแล้วก็จะขยับไม่ได้...[wa:10] "
1002702-72 = "― เพราะงั้น...!"
1002702-75 = "― ว่าไงนะ...? คุณครูไม่เป็นไรงั้นเหรอ?[wa:1370] "
1002702-77 = "― แถม... แบบนี้ก็ดีเหมือนกันงั้นเหรอ? เดี๋ยวนะ...![wa:1910] "
1002702-80 = "― มะ... มันก็... รู้สึกดีใจอยู่เหมือนกัน แต่ถึงยังไงมันก็...![wa:3790] "
1002702-82 = "― ว่าแล้วเชียว ไม่ไหวจริงๆ น่าอายสุดๆ...![wa:810] "
1002702-85 = "― อะไรนะ? ไม่ต้องสนใจคุณครูแล้วให้ทำงานต่อได้เลยงั้นเหรอ...?[wa:270] "
1002702-87 = "― จะไม่ให้สนใจได้ยังไงเล่า คนบ้า...![wa:1750] "
1002702-90 = "(คุณครูนั่งรออย่างสงบเสงี่ยมจนกระทั่งคารินทำภารกิจเสร็จ)"
1002702-95 = "เสร็จแล้วล่ะ ไม่ใช่เรื่องใหญ่อะไรหรอก... ก็แค่ภารกิจเฝ้าระวังน่ะ"
1002702-96 = "หืม? ชุดนี้น่ะเหรอ?"
1002702-97 = "อา... คือ... พอดีวันนี้เป็นภารกิจที่ต้องทำคนเดียว... เพราะงั้นก็เลย..."
1002702-98 = "คือ... เฮ้อ... จริงๆ เลย... ฉันไม่ได้คิดถึงเรื่องนี้มาก่อนเลย"
1002702-99 = "ขะ...ขอโทษนะ ฉันไม่ได้อยากจะทำให้คุณครูลำบากใจแบบนี้..."
1002702-100 = "เอาเถอะ ดูเหมือนฉันจะยังต้องอยู่ที่นี่อีกนานเลย คุณครูกลับไปพักก่อนดีกว่านะ คงจะนาน..."
1002702-101 = "หืม...? จะอยู่ด้วยกันต่อเหรอ?"
1002702-102 = "ฮุฮุ ห่วงว่ารออยู่คนเดียวแล้วจะเหงางั้นเหรอ?"
1002702-103 = "ไม่ต้องห่วงหรอก เห็นแบบนี้ฉันก็เป็นสไนเปอร์นะ เรื่องการเฝ้าอยู่คนเดียวน่ะ สบายมาก"
1002702-104 = "หืม...? ไม่ใช่แบบนั้นเหรอ? ถ้างั้นอะไรล่ะ...?"
1002702-105 = "ตรงนี้วิวดีงั้นเหรอ?"
1002702-109 = "คุณครู..."
1002702-110 = "กลับไปเลยนะ..."

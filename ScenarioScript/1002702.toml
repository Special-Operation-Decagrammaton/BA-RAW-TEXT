[translation]
1002702-1 = "An Unforeseen Gaze"
1002702-4 = "I brought the requested items to the meeting place, but nobody was there."
1002702-8 = "[ns] \"...?\""
1002702-10 = "Oh, Sensei. It's me, Karin."
1002702-11 = "So, the thing is..."
1002702-12 = "It's... I'm really sorry. There's been a mix-up on our end."
1002702-13 = "Asuna was supposed to receive the items, but I don't know where she is, and I can't reach her."
1002702-14 = "No. These are all just excuses. You went through the trouble of bringing everything, and I have nothing to offer but apologies."
1002702-15 = "I don't want to cause you any further trouble, so..."
1002702-16 = "Would you mind just leaving the items there? Honestly, you've basically done all the work already."
1002702-17 = "I'll find the time to go down there and get them myself..."
1002702-18 = "[s1] \"Well, where are you now, Karin?\"\n[s2] \"Where did you need these items to go?\""
1002702-19 = "What? Why do you want to know?"
1002702-20 = "What? Why do you want to know?"
1002702-21 = "Well..."
1002702-22 = "If you go into the alley right next to you, there should be an abandoned building there."
1002702-23 = "I'm on the top floor, but I can't leave. I can't take my eyes off my surveillance target."
1002702-24 = "[s] \"Since I'm already here, I'll bring them up to you myself.\""
1002702-25 = "Huh?"
1002702-26 = "I can't put you through all that trouble!"
1002702-27 = "I feel like I'm asking too much of you."
1002702-28 = "[s] \"It's fine. Leave it to me.\""
1002702-29 = "I-If you put it that way, then..."
1002702-30 = "Understood. I accept your help."
1002702-31 = "Thank you, Sensei."
1002702-38 = "The building was completely abandoned and empty."
1002702-39 = "The only sound I could hear as I made my way up was the sound of my own footsteps."
1002702-40 = "Sensei? Are you almost here?"
1002702-41 = "Oh, there you are. I can hear your footsteps."
1002702-42 = "It sounds like you're close. Just keep heading straight."
1002702-43 = "[s] Follow her instructions and head straight."
1002702-49 = "This way! Thank you, Sensei."
1002702-50 = "[s] \"...?!\""
1002702-51 = "...?"
1002702-52 = "Sensei? What's wrong? Why are you looking away?"
1002702-53 = "My position?"
1002702-54 = "...?!"
1002702-57 = "― Huh?![wa:130] "
1002702-61 = "― S-Sensei?! Wait! N-No, this is...[wa:3980] "
1002702-64 = "― Wait, I can't change my position right now![wa:930] "
1002702-67 = "― I'm on a sniping mission![wa:2260] "
1002702-70 = "― And I can't look away from the target right now.[wa:10] "
1002702-72 = "― That's why!"
1002702-75 = "― Huh? You don't mind?[wa:2010] "
1002702-77 = "― You like it better this way?! Wait![wa:2430] "
1002702-80 = "― Y-You seem happy for some reason, but this is still...![wa:3950] "
1002702-82 = "― Still too much! I'm embarrassed![wa:1090] "
1002702-85 = "― What? Don't worry about it and focus on my job?[wa:710] "
1002702-87 = "― How am I supposed to not worry about it, dummy?![wa:1190] "
1002702-90 = "I waited quietly in the back while Karin finished her mission."
1002702-95 = "I'm done. I mean, it wasn't a big deal or anything. It was a simple security mission."
1002702-96 = "My position?"
1002702-97 = "Ah. Well, today was a solo mission and it's just been a while..."
1002702-98 = "At any rate... *sigh* I can't believe I didn't consider that at all."
1002702-99 = "I-I'm sorry. I didn't intend to put you in such an awkward position, Sensei."
1002702-100 = "It looks like I'll be here for a while longer, so you should probably head back and rest."
1002702-101 = "You want to stay with me a little longer?"
1002702-102 = "Heehee. Is this because you're worried I might be lonely here by myself?"
1002702-103 = "You don't need to worry. I may not look it, but I am still a sniper. Solitude is part of the job."
1002702-104 = "That's not what you're talking about? Th-Then what do you mean?"
1002702-105 = "...You like the view?"
1002702-109 = "Sensei."
1002702-110 = "Leave. Now."

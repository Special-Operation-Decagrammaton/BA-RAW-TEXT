[translation]
1005705-1 = "美食成立的要件是料理、季節……"
1005705-2 = "（在約定的場所等著羽留奈）"
1005705-6 = "讓您久等了，老師。"
1005705-7 = "非常抱歉我遲到了。"
1005705-8 = "[s]「沒關係，我也才剛到唷。」"
1005705-9 = "那真是太好了。"
1005705-10 = "在那之後我試著想了想。"
1005705-11 = "對美食來說，真正重要的是什麼。"
1005705-12 = "反覆思考的結果……"
1005705-13 = "果然，僅憑料理美味還不足夠……我是這麼想的。"
1005705-14 = "所以今天，為了滿足我所能想到的所有要素而做了準備。"
1005705-15 = "唔呵呵。"
1005705-16 = "這樣一來，一定可以達到究極美食的境界吧。"
1005705-17 = "[s]「原來如此……讓我有點期待呢。」"
1005705-18 = "首先，我準備的是這個。"
1005705-23 = "裝滿三層餐盒的御節料理。 "
1005705-24 = "說到美食的要素，料理的方式是其中之一，但是季節……所謂的[ruby=時令]「旬」[/ruby]也很重要。 "
1005705-25 = "此外，能一起享用美食對象的存在也是必要的。#n因此，我才會請老師過來。"
1005705-26 = "滿足了這些條件的現在，想必能品嘗到至今從未嘗過的美食吧。"
1005705-27 = "[s]「好，那就來試試看吧。」"
1005705-28 = "唔呵呵，您說的對。"
1005705-29 = "那麼，老師請入座。"
1005705-30 = "準備工作請交給我吧。"
1005705-37 = "― 對美食來說重要的是，[wa:700] "
1005705-39 = "― 料理與對象……以及時機。[wa:2120] "
1005705-42 = "― 與這些相同，情境也一樣[wa:1740] "
1005705-44 = "― 是不可或缺的存在。"
1005705-47 = "― 唔呵呵。所以說，[wa:1980] "
1005705-49 = "― 今天就試著互相餵對方吧？[wa:1630] "
1005705-52 = "― 由我先開始……來，老師。[wa:3160] "
1005705-54 = "― 請張開嘴巴……做出啊～的動作。[wa:2920] "
1005705-57 = "― 真，真是的，請您快一點。[wa:2000] "
1005705-59 = "― 雖然我也……很害羞……[wa:1170] "
1005705-62 = "― 但是在老師吃下去之前，"
1005705-64 = "― 我會維持這個動作的唷？[wa:910] "
1005705-67 = "― 來吧……啊～嗯。[wa:1760] "
1005705-70 = "味道如何呢？"
1005705-71 = "[s1]「雖，雖然確實很好吃……！」\n[s2]「因為心跳的太快，我好像沒能清楚吃出味道！？」"
1005705-74 = "唔呵呵，這樣啊。"
1005705-75 = "那就再來一次，啊～嗯……"
1005705-81 = "嗯，做的很好。能讓您品嚐美食，我也很高興。"
1005705-82 = "那麼……這次輪到老師餵我吃了唷？"
1005705-83 = "[s]「真，真的要嗎！？現在！？」"
1005705-84 = "是的。這樣才算是互相餵食呀。"
1005705-88 = "那麼就拜託您了，老師。啊……"
1005705-90 = "（就這樣互相餵對方吃御節料理，清空了餐盒……）"
1005705-93 = "唔呵呵。"
1005705-94 = "這……是會一輩子留在記憶中的美食呢。"
1005705-95 = "非常感謝您，老師。"
1005705-96 = "[s3]「你能這麼說，我很高興。」\n[s4]「雖然相當害羞就是了……」"
1005705-99 = "呵呵……話說回來，您還有時間嗎？#n我想……再和您多待一會。"
1005705-100 = "總覺得，手好像有點冷呢……"
1005705-104 = "您不這麼覺得嗎，老師？"
1005705-111 = "（和羽留奈手牽著手，一起悠哉地逛了街）"

[translation]
1005705-1 = "สิ่งสำคัญของอาหารเลิศรสคือ อาหาร ช่วงเวลา เพื่อนร่วมโต๊ะ และ..."
1005705-2 = "(คุณครูมารอฮารุนะที่สถานที่นัดพบ)"
1005705-6 = "สวัสดีค่ะคุณครู"
1005705-7 = "ขอโทษที่ทำให้รอนะคะ"
1005705-8 = "[s] \"ครูก็เพิ่งมาเอง\""
1005705-9 = "อย่างนั้นเหรอคะ"
1005705-10 = "ฉันมาลองคิดๆ ดูแล้วน่ะค่ะ"
1005705-11 = "ว่าอะไรคือสิ่งสำคัญสำหรับอาหารเลิศรส"
1005705-12 = "แค่การปรุงอาหารคงไม่เพียงพอ... "
1005705-13 = "และนั่นก็คือข้อสรุปที่ได้หลังจากไตร่ตรองมาอย่างถี่ถ้วนแล้วค่ะ"
1005705-14 = "เพราะงั้นวันนี้... ฉันได้พิจารณาทุกอย่างที่ฉันสามารถเตรียมมาได้แล้วค่ะ"
1005705-15 = "ฮุฮุฮุ..."
1005705-16 = "แบบนี้จะต้องเข้าถึงรสอร่อยสุดยอดได้แน่นอนเลยค่ะ"
1005705-17 = "[s] \"ถ้าได้แบบนั้น... ก็ดีสิ\""
1005705-18 = "ก่อนอื่น นี่คือสิ่งที่ฉันเตรียมมาค่ะ"
1005705-23 = "ใช่แล้วค่ะ เบนโตะโอเซจิ 3 ชั้นค่ะ "
1005705-24 = "สิ่งสำคัญสำหรับอาหารชั้นเลิศคือ อาหาร ช่วงเวลา และเพื่อนร่วมโต๊ะ... "
1005705-25 = "สิ่งที่เตรียมพร้อมแล้วก็มี... อาหารที่เหมาะกับฤดูกาล แล้วก็... คุณครู"
1005705-26 = "เท่านี้ก็ครบเงื่อนไขทั้งสามข้อแล้ว คงจะเป็นประสบการณ์กินอาหารเลิศรสแบบที่ไม่เคยมีมาก่อนแน่ๆ เลยใช่มั้ยล่ะคะ?"
1005705-27 = "[s] \"ครูก็ไม่ค่อยแน่ใจ แต่ถ้าฮารุนะบอกแบบนั้นก็คงเป็นแบบนั้นแหละ\""
1005705-28 = "ฮุฮุฮุ"
1005705-29 = "คุณครูมานั่งก่อนเถอะค่ะ"
1005705-30 = "เดี๋ยวฉันจะเตรียมส่วนที่เหลือให้เองค่ะ"
1005705-37 = "― สิ่งสำคัญของอาหารเลิศรส[wa:180] "
1005705-39 = "― ก็คืออาหารกับเพื่อนร่วมโต๊ะ... และเทศกาล[wa:1000] "
1005705-42 = "― นอกจากนี้... สถานการณ์ที่ทำให้เพลิดเพลินกับอาหารเลิศรส[wa:20] "
1005705-44 = "― ก็ขาดไปไม่ได้เช่นกันค่ะ"
1005705-47 = "― ฮุฮุฮุ เพราะงั้น...[wa:1540] "
1005705-49 = "― วันนี้ เรามาผลัดกันป้อนดีมั้ยคะ?[wa:830] "
1005705-52 = "― เริ่มจากคุณครูก่อน... เร็วสิคะ คุณครู[wa:2160] "
1005705-54 = "― อ้าปาก แล้ว...อ้าม~ สิคะ[wa:2560] "
1005705-57 = "― โธ่...เร็วๆ สิคะ[wa:1840] "
1005705-59 = "― ฉันเอง... ก็เขินเหมือนกันนะคะ[wa:450] "
1005705-62 = "― จนกว่าคุณครูจะยอมทาน"
1005705-64 = "― ฉันจะนั่งอยู่แบบนี้ไม่ขยับไปไหนเลยค่ะ[wa:10] "
1005705-67 = "― เร็วสิคะ... อ้าม~[wa:1400] "
1005705-70 = "เป็นยังไงบ้างคะ? อร่อยรึเปล่าคะ?"
1005705-71 = "[s1] \"อะ...อร่อยสุดๆ เลย!\"\n[s2] \"จะ...จู่ๆ ลิ้นก็ไม่รู้รสขึ้นมาเฉยๆ เลย!\""
1005705-74 = "ฮุฮุฮุ อย่างนั้นเหรอคะ"
1005705-75 = "ถ้างั้นอีกคำนะคะ อ้าม~"
1005705-81 = "เก่งมากเลยค่ะ คุณครูกินเก่งจังเลยนะคะ?"
1005705-82 = "ถ้างั้นคราวนี้ ป้อนให้ฉันบ้างได้มั้ยคะ?"
1005705-83 = "[s] \"หะ... ให้ครูป้อนเหรอ?!\""
1005705-84 = "ค่ะ ก็นี่เป็นการผลัดกันป้อนให้กันไงล่ะคะ"
1005705-88 = "ฉันรออยู่นะคะคุณครู อ้า~"
1005705-90 = "(หลังจากนั้นคุณครูกับฮารุนะก็ผลัดกันป้อนจนหมดกล่อง...)"
1005705-93 = "ฮุฮุฮุ"
1005705-94 = "มื้อนี้เป็นอาหารเลิศรสที่ฉันคงไม่ลืมไปตลอดชีวิตเลยค่ะ"
1005705-95 = "ขอบคุณนะคะ คุณครู"
1005705-96 = "[s3] \"ฮารุนะพูดแบบนี้ ครูใจฟูเลยนะเนี่ย\"\n[s4] (ตอนแรกก็ตกใจอยู่หรอก แต่ก็ชินขึ้นแล้วละ)"
1005705-99 = "ยังพอมีเวลาอยู่ ช่วยอยู่กับฉันต่ออีกหน่อยได้มั้ยคะคุณครู?"
1005705-100 = "พอดีว่า มือของฉัน... มันเย็นๆ นิดหน่อยนะคะ"
1005705-104 = "เป็นอะไรรึเปล่าคะคุณครู?"
1005705-111 = "(คุณครูเดินจับมือกับฮารุนะเดินชมรอบๆ เมืองด้วยกัน)"

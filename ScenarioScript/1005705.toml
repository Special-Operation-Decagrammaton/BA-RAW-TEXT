[translation]
1005705-1 = "The Four Elements of Gastronomy"
1005705-2 = "I was waiting for Haruna."
1005705-6 = "Hello, Sensei."
1005705-7 = "Sorry to make you wait."
1005705-8 = "[s] \"I haven't been here that long.\""
1005705-9 = "I see."
1005705-10 = "I've been thinking..."
1005705-11 = "What's the most important element of gastronomy?"
1005705-12 = "It can't be just the food..."
1005705-13 = "That's the conclusion I've come to over and over again."
1005705-14 = "So today, I've tried to account for all possible factors."
1005705-15 = "Heehee."
1005705-16 = "With this, I'll surely be able to reach the heights of taste."
1005705-17 = "[s] \"I'm rooting for you.\""
1005705-18 = "First off, I've prepared this."
1005705-23 = "Yes. Osechi served in triple-tiered boxes."
1005705-24 = "According to traditional theory, the elements of gastronomy are food, timing, and who you're with..."
1005705-25 = "So, I have good food, the perfect season to eat said food, and you, Sensei."
1005705-26 = "With these elements assembled, I believe we're about to have an unprecedented gastronomical experience!"
1005705-27 = "[s] \"Um...I'm not a gastronomy theory expert, so if you say so, sure.\""
1005705-28 = "Heehee."
1005705-29 = "Please, have a seat."
1005705-30 = "I'll take care of the rest."
1005705-37 = "― Many things are important for a true gourmet experience:[wa:10] "
1005705-39 = "― the food itself, the person you eat with, the timing...[wa:400] "
1005705-42 = "― And, of course, the way in which you eat[wa:580] "
1005705-44 = "― is just as crucial."
1005705-47 = "― Heh heh heh. So, I was thinking...[wa:940] "
1005705-49 = "― why don't we feed each other today?[wa:710] "
1005705-52 = "― I'll feed you first,  Sensei.[wa:2480] "
1005705-54 = "― Now then, open your mouth. Say ahhh...[wa:2000] "
1005705-57 = "― H-Hurry up already.[wa:1720] "
1005705-59 = "― I'm embarrassed too...[wa:730] "
1005705-62 = "― Until you take a bite from my hand,"
1005705-64 = "― I'm not moving an inch![wa:430] "
1005705-67 = "― Now then... Ahhh...[wa:1320] "
1005705-70 = "Did you like it?"
1005705-71 = "[s1] \"I-It was good!\"\n[s2] \"B-But that situation made it hard to focus on the taste!\""
1005705-74 = "Heehee. I see."
1005705-75 = "Then time for another round. Say ahhh..."
1005705-81 = "Aren't you enjoying the food even more, now?"
1005705-82 = "Now, my turn to be fed."
1005705-83 = "[s] \"Y-Your turn?! By me?!\""
1005705-84 = "Well, yeah, this sort of thing shouldn't be one-sided."
1005705-88 = "I'm waiting, Sensei. Ahhh..."
1005705-90 = "We fed each other osechi until the boxes were empty..."
1005705-93 = "Heehee."
1005705-94 = "A meal to remember."
1005705-95 = "Thank you, Sensei."
1005705-96 = "[s3] \"Well, as long as you're happy...\"\n[s4] \"(At first I was a bit flustered, but I guess I got used to it...)\""
1005705-99 = "Do you have time to stick around?"
1005705-100 = "My hands...are kind of cold."
1005705-104 = "Are you okay, Sensei?"
1005705-111 = "We passed the time hand in hand as we walked around town."

[translation]
1010705-1 = "งานอดิเรกของเลขา"
1010705-2 = "(ในขณะที่คุณครูกำลังทำงานอยู่เหมือนทุกวัน...)"
1010705-8 = "สวัสดีค่ะ คุณครู~! สบายดีหรือเปล่าคะ?"
1010705-9 = "อ๊ะ นี่ฉันมารบกวนตอนคุณครูงานยุ่งหรือเปล่าคะ...?"
1010705-10 = "[s] \"ไม่เป็นไรหรอก ครูว่าจะพักสักหน่อยอยู่พอดี\""
1010705-11 = "งั้นก็ค่อยยังชั่วหน่อยค่ะ! เพราะสัปดาห์นี้ฉันก็จะหยุดพักเหมือนกันค่ะ!"
1010705-12 = "คะ? มีเรื่องอะไรน่ะเหรอคะ?"
1010705-13 = "ไม่หรอกค่ะ~ ก็แค่หยุดตีพิมพ์ชั่วคราวตามปกติน่ะค่ะ!"
1010705-14 = "[s] \"หยุดตีพิมพ์ชั่วคราวตามปกติ?\""
1010705-15 = "ฮ่ะฮ่า! ค่ะ ใช่แล้วค่ะ~!"
1010705-16 = "<แพนเดโมเนียม โซไซตี้รายสัปดาห์> เป็นนิตยสารที่ออกรายสัปดาห์ ปกติแล้วฉันเลยไม่ค่อยมีเวลา#nพักน่ะค่ะ! เพราะงั้นถ้าฉันไม่หยุดตีพิมพ์ชั่วคราวบ้าง ฉันก็จะไม่ได้พักผ่อนเลยค่ะ!"
1010705-17 = "ฉันว่าฉันควรจะหยุดพักก่อนร่างกายจะประท้วงน่ะค่ะ~"
1010705-18 = "ฉันสนุกกับการจัดทำ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> งั้นฉันก็ควรดูแลตัวเองให้ทำสิ่งนี้ไปได้#nนานๆ สิคะ?"
1010705-19 = "เพราะงั้นฉันก็เลยหยุดพักในทุกๆ สองเดือนค่ะ~!"
1010705-20 = "แต่ถึงจะได้หยุดพัก แต่ฉันก็ติดงานอื่นด้วย ฉันก็เลยมีเวลาว่างจริงๆ อย่างวันนี้แค่วันเดียวค่ะ!"
1010705-24 = "เอะ... เอ๋? ทำไมมองกันด้วยสายตาอิจฉาขนาดนั้นล่ะ..."
1010705-25 = "คะ? หมู่นี้คุณครูงานเยอะจนไม่มีวันหยุดพักเลยงั้นเหรอคะ?"
1010705-26 = "อืม งั้นเหรอคะ... ถ้างั้นก็..."
1010705-27 = "วันนี้ฉันจะพักผ่อนเป็นเพื่อนกับคุณครูค่ะ!"
1010705-28 = "[s] \"ตะ... แต่ว่างานครู...!\""
1010705-29 = "อย่างที่บอกไปไงคะ เราต้องให้ร่างกายได้พักผ่อนก่อนที่ร่างกายจะประท้วงนะคะ!"
1010705-30 = "แทนที่จะพักวันละนิดวันละหน่อย ฉันว่าการพักผ่อนอย่างเต็มที่ทั้งวันจะทำให้ยิ่งมีพลังในการทำงาน#nในวันต่อไปนะคะ~"
1010705-31 = "[s] \"มันก็... อาจจะจริงอย่างที่ว่านะ...?\""
1010705-32 = "ใช่มั้ยคะ? ฉันพูดถูกใช่มั้ย?"
1010705-33 = "คิดดีแล้วละค่ะ~!"
1010705-34 = "เอาละ ถ้างั้นก็ลุกจากที่ แล้วก็มาบิดขี้เกียจกันก่อน~"
1010705-35 = "ต่อไปก็นอนกลางวันอย่างสบาย หรือไม่ก็สนุกกับการอ่านหนังสือหรือเล่นเกมสิคะ!"
1010705-36 = "การออกกำลังกายหรือทำงานอดิเรกที่ปกติแล้วไม่มีเวลาทำก็ถือเป็นการพักผ่อนเหมือนกันค่ะ~!"
1010705-37 = "คะ...? ไม่ได้มีวันหยุดพักผ่อนมานาน จนไม่รู้ว่าต้องทำอะไรดีงั้นเหรอคะ?"
1010705-38 = "[s] \"ปกติในวันหยุดจิอากิทำอะไรเหรอ?\""
1010705-39 = "ฉันเหรอคะ?"
1010705-40 = "อืม... ฉันก็ไปทำงานอดิเรกทั่วไปค่ะ"
1010705-41 = "[s1] \"งั้นต้องฝากวันนี้ไว้กับจิอากิแล้วละ\"\n[s2] \"ไปทำงานอดิเรกของจิอากิกันเถอะ\""
1010705-44 = "อ๊ะ แบบนั้นก็ได้ค่ะ!"
1010705-45 = "จะได้ทำอะไรสนุกๆ กับคุณครูเหรอเนี่ย สัปดาห์นี้คงสนุกสุดๆ ไปเลยละค่ะ!"
1010705-46 = "บางทีอาจจะได้คอนเทนต์ไปลงใน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ก็ได้!"
1010705-47 = "เอาละ งั้นเราก็ไปกันเลยค่ะ!"
1010705-48 = "[s] \"ว่าแต่เราจะไปไหนกันเหรอ?\""
1010705-49 = "ก็ไปสนุกกับงานอดิเรกยังไงล่ะคะ!"
1010705-50 = "แต่ถ้าสงสัยว่ามันคืออะไรละก็~"
1010705-51 = "เดี๋ยวไปถึงก็ได้รู้เองค่ะ!"
1010705-54 = "ห้องชมรมศึกษาประวัติศาสตร์"
1010705-57 = "ยะฮู้ว~ ชมรมศึกษาประวัติศาสตร์ทุกคน สบายดีมั้ยคะ~!"
1010705-58 = "อ๊ะ! จิอากิจังนี่นา!"
1010705-59 = "ไม่ได้เจอกันนานเลยนะ! สบายดีมั้ย?"
1010705-60 = "นั่นน่ะสิคะ~ ไม่ได้เจอกันนานเลย ได้เจออีกครั้งก็น่าดีใจนะคะ!"
1010705-62 = "[ns] (งานอดิเรกของจิอากิ... คือการศึกษาประวัติศาสตร์เหรอ?)"
1010705-63 = "กิจกรรมของชมรมราบรื่นดีมั้ยคะ?"
1010705-64 = "ก็เรื่อยๆ น่ะ อ้อ จริงสิ! หนังสือโบราณที่จิอากิจังเอามาให้พวกเราเมื่อไม่นานมานี้น่ะ!"
1010705-65 = "เล่มนั้นมันของปลอมแบบไม่ต้องสงสัยเลย"
1010705-66 = "ว้าย~! จริงเหรอคะ! ฉันคิดว่าตัวเองเจอสมบัติในร้านหนังสือเก่าแล้วเสียอีก!"
1010705-67 = "ฮ่าฮ่าฮ่า! หาไปเรื่อยๆ เดี๋ยวก็เจอของจริงเข้าสักวันละน่า!"
1010705-68 = "เอาละๆ อย่ามัวยืนกันอยู่เลย เข้ามานั่งข้างในเถอะ! เดี๋ยวฉันชงชามาให้นะ!"
1010705-69 = "เย้! ขอบคุณค่ะ~ ขอให้คุณครูด้วยได้มั้ยคะ?"
1010705-70 = "แน่นอนอยู่แล้ว~ เอาละ คุณครูก็มานั่งทางนี้สิ!"
1010705-77 = "[ns] \"จิอากิอยู่ทั้งแพนเดโมเนียม โซไซตี้กับชมรมศึกษาประวัติศาสตร์งั้นเหรอ?\""
1010705-78 = "อืม น่าจะต้องบอกว่าฉันเป็นสมาชิกรับเชิญของชมรมนี้น่ะค่ะ"
1010705-79 = "ถึงจะไม่ได้มาอยู่ด้วยกันตลอด แต่ก็สนุกทุกครั้งที่มาเลยละ"
1010705-80 = "ใช่ค่ะ! ฉันสังกัดอยู่ที่แพนเดโมเนียม โซไซตี้ค่ะ~"
1010705-81 = "น่าเสียดายเหมือนกันนะคะที่อยู่หลายชมรมไม่ได้"
1010705-82 = "[s] \"งั้นเหรอ? คิดไม่ถึงเลยนะว่าจะมีงานอดิเรกเป็นเรื่องประวัติศาสตร์\""
1010705-83 = "อ๊ะ เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย!"
1010705-84 = "งั้นฉันขอตัวก่อนนะคะ! วันนี้สนุกมากเลยค่ะ~!"
1010705-85 = "อื้อ! ไว้แวะมาเล่นใหม่นะ!"
1010705-86 = "มาแน่นอนอยู่แล้วค่ะ~!"
1010705-89 = "[ns3] \"สนุกกับงานอดิเรกต่อก็ได้นี่นา?\"\n[ns4] \"อยู่ต่ออีกหน่อยสิ ไหนๆ ก็ได้หยุดทั้งทีนะ\""
1010705-92 = "อืม ใจฉันก็อยากทำแบบนั้นอยู่หรอกค่ะ..."
1010705-93 = "ฮุฮุ แต่ประวัติศาสตร์ไม่ใช่งานอดิเรกของฉันนี่คะ!"
1010705-94 = "[s] \"ไม่ใช่งั้นเหรอ...?\""
1010705-95 = "เอาละ ไปกันต่อเลยค่ะ~!"
1010705-98 = "สนามฝึกซ้อม ชุมนุมแคชบอล"
1010705-99 = "อ๊ะ! จิอากิจังนี่นา!"
1010705-103 = "สวัสดีค่ะ~ ตั้งใจฝึกซ้อมกันเหมือนทุกวันเลยนะคะ!"
1010705-104 = "หายหน้าหายตาไปนานเลยนะ! พอไม่มีจิอากิจัง เราก็เบื่อกันมากเลยรู้มั้ย!"
1010705-105 = "วันนี้มาเล่นด้วยกันได้อยู่ใช่มั้ย?"
1010705-106 = "ได้สิคะ~!"
1010705-107 = "[s] \"จิอากิ จริงๆ แล้วงานอดิเรกคือการเล่นกีฬาเหรอ?\""
1010705-108 = "อะฮ่าฮ่า ฉันเป็นสมาชิกรับเชิญของที่นี่เหมือนกันค่ะ! ฉันไม่มีทักษะขนาดที่จะเป็นสมาชิกชุมนุมนี้ได้#nหรอกค่ะ~"
1010705-109 = "ถึงจิอากิจะขว้างบอลไม่เก่ง แต่ถ้ามีจิอากิอยู่ด้วย บรรยากาศของชุมนุมเราก็ยิ่งดีขึ้นน่ะ!"
1010705-110 = "ถ้ามาได้บ่อยๆ ก็คงจะดีนะ!"
1010705-111 = "เย้! แล้วฉันจะพยายามอย่างเต็มที่เลยค่ะ~!"
1010705-112 = "เอาละ ถ้างั้นก็! เพลย์บอล!"
1010705-115 = "ห้องชมรมวิจัยบอร์ดเกม"
1010705-116 = "อึก... เจอแบบนี้ก็ต้องใช้การ์ดใบนี้..."
1010705-117 = "หึหึหึ สมกับที่เป็นจิอากิจังเลยนะ ถึงทักษะจะไม่เท่าไร แต่เรื่องรีแอกชั่นต้องให้คะแนนเลย"
1010705-118 = "เกินไปแล้วนะคะ~ ฉันกำลังครุ่นคิดอย่างหนักที่สุดในชีวิตเลยนะ!"
1010705-121 = "การประชุมของชุมนุมตระเวนกินร้านเด็ด"
1010705-127 = "ห้องทดลองชมรมวิจัยพลังงานความร้อน"
1010705-135 = "อื้อ~ เท่านี้ก็ครบแล้วละค่ะ!"
1010705-136 = "ได้ใช้เวลาในวันหยุดแบบนี้ละค่ะถึงจะถึงใจ!"
1010705-137 = "อ๊ะ สีหน้าคุณครูเหมือนจะเหนื่อยเลยนะคะ... หรือว่าตารางของฉันมันยุ่งเกินไปคะ?"
1010705-138 = "[s] \"ไม่หรอก ไม่เป็นไร ว่าแต่...\""
1010705-140 = "[ns] \"สรุปแล้วงานอดิเรกของจิอากิคืออะไรเหรอ...?\""
1010705-141 = "ฉันก็ให้คุณครูเห็นมาทั้งวันแล้วนี่คะ?"
1010705-142 = "คะ...? ฉันไปทำหลายๆ กิจกรรมในหลายๆ ชมรม ก็เลยไม่รู้ว่าสิ่งไหนจากที่ทำทั้งหมดในวันนี้คือ#nงานอดิเรกของฉัน... งั้นเหรอคะ?"
1010705-146 = "อะฮ่า! ก็ไม่แปลกนะคะที่คุณครูจะคิดอย่างนั้น~!"
1010705-147 = "งานอดิเรกของฉันก็คือการได้พบเจอเพื่อนๆ ค่ะ!"
1010705-148 = "ฉันชอบไปเจอเพื่อนๆ ที่ทำกิจกรรมในที่ต่างๆ พูดคุยกัน เล่นกีฬาด้วยกัน แล้วก็เล่นเกมด้วยกัน~!"
1010705-149 = "เพราะงั้นฉันก็เลยไปเป็นสมาชิกรับเชิญของหลายๆ ชมรมยังไงล่ะคะ~"
1010705-150 = "[s5] \"แต่ก็ไม่ได้จริงจังสักอย่างใช่มั้ย...\"\n[s6] \"แต่ก็เป็นเป็ดในทุกกิจกรรมที่ทำเลยใช่มั้ย...?\""
1010705-153 = "อ๊ะ! พูดแทงใจดำนะคะเนี่ย~ แต่ก็จริงอย่างที่คุณครูว่าค่ะ"
1010705-154 = "เอาละ ตอนนี้ฉันอยากฟังความรู้สึกของคุณครูแล้วละค่ะ~ วันนี้ก็เป็นวันหยุดของคุณครูด้วยนี่คะ!"
1010705-155 = "วันนี้เป็นยังไงบ้างคะคุณครู? รู้สึกยังไงที่ได้ใช้เวลาในวันหยุดกับฉันคะ?"
1010705-156 = "[s] \"อื้อ เป็นประสบการณ์ที่แปลกใหม่เลยละ\""
1010705-157 = "ได้ยินแบบนี้ก็ดีใจนะคะ~! การพบปะเพื่อนๆ เป็นเรื่องสนุกใช่มั้ยล่ะคะ?"
1010705-158 = "เอาละ งั้นเราคงต้องบอกลากันตรงนี้แล้วค่ะ"
1010705-159 = "ฉันจะกลับไปห้องทำงานของแพนเดโมเนียม โซไซตี้ แล้วทำสกู๊ปข่าวของ <แพนเดโมเนียม โซไซตี้#nรายสัปดาห์> ฉบับสัปดาห์หน้าค่ะ!"
1010705-160 = "[s7] \"จะ... จะไปทำงานเลยเหรอ ไหนว่าวันนี้จะพักผ่อนไง?\"\n[s8] \"วันนี้ไม่ได้จะพักผ่อนหรอกเหรอ?\""
1010705-163 = "พักผ่อนเหรอคะ? ฉันก็พักไปแล้วนี่คะ?"
1010705-164 = "ได้เจอเพื่อน ได้พูดคุยกัน เล่นกีฬาด้วยกัน! ถ้านี่ไม่ใช่การพักผ่อน แล้วจะเรียกว่าอะไรล่ะคะ~!"
1010705-165 = "[s] \"นะ... น่าทึ่งสุดๆ ไปเลย...\""
1010705-166 = "คะ? แต่ฉันคิดว่ามันธรรมดานะคะ?"
1010705-167 = "เอาละ! งั้นวันนี้ฉันต้องขอตัวก่อนนะคะ~!"

[translation]
1010705-1 = "書記的興趣生活"
1010705-2 = "（就在一如往常忙著工作的時候……）"
1010705-8 = "你好呀，老師～！過得還好嗎？"
1010705-9 = "啊，應該沒有打擾到老師工作吧……？"
1010705-10 = "[s]「沒事，我正好也想休息一下。」"
1010705-11 = "那就好！我這週也打算稍作休息！"
1010705-12 = "嗯？問我是不是發生了什麼事？"
1010705-13 = "沒有哦～單純只是定期休刊而已。"
1010705-14 = "[s]「定期休刊？」"
1010705-15 = "哈哈！沒錯～！"
1010705-16 = "因為《週刊萬魔殿》是週刊的關係，製作流程相當緊湊……#n如果不像這樣刻意休刊一週的話，根本就無法休息！"
1010705-17 = "為了長期經營，適當放鬆也是必須的！大概就是這種感覺～"
1010705-18 = "雖然《週刊萬魔殿》的編輯工作很有趣，但維持動力也是很重要的不是嗎？"
1010705-19 = "所以每兩個月就一定會休刊一週～！"
1010705-20 = "不過休刊歸休刊，其實還是有各種工作得做，因此能休息的也就只有今天一天而已！"
1010705-24 = "咦？怎麼突然感受到了一股羨慕的眼神……"
1010705-25 = "嗯？老師最近工作太多，就連放假都沒辦法好好休息？"
1010705-26 = "原來是這樣啊……既然如此……"
1010705-27 = "今天老師也一起休息吧！"
1010705-28 = "[s]「可，可是工作……！」"
1010705-29 = "就跟我剛才說的一樣，要想走得更遠就不能缺乏放鬆！"
1010705-30 = "與其斷斷續續地忙裡偷閒，不如徹底放鬆一天再全力以赴比較好哦～？"
1010705-31 = "[s]「這麼說……好像也有道理……？」"
1010705-32 = "對吧對吧？"
1010705-33 = "這才是明智的決定～！"
1010705-34 = "好，那麼就先離開桌子，起來伸個懶腰吧～"
1010705-35 = "待會老師可以悠閒地睡個午覺，或者要讀書玩遊戲也行！"
1010705-36 = "不然也可以嘗試一些平常沒時間做的運動和興趣～！"
1010705-37 = "……嗯？老師太久沒休假，都不知道要做什麼了？"
1010705-38 = "[s]「千秋平常休息的時候都會做什麼呢？」"
1010705-39 = "我嗎？"
1010705-40 = "唔嗯……就普通地做一些跟興趣相關的活動吧？"
1010705-41 = "[s1]「那今天就交給千秋來安排吧。」\n[s2]「告訴我千秋的興趣吧。」"
1010705-44 = "啊，好像也不錯呢！"
1010705-45 = "居然能跟老師一起行動，感覺就超級有趣的！"
1010705-46 = "說不定還能成為下週《週刊萬魔殿》的報導內容哦！"
1010705-47 = "好，那我們出發吧！"
1010705-48 = "[s]「你打算去哪裡呢？」"
1010705-49 = "當然是享受我的興趣囉！"
1010705-50 = "至於要做什麼嘛～"
1010705-51 = "去了就知道了！"
1010705-54 = "歷史研究部的部室"
1010705-57 = "呀齁～歷史研究部的各位，大家過得好嗎～！"
1010705-58 = "啊！這不是千秋醬嗎！"
1010705-59 = "好久不見！最近過得好嗎？"
1010705-60 = "嗯，當然當然～#n好久不見了呢，真高興見到你們！"
1010705-62 = "[ns]（千秋的興趣是……歷史研究？）"
1010705-63 = "社團活動都還順利嗎～？"
1010705-64 = "馬馬虎虎吧？#n啊，對了！之前千秋醬不是找來了一本古書嗎？"
1010705-65 = "那完全是假的哦？"
1010705-66 = "嗚啊～！真可惜！#n我還以為在舊書店挖到寶了說！"
1010705-67 = "哈哈！別擔心，只要堅持下去，遲早會發現寶物的！"
1010705-68 = "來來來，別站在這邊，進來坐吧！我幫你泡茶！"
1010705-69 = "啊哈！謝謝～#n那能麻煩你也幫老師準備一份嗎？"
1010705-70 = "當然沒問題～來，老師這邊請！"
1010705-77 = "[ns]「千秋同時是萬魔殿跟歷史研究部的成員嗎？」"
1010705-78 = "唔嗯……準確來說，算是客座成員吧？"
1010705-79 = "雖然沒辦法參加所有活動，但每次只要他來都讓人很開心。"
1010705-80 = "沒錯！我終究還是萬魔殿的成員嘛～"
1010705-81 = "老師就當我是來湊一腳的吧！"
1010705-82 = "[s]「原來如此。沒想到你的興趣是歷史──」"
1010705-83 = "啊，已經這麼晚了！"
1010705-84 = "我差不多該走囉！今天玩得很開心～！"
1010705-85 = "嗯嗯！還要再來哦！"
1010705-86 = "當然當然～！"
1010705-89 = "[ns3]「再多享受一下興趣也沒關係吧？」\n[ns4]「畢竟是難得的假日。」"
1010705-92 = "嗯，雖然我也很想這麼做……"
1010705-93 = "呵呵，不過我的興趣並不是歷史！"
1010705-94 = "[s]「原來不是嗎……？」"
1010705-95 = "那麼，我們趕緊走吧～！"
1010705-98 = "投接球同好會的練習會場"
1010705-99 = "啊！是千秋醬！"
1010705-103 = "你們好呀～今天也很努力呢！"
1010705-104 = "好久不見！#n最近千秋醬不在，我們都好寂寞哦！"
1010705-105 = "今天能稍微玩一下吧？"
1010705-106 = "當然沒問題～！"
1010705-107 = "[s]「難道千秋真正的興趣是運動嗎？」"
1010705-108 = "啊哈哈，其實我在這裡也只是客座成員啦！#n實力跟正式成員還是有差距的～"
1010705-109 = "技術姑且不論，只要有千秋醬在，同好會的氣氛就會活躍起來！"
1010705-110 = "真希望你能常來！"
1010705-111 = "啊哈！我會努力的～！"
1010705-112 = "好，那麼就開始吧！Play ball！"
1010705-115 = "桌遊研究部的部室"
1010705-116 = "唔嗯……在這種情況下用這張牌……"
1010705-117 = "哼哼哼，不愧是千秋醬。#n雖然實力不怎麼樣，反應卻是一流的呢。"
1010705-118 = "好過分～我可是經歷了人生的重大思考耶！"
1010705-121 = "美食巡訪同好會的定期聚會"
1010705-127 = "火力研究部的實驗場"
1010705-135 = "哎呀～這樣就都轉過一圈了呢！"
1010705-136 = "果然假日就得這樣才過癮！"
1010705-137 = "啊，老師看起來好像有點累的樣子……是不是太勉強你了？"
1010705-138 = "[s]「別擔心，我沒事。不過話又說回來……」"
1010705-140 = "[ns]「千秋的興趣到底是什麼呢……？」"
1010705-141 = "就跟我今天展示給老師看的一樣啊？"
1010705-142 = "……嗯？#n因為參與的社團和活動太多種，所以搞不清楚哪個才是我真正的興趣……是嗎？"
1010705-146 = "啊哈！老師會這麼想也不奇怪呢～！"
1010705-147 = "其實～我的興趣就是跟朋友們見面唷！"
1010705-148 = "我喜歡在不同的地方，和從事不同活動的朋友們一起談天、運動、玩遊戲～！"
1010705-149 = "所以才會以客座成員的身份參加各種社團～"
1010705-150 = "[s5]「這麼說來，千秋你……」\n[s6]「無論什麼活動，感覺好像都不是很專業……」"
1010705-153 = "唔啊！好過分～雖然是事實沒錯。"
1010705-154 = "那麼現在，可以讓我聽聽老師的感想嗎～？#n畢竟今天也是老師的休假嘛！"
1010705-155 = "你覺得怎麼樣呀，老師？和我一起休假的感覺如何！"
1010705-156 = "[s]「嗯，非常新鮮哦。」"
1010705-157 = "那真是太好了～！#n跟許多朋友們見面，果然會讓人很愉快吧？"
1010705-158 = "那麼，我們也差不多該告別了！"
1010705-159 = "我得趕緊回萬魔殿的辦公室，開始編輯下週的《週刊萬魔殿》才行！"
1010705-160 = "[s7]「現，現在就要回去工作？」\n[s8]「不用休息一下嗎？」"
1010705-163 = "休息？我們剛才不是一直在休息嗎？"
1010705-164 = "和朋友見面、聊天、運動！這些都是休息啊～！"
1010705-165 = "[s]「真，真厲害……」"
1010705-166 = "會嗎？我覺得很普通呀～？"
1010705-167 = "那麼！我今天就先告辭了～！"

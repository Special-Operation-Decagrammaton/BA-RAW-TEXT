[translation]
1010705-1 = "The Secretary's Hobby"
1010705-2 = "I was working as usual when..."
1010705-8 = "Hello, Sensei! How have you been?"
1010705-9 = "Ah, did I bother you in the middle of work...?"
1010705-10 = "[s] \"It's fine. I was going to take a break anyway.\""
1010705-11 = "I'm glad to hear that! I'm taking a break too this week!"
1010705-12 = "Hm? What happened?"
1010705-13 = "Nothing much, it's just a regular hiatus!"
1010705-14 = "[s] \"Regular hiatus?\""
1010705-15 = "Haha! Yup, that's right!"
1010705-16 = "Since \"Weekly Pandemonium Society\" is, you know, weekly, taking a break just leads to more crunch later on, unless I decide to just take the whole week off!"
1010705-17 = "It's a marathon, not a sprint, you know! Or something like that."
1010705-18 = "I really do enjoy working on it, so it's important I set myself up to keep going and not burn out."
1010705-19 = "That's why I make sure to take at least one week off every two months!"
1010705-20 = "Although I do have OTHER work to do, so I'm really just taking this one day off!"
1010705-24 = "You look, um... Is that envy?"
1010705-25 = "Oh, you're so swamped lately you can't even take any weekends off?"
1010705-26 = "Mmm, I see... In that case..."
1010705-27 = "You should take a break today too, Sensei!"
1010705-28 = "[s] \"B-But the work...!\""
1010705-29 = "Like I said, you can't keep going forever without any rest!"
1010705-30 = "Would you rather take a day off and get a fresh start tomorrow, or just pop in and out of super-super-super short breaks that don't really help you?"
1010705-31 = "[s] \"Hmm, you might have a point...\""
1010705-32 = "Right? Right?"
1010705-33 = "Great choice!"
1010705-34 = "Now come on, get up from your desk and stretch!"
1010705-35 = "Then enjoy a nice nap, or read a book, or play games, or something!"
1010705-36 = "Or you could exercise, or enjoy a hobby you don't usually have time for!"
1010705-37 = "...What? You've been working so hard, you can't think of what else to do?"
1010705-38 = "[s] \"What do you do on your days off, Chiaki?\""
1010705-39 = "Me?"
1010705-40 = "Um... Enjoy my hobby, mostly. Like everybody else, I guess."
1010705-41 = "[s1] \"You can pick the activity, then.\"\n[s2] \"Tell me about your hobby.\""
1010705-44 = "Ah, sure thing!"
1010705-45 = "You and me, Sensei, we're going to have a blast together!"
1010705-46 = "It might even give me something to write about next week!"
1010705-47 = "Let's hurry up and go!"
1010705-48 = "[s] \"Go where?\""
1010705-49 = "To enjoy the hobby, of course!"
1010705-50 = "If you're wondering what it is..."
1010705-51 = "...you'll find out when you get there!"
1010705-54 = "Historical Society Room"
1010705-57 = "Yahoo! Hello, Historical Society. How have you been?"
1010705-58 = "Ah, it's Chiaki!"
1010705-59 = "It's been a while! How have you been?"
1010705-60 = "I'm doing great! It's nice to see everyone again!"
1010705-62 = "[ns] \"(Chiaki's hobby is...historical research?)\""
1010705-63 = "What's the club been up to?"
1010705-64 = "Eh, kinda... Oh, right! Remember that old text you brought us last time?"
1010705-65 = "Turns out it was a total fake!"
1010705-66 = "Oh! Really? I thought I hit the jackpot when I found it in that used bookstore!"
1010705-67 = "Hahaha! Well, that's how it'll feel when you find a real one!"
1010705-68 = "Now come on in. Have a seat! We'll pour you some tea!"
1010705-69 = "Ahaha! Thank you! Could you get some for Sensei as well?"
1010705-70 = "Of course! This way, Sensei!"
1010705-77 = "[ns] \"Chiaki, you're in the Pandemonium Society AND the Historical Society?\""
1010705-78 = "Um, I'm more like a guest member here, I guess?"
1010705-79 = "She can't be around all the time, but it's always great to have her here."
1010705-80 = "That's right! Since I'm part of the Pandemonium Society in the first place!"
1010705-81 = "So the best I can do is scratch the surface, I'd say!"
1010705-82 = "[s] \"I see. I didn't know you had history as a hobby—\""
1010705-83 = "Oh, look at the time!"
1010705-84 = "I'll be on my way, then! I had fun today!"
1010705-85 = "Yeah, for sure! Hope to see you soon!"
1010705-86 = "Of course!"
1010705-89 = "[ns3] \"You're not going to spend more time with your hobby?\"\n[ns4] \"It's your day off, after all.\""
1010705-92 = "Mmm, I would like to stick around..."
1010705-93 = "Heehee, but history isn't my hobby!"
1010705-94 = "[s] \"It's not...?\""
1010705-95 = "Let's get going, then!"
1010705-98 = "Catch Club Practice Site"
1010705-99 = "Ah, it's Chiaki!"
1010705-103 = "Hello, looks like you're working hard as usual!"
1010705-104 = "It's been a while! It was no fun without you around!"
1010705-105 = "Got time to play today?"
1010705-106 = "Of course!"
1010705-107 = "[s] \"Your hobby is sports, Chiaki?\""
1010705-108 = "Well, I'm kind of a guest member here too. I'm not good enough at sports to compete with anybody here!"
1010705-109 = "Competitive or not, she always makes things brighter when she's around!"
1010705-110 = "Hope you come by more often!"
1010705-111 = "Aha! I'll try my best!"
1010705-112 = "Now then! Play ball!"
1010705-115 = "Board Game Research Club Room"
1010705-116 = "Ugh... So in this situation, I'd probably want to play THIS card, maybe...?"
1010705-117 = "Heehee, Chiaki's not great at the games, but her reactions are golden."
1010705-118 = "So mean! This is a big life choice here!"
1010705-121 = "Culinary Hotspot Exploration Club"
1010705-127 = "Firepower Research Club Test Site"
1010705-135 = "Phew, we really made the rounds today!"
1010705-136 = "See, it doesn't feel like a real day off unless I spend it like this!"
1010705-137 = "Oh, you look tired, though... Hope I didn't drag you around TOO much!"
1010705-138 = "[s] \"No, it's fine. But let me ask real quick...\""
1010705-140 = "[ns] \"Just what IS your actual hobby...?\""
1010705-141 = "My hobby? You've been seeing me at it all day!"
1010705-142 = "...Huh? Oh, you couldn't tell which of the activities I was into the most?"
1010705-146 = "Ahaha! Yeah, I see how that could get confusing!"
1010705-147 = "Well, my hobby is just hanging out with all my friends!"
1010705-148 = "I go around, join in with them, play all their different sports and games, and all of that!"
1010705-149 = "That's why I'm a guest member in so many clubs!"
1010705-150 = "[s5] \"Now that I think about it...\"\n[s6] \"You weren't a pro at any one of those activities...\""
1010705-153 = "Well...that's kind of blunt, but yup, that's true enough!"
1010705-154 = "But this was YOUR day off too. How'd you like it, Sensei?"
1010705-155 = "Did you have a good time, joining me on my day off?"
1010705-156 = "[s] \"I did. It was a new experience.\""
1010705-157 = "I'm glad! It's always great to meet so many friends, right?"
1010705-158 = "So I guess we part ways here, then!"
1010705-159 = "I've got to get cracking on next week's issue!"
1010705-160 = "[s7] \"Y-You're going to work now?\"\n[s8] \"You're not going to rest?\""
1010705-163 = "Well, I've been resting all day!"
1010705-164 = "Meeting friends, chatting, playing sports, that's all resting to me!"
1010705-165 = "[s] \"That's kind of amazing...\""
1010705-166 = "Really? I thought it was normal."
1010705-167 = "Anyway, see ya!"

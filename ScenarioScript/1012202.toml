[translation]
1012202-1 = "อีกด้านที่ฉันไม่รู้จัก"
1012202-3 = "ว้าว คุณครูนี่นา!"
1012202-4 = "กำลังทำอะไรอยู่เหรอ?"
1012202-5 = "เดินเล่นอยู่สินะ ที่นี่เป็นยังไงบ้างล่ะ?"
1012202-6 = "[s] \"เป็นชายหาดที่สวยเลยละ\""
1012202-7 = "ฮิฮิ ดีใจที่คุณครูคิดแบบนั้นนะ"
1012202-8 = "สภาน้ำชามีสถานที่ส่วนตัวแบบนี้เยอะหรือเปล่าน่ะเหรอ?"
1012202-9 = "อืม~ ฉันก็ไม่ค่อยรู้รายละเอียด..."
1012202-10 = "แต่ก็น่าจะเยอะนะ? คนอื่นที่ไม่ใช่ฉันน่าจะรู้ดีกว่าน่ะ"
1012202-11 = "อ๊ะ คุณครู จะว่าไป ฉันได้ยินมาว่าครั้งนี้ภาพลักษณ์ของสภาน้ำชาเปลี่ยนไปนิดหน่อย"
1012202-12 = "คุณครูว่าส่วนไหนที่เปลี่ยนไปเหรอ?"
1012202-13 = "[s] \"ภาพลักษณ์อีกด้านของทุกคนก็แปลกใหม่ดีนะ\""
1012202-14 = "อะฮะฮ่า ก็น่าจะเป็นอย่างนั้นนะ เดิมทีเราได้เจอคุณครูเพราะเรื่องงานบ่อยๆ นี่เนอะ"
1012202-16 = "(แล้วคุณครูกับมิกะก็คุยกันอีกด้านหนึ่งของสมาชิกสภาน้ำชาที่เพิ่งมีโอกาสได้เห็น)"
1012202-18 = "แต่มองอีกมุมหนึ่ง มันก็เป็น 'เรื่องที่ปกติ' หรือเปล่า?"
1012202-19 = "เราก็แค่เป็นธรรมชาติน่ะ ถ้าจะให้พูดก็คงต้องบอกว่าเป็นนิสัยเดิมของเรา อ่ะฮ่าฮ่า"
1012202-20 = "[s] \"มิกะคงรู้จักด้านแบบนั้นอยู่แล้วสินะ\""
1012202-21 = "อื้อ☆ ก็พวกฉันรู้จักกันมานานแล้วนี่นา!"
1012202-22 = "เพราะงั้นถ้าเห็นด้านที่แตกต่างกับปกติแม้แค่เล็กน้อย~ ฉันก็รู้ได้เลยละ"
1012202-23 = "อย่างเช่น... ช่วงนี้ดูไม่ค่อยมีพลังงานเลย"
1012202-24 = "ฉันก็เลยคิดว่าน่าจะได้มาพักผ่อนหย่อนใจกันบ้างน่ะ!"
1012202-25 = "ถึงจะไม่รู้ว่ามันออกมาดีหรือเปล่าก็เถอะนะ..."
1012202-26 = "[s] \"เป็นการเปลี่ยนบรรยากาศที่ดีเลยละ\""
1012202-27 = "หวังว่าจะเป็นอย่างนั้นนะ♪"
1012202-28 = "ต่อให้มาถึงที่นี่ แต่ฉันก็ไม่มีบุคลิกลักษณะใหม่ๆ เหมือนกับเพื่อนๆ ก็เถอะ"
1012202-29 = "หืม? ฉันก็เหมือนเดิมตลอดนั่นละ"
1012202-30 = "ก็ฉันเป็นคนน่ารำคาญและชอบก่อปัญหาอยู่เรื่อยเลยนี่นา"
1012202-31 = "ครั้งนี้ปัญหามากมายที่เกิดขึ้นก็เป็นเพราะฉันเหมือนเดิม..."
1012202-32 = "แหะๆๆ จู่ๆ ก็เศร้าขึ้นมาเลย"
1012202-33 = "แต่ยังไงฉันก็เสมอต้นเสมอปลายละเนอะ"
1012202-34 = "[s] \"แต่ครูรู้จักอีกด้านของมิกะนะ\""
1012202-35 = "หืม?"
1012202-36 = "[s] \"มิกะเอาใจใส่เพื่อนดีมากเลยนี่?\""
1012202-37 = "งะ... งั้นเหรอ...?"
1012202-38 = "ฉันว่าไม่ใช่อย่างนั้นหรอก..."
1012202-39 = "รู้สึกอย่างนั้นได้จากหลายสิ่งเลยงั้นเหรอ?"
1012202-43 = "คุณครูประเมินฉันดีไปหรือเปล่า?"
1012202-44 = "ฉันไม่ใช่เด็กดีอะไรสักหน่อย..."
1012202-45 = "[ns1] \"มิกะแค่ยังไม่รู้ตัวน่ะ...\"\n[ns2] \"ครูว่ามิกะมีข้อดีเยอะเลยนะ\""
1012202-49 = "อะไรกัน... ทำไมถึงทำหน้าจริงจังแบบนั้น..."
1012202-50 = "..."
1012202-53 = "คุณครู... ฉันรู้สึกเหมือนคุณครูกำลังหาอีกด้านของฉันที่ฉันไม่รู้จักเลย..."
1012202-54 = "แต่ว่า... คุณครูอาจจะพูดถูกก็ได้นะ"
1012202-55 = "ถึงฉันจะสังเกตไม่เห็น แต่ฉันก็อาจจะมีข้อดีอยู่บ้างก็ได้นะ?!"
1012202-56 = "ถ้าฉันเสน่ห์แพรวพราวจนกลายเป็นคนดังขึ้นมาจะทำยังไงละเนี่ย? จู่ๆ ก็คิดแบบนี้ขึ้นมาเลยนะ☆"
1012202-58 = "(จากนั้นคุณครูก็พูดคุยเรื่องนู่นนี่กับมิกะที่ดูตื่นเต้นมากกว่าปกติ แล้วจึงค่อยกลับไป)"

[translation]
1012202-1 = "A Side of Me That Even I Didn't Know"
1012202-3 = "Whoa, it's Sensei!"
1012202-4 = "What are you up to?"
1012202-5 = "So, a walk, huh? How are you liking it?"
1012202-6 = "[s] \"It's a nice beach.\""
1012202-7 = "Heehee, I'm glad you think so. I put a lot of work into it!"
1012202-8 = "You want to know if the Tea Party has any other private properties?"
1012202-9 = "Hmm. I'm not so sure..."
1012202-10 = "But...probably? I'm not the one to ask."
1012202-11 = "Ah, Sensei. So, someone told me that you've changed your opinion of the Tea Party."
1012202-12 = "So, like, in what ways?"
1012202-13 = "[s] \"It was refreshing to see you all loosen up.\""
1012202-14 = "Ahaha, I see. I guess it's because you finally saw us \"in the wild.\""
1012202-16 = "I spoke with Mika about seeing the Tea Party members' new sides."
1012202-18 = "\"How they're normally like\"? Hmm, that's tough to answer."
1012202-19 = "Maybe they're showing their original personalities...like who they would have been without all THIS, haha."
1012202-20 = "[s] \"I suppose you've seen all their sides, Mika!\""
1012202-21 = "Yeah! We have known each other for a while! ☆"
1012202-22 = "I can always tell if something's going on with them."
1012202-23 = "Like... Oh, they look tired today, distracted, something like that..."
1012202-24 = "That's how I knew they both needed to relax. And what better way than a vacation?"
1012202-25 = "...Although I'm not sure if it went all that well."
1012202-26 = "[s] \"I think it was a nice change for them.\""
1012202-27 = "I hope so! ♪"
1012202-28 = "Unlike them, I don't really have a fresh side to show."
1012202-29 = "Hm? I mean, I'm always the same."
1012202-30 = "I'm that bratty little troublemaker, right?"
1012202-31 = "Even this time when I really tried, I STILL caused all this chaos."
1012202-32 = "...Ahahaha. It's kind of sad, isn't it?"
1012202-33 = "But, at least I'm consistent, right?"
1012202-34 = "[s] \"You have other sides, Mika.\""
1012202-35 = "H-Hmm?"
1012202-36 = "[s] \"You take care of your friends, didn't you?\""
1012202-37 = "I-Is that so...?"
1012202-38 = "I don't really think I did..."
1012202-39 = "You insist? Oh, haha, then go on!"
1012202-43 = "But seriously. You're far too generous."
1012202-44 = "I'm not good. We all know that."
1012202-45 = "[ns1] \"You're better than you know.\"\n[ns2] \"I see so many good things in you.\""
1012202-49 = "Seriously... You're saying that with a straight face?"
1012202-50 = "..."
1012202-53 = "I feel like you're seeing something I don't. I'm really not—"
1012202-54 = "...But maybe you're right."
1012202-55 = "There might be more to me. There could be a side of me that even I don't know about yet!"
1012202-56 = "Like what if I turn out to be so secretly charming that I get super famous? Just kidding! ☆"
1012202-58 = "Mika's spirits lifted, and we continued chatting."

[translation]
2901-1 = "เหล่าเด็กสาวจึงได้มารวมตัวกัน 1"
2901-7 = "ห้องเรียนแห่งหนึ่งในอาคารเรียนเก่าที่ 38 เฮียกคิยาโค"
2901-8 = "อ๊ากก! ในที่สุดก็ถ่ายทำเสร็จสัก~ ที~ น้า~"
2901-9 = "วะ... วะ... วันนี้ก็ทำได้ยอดเยี่ยมมากเลยค่ะ... ทะ... ท่านหัวหน้า.... เชิญดื่มน้ำค่ะ...!"
2901-10 = "อ๊ะ ขอบใจนะ สึคุโยะ"
2901-11 = "นี่ผ้าสำหรับเช็ดเหงื่อค่ะ... แล้วก็มะ...มีมะนาวดองน้ำผึ้งที่ฉันทำมาจากบ้าน ลองทานดูสิคะ...!"
2901-12 = "โอ้~ เตรียมมาถึงขนาดนี้เลยเหรอ? "
2901-13 = "อะฮะฮ่า~ จะกินให้อร่อยเลย"
2901-14 = "...ซะที่ไหนกันล่ะ! นี่มันแพ็กเกจแบบเดียวกับของจากชมรมกีฬาเลยไม่ใช่เหรอ! เอาจริงหน่อยสิ! นี่เป็นการชุมนุมระดับประเทศเลยนะ!"
2901-15 = "อะ...อืม สึคุโยะเตรียมตัวมาอย่างดีเลยนะ~"
2901-17 = "กะ... กะ... ก็เพราะว่าทั้งหมดที่ฉันทำได้... มันมีเพียงเท่านี้น่ะค่ะ..."
2901-18 = "หือ? หมายความว่ายังไงน่ะ? การถ่ายทำวันนี้สึคุโยะช่วยได้เยอะเลยนะ"
2901-19 = "ถ้าสึคุโยะไม่ช่วยถือแผ่นรีเฟล็กซ์ให้ในตอนที่ข้าน้อยต้องการละก็..."
2901-20 = "ฉากที่ใช้วิชานินจาปะทะกัน ชิ้ง! จนแสงเป็นประกาย"
2901-21 = "ก็คงถ่ายไม่ได้แน่นอนเลย~?"
2901-22 = "ยะ... อย่างงั้นเหรอคะ? ตะ.. แต่ว่า ฉันอยากจะทำตัวให้เป็นประโยชน์กับการถ่ายทำของท่านหัวหน้า#nมากกว่านี้..."
2901-23 = "ฉะ... ฉันทำได้แค่ช่วยเหลือระหว่างถ่ายทำเล็กๆ น้อยๆ เท่านั้นเอง..."
2901-24 = "ถะ... ถึงแม้จะช่วยเหลือเพียงแค่นิดเดียว... ก็กลายเป็นแบบนั้นไปซะได้"
2901-25 = "ระ... เรื่องเมื่อกี้น่ะเหรอ"
2901-27 = "สึคุโยะ! เอาละ! นี่! ถือแผ่นรีเฟล็กซ์เอาไว้ก็พอ! ใช่! ตรงนั้นละ!"
2901-28 = "ดะ... ได้ค่ะ! ถือแผ่นรีเฟล็กซ์ เอาไว้ แบบนี้..."
2901-32 = "คะ? อ่า คะ... คือว่า"
2901-36 = "ทะ... ทุกคน...? ถ้ามายืนรอบตัวฉันแบบนี้... ก็แย่น่ะสิคะ..."
2901-37 = "ตะ... ตอนนี้ฉันยุ่งอยู่นะคะ... คือว่า..."
2901-43 = "ถะ... ถ้ามารวมกันตรงขาของฉันแบบนี้ ฉันก็... ขยับไม่ได้... การถ่ายทำก็..."
2901-44 = "คะ... คือว่า ตัวฉันไม่ใช่จุดนัดพบนะคะ...!"
2901-46 = "อ๊ะ! ดูนั่นสิ! แมวเต็มไปหมดเลย!"
2901-47 = "นี่มันการชุมนุมแมวเหมียวเหรอ มาทำอะไรกันเยอะแยะน่ะ?"
2901-48 = "สุดยอดเลย! ต้องถ่ายรูปเก็บไว้หน่อยแล้ว!"
2901-55 = "อะ...อ๊ายยย!! ยะ... อย่าถ่ายรูปนะคะ...!!"
2901-56 = "ตะ... ตอนนี้~ ตอนนี้กำลังถ่ายทำอยู่ค่ะ...!"
2901-58 = "นั่นมันเป็นแค่อุบัติเหตุละนะ~ อืม..."
2901-59 = "ฮึก... ฮือ... สุดท้ายกว่าจะได้เริ่มถ่ายทำจริงๆ ก็เสียเวลาไปตั้ง 30 นาทีเลยนะคะ..."
2901-60 = "ขะ...ขอโทษนะคะท่านหัวหน้า..."
2901-61 = "ทั้งหมด... เป็นเพราะฉันเองค่ะ~~!"
2901-62 = "ไม่ใช่หรอก ไม่ใช่ความผิดของสึคุโยะหรอกนะ"
2901-63 = "บางทีพวกมันอาจจะเข้าใจผิดว่าสึคุโยะที่ถือแผ่นรีเฟล็กซ์อยู่กำลังจะให้อาหารพวกมันก็ได้นะ"
2901-64 = "...ฮึก ถะ... ถ้าอย่างนั้น... ให้ฉันรับหน้าที่นั้นต่อไปจะดีเหรอคะ..."
2901-65 = "เรื่องแบบนั้นคงไม่เกิดซ้ำอีกครั้งหรอกใช่มั้ยล่ะ? ไม่สิ กังวลไปถึงขั้นนั้นก็สมกับที่เป็นสึคุโยะแหละนะ! "
2901-69 = "จะยังไงก็เถอะนะแต่ว่า... การถ่ายทำก็จบลงด้วยดีแล้วละนะ"
2901-70 = "อะแฮ่ม แบบนั้นมันจะพอหรือเปล่าล่ะ? ท่านสึคุโยะ"
2901-72 = "อ๊ะ คะ... คะ? ทะ... ท่านสึคุโยะ ...?"
2901-73 = "อ่า คำใช้เรียกนินจาที่ท่านหัวหน้ามักจะใช้สินะคะ...!"
2901-74 = "เอ่อ...คือ...คือว่า... ค่ะ!"
2901-75 = "เอาเถอะ~ ปล่อยเรื่องในอดีตไป แล้วมุ่งหน้าไปยังอนาคตที่สดใสกันดีกว่า!"
2901-76 = "ถ้างั้นมาตัดต่อวิดีโอที่ถ่ายมาวันนี้กันเลยดีไหม?"
2901-77 = "คะ...ค่ะ!"
2901-84 = "(ผ่านไปประมาณหนึ่งชั่วโมง)"
2901-86 = "อืมม..."
2901-87 = "อืมมม~~"
2901-88 = "ย้ากกกก!"
2901-89 = "ทะ... ท่านหัวหน้า? เป็นอะไรเหรอคะ?"
2901-90 = "จะให้พูดเองมันก็ยังไงๆ อยู่น่ะ"
2901-91 = "แต่แค่นี้มันยังไม่พอ..."
2901-93 = "คือว่า... ที่บอกว่ายังไม่พอ...หมายถึง?"
2901-94 = "ก่อนจะเริ่มถ่ายทำวันนี้ ข้าน้อยมีภาพองค์ประกอบและมุมกล้องที่สมบูรณ์แบบอยู่ในหัว... ว่าควรจะทำยังไงกับวิดีโอนี้ดี"
2901-95 = "พอมีความคิดที่สมบูรณ์แบบอยู่แล้ว แค่ได้สึคุโยะช่วยอีกหน่อยละก็..."
2901-96 = "ถ้าเปลี่ยนตรงนี้อีกนิด~"
2901-97 = "ปรับตรงนี้อีกหน่อย! คิดว่าถ้าทำแบบนี้แล้วจะออกมาเท่มากแท้ๆ"
2901-98 = "แต่พอมาดูแล้ว ไม่ใช่เลย... ไม่เหมือนอย่างที่อยากได้เลย อาจจะต้องเลื่อนการอัปโหลดของวันนี้ไป#nก่อนก็ได้..."
2901-99 = "อ่า..."
2901-100 = "ไม่สิ มันก็... ช่วยไม่ได้นี่นะ เรื่องแบบนี้ก็เกิดขึ้นได้อยู่แล้ว"
2901-101 = "ขะ... ขะ...ขอโทษค่ะ! วะ... ว่าแล้วเชียว ปะ... เป็นเพราะฉันเองค่ะ...!"
2901-102 = "หืม?"
2901-103 = "พะ... เพราะว่าฉันยังบกพร่องอยู่!  ทะ... ท่านหัวหน้าอุตส่าห์พยายามอย่างหนักขนาดนั้น... แต่ฉันกลับ#nทำตัวไร้ประโยชน์...!"
2901-104 = "คะ... คงเป็นเพราะว่าฉัน มะ... ไม่รู้อะไรเกี่ยวกับการเป็นนินจาสักนิดสินะคะ... ฮึก..."
2901-106 = "ไม่ใช่สักหน่อย ไม่ใช่ความผิดของสึคุโยะเลยนะ"
2901-107 = "สึคุโยะยังเป็นนินจามือใหม่อยู่นี่นา คนไม่รู้ไม่ผิดสักหน่อย แล้วก็นะ สึคุโยะกำลังพยายามเรียนรู้อยู่#nไม่ใช่เหรอ?"
2901-108 = "อืม~ ช่วงเวลาแห่งการเติบโตสินะ กำลังเติบโต ไม่ใช่แบบที่เธอคิดหรอก"
2901-109 = "อะ... อ่า อย่างนั้นเหรอคะ..."
2901-110 = "จะว่ายังไงดีล่ะ ช่วงนี้รู้สึกไม่ถูกใจวิดีโอที่ถ่ายบ่อยขึ้นมากเลยน่ะ"
2901-111 = "หรือว่าแค่ไอเดียของเราสองคนมันจะไม่พอแล้วนะ..."
2901-115 = "จะยังไงก็เถอะ คงต้องมาคิดดูอย่างจริงจังแล้วละนะ"
2901-116 = "คิดอย่างจริงจัง หมายความว่า...?"
2901-117 = "จะต้องหาสมาชิกใหม่ยังไงล่ะ"
2901-121 = "...! สะ... สมาชิก... มะ... ใหม่งั้นเหรอคะ?!"
2901-123 = "อืม... ถึงชมรมวิจัยศาสตร์นินจาของเราจะยังไม่ใช่ชมรมอย่างเป็นทางการก็เถอะ..."
2901-124 = "ถึงแม้เราจะไม่มีเงินสนับสนุนชมรม แล้วก็ไม่มีห้องชมรมด้วย"
2901-125 = "ถึงพวกเราจะแค่แอบใช้อาคารเรียนเก่าของสหพันธ์เฮียกคิยาโคทั้งที่ไม่ได้รับอนุญาต...!"
2901-126 = "ถึงจะแค่นั้นก็เถอะ...!"
2901-127 = "ใช่แล้ว! แต่ว่าเรื่องแค่นั้นน่ะขัดขวางเราไม่ได้หรอก!"
2901-128 = "\"ฉันอยากให้นินจาเป็นที่รู้จักมากกว่านี้! อยากให้ทั่วทั้งคิโวทอสได้รับรู้ถึงความเท่! และความยอดเยี่ยม#nของนินจา!\""
2901-129 = "ถึงพวกเราจะเปิดช่อง <วิถีนินจาสาว มิจิรุจจี้> ด้วยปณิธานแบบนั้นมาได้หลายเดือนแล้วก็จริง แต่ว่า..."
2901-130 = "ดูนี่สิ ยอดผู้ติดตามก็ไม่ค่อยเพิ่มขึ้นแล้วด้วย"
2901-131 = "วิดีโอที่ลงไปช่วงนี้ ต่างจากเมื่อก่อนที่มักจะมีคอมเมนต์แย่ๆ ตอนนี้แม้แต่หนึ่งคอมเมนต์ก็ยังไม่มีเลย"
2901-132 = "ไม่กี่วันก่อนมีคนมาคอมเมนต์ ข้าน้อยก็เลยเข้าไปดูด้วยความดีใจ"
2901-133 = "นี่ๆ คอมเมนต์นี้แหละ"
2901-134 = "\"สะ... สนุกมากเลยค่ะ! ยอดเยี่ยมที่สุด!\" จาก O.C..."
2901-135 = "เดี๋ยวก่อน นี่มันคอมเมนต์ของสึคุโยะนี่...!"
2901-136 = "กะ... ก็วิดีโอที่ท่านหัวหน้าทำ มันสนุกจริงๆ นี่คะ..."
2901-137 = "ถึงฉันจะไม่ค่อยจะเข้าใจเนื้อหาสักเท่าไรก็ตาม..."
2901-138 = "ขะ... ขอโทษค่ะ..."
2901-139 = "ไม่ใช่ๆ! ข้าน้อยดีใจนะ ดีใจมากๆ เลยด้วย แต่ว่าแค่นี้มันยังไม่พอหรอกนะ!"
2901-140 = "การที่จะข้ามผ่านสถานการณ์แสนมืดมนนี้ไปได้ เราต้องมีแผนการใหม่..."
2901-141 = "ใช่แล้ว เราต้องการสมาชิกใหม่ยังไงล่ะ!"
2901-142 = "ถะ... ถ้างั้น... สมาชิกใหม่ก็..."
2901-143 = "อะ... เอาเป็น นินจาจริงๆ... ก็คงจะดีไม่น้อยนะคะ แหะๆ..."
2901-144 = "ไม่สิ คือว่า...นินจาตัวจริงคงไม่มาหรอก... อ่า จะว่ายังไงดี ถึงนินจาจะไม่มีอยู่จริงก็เถอะ"
2901-146 = "อ๊ะ อย่างนั้นเหรอคะ...? คะ... คือฉันไม่รู้อะไรเกี่ยวกับนินจา ฉันก็เลย..."
2901-147 = "อืม เรื่องที่รู้และไม่รู้อย่างนั้นเหรอ?! "
2901-148 = "อ่า แต่ว่านินจาน่ะไม่ใช่เรื่องหลอกลวงหรอกนะ!"
2901-149 = "ถึงโลกนี้จะไม่มีนินจาอยู่จริง แต่จิตวิญญาณนินจาน่ะ มันเป็นของจริงนะ!"
2901-150 = "จะต้องเป็นคนที่มีหัวใจและจิตวิญญาณของนินจา ต้องมีภาพลักษณ์เท่ๆ และเยี่ยมยอดแบบนินจา เท่านั้นก็สามารถเรียกได้ว่าเป็น <นินจาที่แท้จริง> ได้!"
2901-155 = "แต่ว่าจะไปหา <นินจาที่แท้จริง> เจอได้ที่ไหนนั่นละคือปัญหา..."
2901-156 = "คนที่ไม่มองว่านินจาเป็นเรื่องงี่เง่า และเข้าใจเรื่องราวของพวกเรา คนที่เหมาะจะมาเป็นส่วนหนึ่ง#nของชมรมวิจัยศาสตร์นินจา"
2901-157 = "คนที่เข้ากันได้ดี พูดปุ๊บเข้าใจปั๊บ! แล้วถ้าเป็นเด็กน่ารักๆ ด้วยก็คงจะดีไปเลยละนะ!"
2901-158 = "จะมีเด็กแบบนั้นสักคนมั้ยน้า~?"
2901-164 = "อ๊ะ ขะ... ขอโทษด้วยค่ะ...! ฉันเองก็ไม่มีเพื่อนเลย..."
2901-165 = "ละ... แล้วก็! มะ... ไม่น่ารักด้วย...!"
2901-166 = "ไม่ๆๆๆ ไม่เลย ไม่ต้องห่วงนะ! สึคุโยะน่ะน่ารักออก!"
2901-167 = "ขะ...ขอบคุณมากค่ะ แต่ถึงอย่างนั้น ชมรมเราก็ยังไม่ใช่ชมรมอย่างเป็นทางการ..."
2901-168 = "จะ... จะมีคนที่สนใจเข้าร่วมชมรมกับเราเหรอคะ...?"
2901-169 = "อ๊าก! ต้องเผชิญหน้ากับความเป็นจริงแบบนี้เจ็บปวดชะมัด?!"
2901-170 = "ขะ...ขอโทษค่ะ!"
2901-171 = "ไม่หรอก สึคุโยะพูดถูกแล้ว เราต้องเริ่มแก้ปัญหาจากตรงนั้นก่อน..."
2901-175 = "...อ๊าก เอาละ ถ้างั้นก็อย่ามัวแต่เสียเวลาเลย!"
2901-176 = "พวกเราเป็นใคร กลุ่มนินจาที่แท้จริงที่ศึกษาและค้นคว้าวิจัยเกี่ยวกับนินจา และจะทำให้นินจาเป็นที่รู้จักในวงกว้าง!"
2901-177 = "ไม่สิ! มาถึงขั้นนี้แล้ว เราเป็นมากกว่าแฟนคลับ ตอนนี้เราก็ไม่ต่างอะไรจากนินจาตัวจริง พวกเราคือ...!"
2901-182 = "เรียกพวกเราว่า <ชมรมวิจัยศาสตร์นินจา>!"
2901-183 = "ไม่ว่าจะเจอปัญหาอะไรก็ไม่ท้อถอย!"
2901-184 = "มุ่งมั่น! เพิ่มผู้ติดตาม! มุ่งมั่น! รับสมาชิกใหม่! และเป็นชมรมอย่างเป็นทางการ! เราต้องสู้และทำให้#nสำเร็จให้ได้!"
2901-185 = "ใน <คุณนินจานินเพโร่> มีคำพูดแบบนั้นด้วยใช่ไหมล่ะ?"
2901-186 = "ที่บอกว่า <นินจาน่ะ! ไม่ว่าจะถูกต้อนจนมุมหรือต้องเผชิญกับความยากลำบากแค่ไหนก็จะไม่มีวัน#nยอมแพ้อย่างเด็ดขาด!>"
2901-188 = "คะ...ค่ะ!"
2901-189 = "ดีมาก ถ้างั้นสึคุโยะ ข้าน้อยจะวางแผนเกี่ยวกับการถ่ายทำใหม่พรุ่งนี้ ส่วนสึคุโยะก็..."
2901-193 = "อ๊าย?!"
2901-194 = "หืม...?"
2901-195 = "นะ... นะ... นั่นแขกรึเปล่าคะ...?"
2901-196 = "เอ๊ะ? มันเป็นไปได้เหรอ... ที่จะมีแขกมาในที่แบบนี้?"
2901-197 = "คะ...?"
2901-198 = "ยะ... อย่าบอกนะว่า...! เฮียกกะเรียวรันงั้นเหรอ?! หรือว่าพวกแรคคูนแห่งชมรมหยินหยาง?!"
2901-199 = "หรือว่าเราถูกจับได้ว่าแอบมาใช้อาคารเรียนเก่า และพวกนั้นกำลังมาจับตัวเราเหรอ?!"
2901-200 = "อะ... อะ... อะไรนะคะ?!"
2901-201 = "อึก... ไม่สิ ถึงจะคิดอยู่แล้วว่าวันนี้จะต้องมาถึง...!"
2901-202 = "ทะ... ทะ... ทะ... ท่านหัวหน้า...! ระ... เราจะทำยังไงกันดีคะ?!"
2901-203 = "ไม่หรอก! สึคุโยะ! ไม่ต้องตระหนกไปหรอก! ถึงจะโดนเสือกัด แต่ถ้าตั้งสติไว้ละก็"
2901-204 = "ก็... ก็นะ นั่นแหละ ไม่เป็นไรหรอก!"
2901-205 = "ตะ... แต่แบบนั้นมันน่ากลัวมากเลยไม่ใช่เหรอคะ!!"
2901-211 = "ขอรบกวนหน่อยนะคะ-!"
2901-218 = "ทะ... ทะ... ท่านหัวหน้า?!"
2901-219 = "วะ... ว้าก! พวกเราไม่ยอมออกไปจากที่นี่เด็ดขาด! ชมรมวิจัยศาสตร์นินจาน่ะ จะทำกิจกรรมตลอดไป!"
2901-223 = "...?"
2901-224 = "...เอ๋? ไม่ใช่ทั้งชมรมหยินหยาง แล้วก็ไม่ใช่เฮียกกะเรียวรันงั้นเหรอ?"
2901-225 = "คะ... คือว่า... คะ... คุณเป็นใครเหรอคะ...?"
2901-226 = "อ๊ะ! ขอโทษที่แนะนำตัวช้าไปหน่อยนะคะ! ฉันอิซุนะเองค่ะ อิซุนะ!"
2901-227 = "ที่มาที่นี่ก็เพราะอยากจะเข้าร่วมชมรมวิจัยศาสตร์นินจาค่ะ!"
2901-228 = "..."
2901-232 = "เอ๋...?"

[translation]
2901-1 = "The Girls Get Together 1"
2901-7 = "Classroom in Hyakkiyako Old Schoolhouse 38"
2901-8 = "Yay! We're finally done filming!"
2901-9 = "W-wonderful work, P-President... Would you like some water?"
2901-10 = "Thanks, Tsukuyo."
2901-11 = "I also b-brought a towel to wipe your b-brow... and some h-homemade lemon honey!"
2901-12 = "Wow! Really? "
2901-13 = "Heehee! Don't mind if I do!"
2901-14 = "We really make a great team, don't we? Like we were meant to be together."
2901-15 = "And you were way more prepared than I expected, Tsukuyo!"
2901-17 = "Oh, it was n-nothing... That's what I'm h-here for..."
2901-18 = "Nonsense! You were so helpful at today's shoot!"
2901-19 = "If it weren't for your expert skills with that light reflector..."
2901-20 = "...we never would have caught that incredible scene!"
2901-21 = "The way the shadows wrapped around the ninja prisoner... Ah!"
2901-22 = "Th-That's true... Still... I wish I could be m-more helpful during filming..."
2901-23 = "The best I can ever h-hope to be is a filming assistant..."
2901-24 = "And I c-can't even do that well... Like this morning..."
2901-25 = "Oh that..."
2901-27 = "Tsukuyo! Yes, just hold the reflector right there! Perfect!"
2901-28 = "O-Okay! Hold the reflector. Simple..."
2901-32 = "Huh? Oh, um..."
2901-36 = "Hello, there. P-Please don't stand that close."
2901-37 = "I'm doing something v-very important."
2901-43 = "Weaving around my l-legs like that makes it hard for me to do my j-job."
2901-44 = "Please! I don't want to get in t-trouble!"
2901-46 = "Whoa! Look at all those cats over there!"
2901-47 = "It's like some kind of cat family reunion!"
2901-48 = "That's so cool! I'm gonna take a picture!"
2901-55 = "Ah! P-Please don't take pictures!"
2901-56 = "W-We're in the middle of filming!"
2901-58 = "Haha! That was quite a disaster, wasn't it?"
2901-59 = "*sniffle* It... It was another 30 minutes before... before we could start shooting again..."
2901-60 = "I-I'm so sorry, P-President!"
2901-61 = "It's all my f-fault!"
2901-62 = "It's not your fault, Tsukuyo."
2901-63 = "They probably just saw all that sunlight and thought it would be a great place to nap."
2901-64 = "*sniffle* Then... I-I'll have to bring treats to distract them n-next time."
2901-65 = "Next time?! I doubt it'll happen again. There's no need to be that well-prepared!"
2901-69 = "We'll be just fine without cat treats."
2901-70 = "What do you say, Dame Tsukuyo?"
2901-72 = "H-Huh? D-Dame?"
2901-73 = "Yeah! Isn't that the proper title for a ninja?"
2901-74 = "Well... Y-Yes, sure!"
2901-75 = "Let's forget about this morning and focus on what's next!"
2901-76 = "It's time to edit the video we captured today!"
2901-77 = "U-Understood!"
2901-84 = "About an hour later..."
2901-86 = "Hm..."
2901-87 = "Hmm..."
2901-88 = "Agh!"
2901-89 = "P-President! What's wrong?"
2901-90 = "I hate to say it, but..."
2901-91 = "...This isn't good enough."
2901-93 = "It's n-not?"
2901-94 = "Not even close. I envisioned perfect composition, camera work, edits..."
2901-95 = "Between my eye and your skills, I thought..."
2901-96 = "Well, I thought it would have more bang!"
2901-97 = "And flash! It was going to be so cool!"
2901-98 = "But this... It doesn't have that panache I was going for. I can't upload this..."
2901-99 = "Oh no..."
2901-100 = "It's fine, I suppose. It happens to the best of us."
2901-101 = "I'm so s-sorry! I hope it's not because of m-me!"
2901-102 = "Huh?"
2901-103 = "I wasn't g-good enough... You worked so hard, and I just g-got in the way!"
2901-104 = "I'm a t-terrible n-ninja! *sob*"
2901-106 = "It's not because of you, Tsukuyo!"
2901-107 = "You're still learning."
2901-108 = "You can't blame yourself for not knowing everything."
2901-109 = "*sob* R-Really...?"
2901-110 = "Really. Anyway I haven't liked a lot of our videos recently."
2901-111 = "I think we're just running out of fresh ideas..."
2901-115 = "We might have to consider..."
2901-116 = "What?"
2901-117 = "A new club member."
2901-121 = "A n-new club member!"
2901-123 = "I know the Ninjutsu Research Club isn't an official club yet."
2901-124 = "So we don't get any club funds like the others."
2901-125 = "Plus we're banished to a corner of Hyakkiyako... And we're basically trespassing anytime we go into the old school..."
2901-126 = "Uh..."
2901-127 = "But we can't let that stop us!"
2901-128 = "I want more people to learn about ninjas! I want everyone in Kivotos to see how cool and hip and awesome ninjas are!"
2901-129 = "It's been months since we started the \"Michiruchi, a Girl's Ninja Scroll\" channel to do just that..."
2901-130 = "But we have no more subscribers than when we started."
2901-131 = "Worse, no one's interacting with our videos. Not even negative comments!"
2901-132 = "The only comment we got recently was this."
2901-133 = "This one right here."
2901-134 = "O.C. said, \"This is so much fun! It's the best!\""
2901-135 = "But you wrote this comment, Tsukuyo!"
2901-136 = "That's b-because I really like your v-videos."
2901-137 = "I d-don't always understand them, but..."
2901-138 = "I'm sorry."
2901-139 = "No, no! I'm glad you like them. But commenting on our own videos is so..."
2901-140 = "Ugh. We just need new content, something fresh..."
2901-141 = "And a new club member is bound to freshen things up!"
2901-142 = "Hm... A new club member..."
2901-143 = "I hope they're a r-real ninja! Heehee!"
2901-144 = "I doubt it. I don't think ninjas even exist anymore."
2901-146 = "Oh, really? I d-didn't know that."
2901-147 = "Yeah. I thought it was common knowledge."
2901-148 = "Regardless, they existed at some point."
2901-149 = "Which means we can still learn from their philosophy!"
2901-150 = "Once we've fully adopted the ninja mindset and ideology, we can consider ourselves true ninja companions!"
2901-155 = "The only problem is... Ninja companions are hard to find."
2901-156 = "We need someone who doesn't think ninjas are stupid, agrees with us, and wants to join the Ninjutsu Research Club."
2901-157 = "Someone who's perfectly in sync with us! And she should be cute, because... Well, what better way to represent ninjas?"
2901-158 = "I wonder if there's anyone like that out there?"
2901-164 = "I'm sorry... I don't have any f-friends like that..."
2901-165 = "And I'm not c-cute..."
2901-166 = "What? You're super cute, Tsukuyo!"
2901-167 = "Oh, t-thank you. But since we're not an official club..."
2901-168 = "Do you think anyone will w-want to join?"
2901-169 = "Straight to the point, huh, Tsukuyo?"
2901-170 = "I'm s-sorry!"
2901-171 = "No, you're right. That's bound to be a problem."
2901-175 = "But sitting around moping about it won't help."
2901-176 = "We'll always succeed if we try hard enough! After all, we're ninja companions teaching the world about the ninja way of life!"
2901-177 = "And we're way past the point of being mere fans. We may as well call ourselves ninjas right now!"
2901-182 = "One day, everyone will know who we are—the Ninjutsu Research Club!"
2901-183 = "We'll never give up! No matter what!"
2901-184 = "Come on! Let's recruit a new club member and get more subscribers! We'll be an official club in no time!"
2901-185 = "Remember the philosophy in Ninja Ninpero."
2901-186 = "A ninja never gives up, no matter the adversity!"
2901-188 = "Y-Yes!"
2901-189 = "Okay. Let me figure out what we'll be filming tomorrow. In the meantime, you can—"
2901-193 = "Huh?!"
2901-194 = "What?"
2901-195 = "We have a g-guest?"
2901-196 = "A guest here? Is that even possible?!"
2901-197 = "Hm..."
2901-198 = "Maybe it's Hyakkaryouran! Or a raccoon from the Yin-Yang Club?"
2901-199 = "I bet they found out we've been trespassing and came here to kick us out!"
2901-200 = "Kick us... Huh?!"
2901-201 = "I always knew this day would come."
2901-202 = "President! What do we d-do?!"
2901-203 = "Stay calm, Tsukuyo! Remember that saying..."
2901-204 = "Even when facing a tiger, um... Remain calm, um... something, something... you'll succeed!"
2901-205 = "A t-tiger? That sounds scary!"
2901-211 = "Excuse me!"
2901-218 = "President?"
2901-219 = "Stuff it! We're not leaving! Long live the Ninjutsu Research Club!"
2901-223 = "...?"
2901-224 = "Wait... You don't look like you're from the Yin-Yang Club or Hyakkaryouran."
2901-225 = "Who are y-you?"
2901-226 = "Oh! I should introduce myself. My name is Izuna!"
2901-227 = "I want to join the Ninjutsu Research Club!"
2901-228 = "..."
2901-232 = "...Eh?"

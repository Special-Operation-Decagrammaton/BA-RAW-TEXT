[translation]
2901-1 = "於是少女們齊聚一堂（１）"
2901-7 = "百鬼夜行．第38舊校舍的某間教室"
2901-8 = "哎呀，拍攝終於結束了～"
2901-9 = "部長，辛，苦了……！請，喝水……！"
2901-10 = "哦，謝啦！"
2901-11 = "然後，還有擦汗的毛巾和昨天做的醃漬蜂蜜檸檬……"
2901-12 = "啊，看起來真好吃～"
2901-13 = "謝啦，我要開動了！"
2901-14 = "……話說回來，這根本就是「運動部的經理會拿來的組合」嘛！目標是全國大賽！？"
2901-15 = "不過月夜真是機靈呢。"
2901-17 = "因為我，那個，也只能做這種事……"
2901-18 = "沒有那回事唷～今天的拍攝也是因為有月夜幫忙才能拍得這麼好的唷？"
2901-19 = "如果月夜不在的話，比方說剛才的那個……"
2901-20 = "在結印的瞬間「登！！」的一聲發出閃光的場景之類的，沒有月夜在的話是絕對拍不出來的唷！"
2901-21 = "反光板的角度恰到好處啊！"
2901-22 = "是這，樣嗎……？我自己倒是，希望除了那件事之外，可以的話，能幫上更多忙……"
2901-23 = "畢竟，我能做的，也只有輔助拍攝了……"
2901-24 = "而且，那個時候還……"
2901-25 = "「那個時候」？啊啊……"
2901-27 = "OK！月夜，就待在那裡吧！感覺很棒！"
2901-28 = "好，我知道了……！反光板的角度，大概是這樣……？"
2901-32 = "咦？啊，那個……？"
2901-36 = "貓咪們，好多……？那個，你們這麼圍著，我會很困擾的……！"
2901-37 = "我現在有必須要做的事，啊……！"
2901-43 = "被你們這樣圍著，我沒辦法移動……！"
2901-44 = "我不是你們集合的標的唷……！？"
2901-46 = "吶吶妳看那邊！有好多貓咪！"
2901-47 = "好厲害，像是貓咪聚會一樣呢？"
2901-48 = "來拍照吧～！"
2901-55 = "哇哇，那個，請不要，拍我……！？"
2901-56 = "雖然我們正在攝影，可是……！"
2901-58 = "啊哈～那確實是場災難呢。"
2901-59 = "結果花了30分鐘才能好好開始拍攝……"
2901-60 = "嗚……部長，再次向妳道歉……"
2901-61 = "都是，我的錯……"
2901-62 = "不不不，都說了這不是月夜的錯呀。"
2901-63 = "妳看起來這麼溫柔，那些貓說不定也誤以為「這個人或許會給我們飼料」了哦？"
2901-64 = "這樣的話，那個……之後準備飼料比較好嗎……？"
2901-65 = "不，我覺得不用做到那種程度也沒關係吧！？不過這種認真的個性很有月夜的風格，我覺得很好哦！"
2901-69 = "嘛，總之拍攝也順利結束了。"
2901-70 = "今天就在此告別吧，月夜閣下！"
2901-72 = "咦，咦……？月夜「閣下」……？"
2901-73 = "啊，原來如此，像是忍者那種感覺呢……！"
2901-74 = "我知道，了……！"
2901-75 = "嘛，把已經過去的事給忘了，朝我們光明的未來前進吧！"
2901-76 = "那就趕緊來……剪輯剛才拍的影片吧！"
2901-77 = "是……！"
2901-84 = "（大約一小時後……）"
2901-86 = "嗯……"
2901-87 = "唔嗯……"
2901-88 = "唔喵！"
2901-89 = "那個，部長……？怎麼了嗎……？"
2901-90 = "雖然事到如今說這種話有點那個……"
2901-91 = "……果然缺少了點什麼。"
2901-93 = "那個，缺少了……什麼呢……？"
2901-94 = "到開始拍攝之前，從厲害的構圖、攝影技巧，以及拍完之後該如何修飾都已經有想法了……"
2901-95 = "而且還有月夜的輔助，感覺會很完美才對……"
2901-96 = "稍微啪啪啪……這樣。"
2901-97 = "然後再咻咻咻！應該會是這種帥氣的畫面才對……"
2901-98 = "總覺得沒辦法好好收尾……有種不滿意的感覺……這部影片或許不要馬上上傳比較好。"
2901-99 = "啊……"
2901-100 = "嘛，偶爾也會有這種時候。別在意別在意。"
2901-101 = "對不起……！都是，我的錯……！"
2901-102 = "……咦？"
2901-103 = "因為我，太沒用了……！明明部長，那麼努力，我卻一點忙，都幫不上……！"
2901-104 = "因為我，對忍者一無所知才會……"
2901-106 = "不不不！才不是那樣！"
2901-107 = "月夜還是忍者新手，那才不是妳的錯！況且月夜平常一直都很努力學習不是嗎？"
2901-108 = "不是月夜的錯，本來月夜就還在成長期唷。別在意，吶！"
2901-109 = "是這樣，嗎……？"
2901-110 = "沒錯沒錯。話雖如此，該怎麼說呢……"
2901-111 = "只靠我們兩個人的話，點子確實也是有極限的呢。"
2901-115 = "或許差不多得考慮了。"
2901-116 = "得考慮，什麼呢……？"
2901-117 = "招募新的成員。"
2901-121 = "新的，成員……！？"
2901-123 = "沒錯沒錯，不過各方面都有點困難呢。本來我們現在就還不是正式的社團……"
2901-124 = "因此既沒有社團活動費，也沒有社團辦公室……"
2901-125 = "所以只能避人耳目，像這樣在百鬼夜行角落的這間舊校舍，偷偷地活動……"
2901-126 = "但是……！"
2901-127 = "沒錯！儘管如此，這也不能成為阻礙我們前進的理由！"
2901-128 = "得讓更多人、讓奇普托斯的大家了解忍者有多酷才行！讓他們知道忍者是多麼帥氣、最棒的存在！"
2901-129 = "……雖然抱著這樣的野心，經營了「少女忍法帖 小小三千留」頻道幾個月。"
2901-130 = "但是觀看數的成長已經停滯不前了……"
2901-131 = "最近上傳的影片別說惡意留言了，就連留言都沒有……"
2901-132 = "……啊，"
2901-133 = "不過有一個留言呢。"
2901-134 = "「真有趣，太棒了……！」，雖然很讓人開心，"
2901-135 = "「O.C」這個名字就是月夜妳對吧！？"
2901-136 = "那個，因為真的，很有趣……"
2901-137 = "雖然內容，可能沒有完全理解……不過我覺得，很厲害！"
2901-138 = "那個……對不起……"
2901-139 = "不，我真的很高興哦！？雖然很高興，不過再這樣下去的話……"
2901-140 = "為了克服這個困難，果然還是需要新的突破口……"
2901-141 = "也就是說，必須要有新成員！"
2901-142 = "原來如此……！"
2901-143 = "這樣的話，新的成員……如果能有，真正的忍者……之類的人能來，就再好不過了呢。耶嘿嘿……"
2901-144 = "不，真正的忍者應該是不會來……不如說實際上也不存在忍者吧……"
2901-146 = "咦，是這樣嗎……！？對不起，我不太清楚……"
2901-147 = "與其說清不清楚，唔嗯……"
2901-148 = "啊，不過我並不是說忍者是假的喔！"
2901-149 = "就算沒有真實地存在世界上，但是「忍者的精神」是真的！"
2901-150 = "心懷信念，效法忍者的生活方式，這樣才能真正成為「忍者好夥伴」！"
2901-155 = "不過能不能遇到「忍者好夥伴」也是個問題就是了……"
2901-156 = "不把忍者當傻瓜，而且能對我們說的話產生共鳴……能和我們一起把慢慢壯大忍術研究部的那種──"
2901-157 = "和我們合得來，能夠互相說著積極向前的話的……最重要的，必須是「可愛的孩子」！"
2901-158 = "這樣的人會在哪裡呢～？"
2901-164 = "對不起，"
2901-165 = "我，沒有朋友……而且又不可愛……"
2901-166 = "不不不！？你不用在意唷！而且月夜很可愛唷！"
2901-167 = "謝，謝謝……不過我們確實，不是正式的社團……"
2901-168 = "不管有什麼樣的理由，真的會有人來這裡嗎……"
2901-169 = "嗚，現實真讓人痛心！好辛苦！雖然是事實！"
2901-170 = "啊，對不起……！"
2901-171 = "沒關係，月夜你說的對……不過真的是問題呢……"
2901-175 = "……嘛，不過就算在這裡無所事事，也不會有人來這裡吧。"
2901-176 = "……我們是研究、探索忍者，並且希望讓忍者的存在廣為人知的忍者好夥伴！"
2901-177 = "已經超越單純的粉絲，就算說我們是真正的忍者也不為過！這樣的我們，人稱……！"
2901-182 = "沒錯，就是「忍術研究部」！"
2901-183 = "我們「忍術研究部」無論遇到任何逆境都不會放棄！"
2901-184 = "來，增加觀看數吧！還有增加成員吧！順便成為正式社團吧！"
2901-185 = "《忍者忍佩洛》裡也是這麼說的。"
2901-186 = "「所謂的忍者就是不管遭遇任何困境都不會放棄的人！」……！"
2901-188 = "原來如此，我知道了……！"
2901-189 = "很好，那麼趁著這股氣勢，我來想想明天拍攝的點子吧。那月夜你就……"
2901-193 = "……噫！？"
2901-194 = "……？"
2901-195 = "是客人，嗎……？"
2901-196 = "這種地方居然會有客人……！？"
2901-197 = "可是，也沒有別的可能性了……？"
2901-198 = "難，難道是……百花繚亂調停委員會！？還是狡猾的陰陽部！？"
2901-199 = "我們擅自使用舊校舍的事暴露了嗎！？"
2901-200 = "咦咦……！？"
2901-201 = "唔，雖然早就知道這一天遲早會到來……！"
2901-202 = "部長，該怎麼辦……！？"
2901-203 = "沒事的，別慌張。只要心如明鏡……"
2901-204 = "就……總會有辦法的！！"
2901-205 = "真的沒問題嗎……！？"
2901-211 = "打擾了……！"
2901-218 = "部長……！"
2901-219 = "我，我們是不會離開這裡的！就算被趕出這裡，忍者的精神也會永遠……！"
2901-223 = "……？"
2901-224 = "……咦？你不是陰陽部，也不是百花繚亂的人……？"
2901-225 = "那個，請問妳是哪位……？"
2901-226 = "啊，忘了先自我介紹！伊樹菜叫伊樹菜！"
2901-227 = "希望能加入忍術研究部！"
2901-228 = "……"
2901-232 = "……咦？"

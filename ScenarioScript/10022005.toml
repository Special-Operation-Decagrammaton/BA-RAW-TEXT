[translation]
10022005-1 = "#title;복구 작업: D.U. 시라토리구"
10022005-2 = "#all;hide"
10022005-3 = "3;아유무;09;서, 선생님. 수고 많으십니다.\n#3;a\n#3;greeting"
10022005-4 = "3;아유무;18;이렇게 이번 사건이 마무리가 되었지만 키보토스의 각 자치구…… 그중에서도 D.U.의 시라토리구의 피해가 가장 심각한 상태예요."
10022005-5 = "3;아유무;11;이 구역의 피해를 복구하는 것이 가장 시급한데…… \n#3;stiff\n#3;em;[속상함]"
10022005-6 = "3;아유무;09;다행히도 재무실장 아오이 씨가 시라토리구의 긴급 복구 지원금을 승인해 주셔서…… 통괄실에서 집행이 가능해졌어요."
10022005-7 = "3;아유무;12;그런데 문제는 린 선배가 지금 권한 정지 상태이기도 하고, 선배 혼자서는 아무래도 버거운 상태라……."
10022005-8 = "3;아유무;06;선생님의 도움이 필요한 상황입니다……. 이번에도 신세를 지겠네요.\n#3;em;[한숨]"
10022005-9 = "#st;[0,0];instant;1;"
10022005-10 = "#clearST"
10022005-11 = "3;아유무;08\n#3;em;[반응]\n#3;stiff\n#3;h\n#wait;1500"
10022005-12 = "3;아유무;10;물론 저와 린 선배, 그리고 모모카 쨩이 이 복구 작업에 참여할 예정이에요! \n#3;hophop\n#3;em;[!]\n#3;closeup"
10022005-13 = "3;아유무;05;그럼…… 시라토리구의 복구 작업, 잘 부탁드립니다! 선생님!\n#3;closeup\n#3;greeting"

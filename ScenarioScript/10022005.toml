[translation]
10022005-1 = "Restoration Project: D.U. Shiratori City"
10022005-3 = "S-Sensei. Thank you for everything you've done."
10022005-4 = "Though the fight is over, the damage to each district of Kivotos is staggering. D.U. Shiratori City is in the worst condition."
10022005-5 = "We must make repairs our top priority."
10022005-6 = "Thankfully, the head of the Treasurer's Office, Aoi, approved the emergency restoration grant for Shiratori City. So, we were able to execute it in the Supervisory Office."
10022005-7 = "The problem is, Rin's been suspended, and it's a bit much for her to handle alone."
10022005-8 = "So, we need your help, Sensei. It seems like we'll be in your debt again."
10022005-12 = "Of course, Rin, Momoka, and I will be helping with the restoration!"
10022005-13 = "But we're all counting on you to restore Shiratori City, Sensei!"

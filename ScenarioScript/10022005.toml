[translation]
10022005-1 = "修復作業：D.U.白鳥區"
10022005-3 = "老，老師，您辛苦了。"
10022005-4 = "這次的事件雖然已經落幕，但奇普托斯的各個自治區──#n尤其是D.U.的白鳥區受到了特別慘重的損失。"
10022005-5 = "眼下的當務之急是進行白鳥區的修復…… "
10022005-6 = "所幸財務室長碧同學已經批准了白鳥區的「緊急復興支援金」……#n統領室才得以執行作業。"
10022005-7 = "然而，琳前輩的行政權限依然處於停止狀態，只靠他一個人會有困難……"
10022005-8 = "所以這次，也希望能借助老師您的力量……"
10022005-12 = "當然，我和琳前輩還有桃香醬也都會參加修復作業……！"
10022005-13 = "那麼……白鳥區的修復作業就拜託您了，老師！"

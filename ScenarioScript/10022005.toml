[translation]
10022005-1 = "ปฏิบัติการฟื้นฟู: เขตชิราโทริ D.U."
10022005-3 = "คะ... คุณครูคะ... ขอบคุณที่ทำงานอย่างหนักค่ะ"
10022005-4 = "ถึงเหตุการณ์ครั้งนี้จะจบลงแล้ว แต่เขตปกครองตนเองแต่ละเขตของคิโวทอสก็ได้รับความเสียหาย#nหนักมาก และในบรรดาเขตปกครองตนเอง เขตชิราโทริ D.U. ได้รับความเสียหายหนักที่สุดค่ะ"
10022005-5 = "เราเลยต้องฟื้นฟูพื้นที่ที่ได้รับความเสียหายในเขตนี้โดยด่วนน่ะค่ะ..."
10022005-6 = "โชคดีที่หัวหน้าฝ่ายการเงิน คุณอาโออิ อนุมัติเงินสนับสนุนการฟื้นฟูเขตชิราโทริอย่างเร่งด่วนมาให้... ทำให้สามารถดำเนินการได้ทันทีค่ะ"
10022005-7 = "แต่ว่าปัญหาก็คือตอนนี้รุ่นพี่รินถูกระงับการใช้อำนาจใดๆ อยู่ และลำพังรุ่นพี่คนเดียวคงเป็นเรื่องที่ยาก#nมากๆ ......"
10022005-8 = "เพราะงั้นตอนนี้ก็เลยจำเป็นต้องให้คุณครูช่วยค่ะ ครั้งนี้ก็ต้องขอรบกวนด้วยนะคะ"
10022005-12 = "แน่นอนว่าฉันกับรุ่นพี่ริน แล้วก็โมโมกะจังก็จะเข้าร่วมปฏิบัติการฟื้นฟูนี้ด้วยค่ะ!"
10022005-13 = "ถ้าอย่างนั้น... ขอรบกวนเรื่องปฏิบัติการฟื้นฟูเขตชิราโทริด้วยนะคะ คุณครู!"

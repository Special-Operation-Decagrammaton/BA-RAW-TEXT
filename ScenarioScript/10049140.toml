[translation]
10049140-1 = "後日談;惡之幹部，誕生"
10049140-2 = "[log]3天前[/log]"
10049140-4 = "這個孩子……放在這裡。"
10049140-5 = "這孩子……放這邊。"
10049140-6 = "嗯……！#n這樣修復的書都整理完了。"
10049140-7 = "晚上沒人的圖書館果然很棒。"
10049140-8 = "得在有人來之前回到古書館才行。"
10049140-9 = "魔法少女……惡之幹部……"
10049140-10 = "魔法少女，守護世界的和平。"
10049140-11 = "噫……"
10049140-12 = "噫呃……"
10049140-16 = "惡之幹部，是反派……"
10049140-17 = "（嚇，嚇我一跳……原來是志美子啊）"
10049140-18 = "（這麼晚了還在整理東西嗎？要捐贈的那些孩子應該早就整理好了才對……）"
10049140-19 = "反派的惡之幹部……會處決魔法少女……"
10049140-20 = "！？"
10049140-21 = "（什，什麼……處決？惡之幹部？）"
10049140-22 = "（志美子是怎麼了？身體不舒服嗎？）"
10049140-23 = "（雖然這種時候應該迴避才對，但志美子的情況實在讓人很擔心……）"
10049140-24 = "（他好像沒發現我的樣子，暫且先觀察一下吧……）"
10049140-28 = "（推車上堆滿了漫畫和小說？）"
10049140-29 = "（志美子平常什麼藏書都讀過，為什麼偏偏在這種時候……？）"
10049140-30 = "（簡單目測都有200本以上吧？）"
10049140-34 = "……（喃喃自語）"
10049140-35 = "（喃喃自語）……（喃喃自語）……"
10049140-36 = "（眼神好可怕……！）"
10049140-37 = "（一本不到一分鐘就看完了！？）"
10049140-38 = "（雖然知道他會速讀，沒想到居然快到這種程度）"
10049140-39 = "（而且他挑的全都是跟魔法少女有關的孩子……是最近迷上的嗎？）"
10049140-41 = "（喃喃自語）……#n我要把這整座城市……從地表徹底抹去……"
10049140-42 = "……OK。"
10049140-46 = "（是在OK什麼啦！？）"
10049140-47 = "（仔細一看，好像並不只有魔法少女的漫畫？）"
10049140-48 = "（《現代犯罪心理》、《大眾煽動術》、《服裝製作二級實作》？）"
10049140-49 = "（挑選的標準到底是什麼！？）"
10049140-53 = "（結果他居然全都看完了，我光看就覺得累……）"
10049140-54 = "（這次……跑到視聽室去了？）"
10049140-55 = "（手上還拿了一堆魔法少女的動畫）"
10049140-56 = "（看書還可以速讀，那些動畫他打算看多久啊……？）"
10049140-61 = "（啊，開始了）"
10049140-62 = "（算了……反正他開心就好）"
10049140-63 = "（原來志美子也有突然對這種東西感興趣的時候啊）"
10049140-64 = "（我也差不多該回古書館……）"
10049140-68 = "？"
10049140-69 = "（……倍速播放？）"
10049140-74 = "噫……"
10049140-75 = "（什，什麼……？速度還在越來越快？）"
10049140-82 = "（30倍速！？）"
10049140-83 = "（誰會這樣看動畫啦！？）"
10049140-84 = "（一集才50秒就結束了耶！？）"
10049140-85 = "（這樣根本聽不懂在講什麼吧？？）"
10049140-86 = "（唔，唔唔……畫面閃得我頭好痛……）"
10049140-87 = "（還是先回去，等他明天恢復正常再問好了……）"
10049140-92 = "……"
10049140-93 = "……"
10049140-95 = "……"
10049140-96 = "結果……被嚇得一整晚都睡不著……"
10049140-97 = "真擔心志美子。不知道他現在回去了沒有。"
10049140-98 = "還是去確認一下好了……"
10049140-100 = "……"
10049140-101 = "（他竟然還在！？）"
10049140-102 = "（連續……看了整整8個小時！？）"
10049140-103 = "（也就是說……一晚看了580集！？）"
10049140-104 = "（怎麼辦，怎麼辦……他到底怎麼了！？）"
10049140-105 = "「哼，只有這點程度嗎。」"
10049140-106 = "（那是什麼語氣！？）"
10049140-107 = "「接下來，是時候取得闇之帷幕了。」"
10049140-108 = "（闇之……什麼？）"
10049140-110 = "#clearSt"
10049140-112 = "（不，不行。我最害怕這種狀況了……！）"
10049140-113 = "（得先阻止志美子才行。情況之後再問也不遲……）"
10049140-114 = "（要是真的有危險的話，只好往他頭上開一槍讓他昏過去了……！）"
10049140-117 = "（這次又是什麼……？）"
10049140-118 = "（那是……保護館藏用的遮光布，還有補修地板用的黑色地墊？）"
10049140-119 = "（那些不是維修圖書館用的物資嗎？他想拿來做什麼……？）"
10049140-120 = "（難道說……他整晚都在進行修補工作……？）"
10049140-121 = "（說的也是。他也不一定整晚都在看動畫嘛……）"
10049140-122 = "（看來是我白擔心了……那我也回去休息……）"
10049140-126 = "（……為什麼要用剪刀剪那個？）"
10049140-127 = "咦？"
10049140-128 = "（為什麼要把好好的遮光布和墊材剪開再縫起來……？）"
10049140-132 = "？？？"
10049140-137 = "（那，那是……！）"
10049140-140 = "（不，不可能吧！？）"
10049140-141 = "（志，志美子不可能變成那樣……）"
10049140-142 = "（機，機器壞掉時就要關機重開……）"
10049140-143 = "（必要的時候就往頭上來一發……）"
10049140-147 = "噫噫──！"
10049140-148 = "是誰！！"
10049140-150 = "咿啊啊啊！！！"
10049140-156 = "……"
10049140-157 = "唔嗯，感覺聲線再高一點會更適合。"
10049140-158 = "身為惡之幹部，果然就是應該……！"
10049140-159 = "咳，咳哼！啊，啊──！"
10049140-160 = "是誰！！"

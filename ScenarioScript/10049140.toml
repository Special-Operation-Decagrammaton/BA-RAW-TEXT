[translation]
10049140-1 = "Afterword;An Evil Officer is Born"
10049140-2 = "[log]3 days ago...[/log]"
10049140-4 = "This one should go here."
10049140-5 = "And this one should go...there."
10049140-6 = "Perfect...! Look at all these restored books, nice and organized."
10049140-7 = "No one comes to the library at night. This is nice."
10049140-8 = "I'd better go back to the old library before anyone swings by."
10049140-9 = "Magical girl... Evil officer..."
10049140-10 = "Magical girls protect world peace."
10049140-11 = "Eee—"
10049140-12 = "—eek..."
10049140-16 = "Evil officer, antagonist..."
10049140-17 = "(Phew, that scared me... It was just Shimiko.)"
10049140-18 = "(Is she still organizing? I thought all the kids' donations were already prepped.)"
10049140-19 = "Evil officers are antagonists...who try to take down magical girls..."
10049140-20 = "What?!"
10049140-21 = "(Wh-What...? Take down? Evil officers?)"
10049140-22 = "(What is Shimiko saying? Is she sick?)"
10049140-23 = "(Normally, I wouldn't get involved, but since it's Shimiko...)"
10049140-24 = "(I don't think she's seen me yet, so I should keep an eye on her...)"
10049140-28 = "(She put a bunch of manga and novels on that cart...)"
10049140-29 = "(I know she likes to read a lot of our books, but why now...?)"
10049140-30 = "(That's about 200 books right there...)"
10049140-34 = "*mumble*"
10049140-35 = "*mumble* *mumble*"
10049140-36 = "(Scary eyes...!)"
10049140-37 = "(She speed-read that book in under a minute?!)"
10049140-38 = "(I knew she was a fast reader, but not THAT fast!)"
10049140-39 = "(And all her books are about magical girls. Is she hooked on those now...?)"
10049140-41 = "*mumble* \"I'll blast this whole city...to rubble...\""
10049140-42 = "...Okay."
10049140-46 = "(What does she mean \"okay\"?!)"
10049140-47 = "(Oh, and there's more than just magical girl manga on that cart...)"
10049140-48 = "(\"Modern Criminal Psychology\"? \"Mass Propaganda\"? \"Practical...Apparel Sewing 2\"?)"
10049140-49 = "(Why would she pick all those?!)"
10049140-53 = "(She's finished speed reading. Just watching her made me dizzy...)"
10049140-54 = "(And now she's headed...to the theater room?)"
10049140-55 = "(With a bunch of magical girl anime DVDs.)"
10049140-56 = "(I know she can speed read, but how is she going to speed WATCH those?)"
10049140-61 = "(Ah. She's starting.)"
10049140-62 = "(Well... I guess she'll figure it out.)"
10049140-63 = "(Never thought I'd see Shimiko take an interest in these kinds of things.)"
10049140-64 = "(I'd better head back to the old library...)"
10049140-68 = "?"
10049140-69 = "(She's fast-forwarding?)"
10049140-74 = "Eek..."
10049140-75 = "(Wait, she keeps upping the speed?)"
10049140-82 = "(32 times faster than normal?!)"
10049140-83 = "(WHO watches anime like that?!)"
10049140-84 = "(She finished an entire episode in 50 seconds?)"
10049140-85 = "(I can't even tell what they're saying!!)"
10049140-86 = "(U-Ugh, all the flashing is making my head hurt...)"
10049140-87 = "(I should head back for now and ask her tomorrow, when things look okay...)"
10049140-92 = "..."
10049140-93 = "..."
10049140-95 = "..."
10049140-96 = "Ugh, I haven't slept at all..."
10049140-97 = "Too worried about Shimiko. I wonder if she's back yet."
10049140-98 = "Maybe I'll go check if she's still there."
10049140-100 = "..."
10049140-101 = "(She's still here?!)"
10049140-102 = "(She's been watching for 8 hours, so...)"
10049140-103 = "(She watched 580 episodes in one night?!)"
10049140-104 = "(What should I do, what should I do...? What compelled her to do this?!)"
10049140-105 = "\"Hmph, I guess that's about it.\""
10049140-106 = "(And now she says THAT, of all things?!)"
10049140-107 = "\"I should have the veil of darkness in my grasp now.\""
10049140-108 = "(The veil of... What?)"
10049140-110 = "#clearSt"
10049140-112 = "(Th-This is bad. I hate doing this kind of thing, but...!)"
10049140-113 = "(...I need to stop Shimiko. I can ask her questions later...)"
10049140-114 = "(If it gets dangerous, I can always shoot her in the head. That'll knock her out.)"
10049140-117 = "(What is it this time...?)"
10049140-118 = "(Aren't those...blackout curtains for protecting books and black carpeting for floor repairs?)"
10049140-119 = "(Aren't those library maintenance materials? Just what is she going to...?)"
10049140-120 = "(Has she been...doing maintenance work all night...?)"
10049140-121 = "(Well, I guess she wasn't watching anime ALL night, then...)"
10049140-122 = "(Guess I got worried over nothing. All right, maybe I should just go back and...)"

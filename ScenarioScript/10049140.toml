10049140-141 = "(Th-There's no way Shimiko would ever do this...)"
10049140-142 = "(Th-They say when things break, you should try turning them off and on again.)"
10049140-143 = "(One headshot, that ought to reboot her, hopefully...)"
10049140-147 = "Eek..."
10049140-148 = "Who's there?!"
10049140-150 = "Eeeek!!!"
10049140-156 = "..."
10049140-157 = "Hmm, I should strengthen my tone a bit."

[translation]
10049140-1 = "ย้อนวันวาน;หัวหน้าจอมวายร้ายถือกำเนิด"
10049140-2 = "[log]3 วันก่อน[/log]"
10049140-4 = "เด็กคนนี้ ให้อยู่ตรงนี้"
10049140-5 = "ส่วนเด็กคนนี้... ก็อยู่ตรงนี้"
10049140-6 = "อื้อ...! จัดหนังสือที่ซ่อมแซมใหม่เสร็จแล้ว"
10049140-7 = "ห้องสมุดเงียบๆ ตอนกลางคืนนี่ดีจังเลยนะ"
10049140-8 = "ต้องกลับไปห้องสมุดเก่าก่อนที่จะมีใครมาแล้วละ"
10049140-9 = "สาวน้อยเวทมนตร์... หัวหน้าวายร้าย..."
10049140-10 = "สาวน้อยเวทมนตร์... ปกป้องสันติสุขของโลก"
10049140-11 = "ฮะ..."
10049140-12 = "เฮือกกก..."
10049140-16 = "หัวหน้าวายร้าย... ตัวโกง..."
10049140-17 = "(ฮู่ว ตกใจหมดเลย... ชิมิโกะนี่เอง)"
10049140-18 = "(ยังมีงานค้างอะไรจนถึงตอนนี้อีกล่ะนั่น? เรื่องรายชื่อเด็กๆ ที่จะเอาไปบริจาคก็น่าจะจัดการเสร็จหมด#nแล้วนี่นา?)"
10049140-19 = "หัวหน้าวายร้าย... จะลงทัณฑ์สาวน้อยเวทมนตร์..."
10049140-20 = "?!"
10049140-21 = "(อะ... อะไรน่ะ... หัวหน้าวายร้าย? ลงทัณฑ์?)"
10049140-22 = "(ชิมิโกะเป็นอะไรไปน่ะ? ไม่สบายตรงไหนหรือเปล่า?)"
10049140-23 = "(เรื่องแบบนี้หลีกเลี่ยงไว้จะดีที่สุด แต่การที่ชิมิโกะเป็นแบบนี้ก็น่าเป็นห่วง...)"
10049140-24 = "(น่าจะยังไม่รู้ตัวนะ งั้นเฝ้าดูต่อดีกว่า...)"
10049140-28 = "(เอาหนังสือการ์ตูนใส่เต็มรถเข็นเลยแฮะ?)"
10049140-29 = "(ชิมิโกะน่าจะอ่านหนังสือส่วนใหญ่หมดแล้วนี่นา แต่ทำไมตอนนี้ถึงได้...?)"
10049140-30 = "(นั่นเกือบ 200 เล่มเลยหรือเปล่า?)"
10049140-34 = "พึมพำ..."
10049140-35 = "พึมพำ... พึมพำพึมพำ..."
10049140-36 = "(สายตาน่ากลัวมาก...!)"
10049140-37 = "(1 เล่มใช้เวลาไม่ถึง 1 นาทีเลยด้วยซ้ำ?!)"
10049140-38 = "(ฉันก็พอรู้มาบ้างว่าชิมิโกะอ่านหนังสือเร็ว แต่คิดไม่ถึงเลยว่าจะเร็วขนาดนี้)"
10049140-39 = "(เด็กๆ ที่เลือกมาก็เป็นหนังสือเกี่ยวกับสาวน้อยเวทมนตร์ หรือว่าช่วงนี้กำลังอินเรื่องนี้นะ...?)"
10049140-41 = "(พึมพำ) ฉันจะระเบิดเมืองนี้... ให้พังพินาศหมดเลย..."
10049140-42 = "โอเค..."
10049140-46 = "(โอเคอะไรน่ะ?!)"
10049140-47 = "(ไม่ได้มีแต่การ์ตูนสาวน้อยเวทมนตร์นี่นา?)"
10049140-48 = "(<จิตวิทยาอาชญากรรมสมัยใหม่> <ศิลปะการยุยงมวลชน> <การตัดเย็บเสื้อผ้าระดับ 2>?)"
10049140-49 = "(ใช้มาตรฐานอะไรในการเลือกเด็กๆ มาเนี่ย?!)"
10049140-53 = "(อ่านหมดทุกเล่มแล้วสินะ แค่ดูก็ปวดตาแทนแล้ว...)"
10049140-54 = "(ตอนนี้มาที่... ห้องโสตงั้นเหรอ?)"
10049140-55 = "(หอบแอนิเมชันสาวน้อยเวทมนตร์มาเพียบเลยด้วย)"
10049140-56 = "(ถ้าเป็นหนังสือก็คงอ่านเร็วๆ ได้ แต่แอนิเมชันจะรีบดูให้หมดได้ยังไงน่ะ...?)"
10049140-61 = "(อ๊ะ เริ่มแล้วสินะ)"
10049140-62 = "(ก็คง... จัดการตัวเองได้ละเนอะ)"
10049140-63 = "(ไม่คิดเลยนะเนี่ยว่าจู่ๆ ชิมิโกะจะอินกับเรื่องแบบนี้ขึ้นมา)"
10049140-64 = "(คงต้องรีบกลับแล้วละ...)"
10049140-68 = "?"
10049140-69 = "(เร่งความเร็วเหรอ...?)"
10049140-74 = "เฮือก..."
10049140-75 = "(อะ... อะไรน่ะ...? เพิ่มความเร็วเรื่อยๆ เลยเหรอ?)"
10049140-82 = "(x30 เท่า?!)"
10049140-83 = "(ใครเขาดูแอนิเมชันแบบนั้นกัน?!)"
10049140-84 = "(ใช้เวลาดูแค่ตอนละ 50 วินาทีเอง?)"
10049140-85 = "(ฟังออกได้ยังไงว่าใครพูดว่าอะไรบ้างน่ะ??)"
10049140-86 = "(อะ... โอย... ภาพในจอวิ่งไวมากจนปวดหัวเลย...)"
10049140-87 = "(คืนนี้กลับก่อน แล้วค่อยหาจังหวะถามพรุ่งนี้แล้วกัน...)"
10049140-92 = "......"
10049140-93 = "......"
10049140-95 = "......"
10049140-96 = "สุดท้ายก็... กลัวจนหลับไม่ลงเลยแฮะ..."
10049140-97 = "เป็นห่วงชิมิโกะจัง ตอนนี้จะกลับไปหรือยังนะ..."
10049140-98 = "ไปดูหน่อยดีกว่าว่ายังอยู่หรือเปล่า"
10049140-100 = "......"
10049140-101 = "(ยังอยู่อีกเหรอ?!)"
10049140-102 = "(ดูตั้ง 8 ชั่วโมงเลยเหรอเนี่ย ถ้างั้นก็...)"
10049140-103 = "(ดูไป 580 ตอนเลยน่ะสิ?!)"
10049140-104 = "(ทำยังไงดี ฉันควรทำยังไงดี... ชิมิโกะกินยาอะไรผิดไปหรือเปล่านะ?)"
10049140-105 = "'ฮึ... ก็แค่นี้สินะ'"
10049140-106 = "(อะไรกัน คำพูดแบบนั้น?!)"
10049140-107 = "'ได้เวลารังสรรค์ม่านแห่งความมืดมิดแล้วละ'"
10049140-108 = "(ม่าน... อะไรนะ?)"
10049140-110 = "#clearSt"
10049140-112 = "(มะ... ไม่ได้การแล้ว ถึงจะไม่ชอบเรื่องแบบนี้เลยก็เถอะ...!)"
10049140-113 = "(ตอนนี้ฉันต้องหยุดชิมิโกะก่อน แล้วเดี๋ยวค่อยถามว่าเกิดอะไรขึ้นทีหลัง...)"
10049140-114 = "(และถ้ามันจะอันตราย ก็ยิงหัวให้สลบก่อนไปเลย...!)"
10049140-117 = "(ทีนี้จะทำอะไรอีกเนี่ย...?)"
10049140-118 = "(นั่นมัน... ม่านทึบแสงสำหรับกันแดดให้หนังสือ กับแผ่นปูบำรุงรักษาพื้นสีดำ?)"
10049140-119 = "(เป็นของที่ใช้ซ่อมบำรุงห้องสมุดนี่? คิดจะทำอะไรน่ะ...?)"
10049140-120 = "(อย่าบอกนะว่า... ที่โต้รุ่งทั้งคืนเพราะมาทำงานซ่อมบำรุงอยู่น่ะ...?)"
10049140-121 = "(นั่นสิ ใครจะไปนั่งดูแอนิเมชันได้ทั้งคืนล่ะ...)"
10049140-122 = "(ฉันตกใจโดยเปล่าประโยชน์สินะ... งั้นขอกลับไปพักผ่อนบ้างแล้วกัน...)"
10049140-126 = "(ทำไมถึงเอากรรไกรตัดของพวกนั้นล่ะ...?)"
10049140-127 = "หืม?"
10049140-128 = "(ทำไมถึงตัดม่านกับแผ่นปูพื้นดีๆ ให้เสียของล่ะ? แล้วยังเอามาเย็บอีก...?)"
10049140-132 = "???"
10049140-137 = "(นะ... นั่นมัน...!)"
10049140-140 = "(เดี๋ยวนะ นั่นมันอะไรน่ะ?!)"
10049140-141 = "(ชะ... ชิมิโกะไม่มีทางเป็นแบบนี้สิ...)"
10049140-142 = "(วะ... ว่ากันว่าถ้าเกิดมีอะไรอ๊องไปละก็ต้องรีเซ็ตให้ใหม่)"
10049140-143 = "(รีเซ็ตสมองใหม่ในนัดเดียวไปเลย...)"
10049140-147 = "เฮือก"
10049140-148 = "นั่นใครน่ะ?!"
10049140-150 = "เฮือกกก!!!"
10049140-156 = "......"
10049140-157 = "อืม หรือฉันควรพูดให้เสียงสูงกว่านี้คะ"
10049140-158 = "หัวหน้าวายร้ายต้องใช้น้ำเสียงแบบไหนนะ...!"
10049140-159 = "แฮ่ม อะแฮ่ม! อ่า อ่าๆ!"
10049140-160 = "ฉันถามว่านั่นใคร?!!"

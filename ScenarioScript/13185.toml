13185-12 = "中央車站區政廳大樓．北側通道"
13185-14 = "（滋滋）N區，CLEAR。W區請報告。"
13185-15 = "聽到請回答。"
13185-19 = "將軍。聽到請回答，將軍？"
13185-29 = "唔……！"
13185-36 = "唔嗯，這些傢伙究竟為什麼會……"
13185-46 = "得～救了～"
13185-47 = "就是啊，剛才真是千鈞一髮。#n噗哈哈哈！"
13185-49 = "唔嗯……"
13185-50 = "這些傢伙根本不緊張嘛……"
13185-51 = "謝，謝謝你們的幫忙……阿拜多斯的各位……"
13185-52 = "沒事吧？"
13185-53 = "現在PMC好像在襲擊「私募基金」……#n究竟發生了什麼事呢……"
13185-55 = "我們才想問咧！現在到底是什麼情況？"
13185-56 = "各位知道些什麼嗎？"
13185-57 = "這個嘛……從昨天開始就聯絡不到蘇芳監察官了？#n而且好像還有聽到什麼……戰鬥開始了之類的話？"
13185-58 = "因為很想睡～都忘光了～"
13185-59 = "總，總之只要監察官不在，工程就能早早結束……其實也挺賺的吧？#n噗哈哈，這才是最重要的！"
13185-60 = "賺爛～"
13185-62 = "現在的情況很不尋常……各位最好還是先暫停工程，找地方避難比較好。"
13185-63 = "聽，聽到了吧？幹部們？#n必須趕緊逃離這個被詛咒的阿拜多斯！"
13185-64 = "那個……其實也沒有那麼誇張……"
13185-66 = "我們已經警告過囉？"
13185-68 = "[ns]「快前往中央車站的區政廳大樓吧，我很擔心野乃美。」"
13185-69 = "嗯。凱薩PMC、奈芙蒂斯跟私募基金的目的似乎各不相同……"
13185-70 = "繼續朝舉行大會的大樓進攻吧！"
13185-71 = "嗯，快走吧。星野前輩應該也往那邊去了。"
13185-73 = "下一話;債權團大會"

[translation]
13185-3 = "สำนักงานสถานีกลาง เขตฝั่งตะวันออก"
13185-6 = "(ซ่า) พื้นที่ E เคลียร์ "
13185-8 = "สำนักงานสถานีกลาง พื้นที่โล่งทางใต้"
13185-10 = "(ซ่า) รับทราบ (ซ่า) พื้นที่ S ก็ไร้ปัญหา"
13185-12 = "สำนักงานสถานีกลาง ทางเข้าทางเหนือ"
13185-14 = "(ซ่า) พื้นที่ N เคลียร์ พื้นที่ W รายงานด้วย"
13185-15 = "ตอบด้วย "
13185-19 = "นายพล ตอบด้วยครับ นายพล?"
13185-29 = "อะ... อึก..."
13185-36 = "อืม... นี่มันอะไรกัน คนพวกนี้... "
13185-46 = "รอดตายแล้ว"
13185-47 = "นั่นสินะ รอดมาได้อย่างหวุดหวิดเลย วะฮะฮะฮ่า! "
13185-49 = "อืม"
13185-50 = "พวกเธอไม่รู้สึกตึงเครียดกันเลยสินะ..."
13185-51 = "ขะ... ขอบคุณที่ช่วยนะคะ... อะบิดอสทุกคน..."
13185-52 = "เป็นยังไงบ้างคะ?"
13185-53 = "เหมือน PMC กำลังบุกโจมตี <กองทุนไพรเวทอิควิตี้> อยู่เลยค่ะ... นี่มันเกิดอะไรขึ้นกันแน่..."
13185-55 = "นั่นน่ะสิ! พวกฉันต่างหากที่อยากถาม! นี่มันเรื่องอะไรกันน่ะ?"
13185-56 = "พวกคุณรู้อะไรกันบ้างหรือเปล่าคะ?"
13185-57 = "อืม เหมือนได้ยินว่าผู้ควบคุมสุโอติดต่อไม่ได้ตั้งแต่เมื่อวาน และเหมือนจะเริ่มต่อสู้อะไรกันแล้วด้วย... แล้วอะไรอีกนะ?"
13185-58 = "ฉันหลับๆ ตื่นๆ จนจำไม่ได้น่ะ"
13185-59 = "เอาเถอะ ถ้าไม่มีผู้ควบคุม การก่อสร้างก็น่าจะเสร็จเร็วอยู่ นี่ก็ถือว่าเป็นประโยชน์นะ วะฮะฮ่า นี่ละสิ่งที่สำคัญที่สุด!"
13185-60 = "โชคเข้าข้างแฮะ!"
13185-62 = "ตอนนี้สถานการณ์มันแปลกๆ ไปหมด... ฉันว่าพวกคุณพับแผนก่อสร้างแล้วหลีกเลี่ยงอันตรายกันก่อน#nดีกว่ามั้ยคะ?"
13185-63 = "ดะ... ได้ยินแล้วใช่มั้ยคะท่านผู้บริหาร? รีบหนีออกจากพื้นที่ที่ถูกสาปแบบนี้เถอะค่ะ!"
13185-64 = "อ่า... ไม่ถึงขนาดนั้นหรอกนะคะ..."
13185-66 = "เอาเป็นว่าพวกเราเตือนแล้วนะ"
13185-68 = "[ns] \"รีบไปสำนักงานสถานีกลางกันเถอะ ครูเป็นห่วงโนโนมิ\""
13185-69 = "ค่ะ เรายังไม่รู้ว่าไคเซอร์ PMC มีจุดประสงค์อะไรกับเนฟธิสและกองทุนไพรเวทอิควิตี้..."
13185-70 = "งั้นเราจะมุ่งหน้าไปอาคารที่จัดการประชุมกันค่ะ!"
13185-71 = "อืม รีบไปกันเถอะ รุ่นพี่โฮชิโนะก็น่าจะไปทางนั้นแล้วเหมือนกัน"
13185-73 = "ตอนต่อไป;การประชุมสมัชชาเจ้าหนี้"

[translation]
10025010-1 = "第1話;可愛的泳裝與不可愛的村莊"
10025010-2 = "夜戶浦村．入口"
10025010-15 = "……萌，你那沒幹勁的打扮是怎麼回事？"
10025010-16 = "嗯？有什麼問題嗎？"
10025010-18 = "平常戴的眼鏡跑哪去了？#n而且你這不是沒帶設備來嗎？"
10025010-19 = "哎呀～戴眼鏡的話不就不能游泳了嗎？#n肯定要換成隱形眼鏡的嘛～"
10025010-20 = "設備因為沒有防水功能，所以我就開放用手機連接了。"
10025010-21 = "雖然安全性確實會降低一點就是了。"
10025010-22 = "萌，我說你啊……我們可不是來這裡玩的……"
10025010-24 = "這毫無疑問也是任務啊！"
10025010-25 = "居然以變裝為藉口，只帶這麼輕便的裝備來……#n難道不該盡可能多帶點裝備嗎！"
10025010-30 = "不，咲希。#n對這次的作戰來說，萌的判斷是正確的。"
10025010-35 = "和事前說過的一樣，在這次作戰中如何避免被當地居民懷疑是很重要的。#n因此，可能會聯想到特殊部隊的裝備應該盡可能減少。"
10025010-36 = "裝備確實會對戰鬥有幫助，但收集情報才是最優先的。#n況且也還不確定背後是否真的有什麼內幕。"
10025010-42 = "都子……你那套泳裝……"
10025010-43 = "那，那個……我覺得挺可愛的，會很奇怪嗎？"
10025010-44 = "不是，我也覺得可愛沒錯……"
10025010-45 = "但荷葉邊那麼多不會很難活動嗎？"
10025010-46 = "還有那個泳圈，你究竟打算拿來做什麼？"
10025010-47 = "你在SRT的游泳實習……不是拿了滿分嗎？"
10025010-48 = "這，這個是因為……那個，是作戰必須的物品才不得不……！"
10025010-50 = "不是因為難得來到海邊，想展現可愛的一面給老師看嗎～？"
10025010-52 = "……萌！"
10025010-54 = "話說，咲希拿的那些是什麼？"
10025010-55 = "旅行包、彈匣帶還有奔尼帽……"
10025010-56 = "這身打扮不被懷疑才怪。#n你打算在水中進行爆破作戰嗎？"
10025010-57 = "我已經盡可能減少了啊！？"
10025010-58 = "雖說是潛入調查，還是有戰鬥的可能性……"
10025010-59 = "備用的彈匣、補充水分用的水壺……防彈材質的帽子。#n為了應對水中作戰的裝備……"
10025010-60 = "……"
10025010-61 = "至少也該把那個行李包換成更休閒的款式吧？"
10025010-62 = "這個有什麼不好嗎？#n我覺得夠休閒了。"
10025010-68 = "久，久等了……！#n對不起，花的時間比想像中還多……"
10025010-69 = "我把狙擊的裝備都整理到釣魚用的包包裡了，看起來怎麼樣……？#n沒問題嗎？"
10025010-70 = "太新的話看起來可能會有點奇怪，所以我試著增加了一點使用痕跡……"
10025010-77 = "咦，咦咦……大家怎麼了……？"
10025010-79 = "這就是真正的潛入裝備嗎……是我想的太簡單了。"
10025010-80 = "果然說到潛入沒人比得過美優呢～"
10025010-82 = "咦，咦？#n我，我，很奇怪嗎……？"
10025010-89 = "[ns1]「所有人都穿上泳衣了呢。」\n[ns2]「都很適合大家哦。」"
10025010-93 = "謝，謝謝誇獎……"
10025010-94 = "那，那就好……"
10025010-96 = "雖然也有人穿得像是要來參加比賽一樣就是了。"
10025010-97 = "……不會看氣氛真抱歉啊。"
10025010-98 = "畢竟我跟可愛的打扮沒有緣分。"
10025010-99 = "[s3]「沒有那種事哦。」\n[s4]「咲希的泳裝也很可愛的哦？」"
10025010-109 = "這……我該感到開心嗎？"
10025010-110 = "如果看起來有像普通觀光客的話……好吧，謝了。"
10025010-116 = "既然大家都到齊了，開始進行潛入前的最終確認。"
10025010-117 = "本次作戰將在夜戶浦村進行調查。#n請尋找蝦子在村裡遭到廢棄，或是透過與平時不同的管道向外運送的痕跡。"
10025010-118 = "此作戰必須獲得居民們的協助。#n請務必克制可能會引起懷疑的行動。"
10025010-119 = "那，那個……都子醬。#n不好意思在作戰會議中打斷你……就，就是啊……"
10025010-121 = "我們好像，已經引起注意了……"
10025010-130 = "……看來要享受海水浴是有困難了呢。"
10025010-132 = "這裡畢竟是漁村，像這樣穿著泳裝晃來晃去當然會很奇怪吧。#n也沒看到觀光客的身影。"
10025010-133 = "總覺得，這個村子……有股會在恐怖電影裡出現的感覺……"
10025010-135 = "……這裡真的是觀光區嗎？"
10025010-137 = "根據紀錄，這裡在工廠建立之前，曾是以豐富的自然景色聞名的觀光祕境……"
10025010-138 = "然而村裡的氣氛隨著工廠的進駐有所改變，觀光客似乎也逐漸散去了。"
10025010-139 = "[s]「果然還是穿著制服過來比較好嗎？」"
10025010-140 = "不……看來光是身為外地人就會引人注目了。#n如果暴露身分的話想必會被更加警戒吧。"
10025010-141 = "調查也許會四處碰壁……不過暫且還是按照作戰計畫進行吧。"
10025010-142 = "我會在碼頭附近尋找漁夫。#n請咲希到公所調查近期的事故和事件。"
10025010-144 = "了解。"
10025010-146 = "萌負責查看監視器，確認是否有可疑人士出入村子。#n美優，麻煩你調查村子是否有我們之外的訪客。"
10025010-148 = "嗯，嗯……！"
10025010-149 = "交給我吧，咯嘻嘻。"
10025010-151 = "那麼，作戰開始！"

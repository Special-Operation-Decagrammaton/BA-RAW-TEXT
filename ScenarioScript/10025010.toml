[translation]
10025010-1 = "Episode 1;Cute Swimsuits in an Ugly Town"
10025010-2 = "Yatoura Village Entrance"
10025010-15 = "...Moe. You know we're on a mission, right?"
10025010-16 = "Hmm? What's that supposed to mean?"
10025010-18 = "Where are your glasses? And your server terminal?"
10025010-19 = "Who goes swimming with their glasses on? I'm wearing contacts."
10025010-20 = "And the server terminal isn't waterproof. I'm remoting in through my smartphone."
10025010-21 = "It's not as stable as the terminal, but it works..."
10025010-22 = "You do realize we're not actually on vacation, right?"
10025010-24 = "This is a mission!"
10025010-25 = "We need to be at peak operational efficiency, and you leave equipment behind to go swimming?"
10025010-30 = "Actually, Moe's made good choices for this mission."
10025010-35 = "Our cover story is that we're ordinary tourists. Any equipment that makes us look like special forces will blow that cover."
10025010-36 = "If we follow the book, it will help if we're in combat, but it may hinder the other aspects of our mission."
10025010-42 = "...What is that swimsuit you're wearing?"
10025010-43 = "Um... Is there something wrong with it? I thought it was cute..."
10025010-44 = "No, no, it is cute. But..."
10025010-45 = "Isn't it hard to move in that? It looks like it would be hard to move in all those frills."
10025010-46 = "And why do you have an inner tube?"
10025010-47 = "Didn't you pass the swimming test at SRT?"
10025010-48 = "Ah... That is... This is equipment for the mission..."
10025010-50 = "C'mon, how often are we at the beach? Can't you let our brave leader show off her cute side?"
10025010-52 = "Moe!"
10025010-54 = "Why don't we take a look at YOUR outfit, Saki? What's with that...stuff?"
10025010-55 = "A duffel bag... Magazine pouches... And is that a boonie hat?"
10025010-56 = "In that getup, you look more likely to blow up the pier than take in the sights."
10025010-57 = "Excuse me? I've reduced my equipment to a bare minimum in order to maintain my disguise!"
10025010-58 = "But even if we're undercover, I can't just leave behind any necessary gear."
10025010-59 = "A bulletproof boonie hat, extra bullets, a water bottle to stay hydrated, and SCUBA gear, just in case..."
10025010-60 = "..."
10025010-61 = "Can you at least get a normal duffel bag? Maybe something a little less military-grade?"
10025010-62 = "What do you mean? This is my personal duffel bag!"
10025010-68 = "S-Sorry I'm late! It took longer to get ready than I expected..."
10025010-69 = "I stowed my sniping equipment into this fishing bag. I-It doesn't look too weird, does it...?"
10025010-70 = "I also thought my fishing gear looked too new, so I weathered it by rubbing it in the sand on the nearby beach—"
10025010-77 = "Uh...? Why are you all looking at me like that?"
10025010-79 = "So this is what real infiltration looks like. I wasn't even close."
10025010-80 = "No one can match Miyu when it comes to blending in, after all."
10025010-82 = "P-Please stop staring at me...!"
10025010-89 = "[ns1] \"Oh, you all changed!\"\n[ns2] \"Your swimsuits look great.\""
10025010-93 = "Ah, thank you..."
10025010-94 = "I'm g-glad to hear that..."
10025010-96 = "We're just a few gals ready for a day on the beach...plus a weirdo who's decked out for a triathlon."
10025010-97 = "...You made your point already."
10025010-98 = "I'm sorry I didn't dress pretty like the rest of you."
10025010-99 = "[s3] \"Don't be so hard on yourself, Saki!\"\n[s4] \"I think your swimsuit looks just as pretty.\""
10025010-109 = "I'm not sure if I should be happy about that or not..."
10025010-110 = "If you mean that I look like a regular tourist, then...thank you."
10025010-116 = "It looks like we're ready, so let's run through a quick briefing."
10025010-117 = "Our mission objective is to infiltrate Yatoura Village and determine what is happening to the shrimp."
10025010-118 = "If we're going to succeed, we need the locals' cooperation. Do your best not to draw any unnecessary suspicion from them."
10025010-119 = "S-Sorry to interrupt, but..."
10025010-121 = "I think...we're already drawing attention..."
10025010-130 = "...It doesn't look like the villagers are used to swimmers here."
10025010-132 = "Right. Of course we'd stand out, wandering around in swimsuits here. This village doesn't have any good facilities for tourists."
10025010-133 = "Isn't the t-town a little...eerie? It reminds me of a horror movie..."
10025010-135 = "...Kinda weird for a beach town, right?"
10025010-137 = "According to my research, Yatoura Village used to be popular among tourists thanks to its natural beauty."
10025010-138 = "That changed after the fish processing plant opened. Tourism pretty much dried up after that."
10025010-139 = "[s] \"...Maybe you should have stuck with your academy uniforms.\""
10025010-140 = "No. Wearing our SRT uniforms would have only made us even more suspicious."
10025010-141 = "This may complicate our investigation, but we'll stick to our original cover story."
10025010-142 = "I'll interrogate the fishermen around the port. Saki, ask if there have been any incidents recently at the public service office."
10025010-144 = "Understood."
10025010-146 = "Moe, I want you to check the CCTV records for suspicious activity. And Miyu, ask around if there have been any other visitors from outside of town."
10025010-148 = "A-All right!"
10025010-149 = "Leave it to me!"
10025010-151 = "You have your orders. Let's begin!"

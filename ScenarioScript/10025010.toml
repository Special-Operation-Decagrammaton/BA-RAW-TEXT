[translation]
10025010-1 = "ตอนที่ 1;ชุดว่ายน้ำน่ารัก VS เมืองที่ไม่น่ารัก"
10025010-2 = "ปากทางเข้าหมู่บ้านยาโตอูระ"
10025010-15 = "...โมเอะ ชุดเก้ๆ กังๆ นั่นมันอะไรกันน่ะ?"
10025010-16 = "หืม? มีปัญหาอะไรกับชุดที่ฉันใส่รึไง?"
10025010-18 = "แว่นตาที่ใส่ประจำหายไปไหน? แล้วเครื่องเชื่อมต่อเซิร์ฟเวอร์อยู่ไหนล่ะ?"
10025010-19 = "มีคนสติดีที่ไหนเขาใส่แว่นสายตาไปเล่นน้ำกันบ้างล่ะ ฉันเปลี่ยนมาใส่คอนแท็กเลนส์แล้วน่ะ~"
10025010-20 = "แล้วก็เครื่องเชื่อมต่อเซิร์ฟเวอร์มันกันน้ำไม่ได้ ก็เลยเปลี่ยนมาใช้แอปที่ติดตั้งในสมาร์ทโฟนแทน"
10025010-21 = "ถึงระดับความปลอดภัยอาจจะลดลงจากเครื่องเชื่อมต่อเซิร์ฟเวอร์นิดหน่อยก็เถอะ..."
10025010-22 = "โมเอะ นี่เธอคิดว่าพวกเราไปเที่ยวพักผ่อนฤดูร้อนกันจริงๆ รึไง?"
10025010-24 = "นี่เป็นปฏิบัติการจริงของ SRT นะ!"
10025010-25 = "สถานการณ์แบบนี้ควรจะต้องเตรียมอุปกรณ์ที่จำเป็นสำหรับปฏิบัติการมาให้ได้มากที่สุด แต่นี่กลับไม่#nยอมเอามาเพราะอ้างเรื่องไปเล่นน้ำ—"
10025010-30 = "เปล่าเลยค่ะซากิ โมเอะตัดสินใจได้เหมาะสมกับปฏิบัติการครั้งนี้แล้วค่ะ"
10025010-35 = "ตามที่ฉันบอกไปก่อนหน้านี้ว่าปฏิบัติการครั้งนี้ พวกเราปลอมตัวเป็นนักท่องเที่ยวธรรมดาๆ เพราะงั้นเราก็ควรจะต้องซ่อนอุปกรณ์ที่เกี่ยวข้องกับกองกำลังพิเศษไว้ค่ะ"
10025010-36 = "ถ้าออกปฏิบัติการด้วยอุปกรณ์ครบมือตามที่เขียนไว้ในคู่มือละก็ จริงอยู่ที่เวลาต่อสู้เราอาจจะได้เปรียบ แต่ถ้าเป็นเวลาที่เข้าไปสอบถามข้อมูลจากชาวบ้าน อาจถูกเข้าใจผิดและเป็นการขัดขวางการสืบข้อมูลได้ค่ะ"
10025010-42 = "...แล้วชุดว่ายน้ำนั่นมันอะไรกัน?"
10025010-43 = "คะ...คะ...? มันดูแปลกงั้นเหรอคะ? อุตส่าห์คิดว่าชุดนี้น่ารักแล้วเชียว..."
10025010-44 = "เปล่าหรอกๆ ฉันเองก็คิดว่าน่ารักดีเหมือนกัน แต่ว่า..."
10025010-45 = "ชุดว่ายน้ำที่มีระบายดูเทอะทะแบบนั้น... มันจะไม่ขยับตัวลำบากเหรอ?"
10025010-46 = "แล้วอีกอย่าง... ห่วงยางนั่นมันอะไรน่ะ?"
10025010-47 = "มิยาโกะ ฉันจำได้ว่าตอนอยู่ที่สถาบัน SRT เธอสอบว่ายน้ำได้คะแนนเต็ม..."
10025010-48 = "คะ...คือว่า... มันเป็นอุปกรณ์สำหรับปฏิบัติการอย่างหนึ่ง...!"
10025010-50 = "แหม ไหนๆ ก็ได้มาทะเลทั้งที หัวหน้าหน่วยของเราก็คงอยากแต่งตัวน่ารักๆ ให้เห็นบ้างละมั้ง"
10025010-52 = "...โมเอะ!"
10025010-54 = "ว่าแต่ว่าซากิ... เธอเองก็พกอะไรมาเยอะแยะเลยไม่ใช่รึไง?"
10025010-55 = "กระเป๋าสะพายหลัง กระเป๋าสะพายเสริม หมวกปีกกว้าง..."
10025010-56 = "ถ้าดูแค่อุปกรณ์ที่พกมาละก็ คงเข้าใจว่าเธอจะไปปฏิบัติการระเบิดใต้น้ำแล้วละนะ..."
10025010-57 = "ฉันก็เตรียมตัวมาให้พร้อมที่สุดในแบบที่จะไม่ดูน่าสงสัยแล้วนะ?!"
10025010-58 = "ถึงจะเป็นปฏิบัติการแฝงตัวก็เถอะ แต่จะให้ทิ้งอุปกรณ์ที่จำเป็นก็คงทำแบบนั้นไม่ได้เหมือนกัน"
10025010-59 = "หมวกปีกกว้างกันกระสุนสำหรับป้องกันศีรษะ กระบอกน้ำสำหรับเพิ่มความชุ่มชื้นในร่างกาย แล้วก็อุปกรณ์สำหรับปฏิบัติการใต้น้ำกรณีฉุกเฉิน..."
10025010-60 = "......"
10025010-61 = "อย่างน้อยกระเป๋าสะพายก็เปลี่ยนเป็นแบบธรรมดาไม่ได้รึไง?"
10025010-62 = "กระเป๋าสะพายฉันมันทำไม? ฉันตั้งใจจัดมาเลยนะ"
10025010-68 = "ขะ...ขอโทษที่มาช้านะ...!"
10025010-69 = "ก่อนอื่น พวกอุปกรณ์ที่จำเป็นสำหรับการซุ่มยิง ฉันเก็บไว้ในกระเป๋าที่ใส่เบ็ดตกปลายาวแล้ว วะ...ว่าแล้วมันคงดูแปลกๆ สินะ..."
10025010-70 = "ละ...แล้วก็ถ้าอุปกรณ์มันดูใหม่เกินไปก็อาจเป็นที่สะดุดตาได้ ระหว่างทางที่มาก็ก็เลยเอาไปคลุกๆ ที่หาดให้ดูสกปรกหน่อยแล้ว—"
10025010-77 = "อะ...เอ๋...? ทำไมถึงทำหน้าแบบนั้นกันล่ะ...?"
10025010-79 = "นี่สินะ... ต้องทุ่มเทเตรียมตัวขนาดนี้ถึงจะเรียกว่าเป็นการแฝงตัวได้อย่างแท้จริง... มีช่องโหว่ซะแล้วสิ"
10025010-80 = "คิดแล้วเชียวว่าเรื่องภารกิจแฝงตัวเนี่ยเทียบกับมิยุไม่ได้จริงๆ ด้วย"
10025010-82 = "ฉะ...ฉันแปลกตรงไหนเหรอ...?"
10025010-89 = "[ns1] \"ทุกคนเปลี่ยนเป็นชุดว่ายน้ำกันแล้วสินะ!\"\n[ns2] \"น่ารักกันจังเลย\""
10025010-93 = "ขะ...ขอบคุณค่ะ..."
10025010-94 = "ค่อยยังชั่วหน่อยนะคะที่ชุดนี้ดูเข้ากันกับฉัน..."
10025010-96 = "ก็นะ... ถึงจะมีบางคนที่ใส่ชุดเหมือนชุดแข่งกีฬามาด้วยก็เถอะ"
10025010-97 = "...ขอโทษก็แล้วกันนะที่ไม่ทันได้คิดให้ดีๆ ก่อน"
10025010-98 = "ฉันคงเข้าไม่ถึงพวกชุดน่ารักๆ หรอก"
10025010-99 = "[s3] \"หืม? พูดอะไรน่ะ...?\"\n[s4] \"ครูคิดว่าชุดว่ายน้ำของซากิน่ารักมากเลยนะ?\""
10025010-109 = "จะดีใจดีมั้ยเนี่ย..."
10025010-110 = "แต่ก็นะ ถ้าดูเหมือนนักท่องเที่ยวทั่วไปก็ไม่มีปัญหาแล้วละ... ขอบคุณนะ"
10025010-116 = "ทุกคนเองก็เตรียมตัวเสร็จแล้ว ถ้างั้นฉันจะขอสรุปภารกิจให้ฟังคร่าวๆ อีกครั้งนะคะ"
10025010-117 = "ปฏิบัติการในครั้งนี้คือการสำรวจหมู่บ้านยาโตอูระและตรวจสอบว่ามีกุ้งในหมู่บ้านถูกลักลอบขนส่งออก#nไปหรือว่าถูกนำไปทิ้งหรือไม่ค่ะ"
10025010-118 = "ตามที่เคยบอกไปแล้ว สิ่งสำคัญในปฏิบัติการครั้งนี้คือต้องได้รับความร่วมมือจากคนในหมู่บ้านค่ะ ดังนั้นขอให้ระมัดระวังเพื่อไม่ให้คนในหมู่บ้านเกิดข้อสงสัยด้วยนะคะ"
10025010-119 = "คะ...คือว่า... มิยาโกะจัง... ขอโทษที่พูดแทรกขึ้นระหว่างสรุปข้อมูลนะ..."
10025010-121 = "ตะ...แต่ดูเหมือนตอนนี้พวกเรา...จะ...จะเป็นจุดสนใจมากๆ เลยละ..."
10025010-130 = "ดูไม่เหมือนบรรยากาศที่จะเล่นน้ำได้อย่างสบายๆ เลยนะคะ"
10025010-132 = "ใส่ชุดว่ายน้ำมาเดินเตร็ดเตร่อยู่ในหมู่บ้านชาวประมงที่ไม่มีสถานที่ท่องเที่ยวเลยแบบนี้ มันก็ต้องน่าสงสัยอยู่แล้วแหละ"
10025010-133 = "นอกจากนี้บรรยากาศในหมู่บ้านเองก็วังเวงด้วย... เหมือนหมู่บ้านที่เห็นในหนังสยองขวัญเลย..."
10025010-135 = "...ที่นี่ใช่สถานที่ท่องเที่ยวแน่เหรอ?"
10025010-137 = "ถ้าตามเอกสารที่บันทึกไว้ สมัยก่อนหมู่บ้านยาโตอูระเป็นสถานที่ท่องเที่ยวด้านธรรมชาติที่ได้รับความ#nนิยมมากเลยละค่ะ..."
10025010-138 = "แต่หลังจากที่มีโรงงานเข้ามาก่อตั้งที่นี่ บรรยากาศของหมู่บ้านก็ค่อยๆ เปลี่ยนไป จนเหมือนกลายเป็น#nหมู่บ้านโดดเดี่ยวที่ไม่ค่อยมีคนนอกแวะมาแล้วละค่ะ"
10025010-139 = "[s] \"...หรือว่าใส่เครื่องแบบมาจะดีกว่ากันนะ?\""
10025010-140 = "ไม่หรอกค่ะ ถ้าเปิดเผยตัวตนของ SRT ขณะที่ตกอยู่ในสถานการณ์ที่ถูกระแวงแบบนี้ จะยิ่งทำให้น่าสงสัยมากขึ้นกว่าเดิมค่ะ"
10025010-141 = "บางทีอาจทำให้การสืบข้อมูลเป็นไปได้ยากขึ้นก็ได้... เอาเป็นว่าตอนนี้เราปกปิดตัวตนต่อไปแบบนี้ก่อน#nเถอะค่ะ"
10025010-142 = "ฉันจะลองไปสืบข้อมูลจากพวกชาวประมงที่บริเวณท่าเรือ ส่วนซากิช่วยไปดูที่หน่วยงานรัฐแถวนี้แล้ว#nตรวจสอบว่าเมื่อเร็วๆ นี้มีเหตุการณ์อะไรเกิดขึ้นบ้างให้หน่อยนะคะ"
10025010-144 = "เข้าใจแล้ว"
10025010-146 = "แล้วก็โมเอะ ตรวจสอบกล้องวงจรปิดว่ามีคนน่าสงสัยเข้าออกหมู่บ้านรึเปล่า ส่วนมิยุ ฉันอยากให้ช่วย#nไปตรวจสอบหน่อยค่ะว่ามีบุคคลภายนอกเข้ามาในหมู่บ้านบ้างรึเปล่า"
10025010-148 = "ขะ...เข้าใจแล้ว...!"
10025010-149 = "ฉันจัดการให้เอง!"
10025010-151 = "เอาละ... ถ้างั้นก็รีบออกปฏิบัติการกันเถอะค่ะ!"

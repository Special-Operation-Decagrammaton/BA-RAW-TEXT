1005106-18 = "3;우타하 응원단ND;02;왜, 신나는 노래를 들으면 기분이 좋아지잖아?\n#3;em;[?]"
1005106-19 = "3;우타하 응원단ND;02;왜, 신나는 노래를 들으면 기분이 좋아지잖아?\n#3;em;[?]"
1005106-20 = "3;우타하 응원단ND;01;내가 가지고 있는 기술들을 모두 동원하더라도 후배들이 가진 고민을 완벽히 없애줄 수는 없겠지만……."
1005106-21 = "3;우타하 응원단ND;99;최소한 기분만큼이라도 전환할 수 있도록 신나는 노래를 들려주면 좋지 않을까 싶어서."
1005106-22 = "3;우타하 응원단ND;00;……이왕이면 엔지니어부의 활동을 가사로 담은 오리지널 곡으로 말이야."
1005106-23 = "[s] \"오리지널 곡?\""
1005106-24 = "3;우타하 응원단ND;07;후후, 사실은 전부터 엔지니어부의 주제곡을 만들어보고 싶다는 생각을 했었거든.\n#3;em;[음표]"
1005106-25 = "3;우타하 응원단ND;03;그래서 이참에 엔지니어부의 활약을 담은 주제곡을 만들어 볼까 싶어서."
1005106-26 = "[s] \"우타하가 작곡을……?\""
1005106-27 = "3;우타하 응원단ND;02;그게 그렇게 의아한 일인가?\n#3;em;[땀]\n#3;stiff"
1005106-28 = "3;우타하 응원단ND;00;음악을 다루는 일과 기계를 다루는 일은 본질적으로 크게 다르지 않아."
1005106-29 = "3;우타하 응원단ND;99;엔지니어가 부품을 조합해서 최적의 설계를 완성하는 것처럼, 음악가는 화성을 조합해서 가장 듣기 좋은 곡을 완성하는 거지."
1005106-30 = "3;우타하 응원단ND;03;게다가 지휘자를 뜻하는 '마에스트로'라는 단어와 '마이스터'라는 단어는 어원이 같으니까.\n#3;em;[반응]"
1005106-31 = "3;우타하 응원단ND;07;후후…… 만약 내가 밀레니엄 학원이 아닌 와일드헌트 학원에 입학했더라면, 마이스터가 아니라 마에스트로가 되었을지도 몰라."
1005106-32 = "[s] \"…….\""
1005106-33 = "3;우타하 응원단ND;02;……왜 그래? 뭔가 안 좋은 기억이라도 떠오른 거야?\n#3;em;[?]"
1005106-34 = "3;우타하 응원단ND;00;여하튼, 머릿속에 떠오른 가사에 가볍게 멜로디를 붙여 보았으니 선생님이 한번 들어줘."

[translation]
1005106-1 = "熱情的應援歌"
1005106-6 = "千年科學學園．附近的卡拉OK"
1005106-8 = "[ns1]「……怎麼回事？」\n[ns2]「……為什麼要來卡拉OK？」"
1005106-11 = "老師不是說要找個能鼓勵後輩的方法嗎？"
1005106-12 = "說到鼓勵就會想到應援歌曲。老師應該能理解吧？"
1005106-13 = "所以要來卡拉OK！"
1005106-17 = "[ns3]「……兩者之間有什麼關聯性？」\n[ns4]「……想法太跳躍了，我有點跟不上。」"
1005106-18 = "老師你想想，聽見開心的歌就會變得有精神吧？"
1005106-19 = "老師你想想，聽見開心的歌就會變得有精神吧？"
1005106-20 = "就算使用我擁有的全部技術，也無法完全消除後輩們的煩惱……"
1005106-21 = "不過至少能讓他們聽首開心的歌曲來轉換心情不是嗎？"
1005106-22 = "……沒錯，用這首將工程師部的活動填入歌詞的原創曲！"
1005106-23 = "[s]「原創曲？」"
1005106-24 = "呵呵，其實我從以前就想做工程師部的主題曲。"
1005106-25 = "所以我想趁這個機會，創作一首既能應援，又能描述工程師部活躍表現的主題曲。"
1005106-26 = "[s]「詠葉自己作曲嗎……？」"
1005106-27 = "需要這麼驚訝嗎？"
1005106-28 = "處理聲音和操控機器，兩者的本質相差不大。"
1005106-29 = "工程師是將零件組合起來完成設計圖，而音樂家則是組合聲音製作出樂譜。"
1005106-30 = "況且，「音樂家」和「巨匠」都是出自同一個語源唷。"
1005106-31 = "呵呵……如果我就讀的不是千年而是狂獵藝術學院，或許會走上音樂家的道路吧。"
1005106-32 = "[s] 「……」"
1005106-33 = "……怎麼了？想到什麼不好的回憶了嗎？"
1005106-34 = "總之，我把腦海中浮現出的歌詞加上了簡單的旋律，請老師聽聽看吧。"
1005106-40 = "歌名為……〈燃燒的巨匠魂〉。"
1005106-49 = "― 注入　巨匠的　炙熱靈魂"
1005106-52 = "― 改造　並　交還　各位的物品"
1005106-56 = "― 即使　你　不需要　我也會　幫你改造"
1005106-59 = "[ns]「…………」"
1005106-61 = "― 潤滑　需要移動的地方"
1005106-64 = "― 需要固定的地方　貼上　大力膠帶"
1005106-68 = "― 誰都能　輕易地　修好"
1005106-71 = "― 如果想要　可靠的　性能　請告訴我"
1005106-74 = "[ns]「……等一下，詠葉。」"
1005106-79 = "怎麼了嗎，老師。歌曲正要進入高潮的說。"
1005106-80 = "有哪裡覺得奇怪嗎？"
1005106-81 = "[s5]「……旋律和節奏不對。」\n[s6]「歌詞有點……」"
1005106-82 = "咦？節奏不對嗎？"
1005106-83 = "大概是因為……歌詞太過熱情了吧？比起旋律更能讓人燃起鬥志。"
1005106-84 = "嗯？歌詞的內容很難理解？"
1005106-85 = "大概是因為……旋律太過熱情了吧？歌詞與其相比顯得失色許多。"
1005106-86 = "目前還在調整階段，再稍微改一下就好了。"
1005106-87 = "先把副歌的部份也聽完吧。老師一定能感受到這首歌的魅力！"
1005106-88 = "……那麼，我繼續了。"
1005106-93 = "― 湧出的　Chabasco！　飛散的　Parmesan！"
1005106-96 = "― 只要有熱情　什麼都能改造"
1005106-100 = "[ns]「為什麼是Chabasco……？」"
1005106-102 = "（之後詠葉連續唱了一個多小時的奇怪歌曲……)"
1005106-103 = "（……之後才知道部員們之所以會無精打采，#n　是因為詠葉一直在工作室哼著奇怪的歌曲……)"

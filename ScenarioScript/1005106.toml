[translation]
1005106-1 = "A Captain's Soul of Flaming...Passion?"
1005106-6 = "Karaoke Near Millennium School"
1005106-8 = "[ns1] \"...So?\"\n[ns2] \"...You sure karaoke is a good idea right now?\""
1005106-11 = "What do you mean? You're the one who suggested we cheer up the underclassmen."
1005106-12 = "And what cheers someone up better than cheering?"
1005106-13 = "And what better place for cheering than karaoke!"
1005106-17 = "[ns3] \"...How do you figure?\"\n[ns4] \"...I'm not sure I follow.\""
1005106-18 = "You know how upbeat music makes people feel, well, upbeat?"
1005106-19 = "You know how upbeat music makes people feel, well, upbeat?"
1005106-20 = "No matter how much I try to come up with something, my engineering prowess can do nothing for them..."
1005106-21 = "So I figured the next best thing would be karaoke."
1005106-22 = "...Oh, and I decided I'd come up with an original song for the Engineering Department."
1005106-23 = "[s] \"An original song?\""
1005106-24 = "Heehee. To be more specific, a theme song."
1005106-25 = "I want to make a song that will really put a spotlight on all of the Engineering Department's achievements."
1005106-26 = "[s] \"By song, you mean...an actual song? And by original, you mean an Utaha original?\""
1005106-27 = "What are you implying?"
1005106-28 = "Music, machines, they're basically the same thing."
1005106-29 = "Machines require distinct parts that function together to form an optimal design, while music requires distinct notes that flow together to form a harmonious song."
1005106-30 = "The words maestro, which means conductor, and meister even have similar etymologies."
1005106-31 = "Who knows? If I had gone to Wildhunt Academy instead of Millennium School, maybe I'd be a maestro instead of a meister."
1005106-32 = "[s] \"...\""
1005106-33 = "...What's wrong? Are you reliving a bad memory or something?"
1005106-34 = "Because if so, you're in luck. I already have something that will lift your mood. I'd like you to hear it."
1005106-40 = "I call this...A Meister's Burning Soul of Fiery Flaming Passion."
1005106-49 = "― A meister's burning soul,"
1005106-52 = "― means we work like a train burning coal."
1005106-56 = "― We'll mod your gadgets, even if you don't want it!"
1005106-59 = "[ns] \"...\""
1005106-61 = "― For a mobile part, play it smart, use grease like a drape to keep it in shape."
1005106-64 = "― For all repairs, there's nothing like some duct tape."
1005106-68 = "― Anyone can fix a machine, you could be capable."
1005106-71 = "― But if you want reliable, our quality's undeniable, just know, we're not liable."
1005106-74 = "[ns] \"...Utaha, just, um... Hold, up, Utaha.\""
1005106-79 = "What is it, Sensei? I was just about to hit the climax."
1005106-80 = "Is there a problem with my song? Not technical enough, do you think?"
1005106-81 = "[s5] \"The melody and rhythm are off.\"\n[s6] \"The lyrics are...a bit of a head-scratcher.\""
1005106-82 = "The rhythm is off?"
1005106-83 = "That's because... Is it possible that the passion of my lyrics is too powerful to be matched by mere sound?"
1005106-84 = "The lyrics are hard to understand?"
1005106-85 = "That's probably because... No, it's definitely because the passion latent in these lyrics is too much for any single person to take in all at once."
1005106-86 = "But engineering is one part invention, a thousand parts iteration. I'll get better, I'll make sure of it."
1005106-87 = "...But until then, do you want to listen to more? I think once you hear the chorus, the rest of the song will really come together for you."
1005106-88 = "Here goes."
1005106-93 = "― Like boiling Parmesan in Tabasco! No such thing as a fiascooooo!"
1005106-96 = "― With passion as our ingredieeeeent, anything can be made expedieeeeent!"
1005106-100 = "[ns] \"But why Tabasco...?\""
1005106-102 = "Utaha's song-adjacent sounds continued for over an hour..."
1005106-103 = "...I soon discovered that the Engineering Department members were feeling drained due to the energy required to listen to Utaha's strange vocals..."

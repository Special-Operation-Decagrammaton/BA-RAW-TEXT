[translation]
1005106-1 = "เพลงเชียร์ของหัวหน้าสุดร้อนแรง"
1005106-6 = "ห้องคาราโอเกะใกล้ๆ โรงเรียนมิลเลเนียม"
1005106-8 = "[ns1] \"แล้ว...?\"\n[ns2] \"ทำไมถึงมาคาราโอเกะล่ะ...?\""
1005106-11 = "ทำไมน่ะเหรอ? ก็คุณครูเป็นคนชวนให้หาวิธีเชียร์อัปพวกรุ่นน้องไม่ใช่รึไง"
1005106-12 = "เพลงเชียร์ก็คือดนตรี ดนตรีก็คือเพลง..."
1005106-13 = "เพราะงั้นก็ต้องมาคาราโอเกะสิ!"
1005106-17 = "[ns3] \"มันเกี่ยวกันตรงไหนน่ะ...?\"\n[ns4] \"เราคุยเรื่องเดียวกันอยู่มั้ยนะ...\""
1005106-18 = "ทำไมล่ะ ถ้าได้ฟังเพลงสนุกๆ ก็จะทำให้อารมณ์ดีไม่ใช่รึไง?"
1005106-19 = "อะไรกันล่ะคุณครู ถ้าได้ฟังเพลงสนุกๆ ก็จะทำให้อารมณ์ดีไม่ใช่รึไง?"
1005106-20 = "ถึงฉันจะใช้ความรู้ด้านวิศวกรรมทั้งหมดที่มี ทำให้ความกังวลของรุ่นน้องหายไปหมดไม่ได้ก็เถอะ..."
1005106-21 = "เลยคิดว่าอย่างน้อยถ้าร้องเพลงสนุกๆ ให้ฟังก็อาจช่วยให้ร่าเริงขึ้นได้บ้าง..."
1005106-22 = "อ๋อ แล้วฉันคิดว่าจะต้องเป็นเพลงต้นฉบับที่มีเนื้อเพลงเกี่ยวกับกิจกรรมของชมรมวิศวกรรมด้วย"
1005106-23 = "[s] \"เพลงต้นฉบับเหรอ?\""
1005106-24 = "ฮุฮุ อันที่จริงแล้ว ฉันอยากจะแต่งเพลงประจำชมรมวิศวกรรมขึ้นมาสักเพลงตั้งนานแล้วละ"
1005106-25 = "เพราะงั้นก็เลยคิดว่าตอนนี้อาจเป็นช่วงเวลาที่เหมาะกับการแต่งเพลงประจำชมรมก็ได้..."
1005106-26 = "[s] \"อุทาฮะแต่งเพลงด้วยเหรอ...?\""
1005106-27 = "มันแปลกขนาดนั้นเลยเหรอ?"
1005106-28 = "การแต่งเพลงกับการปรับแต่งเครื่องจักรน่ะ พื้นฐานไม่ได้ต่างกันเลยไม่ใช่รึไง"
1005106-29 = "นักแต่งเพลงก็ต้องประกอบทำนองให้เข้ากันเพื่อให้ดนตรีน่าฟัง เหมือนกับวิศวกรที่ต้องประกอบ#nชิ้นส่วนของเครื่องจักรให้เหมาะสม"
1005106-30 = "นอกจากนี้ รากศัพท์ของคำว่า \"ไมสเตอร์\" กับ \"เมสโตร\" ก็มีความหมายเหมือนกัน ที่แปลว่า#nนักสรรสร้างยังไงล่ะ"
1005106-31 = "ฮุฮุ... ถ้าเกิดฉันเรียนอยู่ที่สถาบันไวลด์ฮันต์ แทนมิลเลเนียมละก็ ฉันอาจจะได้เป็นเมสโตรแทนก็ได้นะ"
1005106-32 = "[s] \"...\""
1005106-33 = "ทำไมทำหน้าแบบนั้นล่ะ? นึกถึงความทรงจำขมขื่นอะไรขึ้นมารึไง?"
1005106-34 = "ยังไงก็เถอะ ฉันลองแต่งทำนองกับเนื้อเพลงไว้ในหัวคร่าวๆ แล้ว คุณครูลองฟังดูหน่อยแล้วกัน"
1005106-40 = "ชื่อเพลงก็คือ... <จิตวิญญาณแห่งไมสเตอร์ที่ร้อนแรง>"
1005106-49 = "― รวบรวมพลังใจที่เร่าร้อนของไมสเตอร์"
1005106-52 = "― และปรับปรุงอุปกรณ์ให้ทุกๆ คน"
1005106-56 = "― ต่อให้ไม่ต้องการ เราก็จะปรับปรุงให้..."
1005106-59 = "[ns] \"...\""
1005106-61 = "― น้ำมันและจาระบีชะโลมทุกที่ที่เคลื่อนไหว..."
1005106-64 = "― เทปกาวผ้าที่พันทุกที่ที่ต้องยึดติด..."
1005106-68 = "― ไม่ว่าใครก็ซ่อมได้ ง่ายๆ~"
1005106-71 = "― ถ้าต้องการฟังก์ชันเฉพาะก็แวะมาหาพวกเรา"
1005106-74 = "[ns] \"รอเดี๋ยวก่อนนะ อุทาฮะ\""
1005106-79 = "อะไรกันน่ะคุณครู... กำลังจะถึงท่อนฮุคเลยนะ"
1005106-80 = "หรือเพลงของฉันมีปัญหาอะไรรึเปล่า?"
1005106-81 = "[s5] \"จังหวะกับทำนองมัน... ไม่เข้ากันน่ะ\"\n[s6] \"เนื้อเพลงมัน... เข้าใจยากน่ะ...\""
1005106-82 = "หืม? ไม่เข้าจังหวะงั้นเหรอ?"
1005106-83 = "เรื่องนั้นบางที... อาจเป็นเพราะฉันมีแพสชั่นในเนื้อเพลงมากกว่าดนตรีละมั้ง?"
1005106-84 = "หืม? เนื้อเพลงเข้าใจยากเหรอ?"
1005106-85 = "เรื่องนั้นบางที... อาจเป็นเพราะฉันถนัดเรื่องดนตรีมากกว่าเขียนเนื้อเพลงละมั้ง?"
1005106-86 = "ตอนนี้ยังอยู่ในช่วงพัฒนาอยู่ ปรับๆ แต่งๆ นิดหน่อยเดี๋ยวก็ดีขึ้นแหละ"
1005106-87 = "ก่อนอื่นก็ลองฟังเพลงดูก่อนแล้วกัน ถ้าลองฟังจนถึงท่อนฮุค ก็จะเข้าใจเนื้อเพลงได้ดีขึ้นเองแหละ"
1005106-88 = "ถ้างั้นฉันจะร้องต่อละนะ..."
1005106-93 = "― ซอสชาบัสโก้ที่เดือดพล่าน~! ผงพาร์เมซานที่ลอยคลุ้ง~!"
1005106-96 = "― ขอแค่มีพลังใจ ไม่ว่าอะไรก็ปรับแต่งได้~—"
1005106-100 = "[ns] \"ซอสชาบัสโก้เกี่ยวอะไรด้วย...?\""
1005106-102 = "(หลังจากนั้นอุทาฮะก็ร้องเพลงแปลกๆ นั่นต่อไปอีกชั่วโมงกว่าๆ...)"
1005106-103 = "(หลังจากนั้นคุณครูก็ค้นพบสาเหตุที่สมาชิกชมรมวิศวกรรมดูหมดแรง ก็เป็นเพราะอุทาฮะเอาแต่#nร้องเพลงแปลกๆ อยู่ในห้องทำงาน...)"

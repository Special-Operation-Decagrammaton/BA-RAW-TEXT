84308100100-56 = "#all;hide"
84308100100-57 = "3;세이아;04;대답을 꺼리는 거 보니 맞는 모양이네요.\n#3;em;…"
84308100100-58 = "3;리오;01;시간이 없어. 말했듯이 저들은 이미 게임개발부의 시연장 안에 있어."
84308100100-59 = "3;리오;02;들키지 않고 최대한 근접해서 상황을 알아내 줘. 그리고 상황에 따라 필요하다면, 제압도 부탁해."
84308100100-60 = "3;세이아;99;알겠어요. 그렇게 하죠."
84308100100-61 = "3;세이아;01;가죠, 네루. 우선은 일이 먼저니까요.\n#3;em;[반응]"

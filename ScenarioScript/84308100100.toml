[translation]
84308100100-6 = "Thank you for coming, you two. Unfortunately, there's no time to waste."
84308100100-11 = "Not a day of peace and quiet. Is it going to be like this all week?"
84308100100-12 = "I wish I could say no, but I think it will be."
84308100100-13 = "Let me just say...I'm glad to work with Neru, but if you need me to go alone, I can handle that."
84308100100-14 = "Heh, is that confidence I'm hearing?"
84308100100-15 = "Are you saying you WANT to go it alone?"
84308100100-19 = "...I'm saying I can."
84308100100-20 = "Whoa, straightforward then! Haha! I like it! I like people like you."
84308100100-21 = "How about it, Rio? You want to send her off solo? I'm good either way."
84308100100-23 = "No."
84308100100-25 = "That's a firm answer."
84308100100-26 = "Firm answer."
84308100100-28 = "You both had the wrong idea. If I'd thought you could do this one alone, Yurizono Seia, I'd have called only you."
84308100100-29 = "The fact that I called both of you means it would be more efficient to do it that way. I hope you can understand."
84308100100-31 = "...I understand."
84308100100-32 = "Understand."
84308100100-37 = "...Did I say something wrong?"
84308100100-38 = "No, we're joking. Please don't worry about it."
84308100100-39 = "So, why did you call us here? What's the task at hand?"
84308100100-40 = "The task itself isn't difficult. I've confirmed there's an intruder in the exhibition hall's Game Development Department booth."
84308100100-41 = "I need you two to get down there, find the culprit, and figure out what they're up to."
84308100100-43 = "...Are they holdouts from the group we've been seeing?"
84308100100-44 = "Not impossible. We'll see what we can find out."
84308100100-45 = "I don't know how they got in there...but it seems they've been there for a while."
84308100100-46 = "Also, thanks to all the various infiltration attempts in the last few days, they've increased security. I'll need you both to be at the top of your game."
84308100100-47 = "Infiltration attempts...over the last few days?"
84308100100-48 = "Um... So..."
84308100100-49 = "Are you talking about OUR infiltration attempts? You're not, are you?"
84308100100-50 = "...Take these for now."
84308100100-54 = "Hey."
84308100100-55 = "Walkie talkies, for communication with each other."
84308100100-57 = "Her lack of an answer is an answer in itself."
84308100100-58 = "We're running out of time. As I already mentioned, the intruders are already in the Game Development Department's exhibition hall."
84308100100-59 = "Get as close as you can without getting caught, and figure out what's going on. Also subdue them, if the situation calls for it."
84308100100-60 = "All right. Consider it done."
84308100100-61 = "Let's go, Neru. Duty calls."

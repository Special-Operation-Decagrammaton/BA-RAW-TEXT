84308100100-28 = "3;리오;02;두 사람 모두 전제가 잘못되었어. 내가 그럴 수 있다고 판단한 일이었다면, 처음부터 유리조노 세이아, 너만 불렀겠지."
84308100100-29 = "3;리오;01;두 사람을 함께 불렀다는 건 그 자체로 이미 그러는 편이 훨씬 효율적인 일이라는 의미야. 이 부분은 이해해 줬으면 하는데."
84308100100-30 = "#all;hide"
84308100100-31 = "1;세이아;01\n5;네루 교복;24;……라고 하신다.\n#5;em;[한숨]"
84308100100-32 = "1;세이아;99;라고 하시네요."
84308100100-33 = "#st;[0,0];instant;1;"
84308100100-34 = "#clearST"
84308100100-35 = "#all;hide"
84308100100-36 = "3;리오;01\n#3;em;[?]\n#3;h\n#wait;1000"
84308100100-37 = "3;리오;04;……나 뭐 잘못했어?\n#3;stiff"
84308100100-38 = "5;세이아;03;아니요. 그냥 장난이에요. 신경 쓰지 말아 주세요.\n#5;al\n#3;m1\n#5;em;[재잘]"
84308100100-39 = "5;세이아;02;그래서 어떤 연유로 부르신 거죠? 말씀하신 그 '일'이라는 게 뭔지 알려주실 수 있을까요?"
84308100100-40 = "3;리오;01;일 자체는 그리 어렵지 않아. 시연장의 게임개발부 부스로 침입자가 잠입했다는 사실을 확인했거든."
84308100100-41 = "3;리오;99;두 사람이 해 줄 일은 지금 바로 그곳을 급습해 범인을 색출하고, 또다시 시연장에 어떤 공작을 벌이고 있던 건지 알아내는 거야."
84308100100-42 = "#all;hide"
84308100100-43 = "3;네루 교복;01;……설마 그때 그 녀석들의 잔당?\n#3;em;…"
84308100100-44 = "1;리오;02;가능성이 없진 않지. 뭔가 단서가 될 걸 찾아낼지도 모르고.\n#1;ar\n#3;m5"
84308100100-45 = "1;리오;99;어떻게 들어갔는지는 모르지만…… 오늘 꽤 오래전부터 잠입해 있었던 것 같아."
84308100100-46 = "1;리오;01;시연장은 요 며칠 잠입 시도들이 많았기에 보안이 강화돼서, 전보다는 더욱 들어가기가 어려워졌어. 두 사람의 협력이 필요해."
84308100100-47 = "3;네루 교복;23;요 며칠……? 잠입 시도……?\n#3;em;[?]"
84308100100-48 = "3;네루 교복;24;그…… 있잖아.\n#3;stiff"
84308100100-49 = "3;네루 교복;04;혹시 해서 묻는 건데, 우리들 때문이냐? 아니지?"

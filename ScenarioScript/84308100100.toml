[translation]
84308100100-6 = "你們兩個來得正好。現在時間緊迫。"
84308100100-11 = "真的是每天都有狀況發生……難道整個星期都得這樣嗎？"
84308100100-12 = "雖然我也很想否認，但恐怕就是如此吧。"
84308100100-13 = "話說回來……好久不見了呢，寧瑠。#n在這之前都是我獨自執行任務……"
84308100100-14 = "你那個語氣是怎麼回事？#n才幾天沒見就變得這麼有自信啊？"
84308100100-15 = "已經闖出自信了是嗎？#n所以這次也想一個人去──你是這個意思吧？"
84308100100-19 = "……如果可以的話。"
84308100100-20 = "哇，居然不否認！#n哈哈，不錯嘛！我就喜歡這種傢伙。"
84308100100-21 = "所以怎麼樣？莉央？#n我不介意按照這傢伙說的做哦？"
84308100100-23 = "不行。"
84308100100-25 = "好果斷。"
84308100100-26 = "真果斷。"
84308100100-28 = "你們兩個的前提都是錯的。#n如果我認為那樣可行的話，一開始就只會找百合園聖亞過來。"
84308100100-29 = "之所以把你們一起請來，就代表我認為這麼做更有效率。#n這點希望你們能夠理解。"
84308100100-31 = "……他是這麼說的。"
84308100100-32 = "確實是這麼說的。"
84308100100-37 = "……我說錯了什麼話嗎？"
84308100100-38 = "沒有，我們只是開個玩笑而已。請別放在心上。"
84308100100-39 = "所以為什麼找我們來呢？#n可以告訴我那件「事」是什麼事嗎？"
84308100100-40 = "事情本身並不困難。#n我確認到有人入侵了遊戲開發部在會場的展示區。"
84308100100-41 = "而你們的工作就是立刻展開突襲，並在抓住犯人後查明他們在展示場的陰謀。"
84308100100-43 = "……難道是當時那些傢伙的殘黨？"
84308100100-44 = "不是沒有這個可能性。#n或許能找到相關的線索也說不定。"
84308100100-45 = "雖然還不清楚他們的潛入方式……但對方似乎已經潛入了好一段時間。"
84308100100-46 = "由於這幾天嘗試潛入的人很多，會場的維安也有所增強……#n因此不像之前那麼容易潛入，你們兩人必須互相配合。"
84308100100-47 = "這幾天……？嘗試潛入……？"
84308100100-48 = "那個……"
84308100100-49 = "以防萬一還是問一下……是我們造成的嗎？應該不是吧？"
84308100100-50 = "……先收下這個吧。"
84308100100-54 = "喂。"
84308100100-55 = "這是能讓你們聯絡彼此的對講機。"
84308100100-57 = "既然選擇避而不談，看來是八九不離十了啊。"
84308100100-58 = "沒有時間了。#n如同我剛才所說，入侵者已經進入了遊戲開發部的展示區。"
84308100100-59 = "請你們盡可能在避人耳目的前提下查明情況。#n如果有需要的話，要制服對方也沒問題。"
84308100100-60 = "知道了，就這麼辦吧。"
84308100100-61 = "走吧寧瑠。現在工作優先。"

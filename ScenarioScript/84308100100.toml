84308100100-18 = "5;네루 교복;21\n1;세이아;09\n#1;em;[///]\n#1;stiff\n#1;h\n#5;h\n#wait;1200"
84308100100-19 = "1;세이아;06;……가능하다면요."
84308100100-20 = "5;네루 교복;09;이야, 부정도 안 하네. 하하! 그래도 좋잖아! 마음에 들어, 나는 늘 이런 녀석이 마음에 든다니까.\n#5;em;[재잘]"
84308100100-21 = "5;네루 교복;22;그래서, 어때. 리오? 이 녀석 말대로 해도 괜찮겠어? 나야 크게 상관은 없는데 말이야."
84308100100-22 = "#all;hide"
84308100100-23 = "3;리오;05;안돼.\n#3;em;[반응]"

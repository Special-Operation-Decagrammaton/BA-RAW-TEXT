84308100100-11 = "1;세이아;01\n5;네루 교복;23;정말 하루도 빠지지 않고 일이 발생하는구만. 이거 일주일 내내 이러는 거 아니야?"
84308100100-12 = "1;세이아;99;아니라고 말씀드리고 싶지만, 저 또한 왠지 그런 느낌이 드네요."
84308100100-13 = "1;세이아;02;그래도 막상…… 네루, 당신과 함께 모인 건 오랜만이네요. 지금까지는 저 혼자서 임했던지라…….\n#1;em;[반응]"
84308100100-14 = "5;네루 교복;22;헤에, 뭐야. 그 말투? 잠깐 안 본 새 꽤나 자신감이 붙었잖아?"
84308100100-15 = "5;네루 교복;21;왜, 조금은 의기양양해졌어? 이번에도 혼자 가고 싶다-라던가, 그런 이야기 하려는 거지?"
84308100100-16 = "#st;[0,0];instant;1;"

[translation]
84308100100-6 = "ยินดีต้อนรับกลับมา ทั้งสองคนเลย น่าเสียดายที่ตอนนี้เราจะล่าช้ากันไม่ได้แล้ว"
84308100100-11 = "มีเรื่องเกิดขึ้นไม่เว้นวันจริงๆ เลย นี่ฉันต้องจัดการเรื่องแบบนี้ตลอดทั้งสัปดาห์เลยงั้นเหรอ?"
84308100100-12 = "ฉันก็อยากบอกว่าไม่นะคะ แต่ฉันก็รู้สึกว่าเรายังต้องเหนื่อยอีกเยอะเหมือนกัน"
84308100100-13 = "แต่จะว่าไป... ฉันไม่ได้เจอคุณนานแล้วนะคะ เนรุ ที่ผ่านมาฉันไปทำภารกิจคนเดียวตลอดน่ะ..."
84308100100-14 = "โอ้โห ดูพูดเข้าสิ? ไม่ได้เจอกันแป๊บเดียว แต่ก็ดูมั่นอกมั่นใจมากขึ้นนะ"
84308100100-15 = "ทำไมถึงได้ฮึกเหิมขึ้นมาแบบนั้นล่ะ? หรือว่าครั้งนี้ก็อยากไปทำภารกิจแบบฉายเดี่ยวอีก?"
84308100100-19 = "ถ้าเป็นไปได้ก็อยากค่ะ..."
84308100100-20 = "โอ้โห ไม่ปฏิเสธซะด้วย ฮ่าฮ่า! แบบนี้ละดี! ฉันชอบ ฉันชอบคนแบบนี้ละ"
84308100100-21 = "ว่ายังไงล่ะ ริโอะ? ช่วยสงเคราะห์คนไฟแรงทางนี้หน่อยสิ ฉันน่ะไม่เกี่ยงอยู่แล้ว"
84308100100-23 = "ไม่ได้"
84308100100-25 = "เคร่งจังแฮะ"
84308100100-26 = "เคร่งครัดน่าดูเลยนะคะ"
84308100100-28 = "ทั้งสองคนสันนิษฐานผิดแล้วละ ถ้าฉันคิดว่าทำแบบนั้นได้ตั้งแต่แรก ฉันก็คงเรียกแค่เธอมาคนเดียว#nตั้งแต่แรกแล้วละ ยูริโซโนะ เซอา"
84308100100-29 = "ที่ฉันเรียกมาทั้งสองคน นั่นก็เพราะงานนี้ถ้าทำด้วยกันมันจะมีประสิทธิภาพมากกว่า หวังว่าจะเข้าใจใน#nส่วนนี้กันนะ"
84308100100-31 = "อย่างนี้สินะ..."
84308100100-32 = "อย่างนี้สินะคะ"
84308100100-37 = "ฉันพูดอะไรผิดเหรอ...?"
84308100100-38 = "เปล่าค่ะ พวกฉันแค่ล้อเล่นค่ะ ไม่ต้องห่วงนะคะ"
84308100100-39 = "สรุปว่าจะให้ไปทำอะไรเหรอคะ? ช่วยบอกได้มั้ยคะว่า 'งาน' ที่บอกว่าให้ไปทำด้วยกันคืออะไร?"
84308100100-40 = "งานไม่ยากหรอก ฉันได้ข้อมูลมาว่ามีผู้บุกรุกเข้ามาในห้องของชมรมพัฒนาเกมที่อยู่ในห้องสาธิต"
84308100100-41 = "สิ่งที่ทั้งสองคนต้องทำก็คือ บุกเข้าไปที่นั่นแล้วหาคนร้าย แล้วสืบหาว่าคนพวกนั้นวางแผนทำอะไรกัน#nในห้องสาธิต"
84308100100-43 = "พวกคนที่ยังเหลือของเจ้าพวกนั้นเหรอ...?"
84308100100-44 = "ก็เป็นไปได้ เราอาจจะไปหาเบาะแสอะไรจากตรงนั้นก็ได้"
84308100100-45 = "ฉันไม่รู้ว่าพวกนั้นเข้าไปได้ยังไง... แต่น่าจะแทรกซึมกันเข้าไปนานแล้ว"
84308100100-46 = "ไม่กี่วันมานี้มีการพยายามแทรกซึมเข้าไปในห้องสาธิตอยู่หลายครั้ง จึงมีการเพิ่มระดับการรักษาความ#nปลอดภัยให้มากขึ้น ทำให้เข้าไปข้างในได้ยากกว่าเดิมมาก ทั้งสองคนจึงต้องร่วมมือกัน"
84308100100-47 = "มีการพยายามเข้าไป...? ในไม่กี่วันมานี้...?"
84308100100-48 = "เอ่อ... คือว่า..."
84308100100-49 = "ฉันแค่ถามเฉยๆ นะ นี่เป็นเพราะพวกเราหรือเปล่า? ไม่ใช่ใช่มั้ย?"
84308100100-50 = "รับนี่ไปก่อนเถอะ..."
84308100100-54 = "ไม่ฟังกันเลย"
84308100100-55 = "นี่คือเครื่องสื่อสารไร้สาย ทั้งสองคนจะได้ติดต่อกันได้"
84308100100-57 = "ดูจากการหลีกเลี่ยงที่จะตอบแล้ว ท่าทางจะใช่สินะคะ"
84308100100-58 = "เราไม่มีเวลาแล้ว อย่างที่ฉันบอกไปว่าคนพวกนั้นเข้าไปอยู่ในห้องสาธิตของชมรมพัฒนาเกมแล้ว"
84308100100-59 = "ช่วยเข้าไปให้ใกล้มากที่สุดโดยไม่ให้ถูกจับได้ แล้วสืบหาสิ่งที่เกิดขึ้น และถ้าจำเป็นต้องจัดการ#nคนพวกนั้น ก็ฝากด้วยนะ"
84308100100-60 = "เข้าใจแล้วค่ะ เอาตามนั้นค่ะ"
84308100100-61 = "ไปกันเถอะค่ะ เนรุ งานต้องมาก่อนนะคะ"

[translation]
10044040-1 = "Episode 4;On That Train"
10044040-2 = "*sigh*"
10044040-3 = "No train. Train gone."
10044040-5 = "We took the bus trip for nothing. Not that I...had any expectations... Gotta remember that..."
10044040-6 = "[ns] \"By the way...\""
10044040-8 = "[ns] \"...just what kind of cargo is on that train?\""
10044040-13 = "Eh? Did we not tell you?"
10044040-14 = "Nope, we no tell Sensei."
10044040-15 = "Oh. Yeah, you're right."
10044040-17 = "You've been helping all this time without knowing why?"
10044040-18 = "[s1] \"I was told it was an emergency...\"\n[s2] \"I always come running if a student asks for help.\""
10044040-21 = "Wh-Whoa... So there ARE people like that out there..."
10044040-22 = "Pahyahya, straightforward as always."
10044040-23 = "All right, Sensei, listen up. The cargo in that train..."
10044040-28 = "...is a complete mystery!"
10044040-29 = "[s] \"H-Huh...?\""
10044040-31 = "Yeah, we don't know either, and we don't care."
10044040-32 = "\"Get thing to place on time,\" that's all we know."
10044040-33 = "That's right. It's all we've got to do. Doesn't matter what it is."
10044040-34 = "[s] \"Really.\""
10044040-36 = "H-How are you so calm about this, Sensei?! I've got questions here!"
10044040-37 = "Shouldn't you at least know WHAT you're delivering?"
10044040-38 = "Well, they did tell us, actually, but we weren't listening."
10044040-39 = "Nope. Words go in, words fall out."
10044040-40 = "You must be SO proud!!"
10044040-41 = "Hey! Like I said, it doesn't matter!"
10044040-42 = "Job's the same, whether we know or not."
10044040-43 = "Ugh... So you just do what you're told, no questions asked?"
10044040-44 = "Is that bad?"
10044040-45 = "Bad...? I-I don't know if I'd call it \"bad\"..."
10044040-46 = "But shouldn't you at least be able to make your own decisions?"
10044040-47 = "Hmm. Yeah, I guess."
10044040-48 = "But what are YOU doing here, if not \"doing what you're told\"?"
10044040-49 = "W-Well, that's..."
10044040-50 = "Yeah, you look like you'd rather be anywhere else!"
10044040-51 = "Oof... Critical hit, right where it hurts..."
10044040-52 = "Th-The thing is... Okay, yes, I DO what I'm told sometimes, but that doesn't mean I WANT to live that way!"
10044040-53 = "Where was I even going with this...? Anyway!"
10044040-54 = "I'm just an engineer, so for me, that kind of freedom is just a dream. Probably impossible."
10044040-55 = "But you two are officers! You have a whole lot more power than I do!"
10044040-57 = "Nah. Bigger job, bigger bosses."
10044040-58 = "We're just middle management."
10044040-60 = "Th-That's..."
10044040-61 = "I think we'd both love to skip all the boring jobs we do..."
10044040-62 = "...but it'd be more boring to not do anything, so we just do them."
10044040-63 = "Hm. So if I ever made officer, it'd be more of the same. That doesn't give me a lot to look forward to..."
10044040-64 = "Eh, just live. One day, next day, that's all you need."
10044040-65 = "[ns3] \"This is getting deep...\"\n[ns4] \"Anyway, so...no one knows what the cargo is.\""
10044040-68 = "Nope. I DO remember hearing it's very, very important."
10044040-69 = "Ooh. Should we peeky-peeky?"
10044040-70 = "W-We shouldn't do that..."
10044040-71 = "Didn't YOU just say we ought to know what we're delivering?"
10044040-72 = "That's different! Y-You know, confidentiality and all that...!"
10044040-73 = "I didn't hear anything about that. Did you? Pahyahya!"
10044040-74 = "What do you say, Sensei? Should we open it?"
10044040-75 = "Eh? Not without permission? Aw, that's no fun."
10044040-76 = "Ugh... I'm getting a really bad feeling about all this..."
10044040-84 = "Whatcha up to, Hikari?"
10044040-85 = "Called the next station. Trains there."
10044040-86 = "Hm? What'd you call with?"
10044040-87 = "Waaalkie talkie! I stole!"
10044040-88 = "Pahyahya! Nice one, Hikari!"
10044040-89 = "N-Now that I think about it, that's one way we could solve this."
10044040-90 = "Before it departs again..."
10044040-91 = "Yeah, we should just tell 'em to keep it there! Hikari, gimme that!"
10044040-96 = "Hey, hey. Can you hear me? Highlander crew in charge over there?"
10044040-97 = "Ah... Y-Yes. I can hear you..."
10044040-98 = "This is Tachibana Nozomi from the CCC. You have a freight train that just got there, right?"
10044040-99 = "That's ours. It keeps taking off on its own. There's a glitch or something."
10044040-100 = "Keep it there. Don't let it leave. We'll be there right away."
10044040-101 = "Uh...we can't keep hold of a freight train that big at this station..."
10044040-102 = "And we've got to keep the passenger trains moving..."
10044040-103 = "No, listen, you HAVE to keep hold of it. Otherwise, there's gonna be a huge problem!"
10044040-104 = "Just what is going on...? H-Hold on... And right now, we also have a li—"
10044040-105 = "Big train stays put! No leaving, no joke! We are jokeless! Repeat, jokeless! "
10044040-106 = "...What?"
10044040-107 = "*sigh* Look, there's REALLY important cargo on that train!"
10044040-108 = "And that glitch has been sending it all over the place!"
10044040-111 = "..."
10044040-112 = "Got it? Hey, you still there? Do you GET how important this is?!"
10044040-113 = "Let me... Hi, yes, I know how they sound, but they are telling the truth."
10044040-114 = "Uh... N-No, I mean..."
10044040-120 = "Hey, uh, we just said all that in the middle of Kronos' live stream."
10044040-124 = "Breaking news!!"
10044040-125 = "Did everyone hear that?"
10044040-131 = "There's something incredible in that very train!"
10044040-132 = "Could it be something great enough to turn Kivotos' fortunes around?"
10044040-133 = "What could be the truth behind the mysterious cargo?!"
10044040-134 = "When we find out, you'll hear it here first!"
10044040-137 = "[ns] \"...\""
10044040-139 = "This is... Uh..."
10044040-143 = "Hahaha, we're doomed."

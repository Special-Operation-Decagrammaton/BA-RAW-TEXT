[translation]
10044040-1 = "ตอนที่ 4;ในรถไฟขบวนนั้น"
10044040-2 = "เฮ้อ..."
10044040-3 = "ทำไมที่นี่ก็ไม่มีล่ะ"
10044040-5 = "ถึงกับนั่งรถบัสมาเลยนะ... มะ... ไม่สิ... ฉันก็ไม่ได้คาดหวังอะไร ไม่ได้คาดหวังเลย..."
10044040-6 = "[ns] \"ว่าแต่...\""
10044040-8 = "[ns] \"ในรถไฟขบวนนั้นมีสินค้าอะไรเหรอ?\""
10044040-13 = "เอ๋? ฉันยังไม่ได้บอกเหรอ?"
10044040-14 = "ยังไม่ได้บอกคุณครูเลย"
10044040-15 = "พอมาคิดดู มันก็จริงแฮะ?"
10044040-17 = "นะ... นี่คุณครูมาช่วยพวกฉันโดยไม่รู้รายละเอียดอะไรเลยเหรอคะ..."
10044040-18 = "[s1] \"ก็เห็นว่าเป็นเรื่องด่วน...\"\n[s2] \"ถ้านักเรียนเรียกหา ครูก็ต้องมาสิ\""
10044040-21 = "วะ... ว้าว... มีคนแบบนี้อยู่ด้วยสินะ..."
10044040-22 = "วะฮะฮ่า ใจถึงพึ่งได้จริงๆ เลย"
10044040-23 = "ฟังให้ดีนะ คุณครู สินค้าในรถไฟขบวนนั้นน่ะ..."
10044040-28 = "คืออะไรเราก็ไม่รู้เหมือนกัน!"
10044040-29 = "[s] \"หืม...?\""
10044040-31 = "ไม่ว่าสินค้าจะเป็นอะไร มันก็ไม่ใช่เรื่องสำคัญสำหรับเราหรอก"
10044040-32 = "แค่ต้องเอาไปส่งให้ถูกที่และตรงเวลา"
10044040-33 = "แค่นั้นก็พอแล้วไม่ใช่เหรอ ส่วนสินค้าคืออะไรไม่จำเป็นต้องรู้หรอก"
10044040-34 = "[s] \"งั้นเหรอ?!\""
10044040-36 = "ทะ... ทำไมถึงคิดอะไรง่ายๆ แบบนี้ล่ะคะ...! แบบนี้มันใช้ได้ที่ไหนกัน!!"
10044040-37 = "ตัวเองต้องรู้สิคะว่ากำลังขนส่งอะไรอยู่น่ะ!?"
10044040-38 = "ที่จริงทางนั้นก็บอกมาแล้วนะ แต่ฉันไม่ได้ตั้งใจฟัง"
10044040-39 = "เข้าหูซ้าย ทะลุหูขวา"
10044040-40 = "ดูพูดเข้าสิ มันใช่เรื่องน่าภูมิใจมั้ยคะเนี่ย!!"
10044040-41 = "นั่น~ น่ะ~ สิ~ นะ~ แต่ยังไงก็ไม่สนหรอก~"
10044040-42 = "จะรู้หรือไม่รู้ ก็ไม่มีอะไรเปลี่ยนไปอยู่ดี~ เราแค่ทำงานให้เสร็จก็พอ"
10044040-43 = "อึก... ท่านผู้บริหารก็เป็นคนที่สั่งให้ทำอะไรก็ทำเหมือนกันเหรอคะ?"
10044040-44 = "มันไม่ดีเหรอ?"
10044040-45 = "ฉะ... ฉันก็ไม่แน่ใจว่ามันดีหรือเปล่า..."
10044040-46 = "แต่พวกคุณไม่อยากตัดสินใจเองเหรอคะว่าจะทำอะไรดี?"
10044040-47 = "ฮึ่ม~ ที่พูดมามันก็ไม่ได้ผิดหรอกนะ"
10044040-48 = "แต่เธอก็มาที่นี่เพื่อทำงานตามคำสั่งไม่ใช่เหรอ?"
10044040-49 = "มะ... มันก็..."
10044040-50 = "ตอนนี้เธอก็น่าจะไม่ได้ทำตามการตัดสินใจของตัวเองอยู่นะ!"
10044040-51 = "อึก... ทีเรื่องแบบนี้ละไหวพริบดี พูดแบบนั้นฉันเจ็บปวดนะคะ..."
10044040-52 = "ถะ... ถึงตอนนี้ฉันจะไม่ได้ใช้ชีวิตตามใจตัวเองอยู่ แต่ฉันก็อยากทำในสักวันค่ะ...!"
10044040-53 = "แล้วทำไมฉันถึงมาพูดเรื่องนี้อยู่นะ? เอาเถอะค่ะ!"
10044040-54 = "ฉันก็แค่วิศวกรคนหนึ่งที่ฝันอยากมีชีวิตแบบนั้นบ้าง! และถึงจะรู้ตัวดีว่ามันเป็นไปไม่ได้ก็เถอะ...!"
10044040-55 = "ตะ... แต่พวกคุณสองคนเป็นถึงผู้บริหาร นั่นเป็นตำแหน่งที่ตัดสินใจทำอะไรก็ได้ ไม่ใช่เหรอคะ?"
10044040-57 = "เหนือผู้บริหารก็ยังมีหัวหน้าผู้บริหารนะ"
10044040-58 = "พวกเราก็แค่ตำแหน่งกลางๆ น่ะ"
10044040-60 = "ดะ... ได้ยังไงกัน..."
10044040-61 = "แน่นอนว่าถ้างานมันดูไม่น่าสนุก เราก็คงบอกว่าไม่อยากทำ"
10044040-62 = "แต่การไม่ทำอะไรเลยมันไม่สนุกยิ่งกว่านี่นา พวกฉันก็เลยทำไปงั้นๆ น่ะ"
10044040-63 = "พวกผู้บริหารก็เหมือนกันหมดเลย... ถะ... ถ้างั้นคนอย่างฉันจะมีชีวิตอยู่เพื่ออะไร..."
10044040-64 = "แค่มีชีวิตก็พอ~ ไม่ต้องหาเหตุผลหรอกน่า"
10044040-65 = "[ns3] \"พูดเรื่องชีวิตกันลึกซึ้ง แต่ไม่มีใครรู้ว่าสินค้าคืออะไร...\"\n[ns4] \"ตกลงว่าไม่มีใครรู้เลยสินะว่าสินค้าในรถไฟคืออะไร\""
10044040-68 = "อื้อ จำได้แค่ว่ามันเป็นของที่สำคัญมากๆ"
10044040-69 = "คุณครูสงสัยเหรอ? ไปแอบเปิดดูกันมั้ย?"
10044040-70 = "บะ... แบบนั้นไม่ได้สิคะ..."
10044040-71 = "เธอไม่ใช่เหรอที่บอกว่าเราต้องรู้ว่าขนส่งอะไรกันอยู่น่ะ?"
10044040-72 = "แต่มันต้องไม่ใช่อย่างนี้สิคะ! ระ... เราต้องรักษาความลับในการให้บริการสิ...!"
10044040-73 = "ไม่รู้หรอก! ไม่เห็นจะเคยได้ยินอะไรแบบนั้นเลย วะฮะฮ่า!"
10044040-74 = "ว่าไงล่ะ? คุณครู! ลองเปิดดูมั้ย?"
10044040-75 = "อย่าเปิดดูตามอำเภอใจงั้นเหรอ? เฮ้อ ไม่สนุกเลย"
10044040-76 = "อึก... รู้สึกไม่สบายใจเลย... คะ... คงไม่มีอะไรหรอกใช่มั้ยคะ...?"
10044040-84 = "ทำอะไรเหรอ ฮิคาริ?"
10044040-85 = "ฉันติดต่อไปที่สถานีที่อยู่ข้างๆ สงสัยรถไฟของเราจะอยู่ที่นั่นนะ"
10044040-86 = "หืม?? ติดต่อไปยังไง??"
10044040-87 = "วิทยุสื่อสารไง ยืมมาแป๊บหนึ่งน่ะ"
10044040-88 = "วะฮะฮ่า! ไหวพริบดีมาก ฮิคาริ!"
10044040-89 = "พะ... พอมาคิดดู มันก็มีวิธีแบบนี้นี่เนอะ"
10044040-90 = "แต่ถ้ารถไฟออกจากสถานีไปอีกรอบ เราก็คงงานเข้าอีก..."
10044040-91 = "ต้องบอกให้ทางนั้นหยุดรถไว้สิ ขอฉันคุยสายหน่อย ฮิคาริ!"
10044040-96 = "อ่าๆ ได้ยินมั้ย? เจ้าหน้าที่สถานีไฮแลนเดอร์?"
10044040-97 = "อ่า... ค่ะ ได้ยินค่ะ"
10044040-98 = "ฉันทาจิบานะ โนโซมิจาก CCC นะ~ มีรถไฟบรรทุกสินค้าไปถึงสถานีนั้นขบวนหนึ่งใช่มั้ย?"
10044040-99 = "เป็นรถของพวกฉันเอง แต่มันน่าจะออกไปเองเพราะระบบผิดพลาดน่ะ"
10044040-100 = "อย่าให้รถไฟขบวนนั้นออกจากสถานีไปล่ะ แล้วพวกฉันจะรีบไป"
10044040-101 = "อ่า... แต่จะให้จอดรถไฟบรรทุกสินค้าขบวนใหญ่ขนาดนั้นไว้ในสถานีนานๆ ไม่ได้หรอกค่ะ..."
10044040-102 = "รถไฟโดยสารขบวนอื่นก็ยังวิ่งให้บริการกันอยู่ด้วย..."
10044040-103 = "ไม่ได้นะ ต้องให้จอดไว้ที่นั่น ไม่งั้นเป็นเรื่องใหญ่โตมโหฬารแน่!"
10044040-104 = "นี่มันเรื่องอะไรกันเหรอคะ... ดะ... เดี๋ยวนะคะ... ตอนนี้มีคนจากโคร..."
10044040-105 = "นั่นเป็นรถไฟบรรทุกสินค้าที่สำคัญมากนะ ไม่ได้จ้อจี้ด้วย"
10044040-106 = "ว่าไงนะคะ?"
10044040-107 = "เฮ้อ... ก็ในรถไฟขบวนนั้นมีของที่สำคัญมากๆ~~ อยู่ยังไงล่ะ!!"
10044040-108 = "แล้วมันก็วิ่งไปสถานีอื่นอยู่เรื่อยเพราะระบบออกตัวทำงานผิดพลาด!!"
10044040-111 = "......"
10044040-112 = "เข้าใจหรือยัง?? นี่ ฟังอยู่หรือเปล่า? มันสำคัญมากจริงๆ นะ!"
10044040-113 = "อะ... เอ่อ... ถึงท่านผู้บริหารจะดูไม่น่าเชื่อใจเท่าไร แต่ที่พูดไปเป็นความจริงนะคะ..."
10044040-114 = "อ่า... แต่ว่า... ตอนนี้..."
10044040-120 = "โครโนสกำลังไลฟ์กันอยู่ในสถานีนี้..."
10044040-124 = "สกู๊ปพิเศษ!!!"
10044040-125 = "ทุกคน! ได้ยินกันมั้ยคะ?!"
10044040-131 = "ว่ากันว่ารถไฟบรรทุกสินค้าที่จอดอยู่ในสถานีนี้!! บรรทุกของบางอย่างที่ยิ่งใหญ่ไว้ค่ะ!!"
10044040-132 = "จะเป็นของยิ่งใหญ่พอที่จะทำให้คิโวทอสระส่ำระส่ายได้หรือเปล่าคะ?!"
10044040-133 = "มันคืออะไรกันนะ?!"
10044040-134 = "พวกฉันจะติดตามจนถึงที่สุดแล้วมารายงานให้ทราบกันค่ะ!!"
10044040-137 = "[ns] \"......\""
10044040-139 = "นี่มัน... เอ่อ..."
10044040-143 = "ฮ่าฮ่า งานเข้าของจริงแล้วไง"

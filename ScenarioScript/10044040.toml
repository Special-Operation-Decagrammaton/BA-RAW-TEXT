[translation]
10044040-1 = "第4話;那輛列車上"
10044040-2 = "唉……"
10044040-3 = "這裡也沒有～"
10044040-5 = "明明連公車都搭了……#n不……我一點也沒有期待，完全沒有……"
10044040-6 = "[ns]「不過……」"
10044040-8 = "[ns]「那輛列車上到底載著什麼貨物呢？」"
10044040-13 = "嗯？我們沒有告訴老師嗎？"
10044040-14 = "沒有跟老師說～"
10044040-15 = "仔細想想，好像真的沒說過耶？"
10044040-17 = "明，明明什麼都不知道，就一路幫忙到現在嗎……"
10044040-18 = "[s1]「畢竟你們說有緊急的事……」\n[s2]「有學生呼叫我，當然要趕來囉。」"
10044040-21 = "哇，哇啊……世界上竟然有這種人……"
10044040-22 = "噗哈哈，老師果然很乾脆。"
10044040-23 = "仔細聽我說哦，老師。#n那輛列車上載的東西……"
10044040-28 = "我們也不知道是什麼！"
10044040-29 = "[s]「嗯……？」"
10044040-31 = "因為載了什麼東西都不重要。"
10044040-32 = "在指定時間～送到指定地點～"
10044040-33 = "我們只在乎這些，所以根本沒必要知道貨物是什麼。"
10044040-34 = "[s]「原來如此！？」"
10044040-36 = "請，請不要認同這種想法……！#n這樣不管怎麼想都是不對的！！"
10044040-37 = "至少要知道自己在運送什麼東西吧？"
10044040-38 = "其實上面的人有說，只是我沒在聽而已。"
10044040-39 = "嗯～左耳進右耳出～"
10044040-40 = "為什麼能說的這麼理直氣壯啊！！"
10044040-41 = "就～跟～你～說～了～！根本沒差嘛～"
10044040-42 = "知道～不知道～都一樣～#n只要做該做的事就好～"
10044040-43 = "唔唔……所，所以到頭來，兩位幹部也只是在聽命行事嗎？"
10044040-44 = "是又怎樣～？"
10044040-45 = "怎，怎樣……？#n我，我也不知道這樣到底好不好……"
10044040-46 = "兩位難道不想決定自己要做什麼嗎……？"
10044040-47 = "哼嗯～要這麼說也沒錯啦。"
10044040-48 = "但你不也是來做被指派的工作的嗎？"
10044040-49 = "那，那個……"
10044040-50 = "而且看起來也不像是在做自己決定的事！"
10044040-51 = "唔……反，反應還真快。#n被戳中痛處了……"
10044040-52 = "老，老實說我也沒有做到，只是心裡想要那樣而已……！"
10044040-53 = "話說我為什麼會說到這種事啊？#n總之……！"
10044040-54 = "我是個普通的工程師，所以那種生活或許只能在夢裡實現……！"
10044040-55 = "但，但兩位不是幹部嗎？#n以兩位的地位，不是應該有充分的自主權了嗎？"
10044040-57 = "幹部上面還有幹部～地位更高的人～"
10044040-58 = "我們也只是中階幹部而已。"
10044040-60 = "怎，怎麼會……"
10044040-61 = "當然如果覺得工作內容太無聊的話，我們應該也會拒絕啦。"
10044040-62 = "不過什麼都不做只會更無聊而已，所以也只能做囉。"
10044040-63 = "兩位幹部也一樣嗎……#n那，那我到底應該以誰為目標活下去……"
10044040-64 = "活著就很好～不用什麼理由～"
10044040-65 = "[ns3]「突然討論起人生哲學了……」\n[ns4]「所以沒人知道裡面裝了什麼貨物啊。」"
10044040-68 = "嗯～只記得說過超級超級重要～"
10044040-69 = "老師好奇嗎～？要不要打開看看～？"
10044040-70 = "那，那樣不行吧……？"
10044040-71 = "你剛才不是說應該要知道自己在運送什麼東西嗎？"
10044040-72 = "這跟那是兩回事！#n沒，沒有什麼保密條款之類的嗎……！"
10044040-73 = "不知道！我沒聽過有什麼條款啊？噗哈哈！"
10044040-74 = "怎麼樣啊？老師！要打開來看看嗎？"
10044040-75 = "你說不要隨便打開？#n吼唷，真沒意思。"
10044040-76 = "嗚嗚……總覺得有點不安……#n應，應該沒事吧……"
10044040-84 = "光，你在做什麼？"
10044040-85 = "聯絡隔壁車站～列車好像在那裡～"
10044040-86 = "嗯？你怎麼聯絡的？？"
10044040-87 = "無線電～我借來的～"
10044040-88 = "噗哈哈！不愧是光！"
10044040-89 = "仔，仔細想想，確實還有這招呢。"
10044040-90 = "可是要是車又開走的話也沒用……"
10044040-91 = "得叫他們把車留住才行。#n光，換我來吧！"
10044040-96 = "啊～啊～聽得到嗎？那邊的高地人站務員？"
10044040-97 = "啊……是，聽得到……"
10044040-98 = "我是CCC的橘希望～#n那邊有一輛貨物列車剛到對吧？"
10044040-99 = "那輛車是我們的。#n不知道是系統錯誤還是什麼原因，一直會自動發車。"
10044040-100 = "麻煩幫我們看住它。我們馬上過去。"
10044040-101 = "啊……我們車站沒辦法停放那麼大台的貨物列車……"
10044040-102 = "畢竟還有遊客列車在持續運行中……"
10044040-103 = "不行，一定要把車留下來。#n不然會出大事的！"
10044040-104 = "到底是怎麼回事……#n啊，那個……我們本來就已經在忙著直播採……"
10044040-105 = "那輛貨物列車超重要～沒開玩笑～ "
10044040-106 = "什麼？"
10044040-107 = "唉……那輛列車上，載著超～～級重要的東西！！"
10044040-108 = "但是現在因為發車系統錯誤正在到處亂跑！！"
10044040-111 = "……"
10044040-112 = "聽懂了沒？#n喂，你有在聽嗎？我說真的很重要！"
10044040-113 = "那，那個……這兩位雖然看起來不太可靠，但他們剛才說的是事實……"
10044040-114 = "啊……不是，那個……"
10044040-120 = "現在……克洛盧斯正在直播採訪中……"
10044040-124 = "獨家新聞！！！"
10044040-125 = "各位觀眾聽到了嗎！！"
10044040-131 = "這裡的貨物列車上！！載著非常不得了的東西！！"
10044040-132 = "會是能夠左右奇普托斯命運的重量級貨物嗎！？"
10044040-133 = "究竟東西的真面目是什麼呢……！？"
10044040-134 = "後續的追蹤報導，請繼續鎖定克洛盧斯！！"
10044040-137 = "[ns] 「……」"
10044040-139 = "這……嗯……"
10044040-143 = "哈哈，完蛋了。"

[translation]
10000005-1 = "Prologue"
10000005-2 = "I received a call while doing my usual work for Schale."
10000005-4 = "*ring* *ring*"
10000005-5 = "[s] \"Hmm? Who could that be?\""
10000005-9 = "[ns] \"Hello?\""
10000005-10 = "Ah! They picked up! Wh-What do I say?!"
10000005-11 = "Calm down and take a deep breath, President! Breathe in...! Breathe out!"
10000005-12 = "G-Good idea. All right, then..."
10000005-13 = "Hi! Um, pardon me, but is this..."
10000005-14 = "...the number for [USERNAME], the popular \"Sensei\" in charge of Schale?"
10000005-15 = "[s1] \"That's correct.\"\n[s2] \"Sorry. It isn't.\""
10000005-16 = "Ah! I knew it! So I was right!"
10000005-17 = "Wait, I mean...!"
10000005-18 = "Huh?! It's not?!"
10000005-19 = "Ugh. I should have known!"
10000005-20 = "I knew something was off when they were so hesitant to give me their number!"
10000005-21 = "[s3] \"Just kidding. Yeah, that's me.\""
10000005-22 = "What?!"
10000005-23 = "Y-You're more mischievous than I expected...but never mind that!"
10000005-25 = "[s] \"So to what do I owe the pleasure?\""
10000005-27 = "Ahem..."
10000005-28 = "Hello, [USERNAME], the Sensei of Schale! ☆"
10000005-29 = "I'm Shizuko!"
10000005-30 = "It's nice to meet you! I'm the president of Allied Hyakkiyako Academy's Festival Operations Department..."
10000005-31 = "...as well as the idol of Momoyodou!"
10000005-32 = "I have a good reason for contacting you like this."
10000005-33 = "It's to cordially invite you to Hyakkiyako's..."
10000005-34 = "...annual Cherry Blossom Festival!"
10000005-35 = "[s4] \"Hyakkiyako?\"\n[s5] \"Festival...?\""
10000005-36 = "Yes! We'd love for Schale's famous Sensei to participate and celebrate with us!"
10000005-37 = "Yes! We'd love for Schale's famous Sensei to participate and celebrate with us!"
10000005-38 = "We'll be trying all kinds of new things to make this Hyakkiyako Cherry Blossom Festival the best one yet!"
10000005-39 = "Oh and before I forget: There's one other thing I want talk to you about face-to-face, so make sure to come by!"
10000005-40 = "..."
10000005-42 = "I-I did it, Pina! I did it!"
10000005-43 = "Great job, President!"
10000005-46 = "Ding."
10000005-47 = "An image arrived in my inbox."
10000005-48 = "Hey, it's me again. I'm sending you a flier that will help you find the venue."
10000005-49 = "All righty, then. Until we meet, Sensei!"
10000005-50 = "I'll be waiting for you at Momoyodou! Nyan! ♪"
10000005-52 = "[ns] \"The Cherry Blossom Festival and Momoyodou...\""
10000005-55 = "And so, I made my way to the street in Hyakkiyako where the festival was being held."
10000005-59 = "Hyakkiyako Shopping District No. 7"
10000005-60 = "Festivalgoers were enjoying the atmosphere amidst the crowded street."
10000005-61 = "Suddenly, I heard a voice call out to me."
10000005-63 = "C-Coming through!"
10000005-68 = "Ow..."
10000005-70 = "*gasp*"
10000005-75 = "A-Are you all right? You aren't hurt anywhere, are you?!"
10000005-76 = "[s6] \"I'm fine. Sorry about that.\"\n[s7] \"I think you broke something...\""
10000005-78 = "Phew. That's a relief!"
10000005-80 = "Really?!"
10000005-81 = "[s8] \"Nah. I'm just kidding.\""
10000005-83 = "Y-You were kidding...? *tilts head*"
10000005-84 = "Get back here! You're not getting away!"
10000005-86 = "W-Wait a minute, K-Kaede. *huff* *puff* T-Too fast.."
10000005-88 = "Ah! They're already catching up!"
10000005-90 = "U-Uh-oh. Wh-What should Izuna do?!"
10000005-91 = "[s] \"Are you in trouble?\""
10000005-93 = "Huh? Oh. Well..."
10000005-94 = "I see her! Over there, Mimori!"
10000005-98 = "Run!"
10000005-101 = "We were able to flee the scene after a daring escape."
10000005-104 = "Phew... It should be safe here!"
10000005-105 = "Um, thank you for helping Izuna!"
10000005-106 = "By the way. Who are you...?"
10000005-107 = "You don't seem like you're from Hyakkiyako... Actually, are you an adult?#n*gulp*"
10000005-108 = "[s] \"I'm the advisor in charge of Schale.\""
10000005-109 = "You represent Schale? "
10000005-110 = "Oh, if you're from Schale, then...!"
10000005-111 = "Izuna has heard of you!"
10000005-112 = "They say there's an amazing person named Sensei that helps people from all over Kivotos!"
10000005-113 = "Whoa... That kinda makes you like...a ninja!"
10000005-114 = "[s] \"A ninja?\""
10000005-115 = "So you really ARE that Sensei. *wagging tail*"
10000005-120 = "That's amazing!"
10000005-121 = "But what are you doing here?"
10000005-122 = "[s] \"I came to check out the festival.\""
10000005-123 = "Oh, okay... So that's what's going on! This is perfect!"
10000005-126 = "Then Izuna will guide you around the festival!"
10000005-129 = "Look over there! That vendor's selling Kitsune Senbei: Hyakkiyako's specialty!"
10000005-131 = "And look there! They're selling a festival classic: Tanuki Okonomiyaki! "
10000005-132 = "The Sakura Daifuku is to die for too!"
10000005-133 = "Heehee. It's the delicacy of the festival!"
10000005-137 = "Oh, and since you're new to the area... "
10000005-138 = "...there's one part of the Hyakkiyako Cherry Blossom Festival that Izuna just has to show off!"
10000005-139 = "Over here! This way, Sensei!"
10000005-144 = "Hyakkiyako Observatory"
10000005-148 = "[ns9] \"The view is amazing.\"\n[ns10] \"That is one big tree.\""
10000005-149 = "Surprised? It's the pride and joy of Hyakkiyako!"
10000005-150 = "Surprised? It's the pride and joy of Hyakkiyako!"
10000005-151 = "Izuna loves this place. You can get a perfect view of the tree and the streets of Hyakkiyako together!"
10000005-152 = "Seeing the streets from up here always makes Izuna's heart feel like it's going to burst out of her chest!"
10000005-153 = "[s] \"Burst out?\""
10000005-154 = "That's right! Because Izuna has a dream!"
10000005-155 = "It's to become the best ninja these streets have ever seen!"
10000005-156 = "It's what Izuna strives for every day!"
10000005-157 = "[s] \"A...ninja?\""
10000005-158 = "Um...!"
10000005-159 = "U-Um... By ninja, Izuna means, um...!"
10000005-160 = "[s11] \"I don't really get why a ninja, but I believe in you.\"\n[s12] \"A dream's a dream, right? I'll be rooting for you.\""
10000005-161 = "You do?"
10000005-162 = "You will?"
10000005-163 = "You'll support Izuna's dream, Sensei?"
10000005-164 = "Even though it's..."
10000005-165 = "...to become a ninja?"
10000005-166 = "[s] \"It's a sensei's job to support their students.\""
10000005-167 = "...!"
10000005-168 = "Whoa! You're the first person to ever say something like that!"
10000005-169 = "Heehee. This is great!"
10000005-170 = "If Sensei is supporting Izuna's dream too, then...!"
10000005-171 = "Izuna has nothing to worry about, even when she stumbles!"
10000005-172 = "Yes! Izuna will do her best and become a great ninja!"
10000005-173 = "Oh, then Izuna shouldn't be here. Izuna still has her client's mission to complete!"
10000005-174 = "Izuna needs to get a move on!"
10000005-175 = "Okay, Sensei. See you later!"
10000005-176 = "Let's enjoy the festival together once Izuna's mission is over! "
10000005-178 = "Just like that, Izuna disappeared as suddenly as she appeared—like a gust of wind."

[translation]
10000005-1 = "序幕"
10000005-2 = "（一如往常在夏萊處理工作時，接到了一通電話）"
10000005-4 = "（嘟嚕嚕嚕嚕！）"
10000005-5 = "[s]「嗯？電話？」"
10000005-9 = "[ns]「喂？」"
10000005-10 = "啊，真的接了！怎，怎麼辦！？"
10000005-11 = "冷靜下來深呼吸，部長！#n吸──吐──！"
10000005-12 = "我，我知道了。#n吸──吐……"
10000005-13 = "那個，你好！這是……"
10000005-14 = "是夏萊的[USERNAME]老師的電話沒錯嗎？"
10000005-15 = "[s1]「是，我是夏萊的老師。」\n[s2]「你打錯了。」"
10000005-16 = "啊，沒打錯！太好了……！"
10000005-17 = "……不對！不好意思，那個……"
10000005-18 = "咦！？打錯了嗎！？"
10000005-19 = "啊啊真是的，我隱隱約約也覺得可能是這樣！"
10000005-20 = "難怪有股「勉強告訴你」的感覺，我果然被騙了！"
10000005-21 = "[s3]「開玩笑的，這裡是夏萊沒錯。」"
10000005-22 = "咦！？"
10000005-23 = "好，好像有點壞心或是說愛惡作劇……啊不是！"
10000005-25 = "[s]「你好呀，有什麼事嗎？」"
10000005-27 = "啊，那個……唔嗯，好……"
10000005-28 = "那麼重新來一次……你好，夏萊的[USERNAME]老師！"
10000005-29 = "我叫做靜子！"
10000005-30 = "其實靜子啊～是百鬼夜行聯合學園所屬「節慶營運管理部」的部長。"
10000005-31 = "而且竟然！還同時擔任百夜堂的看板娘哦☆"
10000005-32 = "然，然後，今天之所以打電話是因為……"
10000005-33 = "想要邀請老師參加我們百鬼夜行聯合學園舉辦的……"
10000005-34 = "「百夜之春櫻花祭」！"
10000005-35 = "[s4]「百夜之春……？」\n[s5]「櫻花祭……？」"
10000005-36 = "是的！我想老師應該是個大忙人，不過方便的話能請老師來參加嗎？"
10000005-37 = "是的！我想老師應該是個大忙人，不過方便的話能請老師來參加嗎？"
10000005-38 = "在這次的「百夜之春櫻花祭」……俗稱「櫻花祭」中，預計將有前所未有的嘗試！"
10000005-39 = "除此之外，我還有一～點小事情想要跟老師商量。#n老師願意過來的話，靜子會很高興的！那麼再見！"
10000005-40 = "……"
10000005-42 = "很，很好！成功了！菲娜！我做到了！"
10000005-43 = "不愧是部長，Good Job！"
10000005-46 = "（叮咚）"
10000005-47 = "（收到了一張照片）"
10000005-48 = "這是櫻花祭的海報，也順帶作為到會場的導覽。"
10000005-49 = "那麼靜子就期待，非～常期待老師的光臨囉！"
10000005-50 = "我會在百夜堂等著老師的！喵喵♪"
10000005-52 = "[ns]「櫻花祭跟百夜堂啊……」"
10000005-55 = "（於是來到了正在舉辦櫻花祭的百鬼夜行自治區）"
10000005-59 = "百鬼夜行．第七商店街"
10000005-60 = "（在洋溢著熱情的這股慶典獨特的氛圍，#n　以及人們徜徉其中的歡笑聲的街道上……）"
10000005-61 = "（不知從哪忽然傳來了可愛的聲音）"
10000005-63 = "啊！啊！危險啊──！？"
10000005-68 = "痛痛痛……"
10000005-70 = "哈啊！"
10000005-75 = "啊啊，不好意思！那個，你還好嗎？有沒有哪裡受傷！？"
10000005-76 = "[s6]「嗯，我沒事。抱歉剛才沒有專心看路。」\n[s7]「感覺哪裡的骨頭好像斷了……」"
10000005-78 = "是，是嗎。那真是太好了……！"
10000005-80 = "怎麼會！？叫，叫醫生！叫救護車！？"
10000005-81 = "[s8]「抱歉抱歉，開玩笑的。我沒事。」"
10000005-83 = "咦，啊，原來是開玩笑的啊……"
10000005-84 = "站住──！別想逃！"
10000005-86 = "楓，楓醬也請等一下……哈啊，哈啊……你，你跑太快了……"
10000005-88 = "啊，已經追到這裡了！"
10000005-90 = "那個那個！該，該怎麼辦才好！？"
10000005-91 = "[s]「……需要幫忙嗎？」"
10000005-93 = "咦？這，這個嘛……"
10000005-94 = "找到了！三森前輩，在那邊！"
10000005-98 = "啊……！"
10000005-101 = "（兩人跑了好一段時間才得以脫身）"
10000005-104 = "呼……到這裡來應該安全了。"
10000005-105 = "那個，非常感謝你幫助了伊樹菜！"
10000005-106 = "話說回來，你是……"
10000005-107 = "不像是百鬼夜行的學生，是大人……？"
10000005-108 = "[s]「初次見面，我在夏萊擔任老師。」"
10000005-109 = "夏萊，老師……？ "
10000005-110 = "啊，難道是……！"
10000005-111 = "伊樹菜有聽過！"
10000005-112 = "夏萊有個能俐落解決奇普托斯各種事件的厲害的大人！"
10000005-113 = "能在四處現身並立刻解決……簡直就像忍者一樣！"
10000005-114 = "[s]「……忍者？」"
10000005-115 = "居然能見到傳說中的老師……！"
10000005-120 = "好厲害，是本人對吧！"
10000005-121 = "不過夏萊的老師為什麼會在這裡呢？"
10000005-122 = "[s]「我是來參觀百夜之春櫻花祭的。」"
10000005-123 = "原來如此……是這樣啊！"
10000005-126 = "畢竟是難得的櫻花祭……不介意的話請讓伊樹菜帶老師參觀慶典吧！"
10000005-129 = "請看那邊！攤位上有賣百鬼夜行的名產狐狸仙貝！"
10000005-131 = "啊，那邊在賣櫻花祭不可或缺的狸貓御好燒！"
10000005-132 = "還有用櫻花花瓣做的櫻花大福，真的很好吃唷！"
10000005-133 = "都是櫻花祭的名產哦，耶嘿嘿！"
10000005-137 = "對了，老師難得過來一趟…… "
10000005-138 = "說到百夜之春櫻花祭，一定得去看那個才行！"
10000005-139 = "這邊，這邊老師！"
10000005-144 = "百鬼夜行．觀景台"
10000005-148 = "[ns9]「……真壯觀。」\n[ns10]「居然有那麼大的樹……」"
10000005-149 = "耶嘿嘿，對吧？這個時期剛好盛開得最漂亮，是百鬼夜行的驕傲哦！"
10000005-150 = "耶嘿嘿，對吧？這個時期剛好盛開得最漂亮，是百鬼夜行的驕傲哦！"
10000005-151 = "伊樹菜非常喜歡這個能將神木和百鬼夜行的街道盡收眼底的地方！"
10000005-152 = "每次來到這裡，伊樹菜總是會產生要為了夢想繼續努力的心情！"
10000005-153 = "[s]「夢想？」"
10000005-154 = "是的！伊樹菜有個夢想！"
10000005-155 = "那就是成為奇普托斯最厲害的忍者……！"
10000005-156 = "即使是今天，也為了夢想而日日夜夜……！"
10000005-157 = "[s]「……忍者？」"
10000005-158 = "……哈！？"
10000005-159 = "不，不好意思，那個，伊樹菜很清楚現在這個時代已經沒有人會有這種夢想了……#n不，不過……！"
10000005-160 = "[s11]「沒關係，我覺得很帥氣哦。」\n[s12]「有夢想是件好事，我會為你加油。」"
10000005-161 = "啊……"
10000005-162 = "啊……"
10000005-163 = "為伊樹菜的夢想，加油……"
10000005-164 = "那個，即使是想要成為忍者這種……"
10000005-165 = "這種，不像是普通學生會說出的夢想也一樣嗎？"
10000005-166 = "[s]「無論是什麼樣的夢想，我都想為學生加油。」"
10000005-167 = "……！"
10000005-168 = "這，這麼對伊樹菜說的人，老師還是第一個呢！"
10000005-169 = "耶，耶嘿嘿嘿，是，是這樣嗎……！"
10000005-170 = "居然願意支持伊樹菜的夢想……！"
10000005-171 = "雖然伊樹菜還有很多不足的地方……"
10000005-172 = "但伊樹菜會努力成為優秀忍者的！"
10000005-173 = "……啊！突然想起還沒完成雇主的委託……！"
10000005-174 = "不好意思，伊樹菜就先走一步了！"
10000005-175 = "那麼老師，再會！"
10000005-176 = "等委託結束後，如果能再一起享受慶典，伊樹菜會很開心的！ "
10000005-178 = "（於是伊樹菜便和現身的時候一樣，如風一般地消失了）"

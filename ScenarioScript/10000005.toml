[translation]
10000005-1 = "บทเริ่มต้น"
10000005-2 = "(มีโทรศัพท์เข้ามาในระหว่างที่ทำงานอยู่ในชาเล่ต์ตามปกติ)"
10000005-4 = "กริ๊ง กริ๊งงง!"
10000005-5 = "[s] \"หืม? โทรศัพท์เข้าเหรอ?\""
10000005-9 = "[ns] \"ฮัลโหล?\""
10000005-10 = "อ๊ะ! รับโทรศัพท์แล้ว! ทะ.. ทำยังไงดี?!"
10000005-11 = "ตั้งสติ แล้วหายใจเข้าลึกๆ สิคะหัวหน้า! หายใจเข้า... หายใจออก..."
10000005-12 = "แบบนี้แหละ ดีมาก หายใจออก... หายใจเข้า... ไปคุยเลย!"
10000005-13 = "ฮัลโหล! เอ่อ... ขอโทษที่เสียมารยาทนะคะ ไม่ทราบว่า..."
10000005-14 = "นี่คือโทรศัพท์ของคุณครู [USERNAME] ที่อยู่ที่ชาเล่ต์หรือเปล่าคะ?"
10000005-15 = "[s1] \"ใช่\"\n[s2] \"ไม่ใช่\""
10000005-16 = "อ๊ะ! ว่าแล้วเชียว! โทรถูกจริงด้วย!"
10000005-17 = "เอ่อ... ไม่ใช่สิ"
10000005-18 = "ว่าไงนะคะ?! ไม่ใช่เหรอคะ?!"
10000005-19 = "ว่าแล้วต้องเป็นแบบนี้!"
10000005-20 = "รู้สึกแปลกๆ ตั้งแต่ตอนที่คุณครูถอนหายใจแล้วทำหน้าเหมือนไม่อยากจะให้เบอร์โทรศัพท์แล้ว!"
10000005-21 = "[s3] \"ล้อเล่นน่า โทรมาถูกแล้วล่ะ\""
10000005-22 = "เอ๋?!"
10000005-23 = "ทำไมล้อกันเล่นแบบนี้ล่ะ…"
10000005-25 = "[s] \"โทรมาเรื่องอะไรเหรอ?\""
10000005-27 = "อะแฮ่ม..."
10000005-28 = "สวัสดีค่ะ! คุณครู [USERNAME] แห่งชาเล่ต์☆"
10000005-29 = "ฉันคือชิซุโกะค่ะ~!"
10000005-30 = "ชิซุโกะคนนี้ก็คือ~ หัวหน้าชมรมจัดงานเทศกาลของสหพันธ์เฮียกคิยาโคยังไงล่ะคะ~"
10000005-31 = "แถมยังเป็นไอดอลของเฮียกคิยาโคด้วยนะ~!"
10000005-32 = "ส่วนเหตุผลที่ฉันโทรมาในวันนี้..."
10000005-33 = "ก็เพื่อเชิญคุณครูไปชมเทศกาลดอกซากุระของสหพันธ์เฮียกคิยาโค"
10000005-34 = "ที่เรียกว่าเทศกาลแห่งค่ำคืนสีขาว!"
10000005-35 = "[s4] \"เทศกาล...\"\n[s5] \"เฮียกคิยาโคเหรอ?\""
10000005-36 = "ใช่ค่ะ! คุณครูน่าจะยุ่งๆ แต่ยังไงก็ช่วยมาที่เทศกาลของเราหน่อยได้ไหมคะ?"
10000005-37 = "ใช่ค่ะ! คุณครูน่าจะยุ่งๆ แต่ยังไงก็ช่วยมาที่เทศกาลของเราหน่อยได้ไหมคะ?"
10000005-38 = "เทศกาลแห่งค่ำคืนสีขาวครั้งนี้จะมีอะไรใหม่ๆ ที่ไม่เคยมีมาก่อนด้วย มันจะต้องพิเศษกว่าเดิมแน่ๆ ค่ะ"
10000005-39 = "แล้วก็... ฉันอยากปรึกษาอะไรคุณครูนิดหน่อยน่ะค่ะ คุณครูต้องมาให้ได้นะคะ!"
10000005-40 = "......"
10000005-42 = "วางสายไปแล้ว ฉันทำสำเร็จแล้วพีน่า!"
10000005-43 = "เยี่ยมเลยค่ะหัวหน้า"
10000005-46 = "ติ๊ง!"
10000005-47 = "(มีรูปส่งเข้ามา)"
10000005-48 = "ฉันส่งโปสเตอร์เทศกาลมาให้น่ะค่ะ คุณครูจะได้เดินทางมาถูก"
10000005-49 = "ถ้างั้นชิซุโกะคนนี้จะ ตั้ง ตา รอ ให้คุณครูมางานของเรานะคะ"
10000005-50 = "แล้วเจอกันที่ร้านเฮียกคิยาโคน้า♪ เมี้ยวว!"
10000005-52 = "[ns] \"เทศกาลซากุระ... ร้านเฮียกคิยาโค...\""
10000005-55 = "(มาถึงถนนเฮียกคิยาโคที่จัดเทศกาลแล้ว)"
10000005-59 = "ตรอกที่ 7 ย่านการค้าเฮียกคิยาโค"
10000005-60 = "(ถนนเต็มไปด้วยผู้คนที่หัวเราะเริงร่า บรรยากาศของเทศกาลกำลังสนุกสนาน)"
10000005-61 = "(จู่ๆ ก็ได้ยินเสียงของบางคน)"
10000005-63 = "อ๊ะ! อันตรายยยย!"
10000005-68 = "อ๊ายยย...."
10000005-70 = "เฮือก!"
10000005-75 = "ตายแล้ว! ปะ... เป็นยังไงบ้างคะ? บาดเจ็บตรงไหนหรือเปล่า?!"
10000005-76 = "[s6] \"ไม่เป็นอะไรมากหรอก ขอโทษที่ไม่มองให้ดีนะ\"\n[s7] \"เหมือนกระดูกตรงไหนจะหักเลย...\""
10000005-78 = "เฮ้อออ โล่งอกไปที~"
10000005-80 = "คะ?!"
10000005-81 = "[s8] \"อ่า... ล้อเล่นน่า\""
10000005-83 = "ว่าไงนะ?! ละ... ล้อเล่นเหรอ...? (เอียงคอ)"
10000005-84 = "หยุดตรงนั้นเลยนะ~ ฉันไม่ปล่อยไปแน่!"
10000005-86 = "เดี๋ยวก่อนสิ คะ.. คาเอเดะจัง แฮ่ก... แฮ่ก... ทำไมไวจังเลย..."
10000005-88 = "อ๊ะ มาถึงนี่เลยเหรอ?"
10000005-90 = "อะ... อืม! เอาไงดี... ทำยังไงดีล่ะ?!"
10000005-91 = "[s] \"เธออยากได้... ความช่วยเหลือไหม?\""
10000005-93 = "คะ...? อ๊ะ... คือว่า"
10000005-94 = "เจอแล้ว! อยู่ตรงนั้นไง! รุ่นพี่มิโมริ!"
10000005-98 = "อ๊ะ…!"
10000005-101 = "(วิ่งหนีออกมาจนได้)"
10000005-104 = "เฮ้อ...... ตรงนี้น่าจะปลอดภัยแล้วละค่ะ"
10000005-105 = "ขอบคุณที่ช่วยอิซุนะเอาไว้นะคะ!"
10000005-106 = "ว่าแต่... คุณ..."
10000005-107 = "ไม่ใช่นักเรียนเฮียกคิยาโคนี่นา หรือว่าเป็นคนนอก...? แถมยังเป็นผู้ใหญ่ด้วย (กลืนน้ำลาย)"
10000005-108 = "[s] \"เป็นครูที่ทำงานอยู่ในชาเล่ต์น่ะ\""
10000005-109 = "ครูจากชาเล่ต์เหรอ...?"
10000005-110 = "เดี๋ยวนะ... งั้นก็แสดงว่า...!"
10000005-111 = "ใช่แล้ว! ฉันเคยได้ยินมาค่ะ!"
10000005-112 = "ได้ยินมาว่ามีผู้ใหญ่ที่เก่งมากที่คอยช่วยแก้ปัญหาต่างๆ ในคิโวทอส!"
10000005-113 = "ว้าว เท่เหมือนนินจาเลยละค่ะ!"
10000005-114 = "[s] \"...นินจาเหรอ?\""
10000005-115 = "ไม่อยากเชื่อเลยว่าจะได้เจอคุณครูที่เลื่องลือกันด้วย!"
10000005-120 = "ว้าววว~"
10000005-121 = "ว่าแต่.. คุณครูจากชาเล่ต์มีธุระอะไรที่นี่เหรอคะ?"
10000005-122 = "[s] \"มาเที่ยวงานเทศกาลน่ะ\""
10000005-123 = "มางานของเรานี่เอง! งั้นก็ดีเลยค่ะ!"
10000005-126 = "อิซุนะจะเป็นคนพาชมงานเทศกาลให้เองค่ะ!"
10000005-129 = "ดูทางนั้นสิคะ ที่แผงตรงนั้นขายขนมเซ็มเบจิ้งจอกที่มีชื่อเสียงของเฮียกคิยาโคด้วย!"
10000005-131 = "แล้วก็มีโอโคโนมิยากิแร็กคูนขายอยู่ทางโน้น!"
10000005-132 = "แถมไดฟุกุซากุระที่ทำจากกลีบดอกซากุระก็อร่อยมากๆ เลย!"
10000005-133 = "ฮิฮิ! เรียกได้ว่าเป็นขนมประจำเทศกาลเลยละค่ะ"
10000005-137 = "จริงสิ! ไหนๆ คุณครูก็มาที่นี่แล้ว"
10000005-138 = "ฉันมีอะไรให้ดูค่ะ ถ้าไม่ได้ดูก็เท่ากับว่ายังมาไม่ถึงเทศกาลนะ!"
10000005-139 = "ทางนี้เลยค่ะคุณครู!"
10000005-144 = "จุดชมวิวเฮียกคิยาโค"
10000005-148 = "[ns9] \"สวยจังเลย\"\n[ns10] \"มีต้นไม้ใหญ่ๆ แบบนี้ด้วยเหรอเนี่ย?\""
10000005-149 = "ฮิฮิ! เยี่ยมไปเลยใช่ไหมคะ? นี่แหละค่ะความภาคภูมิใจของเราชาวเฮียกคิยาโค"
10000005-150 = "ฮิฮิ! เยี่ยมไปเลยใช่ไหมคะ? นี่แหละค่ะความภาคภูมิใจของเราชาวเฮียกคิยาโค"
10000005-151 = "อิซุนะชอบที่นี่มากเลยละค่ะ ได้เห็นทั้งต้นไม้ใหญ่และถนนของเฮียกคิยาโคได้เต็มสองตาเลย!"
10000005-152 = "ถ้าได้ยืนมองถนนทั้งสายจากตรงนี้ หัวใจของอิซุนะจะรู้สึกร้อนผ่าว"
10000005-153 = "[s] \"หัวใจร้อนผ่าวเหรอ?\""
10000005-154 = "ใช่ค่ะ! เพราะอิซุนะมีความฝัน!"
10000005-155 = "ฝันที่อยากจะเป็นนินจาที่เก่งกาจที่สุดบนถนนนี้...!"
10000005-156 = "และเพื่อจะให้ฝันนั้นเป็นจริง วันนี้อิซุนะก็เลย…!"
10000005-157 = "[s] \"...นินจาเหรอ?\""
10000005-158 = "อ๊ะ?!"
10000005-159 = "เอ่อ... คือว่า นินจาที่ว่า..."
10000005-160 = "[s11] \"ครูไม่ค่อยรู้เรื่องนินจามาก แต่ก็ฟังดูเท่ดีนะ\"\n[s12] \"ครูจะเป็นกำลังใจให้ทุกความฝันของอิซุนะเอง สู้ๆ นะ\""
10000005-161 = "คะ?"
10000005-162 = "คะ?"
10000005-163 = "คุณครู... เป็นกำลังใจให้... ความฝันของอิซุนะงั้นเหรอ?"
10000005-164 = "หมายถึงความฝันที่..."
10000005-165 = "ที่อิซุนะอยากเป็นนินจา... ด้วยเหรอคะ?"
10000005-166 = "[s] \"เป็นครูก็ต้องสนับสนุนนักเรียนอยู่แล้วไม่ใช่เหรอ?\""
10000005-167 = "...!"
10000005-168 = "ว้าว! คุณครูเป็นคนแรกเลยค่ะที่พูดอะไรแบบนี้!"
10000005-169 = "ฮิฮิ! ขอบคุณนะคะ"
10000005-170 = "ถ้ามีคุณครูมาสนับสนุนความฝันของอิซุนะละก็!"
10000005-171 = "สักวันคงได้เป็นนินจาแน่ๆ ถึงเมื่อกี้จะผิดพลาดไปหน่อยก็เถอะ แหะๆ"
10000005-172 = "อิซุนะคนนี้จะพยายามฝึกอย่างหนักแล้วเป็นสุดยอดนินจาให้ได้เลยค่ะ!"
10000005-173 = "ตอนนี้ไม่ใช่เวลาจะมาอยู่เฉยๆ แบบนี้แล้ว! ยังมีภารกิจจากผู้ว่าจ้างเหลืออยู่!"
10000005-174 = "งั้นอิซุนะต้องขอตัวก่อนนะคะ!"
10000005-175 = "เอาไว้เราไปเที่ยวเทศกาลกันใหม่!"
10000005-176 = "เมื่ออิซุนะทำภารกิจสำเร็จนะคะ!"
10000005-178 = "(อิซุนะหายตัวไปไวราวกับสายลม เหมือนกับตอนที่โผล่มาแบบไม่รู้ตัว)"

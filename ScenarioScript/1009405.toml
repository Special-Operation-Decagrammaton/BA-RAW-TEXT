1009405-58 = "3;모모이 메이드;09\n#3;a\n#3;closeup"
1009405-59 = "3;모모이 메이드;09;우와아아아아앗?!?!\n#3;shake\n#3;closeup\n#3;em;[?!]"
1009405-60 = "3;모모이 메이드;09;자, 자극이 과해! 충격의 빈도가 너무 빨라!\n#3;shake\n#3;closeup"
1009405-61 = "3;모모이 메이드;06;근육이 아파! 어딘가 감전되고 있는 것 같은 느낌마저 들어!\n#3;shake\n#3;closeup"
1009405-62 = "3;모모이 메이드;09;선생님! 살려줘, 선생님!\n#3;shake\n#3;closeup"
1009405-63 = "#all;hide"
1009405-64 = "#wait;700"
1009405-65 = "#na;(간신히, 어떻게든 EMS 슈트의 전원을 끊었다.)"
1009405-66 = "#all;hide"
1009405-67 = "#wait;2500"
1009405-68 = "[ns] \"이거, 정말로 괜찮은 거야……?\""
1009405-69 = "3;모모이 메이드;04;이번에는 진짜 다를 거야! 뭐니 뭐니 해도 트레이닝부와 엔지니어부가 함께 힘을 합쳐 만든 것이니까!\n#3;hophop\n#3;a"
1009405-70 = "3;모모이 메이드;02;어? 그 말을 들으니 두 배로 불안해졌다고? 에이, 속고만 살았어? 때로는 사람을 믿는 자세가 필요한 법이라구!\n#3;em;[?]"
1009405-71 = "3;모모이 메이드;01;무엇보다 이번에는 단순한 폼롤러일 뿐이니까 말이지!\n#3;jump"
1009405-72 = "3;모모이 메이드;10;최근의 연구 결과에 따르면, 평소 취하는 부자연스러운 자세가 만성 피로를 유발하는 원인 중 하나일 수 있다고 해."
1009405-73 = "3;모모이 메이드;00;그래서 척추기립근을 강화시키기 위해, 인공지능 폼롤러를 개발했다고 하더라고."
1009405-74 = "3;모모이 메이드;01;사용자의 상태를 폼롤러가 스스로 체크하여, 최적의 폼롤링을 제공한다는 발상인 거지."
1009405-75 = "3;모모이 메이드;11;그러면 어디 한번 해 볼까? 폼롤러를 엉덩이 아래에 두고 몸을 앞뒤로…….\n#3;em;…"
1009405-76 = "#st;[0,0];instant;1;"
1009405-77 = "#clearST"
1009405-78 = "3;모모이 메이드;11\n#3;a\n#3;greeting\n#3;closeup\n#wait;1000"
1009405-79 = "3;모모이 메이드;04\n#3;em;[?!]\n#3;closeup\n#3;shake\n#wait;1500"
1009405-80 = "3;모모이 메이드;09;으아아앙?!\n#3;closeup\n#3;shake"
1009405-81 = "3;모모이 메이드;06;롤링이 너무 빨라! 스스로 움직이고 있어! 선생님–!\n#3;closeup\n#3;shake\n#3;em;[!]"
1009405-82 = "[s3] \"나도 도와주고 싶은데–!\"\n[s4] \"으아아–! 말려들어 간다–!\""

[translation]
1009405-1 = "#title;메이드의 휴식!"
1009405-2 = "[ns] \"어? 게임개발부 부실이 아니네?\""
1009405-3 = "3;모모이 메이드;02;그게, 처음에는 우리 부실에서 쉬려고 했는데…….\n#3;a"
1009405-4 = "3;모모이 메이드;04;선생님이 찾아온다는 소식에 말이지. 동아리 여기저기에서 협찬을 엄청나게 해 줬지 뭐야.\n#3;stiff"
1009405-5 = "3;모모이 메이드;99;다이어트부, 생활건강부, 트레이닝부…… 심지어 엔지니어부까지.\n#3;em;…"
1009405-6 = "3;모모이 메이드;03;이름만 들어도 뭔가 불안해진다고? 에이, 걱정이 과해, 선생님. 속고만 살았어?"
1009405-7 = "3;모모이 메이드;10;물론 트레이닝부와 엔지니어부는…… 뭐…… 선생님도 익히 알고 있는 동아리겠지만! 다른 곳은 또 다를 거라고?"
1009405-8 = "3;모모이 메이드;11;가령 다이어트부의 경우는, 식이나 운동 없이, 과학적 방법론으로 체형을 만들자는 건전한 동아리이고.\n#3;em;[재잘]"
1009405-9 = "3;모모이 메이드;10;생활건강부는 보다 많은 합법적 인체실험을 통해 건강을 개선해 나가자는 동아리이니까!"
1009405-10 = "[s] \"설명을 들으니 한층 더 불안해졌는데?!\""
1009405-11 = "3;모모이 메이드;11;괜찮아, 괜찮아. 다 괜찮을 거야! 선생님에게 나쁜 짓을 하려는 학생은 밀레니엄에는 없을 테니까!\n#3;jump"
1009405-12 = "3;모모이 메이드;02;어? 악의가 없을 거란 건 잘 알고 있다고? 그러면 더더욱 아무래도 괜찮은 거 아냐?\n#3;em;[?]"
1009405-13 = "3;모모이 메이드;03;믿고 맡기자고. 몸도 마음도 푹 쉬고, 내일을 준비하는 거야!"
1009405-14 = "3;모모이 메이드;11;사용 후기도 확실히 전달해 주겠다고 약속했으니, 우리는 해 볼 수밖에 없다고!\n#3;em;[음표]"
1009405-15 = "3;모모이 메이드;01;그래서…… 처음으로 시험해 볼 품목은 바로……."
1009405-16 = "3;모모이 메이드;00;이 초고주파 마사지기야!\n#3;closeup"
1009405-17 = "3;모모이 메이드;10;설명하도록 하지! 초고주파 마사지기란! 근육 이완 효과를 극대화하기 위해서.\n#3;jump"
1009405-18 = "3;모모이 메이드;11;일반 주파수의 대역폭을 한참이나 뛰어넘은 형태로 개량, 개조한 마사지기인 것이다!\n#3;em;[!]"
1009405-19 = "3;모모이 메이드;01;……라고 매뉴얼에는 적혀 있네."
1009405-20 = "3;모모이 메이드;00;사용법은 간단해. 마사지를 하고 싶은 곳에 기구를 부착하고."
1009405-21 = "3;모모이 메이드;01;그대로 스위치를 켜면 된다고 하네?"
1009405-22 = "#all;hide"
1009405-23 = "#na;(불안함을 애써 멀리하며, 마사지기를 작동시켰다…….)"
1009405-24 = "#st;[0,0];instant;1;"
1009405-25 = "#clearST"
1009405-26 = "#wait;700"
1009405-27 = "#wait;1500"
1009405-28 = "#all;hide"
1009405-29 = "[ns] \"으어어어어어?!\""
1009405-30 = "3;모모이 메이드;04;지, 진동이 너무 엄청나! 머릿속까지 떨리는 느낌이야!\n#3;a\n#3;closeup\n#3;stiff\n#3;em;[!]"
1009405-31 = "3;모모이 메이드;09;으아아…… 현기증이……. 현기증이……!\n#3;closeup\n#3;stiff"
1009405-32 = "3;모모이 메이드;09;그런데 진동이 지나치게 강해서, 오히려 손가락 하나 까딱할 힘이 없어……!\n#3;closeup\n#3;stiff"
1009405-33 = "3;모모이 메이드;06;으아앙~ 도와줘, 선생님! 전원을 꺼야 하는데 몸이 움직이지 않아~!\n#3;stiff\n#3;closeup\n#3;em;[훌쩍]"
1009405-34 = "#all;hide"
1009405-35 = "#na;(간신히, 어떻게든 마사지기를 멈추었다…….)"
1009405-36 = "#st;[0,0];instant;1;"
1009405-37 = "#clearST"
1009405-38 = "#wait;700"
1009405-39 = "3;모모이 메이드;04\n#3;a"
1009405-40 = "3;모모이 메이드;04;헉, 헉……. 큰일날 뻔했네…….\n#3;stiff\n#3;em;[세로선]"
1009405-41 = "3;모모이 메이드;04;그, 그래도 이번엔 다를 거야. 다음은 특수 EMS 슈트!\n#3;jump"
1009405-42 = "[s] \"그건 또 뭔데?\""
1009405-43 = "3;모모이 메이드;03;이것은…… 운동은 하기 싫지만, 운동 효과는 보고 싶은 사람들을 위한 슈트래!\n#3;hophop"
1009405-44 = "[s1] \"아니, 운동을 하지 않고도 운동을 할 수 있다니!\"\n[s2] \"획기적이다. 당장 하자.\""
1009405-45 = "#wait;100"
1009405-46 = "#wait;100"
1009405-47 = "3;모모이 메이드;11;훗. 훗. 훗…… 그렇게 나올 줄 알고 있었소.\n#3;em;[재잘]"
1009405-48 = "3;모모이 메이드;10;애초에 나도 운동은 하기 싫고 말이지……."
1009405-49 = "3;모모이 메이드;01;전기근육자극요법이란 것을 사용하면, 적당한 빈도와 강도로 근육을 자극해서."
1009405-50 = "3;모모이 메이드;03;근섬유를 강화하고 근지구력을 올릴 수 있대!\n#3;em;[!]"
1009405-51 = "#all;hide"
1009405-52 = "#na;(모모이와 함께 매뉴얼을 읽어 가며, EMS 슈트라는 것을 입어 보았다.)"

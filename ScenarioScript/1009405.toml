[translation]
1009405-1 = "A Maid's Rest!"
1009405-2 = "[ns] \"Huh? This isn't the Game Development Department's club room.\""
1009405-3 = "Well, I HAD originally planned for us to rest in the club room..."
1009405-4 = "...but when everyone heard you were coming, clubs from all over chipped in."
1009405-5 = "The Diet Club, the Lifestyle and Health Club, the Athletics Training Club...even the Engineering Department."
1009405-6 = "Are those names making you nervous? Relax. Not everybody's out to get you."
1009405-7 = "I mean, you are already...familiar with the Athletics Training Club and the Engineering Department. But what are you expecting from the other clubs?"
1009405-8 = "Let me tell you, the Diet Club is reputable. They promote body shaping through scientific methods, without depending on diet or exercise."
1009405-9 = "The Lifestyle and Health Club works on improving health through human experimentation! The legal kind, I mean."
1009405-10 = "[s] \"That does not make me feel better about either one of them.\""
1009405-11 = "Don't worry, don't worry! Everything will be just fine! No one at Millennium wants to do anything bad to you."
1009405-12 = "...Well, if you KNOW that, then why are you still nervous?"
1009405-13 = "Just leave it all in their hands. Rest your body and soul, and prepare for tomorrow!"
1009405-14 = "We're committed to trying out what they've got and giving them feedback, so there's no backing out now!"
1009405-15 = "So...the first item we'll be testing out is..."
1009405-16 = "...this ultra-high-frequency massager!"
1009405-17 = "Allow me to explain! An ultra-high-frequency massager is designed to enhance muscle relaxation by a significant margin."
1009405-18 = "It's been improved and modified to far exceed the range of standard frequencies!"
1009405-19 = "...Or at least, that's what the manual says."
1009405-20 = "The instructions are simple: just attach the device to the area you want to massage."
1009405-21 = "Then turn on the switch."
1009405-23 = "Setting aside my anxiety, I switched on the massager."
1009405-29 = "[ns] \"Woaaahhh!\""
1009405-30 = "Th-The vibrations are so intense! I can feel them all the way up to my brain!"
1009405-31 = "Ahhh... I'm getting dizzy... So dizzy...!"
1009405-32 = "But the vibrations are so incredibly strong, I can't even lift a finger...!"
1009405-33 = "Waaah! Help me, Sensei! I need to shut it off, but I can't move!"
1009405-35 = "I somehow, barely, managed to shut it off."
1009405-40 = "*huff* *huff* That was a close call..."
1009405-41 = "B-But that was just a one-off. Next up is the special EMS suit!"
1009405-42 = "[s] \"And what's that?\""
1009405-43 = "A suit for people who want the effects of working out without having to do the exercise!"
1009405-44 = "[s1] \"Wait, you can work out without actually exercising?!\"\n[s2] \"That's revolutionary. Let's get started right away!\""
1009405-47 = "Heh, heh, heh... I knew you'd be up for it."
1009405-48 = "To be honest, I'd rather not exercise either..."
1009405-49 = "The suit uses electricity, set to the right frequency and intensity, to stimulate your muscles."
1009405-50 = "It builds up muscle fibers and enhances endurance!"
1009405-52 = "I read through the manual with Momoi, then helped her put on the EMS suit."
1009405-59 = "Whoooaaah!"
1009405-60 = "Th-The stimulation is overwhelming! The shocks are coming in way too fast!"
1009405-61 = "My muscles ache! It feels like I'm getting electrocuted!"
1009405-62 = "Sensei! Help! Sensei!"
1009405-65 = "I barely managed to cut the suit's power."
1009405-68 = "[ns] \"Are you sure we should keep on doing this?\""
1009405-69 = "This time, it's really going to be different! This one has the whole Athletic Training Club AND the Engineering Department behind it!"
1009405-70 = "Huh? That makes you TWICE as anxious? Seriously, you've got to learn to trust people sometimes!"
1009405-71 = "Besides, this one is just a simple foam roller."
1009405-72 = "Recent research suggests that the unnatural postures we often adopt may be a contributing factor to chronic fatigue."
1009405-73 = "Therefore, they developed an AI-powered foam roller to enhance the strength of the spinal erector muscles."
1009405-74 = "The idea is that the foam roller automatically evaluates the user's condition to deliver the best rolling experience."
1009405-75 = "Shall we give it a try? It says to place it under your hips and roll your body back and forth."
1009405-80 = "Aaaahh!"
1009405-81 = "It's rolling way too fast! It's moving on its own! Sensei—!"
1009405-82 = "[s3] \"I really want to help you, but...\"\n[s4] \"Aaahhh! I'm getting sucked in!\""
1009405-86 = "After trying out various relaxation devices..."
1009405-87 = "...we ended up collapsing in discomfort together."

[translation]
1009405-1 = "女僕的休息！"
1009405-2 = "[ns]「嗯？不是要去遊戲開發部的部室嗎？」"
1009405-3 = "唔嗯，我本來也是這麼打算的……"
1009405-4 = "結果一聽說老師要來，各個社團都送來了許多贊助。"
1009405-5 = "比如減肥部、生活健康部、訓練部……甚至連工程師部都有。"
1009405-6 = "光聽名字就覺得很不安？#n哎呀，是老師你想太多了啦！"
1009405-7 = "當然訓練部和工程師部……呃……是老師也很熟悉的社團！#n不過其他社團就不一樣了吧？"
1009405-8 = "比方說減肥部是個不依靠飲食或運動，只靠科學方法塑造體型的健全社團。"
1009405-9 = "而生活健康部，則是透過合法的人體實驗來改善健康的社團哦！"
1009405-10 = "[s]「聽你這麼一說好像更不安了耶！？」"
1009405-11 = "別擔心別擔心，沒事的啦！#n我們千年不會有想對老師做壞事的學生哦！"
1009405-12 = "嗯？你也知道千年的學生沒有惡意？#n那不就沒問題了嗎？"
1009405-13 = "總之就相信我吧。#n要讓身心好好休息，為明天做好準備！"
1009405-14 = "而且因為已經答應要回覆使用體驗的關係，我們也只能試試看了！"
1009405-15 = "所以……第一個要體驗的項目就是……"
1009405-16 = "這個超高頻按摩器！"
1009405-17 = "我來說明吧！這款超高頻按摩器，是為了把放鬆肌肉的效果發揮到最大……"
1009405-18 = "將震動的頻率改良到遠遠凌駕於一般範圍的按摩器！"
1009405-19 = "……說明書上是這麼寫的。"
1009405-20 = "使用方法很簡單。把機器貼在想按摩的地方……"
1009405-21 = "直接打開開關就行了？"
1009405-23 = "（努力放下不安，嘗試啟動了按摩器……）"
1009405-29 = "[ns]「唔喔喔喔喔喔！？」"
1009405-30 = "震，震動太強了！感覺連腦袋都在顫抖！"
1009405-31 = "呃啊啊……頭好暈……頭好暈……！"
1009405-32 = "可是震動實在太強，連移動手指的力氣都沒有……！"
1009405-33 = "呃啊啊～救救我，老師！#n明明得關掉電源，可是身體動不了～！"
1009405-35 = "（好不容易才讓按摩器停了下來……）"
1009405-40 = "呼，呼……差點就出大事了……"
1009405-41 = "不，不過這次不一樣。接下來是特殊EMS套裝！"
1009405-42 = "[s]「那又是什麼？」"
1009405-43 = "這是……為了不想運動，卻又想獲得運動效果的人設計的套裝！"
1009405-44 = "[s1]「什麼，不運動也能有運動效果！」\n[s2]「多麼有創意的發明啊，馬上試試吧。」"
1009405-47 = "哼，哼，哼……就知道你會這麼說。"
1009405-48 = "我也不是很喜歡運動……"
1009405-49 = "不過只要運用肌肉電刺激療法，以適當的頻率和強度刺激肌肉……"
1009405-50 = "就能強化肌纖維，提升肌耐力哦！"
1009405-52 = "（和桃井一起閱讀說明書之後，試穿了EMS套裝）"
1009405-59 = "哇啊啊啊啊啊啊！？！？"
1009405-60 = "刺，刺激太強了！頻率也太高了啊啊啊！"
1009405-61 = "肌肉好痛！感覺好像觸電一樣！"
1009405-62 = "老師！救命啊，老師！"
1009405-65 = "（好不容易切斷了EMS套裝的電源）"
1009405-68 = "[ns]「這真的沒問題嗎……？」"
1009405-69 = "這次真的不一樣！#n畢竟這可是訓練部和工程師部一起合力製造的東西！"
1009405-70 = "嗯？聽起來簡直是翻倍的不安？#n哎唷，老師你是被騙到怕了嗎？偶爾也該相信一下人家呀！"
1009405-71 = "而且最重要的是，這個只是單純的瑜珈滾筒而已！"
1009405-72 = "根據最近的研究結果，據說平常的不自然姿勢可能是誘發慢性疲勞的原因之一。"
1009405-73 = "所以他們為了強化豎脊肌，開發了這款AI瑜珈滾筒。"
1009405-74 = "瑜珈滾筒會自行確認使用者的狀態，提供最佳的滾動方式。"
1009405-75 = "那就來試試看吧？#n先把瑜珈滾筒放在屁股底下，接著身體前後擺動……"
1009405-80 = "呃啊啊啊！？"
1009405-81 = "這個轉速也太快了！而且還自己動起來了！老師──！"
1009405-82 = "[s3]「我也是很想幫忙──！」\n[s4]「呃啊啊──！要被捲進去了──！」"
1009405-86 = "（就這樣體驗了所有休息輔助器具(?)之後……）"
1009405-87 = "（雙雙倒下了……）"

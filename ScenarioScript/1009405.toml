[translation]
1009405-1 = "การพักผ่อนของเมด!"
1009405-2 = "[ns] \"หืม? ไม่ใช่ห้องชมรมพัฒนาเกมหรอกเหรอ?\""
1009405-3 = "ตอนแรกเราก็ว่าจะพักผ่อนในห้องชมรมของตัวเองอยู่หรอก..."
1009405-4 = "แต่พอมีข่าวว่าคุณครูจะมา เราก็เลยได้สปอนเซอร์จากหลายๆ ชมรมเลยละ"
1009405-5 = "ทั้งชมรมไดเอต ชมรมส่งเสริมสุขภาพ ชมรมออกกำลังกาย... แถมยังมีชมรมวิศวกรรมด้วย"
1009405-6 = "แค่ได้ฟังชื่อก็รู้สึกถึงลางไม่ดีแล้วงั้นเหรอ? นี่ ไม่ต้องกังวลให้มากไปหรอกนะคุณครู ที่ผ่านมาโดนหลอกบ่อยเหรอ?"
1009405-7 = "คุณครูเองก็รู้จักและคุ้นเคยกับชมรมออกกำลังกายกับชมรมวิศวกรรมอยู่แล้ว แต่ชมรมอื่น#nยังไม่รู้จักงั้นเหรอ?"
1009405-8 = "ชมรมไดเอตคือชมรมที่มุ่งเน้นการสร้างรูปร่างด้วยวิธีการทางวิทยาศาสตร์ โดยไม่คำนึงถึงอาหาร หรือการออกกำลังกาย"
1009405-9 = "ส่วนชมรมส่งเสริมสุขภาพคือชมรมที่พัฒนาสุขภาพผ่านรูปแบบการทดลองในมนุษย์อย่างถูกกฎหมาย"
1009405-10 = "[s] \"ยิ่งฟังยิ่งกังวลมากกว่าเดิมอีกนะ!\""
1009405-11 = "ไม่เป็นไรหรอก ไม่เป็นไร ทุกอย่างจะโอเค! ในมิลเลเนียมน่ะ ไม่มีนักเรียนคนไหนจะทำอะไรไม่ดีกับ#nคุณครูหรอก!"
1009405-12 = "หืม? คุณครูก็รู้ดีงั้นเหรอว่าคนอื่นไม่มีเจตนาร้าย? งั้นจะมีเรื่องให้กังวลทำไมล่ะ?"
1009405-13 = "เชื่อฉันเถอะน่า ไปพักกายพักใจแล้วเตรียมตัวเพื่อวันพรุ่งนี้เถอะ!"
1009405-14 = "เราสัญญากับทางนั้นไว้แล้วว่าจะรีวิวอุปกรณ์ให้ งั้นก็ต้องลองใช้งานจริงสิ!"
1009405-15 = "และของอย่างแรกที่เราจะลองใช้กันก็คือ..."
1009405-16 = "เครื่องนวดความถี่สูง!"
1009405-17 = "เครื่องนวดความถี่สูงเป็นเครื่องนวดที่ได้รับการปรับปรุงขึ้นใหม่"
1009405-18 = "ให้มีความถี่สูงกว่าเครื่องนวดทั่วไปมาก เพื่อเพิ่มประสิทธิภาพการผ่อนคลายกล้ามเนื้อให้มากที่สุด!"
1009405-19 = "อืม... ในคู่มือเขียนไว้อย่างนี้น่ะ"
1009405-20 = "วิธีใช้ก็ง่ายๆ ก็แค่วางเครื่องนี้ไว้ในจุดที่ต้องการนวด"
1009405-21 = "แล้วก็แค่เปิดสวิตช์ แค่นี้ก็ได้แล้ว"
1009405-23 = "(คุณครูพยายามไม่กังวล และเปิดใช้งานเครื่องนวด...)"
1009405-29 = "[ns] \"อ๊ากกกก!\""
1009405-30 = "สะ... สั่นแรงมากเลย! อย่างกับว่ามันสั่นไปถึงแกนสมองแล้วนะนั่น!"
1009405-31 = "โอยย... เวียนหัวจัง... เวียนหัว...!"
1009405-32 = "สั่นแรงมากจนฉันไม่มีแรงแม้แต่จะกระดิกนิ้วเลย...!"
1009405-33 = "แง๊~ คุณครู ช่วยด้วย! ฉันต้องปิดเครื่อง แต่ร่างกายฉันขยับไม่ได้เลย~!"
1009405-35 = "(ในที่สุดก็ปิดเครื่องนวดกันได้สำเร็จ...)"
1009405-40 = "แฮ่ก... แฮ่ก... เกือบเป็นเรื่องแล้วมั้ยล่ะ..."
1009405-41 = "ตะ... แต่ครั้งนี้จะไม่เข้าอีหรอบเดิมหรอก เพราะของชิ้นต่อไปก็คือสูท EMS พิเศษ!"
1009405-42 = "[s] \"มันคืออะไรเหรอ?\""
1009405-43 = "ในคู่มือเขียนไว้ว่าเป็นชุดสำหรับคนที่อยากเห็นผลจากการออกกำลังกาย แต่ไม่อยากออกกำลังกายน่ะ"
1009405-44 = "[s1] \"ได้ออกกำลังทั้งๆ ที่ไม่ได้ออกกำลังงั้นเหรอ!\"\n[s2] \"เหลือเชื่อเลย งั้นก็มาใช้กันเถอะ\""
1009405-47 = "ฮุ ฮุ ฮุ... กะไว้แล้วเชียวว่าต้องเป็นแบบนี้"
1009405-48 = "ที่จริงฉันเองก็ขี้เกียจออกกำลังกายเหมือนกัน..."
1009405-49 = "ถ้าเราใช้การกระตุ้นกล้ามเนื้อด้วยไฟฟ้าเพื่อกระตุ้นกล้ามเนื้อในความถี่และความแรงที่เหมาะสม"
1009405-50 = "ก็จะช่วยเสริมเส้นใยกล้ามเนื้อและเพิ่มความทนทานของกล้ามเนื้อได้นะ!"
1009405-52 = "(คุณครูอ่านคู่มือการใช้งานกับโมโมอิ แล้วลองใส่ชุดสูท EMS ดู)"
1009405-59 = "เหวออออออ?!?!"
1009405-60 = "กะ... กระตุ้นแรงไปหรือเปล่า! สั่นถี่มากไปแล้วนะ!"
1009405-61 = "ปวดตัวไปหมดแล้ว! ฉันรู้สึกเหมือนโดนไฟดูดเลย!"
1009405-62 = "คุณครู! ช่วยฉันด้วย คุณครู!"
1009405-65 = "(คุณครูช่วยปิดเครื่องชุดสูท EMS ได้อย่างหวุดหวิด)"
1009405-68 = "[ns] \"อันนี้มัน... จะไม่เป็นไรจริงเหรอ...?\""
1009405-69 = "ครั้งนี้ต้องได้ผลแน่! ของชิ้นนี้มาจากการรวมพลังของชมรมออกกำลังกายกับชมรมวิศวกรรมเชียวนะ!"
1009405-70 = "หืม? พอเป็นพวกนั้นก็ยิ่งกังวลใจเป็น 2 เท่างั้นเหรอ? โธ่ คุณครูไม่เชื่อใจใครเลยเหรอ? บางครั้งเราก็ควรเชื่อมั่นในคนอื่นบ้างนะ!"
1009405-71 = "และครั้งนี้ก็เป็นแค่โฟมโรลเลอร์ธรรมดาๆ ด้วย"
1009405-72 = "ผลการวิจัยล่าสุดบอกว่าท่าทางที่ไม่เป็นธรรมชาติในชีวิตประจำวันอาจเป็นสาเหตุหนึ่งที่ทำให้เกิด#nความเมื่อยล้าเรื้อรังได้"
1009405-73 = "2 ชมรมนั้นก็เลยพัฒนาโฟมโรลเลอร์ AI ขึ้นมาเพื่อเสริมกล้ามเนื้อบริเวณหลังส่วนล่างน่ะ"
1009405-74 = "เป็นความคิดริเริ่มที่จะให้โฟมโรลเลอร์ตรวจสอบร่างกายของผู้ใช้งานแล้วก็จะได้นวดให้อย่างเหมาะสม#nที่สุดน่ะ"
1009405-75 = "งั้นเรามาลองใช้งานกันเลยมั้ย? วางโฟมโรลเลอร์ไว้ใต้สะโพกแล้วขยับตัวขึ้นลงแบบนี้..."
1009405-80 = "อ๊าาา~!!"
1009405-81 = "หมุนเร็วไปหรือเปล่า! มันหมุนเองเร็วมากเลย! คุณครู!"
1009405-82 = "[s3] \"ครูก็อยากไปช่วยอยู่หรอกนะ\"\n[s4] \"อ๊าก! ครูก็โดนอยู่เหมือนกัน!\""
1009405-86 = "(ทั้งคุณครูและโมโมอิได้ลองใช้อุปกรณ์พิเศษสำหรับผ่อนคลาย...)"
1009405-87 = "(จนสุดท้ายต้องนอนปวดตัวกันทั้งคู่...)"

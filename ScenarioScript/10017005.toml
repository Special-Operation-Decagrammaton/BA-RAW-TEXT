10017005-10 = "3;세리나 산타ND;99;봄의 새싹, 여름의 햇살, 가을의 낙엽…… 그리고.\n#3;a"
10017005-11 = "5;하나에 산타ND;02;겨울의 눈이군요, 선배?\n#5;em;[?!]\n#5;a\n#3;m1"
10017005-12 = "3;세리나 산타ND;10;물론 그것도 있죠. 거기에 하나만 덧붙이자면, 또 뭐가 있을까요?"
10017005-13 = "5;하나에 산타ND;07;그거야 물론 눈과 함께하는 크리스마스죠!\n#5;em;[음표]\n#5;hophop"

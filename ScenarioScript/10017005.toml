10017005-19 = "5;하나에 산타ND;01;산타클로스를 기다려요!\n#5;jump"
10017005-20 = "3;세리나 산타ND;03\n5;하나에 산타ND;07\n#3;hophop\n#5;hophop\n#3;h\n#5;h"

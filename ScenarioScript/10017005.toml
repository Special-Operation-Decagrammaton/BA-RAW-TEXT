[translation]
10017005-1 = "Prologue; Christmas in Kivotos!"
10017005-9 = "Trinity Infirmary"
10017005-10 = "Blooming flowers in spring, shining sunlight in summer, fallen leaves in autumn, and..."
10017005-11 = "Snow in winter!"
10017005-12 = "There's that, of course, but what else?"
10017005-13 = "A white Christmas!"
10017005-14 = "Christmas?"
10017005-15 = "Christmas!"
10017005-16 = "Decorating trees!"
10017005-17 = "Singing carols!"
10017005-18 = "Preparing gifts!"
10017005-19 = "Waiting for Santa Claus!"
10017005-21 = "Yay!"
10017005-22 = "[ns] \"Everyone seems so excited.\""
10017005-23 = "Uh, yeah! It's Christmas!"
10017005-24 = "Hahaha, that's true. But we should be careful not to get lost in the excitement."
10017005-25 = "I haven't forgotten what we're here to do! That's what the Santa outfit is for!"
10017005-26 = "Always so enthusiastic, Hanae..."
10017005-27 = "Wh-What do you think, Sensei? This outfit doesn't look awkward on me or anything, does it?"
10017005-28 = "[s1] \"It looks great, Serina.\"\n[s2] \"It's very...traditional.\""
10017005-31 = "And me? What about me, Sensei?!"
10017005-32 = "[s3] \"You look very cute, Hanae.\"\n[s4] \"You look like you're full of energy.\""
10017005-35 = "Yay! Your hard work this morning paid off, Serina!"
10017005-36 = "H-Hanae! Th-There's no need to bring that up now..."
10017005-37 = "[s] \"So, the Remedial Knights celebrate Christmas.\""
10017005-38 = "Of course, Sensei! Christmas is essential to the Remedial Knights!"
10017005-39 = "The Remedial Knights appreciate all kinds of days. Christmas is no exception."
10017005-41 = "Now, now, that's enough of that."
10017005-47 = "For the Remedial Knights, Christmas is no day for fun."
10017005-48 = "Rather, on this sacred occasion, we look for where our aid is most needed..."
10017005-49 = "...and reflect on our past with a humble mind."
10017005-50 = "[s] \"So...how do the Remedial Knights do all that?\""
10017005-51 = "To put it simply, we perform acts of charity, Sensei."
10017005-52 = "We're gonna set up a donation bucket in the city and ask passersby to donate money!"
10017005-53 = "We'll be singing carols and handing out gloves and hats we knitted ourselves!"
10017005-54 = "Serina's singing is super good! You'll love her carols, Sensei!"
10017005-55 = "H-Hanae, you're embarrassing me..."
10017005-61 = "[ns5] \"So that's why you asked for help.\"\n[ns6] \"Now I understand what Christmas means to the Remedial Knights.\""
10017005-65 = "Serina, Hanae. It's good to see that you're both so energetic."
10017005-66 = "Sensei, thank you again for inconveniencing yourself for our sake."
10017005-67 = "[s7] \"Nothing this worthwhile is an inconvenience!\"\n[s8] \"I'm just excited to hear Serina and Hanae sing!\""
10017005-70 = "If you're all so excited, then, everyone, please go on ahead."
10017005-71 = "As for me, I'm going to patrol Trinity one more time before joining you."
10017005-73 = "Yes, Captain."
10017005-74 = "Okie-dokie!"

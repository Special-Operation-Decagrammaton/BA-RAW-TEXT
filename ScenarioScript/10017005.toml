[translation]
10017005-1 = "บทเริ่มต้น;คริสต์มาสของคิโวทอส!"
10017005-9 = "ห้องพยาบาล สถาบันทรีนิตี้"
10017005-10 = "ต้นอ่อนในฤดูใบไม้ผลิ แสงแดดในฤดูร้อน ใบไม้เปลี่ยนสีในฤดูใบไม้ร่วง แล้วก็..."
10017005-11 = "หิมะในฤดูหนาว... ใช่ไหมคะรุ่นพี่?"
10017005-12 = "หิมะก็ใช่เหมือนกันค่ะ แต่ถ้าให้คิดถึงอะไรอีกสักอย่าง จะเป็นอะไรคะ?"
10017005-13 = "ก็ต้องเป็นคริสต์มาสที่มาพร้อมหิมะไงคะ!"
10017005-14 = "คริสต์มาสเหรอคะ?"
10017005-15 = "ใช่แล้ว คริสต์มาสค่ะ!"
10017005-16 = "ทั้งประดับต้นคริสต์มาส!"
10017005-17 = "และร้องเพลงคริสต์มาส!"
10017005-18 = "เตรียมของขวัญ!"
10017005-19 = "แล้วก็รอซานตาคลอสค่ะ!"
10017005-21 = "ว้าวววว!"
10017005-22 = "[ns] \"ทั้งสองคนดูตื่นเต้นกันจังเลยนะ\""
10017005-23 = "ใช่ค่ะ! ก็คริสต์มาสทั้งทีนี่คะ!"
10017005-24 = "แหะๆๆ... ถึงจะเห็นพวกฉันตื่นเต้นแบบนี้"
10017005-25 = "แต่พวกฉันก็ยังไม่ลืมงานที่ต้องทำหรอกนะคะ! ก็เลยใส่ชุดซานต้ากันออกมาอย่างนี้น่ะค่ะ"
10017005-26 = "ฮานาเอะจังมีความตั้งใจแรงกล้าจังเลยนะคะ..."
10017005-27 = "คุณครูว่าเป็นยังไงบ้างคะ? ชุดนี้มัน... ดูเคอะเขินหรือแปลกๆ ตรงไหนบ้างหรือเปล่าคะ?"
10017005-28 = "[s1] \"ใส่แล้วดูดีเลยละ เซรินะ\"\n[s2] \"ดูคลาสสิกมากเลย\""
10017005-31 = "ฉันล่ะคะ? ฉันล่ะ? ฉันเป็นยังไงคะคุณครู!"
10017005-32 = "[s3] \"ฮานาเอะน่ารักดีนะ...\"\n[s4] \"ดูมีชีวิตชีวามากเลย\""
10017005-35 = "ได้ยินไหมคะรุ่นพี่? ไม่เสียแรงที่รุ่นพี่ตื่นมาเตรียมตัวตั้งแต่เช้านะคะ!"
10017005-36 = "ฮะ... ฮานาเอะจัง! อย่าพูดเรื่องนั้นที่นี่สิคะ..."
10017005-37 = "[s] \"จะว่าไป ชมรมอัศวินบรรเทาทุกข์ก็ฉลองคริสต์มาสเหมือนกันเนอะ\""
10017005-38 = "แน่นอนอยู่แล้วค่ะคุณครู! คริสต์มาสคือช่วงเวลาที่จำเป็นต้องมีชมรมอัศวินบรรเทาทุกข์เลยละค่ะ!"
10017005-39 = "ไม่มีเวลาไหนที่ขาดชมรมอัศวินบรรเทาทุกข์ไปได้หรอกค่ะ ต่อให้เป็นเทศกาลอย่างคริสต์มาสก็ตาม"
10017005-41 = "เอาละๆ ทั้งสองคนพอได้แล้ว"
10017005-47 = "คริสต์มาสไม่ใช่วันที่ชมรมอัศวินบรรเทาทุกข์จะมาสนุกสนานกันนะคะ"
10017005-48 = "ในวันศักดิ์สิทธิ์แบบนี้ ยิ่งต้องคิดทบทวนว่าที่ไหนที่ต้องการความช่วยเหลือจากเรามากที่สุด"
10017005-49 = "และที่ไหนต้องการความช่วยเหลือน้อยที่สุดค่ะ"
10017005-50 = "[s] \"แล้วชมรมอัศวินบรรเทาทุกข์จะทำอะไรกันเหรอ?\""
10017005-51 = "สิ่งที่เราจะทำ ถ้าจะให้สรุปให้ฟังง่ายๆ ก็คืองานการกุศลค่ะคุณครู"
10017005-52 = "เราจะไปวางถังรับเงินบริจาคในเมือง แล้วขอให้คนที่เดินผ่านไปมาช่วยบริจาคค่ะ!"
10017005-53 = "ระหว่างนั้นก็จะร้องเพลงคริสต์มาส แล้วก็แจกถุงมือขนสัตว์และหมวกที่พวกฉันถักกันเองด้วยค่ะ!"
10017005-54 = "เพลงคริสต์มาสของรุ่นพี่เซรินะเยี่ยมยอดไปเลยนะคะ! คุณครูรอฟังได้เลยค่ะ!"
10017005-55 = "ฮะ... ฮานาเอะจัง ถ้าพูดแบบนี้ก็เขินแย่สิคะ..."
10017005-61 = "[ns5] \"ก็เลยขอให้ครูมาช่วยงานการกุศลสินะ\"\n[ns6] \"คริสต์มาสกับชมรมอัศวินบรรเทาทุกข์เป็นแบบนี้นี่เอง\""
10017005-65 = "เซรินะ ฮานาเอะ ขอบคุณที่ใส่พลังงานกันเหลือล้นเลยนะคะ"
10017005-66 = "แล้วก็คุณครู... ไม่รู้ว่าคุณครูจะรู้สึกยุ่งยากหรือเปล่า แต่ก็ขอบคุณอีกครั้งที่มานะคะ..."
10017005-67 = "[s7] \"เรื่องยุ่งยากแบบนี้ครูยินดีช่วยเสมอนะ!\"\n[s8] \"ครูอยากฟังเพลงของเซรินะจังกับฮานาเอะจังแล้วละ!\""
10017005-70 = "เอาละค่ะ ทุกคนคะ ออกเดินทางไปยังที่หมายกันเลยค่ะ"
10017005-71 = "ฉันจะไปเดินดูรอบๆ ทรีนิตี้อีกครั้งแล้วตามไปสมทบค่ะ"
10017005-73 = "ค่ะ หัวหน้า"
10017005-74 = "ค่าา~"

10017005-22 = "[ns] \"둘 다 신나 보이네.\""
10017005-23 = "5;하나에 산타ND;02;그럼요! 크리스마스니까요!\n#5;em;[!]\n#5;m5\n#3;m1"
10017005-24 = "3;세리나 산타ND;04;아하하…… 너무 들떠 있기만 해도 문제겠지만요.\n#3;em;[땀]"
10017005-25 = "5;하나에 산타ND;03;물론 저희가 할 일도 잊지 않았어요! 그래서 이렇게 산타복을 입고 나온 거잖아요?\n#5;jump"
10017005-26 = "3;세리나 산타ND;99;벌써 의욕이 넘치네요, 하나에 쨩은……\n#3;m3\n#5;dr"
10017005-27 = "3;세리나 산타ND;07;어, 어떠세요. 선생님? 이 복장…… 어색하다거나 이상하지 않나요?\n#3;em;[///]"
10017005-28 = "[s1] \"잘 어울려, 세리나.\"\n[s2] \"뭔가 정통파라는 느낌?\""
10017005-29 = "#wait;100"
10017005-30 = "#wait;100"
10017005-31 = "3;하나에 산타ND;07;저는요? 저는요? 전 어떤가요, 선생님!\n#3;hophop"
10017005-32 = "[s3] \"하나에는 귀엽구나……\"\n[s4] \"기운 넘쳐 보여서 보기 좋아.\""
10017005-33 = "#wait;100"
10017005-34 = "#wait;100"
10017005-35 = "3;하나에 산타ND;00;그렇대요, 선배! 선배가 아침 일찍부터 준비한 보람이 있었네요!\n#3;em;[재잘]"
10017005-36 = "3;세리나 산타ND;04;하, 하나에 쨩! 그 이야기는 지금 꺼내지 말아 주세요……\n#3;em;[?!]\n#3;shake"
10017005-37 = "[s] \"그건 그렇고, 구호기사단도 크리스마스를 기념하는구나.\""
10017005-38 = "5;하나에 산타ND;05;당연하죠, 선생님! 크리스마스야말로 구호기사단이 필요한 시간!\n#5;em;[!]\n#5;al\n#3;m1"
10017005-39 = "3;세리나 산타ND;01;구호기사단이 필요하지 않은 시간은 없지만요. 크리스마스도 예외는 아니죠."

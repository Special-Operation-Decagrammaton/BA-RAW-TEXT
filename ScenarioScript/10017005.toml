10017005-48 = "3;미네;99;오히려 이 성스러운 날에, 가장 우리들의 '구호'가 필요한 곳이 어디인지,"
10017005-49 = "3;미네;01;낮은 곳으로부터 되돌아 성찰하는 날이어야 하겠지요."
10017005-50 = "[s] \"그래서…… 구호기사단은 뭘 하려고 하는 거야?\""
10017005-51 = "3;세리나 산타ND;02;간단하게 이야기해 드리자면 자선활동이에요, 선생님.\n#3;em;[반응]"

[translation]
10017005-1 = "序幕;奇普托斯的聖誕節！"
10017005-9 = "三一校內"
10017005-10 = "春天的新苗、夏天的大海、秋天的紅葉……以及……"
10017005-11 = "說到冬天，就是雪了呢！"
10017005-12 = "那個當然也包含在內……#n還有想到什麼東西嗎？"
10017005-13 = "還有……是聖誕節吧！"
10017005-14 = "沒錯，聖誕節！"
10017005-15 = "聖誕節！！！"
10017005-16 = "裝飾聖誕樹！"
10017005-17 = "唱頌歌！"
10017005-18 = "準備禮物！"
10017005-19 = "等待聖誕老人！"
10017005-21 = "哇──！！！"
10017005-22 = "[ns]「你們兩個看起來很開心呢。」"
10017005-23 = "因為是聖誕節呀！"
10017005-24 = "啊哈哈……不過也不能興奮過頭。"
10017005-25 = "當然，不能忘記該做的事唷！#n所以才穿著聖誕老人的衣服！"
10017005-26 = "幹勁十足呢，花繪醬……"
10017005-27 = "話，話說回來，老師覺得如何呢……？#n會很……奇怪嗎？？"
10017005-28 = "[s1]「很適合你唷。」\n[s2]「根本就是聖誕節的女主角，超讚。」"
10017005-31 = "我呢？我看起來怎麼樣，老師！"
10017005-32 = "[s3]「花繪也很可愛！」\n[s4]「充滿朝氣，和這個平靜的季節很般配。」"
10017005-35 = "太好了，前輩！#n不枉費我們一大早就開始準備呢！"
10017005-36 = "花，花繪醬……！"
10017005-37 = "[s]「話說回來，原來救護騎士團也慶祝聖誕節呢。」"
10017005-38 = "那當然！#n倒不如說聖誕節才是發揮救護騎士團真本事的時候！"
10017005-39 = "救護騎士團的活動不論何時都不會改變……#n聖誕節也不例外。"
10017005-41 = "讓你們久等了。"
10017005-47 = "今年也到了聖誕節的這一天呢……"
10017005-48 = "雖然是神聖的日子，但我們仍會一如既往地去「救護」。"
10017005-49 = "哪裡需要我們，我們就去哪裡。同時一邊回顧這一年發生的大小事，重新審視使命。"
10017005-50 = "[s]「原來如此……所以具體來說，要做什麼呢？」"
10017005-51 = "簡單地說，就是「當志工」吧。"
10017005-52 = "擺出捐款箱，向過路的人募款！"
10017005-53 = "然後吟唱頌歌，分發我們親手織的手套和帽子！"
10017005-54 = "芹奈前輩的頌歌非常好聽唷！敬請期待，老師！"
10017005-55 = "花，花繪醬，那樣說會把門檻拉太高的……"
10017005-61 = "[ns5]「原來如此，是想請我幫忙啊。」\n[ns6]「那麼，就讓我和救護騎士團的大家共度聖誕佳節吧。」"
10017005-65 = "芹奈和花繪都充滿了幹勁，很不錯唷。"
10017005-66 = "老師，很抱歉突然給您添麻煩了。"
10017005-67 = "[s7]「不會，完全不麻煩哦。」\n[s8]「很期待大家吟唱的頌歌呢！」"
10017005-70 = "非常感謝。那麼，請大家先前往現場吧。"
10017005-71 = "我巡視一下三一後，就去和你們會合。"
10017005-73 = "知道了，團長也要小心。"
10017005-74 = "了解！！"

[translation]
1300103-1 = "陰陽部的偶像"
1300103-5 = "（和知世碰面之後在前往書店的途中，發生了事件）"
1300103-6 = "啊，請，請問是知世大人嗎！？"
1300103-7 = "嗯……？"
1300103-8 = "是，是本人！是真的知世大人！"
1300103-9 = "什麼，你說知世大人！？"
1300103-10 = "知世公主在這種地方！？哪裡！？請問位在何方！？"
1300103-13 = "[ns] 「什，什麼什麼！？」"
1300103-14 = "嗯～？（歪頭）"
1300103-15 = "呀啊啊！知世大人！！"
1300103-18 = "知世大人，請往這邊笑一個！"
1300103-19 = "笑一個……"
1300103-21 = "這樣嗎？"
1300103-23 = "哈啊！哈啊！是天使！知世大人，真的是天使！"
1300103-25 = "知世大人！俳句！可以請您吟詠俳句給我們聽嗎！？"
1300103-26 = "……吟詠。"
1300103-27 = "呀啊大家好"
1300103-28 = "有沒有好好的在"
1300103-29 = "飯後刷牙呢？"
1300103-31 = "哇啊啊啊啊……！知世大人的即興吟詠……！"
1300103-32 = "啊啊……我，我要昏倒了……！"
1300103-33 = "知世大人！知世大人！C．H．I．S．E！ 知世公主，我愛妳！！"
1300103-34 = "嗯。老師，我動不了。怎麼辦。"
1300103-35 = "[s] 「那個，讓大家先冷靜點……」"
1300103-36 = "嗯？請問你是誰？為什麼靠知世大人那麼近？"
1300103-37 = "該不會是經紀人？"
1300103-38 = "不，也許是惡劣的跟蹤狂也說不定！"
1300103-39 = "沒錯！"
1300103-40 = "[s] 「並不是！」"
1300103-42 = "[s1] 「如你所見，我是知世的經紀人！」\n[s2] 「如你所見，我是知世的老師！」"
1300103-43 = "看起來不像啊……真的嗎？"
1300103-44 = "看起來不像啊……真的嗎？"
1300103-46 = "[s3] 「呃，看起來沒辦法讓人信服……！」\n[s4] 「知世，我們逃吧！」"
1300103-47 = "咦？嗯，我知道了～"
1300103-48 = "咦？嗯，我知道了～"
1300103-49 = "啊，逃走了！快追！"
1300103-52 = "[ns] 「哈啊，哈啊，剛才真危險……」"
1300103-53 = "老師，遇上災難了？"
1300103-54 = "[s] 「不，與其說我不如說……」"
1300103-55 = "嗯──？"
1300103-56 = "[s] 「……嘛，算了。這種事很常發生嗎？」"
1300103-57 = "走在路上的話，偶爾。"
1300103-58 = "因為我是陰陽部的成員嗎？"
1300103-59 = "[s5] 「話說回來妳說過，陰陽部為了觀光宣傳，」\n[s6] 「在各地進行了很多活動呢。」"
1300103-60 = "嗯，剛才那些人也似乎都在為我加油，"
1300103-61 = "嗯，剛才那些人也似乎都在為我加油，"
1300103-62 = "讓我覺得，要努力才行。"
1300103-63 = "[s7] 「這樣啊……」\n[s8] 「知世是位名人呢。」"
1300103-64 = "名人……？"
1300103-65 = "名人……？"
1300103-67 = "[s] 「大家，都很喜歡知世啊。」"
1300103-68 = "……嗯，也許是。"
1300103-69 = "能讓人喜歡，是件開心的事"
1300103-70 = "啊，找到了！知世大人～！"
1300103-71 = "[s] 「糟了，被追上了！」"
1300103-72 = "知世大人～～！！！只有握手也好～！！"
1300103-73 = "[s9] 「呃，沒辦法了！知世，快逃！ 」\n[s10] 「這裡交給我！」"
1300103-74 = "嗯，我知道了。"
1300103-75 = "嗯，我知道了。"
1300103-78 = "啊。"
1300103-79 = "[s] 「怎麼了！？」"
1300103-82 = "老師你看，螞蟻的隊伍。"
1300103-83 = "[s] 「知世！？現在沒時間悠哉了……！」"
1300103-85 = "（擠過層層人海，好不容易和知世一起逃了出來）"

[translation]
1300103-1 = "ไอดอลแห่งชมรมหยินหยาง"
1300103-5 = "(ระหว่างที่กำลังไปร้านหนังสือกับชิเซะก็เกิดเหตุไม่คาดคิดขึ้น)"
1300103-6 = "คือว่า...ท่านชิเซะหรือเปล่าคะ?!"
1300103-7 = "หือ.....?"
1300103-8 = "จริงด้วย! ท่านชิเซะตัวจริง!"
1300103-9 = "หา? ท่านชิเซะอย่างนั้นเหรอ?"
1300103-10 = "องค์หญิงชิเซะอยู่ที่นี่เหรอ?! ไหน?! อยู่ไหน?!"
1300103-13 = "[ns] \"นี่มันอะไรกัน?\""
1300103-14 = "หืม~? (เอียงคอ)"
1300103-15 = "กรี๊ด! ท่านชิเซะ! มองทางนี้หน่อยคะ!"
1300103-18 = "ยิ้มหน่อยค่ะ ท่านชิเซะ!"
1300103-19 = "อืม..."
1300103-21 = "แบบนี้เหรอ...? (ยิ้ม)"
1300103-23 = "กรี๊ดดดด! นางฟ้า! ท่านชิเซะ! สมกับเป็นนางฟ้าจริงๆ!"
1300103-25 = "ท่านชิเซะ! กลอนไฮกุ! แต่งกลอนไฮกุให้หน่อยค่า!"
1300103-26 = "อืม... กลอนไฮกุ"
1300103-27 = "สวัสดีทุกคน"
1300103-28 = "แปรงฟันกันวันละสามครั้ง"
1300103-29 = "สบายดีไหม?"
1300103-31 = "กรี๊ด! กลอนไฮกุของท่านชิเซะของจริง!"
1300103-32 = "โอ๊ย... น่ารักจนหัวใจจะวาย...!"
1300103-33 = "ท่านชิเซะ! ท่านชิเซะ! C H I S E! ไอเลิฟองค์หญิงชิเซะ!"
1300103-34 = "เอ่อ คุณครู... ฉันเดินไม่ได้เลย ทำยังไงดี"
1300103-35 = "[s] \"เดี๋ยว... ทุกคนใจเย็นก่อน...\""
1300103-36 = "หืม? คุณเป็นใครกัน?#nคุณเป็นใครถึงได้มายืนอยู่ข้างๆ ท่านชิเซะ?!"
1300103-37 = "หรือว่าจะเป็นผู้จัดการ?"
1300103-38 = "ไม่นะ! หรือจะเป็นพวกสตอล์กเกอร์ชั่วร้าย!"
1300103-39 = "ใช่แน่เลย!"
1300103-40 = "[s] \"ไม่ใช่นะ!\""
1300103-42 = "[s1] \"อย่างที่เห็นฉันเป็นผู้จัดการของชิเซะ!\"\n[s2] \"อย่างที่เห็นฉันเป็นคุณครูของชิเซะ!\""
1300103-43 = "ดูไม่เหมือนเลยนะ? พูดจริงอ่ะ?"
1300103-44 = "ดูไม่เหมือนเลยนะ? พูดจริงอ่ะ?"
1300103-46 = "[s3] \"อึ่ก ทนไม่ไหวแล้ว\"\n[s4] \"ชิเซะ วิ่ง!\""
1300103-47 = "หืม? อ่อ โอเค~"
1300103-48 = "หืม? อ่อ โอเค~"
1300103-49 = "อ๊ะ วิ่งหนีไปแล้ว!"
1300103-52 = "[ns] \"แฮ่ก...แฮ่ก.... เราเกือบเจอปัญหาใหญ่แล้ว\""
1300103-53 = "อืม~ ปัญหาใหญ่งั้นเหรอคุณครู?"
1300103-54 = "[s] \"ไม่สิ คนที่แย่ไม่ใช่ครู แต่เป็นชิเซะ...\""
1300103-55 = "หืม? (เอียงคอ)"
1300103-56 = "[s] \"ปกติเป็นแบบนี้บ่อยเหรอ?\""
1300103-57 = "อืม~ บางทีเดินไปตามถนนก็เจอแบบนี้บ้างนะ"
1300103-58 = "เพราะเป็นสมาชิกของชมรมหยินหยาง ทุกคนเลยคิดว่าฉันพิเศษล่ะมั้ง?"
1300103-59 = "[s5] \"แล้วชมรมหยินหยางก็ประชาสัมพันธ์เรื่องการท่องเที่ยวของเฮียกคิยาโค\"\n[s6] \"ทำงานนอกพื้นที่หลายๆ อย่างล่ะสิ\""
1300103-60 = "แต่เพราะมีทุกคนคอยสนับสนุน"
1300103-61 = "แต่เพราะมีทุกคนคอยสนับสนุน"
1300103-62 = "ฉันเลยคิดว่าต้องพยายามให้เต็มที่"
1300103-63 = "[s7] \"แบบนี้นี่เอง...\"\n[s8] \"ชิเซะเป็นชื่นชอบมากเลยนะ\""
1300103-64 = "ชื่นชอบ...? (เอียงคอ)"
1300103-65 = "ชื่นชอบ...? (เอียงคอ)"
1300103-67 = "[s] \"หมายความว่าทุกคนต่างก็ชอบชิเซะไง\""
1300103-68 = "อืม... แบบนี้นี่เอง..."
1300103-69 = "การมีคนมาชอบก็เป็นเรื่องที่น่าดีใจนะ"
1300103-70 = "อ๊ะ! เจอแล้ว! ท่านชิเซะ~!"
1300103-71 = "[s] \"แย่ละสิ โดนตามทันแล้ว!\""
1300103-72 = "ท่านชิเซะ~~!!! ขอจับมือสักครั้งนะ~!~!"
1300103-73 = "[s9] \"อึ่ก ช่วยไม่ได้นะ! ชิเซะหนีไปเร็ว!\"\n[s10] \"ครูจะหยุดพวกนั้นไว้ที่นี่เอง!\""
1300103-74 = "หืม? เข้าใจแล้ว~"
1300103-75 = "หืม? เข้าใจแล้ว~"
1300103-78 = "อ่า"
1300103-79 = "[s] \"หืม? ชิเซะ มีอะไรเหรอ?!\""
1300103-82 = "คุณครูดูนี่สิ มีมดเดินเรียงแถวด้วยล่ะ"
1300103-83 = "[s] \"ชิเซะ! เรื่องนั้นไว้ทีหลังเถอะ!!\""
1300103-85 = "(หลังจากนั้นก็วิ่งหนีเหล่าแฟนคลับของชิเซะออกมาได้อย่างทุลักทุเล)"

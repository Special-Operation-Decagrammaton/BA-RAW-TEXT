1003203-154 = "อ่า... คุณครู..."
1003203-155 = "ทำสีหน้าจริงจังแบบนั้น เพื่อเค้า..."
1003203-156 = "แบบนั้นมัน... แบบนั้นมัน..."
1003203-157 = "[s] \"แบบนั้นมัน...?\""
1003203-161 = "พรืดดด พรืดดดด ฮะฮะฮะฮ่าฮ่าฮ่า!"
1003203-162 = "อะไรกัน เรื่องน่าอายแบบนั้น ดันเผลอขำโดยไม่รู้ตัวซะแล้ว! ฮะฮะฮ่าฮ่า!"
1003203-163 = "ว้าว~ คุณครูทำสีหน้าไร้เดียงสา... แล้วพูดเรื่องน่าอายแบบนี้ได้เก่งจริงๆ เลยนะ!#nฮะฮะฮ่าฮ่า! ตลกชะมัดเลย~!"
1003203-164 = "[s] \"ที่พูดไปเมื่อกี้... มันน่าอายเหรอ...?\""
1003203-165 = "ฮะฮะฮ่าฮ่า! จริงๆ เล๊ย! ขะ...ขำจนปวดท้องแล้วเนี่ย! ฮะฮะฮ่า!!"
1003203-166 = "อื้อ! คุณครูนี่ทำสีหน้าตีบทแตกจริงๆ เลย!"
1003203-167 = "คราวนี้... เค้าโดนแซงหน้าไปแล้วสินะ"
1003203-168 = "อ่า! สนุกจังเลย!"
1003203-169 = "คุณครูเอาคืนเค้าได้สุดยอดเลย เค้าแพ้แล้วล่ะ! คราวหน้าเค้าไม่ยอมแพ้แน่!"
1003203-170 = "คราวหน้าเค้าจะทำให้คุณครูตะลึงเลย! เค้าต้องชนะแน่!"
1003203-171 = "งั้นไว้เจอกันใหม่นะ คุณครู!"
1003203-176 = "[ns9] \"ใช้อะไรวัดว่าแพ้หรือชนะเนี่ย...\"\n[ns10] \"ว่าแต่ว่า... พูดแบบนั้นมันแปลกมากเลยเหรอ?\""
1003203-180 = "(คุณครูมองตามมุสึกิที่เดินไปด้วยท่าทางสนุกสนานสุดๆ จนเธอลับตาไป...)"

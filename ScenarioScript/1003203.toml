[translation]
1003203-1 = "新年要像個新年一樣！"
1003203-3 = "（到了和無月約定的地點，已經擠滿了人潮）"
1003203-8 = "啊，老師～！"
1003203-9 = "咯呵呵，沒有遲到呢？"
1003203-10 = "我本以為老師會因為忙工作而來不了呢，哭哭……還是你原本是這麼想的？"
1003203-11 = "[s] 「畢竟難得跟無月約好要出門了。」"
1003203-12 = "啊哈。"
1003203-13 = "哼──嗯，是這樣嘛～？"
1003203-14 = "話說回來，不愧是新年呢，人也太多──了吧。"
1003203-15 = "嗯……總覺得已經累了，有點厭煩了好像？"
1003203-16 = "[s] 「不是才剛來嗎……？」"
1003203-17 = "咯呵呵，說笑的～。那麼，往內走吧？"
1003203-18 = "老師，怎麼了？咦，來這裡的理由嗎？"
1003203-19 = "那當然是和我在MomoTalk上說的一樣，來許願的呀！這裡因為繪馬很可愛，所以特別有名唷！"
1003203-20 = "難得的新年，我想要沉浸在新年的氛圍裡♪"
1003203-24 = "好了好了，現在不是發呆的時候。快走吧，老師！"
1003203-30 = "（我被無月拉著，往裡面走去）"
1003203-34 = "……"
1003203-38 = "嗯～～～……"
1003203-39 = "啊──討厭──，呼吸困難～～！"
1003203-40 = "乾脆在這裡使用炸彈，應該就暢快多了吧……？"
1003203-41 = "[s] 「還是別吧！？」"
1003203-42 = "哈啊，開玩笑而已唷──老師真是的。"
1003203-43 = "就算是我，也是會挑時間和地點的！"
1003203-47 = "……時間和地點，感覺現在正合適呢。"
1003203-48 = "[s] 「再一下，再一下就到了！」"
1003203-49 = "（就這樣設法安撫無月……）"
1003203-50 = "啊啦，不好意思。"
1003203-51 = "啊──"
1003203-52 = "[s] 「無月！」"
1003203-60 = "老，老師……"
1003203-61 = "[s] 「你還好嗎？有沒有受傷？」"
1003203-62 = "我，我沒事，只是……"
1003203-63 = "繼續這麼熱情地握著我的手的話……"
1003203-64 = "……咯呵呵♪難道說老師一直在瞄準機會握手，想和我拉近距離嗎～？"
1003203-69 = "啊哈哈，不用那麼慌張的離開也沒關係唷～"
1003203-70 = "嗯。不過也多虧了老師，煩躁的感覺也消失了呢？"
1003203-71 = "嘛，如果能送一顆炸彈給剛剛推倒我的人，可能會更加爽快。"
1003203-72 = "[s] 「還是算了吧……」"
1003203-73 = "咯呵呵♪"
1003203-74 = "啊，下一個輪到我們囉，老師！"
1003203-79 = "在這個繪馬上寫下願望，然後掛上去就可以了。"
1003203-80 = "那麼，來寫吧？"
1003203-81 = "[s1] （希望今年一整年都能平平安安……）\n[s2] （希望今年能發生很多快樂的事……）"
1003203-82 = "老師，寫好了嗎？"
1003203-83 = "咯呵呵……！"
1003203-87 = "寫了什麼，我看看！"
1003203-88 = "[s3] 「喂，無月！？」"
1003203-89 = "啊哈，這才是我今天最大的目的！想知道老師許了什麼願望──！"
1003203-90 = "咯呵呵，你是逃不出我的手掌心的～♪"
1003203-91 = "呀，哈，看我的！啊哈哈！"
1003203-96 = "拿到老師的繪馬了～♪ 到底許了什麼願望呢～？"
1003203-100 = "嗯──……？「希望今年一整年都能平平安安」？"
1003203-101 = "耶──，好無聊～……"
1003203-102 = "啊──啊，還以為老師會寫出更加通俗、腹黑～"
1003203-103 = "更充滿私慾的願望呢～我是這麼期待著的。真是遺憾。"
1003203-104 = "[s4] 「寫那種內容反而更讓人失望吧……？」"
1003203-105 = "嗯──，誰知道呢～？"
1003203-106 = "老師，寫好了嗎？"
1003203-107 = "咯呵呵……！"
1003203-111 = "寫了什麼，我看看！"
1003203-112 = "[s5] 「喂，無月！？」"
1003203-113 = "啊哈，這才是我今天最大的目的！想知道老師許了什麼願望──！"
1003203-114 = "咯呵呵，你是逃不出我的手掌心的～♪"
1003203-115 = "呀，哈，看我的！啊哈哈！"
1003203-120 = "拿到老師的繪馬了～♪ 到底許了什麼願望呢～？"
1003203-124 = "嗯──……？「希望今年也能被快樂的事填滿」……？"
1003203-125 = "哼～嗯？這就是老師的願望啊──……"
1003203-126 = "「快樂的事」啊──……老師想的，具體來說是指什麼呢～？"
1003203-127 = "例如……是跟像我這樣可愛的孩子，做像是～……"
1003203-128 = "「呀──」跟「哇──」之類的事嗎？是這種嗎？"
1003203-129 = "[s6] 「……什麼？」"
1003203-130 = "如果是這種事的話～，我現在就幫你實現吧？"
1003203-131 = "……開玩笑的──☆"
1003203-132 = "啊哈哈哈哈！老師剛才該不會在小鹿亂撞吧？咯呵呵♪"
1003203-133 = "[s] 「那個，那無月的願望是什麼呢？」"
1003203-134 = "嗯──，我嗎？"
1003203-135 = "我的也沒什麼特別想許的──。所以你看，繪馬上什麼都沒寫吧？"
1003203-136 = "咯呵呵♪ 今天來這裡，只是想知道老師會許下什麼願望～帶著這種心情來玩的。"
1003203-137 = "[s] 「那麼，就由我來幫無月寫下願望吧。」"
1003203-138 = "……咦？"
1003203-139 = "咦──……？我的願望什麼的，怎樣都行吧？"
1003203-140 = "或者說，我從一開始就沒有要許願──"
1003203-144 = "[ns] 「那交給我寫也可以吧？」"
1003203-145 = "耶，等等，老師……？你寫了什麼……？"
1003203-152 = "[ns7] 「這樣如何？」\n[ns8] 「希望能和珍惜的人們一直在一起。」"
1003203-153 = "啊……"
1003203-154 = "啊……"
1003203-155 = "老師居然那麼認真看待，我的……"
1003203-156 = "……"
1003203-157 = "[s] 「……無月？」"
1003203-161 = "咯，咯呵呵，啊哈哈哈哈！"
1003203-162 = "什，什麼啦！竟然能這麼認真地看待這麼害羞的事……！啊哈哈哈！"
1003203-163 = "哇啊──，無月醬也被嚇了一跳呢……咯呵呵呵，不愧是老師！真是太有趣了！"
1003203-164 = "[s] 「這，這是會讓人害羞的內容嗎……？」"
1003203-165 = "啊哈哈哈！肚子好痛！嘻──！"
1003203-166 = "果然，老師有時候真的是很了不得呢──！"
1003203-167 = "啊──，總覺得這次被打敗了……"
1003203-168 = "啊──，真有趣。"
1003203-169 = "雖然這次是我輸了，不過下次可不會就會樣被打敗的！"
1003203-170 = "下次肯定會讓老師驚慌失措，由我取得勝利的！"
1003203-171 = "那麼，老師，Bye-Bye──！"
1003203-176 = "[ns9] 「搞不懂輸贏的基準是什麼……」\n[ns10] 「咦……？」"
1003203-180 = "（就這樣，我目送踏著愉快的步伐回家的無月，直到她消失在我的視線範圍）"

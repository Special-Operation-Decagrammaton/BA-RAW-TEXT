[translation]
1003203-1 = "Activities for New Year's!"
1003203-3 = "(The New Year's event where I promised to meet Mutsuki was crowded and bustling.)"
1003203-8 = "Oh, Sensei! Here, over here!"
1003203-9 = "You made it on time! I thought you'd be late because of work!"
1003203-10 = "*sniffle* I was worried!"
1003203-11 = "[s] \"I made you a promise. I can't be late for that.\""
1003203-12 = "Heehee."
1003203-13 = "You mean that?"
1003203-14 = "By the way, it's New Year's, so it's super crowded!"
1003203-15 = "*yawn* I might be tired of it already."
1003203-16 = "[s] \"But I just got here!\""
1003203-17 = "I'm kidding, Sensei! Let's go inside."
1003203-18 = "Oh, why did we come here?"
1003203-19 = "Like I said on MomoTalk, we came to make a wish. This event in particular is famous for its cute ema."
1003203-20 = "I thought, why not try some fun New Year's activities?"
1003203-24 = "Come on, don't just stand there. Let's go, Sensei!"
1003203-30 = "(After that, Mutsuki led me into the venue.)"
1003203-34 = "Hmm..."
1003203-38 = "Ugh!"
1003203-39 = "Ughhh! I'm SUFFOCATING!"
1003203-40 = "I need a bomb! I'm gonna make this place go KABOOM."
1003203-41 = "[s] \"Let's not do that, Mutsuki!\""
1003203-42 = "Haha! Sensei! I'm obviously joking!"
1003203-43 = "Even I know there's a time and place for blowing things up!"
1003203-47 = "But...maybe the time and place is right here, right now?"
1003203-48 = "[s] \"W-We're almost there, I promise!\""
1003203-49 = "(As I was trying my best to soothe Mutsuki...)"
1003203-50 = "Excuse me!"
1003203-51 = "Ah!"
1003203-52 = "[s] \"Mutsuki, watch out!\""
1003203-60 = "Sensei!"
1003203-61 = "[s] \"Are you okay? That fall didn't hurt, did it?\""
1003203-62 = "I-I'm okay, but, um..."
1003203-63 = "You know, you're still holding my hand."
1003203-64 = "Heehee. Sensei! Are you using this as an excuse to get close to me?"
1003203-69 = "Ahahaha! You don't have to be so flustered! "
1003203-70 = "Still, thanks to you, I'm a little less irritated."
1003203-71 = "Hm, but I'd feel even better if I found the person who pushed me and give them a little explosive gift."
1003203-72 = "[s] \"P-Please don't do that.\""
1003203-73 = "Heeheehee!"
1003203-74 = "Ah! We're up next, Sensei!"
1003203-79 = "We can write our wishes on the ema and hang them up over there."
1003203-80 = "So, shall we write down our wishes?"
1003203-81 = "[s1] (I wish...very much for this year to be a peaceful one.)\n[s2] (I wish for this year to be full of fun events.)"
1003203-82 = "Sensei, are you done writing your wish?"
1003203-83 = "Heehee."
1003203-87 = "Show me what you wrote! Right now!"
1003203-88 = "[s3] \"S-Stop, Mutsuki!\""
1003203-89 = "My whole reason for asking you here was to find out your wish, Sensei!"
1003203-90 = "You can't get away from me!"
1003203-91 = "Yah! Hiyah! Ahaha!"
1003203-96 = "Let's see, let's see. What did Sensei wish for?"
1003203-100 = "Huh? You wished for peace?"
1003203-101 = "Hmph! You might as well have wished for a boring year!"
1003203-102 = "Oh man, I was expecting something more sinister,"
1003203-103 = "or at least expressing your desires, Sensei. How disappointing."
1003203-104 = "[s4] \"Wouldn't something like that have been more disappointing?\""
1003203-105 = "You really think so?"
1003203-106 = "Sensei, are you done writing your wish?"
1003203-107 = "Heehee."
1003203-111 = "Show me what you wrote! Right now!"
1003203-112 = "[s5] \"S-Stop, Mutsuki!\""
1003203-113 = "My whole reason for asking you here was to find out your wish, Sensei!"
1003203-114 = "You can't get away from me!"
1003203-115 = "Yah! Hiyah! Ahaha!"
1003203-120 = "Let's see, let's see. What did Sensei wish for?"
1003203-124 = "Huh? You wish for this year to be full of fun events?"
1003203-125 = "Wow, Sensei, what a wish!"
1003203-126 = "Fun events, you say? I wonder what kind of events you're talking about!"
1003203-127 = "Hmm, maybe doing this and that with someone cute like me!"
1003203-128 = "Are you expecting to do a lot of stuff that makes you go, \"Wow! Whoo-hoo!\"?"
1003203-129 = "[s6] What are you saying?\""
1003203-130 = "If that's your wish, I can make it come true!"
1003203-131 = "Whaaat? I'm just kidding. ☆"
1003203-132 = "Wait, did you get your hopes up? Did you, Sensei? Ahahaha! Sorry, but that's not gonna happen!"
1003203-133 = "[s] \"Then what's your wish, Mutsuki?\""
1003203-134 = "Huh? My wish?"
1003203-135 = "Hmm, I don't have one! Look, I didn't write anything on my ema."
1003203-136 = "Heehee. I only came here to find out your wish, Sensei!"
1003203-137 = "[s] \"Then I'll write your wish for you, Mutsuki.\""
1003203-138 = "Huh?"
1003203-139 = "No, you don't have to. It doesn't really matter."
1003203-140 = "Hahaha, I can't even think of something I want."
1003203-144 = "[s] \"Okay, then I'll write it here.\""
1003203-145 = "Huh? Um, Sensei? I don't know how to respond when you're so serious."
1003203-152 = "[ns7] \"How about a wish like this?\"\n[ns8] \"I wish to stay with the people I love for a long time!\""
1003203-153 = "Oh... Sensei."
1003203-154 = "Oh... Sensei."
1003203-155 = "Speaking to me with such a serious expression..."
1003203-156 = "That's... That's..."
1003203-157 = "[s] \"...That's?\""
1003203-161 = "Keeheehee, ahahaha!"
1003203-162 = "That's so embarrassing! Sorry, I can't help but laugh! Ahahaha!"
1003203-163 = "Wow, Sensei, how can you say that with such a straight face? Keeheehee! It's hilarious!"
1003203-164 = "[s] \"Was it really that embarrassing?\""
1003203-165 = "Ahahaha! It was! M-My stomach hurts! Hahaha!"
1003203-166 = "Man! Sensei, you really are the master of cheesiness!"
1003203-167 = "You got me this time!"
1003203-168 = "Wow! That was fun!"
1003203-169 = "Sensei, I may have been defeated by your counterattack this time, but you better watch out next time!"
1003203-170 = "Next time, I'll make you feel flustered and claim my victory!"
1003203-171 = "See you next time, Sensei!"
1003203-176 = "[ns9] \"I don't understand her criteria for winning or losing.\"\n[ns10] \"But...was it really such a weird thing to say?\""
1003203-180 = "(I silently bid farewell as Mutsuki happily shrank into the distance and disappeared.)"

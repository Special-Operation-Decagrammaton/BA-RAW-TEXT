1003203-127 = "อืม~ หรือหมายถึงการทำโน่นทำนี่กับเด็กน่ารักๆ อย่างเค้า~"
1003203-128 = "ทำโน่นนี่กัน... เยอะๆ ใช่มั้ยน้า~ ฮิฮิ! คุณครูขอพรเรื่องนั้นใช่มะ?"
1003203-129 = "[s6] \"หา...?\""
1003203-130 = "อื้อ~ ถ้าขอพรเรื่องนั้นล่ะก็ เค้าช่วยให้สมหวังเอามั้ย~?"
1003203-131 = "ก็นะ... เค้าล้อเล่นหรอกน่า☆"
1003203-132 = "ฮะฮะฮ่าฮ่า! หรือว่าอยากให้ทำจริงๆ ล่ะ? หืม~? คุณครูคาดหวังอยู่ใช่ม้า~?#nแต่ก็นะ... น่าเสียดายจัง~!"

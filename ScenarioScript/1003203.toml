1003203-134 = "หืม...? คำอธิษฐานของเค้าเหรอ?"
1003203-135 = "อืม~ เค้าไม่ได้ขออะไรหรอก~ ดูสิ บนแผ่นป้ายก็ไม่ได้เขียนอะไรเลย"
1003203-136 = "ฮิฮิฮิ ที่เค้ามาที่นี่วันนี้ ก็แค่สงสัยว่าคุณครูจะขอพรอะไร แล้วก็กะมาเล่นสนุกๆ ฆ่าเวลาที่นี่เท่านั้นน่ะ~"

1003203-102 = "อ่า~ ถ้าเป็นคุณครูล่ะก็น่าจะขอพรเกี่ยวกับเรื่องที่มันดูสนุกแล้วก็ดูมีเล่ห์เหลี่ยม~"
1003203-103 = "คิดว่าจะเขียนอะไรที่ซื่อสัตย์กับตัวเองกว่านี้ซะอีก~~ แต่ถ้าแบบนี้~ เค้าผิดหวังนะ คุณครู"

[translation]
1003203-1 = "เรื่องที่ทำให้สมกับเป็นวันปีใหม่!"
1003203-3 = "(สถานที่จัดงานฉลองปีใหม่ที่นัดเจอกับมุสึกิ มีผู้คนอยู่แน่นขนัด)"
1003203-8 = "อ๊ะ คุณครู! ทางนี้ ทางนี้~"
1003203-9 = "มาตรงเวลาเป๊ะเลย~ กำลังคิดอยู่เลยว่าคุณครูจะมาสายเพราะอยู่ทำงานจนดึกรึเปล่า~"
1003203-10 = "กำลังสงสัยอยู่เลย~"
1003203-11 = "[s] \"ก็สัญญากับมุสึกิไว้แล้วนี่นา จะมาสายได้ยังไงล่ะ\""
1003203-12 = "อ่ะฮะฮะ!"
1003203-13 = "งั้นเหรอ~? หืมมม~"
1003203-14 = "คงเพราะวันนี้เป็นวันปีใหม่ คนเลยเยอะแบบนี้~"
1003203-15 = "ฮ้าววว~ แค่เห็นคนเยอะก็เหนื่อยซะแล้ว~"
1003203-16 = "[s] \"มาถึงก็เหนื่อยเลยเรอะ?!\""
1003203-17 = "ฮิฮิฮิ ล้อเล่นน่า~ ถ้างั้นเข้าไปข้างในกันเลยมั้ย?"
1003203-18 = "หืม? อ๊า~ ทำไมถึงมาที่นี่น่ะเหรอ?"
1003203-19 = "ก็บอกไปใน MOMOTALK แล้วไงว่าจะมาขอพรน่ะ ที่นี่เหมือนจะขึ้นชื่อเรื่องแผ่นป้ายเอมะน่ารักๆ#nด้วยนะ~"
1003203-20 = "ไหนๆ ก็เป็นวันปีใหม่ทั้งที มาสนุกกับงานเทศกาลให้สมกับเป็นวันปีใหม่หน่อยดีมั้ย!~?"
1003203-24 = "เอาล่ะ อย่ามัวยืดยาดอยู่เลย รีบไปกันเถอะ คุณครู!"
1003203-30 = "(จากนั้นคุณครูก็ถูกมุสึกิลากไปยังสถานที่จัดงานเทศกาล)"
1003203-34 = "อืม..."
1003203-38 = "อืมมม~~"
1003203-39 = "อื้อออ~! อึด~อัด~จัง~!"
1003203-40 = "อ่า... ถ้าเค้าโยนระเบิดทั้งหมดที่มีไปจะหายอึดอัดขึ้นบ้างมั้ยนะ?"
1003203-41 = "[s] \"อดทนไว้นะ! มุสึกิ!\""
1003203-42 = "เฮ้อ~ คุณครูนี่จริงๆ เลย เรื่องแบบนี้เค้าต้องพูดล้อเล่นอยู่แล้ว~"
1003203-43 = "เค้าก็เลือกเวลาเลือกสถานที่เหมือนกันนะ~"
1003203-47 = "เดี๋ยวสิ... แต่บางที... มันอาจจำเป็นสำหรับสถานการณ์แบบนี้ก็ได้นะ?"
1003203-48 = "[s] \"ดะ...เดินไปอีกหน่อยก็ถึงแล้วนะ!\""
1003203-49 = "(คุณครูพยายามใช้วิธีร้อยแปดเพื่อให้มุสึกิใจเย็นลง)"
1003203-50 = "ขอโทษนะคะ~"
1003203-51 = "อ๊ะ..."
1003203-52 = "[s] \"มุสึกิ อันตราย!\""
1003203-60 = "อ๊ะ คุณครู"
1003203-61 = "[s] \"เป็นอะไรรึเปล่า? บาดเจ็บตอนล้มลงไปรึเปล่า?\""
1003203-62 = "เค้า...เค้าไม่เป็นไร คือว่า... อืม..."
1003203-63 = "ถ้าจับมือกันไว้แบบนี้..."
1003203-64 = "คิคิ คือว่าคุณครู... ใช้เรื่องเมื่อกี้เป็นข้ออ้างเพื่อจะสนิทสนมใกล้ชิดกับเค้าเหรอ?"
1003203-69 = "ฮะฮ่าฮ่า~ ไม่เห็นต้องตกใจขนาดนั้นเลย~"
1003203-70 = "อื้อ แต่ว่า... เพราะคุณครูปกป้องเค้าไว้ เค้าเลยหายหงุดหงิดแล้วล่ะ"
1003203-71 = "แต่ว่านะ... ถ้าเค้าได้โยนระเบิดใส่คนที่เดินชนเค้าเมื่อกี้ น่าจะอารมณ์ดีขึ้นกว่านี้อีกนะ"
1003203-72 = "[s] \"อะ...อดทนไว้ก่อนนะ\""
1003203-73 = "คิกๆ..."
1003203-74 = "อ๊ะ ต่อไปถึงคิวพวกเราแล้วล่ะ คุณครู!"
1003203-79 = "เขียนคำอธิษฐานไว้บนแผ่นป้ายเอมะ แล้วเอาไปแขวนก็พอ"
1003203-80 = "ถ้างั้น... เราเขียนคำอธิษฐานคนละอันดีมั้ย?"

1003203-89 = "เหตุผลที่เค้าชวนคุณครูออกมาวันนี้! ก็เพื่อดูว่าคุณครูขอพรอะไรนะ~"
1003203-90 = "จะให้หลุดเงื้อมมือไปไม่ได้หรอก~!"

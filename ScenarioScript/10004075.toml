[translation]
10004075-1 = "ตอนที่ 7;ความรับผิดชอบของผู้ฝึกสอน"
10004075-2 = "อึ่ก... นี่มันเรื่องวุ่นวายอะไรกัน..."
10004075-3 = "ฉันไม่คิดเลยว่าจะมีเด็กนักเรียนโรงเรียนตำรวจวัลคิรี่โผล่มาแบบนี้..."
10004075-4 = "ยัยเปี๊ยกจอมปัญหา กล้าดียังไงถึงมาใส่ความพวกเราแบบนี้น่ะ?! เพราะยัยเปี๊ยกนั่นฉันกับคุณครูก็เลย#nถูกเข้าใจผิดและเกิดเรื่องลุกลามไปใหญ่โตเลยนะ!"
10004075-5 = "[s] \"แต่เรื่องที่เราใช้กำลังบังคับชุนเป็นเรื่องจริงนี่นา...\""
10004075-6 = "ปล่อยไว้ไม่ได้แล้ว ขืนเป็นแบบนี้ล่ะก็ชุนคงจะกลายเป็นเด็กจอมป่วนที่เอาแต่สร้างปัญหาก็ได้"
10004075-7 = "แบบนี้คงจะต้องเตรียมระเบิดผสมยาที่ทำให้เคลื่อนไหวไม่ได้ที่รุนแรงกว่าเดิม..."
10004075-8 = "[s1] \"เลิกใช้ระเบิดอันนั้นเถอะ...\"\n[s2] \"ครูจะไปคุยกับชุนให้เอง\""
10004075-9 = "คิดจะพูดโน้มน้าวเธอเหรอ? แต่ดูแล้วตอนนี้พูดอะไรไปลิตเติ้ลชุนก็คงไม่น่าจะฟังหรอกนะ"
10004075-10 = "คิดจะพูดโน้มน้าวเธอเหรอ? แต่ดูแล้วตอนนี้พูดอะไรไปลิตเติ้ลชุนก็คงไม่น่าจะฟังหรอกนะ"
10004075-11 = "อีกอย่าง ถ้าคุณครูไปคนเดียวล่ะก็อาจจะโดนชุนแกล้งอีกก็ได้..."
10004075-12 = "แล้วอีกอย่าง... วันนี้คุณครูสัญญาว่าจะไปข้างนอกกับฉันไม่ใช่รึไง?"
10004075-13 = "[s3] \"วันนี้ช่วยเข้าใจหน่อยเถอะนะ ซายะ\"\n[s4] \"เอาไว้ครูจะชดเชยให้ซายะคราวหน้านะ\""
10004075-21 = "ช่วยไม่ได้นะ... คงจะมีแค่ฉันสินะที่อยากจะไปเที่ยวกับคุณครูน่ะ"
10004075-22 = "เอาเป็นว่าคราวหน้าที่ไปด้วยกัน คุณครูจะต้องเลี้ยงเส้นเตาเซียวเมี่ยนฉันให้หนำใจเลยนะ!"
10004075-23 = "[s] \"อื้อ ครูสัญญา\""
10004075-24 = "ฮุฮุฮุ ถ้างั้นการทดลองของวันนี้ก็พอแค่นี้ก่อนก็แล้วกัน"
10004075-25 = "ฝากเรื่องผู้ฝึกสอนชุนจอมยุ่งของเราด้วยล่ะ..."
10004075-29 = "[ns] ออกไปตามหาชุนที่หนีไป"
10004075-34 = "ฉันเกลียดทุกคนเลย..."
10004075-35 = "เกลียดเด็กๆ ที่สวนต้นบ๊วยที่ไม่เชื่อฟัง เกลียดโคโคน่าจังที่เอาเรื่องของฉันไปบอกคนอื่น...#nแล้วก็เกลียดคุณครูที่คิดจะบังคับให้ฉันกินยาด้วยค่ะ!"
10004075-36 = "ทำไมทุกคนถึงใจร้ายกับฉันแบบนี้นะ!"
10004075-37 = "[s] \"ครูไม่ได้คิดจะใจร้ายกับชุนเลยนะ\""
10004075-39 = "คะ... คุณครู?!"
10004075-40 = "โผล่มาจากไหนอีกกันน่ะคะ?"
10004075-42 = "ถึงคุณครูจะพูดอะไร ฉันก็ไม่เชื่อแล้วค่ะ คุณครูมาที่นี่เพื่อบังคับให้ฉันกินยาแก้ผลข้างเคียงใช่มั้ยคะ?"
10004075-43 = "ไม่ว่าคุณครูจะพูดอะไร ฉันก็จะไม่ฟังอีกแล้วค่ะ ฉันไม่อยากกลับไปเป็นแบบเดิมค่ะ!"
10004075-44 = "[s] \"ทำไมถึงไม่อยากกลับไปเป็นแบบเดิมล่ะ?\""
10004075-45 = "ก็แน่นอนอยู่แล้วนี่คะ! ร่างกายที่อายุมากขึ้นน่ะ มันมีแต่ปัญหาทั้งนั้นเลยยังไงล่ะคะ!"
10004075-46 = "ผิวก็หยาบขึ้น แค่ออกวิ่งนิดหน่อยก็หายใจไม่ทันแล้ว และแถมเวลาขยับตัวก็จะรู้สึกเกร็งไหล่จนปวด..."
10004075-47 = "ทุกคนบังคับให้ฉันต้องเป็นคนรับผิดชอบ..."
10004075-48 = "สำหรับผู้ฝึกสอนของสวนต้นบ๊วยจะได้รับสิทธิพิเศษมากมายที่แม้แต่เจ้าหน้าที่ของมังกรดำยังไม่ได้#nก็จริง... แต่มันก็มาพร้อมกับภาระความรับผิดชอบที่ยิ่งใหญ่ด้วยเหมือนกันนะคะ"
10004075-49 = "ตั้งแต่ตื่นนอนจนถึงเข้านอน ฉันก็จะละสายตาไปจากพวกเด็กๆ ไม่ได้ และเวลาที่เกิดอุบัติเหตุขึ้นมา#nฉันก็ไปเข้าเรียนไม่ได้เพราะต้องคอยจัดการเก็บกวาดปัญหาที่ตามมา"
10004075-50 = "ฉันเหนื่อยกับความรับผิดชอบพวกนี้แล้วค่ะ การดูแลเด็กๆ ไม่ใช่เรื่องที่สนุกเลยค่ะ"
10004075-51 = "[s] \"เธอคิดแบบนั้นจริงๆ เหรอ?\""
10004075-52 = "ใช่แล้วค่ะ คุณครูคงไม่เข้าใจหรอกค่ะว่าการได้ใช้เวลาสบายๆ แบบเด็กๆ ในวันนี้น่ะ ฉันมีความสุขแค่ไหน"
10004075-53 = "คุณครูเองเป็นผู้ใหญ่ก็น่าจะเข้าใจนะคะ ว่าการดูแลเด็กๆ น่ะเป็นงานที่เหนื่อยมาก"
10004075-54 = "วันนี้คุณครูเองก็คงจะรู้สึกเหนื่อยที่ต้องมาคอยดูแลฉันทั้งวันใช่มั้ยล่ะคะ การต้องรับผิดชอบอะไร#nเป็นเรื่องที่ลำบากมากนะคะ"
10004075-55 = "[s] \"ครูดีใจมากนะที่ชุนมาหาครูวันนี้น่ะ\""
10004075-56 = "คะ? ไม่ได้รำคาญ... แต่ดีใจงั้นเหรอคะ?"
10004075-57 = "เลิกพูดโกหกฉันเถอะค่ะ คงไม่มีใครอยากเจอเรื่องวุ่นวายหรอกค่ะ"
10004075-58 = "วันนี้คุณครูรักษาสัญญาที่ให้ไว้กับคุณซายะไม่ได้ แถมยังต้องมาเสียเงินเลี้ยงขนมฉันตั้งเยอะ...#nแถมยังถูกตำรวจเข้าใจผิดและเกือบเดือดร้อนครั้งใหญ่..."
10004075-59 = "แล้วทำไมถึงยังบอกว่าดีใจได้อีกล่ะคะ?"
10004075-60 = "[s] \"ก็เพราะครูได้เห็นรอยยิ้มของชุนยังไงล่ะ\""
10004075-61 = "รอยยิ้ม..."
10004075-62 = "รอยยิ้มของฉันมันเกี่ยวอะไรด้วยคะ? รอยยิ้มมันไม่ได้ช่วยแก้ปัญหาได้สักหน่อยนะคะ"
10004075-63 = "รอยยิ้มของพวกเด็กๆ น่ะไม่ได้ช่วยอะไรในการทำงานเลยสักนิดเดียวค่ะ"
10004075-64 = "ไม่เลยสักนิด..."
10004075-65 = "[s5] \"ที่จริงชุนเองก็รู้ดีอยู่แล้วใช่มั้ยล่ะ?\"\n[s6] \"รอยยิ้มบริสุทธิ์ไร้เดียงสาของเด็กๆ เป็นสิ่งล้ำค่าที่ไม่มีอะไรเทียบได้หรอกนะ\""
10004075-66 = "..."
10004075-67 = "..."
10004075-68 = "ถึงจะเป็นเพราะผลข้างเคียงของยา แต่ฉันก็ใช้ประโยชน์จากมันเพราะรำคาญพวกเด็กๆ "
10004075-69 = "ฉันทิ้งพวกเด็กๆ ที่น่ารักเหมือนนางฟ้าและเชื่อมั่นในตัวฉันเอาไว้ และหนีภาระหน้าที่ของผู้ฝึกสอนมา"
10004075-70 = "ฉันรู้ดี... ว่าฉันไม่มีคุณสมบัติพอ..."
10004075-71 = "แต่ฉันจะมีโอกาสที่จะได้กลับไปดูแลเด็กๆ อีกรึเปล่าคะ?"
10004075-72 = "[s] \"เด็กๆ ที่สวนต้นบ๊วยต้องการชุนนะ\""
10004075-73 = "ทำไมคุณครูถึงมั่นใจแบบนั้นล่ะคะ?"
10004075-74 = "[s] \"ดูนั่นสิ\""
10004075-75 = "คะ...?"
10004075-80 = "โคโคน่าจัง~ พี่ชุนหายไปไหนเหรอ~"
10004075-81 = "หนูไม่อยากกินข้าวเย็นที่โคโคน่าจังทำ! รสชาติมันแปลกมากๆ เลย!"
10004075-82 = "ก็บอกแล้วไงว่าอย่าเรียกว่าโคโคน่าจัง บอกว่าให้เรียกว่าผู้ฝึกสอนโคโคน่าไง!"
10004075-83 = "เรื่องข้าวเย็น... ก็มันช่วยไม่ได้นี่นา! ฉันไม่ได้ทำอาหารเก่งเท่าพี่ชุนนี่..."
10004075-84 = "ถึงวันนี้ข้าวจะไม่ค่อยอร่อย แต่ช่วยยอมๆ กินหน่อยไม่ได้รึไง?"
10004075-85 = "ไม่เอาาาา! หนูอยากกินข้าวที่พี่ชุนทำให้!"
10004075-86 = "รีบพาพี่ชุนกลับมาเลยนะ แงงงงง~"
10004075-87 = "ดะ...เดี๋ยวก่อน อย่าร้องไห้สิ! มางอแงแบบนี้ก็ไม่มีประโยชน์หรอกนะ!"
10004075-88 = "จริงๆ เลยเชียว คนที่อยากร้องไห้น่ะคือฉันต่างหาก..."
10004075-89 = "เมื่อไหร่พี่ชุนจะกลับมา... ฮึ่ก ฮือ..."
10004075-95 = "เฮ้อ..."
10004075-96 = "คงปล่อยพวกเด็กๆ ไว้ไม่ได้จริงๆ นั่นแหละค่ะ"
10004075-97 = "คุณครูคะ ฉันขอยาแก้ผลข้างเคียงได้มั้ยคะ?"
10004075-103 = "[ns] ยื่นยาแก้ผลข้างเคียงให้กับชุน"
10004075-104 = "ขอบคุณค่ะ"
10004075-105 = "วันนี้ฉันทำให้คุณครูลำบากหลายๆ เรื่องเลยค่ะ..."
10004075-115 = "แงงงง... รอให้พี่ชุนกลับมาก่อนเถอะ ฉันไม่ปล่อยเอาไว้แน่!"
10004075-120 = "โอ๊ะ? โคโคน่าจังวางแผนคิดจะทำอะไรงั้นเหรอคะ?"
10004075-121 = "พะ...พี่ชุน? โผล่มาจากไหนกันเนี่ย?"
10004075-122 = "ค่า~ ค่า~ พี่ชุนเองค่ะ~ ♥"
10004075-123 = "ถึงจะเจอเรื่องวุ่นวายแค่ไหน แต่ในฐานะผู้ฝึกสอนของสวนต้นบ๊วยแล้วจะร้องไห้ต่อหน้าเด็กๆ#nได้ยังไงล่ะคะ โคโคน่าจังเองก็ยังต้องฝึกฝนอีกเยอะนะคะ"
10004075-124 = "มะ...ไม่ได้ร้องสักหน่อย!"
10004075-125 = "ว่าแต่พี่หายไปไหนมาน่ะ! เพราะพี่หายตัวไป ฉันเลยต้องไปเตรียมของว่างแล้วก็ข้าวเย็นให้พวกเด็กๆ#nเลยนะ!"
10004075-126 = "การเตรียมของว่างน่ะ มันเป็นงานของโคโคน่าจังตั้งแต่แรกแล้วนี่คะ..."
10004075-127 = "แต่ว่าที่หายตัวไปแบบนั้น... ขอโทษจริงๆ นะคะ"
10004075-128 = "เอาไว้คราวหน้าจะซื้อไอศกรีมรสคาราเมลของ <บาเกน-ดาซส์> ที่โคโคน่าจังชอบให้ก็แล้วกันนะคะ!"
10004075-129 = "ชิส์... ไอศกรีมแค่ถ้วยเดียวมันไม่พอหรอก..."
10004075-130 = "แต่พี่เป็นพี่ของฉันนี่นา... เพราะงั้นคราวนี้จะยกโทษให้ก็ได้"
10004075-131 = "พี่ชุนหายไปไหนมาน่ะ!"
10004075-132 = "ข้าวเย็นฝีมือโคโคน่าจังไม่อร่อยเลย~ พี่ชุนทำให้ใหม่หน่อยสิ~"
10004075-133 = "เดี๋ยวเถอะ! นั่นเป็นข้าวเย็นที่โคโคน่าจังพยายามทำสุดฝีมือเลยนะคะ พูดแบบนี้ไม่ได้นะคะ!"
10004075-134 = "แต่เพื่อเป็นการขอโทษที่วันนี้ฉันมาช้า เดี๋ยวจะทำแพนเค้กเป็นของว่างหลังทานมื้อเย็นให้แล้วกันนะคะ!"
10004075-135 = "ว้าว! พี่ชุนเจ๋งที่สุดเลย!"
10004075-136 = "เอาล่ะค่ะทุกคน ถ้างั้นก็กลับไปกินข้าวเย็นกันเถอะนะคะ"
10004075-137 = "ค่า~!"
10004075-145 = "จริงสิ ฉันยังไม่ได้บอกลาคุณครูเลย..."
10004075-146 = "วันนี้ขอบคุณมากนะคะ"
10004075-147 = "[s] \"กลับดีๆ นะ ชุนหลิง\""
10004075-151 = "ค่ะ... คุณครู"
10004075-153 = "(หลังจากนั้นคุณครูที่นั่งอยู่ตรงม้านั่งในสวนสาธารณะก็มองตามหลังไปจนกระทั่งชุนเดินลับตาไป)"

[translation]
10004075-1 = "Episode 7;Instructor's Responsibility"
10004075-2 = "Ugh. What a disaster that was..."
10004075-3 = "I wasn't expecting to see a student from Valkyrie Police School there."
10004075-4 = "How could she sell us out like that?! She made them think we were doing exactly what it looked like we were doing!"
10004075-5 = "[s] \"Well, when you put it like that...\""
10004075-6 = "I won't let this happen. At this rate, Shun is gonna be an insufferable little brat forever."
10004075-7 = "Clearly, we need a more powerful paralytic..."
10004075-8 = "[s1] \"Enough with the drugs.\"\n[s2] \"I'll talk to Shun.\""
10004075-9 = "You're going try to convince her? I don't think she's going to listen."
10004075-10 = "You're going try to convince her? I don't think she's going to listen."
10004075-11 = "She's just going to get you in even hotter water if you go by yourself."
10004075-12 = "Besides, you promised you'd spend time with me today, remember?"
10004075-13 = "[s3] \"Extenuating circumstances.\"\n[s4] \"I'll make it up to you next time.\""
10004075-21 = "All right. I have a feeling I wasn't the only one who was looking forward to our outing today."
10004075-22 = "But next time, you have to buy me a double order of knife-cut noodles with extra red pepper oil!"
10004075-23 = "[s] \"I promise.\""
10004075-24 = "Hahaha. Fine, let's end today's experiment."
10004075-25 = "And please take care of our untrustworthy Shanhaijing instructor."
10004075-29 = "[ns] Go find the missing Shun."
10004075-34 = "I hate everyone."
10004075-35 = "I hate the Plum Blossom Garden students for never listening to me, I hate Kokona for making me do her work...and I hate Sensei for forcing the antidote on me!"
10004075-36 = "Why is everyone being so mean to me?!"
10004075-37 = "[s] \"I wasn't trying to be mean to you.\""
10004075-39 = "S-Sensei?!"
10004075-40 = "When did you get here?"
10004075-42 = "It doesn't matter. I know you're here to make me take the antidote!"
10004075-43 = "And I don't care! I'm not going back, no matter what you say!"
10004075-44 = "[s] \"Why don't you want to go back to your original form?\""
10004075-45 = "Isn't it obvious? An aging body just gets in the way!"
10004075-46 = "My skin was rough, I was out of breath after running for just a little bit, my shoulders hurt every time I moved..."
10004075-47 = "...and everyone forced me to be responsible."
10004075-48 = "The Plum Blossom Garden's instructors are given such enormous privileges that even the officers of Genryumon can't treat them lightly. But they also have a lot of responsibilities."
10004075-49 = "From sunup to sundown, I can't take my eyes off the kids for a second. Whenever an accident happens, I miss my own studies to handle the mess."
10004075-50 = "I'm tired of all this responsibility. I don't enjoy taking care of the children at all."
10004075-51 = "[s] \"Do you really mean that?\""
10004075-52 = "Of course! You have no idea how comfortable it was to live like a child today."
10004075-53 = "You're an instructor too, Sensei. You should understand how hard it is to take care of kids."
10004075-54 = "I mean...it must have been super annoying to take care of me all day. Being responsible is always tough."
10004075-55 = "[s] \"I was happy that you relied on me today.\""
10004075-56 = "What? You weren't annoyed?"
10004075-57 = "Don't lie to me. No one would want to deal with all that mess!"
10004075-58 = "You couldn't keep your promise to Saya, you had to spend a lot of money...and you wound up in trouble with the police!"
10004075-59 = "How could you be happy about that?"
10004075-60 = "[s] \"Because I got to see you smile.\""
10004075-61 = "Smile..."
10004075-62 = "Oh, who cares about my smile? It's not like a smile can solve anything!"
10004075-63 = "A kid's smile doesn't help me!"
10004075-64 = "Not at all..."
10004075-65 = "[s5] \"You already know the truth, don't you?\"\n[s6] \"A child's smile is an invaluable treasure.\""
10004075-66 = "..."
10004075-67 = "..."
10004075-68 = "It was just a side effect, but I took advantage of it because I was so tired of the kids."
10004075-69 = "I abandoned the little angels who always trusted in me, and ran away from my duties as an instructor."
10004075-70 = "I know that I'm not good enough..."
10004075-71 = "How could I ever accept the responsibility of taking care of children again?"
10004075-72 = "[s] \"The students still need you.\""
10004075-73 = "How can you be so sure?"
10004075-74 = "[s] \"Look over there.\""
10004075-75 = "Huh?"
10004075-80 = "Kokona! Where did Shun go?"
10004075-81 = "I don't wanna eat your food tonight, Kokona! It tastes weird!"
10004075-82 = "Don't just call me Kokona. Call me Instructor Kokona!"
10004075-83 = "What am I supposed to do about dinner? I'm just not as good at cooking as Shun..."
10004075-84 = "I understand it's not that great, but can you just eat it for tonight?"
10004075-85 = "No! I wanna eat Shun's food!"
10004075-86 = "Hurry up and get Shun! Waaah!"
10004075-87 = "W-Wait, don't cry! Throwing a tantrum isn't going to change anything!"
10004075-88 = "Seriously, I'm the one who should be crying..."
10004075-89 = "When is she coming back? Waaah!"
10004075-95 = "*sigh*"
10004075-96 = "Those kids need constant attention."
10004075-97 = "I'm sorry, Sensei. Can I get that antidote now?"
10004075-103 = "[ns] Hand Shun the antidote."
10004075-104 = "Thank you."
10004075-105 = "I really caused you a lot of trouble today."
10004075-115 = "Grrr... Shun, you'll pay for this when you get back. I swear it!"
10004075-120 = "Really? And what are you planning to do to me?"
10004075-121 = "Oh, Shun! Wh-When did you get back?"
10004075-122 = "Does it matter? I'm here now, aren't I? ♥"
10004075-123 = "I understand you were having a hard time, but an instructor of Plum Blossom Garden can't shed tears in front of the students. You have a long way to go, Kokona."
10004075-124 = "I-I wasn't really crying, though!"
10004075-125 = "Anyway, where did you go today? I had to prepare snacks and dinner for the kids because you disappeared!"
10004075-126 = "I think preparing the snacks was your job to begin with..."
10004075-127 = "...but I still apologize for disappearing so suddenly."
10004075-128 = "I'll buy you Baagen-Razs caramel mochi ice cream to make up for it—your favorite!"
10004075-129 = "Ugh. I don't think one ice cream is enough to make up for it."
10004075-130 = "I'll let it go this time since you're my sister."
10004075-131 = "Shun, where have you been?!"
10004075-132 = "Kokona's dinner is terrible! Hurry up and make us a new one!"
10004075-133 = "Hey! You can't say that, even if you don't like Kokona's food. She worked hard on it!"
10004075-134 = "But since I was late today, I'll make some delicious pancakes for dessert!"
10004075-135 = "Wow! Shun, you're the best!"
10004075-136 = "Now, everyone. Let's go eat dinner together, all right?"
10004075-137 = "Yeah!"
10004075-145 = "Come to think of it, I never said a proper goodbye, did I?"
10004075-146 = "Thank you for today."
10004075-147 = "[s] \"Take care, Shunling.\""
10004075-151 = "Yes, Sensei."
10004075-153 = "I sat on a bench in the park for a while and watched Shun and the students leave."

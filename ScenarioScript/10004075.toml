[translation]
10004075-1 = "第7話;身為教官的"
10004075-2 = "唔……真是場災難……"
10004075-3 = "沒想到女武神的學生會在那個時機點出現……"
10004075-4 = "而且旬還一直裝傻！#n害我和老師被誤會是「強逼年幼少女喝下不明物體的二人組」！！"
10004075-5 = "[s] 「雖然的確是事實沒錯……」"
10004075-6 = "再這樣下去不行，否則旬就真的要變成無法控制的天真孩子了……"
10004075-7 = "只能用更強力的麻痺藥了嗎……？"
10004075-8 = "[s1] 「……不，沒關係。」\n[s2] 「我要嘗試直接和旬談談。」"
10004075-9 = "你說要說服他？#n我不認為處在年幼狀態的旬會聽得進去哦……？"
10004075-10 = "你說要說服他？#n我不認為處在年幼狀態的旬會聽得進去哦……？"
10004075-11 = "老師單獨過去的話，恐怕又會再次陷入旬的惡作劇之中……"
10004075-12 = "……而且今天明明和我約好要一起出門的……"
10004075-13 = "[s3] 「關於那個，真的很抱歉……」\n[s4] 「下次再一起出門吧。」"
10004075-21 = "……好吧，這也沒辦法。#n畢竟期待和老師出門的人也不只我一個……"
10004075-22 = "作為這次的補償，下次要請我吃加了很多辣油的大份刀削麵唷！"
10004075-23 = "[s] 「嗯，約好了。」"
10004075-24 = "哼～哼哼……！那麼今天的實驗就到此為止了。#n啊，如果有什麼需要協助的地方，可以隨時連絡我！"
10004075-25 = "……我們山海經的麻煩教官就拜託你了，老師。"
10004075-29 = "[ns] 「……嗯，交給我吧。」"
10004075-34 = "……我討厭大家。"
10004075-35 = "無論是不聽話的梅花園的孩子們，還是把自己的工作強推給我的心菜醬……#n或是想讓我回到原本身體的老師！"
10004075-36 = "為什麼大家都要欺負我呢……！？"
10004075-37 = "[s] 「抱歉，我並不是想要欺負旬……」"
10004075-39 = "老，老師！？"
10004075-40 = "你是什麼時候來的……！？"
10004075-42 = "反正，是想要我吃下那個解藥吧？"
10004075-43 = "就算是老師，我也不會就範的。因為我絕對不要回到原本的樣子！"
10004075-44 = "[s] 「……這是為什麼呢？」"
10004075-45 = "這是當然的吧！誰會想回到那個身體！"
10004075-46 = "皮膚粗糙、稍微跑一下就很喘、肩膀很容易痠痛……"
10004075-47 = "……再加上，大家都要我負擔很大的責任……"
10004075-48 = "……梅花園的教官，被賦予了堪比玄龍門幹部的特權。#n但與此同時，也必須背負相當重大的責任。"
10004075-49 = "工作時，從孩子們醒來到睡著，一刻也不能將視線移開。#n每當發生任何事情都會因為事後處理忙得不可開交……#n連我自己身為山海經學生的課程都無法參加的情況……也經常出現。"
10004075-50 = "……我累了。照顧孩子們只有辛苦可言……"
10004075-51 = "[s] 「……你真的那麼認為嗎？」"
10004075-52 = "今天一整天，我試著像孩子一樣做自己想做的事……感到非常輕鬆。"
10004075-53 = "老師也是大人，應該知道吧？照顧孩子是多麼辛苦的事……"
10004075-54 = "承擔責任是非常辛苦的。我累了，也厭倦了。#n老師今天照顧我一整天也累壞了吧？"
10004075-55 = "[s] 「說不累是騙人的，但我非常開心唷。」"
10004075-56 = "非常開心……？"
10004075-57 = "什，什麼意思！？請別說好話哄我！#n被捲入各種麻煩、四處被人責罵……怎麼也開心不起來吧！？"
10004075-58 = "不只沒能遵守和沙耶同學的約定……#n明明工作很忙還被迫浪費時間和金錢，甚至惹女武神他們生氣……"
10004075-59 = "既然如此，為什麼還說很開心呢……！？"
10004075-60 = "[s] 「因為能看見旬的笑容。」"
10004075-61 = "笑容……"
10004075-62 = "這，這跟笑容有什麼關係！？#n笑容又不能解決問題！"
10004075-63 = "孩子的笑容能有什麼用！？"
10004075-64 = "那些，都是……"
10004075-65 = "[s5] 「……都是什麼，旬也知道吧？」\n[s6] 「孩子們純真的笑容，是什麼都無可取代的。」"
10004075-66 = "……"
10004075-67 = "……"
10004075-68 = "……我感到很麻煩，甚至還說了「討厭」──哪怕那或許是藥物的副作用。"
10004075-69 = "拋下了那些相信著我、一直在我身邊的天使般的孩子們……逃避了教官的責任。"
10004075-70 = "這樣……這樣的我……"
10004075-71 = "還有資格站在孩子們面前嗎……？"
10004075-72 = "[s] 「那些孩子們需要旬唷。」"
10004075-73 = "為什麼這麼認為……？"
10004075-74 = "[s] 「你看那邊。」"
10004075-75 = "……咦？"
10004075-80 = "心菜醬～旬姐姐去哪了～？"
10004075-81 = "我不想吃心菜醬做的飯！味道好怪哦！"
10004075-82 = "所以我說了，不是心菜醬，是「心菜教官」！"
10004075-83 = "至於料理……我也沒辦法嘛！我又不像旬姐姐一樣擅長……！"
10004075-84 = "……今天就忍耐一下，先吃我做的好嗎？"
10004075-85 = "不要～！我想吃旬姐姐做的飯啦～～！"
10004075-86 = "旬姐姐……在哪裡……？嗚哇哇哇哇……！"
10004075-87 = "喂，別哭啊！就算哭了，旬姐姐也不會回來的……！"
10004075-88 = "而且，我才是最想哭的人……"
10004075-89 = "旬姐姐，你到底去哪裡了……唔唔，嗚咿咿咿咿咿……！"
10004075-95 = "唉……"
10004075-96 = "真是群不能放任不管的孩子們呢。"
10004075-97 = "老師，可以麻煩你給我解藥嗎？"
10004075-103 = "[ns] 將解藥交給旬"
10004075-104 = "非常感謝。"
10004075-105 = "……今天真的給老師添了許多麻煩。"
10004075-115 = "真是的，等旬姐姐回來，我要好好抱怨一番……！"
10004075-120 = "哎呀，可以現在就跟我說嗎？"
10004075-121 = "姐，姐姐！？你，你回來了嗎……！？"
10004075-122 = "沒錯沒錯～旬姐姐回來囉♡"
10004075-123 = "就算再辛苦，梅花園的教官也不能在孩子們面前流淚唷。#n看來心菜醬還需要多多努力呢。"
10004075-124 = "我，我才沒有哭呢……！"
10004075-125 = "話又說回來，你今天跑去哪裡了呀！？#n因為旬姐姐不在，害我得幫孩子們準備點心和做晚飯……！"
10004075-126 = "準備點心，本來就是心菜醬負責的吧……"
10004075-127 = "不過，很抱歉突然消失不見……"
10004075-128 = "下次我會幫心菜醬買你最喜歡的「巴根達斯」焦糖口味麻糬。"
10004075-129 = "哼……只用一個冰淇淋就想哄我……"
10004075-130 = "……不過這次我就不追究了。畢竟旬姐姐一直都很努力……"
10004075-131 = "啊，旬姐姐！你跑去哪裡了呀～？"
10004075-132 = "心菜醬做的飯好難吃～！快點做新的～！"
10004075-133 = "孩子們，心菜醬可是很努力才做出來的，不能說那種話唷！"
10004075-134 = "不過今天遲到的我也有錯……所以飯後點心就做好吃的鬆餅給大家吃吧！"
10004075-135 = "好耶！旬姐姐最棒了！"
10004075-136 = "呵呵。那麼，讓我們一起享用心菜醬做的晚飯吧？"
10004075-137 = "好～！！"
10004075-145 = "……話說回來，我還沒有以小旬的身分道謝呢。"
10004075-146 = "……老師，真的非常謝謝你。"
10004075-147 = "[s] 「……嗯。再見囉，小旬。」"
10004075-151 = "……是，再見！"
10004075-153 = "（之後便坐在公園的長椅上目送旬離開，直到從視野中消失為止）"

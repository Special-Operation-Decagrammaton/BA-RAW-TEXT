10004075-39 = "3;꼬마 슌ND;04;서, 선생님?!\n#3;em;[?!]\n#3;shake"
10004075-40 = "3;꼬마 슌ND;08;또 어느 틈에 오신 건가요?\n#3;stiff"
10004075-41 = "3;꼬마 슌ND;19\n#3;em;…\n#wait;2500"
10004075-42 = "3;꼬마 슌ND;05;말하지 않아도 알아요. 어차피 제게 그 해독제를 먹이러 오신 거죠?"
10004075-43 = "3;꼬마 슌ND;17;선생님이 무어라 말해도 듣지 않을 거예요. 원래의 모습으로는 절대로 돌아가지 않을테니까요!\n#3;em;[!]"
10004075-44 = "[s] \"어째서 원래의 모습으로 돌아가고 싶지 않은 거야?\""
10004075-45 = "3;꼬마 슌ND;05;그야 당연하죠! 나이 든 몸은 거추장스럽기만 하니까요!\n#3;em;[반응]"
10004075-46 = "3;꼬마 슌ND;06;피부는 거칠고, 조금만 뛰어도 숨이 차고, 움직일 때마다 어깨가 결리고……."
10004075-47 = "3;꼬마 슌ND;25;……다들 책임을 지우려 하고.\n#3;em;…"
10004075-48 = "3;꼬마 슌ND;05;매화원의 교관들에게는 현룡문의 간부들도 함부로 대할 수 없을 정도의 막대한 특권이 주어지지만, 또 그만큼의 책임이 따르기도 해요."
10004075-49 = "3;꼬마 슌ND;25;아이들이 깨어나서 잠들 때까지 한시도 눈을 떼지 못하는 것은 물론이고, 사고라도 터지면 뒷수습을 하느라 정작 제 수업을 듣지 못하는 때도 있으니까요."
10004075-50 = "3;꼬마 슌ND;06;……저는 이 책임에 지쳤어요. 아이들을 돌보는 건 조금도 즐겁지 않아요.\n#3;stiff\n#3;em;[속상함]"
10004075-51 = "[s] \"정말로 그렇게 생각해?\""
10004075-52 = "3;꼬마 슌ND;16;물론이에요. 오늘 하루 어린 아이처럼 살아보니 얼마나 편했는 지 몰라요."
10004075-53 = "3;꼬마 슌ND;17;선생님도 어른이니 아시지 않나요? 아이를 돌본다는 것이 얼마나 힘든 일인지를.\n#3;em;[반응]"
10004075-54 = "3;꼬마 슌ND;17;예를 들것도 없이, 선생님께서도 오늘 하루, 저를 돌보시느라 아주 성가셨겠지요. 책임을 진다는 건 언제나 그래요."
10004075-55 = "[s] \"나는 오늘 슌이 나를 의지해줘서 굉장히 기뻤어.\""
10004075-56 = "3;꼬마 슌ND;02;네? 성가신 게 아니라…… 기쁘셨다고요?\n#3;em;[?]"
10004075-57 = "3;꼬마 슌ND;05;입에 발린 소리는 그만두세요. 공연한 말썽에 휘말리는 게 즐거울 리가 없잖아요!\n#3;stiff"
10004075-58 = "3;꼬마 슌ND;16;사야 양과 계획했던 약속도 지키지 못하고, 예상외의 비용을 잔뜩 쓰고…… 심지어 경찰에게 오해를 사 심한 일까지 당할 뻔 하셨으면서……."
10004075-59 = "3;꼬마 슌ND;17;그런데 뭐가 즐거우셨단 말인가요?\n#3;em;[반응]"

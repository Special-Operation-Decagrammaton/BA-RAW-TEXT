10004075-61 = "3;꼬마 슌ND;02;미소……."
10004075-62 = "3;꼬마 슌ND;17;미소가 무슨 상관인가요? 미소가 문제를 해결하는 데 도움이 되는 것도 아니잖아요!\n#3;em;[빠직]"

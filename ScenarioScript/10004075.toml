10004075-1 = "#title;제7화;교관의 책임"
10004075-2 = "3;사야 사복;04;우으…… 재난이었던 것이다…….\n#3;stiff\n#3;em;[속상함]\n#3;a"
10004075-3 = "3;사야 사복;00;설마 거기서 발키리 경찰학교의 학생이 나타날 줄이야……."
10004075-4 = "3;사야 사복;04;건방진 꼬맹이 녀석, 변명도 해주지 않고 시치미를 떼다니! 그 때문에 나님과 선생이 어린 소녀를 힘으로 억누르려 했다는 엉뚱한 오해를 사고 말았잖아!\n#3;hophop"
10004075-5 = "[s] \"힘으로 억누르려 했던 건 사실이지만…….\""
10004075-6 = "3;사야 사복;05;안 되겠어. 이대로 가다가는 정말 슌이 통제할 수 없는 천방지축의 꼬마가 되어버릴 것이다.\n#3;em;[반응]"
10004075-7 = "3;사야 사복;00;이렇게 된 이상 더 강력한 마비약을 준비해야……."
10004075-8 = "[s1] \"마비약은 이제 괜찮아.\"\n[s2] \"내가 슌과 직접 이야기 해볼게.\""
10004075-9 = "3;사야 사복;05;말로 설득하려고? 지금의 어려진 슌은 제대로 이야기를 들으려 하지도 않을 텐데.\n#3;em;[?]"
10004075-10 = "3;사야 사복;05;말로 설득하려고? 지금의 어려진 슌은 제대로 이야기를 들으려 하지도 않을 텐데.\n#3;em;[?]"
10004075-11 = "3;사야 사복;04;게다가 선생 혼자 갔다가는 또 슌의 장난에 휘말리고 말게 분명한데……\n#3;stiff"
10004075-12 = "3;사야 사복;05;……애초에, 오늘은 나님과 어울려 주기로 약속한 날이었으면서.\n#3;em;[반응]"
10004075-13 = "[s3] \"오늘은 이해해줘, 사야.\"\n[s4] \"계획했던 외출은 다음번에 벌충할게.\""

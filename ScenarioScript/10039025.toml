[translation]
10039025-2 = "เอาละ~! ทุกคนทำได้ดีมากค่ะ~! ขอบคุณที่ทำให้เราได้ไอดอลดูโอ้กลับมานะคะ!"
10039025-3 = "อืม เป็นแผนการจับตัวที่ทั้งยอดเยี่ยม ทั้งสมบูรณ์แบบ และไม่มีใครเจ็บตัวเลยละ"
10039025-4 = "ไม่คิดเลยนะว่าจะได้ใช้คำว่า 'จับตัว' กับเซริกะจังหรืออายาเนะจังน่ะ"
10039025-6 = "รู้สึกเหมือนสมาชิกคณะกรรมการแผนงานจะแปะมือกันเป็นเป้าหมายของเกมจับตัวเลยนะคะ..."
10039025-7 = "[s1] \"ถ้าเป็นอย่างนั้นจริง ก็ยังเหลือ...\"\n[s2] \"อืม... ถ้างั้นคนที่ยังไม่ถูกจับก็...\""
10039025-13 = "...?"
10039025-14 = "หะ... หืม...? คุณครู? หมายความว่ายังไงเหรอคะ...?"
10039025-15 = "อ่า... แค่พูดลอยๆ คนเดียวเหรอคะ? ยะ... อย่างนั้นสินะคะ..."
10039025-16 = "เอาเถอะค่ะ ในเมื่อกลับมาแล้ว~!"
10039025-17 = "ทั้ง 2 คน~ เลิกเขินอยู่ข้างนอกได้แล้วค่ะ เข้ามาเถอะค่ะ~!"
10039025-18 = "ระ... รู้แล้วน่า...! บอกว่ารู้แล้วไง แค่เข้าไปก็พอแล้วใช่มั้ยล่ะ!"
10039025-19 = "อะ... อือ... ฮืออ…!"
10039025-20 = "ยะ... อย่าพูดอะไรกันนะ! ฉันไม่ยอมอยู่เฉยๆ แน่...!!"
10039025-21 = "ถะ... ถ้างั้น.."
10039025-32 = "[ns3] \"...?!?\"\n[ns4] \"เฮือก...\"\n[ns5] \"ว้าว...\""
10039025-37 = "...!"
10039025-38 = "ว้าว..."
10039025-39 = "[ns6] \"...?\"\n[ns7] \"มารี...?\""
10039025-43 = "งะ... เงียบๆ เลยนะ! ห้ามพูดอะไรทั้งนั้น จะนิดเดียวก็ไม่ได้!!"
10039025-44 = "อึก... ชุดแบบนี้มัน... ให้ทุกคนได้เห็นด้านที่น่าอายจนได้..."
10039025-46 = "อื้อ อื้อ! ต้องอย่างนี้ละค่ะ! เป็นไปตามที่คาดไว้เลยค่ะ!"
10039025-47 = "ฉันต้องไปจ้างดีไซเนอร์และแก้นู่นแก้นี่เยอะเลย แต่เห็นแล้วก็หายเหนื่อยนะคะ... ฮือๆ ดีใจจังเลยค่ะ"
10039025-49 = "อย่าทำหน้าเหมือนแม่พูดกับลูกอย่างนั้นสิ!!"
10039025-50 = "โชว์หน้าท้องเยอะเลย... หะ... เห็นสะดือด้วยหรือเปล่านะ...!"
10039025-51 = "เฮือก...!? คะ... คุณครู...!?!?"
10039025-52 = "อะไรน่ะ!? คุณครูเหรอ!? ทำไมคุณครูถึงมาอยู่ตรงนี้ด้วยล่ะ...!?!?"
10039025-57 = "คุณครูตัวจริงนี่นา!!! อะไรกัน!! ทำไมเป็นแบบนี้ไปได้!!!"
10039025-58 = "ก็ว่าอยู่ว่าทำไมจู่ๆ ท่าทีของพวกรุ่นพี่ก็เปลี่ยนไป...!"
10039025-59 = "[s8] \"สวยมากเลยนะ ครูไม่ได้โม้ด้วย\"\n[s9] \"ทั้งสองคนเหมือนไอดอลตัวจริงเลยนะ\""
10039025-62 = "ฮือออ~~~!!!! ครั้งนี้ครั้งสุดท้ายแล้วนะ...!!"
10039025-63 = "ตะ... ต่อให้แกล้งหยอดคำพูดหวานๆ ก็ไม่มีประโยชน์หรอก...!!"
10039025-64 = "มะ... ไม่นะคะ! ไม่ใช่อย่างนั้นเลยค่ะ! พวกคุณสวยกันมากๆ จริงๆ นะคะ!!"
10039025-65 = "ไม่ใช่แค่คุณครูคนเดียวนะคะ ตอนที่เห็นฉันก็ประทับใจเหมือนกันค่ะ! จนอยากจะลองเป็นไอดอลเอง#nเลยค่ะ...!!"
10039025-66 = "หะ... หืม...!? คุณครู? คนนี้คือ..."
10039025-70 = "คุณซิสเตอร์จากชมรมซิสเตอร์...! ทำไมคุณซิสเตอร์ถึงมาอยู่ที่นี่ล่ะ...?"
10039025-71 = "ว่าไงนะ...?"
10039025-72 = "มาศึกษาเรื่องไอดอลจากเราเหรอ...? ศึกษาอะไร..."
10039025-76 = "ตะ... แต่ก็นะ ถ้าเป็นคุณครูก็น่าสงสัยอยู่... แต่ถ้าเป็นคุณซิสเตอร์จากทรีนิตี้แล้ว ก็คงไม่มีทางโกหก#nหรอกเนอะ..."
10039025-80 = "[ns10] \"ทำไมสองมาตรฐานล่ะ...?\"\n[ns11] \"ทำไมไม่เชื่อครู แต่เชื่อมารีล่ะ...\""
10039025-83 = "ถามมาได้...?"
10039025-84 = "มันก็แน่นอนอยู่แล้วไม่ใช่เหรอ!? ก็คุณครูมีนิสัยชอบเอาแต่อวยกันตลอดนี่!!"
10039025-86 = "แหะๆๆ..."
10039025-87 = "อ้อ~ นั่นสิเนอะ เป็นความผิดของครูนี่เอง"
10039025-88 = "[s12] \"ฮือ ครูพูดจากใจจริงมาตลอดเลยนะ...\"\n[s13] \"ครูพูดจริงนะ เดี๋ยวจะไปเชียร์ที่งานด้วย!\""
10039025-94 = "ดะ... เดี๋ยวสิ ต่อให้จะพูดอะไรแบบนั้น...!!"
10039025-95 = "คะ... คุณครู..."
10039025-99 = "ซะ... เซริกะจัง เอ่อ... คือว่า..."
10039025-100 = "อย่าเข้าใจฉันผิดเลยนะคะ แต่ก็..."
10039025-101 = "รู้แล้วน่า! ก็ช่วยไม่ได้นี่นา! สัญญาต้องเป็นสัญญา! ฉันต้องรักษาสัญญาสิ"
10039025-102 = "พวกฉันไม่ได้มีความหมายอื่นแฝงเลยนะ! พวกฉันก็แค่รักษาสัญญาก็เท่านั้น!! ใช่มั้ย อายาเนะ?"
10039025-103 = "ชะ... ใช่ค่ะ! ไม่ใช่ว่าพวกฉันอยากเป็นไอดอล หรืออยากทำการแสดงให้ดูเลยนะคะ! ฉันทำแบบนี้อย่างไม่มีทางเลือกเพราะสัญญาไว้แล้วน่ะค่ะ!"
10039025-104 = "เข้าใจใช่มั้ยคะคุณครู? แล้วก็... พวกรุ่นพี่ด้วย"
10039025-105 = "แหะๆ ง่ายจริงๆ เลยน้า เหมือนปอกกล้วยเข้าปากเลย~"
10039025-106 = "รุ่นพี่โฮชิโนะน่ะเงียบไปเลยนะ!!"
10039025-108 = "อืม เป็นความตั้งใจที่น่าชื่นชมมาก ฉันก็จะช่วยอย่างเต็มที่เลยละ"
10039025-109 = "ดีจังเลยนะคะ~ อืม... ถ้างั้นก็เอาชุดตามนี้เลยนะคะ~☆"
10039025-110 = "ฮุฮุ..."
10039025-111 = "ขอบคุณที่ช่วยนะคะ คุณครู แล้วก็คุณมารีด้วยค่ะ!"
10039025-112 = "จะว่าไป คุณมารีอยากรู้เกี่ยวกับการเตรียมตัวเป็นไอดอลใช่มั้ยคะ? ฉันไม่รู้ว่านี่จะเป็นการตอบแทน#nที่เพียงพอหรือเปล่า..."
10039025-113 = "แต่ฉันจะบอกแหล่งสั่งตัดชุดและวิธีเตรียมชุดให้ค่ะ!"
10039025-115 = "(หลังจากนั้นโนโนมิก็อธิบายเรื่องขั้นตอนการทำชุดไอดอลและแหล่งสั่งตัดชุดให้ฟังอย่างละเอียด)"
10039025-125 = "- ชุด เคลียร์ -"

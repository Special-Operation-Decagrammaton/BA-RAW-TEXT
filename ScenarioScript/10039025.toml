[translation]
10039025-2 = "大家辛苦了～！#n多虧有你們的幫忙，順利把他們兩人帶回來了！"
10039025-3 = "嗯。是場沒有人受傷的完美捕獲行動。"
10039025-4 = "沒想到會對茜香醬和綾音醬用上「捕獲」這個詞呢～"
10039025-6 = "總覺得我們對策委員會的成員，好像在輪流進行捕獲行動一樣……"
10039025-7 = "[s1]「照這個邏輯來看，接下來就是……」\n[s2]「嗯，確實如此。也就是說……」"
10039025-13 = "……？"
10039025-14 = "唔，唔嗯……？#n老師？這是什麼意思……？"
10039025-15 = "……啊，只是自言自語是嗎？#n這，這樣啊……"
10039025-16 = "總之事情就是這樣～！"
10039025-17 = "兩位～別再害羞了，快進來吧～！"
10039025-18 = "知，知道了啦……！我進去就是了！"
10039025-19 = "嗚嗚……！"
10039025-20 = "待，待會誰敢有一句廢話試試看！我一定讓他吃不完兜著走……！！"
10039025-21 = "那，那麼……"
10039025-32 = "[ns3]「……！？！？」\n[ns4]「……哦。」\n[ns5]「……哇。」"
10039025-37 = "…………！"
10039025-38 = "哇……"
10039025-39 = "[ns6]「……？」\n[ns7]「瑪麗……？」"
10039025-43 = "安，安靜！什麼都別說。什麼都別說！！"
10039025-44 = "嗚嗚嗚……居然穿上了這種服裝……我要嫁不出去了……"
10039025-46 = "嗯嗯！果然很棒！完全符合我的期待！"
10039025-47 = "委託設計並再三確認的努力終於有了回報……#n嗚嗚，真是太令人高興了。"
10039025-49 = "別露出一副媽媽好不容易把女兒拉拔長大的表情！！"
10039025-50 = "肚，肚臍……還有肚子都……！"
10039025-51 = "……！？嗚，嗚嗚！？#n老，老師……！？"
10039025-52 = "什，什麼！？老師！？#n老師在這裡嗎……！？！？"
10039025-57 = "還真的在！！！#n吼唷！！這到底是怎麼回事！！！"
10039025-58 = "難怪前輩們的行動突然變了……！"
10039025-59 = "[s8]「你們兩位都很漂亮唷。是真的，不開玩笑。」\n[s9]「兩位都非常好看哦。真的很棒。」"
10039025-62 = "嗚嗚嗚～～～！！#n這下，這下真的完了……！！"
10039025-63 = "突，突然說那種場面話也……！！"
10039025-64 = "不，不是的！那不只是場面話！#n你們兩位真的非常漂亮！！"
10039025-65 = "不僅是老師，連我看了也覺得非常驚豔！#n甚至不禁想要效仿……！！"
10039025-66 = "唔，唔嗯……！？#n老師？這位是……"
10039025-70 = "……修女會的修女？#n為什麼修女會在這裡……"
10039025-71 = "……啊？"
10039025-72 = "是來向我們學習偶像的……？#n這又是怎麼回事……"
10039025-76 = "如，如果是老師說的倒還另當別論……但三一的修女應該不會說謊吧……"
10039025-80 = "[ns10]「這個差別待遇是……？」\n[ns11]「為什麼不相信我卻相信瑪麗……」"
10039025-83 = "……嗯？"
10039025-84 = "那還用問嗎！？#n誰叫老師你太常說好聽話了！！"
10039025-86 = "啊哈哈……"
10039025-87 = "啊啊～確實如此。#n這是老師的錯唷。"
10039025-88 = "[s12]「嗚嗚，我明明只是說出真心話而已……」\n[s13]「我一向都是認真的！表演的時候我一定會到場支持！」"
10039025-94 = "……！！#n不，不是，就算你這麼說……"
10039025-95 = "老，老師……"
10039025-99 = "……茜，茜香醬。那個……"
10039025-100 = "我突然這麼說，茜香醬可能會覺得奇怪……"
10039025-101 = "算，算了啦！既然都這樣了也沒辦法！#n畢竟這是我們的約定！是約定就要遵守對吧！"
10039025-102 = "絕對沒有其他意思！只是遵守約定而已！！#n對吧，綾音醬？"
10039025-103 = "沒，沒錯！絕對沒有自己想做或想展示什麼的意思！#n只是因為是約定所以不得不做而已！"
10039025-104 = "老師……還有前輩們都聽到了嗎？"
10039025-105 = "唔嘿，真好搞定～"
10039025-106 = "星野前輩你少囉嗦！！"
10039025-108 = "嗯，當然。#n這個決心很棒。我也會盡力幫忙。"
10039025-109 = "好～嗯……我也暫且當作是這樣吧~☆"
10039025-110 = "呵呵……"
10039025-111 = "老師跟瑪麗同學，謝謝你們的幫忙！"
10039025-112 = "對了，你們剛才說想了解偶像活動籌備的事對吧？#n雖然這可能算不上什麼回禮……"
10039025-113 = "就由我來告訴你們訂製服裝的店家跟方法吧！"
10039025-115 = "（之後，野乃美詳細說明了關於偶像服裝的製作流程，以及製作廠商的資訊）"
10039025-125 = "- 服裝完成 -"

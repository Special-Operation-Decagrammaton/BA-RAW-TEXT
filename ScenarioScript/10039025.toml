[translation]
10039025-2 = "Great work, everyone! We brought them both in safely."
10039025-3 = "Yeah, we made a clean capture, no casualties."
10039025-4 = "Yes. We successfully captured...Serika and Ayane."
10039025-6 = "Is it me, or do we each take turns getting captured?"
10039025-7 = "[s1] \"Well, that means the next person is...\"\n[s2] \"Hmm, now that I think about it...\""
10039025-13 = "Well..."
10039025-14 = "...Sensei? What do you mean...?"
10039025-15 = "...Oh. You were just talking to yourself? I see..."
10039025-16 = "In any case..."
10039025-17 = "You two, come in already! Don't be shy!"
10039025-18 = "All right, all right. We're coming in now..."
10039025-19 = "U-ugh...! Err...!"
10039025-20 = "Just don't say anything. I don't want to hear one little comment from any of you."
10039025-21 = "O-Okay..."
10039025-32 = "[ns3] \"...?!\"\n[ns4] \"...Whoa.\"\n[ns5] \"...Wow.\""
10039025-37 = "...!"
10039025-38 = "...Wow..."
10039025-39 = "[ns6] \"...?\"\n[ns7] \"...Mari...?\""
10039025-43 = "Sh-Shut it! We told you, don't say anything!"
10039025-44 = "Ugh... What even IS this costume? I'm never going to live this down..."
10039025-46 = "Oh, it looks just like I imagined!"
10039025-47 = "All that work, finding a designer, checking in over and over again... I'm so happy."
10039025-49 = "You look like a mom looking at her daughter!"
10039025-50 = "Eep! M-My belly button...!"
10039025-51 = "...! E-Err.... S-Sensei...?!"
10039025-52 = "W-Wait, SENSEI?! What are you doing here...?!"
10039025-57 = "Seriously, what is this! What's going on here?!"
10039025-58 = "I should've guessed when the seniors suddenly got all coordinated!"
10039025-59 = "[s8] \"You both look very pretty. I mean it.\"\n[s9] \"You two are amazing! No, really.\""
10039025-62 = "Ugh...! Seriously, I just can't with this!"
10039025-63 = "And quit flattering us!"
10039025-64 = "Oh no, we're not! You really do look beautiful, both of you!"
10039025-65 = "It's not just Sensei, I think so too! As soon as I saw you, I wanted my own costume, just like yours!"
10039025-66 = "...Hey, Sensei, who is this?"
10039025-70 = "She must be from the Sisterhood. What's she doing here?"
10039025-71 = "...Say what?"
10039025-72 = "You want US to teach you how to be pop idols? What the..."
10039025-76 = "...Okay, I GUESS I can believe that. Sensei wouldn't put you up to this, I don't think..."
10039025-80 = "[ns10] \"...You don't THINK?\"\n[ns11] \"Sure, when I say it, it's flattery. When SHE says it...\""
10039025-83 = "Hm?"
10039025-84 = "Come on, Sensei. We know you always say the nicest thing you can, no matter what."
10039025-86 = "Ha... Haha..."
10039025-87 = "Ah! True. That's on you, Sensei."
10039025-88 = "[s12] \"*sniff* I always mean it, though...\"\n[s13] \"Well, believe me when I tell you I'll cheer you on.\""
10039025-94 = "...Well, when you say that..."
10039025-95 = "S-Sensei...?"
10039025-99 = "Hey, Serika, listen."
10039025-100 = "This might sound weird, after everything we just went through, but..."
10039025-101 = "No, I got it. If Sensei's going to be there cheering for us, then... Well, a promise is a promise, right?"
10039025-102 = "I mean, that's it! No other reason. We've just got a commitment to keep. Right, Ayane?"
10039025-103 = "Uh, right! It's got nothing to do with showing off, for you or anybody else. We just made a promise, and we've got to see it through, you got that?"
10039025-104 = "EVERYBODY got that? Sensei? Seniors?"
10039025-105 = "Heh, they just flipped like a coin."
10039025-106 = "You be quiet, Hoshino!"
10039025-108 = "I appreciate you keeping that promise."
10039025-109 = "Great! Um...sure, we'll go with that!"
10039025-110 = "Heehee."
10039025-111 = "Thank you so much for your help, Sensei. You too, Mari!"
10039025-112 = "Oh, and of course, you wanted to know how to prep for being idols, right? We'll tell you. It's the least we can do."
10039025-113 = "Let me tell you all about the place we ordered the costumes from, and how we designed them!"
10039025-115 = "After that, Nonomi explained it all in detail."
10039025-125 = "- The Costume Cleared -"

[translation]
61110-1 = "第11話;校外教學（１）"
61110-5 = "[ns1]「今天也要開心地～」\n[ns2]「開始上課囉～」"
61110-8 = "哇，說什麼開心的上課……#n這種謊話連你自己都不相信吧……"
61110-9 = "我，我也有努力，再多學一點哦……"
61110-10 = "[s]「哎呀，我們日和真乖！」"
61110-11 = "咦？嘿，嘿嘿……再多摸摸我的頭吧……"
61110-12 = "畢竟沒有人……能保證明天也會像今天一樣嘛……！"
61110-13 = "就像今天太陽雖然是從東邊升起，卻不能百分之百確定明天也會從東邊升起一樣！"
61110-14 = "[s3]「說的很好！這就是所謂的『懷疑經驗論』！」\n[s4]「也是能延伸到義務論倫理學的理論哦！」"
61110-17 = "啊，那個內容……！好像在老師給的書裡看過……！"
61110-23 = "那麼，現在要開始進行小考囉。"
61110-28 = "那是……什麼？"
61110-29 = "等等，小考……？#n所以這也是考試嗎？"
61110-35 = "沒錯。只是經過簡化、很簡單的考試而已。"
61110-36 = "我接下來會把題目唸出來，請大家試著寫下正確的答案。"
61110-39 = "咦……？這個我明明有學過的……"
61110-40 = "唔唔，怎麼就是想不起來……"
61110-43 = "啊，對了！之前有說「不懂就要問」對吧？#n喂，答案是什麼啊？"
61110-44 = "那題嗎？應該是……"
61110-46 = "那邊的人，禁止作弊。"
61110-48 = "作……弊？那又是什麼？"
61110-50 = "就是抄寫別人的答案，或者向其他人詢問答案的行為。"
61110-52 = "可是老師不是說過不懂就要問嗎！"
61110-54 = "那僅限於學習的時候好嗎……"
61110-56 = "原來學習跟考試不一樣嗎！？#n太讓人震驚了……"
61110-58 = "雖然是我們學園的孩子，這還真令人擔心啊……"
61110-65 = "[ns]「總覺得……」"
61110-67 = "[ns]「天氣真不錯呢。」"
61110-68 = "為何這麼說呢？天空明明佈滿了烏雲。"
61110-73 = "[ns5]「畢竟感覺和意見都是主觀的……」\n[ns6]「只要我覺得好，那就是好天氣吧……」"
61110-76 = "是嗎……"
61110-77 = "不過那又如何呢？"
61110-78 = "[s]「天氣好不就會覺得有點可惜嗎？」"
61110-79 = "我完全不懂你上下文的邏輯……"
61110-83 = "[ns]「今天就去校外教學吧！」"
61110-84 = "那又是什麼！？"
61110-88 = "這樣……可以嗎……？"
61110-89 = "咦？有些東西是教室裡學不到的？"
61110-90 = "而且只要是上課時間做的事情，全都是課程的延伸……？"
61110-91 = "聽起來還真是個方便的藉口呢……"
61110-92 = "[s]「實際上就是如此哦。」"
61110-93 = "總覺得這樣有點狡猾……"
61110-94 = "[s]「這就是大人的特權啊。」"
61110-95 = "前輩不坐下嗎？#n你從剛才就一直站著……"
61110-96 = "還有老師也是。腿不會痠嗎？"
61110-97 = "沒關係。我完全沒問題。"
61110-102 = "……真是奇妙的感覺。"
61110-103 = "居然又以這種方式來到了「外面」……"
61110-104 = "……"
61110-105 = "不過不知道為什麼……感覺跟那時很不一樣。"
61110-109 = "嗚……！"
61110-110 = "你沒事吧？怎麼了嗎？"
61110-111 = "我，我沒事。沒問題的。#n只是稍微想起了那時的記憶而已。#n耶，耶嘿嘿……"
61110-112 = "……"
61110-113 = "[s]「那時的記憶？」"
61110-114 = "……！"
61110-115 = "沒什麼，老師。#n那只是……"
61110-116 = "……"
61110-117 = "昨晚，舞彩說他做了惡夢。"
61110-118 = "[s]「可是……」"
61110-119 = "沒關係的，老師。"
61110-123 = "[ns]「真的嗎？」"
61110-124 = "嗯。"
61110-125 = "這些孩子的諮詢，本來就是我份內的工作。"
61110-126 = "是，是的……沒，沒錯……"
61110-131 = "話說老師，我們該從哪裡開始走呢？"
61110-132 = "我完全不知道該怎麼辦……#n而且感覺有點刺眼……"
61110-134 = "……"
61110-135 = "這個部分老師應該自有安排吧？"
61110-136 = "畢竟提出要「校外教學」的人也是老師嘛。"
61110-137 = "[s]「當然當然。交給老師就行了！」"
61110-138 = "那棟建築，是完全用玻璃建造的嗎？#n整棟都閃閃發亮的呢……"
61110-139 = "如果蓋在我們學園的話……應該早就被打破或弄髒了吧……"
61110-140 = "「小隊」的人，應該幾乎每天都能看到這種景色吧……"
61110-141 = "要是他們也能一起來就好了。"
61110-142 = "這也沒辦法。總是得有人留下來守護奧利斯。"
61110-143 = "不過，把這種事交給現在的小隊真的沒問題嗎，前輩……？"
61110-144 = "……"
61110-145 = "這個部分，老師應該會負責才對。"
61110-146 = "對吧，老師？"
61110-147 = "[s]「當然當然。交給老師就行了！」"
61110-148 = "……"
61110-149 = "唉……"
61110-151 = "（雖然小隊以需要守護奧利斯的「看家」名義留了下來）"
61110-152 = "（不過小隊無法參加校外教學，其實另有原因……）"
61110-154 = "……不管怎麼說，我們現在的身份依然是通緝犯。"
61110-155 = "沒錯。不只行動範圍受限，也不能隨便暴露身份。"
61110-156 = "本來很想跟老師一起去校外教學的……"
61110-157 = "嘿，嘿嘿……不過這也沒辦法吧……#n沒關係的，老師。我已經習慣了……"
61110-162 = "如今能自由行動的反而是我們……想想還真諷刺啊。"
61110-163 = "不過說真的……你們打算永遠躲躲藏藏地過日子嗎，「小隊」？"
61110-164 = "你……！"
61110-165 = "……"
61110-166 = "住手，美咲。"
61110-167 = "……嘖。"
61110-171 = "在想小隊的孩子們嗎？"
61110-172 = "[s]「！？！？」"
61110-173 = "一副「你怎麼知道」的表情呢。"
61110-174 = "因為能看得出來哦，老師。尤其是在這種時候。"
61110-175 = "……"
61110-176 = "我想請教你一個問題。"
61110-177 = "對老師來說，小隊的孩子們是否屬於奧利斯呢？"
61110-178 = "不不不，我沒有別的意思。只是突然有點好奇而已。"
61110-179 = "[s]「這，這個嘛……」"
61110-183 = "哎呀，老師們的感情看起來不錯嘛。#n帶學生出來上課真是辛苦了。"
61110-184 = "咦……？"
61110-185 = "！？！？！！！！！"
61110-186 = "這，這是什麼意思！？"
61110-187 = "這個反應是……？啊啊～原來如此。#n你是教育實習生對吧？要好好學習老師怎麼做哦。"
61110-188 = "老，老師！？誤會好像越來越大了！？#n請快說點什麼解釋一下吧！"
61110-189 = "露出溫柔的微笑是什麼意思！#n不，不不不不，不是的！我們並不是那種……！"
61110-190 = "呵呵，我一看就知道了。#n抱歉抱歉，破壞氣氛的傢伙馬上就消失。"
61110-191 = "真的！不是那樣啦！！！"
61110-197 = "……"
61110-198 = "……"
61110-199 = "好，好厲害！！！"
61110-200 = "真奇怪……建築居然都完好無損……"
61110-201 = "這種東西不是應該處於半毀跟破爛的狀態，只能勉強修補著用……"
61110-202 = "等到徹底倒塌的時候，再辦個儀式感謝它的陪伴嗎……？"
61110-203 = "[s]「來，大家一起過馬路囉～」"
61110-204 = "過馬路？這樣做就行了嗎……？"
61110-209 = "哇啊！？為什麼要拉住我啊，老師！？"
61110-210 = "[s]「紅燈的時候不能過馬路哦！」"
61110-211 = "是嗎……？"
61110-212 = "原來這裡的規則是這樣啊……"
61110-213 = "不過就算真的出事也不會受重傷吧？#n畢竟我們還算挺結實的……"
61110-214 = "咦？也要考慮汽車跟駕駛的感想？#n好像懂，又好像不太懂……"
61110-219 = "游，游泳池……？"
61110-220 = "這裡到底是什麼地方……？"
61110-221 = "聽說是為了游泳這項運動，專門建造的體育設施哦。"
61110-223 = "居然有這麼多乾淨的水！實在太不可思議了！"
61110-230 = "咦？又怎麼了嗎，老師？"
61110-231 = "[s]「泳池的水是不能隨便喝的哦……」"
61110-236 = "可，可是有這麼多水耶！？"
61110-237 = "看起來不會喝壞肚子，還有一股清新的味道……"
61110-238 = "咦？那個味道是來自於叫做「氯」的消毒藥水？"
61110-242 = "原來水還要消毒嗎！？！？"
61110-248 = "好高啊──！！！"
61110-249 = "快看天空！完全是藍色的耶！"
61110-250 = "原來那就是河流啊……哇……"
61110-251 = "那個東西就是橋對吧？#n究竟是怎麼建造的呢……"
61110-252 = "[s7]「雖然開心是好事，不過不可以造成其他人的困擾哦。」\n[s8]「大家，要避免大聲喧嘩哦～？」"
61110-255 = "好～！"
61110-259 = "你怎麼了，老師？#n看你好像快要哭出來的樣子。"
61110-260 = "咦？大家願意乖乖聽話讓你很感動？"
61110-261 = "仔細想想，確實挺神奇的……#n以前我們明明最討厭聽大人的話了……"
61110-262 = "那是因為以前只會被打或被威脅吧……"
61110-264 = "這個我知道！是漢堡對吧！"
61110-265 = "嗯，我有吃過。#n前輩他偶爾會買給我們吃。"
61110-272 = "味道明明一模一樣，感覺卻有所不同……#n究竟是為什麼呢……"
61110-273 = "是因為吃的地方不一樣嗎？"
61110-274 = "確實有這個可能。"
61110-279 = "[ns9]「大家先停止動作！STOP！」\n[ns10]「用飲料機的時候不能直接把嘴巴靠上去喝哦！」"
61110-282 = "可，可是剛才不是說可以自由取用嗎……"
61110-283 = "因為其他人也要用飲料機……？"
61110-284 = "……"
61110-285 = "仔細想想，好像也有道理……"
61110-287 = "咦？謝謝我們願意乖乖排隊？"
61110-288 = "連理所當然的事情也被稱讚的話，好像反而有點害羞耶？"
61110-289 = "就是說啊。#n以前領配給的時候要是敢不排隊或插隊，可是會被懲罰到失去意識的呢！"
61110-292 = "老，老師……？#n這裡是什麼地方……？"
61110-293 = "聲音好吵，而且好亮哦……哇啊……"
61110-294 = "這裡叫做遊戲中心？#n遊戲是什麼呀？"
61110-295 = "……"
61110-296 = "請，請不要騙我們了，老師！世界上怎麼可能會有那種東西呢！#n只為了娛樂而存在的電子媒體什麼的……！"
61110-297 = "但是……在這裡的好像全都是那種東西……？"
61110-298 = "雖，雖然是這樣沒錯……！#n等一下，這個每玩一次都要花錢嗎！？#n真不敢相信……！"
61110-299 = "把那麼寶貴的錢純粹用來享樂……真的是正確的嗎……？"
61110-300 = "[s]「大家不用擔心！今天的花費全都由老師請客！」"
61110-301 = "真的嗎！？"
61110-309 = "我還是不太理解，這怎麼會是校外教學……？"
61110-310 = "嗯？是為了讓我們親身體驗「函數」這個數學概念？#n這是什麼意思？"
61110-311 = "……什麼？#n因為函數就是輸入和輸出之間的規則與對應關係？"
61110-312 = "所以能直觀地學習到「自己的輸入會帶來什麼結果」的遊戲中心……"
61110-313 = "就是最適合體會函數概念的地方？"
61110-314 = "……"
61110-315 = "這恐怕是我聽過最有創意……也最新穎的胡說八道了呢……"
61110-316 = "咦？世上還有比這更加荒唐……#n聽完之後會立刻捂著後頸倒下的那種……？"
61110-317 = "……"
61110-318 = "如果是的話，我看我還是保持經驗不足的狀態比較好……"
61110-322 = "哇啊啊！這是什麼！太扯了吧！"
61110-326 = "再來一局，再來一局──！！！"
61110-328 = "[ns]「唔……好累啊……」"
61110-330 = "辛苦了，老師。"
61110-331 = "至少到目前為止。"
61110-332 = "那麼，請問在這座公園可以學到什麼呢？"
61110-333 = "學習「該休息的時候就要休息」的教訓……？#n唔嗯，這麼說倒也沒錯……"
61110-334 = "……在奧利斯的「訓練」中，我們也會盡可能確保休息時間。#n算是戰鬥間的休息吧。"
61110-340 = "[ns]「大家還真有精神啊……」"
61110-341 = "老師如果想加入的話，我們隨時歡迎哦？"
61110-342 = "各方面都太勉強了？#n嗯……說的也是。"
61110-343 = "你其實更希望我也能享受一下？"
61110-344 = "……"
61110-345 = "各方面來說，我現在確實在享受哦。"
61110-346 = "至少在現在這一刻。"
61110-349 = "（短暫的沉默流淌而過）"
61110-350 = "（默默並肩仰望著天空）"
61110-354 = "天空……真藍呢。"
61110-355 = "……由於位置和氣候的影響，奧利斯的天空經常是灰色的。"
61110-359 = "……"
61110-360 = "老師，你知道嗎。"
61110-361 = "如果有個人……"
61110-362 = "真的真的真的……想要放棄自己的人生的話。"
61110-363 = "該怎麼做才能阻止那個人呢？"
61110-367 = "[ns]「！？！？！！！！！」"
61110-368 = "呵呵，你現在的表情還真不得了呢。"
61110-369 = "為什麼突然問這麼可怕的問題？#n唔嗯……只是一時興起？"
61110-370 = "提出話題，應該不需要什麼特別的理由吧？"
61110-371 = "問我是不是認真的？#n這個嘛……"
61110-372 = "至少我是認真的。"
61110-373 = "所以希望老師也能認真回答。"
61110-374 = "這在某種意義上也算是「課程」吧？"
61110-376 = "（某個人的臉快速掠過了腦海……）"
61110-380 = "（就像昴說的，決定把這也當作一堂課……）"
61110-382 = "[ns11]「老實說……」\n[ns12]「我覺得那種方法並不存在。」"
61110-385 = "什麼……？"
61110-386 = "請等一下，那是身為教育者該說的話嗎！？"
61110-387 = "[s]「你這孩子，是想看老師慌張才問這種問題的吧？」"
61110-388 = "咦？不，不是的！#n我並沒有……！"
61110-389 = "……"
61110-390 = "雖然不能說完全沒有那種心思……"
61110-391 = "但，但是……！"
61110-392 = "[s13]「這通常是關於『幸福』的話題吧。」\n[s14]「像是『如果怎麼做都不幸福，還有必須活下去嗎』之類的。」"
61110-395 = "應該……是這樣沒錯？"
61110-396 = "咦？為了幸福而活，其實是一種近似於理想鄉的概念？"
61110-397 = "即便理想鄉確實是應該嚮往、期待終有一天能夠抵達的地方……"
61110-398 = "但它同時……也意謂著當下難以實現？"
61110-399 = "……"
61110-400 = "那麼，現實呢？"
61110-401 = "[s15]「為了活下去，就不能缺少幸福對吧？」\n[s16]「……然而遺憾的是，幸福往往難以獲得。」"
61110-404 = "……沒錯。"
61110-405 = "即便付出努力，也未必能得到一比一的回報。"
61110-406 = "[s17]「所以，如果有人實在太過痛苦……」\n[s18]「進而懇求讓他放棄生命的話……」"
61110-409 = "……"
61110-410 = "就連老師也無法回答這個問題啊……"
61110-411 = "[s]「不過，有一件事我可以確定。」"
61110-412 = "咦？萬一真的發生那種事的話……"
61110-413 = "老師恐怕會無法原諒……放任那個人被逼到那種地步的自己？"
61110-414 = "……"
61110-415 = "[s]「沒錯。我想我們之間──」"
61110-419 = "[ns]「應該存在『互相成為理由』的微弱義務才對。」"
61110-420 = "……！"
61110-421 = "……那麼，老師。"
61110-422 = "……"
61110-423 = "我，我只是順便問問而已。"
61110-424 = "老師你……也有可能成為我的理由嗎……？"
61110-425 = "[s19]「如果可以的話，那就再好不過了。」\n[s20]「就像現在，奧利斯的孩子們是你的理由一樣。」"
61110-428 = "我，我沒有說到那種程度吧！？！？"
61110-429 = "有些事情，大人只要看一眼就能明白了……？"
61110-430 = "……！！！"
61110-431 = "老師～麻煩過來這邊一下～"
61110-432 = "[s]「好！馬上來！」"
61110-436 = "……"
61110-437 = "真是的。"
61110-438 = "明明什麼都不知道還胡亂猜測……"

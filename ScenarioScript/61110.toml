[translation]
61110-1 = "Episode 11; Field Trip 1"
61110-5 = "[ns1] \"It's another wonderful day!\"\n[ns2] \"Another fun day of classes!\""
61110-8 = "\"Fun.\" How can you lie to me with such a straight face?"
61110-9 = "I... I s-studied really hard to prepare this time!"
61110-10 = "[s] \"Aww, good job! That's my Hiyori!\""
61110-11 = "M-More... Eheehee... Praise me more..."
61110-12 = "Because there's no guarantee tomorrow will be the same as today...!"
61110-13 = "Just because the sun rose in the east today, you can't say with 100% certainty that it'll rise in the east tomorrow!"
61110-14 = "[s3] \"Exactly! That's skeptical empiricism!\"\n[s4] \"And that leads straight into deontological ethics!\""
61110-17 = "I-I saw that! In the book you gave me, Sensei!"
61110-23 = "We will now begin the pop quiz."
61110-28 = "The...the WHAT?"
61110-29 = "A...pop \"quiz\"? So it's a type of exam?"
61110-35 = "Yes. It's a fast, simplified version."
61110-36 = "I'll read the questions out loud, so please write down the answers on your paper."
61110-39 = "Um... Hm... We talked about this..."
61110-40 = "Ugh, it's like I can remember, but not really."
61110-43 = "Oh, I just remembered! She said we could ask if we don't know something, didn't she? Hey, what's the answer to this one?"
61110-44 = "This one? Uh, I think..."
61110-46 = "Hey, no cheating."
61110-48 = "\"Cheating\"? What is that?"
61110-50 = "During exams, it's considered cheating to copy someone else's answers, or talk about it with each other."
61110-52 = "I thought we could ask if we didn't know!"
61110-54 = "When you're learning and studying."
61110-56 = "So... Exams are a totally different thing from studying? I had no idea..."
61110-58 = "...We come from the same school, but I seriously worry about them."
61110-65 = "[ns] \"I'm a little...\""
61110-67 = "[ns] \"Ah, the weather's so nice out.\""
61110-68 = "Are we looking at the same sky? The one filled with gloomy clouds?"
61110-73 = "[ns5] \"Feelings and opinions are subjective...\"\n[ns6] \"'Nice' is my opinion.\""
61110-76 = "If you say so..."
61110-77 = "Anyway, your point being?"
61110-78 = "[s] \"We're wasting a perfectly good day!\""
61110-79 = "I'm still not following..."
61110-83 = "[ns] \"Let's go on a field trip!\""
61110-84 = "Now what're you saying?!"
61110-88 = "Is this...allowed...?"
61110-89 = "What? There are some things in life you have to learn with hands-on experience?"
61110-90 = "You count this as school work, since class is still in session...?"
61110-91 = "You made that up on the fly to suit your needs."
61110-92 = "[s] \"Ack. You caught me.\""
61110-93 = "You can be a little sneaky at times, you know."
61110-94 = "[s] \"That's the privilege of adulthood.\""
61110-95 = "Do you want to sit, Subaru? Your feet must be tired."
61110-96 = "You too, Sensei. Don't your legs hurt?"
61110-97 = "I don't feel it at all, actually."
61110-102 = "It's a little weird."
61110-103 = "I never expected I'd come back to the outside world like this."
61110-104 = "..."
61110-105 = "It feels really...different this time."
61110-109 = "Ack...!"
61110-110 = "Are you okay? What's wrong, Maia?"
61110-111 = "I'm sorry! I'm okay. I just remembered some things. Heehee."
61110-112 = "..."
61110-113 = "[s] \"Memories from back then?\""
61110-114 = "...!"
61110-115 = "N-No. It's nothing, Sensei...nothing much, at least."
61110-116 = "..."
61110-117 = "Maia did say she had a nightmare the other night. That's all it is."
61110-118 = "[s] \"But...\""
61110-119 = "Don't worry, Sensei."
61110-123 = "[ns] \"Are you sure?\""
61110-124 = "Yes."
61110-125 = "I've been the one playing therapist to all of the students here, you know."
61110-126 = "Th-That's true..."
61110-131 = "Sensei! Where are we going first?"
61110-132 = "Everything's so bright... I can't tell what's left or right."
61110-134 = "..."
61110-135 = "I'm assuming you came here with a plan?"
61110-136 = "This field trip was your idea, in case you forgot."
61110-137 = "[s] \"Yup, I've got it! Just leave it to your teacher!\""
61110-138 = "Whoa, look. Is that building made of glass? How shiny..."
61110-139 = "A building like that would never last back at Arius."
61110-140 = "Do you think the Squad members see things like this every day?"
61110-141 = "It would've been nice if they could've come too."
61110-142 = "It can't be helped. Someone has to hold down the fort back at Arius."
61110-143 = "But the Squad, and who they are now... Is it really okay to trust them with that?"
61110-144 = "..."
61110-145 = "One way or another, Sensei's taking on the responsibility there."
61110-146 = "Right, Sensei?"
61110-147 = "[s] \"Yup, I've got it! Just leave it to your teacher!\""
61110-148 = "..."
61110-149 = "*sigh*..."
61110-151 = "Officially, the Squad stayed behind to protect Arius and watch over the district."
61110-152 = "But the real reason they couldn't join the field trip was something else entirely..."
61110-154 = "At the end of the day, we're still wanted criminals."
61110-155 = "We can't move around freely. I'd prefer to avoid exposing ourselves."
61110-156 = "...And I was so looking forward to going on a field trip with Sensei."
61110-157 = "Eheehee... Me too, but... It is what it is. I'm used to disappointment..."
61110-162 = "It's a little ironic that you're the ones who are wanted."
61110-163 = "Seriously, how long do you plan on playing fugitive, Squad?"
61110-164 = "You...!"
61110-165 = "..."
61110-166 = "Stand down, Misaki."
61110-167 = "...Tsk."
61110-171 = "You're thinking about the Squad, aren't you?"
61110-172 = "[s] \"?!?!\""
61110-173 = "Surprised?"
61110-174 = "You're easier to read than you think, Sensei. Especially with things like this."
61110-175 = "..."
61110-176 = "I'd like to ask you something."
61110-177 = "Who are the Squad members to you? Arius students? Or something else?"
61110-178 = "Ah, no reason for it. It's just a passing curiosity. Really."
61110-179 = "[s] \"That's...\""
61110-183 = "It's a good thing you two look like such a great team! It must be hard to manage so many students."
61110-184 = "What...?"
61110-185 = "HUH?!?!"
61110-186 = "Wh-What do you mean by that?!"
61110-187 = "Ah, my apologies! You must be the student teacher, working under this fine mentor. Make sure you learn everything you can from them!"
61110-188 = "W-W-Wait! You've completely misunderstood! S-Sensei! Help me!"
61110-189 = "What do you mean, they're smiling at me gently? Augh! A-A-Augh!! I mean it when I say you've got it wrong! This isn't...! We're not...!"
61110-190 = "Hoho, oh! Youth! Well, this unwanted, old third wheel ought to make himself scarce."
61110-191 = "I'm trying to tell you that it's not like that!"
61110-197 = "..."
61110-198 = "..."
61110-199 = "This is freaking awesome!!"
61110-200 = "Weird... All the buildings are intact..."
61110-201 = "Back home, the buildings are all crumbling and ruined. We usually just keep patching them up until we've squeezed every last bit of use out of them."
61110-202 = "And when one finally collapses, we just hold a little memorial to thank it for everything until then..."
61110-203 = "[s] \"From here, we're all going to cross to the other side of the street!\""
61110-204 = "We're crossing the street? Should I go now?"
61110-209 = "Whoa?! Why are you pulling me back, Sensei?!"
61110-210 = "[s] \"You can't cross the street when the light's red!\""
61110-211 = "Really...?"
61110-212 = "So that's how it works out here..."
61110-213 = "But I don't think we'd get hurt THAT badly from just a car. We're pretty tough, you know."
61110-214 = "Huh? Try to think of how the driver would feel? I guess I can try..."
61110-219 = "A \"swimming pool\"...?"
61110-220 = "What is this place...?"
61110-221 = "They say it's an athletic facility built solely for doing something called \"swimming.\""
61110-223 = "How is there this much clean water in one place?! That's insane!"
61110-230 = "Huh? What now, Sensei?"
61110-231 = "[s] \"You can't drink the pool water...\""
61110-236 = "B-But there's so much of it!"
61110-237 = "It smells fresh, so it probably won't give you a stomachache."
61110-238 = "Huh? That smell's from a chemical disinfectant called chlorine?"
61110-242 = "They even disinfect the water in the outside world?!"
61110-248 = "We're so hiiiiigh!!"
61110-249 = "Look at the sky! It's sooo blue!"
61110-250 = "So that's what a river looks like... Wow..."
61110-251 = "That thing's called a bridge, right? How in the world did they build that?!"
61110-252 = "[s7] \"It's great you're all excited, but be mindful of the people around us!\"\n[s8] \"Try to use your inside voices. No shouting!\""
61110-255 = "Okaaay, Sensei!"
61110-259 = "Are you...tearing up right now, Sensei?"
61110-260 = "Huh? You're just really grateful we're so cooperative?"
61110-261 = "Now that you mention it, it's kind of weird... Back then, I hated listening to adults talk."
61110-262 = "Well, that's because all they ever did was threaten and beat us..."
61110-264 = "I know what this is! It's a hamburger!"
61110-265 = "Yeah, I've had one before. Subaru buys them for us sometimes!"
61110-272 = "It definitely tastes the same, but somehow it feels different... I wonder why..."
61110-273 = "Maybe because we're eating it somewhere new?"
61110-274 = "Yeah, that could be it."
61110-279 = "[ns9] \"Everyone, wait! No, stop!\"\n[ns10] \"Don't put your mouth on the faucet when you're drinking!\""
61110-282 = "B-But you said we could have as much as we want..."
61110-283 = "It's because other people have to use the dispenser too?"
61110-284 = "..."
61110-285 = "Oh. I didn't think of that."
61110-287 = "Huh? You're thanking us for lining up properly?"
61110-288 = "It's a little embarrassing to be praised for something that basic, Sensei."
61110-289 = "Yeah. If you didn't line up properly, or cut in line, when we got rations, they'd punish you until you blacked out!"
61110-292 = "Wh-Where are we now, Sensei?"
61110-293 = "It's insanely loud, and there's so many flashing lights... Augh..."
61110-294 = "Huh? This place is called a \"game center\"? What's a \"game\"?"
61110-295 = "..."
61110-296 = "D-Don't lie to us, Sensei! There's no way something like that exists in this world! Electronic machines made only for fun...?"
61110-297 = "...All the machines in here...do look like fun..."
61110-298 = "Oh no, look. You have to pay to play even one time! That's highway robbery!"
61110-299 = "People spend their precious money on...fun?"
61110-300 = "[s] \"Don't worry! Your teacher has you covered!\""
61110-301 = "Really?!"
61110-309 = "I don't really get it... How is this a field trip for school...?"
61110-310 = "Huh? We're learning math? A hands-on lesson on functions? What are you even talking about?"
61110-311 = "...Wait, what? Let me make sure I heard you correctly: Functions are a rule where an input goes in, and then the output comes out."
61110-312 = "At an arcade, you press buttons (the input), and your character moves (the output)."
61110-313 = "And that's why it's a \"hands-on\" lesson on functions?"
61110-314 = "..."
61110-315 = "That was the most creative, original, and idiotic load of nonsense I've ever heard."
61110-316 = "Huh? I wouldn't even believe the kinds of nonsense that circulates in the outside world?"
61110-317 = "..."
61110-318 = "I'm okay with being ignorant, then, thank you..."
61110-322 = "Waaah! What was that?! No way!"
61110-326 = "Just one more! One more game!!"
61110-328 = "[ns] \"Ugh... I'm exhausted...\""
61110-330 = "You worked really hard today, Sensei."
61110-331 = "I'll give you that much."
61110-332 = "So, what lesson lies in this park?"
61110-333 = "\"When it's time to rest, it's best to rest\"? I won't say that's wrong..."
61110-334 = "...Even during the \"training\" we were forced to go through, we tried to sneak in breaks wherever we could."
61110-340 = "[ns] \"You're all so...full of energy...\""
61110-341 = "You're welcome to join training any time you want, Sensei."
61110-342 = "Those days are behind you? Hahaha..."
61110-343 = "Hm? You hope I'm having fun?"
61110-344 = "..."
61110-345 = "In my own way, I am enjoying this moment."
61110-346 = "Right now, at least."
61110-349 = "A silence fell between us for a short moment."
61110-350 = "We both looked up at the sky, sitting side by side."
61110-354 = "The sky sure is blue."
61110-355 = "...Whether it was because of the location or the climate, the sky over Arius, more often than not, was gray."
61110-359 = "..."
61110-360 = "Hey, Sensei."
61110-361 = "Say, hypothetically, if someone..."
61110-362 = "...really, really, really wanted to throw their life away."
61110-363 = "Is it even possible to stop them?"
61110-367 = "[ns] \"What?!?!?!\""
61110-368 = "What an expression you're making. Hahaha."
61110-369 = "Why the dark turn in topic? Hm. No reason?"
61110-370 = "You don't always need some special reason to bring something up, do you?"
61110-371 = "Was that a serious question?"
61110-372 = "Yes. Very much so."
61110-373 = "So I'd like you to answer seriously too, Sensei."
61110-374 = "This is a kind of \"lesson,\" right?"
61110-376 = "...Someone's face flashed quickly through my mind..."
61110-380 = "So, as she suggested, we pretended we were in class."
61110-382 = "[ns11] \"To be honest.\"\n[ns12] \"I don't think it was a serious question.\""
61110-385 = "What...?"
61110-386 = "Wait a second, should you really be acting that way?! As an educator?!"
61110-387 = "[s] \"You just wanted to see your poor teacher panic, huh?\""
61110-388 = "Huh? N-no! It's not like that...!"
61110-389 = "..."
61110-390 = "It's not like I've never had those kinds of thoughts, but..."
61110-391 = "B-But, seriously!"
61110-392 = "[s13] \"The core of your question is one about happiness.\"\n[s14] \"How do you go on living when nothing makes you happy?\""
61110-395 = "I guess I can see that..."
61110-396 = "Huh? It's idealistic to think life is just about being happy?"
61110-397 = "Ideals are inherently good. They're something to strive and hope for."
61110-398 = "But you're trying to say that...complete happiness is impossible?"
61110-399 = "..."
61110-400 = "Then what's more realistic?"
61110-401 = "[s15] \"Happiness is something...that helps us keep moving forward.\"\n[s16] \"...Even if those moments are few and far in between.\""
61110-404 = "...That's true."
61110-405 = "People rarely get rewarded for their efforts, no matter how hard they try."
61110-406 = "[s17] \"So if someone is in unbearable pain...\"\n[s18] \"Even if they beg you to let them go...\""
61110-409 = "..."
61110-410 = "Even you don't have the answer, do you?"
61110-411 = "[s] \"There's just one thing I know.\""
61110-412 = "Hm? If something like that did happen..."
61110-413 = "...you would blame yourself for letting things get that bad for them?"
61110-414 = "..."
61110-415 = "[s] \"Exactly. Because we probably had...\""
61110-419 = "[ns] \"...a kind of obligation to serve as each other's reason.\""
61110-420 = "...!"
61110-421 = "You know, if that's true, Sensei..."
61110-422 = "..."
61110-423 = "I-I want to ask you...just to know..."
61110-424 = "Does that mean...you could serve as my reason, Sensei?"
61110-425 = "[s19] \"If things turned out that way, I think that would be wonderful.\"\n[s20] \"Just like how, right now, the Arius kids are your reason.\""
61110-428 = "What?! I don't think I ever said that?!"
61110-429 = "Huh? There are things adults know just by looking...?"
61110-430 = "...!!"
61110-431 = "Sensei! Come here! Just for a sec!"
61110-432 = "[s] \"I'm on my way!\""
61110-436 = "..."
61110-437 = "Seriously."
61110-438 = "Jumping to conclusions when they don't know anything..."
61110-439 = "I guess Sensei wasn't too far off, though..."
61110-440 = "Seriously..."
61110-441 = "Subaru? There you are! Can I ask for your help with something, please?"
61110-442 = "Huh? Ah, of course. What is it?"
61110-444 = "Next Episode; Field Trip 2"

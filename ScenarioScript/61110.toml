[translation]
61110-1 = "ตอนที่ 11;ทัศนศึกษา 1"
61110-5 = "[ns1] \"มาเริ่มคาบเรียนแสนสนุกกันเถอะ~\"\n[ns2] \"ถึงเวลาคาบเรียนแสนสนุกแล้ว~\""
61110-8 = "ว้าว คาบเรียนแสนสนุก แต่ตัวเองทำหน้าตาเหมือนไม่สนุกเท่าไรเลยนะ..."
61110-9 = "ฉะ... ฉันทบทวนบทเรียนมามากกว่าเดิมด้วยนะคะ..."
61110-10 = "[s] \"น่าชื่นใจจังเลย! ฮิโยริของครู\""
61110-11 = "คะ? แหะ... แหะๆ... ช่วยลูบหัวฉันอีกหน่อยได้มั้ยคะ..."
61110-12 = "ก็มันไม่มีอะไรรับประกันว่าวันพรุ่งนี้จะเป็นแบบนี้อีกนี่คะ...!"
61110-13 = "เหมือนกับที่บอกว่าวันนี้พระอาทิตย์ขึ้นทางทิศตะวันออก แต่ก็ไม่มีอะไรรับประกันได้ 100% ว่าพรุ่งนี้พระอาทิตย์ก็จะขึ้นทางทิศตะวันออกอีกนี่คะ!"
61110-14 = "[s3] \"เยี่ยมเลย นั่นละที่เรียกว่าประสบการณ์นิยมเชิงวิพากษ์!\"\n[s4] \"นี่ละตัวอย่างของประสบการณ์นิยมเชิงวิพากษ์!\""
61110-17 = "อ๊ะ คำนี้...! เหมือนจะอยู่ในหนังสือที่คุณครูให้มาอ่านด้วยค่ะ...!"
61110-23 = "เอาละ จากนี้เราจะมาสอบย่อยกัน"
61110-28 = "มันคือ... อะไรเหรอคะ?"
61110-29 = "เดี๋ยวนะ สอบ... ย่อย? มันก็คือการสอบอย่างหนึ่งหรือเปล่า?"
61110-35 = "ใช่ เป็นการสอบที่ง่ายและไม่ซับซ้อนน่ะ"
61110-36 = "ฉันจะอ่านคำถามให้ฟัง ให้ทุกคนเขียนคำตอบลงในกระดาษนะ"
61110-39 = "หะ... หืม...? เรื่องนี้เคยเรียนมาแล้วนี่นา..."
61110-40 = "อึก เหมือนจะจำได้ แต่ทำไมถึงนึกไม่ออกนะ..."
61110-43 = "อ๊ะ จริงสิ! เคยบอกไว้ว่าถ้าไม่รู้ก็ให้ถามนี่เนอะ? งั้นข้อนี้ตอบอะไรเหรอ?"
61110-44 = "คำตอบเหรอ? เอ่อ..."
61110-46 = "นี่ ตรงนั้นน่ะ ห้ามลอกข้อสอบกันนะ"
61110-48 = "ลอกข้อสอบ...? หมายถึงอะไรเหรอคะ?"
61110-50 = "ก็คือการแอบดูคำตอบของคนอื่นแล้วเอามาเขียนตอบ หรือไม่ก็แอบถามคำตอบกันน่ะสิ"
61110-52 = "แต่ไหนบอกว่าถ้าไม่รู้ก็ให้ถามไงล่ะคะ!"
61110-54 = "ให้ถามตอนเรียนต่างหาก..."
61110-56 = "การเรียนกับการสอบมันคนละเรื่องกันหรอกเหรอคะ?! เหลือจะเชื่อเลย..."
61110-58 = "เด็กๆ โรงเรียนเรา น่ากังวลจริงๆ เลยนะ..."
61110-65 = "[ns] \"ครูว่า\""
61110-67 = "[ns] \"วันนี้อากาศดีจัง...\""
61110-68 = "อากาศดีอะไรกันคะ เมฆออกจะครึ้มขนาดนี้"
61110-73 = "[ns5] \"ความรู้สึกและความเห็นเป็นเรื่องเฉพาะตัวน่ะนะ...\"\n[ns6] \"แค่ครูคิดว่ามันดี มันก็ดีแล้วนี่...\""
61110-76 = "งั้นเหรอคะ..."
61110-77 = "ละ... แล้วยังไงเหรอคะ?"
61110-78 = "[s] \"ถ้าอากาศดี มันก็น่าเสียดายอยู่ไม่ใช่เหรอ?\""
61110-79 = "ฉันไม่เข้าใจเลยค่ะว่าคุณครูจะสื่ออะไร..."
61110-83 = "[ns] \"วันนี้เราไปทัศนศึกษากันเถอะ!\""
61110-84 = "มันคืออะไรเหรอคะ?!"
61110-88 = "ทำแบบนั้น... ก็ได้เหรอคะ...?"
61110-89 = "คะ? มีบางอย่างที่เรียนรู้จากในห้องเรียนไม่ได้งั้นเหรอคะ?"
61110-90 = "และเรื่องบางอย่าง สิบปากว่าย่อมไม่เท่าตาเห็น...?"
61110-91 = "เป็นข้อแก้ตัวที่ฟังขึ้นจังเลยนะคะ..."
61110-92 = "[s] \"แต่มันจริงนะ\""
61110-93 = "จริงจนไม่รู้จะปฏิเสธยังไงเลยค่ะ..."
61110-94 = "[s] \"นี่ละสิทธิพิเศษของผู้ใหญ่\""
61110-95 = "รุ่นพี่? ไม่นั่งเหรอคะ? ทำไมเอาแต่ยืนล่ะ..."
61110-96 = "คุณครูเองก็ด้วย ไม่เมื่อยขาเหรอคะ?"
61110-97 = "ไม่เป็นไรค่ะ ฉันไม่ต้องนั่งก็ได้ค่ะ"
61110-102 = "รู้สึก... แปลกจังเลยนะคะ"
61110-103 = "คิดไม่ถึงเลยว่าจะได้ออกมา 'ข้างนอก' อีกครั้งแบบนี้..."
61110-104 = "......"
61110-105 = "แต่ทำไมก็ไม่รู้นะคะ... ฉันถึงรู้สึกว่ามันต่างจากตอนนั้นเอามากๆ เลย"
61110-109 = "อึก...!"
61110-110 = "เป็นอะไรหรือเปล่าคะ? มีเรื่องอะไรหรือเปล่า?"
61110-111 = "มะ... ไม่เป็นไรค่ะ ฉันสบายดี ก็แค่นึกถึงตอนนั้นขึ้นมาน่ะค่ะ แหะ... แหะๆ..."
61110-112 = "......"
61110-113 = "[s] \"นึกถึงตอนนั้น?\""
61110-114 = "...!"
61110-115 = "ไม่มีอะไรหรอกค่ะคุณครู ก็แค่..."
61110-116 = "......"
61110-117 = "แค่เมื่อคืนไมอาฝันร้ายน่ะค่ะ"
61110-118 = "[s] \"แต่ว่า...\""
61110-119 = "ฉันไม่เป็นไรค่ะ คุณครู"
61110-123 = "[ns] \"จริงนะ?\""
61110-124 = "ค่ะ"
61110-125 = "การให้คำปรึกษาเด็กๆ เป็นงานของฉันอยู่แล้วค่ะ"
61110-126 = "ค่ะ ค่ะ... ชะ... ใช่ค่ะ..."
61110-131 = "ว่าแต่ คุณครูคะ เราจะไปที่ไหนกันก่อนเหรอคะ?"
61110-132 = "ฉันไม่รู้ว่าอะไรเป็นอะไรเลยค่ะ... ทุกอย่างมันดูเตะตาไปหมดเลย..."
61110-134 = "......"
61110-135 = "อืม เรื่องนั้นคุณครูน่าจะเป็นคนจัดการให้เองนะคะ?"
61110-136 = "คนที่ชวนมา 'ทัศนศึกษา' ก็คือคุณครูเองนี่คะ"
61110-137 = "[s] \"แน่นอนอยู่แล้ว วางใจครูได้เลย!\""
61110-138 = "อาคารนั้นทำจากกระจกทั้งหมดเลยเหรอคะ? แวววาวมากเลยค่ะ..."
61110-139 = "ถ้าโรงเรียนเรามีอะไรแบบนั้น... มันคงพังหรือไม่ก็คงเละเทะไปแล้ว..."
61110-140 = "ทุกคนใน 'สควอด' คงได้เห็นอะไรแบบนี้ทุกวันเลยสินะคะ..."
61110-141 = "ถ้าได้มาด้วยกันก็น่าจะดีนะ"
61110-142 = "ช่วยไม่ได้หรอกค่ะ ต้องมีคนคอยปกป้องอาเรียสไว้นี่คะ..."
61110-143 = "แต่ว่าเราจะฝากให้สควอดในตอนนี้ทำงานแบบนั้นได้เหรอคะ รุ่นพี่...?"
61110-144 = "......"
61110-145 = "เรื่องนั้นคุณครูก็น่าจะรับผิดชอบให้นะคะ"
61110-146 = "ใช่มั้ยคะ คุณครู?"
61110-147 = "[s] \"แน่นอนอยู่แล้ว วางใจครูได้เลย!\""
61110-148 = "......"
61110-149 = "เฮ้อ..."
61110-151 = "(สควอดบอกว่าจะเป็นฝ่ายปกป้องอาเรียส โดยอ้างว่านี่เป็นเหมือนการเฝ้าบ้านอย่างหนึ่ง)"
61110-152 = "(แต่ที่จริงมีเหตุผลอื่นที่สควอดมาทัศนศึกษาด้วยไม่ได้...)"
61110-154 = "ยังไงพวกฉันก็เป็นผู้ร้ายถูกหมายหัวอยู่นี่นา..."
61110-155 = "อื้อ พวกฉันขยับตัวทำอะไรหรือไปไหนมาไหนมากไม่ได้หรอก แล้วฉันก็อยากระวังเรื่องการเปิดเผย#nตัวตนด้วย"
61110-156 = "ฉันอยากไปทัศนศึกษากับคุณครูบ้างแท้ๆ..."
61110-157 = "แหะ... แหะๆ... แต่ก็ช่วยไม่ได้นะคะ... ไม่เป็นไรหรอกค่ะ คุณครู ฉันชินแล้วละค่ะ"
61110-162 = "กลายเป็นว่าพวกฉันคือฝ่ายที่ได้ไปไหนมาไหนอย่างอิสระมากกว่า ดูขัดแย้งจังเลยนะคะ"
61110-163 = "แต่ว่า... 'สควอด' คิดจะหลบซ่อนตัวอย่างนี้ไปอีกนานแค่ไหนเหรอคะ?"
61110-164 = "นี่คุณ...!"
61110-165 = "......"
61110-166 = "พอได้แล้ว มิซากิ"
61110-167 = "ชิ..."
61110-171 = "กำลังคิดถึงสควอดอยู่เหรอคะ?"
61110-172 = "[s] \"?!?!\""
61110-173 = "ทำหน้าเหมือนจะถามว่าฉันรู้ได้ยังไงเลยนะคะ"
61110-174 = "ก็มันดูออกเสียขนาดนั้น โดยเฉพาะในเวลาแบบนี้น่ะ"
61110-175 = "......"
61110-176 = "ฉันอยากถามอะไรอย่างหนึ่งค่ะ"
61110-177 = "สำหรับคุณครูแล้ว สควอดคือเด็กอาเรียสหรือเปล่าคะ?"
61110-178 = "ไม่ค่ะ ไม่ใช่อย่างนั้น ฉันไม่ได้จะหมายความอะไรเป็นพิเศษหรอก แค่จู่ๆ ก็สงสัยขึ้นมาน่ะค่ะ"
61110-179 = "[s] \"ระ... เรื่องนั้น...\""
61110-183 = "อ้าว คุณครู ทั้งสองคนดูสนิทสนมกันดีจังเลยนะ คงจะเหนื่อยน่าดูเลยที่ต้องพานักเรียนออกมา#nทัศนศึกษาข้างนอกแบบนี้"
61110-184 = "คะ...?"
61110-185 = "!?!?!!!!!"
61110-186 = "มะ... หมายความว่ายังไงคะ?!"
61110-187 = "ทำไมถามแบบนี้ล่ะ...? อ้อ อย่างนี้สินะ หนูเป็นนักศึกษาฝึกงานล่ะสิท่า? เรียนรู้งานจากคุณครูไว้เยอะๆ ล่ะ"
61110-188 = "คะ... คุณครู!? คนอื่นเข้าใจผิดมากขึ้นเรื่อยๆ แล้วนะคะ?! ช่วยพูดอะไรสักอย่างสิคะ!"
61110-189 = "ทำไมถึงยิ้มแบบนั้นล่ะคะ! มะ... มะมะมะมะ... ไม่ใช่อย่างนั้นนะคะ! พวกเราไม่ได้เป็น...!"
61110-190 = "ฮ่าฮ่า ฉันดูออกหรอกน่า ไม่ได้การแล้ว สงสัยฉันไม่ควรอยู่ต่อเป็นก้างขวางคอแล้วละ"
61110-191 = "จริงๆ เลย! ก็บอกว่าไม่ใช่ไงคะ!!!"
61110-197 = "......"
61110-198 = "......"
61110-199 = "สุดยอดเลยยยยย!!!"
61110-200 = "แปลกจัง... ทำไมอาคารถึงอยู่ในสภาพสมบูรณ์หมดเลยล่ะ..."
61110-201 = "ปกติแล้วอาคารต้องพังลงมาครึ่งหนึ่งจนเป็นซากปรักหักพัง แล้วก็ต้องได้รับการซ่อมแซมเหมือนจะยื้อไว้ให้ได้นานที่สุด"
61110-202 = "แต่สุดท้ายก็จะพังทลายลง แล้วทุกคนก็จะขอบคุณที่ทำหน้าที่อาคารจนถึงวินาทีสุดท้าย และเอาเครื่องเซ่นมาวางให้ไม่ใช่เหรอ...?"
61110-203 = "[s] \"เอาละ เราจะข้ามถนนไปฝั่งตรงข้ามด้วยกันนะ~\""
61110-204 = "ข้ามถนน? แบบนี้หรือเปล่านะ...?"
61110-209 = "เหวอ?! จับฉันไว้ทำไมคะ คุณครู?!"
61110-210 = "[s] \"ห้ามเดินข้ามถนนตอนไฟแดงนะ!\""
61110-211 = "งั้นเหรอคะ...?"
61110-212 = "คนที่นี่ทำแบบนี้กันสินะ..."
61110-213 = "แต่ถึงยังไงพวกฉันก็ไม่เจ็บตัวมากหรอกค่ะ พวกฉันถึกกันมากเลยนะ"
61110-214 = "คะ? เราควรนึกถึงพวกยานพาหนะและคนใช้รถใช้ถนนด้วยงั้นเหรอคะ? เหมือนจะเข้าใจ... แต่ก็เหมือนจะไม่เข้าใจเลย..."
61110-219 = "สะ... สระว่ายน้ำ...?"
61110-220 = "นี่มันอะไรกันเนี่ย...?"
61110-221 = "ได้ยินว่าเป็นสิ่งอำนวยความสะดวกที่สร้างไว้เพื่อให้มาออกกำลังกายโดยเฉพาะน่ะ และการออกกำลังกายในสระก็เรียกว่าการว่ายน้ำ"
61110-223 = "มีน้ำสะอาดๆ เต็มสระเลย! เหลือจะเชื่อ!"
61110-230 = "หืม? อะไรอีกเหรอคะคุณครู?"
61110-231 = "[s] \"จะดื่มน้ำในสระว่ายน้ำไม่ได้นะ...\""
61110-236 = "ตะ... แต่ว่ามีน้ำตั้งเยอะขนาดนี้เลยนะคะ?!"
61110-237 = "ดูจากความใสสะอาดแล้ว ฉันว่าดื่มไปก็ไม่น่าจะท้องเสีย แถมน้ำยังมีกลิ่นสดชื่นด้วย..."
61110-238 = "คะ? นี่คือกลิ่นของยาฆ่าเชื้อที่เรียกว่าคลอรีนงั้นเหรอคะ?"
61110-242 = "ต้องฆ่าเชื้อน้ำด้วยเหรอ?!?!"
61110-248 = "สูงจังเลยยยยยย!!!"
61110-249 = "ดูท้องฟ้าโน่นสิ! เป็นสีฟ้าแบบที่ไม่เคยเห็นมาก่อนเลย!"
61110-250 = "นี่สินะที่เรียกกันว่าแม่น้ำ... ว้าว..."
61110-251 = "นั่นคือสิ่งที่เรียกว่าสะพานใช่มั้ย? สร้างขึ้นมาได้ยังไงน่ะ..."
61110-252 = "[s7] \"เอาละๆ ครูรู้ว่าตื่นเต้น แต่ก็ลดเสียงกันสักหน่อยนะ~\"\n[s8] \"ครูว่าเราอย่าพูดเสียงดังเกินไปดีกว่านะ~\""
61110-255 = "ค่า~!"
61110-259 = "เป็นอะไรไปเหรอคะคุณครู? จู่ๆ ก็ทำหน้าเหมือนจะร้องไห้เลย"
61110-260 = "คะ? ตื้นตันใจที่พวกฉันเชื่อฟังคำพูดของคุณครูเหรอคะ?"
61110-261 = "จะว่าไปก็น่าแปลกใจนะคะ... เมื่อก่อนฉันไม่อยากฟังคำพูดของผู้ใหญ่เลย..."
61110-262 = "ก็ตอนนั้นทุกคนเอาแต่ทุบตีและข่มขู่เรานี่นา..."
61110-264 = "ฉันรู้ว่านี่คืออะไร! มันเรียกว่าแฮมเบอร์เกอร์!"
61110-265 = "อื้อ ฉันก็เคยกิน บางครั้งรุ่นพี่ก็ซื้อมาให้น่ะ"
61110-272 = "ถึงจะรสชาติเหมือนเดิม แต่รู้สึกว่ามีบางอย่างต่างออกไปแฮะ... ทำไมกันนะ..."
61110-273 = "หรือว่าเพราะเปลี่ยนที่กิน?"
61110-274 = "อาจจะเป็นแบบนั้นก็ได้นะ"
61110-279 = "[ns9] \"เดี๋ยวก่อน ทุกคน! สต็อป!\"\n[ns10] \"ห้ามเอาปากรองแล้วดื่มน้ำจากหัวจ่ายเครื่องดื่มนะ!\""

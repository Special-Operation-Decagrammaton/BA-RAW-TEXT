[translation]
10036010-1 = "ตอนที่ 1;ทะเล ซาโอริ และ..."
10036010-6 = "โอเค! สต็อป! ยกของชิ้นใหญ่ๆ ลงไปก่อนเลย!"
10036010-7 = "เราไม่มีเวลามาก แต่งานที่ต้องทำมีเป็นกองเท่าภูเขา! งั้นก็รีบๆ กันเถอะ!"
10036010-8 = "ค่ะ รุ่นพี่!"
10036010-9 = "แต่ลำพังแค่เรา 2 คนน่าจะไม่ไหวนะ... นี่ เด็กพาร์ทไทม์ตรงนั้นน่ะ!"
10036010-14 = "หืม...? หมายถึงฉันเหรอ?"
10036010-15 = "ทำไมหน้าซีดแบบนั้นล่ะ ไม่สบายตรงไหนหรือเปล่า? นี่ยังเช้าอยู่เลย เป็นลมแดดซะแล้วเหรอ?"
10036010-16 = "อ่า... ไม่หรอก ฉันแค่..."
10036010-17 = "แค่คิดว่าจะทำอะไรอย่างเปิดเผยในตอนกลางวันแสกๆ แบบนี้ได้หรือเปล่าน่ะ"
10036010-18 = "ไม่กลัวว่าจะมีกองกำลังรักษาความปลอดภัยจากโรงเรียนอื่นเข้ามาที่นี่กันเลยเหรอ?"
10036010-19 = "อะไรกัน เพิ่งเคยมาที่นี่เป็นครั้งแรกหรือไง?"
10036010-20 = "ที่นี่คือ <ชายหาดนอกกฎหมาย> นะ นี่มันดินแดนแห่งอิสรภาพสำหรับคนอย่างพวกเรา!"
10036010-21 = "ดินแดน... แห่งอิสรภาพ?"
10036010-25 = "ชายหาดแห่งนี้กินพื้นที่ของเขตปกครองของโรงเรียนถึง 3 แห่ง ต่อให้เกิดเหตุวุ่นวายขึ้นมา มันก็ยากที่โรงเรียนใดโรงเรียนหนึ่งจะออกหน้ามาคลี่คลายสถานการณ์น่ะ"
10036010-26 = "ใช่ เพราะถ้าออกมาก็คงจะเกิดการประท้วงขึ้น ลองนึกภาพการประท้วงในเขตปลอดกฎหมายสิ ถ้าจะให้พูดง่ายๆ ก็คือ ที่นี่เป็นพื้นที่สีเทาน่ะ"
10036010-27 = "แต่ก็นะ พวกวัลคิรี่อาจจะออกโรงมาเองก็ได้ แต่พวกนั้นก็ทำอะไรชักช้าอยู่แล้วนี่?"
10036010-28 = "กว่าพวกทึ่มวัลคิรี่จะมาถึง เทศกาลก็คงจะจบไปแล้วละ ฮิฮิ"
10036010-30 = "อืม เพราะแบบนี้ กลุ่มเด็กเจ้าปัญหาอย่างแก๊งหมวกกันน็อกก็เลยทำอะไรได้อย่างสบายใจสินะ..."
10036010-32 = "ว่าไงนะ?! กลุ่มเด็กเจ้าปัญหางั้นเหรอ?!"
10036010-34 = "อ่า... ไม่ใช่หรอกเหรอ...? ถ้างั้นก็ขอโทษด้วย"
10036010-36 = "ขอโทษแล้วพวกฉันจะดูดีขึ้นมาหรือไง!"
10036010-37 = "ฮึ่ม! มันก็จริงอยู่หรอกนะที่พวกฉันเป็นกลุ่มเด็กเจ้าปัญหาที่น่าภาคภูมิใจ!"
10036010-39 = "เอาเถอะ พวกเธอต้องย้ายของพวกนี้ใช่มั้ย? งั้นฉันจะช่วยอีกแรง"
10036010-44 = "ว้าว ยกบาร์เหล็กพร้อมกันได้ตั้ง 3 อันเลยเหรอ...!"
10036010-45 = "เธอนี่มันแรงงานระดับสูงเลยนะ เกินคาดเลย"
10036010-47 = "ให้วางไว้ตรงไหนเหรอ?"
10036010-49 = "อืม เอาไปไว้ตรงชายหาด ตั้งให้ห่างกันช่วงละ 2 เมตรนะ"
10036010-54 = "ดีละ ขนบาร์เหล็กมาหมดแล้ว"
10036010-55 = "งั้นต่อไปก็..."
10036010-58 = "นี่ เด็กพาร์ทไทม์ตรงนั้นน่ะ! มาช่วยงานทางนี้หน่อยได้มั้ย?"
10036010-59 = "ฉันประกอบเต็นท์ผ้าใบคนเดียวไม่ไหวน่ะ!"
10036010-60 = "จะไปเดี๋ยวนี้ละ"
10036010-62 = "ฮึบ!"
10036010-63 = "ยกตรงนั้นอีกหน่อย... ฮึบ!"
10036010-67 = "ฮู่ว เสร็จจนได้ ขอบใจนะเด็กพาร์ทไทม์! ทีนี้ฉันก็เริ่มขายฮอตดอกได้แล้วละ!"
10036010-68 = "ไม่ต้องขอบใจหรอก ในสัญญาระบุไว้ว่านอกจากงานคุ้มกันแล้ว ฉันต้องให้ความร่วมมือกับงานอื่นๆ ของแก๊งหมวกกันน็อกด้วย"
10036010-69 = "ฉันต้องรักษาข้อกำหนดในสัญญาอยู่แล้ว"
10036010-70 = "งั้นเหรอ? แปลกคนแฮะ ไม่ได้หาเด็กพาร์ทไทม์ที่ขยันแบบนี้กันได้ง่ายๆ เลยนะเนี่ย"
10036010-71 = "แปลกคนงั้นเหรอ...?"
10036010-72 = "นี่! มาช่วยทางนี้ด้วยสิ!"
10036010-73 = "ฉันอยากได้กำลังคนมาช่วยเตรียมสนามแข่งวอลเลย์บอลชายหาดน่ะ!"
10036010-74 = "อื้ม เข้าใจแล้ว"
10036010-79 = "ฮู่ว... เสร็จงานของแถวนี้หมดแล้ว"
10036010-80 = "งั้นต่อไปก็เหลือแค่รอให้คนที่ฉันต้องคุ้มกันมาถึงสินะ"
10036010-84 = "อ่า..."
10036010-89 = "(จะว่าไป ฉันเคยได้ยินเรื่องแบบนั้นมานี่นา)"
10036010-90 = "(ที่ปลายผืนแผ่นดิน ยังมีทะเลที่กว้างใหญ่ไพศาลและลึกจนไม่มีที่สิ้นสุดอยู่)"
10036010-91 = "(ฉันจดจำใส่สมองแบบนั้นมาตลอด แต่การได้มาเห็นกับตาตัวเองแบบนี้คงเป็นครั้งแรกเลย...)"
10036010-92 = "..."
10036010-100 = "..."
10036010-101 = "สงบดีจัง..."
10036010-102 = "อาสึโกะ มิซากิ ฮิโยริ อาซึสะ..."
10036010-103 = "อยากให้ทุกคนได้มาเห็นวิวแบบนี้ด้วยกันจัง..."
10036010-105 = "[log](ขณะเดียวกัน ณ อีกฝั่งหนึ่งของชายหาดนอกกฎหมาย...)[/log]"
10036010-111 = "ดูนี่สิ คุณครู! ปูของจริงเลย น่ารักเนอะ ว่ามั้ย?"
10036010-112 = "[s] \"อื้ม น่ารักดีแฮะ\""
10036010-116 = "อาสึโกะ เดี๋ยวไอศกรีมก็หล่นหรอก ระวังหน่อยสิ"
10036010-119 = "ไอศกรีมของฉันเพิ่งโดนแดดแค่แป๊บเดียว แต่มันละลายหมดแล้วเลยค่ะ! แงงง~!!"

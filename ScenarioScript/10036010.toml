10036010-25 = "2;헬멧단 단원 A;00;이 해변은 세 개나 되는 학원 자치구가 절묘하게 중첩된 곳이라서, 소동이 벌어져도 어디 한 군데가 출동하기에 되게 애매한 곳이거든~\n#2;em;[재잘]"
10036010-26 = "2;헬멧단 단원 A;00\n4;헬멧단 단원 B;00;맞아. 출동했다간 단번에 무력시위가 되어버릴 테니까. 즉 말하자면 회색지대라는 거지.\n#4;al\n#2;m2"
10036010-27 = "2;헬멧단 단원 A;00\n4;헬멧단 단원 B;00;뭐, 발키리 같은 녀석들이라면 출동할 수도 있겠지만. 그 녀석들 원래 좀 느리잖아?"
10036010-28 = "2;헬멧단 단원 A;00;발키리 참새가 떴을 땐 이미 축제도 다 끝나고 난 다음일걸? 히히.\n#2;jump\n#2;em;[음표]"

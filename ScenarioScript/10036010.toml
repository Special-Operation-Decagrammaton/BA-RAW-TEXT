[translation]
10036010-1 = "第1話;大海、沙織，還有……"
10036010-6 = "好！停！先把大件的東西卸下來！"
10036010-7 = "現在時間緊迫工作又多，動作快！"
10036010-8 = "是，前輩！"
10036010-9 = "光靠我們兩個人好像不太夠……喂，那邊的打工仔！"
10036010-14 = "……嗯？是在叫我嗎？"
10036010-15 = "你的臉色有點糟耶，哪裡不舒服嗎？#n該不會是一大早就中暑了吧？"
10036010-16 = "沒，沒有。我只是……"
10036010-17 = "只是覺得在光天化日之下走來走去，有點不自在而已。"
10036010-18 = "難道其他學園的治安部隊都不會來這裡巡視嗎？"
10036010-19 = "怎麼，你是第一次來這裡嗎？"
10036010-20 = "這裡可是「不法者海灘」──屬於我們這些不良分子的自由之地哦！"
10036010-21 = "自由之……地？"
10036010-25 = "因為這個海灘剛好是三個學園自治區的重疊部分。#n所以就算發生了什麼騷動，各學園也不好擅自派遣兵力鎮壓～"
10036010-26 = "畢竟要是隨便派遣兵力過來，一個不小心可是會被當成武裝示威的。#n所以簡單來說，這裡就跟灰色地帶沒兩樣。"
10036010-27 = "雖然女武神那些傢伙還是有可能會出現，不過他們的動作一向都慢半拍不是嗎？"
10036010-28 = "等女武神來到這裡，我看慶典八成早就結束了吧？嘻嘻。"
10036010-30 = "原來如此。#n所以才會連頭盔團這種問題學生集團，也能放心地在這裡活動嗎……"
10036010-32 = "什麼！？問題集團！？"
10036010-34 = "唔，難道不是嗎……？#n我願意向你們道歉。"
10036010-36 = "要是接受你的道歉，我們的臉該往哪擺啊！"
10036010-37 = "沒錯！我們就是以問題學生集團自豪的頭盔團！"
10036010-39 = "總之，只要把這些東西都搬下來就行了嗎？那我也來幫忙吧。"
10036010-44 = "哇，竟然能一次扛起三根大鐵棒……！"
10036010-45 = "看來是個意料之外的高級戰力呢。"
10036010-47 = "這些要放在哪裡？"
10036010-49 = "啊，每根間隔2m放在海灘上就行了！"
10036010-54 = "好，都搬完了。"
10036010-55 = "接下來是……"
10036010-58 = "那邊的打工仔！可以來幫忙一下嗎？"
10036010-59 = "組裝這個帳篷需要強壯的人手！"
10036010-60 = "我馬上來。"
10036010-62 = "嘿咻！"
10036010-63 = "那邊再抬高一點……嘿咻！"
10036010-67 = "呼～完成了。謝啦打工仔！#n多虧有你，我們總算可以開始賣熱狗了！"
10036010-68 = "不必客氣。#n根據合約上的內容，保鏢工作和協助頭盔團都在我的工作範圍之內。"
10036010-69 = "既然簽了合約就該遵守。這是理所當然的。"
10036010-70 = "是嗎？真不知道該說你這傢伙是老實還是鄉愿。"
10036010-71 = "鄉愿……？"
10036010-72 = "喂！這裡也需要幫忙！"
10036010-73 = "我們要建一個沙灘排球場，現在人手不夠！"
10036010-74 = "啊啊，我知道了。"
10036010-79 = "……呼。#n附近的工作大致都完成了嗎。"
10036010-80 = "那現在就等保護對象抵達吧。"
10036010-84 = "啊……"
10036010-89 = "（這麼說來，以前曾聽說過這樣一句話）"
10036010-90 = "（在陸地的盡頭有著無邊無際的廣闊海洋）"
10036010-91 = "（雖然早已明白這些，不過這還是第一次親眼見到啊……）"
10036010-92 = "……"
10036010-100 = "……"
10036010-101 = "真和平啊……"
10036010-102 = "敦子、美咲、日和、梓……"
10036010-103 = "這樣的風景，真希望能和大家一起……"
10036010-105 = "[log]（同一時間，在不法者海灘的某處……）[/log]"
10036010-111 = "老師，你看！真的有螃蟹耶。好可愛，對吧？"
10036010-112 = "[s]「嗯，好可愛。」"
10036010-116 = "敦子，小心點，冰淇淋要滴下來了。"
10036010-119 = "明明才被陽光曬了一下，我的冰淇淋就已經快融化光了！#n嗚啊啊啊！"

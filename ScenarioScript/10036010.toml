[translation]
10036010-1 = "Episode 1;Saori, the Sea, and..."
10036010-6 = "Okay! Stop! Let's unload the big ones first!"
10036010-7 = "Clock's ticking, and we've got a lot to do. Let's hurry up!"
10036010-8 = "All right, all right!"
10036010-9 = "Hmm, this is gonna take more than two of us... You there, part-timer!"
10036010-14 = "...Hm? Me?"
10036010-15 = "You don't look so good. You sick or something? Already getting sunstroke?"
10036010-16 = "N-No. It's just..."
10036010-17 = "Why are we doing this in broad daylight?"
10036010-18 = "What if the academies send out security?"
10036010-19 = "First time, huh?"
10036010-20 = "This is Outlaw Beach. It's the land of freedom for girls like us!"
10036010-21 = "Land of...freedom?"
10036010-25 = "Three different academy jurisdictions all overlap here. Which means none of them can do anything without the other two getting pissed off!"
10036010-26 = "Yeah. They all know it'd escalate into a military show of force. So this whole place is a gray zone for everybody."
10036010-27 = "...Well, except maybe Valkyrie. They could show up. But they're slow."
10036010-28 = "The whole festival would be over by the time they got here. Heehee!"
10036010-30 = "I see. So troublemakers can do what they want here..."
10036010-32 = "What'd you just call us?"
10036010-34 = "Should I not have called you that? My apologies."
10036010-36 = "What kind of gang would we be if we accepted apologies?!"
10036010-37 = "Yeah, that's right, we're troublemakers. We'll say it with our whole chest! But—"
10036010-39 = "In any case, it sounded like you needed help moving things."
10036010-44 = "Whoa, she can carry those three big iron bars at once?!"
10036010-45 = "We're better off than we thought here."
10036010-47 = "Where do you want these?"
10036010-49 = "In the sand, two meters apart from each other!"
10036010-54 = "All right, I've placed them all."
10036010-55 = "Now what?"
10036010-58 = "Hey there, part-timer! Can you give us a hand?"
10036010-59 = "We're having a hard time setting up that canopy!"
10036010-60 = "Lead the way."
10036010-62 = "Hut! Here we go!"
10036010-63 = "Let's just lift that side up a little more, and... Hut!"
10036010-67 = "Phew, that's enough. Thanks, part-timer! Now we can start selling hot dogs."
10036010-68 = "No need to thank me. I have to cooperate with all of you. It's in my contract."
10036010-69 = "Right there in black and white."
10036010-70 = "Yeah? Well, you seem like kind of a square, but you're a hard worker."
10036010-71 = "A square?"
10036010-72 = "Hey! Help us out over here!"
10036010-73 = "We've gotta make a volleyball field."
10036010-74 = "On my way."
10036010-79 = "...Phew. Well, that should take care of everything for the time being."
10036010-80 = "Now to wait for the VIP."
10036010-84 = "Mmm..."
10036010-89 = "(I once heard someone say...)"
10036010-90 = "(\"Where the land ends, there's an ocean, so deep and wide that its ends are unknown.\")"
10036010-91 = "(I knew it in my head, but this is my first time actually seeing it.)"
10036010-92 = "..."
10036010-100 = "..."
10036010-101 = "So peaceful..."
10036010-102 = "Atsuko, Misaki, Hiyori, Azusa..."
10036010-103 = "I wish they were all here to share the view."
10036010-105 = "[log](Elsewhere on Outlaw Beach...)[/log]"
10036010-111 = "Sensei, look! A real crab. Adorable, isn't it?"
10036010-112 = "[s] \"Yeah, it's cute!\""
10036010-116 = "Atsuko, you're going to spill your ice cream. Be careful."
10036010-119 = "I left mine in the sun for two seconds, and it melted! Waaah!"

[translation]
1003505-1 = "A Sudden Proposal"
1003505-2 = "Inside the old library"
1003505-3 = "I came to the old library again to meet with Ui."
1003505-4 = "As usual, the inside of the library felt antiquated yet lively at the same time."
1003505-5 = "There you are, Sensei. I've been waiting."
1003505-6 = "Here it is."
1003505-7 = "It's this one."
1003505-8 = "P-Please take a look, Sensei. It's completely blank inside..."
1003505-9 = "...b-but that's why we'll create something precious together!"
1003505-10 = "[s1] \"Wait... What...?\"\n[s2] \"What are you talking about?!\""
1003505-11 = "Ah!"
1003505-12 = "Ah!"
1003505-13 = "S-Sorry. I should have explained sooner. I'm talking about the b-books,#nlike usual."
1003505-14 = "It's for a p-pen pal kind of relationship."
1003505-15 = "We'll take turns writing to each other...about anything...like our thoughts."
1003505-16 = "I-Is that too much? Maybe this is a bad idea..."
1003505-17 = "I...just want to learn more..."
1003505-18 = "...about you, Sensei!"
1003505-19 = "So, I-I thought we could be...pen pals and exchange letters!"
1003505-20 = "Huh?"
1003505-21 = "Did I screw something up again?"
1003505-22 = "Oh."
1003505-23 = "Y-You're right. It would be a rather large book to carry around everywhere."
1003505-24 = "A-Actually, I can't believe I overlooked that. It's so obvious."
1003505-25 = "I guess something just came over me, and I thought the bigger the book,#nthe better. Because then it would last us a long time and we could exchange messages over and over..."
1003505-26 = "It made sense in my head, at least."
1003505-27 = "I'm sorry about this..."
1003505-28 = "[s] \"...\""
1003505-29 = "I-I'll get something smaller, then. Like maybe the size of a notepad..."
1003505-30 = "What? I don't have to do that?"
1003505-31 = "B-But you said it would be too big to carry around."
1003505-32 = "The last thing I want is to be a burden for you."
1003505-33 = "Huh?"
1003505-34 = "Do you know of a way to use it without carrying it back and forth?#nHow else would you get the opportunity to write your parts?"
1003505-35 = "Oh, I see. Instead of treating it like pen pals..."
1003505-36 = "...we could use it as a guest book."
1003505-37 = "I think I get it."
1003505-38 = "So you'll write a new entry...every time you visit me?"
1003505-39 = "No, no. I'm fine with it if you are, but...a-are you sure about this?#nYou don't have to use this book if you don't want to."
1003505-40 = "[s3] \"I'd prefer it if we did, though.\"\n[s4] \"You picked this one for a reason.\""
1003505-41 = "...!"
1003505-42 = "...!"
1003505-43 = "..."
1003505-44 = "I... *sniffle* *sob*"
1003505-45 = "[s5] \"Ui?!\"\n[s6] \"Why are you crying?!\""
1003505-46 = "Oh, I'm sorry, Sensei. I just..."
1003505-47 = "Oh, I'm sorry, Sensei. I just..."
1003505-48 = "I'm so happy."
1003505-49 = "No one has ever understood or cared about me like this before..."
1003505-50 = "Thank you so much, Sensei. I'm going to treasure this guest book once it's finished."
1003505-51 = "I-I know I don't have to, but... I want to. Thank you so much."
1003505-52 = "*sniffle* *sniffle*"
1003505-54 = "I comforted Ui as she cried, and we discussed what to write about in the guest book."
1003505-55 = "Since we regularly talk on MomoTalk anyway, we decided to use the guest book as a record of reviews for books we've read."

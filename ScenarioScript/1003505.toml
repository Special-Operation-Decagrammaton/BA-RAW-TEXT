[translation]
1003505-1 = "ข้อเสนอที่กะทันหัน"
1003505-2 = "ข้างในห้องสมุดเก่า"
1003505-3 = "(คุณครูมาห้องสมุดเก่าอีกครั้งตามคำแนะนำของอุย)"
1003505-4 = "(รู้สึกได้ถึงความมีชีวิตชีวาและความโบราณในทุกครั้งที่มา)"
1003505-5 = "มาแล้วเหรอคะคุณครู กำลังรออยู่เลยค่ะ"
1003505-6 = "ฉัน... รออยู่กับ..."
1003505-7 = "เด็กคนนี้น่ะค่ะ..."
1003505-8 = "นี่ค่ะคุณครู ตอนนี้มันยังขาวสะอาดอยู่..."
1003505-9 = "แต่จากนี้ไปคุณครูกับฉันจะ... ทำด้วยกัน..."
1003505-10 = "[s1] \"ทะ... ทำอะไร ยังไงนะ?\"\n[s2] \"หมายความว่ายังไง...!?\""
1003505-11 = "เอ่อ..."
1003505-12 = "เอ่อ..."
1003505-13 = "ขอโทษด้วยค่ะ ฉันไม่ได้อธิบายให้ดีอีกแล้ว... ฉันหมายถึงหนังสือเหมือนเคยค่ะ"
1003505-14 = "นี่ก็คือ... สิ่งที่เรียกกันว่า... เพื่อนทางจดหมาย..."
1003505-15 = "คน 2 คนจะสลับกัน... เขียนสิ่งที่อยากบอกกับอีกฝ่าย... ลงไปในหนังสือนี้ค่ะ..."
1003505-16 = "แบบนี้จะเป็นการรบกวนคุณครูหรือเปล่าคะ...? เรื่องจุกจิกแบบนี้คงไม่อยากทำแน่เลย..."
1003505-17 = "คือ... ฉันอยากรู้จักคุณครูให้มากขึ้นค่ะ..."
1003505-18 = "แค่นิดเดียวก็ได้..."
1003505-19 = "เพราะงั้น...! มาเล่นเพื่อนทางจดหมายกับฉันนะคะ! สลับกันทำไปเรื่อยๆ...!"
1003505-20 = "...? คะ?"
1003505-21 = "อ๊ะ... อ่า... ฉันพูดอะไรผิดพลาดออกไปอีกแล้วหรือเปล่าคะ...?"
1003505-22 = "อ่า..."
1003505-23 = "อย่างนั้นเหรอคะ... คุณครูคงไม่สะดวกเอาติดตัวไปไหนมาไหน... เป็นเพราะเด็กคนนี้เล่มใหญ่ไป...?"
1003505-24 = "นั่นน่ะสิ... จริงด้วยค่ะ... แหะๆๆ... ทำไมฉันถึงไม่คิดให้รอบคอบก่อนนะ..."
1003505-25 = "ยัยทึ่มเอ๊ย... ฉันคิดไปเองว่าถ้าเล่มใหญ่และหนา ก็จะใช้เขียนกับคุณครูได้นานๆ..."
1003505-26 = "พอถูกใจเด็กคนนี้ก็รีบคว้ามาเลย..."
1003505-27 = "ขอโทษนะ..."
1003505-28 = "[s] \"......\""
1003505-29 = "ขะ... ขอโทษนะคะ ฉันจะไปเปลี่ยนเป็นเล่มที่เล็กลงค่ะ เอาเล่มเล็กๆ แบบสมุดโน้ตก็น่าจะพอ..."
1003505-30 = "คะ...? ไม่เป็นไรเหรอคะ?"
1003505-31 = "แต่คุณครูบอกเองนี่คะว่าน้องเล่มนี้ใหญ่ไปจนพกติดตัวลำบาก..."
1003505-32 = "ฉันเองก็ไม่อยากทำให้คุณครูลำบากค่ะ..."
1003505-33 = "คะ...?"
1003505-34 = "ไม่ต้องพกติดตัวไว้ตลอดก็ได้เหรอคะ...? แล้วจะเขียนยังไง..."
1003505-35 = "ใช้เล่มนี้เป็นสมุดเยี่ยม...?"
1003505-36 = "แทนหนังสือที่ต้องสลับกันพกติดตัวไว้...?"
1003505-37 = "อ่า..."
1003505-38 = "งั้นก็หมายความว่า... คุณครูจะเขียนข้อความลงในนี้ทุกครั้งที่มาที่นี่สินะคะ"
1003505-39 = "แบบนั้นฉันก็ไม่ติดอะไรหรอกค่ะ... ตะ... แต่คุณครูจะไม่เป็นอะไรจริงๆ ใช่มั้ยคะ? ถ้าจะยืนกรานใช้#nหนังสือเล่มนี้ละก็..."
1003505-40 = "[s3] \"ครูเองก็อยากทำความรู้จักเด็กคนนี้บ้าง\"\n[s4] \"ก็เด็กคนนี้อุยตั้งใจเลือกมาเองเลยนี่นา\""
1003505-41 = "......!!"
1003505-42 = "......!!"
1003505-43 = "อ่า..."
1003505-44 = "...อ่า... ฮึก... ฮืออออ...!"
1003505-45 = "[s5] \"อุย...!?\"\n[s6] \"ร้องไห้ทำไมล่ะ!?\""
1003505-46 = "อ๊ะ ขออภัยด้วยค่ะคุณครู... คือว่าฉัน... จู่ๆ ก็..."
1003505-47 = "อ๊ะ ขออภัยด้วยค่ะคุณครู... คือว่าฉัน... จู่ๆ ก็..."
1003505-48 = "รู้สึกใจฟูมาก..."
1003505-49 = "นี่เป็นครั้งแรกที่มีคนพูดคุยกับฉันด้วยความเข้าใจ..."
1003505-50 = "ขอบคุณมากนะคะ คุณครู... ถ้าสมุดเยี่ยมถูกเขียนจนครบหน้า... ฉันจะรักษาไว้ราวกับเป็นสมบัติ#nเลยละค่ะ..."
1003505-51 = "อ่า... ไม่ต้องขนาดนั้นก็ได้เหรอคะ...? ก็ได้ค่ะ แต่ยังไงก็ขอบคุณนะคะ"
1003505-52 = "ฮือๆ... ฮืออออ..."
1003505-54 = "(คุณครูปลอบอุยที่ร้องไห้ แล้วพูดคุยเกี่ยวกับเนื้อหาที่จะเขียนลงในสมุดเยี่ยม)"
1003505-55 = "(แต่ในเมื่อก็คุยกันใน MOMOTALK... เลยเปลี่ยนเนื้อหาเป็นการรีวิวหนังสือที่ได้ไปอ่านมาแทน)"

[translation]
1003505-1 = "突然的提案"
1003505-2 = "古書館內部"
1003505-3 = "（為了找憂而拜訪了古書館）"
1003505-4 = "（在一如既往充滿古風且不可思議的氛圍中，感受到了一些生活感）"
1003505-5 = "啊，老，老師。恭候多時了。"
1003505-6 = "呃，那個……"
1003505-7 = "請到這裡來……！"
1003505-8 = "雖，雖然還是一片空白……"
1003505-9 = "那個，我，我和老師，將來會……！"
1003505-10 = "[s1] 「先，先等一下。」\n[s2] 「可以先說明一下嗎……？」"
1003505-11 = "……啊。"
1003505-12 = "……啊。"
1003505-13 = "對，對不起，我又搞錯順序了……"
1003505-14 = "這是，那個……所謂的「交換日記」……"
1003505-15 = "把，把想說的事情和，心裡所想的事情……互相寫下來。"
1003505-16 = "難，難道老師現在就已經覺得不喜歡了嗎……"
1003505-17 = "那怕只有一點點，那個……我也想盡可能……"
1003505-18 = "……了，了解老師。"
1003505-19 = "我，我是這麼想的……！"
1003505-20 = "……？"
1003505-21 = "那個，我，我是不是又失禮了……？"
1003505-22 = "……啊。"
1003505-23 = "果，果然帶在身上還是太大了，是嗎……？"
1003505-24 = "仔細想想好像也對……我，我真笨，竟然連這種事都沒注意到……"
1003505-25 = "對，對不起。我想如果像這孩子一樣又厚又大的話，就能寫得又多又長久……"
1003505-26 = "心裡只想著這些，所以就……"
1003505-27 = "對不起……"
1003505-28 = "[s] 「……」"
1003505-29 = "啊，對，對不起。#n這樣的話就換成稍微小一點的孩子……像筆記本一樣的那種……"
1003505-30 = "……咦，用原本的就好嗎？"
1003505-31 = "可，可是這樣不會有點負擔嗎……"
1003505-32 = "對要東奔西跑的老師來說，這樣有點……"
1003505-33 = "……不用特地帶在身上也沒關係？"
1003505-34 = "那，那是，什麼意思……？"
1003505-35 = "……在這裡？"
1003505-36 = "把交換日記放在這裡……？"
1003505-37 = "……原，原來如此。"
1003505-38 = "每次來這裡就寫一些……"
1003505-39 = "我，我當然願意……如，如果老師覺得這樣可以的話……"
1003505-40 = "[s3] 「既然都選了，就用這孩子吧。」\n[s4] 「畢竟是憂選出來的孩子嘛。」"
1003505-41 = "……！！"
1003505-42 = "……！！"
1003505-43 = "……"
1003505-44 = "唔，啊……！"
1003505-45 = "[s5] 「憂！？」\n[s6] 「抱，抱歉！？」"
1003505-46 = "啊，不，那個……對不起，只是，我……"
1003505-47 = "啊，不，那個……對不起，只是，我……"
1003505-48 = "那個，太高興了……"
1003505-49 = "這種事情，之前幾乎沒有發生過……"
1003505-50 = "非常謝謝你，老師……我會好好珍惜的。#n作為我的寶物……"
1003505-51 = "不用那樣也沒關係，是嗎？#n好，好的……"
1003505-52 = "真，真的，很謝謝你……"
1003505-54 = "（之後一邊安慰哭泣的憂，一邊聊著和今後要寫的交換日記相關的話題）"
1003505-55 = "（……話雖如此，因為平時都用MomoTalk在對話，#n　這本交換日記就變成紀錄閱讀心得的地方了）"

[translation]
1003505-1 = "#title;갑작스러운 제안"
1003505-2 = "#place;고서관 내부"
1003505-3 = "#na;(우이의 안내를 받아 다시 고서관에 들렀다.)"
1003505-4 = "#na;(언제나처럼 오래된 고풍스러움과 생활감이 동시에 느껴졌다.)"
1003505-5 = "#na;???;오셨군요, 선생님. 기다리고 있었습니다."
1003505-6 = "#na;???;저와……. 그리고 여기……."
1003505-7 = "#na;???;이 아이입니다……."
1003505-8 = "3;우이;05;보, 봐 주세요……. 선생님. 아직은 새하얗게 비어있지만……!\n#3;em;[반응]\n#3;a"
1003505-9 = "3;우이;19;이제부터 선생님과 제가……. 함께 만들……!\n#3;hophop"
1003505-10 = "[s1] \"……뭐, 뭐라고요?\"\n[s2] \"갑자기 무슨 이야기를……!?\""
1003505-11 = "3;우이;17;……아."
1003505-12 = "3;우이;17;……아."
1003505-13 = "3;우이;18;죄송합니다. 또 설명 없이 이런 식으로 말을……. 채, 책 이야기였어요. 늘 그렇듯이.\n#3;em;[땀]\n#3;stiff"
1003505-14 = "3;우이;06;이건 그……. 페, 펜팔이라는 것……입니다……."
1003505-15 = "3;우이;08;번갈아 가면서……. 할 말이나……. 생각이라든가…… 그, 그런 걸 적는……."
1003505-16 = "3;우이;10;……호, 혹시 부담스러우시려나요……. 역시 좀 무리려나…….\n#3;em;…"
1003505-17 = "3;우이;11;저……. 조금이라도 좋으니……. 알고 싶어서……."
1003505-18 = "3;우이;04;……선생님에 대해……!"
1003505-19 = "3;우이;10;그래서……! 가, 같이 펜팔……! 서로 번갈아 가지고 있으면서……!\n#3;em;[!]\n#3;hophop"
1003505-20 = "3;우이;13;……? 네?"
1003505-21 = "3;우이;17;아, 아……. 혹시 저 또 뭔가 선생님께 큰 실수를……?\n#3;stiff\n#3;em;[///]"
1003505-22 = "3;우이;04;……아."
1003505-23 = "3;우이;11;그, 그러신가요……. 역시 가지고 다니기에는 좀……. 너무 큰 아이인가……?"
1003505-24 = "3;우이;09;생각해 보니 당연하네요……. 아하하……. 저, 저도 참 멍청하게 그런 생각도 못 하고…….\n#3;em;[땀]\n#3;stiff"
1003505-25 = "3;우이;17;아, 아무 생각 없이……. 크고 두꺼워야 오랫동안 선생님이랑 같이 쓸 수 있을 거라는 생각에……."
1003505-26 = "3;우이;11;그렇게 생각하니 이 아이가 마음에 들어서 그만…….\n#3;em;…"
1003505-27 = "3;우이;11;……미안해……."
1003505-28 = "[s] \"…….\""
1003505-29 = "3;우이;06;죄, 죄송합니다. 그럼 좀 더 작은 책으로 바꿔 올게요……. 수첩 사이즈라던가…….\n#3;stiff"
1003505-30 = "3;우이;13;……네? 굳이 안 그러셔도 된다고요?\n#3;em;[?]"
1003505-31 = "3;우이;04;그, 그렇지만 방금 이 아이가 커서 들고 다니기 어려우시다고……."
1003505-32 = "3;우이;18;저도 선생님께 그런 부담을 드리려고 했던 건 아니었거든요…….\n#3;em;[속상함]"
1003505-33 = "3;우이;04;……네?"
1003505-34 = "3;우이;10;굳이 들고 다니지 않아도 된다고요……? 그, 그럼 어떻게 쓰시려고……."
1003505-35 = "3;우이;13;……방명록……이요?\n#3;em;[?]"
1003505-36 = "3;우이;15;펜팔 대신……?"
1003505-37 = "3;우이;04;……아.\n#3;em;…"
1003505-38 = "3;우이;13;여기 오실 때마다……. 한 마디씩 적고 가시면 되지 않냐는 말씀이시군요."
1003505-39 = "3;우이;18;저야 그래도 좋지만……. 괘, 괜찮으실까요? 굳이 그렇게까지 이 책으로 고집하시는 건…….\n#3;stiff\n#3;em;[///]"
1003505-40 = "[s3] \"나도 이왕이면 이 아이랑 같이 하는 게 좋으니까.\"\n[s4] \"우이가 기대하며 골라준 아이잖아.\""
1003505-41 = "3;우이;20;……!!\n#3;em;[!]\n#3;shake"
1003505-42 = "3;우이;20;……!!\n#3;em;[!]\n#3;shake"
1003505-43 = "3;우이;10;……아……."
1003505-44 = "3;우이;12;……아아……. 으흑……. 으흐흑흑……!\n#3;stiff"
1003505-45 = "[s5] \"우이……!?\"\n[s6] \"갑자기 울어 버렸다!?\""
1003505-46 = "3;우이;12;아, 죄송합니다. 선생님……. 그, 그냥 너무 그……. 뭐랄까…….\n#3;em;…"
1003505-47 = "3;우이;12;아, 죄송합니다. 선생님……. 그, 그냥 너무 그……. 뭐랄까…….\n#3;em;…"
1003505-48 = "3;우이;18;좋아서……."
1003505-49 = "3;우이;12;이렇게까지 이해 받으며 대화하는 건 정말로 처음이라서……."
1003505-50 = "3;우이;22;정말 감사합니다. 선생님……. 방명록……. 완성되면 보물로 삼을게요…….\n#3;greeting\n#3;em;[하트]"
1003505-51 = "3;우이;17;……아. 그럴 것까지는 없다고요……. 아, 알겠습니다……. 그래도 감사합니다……."
1003505-52 = "3;우이;12;흑흑……. 흑흑흑…….\n#3;stiff"
1003505-53 = "#all;hide"
1003505-54 = "#na;(이후 울던 우이를 다독여준 뒤, 함께 방명록에 쓸 내용에 대한 잡담을 나누었다.)"
1003505-55 = "#na;(……막상 대화 자체는 모모톡으로도 하고 있기에, 방문하고 읽은 책들에 대한 독후감 노트로 바뀌었다.)"

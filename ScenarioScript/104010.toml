104010-17 = "เราต้องหยุดการเชื่อมต่อนี้ค่ะ!! ตอนนี้ศัตรูกำลังฟื้นฟู <เครื่องทะลุมิติ> ที่ถูกทำลายไปอยู่ด้วยค่ะ! ขืนเป็นอย่างนี้ต่อไปละก็...... "

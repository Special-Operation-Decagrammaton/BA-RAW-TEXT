104010-1 = "ตอนที่ 1;โชคชะตาที่ถูกลิขิตไว้แล้ว"
104010-11 = "เรือรบอุตนาพิชทิมถูกเรืออะทราฮาซิสแฮ็กงั้นเหรอ?"
104010-12 = "...... ใช่ค่ะ ตอนนี้พวกเราถูกบังคับให้เชื่อมอยู่กับเรืออะทราฮาซิสค่ะ "

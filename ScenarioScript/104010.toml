[translation]
104010-1 = "第1話;既定的命運"
104010-11 = "「生命守護者本艦」被「方舟」駭入了……？"
104010-12 = "……是的。我們目前處於和「阿特拉哈西斯的方舟」連接的狀態。"
104010-13 = "──這艘船變成「方舟」的演算裝置了。"
104010-15 = "沒錯──「方舟」正在利用這艘船的演算機能，嘗試再次進行「多次元詮釋」。"
104010-16 = "怎麼會……那我們該怎麼做才好……？"
104010-17 = "現在切斷彼此的連結是第一優先。#n因為敵人正在利用這艘船的能量修復「次元引擎」。 "
104010-18 = "此外，流入「虛假的聖所」的能量也在增加──#n聖所隨時顯現都不奇怪。"
104010-20 = "執行生命守護者本艦的最終處理。#n重新啟動「自爆程式」。"
104010-21 = "自，自爆程式又……！？"
104010-25 = "800秒後將啟動「自爆程式」。#n請所有搭乘者立刻進行避難。"
104010-26 = "這，這個……沒辦法停下來嗎？"
104010-27 = "重複一次──請所有搭乘者立刻進行避難。#n793秒後將啟動「自爆程式」──"
104010-28 = "不行，系統不聽使喚……！！#n如果不先設法解除駭入狀態──"
104010-30 = "現在正在應對！！#n千醬，我要強制解除和方舟的連結！"
104010-33 = "知道了，我會支援的！"
104010-34 = "等等……先等一下，這是什麼！？"
104010-35 = "這實在是……"
104010-36 = "正，正在即時變更演算法……？"
104010-37 = "我們的速度也不能輸……！好，解除吧陽葵！"
104010-38 = "連結，解除！"
104010-45 = "……唔！"
104010-47 = "……被拒絕了。"
104010-48 = "再次通知。請所有搭乘者立刻進行避難。#n533秒後將啟動「自爆程式」──"
104010-49 = "……"
104010-50 = "這，這樣下去的話……！"
104010-51 = "怎怎怎麼辦啊！？"
104010-52 = "這究竟……"
104010-53 = "在失去大部分演算裝置的狀態下駭入我們、修復次元引擎──#n甚至還加速了聖所的多次元詮釋……？"
104010-54 = "「方舟」的管制系統居然有這種程度的演算處理能力……"
104010-59 = "也許在沒能察覺那個系統存在的時間點，我們的敗北就已經注定了……"
104010-73 = "那是……我？"
104010-83 = "肯定。砂狼白子，不同時間軸的相同存在。"
104010-84 = "[s1]「不同時間軸的……」\n[s2]「相同存在……？」"
104010-87 = "肯定。沒錯，[USERNAME]老師。"
104010-88 = "[s]「那你是……彩奈？」"
104010-92 = "部分肯定。我是常駐於「希迪姆的箱子」的系統管理者和主OS「A.R.O.N.A」。"
104010-94 = "咦，咦咦！？"
104010-95 = "他，他在說什麼啊！常駐於「希迪姆的箱子」的系統管理者……是我才對吧……？#n有，有兩個我……？"
104010-96 = "白子同學也有兩個……？#n那，那麼……！"
104010-100 = "……不！這樣還是很奇怪！"
104010-101 = "為何「希迪姆的箱子」的OS會出現在這裡呢！#n除非……除非使用什麼作弊的手段，否則……！"
104010-103 = "回答。因為這裡是維持著「共存狀態」的「阿特拉哈西斯的方舟」內部。"
104010-104 = "這個「納拉姆辛的王座」，#n是次元、時間、存在的有無都未被確定且相互混雜的渾沌領域。"
104010-105 = "在我沒有教室的此刻，[USERNAME]老師扭曲了這個地方，讓我得以出現在此處。#n這並非作弊。"
104010-107 = "剛，剛才……"
104010-108 = "回答了我的問題……？#n我，我的聲音應該只有老師聽得見才對……是怎麼做到的……？"
104010-109 = "肯定。聽得見。"
104010-110 = "哇啊！！？"
104010-111 = "還能連接這裡……！？"
104010-112 = "……"
104010-113 = "……？"
104010-114 = "5黑彩奈;99;……肯定。#n……因為我是「A.R.O.N.A」。"
104010-115 = "我們同為「希迪姆的箱子」的OS，推測能夠互相干涉。"
104010-119 = "……"
104010-122 = "我終究只是協助與支援「希迪姆的箱子」的持有者[USERNAME]老師的存在。"
104010-123 = "老師，請下達命令。"
104010-124 = "[ns]「………………也就是說。」"
104010-128 = "[ns]「[ruby=Phrenapates]誘騙者[/ruby]是……不同時間軸的『我』？」"
104010-130 = "部分肯定。確認對象是和聯邦搜查部「夏萊」的顧問[USERNAME]老師相同的存在。"
104010-131 = "[s]「………………………………！！！」"
104010-135 = "……但是，存在部分差異。"
104010-137 = "老，老師……！！"
104010-138 = "[s]「彩奈……？」"
104010-139 = "是，是的……該說對呢，還是，該說不對呢……"
104010-140 = "剛才我也確認了誘騙者的生物資訊……#n確實與老師一致……雖然外觀有所改變……"
104010-141 = "「誘騙者」是……不同時間軸的老師沒錯……#n……但，但是，"
104010-142 = "誘騙者──不，那個時間軸的老師…… "
104010-143 = "已經…… "
104010-146 = "失去了，生命…… "
104010-147 = "[ns3]「誘騙者失去了生命……？」\n[ns4]「已經死了……？」"
104010-152 = "嗯，沒錯。"
104010-157 = "──因為殺了老師的人，就是我。"
104010-158 = "……什麼？"
104010-163 = "在那之後，老師成為了「色彩的嚮導者」。"
104010-164 = "這副模樣……也許是「色彩」的影響吧。"
104010-165 = "[ns]「……………………」"
104010-167 = "接著，老師帶我來到了這裡。#n為了讓我實現將世界導向終焉的命運。"
104010-171 = "……你是，我？"
104010-172 = "嗯。"
104010-173 = "……我……殺了……老師……？"
104010-174 = "沒錯。"
104010-176 = "……毀滅了，世界……？"
104010-177 = "就是這樣。"
104010-178 = "開什麼玩笑──────！！！"
104010-189 = "那種事，我不相信──！！"
104010-190 = "毀滅世界，殺害老師……？那怎麼可能！！"
104010-198 = "殺了老師，當成你存在的道具來利用？"
104010-199 = "我怎麼可能那麼做────！！"
104010-218 = "就算你再怎麼否定，這都是既定的事實。"
104010-220 = "你──[ruby= ・     ・     ・     ・     ・ ]會那麼做的[/ruby]。"
104010-221 = "只要你存在於這個世界上，就注定會發生。"
104010-225 = "咳咳……唔……唔唔……"
104010-228 = "那就是砂狼白子這一存在的命運。#n引導世界走向死亡之神。這就是──我們的「本質」。"
104010-229 = "[ns]「白子……！！」"
104010-232 = "不，行……老師……別過來……"
104010-237 = "我比你強。"
104010-238 = "我經歷過你不曾經歷的事，知道你所不知道的事。這個差距是無法彌補的。"
104010-239 = "咳咳……你……"
104010-240 = "……為什麼……要……"
104010-244 = "「砂狼白子」──"
104010-245 = "──無法預測在誘騙者的計畫中會成為什麼樣的變數。#n將世界導向終焉的「崇高」，一個世界只能存在一個。"
104010-246 = "為了讓我能在這個世界穩定活動，#n必須讓作為相同存在的你，在這個世界上處於[ruby= ・     ・     ・ ]不存在[/ruby]的狀態。"
104010-247 = "所以才最先綁架了你，將你囚禁在這個存在與不存在混雜的「方舟」。"
104010-248 = "但比起這點──"
104010-252 = "──我很同情你，白子。"
104010-253 = "明明只要待在這裡，在不被任何人得知的情況下迎接終焉就好了。"
104010-254 = "這樣一來，你就能在不知道心愛的人們死去的狀況下消失。"
104010-256 = "就是因為你這麼做──才會再次陷入痛苦。"
104010-260 = "那麼……你打算怎麼做？老師。"
104010-261 = "[ns]「…………………………………………」"
104010-264 = "下一話;抵抗（１）"

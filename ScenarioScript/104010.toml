[translation]
104010-1 = "Episode 1; An Immovable Destiny"
104010-11 = "Utnapishtim's Ship was hacked by the Ark?"
104010-12 = "Yes, we've been forcibly connected to the Ark of Atrahasis."
104010-13 = "Which means Utnapishtim has become the Ark's auxiliary computational device."
104010-15 = "The Ark is now hijacking Utnapishtim's computational capabilities and energy and using them for multidimensional analysis!"
104010-16 = "What does that mean? What's going to happen?"
104010-17 = "It means if we don't disconnect, the enemy will get everything they want! They're restoring the destroyed dimensional engine as we speak! "
104010-18 = "The manifestation of the False Sanctums across Kivotos are accelerating! A sanctum could appear right now!"
104010-20 = "Execute Utnapishtim's final annihilation process. Self-destruct sequence reactivated."
104010-21 = "S-Self-destruct? Again?!"
104010-25 = "Initiating self-destruct sequence in 800 seconds. All passengers are requested to evacuate quickly."
104010-26 = "Is there anything we can do to stop them?"
104010-27 = "Repeat. All passengers are requested to evacuate quickly. Initiating self-destruct sequence in 793 seconds..."
104010-28 = "Not unless we solve this hack! All our systems are unresponsive!"
104010-30 = "I'm doing everything I can! I'm going to forcibly break the connection to the Ark!"
104010-33 = "I've got it. I'll do everything I can from here!"
104010-34 = "W-Wait! What is it doing now?"
104010-35 = "We can't keep up! "
104010-36 = "It's changing the algorithm in real time!"
104010-37 = "We can't let it beat us with its speed. Disconnect, Himari! Now!"
104010-38 = "Disconnecting!"
104010-45 = "Ugh?!"
104010-47 = "...Denied."
104010-48 = "Repeat. All passengers are requested to evacuate quickly. Initiating self-destruct sequence in 533 seconds..."
104010-49 = "..."
104010-50 = "At this rate, we'll lose the ship entirely."
104010-51 = "Argh! What should we do? What CAN we do?!"
104010-52 = "What in the world..."
104010-53 = "It's hacking our ship while losing most of the Ark's computational devices, restoring the dimensional engine, and accelerating the multidimensional analysis of the sanctums at the same time...?"
104010-54 = "Who would have thought the Ark had a control system capable of such a high level of computational processing?"
104010-59 = "I didn't even conceive the possibility of such a system... We... We've failed..."
104010-73 = "Is that...me?"
104010-83 = "Confirmed. Sunaookami Shiroko. The same existence from a different window of time."
104010-84 = "[s1] \"A different window of time...\"\n[s2] \"Same existence...?\""
104010-87 = "Confirmed. You are correct, [USERNAME] Sensei."
104010-88 = "[s] \"And are you...Arona?\""
104010-92 = "Partially positive. I'm the system manager and main OS, A.R.O.N.A., of the Shittim Chest."
104010-94 = "What?!"
104010-95 = "I-I-I don't know what you mean. The system manager in the Shittim Chest... That's me! Why is there another me? "
104010-96 = "There are two Shirokos...? Th-That means..."
104010-100 = "No! This doesn't make sense!"
104010-101 = "How can the OS of the Shittim Chest materialize like that? It has to be some form of trickery or illusion!"
104010-103 = "Answer. Because this is inside the Ark of Atrahasis, where the quantum superposition state is maintained."
104010-104 = "In particular, the Throne of Naram-Sin is a chaotic realm where dimensions, time, existence, and non-existence are mixed together without ever settling."
104010-105 = "I don't have my classroom now, but this is possible because [USERNAME] Sensei has distorted this place in a way that allows me to exist within here. It is neither trickery nor illusion."
104010-107 = "J-Just now..."
104010-108 = "Did you just answer me? H-How? No one can hear my voice but Sensei..."
104010-109 = "Negative. I can hear you."
104010-110 = "What is happening?!"
104010-111 = "You can log in here too...?!"
104010-112 = "..."
104010-113 = "...?"
104010-114 = "Positive. Yes, correct. Another version of A.R.O.N.A."
104010-115 = "I'm speculating that mutual interference is possible because it's the OS of the same Shittim Chest."
104010-119 = "..."
104010-122 = "I will always help and support [USERNAME] Sensei, the owner of the Shittim Chest."
104010-123 = "Sensei, what is your order."
104010-124 = "[ns] \"...That means...\""
104010-128 = "[ns] \"Phrenapates is...me in another window of time?\""
104010-130 = "Partially positive. The target is confirmed as the same existence as [USERNAME] Sensei of the Federal Investigation Club: Schale."
104010-131 = "[s] \"...!\""
104010-135 = "...However, differences exist in certain aspects."
104010-137 = "S-Sensei...!"
104010-138 = "[s] \"Arona...?\""
104010-139 = "She's right. You're the same, but also different. "
104010-140 = "I also checked Phrenapates' biometrics. It's definitely the same...even though obviously the form and appearance have changed..."
104010-141 = "That Phrenapates...is S-Sensei, technically...in a different window of time...but..."
104010-142 = "Phrenapates...I mean...this Sensei in another time..."
104010-143 = "it's... "
104010-146 = "it's dead... "
104010-147 = "[ns3] \"Phrenapates isn't alive?\"\n[ns4] \"It's already dead...?\""
104010-152 = "That is correct."
104010-157 = "Because I killed you, Sensei."
104010-158 = "...What?!"
104010-163 = "I killed you, and you became the Guide of Chroma. "
104010-164 = "This appearance is due to the influence of the Chroma, most likely."
104010-165 = "[ns] \"...\""
104010-167 = "After that...Sensei brought me here...to fulfill my destiny of destroying all worlds."
104010-171 = "You're...me...?"
104010-172 = "Yes."
104010-173 = "I killed...Sensei...?"
104010-174 = "Yes."
104010-176 = "My destiny...is to destroy all worlds?"
104010-177 = "Yes."
104010-178 = "Shut your lying mouth!!!"
104010-189 = "You're lying! It's all a lie!"
104010-190 = "Me? Harm Sensei? Want to destroy the world? I won't tolerate your lies!"
104010-198 = "I killed and used Sensei as a tool to meet my ends?"
104010-199 = "That's not me! I would never do that!"
104010-218 = "Deny it all you want. It is a predetermined fact."
104010-220 = "This is the path you will walk down."
104010-221 = "As long as you exist within this world, I am your future."
104010-225 = "U-Ugh... *cough*"
104010-228 = "This is the fate of Sunaookami Shiroko. We are the god who leads worlds to death. It is inescapable."
104010-229 = "[ns] \"Shiroko…!!\""
104010-232 = "N-No... Sensei... Don't come near me..."
104010-237 = "You cannot fight me."
104010-238 = "I've experienced things you've yet to experience, I know things you've yet to learn. You cannot fill the gap between me and you."
104010-239 = "*cough* You...*cough*"
104010-240 = "Why...?"
104010-244 = "Sunaookami Shiroko's existence..."
104010-245 = "I didn't know what variables you would introduce into Phrenapates' plan. Only one sublime of death and destruction can exist within a world."
104010-246 = "For me to fulfill my purpose in this world, it was necessary for you, another god of destruction, to not exist."
104010-247 = "So I kidnapped you and locked you in this ark, where existence and non-existence are one and the same."
104010-248 = "But..."
104010-252 = "...I sympathize with you, Sunaookami Shiroko."
104010-253 = "I do wish you could have quietly met your end while knowing nothing of your purpose."
104010-254 = "Then, you would have never known the pain of your loved ones dying before your eyes."
104010-256 = "And yet... You insist on your futile resistance. So you will suffer again and again and again."
104010-260 = "Now, what will you do, Sensei?"
104010-261 = "[ns] \"...\""
104010-264 = "Next Episode; Resistance 1"

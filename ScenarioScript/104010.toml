104010-20 = "ดำเนินการขั้นสุดท้ายของอุตนาพิชทิม เปิดใช้ <วงจรระเบิดตัวเอง> อีกครั้ง"
104010-21 = "ระ... ระเบิดตัวเองงั้นเหรอคะ? อีกแล้วเหรอ?!"

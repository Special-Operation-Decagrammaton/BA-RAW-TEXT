104010-27 = "ประกาศให้ทราบอีกครั้ง ขอให้ผู้โดยสารทุกท่านอพยพจากเรือโดยเร็ว เปิดวงจรระเบิดตัวเองในอีก 793 วินาที......"
104010-28 = "ไม่นะ...!! ทุกระบบไม่ตอบสนองเลย ถ้าเราหยุดการแฮ็กนี้ไม่ได้ละก็......"
104010-30 = "ฉันกำลังรับมืออยู่ค่ะ!! จะหยุดการเชื่อมต่อกับเรือลำนี้ให้ได้ค่ะ! จี้จัง!"

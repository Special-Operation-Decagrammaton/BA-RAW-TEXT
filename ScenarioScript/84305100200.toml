[translation]
84305100200-11 = "……這個應該不錯。"
84305100200-12 = "大小也剛剛好。"
84305100200-13 = "你要帶那個去嗎？#n資料中心的無人機用的是熱感應，所以應該沒什麼意義哦。"
84305100200-15 = "不，那個部分我這邊可以處理。#n光是能避免被鏡頭拍到臉就很夠了。"
84305100200-16 = "而且在入侵內部之後……大部分的時間都得各自行動。#n有東西讓自己藏身比較好。"
84305100200-17 = "哦……"
84305100200-21 = "……為什麼要這樣看著我？"
84305100200-22 = "真的沒問題嗎？#n雖然我剛才是這麼說的沒錯……但好像真的得一個人耶。"
84305100200-23 = "嗯……總會有辦法的吧。"
84305100200-24 = "與其在這裡擔心，不如實際到現場見機行事。"
84305100200-25 = "哈……！！#n挺不錯的嘛。這種心態就對了。"
84305100200-26 = "好，那我們出發吧！"
84305100200-27 = "……嗯。"

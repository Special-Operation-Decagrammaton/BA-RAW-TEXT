[translation]
84305100200-11 = "อันนี้น่าจะเหมาะเลยนะคะ..."
84305100200-12 = "ขนาดก็พอดีเลย"
84305100200-13 = "จะเอาอันนั้นไปด้วยเหรอ? โดรนในศูนย์ข้อมูลจะตรวจจับความร้อน ถ้างั้นมันก็ไม่น่าจะมีประโยชน์#nเท่าไรนะ"
84305100200-15 = "ไม่หรอก เรื่องนั้นฉันพอขัดขวางให้จากทางนี้ได้ ขอแค่ไม่ให้กล้องจับใบหน้าได้ก็พอแล้ว"
84305100200-16 = "อีกอย่าง หลังจากบุกเข้าไปข้างในได้แล้ว... ส่วนใหญ่ทั้งสองคนต้องแยกกันปฏิบัติงาน งั้นก็ต้องมีของที่เอาไว้พรางตัวด้วย"
84305100200-17 = "หืม?"
84305100200-21 = "ทำไมมองกันอย่างนั้นล่ะคะ...?"
84305100200-22 = "จะไม่เป็นไรเหรอ? ถึงจะบอกว่าไปสองคน... แต่มันดูเป็นสถานการณ์ที่ต้องทำงานคนเดียวมากกว่านะ"
84305100200-23 = "ก็... คงไม่เป็นไรหรอกค่ะ"
84305100200-24 = "แทนที่จะมากังวลอยู่ที่นี่ ฉันว่าไว้ไปที่นั่นก่อนแล้วหาวิธีรับมือให้เหมาะกับสิ่งที่จะเกิดขึ้นดีกว่าค่ะ"
84305100200-25 = "เฮอะ...!! ใช้ได้เลยนี่ ต้องอย่างนี้ละ นี่ละที่ต้องการ"
84305100200-26 = "ดีละ งั้นก็ไปกันเลย!"
84305100200-27 = "ค่ะ..."

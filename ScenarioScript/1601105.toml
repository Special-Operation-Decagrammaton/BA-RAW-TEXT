[translation]
1601105-1 = "自我管理"
1601105-3 = "（大運動會當天中午前）"
1601105-4 = "（在長椅的邊緣發現了正在吃便當的蓮實）"
1601105-8 = "[ns1]「蓮實？」\n[ns2]「咦，一個人在吃午餐嗎？」"
1601105-13 = "……嗯？"
1601105-14 = "啊，老師……您好。"
1601105-15 = "沒想到會在這種地方見到您……"
1601105-16 = "我嗎？#n因為午休時需要去引導其他學生，所以提早開始用餐了。"
1601105-20 = "老師……？怎麼了嗎……？"
1601105-21 = "一直盯著這裡……咦，便當的菜色？"
1601105-22 = "如您所見。"
1601105-26 = "有地瓜、水煮蛋和番茄。"
1601105-27 = "啊……那個……"
1601105-28 = "難不成您很在意我剛才傳的MomoTalk嗎？#n真抱歉，我又說了多餘的話……"
1601105-29 = "[s3]「這難道是減肥餐？」\n[s4]「你明明這麼忙碌……這樣吃得飽嗎？」"
1601105-32 = "啊，那個……熱量方面是沒問題的。"
1601105-33 = "不如說，正因為是今天這種日子，不禁讓人產生效果會比平常更好的期待呢。"
1601105-34 = "只是……"
1601105-35 = "[s]「只是……？」"
1601105-42 = "哇！肚子餓了！#n就快到午休時間了呢！"
1601105-43 = "好想快點吃肉，我想吃肉！"
1601105-44 = "你還真是喜歡吃肉呢……"
1601105-45 = "機會難得，我帶了很多甜點來哦。"
1601105-46 = "咦！？為什麼是甜點！？而且也太多了吧！#n吃那麼多會變胖的唷！"
1601105-47 = "因為做了很多運動所以這些都算零卡啦！"
1601105-48 = "運動的日子才是最適合吃甜點的日子嘛！"
1601105-49 = "這樣的話還不如吃肉吧？"
1601105-50 = "要吃甜點才對！！"
1601105-51 = "肉！！"
1601105-52 = "甜點！！"
1601105-56 = "肉肉肉肉肉肉！！"
1601105-57 = "甜點甜點甜點！！"
1601105-62 = "……"
1601105-63 = "[s5]「這種日子……是這個意思啊……」\n[s6]「誘惑比平常還多呢。」"
1601105-66 = "無，無論其他人怎麼做，這都是我與自己的戰鬥……#n居然會因為這種事而動搖……真是令人羞愧……"
1601105-67 = "看來我的覺悟還不足……真是太丟臉了。"
1601105-68 = "……咦？您問之前做的蜂蜜漬檸檬是嗎？"
1601105-69 = "啊，那些全都是要給實現正義部的孩子們吃的，我自己沒有打算要吃……"
1601105-70 = "而且我想老師應該也知道，蜂蜜的熱量相當高……#n要是吃了那種東西，減肥的意義就……"
1601105-71 = "[ns] 「……」"
1601105-78 = "[ns7] 將之前收到的蜂蜜漬檸檬交給蓮實\n[ns8]「就稍微吃一點怎麼樣？」"
1601105-83 = "……！？老，老師……！？#n這，這到底是……"
1601105-84 = "……一片分給兩個人吃的話熱量也會減半……？"
1601105-85 = "雖，雖然是這樣沒錯……"
1601105-86 = "但這是我送給老師的東西……！"
1601105-87 = "……啊，不是，我一點也不會反感……！#n可是……"
1601105-88 = "果然還是，該怎麼說呢……那個……！"
1601105-92 = "……唉。"
1601105-93 = "沒什麼，我又在想那些奇怪的事情了……"
1601105-94 = "不好意思。"
1601105-95 = "謝謝您。#n那麼，我就吃一點點……"
1601105-96 = "真的……就吃一點點哦。"
1601105-105 = "[ns9]「……蓮實？」\n[ns10]「怎麼了……？」"
1601105-108 = "嗯……"
1601105-113 = "…………！！"
1601105-114 = "因為之前都只吃減肥餐，嘴巴因為突如其來的甜味而嚇了一跳……！"
1601105-115 = "這種感覺，真是久違了……"
1601105-120 = "啊啊……我再也忍不下去了……！！"
1601105-128 = "[ns11]「……蓮，蓮實？這樣沒關係嗎？」\n[ns12]「蓮實，等等！吃這麼多的話……！」"
1601105-139 = "……呼啊啊啊。#n真的……感覺人都活過來了……"
1601105-140 = "真美味……感謝您的招待。"
1601105-144 = "……"
1601105-145 = "咦……"
1601105-146 = "老，老師？呃……那個……這是……"
1601105-147 = "因為太好吃了……一不小心就……全部，吃光光了……"
1601105-151 = "對不起……"
1601105-153 = "（趕忙安慰蓮實之後離開了體育場）"

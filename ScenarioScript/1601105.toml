[translation]
1601105-1 = "Self-Care"
1601105-3 = "Field day, before lunchtime."
1601105-4 = "I saw Hasumi alone on a bench as she was taking out a boxed lunch."
1601105-8 = "[ns1] \"Hasumi?\"\n[ns2] \"Are you eating alone?\""
1601105-13 = "Huh?"
1601105-14 = "Oh, Sensei. I didn't expect to see you here."
1601105-15 = "Yes. One of my duties is to guide students during lunchtime."
1601105-16 = "I figured it would be hard to find time to eat, so I was taking this opportunity before I got busy again..."
1601105-20 = "...Sensei? Why are you looking at me like that?"
1601105-21 = "...Hm?"
1601105-22 = "Oh, you mean this?"
1601105-26 = "As you can see, it's a simple meal comprised of a sweet potato, a hard-boiled egg, and a tomato."
1601105-27 = "Hmm..."
1601105-28 = "You must be concerned about the MomoTalk message I sent. Sorry to make you worry..."
1601105-29 = "[s3] \"Is today really the best day to be watching calories?\"\n[s4] \"Are you sure that's enough food to make it through the day?\""
1601105-32 = "I think the calorie count is good."
1601105-33 = "And honestly, isn't a day like this the best opportunity for effective weight loss?"
1601105-34 = "But..."
1601105-35 = "[s] \"But?\""
1601105-42 = "But I'm hungry. I mean, it's lunchtime soon!"
1601105-43 = "I wanna eat meat. Meat!"
1601105-44 = "You're a real carnivore, aren't you?"
1601105-45 = "The obvious choice for a day like this is...parfaits!"
1601105-46 = "Parfaits? D-Do you have any idea how many calories are in even just one parfait? You'll gain weight!"
1601105-47 = "Don't be ridiculous."
1601105-48 = "We're going to be running around all day! This is the perfect chance to get away with eating something like that!"
1601105-49 = "Doesn't that mean we need more meat?"
1601105-50 = "Absolutely not! It's parfaits or the highway!"
1601105-51 = "Meat can't be beat!"
1601105-52 = "Parfaits!"
1601105-56 = "Meat meat meat meat meat!"
1601105-57 = "Parfait parfait parfait parfait parfait!"
1601105-62 = "..."
1601105-63 = "[s5] \"I see...\"\n[s6] \"There's a lot more temptation surrounding you than usual.\""
1601105-66 = "The path to inner peace lies in walking away from outer temptations. I can't be swayed by these juicy, delicious, mouth-watering temptations..."
1601105-67 = "I have a long way to go on the path of inner peace it seems. I'm ashamed."
1601105-68 = "...Hm? What about the honeyed lemons we made?"
1601105-69 = "Oh, those were for the other Justice Task Force members. I wasn't going to have any."
1601105-70 = "After all, honey is very high in calories. My efforts would be meaningless if I had something like that..."
1601105-71 = "[ns] \"...\""
1601105-78 = "[ns7] Take out your own honeyed lemons.\n[ns8] \"Why don't we have some together?\""
1601105-83 = "...?! Wh-What do you mean, Sensei?"
1601105-84 = "Huh? We'll only be sharing a small amount, so the calorie count will be fine?"
1601105-85 = "W-Well, maybe that's true, but I gave them to you as a gift..."
1601105-86 = "...And you already ate some!"
1601105-87 = "Not that I'm grossed out by that, or anything...."
1601105-88 = "It's just, you know, in a way, it would be like..."
1601105-92 = "*sigh*"
1601105-93 = "Never mind. It's nothing. I got just got flustered over nothing again."
1601105-94 = "I shouldn't take your kindness the wrong way..."
1601105-95 = "Thank you. I'll take a bite."
1601105-96 = "Just one, tiny, insignificant, little bite..."
1601105-105 = "[ns9] \"...Hasumi?\"\n[ns10] \"Your reaction...\""
1601105-108 = "...Mm..."
1601105-113 = "Mmmmmmm!"
1601105-114 = "I've been eating only dry and sour things... And now, to have something so sweet in my mouth..."
1601105-115 = "This sensation...this taste... It's been so long... Too long!"
1601105-120 = "I can't hold myself back any longer!"
1601105-128 = "[ns11] \"...H-Hasumi? You okay?\"\n[ns12] \"Hasumi, wait! It's too much! You'll...!\""
1601105-139 = "Aaaaaaah... So...much...better... "
1601105-140 = "I...I ate every single one..."
1601105-144 = "..."
1601105-145 = "Oh..."
1601105-146 = "...S-Sensei? So, um, listen..."
1601105-147 = "The thing is..."
1601105-151 = "...I'm very sorry."
1601105-153 = "I reassured Hasumi before leaving."

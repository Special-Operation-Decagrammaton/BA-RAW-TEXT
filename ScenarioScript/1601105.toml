[translation]
1601105-1 = "การดูแลตนเอง"
1601105-3 = "(วันงานมหกรรมแข่งขันกีฬา ก่อนถึงช่วงพักเที่ยง)"
1601105-4 = "(คุณครูเจอฮาสุมิกำลังนั่งกินข้าวกล่องที่ห่อเตรียมมาตรงมุมม้านั่ง)"
1601105-8 = "[ns1] \"ฮาสุมิ...?\"\n[ns2] \"เอ๋ ทำไมอยู่คนเดียวล่ะ?\""
1601105-13 = "หืม...?"
1601105-14 = "อ๊ะ คุณครู... เจอกันอีกแล้วนะคะ"
1601105-15 = "ฉันทำหน้าที่เป็นกรรมการผู้ดูแลการจัดงานนี้ด้วย เพราะงั้นตอนกลางวันจะต้องคอยไปบอกทางให้กับ#nนักเรียนคนอื่นด้วยค่ะ"
1601105-16 = "และช่วงนั้นก็คงหาเวลาปลีกตัวออกมาลำบาก ก็เลยมารับประทานมื้อกลางวันกันไว้ก่อนน่ะค่ะ..."
1601105-20 = "คุณครู...? ทำไมจ้องแบบนั้นล่ะคะ..."
1601105-21 = "คะ...?"
1601105-22 = "อ๊ะ หมายถึงนี่น่ะเหรอคะ?"
1601105-26 = "ก็มีมะเขือเทศ ไข่ต้มแล้วก็มันหวานค่ะ"
1601105-27 = "อืม..."
1601105-28 = "ดูเหมือนคุณครูจะติดใจกับ MOMOTALK ที่ส่งไปก่อนหน้านี้สินะคะ ขอโทษด้วยค่ะ ฉันทำอะไรที่ไม่#nเหมาะสมไปซะแล้ว..."
1601105-29 = "[s3] \"วันแบบนี้ก็ยังกินอาหารไดเอตอีกเหรอ?\"\n[s4] \"ลำบากแย่เลย กินแค่นี้ไม่เป็นไรแน่นะ?\""
1601105-32 = "อืม... ถ้าในด้านโภชนาแล้วละก็ไม่มีปัญหาหรอกค่ะ"
1601105-33 = "อันที่จริง ฉันก็แอบหวังว่าในวันแบบนี้การไดเอตจะให้ผลดีกว่าวันอื่นๆ..."
1601105-34 = "แต่ว่า..."
1601105-35 = "[s] \"แต่ว่า...?\""
1601105-42 = "ฮือ... หิวจัง อดทนอีกหน่อย เดี๋ยวก็ได้กินมื้อเที่ยงแล้วละ!"
1601105-43 = "อยากกินเนื้อเร็วๆ แล้ว อยากกินเนื้อ!!"
1601105-44 = "เธอนี่ดูจะชอบเนื้อจริงๆ เลยนะ"
1601105-45 = "ฉันน่ะ เตรียมพาร์เฟต์มาสำหรับวันนี้เลยนะ"
1601105-46 = "ทำไมถึงกินพาร์เฟต์ล่ะ? ละ... แล้วทำไมมันเยอะขนาดนั้นเนี่ย!? กินหมดนั่นเดี๋ยวก็น้ำหนักขึ้นหรอก!?"
1601105-47 = "พูดอะไรของเธอ?"
1601105-48 = "วันที่ต้องใช้แรงวิ่งแบบนี้น่ะ เหมาะกับการกินของพวกนี้ที่สุดแล้วนะ!"
1601105-49 = "ถ้างั้นเนื้อก็เหมาะกว่าอีกไม่ใช่รึไง?"
1601105-50 = "ก็บอกว่าไม่ไง! พาร์เฟต์เหมาะกว่าอีก!!"
1601105-51 = "เนื้อ!!"
1601105-52 = "พาร์เฟต์!!"
1601105-56 = "เนื้อ เนื้อ เนื้อ เนื้อ เนื้อ!! เนื้อเท่านั้น!!"
1601105-57 = "พาร์เฟต์ พาร์เฟ่ต๋ พาร์เฟต์ ต้องพาร์เฟต์เซ่!!"
1601105-62 = "..."
1601105-63 = "[s5] \"แบบนี้นี่เอง เรื่องใหญ่เลยนะ...\"\n[s6] \"มีสิ่งล่อตาล่อใจมากกว่าวันทั่วๆ ไปด้วยสินะ...\""
1601105-66 = "แน่นอนว่าต่อให้บรรยากาศรอบๆ ตัวจะเป็นยังไง นี่ก็เป็นการต่อสู้ของฉันกับจิตใจของตัวเอง น่าอายจริงๆ ค่ะที่ฉันหวั่นไหวเพราะเรื่องพวกนี้..."
1601105-67 = "ดูเหมือนฉันจะยังทำได้ไม่ดีพอสินะคะ น่าละอายจริงๆ ค่ะ "
1601105-68 = "คะ...? มะนาวดองน้ำผึ้งที่ทำไว้คราวที่แล้วอยู่ไหนงั้นเหรอคะ?"
1601105-69 = "อืม อันนั้นเป็นของที่เตรียมไว้ให้สมาชิกชมรมคนอื่นๆ ค่ะ ฉันเลยไม่เอามารับประทานน่ะค่ะ"
1601105-70 = "แล้วคุณครูก็คงทราบดีว่าน้ำผึ้งเป็นอาหารที่ให้พลังงานสูง ถ้ากินเข้าไปละก็... การอดทนไดเอตคงจะ#nไม่มีประโยชน์ค่ะ..."
1601105-71 = "[ns] \"....\""
1601105-78 = "[ns7] ยื่นกระปุกมะนาวดองน้ำผึ้งให้\n[ns8] \"ถ้างั้นมาแบ่งกันกินดีมั้ย?\""
1601105-83 = "...!? คุณครู!? มะ... หมายความว่ายังไงคะ?"
1601105-84 = "คะ...?! ถ้าหนึ่งชิ้นแบ่งกันกินสองคน ก็น่าจะไม่เป็นไรงั้นเหรอคะ?"
1601105-85 = "ระ...เรื่องนั้นก็จริงอยู่หรอกค่ะ... แต่ว่านี่เป็นของที่ทำให้คุณครู..."
1601105-86 = "ไม่สิ คุณครูก็อาจจะรับประทานไปบ้างแล้วก็ได้...!"
1601105-87 = "ปะ... เปล่าค่ะ ฉันไม่ได้รังเกียจอะไรหรอกนะคะ... แต่ว่ามัน... เอ่อ...!"
1601105-88 = "จะว่ายังไงดีล่ะคะ แบบนี้มันดูยังไงๆ ก็...!"
1601105-92 = "เฮ้อ..."
1601105-93 = "ไม่มีอะไรค่ะ จู่ๆ ฉันก็คิดอะไรแปลกๆ คนเดียวอีกแล้วค่ะ"
1601105-94 = "ฉันดันไปคิดอะไรซุกซนเข้ากับความหวังดีที่แสนบริสุทธิ์ของคุณครูซะแล้ว..."
1601105-95 = "ขอบคุณค่ะ คุณครูอุตส่าห์ให้คำแนะนำดีๆ ทั้งที ฉันจะรับประทานตามที่คุณครูบอกค่ะ"
1601105-96 = "แค่นิดเดียว..."
1601105-105 = "[ns9] \"ฮาสุมิ...?\"\n[ns10] \"ปฏิกิริยาของเธอนี่มัน...\""
1601105-108 = "อืม..."
1601105-113 = "อื้มมมม...!"
1601105-114 = "รสเปรี้ยวๆ กับเนื้อสัมผัสที่เหนียวนุ่มในตอนแรก พอเคี้ยวก็จะได้รสหวานกระจายไปทั่วปากเลยค่ะ...!"
1601105-115 = "รสชาติแสนอร่อย... ที่ไม่ได้สัมผัสมานานแล้ว..."
1601105-120 = "ฉันทนไม่ไหวแล้วค่ะ...!!"
1601105-128 = "[ns11] \"ฮะ... ฮาสุมิ? แบบนั้นไม่เป็นไรแน่เหรอ?\"\n[ns12] \"ฮาสุมิ เดี๋ยวก่อน ถ้ากินหมดนั่น มันเยอะมากเลยนะ...!!\""
1601105-139 = "ฮือ... จริงๆ เลย.... รู้สึกชื่นใจขึ้นมาหน่อยแล้วค่ะ... "
1601105-140 = "ฉันเผลอกินหมดซะแล้วค่ะ..."
1601105-144 = "........"
1601105-145 = "เอ๋..."
1601105-146 = "คะ... คุณครูคะ คือว่า... เอ่อ... นี่..."
1601105-147 = "คือว่า..."
1601105-151 = "ขอโทษด้วยนะคะ..."
1601105-153 = "(หลังจากปลอบฮาสุมิจนใจเย็นแล้ว คุณครูก็ลุกเดินออกไป)"

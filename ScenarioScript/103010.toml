103010-30 = "งะ... งั้นเหรอ!"
103010-32 = "ท่านอาจารย์จากชาเล่ต์ทำได้แล้วนี่เอง! "
103010-36 = "วะ... ว้ากกกกก?! เพิ่งพูดเมื่อกี้เองว่าไม่เจอศัตรู ไหงโผล่มาได้ล่ะ?!"
103010-37 = "มะ... ไม่ใช่ค่ะ! นี่มันเสียงปืน..."
103010-44 = "ไม่ใช่ศัตรูสินะ... โทษที"

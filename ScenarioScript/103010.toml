[translation]
103010-1 = "ตอนที่ 1;บทบาท"
103010-4 = "ที่หนึ่งในทุ่งหิมะใหญ่ เฮียกคิยาโค"
103010-7 = "เหมือนว่าจุดหมายที่นิยะพูดถึงจะอยู่ห่างออกไปไม่ไกลแล้วนะ..."
103010-8 = "หัวหน้า! ท่านสึคุโยะ! ว่าแต่ รู้สึกว่าจะไม่เห็นสัตว์ประหลาดมาตั้งแต่เมื่อกี้แล้วนะคะ อิซุนะคิดไปเอง#nหรือเปล่านะ?"

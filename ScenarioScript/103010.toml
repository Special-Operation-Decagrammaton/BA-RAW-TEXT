103010-55 = "คะ... คุณคือใครเหรอคะ...?"
103010-57 = "แล้วพวกเธอล่ะ? ดูจากชุดแล้ว คงเป็นนักเรียนเฮียกคิยาโคสินะ มาทำอะไรกันในที่ห่างไกลแบบนี้?"
103010-58 = "พะ... พวกฉัน..."
103010-59 = "ใช่ค่ะ! พวกฉันมา <วิหารอัสดง> เพื่อตามหาหัวหน้าของเฮียกกะเรียวรันค่ะ!"
103010-60 = "ค่ะ... ค่ะ... ใช่แล้วค่ะ พอดีคุณครูจากชาเล่ต์วานมา..."
103010-62 = "...... เป็นอย่างนี้เองสินะ..."
103010-69 = "จริงสิ!!  คิดออกแล้ว!"
103010-71 = "หะ... หัวหน้า...?!"
103010-73 = "ชุดแบบนั้น...!! ข้าน้อยจำได้!"
103010-78 = "ต้องเป็นชุดของเฮียกกะเรียวรันไม่ผิดแน่!! ใช่รึเปล่า? ข้าน้อยพูดถูกใช่ไหม?!"

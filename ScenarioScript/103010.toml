[translation]
103010-1 = "Episode 1; Roles"
103010-4 = "Somewhere in the Hyakkiyako Great Snowfield"
103010-7 = "We should be close to the destination Niya said..."
103010-8 = "President! Tsukuyo! I've noticed that the number of monsters has been decreasing for a while. Right?"
103010-9 = "Hm? Come to think of it, it does seem that way..."
103010-10 = "Yes, yes! The frequency of encountering enemies has decreased since we entered the Great Snowfield..."
103010-15 = "Oh, President! The sky is strange! Look at that!"
103010-16 = "W-Wait...!"
103010-25 = "The sky..."
103010-27 = "I-It turned back to normal!"
103010-28 = "Yes! My lord succeeded!"
103010-30 = "Y-You think so?!"
103010-32 = "Schale's Sensei did it!"
103010-36 = "Wh-Whoa?! Enemies showed up as soon as I started celebrating?"
103010-37 = "N-No! It's just the sound of gunshots..."
103010-44 = "...I guess it wasn't the enemy. Sorry."
103010-47 = "!"
103010-48 = "Argh!"
103010-49 = "You attacked me! You think an apology will be...!"
103010-53 = "...Huh?"
103010-55 = "Wh-Who are you?"
103010-57 = "My question to you. What are Hyakkiyako students doing in these remote fields?"
103010-58 = "W-We..."
103010-59 = "We're traveling to the Twilight Temple! We're trying to find the president of Hyakkaryouran!"
103010-60 = "Y-Yes...! Schale's Sensei... They asked us to..."
103010-62 = "...Is that so?"
103010-69 = "Oh! I know where I've seen that before!"
103010-71 = "P-President...?!"
103010-73 = "I thought your uniform looked familiar!"
103010-78 = "It must be the Hyakkaryouran uniform! Am I right?!"
103010-85 = "Huh? Hyakkaryouran?"
103010-86 = "Th-Then...are you...?"
103010-88 = "I-I don't think so..."
103010-89 = "Although I don't remember fully, Ayame, the Hyakkaryouran president...wasn't so...cold? She was more like...a fancy socialite..."
103010-90 = "Oh. But the vice president was kind of like her!"
103010-92 = "The vice president?"
103010-93 = "A-Are you the vice president of Hyakkaryouran?"
103010-95 = "No."
103010-97 = "Eh? You're not?"
103010-99 = "That's right. You have the wrong person."
103010-100 = "No way! Don't lie to us! I know that's a Hyakkaryouran outfit! Why are you wearing it then?!"
103010-101 = "This..."
103010-102 = "...is cosplay."
103010-104 = "Hm..."
103010-105 = "I see...! That's..."
103010-107 = "Izuna, don't fall for it! That's too much of a coincidence!"
103010-108 = "Well, coincidences like this aren't impossible."
103010-109 = "Determined cosplayers will go anywhere—whether it's the Great Snowfield of Hyakkiyako, the grand desert of Abydos, or the ocean of Odyssey—for the sake of getting that perfect picture."
103010-111 = "Wh-Whoa... How cool! The spirit of a true cosplayer!"
103010-112 = "Th-That's amazing...!"
103010-114 = "I mean... I guess you're right..."
103010-115 = "But if that's true, where's your camera! You don't have any equipment!"
103010-117 = "That's..."
103010-118 = "I don't require such material representations of my cosplay. I am capturing the precious memories within my heart."
103010-120 = "What's the point of coming all the way out here to cosplay and take pictures with an imaginary heart camera?!"
103010-121 = "Are... Are you just trying to trick us?!"
103010-123 = "...!"
103010-124 = "U-Ugh..."
103010-126 = "P-President?! I'm sure her situation can be explained!"
103010-127 = "I-I didn't mean to offend her...but it just seems strange that she has no camera. I guess I could lend her one if she wants..."
103010-129 = "I...just..."
103010-134 = "*cough*...!"
103010-136 = "U-Um, are you all right?"
103010-137 = "I think it's fine to not take pictures. You feel good just by wearing a n-nice cosplay, and that's okay...!"
103010-138 = "...Leave me alone."
103010-140 = "Whoa! S-Sorry...!"
103010-142 = "I'm Goryou Nagusa, the vice president of Hyakkaryouran."
103010-143 = "I've come here alone due to a...situation."
103010-144 = "...So you ARE from Hyakkaryouran."
103010-145 = "I believe I understand your situation, Ninjutsu Research Club. But it's futile, so please return from where you came."
103010-146 = "Wh-What?! Why...?"
103010-147 = "The Twilight Temple was destroyed long ago. It is likely buried many, many feet under the snow somewhere in these fields."
103010-149 = "Huh?! Th-That's..."
103010-151 = "Is there another way to find the president...?"
103010-153 = "No."
103010-154 = "So, again, return. And do not tell anyone of your meeting with me here."
103010-155 = "B-But we can't just go back empty-handed... We came here at Schale's request..."
103010-156 = "Schale... Yes... I've heard of Schale."
103010-157 = "If that is the case... Then... "
103010-161 = "Deliver this to your Sensei."
103010-163 = "...An old scroll?"
103010-164 = "...Do not ask. I do not know its contents."
103010-165 = "President Ayame wished for Schale's Sensei to have it. There is a message for them enclosed."
103010-166 = "Wh-Who told you that? How did they know we'd come here...?"
103010-167 = "..."
103010-171 = "It is your responsibility now. Then..."
103010-176 = "She's gone..."
103010-177 = "What does it say?"
103010-178 = "C-Can we read it?"
103010-179 = "Why not? It's not sealed or anything."
103010-183 = "Let's see..."
103010-195 = "[ns] \"...Shiroko?\""
103010-196 = "..."
103010-197 = "I'm impressed. You've clawed your way this far, Sensei."
103010-198 = "But the future is set. You cannot change what is written in fate. Kivotos will fall."
103010-199 = "[s] \"Shiroko! Wait, you...\""
103010-200 = "You are incorrect. Sensei."
103010-201 = "[s] \"If you're not... How do you know who I am?\""
103010-202 = "...You can delude yourself into believing I've fallen under the control of the Chroma. But you would be incorrect."
103010-206 = "This is me. This is my will. "
103010-207 = "I was granted the role of leading this world into its predetermined future, and the Chroma is just one of many methods available to me."
103010-208 = "I am not under the control of the Chroma. The Chroma is under mine."
103010-209 = "[s] \"...!\""
103010-210 = "My role is to guide all life to the beyond. This world's fate was sealed when Sunaookami Shiroko came to exist within it."
103010-217 = "The world... The universe revolves upon unbreakable laws. The future is predetermined. You struggle in vain."
103010-218 = "...I must ask of you to leave Kivotos, without protest, without struggle. I do not wish to harm you. "
103010-219 = "Not all futures are predetermined. If you leave, the future where I must shoot Schale's Sensei will not come to pass."
103010-220 = "[s] \"...!!!\""
103010-221 = "This was the role granted to me, to lead you to this place and guide you to your final moments."
103010-228 = "You must understand. I will not hesitate to pull the trigger when the time for me to fulfill my role at last arrives."
103010-229 = "Therefore..."
103010-237 = "Sensei! We have a problem!"
103010-238 = "The energy reactions are happening all over Kivotos again!"
103010-245 = "...A-Argh?!"
103010-256 = "Y-You're Abydos'...?!"
103010-257 = "D-Did I just hear Rin shoot a gun? That's a once in a lifetime... Whoa! Who...?!"
103010-258 = "Th-Theres an intruder! Reinforcements!"
103010-263 = "A-An intruder?"
103010-267 = "S-Sensei...?!"
103010-273 = "Sh...Shiro... Shiroko!"
103010-275 = "..."
103010-280 = "[s] \"No! Wait, Shiroko!\""
103010-281 = "Sensei! Don't...! You can't follow her!"
103010-282 = "Whoa, whoa, whoa! Are you seriously that reckless?!"
103010-285 = "[ns] Jump in the rift Shiroko disappeared into."
103010-311 = "..."
103010-312 = "[ns] \"(What is this place...?!)\""
103010-317 = "[ns] \"...!!!\""
103010-319 = "[ns] \"Are you the Guide of Chroma...?!\""
103010-329 = "S-Sensei!"
103010-330 = "Ack! It just spit you back out! Are you still in one piece?"
103010-332 = "S-Sensei... What's going on...with Shiroko...?"
103010-334 = "The connecting passage...disappeared."
103010-340 = "SHIROKO...!"
103010-342 = "Next Episode; The Next Objective"

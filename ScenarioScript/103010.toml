103010-92 = "รองหัวหน้าเหรอคะ?"
103010-93 = "ถ้างั้นก็แปลว่าคุณคือรองหัวหน้าของเฮียกกะเรียวรันเหรอคะ?"
103010-95 = "ไม่ใช่"

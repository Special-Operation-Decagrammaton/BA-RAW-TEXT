[translation]
103010-1 = "第1話;職責"
103010-4 = "百鬼夜行．大雪原的某處"
103010-7 = "仁耶說的地方……應該快到了……"
103010-8 = "那個……從剛剛開始，怪物好像越來越少了……是伊樹菜的錯覺嗎？"
103010-9 = "聽你這麼一說……#n好像是這樣……又好像不是……"
103010-10 = "確，確實是呢……！#n來到這裡之後，就沒碰到怪物了。"
103010-15 = "部長，天空……！"
103010-16 = "啊……"
103010-25 = "天空……"
103010-27 = "變，變回原本的顏色了……"
103010-28 = "是主公成功了對吧！"
103010-30 = "這樣啊……"
103010-32 = "老師大人，終於……！"
103010-36 = "唔，唔喵啊啊！？#n什，什麼！？是敵人嗎！？"
103010-37 = "不，不……這只是，槍聲……！"
103010-44 = "……原來不是敵人啊。#n抱歉。"
103010-47 = "！！"
103010-48 = "唔喵！"
103010-49 = "都對人開槍了只打算說聲「抱歉」就算了嗎！？"
103010-53 = "……呃，咦？"
103010-55 = "你是哪位……！？"
103010-57 = "你們又是誰……？#n看起來像是百鬼夜行的學生……來這裡有何貴幹？"
103010-58 = "我，我們是……"
103010-59 = "伊樹菜和大家有事想找百花繚亂的委員長，所以正在尋找「黃昏寺院」！忍忍！"
103010-60 = "是的……沒錯。#n是受「夏萊的老師」所託……"
103010-62 = "……這樣啊。"
103010-69 = "啊啊！！我想起來了！"
103010-71 = "部，部長……？"
103010-73 = "那副打扮……我有印象！"
103010-78 = "那是百花繚亂的制服對吧？我沒說錯吧！？"
103010-85 = "咦咦！百花繚亂……！？"
103010-86 = "那……你就是……？"
103010-88 = "不，等等……"
103010-89 = "你不是百花繚亂的委員長菖蒲吧？#n那孩子與其說是高冷，給人的感覺應該更像閃閃發光的陽角才對。"
103010-90 = "……啊，不過副委員長好像正好是和他相反的陰角吧？#n兩個人合在一起就是陰與陽這樣！"
103010-92 = "副委員長，是嗎？"
103010-93 = "那……你是百花繚亂的副委員長嗎……？"
103010-95 = "不，不是唷。"
103010-97 = "……咦咦，騙人！？"
103010-99 = "就說不是了。好好聽別人說話。"
103010-100 = "不不不，先等一下！那是只有百花繚亂的人才能穿的制服吧！？#n那你又是怎麼拿到的？"
103010-101 = "這個是──"
103010-102 = "──Cosplay。"
103010-104 = "原來如此。"
103010-105 = "原來是這樣啊……！#n抱歉，伊樹菜認錯──"
103010-107 = "不不不！#n不可能會有這麼巧的巧合吧！？"
103010-108 = "不，有可能唷。"
103010-109 = "Cosplayer為了拍攝奇蹟的照片，不管是百鬼夜行的大雪原、阿拜多斯的大沙漠、還是奧德賽的大海洋都無所畏懼。"
103010-111 = "哦，哦哦……真是Cosplayer的榜樣！"
103010-112 = "真，真厲害……！"
103010-114 = "如，如果是這樣的話……"
103010-115 = "不對吧！#n你連相機之類的都沒帶不是嗎！"
103010-117 = "這……"
103010-118 = "沒有相機也沒關係。#n真正重要的回憶是由心中的相機所拍攝的。"
103010-120 = "不是……既然是Cosplay，用心中的相機是沒辦法拍攝自己的吧？"
103010-121 = "你該不會……只是隨口亂編的吧……？"
103010-123 = "……！"
103010-124 = "……嗚嗚。"
103010-126 = "部，部長！伊樹菜認為他一定是有什麼苦衷的！"
103010-127 = "啊，不是，我沒有想要傷害他的意思……#n只是那個，有點在意你沒有相機這件事而已……#n如果沒有的話要不要借你啊～之類的……"
103010-129 = "但是，我……"
103010-134 = "……嗚嗚。"
103010-136 = "那個……你，你沒事吧……？"
103010-137 = "我覺得那樣也無所謂唷……就算只是穿上不同的服裝，也能改變心情……"
103010-138 = "……讓我獨處一下。"
103010-140 = "總，總覺得有點抱歉……"
103010-142 = "我是御稜名草。"
103010-143 = "百花繚亂的副委員長──因為一些原因而獨自待在這裡。"
103010-144 = "……果然是百花繚亂嘛！！"
103010-145 = "你們的情況我了解了。不過你們白跑一趟了，回去吧。"
103010-146 = "為，為什麼呢……！？"
103010-147 = "「黃昏寺院」早在很久以前就被破壞了。#n現在或許已經被埋在雪底下了吧。"
103010-149 = "……怎，怎麼會。"
103010-151 = "那，尋找委員長的方法──"
103010-153 = "沒有唷。"
103010-154 = "所以回去吧。#n……還有，在這裡遇見我的事希望你們能保密。"
103010-155 = "但，但是我們是受「夏萊」所託……"
103010-156 = "夏萊……雖然有聽過這個名字……"
103010-157 = "我記得是──#n不，既然如此……"
103010-161 = "希望你們把這個交給老師。"
103010-163 = "……卷軸？還挺舊的呢。"
103010-164 = "……我也不清楚內容。"
103010-165 = "這本來是委員長──#n菖蒲該做的事……聽說上面寫了要轉達給夏萊老師的內容。"
103010-166 = "是，是哪位呢……？#n究竟是怎麼知道，我們會來這裡的……"
103010-167 = "……"
103010-171 = "那麼，我已經轉交給你們了。"
103010-176 = "走掉了……"
103010-177 = "上面寫了什麼呢？"
103010-178 = "我，我們打開來看沒問題嗎？"
103010-179 = "無所謂吧。#n他也沒說不能看……"
103010-183 = "我看看──"
103010-195 = "[ns]「白子……？」"
103010-196 = "……"
103010-197 = "……老師，你成功走到這一步了啊。真不簡單。"
103010-198 = "但是，未來是無法改變的。#n奇普托斯會迎向終焉是必然的。"
103010-199 = "[s]「等等……！白子，其實你──」"
103010-200 = "──不。"
103010-201 = "[s] 「…………！！」"
103010-202 = "我沒有被色彩操控……並沒有哦，老師。"
103010-206 = "這是我自己的「[ruby=意志]本質[/ruby]」。"
103010-207 = "將這個世界導向既定的未來──我只是負起了這個職責罷了。#n色彩不過是其中一種手段。"
103010-208 = "……或許反而該說，是我在利用色彩。"
103010-209 = "[s]「……！！」"
103010-210 = "我的職責是引導所有生命前往「[ruby=冥界]其他地方[/ruby]」──#n──這是在砂狼白子存在於這個世界的時間點就已經確定的未來。"
103010-217 = "既定的命運無法改變──那就是這個世界的法則。"
103010-218 = "……但是，我並不想傷害老師。#n所以，希望你能離開奇普托斯。"
103010-219 = "這樣一來，我就不必將槍口對準老師了。"
103010-220 = "[s]「白子…………」"
103010-221 = "……不管是在最初將老師引導到「[ruby=這裡]奇普托斯[/ruby]」，還是見證這段旅程的結束──#n我想，那都是我被賦予的[ruby=職責]本質[/ruby]。"
103010-228 = "無論履行職責之時會在何時到來……我都不會猶豫。"
103010-229 = "所以──"
103010-237 = "老師，大事不妙了！！"
103010-238 = "現在奇普托斯各地再次出現能量反應──"
103010-245 = "……唔！？"
103010-256 = "你，你是阿拜多斯的……！？"
103010-257 = "咦！剛，剛剛琳前輩開槍了嗎！？真少見！？到底怎麼了！？"
103010-258 = "有，有入侵者！#n我，我已經請求支援了……！！"
103010-263 = "有入侵者，是嗎？"
103010-267 = "──咦……？"
103010-273 = "……白，白子……前輩……？"
103010-275 = "……"
103010-280 = "[ns]「等等，白子！！」"
103010-281 = "請等等老師！#n不能追過去啊！！"
103010-282 = "嗚哇，怎麼了！？"
103010-285 = "[ns] 衝進白子消失的空間"
103010-311 = "……"
103010-312 = "[ns]（這裡是……！？）"
103010-317 = "[ns]「……！！」"
103010-319 = "[ns]「你就是『色彩』的嚮導者……！？」"
103010-329 = "──老師！！"
103010-330 = "哇哇！？老師，你沒事吧？"
103010-332 = "老，老師……白子前輩他……究竟……"
103010-334 = "通，通道……消失了……"
103010-340 = "白子前輩──！！"
103010-342 = "下一話;異變"

103010-86 = "ระ... หรือว่า... คุณก็คือ...?"
103010-88 = "มะ... ไม่ใช่หรอก..."
103010-89 = "อายาเมะที่เป็นหัวหน้าเฮียกกะเรียวรันน่ะ... ถึงข้าน้อยจะจำได้ไม่แน่ชัด แต่เธอไม่ได้มีภาพลักษณ์เย็นชา#nแบบนี้หรอก เธอจะดู... จะอธิบายยังไงดีนะ... เธอจะดูสดใสและเปล่งประกายกว่านี้..."

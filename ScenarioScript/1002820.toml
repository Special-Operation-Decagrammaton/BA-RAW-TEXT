[translation]
1002820-1 = "尾巴大騷動"
1002820-2 = "（因為沒有收到在哪裡見面的消息，#n因此我便先前往千年找明日奈）"
1002820-3 = "啊，主人──！這裡這裡！！"
1002820-4 = "（剛抵達就發現了明日奈，但也許是因為他的服裝，吸引了周遭所有人的目光）"
1002820-5 = "真是的──，我已經等得不耐煩了唷──！"
1002820-6 = "但我知道主人會來，明日奈非常開心！！"
1002820-7 = "……嗯？"
1002820-8 = "見面的原因？"
1002820-9 = "這個呀──……"
1002820-10 = "……我忘記了！為什麼要見面呢？也許不是什麼重要的事。"
1002820-11 = "[s1] 「嘛，還好不是陷入了什麼麻煩事……」\n[s2] 「是平常的明日奈呢。」"
1002820-12 = "啊哈哈，是這樣嗎──？"
1002820-13 = "啊哈哈，是這樣嗎──？"
1002820-14 = "……咦？這副模樣？"
1002820-15 = "沒有什麼特別的理由，只是突然想穿，就拿出來穿了。"
1002820-16 = "不是什麼不能穿的東西吧？所以就穿了！"
1002820-17 = "……尾巴？啊，這個？手榴彈……？"
1002820-18 = "啊，確實有過這樣的事呢！#n如果這是手榴彈的話，大家會嚇一大跳吧？"
1002820-19 = "……現在？"
1002820-23 = "……主人覺得呢？"
1002820-24 = "是不是手榴彈呢……直接在這裡確認看看吧？"
1002820-29 = "……開玩笑的！！"
1002820-30 = "啊哈哈哈，主人的表情真不得了！好可愛！#n到底是不是──，你覺得呢～？"
1002820-31 = "啊，如果主人在鬼抓人中贏了的話，我就告訴你吧？"
1002820-32 = "那麼，明日奈要逃跑囉！開始！！"
1002820-37 = "（正在我思考著玩這遊戲對我有什麼好處的時候……#n我看到明日奈剛剛站的地方，掉了一個別針）"
1002820-41 = "[ns] 「……」"
1002820-43 = "[ns3] 「糟了！？！？」\n[ns4] 「明日奈！停下來！！」"
1002820-47 = "啊哈哈哈！主人好慢呀～！"
1002820-52 = "（雖然我已卯足了全力追著明日奈……）"
1002820-54 = "（在途中摔了一大跤，#n也許是看不下去，明日奈跑了回來）"
1002820-55 = "主人，你在幹嘛～？已經累了嗎？鬼抓人結束了嗎？"
1002820-56 = "……？怎麼了，主人？"
1002820-57 = "……咦？"
1002820-58 = "手榴彈……？"
1002820-59 = "我現在身上沒有帶手榴彈唷？"
1002820-60 = "……主人，你怎麼露出那種表情？"
1002820-61 = "這個尾巴，就只是尾巴而已唷？"
1002820-62 = "[s5] 「不是手榴彈……？」\n[s6] 「可是我剛才，確實有看到手榴彈的插銷……」"
1002820-63 = "插銷……？"
1002820-64 = "插銷……？"
1002820-65 = "……啊，那是我的鑰匙圈。"
1002820-66 = "主人，難道真的以為這是手榴彈嗎……？"
1002820-70 = "……啊哈。"
1002820-71 = "噗哈哈哈！所以才露出了那麼不得了的表情嗎？"
1002820-72 = "嗯，沒事的唷──，這真的不是手榴彈。#n如果是手榴彈的話，通常立刻就爆炸了吧？"
1002820-73 = "而且你想啊，明日奈從來沒對主人說過謊吧！"
1002820-74 = "這麼擔心嗎？不好好確認的話會很在意？"
1002820-75 = "啊哈，該怎麼辦呢──"
1002820-76 = "唔嗯，但是啊──，這是兔子的尾巴吧～？"
1002820-77 = "……嗯，決定了！"
1002820-78 = "畢竟是明日奈的主人，就讓你摸一下吧！"
1002820-85 = "來吧，主人，請摸！這可是明日奈的尾巴唷？只有主人才能摸唷？"
1002820-86 = "啊哈哈，怎麼這麼害羞呢～！"
1002820-87 = "[s7] 「我，我確認了，現在沒事了……」\n[s8] 鬆了一口氣後倒在地上。"
1002820-93 = "……哎呀，主人？"
1002820-94 = "睡著了嗎？"
1002820-95 = "已經感覺累了嗎？"
1002820-99 = "……好！"
1002820-100 = "那我也要睡在這裡！！"
1002820-105 = "（等到我醒來時，#n發現我和明日奈並肩睡在千年校園的中央）"
1002820-109 = "（感受到周圍的異樣眼光，#n我趕忙帶著明日奈逃離現場……）"

[translation]
1002820-1 = "Rabbit Tail Ruckus"
1002820-2 = "I went to Millennium to see Asuna, although we hadn't decided on where to meet."
1002820-3 = "Yay! Master! Over here!"
1002820-4 = "As soon as I arrived at the plaza, I saw Asuna in the distance. She was drawing everyone's attention, as usual."
1002820-5 = "I've been waiting for you, Master! You're here to see me, right?!"
1002820-6 = "I can tell by your face! I'm so happy!"
1002820-7 = "Huh?"
1002820-8 = "Why did I contact you?"
1002820-9 = "Hm... Why..."
1002820-10 = "...I forgot! It must not have been important!"
1002820-11 = "[s1] \"O-Okay. I'm sure everything's fine, then...\"\n[s2] \"You seem yourself... That's a relief.\""
1002820-12 = "Hahaha! What do you mean? Your responses are always funny!"
1002820-13 = "Hahaha! What do you mean? Your responses are always funny!"
1002820-14 = "My clothes? Why am I wearing this?"
1002820-15 = "Hm. I can't think of a special reason. I just felt like it!"
1002820-16 = "I have it, so I should wear it, you know? Why are you asking?"
1002820-17 = "Oh, the tail? You've seen me throw it before?"
1002820-18 = "Yeah! I have done that! People get so surprised to find out it's a grenade!"
1002820-19 = "Huh? Is this one a grenade?"
1002820-23 = "Hmm, I don't know! What do you think, Master?"
1002820-24 = "If you want...why don't you find out?"
1002820-29 = "...Oh!"
1002820-30 = "Ahahaha! That's a shame, Master! Were you trying to steal my tail? No, no! You have to guess before checking!"
1002820-31 = "Or do you wanna play tag? Wanna be \"it\"?"
1002820-32 = "Okay, I'm gonna run away! Catch me if you can!"
1002820-37 = "There was a pin that looked like a hook in my hand..."
1002820-41 = "[ns] \"...\""
1002820-43 = "[ns3] \"A-A safety pin?!\"\n[ns4] \"Asuna! Asuna! Wait, stop!\""
1002820-47 = "Ahahaha! Master, you're too slow! I'm a quick rabbit!"
1002820-52 = "I desperately chased Asuna, but ran out of energy and collapsed."
1002820-54 = "Gasping for air, I was lying on the ground when Asuna came back to me."
1002820-55 = "Master, what are you doing? Are you tired already? I wanna play more!"
1002820-56 = "...Master, what's wrong...?"
1002820-57 = "Huh?"
1002820-58 = "The grenade...?"
1002820-59 = "Heehee! The tail isn't a grenade!"
1002820-60 = "...Master? Why are you making that face?"
1002820-61 = "This is just a rabbit tail."
1002820-62 = "[s5] \"...? It's not a grenade?\"\n[s6] \"But what about this safety pin...?\""
1002820-63 = "...A safety pin? What do you mean?"
1002820-64 = "What do you mean?"
1002820-65 = "...Huh? That's my key chain."
1002820-66 = "Master, did you think...this key chain was a safety pin?"
1002820-70 = "...HA!"
1002820-71 = "Wahahaha! Master, you're so ridiculous! You're always so entertaining!"
1002820-72 = "Stop being so skeptical! I promise, it's safe!"
1002820-73 = "I've never lied to you, Master!"
1002820-74 = "Huh?"
1002820-75 = "You still want to check for yourself, just in case? Ahahaha! What is that?!"
1002820-76 = "Hmm... What should I do? I'm thinking!"
1002820-77 = "...Hmm! Okay!"
1002820-78 = "Since you've entertained me a lot today, I'll let you touch my tail!"
1002820-85 = "Okay, Master. Touch it. It's really just a tail, see?"
1002820-86 = "Ahaha! Stop, stop, Master! It's ticklish!"
1002820-87 = "[s7] \"Phew... Yeah. It's just a tail.\"\n[s8] Let out a sigh and collapse."
1002820-93 = "...Hmm? Master?"
1002820-94 = "Master?"
1002820-95 = "Are you sleeping, Master?"
1002820-99 = "...Okay!"
1002820-100 = "I'll take a nap next to you then!"
1002820-105 = "When I woke up, I was lying beside Asuna in the middle of the street."
1002820-109 = "I felt strange gazes around us, so I quickly woke Asuna and left..."

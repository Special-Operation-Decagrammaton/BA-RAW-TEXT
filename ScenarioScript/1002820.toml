[translation]
1002820-1 = "ความวุ่นวายของหางกระต่าย"
1002820-2 = "(คุณครูไปที่มิลเลเนียมเพื่อไปหาอาสึนะที่นัดไว้แต่ไม่ได้บอกสถานที่)"
1002820-3 = "ยะโฮ่~ นายท่าน! ทางนี้~ ฉันอยู่นี่~!!"
1002820-4 = "(พอมาถึงที่จัตุรัส ก็มองเห็นอาสึนะที่กำลังได้รับความสนใจจากผู้คนรอบๆ อยู่)"
1002820-5 = "อาสึนะกำลังรออยู่เลย นายท่าน! กำลังมองหาอาสึนะอยู่ใช่มั้ย? ใช่รึเปล่า?"
1002820-6 = "แค่เห็นสีหน้าของนายท่าน อาสึนะก็รู้แล้วละ! อาสึนะดีใจจังเลย!!"
1002820-7 = "หืม...?"
1002820-8 = "ฉันเรียกคุณครูมาทำไมน่ะเหรอ?"
1002820-9 = "อืม~ เพราะอะไรน้า?"
1002820-10 = "อื้อ...! ฉันลืมไปแล้วละ!! เหมือนจะไม่ใช่เรื่องสำคัญเท่าไรด้วยนะ?"
1002820-11 = "[s1] \"อะ...อื้อ ไม่ใช่เรื่องสำคัญก็หายห่วง...\"\n[s2] \"สมกับเป็นอาสึนะจังเลยนะ... ดีแล้วละ\""
1002820-12 = "ฮ่ะฮ่ะฮ่ะฮ่าา! อะไรกันเนี่ย ท่าทางของนายท่านนี่น่าขำเสมอเลยนะ!!"
1002820-13 = "ฮ่ะฮ่ะฮ่ะฮ่าา! อะไรกันเนี่ย ท่าทางของนายท่านนี่น่าขำเสมอเลยนะ!!"
1002820-14 = "หืม...? ชุดนี้เหรอ ฉันไม่ได้ใส่นานแล้ว ทำไมถึงเอามาใส่อีกน่ะเหรอ?"
1002820-15 = "นั่นสินะ ที่หยิบมาใส่ก็ไม่ได้มีเหตุผลอะไรเป็นพิเศษหรอก แค่อยากใส่ก็เท่านั้นเองน่ะ"
1002820-16 = "ยังไงซะมันก็เป็นชุดของอาสึนะนี่นา ใช่มั้ยล่ะ? ว่าแต่นายท่านนั่นแหละ จู่ๆ ถามทำไมเหรอ?"
1002820-17 = "หาง? อ๊ะ? ที่อยู่ข้างหลังนี่น่ะเหรอ? เคยเห็นฉันหยิบมาใช้เป็นระเบิดมืองั้นเหรอ?"
1002820-18 = "อื้อ! ใช่แล้วๆ! แต่ถ้าหยิบออกมาโยนเล่นที่นี่ คนอื่นๆ อาจจะตกใจก็ได้ แต่ก็น่าสนุกดีนะ"
1002820-19 = "หืม...? อันนี้ก็เป็นระเบิดมือรึเปล่าน่ะเหรอ?"
1002820-23 = "หืม~~ นั่นสิน้า~ นั่นสิๆ นายท่านคิดว่าใช่รึเปล่าล่ะ?"
1002820-24 = "แต่ถ้าอยากรู้... จะลองพิสูจน์ที่นี่เลยดูมั้ยล่ะ?"
1002820-29 = "โอ๊สสส!!"
1002820-30 = "อะฮ่ะฮ่ะฮ่า! น่าเสียดายจัง นายท่าน~ คิดจะฉกหางของอาสึนะไปงั้นเหรอ? ไม่ได้นะ ไม่ได้ ต้องตอบให้ถูกก่อนแล้วค่อยเอาไปดูสิ~"
1002820-31 = "ถ้างั้นเอายังไงดี หรือว่าเล่นซ่อนหาดีมั้ย? นายท่านเป็นคนหานะ!"
1002820-32 = "ดีละ! งั้นอาสึนะจะหนีไปซ่อนก่อน จับอาสึนะให้ได้น้า~!!"
1002820-37 = "(ในมือมีของที่ดูเหมือนห่วงสลักอยู่...)"
1002820-41 = "[ns] \"....\""
1002820-43 = "[ns3] \"นี่มันสลักระเบิดไม่ใช่เรอะ...!?!?!\"\n[ns4] \"อาสึนะ!! รอเดี๋ยว! หยุดก่อนอาสึนะ!!\""
1002820-47 = "ฮ่ะฮ่ะฮ่ะฮ่า! นายท่านช้าจังเลย~ อาสึนะคือกระต่ายผู้ว่องไวน้า~!!"
1002820-52 = "(หลังจากนั้นคุณครูก็พยายามวิ่งไล่ตามอาสึนะไป แต่สุดท้ายก็ตามไม่ทันและหมดแรงล้มลงไป)"
1002820-54 = "(ขณะที่คุณครูนอนหอบหมดแรงอยู่บนพื้น ไม่นานนักอาสึนะก็เป็นฝ่ายกลับมาหาคุณครูก่อน)"
1002820-55 = "นายท่าน ทำอะไรน่ะ~? หมดแรงแล้วงั้นเหรอ? เลิกเล่นซ่อนแอบกันแค่นี้เหรอ?"
1002820-56 = "เอ๋...? สีหน้าของนายท่าน ทำไม..."
1002820-57 = "หืม ว่ายังไงนะ?"
1002820-58 = "ระเบิดมือ...?"
1002820-59 = "ฉันไม่ได้ถือระเบิดมือไว้สักหน่อย?"
1002820-60 = "นายท่าน? ทำไมทำหน้าแบบนั้นล่ะ?"
1002820-61 = "นี่มันก็แค่หางกระต่ายเองนะ"
1002820-62 = "[s5] \"ไม่ใช่... ระเบิดมือหรอกเหรอ...?\"\n[s6] \"ถ้างั้นสลักนี่ล่ะ...\""
1002820-63 = "ระเบิดมือ...? ระเบิดมืออันไหนเหรอ?"
1002820-64 = "สลัก...? สลักอะไรเหรอ...?"
1002820-65 = "เอ๋...? นั่นมันห่วงกุญแจของฉันนี่นา?"
1002820-66 = "นายท่าน... หรือว่าคิดว่าห่วงคล้องกุญแจเป็นห่วงสลักระเบิดมือเหรอ?"
1002820-70 = "อุบ...!!"
1002820-71 = "อะฮะฮะฮ่า!! นายท่านนี่มีความคิดแปลกจริงๆ เลยนะ! ทำให้อาสึนะสนุกได้ตลอดเลย!!"
1002820-72 = "หืม? ไม่ใช่สลักระเบิดจริงๆ แน่รึเปล่าน่ะเหรอ?"
1002820-73 = "ก็แหงอยู่แล้ว อาสึนะไม่เคยโกหกนายท่านเลยนะ"
1002820-74 = "หืม...?"
1002820-75 = "มาถึงที่นี่เชียว ถ้าไม่ได้ตรวจสอบเองก็คงจะไม่วางใจงั้นเหรอ? ฮะฮะฮ่า อะไรกัน~"
1002820-76 = "อื้มๆ~ ถ้างั้นเอายังไงดีน้า~ อาสึนะคิดไม่ตกเลย!"
1002820-77 = "อื้อ ดีละ~!"
1002820-78 = "ถ้างั้นเพื่อตอบแทนนายท่านที่ตั้งใจเล่นกับอาสึนะวันนี้ อาสึนะจะยอมให้จับหางเป็นกรณีพิเศษ!!"
1002820-85 = "เอาละๆ นี่ไงนายท่าน หางของอาสึนะ~ รีบจับดูสิ หางจริงๆ ใช่มั้ยล่ะ ใช่มะๆ"
1002820-86 = "ฮะฮ่าฮ่า!! พอๆ พอเลย นายท่าน มันจักจี้นะ~!!"
1002820-87 = "[s7] \"เฮ้อ... หางกระต่ายจริงๆ ด้วยสินะ...\"\n[s8] ถอนหายใจเฮือกใหญ่แล้วหมดสติไป"
1002820-93 = "หืม...? นายท่าน?"
1002820-94 = "นายท่าน?"
1002820-95 = "หลับเหรอ นายท่าน??"
1002820-99 = "อื้อ...!"
1002820-100 = "ถ้างั้นอาสึนะก็จะนอนข้างๆ นายท่านแล้วกัน!!"
1002820-105 = "(จากนั้นพอคุณครูฟื้นขึ้นมา ก็พบว่าตัวเองกับอาสึนะนอนอยู่ที่พื้นกลางจัตุรัสของโรงเรียน)"
1002820-109 = "(พอรับรู้ได้ถึงสายตาแปลกๆ ของคนรอบข้างที่จับจ้อง คุณครูก็รีบปลุกอาสึนะให้ตื่น แล้วรีบออกไป#nจากตรงนั้นทันที...)"

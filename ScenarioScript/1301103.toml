[translation]
1301103-1 = "เงื่อนไขของเนื้อเรื่องที่ดี"
1301103-2 = "ชมรมพัฒนาเกม มิลเลเนียม"
1301103-3 = "[Gamemaniac : เนื้อเรื่องมีความสำคัญในเกมเรโทรมั้ย?]"
1301103-4 = "[Waga-mama : อืม~ เนื้อเรื่องแบบเก่าๆ มัน...เอ้าต์ไปแล้วนะ~ 555]"
1301103-5 = "[ikusa007 : ตัวเอกจะออกมาตอนไหน?]"
1301103-6 = "[tensaiko : ไม่มีพล็อตจุดหักมุมเหรอ? ฉันยังเขียนได้ดีกว่านี้ซะอีก]"
1301103-7 = "[s] \"นี่มันอะไรกันเนี่ย?\""
1301103-8 = "คำวิจารณ์ของพวกคนบื้อๆ ที่ไม่รู้อะไรเลยไงล่ะ!"
1301103-9 = "[s] \"คำวิจารณ์...?\""
1301103-10 = "อืม... คือว่า..."
1301103-11 = "ด้วยกระแสการระดมทุนเมื่อเร็วๆ นี้ ทำให้เกิดรีเมคเกมเรโทรหลายๆ เกมน่ะ"
1301103-12 = "โดยส่วนตัวแล้ว ฉันก็อยากสนับสนุนเหมือนกันนะ"
1301103-13 = "แล้วก็อยากชื่นชมพวกเขาด้วยที่กล้าทำเรื่องนี้..."
1301103-14 = "แต่ดูสิ...!"
1301103-15 = "มีแต่คอมเมนต์งี่เง่าเกี่ยวกับเกมเรโทรที่กำลังจะออกมาเยอะแยะเต็มไปหมดเลย!"
1301103-16 = "[s] \"เธอไม่ต้องไปอ่านคอมเมนต์พวกนั้นก็ได้นี่นา\""
1301103-17 = "ฉันก็ไม่ได้อยากหรอก แต่มันก็อดไม่ได้นี่นา..."
1301103-18 = "เหมือนฉันบังเอิญเจอชีสที่ถูกผ้าคลุมไว้ แต่พอเปิดออกมาก็เจอว่ามันเน่าไปแล้ว..."
1301103-19 = "ฉันไม่ได้อ่านเพราะชอบอ่านหรอกนะ!"
1301103-20 = "แต่มันเป็นส่วนหนึ่งของการสำรวจตลาดน่ะ..."
1301103-21 = "แต่ว่าที่พวกนั้นเขียนคอมเมนต์มาน่ะ มีแต่ความคิดแบบพวกเกรียนๆ ทั้งนั้นเลย!"
1301103-22 = "อย่างเช่น \"เนื้อเรื่องไม่สำคัญในเกมเรโทรหรอก\""
1301103-23 = "\"เมื่อไหร่ตัวเอกจะโผล่มาล่ะ?\""
1301103-24 = "หรือที่เขียนว่า \"ทำไมไม่มีพล็อตจุดหักมุมล่ะ?\" บ้างล่ะ"
1301103-25 = "[s] \"อืม...\""
1301103-26 = "มาตรฐานการวิจารณ์แย่มากเลย!"
1301103-27 = "มันธรรมดาเพราะมีเนื้อเรื่องที่ตัวเอกออกผจญภัยเพื่อปราบราชาปีศาจงั้นเหรอ?"
1301103-28 = "มันไร้สาระมากเลยที่คิดว่าการทำตามรูปแบบเดิมเป็นเรื่องที่งี่เง่า#nอะไรกัน... ต้องแหกธรรมเนียมหรือมีจุดหักมุมเท่านั้นเหรอ ถึงจะเรียกว่าดูดีน่ะ?"
1301103-29 = "แถมพวกเกรียนคีย์บอร์ดพวกนั้นยังบอกอีกว่า \"เกมที่ดีคือเกมที่มีเนื้อเรื่องที่ทำให้ผู้เล่นประทับใจได้สุดๆ\""
1301103-30 = "แค่พูดน่ะใครๆ ก็ทำได้ทั้งนั้น!"
1301103-31 = "ถ้ารู้เรื่องการเขียนเนื้อเรื่องดีขนาดนั้นก็มาเขียนเองเลยสิ!"
1301103-32 = "[s] \"โมโมอิใจเย็นๆ ก่อน...\""
1301103-33 = "เฮ้อออออ..."
1301103-34 = "งะ..."
1301103-36 = "[s] \"งะ...?\""
1301103-37 = "แงงงงง! น่าโมโหชะมัด! น่าโมโหสุดๆ ไปเลย!"
1301103-38 = "อยากจะทะลุจอไปฟาดพวกเกรียนคีย์บอร์ดพวกนั้นสักทีจริงๆ!"
1301103-39 = "แต่... ฉันเองก็เขียนเนื้อเรื่องไม่ได้ดั่งใจเหมือนกัน... น่าหงุดหงิดสุดๆ เลย!"
1301103-40 = "[s] \"เพราะกำหนดส่งสินะ?\""
1301103-41 = "...ขอโทษนะ คุณครู"
1301103-42 = "ฉันหงุดหงิดอยู่คนเดียว แล้วก็ยังมางอแงใส่คุณครูอีก..."
1301103-43 = "[s1] \"ไม่หรอก\"\n[s2] \"ครูเต็มใจมากเลยนะ\""
1301103-44 = "เอ๋...? ทำไมถึงพูดแบบนั้นล่ะ?"
1301103-45 = "เอ๋...? ทำไมถึงพูดแบบนั้นล่ะ?"
1301103-46 = "[s] \"ก็ที่โมโมอิเชื่อใจแล้วก็พึ่งพาครูในเวลาที่ลำบากไงล่ะ\""
1301103-47 = "เฮอะ จริงๆ เลย..."
1301103-48 = "ขอบคุณนะ คุณครู"
1301103-49 = "ที่จริงฉันเองก็ไม่รู้หรอก"
1301103-50 = "ว่าฉันควรจะเขียนอะไร หรือว่าควรจะเขียนออกมายังไงดี..."
1301103-51 = "ถ้าเป็นแบบนี้ ฉันคงขาดคุณสมบัติของนักเขียนบทของชมรมพัฒนาเกมแน่ๆ..."
1301103-52 = "[s3] \"ครูเองไม่รู้ว่าบทเกมที่สมบูรณ์แบบเป็นยังไงนะ\"\n[s4] \"แต่ว่าครูรู้อยู่อย่างหนึ่ง...\""
1301103-53 = "อะไรเหรอ?"
1301103-54 = "อะไรเหรอ?"
1301103-55 = "[s5] \"ไม่ว่าโมโมอิจะเขียนบทอะไร...\"\n[s6] \"ครูแน่ใจว่าจะเป็นบทที่ดีที่สุด\""
1301103-56 = "...เอ๋"
1301103-58 = "...เอ๋"
1301103-60 = "ฮิฮิ... แบบนี้นี่เอง"
1301103-61 = "อืม บทที่ฉันอยากเขียน..."
1301103-62 = "มันจะเป็นบทที่ดีที่สุดในโลก…!"
1301103-63 = "อื้ม พอได้ฟังคุณครูแล้ว ฉันก็พอจะเข้าใจมากขึ้นนิดหน่อยแล้ว"
1301103-64 = "เยี่ยมเลย! เติมพลังเต็มที่ล่ะ!"
1301103-65 = "พอได้ฟังคุณครู ฉันก็คิดไอเดียดีๆ ออกแล้ว!"
1301103-66 = "เนื้อเรื่องพิเศษที่มีพื้นฐานมาจากเนื้อเรื่องทั่วๆ ไป แต่ว่าจะมีส่วนที่พิเศษขึ้นกว่าเดิม!"
1301103-69 = "คราวหน้า คุณครูช่วยมาอ่านเนื้อเรื่องที่ฉันจะเขียนต่อแล้วเล่าความรู้สึกให้ฟังหน่อยนะ!"
1301103-70 = "[s] \"อื้อ ได้เลย\""
1301103-73 = "(ไม่กี่วันหลังจากนั้น คุณครูก็ได้รับข้อความใน MOMOTALK จากโมโมอิ)"
1301103-74 = "ทำยังไงดีล่ะคุณครู?!"
1301103-75 = "ฉันคิดไอเดียดีๆ ได้หลายอย่างเลย แต่ว่ามันก็ขัดแย้งกันไปหมด ฉันไม่รู้จะทำยังไงแล้ว ช่วยด้วยยยย!"
1301103-76 = "ฮือ ฮือ!!"
1301103-77 = "(สมกับเป็นโมโมอิในเวลาปกติจริงๆ)"

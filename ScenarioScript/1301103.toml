[translation]
1301103-1 = "好劇情的條件"
1301103-2 = "千年．遊戲開發部"
1301103-3 = "＜Gamemaniac：懷舊遊戲的劇情有那麼重要嗎？＞"
1301103-4 = "＜Waga-mama：這劇情也太老梗了吧，該被時代淘汰了＞"
1301103-5 = "＜ikusa007：女主角怎麼了？＞"
1301103-6 = "＜tensaiko：最後竟然沒有反轉的劇情？我來寫都寫得比較好吧＞"
1301103-7 = "[s] 「……這是，什麼？」"
1301103-8 = "這些什麼都不懂的傢伙在吵來吵去！"
1301103-9 = "[s] 「怎麼回事……？」"
1301103-10 = "我從頭開始說明吧。"
1301103-11 = "最近因為流行群眾募資，推出了幾個新的懷舊風遊戲。"
1301103-12 = "我個人也是很支持這種發展的。"
1301103-13 = "希望挑戰這個領域的人們都能夠好好加油。"
1301103-14 = "但你看這個！"
1301103-15 = "大家對新的懷舊遊戲竟然都是這種負面的評論！"
1301103-16 = "[s] 「不要特地去搜尋不就好了……？」"
1301103-17 = "該，該怎麼說，不小心就看到了……"
1301103-18 = "你想，就算是放了好幾個月壞掉的食物，在丟掉之前多少還是會看一眼的對吧……？"
1301103-19 = "而，而且，我也不是因為喜歡才搜尋的！"
1301103-20 = "這只不過是市場調查的一環……"
1301103-21 = "比起那些！這些傢伙，都在說些亂七八糟的東西！"
1301103-22 = "說什麼懷舊遊戲的劇情才不重要──，之類的。"
1301103-23 = "為什麼途中女主角就消失了啊──，之類的！"
1301103-24 = "劇情沒有反轉好失望喔──，之類的！"
1301103-25 = "[s] 「唔──嗯……」"
1301103-26 = "再怎麼說他們評價的標準也太膚淺了！"
1301103-27 = "照這種標準的話，勇者為了打倒魔王踏上旅程的劇情不就因為很王道而變得俗氣了嗎？"
1301103-28 = "說什麼不要老套劇情，說什麼一定要有顛覆至今發展的意外或轉折，最好是啦！？"
1301103-29 = "說什麼「好的遊戲劇情就是讓玩家留下衝擊的劇情」之類空泛又沒營養的話，"
1301103-30 = "用嘴巴說誰不會啊！？"
1301103-31 = "這麼了解的話就別只在那裡出一張嘴，自己來寫劇本不就好了！？"
1301103-32 = "[s] 「那個，桃井，冷靜點……」"
1301103-33 = "呼，呼……"
1301103-34 = "嗚……"
1301103-36 = "[s] 「嗚……？」"
1301103-37 = "嗚啊啊啊！不甘心！好不甘心！"
1301103-38 = "我也想要寫出能讓說這些話的人被衝擊到的劇本啊！"
1301103-39 = "卻怎麼也寫不出我心裡的感覺！我真生自己的氣！！"
1301103-40 = "[s] 「是因為快到截止時間了呢……」"
1301103-41 = "……抱歉，老師。"
1301103-42 = "我自己亂發脾氣還遷怒老師……"
1301103-43 = "[s1] 「沒關係喔，」\n[s2] 「不如說有點開心。」"
1301103-44 = "……開心？為什麼？"
1301103-45 = "……開心？為什麼？"
1301103-46 = "[s] 「因為桃井在遇到困難時會想依靠我。」"
1301103-47 = "……呃，那個，這個……"
1301103-48 = "……嗯，謝謝老師。"
1301103-49 = "其實連我自己也有點搞不清楚了。"
1301103-50 = "究竟要寫什麼才好，要怎麼樣寫才好。"
1301103-51 = "再這樣下去的話，作為遊戲開發部的劇本作家真是失敗呀……"
1301103-52 = "[s3] 「雖然關於劇本我也不太懂……」\n[s4] 「但如果讓我說一句的話……」"
1301103-53 = "……？"
1301103-54 = "……？"
1301103-55 = "[s5] 「桃井想寫出來的劇本，」\n[s6] 「那一定會是最棒的劇本吧。」"
1301103-56 = "……"
1301103-58 = "……"
1301103-60 = "這樣啊……呼──嗯……"
1301103-61 = "我想要寫出來的劇本……"
1301103-62 = "嗯，嗯……！"
1301103-63 = "好像有點明白了！"
1301103-64 = "好──！幹勁補充MAX！"
1301103-65 = "和老師說完話之後感覺腦袋都清醒了，現在的話好像能寫得出來了！"
1301103-66 = "那種王道卻又超越了王道的、我想寫出來的劇本！"
1301103-69 = "下次請再看看我的劇本，然後告訴我感想喔！老師！"
1301103-70 = "[s] 「嗯，我很期待。」"
1301103-73 = "（在那之後過了幾天，收到了桃井傳來的訊息）"
1301103-74 = "怎麼辦呀老師！？"
1301103-75 = "好不容易浮現的靈感整個大矛盾，完全想不出下一個靈感來解困！救救我──！"
1301103-76 = "嗚哇啊啊啊！！！"
1301103-77 = "（果然還是平常的桃井）"

[translation]
1301103-1 = "What Makes a Good Story"
1301103-2 = "Millennium Game Development Department"
1301103-3 = "[Gamemaniac: Are stories really important in retro games?]"
1301103-4 = "[Waga-mama: Really... Old-school stories are so lame! lol]"
1301103-5 = "[ikusa007: When does the heroine show up?]"
1301103-6 = "[tensaiko: No plot twist? I could probably write better than this.]"
1301103-7 = "[s] \"So, what's all this?\""
1301103-8 = "It's just some crackpot criticism from internet trolls!"
1301103-9 = "[s] \"Criticism?\""
1301103-10 = "Um, so..."
1301103-11 = "Some retro games are being remade because of the recent boom in crowdfunding."
1301103-12 = "Personally, I'd like to support this movement."
1301103-13 = "And commend them for taking on the challenge."
1301103-14 = "But look..."
1301103-15 = "Everyone is blatantly badmouthing the retro game we just released!"
1301103-16 = "[s] \"You don't need to deliberately search for comments like that, you know.\""
1301103-17 = "Well, you could say they unintentionally caught my attention..."
1301103-18 = "Like how you might open a wrapped piece of cheese, only to find it moldy..."
1301103-19 = "I-I didn't search for them because I like them!"
1301103-20 = "It was all part of my market research..."
1301103-21 = "More than that, these guys have garbage opinions to begin with!"
1301103-22 = "Saying stuff like, \"Stories aren't important in retro games.\""
1301103-23 = "Or, \"When does the heroine show up?\""
1301103-24 = "Or, \"No plot twist?!\""
1301103-25 = "[s] \"Umm...\""
1301103-26 = "Their standards are so shallow!"
1301103-27 = "Is a conventional story, where a hero ventures out to defeat the demon lord, bad just because it's conventional?"
1301103-28 = "It's nonsense to think following a cliche is stupid, and that a story is only good when it breaks convention with a plot twist!"
1301103-29 = "Those arrogant fools say that a good game story is \"one that leaves a strong impression on the player.\""
1301103-30 = "Anybody with a pulse could say that!"
1301103-31 = "If you know game stories so well, write one yourself!"
1301103-32 = "[s] \"Uh, Momoi, calm down...\""
1301103-33 = "*sigh*"
1301103-34 = "Wa..."
1301103-36 = "[s] \"Wa...\""
1301103-37 = "Waaah! This is infuriating! I'm infuriated!"
1301103-38 = "I just wanna punch those jerks right through my monitor!"
1301103-39 = "But...I can't seem to write the way I want to! I'm so angry!"
1301103-40 = "[s] \"It's because of the deadline, isn't it?\""
1301103-41 = "...I'm sorry, Sensei."
1301103-42 = "I got so worked up, and dumped it all at you."
1301103-43 = "[s1] \"No, it's okay.\"\n[s2] \"I actually appreciate that.\""
1301103-44 = "...Huh? Why would you say that?"
1301103-45 = "...Huh? Why would you say that?"
1301103-46 = "[s] \"It means you trust me enough to turn to me when times get tough.\""
1301103-47 = "...Oh, gosh. "
1301103-48 = "O-Okay. Thank you, Sensei."
1301103-49 = "Honestly, I don't know either."
1301103-50 = "I don't know what I should write or how I should write it."
1301103-51 = "At this rate, I don't think I'm qualified to be the scenario writer for the Game Development Department..."
1301103-52 = "[s3] \"I don't know what the perfect game story is.\"\n[s4] \"There's one thing I know for sure.\""
1301103-53 = "What do you know?"
1301103-54 = "What do you know?"
1301103-55 = "[s5] \"Whatever story you write, Momoi...\"\n[s6] \"...is gonna be the best story ever told.\""
1301103-56 = "...Heh."
1301103-58 = "...Heh."
1301103-60 = "Heh...I-I see."
1301103-61 = "Yes, the story that I want to write..."
1301103-62 = "It's the best story ever told!"
1301103-63 = "Yes! After hearing you out, I think I kind of get it."
1301103-64 = "All right! My motivation is maxed out!"
1301103-65 = "I came up with a great idea after listening to you!"
1301103-66 = "A special story that is rooted in conventions, but also goes far beyond that!"
1301103-69 = "So next time, read the script for my next story and let me know what you think, Sensei!"
1301103-70 = "[s] \"Yep, leave it to me.\""
1301103-73 = "A few days later, I received a MomoTalk message from Momoi."
1301103-74 = "What should I do, Sensei?"
1301103-75 = "I finally came up with an idea, and it's completely contradictory! I can't think of anything else! Please help me!"
1301103-76 = "Waaahhh!"
1301103-77 = "(As expected, Momoi was her normal self.)"

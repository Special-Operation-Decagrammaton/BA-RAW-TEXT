[translation]
10034030-1 = "第3話;狂獵的貴人"
10034030-5 = "嗯……雖然照老師說的來了……"
10034030-6 = "……啊，就是那邊。#n那個人白天就是在那邊進行街頭表演。"
10034030-7 = "現在……咦？"
10034030-11 = "[ns1]「現在也還有人在表演呢。」\n[ns2]「這麼晚了還在表演，真厲害。」"
10034030-14 = "先過去看看吧。#n現在天色有點暗，從這個距離看不太清楚……"
10034030-20 = "……果然是不同人呢。"
10034030-21 = "唔嗯……現在該怎麼辦呢……"
10034030-22 = "嗯？怎麼了，小姑娘？"
10034030-28 = "沒有監護人陪同的話，學生這麼晚還在外面逗留很危險的哦……"
10034030-29 = "啊，是我失禮了。原來有大人陪同啊，哈哈。"
10034030-30 = "不過話說回來，兩位這麼晚了還來這裡，應該不是特意來看街頭表演的吧……"
10034030-31 = "是有什麼特別的原因嗎？還是在找什麼人呢？"
10034030-32 = "[s3]「啊，其實是……」\n[s4] 說明來龍去脈"
10034030-36 = "原來如此，我大致明白了。"
10034030-37 = "雖然沒有親眼見過……但我知道你們在說的人是誰。"
10034030-38 = "真的嗎！？為，為什麼呢……"
10034030-39 = "畢竟那個人是狂獵的學生啊。#n而且他的實力也是不負狂獵之名的厲害……"
10034030-40 = "狂獵……？"
10034030-41 = "啊……這麼說來，那身制服……"
10034030-46 = "原來如此……怪不得當時……"
10034030-48 = "如果有事想找他的話，我可以告訴你們他最後出沒的地點，先去那邊看看如何？"
10034030-49 = "雖然現在大概已經不在那裡了……"
10034030-50 = "只要向最後見到他的人不斷打聽下去，應該遲早能找到他才對……"
10034030-51 = "唔嗯……不過這種方法只適合像我這種閒閒沒事的人呢。"
10034030-52 = "這位如果是老師的話，應該很忙碌吧。#n抱歉沒能幫上什麼忙。"
10034030-53 = "請，請別這麼說。#n光是您願意跟我們說這麼多就已經很感謝了。"
10034030-59 = "[ns5]「可以麻煩您告訴我們地點嗎？」\n[ns6]「您完全不需要道歉。我們很感謝您的幫助。」"
10034030-62 = "老師……？"
10034030-68 = "可，可是如果真的那麼做的話……#n不只會花很多時間……也不保證一定能找到……！"
10034030-69 = "你說沒關係？但是……"
10034030-70 = "[s7]「我其實挺喜歡在晚上散步的。」\n[s8]「比起坐在書桌前工作，我更享受現在這樣的時光。」"
10034030-80 = "是啊是啊。小姑娘，這種時候就應該聽大人的話。"
10034030-81 = "我這就告訴你們地點，快去看看吧。#n或許他正好就在那裡也說不定哦？"
10034030-82 = "好，好的……！那麼……！"
10034030-89 = "……謝謝您！"
10034030-94 = "（於是便和愛莉一起尋找著有關「在街頭表演的狂獵學生」的線索）"
10034030-105 = "（……然而直到接近天亮也沒有收穫）"
10034030-108 = "啊……已經這個時間了……"
10034030-109 = "對不起，老師。#n都是因為我，事情才會變成這樣……害你得熬夜到現在。"
10034030-110 = "你說沒關係嗎？哈哈……"
10034030-111 = "……對不起。#n雖然老師總是說沒關係，但還是……"
10034030-112 = "不行，這樣下去也只會繼續讓老師為難而已。"
10034030-113 = "明明我心裡……也很清楚這件事……"
10034030-117 = "其實……我好幾次都想對老師說「沒關係，我們回去吧」。"
10034030-118 = "要是有早點說出口，也不會走到這個地步了。"
10034030-119 = "而且那個人可是「狂獵」的學生，跟我這種人完全是天壤之別……"
10034030-120 = "就算真的見到他了，又能怎麼樣呢……"
10034030-124 = "[ns9]「我們果然得稍微談談……」\n[ns10]「愛莉，等等……」"
10034030-127 = "……怎麼一大清早就有人在說負面的話呢？"
10034030-132 = "……！？#n人，人的聲音？是誰……？"
10034030-133 = "聽了不禁讓人擔心，於是便從甜美的睡夢中醒了過來。"
10034030-142 = "登登～沉睡在森林中的公主……「椎名紬」登場囉。"
10034030-143 = "如果覺得公主太老套的話，要稱呼我為甦醒的魔王或自曝身分的間諜也無妨……"
10034030-144 = "雖然這裡既不是森林，也沒有公主。但是──"
10034030-149 = "──「感性」。"
10034030-150 = "……是很重要的。"
10034030-151 = "因此現在最重要的，是我們的主角心裡的煩惱。"
10034030-152 = "沒錯，說的正是這位小姐。"
10034030-156 = "[ns11]「你在戶外的灌木叢裡睡覺嗎！？」\n[ns12]「要是感冒的話怎麼辦……！！」"
10034030-159 = "……哎呀。"
10034030-160 = "多麼精準的吐槽啊！"
10034030-161 = "我明白了。你扮演的是守護在主角身旁的綠葉。"
10034030-162 = "像是吉祥物之類的存在……嗎？"
10034030-168 = "……？"
10034030-172 = "啊────────！！！"
10034030-173 = "突然就開始發聲練習了嗎！"
10034030-174 = "就就就就是他，老師！！他就是我說的那個人……！！"
10034030-175 = "在街頭表演的狂獵學生！！"
10034030-176 = "……嗯？"
10034030-177 = "哎呀呀……這還真是意想不到的機緣啊……"
10034030-178 = "兩位……"
10034030-179 = "……該不會一直在找我吧？"
10034030-181 = "原來如此……我明白了。"
10034030-182 = "雖然不是有意為之……但讓你們經歷了如此漫長又艱困的旅程，真是抱歉呢。"
10034030-183 = "不，不會。我們沒有要責怪你的意思……"
10034030-184 = "不過兩位不覺得正是因為有這段旅程，我們的相遇才更顯得意義非凡嗎？"
10034030-185 = "……？"
10034030-186 = "這麼說對兩位或許有些唐突，但我對現在的情況感到非常滿意。#n我就好比是三顧茅廬之中的隱士……或是迷宮中的寶物。"
10034030-187 = "不，我認為就算用「海賊王的大祕寶」這種浮誇的說法也不為過哦？"
10034030-192 = "[ns13] 詢問愛莉是否真的是這個人\n[ns14]「（輕聲）感覺是位有點奇怪的朋友呢……」"
10034030-195 = "（輕聲）我，我也是第一次跟本人說話……"
10034030-197 = "為了不辜負如此充滿戲劇性的相遇，我也必須負起回應兩位的「責任」。"
10034030-198 = "縱使現實沒有這樣的規定或法律來約束，但此時此刻──"
10034030-203 = "──「氛圍」。"
10034030-204 = "……是很重要的。"
10034030-205 = "我，椎名紬。#n會在物質及精神上全心全意地協助兩位。"
10034030-206 = "真，真的嗎？你真的願意幫助我們嗎？"
10034030-207 = "既然只是幫忙選曲而非作曲……稱之為「幫助」都讓人有點難為情了呢。"
10034030-208 = "你希望找出怎麼樣的曲子？#n我們可憐的主角想要什麼樣的BGM呢？"
10034030-209 = "告訴我你喜歡或想演奏的歌曲吧。#n我會盡我所能提供意見的。"
10034030-210 = "那，那麼……！"
10034030-211 = "可以通過試鏡的那種……！！"
10034030-212 = "……？"
10034030-213 = "……咦？"
10034030-214 = "請幫我們選出一首「能在試鏡時獲得好評」的曲子！！"
10034030-215 = "……嗯？不好意思，我還有點不太理解。你剛才說什麼？"
10034030-216 = "能在試鏡時獲得好評的曲子……？那是什麼意思？"
10034030-217 = "就是字面上的意思！我們打算參加兩週後的三一狂歡節開幕表演。"
10034030-218 = "而表演的目的……是想讓大家看到我們出色的表現。#n所以在那之前，我們得先通過試鏡才行……"
10034030-219 = "啊……哈哈……"
10034030-220 = "咦……？"
10034030-221 = "……這樣會很奇怪嗎？#n我是不是說了什麼失禮的話……"
10034030-222 = "不，沒什麼好奇怪的。#n創作音樂或演奏音樂的理由，任何人都無權干涉。"
10034030-223 = "道理雖然是這樣……但是……嗯……"
10034030-227 = "……總之我明白了。#n這就是故事目前的發展走向。"
10034030-228 = "我的腦海中確實浮現了幾首歌曲……我會幫你挑選出最合適的。"
10034030-230 = "……！！"
10034030-231 = "……不過。"
10034030-232 = "……！？不，不過……？"
10034030-237 = "不過……#n如果故事就這麼發展下去……"
10034030-238 = "我不知道現在說這些話，能對主角產生多少影響。"
10034030-239 = "畢竟世上本來就存在一些「需要經過時間洗禮才會領悟」的關鍵字。#n而這也是我非常喜歡的主題。"
10034030-240 = "所以我想先告訴你──現階段沒必要太過講究。"
10034030-241 = "嗯……？？？"
10034030-242 = "……主角──栗村愛莉同學。"
10034030-243 = "……請，請說！？"
10034030-249 = "……音樂就像一匹駿馬，能讀懂人的情緒和心意。"
10034030-250 = "若是因為害怕而感到焦慮，那就不是你在駕馭音樂，而是音樂在駕馭你。"
10034030-251 = "請不要因為擔心被追逐而不敢騎上去……"
10034030-256 = "……願你成為能一同悠遊其中之人。"

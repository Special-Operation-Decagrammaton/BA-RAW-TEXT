[translation]
10034030-1 = "ตอนที่ 3;ผู้ให้ความช่วยเหลือจากไวลด์ฮันต์"
10034030-5 = "อืม... เรามาที่นี่กันตามที่คุณครูเสนอแล้ว..."
10034030-6 = "อ๊ะ... ตรงนั้นค่ะ เมื่อตอนกลางวันเธอมาเล่นเปิดหมวกอยู่ตรงนั้นค่ะ"
10034030-7 = "แต่ว่าตอนนี้... เอ๋?"
10034030-11 = "[ns1] \"ตอนนี้ก็มีคนมาเล่นดนตรีอยู่แฮะ\"\n[ns2] \"มืดขนาดนี้แต่ก็ยังมาเล่นอยู่อีก สุดยอดไปเลยนะ\""
10034030-14 = "เราไปดูกันก่อนมั้ยคะ? นี่ก็มืดแล้ว ดูจากตรงนี้แล้วมองไม่ออกเลยค่ะว่าเป็นใคร..."
10034030-20 = "ไม่ใช่จริงๆ ด้วย เป็นคนละคนกันค่ะ"
10034030-21 = "อืม... แล้วทีนี้จะทำยังไงดี..."
10034030-22 = "หืม? มีธุระอะไรที่นี่น่ะหนู?"
10034030-28 = "เป็นนักเรียนแท้ๆ มาเดินอยู่ข้างนอกตอนกลางคืนแบบนี้มันอันตรายนะ แล้วก็ไม่มีผู้ปกครองมาด้วย..."
10034030-29 = "เอ๋? ฉันเสียมารยาทเข้าให้แล้วสินะเนี่ย มากับผู้ใหญ่นี่เอง ฮ่าฮ่า"
10034030-30 = "มืดค่ำป่านนี้แล้ว คงไม่มีทางมาที่นี่เพราะจะมาดูการแสดงหรอกใช่มั้ย?"
10034030-31 = "มีเหตุผลอื่นรึเปล่า? หรือว่ามาตามหาใครอยู่?"
10034030-32 = "[s3] \"เหตุผลที่พวกเรามาน่ะ...\"\n[s4] อธิบายเรื่องทั้งหมดให้ฟัง"
10034030-36 = "ฉันพอเข้าใจสถานการณ์แล้วละ ก่อนหน้านี้เกิดเรื่องแบบนั้นนี่เอง"
10034030-37 = "ถึงฉันจะไม่ได้เห็นเด็กคนนั้นด้วยตัวเอง... แต่ก็พอรู้ว่าคนที่พูดถึงคือใคร"
10034030-38 = "จริงเหรอคะ!? ระ... รู้ได้ยังไง..."
10034030-39 = "ก็เธอคนนั้นเป็นนักเรียนของไวลด์ฮันต์น่ะสิ ได้ยินว่ามีความสามารถเก่งกาจสมกับเป็นเด็กไวลด์ฮันต์#nเลยละ..."
10034030-40 = "ไวลด์ฮันต์...?"
10034030-41 = "อ่า... จะว่าไป ชุดนักเรียนนั่น..."
10034030-46 = "เป็นแบบนี้นี่เอง... เป็นนักเรียนของที่นั่นสินะ..."
10034030-48 = "เอาเป็นว่าถ้าอยากตามหา ฉันจะบอกให้ว่าที่สุดท้ายที่ฉันได้ยินว่าเด็กคนนั้นไปคือที่ไหน ลองไปหาจากที่นั่นดูไหมล่ะ?"
10034030-49 = "แต่ก็แน่นอนว่าตอนนี้เด็กคนนั้นคงไม่อยู่ตรงนั้นแล้ว..."
10034030-50 = "แต่คนที่เจอเด็กคนนั้นที่นั่นอาจจะรู้ก็ได้ว่าเธอจะไปเปิดหมวกที่ไหนต่อ ถ้าไล่ถามไปเรื่อยๆ ก็น่าจะเจอก็ได้นะ...?"
10034030-51 = "อืม... นี่น่าจะเป็นงานที่เหมาะกับคนที่มีเวลาเหลือเฟืออย่างฉันนะ"
10034030-52 = "เห็นว่าเป็นคุณครูงั้นเหรอ งานคงจะยุ่งน่าดูเลยนะ นี่ฉันชวนคุยจนเสียมารยาทไปหรือเปล่า..."
10034030-53 = "มะ... ไม่หรอกค่ะ แค่ให้ข้อมูลกับพวกเราก็ขอบคุณมากๆ แล้วละค่ะ"
10034030-59 = "[ns5] \"งั้นช่วยบอกตำแหน่งหน่อยได้มั้ย?\"\n[ns6] \"เสียมารยาทอะไรกัน พวกเราต่างหากที่ต้องขอบคุณ\""
10034030-62 = "คุณครู...?"
10034030-68 = "ตะ... แต่ว่าน่าจะใช้เวลานานเลยนะคะ... แถมยังไม่การันตีอีกว่าเราจะหาตัวเจอหรือเปล่า..."
10034030-69 = "ไม่เป็นไรงั้นเหรอคะ...? แต่ว่า..."
10034030-70 = "[s7] \"ครูชอบเดินเล่นตอนกลางคืนน่ะ\"\n[s8] \"แบบนี้สนุกกว่านั่งทำงานในสำนักงานเยอะเลย\""
10034030-80 = "เอาละๆ แม่หนู เราควรจะเชื่อฟังคำของผู้ใหญ่นะ"
10034030-81 = "ฉันจะบอกตำแหน่งให้ รีบไปที่นั่นแล้วกัน ใครจะไปรู้? บางทีอาจจะโชคดีเจอตัวก็ได้นะ"
10034030-82 = "ค่ะ... ค่ะ...! ได้เลยค่ะ…"
10034030-89 = "ขอบคุณนะคะ...!"
10034030-94 = "(จากนั้นคุณครูกับไอริก็ออกตามหาเบาะแสของ 'นักเรียนไวลด์ฮันต์ที่มาเล่นดนตรี' ตามข้อมูลที่ได้รับ#nมา)"
10034030-105 = "(แม้จะตามหากันจนรุ่งสาง แต่ก็ไม่มีความคืบหน้าใดๆ)"
10034030-108 = "อ่า... เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย..."
10034030-109 = "ขอโทษนะคะคุณครู สุดท้ายก็เป็นแบบนี้จนได้สินะคะ คุณครูต้องอดหลับอดนอนเพราะฉันแท้ๆ เลย"
10034030-110 = "ไม่เป็นอะไรงั้นเหรอคะ? แหะๆ..."
10034030-111 = "ขอโทษค่ะ คุณครูชอบบอกว่าไม่เป็นไรอยู่เรื่อย แต่ถึงอย่างนั้นก็เถอะ..."
10034030-112 = "ไม่สิ จะเป็นแบบนี้ไม่ได้ เพราะถ้าเป็นแบบนี้ คุณครูก็น่าจะยิ่งไม่สบายใจ"
10034030-113 = "ฉันรู้ว่าคุณครูอยากช่วยนะคะ... แต่ว่า..."
10034030-117 = "ที่จริงแล้ว... ฉันคิดจะบอกอยู่หลายครั้งแล้วค่ะว่า \"ไม่ต้องช่วยตามหาแล้ว คุณครูกลับเถอะค่ะ\""
10034030-118 = "ถ้าฉันบอกคุณครูไปตอนนั้น คุณครูก็คงไม่ต้องมาโต้รุ่งแล้วไม่ได้ผลลัพธ์อะไรเลยอยู่อย่างนี้"
10034030-119 = "อีกอย่าง คนคนนั้นก็เป็นนักเรียนจาก 'ไวลด์ฮันต์' ที่เราไม่มีทางรู้จักกันด้วย..."
10034030-120 = "ต่อให้หากันเจอ ฉันจะไปทำอะไรได้..."
10034030-124 = "[ns9] \"เรื่องนี้เอาไว้ค่อยคุย...\"\n[ns10] \"ไอริ เดี๋ยวนะ...\""
10034030-127 = "เหมือนจะมีใครพูดอะไรในแง่ลบตั้งแต่เช้ามืดเลยนะคะ"
10034030-132 = "...!? สะ... เสียงคนนี่นา...?"
10034030-133 = "พอได้ยินแล้วฉันก็กังวลจนตื่นจากฝันหวานเลยค่ะ"
10034030-142 = "ตึ่งงง! ถึงเวลาปรากฏตัวขององค์หญิงนิทราในป่าลึก <ชิอินะ สึมุกิ> แล้วสินะคะ"
10034030-143 = "ถ้าเบื่อเรื่องเจ้าหญิงแล้ว จะคิดว่าเป็นราชาปีศาจที่ตื่นมาหรือสายลับที่ถูกเปิดเผยตัวก็ได้นะคะ เอาตามสะดวกได้เลยค่ะ..."
10034030-144 = "เพราะที่จริงแล้วฉันก็ไม่ได้เป็นทั้งเจ้าหญิง และไม่ได้อยู่ในป่าลึก..."
10034030-149 = "แต่เพราะ 'อารมณ์'..."
10034030-150 = "เป็นสิ่งสำคัญน่ะค่ะ"
10034030-151 = "ตอนนี้สิ่งที่สำคัญที่สุดคือความกลัดกลุ้มที่ตัวเอกของเรามีอยู่"
10034030-152 = "ใช่แล้วค่ะ ฉันหมายถึงแม่หนูคนนี้นี่แหละ"
10034030-156 = "[ns11] \"มานอนอยู่ในพงไม้กลางแจ้งเหรอเนี่ย!?\"\n[ns12] \"ถ้าไม่สบายขึ้นมาจะทำยังไง...!!\""
10034030-159 = "ตายจริง..."
10034030-160 = "โต้ตอบอย่างเหมาะเจาะในจังหวะที่เหมาะเหม็งเลย!"
10034030-161 = "ฉันเข้าใจแล้วค่ะ คุณเป็นคนอย่างนี้สินะคะ คนที่คอยปกป้องตัวเอก..."
10034030-162 = "หรือว่าเป็นอะไรที่คล้ายๆ กับ... มาสคอต?"
10034030-168 = "...?"
10034030-172 = "อ๊ายยยยยยย!!!"
10034030-173 = "การที่เปล่งเสียงออกมากะทันหันแบบนี้!"
10034030-174 = "คะ... คะ... คนนี้แหละค่ะ! คนนี้แหละค่ะคุณครู!! คนที่ฉันเล่าให้ฟัง...!!"
10034030-175 = "นักเรียนจากไวลด์ฮันต์ที่มาเล่นดนตรีเปิดหมวกน่ะค่ะ!!"
10034030-176 = "หืม...? "
10034030-177 = "เดี๋ยวก่อนนะ... โชคชะตาแปลกๆ แบบนี้มัน..."
10034030-178 = "นี่พวกคุณทั้งสองคน..."
10034030-179 = "กำลังตามหาฉันอยู่งั้นเหรอคะ?"
10034030-181 = "แบบนี้เองสินะ... ฉันเข้าใจแล้วค่ะ"
10034030-182 = "ฉันก็ไม่ได้ตั้งใจให้เป็นแบบนี้หรอกนะ... แต่ฉันทำให้พวกคุณต้องเดินทางอย่างยาวนานและลำบาก#nแล้วสินะคะ ฉันรู้สึกผิดขึ้นมาเลยค่ะ"
10034030-183 = "มะ... ไม่หรอกค่ะ พวกเราไม่ได้ลำบากเลย..."
10034030-184 = "แต่การเดินทางนั้นก็ทำให้การเจอกันของเรามีคุณค่าขึ้นมาไม่ใช่เหรอคะ?"
10034030-185 = "...?"
10034030-186 = "ที่ฉันพูดแบบนี้อาจจะฟังดูเสียมารยาทสำหรับทั้งคู่ แต่ฉันพอใจกับสถานการณ์ในตอนนี้มากเลยค่ะ รู้สึกเหมือนตัวเองเป็นคนสำคัญในนิทานโบราณ... หรือไม่ก็เหมือนเป็นสมบัติในเขาวงกต"
10034030-187 = "ไม่สิ ต้องบอกว่าเป็นสมบัติของราชาโจรสลัดสิถึงจะถูก ฉันรู้สึกแบบนั้นน่ะค่ะ"
10034030-192 = "[ns13] ถามไอริว่าคนที่เจอคือคนนี้จริงๆ หรือเปล่า\n[ns14] (กระซิบ) \"ดูเหมือนจะเป็นคนแปลกๆ อยู่หน่อยๆ นะ...\""
10034030-195 = "(กระซิบ) ฉันก็เพิ่งเคยคุยกับเธอเป็นครั้งแรกเหมือนกันค่ะ..."
10034030-197 = "แต่การที่เราได้เจอกันอย่างน่าทึ่งแบบนี้ ฉันเองก็มี 'หน้าที่' ที่ต้องรับผิดชอบ"
10034030-198 = "ถึงจะไม่มีกฏเกณฑ์หรือกฎหมายให้ทำอะไรแบบนั้นจริงๆ ก็เถอะ..."
10034030-203 = "แต่ 'ความเป็นไป'..."
10034030-204 = "ก็เป็นสิ่งสำคัญนี่คะ"
10034030-205 = "ดีเลยค่ะ ถ้างั้นชิอินะ สึมุกิคนนี้จะช่วยเหลือทั้งสองท่านด้วยกายและใจเลยค่ะ"
10034030-206 = "จะ... จริงเหรอคะ? จะช่วยพวกเราจริงๆ เหรอคะ?"
10034030-207 = "นี่ไม่ใช่การแต่งเพลงขึ้นมาใหม่ แต่เป็นแค่การช่วยเลือกเพลงที่เหมาะสมเท่านั้น จะเรียกว่าเป็น 'ความช่วยเหลือ' มันก็กระไรอยู่นะคะ"
10034030-208 = "ชอบเพลงแบบไหนกันเหรอคะ? ตัวเอกที่น่าเห็นใจของพวกเราต้องการเพลงประกอบแบบไหนคะ?"
10034030-209 = "บอกฉันมาได้เลยค่ะว่าชอบเพลงอะไร แล้วฉันจะใช้พลังเล็กๆ น้อยๆ ที่มีคัดสรรเพลงออกมาให้ค่ะ"
10034030-210 = "ถะ... ถ้างั้น...!"
10034030-211 = "ขอเป็นเพลงที่จะผ่านการคัดเลือกหรือการออดิชั่น...!!"
10034030-212 = "...?"
10034030-213 = "คะ...?"
10034030-214 = "ช่วยเลือกเพลงที่มีแนวโน้มที่จะได้รับการประเมินดีๆ ในการคัดเลือกหรือการประกวดหน่อยค่ะ!!"
10034030-215 = "อืม...? ขอโทษนะคะ ฉันไม่ค่อยเข้าใจเท่าไร เมื่อกี้คุณพูดว่าอะไรนะคะ?"
10034030-216 = "เพลงที่ควรใช้ในการคัดเลือกหรือการประกวด...? หมายความว่ายังไงเหรอคะ?"
10034030-217 = "ก็หมายความตามที่พูดเลยค่ะ! พวกฉันจะต้องเล่นดนตรีเพื่อเปิดงานทรีนิตี้คาร์นิวัลในอีก 2 สัปดาห์ หลังจากนี้น่ะค่ะ"
10034030-218 = "เป้าหมายของฉันก็คือ... แสดงดนตรีที่ทำให้คนอื่นเห็นภาพลักษณ์ที่ดีของพวกเราค่ะ แต่ก่อนอื่นเราจะต้องผ่านการคัดเลือกก่อน..."
10034030-219 = "อ๋อ..."
10034030-220 = "ทะ... ทำไมเหรอคะ...?"
10034030-221 = "มีอะไรแปลกอย่างนั้นเหรอคะ? หรือว่าฉันเผลอพูดอะไรเสียมารยาทไป..."
10034030-222 = "ไม่ค่ะ ไม่มีอะไรแปลกหรอกค่ะ เหตุผลในการเล่นดนตรีเป็นสิ่งที่ใครอื่นไม่ควรเข้าไปแทรกแซงอยู่แล้ว#nละค่ะ"
10034030-223 = "ไม่ควรเลย... แต่ว่า... ฮืม..."
10034030-227 = "ที่มาที่ไปเป็นแบบนี้เองสินะคะ ฉันเข้าใจแล้วค่ะ"
10034030-228 = "พอเข้าใจสถานการณ์แล้วก็พอนึกเพลงได้อยู่บ้างค่ะ พวกคุณลองเลือกดูนะคะ"
10034030-230 = "...!!"
10034030-231 = "แต่ว่า..."
10034030-232 = "คะ... คะ...!? แต่ว่า...?"
10034030-237 = "แต่ว่า อืม... ในเมื่อตอนนี้เรื่องดำเนินมาเป็นแบบนี้..."
10034030-238 = "ถึงฉันจะพูดอย่างนี้ แต่ก็ไม่รู้เลยนะคะว่าจะมีความหมายกับตัวเอกของเรื่องมากแค่ไหน"
10034030-239 = "แต่เราก็ย่อมตระหนักถึงความหมายได้ในภายหลังอยู่แล้ว แล้วนั่นก็เป็นธีมที่ฉันชอบมากด้วย"
10034030-240 = "งั้นฉันจะขอบอกพวกคุณไว้ก่อนแล้วกันค่ะ จำคำของฉันไว้ให้ดีๆ นะคะ"
10034030-241 = "หืม...???"
10034030-242 = "คุณคุริมูระ ไอริ ตัวเอกของเรื่อง"
10034030-243 = "คะ... คะ!?"
10034030-249 = "ดนตรีเปรียบเสมือนม้าตัวใหญ่ที่สามารถอ่านใจและความรู้สึกของคนขี่ได้ค่ะ"
10034030-250 = "ถ้าเรากระวนกระวายใจและกลัวการขี่ม้า เราจะไม่ใช่คนควบคุมม้า แต่จะเป็นม้าที่ควบคุมเรา"
10034030-251 = "เพราะฉะนั้น อย่าได้กลัวที่จะขึ้นขี่ม้า..."
10034030-256 = "และขอให้สนุกกับมันนะคะ"

[translation]
10034030-1 = "Episode 3;The Honored Guest from Wildhunt"
10034030-5 = "Well, Sensei, here we are..."
10034030-6 = "...Ah. Over there. She was out busking over there that day."
10034030-7 = "Now it's... Huh?"
10034030-11 = "[ns1] \"Someone's still out busking now.\"\n[ns2] \"I'm impressed they're working hard so late.\""
10034030-14 = "It's hard to tell who they are from this far away. Let's get closer."
10034030-20 = "...No, that's someone else."
10034030-21 = "Hm... What should we do now...?"
10034030-22 = "Hm? What's going on, lady?"
10034030-28 = "It's dangerous for a student to be out this late, all by yourself..."
10034030-29 = "Oh, pardon me, sorry. You're not all by yourself. Haha."
10034030-30 = "Well, you probably didn't come out here at night to watch a street performance."
10034030-31 = "What brings you here? Are you looking for someone?"
10034030-32 = "[s3] \"Ah, the thing is...\"\n[s4] Explain the situation."
10034030-36 = "I see. All right, I think I get it."
10034030-37 = "I didn't see her myself, but... I think I might know who you're talking about."
10034030-38 = "Really?! H-How..."
10034030-39 = "Oh I think I know who you're talking about. Sounds like a certain Wildhunt student I know. She's really talented."
10034030-40 = "Wildhunt...?"
10034030-41 = "Ah... Now that I think about it, that uniform..."
10034030-46 = "...I see... That's why she was..."
10034030-48 = "Anyways, I'll let you know where I heard she was last at. If you want to find her, you could start there."
10034030-49 = "Not that she'd be there right now."
10034030-50 = "But you could always ask around there, see if anybody saw her, ask 'em where she went, repeat..."
10034030-51 = "Hmm. Well, I guess that only makes sense if you have as much free time as I do."
10034030-52 = "And you're a teacher, so you're probably too busy. No offense."
10034030-53 = "It's all good. Thank you anyway."
10034030-59 = "[ns5] \"Could you tell us where she was?\"\n[ns6] \"No worries. We appreciate your help.\""
10034030-62 = "Sensei...?"
10034030-68 = "Th-This is really going to take a long time. And that's IF we find her at all!"
10034030-69 = "...It's fine? Really? But..."
10034030-70 = "[s7] \"I like going for walks at night.\"\n[s8] \"Hey, it beats doing paperwork.\""
10034030-80 = "Times like this, you better listen to your grownup, lady."
10034030-81 = "I'll tell you the place. If you get there quick, and you're lucky, you might find her there."
10034030-82 = "Y-Yeah...! So...!"
10034030-89 = "...Thank you!"
10034030-94 = "Airi and I stayed on the trail all night."
10034030-105 = "...But we didn't find her."
10034030-108 = "Oh jeez, what time is it?"
10034030-109 = "I'm so sorry, Sensei. You stayed up all night because of me."
10034030-110 = "What? You're fine? Haha..."
10034030-111 = "...I mean, you always SAY that, but..."
10034030-112 = "No, hey, I should quit moping. That'd probably just bother you more."
10034030-113 = "And I get that, but..."
10034030-117 = "The thing is... I thought of saying, \"it's okay, let's go back\" multiple times."
10034030-118 = "If I'd said that, we wouldn't still be here."
10034030-119 = "Besides, she's a Wildhunt student, way different from me..."
10034030-120 = "And even if I found her, I..."
10034030-124 = "[ns9] \"Let me get a word in here...\"\n[ns10] \"Airi. Hold on...\""
10034030-127 = "...A little early in the morning for all that griping, isn't it?"
10034030-132 = "W-Who said that? Who's there?"
10034030-133 = "Me. I was having a nice dream, but your worries woke me up."
10034030-142 = "Ta-da. It's me, the sleeping beauty in the woods... Shiina Tsumugi."
10034030-143 = "You don't have to call me \"beauty,\" though. We could say I'm an awakened demon lord, or a spy, you just caught. Up to you."
10034030-144 = "Now, of course this isn't actually the woods, and I'm no beauty, but..."
10034030-149 = "...the emotion..."
10034030-150 = "...is important here."
10034030-151 = "Namely, the emotional distress from our protagonist."
10034030-152 = "That's right, we're talking about the story of this lady."
10034030-156 = "[ns11] \"You were sleeping in the bushes?!\"\n[ns12] \"You might catch a cold...!\""
10034030-159 = "...Oh, my."
10034030-160 = " Fair point. Well timed!"
10034030-161 = "So, that's who you are. You're the essential character who always protects the protagonist by their side."
10034030-162 = "Maybe you're everyone's mascot...or something like that."
10034030-168 = "Hm?"
10034030-172 = "Ahhh!!"
10034030-173 = "Oh! You startled me!"
10034030-174 = "Th-that...! It's her, Sensei!! She's the one I was talking about!"
10034030-175 = "The Wildhunt busker!"
10034030-176 = "Hm? What?"
10034030-177 = "Oh, my... What a twist of fate..."
10034030-178 = "So the two of you..."
10034030-179 = "...have been looking for me? All this time?"
10034030-181 = "...I see, I see. I understand."
10034030-182 = "Looks like I put you through the wringer, unintentionally. My apologies."
10034030-183 = "N-Not at all. I didn't plan on this, I just..."
10034030-184 = "Then again, maybe the journey is what gives the destination meaning."
10034030-185 = "Hm?"
10034030-186 = "Don't take this the wrong way, but I like how this worked out. Reminds me of how the warlord had to visit the strategist three times. I feel like the treasure at the heart of the labyrinth."
10034030-187 = "Or, how about we go bigger? I feel like the treasure hoard of a pirate king."
10034030-192 = "[ns13] \"Airi, are you sure this is the right person?\"\n[ns14] \"*whisper* She's a bit of a weird one...\""
10034030-195 = "*whisper* I-I mean, I've never talked to her before..."
10034030-197 = "Worry not, considering our fateful encounter, I have an obligation to respond."
10034030-198 = "Not a LEGAL obligation, mind you, but the..."
10034030-203 = "...\"flow\"..."
10034030-204 = "...is important here."
10034030-205 = "Right: I, Shiina Tsumugi, will help the two of you with all my might, to the best of my abilities."
10034030-206 = "R-Really? You mean that?"
10034030-207 = "It's embarrassing to call it \"help\" when you just want me to help you pick out a song, not even compose one."
10034030-208 = "So what kind of song would you like? What BGM does our delicate protagonist here desire?"
10034030-209 = "Whatever you'd like to learn to play, I'll try my best to help however I can."
10034030-210 = "O-Okay, then...!"
10034030-211 = "Something that'll help pass a test or an audition...!!"
10034030-212 = "Hm?"
10034030-213 = "...Huh?"
10034030-214 = "Please pick a song that would get the best rating in a rehearsal or an evaluation!"
10034030-215 = "...Hm? Sorry, you lost me for a second. What did you say?"
10034030-216 = "The best song to go with a test or an evaluation...? What's that about?"
10034030-217 = "It's like I said! We're trying to do the opening concert for Trinity Carnival in two weeks."
10034030-218 = "We want to be in that concert, and show people what we can do. But we need to audition first..."
10034030-219 = "...A...ha..."
10034030-220 = "Hm? H-Huh...?"
10034030-221 = "...Is something strange? I didn't upset you, did I?"
10034030-222 = "No. Well, there's nothing strange about it. Everyone has their own reasons for getting into music, and no one can interfere with that right."
10034030-223 = "No one... But... Hm..."
10034030-227 = "...I see. I understand. So this is where the story's taken us so far."
10034030-228 = "All right, I can pick out a few songs for you. Got a couple in mind already."
10034030-230 = "*gasp*"
10034030-231 = "...But."
10034030-232 = "Hm?! Y-Yes? But...?"
10034030-237 = "But um... Well, you know how these stories go."
10034030-238 = "The protagonist hears something cryptic and mysterious, and they don't understand it."
10034030-239 = "But then, later on, it all makes sense. I like those kinds of stories."
10034030-240 = "So let me just say something, and don't overthink it right now."
10034030-241 = "Um... Uh..."
10034030-242 = "...Protagonist, Kurimura Airi."
10034030-243 = "...Y-Yes?!"
10034030-249 = "...Music is like a horse. It can read your feelings. Maybe even your thoughts."
10034030-250 = "If you get nervous while you're riding it, it'll roll over on top of you."
10034030-251 = "So don't be afraid to get on top of it..."
10034030-256 = "...and become the kind of person who enjoys the ride."

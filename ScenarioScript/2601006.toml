[translation]
2601006-1 = "存在感的確認"
2601006-2 = "兔寶寶鎮"
2601006-3 = "（因為很在意美優傳來的MomoTalk，匆忙趕往了RABBIT小隊營地的方向）"
2601006-4 = "（……找到美優的身影，並沒有花太多時間）"
2601006-6 = "啊，老師……"
2601006-7 = "你，你好……"
2601006-10 = "雖然有想過，老師應該馬上就會找到我……#n好像比平時更快呢……"
2601006-11 = "莫非……這就是新穿搭的效果嗎……呵呵……"
2601006-12 = "[s1]「美，美美……美優……？」\n[s2]「你那身打扮究竟是……？」"
2601006-15 = "那個……"
2601006-16 = "因為時尚雜誌上面寫，可以試著改變平時的穿搭……"
2601006-17 = "[s3]「這，這是穿搭嗎……」\n[s4]「這是泳裝吧！？」"
2601006-20 = "是……是之前買的泳裝。"
2601006-21 = "就算在海邊或泳池穿泳裝，畢竟跟周圍的人一樣，所以並不會引人注目……"
2601006-22 = "但是在街上幾乎不會有人穿泳裝，就算是存在感低的我是不是也能吸引目光呢……"
2601006-23 = "反正泳裝在海邊或泳池也會被人看見……#n就算是令人害羞的打扮應該也不會被抓走……"
2601006-24 = "[s]「有孩子穿著泳裝走在街上的話，不管是誰都會看的吧！？」"
2601006-25 = "是，是這樣嗎……？"
2601006-26 = "可，可是，我從早上就一直穿著泳裝……"
2601006-27 = "別說是被人搭話了，反而好像被躲著一樣……"
2601006-28 = "[s]「那個大概是因為……」"
2601006-42 = "……很難向我搭話，是嗎……？"
2601006-43 = "……如果是沒注意到我的話還能理解……"
2601006-44 = "難道，是我自己有問題嗎……？"
2601006-45 = "[s]「……總之先換回制服吧？」"
2601006-46 = "為什麼呢……？"
2601006-47 = "好不容易，才想出了一個好辦法……"
2601006-48 = "居然又要回到沒有存在感的樣子……"
2601006-50 = "你看那邊……#n夏萊的老師是不是把穿泳裝的學生弄哭了？"
2601006-51 = "居然會有穿著泳衣的學生在街上，我正覺得奇怪呢……#n難道是因為夏萊的老師！？"
2601006-52 = "竟然讓那麼柔弱的孩子做這種羞恥的事……"
2601006-53 = "看來夏萊果然跟傳聞中一樣是個可怕的地方……"
2601006-54 = "[ns]「算我拜託你了，好嗎……！？」"
2601006-56 = "（在那之後，雖然告訴美優不要穿著泳裝到街上去，並獲得了他的同意……）"
2601006-57 = "（然而關於夏萊的奇怪傳聞卻傳了出去，為了解開誤會費了好一番工夫）"

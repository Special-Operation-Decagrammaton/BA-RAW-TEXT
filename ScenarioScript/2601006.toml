[translation]
2601006-1 = "บททดสอบความกล้า"
2601006-2 = "โคะอุซางิ ทาวน์"
2601006-3 = "(คุณครูกังวลกับข้อความที่มิยุส่งมา เลยรีบออกไปที่ถนนแถวๆ แคมป์ของกองทหาร RABBIT)"
2601006-4 = "(และที่นั่น... คุณครูก็หาตัวมิยุเจอได้ไม่ยาก...)"
2601006-6 = "อ๊ะ คุณครู..."
2601006-7 = "ทะ...ทางนี้ค่ะ..."
2601006-10 = "คิดอยู่แล้วว่าอีกแป๊บหนึ่งคุณครูคงจะมาหาแน่ๆ แต่ดูเหมือนว่าคราวนี้จะมาเร็วกว่าทุกครั้งเลยนะคะ..."
2601006-11 = "ดูเหมือน...พลังของแฟชั่นเลย... ฮิฮิ..."
2601006-12 = "[s1] \"มะ...มะ...มิยุ...?\"\n[s2] \"ใส่ชุดอะไรเนี่ย?\""
2601006-15 = "คือว่าเรื่องนั้น..."
2601006-16 = "ฉันแค่อยากเปลี่ยนสไตล์ชุดลำลองที่ใส่บ้าง ตามที่เห็นมาจากนิตยสารแฟชั่นน่ะค่ะ"
2601006-17 = "[s3] \"ชุดนั้นเรียกว่าชุดลำลองได้ด้วยเรอะ...\"\n[s4] \"นั่นมันชุดว่ายน้ำต่างหาก?!\""
2601006-20 = "ค่ะ... ฉันลองใส่ชุดว่ายน้ำที่เลือกมาเมื่อคราวที่แล้วน่ะค่ะ"
2601006-21 = "เวลาใส่ชุดว่ายน้ำไปทะเลหรือที่สระว่ายน้ำ ถ้าไม่ใช่คนที่มีออร่าโดดเด่นมากจริงๆ ละก็ จะไม่มีทางเป็นที่สังเกตเพราะชุดที่ใส่ได้เลย..."
2601006-22 = "ถ้าใส่ชุดว่ายน้ำตอนมาเดินในเมืองละก็จะแสดงถึงการต่อต้านการใส่ชุดให้เหมาะกับกาลเทศะ#nอย่างเห็นได้ชัด เลยคิดว่า... ต่อให้เป็นคนที่จืดจางอย่างฉันก็น่าจะเป็นที่สังเกตได้... น่ะค่ะ..."
2601006-23 = "ยังไงมันก็เป็นชุดที่เอาไว้โชว์ให้คนอื่นดูอยู่แล้ว เพราะงั้นเลยไม่คิดว่าทำผิดหรือน่าอายอะไร..."
2601006-24 = "[s] \"ถ้าใส่ชุดว่ายน้ำละก็ต้องเป็นที่สนใจอยู่แล้ว!\""
2601006-25 = "งะ... งั้นเหรอคะ...?"
2601006-26 = "แต่สงสัยเพราะฉันเป็นมนุษย์จืดจางยิ่งกว่าใคร เลยดูเหมือนไม่ค่อยมีใครสนใจเท่าไรเลยค่ะ..."
2601006-27 = "ฉันใส่ชุดว่ายน้ำมาตั้งแต่เช้าแล้ว แต่ว่าก็ไม่มีใครพูดอะไรด้วยเลย..."
2601006-28 = "[s] \"ครูว่าอาจเป็นเพราะเรื่องอื่น...\""
2601006-42 = "คะ...? เพราะเข้ามาคุยกับฉันยากเหรอคะ?"
2601006-43 = "แต่ว่า... ปกติตอนที่ใส่ชุดนักเรียนก็ไม่ค่อยมีคนเข้ามาพูดด้วยก่อนอยู่แล้ว..."
2601006-44 = "แปลกจัง... ฉันดูเข้ามาคุยด้วยยากงั้นเหรอคะ...?"
2601006-45 = "[s] \"ก่อนอื่นรีบกลับไปเปลี่ยนเป็นชุดนักเรียนก่อนเถอะ...\""
2601006-46 = "...คะ? ให้กลับไปเปลี่ยนเป็นชุดธรรมดาเหรอคะ?"
2601006-47 = "ฉันอุตส่าห์หาวิธีดีๆ เจอแล้ว แต่คุณครูจะให้ฉันกลับไปใส่ชุดที่ตัวตนจืดจางอีกงั้นเหรอคะ..."
2601006-48 = "ทำไมถึงใจร้ายจัง..."
2601006-50 = "...ดูนั่นสิ คุณครูของชาเล่ต์ทำอะไรนักเรียนที่ใส่ชุดว่ายน้ำอยู่น่ะ แถมยังกล้าทำกลางเมืองแบบนี้ด้วย"
2601006-51 = "คิดอยู่ตั้งนานว่าทำไมถึงใส่ชุดว่ายน้ำมายืนอยู่ตั้งแต่เช้า... เป็นเพราะคุณครูจากชาเล่ต์งั้นเหรอเนี่ย?"
2601006-52 = "สั่งให้เด็กสาวตัวเล็กบอบบางแบบนั้นมาทำอะไรน่าอายแบบนี้งั้นเหรอ..."
2601006-53 = "ชาเล่ต์นี่น่ากลัวเหมือนข่าวลือที่ได้ยินมาจริงๆ ด้วยสินะ..."
2601006-54 = "[ns] \"ครูไหว้ละ เรารีบกลับกันเถอะ...!\""
2601006-56 = "(หลังจากนั้น คุณครูก็พยายามอ้อนวอนขอร้องไม่ให้มิยุใส่ชุดว่ายน้ำออกมาที่ถนนอีก...)"
2601006-57 = "(...ข่าวลือแปลกๆ ของชาเล่ต์ที่แพร่กระจายมากขึ้น ทำให้คุณครูรู้สึกลำบากใจที่จะอธิบายให้เด็ก#nนักเรียนคนอื่นฟัง)"

2601006-20 = "3;미유 수영복;02;네…… 저번에 고른 수영복을 입어 보았어요.\n#3;greeting"
2601006-21 = "3;미유 수영복;99;바다나 수영장에서 수영복을 입고 있으면 존재감이 대단한 사람이 아닌 이상, 옷 때문에 시선을 받는 경우는 거의 없지만……\n#3;em;…"
2601006-22 = "3;미유 수영복;04;시내에서 수영복을 입고 있으면 명백하게 TPO를 거스르는 일이니, 저처럼 존재감이 부족한 사람이라도 시선을 끌 수 있지 않을까, 해서요……"
2601006-23 = "3;미유 수영복;99;어차피 다른 사람에게 보여주기 위한 옷이니 부끄럽거나 경범죄가 되는 것도 아니고……"

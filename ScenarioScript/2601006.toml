[translation]
2601006-1 = "A Bold Test"
2601006-2 = "Kousagi Town"
2601006-3 = "After receiving a troubling MomoTalk from Miyu, I rushed out to the streets near RABBIT Squad's camp."
2601006-4 = "And it wasn't hard to find her..."
2601006-6 = "Sensei..."
2601006-7 = "O-Over here..."
2601006-10 = "I knew you'd come, but I didn't think you'd get here this fast..."
2601006-11 = "Maybe my new outfit is effective... Heehee..."
2601006-12 = "[s1] \"M-M-M-M-Miyu?!\"\n[s2] \"What are you wearing?!\""
2601006-15 = "R-Right, about that..."
2601006-16 = "I wanted to change up my look, like I saw in this fashion magazine."
2601006-17 = "[s3] \"You call this 'changing up your look'?\"\n[s4] \"So you put on a swimsuit?!\""
2601006-20 = "Yes... I thought I'd give this swimsuit a try."
2601006-21 = "If you wear one to the beach or at a pool, nobody really cares unless you've got a big presence..."
2601006-22 = "Wearing a swimsuit in town is a great way to stick out, though. So I figured I might draw some attention this way..."
2601006-23 = "And it's not like there's anything wrong with it. Clothes are meant to be seen, right...?"
2601006-24 = "[s] \"Of course you're going to draw attention!\""
2601006-25 = "A-Are you sure about that...?"
2601006-26 = "You know how nobody ever notices me... No matter what I do..."
2601006-27 = "I've been wearing this swimsuit all day, and nobody's said a word to me..."
2601006-28 = "[s] \"They probably don't know where to begin, with you dressed like that...\""
2601006-42 = "Y-You think that's the reason...?"
2601006-43 = "But...even when I wear my school uniform, almost no one talks to me..."
2601006-44 = "Maybe nobody ever knows where to begin with me..."
2601006-45 = "[s] \"We can talk about that later. First, we need to get you in your school clothes.\""
2601006-46 = "You want me to go back to the way I was...?"
2601006-47 = "I finally th-think of a way to stand out, and you tell me to get back in my boring, old, unnoticeable uniform..."
2601006-48 = "Why are you being so mean...?"
2601006-50 = "Hey, isn't that Schale's Sensei? Why are they yelling at that student? And why's she in a swimsuit...?"
2601006-51 = "I saw her walking around in that swimsuit earlier... Did Schale's Sensei make her put it on?"
2601006-52 = "I can't believe they'd embarrass a poor, defenseless student in public like that..."
2601006-53 = "I heard Schale was a scary place, but I never imagined..."
2601006-54 = "[ns] \"Please, please, please, can we go now?\""
2601006-56 = "I finally convinced Miyu not to wear a swimsuit out in the streets..."
2601006-57 = "But it was too late to stop more strange rumors about Schale from spreading..."

[translation]
84304100600-5 = "謝謝……多虧有你才能得救。"
84304100600-6 = "這位會員，雖然有熱忱是好事，但基本上還是要考慮自己的步調……"
84304100600-10 = "不，不是的！這不是我爭強好勝……！"
84304100600-11 = "雖然我的確因為想快速減肥，所以選了稍強的強度沒錯……"
84304100600-12 = "但本來並沒有這麼快，是速度突然自己變了！"
84304100600-13 = "速度……自己變了？"
84304100600-14 = "怎麼會……雖然可惜，但目前還沒有那種客製化功能啊……"
84304100600-16 = "（可惜……？）"
84304100600-17 = "可惜……！？"
84304100600-18 = "真奇怪。難道是機器出問題了嗎？"
84304100600-19 = "……"
84304100600-24 = "呿，本來還以為成功了呢……"
84304100600-25 = "不過也很接近成功了吧。#n以前就算一直提高強度也沒用，不覺得這是個令人振奮的結果嗎？"
84304100600-29 = "……？"
84304100600-34 = "結果是目標的問題嗎……那個穿著運動服的傢伙，那個傢伙就是問題……！"
84304100600-35 = "對啊對啊。#n無論再怎麼提高器材重量和訓練強度，都還是能輕鬆辦到的那傢伙才有問題！"
84304100600-36 = "既然已經按照吩咐調整過了，我們先溜吧。"
84304100600-37 = "沒關係嗎？不用確認演示有沒有被搞砸嗎？"
84304100600-38 = "合約上又沒有寫。既然已經按照吩咐做了就該付錢。#n要是待在這裡被抓到的話也是個問題。"
84304100600-39 = "也是啦……"
84304100600-40 = "好了好了，快走吧。#n剛好大家的注意力都放在那個大個子女人身上，現在是個好時機。"
84304100600-41 = "走吧走吧！"
84304100600-47 = "……嘿。"
84304100600-48 = "結果還是跟莉央說的一樣啊。"
84304100600-52 = "喂，莉央。你有在聽吧？"
84304100600-57 = "嗯。終於找到線索了呢。"
84304100600-58 = "是啊，總算是抓到了。"
84304100600-59 = "我馬上跟過去。"
84304100600-60 = "趕緊結束這樁麻煩事吧。"

[translation]
84304100600-5 = "ขอบคุณค่ะ... ฉันรอดมาได้เพราะคุณเลย"
84304100600-6 = "คุณสมาชิกคะ การฝึกซ้อมอย่างเต็มที่ก็เป็นเรื่องที่ดี แต่โดยพื้นฐานแล้วเราต้องปรับให้เหมาะสมกับ#nเพซของตัวเอง..."
84304100600-10 = "มะ... ไม่ใช่ค่ะ! ไม่ใช่อย่างนั้นค่ะ! ฉันไม่ได้จะดึงดันนะคะ...!"
84304100600-11 = "ฉะ... ฉันยอมรับว่าฉันเลือกความเร็วเยอะไปหน่อยเพราะอยากลดน้ำหนักให้ได้ไวๆ..."
84304100600-12 = "แต่ปกติแล้ว ที่ระดับความเร็วนี้มันไม่เร็วแบบนี้ค่ะ ความเร็วมันปรับเพิ่มเองระหว่างที่ฉันวิ่งค่ะ!"
84304100600-13 = "ความเร็ว... ปรับเพิ่มเองเหรอคะ? "
84304100600-14 = "เป็นไปได้ยังไง... เราไม่มีฟังก์ชันปรับความเร็วเองในลู่วิ่งไฟฟ้านะคะ ถึงจะอยากให้มีก็เถอะ..."
84304100600-16 = "(ถึงจะอยากให้มีก็เถอะ...?)"
84304100600-17 = "ถึงจะอยากให้มีก็เถอะ...!?"
84304100600-18 = "แปลกจังเลยนะคะ หรือว่าจะมีปัญหาอะไรกับลู่วิ่งไฟฟ้าคะ?"
84304100600-19 = "..."
84304100600-24 = "ชิ! นึกว่าจะสำเร็จแล้วซะอีก..."
84304100600-25 = "แต่ก็ถือว่าเกือบสำเร็จแล้วไม่ใช่เหรอ ต่อให้เพิ่มความเร็วอีกแค่ไหนก็ไม่มีประโยชน์หรอก เราทำกันดีที่สุดแล้วละ"
84304100600-29 = "...?"
84304100600-34 = "หรือว่าปัญหาจะอยู่ที่เป้าหมาย... ยัยคนที่ใส่ชุดพละคนนั้นน่ะ หรือว่าปัญหาจะอยู่ที่ยัยนั่น...!"
84304100600-35 = "ใช่ๆ! เพราะไม่ว่าจะเพิ่มความเร็วของลู่วิ่งมากขนาดไหน ยัยนั่นก็ยังวิ่งต่อได้อย่างไม่สะทกสะท้าน งั้นปัญหาก็อยู่ที่ยัยนั่นละ!"
84304100600-36 = "เราทำตามคำสั่งที่ได้รับมาแล้ว งั้นจากนี้ก็หนีกันเถอะ"
84304100600-37 = "จะไปได้เลยเหรอ? เราต้องเห็นกับตาก่อนว่างานพังไม่เป็นท่าไม่ใช่เหรอ?"
84304100600-38 = "ในสัญญาไม่ได้มีเขียนบอกไว้แบบนั้นนี่นา เราทำตามคำสั่งแล้ว ทางนั้นก็คงให้เงินแล้วละ ขืนยังอยู่ต่อแล้วโดนจับได้มันจะเป็นปัญหาตามมานะ"
84304100600-39 = "ก็นะ..."
84304100600-40 = "เอาละๆ รีบออกจากที่นี่เถอะ ตอนนี้ทุกคนกำลังให้ความสนใจสาวชุดพละคนนั้นอยู่พอดี"
84304100600-41 = "งั้นเรารีบเผ่นกันเถอะ!"
84304100600-47 = "ฮืม..."
84304100600-48 = "ดูเหมือนว่าริโอะจะพูดถูกนะ"
84304100600-52 = "นี่ ริโอะ ได้ยินใช่มั้ย?"
84304100600-57 = "อื้อ ในที่สุดเราก็เจอเงื่อนงำแล้วสินะ"
84304100600-58 = "อ่า ใช่ ในที่สุดก็เจอจนได้"
84304100600-59 = "ฉันจะไล่ตามพวกนั้นไป"
84304100600-60 = "มาหยุดเรื่องที่น่ารำคาญนี้กันซะที"

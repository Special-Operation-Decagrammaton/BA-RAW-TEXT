[translation]
10005010-1 = "Episode 1;Bein' Smart"
10005010-2 = "Two days ago at the briefing."
10005010-5 = "Approximately thirty-seven hours ago, first-year Kurosaki Koyuki, codename White Rabbit, escaped from the self-reflection room."
10005010-6 = "She slipped out of range of Seminar's surveillance network before we realized the situation."
10005010-7 = "Oh dear, her again?"
10005010-8 = "She simply won't allow us to forget her, will she?"
10005010-9 = "What is our resident criminal's indiscretion this time? Grade forgery? Deleting student's records?"
10005010-10 = "...Issuing unauthorized bonds."
10005010-11 = "Not only that, but she's issuing them in Seminar's name."
10005010-12 = "If my calculations are correct, which, well, they are, we'll be bankrupt in three days."
10005010-16 = "Do you understand the gravity of the situation we're in?"
10005010-17 = "Oh dear."
10005010-18 = "This is her greatest performance yet."
10005010-19 = "[s1] \"...White Rabbit?\"\n[s2] \"Kurosaki Koyuki?\""
10005010-20 = "Um."
10005010-21 = "Um."
10005010-22 = "My apologies. I don't believe you've ever heard her name. Please, allow me."
10005010-25 = "There has been more than one arrest operation for the girl known as Kurosaki Koyuki. Codename: \"White Rabbit\"."
10005010-26 = "While once affiliated with Seminar, she's now its biggest headache and a known menace in Millennium."
10005010-27 = "Does she cause trouble or does trouble follow her? She's chaos itself, an absolute loose cannon."
10005010-30 = "Sensei asked how she manages to get away with it?"
10005010-31 = "That's..."
10005010-32 = "She has a unique inclination for it. A gift, you could say."
10005010-33 = "Her ability to compute mathematical calculations quickly and accurately is terrifying."
10005010-34 = "To her, our encryptions and security systems are child's play."
10005010-35 = "Basically, she uses her mathematical gifts to crack any password standing in her way."
10005010-36 = "Changing passwords means nothing to her. She'll still dance through them like they don't exist."
10005010-37 = "Isn't it rather impressive? She can hack our best security systems faster than a computer."
10005010-38 = "*sigh* We originally brought her to Seminar because of her astounding abilities."
10005010-39 = "Who would've thought she'd instead become such a thorn in your side, as she likes to call herself. Heehee."
10005010-40 = "She's more like a giant guillotine hanging over my head."
10005010-41 = "If not for her Seminar affiliations, she would be rotting with the Corrections Bureau already."
10005010-42 = "But with the amount of confidential information she's accrued, I can hardly send her away."
10005010-43 = "...Anyways, please follow the usual procedure."
10005010-44 = "Of course. As usual, C&C is at your service."
10005010-45 = "To be clear, I just don't have any other options."
10005010-46 = "Our biggest issue here is automata and drones are out of the question."
10005010-47 = "I was rather confused about that particular detail. Why is that?"
10005010-48 = "While her computational skills are astounding, her combat abilities aren't quite up to par. A drone should make quick work of this, no?"
10005010-49 = "You see..."
10005010-50 = "The White Rabbit's fled somewhere we can't exactly send automata to."
10005010-51 = "She's gone beyond Millennium and D.U. entirely to a different school district."
10005010-52 = "[s3] \"A different school district?\"\n[s4] \"She's not in Millennium?\""
10005010-53 = "She's fled to Odyssey Maritime School. Their school is made of a fleet of ships."
10005010-54 = "She's fled to Odyssey Maritime School. Their school is made of a fleet of ships."
10005010-55 = "Specifically, to a ship called the Golden Fleece."
10005010-56 = "We keep cordial relations with Odyssey, so I did send a personal inquiry..."
10005010-57 = "From my information, the Golden Fleece is an old ship they've left half for dead."
10005010-58 = "She won't say what she's doing there or why she's escaped, only that she'll make money her own way."
10005010-59 = "Oh, dear... It looks like the problem child has boarded a problem vessel."
10005010-60 = "What could she possibly be attempting to accomplish issuing fake bonds? A coup d'état?"
10005010-61 = "That was my primary concern. If she's trying to graduate from petty crimes to an entire revolt..."
10005010-62 = "And to fund it using bonds issued in Seminar's name!"
10005010-63 = "Ugh, I think my headache is coming back."
10005010-64 = "Anyways, it may be neglected, but the Golden Fleece is still Odyssey's ship."
10005010-65 = "We would be violating the rules if we tried to send a drone after her."
10005010-66 = "Ah, and so..."
10005010-67 = "You're now in need of some agents. Heehee."
10005010-68 = "...I would like to emphasize we need SECRET agents."
10005010-69 = "Aha...haha..."
10005010-70 = "That's the entire briefing. I expect C&C to act in accordance with the gravity of the situation."
10005010-71 = "You can't mess this one up, okay? I won't be able to help this time if you do."
10005010-72 = "No call signs, no uniforms. We're just normal civilians passing by."
10005010-73 = "Normal civilians who will not be caught on this mission. Will. Not. Be. Caught."
10005010-74 = "This isn't our school, so all of your actions will hold weight. So, quietly! Without being caught! Did I say quietly already?"
10005010-75 = "Be smart about it! Please..."
10005010-77 = "Hm... Be smart..."
10005010-78 = "[s5] \"...Then what should we do from here?\"\n[s6] \"I have a feeling you already have a plan.\""
10005010-79 = "Heehee. Always the perceptive one, Sensei."
10005010-80 = "Heehee. Always the perceptive one, Sensei."
10005010-81 = "First things first, let's establish a base of operations."
10005010-82 = "We'll find an empty cabin on the deck and secure a temporary base."
10005010-83 = "Then we'll just tiptoe along to the systems office, neutralize the surveillance systems, locate White Rabbit, and then..."
10005010-84 = "Hey! Who's there?"
10005010-85 = "...?!"
10005010-86 = "...!"
10005010-87 = "...?"
10005010-94 = "Why are you in the engine room? Identify yourself immediately!"
10005010-95 = "Huh?! Why don't you identify yourself?"
10005010-96 = "And what in the heck are you wearing anyway?"
10005010-97 = "...? What do you mean?"
10005010-98 = "You're the ones wearing unsanctioned attire!"
10005010-99 = "Those aren't passenger school uniforms or guard outfits."
10005010-100 = "Is that a maid uniform? Those were denied ages ago!"
10005010-101 = "I've identified you as a suspicious threat. I suggest you cooperate."
10005010-102 = "Everyone, this way! There are some weirdos..."
10005010-103 = "...!"
10005010-113 = "...Hrrgh?!"
10005010-118 = "Ah!"
10005010-119 = "Well. No one can deny you act quickly."
10005010-120 = "And the Seminar treasurer told us to not get caught so many times..."
10005010-121 = "Ahaha! I guess we failed that one already!"
10005010-122 = "W-Wait, this is... Um...!"
10005010-123 = "Sensei, listen to me! It wasn't my fault!"
10005010-124 = "[s7] \"I think that was unavoidable.\"\n[s8] \"This should still be okay...right?\""
10005010-125 = "R-Really?! You think so?"
10005010-126 = "R-Really?! You think so?"
10005010-127 = "Uh, I mean, yes! I agree!"
10005010-128 = "Ahahaha!"
10005010-129 = "All according to plan! Hahaha!"
10005010-130 = "Did anyone else hear that?"
10005010-131 = "Intruders! Intruders in the engine room!"
10005010-136 = "..."
10005010-137 = "..."
10005010-143 = "Time to run!"

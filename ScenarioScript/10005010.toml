10005010-32 = "5;통신유우카;01;재능이 있거든요. 꽤 특이한 재능이죠.\n#5;em;[반응]"
10005010-33 = "5;통신유우카;99;특정 부분의 계산에 있어 믿을 수 없을 만큼 빠른 연산 능력……."
10005010-34 = "5;통신유우카;06;하필이면 그 연산능력이라는 게, 특정 암호체계를 무의미하게 만들어버리는 쪽이라서요.\n#5;em;[땀]"
10005010-35 = "1;통신아카네;02;말하자면 밀레니엄 내에 사용되는 디지털 암호의 대부분을, 암산으로 풀어버릴 수 있다는 이야기죠."
10005010-36 = "1;통신아카네;01;암호를 바꿔도 의미가 없어요. 암호를 아는 게 아니라, 암호를 푸는 법을 아는 것이니까요."
10005010-37 = "1;통신아카네;03;정말 굉장한 재능이죠? 밀레니엄 최고의 컴퓨터도 그 정도로 빠르게 해독하진 못한다고요.\n#1;em;[음표]"
10005010-38 = "5;통신유우카;99;하아……. 사실 세미나에 데려온 것도 그 능력을 보고 데려왔던 건데…….\n#5;em;[속상함]"
10005010-39 = "1;통신아카네;02;이렇게까지 통제할 수 없는 말썽꾸러기인 줄은 몰랐다……. 라는 이야기죠. 후훗."
10005010-40 = "5;통신유우카;06;'말썽꾸러기'라고 표현할 만큼 귀여운 사안들이 아니라고.\n#5;hophop"
10005010-41 = "5;통신유우카;99;정말이지. 세미나 출신만 아니었어도 진즉 교정국에 넣어버렸을걸."
10005010-42 = "5;통신유우카;05;이젠 학원 내 기밀사항도 꽤 많이 알고 있어서 그것조차도 못 할 상황이라 그렇지……."
10005010-43 = "5;통신유우카;01;……아무튼 그래서, 이번에도 늘 그렇듯이…….\n#5;em;…"
10005010-44 = "1;통신아카네;01;네. 이번에도 저희 C&C가 그 일을 맡게 됐다. 그런 이야기지요?\n#1;em;[반응]"
10005010-45 = "5;통신유우카;99;정말 '어쩔 수 없이'말이지.\n#5;em;[속상함]"
10005010-46 = "5;통신유우카;01;무엇보다 이번 일에는, 우리도 오토마타나 드론을 쓸 수 없으니까."
10005010-47 = "1;통신아카네;04;……어라? 그러고 보니 궁금하군요. 그건 어째서죠?\n#1;em;[?]"
10005010-48 = "1;통신아카네;01;백토의 전투 능력은 잘 봐줘도 중학생 수준이잖아요? 드론으로 제압하지 못할 이유가 있나요?"
10005010-49 = "5;통신유우카;06;으음. 그게…….\n#5;em;[땀]"
10005010-50 = "5;통신유우카;06;탈출한 백토가 향한 곳이 애초에 오토마타들을 보낼 수가 없는 곳이거든."
10005010-51 = "5;통신유우카;99;밀레니엄 자치구나 D.U.가 아닌, 다른 학교의 자치구 안이라서…….\n#5;em;…"
10005010-52 = "[s3] \"다른 학교의 자치구?\"\n[s4] \"밀레니엄이 아니라고?\""
10005010-53 = "5;통신유우카;02;네. 도망친 곳은 <오디세이아 해양학교>라고 하는, 여러 대의 배들로 이루어진 학교로.\n#5;em;[반응]"
10005010-54 = "5;통신유우카;02;네. 도망친 곳은 <오디세이아 해양학교>라고 하는, 여러 대의 배들로 이루어진 학교로.\n#5;em;[반응]"
10005010-55 = "5;통신유우카;05;그중에서도 크루즈선의 하나인 <골든 플리스>호 라는 배예요."
10005010-56 = "5;통신유우카;99;사실 오디세이아 측과는 자주 밀레니엄과 교류도 하는 곳이라, 직접 학교 측에도 좀 부탁해 보긴 했는데……."
10005010-57 = "5;통신유우카;01;듣자 하니 골든 플리스호는 학교 측에서도 반쯤 방치하고 있는 선박인 것 같더라고요."
10005010-58 = "5;통신유우카;06;학생회의 말도 안 듣고, 배에서 뭘 하는지 말도 안 해주고, 예산도 스스로 번다고…….\n#5;em;[땀]"
10005010-59 = "1;통신아카네;04;저런……. 문제아가 문제 선박에 숨어든 상황이네요."
10005010-60 = "1;통신아카네;05;채권까지 발행해 가면서……. 무슨 일을 하는 걸까요? 쿠데타라도 준비하는 걸까요?\n#1;em;[?]"

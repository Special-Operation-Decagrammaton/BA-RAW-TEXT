[translation]
10005010-1 = "第1話;聰明地行動吧"
10005010-2 = "（再次回到兩天前，在作戰會議中……）"
10005010-5 = "約37小時前，千年科學學園1年級學生「黑崎小雪」……#n代號「白兔」逃出了反省室。"
10005010-6 = "當我掌握情況時，他已經完全脫離研討會的監視網了。"
10005010-7 = "哎呀，又是那孩子啊。"
10005010-8 = "真是個喜歡在我們快要忘記他的時候闖禍的孩子呢。"
10005010-9 = "所以呢，在逃出之後又做了什麼事嗎？#n把學園的資料庫全部格式化了之類的……？"
10005010-10 = "……擅自發行了債券。"
10005010-11 = "而且還是用研討會的名義。#n就連此時此刻，似乎也刷刷地不停印製著……"
10005010-12 = "照這個節奏下去，如果計算正確的話，2天後……就會和你們想的一樣破產。"
10005010-16 = "……也就是說，情況相當不妙。"
10005010-17 = "……"
10005010-18 = "確實，不是什麼好情況呢……"
10005010-19 = "[s1]「……『白兔』？」\n[s2]「『黑崎小雪』……？」"
10005010-20 = "啊，這麼說來老師可能還不知道呢。"
10005010-21 = "啊，這麼說來老師可能還不知道呢。"
10005010-22 = "就從那裡開始說明吧。"
10005010-25 = "黑崎小雪，代號「白兔」……之所以會有這種代號，#n是因為至今為止已經進行了多次對他的捕獲作戰，卻屢屢被他逃跑的緣故……"
10005010-26 = "在千年是相當令人頭痛的問題兒童，同時也是研討會煩惱的種子……#n啊，雖然他現在已經沒有所屬社團，但原本可是「研討會所屬」的孩子呢。"
10005010-27 = "是個相當嚴重的問題製造者，也被稱為行走變數或行動亂源。"
10005010-30 = "……？啊，對了。"
10005010-31 = "只是逃走的話，倒也不是很令人頭痛。"
10005010-32 = "他是個擁有相當特異才能的孩子。"
10005010-33 = "雖然有其限制，但在特定的領域裡有著無與倫比的能力……"
10005010-34 = "簡單來說，能以異常的速度解開密碼系統，就是這樣的能力。"
10005010-35 = "即使是千年使用的高階數位密碼，他多半都能輕鬆地解除。"
10005010-36 = "與其說是計算能力的問題，#n不如說是「能憑感覺知道解除密碼的方法」這一類的能力呢。"
10005010-37 = "就連千年最先進的電腦無法立即解讀的密碼，他也能輕鬆解開。"
10005010-38 = "像是RSA密碼那種類型的處理可以說是異常的擅長。#n我們也是看中了那個能力，所以才會請他加入研討會的……"
10005010-39 = "沒想到他竟然會是那種等級的問題兒童……這樣的感覺呢，呵呵。"
10005010-40 = "問題兒童……才不是那種可愛的存在呢，真是的。"
10005010-41 = "要不是原本所屬於研討會，就算被送去矯正局也不奇怪。"
10005010-42 = "但是現在他已經知道了那麼多千年的機密，所以我們也無法那麼做……"
10005010-43 = "……關於那孩子的事大概就是這樣。總之，這次也是一樣的委託唷。"
10005010-44 = "好的。也就是由我們C&C把他抓回來沒錯吧？"
10005010-45 = "沒錯。#n因為狀況相當不妙，所以只能拜託你們了……"
10005010-46 = "啊，除此之外，這次我們的機器人和無人機都無法使用。"
10005010-47 = "哎呀，是有什麼理由嗎？"
10005010-48 = "那孩子的戰鬥能力，頂多也就是國中生等級……#n不如說只要派出機器人，就算不這麼大費周章也能快速地解決吧……？"
10005010-49 = "這個嘛……"
10005010-50 = "那孩子逃向的地方，根本沒辦法把機器人送過去。"
10005010-51 = "不是千年自治區也不是D.U.，而是在其他學校的自治區……"
10005010-52 = "[s3]「其他學校的自治區……？」\n[s4]「他到哪裡去了呢？」"
10005010-53 = "「奧德賽海洋高級中學」……一間由複數的船所構成的學校。"
10005010-54 = "「奧德賽海洋高級中學」……一間由複數的船所構成的學校。"
10005010-55 = "其中有艘名為「黃金芙利號」的郵輪，那孩子就在那裡。"
10005010-56 = "奧德賽是和千年有一定往來的學校，所以我們也試著與他們聯絡了……"
10005010-57 = "但那艘船似乎屬於半管轄外，該這麼說嗎……"
10005010-58 = "不僅不聽學生會的話，就連船上現在的狀況如何也不清楚。#n似乎是艘自給自足的船……"
10005010-59 = "哎呀哎呀……我們的問題兒童跑到了對方學校的問題場所……"
10005010-60 = "並且還發行了債券，他究竟在那裡做什麼呢？#n在做政變的準備嗎？"
10005010-61 = "搞不清楚這點也讓人有不好的預感呢……#n希望沒有與不良集團勾結，計畫著什麼驚人的事情就好了……"
10005010-62 = "況且他們使用的還是以研討會的名義發行的債券……！"
10005010-63 = "啊啊真是的，不好的想像不斷膨脹……"
10005010-64 = "總之情況就是這樣。#n雖然對方說不在他們的管轄範圍內，那裡卻也不能算是我們管轄的範圍。"
10005010-65 = "派遣機器人和無人機到自己的自治區外是明確違反規矩的行為。"
10005010-66 = "原來如此……"
10005010-67 = "所以需要我們的力量，就是這麼回事吧。"
10005010-68 = "……沒錯，能「安靜地」處理這件事的能力是必要的。"
10005010-69 = "啊哈哈，知道了……"
10005010-70 = "事情大概就是這樣。"
10005010-71 = "我想你們應該也清楚，因為情況相當危險，所以不允許失敗。"
10005010-72 = "所以想請我們老實點，用裝成普通的乘客之類的方法……"
10005010-73 = "在此前提之上盡快且盡可能別引起騷動。#n後者「別引起騷動」是最重要的，請記住這一點！"
10005010-74 = "請銘記在心。這是在我們的自治區外的行動，絕對不要引起麻煩的騷動！#n平靜地，可以的話別被任何人發現！也就是說……"
10005010-75 = "請聰明一點！"
10005010-77 = "……那麼，就聰明地解決吧。"
10005010-78 = "[s5]「之後該怎麼做呢？」\n[s6]「具體來說要怎麼做？」"
10005010-79 = "嗯，開始說明這個部分吧。"
10005010-80 = "嗯，開始說明這個部分吧。"
10005010-81 = "首先，在船內建立據點是最優先的。"
10005010-82 = "先爬上有客房的樓層，占領一間空的房間，#n並將其作為作戰中的臨時據點。有什麼事就在那裡一一處理。"
10005010-83 = "之後前往中控室，將整艘船的監視系統癱瘓之後把白兔的位置──"
10005010-84 = "誰在那裡！？"
10005010-85 = "……！"
10005010-86 = "……！？"
10005010-87 = "……？"
10005010-94 = "你們在機房做什麼！？"
10005010-95 = "……啊？"
10005010-96 = "你那是什麼服裝？在開玩笑嗎？"
10005010-97 = "……？你在說什麼？"
10005010-98 = "那是我的台詞，為什麼沒換成兔女郎的服裝？"
10005010-99 = "看起來也不是負責警備人員……"
10005010-100 = "為什麼穿著女僕裝……？"
10005010-101 = "真可疑……是客人的話就不好意思了，請讓我調查一下吧。"
10005010-102 = "喂！過來這裡！集合！"
10005010-103 = "……呿！"
10005010-113 = "……呃啊！？"
10005010-118 = "……啊。"
10005010-119 = "真是的，隊長太早出手了……#n應該要試著用嘴蒙混過關的……"
10005010-120 = "明明被再三叮嚀要「小心別被人發現」、「聰明一點」的。"
10005010-121 = "啊哈哈，已經破壞約定了呢！"
10005010-122 = "不是，怎麼說呢這個……"
10005010-123 = "啊……老師。那個，這是因為……！"
10005010-124 = "[s7]「情況緊急，就當成是不得不的選擇吧……」\n[s8]「雖然不好意思，不過這是不可抗力，吧……」"
10005010-125 = "對，對吧！"
10005010-126 = "對，對吧！"
10005010-127 = "這也沒辦法嘛！"
10005010-128 = "反正也沒引起騷動！"
10005010-129 = "很好，Safe！"
10005010-130 = "剛才好像有什麼很大的聲音……！？"
10005010-131 = "剛才的聲音是從哪裡傳來的！？有入侵者嗎！？"
10005010-136 = "……"
10005010-137 = "……"
10005010-143 = "[ruby=出局]OUT[/ruby]～♪"

[translation]
10005010-1 = "ตอนที่ 1;แบบคูลๆ..."
10005010-2 = "(สถานการณ์ตอนคุยสรุปงานเมื่อ 2 วันก่อน)"
10005010-5 = "37 ชั่วโมงก่อน นักเรียนชั้นปีที่ 1 'คุโรซากิ โคยูกิ' โค้ดเนม <ชิโระอุซางิ> ได้หลบหนีออกไป#nจากห้องสำนึกผิด"
10005010-6 = "ตอนที่เรารู้สถานการณ์ เครือข่ายเฝ้าระวังของเซมิน่าก็ตามตัวเธอไม่ได้แล้ว"
10005010-7 = "ตายจริง... เด็กคนนั้นอีกแล้วเหรอคะ?"
10005010-8 = "พอคิดว่าเงียบๆ ไปทีไร เธอก็มักจะก่อเรื่องให้ต้องจัดการตลอดเลยนะคะ"
10005010-9 = "คราวนี้เธอก่อเรื่องอะไรขึ้นอีกเหรอคะ? ปลอมแปลงคะแนนตัวเอง? ลบข้อมูลผลการเรียนของนักเรียน#nคนอื่นๆ? หรือว่า..."
10005010-10 = "ออกพันธบัตรโดยไม่ได้รับอนุญาตน่ะ..."
10005010-11 = "แถมยังออกในนามของเซมิน่าอีกด้วย ตอนนี้กำลังอยู่ระหว่างตามเก็บอยู่..."
10005010-12 = "ถ้าปล่อยเอาไว้แบบนี้ เราต้องล้มละลายภายใน 3-4 วันแน่ๆ"
10005010-16 = "ตอนนี้พอจะเข้าใจบ้างรึยัง...? ว่าสถานการณ์ตอนนี้เป็นยังไง"
10005010-17 = "ตายจริง..."
10005010-18 = "เรื่องคราวนี้... ร้ายแรงพอตัวเลยนะคะ..."
10005010-19 = "[s1] \"ชิโระอุซางิ...?\"\n[s2] \"คุโรซากิ โคยูกิ?\""
10005010-20 = "เอ๊ะ..."
10005010-21 = "เอ๊ะ..."
10005010-22 = "ขอโทษค่ะ พอมาคิดดูแล้ว คุณครูคงจะได้ยินชื่อนี้เป็นครั้งแรกสินะคะ ฉันจะเล่าให้ฟังเองค่ะ"
10005010-25 = "คุโรซากิ โคยูกิ โค้ดเนม <ชิโระอุซางิ> เป็นโค้ดเนมที่ใช้ในแผนการจับกุมเด็กคนนั้นหลายครั้งแล้วค่ะ"
10005010-26 = "เธอเคยสังกัดอยู่ในชมรมเซมิน่าค่ะ เป็นทั้งตัวป่วนของเซมิน่า แล้วก็เป็นเด็กที่ชอบสร้างปัญหา#nในมิลเลเนียมเลยละ"
10005010-27 = "จะบอกว่าเป็นคนที่ชอบไปก่อปัญหา...และสร้างความวุ่นวายในทุกที่ที่ไปเลยก็ได้มั้งคะ..."
10005010-30 = "คะ...? ทำไมเธอถึงทำเรื่องแบบนั้นได้น่ะเหรอคะ?"
10005010-31 = "คือเรื่องนั้น..."
10005010-32 = "คงเป็นเพราะมีพรสวรรค์ละมั้งคะ เป็นพรสวรรค์ที่พิเศษมากๆ เลยค่ะ"
10005010-33 = "เธอมีพรสวรรค์ด้านการคำนวณได้รวดเร็วจนน่าเหลือเชื่อเลย..."
10005010-34 = "ความสามารถในการคำนวณของเธอทำให้ระบบการเข้ารหัสลับเฉพาะไร้ความหมายไปเลยละค่ะ"
10005010-35 = "หรือถ้าจะให้พูดอีกอย่างก็คือ เธอสามารถคำนวณและถอดรหัสลับส่วนใหญ่ที่ใช้ในมิลเลเนียม#nออกมาได้ค่ะ"
10005010-36 = "และถึงจะเปลี่ยนรหัสลับไปก็ไม่มีความหมาย เพราะว่าเธอไม่ได้รู้รหัสลับ แต่สิ่งที่เธอรู้คือวิธีการ#nถอดรหัสลับยังไงล่ะคะ"
10005010-37 = "เป็นพรสวรรค์ที่สุดยอดเลยใช่มั้ยคะ? คอมพิวเตอร์ที่ดีที่สุดในมิลเลเนียมยังไม่สามารถคำนวณ#nได้เร็วเท่าเธอเลยค่ะ"
10005010-38 = "เฮ้อ... ฉันเลือกเธอเข้ามาในเซมิน่าก็เพราะความสามารถนั้นแท้ๆ"
10005010-39 = "แต่ไม่รู้เลยว่าเธอจะกลายเป็นตัวป่วนขนาดนี้ ใช่มั้ยล่ะคะ ฮิฮิ"
10005010-40 = "เธอไม่ได้น่ารักจนใช้คำว่า \"ตัวป่วน\" ได้หรอกนะคะ"
10005010-41 = "จริงๆ เลย ถ้าเธอไม่ได้เคยเป็นสมาชิกของเซมิน่าละก็ ฉันคงส่งเธอไปนอนเล่นในสำนักควบคุมไปแล้ว"
10005010-42 = "แต่ตอนนี้เธอรู้ข้อมูลลับของโรงเรียนไปเยอะมาก ฉันเลยทำแบบนั้นไม่ได้..."
10005010-43 = "ยังไงก็เถอะ... คราวนี้ก็คงจะต้องทำเหมือนทุกครั้งละนะ"
10005010-44 = "ค่ะ งานคราวนี้ก็ต้องถึงมือ C&C อย่างพวกเราสินะคะ ฉันพูดถูกมั้ยคะ?"
10005010-45 = "ก็มัน \"ช่วยไม่ได้\" จริงๆ นี่นะ"
10005010-46 = "ยิ่งไปกว่านั้น คราวนี้เราจะใช้หุ่นจักรกลหรือโดรนก็ไม่ได้..."
10005010-47 = "เอ๊ะ...? จู่ๆ ก็น่าสงสัยนะคะ เพราะอะไรเหรอคะ?"
10005010-48 = "ความสามารถในการต่อสู้ของชิโระอุซางิอยู่ในระดับนักเรียนมัธยมต้นเองนี่คะ ทำไมถึงไม่อนุญาต#nให้ใช้โดรนล่ะคะ?"
10005010-49 = "อืม... คือว่า..."
10005010-50 = "ก็สถานที่ที่ชิโระอุซางิหลบหนีไป เป็นที่ที่ส่งหุ่นจักรกลเข้าไปไม่ได้น่ะสิ"
10005010-51 = "มันไม่ได้อยู่ในเขตปกครองมิลเลเนียมหรือ D.U. ของเรา แต่ดันเป็นเขตของโรงเรียนอื่นน่ะ..."
10005010-52 = "[s3] \"เขตของโรงเรียนอื่นเหรอ?\"\n[s4] \"ไม่ได้อยู่ในเขตมิลเลเนียมเหรอ?\""
10005010-53 = "ค่ะ สถานที่ที่เธอหนีไปคือโรงเรียนการเดินเรือโอดิสซีย์ ซึ่งเป็นโรงเรียนที่เกิดจากการรวมตัว#nของเรือขนาดใหญ่หลายๆ ลำค่ะ"
10005010-54 = "ค่ะ สถานที่ที่เธอหนีไปคือโรงเรียนการเดินเรือโอดิสซีย์ ซึ่งเป็นโรงเรียนที่เกิดจากการรวมตัว#nของเรือขนาดใหญ่หลายๆ ลำค่ะ"
10005010-55 = "และในบรรดาเรือขนาดใหญ่ก็มีเรือสำราญที่ชื่อ <โกลเด้น ฟลีซ> อยู่ค่ะ"
10005010-56 = "ที่จริงแล้วทางโอดิสซีย์ก็ได้มีการแลกเปลี่ยนกับทางมิลเลเนียมอยู่บ่อยๆ ฉันเลยไปขอร้องกับ#nทางนั้นโดยตรงแล้ว แต่ว่า..."
10005010-57 = "เท่าที่ได้ยินมา เรือโกลเด้น ฟลีซ ดูเหมือนจะอยู่กึ่งๆ ระหว่างการถูกตัดขาดจากทางโรงเรียนอยู่ค่ะ"
10005010-58 = "ทางนั้นไม่ยอมทำตามคำสั่งของสภานักเรียน และไม่มีการแจ้งว่าในเรือมีการทำอะไรบ้าง#nแถมยังมีการค้าบนเรืออีก..."
10005010-59 = "อะไรกัน... เด็กเจ้าปัญหาไปซ่อนตัวอยู่ในเรือที่มีปัญหาเหรอคะเนี่ย..."
10005010-60 = "แถมยังออกพันธบัตรเองอีก... เธอคิดจะทำอะไรกันแน่นะ? หรือว่าจะเตรียมปฏิวัติอยู่คะ?"
10005010-61 = "นั่นเป็นเรื่องที่ฉันกังวลที่สุดเลย ถ้าเธอกำลังเตรียมก่ออาชญากรรมครั้งใหญ่กับพวกคนไม่ดี..."
10005010-62 = "และถ้าใช้พันธบัตรทั้งหมดที่ออกในนามของเซมิน่าละก็...!"
10005010-63 = "คะ... แค่คิดก็หัวจะปวดแล้ว!"
10005010-64 = "แต่ต่อให้เป็นเรือที่โรงเรียนนั้นจะไม่ยุ่งเกี่ยวแล้วก็ตาม แต่เรือโกลเด้น ฟลีซ ก็ไม่ใช่เรือของโรงเรียน#nพวกเราใช่มั้ยล่ะ"
10005010-65 = "เพราะงั้นก็เลยจะส่งโดรนหรือหุ่นจักรกลไปบนเรือที่อยู่ในเขตของโรงเรียนอื่นไม่ได้ ถ้าทำแบบนั้น#nจะเป็นการละเมิดกฎน่ะ"
10005010-66 = "อ่ะฮ่า... เพราะงั้น..."
10005010-67 = "ฮุฮุ แบบนั้นก็เป็นไทม์มิ่งที่เหมาะเจาะสำหรับใช้ \"สายลับ\" สินะคะ"
10005010-68 = "ต้องเป็นสายลับที่ \"ลับสุดยอด\" เลยละ"
10005010-69 = "อ่ะฮะฮะฮะ..."
10005010-70 = "พูดมาขนาดนี้แล้ว เข้าใจแล้วใช่มั้ย? ฉันหวังว่าเธอจะเข้าใจแล้วนะว่าสถานการณ์มันร้ายแรงแค่ไหน"
10005010-71 = "ห้ามทำเสียเรื่องด้วยล่ะ เรื่องนี้ฉันไปตามล้างตามเช็ดให้ไม่ได้หรอกนะ!"
10005010-72 = "เพราะงั้นคราวนี้อย่าใช้โค้ดเนม และทำตัวให้เหมือนคนทั่วไป..."
10005010-73 = "เอาเป็นว่าจัดการให้เร็วๆ แล้วก็ไม่ให้ถูกจับได้ก็แล้วกัน สิ่งสำคัญคือ \"ห้ามถูกใครจับได้\" นะ!"
10005010-74 = "จำไว้ด้วยล่ะว่าที่นั่นไม่ใช่เขตของโรงเรียนเรา! ระวังๆ กันด้วย! ห้ามให้ใครรู้เด็ดขาด...!"
10005010-75 = "ไปเนียนๆ แบบคูลๆ แล้วใช้หัวคิดกันด้วยล่ะ...!"
10005010-77 = "แบบคูลๆ... งั้นเหรอ"
10005010-78 = "[s5] \"งั้นตอนนี้จะทำอะไรต่อล่ะ?\"\n[s6] \"ขอรายละเอียดของแผนการหน่อย\""
10005010-79 = "ฮุฮุ สำหรับเรื่องนั้น ฉันกำลังจะแจ้งคุณครูพอดีเลยค่ะ"
10005010-80 = "ฮิฮิ สำหรับเรื่องนั้น ฉันกำลังจะแจ้งคุณครูพอดีเลยค่ะ"
10005010-81 = "ก่อนที่เราจะเริ่มแผนปฏิบัติการ ก่อนอื่นก็ต้องหาฐานปฏิบัติการกันก่อนค่ะ"
10005010-82 = "เราจะขึ้นไปที่ชั้นที่มีห้องพักแล้วหาห้องว่างสักห้องใช้เป็นฐานทัพชั่วคราว"
10005010-83 = "จากนั้นก็จะรุดหน้าไปที่ห้องควบคุมระบบเพื่อจัดการกล้องวงจรปิด และหลังจากระบุพิกัด#nของชิโระอุซางิได้แล้ว..."
10005010-84 = "อะไรน่ะ? ใครอยู่ตรงนั้น?"
10005010-85 = "...!?"
10005010-86 = "...!!"
10005010-87 = "...?"
10005010-94 = "พวกเธอเป็นใครกัน? ที่นี่คือห้องเครื่องนะ มาทำอะไรกันอยู่ตรงนี้?"
10005010-95 = "หา...? นี่มันอะไรกันเนี่ย?"
10005010-96 = "ทำไมถึงใส่ชุดแบบนั้นล่ะ? เธอเป็นพวกไหนกันแน่เนี่ย?"
10005010-97 = "...? พูดเรื่องอะไรน่ะ...?"
10005010-98 = "เดี๋ยวก่อนนะ พวกเธอมากกว่ามั้งที่ใส่ชุดผิดระเบียบของที่นี่น่ะ...?"
10005010-99 = "ไม่ใช่ทั้งชุดของแขกที่มา แล้วก็ไม่ใช่ชุดของการ์ดด้วย..."
10005010-100 = "อะไรเนี่ย...? ชุดเมด? ในระเบียบอนุญาตให้ใส่ชุดนี้ด้วยเหรอ?"
10005010-101 = "น่าสงสัยจริงๆ คงต้องขอเชิญไปตรวจสอบแล้วละ"
10005010-102 = "เฮ้ ทุกคน! มาทางนี้เร็วเข้า! ตรงนี้มีพวกคนแปลกๆ อยู่..."
10005010-103 = "...!!"
10005010-113 = "อะ... อึก...!?"
10005010-118 = "อ่า..."
10005010-119 = "เอ๊ะ... รวดเร็วมากเลยนะคะ"
10005010-120 = "คุณนักบัญชีของทางเซมิน่าย้ำนักย้ำหนาว่า \"เป็นความลับ\" นะคะ..."
10005010-121 = "อะฮ่ะฮ่า! ที่สั่งว่า \"ให้ไปเนียนๆ\" ข้อนี้เราคงสอบตกแล้วละ!"
10005010-122 = "ปะ... เปล่านะ... คือว่านี่มัน... คือว่า..."
10005010-123 = "ครู! คือว่าเรื่องนี้น่ะ...!"
10005010-124 = "[s7] \"ครูคิดว่าคราวนี้มันสุดวิสัยจริงๆ นะ\"\n[s8] \"น่าจะไม่เป็นไร... ละเนอะ\""
10005010-125 = "งะ... งั้นเหรอ? คงงั้นละมั้ง"
10005010-126 = "งะ... งั้นเหรอ? คงงั้นละมั้ง"
10005010-127 = "ต้องเป็นแบบนั้นแน่ๆ"
10005010-128 = "ฮ่ะฮ่ะฮ่า!"
10005010-129 = "ยังไงก็ยังอยู่ในแผนการละน่า! ไม่เป็นไรๆ! ฮ่ะฮ่ะฮ่า!"
10005010-130 = "หืม? ได้ยินเสียงอะไรรึเปล่า?"
10005010-131 = "ผู้บุกรุก! มีผู้บุกรุกแน่ๆ!"
10005010-136 = "......."
10005010-137 = "......."
10005010-143 = "โดนจับได้ซะแล้ว!"

[translation]
101150-1 = "Episode 15; Subverting the Narrative"
101150-2 = "All right! I'll force my way into the administrative control from here and connect the communication networks first!"
101150-3 = "We'll restore all communication networks and administrative systems that have been shut down throughout D.U.!"
101150-4 = "M-Momoka..."
101150-13 = "All done!"
101150-17 = "Wh-What?!"
101150-21 = "Sensei, communication connected!"
101150-22 = "Wh-Wh-Whoa! There's so many unread messages!"
101150-23 = "Two hundred and fifty missed calls?!"
101150-25 = "Sensei, where are you? I have something I need to discuss with you. It's about the prophecy..."
101150-26 = "Sensei, I have to talk to you about something we found in the Arius district."
101150-27 = "Sensei? Where are you? Why didn't you show up to the Emergency Response Committee today? Sensei?"
101150-28 = "Sensei? Are you okay?"
101150-29 = "Sensei! I just heard about the Emergency Response Committee. Please wait and I'll be there. Don't start without me!"
101150-30 = "Wh-What?! Martial law? Blocked? What's going on, Sensei?"
101150-31 = "Sensei... It seems something is happening in Kivotos. Are you all right?"
101150-32 = "What happened to the power, Sensei? What's wrong?"
101150-33 = "Sensei... Where are you?"
101150-34 = "Is this all my fault? Did something happen to you...because of me?"
101150-35 = "Sensei... Shiroko..."
101150-36 = "Shiroko disappeared into thin air... Why is this happening?"
101150-37 = "Sensei... It's about Shiroko... What should we do...?"
101150-38 = "Sensei! Shiroko went missing! She left her bicycle behind! Call me when you see this!"
101150-41 = "This is..."
101150-44 = "Wh-What is this?! It's all over Kivotos..."
101150-46 = "That's..."
101150-47 = "Let's back off and find out what's happening."
101150-48 = "U-Understood!"
101150-49 = "..."
101150-51 = "U-Ugh... You bastards..."
101150-55 = "FOX 1. All clear here."
101150-56 = "FOX 2. Secured the chief of defense. How ya doing, FOX 3?"
101150-57 = "Secured the target item. We're leaving the Schale building now."
101150-58 = "I'm so proud of our underclassmen. They fought on par with Kaiser's SOF."
101150-59 = "They received assistance from Schale."
101150-60 = "But what is this? I was told to retrieve it from Schale's basement, but I don't even know what it is."
101150-61 = "The Chief of Defense will likely know. I'll ask her when she wakes up."
101150-62 = "So what about our plan? What's going on now?"
101150-63 = "Retreat for now. The plan went awry because of Kaiser's attack."
101150-64 = "Okay. Sounds good!"
101150-68 = "...Let's retreat for now."
101150-73 = "Sensei, this is..."
101150-81 = "Ah. I understand now."
101150-84 = "Sensei, your power won't work anymore."
101150-85 = "[s] \"You're...Golconde...?\""
101150-86 = "Incorrect. Golconde is no longer. I am Francis, and I'll be watching you with Decalcomania. Heed these final words."
101150-87 = "Due to the nature of this story, you could be its main character."
101150-88 = "Until now, you enjoyed the privilege of your invincibility. The story was written for you."
101150-89 = "But now..."
101150-90 = "This narrative has been subverted."
101150-91 = "The previously established context, structure, nature, intent, and interpretation have been utterly dismantled."
101150-92 = "What is meaning? Truth? Faded. Tangled. Inscrutable."
101150-97 = "Sensei."
101150-98 = "The stories so far have been for naught."
101150-99 = "The events that unfold from this moment on will supplant your preconceived notions."
101150-100 = "You will encounter a world sans protagonists. There will be no villains, no conflict."
101150-101 = "Parallel lines will become entangled, the axioms you know to be true all dismantled."
101150-102 = "A contrived reality in which the composition of your lives no longer holds any meaning. Context, probability, all moot points."
101150-103 = "This world will be one of absurdities so incomprehensible even the difference between up and down will have no meaning."
101150-104 = "Alas, your fated future has always existed just this way."
101150-105 = "But those times of the past have been long forgotten."
101150-107 = "The narrative is no longer yours. You are no one, Sensei."
101150-108 = "The quaint story of academies and youth has ended."
101150-109 = "The narrative has been subverted. Feel your once cherished significance fade away until you are nothing."
101150-110 = "So let us begin our new reality. One with no stories."
101150-111 = "[ns] \"No.\""
101150-113 = "[ns1] \"Whether it's a story of conflict, rampage, betrayal, or overthrowal...\"\n[ns2] \"Even if the story's so broken that it can barely be considered a story...\""
101150-116 = "[s] \"None of it matters.\""
101150-118 = "[ns3] \"I don't care if this supposed narrative is subverted.\"\n[ns4] \"I don't even care if an intergalactic battleship or a giant robot appears.\""
101150-123 = "[ns] \"Whatever ending might be in store for us, we'll beat it together.\""
101150-125 = "..."
101150-126 = "I see. Then I will watch how you fight this story, Sensei... Or rather, our protagonist!"
101150-127 = "I will watch as you move towards your ending of despair and catastrophe!"
101150-132 = "Th-They... Sensei..."
101150-133 = "[s] \"Arona, contact everyone.\""
101150-134 = "Huh? O-Okay! But what do you mean by \"everyone\"?"
101150-135 = "[s] \"I mean everyone.\""
101150-155 = "...Okay."
101150-156 = "So, the Chroma had already come into contact with the Nameless Gods... I miscalculated."
101150-157 = "And there was another side to the wolf god..."
101150-158 = "The god of death, the escort for all living beings to the underworld..."
101150-162 = "That was the terror on the other side of the mystery."
101150-166 = "Sensei! Before the communication disconnected, I sent a message to all the students you know!"
101150-167 = "I just barely managed to do it... But now..."
101150-168 = "[s5] \"You did great. Thanks, Arona.\"\n[s6] \"As always, we can work together to solve this.\""
101150-172 = "...With this, the final stage of this narrative is complete."
101150-173 = "The adversary we must face is the Guide of Chroma, brought by the god of death."
101150-178 = "[ns] \"Now then. It's Schale's turn.\""
101150-180 = "Final Episode; To Be Continued in Chapter 2"

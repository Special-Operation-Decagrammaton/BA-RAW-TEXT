[translation]
101150-1 = "第15話;沉沒的故事"
101150-2 = "成功了唷～#n已介入行政控制權。先來連接通訊網吧。"
101150-3 = "D.U.全區的通訊網與行政系統，要恢復了唷～"
101150-4 = "桃，桃香醬…"
101150-13 = "很～好。"
101150-17 = "……咦？"
101150-21 = "老師，通訊恢復了！"
101150-22 = "啊，啊哇哇！？有超多的訊息……！？"
101150-23 = "未接來電250通……！？"
101150-25 = "老師，你在哪裡……？我有話想立刻與老師討論。關於那個預言──"
101150-26 = "老師。關於在奧利斯自治區發現的某樣東西，我有些話想告訴您。"
101150-27 = "老師，你現在在哪裡？#n今天的緊急對策委員會，我一直在等你的說。"
101150-28 = "……老師，您還好嗎？"
101150-29 = "老師！我現在才知道緊急對策委員會的事。會長消失了──#n請給我一點時間，我現在就過去！"
101150-30 = "……什麼？被戒嚴令封鎖了？老師，到底發生什麼事了！？"
101150-31 = "老師，我有種不好的預感……老師你沒事吧？"
101150-32 = "唉呀，居然關機了──？老師，發生什麼事了嗎？"
101150-33 = "……老師，您現在在哪裡呢？"
101150-34 = "難道，是因為我……讓老師……"
101150-35 = "老師……白子前輩……"
101150-36 = "白子醬不見了……為什麼，會這樣……"
101150-37 = "老師，白子醬他……我們到底該怎麼辦……"
101150-38 = "白子前輩消失了！！只留下了自行車。#n看見之後請立刻聯絡我，拜託了！"
101150-41 = "……這是。"
101150-44 = "怎，怎麼回事……！#n這是什麼，奇普托斯各地都……？"
101150-46 = "……那個是？"
101150-47 = "暫時撤退吧。立刻確認發生了什麼。"
101150-48 = "是，是！"
101150-49 = "……"
101150-51 = "唔……你們這些傢伙……"
101150-55 = "FOX1，已處理完畢。"
101150-56 = "FOX2，已確保防衛室長。FOX3呢？"
101150-57 = "這邊也已確保目標。目前正在離開夏萊大樓。"
101150-58 = "話說學妹們還蠻強的嘛～？#n幾乎能和凱薩的SOF打的不相上下。"
101150-59 = "是因為有夏萊的協助吧。"
101150-60 = "不過這是什麼？#n雖然要我把它從夏萊的地下室帶出來，但沒聽說過裡面是什麼。"
101150-61 = "防衛室長應該知道。等他醒來再問吧。"
101150-62 = "那我們的計畫呢～？不知道接下來會怎麼發展。"
101150-63 = "先撤退吧。因為凱薩的奇襲，計畫已經一團亂了。"
101150-64 = "了解。加油吧～"
101150-68 = "……我們也先撤退吧。"
101150-73 = "老師……這是……"
101150-81 = "我終於理解了──"
101150-84 = "老師，你的力量，已經不會再發揮作用了。"
101150-85 = "[s]「你是……戈爾孔特？」"
101150-86 = "戈爾孔特已經不在了。我是「法蘭西斯」。#n將與轉印一起，成為你新的觀察者。因此，傾聽最後的宣告吧。"
101150-87 = "由於這個故事屬於某個類型，#n所以「老師」才得以成為主角。"
101150-88 = "既然是故事，你就是無敵的。#n──這就是[ruby= ・    ・ ]那樣[/ruby]的故事。"
101150-89 = "不過現在……"
101150-90 = "──這個故事，被推翻了。"
101150-91 = "脈絡、架構、類型、意圖、解釋……全都遭到破壞──"
101150-92 = "其意義相互糾纏、混合、攪拌──#n褪色到了無法控制的地步。"
101150-97 = "老師啊──"
101150-98 = "最好忘了目前為止的所有故事。"
101150-99 = "現在將要發生在你身上的事，#n已經不再是最初的那種[ruby=東西]故事[/ruby]了──"
101150-100 = "主角、敵人、事件、衝突不復存在──"
101150-101 = "一切都遭到分解、相互糾葛──"
101150-102 = "失去了脈絡、架構、必然性……被刻意製造出來的世界。"
101150-103 = "接著──終究成為了失去意義、力量恣意妄為的──#n無法理解又毫無條理的世界。"
101150-104 = "啊啊，沒錯──打從一開始，這個世界就是那樣的存在。"
101150-105 = "我們只是，遺忘了而已。"
101150-107 = "如果──這不再是故事，#n那你就什麼都不是了。"
101150-108 = "學園與青春的故事，已拉下了帷幕。"
101150-109 = "在被顛覆、解體的類型中，你的價值將被動搖、貶低、變得一文不值！"
101150-110 = "然而，將要開始了。並非故事的──"
101150-111 = "[ns]「你錯了。」"
101150-113 = "[ns1]「即使是互相衝突、背叛、受到推翻的……沉沒的故事，」\n[ns2]「就算是不足以被稱為故事的、扭曲的創作，」"
101150-116 = "[ns]「那種事對我來說，根本無所謂。」"
101150-118 = "[ns3]「想要解體類型就儘管去吧。」\n[ns4]「就算要讓宇宙戰艦或巨大機器人登場也沒關係。」"
101150-123 = "[ns]「無論是什麼樣的未來，我們都會克服的。」"
101150-125 = "……"
101150-126 = "那麼，就由我來見證吧。#n老師──不，[ruby= ・    ・ ]主角[/ruby]啊。"
101150-127 = "迎來絕望──迎向破局──並且向結尾邁進的結局！"
101150-132 = "老，老師……剛才的是……"
101150-133 = "[s]「彩奈，想請你聯絡大家。」"
101150-134 = "啊，是！你說的「大家」是，那個，是說……要聯絡誰呢？"
101150-135 = "[s]「就是『大家』，拜託你了。」"
101150-155 = "……原來如此。"
101150-156 = "「色彩」已經和「無名之神」接觸了啊……這完全是我的疏失。"
101150-157 = "啊啊，胡狼神的另一面──原來是這副模樣啊。"
101150-158 = "將所有生者導向冥界[ruby=阿努比斯]的死神…[/ruby]…"
101150-162 = "這就是你的神祕的另一面──[ruby=terror]恐怖[/ruby]，是嗎。"
101150-166 = "老師！！#n已經聯絡老師認識的所有學生了！"
101150-167 = "總算是聯絡完畢了，不過……在這之後……"
101150-168 = "[s5]「謝謝你，彩奈。」\n[s6]「這次也一樣，只要一起跨越難關就沒問題了。」"
101150-172 = "──這麼一來，演員就到齊了。"
101150-173 = "接下來要面對的──#n──是死神「阿努比斯」帶來的「色彩」的嚮導者。"
101150-178 = "[ns]「接下來，輪到夏萊出場了。」"
101150-180 = "Final.;To be Continued in Chapter 2"

[translation]
101150-1 = "ตอนที่ 15;เรื่องราวพลิกผัน"
101150-2 = "เรียบร้อย! งั้นฉันจะแทรกแซงอำนาจควบคุมและบริหารจากทางนี้ และเชื่อมต่อเครือข่ายการสื่อสาร#nก่อนแล้วกัน!!"
101150-3 = "เราจะฟื้นฟูระบบบริหารและทุกเครือข่ายการสื่อสารที่ถูกปิดไว้ทั้งหมดใน D.U. เดี๋ยวนี้!"
101150-4 = "มะ... โมโมกะจัง... "
101150-13 = "เรียบร้อย!!"
101150-17 = "...... หืม?"
101150-21 = "คุณครู การสื่อสารกลับมาใช้ได้แล้วค่ะ!! "
101150-22 = "วะ... หวา...!  มีข้อความเข้ามาเพียบเลยค่ะ...!"
101150-23 = "สายที่ไม่ได้รับ 250 สาย?! "
101150-25 = "คุณครู ตอนนี้อยู่ที่ไหนคะ? ฉันมีเรื่องที่ต้องหารือกับคุณครูค่ะ เกี่ยวกับคำพยากรณ์นั่น..."
101150-26 = "คุณครูคะ ฉันมีเรื่องเกี่ยวกับสิ่งที่ได้เจอในเขตปกครองตนเองอาเรียสจะบอกค่ะ"
101150-27 = "คุณครู? อยู่ไหนน่ะ? ไม่มาประชุมคณะกรรมการมาตรการฉุกเฉินวันนี้เหรอ? คุณครู?"
101150-28 = "คุณครู? เป็นอะไรหรือเปล่าคะ?"
101150-29 = "คุณครู! ฉันเพิ่งรู้เรื่องคณะกรรมการมาตรการฉุกเฉินวันนี้เลยค่ะ ประธานหายตัวไป... คุณครูรอก่อน#nนะคะ ฉันจะไปหาเดี๋ยวนี้เลย อย่าเพิ่งทำอะไรโดยไม่มีฉันนะคะ!"
101150-30 = "อะ... อะไรเนี่ย?! กฎอัยการศึก? ชัตดาวน์? นี่มันเรื่องอะไรกันคะคุณครู?"
101150-31 = "คุณครู... ดูเหมือนจะมีเรื่องแปลกๆ เกิดขึ้นนะคะ ทางคุณครูเป็นอะไรหรือเปล่าคะ?"
101150-32 = "เอ๋? ทำไมถึงปิดเครื่องล่ะคะคุณครู? เกิดเรื่องอะไรขึ้นหรือเปล่า..."
101150-33 = "คุณครู... อยู่ที่ไหนคะ?"
101150-34 = "มีอะไรเกิดขึ้นเพราะฉันหรือเปล่าคะ..."
101150-35 = "คุณครูคะ... รุ่นพี่ชิโรโกะ..."
101150-36 = "ชิโรโกะจังหายตัวไป... ทำไมถึงเกิดเรื่องแบบนี้อีกกันนะ..."
101150-37 = "ชิโรโกะจัง... คุณครูคะ... พวกฉันควรทำยังไงดี..."
101150-38 = "รุ่นพี่ชิโรโกะหายตัวไปแล้ว!! เหลือแต่จักรยานทิ้งไว้แค่นั้น...!! ถ้าเห็นข้อความนี้ ครูช่วยรีบติดต่อมา#nด้วยนะ!"
101150-41 = "นี่มัน..."
101150-44 = "อะ... อะไรเนี่ย?! ทำไม...! ทั่วทั้งคิโวทอสมัน..."
101150-46 = "นั่นมัน... "
101150-47 = "ถอยออกมาก่อน ไปตรวจสอบให้แน่ใจก่อนว่าเกิดอะไรขึ้น"
101150-48 = "ครับผม!"
101150-49 = "......"
101150-51 = "อะ... อึก... เจ้าพวกนั้น..."
101150-55 = "FOX 1 จัดการทางนี้หมดแล้ว "
101150-56 = "FOX 2 ได้ตัวหัวหน้าสำนักป้องกันแล้ว FOX 3 ล่ะ?"
101150-57 = "ทางนี้ก็ได้ของตามเป้าหมายแล้ว ตอนนี้กำลังออกมาจากอาคารชาเล่ต์"
101150-58 = "พวกรุ่นน้องสู้กันเก่งไม่เบาเลยนะ สูสีกับ SOF ของไคเซอร์เลย"
101150-59 = "คงเพราะได้ความช่วยเหลือจากชาเล่ต์น่ะสิ"
101150-60 = "ว่าแต่ นี่มันอะไรเหรอ? เห็นว่าให้เอาออกมาจากชั้นใต้ดินของชาเล่ต์น่ะ แต่ฉันก็ไม่รู้ว่ามันคืออะไร"
101150-61 = "หัวหน้าสำนักป้องกันน่าจะรู้นะ ถ้าตื่นแล้วฉันจะลองถามดู"
101150-62 = "แล้วแผนการของเราจะเป็นยังไงต่อน่ะ? ตอนนี้สถานการณ์เป็นยังไงบ้าง?"
101150-63 = "ถอนกำลังก่อน พอโดนไคเซอร์โจมตี แผนการก็เลยสับสนไปหมด"
101150-64 = "เข้าใจแล้ว~"
101150-68 = "งั้นพวกเราก็ล่าถอยก่อนเถอะ"
101150-73 = "คุณครู... นี่มัน..."
101150-81 = "อ่า ทีนี้ผมก็เข้าใจแล้ว"
101150-84 = "คุณครูเอ๋ย จากนี้พลังของคุณจะไม่ทำงานอีกต่อไป"
101150-85 = "[s] \"นายคือ... โกลคอนดา...?\""
101150-86 = "ไม่ใช่ จากนี้ไม่มีโกลคอนดาแล้ว ผมคือฟรานซิส ผมคือคนใหม่ที่จะเฝ้าดูเจ้าพร้อมกับเดคาโคมาเนีย เพราะงั้นก็ฟังคำพิพากษาสุดท้ายนี้ให้ดี"
101150-87 = "เพราะเรื่องเล่านี้ถ่ายทอดออกมาในประเภทเดียว คุณถึงเป็นตัวเอกได้"
101150-88 = "นี่คือเรื่องเล่า คุณถึงได้เป็นอมตะ ใช่ มันเคยเป็นเรื่องเล่าแบบนั้น"
101150-89 = "แต่ว่า... จากนี้ไป..."
101150-90 = "เรื่องเล่านี้มันได้เกิดการพลิกผัน"
101150-91 = "ทุกอย่างล้วนถูกทำลาย ทั้งบริบท องค์ประกอบ ประเภท จุดประสงค์ การตีความ"
101150-92 = "ความหมายในปัจจุบันพันกันสับสนและค่อยๆ จางหายไปจนควบคุมเอาไว้ไม่ได้"
101150-97 = "ครูเอ๋ย"
101150-98 = "จงลืมเรื่องเล่าทั้งหมดที่ผ่านมา"
101150-99 = "สิ่งที่จะเกิดขึ้นกับคุณนับจากนี้ จะไม่ใช่แบบนั้นอีกต่อไป"
101150-100 = "โลกที่ไร้ซึ่งตัวเอก ตัวร้าย เหตุการณ์ ความขัดแย้ง"
101150-101 = "โลกที่พังทลายจนทุกอย่างยุ่งเหยิง"
101150-102 = "โลกของการกระทำที่ไม่มีบริบท ไม่มีองค์ประกอบ ไม่มีความเป็นไปได้"
101150-103 = "โลกแห่งความไร้เหตุผลในสุดท้ายก็สูญเสียความหมายและเดือดดาลอย่างไม่อาจเข้าใจได้"
101150-104 = "อ้อ ใช่สิ โลกใบนี้มันมีอะไรแบบนั้นอยู่ด้วย"
101150-105 = "แต่พวกเราทุกคนแค่ลืมมันไปก็เท่านั้นเอง"
101150-107 = "ถ้าเรื่องนี้ไม่ใช่เรื่องเล่าอีกต่อไป คุณก็จะไม่มีตัวตน"
101150-108 = "เรื่องราวของวัยรุ่นและโรงเรียนจบลงแล้ว "
101150-109 = "เมื่อประเภทของเรื่องถูกโค่นล้มและยุบไป ความหมายของคุณก็จะถูกตัดทอนจนไม่เหลืออะไรเลย!"
101150-110 = "งั้นก็มาเริ่มกันเถอะ เริ่มเรื่องเล่า.. ที่ไม่ใช่..."
101150-111 = "[ns] \"ไม่ต้อง\""
101150-113 = "[ns1] \"ถึงจะเป็นเรื่องเล่าแห่งความขัดแย้ง เดือดดาล ทรยศ และพลิกผันอะไรนั่น\"\n[ns2] \"ถึงจะเป็นเรื่องเล่าที่พังพินาศเกินกว่าจะเรียกว่าเป็นเรื่องเล่าได้\""
101150-116 = "[ns] \"เรื่องนั้นมันไม่สำคัญหรอก\""
101150-118 = "[ns3] \"การโค่นล้มประเภทอะไรนั่น ฉันไม่สนใจหรอก\"\n[ns4] \"ถึงจะมียานรบอวกาศหรือยอดหุ่นยนต์ปรากฏออกมา ฉันก็ไม่สน\""
101150-123 = "[ns] \"ไม่ว่าอนาคตจะเป็นยังไง พวกเราก็จะรวมพลังแล้วเอาชนะมันให้ได้\""
101150-125 = "......"
101150-126 = "ถ้างั้นผมก็จะคอยเฝ้าดูนะ! ครู... ไม่สิ ตัวเอก!"
101150-127 = "ความสิ้นหวัง ความพินาศ และตอนจบที่กำลังจะมาถึง!"
101150-132 = "คะ... คุณครูคะ... ตอนนี้มัน..."
101150-133 = "[s] \"อะโรน่า ช่วยติดต่อทุกคนด้วย\""
101150-134 = "คะ? ได้ค่ะ! ทุกคนที่ว่า... หมายถึงใครบ้าง..."
101150-135 = "[s] \"อืม ทุกคนเลย\""
101150-155 = "แบบนี้นี่เอง..."
101150-156 = "สีสันได้สัมผัสกับเทพไร้นามอย่างนั้นหรือ... นี่เป็นความผิดพลาดของผมเองครับ"
101150-157 = "แถมภูมิหลังของเทพหมาป่า... ก็เป็นแบบนั้นสินะ"
101150-158 = "[ruby=อะนูบิส]เทพแห่งความตาย[/ruby]ที่พาสิ่งมีชีวิตทั้งหมดไปสู่ภพหน้า..."
101150-162 = "นั่นเป็น[ruby=terror]ความน่ากลัว[/ruby]ที่อยู่เบื้องหลังความลึกลับของคุณสินะครับ"
101150-166 = "คุณครู!! หนูติดต่อนักเรียนทุกคนที่คุณครูรู้จักก่อนที่การติดต่อสื่อสารจะถูกตัดไปอีกครั้งแล้วค่ะ!"
101150-167 = "ทำได้อย่าง... หวุดหวิดเลยค่ะ แต่ว่า... จากนี้ไป..."
101150-168 = "[s5] \"อื้ม ขอบใจนะอะโรน่า\"\n[s6] \"จากนี้ไป ก็มาหาทางแก้ปัญหานี้กันอย่างที่ทำมาตลอดเถอะ\""
101150-172 = "...และนี่คือตอนจบของเรื่องครับ"
101150-173 = "ศัตรูตัวฉกาจที่ต้องเผชิญจากนี้เป็นต้นไปก็คือ... ผู้นำทางของสีสัน... ที่[ruby=อะนูบิส]เทพแห่งความตาย[/ruby]พามา..."
101150-178 = "[ns] \"ถ้างั้นจากนี้ก็เป็นตาของชาเล่ต์แล้วละนะ\""
101150-180 = "องก์สุดท้าย;ติดตามต่อในบทที่ 2"

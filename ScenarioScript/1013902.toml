[translation]
1013902-1 = "#title;니코의 오마카세"
1013902-2 = "#na;(니코로부터 의문의 모모톡을 받고나서 몇 분 뒤……)"
1013902-3 = "#st;[0,0];instant;1;"
1013902-4 = "#clearST"
1013902-5 = "#wait;1500"
1013902-6 = "#na;(예정된 방문자는 없었을텐데, 갑자기 사무실의 초인종이 울렸다.)"
1013902-7 = "#all;hide"
1013902-8 = "#na;???;<안녕하세요, FOX EATS 입니다.>"
1013902-9 = "#na;???;<주문하신 음식, 배달 왔습니다!>"
1013902-10 = "[s1] 문을 연다.\n[s2] 문을 열지 않는다."
1013902-11 = "#st;[0,0];instant;1;"
1013902-12 = "#clearST"
1013902-13 = "#wait;100"
1013902-14 = "#na;???;<이런. 이번에도 문이 잠겨 있네요……>"
1013902-15 = "#na;???;<어쩔 수 없네요. 다시 한 번 도어 브리칭을 시도하는 수 밖에—>"
1013902-16 = "[ns] \"지금 바로 열어줄게!\""
1013902-17 = "#wait;1000"
1013902-18 = "#wait;1000"
1013902-19 = "3;니코;00\n#3;al\n#wait;1000"
1013902-20 = "3;니코;03\n#3;greeting\n#wait;1000"
1013902-21 = "3;니코;00;안녕하세요, 선생님. FOX EATS 입니다.\n#3;em;[반응]"
1013902-22 = "3;니코;02;아직 저녁 식사 안 하셨죠?"
1013902-23 = "3;니코;09;아무리 바쁘시다고 해도 끼니는 거르시면 안 돼요. 건강이 상할지도 모르니까요."
1013902-24 = "[ns] \"식사는 아직이긴 한데……\""
1013902-25 = "#wait;1000"
1013902-26 = "[ns3] \"내가 저녁을 안 먹은 건 어떻게 안 거야?\"\n[ns4] \"혹시 도청당하고 있었나……\""
1013902-27 = "#wait;100"
1013902-28 = "#wait;100"
1013902-29 = "3;니코;01;후후, 특수부대에게 정보를 수집하는 방법이야 많지요.\n#3;em;[음표]"
1013902-30 = "3;니코;02;우선 오늘 오후에 샬레의 냉장고를 확인해 봤을 때 드실 만한 식재료는 거의 없었고—"
1013902-31 = "3;니코;00;점심 이후로 음식을 들고 샬레를 방문한 사람도 딱히 없었으니까요."
1013902-32 = "3;니코;09;무엇보다 선생님의 PC 메신저가 계속 온라인 상태였기에, 책상 앞에 계속 앉아 계셨을 거라고 생각했어요.\n#3;em;[한숨]"
1013902-33 = "[s] \"……반박할 수 없겠는 걸.\""
1013902-34 = "3;니코;12;식사도 식사지만 한 자리에 너무 오래 앉아 계시는 건 건강에 좋지 않아요."
1013902-35 = "3;니코;03;금방 식사를 준비할 테니, 그동안 휴식을 취하시는 게 좋겠어요.\n#3;em;[음표]"
1013902-36 = "[s] \"그럼 잠깐 한 숨 돌릴까……\""
1013902-37 = "3;니코;00\n#3;a"
1013902-38 = "[ns] \"그나저나 어떤 음식을 가져온 거야?\""
1013902-39 = "3;니코;03;후후. 제가 가져 온 건 음식이 아니라 식재료에요.\n#3;em;[음표]"
1013902-40 = "3;니코;00;대부분의 음식이 그렇지만 음식은 갓 만든 게 제일 따듯하고 맛있으니까요."
1013902-41 = "3;니코;02;샬레에 남아 있는 식재료를 더하면 어지간한 음식은 만들 수 있을테니, 드시고 싶으신 메뉴를 말씀해주시겠어요?"
1013902-42 = "3;니코;03;제가 만들 수 있는 음식이라면 바로 만들어 드릴게요.\n#3;em;[재잘]"
1013902-43 = "[s] \"니코가 만들어주는 것이라면 다 좋은데……\""
1013902-44 = "#st;[0,0];instant;1;"
1013902-45 = "#clearST"
1013902-46 = "#wait;1000"
1013902-47 = "[ns] \"그럼 [ruby=오마카세]니코의 추천[/ruby]으로 부탁할게.\""
1013902-48 = "3;니코;02;제 추천 메뉴요?\n#3;em;[?]"
1013902-49 = "3;니코;01;제가 제일 자신있는 음식이라면…… 소대원들에게 싸주는 평범한 유부초밥 정도인데."
1013902-50 = "[s] \"괜찮아. 니코의 추천에 맡길게.\""
1013902-51 = "3;니코;03;알겠습니다. 그럼 유부를 졸여야 하니 잠시만 기다려주세요.\n#3;greeting"
1013902-52 = "#all;hide"
1013902-53 = "#wait;1500"
1013902-54 = "3;니코;00\n#3;a"
1013902-55 = "3;니코;03;……이렇게 선생님 앞에서 유부초밥을 만들고 있으니 예전 일이 떠오르네요.\n#3;em;[음표]"
1013902-56 = "[s] \"니코와 처음 만났을 때 말이지?\""
1013902-57 = "3;니코;09;네. 그 때도 선생님께 유부초밥을 잔뜩 만들어 드렸었지요."
1013902-58 = "3;니코;12;물론 그 때는 작전 상 선생님의 의심을 피하기 위해 한 행동이었지만……"
1013902-59 = "3;니코;00;그래도 유부초밥 만큼은 언제나 사사로운 마음 없이, 진심으로 만들었던 것 같아요."
1013902-60 = "3;니코;03;소대의 모두가 좋아하는 음식이니까요."
1013902-61 = "[s] \"유부초밥을 만들게 된 계기라도 있어?\""
1013902-62 = "3;니코;00;글쎄요. 언제였더라……\n#3;em;[…]"
1013902-63 = "3;니코;02;FOX 소대가 창설되고 얼마 지나지 않았을 때, 작전이 길어질 때를 대비해서 도시락을 싸야겠다는 생각을 했었어요."
1013902-64 = "3;니코;09;하지만 당시의 저는 요리에 능숙하지 못해서, 만들 수 있었던 음식이 유부초밥 같은 간단한 음식뿐이었거든요.\n#3;stiff"
1013902-65 = "3;니코;06;그마저도 촛물은 너무 달고, 속을 채우는 데도 실패해서 터진 유부가 절반 이상이었지만……\n#3;em;[속상함]"
1013902-66 = "3;니코;09;소대원들은 맛있다며 저를 격려해 주었고, 그 후로도 관성적으로 유부초밥을 만들다 보니 습관이 되어버린 것 같아요."
1013902-67 = "3;니코;03;참 우습지요. 그 때만 하더라도 유부를 그렇게 좋아하지 않았었는데."
1013902-68 = "[s] \"이해할 수 있을 것 같아.\""
1013902-69 = "#st;[0,0];instant;1;"
1013902-70 = "#clearST"
1013902-71 = "3;니코;03\n#wait;1000"
1013902-72 = "[ns5] \"음식의 맛에는 추억도 하나의 향신료로 작용하니까.\"\n[ns6] \"니코의 유부초밥은 깊은 추억이 담긴 음식이구나.\""
1013902-73 = "#wait;100"
1013902-74 = "#wait;100"
1013902-75 = "3;니코;08;……네. 제게는 특별한 음식이에요."
1013902-76 = "3;니코;03;자, 이야기를 나누는 사이 유부초밥이 완성되었습니다!\n#3;greeting\n#3;em;[음표]"
1013902-77 = "[s7] \"벌써?\"\n[s8] \"엄청 빠르네……\""
1013902-78 = "#wait;100"
1013902-79 = "#wait;100"
1013902-80 = "3;니코;00;아까도 말씀드렸지만 유부의 속을 채우기만 하면 되는 간단한 요리니까요."
1013902-81 = "3;니코;03;처음부터 유부를 튀겨 준비한다면 모를까, 재료만 있다면 얼마든지 만들 수 있어요."
1013902-82 = "[s] \"그럼 잘 먹겠습니다—\""
1013902-83 = "3;니코;02;잠깐만요, 선생님.\n#3;em;[반응]"
1013902-84 = "3;니코;03;후후. 아까 말씀하셨죠? 오늘 저녁 메뉴는 제 추천에 따르겠다고."
1013902-85 = "#st;[0,0];instant;1;"
1013902-86 = "#clearST"
1013902-87 = "3;니코;03\n#3;d\n#wait;1000"
1013902-88 = "3;니코;03\n#3;a\n#3;closeup\n#wait;1000"
1013902-89 = "3;니코;00;유부를 졸이면서 함께 만든 유부 우동이에요. 오늘 저녁에는 이걸 드셔 주세요.\n#3;greeting\n#3;closeup"
1013902-90 = "3;니코;03;오늘 밤은 기온이 낮으니, 유부초밥보다는 따듯한 국물을 곁들인 식사가 더 몸에 좋을 거예요.\n#3;em;[재잘]\n#3;closeup"
1013902-91 = "[s] \"메뉴는 상관없지만, 그럼 그 유부초밥은……?\""
1013902-92 = "3;니코;01;어지간한 음식은 갓 만들었을 때 먹는 게 맛있지만, 유부초밥은 조금 시간이 지나서 맛이 배었을 때 먹는 게 더 맛있거든요.\n#3;closeup"
1013902-93 = "3;니코;09;……선생님. 어차피 내일 아침도 거르거나 레토르트 음식으로 때우려 하셨죠?\n#3;em;[한숨]\n#3;closeup"
1013902-94 = "[ns] \"……그것도 정보 수집을 통해 알아낸거야?\""
1013902-95 = "3;니코;03;아뇨. 평범한 직감이에요.\n#3;closeup\n#3;em;[재잘]"
1013902-96 = "3;니코;09;선생님은 은근히 알기 쉬운 분이시니까요.\n#3;closeup"
1013902-97 = "3;니코;00;이 유부초밥은 냉장고에 넣어둘테니 내일 아침에 드셔 주세요.\n#3;closeup"
1013902-98 = "3;니코;09;오늘 밤도 너무 무리는 하지 마시고요.\n#3;closeup"
1013902-99 = "3;니코;03;그럼 좋은 밤 되시길.\n#3;closeup\n#3;greeting\n#3;em;[음표]"
1013902-100 = "#all;hide"
1013902-101 = "#na;(이후, 니코가 만들어 준 유부 우동을 먹으며 모처럼 따듯한 저녁 시간을 보냈다.)"
1013902-102 = "#all;hide"
1013902-103 = "#wait;500"

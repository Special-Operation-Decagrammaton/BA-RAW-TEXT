[translation]
83302200500-6 = "哇啊啊啊，謝謝你的幫忙，陽奈同學！"
83302200500-12 = "暫時已經處理掉擾亂供給部的「那個」了……"
83302200500-13 = "這是怎麼回事呢？茱莉。"
83302200500-14 = "關……關於這點……"
83302200500-15 = "就，就是……"
83302200500-16 = "哇啊啊啊，因為風華前輩被帶走了……！"
83302200500-17 = "雖然前輩被帶走時說「等我回來」……！"
83302200500-18 = "可是因為萬魔殿的訂單，距離期限已經沒剩多少時間了……"
83302200500-19 = "如果無法如期完成，說不定萬魔殿會以這件事為藉口減少供給部的預算……！"
83302200500-20 = "茱莉，你先冷靜。來整理一下情況吧。"
83302200500-27 = "所以總結一下茱莉的話……"
83302200500-28 = "萬魔殿訂單的完成期限已經近在眼前……"
83302200500-29 = "嗚嗚……對。"
83302200500-30 = "但風華卻偏偏在這個時候……"
83302200500-31 = "被美食研究會綁架了。"
83302200500-32 = "嗚嗚，就是這樣……"
83302200500-33 = "如果無法準時完成會很傷腦筋。#n因此雖然曾被風華阻止，茱莉還是想努力準備料理。"
83302200500-34 = "正巧不久之前，溫泉開發部的部長說過，#n在供給部的地下水脈發現了驚人的溫泉水……"
83302200500-35 = "感覺很適合做溫泉蛋，所以就拿來用了……"
83302200500-36 = "結果……卻出現了「那些」東西。"
83302200500-38 = "嗚嗚嗚。#n沒錯！這全部……都是我的錯！"
83302200500-39 = "（真琴是因為吃了茱莉製作的食物，狀態才會變奇怪的嗎？）"
83302200500-40 = "嗚哇！對不起！陽奈同學～！風華前輩～！"
83302200500-41 = "不，茱莉不需要道歉。"
83302200500-42 = "就算結果引發了一些問題，也不能因此否定你的努力。"
83302200500-43 = "陽奈同學……！"
83302200500-44 = "不過……風華就這樣被綁架，果然會讓人很傷腦筋。"
83302200500-45 = "謝謝你提供的消息。#n我立刻去救風華，你放心吧。"
83302200500-46 = "是！謝謝你，陽奈同學！萬事拜託了！"

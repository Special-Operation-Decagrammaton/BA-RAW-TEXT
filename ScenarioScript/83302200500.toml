[translation]
83302200500-6 = "ฮือ~ ขอบคุณที่มาช่วยนะคะ~ คุณฮินะ!"
83302200500-12 = "ฉันจัดการ <พวกนั้น> ที่มาทำให้ห้องชมรมโภชนาการเละเทะไปแล้ว แต่ว่า..."
83302200500-13 = "มันเรื่องอะไรกันน่ะ จูริ?"
83302200500-14 = "คะ... คือว่า..."
83302200500-15 = "คือว่า... เรื่องนั้น..."
83302200500-16 = "ฮือออ~ รุ่นพี่ฟูกะถูกลากตัวไปค่ะ...!"
83302200500-17 = "ตอนที่ถูกพาตัวไป รุ่นพี่บอกกับฉันว่า 'รอจนกว่าฉันจะกลับมานะ'...!  "
83302200500-18 = "แต่ว่าเราก็มีงานที่ได้รับมาจากแพนเดโมเนียม โซไซตี้ และเราก็เหลือเวลาอีกไม่มากแล้ว..."
83302200500-19 = "ฉันก็เลยคิดว่าถ้าส่งอาหารให้ได้ไม่ทัน แพนเดโมเนียม โซไซตี้ก็อาจยกเรื่องนี้มาเป็นข้ออ้างในการตัด#nงบประมาณของชมรมโภชนาการก็ได้ ก็เลย...!"
83302200500-20 = "จูริ เดี๋ยวก่อน ใจเย็นๆ ก่อนนะ ฉันขอทำความเข้าใจก่อน"
83302200500-27 = "ถ้าจะสรุปเรื่องที่จูริเล่ามา"
83302200500-28 = "ตอนนี้กำหนดการส่งอาหารให้แพนเดโมเนียม โซไซตี้กำลังใกล้เข้ามาทุกทีๆ"
83302200500-29 = "(สะอื้น) ค่ะ..."
83302200500-30 = "แต่ในเวลาที่สำคัญนี้ ฟูกะก็..."
83302200500-31 = "ถูกชมรมชิมอาหารจับตัวไป"
83302200500-32 = "(สะอื้น) ใช่ค่ะ..."
83302200500-33 = "และถ้าส่งอาหารไม่ทันกำหนดก็จะเกิดปัญหาตามมา จูริก็เลยพยายามทำอาหารคนเดียว ต่อให้ฟูกะจะสั่งห้ามไว้"
83302200500-34 = "และเมื่อไม่นานมานี้ หัวหน้าชมรมพัฒนาออนเซ็นก็บอกว่าใต้ห้องชมรมโภชนาการมีสายน้ำพุร้อน#nขนาดใหญ่อยู่"
83302200500-35 = "ก็เลยคิดว่าอยากทำไข่ออนเซ็นขึ้นมา ก็เลยลองทำดู..."
83302200500-36 = "และผลลัพธ์ก็คือ... มี <พวกนั้น> ออกมา"
83302200500-38 = "ฮือ ค่ะ! ใช่แล้วค่ะ! ทั้งหมดนี้... มันเป็นเพราะฉันเอง!"
83302200500-39 = "(ที่มาโคโตะเป็นแบบนั้นก็เพราะกินอาหารที่จูริส่งไปงั้นเหรอ)"
83302200500-40 = "แง๊~! ขอโทษนะคะ~! คุณฮินะ~! แล้วก็รุ่นพี่ฟูกะด้วย~!"
83302200500-41 = "ไม่หรอก ฉันไม่คิดว่านี่เป็นเรื่องที่จูริต้องขอโทษหรอกนะ"
83302200500-42 = "เพราะต่อให้เกิดปัญหานิดหน่อยกับผลลัพธ์ แต่เราก็ควรให้คุณค่ากับความพยายามที่เราทำ"
83302200500-43 = "คุณฮินะ...!"
83302200500-44 = "แต่ว่า... การที่ฟูกะถูกลักพาตัวไปแบบนี้ ก็ไม่ใช่เรื่องที่วางใจได้เลยนะ"
83302200500-45 = "ขอบใจที่เล่าให้ฟังนะ ฉันจะไปช่วยฟูกะเดี๋ยวนี้ละ ไม่ต้องห่วง"
83302200500-46 = "ค่ะ! ขอบคุณค่ะ! คุณฮินะ! รบกวนด้วยนะคะ!"

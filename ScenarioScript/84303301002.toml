[translation]
84303301002-6 = "ฉันแค่เล่นเกมไปเอง แต่รู้สึกเหมือนโดนสะกดจิตอะไรอย่างนั้นละ"
84303301002-7 = "เป็นเทคโนโลยีที่น่าทึ่งเลยว่ามั้ย? ถ้าปรับปรุงอีกหน่อยก็น่าจะใช้ได้เลยนะ...?"
84303301002-9 = "(เมื่อกี้ยังโมโหอยู่เลย... แต่ตอนนี้กลับมาพูดถึงเกมในแง่ดีแล้ว)"
84303301002-10 = "(มิลเลเนียม... เป็นโรงเรียนที่น่ากลัวจริงๆ)"

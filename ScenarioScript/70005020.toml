[translation]
70005020-1 = "บันทึกของวันที่ 19 ก.พ. (1)"
70005020-3 = "[log]19 ก.พ.[/log]"
70005020-6 = "ห้องคณะกรรมการวินัย สถาบันเกเฮนน่า"
70005020-8 = "..."
70005020-9 = "......"
70005020-10 = "........."
70005020-11 = "เอาละค่ะ ใครสักคนช่วยอธิบายสถานการณ์ให้ฉันฟังหน่อยได้มั้ยคะ?"
70005020-12 = "ถ้าให้สรุปสาระสำคัญเลยก็คือ... ดูเหมือนจะมีการเปลี่ยนแปลงบริษัทขนส่งค่ะ"
70005020-13 = "และคนที่รับหน้าที่ต่อก็คือทางมังกรดำของทางโรงเรียนมัธยมซานไห่จิงน่ะ..."
70005020-14 = "ตอนนี้มันใช่เวลามาวิเคราะห์สถานการณ์อย่างใจเย็นอยู่แบบนี้หรือไง?!?!"
70005020-15 = "กะ... ก็เธอขอให้อธิบายสถานการณ์ให้ชัดเจนไม่ใช่รึไงเล่า!"
70005020-16 = "ฉันจะติดต่อทางมังกรดำของซานไห่จิง และจะขอให้พวกเธอดำเนินการด้วยวิธีที่เหมาะสมเกี่ยวกับ#nเหตุขัดข้องในการขนส่งครั้งนี้เองค่ะ!"
70005020-17 = "รอเดี๋ยวก่อนค่ะเจ้าหน้าที่อาวุโสอาโกะ! ทำแบบนั้น... มันจะได้ผลเหรอคะ?"
70005020-18 = "อยากพูดอะไรกันแน่คะ ชินัตสึ?!"
70005020-19 = "มังกรดำคือสภานักเรียนของโรงเรียนมัธยมซานไห่จิงเลยนะคะ ถ้าเทียบกับเกเฮนน่าของเราแล้วก็คง#nอยู่ระดับเดียวกับแพนเดโมเนียม โซไซตี้ค่ะ"
70005020-20 = "แล้วยังไงคะ?"
70005020-21 = "ถึงคณะกรรมการวินัยของเราจะเป็นชมรมที่คอยดูแลความเรียบร้อยและระเบียบวินัยภายในเกเฮนน่า..."
70005020-22 = "และก็มีบางครั้ง ก็มีสถานการณ์ที่ต้องไปจัดการเรื่องต่างๆ นอกโรงเรียนอยู่บ้าง..."
70005020-23 = "แต่ตอนนี้ทางนั้นคือ 'สภานักเรียน' ของโรงเรียนอื่นเลยนะคะ สรุปง่ายๆ ก็คือ#nเป็นองค์การที่มีการติดต่อโดยตรงกับทางแพนเดโมเนียม โซไซตี้..."
70005020-24 = "อ่า"
70005020-25 = "ค่ะ... ตอนนี้พอจะเข้าใจในสิ่งที่ฉันต้องการจะพูดแล้วใช่มั้ยคะ"
70005020-26 = "อื้อ มันก็ขึ้นอยู่กับว่าจะตีความไปแบบไหนนะ อาจมองว่าเป็นการติดต่อทางการระหว่างโรงเรียนก็ได้..."
70005020-27 = "ถ้าพวกแพนเดโมเนียม โซไซตี้รู้เข้าละก็..."
70005020-32 = "แค่คิดก็สยองแล้วว่ายัยพวกนั้นจะมาจ้องจับผิดอะไรอีก..."
70005020-33 = "โอ๊ย จริงๆ เลย! ไม่มีคนที่รู้จักทางนั้นเป็นการส่วนตัวเลยรึไงนะ?! "
70005020-34 = "......"
70005020-35 = "ทั้งสองคนว่ายังไงบ้างล่ะคะ! ไม่มีเพื่อนต่างโรงเรียนเลยเหรอคะ?!?!"
70005020-36 = "จะ...เจ้าหน้าที่อาวุโสอาโกะ? คือว่าฉันมีเพื่อน... ไม่ถึงกับสนิท อาจเรียกว่าคนรู้จักอยู่ในชมรม#nวิจัยศาสตร์การปรุงยาของซานไห่จิงค่ะ..."
70005020-37 = "ชมรมวิจัยศาสตร์การปรุงยา? เป็นชมรมอะไรเหรอคะ?"
70005020-38 = "ถึงจะซับซ้อนนิดหน่อย... แต่ถ้าเปรียบเทียบให้เข้าใจง่ายๆ ก็คงจะประมาณชมรมหน่วยแพทย์ฉุกเฉิน#nนั่นละค่ะ"
70005020-39 = "อ่า แล้ว..."
70005020-40 = "..."
70005020-42 = "ยังไงก็เถอะค่ะ ถ้างั้นช่วยติดต่อไปที่ทางนั้นแบบ 'ส่วนตัว' หน่อยแล้วกันนะคะ"
70005020-47 = "..."
70005020-48 = "..."
70005020-49 = "แบบนี้... จะทำยังไงดีล่ะ?"
70005020-50 = "ถามฉันงั้นเหรอคะ..."
70005020-51 = "ก่อนอื่น นี่เป็นเค้กของใครกันน่ะ?"
70005020-55 = "มีเขียนเอาไว้ว่า 'เกเฮนน่า' ด้วยนะคะ ไหนดูซิ... ถึงท่านประธานโซระซากิ ฮินะ ด้วยรัก?"
70005020-56 = "โซระซากิ ฮินะ? เหมือนเคยได้ยินจากที่ไหนมาก่อนเลยแฮะ..."
70005020-60 = "อ้อ จำได้แล้ว! เป็นประธานคณะกรรมการวินัยของสถาบันเกเฮนน่าใช่รึเปล่านะ? เหมือนได้ยินมาว่า#nเป็นยอดมนุษย์สุดเพอร์เฟกต์ที่เป็นผู้คอยค้ำจุนโรงเรียนอยู่อะไรประมาณนั้น..."
70005020-61 = "ฮึ่ม แต่ฉันมั่นใจว่าท่านประมุขของเราน่ารักแล้วก็เท่กว่าเป็นไหนๆ!"
70005020-62 = "เดี๋ยวนะคะ ทำไมจู่ๆ ก็พูดถึงเรื่องนั้นขึ้นมาล่ะคะ..."
70005020-64 = "ถ้าอย่างนั้น... หมายความว่าเราจะส่งเค้กของเราไปให้พวกเธอ แล้วพวกเธอก็ส่งเค้กมาให้เรางั้นเหรอ?"
70005020-65 = "ฉันคิดว่าอย่างนั้นนะคะ... งั้นนี่ก็เป็นการสานสัมพันธไมตรีอย่างหนึ่งงั้นเหรอคะ?"
70005020-66 = "ดูเหมือนจะเป็นอย่างนั้นนะ...?"
70005020-67 = "งั้น... โดยหลักการแล้ว คนที่ดูแลเรื่องนี้..."
70005020-68 = "จะต้องเป็นหัวหน้าฝ่ายประชาสัมพันธ์สินะ...?"
70005020-69 = "ให้หัวหน้าฝ่ายประชาสัมพันธ์เป็นคนจัดการเหรอคะ?"
70005020-70 = "ตามหลักแล้วก็ควรแบบนั้นนะ"
70005020-71 = "คิดดีแล้วใช่มั้ยคะ"
70005020-72 = "อย่าพูดอะไรอีกเลยดีกว่า..."
70005020-79 = "หืม? ชมรมวิจัยศาสตร์การปรุงยาติดต่อมาเหรอ?"
70005020-83 = "เอ้าๆ ฟังให้ดีนะ หัวหน้าคณะกรรมการมินะ!"
70005020-84 = "ทางชมรมหน่วยแพทย์ฉุกเฉินของเกเฮนน่าติดต่อมาด้วยธุระ 'ส่วนตัว' น่ะ!"
70005020-85 = "ธุระ 'ส่วนตัว'...?"
70005020-90 = "สวัสดีค่ะ หัวหน้าคณะกรรมการโคโนเอะ มินะ ไม่สิ... คุณมินะ ฉันชื่อ ฮิโนมิยะ ชินัตสึ จากคณะกรรมการวินัยเกเฮนน่า... ไม่สิ เรียกฉันว่า ชินัตสึ เฉยๆ ก็ได้ค่ะ"
70005020-91 = "อะ... อื้อ"
70005020-92 = "บังเอิญว่าเค้กที่ควรจะส่งมาให้พวกเราในวันนี้กลับส่งผิดไปหาพวกคุณน่ะค่ะ"
70005020-93 = "!!!"
70005020-99 = "ขอบคุณค่ะ คุณมินะ ฉันตรวจสอบแล้วว่าเค้กถูกส่งสลับไปจริงๆ ค่ะ ถ้างั้นวิธีแก้ไข..."
70005020-100 = "ขอโทษค่ะ ขอพวกฉันปรึกษากันก่อน แล้วจะติดต่อไปอีกครั้งนะคะ"
70005020-105 = "ทำยังไงดีล่ะคะ..."
70005020-106 = "สะสะ... สุดท้าย สุดท้ายก็ต้องพึ่งเจ้าพวกนั้น..."
70005020-107 = "เจ้าพวกนั้นเหรอคะ?"
70005020-108 = "อ่า ไม่หรอก ไม่มีอะไร"
70005020-109 = "ยังไงก็ตาม ฉันจะรับผิดชอบเรื่องนี้และหาทางแก้ไขดูเอง! อืม ขอโทษที่ทำให้เสียเวลาทำงานของ#nแต่ละคนนะ"
70005020-110 = "เข้าใจแล้วค่ะ หัวหน้าคณะกรรมการ อย่าหักโหมเกินไปนะคะ..."
70005020-115 = "เฮ้อ..."
70005020-119 = "ถ้ามีเรื่องอะไรก็ติดต่อฉันมาได้นะคะ..."
70005020-120 = "ถ้าให้พูดตรงๆ เลยก็คือ ฉันคิดว่าทางมังกรดำอาจไม่สามารถจัดการปัญหาที่เกี่ยวข้องกับภายนอก#nแบบนี้ได้ ถ้าปราศจากการตัดสินใจของท่านประมุขค่ะ"
70005020-122 = "เฮ้อออออ..."
70005020-123 = "ช่วยไม่ได้นะ... การยอมรับข้อจำกัดของตัวเอง ก็เป็นการถอยเพื่อพัฒนาตัวเองในวันพรุ่งนี้"
70005020-124 = "แต่ถึงงั้นก็เถอะ..."
70005020-125 = "ไม่สิ ถ้าตัดสินใจไปแล้ว การลงมือทำทันทีคือแก่นแท้ของฮาร์ดบอยล์!"
70005020-127 = "ย่านการค้าเทพเต่าดำ"
70005020-128 = "อื้มๆ ฉันเข้าใจที่บอกแล้วละ พอดีเลยนะ! ฉันเพิ่งคิดไอเดียเจ๋งๆ ขึ้นมาได้ละ!"
70005020-129 = "จะ... จริงเหรอ?"
70005020-130 = "จะทำยังไงเหรอคะ ท่านประธาน? ย่านการค้าเทพเต่าดำของเรายังไม่มีเส้นสายที่รู้จักกับคนใน#nเกเฮนน่าเลยนะคะ"
70005020-131 = "อื้อ เพราะงั้นฉันเลยอยากใช้โอกาสนี้ต่อยอดเรื่องหาเส้นสายเอาไว้ด้วยยังไงล่ะ!"
70005020-132 = "ว่าแต่ว่าทุกคนชอบร้องเพลงรึเปล่า?"
70005020-133 = "ร้องเพลง?"
70005020-134 = "ร้องเพลงเหรอคะ?"

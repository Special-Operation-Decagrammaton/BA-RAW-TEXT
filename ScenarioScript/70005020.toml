[translation]
70005020-1 = "某個2月19日的紀錄（１）"
70005020-3 = "[log]2月19日[/log]"
70005020-6 = "格黑娜學園．風紀委員會辦公室"
70005020-8 = "……"
70005020-9 = "……"
70005020-10 = "……"
70005020-11 = "來，誰可以好好解釋一下現在是什麼情況？"
70005020-12 = "……簡單明瞭地說，應該是宅配送錯地方了。"
70005020-13 = "而且還是送到了山海經高級中學的「玄龍門」那邊……"
70005020-14 = "現在是分析情況的時候嗎！？你們也冷靜過頭了吧！"
70005020-15 = "不，不是你要人來說明一下情況的嗎！"
70005020-16 = "我現在就聯絡山海經的玄龍門，要求他們對這次的配送事故給出合理的交代！"
70005020-17 = "請等一下，亞子行政官！#n這麼做……真的可以嗎？"
70005020-18 = "這話是什麼意思，千夏！？"
70005020-19 = "玄龍門是山海經高級中學的學生會組織。#n就像我們格黑娜的萬魔殿一樣。"
70005020-20 = "所以呢？"
70005020-21 = "我們風紀委員會，基本上是負責維持校內風紀與治安的組織。"
70005020-22 = "雖然在某些情況下也會處理校外事務，不過……"
70005020-23 = "如果我們直接與其他學園的「學生會」──也就是相當於萬魔殿的組織進行接觸……"
70005020-24 = "啊。"
70005020-25 = "沒錯……我想你們應該明白我想說什麼了。"
70005020-26 = "嗯，有可能會被解讀成「外交行為」……"
70005020-27 = "要是被萬魔殿那群傢伙知道了……"
70005020-32 = "光是想像他們會怎麼找碴就頭痛……"
70005020-33 = "啊～真是的！有沒有人私底下跟那邊有交情的啊！？"
70005020-34 = "……"
70005020-35 = "你們兩個什麼意思！難道連個外校的朋友都沒有嗎！？"
70005020-36 = "亞，亞子行政官？#n其實……雖然稱不上是朋友，但我跟山海經的「鍊丹術研究會」有點交情……"
70005020-37 = "鍊丹術研究會？那是什麼單位？"
70005020-38 = "這說來話長……但如果要比喻的話，有點類似急救醫學部吧。"
70005020-39 = "啊，原來如此……"
70005020-40 = "……"
70005020-42 = "好，那就循著這條線，試著「私下」聯絡山海經那邊吧。"
70005020-47 = "……"
70005020-48 = "……"
70005020-49 = "……這該怎麼辦才好？"
70005020-50 = "您問我也……"
70005020-51 = "這個蛋糕是從哪來的？"
70005020-55 = "上面寫的是「格黑娜」。#n我看看……「獻給空崎陽奈委員長，滿滿心意」？"
70005020-56 = "空崎陽奈？好像在哪聽過……"
70005020-60 = "啊，我想起來了！是格黑娜的風紀委員長吧？#n好像有什麼完美超人之類的稱號……"
70005020-61 = "哼！肯定是我們的門主大人更可愛更帥氣！"
70005020-62 = "呃……現在說這個也太突然了吧……"
70005020-64 = "所以……是我們的蛋糕被送到了那邊，那邊的蛋糕被送來我們這邊了嗎？"
70005020-65 = "看起來是這樣沒錯……這算是外交事件了嗎？"
70005020-66 = "聽你這麼一說……好像真的是耶？"
70005020-67 = "那麼……原則上這種事應該是由……"
70005020-68 = "……宣傳部長來處理吧？"
70005020-69 = "……要交給香主大人處理嗎？"
70005020-70 = "……原則上是這樣？"
70005020-71 = "您是認真的嗎？"
70005020-72 = "別再說這些了……"
70005020-79 = "嗯？鍊丹術研究會的聯絡？"
70005020-83 = "請仔細聽我說，美奈執行部長！"
70005020-84 = "這是格黑娜急救醫學部「私下」的聯絡！"
70005020-85 = "「私下」的聯絡……？"
70005020-90 = "您好，近衛美奈執行部──不，美奈同學。#n我是格黑娜風紀委員會的火宮千夏……啊不，就叫我千夏就好。"
70005020-91 = "呃，嗯……"
70005020-92 = "請問今天原本應該送到我們這邊的蛋糕，是不是送錯到你們那邊了？"
70005020-93 = "！！！"
70005020-99 = "謝謝你，美奈同學。#n關於蛋糕送錯一事，已經確認完畢了。至於後續的處理方式……"
70005020-100 = "不好意思，我們會在進行內部討論之後再聯絡。"
70005020-105 = "該怎麼辦……"
70005020-106 = "唔嗯……最終還是得找那群傢伙……"
70005020-107 = "那群傢伙？"
70005020-108 = "沒，沒什麼。別在意。"
70005020-109 = "總之這件事我會負責處理！#n抱歉打擾到你的私人時間了。"
70005020-110 = "我明白了，執行部長。#n請您也別太勉強自己……"
70005020-115 = "唉……"
70005020-119 = "……如果有什麼狀況的話，請務必聯絡我。"
70005020-120 = "老實說，玄龍門如果缺少門主的決斷與手腕，是無法悄悄處理這種外部事件的。"
70005020-122 = "唉………………"
70005020-123 = "沒辦法了……#n承認自己的極限，也是邁向明天的一小步。"
70005020-124 = "雖然偏偏是那群人……"
70005020-125 = "不過既然下定決心就要立刻行動，這才是所謂的硬派作風！"
70005020-127 = "玄武商會"
70005020-128 = "嗯，我大概了解情況了。#n正巧我想到了一個超棒的點子！"
70005020-129 = "真，真的嗎？"
70005020-130 = "會長，您打算怎麼做？#n我們玄武商會目前還沒有跟格黑娜建立關係哦。"
70005020-131 = "嗯，我想趁這個機會把管道建立起來！"
70005020-132 = "話說回來──大家喜歡唱歌嗎？"
70005020-133 = "唱歌？"
70005020-134 = "……咦？"

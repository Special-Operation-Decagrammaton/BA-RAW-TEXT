[translation]
70005020-1 = "とある2月19日の記録（１）"
70005020-3 = "[log]2月19日[/log]"
70005020-6 = "ゲヘナ学園・風紀委員会の教室"
70005020-8 = "……。"
70005020-9 = "……。"
70005020-10 = "……。"
70005020-11 = "この状況。どなたか説明してくださいますか？"
70005020-12 = "……これは、誤配ですね。"
70005020-13 = "本来の宛て先は……山海経高級中学校の玄龍門ってところみたい。"
70005020-14 = "いま冷静に分析している場合ですか！？"
70005020-15 = "説明してくれって言ったのはアコちゃんでしょ！？"
70005020-16 = "もういいです！私が連絡してみます！すぐに対応しないと……！"
70005020-17 = "お待ちください。"
70005020-18 = "はい？"
70005020-19 = "玄龍門は、山海経高級中学校で生徒会機能を持った組織です。#n言わば、ゲヘナに[ruby=パンデモニウム・ソサエティー]おける万魔殿。[/ruby]"
70005020-20 = "それで？"
70005020-21 = "対して風紀委員会は、ゲヘナの風紀と治安を維持する組織です。"
70005020-22 = "状況によっては外部と協力する場合もありますが……。"
70005020-23 = "……それが、他学園の「生徒会」と直接的な交流になってしまえば……。"
70005020-24 = "あ。"
70005020-25 = "お二人のご想像通りです……。"
70005020-26 = "捉え方次第で外交問題になる可能性もある……。"
70005020-27 = "これがもし万魔殿の耳に入ってしまえば……。"
70005020-32 = "どんな難癖をつけてくるか、想像するだけでも……。"
70005020-33 = "ああもう！誰か、山海経に友達とかいないんですか！？"
70005020-34 = "……。"
70005020-35 = "えっ！？本当にいないんです……？"
70005020-36 = "その、一応……連絡を取ろうと思えば……「錬丹術研究会」と繋がりはあるのですが……。"
70005020-37 = "錬丹術研究会？どういうところです？"
70005020-38 = "強いて言えば……救急医学部のような部活です。"
70005020-39 = "ああ、それで。"
70005020-40 = "……。"
70005020-42 = "ではその伝手で、山海経と「プライベート」な連絡を取ってみましょう。"
70005020-47 = "……。"
70005020-48 = "……。"
70005020-49 = "どうすれば……。"
70005020-50 = "私に聞かれましても……。"
70005020-51 = "これ、どこのケーキだ？"
70005020-55 = "ゲヘナと書かれていますね。えっと……「[ruby=そらさき]空崎[/ruby]ヒナ委員長に、心を込めて」？"
70005020-56 = "空崎ヒナ？聞いたことがあるような……"
70005020-60 = "たしか……ゲヘナの風紀委員長だったか？学園を一人で支える完璧超人だとか……。"
70005020-61 = "ふんっ！門主様の方が優秀に決まってるがな！"
70005020-62 = "いきなりどういう話です……？"
70005020-64 = "ところで、うちのケーキは……？"
70005020-65 = "分かりません。ただ、このケーキが届いていることをゲヘナの風紀委員会に伝える必要はあるかと。"
70005020-66 = "……そうだな。"
70005020-67 = "こういう場合、担当するのは……。"
70005020-68 = "……広報部長、だろうか？"
70005020-69 = "……「香主」様、ですか？"
70005020-70 = "原則に従えばそうなるな。"
70005020-71 = "だ、大丈夫なんでしょうか……？"
70005020-72 = "……致し方あるまい。"
70005020-79 = "ん？錬丹術研究会から電話？"
70005020-83 = "よく聞いてほしいのだ、ミナ執行部長！#nゲヘナの救急医学部から、「プライベート」な連絡が来ているのだ！"
70005020-84 = "今から繋ぐのだ！"
70005020-85 = "「プライベート」な連絡……？"
70005020-90 = "初めまして、ミナさん。私はゲヘナ学園のチナツと申します。"
70005020-91 = "あ、ああ……。"
70005020-92 = "今日、そちらに届くはずだったケーキが、こちらに届いていまして。"
70005020-93 = "！！！"
70005020-99 = "ご説明ありがとうございます。たしかに、ケーキが入れ替わっているのですね。#nでは今後の対応方針について……"
70005020-100 = "こちら側でも検討いたします。方針が固まり次第、再度ご連絡させていただきますね。"
70005020-105 = "どうしましょう……。"
70005020-106 = "これでは、またあいつらに……。"
70005020-107 = "あいつら？"
70005020-108 = "なっ、なんでもない！"
70005020-109 = "とにかく、ここは私が責任を持ってなんとかしよう！お前には手間をとらせたな。"
70005020-110 = "あ、いえ。執行部長もご無理なさらず。"
70005020-115 = "はぁ……。"
70005020-119 = "……もし何かあった場合、こちらに連絡してください。"
70005020-120 = "正直、玄龍門が門主様抜きで事をうまく処理できるとは思えませんので。"
70005020-122 = "はああああ……。"
70005020-123 = "やむを得ないか……自身の限界を認めるのもまた強さ……"
70005020-124 = "だが……。"
70005020-125 = "いや、悩むのはハードボイルドではないな。即断即決だ！"
70005020-127 = "玄武商会"
70005020-128 = "……そりゃ災難だったね。でも、素直にうちを頼ったのは正解かも。#nちょうど、良いアイデアがあるんだ。"
70005020-129 = "ほ、本当か？"
70005020-130 = "会長。玄武商会とて、まだゲヘナとは取引をしたことがありません。どうするつもりですか？"
70005020-131 = "うん。だからこれを機に間口を広げたくてね。"
70005020-132 = "ところで、みんな歌は好き？"
70005020-133 = "歌？"
70005020-134 = "ですか？"

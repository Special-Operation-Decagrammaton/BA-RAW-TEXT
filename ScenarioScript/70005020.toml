[translation]
70005020-1 = "Record of a February 19th (1)"
70005020-3 = "[log]February 19th[/log]"
70005020-6 = "Gehenna Prefect Team's Club Room"
70005020-8 = "..."
70005020-9 = "..."
70005020-10 = "..."
70005020-11 = "Now, please properly explain what happened here."
70005020-12 = "Apologies for the bluntness, but it appears our delivery was switched..."
70005020-13 = "...with one from this \"Genryumon\" from Shanhaijing Academy."
70005020-14 = "Aren't you a little too calm, considering the circumstances?!"
70005020-15 = "Y-You asked for an explanation!"
70005020-16 = "I will contact Genryumon of Shanhaijing immediately and demand appropriate action to rectify this delivery accident!"
70005020-17 = "Wait, Senior Administrator Ako! Is that...okay?"
70005020-18 = "What are you trying to say, Chinatsu?!"
70005020-19 = "Genryumon is the student council of Shanhaijing Academy. It's an organization equivalent to our Gehenna Academy's Pandemonium Society."
70005020-20 = "And...?"
70005020-21 = "For the most part, our Prefect Team handles discipline and safety within Gehenna."
70005020-22 = "And there is certainly precedent for us dealing with foreign academies, in specific situations and circumstances."
70005020-23 = "However, when it comes to a direct exchange with another academy's student council that is, allow me to reiterate, an organization equivalent with the Pandemonium Society..."
70005020-24 = "Ah."
70005020-25 = "Yes... I trust you understand..."
70005020-26 = "Reaching out to them could be seen as a diplomatic matter, depending on how you look at it."
70005020-27 = "If the Pandemonium Society were to learn of it..."
70005020-32 = "We would never hear the end of it. Ever..."
70005020-33 = "Ugh! Does anyone know anyone there personally?!"
70005020-34 = "..."
70005020-35 = "What is that?! You two don't have any friends from other schools?!"
70005020-36 = "S-Senior Administrator Ako? Well, I wouldn't say...friend, but I am acquainted with someone from the Eastern Alchemy Society of Shanhaijing..."
70005020-37 = "Eastern Alchemy Society? What's that?"
70005020-38 = "It's somewhat complicated... But if we must draw parallels, you could equate them to the Medical Emergency Club."
70005020-39 = "Ah, that's why..."
70005020-40 = "..."
70005020-42 = "Anyway, that's good. Then let's use that to make...personal contact with Shanhaijing."
70005020-47 = "..."
70005020-48 = "..."
70005020-49 = "What...do we do?"
70005020-50 = "Even if you ask me..."
70005020-51 = "First off, who is this cake for?"
70005020-55 = "It says Gehenna. Let's see... \"To President Sorasaki Hina, with love\"?"
70005020-56 = "Sorasaki Hina? I think I've heard that name somewhere..."
70005020-60 = "Oh, I remember! I think she's the head prefect of Gehenna Academy? The perfect superhuman that keeps the academy running behind the scenes or something..."
70005020-61 = "Hmph! I bet our Madam is cuter and cooler!"
70005020-62 = "That feels irrelevant..."
70005020-64 = "So... Does this mean our cake went there, and their cake came here?"
70005020-65 = "That would be reasonable to assume... Would this then be considered a...diplomatic issue?"
70005020-66 = "...That seems...reasonable to assume as well."
70005020-67 = "Then...by principle, we would require someone who handles these kinds of issues, yes?"
70005020-68 = "...So, the PR manager?"
70005020-69 = "...You want this taken care of by the PR manager?"
70005020-70 = "...By principle...?"
70005020-71 = "Are you sure?"
70005020-72 = "Please stop talking..."
70005020-79 = "Huh? The Eastern Alchemy Society is calling us...?"
70005020-83 = "Listen carefully, Executive Officer Mina!"
70005020-84 = "We got a \"personal\" call from Gehenna's Medical Emergency Club!"
70005020-85 = "A \"personal\" call...?"
70005020-90 = "Hello, Executive Officer Konoe Mina... I mean, just Mina. This is Hinomiya Chinatsu of the Gehenna Prefect Team... I mean, in this situation, just Chinatsu."
70005020-91 = "S-Sure..."
70005020-92 = "Did you happen to receive a cake that was meant for us?"
70005020-93 = "...!!"
70005020-99 = "Thank you for confirming that the cakes were switched, Mina. Our next steps will be—"
70005020-100 = "My apologies. I'll have to call you back after we hold a meet—have a casual conversation about this."
70005020-105 = "What do we do...?"
70005020-106 = "Ugh, ugh... Do I really have to ask THOSE people for help...?"
70005020-107 = "\"Those\" people?"
70005020-108 = "N-No. It's nothing."
70005020-109 = "Anyway, I'll take responsibility and handle this on my own! Um... I apologize for consulting you while you're not on shift."
70005020-110 = "Understood, Executive Officer. Please don't overdo it, though..."
70005020-115 = "*sigh*"
70005020-119 = "...If something happens, let us know."
70005020-120 = "If I'm going to be completely honest, I don't think Genryumon can handle this on their own, not without Madam's decisiveness and resourcefulness to guide you."
70005020-122 = "*siiiiiigh*"
70005020-123 = "...There's no helping it. Admitting one's limit is taking one step back now to take two steps forward tomorrow."
70005020-124 = "Still, why...?"
70005020-125 = "No, it's the essence of the hard-boiled to take immediate action in times of crisis!"
70005020-127 = "Black Tortoise Promenade"
70005020-128 = "Mm, okay. I understand the situation. Good thing I happen to have a great idea!"
70005020-129 = "I-Is that true?"
70005020-130 = "What are you planning on doing, President? The Black Tortoise Promenade's connections don't reach all the way to Gehenna."
70005020-131 = "Yes, that's exactly why. This might be a great opportunity to establish those very connections."
70005020-132 = "Anyway, does everyone like singing?"
70005020-133 = "Singing?"
70005020-134 = "Huh?"

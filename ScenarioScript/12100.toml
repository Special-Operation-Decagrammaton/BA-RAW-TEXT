[translation]
12100-1 = "第10話;凱薩PMC（２）"
12100-7 = "哈啊……哈啊……"
12100-8 = "……呼。"
12100-9 = "這樣根本沒完沒了嘛……"
12100-11 = "……師，聽得見嗎？突破包圍網……又……"
12100-12 = "……不穩定……請立刻……撤退……"
12100-13 = "有人……正在……接近…… "
12100-23 = "……窮途末路？"
12100-24 = "被包圍了啊……"
12100-25 = "……"
12100-32 = "我聽說有入侵者……沒想到是阿拜多斯啊。"
12100-33 = "這，這傢伙是誰啊……"
12100-34 = "……"
12100-35 = "（那傢伙是……）"
12100-36 = "居然會找到這邊來……算了，無所謂。"
12100-38 = "如今學生會長不在，由你這個副會長來把債務還清如何？小鳥遊星野小姐？"
12100-39 = "或者……你要接受我的提議呢？"
12100-41 = "（是那時候的……）"
12100-42 = "非法入侵本公司的私有地大鬧一番造成的損害金額……"
12100-43 = "雖然可以附加在你們學校的債務上，不過金額也不會有什麼變化……"
12100-44 = "你是當時的……"
12100-45 = "……記得你是蓋瑪特利亞盯上的學生會長……不，是副會長吧？"
12100-46 = "啊啊，我想到了一個有趣的點子。#n似乎比雇用便利屋和頭盔團都來得更好。"
12100-47 = "便利屋……？你，你在說什麼？"
12100-48 = "……你們是誰？"
12100-49 = "真是……竟然不認識我啊。#n阿拜多斯，你們應該要比任何人都熟悉我才對。"
12100-50 = "我是凱薩公司的董事。"
12100-53 = "同時也是你們阿拜多斯高中的債權人。"
12100-54 = "！！"
12100-55 = "……騙人！？"
12100-61 = "那麼，就讓我們來聊聊這持續多年的債權關係吧。"
12100-63 = "下一話;打不贏的仗"

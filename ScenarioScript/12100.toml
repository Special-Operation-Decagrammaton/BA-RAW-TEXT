[translation]
12100-1 = "ตอนที่ 10;ไคเซอร์ PMC 2"
12100-7 = "แฮ่ก... แฮ่ก...\n\n\n"
12100-8 = "เฮ้อ...\n\n"
12100-9 = "เมื่อไหร่จะหมดเนี่ย...\n\n"
12100-11 = "(ซ่า) ...คุณครู ได้ยินไหมคะ? ตอนนี้เราฝ่าวงล้อมมาได้แล้ว... แต่ว่าทางนั้นก็จะล้อมเข้ามาอีก..."
12100-12 = "(ซ่า) สัญญาณไม่เสถียรเลย... เรา... ล่าถอย..."
12100-13 = "มีใคร... กำลังมา..."
12100-23 = "เราสู้ไม่ได้หรอก... ฝ่ายเรามีน้อยกว่า"
12100-24 = "โดนล้อมเอาไว้แล้วงั้นเหรอเนี่ย...?"
12100-25 = "......\n"
12100-32 = "อุตส่าห์สงสัยว่าผู้บุกรุกคือใคร... ที่แท้ก็คนของอะบิดอสเองงั้นเหรอ?"
12100-33 = "ใครกัน? เหมือนเป็นคนระดับสูงเลย...\n"
12100-34 = "......"
12100-35 = "(คนนั้นมัน...)\n"
12100-36 = "คิดไม่ถึงเลยว่าจะมาจนถึงที่นี่ได้... แต่ก็ช่างเถอะ"
12100-38 = "พอประธานนักเรียนหายตัวไป รองประธานนักเรียนอย่างคุณก็เลยจะชดใช้หนี้แทนงั้นเหรอครับ?#nคุณทาคานาชิ โฮชิโนะ?"
12100-39 = "หรือว่ามาเพื่อ... ฟังข้อเสนอของพวกเรากันครับ?"
12100-41 = "(ตอนนั้นที่...)\n"
12100-42 = "บุกรุกเข้ามาในพื้นที่ส่วนบุคคลของคนอื่นตามอำเภอใจแล้วมาสร้างความเสียหายแบบนี้..."
12100-43 = "ฉันอาจจะบวกค่าเสียหายไปกับหนี้ที่โรงเรียนของพวกเธอต้องชดใช้อีกเท่าตัวก็ได้ แต่ทำไปก็ไม่มีอะไร#nเปลี่ยนแปลงอยู่ดี..."
12100-44 = "นายคือ... คนเมื่อตอนนั้น..."
12100-45 = "อืม... นี่ประธานนักเรียนที่เกมาเทรียหมายตาอยู่รึเปล่านะ? ไม่สิ หรือจะเป็นรองประธานนักเรียน? แต่ก็ช่างเถอะ"
12100-46 = "ฉันคิดไอเดียสนุกๆ ได้แล้วละ แบบนี้น่าจะดีกว่าหน่วยรับจ้างสารพัดหรือแก๊งหมวกกันน็อกเยอะเลย"
12100-47 = "หมายความว่าไง? หน่วยรับจ้างสารพัดเหรอ...? \n"
12100-48 = "...พวกคุณเป็นใครกันคะ?"
12100-49 = "อืม... ไม่รู้จักฉันงั้นเหรอ น่าผิดหวังชะมัดเลยนะนักเรียนอะบิดอส คิดว่าจะรู้จักฉันดีมากกว่าใครเสียอีก"
12100-50 = "ฉันก็คือกรรมการของไคเซอร์ คอร์เปอเรชั่น\n\n"
12100-53 = "แล้วก็ยังเป็นคนรับเงินจากโรงเรียนอะบิดอสของพวกเธอด้วย เรียกง่ายๆ ว่าเจ้าหนี้ไงล่ะ\n"
12100-54 = "!!\n\n"
12100-55 = "จะ.. เจ้าหนี้?!\n\n"
12100-61 = "เอาละ เรามาคุยเรื่องหนี้สินของพวกเธอที่ค้างมานานนมกันดีกว่า"
12100-63 = "ตอนต่อไป;การต่อสู้ที่ไร้หนทางชนะ"

[translation]
12100-1 = "Episode 10;Kaiser PMC 2"
12100-7 = "*pant* *pant*"
12100-8 = "*sigh*"
12100-9 = "There's just no end to this..."
12100-11 = "*crackle* Sensei, can you hear me? We broke through the siege...but they're..."
12100-12 = "*crackle* Communications are unstable... Hurry and retreat..."
12100-13 = "Someone...coming..."
12100-23 = "...We're screwed."
12100-24 = "They've got us surrounded..."
12100-25 = "..."
12100-32 = "I was wondering who the intruders could be...and there you are, Abydos."
12100-33 = "L-Looks like someone important just showed up..."
12100-34 = "..."
12100-35 = "(That's...)"
12100-36 = "I didn't think you would come here... Well, it doesn't matter either way."
12100-38 = "So, with the president gone...that means the debt falls on you, Vice President Takanashi Hoshino."
12100-39 = "Or...would you rather hear my offer?"
12100-41 = "(You are...)"
12100-42 = "You've damaged a business by illegally breaking into its private property."
12100-43 = "I could leverage this transgression to double the debt your school owes, but honestly, that wouldn't change anything..."
12100-44 = "You're...the one from..."
12100-45 = "...Hmm, are you the Student Council president that Gematria was after? Oh, you're the vice president. Anyway."
12100-46 = "Yes, yes. I have an interesting idea. It'll be much better than using Problem Solver or the Helmet Gang."
12100-47 = "What are you talking about? Problem Solver?"
12100-48 = "...Who are you?"
12100-49 = "Hmm... You don't know who I am? Now that's disappointing. Abydos students, of all people, should know me better than anyone."
12100-50 = "I'm an executive of Kaiser Corporation."
12100-53 = "And more importantly...I own the debt your school owes. In other words—I'm your creditor."
12100-54 = "!!"
12100-55 = "C-Creditor?!"
12100-61 = "Now then, let us discuss your old debt."
12100-63 = "Next Episode;A Losing Battle"

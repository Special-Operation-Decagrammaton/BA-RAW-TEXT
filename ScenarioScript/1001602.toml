1001602-68 = "#all;hide"
1001602-69 = "#wait;1000"
1001602-70 = "3;미도리;04;아앗! 또, 폭탄으로 길이 막혀서 갈 수가 없어요!\n#3;em;[속상함]\n#3;a\n#3;stiff"
1001602-71 = "3;미도리;05;이잇……! 다시! 다시 해요. 선생님! \n#3;em;[빠직]"
1001602-72 = "#wait;1500"
1001602-73 = "3;미도리;04;어?! 방금은 또 왜 죽은 거죠?!\n#3;em;[?!]\n#3;shake"
1001602-74 = "3;미도리;04;내가 설치한 폭탄인데, 왜 죽은 거죠?!"
1001602-75 = "3;미도리;05;아직, 아직이에요! 선생님! 아직 끝나지 않았어요!\n#3;em;[빠직]\n#3;stiff"

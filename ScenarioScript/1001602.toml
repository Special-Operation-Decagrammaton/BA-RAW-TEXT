1001602-62 = "#3;hide"
1001602-63 = "3;미도리;03\n#3;greeting\n#3;a\n#3;closeup\n#wait;2000"
1001602-64 = "#na;(그리하여 미도리는 평소 해본 적 없다던 대전 게임을 가져왔다.)"

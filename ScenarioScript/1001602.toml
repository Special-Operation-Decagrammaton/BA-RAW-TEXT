[translation]
1001602-1 = "#title;마감이에요. 선생님."
1001602-2 = "#place;밀레니엄 게임개발부"
1001602-3 = "#na;(미도리의 연락을 받고 게임개발부를 찾았다.)"
1001602-4 = "#na;(부실에 도착하자, 방 한가운데에서 미도리가 스케치북을 든 채 집중하고 있는 모습이 보였다.)"
1001602-5 = "#na;(그런데)"
1001602-6 = "[ns] \"미도리?\""
1001602-7 = "3;미도리;05\n#3;a\n#3;em;[...]\n#wait;2500"
1001602-8 = "3;미도리;07;으음. 이건 아냐."
1001602-9 = "[s] \"저기요~?\""
1001602-10 = "3;미도리;05\n#3;em;[...]\n#3;m2\n#wait;2000"
1001602-11 = "3;미도리;07;으으으음. 이것도 아니야……."
1001602-12 = "[s] \"들리십니까~?\""
1001602-13 = "3;미도리;99\n#3;em;[...]\n#3;m3\n#wait;2500"
1001602-14 = "3;미도리;04;으으으으으으으음……. 전부 아니야…….\n#3;stiff\n#3;em;[땀]"
1001602-15 = "[s] \"반응이 없다. 그냥 미도리인 것 같다.\""
1001602-16 = "3;미도리;02;앗. 선생님? 어, 언제 오셨어요?!\n#3;em;[반응]"
1001602-17 = "[s] \"그보다 상담할 게 있다고 했는데, 무슨 일이야?\""
1001602-18 = "3;미도리;01;아, 맞다. 상담. 그거 때문에 제가 선생님께 문자를 드렸었죠.\n#3;em;[!]"
1001602-19 = "3;미도리;99;……."
1001602-20 = "3;미도리;04;우와아아앙. 선생님, 크, 큰일 났어요!\n#3;hophop"
1001602-21 = "[s] \"큰일?\""
1001602-22 = "3;미도리;04;마감일이 코앞인데 저, 아무것도 안 떠올라요……!\n#3;stiff\n#3;em;[속상함]"
1001602-23 = "#all;hide"
1001602-24 = "[ns] \"어때, 조금 진정 됐어?\""
1001602-25 = "3;미도리;07;네에, 부끄러운 모습을 보였네요. 죄송해요.\n#3;a\n#3;em;[땀]\n#3;stiff"
1001602-26 = "3;미도리;07;요 며칠 간 계속 이걸로 고민하고 있던 터라……."
1001602-27 = "[s] \"그럼 미도리가 상담하고 싶다는 게?\""
1001602-28 = "3;미도리;02;그게……. 저희는 게임개발부잖아요?\n#3;em;[반응]"
1001602-29 = "3;미도리;01;언제 어떤 식으로 신작을 만들게 될지 모르니까."
1001602-30 = "3;미도리;01;평소에도 이런저런 뱅크 아이디어를 모아두고는 해요."
1001602-31 = "3;미도리;99;마침 다음 아이디어 회의 마감이 얼마 남지 않아서, 그때까지 어떻게든 뭔가 새로운 걸 떠올려 보려고 했는데……."
1001602-32 = "[s] \"결국 밤새도록 아무것도 안 떠올랐다는 거지?\""
1001602-33 = "3;미도리;07;네……. 마감이 코앞인데, 아무것도…….\n#3;em;[속상함]\n#3;stiff"
1001602-34 = "[s] \"정 힘들다면 마감을 늘려 달라고 하면 되는 거 아냐?\""
1001602-35 = "3;미도리;02;마감을……, 늘린다고요?\n#3;em;[?]"
1001602-36 = "3;미도리;99\n#3;em;[...]\n#wait;2500"
1001602-37 = "3;미도리;05;선생님. 마감이라는 건 일종의 약속이에요. 지키기 어려우니 미루어 달라고 하면, 그건 너무 무책임하지 않나요?\n#3;em;[빠직]"
1001602-38 = "3;미도리;05;그건 게임개발부에서 일러스트레이터이자 게임 비쥬얼에 관련된 전반적인 부분을 담당한 입장으로서 절대 불허합니다!\n#3;em;[!]\n#3;closeup"
1001602-39 = "[s1] \"미도리는 자신한테 엄격하구나.\"\n[s2] \"책임감 넘치는 미도리, 멋져!\""
1001602-40 = "3;미도리;07;으, 으음. 저도 모르게 흥분했네요.\n#3;em;[땀]\n#3;stiff"
1001602-41 = "3;미도리;07;으, 으음. 저도 모르게 흥분했네요.\n#3;em;[땀]\n#3;stiff"
1001602-42 = "3;미도리;01;어쨌거나, 네. 그래요. 역시 마감을 늘린다니 그건 절대로 안 될 일이에요."
1001602-43 = "3;미도리;01;그러니 선생님에게 조언을 받고 싶어 문자를 보낸 거예요."
1001602-44 = "3;미도리;02;혹시 뭔가 방법이 없을까요?"
1001602-45 = "[s] \"미도리가 평소 했던 게임이 뭐야?\""
1001602-46 = "3;미도리;01; 저는 주로 퍼즐이나 캐주얼 게임을 좋아했어요. 테트니스나 포요포요 같은 거요."
1001602-47 = "[s3] \"그럼 평소 해보지 못한 장르의 게임을 해보면서\"\n[s4] \"아이디어를 얻어보는 건 어때?\""
1001602-48 = "3;미도리;02;앗, 과연……, 발상의 전환이네요. 평소 자주 안 해본 장르의 게임을 하면서 자극을 받는다는 거군요.\n#3;em;[!]"
1001602-49 = "3;미도리;02;앗, 과연……, 발상의 전환이네요. 평소 자주 안 해본 장르의 게임을 하면서 자극을 받는다는 거군요.\n#3;em;[!]"
1001602-50 = "3;미도리;99;으음~"
1001602-51 = "3;미도리;03;좋은 생각인 거 같아요!\n#3;em;[반짝]"
1001602-52 = "3;미도리;02;저기……. 그렇다면……."
1001602-53 = "3;미도리;01;혹시 선생님도, 어울려 주실 수 있을까요?"

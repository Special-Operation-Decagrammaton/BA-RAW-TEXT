[translation]
1001602-1 = "是截止時間唷，老師"
1001602-2 = "千年．遊戲開發部"
1001602-3 = "（收到了綠的聯絡，於是來到了遊戲開發部）"
1001602-4 = "（在活動室裡，看到綠正拿著素描簿非常專心的樣子）"
1001602-5 = "（但是……）"
1001602-6 = "[ns] 「綠？」"
1001602-8 = "唔嗯，不是這樣……"
1001602-9 = "[s] 「那個……？」"
1001602-11 = "唔嗯，也不是這樣……"
1001602-12 = "[s] 「綠，你有聽到嗎？」"
1001602-14 = "唔嗯嗯嗯嗯……這個也不對那個也不對……"
1001602-15 = "[s] 「沒有反應。就是個綠。」"
1001602-16 = "哇啊！老，老師！？你，你什麼時候來的！？"
1001602-17 = "[s] 「剛剛才到喔。你說有事想商量，是什麼事呢？」"
1001602-18 = "啊，是的。沒錯，有件事想請教老師。"
1001602-19 = "有件，事……"
1001602-20 = "……嗚哇啊啊啊！！老師，事情不好了！"
1001602-21 = "[s] 「怎，怎麼了？」"
1001602-22 = "明明截稿日就在眼前了，我卻什麼點子都沒有！！！"
1001602-24 = "[ns] 「……還好嗎？冷靜下來了嗎？」"
1001602-25 = "是的，讓你看到難為情的樣子了，不好意思……"
1001602-26 = "我這幾天一直在煩惱這件事……"
1001602-27 = "[s] 「這麼說，綠想要談的事情是……」"
1001602-28 = "是的……正如你所知，我們是遊戲開發部。"
1001602-29 = "因為不知道會不會突然要在什麼時候、用什麼形式做出新作，"
1001602-30 = "所以平時都會定時地蒐集各種點子，大家一起進行討論。"
1001602-31 = "正好，下一次點子會議的日子就快到了，得在那之前想出點什麼才行……"
1001602-32 = "[s] 「結果什麼都想不出來……的意思嗎？」"
1001602-33 = "是的……明明截止時間就在眼前了，卻什麼也……"
1001602-34 = "[s] 「延後截止時間之類的怎麼樣啊？」"
1001602-35 = "延後，截止時間……？"
1001602-37 = "……所謂的截止時間是一種約定。如果因為難以遵守就說「那就延後吧」之類的話，這樣的事情就會一直不斷重複發生的。"
1001602-38 = "身為遊戲開發部的繪師以及整體視覺設計的負責人，絕對不能做出這種事！"
1001602-39 = "[s1] 「綠，綠對自己真嚴格呢……」\n[s2] 「責任感強烈的綠，帥呆了！」"
1001602-40 = "不，不好意思，不知不覺就脫口而出了……"
1001602-41 = "不，不好意思，不知不覺就脫口而出了……"
1001602-42 = "總之，就是這樣。果然無論如何還是不想延後截止時間……"
1001602-43 = "所以想要聽聽老師的建議，於是發了訊息給你。"
1001602-44 = "你有沒有什麼好方法呢？"
1001602-45 = "[s] 「嗯……綠平常都玩些什麼遊戲呢？」"
1001602-46 = "平常……都玩益智遊戲和休閒遊戲吧。我很喜歡《俄羅斯磚塊》和《魔法果凍》。"
1001602-47 = "[s3] 「那要不要玩玩看平常沒什麼在玩的遊戲種類，」\n[s4] 「看看會不會獲得什麼靈感怎麼樣？」"
1001602-48 = "原來如此，換個思路的意思對吧……藉由接觸平時很少接觸的東西，進而獲得新的刺激……"
1001602-49 = "原來如此，換個思路的意思對吧……藉由接觸平時很少接觸的東西，進而獲得新的刺激……"
1001602-50 = "真不愧是老師，"
1001602-51 = "我認為是個好方法！"
1001602-52 = "啊，那個，這樣的話……"
1001602-53 = "如果可以的話，老師可以陪我一起玩嗎？"
1001602-64 = "（於是，綠拿出了平時沒有在玩的對戰遊戲）"
1001602-66 = "（當時，我們還不知道……）"
1001602-67 = "（這個選擇，竟然會導致那種結果）"
1001602-70 = "啊啊！被炸彈擋住去路了，哪都去不了！"
1001602-71 = "咦咦……！？再，再來一次！我們再玩一次吧老師！"
1001602-73 = "咦！？剛才那是什麼！？"
1001602-74 = "明明就是我自己放的炸彈，為什麼死的是我！？"
1001602-75 = "還，還沒啊老師！還沒有結束！"
1001602-78 = "[ns] 「綠，綠同學～那個，時間好像快要……」"
1001602-79 = "你在說什麼啊，都只有老師贏而已不是嗎！"
1001602-80 = "身為老師，不會做出贏了就烙跑這種事的對吧！？"
1001602-81 = "[s] 「不是，那個……」"
1001602-82 = "還沒有結束……"
1001602-83 = "所謂的遊戲，只有在放棄的瞬間才是真的GameOver！"
1001602-84 = "請做好覺悟吧，老師！在我贏之前是不會讓你回去的唷！"
1001602-86 = "（就這麼把想靈感的事拋在一邊，一整晚都和綠享受遊戲）"

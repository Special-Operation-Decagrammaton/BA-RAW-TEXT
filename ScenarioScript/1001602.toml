[translation]
1001602-1 = "หมดเวลาแล้วล่ะค่ะ คุณครู"
1001602-2 = "ชมรมพัฒนาเกม มิลเลเนียม"
1001602-3 = "(คุณครูมาที่ชมรมพัฒนาเกมหลังจากมิโดริติดต่อมา)"
1001602-4 = "(เมื่อมาถึงห้อง เห็นมิโดริกำลังจดจ่อกับสมุดวาดภาพอยู่กลางห้อง)"
1001602-5 = "(แต่ว่า)"
1001602-6 = "[ns] \"มิโดริ?\""
1001602-8 = "อืม... ไม่ใช่แบบนี้"
1001602-9 = "[s] \"ขอโทษนะ~\""
1001602-11 = "อืมมมม... แบบนี้ก็ไม่ใช่..."
1001602-12 = "[s] \"ได้ยินมั้ย~?\""
1001602-14 = "อืมมมมมมมมม... ไม่ใช่ทั้งหมดเลย..."
1001602-15 = "[s] \"ไม่ตอบแหะ มิโดริก็อยู่นี่นา\""
1001602-16 = "อ๊ะ! คุณครู? มะ...มาตั้งแต่เมื่อไหร่คะ?!"
1001602-17 = "[s] \"เห็นว่าจะขอคำปรึกษา มีเรื่องอะไรเหรอ?\""
1001602-18 = "อ๊ะ จริงด้วย ปรึกษา ส่งข้อความไปหาคุณครูเพราะเรื่องนั้นนี่นา"
1001602-19 = "......"
1001602-20 = "ฮือ ฮือ! คุณครูคะ เกิดเรื่องใหญ่แล้ว!"
1001602-21 = "[s] \"เรื่องใหญ่?\""
1001602-22 = "ใกล้จะหมดเวลาแล้ว แต่ฉันนึกอะไรไม่ออกเลยค่ะ…!"
1001602-24 = "[ns] \"เป็นยังไงบ้าง ใจเย็นลงบ้างแล้วยัง?\""
1001602-25 = "ค่ะ... ดูไม่ได้เลยสินะคะ ขอโทษค่ะ"
1001602-26 = "ฉันคิดเรื่องนี้มาสองสามวันแล้ว..."
1001602-27 = "[s] \"นี่คือเรื่องที่มิโดริอยากจะปรึกษาเหรอ?\""
1001602-28 = "คือว่า... ฉันเป็นสมาชิกชมรมพัฒนาเกมใช่มั้ยล่ะคะ?"
1001602-29 = "เพราะไม่รู้ว่าจะทำผลงานออกมาในรูปแบบไหน หรือว่าเมื่อไหร่"
1001602-30 = "ปกติฉันจะรวบรวมไอเดียเก็บไว้ค่ะ"
1001602-31 = "อีกไม่นานก็จะถึงการประชุมไอเดียครั้งต่อไปแล้ว ฉันพยายามที่จะคิดอะไรใหม่ๆ ให้ได้#nก่อนจะถึงตอนนั้น..."
1001602-32 = "[s] \"หมายถึงว่าคิดอะไรไม่ออกทั้งคืนเลยเหรอ?\""
1001602-33 = "ค่ะ... ใกล้จะหมดเวลาแล้ว แต่ยังคิดไม่ออกเลย..."
1001602-34 = "[s] \"ถ้าไม่ไหว ก็ขอเลื่อนกำหนดส่งออกไปได้ไม่ใช่เหรอ?\""
1001602-35 = "ขอเลื่อน...กำหนดส่งออกไปเหรอคะ?"
1001602-37 = "คุณครู กำหนดส่งก็เป็นสัญญาอย่างหนึ่งนะคะ ถ้าให้ผลัดออกไปเพราะไม่สามารถรักษาสัญญาได้#nมันจะไม่เป็นการขาดความรับผิดชอบเหรอคะ?"
1001602-38 = "ในฐานะนักวาดภาพประกอบและผู้รับผิดชอบด้านภาพในชมรมพัฒนาเกม ฉันทำไม่ได้หรอกค่ะ!"
1001602-39 = "[s1] \"มิโดริเข้มงวดกับตัวเองสินะ\"\n[s2] \"มิโดริผู้มีความรับผิดชอบ เท่มาก!\""
1001602-40 = "อะ... อืม ฉันเองก็จริงจังขึ้นโดยไม่รู้ตัวเลยล่ะค่ะ"
1001602-41 = "อะ... อืม ฉันเองก็จริงจังขึ้นโดยไม่รู้ตัวเลยล่ะค่ะ"
1001602-42 = "แต่ถึงยังไงก็ใช่ค่ะ เพราะฉะนั้นการเลื่อนกำหนดส่งออกไปนั่นเป็นไปไม่ได้เด็ดขาดค่ะ"
1001602-43 = "ฉันส่งข้อความไปเพื่อขอคำแนะนำจากคุณครูนะคะ"
1001602-44 = "ว่าแต่มันจะไม่มีวิธีไหนเลยเหรอคะ?"
1001602-45 = "[s] \"ปกติมิโดริเล่นเกมอะไรเหรอ?\""
1001602-46 = "หลักๆ แล้วฉันชอบเกมแคชชวล หรือแก้ปริศนาค่ะ อย่างเกมเท็ตเนส หรือโปโยโปโยะค่ะ"
1001602-47 = "[s3] \"ถ้างั้นมาลองเกมประเภทอื่นที่ปกติไม่ได้เล่นกัน\"\n[s4] \"เอามาเป็นแรงบันดาลใจให้เกิดไอเดียเป็นยังไงล่ะ?\""
1001602-48 = "ว้าว นั่นเป็น... การเปลี่ยนความคิดไปเลยค่ะ เล่นเกมที่ปกติไม่ค่อยได้เล่น จะได้รับแรงกระตุ้นนี่เองสินะคะ"
1001602-49 = "ว้าว นั่นเป็น... การเปลี่ยนความคิดไปเลยค่ะ เล่นเกมที่ปกติไม่ค่อยได้เล่น จะได้รับแรงกระตุ้นนี่เองสินะคะ"
1001602-50 = "อืม~"
1001602-51 = "ฉันมีความคิดดีๆ ค่ะ!"
1001602-52 = "คือว่า... ถ้าหาก..."
1001602-53 = "คุณครูมาร่วมกันด้วยได้มั้ยคะ?"
1001602-64 = "(ด้วยเหตุนี้มิโดริจึงไปเอาเกมคลาสสิกที่ไม่เคยเล่นมา)"
1001602-66 = "(ตอนนั้นคุณครูยังไม่รู้เรื่องอะไร)"
1001602-67 = "(ว่าการเลือกนี้จะนำหายนะแบบไหนมา)"
1001602-70 = "อ๊ะ! ไปต่อไม่ได้เพราะติดระเบิดอีกแล้วค่ะ!"
1001602-71 = "ชิส์...! อีกที! อีกทีค่ะ คุณครู!"
1001602-73 = "หา?! ทำไมแป๊ปเดียวตายอีกแล้วเนี่ย?!"
1001602-74 = "นี่เป็นระเบิดที่ฉันวางไว้ ทำไมตายได้ล่ะ?!"
1001602-75 = "ยังหรอก ยังค่ะ! คุณครู! ยังไม่จบแค่นี้หรอกนะคะ!"
1001602-78 = "[ns] \"มิโดริ ถึงเวลาแล้ว...\""
1001602-79 = "ตาเมื่อกี้คุณครูก็ชนะแล้วนี่คะ!"
1001602-80 = "คุณครูเป็นผู้ใหญ่ที่ชนะแล้วหนีเหรอคะ?!"
1001602-81 = "[s] \"ไม่ใช่อย่างนั้นนะ...\""
1001602-82 = "ยังไม่จบแค่นี้หรอกนะคะ!"
1001602-83 = "จะเกมโอเวอร์ก็เมื่อยอมแพ้เท่านั้นล่ะค่ะ!"
1001602-84 = "เตรียมตัวให้พร้อมค่ะ คุณครู ฉันจะไม่กลับจนกว่าจะชนะค่ะ"
1001602-86 = "(เพราะแบบนั้นการรวบรวมไอเดีย จึงกลายเป็นคุณครูอยู่เล่นเกมกับมิโดริทั้งคืน)"

1001602-77 = "3;미도리;07\n#3;em;…\n#3;a\n#wait;2500"
1001602-78 = "[ns] \"미도리 님, 슬슬 시간이…….\""
1001602-79 = "3;미도리;05;방금 판도 선생님이 이긴 판이잖아요!\n#3;em;[!]"
1001602-80 = "3;미도리;07;설마 선생님은 이기고 도망치는 그런 치사한 어른이신가요?!\n#3;stiff\n#3;em;[속상함]"
1001602-81 = "[s] \"아니, 그건 아닌데…….\""
1001602-82 = "3;미도리;05;아직 끝나지 않았어요."
1001602-83 = "3;미도리;05;게임이란 포기한 바로 그 순간이 게임 오버인 거니까!\n#3;em;[!]\n#3;closeup"
1001602-84 = "3;미도리;03;각오하세요. 선생님. 제가 이길 때까진 돌아갈 수 없으니까요.\n#3;em;[반짝]\n#3;greeting\n#3;closeup"
1001602-85 = "#all;hide"
1001602-86 = "#na;(그렇게 아이디어는 뒷전으로 한 채, 밤새도록 미도리와 대전 게임을 즐겼다.)"

[translation]
90000080-1 = "第9話;搜索作戰"
90000080-3 = "部長，捕捉到「凱瑟」的移動了。#n正往我們這裡來。"
90000080-4 = "照這樣下去的話，大約3分鐘後就會遭遇。"
90000080-5 = "這條路也是死路嗎……"
90000080-6 = "嗯。無論走哪一條路線，都會碰上凱瑟。"
90000080-7 = "說不定打從一開始，想要甩掉這傢伙就是不可能的……"
90000080-8 = "「廢墟淹沒地區」的搜索……似乎會花費比預料中更多的時間呢……"
90000080-9 = "雖然我對「捉迷藏」還蠻有自信的……沒辦法了。"
90000080-10 = "老師，請暫時和英美一起撤退吧。我來思考下一步。"
90000080-11 = "[s] 「我知道了。」"

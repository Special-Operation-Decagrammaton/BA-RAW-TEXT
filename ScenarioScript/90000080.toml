[translation]
90000080-1 = "ตอนที่ 8;ปฏิบัติการค้นหา"
90000080-3 = "หัวหน้า ตรวจพบการเคลื่อนไหวของ <เคเทอร์> แล้ว กำลังเคลื่อนที่มาทางนี้"
90000080-4 = "จะเผชิญหน้ากันในอีก 3 นาที "
90000080-5 = "เส้นทางนั้นก็เป็นทางตันสินะคะ..."
90000080-6 = "อืม ไม่ว่าจะไปทางไหนก็คงเจอเคเทอร์ขวางทางอยู่แน่ๆ"
90000080-7 = "การจะสลัดเจ้านี่ให้หลุดอาจเป็นไปไม่ได้ตั้งแต่แรกแล้วก็ได้..."
90000080-8 = "การค้นหา <พื้นที่รกร้างจมน้ำ>... คงจะต้องใช้เวลามากกว่านี้สินะ..."
90000080-9 = "ฉันมั่นใจในการเล่นซ่อนหามากแท้ๆ... แต่ก็ช่วยไม่ได้นะคะ"
90000080-10 = "คุณครูคะ ถอนกำลังมาพร้อมกับเอมิก่อนเถอะค่ะ ฉันจะลองคิดหาวิธีอื่นดูค่ะ"
90000080-11 = "[s] \"เข้าใจแล้ว\""

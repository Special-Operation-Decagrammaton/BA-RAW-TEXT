[translation]
21110-1 = "第11話;位於那裡的存在"
21110-2 = "工廠內部"
21110-7 = "哈啊，哈啊……總算是成功了，嗎？"
21110-8 = "成功進入。任務完成。"
21110-9 = "話說，我們是不是其實超強的啊？#n搞不好就連C&C或是其他學校的戰鬥集團之類的也能打贏也說不定喔！"
21110-10 = "至少C&C我覺得是絕對不可能的啦……不過確實，我自己也有點嚇到了。"
21110-11 = "肯定是因為有老師的指揮的關係吧。"
21110-12 = "我也，這麼覺得……只要有老師在，安心的感覺完全不一樣……"
21110-13 = "話說回來，大家的子彈還夠嗎？"
21110-14 = "電量已經滴答滴答地發出警報了……這就是所謂的「魔力不足」嗎？"
21110-15 = "也許是吧，看來只能再發射一發了……"
21110-16 = "那麼，我們就盡量避開戰鬥吧。"
21110-18 = "這裡是……？"
21110-19 = "啊……"
21110-20 = "愛麗絲，怎麼了嗎？"
21110-21 = "……"
21110-22 = "我也不清楚……但是，感覺是很熟悉的景色。得往這裡走才行。"
21110-24 = "咦？"
21110-26 = "愛麗絲雖然沒有印象……但是彷彿像有「存檔」一樣。"
21110-27 = "身體自動做出了反應。"
21110-30 = "舉例來說的話，對，就像是沒有新手教學也沒有說明也能推進遊戲……#n或者是說，像是在玩已經玩過很多次的遊戲一樣……"
21110-31 = "怎麼回事……？確實，這裡和原本愛麗絲待著的地方很像……"
21110-32 = "啊，那裡有一台電腦……啊咧？"
21110-33 = "那台電腦，電源是開著的……？"
21110-36 = "……"
21110-37 = "（嗶嗶）"
21110-38 = "［歡迎進入Divi:Sion System，請輸入要搜尋的項目］"
21110-39 = "哇，竟然是這麼人性化的設計。來搜尋看看G.Bible吧？"
21110-40 = "不，不覺得這也太奇怪了嗎？比起這個，「歡迎進入」也就是說……#n「Divi:Sion System」就是這個工廠的名稱嗎……？"
21110-41 = "（咻）"
21110-42 = "發現鍵盤……輸入G.Bible。"
21110-43 = "啊，有什麼出現了！"
21110-44 = "……"
21110-45 = "……#$@#$$%#%^*&（#@"
21110-46 = "壞，壞掉了！？愛，愛麗絲，你剛才輸入了什麼！？"
21110-47 = "不，不是，我連Enter鍵都還沒按下去……"
21110-50 = "[56cd7b]你是AL-1S嗎？"
21110-53 = "！？"
21110-54 = "！！"
21110-55 = "？"
21110-56 = "不對，愛麗絲是愛麗絲……"
21110-57 = "等，等等！"
21110-58 = "……有點奇怪。愛麗絲醬，總之先什麼都不要輸入比較……"
21110-60 = "［已通過語音識別確認資格。歡迎回來，AL-1S］"
21110-61 = "！？"
21110-62 = "竟然有語音識別！？"
21110-63 = "那個……AL-1S是指愛麗絲醬嗎？"
21110-64 = "啊，抱歉。這麼說來好像忘記跟柚子醬說了。"
21110-65 = "……"
21110-66 = "愛麗絲的，真正的名字……真正的，我……"
21110-67 = "你了解關於AL-1S的事情嗎？"
21110-68 = "……"
21110-69 = "…………"
21110-70 = "反應好慢……？"
21110-71 = "畫面好像也變得糊糊的，是處理速度不夠嗎？"
21110-72 = "是……@！#%#@！$%@！！！！"
21110-73 = "咦，咦？怎麼了，這是什麼意思！？"
21110-74 = "那是……"
21110-75 = "……"
21110-76 = "發生緊急狀況。"
21110-77 = "已到達電力極限，將於電源關閉時消失。剩下51秒。"
21110-78 = "咦咦！？不，不行啊！至少要告訴我們關於G.Bible的事之後才可以消失啊！"
21110-79 = "你想問的是，G.Bible嗎？　＜YES／NO＞"
21110-80 = "！？"
21110-81 = "YES！"
21110-82 = "G.Bible……已確認，代號：遊戲……人類，理解，來源，圖書登錄編號193，#n廢棄對象數據第1號。剩餘35秒。"
21110-83 = "廢棄！？為什麼！？那可是遊戲開發者，不對是這個世界的寶物啊！"
21110-84 = "如果想要G.Bible的話，提出以下提案。為了進行資料傳輸，請連接儲存設備。"
21110-85 = "咦……？你知道G.Bible在哪裡嗎？"
21110-87 = "[56cd7b]你們也知道的。"
21110-90 = "[56cd7b]就在，你們眼前。"
21110-92 = "什，什麼意思！？"
21110-94 = "正確來說，G.Bible就存在我之中。#n但是我即將消失，希望能保存到新的儲存設備之中。"
21110-95 = "就，就算你這麼說，突然說要儲存設備……#n啊，GameGirlsAdvanceSP的記憶卡可以嗎？"
21110-96 = "……………………也是，可以。"
21110-97 = "怎，怎麼覺得好像狠狠被嫌棄了的樣子……是我的錯覺嗎？"
21110-98 = "數據傳輸線……連接成功！"
21110-99 = "開始傳送……剩餘容量不足，開始刪除原有資料。剩餘9秒。"
21110-100 = "咦，騙人的吧！？難道是在刪除我的遊戲存檔嗎！？喂！？"
21110-101 = "因為容量不足，需要確保足夠空間。"
21110-102 = "不，不行啊！拜託你了別刪除我的存檔啊！要湊齊那些裝備可是很不得了──"
21110-103 = "遺憾，刪除。"
21110-104 = "等等啊啊啊啊啊啊啊啊啊！？"
21110-105 = "……"
21110-107 = "…………"
21110-108 = "咦……電源，被關掉了……？"
21110-109 = "啊啊啊啊！我的GameGirlsAdvance的存檔啊啊啊！！"
21110-111 = "啊，等等！"
21110-112 = "好像出現了什麼畫面……？"
21110-113 = "傳送完畢。"
21110-114 = "咦？"
21110-115 = "已接收到新的數據。"
21110-116 = "＜G.Bible.exe＞"
21110-117 = "這，這就是！？"
21110-118 = "我，我們現在就打開來試試吧！得確認是不是真的才行！"
21110-120 = "執行程式！啊，好像跳出了什麼視窗……"
21110-121 = "什麼？需要密碼！？什麼密碼，要怎麼辦啊！？"
21110-122 = "……沒事的。#n如果是普通的密碼，只要拜託貝里塔斯應該可以解除……！"
21110-123 = "（點頭點頭！）"
21110-124 = "也，也對，只要這樣的話……！"
21110-125 = "只要有了這個，就能做出真正有趣的遊戲……#n能作出《故事．傳說．編年史２》了……！"
21110-126 = "嗯，應該能做出來的！太好了！"
21110-127 = "等著我們吧千年大賞……不，是奇普托斯遊戲大賞！#n這次我們的新作，將要帶給奇普托斯的遊戲界正面的衝擊！"
21110-129 = "姐，姐姐，太大聲了。如果叫得那麼大聲的話……"
21110-134 = "……"
21110-135 = "不就像是在說，我們在這，裡，嗎……"
21110-136 = "哎呀……"
21110-137 = "■■■ ■ ■！ ■■■！"
21110-138 = "怎，怎麼感覺它好像很生氣！？"
21110-140 = "（噠噠噠噠！）"
21110-142 = "嗚啊，朝我們開槍了！快逃吧！"
21110-143 = "姐姐，在那之前……！"
21110-144 = "嗯，要確保GameGirlsAdvance的安全！柚子，你一邊保護老師一邊前進吧！#n我和愛麗絲來負責殿後，大家一起突破這些機器人逃出去吧！"
21110-145 = "我也來掩護大家！"
21110-146 = "好不容易才拿到了G.Bible，可不能在這種地方放棄……！"
21110-147 = "……大家一起平安的回到活動室吧！"
21110-152 = "嗯！"

[translation]
21110-1 = "ตอนที่ 11;ณ ที่แห่งนั้น มีสิ่งนั้นอยู่"
21110-2 = "ด้านในโรงงาน"
21110-7 = "แฮ่ก แฮ่ก... สะ.. สำเร็จใช่ไหม?"
21110-8 = "เข้ามาได้สำเร็จ เคลียร์ภารกิจได้แล้วค่ะ"
21110-9 = "ว้าว! เราก็เก่งกันมากเลยนี่?! แบบนี้ให้ไปสู้กับ C&C หรือเด็กแนวหน้าของโรงเรียนอื่นก็ยังได้!"
21110-10 = "ไม่น่าจะสู้กับ C&C ไหวนะ... แต่การต่อสู้เมื่อกี้มันน่าตกใจมากเลยล่ะ"
21110-11 = "ที่พวกเราทำสำเร็จได้ ต้องเป็นเพราะการสั่งการของคุณครูแน่เลย"
21110-12 = "ฉันเองก็... คิดแบบนั้น... นี่เป็นเพราะ... มีคุณครูอยู่กับพวกเรา..."
21110-13 = "จริงสิ ทุกคนมีกระสุนพอไหม?"
21110-14 = "แบตเตอรี่มัน... กะพริบแล้ว หรือว่า... 'MP กำลังจะหมด?'"
21110-15 = "ของฉันไม่พอ น่าจะสู้ได้อีกแค่รอบเดียวเท่านั้น"
21110-16 = "อืม งั้นเราเลี่ยงการต่อสู้ครั้งหน้าดีกว่า"
21110-18 = "...... ที่นี่มัน ......?"
21110-19 = "อ่า..."
21110-20 = "หืม? อาริสึ? มีอะไรเหรอ?"
21110-21 = "......"
21110-22 = "ไม่รู้เหมือนกันค่ะ แต่ฉันรู้สึกคุ้นๆ ต้องไปทางนี้ค่ะ"
21110-24 = "เอ๋?"
21110-26 = "อาริสึไม่มีความทรงจำเกี่ยวกับที่นี่ค่ะ แต่เหมือนมี 'ข้อมูลที่บันทึกไว้'"
21110-27 = "ร่างกายกำลังตอบสนองอยู่ค่ะ"
21110-30 = "เหมือนกำลังเล่นเกมในแมพที่คุ้นเคยโดยไม่ต้องมีโหมดฝึกสอนหรือคำอธิบายก็ได้"
21110-31 = "คุ้นเคยเหรอ? อืม.. แต่ที่นี่ก็เหมือนที่ที่อาริสึเคยอยู่ก่อนหน้านี้"
21110-32 = "แต่ว่ามีคอมพิวเตอร์อยู่เครื่องหนึ่ง...? เอ๋?"
21110-33 = "คอมพิวเตอร์นั่นมัน... เปิดอยู่เหรอ?"
21110-36 = "......"
21110-37 = "(ติ๊ด)"
21110-38 = "[ขอต้อนรับเข้าสู่ Divi:Sion System กรุณากรอกหัวข้อที่ต้องการความช่วยเหลือ]"
21110-39 = "โอ๊ะ! ใช้งานง่ายกว่าที่คิดแฮะ ลองค้นหาด้วยคำว่า G.Bible ดูดีไหม?"
21110-40 = "เดี๋ยวก่อน... นี่มันน่าสงสัยมากเลยนะ อีกอย่าง Divi:Sion System หมายถึงชื่อโรงงานนี้งั้นเหรอ?"
21110-41 = "(พรึ่บ)"
21110-42 = "เจอคีย์บอร์ดแล้ว... พิมพ์คำว่า G.Bible (แกร๊กๆๆ)"
21110-43 = "อ๊ะ! มีบางอย่างขึ้นมาด้วยล่ะ!"
21110-44 = "......"
21110-45 = "......#$@#$$%#%^*&(#@"
21110-46 = "เอ๋?! เครื่องเสียงั้นเหรอ? อาริสึ! พิมพ์อะไรไปน่ะ?!"
21110-47 = "อ่า... ยังไม่ได้กดปุ่มเอนเทอร์เลย..."
21110-50 = "[56cd7b]คุณคือ AL-1S ใช่หรือไม่?"
21110-53 = "?!"
21110-54 = "!!"
21110-55 = "?"
21110-56 = "ไม่ใช่ค่ะ อาริสึคืออาริสึ..."
21110-57 = "ดะ... เดี๋ยวก่อน!"
21110-58 = "มีอะไรแปลกๆ นะ... อาริสึจัง ฉันว่าตอนนี้อย่าเพิ่งพิมพ์อะไรลงไปก่อนดีกว่า..."
21110-60 = "[ตรวจสอบเสียงและสิทธิ์การเข้าถึง ยินดีต้อนรับคุณ AL-1S]"
21110-61 = "?!"
21110-62 = "แล้วจะให้มีคีย์บอร์ดไว้ทำไมล่ะ!?"
21110-63 = ".....? AL-1S คือชื่อของอาริสึเหรอ?"
21110-64 = "อืม ขอโทษนะยูสึจัง ฉันบอกเธอช้าไปสินะ"
21110-65 = "......"
21110-66 = "ชื่อจริงๆ... ของอาริสึ... ฉันคือ..."
21110-67 = "คุณทราบเกี่ยวกับ AL-1S หรือเปล่าคะ?"
21110-68 = "......"
21110-69 = "..........."
21110-70 = "ทำไมตอบสนอง... ช้าแบบนี้ล่ะ?"
21110-71 = "หน้าจอก็เบลอๆ ด้วย หรือว่าจะเสียขึ้นมาจริงๆ?"
21110-72 = "ถ้า......@!#%#@!$%@!!!!"
21110-73 = "อะ... เอ๊ะ?! หมายความว่าอะไรน่ะ?"
21110-74 = "นั่นคือ..."
21110-75 = "......"
21110-76 = "เกิดสถานการณ์ฉุกเฉิน"
21110-77 = "ตอนนี้พลังทั้งหมดของฉันกำลังจะหมด ฉันจะถูกทำลายเมื่อสูญเสียพลังทั้งหมด#nเหลือเวลาอีก 51 วินาที"
21110-78 = "ว่าไงนะ?! ไม่ได้นะ! เราต้องหา G.Bible!"
21110-79 = "สิ่งที่คุณต้องการคือ G.Bible ใช่หรือไม่? < YES / NO >"
21110-80 = "?!"
21110-81 = "ใช่!"
21110-82 = "เช็ก G.Bible เรียบร้อย รหัส: การเล่นสนุก... มนุษย์ เพื่อความเข้าใจ อ้างอิง เลขทะเบียนห้องสมุด 193#nข้อมูลที่ถูกทิ้งอันดับ 1 เหลือเวลาอีก 35 วินาที"
21110-83 = "ทิ้งเหรอ?! ทำไมล่ะ?! นั่นมันสมบัติของพวกนักพัฒนาเกม ไม่สิ ของโลกใบนี้เลยนะ!"
21110-84 = "หากต้องการ G.Bible ขอเสนอให้เชื่อมต่อกับแหล่งเก็บข้อมูลเพื่อถ่ายโอนข้อมูล"
21110-85 = "อะไรนะ? รู้เหรอว่า G.Bible อยู่ที่ไหน?"
21110-87 = "[56cd7b]พวกคุณเองก็รู้"
21110-90 = "[56cd7b]เพราะกำลังมองมันอยู่ไงล่ะ"
21110-92 = "หา? ว่าไงนะ?!"
21110-94 = "G.Bible อยู่ข้างในฉัน แต่ฉันกำลังจะถูกทำลาย จึงต้องการย้ายไปอยู่ที่แหล่งเก็บข้อมูลอื่น"
21110-95 = "อืม... แหล่งเก็บข้อมูล... ใช้เมมโมรี่การ์ดของ 'เกมเกิร์ลส์ แอดวานซ์ SP' ได้ไหมนะ?"
21110-96 = ".............. ใช้... ได้"
21110-97 = "ทำไมทำเหมือนกับว่าไม่ถูกใจอย่างงั้นแหละ...... หรือฉันคิดไปเอง?"
21110-98 = "ฉันจะลองต่อสายดูนะ ต่อได้แล้ว!"
21110-99 = "เริ่มส่งข้อมูล พื้นที่จัดเก็บข้อมูลไม่เพียงพอ ลบข้อมูลเดิม เหลือเวลาอีก 9 วินาที"
21110-100 = "ว่าไงนะ?! นี่กำลังลบไฟล์ในเกมเกิร์ลส์ แอดวานซ์ของฉันเหรอ!? ทำบ้าอะไรของเธอน่ะ!"
21110-101 = "พื้นที่ไม่พอ กำลังลบ"
21110-102 = "ไม่นะ! เก็บข้อมูลเกมที่บันทึกไว้ให้หน่อยก็ยังดี! ฉันเล่นนานมากเลยนะกว่าจะได้ไอเทมทั้งหมด..."
21110-103 = "เสียใจด้วย ลบแล้ว"
21110-104 = "อ๊าาาาาา ม่ายยยย!!"
21110-105 = "......"
21110-107 = ".............."
21110-108 = "หืม…? เครื่องมัน... ดับไปแล้วเหรอ?"
21110-109 = "อ๊ากกกก! เกมเกิร์ลส์ แอดวานซ์ของช้านนนนน!!"
21110-111 = "ดะ.... เดี๋ยวก่อน!"
21110-112 = "หน้าจอติดอีกครั้งแล้ว.....?"
21110-113 = "โอนย้ายสำเร็จ"
21110-114 = "หืม?"
21110-115 = "ส่งข้อมูลใหม่"
21110-116 = "<G.Bible.exe>"
21110-117 = "ยะ.. อย่าบอกนะว่า?!"
21110-118 = "โอ๊ะ! ฉันจะติดตั้งเดี๋ยวนี้เลย! มาดูกันว่าใช่ของจริงไหม!"
21110-120 = "ติดตั้งไฟล์ .exe! ยะฮู้ว! หน้าต่างป็อปอัปอะไรเนี่ย..."
21110-121 = "อะไรกัน? ต้องใส่รหัสผ่านงั้นเหรอ!? นี่! แกล้งกันรึไงน่ะ!?"
21110-122 = "แต่ว่า... รหัสแบบนี้ พวกเวอริทัสต้องถอดให้ได้แน่!"
21110-123 = "(พยักหน้า)"
21110-124 = "ถ้าอย่างนั้น...!"
21110-125 = "ถ้ามีสิ่งนี้... เราก็จะทำเทลส์ ซาก้า โครนิเคิล 2...."
21110-126 = "ที่ 'สนุก' สุดๆ ได้สำเร็จ! ในที่สุดก็มีวันนี้! ฮ่ะฮ่ะฮ่ะฮ่าา!"
21110-127 = "เราจะได้รางวัลใหญ่จากมิลเลเนียมไพรซ์ ไม่สิ ต้องได้จากคิโวทอสไปเลย!#nผลงานชิ้นใหม่ของพวกเราจะทำให้วงการเกมของคิโวทอสสั่นสะเทือน!!"
21110-129 = "พี่โมโมอิ... ทำไมตะโกนดังขนาดนั้นล่ะ? ขืนส่งเสียงแบบนี้ล่ะก็..."
21110-134 = "......."
21110-135 = "ก็... อาจ... จะ... เจอ... กับ... พวก..."
21110-136 = "หืม?"
21110-137 = "■■■ ■ ■! ■■■!"
21110-138 = "พะ... พวกมันดูโมโหมากเลย!"
21110-140 = "(ปังๆๆๆ!)"
21110-142 = "ว้ากก! พวกมันยิงมาแล้ว! หนีเร็ว!"
21110-143 = "อึ่ก.. พี่โมโมอิ!"
21110-144 = "เข้าใจแล้ว! ได้เกมเกิร์ลส์ แอดวานซ์มาแล้ว! ยูสึ! ปกป้องคุณครูด้วย!#nฉันกับอาริสึจะอยู่สู้กับหุ่นยนต์พวกนี้แล้วหนีออกไป!"
21110-145 = "ฉันจะคุ้มกันให้!"
21110-146 = "จะมาติดกับตรงนี้ไม่ได้หรอก! อุตส่าห์ได้ G.Bible มาแล้วทั้งที!"
21110-147 = "ต้องกลับไป... ที่ห้องชมรมพัฒนาเกมให้ได้!"
21110-152 = "อื้ม!"

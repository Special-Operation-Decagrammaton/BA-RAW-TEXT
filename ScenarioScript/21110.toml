[translation]
21110-1 = "第11話;そこにあったもの"
21110-2 = "工場内部"
21110-7 = "はあ、はあ……何とか成功、かな？"
21110-8 = "進入成功。ミッションをクリアしました。"
21110-9 = "ねえねえ、私たちってもしかして実はすごく強いんじゃない？C&Cとか、他の学校の戦闘集団と戦っても勝てちゃうかも！"
21110-10 = "少なくともC&Cは絶対に無理だと思うけど……確かに、自分でもちょっとびっくり。"
21110-11 = "きっと、先生の指揮のおかげですね。"
21110-12 = "わたしも、そう思う……先生がいると、安心感が全然違う……。"
21110-13 = "ところで、みんな残弾数は尽きてない？"
21110-14 = "バッテリーがチカチカしてます……「マナが足りません」、ということでしょうか？"
21110-15 = "そうかも、あと一回ぐらいしか持たなそう……。"
21110-16 = "じゃあ、出来るだけ戦闘は避けていこっか。"
21110-18 = "ここは……？"
21110-19 = "あ……"
21110-20 = "アリス、どうしたの？"
21110-21 = "……。"
21110-22 = "分かりません……ですが、どこか見慣れた景色です。こちらの方に行かないといけません。"
21110-24 = "えっ？"
21110-26 = "アリスの記憶にはありませんが……まるで「セーブデータ」を持っているみたいです。"
21110-27 = "この身体が、反応しています。"
21110-30 = "例えるなら、そう、チュートリアルや説明が無くても進められるような……或いはまるで、何度もプレイしたことのあるゲームを遊んでいるかのような……。"
21110-31 = "どういうこと……？確かに、元々アリスがいたところと似たような場所だけど……。"
21110-32 = "あっ、あそこにコンピューターが一台……あれ？"
21110-33 = "あのコンピューター、電源が点いてる……？"
21110-36 = "……"
21110-37 = "（ピピッ）"
21110-38 = "［Divi:Sion Systemへ、ようこそお越しくださいました。お探しの項目を入力してください］"
21110-39 = "おっ、まさかの親切設計。G.Bibleについて検索してみよっか？"
21110-40 = "いや、ちょっと怪しすぎない？それより「ようこそお越しくださいました」ってことは……「ディビジョンシステム」っていうのが、この工場の名前……？"
21110-41 = "（スッ）"
21110-42 = "キーボードを発見……G.Bible、と入力してみます。"
21110-43 = "あっ、何か出た！"
21110-44 = "……"
21110-45 = "……#$@#$$%#%^*&（#@"
21110-46 = "こ、壊れた！？アリス、いったい何を入力したの！？"
21110-47 = "い、いえ、まだエンターは押していないはずですが……"
21110-50 = "[56cd7b]あなたはAL-1Sですか？"
21110-53 = "！？"
21110-54 = "！！"
21110-55 = "？"
21110-56 = "いえ、アリスはアリスで……"
21110-57 = "ま、待って！"
21110-58 = "……何かおかしい。アリスちゃん、今はとりあえず入力しない方が……"
21110-60 = "［音声を認識、資格が確認できました。おかえりなさいませ、AL-1S］"
21110-61 = "！？"
21110-62 = "音声認識付き！？"
21110-63 = "えっと……AL-1S、っていうのは、アリスちゃんのことなの？"
21110-64 = "あ、ごめん。そういえばユズちゃんには言ってなかったかも。"
21110-65 = "……。"
21110-66 = "アリスの、本当の名前……本当の、私……。"
21110-67 = "あなたはAL-1Sについて知っているのですか？"
21110-68 = "……"
21110-69 = "…………"
21110-70 = "反応が遅い……？"
21110-71 = "何か画面もぼんやりしてきたけど、処理に詰まってるのかな？"
21110-72 = "そうで……@！#%#@！$%@！！！！ "
21110-73 = "え、え？何これ、どういう意味！？"
21110-74 = "それは……"
21110-75 = "……"
21110-76 = "緊急事態発生。"
21110-77 = "電力限界に達しました、電源が落ちると同時に消失します。残り時間51秒。"
21110-78 = "ええっ！？だ、ダメ！せめてG.Bibleのことを教えてからにして！"
21110-79 = "あなたが求めているのは、G.Bibleですか？　＜YES / NO＞"
21110-80 = "！？"
21110-81 = "YES！"
21110-82 = "G.Bible……確認完了、コード：遊戯……人間、理解、リファレンス、ライブラリ登録ナンバー193、廃棄対象データ第1号。残り時間35秒。"
21110-83 = "廃棄！？どうして！？それはゲーム開発者たちの、いやこの世界の宝物なのに！"
21110-84 = "G.Bibleが欲しいのであれば、提案します。データを転送するための保存媒体を接続してください。"
21110-85 = "えっ……？G.Bibleの在り処を知ってるの？"
21110-87 = "[56cd7b]あなたたちも知っています。"
21110-90 = "[56cd7b]今、目の前に。"
21110-92 = "ど、どういうこと！？"
21110-94 = "正確には、私の中にG.Bibleがあります。しかし現在私は消失寸前、新しい保存媒体への移行を希望します。"
21110-95 = "そ、そうは言っても急に保存媒体なんて……あ、「ゲームガールズアドバンスSP」のメモリーカードでも大丈夫？"
21110-96 = "……………………まあ、可能、ではあります。"
21110-97 = "な、何だかすごく嫌がってる感じがするんだけど……気のせい？"
21110-98 = "データケーブル……連結完了！"
21110-99 = "転送開始……保存領域が不足、既存データを削除します。残り時間9秒。"
21110-100 = "え、嘘っ！？もしかして私のセーブデータ消してない！？ねえ！？"
21110-101 = "容量が不足しているため、確保します。"
21110-102 = "だ、ダメ！お願いだからセーブデータは残して！そこまで装備揃えるのすごく大変だっ――"
21110-103 = "残念、削除。"
21110-104 = "ちょっとおおぉぉぉぉおおお！？"
21110-105 = "……"
21110-107 = "…………"
21110-108 = "あれ……電源、落ちちゃった……？"
21110-109 = "ああぁぁ！私のゲームガールズアドバンスのデータがあぁぁっ！！"
21110-111 = "あ、待って！"
21110-112 = "何かが画面に……？"
21110-113 = "転送完了。"
21110-114 = "え？"
21110-115 = "新しいデータを転送しました。"
21110-116 = "＜G.Bible.exe＞"
21110-117 = "こ、これって！？"
21110-118 = "こ、これ今すぐ実行してみよう！本物なのか確認しなきゃ！"
21110-120 = "exe実行！あ、何かポップアップが出て……"
21110-121 = "って、パスワードが必要！？何それ、どうすればいいのさ！？"
21110-122 = "……大丈夫。普通のパスワードくらいなら、ヴェリタスが解除できるはず……！"
21110-123 = "（こくこく！）"
21110-124 = "そ、そうだね、そうすれば……！"
21110-125 = "これがあれば、本当に面白いゲームが……『テイルズ・サガ・クロニクル２』が……！"
21110-126 = "うん、作れるはず！よしっ！"
21110-127 = "待っててねミレニアムプライス……いや、キヴォトスゲーム大賞！私たちの新作は今度こそ、キヴォトスのゲーム界に良い意味での衝撃を与えてやるんだから！！"
21110-129 = "お、お姉ちゃん、声大きすぎ。そんな大声で叫んだら……"
21110-134 = "……。"
21110-135 = "ここにいるって、言ってるような、も、の……"
21110-136 = "あちゃー……。"
21110-137 = "■■■ ■ ■！ ■■■！"
21110-138 = "な、何だかものすごく怒ってる！？"
21110-140 = "（ダダダダッ！）"
21110-142 = "わぁっ、撃ってきた！早く逃げよう！"
21110-143 = "お姉ちゃん、その前に……！"
21110-144 = "うん、ゲームガールズアドバンス確保！ユズ、先生を守りながら進んで！私とアリスが[ruby=しんがり]殿[/ruby]をつとめるから、全員でロボットを蹴散らしながら脱出しよう！"
21110-145 = "私も援護する！"
21110-146 = "ようやくG.Bibleを手に入れたのに、こんなところでやられるわけにはいかない……！"
21110-147 = "……みんなで無事に、部室まで戻ろう！"
21110-152 = "うん！"

[translation]
10038020-1 = "第2話;面對傳聞的態度"
10038020-7 = "啊，老師。這邊請。"
10038020-8 = "[s]「令女居然會主動找我，真令人開心。」"
10038020-9 = "如果您能這麼想的話，我也感到很高興。"
10038020-10 = "唔嗯……您之前應該也來過幾次桃源鄉吧？#n嗯，不過這裡是桃源鄉最裡面的茶室。"
10038020-11 = "也是我們玄武商會的成員……討論內部事宜時會使用的空間。"
10038020-12 = "[s]「是嗎？難怪總感覺氣氛不太一樣。」"
10038020-13 = "是的。由於這個房間的隔音效果比外表看起來要好得多，#n因此幾乎不必擔心我們的談話會洩漏出去。"
10038020-14 = "您好奇有什麼事需要如此避人耳目？#n這……"
10038020-15 = "……如您所知，目前玄武商會在門主大人的命令之下，所有人員的出入都受到限制。"
10038020-16 = "會長他……由於變成小孩而遭到了隔離。"
10038020-17 = "導致現在必須負責領導玄武商會的……除了我以外沒有其他人選。"
10038020-18 = "是的，這確實讓我備感壓力。#n我的胃現在也還在痛，就連昨晚都沒睡好。"
10038020-19 = "但不幸中的大幸是，目前整個玄武商會幾乎處於癱瘓狀態。"
10038020-20 = "因此實際上跟平時相比，我在管理商會方面的工作量並不算多。"
10038020-21 = "[s]「那聽起來也太不妙了吧！？」"
10038020-22 = "其實就跟您說的一樣。#n我剛才只是想開個玩笑，稍微發洩一下而已。"
10038020-23 = "然而今天之所以邀請您來……是為了告訴您現在山海經坊間流傳的傳聞。"
10038020-24 = "當然，我知道您目前是玄龍門的貴賓。"
10038020-25 = "但我想這些話，您恐怕很難在玄龍門那邊聽見才對。"
10038020-26 = "您接下來要與玄龍門的高層會面對吧？"
10038020-27 = "如果能在那之前告訴您一些有別於玄龍門視角的事，我認為可能會對您有所幫助。"
10038020-28 = "[s]「這讓我有點……不，是很有壓力……」"
10038020-29 = "非常抱歉。#n我也不喜歡用這種形式來表達，但現在畢竟是特殊時期……"
10038020-36 = "現在坊間……正悄悄流傳著關於某個退學生的傳聞。"
10038020-37 = "[s]「那個學生指的是申谷誡嗎？」"
10038020-41 = "嗯？您怎麼會知道這個名字……？"
10038020-44 = "（向令女講述了與妃姬的對話）"
10038020-47 = "原來如此。門主大人是這麼說的啊……"
10038020-48 = "……"
10038020-49 = "沒錯。現在坊間正以三年級學生為中心，祕密流傳著關於申谷誡的傳聞。"
10038020-50 = "以三年級學生為中心是關鍵。#n一二年級的學生不是對此毫不知情，就是只接觸到不準確又誇大的怪談。"
10038020-51 = "接著以這些傳聞為起點，又有更多不祥的話題繼續流傳。"
10038020-52 = "這其中……也包含與上次交流會有關的事。"
10038020-53 = "要我說得更具體一點？#n我明白了，比如……"
10038020-56 = "輝夜部長究竟怎麼了？"
10038020-57 = "雖然表面上說是在反省，但有傳聞說他是因為進諫而被抓走的……"
10038020-60 = "如果申谷誡真的回來了，那麼……"
10038020-61 = "這很可能是門主大人的意思……"
10038020-64 = "一個遭到退學，甚至成為七罪人之一的學生……"
10038020-65 = "不可能無緣無故地回到山海經……"
10038020-67 = "而且當初將申谷誡退學的，不就是門主大人嗎？"
10038020-68 = "會不會其中還有什麼隱情……？"
10038020-71 = "山海經再這樣下去真的沒問題嗎？"
10038020-76 = "玄龍門跟門主大人……真的還值得信任嗎？"
10038020-79 = "光是我粗略整理的內容就有這麼多。"
10038020-80 = "整體而言，三年級學生對玄龍門的不安……正在逐漸增加。"
10038020-81 = "沒錯，我們玄武商會與玄龍門的關係不太好。這是不爭的事實。"
10038020-82 = "不過玄武商會的活動，也需仰賴玄龍門的存在才得以進行……"
10038020-83 = "這點我也心知肚明。#n只是那些苛刻到不可思議的標準，以及小家子氣的干涉……"
10038020-84 = "還動不動就拿什麼違反傳統、有損山海經的尊嚴之類的話來妨礙我們營業……"
10038020-88 = "對不起，話題有點扯遠了。#n果然是月影祭在即的關係嗎，總是會發生一些大大小小的怪事……"
10038020-89 = "[s]「月影祭怎麼了？」"
10038020-93 = "老師對月影祭了解多少呢？"
10038020-95 = "原來如此。#n祈求豐收、分享食物的節日……沒錯，這確實是對月影祭普遍的認識。"
10038020-96 = "……不過月影祭還有一些其他的故事。"
10038020-97 = "比如說會在月影祭前後，從月亮回到下界的仙人……"
10038020-98 = "[s]「仙人？」"
10038020-102 = "仙人指的是普通人通過修行或研究開悟之後……成為的某種特殊存在。"
10038020-103 = "而月影祭也有紀念這些仙人的意思。"
10038020-104 = "傳說仙人會從月亮回到這片土地，巡視下界後再次離開。"
10038020-105 = "而僅僅是仙人來訪，這片土地上就會發生奇怪的事情。"
10038020-106 = "沒錯……有些人甚至可能會認為現在山海經發生的事情，都與月影祭有關。"
10038020-110 = "我嗎？我只把這些當作迷信或傳說。"
10038020-111 = "不過現在事情發展到這種地步，或多或少還是讓人有點在意就是了……"
10038020-113 = "（聽令女講述坊間謠言後，立即前往了玄龍門）"
10038020-120 = "（玄龍門的會議……簡直是一片混亂）"
10038020-121 = "雖然已對玄武商會的進出加以管制，但還童症依然還在擴散……需要採取額外措施！"
10038020-122 = "傳播機制尚未完全掌握，流行病學調查困難重重！"
10038020-123 = "現場人員已經瀕臨極限，必須想出其他對策！"
10038020-128 = "不過至少已經知道了一件事吧？#n即使感染了還童症，三天之後傳染力就會急劇下降！"
10038020-130 = "可是受人力和物理層面的限制……我們無法掌握所有學生的病歷並進行後續管理！"
10038020-131 = "拜託您了，門主大人！#n就這樣舉辦月影祭的話……恐怕……"
10038020-138 = "注意你們的言辭！這可是在門主大人尊前！"
10038020-144 = "無妨。現在是聽取現場意見的時候。"
10038020-145 = "眼下情況如此，即使有些急迫也莫可奈何。"
10038020-146 = "繼續說吧。"
10038020-151 = "是！除此之外……不祥的謠言依舊不斷擴散！#n只靠我們實在難以平息……"
10038020-152 = "如果只是有謠言在流傳倒不成問題，但是……玄龍門的控制力似乎正逐漸減弱……"
10038020-153 = "京劇部的反省和輝夜的行蹤也成為議論的話題……"
10038020-154 = "玄龍門整體的威信已不如以往。#n學生們雖然表面上服從，背地裡卻以白眼相待……"
10038020-156 = "這樣啊……這確實是個問題。#n那麼對於此次事件，汝等有何建議？"
10038020-161 = "……"
10038020-162 = "這……實在有些難以啟齒……"
10038020-164 = "不必有所顧慮，但說無妨。"
10038020-170 = "這次的月影祭，個人認為別開放外部人員參與比較適當。"
10038020-175 = "這……！"
10038020-176 = "我們只是陳述事實，美奈執行部長。#n現在許多山海經的學生，都將這次事件的原因歸咎在外部學生的身上。"
10038020-182 = "……"
10038020-183 = "在這種情況下，如果又因為月影祭而開放更多外部人員進入……#n屆時可能會完全失去對現場的控制。"
10038020-184 = "當，當然也可以照常舉辦慶典，藉此彰顯山海經沒有問題。#n只不過……"
10038020-185 = "……"
10038020-187 = "不能對既存的問題視而不見。"
10038020-188 = "既然如此，應當坦誠承認並制定對策才是。"
10038020-189 = "門主大人……！"
10038020-191 = "那，那個……也就是說……！"
10038020-196 = "認為妾身在妄下結論嗎？"
10038020-201 = "不，不是的。#n我們非常感激您如此細心的考慮。但……"
10038020-203 = "好吧。妾身明白汝等的意思了。"
10038020-207 = "……"
10038020-211 = "聽著──此次的月影祭，將不允許外部學生參加。"
10038020-216 = "門主大人！"
10038020-217 = "門主大人……！"
10038020-219 = "對於玄武商會的管控也維持現狀。#n然對於已過三天的學生，允許其自由通行。"
10038020-225 = "……"
10038020-226 = "雖說對於謠言的應對必須果斷，但同時也要考慮萬一。"
10038020-227 = "即刻加強對山海經內部的警備和巡查。"
10038020-228 = "以上即為玄龍門門主，龍華妃姬的裁決。"
10038020-230 = "遵命，門主大人！"
10038020-231 = "我立即去公佈並加以執行！"
10038020-236 = "這樣沒問題嗎，門主大人……？"
10038020-237 = "現在應當優先考慮現場的意見。"
10038020-238 = "……"
10038020-239 = "去現場視察也不錯。#n準備一下吧，美奈。"
10038020-243 = "……！？不，不行啊門主大人！#n現在情況不太合適！那個……"
10038020-244 = "那是作為近衛美奈的意見，還是作為執行部長的意見？"
10038020-245 = "……！"
10038020-252 = "是作為執行部長的建議……不，是諫言。"
10038020-253 = "希望您能給予我們的成員……以及玄龍門更多的信任……"
10038020-257 = "……是嗎。"
10038020-261 = "明白了。妾身會回到內堂。#n如果有事，務必立即告訴妾身。"
10038020-262 = "是，門主大人。"
10038020-267 = "哈啊啊啊啊啊啊……"
10038020-268 = "[s]「辛苦你了，美奈……」"
10038020-269 = "呵……說辛苦也不至於。#n這只是玄龍門執行部長的日常而已！"
10038020-270 = "[s]「在這種時候也能保持平常心，真的很了不起哦。」"
10038020-274 = "唔，什麼……？"
10038020-275 = "老，老師這麼誇我，我也不會高興的唷？"
10038020-276 = "我只是冷靜而硬派地執行任務而已嘛。"
10038020-284 = "那麼……我也去稍微休息一下。#n絕對不是因為累了才離開哦！"
10038020-285 = "你明白我的意思？#n呵，我果然和老師很合得來啊。那麼我就先失陪了。"
10038020-290 = "啊，對了老師……#n各方面來說，你終究還是外部人士對吧？"
10038020-291 = "你問我想說什麼？#n這個嘛……"
10038020-292 = "暫時還是別太引人注目，稍微低調一點比較好。"
10038020-293 = "比如不要和人長時間通話。"
10038020-294 = "即使門主大人邀請老師偷偷外出，也不要不假思索地跟過去……"
10038020-295 = "[s1]「這麼說也對，畢竟現在的山海經確實不太穩定。」\n[s2]「我會盡量注意的。但如果情況實在迫不得已就麻煩你見諒了。」"
10038020-298 = "唔，嗯……！#n關於這點我也感到很抱歉。"
10038020-299 = "不過終究必須考量到時機和情況等等因素……"
10038020-300 = "你說知道了，要我好好休息？#n我剛才不是說過，絕對不是因為累了才離開……！"
10038020-306 = "為，為什麼要推我！#n老師不必這麼做……我只是……"
10038020-311 = "（房間裡瞬間安靜了下來……）"
10038020-317 = "（本來打算打個電話，不過在想起美奈的話後打消了念頭）"
10038020-321 = "（這麼說來……）"
10038020-323 = "同時除了「還童」以外，目前還沒有觀察到其他症状。#n此外，培育支援部梅花園的學生並未受到影響！報告完畢！"
10038020-326 = "不過至少已經知道了一件事吧？#n即使感染了還童症，三天之後傳染力就會急劇下降！"
10038020-330 = "[ns]「嗯？莫非……？」"
10038020-333 = "（突然想起了一個學生的臉）"
10038020-337 = "（由於美奈剛才的叮囑，決定使用Momotalk）"
10038020-338 = "[ns]「『你好呀，旬。你在做什麼？』」"
10038020-345 = "「哎呀，是老師嗎？呵呵，老師居然會主動發訊息給我」"
10038020-346 = "「感覺今天～會有好事發生哦～」"
10038020-347 = "「我聽說老師來到了山海經，不過稍微有點難過……因為老師居然現在才連絡我！」"
10038020-348 = "[s]「『嗯，抱歉……因為我受到了不少關注』」"
10038020-349 = "「關注……是嗎？這是什麼意思……？」"
10038020-352 = "（向旬解釋了目前的處境，以及玄龍門發生的事情）"
10038020-355 = "「……」"
10038020-356 = "「原來如此。居然發生了這樣的事……」"
10038020-360 = "「呵呵，我想到了一個好主意。請老師稍等一下」"
10038020-361 = "「雖然現在說好像有點晚了，不過老師選擇用Momotalk聯絡我反而是件好事呢」"
10038020-362 = "[s]「『嗯？為什麼這麼說呢？』」"
10038020-366 = "「總之老師很快就會知道了！」"
10038020-371 = "？"
10038020-377 = "你好呀，老師！"
10038020-382 = "[ns]「旬……！不，小旬！？」"
10038020-383 = "呵呵，沒錯。是老師的小旬哦！"
10038020-384 = "好奇我是怎麼進來的？#n即使是玄龍門，也不會特別限制梅花園的學生出入的哦！"
10038020-385 = "啊，請不要露出那種「小旬其實不是梅花園的學生吧？」的眼神！#n能利用的優勢都要好好利用嘛！"
10038020-386 = "為什麼又變成小孩的身體？那是因為……"
10038020-387 = "我也感染了還童症……"
10038020-388 = "啊，不用擔心！#n心菜醬他還沒有發現，其他梅花園的學生也沒有產生懷疑。"
10038020-395 = "話說小孩子的身體果然很好～#n肩膀不痠，胸口不重，身體又輕！"
10038020-399 = "啊，現在不是說這些的時候了吧！#n既然都已經變成這樣了，就來幫助門主大人吧！"
10038020-400 = "問我打算怎麼做？#n呵呵……那就是……"
10038020-403 = "真的是……旬教官嗎？"
10038020-404 = "是的，門主大人！您已經確認過了吧？"
10038020-405 = "是啊，確實如此……但還是令人難以置信。"
10038020-406 = "況且……怎麼說呢，性格似乎與三年級時有些出入……"
10038020-410 = "我，我不明白您的意思！？我就是我呀……？"
10038020-411 = "也罷，就當作是這樣吧。#n如此一來……妾身與旬教官之間的祕密又多了一個呢。"
10038020-412 = "似乎是呢。#n您不必太有壓力哦，門主大人。我也是這麼告訴自己的。"
10038020-413 = "妾身明白。#n那麼換個話題吧……"
10038020-417 = "妾身十分感激汝願意出手相助，不過汝打算怎麼做呢？"
10038020-419 = "那就是……"
10038020-426 = "[ns]「哦？這是……梅花園的制服？」"
10038020-427 = "沒錯！雖然只是推薦而沒有強制規定，所以不是所有學生都穿著……"
10038020-428 = "不過只要穿上這個，在山海經內就會被認為是梅花園的學生！"
10038020-429 = "這點妾身也明白，然那又如何呢？"
10038020-430 = "怎麼說呢……"
10038020-435 = "這種事對您而言──應該再「熟悉」不過了吧，門主大人？"
10038020-439 = "……呵呵。"
10038020-440 = "原來如此。梅花園的學生不受還童症影響。"
10038020-441 = "若變裝為梅花園的學生明查暗訪，任何人都不會起疑才是。"
10038020-442 = "我剛才什麼都沒說唷！"
10038020-443 = "汝還是老樣子啊。#n果然決定一個人的，是其內在的本質。"
10038020-455 = "嗯，感覺不錯。"
10038020-456 = "哇！果然很適合您！"
10038020-457 = "[s]「呃……嗯……啊……」"
10038020-461 = "怎麼了，老師？汝覺得哪裡不對勁嗎？"
10038020-462 = "[s]「完全沒有，我反而覺得適合過頭了……」"
10038020-463 = "呵呵，是嗎。#n不過這還不足以稱之為完美的變裝。"
10038020-464 = "還缺少什麼？#n缺少至關重要，堪稱不可或缺的部分。"
10038020-465 = "……"
10038020-471 = "你好呀，老師！我的名字叫做妃妃！#n我們現在要出發參觀山海經嗎？"
10038020-473 = "……！"
10038020-474 = "沒錯唷，妃妃醬！現在我們要和擔任梅花園臨時領隊的老師，一起去參觀山海經！"
10038020-475 = "哇──！"
10038020-476 = "哇──！"

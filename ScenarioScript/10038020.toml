[translation]
10038020-1 = "Episode 2;How to Deal with Rumors"
10038020-7 = "Ah, Sensei. Over here."
10038020-8 = "[s] \"I'm glad you called for me, Reijo.\""
10038020-9 = "I'm happy to hear you say that. "
10038020-10 = "Hmm... You've been here to the Peach Blossom Spring a few times before, right? But not in this teahouse, right in the heart of it."
10038020-11 = "This is where members discuss...matters pertaining to the Black Tortoise Promenade."
10038020-12 = "[s] \"No wonder the atmosphere feels a bit different.\""
10038020-13 = "Yes, this room is soundproofed, so our conversations can't leak out."
10038020-14 = "What's so secret, you ask? Well..."
10038020-15 = "...As you know, access to the Black Tortoise Promenade is currently restricted."
10038020-16 = "On top of that, its president has...turned into a child, and is under quarantine."
10038020-17 = "So the responsibility for the Black Tortoise Promenade falls on me..."
10038020-18 = "It's quite a burden. In fact, it's giving me stomachaches, and I'm losing sleep."
10038020-19 = "If there is a silver lining, it's that the entire Black Tortoise Promenade is essentially shut down right now."
10038020-20 = "So there isn't much to manage."
10038020-21 = "[s] \"Sounds like that barely qualifies as a silver lining.\""
10038020-22 = "It doesn't, really. I just wanted to make light of a bad situation."
10038020-23 = "In any case, the reason I asked to see you, Sensei, is so I could...share a rumor that's been circulating here in Shanhaijing."
10038020-24 = "I understand, of course, that you're here as a guest of Genryumon but..."
10038020-25 = "...I wasn't sure they'd share this with you."
10038020-26 = "You've been speaking with them, yes? "
10038020-27 = "Whatever they've decided to tell you, I thought you should hear it from a different perspective."
10038020-28 = "[s] \"This sounds pretty serious...\""
10038020-29 = "I'm sorry. I don't mean to be dramatic, but given the situation..."
10038020-36 = "There are...whispers, about a certain expelled student."
10038020-37 = "[s] \"Shintani Kai?\""
10038020-41 = "Oh? How do you know that name...?"
10038020-44 = "I told Reijo about the conversation I had with Kisaki."
10038020-47 = "I see. So the President..."
10038020-48 = "......"
10038020-49 = "Yes, rumblings about Shintani Kai has been spreading in the streets, mostly among the third-year students."
10038020-50 = "Emphasis on \"among the third-year students.\" The first and second-year students don't know much about her, or else they think it's all exaggerated."
10038020-51 = "And building off of that, there've been other, more ominous rumors."
10038020-52 = "Including...some related to that exchange meeting."
10038020-53 = "You want me to be more specific? All right. So..."
10038020-56 = "I wonder what happened to Kaguya."
10038020-57 = "They say she went away to self-reflect, but I also heard that she was taken away for being too frank..."
10038020-60 = "If Shintani Kai really is back..."
10038020-61 = "...the president might have been involved."
10038020-64 = "She was expelled, and she's one of the Seven Prisoners."
10038020-65 = "There's no way she could have come back to Shanhaijing without any conditions..."
10038020-67 = "But wasn't it the president who expelled Shintani Kai in the first place?"
10038020-68 = "There might be something to that..."
10038020-71 = "Is Shanhaijing going to be okay?"
10038020-76 = "Can we trust Genryumon? And the president...?"
10038020-79 = "That's what I've gathered so far."
10038020-80 = "To summarize, the upperclassmen have been increasingly...anxious about Genryumon."
10038020-81 = "Of course, the Black Tortoise Promenade and Genryumon don't have the best relationship. That's an undeniable fact."
10038020-82 = "Still, the Promenade's commercial activities are only possible because Genryumon exists..."
10038020-83 = "I'm aware. But all the codes and standards, the petty interference..."
10038020-84 = "...the constant complaints about \"violating traditions\" or \"disregarding the pride of Shanhaijing\"... It gets to be too much."
10038020-88 = "I'm sorry, that was a tangent. Things are bound to escalate as the Moonlight Festival gets closer..."
10038020-89 = "[s] \"What's the Moonlight Festival have to do with it?\""
10038020-93 = "How much do you know about the Festival, Sensei?"
10038020-95 = "...I see. A season to pray for prosperity and share food with one another... Yes, that's how most people see it."
10038020-96 = "But there are other aspects, things less talked about."
10038020-97 = "For instance, the story of the sage who departed for the moon, and came back around the date of the Festival..."
10038020-98 = "[s] \"A sage?\""
10038020-102 = "As in someone who, through repeated practice or study, attained enlightenment and became...someone special."
10038020-103 = "Part of the Moonlight Festival's purpose is to honor that sage."
10038020-104 = "Legend has it the sage still visits our world, from the moon, and surveys the land before they leave again."
10038020-105 = "And the sage's visits supposedly cause strange incidents."
10038020-106 = "Yes, some do believe that what's happening in Shanhaijing right now is all because of that."
10038020-110 = "Me? I usually just think of it as superstition or folklore, but..."
10038020-111 = "...with the situation as it is, it does give me pause."
10038020-113 = "After hearing from Reijo about the circulating rumors, I headed to Genryumon."
10038020-120 = "The Genryumon meeting...was complete chaos."
10038020-121 = "We've restricted access to the Black Tortoise Promenade Street, but Tyke Syndrome is still spreading. We need to take additional measures!"
10038020-122 = "We're having trouble with the epidemiological study. We don't know how it spreads yet!"
10038020-123 = "The personnel on the scene can only do so much. We need a broader plan!"
10038020-128 = "Well, we have found out one thing. Patients with Tyke Syndrome become much less contagious after the first three days."
10038020-130 = "But we can't track the symptom history of every student, and provide for their care. We don't have the manpower to do that!"
10038020-131 = "Please, Madam! Holding the Moonlight Festival now might not be..."
10038020-138 = "Watch your mouth! Remember who you're talking to!"
10038020-144 = "No, it's okay. Now is the time to hear everyone out. "
10038020-145 = "Given the circumstances, the urgency everyone is feeling is more than understandable."
10038020-146 = "Please, continue."
10038020-151 = "Right, well, on top of all that...it's not just the disease that's spreading, it's the rumors. They just won't settle down."
10038020-152 = "I wouldn't worry about that, except...those rumors are convincing people that Genryumon is losing its grip."
10038020-153 = "People are also gossiping about the Peking Opera Club being in isolation, and about the whereabouts of Kaguya..."
10038020-154 = "Genryumon's authority looks like it's weakening all over. People pretend to follow orders when they're being watched, but as soon as they're out of sight..."
10038020-156 = "Is that right...? That is certainly a problem. How do you suggest we proceed?"
10038020-161 = "......"
10038020-162 = "...This is going to be hard to say, but..."
10038020-164 = "It's okay. Please, speak freely."
10038020-170 = "We want to keep outsiders away from the Moonlight Festival."
10038020-175 = "That's...!"
10038020-176 = "That's just how it is, Officer Mina. A lot of our students believe the outsiders are responsible for the whole mess."
10038020-182 = "......"
10038020-183 = "If MORE outsiders were to come for the Festival...we could lose all control at the scene."
10038020-184 = "O-Of course, we COULD just hold the festival as usual, and just act like there aren't any problems, but..."
10038020-185 = "......"
10038020-187 = "...but the cat is already out of the bag, so to speak."
10038020-188 = "We won't solve this problem by ignoring it. We do need a plan."
10038020-189 = "Madam President...!"
10038020-191 = "W-Well... That's..."
10038020-196 = "Were you going to say something else?"
10038020-201 = "No, that was it. We're glad you understand. But..."
10038020-203 = "I do understand. I know exactly what you mean."
10038020-207 = "......"
10038020-211 = "For this year's Moonlight Festival, outside students' access is hereby restricted."
10038020-216 = "Madam!"
10038020-217 = "Madam...!"
10038020-219 = "Black Tortoise Promenade Street will stay in lockdown. However, no student will be held in quarantine for longer than three days."
10038020-225 = "......"
10038020-226 = "As for the rumors, we need to deal firmly with misinformation, but some of those rumors could be true, to an extent."
10038020-227 = "From this moment on, security and searches within Shanhaijing will be strengthened."
10038020-228 = "Those are official orders from Ryuuge Kisaki, President of Genryumon."
10038020-230 = "Yes, Madam!"
10038020-231 = "We will announce and implement your orders right away!"
10038020-236 = "Are you sure, Madam President...?"
10038020-237 = "Yes. What's important right now is to listen to those voices from the scene."
10038020-238 = "......"
10038020-239 = "I should inspect the site as well. Mina, make preparations."
10038020-243 = "Hm?! No-no, I don't think that's a good idea, Madam President...!"
10038020-244 = "Is that your personal opinion as Konoe Mina, or as the Executive Officer?"
10038020-245 = "*gasp*"
10038020-252 = "I am speaking as... I am IMPLORING you as the Executive Officer."
10038020-253 = "Please put your faith in us, and Genryumon, a little longer..."
10038020-257 = "...All right."
10038020-261 = "Very well, I will return to my office. Please inform me of any new developments without delay."
10038020-262 = "Yes, Madam President."
10038020-267 = "WAAAH..."
10038020-268 = "[s] \"You did good, Mina...\""
10038020-269 = "Heh... All in a day's work for the Executive Officer of Genryumon!"
10038020-270 = "[s] \"Still quite impressive, under the circumstances.\" "
10038020-274 = "Oh yeah...?"
10038020-275 = "Well, S-Sensei, your praise isn't what I'm after. "
10038020-276 = "I'm here to carry out my duties. In a cool-headed, hard-boiled way."
10038020-284 = "I'm going to be...back in my room for a bit. But it's not because I'm tired and need a break, or anything like that!"
10038020-285 = "Of course not, you say? Heh, you really get me. Well then, if you'll excuse me for a bit..."
10038020-290 = "Come to think of it, Sensei...you're an outsider too. So that means..."
10038020-291 = "Where am I going with this? Well..."
10038020-292 = "You should be discreet, and stay out of sight for a bit. "
10038020-293 = "For example, you wouldn't want to talk with someone for longer than you need to, or..."
10038020-294 = "...recklessly go along with the president's suggestion to go out there ourselves."
10038020-295 = "[s1] \"Makes sense, with things being so unstable.\"\n[s2] \"I'll try to lay low, but that might be impossible...\""
10038020-298 = "Oof...I feel bad asking you to do that. "
10038020-299 = "Still, we can't just ignore the circumstances here."
10038020-300 = "You get that, and you think I should go rest? Didn't I already tell you?! I don't need \"rest.\" I'm not tired..."
10038020-306 = "W-Why are you trying to shoo me away?! Sensei, you really don't have to... I just..."
10038020-311 = "The club room grew quiet all of a sudden."
10038020-317 = "I considered calling someone, but remembered what Mina said. So I decided to restrain myself."
10038020-321 = "Come to think of it..."
10038020-323 = "So far, no one's observed any symptoms other than the \"aging reversal.\" Also, the students of the Disciplinary Support Department—the Plum Blossom Garden—have not been affected."
10038020-326 = "Well, we have found out one thing. Patients with Tyke Syndrome become much less contagious after the first three days."
10038020-330 = "[ns] \"Hmm, does that mean...?\""
10038020-333 = "Suddenly, the face of a student came to my mind."
10038020-337 = "Remembering Mina's request to refrain from unnecessary conversations, I decided to use MomoTalk."
10038020-338 = "[ns] \"Hi Shun, what are you up to?\""
10038020-345 = "Oh, Sensei? What a surprise to get a MomoTalk message from you."
10038020-346 = "I bet it's a good omen!"
10038020-347 = "I heard you're in Shanhaijing at the moment. Still, you waited all this time to talk to me!"
10038020-348 = "[s] \"Yeah, I'm sorry about that... I've had to be careful since I got here.\""
10038020-349 = "Careful? About what?"
10038020-352 = "I brought Shun up to speed."
10038020-355 = "..."
10038020-356 = "I see. That...sounds like a lot."
10038020-360 = "Heehee, I have an idea, though. Can you give me a minute?"
10038020-361 = "You know, it's lucky you messaged me."
10038020-362 = "[s] \"Huh? What do you mean?\""
10038020-366 = "Oh, you'll find out."
10038020-371 = "Hmm?"
10038020-377 = "Hi, Sensei!"
10038020-382 = "[ns] \"Shu...! I mean, Shunling!\""
10038020-383 = "Hehehe. That's right, Sensei! It's your Shunling!"
10038020-384 = "How did I get in? Even Genryumon step aside for Plum Blossom Garden students!"
10038020-385 = "Your look says, \"but you're not a Plum Blossom Garden student,\" but don't worry about that! When you see an opening, take it!"
10038020-386 = "How did I turn into a child? Well, um..."
10038020-387 = "I caught Tyke Syndrome."
10038020-388 = "But don't worry. Kokona hasn't caught me yet, and the other Plum Blossom Garden students don't suspect anything."
10038020-395 = "Besides, it feels nice to be a child. My shoulders aren't stiff anymore, my chest isn't heavy — in fact, my whole body feels so much lighter!"
10038020-399 = "Wait, there's no time for this. I'm here to help the President!"
10038020-400 = "How, exactly? Heehee... Well..."
10038020-403 = "Are you truly Instructor Shun?"
10038020-404 = "Yes I am, Madam President! You already had me go through the verification process!"
10038020-405 = "Yes, I certainly did... Still, it's hard to believe."
10038020-406 = "How should I say this...? Your personality is QUITE different from the third-year student we know."
10038020-410 = "I-I don't know what you mean! I'm just...myself."
10038020-411 = "Well, we can put that aside. One might say you and I have another secret to share now."
10038020-412 = "Oh, how very true. But don't feel too burdened by it. I know I won't."
10038020-413 = "Indeed. On a separate topic..."
10038020-417 = "I appreciate you offering to help. What are you planning, exactly?"
10038020-419 = "Well..."
10038020-426 = "[ns] \"Huh? Is that a Plum Blossom Garden uniform?\""
10038020-427 = "That's right! Well, it's the recommended uniform. Not all students wear it..."
10038020-428 = "But if YOU do, you can pass for a Plum Blossom Garden student yourself!"
10038020-429 = "To what end?"
10038020-430 = "Oh..."
10038020-435 = "I think you'll figure it out."
10038020-439 = "...Fufu..."
10038020-440 = "I see. Since Plum Blossom Garden students aren't affected by Tyke Syndrome..."
10038020-441 = "...if I look like one of them, I can investigate the scene without anyone suspecting anything."
10038020-442 = "You said it, not me!"
10038020-443 = "So that IS still you in there. Big or small, you're the same on the inside."
10038020-455 = "Hmm. Well, this is certainly a look."
10038020-456 = "Wow! I knew you'd look great!"
10038020-457 = "[s] \"Umm... Hmm... Ah.... Hmm....\""
10038020-461 = "What's wrong, Sensei? Do you think this looks awkward?"
10038020-462 = "[s] \"Not awkward. Actually, it's the complete opposite...\""
10038020-463 = "Fufu, is that so? But I'm not finished. This isn't a perfect disguise just yet."
10038020-464 = "What's left, you ask? Something important. Something very, very important."
10038020-465 = "......"
10038020-471 = "Hi, Sensei! My name's Kiki! Will we be touring around Shanhaijing now?"
10038020-473 = "*gasp*"
10038020-474 = "Yes, Kiki! We'll go tour Shanhaijing with Sensei, who's our temporary chaperone for Plum Blossom Garden!"
10038020-475 = "Wow!"
10038020-476 = "Wahoo!"
10038020-481 = "[ns] Pass out."
10038020-486 = "Oh, Sensei's fainted from shock."
10038020-487 = "Hmm... Was it too drastic of a personality change...?"
10038020-492 = "But today's Kiki is the real Kiki!"
10038020-494 = "Absolutely! Come on, Sensei, get up! The children are the future of Shanhaijing!"
10038020-496 = "And so, with...Kiki? And Shunling..."
10038020-497 = "...while I tried valiantly to hold onto my sanity and not break down from the cognitive dissonance..."
10038020-500 = "...the tour of Shanhaijing began!"

[translation]
10038020-1 = "ตอนที่ 2;รับมือกับข่าวลือ"
10038020-7 = "อ๊ะ คุณครู ทางนี้ค่ะ"
10038020-8 = "[s] \"ดีใจจังเลยนะที่เรย์โจวให้ครูมาหา\""
10038020-9 = "ขอบคุณนะคะที่คิดอย่างนั้น "
10038020-10 = "อืม... คุณครูคงเคยมาที่ร้านนิทานดอกท้อแล้วใช่มั้ยคะ? แต่ที่นี่คือห้องชาที่อยู่ด้านในสุดของร้าน#nนิทานดอกท้ออีกทีค่ะ"
10038020-11 = "สมาชิกย่านการค้าเทพเต่าดำก็มักจะมาคุยเรื่องงานกันที่นี่น่ะค่ะ..."
10038020-12 = "[s] \"งั้นเหรอ? ครูว่าที่นี่ให้ความรู้สึกที่แปลกออกไปนะ\""
10038020-13 = "ค่ะ ห้องนี้เป็นห้องที่เก็บเสียงได้ค่อนข้างดี ก็เลยไม่ต้องกังวลว่าเรื่องที่พวกเราคุยกันจะรั่วไหลออกไป#nข้างนอกค่ะ"
10038020-14 = "สงสัยว่าฉันอยากพูดคุยอย่างใกล้ชิดกับคุณครูขนาดนั้นหรือเปล่าน่ะเหรอคะ? คือว่า..."
10038020-15 = "อย่างที่คุณครูรู้ว่า... ตอนนี้ทั่วทั้งย่านการค้าเทพเต่าดำถูกจำกัดการเข้าออกตามคำสั่งของท่านประมุข#nอยู่ค่ะ"
10038020-16 = "ส่วนท่านประธานของพวกเราก็... กลายเป็นเด็ก และถูกกักตัวอยู่ต่างหาก"
10038020-17 = "ดังนั้นคนที่ต้องเป็นผู้นำย่านการค้าเทพเต่าดำในตอนนี้... ก็คือฉันค่ะ"
10038020-18 = "ค่ะ ฉันหนักใจน่ะค่ะ รู้สึกเหมือนจะเครียดจนลงกระเพาะเลย เมื่อคืนก็นอนไม่ค่อยหลับด้วยค่ะ"
10038020-19 = "แต่ในความโชคร้ายก็ยังโชคดีตรงที่ตอนนี้ย่านการค้าเทพเต่าดำเหมือนเป็นอัมพาตไปหมด"
10038020-20 = "ฉันก็เลยไม่ต้องเหน็ดเหนื่อยมากในการจัดการย่านการค้าค่ะ"
10038020-21 = "[s] \"นั่นมันเรื่องไม่ดีไม่ใช่เหรอ?!\""
10038020-22 = "ตอบตามตรงคือใช่ค่ะ ฉันแค่อยากลองพูดล้อเล่นกับเรื่องที่น่าเครียดดูน่ะค่ะ"
10038020-23 = "เหตุผลที่ฉันขอให้คุณครูมาหาในวันนี้ ก็เพราะอยากบอกคุณครูเกี่ยวกับ... ข่าวลือที่แพร่กระจายอยู่ใน#nซานไห่จิงในตอนนี้ค่ะ"
10038020-24 = "ฉันรู้ดีค่ะว่าตอนนี้คุณครูมาที่นี่ในฐานะแขกของมังกรดำ"
10038020-25 = "แต่นี่ดูเหมือนจะเป็นเรื่องที่ยากจะได้ยินจากฝั่งมังกรดำน่ะค่ะ"
10038020-26 = "เสร็จจากตรงนี้แล้วคุณครูต้องไปพบกับพวกผู้บริหารของมังกรดำใช่มั้ยคะ? "
10038020-27 = "ฉันอยากให้คุณครูได้ฟังเรื่องราวจากมุมมองของคนอื่นที่ไม่ใช่มังกรดำก่อนน่ะค่ะ"
10038020-28 = "[s] \"รู้สึกหนักใจนิดหน่อย... ไม่สิ หนักใจมากเลยแฮะ...\""
10038020-29 = "ต้องขอโทษด้วยค่ะ ฉันรู้ดีว่าฉันไม่ควรพูดแบบนั้น แต่ในเมื่อสถานการณ์เป็นแบบนี้ ฉันก็จำเป็นต้องทำค่ะ"
10038020-36 = "ตอนนี้มีข่าวลืออย่างลับๆ เกี่ยวกับ... นักเรียนคนหนึ่งที่ถูกไล่ออกไปค่ะ"
10038020-37 = "[s] \"หมายถึงเด็กที่ชื่อชินทานิ ไคหรือเปล่า?\""
10038020-41 = "คะ? คุณครูรู้ชื่อของเธอได้ยังไง...?"
10038020-44 = "(เล่าเรื่องที่คุยกับคิซากิให้เรย์โจวฟัง)"
10038020-47 = "อย่างนั้นสินะคะ ท่านประมุขก็..."
10038020-48 = "..."
10038020-49 = "ใช่แล้วค่ะ ตอนนี้ในโรงเรียนของเรามีการแอบพูดถึงชินทานิ ไคอยู่ค่ะ ส่วนใหญ่จะเป็นนักเรียนชั้นปีที่ 3 น่ะค่ะ"
10038020-50 = "ประเด็นสำคัญคือนักเรียนปี 3 นี่ละค่ะ เพราะนักเรียนปี 1 กับปี 2 จะไม่รู้เรื่องนี้เลย บางคนก็ถึงกับ#nไม่ยอมรับและคิดว่านั่นเป็นแค่ตำนานเมืองเท่านั้นค่ะ"
10038020-51 = "แต่ข่าวลือที่ว่าก็ทำให้เกิดการพูดคุยในเรื่องที่น่ากังวลอื่นๆ มากมายค่ะ"
10038020-52 = "อย่างเช่น... เรื่องเกี่ยวกับงานแลกเปลี่ยนที่ผ่านมาค่ะ"
10038020-53 = "ให้ฉันเล่าให้ละเอียดว่านักเรียนที่นี่พูดคุยอะไรกันงั้นเหรอคะ? ก็อย่างเช่น..."
10038020-56 = "เกิดอะไรขึ้นกับหัวหน้าคางุยะน่ะ?"
10038020-57 = "ได้ยินมาว่ากำลังสำนึกผิดอยู่ แต่ก็โดนจับตัวไประหว่างที่พยายามพูดตักเตือนท่านประมุขด้วยนะ..."
10038020-60 = "ถ้าชินทานิ ไคกลับมาจริงๆ ละก็..."
10038020-61 = "นั่นอาจเป็นการแทรกแซงเจตจำนงของท่านประมุขก็ได้..."
10038020-64 = "นักเรียนที่โดนไล่ออก และเป็นถึงเจ็ดอาชญากร"
10038020-65 = "ไม่มีทางกลับมายังซานไห่จิงอย่างไร้เงื่อนไขหรอก..."
10038020-67 = "แต่ในความเป็นจริงแล้ว คนที่ไล่ชินทานิ ไคออกก็คือท่านประมุขไม่ใช่หรือไง?"
10038020-68 = "บางทีนั่นอาจจะมีส่วนเกี่ยวข้องกันก็ได้นะ...?"
10038020-71 = "เทศกาลเงาจันทร์ปีนี้จะเป็นยังไงนะ?"
10038020-76 = "เรายังเชื่อใจมังกรดำได้หรือเปล่า? แล้วท่านประมุข..."
10038020-79 = "ถ้าให้ฉันสรุปไวๆ ก็ได้ประมาณนี้ค่ะ"
10038020-80 = "โดยสรุปก็คือ นักเรียนชั้นปีสูงๆ เกิดความวิตกกังวลเกี่ยวกับมังกรดำ... และความวิตกกังวลนั้นก็ค่อยๆ ขยายตัวอยู่ค่ะ"
10038020-81 = "ใช่แล้วค่ะ แน่นอนว่าย่านการค้าเทพเต่าดำกับมังกรดำนั้นไม่ค่อยลงรอยกันเท่าไร นั่นเป็นความจริงที่#nช่วยไม่ได้ค่ะ"
10038020-82 = "ถึงอย่างนั้น... การที่ย่านการค้าเทพเต่าดำของเราดำเนินกิจการได้ ส่วนหนึ่งก็เป็นเพราะการมีอยู่ของ#nมังกรดำค่ะ..."
10038020-83 = "ฉันเองก็รู้ข้อเท็จจริงนั้นดีค่ะ แต่พวกนั้นน่ะมีมาตรฐานที่เข้มงวดอย่างน่าเหลือเชื่อ แล้วก็มาแทรกแซง#nกันเหมือนคนใจแคบไปหน่อย"
10038020-84 = "ไหนจะบอกว่าเราทำเรื่องที่ขัดแย้งกับประเพณีบ้างละ เราไม่เคารพในความเป็นซานไห่จิงบ้างละ เอาแต่ขัดขวางกิจการของพวกเราอยู่เรื่อยเลย...!"
10038020-88 = "ต้องขอโทษด้วยค่ะ ฉันเผลอใส่อารมณ์แล้วพาออกทะเลไปหน่อยสินะคะ อีกไม่นานก็ใกล้จะถึง#nเทศกาลเงาจันทร์แล้ว เมื่อถึงตอนนั้น ก็อาจจะเกิดเรื่องแปลกๆ ขึ้นก็ได้ค่ะ..."
10038020-89 = "[s] \"มีอะไรกับเทศกาลเงาจันทร์เหรอ?\""
10038020-93 = "คุณครูรู้เกี่ยวกับเทศกาลเงาจันทร์มั้ยคะ?"
10038020-95 = "นั่นสินะคะ เทศกาลแห่งการอธิษฐานขอความอุดมสมบูรณ์และแบ่งปันอาหาร... ใช่แล้วค่ะ นั่นคือสิ่งที่#nผู้คนรับรู้กันเกี่ยวกับเทศกาลเงาจันทร์ค่ะ"
10038020-96 = "แต่ความจริงแล้ว... เทศกาลเงาจันทร์ก็ยังมีแง่มุมที่แตกต่างออกไปด้วยค่ะ"
10038020-97 = "นั่นคือเรื่องของเทพเจ้าที่ลงมายังโลกมนุษย์ในช่วงที่มีการจัดเทศกาลเงาจันทร์ค่ะ..."
10038020-98 = "[s] \"เทพเจ้าเหรอ?\""
10038020-102 = "ท่านคือผู้วิเศษ... ที่บรรลุการศึกษาหรือการฝึกฝนของคนธรรมดาซ้ำแล้วซ้ำเล่าจนเกิดการหยั่งรู้ค่ะ"
10038020-103 = "เทศกาลเงาจันทร์เป็นเทศกาลที่เราสรรเสริญเทพเจ้าองค์นั้นด้วยค่ะ"
10038020-104 = "เชื่อกันว่าเทพเจ้าที่จากไปยังดวงจันทร์จะกลับมาเยือนโลกมนุษย์เพื่อดูความเป็นอยู่ของผู้คน แล้วค่อยกลับไปอีกครั้งค่ะ"
10038020-105 = "แต่ก็ว่ากันว่าการที่เทพเจ้าองค์นั้นมาเยือนที่นี่ จึงทำให้เกิดเรื่องแปลกๆ ขึ้นมากมายค่ะ"
10038020-106 = "ค่ะ... ใช่แล้วค่ะ มีหลายคนที่เชื่อว่าเรื่องต่างๆ ที่เกิดขึ้นในซานไห่จิงตอนนี้อาจจะมีส่วนเกี่ยวข้องกับ#nเทศกาลเงาจันทร์ค่ะ"
10038020-110 = "ส่วนฉันเหรอคะ? ฉันคิดว่านั่นเป็นเพียงความเชื่อหรือเรื่องเล่าที่พูดสืบต่อกันมาเท่านั้นค่ะ"
10038020-111 = "แต่ในเมื่อสถานการณ์เป็นแบบนี้ มันก็ออกจะกวนใจฉันอยู่หน่อยค่ะ..."
10038020-113 = "(เมื่อฟังเรื่องข่าวลือในซานไห่จิงจากเรย์โจวจบ คุณครูก็มุ่งหน้าไปยังมังกรดำทันที)"
10038020-120 = "(การประชุมที่มังกรดำเต็มไปด้วยความสับสนวุ่นวาย...)"
10038020-121 = "แม้จะมีการจำกัดการเข้าออกในย่านการค้าเทพเต่าดำแล้ว แต่โรคเด็กลงก็ยังระบาดไม่หยุดเลยค่ะ... เราต้องมีมาตรการเพิ่มเติมค่ะ!"
10038020-122 = "ตอนนี้เรายังไม่รู้กลไกของการระบาดนี้เลยค่ะ การสอบสวนทางระบาดวิทยาก็เป็นเรื่องยากค่ะ!"
10038020-123 = "ส่วนเจ้าหน้าที่ที่ออกไปทำงานภาคสนามก็เหนื่อยล้าไปตามๆ กันด้วย ตอนนี้เราต้องดำเนินการอะไร#nสักอย่างค่ะ!"
10038020-128 = "แต่เราก็รู้บางอย่างแล้วไม่ใช่เหรอ? ที่บอกว่านักเรียนที่เป็นโรคเด็กลงจะแพร่เชื้อได้น้อยลงเป็นอย่าง#nมากหลังจากติดเชื้อไปแล้ว 3 วันน่ะ!"
10038020-130 = "แต่ถึงอย่างนั้น พวกเราก็ทำความเข้าใจอาการและดูแลนักเรียนทุกคนที่ติดเชื้อได้ไม่หมดค่ะ... นี่เป็นปัญหาด้านบุคลากรและด้านกายภาพค่ะ!"
10038020-131 = "ขอร้องละค่ะ ท่านประมุข! ถ้าจะยังจัดเทศกาลเงาจันทร์อยู่... บางทีอาจจะ...!"
10038020-138 = "ระวังคำพูดด้วย! พวกเธออยู่ต่อหน้าท่านประมุขนะ!"
10038020-144 = "ไม่หรอก ไม่เป็นไร ตอนนี้เราควรฟังสถานการณ์จากคนที่อยู่ในพื้นที่สิ "
10038020-145 = "ในเมื่อสถานการณ์เป็นเช่นนี้ ก็ไม่ผิดหรอกที่จะรีบร้อนเพื่อแก้ปัญหา"
10038020-146 = "รายงานต่อได้เลย"
10038020-151 = "คะ! นอกจากนั้นแล้ว... ตอนนี้ข่าวลือที่ฟังดูเป็นลางร้ายก็แพร่กระจายหนักขึ้นเรื่อยๆ เลยค่ะ!"
10038020-152 = "ถ้ามันเป็นแค่ข่าวลือที่เล่ากันปากต่อปากแล้วเงียบไปก็คงไม่น่ากังวลหรอกค่ะ แต่ปัญหาก็คือ... ตอนนี้เริ่มมีเค้าลางว่าอำนาจควบคุมของมังกรดำกำลังอ่อนแอลงค่ะ..."
10038020-153 = "เรื่องการสำนึกผิดของชมรมการแสดงงิ้วกับร่องรอยของคางุยะก็เป็นที่ซุบซิบกันด้วยค่ะ..."
10038020-154 = "โดยรวมแล้วถือว่านักเรียนไม่ยืนหยัดต่อคำสั่งของมังกรดำค่ะ เมื่ออยู่ต่อหน้าก็ทำเป็นว่าปฏิบัติตาม แต่ลับหลังก็ทำเหมือนว่าดูหมิ่นพวกเราค่ะ"
10038020-156 = "เช่นนั้นหรือ... นั่นคือปัญหาอย่างชัดเจนเลยสินะ แล้วพวกเธอมีความเห็นอย่างไรต่อสถานการณ์นี้เล่า?"
10038020-161 = "..."
10038020-162 = "เรื่องนี้พวกฉันก็ยากที่จะเรียนท่านประมุขค่ะ..."
10038020-164 = "ไม่เป็นไร บอกเรามาตามตรงเถอะ"
10038020-170 = "พวกฉันคิดว่าไม่ควรให้คนนอกเข้ามาร่วมงานเทศกาลเงาจันทร์ค่ะ"
10038020-175 = "เรื่องนั้นมัน...!"
10038020-176 = "พวกฉันกำลังพูดถึงความเป็นจริงค่ะ หัวหน้าคณะกรรมการมินะ มีนักเรียนซานไห่จิงจำนวนไม่น้อยเลย#nที่คิดว่าสาเหตุของเรื่องนี้คือนักเรียนจากภายนอกค่ะ"
10038020-182 = "..."
10038020-183 = "ในสถานการณ์แบบนี้ ถ้ายังมีคนนอกเข้ามาร่วมเทศกาลเงาจันทร์มากกว่าเดิมละก็... ตอนนั้นมังกรดำ#nอาจสูญเสียอำนาจควบคุมที่งานเทศกาลไปโดยสิ้นเชิงก็ได้ค่ะ"
10038020-184 = "นะ... แน่นอนว่าการจัดงานเทศกาลเหมือนกับทุกปีอาจเป็นการแสดงให้เห็นว่าไม่มีปัญหาอะไรใน#nซานไห่จิง แต่ถึงอย่างนั้น..."
10038020-185 = "..."
10038020-187 = "หมายความว่าเราไม่อาจเมินเฉยต่อปัญหาที่มีได้สินะ"

[translation]
10038020-1 = "#title;제2화;소문에 대처하는 자세"
10038020-2 = "#wait;2500"
10038020-3 = "#wait;1000"
10038020-4 = "#all;hide"
10038020-5 = "#wait;500"
10038020-6 = "4;레이죠;02\n#4;em;[반응]\n#4;a\n#wait;800"
10038020-7 = "4;레이죠;00;아, 선생님. 여기입니다.\n#4;m3"
10038020-8 = "[s] \"레이죠가 직접 불러 주다니, 반갑네.\""
10038020-9 = "4;레이죠;99;그렇게 생각해 주신다면, 감사합니다. \n#4;greeting"
10038020-10 = "4;레이죠;02;음…… 도원향에는 이미 몇 번 와 본 적 있으시죠? 네. 그렇지만 이곳은 도원향에서도 가장 안쪽의 다실입니다."
10038020-11 = "4;레이죠;01;평소 저희 현무상회의 이야기를…… 저희 상회원들끼리 나누기도 하는 곳이죠.\n#4;em;…"
10038020-12 = "[s] \"그랬어? 어쩐지 분위기가 조금 다른 것 같았는데.\""
10038020-13 = "4;레이죠;99;네. 이 방은 보기보다 상당한 수준의 방음 처리가 되어 있어, 저희들의 이야기는 웬만해서는 밖으로 새어 나가지 않을 겁니다."
10038020-14 = "4;레이죠;02;그렇게까지 긴밀히 하고 싶은 이야기가 있느냐고요? 그것은…….\n#4;em;[?]"
10038020-15 = "4;레이죠;07;……알고 계시다시피 현재 현무상회는 전반적으로 출입 제한 상태가 되어 있습니다. 문주님의 명으로 말이죠."
10038020-16 = "4;레이죠;06;회장님께서는…… 어린이가 되어, 격리된 상태이시고.\n#4;em;[속상함]"
10038020-17 = "4;레이죠;07;결과적으로 지금의 현무상회를 이끌어야 할 책임이 있는 것은, 다른 누구도 아닌…… 저입니다."
10038020-18 = "4;레이죠;11;네. 그야 부담스럽죠. 지금도 위가 아파오는 것 같습니다. 어제는 잠도 조금 설쳤고요.\n#4;stiff"
10038020-19 = "4;레이죠;99;그나마 불행 중 다행이라면, 현무상회 전체가 마비된 것이나 다름없는 상태이기에.\n#4;em;…"
10038020-20 = "4;레이죠;00;상회를 관리하는 데에 드는 저의 실질적인 수고 자체는, 적은 편이라는 것 정도일까요."
10038020-21 = "[s] \"그건 안 좋은 일 아냐?!\""
10038020-22 = "4;레이죠;03;사실 그렇습니다. 농담 겸 한탄을 조금 해 보고 싶어서요.\n#4;em;[반응]"
10038020-23 = "4;레이죠;00;어쨌든 제가 선생님을 뵙자고 한 이유는, 지금 산해경에 떠도는 거리의 소문을…… 선생님께 전해 드리고 싶어서입니다."
10038020-24 = "4;레이죠;15;물론 선생님께서는 현재 현룡문의 내빈으로 와 계시다는 것 정도는 저 역시 알고 있습니다만."
10038020-25 = "4;레이죠;00;이것은 아무래도 현룡문 쪽에서는 듣기 어려운 이야기일 듯 해서요."
10038020-26 = "4;레이죠;02;이다음에 곧장 현룡문 간부들과의 만남이 예정되어 있으시죠? \n#4;em;[?]"
10038020-27 = "4;레이죠;00;그 전에, 현룡문의 시각이 아닌 다른 시각을 이야기해 드리는 것이, 선생님께도 참고가 될 것 같아서요."
10038020-28 = "[s] \"조금…… 아니, 많이 부담스럽네…….\""
10038020-29 = "4;레이죠;99;죄송합니다. 이런 표현은 그다지 좋아하지 않습니다만, 시국이 시국인 상황이어서요.\n#4;em;[속상함]\n#4;stiff"
10038020-30 = "#st;[0,0];instant;1;"
10038020-31 = "#clearST"
10038020-32 = "4;레이죠;00\n#4;d\n#wait;1500"
10038020-33 = "#all;hide"
10038020-34 = "3;레이죠;00\n#3;closeup\n#3;a\n#wait;1500"
10038020-35 = "#all;hide"
10038020-36 = "#na;레이죠;지금 거리에는…… 조금 비밀리에, 어떤 퇴학생에 대한 이야기가 떠돌고 있습니다."
10038020-37 = "[s] \"혹시, 신타니 카이라는 학생?\""
10038020-38 = "#st;[0,0];instant;1;"
10038020-39 = "#clearST"
10038020-40 = "3;레이죠;02\n#3;shake\n#3;em;[?!]\n#wait;800"
10038020-41 = "3;레이죠;04;네? 선생님께서 어떻게 그 이름을……?"
10038020-42 = "#all;hide"
10038020-43 = "#wait;500"
10038020-44 = "#na;(레이죠에게 키사키와 나누었던 대화에 대해 이야기해 주었다.)"
10038020-45 = "#all;hide"
10038020-46 = "#wait;500"
10038020-47 = "3;레이죠;02;그렇군요. 문주님께서는 그렇게…….\n#3;a"
10038020-48 = "3;레이죠;99;……."
10038020-49 = "3;레이죠;00;네. 거리에는 지금 그 신타니 카이에 대한 이야기가, 암암리에 퍼지고 있습니다. 주로 3학년 학생들 위주로요.\n#3;em;[반응]"
10038020-50 = "3;레이죠;02;3학년 학생들 위주라는 점이 핵심입니다. 1학년들과 2학년들은 아예 모르거나, 오히려 부정확하고 부풀려진 괴담 같은 것을 접하는 태도죠."
10038020-51 = "3;레이죠;99;그리고, 그 소문을 기점으로, 또 다른 많은 불안한 이야기들이 흉흉하게 나돌고 있습니다."
10038020-52 = "3;레이죠;07;예전…… 그 교류회와 연관된 이야기들까지 포함되어서 말이죠.\n#3;closeup"
10038020-53 = "3;레이죠;02;조금 더 구체적으로요? 그렇군요. 그러니까…….\n#3;em;[?]\n#3;stiff\n#3;closeup"
10038020-54 = "3;카구야;00\n#3;h\n#3;black"
10038020-55 = "#wait;500"
10038020-56 = "#na;카구야 부장은 어떻게 된 걸까?"
10038020-57 = "#na;자숙 중이라고는 하지만, 충언을 하려다 잡혀갔다는 소문도 있대……."
10038020-58 = "3;키사키;00\n#3;h\n#3;black"
10038020-59 = "#wait;500"
10038020-60 = "#na;만일 신타니 카이가 정말로 돌아왔다면, 거기에는"
10038020-61 = "#na;문주님의 뜻이 개입되어 있을지도……."
10038020-62 = "3;카이;00\n#3;white\n#3;h"
10038020-63 = "#wait;500"
10038020-64 = "#na;퇴학당해서 일곱 죄수까지 된 학생이."
10038020-65 = "#na;아무 조건 없이, 산해경으로 돌아올 수 있을 리 없으니……."
10038020-66 = "#all;hide"
10038020-67 = "#na;그런데 정작 신타니 카이를 퇴학시킨 건, 문주님이었잖아."
10038020-68 = "#na;어쩌면 그것도 포함된 무언가가 있는 게 아닐까……?"
10038020-69 = "#all;hide"
10038020-70 = "#wait;500"
10038020-71 = "#na;산해경, 이대로 괜찮으려나."
10038020-72 = "#st;[0,0];instant;1;"
10038020-73 = "#clearST"
10038020-74 = "#wait;1500"
10038020-75 = "3;키사키;00\n#3;white\n#3;h\n#3;closeup"
10038020-76 = "#na;현룡문을 믿어도 괜찮은 거야? 그리고 문주님은……."
10038020-77 = "#all;hide"
10038020-78 = "#wait;500"
10038020-79 = "3;레이죠;99;제가 빠르게 정리해 본 것만 해도, 이 정도입니다.\n#3;em;…\n#3;a"
10038020-80 = "3;레이죠;01;……요약해 드리자면, 고학년들 위주로 현룡문에 대한 불안감이…… 조금씩이나마 커져 가고 있다는 것이죠."
10038020-81 = "3;레이죠;02;네. 물론 저희 현무상회는 현룡문과 그다지 사이가 좋지 않습니다. 그것은 어쩔 수 없는 사실입니다."
10038020-82 = "3;레이죠;05;……그러나 현무상회의 상회 활동 역시, 현룡문이 존재하기에 이루어질 수 있는 것이기도 합니다…….\n#3;em;[한숨]"
10038020-83 = "3;레이죠;09;저라고 해서 그 사실을 모르는 것은 아닙니다. 다만 그 말도 안 될 정도로 깐깐한 기준과, 조금 치졸하게까지 보이는 간섭과."
10038020-84 = "3;레이죠;10;툭하면 이건 전통에 어긋난다느니 산해경의 자존심을 내팽개쳤다느니 그런 말을 늘어놓으면서 영업 방해를 해 오는 것이……!\n#3;stiff"
10038020-85 = "#st;[0,0];instant;1;"
10038020-86 = "#clearST"
10038020-87 = "3;레이죠;02\n#3;em;[!]\n#wait;800"
10038020-88 = "3;레이죠;08;죄송합니다. 말이 조금 옆으로 샜군요. 역시 월영제가 다가오면, 크고 작은 이상한 일이 일어나는 법인 걸까요…….\n#3;em;[땀]\n#3;greeting"
10038020-89 = "[s] \"월영제가 왜?\""
10038020-90 = "#st;[0,0];instant;1;"
10038020-91 = "#clearST"
10038020-92 = "3;레이죠;00\n#3;em;[반응]\n#3;h\n#wait;1000"
10038020-93 = "3;레이죠;02;선생님께서는 월영제에 대해 어떻게 알고 계신가요?"
10038020-94 = "#all;hide"
10038020-95 = "3;레이죠;99;그렇군요. 풍요를 기원하고 먹을 것을 나누는 절기……. 네. 그것이 월영제의 일반적인 인식이겠지요.\n#3;a"
10038020-96 = "3;레이죠;02;……하지만 월영제에는, 조금 다른 측면의 이야기도 포함되어 있습니다.\n#3;em;[반응]"
10038020-97 = "3;레이죠;00;가령 월영제를 전후로 하계로 내려온다고 하는, 달로 떠났던 선인(仙人) 같은 것 말이지요……."
10038020-98 = "[s] \"선인(仙人)?\""
10038020-99 = "#st;[0,0];instant;1;"
10038020-100 = "#clearST"
10038020-101 = "3;레이죠;00\n#3;m2\n#wait;1200"
10038020-102 = "3;레이죠;99;선인(仙人)이란, 보통 사람이 수행이나 연구를 거듭해 깨달음을 얻고, 무언가…… 특별한 존재가 된 것을 뜻합니다.\n#3;em;…"
10038020-103 = "3;레이죠;00;월영제에는, 바로 그 선인(仙人)을 기린다는 의미도 포함되어 있습니다."
10038020-104 = "3;레이죠;02;달로 떠났던 선인(仙人)이 이 땅으로 돌아와, 하계를 둘러본 뒤 다시 떠난다는 이야기죠."
10038020-105 = "3;레이죠;01;하지만 선인(仙人)이 찾아온다는 것 하나만으로, 이 땅에는 기묘한 일들이 일어난다고도 합니다."
10038020-106 = "3;레이죠;99;네……. 그렇습니다. 지금 산해경에 일어나고 있는 일들이, 어쩌면 월영제와 연관이 있지 않을까, 하고 생각하는 사람들도 있을 정도입니다.\n#3;m3"
10038020-107 = "#st;[0,0];instant;1;"
10038020-108 = "#clearST"
10038020-109 = "3;레이죠;04\n#3;em;[?]\n#3;h\n#wait;1000"
10038020-110 = "3;레이죠;02;저 말인가요? 저야 그냥 미신이나 구전 같은 것이라고 생각하고는 있습니다만."
10038020-111 = "3;레이죠;15;상황이 이렇게까지 되면, 조금이지만 신경이 쓰이기는 하네요…….\n#3;em;[한숨]"
10038020-112 = "#all;hide"
10038020-113 = "#na;(레이죠에게서 거리에 떠도는 소문에 대한 이야기를 듣고, 곧장 현룡문으로 향했다.)"
10038020-114 = "#st;[0,0];instant;1;"
10038020-115 = "#clearST"
10038020-116 = "#wait;1500"
10038020-117 = "#all;hide"
10038020-118 = "#wait;500"
10038020-119 = "#wait;2000"
10038020-120 = "#na;(현룡문에서의 회의는…… 그야말로 아수라장이었다.)"
10038020-121 = "3;현룡문 부원 A;05;현무상회로의 출입을 통제하고 있지만, 어린이 병은 계속해서 퍼져나가고 있습니다……. 추가적인 조치가 필요합니다!\n#3;em;[반응]\n#3;a"
10038020-122 = "5;현룡문 부원 B;00;그 전파 기작 역시 제대로 파악되지 않는 중입니다. 역학 조사에도 어려움이 많습니다!\n#5;hophop\n#5;al\n#3;m1"
10038020-123 = "3;현룡문 부원 A;05;현장 인력들은 한계를 호소하고 있습니다. 대책이 필요합니다!\n#3;stiff"
10038020-124 = "#st;[0,0];instant;1;"
10038020-125 = "#clearST"
10038020-126 = "5;현룡문 부원 B;00\n3;현룡문 부원 A;05\n#3;d\n#5;d\n#wait;1200"
10038020-127 = "#all;hide"
10038020-128 = "3;미나;02;하지만 한 가지는 알아냈잖아? 어린이 병에 걸린 학생이라고 해도, 3일 정도 지나면 전파력이 급격히 떨어진다는 것 말이다!\n#3;em;[반응]\n#3;a"
10038020-129 = "#all;hide"
10038020-130 = "5;현룡문 부원 B;00\n1;현룡문 부원 A;05;그렇지만 저희가 모든 학생들의 증상 이력을 파악하고 사후 관리를 할 수는 없습니다…… 이것은 인력과 물리적 한계의 문제입니다!\n#1;em;[!]\n#1;jump"
10038020-131 = "5;현룡문 부원 B;05;부탁드립니다, 문주님! 월영제를 이대로 개최한다는 것은…… 어쩌면……!\n#5;stiff"
10038020-132 = "#st;[0,0];instant;1;"
10038020-133 = "#clearST"
10038020-134 = "#all;hide"
10038020-135 = "3;키사키;99\n#3;em;…\n#3;a\n#wait;2500"
10038020-136 = "#all;hide"
10038020-137 = "3;미나;99\n#3;stiff\n#wait;1500"
10038020-138 = "3;미나;13;말을 삼가라! 문주님의 앞이다!\n#3;closeup\n#bgshake"
10038020-139 = "#st;[0,0];instant;1;"
10038020-140 = "#clearST"
10038020-141 = "#all;hide"
10038020-142 = "5;현룡문 부원 B;04\n1;현룡문 부원 A;04\n#1;em;[?!]\n#5;em;[?!]\n#1;shake\n#5;shake\n#1;h\n#5;h\n#wait;1000"
10038020-143 = "#all;hide"
10038020-144 = "3;미나;13\n1;키사키;02;아니, 괜찮다. 지금은 현장의 이야기를 들어야 할 때가 아니겠느냐. \n#1;em;[반응]\n#1;ar\n#3;m5"
10038020-145 = "1;키사키;99;상황이 상황인 만큼, 거기에 어느 정도의 다급함이 섞인다 해도 어쩔 수 없는 것이겠지."
10038020-146 = "1;키사키;01;계속하여 듣겠다."
10038020-147 = "#st;[0,0];instant;1;"
10038020-148 = "#clearST"
10038020-149 = "#all;hide"
10038020-150 = "5;현룡문 부원 B;04\n1;현룡문 부원 A;04\n#1;em;[!]\n#5;em;[!]\n#1;h\n#5;h\n#wait;1000"
10038020-151 = "1;현룡문 부원 A;05;넷! 그에 그치지 않고…… 불길한 소문은, 계속해서 커져만 가고 있는 상황입니다! 좀처럼 가라앉지 않습니다…….\n#1;greeting"

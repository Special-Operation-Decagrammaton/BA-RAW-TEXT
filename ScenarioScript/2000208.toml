[translation]
2000208-1 = "愛情靈藥"
2000208-2 = "沙耶的研究室"
2000208-3 = "嗯……最近和老師度過之後，感覺我的狀態就變得很奇怪。"
2000208-4 = "該怎麼說，光是看見老師就心跳加速，臉變成火熱……#n不是平常的我，感覺就像是變成不同人一樣。"
2000208-5 = "這樣下去感覺沒辦法專注在研究上，問了部員之後，那不是陷入戀愛時的感情嗎，得到了這樣的答案。"
2000208-6 = "戀愛……老師，雖然很害羞但是我，關於戀愛幾乎不了解。所以，那個……"
2000208-7 = "那個，這個……"
2000208-8 = "[s]「這是……？」"
2000208-9 = "讓對方陷入戀愛的靈藥！"
2000208-10 = "哈—哈—哈！像我這樣優秀的科學家，不會盲目相信別人說的話！"
2000208-11 = "為了確認這個感情是否為戀愛，有必要實際觀察陷入戀愛之人的行為。"
2000208-12 = "這個靈藥……是我特製的「愛情靈藥」！#n只要聞了這個氣味，就會喜歡上眼前的對象喜歡得無法自拔！"
2000208-13 = "喝下這個藥時的反應和現在的我一樣的話，就可以證明我陷入戀愛了吧？果然我是天才啊，哈—哈—哈—！"
2000208-14 = "[s]「這個藥誰要來喝？」"
2000208-15 = "那當然是老師吧？"
2000208-16 = "[s]（逃跑）"
2000208-17 = "啊啊，不要跑！這個藥對身體絕對沒有壞處！#n當然身體也不會變成黃金色或是長毛之類的！"
2000208-18 = "所以就老實的，當我的實驗對象吧！"
2000208-19 = "[s]（指向根津助）"
2000208-20 = "嗯？根津助？很抱歉，這個藥對動物沒有效果。#n所以老師不直接實驗的話不知道效果。"
2000208-22 = "來吧……反應，讓我看看反應！"
2000208-23 = "[s]（揮開）"
2000208-24 = "等，等等！那樣把手亂揮的話瓶子──"
2000208-26 = "唔哇！你做什麼啊！#n好不容易注入心血製作的愛情靈藥……"
2000208-30 = "― 真不像我，竟然會犯這種失誤……[wa:2020] "
2000208-32 = "― 怎麼會這樣，目光無法從老師身上移開……！[wa:2740] "
2000208-35 = "― 老師，從我眼前離……果然還是，不要離開！[wa:5240] "
2000208-37 = "― 就這樣……稍微陪我一下……[wa:1240] "
2000208-40 = "― 唔唔……真傷腦筋。[wa:2200] "
2000208-42 = "― 但是，實在是沒辦法把目光從老師身上移開……[wa:660] "
2000208-45 = "― 現在老師在我眼裡……看起來就像是非常美味的起司塊！[wa:3600] "
2000208-48 = "― 不行了，老師……一點就好，一口……一口就好可以讓我咬嗎？[wa:7440] "
2000208-51 = "（咬下──）"
2000208-52 = "（這之後，在沙耶的藥效消失為止一直被咬著手臂……）"

[translation]
2000208-1 = "#title;사랑의 묘약"
2000208-2 = "#place;사야의 연구실"
2000208-3 = "3;사야;04;으음…… 요즈음 선생과 함께 일상을 보내면서 나님의 상태가 어쩐지 이상해진 것이다.\n#3;a"
2000208-4 = "3;사야;04;뭐라고 해야 할까, 선생만 보면 가슴이 뛰고, 얼굴이 붉어지고…… #n내가 아닌 사람이 되어버리는 것 같다.\n#3;m2\n#3;em;[///]"
2000208-5 = "3;사야;05;이대로는 연구에도 집중할 수 없을 것 같아서, 부원들에게 물어봤더니 그건 사랑에 빠졌을 때의 감정이라 답하던 것이다…….\n#3;m4"
2000208-6 = "3;사야;99;사랑…… 선생, 부끄럽지만 나는 사랑에 대해 잘 모르는 것이다. 그래서 말인데……\n#3;m3"
2000208-7 = "3;사야;04;저기, 이걸……\n#3;em;[...]"
2000208-8 = "[s] \"이건……?\""
2000208-9 = "3;사야;00;상대를 사랑에 빠지게 만드는 묘약인 것이다!\n#3;closeup\n#3;em;[!]"
2000208-10 = "3;사야;03;하-하-하! 나님 같은 우수한 과학자가 무턱대고 남의 말을 신뢰할 수는 없지! \n#3;hophop\n#3;em;[재잘]"
2000208-11 = "3;사야;01;이 감정이 사랑인지 아닌지를 확인하기 위해서는 진짜 사랑에 빠진 사람의 행동을 관찰해 볼 필요가 있는 것이다."
2000208-12 = "3;사야;03;이 영약으로 말할 것 같으면…… 나님의 특제, 사랑의 묘약! #n이 약의 향기를 맡게 되면 눈 앞의 상대가 좋아서 어쩔 줄 모르게 되어 버리는 것이다!\n#3;em;[반짝]\n#3;greeting"
2000208-13 = "3;사야;00;이 약을 먹었을 때의 반응이 지금의 나님과 동일하다면, 나님이 사랑에 빠졌다는 걸 증명할 수 있겠지? 역시 나님은 천재인 것이다, 하-하-핫!"
2000208-14 = "[s] \"이 약을 누가 마실 건데?\""
2000208-15 = "3;사야;07;그야 당연히 선생이지.\n#3;em;[반응]"
2000208-16 = "[s] 도망친다."
2000208-17 = "3;사야;07;아앗, 도망치지 마! 이 약은 절대로 해롭지 않은 것이다! #n물론 몸이 황금색으로 변하거나 털이 돋아나는 일도 없고.\n#3;em;[!]\n#3;hophop"
2000208-18 = "3;사야;07;자, 그러니까 순순히 나님의 실험 상대가 되는 것이다!"
2000208-19 = "[s] 네즈스케를 가리킨다."
2000208-20 = "3;사야;05;응? 네즈스케? 미안하지만 이 약은 동물에게는 효과가 없는 것이다. #n그러니까 선생이 직접 실험해주지 않으면 효과를 알 수 없거든."
2000208-21 = "3;사야;05\n#3;d\n#wait;1000"
2000208-22 = "3;사야;01;자…… 반응, 반응을 보는 것이다!\n#3;closeup\n#3;hophop\n#3;a"
2000208-23 = "[s] 뿌리친다."
2000208-24 = "3;사야;04;자, 잠깐! 그렇게 거칠게 휘두르면 약병이—\n#3;closeup\n#3;shake"
2000208-25 = "#all;hide\n#wait;1500\n#bgshake"
2000208-26 = "#na;사야;으악, 이게 무슨 짓인 것이냐! #n모처럼 심혈을 기울여 만든 사랑의 묘약이……"
2000208-27 = "#all;hide"
2000208-28 = "#wait;13000"
2000208-29 = "#wait;800"
2000208-30 = "#st;[-1200,-530];serial;60;― 나, 나님답지 않게 [wa:1700]이런 실수를 하다니……"
2000208-31 = "#wait;2800"
2000208-32 = "#st;[-1200,-630];serial;60;― 크, 큰일이야. [wa:1500]선생에게서 [wa:1000]눈을 뗄 수가 없어…"
2000208-33 = "#wait;4500"
2000208-34 = "#clearST"
2000208-35 = "#st;[-1200,-530];serial;60;― 선생, [wa:1500]내 앞에서 떨어…… [wa:3000]아니, [wa:500]떨어지지 마!"
2000208-36 = "#wait;2000"
2000208-37 = "#st;[-1200,-630];serial;60;― 이대로…… [wa:1000]잠깐만 같이 있어줘……."
2000208-38 = "#wait;4000"
2000208-39 = "#clearST"
2000208-40 = "#st;[-1200,-530];serial;60;― 우으……. [wa:2000]곤란한 것이다."
2000208-41 = "#wait;2500"
2000208-42 = "#st;[-1200,-630];serial;60;― 하지만 [wa:500]도저히 선생에게서 눈을 뗄 수가 없어."
2000208-43 = "#wait;5500"
2000208-44 = "#clearST"
2000208-45 = "#st;[-1200,-530];serial;60;― 지금 내 눈에는 선생이…… [wa:3000]너무나도 맛있는 치즈 덩어리로 보이는 것이다!"
2000208-46 = "#wait;5500"
2000208-47 = "#clearST"
2000208-48 = "#st;[-1200,-530];serial;60;[wa:1000]― 안 되겠어, [wa:1000]선생…… [wa:1500]딱 [wa:1000]한 입만…… [wa:1000]한 입만 [wa:1500]깨물게 해주면 안 될까?"
2000208-49 = "#wait;4500"
2000208-50 = "#all;hide\n#clearST"
2000208-51 = "#na;(덥썩)\n#fontsize;100"
2000208-52 = "#na;이후, 사야가 약에서 깨어날 때까지 계속 팔을 물어뜯겼다……."

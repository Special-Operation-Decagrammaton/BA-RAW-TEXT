[translation]
2000208-1 = "ยาวิเศษแห่งรัก"
2000208-2 = "ห้องทดลองของซายะ"
2000208-3 = "อืม... ช่วงนี้ฉันใช้เวลาอยู่กับครูบ่อยมาก เลยรู้สึกแปลกๆ ขึ้นมาน่ะ"
2000208-4 = "จะอธิบายยังไงดีล่ะ... แค่เห็นครูใจฉันก็เต้นแรง รู้สึกร้อนๆ ตรงหน้าทุกครั้งเวลาที่มองครู...#nรู้สึกไม่เป็นตัวของตัวเองเลย"
2000208-5 = "ถ้าเป็นแบบนี้ฉันคงไม่มีสมาธิจดจ่ออยู่กับการวิจัยแน่ๆ ฉันเลยลองไปถามสมาชิกในชมรมดู...#nพวกเขาบอกว่าเป็นอาการของคนที่ตกหลุมรักน่ะ"
2000208-6 = "ตกหลุมรักงั้นเหรอ... ถึงจะน่าอายนิดๆ แต่ขอบอกตามตรงว่าฉันไม่ค่อยเข้าใจเรื่องความรักหรอก#nเพราะงั้นแล้ว..."
2000208-7 = "อะ...เอ้านี่..."
2000208-8 = "[s] \"นี่คืออะไรเหรอ?\""
2000208-9 = "ยาวิเศษที่จะทำให้ตกหลุมรักยังไงล่ะ!"
2000208-10 = "ฮ่าฮ่าฮ่า! นักวิทยาศาสตร์อัจฉริยะอย่างท่านซายะจะไม่เชื่อคำพูดของใครง่ายๆ#nจนกว่าจะได้พิสูจน์เองหรอกนะ!"
2000208-11 = "ฉันจะต้องทดลองและสังเกตพฤติกรรมของคนที่กำลังตกหลุมรักดูก่อน#nเพื่อพิสูจน์ว่าฉันกำลังตกหลุมรักรึเปล่ายังไงล่ะ"
2000208-12 = "นี่ก็คือยาเสน่ห์สูตรพิเศษของท่านซายะ! ทันทีที่ใครก็ตามได้สูดกลิ่นของยานี้เข้าไป#nก็จะรู้สึกชอบและตกหลุมรักคนที่อยู่ตรงหน้าโดยไม่รู้ตัวทันที!"
2000208-13 = "ถ้าอาการของคนที่กินยานี้เข้าไปเหมือนกับฉันล่ะก็จะเป็นข้อพิสูจน์ว่าฉันกำลังตกหลุมรัก#nอยู่ได้ยังไงล่ะ? ฉันนี่อัจฉริยะจริงๆ เลย ฮ่าฮ่าฮ่า!"
2000208-14 = "[s] \"แล้วใครจะเป็นคนทดลองยานี่เหรอ?\""
2000208-15 = "ก็ครูไงล่ะ\n"
2000208-16 = "[s] วิ่งหนี"
2000208-17 = "อ๊ะ อย่าเพิ่งหนีไปสิ! ยานี่ไม่อันตรายหรอกน่า!#nสัญญาได้เลยว่าร่างกายของครูจะไม่เปลี่ยนเป็นสีทองหรือว่ามีขนงอกออกมาอีกแน่นอน"
2000208-18 = "เพราะงั้นมาช่วยท่านซายะคนนี้ทดลองหน่อยเถอะนะ!"
2000208-19 = "[s] ชี้ไปที่เนสึซึเกะ"
2000208-20 = "หือ? เนสึซึเกะเหรอ? โทษทีนะ แต่ยาอันนี้มันไม่ได้ผลกับพวกสัตว์น่ะ#nเพราะงั้นฉันถึงต้องให้คุณครูลองไงล่ะ!"
2000208-22 = "เอาล่ะ... มาดูผลลัพธ์กันเลยดีกว่า!"
2000208-23 = "[s] พยายามหนี"
2000208-24 = "ดะ... เดี๋ยวก่อนสิ! อย่าเขย่าขวดยาแบบนั้น...."
2000208-26 = "อึ่ก... ครูทำอะไรลงไปเนี่ย!#nฉันพยายามแทบตายกว่าจะปรุงยาเสน่ห์นี่ขึ้นมาได้...."
2000208-30 = "― ไม่อยากเชื่อเลย ว่าจะทำพลาดแบบนี้... ไม่สมกับเป็นท่านซายะเลย[wa:220] "
2000208-32 = "― กะ...เกิดเรื่องใหญ่แล้วล่ะ ฉันละสายตา... จากครูไม่ได้เลย[wa:1300] "
2000208-35 = "― ครู... ช่วยอยู่ห่างๆ... ไม่สิ... อย่าอยู่ห่างจากฉันนะ![wa:3880] "
2000208-37 = "― ช่วยอยู่กับฉัน... แบบนี้อีกหน่อยนะ...[wa:280] "
2000208-40 = "― อื้อ... แบบนี้ไม่ดีแน่ๆ[wa:1640] "
2000208-42 = "― แต่ว่า... ฉันละสายตาจากคุณครูไม่ได้เลย[wa:10] "
2000208-45 = "― ตอนนี้ในสายตาของฉัน... ครูเหมือนกับชีสแสนอร่อยที่หอมเย้ายวนใจมากเลยล่ะ![wa:1760] "
2000208-48 = "― ไม่ไหวแล้ว... ครู... ขอฉันกัดสักคำนะ... ไม่สิ... ขอชิมหน่อยได้ไหม?[wa:5920] "
2000208-51 = "(กระโดด)"
2000208-52 = "จากนั้นซายะก็พยายามกัดแขนของคุณครูในตรงที่โดนยาเสน่ห์หกลงไป...."

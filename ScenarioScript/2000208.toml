[translation]
2000208-1 = "Love Potion"
2000208-2 = "Saya's Research Lab"
2000208-3 = "There's been something on my mind. I've begun to feel strange about us spending so much time together..."
2000208-4 = "If I had to explain it... My heart starts pounding and I start blushing whenever I look at you. I feel like I'm no longer myself."
2000208-5 = "I won't be able to focus on my research at this rate. I asked my assistants for advice, and they told me that I'm in love!"
2000208-6 = "Love... Loath as I am to admit it, I don't know anything about love. So..."
2000208-7 = "So this is..."
2000208-8 = "[s] \"This is...?\""
2000208-9 = "It's an elixir that makes someone fall in love with you! A love potion!"
2000208-10 = "Hahaha! Every brilliant scientist knows that bold claims need to be backed up with data."
2000208-11 = "To verify what I'm experiencing truly is love, I must first observe the behavior of someone I KNOW is in love."
2000208-12 = "That's where my love potion comes in. One whiff of this and you'll fall head over heels for the first person you lay eyes on!"
2000208-13 = "In other words, if their behavior becomes the same as mine right now, that would be proof that I'm in love! I'm a genius. Hahaha!"
2000208-14 = "[s] \"So who's going to take the elixir?\""
2000208-15 = "You, of course!"
2000208-16 = "[s] Run away."
2000208-17 = "Wait, don't run away! I swear this elixir is safe! You won't turn into gold or start growing fur or anything like that."
2000208-18 = "I'm begging you. Please help me with my experiment!"
2000208-19 = "[s] Point at Nezusuke."
2000208-20 = "Nezusuke? Sorry, but the potion has no effect on animals. It has to be you, Sensei!"
2000208-22 = "Now...let's see what happens!"
2000208-23 = "[s] Try to escape."
2000208-24 = "W-Wait! Don't shake the bottle like that!"
2000208-26 = "What has gotten into you? I worked so hard on that love potion..."
2000208-30 = "― I can't believe I made such a stupid mistake... I never do this.[wa:60] "
2000208-32 = "― What do I do now? I just can't take my eyes off you, Sensei...[wa:1060] "
2000208-35 = "― Sensei, please don't leave... Please, stay by my side![wa:3880] "
2000208-37 = "― All I want...is for you to stay with me like this...[wa:10] "
2000208-40 = "― Agh... This is definitely not good.[wa:1160] "
2000208-42 = "― I still can't take my eyes off you, Sensei.[wa:10] "
2000208-45 = "― You remind me of...a delicious block of cheese right now![wa:2320] "
2000208-48 = "― I just can't help it... Sensei... Can I just take one bite...? It's fine, isn't it? Just a single bite?[wa:4440] "
2000208-51 = "(jump)"
2000208-52 = "Saya kept on biting my arm until the potion wore off..."

[translation]
11134010-1 = "#K-01"
11134010-3 = "ไม่คิดเลยนะว่าชีวิตนี้จะได้มาร้องเพลงต่อหน้าคนอื่นด้วย..."
11134010-5 = "เอ๋... แปลกจัง? ปกติเห็นชอบฮัมเพลงบ่อยๆ นี่นา ก็นึกว่าชอบร้องเพลงซะอีก"
11134010-7 = "ฮัมเพลงกับร้องเพลงมันไม่เหมือนกันนะ... เดี๋ยวนะ ก่อนหน้านั้นคิดว่าฉันเป็นคนแบบไหนกัน"
11134010-9 = "พอจะมีเวลาฟังฉันอธิบายสัก 24 ชั่วโมงไหมล่ะ?"
11134010-11 = "ช่างเถอะ... เฮ้อ ฉันผิดเองแหละที่ฮัมเพลงให้ได้ยิน..."

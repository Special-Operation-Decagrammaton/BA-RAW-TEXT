[translation]
1003703-1 = "Security Committee Chair's Reasoning"
1003703-2 = "Red Winter Academy Entrance"
1003703-3 = "I came to Red Winter Academy after Marina's last MomoTalk message."
1003703-4 = "Sensei, you've arrived. Come, this is an urgent situation."
1003703-5 = "This is the crime scene where the treacherous spy broke into the Secretariat and stole the pudding."
1003703-6 = "For this spy to have the audacity to steal President Cherino's special pudding!"
1003703-7 = "[s] \"Why do you think a spy stole the pudding?\""
1003703-8 = "Pudding is one of our most valued and cherished resources. By stealing something of such importance, they are attempting to create internal strife and cause the very fall of our academy!"
1003703-9 = "Unfortunately for them, I am the security chairman of Red Winter Academy."
1003703-10 = "Do you see these scratches? The spy must have crawled in through the window."
1003703-11 = "The footprints are small, so the spy has to be less than a meter tall.#nThey snatched the pudding, and crawled out on all fours by holding it#nin their mouth."
1003703-12 = "[s1] \"It sounds like you're describing an animal...\"\n[s2] \"Do you happen to know what crawls on all fours?\""
1003703-13 = "Appearances can be deceiving, Sensei!"
1003703-14 = "Appearances can be deceiving, Sensei!"
1003703-15 = "This spy must be a true master of disguise."
1003703-16 = "They must have planted these clues in order to mislead us."
1003703-17 = "Let us begin our investigation. Luckily, the spy didn't hide their trail."
1003703-18 = "We'll follow their footprints, and hopefully find the spy before sundown."
1003703-19 = "[s] \"Before sundown?!\""
1003703-20 = "Red Winter Academy is one of the largest schools in Kivotos."
1003703-21 = "So much so, you could end up lost and eaten by a bear if you're not cautious."
1003703-22 = "What kind of incompetent student would end up lost in their own academy, though? I can't help but laugh at the thought."
1003703-23 = "[s3] \"I think I can actually think of one student...\"\n[s4] \"I'm suddenly very concerned...\""
1003703-24 = "Don't worry about a thing, Sensei! I know Red Winter Academy like the back of my hand. Better, even! We could never get lost."
1003703-25 = "Don't worry about a thing, Sensei! I know Red Winter Academy like the back of my hand. Better, even! We could never get lost."
1003703-27 = "A while later..."
1003703-31 = "W-We may be lost."
1003703-32 = "How could this happen? I was just following the suspect's trail!"
1003703-33 = "[s] \"You said you know this school like the back of your hand!\""
1003703-34 = "Haha! Hah! O-Of course! As Red Winter Academy's security chair,#nit is my duty to know the layout of the grounds."
1003703-35 = "Th-There's definitely a trail I often take in the mornings somewhere around here..."
1003703-36 = "There's no trail at all? Not even a small trail?"
1003703-37 = "And now I've lost the footprints! How am I going to find the spy?!"
1003703-38 = "[s] \"The footprints are leading to that storage.\""
1003703-40 = "Th-They are?!"
1003703-41 = "A-ha! Right there!"
1003703-42 = "The trail leads to the storage we use to store President Cherino's special pudding."
1003703-43 = "The spy must have thought it could cut off our supplies at the source."
1003703-45 = "You have a discerning eye, Sensei. To think you found a clue I couldn't even see."
1003703-46 = "I shall put in a recommendation for you to receive a special mustache medal!"
1003703-47 = "Now, let us go purge this spy!"
1003703-48 = "Hah!"
1003703-51 = "Hands in the air!"
1003703-52 = "I-Is this...?!"
1003703-56 = "[ns] \"A kitty cat.\""
1003703-57 = "..."
1003703-58 = "The spy is a horrific beast?!"
1003703-59 = "[s] \"Calm down, Marina. It's just a stray cat.\""
1003703-60 = "Those sharp claws and teeth would rip through my uniform."
1003703-61 = "We thought we found Red Winter's infiltrator, but now we're faced with an even greater threat."
1003703-62 = "What should I report to President Cherino? That we tracked down the culprit, but they were chased valiantly away?"
1003703-63 = "The president doesn't tolerate failure. We would be purged immediately.#nPerhaps I could tranquilize it?"
1003703-64 = "[s5] \"Marina, are you scared right now?\"\n[s6] \"Are you afraid of cats?\""
1003703-65 = "What? How could the Red Winter Academy security chair be scared of a cat?!"
1003703-66 = "What? How could the Red Winter Academy security chair be scared of a cat?!"
1003703-67 = "I solely am responsible for the Secretariat's safety! Be it bear or cat or intruder, I would stand valiantly—"
1003703-71 = "AHHH!"
1003703-75 = "Okay, fine. Perhaps I am not the most comfortable around cats."
1003703-76 = "I was scratched by a stray cat when I was a child. I just wanted to feed it."
1003703-77 = "Since then, I've been wary of approaching the beasts."
1003703-78 = "[s] \"Well, maybe you can start over with this cat. \""
1003703-79 = "Start over?! D-Do you want me to pet it, Sensei?!"
1003703-80 = "I could easily wrestle a hungry bear to the ground before approaching this beast!"
1003703-81 = "Even under the president's order, I wouldn't be able to—"
1003703-85 = "G-Get away from me!"
1003703-91 = "Is it gone...?"
1003703-92 = "[s7] \"Luckily, it dodged your bullet storm.\"\n[s8] \"I think all the shooting must've scared it away.\""
1003703-93 = "..."
1003703-94 = "..."
1003703-95 = "W-Well, congratulations on solving the case!"
1003703-96 = "Not only did we find out the identity of the pudding thief, we also put terror in the heart of the cat! It will never attack the Secretariat again!"
1003703-97 = "Hopefully, this means President Cherino will stop threatening to purge half the school if she doesn't get her pudding back."
1003703-98 = "But, I think something fell off the shelf just now. Y-You don't think it was the cat, right?"
1003703-102 = "I-Is that a statue of President Cherino?!"
1003703-103 = "Why is this statue here? Who dares damage the visage of our great leader?"
1003703-104 = "Wait... Did it come from my shooting earlier?"
1003703-105 = "Oh, no. All this work to further establish my loyalty to President Cherino,#nbut I ended up chipping at her authority instead..."
1003703-106 = "Please don't purge me!"
1003703-108 = "Although the cat was the one that stole the pudding, Marina was punished for breaking Cherino's statue..."

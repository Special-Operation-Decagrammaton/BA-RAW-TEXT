[translation]
1003703-1 = "การสันนิษฐานของหัวหน้าคณะฯ"
1003703-2 = "หน้าอาคารส่วนกลาง สหภาพเรดวินเทอร์"
1003703-3 = "(คุณครูได้รับข้อความจากมารินะ และได้มาถึงสหภาพเรดวินเทอร์)"
1003703-4 = "ครู ทางนี้!"
1003703-5 = "นี่คือจุดเกิดเหตุที่สายลับตัวร้ายบุกรุกเข้ามาในสำนักเลขาธิการแล้วแอบขโมยพุดดิ้งไปกิน"
1003703-6 = "แถมยังเป็นพุดดิ้งของท่านประธานเชริโน่อีก... นี่คืออาชญากรรมพุดดิ้งที่น่ารังเกียจ!"
1003703-7 = "[s] \"ทำไมคนร้ายถึงมาขโมยพุดดิ้งล่ะ?\""
1003703-8 = "มันก็ชัดเจนอยู่แล้ว คนร้ายจงใจขโมยของมีค่าที่นักเรียนทุกคนให้ความสำคัญเพื่อให้พวกเรา#nเกิดความสงสัยซึ่งกันและกัน และนี่จะเป็นความขัดแย้งในโรงเรียน"
1003703-9 = "แต่ก็ไม่สามารถตบตาหัวหน้าคณะความมั่นคงได้หรอก!"
1003703-10 = "ดูจากร่องรอยหลักฐานที่หลงเหลือแล้ว ฉันคาดว่าคนร้ายลอบเข้ามาทางหน้าต่าง"
1003703-11 = "และเมื่อดูจากรอยเท้า คนร้ายจะต้องตัวเล็ก สูงไม่เกิน 1 เมตรอย่างแน่นอน ฉันว่าใช้ปากคาบ#nพุดดิ้งแล้วคลาน 4 เท้าออกหน้าต่างไป..."
1003703-12 = "[s1] \"แบบนั้นไม่น่าเรียกว่าสายลับนะ...\"\n[s2] \"เป็นสัตว์ป่ามาคาบไปหรือเปล่านะ?\""
1003703-13 = "อย่าด่วนสรุปสิครู!"
1003703-14 = "อย่าด่วนสรุปสิครู!"
1003703-15 = "สายลับที่แอบแฝงเข้าสหภาพเรดวินเทอร์มาเป็นอัจฉริยะในการปลอมตัว"
1003703-16 = "เราจึงไม่สามารถสรุปตัวตนที่แท้จริงของเขาได้ด้วยร่องรอยเพียงอย่างเดียวเท่านั้น เพราะเขา#nปลอมตัวเป็นใครก็ได้!"
1003703-17 = "ก่อนอื่นเราตามรอยเท้าที่ทิ้งไว้ก่อนดีกว่า"
1003703-18 = "สายลับตัวร้ายทิ้งรอยเท้าเอาไว้แบบนี้ ดีไม่ดีเราอาจไปถึงแหล่งกบดานของเขาก่อนพระอาทิตย์ตกดิน#nเลยก็ได้"
1003703-19 = "[s] \"ก่อนพระอาทิตย์ตกดิน...?\""
1003703-20 = "อื้ม ก็สหภาพเรดวินเทอร์มีพื้นที่กว้างขวางที่สุดในคิโวทอสนี่นา"
1003703-21 = "กว้างถึงขนาดที่ว่า หากไปไหนส่งๆ โดยไม่กำหนดจุดหมายปลายทางก็อาจประสบภัยได้เลย"
1003703-22 = "แต่คงไม่มีคนเซ่อที่ไหนที่เจอเหตุร้ายในโรงเรียนหรอกเนอะ? ฮ่ะฮ่ะฮ่า!"
1003703-23 = "[s3] \"ประสบภัย... ในโรงเรียนงั้นเหรอ...\"\n[s4] \"ทำไมถึงได้สังหรณ์ใจแปลกๆ ขึ้นมากันนะ...\""
1003703-24 = "ไม่ต้องกังวลว่าจะเจอเหตุร้ายหรอกครู ฉันรู้จักทุกซอกทุกมุมของสหภาพเรดวินเทอร์เป็นอย่างดี ถ้าอยู่กับฉันไม่มีวันหลงทางแน่นอน"
1003703-25 = "ไม่ต้องกังวลว่าจะเจอเหตุร้ายหรอกครู ฉันรู้จักทุกตารางนิ้วของสหภาพเรดวินเทอร์เป็นอย่างดี ถ้าอยู่กับฉันไม่มีวันหลงทางแน่นอน"
1003703-27 = "(สักพักต่อมา)"
1003703-31 = "ฉันต้องหลงทางแน่เลย..."
1003703-32 = "ทำไงดี? เราก็ตามรอยเท้ามาดีๆ นี่นา...!"
1003703-33 = "[s] \"ไหนว่ารู้จักทุกตารางนิ้วละ?\""
1003703-34 = "ตะ... ต้องรู้อยู่แล้วสิ! ในฐานะของหัวหน้าคณะความมั่นคงของสหภาพเรดวินเทอร์ ฉันรู้จัก#nภูมิศาสตร์ของโรงเรียนเป็นอย่างดี"
1003703-35 = "และแถวนี้ก็มีทางเดินที่ฉันชอบออกมาเดินเล่นบ่อยๆ..."
1003703-36 = "หรือว่าไม่มีนะ...? ทำไมรู้สึกไม่คุ้นกับทัศนียภาพรอบตัวเลย"
1003703-37 = "ตอนนี้ไม่เห็นรอยเท้าแล้วด้วย... หรือว่าจะคลาดกับคนร้ายแล้ว..."
1003703-38 = "[s] \"รอยเท้าที่เราตามมามุ่งหน้าไปทางคลังเก็บของนะ\""
1003703-40 = "ขอฉันดูหน่อย..."
1003703-41 = "จริงด้วย!"
1003703-42 = "มีถ้วยพุดดิ้งทิ้งไว้หน้าคลังเก็บของด้วย... แถมยังเป็นถ้วยของประธานเชริโน่อีกต่างหาก!"
1003703-43 = "แสดงว่าสายลับตัวร้ายนั่นซ่อนตัวอยู่ที่นี่!"
1003703-45 = "ครูมีไหวพริบดีมากเลยนะ สังเกตเห็นร่องรอยคนร้ายที่แม้แต่ฉันเองยังไม่พบ"
1003703-46 = "หากจับตัวสายลับได้สำเร็จ ฉันจะไปเสนอให้มีการมอบเหรียญรางวัลหนวดพิเศษให้ครู!"
1003703-47 = "เอาละ เราไปจับตัวสายลับตัวร้ายนั่นกันเลยมั้ย?"
1003703-48 = "...จู่โจม!"
1003703-51 = "หยุดนะเจ้าสายลับ!"
1003703-52 = "เอ๋? นี่มัน..."
1003703-56 = "[ns] \"น้องแมวนี่นา น่ารักเกินปุยมุ้ย\""
1003703-57 = "......"
1003703-58 = "สัตว์ร้ายปรากฏตัว!"
1003703-59 = "[s] \"ใจเย็นก่อนมารินะ น้องแค่แมวจรธรรมดา\""
1003703-60 = "จะให้ใจเย็นได้ยังไงล่ะ! ครูไม่เห็นเล็บและเขี้ยวที่แหลมคมนั้นเหรอ?!"
1003703-61 = "นึกว่าเจอแหล่งกบดานของสายลับแล้วเสียอีก แต่กลายเป็นว่ามาเจอเหตุร้ายที่ใหญ่กว่าซะงั้น..."
1003703-62 = "แบบนี้ต้องไปรายงานกับท่านประธานเชริโน่ว่ายังไงดีนะ? เราเจอหัวขโมยพุดดิ้งแล้ว แต่ต้องหนีมาอย่างไม่มีทางเลือก?"
1003703-63 = "แต่ถ้าทำอย่างนั้นต้องโดนท่านประธานเชริโน่ลงโทษแน่ๆ... หรือว่าควรเตรียมปืนยาสลบมาแล้วจับเป็นไปเลย?"
1003703-64 = "[s5] \"มารินะ นี่เธอกลัว...\"\n[s6] \"กลัวแมวเหรอ?\""
1003703-65 = "ว่าไงนะ? หัวหน้าคณะความมั่นคงของสหภาพเรดวินเทอร์ไม่มีทางกลัวแมวหรอกน่า!"
1003703-66 = "ว่าไงนะ? หัวหน้าคณะความมั่นคงของสหภาพเรดวินเทอร์ไม่มีทางกลัวแมวหรอกน่า!"
1003703-67 = "ในฐานะของหัวหน้าคณะฯ ที่รับผิดชอบความปลอดภัยแห่งสำนักเลขาธิการ แม้แต่หมีตัวใหญ่ๆ ฉันก็ไม่..."
1003703-71 = "ว้ายยย!"
1003703-75 = "กะ... ก็ได้ ฉันยอมรับก็ได้ว่ากลัวแมว..."
1003703-76 = "ตอนเด็กๆ ฉันเคยให้ขนมแมวจร แต่กลับโดนข่วนหน้ามา..."
1003703-77 = "และหลังจากนั้นฉันก็ไม่อยากเข้าใกล้แมวอีกเลย..."
1003703-78 = "[s] \"ลองใช้โอกาสนี้ทำความสนิทสนมกับแมวดูมั้ยล่ะ?\""
1003703-79 = "จะบ้าเหรอครู? ทำความสนิทสนมกับแมวงั้นเหรอ!"
1003703-80 = "จะให้มาผูกมิตรกับสัตว์ร้ายน่ากลัวแบบนี้ ฉันยอมไปคุยกับหมีที่หิวโหยยังจะดีซะกว่า!"
1003703-81 = "และถึงจะเป็นคำสั่งของท่านประธาน ฉันก็ไม่มีทาง..."
1003703-85 = "อย่าเข้ามาใกล้นะ!!!"
1003703-91 = "มะ... มันไปแล้วรึยัง?"
1003703-92 = "[s7] \"ดีนะที่ไม่โดนกระสุน\"\n[s8] \"หนีไปแล้ว\""
1003703-93 = "......"
1003703-94 = "......"
1003703-95 = "เอาเถอะ ถือว่าปิดคดีนี้เท่านี้!"
1003703-96 = "เพราะเรารู้แล้วว่าใครคือคนร้ายที่ขโมยพุดดิ้งของท่านประธานไป และฉันก็ได้สั่งสอนไปแล้วด้วย ต่อไปคงไม่กล้าย่างกรายมาที่สำนักเลขาธิการแล้วละ"
1003703-97 = "ทีนี้ท่านประธานเชริโน่ก็คงหายโกรธที่พุดดิ้งถูกขโมยไป..."
1003703-98 = "จะว่าไป เมื่อกี้เหมือนมีอะไรตกลงมาจากชั้นวางของ นี่มันอะไรเนี่ย?"
1003703-102 = "รูปปั้นท่านประธานเชริโน่!"
1003703-103 = "ทำไมรูปปั้นท่านประธานถึงมาอยู่ในที่แบบนี้ล่ะ? แถมยังอยู่ในสภาพที่ดูไม่ได้เลย!"
1003703-104 = "หา...? ครูจะบอกว่ารูปปั้นนี้ตกลงมาเพราะแรงสั่นที่ฉันยิงปืนออกไปเมื่อกี้เหรอ?"
1003703-105 = "ปะ... เป็นไปไม่ได้ ฉันตั้งใจทำงานนี้เพื่อให้ท่านประธานหายเข้าใจผิดและพึงพอใจ แต่กลายเป็นว่า#nสุดท้ายก็ก่อเรื่องให้อำนาจของท่านเสื่อมเสีย..."
1003703-106 = "ฉันไม่อยากโดนลงโทษแล้วนะ!"
1003703-108 = "(แม้จะเปิดเผยความจริงเรื่องแมวจรขโมยพุดดิ้งได้ แต่สุดท้ายมารินะก็ได้รับโทษที่ทำรูปปั้นเชริโน่แตก)"

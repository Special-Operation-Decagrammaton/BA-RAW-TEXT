[translation]
1003703-1 = "#title;보안위원장의 추리"
1003703-2 = "#place;붉은겨울 학원 본관 앞"
1003703-3 = "#na;(마리나의 문자를 받고 붉은겨울 학원에 도착했다.)"
1003703-4 = "3;마리나;02;선생, 이쪽이다.\n#3;em;[반응]\n#3;a"
1003703-5 = "3;마리나;01;이곳이 바로 그 비열한 스파이가 사무국에 침입해 몰래 푸딩을 훔쳐 간 범행 현장이다."
1003703-6 = "3;마리나;05;하필이면 다른 사람도 아닌 체리노 회장님의 푸딩을 노려 범행을 저지르다니…… 괘씸한 녀석 같으니라고!\n#3;em;[빠직]\n#3;stiff"
1003703-7 = "[s] \"그 범인은 어째서 푸딩을 훔친 걸까?\""
1003703-8 = "3;마리나;02;그야 뻔하지. 모든 학생들이 소중히 여기는 귀중품을 훔쳐 서로를 의심하게 만든 뒤, 학원에 내분을 일으키려는 속셈이었을 게다.\n#3;em;[반응]"
1003703-9 = "3;마리나;99;하지만 다른 사람이라면 몰라도 이 보안위원장의 눈을 속일 수는 없지!"
1003703-10 = "3;마리나;01;이곳에 남겨진 흔적을 볼 때, 스파이는 외부의 창문을 통해 침입한 것으로 추측된다.\n#3;m4"
1003703-11 = "3;마리나;05;발자국의 크기를 보니…… 스파이는 1m도 되지 않는 작은 몸을 가진 게 분명하고, 네발로 기어 푸딩을 입에 문 채 창문 밖으로 다시 빠져나간 것 같군.\n#3;em;…"
1003703-12 = "[s1] \"그건 스파이가 아니라…….\"\n[s2] \"들짐승이 물어간 거 아냐?\""
1003703-13 = "3;마리나;02;속단은 금물이다, 선생!\n#3;m3\n#3;em;[!]"
1003703-14 = "3;마리나;02;속단은 금물이다, 선생!\n#3;m3\n#3;em;[!]"
1003703-15 = "3;마리나;99;붉은겨울 학원에 잠입한 스파이는 변장의 귀재."
1003703-16 = "3;마리나;01;그 어떤 모습으로도 변장할 수 있는 존재인 만큼, 흔적만으로 정체를 속단할 수는 없어!"
1003703-17 = "3;마리나;01;우선은 녀석의 발자국이 남아 있으니, 이를 먼저 뒤쫓아 볼까.\n#3;em;…"
1003703-18 = "3;마리나;11;녀석이 발자국을 지우는 걸 잊은 채 돌아간 것 같으니, 운이 좋다면 해가 지기 전에 그의 본거지에 도달할 수도 있을 거야."
1003703-19 = "[s] \"해가 지기 전에……?\""
1003703-20 = "3;마리나;03;음, 붉은겨울 학원은 키보토스에서도 가장 광활한 부지를 갖고 있으니까.\n#3;greeting"
1003703-21 = "3;마리나;01;목적지를 정하지 않고 무작정 돌아다니다가는 조난을 당할 수 있을 만큼 넓지."
1003703-22 = "3;마리나;09;하지만 설마 학원 내에서 조난을 당하는 멍청이가 정말로 있겠어? 하하하!\n#3;em;[재잘]\n#3;hophop"
1003703-23 = "[s3] \"학원 부지 내에서 조난이라니…….\"\n[s4] \"어쩐지 불길한 예감이…….\""
1003703-24 = "3;마리나;11;조난은 걱정하지 않아도 좋다, 선생. 붉은겨울 학원의 지리를 완벽하게 숙지하고 있는 나와 함께 라면 길을 잃는 일은 절대 없을 테니까!\n#3;em;[반짝]"
1003703-25 = "3;마리나;11;조난은 걱정하지 않아도 좋다, 선생. 붉은겨울 학원의 지리를 완벽하게 숙지하고 있는 나와 함께 라면 길을 잃는 일은 절대 없을 테니까!\n#3;em;[반짝]"

1003703-33 = "[s] \"지리는 완벽하게 숙지하고 있다며?\""
1003703-34 = "3;마리나;11;무, 물론이지! 붉은겨울 학원의 보안위원장으로서 학원의 지리는 완벽하게 기억하고 있으니까.\n#3;em;[반응]\n#3;hophop"
1003703-35 = "3;마리나;07;이 근처만 하더라도 평소에 자주 산책을 하러 나오는 산책로가……."
1003703-36 = "3;마리나;10;……아닌가? 어쩐지 주변 풍경이 조금 낯설게 느껴지는데?\n#3;em;…"
1003703-37 = "3;마리나;12;우으…… 이제는 발자국의 흔적마저 보이질 않아. 범인은 놓친 건가…….\n#3;stiff"

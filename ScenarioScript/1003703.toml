[translation]
1003703-1 = "保安委員長的推理"
1003703-2 = "赤冬聯邦學園的本館前"
1003703-3 = "（收到瑪麗娜的訊息，到達了赤冬聯邦學園）"
1003703-4 = "老師，這裡。"
1003703-5 = "這裡就是那個犯罪現場。是那個卑劣的間諜悄悄入侵，偷走布丁的地方。"
1003703-6 = "竟然偏偏盯上了潔莉諾會長的布丁……無法原諒的傢伙！"
1003703-7 = "[s]「那個犯人，為什麼偷了布丁呢？」"
1003703-8 = "目的很明顯。盡可能地竊取貴重的東西引起學園內的騷動，打算趁機在學園引起內部紛爭吧！"
1003703-9 = "不過，騙不過我這個保安委員長的眼睛！"
1003703-10 = "觀察這一帶的痕跡，可以推測出間諜是從窗戶入侵的。"
1003703-11 = "根據這個腳印……間諜的身高連1m也沒有呢，體型非常的小。還有恐怕是四足步行。"
1003703-12 = "[s1]「那也就是，不是間諜……」\n[s2]「而是這一帶的野生動物拿走的吧……？」"
1003703-13 = "要判斷還太早了，老師！"
1003703-14 = "要判斷還太早了，老師！"
1003703-15 = "畢竟對方是，可以入侵赤冬聯邦學園的變裝達人！"
1003703-16 = "有可以變裝成任何樣子的可能性……也就是光憑這個痕跡，還沒辦法斷言身份！"
1003703-17 = "雖然如此，現在只能依賴這個足跡了。總之跟上去看看吧。"
1003703-18 = "運氣好的話在日落前，也許可以抵達間諜的基地也說不定。"
1003703-19 = "[s]「就算運氣好，也要花那麼久嗎……？」"
1003703-20 = "啊啊。畢竟這個赤冬聯邦學園自治區，以奇普托斯最大的腹地面積為榮。"
1003703-21 = "廣闊到不習慣的人不決定目的地走來走去的話，輕易就會遇難的程度。"
1003703-22 = "嘛，特別是赤冬的學生不會有那種笨蛋啊！哈哈哈哈！"
1003703-23 = "[s3]「在學園的自治區內遇難……」\n[s4]「總有種，不好的預感……」"
1003703-24 = "不用擔心，老師。我幾乎完美的掌握了這個學園的地理。就當作上了大船跟上來就好了！"
1003703-25 = "不用擔心，老師。我幾乎完美的掌握了這個學園的地理。就當作上了大船跟上來就好了！"
1003703-27 = "（這之後……）"
1003703-31 = "……迷路了呢。"
1003703-32 = "為何，明明只是沿著腳印前進而已……！"
1003703-33 = "[s]「記得剛才，瑪麗娜說了掌握了地理是……」"
1003703-34 = "不，不是謊言！身為赤冬聯邦學園的保安委員長，那是當然的事！"
1003703-35 = "應該是，那樣沒錯的……"
1003703-36 = "……嗯？總覺得這一帶的景色，好像已經是沒有看過的……。"
1003703-37 = "咕，腳印也看不見了……這是，錯過犯人了嗎……"
1003703-38 = "[s]「剛才的腳印的話，似乎連到了那邊的倉庫唷。」"
1003703-40 = "什……"
1003703-41 = "是真的耶！"
1003703-42 = "而且，掉落在倉庫入口的那些是……原本被偷走的，潔莉諾會長的布丁！"
1003703-43 = "也就是那個間諜，肯定躲在這裡不會錯！"
1003703-45 = "還不錯嘛老師。竟然能發現，連我都錯過的犯人的痕跡……"
1003703-46 = "順利抓到間諜的時候，我來試著提案授予老師「特別勇猛鬍鬚勳章」吧！"
1003703-47 = "好了，那麼來把那個卑劣的間諜引至黃泉吧。"
1003703-48 = "……[ruby=突擊]Ура[/ruby]！"
1003703-51 = "不准動，可惡的間諜！"
1003703-52 = "什……！"
1003703-56 = "[ns]「是可愛的，貓咪呢。」"
1003703-57 = "……"
1003703-58 = "怎麼會，不是間諜而是猛獸！？"
1003703-59 = "[s]「冷靜點，瑪麗娜。只是流浪貓唷。」"
1003703-60 = "怎，怎麼冷靜啊！老師沒看見那個尖銳的爪子和尖牙嗎！？"
1003703-61 = "還以為終於找到了間諜的大本營，沒想到前方還潛藏著更大的威脅……"
1003703-62 = "咕……不過在這裡退縮的話，該怎麼向潔莉諾會長報告才好？雖然找到了竊取布丁的犯人，卻只能撤退？"
1003703-63 = "可是，那樣的話會被肅清……用麻醉槍或什麼生擒，交給事務局嗎……？將那個猛獸？"
1003703-64 = "[s5]「瑪麗娜，妳該不會……」\n[s6]「怕貓之類的？」"
1003703-65 = "你，你說什麼！？赤冬聯邦學園的保安委員長，不可能因為區區一隻貓而害怕吧！"
1003703-66 = "你，你說什麼！？赤冬聯邦學園的保安委員長，不可能因為區區一隻貓而害怕吧！"
1003703-67 = "就算是暴怒失控的熊襲擊過來，我也絕不會──"
1003703-71 = "嗚啊啊啊！"
1003703-75 = "……坦白說吧。我不擅長對付貓……"
1003703-76 = "小時候，打算給流浪貓零食的時候，臉被抓了……"
1003703-77 = "自那以來，就不想再靠近貓……"
1003703-78 = "[s]「那趁這個機會，試著重新變得友好如何？」"
1003703-79 = "什，認真的嗎老師！？和貓變得友好！？"
1003703-80 = "要和那個恐怖的猛獸結交友誼的話，不如和飢餓的熊對話還比較好！"
1003703-81 = "就算那是來自會長的命令，我也沒辦法做到那種──"
1003703-85 = "不，不要過來！！！"
1003703-91 = "啊……"
1003703-92 = "[s7]「子彈，沒打中真是太好了……」\n[s8]「逃走了呢。」"
1003703-93 = "……"
1003703-94 = "……"
1003703-95 = "總，總之這樣事件就解決了！"
1003703-96 = "知道了竊取會長布丁的犯人，確實給予了那個犯人警告。已經不會再做那種事了吧。"
1003703-97 = "這樣潔莉諾會長的怒氣，應該也會稍微緩和……"
1003703-98 = "……話說回來剛才，從架子上面掉了什麼下來呢。那是什麼？"
1003703-102 = "潔，潔莉諾會長的石像！！"
1003703-103 = "為什麼會長的石像會在這種地方！？而且，為什麼會是這副模樣……！"
1003703-104 = "……咦，我？剛才用槍亂掃的時候……？"
1003703-105 = "怎，怎麼會，好不容易特定了竊取布丁的犯人……相伴的，竟然讓會長的權威喪失了嗎……！？"
1003703-106 = "這之上的肅清我已經受夠啦啊啊啊啊啊啊啊！！"
1003703-108 = "（這之後即使判明了「犯人是貓」這件事，瑪麗娜似乎因為弄壞了潔莉諾的石像作為懲罰再次接受了懲戒……）"

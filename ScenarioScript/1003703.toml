1003703-60 = "3;마리나;08;어, 어떻게 진정할 수 있겠어! 선생은 저 날카로운 손톱과 이빨이 보이지 않는 거야?!\n#3;em;[땀]\n#3;stiff"
1003703-61 = "3;마리나;06;간신히 스파이의 본거지를 찾아냈다고 생각했는데, 설마 더 큰 위협이 도사리고 있었을 줄이야……."

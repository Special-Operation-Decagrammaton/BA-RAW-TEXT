[translation]
80000117-1 = "เทศกาลวาเลนไทน์"
80000117-2 = "วันนี้เป็นวันวาเลนไทน์แล้วนะคะ คุณครู!"
80000117-3 = "[s] \"งะ... งั้นเหรอ...?\""
80000117-4 = "วันวาเลนไทน์สำหรับคุณครูเป็นวันแบบไหนเหรอคะ? สำหรับฉันแล้ว... มันคืองานเทศกาลแห่ง#nช็อกโกแลตค่ะ!"
80000117-5 = "[s] \"นั่นสินะๆ...\""
80000117-6 = "ที่ทุกคนเอาช็อกโกแลตมาแบ่งกันมันก็ดีเหมือนกันนะคะ เพราะงั้นการเตรียมตัวให้พร้อมก็นับว่าเป็น#nเรื่องที่ดีเช่นกันค่ะ"
80000117-7 = "คงจะดีไม่น้อยเลยถ้าหากวันนี้ผู้คนจะมีความสุขขึ้นสักเล็กๆ น้อยๆ และก็คงจะดีไม่น้อยเลยที่#nช็อกโกแลตที่ถูกห่อไว้อย่างสวยงามได้ถูกส่งต่อให้กันและกัน..."
80000117-8 = "ไม่ว่ายังไงก็ดีทุกอย่างเลยค่ะ!"
80000117-9 = "เรื่องของเรื่องก็คือ... ไม่มีการละเล่นยิงดอกไม้ไฟช็อกโกแลตบ้างเลยเหรอคะ?!"
80000117-10 = "[s] \"ยิงดอกไม้ไฟช็อกโกแลตคืออะไรน่ะ อุมิกะ...\""
80000117-11 = "นะ... นั่นสินะคะ ฉันเองก็ไม่ค่อยรู้หรอกค่ะ..."
80000117-12 = "แต่ว่าเราเอาช็อกโกแลตมาทำเป็นดอกไม้ไฟทรงจรวด แล้วยิงขึ้นไประเบิดบนฟ้าให้ตกลงมาเหมือน#nฝนหรือหิมะ..."
80000117-13 = "หรือไม่ก็ผสมช็อกโกแลตลงในพลุไฟเย็นให้มีกลิ่นช็อกโกแลตหอมฟุ้งพร้อมประกายไฟแบบนั้นก็ได้นี่#nคะ!"
80000117-14 = "[s] \"ครูว่ามันก็ยากอยู่นะ...\""
80000117-15 = "คงไม่ได้สินะคะ..."
80000117-16 = "แต่ยังไงเทศกาลช็อกโกแลตก็ยังเป็นเทศกาลที่ดีนะคะ!"
80000117-17 = "ฉันเองก็..."
80000117-18 = "คือ..."
80000117-19 = "ฉันคิดว่าความหมายอีกประการหนึ่งของวาเลนไทน์ก็สำคัญเหมือนกันนะคะ..."
80000117-20 = "ในร้านเฮียกคิยาโคก็เหมือนกันค่ะ เรายังหวังว่าจะเพิ่มยอดขายด้วยการทำผลิตภัณฑ์พิเศษสำหรับวัน#nวาเลนไทน์ออกมาด้วยค่ะ"
80000117-21 = "ถ้าผสมช็อกโกแลตลงในของหวานหรือขนมต่างๆ ลูกค้าจะต้องมาซื้อกันยกใหญ่แน่ๆ เลยค่ะ!"
80000117-22 = "ปกติคนที่ลืมว่าวันนี้เป็นวันวาเลนไทน์ มักไม่ค่อยแสดงออกว่าตัวเองลืม"
80000117-23 = "และเอาไว้เป็นข้ออ้างดีๆ ให้พวกเขาบอกว่ากำลังคิดถึงเมนูพิเศษวันวาเลนไทน์ของร้านเฮียกคิยาโค#nได้ด้วยนะคะ!"
80000117-24 = "[s] \"เป็นอุบายที่น่ากลัวจริงๆ นะ ร้านเฮียกคิยาโคเนี่ย!\""
80000117-25 = "ปะ... ประธานเป็นคนคิดนี่คะ...?"
80000117-26 = "อันที่จริงฉันยังคิดไม่ออกเลยค่ะว่าวิธีนั้นมันจะเป็นวิธีที่ดี..."
80000117-27 = "[s1] \"ก็อุมิกะยังเป็นแค่เด็กปี 1 เองนี่นา\"\n[s2] \"โลกเรายังมีอะไรให้เรียนรู้อีกเยอะเลยละ\""
80000117-30 = "ค่ะ! สักวันหนึ่งฉันจะต้องเก่งกาจให้ได้เหมือนท่านประธาน..."
80000117-31 = "ให้งานเทศกาลยิ่งใหญ่กว่าอะไรในโลก...!"
80000117-32 = "ต้องยิ่งใหญ่...!!!"
80000117-36 = "ยังไงก็เถอะค่ะ ฉันคิดว่าจะต้องทำอะไรบางอย่างได้สำเร็จแน่ๆ ค่ะ!"
80000117-37 = "[s3] \"ครูเป็นกำลังใจให้นะ...\"\n[s4] \"ขออย่าเป็นอะไรที่น่ากลัวๆ ก็แล้วกัน...\""
80000117-40 = "ยังไงก็ตาม ฉันคิดว่าสิ่งสำคัญคือความตั้งใจใหม่ในทุกๆ วันค่ะ!"
80000117-41 = "คะ... คิดแล้วเชียวเพื่อการนั้นฉันจะต้อง...!"
80000117-42 = "จะ... จะต้อง..."
80000117-43 = "......"
80000117-44 = "คุณครูคอยสนับสนุนฉันในหลายๆ ด้านมาโดยตลอด!"
80000117-45 = "ฉันก็เลยอยากจะ เอ่อ คือ... คือว่า..."
80000117-46 = "......"
80000117-47 = "ชะ... ใช่แล้วค่ะ เพื่อตอบแทนบุญคุณของคุณครูค่ะ!"
80000117-48 = "ถะ... ถึงมันอาจจะเป็นแค่ส่วนเล็กๆ..."
80000117-49 = "แต่ฉันก็อยากส่งมอบความรู้สึกของฉันเพื่อเป็นการตอบแทน... ให้คุณครูค่ะ..."
80000117-50 = "เพราะงั้นฉันเลยเตรียมสิ่งนี้มาด้วยค่ะ!"
80000117-55 = "[ns] \"นี่มัน...  ช็อกโกแลตรูปเกี้ยว?\""
80000117-56 = "ใช่แล้วค่ะ! ฮิฮิฮิ..."
80000117-57 = "หนึ่งในสิ่งที่ไม่ควรพลาดเมื่อไปงานเทศกาลก็คือศาลเจ้าใช่มั้ยล่ะคะ?"
80000117-58 = "ฉันเลยลองทำช็อกโกแลตเป็นรูปร่างแบบนั้นดูค่ะ"
80000117-59 = "ส่วนหลังคาเปิดออกได้แบบนี้ด้วยนะคะ!"
80000117-60 = "[s] \"โอ้ว วันเดอร์ฟูล! คงตั้งใจทำมากเลยสินะเนี่ย!\""
80000117-61 = "ขอบคุณค่ะคุณครู และส่วนที่สำคัญที่สุด... อยู่ข้างในศาลเจ้านี้..."
80000117-62 = "คือ..."
80000117-63 = "ฉันใส่ช็อกโกแลตสุดพิเศษเอาไว้ข้างในอีกชั้นหนึ่งค่ะ"
80000117-64 = "คุณครูรู้รึเปล่าคะ...?"
80000117-65 = "เล่ากันว่าศาลเจ้าที่ใช้ในงานเทศกาลมีเทพเจ้าสถิตอยู่ด้วยค่ะ"
80000117-66 = "ว่ากันว่าท่านเทพจะคอยรับฟังความปรารถนาของทุกคน และประทานพรให้เป็นจริงค่ะ"
80000117-67 = "เทพเจ้าองค์สำคัญจะสถิตอยู่ที่ใจกลางของศาลเจ้าตลอดงานเทศกาล"
80000117-68 = "และอวยพรให้แก่ผู้ที่มาร่วมงานเทศกาลให้มีความสุข ความรื่นเริง และความโชคดีค่ะ"
80000117-69 = "ดังนั้นภายในศาลเจ้าจึงมักจะปล่อยให้ว่างเปล่า หรือไม่ก็บรรจุวัตถุศักดิ์สิทธิ์เอาไว้..."
80000117-70 = "แต่สำหรับฉันแล้วท่านเทพที่สถิตอยู่ในศาลเจ้า..."
80000117-71 = "ฉันรู้สึกว่าคล้ายกับคุณครูอย่างน่าประหลาดเลยค่ะ"
80000117-72 = "[s] \"หืม? ครูเหรอ?\""
80000117-73 = "คะ... ค่ะ..."
80000117-74 = "อย่างน้อยสำหรับฉันก็เป็นอย่างนั้นค่ะ"
80000117-75 = "ดังนั้นฉันเลยทำช็อกโกแลตเป็นรูปศาลเจ้าที่บรรจุวัตถุศักดิ์สิทธิ์เข้าไปไว้ข้างใน..."
80000117-76 = "แต่วัตถุศักดิ์สิทธิ์ที่อยู่ด้านใน... ฉันทำขึ้นมาโดยที่นึกถึงแต่คุณครูคนเดียวเลยค่ะ..."
80000117-77 = "เพราะงั้นคุณครู..."
80000117-78 = "ถึงช็อกโกแลตวันวาเลนไทน์จะเริ่มกินจากตรงส่วนไหนก่อนก็ได้"
80000117-79 = "แต่ถ้าคุณครูไม่ว่าอะไร ฉันอยากให้ช่วยเปิดตรงชิ้นหลังคาออก..."
80000117-80 = "แล้วค่อยๆ เริ่มกินจากช็อกโกแลตที่อยู่ตรงส่วนด้านในด้วยนะคะ"
80000117-81 = "เพราะนั่นคือความรู้สึกของฉันที่มีต่อคุณครูค่ะ..."
80000117-82 = "[s5] \"ครูซาบซึ้งใจสุดๆ เลย\"\n[s6] \"ขอบคุณนะ จะกินให้อร่อยเลย\""
80000117-85 = "ขอบคุณค่ะ!"
80000117-86 = "ถะ... ถ้าอย่างนั้นเดี๋ยวฉันจะชงชาที่เข้ากับช็อกโกแลตมาให้นะคะ!"
80000117-87 = "ค่อยๆ ทานช้าๆ นะคะ... เดี๋ยวจะจุกเอาค่ะ!"
80000117-88 = "ถ้างั้นขอตัวสักครู่นะคะ!"
80000117-93 = "(คุณครูมองตามแผ่นหลังของอุมิกะที่วิ่งหายเข้าไปในครัวด้วยใบหน้าที่แดงก่ำ)"
80000117-94 = "(จากนั้นก็ค่อยๆ หยิบช็อกโกแลตวัตถุศักดิ์สิทธิ์ที่อยู่ด้านในศาลเจ้าออกมากิน)"

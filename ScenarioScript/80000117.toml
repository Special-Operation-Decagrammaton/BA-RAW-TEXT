[translation]
80000117-1 = "Valentine Festival"
80000117-2 = "It's Valentine's Day, Sensei!"
80000117-3 = "[s] \"R-Right, and...?\""
80000117-4 = "How do you see Valentine's Day, Sensei? To me...it's a chocolate festival!"
80000117-5 = "[s] \"Yes, yes...\""
80000117-6 = "I really appreciate the tradition of sharing chocolates. And I like how exciting it is to prepare chocolates to give out."
80000117-7 = "AND I like how the world becomes a happier place during this time, as well as how there are chocolates in pretty packaging being sold everywhere..."
80000117-8 = "Anyways, I like everything!"
80000117-9 = "So I got curious, is there anything out there like chocolate fireworks?!"
80000117-10 = "[s] \"What do you mean by chocolate fireworks? Umika...\""
80000117-11 = "N-Now that you mention it, I don't know either..."
80000117-12 = "Maybe we can put chocolate in a fireworks rocket, shoot it up in the air, and make it fall everywhere, like rain or snow!"
80000117-13 = "Or we can mix chocolate into a sparkler so that it smells like chocolate as it burns!"
80000117-14 = "[s] \"I feel like that'd cause some problems...\""
80000117-15 = "So it really is impossible..."
80000117-16 = "Well, I like this chocolate festival anyways!"
80000117-17 = "I..."
80000117-18 = "...also..."
80000117-19 = "...place importance on the other meaning of Valentine's Day, you know?"
80000117-20 = "Even in Momoyodou, we look to make more sales by stocking special Valentine's Day products."
80000117-21 = "Everyone cheerily comes in to buy various chocolate wagashi and desserts!"
80000117-22 = "...It's also helpful for those who tend to forget about Valentine's Day!"
80000117-23 = "They can use it as an excuse and say they came in specifically for Momoyodou's Valentine specials!"
80000117-24 = "[s] \"That's a scary business scheme from Momoyodou!\""
80000117-25 = "I-It was the boss' idea...!"
80000117-26 = "I don't have quite the same business acumen as her, to be coming up with ideas like that."
80000117-27 = "[s1] \"That's because you're still a first-year, Umika.\"\n[s2] \"You still have a lot of room to grow!\""
80000117-30 = "Yes! One day, just like boss, I'll skillfully...!"
80000117-31 = "I'll cover the whole world with festivals using incredible...!"
80000117-32 = "Incredible...!!"
80000117-36 = "Incredible somethings! I'll accomplish something!"
80000117-37 = "[s3] \"I'll be rooting for you...\"\n[s4] \"Don't do anything too scary...\""
80000117-40 = "Anyways, I think what's important is to start everyday with a fresh mindset!"
80000117-41 = "And in order to do that...!"
80000117-42 = "T-To do that..."
80000117-43 = "..."
80000117-44 = "For you, who's always supported me..."
80000117-45 = "I should, uh, um..."
80000117-46 = "..."
80000117-47 = "R-Right! To show my gratitude! That's what this is!"
80000117-48 = "Although it would only be a fraction of everything you've given me..."
80000117-49 = "I wanted to... I thought I could...repay your kindness..."
80000117-50 = "So I prepared this!"
80000117-55 = "[ns] \"Is this...a chocolate palanquin?\""
80000117-56 = "You're right! Heehee..."
80000117-57 = "Every festival needs a palanquin, right?"
80000117-58 = "So I tried making chocolate shaped like one."
80000117-59 = "You can even open the roof, like this!"
80000117-60 = "[s] \"Oooh, that's so cool! You really put your heart into this!\""
80000117-61 = "Thank you, Sensei. And inside the palanquin, in the part where you place what's most precious to you..."
80000117-62 = "I..."
80000117-63 = "I tried putting my special chocolate in there."
80000117-64 = "...Did you know, Sensei?"
80000117-65 = "They say divine spirits inhabit festival palanquins."
80000117-66 = "Those spirits then grant people's wishes or bless festival-goers."
80000117-67 = "That's why the most important person of the festival is seated in the palanquin."
80000117-68 = "They spread goodness to all the festival-goers, things like joy, happiness, fortune, and delight."
80000117-69 = "So people will also leave the inside empty or place sacred objects..."
80000117-70 = "But for some reason, I thought the divine spirit in the palanquin..."
80000117-71 = "...was kind of like you, Sensei."
80000117-72 = "[s] \"Oh? Me?\""
80000117-73 = "Y-Yes..."
80000117-74 = "That's how I feel, at least."
80000117-75 = "So I made a chocolate palanquin that enshrines a divine chocolate object..."
80000117-76 = "But the divine chocolate inside of it...I made it while thinking about you, Sensei."
80000117-77 = "So, Sensei."
80000117-78 = "I know you should eat your Valentine's Day chocolate however you please."
80000117-79 = "But if you don't mind, could you open the roof..."
80000117-80 = "...and start with what's inside?"
80000117-81 = "Since that's something that represents what I think of you, Sensei..."
80000117-82 = "[s5] \"I'm honored.\"\n[s6] \"Thank you, it looks tasty.\""
80000117-85 = "Thank you!"
80000117-86 = "Th-Then I'll bring out tea or something that goes well with it!"
80000117-87 = "So please...enjoy yourself to your fullest!"
80000117-88 = "Excuse me!"
80000117-93 = "I watched Umika, whose face had turned bright red, run towards the kitchen."
80000117-94 = "Then I slowly picked up the chocolate divine object from the palanquin..."

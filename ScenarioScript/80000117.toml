[translation]
80000117-1 = "情人節慶典"
80000117-2 = "老師～今天是情人節喔！"
80000117-3 = "[s]「是，是嗎……？」"
80000117-4 = "對老師來說，情人節是什麼樣的日子呢？#n對我來說……是巧克力的慶典！"
80000117-5 = "[s]「哦哦……」"
80000117-6 = "大家互相送巧克力的氣氛，還有為了準備而心跳加速的感覺都很棒。"
80000117-7 = "整個世界在這幾天都變得更幸福，包裝得漂漂亮亮的巧克力如潮水般來來往往……"
80000117-8 = "總之一切都很棒！"
80000117-9 = "所以我在想，有沒有可能辦個「巧克力煙火大會」呢！？"
80000117-10 = "[s]「巧克力煙火會是什麼樣子呢，海花……」"
80000117-11 = "這，這麼一說我也不太確定……"
80000117-12 = "不過如果把巧克力裝進煙火裡發射，然後在空中像雨或雪那樣灑下來……"
80000117-13 = "或者把巧克力混進仙女棒裡，讓燃燒的時候會飄出巧克力香氣，不覺得很棒嗎！"
80000117-14 = "[s]「那樣……可能會有點危險喔……」"
80000117-15 = "沒辦法嗎……"
80000117-16 = "不過就算沒有煙火，光是巧克力慶典本身就已經很棒了！"
80000117-17 = "我呢……"
80000117-18 = "其實……"
80000117-19 = "也很重視情人節的另一層涵義哦？"
80000117-20 = "應該說我們百夜堂都是？#n所以會趁著情人節推出特別商品，抓住這波商機。"
80000117-21 = "只要把巧克力加入各種和菓子或甜點裡販售，大家都會很開心地買單！"
80000117-22 = "……對於某些忘記今天是情人節的客人，我們的特別菜單就能成為他們的完美藉口。"
80000117-23 = "讓他們可以用「我早就打算買百夜堂的情人節限定商品啦～」來帶過！"
80000117-24 = "[s]「真是可怕的行銷手法啊，百夜堂！」"
80000117-25 = "其，其實這是社長想出來的點子……"
80000117-26 = "我自己還沒辦法達到這種程度……"
80000117-27 = "[s1]「畢竟海花還是一年級嘛。」\n[s2]「還有很多成長空間喔。」"
80000117-30 = "嗯！總有一天我也要像社長一樣又帥氣又有手腕……"
80000117-31 = "然後把整個世界都變成像慶典一樣熱鬧……！"
80000117-32 = "超級厲害的那種……！！！"
80000117-36 = "總之一定會完成了不起的事！"
80000117-37 = "[s3]「我會為你加油……」\n[s4]「不過也別做太可怕的事哦……」"
80000117-40 = "我認為每天重整自己的心情是很重要的！"
80000117-41 = "而為了做到這點，果然必須要……！"
80000117-42 = "要……"
80000117-43 = "……"
80000117-44 = "要好好地，向一直支持著我的老師……"
80000117-45 = "確實地，那個，嗯，就是……"
80000117-46 = "……"
80000117-47 = "對，對了！是「師恩」！"
80000117-48 = "雖然這可能只是微不足道的回報……"
80000117-49 = "但我希望能將心意傳達給老師……"
80000117-50 = "所以準備了這個！"
80000117-55 = "[ns]「這是……神轎造型的巧克力？」"
80000117-56 = "沒錯！耶嘿嘿……"
80000117-57 = "說到慶典，就不能少了神轎對吧？"
80000117-58 = "所以我特別做了這個造型的巧克力。"
80000117-59 = "而且這個屋頂還可以打開喔！"
80000117-60 = "[s]「哇～好厲害！這也太用心了吧！」"
80000117-61 = "謝謝老師。#n然後，在神轎裡最重要的位置……"
80000117-62 = "我……"
80000117-63 = "放進了自己製作的，更加特別的巧克力。"
80000117-64 = "……你知道嗎，老師？"
80000117-65 = "據說在慶典的神轎裡，會有神明降臨。"
80000117-66 = "在此聽取眾人的願望，或者為人們帶來福氣。"
80000117-67 = "由於慶典期間，神明都會坐在轎子裡……"
80000117-68 = "為參與的人們帶來幸福、快樂、好運與喜悅……這些美好的事物。"
80000117-69 = "所以轎子裡通常會空著，或者供奉神物……"
80000117-70 = "不過我總覺得，那樣的神明……"
80000117-71 = "……跟老師有幾分相似。"
80000117-72 = "[s]「咦？我嗎？」"
80000117-73 = "是，是的。"
80000117-74 = "至少對我來說是這樣的。"
80000117-75 = "因此我才會製作這個供奉著巧克力神物的神轎巧克力……"
80000117-76 = "裡面的神物……是我一心想著老師做出來的。"
80000117-77 = "所以，老師。"
80000117-78 = "雖然情人節巧克力想怎麼吃都沒關係……"
80000117-79 = "不過，如果可以的話……"
80000117-80 = "希望您能打開屋頂，從裡面那塊開始吃起。"
80000117-81 = "因為那是我對老師的心意……"
80000117-82 = "[s5]「讓人有點受寵若驚呢。」\n[s6]「我會好好享用的，謝謝你。」"
80000117-85 = "謝謝老師！"
80000117-86 = "那，那我去準備一壺茶來搭配！"
80000117-87 = "請老師慢慢享用，別吃得太快哦！"
80000117-88 = "我先失陪了！"
80000117-93 = "（一邊看著紅著臉龐跑進廚房的海花的背影……）"
80000117-94 = "（一邊慢慢地，將神轎裡的巧克力神物拿了出來）"

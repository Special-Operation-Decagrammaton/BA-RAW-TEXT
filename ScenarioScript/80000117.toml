[translation]
80000117-1 = "#title;발렌타인 축제"
80000117-2 = "3;우미카;10;발렌타인 데이예요, 선생님!\n#3;closeup"
80000117-3 = "[s] \"그, 그렇지……?\""
80000117-4 = "3;우미카;03;선생님께 있어서 발렌타인은 어떤 날이신가요? 저에게는…… 초콜릿 축제예요!\n#3;em;[재잘]"
80000117-5 = "[s] \"그래, 그래…….\""
80000117-6 = "3;우미카;99;모두가 서로 초콜릿을 나누는 것도 좋고요. 그것 때문에 두근거리며 준비하는 것도 좋고요.\n#3;em;…"
80000117-7 = "3;우미카;00;이날 전후로 세상이 조금이라도 더 행복해지는 것도 좋고, 예쁘게 포장된 초콜릿들이 오가는 것도 좋고……."
80000117-8 = "3;우미카;10;어쨌든, 다 좋아요!\n#3;em;[반짝]"
80000117-9 = "3;우미카;02;그래서 말인데요, 초콜릿 불꽃놀이 같은 건 없을까요?!"
80000117-10 = "[s] \"초콜릿 불꽃놀이라는 건 또 뭐니, 우미카야…….\""
80000117-11 = "3;우미카;16;그, 그러고 보니 저도 잘은 모르겠네요…….\n#3;em;…"
80000117-12 = "3;우미카;05;하지만 초콜릿을 로켓형 불꽃에 넣고 쏘아 올려서 터트린 다음, 비나 눈처럼 내리게 하거나."
80000117-13 = "3;우미카;00;스파클라에 초콜릿을 섞어서 불꽃이 탈 때마다, 초콜릿 향이 퍼지게 하면 되는 거 아닐까요!\n#3;em;[!]\n#3;jump"
80000117-14 = "[s] \"그건 조금 곤란하지 않을까…….\""
80000117-15 = "3;우미카;04;안 되는군요…….\n#3;em;[땀]"
80000117-16 = "3;우미카;01;어쨌든 초콜릿 축제는 그 자체로 좋지만요!"
80000117-17 = "3;우미카;00;저도……."
80000117-18 = "3;우미카;12;그…….\n#3;em;[///]"
80000117-19 = "3;우미카;03;발렌타인의 다른 의미에 대해서도, 중요하게 생각하고 있답니다……?"
80000117-20 = "3;우미카;00;사실 백야당에서도 말이죠? 발렌타인 특별 상품을 만들어서 대목을 노리기도 하고요."
80000117-21 = "3;우미카;03;여러 화과자나 디저트에 초콜릿을 넣어서 판매하면, 다들 기쁘게 사 주시거든요!\n#3;em;[음표]"
80000117-22 = "3;우미카;99;……보통 발렌타인 데이였다는 것을 깜빡한 분들이, 그런 티를 내지 않으면서."
80000117-23 = "3;우미카;03;사실은 백야당의 스페셜 발렌타인 메뉴를 생각하고 있었다며 둘러대게 만들어 주는, 좋은 핑계가 되기도 하고요!\n#3;em;[반짝]"
80000117-24 = "[s] \"무서운 상술이구만, 백야당!\""
80000117-25 = "3;우미카;09;사, 사장님이 생각하신 거니까요……?\n#3;stiff"
80000117-26 = "3;우미카;06;저는 사실, 아직은 그런 쪽으로 그렇게까지 좋은 생각을 잘 떠올리지 못해요…….\n#3;em;[속상함]"
80000117-27 = "[s1] \"아직 우미카는 1학년이니까.\"\n[s2] \"더 성장할 부분이 많이 남아 있을 거야.\""
80000117-28 = "#wait;10"
80000117-29 = "#wait;10"
80000117-30 = "3;우미카;01;네! 언젠가는 저도 사장님처럼 멋지고 수완 넘치게…….\n#3;em;[!]"
80000117-31 = "3;우미카;03;그래서, 세상 모든 것을 축제로 덮어 버릴 만큼 엄청난……!\n#3;hophop"
80000117-32 = "3;우미카;13;엄청난……!!!\n#3;stiff"
80000117-33 = "#st;[0,0];instant;1;"
80000117-34 = "#clearST"
80000117-35 = "3;우미카;10\n#3;em;…\n#wait;2500"
80000117-36 = "3;우미카;13;아무튼, 무언가를 이루어내고 말 거예요!\n#3;hophop"
80000117-37 = "[s3] \"응원할게…….\"\n[s4] \"너무 무서운 건 하지 말고…….\""
80000117-38 = "#wait;10"
80000117-39 = "#wait;10"
80000117-40 = "3;우미카;05;아무튼 중요한 것은, 매일 마음을 새롭게 다잡는 것이라고 생각합니다!"
80000117-41 = "3;우미카;99;그리고 그러기 위해서는 역시!"
80000117-42 = "3;우미카;16;여, 역시…….\n#3;em;[///]\n#3;stiff"
80000117-43 = "3;우미카;09;……."
80000117-44 = "3;우미카;07;평소, 많은 부분을 지탱해 주시는 선생님께!\n#3;em;[!]"
80000117-45 = "3;우미카;09;확실하게, 으, 어, 그러니까……."
80000117-46 = "3;우미카;08;……."
80000117-47 = "3;우미카;13;그, 그래요! 스승의 은혜, 그거예요!\n#3;jump\n#3;em;[!]"
80000117-48 = "3;우미카;09;아주, 일부분일 수밖에, 없겠지만……."
80000117-49 = "3;우미카;15;제 마음을, 되돌려 드리는 것이라고, 생각, 해요…….\n#3;stiff"
80000117-50 = "3;우미카;00;그래서! 준비했습니다!\n#3;em;[반응]"

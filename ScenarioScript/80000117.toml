80000117-55 = "[ns] \"이건…… 가마 모양 초콜릿?\""
80000117-56 = "3;우미카;03;맞아요! 에헤헤…….\n#3;em;[음표]"
80000117-57 = "3;우미카;01;축제에서 빼놓을 수 없는 것 중 하나가, 가마잖아요?\n#3;m3"
80000117-58 = "3;우미카;03;그래서 그 모양으로 초콜릿을 만들어 봤어요."
80000117-59 = "3;우미카;10;이렇게, 지붕이 열리기도 한답니다!\n#3;greeting"
80000117-60 = "[s] \"오오, 신기해! 정성이 엄청나네!\""
80000117-61 = "3;우미카;03;감사합니다, 선생님. 그리고 가마 안에, 가장 중요한 곳을 모시는 부분에…….\n#3;em;[음표]"
80000117-62 = "3;우미카;07;그……."
80000117-63 = "3;우미카;12;제 나름대로의 한층 더 특별한 초콜릿을, 넣어 봤어요.\n#3;em;[///]"
80000117-64 = "3;우미카;01;……아시나요, 선생님?"
80000117-65 = "3;우미카;99;축제 가마 안에는, 신령님이 깃든다고 해요."
80000117-66 = "3;우미카;00;거기에서 모두의 소원을 들으시거나, 모두에게 복을 뿌려 주신다고도 하죠."
80000117-67 = "3;우미카;01;가장 중요한 분이, 축제 기간 중 가마 안에 자리를 잡으시고."
80000117-68 = "3;우미카;99;축제를 즐기는 모든 사람들에게, 행복과 즐거움, 행운과 기쁨…… 그런 좋은 것들을 베푸시는 거죠."
80000117-69 = "3;우미카;01;그래서 그 안은 보통 비워 두거나, 신물(神物)을 모시곤 하지만…….\n#3;em;…"
80000117-70 = "3;우미카;01;그, 저는 가마에 모신 신령님이, 어째서인지……."
80000117-71 = "3;우미카;03;……선생님 같다고, 생각했어요.\n#3;em;[반응]"
80000117-72 = "[s] \"어? 나?\""
80000117-73 = "3;우미카;07;네, 네에."
80000117-74 = "3;우미카;12;적어도 저에게는, 그래요.\n#3;em;[///]"
80000117-75 = "3;우미카;01;그래서 저는, 초콜릿 신물(神物)을 모신 초콜릿 가마를 만들었지만……."
80000117-76 = "3;우미카;01;그 안의 신물은…… 선생님만을 생각하며, 만들었답니다……?"
80000117-77 = "3;우미카;99;그러니까, 선생님."
80000117-78 = "3;우미카;01;사실 발렌타인 초콜릿이란 건, 어디에서부터 어떻게 드셔도 상관없는 것이겠지만요."
80000117-79 = "3;우미카;12;그, 괜찮으시다면, 지붕을 열고…….\n#3;em;…"
80000117-80 = "3;우미카;12;안에 있는 것부터, 드셔 주셨으면 해요."
80000117-81 = "3;우미카;03;그게, 선생님을 생각하는, 제 마음이기도 하니까요…….\n#3;em;[///]"
80000117-82 = "[s5] \"황송할 정도네.\"\n[s6] \"고맙게 잘 먹을게.\""
80000117-83 = "#wait;10"
80000117-84 = "#wait;10"
80000117-85 = "3;우미카;10;감사합니다!\n#3;em;[반짝]"
80000117-86 = "3;우미카;01;그, 그러면 저는 뭔가 어울리는 차라도 내올 테니까!"
80000117-87 = "3;우미카;01;천천히…… 체하지 않게 드시고 계셔 주세요!"
80000117-88 = "3;우미카;03;실례하겠습니다!\n#3;em;[!]\n#3;hophop"

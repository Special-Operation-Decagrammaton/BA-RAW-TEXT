[translation]
10000090-1 = "第9話;[ruby=忍者]少女[/ruby]的夢"
10000090-2 = "（總算是成功阻止了百鬼夜行商店街會長喵天丸的計畫）"
10000090-3 = "（而妖怪劇團一察覺喵天丸的敗北便立刻成鳥獸散，逃得無影無蹤）"
10000090-4 = "（接著……）"
10000090-6 = "可惡，真是群難纏的傢伙……！"
10000090-8 = "還以為事情告一段落了，看來還沒那麼快結束呢～"
10000090-9 = "總之要一個一個解決才行！椿前輩！三森前輩！"
10000090-10 = "嗯。不能讓他們妨礙慶典的收尾，大家加油吧！"

[translation]
84307100600-5 = "อะไรกัน? จู่ๆ ก็มีเรื่องอะไรน่ะ?"
84307100600-6 = "ยะฮู้ว หัวหน้า! ทำอะไรอยู่เหรอ? จริงสิ ได้ยินเรื่องนั้นแล้วหรือยัง?"
84307100600-7 = "เรื่องนั้น...? เรื่องไหน?"
84307100600-8 = "ก็ที่เมื่อคืนมีพวกที่ลอบเข้าไปในห้องสาธิตสิ่งประดิษฐ์แล้วพยายามจะขโมยของไปน่ะสิ!"
84307100600-9 = "ว่าไงนะ...?"
84307100600-10 = "เรื่องนั้นทำให้เซมิน่าต้องเพิ่มการรักษาความปลอดภัยในห้องสาธิตกันตั้งแต่เช้าเลยละ ทำเอาวุ่นวายกันไปหมดเลย~"
84307100600-11 = "งั้นเหรอ... แล้วทำไมถึงมาถามฉันล่ะ?"
84307100600-15 = "หืม? นั่นสิเนอะ ทำไมนะ?"
84307100600-16 = "ก็แค่ถามเฉยๆ น่ะ...? ฮิฮิ"
84307100600-17 = "หัวหน้าไม่รู้อะไรเกี่ยวกับเรื่องนี้ใช่มั้ย?"
84307100600-21 = "เอาเป็นว่า... ฉันไม่รู้ดีกว่า..."
84307100600-22 = "อื้อ!"
84307100600-23 = "\"เอาเป็นว่าไม่รู้ดีกว่า\" งั้นตกลงตามนี้!!"

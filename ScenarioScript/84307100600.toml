[translation]
84307100600-5 = "怎麼了？為什麼突然找我？"
84307100600-6 = "呀齁～隊長！#n你現在在做什麼？聽說那件事了嗎？"
84307100600-7 = "……那件事？什麼事啊？"
84307100600-8 = "昨天晚上有一群傢伙入侵了會場，打算偷走展品耶！"
84307100600-9 = "……哦？"
84307100600-10 = "因為這件事的關係，研討會一大早就吵著要加強會場的維安～"
84307100600-11 = "這樣啊……所以咧？為什麼要突然問我？"
84307100600-15 = "嗯？對耶，為什麼呢？"
84307100600-16 = "……莫名想問？嘻嘻。"
84307100600-17 = "隊長應該什麼都不知道吧？"
84307100600-21 = "……就當我不知道吧。"
84307100600-22 = "嗯！"
84307100600-23 = "那就是「不知道」──！！"

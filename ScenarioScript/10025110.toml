10025110-4 = "3;마이;00;안녕하세요, 시청자 여러분! 크로노스 보도부의 카자마키 마이입니다!\n#3;greeting\n#3;em;[음표]"
10025110-5 = "3;마이;02;오늘 시사교양 <굿모닝 키보토스>에서는 카네사키 항구 외곽에 있는 작은 어촌, 야토우라 마을을 찾아왔습니다."
10025110-6 = "3;마이;03;맛있는 새우가 잡힌다는 것 이외에는 거의 알려지지 않았던 이 작은 마을이 최근 SNS상에서 핫 플레이스로 큰 인기를 끌고 있는데요!\n#3;em;[반짝]"
10025110-7 = "3;마이;02;이 마을이 갑자기 조명받게 된 이유는 최근 급성장한 인터넷 낚시 채널, <백곰의 낚시 TV>에서 이 야토우라 마을을 촬영한 동영상이 천만 뷰를 달성했기 때문입니다!"
10025110-8 = "3;마이;03;동영상을 통해 아름다운 자연을 즐길 수 있는 경승지와 초보자도 쉽게 접근할 수 있는 낚시 포인트가 많다는 사실이 알려지며, 야토우라 마을은 새로운 관광 명소로 손꼽히게 되었는데요."
10025110-9 = "3;마이;01;더욱이 이곳 마을에서 만드는 쿠사야 구이가 일부 미식가들에게 큰 호평을 받으며, 이를 맛보기 위한 식객들의 발길도 이어지고 있다고 하네요."
10025110-10 = "3;마이;06;그나저나 천만 뷰라니, 부럽다…… 우리 채널도 업로드는 꾸준히 하고 있는데, 언제쯤 천만 뷰를 달성하려나?\n#3;em;[한숨]\n#fontsize;50"
10025110-11 = "#na;크로노스 방송국원;……가짜 뉴스 때문에 연속 정지만 먹지 않았어도 진작 달성했을 것 같은데……\n#fontsize;50"
10025110-12 = "3;마이;05;시끄러워!\n#fontsize;50\n#3;em;[!]"
10025110-13 = "3;마이;99;흠흠…… 그리고 낯선 휴양지를 방문했다가 불친절한 사람들 때문에 즐거운 바캉스 기분을 망치고 돌아온 경험, 흔히들 있으실 텐데요.\n#3;em;…"
10025110-14 = "3;마이;01;이곳 야토우라 마을은 마을 주민 여러분 모두가 친절하고 밝은 분위기로 외지인들을 대하기 때문에, 즐겁게 휴양을 즐기고 돌아왔다는 관광객들의 체험담이 SNS에 이어지고 있습니다."

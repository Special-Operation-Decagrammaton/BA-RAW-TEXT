[translation]
10025110-1 = "Epilogue;An Unexpected Delivery"
10025110-4 = "Hello viewers! This is Kazamaki Mai from the Kronos School of Journalism!"
10025110-5 = "Today on Good Morning Kivotos, we're visiting Yatoura Village, a small fishing village outside Kanesaki Port."
10025110-6 = "This small village, unknown for anything except for the tasty shrimp the locals catch, has become the latest viral trend online!"
10025110-7 = "But why the sudden popularity? It's all thanks to Polar Bear Fishing, the streaming sensation that recently celebrated 10 million views!"
10025110-8 = "Thanks to this streamer's travelogs, tourists are clamoring to take in Yatoura's scenic vistas and hopping fishing spots for themselves."
10025110-9 = "After a full day of swimming and fishing, visitors are trying out the local delicacy, kusaya! Truly, this sleepy village is a can't-miss for seafood fans!"
10025110-10 = "Wow, 10 million views, though. I'm jealous! I wonder when we'll get to 10 million?"
10025110-11 = "Maybe we'd get there if you didn't keep posting fake news..."
10025110-12 = "Shut it!"
10025110-13 = "Ahem... Of course, anyone who's ever gone off the beaten trail knows that not every village welcomes tourists with open arms."
10025110-14 = "Thankfully, in Yatoura Village, everyone is friendly and welcoming, and tourists have been sharing their positive interactions online."
10025110-19 = "Ah... And here's a fisherman pulling up to the dock now."
10025110-20 = "Stay tuned while we interview him live!"
10025110-34 = "Hello! You're on Good Morning Kivotos!"
10025110-35 = "...Hrmph?"
10025110-36 = "(Oh... He's not as friendly as I expected...)"
10025110-37 = "I was hoping we could do a quick interview..."
10025110-38 = "Get outta the way! Move! You're gonna get hurt—"
10025110-44 = "Kumagai! Would it kill you to show some manners?"
10025110-45 = "Ugh... Sorry..."
10025110-51 = "...Sorry about the upset, miss. You caught Kumagai in the middle of mooring his boat, and he didn't want you to get hurt is all."
10025110-53 = "Oh, n-no, I was... I'm sorry to interrupt your work..."
10025110-54 = "Sir, if you've got a moment, we'd love you to tell us about your lovely village!"
10025110-56 = "Well, sure, but there's not much to it. It's a boring little place where we catch shrimp... That's it."
10025110-58 = "How...interesting...?"
10025110-60 = "But, I reckon if you city folk are so interested in our village, then the least I could do is leave you with some good memories."
10025110-61 = "That way, when you go to the supermarket, you'll remember to choose our shrimp over the other guys'! Hahaha!"
10025110-63 = "Is that so... I think I see the...charm...of this beautiful village of yours!"
10025110-64 = "Of course, there's more to this story than shrimp. I heard an interesting rumor..."
10025110-65 = "Sir, have you ever heard of something called the \"Deep Ones?\""
10025110-71 = "Rumors are swirling online that if you pray to the Deep Ones on Devil's Reef, they'll grant you a blessing of fish..."
10025110-72 = "In all your years here, have you ever seen anything like that?"
10025110-74 = "Hmm... Well, there are some old wives' tales to that effect, sure, but that's all they are: tales."
10025110-75 = "If there were anything offering up blessings of fish, you can be sure us fishermen would know all about it."
10025110-77 = "I guess so..."
10025110-78 = "Ah, and there's another rumor! Have you heard of the Kusaya Screamer?"
10025110-79 = "The Kusaya what now?"
10025110-80 = "They say that on dark nights, if you walk by the kusaya warehouse, you'll hear a voice screaming: \"No more shrimp! No more kusaya!\""
10025110-85 = "...News to me."
10025110-86 = "Y'know, the wind makes funny noises at night when it goes through the old buildings. Maybe that's what they heard?"
10025110-87 = "The old creaking wood sounds just like a man screaming, sometimes."
10025110-89 = "Uh...huh..."
10025110-94 = "(Sir! He ran away again!)"
10025110-95 = "Hmph. What a pain..."
10025110-96 = "Round up the fellas and have them search the village. Oh, and pull the CCTV footage while you're at it..."
10025110-97 = "There's only one road in and out of town, after all..."
10025110-99 = "Uh... What are you two talking about?"
10025110-101 = "Just some old fisherman talk."
10025110-102 = "Please enjoy your stay here, miss. If you'll excuse us, the fish won't catch themselves..."
10025110-109 = "What's going on in this village...?"
10025110-113 = "Kousagi Park"
10025110-116 = "It's hot..."
10025110-117 = "It really is..."
10025110-118 = "Too hot..."
10025110-119 = "I could really go for a swim right now..."
10025110-120 = "I miss the beach..."
10025110-121 = "It's only been a few days since we left Yatoura Village, but it feels like a lifetime ago..."
10025110-125 = "What a great trip..."
10025110-126 = "I was so scared at first, but the villagers were all really nice in the end..."
10025110-127 = "And we got to do some night fishing... And eat all that yummy seafood..."
10025110-128 = "I can't remember the last time I had so much fun..."
10025110-129 = "Ever since the academy shut down, it's been one disaster after another. We needed the break."
10025110-130 = "Well, I guess that was technically a mission, too, but close enough."
10025110-131 = "It all turned out how Sensei said it would, in the end..."
10025110-132 = "It's important to focus on your goals and work hard, but if you forget to relax from time to time, you start to make mistakes..."
10025110-133 = "This mission reminded me that it's important for me to make sure RABBIT Squad is well rested, too."
10025110-134 = "But we swore to stay here in Kousagi Park until SRT Academy is restored."
10025110-135 = "So let's keep a positive mindset and do our best to revive SRT!"
10025110-139 = "Anyway, it's almost lunchtime. Why hasn't Moe come back with today's bentos?"
10025110-145 = "Omigosh! Everyone, look at this!"
10025110-146 = "Hey, Moe! What took you so long—"
10025110-147 = "Heehee... Saki, you won't run your mouth at me after you see what I brought back."
10025110-148 = "Look! It's Angel 24's Limited Edition Pine Tree Bentos! I even got 4 different ones!"
10025110-149 = "What's this... Bentos with pine tree stickers instead of bamboo or plum blossoms? Looks expensive..."
10025110-150 = "They are! Every item in every bento is absolutely gourmet. They rarely release these, and to find 4 of them in the trash..."
10025110-151 = "Good thing I tapped into the convenience store tracking system. I was able to swoop in before some other dumpster diver beat me to 'em!"
10025110-153 = "You must have had to go far to get these. That's why you're later than usual."
10025110-154 = "I can't believe we're eating such a fancy lunch today... Great job, Moe!"
10025110-155 = "Now, let's see what's on the menu."
10025110-160 = "Salmon... Beef... Chicken karaage... Oh, shrimp tempura!"
10025110-161 = "I'm glad to see shrimp in the convenience stores again."
10025110-162 = "Right? After our last mission, I have a new appreciation for shrimp."
10025110-164 = "In honor of the fishermen's hard work, I call dibs on the shrimp temp—"
10025110-165 = "Not so fast, Saki."
10025110-166 = "Why do you get to pick the first bento?"
10025110-168 = "But Moe, don't you always choose beef or chicken over seafood?"
10025110-169 = "Besides—not to pat myself on the back or anything—but that underwater demolitions job was some fine work. I think I've earned this shrimp ben—"
10025110-170 = "Absolutely not! I happen to be craving shrimp today!"
10025110-171 = "Besides, I'M the one who found these bentos in the first place!"
10025110-172 = "A-Actually... I'd like the shrimp, also..."
10025110-174 = "...And so would I."
10025110-175 = "Hmm. Pretty stiff competition today."
10025110-177 = "There's no other choice. We'll rock-paper-scissors for it."
10025110-187 = "Uh, hello? Is there a Ms. Tsukiyuki Miyako here?"
10025110-188 = "I'm Tsukiyuki Miyako..."
10025110-189 = "I've got a package for you. "
10025110-190 = "There we go... Please sign here!"
10025110-196 = "Um... Did someone really address this package to the park?"
10025110-197 = "They sure did. Look for yourself."
10025110-198 = "Ms. Tsukiyuki Miyako, the tent in front of the water fountain, Neighborhood Park, Kousagi Town, D.U."
10025110-200 = "Did it really have to be that specific...?"
10025110-202 = "It's definitely for me, but who would send me a package here?"
10025110-203 = "Oh, this came from the fishermen at Yatoura Village!"
10025110-204 = "They said it needs to be refrigerated, so it was sent same-day delivery."
10025110-205 = "The contents will spoil at room temperature, so make sure you use it right after opening, and freeze any leftovers."
10025110-206 = "And...that's all I got. Have a great day!"
10025110-213 = "Why would Yatoura Village send us a package...?"
10025110-214 = "More importantly, what was that about the contents spoiling? What did they send us?"
10025110-215 = "It smells...fishy..."
10025110-217 = "We'd better open it."
10025110-225 = "This is..."
10025110-226 = "...shrimp! The good stuff!"
10025110-227 = "They sent us a box of expensive-looking shrimp..."
10025110-228 = "There's a note here."
10025110-234 = "\"To the tourists who happened to be in the right place at the right time. With gratitude, from the old salts of Yatoura.\""
10025110-235 = "Well, now we know it wasn't sent to the wrong address."
10025110-237 = "The right place at the right time. That's us in a nutshell."
10025110-238 = "This is too much..."
10025110-239 = "We were just doing our duty as students of SRT. To get something this precious in return..."
10025110-240 = "We can't exactly turn down a gift that came in the mail. Let's be grateful and enjoy this shrimp."
10025110-241 = "If it makes you feel better, Saki, you can have the tempura bento. I'll eat your share of the shrimp for you."
10025110-242 = "You little...!"
10025110-244 = "There's enough shrimp to feed ten people here... Can we really finish this...?"
10025110-245 = "We don't have a refrigerator... Anything we don't finish will spoil..."
10025110-247 = "That's true. It would be disrespectful for us to let this gift go to waste..."
10025110-248 = "Why don't we invite [USERNAME] Sensei to join us?"
10025110-249 = "All right!"
10025110-258 = "Sensei, are you free at the moment?"
10025110-259 = "It's about Operation Shrimp Net..."
10025110-260 = "You helped us out a lot, so..."
10025110-261 = "Why are you beating around the bush?"
10025110-262 = "If you're too embarrassed to spit it out, let's all say it together."
10025110-263 = "Y-Yes... All together..."
10025110-265 = "Lunch is on us, Sensei!"
10025110-270 = "I joined the students of RABBIT Squad at Kousagi Park and enjoyed a grand shrimp barbecue with them."
10025110-274 = "A little later, a big shipment of kusaya arrived at Schale... But eating that was an ordeal for another day..."
10025110-275 = "RABBIT SQUAD and the Mystery of the Missing Shrimp"

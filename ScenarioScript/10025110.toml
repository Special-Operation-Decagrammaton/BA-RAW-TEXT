[translation]
10025110-1 = "尾聲;有您的包裹！"
10025110-4 = "收看克洛盧斯頻道的各位觀眾，大家好！#n我是克洛盧斯新聞部的風卷麻衣！"
10025110-5 = "在今天的「早安！奇普托斯」中，我們來到了鐘崎港外圍的夜戶浦村。"
10025110-6 = "原本是個以蝦子特產地為人所知的平靜村莊，最近卻成了社群網站上火熱的話題！"
10025110-7 = "說到這個村子之所以受到注目的原因，#n據說是受到現在正急速成長的釣魚頻道「白熊Channel」的影響。#n此頻道在夜戶浦村拍攝的影片觀看數已經突破了一千萬！"
10025110-8 = "影片中「擁有自然的美景」以及「適合新手的釣點很多」的評論廣為流傳，#n讓夜戶浦村搖身一變，成為了最新的觀光熱點。"
10025110-9 = "此外，村子的特產「臭魚乾」更是贏得了部分美食家的好評，#n似乎也有遊客是為了親眼看臭魚乾一面而來。"
10025110-10 = "話說回來，一千萬的觀看數……真令人羨慕。#n我們的更新頻率明明也挺高的說，什麼時候才能達成呢？"
10025110-11 = "……要是沒有因為假新聞被罰連續停播的話，我想應該早就達成了吧。"
10025110-12 = "喂！"
10025110-13 = "咳哼……在渡假的地方遇到不親切的人，導致壞了快樂的好心情……#n這樣的經驗，我想大家或多或少都遇過。"
10025110-14 = "不過，在夜戶浦村不必擔心這點！#n許多人似乎都在社群網站上發文表示，這裡的人都非常親切開朗、玩得非常愉快。"
10025110-19 = "……哦？在那邊看見了一位漁夫呢。"
10025110-20 = "事不宜遲，我們這就來進行採訪吧！"
10025110-34 = "您好，我們是「早安！奇普托斯」。"
10025110-35 = "……有何貴幹？"
10025110-36 = "（咦？怎麼跟聽說的不太一樣……）"
10025110-37 = "那個，就是，我們想稍微做個小採訪……"
10025110-38 = "我還在工作。受傷了可別怪──"
10025110-44 = "熊谷，稍微親切點吧。"
10025110-45 = "唔……不好意思。"
10025110-51 = "……抱歉，請別放在心上，現在正好忙不過來。#n要是讓觀光客發生什麼意外就不好了，所以這傢伙也有點緊張。"
10025110-53 = "不，不會……！打擾到各位工作，我們才應該感到抱歉才是。"
10025110-54 = "那個，方便的話……可以麻煩您用一句話介紹這個村子的魅力嗎？"
10025110-56 = "呼呣……在老夫看來，這只是個有著美味蝦子的小漁村罷了。"
10025110-58 = "是，是這樣嗎……？"
10025110-60 = "但正因如此，如果還是有遊客願意遠道而來，老夫也希望各位都能留下美好的回憶。"
10025110-61 = "還有，對了。如果各位之後在街上看到蝦子時，#n能夠回想起在這個村子度過的時間的話，老夫就很欣慰了……哈哈哈。"
10025110-63 = "原來如此……好像可以體會大家為何會來到這個村子的理由了呢！"
10025110-64 = "……順帶一提，我想請教一個與傳聞有關的問題。"
10025110-65 = "……您知道「深處的存在」嗎？"
10025110-71 = "網路上寫說只要在「鬼岩礁」獻上祭品並吟唱咒語，#n某種神祕的存在就會助其一臂之力……"
10025110-72 = "請問有沒有人親眼見過這個景象，或是知道更多詳情呢？"
10025110-74 = "這個嘛……確實是存在那樣的傳聞，不過那也就是傳聞罷了。"
10025110-75 = "要是真的有能幫助村子……幫助漁業的東西存在的話，老夫不可能會不知情。"
10025110-77 = "說得也是呢……"
10025110-78 = "此外，這似乎是最近才剛開始流傳的話題……#n請問您對「臭魚乾倉庫的悲鳴」這個怪談是否知道些什麼呢？"
10025110-79 = "「臭魚乾倉庫的悲鳴」……？"
10025110-80 = "是的。根據匿名人士的來信表示，#n夜戶浦村的臭魚乾倉庫時不時會傳出「我討厭蝦子～更討厭臭魚乾～」的男性聲音。"
10025110-85 = "……老夫不清楚。"
10025110-86 = "是不是把風吹過縫隙的聲音給聽錯了？"
10025110-87 = "老舊的木材有時嘰嘎作響，聽起來會很像哭聲。"
10025110-89 = "這，這樣啊……"
10025110-94 = "（耳語）那傢伙好像又想逃跑了。"
10025110-95 = "嘖，就會給人添麻煩……"
10025110-96 = "通知其他人把他找出來。也要利用監視器。"
10025110-97 = "反正離開這個村子的方法就只有一個而已。"
10025110-99 = "那個……您剛才說什麼……？"
10025110-101 = "沒什麼，老夫只是在自言自語。"
10025110-102 = "那麼祝各位玩得愉快。#n老夫等人還有工作要忙，先失陪了。"
10025110-109 = "……這個村子，真的沒問題嗎？"
10025110-113 = "兔寶寶公園"
10025110-116 = "好熱……"
10025110-117 = "真熱呢……"
10025110-118 = "好熱啊……"
10025110-119 = "……好想在冰涼的水裡游泳啊。"
10025110-120 = "上次去海邊感覺好像是很久以前的事了……"
10025110-121 = "……就是說啊，明明才過沒幾天，卻像是好久以前的回憶。"
10025110-125 = "……當時真開心啊。"
10025110-126 = "雖然剛開始既害怕又緊張……不過大家都是善良的人呢。"
10025110-127 = "在夜晚的海邊釣魚，吃著許多美味的海鮮……"
10025110-128 = "……好像很久沒有這麼開心了。"
10025110-129 = "就是啊。#n自從SRT特殊學園關閉後，因為各種事件幾乎沒怎麼休息。"
10025110-130 = "這次在形式上雖然也是作戰……#n但從結果來說，感覺卻像是度過了一場愉快的假期啊。"
10025110-131 = "……是呢，結果完全和老師一開始所說的一樣。"
10025110-132 = "只是一味專注於目標的話，很可能會做出錯誤的判斷。#n就像因無知而產生恐懼一樣。"
10025110-133 = "身為RABBIT小隊的小隊長，在這次作戰後再次領悟到了適當休息的重要性。"
10025110-134 = "不過我們已經承諾，在SRT特殊學園復活之前要待在兔寶寶公園了。"
10025110-135 = "轉換好心情，繼續為SRT特殊學園的復活努力吧！"
10025110-139 = "……話說，也差不多到午餐時間了，#n去找報廢便當的萌還沒回來嗎？"
10025110-145 = "喂喂，你們看這個！"
10025110-146 = "萌……你知道你去了多久──"
10025110-147 = "哼哼哼……咲希，就算是你，#n看到這個應該也無話可說了吧～！"
10025110-148 = "鏘～！天使24的「期間限定．頂級松便當」！！#n而且竟然，四個種類都各拿了一個！"
10025110-149 = "不是竹、梅，而是松便當……？#n這不是超貴的嗎……？"
10025110-150 = "沒錯，是使用各地特產製作的高級便當。#n平常別說是報廢了，是連進貨量都很少的超稀有品項！"
10025110-151 = "不過我看了一下便利商店的物流網路，#n發現附近竟然有門市報廢松便當，所以才特別跑了一趟！"
10025110-153 = "所以今天去了比平常更遠的地方啊。"
10025110-154 = "沒想到中午就能吃到這麼豪華的便當……幹的好啊，萌！"
10025110-155 = "那麼……趕緊來看看有什麼菜色吧！"
10025110-160 = "鮭魚、牛肉、唐揚雞……居然連炸蝦都有！"
10025110-161 = "看來供應給便利商店便當的蝦子也恢復正常了呢。"
10025110-162 = "看來是呢。#n居然能再度在D.U.看到有蝦子的便當，真讓人感觸良多。"
10025110-164 = "那麼，懷著對漁夫們的感激之情，這個炸蝦便當就由我來──"
10025110-165 = "等等，咲希。"
10025110-166 = "……為什麼是你先挑便當？"
10025110-168 = "嗯？你之前不是說比起海鮮更喜歡肉類嗎？"
10025110-169 = "而且……雖然自己說有點不好意思，不過我在水中爆破作戰還挺活躍的吧？#n看在這個份上，吃個炸蝦便當也──"
10025110-170 = "我今天也想吃蝦子！"
10025110-171 = "況且發現這個報廢便當的人可是我啊！"
10025110-172 = "我，我今天也想吃蝦子……"
10025110-174 = "……我也是。"
10025110-175 = "……今天的競爭率還真高啊。"
10025110-177 = "沒辦法了，只能公平地用猜拳來──"
10025110-187 = "你們好。請問月雪都子小姐在這座公園嗎？"
10025110-188 = "是，我是月雪都子，有什麼事嗎……？"
10025110-189 = "有您的包裹！"
10025110-190 = "嘿咻……麻煩在這裡簽名！"
10025110-196 = "那個……真的是寄給我的嗎？#n寄到這個公園……？"
10025110-197 = "是的，填寫的地址確實是這個公園沒錯。"
10025110-198 = "「D.U.兔寶寶鎮近隣公園，洗手台前A型1號帳篷，月雪都子小姐」……沒錯吧？"
10025110-200 = "連帳篷的位置都……也具體得太多餘了吧……"
10025110-202 = "確實是這裡沒錯，不過是誰寄來的包裹呢……？"
10025110-203 = "寄件人是夜戶浦村的漁會哦！！"
10025110-204 = "因為需要冷凍處理，常溫下有可能會變質。"
10025110-205 = "開封後還請立即享用，或是以冷凍保存。"
10025110-206 = "祝各位有美好的一天！"
10025110-213 = "夜戶浦村怎麼會……？"
10025110-214 = "而且還用冷凍寄件，究竟寄了什麼呢？"
10025110-215 = "好像有股生物的味道……"
10025110-217 = "……我來打開看看。"
10025110-225 = "這是……"
10025110-226 = "……這不是蝦子嗎！！而且還是超高級的那種！！！"
10025110-227 = "好厲害……看起來這麼貴的蝦子竟然裝了滿滿一箱……"
10025110-228 = "啊，箱子裡好像還寫了一些字。"
10025110-234 = "「致各位偶然路過的善良觀光客。#n　謹以此致上最深的謝意。夜戶浦村漁會全體敬上」"
10025110-235 = "……看來確實是寄給我們的沒錯呢。"
10025110-237 = "「偶然路過的善良觀光客」啊……挺適合我們的嘛？"
10025110-238 = "……被寫說善良還真是有點難為情啊。"
10025110-239 = "不過打擊犯罪本來就是SRT應盡的職責，#n居然收到這麼貴重的謝禮，實在是有點過意不去……"
10025110-240 = "但是也不能拒絕他人滿懷心意送來的禮物。#n這些蝦子，我們就心懷感激地收下吧。"
10025110-241 = "啊，對了咲希。#n剛剛的炸蝦便當你就拿去吃吧，我吃這些就夠了。"
10025110-242 = "什麼，太卑鄙了……！"
10025110-244 = "這個分量看起來有10人份……只靠我們幾個吃得完嗎……？"
10025110-245 = "我們又沒有冷凍庫……這樣珍貴的蝦子可能會壞掉……"
10025110-247 = "這樣就太對不起送蝦子給我們的各位了……"
10025110-248 = "……那麼，找這次也幫了我們的[USERNAME]老師一起來吃怎麼樣？"
10025110-249 = "贊成！！！"
10025110-258 = "你好，老師。請問現在有空嗎？"
10025110-259 = "那個，關於上次的蝦網作戰……"
10025110-260 = "當，當時，真的受了老師很多幫助……所以……"
10025110-261 = "……為什麼要扭扭捏捏的？"
10025110-262 = "害羞的話就大家一起說吧？"
10025110-263 = "那，那就大家一起──"
10025110-265 = "──這次就由我們來招待老師！"
10025110-270 = "（於是便在兔寶寶公園，和RABBIT小隊的大家一起享受了盛大的烤蝦派對）"
10025110-274 = "（至於之後因為10人份的臭魚乾送達夏萊引發的小小騷動，就是另一個故事了）"
10025110-275 = "夏日特殊作戰！RABBIT小隊與消失的蝦子之謎"

[translation]
1600905-1 = "#title;닌자 소녀는 숨기지 않아"
1600905-2 = "#na;(그렇게 되어 미치루와 함께 닌자 굿즈……가 아니라, 인법 도구를 팔고 있다는 가게로 향하게 되었다.)"
1600905-3 = "#st;[0,0];instant;1;"
1600905-4 = "#clearST"
1600905-5 = "#wait;2500"
1600905-6 = "3;미치루;03;선생 공. 이쪽이야. 이쪽-\n#3;a\n#3;em;[재잘]\n#3;hophop"
1600905-7 = "#all;hide"
1600905-8 = "3;노점상 아저씨;00\n#3;black"
1600905-9 = "#all;hide"
1600905-10 = "#wait;700"
1600905-11 = "#wait;1000"
1600905-12 = "1;미치루;01\n#1;ar\n#wait;1500"
1600905-13 = "1;미치루;00;아, 도착했다. 바로 여기야. 내가 말했던 단골 가게라는 곳이.\n#1;em;[반응]\n#1;hophop\n#1;m3"
1600905-14 = "[s] \"여기는…… 노점상? 굿즈 가게라고 하기엔 조금 특이하네.\""
1600905-15 = "1;미치루;03;우냐핫- 그렇지? 알음알음 아는 사람들 사이에서만 알려진 숨겨진 가게라고나 할까……."
1600905-16 = "1;미치루;04;……라기보다도! 굿즈 가게가 아니라, 어디까지나 인법 도구를 파는 가게라니까?!\n#1;em;[?!]\n#1;shake"
1600905-17 = "1;미치루;01\n5;노점상 아저씨;00;응? 이거 누군가 했더니, 항상 찾아와 주는 닌자 코스프레 아가씨로구먼? 오늘은 데이트?\n#5;al\n#5;em;[반응]\n#1;m1"
1600905-18 = "[s] \"바로 알아볼 정도의 단골이구나……. 안녕하세요.\""
1600905-19 = "1;미치루;04;데, 데, 데, 데이…… 투우?!\n#1;em;[///]\n#1;stiff"
1600905-20 = "5;노점상 아저씨;00;오늘은 어쩐 일인 감? 아, 어제 새로 들어온 굿즈를 보려고? 이야~ 역시나 아가씨. 보는 눈이 있는걸?"
1600905-21 = "5;노점상 아저씨;00;와핫핫! 마침 이번에 나온 게 진짜 진국이라서 말이야. 한 번에 불꽃을 엄청 멋지게 뿜어내는 녀석인데……. 코스프레 촬영에 이만한 게 없다고 자부할 수 있지!\n#5;em;[재잘]"
1600905-22 = "1;미치루;05;아니, 그러니까 코스프레가 아니라니까!\n#1;em;[!]\n#1;hophop"
1600905-23 = "5;노점상 아저씨;00;아, 저번에도 몇 번 그런 말을 했었지. 대충 그런 설정이라고 했던가? \n#5;em;[반응]"
1600905-24 = "5;노점상 아저씨;00;가끔 있지. 그런 까다로운 아가씨들이. 댁도 고생이겠어?"
1600905-25 = "[s] \"아니, 그렇게까지 고생은…….\""
1600905-26 = "1;미치루;04;우캬앗!\n#1;hophop"
1600905-27 = "5;노점상 아저씨;00;흠흠. 그렇다 한들 고객의 요구에 어울려주는 것 또한 판매자로서의 상도인 법……. 그러니까 흠흠.\n#5;em;…"
1600905-28 = "5;노점상 아저씨;00;……여기는 코드네임 제로써-틴. 마드모아젤. 무엇을 필요로 하나?\n#5;em;[반짝]"
1600905-29 = "1;미치루;05;아우----웃! 완전 아웃! 틀려! 그건 장르가 다르다고! 전혀 닌자가 아니잖아!\n#1;hophop\n#1;em;[!]"
1600905-30 = "1;미치루;02;아- 물론 넓은 의미로 보면 첩보물도 닌자라고 볼 수 없는 여지가 없는 건 또 아니지만!"
1600905-31 = "[s] \"미치루의 바운더리, 너무 넓지 않아?\""
1600905-32 = "5;노점상 아저씨;00;껄껄껄. 뭐, 구경하고 싶은 만큼 구경하면서 데이트를 즐기라고! 아가씨도, 댁도.\n#5;em;[재잘]"
1600905-33 = "#st;[0,0];instant;1;"
1600905-34 = "#clearST"
1600905-35 = "5;노점상 아저씨;00\n#5;dr\n#wait;1500"
1600905-36 = "[ns] \"그렇대.\""
1600905-37 = "1;미치루;04;우, 우냐악! 그러니까 데, 데, 데이트가 아니라……! 어디까지나 공부를 위해……! 지, 지, 진짜, 뭐냐고오!\n#1;m3\n#1;hophop"
1600905-38 = "1;미치루;08;후우……. 후우……. 심호흡. 심호흡……\n#1;greeting"
1600905-39 = "1;미치루;07;좋았어. 나는 이래 봬도 인법연구부의 부장! 겨우 이까짓 일로 당황하진 않으니까!\n#1;em;[땀]\n#1;hophop"
1600905-40 = "1;미치루;07;여기선 명경지수와 같은 마음으로……."
1600905-41 = "1;미치루;04;응? 어, 어엇?!\n#1;em;[?!]"
1600905-42 = "#st;[0,0];instant;1;"
1600905-43 = "#clearST"
1600905-44 = "1;미치루;00\n#1;m5\n#wait;1000"
1600905-45 = "1;미치루;03;………우, 우와아, 선생 공! 이거 봐! 이거! 굉장하지 않아?!\n#1;em;[반짝]\n#1;hophop"
1600905-46 = "[s1] \"명경지수는 어디로?!\"\n[s2] \"그건 기관총이네? 그게 왜?\""
1600905-47 = "1;미치루;05;뭣이?! 이걸 보고 '기관총이네?' 하고 만다니, 믿을 수가 없어! 선생 공! 그건 아니지~!\n#1;em;[?!]\n#1;shake"
1600905-48 = "1;미치루;05;뭣이?! 이걸 보고 '기관총이네?' 하고 만다니, 믿을 수가 없어! 선생 공! 그건 아니지~!\n#1;em;[?!]\n#1;shake"
1600905-49 = "1;미치루;02;이건 평범한 기관총이 아니야! 삼색고양이 냥고로 감독 작품에서 자주 소품으로 나오는 저주받은 마의 기관총 <요총 무라마틀링>이야!"
1600905-50 = "1;미치루;99;무려 기관총을 손에 쥔 사람을 마의 소울을 지닌 고대의 에인션트 닌자로 타락시킨다는 전설적인 물건!"
1600905-51 = "1;미치루;02;아, 물론 삼색고양이 냥고로 감독 작품에서도 세계관을 넘나들며 시도 때도 없이 튀어나오는 어처구니없는 등장 빈도 때문에 팬들 사이에서도 호불호가 갈리긴 하지만…….\n#1;em;…"
1600905-52 = "1;미치루;03;그래도 이 정도의 완성도라니……. 굉장해! 사고 싶어! 얼마지?!\n#1;hophop"
1600905-53 = "1;미치루;04;뭐?! 200만 엔?!\n#1;em;[?!]"
1600905-54 = "1;미치루;06;으읏…… 이, 이건…… 아쉽지만……… 어쩔 수 없……. 응?\n#1;em;[속상함]\n#1;stiff"
1600905-55 = "#st;[0,0];instant;1;"
1600905-56 = "#clearST"
1600905-57 = "1;미치루;02\n#1;m3\n#wait;1500"
1600905-58 = "1;미치루;00;앗! 이건 카이견컹컹 감독 작품의 초기작 포스터잖아?! 진품인가?! 진짜루?! 뭐냐고! 그 가게 주인장의 취향……! 얕볼 수가 없다니까.\n#1;hophop"
1600905-59 = "1;미치루;02;앗! 그리고 또 저건……!\n#1;em;[!]"
1600905-60 = "#na;(그렇게 미처 말릴 틈도 없이 미치루는 이곳저곳을 기웃거리며 감탄을 쏟아 내기 시작했다.)"
1600905-61 = "#all;hide"
1600905-62 = "3;미치루;03;후아아아~~ 진짜 굉장한 물건들로 가득하네! 어딜 봐도 전혀 질리지 않아! 생각 같아선 여기에서 몇 시간, 아니 하루 종일이라도 있을 수 있겠어!\n#3;em;[반짝]\n#3;a"
1600905-63 = "[s] \"미치루, 엄청 즐거워 보이네.\""
1600905-64 = "3;미치루;03;우냐나하핫! 그야 어쩔 수 없는걸. 여긴 완전 보물창고나 다름없다니까! 군침이 흐르는 걸 멈출……. \n#3;em;[재잘]"
1600905-65 = "3;미치루;04;……핫?! 아, 그, 그게…… 미, 미안. 선생 공! 그…… 내가 너무 흥분한 나머지. 그게.\n#3;stiff"
1600905-66 = "3;미치루;06;같이 오자고 먼저 권한 주제에, 기, 기분 나쁘게 혼자 떠들어대기만 하고, 그게 그러니까-\n#3;em;[땀]"
1600905-67 = "[s3] \"아냐. 미치루가 즐거워하는 걸 보니 나도 즐거운걸.\"\n[s4] \"마구 플러스 에너지가 느껴지는 느낌이야.\""
1600905-68 = "3;미치루;07;어?! 그, 그래……? 우, 우헷. 우헤헷……. 프, 플러스 에너지~? 이야~ 이거, 쑥스러운데. 아, 물론 내가 평소에도 파이팅이 넘치기는 하지만-\n#3;em;[///]\n#3;stiff"
1600905-69 = "3;미치루;07;어?! 그, 그래……? 우, 우헷. 우헤헷……. 프, 플러스 에너지~? 이야~ 이거, 쑥스러운데. 아, 물론 내가 평소에도 파이팅이 넘치기는 하지만-\n#3;em;[///]\n#3;stiff"
1600905-70 = "[s] \"미치루를 보고 있으면 질리지가 않는달까.\""
1600905-71 = "3;미치루;04;그, 그렇게 말하니까. 왠지 부끄러운데?!\n#3;hophop"
1600905-72 = "3;미치루;02;뭐, 그래도, 그……. 이렇게 옆에 있어 주고, 같이 다녀 주는 건, 그……. 기쁘다고 할지…….\n#3;em;[///]"
1600905-73 = "#na;불량배 A;케케케! 이건 또 뭐야? 닌자 굿즈? 이딴 걸 어따 써먹는다는 거야? 키히히!"
1600905-74 = "3;미치루;02;……응?\n#3;em;[반응]"

1600905-78 = "2;불량배 A;00\n4;불량배 B;00\n#2;a\n#4;a\n#2;h\n#4;h\n#wait;1500"
1600905-79 = "2;불량배 A;03;케헤헤헤! <초심자용 수리검 세트>으으으? <1분이면 폭발! 간편 연막탄 번들>이라고오오~~?\n#2;em;[재잘]"
1600905-80 = "4;불량배 B;03;대체 이딴 쓰레기 같은 걸 누가 돈 주고 산다는 거야? 바보냐고- 킬킬킬!\n#4;em;[재잘]"
1600905-81 = "2;불량배 A;03\n4;불량배 B;03\n#na;불량배 A&B;완전 구려~!\n#2;h\n#4;h\n#2;em;[재잘]\n#4;em;[재잘]"
1600905-82 = "#all;hide"
1600905-83 = "[ns] \"뭔가 시끄러운 사람들이네……. 응? 미치루?\""
1600905-84 = "3;미치루;04;아, 아이에에에?! 부, 부, 불량배?! 어째서?! 불량배?!\n#3;a\n#3;stiff\n#3;em;[?!]"

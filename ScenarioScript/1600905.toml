[translation]
1600905-1 = "นินจาสาวต้องสั่งสอน"
1600905-2 = "(คุณครูมาที่ร้านขายสินค้านินจา... ไม่สิ ร้านขายอาวุธนินจากับมิจิรุ...)"
1600905-6 = "ท่านอาจารย์! ทางนี้ๆ... ทางนี้--"
1600905-13 = "อา... ถึงสักที ตรงนี้ไง ร้านที่ข้าน้อยบอกน่ะ"
1600905-14 = "[s] \"ที่นี่มัน... ร้านแผงลอยริมทาง? ดูแปลกนิดหน่อยสำหรับร้านขายของนะ\""
1600905-15 = "อุวะฮะฮ่า! จะเรียกว่าเป็นร้านลับที่มีแต่คนที่รู้เท่านั้นที่มาก็ได้นะ"
1600905-16 = "แต่ยิ่งกว่านั้น ที่นี่ไม่ใช่แค่ร้านขายของธรรมดานะ แต่เป็นร้านขายอุปกรณ์นินจาต่างหาก?!"
1600905-17 = "หืม? นึกว่าใคร ที่แท้ก็คุณหนูที่ชอบแต่งคอสเพลย์นินจานี่เอง? วันนี้มาเดตกันเหรอ?"
1600905-18 = "[s] \"ลูกค้าประจำสินะ สวัสดี...\""
1600905-19 = "ดะ...ดะ...ดะ...เดตงั้นเหรอ?!"
1600905-20 = "วันนี้มีอะไรเหรอ? อ้อ มาดูสินค้าที่เข้ามาใหม่เมื่อวานสินะ? โฮ่โฮ่... สมกับเป็นคุณหนูจริงๆ เลย ตาแหลมมาก"
1600905-21 = "อุวะฮะฮ่า! ดีจริงๆ ที่เลือกมาวันนี้ เจ้านี่น่ะยิงดอกไม้ไฟได้สวยมากๆ ในครั้งเดียวเลยนะ... ถ้าเอาไปถ่าย#nวิดีโอตอนแต่งคอสเพลย์จะต้องออกมาสุดยอดมากแน่ๆ!"
1600905-22 = "เดี๋ยวก่อนสิ ข้าน้อยไม่ได้แต่งคอสเพลย์ซะหน่อย!"
1600905-23 = "อ๊ะ เมื่อคราวก่อนก็เคยพูดไว้แล้วเหมือนกันนี่นะ เซ็ตคาแร็กเตอร์ไว้ให้พูดแบบนั้นงั้นเหรอ?  "
1600905-24 = "บางครั้งก็มีพวกคุณหนูที่จู้จี้จุกจิกแบบนี้น่ะ คงลำบากแย่เลยสินะ"
1600905-25 = "[s] \"ไม่หรอก ก็ไม่ได้ลำบากอะไรขนาดนั้น...\""
1600905-26 = "ว้าก!"
1600905-27 = "อืม... แต่ในฐานะคนขายของก็ต้องเล่นตามน้ำไปตามที่ลูกค้าต้องการละนะ เพราะงั้น อืม..."
1600905-28 = "โค้ดเนม Zero-13 คุณหนูต้องการสินค้าแบบไหนหรือครับ?"
1600905-29 = "เชยยยย--! เชยระเบิดระเบ้อเลย! พอๆ! แบบนั้นไม่ใช่แล้ว แบบนั้นมันไม่ใช่คำพูดของนินจาแล้ว!"
1600905-30 = "อ๊ะ- ถ้ามองความหมายแบบกว้างๆ แล้ว พวกแหล่งข่าวเองก็ไม่เชิงว่าจะนับว่าเป็นนินจาได้เหมือนกันนะ!"
1600905-31 = "[s] \"คำนิยามนินจาของมิจิรุ มันกว้างไปรึเปล่า?\""
1600905-32 = "ฮ่าฮ่าฮ่า! ถ้างั้นก็เลือกชมสินค้าได้ตามต้องการเลยนะ อ้อ แล้วก็ขอให้คุณสองคนสนุกกับการเดตนะครับ!"
1600905-36 = "[ns] \"นั่นสินะ...\""
1600905-37 = "อุว้ากกก! ขะ...ข้าน้อยบอกแล้วไงว่าไม่ใช่การเดตน่ะ...! พะ...พูดไม่รู้เรื่องเลยจริงๆ... หะ... ให้ตายสิ!"
1600905-38 = "ฮู่วว... ฮู่วว... หายใจเข้าลึกๆ... หายใจเข้าลึกๆ..."
1600905-39 = "ดีละ! เห็นแบบนี้ข้าน้อยก็เป็นหัวหน้าของชมรมวิจัยศาสตร์นินจานะ! จะมาตกใจกับเรื่องแค่นี้ไม่ได้!"
1600905-40 = "ด้วยจิตใจอันบริสุทธิ์...."
1600905-41 = "หืม? เอ๋...?! "
1600905-45 = "วะ...ว้าววว ท่านอาจารย์! ดูนี่สิ! ดูสิ สุดยอดเลยใช่มั้ยล่ะ?!"
1600905-46 = "[s1] \"จิตใจอันบริสุทธิ์ตรงไหนกัน?!\"\n[s2] \"นั่นมันปืนกลนี่นา? ทำไมเหรอ?\""
1600905-47 = "อะไรกันเนี่ย?! ท่านอาจารย์เห็นสิ่งนี้แล้วยังพูดแบบนั้นอีกเหรอ? ข้าน้อยไม่อยากจะเชื่อเลย! แบบนี้มันไม่ใช่แล้วนะ ท่านอาจารย์~!"
1600905-48 = "อะไรกันเนี่ย?! ท่านอาจารย์เห็นสิ่งนี้แล้วยังพูดแค่ว่า \"นั่นมันปืนกลนี่นา?\" เองงั้นเหรอ? ข้าน้อยไม่อยากจะเชื่อเลย! แบบนี้มันไม่ใช่แล้วนะ ท่านอาจารย์~!"
1600905-49 = "นี่ไม่ใช่ปืนกลธรรมดาหรอกนะ! นี่คือ <ปืนกลต้องสาป> ที่ใช้เป็นอุปกรณ์ประกอบฉากในผลงาน#nของผู้กำกับแมวสามสี ท่านเนียนโกโร่เลยนะ!"
1600905-50 = "อาวุธในตำนานที่ทำให้วิญญาณของผู้ที่ครอบครองอาวุธนี้อยู่ในมือตกต่ำลงมากลายเป็นอสูรไป!"
1600905-51 = "อ๊ะ แน่นอนว่าถึงจะเป็นผลงานกำกับของผู้กำกับแมวสามสี ท่านเนียนโกโร่เองก็ตาม แต่ก็มีพวกแฟนๆ ที่#nทั้งชอบและไม่ชอบผลงานของเขาอยู่เพราะฉากการปรากฏตัวแบบกะทันหัน แล้วก็คอนเซ็ปต์ที่หลุดโลก#nพวกนั้นน่ะ..."
1600905-52 = "แต่ว่ามันยังอยู่ในสภาพสมบูรณ์ขนาดนี้... สุดยอดเลย! ข้าน้อยอยากซื้อกลับไปจัง! ราคาเท่าไรน่ะ?!"
1600905-53 = "อะไรนะ?! สะ...สองล้านเยนเลยเหรอ?!"
1600905-54 = "อึ่ก... นะ... นี่มันน่าเสียดายสุดๆ... ช่วยไม่ได้นะ... หืม?"
1600905-58 = "อ๊ะ! นี่โปสเตอร์ผลงานแรกของผู้กำกับไคโชว์อินุ กูรูรุนี่นา?! โปสเตอร์ของจริงเลยงั้นเหรอ?! อะไรกันเนี่ย! รสนิยมของเจ้าของร้านนี่...! ประมาทไม่ได้เลยจริงๆ"
1600905-59 = "อ๊ะ แล้วก็อันนั้นมัน...!"
1600905-60 = "(หลังจากนั้นมิจิรุก็เริ่มกระโดดโลดเต้นไปมาทั่วร้านพร้อมกับดูสิ่งของต่างๆ ไปอย่างตื่นเต้น)"
1600905-62 = "หูววววว~~ มีแต่ของที่สุดยอดเต็มไปหมดเลย! ดูเท่าไรๆ ก็ไม่เบื่อเลย! ให้อยู่ที่นี่หลายชั่วโมง ไม่สิ... ต่อให้อยู่ที่นี่ทั้งวันก็อยู่ได้ไม่เบื่อเลยละ!"
1600905-63 = "[s] \"มิจิรุดูสนุกมากเลยนะ\""
1600905-64 = "อุวะฮะฮะ! ก็ช่วยไม่ได้นะ... ที่นี่เหมือนห้องเก็บสมบัติเลยนี่นา! เห็นแล้วอยากได้สุดๆ ไปเลย...  "
1600905-65 = "หาาา?! คะ... คือว่า... ขะ... ขอโทษนะ ท่านอาจารย์! ข้าน้อยตื่นเต้นมากไปหน่อย..."
1600905-66 = "ทั้งๆ ที่ข้าน้อยเป็นฝ่ายชวนท่านอาจารย์มาแท้ๆ แต่กลับสนุกอยู่คนเดียวแบบนี้..."
1600905-67 = "[s3] \"ไม่หรอก เห็นมิจิรุสนุกแบบนี้ ครูเองก็สนุกเหมือนกัน\"\n[s4] \"รู้สึกเหมือนเห็นลูกบอลเพิ่มพลังปีศาจเลย...\""
1600905-68 = "เอ๋?! งะ...งั้นเหรอ...? ฮะฮะฮะ...ฮะฮะ... พะ...เพิ่มพลัง~? อา~ แบบนี้มันน่าอายจริงๆ เลยแฮะ ถึงปกติข้าน้อยจะมีพลังงานพร้อมต่อสู้เต็มเปี่ยมอยู่แล้วก็เถอะ-- "
1600905-69 = "เอ๋?! งะ...งั้นเหรอ...? ฮะฮะฮะ...ฮะฮะ... พะ...เพิ่มพลัง~? อา~ แบบนี้มันน่าอายจริงๆ เลยแฮะ ถึงปกติข้าน้อยจะมีพลังงานพร้อมต่อสู้เต็มเปี่ยมอยู่แล้วก็เถอะ-- "
1600905-70 = "[s] \"แค่มองมิจิรุแบบนี้ก็ไม่มีคำว่าเบื่อเลย\""
1600905-71 = "พะ...พูดมาแบบนั้น ข้าน้อยรู้สึกเขินๆ นะ?!"
1600905-72 = "ตะ...แต่ก็เอาเถอะ... คือ... มีท่านอาจารย์มาอยู่ข้างๆ แบบนี้ และไปไหนมาไหนด้วย... ข้าน้อยรู้สึกดีใจ..."
1600905-73 = "คิกๆๆ! อะไรกันเนี่ย? สินค้านินจาเรอะ? ของพวกนี้จะเอาไปใช้ทำอะไรได้ล่ะเนี่ย?! คิกๆๆ!"
1600905-74 = "หืม...?"
1600905-79 = "วะฮ่ะฮ่ะฮ่า! <เซ็ตชูริเคนสำหรับผู้เริ่มต้น> งั้นเหรอ? <เซ็ตระเบิดควันพร้อมใช้ ระเบิดในหนึ่งนาที!> เหรอ~~?"
1600905-80 = "จะมีใครโง่เง่าซื้อขยะพวกนี้ไปใช้กันนะ? โง่รึเปล่า? คิกๆๆ!"
1600905-81 = "บ้าบอจริงๆ~!"
1600905-83 = "[ns] \"เป็นคนพูดเสียงดังจริงๆ เลยนะ... หืม? มิจิรุ?\""
1600905-84 = "อะ...เอ๋?! พะ...พวกเด็กเกเร?! ทะ...ทำไมพวกนั้นถึงมาที่นี่ล่ะ?!"
1600905-89 = "[ns] \"นี่... มิจิรุ? เป็นอะไรรึเปล่า?\""
1600905-90 = "ฮู่ว.... เฮ้อ..."
1600905-91 = "ฮึ่ก... ขะ...ข้าน้อยผู้นี้สูญเสียความเยือกเย็นไปชั่วขณะ... แต่ข้าน้อยไม่เป็นอะไรแล้ว ท่านอาจารย์ไม่ต้อง#nกังวลหรอก ข้าน้อยฟื้นคืนจิตใจอันบริสุทธิ์กลับมาแล้ว...."
1600905-92 = "กะ... กะ... กะ... กะ... กลับ...กลับมา...แล้ว..."
1600905-93 = "[s] \"ตัวสั่นปากสั่นอยู่นะนั่น\""
1600905-94 = "วะ...ว้าก! วะ...ว่าแต่ทำไมพวกเด็กเกเรถึงได้มาโผล่ที่ร้านลับของข้าน้อยแบบนี้ล่ะ?!"
1600905-99 = "ท่านอาจารย์! ดูพวกนั้นสิ! เจ้าพวกนั้นจับต้องของต่างๆ เหมือนกับของไร้ค่าอย่างนั้นเลย ดะ...ดูนั่นสิ! หยิบเล่นแบบไม่มีความเคารพในสิ่งของของนินจาเลย!"
1600905-100 = "ฮึ่ย! เจ้าพวกนั้นไม่รู้อะไรเกี่ยวกับนินจาแท้ๆ แต่กลับพูดจาดูถูกกันแบบนี้ซะได้!"
1600905-101 = "ชิ่วๆ-! ออกไปเลยนะ! หายไปซะเดี๋ยวนี้เลย!"
1600905-102 = "[s] \"มิจิรุ ตรงนั้นมันเป็นกำแพงนะ\""
1600905-103 = "เอ่อ... คือว่า... คือ... ขะ...ข้าน้อยรู้สึกรำคาญใจเกินกว่าที่จะไปเผชิญหน้าแล้วพูดกับเจ้าพวกนั้นซึ่งๆ หน้าน่ะ"
1600905-104 = "ไม่สิ... คะ...คือว่าหากข้าน้อยออกไปเถียงกับเจ้าพวกนักเลงตรงนั้นจะเป็นการกระทำที่สุ่มเสี่ยงมาก..."
1600905-105 = "ถะ...ถ้าทำแบบนั้นผลลัพธ์จะเป็นยังไงก็ไม่อาจรู้ได้...! อื้อ! แบบนั้นมันค่อนข้าง..."
1600905-106 = "ไม่สิ... ถึงจะหาข้ออ้างไปแบบนั้น แต่ข้าน้อยก็รู้ความจริงอยู่แก่ใจ..."
1600905-107 = "และแม้แต่ในสายตาท่านอาจารย์เอง..."
1600905-108 = "คิดแล้วเชียว ข้าน้อยน่าสมเพชจริงๆ ข้าน้อยก็ดีแต่พูด ไม่กล้าออกไปเผชิญหน้า..."
1600905-109 = "[s5] \"ไม่หรอก น่าสมเพชหรือเปล่าไม่ใช่เรื่องสำคัญเลย\"\n[s6] \"คนที่น่าสมเพชน่ะคือพวกที่ส่งเสียงโวยวายทางโน้นต่างหาก\""
1600905-110 = "อ๊ะ ท่านอาจารย์..."
1600905-111 = "อ๊ะ ท่านอาจารย์..."
1600905-112 = "ฮะฮะฮ่า! นี่มันอะไรกันเนี่ย? ปืนกลต้องสาป? แหวนมุรามาตะ? วะฮะฮะฮ่า! ล้อเล่นรึเปล่าเนี่ย~! น่าขำสุดๆ เลย"
1600905-113 = "...?!"
1600905-115 = "หืม? ถ้าถือปืนนี่ไว้จะถูกปีศาจกลืนกิน? ถูกวิญญาณนินจา... ครอบงำ? บ้าบออะไรเนี่ย?"
1600905-116 = "ถ้าทำแบบนี้แล้วจะถูกปืนกลต้องสาปนี่ทำให้ตกต่ำงั้นเรอะ~? ไหนขอทำให้ฉันกลายเป็นอสูรหน่อยสิ~! คิกๆๆ!"
1600905-117 = "คิกๆๆ นินจางั้นเหรอ? เรื่องไร้สาระแบบนั้นใครจะไปเชื่อกัน~! น่าขำสิ้นดี-!"
1600905-118 = "ลองเอาปืนนี่ไปยิงทดสอบดูหน่อยซิ..."
1600905-120 = "เจ้าพวกที่ก่อความไม่สงบตรงนั้นน่ะ--!!"
1600905-125 = "วะ...ว้ากกกก?! ยะ...ยัยเด็กตัวกะเปี๊ยกที่ไหนกันเนี่ย!"
1600905-126 = "จำข้าน้อยเอาไว้ให้ดีละ! เจ้าพวกเด็กเกเรทั้งหลาย! ข้าน้อยคือหัวหน้าชมรมวิจัยศาสตร์นินจา! ผู้ที่มีจิตวิญญาณแห่งนินจาที่แข็งแกร่งที่สุด จิโดริ มิจิรุ!"
1600905-127 = "พูดอะไรไม่เห็นรู้เรื่องเลย?!"
1600905-128 = "ทั้งที่ไม่รู้ว่าปืนกลที่ถืออยู่ในมือนั่นเป็นปืนที่มีค่ามากแค่ไหนแท้ๆ...!! ยังจะกล้ามาหยิบจับแบบนั้นอีก ถ้าเกิดทำเสียหายขึ้นมาจะทำยังไง?! "
1600905-129 = "เธอต่างหากที่ยิงมาก่อนน่ะ..."
1600905-131 = "อย่ามัวแต่พูดพร่ำทำเพลงเลย! ข้าน้อยจะแสดงวิชานินจาของมิจิรุให้ดูเอง! นินจา ดิสทรอยเยอร์!!"
1600905-141 = "อึ่ก!... ฝะ...ฝากไว้ก่อนเถอะ...! ยัยเด็กตัวกะเปี๊ยกหัวหน้าชมรมวิจัยศาสตร์นินจา!"
1600905-142 = "พวกฉันจะจะจำหน้าเธอไว้จนตายเลย คอยดูเหอะ!"
1600905-143 = "เอ๊ะ? เดี๋ยวสิ นั่น...! เดี๋ยวก่อนสิ?!"
1600905-147 = "จะเป็นอะไรรึเปล่านะ...?! พวกนั้นบอกจะจำหน้าไว้จนตายเลย?!"
1600905-148 = "ต่อไปถ้าเดินถนนในตอนกลางคืนจะเป็นอะไรรึเปล่า?!"
1600905-149 = "[s] \"ไม่เป็นไรหรอก เก่งมากเลยนะ มิจิรุ\""
1600905-150 = "ปะ...เปล่าสักหน่อย แหะๆๆ... เก่งอะไรกันเล่า... พอเห็นเจ้าพวกเด็กเกเรแตะต้องสินค้าพวกนี้ตามอำเภอใจ ข้าน้อยก็เลือดขึ้นหน้าโดยไม่รู้ตัว..."
1600905-151 = "[s] \"ว่าแล้วเชียว ของพวกนั้นเป็นสินค้าไม่ใช่อาวุธนินจาสินะ\""
1600905-152 = "ทำไมถึงพูดแบบนั้นเล่า ท่านอาจารย์?!"
1600905-153 = "โธ่เอ๊ย~ ได้ยินเสียงเอะอะโวยวาย ก็นึกว่ามีเรื่องอะไรกัน แต่คุณหนูลูกค้าประจำก็รับมือให้ไปแล้วสินะ ขอบคุณมากเลยนะ คุณหนู"
1600905-154 = "วะฮะฮะ พูดอะไรอย่างนั้น..."
1600905-155 = "แต่จากเหตุการณ์เมื่อกี้ทำให้เห็นเลยนะว่าคุณหนูชอบของพวกนี้มากแค่ไหน เพราะงั้นเดี๋ยวจะให้ของ#nชิ้นนี้เป็นการตอบแทนแล้วกันนะ"
1600905-156 = "หาาา?! คุณลุง?! ถ้าให้ข้าน้อยพูดความรู้สึกจากใจละก็ ข้าน้อยอยากที่จะถ่ายคลิปวิดีโอโพสต์ลงในช่อง#nวิดีโอของข้าน้อยมากก็จริง..."
1600905-158 = "แต่จะให้ปืนกลมุรามาตะ ราคาสองล้านเยนกันง่ายๆ แบบนี้มันไม่เกินไปหน่อยเรอะ?"
1600905-160 = "หืม? อันนี้คงให้ไม่ได้หรอกนะ"
1600905-161 = "[s] \"น่าเสียดายนะ มิจิรุ\""
1600905-162 = "วะ...ว้าก! อย่าทำให้คนอื่นเขาเข้าใจผิดง่ายๆ แบบนี้สิ!"
1600905-163 = "เอ้า สินค้าที่เข้ามาใหม่คราวนี้ ขอบคุณคุณหนูมากที่ช่วยร้านของเราไว้นะ เพราะมีแฟนๆ ที่หลงใหล#nสินค้าพวกนี้อย่างพวกเธออยู่ ร้านของเราเลยอยู่รอดได้ ต่อไปก็ขอฝากด้วยนะ"
1600905-164 = "อา..."
1600905-165 = "[s7] \"ดีจังนะมิจิรุ ทั้งขับไล่เด็กเกเรไปได้ แถมได้ของที่อยากได้มาด้วย\"\n[s8] \"สมกับเป็นฝีมือของจิโดริ มิจิรุ หัวหน้าชมรมวิจัยศาสตร์นินจาจริงๆ\""
1600905-166 = "แต่แจกแจงซะละเอียดแบบนั้นมันน่าอายนะ ท่านอาจารย์?!"
1600905-167 = "แต่แจกแจงซะละเอียดแบบนั้นมันน่าอายนะ ท่านอาจารย์?!"
1600905-168 = "ตะ.. แต่ว่า..."
1600905-169 = "อื้อ...! ยังไงก็ปิดฉากลงได้อย่างสวยงามนะ! อุวะฮะฮะฮะ~!"
1600905-171 = "(จากนั้นคุณครูก็ใช้เวลาเดินช้อปปิ้งกับมิจิรุต่ออย่างสนุกสนานอยู่พักใหญ่)"

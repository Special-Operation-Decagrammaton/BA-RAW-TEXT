1600905-90 = "3;미치루;04;후우……. 하아…….\n#3;a\n#3;greeting"
1600905-91 = "3;미치루;05;핫! 소생씩이나 되는 몸……. 자, 잠시 평정을 잃었소이다만. 지금은 괜찮소. 선생 공. 다시금 소생은 명경지수와도 같은 마음을 되찾아,\n#3;em;[!]\n#3;jump"
1600905-92 = "3;미치루;04;되찾, 찾아차자차차차찾…….\n#3;stiff"
1600905-93 = "[s] \"몸하고 말꼬리가 엄청 흔들리고 있는데.\""
1600905-94 = "3;미치루;06;우냐앗! 그, 그도 그럴게! 왜 불량배 녀석들이 나의 성지에 나타난 거냐구웃?!\n#3;hophop"
1600905-95 = "#st;[0,0];instant;1;"
1600905-96 = "#clearST"
1600905-97 = "4;불량배 A;01\n5;불량배 B;01\n#4;al\n#5;al\n#3;m1\n#4;h\n#5;h\n#wait;1000"
1600905-98 = "4;불량배 A;03\n5;불량배 B;03\n#4;hophop\n#5;hophop\n#4;h\n#5;h\n#4;em;[재잘]\n#5;em;[재잘]\n#wait;1500"
1600905-99 = "4;불량배 A;03\n5;불량배 B;03\n3;미치루;05;선생 공! 지금도 저길 봐! 아무렇지나 않게 굿즈를 두드리면서, 저, 저저! 닌자에 대한 애정이나 존중은 하나도 보이지 않는 거친 손놀림을!\n#3;em;[빠직]"
1600905-100 = "4;불량배 A;03\n5;불량배 B;03\n3;미치루;05;지인-짜! 닌자라고는 하나도 모르면서, 구리다느니, 시대착오적이라느니 있는 말, 없는 말이나 잔뜩 해대기나 하고 말이야!\n#4;dr\n#5;dr\n#3;m3"
1600905-101 = "3;미치루;05;쉿쉿-! 저리 가! 얼른 사라지라고!\n#3;m1\n#3;hophop"
1600905-102 = "[s] \"미치루, 거긴 벽이야.\""
1600905-103 = "3;미치루;06;아…… 그게……. 우으……. 지, 직접 얼굴을 맞대고 이야기하는 건, 그게 좀. 껄끄럽다고나 할까-\n#3;stiff\n#3;em;[땀]"
1600905-104 = "3;미치루;04;아니, 그, 그러니까! 불량배들한테 다짜고짜 큰소리를 치는 건 리스크가 크다고나 할까.\n#3;m3\n#3;hophop"
1600905-105 = "3;미치루;07;그, 그게! 어디서 어떻게 될지 모르는 거니까! 응! 역시, 그게 좀……!"
1600905-106 = "3;미치루;02;……으응, 아니, 이런 식으로 변명을 해봤자. 그게, 실은 나도 알고 있지만…….\n#3;em;…"
1600905-107 = "3;미치루;06;선생 공이 보기에도……. 그게."
1600905-108 = "3;미치루;06;……역시, 한심하지? 앞에 나서지도 못한 주제에, 입으로만 이런 말을 하기만 하고…….\n#3;stiff\n#3;em;[속상함]"
1600905-109 = "[s5] \"아니, 겨우 그런 걸로 한심한가, 아닌가가 갈리지는 않아.\"\n[s6] \"실제로 한심한 짓을 하는 건 소동을 일으키는 저쪽이고.\""
1600905-110 = "3;미치루;02;아, 선생 공…….\n#3;em;…"

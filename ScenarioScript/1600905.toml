[translation]
1600905-1 = "Ninja Girl Never Hides Anything"
1600905-2 = "I ended up going to a shop that sells ninja merch...I mean, ninjutsu tools with Michiru."
1600905-6 = "Sensei, this way!"
1600905-13 = "We're here. This is my absolute favorite shop!"
1600905-14 = "[s] \"A street vendor? What a weird merch shop.\""
1600905-15 = "Wahaha, right? It's one of Kivotos' best kept secrets."
1600905-16 = "But Sir Sensei! I told you! It's a ninjutsu shop, not merch!"
1600905-17 = "Welcome back! You're the ninja cosplay girl! Are you on a date?"
1600905-18 = "[s] \"He recognized you right away...\""
1600905-19 = "D-D-D-Date?!"
1600905-20 = "How can I help you today? You always have such good taste, you must be looking for our new products."
1600905-21 = "Hahaha! This new one is legit! It's a bona fide flamethrower! There's nothing better for cosplay!"
1600905-22 = "I've told you, it's not cosplay!"
1600905-23 = "Oh! Sorry, I keep forgetting about our scenario. "
1600905-24 = "Some ladies are so particular about things. She must be high-maintenance!"
1600905-25 = "[s] \"It's really not like that.\""
1600905-26 = "Eek!"
1600905-27 = "But a good seller must meet the customer's demands... So..."
1600905-28 = "This is code name Zero 13. Mademoiselle, what do you need?"
1600905-29 = "No! Just no! Wrong! That's not the right genre! That's not how ninjas operate!"
1600905-30 = "Oh, I guess in a broad sense, a cloak-and-dagger bit could be a part of a ninja story!"
1600905-31 = "[s] \"That might be a bit of a stretch.\""
1600905-32 = "Hahaha. I tried. Look around as long as you want. Enjoy your date!"
1600905-36 = "[ns] \"All right, then.\""
1600905-37 = "A-Argh! I said it's not a d-date! This is for educational purposes! What the heck?!"
1600905-38 = "*inhale* *exhale* Take a breath..."
1600905-39 = "All right. I'm the president of the Ninjutsu Research Club! I won't be embarrassed by something so trivial!"
1600905-40 = "I must keep my mind clear and calm."
1600905-41 = "Huh? Ehhhh?!"
1600905-45 = "Sir Sensei! Look, look at this! Isn't this amazing?"
1600905-46 = "[s1] \"I thought you were trying to be calm.\"\n[s2] \"That's a machine gun. What about it?\""
1600905-47 = "That's all you have to say? Come on, Sensei!"
1600905-48 = "That's all you have to say? Come on, Sensei!"
1600905-49 = "This is no ordinary machine gun! It's a cursed, evil machine gun called the Wicked Muramatling, which often appears in movies directed by Calico Nyangoro!"
1600905-50 = "When you hold this machine gun, it corrupts you with the soul of a demonic, ancient ninja."
1600905-51 = "Of course, it's kind of ridiculous that it appears randomly and crosses movie universes. Fans either love it or hate it, but still..."
1600905-52 = "Look at the level of details... Amazing! How much is it?!"
1600905-53 = "What?! Two million yen?!"
1600905-54 = "Ugh... That's a shame... I guess I'll have to pass... Huh?"
1600905-58 = "Oh! This is a poster of Director Kaigenwoofwoof's early work?! Is this the original? Really?! Whoa, the shop owner's taste is really something else!"
1600905-59 = "Oh! And that's...!"
1600905-60 = "Before I could say a word, Michiru scurried around the shop, admiring every corner of the displays."
1600905-62 = "Whooaa! This shop is full of incredible items! I could stay and look around for hours, I mean, for days!"
1600905-63 = "[s] \"You look like you're having a lot of fun.\""
1600905-64 = "Wahahaha! Of course. This place is like a treasure chest! I'm drooling just looking! "
1600905-65 = "...Oh! I-I just... I'm sorry, Sensei! I got too excited."
1600905-66 = "I dragged you all the way here... Am I being too much...?"
1600905-67 = "[s3] \"No, it's nice watching you have so much fun.\"\n[s4] \"Just watching you gives me life.\""
1600905-68 = "Oh, really? Hee...heehee... Wow, I'm blushing. I mean, I do have a lot of energy."
1600905-69 = "Oh, really? Hee...heehee... Wow, I'm blushing. I mean, I do have a lot of energy."
1600905-70 = "[s] \"It's always interesting to watch you, Michiru.\""
1600905-71 = "Is that a compliment?!"
1600905-72 = "I'm kind of glad...you came with me."
1600905-73 = "What's this? Ninja merch? Where would you use that? Hahaha!"
1600905-74 = "Huh?"
1600905-79 = "Hahaha! Beginner's Shuriken Set? \"Detonates in one minute!\" Simple Smoke Bomb Bundle?!"
1600905-80 = "Who would buy this garbage? So stupid! *giggle*"
1600905-81 = "Lame-o!"
1600905-83 = "[ns] \"They're being kind of loud... Huh? Michiru?\""
1600905-84 = "E-Ehhhh? Th-Thugs? Why?!"
1600905-89 = "[s] \"Michiru? Are you all right?\""
1600905-90 = "*inhale* *exhale*"
1600905-91 = "Sorry, I lost my cool. I'm okay now, Sensei. I'll use ninjutsu to empty my mind like crystal clear water..."
1600905-92 = "C-C-Calm...d-down..."
1600905-93 = "[s] \"Your voice is shaking...and your hands.\""
1600905-94 = "Waaah! I mean, what are these thugs doing at my sanctuary?!"
1600905-99 = "Sensei, look! They're messing around with everything... They're being so disrespectful!"
1600905-100 = "They don't even know anything about ninjas. How can they call them lame?"
1600905-101 = "Go away! Get lost!"
1600905-102 = "[s] \"Michiru, you're talking to the wall.\""
1600905-103 = "Well... Ugh! I-I'm scared to yell at them face-to-face."
1600905-104 = "It's kind of risky to just engage without a plan..."
1600905-105 = "Y-You never know what might happen."
1600905-106 = "I know this is just an excuse, but..."
1600905-107 = "You must be judging me..."
1600905-108 = "...This is dumb, right? I can't even stand up for myself. I'm all talk."
1600905-109 = "[s5] \"No, I don't think you're dumb at all. \"\n[s6] \"The real dumb ones are the ones causing the problem.\""
1600905-110 = "Oh, Sensei..."
1600905-111 = "Oh, Sensei..."
1600905-112 = "Heehee! This is supposed to be an evil machine gun? Muramatling? It gets stupider and stupider!"
1600905-113 = "...?!"
1600905-115 = "If you hold this, the evil machine gun will control you? Ancient...ninja soul? What the hell?"
1600905-116 = "We're gonna get possessed by an evil machine gun! Let's try it!"
1600905-117 = "*giggle* Who likes stupid ninjas? It's so lame!"
1600905-118 = "Let's have a test shot..."
1600905-120 = "You're the lame ones!"
1600905-125 = "Who the hell do you think you are?"
1600905-126 = "Who am I?! Remember my name, thugs! I'm the president of the Ninjutsu Research Club! Chidori Michiru, the most powerful ninja you'll ever meet!"
1600905-127 = "What in the world are you talking about?!"
1600905-128 = "You'll never recognize the greatness of that machine gun! Put it down right now! "
1600905-129 = "You shot us out of nowhere!"
1600905-131 = "Shut up! I'll show you the power of Michiru-style ninjutsu! Ninja destruction!!!"
1600905-141 = "Y-You'll pay for this, president of the Ninjutsu Research Club!"
1600905-142 = "I'll remember your face forever!"
1600905-143 = "Huh?! Well, that's a bit... Don't do that!"
1600905-147 = "Are they really gonna remember my face?"
1600905-148 = "I need to watch my back at night!"
1600905-149 = "[s] \"It's okay, Michiru. You did really well.\""
1600905-150 = "Heehee... It's everyday business for a ninja... I couldn't let some thugs disrespect the merch like that."
1600905-151 = "[s] \"So it IS merch, not ninja tools.\""
1600905-152 = "Sensei, was that really necessary?"
1600905-153 = "Wow. You took care of those hooligans like a real ninja. Thank you, lady!"
1600905-154 = "Heeheehee. Don't mention it!"
1600905-155 = "You really care about these items, huh? I'll give you this merch to thank you."
1600905-156 = "What? Really?! I mean, I'll admit what I did was so cool it should be uploaded to our channel to go viral, but..."
1600905-158 = "B-B-But the Muramatling costs two million yen! Can you really let it go?!"
1600905-160 = "Huh? I wasn't gonna give you that one."
1600905-161 = "[s] \"That's too bad, Michiru.\""
1600905-162 = "Don't get me excited for nothing, then!"
1600905-163 = "Here's some new merch that just came in. Once again, thanks for your help. Our shop wouldn't exist without fans like you. We look forward to your continuing support."
1600905-164 = "..."
1600905-165 = "[s7] \"Wow, that's great, Michiru. You defeated the thugs and got the merch you wanted.\"\n[s8] \"What an amazing achievement for Chidori Michiru, the strongest ninja around!\""
1600905-166 = "I'm blushing, Sensei! But what an accurate description!"
1600905-167 = "I'm blushing, Sensei! But what an accurate description!"
1600905-168 = "B-But..."
1600905-169 = "Well, anyway! This is a happy ending! Wahaha!"
1600905-171 = "After that, Michiru and I enjoyed shopping for merch a little longer."

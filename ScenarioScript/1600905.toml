[translation]
1600905-1 = "忍者少女不隱瞞"
1600905-2 = "（就這樣，我和三千留一起前往販售忍者周邊……不對，是販售忍具的店）"
1600905-6 = "老師大人，在這裡，這邊！"
1600905-13 = "我們到了！！這間就是我常光顧的店。"
1600905-14 = "[s]「是個攤販……？以精品周邊商店來說還挺少見呢。」"
1600905-15 = "對吧對吧！但這樣感覺才有內行人的帥氣……"
1600905-16 = "……唉唷不是啦，老師大人！這裡賣的不是周邊，而是貨真價實的「忍具」啦！"
1600905-17 = "喔，還以為是誰呢……原來是常來光顧的忍者服小姐啊，今天是來約會的嗎？"
1600905-18 = "[s]「竟然光顧到老闆都認識你了，您好。」"
1600905-19 = "約，約約約約會！？"
1600905-20 = "今天來有什麼事呀？想看看新推出的周邊嗎？"
1600905-21 = "昨天進了一批不錯的唷，可以一次拿好多煙火在手上。最適合cosplay了！"
1600905-22 = "就，就說我這不是cosplay了嘛！"
1600905-23 = "啊對齁，是那種設定啊。"
1600905-24 = "別在意那麼多嘛。客人你也很不容易呢。"
1600905-25 = "[s]「啊哈哈……不至於那麼辛苦啦……」"
1600905-26 = "聽我說啦──！"
1600905-27 = "嗯～不過身為賣家，我應該還是要回應客人的需求……好。"
1600905-28 = "……這裡是代號：0030。小姐，你今天有何需求？"
1600905-29 = "出局！這擦邊球也太大膽！然後那部不是忍者電影啊！"
1600905-30 = "雖然廣義來說，間諜也算是忍者的一種啦……！"
1600905-31 = "[s]「三千留對忍者有很大的解釋空間呢。」"
1600905-32 = "總之，祝兩位約會開心啊！"
1600905-36 = "[ns]「啊，他走掉了耶。」"
1600905-37 = "啊啊，討厭！我明明就說不是約會了……！一天單純只為為了學習啊……！"
1600905-38 = "唉，深呼吸深呼吸……吸──吐──"
1600905-39 = "好，我可是忍術研究部的部長，不能因為這點事而自亂陣腳！"
1600905-40 = "我要用心如止水般的意志……"
1600905-41 = "咦，啊？！"
1600905-45 = "哇啊，老師大人！你看！這東西好棒喔！？"
1600905-46 = "[s1]「說好的心如止水……」\n[s2]「機關槍？」"
1600905-47 = "老師大人，你反應也太平淡！你怎麼會不懂呢！"
1600905-48 = "老師大人，你反應也太平淡！你怎麼會不懂呢！"
1600905-49 = "這才不是普通的機關槍！這是「三毛貓喵五郎」導演的作品中經常出現的，受詛咒的機關魔槍「妖槍村林」！"
1600905-50 = "持有者會變成具有魔魂的古代忍者！是傳說中的武器！"
1600905-51 = "啊，不過就算是「三毛貓喵五郎」導演的作品，每個作品裡記載的內容也不太一樣，導致這個物品在粉絲間的評價毀譽參半……"
1600905-52 = "但這完成度依然好高啊！我好想要……"
1600905-53 = "要200萬元！？"
1600905-54 = "呃，這我實在無法……嗯？"
1600905-58 = "啊！這是「甲斐犬汪汪」導演首部作品的海報！這是真品嗎！？太厲害了，竟然連這種東西都有……"
1600905-59 = "啊！那個該不會是……！"
1600905-60 = "（於是三千留開始開開心心的物色各個商品）"
1600905-62 = "喔咻～～太棒了，我可以在這裡待上一整天！"
1600905-63 = "[s]「你看起來很開心呢。」"
1600905-64 = "那當然！這裡就像一座寶山！讓我興奮地停不下來呀！"
1600905-65 = "……哈！？抱歉，老師大人！我太激動了……"
1600905-66 = "感覺就像是把老師大人拋下不管……"
1600905-67 = "[s3]「別在意，看到三千留開心我也很高興。」\n[s4]「感覺吸收到很多正能量。」"
1600905-68 = "是，是嗎……？欸嘿，欸嘿嘿……畢，畢竟我是部長嘛！當然要充滿活力囉！"
1600905-69 = "是，是嗎……？欸嘿，欸嘿嘿……畢，畢竟我是部長嘛！當然要充滿活力囉！"
1600905-70 = "[s]「就是啊，百看不膩呢。」"
1600905-71 = "你，你那樣講讓人挺害羞的耶！？"
1600905-72 = "不過，那個……你肯像這樣在我身邊陪我……我很開心……"
1600905-73 = "這什麼鬼？忍者周邊？小孩子的玩具嘛！"
1600905-74 = "……嗯？"
1600905-79 = "「初學者用手裏劍套組」，「1分鐘就能爆炸！簡易煙霧彈」……？"
1600905-80 = "太蠢了吧？這種東西誰會買啊！"
1600905-81 = "現在哪有人會買這種東西。"
1600905-83 = "[ns]「……嗯？三千留？」"
1600905-84 = "這群小流氓……！！"
1600905-89 = "[ns]「那個，三千留？你還好吧？」"
1600905-90 = "嗚……"
1600905-91 = "……哈！我，我有點失去平常心了，但不要緊，老師大人。我這次一定會以心如止水的精神，找回冷靜……"
1600905-92 = "冷靜冷冷靜靜冷靜……"
1600905-93 = "[s]「你的身體和說話的聲音抖得很厲害耶……」"
1600905-94 = "唉唷！沒辦法呀！為什麼那群小流氓會闖進我的聖地啊！？"
1600905-99 = "啊啊！竟然把商品拿起來把玩……！動作還那麼粗魯……！"
1600905-100 = "明明不懂忍者，還嫌人家土氣，不合時代……在那邊大言不慚！"
1600905-101 = "噓，噓！走開！快消失！"
1600905-102 = "[s]「三千留，那裡是牆壁。」"
1600905-103 = "嗚呃……因為直接當著他們的面說，有點……"
1600905-104 = "對！風險會有點大！"
1600905-105 = "因此會無法預測會演變成怎樣的狀況，那可不太好……！"
1600905-106 = "不對，這只是藉口……"
1600905-107 = "那個，老師大人一定也覺得，我這樣……很丟人吧？"
1600905-108 = "只會出一張嘴……"
1600905-109 = "[s5]「沒那回事。」\n[s6]「真正丟人現眼的，是那邊那幾個人。」"
1600905-110 = "老師大人……"
1600905-111 = "老師大人……"
1600905-112 = "這又是什麼？機關魔槍「妖槍村林」？俗爆！！"
1600905-113 = "！？"
1600905-115 = "嗯？拿著它就會被魔槍支配……？古代……在說什麼鬼話？"
1600905-116 = "嘻哈哈！你拿拿看呀！說不定真的會被支配唷！"
1600905-117 = "我聽你放屁！少開玩笑了好不好！啊哈哈哈哈！"
1600905-118 = "要不要拿它試開一槍……"
1600905-120 = "你們才不要開玩笑了！！"
1600905-125 = "呃啊啊！？你，你是誰！"
1600905-126 = "給我聽好了！可惡的小流氓！我是忍術研究部的部長！擁有最強忍者之魂的，千鳥三千留！"
1600905-127 = "這傢伙有病！？"
1600905-128 = "你們根本不知道那把機關槍的價值……那樣隨意亂碰要是弄壞了怎麼辦！？"
1600905-129 = "不對，開槍的是你吧……被弄壞也是因為你吧……"
1600905-131 = "少囉嗦！三千留流忍術，忍者毀滅！！！"
1600905-141 = "可惡，我們走著瞧！忍術研究部的部長！"
1600905-142 = "我們記清楚你那張臉了！"
1600905-143 = "咦！？那，那就有點困擾！？"
1600905-147 = "不是吧，我的臉被人記住了……"
1600905-148 = "以後我走夜路時不會有事吧！？"
1600905-149 = "[s]「我覺得不用擔心。總之辛苦你了，三千留。」"
1600905-150 = "不會啦，欸嘿嘿……只是因為那群小流氓對忍者周邊很粗魯，不知不覺就一肚子火……"
1600905-151 = "[s]「喔，你說那是忍者周邊了。」"
1600905-152 = "啊啊！？"
1600905-153 = "哈哈。我才正想出言制止呢，謝謝你幫我解決他們，常客小姐。"
1600905-154 = "啊，不會，這沒什麼……"
1600905-155 = "我再次了解到小姐有多深愛忍者了。這商品就送給你當紀念吧。"
1600905-156 = "真，真的可以嗎！？其實我沒……雖然我是有在頻道上傳自己活動的影片啦！"
1600905-158 = "但我真的可以收下嘛！？這個價值200萬元的「妖槍村林」！？"
1600905-160 = "不，那個可不行。"
1600905-161 = "[s]「真可惜。」"
1600905-162 = "咦？！虧我真的很期待耶……"
1600905-163 = "我想送的是其他商品啦。來，這是這次新進的商品。謝謝你的幫忙。因為有像你這樣的粉絲，我這家店才能堅持下去。"
1600905-164 = "啊……"
1600905-165 = "[s7]「真是太好了。不但擊退小流氓，也有收到謝禮。」\n[s8]「真不愧是千鳥三千留，忍術研究部部長！！」"
1600905-166 = "你這種誇法會讓人很不好意思啊！老師大人！？"
1600905-167 = "你這種誇法會讓人很不好意思啊！老師大人！？"
1600905-168 = "不，不過……"
1600905-169 = "……嗯！總之今天的結局很圓滿！！"
1600905-171 = "（之後我和三千留又一起逛了一會兒，度過歡樂的時光）"

[translation]
10000010-1 = "ตอนที่ 1;ยินดีต้อนรับสู่ร้านเฮียกคิยาโค"
10000010-2 = "ร้านเฮียกคิยาโคงั้นเหรอ? ใช่ร้านชาที่ดังๆ ไหม?"
10000010-3 = "ง่ำๆ ใช่แล้ว ขนมอันมิสึสตรอว์เบอร์รี่ของร้านเฮียกคิยาโคอร่อยที่สุดเลย"
10000010-4 = "แล้วก็สิ่งที่หอมหวานจนเกินต้าน......"
10000010-6 = "รอยยิ้มที่น่ารักของชิซุโกะยังไงล่ะ!"
10000010-8 = "(เดินหาร้านเฮียกคิยาโคจนมาหยุดที่หน้าร้านจนได้)"
10000010-12 = "หาร้านเราเจอแล้วเหรอคะ? ยินดีต้อนรับค่าา!"
10000010-13 = "ได้ยินมาว่ามาจากฝ่ายชาเล่ต์เลยเหรอคะ? ฉันชื่อพีน่านะคะ! รอคุณครูคนดังอยู่นานเลย~!"
10000010-14 = "[s1] \"หืม…?\"\n[s2] \"ฝะ.. ฝ่ายชาเล่ต์งั้นเหรอ?\""
10000010-15 = "เดี๋ยวก่อน เดี๋ยวก่อน พีน่า! คุณครูทำตัวไม่ถูกแล้ว!"
10000010-16 = "เดี๋ยวก่อน เดี๋ยวก่อน พีน่า! คุณครูทำตัวไม่ถูกแล้ว!"
10000010-17 = "เอ๋...? แต่หัวหน้าเองไม่ใช่เหรอ.."
10000010-18 = "ที่บอกเราว่าหากคุณครูมา ให้เราต้อนรับให้ตกใจไปเลย"
10000010-19 = "ไม่ใช่แบบนั้นสักหน่อย ไอดอลแห่งร้านเฮียกคิยาโคต้องทำให้ลูกค้าประทับใจตั้งแต่ครั้งแรกสิ!"
10000010-20 = "ใช่แล้ว ความประทับใจแรกนี่แหละสำคัญ!"
10000010-21 = "เราต้องทำตัวน่ารักตั้งแต่เจอลูกค้าครั้งแรก แล้วก็ให้คะแนนความชื่นชอบของคุณครูเป็น MAX เลย"
10000010-22 = "[s] \"เอ่อ.. คือว่า...\""
10000010-23 = "อ๊ะ?! คุณครู?!"
10000010-24 = "เอ่อ... คือว่า อืม..."
10000010-25 = "ดะ... เดเฮตเปโร....?"
10000010-26 = "เอ่อ... แหะๆ!"
10000010-29 = "เชิญค่ะคุณครู!!"
10000010-30 = "ยินดีต้อนรับสู่ร้านเฮียกคิยาโค~! เมี้ยวว!"
10000010-31 = "[s] \"เมี้ยว......?\""
10000010-32 = "ฮิฮิ! ฉันจะพาเข้าไปในร้านนะคะ!"
10000010-33 = "พีน่า มีลูกค้าหนึ่งท่าน!"
10000010-34 = "ค่าา! ฉันชื่อพีน่า! ฉันจะใช้พลังทั้งหมดที่มีเพื่อดูแลลูกค้าเองค่ะ!"
10000010-35 = "มะ... ไม่ได้หมายความอะไรแบบนั้นสักหน่อย!"
10000010-37 = "จะว่าไป.. คุณครูมาที่นี่จริงๆ ด้วย!"
10000010-38 = "[s] \"ก็เป็นครูของชาเล่ต์นี่นา\""
10000010-39 = "อะแฮ่ม! งั้นฉันขอแนะนำตัวอย่างเป็นทางการนะคะ"
10000010-40 = "ฉันชื่อคาวาวะ ชิซุโกะ"
10000010-41 = "เป็นหัวหน้าชมรมจัดงานเทศกาลประจำสหพันธ์เฮียกคิยาโค และเจ้าของร้านชาดั้งเดิมที่เรา#nชาวเฮียกคิยาโคภาคภูมิใจ!"
10000010-42 = "แถมยังควบตำแหน่งหน้าตาของเฮียกคิยาโค และเป็นไอดอลของทุกคนด้วย!"
10000010-43 = "ส่วนฉันก็คือพนักงานของร้านเฮียกคิยาโค!"
10000010-44 = "พีน่าที่ใฝ่ฝันอยากเป็นอัศวินค่ะ!"
10000010-45 = "[s] \"ฝากตัวด้วยนะ.. ทั้งสองคนเลย\""
10000010-46 = "อย่างนี้แปลว่าคุณครูเพิ่งมาที่สหพันธ์เฮียกคิยาโคเป็นครั้งแรกเหรอคะ?"
10000010-47 = "ถ้าอย่างนั้น ขอโปรโมตโรงเรียนในฐานะหัวหน้าชมรมจัดงานเทศกาลหน่อยแล้วกัน"
10000010-50 = "เดิมทีแล้วสหพันธ์เฮียกคิยาโคคือสถานที่แบบไหนกันน้า~!"
10000010-52 = "สหพันธ์เฮียกคิยาโคของเราคือสถานศึกษาในเขตปกครองตนเองที่ถูกพัฒนาจนเป็นศูนย์กลาง#nทางการท่องเที่ยว"
10000010-54 = "เรามีทั้งงานเทศกาล บ่อน้ำพุร้อน ดนตรี และความบันเทิง"
10000010-55 = "แล้วก็อาหารอร่อยๆ ที่พลาดไม่ได้"
10000010-57 = "ที่นี่คือที่ที่ผสมผสานความหลากหลายของนักเรียนและวัฒนธรรมที่แตกต่างได้อย่างลงตัว!"
10000010-59 = "ส่วน <ชมรมจัดงานเทศกาล> ของเราก็รับผิดชอบการจัดงานเทศกาล ซึ่งถือเป็นส่วนที่สำคัญที่สุด#nของอุตสาหกรรมการท่องเที่ยวของเฮียกคิยาโค"
10000010-60 = "เรียกว่าเป็นชมรมที่ทั้งวางแผน เป็นเจ้าภาพ บริหาร แล้วก็จัดการทั่วไป! อ่ะแฮ่ม!"
10000010-61 = "และร้านเฮียกคิยาโคก็เป็นกองบัญชาการสุดคูลของชมรมเราค่ะ!"
10000010-62 = "และตอนนี้เทศกาลแห่งค่ำคืนสีขาวที่พวกเราลงมือลงแรงกันก็ได้เปิดอย่างสำเร็จลุล่วงแล้ว!"
10000010-63 = "ฮิฮิ! นี่แหละค่ะคือพลังของชมรมจัดงานเทศกาล!"
10000010-64 = "[s] \"ถนนทั้งเส้นมีชีวิตชีวามากเลยล่ะ\""
10000010-65 = "ถึงเทศกาลของเราจะกำลังเป็นไปได้สวยหลังจากความพยายามอย่างหนักของเราก็เถอะ..."
10000010-66 = "เฮ้อ แต่ก็มีพวกนักเลงมาก่อกวนจนได้"
10000010-67 = "วันนี้เกิดความโกลาหลตั้งแต่เช้าเลยล่ะค่ะ..."
10000010-68 = "[s] \"ว่าแต่มีเรื่องอะไรอยากปรึกษาเหรอ?\""
10000010-69 = "เราเชิญคุณครูมาครั้งนี้เพื่อชมเทศกาลแห่งค่ำคืนสีขาวก็จริง..."
10000010-72 = "OMG! หัวหน้า! พวกนั้นมาอีกแล้ว!"
10000010-73 = "ไม่นะ! เจ้าพวกนี้! พูดถึงก็มาเลยเหรอเนี่ย?!\n"
10000010-74 = "อ๊ะ..."
10000010-75 = "อ่า แหะๆ เดเฮต เปโร....?"
10000010-76 = "รายละเอียดเพิ่มเติมเดี๋ยวฉันไปบอกข้างนอกนะคะ!"
10000010-79 = "ก๊ากฮ่าฮ่าฮ่า! พวกเราคือปีศาจแห่งเฮียกคิยาโค"
10000010-80 = "ชื่อของพวกเราก็คือ... ปีศาจบนท้องถนน!"
10000010-81 = "เอาล่ะ ได้เวลาทำตามภารกิจของผู้ว่าจ้าง! ทำให้ที่นี่อลหม่าน!"
10000010-83 = "[ns3] \"นี่คือการแสดงของเทศกาลนี้เหรอ?\"\n[ns4] \"งานเทศกาลสมัยนี้จัดเต็มเลยนะเนี่ย\""
10000010-84 = "จะเป็นแบบนั้นไปได้ยังไงล่ะคะ! ว่าแต่ มีเทศกาลไหนจัดอะไรแบบนี้ด้วยเหรอคะ?!"
10000010-85 = "จะเป็นแบบนั้นไปได้ยังไงล่ะคะ! ว่าแต่ มีเทศกาลไหนจัดอะไรแบบนี้ด้วยเหรอคะ?!"
10000010-86 = "พวกนั้นคือพวกที่มาก่อกวนเทศกาลค่ะ!"
10000010-87 = "จะมาขัดขวางงานเทศกาลของพวกเรางั้นเหรอ! ยกโทษให้ไม่ได้!"
10000010-89 = "เป็นแค่นักเรียนชมรมเทศกาล คิดว่าจะหยุดพวกเราได้งั้นเรอะ? ฝันไปเถอะ!"
10000010-92 = "พวกเรา! จู่โจม!"

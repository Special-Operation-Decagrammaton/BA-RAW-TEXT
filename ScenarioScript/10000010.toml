[translation]
10000010-1 = "第1話;歡迎蒞臨百夜堂"
10000010-2 = "說到百夜堂，是那間有名的喫茶店對吧。"
10000010-3 = "百夜堂的草莓餡蜜是最棒的。"
10000010-4 = "雖然有各種好吃的東西，但最棒的果然還是……"
10000010-6 = "「「「靜子炭可愛的笑容！」」」"
10000010-8 = "（明明只是在問路，卻不知為何聽見數十次那樣的台詞，最終總算是到達了百夜堂）"
10000010-12 = "頭兒！歡迎您大駕光臨！"
10000010-13 = "聽到您特地抽空從夏萊組過來，小的菲娜便在此誠心等候著您啊啊啊！！！"
10000010-14 = "[s1]「呃，嗯……？」\n[s2]「夏，夏萊組？」"
10000010-15 = ";我說菲娜！這樣老師會很困擾的吧！"
10000010-16 = "我說菲娜！這樣老師會很困擾的吧！"
10000010-17 = "咦，可是……"
10000010-18 = "剛才部長不是說，如果老師來了就要用盛大到讓人嚇一跳的方式來迎接問候的嗎？"
10000010-19 = "不對不對不對，我說的只是身為百夜堂員工的第一印象而已！"
10000010-20 = "沒錯！第一印象！"
10000010-21 = "建立超級可愛的第一印象，從一開始就讓老師的好感度直接飆到MAX的這個……"
10000010-22 = "[s]「呃……」"
10000010-23 = "……哈啊！？"
10000010-24 = "那，那個，剛才的是，是在說……"
10000010-25 = "耶，耶嘿啾咪……！"
10000010-26 = "不對……咳哼！"
10000010-29 = "歡迎光臨，老師！"
10000010-30 = "歡迎來到百夜堂！喵喵！"
10000010-31 = "[s]「喵喵……？」"
10000010-32 = "耶嘿，總之先請進吧！"
10000010-33 = "菲娜，一位客人！"
10000010-34 = "是！不肖菲娜，一定會竭盡所能的款待頭兒！"
10000010-35 = "就說不是那樣了！"
10000010-37 = "話說回來，老師你真的來了呢！"
10000010-38 = "[s]「畢竟你都特別通知我了嘛。」"
10000010-39 = "耶嘿嘿，那麼我重新自我介紹一下。"
10000010-40 = "我叫河和靜子。"
10000010-41 = "是百鬼夜行聯合學園所屬．節慶營運管理部的部長，#n也是這間百鬼夜行引以為傲的傳統喫茶店「百夜堂」的老闆！"
10000010-42 = "同時還擔任百夜堂的看板娘，就像所有人的偶像一樣！"
10000010-43 = "而我是百夜堂的員工！"
10000010-44 = "追求任俠之道的菲娜！"
10000010-45 = "[s]「請多指教囉，兩位。」"
10000010-46 = "咳哼。老師是第一次來百鬼夜行聯合學園對吧？"
10000010-47 = "那麼就順便作為節慶營運管理部的宣傳，向老師介紹一下吧。"
10000010-50 = "也就是，百鬼夜行聯合學園究竟是個什麼樣的地方，開始囉開始囉～！"
10000010-52 = "百鬼夜行聯合學園自古就是觀光業發達的學園自治區。"
10000010-54 = "有著各種娛樂活動，像是慶典、溫泉、音樂等等……"
10000010-55 = "不過最引人注目的，則是美食！"
10000010-57 = "各式各樣的文化與學生們相互結合、共存，就是這樣的地方！"
10000010-59 = "至於我們「節慶營運管理部」，#n則負責管理百鬼夜行的觀光業中也稱得上是最大規模的「慶典」。"
10000010-60 = "雖然名為「營運管理部」，實際上是從企劃到營運，負責全方面管理的社團！耶嘿！"
10000010-61 = "而這個百夜堂，就是我們「節慶營運管理部」最Cooool的基地！"
10000010-62 = "現在我們準備的「百夜之春櫻花祭」正在舉行！"
10000010-63 = "這就是我們節慶營運管理部的實力！"
10000010-64 = "[s]「街上充滿著活力，是個很好的慶典呢。」"
10000010-65 = "是的。多虧許多人的努力，才能舉辦的這麼熱鬧……"
10000010-66 = "不過最近出現了一群妨礙我們的人……"
10000010-67 = "就連今天早上也在四處作亂，實在是……"
10000010-68 = "[s]「這麼說『想商量的事情』就是……」"
10000010-69 = "是的。#n當然，純粹想招待老師參加「百夜之春櫻花祭」也是真的……"
10000010-72 = "部長！有敵襲！"
10000010-73 = "啊啊真是的，才說到一半又來了啊！真受不了他們！！"
10000010-74 = "啊……"
10000010-75 = "呃，那個，呀啊～靜子好害怕～#n……開玩笑的～耶嘿。"
10000010-76 = "總，總之！詳細的情況等到現場再說吧！"
10000010-79 = "哼哈哈哈！我們是聚集在百鬼夜行路上的魑魅魍魎。"
10000010-80 = "名為……妖怪劇團．街頭流派！"
10000010-81 = "上吧大家，按照委託把這裡弄得越亂越好！"
10000010-83 = "[ns3]「那也是櫻花祭的一環嗎？」\n[ns4]「最近的慶典還真華麗啊。」"
10000010-84 = "那，那怎麼可能！！哪有可能會有這種慶典啊！"
10000010-85 = "那，那怎麼可能！！哪有可能會有這種慶典啊！"
10000010-86 = "不對，奇普托斯這麼大，說不定還真的有……總之他們就只是一群搗蛋鬼而已！"
10000010-87 = "竟敢妨礙難得的櫻花祭！不可饒恕！"
10000010-89 = "哈，不過是區區節慶營運管理部，以為會是我們的對手嗎！？"
10000010-92 = "無所謂，就來解決你們吧。全員，突擊！"

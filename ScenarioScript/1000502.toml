1000502-24 = "3;호시노;01;그래도 가끔씩은 뒤져보면…… 이렇게…….\n#3;greeting"
1000502-25 = "3;호시노;00;콜록, 콜록. 짜안!\n#3;stiff\n#3;em;[반짝]"
1000502-26 = "3;호시노;03;이렇게 굉장한 물건이 발굴되기도 한다니까. 어때, 굉장하지?\n#3;m3\n#3;em;[반응]\n#3;hophop"
1000502-27 = "[s5] \"체육 매트……?\"\n[s6] \"이걸로 뭘 하게?\""
1000502-28 = "3;호시노;06;어허. 그냥 체육 매트가 아냐. 이거야말로 우리 학교의 과거의 영광, 돈이 풍족할 때의 상징 같은 물건!\n#3;hophop\n#3;em;[반응]"
1000502-29 = "3;호시노;06;어허. 그냥 체육 매트가 아냐. 이거야말로 우리 학교의 과거의 영광, 돈이 풍족할 때의 상징 같은 물건!\n#3;hophop\n#3;em;[반응]"
1000502-30 = "3;호시노;03;무려, 오리털 매트!\n#3;em;[반짝]"
1000502-31 = "3;호시노;14;부직포 같은 싸구려 충전재가 아닌 진짜 오리털을 꽉 채운 사치스러운 물건이지!"
1000502-32 = "3;호시노;07;덮고 자는 이불도 아니고 학생들이 밟고 다니는 체육 매트에 오리털이라니 무슨 질나쁜 농담도 아니고 말야.\n#3;em;[땀]"
1000502-33 = "3;호시노;00;으헤, 하지만 세상에는 별별 일이 다 있는 법이니까, 이런 괴상한 물건도 존재할 수도 있는 법이지."

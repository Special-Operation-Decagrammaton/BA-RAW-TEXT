[translation]
1000502-1 = "วาฬที่หลับใหล"
1000502-2 = "ห้องชมรมคณะกรรมการแผนงาน"
1000502-3 = "ว่ากันว่าวาฬกลั้นหายใจตอนหลับด้วยละ เจ๋งมากเลยใช่มั้ย?"
1000502-4 = "[s1] \"ทำไมจู่ๆ ถึงพูดถึงวาฬขึ้นมาล่ะ?\"\n[s2] \"อยากให้ครูช่วยอะไรเหรอ?\""
1000502-5 = "เฮ้อ ครูเนี่ยไม่มีความเพ้อฝันเอาเสียเลย"
1000502-6 = "เฮ้อ ครูเนี่ยไม่มีความเพ้อฝันเอาเสียเลย"
1000502-7 = "แหะๆ~ ที่จริงมีงานที่ต้องใช้แรงงานอยู่น่ะ... พอดีมีของบางอย่างที่ฉันยกคนเดียวไม่ไหว..."
1000502-8 = "ฉันไม่รู้จะไปขอร้องใคร แล้วก็เห็นว่าครูน่าจะว่างอยู่ ก็เลยมาขอให้ช่วย"
1000502-9 = "ขอบคุณที่มาช่วยนะ ครูเนี่ยพึ่งพาได้จริงๆ"
1000502-10 = "[s] \"ถ้าเป็นงานที่ต้องใช้กำลัง ไปเรียกคนในชมรมมาช่วยไม่ดีกว่าเหรอ?\""
1000502-11 = "พูดแบบนั้นฉันเสียใจนะ อีกอย่าง เรื่องนี้ต้องเก็บเป็นความลับไม่ให้คนอื่นรู้ด้วย"
1000502-12 = "เอาละ ไปกันเถอะ ตอนที่โรงเรียนไม่มีคนอยู่นี่ละเหมาะที่สุดแล้ว"
1000502-15 = "คลังที่ไม่ได้ใช้"
1000502-16 = "(ตึกๆๆ)"
1000502-17 = "แค่กๆ แค่กๆ ตรงนี้แหละ ฝุ่นเยอะจริงๆ…"
1000502-18 = "ระวังด้วยนะครู คอยดูตรงพื้นด้วยล่ะ"
1000502-19 = "[s3] \"ที่นี่คือที่ไหนน่ะ...?\"\n[s4] \"คลังเก็บของเหรอ...?\""
1000502-20 = "หนึ่งในคลังเก็บของที่เราไม่ได้ใช้น่ะ โรงเรียนเรามีคลังเก็บของหลายแห่งเลย"
1000502-21 = "อื้ม เป็นหนึ่งในคลังเก็บของที่เราไม่ได้ใช้น่ะ โรงเรียนเรามีคลังเก็บของหลายแห่งเลย"
1000502-22 = "ฉันขายของที่พอจะขายได้ไปหมดแล้ว ของที่เหลือส่วนใหญ่ก็เลยมีแต่ของจิปาถะที่ทำเงินไม่ได้"
1000502-24 = "แต่ถ้าลองคุ้ยๆ ดู บางครั้งจะเจอ…"
1000502-25 = "แค่กๆ แค่กๆ! แต่นแต๊น!"
1000502-26 = "บางครั้งก็จะเจอของดีๆ แบบนี้ด้วยเหมือนกัน เป็นไงล่ะ เจ๋งไปเลยใช่มั้ย?"
1000502-27 = "[s5] \"เบาะปูพื้นสำหรับออกกำลังกายเหรอ...?\"\n[s6] \"จะเอาเบาะนั่นไปทำอะไรเหรอ?\""
1000502-28 = "นี่ไม่ใช่เบาะปูพื้นสำหรับออกกำลังกายธรรมดาๆ นะ เบาะนี้เป็นถึงสัญลักษณ์แห่งความรุ่งเรืองในอดีต#nของโรงเรียนเราเลย เป็นของที่บ่งบอกว่าเราก็เคยมั่งคั่ง!"
1000502-29 = "นี่ไม่ใช่เบาะปูพื้นสำหรับออกกำลังกายธรรมดาๆ นะ เบาะนี้เป็นถึงสัญลักษณ์แห่งความรุ่งเรืองในอดีต#nของโรงเรียนเราเลย เป็นของที่บ่งบอกว่าเราก็เคยมั่งคั่ง!"
1000502-30 = "เพราะมันคือ... เบาะปูพื้นขนเป็ดยังไงล่ะ!"
1000502-31 = "ไม่ใช่ผ้าทอถูกๆ กับนุ่นยัดไส้ราคาถูกหรอกนะ แต่เป็นขนเป็ดของแท้สุดหรูเลย!"
1000502-32 = "ถ้าเป็นผ้าห่มก็พอเข้าใจได้ที่จะยัดขนเป็ดเข้าไปข้างใน แต่คนดีๆ ที่ไหนจะยัดขนเป็ดลงไปในเบาะ#nปูพื้นออกกำลังกายที่พวกเด็กๆ ขึ้นไปเหยียบแบบนี้กัน ตลกร้ายชัดๆ"
1000502-33 = "อืม แต่ว่าในโลกนี้มีเรื่องแปลกๆ หลายอย่างอยู่แล้ว เพราะงั้นจะมีของแบบนี้อยู่ก็คงไม่แปลกหรอก"
1000502-34 = "ถ้าคิดมากเกินไปก็ปวดหัวเปล่าๆ น่ะ"
1000502-35 = "แต่ยังไงก็เถอะนะ ถ้าทิ้งไว้ก็คงเสียของ เดี๋ยวลุงคนนี้จะใช้ให้คุ้มเอง~♪"
1000502-36 = "เอาละ ครู ช่วยจับทางด้านโน้นหน่อยสิ"
1000502-39 = "ฮึบ~ ยกไปกันเลย"
1000502-41 = "ห้องเรียนที่ไม่ได้ใช้"
1000502-42 = "(ครืด...)"
1000502-43 = "เอาละ มาถึงตรงนี้ก็พอแล้วละ วางลงได้แล้ว"
1000502-44 = "(ตุบ...)"
1000502-45 = "อืม มุมนี้ดูไม่ค่อยโอเค... ถ้างั้นเราทำแบบนี้ล่ะ...?"
1000502-47 = "ได้แล้ว พอดีเลย เพอร์เฟกต์!"
1000502-48 = "[s] \"เอาเบาะปูพื้นมาที่นี่ทำไมเหรอ?\""
1000502-49 = "เอ๋... ครูจะถามเรื่องที่มีคำตอบตายตัวอยู่แล้วทำไมกัน"
1000502-50 = "(ตุบ)"
1000502-52 = "(ทิ้งตัว...)"
1000502-53 = "[s7] \"นอนเลยงั้นเรอะ?!\"\n[s8] \"เข้าโหมดหลับอย่างสบายใจเฉยเลย?!\""
1000502-54 = "แค่มีเบาะนี้ ฐานลับสำหรับการแอบงีบก็สมบูรณ์แบบ!"
1000502-55 = "แค่มีเบาะนี้ ฐานลับสำหรับการแอบงีบก็สมบูรณ์แบบ!"
1000502-56 = "ตอนนี้จุดพักผ่อนลับสุดยอดของฉันก็สมบูรณ์แบบแล้ว คุณครูคงไม่ได้คิดจะเอาเรื่องนี้ไปบอกเด็กๆ#nคนอื่นหรอกใช่มั้ย?"
1000502-57 = "[s9] \"แต่ครูว่าปัดฝุ่นก่อนจะดีกว่ามั้ย...\"\n[s10] \"ถ้านอนแบบนี้จะเป็นหวัดเอานะ\""
1000502-58 = "เอาละๆ เลิกบ่นได้แล้ว เอาเป็นว่า... แต้งกิ้ววว แหะๆ~ ฉันมีที่นอนสบายๆ แบบนี้ได้เพราะครูเลยนะ"
1000502-59 = "เอาละๆ เลิกบ่นได้แล้ว เอาเป็นว่า... แต้งกิ้ววว แหะๆ~ ฉันมีที่นอนสบายๆ แบบนี้ได้เพราะครูเลยนะ"
1000502-60 = "แหะๆ... นุ่มนิ่มดีจัง ความรู้สึกที่ได้สัมผัสขนเป็ดเป็นแบบนี้เองเหรอ..."
1000502-61 = "จู่ๆ ก็ง่วงขึ้นมาซะแล้วละ... คุณครู..."
1000502-62 = "ฮ้าววว ราตรีสวัสดิ์..."
1000502-63 = "โชคดีจังที่ฉันไม่ใช่... เจ้าวาฬ..."
1000502-64 = "คร่อก... ฟี้..."
1000502-66 = "[s11] \"...\"\n[s12] \"หลับไปแล้วจริงๆ ด้วยแฮะ...\""
1000502-67 = "(คุณครูนั่งดูโฮชิโนะที่นอนหลับไปอยู่ครู่หนึ่ง และเมื่อนึกได้ว่ามีงานที่ต้องทำให้เสร็จก็ตัดสินใจ#nเดินออกมาจากห้องนั้น)"
1000502-68 = "(คุณครูนั่งดูโฮชิโนะที่นอนหลับไปอยู่ครู่หนึ่ง และเมื่อนึกได้ว่ามีงานที่ต้องทำให้เสร็จก็ตัดสินใจ#nเดินออกมาจากห้องนั้น)"
1000502-70 = "(ค่อยๆ เดินออกมาอย่างเงียบที่สุด)"

[translation]
1000502-1 = "沉睡的鯨魚"
1000502-2 = "對策委員會．教室"
1000502-3 = "所以說，鯨魚在睡覺的時候也是憋住呼吸的。是不是很厲害？"
1000502-4 = "[s1] 「是很厲害，但怎麼突然提到鯨魚？」\n[s2] 「你不是有事需要我幫忙？」"
1000502-5 = "啊～真是的，老師真是不浪漫。"
1000502-6 = "啊～真是的，老師真是不浪漫。"
1000502-7 = "但話雖如此，唔嘿～確實是有份很需要力氣的工作。有個我自己一個人搬不動的東西。 "
1000502-8 = "除了老師以外，沒有人能拜託了，所以就變成這樣。"
1000502-9 = "但你還真的來了，果然不愧是老師啊～"
1000502-10 = "[s] 「如果是需要力氣的工作，要不要也叫上其他成員？」"
1000502-11 = "不能那樣，這件事想對大家保密。"
1000502-12 = "好，那就走吧。現在誰都不在學校，正好是個機會。"
1000502-15 = "未使用的倉庫"
1000502-16 = "（喀啦喀啦喀啦）"
1000502-17 = "咳咳……是這裡沒錯，但灰塵還真多……"
1000502-18 = "啊，小心那裡，老師。得好好看著腳下。"
1000502-19 = "[s3] 「這裡是……？」\n[s4] 「……倉庫？」"
1000502-20 = "嗯。是未使用的器材倉庫唷。我們學校有很多像這樣的東西。"
1000502-21 = "嗯。是未使用的器材倉庫唷。我們學校有很多像這樣的東西。"
1000502-22 = "嘛，還能用的東西都拿去賣了，所以幾乎只剩下些不值錢的玩意兒。"
1000502-24 = "但偶爾來挖寶的話……像這樣……"
1000502-25 = "咳咳……你看，鏘！"
1000502-26 = "還能挖到這麼棒的東西。怎麼樣，很厲害吧？"
1000502-27 = "[s5] 「體育墊……？」\n[s6] 「拿那個要做什麼？」"
1000502-28 = "哎呀哎呀，這可不是普通的體育墊唷。這是我們學校過去的榮光，是金錢富足時期的象徵！"
1000502-29 = "哎呀哎呀，這可不是普通的體育墊唷。這是我們學校過去的榮光，是金錢富足時期的象徵！"
1000502-30 = "竟然，是羽絨墊！"
1000502-31 = "不是不織布那種廉價的填充物，而是裝滿了真正的絨羽的奢侈逸品！"
1000502-32 = "又不是棉被，只是被學生們踩來踩去的體育墊，真是奢侈到不像話～"
1000502-33 = "唔嘿，不過世界上什麼事都有，就好好收下吧。"
1000502-34 = "想得太多就輸了呢～？"
1000502-35 = "來，從今以後大叔會好好疼愛你的♪"
1000502-36 = "老師，能幫忙拿一下那邊嗎？"
1000502-39 = "嘿咻～……那走吧。 "
1000502-41 = "未使用的空教室"
1000502-42 = "（喀啦喀啦）"
1000502-43 = "好，這附近應該可以了。可以放手了。"
1000502-44 = "（鬆軟的撞擊聲）"
1000502-45 = "嗯，角度有點微妙……再過來一點……"
1000502-47 = "……好，完美！"
1000502-48 = "[s] 「把墊子放在這裡做什麼？」"
1000502-49 = "唔嘿～老師問了個理所當然的事情。"
1000502-50 = "（彈跳聲）"
1000502-52 = "（鬆軟的撞擊聲）"
1000502-53 = "[s7] 「躺下了嗎？！」\n[s8] 「就寢模式？！」"
1000502-54 = "這樣就完成了適合睡午覺的祕密基地！"
1000502-55 = "這樣就完成了適合睡午覺的祕密基地！"
1000502-56 = "誰都不會注意到，只屬於大叔的祕密場所完成了。啊，老師，不要把這個地方洩密給大家唷？"
1000502-57 = "[s9] 「稍微撢一下灰塵再使用會比較好。」\n[s10] 「這樣睡覺會感冒的。」"
1000502-58 = "嘛嘛，細節就先擺一旁。但還是要說一聲謝啦。唔嘿～託你的福，我才有了能好好睡覺的地方。"
1000502-59 = "嘛嘛，細節就先擺一旁。但還是要說一聲謝啦。唔嘿～託你的福，我才有了能好好睡覺的地方。"
1000502-60 = "唔嘿……軟綿綿……這就是羽絨的觸感呀……"
1000502-61 = "啊啊……睡意襲來……老師……"
1000502-62 = "呼哈啊啊，嗯～那就晚安囉……"
1000502-63 = "……不是鯨魚，太好了……"
1000502-64 = "……呼。"
1000502-66 = "[s11] 「………………」\n[s12] 「……真的睡著了。」"
1000502-67 = "（看著睡著的星野好一會兒，想起有下一個行程，差不多該回去了）"
1000502-68 = "（看著睡著的星野好一會兒，想起有下一個行程，差不多該回去了）"
1000502-70 = "（悄悄地溜出教室）"

[translation]
1000502-1 = "#Title;잠자는 고래"
1000502-2 = "#Place;대책위원회 동아리실"
1000502-3 = "3;호시노;03;그러니까 고래는 잘 때도 숨을 참고 있다는 얘기잖아. 굉장하지 않아?\n#3;em;[반응]\n#3;a"
1000502-4 = "[s1] \"갑자기 웬 고래 얘기?\"\n[s2] \"도움이 필요하다는 건 뭐야?\""
1000502-5 = "3;호시노;17;아아. 낭만이 없구만, 선생도."
1000502-6 = "3;호시노;17;아아. 낭만이 없구만, 선생도."
1000502-7 = "3;호시노;02;으헤~ 사실은 힘쓰는 일이 필요해서 말이지. 도저히 혼자서는 옮길 수가 없는 물건이 있어서. \n#3;em;[음표]"
1000502-8 = "3;호시노;14;역시 한가해 보이는 선생말고는 부탁할 사람도 딱히 없었고, 뭐 그렇게 된 거야."
1000502-9 = "3;호시노;03;그래도 와주다니 역시 선생밖에 없다니까.\n#3;em;[반짝]\n#3;hophop"
1000502-10 = "[s] \"힘을 쓰는 거라면 다른 부원들을 부르는게……?\""
1000502-11 = "3;호시노;16;섭섭한 소리 하지 말라고. 이 일은 다른 부원들에게는 비밀로 해야 한단 말야."
1000502-12 = "3;호시노;03;자, 그럼 가보자고. 학교가 비어있는 지금이 기회야. \n#3;em;[음표]"
1000502-13 = "3;호시노;03\n#3;d\n#wait;1500"
1000502-14 = "#all;hide"
1000502-15 = "#Place;사용하지 않는 창고"
1000502-16 = "#na;(드르르륵-)"
1000502-17 = "3;호시노;12;콜록, 콜록. 자, 여기야. 먼지가 엄청…….\n#3;shake\n#3;em;[속상함]\n#3;a"
1000502-18 = "3;호시노;00;아, 거기 조심해, 선생. 발 밑을 잘 봐야 해.\n#3;em;[반응]"
1000502-19 = "[s3] \"여기는……?\"\n[s4] \"……창고?\""
1000502-20 = "3;호시노;02;응. 사용하지 않고 방치된 자재 창고야. 우리 학교엔 이런 게 몇 개나 있거든."
1000502-21 = "3;호시노;02;응. 사용하지 않고 방치된 자재 창고야. 우리 학교엔 이런 게 몇 개나 있거든."
1000502-22 = "3;호시노;01;뭐, 이미 쓸만한 물건들은 전부 내다 팔아서 대부분은 잡동사니밖엔 없지만."

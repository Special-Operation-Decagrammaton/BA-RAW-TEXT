[translation]
2001206-1 = "สมาชิกหน่วยกู้ภัยฉุกเฉิน"
2001206-2 = "(พอหลังทำงานเสร็จคุณครูก็ไปที่บริเวณสะพานที่เกิดเหตุ เพื่อพบกับเซนะ)"
2001206-3 = "(อาจเพราะค่อนข้างดึกแล้วจึงไม่มีนักเรียนคนอื่นอยู่แถวนั้น)"
2001206-7 = "หืม...? มาแล้วเหรอคะคุณครู"
2001206-8 = "[s] “เซนะ...?”"
2001206-9 = "มาทำอะไรเวลานี้เหรอคะ..."
2001206-10 = "เข้ามานั่งข้างในก่อนสิคะ แต่ฉันไม่ได้เตรียมอะไรไว้มากมายเลย..."
2001206-14 = "― ถ้าคุณครูไม่ว่าอะไร... มาทานด้วยกันมั้ยคะ?[wa:2240] "
2001206-16 = "― ฉันมีแค่อาหารจากร้านสะดวกซื้อเท่านั้น..."
2001206-19 = "― พอดีฉัน...ต้องคอยอยู่แสตนบายฉุกเฉินแบบนี้[wa:1660] "
2001206-21 = "― ก็เลย... เลือกของที่กินได้ง่ายๆ ค่ะ[wa:10] "
2001206-24 = "― ว่าแต่ คุณครูมีอะไรเหรอคะ?[wa:2670] "
2001206-26 = "―ถึงได้มาที่นี่..."
2001206-29 = "― คะ...? แวะมาให้กำลังใจฉัน...เพราะคิดว่า...ฉันน่าจะเหนื่อยเหรอคะ?[wa:2330] "
2001206-32 = "― งั้นเหรอคะ แบบนี้นี่เอง[wa:2140] "
2001206-35 = "― ...เข้าใจแล้วค่ะ[wa:740] "
2001206-37 = "― ขอบคุณที่แวะมาหานะคะ คุณครู[wa:640] "
2001206-40 = "― ฉันคิดไม่ถึงเลยค่ะ... ว่าคุณครูจะแวะมาที่นี่...[wa:1300] "
2001206-42 = "― แต่ได้อยู่กับคุณครู แค่สองคนในสถานการณ์แบบนี้ ฉันดีใจมากนะคะ[wa:840] "
2001206-46 = "(หลังทานอาหารเสร็จแล้วทั้งสองก็ลงจากรถไปเดินเล่นกันสักพัก)"
2001206-50 = "[ns1] “ยังทำงานอยู่จริงๆ สินะ...”\n[ns2] “แสตนบายฉุกเฉินนี่เหนื่อยน่าดูเลยนะ”"
2001206-51 = "ไม่เป็นไรหรอกค่ะ ฉันไม่ได้ทำอะไรมากมายหรอกค่ะ"
2001206-52 = "ไม่เป็นไรหรอกค่ะ ฉันไม่ได้ทำอะไรมากมายหรอกค่ะ"
2001206-53 = "แถมฉันยังไม่คิดว่าคุณครูจะมาหาฉันที่นี่ด้วย"
2001206-54 = "ขอบคุณที่เป็นห่วงนะคะ แต่ไม่เป็นไรหรอกค่ะ ฉันชินกับการแสตนบายฉุกเฉินแล้วค่ะ"
2001206-55 = "ระหว่างที่แสตนบายก็จัดการเอกสารและตรวจดูด้วยว่ามีบันทึกงานอะไรตกหล่นหรือเปล่า..."
2001206-56 = "เวลาที่อยู่คนเดียวแบบนี้ก็สะดวกต่อการจัดการงานอื่นๆ ดีค่ะ"
2001206-57 = "สมาชิกคนอื่นกลับไปหมดแล้ว ศพที่ถูกส่งตัวไปเมื่อก่อนหน้านี้..."
2001206-58 = "ไม่สิ ผู้ที่ได้รับบาดเจ็บทุกคน บาดเจ็บเพียงแค่เล็กน้อยก็เลยฟื้นตัวได้เร็วและกลับไปแล้วค่ะ"
2001206-59 = "ตอนนี้ก็เลยเหลือฉันแค่คนเดียวค่ะ"
2001206-60 = "พูดให้ถูกคือมีแค่เราสองคนเท่านั้นค่ะ"
2001206-61 = "[s3] “เซนะทำงานหนักมากจริงๆ ด้วยนะ”\n[s4] “รับผิดชอบงานคนเดียวเยอะไปหรือเปล่าน่ะ?”"
2001206-62 = "ไม่หรอกค่ะ ฉันเองก็พยายามที่จะไม่หักโหมจนเกินไปเพื่อที่จะทำงานได้เรื่อยๆ ค่ะ"
2001206-63 = "ไม่หรอกค่ะ ฉันเองก็พยายามที่จะไม่หักโหมจนเกินไปเพื่อที่จะทำงานได้เรื่อยๆ ค่ะ"
2001206-64 = "ฉันรู้ขีดจำกัดตัวเอง เพราะงั้นเลยสามารถทำงานอื่นๆ ได้ระหว่างที่สแตนด์บายอยู่ค่ะ"
2001206-68 = "แต่ถึงอย่างนั้นก็ขอบคุณนะคะที่เป็นห่วง ฉันดีใจมากเลยค่ะ"
2001206-69 = "แต่ว่าที่จริงแล้ว ฉันเองก็ไม่รู้ว่าควรจะรับมือกับสถานการณ์ตอนนี้ยังไงเหมือนกันค่ะ"
2001206-70 = "คุณครูอุตส่าห์ตั้งใจมาหาฉัน แต่ฉันกลับช่วยงานอะไรคุณครูไม่ได้เลย..."
2001206-78 = "คุณครูอยากทานสักหน่อยมั้ยคะ ฉันรู้ว่ามันเสียมารยาทที่จะให้คุณครูทานของที่เหลือ#nจากเมื่อครู่ แต่ว่าฉันมีแค่นี้จริงๆ ค่ะ"
2001206-79 = "[s5] “ไม่เป็นไร ไม่ต้องคิดมากหรอก”\n[s6] “ของที่เซนะกิน...! ยินดีอย่างยิ่งเลย!!”"
2001206-80 = "อย่างนั้นเหรอคะ... เข้าใจแล้วค่ะ"
2001206-81 = "..."
2001206-82 = "แต่ว่าพอนึกถึงเรื่องสุขอนามัยแล้ว... ฉันกินเองดีกว่าค่ะ"
2001206-84 = "คุณครูรู้มั้ยคะ... เห็นแบบนี้แต่ว่าตอนนี้ฉันกำลังใจเต้นแรงมากเลยนะคะ"
2001206-85 = "ถ้าคุณครูไม่ว่าอะไร ฉันคิดว่าอยากจะพูดคุยกับคุณครูแค่สองคนแบบนี้ทุกๆ เย็นเลยละค่ะ"
2001206-86 = "ได้พูดคุยกันถึงเรื่องที่เกิดขึ้นระหว่างวัน และคุยเรื่องอื่นๆ ในอนาคตด้วย#nก็คงจะดีค่ะ"
2001206-87 = "ถึงจะเป็นอนาคตอีกยาวไกลที่ดูเป็นนามธรรมไปสักหน่อย..."
2001206-88 = "คะ? ฉันพูดอะไรผิดไปเหรอคะ?"
2001206-92 = "ฉันจะพอเท่านี้ก็ได้ค่ะ คือว่า... ฉันทำอะไรผิดไปหรือเปล่าคะ...?"
2001206-93 = "ฉันแสดงออกตรงไปตรงมาเกินไปงั้นเหรอคะ?"
2001206-94 = "งั้นเหรอคะ... ฉันก็แค่พูดไปตามที่รู้สึกจริงๆ เท่านั้น ถ้าทำให้คุณครูอึดอัด#nก็ขอโทษด้วยค่ะ"
2001206-95 = "ไม่ใช่อย่างนั้นเหรอคะ โล่งอกไปที ฉันกังวลมากเลยค่ะ"
2001206-96 = "ถ้างั้นเรามาคุยเรื่องอื่นๆ ต่อกันเถอะค่ะ"
2001206-97 = "หรือบางที...."
2001206-98 = "ฉันคงพูดออกไปหมดแล้ว เพราะฉะนั้นฉันพอแค่นี้ดีกว่าค่ะ"
2001206-99 = "คุณครูอาจจะทราบอยู่แล้วว่าฉันเป็นคนที่พูดตรงแค่ไหน"
2001206-100 = "เพราะงั้นฉันเลยเลือกทำงานด้านการแพทย์ฉุกเฉินที่ต้องใช้การสื่อสาร#nที่ตรงและแม่นยำค่ะ"
2001206-101 = "แต่ถ้าเป็นคุณครู... ฉันรู้สึกว่าตัวเองสามารถผ่อนคลายได้ และมั่นใจว่าคุณครูจะเข้าใจ#nสิ่งที่ฉันต้องการจะสื่อแน่นอนค่ะ"
2001206-102 = "เพราะงั้นแล้ว..."
2001206-107 = "ฉันคาดหวังในตัวคุณครูอยู่นะคะ"
2001206-109 = "(หลังจากนั้นคุณครูก็พูดคุยเรื่อยเปื่อยกับเซนะไปจนกระทั่งสมาชิกคนอื่นมาเปลี่ยนกะ)"
2001206-110 = "(โชคดีที่คืนนั้นผ่านไปอย่างเงียบสงบโดยที่ไม่มีเรื่องอะไรเกิดขึ้น)"

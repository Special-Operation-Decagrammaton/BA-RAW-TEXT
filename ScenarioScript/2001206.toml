[translation]
2001206-1 = "待命中"
2001206-2 = "（工作結束後，我跑去找瀬奈。在橋上發現應該是事件現場的地方）"
2001206-3 = "（也許是因為時間很晚了，幾乎沒看到其他學生）"
2001206-7 = "……老師？"
2001206-8 = "[s]「啊，瀬奈。」"
2001206-9 = "這麼晚了你怎麼會來這裡……"
2001206-10 = "……算了，總之請先上車吧。雖然沒什麼能招待的……"
2001206-14 = "— ……不介意的話，要一起吃嗎？[wa:3320] "
2001206-16 = "— 雖然只是超商的食物……"
2001206-19 = "― 因為必須像這樣待命，[wa:2900] "
2001206-21 = "— 所以想吃點簡單的東西填飽肚子。[wa:660] "
2001206-24 = "— 話說回來，老師有什麼事嗎？[wa:3150] "
2001206-26 = "— 怎麼會來這裡……"
2001206-29 = "― ……咦？覺得我好像很辛苦，所以想來慰勞我……？[wa:3970] "
2001206-32 = "— ……原來如此，是這樣啊。[wa:2540] "
2001206-35 = "― ……居然還特地跑來找我，[wa:900] "
2001206-37 = "― 非常謝謝你，老師。[wa:1360] "
2001206-40 = "― 雖然是個意料之外的發展……[wa:2660] "
2001206-42 = "― 能像這樣和老師待在一起，說實話我很開心。[wa:2440] "
2001206-46 = "（……簡單用餐後，我們走到了車外）"
2001206-50 = "[ns1]「都這麼晚了……」\n[ns2]「做這工作果然很辛苦呢。」"
2001206-51 = "辛苦嗎……我並不覺得特別辛苦……"
2001206-52 = "辛苦嗎……我並不覺得特別辛苦……"
2001206-53 = "反而很少人說我的工作辛苦。"
2001206-54 = "很感謝老師擔心我，但我不要緊的。我已經習慣這種事了。"
2001206-55 = "我待命的時候，會順便整理文件，或是檢查工作記錄……"
2001206-56 = "就算身處現場旁邊，也能在一個私人空間中度過……我還挺喜歡這種時間的。"
2001206-57 = "其他成員都已經去休息了，而現場的屍……"
2001206-58 = "傷患也已經移送完成，而且傷勢大多都不嚴重。也聽說幾乎都馬上就康復，已經活蹦亂跳了。"
2001206-59 = "總之現在狀況已經安定，現場只剩我一個人……"
2001206-60 = "……不，更正。是我和老師，兩個人。"
2001206-61 = "[s3]「別勉強自己囉。」\n[s4]「若覺得自己負擔不了了，就要說唷。」"
2001206-62 = "為了能持續活動下去，我也有在調整工作量。"
2001206-63 = "為了能持續活動下去，我也有在調整工作量。"
2001206-64 = "加上是醫療相關工作，基本上我已經估算好到什麼程度會讓自己感到疲勞。"
2001206-68 = "……不過還是很高興老師擔心我。謝謝老師。"
2001206-69 = "因此在工作方面，我完全沒有問題，但現在這狀況倒是有一點問題。"
2001206-70 = "老師為我著想而特地來找我，但我卻沒有東西能招待老師……"
2001206-78 = "請問你要吃這個嗎？雖然剛剛已經被我咬過一點啦……"
2001206-79 = "[s5]「我會心懷感激收下。」\n[s6]「那就當成上次回禮的回禮囉。」"
2001206-80 = "……是。"
2001206-81 = "……"
2001206-82 = "……不行。還是會有衛生上的疑慮，我自己吃掉吧。"
2001206-84 = "雖然外表可能看不出來，但我現在其實心臟跳得很厲害。"
2001206-85 = "……同時也有想到，只要老師願意，我們就能每天晚上像這樣兩人一起聊天。"
2001206-86 = "一起聊聊那天遇到的工作……"
2001206-87 = "時間允許的話，還能聊一些比較抽象的，未來的事情……"
2001206-88 = "……什麼？暫停？"
2001206-92 = "……我停下來了。難道我做了什麼失禮的事嗎？"
2001206-93 = "我的表達方式太直接了……？"
2001206-94 = "我只是盡可能陳述事實而已……如果會讓老師覺得有壓力，我向你道歉。"
2001206-95 = "……不是這樣嗎？那就好，我放心了。"
2001206-96 = "那我們繼續……"
2001206-97 = "……不。"
2001206-98 = "講了這麼多，應該多少能表達我的意思了。今天就到這裡吧。"
2001206-99 = "就如老師所知，我不太喜歡曖昧的表達方式。"
2001206-100 = "正確而確實。畢竟我的行為會影響到重傷者的狀態，所以我這態度大概是習慣成自然了。"
2001206-101 = "但是一面對老師……這態度就會莫名讓老師擔心。但我也覺得因為是老師，所以一定能好好理解我想說什麼。"
2001206-102 = "也就是說……"
2001206-107 = "我說不定對老師，抱持著超乎你想像的期待。"
2001206-109 = "（之後和瀬奈一直聊到交接人員過來）"
2001206-110 = "（幸好那天晚上什麼事都沒發生，安然度過了）"

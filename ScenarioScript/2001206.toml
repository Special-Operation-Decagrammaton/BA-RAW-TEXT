[translation]
2001206-1 = "On Call"
2001206-2 = "I went to where Sena was on standby once I got off of work.#nIt was a low-traffic bridge near the site of an accident."
2001206-3 = "It was getting pretty late, and there weren't any other students around."
2001206-7 = "Hmm? Sensei."
2001206-8 = "[s] \"Sena?\""
2001206-9 = "It's late. What are you doing here at this hour?"
2001206-10 = "Don't just stand there. Come inside and join me."
2001206-14 = "― I don't have much, but would you like some?[wa:2200] "
2001206-16 = "― All I have is food from a convenience store."
2001206-19 = "―There isn't time to go anywhere when I'm on standby,[wa:1260] "
2001206-21 = "― so this is the best I can do.[wa:140] "
2001206-24 = "― Anyway, Sensei. What brings you here?[wa:2230] "
2001206-26 = "― It's out of your way."
2001206-29 = "― Huh? You came to check on me because I looked exhausted?[wa:2650] "
2001206-32 = "― So that's why. Of course.[wa:2060] "
2001206-35 = "― Now I understand.[wa:700] "
2001206-37 = "― Thank you for checking on me, Sensei.[wa:240] "
2001206-40 = "― I wasn't expecting you to come here...[wa:1660] "
2001206-42 = "― but I'm always  happy to  be with you.[wa:1720] "
2001206-46 = "Sena and I then got out of the standby vehicle to take a short walk together."
2001206-50 = "[ns1] \"I had a feeling you'd still be working.\"\n[ns2] \"Being on emergency standby must be hard.\""
2001206-51 = "It's fine, actually. I don't mind the work."
2001206-52 = "It's fine, actually. I don't mind the work."
2001206-53 = "More than anything, I'm still surprised you came to visit me."
2001206-54 = "I appreciate your concern, but I'm used to this."
2001206-55 = "I typically use my time waiting on standby to organize documents#nand check to see all of our records are in order."
2001206-56 = "I find it much easier to get work done when the others aren't around."
2001206-57 = "Many of our members went back to the infirmary earlier to transport the dead."
2001206-58 = "Wounded, I mean. They only had minor injuries. Everyone left as soon as they were treated."
2001206-59 = "So now it's just me."
2001206-60 = "Or, I should say, just the two of us."
2001206-61 = "[s3] \"You're working this hard all by yourself?\"\n[s4] \"Are you sure this isn't more than you can handle?\""
2001206-62 = "I make sure not to overexert myself so that I'm always ready at a moment's notice."
2001206-63 = "I make sure not to overexert myself so that I'm always ready at a moment's notice."
2001206-64 = "I know how much fatigue I can handle. That's why I feel comfortable working while I'm on standby."
2001206-68 = "Thank you for being so concerned again. I'm happy that you care."
2001206-69 = "Though I'm a little at a loss about what to do with my time now."
2001206-70 = "You came all this way to check up on me, but there's not much I can do for you while I'm standby."
2001206-78 = "Do you want some of this? I feel bad about offering you something I didn't finish eating earlier, but it's all that I have."
2001206-79 = "[s5] \"It's okay. I'm good.\"\n[s6] \"You don't have to offer me anything!\""
2001206-80 = "Really? Okay."
2001206-81 = "..."
2001206-82 = "I suppose it wouldn't be very sanitary to share something like this."
2001206-84 = "You know...I have difficulty expressing myself sometimes.#nDespite how I may look, I am quite excited about tonight."
2001206-85 = "I was thinking that it would be wonderful if we could have late-night chats like this more often."
2001206-86 = "It would be fun to share what happened during the day and talk about the future when we have time."
2001206-87 = "Though it may be difficult to look too far ahead."
2001206-88 = "Hmm? Did I say something wrong?"
2001206-92 = "I'll stop, then. Oh, now I see."
2001206-93 = "I was being forward again, as you put it."
2001206-94 = "I'd like to think I was just being refreshingly honest.#nThough I'm sorry if you're uncomfortable."
2001206-95 = "That wasn't the case? Oh. I'm relieved to hear that, then."
2001206-96 = "We could always talk about something else."
2001206-97 = "Or..."
2001206-98 = "...maybe I've already said all that I need to."
2001206-99 = "You've already picked up on how straightforward I can be."
2001206-100 = "That must be why I've chosen to pursue the profession that I have.#nEmergency care requires precise and clear communication."
2001206-101 = "When I'm with you, though...I feel like I can relax and take things slower.#nI'm sure you understand what I mean."
2001206-102 = "Perhaps that's why..."
2001206-107 = "...I have certain expectations of you."
2001206-109 = "Sena and I chatted some more until her night shift was over."
2001206-110 = "Thankfully, it was a peaceful night without any further incidents."

2001206-50 = "[ns1] \"……역시 남아있었구나.\"\n[ns2] \"비상대기조라니, 고생이 많네.\""
2001206-51 = "3;세나;01;고생입니까……. 사실 저는 전혀 개의치 않습니다만…….\n#3;em;…"
2001206-52 = "3;세나;01;고생입니까……. 사실 저는 전혀 개의치 않습니다만…….\n#3;em;…"
2001206-53 = "3;세나;01;오히려 이런 일이 일어날 거라는 걸 전혀 예상하지 못한 쪽에 가깝습니다."
2001206-54 = "3;세나;02;……걱정해주시는 건 감사하지만, 정말로 괜찮습니다. 비상대기인력 일에는 익숙하니까요."
2001206-55 = "3;세나;99;대기하면서 서류정리나 업무 기록 같은 것들도 누락된 부분이 없는지 챙겨보고……."
2001206-56 = "3;세나;01;오히려 다른 사람이 없는 이런 시간이, 저 개인에게 있어서는 안정적인 시간이기도 합니다.\n#3;em;[반짝]"
2001206-57 = "3;세나;01;다른 부원들도 모두 돌아갔고, 낮에 이송해 왔던 시체……."
2001206-58 = "3;세나;99;……부상자들도 모두 경미한 부상이었으니까요. 다들 금방 회복돼서 뛰쳐나가 버렸습니다.\n#3;em;…"
2001206-59 = "3;세나;01;지금 이 주변에는 오로지 저 혼자뿐……."
2001206-60 = "3;세나;01;……아니. 정정합니다. 저와 선생님, 이렇게 두 사람뿐입니다.\n#3;em;[속상함]\n#3;stiff"
2001206-61 = "[s3] \"역시 고생이 많다고 생각해.\"\n[s4] \"혼자 맡은 일이 너무 많은 거 아냐?\""
2001206-62 = "3;세나;02;아닙니다. 저도 지속적인 활동을 위해, 무리하지 않는 선에서만 일을 정하고 있으니까요.\n#3;em;[반응]"
2001206-63 = "3;세나;02;아닙니다. 저도 지속적인 활동을 위해, 무리하지 않는 선에서만 일을 정하고 있으니까요.\n#3;em;[반응]"
2001206-64 = "3;세나;99;이 정도까지는 피곤함을 느끼지 않으면서 해결할 수 있다. 그렇기 때문에 하는 것뿐입니다."

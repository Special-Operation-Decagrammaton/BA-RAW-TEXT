10050020-130 = "อ่า... เอ่อ อะ... อื้อ สวัสดี คุณครู ถ้ารู้ว่าคุณครูก็อยู่ที่นี่ด้วย ฉันก็คง... ระมัดระวังตัวให้มากกว่านี้แล้ว..."

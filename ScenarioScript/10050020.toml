10050020-160 = "ว้าว ขอบคุณนะคุณครู! คุณครูยอดเยี่ยมที่สุดเลย♡"
10050020-161 = "อึก...! เข้าใจแล้วค่ะ คุณครู ฉันจะไปทบทวนตัวเองค่ะ..."

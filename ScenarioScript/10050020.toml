10050020-177 = "จะต้องลังเลทำไมล่ะคะ ต่อให้ปิดบังเรื่องนี้กับคุณครู ก็ไม่มีประโยชน์อะไรไม่ใช่เหรอคะ?"
10050020-178 = "คะ? ฉันคิดยังไงเกี่ยวกับหนังสือและเนื้อหาข้างในน่ะเหรอคะ? อืม... ขอบอกไว้ก่อนว่านี่เป็นแค่#nความคิดเห็นส่วนตัวของฉันนะคะ "
10050020-179 = "ถ้าเอาตามความเป็นจริง ฉันว่าหนังสือเล่มนั้น 'คลุมเครือ' ค่ะ จะแนะนำให้คนอื่นอ่านอย่างเปิดเผยก็#nเป็นเรื่องยากด้วย"
10050020-180 = "แต่ถึงยังไง ก็ไม่ควรจะเอาแต่หลับหูหลับตาปิดกั้นด้วยค่ะ"
10050020-181 = "[s] \"อื้อ ครูก็คิดแบบนั้นเหมือนกัน\""
10050020-182 = "ค่ะ ถ้าบอกว่านักเรียนมัธยมปลายไม่สนใจเรื่องแบบนี้ มันก็น่าตลกอยู่เหมือนกันนะคะ"
10050020-183 = "ถ้าจะให้พูดถึงสิ่งที่ฉันชื่นชมในฐานะสมาชิกชมรมอ่านหนังสือละก็... ใช่แล้วค่ะ ต้องชื่นชมทักษะ#nการเซ็นเซอร์ ไม่สิ ต้องเรียกว่าการเอดิตมากกว่าค่ะ"
10050020-184 = "ฉันอ่านแล้วถึงกับคิดขึ้นมาเลยว่า \"บรรณาธิการ... 'ตัดส่วนนั้นออก' ยังไง ถึงได้ออกมาดีขนาดนี้?\" แค่ได้เห็นทักษะนี้ก็ทึ่งแล้วค่ะ"
10050020-185 = "คะ? ถึงเนื้อหาจะเป็นแบบนั้น แต่ฉันก็วิจารณ์อย่างสุขุมเลยงั้นเหรอคะ?"
10050020-186 = "..."
10050020-187 = "คุณครูคะ ที่ 'ห้องสมุดเก่า' ทรีนิตี้มีหนังสือมากมายนับไม่ถ้วนเลยละค่ะ"
10050020-188 = "[s] \"เรื่องนั้นครูรู้อยู่แล้วละ\""
10050020-189 = "ใช่มั้ยล่ะคะ? แล้วในบรรดาหนังสือเหล่านั้น... คุณครูคิดว่ามีหนังสือที่เรียกได้ว่า 'ไม่ค่อยเหมาะสมเท่าไร' กี่เล่มเหรอคะ?"
10050020-190 = "[s7] \"......?\"\n[s8] \"......!\""
10050020-193 = "ค่ะ ก็อย่างนั้นละค่ะ"
10050020-194 = "ถ้างั้นสมาชิกชมรมอ่านหนังสือก็คุ้นชินกับเรื่องแบบนั้นกันทุกคนหรือเปล่าน่ะเหรอคะ?"
10050020-195 = "ฉันคงฟันธงให้ไม่ได้เพราะต้องรักษาเกียรติของพวกเราไว้ แต่อย่างน้อยก็มีฉัน..."
10050020-196 = "ที่คุ้นชินกับเรื่องแบบนั้นอยู่แล้วค่ะ"
10050020-197 = "แต่คุณครูลองฟังฉันนะคะ หนังสือเป็นสื่อกลางในการถ่ายทอดข้อมูลที่บันทึกไว้ไม่ใช่เหรอคะ?"
10050020-198 = "การที่เราจะไปประเมินและจัดระดับคุณค่าและคุณสมบัติในการถ่ายทอดข้อมูลของหนังสือ... เป็นสิ่งที่ยุติธรรมจริงเหรอคะ? ใครอนุญาตให้เราทำแบบนั้นกันคะ?"
10050020-199 = "ถ้ามนุษย์ทุกคนควรได้รับสิทธิ์และคุณสมบัติโดยพื้นฐานของตัวเอง ฉันก็คิดว่าหนังสือก็ควรได้รับสิทธิ์#nเช่นเดียวกันค่ะ"
10050020-200 = "เพราะงั้นในแง่หนึ่งแล้ว เราก็มองได้ว่าหนังสือหนึ่งเล่มก็คือบุคคลคนหนึ่งค่ะ"
10050020-201 = "[s] \"เพราะงั้นถ้าเราเห็นใครไม่ให้คุณค่าของหนังสือละก็...\""
10050020-202 = "ค่ะ ต่อให้ต้องใช้กำลังกันบ้าง แต่อย่างน้อยก็ต้องทำให้คนคนนั้นได้รับรู้ว่าตัวเองกำลังทำอะไรอยู่ ใช่มั้ยล่ะคะ?"
10050020-203 = "นี่ก็เหมือนการตักเตือนคนที่ทำผิด ให้สำนึกผิดต่อความผิดของตนเองละค่ะ"
10050020-205 = "(แล้วคุณครูก็ตระหนักได้อีกครั้งว่าชิมิโกะเป็นคนที่ไม่ควรทำให้โกรธเด็ดขาด...)"

10050020-14 = "ทะ... ทำไมถึงทำหน้าอย่างนั้นล่ะคะ?!"
10050020-15 = "อ่า... เมื่อกี้คุณบอกว่าคุณยังไม่ได้อ่านใช่มั้ยคะ... งั้นลองอ่านดูเองก่อนค่ะ เราจะได้มองจากมุมมองเดียวกัน"
10050020-16 = "ค่ะ ค่ะ..."
10050020-20 = "ตะ... ตายจริง!!"
10050020-21 = "ค่ะ ฉันคิดว่าตอนนี้คุณคงพอเข้าใจถึงความร้ายแรงของสถานการณ์แล้วค่ะ"
10050020-22 = "นับจากนี้เป็นต้นไป โปรดทำตามที่ฉันบอกทุกอย่าง อย่าให้พลาดแม้แต่คำเดียวเลยนะคะ!"
10050020-24 = "ส่วนคุณครู ฉันจะเป็นคนติดต่อไปเองค่ะ! ฉันคิดว่าการทำแบบนั้นน่าจะถูกต้องที่สุดแล้วค่ะ!"
10050020-25 = "ค่ะ ค่ะ! เข้าใจแล้วค่ะ!"

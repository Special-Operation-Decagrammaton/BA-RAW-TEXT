10050020-62 = "นี่คือการทำลายจิตวิญญาณและประเพณีของโรงเรียนโดยนัยค่ะ... เอาเป็นว่า! นี่ไม่ต่างจากหนังสืออันตรายที่ส่งเสริมพฤติกรรมเบี่ยงเบนจากภายใน!"
10050020-63 = "ต้องมีแผนการชั่วร้ายของใครบางคนซ่อนอยู่แน่นอนค่ะ!"
10050020-70 = "สวัสดี คุณนางิสะ อ๊ะ! คุณครูก็อยู่ด้วยสินะคะ!"

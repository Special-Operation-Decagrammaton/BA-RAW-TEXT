10050020-34 = "[ns1] \"มีเรื่องอะไรที่ครูต้องเข้ามาจัดการเหรอ...?\"\n[ns2] \"มีเรื่องอะไรเหรอ นางิสะ? เมื่อกี้เสียงไม่ค่อยดีเลย...\""
10050020-37 = "มาได้จังหวะพอดีเลยค่ะคุณครู คุณครูน่าจะงานยุ่งแท้ๆ ฉันขออภัยที่รบกวนเวลาของคุณครูนะคะ"
10050020-38 = "[s] \"เรื่องนั้นน่ะไม่เป็นไรหรอก\""
10050020-39 = "ค่ะ งั้นฉันจะเข้าเรื่องเลยนะคะ"
10050020-40 = "ตอนนี้ทรีนิตี้กำลังเผชิญวิกฤตที่ไม่เคยเจอมาก่อนค่ะ!"
10050020-41 = "[s] \"จู่ๆ ก็เกิดเรื่องใหญ่อะไรเหรอ?! หรือว่ามีใครบุกเข้ามา?!\""
10050020-42 = "บางทีถ้าเป็นแบบนั้นอาจจะดีกว่าก็ได้ค่ะ เพราะเราจะสามารถแก้ปัญหาด้วยตัวเองได้ค่ะ"
10050020-43 = "ใช่ค่ะ... ถ้าเราเจอการโจมตีด้วยกำลัง ก็อาจจะดีกว่านี้ เพราะนั่นคือสิ่งที่เรามองเห็นและจัดการได้ค่ะ"
10050020-44 = "แต่ถ้าเป็นสิ่งที่พยายามบ่อนทำลายทรีนิตี้จากภายในละก็ ฉันว่าเราหมดหนทางค่ะ!"
10050020-45 = "ฉันกำลังพูดถึงอะไรน่ะเหรอคะ? ก็... นี่ไงคะ!"
10050020-50 = "[ns3] \"นี่มันหนังสือธรรมดาไม่ใช่เหรอ?\"\n[ns4] \"นี่มันหนังสือการ์ตูนปกเรียบๆ ไม่ใช่เหรอ?\""
10050020-53 = "ใช่ค่ะ แต่สิ่งสำคัญของหนังสือทุกเล่มคือเนื้อหาที่อยู่ข้างในค่ะ"
10050020-54 = "คุณครูลองเปิดอ่านดูสิคะ"

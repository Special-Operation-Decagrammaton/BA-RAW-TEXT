[translation]
10050020-1 = "第2話;愛惜書本"
10050020-2 = "！？！？！？"
10050020-9 = "渚，渚大人？渚大人！？！？"
10050020-13 = "這本書到底是怎麼回事！！！！！"
10050020-14 = "怎，怎麼了嗎！？"
10050020-15 = "啊……你剛才也說自己還沒讀過對吧……#n那麼，先讓我們同步一下彼此的認知吧。"
10050020-16 = "好，好的……"
10050020-20 = "我，我的天呀！？"
10050020-21 = "我想你現在應該也多少認知到事態的嚴重性了。"
10050020-22 = "接下來請你將我所說的話，一字不漏地付諸實行！"
10050020-24 = "老師那邊我會親自聯絡！這樣應該才更合乎情理！"
10050020-25 = "是，是！我知道了！"
10050020-29 = "（雖，雖然我其實還挺喜歡的說……）"
10050020-30 = "（尤其是那個場景，還有那個場景之類的……）"
10050020-34 = "[ns1]「你說有事一定要拜託我，所以就過來了……」\n[ns2]「發生什麼事了嗎，渚？你的聲音聽起來很不對勁……」"
10050020-37 = "歡迎您，老師。#n在百忙之中佔用您寶貴的時間，在此先向老師致歉。"
10050020-38 = "[s]「那倒是沒關係。」"
10050020-39 = "謝謝您。那麼我就直接進入正題了。"
10050020-40 = "現在我們三一，正面臨著空前的危機！"
10050020-41 = "[s]「怎麼回事！？有人要攻打三一嗎！？」"
10050020-42 = "那樣或許還比較好也說不定……畢竟我們自己也能設法解決。"
10050020-43 = "是啊……武力攻擊反而容易處理。#n顯而易見的東西，應對方式也同樣明確。"
10050020-44 = "然而對於想從內部瓦解三一風紀的行徑，我們實在無計可施！"
10050020-45 = "問我究竟在說什麼？#n就是……這個！"
10050020-50 = "[ns3]「不就是一本普通的書嗎？」\n[ns4]「這本漫畫的封面很樸素呢。」"
10050020-53 = "沒錯。不過就像天底下所有的書一樣，重點在於裡面書寫的內容。"
10050020-54 = "您願意親自過目一下嗎？"
10050020-59 = "[ns5] （沒什麼特別的啊……？）\n[ns6]（三一連這種程度都覺得刺激啊……）"
10050020-62 = "這種書籍，無疑是為了暗中擾亂三一的精神和校風……！"
10050020-63 = "總之，絕對是某個人為了煽動脫序行為而惡意散播的地下刊物！"
10050020-70 = "您好，渚大人。#n啊！老師也在呢！"
10050020-71 = "[s]「嗯？嗨，志美子！」"
10050020-72 = "你好，志美子同學。#n不過我要找的應該是憂同學才對……？"
10050020-73 = "……"
10050020-74 = "不，情況我明白了。#n真是有勞你了，志美子同學。"
10050020-75 = "是，感謝渚大人的諒解。情況正是您所想的那樣……#n話說回來，請問有什麼事嗎？"
10050020-76 = "請問……與這本書有關的事，志美子同學是否知道些什麼呢？"
10050020-77 = "這是……？#n啊，是最近在三一悄悄流行的那本書呢。"
10050020-78 = "沒錯。既然你也清楚，說明起來就迅速多了。#n請問你知道書本中的內容嗎？"
10050020-79 = "……"
10050020-80 = "（雖然知道，不過如果據實以告的話……氣氛似乎會變得很麻煩）"
10050020-81 = "不，內容我不是很清楚。"
10050020-82 = "這樣啊。其實我也是在不久前才得知裡面的內容，你不知道也不奇怪吧……"
10050020-83 = "首先，這本書籍肯定是從三一外面流入的。"
10050020-84 = "是的。如果是在三一內部製作的書，理應受到我們圖書委員會的管理才對。"
10050020-85 = "沒錯。然而遺憾的是，這本書的出處目前還不得而知。"
10050020-86 = "也就是說，現在的三一正遭受「某個企圖從內部瓦解三一的外部勢力」所發動的──"
10050020-87 = "──某種精神方面的攻擊！"
10050020-91 = "老師，這是不是有點過度解讀了……？"
10050020-92 = "[s] 「我也這麼覺得，但渚只要一變成這樣就……」"
10050020-93 = "說的也是呢……"
10050020-94 = "有鑑於此，我們必須查清這本書的出處才行。#n畢竟這可是攸關著學園的安全。"
10050020-95 = "不過這又衍生了另一個問題。#n既然已經確定這本書是來自三一之外……"
10050020-96 = "那麼由我們茶會親自出面，似乎並不是個妥當的選擇。"
10050020-97 = "……如果一切都朝最壞的方向發展，甚至有可能會引發外交問題。"
10050020-98 = "從維護秩序的層面來看，這件事本該交由實現正義部處理……"
10050020-99 = "不過我擔心實現正義部對此事的正式介入，可能會對校內的氣氛造成負面影響。"
10050020-100 = "所以才希望能請求圖書委員會的協助。#n管理所有在三一流通的書籍，基本上也是圖書委員會的工作。"
10050020-101 = "以上……就是我會請憂同學過來的原因。"
10050020-102 = "那麼就再次拜託你了，志美子同學。"
10050020-103 = "請您不必客氣。#n不過……我們圖書委員會該做什麼呢？"
10050020-104 = "如同我剛才所說，能請你們調查這本地下刊物的出處、流通規模、對三一的影響……"
10050020-105 = "並且「妥善且溫和地」解決這件事嗎？"
10050020-106 = "……"
10050020-107 = "各方面來說，真像渚大人會說的話呢。"
10050020-108 = "……那是什麼意思？"
10050020-109 = "不，我並沒有特別的意思。"
10050020-110 = "……？#n總之，我認為僅憑圖書委員會自身的力量，難免可能碰上力有未逮的情況……"
10050020-111 = "所以我會賦予各位與實現正義部合作的權限。"
10050020-112 = "原來如此。雖然讓實現正義部正式出動會有困難……"
10050020-113 = "不過如果採取和圖書委員會合作的形式，就能避免發生「不必要的誤會」了對吧？"
10050020-114 = "完全正確。謝謝你的理解，志美子同學。"
10050020-115 = "綜上所述，這件案子就由我們茶會[ruby= ・     ・ ]正式[/ruby][ruby= ・     ・     ・ ]而隱密[/ruby]地，委託給老師和志美子同學了。"
10050020-116 = "能夠動用的資源皆可隨意使用。#n如果可以的話，還請保守祕密。"
10050020-117 = "我明白了，渚大人。"
10050020-118 = "此外從這一刻起，我正式聘請志美子同學擔任實現正義部的臨時外部顧問。#n相信這會對你提供些許幫助的。"
10050020-119 = "謝，謝謝您……"
10050020-127 = "哈囉哈囉，渚醬！我來討茶喝囉！#n話說……咦？老師！？"
10050020-128 = "彌香同學？"
10050020-129 = "[s]「嗨，彌香。」"
10050020-130 = "啊，嗯。謝謝。你好啊，老師！#n要是早知道老師會來，我就多注意一下了……各方面都是……"
10050020-131 = "[s]「我覺得彌香現在這樣就很好了哦？」"
10050020-132 = "呀啊！？聽，聽你那樣說，雖然高興得心臟都快跳出來了……"
10050020-133 = "（不是那個意思，不是那個意思。清醒一點啊，我！）"
10050020-134 = "你好，老師。#n還有彌香，老師剛才那句話應該沒有什麼特別的意思才對。#n麻煩你至少學會分辨這種事吧。"
10050020-135 = "真是的★聖亞醬又說這種話了♥"
10050020-136 = "話說回來……這本書是什麼呀？之前好像沒看過耶！"
10050020-137 = "不行！！！"
10050020-143 = "[ns]「渚，渚！？」"
10050020-145 = "嚇我一跳。渚醬為什麼要大叫啦！#n人家只是想看一眼這本書而已呀！"
10050020-146 = "我，我為剛才輕率的舉止向你道歉，彌香同學。#n但是這本書……那個……是不行的！"
10050020-147 = "為什麼不行？"
10050020-148 = "就是那個，因為……"
10050020-149 = "其實，這本書是修女會透過茶會，委託給我們圖書委員會的一種「外典」。"
10050020-150 = "咦？修女會……？#n那就沒辦法了呢。"
10050020-151 = "要是跟那邊的人扯上關係的話，事情常常會變得很複雜……"
10050020-152 = "……剛剛是不是稍微反應過頭了，渚？"
10050020-153 = "這本書對彌香同學還太早了！"
10050020-154 = "雖然能夠理解你的心情……但是這樣會不會有點過度保護了呢。"
10050020-155 = "什麼啦，渚醬和聖亞醬真是的！#n怎麼可以把我晾在一邊講悄悄話呢！"
10050020-156 = "還有渚醬？剛才那樣實在有點沒教養吧？#n要好好反省才行哦？"
10050020-157 = "居然會被彌香同學批評教養，我的頭好暈……"
10050020-158 = "那又是什麼意思★"
10050020-159 = "[s]「嗯……我覺得這次彌香說的沒錯……」"
10050020-160 = "哇，謝謝你，老師！老師果然最好了♡"
10050020-161 = "唔……！我明白了，老師。#n我會反省的……"
10050020-163 = "沒想到茶會的三位成員到齊了呢。#n最後那一幕，連我也感到有點緊張。"
10050020-164 = "話說您還好嗎，老師？#n您的臉色怎麼……？"
10050020-165 = "[s]「總覺得剛才那場對話，各方面都讓人的胃隱隱作痛……」"
10050020-166 = "嗯？啊啊……畢竟在三一生活久了，不知不覺就會習慣那種說話方式了。"
10050020-167 = "當然，我完全沒有想強迫老師也用這種方式說話的意思。"
10050020-168 = "[s]「志美子真的對那本書一無所知嗎？」"
10050020-169 = "嗯？您這句話的意思是……"
10050020-170 = "……"
10050020-171 = "沒錯，老師。#n我終究是三一圖書委員會的一員。"
10050020-172 = "對於所有在三一「流通」的書籍……#n身為圖書委員會的成員，自然必須盡可能掌握實際的情況。"
10050020-173 = "當然這並不具備強制性，只是建議事項而已。"
10050020-174 = "[s]「……可以問你讀到哪裡了嗎？」"
10050020-175 = "全部讀完了。"
10050020-176 = "[s]「回答得好乾脆！」"
10050020-177 = "畢竟對老師也沒什麼好隱瞞的，不是嗎？"
10050020-178 = "嗯？問我對那本書和它的內容有什麼想法？#n唔嗯……雖然這只是我個人的觀點…… "
10050020-179 = "不過我認為這些內容嚴格來說，屬於所謂的「灰色地帶」。#n或許不太適合大張旗鼓地公開推薦……"
10050020-180 = "卻也不至於不分青紅皂白禁止的那種……有點微妙的領域。"
10050020-181 = "[s]「嗯，我也有同感。」"
10050020-182 = "是啊。坦白說，對這方面完全不感興趣的高中生，反而有點好笑吧？"
10050020-183 = "不過身為圖書委員會的一員，要說哪裡讓我感到讚嘆的話……#n我想應該是那本書的審查……不，應該稱之為編輯能力吧。"
10050020-184 = "究竟是如何將那麼直白的表現「剪接」的這麼好呢……功力實在令人佩服。"
10050020-185 = "嗯？以情況來說，我好像表現得相當冷靜？"
10050020-186 = "……"
10050020-187 = "老師，在三一的「古書館」之中，存放著不計其數的書籍。"
10050020-188 = "[s]「這點我也很清楚。」"
10050020-189 = "對吧？那麼老師認為在那之中……所謂「不那麼健全」的書籍有多少呢？"
10050020-190 = "[s7]「……？」\n[s8]「……！」"
10050020-193 = "沒錯，就是那麼回事。"
10050020-194 = "所以圖書委員會的成員們，是不是都對這方面的事情比較熟悉……是嗎？"
10050020-195 = "為了維護大家的名譽，我恐怕無法斷言。#n不過，至少就我個人而言……"
10050020-196 = "算是有一定程度的瞭解吧？"
10050020-197 = "但是您想想看，書本實際上是一種傳遞資訊的媒介對吧？"
10050020-198 = "既然如此，由我們來對資訊的傳遞價值或資格進行評價或分級……#n這真的是一件正當的事嗎？這種權利又是誰賦予的呢？"
10050020-199 = "如果所有人都應該享有基本權利與資格的話，我認為這對書本也是一樣的。"
10050020-200 = "因此從某種意義上來說，即便將書本視為一個獨立的人也不為過吧。"
10050020-201 = "[s]「所以要是遇到隨便對待書本的人……」"
10050020-202 = "沒錯。我們是不是應該用書角敲下去，好讓他們認知到自己在做什麼呢？"
10050020-203 = "就像我們會以某種方式糾正越線的人，讓他們對自己的錯誤感到後悔一樣。"
10050020-205 = "（……再次切身體認到了絕對不能惹志美子生氣的事實）"

10050020-72 = "สวัสดีค่ะ คุณชิมิโกะ แต่ว่า... ฉันเรียกตัวคุณอุยไปนะคะ...?"
10050020-73 = "..."
10050020-74 = "ไม่เป็นไรค่ะ ฉันเข้าใจแล้วค่ะ คุณชิมิโกะคงเหนื่อยแย่เลยนะคะ"
10050020-75 = "ค่ะ คุณนางิสะ ก็เป็นอย่างนั้นละค่ะ ขอบคุณที่เข้าใจนะคะ ว่าแต่มีเรื่องอะไรเหรอคะ?"
10050020-76 = "เรื่องเกี่ยวกับหนังสือเล่มนี้ค่ะ รู้จักหนังสือนี้เหรือเปล่าคะ คุณชิมิโกะ?"
10050020-77 = "นี่มัน...? หนังสือที่ช่วงนี้กำลังได้รับความนิยมอย่างลับๆ ในทรีนิตี้สินะคะ"
10050020-78 = "ใช่ค่ะ ในเมื่อรู้จักอยู่แล้ว งั้นก็คงเข้าเรื่องได้ไวนะคะ ไม่ทราบว่าคุณชิมิโกะพอจะรู้เนื้อหาภายในเล่ม#nหรือเปล่าคะ?"
10050020-79 = "..."

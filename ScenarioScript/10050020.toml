10050020-166 = "คะ? อ้อ... พออยู่ในทรีนิตี้นานๆ เข้า เดี๋ยวก็คุ้นเคยกับรูปแบบการสนทนาแบบนั้นไปเองค่ะ"
10050020-167 = "แต่แน่นอนว่าฉันไม่คิดจะใช้รูปแบบการสนทนานั้นกับคุณครูหรอกนะคะ"
10050020-168 = "[s] \"ชิมิโกะไม่รู้อะไรเกี่ยวกับหนังสือนั้นเลยจริงเหรอ?\""
10050020-169 = "คะ? พูดแบบนั้นหมายความว่า..."
10050020-170 = "..."
10050020-171 = "ใช่แล้วค่ะ คุณครู ฉันก็เป็นหนึ่งในสมาชิกชมรมอ่านหนังสือของทรีนิตี้นะคะ"
10050020-172 = "และพวกเราชมรมอ่านหนังสือก็... มีหน้าที่ต้องค้นหาความจริงของหนังสือทุกเล่มที่ 'หมุนเวียน' อยู่ในทรีนิตี้อยู่แล้วค่ะ"
10050020-173 = "ถึงนี่จะไม่ใช่ข้อบังคับ แต่เป็นข้อควรปฏิบัติมากกว่าก็เถอะค่ะ"

10050020-102 = "ต้องรบกวนอีกครั้งนะคะ คุณชิมิโกะ"
10050020-103 = "ไม่เป็นการรบกวนหรอกค่ะ ถ้างั้นอยากให้ชมรมอ่านหนังสือทำอะไรเหรอคะ?"
10050020-104 = "ฉันอยากให้ช่วยสืบหาว่าหนังสือที่ไม่ได้รับอนุญาตเล่มนี้มีที่มาจากไหน เผยแพร่เป็นวงกว้างไปแล้วแค่ไหน และส่งผลกระทบอะไรต่อทรีนิตี้บ้างค่ะ"

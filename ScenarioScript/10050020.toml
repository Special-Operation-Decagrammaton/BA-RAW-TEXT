[translation]
10050020-1 = "Episode 2;Cherish the Books"
10050020-2 = "?!?!"
10050020-9 = "N-Nagisa? NAGISA?!?!"
10050020-13 = "Wh-What is this book?!?!"
10050020-14 = "Whatever do you mean?!"
10050020-15 = "Ah. You did say you hadn't had the chance to open it yet. Please, it's easier if you look for yourself."
10050020-16 = "Yes. Yes..."
10050020-20 = "O-Oh my!"
10050020-21 = "Yes. I believe you have now realized the severity of the situation."
10050020-22 = "Please follow my instructions exactly! You must not miss a single detail."
10050020-24 = "I must contact Sensei myself! This is the only correct course of action!"
10050020-25 = "Yes! Understood!"
10050020-29 = "(B-But I liked it...)"
10050020-30 = "(Especially that scene, and THAT scene...)"
10050020-34 = "[ns1] \"You said it was important, so I came as fast as I could.\"\n[ns2] \"What's wrong, Nagisa? You sounded serious...\""
10050020-37 = "Welcome, Sensei. I'd like to begin by apologizing for taking up time in your busy schedule so suddenly."
10050020-38 = "[s] \"I'm used to that.\""
10050020-39 = "I'll get straight to the point."
10050020-40 = "Trinity is facing a threat unlike anything it has ever seen before!"
10050020-41 = "[s] \"Why all of a sudden?! Were you attacked?\""
10050020-42 = "If only it were that easy. This enemy is much more insidious."
10050020-43 = "In fact, some show of military force would have been preferable. A tangible threat is no threat to Trinity."
10050020-44 = "This, however! Someone is attempting to destabilize Trinity from the inside out! A Trojan horse!"
10050020-45 = "What am I talking about? I am speaking of...THIS!"
10050020-50 = "[ns3] \"Isn't this just a book?\"\n[ns4] \"Looks like a manga with a bland cover.\""
10050020-53 = "You are correct. But, as with all books, what's important is the content."
10050020-54 = "Please, take a look."
10050020-59 = "[ns5] \"(...? It's nothing special.)\"\n[ns6] \"(So even this is too intense for Trinity...)\""
10050020-62 = "This is clearly an attempt to undermine Trinity's values and traditions, to subtly... What I mean is! They are attempting to encourage deviant behavior at Trinity!"
10050020-63 = "That can be the only explanation for the existence of this unsanctioned book!"
10050020-70 = "Hello, Nagisa. Oh! You're here as well, Sensei!"
10050020-71 = "[s] \"Oh! Hello, Shimiko!\""
10050020-72 = "Hello, Shimiko. However, I was hoping to speak to Ui..."
10050020-73 = "..."
10050020-74 = "Ah, I see. I understand. Thank you for all your hard work, Shimiko."
10050020-75 = "Yes, Nagisa. Thank you for understanding. That being said, is there any way I can help?"
10050020-76 = "It's about this book. Do you know about it, Shimiko?"
10050020-77 = "This? It's spread through Trinity like wildfire—discreetly, though."
10050020-78 = "Yes. Then, to get to the crux of this catastrophe, you are aware of its contents?"
10050020-79 = "..."
10050020-80 = "(I HAVE read it, but I have a feeling this wouldn't be the best time to admit that...)"
10050020-81 = "No, ma'am. It hasn't actually come across my desk yet."
10050020-82 = "I only recently learned of it myself, so we can surmise its evil tendrils haven't made their way through all of Trinity."
10050020-83 = "To begin, I am absolutely positive this was imported from a different district."
10050020-84 = "I agree. The Library Committee has an extensive review process for new literature in Trinity."
10050020-85 = "That's all we know as of now, however. We've been unable to glean any information about its origins."
10050020-86 = "In conclusion, Trinity is currently under fire! The enemy has launched a truly cunning psychological attack on our student body!"
10050020-87 = "Outside forces are plotting to take Trinity down, and all of us along with it!"
10050020-91 = "Um, Sensei? I think she's spiraling..."
10050020-92 = "[s] \"It's a little difficult to stop her when she gets like this...\""
10050020-93 = "That's true..."
10050020-94 = "It is therefore our utmost priority that we identify who the book's distributor is. This is a direct threat to the safety of our entire district."
10050020-95 = "There is one other issue I must address. As we have confirmed that this book came from an outside source..."
10050020-96 = "...it'll be difficult for the Tea Party to intervene directly."
10050020-97 = "Without knowing who is involved, our involvement could present diplomatic issues."
10050020-98 = "I originally thought to direct the Justice Task Force to oversee the operation..."
10050020-99 = "However, that escalation could cause unease amongst the student body. Then we would be playing directly into our enemy's hands."
10050020-100 = "Therefore, the Library Committee, the most intimately acquainted with managing the circulation of media in Trinity, seemed suited for the job."
10050020-101 = "Which is why I requested Ui's help..."
10050020-102 = "Again, I'm in your debt, Shimiko."
10050020-103 = "Understood. What do you need the Library Committee to do?"
10050020-104 = "Investigate the source. Identify the scale of the operation and the impact it's had on Trinity so far."
10050020-105 = "And please... Handle this issue with the utmost care."
10050020-106 = "..."
10050020-107 = "In some ways, you never change, Nagisa."
10050020-108 = "What do you mean?"
10050020-109 = "Ah, nothing at all."
10050020-110 = "Hm...? Well, regardless, the Library Committee alone lacks the resources to handle this threat."
10050020-111 = "Therefore, I will grant you the authority to make use of the Justice Task Force as needed."
10050020-112 = "I see. While it's troublesome to have the Justice Task Force lead the charge..."
10050020-113 = "...having them work alongside the Library Committee sends a much better message."
10050020-114 = "You're quick on the uptake, as usual, Shimiko."
10050020-115 = "With that said, we, the Tea Party, would like to officially, but discreetly, delegate this matter to Sensei and Shimiko."
10050020-116 = "Consider Trinity's resources at your disposal. And, again, please be discreet."
10050020-117 = "Understood, Nagisa."
10050020-118 = "For the time being, I shall temporarily invite Shimiko to the Justice Task Force as a consultant. I believe the title will aid you in your endeavors."
10050020-119 = "Th-Thank you..."
10050020-127 = "Hello, hello, Nagi! I'm here for some tea! But... Huh? Sensei?!"
10050020-128 = "Mika?"
10050020-129 = "[s] \"Welcome, Mika.\""
10050020-130 = "Ah, uh, um, yeah! Yup, thanks. Hello, Sensei. I didn't know you were here. I would've done my hair a little different...maybe gotten ready more..."
10050020-131 = "[s] \"I like you just as you are right now, Mika.\""
10050020-132 = "Eek?! Oh my gosh, hearing that made my heart skip a beat..."
10050020-133 = "(Get it together, Mika. Sensei doesn't mean it that way at all! At all!)"
10050020-134 = "Hello, Sensei. And Mika. To clarify, Sensei meant nothing special by that. Please have enough sense to be able to see that much at least."
10050020-135 = "Seriously! There goes Seia again, being Seia. ★"
10050020-136 = "Anyway, what were you guys talking about? This book? Is it new?"
10050020-137 = "NOOOOOO!!!"
10050020-143 = "[ns] \"N-Nagisa?!\""
10050020-145 = "Yikes, chill out, Nagi! I just wanna see!"
10050020-146 = "I-I apologize for my sudden outburst, Mika. However, this book is... It's... It's... It is not good, Mika!"
10050020-147 = "What about it?"
10050020-148 = " Well, well..."
10050020-149 = "This book is a form of apocrypha that the Sisterhood requested from the Library Committee through the Tea Party."
10050020-150 = "Huh? The Sisterhood? I guess that's understandable. Okie."
10050020-151 = "It's generally better not to get involved with them..."
10050020-152 = "...Wasn't that a bit much, Nagisa?"
10050020-153 = "It's too early for Mika to read something like this!"
10050020-154 = "While I understand the sentiment... You're clucking around like an overprotective mother hen."
10050020-155 = "Hey! I hate it when you guys keep secrets and leave me out of things. Nagi! Seia!"
10050020-156 = "And you still haven't apologized, Nagi! That was rude! Bad mannered!"
10050020-157 = "Am I being lectured on manners...by Mika? I need to sit..."
10050020-158 = "What does that even mean? ★"
10050020-159 = "[s] \"I am on Mika's side with this one...\""
10050020-160 = "Yay! Thank you, Sensei! You're the best. ♡"
10050020-161 = "Ack. Understood. My apologies, Sensei."
10050020-163 = "I wasn't expecting to run into the entire Tea Party there. How nerve-racking."
10050020-164 = "Are you okay, Sensei? You look a bit..."
10050020-165 = "[s] \"Just hearing that conversation gave me indigestion...\""
10050020-166 = "Huh? Ah... You get used to their ways if you live here."
10050020-167 = "But I understand why they can be a bit much for you, Sensei."
10050020-168 = "[s] \"Do you really not know anything about the book, Shimiko?\""
10050020-169 = "Huh? Do you mean...?"
10050020-170 = "..."
10050020-171 = "You're right, Sensei. I am a member of Trinity's Library Committee."
10050020-172 = "And as a member, we have a responsibility to discover the truth concerning all books circulating in Trinity."
10050020-173 = "Of course, I didn't read it unwillingly. A friend recommended it to me."
10050020-174 = "[s] \"...Can I ask how much of it you've read?\""
10050020-175 = "The whole thing."
10050020-176 = "[s] \"You didn't even hesitate!\""
10050020-177 = "Of course not. Why would I hide this from you, Sensei?"
10050020-178 = "Huh? Do I have a strong opinion on the content matter? Hm, well... "
10050020-179 = "I believe this falls in a gray area. It'd be taboo to openly discuss and promote it..."
10050020-180 = "...but it's not quite enough to justify a ban, either."
10050020-181 = "[s] \"I'm in complete agreement.\""
10050020-182 = "Yes. Well, the thought that high schoolers haven't developed some level of interest in these subjects is rather laughable."
10050020-183 = "As someone who works with books quite a bit, I was actually very impressed with their...editing skills, let's call it."
10050020-184 = "The intentional cut-outs... It's outstanding work."
10050020-185 = "Huh? You're surprised at how unbothered I seem?"
10050020-186 = "..."
10050020-187 = "Sensei. There are truly many, many books stored in Trinity's old library."
10050020-188 = "[s] \"I already know that.\""
10050020-189 = "Right? Then among those books, how many, do you think are, how should I say this...not \"kid friendly\"?"
10050020-190 = "[s7] \"...?\"\n[s8] \"...!\""
10050020-193 = "Yes. Exactly."
10050020-194 = "Then are all members of the Library Committee somewhat accustomed to things of this nature?"
10050020-195 = "I cannot speak for everyone, to preserve their honor, but at least for me..."
10050020-196 = "You could say I've acclimated."
10050020-197 = "I believe there's a more fundamental issue on trial here. A book is, in itself, a medium to pass on recorded information."
10050020-198 = "How are we meant to judge what should or should not be remembered? And who are we to think that we have that right?"
10050020-199 = "If everyone possesses inherent rights and entitlements they should not be denied, I think it's the same for books."
10050020-200 = "In some ways, I see books as manifestations of the human soul!"
10050020-201 = "[s] \"So to see someone castigate a book so harshly...\""
10050020-202 = "Yes. They should be forced to realize what they are doing, even if you need to whack them on the head to do so."
10050020-203 = "Just like how when someone crosses the line, we punish and correct them to make them reflect on their actions."
10050020-205 = "...That conversation reconfirmed something I already knew: never make Shimiko angry."

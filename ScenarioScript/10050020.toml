10050020-112 = "อย่างนี้สินะคะ การให้ชมรมทวงความยุติธรรมทำงานอย่างเต็มรูปแบบตั้งแต่แรกอาจเป็นเรื่องยาก..."
10050020-113 = "แต่ถ้าเป็นการทำงานร่วมกับชมรมอ่านหนังสือ ก็จะหลีกเลี่ยง \"ความเข้าใจผิดที่ไม่จำเป็น\" ได้อย่างนั้นสินะคะ?"

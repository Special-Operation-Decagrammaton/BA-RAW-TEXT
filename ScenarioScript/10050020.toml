10050020-150 = "หืม? ชมรมซิสเตอร์เหรอ? งั้นก็คงช่วยไม่ได้ละเนอะ อื้อ"
10050020-151 = "ถ้าเข้าไปยุ่งเกี่ยวกับคนพวกนั้น เรื่องก็คงยุ่งยากกว่านี้..."
10050020-152 = "ที่ทำไปเมื่อกี้มันเกินไปหน่อยหรือเปล่าคะ...? นางิสะ?"
10050020-153 = "มิกะยังไม่พร้อมที่จะอ่านหนังสือเล่มนี้ค่ะ!"

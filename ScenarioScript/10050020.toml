10050020-157 = "ไม่อยากคิดเลยนะคะว่าฉันต้องมาฟังคุณมิกะพูดถึงการทำตัวที่เหมาะสม ฟังแล้วก็วิงเวียนหัวขึ้นมาเลยค่ะ..."

10050020-134 = "สวัสดีค่ะคุณครู แล้วก็มิกะ คุณครูไม่ได้หมายความอะไรอย่างอื่นเป็นพิเศษหรอกค่ะ เรื่องแค่นี้แยกแยะให้ได้สิคะ"

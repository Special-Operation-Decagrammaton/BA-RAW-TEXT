10050020-81 = "ไม่ค่ะ ฉันเคยเห็นแต่รูปเล่ม แต่ยังไม่รู้เนื้อหาเลยค่ะ"
10050020-82 = "ดีค่ะ ฉันเองก็เพิ่งรู้เมื่อไม่นานมานี้เอง คุณชิมิโกะจะยังไม่รู้ก็ไม่แปลกหรอกค่ะ"
10050020-83 = "อย่างแรกที่ฉันจะบอกก็คือ นี่คือหนังสือที่มาจากภายนอกทรีนิตี้อย่างแน่นอนค่ะ"
10050020-84 = "ค่ะ ถ้านี่เป็นหนังสือที่จัดทำขึ้นในทรีนิตี้ ก็คงได้รับการจัดการโดยชมรมอ่านหนังสือของพวกฉันแล้วค่ะ"
10050020-85 = "ใช่ค่ะ แต่น่าเสียดายที่ตอนนี้เรายังไม่รู้ที่มาของหนังสือเล่มนี้ค่ะ"
10050020-86 = "นั่นหมายความว่า ทรีนิตี้ในตอนนี้! กำลังถูกโจมตีทางจิตวิญญาณรูปแบบหนึ่ง! "

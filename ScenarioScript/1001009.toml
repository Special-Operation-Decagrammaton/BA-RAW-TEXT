[translation]
1001009-1 = "Personal Counseling"
1001009-2 = "Inside an Abydos Classroom"
1001009-4 = "(Shiroko is waiting nervously.)"
1001009-5 = "Umm..."
1001009-6 = "I came like you told me to, Sensei. So, what is this all about?"
1001009-7 = "Does this have to do with Schale? Or is it related to Abydos?"
1001009-8 = "You want me to sit down? Okay..."
1001009-12 = "..."
1001009-15 = "― Is there something you want to talk to me about?[wa:1200] "
1001009-19 = "― (What could Sensei be thinking? I wish I knew.)[wa:1300] "
1001009-23 = "― (What could they be up to?)[wa:1060] "
1001009-27 = "― I just want to be clear that I'm your ally, Sensei.[wa:1300] "
1001009-32 = "― When you...pat me on the head like that...[wa:80] "
1001009-34 = "― No, it doesn't bother me or anything.[wa:80] "
1001009-37 = "[ns] Ask what she was doing last night."
1001009-39 = "Last night? I went riding, then I took a shower, and I had grilled fish for dinner..."
1001009-40 = "Before that? I was on top of the KV highway billboard and pretended to hijack a transport van..."
1001009-41 = "Oh. You saw that?"
1001009-42 = "[s] Tell her you're worried about her getting into danger."
1001009-43 = "U-Uh..."
1001009-44 = "I know where you're coming from...but like I said, this is just a silly hobby of mine."
1001009-45 = "Um... I know anything I say will just sound like an excuse..."
1001009-46 = "..."
1001009-47 = "I get it, I get it. You're only saying this because you're worried about me. I'll take your advice."
1001009-48 = "I'm...sorry. I don't mean to cause so much trouble."
1001009-49 = "I really made you worry, huh?"
1001009-50 = "..."
1001009-53 = "...Thanks."
1001009-55 = "(Shiroko left the classroom in better spirits.)"

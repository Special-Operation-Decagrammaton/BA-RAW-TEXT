[translation]
1001009-1 = "การสัมภาษณ์แบบส่วนตัว"
1001009-2 = "ห้องเรียน อะบิดอส"
1001009-4 = "(ชิโรโกะยืนคอยอยู่ด้วยสีหน้ากังวลเล็กน้อย)"
1001009-5 = "อืม...."
1001009-6 = "ฉันมาตามที่บอกแล้วคุณครู มีเรื่องอะไรเหรอ?"
1001009-7 = "ภารกิจของชาเล่ต์เหรอ? หรือว่าเรื่องเกี่ยวกับโรงเรียนอะบิดอส?"
1001009-8 = "ให้นั่งก่อนเหรอ? เข้าใจแล้ว...."
1001009-12 = "......"
1001009-15 = "― มีภารกิจให้ฉันทำเหรอ?[wa:2280] "
1001009-19 = "― (สงสัยจังว่าคิดอะไรอยู่)[wa:2220] "
1001009-23 = "― (ตอนนี้คิดจะทำอะไรน่ะ...?)[wa:1100] "
1001009-27 = "― ฉันมาที่นี่เพื่อช่วยเหลือคุณครู...[wa:1980] "
1001009-32 = "― ถะ... ถ้าลูบหัวแบบนั้น...[wa:760] "
1001009-34 = "― ที่จริง...ก็ไม่ได้แย่อะไรหรอก...[wa:280] "
1001009-37 = "[ns] ถามชิโรโกะว่าเมื่อคืนทำอะไรบ้าง"
1001009-39 = "เมื่อคืนเหรอ? ไปปั่นจักรยานแล้วก็กลับบ้านอาบน้ำ กินข้าวกับปลาย่างเป็นมื้อเย็น..."
1001009-40 = "ก่อนหน้านั้น? ก่อนไปปั่นจักรยานก็ขึ้นไปบนป้ายบิลบอร์ดบนทางด่วน KV แล้วก็จำลองสถานการณ์#nปล้นรถขนเงิน..."
1001009-41 = "คุณครูรู้อยู่แล้วเหรอ?"
1001009-42 = "[s] แสดงความเป็นห่วงกลัวว่าจะเป็นอันตราย"
1001009-43 = "อะ...อืม"
1001009-44 = "ฉันเข้าใจที่บอกแล้ว... แต่มันเคยชินไปแล้วน่ะ..."
1001009-45 = "อืม.... ถึงพูดไปตอนนี้ก็คงจะเหมือนแก้ตัวเปล่าๆ..."
1001009-46 = "......."
1001009-47 = "เข้าใจแล้ว ที่คุณครูพูดแบบนี้ก็เพราะเป็นห่วง... ฉันจะระวังตัว"
1001009-48 = "อืม.... โทษทีที่สร้างปัญหาให้อยู่เรื่อย..."
1001009-49 = "คุณครูเป็นห่วงฉันจริงๆ สินะ"
1001009-50 = "......."
1001009-53 = "...ขอบคุณนะ"
1001009-55 = "(ชิโรโกะออกไปจากห้องเรียนด้วยสีหน้าที่ดูมีความสุขนิดๆ)"

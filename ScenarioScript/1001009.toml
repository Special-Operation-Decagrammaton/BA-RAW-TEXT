[translation]
1001009-1 = "個人面談"
1001009-2 = "阿拜多斯．教室"
1001009-4 = "（白子帶著略顯緊張的表情等待著）"
1001009-5 = "嗯……"
1001009-6 = "我依照約定來了唷，老師。怎麼了嗎？"
1001009-7 = "是關於夏萊的工作？還是跟阿拜多斯有關？"
1001009-8 = "總之先坐下？我知道了……"
1001009-12 = "……"
1001009-15 = "― 有什麼要我做的事嗎？[wa:2720] "
1001009-19 = "― （老師在想什麼，令人好在意）[wa:2620] "
1001009-23 = "― （接下來打算做什麼呢……？）[wa:1580] "
1001009-27 = "― 我是為了幫忙老師才會在這裡的。[wa:2740] "
1001009-32 = "― 就，就算被這樣摸……[wa:1360] "
1001009-34 = "― 也沒有什麼困擾的……[wa:1160] "
1001009-37 = "[ns] 詢問昨晚做了什麼"
1001009-39 = "昨天晚上？騎完車回家淋浴後，晚餐吃了烤魚……"
1001009-40 = "在那之前？騎車之前先爬到KV高速公路的廣告看板上，進行奪取現金運鈔車模擬訓練……"
1001009-41 = "咦，你知道？"
1001009-42 = "[s] 對危險行動表示擔心"
1001009-43 = "……唔，唔嗯。"
1001009-44 = "我知道老師想說什麼了……不過，這已經是一種習慣了……"
1001009-45 = "嗯……不過，不管說什麼都會變成藉口……"
1001009-46 = "……"
1001009-47 = "我知道了。老師是因為擔心我才這麼說的，我會銘記在心。"
1001009-48 = "嗯……抱歉，因為我這種不良的學生。"
1001009-49 = "害老師擔心了。"
1001009-50 = "……"
1001009-53 = "……謝謝。"
1001009-55 = "（白子帶著隱約有點開心的表情走出了教室）"

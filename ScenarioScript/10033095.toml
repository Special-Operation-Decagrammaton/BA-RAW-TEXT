[translation]
10033095-2 = "呃啊！怎麼會這樣！？"
10033095-6 = "呼，幸好成功阻止他們了……！"
10033095-7 = "（接下來只要保護好煙火，等到晚上就沒事了……）"
10033095-12 = "隊，隊長！大事不好了！"
10033095-13 = "煙火……煙火……！"
10033095-15 = "嗯？煙火怎麼了？發生什麼事了？"
10033095-16 = "在剛剛戰鬥的時候著火了！"
10033095-18 = "咦！？！？"
10033095-19 = "[ns]「要發射了嗎！？」"
10033095-20 = "沒問題的！因為用於神木祭的煙火非常巨大的關係，有做一定程度的鈍感處理！"
10033095-21 = "只是稍微著火的話是不會發射的！"
10033095-22 = "不過要是繼續放著不管，所有煙火都會被火燒光！不趕快把火熄滅的話……！"
10033095-24 = "啊～抱歉抱歉，我來晚了，隊長。#n來的路上吃的雞肉串實在太好吃了……！"
10033095-28 = "哇啊！？"
10033095-32 = "哎呀呀……這是什麼？#n嗯？煙火？"
10033095-36 = "[ns1]「等等，現在煙火……」\n[ns2]「引信被點燃了……！？」"
10033095-39 = "不要啊！！！！！"

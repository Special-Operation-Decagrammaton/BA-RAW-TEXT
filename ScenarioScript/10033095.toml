[translation]
10033095-2 = "ว้าย! อะไรกัน?!"
10033095-6 = "ค่อยยังชั่วหน่อยนะคะ ขัดขวางพวกนั้นไว้ได้แล้วค่ะ...!"
10033095-7 = "(ขอเพียงทำให้จุดดอกไม้ไฟในตอนกลางคืนได้อย่างไร้ปัญหาก็พอ...)"
10033095-12 = "หะ... หัวหน้า! เกิดเรื่องใหญ่แล้วค่ะ!"
10033095-13 = "กองดอกไม้ไฟที่จะใช้ในงานเทศกาล...!"
10033095-15 = "หืม? ทำไมเหรอ? เกิดอะไรขึ้นกับกองดอกไม้ไฟนั่น?"
10033095-16 = "ก็การต่อสู้เมื่อกี้น่ะสิคะ ทำให้เกิดไฟไหม้ตรงนั้นขึ้นมาค่ะ!"
10033095-18 = "คะ?!?!"
10033095-19 = "[ns] \"งั้นมันจะระเบิดเหรอ?!\""
10033095-20 = "ไม่เป็นไรหรอกค่ะ! ดอกไม้ไฟที่ใช้ในงานต้นไม้ศักดิ์สิทธิ์เป็นดอกไม้ไฟขนาดใหญ่ ก็เลยมีการจัดการ#nเรื่องชนวนและการติดไฟไว้อย่างดีเลยค่ะ!"
10033095-21 = "ถ้าแค่เกิดไฟไหม้เล็กน้อยก็ไม่ระเบิดหรอกค่ะ!"
10033095-22 = "แต่ถ้าเราปล่อยไว้อย่างนี้ ดอกไม้ไฟอาจจะไหม้หมดเลยก็ได้นะคะ! เราต้องรีบดับไฟ...!"
10033095-24 = "อ่า โทษทีๆ นะหัวหน้า ฉันมาช้าไปใช่มั้ย พอดียากิโทริที่เจอระหว่างทางมันยั่วน้ำลายน่ะ!"
10033095-28 = "ว้ายยย?!"
10033095-32 = "เฮือก... นี่มันอะไรกันคะ? หืม? ดอกไม้ไฟเหรอ?"
10033095-36 = "[ns1] \"เดี๋ยวนะ บนกองดอกไม้ไฟนั่น...\"\n[ns2] \"มีหัวรบจรวดที่กำลังไฟลุกอยู่...?!\""
10033095-39 = "ไม่นะคะ!!!!!"

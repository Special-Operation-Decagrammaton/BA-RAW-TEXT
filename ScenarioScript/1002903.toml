1002903-12 = "3;나츠;01;음. 좋은 분위기. 아늑한 곳이야."
1002903-13 = "3;나츠;99;마음 같아서는 아예 우리 부실로 하자고 제안하고 눌러앉아버리고 싶지만……."
1002903-14 = "3;나츠;01;하하. 농담이야. 곤란해할 필요 없어.\n#3;em;[반응]"
1002903-15 = "3;나츠;01;오늘 찾아온 이유는 갑자기 들어버린 슬픔을 해결하기 위해 선생님의 도움을 구하러 온 거니까."
1002903-16 = "3;나츠;02;……응? 손에 든 봉투는 뭐냐고?\n#3;em;[?]"
1002903-17 = "3;나츠;99;하하. 뭐, 이번에도 마찬가지지."

1002903-100 = "3;나츠;02;그런 말을 듣게 될 줄이야. 이거 꽤 놀라운 걸.\n#3;em;[반응]"
1002903-101 = "3;나츠;02;오늘 수업은 별로 필요가 없었던 거 같네. 번데기 앞에서 주름 잡은 꼴이랄까. 그것마저도 좀 건방진 이야기 같지만 말이야."

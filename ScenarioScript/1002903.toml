1002903-21 = "3;나츠;05;……오늘의 교재! 사실 이건 반쪽짜리지만 말이야.\n#3;em;[반짝]"
1002903-22 = "3;나츠;02;……응?\n#3;em;[?]"
1002903-23 = "3;나츠;02;정말 아무 일도 없는 거 맞냐고? 모모톡 내용 때문에 아직 걱정이 된다고?"
1002903-24 = "3;나츠;99;하하. 미안해. 하지만 정말 괜찮아. 아까도 말했지만, 딱히 내게 무슨 일이 생긴 건 아니거든."
1002903-25 = "3;나츠;01;그저 아침 뉴스들을 보다 갑작스럽게 그런 생각이 들었을 뿐. 왠지 이럴 때가 있더라고."
1002903-26 = "3;나츠;99;서로 싸우고, 이해하지 못하고, 배척하는 수많은 이야기들……. 그로 인해 탄생하는 비극의 서사들…….\n#3;em;…"
1002903-27 = "3;나츠;01;그것 때문에 깨닫지 못하는 그 너머의 더 큰 경지들. 그에 대한 안타까움."
1002903-28 = "3;나츠;01;……마치 서로 각자의 맛 만을 최고로 여기며 상대를 인정하지 못하는 일부 디저트 매니아들 같지."
1002903-29 = "3;나츠;02;그래서 주절거림을 털어놓고 싶지만, 사실 뜬금없잖아?\n#3;em;[?]"
1002903-30 = "3;나츠;01;이런 식으로라도 털어놓을 상대가 선생님 정도밖에 없었던 것뿐이야."
1002903-31 = "3;나츠;01;이쪽에도 의외로 수많은 이야기와 갈등들이 있거든."
1002903-32 = "3;나츠;99;민트초코가 어떻다, 진짜 커피는 에스프레소이며 아메리카노는 사도다……."

[translation]
1002903-1 = "ชื่อวิชา: ความใจกว้าง"
1002903-3 = "(หลังจากส่งข้อความมาได้ไม่นาน นัตสึก็มาถึงชาเล่ต์)"
1002903-4 = "(คุณครูรู้สึกว่าจะต้องคุยกันยาวแน่ๆ เลยบอกให้นัตสึไปที่ห้องพักผ่อน)"
1002903-12 = "อืม บรรยากาศดีจัง เป็นสถานที่ที่สะดวกสบายดีนะ"
1002903-13 = "ถ้าทำได้ ฉันก็อยากจะชวนไปนั่งคุยที่ห้องของฉันแต่ว่า..."
1002903-14 = "ฮะฮะ... ล้อเล่นน่า ไม่ต้องลำบากใจไปหรอก"
1002903-15 = "ที่ฉันมาหาวันนี้ก็เพราะจะมาขอความช่วยเหลือจากคุณครูในการแก้ไขความเศร้าที่ก่อตัวขึ้นมากะทันหัน#nน่ะ"
1002903-16 = "หืม...? ถุงนี่คืออะไรน่ะเหรอ?"
1002903-17 = "ฮะฮะ... ก็นะ... ก็เหมือนเดิมนั่นละ"
1002903-21 = "อุปกรณ์การเรียนของวันนี้ไงล่ะ! อันที่จริงมันแค่ครึ่งเดียวเอง"
1002903-22 = "หืม?"
1002903-23 = "ไม่มีอะไรจริงๆ น่ะเหรอ? ยังกังวลเพราะเรื่องที่คุยใน MOMOTALK อีกเหรอ?"
1002903-24 = "ฮ่าฮ่า... ขอโทษนะ แต่ฉันไม่เป็นไรจริงๆ เมื่อกี้ก็บอกไปแล้วไง ไม่ได้มีเรื่องอะไรหรอก"
1002903-25 = "เรื่องนั้นมันก็แค่ความคิดแว็บหนึ่งตอนที่ได้ดูข่าวตอนเช้าน่ะ ว่ามันมีเรื่องแบบนั้นด้วยน่ะ"
1002903-26 = "ข่าวเกี่ยวกับการต่อสู้ ไม่เข้าใจกันแล้วก็ต่อต้านกันและกัน... ต้นกำเนิดแห่งโศกนาฏกรรมทั้งหลาย..."
1002903-27 = "เพราะเรื่องนั้นทำให้เกิดสิ่งที่คาดไม่ถึงตามมา... มันน่าเศร้านะ"
1002903-28 = "มันก็เหมือนกับพวกคลั่งขนมหวานบางคนที่มักจะมองว่ารสนิยมของตัวเองดีที่สุดโดยไม่สนใจคนอื่นๆ เลย"
1002903-29 = "เพราะงั้นฉันเองก็อยากจะพูดอะไรไปบ้าง แต่มันก็ดูจะไม่สมเหตุสมผลใช่มั้ยล่ะ"
1002903-30 = "คนที่ฉันจะมาพูดเรื่องพวกนี้ด้วยได้ก็คงมีแต่คุณครูเท่านั้น"
1002903-31 = "ฉันมีเรื่องเยอะแยะเลยที่จะคุย แถมยังมีเรื่องข้อขัดแย้งที่เจอด้วยนะ"
1002903-32 = "ทั้งเรื่องช็อกโกแลตมินต์ ไหนจะเรื่องกาแฟที่แท้จริงคือเอสเพรสโซ่ ส่วนอเมริกาโน่เป็นแค่เบอร์รอง#nบ้างละ..."
1002903-36 = "ว่าแล้วเชียวว่าต้องคุยยาว..."
1002903-37 = "อธิบายโดยการทำให้เห็นเลยน่าจะเร็วกว่า"
1002903-46 = "(นัตสึลุกไปที่เครื่องทำกาแฟที่วางอยู่ที่มุมหนึ่งของห้องพักผ่อนและชงกาแฟมาหนึ่งแก้ว)"
1002903-52 = "คุณครูชอบเอสเพรสโซ่มั้ย?"
1002903-53 = "[s1] \"ชอบมากเลยละ ดื่มตอนทำงานด้วยนะ\"\n[s2] \"ครูไม่ค่อยถูกกับของขมๆ น่ะ\""
1002903-54 = "ฮ่าฮ่า... อย่างนั้นเองเหรอ"
1002903-55 = "แล้วอันนี้ล่ะ? ความจริงฉันชอบแบบนี้มากกว่าน่ะ"
1002903-56 = "ฮ่าฮ่า งั้นเหรอ"
1002903-57 = "ถ้างั้นก็คงชอบแบบนี้มากกว่าสินะ ฉันเองก็เหมือนกัน"
1002903-58 = "มันเป็นรสชาติที่เรียกได้ว่าตรงกันข้ามกับกาแฟที่ฉันชงมาเลย..."
1002903-63 = "(นัตสึเปิดถุงที่เธอถือมาออก และหยิบไอศกรีมวานิลลาสีขาวน่ากินออกมา)"
1002903-64 = "สัญลักษณ์ของความหวานนุ่มลิ้น"
1002903-65 = "ไอศกรีมวานิลลาไงละ! แต่นแต๊น!"
1002903-66 = "เห็นแบบนี้ฉันเองก็เป็นนักเรียนมัธยมปลายนะ"
1002903-67 = "รสชาติหวานล้ำและความเย็นสดชื่นที่ละลายในปาก... แต่ในเวลาเดียวกัน มันก็ไม่ได้เหนียวจนเกินไป ทำให้กินในปริมาณมากๆ ได้..."
1002903-68 = "นับว่าเป็นหนึ่งในวัตถุดิบชั้นเลิศของขนมหวานเลยล่ะ แถมยังถือว่าเป็นของหวานชนิดหนึ่งได้ด้วย"
1002903-69 = "แต่ว่านะคุณครู..."
1002903-70 = "ไอศกรีมวานิลลากับเอสเพรสโซ่นี่... รู้มั้ยว่าคนที่ยืนกรานจะเลือกแค่เพียงอย่างใดอย่างหนึ่ง จะไม่สามารถเห็นภาพที่แตกต่างได้หรอกนะ"
1002903-71 = "[s3] \"ภาพที่แตกต่าง?\"\n[s4] \"มันคืออะไรเหรอ?\""
1002903-72 = "สิบปากว่าไม่เท่าตาเห็นสินะ ถ้างั้นฉันจะทำให้ดูเอง"
1002903-73 = "สิบปากว่าไม่เท่าตาเห็นสินะ ถ้างั้นฉันจะทำให้ดูเอง"
1002903-79 = "(นัตสึวางไอศกรีมวานิลลาลงในจานและนำกาแฟเอสเพรสโซ่ที่ชงมาราดลงไปด้านบน)"
1002903-80 = "(กาแฟร้อนๆ ที่ราดลงไปทำให้ไอศกรีมวานิลลาละลายและผสมผสานกับกาแฟ)"
1002903-81 = "...<อัฟโฟกาโต>"
1002903-82 = "เป็นการผสมผสานระหว่างวานิลลาที่เป็นตัวแทนของความหวานกับเอสเพรสโซ่ที่เป็นตัวแทนของความ#nขม"
1002903-83 = "จากของหวานหลากหลายร้อยพันชนิด นี่ถือว่าเป็นหนึ่งในสุดยอดของหวานอย่างหนึ่งเลยละ"
1002903-84 = "ดูสิ หน้าตาที่น่ากินขนาดนี้ สุดยอดขนมที่เป็นที่ถูกใจคนชอบรสหวานและรสขม"
1002903-85 = "รสชาติใหม่ๆ ที่คนที่ชื่นชอบเพียงแค่หนึ่งรสชาติและปฏิเสธอีกหนึ่งรสชาติไม่อาจเข้าถึงได้เลย"
1002903-86 = "สมบูรณ์แบบสุดๆ"
1002903-87 = "ถ้าทุกคนรู้สึกแบบนี้... และเปิดใจยอมรับผู้อื่นบ้างละก็..."
1002903-88 = "ในโลกนี้ก็จะไม่มีการต่อสู้ หรือการไม่ชอบหน้ากันได้ไงละ..."
1002903-89 = "..."
1002903-90 = "[s5] \"นัตสึเป็นคนอ่อนโยนจริงๆ เลยนะ\"\n[s6] \"การรู้สึกเสียใจกับเรื่องของคนอื่นก็เป็นความใจกว้างอย่างหนึ่งนะ\""
1002903-91 = "อืม... คือ..."
1002903-92 = "อืม... คือ..."
1002903-93 = "อืม..."
1002903-97 = "ฮ่าฮ่าฮ่า ฉันไม่คิดว่าจะได้ยินคำพูดแบบนี้เลย..."
1002903-98 = "ก็แค่... สำหรับคนอื่นๆ มักจะบอกว่ามันไร้สาระหรือเป็นแค่คำพูดเรื่อยเปื่อยน่ะ"
1002903-99 = "แน่นอนว่าลึกๆ แล้วฉันเองก็หวังอยู่ว่าคุณครูจะไม่พูดแบบนั้น..."
1002903-100 = "แต่ไม่คิดว่าจะได้ยินคำพูดแบบเมื่อกี้นี้... น่าตกใจจริงๆ นะ"
1002903-101 = "ดูแล้วคาบเรียนวันนี้คงไม่จำเป็นแล้วละ ก็คุณครูดูเหมือนจะเข้าใจเรื่องนี้ดีกว่าฉันอีกนะ"
1002903-102 = "ฮ่าฮ่าฮ่า..."
1002903-103 = "ถ้างั้นก็คงไม่ต้องพูดเยอะแล้วละ วันนี้พอแค่นี้ก็แล้วกัน..."
1002903-109 = "งั้น... กินด้วยกันมั้ย? อัฟโฟกาโตนี่น่ะ..."
1002903-111 = "(จากนั้นคุณครูก็นั่งกินอัฟโฟกาโตกับนัตสึอย่างเอร็ดอร่อย)"
1002903-112 = "(หลังจากคุยกันจบแล้ว สีหน้าของนัตสึก็ดูสดใสขึ้นกว่าตอนที่มาหามากๆ)"

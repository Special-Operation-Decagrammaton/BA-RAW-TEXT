1002903-80 = "#na;(바닐라 아이스크림 위로 떨어진 뜨거운 커피가 아이스크림을 녹이며, 둘이 섞인 새로운 무언가가 탄생하기 시작했다.)"
1002903-81 = "3;나츠;99;……<아포가토(Affogato)>.\n#3;em;…"
1002903-82 = "3;나츠;05;단 맛의 대표라고 할 수 있는 바닐라와 쓴 맛의 대표라고 할 수 있는 에스프레소의 융합체지.\n#3;em;[반짝]"
1002903-83 = "3;나츠;05;그 종류만 수천 가지가 넘는 수많은 디저트들 중에서도, 최고의 맛이라 여겨지는 녀석들 중에 하나인 디저트야."
1002903-84 = "3;나츠;02;봐. 이 멋진 비주얼을. 단 걸 좋아하는 사람도, 쓴 걸 좋아하는 사람도 포용할 수 있는 궁극의 완성체를.\n#3;em;[반응]"
1002903-85 = "3;나츠;02;어느 한 쪽만 취하며 다른 쪽을 배척하는 이들은 결코 다다를 수 없는 경지의 새로운 맛."
1002903-86 = "3;나츠;05;……정말 완벽하지.\n#3;em;[///]\n#3;stiff"

[translation]
1002903-1 = "第二堂課「科目：包容」"
1002903-3 = "（收到MomoTalk的訊息後沒過多久，夏就來到了夏萊）"
1002903-4 = "（莫名有股會聊很久的預感，所以帶夏來到了休息室）"
1002903-12 = "嗯，氣氛不錯，這裡挺舒適的。"
1002903-13 = "讓我很想把這裡當作我們的社團教室，直接霸佔這裡呢……"
1002903-14 = "哈哈。開玩笑的。不用那麼認真啦，老師。"
1002903-15 = "今天之所以會過來，其實是希望老師可以幫我排解突如其來的這股悲傷。"
1002903-16 = "……嗯？這個？"
1002903-17 = "是接續上回的，「教材」吧？"
1002903-21 = "其實只憑這些完全不夠就是了。"
1002903-22 = "……？"
1002903-23 = "你問我真的沒事嗎……？#n啊～你是在擔心MomoTalk上說的事情嗎？"
1002903-24 = "抱歉抱歉，真的沒事唷～#n並不是真實發生在我身上的事情。"
1002903-25 = "只是早上看到新聞之後有感而發罷了。#n有時候就會這樣呢。"
1002903-26 = "無法彼此理解而互相排斥，發生爭執……因而發生了許多悲慘事故……"
1002903-27 = "陷在迴圈中沒有醒悟，走向界線的另一端。#n就算意識到了也無法到達的那種挫折感。"
1002903-28 = "……簡直就像認定只有自己喜歡的味道最棒，#n無法認同他人喜好的部分甜點狂熱分子一樣呢～"
1002903-29 = "大概就是這樣。雖然若有所思想找人說話，#n不過如果突然跟普通的學生們說這些，大家會覺得很困擾的吧？"
1002903-30 = "所以就來找好像能一下子就接受這種話題的老師了。"
1002903-31 = "嘛，無論是什麼樣的世界、怎麼樣的地方，都會有故事和糾葛呢。"
1002903-32 = "像是薄荷巧克力怎樣怎樣、真正的咖啡只有Espresso，黑咖啡是邪魔歪道之類的……"
1002903-36 = "……嘛，"
1002903-37 = "直接讓你看看應該比較快吧？"
1002903-46 = "（夏走向休息室的一角，啟動了咖啡機）"
1002903-52 = "老師喜歡Espresso嗎？"
1002903-53 = "[s1] 「挺喜歡的。工作時也會喝。」\n[s2] 「會苦的我都不太……」"
1002903-54 = "呵呵，這樣啊。"
1002903-55 = "那這個如何？#n雖然可能會偏向我個人的喜好……"
1002903-56 = "呵呵，這樣啊。"
1002903-57 = "那這個如何？#n雖然我個人比較偏好這個……"
1002903-58 = "與Espresso處於極端位置的……"
1002903-63 = "（夏在帶來的紙袋中一陣翻找後，拿出了某樣東西）"
1002903-64 = "經典甜味的代名詞──"
1002903-65 = "「香草冰淇淋」！登愣──！"
1002903-66 = "別看我這樣，我也是個正值青春的女高中生。#n也是會喜歡這種東西的。"
1002903-67 = "在嘴裡慢慢融化的冰涼感與甜味……#n不會過度黏稠，不管多少都吃得下的那種魅力……！"
1002903-68 = "樸實無華就是奧義……這名符其實是最棒的甜點之一。#n光是它本身就是個完成度相當高的甜點了。"
1002903-69 = "……但是，老師。"
1002903-70 = "「Expresso最棒」、「香草冰淇淋最好」……你知道嗎？#n有個境界，是拘泥於這種微妙的分歧與固執的人所無法達到的。"
1002903-71 = "[s3] 「無法達到的境界？」\n[s4] 「什麼意思？」"
1002903-72 = "百聞不如一見。#n來，睜大眼睛看仔細吧！"
1002903-73 = "百聞不如一見。#n來，睜大眼睛看仔細吧！"
1002903-79 = "（夏把香草冰淇淋裝在盤子裡，接著開始將剛泡好的Espresso淋在上面）"
1002903-80 = "（熱咖啡一點一點融化了香草冰淇淋，兩者慢慢地融合在一起）"
1002903-81 = "……這叫「[ruby=Affogato]阿芙佳朵[/ruby]」。你知道嗎？"
1002903-82 = "融合了代表甜味的香草冰淇淋與代表苦味的Espresso。"
1002903-83 = "有人說這在數以千計的甜點當中，也是足以被稱為絕品的甜點之一哦～"
1002903-84 = "你看，這美麗的外觀。#n能同時包容喜歡甜味的人和喜歡苦味的人的新境界。"
1002903-85 = "這是過度拘泥於其中一方，進而排斥另一方的人絕對無法嘗到的滋味。"
1002903-86 = "……嗯，真是美妙。"
1002903-87 = "如果每個人都能抱持著這樣的想法，或是多少有這樣的包容力……"
1002903-88 = "這個世界也許就不會有恐懼，也不需要彼此爭鬥了吧……"
1002903-89 = "……"
1002903-90 = "[s5] 「夏，真是溫柔呢。」\n[s6] 「能為他人的事感到惋惜，也是一種包容力。」"
1002903-91 = "……這樣啊。"
1002903-92 = "……這樣啊。"
1002903-93 = "唔嗯……"
1002903-97 = "其實，我今天本來不打算說這些的。"
1002903-98 = "平時總是會被說「太唐突」「很奇怪」「聽太不懂」之類的……#n都已經是家常便飯了。"
1002903-99 = "當然，有一部分也是因為認為如果是老師，或許能聽見不同的回答才聯絡你的……"
1002903-100 = "意外地聽見了浪漫的話呢～真沒想到真沒想到。"
1002903-101 = "今天的課程似乎沒什麼必要呢。#n「班門弄斧」指的就是這樣嗎？即便如此還是覺得有點失禮呢。"
1002903-102 = "……啊哈。"
1002903-103 = "嘛，那看來今天沒有補課的必要……"
1002903-109 = "……要一起吃阿芙佳朵嗎？"
1002903-111 = "（在那之後，和夏一起品嘗了阿芙佳朵）"
1002903-112 = "（回程時夏的表情，似乎比過來時開朗了許多）"

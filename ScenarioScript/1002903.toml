1002903-65 = "3;나츠;05;바닐라 아이스크림! 두둥-!\n#3;closeup\n#3;em;[반짝]\n#fontsize;80"
1002903-66 = "3;나츠;02;이래 봬도 한창 때의 여고생이니까 말이지.\n#3;closeup"
1002903-67 = "3;나츠;99;입안에서 사르륵 녹은 차가움과 달달함……. 그러면서도 지나치게 눌러 붙지 않아 많이 먹을 수도 있는 지구력……!\n#3;em;[///]\n#3;stiff\n#3;closeup"
1002903-68 = "3;나츠;01;명실공한 최고의 디저트 재료 중 하나지. 그 자체로도 충분히 완성된 디저트이기도 하고 말이야.\n#3;closeup"
1002903-69 = "3;나츠;02;……하지만 선생님.\n#3;em;[반응]\n#3;closeup"
1002903-70 = "3;나츠;02;이 에스프레소와 바닐라 아이스크림. 둘 중 하나만 고집하는 사람은 다다르지 못하는 경지가 있다는 거, 알고 있어?\n#3;closeup"
1002903-71 = "[s3] \"다다르지 못하는 경지?\"\n[s4] \"그게 뭐야?\""

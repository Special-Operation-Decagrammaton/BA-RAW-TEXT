1002903-53 = "[s1] \"꽤 좋아하지. 일할 때도 마시고.\"\n[s2] \"쓴 건 그다지 취향이 아니야.\""
1002903-54 = "3;나츠;99;하하. 역시 그런가.\n#3;em;…"
1002903-55 = "3;나츠;02;그럼 이건 어때? 사실 나는 그것보다 이 쪽이 좀 더 취향이거든.\n#3;em;[반응]"

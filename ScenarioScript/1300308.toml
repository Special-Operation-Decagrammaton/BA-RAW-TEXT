[translation]
1300308-1 = "ช่วงสั้นๆ ที่งดงาม"
1300308-2 = "อาคารแยก ทรีนิตี้"
1300308-3 = "เฮ้อ..."
1300308-4 = "อุ๊ย คุณครู?"
1300308-5 = "ทำงานจนดึกเลยนะคะ กำลังจะกลับงั้นเหรอคะ?"
1300308-6 = "อ๋อ... ค่ะ ฉันเองก็มีเอกสารสำคัญของทางชมรมที่ต้องจัดการให้เสร็จ"
1300308-7 = "เพิ่งจะทำเสร็จเมื่อครู่เองค่ะ"
1300308-8 = "ต้องมีใครสักคนที่คอยจัดการเอกสารพวกนี้ให้เรียบร้อยน่ะค่ะ..."
1300308-9 = "[s] \"ทำได้ดีมากเลย\""
1300308-10 = "ขอบคุณค่ะ คุณครูเองก็ทำได้ดีมากเช่นกันค่ะ"
1300308-11 = "ฟู่ว... ทำงานดึกจนเมื่อยไหล่ไปหมดแล้ว"
1300308-12 = "ไปกันเถอะค่ะ มันดึกมากแล้วเดี๋ยวฉันเดินไปส่งนะคะ"
1300308-13 = "(ซู่...)"
1300308-14 = "เอ๋...?"
1300308-15 = "เหมือนฝนจะตกเลยนะคะ"
1300308-16 = "รีบวิ่งเถอะค่ะคุณครู!"
1300308-20 = "(ซู่วววววววว...)"
1300308-21 = "แย่ล่ะสิ... จู่ๆ ฝนก็ตกลงมาซะได้"
1300308-22 = "ที่หลบฝน..."
1300308-23 = "[s] \"ไปที่สวนกันเถอะ\""
1300308-24 = "สวนเหรอคะ?"
1300308-25 = "อ่า... จริงด้วย ถ้าไปที่นั่นละก็..."
1300308-27 = "(วิ่งไปยังซุ้มที่เคยนั่งดูพระอาทิตย์ตกด้วยกันกับฮาสุมิ)"
1300308-30 = "[ns] \"หลบฝนกันที่นี่ก่อนเถอะ\""
1300308-31 = "ค่ะ ถ้าเป็นที่นี่ละก็... คงไม่เป็นไรแน่ค่ะ"
1300308-34 = "― อ่า เปียกหมดเลยนะคะ แย่จัง...[wa:4140] "
1300308-37 = "― อืม... ดูเหมือนฝนจะไม่หยุดง่ายๆ เลยนะคะ[wa:2320] "
1300308-40 = "― ดูเหมือนคุณครูจะติดอยู่ที่นี่กับฉันไปอีกสักพักแล้วนะคะ[wa:1300] "
1300308-43 = "― ฮิฮิ ไม่นึกเลยว่าจะเป็นแบบนี้[wa:1140] "
1300308-46 = "― ถ้างั้นขอพักสักหน่อย คงไม่เป็นไรนะคะ[wa:4820] "
1300308-48 = "― ...สำหรับฉันแล้ว นี่เป็นช่วงเวลาที่มีค่าและสำคัญกับฉันมากเลยค่ะ[wa:2900] "
1300308-51 = "(ในที่สุดฝนก็หยุดตก)"
1300308-54 = "..."
1300308-55 = "[s] ปลุกฮาสุมิ"
1300308-56 = "อ่า..."
1300308-57 = "ฉันเผลอหลับไปเหรอคะ? ขออภัยด้วยค่ะ..."
1300308-58 = "คงเป็นเพราะทำงานจนดึก..."
1300308-59 = "......."
1300308-60 = "พระอาทิตย์ขึ้นแล้วค่ะ..."
1300308-61 = "[s] \"ไม่เป็นไรแน่นะ?\""
1300308-62 = "ค่ะ ฉันไม่เป็นไรค่ะ ฉันแจ้งทางหอพักไว้แล้วว่าจะต้องอยู่ทำงานดึก...#nพวกเขาคงไม่กังวลหรอกค่ะ"
1300308-63 = "...หึหึ"
1300308-64 = "ดูเหมือนฉันจะรบกวนคุณครูอีกแล้วนะคะ"
1300308-65 = "...ถึงจะแค่ไม่นาน แต่ไม่คิดเลยว่าพอได้อยู่กับคุณครูแล้วจะสนุกแบบนี้"
1300308-66 = "[s] \"หืม?\""
1300308-67 = "...ไม่มีอะไรหรอกค่ะ"
1300308-68 = "อืม... ถ้างั้นฉันรีบกลับหอพักก่อนจะมีใครมาเห็นเข้าดีกว่าค่ะ"
1300308-69 = "คุณครูคะ"
1300308-71 = "ไว้พบกันใหม่นะคะ"

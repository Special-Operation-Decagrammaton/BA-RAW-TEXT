[translation]
1300308-1 = "雖短暫但奢侈的"
1300308-2 = "三一．別館"
1300308-3 = "呼……"
1300308-4 = "哎呀，老師？"
1300308-5 = "忙到這麼晚辛苦您了，現在要回去了嗎？ "
1300308-6 = "是的。我也是一直處理一些社團的重要文件，遲遲處理不完……"
1300308-7 = "不過，剛才總算結束了。"
1300308-8 = "報告這種東西，到頭來還是要有人付出勞力才能完成呢……"
1300308-9 = "[s] 「辛苦了。」"
1300308-10 = "謝謝。老師也辛苦了。"
1300308-11 = "呼……工作到半夜肩膀就會很痠呢。"
1300308-12 = "我們一起回去吧。時間很晚了，就由我來當老師的護衛吧。"
1300308-13 = "（轟隆隆──！！）"
1300308-14 = "……哎呀。"
1300308-15 = "看來要下雨了呢。"
1300308-16 = "我們用跑的吧，老師！"
1300308-20 = "（唰啊─────）"
1300308-21 = "啊……雨越下越大了呢。"
1300308-22 = "有沒有地方能躲雨呢……"
1300308-23 = "[s] 「去公園那邊吧。」"
1300308-24 = "公園嗎？"
1300308-25 = "啊……說的也是呢，那裡的話……"
1300308-27 = "（前往之前和蓮實一起觀賞日落的公園）"
1300308-30 = "[ns] 「在這裡躲雨吧。」"
1300308-31 = "嗯，這裡的話……應該不會有問題。"
1300308-34 = "― 啊啊，全身都濕透了呢。真傷腦筋。[wa:4660] "
1300308-37 = "― 唔嗯，雨，似乎不會馬上停呢。[wa:3320] "
1300308-40 = "― 我們兩人被困在這裡，無計可施了呢？[wa:2780] "
1300308-43 = "― 呵呵，雖然沒想到會發生這種事。[wa:1700] "
1300308-46 = "― 如果只是一會兒……像這樣的時間也不錯吧。[wa:5460] "
1300308-48 = "― ……雖然奢侈，但對我來說是很寶貴的時間。[wa:4620] "
1300308-51 = "（到了早上，雨終於停了）"
1300308-54 = "……"
1300308-55 = "[s] 叫醒蓮實"
1300308-56 = "嗯……"
1300308-57 = "我，睡著了嗎？真是不好意思……"
1300308-58 = "可能是因為我最近常加班吧……"
1300308-59 = "……"
1300308-60 = "……天色慢慢變亮了呢。"
1300308-61 = "[s] 「還好嗎？」"
1300308-62 = "是的，沒問題。我有事先跟宿舍說我要加班……#n應該不會讓宿舍的人擔心。"
1300308-63 = "……呵呵。"
1300308-64 = "我又受老師照顧了呢。"
1300308-65 = "……本來以為只是一段短暫的時光，沒想到竟然能過的如此奢侈。"
1300308-66 = "[s] 「？」"
1300308-67 = "……什麼都沒有。"
1300308-68 = "那個，趁現在還沒有被人看到，我先回宿舍了哦。"
1300308-69 = "那麼，老師。"
1300308-71 = "下次見…… "

[translation]
1300308-1 = "Short but Splendid"
1300308-2 = "Trinity Annex"
1300308-3 = "*sigh*"
1300308-4 = "Oh, Sensei?"
1300308-5 = "Are you on your way home? You must have been working late."
1300308-6 = "You're not the only one. I also had some important club business to take care of..."
1300308-7 = "I'm glad I was able to take care of it."
1300308-8 = "Paperwork is never fun, but somebody has to do it..."
1300308-9 = "[s] \"Way to go.\""
1300308-10 = "Thanks. And a well done to you as well, Sensei."
1300308-11 = "*sigh* My shoulders feel so stiff from working all day."
1300308-12 = "Why not go back together? I'll walk home since it's getting so late."
1300308-13 = "*crack* *rumble*"
1300308-14 = "Huh?"
1300308-15 = "Sounds like we're in store for bad weather."
1300308-16 = "Let's run, Sensei!"
1300308-20 = "*pitter-patter*"
1300308-21 = "Goodness... It's absolutely pouring."
1300308-22 = "We need to find somewhere to take shelter."
1300308-23 = "[s] \"Let's go to the park.\""
1300308-24 = "The park?"
1300308-25 = "Oh, right. That place..."
1300308-27 = "Hasumi and I headed to the gazebo where we watched the sunset together."
1300308-30 = "[ns] \"We found our shelter.\""
1300308-31 = "Right. This place...should be fine."
1300308-34 = "― Ah. We're drenched. This isn't good...[wa:3780] "
1300308-37 = "― Hmm. The rain isn't showing signs of letting up.[wa:1960] "
1300308-40 = "― Well, then, I suppose we're stuck here together, aren't we?[wa:1100] "
1300308-43 = "― Heehee. This wasn't how I expected this evening to go.[wa:140] "
1300308-46 = "― I don't mind relaxing like this...if it's just for a little while.[wa:3620] "
1300308-48 = "― It's rare that I get opportunities like this, but I always cherish them.[wa:2540] "
1300308-51 = "The rain eventually stopped at dawn."
1300308-54 = "..."
1300308-55 = "[s] \"(I should wake Hasumi.)\""
1300308-56 = "Ah..."
1300308-57 = "Did I fall asleep? I'm sorry..."
1300308-58 = "That paperwork must have left me fatigued."
1300308-59 = "..."
1300308-60 = "...The sun is rising."
1300308-61 = "[s] \"Is everything all right?\""
1300308-62 = "Yes, I'm fine. I told the dorm I would be working late, so I doubt they're concerned about where I am."
1300308-63 = "...Heehee."
1300308-64 = "I'm in your debt yet again, Sensei."
1300308-65 = "...I never thought I'd be able to enjoy so much quality time with you."
1300308-66 = "[s] \"What was that?\""
1300308-67 = "...Nothing."
1300308-68 = "I should return to the dorm before someone spots me here."
1300308-69 = "Well, then, Sensei... "
1300308-71 = "...I'll see you later."

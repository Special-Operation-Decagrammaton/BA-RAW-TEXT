[translation]
10019020-11 = "กองกำลังป้องกันและกองกำลังเสริมรวมตัวกันสำเร็จ ตอนนี้กำลังเข้าปะทะครั้งสุดท้าย"
10019020-21 = "ฮ่ะฮ่ะฮ่ะฮ่า-! แกนี่มันสุดยอดไปเลยนะ! ถูกใจชะมัดเลย!"
10019020-22 = "กร๊ากกกก  กรั่กๆๆๆ-!"
10019020-26 = "...ดูสนุกจังเลยนะ ทั้งสองคน"
10019020-27 = "นับเป็นภาพที่หาดูได้ยากเลยนะ ฮืม..."
10019020-28 = "อะ...อืม"
10019020-29 = "แต่ว่า..."
10019020-36 = "จำนวนของศัตรูไม่ลดลงเลยค่ะ"
10019020-37 = "แบบนี้คงไม่มีวันจบวันสิ้นแน่เลยค่ะ..."
10019020-42 = "...พยายามได้ดีมากเลยนะ เหล่าทหารกล้า!"
10019020-43 = "หะ... หืม?"
10019020-51 = "เอ๋... ชุดนักเรียนนั่น..."
10019020-52 = "เรดวินเทอร์...?"
10019020-59 = "เราคือเชริโน่!"
10019020-60 = "ประธานสภานักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายทำความสะอาด หัวหน้าฝ่ายวินัย และหัวหน้าฝ่ายโภชนาการ คนสำคัญแห่งสหภาพเรดวินเทอร์!!"
10019020-61 = "เรามาช่วยพวกเธอตามคำขอร้องของสหายแล้ว! เราเป็นบุคคลสำคัญเชียวนะ จะพลาดเหตุการณ์สำคัญๆ แบบนี้ได้ยังไง!"
10019020-66 = "......"
10019020-67 = "......"
10019020-69 = "อ่า... เครื่องประดับอลังการดีจังนะ..."
10019020-70 = "หนวดเหรอ?! อะฮ่าฮ่าฮ่า! สุดยอดไปเลยเนอะ! นั่นมันอะไรน่ะ? "
10019020-72 = "(อะไรกัน หนวดนั่นน่ะ...?! เท่สุดๆ เลยไม่ใช่รึไง!?)"
10019020-73 = "......"
10019020-74 = "แสดงว่า... กองกำลังเสริมมาถึงแล้วสินะคะ?"
10019020-81 = "อื้อ กองกำลังเสริมจากเรดวินเทอร์มาถึงแล้ว ตอนนี้ก็พอฟัดพอเหวี่ยงแล้วละ"
10019020-84 = "ดีละ ถ้างั้นมาลุยกันเลยดีกว่า!"
10019020-85 = "คิกๆๆ...."
10019020-87 = "เหล่าทหารกล้าทั้งหลาย! เดินหน้าเต็มกำลัง!"
10019020-88 = "สงครามปิดล้อมของเรดวินเทอร์จะเริ่มต้น ณ บัดนี้!"

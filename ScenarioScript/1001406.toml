[translation]
1001406-1 = "能共處時光的這個瞬間"
1001406-3 = "[ns1] 「話說回來，追求忍道，」\n[ns2] 「具體來說要做什麼呢？」"
1001406-6 = "伊樹菜認為首先要從忍者是什麼……"
1001406-7 = "這個根本的部分開始探究！"
1001406-8 = "雖然時代劇也是很棒的資料……"
1001406-9 = "但伊樹菜覺得，一定還有其他光靠影片無法了解的部分！"
1001406-10 = "[s3] 「確實很有可能。」\n[s4] 「資料當然是越多越好。」"
1001406-11 = "是的！那麼該去哪裡才能夠獲得忍者的相關資訊呢……"
1001406-12 = "是的！那麼該去哪裡才能夠獲得忍者的相關資訊呢……"
1001406-13 = "經過伊樹菜嚴謹的事前調查，列出了一份清單！"
1001406-14 = "希望主公能陪伊樹菜走訪清單上的各個地點！"
1001406-15 = "[s] 「嗯，那就照著清單走一趟吧。」"
1001406-16 = "是的！那我們走吧！"
1001406-19 = "[ns5] 「這裡是……咖啡廳？」\n[ns6] 「可以在這裡知道有關忍者的事？」"
1001406-20 = "沒錯！請主公看看這東西。"
1001406-21 = "沒錯！請主公看看這東西。"
1001406-23 = "（伊樹菜拿出的菜單上如此寫著）"
1001406-24 = "（柴犬汪藏時代劇系列聯名活動「77種忍者甜點節」）"
1001406-25 = "[s] 「聯名活動……？」"
1001406-26 = "沒錯！就是聯名活動！而且是柴犬汪藏導演的代表作……！"
1001406-28 = "主公！主公要選什麼呢？"
1001406-29 = "伊樹菜個人推薦的是這個「流浪百匯聖代」……"
1001406-30 = "啊！不過這個「孤獨的可麗餅」和「手裏劍餅乾」感覺也不賴呢！"
1001406-31 = "啊！主公！只要點4道以上聯名料理，就可以獲得印有電影經典場景的色紙喔！"
1001406-32 = "[s] 「這，這樣啊……」"
1001406-33 = "我們快點點餐吧，主公！"
1001406-35 = "（和伊樹菜一起點了4道餐點，得到了聯名特典色紙……）"
1001406-38 = "[ns] 「甜點之後是拉麵店！？」"
1001406-39 = "啊，伊樹菜沒有跟您說過嗎？"
1001406-40 = "這裡也有在賣聯名商品的忍者拉麵喔！"
1001406-41 = "[s] 「忍者拉麵！？」"
1001406-42 = "主公！一起來深入調查吧！"
1001406-43 = "啊，簡介在這裡。我看看……"
1001406-44 = "忍者平常吃的拉麵，是以豚骨湯頭，"
1001406-45 = "且通常是吃細麵、多蒜、加叉燒……上面這麼寫著。"
1001406-46 = "那麼伊樹菜也要挑戰同樣的餐點！"
1001406-47 = "[s]「唔，嗯……？」"
1001406-50 = "咻嚕咻嚕！"
1001406-52 = "（在那之後也被伊樹菜拉著，四處體驗忍者相關活動）"
1001406-53 = "（忍者章魚燒、忍者彈珠汽水、忍者投籃遊戲、諸如此類……）"
1001406-55 = "嗯～！今天和主公一起學習了很多關於忍者的知識！"
1001406-56 = "[s] 「這些……與其說是探討忍者……」"
1001406-57 = "啊，主公！您看那邊！"
1001406-58 = "那裡有可以進行忍者體驗的船喔！"
1001406-59 = "[s] 「水蜘蛛嗎？……呃，那只是普通的小艇吧……？」"
1001406-62 = "（伊樹菜開始認真閱讀乘船場旁邊的標示）"
1001406-63 = "嗯嗯……"
1001406-64 = "原來如此……忍者們會透過划槳來鍛鍊身體……"
1001406-66 = "主公──！"
1001406-67 = "[s7] 「好好好。」\n[s8] 「要一起搭對吧？」"
1001406-68 = "讀，讀心術……！？竟然被讀心了……！"
1001406-69 = "讀，讀心術……！？竟然被讀心了……！"
1001406-70 = "難道主公……是超能力忍者嗎？"
1001406-71 = "[s] 「那是忍者還是超能力者啊？」"
1001406-72 = "開玩笑的，欸嘿嘿！來吧，主公！"
1001406-73 = "我們一起坐船吧！"
1001406-78 = "― 啊，主公， 主公！你有看到那個嗎！？[wa:2660] "
1001406-80 = "― 鯉魚跳出水面了唷！[wa:1360] "
1001406-83 = "[ns] 「冷靜點，在船上晃來晃去很危險的唷？」"
1001406-84 = "― 啊，說得也是呢。 冷靜點，伊樹菜…… 讓精神安定下來……。[wa:3860] "
1001406-86 = "― ……欸嘿，欸嘿嘿嘿。[wa:960] "
1001406-89 = "[ns] 「伊樹菜看起來很開心呢。」"
1001406-90 = "― 是的！ 很開心，能這麼開心，果然是因為……[wa:2620] "
1001406-92 = "―  和最喜歡的主公在一起吧？[wa:3520] "
1001406-95 = "― 今天這一天， 對伊樹菜來說肯定會是一生的回憶。[wa:4020] "
1001406-98 = "[ns9] 「能成為回憶的，肯定不只今天。」\n[ns10] 「從今以後也是，不管要做什麼我都樂意奉陪。」"
1001406-101 = "― ……！是的，主公！雖然小女不才……！[wa:3660] "
1001406-103 = "― 不過今後也請多多關照伊樹菜！欸嘿嘿！[wa:3160] "
1001406-106 = "（和伊樹菜一起划了一會船，度過了寧靜愉快的時光）"

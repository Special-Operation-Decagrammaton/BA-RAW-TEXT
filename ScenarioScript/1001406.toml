[translation]
1001406-1 = "Together with My Lord"
1001406-3 = "[ns1] \"This 'research' certainly keeps you busy.\"\n[ns2] \"What exactly are you trying to learn?\""
1001406-6 = "The true meaning of being a ninja."
1001406-7 = "I've been searching for the answer constantly."
1001406-8 = "Historical dramas make for a fun source..."
1001406-9 = "...but Izuna knows there's much more to this question than watching dramas!"
1001406-10 = "[s3] \"I can't argue with you there.\"\n[s4] \"The more research material you have, the better.\""
1001406-11 = "The question is: Where do we go to learn more about ninjas?"
1001406-12 = "The question is: Where do we go to learn more about ninjas?"
1001406-13 = "It just so happens that I've used my extensive research to create a list of places."
1001406-14 = "All you have to do is come with me!"
1001406-15 = "[s] \"After you.\""
1001406-16 = "Okay!"
1001406-19 = "[ns5] \"Isn't this a dessert cafe?\"\n[ns6] \"You can learn about ninjas here?\""
1001406-20 = "Yes, my lord! Look at this."
1001406-21 = "Yes, my lord! Look at this."
1001406-23 = "(The menu that Izuna shows me says...)"
1001406-24 = "...\"The Sweet Festival of 77 Ninjas,\" in collaboration with the Shiba Dog Wang Wang ninja drama series."
1001406-25 = "[s] \"A...collaboration?\""
1001406-26 = "Yep! It's a crossover with director Shiba Dog Wang Wang!"
1001406-28 = "Which one do you want, my lord?"
1001406-29 = "Izuna recommends the Wandering Parfait, but..."
1001406-30 = "Oh! But I think this Lonely Crepe and Shuriken Cookie would be good too!"
1001406-31 = "*gasp* If you order four or more items, they'll give you a colored poster with an important scene from the series!"
1001406-32 = "[s] \"Y-Yeah?\""
1001406-33 = "Let's hurry up and order, my lord!"
1001406-35 = "(Izuna and I ordered four items to receive the special promotional merch...)"
1001406-38 = "[ns] \"We're stopping for ramen after dessert?!\""
1001406-39 = "Oh, did Izuna not tell you?"
1001406-40 = "This place also sells ninja ramen as part of a collaboration!"
1001406-41 = "[s] \"How do you make ramen 'ninja'?!\""
1001406-42 = "This will be a good opportunity to learn!"
1001406-43 = "Here's what it says in the brochure."
1001406-44 = "\"When ninjas eat ramen, they prefer a tonkotsu base..."
1001406-45 = "\"...with thin noodles, lots of garlic, and extra chashu.\""
1001406-46 = "Then Izuna knows what to order!"
1001406-47 = "[s] \"R-Really...?\""
1001406-50 = "*slurp*"
1001406-52 = "(Izuna dragged me all over town for all sorts of promotional ninja products.)"
1001406-53 = "(Ninja takoyaki, ninja ramune, ninja basketball, and so on...)"
1001406-55 = "Mm-hmm! I'm learning a lot about lords and ninjas today!"
1001406-56 = "[s] \"I'm...not positive this counts as ninja research...\""
1001406-57 = "Look over there, my lord!"
1001406-58 = "There's a boat where you can have a ninja experience!"
1001406-59 = "[s] \"That's just a regular boat...isn't it?\""
1001406-62 = "(Izuna is already looking at the sign posted beside the dock.)"
1001406-63 = "Hmm. I see..."
1001406-64 = "So ninjas row boats in order to train their muscles."
1001406-66 = "My lord!"
1001406-67 = "[s7] \"Fine...\"\n[s8] \"You want me to ride the boat with you, right?\""
1001406-68 = "You read my mind!"
1001406-69 = "You read my mind!"
1001406-70 = "Is that your secret ninja power?!"
1001406-71 = "[s] \"Wouldn't that make me a psychic instead?!\""
1001406-72 = "Heehee! Okay, my lord."
1001406-73 = "Let's go!"
1001406-78 = "― Oh, my lord, my lord! Did you see that?![wa:1780] "
1001406-80 = "― The carp! It jumped out of the water![wa:240] "
1001406-83 = "[ns] \"Calm down, Izuna. You're rocking the boat.\""
1001406-84 = "― Oh, I see. Calm down, Izuna... Calm down...[wa:3300] "
1001406-86 = "― Heh. Heehee.[wa:880] "
1001406-89 = "[ns] \"You look like you're having fun.\""
1001406-90 = "― Uh-huh! I think I'm having fun because...[wa:1820] "
1001406-92 = "― I'm spending time with my favorite person, my lord![wa:2000] "
1001406-95 = "― This day has given Izuna memories to cherish forever.[wa:2820] "
1001406-98 = "[ns9] \"And it won't be the last.\"\n[ns10] \"No reason we can't keep training and make more.\""
1001406-101 = "― I'd like that! I know I can be a handful sometimes...[wa:2260] "
1001406-103 = "― ...but I hope you'll allow your ninja to remain by your side, my lord![wa:1080] "
1001406-106 = "(I spent a long time quietly rowing the boat with Izuna.)"

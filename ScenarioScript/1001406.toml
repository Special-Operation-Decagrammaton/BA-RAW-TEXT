[translation]
1001406-1 = "ช่วงเวลานี้ที่ได้อยู่กับนายท่าน"
1001406-3 = "[ns1] \"การปฏิบัติเพื่อค้นคว้าเรื่องนั้น\"\n[ns2] \"มันคืออะไรเหรอน่ะ?\""
1001406-6 = "อย่างแรก ความหมายของนินจาคืออะไร"
1001406-7 = "อิซุนะค้นหาคำตอบเรื่องนี้มาโดยตลอดเลยค่ะนายท่าน!"
1001406-8 = "ละครย้อนยุคก็เป็นข้อมูลชั้นยอด..."
1001406-9 = "แต่อิซุนะคิดว่าต้องมีบางอย่างที่ไม่สามารถเรียนรู้ได้ผ่านละครได้แน่ๆ!"
1001406-10 = "[s3] \"จะว่าอย่างนั้นก็ถูก\"\n[s4] \"ข้อมูลยิ่งหลากหลายก็ยิ่งดีนะ\""
1001406-11 = "แล้วถ้างั้นจะไปสำรวจเรื่องนินจาได้จากที่ไหนบ้างนะ"
1001406-12 = "แล้วถ้างั้นจะไปสำรวจเรื่องนินจาได้จากที่ไหนบ้างนะ"
1001406-13 = "หลังจากสำรวจเบื้องต้นอย่างถี่ถ้วน อิซุนะก็ได้รายชื่อสถานที่มาแล้วค่ะ!"
1001406-14 = "นายท่านแค่ไปกับอิซุนะก็พอแล้วค่ะ!"
1001406-15 = "[s] \"ดีเลย ถ้างั้นก็ไปตามนั้นกัน\""
1001406-16 = "ได้เลยค่ะ!"
1001406-19 = "[ns5] \"ที่นี่... คาเฟ่ของหวานไม่ใช่เหรอ?\"\n[ns6] \"จะได้เรียนรู้เรื่องนินจาจากที่นี่งั้นเหรอ?\""
1001406-20 = "ค่ะ นายท่าน! ดูนี่สิคะ"
1001406-21 = "ค่ะ นายท่าน! ดูนี่สิคะ"
1001406-23 = "(เมนูที่อิซุนะเอาให้ดูมีเขียนไว้อย่างนั้นอย่างชัดเจน)"
1001406-24 = "(เทศกาลขนมนินจา 77 ชนิด กิจกรรมคอลแลปส์กับซีรีส์ละครย้อนยุคของปรมาจารย์ชิบะ)"
1001406-25 = "[s] \"คอลแลปส์... งั้นเหรอ?\""
1001406-26 = "ใช่ค่ะ! การคอลแลปส์ค่ะ! แถมยังเป็นผลงานชิ้นเอกของปรมาจารย์ผู้กำกับชิบะด้วย...!"
1001406-28 = "นายท่าน! นายท่านจะรับอะไรดีคะ?"
1001406-29 = "ส่วนตัวอิซุนะขอแนะนำพาร์เฟต์พเนจรค่ะ"
1001406-30 = "อ๊ะ! เครปผู้โดดเดี่ยวกับคุกกี้มีดบินก็น่าจะดีนะคะ!"
1001406-31 = "เอ๊ะ?! ถ้าสั่งมากกว่า 4 เมนูจะได้รับโปสเตอร์สีฉากเด็ดจากในหนังด้วยนะคะ!"
1001406-32 = "[s] \"หืม?\""
1001406-33 = "สั่งกันเถอะค่ะ! นายท่าน!"
1001406-35 = "(คุณครูกับอิซุนะสั่งของหวานมาทั้งหมด 4 เมนูและได้รับของรางวัลพิเศษมา...)"
1001406-38 = "[ns] \"ต่อจากของหวานก็เป็นร้านราเม็ง?!\""
1001406-39 = "อ๊ะ อิซุนะไม่ได้บอกนายท่านเหรอคะ?"
1001406-40 = "ที่นี่ก็มีขายราเม็งนินจาที่เป็นสินค้าคอลแลปส์เหมือนกันค่ะ!"
1001406-41 = "[s] \"นิน-จา!\""
1001406-42 = "นายท่าน! เรามาเรียนรู้เรื่องนินจาด้วยกันเถอะนะคะ!"
1001406-43 = "มีเขียนไว้ในโบรชัวร์นี่ค่ะ"
1001406-44 = "เวลาที่นินจากินราเม็ง ส่วนใหญ่จะกินเมนูทงคตสึเป็นพื้นฐาน..."
1001406-45 = "กับเส้นบางๆ กระเทียมเยอะๆ และเพิ่มหมูชาชูค่ะ"
1001406-46 = "งั้นมาลองเมนูเดียวกับอิซุนะกันนะคะ!"
1001406-47 = "[s] \"หืม...?\""
1001406-50 = "ซู้ดดด~!"
1001406-52 = "(หลังจากนั้นอิซุนะก็พาไปเริ่มตะลุยคอนเทนต์นินจาไปทั่ว)"
1001406-53 = "(เช่น ทาโกะยากินินจา, น้ำรามูเนะนินจา, เกมขว้างลูกบาสนินจา...)"
1001406-55 = "ว้าว! วันนี้ได้เรียนรู้เรื่องนินจากับนายท่านเยอะแยะเลยค่ะ!"
1001406-56 = "[s] \"นี่เป็นการค้นคว้าเรื่องนินจาจริงๆ เหรอ...\""
1001406-57 = "อ๊ะ นายท่าน! ดูนั่นสิคะ!"
1001406-58 = "มีเรือให้ได้สัมผัสประสบการณ์นินจาด้วยค่ะ!"
1001406-59 = "[s] \"มันแค่เรือธรรมดา... ไม่ใช่เหรอ?\""
1001406-62 = "(อิซุนะเริ่มมองไปตรงป้ายที่ตั้งอยู่ด้านข้างท่าเรือ)"
1001406-63 = "อืม... อื้ม..."
1001406-64 = "อืม... นินจาก็ต้องพายเรือเพื่อฝึกพละกำลัง..."
1001406-66 = "นายท่านคะ!"
1001406-67 = "[s7] \"ก็ได้...\"\n[s8] \"ไปพายเรือด้วยกันไหมล่ะ?\""
1001406-68 = "นายท่านอ่านใจฉันได้เหรอคะเนี่ย...!"
1001406-69 = "นายท่านอ่านใจฉันได้เหรอคะเนี่ย...!"
1001406-70 = "หรือว่านายท่านที่จริง... เป็นนินจาขั้นเทพ?"
1001406-71 = "[s] \"แบบนั้นน่าจะเป็นพวกมีพลังจิตมากกว่าไม่ใช่รึไง\""
1001406-72 = "ฮิฮิ! นายท่าน!"
1001406-73 = "ไปกันเถอะค่ะ!"
1001406-78 = "― อ๊ะ นายท่านคะ! นายท่าน! เห็นนี่ไหมคะ?![wa:1860] "
1001406-80 = "― ปลาคาร์ฟ กระโดดขึ้นมา! แล้วก็กระโดดขึ้นมาอีกทีด้วยค่ะ![wa:10] "
1001406-83 = "[ns] \"อิซุนะ ใจเย็นก่อน เรือจะคว่ำเอานะ\""
1001406-84 = "― อ๊ะ จริงด้วยค่ะ อิซุนะ ใจเย็นๆ ก่อนนะ... สงบใจเข้าไว้...[wa:2780] "
1001406-86 = "― อ่าแหะๆ ฮิฮิฮิฮิ[wa:720] "
1001406-89 = "[ns] \"อิซุนะดูสนุกมากเลยนะ\""
1001406-90 = "― ค่ะ! สนุกมากเลยค่ะ! ที่ได้ทำเรื่องสนุกๆ แบบนี้...[wa:1500] "
1001406-92 = "― เป็นเพราะว่าได้อยู่กับนายท่าน...ที่ชอบที่สุด หรือเปล่านะคะ?[wa:1680] "
1001406-95 = "― วันนี้จะเป็นวันที่... อิซุนะ จะจดจำไปตลอดชีวิตเลยค่ะ[wa:2860] "
1001406-98 = "[ns9] \"ไม่ใช่แค่วันนี้หรอกนะ\"\n[ns10] \"ถ้าเป็นเรื่องการฝึกล่ะก็ ครูพร้อมทุกเมื่อเลย\""
1001406-101 = "― ค่ะ! นายท่าน! ถึงอิซุนะจะยังไม่เพียบพร้อมก็เถอะ![wa:2460] "
1001406-103 = "― ต่อจากนี้ไปอิซุนะ ขอฝากตัวด้วยนะคะ! ฮิฮิฮิ![wa:2160] "
1001406-106 = "(คุณครูพายเรือและใช้เวลาอันเงียบสงบไปกับอิซุนะสักพักหนึ่ง)"

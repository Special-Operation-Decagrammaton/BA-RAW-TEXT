1006502-24 = "3;카호;02;그렇군요. 네, 이해합니다."
1006502-25 = "3;카호;99;단순한 서면으로 전달한 이야기로 이해를 바라는 것이 무리한 일이라는 것도 충분히 인지하고 있는바."
1006502-26 = "3;카호;01;갑작스러운 이야기에 선생님께서 당혹스러워하시는 것도 당연합니다."

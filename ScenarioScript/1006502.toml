[translation]
1006502-1 = "百鬼夜行的宣傳負責人，佳穗同學"
1006502-2 = "（收到佳穗的聯絡後，過了約30分鐘……）"
1006502-6 = "老師，打擾了。"
1006502-7 = "[s]「請進，門開著哦。」"
1006502-14 = "謝謝您在百忙之中抽出時間，[USERNAME]老師。"
1006502-15 = "[s]「沒事的，話說你來得真快呢。」"
1006502-16 = "當天才聯絡您真是非常抱歉。"
1006502-17 = "本應事先跟您約好時間才對……"
1006502-18 = "不過「那件事」我希望能盡快有所進展。"
1006502-19 = "[s]「抱歉，關於這一點……」"
1006502-23 = "[ns]「你說的『那件事』，我其實不是很明白……」"
1006502-24 = "這樣啊。"
1006502-25 = "僅靠書面資料就要您理解會有困難，這點我非常清楚。"
1006502-26 = "何況事情十分突然，老師會感到困惑也是理所當然的。"
1006502-27 = "[s]「對，對吧……？」"
1006502-28 = "不過正因如此，我更希望您給我一些時間……"
1006502-29 = "……不，您願意給我一個機會嗎？"
1006502-30 = "我會全力向您說明的。"
1006502-31 = "畢竟，我今天本就是為此而來。"
1006502-32 = "[s1]「啊，嗯，就拜託你囉？」\n[s2]「我反而還想拜託你說明得詳細一點。」"
1006502-35 = "謝謝您。"
1006502-36 = "那麼既然老師您同意了……"
1006502-40 = "我，桑上佳穗，作為百鬼夜行觀光文化產業宣傳支援組的戰略領袖──"
1006502-41 = "從現在起，#n將開始向您報告夏萊與百鬼夜行聯合學園的觀光產業推動計畫！"
1006502-42 = "[s]「……？」"
1006502-46 = "首先，請您看這邊的資料。"
1006502-50 = "這張圖表彙整了百鬼夜行聯合學園每季度的觀光銷售額。"
1006502-54 = "我們百鬼夜行聯合學園的年度銷售額連續3年上升，#n呈現約150%的成長率。"
1006502-55 = "如此勢如破竹的成長率，即使翻遍奇普托斯都很難看到，可說是非常優異的成果。"
1006502-56 = "[s]「……？」"
1006502-57 = "然而，這樣的成長率能維持到什麼時候……"
1006502-58 = "會有這樣的疑問也是當然的。"
1006502-59 = "不管是多麼棒的事物，要永遠保持成長也很困難。"
1006502-60 = "一旦發展成熟便一路走向衰敗的案例不勝其數，這點我們百鬼夜行也瞭然於心。"
1006502-61 = "[s]「嗯，嗯？」"
1006502-62 = "然而，我們百鬼夜行聯合學園的觀光產業推動了差異化──"
1006502-63 = "市場分析的結果一再顯示，要說我們的品牌形象已建立成功也不為過……！"
1006502-78 = "（佳穗突然開始進行熱情的簡報……）"
1006502-79 = "（因為難懂的詞語很多，不是很能理解）"
1006502-80 = "（就在不是很理解情況的狀態下，簡報接近尾聲……）"
1006502-85 = "……綜上所述，希望老師願意相信我們百鬼夜行，助我們一臂之力。"
1006502-86 = "只要能與夏萊進行業務上的合作，一定能有更進一步的成長……"
1006502-87 = "甚至可能成為奇普托斯文化的領頭羊，我桑上佳穗能夠斷言！"
1006502-88 = "簡報到此為止，感謝您的聆聽。"
1006502-97 = "呼……"
1006502-98 = "那麼老師，您有什麼想問的嗎？"
1006502-102 = "[ns]「那個，不好意思……？」"
1006502-104 = "[ns]「你剛才在說什麼，我其實不是很理解……」"
1006502-105 = "…………"
1006502-106 = "唔……！"
1006502-107 = "[s]「抱，抱歉！是我說明得不夠充分吧！？」"
1006502-108 = "不，您別這麼說。#n只是，夏萊的老師果然正如傳聞所說，是個厲害的對手……"
1006502-109 = "我再次理解到了這一點。"
1006502-110 = "儘管已經準備了充足的數據進行簡報，然而對於依然能站在退後一步的視角，#n冷靜判斷事物的那份判斷力來說……"
1006502-111 = "……僅憑看得見的數字是不夠的對吧。"
1006502-112 = "真正重要的是心意……"
1006502-113 = "要我證明發自內心的「信賴」，您是這個意思吧。"
1006502-114 = "[s]「……？」"
1006502-115 = "……我明白了。"
1006502-116 = "要證明「信賴」，想必不是一件能夠輕易達成的事。"
1006502-117 = "但是我桑上佳穗，絕不會輕言放棄。"
1006502-121 = "只要[USERNAME]老師您願意……！"
1006502-122 = "……不，不才小女……做為[USERNAME]老師的……"
1006502-123 = "專，專屬值日生……為了夏萊和百鬼夜行聯合學園的未來……"
1006502-124 = "只要這條命還在……"
1006502-125 = "我，我，我發……我發誓……"
1006502-126 = "會將自己奉獻給──"
1006502-128 = "[ns]「你好像搞錯了什麼但你誤會了！」"
1006502-130 = "……咦，咦？"
1006502-131 = "我搞錯了嗎……？"
1006502-132 = "但是……"
1006502-133 = "[s]「所以我說『那件事』到底是什麼！？」"
1006502-134 = "…………咦？"
1006502-136 = "（比對彼此認知的結果是……）"
1006502-140 = "非非非非非非非非…………"
1006502-141 = "非常抱歉！！"
1006502-142 = "沒，沒想到，本該在上週寄給您的，洽談業務合作的信件……"
1006502-143 = "竟然只寫了草稿而沒有寄出……！"
1006502-144 = "[s]「我中途就覺得可能是那樣了……」"
1006502-145 = "在您忙碌的時候，單方面地說著莫名其妙的話……"
1006502-146 = "再，再次向您致上歉意！#n全都是我的疏忽！"
1006502-147 = "如果有事先傳達給您的話，現在應該……"
1006502-148 = "[s]「不，關於這點……」"
1006502-152 = "[ns]「很抱歉，站在夏萊的立場可能不太方便。」"
1006502-153 = "夏萊無法答應類似這種的業務合作嗎……？"
1006502-154 = "……夏萊終究只是傾聽學生的煩惱，並加以協助的聯邦搜查部……"
1006502-155 = "……並不是以賺取利益為目的。"
1006502-156 = "……我，我該不會…… "
1006502-157 = "……從一開始就搞錯了……？"
1006502-158 = "[s]「嗯，抱歉……」"
1006502-159 = "啊……啊……"
1006502-160 = "原來，如此……"
1006502-161 = "我只是一心想宣傳百鬼夜行的文化……#n心想如果是至今幫助過我們百鬼夜行無數學生的夏萊的老師……"
1006502-162 = "或許能獲得不錯的結果，我是這麼想的……"
1006502-163 = "原來一切……都只是我的誤會……"
1006502-164 = "自顧自地暴走，還讓老師感到困擾……"
1006502-165 = "您一定很失望吧……非常抱歉。"
1006502-166 = "[s]「不，我一點也不失望。」"
1006502-167 = "……什麼？"
1006502-168 = "[s]「這也代表你是多麼想傳播百鬼夜行的文化對吧？」"
1006502-174 = "（不惜親自拜訪夏萊，準備資料進行簡報，都是因為佳穗有著想宣傳百鬼夜行的心）"
1006502-175 = "（不僅僅只是因為身為宣傳負責人……）"
1006502-176 = "（而是出自喜愛著自己最喜歡的文化的純粹心意）"
1006502-181 = "[ns] （甚至最後差點暴走……）"
1006502-185 = "[ns] 「佳穗明明這麼努力，我怎麼可能會失望呢。」"
1006502-189 = "……這，這樣啊……"
1006502-190 = "老師您……居然連我這種人的心情都如此關心。"
1006502-191 = "……是。"
1006502-192 = "非常感謝您，老師。"
1006502-193 = "夏萊是什麼樣的組織，我又有什麼誤會，托您的福我都了解了。"
1006502-194 = "業務合作的話題就聊到這裡吧。"
1006502-195 = "[s]「謝謝你，如果有其他想商量的話題可以跟我說哦。」"
1006502-196 = "作為代替……"
1006502-197 = "[s]「代替……？」"
1006502-201 = "為了構築夏萊與百鬼夜行聯合學園的友好關係……"
1006502-202 = "我想到了一個與工作無關的歡樂活動……"
1006502-203 = "可以占用您一些時間嗎？"
1006502-204 = "[s]「如果是這種事情我很樂意！」"
1006502-205 = "呵呵，謝謝您。"
1006502-207 = "那麼，請容我開始下一場簡報。"
1006502-209 = "（之後和佳穗熱烈討論了活動的內容）"

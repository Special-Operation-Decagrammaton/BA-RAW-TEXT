[translation]
103060-1 = "第6話;生命守護者主艦（１）"
103060-6 = "……"
103060-7 = "耶嘿～這裡就是艦橋啊。#n還挺有模有樣的呢？"
103060-8 = "這裡是……作戰指揮室……？"
103060-16 = "啊！這裡是操縱席對吧？"
103060-17 = "規模比預想中的還大呢……#n沒有10個人以上是無法讓它運作的吧……"
103060-19 = "……除了戰艦內部之外，也要考慮在地面上負責管制的人員呢。"
103060-20 = "也，也對……光是1部戰車就需要4～5個人，#n如果是這種規模的戰艦……"
103060-21 = "而且，這也是充滿未知的歐帕茲……#n能夠進行情報解析、分析或是協助操作的人越多越好。"
103060-26 = "請求「夏萊」的協助吧。"
103060-27 = "技術人員、駭客、擅長戰略、戰術與管理的學生……能請您盡可能募集人員嗎？"
103060-28 = "[s]「知道了，我會召集大家的。」"
103060-29 = "千醬，你有在聽嗎？#n接下來可能會變得非～常忙碌唷？"
103060-33 = "唉……我們也完全沒休息啊。#n能請你也考慮一下這點嗎？"
103060-34 = "話說回來，竟然是「宇宙戰艦」啊……#n那些孩子知道後一定會吵吵鬧鬧的吧……"
103060-41 = "宇！"
103060-42 = "宙～"
103060-43 = "戰！"
103060-44 = "艦！"
103060-46 = "我就說吧……"
103060-47 = "這就是戰艦啊！是古代技術的恩賜嗎？#n……雖然不太清楚，不過只要從現在開始仔細分……解析就可以了吧？"
103060-48 = "宇宙戰艦……古代文明……呵呵，真是值得研究一番呢！"
103060-50 = "我們的研究並沒有白費。雖然大家都把「宇宙戰艦」當成笑話……#n愛麗絲，你手中的電磁砲就是睿智的結晶唷。"
103060-52 = "是的，現在是「宇宙RPG」的時代！這個類型最棒了！"
103060-56 = "等，等等，愛麗絲醬！？"
103060-57 = "你為什麼會在這裡！？"
103060-58 = "那個……聽說發現了宇宙戰艦，所以就跟工程師部的各位一起──"
103060-59 = "不行唷！你不是答應我會乖乖待在千年的嗎？#n明明還不清楚莉央會長的下落──"
103060-60 = "要是被會長發現的話，這次可能真的會有危險的哦？"
103060-61 = "但，但是「宇宙勇者」……"
103060-62 = "別再說什麼「宇宙勇者」之類奇怪的話了，快點回千年去！#n那邊我已經交給乃愛了所以……"
103060-64 = "你這個冷酷計算妖怪！為什麼要說那麼過分的話呀？"
103060-65 = "姐，姐姐……你說的太過分了……"
103060-66 = "綽，綽號又……"
103060-72 = "優香醬，要這麼說的話──我想[ruby=那裡]宇宙戰艦[/ruby]應該會比奇普托斯的任何一個地方都還安全哦？"
103060-73 = "咦，乃愛？"
103060-84 = "因為莉央會長掌控了一切。#n因此，千年自治區就像是在會長手中一樣不是嗎？"
103060-85 = "是，是嗎……"
103060-86 = "沒錯。但是我想就算是會長也無法連宇宙戰艦都掌控吧。#n想要逃離會長的話，那裡就是最安全的地方。"
103060-87 = "所以我才會派出愛麗絲醬和遊戲開發部。#n只要優香醬好好照顧大家，應該就沒問題了吧？"
103060-88 = "不是，突然這麼說會讓我很頭痛的吧！？#n既然要這麼做就事先告訴我一聲！"
103060-89 = "盯上愛麗絲醬的可不只有會長唷？"
103060-90 = "不過有我在的話也許會好一點也說不定……"
103060-94 = "呃，咦？"
103060-100 = "愛，愛麗絲醬跑哪去了！？"
103060-102 = "呵呵。那就拜託你囉，優香醬。#n還有……請別太逞強哦。"
103060-103 = "乃愛……"
103060-104 = "請不用擔心千年。包在我們身上吧。"
103060-109 = "唉……我們又不是來玩的，真是……"
103060-113 = "呼呣……內部的構造是這樣啊。"
103060-114 = "配線與配管的構造比想像中還單純呢！#n即使是歐帕茲，也無法無視重力與物理法則嗎？"
103060-115 = "或許是呢。#n在貝里塔斯分析戰艦操作系統的期間，我們也趕緊解析這艘戰艦的硬體吧。"
103060-116 = "是！那我去那邊看看！"
103060-118 = "知道了。我就負責這裡吧。"
103060-122 = "……神經編碼演算法分析完成。"
103060-123 = "小玉，能連接嗎？"
103060-129 = "是。成功連接中央處理裝置。沒有問題。"
103060-132 = "多虧有副部長的幫忙～！"
103060-133 = "老實說，我以為需要花更多時間。"
103060-139 = "這就是戰艦的主系統……"
103060-140 = "雖然是陌生的語言，不過似乎能夠分析。"
103060-142 = "陽葵，連接成功了唷。#n我現在把連接的程式碼傳過去，能請你確認一下嗎？"
103060-143 = "沒問題，我知道了。#n謝謝你，千醬。"
103060-147 = "陽葵同學，怎麼樣呢？"
103060-148 = "已完成與戰艦主系統的連接。#n接著從這裡開始。雖然還無法控制──"
103060-149 = "原來如此……只要能控制中樞，就能掌握整體了是嗎。"
103060-150 = "……沒錯，正是如此。"
103060-155 = "那麼就讓我來看看吧──使用古代技術創造出來的[ruby=你]歐帕茲[/ruby]的真面目。"
103060-161 = "這是……"
103060-164 = "……這就是這艘戰艦的總覽圖。"
103060-165 = "看起來確實像船一樣呢。#n所以才會被稱為生命守護者「主艦」嗎……？"
103060-166 = "──體積為135m×23m×13m。內部存在15個區域，詳細構造目前無法確認……"
103060-170 = "此外……這艘戰艦上並沒有發現武器或能夠飛行的物品。"
103060-171 = "這不是為了戰鬥而製造的，是嗎……？#n不是「戰艦」而是其他的……？"
103060-172 = "……現在就下定論還太早了。稍微再解析一會吧。"
103060-178 = "呼呣……"
103060-179 = "……"
103060-181 = "……"
103060-185 = "現在顯現於奇普托斯的那個，是我的認知領域中不存在的敵人……"
103060-186 = "祂的真面目，是連「無名之神」和「被遺忘的神祇們」都不知道的無法理解的存在。"
103060-187 = "但是，有一件事能夠確定──#n那個東西，複製了原先為我們所有的「阿特拉哈西斯的方舟」的能力。"
103060-188 = "而且……王女啊，難道你不清楚嗎──"
103060-189 = "你目前所處的「歐帕茲」……#n是在遙遠的過去，我們的敵人為了對抗方舟而創造的「對方舟用決戰兵器」。"
103060-190 = "所幸，它至今為止從未被使用過……"
103060-191 = "王女啊……你現在──"
103060-195 = "正搭乘著自己的威脅，也就是「天敵」啊。"
103060-196 = "請盡快離開這裡。"
103060-197 = "我理解你拒絕了我，以及否定了我的存在。"
103060-198 = "但是……我是為了將你導向「原本的存在理由」而存在。"
103060-199 = "並不期望你的死亡。"
103060-200 = "請趕快……離開[ruby=Utnapishtim]生命守護者[/ruby]。"
103060-201 = "這個兵器，將會在啟動的瞬間……向「無名諸神的王女」──向你露出獠牙吧。"
103060-203 = "將會試圖破壞你吧。#n所以，請趕快逃。"
103060-204 = "這並不是警告── "
103060-208 = "──而是，我的願望。"
103060-210 = "下一話;生命守護者主艦（２）"

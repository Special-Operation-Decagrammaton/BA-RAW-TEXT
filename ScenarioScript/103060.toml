[translation]
103060-1 = "Episode 6; Utnapishtim's Ship 1"
103060-6 = "..."
103060-7 = "Hmm, this must be the battleship's bridge. It actually looks super legit!"
103060-8 = "Yes. This looks to be the operations room for the ship..."
103060-16 = "I might not know much about aircrafts like this, but this has got to be the cockpit."
103060-17 = "The control room is quite large. It looks like it requires at least ten people to operate."
103060-19 = "And that's just from the inside of the battleship. Consider all the people who have to handle air traffic control from the ground."
103060-20 = "You're right... It takes four or five people to operate one tank...so for a battleship of this size..."
103060-21 = "And this is an artifact with technology we don't understand. The more people to help with interpreting, analyzing, and manipulating information, the better."
103060-26 = "We'll need to gather as many students as we can."
103060-27 = "Students skilled in strategic tactics and management, technologists, and hackers... Anyone with the skill set to help."
103060-28 = "[s] \"I'll summon everyone I can.\""
103060-29 = "Chi, did you hear? It's gonna get really busy."
103060-33 = "*sigh* ...You're relentless. None of us have had a break for days, Himari."
103060-34 = "To make matters worse... They're going to be incorrigible once they find out about the intergalactic battleship."
103060-41 = "Inter!"
103060-42 = "Galactic!"
103060-43 = "Battle!"
103060-44 = "Ship!"
103060-46 = "They're too excited..."
103060-47 = "Is this really a battleship created from ancient technology? I guess that's up to us to figure out now!"
103060-48 = "The intergalactic battleship of an ancient civilization will be the height of our research and engineering work!"
103060-50 = "Everyone laughed at the idea of a battleship, but our research wasn't in vain. Aris, your railgun is proof of that."
103060-52 = "Yeah! Science fiction is very trendy right now! That genre is hot!"
103060-56 = "W-Wait a second!"
103060-57 = "Aris?! What are you doing here?"
103060-58 = "W-Well... I heard an intergalactic battleship was discovered, so I hoped to come with the Engineering Department..."
103060-59 = "No! I told you to stay at Millennium! We don't even know where President Rio is yet!"
103060-60 = "What will you do if she decides to attack right now? You're vulnerable!"
103060-61 = "B-But, I want... I want to be a space hero!"
103060-62 = "Stop the nonsense and go back to Millennium! Immediately! Noa is guarding the academy in case of emergency."
103060-64 = "You're such a cold, calculating monster! You don't know anything about the dreams of space heroes!"
103060-65 = "H-Hey..."
103060-66 = "That's a new nickname..."
103060-72 = "Yuuka, if her safety is your concern, your current location is probably safer than anywhere else in Kivotos."
103060-73 = "Are you serious? Noa?"
103060-84 = "President Rio's brand is control over everything. The Millennium district lives in the palm of her hand."
103060-85 = "I... I suppose so..."
103060-86 = "She may know every nook and cranny of Millennium, but the president doesn't know about the battleship. It's safer than here."
103060-87 = "That's why I sent Aris and the Game Development Department together. Do you mind looking after her, please?"
103060-88 = "No, absolutely not! It's not safe!"
103060-89 = "It's not just the president after Aris!"
103060-90 = "Ugh... Well, I guess it's safer if she's where I can see her..."
103060-94 = "H-Huh?"
103060-100 = "Aris?! Where did she go?!"
103060-102 = "Heehee. I'll be counting on you, Yuuka. Don't push yourself too hard."
103060-103 = "Noa, I..."
103060-104 = "We'll guard the academy, so smooth out those wrinkles, Yuuka. "
103060-109 = "*sigh* ...We're not here to mess around...seriously..."
103060-113 = "Hmm, the structure here..."
103060-114 = "The plumbing and wiring are simpler than we thought. Well, even an ancient artifact can't defy gravity and the laws of physics, huh?"
103060-115 = "Veritas is now analyzing the battleship's operating system. We'll find out more about its structural integrity."
103060-116 = "Excellent, excellent! Let's break it down piece by piece!"
103060-118 = "Yes! I'll take a look over here."
103060-122 = "...The neural code algorithm analysis is done."
103060-123 = "How's it going, Kotama? Have you gained access?"
103060-129 = "Yes, the connection to the central processing unit was successful. It's working!"
103060-132 = "Wow! This is awesome!"
103060-133 = "And it didn't take long thanks to the vice president's help! I thought we'd have trouble since it's ancient technology and what-not."
103060-139 = "This is the battleship's main operating system..."
103060-140 = "I don't recognize the language, but I can probably figure it out."
103060-142 = "Himari, we're logged into the operating system. I'm sending the algorithms over to you now."
103060-143 = "Excellent work. Thank you, Chi."
103060-147 = "How's it going, Himari?"
103060-148 = "Now we have access to the central nervous system of the battleship's main system. It was essential we analyze this first because..."
103060-149 = "If you understand the structure of the nervous system, you can understand the operational principles of all parts at a glance, right?"
103060-150 = "Correct. You're very quick. "
103060-155 = "Then where do we begin? What do we know so far about this ancient artifact built with unknown technology?"
103060-161 = "...Hm."
103060-164 = "These are its blueprints. "
103060-165 = "The overall structure is as expected of course. It lives up to its name, Utnapishtim's Ship."
103060-166 = "The dimensions are one hundred thirty-five by twenty-three by thirteen meters. The interior is divided into fifteen zones, but we're still figuring out the minute details of its structure."
103060-170 = "Ignoring its appearance, there's not much on this battleship that can be used as a weapon."
103060-171 = "Would that mean it wasn't built for battle, but a different function entirely?"
103060-172 = "As of now, it's too early to tell. We'll continue our analysis."
103060-178 = "Hm..."
103060-179 = "Umm..."
103060-181 = "..."
103060-185 = "The enemy that appeared in Kivotos is beyond my cognitive realm. "
103060-186 = "The enemies invading from outside Kivotos as well...neither the Nameless Gods nor the forgotten gods would know them."
103060-187 = "An incomprehensible enemy... It seems to be copying the same abilities of the Ark of Atrahasis, built by us, the Nameless Gods."
103060-188 = "I wonder if you know, Princess. "
103060-189 = "The artifact you are currently standing on is an imperious anti-ark weapon created by our enemies of the past to defeat us."
103060-190 = "Your friends will never be able to decipher how to use it. "
103060-191 = "Do you understand, Princess?"
103060-195 = "You're currently aboard your most dangerous nemesis."
103060-196 = "...You must run, Princess. Flee as quickly as you can."
103060-197 = "I know you rejected me. I understand you denied my existence."
103060-198 = "But still, I'm your servant, the one meant to lead you to your rightful purpose..."
103060-199 = "Despite your repudiation of my existence, and yours, I still do not wish your death."
103060-200 = "You must not be aboard the Utnapishtim when its engine begins running."
103060-201 = "It will destroy you first, the princess of the Nameless Gods...because that is the very purpose of its existence."
103060-203 = "My princess... You will be utterly eradicated. "
103060-204 = "I am not ordering you. It is not a warning. "
103060-208 = "This is my desperate plea."
103060-210 = "Next Episode; Utnapishtim's Ship 2"

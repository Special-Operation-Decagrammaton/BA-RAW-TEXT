[translation]
103060-1 = "ตอนที่ 6;เรือรบอุตนาพิชทิม 1"
103060-6 = "......"
103060-7 = "หืมม~ นี่คงเป็นสะพานเดินเรือสินะ ดูใช้ได้กว่าที่คิดอีกแฮะ?"
103060-8 = "ค่ะ ดูเหมือนจะเป็นห้องปฏิบัติการสำหรับควบคุมข้อมูลทุกอย่างบนเรือรบเลยนะคะ......"
103060-16 = "คิกคิก...... งั้นนี่ก็คือที่นั่งกัปตันสินะ? ถึงอย่างอื่นจะดูไม่รู้เรื่อง แต่อันนี้เห็นแล้วรู้เลยว่าคืออะไร"
103060-17 = "ขนาดของห้องปฏิบัติการควบคุมค่อนข้างใหญ่เลยนะคะ ดูแล้วน่าจะต้องใช้คนอย่างน้อย 10 คนเลย...."
103060-19 = "...ถ้าภายในเรือรบยังขนาดนี้ เราคงต้องคำนึงถึงคนที่รับผิดชอบการควบคุมทางภาคพื้นดินด้วยนะคะ"
103060-20 = "นะ... นั่นสินะคะ ปกติแค่รถถังคันเดียวก็ใช้คน 4-5 คนแล้ว... ถ้าเป็นเรือรบขนาดนี้ละก็......"
103060-21 = "นอกจากนี้แล้ว นี่ยังเป็นวัตถุหลงยุคที่เราไม่อาจเข้าใจได้ เพราะฉะนั้นยิ่งเรามีคนช่วยสนับสนุนการ#nวิเคราะห์ข้อมูลและบังคับเรือนี้ได้มากเท่าไรก็ยิ่งดีค่ะ"
103060-26 = "เกณฑ์นักเรียนจาก <ชาเล่ต์> มากันเถอะค่ะ "
103060-27 = "แฮ็กเกอร์ วิศวกร และนักเรียนที่มีความชำนาญด้านกลยุทธ์และการจัดการ...... เกณฑ์มาให้มากที่สุด#nเท่าที่จะมากได้ค่ะ"
103060-28 = "[s] \"อืม ครูจะเรียกนักเรียนให้เอง\""
103060-29 = "จี้จัง ฟังอยู่หรือเปล่าคะ? จากนี้เราจะเริ่มยุ่งกันแล้วนะคะ"
103060-33 = "เฮ้อ... พวกเราไม่ได้พักกันมาหลายวันแล้วนะ ฮิมาริ"
103060-34 = "จะว่าไป นั่นเป็นเรือรบอวกาศเลยงั้นเหรอ... ถ้าพวกนั้นรู้คงวุ่นวายน่าดูเลยนะ..."
103060-41 = "เรือ!"
103060-42 = "รบ~"
103060-43 = "อว!"
103060-44 = "กาศ!"
103060-46 = "วุ่นวายกันจริงด้วย......"
103060-47 = "นี่มันเรือรบของจริงเหรอคะ? ผลงานชิ้นเอกที่รังสรรค์จากเทคโนโลยีโบราณงั้นเหรอคะ? ถึงเรายังจะไม่รู้ แต่ก็ค่อยๆ เช็กตั้งแต่ตอนนี้ก็ได้นี่คะ? "
103060-48 = "เรือรบอวกาศนี่แหละอารยธรรมโบราณที่ดีที่สุด มันมีคุณค่าให้ลองศึกษาดูด้วย!"
103060-50 = "การวิจัยของเราไม่ได้เปล่าประโยชน์เลย ถึงทุกคนจะหัวเราะเยาะเรือรบแต่ปืนเรลกันของเธอคือหลักฐาน#nนะ อาริสึ"
103060-52 = "ใช่ค่ะ! นี่มันยุคสมัยของจักรวาลค่ะ! แนวนี้แหละค่ะเลิศที่สุดเลย!"
103060-56 = "ดะ... เดี๋ยวนะ!?"
103060-57 = "อาริสึจัง!? ทำไมถึงมาอยู่ที่นี่ได้ล่ะ?!"
103060-58 = "คะ? อาริสึได้ยินว่าค้นพบเรือรบอวกาศ ก็เลยตามชมรมวิศวกรรมทุกคนมาด้วย......"
103060-59 = "ไม่ได้นะ! บอกให้เป็นเด็กดีอยู่ในมิลเลเนียมไม่ใช่เหรอ! เรายังไม่รู้นะว่าประธานริโอะอยู่ไหน! "
103060-60 = "ถ้ามาอยู่ที่นี่แล้วโดนประธานรังแกขึ้นมา จะทำยังไงล่ะ!"
103060-61 = "ตะ... แต่อาริสึเป็นผู้กล้าแห่งอวกาศ......"
103060-62 = "หยุดพูดอะไรแปลกๆ แล้วกลับมิลเลเนียมไปได้แล้ว! ตอนนี้โนอากำลังคุ้มกันโรงเรียนเพื่อเตรียมตัวใน#nกรณีฉุกเฉินอยู่ด้วย"
103060-64 = "บ่นอะไรเนี่ย ปีศาจแห่งการคำนวณ! เธอรู้จักแพชชั่นของผู้กล้าแห่งอวกาศด้วยเหรอ?"
103060-65 = "พะ... พี่......"
103060-66 = "สงสัยจะอัปเกรดฉายาอีกแล้วสินะ... "
103060-72 = "ยูกะจัง ถ้าเป็นเรื่องนั้นละก็ สถานที่ตรงนั้นสำคัญกว่าที่ไหนในคิโวทอสเลยนะคะ"
103060-73 = "หืม? โนอาเหรอ?"
103060-84 = "ก็ประธานริโอะต้องการควบคุมทุกอย่างนี่คะ สำหรับประธานแล้ว เขตปกครองตนเองมิลเลเนียมก็ไม่#nต่างอะไรกับลูกไก่ในกำมือหรอกค่ะ"
103060-85 = "งั้นเหรอ...?"
103060-86 = "ค่ะ แต่ถ้าเป็นที่นั่น... ต่อให้เป็นประธานก็คงไม่รู้จัก ถ้างั้นมันน่าจะปลอดภัยกว่านะคะ"
103060-87 = "เพราะแบบนั้นฉันก็เลยส่งอาริสึจังกับชมรมพัฒนาเกมไปด้วยกัน และถ้ายูกะจังช่วยดูแลอยู่ทางนั้นก็ไม่#nน่ามีปัญหานี่คะ?"
103060-88 = "เดี๋ยวๆ เดี๋ยวสิ แต่ฉันมีปัญหานะ!"
103060-89 = "นอกจากประธานแล้ว คนที่หวังจะเล่นงานอาริสึจังก็มีอยู่อีกตั้งเยอะนะ!"
103060-90 = "ถึงฉันจะพอช่วยได้บ้างก็เถอะ..."
103060-94 = "เอ๊ะ เอ๋...?"
103060-100 = "อาริสึจัง?!  จะ... จะไปไหนน่ะ?! "
103060-102 = "ฮุฮุ งั้นก็ฝากด้วยนะคะ ยูกะจัง อย่าหักโหมให้มากเกินนะคะ"
103060-103 = "โนอา..."
103060-104 = "ส่วนโรงเรียน ทางฉันกำลังคุ้มกันให้อยู่ ไม่ต้องเป็นห่วงหรอกค่ะ "
103060-109 = "เฮ้อ... ฉันไม่ได้มาเล่นสนุกสักหน่อย... เชื่อเขาเลย..."
103060-113 = "ฮืม... เป็นโครงสร้างแบบนี้สินะ... "
103060-114 = "การเดินท่อและสายไฟไม่ซับซ้อนอย่างที่คิดนะคะ ก็นะ ถึงจะได้ชื่อว่าเป็นวัตถุหลงยุค แต่ก็คงไม่#nสามารถปฏิเสธแรงโน้มถ่วงและกฎทางฟิสิกส์ได้ ว่าไหมคะ?  "
103060-115 = "ทางเวอริทัสกำลังวิเคราะห์ระบบปฏิบัติการของเรือรบอยู่ พวกเราเองก็มาหาข้อมูลของเรือรบนี้กันเถอะ"
103060-116 = "ได้เลย! ถ้างั้นฉันจะงัดนู่นงัดนี่ดูค่ะ!"
103060-118 = "อื้ม ถ้างั้นฉันจะดูตรงนี้เอง"
103060-122 = "วิเคราะห์อัลกอริทึมสำเร็จ..."
103060-123 = "ลองเชื่อมต่อดูเลยไหม โคทามะ?"
103060-129 = "ค่ะ ฉันเชื่อมกับ CPU สำเร็จแล้วค่ะ โล่งอกไปทีนะคะ"
103060-132 = "ว้าว~"
103060-133 = "พอรองหัวหน้ามาช่วย งานก็เสร็จเร็วเหมือนติดจรวดเลย! นึกว่าจะต้องใช้เวลาสักพักหนึ่งแล้วซะอีก"
103060-139 = "นี่คือระบบหลักของเรือรบนี้......"
103060-140 = "อื้ม...... ถึงจะเป็นภาษาที่ไม่คุ้นเคย แต่ก็น่าจะวิเคราะห์ได้ตามนั้นเลย"
103060-142 = "ฮิมาริ ฉันเชื่อมต่อสำเร็จแล้ว ต่อไปฉันจะส่งอัลกอริทึมสำหรับเชื่อมต่อให้ ฝากตรวจสอบด้วยนะ"
103060-143 = "ค่ะ ขอบคุณนะคะ จี้จัง"
103060-147 = "เป็นยังไงบ้างคะคุณฮิมาริ?"
103060-148 = "ตอนนี้ฉันเชื่อมต่อกับส่วนที่เป็นเหมือนระบบประสาทส่วนกลางของเรือรบได้แล้วค่ะ เราต้องวิเคราะห์#nจากที่นี่เป็นอันดับแรก นั่นก็เพราะว่า..."
103060-149 = "ถ้าเราเข้าใจโครงสร้างของระบบประสาท เราก็จะเข้าใจการทำงานของเครื่องยนต์ทั้งหมดได้อย่างรวด#nเร็วค่ะ"
103060-150 = "...... ค่ะ หัวไวดีนะคะ "
103060-155 = "งั้นมาดูกันเลยไหมคะ? ว่าที่จริงแล้ววัตถุหลงยุคที่สร้างจากเทคโนโลยีโบราณมันเป็นยังไงกันแน่......"
103060-161 = "ฮืม..."
103060-164 = "...... ภาพรวมเป็นแบบนี้สินะคะ "
103060-165 = "มันคล้ายกับเรือจริงๆ ด้วยค่ะ เพราะแบบนี้ก็เลยเรียกว่า <เรือ> อุตนาพิชทิมสินะคะ?"
103060-166 = "มีขนาดทั้งสิ้น 135m x 23m x 13m พื้นที่ภายในถูกแบ่งเป็น 15 ส่วน แต่โครงสร้างโดยละเอียดยัง#nไม่สามารถรู้ได้...... "
103060-170 = "...ถ้าไม่นับเรื่องรูปร่างแล้ว เรือรบนี่ไม่มีอะไรที่พอจะเป็นอาวุธได้เลยนะคะ?"
103060-171 = "หรือว่ามันจะไม่ได้ถูกออกแบบมาเพื่อต่อสู้คะ...? หรือมันเป็นอย่างอื่นที่ไม่ใช่ <เรือรบ> ตั้งแต่แรก...?"
103060-172 = "...... เรายังด่วนสรุปไม่ได้หรอกค่ะ คงต้องดูต่ออีกหน่อยค่ะ"
103060-178 = "ฮืม..."
103060-179 = "อืม..."
103060-181 = "......"
103060-185 = "ศัตรูที่ปรากฏตัวในคิโวทอสตอนนี้ไม่ได้อยู่ในขอบเขตที่ฉันสามารถเข้าใจได้ค่ะ "
103060-186 = "ด้วยปัญญาของฉัน ฉันไม่สามารถรู้ตัวตนของศัตรูที่มาจากภายนอกคิโวทอสได้ รวมถึง <ทวยเทพไร้นาม> และ <พระเจ้าที่ถูกลืมเลือนด้วย> ค่ะ"
103060-187 = "แต่สิ่งที่ฉันบอกได้คือ ศัตรูนี้น่าจะกำลังคัดลอกความสามารถของ <เรืออะทราฮาซิส> ที่แต่เดิมเป็น#nของพวกฉันค่ะ"
103060-188 = "...... แต่ท่านธิดารู้อยู่หรือเปล่าคะ? "
103060-189 = "ว่าตอนนี้ <วัตถุหลงยุค> ที่คุณยืนอยู่ คือ <อาวุธชี้ขาด> ที่ศัตรูของพวกเราในอดีตสร้างไว้เพื่อต่อกร#nกับพวกเราค่ะ"
103060-190 = "ถึงฉันจะไม่อาจรู้ถึงวิธีใช้งานมันได้ก็ตาม..."
103060-191 = "ใช่แล้วค่ะ ท่านธิดา ท่าน..."
103060-195 = "กำลังอยู่บนศัตรูที่อันตรายกับตัวเองมากที่สุดค่ะ"
103060-196 = "...... ออกจากที่นี่ไปเถอะค่ะ ท่านธิดา"
103060-197 = "ฉันรู้ว่าท่านปฏิเสธฉัน และเข้าใจดีว่าท่านไม่ยอมรับการดำรงอยู่ของฉันค่ะ"
103060-198 = "แต่ฉันก็เป็นหญิงรับใช้ของท่าน... หญิงรับใช้ที่นำท่านไปสู่การดำรงอยู่ที่คู่ควร"
103060-199 = "ฉันไม่ปรารถนาให้ท่านตายค่ะ"
103060-200 = "...... อยู่ให้ห่างจากเรือรบอุตนาพิชทิมนี่เถอะค่ะ"
103060-201 = "เมื่อเดินเครื่องเรือนี้... <ธิดาแห่งทวยเทพไร้นาม> อย่างท่านจะถูกทำลายเป็นอย่างแรก... เพราะท่านคือเป้าหมายและสาเหตุของการมีอยู่ของเรือลำนี้ค่ะ"
103060-203 = "มันจะ... ทำลายท่านค่ะ "
103060-204 = "นี่ไม่ใช่คำเตือน... แต่ว่ามันเป็น"
103060-208 = "...... คำขอร้องค่ะ"
103060-210 = "ตอนต่อไป;เรือรบอุตนาพิชทิม 2"

[translation]
1009603-1 = "ตรวจเช็กสไลเดอร์สระน้ำ"
1009603-2 = "(คุณครูได้รับการติดต่อจากคันนะ จึงตรงไปที่สไลเดอร์สระน้ำที่อยู่กลางแจ้ง)"
1009603-4 = "พลังงานไฟฟ้า ปริมาณน้ำ การเดินเครื่อง เช็กทุกอย่างเรียบร้อย..."
1009603-5 = "[s] (คันนะดูยุ่งๆ แฮะ รอสักหน่อยดีกว่า...)"
1009603-6 = "สระว่ายน้ำข้างล่าง การทำงานของเครื่องชั่ง ทุกอย่างเรียบร้อยดี"
1009603-10 = "คุณครูคะ ถ้าขึ้นมาแล้วก็บอกนะคะ"
1009603-11 = "[s1] \"?!\"\n[s2] \"ดะ... โดนจับได้เหรอ...\""
1009603-14 = "ฉันรู้ค่ะว่าคุณครูกำลังมองฉันอยู่"
1009603-15 = "ฉันรู้สึกได้ว่าถูกจ้องอยู่น่ะค่ะ"
1009603-16 = "มะ... ไม่ต้องขอโทษขอโพยหรอกค่ะ ฉันไม่ได้รู้สึกไม่ดีอะไร..."
1009603-17 = "เอาเถอะค่ะ มาเข้าประเด็นของเรากันเถอะ"
1009603-18 = "'เมก้าสไลเดอร์' เครื่องนี้จะให้บริการหลังจากเปิดสวนน้ำไปสักพักแล้วค่ะ"
1009603-19 = "เครื่องเล่นนี้เป็นเครื่องเล่นหวาดเสียวที่ลูกค้าให้ความสนใจกันมาก เลยจะยังไม่เปิดให้บริการในทันที เพราะจะได้ไม่มีคนมารวมตัวกันเป็นจำนวนมากที่เครื่องเล่นเครื่องเดียวค่ะ"
1009603-20 = "ฉันตรวจสอบอุปกรณ์ดูหมดแล้ว และเครื่องยนต์ก็ทำงานตามปกติค่ะ"
1009603-21 = "[s] \"อืม... งั้นมีงานอะไรที่ครูต้องทำด้วยเหรอ?\""
1009603-22 = "มีสิคะ"
1009603-23 = "ยังเหลืออีก 1 ขั้นตอนที่ต้องตรวจสอบก่อนจะเปิดให้บริการจริงอยู่น่ะค่ะ"
1009603-24 = "และนั่นก็คือการทดสอบจริง ไลฟ์การ์ดต้องลองเล่นเครื่องนี้ด้วยตัวเองเพื่อตรวจสอบว่าสไลเดอร์#nทำงานปกติหรือเปล่า"
1009603-25 = "ฉันก็เลยติดต่อคุณครูไปเพื่อให้มาลองเล่นจริงค่ะ"
1009603-26 = "[s3] \"ให้เล่นจริง...\"\n[s4] \"งั้นคันนะก็เล่นด้วยกันหรือเปล่า?\""
1009603-29 = "ค่ะ ใช่แล้วค่ะ"
1009603-30 = "ปกติแล้วสไลเดอร์อันนี้ต้องเล่นทีละหลายๆ คนค่ะ"
1009603-31 = "ถ้าฉันเล่นคนเดียว น้ำหนักก็จะต่ำกว่าที่ควร แบบนั้นมันอาจจะเกิดอันตรายได้ค่ะ..."
1009603-32 = "ถึงจะน่าละอาย แต่ฉันขอความช่วยเหลือจากคุณครูอีกแรงได้มั้ยคะ?"
1009603-33 = "[s5] \"ถ้าเป็นเรื่องนั้นครูก็ต้องช่วยอยู่แล้ว\"\n[s6] \"ดีซะอีกที่ได้เล่นแบบไม่ต้องต่อแถว\""
1009603-36 = "ขอบคุณค่ะ ถ้างั้นก็มาเตรียมตัวกันค่ะ"
1009603-41 = "[ns7] \"แต่ครูสงสัยอะไรอย่างหนึ่ง\"\n[ns8] \"ครูขอถามอะไรหน่อยได้มั้ย?\""
1009603-44 = "ค่ะ ถ้าเป็นสิ่งที่ฉันตอบได้ ฉันก็ยินดีตอบให้ค่ะ"
1009603-45 = "คะ? ฉันถนัดเล่นเครื่องเล่นแบบนี้หรือเปล่าน่ะเหรอคะ?"
1009603-46 = "ฉันไม่ค่อยเล่นเครื่องเล่นเพื่อความสนุกสนานเท่าไร แต่ก็ไม่ได้กลัวจนไม่กล้าเล่นค่ะ"
1009603-47 = "ถ้าเป็นเครื่องเล่นทั่วไปฉันก็ไม่ค่อยตกใจด้วยค่ะ"
1009603-48 = "[s] \"แต่ว่ากันว่าเมก้าสไลเดอร์นี่น่ากลัวมากเลยนะ\""
1009603-49 = "ฮุฮุ ถึงยังไงก็คงน่ากลัวไม่เท่าผู้ก่อการร้ายที่ถือปืนบาซูก้าหรอกค่ะ"
1009603-50 = "ฉันเป็นหัวหน้ากรมฯ ที่เผชิญกับสถานการณ์เสี่ยงมาหลายครั้งแล้ว"
1009603-51 = "ถ้าเปรียบเทียบกับสิ่งที่เจอตอนนั้นแล้ว เครื่องเล่นที่ได้รับการออกแบบมาอย่างปลอดภัยก็เหมือนของ#nเล่นเด็กดีๆ นี่เองค่ะ"
1009603-52 = "[s9] \"ยอดเยี่ยมไปเลยนะคันนะ...\"\n[s10] \"แค่ยังไม่ขึ้นครูก็กลัวแล้ว...\""
1009603-55 = "ถ้ากลัวก็ร้องตะโกนออกมาได้ค่ะ"
1009603-56 = "ยังไงฉันก็ไม่เห็นหน้าคุณครูอยู่แล้ว ไม่ต้องอายหรอกค่ะถ้าจะตะโกนออกมา"
1009603-57 = "ถ้างั้นเชิญนั่งตรงนี้ค่ะ จะเริ่มเล่นจริงเพื่อทดสอบเครื่องแล้วนะคะ"
1009603-59 = "(คุณครูเข้าไปนั่งในห่วงยางเดียวกันกับคันนะ)"
1009603-61 = "เอาละ ถ้างั้นก็ออกตัวได้ จับที่จับไว้ดีๆ นะคะ"
1009603-62 = "3... 2... 1..."
1009603-63 = "ไปเลย!"
1009603-67 = "[ns] (เหวออ! หวาดเสียวจังเลย!)"
1009603-68 = "ฮะ... เฮือก..."
1009603-69 = "ว้ากกกกกกกกกก!"
1009603-70 = "[s] \"?!\""
1009603-75 = "..."
1009603-76 = "[s] \"...\""
1009603-77 = "แค่กๆ..."
1009603-78 = "[s] \"คันนะ... กลัวสินะ\""
1009603-79 = "พะ... พูดอะไรของคุณครูคะ ไม่เห็นเข้าใจเลย"
1009603-80 = "ฉันขอบอกอีกครั้งนะคะ หัวหน้ากรมฯ อย่างฉันไม่มีทางกลัวเครื่องเล่นแบบนี้หรอกค่ะ"
1009603-81 = "[s] \"งั้นเสียงกรีดร้องบนสไลเดอร์เมื่อกี้...\""
1009603-82 = "ฉะ... ฉันไม่เห็นได้ยินอะไรเลยค่ะ"
1009603-83 = "คุณครูน่าจะรู้สึกไปเองเพราะประหม่าและกลัวหรือเปล่าคะ ไหนจะมีเสียงน้ำอีก"
1009603-84 = "เรื่องแบบนี้ปกติออกค่ะ"
1009603-85 = "[s] \"...\""
1009603-87 = "[ns] \"งั้นไปเล่นกันอีกรอบมั้ย?\""
1009603-89 = "อ่า ไม่ดีกว่าค่ะ ฉันไม่เป็นไร ทดสอบแค่รอบเดียวก็พอค่ะ"
1009603-90 = "ฉันจะไม่เล่นแล้วค่ะ"
1009603-91 = "ไม่เด็ดขาดเลย!"

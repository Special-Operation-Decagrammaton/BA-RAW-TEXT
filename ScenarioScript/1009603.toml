[translation]
1009603-1 = "Water Slide Maintenance"
1009603-2 = "Kanna messaged me a request to join her at the outdoor water slide."
1009603-4 = "Power...check. Water flow...check. Internal systems...check. Looking good so far..."
1009603-5 = "[s] \"(She looks busy. Maybe I should wait a bit...)\""
1009603-6 = "Lower pool...check. Weight scale...check. All clear."
1009603-10 = "Sensei, if you're there, go ahead and say something."
1009603-11 = "[s1] \"Hmm?!\"\n[s2] \"D-Did she spot me?\""
1009603-14 = "Of course, I knew you were watching me."
1009603-15 = "I could feel your eyes on me."
1009603-16 = "N-No, there's no need to apologize. I wasn't upset or anything..."
1009603-17 = "Anyway, let's get down to business."
1009603-18 = "This \"Mega Slide\" will open for business a little while after the park does."
1009603-19 = "It's a big thrill ride. The crowds love it. So it's laid out such that people don't swarm it all at once."
1009603-20 = "I've finished all the checks, and everything's functioning normally."
1009603-21 = "[s] \"Okay... Is there anything I can help with?\""
1009603-22 = "Of course."
1009603-23 = "There is one final step before the slide can open: a trial run."
1009603-24 = "The lifeguard has to go down the slide and make sure it runs smoothly all the way through."
1009603-25 = "That's why I reached out, to ask if you'd be willing to participate."
1009603-26 = "[s3] \"By 'participate,' do you mean...?\"\n[s4] \"You want to ride down together?\""
1009603-29 = "A lot more confident."
1009603-30 = "This slide is designed for multiple riders at once."
1009603-31 = "Riding groups have to be within a certain weight range, otherwise there'd be safety risks."
1009603-32 = "So, I was...hoping you could join me, yes."
1009603-33 = "[s5] \"If that's the case, I'm more than happy to help.\"\n[s6] \"Heh, and we won't even have to wait in line.\""
1009603-36 = "Let's get ready. And thank you."
1009603-41 = "[ns7] \"I do have one question.\"\n[ns8] \"Can I ask you...?\""
1009603-44 = "Go ahead. I'll answer whatever I can."
1009603-45 = "Huh? Do I LIKE amusement park rides?"
1009603-46 = "...I don't usually seek out that kind of thrill, but I don't avoid it either."
1009603-47 = "I'm not easily startled or frightened by most things."
1009603-48 = "[s] \"But this Mega Slide, isn't it known for being terrifying?\""
1009603-49 = "By slide standards, I'm sure it's quite scary, but no more so than a terrorist with a bazooka."
1009603-50 = "I'm the Director of the Public Peace Bureau. That's put me in REAL danger, plenty of times."
1009603-51 = "Compared to that, a ride with built-in safety measures doesn't even feel like entertainment to me."
1009603-52 = "[s9] \"That's impressive, Kanna...\"\n[s10] \"I'm not sure I can say the same, myself...\""
1009603-55 = "Well, if you do get scared, feel free to scream."
1009603-56 = "Don't worry, I won't see your face. The ride's pitch dark."
1009603-57 = "All right then, please have a seat over here. We'll start the trial run now."
1009603-59 = "Kanna and I sat across from each other in the tube."
1009603-61 = "All set to go. Please hold onto the handles."
1009603-62 = "3, 2, 1."
1009603-63 = "We're off!"
1009603-67 = "[ns] \"(Wow! I knew this was going to be exciting, but wow!)\""
1009603-68 = "Eek... Eeek..."
1009603-69 = "Eeeyaaahhh!"
1009603-70 = "[s] \"Huh?!\""
1009603-75 = "..."
1009603-76 = "[s] \"...\""
1009603-77 = "*cough*"
1009603-78 = "[s] \"Kanna...you weren't scared, were you?\""
1009603-79 = "I-I don't know what you're talking about."
1009603-80 = "Let me remind you again, as the Director of the Public Peace Bureau, a ride like this is nothing to me."
1009603-81 = "[s] \"So, that scream I heard on the slide...what was that about...?\""
1009603-82 = "I-I didn't hear anything."
1009603-83 = "It might have been the sound of the rushing water. Or maybe, in your stress and fear, you misheard something."
1009603-84 = "That's been known to happen."
1009603-85 = "[s] \"...\""
1009603-87 = "[ns] \"Shall we go again, then?\""
1009603-89 = "N-No, thank you. One test run is more than enough."
1009603-90 = "In fact, I'll never do that again."
1009603-91 = "Never!"

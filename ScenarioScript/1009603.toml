[translation]
1009603-1 = "滑水道檢查"
1009603-2 = "（接到環奈的聯絡後，前往了室外的滑水道）"
1009603-4 = "……確認電源、出水量、內部正常運作。"
1009603-5 = "[s] （看起來好像在忙，稍微等一下吧……）"
1009603-6 = "確認下層泳池、確認重量計正常運作，全部確認完畢。"
1009603-10 = "老師，來了的話請告訴我一聲。"
1009603-11 = "[s1]「！？」\n[s2]「被，被發現了嗎……」"
1009603-14 = "當然，而且我也知道老師剛才就在盯著我這邊看。"
1009603-15 = "因為我有感覺到視線。"
1009603-16 = "啊，沒關係的，老師不需要道歉。#n我並沒有覺得不開心……"
1009603-17 = "總之先進入正題吧。"
1009603-18 = "這個「巨無霸滑水道」在樂園開門後一段時間才會開始運作。"
1009603-19 = "畢竟這種刺激的滑水道相對受歡迎，會這麼做也是為了防止大量遊客同時湧入。"
1009603-20 = "現在設備已經檢查完畢，可以正常運作。"
1009603-21 = "[s]「唔嗯……這樣我還能幫上什麼忙嗎？」"
1009603-22 = "那當然。"
1009603-23 = "在正式開始運作前，還有一個步驟必須完成。"
1009603-24 = "那就是試運行。#n救生員必須親自確認滑水道的運作是否正常。"
1009603-25 = "所以我才會聯絡老師，請您跟我一起滑行。"
1009603-26 = "[s3]「一起滑行……」\n[s4]「所以環奈也要一起嗎？」"
1009603-29 = "是的，沒錯。"
1009603-30 = "這個滑水道的設計，是能讓許多人同時滑行。"
1009603-31 = "如果我獨自檢查，可能會因為無法符合安全重量而引發事故……"
1009603-32 = "因此才會厚著臉皮拜託老師。"
1009603-33 = "[s5]「這種事我非常樂意協助。」\n[s6]「居然不用排隊就能先玩，我當然歡迎。」"
1009603-36 = "謝謝您，那我這就開始準備。"
1009603-41 = "[ns7]「有件事我很好奇。」\n[ns8]「可以問你一個問題嗎？」"
1009603-44 = "當然，我會盡可能地回答。"
1009603-45 = "嗯？問我是不是很敢玩遊樂設施？"
1009603-46 = "……雖然不會因為喜好而玩，卻也不會因為害怕而逃避。"
1009603-47 = "而且我這個人不容易受到驚嚇。"
1009603-48 = "[s]「但是這個『巨無霸滑水道』是出名的可怕耶？」"
1009603-49 = "哼哼，會比手持巴祖卡火箭筒的恐怖分子可怕嗎？"
1009603-50 = "身為公安局長，我曾經多次身陷危機。"
1009603-51 = "和當時相比，設計得這麼安全的遊樂設施根本不算什麼。"
1009603-52 = "[s9]「環奈真厲害……」\n[s10]「我已經開始緊張了……」"
1009603-55 = "如果害怕的話不妨直接叫出來沒關係。"
1009603-56 = "反正在滑水道裡也看不清楚彼此的臉，不會太難為情的。"
1009603-57 = "請老師坐在這裡吧。試運行即將開始。"
1009603-59 = "（和環奈面對面坐進了泳圈）"
1009603-61 = "好，那就出發囉。請抓緊把手。"
1009603-62 = "3，2，1。"
1009603-63 = "出發！"
1009603-67 = "[ns] （我的天！果然很刺激！）"
1009603-68 = "噫……噫噫……"
1009603-69 = "噫呀啊啊啊啊啊啊啊！"
1009603-70 = "[s]「！？」"
1009603-75 = "……"
1009603-76 = "[s]「……」"
1009603-77 = "……咳哼。"
1009603-78 = "[s]「環奈……原來你也會怕的嘛。」"
1009603-79 = "我，我不明白老師的意思。"
1009603-80 = "再跟您強調一次，對身為公安局長的我來說，這種遊樂設施根本不算什麼。"
1009603-81 = "[s]「那剛才滑水道裡的尖叫聲是……」"
1009603-82 = "我，我剛才什麼都沒聽到啊？"
1009603-83 = "那恐怕是因為水聲，或者是緊張和恐懼所引發的錯覺吧。"
1009603-84 = "這是常有的事。"
1009603-85 = "[s]「……」"
1009603-87 = "[ns]「那要不要再坐一次？」"
1009603-89 = "不，不必了，沒關係。#n試運行只要一次就夠了。"
1009603-90 = "我再也不會搭這個設施了。"
1009603-91 = "絕對不會！"

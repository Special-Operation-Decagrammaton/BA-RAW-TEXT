1009603-15 = "3;칸나 수영복;12;시선이 느껴졌으니까요."
1009603-16 = "3;칸나 수영복;13;아, 아뇨, 사과하실 필요는 없습니다. 기분이 나빴던 것은 아니기에…….\n#3;em;[///]"
1009603-17 = "3;칸나 수영복;12;어쨌든, 본론으로 들어가지요.\n#3;m3"
1009603-18 = "3;칸나 수영복;01;이 '메가 슬라이드'는 파크 개장 이후 시간이 지난 후에야 운행이 시작됩니다."
1009603-19 = "3;칸나 수영복;02;인기 있는 스릴계 슬라이드이기 때문에, 많은 사람이 한꺼번에 몰리는 것을 방지하기 위해서지요."
1009603-20 = "3;칸나 수영복;03;지금 기기 점검은 모두 끝났고, 정상 작동을 확인한 상태입니다."
1009603-21 = "[s] \"으응……그런데 내가 할 일이 있을까?\""
1009603-22 = "3;칸나 수영복;12;물론입니다.\n#3;em;[반응]"
1009603-23 = "3;칸나 수영복;02;아직 정식 운행 시작까지는 한 단계가 더 남았으니까요."
1009603-24 = "3;칸나 수영복;12;바로 시험 운행입니다. 슬라이드가 정상적으로 작동하는지, 라이프가드가 직접 탑승해 봐야 합니다."
1009603-25 = "3;칸나 수영복;99;그래서, 선생님께 동승을 요청하고자 연락드린 것입니다."

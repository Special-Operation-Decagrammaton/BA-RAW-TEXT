[translation]
1300003-1 = "คุณคือนายท่านของฉันใช่มั้ยคะ? 2"
1300003-2 = "สำนักงานชาเล่ต์"
1300003-4 = "(อาคาเนะมาที่ชาเล่ต์พร้อมกับระเบิด)"
1300003-5 = "ดีใจที่ได้เจอนะคะ"
1300003-6 = "ฉันคืออาคาเนะจาก C&C"
1300003-7 = "ฉันมาที่นี่เพื่อรับใช้คุณครู... ไม่สิ... เพื่อรับใช้นายท่านค่ะ"
1300003-8 = "ได้ยินมาว่าภารกิจครั้งนี้คือการรับคำสั่งจากชาเล่ต์ค่ะ"
1300003-9 = "นายท่านอาจจะรู้ดีแล้วว่า C&C คือชมรมที่มีสายลับที่ยอดเยี่ยมที่สุดในมิลเลเนียม...#nไม่สิ... ในคิโวทอสเลยค่ะ"
1300003-10 = "เราให้บริการ 'ทำความสะอาด' ที่หลากหลาย..."
1300003-11 = "เช่น ทำให้ประธานบริษัทนิสัยไม่ดียอมจ่ายเงินเดือน โบนัส และยอมให้ลูกจ้างลากลับบ้านได้#nด้วยการ 'สนทนาอย่างราบรื่น'"
1300003-12 = "บางทีเราทำงานที่คล้ายกับชาเล่ต์ด้วยค่ะ และการที่สุดยอดเอเจ้นท์อย่างฉันถูกเรียกมาที่นี่..."
1300003-13 = "ก็เพราะนายท่านต้องการให้ฉัน 'รับใช้' นักเรียนทุกคนในคิโวทอสใช่มั้ยคะ?"
1300003-14 = "เลือกถูกคนแล้วล่ะค่ะ ขอแนะนำตัวอย่างเป็นทางการอีกครั้งนะคะ#nฉันคือมุโรคาสะ อาคาเนะ รหัสซีโร่ทรี"
1300003-15 = "ภารกิจของวันนี้คืออะไรเหรอคะ?"
1300003-16 = "ลอบสังหาร? ทำตามแผน? สืบความลับ? ทำลายล้างองค์กร? หรือเป็นสายลับคะ?"
1300003-17 = "[s1] \"ช่วยกำจัดอันนี้ก่อนแล้วกัน\"\n[s2] \"เรียกมาทำความสะอาดต่างหาก...\""
1300003-18 = "อ๋อ งานกำจัดนี่เอง หรือจะเรียกว่าทำลายล้างก็ได้นะคะ ฉันทำได้ทุกอย่างเลยค่ะ#nอยากให้ฉันไปกำจัดอะไรคะ...?"
1300003-19 = "อ๋อ งานกำจัดนี่เอง หรือจะเรียกว่าทำลายล้างก็ได้นะคะ ฉันทำได้ทุกอย่างเลยค่ะ#nอยากให้ฉันไปกำจัดอะไรคะ...?"
1300003-20 = "......"
1300003-21 = "คะ...?"
1300003-22 = "งานทำความสะอาดที่ว่า...?! คือการทำความสะอาดจริงๆ เหรอคะ?!"
1300003-23 = "ให้ฉันมาปัดกวาดเช็ดถู แล้วทำให้ที่นี่สะอาดขึ้นอย่างนั้นเหรอคะ?!"
1300003-24 = "ไม่อยากจะเชื่อเลย คิดว่าฉันเป็นเมดประเภทไหนเหรอคะ?!"
1300003-25 = "....."
1300003-26 = "อืม..."
1300003-27 = "อย่างนี้นี่เองสินะ เฮ้อ ขอโทษค่ะ บางครั้งฉันก็ลืมตัวน่ะค่ะว่าฉันมีหน้าที่อะไร..."
1300003-28 = "เอาเป็นว่า รับทราบค่ะ"
1300003-29 = "ไว้ใจฉันได้เลย ฉันคือสมาชิกของ C&C และนี่แปลว่าฉันสามารถทำภารกิจทุกอย่างสำเร็จได้#nอย่างสมบูรณ์แบบค่ะ"
1300003-30 = "งั้นพื้นที่ที่ฉันต้องทำความสะอาด... คือสำนักงานของนายท่านเหรอคะ?"
1300003-31 = "ต้องเอาอุปกรณ์ออกมาแล้วล่ะค่ะ"
1300003-32 = "(พรึ่บ)"
1300003-33 = "[s] \"ทำไมถึงเอาระเบิดออกมาล่ะ?\""
1300003-34 = "ก็เป็นอุปกรณ์ที่ทำความสะอาดได้สะอาดหมดจดที่สุดยังไงล่ะคะ"
1300003-35 = "ไม่ต้องเป็นห่วงนะคะนายท่าน ฉันจะทำความสะอาดจนไม่เหลือร่องรอยของความสกปรกเลยค่ะ"
1300003-36 = "ฮุฮุ"
1300003-39 = "ล้อเล่นนะคะ"
1300003-40 = "จริงๆ แล้วต้องบอกว่า... พอนายท่านเรียกให้มารับใช้ ฉันก็แอบใจสั่นอยู่หน่อยๆ ค่ะ"
1300003-41 = "ฉันไม่อยากให้นายท่านเห็นฉันตื่นเต้นเกินไป ก็เลยแกล้งแหย่เล่นเท่านั้น"
1300003-42 = "งานทำความสะอาดและทำอาหารเป็นงานถนัดของฉันเลยค่ะ โดยเฉพาะการทำความสะอาดค่ะ"
1300003-43 = "ฉันจะทำให้นายท่านเห็นเองค่ะว่าการมีเมดที่เชี่ยวชาญอยู่ข้างๆ มันเป็นยังไง"
1300003-44 = "ก่อนอื่น ฉันต้องเคลียร์เพดานที่ฉันระเบิดไว้ก่อน"
1300003-46 = "(อาคาเนะทำความสะอาดอยู่เป็นชั่วโมง)"
1300003-48 = "ฮุฮุ เป็นยังไงบ้างคะ?"
1300003-49 = "ชาเล่ต์กว้างขวางกว่าที่คิดไว้อีกนะคะ แต่เห็นผลงานก็คุ้มค่าเหนื่อยค่ะ"
1300003-50 = "ฉันเริ่มสืบหา... ไม่สิ... เริ่มทำความสะอาดห้องที่คาดว่าเป็นห้องของนายท่านก่อน"
1300003-51 = "ความสะอาดและสุขอนามัยไม่เพียงแต่เป็นทัศนียภาพอันงดงามเท่านั้น..."
1300003-52 = "แต่ยังมีความสำคัญต่อสุขภาพและความสง่างามด้วยค่ะ"
1300003-53 = "ดูสิคะนายท่าน สำนักงานสะอาดเอี่ยมจนคนที่เป็นโรครักความสะอาดมากเกินไปต้องตะลึงเลย#nล่ะค่ะ"
1300003-55 = "[ns] \"ขอบใจนะ\""
1300003-56 = "!?"
1300003-57 = "......"
1300003-58 = "อ่า... ขออภัยด้วยค่ะ"
1300003-59 = "ฉันไม่ได้ยินคำว่าขอบคุณหลังเสร็จงานมานานแล้ว..."
1300003-60 = "ปกติจะได้ยินแค่ \"อ๊าก!\" \"โธ่เอ๊ย พวกเมดอีกแล้ว!\" หรือไม่ก็ \"ซะ... ซวยแล้ว\""
1300003-61 = "คุณครู ไม่สิ... นายท่านเป็นคนที่น่ารับใช้จังเลยนะคะ"
1300003-62 = "ภารกิจของวันนี้เสร็จแล้วค่ะ แต่ถ้าต่อไปต้องการให้ฉันทำอะไรให้อีก... ก็เรียกฉันนะคะ"
1300003-63 = "ฉันจะมารับใช้อย่างสุดฝีมือเลยค่ะ"
1300003-65 = "ฮุฮุ มาคิดดูแล้ว นั่นคือความทรงจำที่สนุกมากเลยนะคะ"
1300003-66 = "[s] \"จะว่าไป... ทำไมตอนนั้นปรากฏตัวพร้อมระเบิดเหรอ?\""
1300003-67 = "อ่า..."
1300003-68 = "ฉันอยากให้ความประทับใจแรกพิเศษจนลืมไม่ลงน่ะค่ะ"
1300003-69 = "ก็มันเป็นการเริ่มต้นของการใช้เวลาร่วมกันของเรานี่คะ ฮุฮุ"
1300003-70 = "ต่อไปก็ฝากเนื้อฝากตัวด้วยนะคะ"

[translation]
1300003-1 = "您就是我的主人嗎？（２）"
1300003-2 = "夏萊．辦公室"
1300003-4 = "（就在朱音伴隨著爆炸造訪夏萊的時候）"
1300003-5 = "初次見面。"
1300003-6 = "我是C&C的朱音。"
1300003-7 = "是為了服務老師……不對，服務主人而來的。"
1300003-8 = "我聽說這次的任務是要由夏萊進行指揮，於是就過來拜訪了。"
1300003-9 = "如您所知，C&C是由千年……不，是奇普托斯最優秀的特務所組成的。"
1300003-10 = "負責「清掃」千年周邊的不良集團，"
1300003-11 = "還有透過「良好的溝通」，讓壓榨學生的黑心企業老闆把積欠的薪水連同獎金交出來後，順便把他送回老家之類的「服務」。"
1300003-12 = "和夏萊做著類似的工作，而既然把最強特務之一的我叫過來……"
1300003-13 = "想必是為了奇普托斯的所有學生所需要的「服務」對吧？"
1300003-14 = "非常正確的判斷。我是代號03，室笠朱音。再次向主人請安。"
1300003-15 = "今天的任務是什麼呢？"
1300003-16 = "是要排除重要人物？地下工作？保護機密？摧毀組織？還是商業間諜？"
1300003-17 = "[s1] 「總之先想辦法處理一下這個殘骸？」\n[s2] 「本來是想請你來打掃的……」"
1300003-18 = "原來如此，是排除工作呀。或者說是摧毀對吧？不管是哪一種都沒問題，請告訴我目標是……"
1300003-19 = "原來如此，是排除工作呀。或者說是摧毀對吧？不管是哪一種都沒問題，請告訴我目標是……"
1300003-20 = "……"
1300003-21 = "哎……？"
1300003-22 = "主人說的打掃……是，是真的打掃嗎！？"
1300003-23 = "掃地、擦地、整理環境，讓整個空間變得漂亮又乾淨的那個打掃嗎！？"
1300003-24 = "真是無法相信……您把我當成女僕還是什麼了嗎？"
1300003-25 = "……"
1300003-26 = "啊……"
1300003-27 = "原，原來如此……呼。非，非常不好意思。我有時候也會對自己的身分感到錯亂……"
1300003-28 = "總之，我了解了。"
1300003-29 = "請您放心，我可是C&C的一員。不管是什麼樣的任務，我都有自信能夠完美地達成。"
1300003-30 = "那麼任務目標，更正，要打掃的地點是……這間主人的辦公室嗎？"
1300003-31 = "看來我需要一些工具才行呢。"
1300003-32 = "（咻）"
1300003-33 = "[s] 「為什麼要拿出炸彈？」"
1300003-34 = "因為這是最棒的，能夠在一瞬間把東西全部清掃乾淨的道具。"
1300003-35 = "請主人不用擔心，就連痕跡都會被清得一乾二淨的。"
1300003-36 = "哼哼。"
1300003-39 = "……開玩笑的。"
1300003-40 = "老實說，被主人找來時，內心就撲通撲通跳個不停了。"
1300003-41 = "再加上被看到了我慌張的樣子感到有點害羞……於是就想做點惡作劇。就請當作我是在隱藏害羞的心情吧。"
1300003-42 = "說到打掃和料理，我可是相當厲害的。尤其是打掃，即使稱作是我的專長也不為過。"
1300003-43 = "就讓您體驗一下有優秀的女僕在身旁是怎麼樣的感覺吧。"
1300003-44 = "那麼就先從被我炸毀的天花板開始修理吧。"
1300003-46 = "（從那之後1個小時都在打掃屋子）"
1300003-48 = "哼哼，您覺得如何呢？"
1300003-49 = "夏萊辦公室比我想像的還要大呢，特別有打掃的價值。"
1300003-50 = "就連推測可能是主人的房間也調查……不是，也打掃了。"
1300003-51 = "要保持整潔跟衛生，可不能只看表面……"
1300003-52 = "健康和品格的維護也是必要的。"
1300003-53 = "請看吧，主人。這就是連有潔癖的人來都會放聲歡呼的、乾淨的辦公室。"
1300003-55 = "[ns] 「謝謝。」"
1300003-56 = "！？"
1300003-57 = "……"
1300003-58 = "啊……失禮了。"
1300003-59 = "「謝謝」這個詞，真是好久沒聽到了。"
1300003-60 = "平時總是聽到「呃啊啊！」、「可，可惡的女僕！」、「我，我不行了！」之類的話……"
1300003-61 = "老師，不，主人果然是值得我伺候的人呢。"
1300003-62 = "今天的任務就到此結束，如果下次還需要為您服務的話……請再通知我吧。"
1300003-63 = "我會誠心誠意地為您服務的。"
1300003-65 = "呵呵，即使是現在回想起來，也真的是愉快的回憶呢。"
1300003-66 = "[s] 「這麼說來那個時候，為什麼要用炸彈登場呢？」"
1300003-67 = "那是因為……"
1300003-68 = "畢竟機會難得，我想要讓老師留下強烈的第一印象。"
1300003-69 = "這也是和老師的緣分。呵呵。"
1300003-70 = "往後也請您多多指教。"

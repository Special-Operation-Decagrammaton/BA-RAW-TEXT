[translation]
1300003-1 = "#Title;당신이 저의 주인님입니까? 2"
1300003-2 = "#place;샬레 집무실"
1300003-3 = "3;아카네;01\n#3;h\n#3;a"
1300003-4 = "#na;(폭발과 함께, 아카네가 샬레에 찾아왔던 그때.)"
1300003-5 = "3;아카네;01;처음 뵙겠습니다.\n#3;em;[반응]"
1300003-6 = "3;아카네;03;C&C 아카네. \n#3;greeting"
1300003-7 = "3;아카네;01;선생님께…… 아니, 주인님께 봉사하러 이곳에 왔습니다.\n#3;em;[반짝]\n#3;greeting"
1300003-8 = "3;아카네;01;이번 임무는 샬레의 지휘를 받으라고 들었거든요."
1300003-9 = "3;아카네;02;아시다시피, C&C는 밀레니엄, 아니 키보토스 최고의 에이전트들로 구성되어 있답니다."
1300003-10 = "3;아카네;03;밀레니엄 주변의 불량서클을 '청소'하거나 학생들을 착취하던……"
1300003-11 = "3;아카네;02;악덕기업 사장과 '온건한 대화'를 통해 밀린 급료에 보너스까지 지급시키고 고향으로 돌려보내는 등, 다양한 '봉사'를 하고 있죠.\n#3;em;[음표]"
1300003-12 = "3;아카네;01;샬레에서도 비슷한 일을 하고 있고, 최고의 에이전트 중 한 명인 저를 부른 것은……"
1300003-13 = "3;아카네;03;키보토스 모든 학생들을 위한 '봉사'가 필요하기 때문이겠죠?\n#3;em;[반짝]"
1300003-14 = "3;아카네;02;현명한 판단입니다. 저는 콜사인 제로쓰리, 무로카사 아카네, 주인님께 인사 드립니다.\n#3;greeting"
1300003-15 = "3;아카네;01;오늘의 임무는 무엇인가요?"
1300003-16 = "3;아카네;02;요인 제거? 공작? 기밀 확보? 조직 괴멸? 산업 스파이? \n#3;em;[?]"
1300003-17 = "[s1] \"일단 이 잔해부터 어떻게 해줘.\"\n[s2] \"청소를 부탁하려고 한 건데……\""
1300003-18 = "3;아카네;99;아하. 제거로군요. 혹은 괴멸일 수도 있겠네요. 어느 쪽이든 가능합니다. 타겟을 말씀해 주시겠……\n#3;em;[...]"
1300003-19 = "3;아카네;99;아하. 제거로군요. 혹은 괴멸일 수도 있겠네요. 어느 쪽이든 가능합니다. 타겟을 말씀해 주시겠……\n#3;em;[...]"
1300003-20 = "3;아카네;99;……."
1300003-21 = "3;아카네;04;네……?"
1300003-22 = "3;아카네;04;청소라는 말이……. 지, 진짜로 청소라고요?! \n#3;em;[?!]\n#3;shake"
1300003-23 = "3;아카네;05;쓸고 닦고 정리하고 치워 깨끗하고 보기 좋은 공간으로 만들라는 말씀하시는 건가요?!\n#3;hophop"
1300003-24 = "3;아카네;05;어이가 없군요. 제가 무슨 메이드인 줄 아시나요?! \n#3;em;[빠직]"
1300003-25 = "#na;……"
1300003-26 = "3;아카네;04;아……\n#3;stiff"
1300003-27 = "3;아카네;04;그렇군요. 후우. 아 죄송합니다. 가끔 저도 제 정체성에 혼란이 올 때가 있어서……\n#3;em;[땀]"
1300003-28 = "3;아카네;01;어쨌든, 알겠습니다."
1300003-29 = "3;아카네;03;안심하시길. 저 역시 C&C의 일원, 어떠한 임무든 완벽하게 수행해낼 자신이 있습니다.\n#3;em;[반짝]\n#3;greeting"
1300003-30 = "3;아카네;02;그럼 타겟, 청소해야 할 에어리어는…… 이곳 주인님의 집무실입니까?\n#3;em;[?]"
1300003-31 = "3;아카네;01;그럼 도구를 꺼내야겠군요."
1300003-32 = "3;아카네;01;(스윽)\n#3;greeting"
1300003-33 = "[s] 어째서 폭탄을 꺼내는 거야?"
1300003-34 = "3;아카네;03;가장 깨끗하게 만들어줄 수 있는 도구니까요.\n#3;em;[반짝]"
1300003-35 = "3;아카네;01;걱정마세요 주인님. 더러움의 흔적조차 남지 않게 될 것입니다."
1300003-36 = "3;아카네;03;후훗. \n#3;em;[...]"
1300003-37 = "#all;hide"
1300003-38 = "#wait;1000"
1300003-39 = "3;아카네;02;장난이에요.\n#3;em;[반응]"
1300003-40 = "3;아카네;01;사실 주인님께 부름을 받고, 솔직히 말하면 약간 설렜어요."
1300003-41 = "3;아카네;03;너무 호들갑 떤 모습이 부끄러워서, 조금 장난을 쳤을 뿐.\n#3;em;[음표]"
1300003-42 = "3;아카네;01;청소와 요리라면, 저 역시 수준급이니까요. 특히 청소라면 제 주특기고요. \n#3;greeting"
1300003-43 = "3;아카네;02;유능한 메이드가 곁에 있다는 게, 어떠한 일인지 깨닫게 해드릴게요."
1300003-44 = "3;아카네;03;일단은 제가 폭발시킨 천장부터 수리하겠습니다.\n#3;em;[반짝]"
1300003-45 = "#all;hide"
1300003-46 = "#na;(결국 1시간 내내 방을 청소했다.)"
1300003-47 = "#all;hide"
1300003-48 = "5;아카네;02;후훗. 어떠신가요?\n#5;al\n#5;em;[반짝]"
1300003-49 = "5;아카네;03;샬레는 생각보다 넓더군요. 청소하는 보람이 있어요.\n#5;greeting"
1300003-50 = "5;아카네;01;일단 주인님 방으로 추정되는 곳부터 조사…… 아니 청소했습니다.\n#5;m3"
1300003-51 = "5;아카네;03;청결과 위생을 확보한다는 것은 단순히 미관뿐만 아니라…… \n#5;em;[...]"
1300003-52 = "5;아카네;01;건강과 품격을 지키는데도 반드시 필요하답니다.\n#5;em;[반짝]"
1300003-53 = "5;아카네;02;보세요, 주인님. 결벽증 환자가 와도 환호성을 지를만큼, 깨끗한 집무실이 되었습니다.\n#5;m1"
1300003-54 = "#all;hide"
1300003-55 = "[ns] \"고마워.\""
1300003-56 = "3;아카네;04;?!\n#3;em;[?!]\n#3;shake\n#3;a"
1300003-57 = "3;아카네;05;……\n#3;em;[...]"
1300003-58 = "3;아카네;06;아…… 실례했습니다."
1300003-59 = "3;아카네;01;고맙다는 인사를 들어본 게, 꽤 오랜만이라서요."
1300003-60 = "3;아카네;06;보통은 \"끄아악!\" \"빌어먹을 메이드들!\" \"다, 당했다아!\" 같은 소리였는데…\n#3;em;[땀]"
1300003-61 = "3;아카네;01;선생님은, 아니 주인님은 섬길만한 분이신 것 같네요."
1300003-62 = "3;아카네;01;오늘의 임무는 여기까지지만, 다음에도 봉사가 필요하다면…… 저를 불러주세요."
1300003-63 = "3;아카네;03;성심성의껏, 봉사하겠습니다. \n#3;em;[반짝]\n#3;greeting"
1300003-64 = "3;아카네;03\n#3;h"
1300003-65 = "3;아카네;03;후훗. 지금 생각하면, 무척 즐거운 추억이네요.\n#3;em;[재잘]"
1300003-66 = "[s] \"그러고 보니, 그때 왜 폭탄을 쓰며 등장한 거야?\""
1300003-67 = "3;아카네;04;아……"
1300003-68 = "3;아카네;02;이왕이면, 강렬한 첫 만남으로 시작하고 싶었거든요."
1300003-69 = "3;아카네;01;선생님과의 인연을요. 후훗.\n#3;greeting"
1300003-70 = "3;아카네;03;앞으로도 잘 부탁드려요.\n#3;em;[반짝]"

[translation]
1300003-1 = "Are You My Master? Part 2"
1300003-2 = "Schale Executive Office"
1300003-4 = "Akane's time with Schale got off to a bang."
1300003-5 = "It is a pleasure to meet you."
1300003-6 = "Akane of C&C."
1300003-7 = "I'm here to serve you, Sensei—pardon me. Master."
1300003-8 = "I was told that I would be under Schale's command for this mission."
1300003-9 = "As you may be aware, C&C is comprised of the best agents in Millennium—no, in all of Kivotos."
1300003-10 = "We offer a wide variety of \"cleaning services\"..."
1300003-11 = "Such as cleansing Millennium of problem elements or encouraging bosses who extort their workers to pay what is owed and leave town."
1300003-12 = "It's not dissimilar to what Schale does, hence why an agent of my caliber was assigned here."
1300003-13 = "I can only assume that you require services from every student in Kivotos, is that right?"
1300003-14 = "A wise decision. Agent Zero-Three, Murokasa Akane. I'm here to serve you, Master."
1300003-15 = "What is the mission for today?"
1300003-16 = "Assassination? Courting? Intelligence gathering? Warfare? Corporate espionage?"
1300003-17 = "[s1] \"You can start by cleaning up this mess.\"\n[s2] \"How about a cleanup mission to start...?\""
1300003-18 = "Ah, elimination of a target. Very well. Could you specify the identity?"
1300003-19 = "Ah, elimination of a target. Very well. Could you specify the identity?"
1300003-20 = "... "
1300003-21 = "I beg your pardon?"
1300003-22 = "You were referring to...an actual cleanup?!"
1300003-23 = "You'd like me to sweep, dust, and organize until the room is spotless?!"
1300003-24 = "I can't believe what I'm hearing. Do I look like some sort of maid to you?!"
1300003-25 = "..."
1300003-26 = "Oh."
1300003-27 = "*sigh* My apologies. There are times when even I forget every duty I hold."
1300003-28 = "Very well. Say no more."
1300003-29 = "I am a member of C&C. There is no cleanup mission I cannot execute."
1300003-30 = "This target I'll be cleaning... It's your executive office?"
1300003-31 = "I'll have to fetch my tools."
1300003-32 = "*rustle*"
1300003-33 = "[s] \"Why are you taking out a bomb?\""
1300003-34 = "Because nothing is more efficient at cleaning."
1300003-35 = "Worry not, Master. There won't be a speck of dirt left in this room once I'm through."
1300003-36 = "Heh heh."
1300003-39 = "Only kidding."
1300003-40 = "To be honest, I was rather excited to be summoned here."
1300003-41 = "So I chose to have a little fun at your expense because I was embarrassed by the fuss I made."
1300003-42 = "Cleaning and cooking are also specialties of mine. Especially cleaning."
1300003-43 = "Let me show you what it's like to have a competent maid by your side."
1300003-44 = "First, I shall repair the ceiling that I detonated."
1300003-46 = "Akane cleaned my room for a solid hour straight."
1300003-48 = "Heh. What do you think now?"
1300003-49 = "The Schale office is larger than I expected. It's worth keeping clean."
1300003-50 = "I started by investigating...pardon, cleaning the room you claimed as yours."
1300003-51 = "Ensuring hygiene and cleanliness isn't just for keeping up appearances."
1300003-52 = "It is also essential to maintaining your health and dignity."
1300003-53 = "Take a look, Master. This office is now clean enough to please even the fussiest of neat freaks."
1300003-55 = "[ns] \"Thanks.\""
1300003-56 = "...?!"
1300003-57 = "..."
1300003-58 = "Oh... Excuse me."
1300003-59 = "It's been quite some time since I've heard someone thank me."
1300003-60 = "Typically, they just scream things like, \"Damn maids!\" or \"They got me!\""
1300003-61 = "Comparatively, you're someone worth serving, Sensei—no, Master."
1300003-62 = "This concludes my mission for the day, but if you're ever in need...you're welcome to elicit my services."
1300003-63 = "I will serve you to the best of my ability."
1300003-65 = "Haha. It's a fun little memory, now that I think about it."
1300003-66 = "[s] \"Come to think of it, why did you use a bomb to make your entrance?\""
1300003-67 = "Ah..."
1300003-68 = "I wanted to make a memorable first impression."
1300003-69 = "It was the beginning of our time together after all. Heehee."
1300003-70 = "And I'm still quite looking forward to the time ahead of us."

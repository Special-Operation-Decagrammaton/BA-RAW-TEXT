1003502-29 = "5;우이;17;우, 우선 이쪽으로……."
1003502-30 = "5;우이;17;우, 우선 이쪽으로……."
1003502-31 = "5;우이;18;네? 안으로 들어가도 괜찮은 거냐고요? 그, 그야 물론이죠! 선생님이시니까!\n#5;em;[?]"

[translation]
1003502-1 = "เจ้าของห้องสมุดเก่า"
1003502-2 = "ถนนทรีนิตี้"
1003502-3 = "(คุณครูออกไปยังหน้าห้องสมุดเก่า)"
1003502-4 = "(ประตูยังปิดแน่นอยู่เหมือนเคย รอบๆ อาคารมีด่านกั้นที่ถูกวางไว้อย่างรีบร้อน)"
1003502-7 = "[ns1] เรียกอุย\n[ns2] เคาะเรียกอย่างระมัดระวัง"
1003502-10 = "(ไม่มีใครตอบ...)"
1003502-11 = "[s3] เรียกดังขึ้นอีกหน่อย\n[s4] เคาะดังขึ้นอีกหน่อย"
1003502-12 = "ไม่มีใครอยู่ในนี้หรอกค่ะ! กลับไปเถอะ!"
1003502-13 = "ไม่มีใครอยู่ในนี้หรอกค่ะ! กลับไปเถอะ!"
1003502-14 = "[s5] \"ไม่มีใครอยู่แล้วตอบได้ยังไง?\"\n[s6] \"อุย นี่ครูเอง\""
1003502-15 = "โธ่เอ๊ย... ก็บอกว่าไม่มีใครอยู่ไงคะ ทำไมยังเรียกอยู่อีก!"
1003502-16 = "โธ่เอ๊ย... ก็บอกว่าไม่มีใครอยู่ไงคะ ทำไมยังเรียกอยู่อีก!"
1003502-17 = "ไม่มีใครอยู่ในนี้ค่ะ...!"
1003502-18 = "หืม...?"
1003502-19 = "เดี๋ยวนะ เสียงนี้มัน...."
1003502-25 = "เฮือก!?"
1003502-26 = "คะ... คุณครู! เป็นคุณครูจริงๆ ด้วย!"
1003502-27 = "ขะ... ขอโทษนะคะ ฉันไม่รู้เรื่องว่าเป็นคุณครู... คิดว่าเป็นคนนอกน่ะค่ะ..."
1003502-28 = "[s7] \"อืม... แต่ก็เป็นคนนอกอยู่นะ...\"\n[s8] \"ไม่เป็นไร ไม่ต้องใส่ใจหรอก\""
1003502-29 = "ชะ... เชิญทางนี้ก่อนค่ะ..."
1003502-30 = "ชะ... เชิญทางนี้ก่อนค่ะ..."
1003502-31 = "คะ? ทำไมถึงคิดว่าเข้ามาข้างในไม่ได้ล่ะคะ? เข้าได้สิคะ! เป็นคุณครูทั้งที!"
1003502-32 = "อ๊ะ... เดี๋ยวนะ"
1003502-33 = "[s9] \"อุย...?\"\n[s10] \"เป็นอะไรไป? มีเรื่องอะไรเหรอ?\""
1003502-34 = "เอ่อ... คือ... คือว่า... แบบว่า... มัน..."
1003502-35 = "เอ่อ... คือ... คือว่า... แบบว่า... มัน..."
1003502-36 = "ระ... รอเดี๋ยวนะคะ! แป๊บเดียวเท่านั้นค่ะ!"
1003502-46 = "เฮ้อ..."
1003502-47 = "สะ... เสร็จเสียที... ตอนนี้โอเคแล้วค่ะ..."
1003502-48 = "ทำไมมองด้วยสายตาแบบนั้นล่ะคะ!? มะ... ไม่ใช่อย่างนั้นค่ะ! แค่ไม่ได้ทำความสะอาดนิดหน่อยเท่านั้น...!"
1003502-49 = "ไม่ถึงกับทุกส่วนหรอกค่ะ แต่ก็ช่างเถอะ...!"
1003502-50 = "ขะ... เข้ามาสิคะ!"
1003502-54 = "[ns] เดินตามอุยเข้าไป"
1003502-57 = "ภายในห้องสมุดเก่า"
1003502-58 = "(ห้องสมุดเก่ามีบรรยากาศเก่าแก่สมชื่อ)"
1003502-59 = "(เห็นเสื้อผ้าและของจุกจิกที่ถูกเก็บหรือซ่อนไว้อย่างเร่งรีบ)"
1003502-60 = "ชะ... เชิญค่ะ คุณครู..."
1003502-61 = "อ๊ะ! ทางนั้นไม่ได้นะคะ! ยังเก็บกวาดไม่เสร็จเลย ยังเข้ามาไม่ได้นะคะ!"
1003502-62 = "ต้องขอโทษด้วยค่ะ... ถ้ารู้ว่าคุณครูจะมาก็คงขอให้คนอื่นช่วยเก็บกวาดล่วงหน้าแล้ว..."
1003502-63 = "พอดีที่นี่ไม่ค่อยมีใครมาเท่าไหร่น่ะค่ะ..."
1003502-64 = "เพราะหากจะยืมหนังสือก็จะไปติดต่อกับห้องสมุดกลางเอา... ที่นี่มีแต่หนังสือเก่าๆ ค่ะ"
1003502-65 = "จะว่าไป... คุณครูมาทำธุระอะไรถึงที่นี่เหรอคะ?"
1003502-66 = "มีเด็กคนไหนที่หาไม่ได้ในหอสมุด... หรือว่ามีเด็กคนไหนที่อยากได้เป็นพิเศษเหรอคะ?"
1003502-67 = "คะ? ไม่ใช่เพราะเรื่องนี้เหรอคะ? ถ้างั้นก็..."
1003502-68 = "คะ... แค่ลองแวะเข้ามาเฉยๆ? เพราะข้อความที่ส่งไปเมื่อกี๊เหรอคะ...?"
1003502-69 = "เอ่อ... เรื่องนั้น... มะ... ไม่ต้องใส่ใจก็ได้..."
1003502-70 = "เรื่องมันผ่านไปแล้วนี่คะ... มันไม่ได้เป็นเรื่องใหญ่อะไรหรอกค่ะ"
1003502-71 = "ก็แค่... แค่..."
1003502-72 = "เด็กๆ ที่ถูกยืมไป... ฉันหมายถึง... หนังสือที่ได้รับคืนมา... สภาพมัน..."
1003502-73 = "ทั้งถูกขีดเขียน ถูกพับหน้ากระดาษ แถมถูกกางและกดแรงเกินจนตรงสันจะขาดออกจากกันอยู่แล้ว..."
1003502-74 = "เฮ้อ..."
1003502-75 = "นี่คือเหตุผลที่ฉันไม่อยากข้องเกี่ยวกับคนข้างนอก แต่พอเป็นเรื่องยืมหนังสือจะไม่ยุ่งก็ไม่ได้..."
1003502-76 = "......ฉันต้องขอโทษด้วยนะคะ ต่อไปฉันจะระวังค่ะ..."
1003502-77 = "คะ...? ไม่เป็นไรงั้นเหรอคะ?"
1003502-78 = "อยากให้ฉันมาคุยบ่อยๆ จะได้ระบายเรื่องนี้ได้บ้างเหรอคะ? แต่มันเป็นการรบกวนคุณครูนะคะ..."
1003502-79 = "คะ...?"
1003502-80 = "ให้ฉันคุยด้วยได้... เพราะนี่ก็ถือว่าเป็นส่วนหนึ่งของการทำงานของคุณครูเหรอคะ?"
1003502-81 = "กะ... ก็ไม่รู้สิคะ... เอาเป็นว่า ฉันรับทราบแล้วค่ะ ขอบคุณนะคะคุณครู"
1003502-82 = "เอ่อ... อืม..."
1003502-83 = "เดี๋ยวนะคะ คือว่า... ทางนี้เองก็มี..."
1003502-88 = "เจอแล้ว..."
1003502-93 = "คุณครูคะ... รับนี่ไปสิคะ"
1003502-94 = "[s11] \"นี่มัน...?\"\n[s12] \"กุญแจ?\""
1003502-95 = "อื้ม... ใช่ค่ะ กุญแจประตูหน้า... ของที่นี่น่ะค่ะ"
1003502-96 = "อื้ม... ใช่ค่ะ กุญแจประตูหน้า... ของที่นี่น่ะค่ะ"
1003502-97 = "ฉันอยากให้คุณครูเข้าออกได้ตามต้องการ... ไม่เว้นแม้แต่ตอนที่ฉันหลับอยู่..."
1003502-98 = "คะ? ไม่ใช่หรอกค่ะ นี่ไม่ใช่กุญแจของสมาชิกชมรมอ่านหนังสือ เป็นแค่กุญแจสำรองค่ะ"
1003502-99 = "ฉันเหรอคะ...? ฉันไม่มีสำรองหรอกค่ะ มีแค่ดอกนั้นดอกเดียวค่ะ..."
1003502-100 = "แต่ยังไงฉันก็ไม่ออกจากที่นี่อยู่แล้ว! กุญแจนี่ไม่ใช่สิ่งสำคัญสำหรับฉันหรอกค่ะ! แหะๆๆ..."
1003502-101 = "ฉันก็แค่ไม่อยากทำอะไรผิดพลาดกับคุณครูเหมือนในวันนี้อีก..."
1003502-102 = "ถ้าคุณครูเปิดประตูแล้วเข้ามาเองละก็... คงจะแยกกับคนนอกได้..."
1003502-103 = "เอ่อ..."
1003502-108 = "ทำไมถึงคืนให้ฉันล่ะคะ...?"
1003502-109 = "เอ่อ..."
1003502-110 = "คุณครูไม่อยากได้ไว้เหรอ? นั่นสินะคะ... นี่มันก็แค่กุญแจห้องสมุดเก่าๆ ต้องขอโทษด้วยค่ะ ฉันคงคิดไปเองว่าคุณครูอยากจะมาอีก..."
1003502-111 = "ไม่ใช่เพราะเรื่องนี้เหรอคะ...? แล้วถ้างั้น..."
1003502-112 = "[s13] \"กุญแจก็ต้องอยู่กับเจ้าของสิ\"\n[s14] \"ถ้าครูจะมา ครูจะส่งข้อความมาบอกก่อน\""
1003502-113 = "คุณครู..."
1003502-114 = "คุณครู..."
1003502-115 = "ก็ได้ค่ะ ต่อไปถ้าคุณครูบอกว่าจะมาอีก ฉันจะทำความสะอาดเอาไว้ล่วงหน้านะคะ"
1003502-116 = "แหะๆๆ..."
1003502-117 = "วันนี้ได้อะไรเยอะแยะเลยนะคะเนี่ย"
1003502-118 = "ถ้างั้น..."
1003502-119 = "ไหนๆ คุณครูก็มาที่ห้องสมุดเก่านี่แล้ว... ให้ฉันแนะนำเด็กที่น่าอ่านให้สักสองสามคนมั้ยคะ?"
1003502-120 = "ถึงจะมีแต่หนังสือเก่าๆ แต่ก็มีหลายเล่มที่ทำให้คุณครูสนุกได้นะคะ"
1003502-122 = "(จากนั้นคุณครูก็อ่านหนังสือเก่าด้วยกันกับอุยแล้วค่อยกลับออกไป)"

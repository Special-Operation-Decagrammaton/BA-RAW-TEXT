1003502-107 = "3;우이;04\n#3;em;…\n#wait;2500\n#3;closeup"
1003502-108 = "3;우이;01;왜 다시 돌려주시는 거죠…….\n#3;closeup"
1003502-109 = "3;우이;13;……아.\n#3;closeup"
1003502-110 = "3;우이;11;역시 필요 없으신 건가요? 이런 곳의 열쇠는……. 죄송합니다. 제가 또 자의식 과잉을…….\n#3;em;[속상함]\n#3;stiff\n#3;closeup"
1003502-111 = "3;우이;10;……그런 게 아니라고요? 그러면…….\n#3;closeup"
1003502-112 = "[s13] \"역시 열쇠는 주인이 가지고 있어야지.\"\n[s14] \"난 오기 전에 모모톡으로 연락하면 되니까.\""
1003502-113 = "3;우이;13;선생님…….\n#3;em;…"
1003502-114 = "3;우이;13;선생님…….\n#3;em;…"
1003502-115 = "3;우이;07;알겠습니다. 대신 앞으로는 선생님께서 오신다 할 때 미리 준비라도 잘해 놓을게요.\n#3;greeting"
1003502-116 = "3;우이;09;……으헤헤.\n#3;em;[///]"
1003502-117 = "3;우이;03;뭔가, 생각지도 않게 오늘은 수확이 많네요."
1003502-118 = "3;우이;07;……그럼 선생님……."
1003502-119 = "3;우이;03;이왕 고서관까지 오신 김에……. 제가 괜찮은 아이 몇 권 소개시켜 드려도 괜찮을까요?"
1003502-120 = "3;우이;22;이래봬도 선생님께서 흥미를 가지실 만한, 재미있는 책들이 꽤 많답니다.\n#3;em;[음표]"

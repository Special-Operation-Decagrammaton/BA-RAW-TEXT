[translation]
1003502-1 = "Director of the Old Library"
1003502-2 = "Trinity Alley"
1003502-3 = "I decided to make a visit to the old library."
1003502-4 = "The door was locked, as usual, and there were makeshift barricades around the building."
1003502-7 = "[ns1] Yell Ui's name.\n[ns2] Knock on the door."
1003502-10 = "No answer."
1003502-11 = "[s3] Yell Ui's name really loud.\n[s4] Knock as hard as you can."
1003502-12 = "No one's here! Go away!"
1003502-13 = "No one's here! Go away!"
1003502-14 = "[s5] \"If no one's there, then who are you?\"\n[s6] \"Ui, it's me!\""
1003502-15 = "*sigh* I said no one's here! Why can't you just leave?!"
1003502-16 = "*sigh* I said no one's here! Why can't you just leave?!"
1003502-17 = "Get lost!"
1003502-18 = "Wait."
1003502-19 = "That voice..."
1003502-25 = "*gasp*"
1003502-26 = "S-Sensei!"
1003502-27 = "S-Sorry. I didn't know it was you. I thought you were an outsider..."
1003502-28 = "[s7] \"Well, technically I AM an outsider...\"\n[s8] \"It's fine. No worries.\""
1003502-29 = "P-Please come in..."
1003502-30 = "P-Please come in..."
1003502-31 = "Is it okay? Of course it is. Y-You're an exception!"
1003502-32 = "Wait."
1003502-33 = "[s9] \"Ui?\"\n[s10] \"Is something wrong?\""
1003502-34 = "W-Well, the thing is..."
1003502-35 = "W-Well, the thing is..."
1003502-36 = "Just a second! Wait here a moment!"
1003502-46 = "Phew."
1003502-47 = "O-Okay. You can come in now."
1003502-48 = "Why are you looking at me like that? N-No! I was NOT cleaning."
1003502-49 = "I-I mean, I was, but I wasn't doing it for any particular reason. Moving on!"
1003502-50 = "P-Please come in."
1003502-54 = "[ns] Follow Ui inside."
1003502-57 = "Inside the old library"
1003502-58 = "I followed Ui inside the old library. It had an antique charm to it, like you would expect."
1003502-59 = "Out of the corner of my eye, I spotted some clothes and random items she'd clearly just organized."
1003502-60 = "W-Welcome, Sensei."
1003502-61 = "W-Wait, not over there. I didn't finish cleaning that side!"
1003502-62 = "I'm sorry... I would have asked the others to help me clean if I knew you were coming."
1003502-63 = "This particular library doesn't get very many visitors."
1003502-64 = "Most students go to the Central Library to borrow books, unless they're looking for something very old."
1003502-65 = "A-Anyway. What brings you here today?"
1003502-66 = "Was there something special you needed? Such as a book not registered at the Central Library?"
1003502-67 = "You mean...that's NOT why you came by?"
1003502-68 = "Oh. It was about my message from earlier?"
1003502-69 = "Y-You don't have to worry about that..."
1003502-70 = "I-It's in the past now. Nothing really happened."
1003502-71 = "It's just, um..."
1003502-72 = "The books that were borrowed... They were in poor condition when they were finally returned."
1003502-73 = "The borrowers had folded pages instead of using bookmarks, and the bindings were separated because the books were pressed down too hard when opened."
1003502-74 = "*sigh*"
1003502-75 = "This is yet another reason why I don't enjoy dealing with outsiders.#nStill, I had to say something about the rentals..."
1003502-76 = "My apologies. I'll keep myself in check from now on."
1003502-77 = "Hmm? That's not the issue?"
1003502-78 = "You...want me to open up about stuff like this more? But wouldn't that only be an inconvenience to you?"
1003502-79 = "You're suggesting that..."
1003502-80 = "...it's your job to listen?"
1003502-81 = "I-I don't know how to feel about that...but okay. Thank you, Sensei."
1003502-82 = "Hmm..."
1003502-83 = "Hold on. I have an idea."
1003502-88 = "There it is."
1003502-93 = "Here, Sensei."
1003502-94 = "[s11] \"What's this?\"\n[s12] \"A key...?\""
1003502-95 = "It's the key to the front door."
1003502-96 = "It's the key to the front door."
1003502-97 = "That way you can show yourself in at anytime...even if I'm sleeping and don't answer."
1003502-98 = "Do other Library Committee members have a key? N-No, they don't.#nI didn't make any extra copies."
1003502-99 = "What about that one? That's not a copy either. It's the only key."
1003502-100 = "I-I don't leave this place anyway! So I have no use for it. Heh... Haha."
1003502-101 = "I'd rather not make the same mistake I made earlier."
1003502-102 = "So if you let yourself in, then I'll know it can only be you and not an outsider."
1003502-103 = "Um..."
1003502-108 = "Why are you giving it back to me?"
1003502-109 = "Oh."
1003502-110 = "You don't need it? You're right. Who would want a key to a place like this?#nI'm sorry..."
1003502-111 = "That's not what you mean? Then..."
1003502-112 = "[s13] \"This is your home. The key belongs with you.\"\n[s14] \"I'll just shoot you a message on MomoTalk before I visit.\""
1003502-113 = "Sensei..."
1003502-114 = "Sensei..."
1003502-115 = "All right, then. That will give me enough time to tidy up before you arrive."
1003502-116 = "Heh heh."
1003502-117 = "Today has been unexpectedly productive."
1003502-118 = "Well, Sensei..."
1003502-119 = "Since you're here, how about I recommend you some books?"
1003502-120 = "I know of quite a few that you might be interested in."
1003502-122 = "I spent some time reading old books with Ui in the old library."

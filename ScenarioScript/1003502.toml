1003502-24 = "5;우이;17\n#5;a\n#wait;2500\n#5;em;…"
1003502-25 = "5;우이;10;……헉!?\n#5;em;[?!]\n#5;shake"
1003502-26 = "5;우이;20;서, 선생님! 역시 선생님이셨군요!"
1003502-27 = "5;우이;11;죄, 죄송합니다. 그런 줄도 모르고……. 또 바깥사람인 줄 알고…….\n#5;em;[땀]\n#5;stiff"

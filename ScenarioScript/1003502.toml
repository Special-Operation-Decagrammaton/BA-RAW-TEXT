1003502-33 = "[s9] \"……우이?\"\n[s10] \"왜 그래? 무슨 일 있어?\""
1003502-34 = "5;우이;11;아, 그. 그……. 그러니까 그……. 그게…….\n#5;em;…"
1003502-35 = "5;우이;11;아, 그. 그……. 그러니까 그……. 그게…….\n#5;em;…"

1003502-58 = "#na;(우이를 따라 들어간 고서관은 이름처럼 오래된 분위기가 물씬 풍겼다.)"
1003502-59 = "#na;(중간중간 급히 치워 두거나 가려 둔 옷가지와 잡동사니가 보였다.)"
1003502-60 = "3;우이;04;어, 어서 오세요……. 선생님…….\n#3;a\n#3;em;…"
1003502-61 = "3;우이;20;……아, 아아! 안 돼요! 그 쪽은! 아직 덜 치웠으니까 거긴 안 돼요!\n#3;m4\n#3;hophop"
1003502-62 = "3;우이;06;죄송합니다……. 이렇게 될 줄 알았으면 미리 좀 치워 놓거나, 애들한테 부탁 좀 하는 건데…….\n#3;em;[땀]\n#3;stiff"
1003502-63 = "3;우이;13;여긴 워낙 사람들이 찾아올 일이 없는 곳이다 보니……."
1003502-64 = "3;우이;02;보통은 책을 빌릴 때에도 여기가 아니라 중앙도서관을 통하니까요. 어지간한 고서가 아니고선…….\n#3;m3"
1003502-65 = "3;우이;13;그, 그러고 보니 선생님께서는 일부러 여기까지 무슨 일이신가요?"
1003502-66 = "3;우이;05;혹시 대도서관엔 등록되지 않은……. 특별하게 필요하신 아이라도 있으신 건가요?\n#3;em;[?]"
1003502-67 = "3;우이;02;네? 그런 건 아니라고요? 그럼……."
1003502-68 = "3;우이;04;……그, 그냥 한번 와보신 거라고요? 아까 전 메시지 때문에……?"
1003502-69 = "3;우이;10;……아. 그거……. 시, 신경 쓰실 거 없는데…….\n#3;em;[땀]\n#3;stiff"
1003502-70 = "3;우이;11;이미 지난 일이기도 하고……. 딱히 무슨 일이 있었던 건 아니니까요."
1003502-71 = "3;우이;06;그냥……. 그…….\n#3;em;…"
1003502-72 = "3;우이;07;대여됐던 애들이……. 그러니까 책이 돌아왔을 때, 좀 상태들이……."
1003502-73 = "3;우이;16;중간 중간 페이지를 체크한답시고 막 접어두질 않나, 편 채로 너무 세게 눌러서 중간 이음새가 벌어져 있질 않나…….\n#3;em;[빠직]\n#3;stiff"
1003502-74 = "3;우이;12;……하아……."
1003502-75 = "3;우이;00;이래서 어지간하면 바깥 사람들이랑은 엮이기 싫었는데, 그래도 대여에 관해서는 어쩔 수 없었어서……."
1003502-76 = "3;우이;06;…….아무튼 죄송합니다. 앞으로는 자제할게요…….\n#3;em;[속상함]"
1003502-77 = "3;우이;02;……네? 괜찮으시다고요?"
1003502-78 = "3;우이;17;오히려 좀 더 자주 이야기해서 풀어도 좋다고요? 그, 그치만 그건 민폐인데요…….\n#3;stiff\n#3;em;[///]"
1003502-79 = "3;우이;18;……네?"
1003502-80 = "3;우이;18;선생님에게는 업무의 일환이니 전혀 문제가 되지 않는다……고요?"
1003502-81 = "3;우이;17;자, 잘은 모르지만……. 일단은 알겠습니다. 감사합니다, 선생님.\n#3;greeting\n#3;em;[땀]"
1003502-82 = "3;우이;07;……어……. 음……."
1003502-83 = "3;우이;15;잠깐만요. 그럼 뭔가……. 제 쪽에서도……."

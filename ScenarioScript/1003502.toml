1003502-47 = "5;우이;17;다, 다 됐어요……. 이제 괜찮아요……."
1003502-48 = "5;우이;18;왜, 왜 그렇게 보시는 거예요!? 아, 아니에요! 청소 때문에 그런 게 아니니까……!\n#5;em;[?!]\n#5;shake"

1003502-93 = "3;우이;18;……선생님, 여기…….\n#3;a\n#3;greeting\n#3;closeup"
1003502-94 = "[s11] \"……이건?\"\n[s12] \"열쇠……?\""
1003502-95 = "3;우이;13;……아. 네. 여기 정문 열쇠……예요.\n#3;em;…\n#3;closeup"
1003502-96 = "3;우이;13;……아. 네. 여기 정문 열쇠……예요.\n#3;em;…\n#3;closeup"
1003502-97 = "3;우이;18;저 자고 있거나……. 아무튼 아무 때나, 선생님 원하실 때 오실 수 있도록…….\n#3;closeup"
1003502-98 = "3;우이;02;네? 도서부 부원들의 열쇠냐고요? 아, 아뇨. 여분 같은 건 만들어 두지 않았는데요…….\n#3;em;[?]\n#3;closeup"
1003502-99 = "3;우이;04;……저요? 아뇨. 열쇠는 여분이 없어요. 그거 하나가 전부입니다…….\n#3;closeup"
1003502-100 = "3;우이;12;어, 어차피 저야 여기서 안 나가니까요! 막상 저한테는 쓸 일도 없는 열쇠인걸요! 아하하…….\n#3;stiff\n#3;em;[땀]\n#3;closeup"
1003502-101 = "3;우이;18;그, 그냥 오늘처럼 또 선생님께 실수하고 싶지 않으니…….\n#3;closeup"
1003502-102 = "3;우이;17;문 열고 알아서 들어오실 수 있으면……. 바깥 사람들과 구분할 수도 있을 거고…….\n#3;closeup"
1003502-103 = "3;우이;04;……어…….\n#3;closeup"
1003502-104 = "#st;[0,0];instant;1;"

[translation]
1003502-1 = "古書館的主人"
1003502-2 = "三一．街道"
1003502-3 = "（有點在意憂傳的訊息，於是抽空來到了古書館）"
1003502-4 = "（建築的周邊依然放著路障，大門也在各種意義上緊緊地關著）"
1003502-7 = "[ns1] 嘗試呼喚憂\n[ns2] 靜靜地敲門"
1003502-10 = "（……沒有回應）"
1003502-11 = "[s3] 稍微大聲一點呼喚憂\n[s4] 稍微大力一點敲門"
1003502-12 = "裡，裡面沒有人！裡面沒人在，所以請回吧……！"
1003502-13 = "裡，裡面沒有人！裡面沒人在，所以請回吧……！"
1003502-14 = "[s5] 「如果沒人在的話，一般來說是不會有回應的吧……？」\n[s6] 「是我哦，憂。」"
1003502-15 = "真，真囉嗦……！"
1003502-16 = "真，真囉嗦……！"
1003502-17 = "就說沒人在了──"
1003502-18 = "……咦？"
1003502-19 = "這，這個聲音是……"
1003502-25 = "……！？"
1003502-26 = "老，老師！？"
1003502-27 = "對，對不起，我還以為肯定是昨天那些人……"
1003502-28 = "[s7] 「沒關係，別在意。」\n[s8] 「不用放在心上。」"
1003502-29 = "啊，請，請進……"
1003502-30 = "啊，請，請進……"
1003502-31 = "是，是老師要進來的話，完全沒有問題的……！"
1003502-32 = "……啊。"
1003502-33 = "[s9] 「……憂？」\n[s10] 「怎麼了？」"
1003502-34 = "那，那個，呃……"
1003502-35 = "那，那個，呃……"
1003502-36 = "請，請稍等一下！"
1003502-46 = "……呼。"
1003502-47 = "讓，讓你久等了，已經沒問題了……"
1003502-48 = "……？才，才不是呢！？才沒有突然打掃什麼的……！"
1003502-49 = "不，呃，好像也不能完全否定……"
1003502-50 = "總，總之請進吧……"
1003502-54 = "[ns] 和憂一起進去"
1003502-57 = "古書館內部"
1003502-58 = "（古書館和以前一樣，散發著一股不可思議的氛圍）"
1003502-59 = "（隱隱約約可以看到匆匆整理過的衣物和某些器材之類的東西）"
1003502-60 = "請，請進……"
1003502-61 = "啊，那，那邊不能進去……！裡面亂糟糟的！"
1003502-62 = "對，對不起，如果提前知道的話就會先整理一下了……"
1003502-63 = "這裡平常是沒，沒有人會來的地方，所以……"
1003502-64 = "如果想要借書，一般來說都會到中央圖書館……#n如果不是要找相當舊的古書的話根本就……"
1003502-65 = "話，話說回來，老師為什麼特地來這裡呢……？"
1003502-66 = "是要找那種中央圖書館沒有的[ruby=書本]孩子[/ruby]嗎？"
1003502-67 = "啊，不是嗎。那，那究竟是為什麼……"
1003502-68 = "只是單純想來，而已……？"
1003502-69 = "是，是因為那個訊息……？#n明，明明不用在意的……"
1003502-70 = "都已經過去了，也，也不是什麼大不了的事……"
1003502-71 = "只是，那個……"
1003502-72 = "回來的[ruby=書本]孩子[/ruby]們，那個，狀態有點……"
1003502-73 = "不知道是不是為了方便檢查，邊角常出現摺痕……#n或是因為持續的重壓導致書背出現損傷之類的……"
1003502-74 = "唉……"
1003502-75 = "所以我才不想讓外面的人……不，不過也沒辦法拒絕所有人……"
1003502-76 = "……就，就是這樣而已，請別在意。"
1003502-77 = "……？"
1003502-78 = "你說可以休息一下……？#n雖，雖然你這麼說，也不能每次休息都找老師過來……"
1003502-79 = "……這樣不會造成，你的困擾嗎？"
1003502-80 = "「因為是老師」……"
1003502-81 = "這，這樣啊……雖然搞不太懂，不過……謝謝你，老師。"
1003502-82 = "啊，那個……"
1003502-83 = "請，請稍等一下。#n總是受你照顧好像有點那個，所以希望能多少減輕一點老師的負擔……"
1003502-88 = "……啊。"
1003502-93 = "老師，請收下……"
1003502-94 = "[s11] 「這個是……？」\n[s12] 「鑰匙？」"
1003502-95 = "是，是的……這是正門的，鑰匙。"
1003502-96 = "是，是的……這是正門的，鑰匙。"
1003502-97 = "如果我在睡覺的話就沒辦法幫老師開門……#n為，為了讓老師能在方便的時間過來所以……"
1003502-98 = "……？#n不，這不是圖書委員會的公物……"
1003502-99 = "也沒有備用鑰匙……嗯，這是我的鑰匙。"
1003502-100 = "反，反正我也不會從這裡出去……該說是不需要嗎，那個……"
1003502-101 = "只要這樣的話，就，就不會像今天一樣不小心對老師說出失禮的話了……"
1003502-102 = "這，這樣一來，能夠進來的就只有老師了……"
1003502-103 = "那個……"
1003502-108 = "……？"
1003502-109 = "呃……"
1003502-110 = "果，果然不需要對吧……對不起，好像做了自，自我感覺良好的事……"
1003502-111 = "不是這樣嗎？那麼為什麼不把鑰匙……"
1003502-112 = "[s13] 「我只是覺得應該留在主人手中。」\n[s14] 「我要過來的時候會用MomoTalk聯絡你的。」"
1003502-113 = "老師……"
1003502-114 = "老師……"
1003502-115 = "……我，我知道了。#n之後我會那個，提前打掃一下的……"
1003502-116 = "……呵呵。"
1003502-117 = "或許這樣也不錯呢……"
1003502-118 = "那個，這個……"
1003502-119 = "既然難得來古書館一趟……要不要看看我推薦的[ruby=書本]孩子[/ruby]們啊？"
1003502-120 = "肯，肯定會有能讓老師感興趣的那種，有趣的[ruby=書本]孩子[/ruby]的。"
1003502-122 = "（之後和憂一起看了各式各樣的古書）"

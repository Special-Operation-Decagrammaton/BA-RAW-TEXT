[translation]
1601106-1 = "矯正姿勢"
1601106-2 = "（收到連絡後的下一個休息日，聯絡了蓮實打算一起運動）"
1601106-3 = "（抵達位於郊區的小型體育館時，看見了提前抵達的蓮實）"
1601106-7 = "啊，老師。恭候多時了。"
1601106-8 = "……咦？"
1601106-9 = "明明提早抵達，我卻已經到了……？"
1601106-10 = "……呵呵，因為我很期待這一天的到來。#n已經做好萬全的準備了。"
1601106-11 = "[s1]「那就好……準備？」\n[s2]「除了運動之外還要做什麼嗎？」"
1601106-14 = "就像先前跟您提過的一樣，今天是為了消除老師平時的運動不足而來……"
1601106-15 = "我想，要是能做點能夠舒展因文書作業而僵硬的身體的伸展運動就好了……#n所以在大運動會時，學習了各種方法。"
1601106-16 = "雖然不算非常正式，不過如果是簡單動作的話，我知道正確的姿勢和伸展的方法。"
1601106-17 = "像是示範給老師看，或是幫忙矯正姿勢……我想這些是可以做到的。"
1601106-18 = "啊，不過不需要把我當成教練，當作是一起運動的延伸就可以了。"
1601106-19 = "那個……難道，這是不必要的關心嗎……？"
1601106-20 = "[s3]「怎麼會呢！拜託你囉。」\n[s4]「最近正好覺得最近身體有點僵硬，真是剛好呢。」"
1601106-23 = "呵呵……那真是太好了。"
1601106-24 = "那個，因為老師先前說過「希望能被照顧」，希望能幫上您的忙。"
1601106-30 = "……那麼，就先從簡單的伸展運動開始吧。"
1601106-47 = "（於是便跟隨蓮實的示範做了一組簡單的伸展動作）"
1601106-51 = "啊，老師……目前為止還好嗎？"
1601106-52 = "在那個狀態下……沒錯，維持住這個姿勢……"
1601106-53 = "這個動作，身體應該要再低一點才行……"
1601106-54 = "我來幫您調整姿勢吧。"
1601106-61 = "像這樣……"
1601106-65 = "這裡再稍微，這樣……"
1601106-70 = "[ns5]「……蓮，蓮實……！？」\n[ns6]（……！？……好像被什麼柔軟的東西碰到了……！？）"
1601106-75 = "……老師，怎麼了？#n發生什麼事了嗎……？"
1601106-76 = "……咦？您自己來就行了，是嗎？"
1601106-77 = "難，難道是我太大力了嗎……？#n還是說……"
1601106-81 = "……啊。"
1601106-87 = "（難道是因為我用身體壓著老師……）"
1601106-88 = "（所以覺得很重嗎……？但是因為老師太溫柔了所以才說不出口……！？）"
1601106-94 = "[ns7]「……蓮實？」\n[ns8]「怎麼了嗎？」"
1601106-97 = "非，非常抱歉，老師！#n我絕對沒有那個意思……！！"
1601106-98 = "咦，沒關係？#n可，可是……！"
1601106-99 = "……這次反過來？"
1601106-100 = "老師要幫我看姿勢嗎？#n雖，雖然我是無所謂……"
1601106-101 = "[s9]「總是被看會有點過意不去的。」\n[s10]「說好今天要一起運動的，所以輪流來吧。」"
1601106-104 = "好，好的……"
1601106-105 = "我明白了。那，那麼這次就請老師支撐我吧……"
1601106-106 = "做，做背部伸展……"
1601106-112 = "那，那麼……"
1601106-113 = "拜託……您了……"
1601106-117 = "哈啊，哈啊……"
1601106-118 = "既然已經做了三組了……"
1601106-119 = "今天就先到此為止吧？"
1601106-120 = "……啊。"
1601106-121 = "非常抱歉，居然說得這麼理所當然。"
1601106-122 = "明明都還沒和您約下一次，不小心就……"
1601106-123 = "……咦，您本來就有這個打算？"
1601106-124 = "那，那個……#n如果老師願意的話，我當然沒問題……"
1601106-128 = "……呵呵，是呢。"
1601106-129 = "好的。那麼，就這麼說定了。"
1601106-130 = "謝謝您……老師。"
1601106-132 = "……今後也請您多多指教哦。"

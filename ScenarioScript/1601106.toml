[translation]
1601106-1 = "Proper Form"
1601106-2 = "I had some free time, so I contacted Hasumi and scheduled a workout."
1601106-3 = "By the time I got to the small gym we had decided on, Hasumi was already there."
1601106-7 = "Oh, you're here, Sensei. I've been waiting for you."
1601106-8 = "...Hm?"
1601106-9 = "You got here early, but I got here even earlier?"
1601106-10 = "Of course. That's the perfect attitude for today."
1601106-11 = "[s1] \"Perfect attitude for today?\"\n[s2] \"What do you mean?\""
1601106-14 = "Today has been earmarked for stamina training."
1601106-15 = "I had a few things in mind during the Kivotos Halo Festival. All that's a ways off, but..."
1601106-16 = "For now, I thought I'd give you a few simple pointers."
1601106-17 = "Correcting your posture, showing you some good stretches..."
1601106-18 = "Not as a coach or anything. I thought we'd go into it as workout buddies."
1601106-19 = "Is that too much? Now that I've said it out loud, I feel kind of awkward..."
1601106-20 = "[s3] \"Sounds good to me. Looking forward to it.\"\n[s4] \"This is just what I need. I've been feeling stiff these days.\""
1601106-23 = "Heehee... That's a relief. Exercise should be fun, not burdensome."
1601106-24 = "Actually, what you said before... It's what gave me this idea."
1601106-30 = "Shall we start with off with something light?"
1601106-47 = "I followed Hasumi's movements and completed a set of exercises."
1601106-51 = "Oh. Sensei, can you hold on a moment?"
1601106-52 = "Stay just like that. I'll be right over."
1601106-53 = "Your head should be lower for this movement..."
1601106-54 = "I'll correct it for you."
1601106-61 = "From this..."
1601106-65 = "To this."
1601106-70 = "[ns5] \"...?! H-Hasumi?!\"\n[ns6] \"(...?! Something is touching me...?!)\""
1601106-75 = "...Hm? Something wrong, Sensei? You seem uncomfortable..."
1601106-76 = "Huh? You think you're fine on your own? What do you mean?"
1601106-77 = "Did I press too hard? Or..."
1601106-81 = "...Ah."
1601106-87 = "(Is it because I'm weighing Sensei down?)"
1601106-88 = "(Is it that...I'm too heavy?! And Sensei is too nice to say anything?!)"
1601106-94 = "[ns7] \"...Hasumi?\"\n[ns8] \"Why the sudden distance?\""
1601106-97 = "I-I'm sorry, Sensei! I never meant to...!"
1601106-98 = "You're fine? B-But..."
1601106-99 = "...Huh? We should take turns?"
1601106-100 = "You're gonna watch my form this time? I mean, I guess I don't mind..."
1601106-101 = "[s9] \"I'd feel better if I contributed too.\"\n[s10] \"We're workout buddies, so we should help each other out.\""
1601106-104 = "Hmm..."
1601106-105 = "Fair enough. You can help me this time..."
1601106-106 = "Helping...with my...posture..."
1601106-112 = "Th-Then..."
1601106-113 = "I'm...counting on you...Sensei..."
1601106-117 = "*huff* *puff*"
1601106-118 = "That should be three sets..."
1601106-119 = "Should that be it for today?"
1601106-120 = "...Ah."
1601106-121 = "I'm sorry. I said that as if it's a given we'll keep doing this together."
1601106-122 = "I didn't mean to impose..."
1601106-123 = "Oh? You assumed that was the case too?"
1601106-124 = "I-I mean... Yeah, sure, if you want to..."
1601106-128 = "...Heehee. I see."
1601106-129 = "Then we're in agreement."
1601106-130 = "Thank you, Sensei."
1601106-132 = "I'm looking forward to next time."

[translation]
1601106-1 = "ช่วยวางท่า"
1601106-2 = "(คุณครูเลือกวันที่ค่อนข้างเงียบสงบ และติดต่อไปนัดวันออกกำลังกายกับฮาสุมิตามที่สัญญาไว้)"
1601106-3 = "(พอมาถึงที่โรงยิมในอาคารเล็กๆ แห่งหนึ่งบริเวณชานเมือง ก็เจอฮาสุมิที่มารออยู่ก่อนแล้ว)"
1601106-7 = "อ๊ะ มาแล้วเหรอคะคุณครู ฉันกำลังรออยู่เลยค่ะ"
1601106-8 = "คะ...?"
1601106-9 = "คิดว่าตัวเองมาถึงเร็วแล้ว แต่ฉันกลับมาถึงเร็วกว่าอีกงั้นเหรอคะ...?"
1601106-10 = "ฮุฮุ... ก็ต้องเป็นแบบนั้นสิคะ ที่ฉันนัดคุณครูมาในวันนี้เพราะจะจัดท่าทางที่สอดคล้องกับจุดประสงค์ค่ะ"
1601106-11 = "[s1] \"ท่าทางที่สอดคล้องกับจุดประสงค์เหรอ?\"\n[s2] \"หืม? หมายถึงอะไรเหรอ?\""
1601106-14 = "อย่างที่ฉันบอกไปค่ะ วันนี้ฉันไม่ได้นัดคุณครูมาออกกำลังกายเพื่อเพิ่มสมรรถนะร่างกายหรอกค่ะ"
1601106-15 = "ตอนจัดงานฮาโลเฟสติวัลที่ผ่านมา ฉันสังเกตเห็นบางอย่างน่ะค่ะ ถึงจะยังทำได้ไม่ดีเท่าไรก็เถอะค่ะ..."
1601106-16 = "แต่ยังไงถ้าเป็นเรื่องง่ายๆ ฉันคิดว่าก็อาจจะพอช่วยคุณครูได้บ้างค่ะ..."
1601106-17 = "อย่างเช่นการช่วยจัดท่า หรือทำให้คุณครูดูเป็นตัวอย่างก่อนดี..."
1601106-18 = "แต่ไม่ใช่เป็นโค้ชหรอกนะคะ... อยากให้คิดว่าเป็นการ \"ออกกำลังกายด้วยกัน\" มากกว่าค่ะ"
1601106-19 = "หรือว่าฉันทำอะไรลงไปโดยไม่จำเป็นรึเปล่าคะ? พอพูดไปแล้วจู่ๆ ก็รู้สึกกังวลขึ้นมา..."
1601106-20 = "[s3] \"ไม่หรอก รบกวนด้วยนะ\"\n[s4] \"ดีเลย ช่วงนี้ไหล่ครูก็ตึงๆ อยู่เหมือนกัน\""
1601106-23 = "ฮุฮุ... ถ้าคุณครูพูดแบบนั้นก็ค่อยยังชั่วค่ะ หวังว่าคุณครูจะสนุกกับการออกกำลังกายและไม่ลำบากใจ#nจนเกินไปนะคะ"
1601106-24 = "อันที่จริงที่คุณครูเคยบอกฉันก่อนหน้านี้... ฉันก็อยากเอามาลองใช้แบบนี้ดูค่ะ"
1601106-30 = "ไหนๆ ก็พูดเรื่องนี้แล้ว เรามาเริ่มจากอะไรเบาๆ ก่อนดีมั้ยคะ?"
1601106-47 = "(จากนั้นคุณครูก็ทำท่าตามฮาสุมิ และออกกำลังกายท่าง่ายๆ หนึ่งเซ็ต)"
1601106-51 = "อ๊ะ คุณครู ช่วยอยู่นิ่งๆ สักครู่ได้มั้ยคะ?"
1601106-52 = "ท่าแบบนั้น... ค่ะ ช่วยอยู่แบบนั้นก่อนนะคะ เดี๋ยวฉันเดินไปหาค่ะ"
1601106-53 = "ท่าเมื่อสักครู่นี้... ดูเหมือนจะต้องก้มลงให้ต่ำอีกสักหน่อย..."
1601106-54 = "เดี๋ยวฉันช่วยจับเองค่ะ"
1601106-61 = "ถ้าทำแบบนี้..."
1601106-65 = "และตรงนี้ก็แบบนี้อีกหน่อย..."
1601106-70 = "[ns5] \"...!? ฮะ... ฮาสุมิ...!?\"\n[ns6] (....!? จู่ๆ ก็รู้สึกเหมือนโดนอะไรบางอย่าง...!?)"
1601106-75 = "อืม... คุณครู ทำไมทำหน้าแบบนั้นคะ? ดูเหมือนไม่ค่อยสบายตัวตรงไหนเลย..."
1601106-76 = "คะ...? ดูเหมือนจะทำคนเดียวได้งั้นเหรอคะ? หมายความว่ายังไง..."
1601106-77 = "หรือว่าฉันจับแรงเกินไปเหรอคะ...?"
1601106-81 = "อา..."
1601106-87 = "(หรือว่าเพราะฉันกดคุณครูอยู่...)"
1601106-88 = "(คุณครู... รู้สึกหนักๆ... งั้นเหรอ? หรือว่า... เกรงใจที่จะบอก...งั้นเหรอ...!?)"
1601106-94 = "[ns7] \"ฮาสุมิ...?\"\n[ns8] \"ทำไมจู่ๆ เหมือนระยะห่างมันเพิ่มขึ้นนะ?\""
1601106-97 = "ขะ... ขอโทษค่ะคุณครู! ฉันไม่ได้ตั้งใจจะทำแบบนั้นเลยนะคะ...!!"
1601106-98 = "เป็นอะไรรึเปล่าคะ? คะ...คือว่า...!"
1601106-99 = "คะ...? คราวนี้มาแลกกันเหรอคะ?"
1601106-100 = "คราวนี้คุณครูจะดูท่าทางให้ฉันเหรอคะ? ระ...เรื่องนั้นก็ไม่มีปัญหาหรอกค่ะ แต่ว่ามัน..."
1601106-101 = "[s9] \"แบบนี้ครูจะสบายใจขึ้นนะ\"\n[s10] \"ก็ออกกำลังกายด้วยกันนี่นา ต้องผลัดกันสิ\""
1601106-104 = "อืม..."
1601106-105 = "เข้าใจแล้วค่ะ ถะ... ถ้างั้นคราวนี้คุณครูก็ช่วยดู..."
1601106-106 = "ทะ... ท่าทาง... "
1601106-112 = "ถะ... ถ้างั้น..."
1601106-113 = "ขะ...ขอรบกวนด้วยนะคะ คุณครู..."
1601106-117 = "แฮ่ก.. แฮ่ก... แฮ่ก..."
1601106-118 = "ดูเหมือนวันนี้เราจะทำไปได้ 3 เซ็ตแล้ว..."
1601106-119 = "ถ้างั้นวันนี้พอแค่นี้ก่อนดีมั้ยคะ?"
1601106-120 = "อา..."
1601106-121 = "ขอโทษค่ะ ดันพูดเหมือนจะทำต่อไปเรื่อยๆ ไปซะแล้ว..."
1601106-122 = "ฉันเผลอพูดไปโดยไม่รู้ตัว..."
1601106-123 = "คะ? คุณครูไม่ได้คิดแบบนั้นเลยเหรอคะ?"
1601106-124 = "คือว่า... ฉันยังไงก็ได้ค่ะ แต่ถ้าคุณครูโอเคละก็..."
1601106-128 = "ฮุฮุ... อย่างนี้นี่เองสินะคะ"
1601106-129 = "เอาอย่างนั้นก็ได้ค่ะ"
1601106-130 = "ขอบคุณนะคะ... คุณครู"
1601106-132 = "ต่อไปก็ขอรบกวนด้วยนะคะ..."

[translation]
2000006-1 = "หากเป็นความฝัน ก็อยากใช้เวลาทั้งวันกับคุณ"
2000006-2 = "ชมรมวิศวกรรม มิลเลเนียม"
2000006-3 = "การนอนหลับเป็นเรื่องสำคัญมากนะ"
2000006-4 = "ที่จริงฉันเป็นพวกนอนหลับง่าย หลับได้ทุกที่เลย..."
2000006-5 = "แต่ฉันได้ยินมาว่าการเป็นโรคนอนไม่หลับนี่ทรมานมากเลย"
2000006-6 = "ฉันมีคนรู้จักหลายคนที่ต้องทรมานเพราะโรคนอนไม่หลับด้วย"
2000006-7 = "หืม? คือ... รอยคล้ำใต้ตาของฉันมันเพิ่มขึ้นเยอะกว่าเดิมเหรอ?"
2000006-8 = "ไม่หรอก... คงเป็นเพราะช่วงนี้ทำงานโต้รุ่งบ่อยๆ..."
2000006-9 = "....."
2000006-10 = "ยะ...อย่าจ้องกันแบบนั้นสิ"
2000006-11 = "ยังไงก็เถอะ สำหรับพวกคนที่นอนไม่ค่อยหลับน่ะ ช่วงเวลากลางคืนเป็นช่วงที่ทรมานมากเลยนะ"
2000006-12 = "เพราะงั้นฉันเลยพัฒนาผลิตภัณฑ์ใหม่ขึ้นมาสองชนิด"
2000006-13 = "อย่างแรกก็คือ..."
2000006-14 = "เครื่องทำให้สลบ"
2000006-15 = "[s1] \"ครูคิดว่าชื่อมันชวนให้เข้าใจผิดไปไกลเลยนะ?\"\n[s2] \"เห... หมอนงั้นเหรอ?\""
2000006-16 = "ไม่ใช่สักหน่อย"
2000006-17 = "มันเหมือนกับเตียงนอนชนิดหนึ่งมากกว่า"
2000006-18 = "แต่ก็อาจจะแตกต่างกันไปตามแต่ละคน...\n"
2000006-19 = "คนส่วนใหญ่ใช้เวลาหนึ่งในสามของวัน... ไม่สิ หนึ่งในสามของชีวิตอยู่บนที่นอน"
2000006-20 = "เพราะงั้นการเลือกลงทุนซื้อเครื่องนอนก็เหมือนกับการลงทุนให้เวลาหนึ่งในสามของชีวิตเลยนะ"
2000006-21 = "คุณครูช่วยนอนลงมาบนอุปกรณ์ที่เหมือนกับหมอนนี่หน่อยได้มั้ย?"
2000006-22 = "หืม? แค่อยากนอน ไม่ได้อยากสลบไปงั้นเหรอ?"
2000006-23 = "อืม... ฉันไม่ค่อนเชี่ยวชาญเรื่องการยศาสตร์ซะด้วยสิ"
2000006-24 = "ได้ยินว่าคนที่สลบแล้วฟื้นขึ้นมาจะรู้สึกสดชื่นเหมือนกับคนที่ได้นอนพักยาวๆ เลยนะ"
2000006-25 = "หืม? ยังไงการที่จู่ๆ สลบไปมันก็ไม่ดีงั้นเหรอ?"
2000006-26 = "อืม... งั้นเหรอ..."
2000006-27 = "แต่ก็นะ มันเพิ่งจะเป็นแค่ตัวต้นแบบเท่านั้น"
2000006-28 = "ฉันยังมีของอย่างอื่นที่คุณครูอาจจะชอบมากๆ ก็ได้อยู่อีกอย่างนะ"
2000006-29 = "ชื่อของมันก็คือ..."
2000006-30 = "\"ท่อเหล็กสลบเหมือด\" ยังไงล่ะ...."
2000006-35 = "อ๊ะ ทำไมถอยไปไกลขนาดนั้นล่ะ"
2000006-36 = "ดูเหมือนคุณครูคงกำลังเข้าใจผิดอยู่สินะ"
2000006-37 = "มันอาจจะดูเก่าไปสักหน่อย... แต่ฉันรับประกันประสิทธิภาพของท่อเหล็กสลบเหมือดนี่ได้เลยนะ"
2000006-38 = "[s] \"หลังจากลองแล้วจะหลับไม่ตื่นฟื้นไม่มีเลยมั้ย...\""
2000006-39 = "อ่า... อย่าเพิ่งเข้าใจผิดสิ ถ้าใช้ท่อนี่ฟาดเข้าที่หลังท้ายทอยของคุณครู..."
2000006-40 = "แบบนั้นมันดูอนาล็อกเกินไปไม่ใช่รึไง"
2000006-41 = "อีกอย่างท่อเหล็กนี่น่ะ..."
2000006-42 = "ฉันเพิ่มฟังก์ชั่นสุดโปรดของฉันเข้าไปด้วยนะ"
2000006-43 = "[s3] \"ระเบิดตัวเอง....?\"\n[s4] \"ทำลายล้าง....?\""
2000006-44 = "ฟังก์ชั่นบลูทูธต่างหากล่ะ"
2000006-45 = "ฟังก์ชั่นบลูทูธต่างหากล่ะ"
2000006-46 = "ท่อเหล็กอันนี้น่ะ มีบทเรียนวิชาฟิสิกส์ที่แค่ฟังแล้วก็หลับได้อยู่กว่าสิบบทเลยนะ..."
2000006-47 = "นอกจากนั้นยังเล่นเพลงกล่อมนอนได้มากกว่าสองร้อยเพลงอีกด้วย"
2000006-48 = "[s5] \"ลองดูเลยมั้ย?\"\n[s6] \"ของพวกนี้ไม่น่าจะช่วยให้หลับได้นะ\""
2000006-49 = "จริงเหรอ?"
2000006-50 = "จริงเหรอ?"
2000006-51 = "ถ้างั้นคุณครู... ฉันเตรียมเตียงนอนไว้ให้แล้วล่ะ"
2000006-52 = "ลองนอนดูสิ"
2000006-54 = "ยอดเลย ถ้างั้นเดี๋ยวฉันเปิดเพลงให้นะ"
2000006-55 = "ท่อเหล็กสลบเหมือด... เปิดใช้งาน!"
2000006-61 = "......."
2000006-62 = "....หึหึ คุณครูดูเหนื่อยมากเลยนะคะ"
2000006-63 = "ทันทีที่ได้ยินเสียงเพลงก็ผลอยหลับไปเลย"
2000006-64 = "สิ่งประดิษฐ์คราวนี้ต้องสำเร็จอย่างแน่นอน ขอบคุณคุณครูมากเลยนะ"
2000006-65 = "แล้วก็...."
2000006-66 = "....หึหึ"
2000006-67 = "ตอนคุณครูนอนน่ารักมากเลยนะ"

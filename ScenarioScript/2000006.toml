[translation]
2000006-1 = "如果要做夢，我想在夢中和你共度一天"
2000006-2 = "千年．工程師部"
2000006-3 = "睡眠很重要。"
2000006-4 = "雖然我覺得只要能躺，就算是棺材也沒關係……"
2000006-5 = "但聽說失眠是件很難受的事。"
2000006-6 = "我身邊也很多人為此所苦。"
2000006-7 = "嗯？……你說我黑眼圈好像很嚴重？"
2000006-8 = "不……我只是熬夜熬過頭了。"
2000006-9 = "……"
2000006-10 = "……不，不要一直盯著我看。"
2000006-11 = "總之，對無法入眠的人來說，夜晚是很難熬的。"
2000006-12 = "所以我先準備了兩個試作品。"
2000006-13 = "第一個的名字是……"
2000006-14 = "「昏厥機」。"
2000006-15 = "[s1] 「好像從名字中發現了嚴重的錯誤。」\n[s2] 「是枕頭嗎？」"
2000006-16 = "是你多心了。"
2000006-17 = "姑且是做成寢具的形狀啦。"
2000006-18 = "雖然每個人多少有所差異……"
2000006-19 = "但人的一天……不，一生有三分之一會在床上度過。"
2000006-20 = "因此，對於寢具的投資，可以說是選擇要讓人生的三分之一過得更加舒適。"
2000006-21 = "總之，能請老師先躺在這個枕頭形的機器嗎？"
2000006-22 = "嗯？你說只是想要熟睡，不是想要昏厥？"
2000006-23 = "唔嗯，雖然我對人體工學沒什麼自信。"
2000006-24 = "但不是也曾有人說，有時昏厥後醒來，感覺就像歷經長時間睡眠一樣舒爽嗎？"
2000006-25 = "嗯？你說總之昏厥不是好事？"
2000006-26 = "唔嗯，或許吧。"
2000006-27 = "嘛，不過這本來就只是原型而已。"
2000006-28 = "還有其他……更能滿足老師的作品。"
2000006-29 = "它的名字……"
2000006-30 = "雖然叫做「昏迷鐵管」……"
2000006-35 = "啊，為什麼要站那麼遠。"
2000006-36 = "看來老師又誤會了。"
2000006-37 = "雖然方法有點傳統…… #n但這個昏迷鐵管的效果是有經過驗證的。"
2000006-38 = "[s]「感覺一不小心就會永遠沉睡。」"
2000006-39 = "啊，別誤會。雖然說是傳統方法，"
2000006-40 = "但絕不是毆打後腦杓那麼傳統。"
2000006-41 = "這個鐵管……"
2000006-42 = "搭載了我最喜歡的功能。"
2000006-43 = "[s3] 「自爆功能……？」\n[s4] 「殺傷功能……？」"
2000006-44 = "是藍牙喇叭功能。"
2000006-45 = "是藍牙喇叭功能。"
2000006-46 = "這個鐵管，安裝了光聽就很想睡的物理學課10堂……"
2000006-47 = "以及約200首助眠音樂，可以依喜好播放。"
2000006-48 = "[s5] 「我能試一下嗎？」\n[s6] 「這種東西會讓人想睡……」"
2000006-49 = "真的嗎？"
2000006-50 = "真的嗎？"
2000006-51 = "總之來試試看吧，老師。 #n已經準備好簡單的寢具了。"
2000006-52 = "要躺一下看看嗎？"
2000006-54 = "好。那麼，我來放音樂。"
2000006-55 = "昏迷鐵管……啟動。"
2000006-61 = "……"
2000006-62 = "……呵呵， #n老師，你似乎非常累的樣子。"
2000006-63 = "幾乎才剛開始播放就失去意識了。"
2000006-64 = "這次的作品也多虧老師……應該能得到好評。"
2000006-65 = "而且……"
2000006-66 = "……呵呵，"
2000006-67 = "老師睡覺的樣子，真可愛。"

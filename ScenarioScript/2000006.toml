[translation]
2000006-1 = "Dreaming of a Day With You"
2000006-2 = "Millennium Engineering Department"
2000006-3 = "Sleep is vital to your health."
2000006-4 = "I've always been able to fall asleep anywhere as long as I can lie down."
2000006-5 = "I can't imagine how awful it must be to have insomnia..."
2000006-6 = "...but I do know a lot of people suffer from it."
2000006-7 = "Huh? You think I've begun to get bags under my eyes?"
2000006-8 = "I suppose I have been pulling too many all-nighters these days..."
2000006-9 = "..."
2000006-10 = "Come on, don't stare at me like that."
2000006-11 = "Anyway! Nighttime can be stressful for insomniacs."
2000006-12 = "That's why I've developed two new products."
2000006-13 = "The first one is what I like to call..."
2000006-14 = "...the Fainting Machine."
2000006-15 = "[s1] \"That name has an intimidating aura.\"\n[s2] \"Is it supposed to be a pillow?\""
2000006-16 = "On the contrary."
2000006-17 = "It's more like a bed."
2000006-18 = "Granted, there are always exceptions..."
2000006-19 = "...but most people spend a third of their life sleeping."
2000006-20 = "In other words, you spend a third of your life lying on your bed."
2000006-21 = "Here. Try lying down on this pillow-shaped machine."
2000006-22 = "What, are you still concerned about the \"fainting\" part?"
2000006-23 = "Well...it's not like I'm in expert in ergonomics..."
2000006-24 = "All I know is that people often claim to be well-rested after waking up from fainting."
2000006-25 = "Do you think fainting is unhealthy to begin with?"
2000006-26 = "Hm... Good point."
2000006-27 = "To be fair, this is still only a prototype."
2000006-28 = "I have something else that you might be interested in."
2000006-29 = "I call it..."
2000006-30 = "...the Knockout Pipe."
2000006-35 = "Why are you backing away from me?"
2000006-36 = "Hear me out first."
2000006-37 = "This method may be a bit crude...but the Knockout Pipe is scientifically proven to work!"
2000006-38 = "[s] \"I'm not sure if I'd ever wake up from that.\""
2000006-39 = "You worry too much. It's only meant to strike the occipital region of your head."
2000006-40 = "It's not going to KILL you."
2000006-41 = "That's not all. This bad boy..."
2000006-42 = "...is equipped with my favorite feature."
2000006-43 = "[s3] \"Self-destruction...?\"\n[s4] \"Annihilation...?\""
2000006-44 = "Bluetooth."
2000006-45 = "Bluetooth."
2000006-46 = "It comes pre-loaded with 10 different physics lectures that will put you right to sleep."
2000006-47 = "There are also over 200 sleep-inducing songs, depending on what genres you're into."
2000006-48 = "[s5] \"Now I'm on board!\"\n[s6] \"Is that really going to help?\""
2000006-49 = "Really?"
2000006-50 = "Really?"
2000006-51 = "Okay, Sensei. I've prepared this bed for you."
2000006-52 = "Please lie down."
2000006-54 = "Great. Now to turn on the music."
2000006-55 = "The Knockout Pipe is now...good to go!"
2000006-61 = "..."
2000006-62 = "Heh... You must have been pretty tired, Sensei."
2000006-63 = "You passed out as soon as the music started."
2000006-64 = "I'm calling this one a success thanks to you."
2000006-65 = "And..."
2000006-66 = "...Heehee."
2000006-67 = "You look so cute when you're sleeping."

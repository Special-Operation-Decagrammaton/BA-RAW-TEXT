[translation]
10011085-4 = "I can't believe it! You can maximize your combat capabilities to that degree, just because Sensei is helming the command?"
10011085-5 = "I don't understand. Why do you persevere?"
10011085-6 = "Like I said, there's a much easier avenue for you to become an official club."
10011085-7 = "That's easy."
10011085-11 = "We want to support our president's decisions."
10011085-15 = "Whatever they may be."
10011085-16 = "You got that right! Hear! Hear!"
10011085-17 = "Yessir! We're standing behind our president, because..."
10011085-21 = "That's what we do at the Ninjutsu Research Club!"
10011085-22 = "...!"
10011085-23 = "It... It's not like I don't see it too."
10011085-24 = "Even someone stupid like me understands what type of person our president is."
10011085-27 = "She can be petty, selfish, and sometimes downright pretentious."
10011085-28 = "I've really considered that she might be a lost cause."
10011085-29 = "Not to mention...so, so reckless!"
10011085-31 = "But in spite of all of that..."
10011085-32 = "She works so hard so that we can keep pursuing our love of ninjas!"
10011085-36 = "That's who she is too!"
10011085-41 = "Tsukuyo, right?"
10011085-42 = "Wow, you really are tall!"
10011085-43 = "...!"
10011085-44 = "Oh! Well...um... You know, I'm..."
10011085-45 = "You know, all of the greatest ninjas are super tall too!"
10011085-46 = "If you're interested..."
10011085-50 = "You should join the Ninjutsu Research Club! It's my club, and it's the best club ever!"
10011085-56 = "I like our president! And I respect her!"
10011085-57 = "That's why I'm standing by her. We're going to make the show a success and make you recognize our club. No matter what!"
10011085-58 = "And we're gonna honor our promise to Ibuki!"
10011085-59 = "That's what being a ninja is all about!"
10011085-60 = "...Right? President?"
10011085-62 = "Tsukuyo... I...!"
10011085-63 = "That's what...being a ninja is about...?"
10011085-71 = "[ns] \"I hope that isn't what I think it is.\""
10011085-78 = "Everyone okay?"
10011085-79 = "[s] \"Iroha?!\""
10011085-80 = "Uh-huh! I found her walking around in circles inside the mansion and brought her out!"
10011085-81 = "But then we found this tank and she said she really wanted to ride it!"
10011085-82 = "I realized something while I was lost inside that mansion."
10011085-83 = "I don't know what I've been doing, trying to do this the honest way, pounding the pavement like some idiot. That's never been my style."
10011085-84 = "I'm not letting things end here. I'm saving Ibuki, one way or another."
10011085-85 = "You haven't given up yet either, have you?"
10011085-86 = "H-Hang on just a second?!"
10011085-90 = "...President?"
10011085-91 = "President!"
10011085-95 = "[s] \"Michiru.\""
10011085-102 = "I don't know anything anymore, but here goes nothing! Ninjutsu Research Club, move out!"

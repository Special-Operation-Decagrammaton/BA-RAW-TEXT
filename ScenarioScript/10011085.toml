[translation]
10011085-4 = "ถ้ามีคุณครูคอยสั่งการละก็... มาสู้กันอย่างนี้จะดีเหรอคะ...?"
10011085-5 = "แต่ว่าทุกคนคะ ทำไมเราต้องทำถึงขั้นนั้นด้วยล่ะคะ?"
10011085-6 = "หนทางที่จะได้เป็นชมรมทางการ นอกจากการแสดงครั้งนี้ก็ยังมีอีกเยอะนะคะ"
10011085-7 = "คำตอบก็ไม่มีอะไรมากค่ะ"
10011085-11 = "ฉันก็แค่อยากทำตามที่ท่านหัวหน้าตัดสินใจเท่านั้นค่ะ"
10011085-15 = "ไม่ว่าท่านหัวหน้าจะตัดสินใจแบบไหน ฉันก็เห็นด้วยค่ะ"
10011085-16 = "ใช่ค่ะ! อิซุนะก็เหมือนกันค่ะ!"
10011085-17 = "ใช่แล้วค่ะ! เราจะทำตามที่ท่านหัวหน้าตัดสินใจค่ะ เพราะว่า..."
10011085-21 = "เพราะว่าพวกเราคือชมรมวิจัยศาสตร์นินจาไงล่ะ!"
10011085-22 = "...!"
10011085-23 = "คือว่า... แม้แต่ฉันคนนี้... ก็รับรู้ได้ค่ะ!"
10011085-24 = "ในเวลาปกติ! ท่านหัวหน้ามักจะมีความคิดแบบไหน...!"
10011085-27 = "บางครั้งก็ตื้นเขิน โลภมาก และเพ้อฝันเอามากๆ"
10011085-28 = "จนบางทีฉันก็คิดว่าเป็นคนแบบที่ช่วยไม่ได้สินะคะ"
10011085-29 = "ไม่ว่าเมื่อไร... ไม่ว่าเมื่อไร... ก็ทำอะไรโดยไม่คิดค่ะ!"
10011085-31 = "แต่ถึงอย่างนั้นก็เป็นคนที่ชอบนินจามากค่ะ"
10011085-32 = "ไม่ว่าเมื่อไรก็พยายามทำเพื่อพวกเราอย่างเต็มที่ตลอด...!"
10011085-36 = "เพราะว่าเป็นท่านหัวหน้าแบบนั้นน่ะค่ะ...!"
10011085-41 = "เธอคือสึคุโยะสินะ?"
10011085-42 = "เธอ... ตัวใหญ่สุดๆ ไปเลยนะเนี่ย..."
10011085-43 = "!!"
10011085-44 = "เอ่อ คือ... คือว่า... คือเรื่องนั้น ฉัน...!"
10011085-45 = "นั่นเป็นจุดแข็งที่สุดของนินจาเลยนะ!"
10011085-46 = "ถ้าไม่ติดอะไรละก็..."
10011085-50 = "ว่าไง? ชมรมสุดแข็งแกร่งที่ข้าน้อยสร้างขึ้น! มาเข้าชมรมวิจัยศาสตร์นินจาด้วยกันมั้ย?"
10011085-56 = "เพราะว่าฉันชอบ! และเคารพยังไงล่ะคะ!"
10011085-57 = "เพราะงั้นก็เลยจะทำตามที่ท่านหัวหน้าตัดสินใจค่ะ! ทำให้การแสดงสำเร็จลุล่วง! และเป็นชมรมทางการ#nให้ได้เลยค่ะ!"
10011085-58 = "เราจะต้องรักษาสัญญา! ที่ให้ไว้กับท่านอิบูกิให้ได้ค่ะ!"
10011085-59 = "ใช่ค่ะ! เพราะพวกเราคือ... นินจาค่ะ!"
10011085-60 = "ใช่มั้ยคะ??! ท่านหัวหน้า?!"
10011085-62 = "สึคุโยะ ข้าน้อยน่ะ...!"
10011085-63 = "เรื่อง... นินจานั่นน่ะ..."
10011085-71 = "[ns] \"หืม...? เสียงนี้มัน...\""
10011085-78 = "ทุกคนปลอดภัยดีรึเปล่าคะ?"
10011085-79 = "[s] \"อิโรฮะ?!\""
10011085-80 = "อื้อ! เห็นว่ายังหลงอยู่ในคฤหาสน์นินจา! ก็เลยพามาน่ะ!"
10011085-81 = "แต่พอออกมาจากคฤหาสน์ก็เห็นรถถังมาจากไหนไม่รู้นี่สิ! แล้วก็บอกให้ขึ้นมาด้วยกันน่ะ ก็เลย...!"
10011085-82 = "ระหว่างที่หลงทางอยู่ในคฤหาสน์ก็นึกขึ้นมาได้..."
10011085-83 = "ว่าทำไมถึงต้องเอาแต่วิ่งไปตามทางที่กำหนดตามกติกาแบบนั้น ถ้าใช้วิธีนี้ซะตั้งแต่แรกก็จบเรื่อง"
10011085-84 = "ฉันจะไม่ยอมให้การไล่ตามจับคนร้ายไม่คืบหน้าแบบนี้... ฉันจะเป็นคนไปช่วยอิบูกิเองค่ะ"
10011085-85 = "ทุกคนคงยังไม่ได้ยอมแพ้กับการไล่ตามจับคนร้ายหรอกใช่ไหมคะ?"
10011085-86 = "ดะ... เดี๋ยวก่อนสิคะ?!"
10011085-90 = "ท่านหัวหน้าคะ!"
10011085-91 = "หัวหน้า!"
10011085-95 = "[s] \"มิจิรุ\""
10011085-102 = "อ๊ากกก...! ไม่รู้ด้วยแล้ว! ดีละ! ไปกันเถอะ!"

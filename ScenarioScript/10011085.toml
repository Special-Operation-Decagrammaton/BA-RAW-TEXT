[translation]
10011085-4 = "原來如此，這就是「老師」的……"
10011085-5 = "……事到如今可能有點晚了，各位為什麼要做到這種地步呢？"
10011085-6 = "要成為正式社團的方法，除此之外還有很多不是嗎？"
10011085-7 = "答案很簡單。"
10011085-11 = "我只是，想要跟隨部長的決定……而已。"
10011085-15 = "無論部長，心理，有什麼打算。"
10011085-16 = "沒錯！伊樹菜也是！"
10011085-17 = "我們都會信任，且不會輕視他。因為──"
10011085-21 = "因為我們是「忍術研究部」……！"
10011085-22 = "……！"
10011085-23 = "我也……大概能感覺得出來……"
10011085-24 = "不過，我覺得這樣也很好……"
10011085-27 = "輕率、貪心、喜歡虛張聲勢……"
10011085-28 = "到了令人無言的地步……"
10011085-29 = "總是走一步算一步……！"
10011085-31 = "不過，卻非常喜歡忍者……"
10011085-32 = "為了我們，部長總是非常努力……"
10011085-36 = "所以……！"
10011085-41 = "你就是月夜？"
10011085-42 = "哦哦，長的這麼高真帥氣呢！"
10011085-43 = "！！"
10011085-44 = "咦，啊，那個，我……"
10011085-45 = "感覺能成為超～強的忍者！"
10011085-46 = "如果可以的話……"
10011085-50 = "要不要加入我建立的最強社團「忍術研究部」呀？"
10011085-56 = "我非常喜歡，而且尊敬著部長！"
10011085-57 = "所以，我會在部長相信的道路上前進！#n想讓公演成功，成為正式的社團……！"
10011085-58 = "與伊吹閣下的約定！還有伊樹菜和夥伴們的心願！一定會實現給你看的！"
10011085-59 = "是！因為，這就是忍者！"
10011085-60 = "……對吧，部長？"
10011085-62 = "月夜，我……！"
10011085-63 = "是嗎……"
10011085-71 = "[ns]「……嗯？這個聲音是……？」"
10011085-78 = "大家都沒事嗎？"
10011085-79 = "[s]「伊呂波！？」"
10011085-80 = "我看他在[ruby=Trick House]機關屋[/ruby]裡迷路，所以就把他帶來了！"
10011085-81 = "不知道在什麼時候準備了一台戰車，真是嚇了我一跳呢～"
10011085-82 = "……我在那個[ruby=Trick House]機關屋[/ruby]還是什麼東西裡面徘徊的時候意識到了。"
10011085-83 = "為什麼要傻傻地用自己的腳走呢……"
10011085-84 = "一開始就該這麼做的……我會再次前去救出伊吹。"
10011085-85 = "大家都還沒放棄吧？"
10011085-86 = "請，請等一下……！"
10011085-90 = "部長！"
10011085-91 = "部長！！"
10011085-95 = "[s]「三千留。」"
10011085-102 = "……啊啊啊啊啊啊真是的！！#n好，心情舒服多了！上吧，忍術研究部！"

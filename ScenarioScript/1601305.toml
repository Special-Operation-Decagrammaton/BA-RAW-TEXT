[translation]
1601305-1 = "Koharu's Night Sky"
1601305-4 = "I was sitting on the beach, when Koharu soon joined me. I could tell from her quiet footsteps that she was tiptoeing."
1601305-9 = "...Th-This is where you've been, Sensei!"
1601305-10 = "What are you doing? If we were at Trinity, this would be past curfew!"
1601305-11 = "Huh?"
1601305-12 = "You wanted to see the stars, since the skies are so clear out here?"
1601305-13 = "That doesn't make any sense. I can see the stars from my dorm room in Trinity whenever I want."
1601305-14 = "That's just an excuse, isn't it! You're planning dirty things out here by yourself!"
1601305-15 = "...Huh? There's a difference between the stars here and back at home?"
1601305-16 = "What do you mean—"
1601305-17 = "[s1] \"Look carefully yourself, Koharu.\"\n[s2] \"The sky looks different without the city lights.\""
1601305-20 = "What are you talking about...?"
1601305-21 = "Hmm..."
1601305-26 = "...!"
1601305-29 = "Wh-What's going on here? There are so many more stars!"
1601305-30 = "It doesn't make sense. It's still the same sky I look at back at home!"
1601305-31 = "I know we're somewhere new, but this looks totally different!"
1601305-32 = "[s3] \"Artificial lights tend to drown out the stars.\"\n[s4] \"The darker the night, the brighter the stars shine.\""
1601305-37 = "Really...? I guess that kind of makes sense."
1601305-38 = "So you came all the way out here to go stargazing by yourself?"
1601305-39 = "I see..."
1601305-40 = "That excuse...actually kind of makes sense. Hm..."
1601305-41 = "[s5] \"What about you, Koharu?\"\n[s6] \"Why did you come find me?\""
1601305-46 = "Me?! J-Just because! I didn't have any particular reason...!"
1601305-47 = "I mean, it's my duty to keep an eye on you! You should know that by now!"
1601305-48 = "...What? Why wasn't I asleep?"
1601305-49 = "Well..."
1601305-50 = "But...! But..."
1601305-51 = "I just... I woke up out of nowhere but I didn't see you... so..."
1601305-52 = "I got worried something might have happened..."
1601305-56 = "H-Hey! Stop laughing right now! Stop it!"
1601305-57 = "I take back what I just said! Never mind! I'm not worried about you at all!"
1601305-58 = "Forget it! I'm going to back to sleep! You can enjoy your stars, Sensei!"
1601305-68 = "..."
1601305-69 = "[s7] \"...Koharu?\"\n[s8] \"Didn't you say you're going back to sleep?\""
1601305-74 = "W-Well..."
1601305-75 = "Well..."
1601305-76 = "So... umm..."
1601305-80 = "[ns9] \"I'm getting pretty sleepy, actually.\"\n[ns10] Silently return with Koharu."
1601305-86 = "Ugh. It's farther than I thought...and darker..."
1601305-87 = "If I knew it was going to be this dark, I should have just told Sensei to come to me..."
1601305-88 = "...Sensei? You're right next to me, right? Right?"
1601305-89 = "[s11] \"I'm still holding your hand. Don't be afraid.\"\n[s12] \"Should we slow down if it's too scary?\""
1601305-94 = "I-I never said I was scared of anything!"
1601305-95 = "It's just, um..."
1601305-96 = "The pathways are dangerous at night! People can trip and DIE!"
1601305-97 = "A-And... Umm..."
1601305-98 = "Um..."
1601305-99 = "Actually... I guess...as long as I'm with you... It'll probably be okay..."
1601305-100 = "Maybe everything will be all right..."
1601305-104 = "...Heehee."
1601305-105 = "Heeheehee..."
1601305-109 = "Eep!"
1601305-110 = " What was that noise? It was really close by!"
1601305-115 = "[ns13] \"Calm down, Koharu. Just...\"\n[ns14] \"I'm sure it was just a small animal.\""
1601305-120 = "Eeeeek!"
1601305-121 = "Sensei!!!"
1601305-127 = "[ns15] \"K-Koharu! Get out of the way!\"\n[ns16] \"I can't see anything in front of me!\""
1601305-130 = "[ns] \"At this rate...!\""
1601305-137 = "...Our heads collided, and I lost consciousness..."
1601305-141 = "When I came to, the sun was already coming up."
1601305-145 = "[ns17] Quickly look around.\n[ns18] \"Koharu...? Koharu?!\""
1601305-154 = "...Hee...heeheehee..."
1601305-155 = "That tastes so good... Zzz... I can't eat...anymore... heehee..."
1601305-156 = "Heehee... heeheehee..."
1601305-157 = "Sensei..."
1601305-162 = "I hoisted the sleeping Koharu on my back, and took us back to camp."

[translation]
1601305-1 = "小春的夜空"
1601305-4 = "（在海邊等待時，小春慌慌張張地走了過來）"
1601305-9 = "嗚嗚……原，原來你在這裡啊，老師。"
1601305-10 = "話說你在做什麼！？#n為什麼要三更半夜跑到外面來……！？"
1601305-11 = "……嗯？"
1601305-12 = "是出來看星星的……？#n因為這裡能看得很清楚……？"
1601305-13 = "那是什麼意思？#n星星不是在哪都能看見嗎？"
1601305-14 = "一定是在想一些下流的事情，把看星星當成藉口對吧？#n以為我會上當嗎！？"
1601305-15 = "……嗯？不一樣？"
1601305-16 = "哪裡不一樣……"
1601305-17 = "[s1]「仔細抬頭看看，小春。」\n[s2]「星星得要遠離都市才能看得清楚。」"
1601305-20 = "那是什麼意思……"
1601305-21 = "嗯……"
1601305-26 = "……！！"
1601305-29 = "這，這是什麼……！？#n星星……居然這麼多！"
1601305-30 = "這是怎麼回事？#n明明跟在三一看的是同一片天空……"
1601305-31 = "就只是換了地方而已，為什麼會……"
1601305-32 = "[s3]「因為如果有多餘的燈光，星星就會消失。」\n[s4]「夜晚越是黑暗，星星就會越明亮哦。」"
1601305-37 = "原來是這樣啊……#n聽起來挺有道理的……"
1601305-38 = "那，老師是為了看這個才會獨自跑到這裡……？#n因為平常看不到……？"
1601305-39 = "哼嗯……"
1601305-40 = "還算有點道理……！"
1601305-41 = "[s5]「對了，小春？」\n[s6]「找我有什麼事嗎？」"
1601305-46 = "我嗎！？沒，沒有！沒什麼特別的理由……！"
1601305-47 = "監，監視老師還需要什麼理由嗎！？#n為什麼現在還問這種問題！？"
1601305-48 = "……嗯？#n怎麼不跟其他人一起睡？"
1601305-49 = "那個……"
1601305-50 = "可是……就是……"
1601305-51 = "剛才醒來的時候……沒有看到老師……所以……"
1601305-52 = "我，我擔心老師會不會出了什麼事……"
1601305-56 = "什，什麼啦！為什麼要用那種表情看我！！不准笑！"
1601305-57 = "剛才那句話不算！當我沒說！#n老師什麼的我根本完全不擔心！！"
1601305-58 = "真是的！我要回去了！#n笨蛋老師，愛看星星就看個夠吧！！"
1601305-68 = "…………"
1601305-69 = "[s7]「……小春？」\n[s8]「不回去嗎？」"
1601305-74 = "那，那個……"
1601305-75 = "唔嗯……"
1601305-76 = "就是……"
1601305-80 = "[ns9]「唔～那我也差不多該回去了！」\n[ns10] 默默和小春一起回去"
1601305-86 = "嗚嗚，比想像中還遠……而且好暗……"
1601305-87 = "早知道這麼暗就叫老師來了……"
1601305-88 = "……老師？#n你有在我旁邊吧？有吧？"
1601305-89 = "[s11]「我緊緊牽著你的手哦，別害怕。」\n[s12]「會害怕的話，要不要走慢一點？」"
1601305-94 = "我，我才不怕呢！！"
1601305-95 = "只是……"
1601305-96 = "因，因為覺得危險！#n畢竟腳下一片漆黑，很可能會受傷的！"
1601305-97 = "而，而且……"
1601305-98 = "嗯……"
1601305-99 = "反正……只要跟老師在一起……不管發生什麼都不會有事的……"
1601305-100 = "老師總是，會想辦法解決……"
1601305-104 = "……嘿嘿。"
1601305-105 = "耶嘿嘿……"
1601305-109 = "呀，呀啊！？"
1601305-110 = "什麼東西！？剛才旁邊有聲音……"
1601305-115 = "[ns13]「冷靜點，小春，那只是……」\n[ns14]「別怕，只是小動物而已……」"
1601305-120 = "噫噫啊啊啊啊啊啊！！"
1601305-121 = "老師，救救我！！"
1601305-127 = "[ns15]「小，小春！你先冷靜！」\n[ns16]「前面！我看不到前面了，小春！！」"
1601305-130 = "[ns]「這樣下去會……！」"
1601305-137 = "（……兩人的腦袋彼此相撞，雙雙失去了意識……）"
1601305-141 = "（再次醒來時，太陽已經逐漸升起）"
1601305-145 = "[ns17] 趕緊環顧四周\n[ns18]「小春……？小春！？」"
1601305-154 = "……呵呵……唔呵呵……"
1601305-155 = "這個……跟那個……都好好吃……已經吃不下了……嗯呣……嘻嘻……"
1601305-156 = "嘻嘻……嘻嘻嘻……"
1601305-157 = "……老師……"
1601305-162 = "（背著睡得很香的小春返回了營地）"

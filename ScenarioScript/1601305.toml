[translation]
1601305-1 = "ท้องฟ้ายามค่ำคืนของโคฮารุ"
1601305-4 = "(คุณครูออกมายืนรออยู่ที่ชายหาด และโคฮารุก็ปรากฏตัวขึ้นหลังจากนั้นไม่นานนัก...)"
1601305-9 = "อืม... ยะ...อยู่นี่เอง คุณครู!"
1601305-10 = "มาทำอะไรที่นี่กันเนี่ย!? ดึกดื่นแบบนี้ออกมาข้างนอกทำไม...!?"
1601305-11 = "...หืม?"
1601305-12 = "ออกมาดูดาวงั้นเหรอ...? ตรงนี้มองเห็นดาวได้ชัดดีงั้นเหรอ?"
1601305-13 = "หมายความว่ายังไงน่ะ? ถ้าเป็นตอนกลางคืน อยู่ตรงไหนก็เห็นดาวไม่ใช่หรือไง?"
1601305-14 = "คงหาข้ออ้างแปลกๆ มาอีกตามเคยตามประสาคนชอบคิดอะไรวิตถารใช่มั้ยล่ะ? คิดว่าฉันจะโดน#nหลอกง่ายๆ งั้นเหรอ!?"
1601305-15 = "...หืม? ไม่ใช่งั้นเหรอ?"
1601305-16 = "อะไรกัน..."
1601305-17 = "[s1] \"ลองมองดูดีๆ สิ โคฮารุ\"\n[s2] \"ถ้าอยากดูดาวได้ชัดเจน เราต้องออกมานอกเมืองนะ\""
1601305-20 = "พูดอะไรกันน่ะ..."
1601305-21 = "อืม..."
1601305-26 = "...!!"
1601305-29 = "อะ...อะไรน่ะ...? ดูดาวอะไรกันถึงต้องทำแบบนั้น....!"
1601305-30 = "เกิดอะไรขึ้นเนี่ย? นี่มันก็ท้องฟ้าเหมือนที่เคยเห็นที่ทรีนิตี้ไม่ใช่หรือไง?"
1601305-31 = "ถึงจะเปลี่ยนสถานที่ แต่ท้องฟ้าก็ยังคงเป็นท้องฟ้าผืนเดียวกันแน่ๆ แต่ทำไมมันถึง..."
1601305-32 = "[s3] \"ถ้ามีแสงไฟอยู่ละก็ แสงของดวงดาวจะหายไปน่ะ\"\n[s4] \"ยิ่งท้องฟ้ามืดเท่าไร แสงของดวงดาวก็จะสว่างขึ้นเท่านั้นน่ะ\""
1601305-37 = "งั้นเหรอ...? แบบนั้นมันก็ฟังดูมีเหตุผลอยู่เหมือนกัน... "
1601305-38 = "ถ้างั้นคุณครูก็ออกมาดูดาวจริงๆ งั้นเหรอ? เพราะถ้าเป็นตอนปกติจะหาดูแบบนี้ไม่ได้?"
1601305-39 = "สุดท้าย..."
1601305-40 = "มะ...มันก็เป็นข้อแก้ตัวดีๆ นี่เอง! ฮึ่ม...!"
1601305-41 = "[s5] \"แล้วโคฮารุล่ะ?\"\n[s6] \"มาหาครูมีอะไรรึเปล่า?\""
1601305-46 = "ฉันเหรอ!? กะ..ก็แค่... ไม่มีเหตุผลอะไรพิเศษสักหน่อย...!?"
1601305-47 = "แหงอยู่แล้ว ฉันก็มาจับตาดูคุณครูยังไงล่ะ!? ก็รู้อยู่แล้วจะยังถามทำไมอีกเนี่ย!?"
1601305-48 = "...หืม? ฉันไม่ได้กำลังหลับสนิทอยู่กับคนอื่นๆ งั้นเหรอ...?"
1601305-49 = "คือ..."
1601305-50 = "แต่...! แต่ว่า..."
1601305-51 = "พอตื่นขึ้นมา... แล้วไม่เห็นคุณครู... ก็เลย..."
1601305-52 = "ฉะ...ฉันคิดว่าอาจเกิดเรื่องอะไรขึ้นหรือเปล่า..."
1601305-56 = "อะ...อะไรน่ะ! ทำไมยิ้มกรุ้มกริ่มอะไรแบบนั้นเล่า!! อย่ามาหัวเราะนะ!!"
1601305-57 = "ทะ...ที่พูดไปเมื่อกี้ขอยกเลิก เอาเป็นว่าฉันไม่ได้พูดก็แล้วกัน! ฉันไม่ได้เป็นห่วงอะไรคุณครูเลยสักนิด#nเดียว!!"
1601305-58 = "ช่างเหอะ!! ฉันจะกลับแล้ว! คุณครูคนบ้า! เชิญดูไปคนเดียวเลย!!"
1601305-68 = "..."
1601305-69 = "[s7] \"...โคฮารุ?\"\n[s8] \"โคฮารุยังไม่กลับเหรอ?\""
1601305-74 = "คือ...เรื่องนั้น..."
1601305-75 = "คือ..."
1601305-76 = "คือว่า... คือ..."
1601305-80 = "[ns9] \"อืม~ ถ้างั้นครูก็กลับเลยดีมั้ยนะ!\"\n[ns10] เดินตามโคฮารุไปโดยไม่พูดอะไร"
1601305-86 = "อึก... ไกลกว่าที่คิดอีกนะเนี่ย... แล้วก็มืดด้วย..."
1601305-87 = "ถ้ารู้ว่ามันจะมืดขนาดนี้ คงให้คุณครูมาคนเดียวแล้ว..."
1601305-88 = "...คุณครู? อยู่ข้างๆ ฉันใช่มั้ย? ใช่หรือเปล่า?"
1601305-89 = "[s11] \"ครูจับมือโคฮารุอยู่นี่ไง ไม่ต้องกลัวนะ\"\n[s12] \"ถ้ากลัวละก็ เราค่อยๆ เดินไปดีมั้ย?\""
1601305-94 = "คะ...ใครกลัวกัน?!"
1601305-95 = "ก็แค่... แค่..."
1601305-96 = "ชะ...ใช่แล้ว มันอันตรายต่างหาก! พื้นมันมืดก็อาจเดินสะดุดอะไรบาดเจ็บได้ใช่มั้ยล่ะ? กะ...ก็แค่นั้นแหละ!"
1601305-97 = "ละ...แล้วก็อีกอย่าง อืม..."
1601305-98 = "อืม..."
1601305-99 = "หรือว่าไม่ใช่นะ... ถ้าอยู่กับคุณครูละก็... ไม่ว่าจะเกิดเรื่องอะไรก็คงหาทางแก้ไขได้..."
1601305-100 = "คิดๆ ดูแล้ว อาจจะไม่เป็นไรจริงๆ ก็ได้..."
1601305-104 = "...ฮิฮิ..."
1601305-105 = "...อ่ะฮิฮิฮิ..."
1601305-109 = "กะ...กรี๊ดดด!!"
1601305-110 = "อะไรน่ะ? เมื่อกี้ได้ยินเสียงจากใกล้ๆ นี้..."
1601305-115 = "[ns13] \"ใจเย็นๆ ก่อน โคฮารุ...\"\n[ns14] \"มันไม่มีอะไรหรอก ก็แค่สัตว์ป่าตัวเล็กๆ...\""
1601305-120 = "กะ...กรี๊ดดดดดดดดดดดดดดดดดด!!"
1601305-121 = "คุณ...ครู~~~!!"
1601305-127 = "[ns15] \"คะ...โคฮารุ! ออกมาก่อน!\"\n[ns16] \"ข้างหน้า! มองไม่เห็นข้างหน้าเลย โคฮารุ!!\""
1601305-130 = "[ns] \"ถ้าเป็นแบบนี้...!\""
1601305-137 = "(...คุณครูกับโคฮารุหัวโหม่งกันจนทั้งคู่หมดสติไป...)"
1601305-141 = "(พอฟื้นขึ้นมาอีกครั้ง ก็พบว่าเป็นตอนเช้าตรู่ที่พระอาทิตย์ขึ้นแล้ว)"
1601305-145 = "[ns17] รีบหันไปมองรอบๆ\n[ns18] \"โคฮารุ...? โคฮารุ!?\""
1601305-154 = "...งืม... งื้อ..."
1601305-155 = "อร่อยจัง... อื้อ... กินไม่ไหวแล้ว... งืมๆ... ฮี่ๆ..."
1601305-156 = "ฮิฮิ... ฮี่ๆๆ... "
1601305-157 = "...คุณครู..."
1601305-162 = "(คุณครูแบกโคฮารุที่กำลังหลับสบายขึ้นบนหลังและพากลับไปที่แคมป์)"

[translation]
83305300200-7 = "無論發生什麼事，老師都願意相信並等待著我。"
83305300200-8 = "[ns]「啊！陽奈──────」"
83305300200-10 = "[ns]「──────奈啊啊啊！？」"
83305300200-11 = "為，為什麼突然發出那麼奇怪的聲音呢……？老師。"
83305300200-12 = "[s]「因為覺得陽奈的禮服非常適合……一時情不自禁……」"
83305300200-13 = "那，那就好。"
83305300200-14 = "不用那麼著急，我就在老師身邊哦。"
83305300200-15 = "歡迎回來，委員長。我一直在等您。"
83305300200-16 = "嗯，亞子。多虧有你，我才能盡情練習。"
83305300200-17 = "那真是太好了。#n不過在演奏開始前發生了一些騷動……"
83305300200-18 = "果然在我離開的這段時間……真琴又開始搗亂了啊。"
83305300200-19 = "既然如此，我會在正式演奏之前把騷動全部擺平。"
83305300200-20 = "[ns]「不愧是陽奈！真是太可靠了！」"
83305300200-21 = "……就，就說老師說得太誇張了……"
83305300200-22 = "雖然因為各種因素而發生了騷動……"
83305300200-23 = "那麼就在派對正式開始前──"
83305300200-28 = "把騷動全部擺平吧。"
83305300200-29 = "老師……能請你幫忙嗎？"
83305300200-30 = "[ns]「嗯。」"
83305300200-31 = "好，那就開始風紀委員會的工作吧？"
83305300200-32 = "是！委員長！我會全力支援！"

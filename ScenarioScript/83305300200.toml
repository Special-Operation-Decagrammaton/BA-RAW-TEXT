[translation]
83305300200-7 = "No matter what happens, Sensei trusts me. I won't let them down."
83305300200-8 = "[ns] \"Ah! Hin─\""
83305300200-10 = "[ns] \"─naaaaah?!\""
83305300200-11 = "Wh-Why are you making weird noises, Sensei...?"
83305300200-12 = "[s] \"Seeing you out and all dressed up... I think it suits you.\""
83305300200-13 = "I-I'm glad to hear you say that."
83305300200-14 = "But there's no need to call my name so loudly, I'm right here."
83305300200-15 = "Welcome, Head Prefect. I've been waiting for your arrival."
83305300200-16 = "Yes. Thank you for assisting me, Ako. I was able to practice as much as I wanted, thanks to you."
83305300200-17 = "I'm glad to hear it. But I do need to report a commotion that occurred earlier."
83305300200-18 = "I see... So Makoto went off on her own again while I was away..."
83305300200-19 = "I'll handle this before the recital begins."
83305300200-20 = "[ns] \"You're always so reliable, Hina!\""
83305300200-21 = "...Th-There's no need to make such a big deal out of it..."
83305300200-22 = "It looks like everything is falling into chaos again..."
83305300200-23 = "Well, before the party officially opens─"
83305300200-28 = "I'll put everything back in its place."
83305300200-29 = "Sensei... Would you help me?"
83305300200-30 = "[ns] \"Of course.\""
83305300200-31 = "Very well. Shall we remind everyone why we have a Prefect Team?"
83305300200-32 = "Yes, Head Prefect! I'm right behind you!"

83305300200-6 = "3;히나 드레스;01\n#3;a\n#wait;1000"
83305300200-7 = "3;히나 드레스;03;그 어떤 일이 있더라도 선생님은, 나를 믿고 기다려주는구나."
83305300200-8 = "[ns] \"앗! 히나─────\""
83305300200-9 = "#wait;1000"
83305300200-10 = "[ns] \"─────나아아앗?!\""
83305300200-11 = "3;히나 드레스;15;가, 갑자기 왜 그런 이상한 소리를 내는 거야……? 선생님.\n#3;em;[?!]\n#3;shake"
83305300200-12 = "[s] \"아니, 히나의 드레스 차림…… 무척, 어울린다고 생각……해서 나도 모르게 그만.\""
83305300200-13 = "3;히나 드레스;08;그, 그렇다면 다행이지만.\n#3;stiff"
83305300200-14 = "3;히나 드레스;07;그렇게 애타게 부르지 않아도 나는 여기에 있어."
83305300200-15 = "3;아코 드레스;01;어서 오세요. 부장님. 기다리고 있었습니다.\n#3;a"
83305300200-16 = "3;히나 드레스;16;응. 아코. 덕분에 지금까지 마음껏 연습할 수 있었어.\n#3;em;[음표]"
83305300200-17 = "3;아코 드레스;06;다행이에요. 하지만 연주 전에 다소 소란이 발생해버렸습니다."
83305300200-18 = "3;히나 드레스;99;과연, 자리를 비운 사이에…… 마코토가 또 멋대로 사고를 쳤다는 거구나.\n#3;em;[…]"
83305300200-19 = "3;히나 드레스;10;그럼 본격적인 연주에 들어가기에 앞서, 이 혼란을 전부 정리하도록 하겠어."
83305300200-20 = "[ns] \"역시 히나야! 믿음직해!\""
83305300200-21 = "3;히나 드레스;04;……그, 그러니까. 호들갑이라니깐……\n#3;em;[///]\n#3;stiff"
83305300200-22 = "3;히나 드레스;01;여러 가지로 다소 난리가 난 모양이지만………"
83305300200-23 = "3;히나 드레스;99;그럼 어디 정식으로 파티를 시작하기 전에──────"
83305300200-24 = "#st;[0,0];instant;1;"

[translation]
83305300200-7 = "ไม่ว่าจะเกิดเรื่องอะไร คุณครูก็เชื่อใจและรอคอยฉันอยู่สินะ"
83305300200-8 = "[ns] \"อ๊ะ ฮินะ...!\""
83305300200-10 = "[ns] \"ฮิน้าาาาาา?!\""
83305300200-11 = "ทะ... ทำไมจู่ๆ ก็ทำเสียงประหลาดอะไรอย่างนั้นด้วยล่ะ... คุณครู?"
83305300200-12 = "[s] \"อ่า ก็พอเห็นฮินะใส่ชุดเดรส ก็คิดว่าดูดีมาก เลยเผลอพูดแบบนั้น...\""
83305300200-13 = "ถ้าเป็นแบบนั้นก็ค่อยเบาใจหน่อย"
83305300200-14 = "แต่ไม่ต้องเรียกกันถึงขนาดนั้นก็ได้ ฉันอยู่ตรงนี้แล้ว"
83305300200-15 = "กลับมาแล้วเหรอคะ ท่านประธาน ฉันกำลังรออยู่เลยค่ะ"
83305300200-16 = "อื้ม อาโกะ ขอบใจนะ ฉันไปฝึกมาได้อย่างเต็มที่เลย"
83305300200-17 = "ได้ยินอย่างนั้นก็โล่งอกค่ะ แต่ว่าเมื่อไม่นานมานี้ มีเรื่องวุ่นวายเกิดขึ้นนิดหน่อยค่ะ"
83305300200-18 = "งั้นเหรอ... มาโคโตะตั้งใจก่อเรื่องระหว่างที่ฉันไม่อยู่อีกแล้วสินะ "
83305300200-19 = "ฉันต้องไปจัดการความวุ่นวายทั้งหมดนี้ก่อนจะไปทำการแสดงอย่างจริงจังแล้วละ"
83305300200-20 = "[ns] \"นี่สินะ ฮินะ! น่าเชื่อถือที่สุดเลย!\""
83305300200-21 = "อะ... อืม... ชักจะเวอร์ไปหน่อยแล้ว..."
83305300200-22 = "ท่าทางจะมีเรื่องไม่สงบหลายเรื่องเลยนะ แต่ว่า..."
83305300200-23 = "เดี๋ยวฉันจะไปจัดการให้เสร็จภายในรวดเดียว..."
83305300200-28 = "ก่อนที่งานปาร์ตี้จะเริ่มอย่างเป็นทางการแล้วกัน"
83305300200-29 = "ถ้างั้นคุณครู... พอจะช่วยหน่อยได้ไหม?"
83305300200-30 = "[ns] \"อื้ม\""
83305300200-31 = "เอาละ ไปเริ่มงานของคณะกรรมการวินัยกันเลย"
83305300200-32 = "ค่ะ! ท่านประธาน! ฉันจะสนับสนุนอย่างเต็มที่เลยค่ะ"

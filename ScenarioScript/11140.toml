[translation]
11140-2 = "ตอนที่ 14;ปฏิบัติการ! กองกำลังหน้ากากมิสึกิ 2"
11140-3 = "ธนาคาร"
11140-7 = "ขอโทษที่ทำให้รอนะครับ คุณอารุใช่ไหมครับ?"
11140-8 = "\"ขอโทษที่ทำให้รอนะครับ\" งั้นเหรอ? รู้ไหมว่าฉันรออยู่ที่นี่มา 6 ชั่วโมงแล้วนะ!!"
11140-9 = "แค่พิจารณาเงินกู้ ทำไมถึงใช้เวลาตั้งครึ่งวันเลยล่ะ?! แล้วก็ไม่เห็นจะมีคิวก่อนหน้าฉันด้วย!"
11140-10 = "เพื่อนร่วมงานของฉันรอจนหลับบนโซฟากันหมดแล้ว!"
11140-11 = "เป็นเหตุผลของธนาคารน่ะครับ ช่วยเข้าใจด้วยนะครับ"
11140-12 = "จะว่าไป... สถานการณ์ของคุณอารุตอนนี้ไม่ได้อยู่ในฐานะที่จะเรียกร้องกับทางธนาคารได้เลยนะครับ?"
11140-13 = "เอ่อ..."
11140-14 = "ถ้าอยากได้ความช่วยเหลือจากธนาคารเรา อย่างน้อยก็ช่วยรออย่างใจเย็นสักหน่อยเถอะครับ อ้อ! จะบอกว่า#nตรงนั้นนอนไม่ได้นะครับ"
11140-15 = "ผู้คุม! ปลุกคนเร่ร่อน.. ไม่สิ ปลุกลูกค้าที"
11140-17 = "นี่! นี่! ตื่น! ตื่นได้แล้ว!"
11140-18 = "งืมมม..."
11140-19 = "อ๊ะ?! อะไรเนี่ย?!"
11140-20 = "(ลืมตา) ...!"
11140-21 = "ขอ.. ขอโทษด้วยค่ะ พวกเรารอจนง่วง ก็เลยเผลอหลับไปค่ะ!!"
11140-23 = "......"
11140-24 = "ขอเช็กข้อมูลหน่อยนะครับ ชื่อของลูกค้าคือ ริคุฮาชิมะ อารุ สังกัดสถาบันเกเฮนน่า ชั้นปีที่ 2"
11140-25 = "ตอนนี้เป็นประธานของหน่วยรับจ้างสารพัด 68... นี่เป็นบริษัทปลอมหรือเปล่าครับ? ดูจากเอกสารแล้ว#nตอนนี้การเงินถือว่าล้มละลายเลยนี่ครับ?"
11140-26 = "มะ.. ไม่ใช่แบบนั้น เรายังมีรายได้กันอยู่นะ! แค่ตอนนี้ยังไม่มีงานจากลูกค้าเข้ามาเท่านั้น..."
11140-27 = "แต่ในบริษัทมีกันอีกแค่ 4 คน แถมใช้ตำแหน่งผู้อำนวยการ หัวหน้า และพนักงาน... นี่ตั้งตำแหน่งกันตามอำเภอใจหรือเปล่าครับ? หรือว่าตั้งบริษัทมาเล่นๆ...?"
11140-28 = "เอ่อ คือว่า...... ต้องมีชื่อตำแหน่งแบบนั้นสิ ลูกค้าถึงจะเชื่อถือ..."
11140-29 = "แล้วทำไมถึงเช่าสำนักงานในราคาสูงเกินความจำเป็นขนาดนี้ล่ะครับ? ควรหาสถานที่ที่เหมาะกับสถานะ#nการเงินของบริษัทสิ.."
11140-30 = "ก็... ถ้าสำนักงานดูดี ลูกค้าก็จะ..."
11140-31 = "......"
11140-32 = "คุณอารุ ถ้าเป็นแบบนี้ เราคงให้กู้เงินไม่ได้หรอกครับ"
11140-33 = "ฮะ?! ว่าไงนะ?!"
11140-34 = "ลองหาอาชีพที่มั่นคงกว่านี้จะไม่ดีกว่าเหรอครับ? อย่างเช่น งานในตลาดแรงงานเช้ามืด..."
11140-35 = "วะ... ว่าไงนะ?!"
11140-38 = "(ตัวสั่น)"
11140-39 = "(น่าหงุดหงิดชะมัด... ถล่มธนาคารแล้วปล้นให้หมดเลยดีไหม?)"
11140-40 = "(ไม่สิ... แบบนี้ไม่ได้ ถึงจะปล้นธนาคารได้ แต่ก็คงหนีออกจากตลาดมืดไม่ได้อยู่ดี ก็ผู้คุมตลาดออกตรวจ#nตราพื้นที่กันเยอะขนาดนี้...)"
11140-41 = "(แต่ว่า... คนพวกนี้ก็อาจจะไม่ได้เก่งกาจอะไรก็ได้นี่ พวกเรา 4 คนน่าจะรับมือไหว แล้วหนีออกไปได้อยู่#nนะ...)"
11140-42 = "(เฮ้อ... ไม่ได้หรอก ใครจะกล้าเป็นศัตรูกับตลาดมืดล่ะ...)"
11140-43 = "(น่าละอายชะมัด... อุตส่าห์ตั้งใจจะเป็นสุดยอดผู้ร้ายในคิโวทอส... แล้วนี่มันอะไรกัน...)"
11140-44 = "(ต้องมาเจอแต่เรื่องน่ารำคาญใจจนปวดหัว... ทั้งเรื่องกู้เงินและเรื่องกิจการ...)"
11140-45 = "(นี่ไม่ใช่สิ่งที่ฉันต้องการสักหน่อย... คนนอกกฎหมายที่ร้ายกาจ ไม่เกรงกลัวอะไร และไม่ผูกมัดต่อสิ่งใด...)"
11140-47 = "(นั่นต่างหากคนที่ฉันอยากเป็น...)"
11140-48 = "คุณอารุ... คุณอารุ!!"
11140-49 = "คะ... คะ?! วะ... ว่ายังไงนะคะ?"
11140-50 = "ทางเราอนุมัติเงินกู้ให้ไม่ได้ครับ ช่วยกลับไปเถอะครับ"
11140-51 = "ฮะ?! ว่าไงนะ?! ดะ.. เดี๋ยวก่อนสิ!"
11140-52 = "(พรึ่บ!)"
11140-53 = "เกิดอะไรขึ้น? ไฟดับเหรอ?"
11140-54 = "ใครปิดไฟ!? คอมพิวเตอร์ดับหมดแล้ว!"
11140-55 = "(ปังๆๆๆๆ!! ปังๆๆๆๆๆๆๆ!!)"
11140-56 = "เสียงปืน?!"
11140-59 = "อ๊ากกก!"
11140-60 = "ว้ากกกกก!"
11140-63 = "เกิดอะไรขึ้นเนี่ย.... ว้ากก!"
11140-65 = "(ตึ้ง!)"
11140-67 = "(ตึ้งงง!)"
11140-70 = "ทุกคนหมอบลง! เอาอาวุธที่มีวางไว้บนพื้นให้หมด!!"
11140-71 = "ใครไม่ทำตามจะต้องโดนดุนะคะ☆"
11140-72 = "อ่า แหะๆๆ..... หมอบลงเถอะค่ะ... ฉันไม่อยากให้ใครบาดเจ็บ..."
11140-74 = "ปะ... ปล้นธนาคารเหรอ?!"
11140-75 = "(ปิ้บ- ปิ๊บ-) เหตุฉุกเฉิน! ฉุกเฉิน!"
11140-76 = "หึหึ ไม่มีประโยชน์หรอกน่า เพราะเราปิดระบบรักษาความปลอดภัยที่แจ้งไปภายนอกไว้หมดแล้ว"
11140-77 = "ฮะ... เฮือก!"
11140-78 = "นี่! ตรงนั้นน่ะ! บอกให้หมอบลงไง! ถ้าขยุกขยิกอีกละก็ได้ชิมลูกปืนแน่!"
11140-79 = "ทุกคนอยู่เฉยๆ เถอะนะคะ... ได้โปรด..."
11140-80 = "หึหึ เป็นไปตามแผนเลย! งั้นก็ไปที่แผนต่อไป! หัวหน้าเฟาสต์! สั่งการเลย!"
11140-81 = "คะ?! ฉะ.. ฉันเหรอ? หัวหน้า? ฉันเนี่ยนะคะ?!"
11140-82 = "หัวหน้าแก๊งไงคะ! เหมือนบอสไง! ส่วนฉันคือ..."
11140-83 = "น้องคริสติน่าจากกองกำลังหน้ากากมิสึกิ~♧"
11140-84 = "อะไรกัน? เราเป็นกองกำลังหน้ากากตั้งแต่เมื่อไหร่?! เชยชะมัด!!!"
11140-85 = "......"
11140-86 = "คุณเฟาสต์เค้าน่ากลัวนะ ถ้าไม่เชื่อฟังละก็เดี๋ยวได้โดนดุแน่"
11140-87 = "อ่า... เอายังไงดี... กลายเป็นหัวหน้าแก๊งไปซะแล้ว แบบนี้ฉันจะเอาหน้าที่ไหนไปเจอกับสมาชิกสภาน้ำชา#nกันล่ะ..."
11140-89 = "เอ๋... พวกนี้มัน..."
11140-90 = "เด็กอะบิดอส...?"
11140-91 = "ใช่ พวกนั้นจริงด้วย แต่มีบางคนที่ไม่เคยเห็นด้วยแฮะ มาทำอะไรกันที่นี่น่ะ? แล้วใส่หน้ากากกันทำไม?"
11140-92 = "ระ... หรือว่าตั้งใจมาเจอพวกเราคะ?! ให้ฉันไปจัดการให้มั้ยคะ?"
11140-93 = "ไม่ต้อง... พวกนั้นไม่น่าจะมาที่นี่เพราะพวกเราหรอก... คิดจะทำอะไรกันนะ? จะปล้นธนาคารงั้นเหรอ?"
11140-94 = "แล้วอารุจังทำอะไรอยู่น่ะ?"
11140-96 = "ทั้งมุมกล้องวงจรปิด การทำงานของยาม หรือแม้แต่โครงสร้างภายในของธนาคาร... ทุกอย่างอยู่ในหัวฉัน#nหมดแล้ว หากทำอะไรเหลวไหล ฉันไม่ปล่อยให้รอดแน่"
11140-97 = "คนที่อยู่ตรงนั้นน่ะ เห็นกระเป๋านี่ใช่ไหม? หยิบใส่กระเป๋ามาซะ..."
11140-98 = "ครับ... เดี๋ยวเอามาให้ครับ! เอาไปเลยครับ!#nเงินสด พันธบัตร ทองแท่ง! ผมจะใส่ให้เต็มกระเป๋าเลยครับ!!"
11140-99 = "มะ... ไม่สิ ฉันต้องการแค่บันทึกการเดินรถเท่านั้นน่ะ..."
11140-102 = "นะ.. นี่ครับ! ผมใส่ให้เต็มกระเป๋าแล้ว! อย่ายิงผมเลยนะครับ!"
11140-103 = "เอ่อ... อืม..."
11140-106 = "..."
11140-107 = "(สุดมาก! คนพวกนี้...! นี่มาปล้นธนาคารตลาดมืดเลยเหรอ?)"
11140-108 = "(แล้วจะหนีออกไปยังไง? ว่าแต่.. นี่ยังมีคนนอกกฎหมายที่มีความคิดเด็ดเดี่ยวแบบนี้อยู่อีกงั้นเหรอ?!)"
11140-109 = "(นี่แหละมืออาชีพ! ราวกับว่าเกิดมาเพื่อปล้นธนาคารงั้นแหละ ปล้นได้ภายใน 5 นาทีเองด้วย!)"
11140-110 = "(เท่ระเบิด! คนพวกนี้คือคนนอกกฎหมายที่แท้จริง...! ซึ้งจนน้ำตาจะไหลเลย)"
11140-112 = "ยังดูไม่ออกเลยสินะ..."
11140-113 = "แล้วทำไมทำหน้าเหมือนจะร้องไห้แบบนั้นล่ะ?"
11140-114 = "เฮ้อ..."
11140-115 = "แล้วพวกเราจะอยู่นิ่งๆ ตรงนี้เหรอคะ?"
11140-116 = "เราไม่จำเป็นต้องช่วยคนพวกนั้น แล้วก็ไม่มีเหตุผลที่ต้องช่วยธนาคารด้วย อีกอย่างดูสภาพของอารุสิ...#nตอนนี้เราซ่อนตัวเงียบๆ ก่อนดีกว่า"
11140-117 = "ค่ะ..."
11140-120 = "นี่ ชิโร... ไม่สิ.. รุ่นพี่บลู! ได้ของหรือยัง?"
11140-121 = "อะ... อื้ม... ได้มาแล้ว"
11140-122 = "งั้นก็กลับกันได้แล้ว! ทุกคนถอย!"
11140-123 = "อาดิโอส~☆"
11140-124 = "มะ... ไม่มีใครบาดเจ็บตรงไหน... ขะ... ขอโทษด้วยนะคะ...  ลาก่อนค่ะ!"
11140-125 = "(ฟิ่ววววว-)"
11140-127 = "จะ... จับตัวให้ได้!! ปิดถนนแล้วติดต่อผู้คุมตลาดเดี๋ยวนี้!!"
11140-129 = "ต้องจับตัวให้ได้!!"

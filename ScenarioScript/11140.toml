[translation]
11140-2 = "Episode 14;The Masked Swimsuit Gang! Part 2"
11140-3 = "Bank"
11140-7 = "Sorry for the short delay...Aru, was it?"
11140-8 = "You call that a short delay?! I've been waiting here for six hours!"
11140-9 = "What kind of loan interview is this?! I've been here the whole day,#nand there wasn't even anyone in front of us!"
11140-10 = "Look at my associates over there! We've been waiting for so long that they've passed out on the couch!"
11140-11 = "We've had some internal issues. Our apologies."
11140-12 = "However, I'm not quite sure if you're in the position to make any demands, Miss Aru."
11140-13 = "U-Ugh..."
11140-14 = "As someone in need of assistance from our bank, waiting is the least you can do. And not to mention, it's frowned upon to sleep on communal seating."
11140-15 = "*snaps* Guard. Wake up those bums...I mean, customers..."
11140-17 = "All right, all right! Rise and shine! Time to wake up!"
11140-18 = "Zzz..."
11140-19 = "Eek?! The heck?!"
11140-20 = "...!"
11140-21 = "S-Sorry! We're very sorry! We shouldn't have dozed off!"
11140-23 = "..."
11140-24 = "*flip* Now, let's see here. Name...Rikuhachima Aru.#nAffiliation: second-year at Gehenna Academy."
11140-25 = "Present employment: boss of Problem Solver 68... That reads like a shell corporation to me. Your financial documents are a complete mess."
11140-26 = "N-No! We're completely legitimate! We just haven't received payment on some of our commissions yet!"
11140-27 = "And look at this. You only have three people under you, but each has a special title... Chief of staff, department head, and entry-level employee? That's quite a reach. Are you playing make-believe at running a company?"
11140-28 = "If you want to earn commissions, you have to keep up appearances..."
11140-29 = "Would you care to explain this extravagant office lease you're paying?#nYou should know better than to extend yourself beyond your means."
11140-30 = "Y-You've gotta spend money to make money...?"
11140-31 = "..."
11140-32 = "My, my, Aru. This doesn't look like it's going well for you at all."
11140-33 = "Th-This can't be happening!"
11140-34 = "My strong recommendation is that you secure legitimate employment at once. Might I suggest looking into the early-morning day-laborer market?"
11140-35 = "Wh-What did you say?!"
11140-38 = "(snaps)"
11140-39 = "(Why you little... I oughta smash everything and rob your bank right now!)"
11140-40 = "(No, I need to stay cool. Even if I sack this place, escaping from the Black Market is another story. Consider all those Market Guards on patrol everywhere...)"
11140-41 = "(But is it really? Maybe those guys aren't actually that big of a deal. Who's to say the four of us won't be able to blast our way out of here and take 'em down?)"
11140-42 = "(On second thought...I don't have the guts to make the entire Black Market my enemy.)"
11140-43 = "(This is so pathetic. I wanted to become the greatest outlaw in all of Kivotos, but look at me now...)"
11140-44 = "(This loan, my business... All I ever get is a constant headache.)"
11140-45 = "(This isn't what I wanted at all... I wanted to be a hard-boiled outlaw.#nA true, free spirit not bound to anything—not even fear.)"
11140-47 = "(It's all I ever wanted.)"
11140-48 = "Aru, are you listening?!"
11140-49 = "O-Of course I am! So...could you repeat that?"
11140-50 = "I said, your loan application has been denied. Now, run along."
11140-51 = "Wait, what?! H-Hold on a second!"
11140-52 = "*pow*"
11140-53 = "What's going on? A power outage?!"
11140-54 = "Did someone trip a breaker? All of the computers are dead!"
11140-55 = "*pop* *pop* *pop* *tat*"
11140-56 = "Gunfire?!"
11140-59 = "Garrrgh!"
11140-60 = "Arrrgh!"
11140-63 = "What's happening? Ugh!"
11140-65 = "*ping*"
11140-67 = "*ta-da!*"
11140-70 = "Everyone, down! Toss your weapons aside and hands where we can see them!"
11140-71 = "Those that won't comply will be in for a good thrashing! ☆"
11140-72 = "Th-This is a stick up...get down if you don't want to get hurt...please!"
11140-74 = "B-Bank robbers?!"
11140-75 = "*WEE WOO* *WEE WOO* Alert! Alert!"
11140-76 = "It's no use. The outer security system has already been turned off."
11140-77 = "*gasp*"
11140-78 = "Hey, you over there! You were told to get down on the ground!#nTry any more funny business and I'll put holes in your circuits!"
11140-79 = "Please, everyone just do as we say. Please..."
11140-80 = "Heh! Everything's going according to plan! Time to move to the next phase. Give us your orders, Faust!"
11140-81 = "What?! Are you referring to me?!"
11140-82 = "That's right—you're the leader! The boss! And as for myself..."
11140-83 = "I'm Christina of the Masked Swimsuit Gang! ♧"
11140-84 = "Hey, when did we agree to give ourselves names?! And what kind of choice is that? It's so lame!"
11140-85 = "... "
11140-86 = "Heh heh! Better do as Faust says. You don't wanna make her angry.#nYou wouldn't like her when she's angry."
11140-87 = "I... Oh dear. How did I end up being the boss? And how can I face the Tea Party now?"
11140-89 = "Wait a second... Aren't they...?"
11140-90 = "The students from Abydos?!"
11140-91 = "That's right. Though I think I see someone new.#nThe heck are they doing here? And what's with those masks?"
11140-92 = "A-Are they here for us?! Sh-Should I go annihilate all of them?"
11140-93 = "No, I don't think they're here for us... What are they up to? They're sticking this place up?"
11140-94 = "What are you doing, Aru?"
11140-96 = "I have the security camera blind spots, guard positions, and the bank's internal structure memorized. So nobody try anything stupid, or else."
11140-97 = "All right, you over there. That cash truck that just left.#nI want you to take this bag and—"
11140-98 = "O-Of course! Cash, bonds, gold, whatever you want! You got it!"
11140-99 = "No, uh... What I want are the transport logs..."
11140-102 = "H-Here you are! I stuffed so much, the bag's practically bursting! Please don't hurt me!"
11140-103 = "U-Um... Thanks..."
11140-106 = "..."
11140-107 = "(They're really robbing a Black Market bank! That's sooooo cool!) "
11140-108 = "(How are they gonna pull off the getaway? And more importantly, how do they have the GUTS to do this kind of stuff?!)"
11140-109 = "(Look at that cool, calm composure. They're pros. It's like they were born to do this. They pulled this off in five minutes flat!)"
11140-110 = "(I-It's magnificent! So badass! Now these guys are real outlaws! I'm gonna start tearing up.)"
11140-112 = "She has absolutely no clue..."
11140-113 = "Is she actually getting teary-eyed?"
11140-114 = "*sigh*"
11140-115 = "Uh, so do we just stay put?"
11140-116 = "Between those guys or the bank, there's no reason for us to help either side. And with Aru in that state right now...we're better off staying out of it."
11140-117 = "If you say so..."
11140-120 = "Hey, Shiro—I mean, uh...Blue. You got the goods?"
11140-121 = "Y-Yeah. The eagle has landed. "
11140-122 = "Then, c'mon! Let's move it, people!"
11140-123 = "All righty, then. Adios! ☆"
11140-124 = "L-Looks like no one got hurt. S-Sorry about this everyone. Thank you, and have a great day!"
11140-125 = "*whoosh*"
11140-127 = "D-Don't let them get away! Seal off the roads! Contact the Market Guards!"
11140-129 = "They must be caught at once!"

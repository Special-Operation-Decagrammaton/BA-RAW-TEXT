[translation]
11140-2 = "第14話;出動！泳裝蒙面團（２）"
11140-3 = "銀行"
11140-7 = "這位客人，讓您久等了。"
11140-8 = "什麼叫做「讓您久等了」！我可是等了6個小時耶！6個小時！！"
11140-9 = "哪有人審查貸款資格要審查大半天的啊！？#n而且我前面根本也沒幾個人在等啊！"
11140-10 = "我的夥伴都等得不耐煩，在那邊的沙發上睡著了！"
11140-11 = "我們內部也有自己的考量，請您見諒。"
11140-12 = "……不過亞瑠小姐，您不覺得您似乎沒有資格擺出這種態度嗎？"
11140-13 = "啊，嗚嗚……"
11140-14 = "既然您需要本行的幫助，我認為耐心等待也是很重要的。#n……啊，還有在那邊睡覺會造成我們的困擾。"
11140-15 = "（啪嚓）保全。把那些流浪漢……不，把那些客人叫醒。"
11140-17 = "好了好了！還不快起來！"
11140-18 = "呣喵……"
11140-19 = "嗚哈！？怎麼了怎麼了！？"
11140-20 = "（驚醒）……！！ "
11140-21 = "啊啊……非，非常抱歉，我不該打瞌睡的！！"
11140-23 = "……"
11140-24 = "好的，接著就來一起確認一下吧。#n您的名字是……陸八魔亞瑠小姐。是格黑娜學園的2年級生對吧。"
11140-25 = "便利屋68的現任社長嗎……#n這間便利屋不會是空殼公司吧？文件上顯示已經破產了哦？"
11140-26 = "我，我可是很認真地在賺錢！只是因為還沒有拿到委託費……"
11140-27 = "而且貴公司的員工就算加上社長也只有四個人。#n室長、課長和職員……職位是不是分派得太過草率了？是在玩什麼公司遊戲嗎？"
11140-28 = "那，那是因為……有，有職位才比較容易接到委託……"
11140-29 = "還有辦公室的租金太貴了。#n您應該根據財務狀況找合適的物件才對。"
11140-30 = "有，有個像樣的辦公室……委託才會……"
11140-31 = "……"
11140-32 = "亞瑠小姐，以您現在的情況很難申請到貸款。"
11140-33 = "咦，咦──！？"
11140-34 = "要不要先試著找個像樣的職業呢？#n也有像一日兼職或短期兼職等等，可以馬上開始的工作。"
11140-35 = "你，你說什麼！？"
11140-38 = "（微微顫抖） "
11140-39 = "（真火大……乾脆大鬧一場，把這間銀行洗劫一空好了？）"
11140-40 = "（……不，那可不行。就算真的搶得了這間銀行，要逃出黑市也是難如登天。 #n　更何況到處都有黑市守衛……）"
11140-41 = "（……不過說不定這些傢伙其實根本沒什麼好怕的。#n　感覺以我們四人的力量，應該足以把對方全數打倒並逃離這裡……）"
11140-42 = "（……唉，果然還是不行。我沒有與黑市為敵的勇氣……）"
11140-43 = "（該死，我到底在做什麼啊，真丟臉……#n　明明下定決心要成為奇普托斯最厲害的不法之徒……）"
11140-44 = "（貸款也好，創業也好……淨為這些無聊的事情煩惱……）"
11140-45 = "（我想做的才不是這種事……#n　無所畏懼，不受任何拘束的冷酷不法之徒……）"
11140-47 = "（我明明想成為那樣的人……）"
11140-48 = "……姐！亞瑠小姐！"
11140-49 = "哇，哇啊！？是，是！？#n……那個，你剛才說了什麼嗎？"
11140-50 = "貸款的申請沒辦法通過，非常抱歉幫不上您的忙。"
11140-51 = "咦，咦──！？等，等一下啦！！"
11140-52 = "（啪！）"
11140-53 = "發，發生什麼事了？停電！？"
11140-54 = "到，到底是誰！？這不是連電腦都斷電了嗎！"
11140-55 = "（噠噠噠噠噠噠噠！噠噠噠噠噠噠噠！）"
11140-56 = "槍聲！？"
11140-59 = "嗚哇！啊啊啊啊！"
11140-60 = "嗚哇啊啊！"
11140-63 = "發，發生什麼……嗚啊啊！！"
11140-65 = "（啪！）"
11140-67 = "（嘟咚！）"
11140-70 = "所有人趴下！把手上的武器全部放到地上！"
11140-71 = "不聽話的人會有苦頭吃哦☆"
11140-72 = "啊，啊哈哈……要是受傷可就不好了……請趴下哦……"
11140-74 = "銀，銀行搶匪！？"
11140-75 = "發生緊急情況！發生緊急情況！"
11140-76 = "唔嘿～沒用的沒用的。#n能通報外部的保安系統已經被關閉了哦～"
11140-77 = "噫，噫噫！ "
11140-78 = "喂，我說你啊！還不快趴下！敢亂動的話小心我殺了你哦？"
11140-79 = "各位，拜託一定要好好待著……啊嗚嗚……"
11140-80 = "唔嘿～目前為止都跟計劃一樣！進行下一步吧──！#n浮士德隊長！請下指示！"
11140-81 = "咦！？咦！？#n浮士德是是是我嗎？隊長？我是隊長！？"
11140-82 = "是隊長！是BOSS！#n順帶一提……"
11140-83 = "我是泳裝蒙面團的克莉斯緹娜喲～♧"
11140-84 = "嗚哇，什麼啊！什麼時候取名叫泳裝蒙面團的！？而且也太土了吧！"
11140-85 = "…… "
11140-86 = "唔嘿，浮士德生起氣來可是很可怕的唷～？#n不聽話會被教訓的唷～？"
11140-87 = "啊嗚……變成隊長了……這樣會讓茶會的名聲蒙上汙點的……"
11140-89 = "咦……他們……"
11140-90 = "阿……阿拜多斯……？"
11140-91 = "是吧，是阿拜多斯那些孩子……雖然也有不認識的人。#n……他們在這裡做什麼？而且還戴著面罩。"
11140-92 = "是，是衝著我們來的嗎！？要除掉他們嗎！？ "
11140-93 = "不……他們的目標看起來並不是我們……那些孩子打算做什麼？#n難不成想把這裡……？"
11140-94 = "真是的～亞瑠醬在做什麼啦。"
11140-96 = "監視器的死角、警衛的動線、銀行的內部構造全部都記在我大腦裡。#n不要做無謂的抵抗。"
11140-97 = "好，那邊那個，快把東西塞進這個背包裡。#n我要剛才抵達的運鈔車的……"
11140-98 = "我，我知道了！我什麼都願意獻上！ #n不管是現金、債券還是金塊，要多少儘管拿！！"
11140-99 = "不，不用那些……我想要的是款項紀錄……"
11140-102 = "請，請收下！我已經把包包塞滿了！請饒我一命！！"
11140-103 = "啊……嗯……"
11140-106 = "……"
11140-107 = "（太，太厲害了──！這些人到底是何方神聖！？居然敢搶黑市的銀行！） "
11140-108 = "（他們打算怎麼逃出去？#n　不，比起這個，想不到世上還有這麼大膽的不法之徒！！）"
11140-109 = "（手法既專業又熟練，簡直就像為搶銀行而生的人。#n　居然短短五分鐘內就把銀行給洗劫一空！）"
11140-110 = "（太，太帥了──！好厲害！這才是真正的不法之徒！#n　嗚哇啊……我的眼淚都快流出來了！）"
11140-112 = "看來完全沒發現……"
11140-113 = "甚至眼睛還閃閃發光的。"
11140-114 = "唉……"
11140-115 = "我，我們就這樣在這裡待命嗎？"
11140-116 = "……我們沒理由幫那些孩子，也沒理由幫銀行的忙。#n況且社長現在是那副模樣……暫時先躲起來吧。"
11140-117 = "是，是……"
11140-120 = "那個，白……不，不對，蒼藍前輩！東西到手了嗎？"
11140-121 = "啊，唔，嗯。到手了。 "
11140-122 = "那要逃囉！全員撤退！"
11140-123 = "Adio～s☆"
11140-124 = "好，好像也沒有人受傷……不好意思，再見了！！"
11140-125 = "（咻──！）"
11140-127 = "抓，抓住那些傢伙！！封鎖道路！聯絡黑市守衛！"
11140-129 = "別讓任何人跑了！！"

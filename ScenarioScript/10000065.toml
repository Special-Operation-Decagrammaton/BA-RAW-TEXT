[translation]
10000065-1 = "ตอนที่ 6;เทศกาล ความฝัน และ..."
10000065-2 = "เมื่อพีน่าอยู่ข้างคุณครู พีน่าจะเป็นอมตะค่ะ!"
10000065-4 = "อึ่ก!! อะไรเนี่ย? ทำไมถึงแข็งแกร่งได้ขนาดนี้!"
10000065-5 = "หนอย! ฝากไว้ก่อนเถอะ!"
10000065-7 = "หนีไปซะแล้วเหรอ? น่าละอายชะมัด!"
10000065-8 = "อ๊ะ! แต่พีน่าต้องปกป้องบอสที่นี่!"
10000065-9 = "อืม...! ทำยังไงดีล่ะคะ?"
10000065-10 = "[s] \"ไม่เป็นไรหรอก พีน่าไปทำงานที่ต้องทำเถอะ\""
10000065-11 = "พูดอีกก็ถูกอีก! ค่ะ! รับทราบค่ะบอส! แด่ความสงบของเทศกาล! ไปล่ะนะคะ!"
10000065-12 = "พวกปีศาจบนถนนอันตรายไม่ใช่เล่นเลย บอสกลับไปรอที่ร้านเฮียกคิยาโคก่อนเถอะค่ะ!"
10000065-15 = "(ไปส่งพีน่าและกำลังจะกลับไปยังร้านเฮียกคิยาโค แต่ระหว่างนั้นก็...)"
10000065-21 = "(หยุดสังเกต)"
10000065-23 = "(เห็นเงาที่คุ้นเคยที่ปลายถนนเทศกาล)"
10000065-26 = "มองแว่บๆ เลิ่กลั่ก"
10000065-27 = "ฉึบฉับๆๆ...!"
10000065-28 = "อิซุนะ... ตอนนี้กำลังใช้ประโยชน์จากความมืดเหมือนนินจาตัวจริง!"
10000065-29 = "คุณครูต้องอยู่แถวๆ นี้แน่..."
10000065-30 = "[s] \"มาทำอะไรที่นี่น่ะอิซุนะ?\""
10000065-31 = "อ๊ะ! อิซุนะกำลัง... ตามหา... คุณครู..."
10000065-32 = "เฮือกก?! คะ... คุณครู?!!"
10000065-33 = "มะ... ไม่หรอกค่ะ! อิซุนะไม่ได้ตกใจ! อิซุนะมาเพื่อโค่นคุณครูเหมือนที่เตือนไว้คราวที่แล้วต่างหาก!"
10000065-34 = "อิซุนะกลับไปคิดทบทวนมาแล้วค่ะ!"
10000065-35 = "ที่อิซุนะพ่ายแพ้ให้ในคราวก่อน เพราะมีพวกที่ต้มตุ๋นคุณครูโผล่มาต่างหาก!"
10000065-36 = "อิซุนะก็เลยมาที่นี่! คนเดียว! เพื่อโค่นคุณครูยังไงล่ะคะ!"
10000065-37 = "เตรียมตัวไว้ได้เลยค่ะคุณครู!"
10000065-38 = "[s] \"ถ้างั้น... ไปเดินเล่นกันก่อนไหมล่ะ?\""
10000065-39 = "อื้ม! ดีเลยค่ะ!"
10000065-40 = "ซะที่ไหนกันล่ะ! อิซุนะเพิ่งบอกไปไม่ใช่เหรอว่ามาที่นี่เพื่อโค่นคุณครู...!"
10000065-41 = "[s] \"ไม่ชอบเดินเล่นเหรอ?\""
10000065-42 = "แหะๆ อ่าก็.... ก็ไม่นะคะ เดินเล่นก็ผ่อนคลายดี..."
10000065-45 = "ว้าวว คุณครู! นั่นมันขนมน้ำตาล!"
10000065-46 = "ส่วนกลิ่นที่หอมหวานนี่ก็... ขนมสายไหม!"
10000065-48 = "อ๊ะ?! ยากิโซบะ! มียากิโซบะขายด้วยค่ะ!"
10000065-51 = "ฮิฮิฮิ อร่อยจังเลยค่ะ! คุณครูก็ลองทานด้วยไหมคะ?"
10000065-53 = "ฮิฮิฮิ อิซุนะ อิซุนะ นินนิน!"
10000065-54 = "อิซุนะก็ชอบเทศกาลแห่งค่ำคืนสีขาวเอามากๆ เลยล่ะค่ะ!"
10000065-55 = "ได้มาสนุกกับคุณครูแบบนี้ มันดีต่อใจมากเลย!"
10000065-56 = "[s] \"ลองคิดดูสิว่าถ้าจู่ๆ เทศกาลสนุกๆ แบบนี้ต้องถูกยกเลิกไป...\""
10000065-57 = "หืม?! ทำไมจู่ๆ ก็พูดแบบนี้ล่ะคะ?"
10000065-58 = "[s1] \"มีคนที่ต้องการพังเทศกาลน่ะ\"\n[s2] \"ก็ผู้ว่าจ้างของอิซุนะน่ะ\""
10000065-59 = "มีคนที่ต้องการพังเทศกาล... ผู้ว่าจ้าง..."
10000065-60 = "มีคนที่ต้องการพังเทศกาล... ผู้ว่าจ้าง..."
10000065-61 = "ตะ... แต่อิซุนะก็แค่ทำตามคำสั่งของผู้ว่าจ้างเท่านั้น......"
10000065-62 = "ก็แค่พยายามจะหยุดคนที่มาขวางการทำกิจการเท่านั้น..."
10000065-63 = "แต่กลายเป็นว่ามันกำลังทำลายเทศกาลอยู่งั้นเหรอ? (งง) (สับสน)"
10000065-65 = "!! (แงงงง)"
10000065-66 = "[s] \"อิซุนะ บอกครูได้ไหมว่าใครจ้างเธอมา?\""
10000065-67 = "ผะ.. ผู้ว่าจ้างของอิซุนะ... (กลืนน้ำลาย)"
10000065-68 = "ไม่ได้หรอกค่ะ! จะเปิดเผยผู้ว่าจ้างไม่ได้...! นี่เป็นเรื่องต้องห้ามของนินจาค่ะ!"
10000065-69 = "อิ.. อิ.. อิซุนะกำลังฝันที่จะเป็นนินจาที่ยอดเยี่ยมอยู่นะคะ!"
10000065-70 = "ถึงคุณครูจะมาถามแบบนี้ก็เถอะ...!"
10000065-71 = "[s] \"แบบนี้นี่เอง เข้าใจแล้วล่ะ\""
10000065-72 = "คะ...?"
10000065-73 = "[s3] \"ถ้าอิซุนะไม่อยากพูดก็ไม่เป็นไร\"\n[s4] \"เรื่องนั้นอิซุนะต้องตัดสินใจด้วยตัวเองสิ\""
10000065-74 = "อิซุนะต้องตัดสินใจ..."
10000065-75 = "อิซุนะต้องตัดสินใจ..."
10000065-76 = "[s5] \"แต่ครูอย่างฉันก็ปล่อยให้ใครมาทำลายงานเทศกาลไม่ได้หรอกนะ\"\n[s6] \"ครูก็เลยจะขวางอิซุนะ\""
10000065-77 = "เฮือก...! นี่แปลว่า... เรามีโชคชะตาเหมือนกัน...!"
10000065-78 = "เฮือก...! นี่แปลว่า... เรามีโชคชะตาเหมือนกัน...!"
10000065-79 = "อิ.. อิซุนะขอตัวกลับก่อนนะคะ! ครั้งนี้ถือว่าเราได้สนุกในเทศกาลด้วยกัน"
10000065-80 = "แต่ครั้งหน้ามันจะไม่เป็นแบบนี้แน่ค่ะ! ครั้งหน้าอิซุนะจะ...!!"
10000065-81 = "[s] \"อืม กลับดีๆ ล่ะอิซุนะ\""
10000065-82 = "!!"
10000065-83 = "แหะๆ ค่า~ แล้วไว้เจอกันใหม่ค่ะ!"
10000065-87 = "[ns] \"นี่แปลว่ามีคนจ้างมาอิซุนะทำงานจริงๆ...\""
10000065-91 = "อ๊ะ! หาตัวเจอแล้ว คุณครูจากชาเล่ต์...?"
10000065-92 = "ออกมาเดินอยู่คนเดียวในเขตไร้กฎหมายแบบนี้... ถือว่าประมาทมากเลยนะคะ"
10000065-93 = "หากไม่อยากได้รับบาดเจ็บก็ยอมจำนนซะ!"
10000065-94 = "ยิ่งขัดขืนก็จะยิ่งเจ็บตัวนะคะ เตือนแล้วนะ!"
10000065-95 = "บอสของพวกเรามีเรื่องจะคุยกับคุณด้วย!"
10000065-96 = "[s] \"'งั้นเหรอ? ถ้างั้นก็ช่วยไม่ได้สินะ\""
10000065-97 = "เคี้ยกๆๆ เลือกที่จะเจ็บตัวสินะ!"
10000065-98 = "หา?!"
10000065-99 = "จะตามพวกเราไปโดยไม่ขัดขืนงั้นเหรอ?!"
10000065-100 = "อะ... อืม... นี่มันก็ตามแผนการอยู่หรอก... แต่มันดู... แปลกๆ นะ"
10000065-101 = "ช่างเหอะ! ไม่รู้ด้วยแล้ว! เอาตัวไปเลย!"
10000065-102 = "ค่ะ!"
10000065-106 = "ฮะ... เฮ้อ... คุณครูพูดอะไรที่ต้องให้คิดอีกแล้ว..."
10000065-107 = "อิอิ..."
10000065-108 = "ฮิฮิฮิ... แต่ว่า... ยากิโซบะที่กินกับคุณครู... มันอร่อยมากเลยละค่ะ"
10000065-109 = "บอกว่าจะขวางอิซุนะก็จริง แต่ก็มาบอกกันว่าให้กลับดีๆ... ไหนจะบอกว่าแล้วเจอกันใหม่อีก..."
10000065-110 = "อิซุนะจะต้องไม่แพ้ค่ะ! ครั้งหน้าจะต้อง... คุณครู... ด้วยเงื้อมมือของเราให้ได้!"
10000065-117 = "เอ๋? คนที่เดินอยู่กับพวกปีศาจ... อย่าบอกนะว่า!"
10000065-118 = "...คุณครูเหรอ?"
10000065-120 = "ค่ะ! ขอบคุณมากเลยค่ะ!"
10000065-121 = "เฮ้อ... จบจนได้..."
10000065-122 = "เยี่ยมไปเลยค่ะหัวหน้า! รับเครื่องดื่มนี่ไปสิคะ!"
10000065-123 = "อื้อ! ขอบใจนะพีน่า"
10000065-125 = "(อึกๆๆ) ฮื่มมม~ ชื่นใจจัง~"
10000065-126 = "เอ๋? พีน่า?"
10000065-127 = "ค่ะ! หัวหน้า....!"
10000065-128 = "....นี่เธออยู่คนเดียวเหรอ? แล้วคุณครูล่ะ?"
10000065-130 = "เฮือก?!"
10000065-134 = "บอส?! บอสหายตัวไปเหรอเนี่ย! ลืมคิดถึงเรื่องนี้ไปเลย!"
10000065-135 = "เป็นความผิดของพีน่าเองค่ะ!"
10000065-136 = "ว่าไงนะ? นี่กำลังจะบอกว่า..."
10000065-137 = "เธอช่วยเด็กที่สูญหายตามหาพ่อแม่จนเจอ แล้วคุณครูก็กลายเป็นเด็กสูญหายแทนงั้นเหรอ?!"
10000065-138 = "นะ... นี่มันเรื่องใหญ่เลยนะ!!"
10000065-139 = "คุณครูที่เป็นผู้ใหญ่ก็เป็นเด็กสูญหายได้เหรอเนี่ย~"
10000065-140 = "สึบากิจัง! นี่ไม่ใช่เวลาที่จะมาอยู่อย่างสงบนะคะ!"
10000065-141 = "ถ้าหากว่าพวกปีศาจจับตัวคุณครูไปเรียกค่าไถ่ล่ะ..."
10000065-142 = "อึ่ก!! นั่นแหละนิสัยของพวกนั้นเลย! เราจะนิ่งเฉยอยู่แบบนี้ไม่ได้แล้ว"
10000065-143 = "พีน่า! และก็ชมรมฝึกฝน!"
10000065-144 = "รีบไปตามหาคุณครูกันเถอะ!"
10000065-145 = "(ติ๊ง)"
10000065-147 = "หืม? นี่มัน..."

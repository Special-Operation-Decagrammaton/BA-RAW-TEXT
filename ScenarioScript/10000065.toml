[translation]
10000065-1 = "第6話;慶典、夢想、以及……"
10000065-2 = "和老師在一起的菲娜是無敵的！"
10000065-4 = "唔！？那，那是什麼誇張的力量！"
10000065-5 = "該死！給，給我記住！"
10000065-7 = "竟然背對敵人逃跑，武士之恥！"
10000065-8 = "別想……啊，不過菲娜必須保護頭兒……！ "
10000065-9 = "該，該怎麼辦才好！？"
10000065-10 = "[s]「沒關係，菲娜去幫切糖商人們報仇吧。」"
10000065-11 = "……是！我知道了！為了守護慶典的和平，菲娜這就出發！"
10000065-12 = "請頭兒先回百夜堂吧！不然遇到妖怪劇團就危險了！"
10000065-15 = "（目送菲娜離開後，正打算乖乖回到百夜堂時……）"
10000065-21 = "（探頭）"
10000065-23 = "（看見了熟悉的身影）"
10000065-26 = "左看看右看看……"
10000065-27 = "唰唰唰……！"
10000065-28 = "現在的伊樹菜是在黑夜中活躍的老練忍者……！"
10000065-29 = "……老師一定就在這附近沒錯……"
10000065-30 = "[s]「伊樹菜，你在這裡做什麼？」"
10000065-31 = "啊，就是啊，伊樹菜現在正在找老師……"
10000065-32 = "呃，老師！？"
10000065-33 = "沒，沒有！伊樹菜才沒有慌張！#n伊樹菜是依照上次的宣言，為了打敗老師而來的！"
10000065-34 = "伊樹菜在那之後重新思考過了！"
10000065-35 = "上次伊樹菜之所以會輸……是因為那些欺騙老師的人接二連三跑出來的關係！"
10000065-36 = "所以這次就要像忍者一樣！偷偷地潛入！#n只要獨自戰鬥就能打敗老師了！"
10000065-37 = "做好覺悟吧，老師！"
10000065-38 = "[s]「嗯。那先去散個步吧？」"
10000065-39 = "非常樂意！"
10000065-40 = "……不對！#n都，都說了伊樹菜是來打敗老師的……！"
10000065-41 = "[s]「不想和我一起散步嗎？」"
10000065-42 = "唔咦，沒，沒有，絕對沒有那種事……咦，咦……？"
10000065-45 = "哇……！老師，有椪糖耶！"
10000065-46 = "這股甜甜的香氣……是棉花糖嗎！？"
10000065-48 = "啊，炒麵！連炒麵也有賣！"
10000065-51 = "耶嘿嘿，真好吃！啊，老師要不要也吃一口？"
10000065-53 = "耶嘿嘿……哐哐！"
10000065-54 = "伊樹菜真的很喜歡百夜之春櫻花祭！"
10000065-55 = "所以能像這樣和老師一起享受，伊樹菜覺得非常開心……！"
10000065-56 = "[s]「嗯，慶典很有趣，所以不希望它被中斷呢。」"
10000065-57 = "咦……？中，中斷？為什麼突然這麼說呢？"
10000065-58 = "[s1]「似乎有人想破壞這個櫻花祭。」\n[s2]「很可能就是伊樹菜的雇主……」"
10000065-59 = "想破壞櫻花祭……？"
10000065-60 = "想破壞櫻花祭……？"
10000065-61 = "伊，伊樹菜從雇主那收到的命令是……"
10000065-62 = "因為有人想妨礙雇主的生意，所以要伊樹菜打倒他們……"
10000065-63 = "這樣會破壞掉櫻花祭嗎……？咦，咦咦……？ "
10000065-65 = "……！？"
10000065-66 = "[s]「伊樹菜，你願意告訴我雇主是誰嗎？」"
10000065-67 = "這，這個……"
10000065-68 = "……不行！#n身為一名忍者，絕對不能透露雇主的身分……！"
10000065-69 = "伊，伊樹菜要成為優秀的忍者！"
10000065-70 = "所以，就算是老師……！"
10000065-71 = "[s]「嗯，我知道了。」"
10000065-72 = "……咦？"
10000065-73 = "[s3]「如果伊樹菜不想說，我也不會勉強你。」\n[s4]「因為那是伊樹菜自己思考後做出的決定。」"
10000065-74 = "伊樹菜做出的決定……"
10000065-75 = "伊樹菜做出的決定……"
10000065-76 = "[s5]「但是，不能放任慶典被破壞。」\n[s6]「所以我會阻止伊樹菜。」"
10000065-77 = "……！#n老師和伊樹菜果然背負著這種宿命……！"
10000065-78 = "……！#n老師和伊樹菜果然背負著這種宿命……！"
10000065-79 = "伊，伊樹菜就先告辭了！#n雖然這次不知道為什麼一起在享受慶典……！"
10000065-80 = "下次就不會是這樣了！下次一定不會！"
10000065-81 = "[s]「嗯。下次見囉，伊樹菜。」"
10000065-82 = "……！！"
10000065-83 = "……是。#n那麼老師，後會有期！"
10000065-87 = "[ns]「伊樹菜果然是聽從雇主的命令……」"
10000065-91 = "那麼，差不多該輪到我們出場了吧。#n好久不見了呢～夏萊的老師。"
10000065-92 = "沒帶護衛就在這種地方遊蕩可是很危險的唷？"
10000065-93 = "不想受傷的話就乖乖投降吧！"
10000065-94 = "反抗也只會自討苦吃的說！"
10000065-95 = "某人有事想找你啊！"
10000065-96 = "[s]「這樣啊，那走吧。」"
10000065-97 = "哈哈！那當然，不過就算你反抗也……！"
10000065-98 = "咦！？"
10000065-99 = "居然乖乖答應了！？"
10000065-100 = "呃呃……雖然計畫成功了，但這樣真的好嗎……？"
10000065-101 = "不管了！特地自投羅網也省得麻煩，這樣正好！把他帶走！"
10000065-102 = "是！"
10000065-106 = "啊嗚……又沒能跟老師分出勝負……"
10000065-107 = "……耶嘿。"
10000065-108 = "耶嘿嘿……和老師一起吃的炒麵，真好吃啊……"
10000065-109 = "老師雖然說要阻止伊樹菜，卻又在最後說「下次見」……"
10000065-110 = "……伊樹菜不能輸，這也是為了老師！#n下次一定要親手將老師……！"
10000065-117 = "妖怪劇團居然在這種地方？#n而且在旁邊的是……"
10000065-118 = "……老師？"
10000065-120 = "非常感謝！辛苦了！"
10000065-121 = "嗚嗚，終，終於結束了……"
10000065-122 = "辛苦了，部長！這裡有飲料，請用！"
10000065-123 = "謝啦，菲娜。"
10000065-125 = "（咕嘟咕嘟）噗哈～真涼快～"
10000065-126 = "……咦？話說菲娜……"
10000065-127 = "有什麼事嗎部長！"
10000065-128 = "……老師怎麼了嗎？"
10000065-130 = "……咦！？"
10000065-134 = "頭兒！？頭兒失蹤了！？我完全沒發現！"
10000065-135 = "唔……！菲娜犯下了悔恨的失誤！"
10000065-136 = "咦，等等，也就是說……"
10000065-137 = "在幫助迷路女孩的期間，換老師迷路了嗎！？"
10000065-138 = "大，大事不好了！！"
10000065-139 = "原來大人也會迷路啊～"
10000065-140 = "椿醬，現在不是悠哉的時候了！"
10000065-141 = "如果妖怪劇團是在暗地裡等著老師落單的時機……"
10000065-142 = "唔，很有可能……！這樣下去不行！"
10000065-143 = "菲娜，還有修行部的各位！"
10000065-144 = "趕快去找老師……！"
10000065-145 = "（叮鈴）"
10000065-147 = "嗯？這是……"

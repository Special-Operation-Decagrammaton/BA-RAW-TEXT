[translation]
10045110-1 = "ตอนที่ 11;การต่อสู้ที่ไม่อาจถอยกลับ"
10045110-2 = "คุณนางุสะ คุณจะมาเป็นคู่ต่อสู้ของฉันเหรอคะ?"
10045110-3 = "ฮุฮุฮุ คุณก็เป็นคนเก่งจริงๆ ถือว่าสมน้ำสมเนื้อกับวาคาโมะผู้นี้ค่ะ"
10045110-4 = "ถ้าอย่างนั้นก็มาเริ่มกันเลย..."
10045110-5 = "ไม่หรอก ฉันไม่ได้จะเป็นคู่ต่อสู้ของเธอ"
10045110-6 = "คะ? ถ้างั้นจะเป็นใคร...?"
10045110-7 = "คู่ต่อสู้ของเธอก็คือ..."
10045110-12 = "คิเคียวต่างหากล่ะ!"
10045110-16 = "ฉันไม่เคยต่อสู้บนทุ่นลอยน้ำมาก่อน... ก็เลยรับประกันไม่ได้ว่าจะชนะ"
10045110-17 = "ในสนามแข่งแบบนี้ละก็... คิเคียวเหมาะที่จะเป็นคู่ต่อสู้ของเธอที่สุด"
10045110-18 = "ข้าก็เห็นด้วยเจ้าค่ะ"
10045110-19 = "ถ้าเป็นรุ่นพี่คิเคียวในตอนนี้ละก็ ไม่ว่าคู่ต่อสู้จะเป็นใครก็ต้องแสดงฝีมือที่เอเลแกนโตะ~ และพาวเวอร์ฟูล~ ได้แน่นอนเจ้าค่ะ!"
10045110-21 = "เป็นคำพูดที่ได้ฟังแล้วมองข้ามไม่ได้เลยนะคะ ที่ว่ามาเป็นเรื่องจริงเหรอคะ?"
10045110-22 = "ฉันจะไม่ปฏิเสธแล้วกัน..."
10045110-23 = "อิซุนะกับเรนเกะก็เพิ่งจะแข่งกันไป ส่วนชิเซะก็ยังฟื้นฟูร่างกายอยู่"
10045110-24 = "ในบรรดาคนที่เข้ารอบมา คนที่ได้เปรียบด้านสมรรถภาพมากที่สุดก็คือฉัน"
10045110-25 = "การตกรอบเป็นคนแรกส่งผลให้เกิดปรากฏการณ์ผีเสื้อแบบนี้เองสินะ... น่าสนุกดีจริงๆ"
10045110-27 = "สมกับที่เป็นรุ่นพี่คิเคียว! ข้ารอคอยความมั่นใจเต็มเปี่ยมแบบนี้จากรุ่นพี่อยู่เลยเจ้าค่ะ!"
10045110-28 = "งั้นก็ฝากด้วยนะ พวกเราจะคอยให้กำลังใจอยู่ทางนี้เอง"
10045110-33 = "คุณครู ให้ฉันไปแข่งขันได้ใช่มั้ย?"
10045110-34 = "[s1] \"แน่นอนอยู่แล้ว!\"\n[s2] \"อื้อ ครูฝากด้วยนะ!\""
10045110-37 = "จากนี้ไปจะเป็นแมตช์พิเศษระหว่างผู้เข้าแข่งขันคิเคียวกับผู้เข้าแข่งขันวาคาโมะค่ะ!"
10045110-39 = "โอ้ว! แมตช์นี้ไม่ดูไม่ได้แล้ว!"
10045110-40 = "นี่พวกเรา คิดว่าฝ่ายไหนจะชนะงั้นเหรอ?"
10045110-41 = "อืม... ยังไงก็น่าจะเป็นหนึ่งในเจ็ดอาชญากรคนนั้นหรือเปล่าคะ?"
10045110-42 = "ฉะ... ฉันว่าเฮียกกะเรียวรันน่าจะชนะค่ะ! ขอเดิมพันด้วยขนมของฉันเลย!"
10045110-44 = "เอ๋? เป็นการเดิมพันเพื่อขนมแล้วเหรอเนี่ย?! อืมมม..."
10045110-45 = "งั้นฉันขอลงข้างอาชญากรคนนั้น!"
10045110-46 = "ฝากด้วยนะ...! ต้องชนะให้ได้ล่ะ...! ฉันเอาขนมของตัวเองไปเดิมพันเลยนะ...!"
10045110-47 = "ดูทุกคนจะลุ้นกันมากเลยนะ..."
10045110-48 = "งั้นก็มาเริ่มกันเถอะ ฉันพร้อมแล้ว"
10045110-49 = "ฮุฮุฮุ มั่นใจมากมั้ยคะ?"
10045110-50 = "นี่ไม่เกี่ยวกับความมั่นใจหรอก"
10045110-51 = "มันคือสิ่งที่ฉันต้องทำต่างหาก"
10045110-52 = "อ่า... มีจิตใจกล้าหาญดีจังเลยนะคะ งั้นก็มาเริ่มกันเลยค่ะ"
10045110-53 = "มาดูกันว่าใครจะเป็นคนที่คุณครูเลือก...!"
10045110-55 = "เอาละค่ะ เริ่มการแข่งขันได้!"
10045110-56 = "[ns] \"เปิดศึกประชันบนผืนน้ำ... อย่างยุติธรรม!!\""
10045110-64 = "(นี่สินะจิ้งจอกแห่งความพินาศ... แข็งแกร่งอย่างที่คิดไว้เลย...!)"
10045110-65 = "วาคาโมะผู้นี้จะเอาชัยชนะมาฝากคุณท่านเองค่ะ!"
10045110-66 = "อึก...!"
10045110-72 = "อ๊ะ ผู้เข้าแข่งขันคิเคียวกำลังถูกบีบให้จนมุมค่ะ! แบบนี้จะตกทะเลลงไปหรือเปล่านะ!"
10045110-73 = "วาคาโมะเป็นต่อเรื่องพละกำลังและประสาทสั่งการมาก..."
10045110-74 = "แต่ฉันก็มั่นใจว่าคิเคียวสู้กลับได้ คิเคียวในตอนนี้น่ะ แข็งแกร่งกว่าเดิมแล้ว...!"
10045110-76 = "(คู่ต่อสู้มีพละกำลังมหาศาลเลย)"
10045110-77 = "(เหมือนกับคลื่นลูกใหญ่ที่ไม่อาจต้านทานได้อย่างนั้นละ ถ้าจะเอาชนะพลังนี้ละก็...)"
10045110-79 = "ตั้งใจเตะขากับเหวี่ยงแขนให้มากกว่านี้อีก! อย่าเกร็งตัว ปล่อยตามสบาย! ไม่งั้นก็จะจมแบบนี้เรื่อยๆ นะ!"
10045110-80 = "อึก... บอกว่าปล่อยตัวตามสบาย แต่ให้เตะขากับเหวี่ยงแขนเนี่ยนะ ตกลงมันสบายยังไง?"
10045110-81 = "กับแรงที่ต้านทานไม่ได้น่ะ เราจะดื้อดึงใช้แรงของเราไปต้านไม่ได้หรอก เพราะงั้นก็ให้ผ่อนคลายไป#nกับสายน้ำแล้วเป็นหนึ่งเดียวกับมัน"
10045110-82 = "แล้วเธอจะรู้เองความรู้สึกนั้นมันเป็นยังไง"
10045110-84 = "(ปล่อยร่างกายให้ไหลไป)"
10045110-85 = "(ไม่ต้องกดดัน และแค่ทำในสิ่งที่ฉันถนัด)"
10045110-92 = "ผู้เข้าแข่งขันคิเคียวที่จนมุมอยู่เมื่อกี้เริ่มตอบโต้กลับแล้วค่ะ! #nเธอหลบการโจมตีของผู้เข้าแข่งขันวาคาโมะ แล้วก้าวเท้าไปข้างหน้า...!"
10045110-93 = "แล้วก็หมุนตัว...?!"
10045110-94 = "ท่านั้นมัน...!!"
10045110-98 = "[ns] \"นี่ละ! ท่าเล่นพันด้ายของคิเคียว!\""
10045110-99 = "อึก?! อะ... อะไรกันคะเนี่ย?! ทำไมดิ้นไม่หลุดเลย...!"
10045110-100 = "นี่คือพื้นฐานของการเล่นพันด้าย"
10045110-101 = "นี่มันเหมือนการเล่นพันด้ายตรงไหนกันคะ!"
10045110-102 = "มันคล้ายกันตรงที่เรารัดฝ่ายตรงข้ามไว้ได้ไง"
10045110-103 = "อ๊ะ ผู้เข้าแข่งขันวาคาโมะน่าจะตกใจจนรับมือไม่ถูกเลยค่ะ...!"
10045110-105 = "นี่ละคิเคียว คิเคียวของเรารู้วิธีปราบคู่ต่อสู้ด้วยการใช้กำลังที่มีประสิทธิภาพมากกว่า"
10045110-106 = "ตะ... แต่ว่าตอนนั้นรุ่นพี่เรนเกะก็หลุดออกมาได้ง่ายๆ นะเจ้าคะ?"
10045110-108 = "ไม่หรอก... บอกตามตรงว่าตอนนั้นฉันก็เกือบไม่ไหวเหมือนกัน"
10045110-109 = "แต่คิเคียวในตอนนี้เด็ดเดี่ยวมากกว่าเดิมแล้ว...!"
10045110-110 = "อะ... อึกกก...!"
10045110-116 = "ท่าทางฉันจะ... ประเมินคุณต่ำไปหน่อยนะคะ"
10045110-118 = "โอ้ว ผู้เข้าแข่งขันวาคาโมะหลุดออกมาจากท่าพันด้ายของผู้เข้าแข่งขันคิเคียวได้แล้วค่ะ! "
10045110-120 = "แน่จริงก็เข้ามาสิ ฉันจะจับเธอพันให้หนำใจเลยละ"
10045110-121 = "ฉันจะทุ่มคุณตกทะเลก่อนที่คุณจะได้ทำแบบนั้นอีกค่ะ...!"
10045110-129 = "...!!"
10045110-130 = "ความยืดหยุ่นของทุ่นลอยน้ำทำให้เราต้องเคลื่อนไหวร่างกายมากกว่าที่คิด"
10045110-131 = "แต่การบุกเข้ามาด้วยความตื่นเต้นและท่าทางเล่นใหญ่แบบนั้นก็ไม่ต่างจากการขอให้ฉันจับยึดไว้#nอีกครั้งหรอก...!"
10045110-132 = "...!!"
10045110-133 = "ผู้เข้าแข่งขันวาคาโมะถูกผู้เข้าแข่งขันคิเคียวยึดไว้ได้อีกครั้งแล้วค่ะ!"
10045110-134 = "นั่นสิ... ถ้าเป็นการต่อสู้ทั่วไป คิเคียวอาจเป็นรองวาคาโมะก็ได้"
10045110-135 = "แต่ถ้าเป็นการต่อสู้ในสนามที่คุ้นเคยที่เคยวางกลยุทธ์ไว้แล้วละก็...!"
10045110-136 = "รุ่นพี่คิเคียวได้เปรียบกว่าจริงด้วยเจ้าค่ะ!"
10045110-138 = "ผู้เข้าแข่งขันคิเคียวจะคว้าชัยชนะมาได้หรือเปล่า...!!"
10045110-139 = "(ในขณะที่การต่อสู้อันดุเดือดดำเนินต่อไป...)"
10045110-146 = "เอ๋...? เกิดเรื่องอะไรอีกคะ?"
10045110-147 = "[s] \"เหมือนพื้นจะระเบิดเลยนะ...\""
10045110-148 = "อ๊ะ?! แถมทางนั้นยังมี...?!"
10045110-149 = "คิเคียว! มีคลื่น...! ข้างหลัง!!"
10045110-158 = "อ๊ะ เกิดปัญหาที่คาดไม่ถึงขึ้นค่ะ!"
10045110-159 = "ผู้ชมทุกท่านรอผลตัดสินการแข่งขันจากวิดีโอนะคะ...!"
10045110-165 = "พื้นระเบิดงั้นเหรอ..."
10045110-166 = "นั่นสิ แต่เธอเป็นคนที่ตกน้ำไปก่อนนะ"
10045110-167 = "ไม่ค่ะ ไม่มีทางเป็นอย่างนั้นหรอกค่ะ"
10045110-172 = "โอ้ว และผู้ชนะก็คือ! คิริว~ คิเคียว...!!"
10045110-177 = "อะไรกัน..."
10045110-178 = "ถึงจะโดนคลื่นลูกใหญ่ซัดตกทะเลไปทั้งคู่... แต่ก็ให้ยึดกติกาของการแข่งขันที่ว่า <ใครตกน้ำไปก่อนคือฝ่ายแพ้> งั้นเหรอคะ?"
10045110-179 = "ถ้างั้นครั้งนี้ฉันจะยอมถอยให้แต่โดยดีตามที่สัญญากับคุณครูไว้ค่ะ แต่ครั้งหน้าละก็..."
10045110-181 = "อื้อ ถ้าอยากท้าสู้กัน ฉันก็จะรับคำท้าทุกเมื่อ"
10045110-182 = "ฮึ่ม จะว่าไปแล้วคุณก็..."
10045110-183 = "มีท่าว่ายน้ำที่เป็นเอกลักษณ์มากเลยนะคะ... ดูแล้วเหมือนกับ..."
10045110-184 = "พอเลย ไม่ต้องพูดอะไรต่อนะ"
10045110-186 = "เอาละ...! ในเมื่อแมตช์พิเศษจบไปแล้ว งั้นเราก็มาเตรียมสนามเพื่อแข่งรอบชิงชนะเลิศกันใหม่..."
10045110-191 = "คะ... ครั้งนี้อะไรอีกคะเนี่ย?!"
10045110-192 = "[s] \"เหมือนจะมีจุดที่เสียหายหลายจุดเลยละ...\""
10045110-193 = "มะ... ไม่ได้นะ! ทีมงานคะ! มาช่วยกันดับไฟเร็วเข้าค่ะ...!"
10045110-194 = "[ns3] \"ครูว่าไม่น่าทันแล้วนะ...\"\n[ns4] \"ครูว่ามันจะระเบิดเอานะ...\""

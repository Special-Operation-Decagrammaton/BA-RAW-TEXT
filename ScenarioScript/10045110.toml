[translation]
10045110-1 = "Episode 11;A Fight You Can't Back Down From"
10045110-2 = "Do you challenge me, Nagusa?"
10045110-3 = "Heehee. I accept! As the leader of the Hyakkaryouran, you're a worthy opponent!"
10045110-4 = "Then, let us..."
10045110-5 = "No. I will not face you."
10045110-6 = "Huh? Then, who?"
10045110-7 = "Your opponent shall be..."
10045110-12 = "Kikyou!"
10045110-16 = "I've never fought atop a floating platform, so I have no confidence in my victory."
10045110-17 = "Kikyou, on the other hand, has already experienced it. She would give you a match well worth your time."
10045110-18 = "I am in complete agreement!"
10045110-19 = "Kikyou can now dance in the wind with the power of a thousand lions!"
10045110-21 = "An audacious claim. Do you endorse it?"
10045110-22 = "...I can't deny what she says."
10045110-23 = "Izuna, Renge, and Chise are still recovering from their matches."
10045110-24 = "Among the semi-finalists, I carry the greatest stamina advantage."
10045110-25 = "My quick elimination created a butterfly effect that led me here."
10045110-27 = "That is our Kikyou! Cool, confident, and collected!"
10045110-28 = "Then we'll be cheering you on!"
10045110-33 = "Is it fine if it's me, Sensei?"
10045110-34 = "[s1] \"Of course!\"\n[s2] \"I'll leave it to you!\""
10045110-37 = "Then our exhibition match will be between Kikyou and Wakamo!"
10045110-39 = "Wow! This is one for the ages!"
10045110-40 = "Hey, who do you think is gonna win?"
10045110-41 = "Um... I mean, she's one of the Seven Prisoners, isn't she?"
10045110-42 = "I-I'm thinkin' the Hyakkaryouran! I'll bet my snacks on it!"
10045110-44 = "Huh? We're bettin' snacks now?! Um... Ummm..."
10045110-45 = "Then I'm putting my money (snacks) on the Seven Prisoner girl!"
10045110-46 = "Please win! I beg of you! My snacks are my life!"
10045110-47 = "...Everyone seems to be looking forward to it."
10045110-48 = "My preparations are complete. Let us begin."
10045110-49 = "Heehee. Such confidence."
10045110-50 = "\"Confidence\" plays no role here."
10045110-51 = "I simply must, so I shall."
10045110-52 = "Ah. I must acknowledge your resolve. Then, come."
10045110-53 = "Who shall emerge as Sensei's champion?"
10045110-55 = "The match is starting!"
10045110-56 = "[ns] \"Let's have a fair and square showdown...!\""
10045110-64 = "(As expected of the Fox of Calamity. She's strong!)"
10045110-65 = "Sensei! This victory is for you!"
10045110-66 = "Ugh!"
10045110-72 = "Kikyou is already being cornered? Will this be over faster than we thought?"
10045110-73 = "...Wakamo's strength is truly terrifying."
10045110-74 = "However, right now, Kikyou is stronger than she's ever been. I have faith in her!"
10045110-76 = "(What overwhelming strength...)"
10045110-77 = "(It's like being taken in by a massive wave. An unstoppable force.)"
10045110-79 = "Move your arms and legs more! And relax! You're going to drown if you don't!"
10045110-80 = "How, exactly, do you expect me to relax and move my limbs simultaneously? Does that sound logical to you?!"
10045110-81 = "Haven't you heard of the irresistible force paradox? You can't be an immovable object! Go with the flow!"
10045110-82 = "Once you do, you'll quickly get used to it."
10045110-84 = "(I simply need to feel the flow.)"
10045110-85 = "(There's no pressure. I trust myself.)"
10045110-92 = "Despite her precarious position, Kikyou manages to pull off a counterattack! She dodges Wakamo's attack and is going to trip—"
10045110-93 = "No, she's spinning!"
10045110-94 = "That technique...!!"
10045110-98 = "[ns] \"She did it! Kikyou's thread grab!\""
10045110-99 = "Ack?! Wh-Why can't I get out?"
10045110-100 = "It's the fundamentals of knitting."
10045110-101 = "I've never heard of such knitting!"
10045110-102 = "It's similar in the sense that I'm knitting my target."
10045110-103 = "Ah! Wakamo has been caught completely off guard!"
10045110-105 = "Kikyou's style is to suppress her opponent with as few moves as possible."
10045110-106 = "H-However, Renge broke free from that technique, did she not?"
10045110-108 = "To be honest, it was only because I was somewhat expecting that from her."
10045110-109 = "And the Kikyou we're looking at now is burning with youth!"
10045110-110 = "Ugh! UGHHH!"
10045110-116 = "...It appears I underestimated you."
10045110-118 = "Ooh, Wakamo! She did it! She broke free from Kikyou's hold!"
10045110-120 = "Come. I'll take you down as many times as I need."
10045110-121 = "Then I simply must act first!"
10045110-129 = "...!!"
10045110-130 = "The elasticity of the inflatable causes your movements to be larger, which makes you easy to read."
10045110-131 = "All your flailing makes it seem like you're begging me to trap you."
10045110-132 = "...!!"
10045110-133 = "And Kikyou gets Wakamo back in her hold!"
10045110-134 = "...It's true that in a normal fight, Kikyou's chances of victory against Wakamo are slim."
10045110-135 = "But this is terrain she knows! And she's our strategist!"
10045110-136 = "Kikyou had the upper hand all along!"
10045110-138 = "Wow! It looks like Kikyou just may secure the victory here!"
10045110-139 = "Just when the battle was reaching its climax..."
10045110-146 = "...Huh? What happened?"
10045110-147 = "[s] \"The platform...exploded, it would seem.\""
10045110-148 = "Ah! Wh-What is THAT?!"
10045110-149 = "Kikyou, behind you! A wave!"
10045110-158 = "What an unexpected turn of events!"
10045110-159 = "Please wait while we review the footage to determine the winner!"
10045110-165 = "The platform exploded..."
10045110-166 = "Yes. However, you fell off first."
10045110-167 = "Absolutely not."
10045110-172 = "Ooh, and the winner is! Kiryuu Kikyou!!"
10045110-177 = "This is..."
10045110-178 = "Regardless of how it happened, the rule is, \"Whoever falls into the ocean first loses.\""
10045110-179 = "Then, as I promised to Sensei, I shall defer to the rules and concede. However, next time..."
10045110-181 = "Yes. Next time."
10045110-182 = "Hm. On another note..."
10045110-183 = "...you swim strangely. Sort of like—"
10045110-184 = "Stop. Stop right there. Do not utter another word."
10045110-186 = "Well, that's it for the exhibition match, everyone! Let's resume the—"
10045110-191 = "Wh-What now?!"
10045110-192 = "[s] \"We've got...a few broken parts, here and there.\""
10045110-193 = "A-Augh! Operators! The fire! Put out the fire!"
10045110-194 = "[ns3] \"It's a little late for that...\"\n[ns4] \"...Everything always ends with an explosion, huh?\""

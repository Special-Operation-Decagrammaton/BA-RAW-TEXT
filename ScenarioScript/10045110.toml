[translation]
10045110-1 = "第11話;無法退讓的戰鬥"
10045110-2 = "名草同學要當我的對手嗎？"
10045110-3 = "唔呵呵，你的確是個強者。#n作為若藻我的對手也毫不遜色。"
10045110-4 = "那麼就趕緊……"
10045110-5 = "不，要和你對戰的人不是我。"
10045110-6 = "嗯？不然是哪位呢……？"
10045110-7 = "你的對手……"
10045110-12 = "是桔梗！"
10045110-16 = "我從來沒有在浮標上戰鬥過……所以無法保證勝利。"
10045110-17 = "不過在這樣的場地上……桔梗才是最適合你的對手。"
10045110-18 = "小女子也這麼認為。"
10045110-19 = "現在的桔梗前輩，不論對手是誰都能展現優雅又強勁的實力！"
10045110-21 = "這番話可不能當作沒聽見呢。#n你們是認真的嗎？"
10045110-22 = "……我不否認。"
10045110-23 = "伊樹菜和蓮華剛打完比賽，知世也還沒完全恢復。"
10045110-24 = "參加準決賽的選手之中，我的體力是最充沛的。"
10045110-25 = "最先被淘汰的我，反而得益於這種蝴蝶效應啊……有意思。"
10045110-27 = "不愧是桔梗前輩！#n這樣自信滿滿的樣子，小女子已經等好久了呢！"
10045110-28 = "那就交給你啦。#n我們會在後面為你加油的。"
10045110-33 = "老師，這裡交給我沒問題吧？"
10045110-34 = "[s1]「當然！」\n[s2]「拜託你了！」"
10045110-37 = "那麼現在，將進行桔梗選手對若藻選手的特別賽！"
10045110-39 = "哦！這可不能錯過啊！"
10045110-40 = "你們覺得誰會贏？"
10045110-41 = "唔嗯……應該是七罪人吧？"
10045110-42 = "我，我覺得是百花繚亂會贏！#n要賭上明天的點心也沒問題！"
10045110-44 = "咦？這是要賭點心的節奏嗎！？#n唔唔……"
10045110-45 = "那我押七罪人！"
10045110-46 = "拜託了……！一定要贏啊……！#n我可是把點心全部賭上了啊……！"
10045110-47 = "……看來這是場萬眾期待的比賽呢。"
10045110-48 = "那麼就趕快開始吧。#n我這邊已經準備就緒了。"
10045110-49 = "唔呵呵，看來你似乎頗有自信呢？"
10045110-50 = "這不是有沒有自信的問題。"
10045110-51 = "而是必須得做到。"
10045110-52 = "啊啊，這股氣魄我確實接收到了。#n那麼開始吧。"
10045110-53 = "看看誰能獲得老師的認可……！"
10045110-55 = "那麼比賽開始！"
10045110-56 = "[ns]「光明正大……一決勝負！」"
10045110-64 = "（不愧是災厄之狐，好強……！）"
10045110-65 = "若藻我，必將為了老師奪下勝利！"
10045110-66 = "咕嗚……！"
10045110-72 = "啊啊，桔梗選手逐漸被逼到了角落！#n難道會就這樣掉進海裡嗎！"
10045110-73 = "……果然在力量和運動神經方面，還是若藻更勝一籌。"
10045110-74 = "不過桔梗他一定能做到的。#n因為現在的他，比任何時候都強……！"
10045110-76 = "（對手擁有壓倒性的力量）"
10045110-77 = "（簡直就像無法抗拒的巨浪一般。#n　要想戰勝這股力量的話……）"
10045110-79 = "再用力擺動手腳！#n身體要放鬆！不然會一直往下沉的！"
10045110-80 = "唔……既要放鬆又要拚命擺動，怎麼可能做得到啊？"
10045110-81 = "面對無法抗拒的力量不能硬碰硬，而是要放鬆地享受它。"
10045110-82 = "你很快就能明白那種感覺的。"
10045110-84 = "（只要順勢而行就沒問題了）"
10045110-85 = "（不必有壓力，只要做自己擅長的事就好）"
10045110-92 = "陷入險境的桔梗選手，在此展開反擊！#n閃過若藻選手的攻擊之後，伸腳勾住了對方……！"
10045110-93 = "就這樣開始旋轉……！？"
10045110-94 = "那個技巧是……！！"
10045110-98 = "[ns]「出現了！是桔梗的『線團絞』！」"
10045110-99 = "唔……！？#n怎，怎麼回事！？居然會動彈不得……！"
10045110-100 = "這是翻花繩的基本技巧。"
10045110-101 = "這是哪門子的翻花繩啊！"
10045110-102 = "至少在纏住對手這點上有共通點。"
10045110-103 = "啊啊，若藻選手似乎慌了手腳，沒能妥善應對……！"
10045110-105 = "不愧是桔梗，很懂得如何用最有效率的方式壓制對手。"
10045110-106 = "但蓮華前輩不是曾經破解過這招嗎？"
10045110-108 = "不，老實說……我當時也只是驚險過關。"
10045110-109 = "而現在的桔梗，氣勢跟那時完全不同……！"
10045110-110 = "唔，唔唔唔……！"
10045110-116 = "……稍微，有點太小看你了呢。"
10045110-118 = "若藻選手成功破解了桔梗選手的線團絞！"
10045110-120 = "隨時放馬過來。我會再纏住你的。"
10045110-121 = "在那之前，我會先壓制住你……！"
10045110-129 = "……！！"
10045110-130 = "由於浮標有彈性的關係，身體能擺出的動作比想像中還受限。"
10045110-131 = "像你這樣大動作地衝過來，只是等著再被我抓住而已……！"
10045110-132 = "……！！"
10045110-133 = "若藻選手！又被桔梗選手纏住了！"
10045110-134 = "……沒錯。如果是一般戰鬥的話，桔梗可能會被若藻給壓制。"
10045110-135 = "不過在熟悉的戰場，又擁有充足戰術籌備的桔梗……！"
10045110-136 = "果然還是桔梗前輩更有優勢！"
10045110-138 = "桔梗選手！究竟能不能就此鞏固勝利呢……！！"
10045110-139 = "（就在兩人激戰正酣之際……）"
10045110-146 = "……咦？這次又怎麼了？"
10045110-147 = "[s]「好像是踏板爆炸了……」"
10045110-148 = "啊！？居然連那裡都……！？"
10045110-149 = "桔梗！後面有浪……！！"
10045110-158 = "啊啊，發生了意料之外的變數！"
10045110-159 = "比賽結果將透過影像判定……！"
10045110-165 = "踏板竟然爆炸了……"
10045110-166 = "就是說啊，不過先掉下去的人可是你哦。"
10045110-167 = "不可能。絕對不可能。"
10045110-172 = "哦，勝利者是……桐生～桔梗！！"
10045110-177 = "這是……"
10045110-178 = "即使被突如其來的大浪捲走……#n也得遵守「先掉進海裡的人輸」這條規則吧。"
10045110-179 = "那麼按照與老師的約定，這次我會乾脆退場。但下次……"
10045110-181 = "沒問題。我隨時接受挑戰。"
10045110-182 = "哼嗯，不過話說回來……"
10045110-183 = "……你游泳的姿勢還真特別呢。#n簡直就像──"
10045110-184 = "到此為止。別再說下去了。"
10045110-186 = "那麼……！特別賽總算告一段落，接下來將準備重啟決賽……"
10045110-191 = "又，又又又怎麼啦！？"
10045110-192 = "[s]「看來有好幾個地方都壞掉了呢……」"
10045110-193 = "糟，糟糕！工作人員！請趕緊滅火……！"
10045110-194 = "[ns3]「恐怕已經太遲了吧……」\n[ns4]「……最後果然還是以爆炸收尾嗎。」"

[translation]
33250-1 = "Episode 25; Epilogue"
33250-2 = "Aaaaaah! How dare they make a fool of me?!"
33250-3 = "Iroha! Where are you?! Prepare you-know-what! We can't just take this lying down!"
33250-4 = "No, I don't-know-what. In any case, you should be getting more rest."
33250-5 = "Besides, we were out for so long that the conflict has already been resolved. Also, please do something about your hair before you open your mouth again."
33250-6 = "What was that? What's wrong with my hair...?"
33250-7 = "NOOO! WHO DID THIS TO MY HAIR?!"
33250-8 = "Do you not remember us going down in a ball of flames? It must have been... *sigh* Never mind."
33250-10 = "How are you feeling, Miss Nagisa?"
33250-11 = "I thought my halo was going to shatter, but now I'm thankful I'm alive."
33250-12 = "As are we. Please take your time to recover."
33250-13 = "Thank you...but was that the only reason you came to see me?"
33250-14 = "No... Actually, I was meant to deliver this letter. It's from Miss Mika."
33250-15 = "What does it say?"
33250-16 = "Um, well... "
33250-18 = "Hey, Nagi! I heard you've been out like a light ever since that missile hit! "
33250-19 = "A lot's happened while you were napping, you know. Don't you think you should be setting a better example as the host? "
33250-20 = "I know I tell you that you work too hard and you should take it easy, but I didn't think you'd take it THAT easy! It's about time you woke up, sleeping beauty. "
33250-21 = "Anyway, now that you're up, could I ask you for a favor? Get out of bed and get back out there. There's a lot that needs doing."
33250-22 = "Firstly, the confinement room only gets basic network TV! Can you believe that? Hook me up with cable so I can watch all my favorite shows 24/7!"
33250-23 = "Oh, and I'm also out of my favorite moisturizer. It's only carried in a few places, so could you be a dear and go buy some for me? I'll send you the directions later!"
33250-24 = "OH! And my hair dryer barely does the job anymore. Can you get me a new one? Top of the line, please! "
33250-25 = "Just get me the same one you use! You know, that REALLY expensive one!"
33250-26 = "Oh, and, and...!"
33250-28 = "..."
33250-29 = "How would you like us to...answer her requests? She doesn't seem to be taking her imprisonment very seriously."
33250-30 = "Please see to it that she's only fed roll cakes from now on."
33250-31 = "R-Roll cakes?! "
33250-72 = "Good to see you two again."
33250-73 = "C-Captain?!"
33250-74 = "The captain is back!"
33250-75 = "I'm sorry for leaving you all so suddenly."
33250-76 = "WAAAHHH! Captain!"
33250-82 = "Now, now. You don't have to cry. I'm back now."
33250-85 = "Mika..."
33250-86 = "What's up, Nagi? Why the long face? Everything worked out in the end."
33250-87 = "Yes, but..."
33250-93 = "\"...there's still plenty of work to be done.\"#nIsn't that right?"
33250-94 = "S-Seia...?"
33250-95 = "Whoa! Where did you come from?!"
33250-97 = "It's a pleasure to see you both again."
33250-98 = "It's been quite some time since the Tea Party was fully attended."
33250-99 = "We have a lot of catching up to do..."
33250-100 = "...and I don't think we can put off this conversation any longer."
33250-101 = "It's time we shared things we never have before—never could."
33250-102 = "And the things we always wanted to tell one another."
33250-103 = "We're sure to encounter our share of misunderstandings. We'll just have to have faith in one another, even if we can never truly know what the other is thinking. Quite the paradox."
33250-104 = "We have no choice but to traverse the darkness with that in mind. That is our assignment."
33250-108 = "..."
33250-109 = "Oh, Seia. You make it sound so daunting! Those big philosophical speeches are why you don't have more friends, you know?"
33250-110 = "..."
33250-111 = "On the contrary. Maybe you would have more if you filled that empty head of yours with some culture and sophistication."
33250-112 = "S-Settle down, you two..."
33250-114 = "[ns] \"So...the original Make-Up Work Club passed and disbanded...\""
33250-116 = "[ns] \"...and I'm here to advise the NEW Make-Up Work Club.\""
33250-117 = "..."
33250-118 = "..."
33250-119 = "..."
33250-120 = "..."
33250-121 = "[ns] \"Why is it still the same members?!\""
33250-123 = "H-Haha... Well, the thing is..."
33250-124 = "...I went to a Peroro concert and sort of forgot I had an exam the next day."
33250-125 = "We were so busy that I forgot to study for my next exam."
33250-126 = "Um, so I got a little overconfident and tried to enroll in a third-year class, and...yeah."
33250-127 = "And I couldn't let them all join the club again without me, so I tanked another exam. ♥"
33250-128 = "I-I'm sorry, Sensei. We really let you down..."
33250-129 = "B-But at least we don't have to worry about being expelled this time, and the exams should be normal!"
33250-130 = "[ns] Faint."
33250-132 = "S-Sensei?!"
33250-133 = "Sensei!"
33250-134 = "Wh-What the heck?! Don't you think you're overreacting a little?!"
33250-135 = "Oh, dear. You really do look good on your back, Sensei."
33250-136 = "Cease! Stop trying to take advantage of the situation, you perv!"
33250-137 = "DEATH PENALTY!"
33250-144 = "Azusa..."
33250-145 = "I expect you and your friends to continue learning and growing together."
33250-146 = "You'll keep striving for a brighter future."
33250-147 = "I know you will because you're strong."
33250-148 = "Even in a dark world where all is in vain."
33250-149 = "Even if you find yourself in the most desolate of depths."
33250-150 = "Azusa..."
33250-151 = "I'm starting to understand your story about the flower."
33250-152 = "This is where we part ways... "
33250-153 = "...but I do hope you find happiness."
33250-166 = "I see."
33250-167 = "So the one with royal blood has chosen to flee."
33250-168 = "We can't have that. Capture Atsuko and bring her back. See to it that she isn't hurt."

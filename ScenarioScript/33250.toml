33250-18 = "3;미카 비무장;03;이야, 나기 쨩? 미사일 발사 후에 계속 정신을 잃고 있었다며? \n#3;a\n#3;em;[반짝]"
33250-19 = "3;미카 비무장;15;엄청 많은 일들이 있었는데 속 편하게 쿨쿨 자고 있었다니. 응, 역시 호스트로써 조금 부끄러운 모습이 아닐까?"
33250-20 = "3;미카 비무장;14;나기 쨩이 어깨에 힘을 좀 풀었으면 했지만, 설마 이 정도로 여유를 부릴 거라곤 생각하지 못했거든. 응, 잠자는 공주라도 되고 싶은 거야? \n#3;em;[땀]"
33250-21 = "3;미카 비무장;02;뭐, 모처럼 깨어났다고 하니까 내 부탁 좀 들어줄래? 빨리 호스트에 복귀해서 처리해줬으면 해."
33250-22 = "3;미카 비무장;10;먼저, 여기 유폐실의 TV, 정규방송밖에 없잖아? 케이블 넣어줘. 응? 24시간 되는 걸로!\n#3;hophop\n#3;m2\n#3;em;[재잘]"
33250-23 = "3;미카 비무장;02;아, 그리고 핸드로션도 다 떨어졌지 뭐야. 내가 쓰는 브랜드가 있는데 꼭 그거 아니면 안되거든? 파는 곳도 한정되어 있으니까, 알려줄 테니 사와야 해?\n#3;em;[반응]\n#3;m4\n#3;hophop"
33250-24 = "3;미카 비무장;08;아, 그리고 헤어드라이어 바람이 요즘 좀 약해져서 말야. 조금 더 비싼 걸로 바꿔주면 안 되려나? \n#3;m3"
33250-25 = "3;미카 비무장;03;기왕이면 나기 쨩이 쓰는 거랑 똑같은 걸로! 응! 그거 엄청 비싼 브랜드인 거 다 알고 있으니까!\n#3;em;[반짝]\n#3;closeup\n#3;greeting"

33250-1 = "#title;제25화;에필로그"
33250-2 = "#na;마코토;크아아아아아-!! 감히 이 마코토 님을 속였겠다--!!\n#fontsize;100"
33250-3 = "#na;마코토;이로하! 어디 있냐! 이로하! 당장 그것을 준비해라! 이대로 당하고 있을 수…….\n#bgshake"
33250-4 = "#na;이로하;뭘 준비하라는 건지 모르겠지만, 일단 좀 더 누워계셔야 할 것 같은데요."
33250-5 = "#na;이로하;일단 그 아프로 머리부터 어떻게 하셔야겠는데요. 그리고 상황은 이미 예전에 다 끝났거든요."
33250-6 = "#na;마코토;응? 내 머리가 어때서……."
33250-7 = "#na;마코토;다, 당했다?! 어, 언제 이렇게……!!\n#fontsize;100"
33250-8 = "#na;이로하;그야, 불에 잔뜩 그을렸으니……. 하아."
33250-9 = "#all;hide"
33250-10 = "3;티파티 행정관;04;나기사 님…… 몸은 좀 어떠신가요?\n#3;a"
33250-11 = "#na;나기사;……네. 헤일로가 부서질 만큼 아팠지만, 다행히 아직은 살아있네요."
33250-12 = "3;티파티 행정관;03;무사하셔서 다행입니다……. 무리하지 않으시는 게 좋을 것 같아서……."
33250-13 = "#na;나기사;고마워요. 그런데 찾아온 이유는…… 무슨 급한 일이 있나요?"
33250-14 = "3;티파티 행정관;02;아, 다름이 아니라…… 미카 씨에게서 편지가 와서…….\n#3;em;[반응]"

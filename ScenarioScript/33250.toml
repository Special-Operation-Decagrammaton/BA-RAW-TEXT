[translation]
33250-1 = "第25話;尾聲"
33250-2 = "竟敢，竟敢欺騙我真琴大人啊啊啊啊啊啊啊啊！！！"
33250-3 = "伊呂波，伊呂波在哪裡！現在馬上準備那個！就這樣一直被耍誰受得了啊……！"
33250-4 = "就算妳說「那個」我也完全聽不懂在說什麼，我認為再稍微躺一下比較好唷。"
33250-5 = "還有要說話的話，請先想辦法處理那顆有趣的頭。再說了，很多事都已經結束了。"
33250-6 = "妳說什麼……頭？"
33250-7 = "這，這是什麼啊啊啊啊啊啊！？"
33250-8 = "那是因為那時候，被火包圍了……哈啊。"
33250-10 = "……身體的狀況如何呢，渚大人。"
33250-11 = "還以為光環破碎了……看來似乎沒事呢。"
33250-12 = "是的，幸好……真的是太好了。請不要勉強。"
33250-13 = "……謝謝妳。話說妳來這裡，是有什麼事嗎？"
33250-14 = "啊，其實那個，有來自彌香大人的信……"
33250-15 = "……信中寫了什麼？"
33250-16 = "那個，該怎麼說呢……"
33250-18 = "呀吼，渚醬！從我聽到的消息來看，在導彈擊中之後就一直失去了意識是嗎？"
33250-19 = "明明發生了那麼多事竟然悠哉的睡得那麼香，實在不是身為主席能讓大家看到的樣子呢？"
33250-20 = "嘛，畢竟一直在努力也希望妳可以休息。不過真沒想到會睡得那麼香呢。"
33250-21 = "似乎也平安醒來了，可以聽一下我的請求嗎？快點回歸主席，幫我想點辦法的話我會很高興！"
33250-22 = "首先這裡的電視，只能看普通的播送嘛？可以幫我裝24小時可以看各種東西的那個嗎？"
33250-23 = "還有護手霜用完了。我不用平常的品牌不行，可以幫我買來嗎？有賣的地方之後再告訴妳哦！"
33250-24 = "還有吹風機感覺變弱了呢。可以換個貴一點的嗎？"
33250-25 = "啊，機會難得和渚醬用一樣的吧！妳用的是很好品牌裡最高級的型號吧，在髮質變好的時機換的那個。我可是知道的！"
33250-26 = "還有啊還有啊──"
33250-28 = "……"
33250-29 = "那個……該怎麼辦呢。果然不要關在監獄……"
33250-30 = "彌香同學的食物，今後全部都給她蛋糕捲就可以了。"
33250-31 = "是的……什麼！？"
33250-72 = "大家。"
33250-73 = "團，團長……！？"
33250-74 = "團長！！！"
33250-75 = "……什麼都沒說就消失，對不起。"
33250-76 = "嗚哇啊啊啊啊啊啊！！團長────！！"
33250-82 = "對不起讓妳們久等了……雖然有點遲了，我回來了。"
33250-85 = "彌香同學……"
33250-86 = "渚醬，為什麼還擺著那種臉？順利進行的……事情，雖然可能有點少。"
33250-87 = "那是……"
33250-93 = "因為我們，還有堆積如山的課題還沒解決……對吧？"
33250-94 = "聖，聖亞同學……？"
33250-95 = "聖亞醬！？"
33250-97 = "……呀啊，渚，彌香。"
33250-98 = "久違的集合呢。"
33250-99 = "雖然經過了漫長的時間，發生了很多事……"
33250-100 = "我們彼此差不多，該談談了吧。"
33250-101 = "沒說出口的話，沒能說出口的話。"
33250-102 = "還有，真正想說的話。"
33250-103 = "也有誤解吧，也有沒辦法相信的事吧。就算沒辦法抵達任何地方……即使如此，也只能朝著證明他人的心這不可能的問題前進。"
33250-104 = "我們大家，不得不前進。一直背負著那個課題，即使如此也要在這個黑暗中……一昧地，朝著那個前方。"
33250-108 = "……就是呀。"
33250-109 = "嗯，那個非常有同感……不過，還是老樣子都說些複雜的話。聖亞醬，所以才沒有朋友吧？稍微有點自覺嗎？"
33250-110 = "……"
33250-111 = "首先把彌香那個似乎很會響的腦袋，注入教養和品行會比較好呢？"
33250-112 = "那個，兩位……"
33250-114 = "[ns]「那個……之前的補課部全員姑且畢業了……」"
33250-116 = "[ns]「這次又有了新的補課部，我是這麼聽說的……？」"
33250-117 = "……"
33250-118 = "……"
33250-119 = "……"
33250-120 = "……"
33250-121 = "[ns]「是相同的成員吧！？」"
33250-123 = "啊，啊哈哈……這是，那個……"
33250-124 = "參加了佩洛洛大人的演唱會，結果那天似乎是考試的日子……"
33250-125 = "下次的考試範圍還沒有學過。"
33250-126 = "這個，那個……試著接受了3年級的測驗……"
33250-127 = "只有我一個人被放置PLAY什麼的，不是很寂寞嗎♡"
33250-128 = "那，那個，不好意思老師……不知為何又變成這樣……"
33250-129 = "不，不過這次沒有退學，測驗範圍也是普通的……！"
33250-130 = "[ns] 頭暈倒下"
33250-132 = "老，老師！？"
33250-133 = "老師！"
33250-134 = "那，那是怎樣！也不用露出那種反應吧！？"
33250-135 = "啊啦，這是……"
33250-136 = "等等！剛才露出「這樣剛好呢，趁現在」的表情了吧！？"
33250-137 = "笨蛋，禁止色色！！死刑！！！"
33250-144 = "……"
33250-145 = "妳接下來也會，學到很多事物吧。往後一直，和朋友一起。"
33250-146 = "學習、努力，會發現各式各樣的可能性吧。"
33250-147 = "……因為妳很堅強。"
33250-148 = "就算全都是徒勞的，就算這個世界既黑暗又寂寞……"
33250-149 = "就算，在水泥牆的角落……"
33250-150 = "……梓。"
33250-151 = "你當時說過的那朵花的故事……或許我現在稍微能理解了。"
33250-152 = "雖然可能不會再見了。"
33250-153 = "請妳，要幸福。"
33250-166 = "……這樣嗎。"
33250-167 = "那個皇家血統，逃走了呢。"
33250-168 = "……請把她抓來。不要讓她受傷，鄭重的。"
33250-169 = "要把除了他以外的人全部處理掉也沒關係。"
33250-170 = "……是的。「破壞光環」也沒關係，的意思。"

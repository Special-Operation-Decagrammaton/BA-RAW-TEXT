[translation]
33250-1 = "第25話;エピローグ"
33250-2 = "よくも、よくもこのマコト様を騙したなあああぁぁぁぁぁっ！！！"
33250-3 = "イロハ、イロハはどこだ！今すぐにアレを用意しろ！このままやられっぱなしでたまるものか……！"
33250-4 = "「アレ」と言われましても何のことかサッパリですが、もう少し横になってた方が良いと思いますよ。"
33250-5 = "あと喋るなら、その面白い頭をどうにかしてからにしてください。そもそも既に色々決着してますし。"
33250-6 = "何だと……頭？"
33250-7 = "な、何だこれはあああぁぁぁ！？"
33250-8 = "それはだってあの時、火に包まれましたし……はぁ。"
33250-10 = "……お身体の具合はいかがですか、ナギサ様。"
33250-11 = "ヘイローが砕けるかと思いましたが……どうやら無事のようですね。"
33250-12 = "はい、幸いです……本当に何よりでした。どうかご無理なさらず。"
33250-13 = "……ありがとうございます。ところでいらっしゃったのは、何かご用件が？"
33250-14 = "あ、実はその、ミカ様からお手紙が……。"
33250-15 = "……中には何と？"
33250-16 = "えっと、ですね……"
33250-18 = "やっほーナギちゃん！何か聞いたところによると、ミサイルが撃ち込まれてからずっと気を失ってたんだって？"
33250-19 = "あんなに色々あったのに気楽にすやすや寝てたなんて、ホストとして中々みんなには見せられない姿だね？"
33250-20 = "まっ、ずっと頑張ってたんだし休んでほしいとは思ってたけどさ。まさかそこまでぐっすりだなんて思わなかったよ。"
33250-21 = "無事に目覚めたみたいだし、ちょっとお願い聞いてくれない？早めにホストに復帰して、どうにかしてくれると嬉しいんだけど！"
33250-22 = "まずここのテレビ、普通の放送しか見られないじゃん？24時間色んなのが見られるアレ入れてくれない？"
33250-23 = "あとハンドクリームが切れちゃったの。私いつものブランドじゃないとダメだから、買ってきてくれる？売ってるところは後で伝えるね！"
33250-24 = "それとヘアドライヤーが何か弱くなってきたんだよね。もうちょっと高いやつに変えてもらえないかな？"
33250-25 = "あ、せっかくだしナギちゃんとお揃いのにしよっと！すっごく良いブランドの最上級モデル使ってるんでしょ、あの髪質良くなったタイミングで変えたやつ。私知ってるんだから！"
33250-26 = "あとさあとさ――"
33250-28 = "……。"
33250-29 = "えっと……どういたしましょう。やはり監獄ではなく……"
33250-30 = "ミカさんのお食事は今後、全てロールケーキだけで構いません。"
33250-31 = "はい……はいっ！？"
33250-72 = "みなさん。"
33250-73 = "だ、団長……！？"
33250-74 = "団長！！！"
33250-75 = "……何も言わずにいなくなって、ごめんなさい。"
33250-76 = "うわああぁぁぁぁん！！団長ーーーー！！"
33250-82 = "お待たせしてしまってごめんなさい……遅ればせながら、ただいま戻りました。"
33250-85 = "ミカさん……。"
33250-86 = "ナギちゃん、何でまだそんな顔してるの？上手く行った……ことはまあ、少ないかもしれないけどさ。"
33250-87 = "それは……。"
33250-93 = "まだ私たちには、解決できていない宿題が山積みだから……だろう？"
33250-94 = "セ、セイアさん……?"
33250-95 = "セイアちゃん！？"
33250-97 = "……やあ、ナギサ、ミカ。"
33250-98 = "久方ぶりの集合だね。"
33250-99 = "長い時間が経ち、色々なことがあったが……"
33250-100 = "私たちはそろそろ、お互いに話すべきだろう。"
33250-101 = "言わなかったことや、言えなかったこと。"
33250-102 = "そして、本当は言いたかったことを。"
33250-103 = "誤解もあるだろう、信じられないこともあるだろう。たとえどこにも到達できないとしても……それでも、他者の心という証明不可能な問題に向かうしかない。"
33250-104 = "私たちは皆、進まねばならない。その宿題をずっと背負いながら、それでもこの闇の中を……ただ、その先を目指して。"
33250-108 = "……ですね。"
33250-109 = "うん、それはすごく同感……だけど、相変わらず難しいことばっかり。セイアちゃん、だから友達がいないんでしょ？ちょっとは自覚してる？"
33250-110 = "……。"
33250-111 = "先ずミカはその良く鳴りそうな頭に、教養と品格を入れてもらった方が良さそうだね？"
33250-112 = "あの、お二人とも……。"
33250-114 = "[ns] \"えっと……前の補習授業部は一旦全員卒業したはずで……。\""
33250-116 = "[ns] \"今度はまた新たに補習授業部が、って聞いて来たんだけど……？\""
33250-117 = "……。"
33250-118 = "……。"
33250-119 = "……。"
33250-120 = "……。"
33250-121 = "[ns] \"同じメンバーだね！？\""
33250-123 = "あ、あはは……それが、その……。"
33250-124 = "ペロロ様のコンサートに参加してたのですが、実は試験日だったようで……。"
33250-125 = "次の試験範囲はまだ習ってない。"
33250-126 = "えっと、その……3年生の試験を受けてみたんだけど……。"
33250-127 = "ひとりだけ放置プレイなんて、寂しいじゃないですか♡"
33250-128 = "あ、あの、すみません先生……何だかまたこんなことになって……。"
33250-129 = "で、ですが今回は退学もありませんし、試験範囲もちゃんと普通の……！"
33250-130 = "[ns] くらっと来て倒れる。"
33250-132 = "せ、先生！？"
33250-133 = "先生！"
33250-134 = "な、何それ！そんな反応しなくても良いじゃん！？"
33250-135 = "あら、これは……"
33250-136 = "ちょっと！今「ちょうど良さそうですね、この隙に」みたいな顔したでしょ！？"
33250-137 = "バカっ、エッチなのは禁止！！死刑っ！！！"
33250-144 = "……。"
33250-145 = "あなたはこれからも、たくさんのことを学んでいくでしょう。これからもずっと、友人たちと一緒に。"
33250-146 = "勉強し、努力をし、様々な可能性を見つけるのでしょう。"
33250-147 = "……あなたは強いから。"
33250-148 = "例えすべてが虚しくても、この世界が暗く寂しいものでも……"
33250-149 = "たとえ、コンクリートの隅であっても……。"
33250-150 = "……アズサ。"
33250-151 = "あの時見せてくれた花のこと……今は少し、理解できたかもしれない。"
33250-152 = "もう二度と会うことは無いかもしれないけれど。"
33250-153 = "どうか、幸せに。"
33250-166 = "……左様でしたか。"
33250-167 = "あのロイヤルブラッド、逃げたのですね。"
33250-168 = "……捕まえてきてください。怪我の無いように、丁重に。"
33250-169 = "彼女以外は、全員処理しても構いません。"
33250-170 = "……ええ。「ヘイローを破壊」しても構わない、という意味です。"

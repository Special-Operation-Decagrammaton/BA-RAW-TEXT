[translation]
33250-1 = "ตอนที่ 25;บทส่งท้าย"
33250-2 = "ย้าาาาาาก-!! กล้าดียังไงมาหลอกท่านมาโคโตะผู้นี้--!!"
33250-3 = "อิโรฮะ! อยู่ไหนน่ะ! อิโรฮะ! รีบไปเตรียมตัวให้พร้อมเดี๋ยวนี้! จะปล่อยเอาไว้แบบนี้มะ---"
33250-4 = "ถึงไม่รู้ว่าจะให้เตรียมอะไร แต่ตอนนี้น่าจะนอนพักอีกสักหน่อยก่อนนะคะ"
33250-5 = "ก่อนอื่นก็หาทางจัดการกับผมทรงอัลโฟรนั่นก่อนเถอะค่ะ แล้วสถานการณ์ตอนนี้ก็จบลงเรียบร้อย#nแล้วค่ะ"
33250-6 = "หืม? ผมของเรามันทำไมเหรอ..."
33250-7 = "มะ... ไม่นะ?! ตะ...ตั้งแต่เมื่อไรกันเนี่ย?!"
33250-8 = "นั่นน่ะ เราตกลงมาจากบอลลูนยักษ์ที่ไฟไหม้ มันก็เลย... เฮ้อ ช่างมันเถอะ"
33250-10 = "คุณนางิสะ... ร่างกายเป็นยังไงบ้างคะ"
33250-11 = "ค่ะ... รู้สึกเจ็บเหมือนฮาโลแตกสลายไปแล้วเลย แต่ยังโชคดีที่รอดมาได้ค่ะ"
33250-12 = "โชคดีจังที่ปลอดภัยนะคะ ตอนนี้อย่าเพิ่งฝืนตัวเองดีกว่านะคะ..."
33250-13 = "ขอบคุณค่ะ แต่ว่าที่มาพบฉันมีเรื่องด่วนอะไรรึเปล่าคะ"
33250-14 = "เอ่อ ไม่มีอะไรหรอกค่ะ... แต่มีจดหมายจากคุณมิกะ..."
33250-15 = "... เขียนว่ายังไงเหรอคะ"
33250-16 = "เอ่อ... คือว่าเรื่องนั้น... "
33250-18 = "อา... นางิจัง ได้ยินว่าหลังจากถูกยิงด้วยมิสไซล์ก็หมดสติมาตลอดเลยเหรอ? "
33250-19 = "มีเรื่องหลายอย่างเกิดขึ้น แต่เธอกลับนอนหลับอย่างสบายใจเนี่ยนะ อื้อ ในฐานะโฮสต์ มันไม่น่าอายไปหน่อยรึยังไง? "
33250-20 = "ฉันอยากให้นางิจังได้พักผ่อนสบายๆ หน่อยก็จริง แต่ไม่คิดว่าเธอจะได้นอนยาวๆ ขนาดนี้เลย อืม... หรืออยากเป็นเจ้าหญิงขี้เซาอีกคนรึไงน่ะ?"
33250-21 = "แต่ได้ยินว่าตอนนี้ฟื้นขึ้นมาแล้ว เธอจะช่วยฟังคำขอจากฉันหน่อยได้มั้ย? ช่วยรีบกลับมาเป็นโฮสต์เร็วๆ เถอะ"
33250-22 = "อย่างแรกเลย ที่ห้องคุมตัวนี่น่ะมีแต่รายการทีวีธรรมดาๆ แค่นั้นเองนะ ช่วยต่อเคเบิลให้หน่อยสิ หืม? ขอแบบรายการ 24 ชั่วโมงเลยนะ!"
33250-23 = "อ๊ะ แล้วก็โลชั่นทามือของฉันจะหมดแล้ว ฉันมียี่ห้อที่ใช้ประจำอยู่ ขอเป็นยี่ห้อนั้นเท่านั้นนะ มันมีร้านที่ขายอยู่ไม่กี่ที่ ฉันจะเขียนบอกให้ ไปซื้อมาให้ด้วยล่ะ"
33250-24 = "อ๋อ แล้วก็ไดร์ที่ใช้เป่าผมมันเริ่มอ่อนแรงลงทุกทีแล้ว ช่วยซื้ออันใหม่ที่แพงกว่านี้ให้หน่อยสิ"
33250-25 = "ถ้าเป็นไปได้ก็ขอแบบเดียวกับที่นางิจังใช้นะ! อื้อ! ยี่ห้อนั้นมันแพงมากๆ เลยนี่นา!"
33250-26 = "อ๊ะ แล้วก็นะ แล้วก็...!"
33250-28 = "..."
33250-29 = "จะ...จะทำยังไงดีคะ คือที่ห้องคุมตัว..."
33250-30 = "ต่อไปนี้อาหารของคุณมิกะ ช่วยจัดแต่แยมโรลไปให้เธอนะคะ..."
33250-31 = "คะ... เอ๋?!"
33250-72 = "ทุกคนคะ..."
33250-73 = "หะ...หัวหน้า...?"
33250-74 = "หัวหน้า!!!"
33250-75 = "ขอโทษนะคะที่หายไปโดยไม่ได้บอกอะไร"
33250-76 = "แงงงงง!! หัวหน้า~~~~!!"
33250-82 = "ค่ะ ฉันกลับมาแล้วค่ะ ขอโทษที่ทำให้รอนะคะ"
33250-85 = "คุณมิกะ..."
33250-86 = "นางิจัง...? ทำไมสีหน้าดูอิดโรยแบบนั้นล่ะ? สุดท้ายทุกอย่างก็จบลงด้วยดีแล้วนี่นา"
33250-87 = "คือว่าเรื่องนั้น..."
33250-93 = "เรื่องนั้น...เป็นเพราะมีปัญหาบางอย่างที่เรายังไม่ได้แก้ไขยังไงล่ะคะ"
33250-94 = "คะ...คุณเซอา...?"
33250-95 = "ซะ...เซอาจัง...?!! ทำไมกัน...?!"
33250-97 = "ค่ะ... ไม่เจอกันนานเลยนะคะ นางิสะ มิกะ..."
33250-98 = "แบบนี้...สภาน้ำชาทุกคนก็ได้มารวมตัวกันอีกครั้งแล้วนะคะ"
33250-99 = "ค่ะ พวกเรา..."
33250-100 = "พวกเราต้องพูดคุยกันอย่างเลี่ยงไม่ได้แล้วค่ะ"
33250-101 = "เรื่องที่ยังไม่ได้บอก..."
33250-102 = "และสิ่งที่อยากจะบอก... ต่อกันและกัน"
33250-103 = "ความเข้าใจผิดและความระแวงคือสิ่งที่ก่อให้เกิดปัญหาที่พิสูจน์ไม่ได้..."
33250-104 = "ฉันและพวกเราทุกคนคงจะต้องแก้ไขเรื่องนั้นและก้าวผ่านความมืดนั้นมาให้ได้ค่ะ"
33250-108 = "..."
33250-109 = "ยังพูดอะไรเข้าใจยากเหมือนเดิมเลยนะ เซอาจัง เพราะแบบนี้ไงถึงได้ไม่มีเพื่อนน่ะ รู้ตัวบ้างรึเปล่า?"
33250-110 = "..."
33250-111 = "คุณมิกะเองก็ควรใส่ใจเรียนรู้เรื่องวัฒนธรรมและมารยาทเติมสมองกลวงๆ นั่นบ้างก็ดีนะคะ"
33250-112 = "... คือว่า...ทุกคนคะ..."
33250-114 = "[ns] \"เอ่อ...คือว่า...\""
33250-116 = "[ns] \"พวกเธอเป็นสมาชิกใหม่ของชมรมชั้นเรียนเสริมเหรอ...?\""
33250-117 = "..."
33250-118 = "..."
33250-119 = "..."
33250-120 = "..."
33250-121 = "[ns] \"เดี๋ยวสิ ทำไมล่ะ?!\""
33250-123 = "เอ่อ... คือว่าเรื่องนั้น..."
33250-124 = "พอไปร่วมทัวร์คอนเสิร์ตกับท่านเพโรโร่... ฉันก็เลยลืมเรื่องสอบ..."
33250-125 = "ฉันไม่ได้อ่านหนังสือเตรียมสอบครั้งต่อไปเลยน่ะ"
33250-126 = "เอ่อ... คือว่า... ฉันทำข้อสอบของนักเรียนปี 3..."
33250-127 = "อุ๊ยตาย♡ จริงด้วยค่ะ ทุกคนมารวมกันแบบนี้จะขาดฉันไปก็คงไม่ดีเท่าไร..."
33250-128 = "อา... แหะๆ... ขะ...ขอโทษนะคะคุณครู เหมือนที่พยายามมามันสูญเปล่าเลย..."
33250-129 = "แต่ว่าคราวนี้ไม่มีการไล่ออกนะคะ ระยะเวลาการสอบก็ปกติ..."
33250-130 = "[ns] เป็นลม"
33250-132 = "คะ... คุณครู?!"
33250-133 = "คุณครู!"
33250-134 = "อะไรกัน?! ไม่เห็นต้องเว่อร์ขนาดนั้นเลยนี่นา!!"
33250-135 = "ตายจริง ล้มลงไปนอนแบบนี้.... คุณครูอ่อยฉันเหรอคะ?"
33250-136 = "ว่าไงนะ? พูดอะไรของเธอน่ะ?! ถือว่าเป็นโอกาสที่ดีเลยสินะ! อย่าทำหน้าแบบนั้นสิ! ห้ามทำเรื่องลามกนะ!!"
33250-137 = "ลงโทษ!!!"
33250-144 = "อาซึสะ..."
33250-145 = "เธอจะไม่หยุดเรียนรู้สินะ ตั้งแต่นี้ไป... ร่วมกับเพื่อนๆ ของเธอ"
33250-146 = "เรียนรู้ต่อไปในอนาคต... พยายามต่อไป"
33250-147 = "เธอเป็นคนแข็งแกร่ง"
33250-148 = "ต่อให้ทุกอย่างจะสูญเปล่า ต่อให้โลกนี้จะมืดมิด"
33250-149 = "ต่อให้เป็นโลกใต้ดินที่มืดมน... ใช่แล้ว"
33250-150 = "อาซึสะ..."
33250-151 = "เรื่องราวของดอกไม้ที่เธอเล่าให้ฟัง... ฉันพอจะเข้าใจความหมายของมันแล้วล่ะ"
33250-152 = "จากนี้ไปเราอย่าได้พบกันอีกเลย"
33250-153 = "ขอให้มีความสุขนะ"
33250-166 = "อย่างนี้นี่เอง"
33250-167 = "คิดจะหนีไปสินะ สายเลือดของราชวงศ์..."
33250-168 = "คงปล่อยให้หนีไปไม่ได้หรอกนะ รีบไปจับตัวมา ระวังอย่าให้บาดเจ็บด้วยล่ะ"
33250-169 = "คนอื่นๆ นอกจากอาสึโกะแล้ว... จะฆ่าให้หมดเลยก็ได้"
33250-170 = "อ่า ใช่... เอาแบบนั้นก็ได้...  \"ทำลายฮาโลของพวกนั้นซะ\""

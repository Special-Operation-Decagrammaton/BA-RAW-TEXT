201090-104 = "#na;오웰 물음표;……바로 미디어입니다."
201090-105 = "#na;오웰 물음표;이 세계에 거미줄처럼 깔린 미디어는 세상에 실재하는 파노플리의 집합이자 새로운 신비를 잉태하는 모체. 그야 말로 새로운 시대의 ‘정의하는 권력’이라 할 수 있지요."

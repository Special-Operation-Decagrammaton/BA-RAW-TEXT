201090-5 = "#wait;1000"
201090-6 = "3;린 사복;15\n#3;a\n#wait;1000"
201090-7 = "3;린 사복;17;……계신가요?\n#3;em;[반응]"
201090-8 = "#st;[0,0];instant;1;"
201090-9 = "#clearST"
201090-10 = "3;린 사복;17\n#3;em;…\n#wait;2500"
201090-11 = "[ns] \"아무도 없는 것 같네……\""
201090-12 = "3;린 사복;23;네. 손님은 물론이고 점원의 인기척도 느껴지지 않는군요."
201090-13 = "3;린 사복;17;혹시 이미 영업 시간이 끝나버린 건—"
201090-14 = "#all;hide"
201090-15 = "#na;???;그렇지 않습니다. 이 바는 원래부터 손님을 받는 가게가 아니었으니까요."
201090-16 = "#st;[0,0];instant;1;"
201090-17 = "#clearST"
201090-18 = "#wait;2000"
201090-19 = "#na;???;‘드링크 바’는 본래 음료를 마시는 <장소>로 알려져 있지만, 사실 단순히 음료를 마시기 위해서라면 구태여 바를 찾을 필요가 없지요.\n"
201090-20 = "#na;???;사람들은 이곳에서 다른 사람과 교류를 하고, 어두운 분위기를 즐기고, 혹은 공산품 드링크에 비싼 값을 지불할 수 있는 스스로의 가치를 즐기기도 합니다.\n"
201090-21 = "#na;???;그야말로 소비 사회에서만 통용되는 <기호>의 논리이지요.\n"
201090-22 = "#na;???;어떠신가요. 여러분은 이 장소를 <도구>로 소비하기 위해 오셨습니까. 혹은 <기호>로 소비하기 위해 오셨습니까?\n"
201090-23 = "#na;???;여러분의 목적이 후자라면 이 장소의 선객에 불과한 저일지라도 조금의 여흥 정도는 제공해 드릴 수 있을 것 같군요.\n"
201090-24 = "#st;[0,0];instant;1;"
201090-25 = "#clearST"
201090-26 = "#wait;2000"
201090-27 = "#all;hide"
201090-28 = "#na;오웰 물음표;……오랜만에 뵙겠습니다, 선생."
201090-29 = "#na;오웰 데칼코마니;그렇다!\n#fontsize;80"
201090-30 = "#st;[0,0];instant;1;"
201090-31 = "#clearST"
201090-32 = "#wait;2500"
201090-33 = "[ns1] \"너는 골콩트……?\"\n[ns2] \"아니, 프랜시스……?\""
201090-34 = "#wait;100"
201090-35 = "#wait;100"
201090-36 = "#na;오웰 물음표;아, 그러고 보니 저를 새롭게 정의하지 않았군요. #n선생께서 호칭을 혼란스러워 하시는 것도 이해가 갑니다."
201090-37 = "#na;오웰 데칼코마니;그렇다!\n#fontsize;80"
201090-38 = "#na;오웰 물음표;어디서부터 이야기를 시작할까요…… ‘우리’의 마지막 만남을 반추하는 것도 나쁘지 않겠군요."
201090-39 = "#all;hide"
201090-40 = "#na;오웰 물음표;색채의 침공으로 골콩트가 프랜시스로 변모하였을 때, 그는 이 세계를 해체된 장르로 인지하였습니다."
201090-41 = "#na;오웰 물음표;맥락도, 구성도, 개연성도 없는 작위의 세계에서."
201090-42 = "#na;오웰 물음표;당신이 끝내 선생도, 무엇도 아닌 존재로서 심연에 떨어지리라고 생각했습니다."
201090-43 = "#na;오웰 데칼코마니;그렇다!\n#fontsize;80"
201090-44 = "#all;hide"
201090-45 = "#na;오웰 물음표;하지만 당신은 주인공으로서 그 역할을 훌륭히 수행하였습니다."
201090-46 = "#na;오웰 물음표;……아니. 당신은 주인공이라는 역할을 넘어, 선생이라는 기호를 훌륭하게 소비하여 이 세계의 텍스트를 학원과 청춘의 이야기로 복원해 냈습니다."
201090-47 = "#na;오웰 물음표;그 모습을 본 데칼코마니는 또 다른 추론을 시작했습니다."
201090-48 = "#st;[0,0];instant;1;"
201090-49 = "#clearST"
201090-50 = "#wait;2500"
201090-51 = "#na;오웰 물음표;프랜시스의 평가와는 달리 이 세계에 장르 이상의 가치가 있을지도 모른다는 판단이었지요."
201090-52 = "#na;오웰 물음표;물론, 프랜시스는 아주 일시적인 현상일 뿐이었습니다."
201090-53 = "#na;오웰 물음표;텅 빈 질서를 새롭게 정의하고, 권위를 세우기 위해서는 데칼코마니의 목소리를 북돋아 주어야 할 필요가 있었으니까요."
201090-54 = "#na;오웰 데칼코마니;그렇다!\n#fontsize;80"
201090-55 = "#na;오웰 물음표;그리하여 데칼코마니는 귀납추론을 반복하며 명제를 흡수하기 시작했습니다."
201090-56 = "#na;오웰 물음표;위대한 예술가를 오마주한 그의 호칭이, 그 존재를 부정하게 된 논증의 발명가의 이름과 똑같다는 사실은 일종의 넌센스라 할 수 있겠지만요. 큭큭……"
201090-57 = "[s] \"……….\""
201090-58 = "#na;오웰 물음표;실례. 너무나도 우스운 이야기를 떠올리는 바람에."
201090-59 = "#na;오웰 물음표;선생께서 지난 번에 게마트리아의 옛 동료를 마주하셨다는 것을 우리는 알고 있습니다."
201090-60 = "#all;hide"
201090-61 = "#na;오웰 물음표;지하생활자— 현실을 모독하고 세계를 [ruby=룰 북]코덱스[/ruby]로 취급하려 했던 그는 우리에게 좋은 시뮬라시옹이 되어 주었습니다."
201090-62 = "#na;오웰 물음표;하지만 선생은 숭고를 통해 또다른 메타적 개입을 이루어 냈고, 결국 이 세계를 하나의 장르로서 재단하려는 시도는 다시 한 번 실패로 돌아갔습니다."
201090-63 = "#na;오웰 물음표;지하생활자의 실패를 관찰한 데칼코마니는 허상을 딛고 세계를 직접 관찰하기 시작했습니다."
201090-64 = "#all;hide"
201090-65 = "#na;오웰 물음표;이 세계를 구성하는 기호, 메시지, 이미지를 소비하는 장소는 어디인가. 아무것도 일어나지 않지만 모든 것이 존재하는 그 장소는 어디인가—"

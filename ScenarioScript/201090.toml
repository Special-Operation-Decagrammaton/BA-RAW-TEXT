[translation]
201090-1 = "第9話;グッドイブニング・ミスターオーウェル"
201090-2 = "ドリンクバー・「トライアド」"
201090-7 = "……ごめんください。"
201090-11 = "[ns] \"誰もいないみたいだね……。\""
201090-12 = "ええ。人の気配が感じられません。"
201090-13 = "今日は営業を終えてしまったので――"
201090-15 = "そうではありません。ここは元々、客を呼ぶ店ではなかったのですよ。"
201090-19 = "「ドリンクバー」は本来、ドリンクを飲む「場所」として知られています。#nですが、単にドリンクを飲むためならば敢えてバーにこだわる必要はありません。"
201090-20 = "暗い場所で交流を楽しむ者もいれば、高いドリンク代を支払える経済的余裕で悦に浸る者もいます。"
201090-21 = "それこそ、消費社会でしか成り立たない「記号」の論理です。"
201090-22 = "皆さんがこの場所を訪れたのは「道具」としてですか？それとも「記号」として？"
201090-23 = "後者の場合は、先客にすぎない私でも、僅かばかりの余興は提供できるかと。"
201090-28 = "……お久しぶりです、先生。"
201090-29 = "そういうこったぁ！！"
201090-33 = "[ns1] \"あなたは……ゴルコンダ？\"\n[ns2] \"いや、フランシス……？\""
201090-36 = "おや、そういえば私について、新たな定義をしておりませんでした。#n先生が混乱されるのも分かります。"
201090-37 = "そういうこったぁ！！"
201090-38 = "どこからお話しましょうか……#n「私たち」の最後の邂逅を反芻するのも悪くありませんね。"
201090-40 = "色彩によってゴルコンダがフランシスに変貌した際、彼はこの世界を[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・]解体されたジャンル[/ruby]として認知しました。"
201090-41 = "脈略も、構成も、[ruby=がいぜんせい]蓋然性[/ruby]もない作為的な世界で――"
201090-42 = "あなたは最後、[ruby=・   ・   ・   ・   ・   ・   ・   ・]何者でもない存在[/ruby]として深淵に落ちるであろうと考えました。"
201090-43 = "そういうこったぁ！！"
201090-45 = "ですがあなたは――[ruby=・   ・   ・]主人公[/ruby]として、その役割を十分に果たしてくれました。"
201090-46 = "……いえ、あなたは主人公という役割を越えた。#n先生という記号を見事に消費し、この世界のテクストを「学園と青春の物語」に#n[ruby=・   ・]復元[/ruby]させてみせたのです。"
201090-47 = "その姿を見たデカルコマニーは別の推論を始めました。"
201090-51 = "フランシスの評価とは異なり、この世界にはジャンル以上の価値があるのかもしれないと思い至ったのです。"
201090-52 = "無論、フランシスは一時的な現象にすぎません。"
201090-53 = "空虚となった秩序を改めて定義し、権威を確立するには、デカルコマニーの声を増幅させる必要がありました。"
201090-54 = "そういうこったぁ！！"
201090-55 = "そうしてデカルコマニーは帰納的推論を繰り返し、命題を吸収し始めました。"
201090-56 = "偉大な芸術家をオマージュした彼の呼び名が、その存在を否定する論証の発明家と同じ名前である……。#nそれはある種のナンセンスと言えるのでしょうがね。ククッ……。"
201090-57 = "[s] \"…………。\""
201090-58 = "失礼。あまりにも滑稽な話を思い出したもので。"
201090-59 = "先生が以前、ゲマトリアの旧友と遭遇していたことについては知っています。"
201090-61 = "地下生活者――現実を冒涜し世界を[ruby=RULE BOOK]コデックス[/ruby]として扱っていた彼は、#n私たちにとって良きシミュラシオンとなってくれました。"
201090-62 = "ですが先生が崇高を通じて、また異なる俯瞰的な介入を遂げたことで、#nこの世界を1つのジャンルとして裁断する試みは再び失敗に終わりました。"
201090-63 = "地下生活者の失敗を観察したデカルコマニーは虚像を踏み越え、#n世界を自ら観察し始めたのです。"
201090-65 = "この世界を構成する記号、メッセージ、イメージを消費する場所はどこか。#n何も発生しないが、すべてが存在するその場所はどこなのか――"
201090-104 = "――それは、メディアです。"
201090-105 = "この世界に蜘蛛の巣のように張り巡らされたメディアは、現実世界に実在するパノプリの集積であり、新たな神秘を孕む母体でもある。#nまさしくそれは、新時代における「定義する権力」とも言えるでしょう。"
201090-107 = "己を代行する儀式として、どのような記号を提供してくれるのか――#n期待せずにはいられません。"
201090-109 = "[ns] \"あなたはデカルコマニー？\""
201090-110 = "ナンセンスですね。私は1つの存在である前に記号そのものですから。"
201090-111 = "私はデカルコマニーの[ruby=認識のスクリーン]エピステーメー[/ruby]であり、影。#n実在としてこの世界を認知しています。"
201090-112 = "すべてが欲望によって消費されるこの世界において、#n私は偉大な芸術家の作品を今一度捻じ曲げて自らを再定義します。"
201090-113 = "[ruby=Good Evening]こんばんは[/ruby]、先生。"
201090-115 = "私のことはどうか、ミスター・オーウェルとお呼びください。"
201090-117 = "次回;[ruby=ペルソナ]仮面[/ruby]舞踏会"

[translation]
80000119-1 = "ความอยากเอาชนะแปลกๆ"
80000119-2 = "(คุณครูงานยุ่งมากจนถึงช่วงดึก)"
80000119-9 = "[ns] \"......?\""
80000119-12 = "[ns1] \"อืม...  ดูเหมือนจะมีคนมาแฮะ\"\n[ns2] จัดบริเวณรอบข้างให้เป็นระเบียบ"
80000119-15 = "ดูเหมือนจะไม่ตกใจเลยนะ"
80000119-16 = "คิดแล้วเชียว... คงชินกับอะไรแบบนี้แล้วสินะ"
80000119-19 = "[ns3] \"...?? ชิโรโกะ?\"\n[ns4] \"เอ๊ะ คาดไม่ถึงเลยแฮะ\""
80000119-22 = "ฉันตั้งใจจะมาเซอร์ไพรส์สักหน่อยแต่ไม่สำเร็จแฮะ"
80000119-23 = "หืม...?"
80000119-24 = "ฉันมีอะไรถึงได้มาน่ะเหรอ? จู่ๆ ก็ถามเรื่องนั้นเลยเหรอ?"
80000119-25 = "ฮุฮุ..."
80000119-26 = "คุณดูไม่ตกใจเลยที่จู่ๆ ฉันก็โผล่มา แต่กลับเดาไม่ได้เลยว่าฉันมาทำไมสินะ..."
80000119-27 = "ล้อเล่นน่ะ... ฉันเองก็รู้อยู่แล้วละว่าคุณเป็นคนแบบไหน"
80000119-28 = "คุณน่ะ... อาจเรียกได้ว่าชินชากับเรื่องแบบนี้เลยก็คงไม่ผิด"
80000119-33 = "[ns5] \"เอ๋ นี่มัน 'ช็อกโกแลตอันนั้น' นี่นา...\"\n[ns6] \"ดูเหมือน 'คราวนี้' จะเอามาเยอะเลยนะ"
80000119-36 = "อื้อ... จำได้ด้วยสินะ"
80000119-37 = "ฉันคิดไว้แล้วละว่าคุณครูจะจำได้ เพราะงั้นคราวนี้ก็เลย... เตรียมมาเยอะนิดหน่อย"
80000119-38 = "ตอนนี้อย่างน้อยก็หามาได้เยอะขนาดนี้ โดยไม่ต้องลำบากอะไรแล้วน่ะ ในหลายๆ เรื่องเลยน่ะ"
80000119-39 = "หืม...?"
80000119-40 = "ทำไมถึงเตรียมของที่เหมือนกับชิโรโกะของทางนี้มา แต่เตรียมมาจำนวนมากกว่าน่ะเหรอ?"
80000119-41 = "อืม... เรื่องนั้น..."
80000119-45 = "[ns7] \"หรือว่าอยากเอาชนะ?\"\n[ns8] \"หรือว่า... แข่งอะไรกันอยู่รึไง?\""
80000119-48 = "เอาชนะ? แข่ง? เปล่านี่ ไม่ใช่แบบนั้นสักหน่อย"
80000119-49 = "ฉันไม่จำเป็นต้องทำแบบนั้นหรอก ฉันรู้อยู่แล้วละว่าตัวฉันที่อยู่ทางนี้จะทำอะไร"
80000119-50 = "การแข่งขันมันจะต้องมีคู่แข่งสิ ถึงจะเรียกว่าการแข่งขันน่ะ คุณครู แต่ฉันน่ะ..."
80000119-51 = "ชนะแล้วตั้งแต่ยังไม่แข่งเลยต่างหาก"
80000119-52 = "[s9] \"นั่นแหละที่เรียกว่าแข่งเงียบๆ น่ะ!!\"\n[s10] \"อย่ามาแข่งอะไรกันแปลกๆ สิ!!\""
80000119-55 = "ฮุฮุ ปฏิกิริยาเป็นไปตามที่คาดไว้ สมกับที่รอเลย"
80000119-56 = "แล้วก็ขอบคุณนะ... ที่คอยพูดแบบนั้นกับฉันตลอด"
80000119-57 = "ยังไงก็ถือว่าเป้าหมายสำเร็จแล้ว ฉันพอใจแล้วละ ขอตัวกลับก่อนแล้วกันนะ คุณครู"
80000119-58 = "[s11] \"หืม? จะกลับเลยเหรอ?\"\n[s12] \"อยู่ต่ออีกหน่อยก็ได้นี่นา\""
80000119-61 = "ไม่ละ ฉันคิดว่ากลับตอนนี้เลยน่าจะดีกว่า และถ้าจำเป็นละก็ เราจะติดต่อกันตอนไหนก็ได้นี่นา"
80000119-62 = "คุณครูเป็นคนที่หาข้ออ้างเก่งอยู่แล้วนี่ ฮุฮุ"
80000119-63 = "แต่ถึงอย่างนั้นก็... จะว่ายังไงดีล่ะ..."
80000119-64 = "ฉันคิดว่าบางทีการที่ฉันมาให้เห็นหน้าบ่อยๆ แบบนี้... อาจทำให้คุณครูสบายใจขึ้นก็ได้น่ะ"
80000119-65 = "อื้อ..."
80000119-66 = "ถ้าฉันเดาไม่ผิด คุณครูก็คงจะเป็นแบบนั้นละ ถือว่ามารายงานสถานการณ์แล้วกัน"
80000119-67 = "ฉันสบายดี แล้วก็ไม่มีปัญหาอะไรที่ต้องกังวลด้วย"
80000119-68 = "เป็นไง... เท่านี้ฉันก็เป็นนักเรียนที่ดีใช่มั้ย?"
80000119-69 = "[s13] \"นี่เห็นใจครูเหรอ? ยอดเยี่ยมจริงๆ\"\n[s14] \"โตขึ้นเยอะเลยนะ มีแค่ชิโรโกะเลยนะที่ทำได้แบบนี้เนี่ย\""
80000119-72 = "ฮุฮุ ชมเกินไปแล้ว"
80000119-73 = "เอาเถอะ แต่ฉันกับคนอื่นๆ ก็คงจะมาได้ไม่บ่อยหรอก"
80000119-74 = "แต่ยังไงฉันก็จะแวะมาบ้างบางครั้งก็แล้วกัน ตอนที่คุณครูดูว่างๆ เหมือนในวันนี้..."
80000119-75 = "แล้วเจอกันนะ คุณครู..."
80000119-77 = "(ชิโรโกะยิ้มกว้างให้คุณครูครั้งหนึ่ง และหายไปเงียบๆ)"
80000119-78 = "(ถึงช็อกโกแลตที่ชิโรโกะทิ้งไว้จะมีจำนวนเยอะมาก แต่ทุกชิ้นก็ถูกใช้เป็นพลังงานและแรงใจในการ#nเคลียร์งานมหาศาลในสำนักงาน)"

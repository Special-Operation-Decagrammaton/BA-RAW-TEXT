[translation]
80000119-1 = "Strange Competitiveness"
80000119-2 = "I was busy with work until late in the evening."
80000119-9 = "[ns] \"...?\""
80000119-12 = "[ns1] \"...Mm. I guess someone's here again.\"\n[ns2] Tidy up my surroundings."
80000119-15 = "You are completely unshaken."
80000119-16 = "I see... These kinds of situations are par for the course for you."
80000119-19 = "[ns3] \"...Shiroko??\"\n[ns4] \"Huh. That was unexpected.\""
80000119-22 = "I had hoped to catch you off guard, but it was a failure."
80000119-23 = "...Huh?"
80000119-24 = "...You're wondering what's going on? That is your primary concern?"
80000119-25 = "...Fufu."
80000119-26 = "My sudden appearance was of no surprise to you, yet you have no idea as to the reason behind my presence here."
80000119-27 = "...That was a joke. Even I'm aware of the type of person you are now."
80000119-28 = "You were so clueless when it came to these things...to the point where even I thought it was rather over the top."
80000119-33 = "[ns5] \"Huh, this is 'that chocolate'...\"\n[ns6] \"...You brought 'a bunch' this time.\""
80000119-36 = "...Yes. You remembered."
80000119-37 = "I believed you would, so I made certain to prepare enough of it this time, Sensei."
80000119-38 = "I am now in a position to get you something like this without being such a burden. In many different ways."
80000119-39 = "...Huh?"
80000119-40 = "...Why did I get you the same product that Shiroko of this world got you, just more of it?"
80000119-41 = "Mmm... That's..."
80000119-45 = "[ns7] \"...Is there some kind of a competition going on?\"\n[ns8] \"Are you...conscious of her?\""
80000119-48 = "...Competition? Conscious? No. That's not it."
80000119-49 = "Not in the slightest. I'm perfectly aware of everything me from this world would do."
80000119-50 = "A competition can only happen when the opponent is on equal standing, Sensei. In my case..."
80000119-51 = "...I've already won."
80000119-52 = "[s9] \"You're definitely very conscious of her!!\"\n[s10] \"Stop competing over something so weird!!\""
80000119-55 = "Fufu. Just as I predicted. That was an expected reaction."
80000119-56 = "...Thank you. For always being yourself."
80000119-57 = "Anyways, my mission is complete. I'm satisfied. I shall be on my way, Sensei."
80000119-58 = "[s11] \"What? You're leaving already?\"\n[s12] \"You should stay a while!\""
80000119-61 = "No. I think it's better that I don't linger. Also, we can always contact each other whenever it's necessary."
80000119-62 = "And you're much more adept at coming up with excuses than I am. Fufu."
80000119-63 = "But... Still..."
80000119-64 = "I thought it would give you a bit of relief...if I showed up in person here and there."
80000119-65 = "...Yes."
80000119-66 = "If I'm correct, that is simply how you are. I'm also doing this to reassure you."
80000119-67 = "I'm doing fine and will continue to do so in the future."
80000119-68 = "...What do you think? I'm an excellent student, am I not?"
80000119-69 = "[s13] \"Are you being considerate of me? That's amazing.\"\n[s14] \"You're all grown up now. You're the only one I can count on, Shiroko.\""
80000119-72 = "...Fufu. You flatter me."
80000119-73 = "Well, it would be a bit difficult to visit frequently, considering mine and everyone else's position."
80000119-74 = "But I will stop by from time to time. When you seem to be free...times like now..."
80000119-75 = "...I shall see you, Sensei."
80000119-77 = "Shiroko gave me a bright smile before she quickly disappeared."
80000119-78 = "Shiroko gifted me a ridiculous amount of chocolate, but I ate them all to recharge after reorganizing the messy office."

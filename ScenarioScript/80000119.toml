80000119-48 = "3;시로코 테러;02;……경쟁? 의식? 아니. 그렇지 않아.\n#3;em;[?]"
80000119-49 = "3;시로코 테러;91;그럴 만한 것도 없지. 이쪽의 내가 어떻게 행동할지는, 이미 다 알고 있으니까."
80000119-50 = "3;시로코 테러;01;경쟁이라는 것은 기본적으로 상대가 돼야 성립되는 문제야, 선생님. 나는……\n#3;em;…"

80000119-26 = "3;시로코 테러;03;내 이런 등장에는 태연했으면서, 정작 어째서 온 건지는 예상하지 못하는구나."
80000119-27 = "3;시로코 테러;99;……농담. 그런 사람이라는 것 정도는, 아무리 나라도 이제는 알고 있었으니까."

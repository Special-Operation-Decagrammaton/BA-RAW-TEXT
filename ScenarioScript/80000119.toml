80000119-55 = "3;시로코 테러;03;후후. 역시 예상대로의 반응. 기대했던 대로네."
80000119-56 = "3;시로코 테러;06;……그리고 고마워, 늘 그렇게 말해줘서."
80000119-57 = "3;시로코 테러;03;아무튼 이걸로 목표는 완수. 만족이야. 이만 돌아가 볼게, 선생님.\n#3;m2"
80000119-58 = "[s11] \"응? 이렇게 바로 가는 거야?\"\n[s12] \"조금 더 있어도 되는데.\""
80000119-59 = "#wait;10"
80000119-60 = "#wait;10"
80000119-61 = "3;시로코 테러;01;아니. 금방 돌아가는 게 좋다고 생각해. 그리고 필요하면 언제든 따로 연락할 수 있잖아."
80000119-62 = "3;시로코 테러;03;이유를 만드는 건, 선생님이 나보다 훨씬 잘하겠지. 후후."
80000119-63 = "3;시로코 테러;99;그래도…… 뭐랄까…….\n#3;em;…"
80000119-64 = "3;시로코 테러;06;자주 이렇게 먼저 얼굴 비추는 게…… 선생님이라면, 오히려 안심할 거라고도 생각했어."
80000119-65 = "3;시로코 테러;06;……응."
80000119-66 = "3;시로코 테러;02;내 예상이 맞다면, 당신은 그런 사람이니까 말이야. 근황 보고를 겸하는 거야."

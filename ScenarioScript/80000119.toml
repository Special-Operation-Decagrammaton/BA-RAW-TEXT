[translation]
80000119-1 = "奇妙的競爭心"
80000119-2 = "（直到深夜，工作仍在如火如荼地進行中）"
80000119-9 = "[ns] 「……？」"
80000119-12 = "[ns1] 「……嗯，看來又有人來了。」\n[ns2] 熟練地開始整理周圍"
80000119-15 = "你好像一點也不驚訝呢。"
80000119-16 = "看來……你已經很習慣這種情況了。"
80000119-19 = "[ns3]「…… 白子？」\n[ns4]「哎呀，這倒是讓我有點意外。」"
80000119-22 = "本來以為這樣能給你一個驚喜，結果失敗了。"
80000119-23 = "……嗯？"
80000119-24 = "問我怎麼會突然過來？#n居然是先問這個嗎？"
80000119-25 = "……呵呵。"
80000119-26 = "明明對我的出現並不意外，卻不知道我過來的理由嗎。"
80000119-27 = "……開玩笑的。#n我也知道老師你就是這種人。"
80000119-28 = "在這個方面……真是遲鈍到不行。"
80000119-33 = "[ns5]「咦，這是『那個巧克力』……」\n[ns6]「……這次的量還真多呢。」"
80000119-36 = "……嗯。你果然記得啊。"
80000119-37 = "就是因為知道老師會記得，所以這次……我做了更充分的準備。"
80000119-38 = "對現在的我而言，要準備這些已經沒什麼負擔了……各方面來說都是。"
80000119-39 = "……嗯？"
80000119-40 = "為什麼偏偏要跟「這邊的白子」送一樣的東西，只是份量更多？"
80000119-41 = "這……該怎麼說呢……"
80000119-45 = "[ns7]「……難道是出於某種奇妙的競爭心？」\n[ns8]「你……很在意他嗎？」"
80000119-48 = "……競爭？在意？#n沒有，我怎麼會呢。"
80000119-49 = "況且也沒有這個必要。#n我早就知道「這邊的我」會怎麼做了。"
80000119-50 = "競爭必須要有對手才能成立。#n而我──"
80000119-51 = "早就贏了。"
80000119-52 = "[s9]「根本就超級在意的嘛！！」\n[s10]「不要競爭這種奇怪的事情啦！！」"
80000119-55 = "呵呵，果然是預料中的反應。#n跟我期待看見的一模一樣。"
80000119-56 = "……還有，謝謝你總是這樣接納我。"
80000119-57 = "既然任務已經圓滿達成，我就先回去了，老師。"
80000119-58 = "[s11]「咦？這麼快就要走了嗎？」\n[s12]「再多待一下也沒關係的。」"
80000119-61 = "不，我覺得還是早點回去比較好。#n而且如果有需要的話，隨時都可以聯絡不是嗎？"
80000119-62 = "在創造理由這方面，老師應該比我更擅長才對。呵呵。"
80000119-63 = "不過……怎麼說呢……"
80000119-64 = "經常像這樣主動露面……老師反而會覺得比較放心吧。"
80000119-65 = "……嗯。"
80000119-66 = "如果我沒猜錯的話，你就是這樣的人。#n這也算是順便報個平安。"
80000119-67 = "我過得很好，未來應該也不會有什麼大問題。"
80000119-68 = "……怎麼樣，我是個好學生吧？"
80000119-69 = "[s13]「是在關心我嗎？真了不起。」\n[s14]「你已經長大了呢。不愧是白子。」"
80000119-72 = "……呵呵，不必跟我說客套話。"
80000119-73 = "雖然如果太常來的話，對我跟大家可能都不太方便……"
80000119-74 = "我會偶爾過來看看你的。#n比如現在這樣……看起來比較有空的時候。"
80000119-75 = "……再見了，老師。"
80000119-77 = "（白子露出燦爛的笑容後，便悄然離開了）"
80000119-78 = "（雖然他留下的巧克力份量驚人，正好藉著整理被弄亂的辦公室把熱量都消耗掉了）"

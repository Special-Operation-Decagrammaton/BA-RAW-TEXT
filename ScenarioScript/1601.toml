[translation]
1601-1 = "การประเมินสุขอนามัย ของชมรมโภชนาการจอมวุ่นวาย 1"
1601-2 = "(โรงอาหารของสถาบันเกเฮนน่า)"
1601-3 = "(3 ชั่วโมงก่อนถึงเวลาอาหารเช้า)"
1601-7 = "ฟุดฟิด... ฟุดฟิด..."
1601-9 = "ดูจากกลิ่นที่โชยมาแล้ว น่าจะอยู่แถวๆ นี้นะ..."
1601-13 = "อ๊ะ! เจอแล้วล่ะ!"
1601-15 = "โอ้... ถ้างั้น..."
1601-17 = "จูริ จับไว้!"
1601-18 = "ค่ะ! รุ่นพี่!"
1601-20 = "โอ๊ะ?! ว้าก?!"
1601-25 = "จับได้แล้ว! เจ้าหัวขโมยคุกกี้!"
1601-26 = "ค่ะ! จับกุมเรียบร้อยแล้วค่ะ!"
1601-27 = "อุ๊บส์?! ง่ำๆๆๆ! ง่ำๆๆ!"
1601-28 = "งั่บๆๆ อึ่กๆ ฮ่าาา! ทะ...ทำอะไรน่ะ?"
1601-29 = "พวกเราต่างหากต้องพูดแบบนั้น"
1601-30 = "ทำไมถึงมาเดินป้วนเปี้ยนที่โรงอาหารแต่เช้าแบบนี้ล่ะ?"
1601-31 = "ค่ะ ใช่แล้วค่ะ!"
1601-32 = "นะ...นั่นมันก็...!"
1601-33 = "เมื่อวานได้ยินมาว่าของหวานที่จะเสิร์ฟเช้าวันนี้คือคุกกี้น่ะ"
1601-34 = "อื้อ เพราะนั่นมัน..."
1601-39 = "อ่า! จริงด้วย คุกกี้รสชาติใช้ได้ไหมคะ! ฉันตั้งใจว่าจะตรวจสอบก่อนพอดีเลย!"
1601-40 = "ในฐานะของสมาชิกชมรมชิมอาหารน่ะ!"
1601-42 = "อ่า นั่นสินะ"
1601-43 = "ถึงจะรู้ว่าหิวก็เถอะ... แต่นี่มันเป็นอาหารของโรงเรียนนะ?"
1601-44 = "ถ้าอยากกินล่ะก็รอจนถึงมื้อเช้าก่อนสิ"
1601-45 = "อ๊า~! อย่าทำแบบนั้นสิ ขอนิดเดียวเองนะ แค่นิดนึงก็ได้!! "
1601-46 = "อ๊ะ ถ้าไม่ใช่คุกกี้ล่ะก็เป็นซุปสำหรับมื้อเช้าก็ได้นะ!"
1601-47 = "นี่สั่งมื้อเช้างั้นเหรอ?!"
1601-48 = "เฮ้อ วันนี้ก็ยุ่งเหมือนเดิม เดี๋ยวพอถึงเวลาเสิร์ฟมื้อเช้าแล้วค่อยมาใหม่แล้วกันนะ"
1601-49 = "หือ? ยุ่งอยู่งั้นเหรอ?"
1601-50 = "ค่ะ~ วันนี้เป็นวันประเมินสุขอนามัยของชมรมโภชนาการค่ะ"
1601-51 = "วันนี้นักโภชนาการจะเข้ามาตรวจสอบหลายๆ อย่าง"
1601-52 = "ทั้งเรื่องความสะอาดของอุปกรณ์ วันหมดอายุของวัตถุดิบ... "
1601-53 = "อีกทั้งยังเป็นวันที่จะต้องประเมินและกำหนดระดับหลายๆ อย่างด้วยค่ะ"
1601-54 = "ตอนที่ประเมินคราวก่อน เราได้คะแนนกันต่ำมากเลยทำให้งบประมาณของชมรมถูกตัดไปครึ่งนึง..."
1601-55 = "ทำไมกันนะ...? ก็เตรียมพร้อมเอาไว้ถี่ถ้วนแล้วนะ?"
1601-56 = "ตอนที่นักโภชนาการที่มาประเมินจะกลับไป... ก็ดูเป็นปกติดี มันเพราะอะไรกัน...?"
1601-57 = "รุ่นพี่ฟูกะ! ใจเย็นๆ ก่อนนะคะ! "
1601-59 = "อื้อ... จริงด้วย ไหนๆ เรื่องมันก็ผ่านไปแล้ว!#nไม่เห็นจะต้องไปย้อนคิดถึงเรื่องในอดีตสักหน่อย"
1601-60 = "ค่ะ ก็คงแค่โชคร้ายเท่านั้น!"
1601-61 = "ทุกคนกลับบ้านกันอย่างปลอดภัยใช่ไหม? วันนี้แยกย้ายกันกลับก่อน..."
1601-63 = "ทุกคนอย่าขยับ ยกมือขึ้น!"
1601-64 = "หือ?"
1601-69 = "ตายจริง"
1601-70 = "....หือ?"
1601-71 = "อะไรน่ะ ชมรมชิมอาหารงั้นเหรอ#nถึงจะสงสัยว่ามีคนแปลกๆ อยู่ก็เถอะ..."
1601-72 = "พวกเขาจะคิดยังไงกับฉันกันล่ะเนี่ย?!"
1601-73 = "เดี๋ยวสิ ทำไมคณะกรรมการวินัยถึงมาอยู่ที่นี่ล่ะ?"
1601-74 = "จะทำหน้าตาไม่รู้ร้อนรู้หนาวไปถึงเมื่อไหร่? "
1601-75 = "เอ๊ะ?! พูดอะไรน่ะ?!"
1601-76 = "วันนี้การประเมินสุขอนามัยของชมรมโภชนาการ#nฉันอิโอริจากคณะกรรมการวินัยจะเป็นผู้ดำเนินการประเมิน"
1601-77 = "พวกคณะกรรมการวินัยน่ะนะ...? ทำไมล่ะ?"
1601-78 = "มันเป็นมาตรการที่สมควรยังไงล่ะ"
1601-79 = "จากการประเมินสุขอนามัยครั้งที่แล้ว นักโภชนาการที่มาตรวจสอบพอกลับไปก็อาหารเป็นพิษเลย"
1601-80 = "อะ...อาหารเป็นพิษงั้นเหรอ?!"
1601-81 = "นั่นหมายความว่าในโรงอาหารอาจมีแบคทีเรียที่ทำให้อาหารเป็นพิษอยู่ก็ได้"
1601-82 = "ตัวอย่างเช่น \"สัตว์ประหลาดนั่นมันกินคุกกี้ของฉันไปแล้ว!\""
1601-84 = "....? (ง่ำๆ)"
1601-85 = "(อึ่กๆ)"
1601-86 = "แกล้งทำเป็นตกใจสักหน่อยก็ได้นะ!!"
1601-87 = "แล้วไหนจะเรื่องอาหารเป็นพิษอีก เรื่องนั้นเป็นไปไม่ได้แน่ๆ คงเข้าใจผิดแล้วล่ะ!"
1601-88 = "อาหารที่พวกเราทำบางครั้งก็อาจจะไม่อร่อยบ้าง..."
1601-89 = "ไม่รู้... ไม่...  "
1601-90 = "อื้อ! ถึงอาหารที่โรงอาหารจะไม่อร่อยอยู่บ่อยๆ ก็เถอะ!"
1601-91 = "บอกกันดื้อๆ แบบนี้เลยเหรอ?!#nแล้วยังบ่อยๆ ด้วย?!"
1601-92 = "แต่ว่าฉันก็ไม่ได้ดูแลได้แย่จนทำให้คนที่กินอาหารเกิดอาหารเป็นพิษสักหน่อย"
1601-93 = "ใช่แล้วค่ะ! รุ่นพี่ฟูกะใส่ใจดูแลเรื่องสุขอนามัยอย่างมากเลยนะคะ!"
1601-94 = "ถ้าแค่พูดใครๆ ก็พูดได้อยู่แล้ว"
1601-95 = "แต่ฉันมั่นใจนะว่านักโภชนาการที่มาตรวจสอบเมื่อคราวก่อนถึงกับอาหารเป็นพิษไปเลย#nหลังจากมาประเมินที่นี่"
1601-96 = "พวกเขาพูดเอาไว้แบบนั้นก่อนจะเอามือกุมท้องแล้ววิ่งเข้าห้องน้ำกันไปน่ะ"
1601-99 = "เขาลือกันว่า \"ที่ชมรมโภชนาการมีสัตว์ประหลาดอยู่ด้วย!\" แบบนี้น่ะ...!"
1601-100 = "สัตว์ประหลาด?! พูดอะไรน่ะ! พูดอะไรไม่เห็นรู้เรื่องเลย!"
1601-101 = "ฮึ่ม ดูแลสุขอนามัยได้แย่กันขนาดไหนนะ ถึงได้มีข่าวลือแบบนั้นออกมา"
1601-102 = "ฉันจะตรวจสอบให้ละเอียดทุกตารางนิ้วเลย!"
1601-103 = "(พูดไม่เข้าใจหรือยังไงนะ?!)"
1601-104 = "ฉัน...ฉันไม่ยอมแพ้หรอกค่ะ!"
1601-105 = "ต่อให้อีกฝ่ายจะเป็นคณะกรรมการวินัยก็เถอะ!"
1601-108 = "ฉันจะแสดงให้ดูเองค่ะว่าชมรมโภชนาการไม่ได้มีปัญหาเรื่องความสะอาดเลย!"
1601-109 = "โฮ่... พลังงานล้นเหลือจริงๆ เลยนี่ ดีจังเลย"
1601-110 = "จัดมาให้เต็มเหนี่ยวเลย!"
1601-111 = "ค่ะ!"
1601-116 = "(ไม่สิ การประเมินสุขอนามัยไม่ใช่การแข่งขันสักหน่อย?!#nถ้าทำเหมือนเป็นคู่แข่งที่เป็นมิตรต่อกันมันจะลำบากนะ?!)"
1601-118 = "(การประเมินสุขอนามัยอย่างละเอียดของอิโอริได้เริ่มขึ้น)"

[translation]
1601-1 = "The Lunch Club's Slapdash Inspection Part 1"
1601-2 = "(Gehenna Academy Student Dining Hall)"
1601-3 = "(Three hours before breakfast time...)"
1601-7 = "*sniff* *sniff*"
1601-9 = "We must be getting close based on the smell."
1601-13 = "Oh! Found it...!"
1601-15 = "Ooh! Let's see."
1601-17 = "Juri, catch!"
1601-18 = "Got it!"
1601-20 = "Huh?! Wha...?!"
1601-25 = "Gotcha! You're the cookie thief!"
1601-26 = "Caught red-handed!"
1601-27 = "Hmm?! *munch* *munch* Mmph!"
1601-28 = "*munch* *munch* *gulp* Ack! Wh-Why are you doing this?!"
1601-29 = "That's our line."
1601-30 = "Why are you snooping around the student dining hall so early in the morning?"
1601-31 = "Exactly!"
1601-32 = "B-Because...!"
1601-33 = "Yesterday, I heard that we'll have cookies for dessert this morning."
1601-34 = "Um, so...I..."
1601-39 = "Oh, that's right! I just wanted to give the cookies a taste test in advance!"
1601-40 = "I felt it was my duty as a member of the Gourmet Research Society!"
1601-42 = "Oh. Now I get it."
1601-43 = "*sigh* I understand you're hungry, but these are for breakfast, you know?"
1601-44 = "You need to wait until then."
1601-45 = "Ugh! Just give me one! I'll settle for crumbs!"
1601-46 = "But if it's too early for cookies, I'm fine with the entree!"
1601-47 = "You're ordering breakfast now?!"
1601-48 = "*sigh* I don't have time for this. Come back when it's breakfast time."
1601-49 = "Huh? What could you be doing at this hour?"
1601-50 = "Well, today is the School Lunch Club's health inspection."
1601-51 = "In other words, a health inspector is going to be visiting today."
1601-52 = "21;후우카;01;They'll look at the cleanliness of the facilities, the expiration dates on the ingredients..."
1601-53 = "...not to mention several other aspects about us before finishing the evaluation."
1601-54 = "We received a low grade during our last inspection, and our budget was halved as a result..."
1601-55 = "I've never understood how it happened. I thought we were prepared."
1601-56 = "The inspector had a smile on his face when he left. What happened...?"
1601-57 = "Calm down, Fuuka! Deep breaths! Deep breaths!"
1601-59 = "Yeah. You're right. That's all in the past! We need to move on and not dwell on it."
1601-60 = "I'm sure we just got unlucky last time!"
1601-61 = "Anyway, I hope that explains things. You should head back and..."
1601-63 = "Hands up! Don't move!"
1601-64 = "Huh?"
1601-69 = "Oh, dear."
1601-70 = "What the...?"
1601-71 = "Someone from the Gourmet Research Society? My suspicions were dead on."
1601-72 = "Hey, what's that supposed to mean?!"
1601-73 = "What's the Prefect Team doing here?"
1601-74 = "Playing dumb, are we? That sounded so natural that I almost believed it."
1601-75 = "Huh? What are you talking about?!"
1601-76 = "I'll be conducting the School Lunch Club's health inspection on behalf of the Prefect Team."
1601-77 = "The Prefect Team? Why would they...?"
1601-78 = "Isn't it obvious?"
1601-79 = "The last inspector who visited the School Lunch Club came down with food poisoning."
1601-80 = "F-Food poisoning?!"
1601-81 = "Which means there may be dangerous bacteria somewhere in this dining hall."
1601-82 = "Like in that cookie she's eating for instance!"
1601-84 = "...? *nom*"
1601-85 = "*gulp*"
1601-86 = "Aren't you at least a little concerned?!"
1601-87 = "Never mind her. What's this about food poisoning? You must be mistaken!"
1601-88 = "Granted, I know that sometimes the food we make is..."
1601-89 = "Is...you know..."
1601-90 = "Not very good?!"
1601-91 = "How could you say that?! And so easily?!"
1601-92 = "A-Anyway, we may have our faults, but we'd never be so bad as to cause food poisoning."
1601-93 = "That's right! Fuuka takes hygiene very seriously!"
1601-94 = "That's easy to say."
1601-95 = "But how do you explain what happened after the last inspection?"
1601-96 = "The last inspector was running to the bathroom grabbing his stomach and said this:"
1601-99 = "\"There's a monster in the School Lunch Club!\""
1601-100 = "A monster?! What are you talking about? That's ridiculous!"
1601-101 = "Hmph. The only explanation is that this dining hall's hygiene is deplorable."
1601-102 = "Today is the day that I uncover the truth!"
1601-103 = "(What on earth is going on?)"
1601-104 = "I-I'm not backing down!"
1601-105 = "I don't care if you are from the Prefect Team!"
1601-108 = "I'll teach you not to underestimate the School Lunch Club!"
1601-109 = "Hmm. You seem quite determined. Very well."
1601-110 = "I accept your challenge!"
1601-111 = "You got it!"
1601-116 = "(But a health inspection isn't a competition! It's not like we're bitter rivals or something.)"
1601-118 = "(Thus began Iori's merciless health inspection.)"

[translation]
1601-1 = "供給部亂糟糟的衛生管理評鑑（１）"
1601-2 = "（格黑娜學園的學生食堂）"
1601-3 = "（距離供膳開始3小時前）"
1601-7 = "嗅嗅，嗅嗅。"
1601-9 = "從氣味聞起來，應該是在這附近……"
1601-13 = "啊！找到了……！"
1601-15 = "好，那就──"
1601-17 = "茱莉，就是那裡！"
1601-18 = "是！"
1601-20 = "咦！？唔哇啊！？"
1601-25 = "抓到了！餅乾小偷！"
1601-26 = "是！抓住了！"
1601-27 = "唔唔！？嚼嚼……！"
1601-28 = "嚼嚼……（吞下），噗哈！做什麼啊！"
1601-29 = "「做什麼啊」是我們該說的台詞。"
1601-30 = "大清早的在這裡做什麼呢？"
1601-31 = "就是說啊！"
1601-32 = "那，那是，那～個……"
1601-33 = "因為，聽說今天會有餅乾作為甜點。"
1601-34 = "所以，就是，那個……"
1601-39 = "啊，對！我想幫你們確認看看，餅乾是不是真的好吃！"
1601-40 = "以美食研究會成員的身分！"
1601-42 = "哼～……"
1601-43 = "唉，雖然我知道你肚子餓，不過這是要供應的餐點。"
1601-44 = "乖乖等到供餐時間吧。"
1601-45 = "別那麼無情啊！稍微一點，稍微一點點就好了！"
1601-46 = "啊，用湯代替餅乾也可以唷！"
1601-47 = "不是那個問題！"
1601-48 = "唉，今天我們很忙，可以快點離開嗎？"
1601-49 = "咦，為什麼？有什麼事嗎？"
1601-50 = "今天是供給部實施衛生評鑑的日子唷。"
1601-51 = "是調查員會來做各種檢查的日子。"
1601-52 = "像是設備的清潔度、食材的賞味期限……"
1601-53 = "還有其他各種評鑑的日子。"
1601-54 = "因為上次的評分相當低，害的預算也只剩下一半了……"
1601-55 = "話說那究竟是為什麼呢……明明做了徹底的準備……"
1601-56 = "調查員在回去之前也是滿臉笑容，然而怎麼會……？"
1601-57 = "冷，冷靜呀風華前輩！#n做個深呼吸，深呼吸！"
1601-59 = "……嗯，那都已經過去了！#n過去的事就讓它過去，得放眼未來才行！"
1601-60 = "說的對，肯定只是運氣不好而已！"
1601-61 = "總之就是這樣，你快點回去……"
1601-63 = "所有人把手舉高！在原地不准動！"
1601-64 = "咦？"
1601-69 = "哎呀？"
1601-70 = "……嗯？"
1601-71 = "什麼嘛，是美食研究會啊。#n還以為除了平常的面孔外，還有奇怪的食……可疑的東西在咧。"
1601-72 = "你把我當成什麼了！？"
1601-73 = "等等，為什麼風紀委員會會在這裡？"
1601-74 = "你能對我擺出那種態度到什麼時候呢？"
1601-75 = "什，什麼意思！？"
1601-76 = "今天是由我，風紀委員會的伊織代替原本的調查員進行供給部的衛生評鑑。"
1601-77 = "風紀委員會？為什麼……？"
1601-78 = "不是什麼特別的理由。"
1601-79 = "上次來供給部的調查員，被診斷出了食物中毒。"
1601-80 = "食，食物中毒！？"
1601-81 = "也就是說，在學生食堂的某處有蔓延著細菌或病毒的可能性。"
1601-82 = "例如，那傢伙正在吃的餅乾之類的！"
1601-84 = "嚼嚼……"
1601-85 = "（吞下）……？"
1601-86 = "多少也動搖一下吧！！"
1601-87 = "比起那個，怎麼可能會發生食物中毒！#n一定是哪裡搞錯了！"
1601-88 = "我們供給的餐點，有時確實不太……"
1601-89 = "確實……不太……"
1601-90 = "完全不好吃！"
1601-91 = "多少猶豫一下吧！#n話說「完全」！？"
1601-92 = "總，總之，我們的管理並沒有隨便到會造成食物中毒。"
1601-93 = "沒錯！也不想想風華前輩有多麼注重衛生方面的問題！"
1601-94 = "只是嘴上說說的話誰都會。"
1601-95 = "不過能夠確定的是，上次負責的調查員結束了這裡的評鑑之後食物中毒了。"
1601-96 = "聽說那名調查員結束評鑑後，按著肚子往廁所跑去的同時這麼說著……"
1601-99 = "「那個供給部棲息著魔物」。"
1601-100 = "騙人的吧！？是在說電影還是什麼！？怎麼回事！？"
1601-101 = "究竟是遭遇了何等殘酷的對待才會說出那種話……"
1601-102 = "今天，我就要來徹底揭穿那個真面目！"
1601-103 = "（不是，結果還是不知道為什麼是風紀委員會來呀！？）"
1601-104 = "我，我也不會輸的！"
1601-105 = "就算對手是風紀委員會也一樣！"
1601-108 = "我們供給部可不是省油的燈，就讓你見識見識吧！"
1601-109 = "氣勢倒是挺不錯的，很好。"
1601-110 = "放馬過來吧！"
1601-111 = "是！"
1601-116 = "（……這是什麼熱血的展開？衛生評鑑是這麼做的嗎？咦，難道奇怪的是我！？）"
1601-118 = "（就這樣，由伊織主導的衛生管理評鑑開始了）"

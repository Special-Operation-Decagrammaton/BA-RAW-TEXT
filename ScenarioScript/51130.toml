[translation]
51130-1 = "Episode 13;Kiryuu Kikyou and the Succession Contest 2"
51130-8 = "*pant pant*..."
51130-9 = "[s] \"Can you stand? Yukari!\""
51130-10 = "I'm... I'm fine!"
51130-11 = "Is this really necessary?!"
51130-12 = "You're going way too far..."
51130-17 = "No. I'm not. This is what a Hyakkaryouran succession contest is."
51130-18 = "Face the gravity of your reality, Kadenokouji."
51130-19 = "The issue isn't acquiring a witness for your succession contest. Nagusa is an insurmountable wall you cannot pass."
51130-20 = "Reality will not bend to mere feelings. Your dreams are an impossibility."
51130-22 = "... ... "
51130-23 = "That's... I just..."
51130-24 = "All I wished was for us to return to normal... To be the Hyakkaryouran once again..."
51130-26 = "Go back? Go back to what?"
51130-27 = "Your frivolity is insulting."
51130-28 = "Defeat Nagusa? Lead the Hyakkaryouran?"
51130-29 = "How? You can't even defeat me."
51130-30 = "This childish behavior will cease immediately."
51130-31 = "Because is that truly your desire? To \"go back\"?"
51130-36 = "We all know that to not be true."
51130-37 = "What you should do is go home, Lady Kadenokouji. Playtime is over."
51130-41 = "[ns1] \"Kikyou, you don't mean that.\"\n[ns2] \"Yukari's really serious. Just yesterday...\""
51130-44 = "If you believe that, answer me this, Schale's Sensei."
51130-45 = "Did our lady tell you everything before requesting your aid?"
51130-46 = "The duties that come with being of the Kadenokouji family are heavy and inescapable."
51130-47 = "Yet she continues to flout her responsibility to instead play house with the Hyakkaryouran."
51130-48 = "Has she told you anything of the life you are helping her to neglect?"
51130-54 = "...I expected nothing different."
51130-55 = "Do you understand now, Sensei? You were another character in her grand charade."
51130-56 = "Kadenokouji Yukari. Unlike you, the Hyakkaryouran is all we have."
51130-57 = "We will lose the Hyakkaryouran and be left with nothing. You will return to your great halls and lavish life."
51130-58 = "So for you to speak of succession contests, of being the messiah to our every problem..."
51130-62 = "It's distasteful. "
51130-63 = "You have your role to play in society. And, allow me to speak plainly, it is not with the Hyakkaryouran."
51130-64 = "..."
51130-66 = "It's time to face reality."
51130-67 = "Playtime with the Hyakkaryouran is over, Lady Kadenokouji."
51130-68 = "Is this... This is how you view me, Kikyou?"
51130-69 = "Do you know me to say things I don't mean? You are no less aggravating than when we were younger."
51130-70 = "You were the only one harboring delusions."
51130-76 = "I...deep down I was aware of everything you said!"
51130-80 = "I'm not so blind to think I could so easily best Nagusa."
51130-81 = "I understood that the chances of me winning my succession contest were nigh impossible."
51130-82 = "I harbored no delusions!"
51130-83 = "..."
51130-84 = "[s] \"Yukari...\""
51130-88 = "Despite all that... Yes. I did want to go back. I truly did!"
51130-91 = "I want the president of the Yin-Yang Club to witness my Hyakkaryouran Succession Contest!"
51130-93 = "I had no other option! I just thought that...with a succession contest..."
51130-94 = "If I could simply defeat Nagusa...! I would become the president, and then... And then..."
51130-98 = "Then we could go back..."
51130-100 = "If I could simply do all of that, then everyone would smile again!"
51130-101 = "That's what I thought..."
51130-102 = "But first Renge, and now Kikyou... It seems everyone expects me to lay down my hopes."
51130-103 = "How am I to simply abandon the memories of our laughter filling the room when we were together?"
51130-104 = "... *sigh*"
51130-109 = "My immaturity has turned me into a nuisance, it seems..."
51130-110 = "I'm...sorry, everyone. Sensei."
51130-115 = "[ns] \"No, Yukari! Come back!\""
51130-117 = "Why do you insist on meddling in matters of which you know nothing?"
51130-118 = "Yukari is chasing a shadow of a dream. Our path was carved into stone the moment Nagusa surrendered her position."
51130-119 = "Rumors circulated amongst the members like wildfire almost instantaneously."
51130-120 = "The whispers grew louder and louder: \"The Hyakkaryouran is finished.\""
51130-121 = "We did what we had to do in response. That's what you don't understand, outsider."
51130-122 = "That child admired the very air that Nagusa breathed."
51130-123 = "And it was our responsibility to send her home before she was injured by the fallout."
51130-124 = "This...This is how we protect her."
51130-125 = "She doesn't understand. A shattered mirror cannot be pieced back together."
51130-126 = "Those of us left behind will carry on the burden she'll soon forget."
51130-128 = "[ns] \"You're wrong. About everything.\""
51130-132 = "...Excuse me?"
51130-133 = "[s] \"You're the one who's out of line, Kikyou.\""
51130-135 = "[ns] \"You really love your club, Yukari.\""
51130-136 = "Yes!"
51130-137 = "It's only natural."
51130-138 = "The Hyakkaryouran...is a club I have always looked up to."
51130-140 = "[ns] \"Yukari has the right to decide how she wants to live her own life.\""
51130-141 = "How dare you..."
51130-146 = "I know this isn't my place, but I can't help but agree with Sensei."
51130-147 = "...What does the president of the Festival Operations Department have to say on this matter?"
51130-148 = "Someone's place in this world..."
51130-153 = "Well, isn't the point of life to figure out what that is for yourself?"
51130-159 = "You say it's for her own good, that she'll be happier that way, but I'm sorry..."
51130-160 = "It's just not right."
51130-166 = "[ns] \"Yukari said it herself. She knew she would lose the succession contest.\""
51130-168 = "[ns] \"Wasn't she just scrambling for some kind of excuse to get to see everyone?\""
51130-169 = "...Say what you will."
51130-170 = "It doesn't... It changes nothing."
51130-171 = "I spoke the truth. That is all."
51130-172 = "[s] \"Did you really? You really think Yukari is frivolous? That she's playing house?\""
51130-176 = "[ns3] \"Lying to protect someone is still lying...\"\n[ns4] \"All you did was say things to hurt her.\""
51130-179 = "...!!"
51130-180 = "Ahem! Wh-Why don't we focus on what we can control for right now? "
51130-181 = "Let's look for Kadeno—for Yukari first."
51130-182 = "[s] \"Let's go, Shizuko.\""
51130-200 = "What do they want from me?"
51130-205 = "..."
51130-206 = "What they truly want...is you."
51130-207 = "Everyone's gaze is fixated upon your vacant spot, Nagusa..."
51130-211 = "..."
51130-224 = "...Renge? It's me."
51130-227 = "The Hyakkaryouran been pushin' us around all day!"
51130-228 = "We're halfway beat, and the festival ain't even started!"
51130-233 = "Maybe we gotta give up, Leader..."
51130-234 = "Yeah! Why don't we just forget 'bout all of this and have fun at the big festival, Leader?"
51130-235 = "It's gonna start soon, so we gotta get goin' now!"
51130-237 = "Hm... I guess that sounds like a kinda good idea? I think?"
51130-238 = "After all, someone great once said only idiots stare up a tree they can't climb!"
51130-243 = "(I-Is that so? Who...?)"
51130-245 = "That ain't the point!"
51130-246 = "We're the Mouryo, y'all! The evil organization that can make even a crying kid bust out laughin'! "
51130-251 = "(That doesn't sound evil at all...)"
51130-253 = "We're the biggest and baddest around! We can't just turn tail and hide!"
51130-254 = "I ain't givin' up! This is when the leader's gotta really step up and set an example!"
51130-255 = "That might be a li'l hard for our leader..."
51130-259 = "What?! "
51130-263 = "Nothin'! I said nothin'!"
51130-264 = "Ugh! We ain't givin' up! I'll never sleep again if I don't get my revenge!"
51130-269 = "Oh my. Aren't you just a pitiable lot."
51130-270 = "Festivals are meant for fun and joy. I can't possibly turn a blind eye to such morose faces during a happy time."
51130-271 = "I can't. I won't!"
51130-276 = "Wh-Who's there?"
51130-282 = "Come. I'll offer you a helping paw."
51130-283 = "Heehee... Not that I am a cat, of course."
51130-288 = "Regardless, wouldn't you like a little help?"
51130-290 = "Next Episode;Determined Girl"

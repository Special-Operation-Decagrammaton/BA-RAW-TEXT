[translation]
51130-1 = "ตอนที่ 13;คิริว คิเคียว และศึกชิงตำแหน่ง 2"
51130-8 = "แฮ่ก... แฮ่ก..."
51130-9 = "[s] \"ยูคาริ! เป็นยังไงบ้าง?!\""
51130-10 = "ขะ... ข้า... ไม่เป็นไรเจ้าค่ะ..."
51130-11 = "บะ... แบบนี้ไม่เกินไปหน่อยเหรอคะ?!"
51130-12 = "ต้องทำถึงขนาดนี้เลยเหรอ..."
51130-17 = "ก็นี่เป็นศึกชิงตำแหน่งของเฮียกกะเรียวรันนี่"
51130-18 = "ทีนี้รู้แล้วใช่มั้ยล่ะ? นี่แหละความจริง"
51130-19 = "ต่อให้ฉันเปิด <ศึกชิงตำแหน่ง> ในฐานะผู้รับรอง เธอก็เอาชนะรุ่นพี่นางุสะไม่ได้หรอก"
51130-20 = "ความคิดเห็นกลางทุ่งลาเวนเดอร์ของเธอน่ะ มันไม่ได้อยู่บนพื้นฐานของความเป็นจริงเลยสักนิด"
51130-22 = "ขะ... ข้า..."
51130-23 = "...ข้า... ก็แค่... อยากให้เรา..."
51130-24 = "กลับไปยังเมื่อตอนที่เราทำกิจกรรมด้วยกันในฐานะเฮียกกะเรียวรัน..."
51130-26 = "จะกลับไปงั้นเหรอ?"
51130-27 = "อย่ามาตลกเลย"
51130-28 = "เธอบอกว่าจะโค่นรุ่นพี่นางุสะแล้วก็ขึ้นเป็นหัวหน้า"
51130-29 = "แต่ดูสิ แม้แต่ฉันเธอยังเอาชนะไม่ได้เลย เธอก็เอาแต่พูดในสิ่งที่ทำไม่ได้น่ะ"
51130-30 = "ความมุ่งมั่นเก้ๆ กังๆ นั่นมันอะไรกัน? แล้วคำพูดที่เซ้าซี้และดื้อดึงของเด็กนั่นมันอะไรกัน?"
51130-31 = "เธออยากจะโค่นรุ่นพี่นางุสะแล้วกลับไปยังอดีตจริงๆ งั้นเหรอ?"
51130-36 = "ไม่หรอก ไม่มีทาง ไม่มีทางเป็นอย่างนั้นแน่นอน"
51130-37 = "ที่เธอเข้ามาในเฮียกกะเรียวรันตั้งแต่แรก ก็เพราะจะเข้ามาเล่นสนุกตามแบบของคุณหนูตระกูล#nคาเดโนะโคจิล่ะสิ?"
51130-41 = "[ns1] \"คิเคียว มันไม่ใช่อย่างนั้นหรอกนะ\"\n[ns2] \"ยูคาริพยายามจริงๆ นะ ขนาดเมื่อวานยัง...\""
51130-44 = "ครูจากชาเล่ต์ ฉันขอถามอะไรสักอย่างนะ"
51130-45 = "คุณหนูที่ยืนอยู่ตรงนั้นขอความช่วยเหลือหลังจากสารภาพทุกอย่างกับคุณหรือเปล่า?"
51130-46 = "เธอบอกคุณหรือเปล่าว่าตัวเองเป็นคนจากตระกูลคาเดโนะโคจิ และมีงานที่ต้องทำต่างหาก"
51130-47 = "เธอบอกคุณหรือเปล่าว่าตัวเองละทิ้ง <หน้าที่> นั้นเพื่อตอบสนองความปรารถนาของตนเองและผูกมัด#nตัวเองด้วยกิจกรรมของเฮียกกะเรียวรัน"
51130-48 = "เธอเคยบอกความจริงใจแบบนั้นสักครั้งไหมล่ะ?"
51130-54 = "ไม่มีทางหรอก ยังไงก็ไม่มีทาง"
51130-55 = "สำหรับเด็กคนนั้นแล้ว ทุกอย่างมันก็แค่เรื่องเล่นสนุก"
51130-56 = "เธอน่ะ ต่อให้ไม่ใช่เฮียกกะเรียวรันก็มีที่อื่นให้ไป"
51130-57 = "เธอต่างกับพวกเราตั้งแต่แรกแล้ว"
51130-58 = "คนอย่างเธอจะมาเปิด <ศึกชิงตำแหน่ง> ที่เป็นไปไม่ได้แบบนั้น ฉันขอบอกตามตรงเลยนะ"
51130-62 = "... มันน่าสะอิดสะเอียนจริงๆ"
51130-63 = "เลิกเล่นสนุกเหมือนลูกคุณหนูได้แล้ว ถึงเวลาที่ต้องตื่นจากฝันได้แล้วละ"
51130-64 = "......"
51130-66 = "ตอนนี้เธอยอมรับมันเสียเถอะ"
51130-67 = "หมดเวลาเล่นสนุกกับเฮียกกะเรียวรันแล้ว"
51130-68 = "รุ่นพี่คิเคียว... คิดกับข้า... อย่างนั้น... ตั้งแต่แรกเลยเหรอ..."
51130-69 = "ใช่ ฉันรำคาญเธอมาตั้งแต่ตอนม.ต้นแล้ว"
51130-70 = "เธอไม่รู้อยู่คนเดียวสินะ"
51130-76 = "ที่บอกว่า..."
51130-80 = "ข้าไม่มีทางเอาชนะรุ่นพี่นางุสะได้ตั้งแต่แรก..."
51130-81 = "ถึงจะเปิด <ศึกชิงตำแหน่ง> แต่ก็ไม่มีความเป็นไปได้ที่จะเอาชนะได้เลย..."
51130-82 = "เรื่องนั้นข้าก็รู้อยู่ตั้งแต่แรกแล้วเจ้าค่ะ"
51130-83 = "......"
51130-84 = "[s] \"ยูคาริ...\""
51130-88 = "ข้าก็แค่... อยากกลับไปก็เท่านั้น..."
51130-91 = "ขอให้ท่านหัวหน้าชมรมหยินหยางช่วยเป็นพยานใน <ศึกชิงตำแหน่งของเฮียกกะเรียวรัน> ของข้าด้วย#nเจ้าค่ะ!"
51130-93 = "ข้าก็แค่เชื่อว่าหากเปิดศึกชิงตำแหน่งได้..."
51130-94 = "และถ้าโค่นรุ่นพี่นางุสะ... และขึ้นไปอยู่ในจุดของหัวหน้าได้..."
51130-98 = "ก็จะ... กลับไปตอนนั้นได้..."
51130-100 = "กลับไปยังตอนนั้น... ที่ทุกคนได้อยู่ด้วยกัน..."
51130-101 = "แต่ว่า... ทั้งรุ่นพี่เรนเกะ รุ่นพี่คิเคียว... และคนอื่น..."
51130-102 = "ต่างก็เอาแต่บอกว่าเฮียกกะเรียวรันมันจบไปแล้ว... และกลับไปเป็นเหมือนเดิมอีกไม่ได้..."
51130-103 = "ข้าก็แค่! อยากกลับไปตอนที่ทุกคนอยู่ด้วยกันก็เท่านั้น...!"
51130-104 = "...อึก!"
51130-109 = "ท่านอาจารย์... ข้าขออภัย..."
51130-110 = "ที่ทำให้ต้องลำบากนะเจ้าคะ"
51130-115 = "[ns] \"เดี๋ยวก่อน! ยูคาริ...!\""
51130-117 = "เอาตัวเองมาผูกมัดโดยไร้ประโยชน์ จะทำอะไรไร้สาระแบบนั้นไปทำไม"
51130-118 = "ทุกอย่างถูกตัดสินไปตั้งแต่วินาทีที่รุ่นพี่นางุสะเอา <สิทธิ์> ของเฮียกกะเรียวรันมาคืนแล้ว"
51130-119 = "ข่าวลือจากพวกสมาชิก... เริ่มแพร่สะพัดออกไปตั้งแต่ตอนนั้นแล้ว"
51130-120 = "นั่นแหละคือตอนจบของเฮียกกะเรียวรัน ทุกอย่างมันจบไปแล้ว"
51130-121 = "ถ้าอยากจะทำอะไร ก็ต้องเคลื่อนไหวก่อนหน้านั้นสิ"
51130-122 = "เพื่อเด็กคนนั้นที่เคารพรุ่นพี่นางุสะมากกว่าใคร..."
51130-123 = "ถ้าจะทำเพื่อเด็กคนนั้นที่ยังมีที่ให้กลับไปละก็"
51130-124 = "นี่คือ... คำตอบที่ถูกต้องแล้ว"
51130-125 = "สิ่งที่แตกสลายและพังทลายจนไม่เหลือรูปแบบเดิมแล้วไม่มีทางกลับไปเป็นเหมือนเดิมได้หรอก"
51130-126 = "คนที่จะยังเหลืออยู่ในที่แบบนี้น่ะ แค่ฉันคนเดียว... ก็พอแล้ว"
51130-128 = "[ns] \"ไม่หรอก คิดผิดแล้วละ\""
51130-132 = "...ว่าไงนะ?"
51130-133 = "[s] \"นั่นไม่ใช่ปัญหาที่จะให้คนอื่นมาตัดสินใจนะ\""
51130-135 = "[ns] \"ยูคาริชอบเฮียกกะเรียวรันมากเลยสินะ\""
51130-136 = "เจ้าค่ะ!"
51130-137 = "ต้องบอกว่า..."
51130-138 = "เฮียกกะเรียวรัน... เป็นสิ่งเดียวที่ข้าใฝ่ฝันมาตลอด"
51130-140 = "[ns] \"การที่อยากอยู่ที่นี่หรือไม่น่ะ เป็นสิ่งที่ยูคาริต้องตัดสินใจเอง\""
51130-141 = "คนนอกอย่างคุณจะไปรู้อะไร..."
51130-146 = "ที่ฉันพูดแบบนี้ อาจจะดูเกินตัวไปหน่อย แต่ว่า..."
51130-147 = "หัวหน้าชมรมเทศกาลก็ด้วยเหรอ...?"
51130-148 = "ที่ที่ตัวเองจะอยู่... ที่ที่ตัวเองอยากจะอยู่..."
51130-153 = "ฉันคิดว่าเป็นสิ่งที่ตัวเองต้องกำหนดเองค่ะ ไม่ใช่ให้คนอื่นมากำหนด"
51130-159 = "เพราะงั้น การบีบบังคับด้วยเหตุผลว่าเป็นการทำเพื่อคนอื่น..."
51130-160 = "ฉันว่าไม่ควรทำแบบนั้นค่ะ"
51130-166 = "[ns] \"ยูคาริรู้ตั้งแต่แรกแล้วว่าตัวเองเอาชนะในศึกชิงตำแหน่งไม่ได้\""
51130-168 = "[ns] \"ศึกชิงตำแหน่งอาจเป็นเพียงสิ่งที่ทำให้เธอได้เจอทุกคนก็ได้\""
51130-169 = "...ต่อให้จะมาพูดอะไรแบบนั้นเอาป่านนี้"
51130-170 = "ก็ไม่มี... อะไรเปลี่ยนแปลงหรอก..."
51130-171 = "ฉันก็แค่... พูดในสิ่งที่คิดว่าถูกต้อง..."
51130-172 = "[s] \"อีกอย่างนะคิเคียว เรื่องเล่นสนุกน่ะ ยูคาริไม่เคยคิดอะไรแบบนั้นนะ?\""
51130-176 = "[ns3] \"ต่อให้พูดเพื่อคนอื่นก็ตาม แต่ถ้ามันไม่ใช่คำพูดที่ออกมาจากใจ\"\n[ns4] \"สิ่งที่เธอพูดมันมีแต่จะสร้างบาดแผลให้กันและกัน\""
51130-179 = "......!!"
51130-180 = "นะ... นี่ไม่ใช่เวลามาทำอะไรแบบนี้ ก่อนอื่นเรา...!"
51130-181 = "ไปตามหาคุณหนูคาเดโนะโคจิ... ไม่สิ ไปตามหายูคาริกันก่อนเถอะค่ะ!"
51130-182 = "[s] \"อื้ม ไปกันเถอะ ชิซุโกะ\""
51130-200 = "นี่ทุกคน... จะให้ฉันทำยังไง"
51130-205 = "....."
51130-206 = "คนที่พวกเราต้องการ... มีเพียงคนเดียวเท่านั้น"
51130-207 = "รุ่นพี่นางุสะ... คนเดียวเท่านั้น..."
51130-211 = "......"
51130-224 = "...เรนเกะ นี่ฉันเอง"
51130-227 = "โดนเฮียกกะเรียวรันเล่นงานทั้งวันเลย!"
51130-228 = "ทำไมต้องมาอยู่ในสภาพนี้ด้วยเนี่ย ยังไม่ได้สนุกกับเทศกาลเลยด้วยซ้ำ!"
51130-233 = "เอ่อ หัวหน้า... เราพอกันแค่นี้เถอะ"
51130-234 = "ใช่ค่ะ หัวหน้า ลืมเรื่องที่เกิดขึ้นให้หมด แล้วคืนนี้มาสนุกกับงานเทศกาล..."
51130-235 = "ใช่ๆ! อีกไม่นานก็จะเริ่มงานเทศกาลแล้วนะ!"
51130-237 = "อืม แบบนั้นน่าจะดีกว่าไหมนะ? ใช่มั้ย?"
51130-238 = "\"การที่เอาแต่มองต้นไม้ที่ปีนไม่ได้เป็นการกระทำที่โง่เขลา\" เหมือนมีใครบางคนที่ยอดเยี่ยมในอดีต#nพูดอะไรคล้ายๆ แบบนี้ไว้เลย"
51130-243 = "(ใครพูดอะไรแบบนั้นเหรอ?)"
51130-245 = "ฮึ่ม แต่ถึงอย่างนั้นก็เถอะ!"
51130-246 = "ลืมไปแล้วเหรอว่าเราเป็นใคร! เราเป็นปีศาจที่ทำให้เด็กที่ร้องไห้กลับมายิ้มได้อีกครั้งนะ!"
51130-251 = "(ไม่ได้พูดผิดใช่มั้ย...)"
51130-253 = "เราจะยอมแพ้กันง่ายๆ แบบนี้เหรอ?!"
51130-254 = "ยิ่งเวลาแบบนี้ ฉันยิ่งต้องแสดงความเป็นหัวหน้าที่ไม่ล้มเลิกอะไรง่ายๆ สิ ถึงจะเป็นตัวอย่างที่ดี...!"
51130-255 = "ไม่มีใครคาดหวังอะไรแบบนั้นจากหัวหน้าหรอกนะ..."
51130-259 = "ว่าไงนะ?!"
51130-263 = "ตรงกันข้ามเลยต่างหาก~~!"
51130-264 = "อึ้ก! แต่ถ้าไม่ได้แก้แค้น ฉันจะนอนไม่หลับนะ!"
51130-269 = "...งั้นเหรอคะ? แบบนั้นก็ลำบากเลยนะคะ ลำบากของจริงเลยละ"
51130-270 = "ต้องอยู่กับความรู้สึกที่น่าเศร้าแบบนั้นท่ามกลางงานเทศกาลที่ทุกคนควรจะมาสนุกด้วยกัน น่าเสียใจจังค่ะที่คุณสนุกกับงานเทศกาลได้ไม่เต็มที่"
51130-271 = "ใช่แล้วค่ะ ไม่ควรเกิดเรื่องแบบนี้เลย"
51130-276 = "คะ... ใครน่ะ?"
51130-282 = "งั้นให้ฉันช่วยไหมคะ? ไม่อยากได้มือน้องแมวไปช่วยสักหน่อยเหรอคะ?"
51130-283 = "ฮุฮุฮุ... ถึงฉันจะไม่ใช่แมว แต่ก็..."
51130-288 = "...ให้ฉันช่วยเอาไหมล่ะคะ?"
51130-290 = "ตอนต่อไป;เด็กสาวที่เอาจริง"

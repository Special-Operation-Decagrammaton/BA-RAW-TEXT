[translation]
51130-1 = "第13話;桐生桔梗，以及繼承戰（２）"
51130-8 = "哈啊……哈啊……"
51130-9 = "[s]「紫！你還好嗎！？」"
51130-10 = "小，小女子……沒事……"
51130-11 = "會，會不會太過份了！？"
51130-12 = "有必要做到這種程度嗎……"
51130-17 = "這就是百花繚亂的繼承戰。"
51130-18 = "現在明白了吧？這就是現實。"
51130-19 = "就算我同意擔任「繼承戰」的保證人，你也贏不了名草前輩。"
51130-20 = "你那天馬行空的想法，打從一開始就不切實際。"
51130-22 = "我……"
51130-23 = "……我只是……想回到那個時候……"
51130-24 = "回到大家一起以百花繚亂的身分活動的那個時候……"
51130-26 = "想回去？"
51130-27 = "別笑死人了。"
51130-28 = "你雖然說要打倒名草前輩，登上委員長之位……"
51130-29 = "實際上卻連我都贏不了，只是在做著遙不可及的白日夢罷了。"
51130-30 = "那種幼稚的決心是什麼？#n像小孩在耍賴的那番話又是什麼？"
51130-31 = "你真的想打倒名草前輩，讓一切恢復原狀嗎？"
51130-36 = "不，那是不可能的。當然不可能。"
51130-37 = "何況你當初之所以加入百花繚亂，不也是當作勘解由小路家小姐的消遣而已嗎？"
51130-41 = "[ns1]「桔梗，不是那樣的。」\n[ns2]「紫一直到昨天都真的很努力……」"
51130-44 = "夏萊的老師，我問你一件事。"
51130-45 = "那位小姐把一切都告訴了你，並且要求你幫忙對吧？"
51130-46 = "明明自己是勘解由小路家族的人，有其他該做的事……"
51130-47 = "卻為了一己私慾而拋下應盡的「義務」，投入百花繚亂的活動。"
51130-48 = "他有把這些真相告訴過你嗎？"
51130-54 = "當然不可能。"
51130-55 = "因為對他來說，這全部都是遊戲而已。"
51130-56 = "就算百花繚亂消失，他也有其他可以回去的地方。"
51130-57 = "打從一開始就和我們不一樣。"
51130-58 = "這樣的人居然把「繼承戰」掛在嘴邊……"
51130-62 = "……老實說，簡直讓我感到噁心。"
51130-63 = "小姐的遊戲該到此為止了吧？#n是不是該從夢裡醒來了？"
51130-64 = "……"
51130-66 = "現在你該承認了。"
51130-67 = "名為百花繚亂的遊戲到此為止。"
51130-68 = "……桔梗前輩從一開始……就覺得小女子……"
51130-69 = "沒錯，你從國中的時候就很煩，真是有夠討厭。"
51130-70 = "原來只有你自己不知道啊。"
51130-76 = "從一開始……"
51130-80 = "……我從一開始，就知道自己打不贏名草前輩………"
51130-81 = "就算進行「繼承戰」，我也不可能贏……"
51130-82 = "我從一開始就知道了。"
51130-83 = "…………"
51130-84 = "[s]「紫……」"
51130-88 = "我只是……想回到那時候而已……"
51130-91 = "請陰陽部部長務必擔任「百花繚亂繼承戰」的證人！"
51130-93 = "只要能進行繼承戰……"
51130-94 = "只要能打敗名草前輩……登上委員長之位……"
51130-98 = "就能……回到那個時候……"
51130-100 = "回到和大家在一起的那個時候……我一直這麼相信著……"
51130-101 = "但是……蓮華前輩和桔梗前輩……都說……"
51130-102 = "百花繚亂已經結束……再也回不去了……"
51130-103 = "小女子只是！想回到大家在一起的那個時候……！"
51130-104 = "……！"
51130-109 = "造成您的麻煩……真的……"
51130-110 = "真的很抱歉，老師。"
51130-115 = "[ns]「等等！紫……！」"
51130-117 = "白白讓自己受到束縛……到底為什麼要做這種沒意義的事呢？"
51130-118 = "從名草前輩歸還百花繚亂「象徵」的那一刻起，一切就已經成定局了。"
51130-119 = "從那時候開始，傳聞就已經在成員之間……傳開了。"
51130-120 = "百花繚亂已經結束了，全部都結束了。"
51130-121 = "既然如此就必須在那之前採取行動。"
51130-122 = "為了比誰都憧憬名草前輩的那孩子……"
51130-123 = "為了還有地方可以回去的那孩子……"
51130-124 = "這……才是唯一且正確的答案。"
51130-125 = "曾一度毀壞不堪的事物，是不可能再恢復原樣的。"
51130-126 = "留在這種地方的人……有我就夠了。"
51130-128 = "[ns]「不，我不這麼認為。」"
51130-132 = "……什麼？"
51130-133 = "[s]「那不是該由其他人決定的事。」"
51130-135 = "[ns]「紫真的很喜歡百花繚亂呢。」"
51130-136 = "是！"
51130-137 = "我可以肯定……"
51130-138 = "百花繚亂……就是我一心嚮往的存在。"
51130-140 = "[ns]「想不想留在這裡，應該由紫來決定才對。」"
51130-141 = "不過是個局外人的你，又知道什麼了……"
51130-146 = "那個……雖然我這麼說可能有點冒昧……"
51130-147 = "連節慶營運管理部的部長也……？"
51130-148 = "自己該待的地方……自己想待的地方……"
51130-153 = "我認為決定這件事的人不是別人，而是自己。"
51130-159 = "以為了別人好的理由，強迫他人接受自己的想法……"
51130-160 = "我認為是不對的。"
51130-166 = "[ns]「紫從一開始就知道打贏繼承戰是不可能的。」"
51130-168 = "[ns]「繼承戰會不會只是為了和你們見面的理由呢？」"
51130-169 = "事到如今才說這些……"
51130-170 = "也不會……有任何改變……"
51130-171 = "我只是……說出自己認為正確的話而已……"
51130-172 = "[s]「而且桔梗，其實你從來不認為這裡對紫而言只是場遊戲，不是嗎？」"
51130-176 = "[ns3]「以為別人好的理由說出違心之論……」\n[ns4]「只會傷害彼此而已。」"
51130-179 = "……！！"
51130-180 = "那，那個……現在不是說這些的時候了！"
51130-181 = "我們趕緊去找勘解由小路……不，去找紫吧！"
51130-182 = "[s]「嗯，我們走吧，靜子。」"
51130-200 = "……大家……到底要我怎麼做才好。"
51130-205 = "…………"
51130-206 = "我們需要的……"
51130-207 = "明明……就是名草前輩你啊……"
51130-211 = "…………"
51130-224 = "……蓮華，是我。"
51130-227 = "整天都被百花繚亂欺負！"
51130-228 = "在參加慶典之前就被搞得這麼狼狽！"
51130-233 = "隊長，我們還是放棄吧。"
51130-234 = "是啊隊長，我們就忘掉一切，好好享受今晚的慶典嘛……"
51130-235 = "沒錯沒錯！現在離慶典開始沒剩多久了！"
51130-237 = "嗯～果然還是那樣比較好吧？對吧？"
51130-238 = "「只盯著爬不上去的樹看是很愚蠢的」……以前好像有個厲害的人說過類似的話。"
51130-243 = "（那句話是誰說的？）"
51130-245 = "但是！"
51130-246 = "我們可是能讓哭泣的孩子笑起來的妖怪劇團！"
51130-251 = "（那只是因為被看不起而已吧……）"
51130-253 = "怎麼能這麼容易就放棄呢！？"
51130-254 = "身為隊長就必須表現出堅忍不拔的樣子，這樣才能當大家的模範……！"
51130-255 = "沒有人對隊長抱有那種期待……"
51130-259 = "什麼！？"
51130-263 = "我反對～～！"
51130-264 = "哎！總之如果不報一箭之仇，我會鬱悶得無法入睡！"
51130-269 = "……是嗎？那真是傷腦筋呢。"
51130-270 = "大家難得能夠享受慶典，卻因為那種悲傷的心情而無法盡興。"
51130-271 = "嗯，果然不該這樣。"
51130-276 = "……是，是誰？"
51130-282 = "需要我幫忙嗎？#n你們連貓的手都想借來對吧？"
51130-283 = "呵呵……雖然我並不是貓。"
51130-288 = "──────貓的手，要不要借給你們呀？"
51130-290 = "下一話;下定決心的少女"

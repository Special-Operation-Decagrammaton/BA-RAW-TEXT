[translation]
10026090-1 = "第9話;島嶼最深處"
10026090-3 = "哈啊，哈啊……哈啊……"
10026090-4 = "我……我不行了……累死我了……哈啊……"
10026090-5 = "到這裡……應該沒問題了。#n它們應該不會再追過來了。"
10026090-6 = "大家都還好嗎？"
10026090-10 = "真的是……哈啊……哈啊……這到底……"
10026090-11 = "[s1]「幸好大家都沒事。」\n[s2]「所幸大家都沒什麼大礙。」"
10026090-14 = "哈啊，哈啊……哈啊……這到底……是怎樣……哈啊……"
10026090-15 = "為什麼我……不，為什麼我們……要為了這種事碰上這麼多麻煩……"
10026090-16 = "哈啊……哈啊……"
10026090-17 = "嗯……？#n什麼意思……？"
10026090-18 = "……啊啊，你是指我剛才說的「這種事」嗎？#n唔……那個……就是字面上的意思啊……"
10026090-19 = "話說回來，憂同學，我們在瀑布裡看到的那個……"
10026090-20 = "啊啊，對了，我還沒跟你們說明。#n那個……嗯……"
10026090-21 = "其實……這座島……這座設施……"
10026090-23 = "還有我們新找到的地點，全部都是……"
10026090-29 = "……！？#n什，什麼聲音！？又是複製嗎……！？"
10026090-30 = "不，不……只是地面塌下去了而已……非常抱歉……"
10026090-31 = "[s3]「……日向！？」\n[s4]「你沒事吧？有沒有哪裡受傷？」"
10026090-35 = "沒，沒有，我沒事……謝謝老師的關心。#n哈哈……沒想到我站的地方竟然會突然塌陷……"
10026090-36 = "真是嚇了我一跳呢。#n這會不會是刻意挖的洞呢……？為什麼會在這種地方……"
10026090-37 = "嗯？咦？感覺……這裡好像……"
10026090-41 = "這是……箱子？"
10026090-42 = "而且還是十分老舊的箱子……#n這也是本來就在這裡的東西嗎？"
10026090-43 = "看來這個坑洞就是為了埋箱子而特地挖出來的。"
10026090-44 = "……！！"
10026090-45 = "這裡面……"
10026090-46 = "等，等等，日向同學！快停下來……！"
10026090-48 = "從之前的情況看來……要是現在碰了那個東西……！！"
10026090-49 = "……嗯？碰了的話……？"
10026090-59 = "[ns]「……」"
10026090-60 = "唔……畢竟一直是相同的模式。"
10026090-61 = "咦……不過這次……感覺起來好像跟之前不太一樣……？"
10026090-62 = "怎，怎麼回事……！？#n不覺得數量比之前多了很多嗎……！？"
10026090-63 = "而且那個……之前應該沒出現過吧……！？#n這樣沒問題嗎！？"
10026090-64 = "看來這個箱子……應該是很重要的東西吧？#n說不定我們這次真的找到了正確答案。"
10026090-65 = "看到這種情況還笑得出來！？"
10026090-66 = "呵呵，看來只能之後再解釋了呢。#n老師……"
10026090-68 = "……那就萬事拜託囉♡"

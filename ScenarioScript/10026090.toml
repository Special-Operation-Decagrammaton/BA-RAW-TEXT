[translation]
10026090-1 = "ตอนที่ 9;ส่วนลึกที่สุดของเกาะ"
10026090-3 = "แฮ่ก... แฮ่ก... แฮ่ก..."
10026090-4 = "แฮ่ก... เหนื่อยจะตายอยู่แล้ว... แฮ่ก..."
10026090-5 = "ถ้าหนีออกมาได้ประมาณนี้ก็น่าจะปลอดภัยแล้วละ ไม่น่าจะไล่ตามมาอีกแล้วค่ะ"
10026090-6 = "คุณอุยบาดเจ็บตรงไหนหรือเปล่าคะ?"
10026090-10 = "ให้ตายสิ... แฮ่ก... แฮ่กๆ... นี่มันอะไรกัน..."
10026090-11 = "[s1] \"ทุกคนปลอดภัยดีเนอะ\"\n[s2] \"โล่งอกไปทีนะที่ทุกคนไม่เป็นอะไร\""
10026090-14 = "แฮ่ก... แฮ่ก... แฮ่ก... นี่มัน... เรื่องอะไรกัน... เฮือกกก..."
10026090-15 = "ทำไมฉัน... ไม่สิ ทำไมพวกเราถึง... ต้องมาเจอเรื่องแบบนี้... เพราะอะไรแค่นี้ด้วย..."
10026090-16 = "แฮ่ก... แฮ่ก..."
10026090-17 = "คะ...? หมายความว่ายังไงงั้นเหรอคะ? อะไร..."
10026090-18 = "...อ๋อ ที่ฉันบอกว่า 'อะไรแค่นี้' น่ะเหรอคะ? อืม... ก็... ก็ตามที่พูดเลย..."
10026090-19 = "จะว่าไปแล้วคุณอุยคะ สิ่งที่พวกเราเห็นในน้ำตก..."
10026090-20 = "อะ... อ่า... ค่ะ จะว่าไป ฉันยังไม่มีเวลาได้อธิบายเลยนะคะ เรื่องนั้นน่ะ... อืม..."
10026090-21 = "ที่จริงแล้ว... เกาะแห่งนี้... ที่แห่งนี้..."
10026090-23 = "รวมถึงจุดที่ปรากฏใหม่ในแผนที่... ทุกอย่างมัน..."
10026090-29 = "......!?  สะ... เสียงอะไรน่ะ!?  มิเมซิสอีกแล้วเหรอคะ??"
10026090-30 = "มะ... ไม่ใช่ค่ะ... แค่พื้นมันยุบลงไป... ขอโทษด้วยค่ะ..."
10026090-31 = "[s3] \"...ฮินาตะ!?\"\n[s4] \"เป็นยังไงบ้าง? บาดเจ็บตรงไหนหรือเปล่า?\""
10026090-35 = "ฉันไม่เป็นอะไรค่ะ... ขอบคุณที่เอาใจใส่นะคะ แหะๆ... จู่ๆ พื้นตรงที่ยืนอยู่มันก็ยุบลงไป..."
10026090-36 = "ฉันก็เลยตกใจน่ะค่ะ หรือจะเป็นหลุมที่ใครตั้งใจขุดเอาไว้คะ...? แล้วทำไมถึงมีหลุมในที่แบบนี้..."
10026090-37 = "หืม? เอ๋? ตรงนี้ก็ด้วย... เหมือนมีบางอย่าง..."
10026090-41 = "...นี่มัน... กล่องเหรอ?"
10026090-42 = "ดูเป็นกล่องที่เก่าแก่มากเลย... นี่ก็เป็นโบราณวัตถุที่อยู่ที่นี่เหรอคะ?"
10026090-43 = "งั้นหลุมพวกนี้ก็คงขุดไว้เพื่อฝังกล่องสินะคะ"
10026090-44 = "......!!"
10026090-45 = "ข้างในมี..."
10026090-46 = "ดะ... เดี๋ยวค่ะ คุณฮินาตะ! หยุดนะคะ...!"
10026090-48 = "จากหลายๆ เรื่องที่มันเกิดขึ้นมาจนถึงตอนนี้แล้ว... ถ้าไปแตะต้องสิ่งนั้นละก็ มันจะต้อง...!!"
10026090-49 = "...คะ? ถ้าไปแตะต้อง...?"
10026090-59 = "[ns] \"...อะฮ่า\""
10026090-60 = "อืม... ก็ที่ผ่านมามันมีรูปแบบเดียวกันมาตลอดนี่คะ"
10026090-61 = "เอ๋... แต่ว่า... ทำไมรู้สึกเหมือนมันต่างออกไปจากก่อนหน้านี้เลย...?"
10026090-62 = "อะ... อะไรเนี่ย...!? เหมือนจะออกมาเยอะมากกว่าก่อนหน้านี้อีกนะ...!!"
10026090-63 = "แถมคนนั้นยัง... ไม่เคยเห็นมาก่อนเลย...!!  แบบนี้เราจะไหวมั้ยเนี่ย!!"
10026090-64 = "ดูเหมือนว่ากล่องนี้... จะเป็นของสำคัญมากเลยละค่ะ ฉันว่าเราน่าจะได้คำตอบกันแล้วนะคะ"
10026090-65 = "มันใช่เวลามายิ้มหน้าระรื่นอยู่รึไงเล่า!?"
10026090-66 = "ฮุฮุ ไว้ฉันจะมาอธิบายทีหลังนะคะ คุณครู..."
10026090-68 = "...ถ้างั้นก็ รบกวนด้วยนะคะ♡"

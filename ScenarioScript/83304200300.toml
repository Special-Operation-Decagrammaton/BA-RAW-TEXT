[translation]
83304200300-6 = "啊，委員長。您辛苦了。"
83304200300-7 = "嗯，亞子也辛苦了。#n在舉辦派對之前，我想先確認一下反恐訓練的內容……"
83304200300-8 = "「堅決反對戰鬥」……「一切都是為了格黑娜的和平」……"
83304200300-13 = "「一起停止鬥爭吧」by羽沼真琴……？"
83304200300-14 = "這又是……什麼東西？"
83304200300-15 = "……看來又和平常一樣在策畫可疑的事情呢。"
83304200300-16 = "不只是這裡而已，格黑娜學園各個地方好像都有類似的傳單。#n真不知道他又在策畫些什麼。"
83304200300-17 = "不管他們在想什麼，我們要做的事都不會變。"
83304200300-18 = "亞子，開始準備訓練吧。"
83304200300-19 = "知道其他成員的位置嗎？"
83304200300-20 = "啊，伊織應該正在教室待命。要出發了嗎？"
83304200300-21 = "走吧。"

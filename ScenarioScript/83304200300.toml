[translation]
83304200300-6 = "ท่านประธาน ขอบคุณที่พยายามนะคะ"
83304200300-7 = "อื้ม อาโกะเองก็ด้วย ฉันมาตรวจสอบรายละเอียดการฝึกการต่อต้านการก่อการร้ายน่ะ..."
83304200300-8 = "<ขอต่อต้านการต่อสู้>... <เพื่อสันติภาพของเกเฮนน่า>..."
83304200300-13 = "<เรามาหยุดการต่อสู้กันเถอะ> by ฮานุมะ มาโคโตะ...?"
83304200300-14 = "นี่มัน... อะไรกัน?"
83304200300-15 = "ดูเหมือนว่ากำลังวางแผนทำเรื่องไม่ชอบมาพากลอย่างเคยนะคะ"
83304200300-16 = "ไม่ใช่แค่ที่นี่นะคะ ดูเหมือนว่าจะมีใบปลิวคล้ายๆ กันกระจายอยู่ทั่วสถาบันเกเฮนน่าเลยค่ะ ไม่รู้จริงๆ ว่าวางแผนอะไรอยู่"
83304200300-17 = "ไม่ว่าพวกนั้นจะวางแผนทำอะไร ก็ต้องอย่าให้กระทบสิ่งที่เราจะทำ"
83304200300-18 = "อาโกะ เริ่มเตรียมการฝึกกันเถอะ"
83304200300-19 = "รู้ไหมว่าสมาชิกคนอื่นอยู่ที่ไหนกัน?"
83304200300-20 = "อ้อ ถ้าเป็นเรื่องนั้นละก็ ตอนนี้อิโอริกำลังรออยู่ในห้องเรียนค่ะ เราไปกันเลยมั้ยคะ?"
83304200300-21 = "อื้อ"

10003020-1 = "#title;제2화;계획을 세우면 언제나 어그러지는 법"
10003020-2 = "#wait;2500"
10003020-3 = "#na;히나;응, 들어와."
10003020-4 = "3;히나 수영복ND;01\n#3;black\n#all;hide"
10003020-5 = "#place;히나의 방"
10003020-6 = "3;히나 수영복ND;01\n#3;a\n#wait;2500"
10003020-7 = "3;히나 수영복ND;02;아아, 선생님이었구나. \n#3;em;[반응]"
10003020-8 = "[s] \"……헉, 히나의 옷이 바뀌었다?!\""
10003020-9 = "3;히나 수영복ND;04;가, 갑자기 왜 호들갑이야? 깜짝 놀랐잖아…….\n#3;stiff"
10003020-10 = "3;히나 수영복ND;02;아, 이거? 수영복……인데? 일단은 바다에 왔으니까…….\n#3;em;[?]"
10003020-11 = "3;히나 수영복ND;10;물론 이거 말고, 아코가 기왕 바다에 온 만큼, 새롭게 입어야 한다며 따로 준비해준 수영복도 있긴 했지만. 그건 반품시켰어."
10003020-12 = "[s] \"반품은 왜?\""
10003020-13 = "3;히나 수영복ND;01;그야 지금 입고 있는 수영복으로 충분하니까."
10003020-14 = "3;히나 수영복ND;02;예전에 입던 수영복이라고 해도, 다시 입을 수 있다면 따로 불필요한 지출을 할 필요는 없잖아?\n#3;em;…"
10003020-15 = "3;히나 수영복ND;01;가지고 있던 걸 재활용하는 쪽이, 더 효율적이고."
10003020-16 = "[s1] \"하지만 이름표를 보면…….\"\n[s2] \"그거 초등학교때 입던 거 아닌가요?\""
10003020-17 = "3;히나 수영복ND;02;어디, 문제라도 있어? 초등학생 때 입던 거라고 해도 사이즈만 맞다면…….\n#3;em;[?]"
10003020-18 = "3;히나 수영복ND;02;어디, 문제라도 있어? 초등학생 때 입던 거라고 해도 사이즈만 맞다면…….\n#3;em;[?]"
10003020-19 = "3;히나 수영복ND;00;……혹시 이상해?"
10003020-20 = "[s3] \"히나는……\"\n[s4] \"아직도 초등학생…….\""
10003020-21 = "3;히나 수영복ND;07;무, 무슨 소리를 하는 거야?! 쓸데없는 소리를 할 거면 그만둬……. 이 화제는 여기까지 하겠어!\n#3;em;[///]\n#3;stiff"
10003020-22 = "3;히나 수영복ND;07;무, 무슨 소리를 하는 거야?! 쓸데없는 소리를 할 거면 그만둬……. 이 화제는 여기까지 하겠어!\n#3;em;[///]\n#3;stiff"
10003020-23 = "#st;[0,0];instant;1;"
10003020-24 = "#clearST\n3;히나 수영복ND;99\n#3;em;…\n#wait;2500"
10003020-25 = "3;히나 수영복ND;02;그보다……. 바깥에 무슨 일이야? 아까부터 조금 소란스러운 거 같던데."
10003020-26 = "[s] \"별 건 아니야. 훈련 준비로 바쁜가 봐.\""
10003020-27 = "3;히나 수영복ND;01;……그래, 그렇다면 됐나."
10003020-28 = "[s] \"근데 히나는 뭘 하고 있었어?\""
10003020-29 = "3;히나 수영복ND;10;아아, ……대기 중이었어. 계획표에 적힌 내 일정은 '오후 구보 훈련 때까지 전력을 온전할 수 있도록 온 힘을 다해 전력으로 대기한다.' 라고 적혀 있길래."
10003020-30 = "3;히나 수영복ND;00;앞으로 4시간 동안은, 방안에 있어야겠지.\n#3;em;[땀]"
10003020-31 = "[s] \"아, 계획표에는 그렇게 쓰여 있었구나.\""
10003020-32 = "3;히나 수영복ND;99;뭐, 조금……. 이상하게 느껴지지 않는 것도 아니지만, 그래도 이번 훈련 계획의 지휘권은 전부 아코에게 맡겨 뒀으니까."
10003020-33 = "3;히나 수영복ND;01;행정관에게 전권을 맡겼다면, 그 뒤엔 순순히 따를 뿐이야."
10003020-34 = "3;히나 수영복ND;02;이제까지는……. 너무 내 맘대로만 해왔으니까.\n#3;em;…"
10003020-35 = "[s] \"신뢰하고 있다는 거네.\""
10003020-36 = "3;히나 수영복ND;03;응……. 맞아. 선도부 업무 전반을 관리해주는 것만으로도 제법 고생스러울 텐데.\n#3;em;[반응]"
10003020-37 = "3;히나 수영복ND;99;아코가 하겠다고 말해줬으니까. 맡기고 싶어. 입으로 직접 말하려니 이상한 느낌이 들지만. ……그래, 신뢰, 하고 있으니까."
10003020-38 = "3;히나 수영복ND;10;다만 대기명령이라고 해도……. 막상 이렇게 아무것도 안 한 채, 가만히 있기만 했던 적은 그다지 없다 보니까……."
10003020-39 = "3;히나 수영복ND;00;조금……. 살짝 뭘 해야 할지 모르겠달까…….\n#3;em;[땀]\n#3;stiff"
10003020-40 = "3;히나 수영복ND;01;그래서 말인데……. 선생님. 부탁, 이라고 할까. 혹시 시간적으로 괜찮다면……."
10003020-41 = "3;히나 수영복ND;02;그……. 내 말벗이 되어주지 않겠어?\n#3;em;…"
10003020-42 = "3;히나 수영복ND;99;아무래도 앞으로 4시간 동안, 대기만 하고 있기엔 조금 무료해서 말이야."
10003020-43 = "3;히나 수영복ND;01;아, 물론 선생님이 그럴 마음이나 생각이 없다면, 나로선 어쩔 수 없지만.\n#3;em;[반응]"
10003020-44 = "3;히나 수영복ND;00;선도부 훈련까지 따라오게 만든 것도 미안한데, 괜히 시간을 빼앗을 수는 없으니까."
10003020-45 = "[s] \"아니! 맡겨만 주세요! 히나의 말상대라면 얼마든지!\""
10003020-46 = "3;히나 수영복ND;03;……고마워.\n#3;em;[반짝]"

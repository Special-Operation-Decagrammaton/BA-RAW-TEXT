[translation]
10003020-1 = "Episode 2;Plans Are Destined to Go Awry"
10003020-3 = "Come in."
10003020-5 = "Hina's Room"
10003020-7 = "Oh, it's you, Sensei. "
10003020-8 = "[s] \"You're not in uniform, Hina?!\""
10003020-9 = "Wh-Why would I be? If anyone should be surprised, it's me."
10003020-10 = "We came to the beach to train, after all. Swimwear is appropriate for the occasion."
10003020-11 = "Ako had prepared me a different swimsuit for this trip, but I returned that one."
10003020-12 = "[s] \"Can I ask why?\""
10003020-13 = "Because the one I already own is more than enough."
10003020-14 = "What's the point of purchasing a new one if what you have is just fine?"
10003020-15 = "I was simply being practical."
10003020-16 = "[s1] \"But judging by that nametag...\"\n[s2] \"This is your elementary school swimsuit, isn't it?\""
10003020-17 = "Is there some kind of problem? What does it matter as long as it still fits."
10003020-18 = "Is there some kind of problem? What does it matter as long as it still fits."
10003020-19 = "Do you think that's weird?"
10003020-20 = "[s3] \"In other words, you haven't...\"\n[s4] \"Haven't grown since elementary, huh?\""
10003020-21 = "Wh-What does it matter to you?! If you're going to be rude about it, then this conversation is over."
10003020-22 = "Wh-What does it matter to you?! If you're going to be rude about it, then this conversation is over."
10003020-25 = "Anyway, what's going on outside? I heard what sounded like a commotion."
10003020-26 = "[s] \"Nothing important. I think they were just preparing for training.\""
10003020-27 = "...I see. Perhaps that is what I heard."
10003020-28 = "[s] \"What have you been up to, Hina?\""
10003020-29 = "Waiting, I suppose. My schedule has a note that says I'm to prepare for this afternoon's running training by waiting as patiently as I can."
10003020-30 = "That leaves me with nothing to do for four hours."
10003020-31 = "[s] \"That's an interesting schedule for sure.\""
10003020-32 = "It was Ako's decision. I gave her complete control of the planning for this trip."
10003020-33 = "I have no objections to following my senior administrator's decisions."
10003020-34 = "It's a change of pace from me deciding everything by myself."
10003020-35 = "[s] \"You must trust her.\""
10003020-36 = "Yes, I do. She's proven herself more than capable by handling so many tasks for the Prefect Team."
10003020-37 = "Ako told me she wanted the responsibility, so I left everything to her. It feels weird to say it aloud, but you're right. I do trust her."
10003020-38 = "It's just that I'm so used to being busy that I don't know what to do with myself upon being ordered to simply stand by."
10003020-39 = "I've never had to do anything like this before."
10003020-40 = "So, could you do me a favor if you have the time, Sensei?"
10003020-41 = "Would you...keep me company?"
10003020-42 = "Otherwise I would be bored out of my mind for four hours."
10003020-43 = "Of course, you don't have to if you don't want to."
10003020-44 = "I already feel guilty about dragging you into the Prefect Team's training. I don't want to take up any more of your time than you're willing to give."
10003020-45 = "[s] \"Are you kidding? I'd love to stay and chat!\""
10003020-46 = "Thanks."
10003020-49 = "Hmm? Is that your phone?"
10003020-53 = "[ns] \"Yes. I just changed it.\""
10003020-60 = "Sensei? Can you read me?"
10003020-61 = "Gah. Requesting emergency support, Sensei."
10003020-62 = "The situation on the beach is worse than we thought. We need your help, Sensei!"
10003020-63 = "Please give us your orders, but you must keep it from Hina!"
10003020-66 = "Sensei? Who was that?"
10003020-67 = "[s5] \"U-Ughhh! It was my doctor! They told me I'm sick!\"\n[s6] \"It was, uh...the toilet! It needs to see me right away!\""
10003020-68 = "W-Was it? Hmm."
10003020-69 = "W-Was it? Hmm."

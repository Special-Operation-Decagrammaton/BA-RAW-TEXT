[translation]
10003020-1 = "ตอนที่ 2;แผนที่ไม่เป็นไปตามแผน"
10003020-3 = "อื้อ เข้ามาสิ"
10003020-5 = "ห้องของฮินะ"
10003020-7 = "อ่า... คุณครูเองเหรอ "
10003020-8 = "[s] \"...เอ๋? ฮินะเปลี่ยนชุดงั้นเหรอ?!\""
10003020-9 = "ทะ...ทำไมต้องเสียงดังขนาดนั้นด้วย ตกใจหมดเลย..."
10003020-10 = "อ๋อ นี่เหรอ? ชุด...ว่ายน้ำ...ไง? ไหนๆ เราก็มาถึงทะเลแล้ว..."
10003020-11 = "อาโกะบอกว่ามาทะเลทั้งทีก็ควรจะเปลี่ยนชุดให้เหมาะสม แล้วก็เตรียมชุดว่ายน้ำเอาไว้ให้เยอะเลย#nแต่ว่าฉันคืนไปแล้วล่ะ"
10003020-12 = "[s] \"ทำไมถึงคืนไปล่ะ?\""
10003020-13 = "ก็ชุดว่ายน้ำที่มีอยู่ตอนนี้มันก็ใช้ได้อยู่แล้วไงล่ะ"
10003020-14 = "ถึงจะเป็นชุดเก่า แต่ถ้ามันยังใส่ได้อยู่ก็ไม่เห็นจะต้องเสียเงินซื้อใหม่เลยไม่ใช่รึไง?"
10003020-15 = "เอาของเก่าที่มีอยู่มาใช้ย่อมดีกว่าอยู่แล้ว"
10003020-16 = "[s1] \"แต่ว่าดูจากป้ายชื่อแล้ว...\"\n[s2] \"นั่นชุดว่ายน้ำของเด็กประถมไม่ใช่เหรอ?\""
10003020-17 = "มะ...มีปัญหาอะไรรึไง? ถึงจะเป็นชุดที่เคยใส่ตอนประถม แต่ก็ยังใส่ได้อยู่นะ..."
10003020-18 = "มะ...มีปัญหาอะไรรึไง? ถึงจะเป็นชุดที่เคยใส่ตอนประถม แต่ก็ยังใส่ได้อยู่นะ..."
10003020-19 = "คือ... มันแปลกเหรอ?"
10003020-20 = "[s3] \"ฮินะน่ะ...\"\n[s4] \"ไม่ได้โตขึ้นเลยสินะ...\""
10003020-21 = "พะ...พูดอะไรอย่างงั้นเล่า?! ถ้าจะมาพูดเรื่องไร้สาระก็พอได้แล้ว... เลิกคุยเรื่องนี้เถอะ!"
10003020-22 = "พะ...พูดอะไรอย่างงั้นเล่า?! ถ้าจะมาพูดเรื่องไร้สาระก็พอได้แล้ว... เลิกคุยเรื่องนี้เถอะ!"
10003020-25 = "ว่าแต่... ข้างนอกเกิดอะไรขึ้นเหรอ? เหมือนจะมีเสียงดังวุ่นวายตั้งแต่เมื่อกี้แล้ว"
10003020-26 = "[s] \"อ๋อ ไม่มีอะไรหรอก ทุกคนคงยุ่งเพราะเตรียมการฝึกน่ะ\""
10003020-27 = "งั้นหรอกเหรอ..."
10003020-28 = "[s] \"ว่าแต่ฮินะทำอะไรอยู่เหรอ?\""
10003020-29 = "อ๋อ... ฉันกำลังรออยู่น่ะ ตารางงานของฉันในกำหนดการฝึกคือ \"ให้เตรียมพร้อมสำหรับการฝึกวิ่ง#nช่วงบ่ายโดยการนั่งรออย่างอดทนให้สุดความสามารถ\" มันเขียนไว้แบบนี้น่ะ"
10003020-30 = "เพราะงั้นฉันก็จะนั่งรออยู่ในห้องไปอีก 4 ชั่วโมงไงล่ะ"
10003020-31 = "[s] \"อ่า... กำหนดการฝึกเขียนไว้แบบนี้นี่เอง\""
10003020-32 = "ก็นะ... ถึงฉันจะรู้สึกแปลกๆ อยู่นิดหน่อย แต่เพราะฉันให้สิทธิ์อาโกะในการวางแผนการฝึกครั้งนี้#nทั้งหมดไปแล้ว..."
10003020-33 = "และในเมื่อให้ทางเจ้าหน้าที่จัดการไปแล้ว ที่เหลือเราก็แค่ทำตามก็เท่านั้น..."
10003020-34 = "ที่ผ่านมา... ฉันวางแผนตามใจตัวเองมาตลอด..."
10003020-35 = "[s] \"ฮินะคงไว้ใจอาโกะมากๆ เลยสินะ\""
10003020-36 = "อือ... ใช่แล้ว แค่จัดการงานอื่นๆ จำนวนมากของคณะกรรมการวินัยก็คงจะยุ่งมากแล้วแท้ๆ..."
10003020-37 = "แต่ว่าอาโกะเป็นคนอาสาเองว่าจะทำ ฉันเลยอยากให้เธอลองทำดู พอพูดเองแล้วก็รู้สึกแปลก#nนิดหน่อยแฮะ... แต่ก็ใช่ เพราะฉัน... เชื่อใจอาโกะน่ะ"
10003020-38 = "แต่ว่าพอถูกสั่งให้รออยู่เฉยๆ โดยไม่ต้องทำอะไรแบบนี้ก็เลยรู้สึกแปลกนิดหน่อย...#nฉันไม่เคยอยู่เฉยๆ แบบนี้มาก่อนเลย..."
10003020-39 = "ตอนนี้ฉันก็เลย... ไม่รู้ว่าจะทำอะไรดีน่ะ..."
10003020-40 = "เพราะงั้นแล้ว... คุณครู จะเรียกว่า... ขอรบกวนหน่อยได้ไหมนะ? ถ้าคุณครูสะดวกล่ะก็..."
10003020-41 = "คือ... อยู่เป็นเพื่อนฉันหน่อยได้ไหม?"
10003020-42 = "ให้รออยู่ที่นี่คนเดียวตั้ง 4 ชั่วโมง มันเลยรู้สึกเบื่อๆ น่ะ"
10003020-43 = "อ่า แต่ถ้าคุณครูไม่อยากก็ไม่เป็นไรนะ"
10003020-44 = "แค่คุณครูต้องตามมาดูการฝึกของคณะกรรมการวินัยด้วย ฉันก็เกรงใจแล้ว#nฉันไม่อยากทำให้คุณครูเสียเวลาโดยเปล่าประโยชน์อีก..."
10003020-45 = "[s] \"ไม่เลย! ไว้ใจครูได้เลย ถ้าเพื่อฮินะแล้วครูว่างเสมอแหละ!\""
10003020-46 = "ขะ...ขอบคุณนะ"
10003020-49 = "หืม? นั่น... โทรศัพท์มือถือของคุณครูเหรอ?"
10003020-53 = "[ns] \"ใช่แล้ว ครูเพิ่งเปลี่ยนมือถือมาน่ะ\""
10003020-60 = "คุณครู? คุณครู?"
10003020-61 = "อึ่ก...!! ขอความช่วยเหลือด่วน คุณครู!"
10003020-62 = "ฉันไม่ได้อยากขอให้ช่วยหรอกนะ... แต่พวกตัวปัญหาที่ชายหาดพวกนี้น่ะ...#nมันเกินกำลังกว่าที่คิดไว้! ช่วยด้วย! คุณครู!"
10003020-63 = "มาช่วยพวกเราด้วย... แต่อย่าบอกให้ท่านประธานรู้เด็ดขาดนะ!"
10003020-66 = "คุณครู? เมื่อกี้นี้ใครติดต่อมา......"
10003020-67 = "[s5] \"เอ่อ... จู่ๆ ก็รู้สึกเหมือนข้าศึกบุกน่ะ!\"\n[s6] \"ข้าศึกบุกถึงประตูแล้ว! ครูขอไปห้องน้ำก่อนนะ!\""
10003020-68 = "หะ...หือ? กะ... ก็ไปสิ"
10003020-69 = "หะ...หือ? กะ... ก็ไปสิ"

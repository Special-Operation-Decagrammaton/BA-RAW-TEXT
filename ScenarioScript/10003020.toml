[translation]
10003020-1 = "第2話;計劃趕不上變化"
10003020-3 = "嗯，進來。"
10003020-5 = "陽奈的房間"
10003020-7 = "啊啊，原來是老師啊。"
10003020-8 = "[s]「……咦！？陽奈換衣服了！！？」"
10003020-9 = "為，為什麼那麼驚訝？#n……反而連我也嚇了一跳。"
10003020-10 = "啊，這件泳裝……？#n畢竟難得來到海邊……"
10003020-11 = "當然除了這件之外，還有剛才亞子說「既然來到海邊了，還是換件新的服裝比較好」並為我準備的新泳衣……不過我把它退還回去了。"
10003020-12 = "[s]「這是為什麼呢？」"
10003020-13 = "為什麼……因為已經有這件泳裝啦。"
10003020-14 = "既然還能穿，就沒必要再買新的。"
10003020-15 = "重新利用現有的東西更有效率。"
10003020-16 = "[s1]「仔細一看，上面還有名牌……」\n[s2]「難道是小學時期的……？」"
10003020-17 = "……是的，有什麼問題嗎？#n就算是小學時期穿的，只要尺寸還適合不就……"
10003020-18 = "……是的，有什麼問題嗎？#n就算是小學時期穿的，只要尺寸還適合不就……"
10003020-19 = "……有什麼奇怪的嗎？"
10003020-20 = "[s3]「也就是說陽奈……」\n[s4]「還是小學生……？」"
10003020-21 = "咦，你，你在說什麼啊……！？真是的，奇怪的話題就到此為止！"
10003020-22 = "咦，你，你在說什麼啊……！？真是的，奇怪的話題就到此為止！"
10003020-25 = "比起那個……外面發生了什麼事嗎？#n從剛才開始就有點吵鬧……"
10003020-26 = "[s]「沒事的，只是為了準備訓練而有點手忙腳亂。」"
10003020-27 = "……這樣啊，那就好。"
10003020-28 = "[s]「話說回來，陽奈剛剛在做什麼？」"
10003020-29 = "那個，沒特別做什麼……因為行程表上寫「待命到下午的步行訓練」。"
10003020-30 = "雖然還有將近4個小時，但似乎必須先保留體力的樣子。#n不過我覺得還是有點太長了，所以剛剛才試著聯繫亞子……"
10003020-31 = "[s] 「哦～原來行程表上是這麼寫的啊。」"
10003020-32 = "嗯，雖然……確實覺得有點奇怪，不過這次的訓練已經全權交給亞子處理。"
10003020-33 = "既然說了要交給他，我就應該尊重才對。"
10003020-34 = "畢竟一直以來……都是我獨自決定所有事情……"
10003020-35 = "[s]「你很信任他呢。」"
10003020-36 = "嗯，是啊。#n亞子平時就負責管理整個風紀委員會的業務，本來覺得他已經夠辛苦了……"
10003020-37 = "但亞子都說要做了，我也希望能交給他。#n雖然直接說出口有點奇怪……嗯，我很信任他。"
10003020-38 = "不過就算說要待命……我實在很少像這樣什麼都不做，只是單純地待著……"
10003020-39 = "有點……該說不知如何是好嗎……"
10003020-40 = "所以……老師。#n如果可以，或是，如果方便的話……"
10003020-41 = "……能陪我聊聊天嗎？"
10003020-42 = "接下來的4個小時，只是在這裡等著似乎有點閒過頭了。"
10003020-43 = "啊，當然老師如果有其他想法或計畫的話，我也不會強迫你……"
10003020-44 = "已經讓你陪著風紀委員會集訓了，不好意思再占用你的時間……"
10003020-45 = "[s]「沒這回事！我很樂意唷！！」"
10003020-46 = "……謝謝你。"
10003020-49 = "……嗯？老師的手機嗎？"
10003020-53 = "[ns]「喂，你好？」"
10003020-60 = "啊，老師！！"
10003020-61 = "可惡……！老師，現在有空嗎！？"
10003020-62 = "海邊的傢伙比我想的還要棘手，老師現在可以過來嗎！？"
10003020-63 = "請對委員長保密，再麻煩指揮了！"
10003020-66 = "老師，剛才聯絡的人是……？"
10003020-67 = "[s5]「抱歉，陽奈，肚子突然……！」\n[s6]「我去一下洗手間……！」"
10003020-68 = "……唔，嗯。慢走……？"
10003020-69 = "……唔，嗯。慢走……？"

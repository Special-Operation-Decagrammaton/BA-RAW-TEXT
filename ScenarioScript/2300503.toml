[translation]
2300503-1 = "อายาเนะ สู้เขา!"
2300503-2 = "(คุณครูมาถึงโรงเรียนอะบิดอสพอดีกับตอนที่รถรับซื้อของเก่ากำลังจะออกรถไป)"
2300503-3 = "ขอบคุณมากเลยนะ คุณอายาเนะ!"
2300503-4 = "ฮุฮุ ค่ะ ขอบคุณมากๆ เช่นกันค่ะ"
2300503-5 = "ฉันคิดว่าขายได้ราคาดีพอสมควรเลย ฉันจะเอาไปส่งที่ศูนย์รีไซเคิลแล้วเผาให้เรียบร้อยเอง#nเรียกพวกเรามาได้ในช่วงที่เหมาะมากเลย"
2300503-6 = "ถ้างั้นขอตัวก่อนนะ"
2300503-7 = "ค่ะ! ขอบคุณมากๆ เลยค่ะ"
2300503-11 = "อ๊ะ คุณครู"
2300503-12 = "[s] \"นั่นใครเหรอ....?\""
2300503-13 = "อ่อ! นั่นคือพ่อค้าของเก่าที่ซื้อขายของเก่ากับโรงเรียนเรามานานแล้วค่ะ#nเขารับซื้อของจากเราในราคาที่ดีพอสมควรเลยค่ะ"
2300503-14 = "อันที่จริงคุณครูไม่ต้องมาถึงที่นี่ก็ได้นะคะ...."
2300503-15 = "[s] ถามอายาเนะว่าไปเก็บเศษเหล็กมาจากที่ไหน"
2300503-16 = "ฉันเจอพวกมันถูกทิ้งอยู่ในคลังร้างของโรงเรียนค่ะ พอดีข้างในมีผ้าใบคลุมไว้#nฉันเลยไม่รู้มาก่อนว่ามีของพวกนั้นอยู่ด้วย"
2300503-17 = "รวมน้ำหนักทั้งหมดก็ประมาณ 300 กิโลกรัมเลยค่ะ ส่วนราคาก็...."
2300503-18 = "[s] ขอให้อายาเนะพาไปดูคลัง"
2300503-19 = "คะ?"
2300503-20 = "ได้ค่ะ... มีอะไรเหรอคะคุณครู?"
2300503-21 = "ทางนี้ค่ะ"
2300503-23 = "(แกร๊ก)"
2300503-24 = "ที่นี่ค่ะ ที่นี่เป็นที่เก็บของที่ถูกทิ้งเอาไว้เลยค่อนข้างรกนิดหน่อยนะคะ...."
2300503-25 = "ของพวกนั้นอยู่ใต้ผ้าใบพวกนี้ค่ะ"
2300503-26 = "[s] เปิดผ้าใบดู"
2300503-27 = "ถ้ามีผ้าคลุมไว้ล่ะก็.....เอ๊ะ....?"
2300503-28 = "มีข้อความเขียนไว้ด้วยล่ะค่ะ....#n<โปรดระวัง นี่เป็นเหล็กกล้าคุณภาพดี ต้องเก็บไว้ในห้องที่ควบคุมอุณหภูมิและความชื้น....>"
2300503-29 = "เหล็ก...คุณภาพดี....?"
2300503-30 = "คุณภาพดี....?!"
2300503-31 = "[s] ..."
2300503-32 = "......"
2300503-33 = "ยะ...แย่แล้ว!!"
2300503-37 = "โทรหาเจ้าของร้านเก็บของเก่าไม่ติดเลยค่ะ!"
2300503-38 = "ขะ...เขาไม่รับโทรศัพท์เลยค่ะ!"
2300503-39 = "ทะ.. ทำยังไงดีคะ?"
2300503-40 = "[s1] \"ใจเย็นๆ ก่อนอายาเนะ!\"\n[s2] \"มันต้องมีวิธีสิ!\""
2300503-41 = "...... คะ...ค่ะ!"
2300503-42 = "...... คะ...ค่ะ!"
2300503-43 = "ตั้งสติหน่อยอายาเนะ.... ใจเย็นๆ แล้วค่อยๆ คิดสิ...!"
2300503-45 = "ก่อนอื่นต้องวิเคราะห์สถานการณ์....!"
2300503-46 = "ฮู่ว..."
2300503-47 = "(ฟึ่บ!)"
2300503-48 = "รถบรรทุกคงจะมุ่งหน้าไปที่สถานีขนส่งสินค้าเพื่อนำสินค้าไปขึ้นรถไฟที่จะไปที่ศูนย์รีไซเคิลค่ะ"
2300503-49 = "ถ้าสินค้าถูกนำขึ้นรถไฟแล้วเราก็จะไม่มีทางติดตามมันได้เลยค่ะ! แบบนั้นภารกิจนี้คงล้มเหลวแน่ค่ะ!"
2300503-50 = "และถ้ารถขนส่งขึ้นทางด่วนไปเมื่อไหร่ล่ะก็ เราก็คงติดตามร่องรอยไม่ได้แน่ๆ"
2300503-53 = "(ตึกๆๆ)"
2300503-54 = "[s] \"โทรไปที่สถานีขนส่งสินค้าดีไหม?\""
2300503-55 = "ที่สถานีขนส่งสินค้าไม่มีคนอยู่ที่นั่นค่ะ และต่อให้พวกเราออกเดินทางไปตอนนี้#nก็คงไปไม่ทันรถบรรทุกอยู่ดี"
2300503-56 = "แต่ประเด็นสำคัญไม่ได้อยู่ที่สถานีขนส่งสินค้าหรอกนะคะ!"
2300503-57 = "[s] \"แล้วจะทำยังไงดีล่ะ....?!\""
2300503-60 = "(ตึกๆๆๆ)"
2300503-61 = "ฉันจะลองวิเคราะห์เส้นทางเดินทางของรถบรรทุกดูนะคะ"
2300503-62 = "เขาเคยซื้อขายกับทางโรงเรียนของเรามานาน ฉันเลยมีข้อมูลของเขาอยู่ค่ะ"
2300503-66 = "(ตึกๆๆๆ)"
2300503-67 = "เส้นทางที่คุณลุงจะไปต่อ.... เขามักจะไปที่ศูนย์บริการวัสดุก่อสร้างที่ย่านการค้า#nของอะบิดอสเป็นประจำ"
2300503-68 = "[s] \"ถ้างั้นไปที่นั่นกันไหม....?!\""
2300503-69 = "แต่ว่า...! นั่นเป็นตอนที่รถมีที่ว่างสำหรับบรรทุกของอยู่!"
2300503-70 = "ตอนนี้รถบรรทุกมีสินค้าที่หนักถึง 300 กิโลกรัมอยู่#nเพราะงั้นถึงเขาไปที่ศูนย์บริการวัสดุก่อสร้างก็คงจะซื้ออะไรเพิ่มไม่ได้อยู่ดีค่ะ!"
2300503-71 = "เพราะที่นั่นขายส่งสินค้าที่ซื้อจำนวนมากเท่านั้น"
2300503-72 = "[s] \"ถะ...ถ้างั้น....!\""
2300503-73 = "ถ้าเขาไม่ได้ไปที่นั่น บางทีสถานที่ที่คุณลุงจะไปก็คือ...."
2300503-74 = "....."
2300503-75 = "เจอแล้วค่ะ! ที่นี่ไงล่ะคะ! <อะบิดอส เซ็นทรัล พาร์ค เขต 3!>"
2300503-76 = "ตอนนี้ที่นั่นกำลังอยู่ระหว่างการรื้อถอน เขาอาจไปซื้อของเล็กๆ น้อยๆ ที่นั่นก็ได้ค่ะ!"
2300503-77 = "จากตรงนี้ไปก็คงประมาณ.... 3 กิโลเมตร... อยู่ใกล้ๆ นี้เองค่ะ!"
2300503-78 = "เขาคงจะไปถึงในอีกสิบนาที..."
2300503-79 = "[s] \"เราเรียกแท็กซี่ไปกันไหม?.....\""
2300503-80 = "ไม่ค่ะ ถ้านั่งแท็กซี่ไปต้องไปไม่ทันแน่ๆ ค่ะ"
2300503-81 = "เราต้องวิ่งไปค่ะ"
2300503-82 = "[s] \"หา?!\""
2300503-84 = "รถบรรทุกจะต้องผ่านเส้นทางที่คดเคี้ยวและมีสัญญาณไฟจราจรด้วย ฉันลองคำนวณเส้นทางแล้ว#nถ้าเราวิ่งไปล่ะก็จะไปถึงที่นั่นได้ภายในสิบนาทีค่ะ!"
2300503-85 = "[s] \".....หา?!\""
2300503-86 = "คุณครูช่วยนำทางให้ฉันด้วยนะคะ"
2300503-87 = "[s] \"อะไรนะ?!\""
2300503-88 = "ฉันวิ่งไปพร้อมกับอ่านแผนที่ไม่ได้แน่ๆ.... เพราะงั้นคุณครูต้องช่วยบอกทางให้ฉันนะคะ"
2300503-89 = "ถ้างั้นก็ไปกันเถอะค่ะ!!"
2300503-91 = "(อายาเนะวิ่งหายไปเหมือนกับสายลม)"
2300503-92 = "(ไม่มีทางเลือกนอกจากช่วยบอกทางให้เธอ)"
2300503-94 = "คุณครูคะ! ฉันมาถึงสี่แยกแล้วค่ะ ต้องไปทางไหนต่อคะ?!"
2300503-95 = "[s] \"ทะ...ทางขวา!\""
2300503-96 = "ค่ะ!"
2300503-98 = "แฮ่กๆ....แฮ่ก....!! คุณครูคะ! ฉันต้องข้ามไปฝั่งตรงข้าม แต่ตรงนี้ไม่มีทางม้าลายเลยค่ะ!"
2300503-99 = "[s] \"วิ่งตรงไปอีก 300 เมตรจะมีสะพานลอยข้ามถนน!\""
2300503-100 = "สะ...สะพานลอยเหรอคะ! ฉันเข้าใจแล้วค่ะ!! แฮ่ก...แฮ่ก....!!"
2300503-101 = "....กรี๊ดดด?!"
2300503-102 = "(โครมมม!)"
2300503-103 = "[s] \"เกิดอะไรขึ้นน่ะ?!\""
2300503-104 = "มะ...ไม่มีอะไรค่ะ! ช่วยบอกทางต่อด้วยค่ะ!"
2300503-107 = "แฮ่ก... แฮ่ก... แฮ่ก...."
2300503-108 = "ฉัน... น่าจะ... ออกกำลังกาย... แฮ่กๆ... แฮ่ก...ให้บ่อยกว่านี้....."
2300503-109 = "มะ...มาถึงแล้วค่ะ ดะ...เดี๋ยวก่อนค่ะคุณลุง!! แฮ่ก...แฮ่ก....!"
2300503-110 = "อะ...อะไรน่ะ! คุณอายาเนะ! ทำไมถึงมาที่นี่ได้ล่ะ!"
2300503-111 = "บาดเจ็บงั้นเหรอ?"
2300503-112 = "ระ...รอเดี๋ยวค่ะ... แฮ่ก... แฮ่ก... เหล็ก... เหล็ก...."
2300503-113 = "เหล็ก....นั่น...."
2300503-114 = "(ล้มพับ)"
2300503-115 = "คุณอายาเนะ?!"
2300503-117 = "(สุดท้ายอายาเนะก็ได้เงินค่าเหล็กที่ขายไปเพิ่มขึ้นถึงสองเท่า)"
2300503-118 = "(อายาเนะเล่าให้คุณครูฟังทั้งรอยยิ้ม ทั้งๆ ที่เธอมีบาดแผลเต็มตัว)"

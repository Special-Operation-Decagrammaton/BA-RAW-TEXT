2300503-48 = "3;아야네;06;고철상 트럭은 재활용 처리 센터로 가는 화물 기차가 정차하는 화물역으로 향할 거예요.\n#3;m4"
2300503-49 = "3;아야네;06;화물 기차에 실어버리면 그 뒤로는 추적은 불가능! 이 미션은 실패합니다!\n#3;em;[!]"

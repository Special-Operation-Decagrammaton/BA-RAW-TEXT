2300503-26 = "[s] 방수천 안쪽을 확인한다."
2300503-27 = "3;아야네;02;방수천이라면…… 어라……? \n#3;em;[?]"
2300503-28 = "3;아야네;02;뭔가 쓰여져 있네요……. <취급 주의. 이 자재는 고가의 특수강철로, 습기 및 온도에 특별한 관리가 필요한……>\n#3;m3"

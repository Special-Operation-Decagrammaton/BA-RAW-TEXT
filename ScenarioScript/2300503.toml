2300503-12 = "[s] \"방금 그건……?\""
2300503-13 = "5;아야네;03;네! 마침 오랫동안 저희랑 거래해 온 고철상 주인분이 오셔서, 출장비를 제외하고 괜찮은 값에 처분했어요.\n#5;em;[반짝]"
2300503-14 = "5;아야네;09;그런데 굳이 오지 않으셔도……."
2300503-15 = "[s] 어디서 찾은 건지 물어본다."
2300503-16 = "5;아야네;13;학교 구석에 방치된 자재 창고 안쪽인데, 방수천으로 덮혀 있어서 그런 게 있는 줄도 몰랐거든요.\n#5;em;…"
2300503-17 = "5;아야네;01;300kg 가까이 되는 거라 꽤 괜찮은 가격에……."
2300503-18 = "[s] 그 창고로 가보자고 한다."
2300503-19 = "5;아야네;12;네? \n#5;em;[?]\n#5;stiff"
2300503-20 = "5;아야네;09;네…… 뭔가 걸리는 거라도 있으신 걸까요?\n#3;greeting"
2300503-21 = "5;아야네;01;이쪽이에요.\n#5;m2"

[translation]
2300503-1 = "Run, Ayane, Run!"
2300503-2 = "I arrived at Abydos School and saw a truck piled with scrap metal getting ready to leave."
2300503-3 = "Thank you as always, Ayane."
2300503-4 = "Heehee. No, thank you."
2300503-5 = "I think this is a good price and your timing couldn't be better. I'll send it to the recycling center and have it put in the furnace."
2300503-6 = "Take care!"
2300503-7 = "You too! Thank you!"
2300503-11 = "Oh, Sensei!"
2300503-12 = "[s] \"Who was that?\""
2300503-13 = "That was a scrap metal dealer that we've been working with for a long time. We just worked out a pretty good deal!"
2300503-14 = "But you didn't have to come all the way out here... "
2300503-15 = "[s] \"Where did you find all that scrap metal?\""
2300503-16 = "It was inside the abandoned storage facility in the far corner of the school. It was covered by a tarp, so for the longest time I didn't even know it was there."
2300503-17 = "It weighed 300 kilograms, so I got a pretty good price for it."
2300503-18 = "[s] \"Which storage facility are you talking about?\""
2300503-19 = "What? "
2300503-20 = "...Is there something wrong?"
2300503-21 = "It's this way."
2300503-23 = "*clank*"
2300503-24 = "This is the place. It's a little messy since they seem to keep all the waste materials here as well..."
2300503-25 = "I found it under this tarp here."
2300503-26 = "[s] \"Let's check under the tarp.\""
2300503-27 = "Huh...?"
2300503-28 = "Hey, there's something written on it... Handle with caution. This is special high-grade steel that must be kept in a climate-controlled environment."
2300503-29 = "Special high-grade steel?"
2300503-30 = "High...grade...?!"
2300503-31 = "[s] ..."
2300503-32 = "..."
2300503-33 = "CRAP!"
2300503-37 = "I can't reach the scrap metal dealer!"
2300503-38 = "He's not picking up his phone! "
2300503-39 = "Wh-What do I do?"
2300503-40 = "[s1] \"Calm down, Ayane!\"\n[s2] \"There must be something we can do!\""
2300503-41 = "...Y-Yeah!"
2300503-42 = "...Y-Yeah!"
2300503-43 = "Focus, Ayane... Stay calm and let's figure this out...!"
2300503-45 = "Okay, first let's assess the situation."
2300503-46 = "*exhale*"
2300503-47 = "*ding*—!"
2300503-48 = "The scrap metal truck is probably headed to the freight station to meet the train that goes to the recycling center."
2300503-49 = "After it's loaded onto the freight train, the scrap metal will be impossible to track down!"
2300503-50 = "And we won't be able to find it after it gets on the highway to the freight station, either! "
2300503-53 = "*tap* *tap* *tap* *tap*"
2300503-54 = "[s] \"What if we just call the freight station?\""
2300503-55 = "The freight station is unmanned, so there won't be anyone there to call. And even if we leave now, the truck will get there before us."
2300503-56 = "Going to the freight station would be a waste of time!"
2300503-57 = "[s] \"Then what should we do?\""
2300503-60 = "*tap* *tap* *tap* *tap* *tap*"
2300503-61 = "I'm trying to figure out the route the scrap metal dealer will take."
2300503-62 = "Thankfully, he's been working with our school for so long and I have all his information recorded."
2300503-66 = "*tap* *tap* *tap* *tap* *tap* *tap*"
2300503-67 = "Where will he go next? Hmmm... He usually goes to the construction material management center at the Abydos shopping district."
2300503-68 = "[s] \"So we should go there?\""
2300503-69 = "Well, only if the truck has any room left!"
2300503-70 = "That truck is currently loaded with 300 kilograms of cargo! That means it can't possibly take on anything else at the construction material management center!"
2300503-71 = "That place only carries large amounts of cargo!"
2300503-72 = "[s] \"So, what do we do then?\""
2300503-73 = "Well, if he just passes it by, the next place he'll probably go is..."
2300503-74 = "..."
2300503-75 = "...This is it! Abydos Central Park District 3!"
2300503-76 = "That park is being demolished, so he'll probably want to load his truck with smaller items!"
2300503-77 = "It's only three kilometers away! That's so close! "
2300503-78 = "He should be there in about...ten minutes! "
2300503-79 = "[s] \"Should we take a taxi? Or do you know someone with a car?\""
2300503-80 = "No, a taxi won't get us there in time..."
2300503-81 = "...I think we'll have to run."
2300503-82 = "[s] \"What do you mean 'run'?!\""
2300503-84 = "The truck will be taking a non-linear path and dealing with traffic signals. Based on my calculations, we can run three kilometers and get there under ten minutes!"
2300503-85 = "[s] \"What?\""
2300503-86 = "Sensei, I'm going to need you to be my navigator."
2300503-87 = "[s] \"...What?!\""
2300503-88 = "I can't run and read the directions at the same time... You'll have to tell me where to go!"
2300503-89 = "Let's go!"
2300503-91 = "Ayane disappeared like the wind."
2300503-92 = "I had no choice but to become her navigator."
2300503-94 = "Sensei! I'm at the intersection! Which way do I go?!"
2300503-95 = "[s] \"Uh... To the right!\""
2300503-96 = "Got it!"
2300503-98 = "*pant* *pant* Sensei! I have to get across the street, but I don't see a crosswalk!"
2300503-99 = "[s] \"Keep going straight! There will be a bridge in about 300 meters!\""
2300503-100 = "A bridge! Got it! *pant* *pant*"
2300503-101 = "...Ack!"
2300503-102 = "*thump* *bang*"
2300503-103 = "[s] \"What happened?!\" "
2300503-104 = "Uh, it's nothing! Just tell me what to do next!"
2300503-107 = "*pant* *pant* *pant* "
2300503-108 = "I should... *pant* ...really start... *pant* *pant* ...working out..."
2300503-109 = "Okay, I made it... *pant* *pant* ...Wait, sir!"
2300503-110 = "Huh? Ayane? What are you doing here?"
2300503-111 = "Did you hurt yourself? "
2300503-112 = "W-Wait... *pant* ...just a minute... The cargo..."
2300503-113 = "Car...go..."
2300503-114 = "(flop)"
2300503-115 = "A-Ayane?!"
2300503-117 = "Eventually, we got twice the original amount for the high-grade scrap metal."
2300503-118 = "Ayane smiled excitedly when she told me the good news, even though she was covered in cuts and bruises."

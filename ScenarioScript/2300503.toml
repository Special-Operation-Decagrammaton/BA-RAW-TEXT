2300503-1 = "#title;달려라 아야네"
2300503-2 = "#na;(아비도스 학교에 가니 고철더미들을 실은 트럭이 출발 준비를 하고 있었다.)"
2300503-3 = "1;고철상 주인;00;늘 감사합니다. 아야네 씨.\n#1;a"
2300503-4 = "5;아야네;03;후후. 네. 수고하셨어요.\n#5;a\n#5;em;[반짝]"
2300503-5 = "1;고철상 주인;00;이 정도면 좋은 가격이라고 생각해요. 바로 재활용 처리 센터로 보내서 용광로에 넣어버리면 됩니다. 타이밍이 좋았네요.\n#1;em;[재잘]"
2300503-6 = "1;고철상 주인;00;그럼 수고하시길!\n#1;greeting"
2300503-7 = "5;아야네;01;네! 수고하셨어요.\n#5;greeting"

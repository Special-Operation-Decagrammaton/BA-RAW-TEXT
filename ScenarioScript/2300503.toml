[translation]
2300503-1 = "奔跑吧綾音"
2300503-2 = "（剛到阿拜多斯高中的時候，有輛堆滿廢鐵的卡車正準備出發）"
2300503-3 = "一直以來多謝了，綾音同學。"
2300503-4 = "不會不會，感謝您專程過來，辛苦了。"
2300503-5 = "有這麼多價錢應該很不錯。我馬上拿去處理廠請人量好放進熔爐裡。之後會再聯絡。"
2300503-6 = "那麼就麻煩您了。"
2300503-7 = "沒問題，麻煩了！"
2300503-11 = "啊，老師。"
2300503-12 = "[s] 「剛剛那是……？」"
2300503-13 = "是長期與我們有交易的回收業者。#n雖然要付點車馬費，但那些東西應該能賣個好價錢。"
2300503-14 = "不好意思還讓老師特地過來一趟，其實也沒什麼有趣的……"
2300503-15 = "[s] 詢問那些是從哪裡找到的廢鐵"
2300503-16 = "那個，是從學校角落的材料倉庫裡找到的。#n因為被防水布蓋著，所以之前都沒有注意到。"
2300503-17 = "看起來應該接近300kg，就算單價很便宜也肯定……"
2300503-18 = "[s] 提議一起去倉庫"
2300503-19 = "咦？"
2300503-20 = "那個……老師有什麼在意的地方嗎？"
2300503-21 = "啊，就是這邊。"
2300503-23 = "（喀嚓）"
2300503-24 = "在這邊，雖然有點髒亂……"
2300503-25 = "就是放在這裡。"
2300503-26 = "[s] 確認防水布的內側。"
2300503-27 = "那應該只是普通的防……咦……？"
2300503-28 = "上面好像寫了什麼……#n「注意：本材料為昂貴的特製鐵，請特別注意保存環境的濕度與溫度。詳情請……」"
2300503-29 = "……昂貴的？"
2300503-30 = "……昂貴的！？"
2300503-31 = "[s] …………"
2300503-32 = "……"
2300503-33 = "不，不行！！"
2300503-37 = "不行，電話沒人接！"
2300503-38 = "打到店裡也一樣……！"
2300503-39 = "怎，怎麼辦才好！？"
2300503-40 = "[s1] 「冷靜點，綾音。」\n[s2] 「冷靜下來想想辦法吧。」"
2300503-41 = "好，好的！"
2300503-42 = "好，好的！"
2300503-43 = "振作起來，綾音……這種被逼入絕境的狀況也是常有的事……！"
2300503-45 = "……呼。好！"
2300503-46 = "……首先，先釐清現狀！"
2300503-47 = "（……！）"
2300503-48 = "……OK，整理完畢了。#n那輛卡車並不會直接開往回收場，而是會在貨物總站將東西送上開往回收場的火車。"
2300503-49 = "一旦東西被送上火車我們就無能為力了，也就是任務失敗。"
2300503-50 = "而且在那之前，只要卡車開上往貨物總站的高速公路，我們也沒有辦法追上。"
2300503-53 = "（喀噠喀噠喀噠喀噠……）"
2300503-54 = "[s] 「如果我們聯絡貨物總站呢？」"
2300503-55 = "離這裡最近的貨物總站是自動運營的，並沒有可以聯絡的人。"
2300503-56 = "而且就算我們現在趕往貨物總站，也是卡車會比我們先到。#n也就是說，決勝負的地點並不是貨物總站。"
2300503-57 = "[s] 「這麼說的話……」"
2300503-60 = "（喀噠喀噠喀噠喀噠……）"
2300503-61 = "需要在那之前就分出勝負才行。來想想卡車到達貨物總站前的路線吧。"
2300503-62 = "因為是長期的交易夥伴，這附近的情報應該都有紀錄才對……"
2300503-66 = "（喀噠喀噠喀噠喀噠……）"
2300503-67 = "……原來如此。#n如果和以前一樣的話，接下來他應該會去阿拜多斯商店街的大型建材管理中心。"
2300503-68 = "[s] 「那我們只要去那裡的話……！？」"
2300503-69 = "……不，那是在「卡車還有辦法裝得下的情況」。"
2300503-70 = "現在卡車上已經裝了將近300kg的貨物，應該沒辦法再裝那裡的東西了。"
2300503-71 = "畢竟如字面上說的，那裡是處理大型建材的地方。"
2300503-72 = "[s] 「原，原來如此……！」"
2300503-73 = "萬一他還是去了，我們也能抄捷徑趕過他。那麼假設他經過那裡之後……"
2300503-74 = "…………。"
2300503-75 = "……就是這裡！「阿拜多斯中央公園第3地區」！"
2300503-76 = "這裡正在進行拆除作業，應該有些比較輕的東西能載！"
2300503-77 = "距離大約是，3km……並不遠！"
2300503-78 = "預計能抵達的時間……大約10分鐘……"
2300503-79 = "[s] 「搭計程車或是開車的話……！」"
2300503-80 = "不，計程車過來的時間無法確定，很可能趕不上。"
2300503-81 = "……我用跑的過去。"
2300503-82 = "[s] 「咦！？」"
2300503-84 = "卡車的路徑相對而言會繞一點路，而且還需要等紅綠燈。#n如果是我一個人的話，只要走最短路徑就能在10分鐘內跑3km。"
2300503-85 = "[s] 「真的假的！？」"
2300503-86 = "老師，麻煩您指揮了。"
2300503-87 = "[s] 「指揮！？」"
2300503-88 = "我想盡可能減輕重量，而且看著地圖沒有辦法全速奔跑。#n老師，稍後請告訴我路線！"
2300503-89 = "那麼我就出發了！！"
2300503-91 = "（綾音像風一樣地消失了）"
2300503-92 = "（……沒辦法，今天就來擔任報務員吧）"
2300503-94 = "老師，前方是十字路口！接下來要往哪邊呢！？"
2300503-95 = "[s] 「右，右邊！」"
2300503-96 = "是！"
2300503-98 = "哈啊，哈啊……！！#n老師，應該就是對面了，但我沒看到行人穿越道……！"
2300503-99 = "[s] 「前面300m有天橋！」"
2300503-100 = "天，天橋嗎？我知道了！哈啊……哈啊……！！"
2300503-101 = "……呀啊！？"
2300503-102 = "（碰咚！）"
2300503-103 = "[s] 「怎麼了！？」"
2300503-104 = "沒，沒事！請繼續指示！"
2300503-107 = "哈啊，哈啊，哈啊……"
2300503-108 = "哈啊……平常，要是……哈啊，哈啊……多運動，就好了……"
2300503-109 = "終於到了……啊，等等，請等一下！！哈啊……哈啊……！"
2300503-110 = "咦！？綾音同學！？"
2300503-111 = "你怎麼會在這裡！？發生什麼事了嗎？"
2300503-112 = "稍，稍等一，一下……哈，哈啊……剛才的……鐵……"
2300503-113 = "那些……是……"
2300503-114 = "（碰咚）"
2300503-115 = "綾，綾音同學！？"
2300503-117 = "（結果那些廢鐵成功用接近原本2倍的價錢賣了出去）"
2300503-118 = "（帶著自信的笑容這麼說著的綾音，卻已是滿身瘡痍的狀態……）"

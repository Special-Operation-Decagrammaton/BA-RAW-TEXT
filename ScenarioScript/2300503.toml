2300503-67 = "3;아야네;05;……과연, 고철상 아저씨의 다음 동선은…… 평균적으로 아비도스 상점가의 대형건축자재 관리 센터였어요.\n#3;em;…"
2300503-68 = "[s] \"그럼 그곳으로 가면……?!\""
2300503-69 = "3;아야네;06;……하지만! 그것은 트럭에 더 실을 짐이 있었을 경우!\n#3;em;[반응]"
2300503-70 = "3;아야네;05;지금은 트럭에 300kg 짜리 화물이 실려있어요. 그렇다면 대형건축자재 관리 센터에서 추가로 뭔가를 더 실을 수는 없어요!"
2300503-71 = "3;아야네;15;이곳은 대형 화물 위주니까요!\n#3;em;[!]"
2300503-72 = "[s] \"과, 과연……!"
2300503-73 = "3;아야네;05;저기를 패스했을 때는, 아저씨의 다음 동선을 계산하면……."
2300503-74 = "3;아야네;05;…….\n#3;em;…"
2300503-75 = "3;아야네;06;……찾았어요! 이곳입니다! <아비도스 중앙 공원 3지구!>\n#3;em;[반응]"
2300503-76 = "3;아야네;06;공원 철거가 진행 중인 곳이라, 여기서 가벼운 물건을 더 실을 예정이에요!"
2300503-77 = "3;아야네;15;거기까지는 직선 거리 약 3km……. 가깝습니다!"
2300503-78 = "3;아야네;05;예측 도착 시간은 10분이내……."
2300503-79 = "[s] \"태, 택시나 자가용이라도…….\""
2300503-80 = "3;아야네;05;아뇨. 택시를 부르면 제 시간에 도착할 수 없어요.\n#3;stiff"
2300503-81 = "3;아야네;06;……달립니다."
2300503-82 = "[s] \"네?!\""
2300503-83 = "3;아야네;05\n#3;m3\n#wait;1000"
2300503-84 = "3;아야네;15;트럭의 동선은 지그재그에다가 신호까지 있어요. 하지만 최적의 동선을 계산한다면 10분 안에 3km를 달려서 도착할 수 있어요!\n#3;em;[!]"
2300503-85 = "[s] \"……네?!\""
2300503-86 = "3;아야네;05;선생님. 지휘를 부탁드립니다.\n#3;greeting"
2300503-87 = "[s] \"네?!\""
2300503-88 = "3;아야네;05;네비게이션을 확인하며 달릴 수는 없어요……. 저에게 길을 알려주세요."

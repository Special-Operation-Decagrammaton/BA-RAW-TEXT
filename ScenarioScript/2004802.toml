[translation]
2004802-1 = "隱祕的呼喚"
2004802-2 = "（依照渚的要求，盡可能悄悄地前往了他的帳篷）"
2004802-4 = "私人海灘"
2004802-6 = "啊，歡迎您，老師。"
2004802-7 = "您前來的途中沒有被其他人看到吧？"
2004802-8 = "[s]「嗯。我確認周圍沒人後才過來的。」"
2004802-9 = "呼，那真是太好了。"
2004802-10 = "啊，其實我之所以請老師過來……"
2004802-15 = "……是為了這個。"
2004802-17 = "（說完，渚便將某樣東西放到了桌上──）"
2004802-18 = "（是一疊文件）"
2004802-22 = "[ns]「……這些文件是？」"
2004802-23 = "是需要緊急處理的三一行政文件。"
2004802-24 = "雖然為了休假，我已經將大部分的業務交接給留在學園的各位……"
2004802-25 = "……可惜終究還是有些必須由我親自處理的工作。"
2004802-26 = "所以才會冒昧地請求老師協助……"
2004802-27 = "這樣會不會太麻煩您了……？"
2004802-28 = "[s]「怎麼會呢！」"
2004802-29 = "呵呵，謝謝您，老師。"
2004802-30 = "那麼能請您將這些文件，按照種類進行分類嗎？"
2004802-32 = "（就這樣協助渚迅速完成了工作）"
2004802-35 = "呼……有老師的幫忙，果然一下子就結束了呢。"
2004802-36 = "這就是大人的底蘊嗎……"
2004802-37 = "[s]「應該說是過勞累積出來的底蘊吧……」"
2004802-38 = "呵呵，原來我和老師也有相似之處呢。"
2004802-39 = "[s]「話說渚為什麼要我偷偷摸摸地過來呢？」"
2004802-40 = "啊，您在意這點啊。"
2004802-41 = "如您所知，準備這片海灘的目的是為了放鬆與休閒。"
2004802-42 = "讓大家都能暫時放下工作，享受渡假的時光。"
2004802-43 = "如果有人在這種地方工作的話，其他人勢必會感到不自在。"
2004802-44 = "就好像悠閒地躺在草地上的時候，假如身旁有人在耕田……#n就會莫名有股「自己是不是也該起來拔拔雜草」的感覺對吧？"
2004802-45 = "[s]「說的也是……如果旁邊有人正在工作，確實很難放鬆玩耍。」"
2004802-46 = "所以我才希望在被其他人發現之前，趕快將事情處理完畢。"
2004802-47 = "以免讓其他人感到不舒服。"
2004802-48 = "這也是會悄悄請老師幫忙的原因。"
2004802-49 = "[s]「你真的很會替人著想呢，渚。」"
2004802-50 = "呵呵，我只是以自己希望被對待的方式去對待他人罷了。"
2004802-51 = "……不過無論理由如何，我都確實造成了老師的麻煩。"
2004802-52 = "所以應該好好補償您才對。"
2004802-53 = "[s]「補償……？」"
2004802-57 = "是的，正巧我的冰箱裡，有一款非常符合海邊氣氛的限定版起司焦糖蛋糕。"
2004802-62 = "手邊也剛好有適合與之搭配的紅茶。"
2004802-67 = "您是否願意跟我一起享用這份補償呢？"
2004802-68 = "[s]「當然好，那我就不客氣囉。」"
2004802-70 = "（就這樣和渚一起吃著蛋糕與紅茶，享受午茶時光）"
2004802-71 = "（也許是因為剛完成工作的關係，蛋糕吃起來格外甜美）"

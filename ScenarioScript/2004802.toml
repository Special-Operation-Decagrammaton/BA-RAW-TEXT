[translation]
2004802-1 = "เรียกหาแบบลับๆ"
2004802-2 = "(คุณครูแอบเข้าไปในเต็นท์ของนางิสะอย่างลับๆ ตามที่นางิสะขอ)"
2004802-4 = "ชายหาดส่วนตัว"
2004802-6 = "อ๊ะ มาแล้วเหรอคะ คุณครู"
2004802-7 = "ระหว่างมาที่นี่คงไม่ได้ไปสะดุดสายตาใครเข้าใช่มั้ยคะ?"
2004802-8 = "[s] \"อื้อ ครูตรวจดูมาแล้วว่าแถวนี้ไม่มีใครอยู่เลย\""
2004802-9 = "ฮู่ว โล่งอกไปทีนะคะ"
2004802-10 = "อ้อ ที่ฉันอยากเจอคุณครูก็เพราะ..."
2004802-15 = "เพราะอันนี้ค่ะ..."
2004802-17 = "(เมื่อพูดจบ นางิสะก็หยิบของบางอย่างมาวางบนโต๊ะ และมันก็คือ...)"
2004802-18 = "(เอกสารกองโต)"
2004802-22 = "[ns] \"นี่มันเอกสารอะไรเหรอ...?\""
2004802-23 = "นี่คือเอกสารการบริหารของทรีนิตี้ที่ต้องรีบเคลียร์ค่ะ"
2004802-24 = "ก่อนมาพักผ่อนครั้งนี้ ฉันฝากงานส่วนใหญ่ไว้กับคนที่อยู่ที่โรงเรียนแล้วก็จริง..."
2004802-25 = "แต่ถึงยังไงก็ยังมีงานที่ฉันต้องเป็นคนทำเองอยู่ดีค่ะ..."
2004802-26 = "ถึงจะน่าละอาย แต่ฉันอยากขอความช่วยเหลือจากคุณครูค่ะ"
2004802-27 = "นี่จะเป็นการเสียมารยาทหรือเปล่าคะ...?"
2004802-28 = "[s] \"ไม่หรอก!\""
2004802-29 = "ฮุฮุ ขอบคุณนะคะ คุณครู"
2004802-30 = "ถ้างั้นฉันฝากจัดเอกสารพวกนี้ตามประเภทให้หน่อยนะคะ"
2004802-32 = "(แล้วคุณครูก็ช่วยนางิสะจนทำงานเสร็จได้อย่างรวดเร็ว)"
2004802-35 = "ฮู่ว พอได้คุณครูมาช่วย งานก็เสร็จในพริบตาเลยนะคะ "
2004802-36 = "นี่สินะคะพลังของผู้ใหญ่..."
2004802-37 = "[s] \"ครูแค่คุ้นชินกับงานเอกสารน่ะ...\""
2004802-38 = "ฮุฮุ คุณครูกับฉันก็มีสิ่งหนึ่งที่เหมือนกันนะคะเนี่ย"
2004802-39 = "[s] \"ว่าแต่ทำไมถึงขอให้ครูแอบมาอย่างเงียบๆ ล่ะ?\""
2004802-40 = "อ๊ะ คุณครูยังตะหงิดใจเรื่องนั้นสินะคะ"
2004802-41 = "อย่างที่ทราบว่าชายหาดคือพื้นที่เพื่อการพักผ่อนหย่อนใจ"
2004802-42 = "สถานที่ที่ทุกคนวางมือจากงานที่ทำแล้วเพลิดเพลินกับการผ่อนคลาย"
2004802-43 = "ถ้ามีใครสักคนเริ่มทำงานในสถานที่แบบนั้นละก็ คนอื่นจะก็จะรู้สึกไม่สบายใจเอาได้ค่ะ"
2004802-44 = "ถ้าเรานอนสบายอยู่บนสนามหญ้า แต่มีคนมาตัดหญ้าอยู่ข้างๆ เราก็อยากถอนวัชพืชไปด้วย ใช่มั้ยล่ะคะ?"
2004802-45 = "[s] \"ก็จริงนะ... ถ้าเห็นใครทำงานอยู่ เราก็คงสบายอยู่คนเดียวไม่ได้หรอก\""
2004802-46 = "เพราะงั้นฉันก็เลยอยากเคลียร์งานให้เสร็จไวๆ ก่อนที่คนอื่นจะจับสังเกตได้ค่ะ"
2004802-47 = "ฉันไม่อยากทำให้คนอื่นรู้สึกไม่สบายใจน่ะค่ะ"
2004802-48 = "และเพราะอย่างนั้นฉันก็เลยแอบเรียกคุณครูมาที่นี่ค่ะ"
2004802-49 = "[s] \"เอาใจใส่คนอื่นดีจังเลยนะ นางิสะ\""
2004802-50 = "ฮุฮุ ฉันแค่ปฏิบัติต่อผู้อื่นเหมือนอย่างที่ฉันอยากให้พวกเขาปฏิบัติต่อฉันค่ะ"
2004802-51 = "แต่ว่า... ฉันก็ต้องยอมรับว่าฉันทำให้คุณครูต้องลำบากไปด้วย"
2004802-52 = "ฉันเลยคิดว่าควรจะมอบรางวัลเป็นการตอบแทนให้ค่ะ"
2004802-53 = "[s] \"รางวัลตอบแทนเหรอ...?\""
2004802-57 = "บังเอิญว่าในกล่องแช่เย็นของฉันมีคาราเมลชีสเค้กสูตรพิเศษที่เข้าได้ดีกันกับบรรยากาศของชายหาด#nอยู่ด้วยค่ะ"
2004802-62 = "แล้วฉันก็มีชาแดงที่เข้ากับเค้กนั้นอยู่พอดีเลย"
2004802-67 = "ว่ายังไงล่ะคะ? มาอร่อยกับรางวัลตอบแทนด้วยกันกับฉันมั้ยคะ?"
2004802-68 = "[s] \"ได้อยู่แล้ว ครูจะกินให้อร่อยเลย\""
2004802-70 = "(แล้วคุณครูกับนางิสะก็ได้กินเค้กและชาแดงด้วยกัน)"
2004802-71 = "(คงเป็นเพราะเพิ่งทำงานเสร็จพอดี เค้กจึงมีรสหวานและอร่อยเป็นพิเศษ)"

[translation]
2004802-1 = "#title;은밀한 부름"
2004802-2 = "#na;(요청대로 최대한 은밀하게 나기사의 텐트로 이동했다.)"
2004802-3 = "#all;hide"
2004802-4 = "#place;프라이빗 해변"
2004802-5 = "3;나기사 수영복;s2_01\n#3;a\n#wait;1000"
2004802-6 = "3;나기사 수영복;s2_02;아, 오셨군요, 선생님.\n#3;em;[반응]"
2004802-7 = "3;나기사 수영복;s2_09;혹시 오시는 길에 다른 분들의 눈에 띄거나 하지는 않으셨지요?"
2004802-8 = "[s] \"응. 주변에 아무도 없는 걸 보고 왔어.\""
2004802-9 = "3;나기사 수영복;s2_06; 휴, 다행이군요.\n#3;em;[한숨]"
2004802-10 = "3;나기사 수영복;s2_02;아 그리고, 선생님을 뵙고자 한 것은 다름이 아니라……."
2004802-11 = "#st;[0,0];instant;1;"
2004802-12 = "#clearST"
2004802-13 = "3;나기사 수영복;s2_99\n#3;greeting\n#wait;1500"
2004802-14 = "3;나기사 수영복;s2_99\n#3;greeting\n#wait;1000"
2004802-15 = "3;나기사 수영복;s2_18;……이것 때문입니다."
2004802-16 = "#all;hide"
2004802-17 = "#na;(그렇게 말하며, 나기사가 테이블 위에 올린 것은…….)"
2004802-18 = "#na;(한 뭉치의 서류 더미였다.)"
2004802-19 = "#st;[0,0];instant;1;"
2004802-20 = "#clearST"
2004802-21 = "3;나기사 수영복;s2_02\n#3;a\n#wait;1000"
2004802-22 = "[ns] \"……웬 서류들이야?\""
2004802-23 = "3;나기사 수영복;s2_02;급하게 처리해야 할 트리니티의 행정 서류들입니다.\n#3;em;[반응]"
2004802-24 = "3;나기사 수영복;s2_01;일단 휴양을 위해 대부분의 업무는 학교에 남아 계신 분들께 인계를 해두고 오기는 했습니다만……."
2004802-25 = "3;나기사 수영복;s2_06;……그래도 저의 손을 거쳐야 하는 업무들이 어쩔 수 없이 발생하더라고요.\n#3;em;[한숨]"
2004802-26 = "3;나기사 수영복;s2_14;그래서 염치 불고하고, 선생님께 도움을 청하게 되었습니다."
2004802-27 = "3;나기사 수영복;s2_02;혹시 실례가 되었을까요……?\n#3;em;[?]"
2004802-28 = "[s] \"그럴 리가!\""
2004802-29 = "3;나기사 수영복;s2_10;후후, 감사합니다, 선생님."
2004802-30 = "3;나기사 수영복;s2_11;그럼, 이 서류들을 종류별로 분류하는 것을 부탁드릴게요.\n#3;em;[반짝]"
2004802-31 = "#all;hide"
2004802-32 = "#na;(그렇게 나기사를 도와 빠르게 업무를 해결해 갔다.)"
2004802-33 = "#all;hide"
2004802-34 = "3;나기사 수영복;s2_06\n#3;a\n#wait;1000"
2004802-35 = "3;나기사 수영복;s2_06;후우, 선생님이 도와주시니 순식간에 끝났네요. \n#3;em;[한숨]"
2004802-36 = "3;나기사 수영복;s2_12;이것이 어른의 관록이라는 것일까요……."
2004802-37 = "[s] \"아마 과로가 만들어준 관록일 거야…….\""
2004802-38 = "3;나기사 수영복;s2_11;후후, 선생님과 저 사이에도 닮은 점이 한 가지 있었네요.\n#3;em;[재잘]"
2004802-39 = "[s] \"그런데, 아까는 왜 그렇게 조용히 와 달라고 했던 거야?\""
2004802-40 = "3;나기사 수영복;s2_02;아, 그 부분이 신경 쓰이셨군요.\n#3;em;[반응]"
2004802-41 = "3;나기사 수영복;s2_99;아시다시피, 이 해변은 휴식과 여유의 공간."
2004802-42 = "3;나기사 수영복;s2_99;모두가 자기 일은 잠시 내려놓고 휴양을 즐기는 곳이지요."
2004802-43 = "3;나기사 수영복;s2_02;그런 곳에서 누구 한 명이 일을 하기 시작한다면, 다른 사람들은 불편해질 수밖에 없어요.\n#3;em;[!]"
2004802-44 = "3;나기사 수영복;s2_03;풀밭에 여유롭게 누워 있는데 옆에서 밭을 갈면 자신도 왠지 잡초는 뽑아야 할 것 같은 기분이 들잖아요?"
2004802-45 = "[s] \"확실히…… 옆에서 일하고 있으면 마음 놓고 놀기 어렵지.\""
2004802-46 = "3;나기사 수영복;s2_12;그래서 다른 모두의 눈에 띄기 전에 빠르게 업무를 처리하려 했던 거예요.\n#3;em;[반짝]"
2004802-47 = "3;나기사 수영복;s2_10;다른 분들께 불편함을 선사해 드리고 싶지는 않았으니까요."
2004802-48 = "3;나기사 수영복;s2_12;그래서 선생님께도 은밀하게 부탁드린 것이고요."
2004802-49 = "[s] \"배려심이 깊구나, 나기사는.\""
2004802-50 = "3;나기사 수영복;s2_11;후후, 제가 대접받기를 바라는 대로 타인을 대하는 것뿐인걸요.\n#3;em;[음표]"
2004802-51 = "3;나기사 수영복;s2_99;……하지만, 어쨌든 제가 선생님께 폐를 끼친 것 자체는 자명한 사실."
2004802-52 = "3;나기사 수영복;s2_02;그러니 제가 마땅히 보상을 해드리는 것이 맞겠지요.\n#3;em;[반응]"
2004802-53 = "[s] \"보상……?\""

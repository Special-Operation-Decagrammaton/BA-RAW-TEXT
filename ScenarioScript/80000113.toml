[translation]
80000113-1 = "滿溢雙手的欲望"
80000113-2 = "（情人節的前一天，收到了紫的來電）"
80000113-8 = "老師！老師您知道嗎！？"
80000113-9 = "明天是個特別的紀念日……！"
80000113-10 = "每年的2月14日，被世人稱為「情～人～節」哦！"
80000113-11 = "[s1]「這個日子我也很清楚。」\n[s2]「呵呵，紫，你可以稱呼我為情人節大師哦？」"
80000113-14 = "哇！毫不猶豫、爽快並毫無保留的回答！真不愧是老師！"
80000113-15 = "不過，果然如此。#n只有小女子跟不上潮流嗎？"
80000113-16 = "……嗯？您問我是不是一直都不是很了解情～人～節？"
80000113-17 = "唔嗯～每年到了這個時期，僕人們都會拿點心給我……"
80000113-18 = "小女子只是偶爾會覺得──#n「啊～居然是可以隨心所欲吃點心的日子，真幸～運！」而已。"
80000113-19 = "原來這天還有「向珍愛之人表達心意和感激之情的日子」這樣深刻的含意啊。"
80000113-20 = "透過甜點傳達感激之情……#n雖然不清楚最先想到的人是誰……"
80000113-21 = "這真是一個無比可愛又非～常溫暖的紀念日呢！"
80000113-22 = "[s]（這時候還是別提到商業手法之類的事吧……）"
80000113-23 = "總之雖然有點晚了……#n不過既然知道這是什麼樣的日子，小女子也絕不能坐以待斃！"
80000113-24 = "如此突然地邀請您實在抱歉……#n但是老師，如果方便的話，明天可以見個面嗎？"
80000113-25 = "[s]「嗯，可以哦，要在哪見面呢？」"
80000113-26 = "嗯，地點就……"
80000113-27 = "啊！總之時間是下午！麻煩您下午來赴約了！#n等地點確認之後，我會再盡快告知您詳細資訊的！"
80000113-29 = "（於是到了隔天，在吃完午餐後前往了紫指定的地點）"
80000113-38 = "（抵達的地點不是別的，正是……）"
80000113-40 = "勘解由小路家"
80000113-41 = "待小姐打扮完畢後會來迎接您，還請稍待片刻。"
80000113-42 = "[s]「好的……」"
80000113-47 = "（在宏偉的建築和莊嚴的氛圍中，宛如凝固般地稍事等待）"
80000113-54 = "[ns]「啊，紫，我等你……」"
80000113-58 = "啊，歡迎您大駕光臨！老師！抱歉讓您久等了！"
80000113-59 = "[s]「……不不不，那倒不要緊。話說這副巫女裝扮是……？」"
80000113-62 = "就像昨天說的一樣，今天是「情～人～節」。"
80000113-63 = "也就是向重要的人，傳達真誠謝意的日子。"
80000113-64 = "因此，小女子該如何傳達心意……"
80000113-65 = "……該怎麼做，才能將小女子滿懷的心意，一點不漏地全部傳達給老師呢？"
80000113-66 = "歷經昨晚徹夜的苦思之後……！"
80000113-67 = "[s]「……苦思之後？」"
80000113-68 = "我最終想到的便是這個服裝。"
80000113-69 = "作為勘解由小路家的一員，小女子紫──全力以赴的最～強～～版本！"
80000113-70 = "名為「巫女紫Mark～2」！"
80000113-71 = "如果是這副模樣，一定可以將小女子的真心全數傳達！"
80000113-72 = "所以老師！請收下這個！"
80000113-76 = "[ns]「這是……護身符？」"
80000113-77 = "沒錯！這是小女子自黎明汲取清泉、以祈禱注入心力……#n特製的勘解由小路家的護身符！"
80000113-78 = "其功能包括居家平安、健康長壽、事業成功、考試必勝，甚至連豐收祈願也能實現！"
80000113-79 = "如果老師喜歡的話……小女子會非常高興的！"
80000113-80 = "[s3]「好，好厲害……！我真的很高興……！」\n[s4]「不過這作為情人節的禮物，會不會有點太厲害了……？」"
80000113-83 = "呵呵……老師您真是的……#n只有護身符還不夠！完全不夠！"
80000113-84 = "即使是勘解由小路的護身符，也只能傳達小女子一半的心意而已。"
80000113-85 = "如果想完整傳達小女子的心意……！"
80000113-90 = "[ns]「變身了！？」"
80000113-91 = "如果說剛剛送給您的護身符，是勘解由小路家的紫想傳達的心意。"
80000113-95 = "那麼這……就是進入百花繚亂之後，從老師身上獲益良多的紫想傳達的心意。"
80000113-96 = "[s]「是巧克力餅乾啊。」"
80000113-97 = "沒錯！這是豪華巧克力聖代口味的限定版好粗棒！"
80000113-98 = "是我經過上午的尋找，好不容易才買到的！"
80000113-99 = "[s]「啊，所以才會約下午啊……」"
80000113-104 = "小女子如今能作為勘解由小路家的紫……以及百花繚亂的紫，全都多虧了老師。"
80000113-105 = "所以才會像這樣，準備兩份禮物給您。"
80000113-106 = "小女子我可是非常貪心的。"
80000113-107 = "您願意收下這些禮物嗎？老師。"
80000113-108 = "[s]「謝謝你，紫的心意真的讓我很高興。」"
80000113-109 = "呵呵呵！那真是太好了！"
80000113-110 = "[s]「那要不要一起吃這個巧克力餅乾？」"
80000113-111 = "嗯！我很樂意！"

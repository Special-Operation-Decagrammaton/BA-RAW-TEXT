[translation]
80000113-1 = "#title;양손 한가득 담긴 욕심."
80000113-2 = "#na;(발렌타인 데이가 찾아오기 하루 전날, 유카리로부터 한 통의 연락이 도착했다.)"
80000113-3 = "#st;[0,0];instant;1;"
80000113-4 = "#clearST"
80000113-5 = "#wait;3500"
80000113-6 = "#wait;1500"
80000113-7 = "3;유카리;01\n#3;a\n#3;sig\n#wait;1000"
80000113-8 = "3;유카리;00;선생님! 선생님! 혹시 알고 계셨나요?! \n#3;sig\n#3;em;[반응]"
80000113-9 = "3;유카리;99;내일 찾아올 특별한 기념일……!\n#3;sig"
80000113-10 = "3;유카리;00;매년 2월 14일을 가리켜 세간에서 부르기를 <발레엔-탄 데-이!>라 하는, 무척이나 뜻깊은 날에 대하여 말이어요!\n#3;sig\n#3;jump"
80000113-11 = "[s1] \"그거라면 물론 잘 알고 있지.\"\n[s2] \"후후, 유카리. 나를 발렌타인 데이의 마스터라고 불러줄래?\""
80000113-12 = "#wait;100"
80000113-13 = "#wait;100"
80000113-14 = "3;유카리;04;와앗! 한점의 망설임도 없이, 호쾌하며 거침없는 그 답변! 역시나 선생님이시어요!\n#3;sig\n#3;em;[!]"
80000113-15 = "3;유카리;05;하지만 과연, 그렇군요. 유행에 뒤처진 것은 소녀뿐이었다는 이야기인가요.\n#3;sig\n#3;greeting"
80000113-16 = "3;유카리;02;……네? 그럼 이때까지는 발레엔-탄 데-이에 대해 잘 모르고 있었냐고요?\n#3;sig\n#3;em;[?]"
80000113-17 = "3;유카리;99;으음~ 매년 이맘때에 사용인 여러분께서 과자를 가져다주시고 할 때마다…….\n#3;sig"
80000113-18 = "3;유카리;07;소녀는 그저 '아~ 과자를 마음껏 먹어도 되는 날이라니, 완전 럭-키여요!' 같은 생각은 가끔 했사온데.\n#3;sig"
80000113-19 = "3;유카리;13;실은 <소중한 분에게 고이 간직하고 있던 마음과 감사함을 전하는 날>이라는 의미가 있는 뜻깊은 날이었던 것이로군요.\n#3;sig"
80000113-20 = "3;유카리;01;달콤한 과자를 통해 감사의 마음을 전달한다니…… 어떤 분이 가장 먼저 떠올렸는지는 모르겠지만.\n#3;sig"
80000113-21 = "3;유카리;14;무척이나 사랑스럽고 가슴이 이렇~게나 따스해지는 기념일이어요!\n#3;sig\n#3;em;[반짝]"
80000113-22 = "[s] (기업의 상술 이야기는 하지 말자……)"
80000113-23 = "3;유카리;99;어쨌거나 다소 늦었을지언정…… 어떠한 날인지를 알게 되었다면 소녀도 이대로 가만히 있을 수 없사와요!\n#3;sig"
80000113-24 = "3;유카리;01;갑작스러운 요청이라 죄송스럽지만……. 괜찮으시다면 선생님, 내일 뵐 수 있을까요?\n#3;sig"
80000113-25 = "[s] \"응, 그거라면 괜찮아. 어디서 볼까?\""
80000113-26 = "3;유카리;99;음, 장소는…….\n#3;sig"
80000113-27 = "3;유카리;04;아! 일단 시간은 오후! 오후로 부탁드리어요! 장소와 함께 정해지는 대로 자세한 사항은 바로 연락드리겠사와요!\n#3;sig\n#3;hophop"
80000113-28 = "#all;hide"
80000113-29 = "#na;(그리하여 다음 날, 점심이 살짝 지난 시간 무렵에 유카리가 알려준 장소로 향하게 되었다.)"

[translation]
80000113-1 = "Double-Fisted Greed"
80000113-2 = "The day before Valentine's Day, I got a call from Yukari."
80000113-8 = "Sensei! Sensei! Have you heard?! "
80000113-9 = "A special day arrives tomorrow!"
80000113-10 = "The oh-so meaningful day of February 14th! The day they call \"Vaalentan Day!\""
80000113-11 = "[s1] \"Of course I heard.\"\n[s2] \"Hmmhmm. Listen Yukari, I am what you might call a Valentine's master.\""
80000113-14 = "Whoa! You spoke without a speck of hesitation! As expected of Sensei!"
80000113-15 = "But that means—I see. It seems I am behind the trends."
80000113-16 = "...Hm? Do I not have many Vaalentan Day experiences?"
80000113-17 = "Well... My household staff do bring me lots of snacks around this time of year..."
80000113-18 = "And I often thought, \"Huzzah! I can have as many snacks as I want today! How lucky!\""
80000113-19 = "In truth, it was a meaningful day to \"express your feelings and gratitude to someone special.\""
80000113-20 = "Gratitude expressed through sweet snacks... I don't know who first invented this idea."
80000113-21 = "But it's a lovely and heartwarming way to celebrate!"
80000113-22 = "[s] \"(I'll just keep the part about it being a corporate marketing scheme to myself...)\""
80000113-23 = "While I'm a little late to the party... I can't just sit and do nothing after learning about this day!"
80000113-24 = "I'm sorry to impose on you like this... But Sensei, could we meet up tomorrow?"
80000113-25 = "[s] \"That's fine with me. What did you have in mind?\""
80000113-26 = "How about..."
80000113-27 = "Ah! Let's meet in the afternoon, if you please! I'll share the location and details as soon as I've decided!"
80000113-29 = "The next day, I went to the location Yukari selected right after lunch."
80000113-38 = "The destination?"
80000113-40 = "Kadenokouji Mansion"
80000113-41 = "Please wait just a moment. Our lady will see you once she's finished with her preparations."
80000113-42 = "[s] \"Okay...\""
80000113-47 = "As I waited, I was struck speechless by the enormous mansion and its solemn atmosphere."
80000113-54 = "[ns] \"Ah, Yukari. I was waiti—\""
80000113-58 = "Welcome, Sensei! Sorry to make you wait!"
80000113-59 = "[s] \"...Nonono, that's fine. But, what's with the miko outfit?\""
80000113-62 = "As I said, today is \"Vaalentan Day.\""
80000113-63 = "It is a day to show sincere gratitude to someone special."
80000113-64 = "So, I thought about the best way to give my thanks..."
80000113-65 = "To make clear to Sensei the unending torrent of my gratitude without losing a single raindrop."
80000113-66 = "And after thinking about it over and over all night..."
80000113-67 = "[s] \"...I gotta hear this...\""
80000113-68 = "What you see now is the result of one of my choices."
80000113-69 = "It is I, Yukari, showcasing the \"unlimited powah\" of the Kadenokouji family! "
80000113-70 = "You may address me as Miko Yukari Mk. 2! "
80000113-71 = "I, Yukari, could only express the enormity of my emotions in this!"
80000113-72 = "Now then! Sensei, take this!"
80000113-76 = "[ns] \"An amulet?\""
80000113-77 = "Yes! I woke up at dawn to draw pure water and put my sincerest prayers into it... It's the Kadenokouji family's special charm!"
80000113-78 = "Its benefits include safety for family members, a long and healthy life, financial prosperity, passing tests, and even tight lines for fly fishing!"
80000113-79 = "I hope you like it, Sensei... That would make me so happy!"
80000113-80 = "[s3] \"A-Amazing! This makes me happy too!\"\n[s4] \"But isn't this a little too grand for a Valentine's Day gift?!\""
80000113-83 = "Heehee... Sensei, you're too modest. This is not enough! Not at all!"
80000113-84 = "The Kadenokouji family charm only carries half of the feelings I wanted to share."
80000113-85 = "There's one more thing I must add to transmit my emotions to their maximum!"
80000113-90 = "[ns] \"She transformed?!\""
80000113-91 = "If that charm embodies my feelings as a Kadenokouji..."
80000113-95 = "This gift carries my feeling as the Hyakkaryouran's Yukari. The one who watched and learned so much from you, Sensei."
80000113-96 = "[s] \"It's a chocolate stick.\""
80000113-97 = "Yes! It's the limited edition Corn Stick Deluxe Choco Parfait Flavor!"
80000113-98 = "I had to hunt for it at so many stores this morning. I didn't think I'd find one!"
80000113-99 = "[s] \"So that's why you wanted to meet in the afternoon...\""
80000113-104 = "It's thanks to you, Sensei, that I can stand here today as both Kadenokouji's Yukari and the Hyakkaryouran's Yukari."
80000113-105 = "I wanted a gift that reflected both of those sides of myself."
80000113-106 = "I'm greedy like that."
80000113-107 = "Sensei, do you accept these gifts?"
80000113-108 = "[s] \"Thank you. I humbly accept all that you've given me, Yukari.\""
80000113-109 = "Heeheehee! I'm glad to hear that!"
80000113-110 = "[s] \"Well, since we're here... Want to chow down on this chocolate stick together?\""
80000113-111 = "Yes! Certainly!"

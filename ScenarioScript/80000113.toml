80000113-53 = "3;유카리 무녀 백화요란;03\n#3;a\n#3;black"
80000113-54 = "[ns] \"아, 유카리. 기다리고 있었…….\""
80000113-55 = "#st;[0,0];instant;1;"
80000113-56 = "#clearST"
80000113-57 = "3;유카리 무녀 백화요란;03\n#3;a\n#wait;1000"
80000113-58 = "3;유카리 무녀 백화요란;15;아, 어서 오시어요! 선생님! 기다리시게 해서 죄송하여요!\n#3;em;[음표]"
80000113-59 = "[s] \"……아니아니아니, 그건 괜찮은데. 저기, 그 무녀 복장은……?\""
80000113-60 = "#st;[0,0];instant;1;"
80000113-61 = "#clearST"
80000113-62 = "3;유카리 무녀 백화요란;02;어제도 말씀드렸다시피 오늘은 <발레엔-탄 데-이>.\n#3;em;[반응]"
80000113-63 = "3;유카리 무녀 백화요란;99;소중한 분께 진심 어린 감사를 전하는 날.\n#3;greeting"
80000113-64 = "3;유카리 무녀 백화요란;99;그래서, 어떻게 하면 소녀의 마음을 전할 수 있을까……."
80000113-65 = "3;유카리 무녀 백화요란;07;……어찌하면 선생님께 소녀의 이 한가득 넘쳐나는 마음을 하나도 빠트리지 않고 온전히 전할 수 있을까."
80000113-66 = "3;유카리 무녀 백화요란;10;어제부터 밤새도록 고민에 고민을 거듭한 끝에……!\n#3;jump\n#3;em;[!]"
80000113-67 = "[s] \"……끝에?\""
80000113-68 = "3;유카리 무녀 백화요란;07;마침내 선택한 것 중 하나가 바로 이 모습."
80000113-69 = "3;유카리 무녀 백화요란;15;저 유카리가 카데노코지의 일원으로서 전력을 다한, 풀파아-워 버-존이어요! \n#3;em;[반짝]"
80000113-70 = "3;유카리 무녀 백화요란;15;이름하야 무녀 유카리 마-쿠 투! \n#3;jump\n#fontsize;80\n#bgshake"
80000113-71 = "3;유카리 무녀 백화요란;10;이 모습이라면 저 유카리의 진심을 다한 전력을 전할 수 있겠단 생각이 들었사와요!"
80000113-72 = "3;유카리 무녀 백화요란;10;그런 의미에서 선생님! 이것을!\n#3;jump"
80000113-73 = "#st;[0,0];instant;1;"
80000113-74 = "#clearST"
80000113-75 = "3;유카리 무녀 백화요란;03\n#3;greeting\n#wait;1000"
80000113-76 = "[ns] \"이건 부적……?\""
80000113-77 = "3;유카리 무녀 백화요란;03;네! 소녀가 새벽녘부터 일어나선 맑은 물을 길어와 기도하여 기운을 불어넣은…… 카데노코지표 특제 부적이어요!\n#3;jump\n#3;em;[!]"
80000113-78 = "3;유카리 무녀 백화요란;10;그 효능은 무려 가내안전, 무병장수, 사업성취, 합격필승, 나아가 풍어기원까지!"
80000113-79 = "3;유카리 무녀 백화요란;07;부디 선생님께서 마음에 들어 해 주시면…… 소녀도 무척 기쁠 것이어요!"
80000113-80 = "[s3] \"괴, 굉장해……! 물론 엄청 기쁘긴 한데 말이야……!\"\n[s4] \"발렌타인 데이 선물로는 조금 엄청난 물건…… 같기도 하고……!\""
80000113-81 = "#wait;100"
80000113-82 = "#wait;100"
80000113-83 = "3;유카리 무녀 백화요란;03;후후…… 선생님도 차암. 부적만으로는 아직. 전혀, 완전히 부족한 것이와요!\n#3;greeting"
80000113-84 = "3;유카리 무녀 백화요란;99;카데노코지의 부적이라고 해봐야, 소녀가 전달드리고자 하는 진심의 반쪽에 불과한 것."
80000113-85 = "3;유카리 무녀 백화요란;10;거기에 더해 온전히 소녀의 마음을 전달하기 위해서라면 또 하나……!"
80000113-86 = "#st;[0,0];instant;1;"
80000113-87 = "#clearST"
80000113-88 = "3;유카리 무녀 백화요란;10\n#3;d\n#wait;500"
80000113-89 = "3;유카리;00\n#3;a\n#wait;1000"
80000113-90 = "[ns] \"변신했다?!\""
80000113-91 = "3;유카리;01;방금 전해드린 부적이 카데노코지로서의 제가 전하는 마음이라면."
80000113-92 = "#st;[0,0];instant;1;"
80000113-93 = "#clearST"
80000113-94 = "3;유카리;99\n#3;greeting\n#wait;1000"
80000113-95 = "3;유카리;99;이것은…… 백화요란에 들어와, 선생님에게 많은 것들을 보고 배운 저 백화요란의 유카리가 전해드리고자 하는 마음이랍니다."
80000113-96 = "[s] \"이건 초콜릿 막과자구나.\""
80000113-97 = "3;유카리;14;네! 무려 운메에봉 디러억-스초코파루훼맛! 한정판이어요!\n#3;jump\n#3;em;[음표]"
80000113-98 = "3;유카리;10;오전 중에 열심히 돌아다니며 가까스로 살 수 있었답니다!"
80000113-99 = "[s] \"아, 그래서 오후에 보자고…….\""
80000113-100 = "#st;[0,0];instant;1;"
80000113-101 = "#clearST"
80000113-102 = "3;유카리;01\n#3;m1\n#wait;1000"
80000113-103 = "#bgshake\n#wait;2500"
80000113-104 = "3;유카리;03;제가 이렇게 카데노코지의 유카리로서…… 그리고 또한 백화요란의 유카리로서 있을 수 있는 건, 전부가 선생님 덕분."
80000113-105 = "3;유카리;99;그러니 선물 또한 이렇게 양쪽 모두를 준비해 전달드리고 싶었사와요."
80000113-106 = "3;유카리;07;소녀는 무척이나 욕심쟁이이기에."
80000113-107 = "3;유카리;13;이 선물들, 부디 받아주시겠나요? 선생님."
80000113-108 = "[s] \"고마워. 유카리가 전해준 이 마음, 정말로 기뻐.\""
80000113-109 = "3;유카리;00;후후훗! 그렇담 다행이어요!\n#3;m3\n#3;em;[반짝]"
80000113-110 = "[s] \"좋았어. 그럼 이렇게 된 김에 이 초콜릿 과자, 같이 먹을까?\""
80000113-111 = "3;유카리;14;네! 기꺼이!\n#3;hophop"

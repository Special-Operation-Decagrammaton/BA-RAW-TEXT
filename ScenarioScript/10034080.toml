[translation]
10034080-1 = "บทส่งท้าย;เกินพอ"
10034080-4 = "[log=???]น่าจะยังไม่ดีพอรึเปล่า?[/log]"
10034080-9 = "หืม...?"
10034080-10 = "อ่า... โทษที ขอโทษนะ ฉันมัวแต่คิดเรื่องอื่นอยู่น่ะ... เมื่อกี้ว่าอะไรนะ?"
10034080-16 = "ฉันถามว่าแค่นั้นน่ะจะพอเหรอ? หมายถึง <คาเฟ่บ้านผีสิง> น่ะ"
10034080-17 = "มันก็ดูมีอะไรมากกว่าเดิมอยู่หรอกนะ... แล้วก็น่าจะดีกว่าแค่คาเฟ่ของหวาน..."
10034080-18 = "แต่ว่า... จะว่ายังไงดีล่ะ... มันอาจจะซ้ำกับของชมรมอื่นก็ได้ นี่ละเรื่องที่เราเป็นห่วง"
10034080-19 = "ใช่มั้ยๆ? พอจะมีอะไรที่พิเศษกว่านี้มั้ยนะ... หรือไม่ก็เอาเป็นอะไรที่เธอแบกไว้ข้างหลัง?"
10034080-21 = "หืม...? คีย์บอร์ดนี่น่ะเหรอ?"
10034080-23 = "ใช่ เอาเป็นคาเฟ่วงดนตรีมั้ย? ถ้าเป็นคาเฟ่แบบนั้นน่าจะไม่ซ้ำใครเลยนะ"
10034080-24 = "ไม่ยักรู้เลยว่าเล่นคีย์บอร์ดได้ด้วย รู้งี้ก็ให้ทำคาเฟ่วงดนตรีตั้งนานแล้ว!"
10034080-26 = "อืม... เอางั้นเหรอ... วงดนตรีงั้นเหรอ..."
10034080-27 = "อืมมมม...!"
10034080-31 = "ฮุฮุ..."
10034080-32 = "ฮุฮุ ฮุฮุฮุ..."
10034080-33 = "ไอริ...?"
10034080-34 = "หืม...? ยะ... ยิ้มอะไรเหรอ? คิดเรื่องตลกๆ อะไรได้งั้นเหรอ?"
10034080-35 = "อะฮ่าฮ่าฮ่า... เปล่าหรอกๆ ขอบใจที่เป็นห่วงนะ ฉันพอเข้าใจแล้วละว่าจะสื่ออะไร"
10034080-36 = "แต่ก็ไม่เป็นไรหรอกนะ... ครั้งนี้น่ะ ฉันว่าประมาณนี้ก็น่าจะโอเคแล้วละ..."
10034080-41 = "อะไรกัน งั้นก็ไม่เห็นจะต้องเป็นห่วงเลยนี่นา"
10034080-42 = "นั่นสินะ ดูจากสีหน้าของไอริแล้ว ฉันว่าไม่ต้องคุยอะไรต่อก็ได้แล้วละ"
10034080-43 = "งั้นก็ตั้งใจเตรียมตัวเข้านะ ไอริ! แล้วฉันจะพาเพื่อนๆ ไปที่คาเฟ่นะ!"
10034080-44 = "หวังว่าจะได้กินของหวานอร่อยๆ นะ! ชมรมของหวานหลังเลิกเรียน!"
10034080-46 = "อื้ม...! ตั้งตารอได้เลย!"
10034080-50 = "อ๊ะ ฉันต้องลงสถานีนี้นี่นา"
10034080-51 = "งั้นไว้คุยกันต่อนะ! ไปก่อนละ!"
10034080-53 = "อื้ม~ กลับดีๆ นะ~"
10034080-54 = "เจอกันพรุ่งนี้~!!"
10034080-56 = "อื้ม!!"
10034080-60 = "ฮู่ว..."
10034080-61 = "หืม? ทำไมรู้สึกเดจาวูยังไงก็ไม่รู้... เหมือนว่าสถานการณ์แบบนี้เคยเกิดขึ้นมาแล้วเลย..."
10034080-63 = "ไอริ! ทางนี้ ทางนี้!!"
10034080-64 = "...?"
10034080-68 = "ทำไมมัวไปยืนเหม่ออยู่อย่างนั้นล่ะ! เรารีบไปกันก่อนล่วงหน้าเถอะ!!"
10034080-69 = "ไม่ต้องรีบร้อนขนาดนั้นหรอกน่า ไอริก็คงกำลังคิดอะไรอยู่น่ะ นึกว่าทุกๆ คนเค้าจะต้องเป็นเหมือน#nเธอหมดเลยรึไง?"
10034080-70 = "เมื่อกี้ว่าอะไรนะ...? "
10034080-71 = "ถ้าเราไปคัดเลือกสายขึ้นมา เธอจะรับผิดชอบมั้ยล่ะ!? งั้นก็เท่ากับว่าเราเหนื่อยกันฟรี แล้วก็ไม่ได้กินเซมล่าด้วยนะ!"
10034080-72 = "สัปดาห์ที่ผ่านมาเราเหนื่อยกันจนรากเลือดเลย ทุกคนต้องใส่ให้สุดให้สมกับที่ซ้อมมานะ ไปร็อกให้เลือดกำเดาไหลเลย...!!"
10034080-73 = "อะไรของเค้า ถ้าเลือดกำเดาไหลก็เล่นไม่ได้น่ะสิ..."
10034080-74 = "เอาเถอะๆ ถึงเวลาที่จะได้เห็นผลของความพยายามกันแล้ว"
10034080-75 = "ไปกันเถอะ ไอริ"
10034080-77 = "......"
10034080-78 = "ไอริ...?"
10034080-79 = "ยืนเหม่ออะไรอยู่เหรอ? เราไม่มีเวลาแล้วนะ"
10034080-80 = "ถึงนี่จะเป็นก้าวเล็กๆ ของพวกเรา แต่ก็เป็นการก้าวกระโดดที่ยิ่งใหญ่ของวงการดนตรีในคิโวทอส!!"
10034080-81 = "......"
10034080-85 = "น่าจะยังไม่ดีพอหรือเปล่า?"
10034080-94 = "\"ตอนนี้ไม่เป็นไรแล้วละ...\""
10034080-97 = "-ive aLIVE!"

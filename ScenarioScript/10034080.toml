[translation]
10034080-1 = "尾聲;已無缺憾"
10034080-4 = "[log=???]「是不是少了點什麼？」[/log]"
10034080-9 = "……嗯？"
10034080-10 = "啊，抱歉抱歉。#n稍微恍神了一下……你剛才說什麼？"
10034080-16 = "我剛才說是不是少了點什麼啊？#n那個「鬼屋咖啡廳」。"
10034080-17 = "雖然是比之前要好一點……#n但也只是比一般的甜點咖啡廳好……"
10034080-18 = "總覺得……可能會有其他人用相同的點子。我們擔心的是這個。"
10034080-19 = "沒錯沒錯。我還是覺得特別一點會更好……例如你現在揹著的那個？"
10034080-21 = "……嗯？這個？電子琴嗎？"
10034080-23 = "對啊。弄個樂團咖啡廳怎麼樣？這樣就比較有特色了吧。"
10034080-24 = "而且原來你會彈琴啊，早知道一開始就這麼做了！"
10034080-26 = "唔嗯……確實……樂團咖啡廳啊……"
10034080-27 = "唔唔唔唔唔嗯……！"
10034080-31 = "……呵呵。"
10034080-32 = "呵呵，呵呵呵……"
10034080-33 = "……愛莉？"
10034080-34 = "嗯……怎麼突然笑了起來？是想到了什麼好笑的事嗎？"
10034080-35 = "啊哈哈哈……沒有啦，沒什麼。#n謝謝你們的關心。我大概明白你們的意思了。"
10034080-36 = "不過沒關係……我覺得現在這樣就可以了。"
10034080-41 = "……什麼嘛。看來是不用擔心了。"
10034080-42 = "就是說啊。#n看愛莉的表情，應該不用我們再多說什麼了。"
10034080-43 = "那就好好準備吧，愛莉！我會帶朋友們去的！！"
10034080-44 = "我很期待甜點的部分唷！放學後的甜點部！"
10034080-46 = "……嗯！敬請期待！"
10034080-50 = "啊，我該下車了。"
10034080-51 = "其他的事之後再聊！我先走囉！"
10034080-53 = "好～路上小心～"
10034080-54 = "明天見～！！"
10034080-56 = "嗯！！"
10034080-60 = "……呼。"
10034080-61 = "咦，這個情況……怎麼感覺有點似曾相識……"
10034080-63 = "愛莉！這邊這邊！！"
10034080-64 = "……？"
10034080-68 = "怎麼呆站在那邊呢！以防萬一，我們還是提早出發吧！！"
10034080-69 = "沒必要那麼急啦。#n畢竟愛莉也有自己的事要煩惱，又不是所有人都跟你一樣。"
10034080-70 = "……你什麼意思？"
10034080-71 = "要是試鏡出了什麼差錯，你要負責嗎！？#n我們這麼辛苦，要是吃不到女王泡芙的話怎麼辦！？"
10034080-72 = "讓人快吐血的一週已經過去……#n大家都準備見證吧，血濺現場的搖滾……！！"
10034080-73 = "不是，要是真的見血過不了試鏡啦……"
10034080-74 = "總之就是這樣。是時候展示成果了。"
10034080-75 = "……走吧，愛莉。"
10034080-77 = "…………"
10034080-78 = "……愛莉？"
10034080-79 = "怎麼還站在那裡？已經沒時間囉？"
10034080-80 = "這是我們的一小步，卻是樂團界的一大步！！"
10034080-81 = "……………………"
10034080-85 = "「是不是少了點什麼？」"
10034080-94 = "「……已經足夠了。」"
10034080-97 = "-ive aLIVE！"

[translation]
400-1 = "歡迎光臨「天使24」便利商店！"
400-2 = "天使24"
400-3 = "歡，歡迎光臨，這裡是「天使24」！"
400-4 = "咦，是大人……？#n難道說，是傳聞中的「老師」嗎？"
400-5 = "（這，這個人，就是那棟傳聞中女學生們頻繁進出的奇怪建築物的「老師」……！）"
400-6 = "（萬一被他討厭的話，往後的日子可能就不好過了吧……！？）"
400-7 = "我，我是空。 #n從今天起，在這家「天使24」便利商店打工。#n請多多關照！"
400-8 = "你說我看起來比其他學生的年紀要小點……？"
400-9 = "啊，可能是因為我是國中生的關係。"
400-10 = "願意雇用國中生的地方很少，但因為一些原因，我需要點錢……"
400-11 = "所幸是被雇用了，但聽說這家便利商店以前曾被襲擊過，甚至是被戰車衝撞。我從第一天就開始有點不安了……"
400-12 = "而且除了老師之外，這家店幾乎沒有人來光顧……"
400-13 = "（自己說出口後就更加不安了……這家店沒問題吧……）"
400-16 = "不，不過，我隨時都歡迎老師來購物！ #n完全不覺得麻煩！"
400-17 = "「天使24」就像店名一樣是24小時全年無休，有需要的話歡迎隨時光臨！"

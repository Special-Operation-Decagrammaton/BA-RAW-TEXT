[translation]
400-1 = "Welcome to the Angel 24 Convenience Store!"
400-2 = "Angel 24"
400-3 = "W-Welcome to Angel 24!"
400-4 = "Huh...? An adult? A-Are you that Sensei person I've heard so much about?"
400-5 = "(So this is the suspicious teacher who constantly has girls going in and out of their office...)"
400-6 = "(I could be in real trouble if I rub them the wrong way!)"
400-7 = "M-My name is Sora. This is my first day as a part-timer here at Angel 24. Nice to meet you!"
400-8 = "Did you say I look younger than the other students...?"
400-9 = "Well, naturally. I'm a middle schooler."
400-10 = "Practically no other store hires students my age, and I needed the money..."
400-11 = "Coming to work here is pretty scary, though. I heard this building was raided by a delinquent and charged by tanks."
400-12 = "But from what I can tell, you're the only regular customer this store gets, Sensei..."
400-13 = "(How will this place stay in business like this?)"
400-16 = "N-Not that your patronage isn't valued, of course!"
400-17 = "Angel 24 is open around the clock, so stop by anytime you need something!"

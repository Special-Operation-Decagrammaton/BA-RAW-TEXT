[translation]
400-1 = "ร้าน <เอ็นเจล 24> ยะ...ยินดีต้อนรับค่ะ!"
400-2 = "<เอ็นเจล 24>"
400-3 = "ระ...ร้าน <เอ็นเจล 24> ยะ...ยินดีต้อนรับค่ะ!"
400-4 = "เอ๊ะ?... ผู้ใหญ่? คะ...คือว่าคุณลูกค้าคือ...คะ... \"คุณครู\" ที่เขาลือกันหรือเปล่าคะ?\n"
400-5 = "(คนคนนี้คือ \"คุณครู\" จากสำนักงานลึกลับที่ชอบมีเด็กนักเรียนหญิงเข้าออกบ่อยๆ สินะ....)"
400-6 = "(หากไม่จับตาดูเขาไว้ล่ะก็อาจเกิดเรื่องไม่ดีขึ้นก็ได้...!)"
400-7 = "ฉะ...ฉันชื่อโซระค่ะ จะมาทำงานพาร์ทไทม์ที่ร้านสะดวกซื้อ <เอ็นเจล 24> ตั้งแต่วันนี้เป็นต้นไปค่ะ#nขอฝากตัวด้วยนะคะ!\n"
400-8 = "ฉันดูเด็กกว่าเพื่อนนักเรียนคนอื่นๆ งั้นเหรอคะ....?"
400-9 = "ค่ะ ฉันเป็นนักเรียนมัธยมต้นค่ะ"
400-10 = "ส่วนใหญ่ไม่ค่อยมีร้านที่รับเด็กนักเรียนม.ต้นเข้าทำงานหรอกค่ะ#nแต่พอดีฉันมีเหตุจำเป็นส่วนตัวที่ต้องใช้เงิน...\n"
400-11 = "ฉันดีใจที่ได้ทำงานที่นี่ก็จริง แต่ได้ยินมาว่าเคยมีพวกนักเรียนเกเรเข้ามาโจมตีที่อาคารนี้ด้วยค่ะ#nแถมยังเคยขับรถถังพุ่งเข้ามาในอาคารด้วย เลยรู้สึกกังวลนิดหน่อยค่ะ...\n"
400-12 = "นอกจากคุณครูแล้ว ลูกค้าที่มาที่ร้านนี้ก็มีแค่ไม่กี่คนเอง..."
400-13 = "(ถ้าเป็นแบบนี้ร้านจะไปรอดรึเปล่านะ...)"
400-16 = "ตะ...แต่เรายินดีต้อนรับลูกค้าทุกคนเสมอนะคะ ฉันไม่เคยรู้สึกรำคาญคุณลูกค้าเลยค่ะ!"
400-17 = "ร้าน <เอ็นเจล 24> เปิดตลอด 24 ชั่วโมงค่ะ ถ้าคุณครูต้องการซื้ออะไรก็แวะมาได้ตลอดนะคะ!"

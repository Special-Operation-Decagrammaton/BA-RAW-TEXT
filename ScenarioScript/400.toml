[translation]
400-1 = "#title;편의점 <엔젤 24>에 어서 오세요!"
400-2 = "#place;<엔젤 24>"
400-3 = "3;소라;07;어, 어서 오세요, <엔젤 24>입니다!\n#3;a\n#3;em;[반응]"
400-4 = "3;소라;18;어라…… 어른?#n호, 혹시 손님이 그 말로만 들었던 이곳의 \"선생님\" 이신가요?\n#3;stiff\n#3;em;[?]"
400-5 = "3;소라;17;(이 사람이 여학생들이 드나드는 그 수상한 사무실의 \"선생님\"…….)"
400-6 = "3;소라;10;(잘못해서 이 사람의 눈 밖에 났다가는 험한 꼴을 당할지도 몰라……!)\n#3;em;…"
400-7 = "3;소라;04;저, 저는 소라라고 해요. #n오늘부터 <엔젤 24> 편의점에서 아르바이트생으로 일하게 되었답니다. #n잘 부탁드려요!\n#3;greeting"
400-8 = "3;소라;02;다른 학생들보다 조금 더 어려 보인다고요……?\n#3;em;[?]"
400-9 = "3;소라;01;네, 저는 중학생이거든요."
400-10 = "3;소라;25;중학생을 뽑아주는 가게는 별로 없지만, 개인적인 이유로 돈이 필요해서요……\n#3;em;…"
400-11 = "3;소라;10;그런데 전에 불량 학생들이 이 건물을 습격하거나, 탱크가 건물로 돌진한 일도 있다고 해서 벌써부터 조금 불안해요…….\n#3;stiff"
400-12 = "3;소라;20;게다가 선생님 이외에는 이 가게를 찾는 손님도 거의 없는 것 같고…….\n#3;em;…"
400-13 = "3;소라;99;(정말로 이 가게, 이대로도 괜찮으려나…….)"
400-14 = "3;소라;99\n#3;em;…\n#wait;2500"
400-15 = "3;소라;18\n#3;em;[반응]\n#wait;1000"
400-16 = "3;소라;11;무, 물론 손님은 언제나 환영이랍니다! #n저, 절대로 귀찮다고 생각하지 않았어요!\n#3;shake"
400-17 = "3;소라;13;<엔젤 24>는 언제나 열려 있으니, 필요한 물건이 있으면 언제든 찾아주세요!\n#3;greeting\n#3;em;[반짝]"

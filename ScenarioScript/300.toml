[translation]
300-1 = "#title;전술경연 대회!"
300-2 = "#place;키보토스 메인스타디움"
300-3 = "3;마이;03;드디어 키보토스의 명물, 전술경연 대회가 그 화려한 막을 올렸습니다!\n#3;hophop\n#3;em;[!]\n#3;a"
300-4 = "3;마이;01;벌써부터 학생들의 열의가 후끈후끈 느껴지는데요!"
300-5 = "3;마이;00;이번에는 특별히, 화제의 중심! 학생들을 직접 이끌고 대회에 참가하신 샬레의 선생님에게 소감을 들어보도록 하겠습니다.\n#3;em;[재잘]"
300-6 = "3;마이;01;이번 대회에는 어떤 각오로 임하고 계시는가요?\n#3;closeup"
300-7 = "3;마이;01\n#3;closeup\n#3;em;…\n#wait;2500"
300-8 = "3;마이;04;……네? 전술경연 대회가 뭔지 모르신다고요? \n#3;em;[?!]\n#3;shake\n#3;closeup"
300-9 = "3;마이;01;그거 완전……… 특종이네요!\n#3;em;[반짝]"
300-10 = "3;마이;00;[화제의 인물, 샬레의 선생님. 전술경연 대회는 내 관심사가 아니다…… 충격!]\n#3;hophop\n#3;em;[!]\n#fontsize;72"
300-11 = "3;마이;02;악의적 보도라고요? 무슨 서운한 말씀. 저희 [월간 키보토스]는 언제나 사실에 기반한 사건만을 보도하고 있다고요!"
300-12 = "3;마이;01;뭐…… 초점이 다소 어긋날 수도 있지만.\n#3;em;…"
300-13 = "3;마이;99;그나저나 큰일이네요. 선생님이 전술 경연대회에 대해 잘 모르신다니……."
300-14 = "3;마이;01;모르는 건 지금부터 천천히 배워가면 되지요. 제가 알려드릴게요!\n#3;em;[반응]"
300-15 = "3;마이;00;전술경연 대회는 총학생회 주관으로 열리는 학생들 간의 전술 대회입니다.\n#3;m2"
300-16 = "3;마이;03;키보토스 내의 다양한 공간을 대여하여 전투평가를 벌이고, 그 순위에 따라 시상이 진행되지요!\n#3;em;[반짝]\n#3;greeting"
300-17 = "3;마이;01;특히 시상품으로 제공되는 보상 중에는 돈을 주고도 얻기 힘든 희귀한 장비들이 포함되어 있어 동아리 간의 경쟁이 치열한 편이에요."
300-18 = "3;마이;00;선생님이 이끄시는 학생들은 이 경쟁에서 얼마나 높은 점수를 얻을 수 있을까요?\n#3;m3"
300-19 = "3;마이;03;그럼 무운을 빌겠습니다! 재미있는 기삿거리라도 가져오시면 더 좋고요!\n#3;em;[음표]\n#3;greeting"

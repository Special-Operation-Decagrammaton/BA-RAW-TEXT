[translation]
300-1 = "งานประกวดกลยุทธ์สหพันธ์!"
300-2 = "สนามกีฬาหลัก คิโวทอส"
300-3 = "ในที่สุดก็ถึงเทศกาลดังของคิโวทอส งานประกวดกลยุทธ์สหพันธ์ที่เลื่องชื่อได้เริ่มขึ้นแล้วค่ะ!"
300-4 = "ฉันรับรู้ได้ถึงความพร้อมและความร้อนแรงของนักเรียนทุกคนเลยค่ะ!"
300-5 = "และความพิเศษในครั้งนี้ หัวข้อก็คือ...! เรามาฟังความรู้สึกของคุณครูของชาเล่ต์#nที่เป็นผู้นำนักเรียนเข้าร่วมในการแข่งขันครั้งนี้ดูนะคะ"
300-6 = "คุณครูมีความเห็นเรื่องการแข่งขันครั้งนี้ยังไงบ้างคะ?"
300-8 = "คะ...? จะบอกว่าไม่รู้จักงานประกวดกลยุทธ์สหพันธ์เหรอคะ? "
300-9 = "แบบนั้นมัน... พิเศษมากเลยนะคะ!"
300-10 = "[สุดช็อก บุคคลที่น่าสนใจ คุณครูของชาเล่ต์ \"งานประกวดกลยุทธ์สหพันธ์ไม่ใช่เรื่องที่ฉันสนใจ....\"]"
300-11 = "การรายงานที่เป็นอันตรายงั้นเหรอ? ดูเป็นคำพูดที่น่าเศร้าจัง#n[คิโวทอสรายเดือน] ของพวกเราเขียนแต่รายงานที่เป็นเรื่องจริงเท่านั้นนะคะ!"
300-12 = "อืม... มันอาจจะหลุดโฟกัสไปนิดหน่อย"
300-13 = "ยังไงก็เป็นเรื่องใหญ่อยู่ดี คุณครูไม่รู้จักงานประกวดกลยุทธ์งั้นเหรอ..."
300-14 = "เรื่องที่ไม่รู้ก็ค่อยๆ เรียนรู้ไปก็ได้ค่ะ ฉันจะคอยแนะนำให้คุณครูเอง!\n"
300-15 = "งานประกวดกลยุทธ์สหพันธ์คืองานที่ทางองค์การนักเรียนจัดขึ้นเพื่อให้นักเรียนได้#nแข่งขันกลยุทธ์กันค่ะ"
300-16 = "เราเช่าพื้นที่ต่างๆ ภายในคิโวทอสเพื่อประเมินการต่อสู้ และมอบรางวัลต่างๆ ให้ตามระดับค่ะ!\n\n"
300-17 = "ในบรรดาสิ่งของที่มอบให้เป็นของรางวัลแล้ว จะมีของหายากมากๆ ที่ใช้เงินหาซื้อไม่ได้รวมอยู่ด้วย#nเพราะแบบนั้น ชมรมต่างๆ ถึงแข่งขันกันอย่างดุเดือดเพื่อให้ได้มันไปน่ะค่ะ"
300-18 = "นักเรียนที่คุณครูดูแลอยู่จะได้คะแนนไปกี่คะแนนกันนะ?"
300-19 = "ถ้าอย่างนั้นก็ขอให้โชคดีนะคะ! ขอให้หาข่าวสนุกๆ มาได้นะคะ!"

[translation]
300-1 = "聯合戰術大賽"
300-2 = "奇普托斯．主運動場"
300-3 = "奇普托斯的盛事，聯合戰術大賽總算要華麗地揭開序幕了！"
300-4 = "學生們的熱情已經讓現場氣氛非常火熱！"
300-5 = "這次特別邀請到話題中心人物！親自率領學生參與大賽的夏萊老師，讓我們來聽聽看他有什麼感想。"
300-6 = "請問對於這次大賽抱持著怎麼樣的覺悟呢？"
300-8 = "……咦？你不知道聯合戰術大賽是什麼？ "
300-9 = "這……是大新聞呢！"
300-10 = "＜震驚！話題人物夏萊的老師：我對聯合戰術大賽沒有興趣……＞"
300-11 = "咦，你說這個寫法帶有惡意是嗎？沒有那種事情。#n我們《奇普托斯月刊》一直以來都是以事實為基礎對事件進行報導！"
300-12 = "雖然……偶爾也會偏移焦點。"
300-13 = "總之這真是件大事。老師竟然不了解聯合戰術大賽……"
300-14 = "不過不清楚的事，從現在開始慢慢學就好。讓我來告訴你吧！"
300-15 = "聯合戰術大賽是由聯邦學生會主辦，讓學生們競爭彼此戰術的大賽。"
300-16 = "借用奇普托斯內各式各樣的空間對戰鬥進行評價，並依據排名授予獎勵！"
300-17 = "尤其因為獎品中包含用錢也很難買到的珍貴裝備，使社團間的競爭變得更加激烈。"
300-18 = "老師率領的學生們究竟能在這場大賽中獲得多高的名次呢！？"
300-19 = "那麼祝老師武運昌隆！#n啊，另外，如果能給我一些有趣的新聞題材我會很開心的！"

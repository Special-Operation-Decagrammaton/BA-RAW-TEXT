[translation]
300-1 = "Tactical Challenge!"
300-2 = "Kivotos Main Stadium"
300-3 = "At long last, the Tactical Challenge, a Kivotos tradition, has begun!"
300-4 = "I can already feel the students' excitement in the air!"
300-5 = "Now, let's have the guest of honor, Schale's own teacher, tell us more about leading the students in this event."
300-6 = "How fired up are you to win this competition?"
300-8 = "...What? You don't know what the Tactical Challenge is?"
300-9 = "That...is such...a hot scoop!"
300-10 = "(Schale's Sensei, the talk of the town, claims no interest in the Tactical Challenge... How scandalous!)"
300-11 = "Fake news? Think again. Kivotos Monthly only sticks to the facts!"
300-12 = "Well...I suppose we do sensationalize every once in a while."
300-13 = "Never mind that, though. The real story here is that YOU don't know anything about the challenge..."
300-14 = "Well, it's never too late to learn. I can help you with that!"
300-15 = "The Tactical Challenge is a competition between students organized by the General Student Council."
300-16 = "Several locations around Kivotos are used as combat grounds, and the students are rewarded according to their rankings!"
300-17 = "The potential prizes include very rare equipment that can't be bought with money, so competition between clubs is fierce."
300-18 = "I'm curious to see how your students will fare and how many points they can earn!"
300-19 = "So good luck to you! And I wouldn't mind if you did something else worth reporting on!"

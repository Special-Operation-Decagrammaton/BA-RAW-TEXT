[translation]
1003705-1 = "保安委員長的打掃"
1003705-2 = "太慢了吧！"
1003705-3 = "在早上7點前到事務局前，不是這麼說了嗎！"
1003705-4 = "[s]「抱歉，我遲到了……」"
1003705-5 = "遲到10分鐘很嚴重哦！在赤冬聯邦學園，持續流逝的這個時間也被認為是財產之一！"
1003705-6 = "每次說著藉口浪費時間時，罪狀會越來越重哦！"
1003705-7 = "[s]「是嗎……話說回來，一定要在這麼早的時間打掃嗎？」"
1003705-8 = "當然。這種事情，要在大家的生活開始前做比較好吧。"
1003705-9 = "因為是大家整天都會使用的場所，所以這個時間是最可以集中精神打掃的。"
1003705-10 = "必須在大家上學前，讓地板的水氣也確實乾燥。"
1003705-11 = "老師卻無視這點，在這個分秒必爭的狀況遲到「10分鐘」……"
1003705-12 = "如果因為這個10分鐘，打掃不完怎麼辦！？"
1003705-13 = "因為這樣，如果有學生滑倒呢！？"
1003705-14 = "那正是，對於赤冬聯邦學園明顯的背叛行為！也就是和間諜一樣！"
1003705-15 = "[s]「抱，抱歉……那就，趕快開始吧。」"
1003705-16 = "呣，那也是正論呢。雖然不甘心但沒錯。"
1003705-17 = "關於老師遲到的處罰，等結束了廁所清潔再說吧。"
1003705-18 = "老師也好好的挽回名譽，確實的努力打掃！"
1003705-19 = "那麼即刻起，開始「革命性的廁所清潔」！"
1003705-22 = "― 可惡……這個縫隙的髒污，還挺頑強的嘛。[wa:4220] "
1003705-25 = "― 不過，在我這個保安委員長的猛擊下[wa:2830] "
1003705-27 = "― 能撐到什麼時候呢？"
1003705-30 = "― 哼哼……[wa:540] "
1003705-32 = "― 別小看了這個新兵器的力量哦。[wa:2420] "
1003705-35 = "― 只要有了這個新購入的清潔劑，[wa:1320] "
1003705-37 = "― 連碰不太到的縫隙都能清得很完美！[wa:1680] "
1003705-40 = "― 哈，等等老師！鏡子和玻璃用清潔劑洗過後，[wa:2720] "
1003705-42 = "― 要用乾擦將水氣確實地去除，不是說過了嗎！[wa:1680] "
1003705-45 = "― 這種情況，特別要用報紙，[wa:1650] "
1003705-47 = "― 便能取回它真正的光輝！[wa:1470] "
1003705-50 = "― 還有，這種洗潔液[wa:1500] "
1003705-52 = "― 在密室使用的話相當的危險。[wa:1100] "
1003705-55 = "― 使用的時候一定要記得通風！[wa:1130] "
1003705-58 = "― 在充分注意安全的基礎上，[wa:1240] "
1003705-60 = "― 將威脅赤冬衛生環境的汙染物質們，[wa:3050] "
1003705-63 = "― 徹底地驅除！[wa:940] "
1003705-66 = "呼……總算在時間內結束了呢。"
1003705-67 = "老師也很努力嘛，讓你抵銷早上的失誤吧！"
1003705-68 = "不過話說回來，今天的狀態比平常更加完美呢。"
1003705-69 = "看著像這樣被磨得光亮的狀態，心靈就像是被洗滌了啊……"
1003705-70 = "……嗯，怎麼了老師？一直盯著我看，有什麼想說的嗎？"
1003705-71 = "[s1]「……好厲害的打掃能力呢。」\n[s2]「我對瑪麗娜，重新另眼相看了。」"
1003705-72 = "哼哼，再多稱讚一點也可以哦。"
1003705-73 = "哼哼，再多稱讚一點也可以哦。"
1003705-74 = "畢竟我是……偉大的赤冬聯邦學園的，保安委員長啊！"
1003705-75 = "比起處理反抗事務局的不安份子，這點程度只是簡單的事！"
1003705-76 = "[ns]「但是總覺得，該說是前所未有的散發了光芒嗎……」"
1003705-78 = "[ns]「……瑪麗娜，要不要做看看整潔部的部長？」"
1003705-79 = "你，你說什麼！？"
1003705-80 = "你在說什麼，你把赤冬聯邦學園的保安委員長當作什麼了！"
1003705-81 = "作為瞄準赤冬聯邦學園的下一屆學生會長的身份，怎麼可以落到那種平凡的職務啊！"
1003705-82 = "嘛確實，雖然打掃的時光很快樂……"
1003705-83 = "保安委員長和整潔部部長的兼任……那樣的話，也許不錯呢。"
1003705-84 = "不過現在，「整潔部部長」的位置是由潔莉諾會長兼任的。我為了要成為整潔部的部長要……"
1003705-85 = "……再一次引起政變嗎？"
1003705-87 = "（這之後，送了開始策劃壯大計劃的瑪麗娜回去後回到了夏萊）"

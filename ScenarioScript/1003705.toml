[translation]
1003705-1 = "การทำความสะอาดของหัวหน้าคณะฯ"
1003705-2 = "มาสายนะครู!"
1003705-3 = "ฉันบอกไปแล้วนี่นาว่าให้มาที่หน้าอาคารสำนักเลขาธิการก่อน 7 โมงเช้า!"
1003705-4 = "[s] \"ขอโทษที่มาสายนะ\""
1003705-5 = "ถึงจะแค่ 10 นาทีก็ถือว่าสายอยู่ดี! ที่สหภาพเรดวินเทอร์ เรามองว่าเวลาเป็นเงินเป็นทอง!"
1003705-6 = "เพราะงั้นไม่ว่าจะเป็นคำแก้ตัวอะไรก็ฟังไม่ขึ้นทั้งนั้น!"
1003705-7 = "[s] \"แล้วนี่เราต้องมาทำความสะอาดแต่เช้าขนาดนี้ด้วยเหรอ?\""
1003705-8 = "ถามอะไรไม่เข้าเรื่อง เราต้องทำความสะอาดห้องน้ำก่อนเริ่มคลาสเรียนอยู่แล้วไม่ใช่เหรอ? นี่มันเรื่องพื้นๆ"
1003705-9 = "พอเริ่มคลาสเรียนแล้ว นักเรียนก็จะมาเข้าห้องน้ำกันเป็นแถว ถ้าไปทำความสะอาดตอนนั้นก็เป็นการ#nรบกวนน่ะสิ"
1003705-10 = "เพราะงั้นเราถึงต้องทำความสะอาดให้เอี่ยมอ่องก่อนนักเรียนจะมาโรงเรียน"
1003705-11 = "แต่ฉันต้องมาเสียเวลาที่มีค่าตั้ง 10 นาทีเพราะครู..."
1003705-12 = "ถ้าการมาช้า 10 นาทีของครูทำให้เราทำความสะอาดไม่เสร็จจะทำยังไง!"
1003705-13 = "ถ้าการมาช้า 10 นาทีของครูทำให้พื้นไม่แห้งจนนักเรียนที่มาเข้าห้องน้ำลื่นล้มล่ะ!"
1003705-14 = "นี่มันคือการทำลายสหภาพเรดวินเทอร์อย่างยิ่งใหญ่! ฉันจะแจ้งข้อหาสายลับ!  "
1003705-15 = "[s] \"ถ้าเป็นงานรีบขนาดนั้น ทำไมเราไม่เริ่มเลยล่ะ?\""
1003705-16 = "อืม มีเหตุผล ถึงจะน่าโมโห แต่ครูก็พูดถูก"
1003705-17 = "ขอทำความสะอาดห้องน้ำก่อนแล้วกัน แล้วค่อยลงโทษครูทีหลัง"
1003705-18 = "ถ้าครูอยากชดเชยความผิดที่มาสาย ก็จงตั้งใจทำความสะอาดเข้าล่ะ!"
1003705-19 = "เอาละ เริ่ม <ทำความสะอาดห้องน้ำแบบปฏิวัติ> ได้!"
1003705-22 = "― ชิ... รอยเปื้อนนี่มันติดแน่นทนนานจริงๆ[wa:3460] "
1003705-25 = "― แต่... จะทนการจู่โจมของหัวหน้าคณะความมั่นคง[wa:1750] "
1003705-27 = "― ไปได้อีกนานแค่ไหนกัน?"
1003705-30 = "― ฮุฮุ[wa:540] "
1003705-32 = "― อย่ามาดูถูก พลังของอาวุธใหม่ชิ้นนี้นะ[wa:1500] "
1003705-35 = "― ถ้ามีน้ำยาทำความสะอาดที่ซื้อมาใหม่ขวดนี้ละก็...[wa:10] "
1003705-37 = "― ขจัดได้แม้แต่คราบฝังแน่นที่อยู่ในจุดที่ขัดถูไม่ถึง[wa:320] "
1003705-40 = "― เดี๋ยวก่อน! รอก่อนสิครู ฉันบอกไปแล้วไม่ใช่รึไง[wa:1680] "
1003705-42 = "― ว่าหลังจากใช้น้ำยาเช็ดกระจกกับหน้าต่างแล้ว อย่าใช้ผ้าแห้งเช็ดออกน่ะ![wa:10] "
1003705-45 = "― การเช็ดกระจกแบบนี้ ต้องใช้กระดาษหนังสือพิมพ์ ถึงจะเช็ดออกหมดได้[wa:10] "
1003705-47 = "― กระจกจะได้กลับไปใสสะอาด เหมือนเดิมยังไงเล่า![wa:150] "
1003705-50 = "― อีกอย่าง น้ำยาทำความสะอาดแบบนี้น่ะ[wa:460] "
1003705-52 = "― ถ้าเอาไปใช้ที่ห้องปิดละก็ คงจะอันตรายมากๆ เลย[wa:10] "
1003705-55 = "― และหลังเช็ดเสร็จแล้ว ก็ต้องระบายอากาศให้ดีด้วย![wa:10] "
1003705-58 = "― เราต้องระมัดระวัง เรื่องความปลอดภัย[wa:320] "
1003705-60 = "― สิ่งสกปรกอะไรก็ตาม ที่คุกคามสุขอนามัยของสหภาพเรดวินเทอร์[wa:1450] "
1003705-63 = "― จะต้องถูกกวาดล้าง ออกไปให้หมด![wa:10] "
1003705-66 = "ฮู่วว... โชคดีที่ทำความสะอาดห้องน้ำเสร็จทันเวลา"
1003705-67 = "ต้องขอบคุณที่ครูให้ความร่วมมือเป็นอย่างดี เราเลยทำความสะอาดเสร็จเร็ว งั้นฉันจะอนุโลมเรื่อง#nการมาสายเช้านี้ให้แล้วกัน อย่าลืมบุญคุณนี้ล่ะ"
1003705-68 = "จะว่าไป ถือว่าวันนี้ทำความสะอาดได้เยี่ยมยอดกว่าทุกครั้งเลยนะ"
1003705-69 = "การได้ดูโถส้วมที่ไม่มีคราบสกปรกเหลืออยู่ ทำให้ฉันผ่อนคลายได้ขนาดนี้เลย..."
1003705-70 = "หืม? ทำท่าเหมือนจะพูดอะไรเลย มีอะไรเหรอครู?"
1003705-71 = "[s1] \"ทำความสะอาดเก่งจังเลยนะ\"\n[s2] \"ครูละนับถือมารินะเลยจริงๆ\""
1003705-72 = "ฮุฮุ จะชมอีกก็ได้นะ"
1003705-73 = "ฮุฮุ จะชมอีกก็ได้นะ"
1003705-74 = "ก็ฉันเป็นถึงหัวหน้าคณะความมั่นคงแห่งสำนักเลขาธิการเรดวินเทอร์นี่นา"
1003705-75 = "หากเทียบกับงานกำจัดคนน่าสงสัยที่เป็นปฏิปักษ์กับสำนักเลขาธิการแล้ว งานทำความสะอาดก็แค่งาน#nง่ายๆ เหมือนปอกกล้วยเข้าปากนั่นแหละ"
1003705-76 = "[ns] \"วันนี้ดูสนุกมากกว่าทุกครั้งเลยนะ\""
1003705-78 = "[ns] \"มารินะเหมาะกับการเป็นหัวหน้าฝ่ายทำความสะอาดมากกว่าอีกนะ\""
1003705-79 = "ฮะ? ว่าไงนะ?!"
1003705-80 = "เป็นไปไม่ได้หรอก! เห็นหัวหน้าคณะความมั่นคงของสหภาพเรดวินเทอร์เป็นยังไงกัน!"
1003705-81 = "ฉันอยากเป็นถึงประธานสภานักเรียนในสมัยหน้า จะให้ไปพอใจกับตำแหน่งบ้านๆ แบบนั้นได้ยังไง!"
1003705-82 = "แต่ฉันก็ยอมรับนะว่าชอบงานทำความสะอาดห้องน้ำที่สกปรกให้สะอาดวิ๊งวับ..."
1003705-83 = "ถ้าได้รับผิดชอบทั้งตำแหน่งหัวหน้าคณะความมั่นคงและหัวหน้าฝ่ายทำความสะอาดพร้อมกัน ฉันคงไปลองคิดดู..."
1003705-84 = "แต่ตอนนี้ท่านประธานเชริโน่ดำรงตำแหน่งหัวหน้าฝ่ายทำความสะอาดอยู่ ถ้าฉันจะขึ้นเป็นหัวหน้า#nฝ่ายทำความสะอาดละก็..."
1003705-85 = "ก็ต้องก่อปฏิวัติเหรอ...?"
1003705-87 = "(คุณครูปล่อยมารินะไว้กับความคิดเพี้ยนๆ แล้วกลับมายังชาเล่ต์)"

1003705-66 = "3;마리나;04;후우…… 다행히 시간 내에 화장실 청소를 무사히 끝마칠 수 있었군.\n#3;a\n#3;em;…"
1003705-67 = "3;마리나;11;선생의 협력 덕분에 화장실을 빠르게 청소할 수 있었으니, 아침의 실수는 특별히 눈 감아 주도록 하지. 감사히 여기도록!\n#3;hophop"
1003705-68 = "3;마리나;01;그나저나 오늘의 청소는 평소보다 더욱 완벽한 것 같군."
1003705-69 = "3;마리나;03;더러운 때가 하나도 남지 않은 변기를 지켜보고 있노라니, 마음이 편안해지는 것만 같아…….\n#3;em;[음표]"
1003705-70 = "3;마리나;01;응? 무슨 하고 싶은 말이라도 있는 건가, 선생?"
1003705-71 = "[s1] \"……엄청난 청소 능력이야.\"\n[s2] \"마리나를 다시 봤어.\""
1003705-72 = "3;마리나;03;후후, 얼마든지 칭찬해도 좋다.\n#3;em;[재잘]"
1003705-73 = "3;마리나;03;후후, 얼마든지 칭찬해도 좋다.\n#3;em;[재잘]"
1003705-74 = "3;마리나;11;이 몸은 위대한 붉은겨울 사무국의 보안위원장이니까!"
1003705-75 = "3;마리나;11;사무국을 적대하는 불순분자들을 처치하는 것에 비하면 화장실 청소쯤은 간단한 일이지!"
1003705-76 = "[ns] \"하지만 어쩐지 평소보다 더 즐거워 보이던 걸…….\""
1003705-77 = "#wait;1500"
1003705-78 = "[ns] \"마리나는 보안위원장보다 청소부장을 맡는 게 더 좋지 않을까?\""
1003705-79 = "3;마리나;12;뭐, 뭐라고?!\n#3;em;[?!]\n#3;shake"
1003705-80 = "3;마리나;08;그, 그럴 리가 없잖아! 붉은겨울 학원의 보안위원장을 무엇으로 보는 거야!"
1003705-81 = "3;마리나;04;차기 학생회장을 노리는 몸으로서, 그런 평범한 직책에 만족할 수는 없어!"
1003705-82 = "3;마리나;10;……하지만 확실히, 더러워진 화장실을 반짝반짝하게 청소하는 일은 꽤나 즐거웠고…….\n#3;em;…"
1003705-83 = "3;마리나;99;보안위원장과 청소부장을 겸임하는 정도라면 생각해 볼 수 있지 않을까."
1003705-84 = "3;마리나;06;하지만 현재 청소부장의 자리는 체리노 회장님께서 겸임하고 계시는데. 그렇다면 내가 청소부장이 되기 위해서는……\n#3;stiff"
1003705-85 = "3;마리나;05;다시 쿠데타를 일으켜야 하나……?\n#3;em;[?]\n#fontsize;50"
1003705-86 = "#all;hide"
1003705-87 = "#na;(이후, 바보 같은 생각에 잠긴 마리나를 뒤로 한 채 샬레로 돌아왔다.)"

[translation]
1003705-1 = "#title;보안위원장의 청소"
1003705-2 = "3;마리나;01;늦었잖아!\n#3;a\n#3;em;[빠직]"
1003705-3 = "3;마리나;02;분명 오전 7시 전까지 사무국 건물 앞에 집합하라고 전달했을 텐데!"
1003705-4 = "[s] \"미안, 늦어버렸어…….\""
1003705-5 = "3;마리나;05;단 10분이라고는 해도 지각은 지각! 붉은겨울 학원의 시간은 금과 같거늘!\n#3;em;[!]\n#3;hophop"
1003705-6 = "3;마리나;01;어떤 변명으로도 용납할 수 없어!"
1003705-7 = "[s] \"그런데 이렇게 이른 시간에 청소를 할 필요가 있어?\""
1003705-8 = "3;마리나;02;선생도 당연한 것을 묻는군. 화장실은 일과 전에 청소해두는 것이 상식 아닌가?\n#3;em;[반응]"
1003705-9 = "3;마리나;99;일과 시간에는 사람들이 끊임없이 화장실을 이용하려 할 테니, 방해받지 않고 청소를 마무리할 수 없거든."
1003705-10 = "3;마리나;03;그러니 학생들이 등교하기 전에 바닥의 물기까지 완벽히 치워둬야지."
1003705-11 = "3;마리나;01;그런데 선생 때문에 이 귀중한 청소 시간을 10분이나 낭비하다니…….\n#3;em;…"
1003705-12 = "3;마리나;05;이 10분 때문에 화장실 청소를 제시간에 끝마치지 못한다면 어쩔 셈이지?"
1003705-13 = "3;마리나;99;10분 때문에 바닥이 덜 말라, 화장실을 이용하던 학생들이 자칫 미끄러지기라도 한다면……!\n#3;stiff"
1003705-14 = "3;마리나;05;그야말로 붉은겨울 학원에 대한 중대한 사보타주다! 스파이 혐의로 고발하겠다!\n#3;hophop"
1003705-15 = "[s] \"그렇게 급한 일이라면 빨리 청소를 시작하는 게 좋지 않을까.\""
1003705-16 = "3;마리나;08;으음, 정론이군. 분하지만 맞는 말이야.\n#3;em;[땀]\n#3;stiff"
1003705-17 = "3;마리나;01;선생에 대한 처벌은 화장실 청소를 끝마친 뒤로 미루겠다."
1003705-18 = "3;마리나;03;선생도 아까의 실수를 만회하고 싶거든, 청소에 적극적으로 참여하도록!"
1003705-19 = "3;마리나;11;그럼 지금부터 <혁명적 화장실 청소>를 실시한다!\n#3;closeup"

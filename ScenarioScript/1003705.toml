[translation]
1003705-1 = "Security Committee Chair's Cleaning"
1003705-2 = "Late!"
1003705-3 = "Our scheduled time was not 7:10 or 7:05, was it? It was 7AM precisely!"
1003705-4 = "[s] \"Sorry. I overslept...\""
1003705-5 = "Ten minutes late is still late! We value punctuality here at Red Winter Academy!"
1003705-6 = "Your excuses are grounds for purging!"
1003705-7 = "[s] \"But why do we have to clean so early in the morning?\""
1003705-8 = "Sensei, your foolishness knows no bounds this morning.#nNaturally, we must clean the bathrooms before the day begins."
1003705-9 = "We would be constantly interrupted and unable to complete our job during regular school hours."
1003705-10 = "So we must scrub, clean, and give everything enough time to dry before students arrive."
1003705-11 = "And now we've wasted ten precious minutes from our strict schedule..."
1003705-12 = "Will you take responsibility if we're unable to complete our duties because of our lost time?"
1003705-13 = "What will you do if a student slips because the bathroom floors are still wet?"
1003705-14 = "I would have to report you immediately for sabotage against Red Winter Academy!"
1003705-15 = "[s] \"We should probably get started if it's that urgent.\""
1003705-16 = "A-As much as it pains me, I must agree with you."
1003705-17 = "I'll postpone your punishment until we've finished cleaning the bathrooms."
1003705-18 = "You should strive to make up for your mistake by cleaning extra vigorously!"
1003705-19 = "Now, let the Revolutionary Bathroom Cleaning begin!"
1003705-22 = "― Tch... The stain in this crevice is quite stubborn.[wa:2940] "
1003705-25 = "― But how long can it withstand[wa:2310] "
1003705-27 = "― my relentless attack?"
1003705-30 = "― Heh heh.[wa:380] "
1003705-32 = "― Never underestimate the power of my new weapon.[wa:1100] "
1003705-35 = "― With this new cleaning agent I bought,[wa:360] "
1003705-37 = "― there's no crevice that my hands can't clean![wa:520] "
1003705-40 = "― Wait, Sensei! You must remove the moisture completely.[wa:1360] "
1003705-42 = "― Get all the foam off the mirrors and windows![wa:680] "
1003705-45 = "― Then wipe it all again with newspaper.[wa:610] "
1003705-47 = "― That'll give you a truly streak-free shine![wa:190] "
1003705-50 = "― Also, this kind of cleaning agent[wa:500] "
1003705-52 = "― can be dangerous to use in a closed room.[wa:10] "
1003705-55 = "― Don't forget you need proper ventilation![wa:10] "
1003705-58 = "― Safety first![wa:1200] "
1003705-60 = "― Keep your wits about you when you're fighting contaminants![wa:1330] "
1003705-63 = "― Protect the hygiene of Red Winter Academy![wa:10] "
1003705-66 = "Fortunately, we completed our cleaning duties on time."
1003705-67 = "Your performance was acceptable. Therefore, you will not be punished for your misdemeanor this morning. Be grateful!"
1003705-68 = "Wasn't the act of cleaning simply...exhilarating?"
1003705-69 = "A sense of peace and tranquility washes over me at the sight of a squeaky clean toilet."
1003705-70 = "Is something the matter, Sensei?"
1003705-71 = "[s1] \"You're great at your job.\"\n[s2] \"I respect you, Marina.\""
1003705-72 = "Haha. Naturally!"
1003705-73 = "Haha. Naturally!"
1003705-74 = "I am the great security chairman of the Red Winter Office!"
1003705-75 = "Compared to eliminating the Secretariat's enemies, cleaning the bathroom is a piece of cake!"
1003705-76 = "[ns] \"You seemed like you were really enjoying it.\""
1003705-78 = "[ns] \"Maybe you should be the Chief of Sanitation.\""
1003705-79 = "Ch-Chief of S-Sanitation?!"
1003705-80 = "How... How DARE you?! How dare you disrespect me, the security chair of Red Winter Academy!"
1003705-81 = "I am going to become the next Student Council president! Not some measly Chief of Sanitation."
1003705-82 = "Although, I do find a lot of joy in the labors of bathroom cleaning..."
1003705-83 = "Maybe I can think about serving as both security chairman and Chief of Sanitation."
1003705-84 = "But, currently, President Cherino is Chief of Sanitation. If I wanted that position..."
1003705-85 = "...would I have to stage another coup?"
1003705-87 = "I left Marina with her runaway thoughts and went back to Schale."

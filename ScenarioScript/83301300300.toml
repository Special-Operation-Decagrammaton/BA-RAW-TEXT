[translation]
83301300300-6 = "มาโคโตะ ฉันมีเรื่องอยากคุยด้วย "
83301300300-11 = "หึหึหึ! แต่เราไม่มีเรื่องอะไรจะคุยกับเธอหรอกนะ!"
83301300300-12 = "ต่อให้เป็นเรื่องการตามตัวชมรมพัฒนาออนเซ็นที่ทำให้พวกเธอได้รับความเสียหายด้วยน่ะเหรอ?"
83301300300-13 = "ฮึ่ม! ต่อให้เป็นเรื่องแบบนั้น! เราก็ไม่อยากยื่นมือเข้าช่วยคณะกรรมการวินัยหรอก!"
83301300300-14 = "ทำแบบนั้นเสื่อมเสียชื่อเสียงเราหมด! เราไม่มีทางทำแบบนั้นแน่นอน!"
83301300300-15 = "ก็ได้ ฉันรู้อยู่แล้วละว่าต้องเป็นแบบนี้"
83301300300-20 = "(ถ้าไม่ใช่มาโคโตะ คนที่พอจะรู้ข้อมูลนี้ก็คงเป็น...)"

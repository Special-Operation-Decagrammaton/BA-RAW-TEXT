[translation]
10049110-1 = "後日談;過得還好嗎？ "
10049110-4 = "接下來為您播報下一則新聞。"
10049110-5 = "現在畫面中顯示的，是位於三一與格黑娜交界的Borderlands遊樂園。"
10049110-6 = "上週末舉行的活動──#n「魔法少女Heavy Caliber．Borderlands特別篇」，如今已圓滿落幕。"
10049110-7 = "不過由於表演過於震撼和逼真，有關演員真實身分的猜測也眾說紛紜。"
10049110-8 = "對此，遊樂園方面僅回應「基於隱私保護而無法透露，敬請期待下一次活動」。"
10049110-9 = "同時也有傳聞指出「本次表演是由夏萊的老師擔任監製」，#n然而目前夏萊方面並未正式做出回應。"
10049110-10 = "下一則新聞。"
10049110-11 = "聯邦學生會針對仿冒商品與不實廣告的處罰條例案……"
10049110-13 = "咦～這樣就結束了嗎？"
10049110-14 = "要是能再多提到一些細節就好了！#n比如「White很帥」、「Pink很可愛」、「艾拉很可怕」之類的！"
10049110-15 = "我反而認為這樣正好，澪紗同學。"
10049110-16 = "如果連到場的遊客都不知道有發生騷動，不是也挺好的嗎？"
10049110-17 = "說的也是！而且魔法少女的真實身分也必須保密嘛！"
10049110-18 = "雖然沒辦法以魔法少女的身分成名，不過作為自衛隊的超級巨星也已經足夠了！"
10049110-19 = "澪紗同學真有精神呢。"
10049110-20 = "啊，你們好呀，兩位。"
10049110-21 = "感覺上次見面已經是三天前的事了呢……時間過得真快。"
10049110-22 = "的確是三天前沒錯啊……？"
10049110-23 = "志美子同學，你是不是累了？"
10049110-24 = "剛才是在開玩笑啦，開玩笑！"
10049110-25 = "我好像還是第一次聽到志美子同學說笑話呢……！"
10049110-26 = "我剛才去書店買了一本叫做《讓人笑到昏倒的幽默技巧》的書！"
10049110-27 = "雖然只看了幾頁，但我應該很快就會看完！"
10049110-28 = "志美子同學做每件事都全力以赴呢。"
10049110-29 = "不是有句話說「總之先看說明書」嗎？#n我覺得書本就像是做某些事前的說明書唷。"
10049110-30 = "所以這次為了擔任惡之幹部，你也有事前做功課嗎！？"
10049110-31 = "因為時間有限的關係，所以準備得並不是很多。"
10049110-32 = "雖然是第一次接觸魔法少女的作品，不過託澪紗同學的福，我看得很開心。"
10049110-33 = "我也趁著這次的機會，開始看Heavy Caliber的動畫了。"
10049110-34 = "昨天已經看到第3季的第7集。#nWhite的服裝之所以會變成粉紅色的理由，其實還挺有趣的呢。"
10049110-35 = "是個關於「正義」的好故事。"
10049110-36 = "耶嘿嘿──！"
10049110-37 = "劇場版也一定要看哦！#n之前上映的《Heavy Caliber : Broken Arrow》真的超級好看！"
10049110-38 = "等大家都看完之後，我再詳細講解給你們聽！"
10049110-40 = "好的。如果無聊的話，也歡迎來圖書館找我哦。"
10049110-44 = "今天的巡邏很和平呢。"
10049110-45 = "都是一些常見的小問題。我覺得算是很和平的一天。"
10049110-46 = "鈴美同學能夠恢復精神，我真的超～級開心！"
10049110-47 = "因為鈴美同學在幫助別人之後，收到感謝時的表情是最帥氣的！"
10049110-48 = "所以我才會喜歡鈴美同學守護著的這條街道！"
10049110-49 = "自己在那個時候是什麼表情，我倒是不太清楚呢。"
10049110-50 = "謝謝你告訴我。"
10049110-54 = "……"
10049110-55 = "自衛隊……你應該不會真的要退出吧？"
10049110-60 = "呵呵……"
10049110-61 = "鈴美同學？"
10049110-62 = "澪紗同學當時對我說了那麼棒的話，我怎麼可能退出呢。"
10049110-63 = "我會做下去的──因為我做得到。"
10049110-68 = "哈啊～吃飽了吃飽了～"
10049110-69 = "隊長，一起走嘛！！"
10049110-70 = "唔，我好像吃太多了……"
10049110-71 = "能吃的時候就該盡量吃啊！"
10049110-75 = "嘖，什麼啊。這不是之前那群怪人嗎……！"
10049110-76 = "我們可沒做什麼壞事喔！！"
10049110-77 = "要是現在被攻擊的話，肚子會爆炸的……"
10049110-78 = "我也沒說你們做錯了什麼……"
10049110-79 = "……上個週末辛苦了。"
10049110-80 = "爆炸把目標炸飛，害你們沒拿到獎金……真是不好意思。"
10049110-81 = "可是超帥的耶！就像火箭一樣！"
10049110-82 = "多虧有各位的幫忙，才能避免事情繼續惡化。#n真的非常感謝。"
10049110-83 = "你們一開始明明是打算要抓住我的吧？#n其實我也沒有想幫忙的意思。"
10049110-84 = "雖然沒拿到獎金，不過至少玩得開心也吃到了燒肉……不用在意啦。"
10049110-85 = "燒肉！？"
10049110-86 = "老師他說雖然沒拿到獎金有點遺憾，#n但是因為我們做了好事，就請我們吃了本來打算拿獎金吃的燒肉。"
10049110-87 = "我們吃超多的哦～"
10049110-88 = "只是老師結帳的時候，看起來有點哀傷就是了……"
10049110-89 = "那真是太好了。看來結局還算順利呢。"
10049110-90 = "自衛隊居然會擔心我們頭盔團，這可真是稀奇。"
10049110-91 = "呼，飲料也喝得差不多了。"
10049110-92 = "我丟。"
10049110-96 = "可惡，真可惜。#n差一點就丟進垃圾桶了。"
10049110-97 = "如果丟進去就是三分球了呢，隊長。"
10049110-98 = "那我們先走啦。祝你們自衛隊什麼的玩得開心啊。"
10049110-103 = "請等一下。"
10049110-104 = "啊？"
10049110-105 = "垃圾要確實丟進垃圾桶哦？"
10049110-106 = "吼唷，很麻煩耶……#n而且飲料都灑出來了，我不想再去碰它。"
10049110-107 = "這樣最終還是得由清潔人員來清理。"
10049110-108 = "現在還來得及，請重新把它丟好。"
10049110-110 = "啊，那麼……"
10049110-111 = "你現在是在命令我們隊長嗎？"
10049110-112 = "隊長！就趁這個機會，讓他們見識見識上次沒展現到的威風吧！？"
10049110-113 = "咦？不，不是……啊……？"
10049110-114 = "（我只是想小心地撿起來重丟而已，這些傢伙怎麼……）"
10049110-115 = "看來沒辦法了。澪紗同學？"
10049110-116 = "是！Magical──！！！"
10049110-117 = "啊啊啊！我已經受夠魔法少女了啦！！！"

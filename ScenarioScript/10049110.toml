[translation]
10049110-1 = "Afterword;How Are You?"
10049110-4 = "And in other news..."
10049110-5 = "...Borderland Amusement Park, on the border between Trinity and Gehenna, had a special event today."
10049110-6 = "The \"Magical Girl Heavy Caliber Specials,\" which took place over the weekend, culminated in a mind-blowing live performance."
10049110-7 = "Fans are speculating about the cast members' identities after their well-received, thrilling finale."
10049110-8 = "We reached out for comment, but the amusement park only replied, \"We can't release that information, for privacy reasons. But please look forward to their next event.\""
10049110-9 = "There have also been rumors that Schale's Sensei may be the show's director. Schale has not yet responded to our requests for comment on that subject."
10049110-10 = "Next up..."
10049110-11 = "The General Student Council has proposed a bill to penalize counterfeit products and false advertising..."
10049110-13 = "Eh? That's it?"
10049110-14 = "They could've said, \"White was cool,\" or, \"Pink was cute,\" or, \"Era was scary!\""
10049110-15 = "I think this way is actually better, Reisa."
10049110-16 = "There was an incident, people could have been in danger, we handled it quietly, no harm done, no need to know."
10049110-17 = "I suppose you have a point. Magical girls' identities should be kept secret, after all!"
10049110-18 = "Guess that means I'll never get famous as a magical girl, but I can always be a superstar of the vigilante crew!"
10049110-19 = "Have I ever told you I like your enthusiasm?"
10049110-20 = "Ah, hello, you two."
10049110-21 = "Wow, when's the last time I saw you?"
10049110-22 = "Three days ago."
10049110-23 = "...Are you tired or something, Shimiko?"
10049110-24 = "No, just trying out a joke."
10049110-25 = "Your first joke?"
10049110-26 = "Well, almost. I just picked up a book called, \"How To Make Your Friends Fall Over Laughing,\" and..."
10049110-27 = "...well, I'm still on Chapter One. But I think I'll finish pretty quickly."
10049110-28 = "You really do commit, whatever you do."
10049110-29 = "Well, they say read the manual first, right? Most books are like manuals, in one way or another."
10049110-30 = "Does that mean you studied to become the evil officer?"
10049110-31 = "...Within the time I had."
10049110-32 = "I'd never really watched a magical girl show before, but thanks for the recommendation, Reisa. I had fun with it."
10049110-33 = "I've been watching it too."
10049110-34 = "I finished season 3 episode 7 yesterday. That lore about the pink outfit actually makes a whole lot of sense."
10049110-35 = "Plus the story has a lot to say about justice."
10049110-36 = "Heehee!!!"
10049110-37 = "There's a movie that just came out! \"Heavy Caliber: Broken Arrow.\" It's a really good watch!"
10049110-38 = "If you want to watch it together, I can explain things as we go along!"
10049110-40 = "Sounds good. Also, if you ever get bored, feel free to visit the library."
10049110-44 = "A nice, quiet patrol today."
10049110-45 = "We've only encountered the usual minor issues. Overall, it's been very peaceful."
10049110-46 = "Yeah. You know, it's always good to be out here with you, Suzumi."
10049110-47 = "I love it when you help others and people thank you for it! You always make that cool face!"
10049110-48 = "I love this neighborhood too, because you're the one who protects it!"
10049110-49 = "I make a cool face, huh? I wasn't aware of that."
10049110-50 = "Thank you for saying that."
10049110-54 = "..."
10049110-55 = "You're not...really quitting the Vigilante Crew, are you?"
10049110-60 = "Fufu..."
10049110-61 = "Suzumi?"
10049110-62 = "No way. Not after everything you've told me."
10049110-63 = "I'll keep at it, because I can."
10049110-68 = "Ah, I'm full. So full..."
10049110-69 = "Wait for me, Captain!"
10049110-70 = "Ugh, I think I ate too much..."
10049110-71 = "We should eat when we can!"
10049110-75 = "Tch, those weirdos from before...!"
10049110-76 = "We're not doing anything bad right now!!"
10049110-77 = "If you make us fight, I swear my belly's going to pop..."
10049110-78 = "I didn't say you were doing anything wrong."
10049110-79 = "...Thank you for your hard work last weekend."
10049110-80 = "I'm sorry you didn't get your bounty."
10049110-81 = "Though it was pretty cool to see her fly off from that explosion like a rocket."
10049110-82 = "Well, that aside, we prevented a worse incident. Thank you for your help, truly."
10049110-83 = "Well, I wasn't exactly TRYING to help. You were after ME until you weren't, remember."
10049110-84 = "But whatever. At least we ended up getting some barbecue out of it."
10049110-85 = "Barbecue?!"
10049110-86 = "Sensei's treat. They felt bad about us missing the bounty."
10049110-87 = "And we ate SOOO much."
10049110-88 = "I think Sensei felt worse when they saw the check at the end..."
10049110-89 = "Well, I'm glad it all worked out, then."
10049110-90 = "A vigilante teaming up with a Helmet Gangster. Never thought I'd see the day."
10049110-91 = "Phew, this drink was good too, by the way."
10049110-92 = "Hut!"
10049110-96 = "Tch, so close! I JUST missed that trash can."
10049110-97 = "That would have been a three-pointer, Captain."
10049110-98 = "All right, I'm outta here. Have fun with your Vigilante Crew or whatever."
10049110-103 = "Wait."
10049110-104 = "Huh?"
10049110-105 = "Trash does belong in the trash can, don't you think?"
10049110-106 = "Eh, I don't really want to touch it again. The drink's all splattered everywhere, so it's kinda gross..."
10049110-107 = "SOMEONE'S going to have to touch it when they clean up around here."
10049110-108 = "It's still not too late to make things right."
10049110-110 = "Ah, in that case..."
10049110-111 = "Wait a minute! Who are you to give orders to our captain, huh?"
10049110-112 = "C'mon, Captain! Let's teach 'em a lesson this time, yeah?!"
10049110-113 = "Eh? Oh, wait... Huh...?"
10049110-114 = "(I was just about to pick it up and put it in the trash can...)"
10049110-115 = "All right, then. Reisa?"
10049110-116 = "Let's get magical!"
10049110-117 = "Aaahh! No more magical girls!!"

[translation]
10049110-1 = "ย้อนวันวาน;สบายดีใช่มั้ยคะ?"
10049110-4 = "ไปกันที่ข่าวต่อไปค่ะ"
10049110-5 = "เป็นข่าวจากเหตุการณ์เมื่อสุดสัปดาห์ที่แล้ว ที่เกิดในสวนสนุกบอเดอร์แลนด์ที่ตั้งอยู่ในเขตทรีนิตี้ และเกเฮนน่าค่ะ"
10049110-6 = "งาน <สาวน้อยเวทมนตร์ เฮฟวี่ แคลิเบอร์ บอเดอร์แลนด์ สเปเชียล> ที่จัดขึ้นในช่วงสุดสัปดาห์จบลง#nอย่างประสบความสำเร็จค่ะ"
10049110-7 = "การแสดงที่น่าตื่นเต้นของเหล่านักแสดงได้รับการตอบรับเป็นอย่างดี และมีการคาดเดามากมาย#nเกี่ยวกับตัวตนของนักแสดงเหล่านั้นค่ะ"
10049110-8 = "ทางสวนสนุกกล่าวว่าไม่สามารถเปิดเผยข้อมูลนี้ได้ เนื่องจากเหตุผลด้านความเป็นส่วนตัว และขอให้ตั้งตารออีเวนต์อื่นที่จะจัดต่อไปค่ะ"
10049110-9 = "นอกจากนี้ยังมีข่าวลือว่าผู้กำกับการแสดงคือคุณครูของชาเล่ต์ แต่ทางชาเลต์ก็ไม่ได้ออกมาตอบโต้#nเรื่องนี้อย่างเป็นทางการค่ะ"
10049110-10 = "ข่าวต่อไปค่ะ"
10049110-11 = "องค์การนักเรียนเสนอระเบียบลงโทษเกี่ยวกับสินค้าปลอมแปลงและการโฆษณาเกินจริง..."
10049110-13 = "อ้าว มีแค่นี้เหรอคะ?"
10049110-14 = "ถ้าลงรายละเอียดว่า 'ไวต์เท่ที่สุด พิงค์คิวท์มากเลย' หรือไม่ก็ 'เอร่าน่ากลัว' ก็ดีสิคะ!"
10049110-15 = "ฉันว่าแบบนี้ดีแล้วละค่ะ คุณเรอิสะ"
10049110-16 = "การที่ผู้คนไม่รู้ว่าเกิดเรื่องวุ่นวายขึ้นในสวนสนุกที่ออกไปเที่ยวเล่นกัน ฉันว่าน่าจะดีกว่านะคะ?"
10049110-17 = "นั่นสิเนอะ จริงด้วยค่ะ! แล้วเราก็จะให้ตัวตนของสาวน้อยเวทมนตร์เปิดเผยไม่ได้ด้วยค่ะ!"
10049110-18 = "ถึงจะโด่งดังด้วยสาวน้อยเวทมนตร์ไม่ได้ แต่แค่ฉันได้เป็นซูเปอร์สตาร์แห่งกลุ่มรักษาความสงบ#nนั่นก็เพียงพอแล้วค่ะ!"
10049110-19 = "คุณเรอิสะนี่กระปรี้กระเปร่าจังเลยนะคะ"
10049110-20 = "อ๊ะ สวัสดีค่ะทั้ง 2 คน"
10049110-21 = "เหมือนเราเจอกันครั้งสุดท้ายก็เมื่อ 3 วันก่อนเลย เวลาผ่านไปเร็วจังนะคะ"
10049110-22 = "อืม... ก็แค่ 3 วันนะคะ...?"
10049110-23 = "คุณชิมิโกะทำงานเหนื่อยจนเวลาไม่พอเปล่าคะ?"
10049110-24 = "ฉันล้อเล่นค่ะ ล้อเล่นน่ะ!"
10049110-25 = "นี่เป็นครั้งแรกเลยค่ะที่ฉันได้ฟังมุกจากคุณชิมิโกะ...!"
10049110-26 = "ฉันซื้อหนังสือเล่มนี้มาอ่านน่ะค่ะ! <ศิลปะแห่งอารมณ์ขันที่ทำให้ขำจนหงายหลัง>!"
10049110-27 = "ตอนนี้ฉันยังอ่านได้ไม่กี่หน้า แต่คิดว่าน่าจะอ่านจบเร็วๆ นี้ค่ะ"
10049110-28 = "คุณชิมิโกะเต็มที่กับทุกอย่างจังเลยนะคะ"
10049110-29 = "มีคำว่าก่อนทำอะไรก็ให้อ่านคู่มือก่อนใช่มั้ยล่ะคะ? ฉันคิดว่าหนังสือเป็นเหมือนคู่มือสำหรับการทำ#nทุกอย่างเลยค่ะ"
10049110-30 = "ได้ไปอ่านคู่มือการเป็นหัวหน้าวายร้ายมาด้วยหรือเปล่าคะ?!"
10049110-31 = "ฉันไม่ค่อยมีเวลา ก็เลยศึกษาได้ไม่ค่อยเยอะค่ะ"
10049110-32 = "นี่เป็นครั้งแรกที่ฉันได้ดูแอนิเมชันสาวน้อยเวทมนตร์เลย ต้องขอบคุณคุณเรอิสะที่แนะนำอะไรสนุกๆ นะคะ"
10049110-33 = "ฉันก็ไปดูแอนิเมชันเฮฟวี่ แคลิเบอร์มาเหมือนกันค่ะ"
10049110-34 = "เมื่อวานถึงภาค 3 ตอนที่ 7 แล้วค่ะ ตอนที่ไวต์ได้มาใส่ชุดสีชมพู ฉันว่าเหตุผลนั้นมันสนุกดีนะคะ"
10049110-35 = "เป็นเรื่องราวดีๆ ของความยุติธรรมเลยละค่ะ"
10049110-36 = "ฮิฮิ!!!"
10049110-37 = "ต้องดูภาคที่ฉายในโรงหนังด้วยค่ะ! <เฮฟวี่ แคลิเบอร์ โบรคเค่น แอร์โร่ว> ที่เพิ่งฉายไปสนุกมากๆ เลยละ!"
10049110-38 = "ถ้าไปดูมาแล้ว ฉันจะอธิบายเสริมให้อีกรอบค่ะ!"
10049110-40 = "ได้เลยค่ะ วันไหนถ้ารู้สึกเบื่อๆ ก็แวะมาที่ห้องสมุดได้เลยนะคะ"
10049110-44 = "การลาดตระเวนวันนี้สงบจังเลยนะคะ"
10049110-45 = "จะมีก็แค่ปัญหาเล็กๆ น้อยๆ ที่เกิดขึ้นตลอดอยู่แล้ว ฉันว่าค่อนข้างสงบสุขเลยค่ะ"
10049110-46 = "ฉันดีใจมากค่ะที่คุณสึซึมิกลับมามีกำลังใจแล้ว!"
10049110-47 = "สีหน้าตอนให้ความช่วยเหลือและได้รับคำขอบคุณของคุณสึซึมิน่ะเท่ที่สุดเลยค่ะ!"
10049110-48 = "ฉันก็เลยชอบย่านนี้ที่มีคุณสึซึมิคอยปกป้องมากเลย!"
10049110-49 = "ฉันไม่รู้ตัวเลยค่ะว่าตัวเองทำหน้าแบบไหน"
10049110-50 = "ยังไงก็ขอบคุณที่บอกนะคะ"
10049110-54 = "......"
10049110-55 = "ไม่ได้จะลาออก... จากกลุ่มรักษาความสงบจริงๆ ใช่มั้ยคะ?"
10049110-60 = "ฮุฮุ..."
10049110-61 = "คุณสึซึมิ?"
10049110-62 = "ตอนนั้นคุณเรอิสะช่วยพูดดีๆ กับฉันขนาดนั้น ฉันจะลาออกได้ยังไงล่ะคะ"
10049110-63 = "ฉันจะทำต่อค่ะ ก็นี่เป็นสิ่งที่ฉันทำได้นี่คะ"
10049110-68 = "อ่า... อิ่มจัง ท้องจะแตกแล้ว"
10049110-69 = "รอด้วยสิคะ หัวหน้า!!"
10049110-70 = "อึก กินมากไปหรือเปล่านะ..."
10049110-71 = "ตอนที่มีโอกาสได้กิน ก็ต้องกินให้หนำใจสิ!"
10049110-75 = "อ๊ะ อะไรเนี่ย พวกคนแปลกๆ ที่เจอกันคราวก่อนนี่นา...!"
10049110-76 = "พวกฉันไม่ได้ทำอะไรผิดมานะ!!"
10049110-77 = "ถ้าโดนโจมตีตอนนี้ละก็ มีหวังพุงแตกแน่เลย..."
10049110-78 = "ไม่ได้ทำผิดอะไรหรอกค่ะ..."
10049110-79 = "ต้องขอบคุณสำหรับสุดสัปดาห์ที่ผ่านมานะคะ..."
10049110-80 = "แล้วก็ขอโทษที่ทำให้เงินรางวัลลอยหายไปกับระเบิดด้วยนะคะ"
10049110-81 = "แต่ฉากนั้นก็สุดยอดเลยนะคะ! ลอยไปเหมือนจรวดเลยละ!"
10049110-82 = "แต่ยังไงพวกเราก็ป้องกันไม่ให้เกิดเรื่องเลวร้ายไปกว่านี้ได้นะคะ ต้องขอบคุณจริงๆ ค่ะ"
10049110-83 = "แต่ตอนแรกจะมาจับตัวพวกฉันไม่ใช่หรือไง? ไม่ได้ตั้งใจจะมาช่วยสักหน่อย"
10049110-84 = "ถึงจะเสียดายเงินรางวัล แต่ฉันก็สนุกมาก แถมได้กินเนื้อย่างอีก เพราะงั้นไม่ต้องกังวลไปหรอก"
10049110-85 = "เนื้อย่างเหรอคะ?!"
10049110-86 = "ครูบอกว่าน่าเสียดายที่ไม่ได้เงินรางวัล แต่ในเมื่อพวกฉันทำเรื่องดีๆ กัน ก็เลยเลี้ยงเนื้อย่างให้น่ะ เดิมทีพวกฉันตั้งใจจะเอาเงินนั่นไปกินเนื้อย่างกันอยู่แล้วด้วย"
10049110-87 = "กินมาจนพุงกางเลยค่ะ"
10049110-88 = "แต่ตอนคิดเงิน เหมือนคุณครูจะดูเศร้าๆ นะ..."
10049110-89 = "โล่งอกไปทีนะคะ ดีใจที่ทุกคนได้กินของอร่อยๆ กันด้วยค่ะ"
10049110-90 = "กลุ่มรักษาความสงบเป็นห่วงเป็นใยแก๊งหมวกกันน็อกด้วยเหรอเนี่ย? คิดไม่ถึงเลยนะ?"
10049110-91 = "ฮู่ว กินน้ำหมดกระป๋องแล้ว"
10049110-92 = "ฮึบ"
10049110-96 = "อ๊ะ น่าเสียดาย อีกนิดเดียวก็โยนลงถังขยะแล้ว"
10049110-97 = "ถ้าลงถัง ลูกเมื่อกี้จะเป็นลูก 3 แต้มเลยนะคะหัวหน้า"
10049110-98 = "งั้นพวกฉันไปก่อนละ ขอให้สนุกกับงานของกลุ่มรักษาความสงบหรืออะไรนั่นก็แล้วกันนะ..."
10049110-103 = "หยุดอยู่ตรงนั้นเลยค่ะ"
10049110-104 = "หืม?"
10049110-105 = "ต้องทิ้งขยะให้ลงถังก่อนสิคะถึงจะไปได้"
10049110-106 = "เฮ้อ น่ารำคาญจัง... น้ำหกเลอะแล้วด้วย ฉันไม่อยากไปหยิบหรอก"
10049110-107 = "จะให้ขยะของตัวเองเป็นภาระของคนอื่นเหรอคะ?"
10049110-108 = "ตอนนี้คุณยังแก้ไขสิ่งที่ทำลงไปได้อยู่นะคะ"
10049110-110 = "อ่า ถ้างั้น..."
10049110-111 = "กล้าสั่งหัวหน้าพวกเราเหรอ?"
10049110-112 = "หัวหน้า! ใช้โอกาสนี้แสดงความน่าเกรงขามให้คนพวกนี้เห็นเลยค่ะ!"
10049110-113 = "ห๊ะ? ดะ... เดี๋ยว... อ่า...?"
10049110-114 = "(กะว่าจะค่อยๆ เดินไปเก็บแล้วทิ้งให้ลงถังแท้ๆ... แต่เจ้าพวกนี้...)"
10049110-115 = "งั้นก็ช่วยไม่ได้นะคะ คุณเรอิสะ?"
10049110-116 = "ค่ะ! เมจิคัล!!!!!"
10049110-117 = "ว้ากกก เลิกเล่นเป็นสาวน้อยเวทมนตร์ได้แล้ว!!!"

[translation]
1009103-1 = "放學後的樂團部"
1009103-9 = "打擾了～唉，好累……"
1009103-10 = "鞋子也先脫掉吧……"
1009103-14 = "……嘿咻。"
1009103-19 = "呼！！總算舒服多了。"
1009103-20 = "……嗯？"
1009103-21 = "……老師？為什麼笑成那樣？#n……遇到什麼好事了嗎？"
1009103-22 = "[s1]「雖然我一直告訴你不用太拘謹……」\n[s2]「千紗真的像回到自己家一樣呢。」"
1009103-25 = "怎，怎麼了嗎？莫非老師其實不是很歡迎我來！？#n還是我這樣會讓你覺得很有壓力……！？"
1009103-26 = "……嗯？"
1009103-27 = "不是嗎？"
1009103-28 = "……呼，那就好。#n我還想說要是你真的那麼想該怎麼辦呢……真是嚇到我了。"
1009103-32 = "……不，等等。"
1009103-33 = "還是再仔細想想比較好。#n說不定這只是老師的場面話……"
1009103-34 = "我最近……是不是真的有點太隨便……或是太放縱了……"
1009103-35 = "[s3]「你又開始說一些奇怪的話囉。」\n[s4]「真的不用想太多，還是跟我說說今天發生了什麼事吧。」"
1009103-41 = "……哈哈。真，真的嗎？"
1009103-42 = "那這次也相信你囉……"
1009103-43 = "嗯……今天的事情嗎……"
1009103-44 = "雖然也沒什麼大不了的……"
1009103-45 = "就像剛才在MomoTalk上說的一樣，只是練習的時間延長了而已。#n因為我們今天難得很有默契，所以就決定要多練習幾次。"
1009103-46 = "其實練習這種事，如果不順利反而會提早結束……#n但順利的時候就可能會變得沒完沒了。"
1009103-47 = "結果就是今天連買來的甜點都沒吃完就解散了。#n那瞬間我還有點懷疑我們到底是不是甜點部呢。"
1009103-48 = "總覺得我們最近不太像「放學後的甜點部」，反而更像「放學後的樂團部」啊。"
1009103-49 = "……啊，對了。"
1009103-50 = "說到這個我才想起來，本來打算今天吃的那些甜點，最後又被我帶回來了呢。"
1009103-51 = "老師要吃嗎？#n如果你不介意的話，我想要在這裡吃。"
1009103-52 = "[s5]「哦，真幸運～！」\n[s6]「我正好也想補充一點糖分，真是太好了。」"
1009103-55 = "呵呵呵。好，那你也過來坐吧，我對今天的甜點可是很有自信的哦。"
1009103-56 = "今天帶來的東西就是～鏘鏘！"
1009103-57 = "[s7]「是『Café．Mille-feuille』的……！」\n[s8]「『挖著吃的巧克力餅乾蛋糕』！！」"
1009103-60 = "咦，真的假的！你竟然一眼就認出來了！？"
1009103-61 = "難道老師也已經是個甜點美食家了嗎？#n還是你這陣子被我們影響太深了？"
1009103-62 = "算了，是哪邊都沒關係吧？不用解釋那麼多反而也不錯。"
1009103-63 = "先別管那些，馬上開始試吃吧……！"
1009103-67 = "……啊。"
1009103-68 = "[s9]「……千紗？」\n[s10]「為什麼突然停下來了？」"
1009103-71 = "沒，沒什麼。#n那個，雖然我剛才一副要吃個過癮的樣子……"
1009103-72 = "但仔細想想在大人面前擅自開動……怎麼說呢，好像有點沒禮貌。"
1009103-73 = "果然還是應該讓老師先吃才對。"
1009103-74 = "……你說你不在意？從來沒有這樣想過？"
1009103-75 = "唔，唔嗯……是嗎……"
1009103-76 = "好吧，既然老師都這麼說了……"
1009103-81 = "不，不對！果然還是不行，我心裡會很過意不去。"
1009103-82 = "這也沒辦法，畢竟是我一直以來的習慣。"
1009103-83 = "所以就算老師覺得很奇怪，這次也麻煩配合我一下吧。"
1009103-88 = "老師……"
1009103-90 = "……你先吃吧。"
1009103-93 = "― [log=카즈사 밴드]……好了，快點！[/log][wa:4380] "
1009103-96 = "― [log=카즈사 밴드]啊～！[/log][wa:1570] "
1009103-97 = "― [log=카즈사 밴드]在掉下去之前！[/log][wa:840] "
1009103-100 = "― [log=카즈사 밴드]要是老師不吃的話，[/log][wa:1240] "
1009103-101 = "― [log=카즈사 밴드]我也沒辦法吃了！[/log][wa:1930] "
1009103-104 = "― [log=카즈사 밴드]來，啊～！[/log][wa:3515] "
1009103-107 = "― [log=카즈사 밴드]……咦？[/log][wa:1570] "
1009103-110 = "― [log=카즈사 밴드]沒關係？[/log]"
1009103-111 = "― [log=카즈사 밴드]我先吃……？[/log][wa:3110] "
1009103-114 = "― [log=카즈사 밴드]咦……？[/log][wa:620] "
1009103-115 = "― [log=카즈사 밴드]畢竟這個湯匙是千紗的？[/log][wa:3765] "
1009103-118 = "― [log=카즈사 밴드]……嗯？[/log][wa:2860] "
1009103-119 = "― [log=카즈사 밴드]……咦？[/log][wa:2030] "
1009103-122 = "― [log=카즈사 밴드]湯匙……？[/log][wa:1720] "
1009103-123 = "― [log=카즈사 밴드]我的……？[/log][wa:2690] "
1009103-126 = "― [log=카즈사 밴드]……啊。[/log][wa:830] "
1009103-129 = "― [log=카즈사 밴드]哇啊啊啊啊！？[/log]"
1009103-130 = "― [log=카즈사 밴드]剛才的當我沒說！[/log][wa:2790] "
1009103-133 = "老，老師！不，不是那樣的！我剛才沒有那個意思！！"
1009103-134 = "該怎麼說呢，那個……就是……！！"
1009103-135 = "呃啊啊，蛋糕……！！掉下去了……！！"
1009103-140 = "（幸好蛋糕掉在盤子上，所以最後還是順利吃到了）"
1009103-141 = "（在吃蛋糕的時候，千紗依然不停重複著「真的不是那樣」，#n　隨後便頭也不回地衝出了夏萊）"

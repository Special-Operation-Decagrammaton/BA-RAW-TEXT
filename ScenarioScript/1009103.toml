1009103-133 = "คะ... คุณครู! มะ... ไม่ใช่อย่างนั้นนะ! ฉันไม่ได้อยากให้เป็นอย่างนี้นะ!!"
1009103-134 = "คือว่า... เอ่อ... แบบว่า...!!"
1009103-135 = "อ๊ากกก! เค้กหล่นแล้ว...!!!"
1009103-140 = "(โชคดีที่เค้กตกลงบนจาน ทำให้กินต่อได้อย่างปลอดภัย)"
1009103-141 = "(คาซึสะเอาแต่พูดปฏิเสธตลอดเวลาที่กินเค้ก และพอกินเสร็จก็รีบวิ่งหนีออกไปจากชาเล่ต์ทันที)"

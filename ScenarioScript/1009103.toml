1009103-45 = "3;카즈사 밴드;99;아까 모모톡에도 말했듯이 그냥 연습이 좀 길어졌을 뿐이야. 모처럼 합이 좀 잘 맞는다 싶어서, 몇 번 더 반복해 보기로 했었거든."

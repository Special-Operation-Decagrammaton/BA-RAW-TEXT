[translation]
1009103-1 = "ชมรมวงดนตรีหลังเลิกเรียน"
1009103-9 = "ขอรบกวนหน่อยนะ~ เฮ้อ... เหนื่อยจัง..."
1009103-10 = "ถอดรองเท้าไว้ตรงนี้..."
1009103-14 = "ฮึบ..."
1009103-19 = "ฮู่ว!! ค่อยยังชั่วหน่อยนะเนี่ย~"
1009103-20 = "หืม...?"
1009103-21 = "คุณครู...? ทำไมหัวเราะแบบนั้นล่ะ? มีเรื่องอะไรน่าขำงั้นเหรอ?"
1009103-22 = "[s1] \"ครูบอกว่าให้ทำตัวตามสบายก็จริงอยู่หรอก...\"\n[s2] \"ทำตัวสบายเกินเหมือนอยู่ในห้องตัวเองเลยนะ\""
1009103-25 = "อะ... อ้าว? ฉันไม่ควรมาที่นี่เหรอ!? หรือว่าอึดอัดที่ฉันมารึเปล่า...!?"
1009103-26 = "หืม...?"
1009103-27 = "ไม่ใช่อย่างนั้นหรอกเหรอ?"
1009103-28 = "เฮ้อ... งั้นก็โล่งอกไปที เพราะถ้าเป็นอย่างนั้นจริงๆ ใจฉันคงตกไปอยู่ตาตุ่มแล้ว"
1009103-32 = "ไม่สิ... เดี๋ยวก่อน"
1009103-33 = "ฉันต้องคิดใหม่แล้ว จะวางใจเชื่อคำตอบของคุณครูง่ายๆ ไม่ได้"
1009103-34 = "หรือว่า... เมื่อกี้ฉัน... ทำตัวอวดดี... หรือนิสัยเสียใส่คุณครูไปรึเปล่า..."
1009103-35 = "[s3] \"พูดอะไรเหลวไหลอีกแล้ว\"\n[s4] \"เลิกคิดมากได้แล้ว เล่าธุระของวันนี้มาเถอะ\""
1009103-41 = "แหะๆ... อะ... เอางั้นเหรอ?"
1009103-42 = "งั้นเอาเป็นว่าฉันจะเชื่อคำพูดของคุณครูอีกครั้งแล้วกัน..."
1009103-43 = "อืม... ธุระของวันนี้เหรอ..."
1009103-44 = "อืม ครั้งนี้ฉันก็ไม่ได้มีเรื่องยิ่งใหญ่อะไรหรอก"
1009103-45 = "ก็อย่างที่บอกใน MOMOTALK เมื่อกี้ว่าวันนี้การซ้อมกินเวลานานหน่อย ครั้งนี้เราเล่นประสานกันได้ดี#nมากขึ้น ก็เลยซ้อมวนอยู่อีกหลายรอบน่ะ"
1009103-46 = "วันที่เราเล่นกันได้ไม่ค่อยดี เราจะรีบๆ ซ้อมให้เสร็จแล้วแยกย้ายกันกลับบ้าน... แต่พอเล่นได้ดี เรากลับซ้อมต่ออีกจนมืดค่ำดึกดื่นซะงั้น"
1009103-47 = "พอเราเอาแต่ซ้อมก็เลยไม่ได้กินของหวานที่เตรียมมาด้วย ฉันถึงกับสงสัยเลยนะว่าพวกเราคือชมรม#nของหวานหลังเลิกเรียนจริงๆ รึเปล่า"
1009103-48 = "เหมือนจะเป็น 'ชมรมวงดนตรีหลังเลิกเรียน' มากกว่า 'ชมรมของหวานหลังเลิกเรียน' ซะอีก"
1009103-49 = "อ่า... จริงสิ"
1009103-50 = "พอพูดถึงแล้วก็เลยนึกขึ้นได้น่ะ จะว่าไปแล้ว ฉันเอาของหวานที่ยังไม่ได้กินวันนี้มาด้วยนี่นา"
1009103-51 = "คุณครูก็กินด้วยกันมั้ย? ถ้าคุณครูไม่ว่าอะไร ฉันจะขอกินที่นี่หน่อยน่ะ"
1009103-52 = "[s5] \"โอ้ว ลาภปากเลย!\"\n[s6] \"ครูกำลังอยากกินของหวานๆ อยู่พอดีเลย\""
1009103-55 = "ฮุฮุฮุ เอาละๆ งั้นก็รีบมานั่งตรงนี้ วันนี้ฉันมั่นใจว่าเลือกขนมอร่อยๆ มา"
1009103-56 = "และนั่นก็คือ~ ก็คืออออ......"
1009103-57 = "[s7] \"<เค้กคุกกี้แอนด์ครีม>!\"\n[s8] \"เค้กจากร้าน <คาเฟ่มิลเฟย>!!\""
1009103-60 = "โอ้ว อะไรกันน่ะ! แค่เห็นก็รู้เลยเหรอ!?"
1009103-61 = "ตอนนี้คุณครูก็เป็นทาสของหวานกับเขาไปอีกคนแล้วเหรอ? หรือว่าที่ผ่านมาพวกฉันทำให้คุณครูติด#nขนมหวานกันนะ?"
1009103-62 = "แต่ไม่ว่าจะเป็นทางไหนก็ไม่สำคัญหรอก เราไม่จำเป็นต้องอธิบายทุกอย่างด้วยคำพูดหรอกเนอะ"
1009103-63 = "เอาละ ถ้างั้นเราก็มากินกันเลย...!"
1009103-67 = "อ่า..."
1009103-68 = "[s9] \"คาซึสะ...?\"\n[s10] \"ทำไมจู่ๆ ก็นิ่งไปล่ะ?\""
1009103-71 = "ปะ... เปล่าหรอก คือว่า... ฉันทำท่าจะกินซะดิบดี..."
1009103-72 = "แต่พอมาคิดดูแล้ว ฉันไม่ควรกินอะไรก่อนผู้ใหญ่รึเปล่า... มันดูไม่ค่อยมีมารยาทน่ะ"
1009103-73 = "คุณครูควรจะได้กินก่อนถึงจะถูกนะ"
1009103-74 = "ไม่ถืองั้นเหรอ...? ไม่เคยคิดว่าตัวเองต้องได้กินอะไรก่อนนักเรียนงั้นเหรอ?"
1009103-75 = "อะ... อืม... อืม... งั้นเหรอ..."
1009103-76 = "ก็นะ... ถ้าคุณครูว่าอย่างนั้นก็..."
1009103-81 = "มะ... ไม่ได้! ไม่ได้สิ! ฉันจะไม่สบายใจถ้ากินก่อนน่ะ"
1009103-82 = "เรื่องแบบนี้มันช่วยไม่ได้นี่นา ฉันติดเป็นนิสัยมานานแล้ว"
1009103-83 = "ถึงอาจจะแปลกในสายตาคุณครู แต่ครั้งนี้ช่วยทำตามที่ฉันสบายใจให้ทีเถอะนะ"
1009103-88 = "คุณครู..."
1009103-90 = "กินก่อนเลย..."
1009103-93 = "― [log=카즈사 밴드]...เอ้า เร็วสิ![/log][wa:4100] "
1009103-96 = "― [log=카즈사 밴드]อ้าม~ อ้าปากสิ![/log][wa:1090] "
1009103-97 = "― [log=카즈사 밴드]ก่อนที่ฉันจะทำมันหกน่ะ![/log][wa:200] "
1009103-100 = "― [log=카즈사 밴드]เพราะถ้าคุณครูไม่กิน[/log][wa:800] "
1009103-101 = "― [log=카즈사 밴드]ฉันก็ไม่ได้กินนะ![/log][wa:1570] "
1009103-104 = "― [log=카즈사 밴드]เอ้า อ้าม~![/log][wa:3275] "

[translation]
1009103-1 = "After-School Band Club"
1009103-9 = "Excuse me! Ugh, I'm tired..."
1009103-10 = "I'll just take off my shoes and put them over here..."
1009103-14 = "...Oof."
1009103-19 = "Phew! That's much better."
1009103-20 = "Huh?"
1009103-21 = "...Sensei? What's with that laugh? ...What's so funny?"
1009103-22 = "[s1] \"I know I always say, 'Make yourself at home,' but...\"\n[s2] \"...you treat this place like it's your bedroom.\""
1009103-25 = "Wh-What? Was I not allowed to come here?! Or am I really bothering you?"
1009103-26 = "Huh?"
1009103-27 = "That's not the case?"
1009103-28 = "...Phew. That's a relief. I was all nervous for a second there."
1009103-32 = "...Wait. Hold on."
1009103-33 = "I'm really going to have to think about this. Maybe you're just being nice now."
1009103-34 = "Or...maybe you mean it. Or maybe I came across as cheeky...or rude..."
1009103-35 = "[s3] \"You're just going off now, aren't you?\"\n[s4] \"Really, it's okay. Go ahead and tell me what happened today.\""
1009103-41 = "...Haha. S-Sure."
1009103-42 = "I'll just take your word for that."
1009103-43 = "Hm... What happened today..."
1009103-44 = "Well, obviously, it wasn't anything SUPER-serious..."
1009103-45 = "Well, like I mentioned in MomoTalk, practice went on for a bit, and we felt like we were really in sync, so we decided to run through it a few more times."
1009103-46 = "The thing with practice, though, is that when it's a bad day, we call it early, but when it's a GOOD day, it just never stops."
1009103-47 = "We ended up calling it without even finishing the desserts we brought in, so for a second there, we questioned if we were even really a desserts club."
1009103-48 = "It feels kind of like we're the After-School Band Club and not the After-School Sweets Club now."
1009103-49 = "...Ah, right."
1009103-50 = "That reminds me. I ended up not having the dessert, so I brought it with me."
1009103-51 = "Would you like some, Sensei? I thought I might have some now, if you don't mind."
1009103-52 = "[s5] \"Oh, lucky me!\"\n[s6] \"Great, I needed some sugar.\""
1009103-55 = "Heehee. All right. Let's sit down and enjoy this. I'm feeling pretty good about what I picked out today."
1009103-56 = "It's... Drum roll..."
1009103-57 = "[s7] \"Mille-Feuille Cafe's!\"\n[s8] \"Scoop-able Cookie & Cream Cake!\""
1009103-60 = "Oh, hold up! You knew what it was, like on sight?"
1009103-61 = "Are you a full-fledged dessert fanatic too now? Heh, didn't know we had that much influence on you."
1009103-62 = "Well, I guess that doesn't matter. It's nice not to have to explain every detail."
1009103-63 = "Now then, let's dig right into it...!"
1009103-67 = "...Ha."
1009103-68 = "[s9] \"...Kazusa?\"\n[s10] \"Why'd you stop moving?\""
1009103-71 = "W-Well, at first I wanted to give it a great big scoop..."
1009103-72 = "...but then I thought it'd be kind of rude to, you know, scarf it down with an adult right here."
1009103-73 = "Why don't you try it first?"
1009103-74 = "...Wait, it's okay to scarf it down? You don't care?"
1009103-75 = "H-Hmm... Mm... Is that so...?"
1009103-76 = "Well, if Sensei says so..."
1009103-81 = "N-No! Not happening. I'd feel too uncomfortable, so no."
1009103-82 = "It's just a quirk of mine, I suppose."
1009103-83 = "You might think it's weird, Sensei, but if you wouldn't mind playing along..."
1009103-88 = "Sensei..."
1009103-90 = "...you go ahead and try it first."
1009103-93 = "― [log=카즈사 밴드]...Now, hurry![/log][wa:4140] "

[translation]
10024005-1 = "序幕;賓至如歸：款待來客"
10024005-3 = "（一如往常在夏萊辦公時……）"
10024005-6 = "（嘟嚕嚕嚕嚕嚕！）"
10024005-9 = "[ns]「會是誰呢……？」"
10024005-11 = "[ns]「你好，這裡是夏萊。」"
10024005-14 = "請問是夏萊的[USERNAME]老師對嗎？"
10024005-15 = "[s1]「是，是我沒錯……請問你是？」\n[s2]「您撥的電話沒有回應，請在嗶聲後留言……」"
10024005-16 = "抱歉突然聯絡你。"
10024005-17 = "我是朱城瑠美。#n目前擔任玄武商會會長的職位。"
10024005-18 = "什麼嘛，原來老師是會開玩笑的人啊。#n我感覺輕鬆了一點。"
10024005-19 = "雖然那個玩笑不是很有趣……啊哈哈。"
10024005-20 = "[s3]「嗯……抱歉。」"
10024005-21 = "哈哈哈。#n那，我很期待老師下次的壓箱寶笑話哦。"
10024005-22 = "回歸正題──我是朱城瑠美。#n目前擔任玄武商會會長的職位。"
10024005-23 = "[s]「請多指教，瑠美。今天是有什麼事想商量嗎？」"
10024005-24 = "該說是商量，還是請求呢……"
10024005-25 = "我們玄武商會這邊有事想委託夏萊。"
10024005-26 = "[s]「……有股商量起來會很沉重的預感。」"
10024005-27 = "啊哈哈……可能會呢。#n這並非我個人，而是[ruby= ・     ・     ・     ・ ]玄武商會[/ruby]的委託。"
10024005-28 = "所以老師的預感是正確的。"
10024005-29 = "也許是會讓老師傷腦筋的內容也說不定呢。"
10024005-30 = "居然只憑這些就知道商量起來會很沉重，真厲害呢！#n難道老師有所謂的第六感嗎……？"
10024005-31 = "[s4]「啊哈哈，只是巧合而已。」\n[s5]「如果有就好了……」"
10024005-34 = "是嗎，真遺憾。"
10024005-35 = "不過雖然說是巧合，溝通能順利就再好不過了吧。#n反正委託內容應該也沒有那麼可怕！"
10024005-36 = "[s]「希望你可以完全否定！」"
10024005-37 = "啊哈哈……總之，我想招待老師到玄武商會，時間上方便嗎？"
10024005-38 = "除了很在意傳聞中的老師是怎麼樣的人之外──也想再次向老師問好。"
10024005-39 = "[s6]「當然，隨時都沒問題哦。」\n[s7]「我也想知道瑠美是個什麼樣的孩子。」"
10024005-42 = "哦！我們說不定意外的意氣相投呢。"
10024005-43 = "越來越期待見到老師了。"
10024005-44 = "[s]「你，你該不會在打什麼壞主意吧？」"
10024005-45 = "啊哈哈。#n如果我說有的話……老師會怎麼做呢？"
10024005-46 = "即便如此──也會相信我到最後嗎？"
10024005-47 = "嗯……這樣啊。#n如果真的做了壞事，到時候會被老師訓斥對吧？ "
10024005-48 = "……"
10024005-49 = "能當老師的學生真好啊。#n那種事……我好像有點羨慕。"
10024005-50 = "……呵呵。#n我也已經是老師的學生了？"
10024005-51 = "雖然讓人很難為情，不過我很高興你能這麼說。"
10024005-52 = "那麼──在委託結束之前，老師的安全就由我來守護吧。"
10024005-53 = "[s]「這句台詞，也很讓人難為情吧……！」"
10024005-54 = "啊哈哈，抱歉抱歉。#n我自己其實也搞不太清楚。"
10024005-55 = "[s]「這點倒是希望你有點自覺……」"
10024005-56 = "啊哈哈。#n那麼我會做好準備，能請你到山海經的玄武商會來一趟嗎？"
10024005-57 = "作為無法去迎接的補償，我答應你會準備好最棒的「招待」哦。#n好好期待吧。"
10024005-59 = "（前往了山海經的玄武商會）"
10024005-64 = "山海經．玄武商會"
10024005-65 = "[ns8]「這裡就是玄武商會……」\n[ns9]「該說跟傳聞中一樣嗎……」"
10024005-73 = "有股聞起來很美味的香料味對吧？"
10024005-74 = "這裡也能聞到油香四溢的味道沒錯吧……！"
10024005-75 = "[s]「嗯，嗯……？」"
10024005-76 = "是校外人士對吧？#n歡迎來到玄武商會！"
10024005-77 = "這裡是能品嘗到許多其他學園吃不到的山珍海味的地方！"
10024005-79 = "來來來，先來我們竹筍熊貓店坐坐如何！#n各式各樣的豆腐料理一應俱全哦！"
10024005-80 = "在金色南瓜湯中加入豆腐和蘑菇燉煮的湯豆腐是我們的招牌菜──"
10024005-82 = "不不不！#n既然都來到這裡了，請務必光臨我們泰山燉雞店！"
10024005-84 = "我們店裡的汽鍋雞獲得了非常非常好吃的評價哦！#n將雞肉放入專用的鍋子裡蒸，利用蒸氣燉出鮮香的湯汁！"
10024005-85 = "充分引出食材風味與香氣且營養滿滿的雞湯，能夠治癒疲勞的身體哦！"
10024005-86 = "當然，雞肉也能盡情享用！"
10024005-88 = "哼，不過就是蒸雞肉而已，說得那麼誇張！"
10024005-89 = "你說什麼！？要這麼說的話，你的店還不是只有一堆豆腐！#n客人們難得來到玄武商會，你卻打算端出病人吃的食物嗎？"
10024005-91 = "你難道不懂使用蘑菇和山菜是為了健康著想嗎！#n我對採來的山產可是很講究的啊！"
10024005-93 = "我們店裡的湯能夠從雞肉攝取到豐富的蛋白質，#n也能讓身體從內而外暖和起來啊！"
10024005-99 = "[ns]「那個，這到底是……？」"
10024005-100 = "兩位對自己的料理感到自豪雖然是件好事──#n不過不好意思，這位可是我的客人。"
10024005-101 = "瑠，瑠美會長！？"
10024005-102 = "會長為何會出現在這裡！？"
10024005-103 = "[s]「瑠美！」"
10024005-104 = "讓你久等了，老師。#n我果然應該一開始就來迎接老師的呢。"
10024005-105 = "原，原來是會長的客人啊！"
10024005-106 = "失禮了！我們先告辭了！"
10024005-113 = "真是的……明明我總是提醒他們攬客要適可而止的說。"
10024005-114 = "嗯……是嗎，老師也覺得高興就好。"
10024005-115 = "不過，老師……"
10024005-116 = "玄武商會的「招待」，現在才正要開始哦！"
10024005-117 = "那麼……"
10024005-118 = "歡迎光臨玄武商會！"

[translation]
10024005-1 = "Prologue;Welcome Guest, Joyful Hospitality"
10024005-3 = "I was working on my usual office work at Schale, when..."
10024005-6 = "*ring* *ring*"
10024005-9 = "[ns] \"Oh, that's my phone...\""
10024005-11 = "[ns] \"Hello?\""
10024005-14 = "Hello. Is this the number for [USERNAME] Sensei, with Schale?"
10024005-15 = "[s1] \"Yes. May I ask who's calling?\"\n[s2] \"You have reached the voice mailbox of...\""
10024005-16 = "I'm sorry for calling you out of the blue like this when we haven't even met..."
10024005-17 = "I'm Akeshiro Rumi, and I'm the president of the Black Tortoise Promenade. "
10024005-18 = "Oh, you have jokes. That should help things move along more smoothly."
10024005-19 = "Your sense of humor could use some work, though..."
10024005-20 = "[s3] \"I'm just...breaking the ice...\""
10024005-21 = "Hahaha! Well, next time, I'll be expecting a GOOD joke."
10024005-22 = "I'm Akeshiro Rumi. I serve as president for the merchants of the Black Tortoise Promenade. "
10024005-23 = "[s] \"Hi, Rumi. How can I help you today?\""
10024005-24 = "I have a, let's say...a request. Or a commission."
10024005-25 = "The Black Tortoise Promenade needs your help."
10024005-26 = "[s] \"When you put it like that, it sounds official. And serious. And a little scary.\""
10024005-27 = "Well, now, I don't want you to get the wrong idea."
10024005-28 = "I suppose it IS official. And it is fairly serious...to an extent..."
10024005-29 = "And scary... Well, it IS scary... Fine. You got it all right."
10024005-30 = "Do you have some kind of psychic power? Are you a mind reader?"
10024005-31 = "[s4] \"I'm just reading the room, Rumi.\"\n[s5] \"I wish I had psychic powers...\""
10024005-34 = "Is that so...?"
10024005-35 = "Anyway, there's no need to worry about my request. It may be official, but the other words you used are...exaggerations."
10024005-36 = "[s] \"Sure, you say that now...\""
10024005-37 = "I want to invite you to come visit me at the Black Tortoise Promenade."
10024005-38 = "I admit, I'm curious to meet the famous Sensei in person."
10024005-39 = "[s6] \"An invitation to the Black Tortoise Promenade? How could I say no?\"\n[s7] \"And I can't wait to meet the famous President Rumi.\""
10024005-42 = "Wonderful! It seems like we're on the same page."
10024005-43 = "I look forward to seeing you, Sensei."
10024005-44 = "[s] \"You're not planning anything bad, right?\""
10024005-45 = "Hahaha! If I am, what are you going to do?"
10024005-46 = "You'll trust your students until the end?"
10024005-47 = "And you'll give me a scolding if I do anything bad? "
10024005-48 = "..."
10024005-49 = "Haha. I'm feeling a little envious of your students, Sensei."
10024005-50 = "Oh... I'm also one of your students?"
10024005-51 = "You say such things so easily... I'm at a loss for words."
10024005-52 = "It's settled, then. I promise I'll keep you safe until the request is done."
10024005-53 = "[s] \"You say these things pretty easily, yourself.\""
10024005-54 = "Sorry, I suppose. I guess I'm oblivious when it comes to these sorts of things."
10024005-55 = "[s] \"Please try not to be.\""
10024005-56 = "Hahaha. I've got to make some preparations. I'll see you at the Black Tortoise Promenade."
10024005-57 = "Please look forward to it. I'll treat you to such delights you've never experienced before."
10024005-59 = "A little later, I set out for the Black Tortoise Promenade in Shanhaijing."
10024005-64 = "Black Tortoise Promenade"
10024005-65 = "[ns8] \"So this is the Black Tortoise Promenade.\"\n[ns9] \"The stories don't do it justice...\""
10024005-73 = "Smells delicious, doesn't it?"
10024005-74 = "Go ahead, breathe it in! That one-of-a-kind, oily, savory smell!"
10024005-75 = "[s] \"Huh...?\""
10024005-76 = "You're an outsider, right? Welcome to Shanhaijing!"
10024005-77 = "This way, customer, to delicacies unlike anything you've ever tasted!"
10024005-79 = "Here, here! We have a seat for you at Bamboo Shoot Panda Diner! Our tofu soup is to die for!"
10024005-80 = "Our special golden sauce is made with pumpkin and mushrooms, stewed in a pot with the tofu!"
10024005-82 = "Don't waste your time with tofu. The true pearl of the Promenade is Great Mountain Chicken!"
10024005-84 = "At our restaurant, we steam the chicken in a clay pot, then use its juices to make the best broth you've ever tasted!"
10024005-85 = "Our chicken is packed with flavor, and the meat is tender and fragrant. "
10024005-86 = "It's a refreshing, cleansing soup with the deep flavor of chicken!"
10024005-88 = "Don't be ridiculous. You can get steamed chicken anywhere!"
10024005-89 = "I don't want to hear that from you, tofu-monger. Our customer isn't some sheep, happy to eat grass!"
10024005-91 = "Fresh vegetables calm the stomach and detoxify the blood!"
10024005-93 = "And you can't be happy without a full belly! The customer needs meat!"
10024005-99 = "[ns] \"Excuse me... What are we talking about here...?\""
10024005-100 = "I'm glad you're both so proud of your restaurants, but this person is my guest."
10024005-101 = "P-President Rumi?"
10024005-102 = "They're y-your guest?"
10024005-103 = "[s] \"There you are, Rumi!\""
10024005-104 = "Welcome, Sensei. I'm sorry I didn't meet you at the gate. We could have avoided this...trouble."
10024005-105 = "W-We didn't mean to cause trouble!"
10024005-106 = "We're terribly sorry! Have a nice day!"
10024005-113 = "I've told them so many times to tone it down, but they don't listen..."
10024005-114 = "Hm? You thought it was an impressive welcome?"
10024005-115 = "Oh, Sensei. The welcome hasn't even begun yet."
10024005-116 = "I will show you what it means to be a guest at Black Tortoise Promenade."
10024005-117 = "Without further ado..."
10024005-118 = "Welcome to the Black Tortoise Promenade!"

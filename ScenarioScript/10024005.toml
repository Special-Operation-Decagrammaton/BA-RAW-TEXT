[translation]
10024005-1 = "บทเริ่มต้น;ต้อนรับขับสู้"
10024005-3 = "(ระหว่างที่คุณครูกำลังทำงานอยู่ในชาเล่ต์ตามปกติ)"
10024005-6 = "กริ๊ง กริ๊งงง!"
10024005-9 = "[ns] \"โทรศัพท์เหรอ...?\""
10024005-11 = "[ns] \"ฮัลโหล\""
10024005-14 = "อ๊ะ ฮัลโหล ไม่ทราบว่าอันนี้เป็นเบอร์โทรศัพท์ของคุณครู [USERNAME] ที่อยู่ชาเล่ต์หรือเปล่าน่ะ?"
10024005-15 = "[s1] \"ก็ใช่อยู่หรอก... ว่าแต่นั่นใครน่ะ?\"\n[s2] \"ตอนนี้ไม่ว่างรับสาย กรุณาฝากข้อความหลังเสียง...\""
10024005-16 = "รู้สึกผิดจังที่ต้องมาขอรบกวนกันตั้งแต่ครั้งแรกที่คุยกันแบบนี้ "
10024005-17 = "ฉันชื่อรูมิ... อาเคชิโระ รูมิ เป็นประธานของย่านการค้าเทพเต่าดำน่ะ"
10024005-18 = "โอ๊ะ คุณครูเล่นมุกเป็นด้วยเหรอเนี่ย อย่างนี้ค่อยคุยกันง่ายหน่อย"
10024005-19 = "แต่ก็ไม่ได้หมายความว่ามุกที่เล่นเมื่อกี้มันฮาหรอกนะ"
10024005-20 = "[s3] \"อืม... ก็คิดอยู่แล้วละว่ามันจะแป้ก...\""
10024005-21 = "ฮ่าฮ่าฮ่า โอเคๆ ไว้จะตั้งตารอมุกใหม่ในครั้งต่อไปนะ"
10024005-22 = "ฉันชื่ออาเคชิโระ รูมิ เป็นประธานกลุ่มการค้าย่านการค้าเทพเต่าดำ "
10024005-23 = "[s] \"ว่าไง รูมิ โทรมามีเรื่องอะไรเหรอ?\""
10024005-24 = "จะบอกว่า... นี่เป็นการขอร้องหรือว่าการไหว้วานดีนะ"
10024005-25 = "ย่านการค้าเทพเต่าดำของเรามีเรื่องจะขอความช่วยเหลือจากชาเล่ต์นิดหน่อยน่ะ"
10024005-26 = "[s] \"โอ้... งานหลวงมีแต่งานหนักๆ แล้วก็น่ากลัวนะ...\""
10024005-27 = "ปฏิกิริยาแบบนั้นมันอะไรกัน เกินไปรึเปล่า..."
10024005-28 = "ก็จริงอยู่ที่ว่ามันเป็นงานหลวง ส่วนจะมีแต่เรื่องหนักๆ หรือเปล่า... มันก็คงขึ้นอยู่กับว่าแต่ละคนจะมองยังไง"
10024005-29 = "บางที... ก็อาจจะเป็นงานที่น่ากลัวด้วยละมั้ง? คุณครูเดาถูกทุกอย่างเลยแฮะ ทำได้ยังไงกันนะ"
10024005-30 = "คุณครูเคยเป็นผู้วิเศษหรือนักอ่านใจคนมาก่อนหรือเปล่าน่ะ?"
10024005-31 = "[s4] \"เคยคิดเหมือนกันว่าถ้าทำแบบนั้นได้ชีวิตก็น่าจะสบายขึ้น\"\n[s5] \"ก็ไม่เชิงว่าไม่เคยหรอก...\""
10024005-34 = "งะ... งั้นเหรอ?"
10024005-35 = "เอาเถอะ อย่าเก็บมาคิดมากก็แล้วกัน คำขอครั้งนี้เป็นคำขอทางการจริงๆ แต่เรื่องอื่นน่ะ อาจไม่เป็น#nแบบนั้นก็ได้นะ?"
10024005-36 = "[s] \"ดูสิ ไม่ปฏิเสธซะด้วย...!\""
10024005-37 = "เอาเป็นว่าฉันอยากชวนคุณครูมาที่ย่านการค้าเทพเต่าดำน่ะ พอจะมาหาได้หรือเปล่า?"
10024005-38 = "ฉันอยากจะเห็นคุณครูในข่าวลือด้วยตาตัวเองด้วยน่ะว่าเป็นคนยังไงกันแน่"
10024005-39 = "[s6] \"แบบนี้นี่เอง คำเชิญจากย่านการค้าเทพเต่าดำสินะ\"\n[s7] \"อืม ครูเองก็อยากเห็นรูมิเหมือนกันว่าจะเป็นคนแบบไหน\""
10024005-42 = "โอ๊ะ ดีเลยๆ มีบางมุมที่เราก็ใจตรงกันเหมือนกันอยู่นะเนี่ย"
10024005-43 = "ฉันชักจะเริ่มคาดหวังกับคุณครูมากขึ้นเรื่อยๆ แล้วละสิ"
10024005-44 = "[s] \"ไม่ได้วางแผนจะทำเรื่องไม่ดีอะไรใช่ไหมน่ะ?\""
10024005-45 = "ฮ่าฮ่าฮ่า ถ้าเกิดว่าฉันคิดจะทำแบบนั้นจริงๆ แล้วคุณครูจะทำยังไงเหรอ?"
10024005-46 = "ถึงจะเป็นแบบนั้นแต่ก็ยังจะเชื่อมั่นในตัวนักเรียน? จะเชื่อจนถึงที่สุดเลยล่ะสินะ?"
10024005-47 = "ถ้าทำแบบนั้นยังไม่ได้อีก ก็จะเริ่มดุนิดหน่อยงั้นเหรอ?"
10024005-48 = "..."
10024005-49 = "ดีจังเลยนะ ชักรู้สึกอิจฉานักเรียนของคุณครูขึ้นมานิดๆ แล้ว"
10024005-50 = "หืม? ตอนนี้ฉันก็เป็นนักเรียนของคุณครูเหมือนกันงั้นเหรอ?"
10024005-51 = "จริงๆ เลยน้า คุณครูเป็นพวกคนประเภทที่พูดอะไรน่าอายๆ ออกมาได้โดยที่ไม่สะทกสะท้านเลยสินะ โดนเข้าซะแล้วสิเรา"
10024005-52 = "ในเมื่อเป็นแบบนี้ก็ช่วยไม่ได้นะ ฉันจะปกป้องคุณครูจนกว่าจะทำเรื่องที่ฉันขอเสร็จก็แล้วกัน"
10024005-53 = "[s] \"คำพูดของรูมิตอนนี้ก็น่าอายพอๆ กันเลยนั่นแหละ...\""
10024005-54 = "ต้องขอโทษด้วยก็แล้วกันนะ ฉันเป็นคนพูดอะไรไปโดยที่ไม่ค่อยรู้ตัวเท่าไรน่ะ"
10024005-55 = "[s] \"รู้บ้างหน่อยก็ได้นะ...\""
10024005-56 = "ฮ่าฮ่าฮ่า ถ้างั้นฉันจะเตรียมนู่นเตรียมนี่รอนะ เอาไว้เจอกันที่ย่านการค้าเทพเต่าดำละ"
10024005-57 = "ตั้งตารอได้เลย พวกเราจะให้ครูลิ้มรสชาติการต้อนรับที่หาไม่ได้จากที่อื่นเลยละ"
10024005-59 = "(จากนั้นคุณครูก็ไปที่ย่านการค้าเทพเต่าดำของซานไห่จิงตามที่รูมิบอก)"
10024005-64 = "ย่านการค้าเทพเต่าดำ"
10024005-65 = "[ns8] \"ที่นี่คือย่านการค้าเทพเต่าดำเหรอ…?\"\n[ns9] \"ยิ่งใหญ่สมคำร่ำลือเลย...\""
10024005-73 = "น่าอร่อยมากเลย ว่าไหมคะ?"
10024005-74 = "แค่ได้กลิ่นก็รับรู้ได้ถึงความพิเศษ ฉ่ำมัน และกลิ่นหอมของอาหารเลยใช่ไหม?!"
10024005-75 = "[s] \"เอ๋...?\""
10024005-76 = "คุณคงมาจากเขตอื่นสินะคะ? คิดถูกแล้วค่ะที่มาซานไห่จิง!"
10024005-77 = "เราเตรียมอาหารเลิศรสที่หากินไม่ได้ที่โรงเรียนอื่นๆ ไว้พร้อมสำหรับทุกคนแล้วค่ะ!"
10024005-79 = "เอาละๆ เร่เข้ามาอย่าได้ลังเล เชิญที่ร้านหน่อไม้ขายดีของเราเลย! เมนูซุปเต้าหู้ของเราอร่อยเหาะไม่เหมือนใครเชียวละ!"
10024005-80 = "ซุปโกลด์เด้นของเราปรุงมาจากฟักทอง เต้าหู้ และเห็ดนานาชนิดเลยนะคะ!"
10024005-82 = "อย่าเพิ่งเดินผ่านสิคะ! อุตส่าห์แวะมาทั้งที ถ้าไม่เข้าร้านไก่ตุ๋นจากขุนเขาอันยิ่งใหญ่ของเรา ถือว่ามาเสียเที่ยวนะคะ!"
10024005-84 = "เรามีเมนูสุดพิเศษเป็นน้ำซุปที่กลั่นมาจากไอน้ำที่ใช้อบไก่หม้อดินเผาค่ะ!\n"
10024005-85 = "วิธีนี้จะช่วยรักษารสชาติความอร่อยของเนื้อไก่เอาไว้ ทำให้เนื้อไก่มีความนุ่มละมุน และหอมน่ารับประทาน"
10024005-86 = "อีกทั้งทำให้น้ำซุปมีรสชาติกลมกล่อมขึ้น เสริมให้เนื้อไก่มีกลิ่นหอมเตะจมูกมาแต่ไกลเลยค่ะ!"
10024005-88 = "นี่ มันก็แค่ไก่ตุ๋นที่หากินได้ตามทั่วไปเองนะ เธอโฆษณาโอเวอร์เกินไปแล้วรึเปล่า!"
10024005-89 = "ว่าไงนะ? ร้านพวกเธอก็ขายแค่เต้าหู้ เห็ดและก็ผักไม่ใช่เหรอ! เรามีคุณลูกค้ามาจากเขตอื่นทั้งที คิดจะให้ลูกค้ากินแต่ผักใบเขียวๆ รึไง?"
10024005-91 = "ไม่มีอะไรที่จะทำให้ท้องไส้สบายและฟอกเลือดได้ดีกว่าผักสดใหม่หรอกนะ!"
10024005-93 = "ฟอกล่งฟอกเลือดอะไรกัน การบำรุงร่างกายให้แข็งแรงด้วยไก่ตุ๋นหวานๆ อุ่นๆ น่ะ เป็นสิ่งที่ดีเลิศที่สุดแล้ว!"
10024005-99 = "[ns] \"คือว่า… นี่มันอะไรกันน่ะ…?\""
10024005-100 = "ที่เธอทั้งสองคนภูมิใจในร้านอาหารของตัวเองมันก็ดีอยู่หรอก แต่คนนี้เป็นแขกของฉันนะ"
10024005-101 = "ทะ... ท่านประธานรูมิ?!"
10024005-102 = "ท่านประธานมาทำอะไรที่นี่เนี่ย!?"
10024005-103 = "[s] \"รูมิ!\""
10024005-104 = "เข้ามาสิคุณครู ถ้ารู้ว่าจะเป็นแบบนี้ฉันเข้ามาพร้อมกับคุณครูดีกว่า"
10024005-105 = "ปะ... เป็นแขกของท่านประธานเหรอคะเนี่ย!"
10024005-106 = "ขอโทษค่ะ! พวกเราขอตัวก่อนนะคะ!"
10024005-113 = "ฉันย้ำนักย้ำหนาว่าอย่าเรียกลูกค้าอย่างเอิกเกริก ทำไมไม่ฟังกันเลย"
10024005-114 = "ว่าไงนะ? เมื่อกี้เป็นการต้อนรับที่น่าประทับใจงั้นเหรอ?"
10024005-115 = "พูดอะไรของคุณครูน่ะ เรายังไม่ทันได้ต้อนรับเลย การต้อนรับจะเริ่มตั้งแต่ตอนนี้ต่างหาก"
10024005-116 = "ฉันจะแสดงให้คุณครูเห็นว่าการเป็นลูกค้าของย่านการค้าเทพเต่าดำมันเป็นยังไง"
10024005-117 = "เอาละ ถ้าอย่างนั้นก็..."
10024005-118 = "ขอต้อนรับสู่ย่านการค้าเทพเต่าดำนะ!"

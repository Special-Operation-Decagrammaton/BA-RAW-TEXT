[translation]
10024005-1 = "#title;프롤로그;객인환대: 손님을 맞이하여 반갑게 대접하다"
10024005-2 = "#all;hide"
10024005-3 = "#na;(평소처럼 샬레에서 업무를 보고 있었던 때였다.)"
10024005-4 = "#st;[0,0];instant;1;"
10024005-5 = "#clearST"
10024005-6 = "#na;따르릉!"
10024005-7 = "#st;[0,0];instant;1;"
10024005-8 = "#clearST"
10024005-9 = "[ns] \"전화……?\""
10024005-10 = "#wait;1000"
10024005-11 = "[ns] \"여보세요.\""
10024005-12 = "#wait;500"
10024005-13 = "3;통신루미;01\n#3;a\n#wait;1800"
10024005-14 = "3;통신루미;00;아, 여보세요. 실례지만 이 전화, 샬레의 [USERNAME] 선생님의 전화가 맞을까?"
10024005-15 = "[s1] \"그렇긴 한데…… 누구지?\"\n[s2] \"지금은 부재중이오니 삐─ 소리가 나면 용건을……\""
10024005-16 = "3;통신루미;02;초면에 폐를 끼치는 것 같아서 미안하게 됐어.\n#3;em;[반응]"
10024005-17 = "3;통신루미;01;난 루미. 아케시로 루미야. 현무상회의 회장 같은 걸 하고 있지. \n#3;greeting"
10024005-18 = "3;통신루미;00;오, 선생님은 농담을 할 줄 아는 사람이군. 이야기가 좀 편해지겠어.\n#3;em;[음표]"
10024005-19 = "3;통신루미;02;그렇다고 지금 농담이 재미있었다는 건 아니야."
10024005-20 = "[s3] \"응…… 그 정도는 나도 알아……\""
10024005-21 = "3;통신루미;03;하하하. 그래. 다음을 기대할게."
10024005-22 = "3;통신루미;01;난 루미. 아케시로 루미라고 해. 현무상회의 상인회장 같은 걸 하고 있지. \n#3;greeting\n#3;em;[반응]"
10024005-23 = "[s] \"안녕, 루미. 그래서 무슨 일로 전화한 거야?\""
10024005-24 = "3;통신루미;99;부탁…… 이라고 할까, 의뢰라고 할까.\n#3;em;[...]"
10024005-25 = "3;통신루미;01;우리 현무상회에서, 샬레에게 도움을 좀 요청하고 싶은 일이 있어서."
10024005-26 = "[s] \"우왓, 공적인 데다 무겁고 무서운 일이다……\""
10024005-27 = "3;통신루미;02;아니, 아니. 그렇게 반응해 와도 말이지."
10024005-28 = "3;통신루미;99;공적인…… 일은 어떻게 보면 맞고, 시각에 따라서는 무거운…… 일이기도 하고."
10024005-29 = "3;통신루미;02;어쩌면 무서운…… 일일 수도 있나? 이럴 수가. 전부 맞추다니.\n#3;em;[!]"
10024005-30 = "3;통신루미;03;선생님, 의외로 초능력자라든가 독심술사 같은 거였어?"
10024005-31 = "[s4] \"그럴 수 있었으면 편했겠다고 생각한 적이.\"\n[s5] \"아예 없었던 건 아니긴 합니다만……\""
10024005-32 = "#wait;100"
10024005-33 = "#wait;100"
10024005-34 = "3;통신루미;02;그, 그래?"
10024005-35 = "3;통신루미;00;뭐, 너무 신경 쓰지 말라고. 공적인 일은 맞을 수도 있지만, 나머지는 아닐 가능성도 있잖아?\n#3;em;[음표]"
10024005-36 = "[s] \"완전히 부정하지는 않는 것인가……!\""
10024005-37 = "3;통신루미;01;아무튼, 선생님을 현무상회에 초대하고 싶은데 괜찮을까?"
10024005-38 = "3;통신루미;02;소문이 자자한 선생님이 어떤 사람인지, 내 눈으로 보고 싶기도 하고."
10024005-39 = "[s6] \"그렇군. 현무상회의 초대인가.\"\n[s7] \"응. 나도 루미가 어떤 학생인지 직접 만나보고 싶어.\""
10024005-40 = "#wait;100"
10024005-41 = "#wait;100"
10024005-42 = "3;통신루미;03;오, 좋아. 어떤 의미로는 마음이 통했네.\n#3;em;[반응]"
10024005-43 = "3;통신루미;01;점점 더 기대가 되기 시작했어. 선생님에 대해서 말이야."
10024005-44 = "[s] \"나쁜 일 꾸미고 있는 거 아니지?\""
10024005-45 = "3;통신루미;03;하하하. 그런 일을 꾸미고 있다면, 어떻게 할 거야?"
10024005-46 = "3;통신루미;99;그래도 학생을 믿을 거라고? 마지막 순간까지?"
10024005-47 = "3;통신루미;00;그러고도 안 되면? 엄하게 꾸짖을 거라고? \n#3;em;[?]"
10024005-48 = "3;통신루미;02;……"
10024005-49 = "3;통신루미;03;좋겠네, 선생님의 학생들은. 조금 부러울지도."
10024005-50 = "3;통신루미;02;응? 나도 이미 선생님의 학생이라고?"
10024005-51 = "3;통신루미;99;이것 참, 선생님은 낯부끄러운 말을 서슴없이 하는 타입이었군. 또다시 한 방 먹었어.\n#3;em;[...]"
10024005-52 = "3;통신루미;03;이렇게 되면 어쩔 수 없지. 내 부탁이 끝날 때까지는, 내가 선생님을 지켜 주겠어.\n#3;greeting"
10024005-53 = "[s] \"지금 루미의 대사도 충분히 낯부끄러운 말 같은데 말이야……\""
10024005-54 = "3;통신루미;00;미안하게 됐네. 난 자각하지 못하는 편이어서 말이야.\n#3;em;[음표]"
10024005-55 = "[s] \"해 줘.\""
10024005-56 = "3;통신루미;03;하하하. 그러면 난 조금 먼저 이것저것 준비를 하고 있을 테니, 현무상회에서 보자고."
10024005-57 = "3;통신루미;07;기대해. 다른 곳에서는 맛볼 수 없었던 대접을 해 줄 테니까.\n#3;em;[반짝]"
10024005-58 = "#all;hide"
10024005-59 = "#na;(그리하여, 루미의 말대로 산해경의 현무상회로 향했다.)"
10024005-60 = "#st;[0,0];instant;1;"
10024005-61 = "#clearST"
10024005-62 = "#wait;1500"
10024005-63 = "#all;hide"
10024005-64 = "#place;현무상회"
10024005-65 = "[ns8] \"여기가 현무상회인가……?\"\n[ns9] \"듣던 대로 엄청나게……\""
10024005-66 = "#wait;100"
10024005-67 = "#wait;100"
10024005-68 = "#st;[0,0];instant;1;"
10024005-69 = "#clearST"
10024005-70 = "2;현무상회 부원 A;00\n4;현무상회 부원 B;00\n#2;black\n#4;black\n#2;ar\n#4;al\n#wait;1000"
10024005-71 = "#wait;1600"
10024005-72 = "2;현무상회 부원 A;00\n4;현무상회 부원 B;00\n#2;h\n#4;h\n#2;a\n#4;a\n#wait;1000"
10024005-73 = "2;현무상회 부원 A;02;맛있을 것 같죠. 그렇지 않습니까?\n#2;em;[!]"
10024005-74 = "4;현무상회 부원 B;07;벌써부터 전해져 오지 않나요? 특별하고, 기름지고, 고소한 냄새가!\n#4;hophop\n#4;em;[재잘]"
10024005-75 = "[s] \"어, 어어……?\""
10024005-76 = "2;현무상회 부원 A;03;외지인이시군요? 그렇지요? 산해경에 잘 오셨습니다!\n#2;em;[반짝]\n#2;m1\n#2;greeting"
10024005-77 = "4;현무상회 부원 B;07;다른 어느 학교에서도 경험할 수 없는 진미가, 여러분들을 위해 준비되어 있답니다!\n#4;em;[음표]\n#4;m5\n#4;hophop"
10024005-78 = "#all;hide"
10024005-79 = "3;현무상회 부원 A;03;자, 자. 이럴 때는 주저 말고 저희 죽순판다점을! 저희 죽순판다점은 특히 탕두부 요리가 특기랍니다!\n#3;closeup"
10024005-80 = "3;현무상회 부원 A;07;호박으로 금황색의 소스를 만들고, 그 탕 속에 두부와 함께 각종 버섯들을 넣고 끓여낸 요리지요!\n#3;closeup"
10024005-81 = "#all;hide"
10024005-82 = "2;현무상회 부원 A;07\n4;현무상회 부원 B;05;무슨 말씀을! 여기까지 오셨는데 저희 태산찜닭점을 방문하지 않으시면, 그야말로 헛걸음을 하신 거라고 볼 수 있을 겁니다!\n#4;em;[빠직]\n#4;hophop"
10024005-83 = "#all;hide"
10024005-84 = "3;현무상회 부원 B;05;저희 태산찜닭점의 특별 요리는 옹기솥 닭고기찜으로, 수제 옹기솥에 닭고기를 넣어 수증기로 닭고기를 익히고 그 수증기가 국물이 되는 요리죠.\n#3;closeup"
10024005-85 = "3;현무상회 부원 B;99;이 요리법을 쓰면 닭고기 본연의 맛을 유지하며, 육질을 연하면서도 향기롭게 보존하면서도, \n#3;em;[...]\n#3;closeup"
10024005-86 = "3;현무상회 부원 B;07;국물은 개운하면서도 담백해지며, 닭고기의 향이 멀리 퍼지게 된답니다!\n#3;closeup\n#3;em;[반짝]"
10024005-87 = "#all;hide"
10024005-88 = "4;현무상회 부원 B;07\n2;현무상회 부원 A;05;거 어디서나 구할 수 있는 닭고기찜 가지고 너무 과장이 심하네!\n#2;em;[한숨]"
10024005-89 = "4;현무상회 부원 B;08;뭐라고? 그러는 너희 가게도 두부와 버섯, 야채밖에는 팔지 않잖아! 여기까지 오신 외지인 손님에게 풀만 먹일 셈이냐?\n#4;em;[빠직]"
10024005-90 = "#all;hide"
10024005-91 = "2;현무상회 부원 A;05;속을 편하게 하고 피를 깨끗하게 하기에는 신선한 채소만 한 것이 없다고!\n#2;em;[!]\n#2;closeup\n#2;hophop"
10024005-92 = "#all;hide"
10024005-93 = "4;현무상회 부원 B;08;자고로 든든하게 보양을 하는 것이 몸에 이롭기로는 제일이야! 맛이 달고 성질이 따뜻한 닭고기야말로 보양엔 제격이지!\n#4;closeup\n#4;em;[스팀]"
10024005-94 = "#all;hide"
10024005-95 = "#st;[0,0];instant;1;"
10024005-96 = "#clearST"
10024005-97 = "2;현무상회 부원 A;05\n4;현무상회 부원 B;08\n#2;h\n#4;h\n#wait;1000"
10024005-98 = "#wait;2500"
10024005-99 = "[ns] \"저기…… 이건 도대체……?\""
10024005-100 = "2;현무상회 부원 A;02\n4;현무상회 부원 B;01\n1;루미;02;둘 다 자기 식당에 자부심을 갖는 건 좋지만, 이 사람은 내 손님인데?\n#1;em;[반응]\n#2;m4\n#4;m5\n#1;ar"
10024005-101 = "2;현무상회 부원 A;04;루, 루미 회장?!\n#2;em;[?!]\n#2;shake"
10024005-102 = "4;현무상회 부원 B;06;회장님이 여기에는 무슨 일로!?"
10024005-103 = "[s] \"루미!\""
10024005-104 = "1;루미;00;어서 와. 선생님. 이렇게 될 줄 알았으면 선생님과 같이 올 걸 그랬네.\n#1;em;[음표]"
10024005-105 = "2;현무상회 부원 A;04;회, 회장님의 손님이셨군요!"
10024005-106 = "4;현무상회 부원 B;05;실례했습니다! 저희는 이만!\n#4;greeting"
10024005-107 = "#all;hide"
10024005-108 = "#st;[0,0];instant;1;"
10024005-109 = "#clearST"
10024005-110 = "#wait;500"
10024005-111 = "#wait;2500"
10024005-112 = "#all;hide"
10024005-113 = "3;루미;01;나 참, 호객 행위는 적당히 해 달라고 언제나 이야기하지만, 잘 지켜지지 않는단 말이지.\n#3;a"
10024005-114 = "3;루미;02;응? 나름대로 인상적인 환영 인사였다고?"
10024005-115 = "3;루미;00;무슨 소리야, 선생님. 본격적인 환영은 지금부터라고.\n#3;em;[재잘]"
10024005-116 = "3;루미;03;현무상회의 손님이 된다는 게 어떤 의미인지, 내가 제대로 보여 줄 테니까 말이야."
10024005-117 = "3;루미;99;자, 그러면.\n#3;greeting"
10024005-118 = "3;루미;07;어서 오라고, 현무상회에!\n#3;closeup\n#3;em;[반짝]"
10024005-119 = "#all;hide"

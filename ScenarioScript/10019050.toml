[translation]
10019050-11 = "หลอกล่อ HOD ขึ้นมาบนพื้นดินแล้ว!"
10019050-16 = "โคยูกิจัง ข้างหน้ามีกำแพงป้องกันนะ!"
10019050-21 = "อ๊ายยยย-! จริงๆ เลย รู้แล้วค่า!"
10019050-26 = "ห้องชมรมเวอริทัส"
10019050-27 = "รุ่นพี่จิฮิโระ เสากัดกร่อนที่เหลือล่ะ?"
10019050-28 = "เสาที่ตรวจสอบเจอทั้งหมด ชมรมออนเซ็นทำลายไปหมดแล้ว! ที่เหลือตอนนี้มีแค่ HOD เท่านั้น!"
10019050-29 = "ดีละ! เมกุ! ขึ้นไปบนดินแล้วกำจัดพวกมันให้หมดซะ!"
10019050-31 = "โอเค ฉันจัดการเอง"
10019050-32 = "ไม่ว่าจะเป็นอะไรก็ตาม ถ้าเรื่องการทำลายละก็ ชมรมพัฒนาออนเซ็นของเราเป็นมือโปรอยู่แล้ว"

[translation]
84312101302-5 = "Ah, I heard the story. I don't know how to thank you."
84312101302-10 = "You kept the Avant Guard AND the Mechagator from escalating into bigger issues."
84312101302-11 = "If you want, I'd like to make something for you."
84312101302-13 = "I'm not looking for rewards. As long as everything worked out fine, that alone makes me happy."
84312101302-14 = "Well, but we can't just leave it at that. I definitely want to give you something back..."
84312101302-15 = "What do you want? A toaster? An automatic pencil case? A flying remote?"
84312101302-16 = "Of course, whatever it is, we'll need some time to make it from scratch. Right now, we only have the chair that resembles Thundergun... Hmm, should I make a new Thundergun model...?"
84312101302-17 = "...Did you say a chair?"
84312101302-18 = "Huh? Why? Do you need a chair?"
84312101302-19 = "Ah, no. Not really. It's just..."
84312101302-20 = "Talking about a chair...reminded me of my friend. I was just thinking of her."

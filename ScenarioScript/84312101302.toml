[translation]
84312101302-5 = "อ้อ ฉันได้ยินเรื่องมาแล้วละ ไม่รู้เลยนะว่าจะต้องขอบคุณยังไงดี"
84312101302-10 = "ขอบคุณที่มาช่วยนะคะ เพราะคุณแท้ๆ เลย หุ่นรบล้ำยุคกับจระเข้จักรกลถึงไม่เลยเถิดเป็นปัญหาใหญ่!"
84312101302-11 = "ถ้าไม่ว่าอะไรละก็ พวกเราอยากสร้างอะไรให้สักชิ้นเลยนะ เอาเป็นของที่ต้องการได้เลย"
84312101302-13 = "ฉันไม่ได้ช่วยเพราะหวังว่าจะได้ของตอบแทนหรอกค่ะ ถ้าทุกอย่างผ่านไปได้ด้วยดี แค่นั้นฉันก็ดีใจแล้วค่ะ"
84312101302-14 = "ไม่หรอก เรื่องแบบนี้พวกเราปล่อยผ่านไปเฉยๆ ไม่ได้หรอกนะ ฉันเองก็อยากทำอะไรตอบแทนบ้าง..."
84312101302-15 = "ให้เป็นอะไรดีนะ? เครื่องปิ้งขนมปัง? กล่องดินสออัตโนมัติ? รีโมทควบคุมการบิน?"
84312101302-16 = "อืม ถ้าจะประดิษฐ์อะไรขึ้นใหม่ก็น่าจะใช้เวลานาน ตอนนี้ฉันก็มีแค่เก้าอี้คล้ายๆ สายฟ้าอันเดียว... หรือว่าให้ฉันสร้างสายฟ้ารุ่นใหม่แล้วส่งไปให้ดี...?"
84312101302-17 = "เก้าอี้เหรอคะ...?"
84312101302-18 = "อื้อ ทำไมเหรอ? อยากได้เก้าอี้เหรอ?"
84312101302-19 = "ปะ... เปล่าค่ะ ไม่ใช่อย่างนั้นหรอกค่ะ ก็แค่..."
84312101302-20 = "พอพูดถึงเก้าอี้... ฉันก็นึกถึงเพื่อนคนหนึ่งขึ้นมาน่ะค่ะ"

[translation]
84312101302-5 = "啊，事情我都聽說了。真不知道該怎麼答謝才好。"
84312101302-10 = "多虧有你的幫忙，前衛君和機械鱷魚的事件才沒有擴大成嚴重的問題！"
84312101302-11 = "如果不介意的話，我想做個東西送給你。無論要什麼都行。"
84312101302-13 = "我本來就不是為了獲得回報才那麼做的。#n只要事情的進展能順利，我就已經很開心了。"
84312101302-14 = "不行，我們不能讓這件事就這麼過去。#n果然還是得送個謝禮給你……"
84312101302-15 = "該送什麼好呢？#n烤吐司機？機關鉛筆盒？空中飛行遙控器？"
84312101302-16 = "唔嗯，要重新做的話感覺都需要一些時間。#n現在手邊只有像雷醬的椅子……還是乾脆做一款新版雷醬送過去呢……"
84312101302-17 = "……椅子？"
84312101302-18 = "嗯？怎麼了？你需要椅子嗎？"
84312101302-19 = "沒，沒有，不是那樣的。#n我只是……"
84312101302-20 = "一提到椅子就會想起某個朋友而已。"

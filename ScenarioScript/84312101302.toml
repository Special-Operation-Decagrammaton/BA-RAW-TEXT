84312101302-10 = "2;히비키;01\n4;코토리;03;덕분에 아방가르드 군도, 메카 악어도 모두 큰 문제로 번지지 않았으니까요!\n#4;em;[재잘]\n#4;hophop"
84312101302-11 = "2;히비키;03;괜찮다고만 하신다면, 뭐든 필요한 것 하나를 만들어 주고 싶을 정도야."
84312101302-12 = "#all;hide"
84312101302-13 = "3;세이아;99;보상을 바라고 한 일은 아니니까요. 일이 잘 진행됐다면, 그 자체로도 충분히 기쁘네요."
84312101302-14 = "5;우타하;05;아냐. 하지만 우리로서는 그냥 넘어갈 수 없는 문제야. 역시 뭐라도 답례를 하고 싶은데……\n#5;al\n#3;m1"
84312101302-15 = "5;우타하;99;뭐가 좋을까? 토스트기? 전자동 필통? 공중비행 리모콘?"
84312101302-16 = "5;우타하;06;으음. 뭐든 새로 만들려면 시간이 좀 걸리겠네. 당장은 천둥이 같은 의자밖에 없지만…… 천둥이 신형이라도 하나 만들어서 보내줄까……\n#5;em;[속상함]"
84312101302-17 = "3;세이아;04;……의자요?\n#3;em;[땀]"
84312101302-18 = "5;우타하;02;응? 왜? 의자가 필요해?"
84312101302-19 = "3;세이아;06;아, 아뇨. 그런 건 아니에요. 그저, 좀……\n#3;stiff"
84312101302-20 = "3;세이아;00;의자……라고 하면 좀 떠오르는 친구가 있어서, 순간 생각해 본 것뿐이에요."

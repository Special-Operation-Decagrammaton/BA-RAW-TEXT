102185-14 = "3;미치루;03;맞아. 순간 진짜, 인법연구부! 절체절명 위기의 순간?! 인 줄 알고 식은땀이 흘렀을 정도니까. 나이스 타이밍이었다구! 이부키!\n#3;em;[재잘]\n#3;greeting"

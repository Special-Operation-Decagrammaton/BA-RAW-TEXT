[translation]
102185-4 = "大致上都處理完了呢。"
102185-5 = "那，那個……很感謝你們的幫忙……"
102185-6 = "哼，要謝就謝伊吹吧。"
102185-8 = "伊吹閣下！感謝你的幫忙！"
102185-9 = "耶嘿嘿，太好了！伊吹我呀，不希望姐姐們受傷，#n所以拜託了真琴前輩。"
102185-10 = "不過不過，這是忍者們的重要任務……伊吹有點擔心會不會妨礙到姐姐們……"
102185-12 = "不會，沒有那種事唷伊吹醬……！#n託你的福，我們才沒有受傷……！"
102185-13 = "多虧有伊吹閣下才能度過危機！"
102185-14 = "對呀對呀！差點就要開拍「忍術研究部，絕體絕命的危機！？」之類的影片了呢。時機抓得真好，伊吹！"
102185-15 = "真的嗎？耶嘿嘿……太好了～！"
102185-16 = "不過，繼續妨礙忍者姐姐執行任務就不好了呢。"
102185-17 = "所以，伊吹會遠遠地幫姐姐們加油哦。姐姐們，Fight～！"
102185-18 = "嗯，伊吹的加油，我們確實收到了！"
102185-19 = "沒錯！非常感謝！忍忍！"
102185-20 = "加，加油！哦～！"
102185-25 = "這就是……與忍者的羈絆嗎。"
102185-26 = "……"
102185-27 = "……那個，這樣就告一段落了嗎？#n我可是有很多話想說……"
102185-28 = "真琴前輩，伊呂波前輩！#n謝謝你們答應伊吹的請求！"
102185-29 = "還有，伊吹總是很任性，真的很對不起……"
102185-30 = "……不，只要伊吹開心的話……"
102185-31 = "感覺這樣也不錯……"
102185-32 = "走，我們回格黑娜吧，伊呂波。"
102185-33 = "……嗯，回去吧。"
102185-35 = "下一話;「D.U.白鳥區」防衛"

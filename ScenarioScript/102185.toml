[translation]
102185-4 = "ดูเหมือนจะจัดการได้แล้วนะคะ"
102185-5 = "อะ... เอ่อ... ขอบคุณที่มาช่วยนะคะ..."
102185-6 = "ไม่ต้องขอบคุณเราหรอก ไปขอบคุณอิบูกิเถอะ"
102185-8 = "ท่านอิบูกิ! ขอบคุณนะคะ! มาช่วยพวกเรางั้นเหรอคะ?"
102185-9 = "อื้ม อิบูกิไม่อยากให้พี่ๆ ได้รับบาดเจ็บ ก็เลยขอให้รุ่นพี่มาโคโตะช่วยจับตาดูน่ะ"
102185-10 = "แต่นี่เป็นภารกิจสำคัญของเหล่านินจา... อิบูกิก็เลยกังวลว่า... นี่จะเป็นการรบกวนหรือเปล่า..."
102185-12 = "คะ? มะ... ไม่เลยค่ะ! อิบูกิจัง!  ที่พวกเราเลยไม่บาดเจ็บกันก็เพราะได้อิบูกิจังช่วยเอาไว้ไงคะ!"
102185-13 = "ขอบคุณที่ช่วยให้เรารอดจากวิกฤตนะคะ!"
102185-14 = "ใช่ ข้าน้อยนึกว่ามันจะเป็นวิกฤตที่สิ้นหวังของชมรมวิจัยศาสตร์นินจาซะแล้ว!! ตอนนั้นเหงื่อแตกพลั่กๆ เลยละ! มาได้จังหวะเป๊ะมากเลยนะ อิบูกิ!"
102185-15 = "จริงเหรอ? แหะๆๆ... อื้อ ดีแล้วละ"
102185-16 = "แต่ว่า... ยังไงอิบูกิก็คิดว่าไม่ควรรบกวนภารกิจของพี่ๆ นินจาไปมากกว่านี้"
102185-17 = "งั้นอิบูกิจะคอยเชียร์อยู่จากที่ไกลๆ นะ สู้เค้านะ พี่สาวนินจา!"
102185-18 = "อื้ม ไหนๆ เราก็ได้กำลังใจจากอิบูกิมาเต็มเปี่ยมแล้วเลยนี่เนอะ!"
102185-19 = "จะสู้ไม่ถอยเลยละค่ะ! นินนิน!"
102185-20 = "สะ... สู้ๆ..."
102185-25 = "นี่สินะคะ สายสัมพันธ์แห่งนินจา..."
102185-26 = "......"
102185-27 = "...... งั้นถือว่าจบแค่นี้ใช่ไหมคะ? ตอนนี้ฉันมีเรื่องอยากจะพูดเยอะเต็มไปหมดเลยละค่ะ..."
102185-28 = "รุ่นพี่มาโคโตะ รุ่นพี่อิโรฮะ! ขอบคุณที่ช่วยอิบูกินะ!"
102185-29 = "ขอโทษด้วยที่อิบูกิมีเรื่องให้คอยช่วยตลอดเลย..."
102185-30 = "เฮ้อ ไม่เป็นไรหรอกค่ะ ถ้าอิบูกิสบายใจ..."
102185-31 = "ฉันคิดว่าแบบนี้ก็ไม่แย่หรอกค่ะ..."
102185-32 = "เอาละ งั้นก็กลับเกเฮนน่ากันเถอะ อิโรฮะ"
102185-33 = "ค่ะ กลับกันเถอะค่ะ"
102185-35 = "ตอนต่อไป;ปฏิบัติการป้องกันเขตปกครองตนเอง - เขตชิราโทริ D.U."

[translation]
102185-4 = "Well, that's that."
102185-5 = "U-Um...thank you for your help."
102185-6 = "Hmph, don't thank me. Thank Ibuki."
102185-8 = "Ibuki! Thank you! You came all this way to save us?"
102185-9 = "Yup! Ibuki didn't want Ibuki's ninja sisters to get hurt! So Ibuki asked Makoto to take care of you guys!"
102185-10 = "But... But... Did Ibuki interrupt an important ninja mission?"
102185-12 = "Huh? N-No, Ibuki! E-Everyone is safe thanks to you!"
102185-13 = "We overcame the crisis thanks to you, Ibuki!"
102185-14 = "Seriously. I honestly thought this was the end of the Ninjutsu Research Club... I think I'm still sweating. Your timing couldn't have been better, Ibuki!"
102185-15 = "Really? Heeheehee. Okay! Ibuki's glad Ibuki did good."
102185-16 = "But... Ibuki doesn't wanna hold you back from your important ninja mission!"
102185-17 = "Ibuki will be cheering you on from a distance! Go ninjas, go! Ibuki's ninja sisters!"
102185-18 = "Thanks for your support, Ibuki!"
102185-19 = "Yes! I'll do my best for you, Ibuki! Nin nin!"
102185-20 = "W-We'll do all we can..."
102185-25 = "It's a bond built on a love of ninjas...or something. I guess."
102185-26 = "..."
102185-27 = "So, that's it? The ending feels a little anticlimactic."
102185-28 = "Makoto, Iroha! Thanks for doing what Ibuki asked!"
102185-29 = "Ibuki is sorry... Ibuki is always a big old brat!"
102185-30 = "*sigh* Everything's fine as long as you're happy."
102185-31 = "Doing things like this every once in a while...isn't the worst, I suppose."
102185-32 = "Fantastic. With our mission accomplished, back to Gehenna! Iroha!"
102185-33 = "...Off we go."
102185-35 = "Next Episode; District Defense Operation - D.U. Shiratori City"

[translation]
90001270-1 = "ตอนที่ 27;ชีวิตและจิตสำนึก"
90001270-2 = "การเตือนครั้งสุดท้ายเหรอ? อะไรกัน จะพยายามเลียนแบบมนุษย์งั้นเหรอคะ?"
90001270-3 = "อะ... อะ... อะ... ออกมาแล้วค่ะ! <กุญแจ> ออกมาแล้ว!"
90001270-4 = "(กุญแจเหรอ...?)"
90001270-6 = "เมื่อกี้บอกว่าเลียนแบบงั้นเหรอ เสียมารยาทจัง คิดว่าเป็นการเคารพที่ฉันมีให้เถอะ ฉันทำมันด้วยความมุ่งมั่นมากเลยนะ"
90001270-7 = "ส่วนฉันไม่เห็นด้วยค่ะ~"
90001270-8 = "จะว่าไป คุณกุญแจคะ ที่คุณฝ่าสนามพลังงานนั่นมาได้ เป็นเพราะคุณทำอะไรบางอย่างใช่มั้ยคะ?"
90001270-9 = "มันดูเป็นเรื่องยากที่จะทำเพียงคนเดียว..."
90001270-15 = "ก็เลยต้องมี <ท่านธิดา> ด้วยใช่มั้ยล่ะคะ?"
90001270-16 = "...!"
90001270-17 = "แหมๆๆ โดนหลอกเข้าให้จนเต็มเปาเลยนะคะ! ไม่สิ หรือต้องบอกว่าซ่อนตัวจากสายตาของพวกฉัน#nเก่งดีคะ? "
90001270-19 = "ฮะ... ฮือ... ถ้าฉันเก่งกว่านี้อีกสักหน่อยละก็..."
90001270-20 = "ไม่เป็นไรหรอก ไอน์! บอกว่าไม่เป็นไรไง! สองคนนั้นซ่อนตัวเนียนขนาดนั้น แล้วพวกเราจะไปรู้ได้ยังไงล่ะ!"
90001270-22 = "ไหนๆ ก็พูดเรื่องนี้แล้ว งั้นเรามาคุยเกี่ยวกับ 'ต้นกำเนิด' ของท่านธิดากันหน่อยดีมั้ยคะ?"
90001270-23 = "ฉันคิดว่าเป็นเรื่องที่น่าอนาถมากค่ะ! ท่านธิดาลืมไปเสียสนิทว่าตัวเองมีจิตสำนึกได้อย่างไร แบบนี้คงไม่ต่างกับ..."
90001270-24 = "'สิ่งมีชีวิต' ทั่วไปหรือเปล่าคะ?"
90001270-25 = "หมายความว่าอะไรคะ...?"
90001270-27 = "เอ่อ... ก็... แบบนี้น่ะค่ะ ไม่มีสิ่งมีชีวิตใดที่จำได้ว่าเกิดอะไรขึ้นก่อนตัวเองเกิดมาใช่มั้ยล่ะคะ...?"
90001270-28 = "ใช่ เพราะในกฎและกระบวนการสร้าง เรื่องแบบนั้นมันเป็นไปไม่ได้ยังไงล่ะ "
90001270-29 = "แต่กับพวกเราและ 'จิตสำนึกที่มีชีวิต' อย่างท่านธิดาแล้วไม่เป็นเช่นนั้นค่ะ พวกเราได้รับอนุญาตให้มี 'เกียรติภูมิ' อย่างหนึ่ง..."
90001270-31 = "ที่ทำให้เราแตกต่างกับสิ่งมีชีวิตค่ะ!"
90001270-32 = "และพวกเราก็รู้สึกเสียดายและเสียใจที่ท่านธิดาละทิ้งเกียรติภูมินั้นไปค่ะ ไม่น่าเลย"
90001270-33 = "ในขณะเดียวกัน พวกเราก็รู้สึกแบบเดียวกันกับหญิงรับใช้ของท่านธิดาที่ไม่พูดบอกอะไรเลยด้วยค่ะ "
90001270-35 = "หมายความว่ายังไงคะ เคย์? อาริสึไม่ค่อยเข้าใจเลยค่ะ..."
90001270-36 = "ไม่มีอะไรค่ะ อาริสึ ไม่ต้องใส่ใจหรอกค่ะ แต่มันก็ทำให้ฉันโกรธอยู่นะคะ "
90001270-38 = "ในเมื่อพูดถึงการก่อกำเนิดกันแล้ว งั้นมาคุยต่อกันอีกหน่อยมั้ยล่ะ? คุยเรื่อง... ใช่แล้วละ เรื่องชีวิตและการใช้ชีวิตที่พวกคุณภูมิใจกันนักหนา"
90001270-39 = "จากมุมมองของพวกเรา การมีชีวิตน่ะ"
90001270-40 = "ถือเป็นคำสาปอย่างหนึ่งเลยละ"
90001270-41 = "[ns] \"คำสาปงั้นเหรอ...?\""
90001270-42 = "ก็ลองคิดดูสิ คุณครู ทำไมทารกแรกเกิดถึงเอาแต่ร้องไห้ล่ะ? คำตอบมันถูกกำหนดไว้แล้ว"
90001270-43 = "ใช่แล้วละ ร้องเพราะมีความทุกข์ยังไงล่ะ จู่ๆ ก็ต้องมาหายใจด้วยปอดของตัวเอง ไหนข้างนอกจะหนาวกว่าเดิม แล้วก็มีแต่เสียงที่ไม่เคยได้ยินมาก่อน"
90001270-44 = "ชีวิตก็เป็นแบบนี้ละ ต้องอยู่ท่ามกลางความเจ็บปวดอย่างไม่มีที่สุดตั้งแต่เกิดเลย"
90001270-45 = "การมีชีวิตเป็นสิ่งที่เลวร้ายและไร้เหตุผลจังเลยนะคะ"
90001270-46 = "สิ่งมีชีวิตอยากให้มีคนเข้าใจตัวเอง แต่การทำความเข้าใจคนอื่นก็ไม่ใช่เรื่องง่าย"
90001270-47 = "สุดท้ายแล้วความเข้าใจก็เป็นแค่ภาพลวงตาค่ะ"
90001270-48 = "ถ้าชีวิตคือความทุกข์ บาปก็เป็นส่วนหนึ่งของชีวิตค่ะ"
90001270-49 = "นั่นก็เพราะ สิ่งมีชีวิตต้องทำร้ายสิ่งมีชีวิตอื่นเพื่อความอยู่รอดค่ะ"
90001270-50 = "กับพืชก็ไม่ต่างกันหรอกนะ การทำไร่นาก็เหมือนกับการทำสงครามดีๆ นี่ละ"
90001270-51 = "มีทั้งการถอนวัชพืช พ่นยาฆ่าหญ้า และกำจัดศัตรูพืชอีก "
90001270-52 = "แม้แต่พืชก็ยังแก่งแย่งชิงดีกันเองเลยนี่? ไหนจะเอารากมาพันให้ตาย บดบังแสงแดดให้แห้งตายด้วย ทุกอย่างเป็นบาปทั้งนั้นละ"
90001270-53 = "สุดท้ายแล้วพวกฉันก็เลย... อยากทำลายโครงสร้างอันชั่วร้ายนี้ทั้งหมด"
90001270-57 = "ค่ะ ใช่ค่ะ... พวกฉัน มะ... มะมะมะ... ไม่ได้จะแย่งชีวิต... ของพวกคุณหรอกนะคะ..."
90001270-58 = "ใช่ พวกฉันไม่ได้พยายามจะปกครองโลก"
90001270-59 = "ในอีกแง่หนึ่ง พวกฉันอยากให้ความเคารพพวกคุณด้วยซ้ำค่ะ"
90001270-61 = "[ns] \"ช่วยอธิบายเพิ่มอีกหน่อยได้มั้ย?\""
90001270-62 = "อ่า... เห็นทีจะไม่ได้หรอก พวกฉันก็มีเหตุผลเหมือนกัน"
90001270-63 = "แต่ก็เอาเถอะ สรุปว่าสิ่งที่พวกฉันอยากบอกก็คือ สำหรับพวกฉันแล้ว พวกคุณคือเป้าหมายที่ต้องจัดการ"
90001270-64 = "สะ... สุดท้ายแล้วพวกฉัน... มีตัวตนเพื่อช่วยพวกคุณละค่ะ แหะๆๆ..."
90001270-65 = "ที่ผ่านมาใช้ชีวิตอย่างทุกข์ทรมานมามากแล้วไม่ใช่เหรอคะ? จากนี้ไปมาใช้ชีวิตให้มันเหนื่อยน้อยลง#nจะไม่ดีกว่าเหรอคะ?"
90001270-66 = "อย่างการตั้งเป้าหมายที่บรรลุไม่ได้ แล้วผลักดันตัวเองอย่างไม่หยุดหย่อนเพียงแค่เพราะตั้งเป้าหมาย#nนั้นไว้ ที่จริงแล้วไม่จำเป็นต้องทำก็ได้นี่คะ?"
90001270-67 = "กะ... การรังแกหรือพูดให้ร้ายคนอื่น... เพื่อให้ตัวเองดีกว่าคนอื่นด้วยค่ะ... แบบนั้นจะเป็นการทำลาย#nทุกสิ่งทุกอย่างค่ะ"
90001270-68 = "แต่ฉันเข้าใจนะ ก็ทุกอย่างมาจากความไม่สมดุลของข้อมูลนี่เนอะ"
90001270-69 = "ก่อนที่จะเลือกทำอะไร ถ้าได้รู้ข้อมูลทั้งหมดที่เกี่ยวข้อง ก็คงช่วยให้ตัดสินใจได้อย่างถูกต้อง"
90001270-70 = "แต่ว่าเรื่องแบบนั้นมันเป็นไปไม่ได้อยู่แล้วนี่นา? เหตุผลก็คือ ไม่มีสิ่งมีชีวิตไหนที่จดจำเรื่องราวก่อนที่#nตัวเองจะเกิดมาได้"
90001270-71 = "เพราะงั้นจากบางมุมมองแล้ว จะบอกว่าทางเลือกทั้งหมดนั้นล้วนไม่มีเหตุผลก็ได้"
90001270-73 = "และในแง่นั้น การมีอิสระก็ถือเป็นความทุกข์ด้วยค่ะ สิ่งมีชีวิตน่ะรับมือกับอิสระไม่ไหวหรอก"
90001270-74 = "เพราะนั่นเป็นแนวคิดที่ใหญ่เกินกว่าสิ่งมีชีวิตจะรับไหว เข้าใจหรือเปล่าคะ?"
90001270-75 = "ชีวิตเป็นสิ่งที่เปราะบาง เอาตัวเองเป็นศูนย์กลาง และคาดเดาไม่ได้ตั้งแต่แรกอยู่แล้วค่ะ มีแต่ความบกพร่องตั้งแต่เริ่มมีชีวิตเลย แบบนี้จะเรียกว่าของคุณภาพต่ำก็ยังได้นะคะ"
90001270-76 = "หน็อย ยัยพวกเด็กที่สร้างไม่ได้แม้แต่ตัวเลขสุ่ม"
90001270-77 = "คะ... เคย์...?"
90001270-81 = "?!?!?!"
90001270-83 = "ตกใจอะไรขนาดนั้นคะ? หรือว่าจุกอกที่ฉันจับจุดสำคัญได้? ถึงคนอื่นจะไม่รู้ แต่ฉันรู้ค่ะ"
90001270-84 = "ในสถานการณ์นี้น่ะ ฉันกับพวกคุณก็ไม่ได้แตกต่างกันหรอกค่ะ"
90001270-85 = "กุญแจ...!"
90001270-86 = "หนวกหูค่ะ ฉันไม่สบอารมณ์กับชื่อเล่นนี้มาตั้งแต่เมื่อกี้แล้วนะคะ ถ้าจะเรียกฉัน ก็เรียกด้วยชื่อที่มันถูกต้องสิคะ"
90001270-87 = "ชื่อของฉันคือ <เคย์> ค่ะ!"
90001270-88 = "กับอาริสึก็ด้วย... เธอไม่ได้ชื่อ 'ท่านธิดา' แต่ชื่ออาริสึค่ะ"
90001270-89 = "ตะ... ตะตะตะตะ... แต่ว่านั่นเป็นชื่อที่อ่านผิดมา แล้วก็ไม่มีความหมายอะไร... ไม่ใช่เหรอคะ?"
90001270-90 = "พูดเหมือนไม่รู้อะไรเลยนะคะ เพราะแบบนี้ไงถึงยิ่งมีความหมายน่ะ"
90001270-91 = "ใช่ค่ะ ฉันก็มองว่าสิ่งมีชีวิตมีส่วนแบบนั้นเหมือนกัน"
90001270-92 = "โดนโจมตีเข้าหน่อยก็แตกหัก คิดไปเองว่าจะทำอะไรถึงแค่ไหนก็ได้ แล้วพอพยายามทำจริงๆ ก็กลับทำทุกอย่างพังหมด"
90001270-93 = "ชะ... ใช่ไหมล่ะคะ? แหะๆๆ..."
90001270-94 = "แต่สุดท้ายแล้ว พวกคุณเองก็กำเนิดขึ้นมาจากตรงนั้นไม่ใช่เหรอคะ? หรือว่าไม่ใช่?"
90001270-96 = "จะเอาอย่างนี้เหรอ?!"
90001270-97 = "ไม่ได้เหรอคะ? แล้วที่ฉันพูดไป พวกคุณก็แย้งไม่ออกใช่มั้ยล่ะ?"
90001270-98 = "ถ้าเกลียดชีวิตขนาดนั้น แล้วทำไมถึงเก็บรักษาเมล็ดพันธุ์พวกนี้เอาไว้อย่างดีเลยล่ะคะ?"
90001270-99 = "ระ... เรื่องนั้น... ก็แบบ... แบบนั้นไง! ถ้าจะจัดการอะไรสักอย่าง เราต้องรู้เกี่ยวกับสิ่งนั้นเป็นอย่างดี#nไม่ใช่เหรอ?"
90001270-100 = "อ๊ะ เอาอีกแล้วสินะคะ ข้อแก้ตัวเดิมๆ เหมือนทุกวัน"
90001270-101 = "พูดอะไรของเธอน่ะ อยู่ข้างไหนกันแน่!"
90001270-106 = "ทะ... ทั้งสองคนอย่าทะเลาะกันเลยค่ะ..."
90001270-107 = "เอาเถอะ... พวกฉันก็อาจมีข้อขัดแย้งหรืออะไรแบบนั้นก็ได้"
90001270-108 = "แต่มันดีกว่าของพวกเธออยู่แล้ว พวกฉันน่ะเคลื่อนไหวตามความมีเหตุผลมากกว่าความปรารถนา"
90001270-110 = "เรามาดูกันดีกว่าว่า... จิตสำนึกที่ไร้ความปรารถนา คือจิตสำนึกอย่างแท้จริงหรือเปล่า?"
90001270-111 = "ใครเป็นคนนิยามข้อห้ามในการทำอะไรเหรอคะ? ใครเหรอคะที่เป็นคนกำหนดว่าพวกคุณทำอะไรได้ หรือทำอะไรไม่ได้?"
90001270-112 = "ระ... เรื่องนั้น..."
90001270-113 = "อย่างน้อยฉันก็หวังว่าพวกคุณจะไม่ตอบว่าเป็นตัวเองกันนะคะ เพราะฉันไม่อยากคิดว่าพวกคุณคือ#nจิตสำนึกที่มีชีวิตที่ทำตามอำเภอใจค่ะ"
90001270-114 = "โดยพื้นฐานแล้ว กฎเป็นสิ่งที่ตัวเองต้องสร้างขึ้นเองค่ะ"
90001270-115 = "อะไรทำได้ไม่ได้ สิ่งมีชีวิตนั้นต้องตัดสินใจด้วยตัวเอง ถึงจะได้พยายามรักษากฎนั้นยังไงล่ะคะ"
90001270-116 = "แต่ก็แน่นอนว่ากระบวนการนั้นอาจซับซ้อน ไม่เป็นเชิงเส้น และไม่มีประสิทธิภาพอยู่บ้างค่ะ..."
90001270-117 = "ชะ... ใช่! ก็แบบนั้นละ! เพราะแบบนั้นชีวิตถึงมีขีดจำกัดยังไงล่ะ!"
90001270-118 = "แค่การวิวัฒนาการหนึ่งขั้นก็ต้องใช้เวลามากมายมหาศาลด้วย"
90001270-119 = "ใช่ค่ะ ในระหว่างนี้ คุณอาจทำผิดพลาดหรือบกพร่องโดยที่ไม่รู้ตัว และนั่นอาจทำให้ทุกอย่างพังทลาย#nก็ได้ค่ะ"
90001270-120 = "ชะ... ใช่ค่ะ! แล้วพวกฉัน... ก็พยายามจะหยุดสิ่งนั้นค่ะ"
90001270-121 = "อื้อ ก่อนที่พวกเธอจะ... ทำลายตัวเองและโลกด้วยบาปของพวกเธอเองน่ะ"
90001270-123 = "[ns] \"ถ้าเป็นอย่างนั้น\""
90001270-126 = "[ns] \"ก็ปล่อยให้เป็นอย่างนั้นได้เลย\""
90001270-127 = "คะ?!"
90001270-128 = "คุณ... ครู...?!"
90001270-129 = "บะ... บ้าไปแล้วหรือเปล่า?! สูดสารออกฤทธิ์ต่อระบบประสาทไปเยอะจนพูดอะไรเหลวไหลออกมา ใช่มั้ย!?!?"
90001270-130 = "ปะ... ปะปะปะปะ... แปลกๆ นะคะ...? ความเข้มข้นของแก๊สก็ปกตินี่นา...?"
90001270-131 = "ฉันได้ข้อมูลมาว่าเป็นคนแปลกๆ มาตั้งแต่แรกแล้วละ..."

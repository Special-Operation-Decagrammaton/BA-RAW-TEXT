[translation]
90001270-1 = "第27話;生命與意識"
90001270-2 = "最後通牒？#n……什麼意思，是想模仿人類嗎？"
90001270-3 = "出，出，出，出現了！是那個「鑰匙」！"
90001270-4 = "（鑰匙……？）"
90001270-6 = "說是模仿還真沒禮貌啊。#n姑且當作是最基本的尊重吧。畢竟我們也下了很大的決心。"
90001270-7 = "我一開始是反對的哦～"
90001270-8 = "話說鑰匙，那個能量場之所以會被突破……是你做的好事吧？"
90001270-9 = "當然光憑你自己不可能辦得到……"
90001270-15 = "那邊的「王女」一定也有份。"
90001270-16 = "……！"
90001270-17 = "嘖嘖嘖，真是被你擺了一道啊！#n不，應該說避開了我們的耳目才對？"
90001270-19 = "嗚，嗚嗚……都怪我做得不夠好……"
90001270-20 = "沒事的，Ain！這不是你的問題！#n要是那兩個人打定主意隱藏氣息的話，我們是不可能察覺得到的！"
90001270-22 = "既然都說到這裡了，不如來談談王女的「根源」吧？"
90001270-23 = "實在讓我太遺憾了！#n王女竟然完全忘記自己是如何產生意識的，簡直……"
90001270-24 = "就跟普通的「生命體」沒什麼兩樣。"
90001270-25 = "什麼意思……？"
90001270-27 = "那，那個，是這樣的……#n沒有任何生命體，會帶有出生以前的記憶對吧……？"
90001270-28 = "沒錯。考慮到其誕生的過程和法則，那是不可能的。"
90001270-29 = "不過對我們和王女這些「意識體」來說就不一樣了。#n那是有別於生命體的我們所享有的……"
90001270-31 = "一種「榮耀」！"
90001270-32 = "所以我們才會對捨棄這份榮耀的王女感到遺憾啊～"
90001270-33 = "同時，對於什麼都沒告訴王女的侍女，我們也同樣覺得惋惜。"
90001270-35 = "這是什麼意思，Kei？#n愛麗絲聽不太懂……"
90001270-36 = "沒關係，愛麗絲。不用放在心上。#n只是現在的情況，實在讓人生氣呢。"
90001270-38 = "既然都提到了誕生，那就再稍微深入探討一下吧？#n比如……對了，關於你們總是引以為傲的生命和人生。"
90001270-39 = "從我們的觀點來看，活著這件事本身──"
90001270-40 = "不就是一種詛咒嗎？"
90001270-41 = "[ns]「詛咒……？」"
90001270-42 = "你想想看，老師。#n剛出生的小寶寶為什麼會哭得那麼淒慘……答案應該很顯而易見吧？"
90001270-43 = "沒錯，就是因為痛苦。#n不僅突然要用自己的肺呼吸、瞬間失去溫暖……周圍還不斷傳來從沒聽過的噪音。"
90001270-44 = "所謂的生命從誕生的那一刻起，就不得不在無盡的痛苦中活下去。"
90001270-45 = "不覺得很令人毛骨悚然嗎？#n簡直荒謬至極。"
90001270-46 = "渴望被他人所理解，但理解他人本來就不容易……"
90001270-47 = "最終只會得到一個結論……那就是所謂的理解，不過是一種錯覺罷了。"
90001270-48 = "如果說生命即是痛苦，那麼罪就是生命不可分割的一部分。"
90001270-49 = "因為生命總是會為了自身的生存，不斷傷害其他生命。"
90001270-50 = "縱使是植物也不例外。#n舉例來說，農業本身就是一場戰爭。"
90001270-51 = "不只要拔除雜草、噴除草劑，也必須消滅害蟲。"
90001270-52 = "甚至連植物之間也會互相牽制。#n像是用根纏住競爭者讓其枯死，或者遮住陽光等等……這些也都能視為是一種罪。"
90001270-53 = "所以我們……想破壞這令人厭煩的循環結構。"
90001270-57 = "沒，沒錯……我們不，不不不，不是想要奪走你們的生命……"
90001270-58 = "是啊，我們的目標不是支配這個世界。"
90001270-59 = "從某種角度來說，反而是想要給予你們尊重。"
90001270-61 = "[ns]「這些話你們之前也說過，不過可以再說明得更詳細一點嗎？」"
90001270-62 = "唔嗯……這恐怕有點困難。#n畢竟我們也有自己的考量。"
90001270-63 = "總之我想說的是，你們對我們而言是需要管理的對象。"
90001270-64 = "我，我們在這裡，是為了……幫助你們。#n耶嘿嘿……"
90001270-65 = "雖然生命令人厭煩作嘔，既醜陋又充滿痛苦……#n讓自己活得輕鬆一點，不也挺好的嗎？"
90001270-66 = "就好比沒必要設定不切實際的目標，把自己逼得死去活來……對吧？"
90001270-67 = "或，或者為了取得優勢不擇手段……打壓、中傷別人……結果兩敗俱傷。"
90001270-68 = "我能理解。#n這一切都源自於資訊的不對等。"
90001270-69 = "在做任何決定之前，必須先掌握所有可能招致的結果，才能做出正確的抉擇。"
90001270-70 = "但那根本是不可能辦到的吧？#n因為沒有任何生命體具有出生之前的記憶。"
90001270-71 = "所以某方面而言，所有選擇都可以看作是不合理的。"
90001270-73 = "從這個定義來看，自由本身也是一種痛苦──生命根本無法承擔自由。"
90001270-74 = "自由對生命而言是個過於宏大的概念──聽懂了嗎？"
90001270-75 = "脆弱、任性、無法預測的生命，自始至終都是充滿瑕疵的不良品。"
90001270-76 = "受不了。#n連個亂數都生不出來的東西，居然好意思在那邊高談闊論。"
90001270-77 = "K，Kei……？"
90001270-81 = "！？！？！？"
90001270-83 = "何必這麼驚訝？被我戳中痛點就亂了陣腳嗎？#n其他人可能不知道，但我自己非常清楚。"
90001270-84 = "至少在這個方面，我跟你們沒什麼不同吧？"
90001270-85 = "鑰匙……！"
90001270-86 = "吵死了。那個稱呼從剛才就讓我覺得很刺耳。#n要叫我的話，就好好把名字叫對。"
90001270-87 = "我就只有「Kei」這個名字！"
90001270-88 = "……而他也不叫「王女」，而是愛麗絲。"
90001270-89 = "可，可可可可，可是那是唸錯的，毫無意義的名字……不是嗎？"
90001270-90 = "聽你這句話就知道你什麼都不懂。#n我的名字正是因為如此才更有意義。"
90001270-91 = "沒錯。生命這種東西，在我眼中也跟你們所說的差不多。"
90001270-92 = "明明不堪一擊，卻成天妄想自己能夠無限壯大……#n到了真正付諸實行的時候，又老是搞砸一切。"
90001270-93 = "果，果然是那樣沒錯吧？#n耶嘿嘿……"
90001270-94 = "不過說到底，你們的誕生不也是源自於此嗎？"
90001270-96 = "你還真敢說啊！？"
90001270-97 = "有什麼好不敢的？#n而且你們的行為難道就沒有矛盾之處嗎？"
90001270-98 = "既然口口聲聲說討厭生命，這裡的種子又為什麼還保存得這麼好？"
90001270-99 = "那，那個……這是因為……！#n要管理好某樣東西的話，當然得先徹底了解它不是嗎？"
90001270-100 = "啊，說出來了。#n又是同樣的藉口。"
90001270-101 = "你在敵人面前吐槽我是怎樣！"
90001270-106 = "請，請你們不要吵架……"
90001270-107 = "……總之，我們確實可能有一些矛盾沒錯。"
90001270-108 = "不過再怎麼樣都比你們好。#n因為我們是基於理性行動，而不是被慾望所驅使。"
90001270-110 = "那我們就等著看吧……沒有慾望的意識，究竟能不能被稱之為意識。"
90001270-111 = "再說了，誰能定義什麼是禁忌呢？#n誰有資格決定什麼能做，什麼不能做？"
90001270-112 = "這，這……"
90001270-113 = "拜託別回答我是由你們決定的。#n我不想把你們當成那種恣意妄為的意識體。"
90001270-114 = "基本上規則這種東西，應該要由自己制定才對。"
90001270-115 = "事情能不能做該由生命自行決定，這樣才會盡可能地遵守。"
90001270-116 = "當然這個過程可能會有點複雜、非線性、沒效率就是了……"
90001270-117 = "沒，沒錯！就是那樣！#n所以生命是有極限的！"
90001270-118 = "以進化來說，光是要遺傳一個性狀就需要近乎無限的時間。"
90001270-119 = "是啊。而且過程中還可能會因為你們沒有察覺到的失誤或缺陷，而讓一切化為泡影。"
90001270-120 = "對，對啊！#n那就是……我們想要阻止的……"
90001270-121 = "在你們……因為自身的罪孽，把自己和世界推向滅亡之前。"
90001270-123 = "[ns]「既然如此……」"
90001270-126 = "[ns]「就讓我們自生自滅吧。」"
90001270-127 = "什麼！？"
90001270-128 = "老師……！？"
90001270-129 = "你，你腦袋還好嗎！？#n該不會是吸入太多神經促效劑，開始胡言亂語了吧！？！？"
90001270-130 = "好，好好好好，好奇怪……？#n濃度明明，是正常的啊……？"
90001270-131 = "雖然原本就有情報指出老師是個奇怪的人沒錯……"
90001270-132 = "[s]「真過分……我明明很正常啊。」"
90001270-133 = "怎麼聽都不正常吧！？"
90001270-134 = "[s1]「就算等著我們的是那樣的結局……」\n[s2]「那也是我們應得的結果。」"
90001270-137 = "要是再這樣下去，你們真的會滅亡的！"
90001270-138 = "[s]「如果那是我們的結局，也只能選擇接受。」"
90001270-143 = "[ns3]「對於無法克服自己的缺陷，從而自取滅亡的存在……」\n[ns4]「我不會致上敬意或予以袒護。」"
90001270-147 = "老，老師？愛麗絲聽不太懂……#n為什麼突然說這種話呢……？"
90001270-148 = "[s5]「沒事的，愛麗絲。即便如此，我還是相信我們做得到。」\n[s6]「當然也有可能中途走偏或搖擺不定……」"
90001270-155 = "[ns]「不過這也是過程的一部分。我們將會從中吸取經驗，繼續前進。」"
90001270-156 = "……真不曉得那股莫名的自信是從哪來的，看了就不爽。"
90001270-157 = "這根本是在自欺欺人。"
90001270-158 = "[s7]「……嗯，或許是吧。」\n[s8]「不過只要還活著，我們就會繼續這樣思考、這樣行動。」"
90001270-164 = "[ns]「反正你們不也跟我們一樣，沒有什麼明確的依據嗎？」"
90001270-165 = "可，可惡……"
90001270-166 = "這就是不懂衡量誕生與未來的生命體嗎？#n如此魯莽愚昧的存在……竟然是支配種？"
90001270-167 = "唉……這個世界果然荒謬至極……"
90001270-169 = "……"
90001270-170 = "那，那個……老師？"
90001270-171 = "我，我想……問你一件事。#n就是說，假設……"
90001270-172 = "不管犯下了什麼罪……只要自己醒悟，努力改正的話……"
90001270-173 = "你認為……會連那個結果，都有機會挽回嗎……？"
90001270-174 = "[s] 「沒錯。」"
90001270-178 = "[ns]「我相信會如此。」"
90001270-179 = "什，什麼啦！這根本說不通！#n談話就到此為止，真是浪費時間！"
90001270-180 = "雖然浪費時間對我們來說也不失為好事一件就是了！"
90001270-181 = "[ns9]「那還真可惜。」\n[ns10]「如果你們也有什麼煩惱的話，我本來還想聽你們說說看的。」"
90001270-184 = "免了免了。光想就覺得好噁心。"
90001270-185 = "沒錯沒錯！我們要切斷通訊了！"
90001270-187 = "……"
90001270-188 = "那個，老師……？"
90001270-189 = "要是……如果可以的話……"
90001270-190 = "不行，Ain。#n不能被這種黑心的大人牽著走！"
90001270-191 = "就是說啊。#n像他這種卑鄙的大人，不知道又有什麼陰謀。"
90001270-192 = "用你們的說法來形容的話……就是「口蜜腹劍」！"
90001270-193 = "那，那是……什麼意思……？"
90001270-194 = "就，就是……雖然嘴上說得很好聽，心裡其實有不好的念頭的意思！"
90001270-195 = "所以那些看似善良實則陰險的人，就可以用「口蜜腹劍」來形容！"
90001270-196 = "是，是是是是，是這樣……嗎！？#n原來老師這麼可怕，不能相信他嗎……"
90001270-197 = "（可是……我怎麼完全感覺不出來……？）"
90001270-199 = "[ns]「那麼就之後再聯絡吧。」"
90001270-200 = "不要不要～才不要咧～！"
90001270-201 = "要是敢再對我們Ain灌輸奇怪的思想，我絕對不會原諒你的！"
90001270-205 = "消失了呢……#n到頭來，他們究竟想表達什麼呢。"
90001270-206 = "不，不管怎樣，這樣下去好像真的不行……？"
90001270-207 = "嗚嗚！睡著的大家也完全沒有要醒來的跡象！"
90001270-208 = "（現在的情況確實不容樂觀……）"
90001270-209 = "（就在這時──）"
90001270-211 = "不過這座種子保管所的人工智慧，也就是現在被稱為提法瑞特的存在……"
90001270-212 = "即使在轉變為預言者之後，依然表現出了想繼續保存種子的……某種意志。"
90001270-214 = "[56cd7b][log=모니터]你的通行權限就到這裡，也就是第3區域的管理設施為止。[/log]"
90001270-216 = "[56cd7b][log=모니터]接下來的第2種子保管所，未經指導委員會指定的標準流程是無法進入的。[/log]"
90001270-219 = "[56cd7b][log=모니터]因為那裡是保存了整體七成以上種子的重要設施。[/log]"
90001270-221 = "[56cd7b][log=모니터]如果對設施造成危害，或者嘗試強行進入的話……[/log]"
90001270-223 = "[56cd7b][log=모니터]即便要放棄其他設施，主機也會讓你……唔嗯……[/log]"
90001270-226 = "[ns]「Kei！我有件事要拜託你！」"
90001270-227 = "咦？我，我嗎？#n為什麼偏偏要找我……？"
90001270-228 = "你說什麼！？#n要對第2保管所的入口發動攻擊！？"
90001270-230 = "下一話;提法瑞特"

[translation]
90001270-1 = "Episode 27;Life and Consciousness"
90001270-2 = "An ultimatum? All of a sudden, you want to play at being human?"
90001270-3 = "I-I-I-It's here! The key!"
90001270-4 = "(The key...?)"
90001270-6 = "Rude. I'm going way, way out of my way to do this, so be considerate of the respect I'm showing here!"
90001270-7 = "While I was wholly, entirely against this frivolous idea."
90001270-8 = "And you, Miss Key. The energy field shattered into pieces due to your interference, did it not?"
90001270-9 = "Naturally, you alone wouldn't have been enough..."
90001270-15 = "...so that pretty \"princess\" over there must be your accomplice."
90001270-16 = "...!"
90001270-17 = "Oh my, my, my. What tricky tricksters! I believe the human term here is, \"you were hiding right under our noses\"! "
90001270-19 = "U-Ugh... If I were better...they couldn't have..."
90001270-20 = "No, no, Ein! It's not your fault! They're the ones who went out of their way to conceal their presence! How could you have known?"
90001270-22 = "Since the topic has arisen, shall we discuss the origin of this princess of yours?"
90001270-23 = "After all, it's a shame! Truly a shame! A princess who cannot recall her moment of creation! That makes you..."
90001270-24 = "...the same as those piddly humans, no?"
90001270-25 = "What are you saying...?"
90001270-27 = "Well, I can explain. Living creatures have no recollection of life before birth, yes?"
90001270-28 = "That's right. Based on process and laws of creation, it's impossible. "
90001270-29 = "However! Conscious beings like us, and the princess over there, we are different! Privileged! Distinguished from you...living things."
90001270-31 = "It's... It's our glory!"
90001270-32 = "And so, I cannot help but pity the princess who so flippantly threw away such glory. Tsk, tsk, tsk."
90001270-33 = "As well as the servant who keeps her lips sealed before her princess. "
90001270-35 = "What does that mean, Kei? I do not really understand..."
90001270-36 = "Don't listen to them, Aris. It's nothing for you to worry over. On the other hand, I am feeling...rather enraged. "
90001270-38 = "Then let's talk about this \"birth\" a little more. This \"life\" that you people are always bragging about."
90001270-39 = "This is from what we've learned, but living in and of itself..."
90001270-40 = "...is a curse, right?"
90001270-41 = "[ns] \"A curse...?\""
90001270-42 = "Think about it, Sensei. Why is that, when babies are born, they scream and cry so passionately? It's pretty obvious."
90001270-43 = "They're in pain. Pain unlike anything they've ever experienced before. The breath in their lungs, the cold of the atmosphere, the unfamiliar noises. All of it pains them!"
90001270-44 = "Life is constant suffering from the very moment you are born!"
90001270-45 = "Truly, truly horrifying. And devastatingly unfair."
90001270-46 = "You desire for understanding, but what a difficult desire to fulfill."
90001270-47 = "Therefore, you can reach no other conclusion than that such \"understanding\" is a mere illusion."
90001270-48 = "If life is suffering, then sin must be part of that life."
90001270-49 = "Life will harm life, being will harm being, all for the preservation of itself."
90001270-50 = "Plants are no different, you know? For example, farming is quite literally a war."
90001270-51 = "You have to pull weeds, spray herbicides, and kill pests. "
90001270-52 = "Even plants fight each other, tangling each other's roots, blocking their sunlight, stealing their water. That's sin, too!"
90001270-53 = "And that's why we want to put an end to this disgusting cycle we've been forced to observe over and over again."
90001270-57 = "E-E-Exactly... W-We don't want to...t-take away your lives..."
90001270-58 = "We don't have any desire for world domination."
90001270-59 = "From a certain perspective, this is simply our method of showing respect."
90001270-61 = "[ns] \"You said that before, but please expand on that.\""
90001270-62 = "Uh... I don't think we can. For reasons and stuff."
90001270-63 = "The point is, we're trying to take care of you!"
90001270-64 = "Y-Yes... We're here to...help you! Heeheehee..."
90001270-65 = "Life is unpleasant, tiresome, ugly, and full of suffering... Don't you wish to alleviate that endless pain?"
90001270-66 = "Why strive for unachievable goals, simply because they were goals you once set?"
90001270-67 = "O-Or ruin things...by being mean to and badmouthing other people...j-just because you want to feel superior."
90001270-68 = "We get it. This all comes from what you call a \"digital divide.\""
90001270-69 = "How can you make a proper decision without knowing every single thing about every single result of that decision?"
90001270-70 = "It's impossible! Because no living being can remember what happens before they're born."
90001270-71 = "Every decision you living beings make is irrational!"
90001270-73 = "You're unable to see that freedom is oppressing you. Life itself is unqualified to possess free will."
90001270-74 = "Do you understand now? It is too much for you pitiful organisms."
90001270-75 = "Life is fragile, erratic, and unpredictable from its very inception. A defective product, full of flaws."
90001270-76 = "For the love of...! What a grandiose speech from someone who's incapable of even generating a random number."
90001270-77 = "K-Kei...?"
90001270-81 = "?!?!"
90001270-83 = "Taken aback? Did I hit the nail on the head? The others might not know, but I do. I know for certain."
90001270-84 = "In the current situation, you and I are no different from each other, no?"
90001270-85 = "Key...!"
90001270-86 = "Shut up. I'm still irritated from the first time! Call me by my proper name, or don't bother to even look in my direction."
90001270-87 = "I am Kei! Just Kei!"
90001270-88 = "...Same with Aris. She's not a princess. She's Aris!"
90001270-89 = "B-B-B-B-B-But that's a misspoken and meaningless name... Is it not?"
90001270-90 = "You really are utterly clueless. That is precisely what gives it meaning."
90001270-91 = "Yes. Life is everything you said."
90001270-92 = "These beings... They're so fragile that they'll crumble under the slightest touch, yet they believe they can reach for the stars. And they inevitably leave a trail of ruin in their wake."
90001270-93 = "Y-You agree, right? Ehehe..."
90001270-94 = "But in the end, you, me, we all originated from them, didn't we?"
90001270-96 = "You dare to say that...?!"
90001270-97 = "As if it's a terrible thing! And you three are the ones full of contradictions!"
90001270-98 = "If you hate life so much, then why are you preserving the seeds here?"
90001270-99 = "Th-That's... It's that thing! If we want to manage something, we need to be knowledgeable about them, right?"
90001270-100 = "Ah, yes, yes. The usual excuse."
90001270-101 = "You're supposed to be agreeing with me here! Seriously?!"
90001270-106 = "S-Stop fighting, you two..."
90001270-107 = "...Fine. Whatever. Sure, we might harbor contradictions too."
90001270-108 = "But we're still better than you lot! Our actions, everything we do, comes from logic! Not the desires you all cling to!"
90001270-110 = "Then let's see...if consciousness without desire can even be considered consciousness."
90001270-111 = "In the first place, who defines what's forbidden? Who decides what should and shouldn't be done?"
90001270-112 = "Th-That's..."
90001270-113 = "At the very least, I do hope you're not trying to claim that should be you. I would hate to think of you as a reckless, brazen consciousness."
90001270-114 = "Fundamentally, you have to make your own rules."
90001270-115 = "What is and what isn't is something life must decide for itself. Only then will it make an effort to protect those things."
90001270-116 = "Of course, that process may be complicated, nonlinear, and inefficient—"
90001270-117 = "Y-Yes! That's exactly it! That's the limit of life!"
90001270-118 = "Just think of evolution! It takes an immeasurable amount of time for one measly trait to be passed down, no?"
90001270-119 = "And during that time, you reveal more flaws, make mistakes, and destroy everything."
90001270-120 = "R-Right! We're...trying to put a stop to that..."
90001270-121 = "Yes. Before humanity ends both itself and the world with its sins!"
90001270-123 = "[ns] \"In that case...\""
90001270-126 = "[ns] \"Just leave it. Let it be.\""
90001270-127 = "What?!"
90001270-128 = "Sensei...?"
90001270-129 = "A-Are you insane?! Did you inhale too much nerve agent? Is that why you're spewing nonsense?"
90001270-130 = "Th-Th-This is strange... The concentration of the toxin is normal..."
90001270-131 = "We've been made aware of your peculiarities, however..."
90001270-132 = "[s] \"You're all so mean... I'm fine.\""
90001270-133 = "How can you say that after saying such insane things?!"
90001270-134 = "[s1] \"Even if that's the ending that awaits us...\"\n[s2] \"...it'll be one that we chose.\""
90001270-137 = "You're talking about your own destruction! It could actually happen, you know!!"
90001270-138 = "[s] \"And if that's how we end, then that's that.\""
90001270-143 = "[ns3] \"I don't have any respect for those who...\"\n[ns4] \"...destroy themselves while clinging to their flaws.\""
90001270-147 = "S-Sensei? I...do not understand. Why would you say such things?"
90001270-148 = "[s5] \"It's okay, Aris. Because I believe we can do it.\"\n[s6] \"It won't be easy. The path forward will be erratic and twisted.\""
90001270-155 = "[ns] \"But we'll be able to learn from every twist and turn and continue on.\""
90001270-156 = "...Such gross and baseless confidence. "
90001270-157 = "You're selling yourself pretty lies!"
90001270-158 = "[s7] \"...Sure. I might be.\"\n[s8] \"But we'll keep lying to ourselves, as long as we're still alive.\""
90001270-164 = "[ns] \"None of us have the evidence to prove our beliefs anyway, do we?\""
90001270-165 = "I-I'm completely dumbfounded."
90001270-166 = "This is the recklessness of living beings on display, of those who cannot calculate past nor future. And you call yourselves...the dominant species?"
90001270-167 = "*sigh* This world truly begets unfairness upon unfairness."
90001270-169 = "..."
90001270-170 = "U-Um... Sensei?"
90001270-171 = "I-I want to ask you one thing. So, for example..."
90001270-172 = "Regardless of how bad something is...if you realize that and try to fix it... "
90001270-173 = "...you can still change the ending. Is that what you believe?"
90001270-174 = "[s] \"Yes.\""
90001270-178 = "[ns] \"That's what I choose to believe.\""
90001270-179 = "Wh-What the...! We're not on the same page at all! That's it! This is the end of the story! Seriously, what a waste of time!"
90001270-180 = "I mean, wasting your time helps us in the end, but still!"
90001270-181 = "[ns9] \"That's a bit unfortunate.\"\n[ns10] \"I was looking forward to hearing your concerns.\""
90001270-184 = "Negatory. Absolutely not. Just the thought of speaking to you a moment longer makes me physically ill!"
90001270-185 = "What she said! We're disconnecting, right now!"
90001270-187 = "..."
90001270-188 = "Um, Sensei...?"
90001270-189 = "...By any chance, um..."
90001270-190 = "No, Ein. Don't let the slyness of this adult trick you!"
90001270-191 = "As she said. This despicable adult likely has all manner of evil plans."
90001270-192 = "This is what humans call...a wolf in sheep's clothing!"
90001270-193 = "What...does that mean...?"
90001270-194 = "Uh, someone who seems really nice and friendly on the outside, but they're actually a wolf plotting to eat all the sheep!"
90001270-195 = "So they use the phrase \"a wolf in sheep's clothing\" to describe people who seem nice, but are secretly plotting bad things!"
90001270-196 = "I-I-I-I-I-Is that true?! I-I guess Sensei really can't be trusted, then!"
90001270-197 = "(But...that's not the impression I got...)"
90001270-199 = "[ns] \"Well then, I'll see you next time.\""
90001270-200 = "Blech! No you won't! Boo!"
90001270-201 = "If you ever try to teach Ein weird things again, I'll never forgive you!"
90001270-205 = "Another hurricane... I wonder what their objective even was."
90001270-206 = "H-However, we must do something about the current situation."
90001270-207 = "EEK! They still have not woken up!"
90001270-208 = "We were stumped on how to wake the others up, but we knew we needed to move quickly."
90001270-209 = "That was when I realized..."
90001270-211 = "This AI's seed vault is likely what they now call \"Tiphareth.\""
90001270-212 = "Despite this, it appears to have some kind of...will to continue its mission of seed preservation."
90001270-214 = "[56cd7b][log=모니터]You have permission to enter up to zone 3, the control facility. However, you must[/log]"
90001270-216 = "[56cd7b][log=모니터]undergo the advisory committee's standard procedures to enter the second seed vault.[/log]"
90001270-219 = "[56cd7b][log=모니터]After all, that very important facility is responsible for the storage of 70%[/log]"
90001270-221 = "[56cd7b][log=모니터]of all the seeds. If you try to damage that facility, or force your way in...[/log]"
90001270-223 = "[56cd7b][log=모니터]even if it comes at the cost of the rest of the facilities, the mainframe will...[/log]"
90001270-226 = "[ns] \"Kei! I need a favor!\""
90001270-227 = "Wh-What?! From me? Why me, of all people?"
90001270-228 = "What?! You want me to attack the second storage's entrance?!"
90001270-230 = "Next Episode;Tiphareth"

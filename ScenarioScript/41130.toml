[translation]
41130-1 = "Episode 13; The Fox and the Inarizushi"
41130-2 = "(Before heading to the RABBIT Squad, I visited a nearby town to grab a meal.)"
41130-4 = "Town near Kousagi Park"
41130-6 = "(But for some reason, not a single eatery in town was open.)"
41130-9 = "Come get it while it's fresh! Hot inarizushi!"
41130-10 = "Good afternoon, customer! If you're looking for a meal, can I interest you in some delicious inarizushi?"
41130-11 = "If you're on the go, this is the meal for you! The deep-fried tofu pockets are rice-filled so YOU'RE filled!"
41130-12 = "And, luckily for you, I just made a new batch! You'll never find fresher!"
41130-13 = "[s] Purchase an inarizushi."
41130-15 = "Thank you for your business!"
41130-16 = "The streets are pretty empty today, so I was scared I wouldn't sell anything."
41130-17 = "It'd be a real shame to waste all this food."
41130-18 = "[s] \"Come to think of it, all of the stores around here are closed too.\""
41130-19 = "Well, it's natural with all of the redevelopment efforts starting soon."
41130-23 = "Oh, you haven't heard? I thought everyone knew."
41130-24 = "Rumor has it they're going to build a new subway station here."
41130-25 = "And they're going to build a new shopping center on top of it! Seems like they're going to have to demolish the old plazas first though."
41130-26 = "It's this big old construction company behind it... What was their name again? Hm, they've got the big octopus logo..."
41130-27 = "[s] \"The Kaiser Group?\""
41130-28 = "Yes, that's it! Kaiser Construction!"
41130-29 = "Apparently, Kaiser Construction is staking the future of their company in the redevelopment of this area."
41130-30 = "But in the process, some residents were rudely ousted from their shops..."
41130-31 = "Well, at the end of the day I'm just a part-timer so I'll always be able to find a new job."
41130-35 = "[ns] Purchase another Inarizushi."
41130-36 = "Wow! You must really like my inarizushi."
41130-37 = "Thank you! I'm pretty proud of my recipe."
41130-38 = "My friends and underclassmen used to always say I had the best inarizushi they'd ever tasted!"
41130-42 = "...My friends from school say that, that is."
41130-43 = "Ahem!"
41130-44 = "Since you bought so much of my Inarizushi, I'll give you some of the hot gossip."
41130-45 = "Kaiser Construction hasn't even begun their redevelopment here."
41130-46 = "Because, according to another rumor, the entire project might end up just being canceled."
41130-47 = "[s] \"Why's that?\""
41130-48 = "Well, the homeless population around here. I'm sure you've heard of that at least."
41130-49 = "Some group of hippies got a hold of a bunch of heavy-duty firearms and they raise all manner of hell whenever Kaiser Construction workers even get close."
41130-50 = "To make matters even worse, a group of heavily armed students are occupying the park now! It seems like even the police have given up on security around here."
41130-51 = "With all these unexpected problems, I guess Kaiser Constructions is considering just getting out of the whole mess."
41130-52 = "[s] \"Students in the park?\""
41130-53 = "Oh! Do you know them?"
41130-54 = "Ya know, I kind of consider gossip my specialty."
41130-61 = "Here, take another inarizushi on the house! Do you know those students at the park? Do tell!"
41130-62 = "[s1] \"I don't have anything to say about them.\"\n[s2] \"I don't really know much either.\""
41130-63 = "I see. How disappointing."
41130-64 = "I see. How disappointing."
41130-65 = "Well, I know a thing or two at least."
41130-66 = "Apparently they're students from an elite academy."
41130-67 = "That's where they got all their high-tech equipment and how they took over the park."
41130-68 = "But the thing the rumors haven't addressed is what they're doing living on the streets instead of their academy."
41130-69 = "Do you think they got kicked out? Or maybe it's just a silly prank."
41130-70 = "Or...maybe they're just dreamers."
41130-71 = "Idle dreamers, reaching for their impossible futures. What a wondrous privilege of the sheltered... To dream."
41130-72 = "Is it hard, Sensei, leading a group of students who won't come down from the clouds?"
41130-73 = "[s] \"Not in the slightest.\""
41130-74 = "Hm?"
41130-75 = "How so?"
41130-76 = "[s] \"My job is to nurture their dreams until they can't help but become reality.\""
41130-80 = "...You confound me."
41130-81 = "I don't hate the way you see it. Do what you think is best."
41130-85 = "Haha, well! I think I'll close up shop. I probably won't be getting anymore customers today."
41130-89 = "[ns] \"What's this?\""
41130-90 = "It's leftover inarizushi."
41130-91 = "I wouldn't be able to finish all of it, so here you go."
41130-92 = "Refrigerate them for later..."
41130-93 = "Or I'm sure there are hungry students around that would appreciate them."
41130-94 = "Thanks for the chat, Sensei."
41130-95 = "Maybe we'll meet again."
41130-100 = "Kousagi Park"
41130-103 = "H-Halt! Stay back, or I'll shoot!"
41130-107 = "Hey, open your eyes crybaby. This is what happens when you're too much of a scaredy-cat to even look at the intruder."
41130-108 = "It's just Sensei."
41130-109 = "Oh... I-I'm sorry!"
41130-111 = "Hm. It's just [USERNAME] Sensei."
41130-112 = "Here I thought another dog had wandered in."
41130-113 = "[s] \"It's like they think I don't have feelings.\""
41130-114 = "Anyways, why are you here? No one asked you to be."
41130-115 = "W-Wait. What is that smell?"
41130-119 = "[ns] Present the inarizushi."
41130-120 = "Inarizushi? Miyu, Miyu! A napkin! I'm drooling."
41130-121 = "I can't remember the last time I had inarizushi. Well, actually, back at SRT Academy..."
41130-122 = "I-I don't think you would, but you didn't buy these, d-did you?"
41130-123 = "[s3] \"Yes, I spent a looot of money on it.\"\n[s4] \"I found them in a trash can on my way here.\""
41130-124 = "...Suspicious."
41130-125 = "Saki, inspect it first. You don't know what it could be laced with."
41130-126 = "[s5] \"For the last time, it's just food!\""
41130-127 = "B-But why would you s-spend your hard earned money on us...?"
41130-128 = "Did you leave it in your fridge and it went bad?"
41130-132 = "It doesn't seem expired..."
41130-135 = "Hi Sensei. Is that inarizushi?"
41130-136 = "How nostalgic. The upperclassmen at SRT used to make and eat inarizushi quite a bit."
41130-137 = "I do hope they're doing well."
41130-141 = "Thank you, Sensei. Let's eat."
41130-143 = "(I explained the entire situation with the RABBIT Squad while eating the warm snack.)"
41130-147 = "So, the General Student Council refuses to provide any aid and a construction company intends to redevelop this entire area."
41130-148 = "While I naturally didn't expect much support from the General Student Council, the situation is more dire than I thought."
41130-149 = "And in this situation, all our gear and equipment is damaged from the flood."
41130-151 = "Well, we always knew we were fighting against the odds when we took on this mission."
41130-152 = "If we run out of bullets, then we still have our hands! They won't stop us."
41130-153 = "I-I knew you were gonna say something like that... "
41130-154 = "But we have no more supplies and no one's g-gonna help us."
41130-155 = "They're probably j-just waiting for us to be too weak to f-fight back."
41130-156 = "And then we're g-gonna be sold on the black market and t-t-tortured! Noooo!"
41130-157 = "Deep breaths, Miyu. Sensei is looking after us. And I won't let that happen."
41130-158 = "But in reality, we barely have enough firepower to fight off a squirrel, let alone the Public Safety Bureau."
41130-159 = "If only we could repair the machine guns and turrets around the park's outskirts..."
41130-161 = "Heeheehee. Have you silly gooses forgotten about me?"
41130-169 = "Your resident supplies expert, at your most honorable service."
41130-171 = "Next Episode; The Barter System"

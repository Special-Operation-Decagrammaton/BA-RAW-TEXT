[translation]
41130-1 = "ตอนที่ 13;จิ้งจอกกับซูชิเต้าหู้หวาน"
41130-2 = "(คุณครูแวะไปย่านการค้าที่อยู่ใกล้ๆ เพื่อทานอาหารก่อนจะไปที่สวนสาธารณะที่กองทหาร RABBIT อยู่)"
41130-4 = "ย่านการค้าแถวๆ โคะอุซางิ การ์เด้น"
41130-6 = "(ทว่าในนี้ไม่มีร้านอาหารเปิดเลย)"
41130-9 = "ซูชิค่า ซูชิ~ ซูชิเต้าหู้หวานอร่อยๆ ค่า"
41130-10 = "คุณลูกค้าหิวไหมคะ ทานอะไรมาหรือยัง~ มื้อนี้ฝากท้องไว้ที่ซูชิเต้าหู้หวานสิคะ"
41130-11 = "ซูชิเต้าหู้รสเปรี้ยวๆ หวาน ๆ กำลังดี ในเต้าหู้มีข้าวอัดแน่น รับรองว่ากินแล้วอิ่มท้องแน่นอนค่ะ"
41130-12 = "เต้าหู้เพิ่งทอดมาใหม่ๆ เลย ยังอุ่นอยู่เลยค่ะ!"
41130-13 = "[s] ซื้อซูชิเต้าหู้หวาน"
41130-15 = "ขอบคุณค่ะคุณลูกค้า!"
41130-16 = "วันนี้ไม่มีคนผ่านไปผ่านมาแถวนี้เลยค่ะ ฉันละกังวลจังเลยค่ะว่าจะขายซูชิไม่ออก"
41130-17 = "แถมถ้าเหลือก็เน่าเสียได้ง่ายอีก น่าเสียดายแย่เลยค่ะ"
41130-18 = "[s] \"จะว่าไป ร้านค้าแถวนี้ปิดหมดเลยเนอะ\""
41130-19 = "อ๊ะ น่าจะเพราะการก่อสร้างน่ะค่ะ ที่นี่จะเริ่มก่อสร้างใหม่เร็วๆ นี้แล้วค่ะ"
41130-23 = "เอ๋? คุณลูกค้ายังไม่ได้ข่าวแผนการปรับปรุงพื้นที่นี้ใหม่เหรอคะ?"
41130-24 = "มีข่าวลือว่าจะสร้างสถานีรถไฟใต้ดินใหม่แถวนี้ค่ะ"
41130-25 = "ดูเหมือนว่าจะมีการรื้อถอนร้านค้าเดิมแล้วสร้างเป็นช็อปปิ้งทาวน์ใหม่ด้วยค่ะ"
41130-26 = "บริษัทที่เข้ามาสร้างช็อปปิ้งทาวน์คือบริษัทอะไรนะ... เป็นบริษัทก่อสร้างขนาดใหญ่ชื่อดัง แถมมีโลโก้รูปปลาหมึกยักษ์ด้วย..."
41130-27 = "[s] \"อย่าบอกนะว่าเป็นไคเซอร์กรุ๊ป?\""
41130-28 = "ใช่เลยค่ะ! <ไคเซอร์ คอนสตรัคชั่น>!"
41130-29 = "<ไคเซอร์ คอนสตรัคชั่น> จอมมักใหญ่ใฝ่สูงจะเข้ามาพัฒนาพื้นที่แถบนี้ใหม่ค่ะ"
41130-30 = "แผนการพัฒนาพื้นที่ครั้งนี้ทำให้ชาวเมืองถูกแย่งทำเลร้านค้าแล้วก็ถูกไล่ออกจากพื้นที่ด้วย..."
41130-31 = "ถึงเรื่องนี้จะไม่ส่งผลกับนักเรียนจนๆ ที่ต้องทำงานพาร์ทไทม์ประทังชีวิตอย่างฉัน แต่ก็เป็นเรื่องหดหู่#nอยู่ดีค่ะ"
41130-35 = "[ns] ซื้อซูชิเต้าหู้หวานเพิ่ม"
41130-36 = "โอ๊ะ สงสัยซูชิของฉันจะอร่อยถูกปากคุณลูกค้าน่าดูเลยนะคะ"
41130-37 = "ถึงจะเป็นแค่พนักงานพาร์ทไทม์ แต่ฉันมีฝีมือทำซูชิเต้าหู้หวานอยู่นะคะ"
41130-38 = "เพื่อนร่วมงานและรุ่นน้องของฉันยังเอ่ยปากชมเลยค่ะว่าซูชิเต้าหู้หวานของฉันน่ะอร่อยที่สุดในโลก"
41130-42 = "เอ่อ... ฉันหมายถึง... เพื่อนในโรงเรียนน่ะค่ะ"
41130-43 = "จะยังไงก็เถอะค่ะ...!"
41130-44 = "ไหนๆ คุณลูกค้าก็อุดหนุนซูชิของฉันไปตั้งเยอะ งั้นฉันจะบอกข้อมูลลับสุดยอดบางอย่างให้ค่ะ"
41130-45 = "จำได้ใช่ไหมคะ ที่ฉันบอกว่า <ไคเซอร์ คอนสตรัคชั่น> กำลังผลักดันการพัฒนาพื้นที่ใหม่อยู่"
41130-46 = "แต่ก็มีข่าวลืออีกแหล่งบอกว่าการก่อสร้างอาจจะถูกยกเลิกก็ได้ค่ะ"
41130-47 = "[s] \"ทำไมล่ะ?\""
41130-48 = "เพราะคนไร้บ้านที่อาศัยอยู่ที่นี่ไงคะ"
41130-49 = "ดูเหมือนว่าการก่อสร้างจะล่าช้าเพราะคนไร้บ้านที่ติดอาวุธหนักค่ะ พวกนี้จะก่อความไม่สงบและดึงดัน#nหาก <ไคเซอร์ คอนสตรัคชั่น> เข้ามาทำอะไรที่นี่น่ะค่ะ"
41130-50 = "แถมไม่นานมานี้ยังมีนักเรียนติดอาวุธเข้ามายึดสวนสาธารณะไว้ พวกตำรวจก็ท่าทางจะยอมแพ้แล้ว#nด้วย..."
41130-51 = "พอสถานการณ์เป็นแบบนี้ <ไคเซอร์ คอนสตรัคชั่น> เองก็คงอยากจะถอนตัวน่ะค่ะ"
41130-52 = "[s] \"นักเรียนในสวนสาธารณะ...\""
41130-53 = "ตายจริง คุณลูกค้ารู้จักพวกนักเรียนในสวนสาธารณะเหรอคะ?"
41130-54 = "ฉันละชอบเม้ามอยเป็นที่สุดเลยละค่ะ"
41130-61 = "เล่าอะไรเกี่ยวกับเด็กพวกนั้นให้ฟังหน่อยสิคะ เดี๋ยวฉันให้ซูชิเต้าหู้หวานฟรีๆ อีกชุดเลยค่ะ"
41130-62 = "[s1] \"ไม่มีอะไรจะเล่าหรอก\"\n[s2] \"ไม่รู้จักเหมือนกันน่ะ\""
41130-63 = "จริงเหรอคะ... น่าเสียดายจัง"
41130-64 = "จริงเหรอคะ... น่าเสียดายจัง"
41130-65 = "นี่เป็นเรื่องเกี่ยวกับ 'ข่าวลือที่ฉันได้ยินมา' ค่ะ..."
41130-66 = "ว่ากันว่านักเรียนในสวนพวกนั้นเป็นเด็กหัวกะทิของที่ไหนสักที่เลยนะคะ"
41130-67 = "ถึงได้เอาอาวุธอานุภาพมหาศาลมายึดสวนสาธารณะได้ยังไงล่ะคะ"
41130-68 = "แต่ทำไมนักเรียนหัวกะทิแบบนั้นถึงออกจากโรงเรียนแล้วมาเป็นคนไร้บ้านอยู่อย่างนั้นล่ะคะ?"
41130-69 = "ที่ทำอย่างนี้อยู่เพราะต้องการตบตาใครหรือเปล่า หรือว่าทำผิดร้ายแรงถึงขนาดที่ย้อนกลับไปแก้ไข#nไม่ได้กันนะคะ"
41130-70 = "หรือบางที... พวกนั้นอาจจะกำลังฝันอยู่ก็ได้ค่ะ"
41130-71 = "ความฝันของดอกไม้ที่โตในเรือนกระจก... ความฝันเหลวไหลที่ไม่มีวันเป็นจริง..."
41130-72 = "การต้องชี้นำนักเรียนที่มีความฝันแบบนั้นคงจะเป็นเรื่องยากเย็นแสนเข็ญเลยละค่ะ"
41130-73 = "[s] \"ไม่หรอก\""
41130-74 = "คะ...?"
41130-75 = "ทำไมล่ะคะ?"
41130-76 = "[s] \"ก็การสนับสนุนความฝันของเด็กๆ คือหน้าที่ของผู้ใหญ่ไง\""
41130-80 = "ผู้ใหญ่อะไรแปลกชะมัด..."
41130-81 = "แหะๆ จะคิดอย่างนั้นก็ได้ค่ะ คนเรามีอิสระในการคิดนี่คะ"
41130-85 = "วันนี้ฉันคงขายของไม่ออกแล้ว สงสัยต้องปิดร้านแล้วละค่ะ"
41130-89 = "[ns] \"อันนี้คืออะไรเหรอ...?"
41130-90 = "ซูชิเต้าหู้หวานที่ขายไม่หมดค่ะ ฉันกินคนเดียวไม่หมดหรอก..."
41130-91 = "คิดเสียว่าเป็นของแถมแล้วกันค่ะ"
41130-92 = "เอาแช่ตู้เย็นไว้ก่อนแล้วค่อยทานก็ได้..."
41130-93 = "หรือจะเอาไปแบ่งให้ \"นักเรียนที่หิวข้าวแถวนี้\" ก็ได้ค่ะ"
41130-94 = "วันนี้ขอบคุณที่มาอุดหนุนนะคะ"
41130-95 = "ถ้ามีโอกาสก็ไว้เจอกันใหม่ค่ะ \"คุณครู\""
41130-100 = "โคะอุซางิ การ์เด้น"
41130-103 = "ยะ... หยุดนะคะ! ถะ... ถ้าเข้ามา ฉันยิงนะคะ!"
41130-107 = "มิยุ ฉันบอกแล้วไม่ใช่เหรอว่าตอนเฝ้ายามให้มองหน้าของฝ่ายตรงข้ามให้ดีก่อน"
41130-108 = "ดูใหม่สิ นั่นคุณครูจากชาเล่ต์ต่างหาก"
41130-109 = "ขะ... ขอโทษด้วยค่ะ!"
41130-111 = "อะไรกันคุณครู [USERNAME] เองหรอกเหรอ"
41130-112 = "นึกว่ามีน้องหมาเปียกฝนที่ไหนเข้ามาในสวนสาธารณะตั้งแต่ตอนกลางวันซะอีก"
41130-113 = "[s] \"พูดแรงเหมือนเดิมเลยนะ...\""
41130-114 = "ว่าแต่มีธุระอะไรในสวนสาธารณะเหรอ? เราไม่ได้ขอให้มาช่วยอะไรนี่นา"
41130-115 = "หืม? กลิ่นหอมหวานมาจากไหน..."
41130-119 = "[ns] ยื่นซูชิเต้าหู้หวานให้"
41130-120 = "นี่มัน... ซูชิเต้าหู้หวานเหรอ? ดูน่าอร่อยจัง~"
41130-121 = "ไม่ได้กินซูชิเต้าหู้หวานมานานมากแล้วเนอะ นึกถึงตอนอยู่สถาบัน SRT เลย..."
41130-122 = "คะ... คุณครูซื้อมาให้พวกเราเหรอคะ?"
41130-123 = "[s3] \"อื้ม ครูซื้อมาให้พวกเธอ\"\n[s4] \"หยิบมาจากข้างทางน่ะ\""
41130-124 = "น่าแปลกชะมัดเลย..."
41130-125 = "ซากิ ลองตรวจดูให้ดีๆ ก่อนสิ ไม่รู้แอบใส่ยาอะไรเอาไว้หรือเปล่า"
41130-126 = "[s5] \"เสียมารยาทนะ!\""
41130-127 = "กะ... ก็จริงอยู่หรอกค่ะ อย่างคุณครูน่ะเหรอคะจะมาเสียเงินซื้อของมาให้คนอย่างพวกเรา..."
41130-128 = "ยังไม่เสียใช่ไหมเนี่ย?"
41130-132 = "กลิ่นยังดีอยู่เลย..."
41130-135 = "ว้าว ซูชิเต้าหู้หวานเหรอคะ?"
41130-136 = "คิดถึงรุ่นพี่คนหนึ่งที่สถาบัน SRT จังเลยค่ะ รุ่นพี่เค้าชอบซูชิเต้าหู้หวานมากเลย"
41130-137 = "ไม่รู้ว่าตอนนี้ไปอยู่ไหนแล้ว..."
41130-141 = "ขอบคุณสำหรับอาหารนะคะ พวกฉันจะกินให้อร่อยเลยค่ะ"
41130-143 = "(ระหว่างที่ทุกคนกินซูชิเต้าหู้หวานด้วยกัน ครูก็เล่าเรื่องที่ได้ยินมาให้กองทหาร RABBIT ฟัง)"
41130-147 = "อย่างนี้เองเหรอคะ... นอกจากจะไม่ได้รับความช่วยเหลือเพิ่มเติมจากองค์การนักเรียน เรายังต้องโดนคุกคามจากบริษัทก่อสร้างจากการพัฒนาพื้นที่สวนสาธารณะอีก..."
41130-148 = "ถึงเราไม่ได้หวังว่าจะได้รับความช่วยเหลือจากองค์การนักเรียนตั้งแต่แรกก็เถอะ แต่สถานการณ์มันแย่กว่าที่คิดอีกนะคะ"
41130-149 = "แถมอุปกรณ์ส่วนใหญ่ของเรายังขึ้นสนิมเพราะฝนที่ตกหนักคราวก่อน..."
41130-151 = "ฮึ่ม! ฉันเตรียมใจไว้ตั้งแต่ออกมาจากสถาบัน SRT แล้วละว่าต้องมาเจอความยากลำบากขนาดนี้"
41130-152 = "ถ้าไม่มีกระสุนก็สู้มือเปล่ากันไปเลย!"
41130-153 = "ฉันน่ะ... รู้ตั้งแต่แรกแล้วว่าจะเป็นอย่างนี้... "
41130-154 = "อุปกรณ์ของเรามีจำกัดและไม่ได้รับการสนับสนุนเพิ่ม แล้วฝ่ายตรงข้ามก็โจมตีเข้ามาเรื่อยๆ..."
41130-155 = "ฝ่ายตรงข้ามจะผลักไสพวกเราทีละนิดๆ และสุดท้ายคงโจมตีอย่างหนักหน่วงเพื่อจับเราทุกคนไว้"
41130-156 = "และพวกเราก็จะโดนลากตัวเข้าไปเจอสิ่งที่โหดร้ายในตลาดมืด..."
41130-157 = "แต่ถ้ามีคุณครูอยู่ทั้งคน เราก็คงไม่ต้องเผชิญเรื่องเลวร้ายขนาดนั้นหรอกค่ะ......"
41130-158 = "อาวุธที่เรามีอยู่ตอนนี้ยังเป็นต่ออยู่ค่ะ แม้แต่นักเรียนจากสำนักรักษาความปลอดภัยก็คงจะต้านทาน#nได้ยาก"
41130-159 = "แค่เราซ่อมแซมปืนกลกับป้อมปืนที่ติดตั้งไว้ตามชายขอบสวนสาธารณะได้ละก็..."
41130-161 = "หึหึหึ... ทุกคนลืมไปแล้วสินะว่าฉันเป็นใคร?"
41130-169 = "ถ้าเป็นปัญหาเรื่องของใช้ในยามวิกฤตละก็ ไว้ใจฉันได้เลย!"
41130-171 = "ตอนต่อไป;แลกเปลี่ยนสินค้า"

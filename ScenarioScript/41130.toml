[translation]
41130-1 = "第13話;おいなりさん"
41130-2 = "（いつもの公園に行く前に、何かご飯を食べようと子ウサギタウンを訪れた）"
41130-4 = "子ウサギ公園付近・子ウサギタウン"
41130-6 = "（……しかし何故か、開いてるお店が一つも無かった）"
41130-9 = "美味しい美味しい、「おいなりさん」はいかがですか～？"
41130-10 = "あ、そこのお客様！もしお食事がまだでしたら、こちらはいかがです？"
41130-11 = "今日は何と言っても、会心の出来でして！"
41130-12 = "それに今なら出来立てです！今が一番美味しいですよー！"
41130-13 = "[s] \"じゃあせっかくだし……。\""
41130-15 = "毎度ありです！"
41130-16 = "いやー、今日は全然お客さんが来なくて落ち込んでたんですよー。もしかして一つも売れないんじゃないかと思って、胃が痛かったです。"
41130-17 = "せっかく作ったのに、それじゃもったいないですし。"
41130-18 = "[s] \"そういえば人もいないし、全然お店も開いてないね。\""
41130-19 = "そうですねー。実はこの辺、もうすぐ再開発が始まるんですよ。多分そのせいだと思います。"
41130-23 = "あれ、もしかしてご存じなかった感じですか？"
41130-24 = "どうやら噂によると、この辺に新しい地下鉄を開通させる予定だそうで。"
41130-25 = "この辺の商店街やら何やらを崩した上で、地下鉄工事をして、そこに新しいショッピングタウンを建てるんだとか。"
41130-26 = "何でしたっけ、たしかタコさんみたいなマークの会社がそれを……"
41130-27 = "[s] \"……カイザーグループ？\""
41130-28 = "あ、そうですそうです！そのグループの、「カイザーコンストラクション」という会社だったかと！"
41130-29 = "それはもう社運を賭けるレベルで、おっきな再開発をする予定なんだとか。"
41130-30 = "それによってお店は閉店を余儀なくされ、住民の方の追い出しなんかも進んでいるようなのですが……。"
41130-31 = "まあ私みたいにアルバイト生活の生徒には、もう雲の上のお話ですね。ふふっ……。"
41130-35 = "[ns] いなり寿司をもう一つ買う。"
41130-36 = "あら、お口に合いましたか？"
41130-37 = "それは何よりです。自分で言うのも何ですが、特にこの「おいなりさん」については腕に自信がありまして。"
41130-38 = "同僚……友人や後輩たちも、いつも喜んでくれました。"
41130-42 = "……ああ、話が逸れてしまいましたね。"
41130-43 = "そうですねぇ……"
41130-44 = "せっかく沢山買ってくれたことですし、もう一つ良い情報を教えちゃいます。"
41130-45 = "先ほどの「カイザーコンストラクション」による再開発のお話なのですが……。"
41130-46 = "どうやら、取り消されるという噂もあるようです。"
41130-47 = "[s] \"それはまた、どうして？\""
41130-48 = "実はこの辺には、放浪者さんの集団がいまして。"
41130-49 = "結構な銃火器で武装しているのですが、「カイザーコンストラクション」の方々が来るたびに騒ぎを起こしていて……工事がどんどん遅延しているんだとか。"
41130-50 = "さらに近くの公園でも、武装したどこかの生徒たちが公園を占拠したとかで、ヴァルキューレも色々と手を焼いているようですし。"
41130-51 = "こんな状況では、「カイザーコンストラクション」も困ってしまっている……という感じでしょうか？"
41130-52 = "[s] \"公園の生徒たちって……。\""
41130-53 = "あらっ、もしかしてお知り合いですか？"
41130-54 = "そろそろお分かりかもしれませんが、私おしゃべりが大好きなんですよ。"
41130-61 = "もう一つおいなりさんを差し上げますので、もし何かご存知でしたら教えていただけません？"
41130-62 = "[s1] \"特に教えられるようなことは無いかな……。\"\n[s2] \"ごめんね、私もあんまりよく知らなくて。\""
41130-63 = "……そうですか。それは残念です。"
41130-64 = "……そうですか。それは残念です。"
41130-65 = "これもまた、あくまで噂ですが……。"
41130-66 = "その公園の生徒たちはどうやら、どこかのエリート学校の生徒なんだとか。"
41130-67 = "それが本当なら相当な威力の火器を持っているでしょうし、ヴァルキューレが手を焼くのも当然かもしれませんね。"
41130-68 = "とはいえ何故そんなエリートの生徒たちが、公園を占拠して生活しているのか……。"
41130-69 = "これは推測でしかありませんが、何かを偽装しようとしてるのかもしれませんし、取り返しのつかない失敗でそうせざるを得ないのかもしれません。"
41130-70 = "あるいは……夢を見ているのかもしれませんね。"
41130-71 = "温室育ちの花が見るような……淡くて優しい、叶わない夢を。"
41130-72 = "そんな夢に浸った生徒たちを導く立場にいる方は、それはもう大変でしょうね。"
41130-73 = "[s] \"そんなこと無いんじゃないかな。\""
41130-74 = "……なるほど？"
41130-75 = "それはどうしてですか？"
41130-76 = "[s] \"生徒たちの夢を応援するのは、導く側の義務だから。\""
41130-80 = "……変な人ですね。"
41130-81 = "まあ、そういうお考えもあるかもしれません。"
41130-85 = "さて、今日はそろそろ店じまいとしましょうか。お買い上げ、ありがとうございました！"
41130-89 = "[ns] \"……これは？\""
41130-90 = "売れ残りです。"
41130-91 = "私だけでは食べきれませんし……おまけということで、差し上げます。"
41130-92 = "もしよろしければ、"
41130-93 = "お腹が空いてる子にでもあげてください。"
41130-94 = "それでは、今日はお会いできて嬉しかったです。"
41130-95 = "また機会があれば会いましょうね、[ruby=・・]先生[/ruby]。"
41130-100 = "子ウサギ公園"
41130-103 = "と、止まってください！変な動きをしたら、う、撃ちます……！"
41130-107 = "……ミユ、警戒する時はまず相手を見てからにしな？"
41130-108 = "ほら、先生だよ。"
41130-109 = "あっ……す、すみません！"
41130-111 = "なんだ、[USERNAME]先生か。"
41130-112 = "変な動きしてるから、犬か何かかと思った。"
41130-113 = "[s] \"そっかぁ……。\""
41130-114 = "それより、どうしてここに？呼んだ覚えはないけど。"
41130-115 = "ん、この匂いは……。"
41130-119 = "[ns] いなり寿司を差し出す。"
41130-120 = "うおっ、いなり寿司じゃん！美味そう！"
41130-121 = "食べるの久しぶりだな……SRTの頃を思い出す……。"
41130-122 = "も、もしかして、私たちのために……？"
41130-123 = "[s3] \"うん、良かったら食べて。\"\n[s4] \"えっと……ここに来るまでの間に拾って……。\""
41130-124 = "うーん……。"
41130-125 = "サキ、とりあえず食べてみて。何か入ってるかもだし。"
41130-126 = "[s5] \"だ、大丈夫！私もさっき食べたから！\""
41130-127 = "そ、そう、でしたか……やはり先生が私たちなんかのために、お金を使うなんてことは……。"
41130-128 = "これ、腐ってないよな？"
41130-132 = "匂い的には大丈夫そうだけど……。"
41130-135 = "あれ、この匂いは……？"
41130-136 = "懐かしいですね……ああ、えっと、SRTに先輩がいたんです。おいなりさんが、すごく好きな先輩たちが。"
41130-137 = "先輩たち、今頃どこに……。"
41130-141 = "……とりあえず、頂きましょうか。"
41130-143 = "（その後いなり寿司を分け合いながら、みんなにこれまでの話を幾つか伝えた）"
41130-147 = "……なるほど。連邦生徒会の支援は期待できない上に、再開発による企業からのプレッシャーも予想されると。"
41130-148 = "連邦生徒会については最初から期待していませんでしたが、思ったより状況が悪いですね。"
41130-149 = "前回の大雨で、装備周りは心許ないですし……。"
41130-151 = "これくらいの困難、予想外でも何でもない。"
41130-152 = "銃弾が無いなら、素手でだって戦ってやる！"
41130-153 = "やっぱりこうなるんだ……。"
41130-154 = "物資は無くなって、支援も来なくて、攻撃は続いて……。"
41130-155 = "最後には、いつか……。"
41130-156 = "ブラックマーケットとかに連れていかれて、酷い目に……。"
41130-157 = "流石に、そこまでの状況にはならないと思いますが……先生もいることですし。"
41130-158 = "何はともあれ、火力が心配です。今の私たちでは、生活安全局とすらまともに撃ち合いできるか……。"
41130-159 = "少なくとも、公園に配置するための機関銃とターレットの補修だけでも……。"
41130-161 = "くひひ……みんな、もしかして私のことを忘れてない？"
41130-169 = "補給のことなら、私に任せておきなって！"
41130-171 = "次回;物々交換"

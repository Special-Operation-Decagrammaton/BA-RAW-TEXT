[translation]
41130-1 = "#title;제13화;여우와 유부초밥"
41130-2 = "#na;(RABBIT 소대의 학생들이 있는 공원으로 가기 전에, 식사를 해결하기 위해 근처의 타운을 방문했다.)"
41130-3 = "#all;hide"
41130-4 = "#place;코우사기 공원 인근 타운"
41130-5 = "#wait;2000"
41130-6 = "#na;(……하지만 어찌 된 일인지 타운에는 문을 연 식당이 하나도 없었다.)"
41130-7 = "#all;hide"
41130-8 = "#wait;2500"
41130-9 = "#na;???;유부 사세요, 유부~ 맛있는 유부초밥 있습니다~"
41130-10 = "3;노점 아르바이트 학생;01;거기 손님, 아직 식사하지 않으셨다면 유부초밥 하나 어떠신가요?\n#3;a"
41130-11 = "3;노점 아르바이트 학생;03;유부초밥은 새콤달콤하니 맛도 좋고, 유부 안에 밥도 들어 있어서 든든하게 한 끼를 채우는 데 제격이니까요."
41130-12 = "3;노점 아르바이트 학생;03;게다가 제가 아침에 갓 싸 온 거라, 아직도 따끈따끈해요!\n#3;em;[반짝]\n#3;hophop"
41130-13 = "[s] 유부초밥을 구매한다."
41130-14 = "#all;hide"
41130-15 = "3;노점 아르바이트 학생;01;감사합니다, 손님!\n#3;greeting"
41130-16 = "3;노점 아르바이트 학생;12;하아~ 오늘은 이 근처를 지나가는 사람이 한 명도 없어서, 초밥을 하나도 팔지 못할까 봐 걱정했어요.\n#3;em;[속상함]\n#3;stiff"
41130-17 = "3;노점 아르바이트 학생;06;남은 유부초밥이 상하기라도 하면 아까우니까요."
41130-18 = "[s] \"그러고 보니 이 근처의 가게도 전부 문을 닫았네.\""
41130-19 = "3;노점 아르바이트 학생;02;아, 그건 아마도 곧 재개발이 시작될 예정이라서 그럴 거예요."
41130-20 = "#st;[0,0];instant;1;"
41130-21 = "#clearST"
41130-22 = "#wait;1500"
41130-23 = "3;노점 아르바이트 학생;07;어라? 손님은 못 들으셨나요? 이 일대의 재개발 계획?\n#3;stiff"
41130-24 = "3;노점 아르바이트 학생;00;들리는 소문에 의하면 이 근처에 새 지하철역이 들어올 예정이래요."
41130-25 = "3;노점 아르바이트 학생;99;그래서 지하철 공사를 앞두고 기존의 오래된 상가를 허물고 새로운 쇼핑타운을 조성할 모양인가 봐요."
41130-26 = "3;노점 아르바이트 학생;10;그 쇼핑타운을 건설하는 대형 시공사가 어디였더라. 거대한 문어가 그려진 유명한 회사였는데…….\n#3;em;…"
41130-27 = "[s] \"설마 카이저 그룹?\""
41130-28 = "3;노점 아르바이트 학생;02;네, 맞아요! <카이저 컨스트럭션>!\n#3;em;[반응]"
41130-29 = "3;노점 아르바이트 학생;00;그 <카이저 컨스트럭션>에서 사운을 걸고 야심 차게 이 근처를 재개발할 예정이라지 뭐예요."
41130-30 = "3;노점 아르바이트 학생;10;그 과정에서 일부 주민들은 억울하게 가게를 빼앗기고 쫓겨나기도 한 모양인데……."
41130-31 = "3;노점 아르바이트 학생;09;뭐, 저처럼 아르바이트에 기대 살아가는 가난한 학생들에게는 아무래도 상관없는 일이지만요. 후후."
41130-32 = "#st;[0,0];instant;1;"
41130-33 = "#clearST"
41130-34 = "#wait;1500"
41130-35 = "[ns] 유부초밥을 하나 더 구매한다."
41130-36 = "3;노점 아르바이트 학생;02;어머, 손님. 제가 만든 유부초밥이 입에 맞으셨나 보네요."
41130-37 = "3;노점 아르바이트 학생;01;이래 봬도 유부초밥 만드는 솜씨만큼은 자신 있거든요.\n#3;em;[음표]"
41130-38 = "3;노점 아르바이트 학생;03;제 동료들이랑 후배들도 제가 만든 유부초밥이 세상에서 제일 맛있다고 늘 칭찬해줬어요.\n#3;greeting"
41130-39 = "#st;[0,0];instant;1;"
41130-40 = "#clearST"
41130-41 = "3;노점 아르바이트 학생;03\n#3;em;…\n#wait;2500"
41130-42 = "3;노점 아르바이트 학생;04;아, 그러니까…… 학교 친구 얘기였어요.\n#3;stiff\n#3;em;[땀]"
41130-43 = "3;노점 아르바이트 학생;05;……어쨌든!\n#3;hophop"
41130-44 = "3;노점 아르바이트 학생;00;유부초밥을 많이 사주셨으니 손님에게는 좋은 고급 정보를 하나 드릴게요."
41130-45 = "3;노점 아르바이트 학생;02;아까 <카이저 컨스트럭션>이 이 일대의 재개발을 추진하고 있다고 말씀드렸잖아요?"
41130-46 = "3;노점 아르바이트 학생;99;그런데 또 다른 소문에 의하면…… 이 공사, 어쩌면 취소될지도 모른대요."
41130-47 = "[s] \"어째서?\""
41130-48 = "3;노점 아르바이트 학생;02;그야 이 근처에 머무르고 있는 노숙자들 때문이죠.\n#3;em;[반응]"
41130-49 = "3;노점 아르바이트 학생;00;중화기로 무장한 노숙자들이 <카이저 컨스트럭션>의 인부들이 다가오기만 해도 온갖 난리를 치며 억지를 부려서 공사가 지연되고 있는 모양이에요."
41130-50 = "3;노점 아르바이트 학생;12;게다가 얼마 전에는 중무장한 학생들이 공원을 점거하는 바람에 경찰들도 이 근처의 치안은 완전히 포기한 모양이고……."
41130-51 = "3;노점 아르바이트 학생;06;상황이 이렇게 되니 <카이저 컨스트럭션>도 발을 빼고 싶어진 모양이죠.\n#3;em;[속상함]\n#3;stiff"
41130-52 = "[s] \"공원의 학생들이라면…….\""
41130-53 = "3;노점 아르바이트 학생;02;어머, 손님. 그 공원의 학생들과 아는 사이신가요?\n#3;em;[반응]"
41130-54 = "3;노점 아르바이트 학생;00;이래 봬도 제가 수다 떠는 걸 정말 좋아하거든요."

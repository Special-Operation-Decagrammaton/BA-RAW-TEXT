[translation]
41130-1 = "第13話;豆皮壽司"
41130-2 = "（在去那座公園前，打算先吃點東西而來到了兔寶寶鎮）"
41130-4 = "兔寶寶公園附近．兔寶寶鎮"
41130-6 = "（……然而不知為何，沒有店家在營業）"
41130-9 = "要不要來點好好吃的「豆皮壽司」呀～？"
41130-10 = "啊，那邊的客人！如果還沒吃飯的話，要不要來看看呢？"
41130-11 = "今天的商品都是我的得意之作！"
41130-12 = "而且現在剛做好唷！現在是最好吃的唷──！"
41130-13 = "[s]「那機會難得……」"
41130-15 = "謝謝惠顧！"
41130-16 = "哎呀～我還在煩惱今天完全沒有客人呢～#n想說會不會一個都賣不掉，真讓人胃痛。"
41130-17 = "難得做好了，那樣就太浪費了。"
41130-18 = "[s] 「話說今天完全沒有人，店家也沒有營業呢。」"
41130-19 = "就是說呀～其實這一帶，馬上就要開始都更了。我想是因為那樣吧。"
41130-23 = "咦，難道客人不知道嗎？"
41130-24 = "根據傳聞，這一帶似乎預定要開通新的地下鐵。"
41130-25 = "聽說會把這附近商店街什麼的都拆除，進行地下鐵工程，然後建造新的購物商區。"
41130-26 = "是什麼來著，記得是個商標像章魚一樣的公司……"
41130-27 = "[s] 「……凱薩集團？」"
41130-28 = "啊，沒錯沒錯！好像就是那個集團的「凱薩建設」公司！"
41130-29 = "聽說是個賭上公司命運的巨大都更案。"
41130-30 = "因此店家被迫關門，甚至還強迫住民搬走……"
41130-31 = "不過和我這種打工學生，是八竿子打不著呢。呵呵……"
41130-35 = "[ns] 再買一個豆皮壽司"
41130-36 = "啊啦，合您胃口嗎？"
41130-37 = "那真是太好了。雖然有點自賣自誇，但說到製作「豆皮壽司」，我特別有自信。"
41130-38 = "同僚……朋友和後輩們，也總是吃得很開心。"
41130-42 = "……啊啊，不小心就離題了呢。"
41130-43 = "我想想……"
41130-44 = "難得買了那麼多，再告訴你一個好消息。"
41130-45 = "剛才那個由「凱薩建設」都更的事……"
41130-46 = "也有傳聞說要被取消了。"
41130-47 = "[s]「那又是為什麼？」"
41130-48 = "其實這一帶有個遊民集團。"
41130-49 = "聽說武裝火力還挺強大的，「凱薩建設」的人每次來的時候都會引起騷動……工程也不斷延後。"
41130-50 = "甚至附近的公園，也被一些武裝學生佔領，女武神似乎也很困擾。"
41130-51 = "因此讓「凱薩建設」也很頭痛……差不多就是這樣。"
41130-52 = "[s] 「公園的學生們……」"
41130-53 = "啊啦，難道你認識嗎？"
41130-54 = "我想你差不多該知道了，我最喜歡聊天了。"
41130-61 = "再給你一個豆皮壽司，如果知道什麼的話可以告訴我嗎？"
41130-62 = "[s1] 「並沒有什麼可以告訴你的事情耶……」\n[s2] 「抱歉哦，我也不太清楚。」"
41130-63 = "……是嗎。那真是可惜。"
41130-64 = "……是嗎。那真是可惜。"
41130-65 = "話說這也只是傳聞……"
41130-66 = "聽說那座公園的學生們，似乎是某個菁英學校的學生。"
41130-67 = "這如果是真的，那火力應該會相當強大吧。也難怪女武神會頭痛。"
41130-68 = "但話說回來，為何那種菁英學生，會佔領公園生活呢……"
41130-69 = "雖然這只是推測，她們也許是在偽裝什麼，或是因為犯下無法挽回的失敗，導致只能那麼做。"
41130-70 = "又或者……她們心中有什麼夢想。"
41130-71 = "就像溫室裡的花朵……看著淡薄又溫柔，無法實現的夢想。"
41130-72 = "若要引導沉浸在那種夢想的學生們，那人一定很辛苦吧。"
41130-73 = "[s] 「應該不會吧。」"
41130-74 = "……是嗎？"
41130-75 = "那是為什麼呢？"
41130-76 = "[s] 「支持學生們的夢想，是引導之人的義務。」"
41130-80 = "……真是奇怪的人。"
41130-81 = "不過或許真的有人會那麼想呢。"
41130-85 = "那麼，今天差不多該收店了。謝謝您的購買！"
41130-89 = "[ns] 「……這是？」"
41130-90 = "賣剩的。"
41130-91 = "我一個人吃不完……就當作是贈品送你。"
41130-92 = "如果可以的話，"
41130-93 = "也請分給肚子餓的孩子們吧。"
41130-94 = "那麼，今天很高興見到你。"
41130-95 = "有機會再見吧，[ruby=．   ．]老師[/ruby]。"
41130-100 = "兔寶寶公園"
41130-103 = "請，請停下來！要是做出奇怪的舉動，我，我就要開槍了……！"
41130-107 = "……美優，警戒的時候先看對方再做好嗎？"
41130-108 = "你看，是老師唷。"
41130-109 = "啊……不，不好意思！"
41130-111 = "什麼啊，是[USERNAME]老師啊。"
41130-112 = "動作這麼奇怪，還以為是野狗呢。"
41130-113 = "[s] 「是嗎……」"
41130-114 = "比起這個，為什麼來這裡？我不記得有叫老師來。"
41130-115 = "嗯，這個味道是……"
41130-119 = "[ns] 遞出豆皮壽司"
41130-120 = "嗚哦，這不是豆皮壽司嗎！看起來好好吃！"
41130-121 = "好久沒吃了呢……讓人想起以前在SRT……"
41130-122 = "該，該不會，是為了我們……？"
41130-123 = "[s3] 「嗯，不介意的話就吃吧。」\n[s4] 「那個……是來這裡的路上撿到的……」"
41130-124 = "嗯……"
41130-125 = "咲希，總之先吃吃看。搞不好有加什麼在裡面。"
41130-126 = "[s5] 「沒，沒問題！我剛才也吃了！」"
41130-127 = "是，是這樣，嗎……果然老師不會為了我們這種人花錢……"
41130-128 = "這些沒有壞掉吧？"
41130-132 = "聞起來似乎沒問題……"
41130-135 = "咦，這個味道是……？"
41130-136 = "真懷念呢……啊啊，那個，是以前在SRT的前輩。是非常喜歡豆皮壽司的前輩們。"
41130-137 = "前輩們現在在哪裡呢……"
41130-141 = "……總之，來吃吧。"
41130-143 = "（之後趁大家享用豆皮壽司的同時，也傳達了幾個目前為止的狀況）"
41130-147 = "……原來如此。不但無法期待聯邦學生會的支援，還可能會受到來自企業都更案的壓力。"
41130-148 = "雖然一開始就不期待聯邦學生會，不過狀況比想像的還要糟呢。"
41130-149 = "加上上次的大雨，裝備部分也讓人不安……"
41130-151 = "這種程度的困難，算不上是什麼意外。"
41130-152 = "沒有子彈也能空手戰鬥！"
41130-153 = "果然會變這樣啊……"
41130-154 = "沒有物資，沒有支援，攻擊不間斷……"
41130-155 = "最後總有一天……"
41130-156 = "被帶去黑市，遭到殘酷的對待……"
41130-157 = "我想再糟也不會變成那樣……而且老師也在。"
41130-158 = "無論如何，火力讓人擔心呢。現在的我們，連和生活安全局對射都有困難了……"
41130-159 = "那怕只能補修配置在公園的機關槍和砲塔也好……"
41130-161 = "咕嘻嘻……大家，該不會忘了我吧？"
41130-169 = "補給就交給我吧！"
41130-171 = "下一話;以物易物"

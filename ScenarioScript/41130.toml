41130-60 = "#wait;1000"
41130-61 = "3;노점 아르바이트 학생;03;제가 공짜 유부초밥을 하나 더 드릴 테니, 혹시 그 학생들에 대해 아는 게 있으시다면 말씀해 주시겠어요?\n#3;em;[음표]\n#3;closeup"
41130-62 = "[s1] \"그 아이들에 대해 할 이야기는 없어.\"\n[s2] \"나도 사실은 잘 몰라.\""
41130-63 = "3;노점 아르바이트 학생;09;……그런가요. 조금 유감이네요.\n#3;closeup"
41130-64 = "3;노점 아르바이트 학생;09;……그런가요. 조금 유감이네요.\n#3;closeup"
41130-65 = "3;노점 아르바이트 학생;99;이것도 '들리는 소문'에 관한 이야기입니다만……\n#3;em;…\n#3;closeup"
41130-66 = "3;노점 아르바이트 학생;01;공원의 그 학생들, 사실 어딘가의 엘리트 학원 출신이래요.\n#3;closeup"
41130-67 = "3;노점 아르바이트 학생;02;그래서 그렇게 엄청난 위력의 화기를 갖추고 공원을 점거할 수 있었던 거죠.\n#3;closeup"
41130-68 = "3;노점 아르바이트 학생;09;그런데 그런 엘리트 학생들이 어쩌다 학원을 떠나 저런 곳에서 노숙자처럼 살아가고 있는 걸까요?\n#3;em;[?]\n#3;closeup"
41130-69 = "3;노점 아르바이트 학생;99;단순히 누군가를 속이기 위해 저러고 있을지도 모르고, 아니면 돌이킬 수 없는 커다란 실수를 저질렀을지도 몰라요.\n#3;closeup"
41130-70 = "3;노점 아르바이트 학생;01;아니면…… 꿈을 꾸고 있을지도 모르죠.\n#3;closeup"
41130-71 = "3;노점 아르바이트 학생;99;온실 속에서 자란 화초 같은 존재만이 꿀 수 있는…… 이룰 수 없는 허황된 꿈.\n#3;em;…\n#3;closeup"
41130-72 = "3;노점 아르바이트 학생;09;그런 꿈에 젖은 학생들을 이끄는 건, 분명 괴롭고 힘든 일이겠죠.\n#3;closeup"

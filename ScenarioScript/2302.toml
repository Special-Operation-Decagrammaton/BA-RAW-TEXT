[translation]
2302-1 = "再一次！節慶營運管理部例行會議！"
2302-4 = "（某個悠閒的假日午後，節慶營運管理部的成員再次聚集在百夜堂的一角）"
2302-10 = "白板就位！新的白板筆也準備好，一切都沒問題了。"
2302-14 = "那麼，菲娜。"
2302-15 = "是！已收到部長的命令！"
2302-22 = "那麼接下來將正式召開……#n節慶營運管理部的例行會議！"
2302-27 = "呵呵，呵呵呵呵呵呵……"
2302-28 = "雖然之前被出乎意料的不速之客──修行部給影響……"
2302-29 = "但這次！情況已經不一樣了！"
2302-30 = "因為我們的隱藏王牌……"
2302-32 = "海花回來了！"
2302-33 = "沒錯！王牌中的隱藏王牌！"
2302-34 = "海花，歡迎回來！菲娜也等你好久了！"
2302-36 = "是～！社長！"
2302-37 = "菲娜也好久不見！"
2302-38 = "我現在不是社長，是部長！"
2302-39 = "唉……"
2302-40 = "不管我說幾次都不願意改呢。"
2302-41 = "總之……下個月「狐狸叩叩商店街」將要舉行慶典。"
2302-42 = "而海花為了進行研究，算是進行了一場留學！"
2302-50 = "來吧，海花！讓我聽聽你的好主意！#n一起齊心協力，重振商店街的慶典吧！"
2302-52 = "一定沒問題～！"
2302-57 = "好，好的！那麼大家請聽我說！"
2302-58 = "首先，關於本次在格黑娜舉行的「浴血慶典」，我查出了一個不為人知的大消息！"
2302-65 = "（浴血……指的是在格黑娜舉行的番茄慶典吧）"
2302-66 = "（互相投擲番茄，就像是在彼此的臉上塗血一樣……#n　光是名字就很有格黑娜的風格……）"
2302-67 = "（在那種慶典查出的大消息，究竟是……）"
2302-73 = "哦哦！"
2302-74 = "就連海花都說是大消息……真讓人好奇！"
2302-75 = "其實──"
2302-76 = "格黑娜的浴血慶典──是源自一個互相開槍射擊，直到血流成河的慶典哦！"
2302-77 = "嗯……？"
2302-82 = "那是……團體與團體之間的抗爭嗎……"
2302-83 = "不愧是格黑娜！真可怕！"
2302-84 = "不不不，這怎麼可能是慶典的起源呢！#n你是從哪裡聽來的？"
2302-85 = "咦？是在格黑娜進行實地考察時，路邊的一個頭盔團團員告訴我的。"
2302-86 = "他說只要給他1000元，就會告訴我浴血慶典的大祕密……我忍不住就付錢了！"
2302-87 = "那是詐騙啦！不管怎麼想都是欺騙觀光客的套路吧，海花！？"
2302-88 = "什麼？"
2302-89 = "總之……那樣的慶典歷經時間的演變，成為了如今互丟番茄的慶典……"
2302-90 = "也就是利用所有想像得到的方式，盡情互丟番茄的慶典！"
2302-94 = "像是番茄投石機、火神式番茄機關砲、尾翼穩定脫離的番茄飛彈……"
2302-96 = "真是了不起的想像力！"
2302-97 = "光是欣賞各種投擲番茄的方法，就足以讓人忘記時間的流逝呢！"
2302-99 = "尾翼穩定脫離的番茄飛彈是什麼東西啊！？"
2302-100 = "而且甚至有傳聞說，這場慶典的規模，大到跟千年科學學園也有關係哦！"
2302-101 = "我們也以浴血慶典為標竿吧！社長！"
2302-102 = "嗯？標，標竿？"
2302-105 = "格黑娜的這場番茄慶典，並不單純只是投擲番茄的慶典而已。"
2302-106 = "我聽說這場慶典，對於協助農民處理賣相不好的番茄，提供了很大的幫助。"
2302-109 = "請試著想想看，社長！"
2302-110 = "我們也可以學習這場慶典的精神……"
2302-111 = "向百鬼夜行的農民，引進因各種原因而滯銷的番茄！"
2302-112 = "只要齊心協力，一定可以振興市場！"
2302-113 = "除此之外，也可以供應美味的番茄料理……聽起來怎麼樣呀？"
2302-119 = "首先，可以提升滯銷番茄的買氣。"
2302-120 = "還可以跟農民合作，一起構思和販售專門的番茄料理！"
2302-121 = "進一步提升番茄的銷量！"
2302-122 = "如此一來，番茄的銷售量一定會一飛沖天！#n不僅如此，慶典結束之後也需要有人來清潔、洗衣……"
2302-127 = "還能連帶振興相關產業！"
2302-128 = "不愧是海花！"
2302-129 = "藉由實地考察，增廣了許多見聞呢。"
2302-130 = "菲娜完全沒想到這點！"
2302-132 = "是，是嗎……？"
2302-133 = "可以振興消費市場和清潔、洗衣產業……好像還不錯……嗎？"
2302-137 = "不不不，先等一下！首先最重要的是預算不足！"
2302-138 = "況且從可能會有人受傷這點看來，這個點子一開始就出局了！"
2302-139 = "那這樣如何？"
2302-140 = "聽說狂獵藝術學院正在舉行特別的學園祭！是整個學園都會參加的盛會！"
2302-141 = "啊，學園祭。聽起來很平凡，感覺不錯呢。"
2302-142 = "對吧？對吧？"
2302-143 = "不過狂獵學院的情況有點特殊。#n以話劇舉例的話……"
2302-144 = "話劇？"
2302-150 = "話劇的靈魂就是寫實感！"
2302-151 = "所以就在舞台上接受MG5的轟炸吧！100發子彈全部發射！"
2302-152 = "而另一邊是燃燒彈！發射！"
2302-153 = "就這樣連舞台一起燃燒、爆炸殆盡，完成真正的話劇！"
2302-154 = "所有社團都以這種方式，展現各自的藝術……"
2302-155 = "當那些藝術齊聚一堂時，最終就會爆炸！解體！混沌！破壞！瘋狂！"
2302-156 = "不愧是海花！這就是所謂「藝術就是爆炸」對吧？"
2302-157 = "等等，藝術是爆炸還是破壞？"
2302-159 = "不能用在慶典上的詞語是不是太多了！？"
2302-160 = "這個消息你又是從哪聽來的……？"
2302-161 = "是在網路上看到的！"
2302-166 = "網路上有很多不能相信的資訊，還是注意一下比較好吧！？"
2302-167 = "那，那麼……鄉下學園舉辦的競走慶典怎麼樣呢？"
2302-168 = "鄉下的學園啊……聽起來不錯，給人一種舒適、療癒的感覺。#n競走……就像賽跑一樣嗎？"
2302-169 = "不，他們舉辦的是……科技賽跑慶典！"
2302-170 = "科，科技賽跑！？"
2302-171 = "沒錯！首先要在改裝的卡車上裝載各種武器！#n高射炮、多管炮、高射機槍、重機槍……只要能裝上去，不管什麼都可以！"
2302-172 = "接著再發揮駕駛技術，在避免重心不穩的車輛發生翻覆的前提下，#n將未經授權的8缸引擎逼到極限……"
2302-173 = "我相信！那副景象！"
2302-174 = "一定能夠找回街道的活力！"
2302-176 = "哦哦～！菲娜也想看那個比賽！"
2302-177 = "一定充滿了魄力！"
2302-179 = "不行！首先未經許可改造車輛是不行的！#n而且居然還要在百鬼夜行操控這麼可怕的武器？"
2302-181 = "駁回！"
2302-189 = "海花……該怎麼說呢，有沒有我們百夜堂能舉辦的那種……#n比較沒那麼盛大、喧鬧的點子……？"
2302-190 = "唔嗯……我只剩下一個小點子而已……"
2302-191 = "感覺效果有限……而且規模實在很小……"
2302-192 = "不像是個可以「砰！」的一聲，讓商店街戲劇性地恢復繁榮的點子……"
2302-193 = "不過我在實地考察時，曾經偶然看見了……"
2302-198 = "一場名叫「柳樹慶典」的慶典。"
2302-203 = "海花，柳樹慶典是什麼呢？"
2302-208 = "那是一場非常單純而樸素……#n只是讓參加慶典的人製作柳枝形狀的裝飾，並拿在手上沿著河邊散步的慶典。"
2302-212 = "看著隨風搖曳的柳葉、望著潺潺流水……"
2302-213 = "享受那獨特、平靜的氣氛。"
2302-214 = "當然肚子餓的時候，也有慶典攤位的食物可以吃。#n除此之外，還會準備柳樹形狀的糖果餅乾。"
2302-215 = "因為有一種說法，認為柳樹的枝葉是生氣蓬勃的象徵！"
2302-216 = "據說那也是這場慶典的由來哦！"
2302-218 = "哦哦，柳樹的枝葉竟然還有這層涵義！我第一次聽說呢！"
2302-223 = "沒錯！其實柳樹淨化水質的能力非常卓越。"
2302-224 = "人們也很早就發現，在柳樹的皮和葉裡含有一種帶有藥效，名為水楊酸的物質！"
2302-225 = "如果跟醋酸反應得當，就會產生出乙醯水楊酸，也就是解熱鎮痛劑哦！"
2302-226 = "除此之外，還有一個和柳樹有關的故事──#n據說有一位旅行者，因為口渴而向其他人討水喝。#n而這個人為了避免旅行者嗆到，便選擇以柳葉來盛水。"
2302-227 = "真是個浪漫的故事呢！"
2302-228 = "對吧？我也滿喜歡的！"
2302-229 = "總而言之，過往的柳樹慶典就是將折斷的柳枝拿在手上，#n在河邊散步、欣賞流水的慶典……"
2302-230 = "而現在則是為了保護柳樹，#n將折柳枝改為製作柳枝模樣的裝飾，欣賞柳樹和流水的節日！"
2302-237 = "就是那個！海花！"
2302-238 = "真不愧是海花！海花最棒了！"
2302-243 = "海花！這個點子真是棒極了！正中了我的內心！菲娜也非常贊成！"
2302-244 = "咦？真的嗎？"
2302-245 = "嘿嘿，嘿嘿嘿嘿。#n太好了！社長！"
2302-246 = "那麼就從這個點子出發，投入大量預算製作大型的柳樹模型！"
2302-248 = "不！這樣就行了。已經夠了！"
2302-249 = "咦？"
2302-250 = "可是……"
2302-252 = "我說已經夠了！"
2302-257 = "是，是。#n既然社長都這麼說了……"
2302-261 = "那麼今天的會議就到此為止！"
2302-263 = "是！以海花的點子為基礎，開始準備慶典吧！"
2302-264 = "什麼？我，我嗎……？#n雖，雖然討論的結果是這樣，可是既然社長也在……"
2302-265 = "別擔心，海花！海花一定做得到的！#n因為海花並不是一個人！"
2302-266 = "節慶營運管理部，永遠會陪在你身邊！"
2302-268 = "說的沒錯！慶典本來就是大家一起享受的！"
2302-273 = "走吧！菲娜、海花！一起展現節慶營運管理部的實力吧！"
2302-276 = "耶～！來，海花也跟我一起喊！"
2302-277 = "耶，耶～！"
2302-280 = "（就這樣，節慶營運管理部……即將開始大展身手！）"
2302-281 = "再一次！節慶營運管理部例行會議！"

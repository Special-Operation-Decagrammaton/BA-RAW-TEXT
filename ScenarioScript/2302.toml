[translation]
2302-1 = "การประชุมทั่วไปของชมรมเทศกาล! (อีกครั้ง)"
2302-4 = "(ในช่วงบ่ายของวันหยุดแสนสบาย สมาชิกชมรมเทศกาลได้มารวมตัวกันที่ร้านเฮียกคิยาโคอีกครั้ง)"
2302-10 = "เตรียมไวท์บอร์ดเรียบร้อย ปากกาเคมีก็เตรียมอันใหม่ไว้พร้อม เท่านี้ก็เตรียมตัวได้สมบูรณ์แบบแล้ว"
2302-14 = "งั้นพีน่า"
2302-15 = "ค่าา! พีน่ารับคำสั่งค่ะหัวหน้า! "
2302-22 = "การประชุมทั่วไปของชมรมเทศกาลกำลังจะเริ่มขึ้นแล้ววววว! "
2302-27 = "ฮุฮุ ฮุฮุฮุฮุฮุฮุ..."
2302-28 = "เมื่อก่อนมีแขกไม่ได้รับเชิญที่คาดไม่ถึงมาที่ชมรมฝึกฝนตามอำเภอใจ..."
2302-29 = "แต่คราวนี้จะไม่เหมือนเดิมหรอก! มันต้องต่างไปแน่นอน!"
2302-30 = "เพราะไม่ว่ายังไง พวกเราก็มีไม้ตายลับอยู่..."
2302-32 = "นั่นก็เพราะอุมิกะกลับมาแล้วยังไงล่ะ!"
2302-33 = "เยส! เดอะ ฮิดเดน การ์ด!"
2302-34 = "ยินดีต้อนรับค่ะ อุมิกะ พีน่ากำลังรออยู่เลยค่ะ!"
2302-36 = "ค่ะ ค่า...! ท่านประธาน!"
2302-37 = "พีน่า ไม่เจอกันนานเลยนะคะ!"
2302-38 = "ไม่ใช่ประธานนะ หัวหน้าต่างหาก!"
2302-39 = "เฮ้อ..."
2302-40 = "บอกตั้งหลายครั้งแล้วแต่ก็ไม่ยอมฟังกันสักที"
2302-41 = "ยังไงก็เถอะ! ในเดือนหน้าจะมีการจัดงานเทศกาลที่ย่านการค้าคิตสึเนะโอโดริ"
2302-42 = "ตอนนี้อุมิกะก็กลับมาจากการไปศึกษาค้นคว้าเรื่องงานเทศกาลแล้วด้วย!"
2302-50 = "เพราะงั้นอุมิกะ! ขอฟังไอเดียดีๆ จากเธอหน่อยแล้วกัน! เราจะร่วมมือกัน แล้วฟื้นฟูงานเทศกาลของ#nย่านการค้าให้กลับมามีชีวิตชีวาอีกครั้ง!"
2302-52 = "ถูกต้องเลยค่า~!"
2302-57 = "ค่ะ ค่าาา! ฉันมีไอเดียมาเสนอค่ะ!"
2302-58 = "ก่อนอื่น ฉันได้ข้อมูลสำคัญที่ปกปิดไว้จนถึงตอนนี้ เกี่ยวกับเทศกาลนองเลือดที่จัดขึ้นในเขตเกเฮนน่า#nมาค่ะ!"
2302-65 = "(เทศกาลนองเลือด... หมายถึงเทศกาลปามะเขือเทศที่จัดขึ้นที่เกเฮนน่าสินะ)"
2302-66 = "(แต่ละคนจะปามะเขือเทศใส่กัน ทำให้เหมือนดูโชกเลือดไปทั้งตัว... แค่ชื่อเทศกาลก็ดูสมกับเป็น#nเกเฮนน่าแล้ว...)"
2302-67 = "(ตรวจสอบข้อมูลสำคัญของเทศกาลแบบนั้นมางั้นเหรอ ข้อมูลแบบไหนกัน...)"
2302-73 = "อะ... อื้อ!"
2302-74 = "อุมิกะบอกว่าเป็นข้อมูลสำคัญมากแบบนี้ ชักสงสัยแล้วสิว่าเป็นข้อมูลแบบไหนกัน...?"
2302-75 = "คือว่าเรื่องนั้นน่ะ"
2302-76 = "จุดเริ่มต้นของเทศกาลนองเลือดของเกเฮนน่าน่ะ ในตอนแรกมันเป็นเทศกาลที่สาดกระสุนใส่กัน#nจนเลือดท่วมทั้งตัวเลยค่ะ!"
2302-77 = "หืม...?"
2302-82 = "นั่นมัน... เป็นการปะทะกันของแต่ละกลุ่มสินะคะ..."
2302-83 = "สมกับเป็นเกเฮนน่าจริงๆ! น่ากลัวจังเลยค่ะ!"
2302-84 = "เดี๋ยวๆๆ เรื่องแบบนั้นไม่มีทางเป็นจุดเริ่มต้นของงานเทศกาลได้หรอกน่า! เธอไปได้ยินมาจากไหนเนี่ย?"
2302-85 = "คะ? ตอนที่ไปสำรวจพื้นที่จริงที่เกเฮนน่า สมาชิกแก๊งหมวกกันน็อกที่ดูพูดไปเรื่อยเป็นคนเล่าเรื่องนี้ให้#nฉันฟังค่ะ"
2302-86 = "เห็นบอกว่าถ้าจ่ายเงินให้ไป 1,000 เยนก็จะบอกความลับสุดยอดของเทศกาลนองเลือดให้ฟัง ฉันก็เลยเผลอจ่ายไปทันทีโดยไม่รู้ตัวเลยค่ะ!"
2302-87 = "โดนหลอกแล้วไม่ใช่รึไง! ดูยังไงก็โดนพวกเจ้าถิ่นหลอกชัดๆ เลย เหมือนพวกนักท่องเที่ยวที่ไปเที่ยว แล้วโดนหลอกไงล่ะ อุมิกะ?!"
2302-88 = "คะ?"
2302-89 = "แต่ว่า... เทศกาลนั้นน่ะ พอเวลาผ่านไปแล้ว ในที่สุดมันก็ถูกเปลี่ยนมาเป็นเทศกาลปามะเขือเทศ#nในแบบปัจจุบัน..."
2302-90 = "ตอนนี้กลายเป็นงานเทศกาลเหนือจินตนาการที่คนจะใช้ทุกวิธีปามะเขือเทศใส่กันค่ะ!"
2302-94 = "ทั้งเครื่องยิงมะเขือเทศ ปืนวัลแคนมะเขือเทศ อากาศยานบินโปรยมะเขือเทศ..."
2302-96 = "จินตนาการกันเก่งเหลือเกิน...!"
2302-97 = "แค่ดูอุปกรณ์การยิงมะเขือเทศพวกนั้น ก็ไม่รู้ตัวเลยค่ะว่าเวลาผ่านไปนานแค่ไหน"
2302-99 = "อากาศยานบินโปรยมะเขือเทศมันคืออะไรกันน่ะ?!"
2302-100 = "มันเป็นเทศกาลขนาดใหญ่จนมีข่าวลือว่าเกี่ยวข้องกับทางมิลเลเนียมด้วยค่ะ!"
2302-101 = "และเพราะอย่างนั้น เราควรใช้เทศกาลนองเลือดนั่นมาเป็นตัวเปรียบเทียบทางธุรกิจนะคะ ท่านประธาน!"
2302-102 = "หะ... หืม? ตัวเปรียบเทียบทางธุรกิจเหรอ?"
2302-105 = "เทศกาลมะเขือเทศที่เกเฮนน่า ไม่ใช่แค่เทศกาลมะเขือเทศธรรมดา"
2302-106 = "ถือเป็นเทศกาลที่ช่วยกำจัดพวกมะเขือเทศที่ขายไม่ได้เพราะไม่มีคุณภาพ ที่เหลือทิ้งจากการเกษตร#nได้อย่างดีเลยค่ะ"
2302-109 = "ลองคิดดูสิคะ ท่านประธาน!"
2302-110 = "ถ้าเรานำมาใช้เป็นตัวเปรียบเทียบทางธุรกิจละก็..."
2302-111 = "เราก็จะนำมะเขือเทศที่ไม่สามารถทิ้งได้ด้วยเหตุผลต่างๆ มาใช้งานเทศกาลของเฮียกคิยาโคได้! "
2302-112 = "เราจะฟื้นฟูตลาดให้กลับมาคึกคักได้ด้วยการช่วยเหลือซึ่งกันและกันค่ะ!"
2302-113 = "นอกจากนี้ เราลองทำอาหารอร่อยๆ จากมะเขือเทศด้วยดีไหมคะ?"
2302-119 = "จะได้ส่งเสริมการบริโภคมะเขือเทศที่ขายไม่ได้และเหลือทิ้งอย่างไร้ประโยชน์"
2302-120 = "และจะได้เป็นการร่วมมือกับชาวเกษตรกรเพื่อวางจำหน่ายอาหารพิเศษที่ทำจากมะเขือเทศได้อีกด้วย! "
2302-121 = "ถ้าทำแบบนั้น ก็จะส่งเสริมการบริโภคมะเขือเทศได้อย่างต่อเนื่องด้วยค่ะ!"
2302-122 = "ฉันมั่นใจว่าแบบนั้นจะช่วยเพิ่มปริมาณการบริโภคมะเขือเทศได้ นอกจากนี้ หลังจากจบงานเทศกาลก็#nจะต้องใช้กำลังคนในการทำความสะอาดและเก็บกวาดสถานที่ด้วย..."
2302-127 = "ก็จะเป็นการส่งเสริมธุรกิจที่เกี่ยวข้องอย่างมากด้วยค่ะ! "
2302-128 = "สมแล้วที่เป็นอุมิกะ!"
2302-129 = "การสำรวจพื้นที่จริงทำให้โลกทัศน์กว้างขวางขึ้นด้วยสินะคะ!"
2302-130 = "พีน่าคนนี้ คิดไม่ถึงเลยละค่ะ!"
2302-132 = "งะ...งั้นเหรอ...?"
2302-133 = "กระตุ้นการบริโภคกับธุรกิจการทำความสะอาดได้ด้วยแบบนี้... คงไม่เป็นไรสินะ?"
2302-137 = "เดี๋ยวสิ ไม่ได้หรอกๆ เราไม่มีงบประมาณอะไรขนาดนั้นสักหน่อย!"
2302-138 = "ยิ่งกว่านั้นอาจมีคนบาดเจ็บจากงานเทศกาลได้ด้วย มันทำไม่ได้ตั้งแต่แรกอยู่แล้วละ! "
2302-139 = "ถ้างั้นแบบนี้เป็นไงคะ?"
2302-140 = "สถาบันศิลปะไวลด์ฮันต์กำลังจะจัดงานเทศกาลโรงเรียนขึ้นเป็นพิเศษค่ะ! เป็นงานอีเวนต์ขนาดใหญ่#nที่ทุกโรงเรียนจะเข้าร่วมค่ะ!"
2302-141 = "อ่า งานเทศกาลโรงเรียน แบบนั้นก็ดีนะ ดูธรรมดาทั่วไปดี"
2302-142 = "ใช่ไหมล่ะคะ?"
2302-143 = "แต่ว่าที่ไวลด์ฮันจะมีเรื่องพิเศษต่างออกไปนิดหน่อยค่ะ เช่น การแสดงละครเวที...  "
2302-144 = "แล้ว...?"
2302-150 = "เป็นการแสดงละครเวทีในชีวิตจริงค่ะ!"
2302-151 = "เพราะงั้นเวลามีคำพูดแบบ 'จงถูกยิงด้วยกระสุน MG5 100 นัดซะ!'"
2302-152 = "และถ้าหากมีคนตอบโต้ว่า 'ปาระเบิดเพลิงได้!' แล้วละก็ "
2302-153 = "จากนั้นบนเวทีก็จะลุกเป็นไฟ แล้วก็โดนระเบิดจนพังพินาศได้... แบบนั้นก็จะถือว่าเป็นการแสดงที่#nสมบูรณ์แบบค่ะ!"
2302-154 = "ทุกชมรมจะแสดงงานศิลปะของตัวเองออกมาในรูปแบบนั้น..."
2302-155 = "พอนำศิลปะทุกแขนงมารวมกัน สุดท้ายก็จะเกิดเป็นการระเบิด! การทำลาย! ความสับสนวุ่นวาย! และสถานการณ์ที่บ้าคลั่งค่ะ!"
2302-156 = "สมแล้วที่เป็นอุมิกะ! งานศิลปะก็คือการระเบิดนี่เองสินะคะ?"
2302-157 = "หรือว่าคือการทำลายกันนะ?"
2302-159 = "มีแต่คีย์เวิร์ดที่ไม่ควรเจอในงานเทศกาลทั้งนั้นเลยไม่ใช่รึไง?!"
2302-160 = "แล้วไปรู้เรื่องงานเทศกาลนี้มาจากไหนน่ะ...?"
2302-161 = "ฉันอ่านมาจากในอินเทอร์เน็ตค่ะ!"
2302-166 = "ในอินเทอร์เน็ตมีข้อมูลที่ไม่น่าเชื่อถืออยู่เต็มไปหมด ระวังเอาไว้หน่อยสิ?!"
2302-167 = "งั้นเหรอคะ... ถ้างั้นเทศกาลงานแข่งขันของโรงเรียนแถบชนบทเป็นไงคะ?"
2302-168 = "อ่า... โรงเรียนแถบชนบท ฟังดูดีนะ น่าจะได้ฟีลฮีลใจแล้วก็สงบสุขดี ว่าแต่เป็นการแข่งเหรอ... แข่งวิ่งรึเปล่า?"
2302-169 = "เป็น... เทศกาลแข่งขันทางเทคนิคค่ะ!"
2302-170 = "ทะ...ทางเทคนิค?!"
2302-171 = "ค่ะ! เป็นพวกรถแต่งที่ตกแต่งด้วยอาวุธหลากหลายชนิดค่ะ! มีทั้งปืนใหญ่ต่อต้านอากาศยาน ปืนยาวหลายกระบอก ปืนกลต่อต้านอากาศยาน ปืนกลหนัก... และปืนชนิดอื่นๆ ที่ติดตั้งได้ค่ะ!"
2302-172 = "โดยมีเงื่อนไขการแข่งว่าจะต้องไม่ทำให้รถพลิกคว่ำ และจำกัดการติดตั้งแค่ไม่เกิน 8 เครื่อง..."
2302-173 = "ฉันแน่นอนว่าภาพลักษณ์นั่น...!"
2302-174 = "ภาพลักษณ์ของสิ่งเหล่านั้นจะต้องฟื้นฟูย่านการค้าที่ซบเซาให้กลับมามีชีวิตชีวาได้แน่นอนค่ะ!"
2302-176 = "โอ้ว! พีน่าก็อยากดูเรซซิ่งเหมือนกันค่ะ!"
2302-177 = "คงจะมีแต่รถที่พาวเวอร์ฟูลทั้งนั้นเลยสินะคะ!"
2302-179 = "ไม่ได้! งานนี้มีปัญหาตั้งแต่แต่งรถโดยไม่ได้รับอนุญาตแล้ว! อีกอย่าง อาวุธน่ากลัวพวกนั้นก็ไม่ได้รับ#nอนุญาตให้นำเข้ามาในเฮียกคิยาโคด้วย?!"
2302-181 = "เพราะงั้นไม่ได้เด็ดขาด! ตัดออก!"
2302-189 = "อุมิกะ... หืม? อุมิกะ... จะว่ายังไงดีล่ะ มีไอเดียที่ไม่หวือหวา หรือไม่สุ่มเสี่ยงจนเกินไปที่ร้านของเราจะ#nทำได้บ้างรึเปล่า...?"
2302-190 = "อืม... ฉันเหลือแค่ไอเดียงานเทศกาลธรรมดาๆ แล้วนะคะ..."
2302-191 = "ไม่รู้ว่ามันจะช่วยได้รึเปล่า พอดีว่ามันเป็นแค่งานเล็กๆ... "
2302-192 = "แต่มันก็อาจทำให้ย่านการค้ากลับมาดังระเบิด! แล้วก็กลับมาคึกคักเหมือนเดิมก็ได้..."
2302-193 = "ถ้าถามว่ามีงานเทศกาลที่บังเอิญไปเจอเข้าระหว่างออกสำรวจพื้นที่บ้างรึเปล่าละก็..."
2302-198 = "คงเป็นงานเทศกาลต้นหลิวค่ะ"
2302-203 = "งานเทศกาลต้นหลิวคืออะไรเหรอคะ อุมิกะ?"
2302-208 = "มันเป็นงานเทศกาลที่เรียบง่ายมาก... คนที่มาร่วมงานเทศกาลจะนำสิ่งของไปตกแต่งกิ่งต้นหลิว และจับมือกันเดินไปตามริมแม่น้ำค่ะ"
2302-212 = "มองดูกิ่งก้านของต้นหลิวที่พลิ้วไหวไปตามแรงลม และคลื่นบนผิวน้ำ..."
2302-213 = "แล้วดื่มด่ำกับบรรยากาศที่เงียบสงบที่เป็นเอกลักษณ์ที่สัมผัสได้แค่ในช่วงเวลานั้นค่ะ"
2302-214 = "แน่นอนว่าถ้ารู้สึกหิวก็จะซื้ออาหารในงานเทศกาลกินได้ แล้วก็จะมีพวกลูกกวาดที่ทำเป็นรูปกิ่งต้นหลิว#nด้วยค่ะ"
2302-215 = "นอกจากนี้ ยังมีความเชื่อกันว่าต้นหลิวเป็นต้นไม้ที่ช่วยมอบความมีชีวิตชีวาให้เราได้ด้วยนะคะ!"
2302-216 = "เทศกาลต้นหลิวก็ถือกำเนิดมาจากเรื่องเล่าเหล่านั้นแหละค่ะ"
2302-218 = "โอ้ว ต้นหลิวมีตำนานอะไรแบบนั้นด้วยเหรอเนี่ย เพิ่งเคยได้ยินเลยค่ะ!"
2302-223 = "ค่ะ! ในความเป็นจริง ต้นหลิวมีคุณสมบัติในการบำบัดน้ำที่ดีมากด้วยนะคะ"
2302-224 = "และตั้งแต่โบราณมาก็เชื่อกันว่าเปลือกและใบของต้นหลิวมีคุณสมบัติทางยาด้วยค่ะ! มีสารจำพวกกรด#nซาลิซิลิกอยู่ค่ะ!"
2302-225 = "ถ้าเอาไปทำปฏิกิริยากับกรดอะซิติก ก็จะเกิดเป็นกรดอะซีทัลซาลิซิลิก หรือพูดง่ายๆ คือจะได้เป็น#nยาแก้ปวดลดไข้ขึ้นมานั่นเองค่ะ!"
2302-226 = "นอกจากนี้ ยังมีนิทานพื้นบ้านที่เล่าว่ามีนักเดินทางไปขอดื่มน้ำที่บ้านของชาวบ้านเพราะกระหายน้ำ#nอย่างหนัก แต่ชาวบ้านก็ให้เขาใช้ใบต้นหลิวดื่มน้ำ เพื่อไม่ให้เขาช็อกเพราะดื่มน้ำเร็วเกินไปด้วยค่ะ"
2302-227 = "เป็นเรื่องที่โรแมนติกดีมากเลยนะคะ!"
2302-228 = "ใช่ไหมล่ะคะ? ฉันเองก็ถูกใจมากๆ เลยค่ะ!"
2302-229 = "แต่ว่าสมัยก่อนในงานเทศกาลคนมักจะหักกิ่งต้นหลิวมาถือไว้และจับมือเดินเล่นริมแม่น้ำไปด้วยกัน พลางเพลิดเพลินกับการชมสายน้ำที่ไหลไป..."
2302-230 = "แต่ในปัจจุบันถ้าทำแบบนั้นต้นหลิวคงน่าสงสารมากๆ เลยให้คนที่ไปร่วมงานเทศกาลทำของตกแต่ง#nที่เหมือนต้นหลิวไปใช้แทนค่ะ!"
2302-237 = "อุมิกะ! อันนี้แหละ!"
2302-238 = "สมแล้วที่เป็นอุมิกะ! อุมิกะเนี่ยสุดยอดที่สุดเลย!"
2302-243 = "อุมิกะ! สุดยอดเลยค่ะ! ตอนนี้รู้สึกเหมือนมีบางอย่างปักลงมากลางมายฮาร์ตเลยค่ะ! พีน่าเห็นด้วยกับงานเทศกาลนี้ค่ะ!"
2302-244 = "อ๊ะ เหรอคะ?"
2302-245 = "แหะๆ แหะๆ... งะ... งั้นเหรอคะ? โชคดีจังเลยนะคะ ท่านประธาน!"
2302-246 = "ถ้างั้นเราก็ใช้ไอเดียนั้นเป็นพื้นฐาน แล้วลงทุนทุ่มงบกับการทำต้นหลิวขนาดใหญ่...!"
2302-248 = "เรื่องนี้น่าจะได้นะ แค่นี้ก็น่าจะพอแล้วแหละ!"
2302-249 = "คะ?"
2302-250 = "แต่ว่า..."
2302-252 = "ก็บอกว่าพอแล้วไงล่ะ!"
2302-257 = "ค่ะๆ ถ้าท่านประธานบอกว่าพอ..."
2302-261 = "งั้นก็ปิดประชุมเท่านี้แล้วกัน! "
2302-263 = "ค่ะ! ต่อจากนี้ก็คือการเตรียมงานเทศกาลที่อ้างอิงมาจากไอเดียของคุณอุมิกะค่ะ!"
2302-264 = "คะ? ฉะ...ฉันเหรอคะ...? ถะ...ถึงอย่างนั้นตอนนี้ท่านประธานก็อยู่ด้วย..."
2302-265 = "ไม่เป็นไรหรอกค่ะอุมิกะ! คุณอุมิกะทำได้อยู่แล้วค่ะ! แถมคุณอุมิกะก็ไม่ได้ตัวคนเดียวนะคะ!"
2302-266 = "ชมรมจัดงานเทศกาลน่ะ ไม่ว่าเมื่อไรก็ต้องคอยช่วยกันเสมอค่ะ!"
2302-268 = "ใช่แล้ว! ก็งานเทศกาลมันมีไว้ให้ทุกๆ คนสนุกไปพร้อมๆ กันยังไงล่ะ!"
2302-273 = "ถ้างั้นก็เริ่มกันเลย! พีน่า! อุมิกะ! มาแสดงพลังของชมรมจัดงานเทศกาลกันเถอะ!"
2302-276 = "เย้! เอ้า คุณอุมิกะก็ทำด้วยสิคะ!"
2302-277 = "ยะ...เย้!"
2302-280 = "(และนั่นก็คือจุดเริ่มต้นของการทำกิจกรรมเต็มรูปแบบของชมรมจัดงานเทศกาล!)"
2302-281 = "การประชุมทั่วไปของชมรมเทศกาล! (อีกครั้ง)"

[translation]
10010145-1 = "第14話;It Serves You Right（４）"
10010145-7 = "（……）"
10010145-11 = "歡，歡迎回來，老師……我想你應該差不多要回來了……"
10010145-16 = "從老師的表情來看……事，事情似乎順利解決了呢。"
10010145-17 = "我，我也，稍微能放心了。"
10010145-18 = "……咦？啊，那個，因為我不太用社群軟體……#n像是新聞之類的，也只是偶爾看看報紙……"
10010145-19 = "不，不過報紙上根本沒有報導就是了……考慮到事情的內容，我想這也沒辦法。"
10010145-20 = "總之，老師辛苦了……我也累了。"
10010145-21 = "……是真的累了唷。"
10010145-22 = "花，花費了不少時間和注意力……而且最後還……"
10010145-23 = "無法靠自己的力量解決，只能一味擔心的看著時間流逝，實在是……"
10010145-24 = "這，這次雖然碰巧能順利解決，但只要一想到「萬一」就沒完沒了了……"
10010145-25 = "日向同學不小心又闖禍的可能性也相當高……"
10010145-26 = "所，所以我才說外面的人……#n不好好盯著就不行，馬上就會做出奇怪的行為……讓人擔心……"
10010145-27 = "感覺完全沒有在考慮我的想法或心情……害，害我睡也睡不著……"
10010145-28 = "唉……對不起，我又說了些奇怪的話……"
10010145-29 = "那，那個，請別在意……"
10010145-30 = "該怎麼說呢……"
10010145-31 = "……我果然還是討厭外面的人。"
10010145-32 = "[s1]「憂真善良呢。」\n[s2]「憂的責任感真強呢。」"
10010145-33 = "請，請不要說奇怪的話……啊啊，真是的……"
10010145-34 = "請，請不要說奇怪的話……啊啊，真是的……"
10010145-35 = "總之，這個話題就到此為止……"
10010145-39 = "話，話說，老師有幫我把東西帶來嗎……？"
10010145-40 = "[s3]「來，在這裡。」\n[s4] 交出帶來的東西"
10010145-41 = "呵，呵呵……"
10010145-42 = "呵，呵呵……"
10010145-43 = "謝，謝謝……我就收下了……"
10010145-44 = "……為什麼是檸檬冰沙？"
10010145-45 = "這個……"
10010145-46 = "事，事到如今說這些可能有點晚了……"
10010145-47 = "我其實對甜食……像是蛋糕之類的東西並不是很喜歡……"
10010145-48 = "會，會把書本跟桌子弄髒……讀書的時候，還是這種飲料比較適合……"
10010145-49 = "不管有多冷，我都會喝這種飲料……"
10010145-53 = "……"
10010145-54 = "所以，對不起……那，那個時候說的蛋糕，只是我的一點壞心眼，之類的東西……"
10010145-55 = "……？"
10010145-56 = "以後都會買檸檬冰沙過來……？"
10010145-57 = "……是之後也打算過來的意思嗎。"
10010145-58 = "呼……"
10010145-59 = "原來如此，畢竟是「老師」啊……"
10010145-60 = "既然如此……還是別再對你有所防備了吧。"
10010145-61 = "我也不是很喜歡這樣……"
10010145-63 = "那麼下次過來的時候，請幫我帶杯冰的黑咖啡……"
10010145-64 = "……那才是，我真正喜歡的東西。"
10010145-72 = "嗚……好，好酸……"
10010145-73 = "早，早知道一開始就拜託老師帶黑咖啡了……"
10010145-77 = "……呼。"
10010145-78 = "老師他……應該差不多到夏萊了吧……"
10010145-79 = "那麼……"
10010145-80 = "終，終於能靜下來了……"
10010145-85 = "經典的完美複製品……要偷偷做出來還真辛苦啊……"
10010145-90 = "……"
10010145-91 = "至今為止依然充滿謎團的修女會……"
10010145-93 = "你們的祕密……就讓我好好見識見識吧……"
10010145-94 = "冒失修女和古書館的魔術師"

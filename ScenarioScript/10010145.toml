10010145-16 = "3;우이;03;……그 얼굴을 보아하니, 일은 잘 해결된 모양이네요. 다행입니다…….\n#3;em;[반짝]\n#3;a"
10010145-17 = "3;우이;07;덕분에 저도 조금은 마음이 놓이는 기분이네요.\n#3;greeting"
10010145-18 = "3;우이;01;……네? 아. 저는 SNS 같은 거 잘 안 보니까요……. 뉴스 같은 건 신문이나 보는 정도고.\n#3;em;[?]"
10010145-19 = "3;우이;08;물론 신문에서는 딱히 기사로 만들지 않았어요. 뭐, 그래야 하는 내용이었겠죠. 아마도……."
10010145-20 = "3;우이;07;어쨌든 뭐, 잘 된 거겠죠. ……사실 가뜩이나 그것 때문에 좀 열 받아 있던 상태였거든요."
10010145-21 = "3;우이;05;……네? 왜 열이 받냐고요? 그야 당연하잖아요.\n#3;em;[반응]"
10010145-22 = "3;우이;06;그 긴 시간 동안……. 소중한 제 시간인데…….\r\n#3;stiff"
10010145-23 = "3;우이;08;그걸 제가 해결할 수도 없고, 저랑 관계도 없는 남 걱정하느라 버리고 있었으니까요."
10010145-24 = "3;우이;15;지금처럼 그나마 일이 잘 해결된 거라면 그나마 다행이지, 만에 하나 안 좋은 쪽으로 흘러 갔다면…….\n#3;em;[...]"
10010145-25 = "3;우이;18;으으……. 역시 싫어요. 왜 바깥사람들이랑 엮이고 싶지 않았는지 다시 기억났어요.\n#3;em;[속상함]\n#3;stiff"
10010145-26 = "3;우이;17;하나하나 봐줘야 하고, 금방 이상한 짓하고……. 걱정시키고……."
10010145-27 = "3;우이;17;제 생각이나 기분 따위는 아랑곳않고 자기들 맘대로……. 신경 쓰여 잠 못 자게하고…….\n#3;em;[///]\n#3;stiff"
10010145-28 = "3;우이;06;……으음. 뭐라는 거지, 난……. 또 선생님 앞에서 괜한 소릴…….\n#3;em;[땀]"
10010145-29 = "3;우이;03;죄송해요. 아무튼 그래요. 신경 쓰실 필요는 없는 이야기였네요."
10010145-30 = "3;우이;02;……뭐……."
10010145-31 = "3;우이;06;……역시 바깥은……. 싫네요.\n#3;em;…"

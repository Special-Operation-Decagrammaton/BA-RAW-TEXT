[translation]
10010145-1 = "ตอนที่ 14;หว่านพืชเช่นไร ย่อมได้ผลเช่นนั้น 4"
10010145-7 = "(......)"
10010145-11 = "อ๊ะ... มาแล้วเหรอคะคุณครู กำลังคิดอยู่เลยว่าควรจะมาถึงได้แล้ว..."
10010145-16 = "ดูจากสีหน้าแล้ว งานทางนั้นคงคลี่คลายไปได้ด้วยดีใช่ไหมคะ? ดีแล้วละค่ะ..."
10010145-17 = "ฉันเองก็พลอยสบายใจไปด้วยเลยค่ะ"
10010145-18 = "คะ...? อ้อ พอดีว่าฉันไม่ค่อยเล่นโซเชียลค่ะ... ถ้าจะดูข่าวก็หาอ่านจากหนังสือพิมพ์เอา..."
10010145-19 = "แน่นอนว่าในหนังสือพิมพ์ก็ไม่ได้มีแค่ข่าวหรอกค่ะ มันก็มีเรื่องอื่นให้อ่านบ้าง..."
10010145-20 = "แต่ก็เอาเถอะค่ะ งานคงดำเนินไปได้ด้วยดี จริงๆ แล้วฉันกำลังหัวร้อนอยู่เพราะเรื่องนี้แหละค่ะ"
10010145-21 = "คะ...? สงสัยว่าทำไมฉันถึงหัวร้อนเหรอ? มันก็แน่นอนอยู่แล้วไม่ใช่เหรอคะ?"
10010145-22 = "ก็เวลาที่ใช้ไป... มันเป็นเวลาสำคัญของฉัน…"
10010145-23 = "ทั้งแก้ไขปัญหาเองไม่ได้ แถมยังต้องมาเสียเวลาไปกับการกังวลเรื่องของคนที่ไม่เกี่ยวข้องกับฉันอีก"
10010145-24 = "ถ้าทุกอย่างเป็นไปได้ด้วยดีก็ดีแล้วละค่ะ แต่ถ้าเสียเวลาไปแล้วยังยิ่งแย่ไปกว่าเดิมอีกละก็..."
10010145-25 = "ไม่เอาแล้ว... แบบนี้ไม่ใช่ฉันเลย ฉันนึกขึ้นได้อีกครั้งแล้วค่ะว่าทำไมฉันถึงไม่อยากยุ่งเกี่ยวกับคนนอก "
10010145-26 = "คนพวกนั้นมีอะไรให้ช่วยเหลือเยอะ แถมยังทำตัวแปลกๆ แล้วก็ทำให้เป็นห่วง..."
10010145-27 = "แถมยังทำตามใจตัวเองโดยไม่สนความคิดหรืออารมณ์ของฉัน... แล้วฉันก็จะเอาไปคิดมากจนนอนไม่หลับ..."
10010145-28 = "อืม... ฉันเป็นอะไรของฉันนะ... เอาแต่พูดเรื่องไร้สาระต่อหน้าคุณครูอีกแล้ว..."
10010145-29 = "ขอโทษนะคะ เอาเป็นว่า... ไม่ต้องสนใจเรื่องที่ฉันพูดไปหรอกค่ะ"
10010145-30 = "ช่างมันเถอะ..."
10010145-31 = "ฉันว่าฉันเข้ากับคนนอก... ไม่ได้หรอกค่ะ..."
10010145-32 = "[s1] \"อุยเนี่ย อ่อนโยนจังนะ\"\n[s2] \"อุยมีความรับผิดชอบมากเลย\""
10010145-33 = "อึก... อย่ามาพูดอะไรแปลกๆ นะคะ... หยุดเลยค่ะ"
10010145-34 = "อึก... อย่ามาพูดอะไรแปลกๆ นะคะ... หยุดเลยค่ะ"
10010145-35 = "เราพักเรื่องงานพระคัมภีร์กับเรื่องของฉันไว้เท่านี้ดีกว่า"
10010145-39 = "ว่าแต่... ไม่ทราบว่า... ได้เอามาให้ไหมคะ...?"
10010145-40 = "[s3] \"ก็ต้องเอามาสิ นี่ไง\"\n[s4] ยื่นของที่เอามาให้กับอุย"
10010145-41 = "ฮุ... ฮุฮุ..."
10010145-42 = "ฮุ... ฮุฮุ..."
10010145-43 = "ขอบคุณนะคะ ฉันจะดื่มให้อร่อยเลย"
10010145-44 = "คะ...? ทำไมครั้งนี้ถึงไม่สั่งเค้ก แต่เป็นเลมอนสมูทตี้... งั้นเหรอคะ?"
10010145-45 = "อืม..."
10010145-46 = "แบบว่า... จะให้มาสารภาพตอนนี้ก็กระไรอยู่..."
10010145-47 = "ความจริงแล้วฉันไม่ได้ชอบอะไรหวานๆ อย่างเค้กหรอกค่ะ แค่กินบ้างเป็นบางครั้งน่ะ..."
10010145-48 = "ก็ของแบบนั้นทำให้โต๊ะและหนังสือเปื้อนไงคะ ตอนอ่านหนังสือ... ก็ต้องเลมอนสมูทตี้เปรี้ยวๆ สิคะ"
10010145-49 = "ถึงห้องสมุดจะเย็นแค่ไหน... หรือจะหนาวจนควันออกปาก... ก็ต้องเลมอนสมูทตี้ค่ะ"
10010145-53 = "คือว่า..."
10010145-54 = "ที่จริงแล้วตอนนั้นน่ะ... เป็นฉันเองที่ดื้อค่ะ ขอโทษนะคะคุณครู..."
10010145-55 = "คะ...?"
10010145-56 = "ไม่เป็นไรเหรอคะ? ถ้ามาหาครั้งหน้าจะซื้อเลมอนสมูทตี้มาให้งั้นเหรอคะ?"
10010145-57 = "'ครั้งหน้า'... แสดงว่าคุณครูจะมาหาฉันอีกเหรอ... ฉันก็ไม่ได้ไม่ชอบหรอกนะ..."
10010145-58 = "ฮู่ว..."
10010145-59 = "ฉันยอมแพ้ก็ได้ค่ะ...  "
10010145-60 = "ถ้าคุณครูจะมาหาบ่อยๆ ละก็... ฉันเองก็คงต้องบอกไปตามความจริง..."
10010145-61 = "บอกก็ได้... ที่จริงฉันอยากจะ... เปิดใจและพูดตรงๆ กับคุณครูให้มากกว่านี้หน่อยน่ะค่ะ..."
10010145-63 = "แบบว่า... ถ้าจะมาหาครั้งหน้า ขอเป็นอเมริกาโน่เย็น..."
10010145-64 = "ที่จริงแล้ว... ฉันชอบแบบนั้นมากกว่าค่ะ"
10010145-72 = "อึก... เปรี้ยวจัง... กินไม่ไหว..."
10010145-73 = "รู้งี้ขอเป็นอเมริกาโน่เย็นตั้งแต่แรกน่าจะดีกว่า... ไม่น่าสั่งอะไรแปลกๆ แบบนี้เลย..."
10010145-77 = "อืม... ถ้างั้น..."
10010145-78 = "คุณครูคะ... ออกไปก็สักพักแล้ว ป่านนี้คงจะถึงชาเล่ต์แล้วสินะ..."
10010145-79 = "จากนี้เราคงสบายใจได้แล้วแหละเนอะ"
10010145-80 = "เพราะตอนที่ยุ่งกับงานพระคัมภีร์ ก็ไม่มีเวลาอ่านหนังสือเลย..."
10010145-85 = "ฮู่วว... ดีจริงๆ ที่แอบคัดลอกพระคัมภีร์ไว้จนครบเล่ม... "
10010145-90 = "......"
10010145-91 = "สาวๆ ชมรมซิสเตอร์ที่ปิดบังอะไรไว้มากมาย..."
10010145-93 = "ฉันเริ่มจะสงสัยแล้วสิ... ขออ่านเลยแล้วกันนะคะ"
10010145-94 = "ซิสเตอร์จอมโก๊ะกังกับแม่มดแห่งห้องสมุดเก่า"

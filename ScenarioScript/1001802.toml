[translation]
1001802-1 = "The Sanctuary in the Cabinet"
1001802-5 = "Game Development Department Club Room"
1001802-7 = "I heard that the Game Development Department was preparing to release a new game, but when I got to the club room, no one was there."
1001802-8 = "I decided to wait patiently until the members returned."
1001802-9 = "[s] Open the metal cabinet door to hang your outerwear."
1001802-13 = "Huh?!"
1001802-14 = "Y-You scared me, Sensei! Please knock before opening the cabinet!"
1001802-15 = "...Oh, even to me, that sounds weird."
1001802-16 = "M-More importantly, why are you here? D-Do you need me for something?"
1001802-17 = "Oh. You came to see the Game Development Department's new game?"
1001802-18 = "I-I see...but the new game we're working on is on Momoi's laptop, so I can't show it to you right now."
1001802-19 = "Please wait for the other members to return."
1001802-20 = "[s] \"So why are you in the cabinet anyway, Yuzu?\""
1001802-21 = "It's because..."
1001802-22 = "No one notices me when I'm in here."
1001802-23 = "When I just sit in the club room like normal, people come and talk to me all the time."
1001802-24 = "In particular, Yuuka from Seminar always gets angry, gives me scary looks, and tells me to attend the club president meetings... When Yuuka comes up to me like that, I want to run away."
1001802-25 = "But no one can find me when I'm in here."
1001802-26 = "At least for now, this cabinet is my little sanctuary. Heehee..."
1001802-27 = "[s] \"Isn't that cabinet cramped?\""
1001802-28 = "No, it's actually pretty comfy. Kind of a perfect fit for me."
1001802-29 = "Besides, on a hot day like today, its cold metal walls feel cool to the touch."
1001802-30 = "If I lean against the wall and listen to the sounds coming from outside... Ah, I could just stay here forever."
1001802-31 = "[s] \"Then is it okay if I go in there with you?\""
1001802-32 = "Wh-What?!"
1001802-33 = "B-But the cabinet only fits one person!"
1001802-34 = "O-Of course, there's no official limit to the number of people who can fit inside the cabinet, but...wouldn't it be too small for two people?"
1001802-35 = "You think that it'll feel more cozy because the space will be tighter?"
1001802-36 = "Um, if you say so. It might be okay..."
1001802-40 = "W-Wait, Sensei! Don't force yourself in here!"
1001802-41 = "Um, you're too close. Uh..."
1001802-42 = "This isn't working!"
1001802-46 = "This is impossible! It's impossible to fit two people in one cabinet!"
1001802-47 = "What? You want me to get out so you can stay in the cabinet by yourself?"
1001802-48 = "No! This is my sanctuary!"
1001802-50 = "After that, I fought over the cabinet with Yuzu until the other members returned..."

[translation]
1001802-1 = "療癒空間位於置物櫃中"
1001802-5 = "遊戲開發部．活動室"
1001802-7 = "（聽說遊戲開發部正在製作新遊戲所以過來看看，但活動室裡一個人都沒有）"
1001802-8 = "（在社員來之前就在活動室裡悠閒地等著吧）"
1001802-9 = "[s] 脫下外衣然後打開櫃子"
1001802-13 = "噫，噫噫！？"
1001802-14 = "嚇，嚇我一跳……！老，老師，要打開櫃子前請先敲門……！"
1001802-15 = "……對不起。仔細想想連我自己都覺得好像說了很奇怪的事……"
1001802-16 = "比，比起這個，老師怎麼會過來呢？#n找，找我有什麼事嗎？"
1001802-17 = "……啊，你說是來看遊戲開發部的新遊戲嗎？"
1001802-18 = "是，是這樣啊……不好意思，那個遊戲存在桃井的筆記型電腦裡，沒辦法現在就讓你看……"
1001802-19 = "在大家回來之前，請稍等一下。"
1001802-20 = "[s] 「柚子為什麼總是躲在櫃子裡呢？」"
1001802-21 = "那是因為……"
1001802-22 = "只要躲在這裡面的話，就不會被別人看到了。"
1001802-23 = "如果正常地待在活動室裡的話，就會經常有人向我搭話……"
1001802-24 = "特別是研討會的優香前輩，常常用「請參加部長會議」的恐怖表情看我……只要一看到她就忍不住想逃走……"
1001802-25 = "但，但是，只要躲在這裡面的話，就誰也找不到我了。"
1001802-26 = "只有在這裡面的時候，這個櫃子裡就是我小小的療癒空間。嘿嘿……"
1001802-27 = "[s] 「櫃子裡面不會覺得很窄呼吸困難嗎？」"
1001802-28 = "不會呀，不如說這個大小剛好很適合我。"
1001802-29 = "而且，像今天這麼熱，金屬製的櫃子冰冰涼涼的很舒服。"
1001802-30 = "把身體靠在櫃子上，聽著外面傳來的聲音……簡直讓人想永遠待在裡面……"
1001802-31 = "[s] 「我可以跟你一起躲進去嗎？」"
1001802-32 = "什，什麼！？"
1001802-33 = "但，但是這個櫃子是單人用的……！？"
1001802-34 = "當，當然櫃子上也沒有寫正式的人數限制啦……但是，兩個人的話不會太擠嗎？"
1001802-35 = "你說變得更窄的話說不定會覺得更安心，是嗎？"
1001802-36 = "唔嗯……既，既然老師都這麼說了……"
1001802-40 = "請，請等一下老師！不，不要硬，硬擠進來……！"
1001802-41 = "嗚嗚，靠得太近了……體溫跟……呼吸都……嗚……"
1001802-42 = "果，果然不行……！"
1001802-46 = "不行啦！一個櫃子果然裝不下兩個人！！"
1001802-47 = "咦？你說那就換你一個人躲進櫃子裡？"
1001802-48 = "不，不可以！這裡是我的、只屬於我的療癒空間！"
1001802-50 = "（之後，到其他部員回來之前都和柚子進行著櫃子爭奪戰……）"

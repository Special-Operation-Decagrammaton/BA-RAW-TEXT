[translation]
1001802-1 = "#title;캐비닛 속의 안식처"
1001802-2 = "#wait;500"
1001802-3 = "#wait;1000"
1001802-4 = "#all;hide"
1001802-5 = "#place;게임개발부 부실"
1001802-6 = "#wait;1500"
1001802-7 = "#na;게임개발부에서 신작 게임을 준비 중이라는 소식을 듣고 찾아왔지만, 부실에는 아무도 없었다."
1001802-8 = "#na;부원들이 돌아올 때까지 느긋하게 부실에서 기다리도록 하자."
1001802-9 = "[s] 겉옷을 걸어 두기 위해 철제 캐비닛을 연다."
1001802-10 = "#st;[0,0];instant;1;"
1001802-11 = "#clearST"
1001802-12 = "#wait;1500"
1001802-13 = "3;유즈;08;히, 히익!?\n#3;em;[?!]\n#3;shake\n#3;closeup"
1001802-14 = "3;유즈;05;까, 깜짝이야! 선생님! 캐비닛을 열기 전에는 노크를 해주세요!\n#3;hophop"
1001802-15 = "3;유즈;00;……아, 제가 생각해도 이건 좀 이상한 말 같네요.\n#3;stiff"
1001802-16 = "3;유즈;01;그, 그보다 어째서 이곳에 계신 건가요? #n제, 제게 무슨 볼일이라도 있으신가요?\n#3;em;[?]"
1001802-17 = "3;유즈;02;……아…… 게임개발부의 신작을 보러 오셨다고요?"
1001802-18 = "3;유즈;01;그, 그렇군요……. 하지만 준비 중인 신작 게임은 모모이가 들고 간 노트북 속에 있어서 지금 당장은 보여드릴 수가 없어요.\n#3;em;[땀]"
1001802-19 = "3;유즈;03;다른 부원들이 돌아올 때까지 잠시만 기다려주세요."
1001802-20 = "[s] \"유즈는 어째서 캐비닛 안에 들어가 있는 거야?\""
1001802-21 = "3;유즈;01;그건……\n#3;em;[...]"
1001802-22 = "3;유즈;02;이 안에 들어가 있으면 다른 사람들의 눈에 띄지 않기 때문이에요."
1001802-23 = "3;유즈;01;부실에 평범히 앉아있으면 수시로 사람들이 찾아와 말을 걸어오거든요."
1001802-24 = "3;유즈;04;특히 세미나의 유우카 선배는 자꾸 무서운 표정으로 동아리 부장 회의에 참석하라며 화를 내곤 해서…… 그 앞에 있으면 자꾸 도망치고 싶어져요.\n#3;em;[속상함]\n#3;stiff"
1001802-25 = "3;유즈;03;하지만 이 안에 들어와 있으면 아무도 저를 찾지 못해요."
1001802-26 = "3;유즈;07;이 순간만큼은 이 캐비닛이 저의 작은 안식처랍니다. 헤헤…….\n#3;em;[음표]"
1001802-27 = "[s] \"캐비닛이 좁아서 답답하지는 않아?\""
1001802-28 = "3;유즈;03;아뇨, 오히려 몸에 딱 맞게 밀착되어서 안락한 느낌이에요."
1001802-29 = "3;유즈;07;게다가 오늘처럼 더운 날에는 서늘한 금속 벽의 촉감이 시원해서 기분이 좋거든요.\n#3;em;[반짝]"
1001802-30 = "3;유즈;03;벽에 몸을 기댄 채 밖에서 들려오는 소리에 귀를 기울이고 있노라면…… 영원히 이 밖으로 나가고 싶지 않을 정도예요……."
1001802-31 = "[s] \"그럼 그 안에 같이 들어가도 괜찮아?\""
1001802-32 = "3;유즈;08;네, 네에?!\n#3;em;[?!]\n#3;shake"
1001802-33 = "3;유즈;08;하, 하지만 이 캐비닛은 1인승인데요?"
1001802-34 = "3;유즈;04;무, 물론 캐비닛에 인원 제한 같은 건 쓰여 있지 않지만…… 그래도 두 사람은 너무 좁지 않을까요?\n#3;em;[땀]"
1001802-35 = "3;유즈;02;오히려 공간이 줄어들어서 더 아늑하게 느껴질지도 모른다고요?"
1001802-36 = "3;유즈;99;으음…… 선생님께서 그렇게 말씀하신다면 괜찮을지도……."
1001802-37 = "3;유즈;99\n#3;d\n#wait;1000"
1001802-38 = "3;유즈;99\n#3;a\n#3;closeup\n#wait;1000"
1001802-39 = "#wait;1000"
1001802-40 = "3;유즈;08;자, 잠깐만요, 선생님! 억지로 틈을 비집고 들어오지 마세요!\n#3;closeup\n#3;em;[?!]\n#3;shake"
1001802-41 = "3;유즈;06;으으, 너무 가까워요…… 체온이…… 호흡이…… 으으…….\n#3;closeup\n#3;em;[///]\n#3;stiff"
1001802-42 = "3;유즈;04;역시 안 되겠어요……!\n#3;hophop\n#3;closeup"
1001802-43 = "#all;hide"
1001802-44 = "#wait;1000"
1001802-45 = "#all;hide"
1001802-46 = "3;유즈;05;무리예요! 한 캐비닛 안에 두 사람은 역시 무리예요!\n#3;a\n#3;hophop"
1001802-47 = "3;유즈;02;네? 그럼 저 대신 선생님이 혼자 캐비닛 안에 들어가 계시겠다고요?\n#3;em;[?]"
1001802-48 = "3;유즈;05;안 돼요! 여기는 제 안식처란 말이에요!\n#3;em;[빠직]\n#3;stiff"
1001802-49 = "#all;hide"
1001802-50 = "#na;이후, 다른 부원들이 돌아올 때까지 유즈와 캐비닛을 두고 쟁탈전을 벌이며 시간을 보냈다……."

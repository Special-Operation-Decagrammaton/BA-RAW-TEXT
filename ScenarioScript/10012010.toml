[translation]
10012010-1 = "Episode 1; Life Is Full of So Many Surprises"
10012010-2 = "...That's pretty much the situation."
10012010-3 = "I'm a little apprehensive about how well everything is going."
10012010-4 = "[s1] \"It's quite the lucky streak!\"\n[s2] \"A helicopter and first place. So lucky!\""
10012010-5 = "R-Right?! It's still just so hard to believe."
10012010-6 = "R-Right?! It's still just so hard to believe."
10012010-10 = "Hahaha. Don't look a gift horse in the mouth, Ayane."
10012010-11 = "I think it's the universe's reward for all our hard work! It's a celebration!"
10012010-12 = "Wait a second... Sensei?"
10012010-13 = "Since when did we invite Sensei?"
10012010-14 = "Well, Sensei's the Foreclosure Task Force's advisor. It's natural we update them on big news."
10012010-15 = "That's not the only reason, actually..."
10012010-16 = "Do you want to break the terrible news, Ayane?"
10012010-18 = "Stop teasing them, Hoshino. So... Serika's prize for winning first place was a resort vacation."
10012010-22 = "I p-promise I didn't know! I heard \"first place\" and came running to you guys!"
10012010-23 = "Heehee. Silly Serika. There's no need to be so embarrassed."
10012010-24 = "When else will we have the chance for an all-expenses-paid vacation?"
10012010-25 = "And we have a huge helicopter now so we can get there no problem-o!"
10012010-26 = "Everyone here's really put in their everything for this school. We deserve a break."
10012010-28 = "That's our real motive for reaching out to you, Sensei."
10012010-29 = "So...if you wouldn't mind..."
10012010-30 = "[s3] \"You want me to go with you?\"\n[s4] \"You all really know how to spoil me.\""
10012010-31 = "Don't get too used to it."
10012010-32 = "Don't get too used to it."
10012010-33 = "The resort is far away...so it'd be nice to have an adult to come with us."
10012010-34 = "She's right, Sensei. Would you really let your adorable little students travel alone? Who knows what would happen!"
10012010-35 = "B-But...only if you want to...Sensei..."
10012010-36 = "[s5] \"Of course. I'd be happy to.\"\n[s6] \"Don't look a gift horse in the mouth, right?\""
10012010-37 = "Yay! Sensei's coming! ☆"
10012010-38 = "Yay! Sensei's coming! ☆"
10012010-39 = "I should pack then."
10012010-40 = "I didn't think we'd get to use the helicopter so soon!"
10012010-47 = "Look how happy all my kiddos are. Ah, to be young!"
10012010-48 = "Hm? Do I really look excited?"
10012010-49 = "...Or annoyed? You can't really tell?"
10012010-50 = "Sensei's always spouting weird nonsense. Why would I complain about a vacation?"
10012010-51 = "I get to relax under the sun and nap all day. An old maid like me couldn't ask for anything more."
10012010-52 = "Who knew we would go from not knowing if we'd survive the next day to going on vacation to resorts?"
10012010-53 = "Seriously..."
10012010-55 = "Life is full of surprises..."
10012010-62 = "...?"

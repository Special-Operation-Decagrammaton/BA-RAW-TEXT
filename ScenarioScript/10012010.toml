10012010-10 = "1;호시노;03;뭐…… 살다 보면 이런 일도 있는 거지. 이 아저씨도 조금 놀라긴 했지만 말이야.\n#1;a\n#1;em;[재잘]"
10012010-11 = "5;노노미;03;응응! 분명 그동안 착하고 성실하게 살아온 모두에게 보답이 내려온 걸 거예요! 잘됐네요, 잘 됐어~.\n#5;a\n#5;em;[음표]"
10012010-12 = "5;노노미;01;……음? 선생님?"
10012010-13 = "5;노노미;02;아, 잘된 일이라서 축하 파티 겸 초대한 거냐고요?"
10012010-14 = "5;시로코;03;물론이지. 선생님은 우리 대책위원회의 고문 선생님이니까. 이런 정보는 공유해야 해.\n#5;greeting\n#5;em;[반짝]\n#5;a"
10012010-15 = "1;호시노;02;뭐……. 물론 단지 그런 정보 공유의 이유만으로 초대한 건 아니지만 말이지."

[translation]
10012010-1 = "第1話;真的是，人生世事難料"
10012010-2 = "……這就是到早上為止的情況。"
10012010-3 = "總覺得……幸運的事持續發生，都讓人覺得有點害怕了呢。"
10012010-4 = "[s1] 「原來如此……發生了很多事呢。」\n[s2] 「超級幸運呢！」"
10012010-5 = "就，就是說呀。我自己也有點……沒有真實感。"
10012010-6 = "就，就是說呀。我自己也有點……沒有真實感。"
10012010-10 = "嘛嘛，只要活著就是會發生這種事唷……大叔我也有點吃驚就是了。"
10012010-11 = "嗯嗯！一定是一直以來的努力得到了回報！"
10012010-12 = "老師也是這麼想吧？"
10012010-13 = "啊，那個啊。這次請老師來是……"
10012010-14 = "因為老師是對策委員會的顧問。所以這種時候一定要找老師來，我是這麼想的。"
10012010-15 = "嘛，也不全然只是為了傳達這個消息才找你來的～"
10012010-16 = "……事實上。"
10012010-18 = "茜香醬抽中的，是「渡假勝地使用券」。啊哈哈……"
10012010-22 = "我，我也不知道啊！聽到「頭獎」的話一般都會認為是商品券或是現金吧！"
10012010-23 = "嘛嘛。就算是現金也只會被用來還債，這樣反而更好吧？"
10012010-24 = "這也是個好機會，偶爾也盡情地放鬆一下吧。#n可以在渡假勝地悠悠哉哉地玩樂，這可是很難得的唷～？"
10012010-25 = "沒錯！所以，大家決定一起去渡假了～！"
10012010-26 = "一直以來，大家不是都在為學校而努力嗎。想說偶爾有這樣的休假也不錯☆"
10012010-28 = "……是的。#n所以才聯絡了老師。"
10012010-29 = "這個，那個……如果，老師可以的話……"
10012010-30 = "[s3] 「要帶我一起去嗎？」\n[s4] 「好期待渡假勝地呢！」"
10012010-31 = "那當然。"
10012010-32 = "那當然。"
10012010-33 = "而且，因為是在稍微有點遠的地方……所以需要有負責領隊的大人呢。"
10012010-34 = "老師也不會就這樣目送可愛的學生們自己去吧？"
10012010-35 = "老，老師……你不會放我們自己去吧？"
10012010-36 = "[s5] 「當然不會。請多關照囉。」\n[s6] 「當然不會！人生果然世事難料呢！」"
10012010-37 = "好！那就這麼決定囉☆"
10012010-38 = "好！那就這麼決定囉☆"
10012010-39 = "嗯。馬上準備吧。"
10012010-40 = "我也去整備直升機！"
10012010-47 = "唔嘿～大家都很忙呢～"
10012010-48 = "真是青春啊，青春。#n對大叔來說有點太耀眼了……"
10012010-49 = "嗯？啊啊，我也很期待唷。"
10012010-50 = "畢竟再怎麼說都是渡假勝地啊。"
10012010-51 = "阿拜多斯的陽光可是很強烈的～#n居然能在跟這裡一樣「溫暖的陽光下」懶洋洋的，豈不是棒極了嗎？"
10012010-52 = "只要活著還會發生這種事呢……"
10012010-53 = "真的是……"
10012010-55 = "人生真的是，世事難料呢……"
10012010-62 = "？"

[translation]
10012010-1 = "ตอนที่ 1;อนาคตที่ไม่อาจล่วงรู้ได้จริงๆ"
10012010-2 = "...... ค่ะ และนี่คือสถานการณ์ของพวกเราจนถึงเช้านี้ค่ะ"
10012010-3 = "มีแต่เรื่องดีๆ เข้ามาติดๆ กันแบบนี้ บอกตรงๆ เลยว่าฉันกลับกังวลค่ะว่าจะเป็นสัญญาณของอะไร#nที่ไม่ดีหรือเปล่า..."
10012010-4 = "[s1] \"นั่นสินะ... มีเรื่องดีๆ เกิดขึ้นเรื่อยๆ เลย\"\n[s2] \"ทั้งได้เฮลิคอปเตอร์ ทั้งถูกรางวัลที่ 1 นี่มันโชคดีที่สุดในสามโลก!\""
10012010-5 = "นะ... นั่นสิคะ... ขนาดตัวฉันเองก็ยัง... ไม่อยากจะเชื่อเลยค่ะ"
10012010-6 = "นะ... นั่นสิคะ... ขนาดตัวฉันเองก็ยัง... ไม่อยากจะเชื่อเลยค่ะ"
10012010-10 = "ก็นะ~ ชีวิตมันก็แบบนี้แหละ มันต้องมีวันแบบนี้บ้างสิน่า แต่ถึงยังไงลุงคนนี้ก็แอบตกใจอยู่นิดหน่อยนะ"
10012010-11 = "อื้อ! ที่ผ่านมาพวกเราเป็นคนดีและใช้ชีวิตอย่างขยันขันแข็ง ตอนนี้ก็เลยถึงเวลารับโชคจากเบื้องบน#nไงคะ! โชคดีสุดๆ ไปเลยละค่ะ สุดยอด~"
10012010-12 = "หืม...? ว่าไงคะคุณครู?"
10012010-13 = "อ๋อ... อยากรู้ว่าจะเชิญมาปาร์ตี้ฉลองโชคดีของพวกเราหรือเปล่าน่ะเหรอคะ?"
10012010-14 = "แน่นอนอยู่แล้วสิ ก็คุณครูเป็นคุณครูที่ปรึกษาคณะกรรมการแผนงานของเรานี่นา มีข้อมูลแบบนี้ก็ต้องบอกให้รู้สิ"
10012010-15 = "อืม... แต่ก็ไม่ใช่ว่าเราเชิญมาเพราะอยากบอกข้อมูลนี้อย่างเดียวหรอกนะ"
10012010-16 = "หืม? อยากรู้ว่ามีเรื่องอะไรอีกงั้นเหรอ? คือว่า..."
10012010-18 = "ความจริงแล้ว รางวัลที่เซริกะจังถูกรางวัลที่ 1 มาคือตั๋วใช้งานรีสอร์ตน่ะค่ะ อะฮ่ะฮ่า..."
10012010-22 = "กะ... ก็ใครจะไปรู้ล่ะ! เห็นว่าเป็น 'รางวัลที่ 1' ฉันก็เลยรีบวิ่งหน้าตั้งมาด้วยความดีใจไง!!"
10012010-23 = "ใจเย็นๆ ก่อนเซริกะจัง ยังไงมันก็เป็นเรื่องดีๆ แหละน่า~"
10012010-24 = "ลองคิดดูดีๆ สิ มันคือตั๋วใช้งานรีสอร์ตเชียวนะ พวกเราจะได้เพลิดเพลินกับความหรูหราแบบนี้#nสักครั้งเมื่อไรกัน?"
10012010-25 = "ใช่แล้วค่ะ! ไหนๆ ก็เป็นแบบนี้แล้ว พวกเราก็เลยตัดสินใจไปพักร้อนด้วยกันค่ะ!!"
10012010-26 = "ที่ผ่านมาเราเอาแต่ทำงานหนักเพื่อโรงเรียนนี่คะ? ต้องมีเวลาออกไปพักผ่อนแบบนี้สักครั้งสิคะ"
10012010-28 = "ค่ะ... พวกเราหารือกันจนได้ข้อสรุป แล้วก็ติดต่อไปหาคุณครูนี่ละค่ะ"
10012010-29 = "อืม... คือว่า... แบบว่า... ถ้าคุณครูไม่ติดอะไรละก็..."
10012010-30 = "[s3] \"จะพาครูไปด้วยเหรอ?\"\n[s4] \"แบบนี้ครูเองก็จะได้ไปเที่ยวบ้างแล้วสินะ\""
10012010-31 = "แน่นอนอยู่แล้ว"
10012010-32 = "ใช่แล้วละ"
10012010-33 = "อีกอย่างรีสอร์ตก็อยู่ไกลมาก... ถ้ามีผู้ใหญ่ไปด้วยพวกเราคงอุ่นใจ"
10012010-34 = "ครู~ จะไม่ปล่อยให้นักเรียนที่น่ารักแบบนี้ขึ้นเฮลิคอปเตอร์ไปเที่ยวกันเองใช่ไหม? นี่คือโอกาสดีที่จะได้พักเลยนะ?"
10012010-35 = "... ปะ... ไปได้มั้ย...? คุณครู...? หืม? ไปได้มั้ย...?"
10012010-36 = "[s5] \"แน่นอนอยู่แล้ว ขอบใจที่ชวนนะ\"\n[s6] \"โชคดีจริงๆ! อนาคตนี่ล่วงรู้ไม่ได้จริงๆ แฮะ!\""
10012010-37 = "ว้าวว-! ดีเลยค่ะ! ถ้างั้นก็ตกลงตามนี้น้า-☆"
10012010-38 = "ว้าวว-! ดีเลยค่ะ! ถ้างั้นก็ตกลงตามนี้น้า-☆"
10012010-39 = "อืม งั้นฉันจะเตรียมตัวเลย"
10012010-40 = "ฉะ... ฉันก็จะไปเช็กเฮลิคอปเตอร์ดูค่ะ!"
10012010-47 = "แหะๆ... ทุกคนวิ่งวุ่นกันเลยแฮะ หรือว่าจะไปเตรียมชุดว่ายน้ำกัน~? วัยรุ่นพวกนี้ก็นะ เฮ้อ~"
10012010-48 = "หืม? ฉันเหรอ? ฉันดูตื่นเต้นกว่าที่คิดงั้นเหรอ?"
10012010-49 = "... ครูคิดว่าฉันจะขี้เกียจที่ต้องไปที่ไกลๆ เหรอ?"
10012010-50 = "... พูดอะไรของครูน่ะ? มันเป็นสถานที่พักผ่อนหย่อนใจเลยนะ"
10012010-51 = "ที่ที่ให้เรานอนใต้ 'แสงแดดที่อบอุ่น' ได้จนสันหลังยาวเลย ไม่ใช่ 'แสงแดดที่แผดเผา' เหมือนกับที่นี่ เพราะงั้นใครจะไปปฏิเสธได้ล่ะ"
10012010-52 = "สุดยอดไปเลย... ใครจะไปคิดล่ะว่าชาตินี้จะได้มีวันแบบนี้กับเค้าด้วย แหะๆๆ..."
10012010-53 = "ก็อย่างที่เค้าว่าละเนอะ..."
10012010-55 = "อนาคตของเรานี่ไม่อาจล่วงรู้ได้เลยจริงๆ..."
10012010-62 = "?"

10012010-4 = "[s1] \"과연……. 연달아 많은 일이 있었네.\"\n[s2] \"헬기에 1등 당첨이라니. 완전 행운이잖아!\""
10012010-5 = "3;아야네;08;그, 그러게요. 말씀드리면서도 스스로 좀……. 당황스러운 느낌이…….\n#3;em;[땀]\n#3;stiff"

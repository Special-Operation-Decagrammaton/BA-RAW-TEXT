10012010-24 = "1;호시노;14;생각해 봐. 리조트 사용권이라니, 우리가 언제 한 번 이런 호사를 누려 보겠어?"
10012010-25 = "5;노노미;03;맞아요! 이왕 이렇게 됐으니, 헬기도 있겠다 다 같이 리조트로 휴가를 다녀오기로 한 거죠!!\n#5;em;[반응]\n#5;hophop\n#5;al"

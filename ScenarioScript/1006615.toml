[translation]
1006615-1 = "#title;메이드 용사의 장비"
1006615-2 = "3;아리스 메이드;07;그리하여! 오늘은 선생님의 길드 하우스를 청소하러 온 것입니다!\n#3;a\n#3;em;[반짝]"
1006615-3 = "[s] \"기, 길드……?\""
1006615-4 = "3;아리스 메이드;00;네. 아리스, 알고 있습니다. 길드는 모험가에게 퀘스트를 주고, 보상을 지급하며, 파티를 모으는 데에도 도움을 줍니다!"
1006615-5 = "3;아리스 메이드;05;그리고 그 사실을 게시판에 내걸어서 사람들에게 알리기도 하고요! 그러니까 이곳은 길드하우스나 마찬가지인 것입니다!\n#3;jump\n#3;em;[!]"
1006615-6 = "3;아리스 메이드;04;앗, 그렇지만 길드에는 예쁜 언니들이 의뢰를 접수해야 하는데……. 어떡하죠, 선생님?"
1006615-7 = "#st;[0,0];instant;1;"
1006615-8 = "#clearST"
1006615-9 = "3;아리스 메이드;04\n#3;em;…\n#wait;2500"
1006615-10 = "3;아리스 메이드;03;아, 방법이 있습니다! 아리스가 대신 접수원이 되면 됩니다!\n#3;em;[반응]"
1006615-11 = "3;아리스 메이드;01;그렇지만 다시 생각해 보니…… 지금의 아리스는 견습 메이드 용사이기에, 함부로 직업을 바꿀 수 없는 겁니다……."
1006615-12 = "3;아리스 메이드;08;끄앙! 어떻게 하죠, 선생님? 아리스는 도움이 필요합니다!\n#3;shake\n#3;em;[속상함]"
1006615-13 = "[s] \"일단 청소를 마저 하자…….\""
1006615-14 = "3;아리스 메이드;09;…….\n#3;em;…"
1006615-15 = "3;아리스 메이드;03;그렇네요! 아리스는 청소를 도와드리러 왔으니까요.\n#3;jump"
1006615-16 = "3;아리스 메이드;05;그러면 선생님. 함께 청소를 하고, 경험치를 얻은 다음, 숨겨진 아이템을 찾아 레벨 업을 하는 겁니다!"
1006615-17 = "3;아리스 메이드;03;숨겨진 아이템 같은 건 없을 거라고요? 그렇지 않습니다. 하나는 알고 둘은 모르시는군요, 선생님!"
1006615-18 = "3;아리스 메이드;07;하지만 아리스는 알고 있습니다. 부실을 청소하다 보면, 숨겨진 아이템을 획득하게 됩니다! 보통은 잃어버렸던 모모이와 미도리의 게임입니다!\n#3;em;[음표]"
1006615-19 = "3;아리스 메이드;00;그리고 가끔씩은 유즈가 발견되기도 합니다!"
1006615-20 = "#st;[0,0];instant;1;"

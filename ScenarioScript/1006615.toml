[translation]
1006615-1 = "Hero Maid's Equipment"
1006615-2 = "Hello! I have come today to clean your Guild House!"
1006615-3 = "[s] \"G-Guild...?\""
1006615-4 = "Guilds give quests to adventurers, distribute rewards, and assist in gathering parties."
1006615-5 = "They also provide information via bulletin board. By that description, this is a Guild House."
1006615-6 = "However, a Guild House must include a pleasant female receptionist, and I see none here. How should we resolve that discrepancy, Sensei?"
1006615-10 = "Ah, I know. I will change my class to \"receptionist.\""
1006615-11 = "Although...being only an apprentice Hero Maid, I may not have unlocked the class change option yet."
1006615-12 = "Mmm! Sensei, I request your help."
1006615-13 = "[s] \"Let's finish cleaning first...\""
1006615-14 = "..."
1006615-15 = "Of course. I should finish my current quest before starting a new one."
1006615-16 = "Very well, Sensei! We will clean together, uncover hidden items, and earn EXP in the process."
1006615-17 = "You say there are no hidden items? Untrue. You are knowledgeable, Sensei, but not omniscient."
1006615-18 = "We will almost certainly find hidden items in the club room. Momoi and Midori's lost games, most likely."
1006615-19 = "We may even find Yuzu!"
1006615-24 = "I made a note to teach the Game Development Department kids the importance of tidying up."
1006615-38 = "Voila! The Guild House is now clean. But..."
1006615-43 = "Is that a large snail? ...No, it is a pile of laundry. I have learned that laundry is essential to cleaning."
1006615-44 = "From whom did I learn that? Neru, of course! She can be quite intimidating, but... "
1006615-45 = "...there is kindness underneath it all. Come, Sensei. Where is the laundry machine?"
1006615-46 = "There...is no laundry machine?"
1006615-47 = "Oh, no, Sensei! Have you never washed those clothes? That is...unideal, to say the least. "
1006615-48 = "Your armor's durability decreases with time. Left unrepaired, it can fall apart entirely."
1006615-49 = "[s] \"No, no. I just take care of it differently...\""
1006615-50 = "How so?"
1006615-53 = "Ah. You commission a laundry quest from the local laun-dro-mat. That is acceptable, and reassuring."
1006615-54 = "Is something amiss, Sensei? ...My maid headband?"
1006615-55 = "Oh, my... Its durability has decreased significantly. The Guild House cleaning quest must have taken its toll. "
1006615-56 = "[s] \"Let's wash the headband too.\""
1006615-57 = "..."
1006615-58 = "As you say, Sensei."
1006615-59 = "In the meantime, I happened to bring a spare."
1006615-65 = "[ns] \"Wow, you carry around a spare maid headband?\""
1006615-67 = "Of course. This is one of the three symbols of a Hero Maid. I could never stand to be without one."
1006615-68 = "[s] \"The three symbols of a Hero Maid...? Tell me more about that.\""
1006615-69 = "Were you not aware? Then let the tutorial begin."
1006615-70 = "Three key items prove that one is a Hero Maid. A mop, a maid outfit, and a maid headband."
1006615-71 = "And the headband is the most important of them all!"
1006615-72 = "Why? Because it serves as protective gear for the head."
1006615-73 = "And the head is essential in many respects. Taking damage to the head can impose severe status ailments. Further, a cluttered mind imposes penalties on all tasks."
1006615-74 = "As such, this headband allows me to refocus my mind as a Hero Maid!"
1006615-78 = "[ns] \"(What exactly is a Hero Maid...?)\""
1006615-79 = "You understand. One must have the proper focus."
1006615-80 = "I cannot perceive this focus with my eyes or hands, but without it, I would have no sense of identity or purpose."
1006615-81 = "So you see, I could not be who I am, or do what I do, without this headband."
1006615-82 = "[s] \"But aren't you a lot better compared to before?\""
1006615-83 = "Do you truly think so? Many thanks, Sensei! It boosts my morale to hear you say that."
1006615-84 = "However...I still I have a long way to go."
1006615-89 = "*whir*"
1006615-90 = "I heard the sound of washers and dryers running in the laundromat."
1006615-92 = "I have many skills to master as a maid. My cleaning has leveled up, but my laundry and cooking stats remain low."
1006615-93 = "Even now, a simple machine can perform laundry quests better than I can."
1006615-94 = "[s] \"It's okay, it's okay...\""
1006615-95 = "I am hardly worthy to be called \"Hero.\" "
1006615-96 = "I have a wish for the world, Sensei. I dream of a world where all are happy, a world without sadness or suffering."
1006615-97 = "Of course...it would be quite difficult to achieve that dream."
1006615-98 = "As a mere apprentice, such an achievement is beyond my reach, but at the very least, I wish to protect those nearest to me."
1006615-99 = "Yes, that I can achieve. And what I need to achieve it is..."
1006615-100 = "...well-developed strength and proper focus. "
1006615-101 = "Therefore, I have no choice but to march on."
1006615-102 = "May my Hero Maid equipment see me through!"
1006615-106 = "[ns] \"(I still don't know what a Hero Maid is...)\""
1006615-107 = "Sensei, I believe real magic exists in this world."
1006615-109 = "I believe it's found in joy..."
1006615-114 = "...and in courage."
1006615-119 = "I believe that true courage is understanding the world from the perspective of those who are struggling."
1006615-124 = "That is what makes games enjoyable, I think. They capture the beauty of that perspective, and offer a taste of that understanding."
1006615-125 = "A desert is all the more beautiful for the hidden oasis within. ...Or so I read in a fairy tale."
1006615-130 = "In any case, I wish to learn more of the world, one step at a time."
1006615-135 = "Of course, I understand that not everything in the world will be beautiful or pleasant. I have come to accept that. That is why I sometimes feel afraid."
1006615-140 = "However, courage can mean pressing on in the face of challenges."
1006615-142 = "[ns] \"...Even then, you might still be afraid. If that fear does come, what will you do?\""
1006615-143 = "..."
1006615-144 = "...If that fear comes, I will seek you out. "
1006615-146 = "You are the one to turn to in such times, Sensei. You are the...mascot of the party."
1006615-147 = "You may not be a front-line fighter, but your presence in the party lifts everyone's spirits."
1006615-148 = "So, Sensei..."
1006615-149 = "...will you continue to be part of my adventures?"
1006615-150 = "[s1] \"What are mascots for?\"\n[s2] \"I'll do my best and fulfill my role.\""
1006615-153 = "Ha! Just as I expected! I truly appreciate having a Sensei like you."
1006615-158 = "The dryer dinged and slowed to a halt."
1006615-160 = "Ah, laundry quest complete. Maid headband's durability restored."
1006615-165 = "Well then, let us seek out our next quest, together as Sensei and Hero Maid!"
1006615-169 = "[ns] \"(So, a Hero Maid is... Um...)\""
1006615-173 = "[ns] \"(Actually, it seems like it doesn't matter anymore.)\""
1006615-175 = "Hand in hand, we strolled back, taking in the sights along the way."

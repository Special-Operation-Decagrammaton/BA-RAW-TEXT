1006615-105 = "#wait;2500"
1006615-106 = "[ns] (메이드 용사란 건, 도대체 무엇일까…….)"
1006615-107 = "3;아리스 메이드;00;선생님. 아리스는 세상에 마법이 없다고 생각하지 않습니다. 네. 마법은 있습니다."

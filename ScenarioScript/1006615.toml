[translation]
1006615-1 = "女僕勇者的裝備"
1006615-2 = "所以！今天要來打掃老師的公會小屋！"
1006615-3 = "[s]「公，公會……？」"
1006615-4 = "沒錯，愛麗絲知道。#n公會是提供冒險家任務、獎勵和協助組成隊伍的地方！"
1006615-5 = "而且還會把那些情報掛在布告欄通知大家！#n所以這裡就和公會小屋一樣！"
1006615-6 = "啊，但是公會要有漂亮姊姊來受理委託……怎麼辦，老師？"
1006615-10 = "啊，有辦法了！只要愛麗絲代替他們就行了！"
1006615-11 = "可是再仔細想想……現在的愛麗絲是見習女僕勇者，不能隨便轉職……"
1006615-12 = "哇啊！怎麼辦，老師？愛麗絲需要幫忙！"
1006615-13 = "[s]「總之先來打掃吧……」"
1006615-14 = "……"
1006615-15 = "說的也是！愛麗絲是來幫忙打掃的。"
1006615-16 = "那麼老師，一起打掃獲得經驗值，尋找隱藏道具來升級吧！"
1006615-17 = "沒有隱藏道具？怎麼會呢。#n看來老師只知其一，不知其二哦！"
1006615-18 = "愛麗絲知道，只要打掃部室就會獲得隱藏道具！通常是桃井和綠弄丟的遊戲！"
1006615-19 = "有時候還會發現柚子哦！"
1006615-24 = "（看來有必要告訴遊戲開發部整理整頓的重要性……）"
1006615-38 = "哇！公會小屋變乾淨了！可是……"
1006615-43 = "啊，這是史萊魯……不對，是要洗的衣物吧？#n愛麗絲有學過，打掃結束後洗衣服也很重要！"
1006615-44 = "是跟誰學的？那當然是寧瑠前輩囉！#n雖然寧瑠前輩還是很可怕……"
1006615-45 = "但其實他真的很親切哦！#n那麼老師，一起去把要洗的衣物洗乾淨吧。洗衣機在哪裡？"
1006615-46 = "咦？沒有那種東西……？"
1006615-47 = "這，這樣不行，老師！#n老師該不會連洗都沒洗就繼續穿了吧？那是不好的。"
1006615-48 = "如果不把耐久度下降的鎧甲修好，可能會永遠毀損的哦……"
1006615-49 = "[s]「別擔心別擔心，老師我自有妙計……」"
1006615-50 = "咦……？"
1006615-53 = "原來如此！是付費委託自助洗衣店進行洗滌任務啊。#n這樣愛麗絲就放心了！"
1006615-54 = "怎麼了嗎，老師？#n髮帶？是指愛麗絲的女僕喀秋莎嗎？"
1006615-55 = "哦哦……真的髒了耶。#n嗚嗚……可能是在打掃公會小屋的時候弄髒了。"
1006615-56 = "[s]「既然這樣就一起洗一洗吧。」"
1006615-57 = "……"
1006615-58 = "知道了，老師。那就拜託了。"
1006615-59 = "因為愛麗絲還有備用的女僕喀秋莎！"
1006615-65 = "[ns]「咦，你隨身帶著備用的女僕喀秋莎嗎？」"
1006615-67 = "是！因為這是女僕勇者的三大證明之一。#n隨身帶著備用品也是理所當然的！"
1006615-68 = "[s]「女僕勇者的三大證明究竟是……」"
1006615-69 = "咦？老師不知道嗎？#n那就讓愛麗絲來告訴你吧。"
1006615-70 = "拖把、女僕裝、女僕喀秋莎……這些就是能證明自己是女僕勇者的重要物品。"
1006615-71 = "其中女僕喀秋莎是最重要的！"
1006615-72 = "為什麼最重要？#n因為這是保護頭部的道具！"
1006615-73 = "頭是很重要的……無論是肉體還是精神上都是如此。#n要是頭部受傷可能會很嚴重，而且如果頭腦混亂的話，連該做的事都會做不好。"
1006615-74 = "所以愛麗絲每當繫上女僕喀秋莎的時候，都會做好身為女僕勇者的覺悟。"
1006615-78 = "[ns] （女僕勇者究竟是什麼呢……）"
1006615-79 = "嗯……心態是很重要的。"
1006615-80 = "雖然眼睛看不見，手也碰不到……但如果沒有它，愛麗絲就不知道自己是什麼了。"
1006615-81 = "所以對愛麗絲來說，這條能協助自己調整心態的女僕喀秋莎，是非常重要的裝備。"
1006615-82 = "[s]「但是和之前相比，不是已經進步很多了嗎？」"
1006615-83 = "看起來有進步了嗎？#n謝謝你，愛麗絲很高興能聽見老師這麼說。"
1006615-84 = "但是……還差得很遠也是事實。"
1006615-89 = "（嗡嗡嗡……）"
1006615-90 = "（洗衣店裡充斥著洗衣機運轉的聲音）"
1006615-92 = "女僕的工作做得還是不完美。#n雖然打掃稍微有進步，但洗衣服和做料理都還不夠熟練。"
1006615-93 = "就連現在，也在洗衣服方面輸給了這台自助洗衣機……唔！"
1006615-94 = "[s]「沒事，沒事……」"
1006615-95 = "至於勇者方面則更是不完美。"
1006615-96 = "老師。愛麗絲希望世界上所有人都能獲得幸福，希望沒有任何人傷心難過。"
1006615-97 = "當然……這應該很困難吧。#n這是非常難達成的任務，也是一項偉大的成就。"
1006615-98 = "因為愛麗絲目前只是見習勇者，無法達成這種豐功偉業……#n但愛麗絲還是希望至少能保護身旁的所有人。"
1006615-99 = "愛麗絲希望能這麼做。為了達成這個目標……"
1006615-100 = "除了強大的力量之外，良好的心態也是必須的。"
1006615-101 = "沒錯，所以愛麗絲需要更加努力。"
1006615-102 = "不過既然現在穿著女僕裝，愛麗絲就也是一名女僕勇者！"
1006615-106 = "[ns] （所以說女僕勇者究竟是……）"
1006615-107 = "老師。愛麗絲不認為世界上沒有魔法。#n沒錯，魔法是存在的。"
1006615-109 = "愛麗絲認為魔法會讓人幸福。"
1006615-114 = "同時，世界也需要勇氣。"
1006615-119 = "愛麗絲所認為的勇氣，是和辛苦的人站在同一陣線望向世界。"
1006615-124 = "遊戲之所以好玩，是因為其中充滿了這個世界的美好。"
1006615-125 = "就像沙漠之所以美麗，是因為某個地方隱藏著泉水一樣。#n啊，這是愛麗絲在童話書上看到的！"
1006615-130 = "老師，愛麗絲想一步步地前進，更加瞭解這個世界。"
1006615-135 = "當然愛麗絲也明白……世界並不是只有美好的事。#n因此……有時候也會覺得有點害怕。"
1006615-140 = "但是愛麗絲認為──不因此退縮也是另一種意義的勇氣。"
1006615-142 = "[ns]「……如果還是覺得害怕的話，你會怎麼做呢？」"
1006615-143 = "……"
1006615-144 = "那個時候，愛麗絲會去找老師。"
1006615-146 = "因為老師就是這樣的人。因為老師是隊伍的吉祥物。"
1006615-147 = "雖然無法直接參與戰鬥，但只要待在隊伍中就能發揮激勵大家的作用。"
1006615-148 = "所以，老師。"
1006615-149 = "你之後還會繼續陪愛麗絲一起冒險嗎？"
1006615-150 = "[s1]「畢竟我是吉祥物嘛。」\n[s2] 「當然要盡自己最大的努力囉。」"
1006615-153 = "哇！不愧是老師！愛麗絲最喜歡這樣的老師了！"
1006615-158 = "（就在這時，正好響起了衣服清洗完畢的提示音）"
1006615-160 = "啊，衣服好像洗好了！女僕喀秋莎……也變得非常乾淨！"
1006615-165 = "那麼老師，再次和見習女僕勇者愛麗絲一起去冒險吧！"
1006615-169 = "[ns] （到頭來女僕勇者究竟……）"
1006615-173 = "[ns] （算了，是什麼都無所謂吧……）"
1006615-175 = "（之後和愛麗絲手牽手，看著街上的風景悠閒地回去了）"

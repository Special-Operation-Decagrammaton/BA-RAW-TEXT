1006615-41 = "#wait;1000"
1006615-42 = "3;아리스 메이드;02\n#3;em;[반응]\n#wait;1500"
1006615-43 = "3;아리스 메이드;00;아, 이것은 스네일…… 이 아니라, 세탁물이군요? 네. 청소의 마무리에는 세탁도 중요하다고 배웠습니다!"
1006615-44 = "3;아리스 메이드;05;누구에게 배웠냐고요? 그야 네루 선배입니다! 네루 선배는 여전히 무섭지만……. "
1006615-45 = "3;아리스 메이드;07;그래도, 알고 보면 정말 친절한 분이니까요! 그러면 선생님. 어서 이 세탁물을 깨끗하게 만들러 가죠. 세탁기는 어디입니까?"
1006615-46 = "3;아리스 메이드;02;네? 그런 건 없다고요……?\n#3;em;[?]"
1006615-47 = "3;아리스 메이드;04;아, 안 됩니다. 선생님! 설마 세탁도 하지 않고 옷을 입고 계시는 건가요? 그건 좋지 않습니다. \n#3;stiff"
1006615-48 = "3;아리스 메이드;09;내구도가 떨어진 갑옷을 수리하지 않으면, 영영 파괴되어 버릴지도 모릅니다……."
1006615-49 = "[s] \"아니야, 아니야. 괜찮아. 방법이 있어…….\""
1006615-50 = "3;아리스 메이드;02;무엇인가요……?\n#3;em;[?]"
1006615-51 = "#all;hide"
1006615-52 = "3;아리스 메이드;00\n#3;a\n#wait;1000"
1006615-53 = "3;아리스 메이드;07;그렇군요! 코인 세탁소에 요금을 지불하고, 세탁 퀘스트를 의뢰하는 것이었군요. 이거라면 아리스도 안심입니다!\n#3;jump"
1006615-54 = "3;아리스 메이드;02;어라, 왜 그러시나요. 선생님? 네? 아리스의 메이드 머리띠 말인가요?"
1006615-55 = "3;아리스 메이드;04;어어…… 정말로 더럽혀져 있습니다. 우우…… 길드 하우스를 청소하는 도중에 더럽혀졌나 봅니다. \n#3;stiff\n#3;em;[땀]"
1006615-56 = "[s] \"그러면 그 머리띠도 같이 세탁하자.\""
1006615-57 = "3;아리스 메이드;09;…….\n#3;em;…"
1006615-58 = "3;아리스 메이드;05;네. 알겠습니다. 선생님. 그러면 부탁드리겠습니다."
1006615-59 = "3;아리스 메이드;05;아리스에게는, 여분의 메이드 머리띠가 있으니까요!\n#3;jump\n#3;em;[!]"
1006615-60 = "#st;[0,0];instant;1;"
1006615-61 = "#clearST"
1006615-62 = "3;아리스 메이드;05\n#3;m5\n#wait;1000"
1006615-63 = "3;아리스 메이드;05\n#3;greeting\n#wait;500"
1006615-64 = "#wait;3000"
1006615-65 = "[ns] \"어라, 메이드 머리띠 여분을 가지고 다니는 거야?\""
1006615-66 = "3;아리스 메이드;05\n#3;m3\n#wait;1000"
1006615-67 = "3;아리스 메이드;07;네! 이것은 메이드 용사의 3대 징표 중 하나이니까요. 여분을 가지고 다니는 것은 당연합니다!\n#3;jump"
1006615-68 = "[s] \"메이드 용사의 3대 징표란, 과연 무엇인가…….\""
1006615-69 = "3;아리스 메이드;02;어라? 모르고 계셨나요. 선생님? 어쩔 수 없네요. 아리스가 가르쳐 드리겠습니다."
1006615-70 = "3;아리스 메이드;00;그것은 대걸레와 메이드복, 메이드 머리띠로 구성된, 메이드 용사임을 증거하는 중요한 물건들입니다."
1006615-71 = "3;아리스 메이드;03;그리고 그중에서도 메이드 머리띠는 가장 중요한 징표입니다!\n#3;jump\n#3;em;[!]"
1006615-72 = "3;아리스 메이드;02;어째서냐고요? 그것도 당연한 것입니다. 머리를 보호해 주는 무구이기 때문입니다!"
1006615-73 = "3;아리스 메이드;00;머리는 중요합니다……. 육체적으로도, 정신적으로도요. 머리를 다치면 큰일이 생길 수도 있고, 머리가 복잡해지면 할 일을 제대로 할 수 없게 되니까요.\n#3;em;…"
1006615-74 = "3;아리스 메이드;05;그래서 아리스는, 메이드 머리띠를 착용할 때마다, 메이드 용사로서의 마음가짐을 다잡곤 합니다!"
1006615-75 = "#st;[0,0];instant;1;"
1006615-76 = "#clearST"
1006615-77 = "#wait;2500"
1006615-78 = "[ns] (메이드 용사란 무엇일까…….)"
1006615-79 = "3;아리스 메이드;02;네……. 그렇네요. 마음가짐이라는 건, 중요한 것 같습니다."
1006615-80 = "3;아리스 메이드;99;눈에 보이지 않고, 손으로 잡을 수도 없지만, 그게 없으면 아리스는 자신이 무엇인지 알 수 없게 되니까요."
1006615-81 = "3;아리스 메이드;00;그러니까 그 마음가짐을 매번 새롭게 다잡아 주는 이 메이드 머리띠야말로, 아리스에게는 정말 중요한 장비입니다."
1006615-82 = "[s] \"하지만 예전에 비해서는, 많이 나아지지 않았니?\""
1006615-83 = "3;아리스 메이드;00;그렇게 보아주시는 건가요? 감사합니다. 선생님. 아리스는 선생님의 그 말로 충분히 기쁩니다.\n#3;greeting"
1006615-84 = "3;아리스 메이드;01;그렇지만…… 아직 먼 것 같다고 느끼는 것도, 사실이기는 합니다."
1006615-85 = "#all;hide"
1006615-86 = "#wait;3500"
1006615-87 = "#wait;1000"
1006615-88 = "#wait;3500"
1006615-89 = "#na;……부우우웅-."
1006615-90 = "#na;(세탁소 안에서 세탁기 돌아가는 소리가 들려오고 있었다.)"
1006615-91 = "3;아리스 메이드;01\n#3;a"
1006615-92 = "3;아리스 메이드;09;메이드 업무는, 역시 아직 모자랍니다. 청소는 조금 나아졌지만, 세탁이나 요리는 미숙합니다.\n#3;em;…"
1006615-93 = "3;아리스 메이드;08;당장 세탁만 해도, 지금 이 코인 세탁기에게 지고 있습니다. 끄앙!\n#3;jump\n#3;em;[속상함]"
1006615-94 = "[s] \"괜찮으니까, 괜찮으니까…….\""
1006615-95 = "3;아리스 메이드;09;그리고 용사로서는, 더욱 모자랍니다. "
1006615-96 = "3;아리스 메이드;00;선생님. 그저 바라는 것만 말씀드리자면, 아리스는 세상 모두가 행복했으면 합니다. 누구도 슬퍼하지 않고, 괴로워하지 않았으면 합니다."
1006615-97 = "3;아리스 메이드;09;물론 그건…… 아주 어려운 일이겠지요. 좀처럼 이루기 힘든 과업입니다. 위대한 업적일 겁니다."
1006615-98 = "3;아리스 메이드;00;아리스는 아직 견습이어서, 그런 위업을 당장 이룰 수는 없겠지만……. 적어도, 아리스의 눈에 들어오는 모두만이라도, 어떻게든 지키고 싶습니다."
1006615-99 = "3;아리스 메이드;05;네. 아리스는 그렇게 하고 싶습니다. 그리고 그렇게 하기 위해 필요한 것은……."
1006615-100 = "3;아리스 메이드;05;강한 힘뿐만이 아니라, 마음가짐 역시 필수적이라고 생각합니다. "
1006615-101 = "3;아리스 메이드;03;네. 그러니까 아리스는, 더욱 정진할 수밖에 없습니다."
1006615-102 = "3;아리스 메이드;07;하지만 지금은 메이드복을 입고 있으니까, 아리스는 메이드 용사인 것이기도 하죠!\n#3;jump"

1006615-117 = "#all;hide"
1006615-118 = "#wait;1500"
1006615-119 = "#na;아리스 메이드;아리스가 생각하는 용기란, 힘들어하는 사람과 같은 자리에서 세상을 바라보는 것입니다."
1006615-120 = "#st;[0,0];instant;1;"
1006615-121 = "#clearST"
1006615-122 = "#all;hide"
1006615-123 = "#wait;1500"
1006615-124 = "#na;아리스 메이드;게임이 재미있는 이유는, 그것이 이 세상의 아름다움을 담고 있기 때문입니다."
1006615-125 = "#na;아리스 메이드;사막이 아름다운 이유는, 그 어딘가에 샘이 숨겨져 있기 때문일 거고요. 아, 이건 동화책에서 읽은 것입니다!"
1006615-126 = "#st;[0,0];instant;1;"
1006615-127 = "#clearST"
1006615-128 = "#all;hide"
1006615-129 = "#wait;1500"
1006615-130 = "#na;아리스 메이드;선생님. 아리스는 한 걸음씩 나아가고 싶습니다. 세상을 더 알고 싶습니다."

13230-26 = "5;스오우;02;(안대 쨩……?) \n#5;em;[?]"
13230-27 = "5;스오우;99;그래. 타카나시 호시노. 그 말이 맞아. 여기는 수백 년 전에 학생회장들이 세운 유적지였다. 그것을 누군가가 전쟁 요새로 탈바꿈시킨 거야."
13230-28 = "#all;hide"
13230-29 = "#wait;500"
13230-30 = "3;네프티스 간부;09;……저도 담당자가 아니어서 잘 모릅니다만, 어디까지나 사막횡단철도사업이 먼저였고 <열차포> 계획은 그 이후에 추가된 것입니다!\n#3;a"
13230-31 = "3;네프티스 간부;09;채산성이라곤 찾아볼 수 없는 이 골칫덩이 사업을 한 번에 뒤바꿀 아이디어를 누군가가 학생회에 제공했던 거예요……!"
13230-32 = "5;노노미;04;네? 누가요? 누가 그런 짓을…….\n#5;em;[?]\n#5;al\n#3;m1"
13230-33 = "#all;hide"
13230-34 = "#wait;500"
13230-35 = "3;스오우;01;<아비도스 학생회>도, 네프티스도 모두 그 사람의 손아귀에서 놀아난 것에 지나지 않아.\n#3;a"
13230-36 = "1;호시노 HWS 모드 4;09;그건 진짜 흑막이 따로 있었다는 얘기야? 안대 쨩?\n#1;ar\n#3;m5"
13230-37 = "3;스오우;02;아니. 그 사람은 더 이상 흑막이라고 부를 수 없겠지. 지금은 졸업하고 키보토스에 없으니까.\n#3;em;[반응]"
13230-38 = "1;호시노 HWS 모드 4;07;……졸업했다고?"
13230-39 = "3;스오우;05;그래. 그자는 바로…… 2년 전 키보토스를 암흑으로 뒤덮었던 게헨나의 폭군 <뇌제>. "
13230-40 = "1;호시노 HWS 모드 4;05;……. 뇌제?\n#1;em;…"
13230-41 = "3;스오우;01;천재 전략가이자 발명가, 동시에 고도의 정치가였어. 총학생회장이 준비한 <에덴조약>도 사실 뇌제를 상대하기 위한 기책이었다는 설도 있지. "
13230-42 = "1;호시노 HWS 모드 4;10;들어본 적 없어. "
13230-43 = "3;스오우;99;……. 그렇군. 그 사람이 <사막횡단철도> 사업에 접근해서 이 사업을 전혀 다른 것으로 만들어버린 장본인이야."
13230-44 = "3;스오우;00;그 사람 때문에 단순한 물류 유통 사업이 순식간에 고도의 정치적 분쟁 요소가 되어버린 거지."
13230-45 = "1;호시노 HWS 모드 4;07;그 뇌제란 녀석은 어째서 그런 짓을 저지른 거야?\n#1;em;…"
13230-46 = "3;스오우;05;……그걸 알 수 없어. "
13230-47 = "3;스오우;02;…… 사실 뇌제가 어떤 생각을 하고 있는지는 그 시대에도 아무도 알지 못했어.\n#3;m3\n#1;dl"
13230-48 = "3;스오우;99;천재……라고 해야 할까, 괴짜라고 해야 할까……. 속을 알 수 없는 사람이었다고 해."
13230-49 = "3;스오우;01;아비도스에 접근한 것도 그냥 단순한 변덕이었을 수도 있고, 아니면 그저 심심풀이 유희였을 수도 있겠지. "
13230-50 = "3;스오우;02;어쨌든 뇌제는 이 <열차포> 사업이 중단된 이후에 다시는 아비도스에 관심을 두지 않았으니까.\n#3;em;[반응]"
13230-51 = "#all;hide"
13230-52 = "3;호시노 HWS 모드 4;00;……."
13230-53 = "3;스오우;05;뇌제는 결국 부하들에 의해 실각되어 그녀의 철권통치는 막을 내렸지만……. 그녀가 남긴 수많은 발명품들은 아직도 키보토스 곳곳에 남아 있다고 하지."
13230-54 = "3;스오우;01;하나같이 전부 키보토스를 위험에 빠트릴 위험한 물건들이니까. 탐내는 사람들이 아직 많거든. ……이 열차포처럼 말야."
13230-55 = "3;호시노 HWS 모드 4;08;아니, 안대 쨩. 옛날이야기는 아무래도 됐어. 이 아저씨는 별로 관심이 없거든?\n#3;em;[한숨]"

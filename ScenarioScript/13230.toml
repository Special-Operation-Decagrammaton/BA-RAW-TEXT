[translation]
13230-1 = "Episode 23;Valley of Student Council Presidents"
13230-3 = "...The Train Cannon Schemata."
13230-4 = "But why... "
13230-9 = "...Gehenna's emblem...?"
13230-12 = "And, this place..."
13230-17 = "It doesn't feel like a memorial at all. More like.."
13230-19 = "...Like a war fortress?"
13230-25 = "...Eyepatch."
13230-26 = "(\"Eyepatch\"...?) "
13230-27 = "You are correct, Takanashi Hoshino. This place was once a historical relic, left by student council presidents from hundreds of years ago. But someone repurposed it into a war fortress."
13230-30 = "I was naturally not a higher-up, so I may not know all the details, but I can say with confidence that building the Trans-Desert Railway was their original intent. The plan for the Train Cannon was a later addition."
13230-31 = "Someone suggested the cannon to the student council, as an attempt to salvage the troublesome and unprofitable project."
13230-32 = "What? Who? Who would do that...?"
13230-35 = "The person who did this manipulated both the Abydos Student Council and Nephthys."
13230-36 = "Are you saying there was some kind of a mastermind behind all this, Eyepatch?"
13230-37 = "No, we can no longer call her the mastermind. She has long since graduated and left Kivotos."
13230-38 = "...Graduated?"
13230-39 = "Yes... She was Gehenna's Tyrant Emperor, the one who covered Kivotos in darkness two years ago. "
13230-40 = "...Tyrant Emperor?"
13230-41 = "She was a genius strategist and inventor, but also a skilled politician. There's even a theory that the Eden Treaty, initiated by the General Student Council President, was a scheme to counter the Tyrant Emperor. "
13230-42 = "I've never heard of her before. "
13230-43 = "...It was she who involved herself with the Trans-Desert Railway, steering its course on an entirely different path."
13230-44 = "Because of her, a simple logistics and distribution project quickly became a point of extreme political conflict."
13230-45 = "Why would this Tyrant Emperor involve herself?"
13230-46 = "...No one knows. "
13230-47 = "...Even at the time, no one could understand the Tyrant Emperor's true intent."
13230-48 = "Whether she was a genius or simply eccentric...no one knew what she was thinking."
13230-49 = "Perhaps approaching Abydos was a game to stave off her boredom, a mere whim. "
13230-50 = "Regardless, her interest in Abydos faded quickly after the Train Cannon project was halted."
13230-52 = "..."
13230-53 = "Her iron-fisted rule eventually ended in a violent coup led by her subordinates, but...it's said that many of her inventions remain scattered throughout Kivotos."
13230-54 = "Many covet the power they could wield over Kivotos with just one of those inventions. Such as the Train Cannon."
13230-55 = "This old-timer really, really doesn't care about your story time, Eyepatch."
13230-56 = "(\"Old-timer\"...?) "
13230-57 = "That being said, why did you want me here? Is the Tyrant Emperor connected to Yume in some way?"
13230-58 = "...No, not at all."
13230-59 = "...The contract, then? Did she have something to do with Yume's contract?"
13230-60 = "... "
13230-61 = "Or are you a Gehenna student, looking to recover the Tyrant Emperor's invention?"
13230-62 = "...Who are you? What are you plotting?"
13230-63 = "... "
13230-64 = "*sigh* Forget it. I'll get to the point. "
13230-68 = "I don't have any kind of interest in Gehenna or the Tyrant Emperor or whatever else. I'm here to destroy that weapon behind you."
13230-69 = "The existence of that abomination spits on Yume's last wishes. I won't let it be. "
13230-70 = "Never. No matter what."
13230-72 = "...Do as you wish, Hoshino."
13230-73 = "But you'll have to take this card from me first."
13230-79 = "Nonomi's gold card...?"
13230-80 = "I can use this to activate the Train Cannon. And you'll need it to destroy the weapon."
13230-89 = "Defeat me, and claim this card. "
13230-90 = "My true target has always been you, Takanashi Hoshino. "
13230-91 = "...You. Who are you?"
13230-92 = "Ah, ah. Long have I wondered that, as well."
13230-93 = "A wanderer without a school, Kaiser PMC mercenary, Nephthys errand girl, Highlander Academy's overseer, double agent for the private equity fund..."
13230-94 = "...But I know exactly what I am now."
13230-98 = "I am your enemy, Takanashi Hoshino. You, the rightful heir to Abydos' terror and madness."
13230-99 = "But that terror is the very source of your strength. So I have no choice but to oppose you."
13230-104 = "What do I have to do to incite your desperation? Is the Train Cannon not enough?"
13230-106 = "...Defeat me, and I'll tell you where that notebook is."
13230-110 = "...I really was going to go easy on you, but you...I'm gonna have to go all out."
13230-112 = "Yes, that's a good expression. "
13230-117 = "Let's begin."

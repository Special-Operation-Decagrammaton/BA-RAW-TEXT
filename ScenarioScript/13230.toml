[translation]
13230-1 = "第23話;學生會之谷"
13230-3 = "……列車砲「謝瑪塔」。"
13230-4 = "但是為什麼…… "
13230-9 = "格黑娜的徽章……？"
13230-12 = "而且……這個形態……"
13230-17 = "感覺不像是紀念館……"
13230-19 = "……更像是個戰爭要塞嗎？"
13230-25 = "……眼罩醬。"
13230-26 = "（眼罩醬……？）"
13230-27 = "你說的沒錯，小鳥遊星野。#n這裡是數百年前的學生會長們建立的遺跡，後來被人改建成了戰爭要塞。"
13230-30 = "不，不是，不是那樣的！雖然不是負責人的我不清楚詳細情況……#n但總而言之，是先有沙漠橫貫鐵路的事業之後，「列車砲」計畫才出現的！"
13230-31 = "有人向學生會提供了這個「能一舉改變無利可圖又傷腦筋的事業」的點子……！"
13230-32 = "什麼？是誰？是誰做了那種事……"
13230-35 = "「阿拜多斯學生會」和奈芙蒂斯……不過是被那個人玩弄於鼓掌之中罷了。"
13230-36 = "你的意思是背後另有黑幕嗎？眼罩醬？"
13230-37 = "不，應該不能再稱那個人為黑幕了。#n因為現在他已經畢業，離開了奇普托斯。"
13230-38 = "……畢業了？"
13230-39 = "沒錯。那個人就是在2年前……#n讓奇普托斯籠罩於黑暗之中的格黑娜暴君「雷帝」。"
13230-40 = "……雷帝？"
13230-41 = "他是名天才策略家、發明家，同時也是高明的政治家。#n有個說法表示──聯邦學生會長準備的「伊甸園條約」其實是用來對付雷帝的計策。"
13230-42 = "我倒是沒聽過這回事。"
13230-43 = "……這樣啊。#n總之他就是涉入「沙漠橫貫鐵路」事業，使其變得面目全非的罪魁禍首。"
13230-44 = "因為他的干涉，原本單純的物流配送事業，#n才會在轉眼之間變成高度政治糾紛的因素。"
13230-45 = "那個叫雷帝的傢伙，為什麼要做出這種事？"
13230-46 = "……天曉得。"
13230-47 = "……其實當時也沒人知道雷帝在想什麼。"
13230-48 = "該說他是天才還是怪人呢……據說他本人相當難以捉摸。"
13230-49 = "之所以接近阿拜多斯，可能只是單純一時興起，也可能只是當成消遣。"
13230-50 = "總之自從「列車砲」事業停擺之後，雷帝也失去了對阿拜多斯的興趣。"
13230-52 = "……"
13230-53 = "雷帝最終因為部下而垮台，他的鐵腕統治也隨之落幕……#n然而據說他所留下的無數發明，至今依然留在奇普托斯的各個角落。"
13230-54 = "盡是些會讓奇普托斯陷入危機的危險物品。#n而且覬覦那些物品的人也不在少數……就像這次的列車砲一樣。"
13230-55 = "唉，眼罩醬，別再說過去的事了。大叔我沒什麼興趣。"
13230-56 = "（大叔……？）"
13230-57 = "所以你叫大叔我到這裡來的原因是什麼？#n難道那個雷帝和夢前輩有關係嗎？"
13230-58 = "……不，完全無關。"
13230-59 = "那難道是和夢前輩留下的契約有什麼關聯？"
13230-60 = "…… "
13230-61 = "還是說眼罩醬其實是格黑娜的學生，所以想回收雷帝的發明呢？"
13230-62 = "……你是誰？到底在策劃什麼？"
13230-63 = "…… "
13230-64 = "唉，算了。直接進入正題吧。"
13230-68 = "我接下來要破壞列車砲。#n無論是雷帝還是格黑娜我都沒興趣。"
13230-69 = "那是否定夢前輩遺願的物品。所以我絕對不會坐視不管。"
13230-70 = "絕對不會。"
13230-72 = "……隨你高興，星野。"
13230-73 = "但是如果你想那麼做，就必須先從我這裡搶走這張「卡片」。"
13230-79 = "野乃美醬的金卡……？"
13230-80 = "有了這張卡就能發動列車砲。#n想破壞列車砲也需要先得到這張卡片。"
13230-89 = "打倒我拿走卡片吧。"
13230-90 = "因為我真正的目的就是你──小鳥遊星野。"
13230-91 = "……你到底是誰？"
13230-92 = "啊啊，我也一直很好奇。"
13230-93 = "不屬於任何學園的流浪者、凱薩PMC的傭兵、幫奈芙蒂斯跑腿的人、#n高地人鐵道學園的異類、私募基金的雙重間諜……"
13230-94 = "……但現在我很確定一件事。"
13230-98 = "你是我的敵人──小鳥遊星野。#n繼承阿拜多斯的恐怖與瘋狂的嫡統者。"
13230-99 = "這就是你強大的原因，所以我一定要否定你。"
13230-104 = "將你逼迫至此的原因是什麼？難道列車砲還不夠嗎？"
13230-106 = "……對了。#n只要你打倒我，我就告訴你那本「手冊」在哪裡吧。"
13230-110 = "……本來想適可而止的，看來沒辦法了。"
13230-112 = "很好，你的表情認真起來了。"
13230-117 = "那就開始吧。"

[translation]
13230-1 = "ตอนที่ 23;หุบเขาของประธานสภานักเรียน"
13230-3 = "ปืนแม่เหล็กไฟฟ้า <เชมาตา> ..."
13230-4 = "แต่ทำไม..."
13230-9 = "ทำไมถึงมีสัญลักษณ์เกเฮนน่าล่ะ...?"
13230-12 = "แถมรูปร่างมัน..."
13230-17 = "ไม่เหมือนกับเป็นอนุสรณ์สถาน แต่เป็น..."
13230-19 = "ป้อมปราการสงคราม?"
13230-25 = "ผ้าปิดตาจัง..."
13230-26 = "(ผ้าปิดตาจังงั้นเหรอ...?)"
13230-27 = "ใช่ ทาคานาชิ โฮชิโนะ เธอพูดถูกแล้วละ ที่นี่คือโบราณสถานที่พวกประธานสภานักเรียนในอดีตสร้าง#nไว้เมื่อหลายร้อยปีก่อน แล้วก็มีใครบางคนมาเปลี่ยนมันให้เป็นป้อมปราการสงคราม"
13230-30 = "ผมไม่ใช่คนที่รับผิดชอบ ก็เลยไม่ค่อยรู้เท่าไร แต่ธุรกิจทางรถไฟข้ามทะเลทรายนั้นมีมาก่อนอยู่แล้ว ส่วนแผนการ <ปืนแม่เหล็กไฟฟ้า> นั้นถูกเพิ่มมาทีหลังครับ"
13230-31 = "พอธุรกิจที่น่าปวดหัวนี้ทำกำไรไม่ได้ ก็เลยมีบางคนมาเสนอไอเดียเปลี่ยนแปลงธุรกิจนี้ให้กับทางสภา#nนักเรียนน่ะครับ...!"
13230-32 = "คะ? ใครเหรอคะ? ใครกันที่ทำเรื่องแบบนี้..."
13230-35 = "ทั้ง <สภานักเรียนอะบิดอส> และเนฟธิสต่างก็ต้องหนีจากการควบคุมของคนนั้น"
13230-36 = "แปลว่ามีคนที่เป็นเบื้องหลังอันเลวร้ายอยู่จริงๆ เหรอ? ผ้าปิดตาจัง?"
13230-37 = "ไม่หรอก จะเรียกคนคนนั้นว่าเป็นเบื้องหลังอันเลวร้ายไม่ได้แล้ว เพราะตอนนี้คนนั้นเรียนจบแล้วออก#nจากคิโวทอสไปแล้ว"
13230-38 = "เรียนจบแล้วงั้นเหรอ...?"
13230-39 = "ใช่ และคนคนนั้นก็คือ... จอมเผด็จการของเกเฮนน่า ฉายา <ผู้เหี้ยมโหด> ที่ทำให้คิโวทอสปกคลุมไป#nด้วยความมืดมนเมื่อ 2 ปีก่อน"
13230-40 = "ผู้เหี้ยมโหด...?"
13230-41 = "คนที่เป็นทั้งนักยุทธศาสตร์ นักประดิษฐ์อัจฉริยะ และเป็นนักการเมืองระดับอาวุโส มีสมมติฐานด้วย#nละว่าที่จริงแล้ว <สนธิสัญญาเอเดน> ที่ประธานองค์การนักเรียนจัดทำก็เป็นอุบายเพื่อเผชิญหน้ากับ#nผู้เหี้ยมโหดคนนี้"
13230-42 = "ไม่เคยได้ยินมาก่อนเลย"
13230-43 = "งี้นี่เอง... คนคนนี้น่ะ คือตัวต้นเรื่องที่แทรกแซงกิจการ <ทางรถไฟข้ามทะเลทราย> แล้วทำให้กิจการนี้#nแตกต่างไปจากเดิมโดยสิ้นเชิง"
13230-44 = "และเธอก็ทำให้ธุรกิจโลจิสติกส์และการกระจายสินค้าที่แสนจะเรียบง่ายต้องกลายเป็นปัจจัยของ#nความขัดแย้งทางการเมืองระดับสูงในชั่วพริบตา"
13230-45 = "แล้วผู้เหี้ยมโหดอะไรนั่นทำเรื่องแบบนี้ทำไมกัน?"
13230-46 = "เรื่องนั้นฉันไม่รู้หรอก..."
13230-47 = "ที่จริงแล้วไม่มีใครในสมัยนั้นรู้ได้เลยว่าผู้เหี้ยมโหดคนนั้นคิดอะไรอยู่..."
13230-48 = "ไม่รู้ด้วยซ้ำว่าควรเรียกว่าอัจฉริยะหรือคนประหลาดกันแน่... แต่ที่ผ่านมาก็เรียกกันว่า 'คนที่ไม่อาจล่วงรู้ความคิดได้'"
13230-49 = "การเข้าหาอะบิดอสอาจจะมาจากนิสัยที่แปรปรวน หรือไม่งั้นก็อาจจะเป็นการเล่นสนุกแก้เบื่อเฉยๆ"
13230-50 = "เอาเป็นว่าหลังจากกิจการ <ปืนแม่เหล็กไฟฟ้า> ยุติไป ผู้เหี้ยมโหดก็ไม่ให้ความสนใจกับอะบิดอสอีก"
13230-52 = "..."
13230-53 = "การปกครองด้วยกำปั้นเหล็กของเธอก็เลยปิดฉากลง... เธอถูกลูกน้องของตัวเองปลดจากตำแหน่ง ว่ากันว่าสิ่งประดิษฐ์มากมายที่เธอทิ้งไว้ยังหลงเหลืออยู่ทั่วคิโวทอสเลยละ"
13230-54 = "มันเป็นของอันตรายที่จะทำให้คิโวทอสตกอยู่ในอันตรายได้ ก็เลยมีหลายคนอยากได้ของพวกนั้นมา#nครอบครอง และหนึ่งในนั้นก็คือปืนแม่เหล็กไฟฟ้านี่ละ"
13230-55 = "นี่ ผ้าปิดตาจัง เลิกพูดถึงเรื่องอดีตได้แล้ว ลุงคนนี้ไม่สนใจเรื่องแบบนั้นหรอก"
13230-56 = "(ลุงเหรอ...?)"
13230-57 = "สรุปว่าทำไมถึงเรียกลุงมาที่นี่ล่ะ? หรือว่าผู้เหี้ยมโหดคนนั้นมีส่วนเกี่ยวข้องกับรุ่นพี่ยูเมะ?"
13230-58 = "ไม่หรอก... ไม่เลยสักนิด"
13230-59 = "ถ้างั้น หรือว่าเธอมีส่วนเกี่ยวข้องอะไรกับหนังสือสัญญาของรุ่นพี่ยูเมะกันล่ะ?"
13230-60 = "..."
13230-61 = "หรือที่จริงแล้วผ้าปิดตาจังเป็นเด็กเกเฮนน่า ก็เลยอยากเอาสิ่งประดิษฐ์ของผู้เหี้ยมโหดคนนั้นกลับมา?"
13230-62 = "เธอเป็นใคร...? แล้วคิดจะทำอะไรกันแน่?"
13230-63 = "..."
13230-64 = "เฮ้อ ช่างเถอะ ฉันจะเข้าเรื่องเลยแล้วกัน"
13230-68 = "จากนี้ฉันจะทำลายปืนแม่เหล็กไฟฟ้า ไม่ว่าจะยกเรื่องผู้เหี้ยมโหดหรือเกเฮนน่ามาพูด ฉันก็ไม่สนใจหรอก"
13230-69 = "ปืนนั่นเป็นสิ่งของที่ขัดต่ออุดมการณ์ของรุ่นพี่ยูเมะ เพราะงั้นฉันจะไม่ปล่อยมันไว้เฉยๆ เด็ดขาด"
13230-70 = "ปล่อยไว้ไม่ได้... เด็ดขาด"
13230-72 = "ก็ได้... ตามใจเลย โฮชิโนะ"
13230-73 = "แต่ถ้าจะทำอย่างนั้น ก็ต้องมาแย่ง <บัตร> ใบนี้ไปจากฉันก่อน"
13230-79 = "บัตรโกลเด้นการ์ดของโนโนมิจัง...?"
13230-80 = "ต้องมีบัตรใบนี้ถึงจะเปิดใช้ปืนแม่เหล็กไฟฟ้าได้ ถ้าเธอจะทำลายปืนแม่เหล็กไฟฟ้า ก็ต้องได้บัตรใบนี้#nไปก่อน"
13230-89 = "สู้ฉันให้ชนะแล้วมาเอาไปสิ"
13230-90 = "เพราะเป้าหมายที่แท้จริงของฉัน ก็คือเธอนั่นละ ทาคานาชิ โฮชิโนะ"
13230-91 = "เธอเป็นใครกันแน่...?"
13230-92 = "อื้ม ฉันเองก็อยากรู้มาตลอดเหมือนกันว่าตัวเองเป็นใคร"
13230-93 = "คนเร่ร่อนที่ไม่มีโรงเรียนอยู่ ทหารรับจ้างของไคเซอร์ PMC เด็กใช้งานของเนฟธิส คนต่างถิ่นของไฮแลนเดอร์ สายลับสองหน้าของกองทุนไพรเวทอิควิตี้..."
13230-94 = "แต่ตอนนี้เข้าใจอย่างชัดเจนแล้วละ..."
13230-98 = "ว่าฉันคือศัตรูของเธอ ทาคานาชิ โฮชิโนะ ทายาทที่ถูกสืบทอดความหวาดกลัวและความบ้าคลั่งของ#nอะบิดอสมา"
13230-99 = "ที่เธอแข็งแกร่งได้ขนาดนี้ก็เพราะสิ่งนั้นนั่นละ เพราะงั้นฉันถึงได้ไม่ยอมรับเธอ"
13230-104 = "อะไรบ้างนะที่ทำให้เธอจวนตัวได้? แค่ปืนแม่เหล็กไฟฟ้าจะพอมั้ยนะ?"
13230-106 = "จริงสิ ถ้าเอาชนะฉันได้ ฉันจะบอกให้ก็ได้นะว่า <สมุดโน้ต> เล่มนั้นอยู่ที่ไหน"
13230-110 = "กะว่าจะทำแค่พอดีๆ... แต่เห็นทีคงไม่ได้แล้วสินะ"
13230-112 = "ก็ดี สีหน้ามั่นใจใช้ได้"
13230-117 = "งั้นก็มาเริ่มกันเลย"

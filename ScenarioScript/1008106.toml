[translation]
1008106-1 = "ความเพลิดเพลินของการรอคอย"
1008106-2 = "(วันนี้คุณครูก็ออกไปหายูคาริตามที่นัดไว้)"
1008106-11 = "[ns] \"น่าจะแถวๆ นี้นะ...\""
1008106-12 = "อ๊ะ! ท่านอาจารย์ ทางนี้เจ้าค่ะ!"
1008106-15 = "― [log=유카리]ฮุฮุฮุ ทางนี้ๆ [/log][wa:2450] "
1008106-16 = "― [log=유카리]ข้าอยู่ตรงนี้เจ้าค่ะ ท่านอาจารย์[/log][wa:820] "
1008106-19 = "[ns] \"ขอโทษนะ ยูคาริ รอนานรึเปล่า?\""
1008106-22 = "― [log=유카리]ไม่เป็นไรเจ้าค่ะ [/log][wa:1130] "
1008106-23 = "― [log=유카리]ข้าไม่ได้รอนานอะไรเลยเจ้าค่ะ[/log][wa:10] "
1008106-26 = "― [log=유카리]ข้าแค่ออกมาเร็วกว่าเวลานัด [/log][wa:2660] "
1008106-27 = "― [log=유카리]แค่หนึ่งชั่วโมงเองเจ้าค่ะ[/log][wa:690] "
1008106-30 = "[ns1] \"รอมาเป็นชั่วโมงเลยเหรอ?!\"\n[ns2] \"เอ่อ ยูคาริ ทำไมถึงรีบออกมาขนาดนั้นล่ะ?\""
1008106-33 = "― [log=유카리]เปล่าเจ้าค่ะ ไม่ได้มีเหตุผลอะไรเป็นพิเศษ [/log][wa:3800] "
1008106-34 = "― [log=유카리]ข้าก็แค่... [/log]"
1008106-37 = "― [log=유카리]วันนี้จะไปไหน จะได้ทำอะไร... [/log][wa:3750] "
1008106-38 = "― [log=유카리]ท่านอาจารย์จะสอนอะไรใหม่ๆ ให้...[/log][wa:540] "
1008106-41 = "― [log=유카리]พอคิดอะไรแบบนี้ [/log][wa:2290] "
1008106-42 = "― [log=유카리]ข้าก็เลยอดใจรออยู่เฉยๆ ไม่ได้...[/log][wa:130] "
1008106-45 = "― [log=유카리]อ่า... ถ้าจะให้สรุปเลยละก็ [/log][wa:1950] "
1008106-46 = "― [log=유카리]การได้รอแบบนี้ก็เป็นความเพลิดเพลินอย่างหนึ่งสำหรับข้าน้อยเจ้าค่ะ[/log][wa:390] "
1008106-49 = "― [log=유카리]เพราะถ้าได้อยู่กับท่านอาจารย์แล้วละก็ การรอคอย... [/log][wa:2640] "
1008106-50 = "― [log=유카리]ก็เป็นช่วงเวลาที่น่าตื่นเต้นและยอดเยี่ยมมากเจ้าค่ะ[/log][wa:10] "
1008106-53 = "[ns] \"ครูดีใจที่ได้ยินอย่างนั้นนะ...\""
1008106-56 = "― [log=유카리]เอาละ ตอนนี้ไม่ใช่เวลามาทำแบบนี้อยู่นะเจ้าคะ![/log][wa:860] "
1008106-59 = "― [log=유카리]ฮุฮุ วันนี้ก็ช่วยทำให้ข้า [/log][wa:1870] "
1008106-60 = "― [log=유카리]ได้ตื่นตากับโลกที่สวยงามด้วยนะเจ้าคะ! ท่านอาจารย์![/log][wa:1570] "
1008106-63 = "(จากนั้นทั้งสองก็ใช้เวลาทั้งวันด้วยกันเพื่อลองทำอะไรใหม่ๆ มากมาย)"

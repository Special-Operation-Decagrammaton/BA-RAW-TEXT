[translation]
1008106-1 = "The Joys of Patience"
1008106-2 = "I departed to meet Yukari at our usual spot."
1008106-11 = "[ns] \"Yukari should be...\""
1008106-12 = "Ah, Sensei! Over here!"
1008106-15 = "― [log=유카리]Heehee, here!  [/log][wa:2450] "
1008106-16 = "― [log=유카리]I'm here, Sensei.[/log][wa:1420] "
1008106-19 = "[ns] \"Sorry about that, Yukari. Did I make you wait long?\""
1008106-22 = "― [log=유카리]It's okay. [/log][wa:1370] "
1008106-23 = "― [log=유카리]I didn't wait long at all.[/log][wa:40] "
1008106-26 = "― [log=유카리]It's my fault for getting here [/log][wa:2500] "
1008106-27 = "― [log=유카리]an hour early.[/log][wa:1130] "
1008106-30 = "[ns1] \"You've been waiting for an hour?!\"\n[ns2] \"Yukari. Why exactly did you...?\""
1008106-33 = "― [log=유카리]Ah, there's no special reason. [/log][wa:4200] "
1008106-34 = "― [log=유카리]It's just... [/log]"
1008106-37 = "― [log=유카리]Where will we go today? What are we going to do? [/log][wa:2950] "
1008106-38 = "― [log=유카리]What new thing will I learn from you?[/log][wa:340] "
1008106-41 = "― [log=유카리]I had all of those thoughts running through my head, [/log][wa:810] "
1008106-42 = "― [log=유카리]and I couldn't wait for another moment.[/log][wa:10] "
1008106-45 = "― [log=유카리]You don't need to worry.[/log][wa:2070] "
1008106-46 = "― [log=유카리]I actually enjoy waiting.[/log][wa:1950] "
1008106-49 = "― [log=유카리]In fact, it makes finally being with you [/log][wa:3000] "
1008106-50 = "― [log=유카리]even better.[/log][wa:950] "
1008106-53 = "[ns] \"I really appreciate that.\""
1008106-56 = "― [log=유카리]All right then, there's no time for us to waste![/log][wa:740] "
1008106-59 = "― [log=유카리]Heehee. Please, [/log][wa:2270] "
1008106-60 = "― [log=유카리]show me more of this beautiful world, Sensei![/log][wa:1770] "
1008106-63 = "I spent the day showing Yukari as many new things as I could."

[translation]
1008106-1 = "連等待的時間都覺得開心"
1008106-2 = "（如同平時與紫的約定，今天也前往約好的地點）"
1008106-11 = "[ns]「和紫約好碰面的地方應該就在這附近……」"
1008106-12 = "啊！老師！這裡！"
1008106-15 = "― [log=유카리]唔呵呵，這裡，[/log][wa:2770] "
1008106-16 = "― [log=유카리]小女子在這裡，老師。[/log][wa:1700] "
1008106-19 = "[ns]「抱歉，紫，等很久了嗎？」"
1008106-22 = "― [log=유카리]沒關係的。[/log][wa:1610] "
1008106-23 = "― [log=유카리]其實沒有等很久。[/log][wa:760] "
1008106-26 = "― [log=유카리]只是比約好的時間，稍微提早1小時[/log][wa:3100] "
1008106-27 = "― [log=유카리]出發而已。[/log][wa:1490] "
1008106-30 = "[ns1]「那就是等很久了吧！？」\n[ns2]「那個，紫，不介意的話可以告訴我理由嗎……」"
1008106-33 = "― [log=유카리]不，並不是因為什麼特別的理由，[/log][wa:4840] "
1008106-34 = "― [log=유카리]只是……[/log]"
1008106-37 = "― [log=유카리]今天要去哪裡、要做些什麼、 [/log][wa:4350] "
1008106-38 = "― [log=유카리]又會教導什麼樣的新事物……[/log][wa:1300] "
1008106-41 = "― [log=유카리]一旦開始思考這些……[/log][wa:2530] "
1008106-42 = "― [log=유카리]就實在有些坐立難安……[/log][wa:970] "
1008106-45 = "― [log=유카리]啊，另外想告訴您……[/log][wa:2630] "
1008106-46 = "― [log=유카리]小女子就連這等待的時間都很喜歡唷？[/log][wa:2270] "
1008106-49 = "― [log=유카리]只要和老師在一起，[/log][wa:4280] "
1008106-50 = "― [log=유카리]就連等待的時間，也是讓人感到心胸澎湃的美好時光。[/log][wa:470] "
1008106-53 = "[ns]「……聽你這麼說，莫名感到很開心。」"
1008106-56 = "― [log=유카리]來吧，現在不是說這些的時候了！[/log][wa:2060] "
1008106-59 = "― [log=유카리]呵呵！今天也向小女子，[/log][wa:2470] "
1008106-60 = "― [log=유카리]教導這炫目美麗的世界吧！老師！[/log][wa:2970] "
1008106-63 = "（於是今天也為了和紫進行豐富的體驗，共度了一天）"

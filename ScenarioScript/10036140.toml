[translation]
10036140-1 = "เล่นเกมตามสไตล์สควอด 2"
10036140-3 = "โอ้วว? ถึงจะเป็นแค่ระดับง่าย แต่ก็ไม่คิดเลยนะครับว่าจะผ่านได้อย่างง่ายดายแบบนี้!"
10036140-4 = "ก็ง่ายตามชื่อระดับนะ"
10036140-5 = "แค่กำจัดเป้าหมายที่เข้ามามันไม่มีอะไรยากหรอก นี่เทียบไม่ได้กับการฝึกของเราด้วยซ้ำ"
10036140-9 = "ทุกคนยังโอเคดีใช่มั้ย?"
10036140-15 = "สบายมาก"
10036140-16 = "อื้ม ฉันสนุกที่เราได้เล่นเกมด้วยกันนะ"
10036140-17 = "แหะ แหะๆ ได้เข้าใกล้นิตยสาร <BiBi> ฉบับล่าสุดอีกก้าวแล้วสินะคะ...!"
10036140-18 = "บะ... บางทีเราอาจจะเป็นทีมที่ได้ของรางวัลชิ้นแรกไปก็ได้นะคะ...!"
10036140-19 = "หรืออาจเป็นทีมที่โดนแกงกลับบ้านไปก็ได้นะ"
10036140-20 = "คะ...? หมายความว่ายังไงคะ?"
10036140-21 = "เอ่อ... ฉันแค่... พูดเล่น..."
10036140-27 = "มิซากิก็..."
10036140-28 = "พูดเล่นกับเขาเป็นด้วยเหรอ...?"
10036140-29 = "อารมณ์ขันของคุณมิซากินี่มัน... ยอดแย่ไปเลยนะคะ..."
10036140-30 = "ชิ! ระ... รีบเล่นเกมต่อไปได้แล้ว!"
10036140-31 = "ดีเลยครับ! ถ้างั้นก็ไปต่อกันที่ระดับกลางเลยนะครับ!"

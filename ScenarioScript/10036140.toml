[translation]
10036140-1 = "小隊享受遊戲的方法（２）"
10036140-3 = "哦？雖然只是初級，但各位相當輕鬆地通過了呢！"
10036140-4 = "這不算什麼。"
10036140-5 = "清除那些連用來訓練都不夠格的目標，實在沒什麼難度。"
10036140-9 = "大家，狀態都沒問題吧？"
10036140-15 = "沒問題。"
10036140-16 = "嗯，能和大家一起玩真開心。"
10036140-17 = "耶，耶嘿嘿，離獎品……最新一期的《BiBi》又近了一步……！"
10036140-18 = "說，說不定我們真的會成為第一個贏得獎品的人哦……！"
10036140-19 = "也可能成為挫敗的主角就是了。"
10036140-20 = "……咦？那是什麼意思？"
10036140-21 = "不是，那個……只是開個玩笑而已。"
10036140-27 = "美咲竟然……"
10036140-28 = "會開玩笑……？"
10036140-29 = "美咲同學的幽默感真是毀滅級的……"
10036140-30 = "嘖，少囉嗦！快，快開始下一個階段！"
10036140-31 = "好的！那麼就進入中級囉！"

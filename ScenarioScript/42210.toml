[translation]
42210-1 = "ตอนที่ 21;ในถ้ำแคร์บาน็อก 2"
42210-2 = "ห้องปฏิบัติการ"
42210-5 = "นะ... นี่คือ FOX 3... ขอโทษนะ ฉันโดนเล่นงานจนดูไม่จืดเลย <กระต่าย> ผ่านจุดลิม่าไปแล้ว"
42210-6 = "นี่คือ FOX 4 ฉันก็ด้วย ฉันโดนเผยจุดซ่อนตัวอย่างไม่น่าเชื่อเลย... ตอนนี้คงยิงสนับสนุนให้ไม่ได้"
42210-8 = "นี่คือ FOX 2 ตอนนี้ <กระต่าย> กำลังพยายามห้อยตัวลงมาถึงจุดออสการ์แล้วค่ะ"
42210-9 = "แผนป้องกันที่เตรียมไว้ใช้ไม่ได้แล้ว ฉันต้องตั้งหลักใหม่"
42210-15 = "... รับทราบ"
42210-16 = "FOX 1 จะตั้งแนวรบป้องกันและรับมือให้เอง"
42210-17 = "FOX 2 ให้ไปสมทบกับสมาชิกคนอื่นตามแผนการ แล้วออกจากเขตปฏิบัติการไปหาทางล่าถอย"
42210-21 = "... FOX 2 ทุกคนฟังอยู่หรือเปล่า?"
42210-25 = "การสื่อสารขัดข้องงั้นเหรอ..."
42210-26 = "เกิดระเบิดรุนแรงตั้งขนาดนั้น ก็ไม่แปลกที่สายสัญญาณจะไม่เสถียร ช่วยไม่ได้สินะ"
42210-27 = "... อาจจะโชคดีซะด้วยซ้ำที่ไม่ต้องพูดอะไรที่ไม่จำเป็นกับสมาชิก"
42210-31 = "งั้นก็ไปเริ่มการโจมตี 'ครั้งสุดท้าย' กันเลย"
42210-38 = "RABBIT 1 ไต่ลงมาถึงแล้ว"
42210-39 = "คุณครูเป็นยังไงบ้างคะ?"
42210-40 = "[s1] \"ครูถูกมัดลงมาเหมือนเป็นสัมภาระเลยละ...\"\n[s2] \"ครูไม่เป็นไรเลย สบายมาก!\""
42210-43 = "ดีแล้วละค่ะที่คุณครูไม่ได้รับบาดเจ็บตรงไหน"
42210-49 = "RABBIT 2 ไต่ลงมาถึงแล้ว"
42210-53 = "... ห้องปฏิบัติการที่เป็นจุดหมายของเราอยู่ข้างหน้านั้นใช่ไหม?"
42210-54 = "ใช่ ถ้าตรงไปตามทางเดินนี้ ก็จะเจอห้องปฏิบัติการที่เป็นส่วนลึกที่สุดของไซโลแล้วละ"
42210-56 = "ถึงเราจะปราบฝ่ายตรงข้ามได้หมดแล้ว แต่อย่างน้อยก็อาจจะมีอุปกรณ์ป้องกันหลงเหลืออยู่ ยังไงก็อย่าเพิ่งชะล่าใจกันนะคะ"
42210-57 = "เอาละ เช็กอาวุธกันอีกครั้ง แล้วก็..."
42210-68 = "... ฝีมือดีไม่เบาเลยนะ หัวหน้ากองสึคิยูกิ"
42210-70 = "รุ่นพี่ยูกิโนะ..."
42210-71 = "รู้ผลการต่อสู้ที่เกิดขึ้นตรงชั้นข้างบนแล้วหรือยังคะ?"
42210-72 = "ชัยชนะอยู่ในมือของพวกฉันแล้วค่ะ ไม่ต้องฝืนแข็งข้อแล้วยอมแพ้แต่โดยดีเถอะนะคะ"
42210-73 = "เปล่า มันตรงข้ามกันเลยละ"
42210-74 = "พวกฉันชนะใน 'สงคราม' นี้ตั้งแต่วินาทีที่มาถึงไซโลก่อนแล้ว"
42210-76 = "หมายความว่ายังไง..."
42210-80 = "ตอนนี้ปุ่มระเบิดตัวเองทันทีของหัวรบ <A.N.T.I.O.C.H.> อยู่ในกำมือของฉัน "
42210-81 = "วินาทีที่พวกเธอเข้ามาในห้องปฏิบัติการ... ฉันจะกดปุ่มทันที"
42210-86 = "ถ้าหัวรบระเบิดในพื้นที่ปิดสนิทแบบนี้ ทุกคนที่นี่ก็จะต้องตาย... แต่ถึงยังไง 'ปฏิบัติการ' ก็จะสำเร็จ"
42210-87 = "แต่รุ่นพี่เองก็จะตายไปด้วยนะคะ"
42210-88 = "ชีวิตของฉันมันไม่สำคัญหรอก"
42210-89 = "ฉันคือ SRT ที่ทำได้ทุกอย่างเพื่อปฏิบัติการ"
42210-92 = "........."
42210-93 = "... ถ้าเสียดายชีวิตนักละก็ พวกเธอก็กลับไปซะเถอะ นี่คือความหวังดีสุดท้ายในฐานะของรุ่นพี่อย่างฉัน"
42210-99 = "... คุณครูคะ"
42210-100 = "[s] \"... ยังไม่อยากล้มเลิกใช่ไหม?\""
42210-101 = "... ค่ะ"
42210-102 = "พวกฉันก็ทำได้ทุกอย่างเพื่อปฏิบัติการเหมือนกันค่ะ!"
42210-104 = "[ns] \"... งั้นก็ไปกันเลย!\""
42210-105 = "คิดว่ามาขู่กันแบบนี้แล้วจะทำให้เรากลัวจนหัวหดแล้วก็หนีไปเลยงั้นเหรอ?"
42210-106 = "ปุ่มระเบิดน่าสนุกๆ แบบนั้นน่ะ ฉันไม่ยอมให้ใครมากดก่อนฉันหรอก ฮุฮุฮุ..."
42210-107 = "เพื่ออนาคตของ SRT แล้ว... ฉันจะไม่ถอยไปจากที่นี่!"
42210-109 = "ทุกคน! เพิ่มการระวัง!"
42210-113 = "กองทหาร RABBIT จะบุกเข้าไปยังห้องปฏิบัติการเดี๋ยวนี้ค่ะ!"

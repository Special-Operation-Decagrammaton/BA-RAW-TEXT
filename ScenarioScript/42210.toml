[translation]
42210-1 = "第21話;カルバノグの洞窟（２）"
42210-2 = "オペレーションルーム"
42210-5 = "こ、こちらFOX3……ごめん、やられちゃった。#n「ウサギ」はもうポイントリマを通過したわ。"
42210-6 = "こちらFOX4、こっちも同じ。#n待ち伏せポイントがあっさりバレて……現在狙撃支援は不可。"
42210-8 = "こちらFOX2、「ウサギ」がポイントオスカーに向かって懸垂降下を試みています。"
42210-9 = "用意した対策が無力化されてしまって……戦況の立て直しが必要です。"
42210-15 = "……了解。"
42210-16 = "以後、防御線はFOX1が単独で構築し、対応する。"
42210-17 = "FOX2は、予定通り隊員を連れ、作戦地域の外で退路を確保するように。"
42210-21 = "……FOX2、聞こえるか？"
42210-25 = "通信途絶か……"
42210-26 = "あんな大爆発があったんだ……回線が不安定になってもおかしくない。"
42210-27 = "……むしろ、隊員に余計なことを言わずに済んでよかったのかもしれないな。"
42210-31 = "さて、「最終」攻勢を開始しよう。"
42210-38 = "RABBIT1、ラペルリング完了。"
42210-39 = "先生、大丈夫ですか？"
42210-40 = "[s1] \"貨物みたいに縛られて降りたけど……。\"\n[s2] \"大丈夫、問題ないよ。\""
42210-43 = "幸い、怪我はないみたいですね。"
42210-49 = "RABBIT2、ラペルリング完了。"
42210-50 = "……目標地点のオペレーションルームはこの先か？"
42210-53 = "……目標地点のオペレーションルームはこの先か？"
42210-54 = "うん、この通路をまっすぐ進んだら、サイロの最深部――オペレーションルームだよ。"
42210-56 = "敵小隊をすべて制圧したとはいえ、まだ防御施設が残っているかもしれません――最後まで油断は禁物です。"
42210-57 = "装備を再点検したあと――"
42210-68 = "……素晴らしい腕前だった、[ruby=つきゆき]月雪[/ruby]小隊長。"
42210-70 = "……ユキノ先輩。"
42210-71 = "上の階で行われた戦闘の結果は、ご存知ですよね。"
42210-72 = "勝利の女神はこちらに微笑んでいます。#n無駄な抵抗はやめて、大人しく投降してください。"
42210-73 = "いや、その逆だ。"
42210-74 = "我々が先にこのサイロに入ってきた時点で、「戦争」は我々の勝利だ。"
42210-76 = "それは、一体……"
42210-80 = "私は今、<A.N.T.I.O.C.H.>弾頭の自爆ボタンを握っている。"
42210-81 = "君たちがオペレーションルームに一歩でも足を踏み入れたら……即座にこのボタンを押す。"
42210-86 = "このような密閉空間で弾頭が爆発してしまえば……ここにいる全員が命を落とすだろうが――「作戦」は成功する。"
42210-87 = "それは先輩も同じだと思いますが。"
42210-88 = "私の命など大した問題じゃない。"
42210-89 = "作戦のためであれば――なんであれ遂行してこそSRTだからな。"
42210-92 = "………。"
42210-93 = "……命が惜しいなら帰れ。#n先輩としての最後の忠告だ。"
42210-99 = "……先生。"
42210-100 = "[s] \"……ここで諦めたくないんだよね？\""
42210-101 = "……はい。"
42210-102 = "作戦のために何でもするのは、私たちも同じですから！"
42210-104 = "[ns] \"……じゃあ、やろうか。\""
42210-105 = "そんなブラフで、私たちがしっぽを巻いて逃げるとでも思ったのか？"
42210-106 = "そんな面白そうなボタンを私より先に押すなんて、ずるい！それは押させないわよ……くひっ……"
42210-107 = "SRTの未来のためにも……ここで退くわけにはいきません！"
42210-109 = "全員、[ruby=ししゅう]四周[/ruby]を警戒！"
42210-113 = "RABBIT小隊、オペレーションルームに突入します！"

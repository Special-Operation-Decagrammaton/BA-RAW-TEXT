[translation]
42210-1 = "第21話;卡班諾的洞窟（２）"
42210-2 = "控制室"
42210-5 = "這，這裡是FOX3……抱歉，被擺了一道。#n「兔子」已經通過Lima地點了。"
42210-6 = "這裡是FOX4，我這裡也一樣。#n我的埋伏地點完全被發現了……目前無法進行支援狙擊。"
42210-8 = "這裡是FOX2，「兔子」目前正在嘗試以繩索垂降的方式進入Oscar地點。"
42210-9 = "準備的策略已經失效……需要重整戰況。"
42210-15 = "……了解。"
42210-16 = "此後，防線由FOX1單獨構築和防守。"
42210-17 = "FOX2，請按照計畫帶著隊員至作戰區域外確保撤退路線。"
42210-21 = "……FOX2，聽得見嗎？"
42210-25 = "通訊被切斷了啊……"
42210-26 = "發生了那麼大的爆炸……線路會不穩定也不足為奇。"
42210-27 = "……也好，這樣我就不會對隊員們說多餘的話了。"
42210-31 = "那麼，展開「最終」攻勢吧。"
42210-38 = "RABBIT1，垂降完畢。"
42210-39 = "老師，你還好嗎？"
42210-40 = "[s1]「雖然像貨物一樣被綁著降下來……」\n[s2]「沒事，我很好！」"
42210-43 = "幸好似乎沒有受傷。"
42210-49 = "RABBIT2，垂降完畢。"
42210-53 = "……目標地點控制室就在前面嗎？"
42210-54 = "嗯，只要沿著這條通道直線前進，就能抵達發射井的最深處──控制室了哦。"
42210-56 = "雖然已壓制敵方小隊所有成員，但可能還有防禦設施──直到最後都不能掉以輕心。"
42210-57 = "先再次檢查裝備後──"
42210-68 = "……真是十分優秀的表現，月雪小隊長。"
42210-70 = "……雪乃前輩。"
42210-71 = "上層戰鬥的結果，你應該已經知道了吧？"
42210-72 = "勝利女神已經對我們微笑。#n請放棄無謂的抵抗，老實投降吧。"
42210-73 = "不，正好相反。"
42210-74 = "在我們先行進入發射井的時間點，「戰爭」就已經是我們獲勝了。"
42210-76 = "那是，什麼意思……"
42210-80 = "我現在正握著「A.N.T.I.O.C.H.」彈頭的自爆按鈕。"
42210-81 = "只要你們膽敢踏進這座控制室一步……我就立刻按下這個按鈕。"
42210-86 = "要是在這種密閉空間引爆，在場的所有人都將難逃一死──但「作戰」將會成功。"
42210-87 = "這對前輩來說也是一樣的吧。"
42210-88 = "我的性命不成問題。"
42210-89 = "為了作戰──什麼都能執行，這才是SRT。"
42210-92 = "…………"
42210-93 = "……珍惜性命的話就回去吧。#n這是我身為前輩的最後忠告。"
42210-99 = "……老師。"
42210-100 = "[s]「……你們不想在這裡放棄，對吧？」"
42210-101 = "……是的。"
42210-102 = "為了作戰什麼都能做，這點我們也是一樣的！"
42210-104 = "[ns]「……那麼上吧！」"
42210-105 = "以為那樣虛張聲勢，我們就會夾著尾巴逃走嗎？"
42210-106 = "那麼好玩的遙控器怎麼能讓你搶先體驗呢，咯嘻……"
42210-107 = "就算是為了守護SRT的未來……我們也不能在這裡退縮！"
42210-109 = "全員，警戒四周！"
42210-113 = "RABBIT小隊，向控制室突擊！"

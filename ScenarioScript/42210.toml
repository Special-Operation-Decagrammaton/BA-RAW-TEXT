[translation]
42210-1 = "Episode 21; Caerbannog's Cave 2"
42210-2 = "Control Room"
42210-5 = "F-FOX 3... The rabbits have passed point Lima... I'm sorry."
42210-6 = "FOX 4. Same, but in my defense, that Miyu girl defies common sense. You're out sniper support."
42210-8 = "FOX 2. The rabbits have breached the elevator and are rappelling to point Oscar."
42210-9 = "They melted through our plans. We need to regroup."
42210-15 = "...Copy."
42210-16 = "FOX 1 will defend the front line alone."
42210-17 = "FOX 2, regroup with the other squad members and secure our retreat."
42210-21 = "...FOX 2, come in. FOX 2? FOX Squad, answer!"
42210-25 = "I'm cut off..."
42210-26 = "It must've been from the explosion earlier..."
42210-27 = "...At least this way, I can keep some secrets."
42210-31 = "Well, let's go greet my precious juniors."
42210-38 = "RABBIT 1, arrived at the destination."
42210-39 = "How are you doing, Sensei?"
42210-40 = "[s1] \"Besides having to get be carried down here...\"\n[s2] \"Yup! All good, just a little tied up right now!\""
42210-43 = "No injuries. Good."
42210-49 = "RABBIT 2, arrived at the destination."
42210-53 = "...Is the control room straight ahead?"
42210-54 = "Yup. Just keep going down and you'll hit it."
42210-56 = "Yukino isn't going to let us just waltz in. Don't let your guard down."
42210-57 = "Check your gear, and then—"
42210-68 = "Very good work, Squad Leader Tsukiyuki."
42210-70 = "Yukino..."
42210-71 = "I'm sure you're aware of the current circumstances."
42210-72 = "Let's not drag this out any longer. We've won, so please surrender quietly."
42210-73 = "Your inexperience is showing."
42210-74 = "The moment we entered the silo before you did, the result was already decided."
42210-76 = "What are you saying?"
42210-80 = "This is the remote detonator for the A.N.T.I.O.C.H. warhead."
42210-81 = "The moment you enter the control room, I'll trigger the explosion."
42210-86 = "If the warhead detonates in such a confined space, everyone here will die, but our mission will be a success."
42210-87 = "Why would you willingly sign your own death warrant?"
42210-88 = "Weapons don't have souls. Lives. Those things are insignificant."
42210-89 = "I am SRT. I will complete my mission. That is my purpose."
42210-92 = "..."
42210-93 = "I'll grant you one last mercy, as a fellow SRT student. Leave, now."
42210-99 = "Sensei..."
42210-100 = "[s] \"You don't want to give up, do you...?\""
42210-101 = "...You're right."
42210-102 = "Because we're SRT too! We'll do whatever it takes to complete OUR mission!"
42210-104 = "[ns] \"I'm right by your side, Miyako.\""
42210-105 = "Did you seriously believe we'd chicken out at a feeble threat like that?"
42210-106 = "If anyone's going to push that button, it's going to be me! Heeheeheehee..."
42210-107 = "We'll fight for the SRT we believe in!"
42210-109 = "Units, cover all sides!"
42210-113 = "RABBIT Squad, breach the control room!"

12130-5 = "#na;무소속호시노;아아. 이렇게 편지로 작별인사하는 걸 용서해줘. 아무래도 이 아저씨는 이런 구식이 편하니까 말야."
12130-6 = "#na;무소속호시노;모두에게 말하지 않은 게 있었어."
12130-7 = "#na;무소속호시노;사실 나는 오래 전부터 누군가에게 스카웃 요청을 받고 있었어."
12130-8 = "#na;무소속호시노;종신으로 카이저 PMC의 용병으로 일하는 조건으로 아비도스가 진 빚을 갚는다. ……그런 이야기야."
12130-9 = "#na;무소속호시노;……으헤~ 생각보다 괜찮은 조건이지? 아저씨는 꽤 능력을 인정받고 있으니까."
12130-10 = "#na;무소속호시노;빚은 내가 어떻게든 해결할게. 전부는 아니지만 이걸로 꽤 부담이 덜어질 거야."
12130-11 = "#na;무소속호시노;블랙 마켓에서는 건방진 말을 했지만 말야. 그 말을 내가 지키지 못하게 되어서 미안해."

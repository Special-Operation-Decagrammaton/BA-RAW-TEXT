[translation]
12130-1 = "第13話;錯失的事物"
12130-4 = "給阿拜多斯對策委員會的大家："
12130-5 = "首先，請原諒我用寫信的方式來告別。#n畢竟大叔我比較習慣這種傳統的方式。"
12130-6 = "有件事，我一直沒有告訴大家。"
12130-7 = "其實很久以前就有人在挖角我。"
12130-8 = "以終身成為凱薩PMC的傭兵為條件，償還阿拜多斯的債務……"
12130-9 = "……唔嘿～不覺得是個不錯的條件嗎？#n別看大叔這樣，其實評價還挺高的呢～"
12130-10 = "債務的事，我會想辦法解決。#n雖然全部可能有點困難，至少負擔應該會減輕不少才對。"
12130-11 = "雖然在黑市的時候說得那麼了不起……不過抱歉，我無法遵守那些話了。"
12130-13 = "（咻）"
12130-14 = "……這樣就行了吧？"
12130-15 = "……是，我已經確認了你的簽名，星野小姐。"
12130-16 = "這樣星野小姐作為學生的所有權利就轉移到我手上了。"
12130-19 = "如此一來，阿拜多斯高中背負的大部分債務將被償還。"
12130-21 = "這樣對策委員會應該能輕鬆一點。"
12130-22 = "雖然離開了阿拜多斯高中，也離開了奇普托斯……不過不用擔心我。"
12130-23 = "要埋怨大叔也沒關係。"
12130-24 = "不過這一切，都應該由我負起責任。"
12130-25 = "因為我是阿拜多斯最後的學生會。"
12130-26 = "就在這裡告別吧。"
12130-28 = "給老師："
12130-29 = "其實我討厭大人，也不怎麼相信大人。"
12130-30 = "白子醬把老師背過來的時候，我曾經想過「原來還有這麼糟的大人啊？」……#n唔嘿嘿～不過當時確實是那樣對吧？"
12130-31 = "能在最後遇見像老師這樣的大人，我……不，肉麻的話已經說夠多了吧。"
12130-32 = "老師。"
12130-33 = "我知道這樣很任性，但我還是想拜託你。#n白子醬雖然是個好孩子，但如果沒有人在身旁陪著的話，不知道會做出什麼事。"
12130-34 = "為了不讓他誤入歧途，希望你可以在身邊守望著他。"
12130-35 = "萬事拜託了。"
12130-38 = "快上車吧。"
12130-39 = "……要去哪裡？"
12130-40 = "阿拜多斯沙漠。"
12130-45 = "白子醬、野乃美醬、茜香醬、綾音醬。"
12130-46 = "希望你們能守護我們的學校。"
12130-47 = "雖然是個滿是砂塵的地方……但這是我剩下的，唯一有意義的地方了。"
12130-48 = "還有，萬一某天我們以敵人的身分相遇……"
12130-49 = "到時候請把我的光環「破壞掉」吧。"
12130-50 = "拜託了。"
12130-52 = "星野前輩──────！！！！"
12130-54 = "什麼嘛！之前還說的那麼好聽！！#n結果自己到了緊要關頭還不是拿別無選擇當藉口！！"
12130-55 = "以為我們會接受這種事嗎？"
12130-56 = "星野前輩會去哪裡？得去救他才行。"
12130-57 = "我自己去也沒關係。#n如果會給對策委員會添麻煩，就算只有我一個人也……"
12130-58 = "大家冷靜一點！！現在不是爭吵的時候！"
12130-59 = "（咚哐哐哐哐哐──！）"
12130-60 = "嗚哇──！？"
12130-61 = "爆炸聲……！？"
12130-62 = "距離很近，地點是……！？"
12130-63 = "……"
12130-64 = "……怎，怎麼會！？"
12130-66 = "（咚哐哐哐哐哐──！）"
12130-68 = "上吧，上吧！"
12130-69 = "前進！"
12130-71 = "嗚哇啊啊啊啊！？"
12130-72 = "快，快逃啊！！"
12130-74 = "……這個自治區已經下達了強制驅逐令。 "
12130-77 = "呵呵呵，呵呵呵呵呵呵呵……"
12130-78 = "終於，條件終於全部達成了。"
12130-79 = "阿拜多斯最後的學生會主動退學……這樣一來阿拜多斯高中就徹底消失了！！"
12130-80 = "接下來將由我們凱薩公司吸收阿拜多斯！"
12130-82 = "來，佔領阿拜多斯高中吧！"
12130-84 = "數百名PMC的兵力正往這裡進攻！同時還對市區進行了無差別攻擊！"
12130-85 = "凱薩！？為什麼在這個時間點……！？"
12130-86 = "得，得應戰才行！！無論如何都不能漠視阿拜多斯遭到攻擊……！"
12130-87 = "沒時間考慮了，立刻出發吧！"
12130-88 = "可，可是敵人實在太多了！只靠我們沒辦法擊退他們……！"
12130-89 = "而且竟然還對市區進行無差別攻擊……總之先讓市民去避難吧！"
12130-93 = "如此大規模的攻擊……究竟為什麼，這麼突然……"
12130-98 = "發現對策委員會了！在這邊！"
12130-100 = "咕啊！？"
12130-104 = "是敵人的偵察兵。#n竟然已經到這裡了……"
12130-105 = "已確認阿拜多斯高中附近有多名凱薩PMC偵查兵正在靠近！#n已經入侵校內了！"
12130-106 = "得先解決入侵校內的敵人！綾音醬，拜託你了！"
12130-107 = "是！確保老師的安全，同時擊退入侵學園的敵人！"
12130-109 = "確保校內的安全之後，再讓市民們去避難！"

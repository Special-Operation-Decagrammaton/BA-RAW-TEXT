[translation]
12130-1 = "Episode 13;What Slipped Through the Cracks"
12130-4 = "To the Abydos Foreclosure Task Force,"
12130-5 = "Forgive me for doing this with a letter. It felt more old-fashioned this way, which suits me perfectly."
12130-6 = "There's something I've been keeping from you."
12130-7 = "A recruiter has been coming after me for a while now."
12130-8 = "Become a Kaiser PMC mercenary for life in exchange for Abydos' debt being paid off. That's the long and short of the terms."
12130-9 = "Heh. Not too bad a deal, eh? They must value the skills of a wily old veteran like me."
12130-10 = "I'll take care of the debt somehow. Maybe not all of it, but I should be able to lighten the burden on you all."
12130-11 = "I know I talked a big game at the Black Market. I'm sorry I couldn't keep my word."
12130-13 = "*scribbles*"
12130-14 = "This is it, right?"
12130-15 = "Yes. We have your signature on the contract, Miss Hoshino."
12130-16 = "All of your rights as a student have been transferred to us."
12130-19 = "With this, most of Abydos' debt is now considered settled."
12130-21 = "So, with this...the Foreclosure Task Force will be fine."
12130-22 = "I'll have to leave Abydos and Kivotos altogether, but it doesn't matter."
12130-23 = "This is what I get for being a stubborn old mule. "
12130-24 = "But this...all of this...is my responsibility to bear."
12130-25 = "...as the final member of Abydos' last Student Council."
12130-26 = "So this is where it ends."
12130-28 = "Dear Sensei,"
12130-29 = "To be honest, I've never liked adults. I didn't think they could be trusted."
12130-30 = "Ever since I heard about Shiroko having to carry you on her back, I couldn't help but think, \"Damn. They must be useless.\" Heh. Am I wrong?"
12130-31 = "But in the end, you turned out to be... Well, you know. Besides, some things are better left unsaid, aren't they?"
12130-32 = "Sensei."
12130-33 = "I know it's selfish of me, but I have one last request. Shiroko's a good kid at heart, but without someone to keep her grounded, she'll run wherever the wind takes her."
12130-34 = "Make sure she doesn't lose her way."
12130-35 = "Please, look after her."
12130-38 = "Come on. Get in the car."
12130-39 = "Where are we headed?"
12130-40 = "The Abydos Desert."
12130-45 = "To all of you,"
12130-46 = "Please look after our school."
12130-47 = "It's just a desert now, but this is the only place left that has any meaning for me."
12130-48 = "Also, if we ever end up facing each other as enemies..."
12130-49 = "...don't hesitate to destroy my halo."
12130-50 = "Please."
12130-52 = "HOSHINO!"
12130-54 = "Wh-What the-?! After all that talk, now you're the one making excuses?! Saying there was no other choice?!"
12130-55 = "You really think I can just accept this?!"
12130-56 = "Where is Hoshino? We have to go after her—now."
12130-57 = "If I have to go alone, so be it. If helping her means burdening the Task Force, then I..."
12130-58 = "Everyone, be quiet! Now's not the time to fight amongst ourselves."
12130-59 = "*boooooom*"
12130-60 = "Wh-Wha...?!"
12130-61 = "What was that?! It sounded like an explosion!"
12130-62 = "T-Too close... This is..."
12130-63 = "..."
12130-64 = "What the...?!"
12130-66 = "*boooooom*"
12130-68 = "Advance."
12130-69 = "Advance."
12130-71 = "A-Aaah!"
12130-72 = "Run!"
12130-74 = "An eviction order has been issued to this district."
12130-77 = "Hahaha."
12130-78 = "At last—at long last, the final condition has been met."
12130-79 = "The last of the Student Council has dropped out, which means Abydos is no more!"
12130-80 = "All that's left is for Kaiser to annex the district!"
12130-82 = "Capture Abydos High School!"
12130-84 = "H-Hundreds of PMC troops are approaching!"
12130-85 = "What's happening?! Why is Kaiser attacking us?! I don't understand..."
12130-86 = "W-We have to stop them!! Whatever this means, we can't just stand by and watch them attack Abydos...!"
12130-87 = "You're right. There's no time to think. We have to act, now!"
12130-88 = "B-But there are too many of them! We can't take on this kind of force alone!"
12130-89 = "On top of that, they're attacking anything and everything. We should focus on evacuating whoever is left in the city!"
12130-93 = "A battle this big... How did it end up like this...? Why is this happening again...?"
12130-98 = "Foreclosure Task Force spotted! This way!"
12130-100 = "Guh?!"
12130-104 = "Enemy scout. They're already here."
12130-105 = "Multiple Kaiser PMC scouts approaching Abydos! They've already breached the campus!"
12130-106 = "We need to take out the ones inside first! Ayane, I'm counting on you!"
12130-107 = "Got it! We'll engage the enemies infiltrating the school. Keeping Sensei safe is our top priority!"
12130-109 = "Once the academy is secure, we'll begin civilian evacuations!"

[translation]
12130-1 = "ตอนที่ 13;สิ่งที่หลุดลอยไป"
12130-4 = "ถึงคณะกรรมการแผนงานอะบิดอส"
12130-5 = "อา... ขอโทษด้วยนะที่บอกลาทุกคนด้วยจดหมายแบบนี้ แต่ลุงคนนี้ชอบอะไรที่ล้าสมัยแบบนี้แหละ"
12130-6 = "ฉันมีบางอย่างที่ยังไม่ได้บอกทุกคนน่ะ"
12130-7 = "ที่จริงแล้วฉันถูกคนคนหนึ่งชวนให้ไปทำงานด้วยมานานแล้ว"
12130-8 = "ภายใต้เงื่อนไขที่ว่า ถ้าฉันไปทำงานเป็นทหารรับจ้างของไคเซอร์ PMC แล้วจะช่วยใช้หนี้ของอะบิดอสให้#nเรื่องมันก็เป็นอย่างนี้แหละ"
12130-9 = "แหะๆ~ ...เป็นเงื่อนไขที่เข้าท่าเลยว่าไหม? อีกอย่าง เขาคนนั้นก็ยอมรับในความสามารถของลุงคนนี้ด้วย"
12130-10 = "ฉันจะช่วยจ่ายหนี้ให้เอง แม้จะไม่ทั้งหมดก็เถอะ แต่อย่างน้อยทุกคนก็จะได้ลำบากน้อยลง"
12130-11 = "ครั้งหนึ่งฉันเคยพูดจาอวดดีในตลาดมืด... ขอโทษนะที่รักษาคำพูดนั้นไว้ไม่ได้"
12130-13 = "(แกรก แกรก)"
12130-14 = "แค่นี้ก็พอแล้วใช่ไหม?"
12130-15 = "ครับ ตรวจสอบลายเซ็นในหนังสือสัญญาแล้ว ตัดสินใจได้ดีแล้วละครับ คุณโฮชิโนะ"
12130-16 = "สิทธิ์ในฐานะนักเรียนของคุณโฮชิโนะถูกโอนมาให้พวกเราแล้ว"
12130-19 = "และสิ่งนี้จะช่วยชดใช้หนี้ที่โรงเรียนอะบิดอสก่อไว้ได้ครับ"
12130-21 = "คณะกรรมการแผนงานจะอยู่รอดเพราะสิ่งนี้"
12130-22 = "ถึงฉันจะต้องออกจากโรงเรียนอะบิดอสและคิโวทอสไป แต่ก็ไม่เป็นไรหรอกนะ"
12130-23 = "จะโกรธลุงคนนี้ก็ได้..."
12130-24 = "แต่ช่วยเข้าใจด้วยนะว่าทุกอย่างเป็นหน้าที่ที่ฉันต้องรับผิดชอบ"
12130-25 = "เพราะฉันคือสภานักเรียนชุดสุดท้ายของอะบิดอส"
12130-26 = "เราคงต้องจากกันแค่ตรงนี้แล้วละ"
12130-28 = "ถึงคุณครู"
12130-29 = "จริงๆ แล้วฉันเคยไม่ชอบผู้ใหญ่เอามากๆ เลย แล้วก็ไม่ได้เชื่อถืออะไรมากด้วย"
12130-30 = "ตอนที่เห็นชิโรโกะจังแบกครูมา ก็คิดว่า \"มีผู้ใหญ่อะไรแบบนี้อยู่ด้วยเหรอเนี่ย?\" แหะๆ~ ก็มันห้ามไม่ได้นี่นา"
12130-31 = "การที่ฉันได้พบผู้ใหญ่แบบครูเป็นครั้งสุดท้ายแบบนี้ถือว่า... อืม... ไม่พูดอะไรเลี่ยนๆ จะดีกว่านะ ว่าไหม?"
12130-32 = "คุณครู"
12130-33 = "ถึงนี่จะน่าละอาย แต่ฉันขอร้องละ เดิมทีชิโรโกะจังเป็นเด็กดีนะ แต่ถ้าไม่คอยดูแลใกล้ๆ ละก็ อาจจะเตลิดไปไหนก็ได้"
12130-34 = "ช่วยดูแลไม่ให้เธอเดินไปในทางที่ไม่ดีด้วยนะ"
12130-35 = "ขอร้องละ"
12130-38 = "เอาละ ขึ้นรถคันนี้ซะ"
12130-39 = "...จากนี้เราจะไปไหนกันเหรอ?"
12130-40 = "ทะเลทรายอะบิดอส\n"
12130-45 = "ถึงทุกคน..."
12130-46 = "ปกป้องโรงเรียนของเราด้วยนะ"
12130-47 = "ถึงที่นั่นจะเต็มไปด้วยทราย แต่ก็เป็นสถานที่ที่มีค่าสำหรับฉัน"
12130-48 = "และหากวันไหนต้องเจอกันในฐานะศัตรูละก็..."
12130-49 = "ถึงตอนนั้น... ก็ช่วยทำลายฮาโลของฉันด้วยนะ"
12130-50 = "ฝากด้วยนะ"
12130-52 = "รุ่นพี่โฮชิโนะ!!!!!!\n"
12130-54 = "อะไรเนี่ย มาพูดให้ตัวเองดูดีทำไม! ไหนว่าช่วงที่รีบร้อนให้ใส่ไม่ยั้งไงล่ะ!!"
12130-55 = "คิดว่าฉันจะยอมรับอะไรแบบนี้ได้เหรอ? \n"
12130-56 = "รุ่นพี่โฮชิโนะไปที่ไหนกันนะ? ต้องรีบไปช่วยแล้ว"
12130-57 = "จะให้ฉันไปคนเดียวก็ได้ ฉันเองก็ทำให้คณะกรรมการลำบากมาเยอะเหมือนกัน..."
12130-58 = "ทุกคนเงียบก่อนค่ะ!! ตอนนี้ไม่ใช่เวลาที่จะมาเถียงกันนะคะ..."
12130-59 = "ตู้มมมมมม!!!\n\n"
12130-60 = "อะ... อะไรน่ะ?!\n"
12130-61 = "เสียงระเบิด! เกิดอะไรขึ้นน่ะ?!"
12130-62 = "รัศมีใกล้มากเลยค่ะ..."
12130-63 = "......\n"
12130-64 = "หืม?!\n\n"
12130-66 = "ตู้มมมมมมม!!\n\n"
12130-68 = "บุกเข้าไปเลย"
12130-69 = "บุกเข้าไปเลย"
12130-71 = "อ๊ากกก!\n\n\n"
12130-72 = "หนีเร็วเข้า!!"
12130-74 = "มีคำสั่งให้ย้ายออกจากเขตปกครองตนเองนี้แล้ว \n"
12130-77 = "หึหึหึ หึหึหึหึหึ\n"
12130-78 = "ในที่สุดเงื่อนไขสุดท้ายก็เป็นจริงแล้วสินะ"
12130-79 = "สภานักเรียนชุดสุดท้ายลาออกจากอะบิดอสแล้ว นี่ก็แปลว่าไม่มีอะบิดอสอีกต่อไป! \n\n"
12130-80 = "ทีนี้ก็เหลือแค่ให้ไคเซอร์ของเราควบกิจการในอะบิดอสแต่เพียงเท่านั้น!"
12130-82 = "ยึดโรงเรียนอะบิดอสซะ!"
12130-84 = "กองกำลัง PMC หลายร้อยนายกำลังมุ่งมาที่... ระ... โรงเรียนของเราค่ะ...!"
12130-85 = "นี่มันอะไรกัน?! ทำไมไคเซอร์ถึง?! ฉันไม่เข้าใจเลย...\n\n"
12130-86 = "ระ... เราต้องขวางไว้นะคะ! ถึงจะไม่รู้ว่ามาด้วยเหตุผลอะไร แต่เราจะปล่อยให้โรงเรียนถูกยึดไปไม่ได้..."
12130-87 = "ใช่ ไม่มีเวลามาหาสาเหตุแล้วละ ตอนนี้ต้องลุยแล้ว!"
12130-88 = "แต่กองกำลังทางนั้นมีเยอะมากเลยนะคะ! มากันเยอะขนาดนี้ พวกเราคงต้านกันไม่ไหวหรอกค่ะ!"
12130-89 = "แถมพวกนั้นยังโจมตีเมืองอย่างไม่ปรานีอีกด้วย... เราต้องอพยพชาวเมืองก่อน...!"
12130-93 = "ทำไมถึงได้... ยกพวกมาขนาดนี้... แล้วทำไมถึง... จะทำยังไงดี..."
12130-98 = "รู้ตำแหน่งคณะกรรมการแผนงานแล้ว! ทางนี้!!\n\n"
12130-100 = "อึก?!"
12130-104 = "ทหารสอดแนมสินะ มาถึงนี่เลย...\n\n"
12130-105 = "พบทหารสอดแนมของไคเซอร์ PMC ในโรงเรียนอะบิดอส! พวกนั้นเข้ามาในโรงเรียนแล้วค่ะ!\n\n"
12130-106 = "ก่อนอื่นเราต้องจัดการศัตรูที่บุกรุกเข้ามาในโรงเรียนก่อน! อายาเนะจัง! ฝากด้วยนะ!\n\n"
12130-107 = "ค่ะ! ความปลอดภัยของคุณครูต้องมาเป็นอันดับแรก ตอนนี้เริ่มจากกวาดล้างพวกที่บุกรุกเข้ามาในโรงเรียน#nก่อนเถอะค่ะ! \n"
12130-109 = "พอโรงเรียนปลอดภัยแล้ว จะเริ่มอพยพชาวเมืองทุกคนต่อไปค่ะ!"

1010702-62 = "3;치아키;12;그렇다면그렇다면~~ 여기서 본론으로 돌아가서!\n#3;em;[재잘]\n#3;m2"
1010702-63 = "3;치아키;08;정기 구독은 어떠신가요?\n#3;hophop\n#3;m4"
1010702-64 = "3;치아키;12;매주 새로운 내용의 <주간 만마전>을 받아 보실 수 있는데요!\n#3;hophop\n#3;m3"
1010702-65 = "3;치아키;08;지금이라면 푸짐한 선물까지!\n#3;closeup\n#3;em;[반짝]"
1010702-66 = "[s] \"좋아, 구독할게.\""
1010702-67 = "3;치아키;02;앗, 정말인가요?\n#3;em;[반응]"
1010702-68 = "3;치아키;12;감사합니다~! <주간 만마전>이 게헨나 밖으로도 한 발짝 내딛는 영광스러운 순간이네요!\n#3;hophop"

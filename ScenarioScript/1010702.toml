1010702-74 = "3;치아키;02;마코토 선배도 만마전의 이름이 널리 널리 알려지길 원한다고 하셨으니까……."
1010702-75 = "3;치아키;03;괜찮겠죠, 아마도?\n#3;em;[음표]"

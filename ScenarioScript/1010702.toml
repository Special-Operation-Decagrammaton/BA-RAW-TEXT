[translation]
1010702-1 = "萬魔殿的書記"
1010702-3 = "呀齁～我送週刊來囉！"
1010702-4 = "[s]「門沒鎖，直接進來就行了！」"
1010702-9 = "你好～我是千秋！"
1010702-10 = "啊，應該沒有打擾到老師吧？"
1010702-11 = "[s]「不會，我現在剛好有空。」"
1010702-12 = "太好了！那麼就打擾囉～"
1010702-16 = "哇～夏萊真不錯呢！感覺真舒服！#n老師一直都在這裡工作嗎？"
1010702-17 = "不知道是不是因為空氣好的關係，老師的皮膚看起來特別光滑呢～！"
1010702-18 = "[s]「這兩件事……有關聯嗎？」"
1010702-19 = "哎呀～反正都是好事嘛！"
1010702-20 = "那麼，為老師準備的驚喜禮物～現在即將揭曉！"
1010702-21 = "鏘～！是最新一期的《週刊萬魔殿》！"
1010702-22 = "嗯？難道老師沒看過嗎？"
1010702-23 = "咦……什麼是《週刊萬魔殿》？"
1010702-24 = "怎，怎麼可能……#n格黑娜最快速、快準確、最有良心的《週刊萬魔殿》，老師竟然沒看過……"
1010702-25 = "這……這實在是……"
1010702-26 = "[s]「千秋？」"
1010702-27 = "實在是太棒了！！"
1010702-28 = "這樣老師就能享受到第一次閱讀《週刊萬魔殿》的樂趣了！"
1010702-29 = "能親眼見證老師第一次閱讀的場景，對我來說也是非常開心的事哦！"
1010702-30 = "這週有包含＜大獨家！萬魔殿休息室探險記＞、#n＜大放送！伊吹醬沙地遊戲活動紀錄＞在內的許多精彩報導！"
1010702-31 = "還請慢慢享受～！"
1010702-32 = "[s]「啊，嗯，謝謝。」"
1010702-33 = "如果老師想要的話，我也可以直接讀給你聽唷？"
1010702-34 = "這是身為書記兼《週刊萬魔殿》記者兼編輯兼發行人的我──#n元宮千秋為老師提供的專題報導閱讀服務！"
1010702-35 = "怎麼樣？要不要現在就開始？"
1010702-36 = "[s1]「沒關係，我自己看就行了。」\n[s2]「那就拜託你了。」"
1010702-37 = "是，是嗎？真的不需要嗎？"
1010702-38 = "這種服務可不是常常有的哦？#n要是錯過的話，之後說不定會後悔的哦？"
1010702-42 = "嗯？剛才是開玩笑的？"
1010702-43 = "嘿嘿！老師果然也不想錯過這個機會吧～？"
1010702-44 = "真是明智的選擇～"
1010702-45 = "那就交給我吧！"
1010702-46 = "好，那麼請看第一頁！#n這張照片是萬魔殿的辦公室哦！"
1010702-47 = "是我和其他幹部們，每天都會造訪的地方～"
1010702-48 = "沙發超級鬆軟的唷！老師之後也來躺躺看吧！"
1010702-49 = "嗯？辦公室應該是用來辦公的地方？"
1010702-50 = "這個嘛……#n畢竟我的工作是書記，只要在會議時記錄就行了……"
1010702-51 = "不過我們平時也不太常開會，所以大概是「怎樣都OK啦～！」這種感覺吧？"
1010702-52 = "好，那麼請翻到下一頁！"
1010702-53 = "啊，這篇報導可是費了不少心血哦！我來親自讀給你聽吧～！"
1010702-55 = "（之後繼續和千秋一起閱讀了《週刊萬魔殿》……）"
1010702-57 = "啊，到最後一頁了呢。"
1010702-58 = "哎呀～沒想到時間讀著讀著就過去了！"
1010702-59 = "第一次讀《週刊萬魔殿》的感想如何呀，老師？"
1010702-60 = "[s]「嗯，還挺有趣的。」"
1010702-61 = "嘿嘿，老師果然很有眼光～！"
1010702-62 = "那麼那麼～接下來才是正題！"
1010702-63 = "老師要不要訂閱一下呀？"
1010702-64 = "這樣就能每週收到全新一期的《週刊萬魔殿》了唷！"
1010702-65 = "現在訂閱的話，還能獲得豐富的禮物！"
1010702-66 = "[s]「嗯，那我就訂閱吧。」"
1010702-67 = "真，真的嗎？"
1010702-68 = "太感謝了～！#n這是《週刊萬魔殿》向格黑娜之外邁出第一步的光榮時刻！"
1010702-69 = "[s]「訂閱費是多少呢？」"
1010702-70 = "當然是免費囉！"
1010702-71 = "這終究不是為了賺錢而做的活動。#n也算是半個興趣吧！"
1010702-72 = "印刷費與發行費之類的費用，全都會由萬魔殿的預算100%支付！"
1010702-73 = "[s]「……這樣沒問題嗎？」"
1010702-74 = "畢竟真琴前輩也希望萬魔殿的名字能廣為人知……"
1010702-75 = "大概……沒問題吧？"
1010702-76 = "[s]（只有大概啊……）"
1010702-80 = "那麼這個給你！#n請在訂閱者的名單上簽名！"
1010702-81 = "沒錯，就是那邊！"
1010702-85 = "非常感謝～！"
1010702-86 = "老師竟然這麼爽快地答應訂閱，親自走一趟夏萊真是值回票價呢！"
1010702-87 = "[s]「你常常這樣親自上門推銷嗎？」"
1010702-88 = "我通常都是用MomoTalk或電話推銷……不過有時間的話，我也會親自走一趟！"
1010702-89 = "除了認識並跟新學生聊天很有趣之外，我也想親眼見到閱讀我報導的人越來越多。"
1010702-90 = "而且老實說……"
1010702-91 = "如果對方是我想在＜大專訪！遇見此人！＞專欄裡介紹的人，我也會優先拜訪！"
1010702-92 = "所以我真心希望，有朝一日也能採訪到老師～"
1010702-93 = "[s]「如果是在空閒時間的話，我隨時都很歡迎。」"
1010702-94 = "真的嗎！不愧是老師，我就知道你一定不會拒絕的～！"
1010702-95 = "那麼為了表示感謝，下週我會寄兩份《週刊萬魔殿》過來的！"
1010702-96 = "希望老師能看得開心，可以的話也幫我推薦給身邊的人哦～！"

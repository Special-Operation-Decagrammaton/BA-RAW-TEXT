1010702-58 = "3;치아키;13;이야~ 시간 가는 줄도 모르고 읽었네요!"
1010702-59 = "3;치아키;07;처음으로 읽은 <주간 만마전>은 어떠셨나요, 선생님?\n#3;em;[반짝]"

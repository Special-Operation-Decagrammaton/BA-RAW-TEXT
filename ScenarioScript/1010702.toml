1010702-3 = "#na;치아키;얏호~ 신문 배달 왔는데요!"
1010702-4 = "[s] \"문, 열려 있으니까 그냥 들어와도 괜찮아!\""
1010702-5 = "#st;[0,0];instant;1;"

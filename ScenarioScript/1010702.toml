1010702-95 = "3;치아키;12;감사의 뜻으로, 다음 주 <주간 만마전>은 두 부 보내 드리겠습니다!\n#3;m1\n#3;hophop"
1010702-96 = "3;치아키;12;재밌게 보시고 주변에도 알려주세요~!"

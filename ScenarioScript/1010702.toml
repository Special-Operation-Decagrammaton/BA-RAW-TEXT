1010702-83 = "#clearST"
1010702-84 = "#wait;2000"
1010702-85 = "3;치아키;12;감사합니다~!\n#3;hophop"
1010702-86 = "3;치아키;13;이렇게 흔쾌히 구독해 주시다니, 샬레에 직접 권유하러 온 보람이 있네요!\n#3;em;[음표]"
1010702-87 = "[s] \"늘 이렇게 직접 권유하러 다니는 거야?\""
1010702-88 = "3;치아키;01;보통은 모모톡이라든가 전화로 권유할 때도 있지만…… 시간 날 때마다 직접 다니고 있답니다!"
1010702-89 = "3;치아키;03;새로운 학생들을 만나서 이야기하는 것도 재밌고, 제 신문을 읽어주는 사람이 늘어나는 것도 눈으로 직접 보고 싶거든요."
1010702-90 = "3;치아키;02;그리고, 솔직히 말씀드리자면…….\n#3;em;…"
1010702-91 = "3;치아키;03;<대 인터뷰! 이 사람을 만나봤다!> 코너에서 다루고 싶은 사람이라면 우선해서 방문하는 편이거든요!"
1010702-92 = "3;치아키;02;그래서 언젠가 선생님도 취재하고 싶다는 게 솔직한 마음입니다만~"

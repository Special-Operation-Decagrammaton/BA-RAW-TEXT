[translation]
1010702-1 = "เลขาของแพนเดโมเนียม โซไซตี้"
1010702-3 = "ยะฮู้ว~ มีของมาส่งค่า!"
1010702-4 = "[s] \"ประตูไม่ได้ล็อก เข้ามาได้เลย!\""
1010702-9 = "สวัสดีค่ะ~ จิอากิเองค่ะ!"
1010702-10 = "อ๊ะ นี่ฉันไม่ได้มารบกวนตอนงานยุ่งใช่มั้ยคะ?"
1010702-11 = "[s] \"ไม่หรอก ตอนนี้ครูกำลังว่างอยู่พอดี\""
1010702-12 = "โล่งอกไปที! ถ้างั้นก็ขอเสียมารยาทหน่อยนะคะ~"
1010702-16 = "ว้าว~ สำนักงานชาเล่ต์สวยจังเลยนะคะ! ดูปลอดโปร่งดีด้วย! คุณครูทำงานอยู่ที่นี่ตลอดเลยเหรอคะ?"
1010702-17 = "คงเป็นเพราะอากาศถ่ายเทสะดวก วันนี้คุณครูก็เลยผิวเนียนเลยนะคะ~!"
1010702-18 = "[s] \"มันเกี่ยว... กันด้วยเหรอ?\""
1010702-19 = "เอาเถอะค่ะ อะไรดีก็ว่าดีสิคะ"
1010702-20 = "เอาละ ถึงเวลาเปิดของเซอร์ไพรส์~ ที่ฉันเตรียมมาให้คุณครู!"
1010702-21 = "แต่นแต๊น! <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ฉบับล่าสุด!"
1010702-22 = "คะ? เพิ่งเคยเห็นเลยเหรอคะ?"
1010702-23 = "แล้วก็... ไม่รู้ด้วยว่า <แพนเดโมเนียม โซไซตี้รายสัปดาห์> คืออะไร?"
1010702-24 = "ปะ... เป็นไปได้ยังไง... คุณครูยังไม่เคยอ่าน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> นิตยสารราย#nสัปดาห์ที่ตีพิมพ์ไว ถูกต้องแม่นยำ และมีมโนธรรมที่สุดในเขตปกครองตนเองเกเฮนน่าเหรอคะ..."
1010702-25 = "แบบนี้ต้องบอกว่า... ว่า..."
1010702-26 = "[s] \"จิอากิ?\""
1010702-27 = "สุดยอดไปเลยค่ะ!!"
1010702-28 = "คุณครูจะได้สัมผัสถึงความสนุกในการอ่าน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> เป็นครั้งแรกยังไง#nล่ะคะ!"
1010702-29 = "ฉันจะได้อยู่กับคุณครูตอนอ่านนิตยสารของเราเป็นครั้งแรก สำหรับฉันแล้วนั่นจะต้องเป็นประสบการณ์#nที่สนุกมากๆ เลยละค่ะ"
1010702-30 = "สัปดาห์นี้มีสกู๊ปข่าวเพียบเลย ทั้ง <สกู๊ปพิเศษ! พาทัวร์ห้องพักผ่อนของแพนเดโมเนียม โซไซตี้> และ <บันทึกการเล่นทรายของอิบูกิจังที่ไม่เคยเปิดเผยที่ไหนมาก่อน!> ด้วยค่ะ"
1010702-31 = "อ่านให้สนุกนะคะ~!"
1010702-32 = "[s] \"อ่า อืม... ขอบใจนะ\""
1010702-33 = "ไม่ทราบว่า... ให้ฉันอ่านให้คุณครูฟังได้มั้ยคะ?"
1010702-34 = "เป็นเซอร์วิสอ่านสกู๊ปพิเศษจากจิอากิ ผู้เป็นทั้งเลขานุการ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> นักข่าว บรรณาธิการ และผู้ตีพิมพ์นิตยสารนี้ยังไงล่ะคะ!"
1010702-35 = "ว่าไงล่ะคะ? เริ่มตอนนี้เลยมั้ยคะ?"
1010702-36 = "[s1] \"ไม่เป็นไร ไว้ครูอ่านคนเดียวดีกว่า\"\n[s2] \"งั้นครูรบกวนหน่อยนะ\""
1010702-37 = "งะ... งั้นเหรอคะ? ไม่อยากให้ฉันอ่านให้ฟังจริงๆ เหรอคะ?"
1010702-38 = "เซอร์วิสแบบนี้ไม่ได้มีบ่อยๆ นะคะ ถ้าพลาดโอกาสนี้ไป คุณครูจะเสียใจทีหลังนะคะ"
1010702-42 = "คะ? ล้อเล่นงั้นเหรอคะ?"
1010702-43 = "ฮิฮิ! จะยอมพลาดโอกาสดีๆ แบบนี้ไม่ได้ใช่มั้ยล่ะคะ~?"
1010702-44 = "ตัดสินใจได้ยอดเยี่ยมเลยค่ะ~"
1010702-45 = "งั้นก็ให้เป็นหน้าที่ของฉันเลยค่ะ!"
1010702-46 = "เอาละ เปิดหน้าแรกดูเลยค่ะ! รูปนี้คือห้องทำงานของแพนเดโมเนียม โซไซตี้ค่ะ!"
1010702-47 = "เป็นที่ที่ฉันและสมาชิกคนอื่นไปทุกวันเลยละ~"
1010702-48 = "โซฟาตัวที่เห็นน่ะ นุ้มนุ่มมากเลยนะคะ! ไว้คุณครูแวะไปนอนเล่นดูสิคะ!"
1010702-49 = "คะ? ห้องทำงานก็ควรเอาไว้ทำงานงั้นเหรอคะ?"
1010702-50 = "มันก็จริงอยู่หรอก... แต่งานของฉันคือเลขานุการ ฉันก็แค่จดนู่นจดนี่ตอนเราประชุมกัน..."
1010702-51 = "แต่ปกติแล้วเราก็ไม่ค่อยประชุมอะไรกันหรอกค่ะ จะนอนเล่นบนโซฟาก็ไม่เป็นอะไรหรอก~!"
1010702-52 = "เอาละ หน้าต่อไปเลยค่ะ!"
1010702-53 = "อ๊ะ นี่เป็นสกู๊ปข่าวที่ฉันตั้งใจเขียนมากเลยค่ะ! ฉันจะอ่านให้ฟังนะคะ~!"
1010702-55 = "(หลังจากนั้นคุณครูก็ฟังจิอากิอ่านนิตยสาร <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ให้ฟัง...)"
1010702-57 = "อ๊ะ มาถึงหน้าสุดท้ายแล้ว"
1010702-58 = "โห~ อ่านเพลินจนลืมดูเวลาเลยนะคะเนี่ย!"
1010702-59 = "<แพนเดโมเนียม โซไซตี้รายสัปดาห์> ที่ได้ลองอ่านครั้งแรกเป็นยังไงบ้างคะคุณครู?"
1010702-60 = "[s] \"อื้อ สนุกดีนะ\""
1010702-61 = "ฮิฮิ ตาถึงนะคะเนี่ย~!"
1010702-62 = "ถ้างั้นก็ ถ้างั้นก็~~ กลับเข้าเรื่องของเรากันค่ะ!"
1010702-63 = "คุณครูอยากสมัครรับนิตยสารเป็นประจำมั้ยล่ะคะ?"
1010702-64 = "คุณครูจะได้อ่าน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ที่มากับเนื้อหาใหม่ๆ ในทุกสัปดาห์เลยนะคะ!"
1010702-65 = "ถ้าสมัครรับตอนนี้ จะได้ของขวัญเยอะแยะเลยด้วย!"
1010702-66 = "[s] \"เอาสิ งั้นครูสมัครรับด้วยคน\""
1010702-67 = "อ๊ะ จริงเหรอคะ?"
1010702-68 = "ขอบคุณค่ะ~! นับเป็นช่วงเวลาที่น่าเป็นเกียรติที่ <แพนเดโมเนียม โซไซตี้รายสัปดาห์> จะได้ก้าวออกจากเกเฮนน่าอีกก้าวเลยนะคะ!"
1010702-69 = "[s] \"ค่าสมัครรับนิตยสารคิดยังไงเหรอ?\""
1010702-70 = "ถามมาได้ ก็ต้องฟรีอยู่แล้วค่ะ!"
1010702-71 = "นี่ไม่ใช่กิจกรรมที่ทำเพื่อแสวงหาผลกำไรนี่คะ แล้วมันก็เป็นงานอดิเรกของฉันด้วยค่ะ!"
1010702-72 = "ทั้งค่าพิมพ์ ค่าเข้าเล่ม ทั้งหมดทางแพนเดโมเนียม โซไซตี้เป็นคนออกค่าใช้จ่ายให้ค่ะ!"
1010702-73 = "[s] \"แบบนั้นจะไม่เป็นไรเหรอ...?\""
1010702-74 = "รุ่นพี่มาโคโตะเองก็อยากให้ชื่อของแพนเดโมเนียม โซไซตี้เป็นที่รู้จักอย่างกว้างขวางด้วย..."
1010702-75 = "ถ้างั้นก็ไม่เป็นไรหรอกค่ะ น่าจะนะ?"
1010702-76 = "[s] (น่าจะงั้นเหรอ...)"
1010702-80 = "ถ้างั้นก็เซ็นตรงนี้เลยค่ะ! เซ็นชื่อในช่องสมัครรับนิตยสารของเราได้เลยค่ะ!"
1010702-81 = "ใช่ค่ะ ตรงนั้นละค่ะ!"
1010702-85 = "ขอบคุณค่ะ~!"
1010702-86 = "ขอบคุณที่เต็มใจสมัครรับนะคะ คุ้มค่าจริงๆ เลยนะคะที่ฉันมาแนะนำนิตยสารให้ด้วยตัวเองถึงชาเล่ต์!"
1010702-87 = "[s] \"ปกติออกไปหาผู้อ่านแบบนี้เองตลอดเหรอ?\""
1010702-88 = "ปกติฉันจะแนะนำนิตยสารทาง MOMOTALK หรือไม่ก็ทางโทรศัพท์ค่ะ... แต่ว่าถ้ามีเวลาฉันก็จะออก#nมาเองเหมือนวันนี้ค่ะ!"
1010702-89 = "การได้ออกไปเจอและพูดคุยกับเพื่อนนักเรียนใหม่ๆ เป็นเรื่องสนุกค่ะ แล้วฉันก็อยากเห็นว่ามีคนที่อ่าน#nนิตยสารของเรามากขึ้นด้วยตาของตัวเองด้วย"
1010702-90 = "และอีกหนึ่งเหตุผล ถ้าจะให้พูดตรงๆ ละก็..."
1010702-91 = "ถ้ามีคนที่อยากสัมภาษณ์ในหัวข้อ <สัมภาษณ์ครั้งใหญ่! ดูสิว่าเราเจอใครมา!> ฉันก็จะไปหาคน#nคนนั้นด้วยตัวเองก่อนค่ะ!"
1010702-92 = "เพราะงั้นฉันก็เลยคิดว่าอยากเก็บข้อมูลของคุณครูในสักวันด้วยค่ะ~"
1010702-93 = "[s] \"ถ้าครูไม่มีงานอะไรเป็นพิเศษก็มาได้ตลอดเลย\""
1010702-94 = "งั้นเหรอคะ! นี่สิคะคุณครูของฉัน ฉันเชื่อในตัวคุณครูเสมอเลยค่ะ~!"
1010702-95 = "เพื่อเป็นการขอบคุณ ฉันจะส่ง <แพนเดโมเนียม โซไซตี้รายสัปดาห์> ฉบับสัปดาห์หน้าให้สองเล่ม#nเลยค่ะ!"
1010702-96 = "อ่านให้สนุกและฝากแนะนำให้คนอื่นอ่านด้วยนะคะ~!"

1010702-8 = "1;치아키;12\n#1;ar\n#wait;1000"
1010702-9 = "1;치아키;12;안녕하세요~ 치아키입니다!\n#1;hophop"
1010702-10 = "1;치아키;02;아, 혹시 바쁘신데 방해한 건 아니겠죠?\n#1;em;[반응]"
1010702-11 = "[s] \"응, 마침 한가한 참이었어.\""
1010702-12 = "1;치아키;03;다행이네요! 그럼 실례하겠습니다~"
1010702-13 = "#st;[0,0];instant;1;"
1010702-14 = "#clearST"
1010702-15 = "1;치아키;03\n#1;m3\n#wait;1500"
1010702-16 = "1;치아키;01;이야~ 샬레는 좋네요! 쾌적하고! 선생님은 항상 여기서 근무하시는 건가요?"
1010702-17 = "1;치아키;12;공기가 좋아서 그런지 오늘 선생님 피부도 매끈하시네요~!\n#1;em;[재잘]\n#1;hophop"
1010702-18 = "[s] \"관계…… 있는 거야, 그거?\""
1010702-19 = "1;치아키;01;뭐어, 좋은 게 좋은 거니까요!"
1010702-20 = "1;치아키;07;자아, 그럼, 선생님 드리려고 준비한 깜짝선물~ 대공개 타임! 입니다!\n#1;em;[반짝]"
1010702-21 = "1;치아키;12;짠! <주간 만마전> 최신 호!\n#1;closeup\n#1;greeting"
1010702-22 = "1;치아키;02;네? 처음 보신다구요?\n#1;em;[?]"
1010702-23 = "1;치아키;09;그보다…… <주간 만마전>이 뭐냐고요?"
1010702-24 = "1;치아키;06;이, 이럴 수가…… 게헨나 자치구 최고의 신속하고, 정확하고, 양심있는 주간지인 <주간 만마전>을 아직 못 보셨다니…….\n#1;m2\n#1;em;[?!]\n#1;jump"
1010702-25 = "1;치아키;10;이건 그야말로…… 그야말로…….\n#1;stiff"
1010702-26 = "[s] \"치아키?\""
1010702-27 = "1;치아키;12;최고네요!!\n#1;hophop\n#1;m3\n#1;em;[!]\n#fontsize;80"
1010702-28 = "1;치아키;08;<주간 만마전>을 처음 보는 즐거움을 느낄 수 있으니까요!"
1010702-29 = "1;치아키;12;선생님이 처음 읽는 현장을 함께할 수 있다니, 이건 저로서도 굉장히 즐거운 일이네요!\n#1;hophop"
1010702-30 = "1;치아키;07;<대특종! 만마전 휴게실 탐험기>, <대방출! 이부키 쨩 모래놀이 활동 기록> 등, 이번 주도 알찬 기사가 가득가득가득이랍니다!\n#1;em;[반짝]"
1010702-31 = "1;치아키;03;재밌게 즐겨주세요~!"
1010702-32 = "[s] \"아, 응, 고마워.\""
1010702-33 = "1;치아키;02;혹은, 제가 직접 읽어드릴 수도 있는데요?"
1010702-34 = "1;치아키;12;서기 겸 <주간 만마전> 기자 겸 편집장 겸 발행인인 저, 치아키와 함께 읽는 특집 기사 서비스!\n#1;hophop\n#1;m2"
1010702-35 = "1;치아키;08;어떤가요? 지금 당장 시작할까요?\n#1;m4\n#1;em;[반짝]\n#1;hophop"
1010702-36 = "[s1] \"괜찮아. 혼자 읽어볼게.\"\n[s2] \"그럼 부탁해 볼까?\""
1010702-37 = "1;치아키;06;그, 그런가요? 정말 필요 없으신가요?\n#1;m3\n#1;em;[땀]"
1010702-38 = "1;치아키;09;흔히 있는 서비스가 아닌데요? 놓치면 후회할지도 모르는데요?"
1010702-39 = "#st;[0,0];instant;1;"
1010702-40 = "#clearST"
1010702-41 = "#wait;2500"
1010702-42 = "1;치아키;02;네? 장난이라구요?"
1010702-43 = "1;치아키;12;헤헷! 역시 이런 기회, 놓칠 수 없으신 거죠~?\n#1;em;[재잘]"
1010702-44 = "1;치아키;13;탁월한 선택이십니다~"
1010702-45 = "1;치아키;08;그럼 맡겨만 주시죠!\n#1;em;[반짝]"
1010702-46 = "1;치아키;07;자, 그럼 첫 페이지를 봐주세요! 이 사진이 바로 만마전의 사무실이랍니다!"
1010702-47 = "1;치아키;03;저와 다른 임원들이 매일 방문하는 곳이지요~"
1010702-48 = "1;치아키;12;소파가 엄청 푹신푹신푹신하답니다! 선생님도 나중에 와서 누워 보세요!\n#1;hophop"
1010702-49 = "1;치아키;02;네? 사무실에서 업무는 안 하냐구요?\n#1;em;[?]"
1010702-50 = "1;치아키;06;뭐어, 제 업무는 서기니까, 회의할 때 받아적기만 하면 되고……."
1010702-51 = "1;치아키;03;그치만 웬만하면 회의 같은 건 잘 안 열리니까 아무튼 오케이~! 라는 느낌?"
1010702-52 = "1;치아키;12;자아, 그럼 다음 페이지!\n#1;em;[음표]"
1010702-53 = "1;치아키;07;아, 여기는 꽤나 공들인 기사거든요! 직접 읽어드릴게요~!"

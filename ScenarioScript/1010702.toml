[translation]
1010702-1 = "The Pandemonium Society's Secretary"
1010702-3 = "Yahoo! Newspaper delivery!"
1010702-4 = "[s] \"The door's open. Come on in!\""
1010702-9 = "Hello! Chiaki here!"
1010702-10 = "...I'm not interrupting you when you're busy, am I?"
1010702-11 = "[s] \"All good, I'm free right now.\""
1010702-12 = "Phew, glad to hear it! Don't mind me, then..."
1010702-16 = "...Wow, Schale is really nice! It's so spacious! Do you always work here, Sensei?"
1010702-17 = "Also, your skin is looking all shiny today. Maybe 'cause the air's so fresh!"
1010702-18 = "[s] \"Is that, um, pertinent to something?\""
1010702-19 = "Nah, just saying, what's good is good, right?"
1010702-20 = "Oh, right! I have a big surprise gift for you! Behold, the grand reveal..."
1010702-21 = "...Tada! The newest issue of \"Weekly Pandemonium Society\"!"
1010702-22 = "...Wait, is this your first time seeing it?"
1010702-23 = "So you...didn't know what \"Weekly Pandemonium Society\" is?"
1010702-24 = "You're telling me...you haven't read a single issue...of the fastest, most accurate, most integrous weekly magazine in the whole Gehenna district...?"
1010702-25 = "This, uh... This is really..."
1010702-26 = "[s] \"...Chiaki?\""
1010702-27 = "This is the BEST!!"
1010702-28 = "You can enjoy the experience of reading it for the very first time!"
1010702-29 = "And I get to experience YOUR experience of reading it for the very first time! This is going to be great!"
1010702-30 = "Plus this week is super-full of all these great articles, like \"Exclusive Report! Pandemonium Society Break Room Tour\" and \"Big Release! Ibuki's Sand Play Activity Records\"!"
1010702-31 = "So enjoy the read!"
1010702-32 = "[s] \"Will do. Thank you.\""
1010702-33 = "Or I can read it TO you, you know..."
1010702-34 = "It's a special service! Chiaki, the Pandemonium Society's secretary, and the reporter-editor-publisher of \"Weekly Pandemonium Society,\" reads the articles straight to you!"
1010702-35 = "What do you say? Do you want to start right away?"
1010702-36 = "[s1] \"It's fine, I'll read it on my own schedule.\"\n[s2] \"Sure, go right ahead.\""
1010702-37 = "R-Really? You sure you don't want me to?"
1010702-38 = "It's a rare opportunity, you know. You might regret it."
1010702-42 = "...Oh, you were joking?"
1010702-43 = "Heehee! I knew it! You couldn't miss this opportunity, right?"
1010702-44 = "A great choice!"
1010702-45 = "Leave it to me!"
1010702-46 = "Now then, look at the first page! What you see in this photo is the Pandemonium Society's office!"
1010702-47 = "That's where the other members and I go every day!"
1010702-48 = "The sofa is super-super-super fluffy! You should come try it sometime, Sensei!"
1010702-49 = "Hm? Am I not working while I'm there?"
1010702-50 = "Well, since I'm a secretary, I just have to jot things down in the meetings..."
1010702-51 = "But we hardly ever HAVE meetings, so it...just kind of works out, I guess?"
1010702-52 = "Now then, next page!"
1010702-53 = "Ah, I put some time and effort into this one! I'll read it to you...!"
1010702-55 = "I continued to read \"Weekly Pandemonium Society\" with Chiaki..."
1010702-57 = "...Oh, this is the last page!"
1010702-58 = "Wow, time really flew by, huh?"
1010702-59 = "So, your first time reading \"Weekly Pandemonium Society\"! What'd you think, Sensei?"
1010702-60 = "[s] \"It was fun.\""
1010702-61 = "Heehee, you've got good taste!"
1010702-62 = "Okay then, going back to the main point..."
1010702-63 = "Would you be interested in a regular subscription?"
1010702-64 = "You can get new \"Weekly Pandemonium Society\" content every week!"
1010702-65 = "And if you subscribe now, you'll also get lots of gifts!"
1010702-66 = "[s] \"Okay, I'll subscribe.\""
1010702-67 = "Ah, really?"
1010702-68 = "Thank you! This is a milestone for \"Weekly Pandemonium Society\" too. Another step outside of Gehenna!"
1010702-69 = "[s] \"How much is the subscription fee?\""
1010702-70 = "It's free, of course!"
1010702-71 = "I don't do this for money. It's just for fun!"
1010702-72 = "And the printing and publishing fees, those are 100% covered by the Pandemonium Society budget!"
1010702-73 = "[s] \"...Is that okay?\""
1010702-74 = "Well, Makoto did say she wanted the Pandemonium Society's name to spread far and wide..."
1010702-75 = "So...yes, probably?"
1010702-76 = "[s] \"(Probably?)\""
1010702-80 = "Now, then! Just sign here on the subscriber list, please!"
1010702-81 = "Yup, right there!"
1010702-85 = "Thank you!"
1010702-86 = "I'm so glad you were open to this. Good thing I came here to advertise!"
1010702-87 = "[s] \"Do you always go around and advertise in person?\""
1010702-88 = "Nah, it's usually with MomoTalk or phone calls...but I do go around myself when I have time!"
1010702-89 = "It's fun to meet new students and talk with them. Also, I want to see more people reading my newspaper with my own eyes."
1010702-90 = "And to be honest..."
1010702-91 = "...I typically prioritize visiting people I want to discuss in the \"Big Interview! I Met This Person!\" column."
1010702-92 = "So, still being honest, I'd love to interview you sometime, Sensei."
1010702-93 = "[s] \"I'm fine whenever, unless I have something special going on.\""
1010702-94 = "Really? I knew I could count on you, Sensei!"
1010702-95 = "To show my thanks, I'll send you TWO issues next week!"
1010702-96 = "Please enjoy them, and spread the word too!"

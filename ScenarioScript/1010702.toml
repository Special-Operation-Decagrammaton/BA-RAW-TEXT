1010702-70 = "3;치아키;12;그야 물론, 공짜랍니다!\n#3;jump\n#3;em;[!]"
1010702-71 = "3;치아키;01;돈 벌려고 하는 활동은 아니니까요. 반쯤 취미거든요!"
1010702-72 = "3;치아키;11;인쇄비, 발행비 모두 만마전 예산으로 100% 커버하고 있답니다!"

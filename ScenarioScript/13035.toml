[translation]
13035-3 = "Wow, wow, wow! These guys are stronger...stronger than a train!!!"
13035-4 = "We got whooped..."
13035-8 = "Don't look, but I think they surrounded us! This is gonna impact scheduling for sure!"
13035-9 = "That's a problem... Construction's all messed up."
13035-11 = "They talked so big...but they were...so weak..."
13035-13 = "No more meaningless fighting. Answer my questions!"
13035-14 = "What business does Highlander Railroad Academy have in Abydos?! What's your goal?"
13035-15 = "You're smart enough to have put at least some of it together, no?"
13035-23 = "Overseer!"
13035-24 = "Please help... We're done for. They might kill us...for real."
13035-26 = "Another Highlander student? Who are you?"
13035-27 = "You their friend? Carrying out a rescue mission?"
13035-29 = "...Friend would be more than a stretch."
13035-31 = "What?!"
13035-32 = "You can't trust anyone..."
13035-34 = "I suppose my assignment is technically to rescue them. But I assure you, it's a matter of obligation."
13035-35 = "My name is Asagiri Suou. I'm the overseer at Highlander Railroad Academy who answers only to the board of directors."
13035-36 = "An overseer?"
13035-37 = "It's nothing fancy. I'm an errand girl for the higherups. And unfortunately, those idiotic..."
13035-38 = "*sigh* I mean, the twins you've apprehended are Tachibana Hikari and Nozomi, officers of the Central Control Center, or the CCC."
13035-39 = "Our relationship is more so...those of adversaries that won't hesitate to deceive the other, but are forced to occasionally work together."
13035-41 = "Exactly! She plays the role of overseer perfectly! An evil villain who hates construction! She lives only to disrupt our schedules."
13035-42 = "And back it up. Weren't you gonna call us something really, really mean?"
13035-43 = "Yuppies. She was. How rude."
13035-48 = "Our academy is made up of branch organizations with independent authority. So we may be under the same banner, but by no means are we allies. "
13035-49 = "Each railway route and region is controlled by different factions."
13035-50 = "Back to the matter at hand."
13035-51 = "As their overseer, I apologize. They failed to follow proper procedure and acted recklessly, so they are entirely at fault for the current situation."
13035-52 = "..."
13035-53 = "I'm sure you're aware, but we now own the development rights for Abydos' railway."
13035-55 = "That can't be true!"
13035-56 = "We've looked into it! Nephthys bought out the bonds, not Highlander Academy!"
13035-58 = "We're one and the same at this point."
13035-59 = "As a corporate academy, it's common for Highlander to enter into contracts with private enterprises."
13035-60 = "Long story short, Nephthys' rights and duties are also Highlanders'. Were you not aware, Miss Izayoi Nonomi?"
13035-65 = "You know each other?"
13035-66 = "Nothing like that, but..."
13035-68 = "I'll let her explain. For now, would you mind transferring Dumb and Dumber into my custody? In return, I'll come to Abydos High School and answer any questions you have."
13035-69 = "Th-That's..."
13035-70 = "You can let them go."
13035-78 = "Freedom!"
13035-79 = "Scary. That was so, super scary."
13035-80 = "Prepare your questions. I'll come pay you a visit as soon as I'm able."
13035-81 = "You two. We're leaving."
13035-86 = "Just like that…"
13035-90 = "..."
13035-91 = "C'mon, kiddos. Let's get out of here for now. I'm sure we'll get our answers soon."
13035-92 = "[ns] Head back to the Foreclosure Task Force room."
13035-97 = "Next Episode;Things Now Gone"

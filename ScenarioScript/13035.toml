[translation]
13035-3 = "ว้ายยย! คนพวกนี้โหดชะมัด...!"
13035-4 = "โดนเข้าจนได้..."
13035-8 = "เราถูกล้อมไว้หมดเลย... แบบนี้อาจจะก่อสร้างเสร็จไม่ทันก็ได้นะ..."
13035-9 = "งานเข้าแล้วไง เรื่องก่อสร้างเจ๊งแล้ว"
13035-11 = "อะไรของพวกนั้นน่ะ ตอนแรกดูไม่รู้เลยว่าเก่งขนาดนี้..."
13035-13 = "เราหยุดการต่อสู้ที่ไม่มีความหมายไว้แค่นี้เถอะค่ะ... มาเข้าประเด็นกันเลยดีกว่า"
13035-14 = "สถาบันการรถไฟไฮแลนเดอร์มาทำอะไรในอะบิดอสคะ? แล้วมีเป้าหมายอะไรกันคะ?"
13035-15 = "ก็น่าจะพอรู้กันมาบ้างแล้วไม่ใช่เหรอ?"
13035-23 = "ผู้ควบคุม!!"
13035-24 = "ช่วยด้วย ฉันถูกกินหัวแน่ ช่วยด้วยยย"
13035-26 = "ใครน่ะ...? นักเรียนไฮแลนเดอร์เหรอ...?"
13035-27 = "หืม~ มาช่วยพวกเดียวกันเหรอ?"
13035-29 = "ไม่หรอก... ที่จริงก็ไม่ใช่พวกเดียวกัน"
13035-31 = "ว่าไงนะ?!"
13035-32 = "โดนเข้าแล้วไง โดนหักหลังแล้ว"
13035-34 = "เดี๋ยวก่อน... ฉันมาช่วยก็จริงอยู่หรอก... แต่อย่ามองว่าฉันเป็นพวกเดียวกับคนพวกนั้น"
13035-35 = "ฉัน อาซากิริ สุโอ ผู้ควบคุมการก่อสร้าง สังกัดคณะกรรมการบริหาร สถาบันการรถไฟไฮแลนเดอร์"
13035-36 = "ผู้ควบคุมการก่อสร้าง...?"
13035-37 = "มองว่าเป็นเด็กที่คนใหญ่คนโตเรียกใช้งานก็ได้ ส่วนพวกเซ่อนั่น..."
13035-38 = "ฝาแฝดทาชิบานะ ฮิคาริกับโนโซมิ เป็นผู้บริหารของ Central Control Center หรือที่เรียกว่า CCC"
13035-39 = "เราก็เลยเป็นเหมือนคนที่คอยสอดส่องกับคนที่หลอกลวงน่ะ"
13035-41 = "ใช่! เป็นศัตรูของการก่อสร้าง! ปากบอกว่าควบคุมการก่อสร้าง แต่จริงๆ ก็เป็นตัวการที่ทำให้ก่อสร้าง#nเสร็จไม่ตรงเวลา!!"
13035-42 = "ว่าแต่เมื่อกี้เธอพูดอะไรไม่จบประโยครึเปล่า? พวกเซ่ออะไรนะ? ฟังแล้วของขึ้นชะมัด!"
13035-43 = "(พยักหน้าหงึกๆ!)"
13035-48 = "สถาบันของเรามีโครงสร้างที่ทุกองค์กรเล็กมีอำนาจอิสระ ดังนั้นต่อให้เป็นสถาบันเดียวกัน ก็ไม่ได้แปลว่าจะญาติดีกันเหมือนพวกเธอหรอกนะ "
13035-49 = "เรามีคณะที่ดูแลทางรถไฟแต่ละสายในแต่ละเขตต่างกันน่ะ"
13035-50 = "แต่ก็เอาเถอะ"
13035-51 = "ถึงจะเป็นความรับผิดชอบของฝาแฝดสองคนนี้ที่ไม่ทำงานตามขั้นตอน แต่ฉันก็ต้องขอโทษแทนใน#nฐานะผู้ควบคุม"
13035-52 = "......"
13035-53 = "ว่าแต่... พวกเธอก็น่าจะพอรู้ไม่ใช่เหรอว่าตอนนี้สิทธิ์ในการพัฒนาทางรถไฟข้ามทะเลทรายใน#nอะบิดอสเป็นของพวกเราน่ะ? "
13035-55 = "คะ?! ไม่เห็นจะรู้เลย..."
13035-56 = "นั่นมันเป็นกิจการของเนฟธิสนะคะ! ไม่ใช่ของไฮแลนเดอร์สักหน่อย...!"
13035-58 = "ก็นั่นแหละ"
13035-59 = "สถาบันการรถไฟไฮแลนเดอร์ของเราเป็นสถาบันศึกษาทางธุรกิจ จึงมีการร่วมมือด้านอุตสาหกรรม และการศึกษากับภาคธุรกิจเอกชนอยู่บ่อยๆ"
13035-60 = "นั่นก็แปลว่าตอนนี้ไฮแลนเดอร์มีสิทธิ์และหน้าที่เหมือนกับเนฟธิส เรื่องนั้นคุณน่าจะรู้ดีอยู่แล้วนะ คุณหนูอิซาโยอิ โนโนมิ?"
13035-65 = "คนรู้จักเหรอ?"
13035-66 = "มะ... ไม่ค่ะ... แต่ว่า..."
13035-68 = "เอาเถอะ ทีนี้จะปล่อยพวกเซ่อนี่ไปได้หรือยังล่ะ? เอาไว้ฉันจะไปที่โรงเรียนอะบิดอสอย่างเป็นทางการ แล้วอธิบายสถานการณ์ให้ฟัง"
13035-69 = "ระ... เรื่องนั้น..."
13035-70 = "ปล่อยตัวไปเถอะ..."
13035-78 = "รอดแล้ว!"
13035-79 = "กลัวแทบแย่เลย"
13035-80 = "ถ้าอยากรู้อะไรก็เตรียมคำถามไว้ล่ะ แล้วค่อยมาคุยรายละเอียดกันทีหลัง"
13035-81 = "งั้นก็กลับกันเถอะ"
13035-86 = "ไปซะแล้ว..."
13035-90 = "......"
13035-91 = "เอาเถอะ งั้นพวกเราก็กลับกันได้แล้วละ ทางนั้นบอกเอาไว้แล้วนี่ว่าจะมาอธิบายสถานการณ์ให้ฟังก่อน"
13035-92 = "[ns] กลับไปยังห้องคณะกรรมการแผนงาน"
13035-97 = "ตอนต่อไป;สิ่งที่ล่วงเลยไป"

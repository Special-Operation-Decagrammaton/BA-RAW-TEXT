[translation]
13035-3 = "哇啊啊啊！？這些傢伙超強的……！？"
13035-4 = "哇啊～被抓到了……"
13035-8 = "而且還被他們給包圍……這樣好像趕不上交期了……"
13035-9 = "糟糕～完蛋了～"
13035-11 = "這些人是怎樣。#n搞不清楚是強還是弱……"
13035-13 = "……請先停止這場無意義的戰鬥，趕緊進入正題。"
13035-14 = "高地人鐵道學園在阿拜多斯做什麼？你們有什麼目的？"
13035-15 = "你們應該多少猜到了吧？"
13035-23 = "監察官──！！"
13035-24 = "HELP～要被殺掉了～救救我們～"
13035-26 = "是誰……？又是高地人鐵道學園的學生……？"
13035-27 = "唔嘿～是來救他們的嗎？跟他們是同一陣線？"
13035-29 = "……不，不算是同一陣線。"
13035-31 = "你說什麼！？"
13035-32 = "中計了～被背叛了～"
13035-34 = "我的確是來救他們的沒錯……但我希望你們不要把我當成他們的同夥。"
13035-35 = "我的名字叫朝霧蘇芳。#n是高地人鐵道學園理事會直屬的監理監察官。"
13035-36 = "監理監察官……？"
13035-37 = "當成是為高層人士們跑腿的人就行了。#n至於那邊的笨……"
13035-38 = "那邊的雙胞胎是橘光、橘希望。#n兩人都是[ruby=Central Control Center]中央管制中心[/ruby]的幹部。"
13035-39 = "也就是說，我們之間是互相監視與欺騙的關係。"
13035-41 = "沒錯！工程之敵！把交期搞得亂七八糟的壞蛋就是你們監理室！！"
13035-42 = "話說你本來是想說什麼啊？#n感覺是一些會讓人心情很不好的話耶！？"
13035-43 = "對呀對呀！"
13035-48 = "我們學園的結構比較接近點線組織，#n因此就算屬於同一個學園，也不會像你們一樣相處融洽。"
13035-49 = "由於管理的鐵道路線與區域不同，就會產生不同派系。"
13035-50 = "不過總而言之……"
13035-51 = "雖然是因為那些做事不按部就班的人，事情才會發展成這樣……#n身為監察官的我在此向各位道歉。"
13035-52 = "……"
13035-53 = "你們應該也知道了吧？目前阿拜多斯沙漠橫貫鐵路的開發權掌握在我們手中。"
13035-55 = "咦！？不是那樣的！那個……"
13035-56 = "開發權應該屬於奈芙蒂斯集團！而不是高地人鐵道學園……！！"
13035-58 = "我正是這個意思。"
13035-59 = "我們高地人鐵道學園是企業型學園，常和其他私人企[ruby=industry-academia cooperation]業進行產學合作。　　[/ruby]"
13035-60 = "換句話說，現在我們學園與奈芙蒂斯擁有相同的權利和義務。#n這點你應該也很清楚吧？十六夜野乃美小姐？"
13035-65 = "野乃美認識他嗎？"
13035-66 = "不，我並不認識他……可是……"
13035-68 = "總之，現在可以請各位先放過那些笨蛋嗎？#n日後我會正式拜訪阿拜多斯，向各位仔細說明目前的狀況。"
13035-69 = "這，這……"
13035-70 = "……放他們走吧。"
13035-78 = "逃過一劫！"
13035-79 = "我好怕～哦～"
13035-80 = "如果有什麼想問的，希望你們能事先統整，以便到時候詳細討論。"
13035-81 = "告辭。"
13035-86 = "走掉了……"
13035-90 = "……"
13035-91 = "我們也先回去吧。#n反正對方也說會主動來說明情況了。"
13035-92 = "[ns] 回到對策委員會"
13035-97 = "下一話;那些逝去的事物"

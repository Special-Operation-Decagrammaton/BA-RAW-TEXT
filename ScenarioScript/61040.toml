[translation]
61040-1 = "第4話;河流匯聚之處"
61040-2 = "[ns]「好……其他準備總算搞定了……」"
61040-5 = "您撥的號碼是空號，請查明後再撥。"
61040-6 = "[s]「……你學會的玩笑變多了呢，敦子。」"
61040-7 = "呵呵。謝謝你有注意到，老師。"
61040-8 = "不過遇到陌生號碼打來的時候，就該這樣回答才對。"
61040-9 = "當然，我不可能認不出老師的號碼。"
61040-10 = "那麼重新來過。#n你好，老師。"
61040-11 = "[s]「你說過打招呼很重要對吧。最近過得如何？」"
61040-12 = "嗯，很開心你還記得。"
61040-13 = "最近過得如何是嗎……？#n唔嗯……暫時還可以吧？"
61040-14 = "雖然依舊得過著躲躲藏藏、小心翼翼的生活。"
61040-15 = "不過還挺有趣的。#n有空的時候也會偷偷找地方逛逛。"
61040-16 = "所以……嗯，整體來說算是不錯吧。"
61040-17 = "話說，老師找我有什麼事嗎？"
61040-18 = "[s1]「雖然這個問題可能有點突然……」\n[s2]「你覺得考試是什麼？」"
61040-21 = "考試？"
61040-22 = "呵呵，這問題真有老師的風格。"
61040-23 = "沒關係，老師不用道歉。#n我覺得很有老師的風範哦。"
61040-24 = "考試……就是對學過的東西進行評價對吧？"
61040-25 = "雖然我目前也只聽過這個概念而已……為什麼要問這個？"
61040-26 = "[s3]「那我想再問你一個……也有點突然的問題。」\n[s4]「如果有機會參加考試的話，你打算怎麼做？」"
61040-29 = "唔嗯……"
61040-30 = "比方說，確認該如何製造小孩的考試嗎？"
61040-31 = "如果是的話，說不定還挺有趣的。"
61040-32 = "[s]「不是那個啦！」"
61040-33 = "抱歉抱歉。"
61040-34 = "老實說，我不太清楚。"
61040-35 = "因為我從來沒想過，也沒經歷過這種事。"
61040-36 = "不過如果能學到一些東西，然後獲得「學得不錯」的認可……"
61040-37 = "……嗯。"
61040-38 = "就像「普通的學生」一樣……對吧。"
61040-39 = "雖然不知道其他人的意見，但我自己可能會覺得有點期待？"
61040-40 = "可能會不及格？"
61040-41 = "呵呵，那樣老師是不是就會幫我補課了呢？#n如果連這點都考慮進去的話，我覺得那也不壞哦。"
61040-42 = "但為什麼要問這個？"
61040-43 = "[s]「我在三一……遇到了奧利斯出身的轉學生。」"
61040-44 = "嗯？"
61040-48 = "……這樣啊，我懂了。"
61040-49 = "[s]「那些孩子很擔心你們……」"
61040-54 = "原來如此。"
61040-55 = "唔嗯……"
61040-56 = "老師？"
61040-57 = "這種話題，你會不會覺得用電話聊有點可惜？"
61040-58 = "[s5]「說的也是。」\n[s6]「萬一有人在竊聽就糟糕了。」"
61040-61 = "唔嗯……"
61040-62 = "其實我考慮的不是危險性耶？"
61040-63 = "[s]「那，那是……？」"
61040-64 = "就像剛才說的一樣。"
61040-65 = "因為覺得「可惜」。"
61040-66 = "這種事情，我更希望能跟老師面對面討論。"
61040-67 = "要是能跟大家一起就更好了。"
61040-68 = "[s7]「那地點就交給我來找吧。」\n[s8]「加上我應該一共是四個人吧。」"
61040-71 = "是五個人唷。"
61040-72 = "[s]「五個人……？」"
61040-76 = "[ns9]「原來如此……我懂了。」\n[ns10]「不過真的沒問題嗎？」"
61040-79 = "不用擔心。"
61040-80 = "我偶爾會跟沙醬見面，並不是完全沒有聯絡。"
61040-81 = "而且，他的「尋找自我」也差不多該結束了。#n……雖然這只是我在胡思亂想而已。"
61040-82 = "[s]「怎麼自己說是胡思亂想……」"
61040-83 = "呵呵。"
61040-84 = "每次提到沙醬的時候，美咲的表情就會變得很複雜。"
61040-85 = "雖然他自己才是最常提到沙醬的人就是了。"
61040-86 = "當然，沙醬也可能又會跑去找尋找自我……"
61040-87 = "不過我希望這種場合，我們大家都能聚在一起。"
61040-88 = "[s]「敦子。」"
61040-89 = "嗯？"
61040-90 = "[s]「你提出請求的方式……變得很高明了呢！」"
61040-91 = "這……是在說我做錯了嗎……？"
61040-92 = "是覺得如果把這個優點磨練得更好，我會成為很棒的人？"
61040-93 = "呵呵。謝謝你，老師。"
61040-94 = "不過我還是會注意分寸。"
61040-95 = "畢竟凡事都不想自己動手的人，可是會被討厭的。"
61040-96 = "那麼，關於沙醬的事可以拜託你嗎？"
61040-97 = "[s]「既然是學生的請求，當然沒問題！」"
61040-98 = "嗯。「Give and Take」就是這個世界的運作方式呢。"
61040-99 = "……謝謝你，老師。"
61040-100 = "有老師在，真是太好了。"
61040-106 = "……咦？"
61040-107 = "這是……什麼……？"
61040-108 = "是超級大的……船嗎？"
61040-110 = "[ns]「……是，是吧？」"
61040-111 = "怎麼連你也是那種反應啊，老師！#n這到底……！"
61040-112 = "我，我有在雜誌上看過。#n這種船叫做郵輪……對吧？"
61040-113 = "郵輪？"
61040-114 = "那，那個……就是……"
61040-115 = "專門為了觀光而打造的，非常豪華又昂貴的船……"
61040-116 = "裡面有餐廳和各種遊樂設施……"
61040-117 = "甚至還有人工溫泉和游泳池，可以隨心所欲做任何事的船……"
61040-118 = "雖然我也不太確定……但聽說票價貴到超乎想像……"
61040-122 = "航行在水上的船裡居然還有游泳池？#n這還真是……挺詭異的……"
61040-123 = "不對，現在的重點是我們為什麼會在這種地方……"
61040-124 = "老師！你知道些什麼吧？快點說！"
61040-125 = "[s]「我，我也不太清楚啊！只是有贊助者說要幫忙！」"
61040-129 = "[ns]「我也跟你們一樣，只是被帶到這裡而已！！」"
61040-130 = "什麼？贊助者！？"
61040-131 = "我……我大概懂了。#n這種事我也在雜誌上看過……"
61040-135 = "接下來我們就要被抓去參加「章魚遊戲」了對吧！？"
61040-136 = "只有最後一個人能拿到45億元的獎金……所以大家必須互相殘殺……"
61040-137 = "然後有錢人就在旁邊看好戲，對吧？#n完蛋了……結束了……真的再也沒有夢想和希望了！嗚哇啊啊啊～！"
61040-138 = "真的是這樣嗎，老師！？"
61040-139 = "大家先冷靜。老師他不可能做這種事的。#n而且就算真是如此，最先被淘汰的也肯定是老師吧？"
61040-140 = "什麼……？#n原來是這麼回事嗎！？"
61040-147 = "……！？"
61040-149 = "……！？"
61040-150 = "沙，沙織姐！？"
61040-152 = "……"
61040-153 = "哎呀。"
61040-154 = "贊助人該不會是隊長吧！？"
61040-155 = "不，不是的，美咲。#n我只是……我也……"
61040-156 = "不，仔細想想應該不太可能。"
61040-157 = "……沒錯，根本不可能。#n隊長不可能會有那種能力。"
61040-158 = "雖，雖然某方面來說是這樣沒錯，還是讓人有點難過……"
61040-159 = "總之隊長的位置就先還給你吧！哪怕只是暫時的也好！"
61040-160 = "你先等一下，美咲！#n我自己也還搞不清楚狀況……！"
61040-162 = "嗚哇啊啊～沙織姐～！#n至少我們死的時候要一起死吧？"
61040-164 = "老師，能麻煩你先從約我們見面的理由開始說起嗎？"
61040-165 = "在搞不清楚狀況的時候，先從可以確定的事開始討論比較好。"
61040-166 = "[s]「事情是這樣的……」"
61040-168 = "原來如此，是考試啊。"
61040-169 = "……"
61040-170 = "所以老師希望我們怎麼做？"
61040-171 = "別回答什麼「尊重大家的意見」這種有說跟沒說一樣的話。"
61040-172 = "大家都坦誠一點，比較容易達成共識。"
61040-173 = "[ns]「好，那麼……」"
61040-175 = "[ns]「我希望你們也能體驗一下所謂的『考試』。」"
61040-178 = "……"
61040-179 = "……"
61040-181 = "咦，咦咦……？#n大家怎麼突然都不講話了……？"
61040-182 = "唔，唔嗯……#n雖然想問的問題有很多……就先從這個問起吧。"
61040-183 = "為什麼突然提到考試？#n這其中包含什麼涵義嗎？"
61040-184 = "嗯？希望大家能體驗以「考試」為代表的校園生活？"
61040-185 = "不只我們……連留在奧利斯的孩子們也是？"
61040-186 = "留在奧利斯的孩子？#n這是什麼意思，老師？"
61040-188 = "（向大家說明了從轉學到三一的孩子們口中聽說的事）"
61040-190 = "……"
61040-191 = "那些轉學到三一的孩子們，心情想必不會輕鬆到哪裡去吧。"
61040-192 = "就算被身旁的人溫柔對待，也會不由自主地感到畏縮。"
61040-193 = "還會先入為主地害怕別人，或者不懂得該如何用一般世界的方式解決問題之類的。"
61040-194 = "[s11]「……我也有這種感覺。」\n[s12]「你很了解呢，沙織。」"
61040-197 = "……畢竟這對我們而言，也不算是完全無關的事啊。"
61040-198 = "老師，你覺得呢？"
61040-199 = "雖然大家常說學生的本分是學習……"
61040-200 = "但為什麼非得是這樣呢？"
61040-201 = "……某種意義上來說，奧利斯其實也有學習和考試。"
61040-202 = "不過仔細想想，內容也就僅止於「如何更有效率地殺人」……"
61040-203 = "或者「如何毫不猶豫地培養殺意」而已。"
61040-204 = "噫，噫噫……"
61040-205 = "我已經……再也不想那樣了……"
61040-206 = "嗯，沒錯。#n這點我們大家都有同感，對吧日和？"
61040-207 = "不過老師，你能告訴我們答案嗎？#n為什麼人一定要學習呢？"
61040-208 = "比如很會念書考試的話，將來就更有機會找到好的工作？"
61040-209 = "然後藉此賺到更多的錢之類的？"
61040-210 = "但這……至少對我們來說，並不是能夠完全認同的答案。"
61040-211 = "你知道嗎，老師？"
61040-212 = "假如單純考慮賺錢這件事的話……就算只靠在奧利斯學到的東西也完全不成問題。"
61040-213 = "[s]「怎麼說呢……？」"
61040-215 = "就，就好比……"
61040-216 = "之前曾經有人向我們提出過殺人的委託……#n雖然不知道他們怎麼知道的……"
61040-217 = "但偶爾就會有這類的委託傳到我們這裡。"
61040-218 = "當，當然我們都會直接拒絕，然後告訴對方不要再提這種事了哦！"
61040-219 = "至於「破壞光環」這種說法，其實只是一種比喻或隱喻而已。"
61040-220 = "所以在奧利斯反而不太常用到。"
61040-221 = "如果用到的話……通常都在聊「外面」的事。"
61040-222 = "比如在跟「外面」的人交談……"
61040-223 = "或者我們彼此互開玩笑的時候。"
61040-225 = "嗯。"
61040-226 = "以前在奧利斯，我們會使用更加簡單明瞭的說法。"
61040-230 = "那就是「殺掉」。"
61040-231 = "當然我在離開奧利斯後才知道，其實「外面」使用這個詞的頻率也比想像中來的高。"
61040-232 = "只是用法……稍微有點不同。"
61040-233 = "就，就是說啊……#n那種事不會真的發生，大家都只是用來開開玩笑而已……"
61040-234 = "……但是我們以前，是真的按字面意思在使用這個詞的。"
61040-235 = "或許過去的奧利斯……是整個奇普托斯之中最接近死亡的地方也說不定。"
61040-236 = "所以老師，希望你能告訴我。"
61040-237 = "為什麼學生一定要學習呢？"
61040-238 = "如果只是為了追求更好的數字，明明還有其他方法……#n只要放棄某些東西，就能輕而易舉地做到了。"
61040-240 = "[ns]「我的回答是……」"
61040-243 = "[ns]「因為學生總有一天，必須知道如何與世界對抗。」"
61040-245 = "嗯……？"
61040-246 = "這是我從來沒想過的答案。"
61040-247 = "能請老師再說明得詳細一點嗎？"
61040-248 = "[s13]「學習這個行為，說白了就是瞭解自己『不知道的事物』。」\n[s14]「而在那些『不知道的事物』當中，也包含這個世界。」"
61040-254 = "如果不瞭解合約這個概念，就會更容易被利用……是這個意思嗎？"
61040-255 = "……這我確實深有所感。老師的指謫相當精準。"
61040-256 = "假如有事先學習過合約的知識的話，受人利用的可能性就會降低，甚至消失……"
61040-257 = "原來如此。這就是透過學習，了解對抗世界的方法啊……"
61040-258 = "現在的世界是怎麼被構築起來，又是如何維持運作……"
61040-259 = "與自己意見不合的人，為什麼會產生那種想法。#n即使無法完全說服對方……"
61040-260 = "至少也該知道怎麼在一定程度上互相理解，試著達成共識……是這個意思嗎？"
61040-261 = "而且透過累積對未知事物的知識，也能減少來自世界的潛在風險……"
61040-262 = "總而言之，就是要以知識作為自我防衛的手段吧。"
61040-263 = "聽你這麼一說，我多少能理解了。"
61040-264 = "如果是這樣的話……"
61040-265 = "……唉。"
61040-267 = "沒，沒錯……我們當然也需要這些東西……"
61040-268 = "那些留在奧利斯的孩子們，就更不用說了……"
61040-269 = "[ns15]「正因如此，有點貪心的老師我呢……」\n[ns16]「還把另一位學生也帶到了這裡。」"
61040-272 = "嗯？"
61040-273 = "等等……難不成那個學生，就是這次聚會的贊助者？"
61040-277 = "啊啊，我懂了。原來是這麼回事啊。"
61040-278 = "什，什麼意思……？"
61040-279 = "有這個安排的話，怎麼不事先跟我們說一聲呢……"
61040-280 = "……唉，算了。"
61040-281 = "所以呢，那個學生是誰？"
61040-282 = "奧利斯小隊的各位都別來無恙嗎？"
61040-293 = "我是茶會的現任主席，也是這次聚會的贊助者──桐藤渚。"
61040-294 = "什麼……！？"
61040-298 = "哎呀。"
61040-300 = "下一話;最後的晚餐（？）"

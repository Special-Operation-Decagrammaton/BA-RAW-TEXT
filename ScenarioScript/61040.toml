[translation]
61040-1 = "ตอนที่ 4;ที่ที่น้ำไหลมาบรรจบ"
61040-2 = "[ns] \"ดีละ... เตรียมอย่างอื่นเสร็จเรียบร้อย...\""
61040-5 = "หมายเลขที่ท่านเรียกไม่สามารถติดต่อได้ในขณะนี้ กรุณาทิ้งข้อความไว้หลังจากได้ยินเสียงสัญญาณ"
61040-6 = "[s] \"แกล้งคนอื่นเก่งขึ้นนะ... อาสึโกะ\""
61040-7 = "ฮุฮุ ขอบคุณที่ดูออกนะ คุณครู"
61040-8 = "แต่เวลามีเบอร์ที่ไม่รู้จักโทรมา บางครั้งฉันก็ต้องรับสายแบบนี้น่ะ"
61040-9 = "แน่นอนว่าฉันไม่มีทางไม่รู้จักเบอร์ของคุณครูหรอกนะ"
61040-10 = "ถ้างั้นก็เอาอีกรอบแล้วกัน สวัสดีค่ะ คุณครู"
61040-11 = "[s] \"การทักทายเป็นเรื่องสำคัญนี่เนอะ สบายดีมั้ย?\""
61040-12 = "อื้อ ขอบคุณที่ยังจำกันได้นะ"
61040-13 = "ฉันมีปัญหาอะไรบ้างหรือเปล่าน่ะเหรอ? อืม... ตอนนี้ยังไม่มีนะ?"
61040-14 = "ฉันยังซ่อนตัวและระแวดระวังคนรอบข้างอยู่เหมือนเดิม"
61040-15 = "แต่มันก็สนุกไปอีกแบบนะ ถ้ามีเวลาว่าง ฉันก็จะออกไปเดินเล่นอย่างระวังๆ บ้าง"
61040-16 = "เพราะงั้นก็ อื้อ โดยรวมถือว่าไม่เลวนะ"
61040-17 = "ว่าแต่มีเรื่องอะไรเหรอ?"
61040-18 = "[s1] \"คิดยังไงเกี่ยวกับการสอบเหรอ?\"\n[s2] \"อาสึโกะคิดยังไงเกี่ยวกับการสอบเหรอ?\""
61040-21 = "การสอบ?"
61040-22 = "ฮุฮุ ถามได้สมกับที่เป็นคุณครูเลยนะ"
61040-23 = "ไม่หรอก คุณครู ไม่ต้องขอโทษหรอก ฉันชอบที่คุณครูเป็นแบบนี้น่ะ"
61040-24 = "การสอบ... คือการประเมินผลสิ่งที่เรียนมาใช่มั้ยล่ะ?"
61040-25 = "แต่ว่ามันก็เป็นสิ่งที่ฉันเคยได้ยินมาก็เท่านั้น... ว่าแต่ ทำไมเหรอ?"
61040-26 = "[s3] \"แล้วถ้าได้โอกาสสอบขึ้นมา จะว่ายังไงเหรอ?\"\n[s4] \"แล้วถ้าได้สอบขึ้นมา จะทำยังไงเหรอ?\""
61040-29 = "อืม..."
61040-30 = "มันเป็นการถามอะไรอย่างเช่น \"เด็กเกิดมาได้ยังไง?\" หรือเปล่า"
61040-31 = "ถ้าใช่ มันก็น่าจะสนุกดีนะ"
61040-32 = "[s] \"ไม่ใช่ข้อสอบแบบนั้น!\""
61040-33 = "ขอโทษๆ"
61040-34 = "บอกตามตรงนะ ฉันไม่รู้หรอก"
61040-35 = "ก็อย่างที่บอกไปนั่นละ ฉันเคยแต่ได้ยิน แต่ไม่เคยคิดถึงหรือได้ลองทำข้อสอบจริงๆ"
61040-36 = "แต่ถ้าฉันได้เรียนรู้บางอย่างและได้รับการยอมรับว่าเรียนสิ่งนั้นได้ดีละก็..."
61040-37 = "อื้อ..."
61040-38 = "เหมือนอย่างที่ 'นักเรียนทั่วไป'... ทำกันน่ะ"
61040-39 = "ฉันคงต้องไปถามจากทุกคนก่อน แต่ถ้าถามฉัน ฉันก็น่าจะอยากสอบอยู่นะ คงตั้งตารอเลยด้วย"
61040-40 = "อาจสอบตกก็ได้งั้นเหรอ?"
61040-41 = "ฮุฮุ ถ้างั้นคุณครูจะมาสอนเสริมให้มั้ยนะ? ถ้ามีอะไรแบบนั้นรวมอยู่ด้วย ฉันว่ามันก็ไม่เลวเลยละ"
61040-42 = "ว่าแต่ ถามทำไมเหรอ?"
61040-43 = "[s] \"วันนี้... ครูได้เจอนักเรียนจากอาเรียสในทรีนิตี้น่ะ\""
61040-44 = "หืม?"
61040-48 = "อื้อ... ฉันเข้าใจแล้วละ"
61040-49 = "[s] \"เด็กพวกนั้นเป็นห่วงสควอดอยู่นะ...\""
61040-54 = "อย่างนั้นเองสินะ"
61040-55 = "อืม..."
61040-56 = "นี่ คุณครู?"
61040-57 = "เรื่องแบบนี้จะคุยกันทางโทรศัพท์มันก็น่าเสียดายนะ คุณครูคิดว่ายังไงล่ะ?"
61040-58 = "[s5] \"มันก็จริงอยู่หรอกนะ เผื่อใครมาดักฟังเข้า\"\n[s6] \"นั่นสิ เราอาจจะโดนใครดักฟังก็ได้เนอะ\""
61040-61 = "อืม"
61040-62 = "ฉันไม่ได้พูดถึงเรื่องความเสี่ยงสักหน่อย?"
61040-63 = "[s] \"ถะ... ถ้างั้น?\""
61040-64 = "ก็บอกไปแล้วนี่"
61040-65 = "มัน 'น่าเสียดาย' ไง"
61040-66 = "เรื่องแบบนี้น่ะ ถ้าเป็นไปได้ฉันก็อยากพูดคุยกับคุณครูแบบเห็นหน้าเห็นตา"
61040-67 = "พร้อมกับทุกคนด้วยน่ะ"
61040-68 = "[s7] \"พร้อมกับทุกคน รวมครูด้วยก็ 4 คนใช่มั้ย?\"\n[s8] \"งั้นครูจะหาสถานที่ให้นะ ทั้งหมด 4 คนใช่มั้ย?\""
61040-71 = "5 คนน่ะ"
61040-72 = "[s] \"5 คนเหรอ...?\""
61040-76 = "[ns9] \"อย่างนี้สินะ... เข้าใจแล้วละ\"\n[ns10] \"แต่จะไม่เป็นอะไรเหรอ?\""
61040-79 = "ไม่เป็นไรหรอก"
61040-80 = "ฉันออกไปเจอซัตจังบ้างบางครั้งน่ะ ใช่ว่าเราจะไม่ติดต่อกันเลยหรอก"
61040-81 = "แล้วฉันก็คิดเองเออเองอยู่ด้วยว่าซัตจังน่าจะค้นหาตัวเองใกล้เสร็จแล้ว"
61040-82 = "[s] \"สารภาพว่าคิดเองเออเองสินะ...\""
61040-83 = "ฮุฮุ"
61040-84 = "ถ้าฉันพูดเรื่องซัตจังออกมาละก็ มิซากิจะทำหน้าสับสนเลยละ"
61040-85 = "ตัวเองเป็นคนพูดถึงซัตจังมากกว่าใครเพื่อนแท้ๆ"
61040-86 = "ฉันรู้ว่าซัตจังอาจจะออกไปค้นหาตัวเองอีกรอบก็ได้"
61040-87 = "แต่ในโอกาสนี้ ฉันอยากให้พวกเราได้คุยกันพร้อมหน้าน่ะ"
61040-88 = "[s] \"อาสึโกะ\""
61040-89 = "หืม?"
61040-90 = "[s] \"ขอความช่วยเหลือจากคนอื่น... เก่งขึ้นเยอะเลยนะ!\""
61040-91 = "หมายความว่า... ฉันกำลังทำผิดอยู่งั้นเหรอ...?"
61040-92 = "ไม่เหรอ? ถ้าหมั่นฝึกฝนข้อดีข้อนี้ให้มากขึ้นอีก ต่อไปฉันจะกลายเป็นคนที่น่าทึ่งได้งั้นเหรอ?"
61040-93 = "ฮุฮุ ขอบคุณนะ คุณครู"
61040-94 = "แต่ยังไงฉันก็จะระวังไม่ให้ล้ำเส้นนะ"
61040-95 = "เพราะคนที่ไม่พยายามทำอะไรด้วยตัวเองเลย ย่อมถูกเกลียดเป็นธรรมดา"
61040-96 = "ถ้างั้นเรื่องเกี่ยวกับซัตจัง ฉันขอร้องคุณครูได้อยู่ใช่มั้ย?"
61040-97 = "[s] \"นักเรียนขอร้องทั้งที ต้องได้อยู่แล้ว!\""
61040-98 = "อื้อ กิฟแอนด์เทค โลกก็ดำเนินไปแบบนี้ละ"
61040-99 = "ขอบคุณนะ คุณครู..."
61040-100 = "ฉันดีใจมากเลยที่มีคุณครูอยู่ด้วย"
61040-106 = "หืมมม...?"
61040-107 = "อะไรกันเนี่ย..."
61040-108 = "เรือลำใหญ่... สุดๆ ไปเลย?"
61040-110 = "[ns] \"นั่นสิ... นะ?\""
61040-111 = "ทำไมตอบเหมือนไม่รู้เรื่องเลยล่ะ คุณครู! นี่มันอะไรกัน...!"
61040-112 = "ฉะ... ฉันเคยเห็นจากนิตยสารค่ะ นี่เรียกว่าเรือสำราญ... ใช่มั้ยคะ?"
61040-113 = "เรือสำราญ?"
61040-114 = "อะ... เอ่อ... มันก็คือ..."
61040-115 = "เรือที่หรูหราและราคาแพงอย่างเหลือเชื่อ... ที่มีไว้เพื่อการท่องเที่ยวโดยเฉพาะน่ะค่ะ..."
61040-116 = "ในเรือจะมีทั้งภัตตาคาร แล้วก็เครื่องเล่นต่างๆ อีกเพียบ..."
61040-117 = "แล้วก็ยังมีออนเซ็นเทียมและสระว่ายน้ำให้ด้วยนะคะ เห็นว่าเป็นเรือที่ทำกิจกรรมได้ทุกอย่างเลยละ..."
61040-118 = "ถึงฉันจะไม่รู้แน่ชัด ตะ... แต่... ฉันอ่านเจอมาว่าแค่ค่าตั๋วก็ราคาแพงเหลือเชื่อแล้วค่ะ..."
61040-122 = "เรือแล่นอยู่บนผิวน้ำ แต่ก็มีสระว่ายน้ำในเรืองั้นเหรอ? จริงๆ เลย... ทำไมมันย้อนแย้งอย่างนี้นะ..."
61040-123 = "ไม่สิ เรื่องนั้นน่ะช่างมันเถอะ ว่าแต่ทำไมพวกเราถึงมาที่แบบนี้กันล่ะ..."
61040-124 = "คุณครู! รู้อะไรอยู่ใช่มั้ย? อธิบายมาเลย!"
61040-125 = "[s] \"คะ... ครูก็ไม่รู้! แค่ได้ยินมาว่าจะมีสปอนเซอร์ช่วยจ่ายน่ะ!\""
61040-129 = "[ns] \"ครูก็ถูกสปอนเซอร์เชิญมาเหมือนทุกคนนั่นละ!!\""
61040-130 = "คะ? สปอนเซอร์เหรอคะ?!"
61040-131 = "ฉัน... พอจะรู้ว่าหมายถึงอะไรค่ะ... เรื่องนี้ฉันก็อ่านเจอมาจากนิตยสารค่ะ..."
61040-135 = "เราถูกลากมาเล่น 'เกมปลาหมึก' กันสินะคะ ใช่มั้ยคะ?!"
61040-136 = "คนสุดท้ายที่รอดชีวิตจะได้เงินรางวัล 4,500 ล้านเยน... ทุกคนก็เลยต้องฆ่าฟันกัน..."
61040-137 = "พวกคนรวยคิดว่าเกมแบบนี้เป็นเรื่องสนุกใช่มั้ยล่ะคะ? แย่แล้ว... ชีวิตจบเห่แล้วค่ะ... จากนี้... พวกเราไม่เหลือทั้งความฝันหรือความหวังแล้วค่ะ! แงงงง~!"
61040-138 = "จริงเหรอ คุณครู?!"
61040-139 = "ใจเย็นๆ ก่อนนะทุกคน คุณครูไม่มีทางทำแบบนั้นหรอก และถ้าต้องเล่นเกมแบบนั้นจริง คนแรกที่จะตกรอบไปก่อนน่าจะเป็นคุณครูด้วยซ้ำ?"
61040-140 = "ว่าไงนะ...? สรุปเป็นแบบนั้นหรอกเหรอ?!"
61040-147 = "...?!"
61040-149 = "...!?"
61040-150 = "พะ... พี่ซาโอริ?!"
61040-152 = "......"
61040-153 = "ตายจริง"
61040-154 = "สปอนเซอร์ที่ว่าคือหัวหน้างั้นเหรอ?!"
61040-155 = "ปะ... เปล่านะ มิซากิ ฉันก็แค่... ฉันแค่..."
61040-156 = "ไม่สิ พอมาคิดดู มันก็เป็นไปไม่ได้อยู่แล้ว"
61040-157 = "อื้อ... เป็นไปไม่ได้หรอก หัวหน้าไม่มีความสามารถจะทำอะไรแบบนั้นหรอก"
61040-158 = "นะ... ในบางแง่มันก็จริงอยู่หรอกนะ แต่ฟังแล้วปวดใจชะมัด..."
61040-159 = "จะยังไงก็เถอะ แต่หัวหน้าต้องกลับมารับตำแหน่งหัวหน้า! แค่ชั่วคราวก็ได้!"
61040-160 = "เดี๋ยวสิ มิซากิ! ฉันยังไม่รู้ว่าอะไรเป็นอะไรเลย...!"
61040-162 = "แงงงง~ พี่ซาโอริ~! อย่างน้อยตอนตายเราก็จะได้อยู่ด้วยกันใช่มั้ยคะ?"
61040-164 = "นี่ คุณครู? ช่วยอธิบายก่อนได้มั้ยว่าทำไมอยากมาเจอพวกเราทั้ง 4 คนน่ะ?"
61040-165 = "ถ้ายังไม่รู้ที่มาที่ไปของสถานการณ์ ฉันว่าเราควรเริ่มจากการพูดสิ่งที่ชัดเจนก่อนนะ"
61040-166 = "[s] \"เรื่องราวมันก็เป็นแบบนี้ละ...\""
61040-168 = "อย่างนี้นี่เอง การสอบ... งั้นสินะ?"
61040-169 = "......"
61040-170 = "แล้วคุณครูอยากให้เราทำแบบไหนเหรอ?"
61040-171 = "อย่าพูดแค่ว่าจะเคารพความคิดเห็นของเราล่ะ"
61040-172 = "อื้อ ใช่ เรามาคุยกันแบบตรงไปตรงมาดีกว่า แบบนั้นจะหาข้อตกลงได้ง่ายกว่าด้วย"
61040-173 = "[ns] \"ก็ได้ ถ้างั้นละก็...\""
61040-175 = "[ns] \"ครูอยากให้ทุกคนได้ลอง 'สอบ' กันบ้างน่ะ\""
61040-178 = "......"
61040-179 = "......"
61040-181 = "หะ... หืม...? จู่ๆ ทุกคนเป็นอะไรกันไปหมดคะ...?"
61040-182 = "อะ... อืม... ฉันสงสัยหลายอย่างเลย... แต่ก่อนอื่น"
61040-183 = "ฉันอยากถามว่าทำไมจู่ๆ ถึงยกเรื่องแบบนี้มาพูด และการทำแบบนี้มีความหมายว่ายังไงด้วย"
61040-184 = "หืม? อยากให้พวกฉันทุกคนได้สัมผัสอีกแง่มุมหนึ่งของชีวิตในโรงเรียนผ่านการสอบงั้นเหรอ?"
61040-185 = "ทั้งพวกฉัน... แล้วก็เด็กๆ ที่เหลืออยู่ในอาเรียสด้วย?"
61040-186 = "เด็กๆ ที่เหลืออยู่ในอาเรียสเหรอ? หมายความว่ายังไงน่ะ ครู?"
61040-188 = "(คุณครูเล่าเรื่องที่ได้ยินมาจากเด็กๆ อาเรียสที่ย้ายมาเรียนที่ทรีนิตี้ให้ฟัง)"
61040-190 = "......"
61040-191 = "เด็กๆ ที่ย้ายมาเรียนที่ทรีนิตี้ก็คงรู้สึกไม่สบายใจนักหรอก"
61040-192 = "ต่อให้ทุกคนที่นี่จะทำดีด้วย แต่บางครั้งก็คงรู้สึกหวาดกลัวกันบ้าง"
61040-193 = "อย่างเช่นกลัวอะไรไปก่อนที่เรื่องจะเกิด หรือไม่ก็ไม่รู้วิธีแก้ปัญหาด้วยวิธีปกติของโลกภายนอกน่ะ"
61040-194 = "[s11] \"ครูก็รู้สึกแบบนั้นเหมือนกัน...\"\n[s12] \"เข้าใจดีเลยนะ ซาโอริ\""
61040-197 = "ก็เรื่องนั้น... มันไม่ใช่เรื่องของคนอื่นนี่นา"
61040-198 = "นี่ แล้วคุณครูล่ะคิดว่ายังไงบ้าง?"
61040-199 = "ฉันได้ยินมาบ่อยๆ ว่าหน้าที่หลักของนักเรียนก็คือการเรียนหนังสือ"
61040-200 = "แต่ทำไมถึงต้องทำแบบนั้นด้วยล่ะ?"
61040-201 = "ในแง่หนึ่ง ที่อาเรียสเองก็เคยมีสิ่งที่คล้ายการเรียนและการสอบนะ"
61040-202 = "แต่ถ้าจะพูดให้ถูก ต้องบอกว่ามันเป็นคำถามที่ถามว่าต้องทำยังไงถึงจะฆ่าใครได้เก่งขึ้น..."
61040-203 = "หรือจะเจตนาฆ่าโดยไม่รู้สึกอะไรเลยได้ยังไง"
61040-204 = "ฮะ... เฮือกกก..."
61040-205 = "ตอนนี้ฉันไม่ชอบเรื่องแบบนั้นแล้วค่ะ... ไม่เอาอีกแล้ว..."
61040-206 = "อื้อ ใช่ พวกเราก็ด้วยนะฮิโยริ ใช่มั้ยล่ะทุกคน?"
61040-207 = "แต่ถึงอย่างนั้นก็เถอะ คุณครู ถ้าถามถึงเหตุผลที่ต้องเรียนหนังสือ คุณครูจะให้คำตอบว่ายังไงเหรอ?"
61040-208 = "ถ้าตั้งใจเรียนและทำข้อสอบให้ได้คะแนนดีๆ สักวันก็จะหาอาชีพที่ดีกว่านี้ทำได้?"
61040-209 = "ยิ่งไปกว่านั้นก็คือ มันจะทำให้หาเงินได้มากขึ้น?"
61040-210 = "คำตอบแบบนี้มันไม่ใช่คำตอบที่ชัดเจนหรอก อย่างน้อยก็สำหรับพวกฉัน"
61040-211 = "รู้อะไรไหม คุณครู?"
61040-212 = "ถ้าเป็นแค่เรื่องการหาเงินละก็ แค่ใช้สิ่งที่ร่ำเรียนมาจากอาเรียสก็หาเงินได้เพียงพอแล้ว"
61040-213 = "[s] \"ยะ... ยังไงเหรอ...?\""
61040-215 = "ระ... เรื่องนั้น..."
61040-216 = "ฉันก็ไม่รู้ว่าคนอื่นรู้กันได้ยังไง แต่บางครั้งก็มีคนมาว่าจ้างให้พวกเรา..."
61040-217 = "ทำภารกิจลอบฆ่าน่ะค่ะ"
61040-218 = "นะ... แน่นอนว่าฉันปฏิเสธไปทันที แล้วก็ขอว่าอย่ามาพูดเรื่องอะไรแบบนี้อีกด้วยค่ะ!"
61040-219 = "การ 'ทำลายฮาโล' เป็นคำที่มีความหมายเชิงเปรียบเทียบ"
61040-220 = "ในอาเรียสก็เลยไม่ค่อยใช้คำนั้นกันน่ะ"
61040-221 = "เราจะใช้ก็แค่... ตอนพูดเกี่ยวกับ 'โลกภายนอก'"
61040-222 = "ตอนคุยกับผู้คนที่อยู่ใน 'โลกภายนอก'"
61040-223 = "หรือไม่ก็... เอาไว้พูดตลกๆ ในหมู่พวกเราเอง"
61040-225 = "อื้อ"
61040-226 = "คำที่มีความหมายแบบนั้นน่ะ แต่ก่อนในอาเรียสพูดกันอย่างง่ายดายเลยละ"
61040-230 = "พูดตรงๆ ว่า 'ฆ่า' กันเลย"
61040-231 = "แน่นอนว่าใน 'โลกภายนอก' ก็ใช้คำนี้กันบ่อยกว่าที่พวกฉันคิด แต่กว่าจะได้รู้ก็ตอนที่ออกมาจาก#nอาเรียสแล้ว"
61040-232 = "วิธีใช้คำพูด... มันน่าจะต่างกันนิดหน่อยน่ะ"
61040-233 = "ค่ะ ใช่ค่ะ... คนข้างนอกที่นี่ไม่ได้มีเจตนาจะฆ่าแกงกันจริงๆ ก็เลยพูดคำนั้นออกมาในเชิงล้อเล่น... กันมากกว่าค่ะ..."
61040-234 = "แต่พวกเราก็ใช้คำนั้นเมื่อจะสื่อถึงความหมายนั้นจริงๆ..."
61040-235 = "อาเรียสในอดีตอาจเป็นสถานที่ที่ใกล้ชิดกับความตายมากที่สุดในคิโวทอสก็ได้นะ"
61040-236 = "และเพราะอย่างนั้น คุณครูช่วยบอกทีเถอะ"
61040-237 = "ทำไมนักเรียนถึงต้องเรียนหนังสือด้วยล่ะ?"
61040-238 = "ถ้าเป็นการทำเพื่อให้แตะตัวเลขที่ดีขึ้นกว่าเดิมละก็ นอกจากการเรียนแล้ว... มันก็น่าจะมีวิธีอื่นอยู่ ถ้ายอมสละบางอย่างไปน่ะนะ"
61040-240 = "[ns] \"เหตุผลก็คือ\""
61040-243 = "[ns] \"เพราะนักเรียนต้องรู้วิธีต่อสู้กับโลกนี้ในสักวันยังไงล่ะ\""
61040-245 = "คะ...?"
61040-246 = "เป็นคำตอบที่ไม่เคยนึกถึงมาก่อนเลย"
61040-247 = "ช่วยอธิบายอีกหน่อยได้มั้ยคะ คุณครู?"
61040-248 = "[s13] \"การเรียนคือการรู้ใน 'สิ่งที่ไม่รู้' และนั่นก็รวมถึงโลกใบนี้ด้วย\"\n[s14] \"โลกเป็น 'สิ่งที่เราไม่รู้' ที่จำเป็นต้องเรียนรู้น่ะ\""
61040-254 = "หืม? มันก็เหมือนกับ ถ้าเราไม่รู้แนวคิดของสัญญาจ้าง ก็ยิ่งมีโอกาสที่จะโดนเอาเปรียบจากสิ่งนั้น... แบบนี้หรือเปล่า?"
61040-255 = "ทำเอาฉันไปไม่เป็นเลยนะ... เป็นประเด็นที่ดีเลยละ คุณครู"
61040-256 = "และถ้าได้ศึกษาจนได้รู้ความสำคัญของสัญญาจ้าง โอกาสที่จะเจอเหตุการณ์แบบนั้นก็คงลดลง หรือถึงขั้นไม่มีเลยก็ได้"
61040-257 = "อย่างนี้นี่เอง นี่คือการเรียนรู้วิธีต่อสู้กับโลกด้วยการเรียนสินะ..."
61040-258 = "มันคงทำให้เราเข้าใจได้ว่าโลกนี้ถูกสร้างมายังไง และโลกในปัจจุบันมีความเป็นไปยังไงบ้าง"
61040-259 = "ได้รู้ว่าทำไมคนอื่นถึงคิดแตกต่างกับเรา และต่อให้... ไม่ถึงกับต้องโน้มน้าวคนคนนั้น"
61040-260 = "เราก็จะได้รู้ว่าควรทำยังไงที่จะเข้าใจคนคนนั้นและหาตรงกลางร่วมกันได้...?"
61040-261 = "อีกอย่าง การสะสมความรู้ในสิ่งที่เราไม่รู้ นั่นก็จะช่วยลดความเสี่ยงที่เราอาจจะได้รับจากโลกภายนอก#nได้... แบบนี้น่ะเหรอ?"
61040-262 = "สรุปแล้วมันคือวิธีการป้องกันตัวเองโดยอาศัยความรู้ที่ตัวเองมีสินะ"
61040-263 = "พอพูดแบบนี้ ฉันก็พอเข้าใจขึ้นมาแล้วละ"
61040-264 = "และถ้าเป็นอย่างนั้นละก็..."
61040-265 = "เฮ้อ..."
61040-267 = "นะ... นั่นสินะคะ... สิ่งนั้นมันจำเป็นกับพวกฉันจริงๆ..."
61040-268 = "และสำหรับเด็กๆ ที่ยังเหลืออยู่ในอาเรียสแล้ว... มันคงจำเป็นมากกว่าอะไรทั้งหมดเลยละค่ะ..."
61040-269 = "[ns15] \"ครูก็เลยพานักเรียนบางคนมาที่นี่ด้วยน่ะ...\"\n[ns16] \"ครูก็เลยพานักเรียนคนอื่นมาที่นี่ด้วยน่ะ...\""
61040-272 = "หืม?"
61040-273 = "เดี๋ยวนะ... หรือว่านักเรียนคนนั้นคือสปอนเซอร์ของงานนี้?"
61040-277 = "อ้อ ฉันพอจะรู้แล้วละ สรุปว่ามันเป็นแบบนี้สินะ"
61040-278 = "พะ... พอจะรู้... งั้นเหรอคะ?"
61040-279 = "ถ้างั้นก็น่าจะบอกกันก่อนสิ..."
61040-280 = "ไม่สิ... ช่างเถอะ เฮ้อ..."
61040-281 = "แล้วนักเรียนคนที่ว่าคือใครเหรอ?"
61040-282 = "สบายดีกันมั้ยคะ? สควอดของอาเรียสทุกคน"
61040-293 = "ฉันชื่อว่าคิริฟุจิ นางิสะ เป็นโฮสต์คนปัจจุบันของสภาน้ำชาและเป็นสปอนเซอร์ของงานนี้ค่ะ"
61040-294 = "ว่าไงนะ...?!?!"
61040-298 = "ตายจริง"
61040-300 = "ตอนต่อไป;อาหารเย็นมื้อสุดท้าย(?)"

[translation]
61040-1 = "Episode 4;Where Rivers Meet"
61040-2 = "[ns] \"Okay... Everything is ready...\""
61040-5 = "The number you have dialed is unallocated. Please leave your message after the tone."
61040-6 = "[s] \"...You've gotten better at making jokes, Atsuko.\""
61040-7 = "I appreciate you noticing, Sensei."
61040-8 = "I learned to answer this way to phone numbers I didn't recognize."
61040-9 = "Of course, I recognized your number right away."
61040-10 = "Now, allow me to greet you one more time. Hello, Sensei. "
61040-11 = "[s] \"How have you been doing? Greetings are important, aren't they?\""
61040-12 = "Yes. I'm happy you remembered."
61040-13 = "To your first question... Hm. I've been well enough, one could say."
61040-14 = "I'm still in hiding and have to be wary of my surroundings."
61040-15 = "Even though I need to be careful whenever I venture out, I've found it nice to be able to enjoy my free time as I please."
61040-16 = "So, I've been well."
61040-17 = "And what about you, Sensei? Is everything okay?"
61040-18 = "[s1] \"I know this is out of the blue.\"\n[s2] \"But what are your thoughts on tests?\""
61040-21 = "Tests?"
61040-22 = "Fufu. You sound just like a teacher."
61040-23 = "No, no. Please don't apologize. I meant it in a good way. It was very...you."
61040-24 = "A test...is an evaluation of what I've studied, yes?"
61040-25 = "I only know of it conceptually. Why do you ask?"
61040-26 = "[s3] \"Again, I know this is very random.\"\n[s4] \"But if you had the chance to take one, what would you do?\""
61040-29 = "Hm..."
61040-30 = "Like an exam to test your knowledge on how babies are made?"
61040-31 = "That does sound rather entertaining."
61040-32 = "[s] \"No! Not that!\""
61040-33 = "My apologies. Heehee."
61040-34 = "Honestly, I have no answer."
61040-35 = "It's difficult to picture something I've never experienced before."
61040-36 = "However, the concept of studying, and then being acknowledged for that studying..."
61040-37 = "...Yes."
61040-38 = "An ordinary student might get to experience something like that."
61040-39 = "I'd want to see what the others would say, but there is a certain appeal."
61040-40 = "...There's the possibility of doing poorly as well?"
61040-41 = "Aha. I suppose so. Would you give us make-up classes, if that were to happen? It seems a win-win situation to me."
61040-42 = "But why?"
61040-43 = "[s] \"I was at Trinity...and I met some transfer students from Arius.\""
61040-44 = "Oh?"
61040-48 = "...Hm. I understand the situation."
61040-49 = "[s] \"They were worried about you...\""
61040-54 = "Thank you for telling me."
61040-55 = "Hm..."
61040-56 = "Actually, Sensei?"
61040-57 = "Perhaps it'd be best to speak about this in person."
61040-58 = "[s5] \"You're right.\"\n[s6] \"We could be wiretapped.\""
61040-61 = "Mmm."
61040-62 = "That's not what I was referring to at all."
61040-63 = "[s] \"Th-Then what?\""
61040-64 = "As I said."
61040-65 = "It'd be best that way."
61040-66 = "I want to be able to see you, face to face, when we talk about this."
61040-67 = "And with everyone else as well."
61040-68 = "[s7] \"I'll find a good place for us to meet.\"\n[s8] \"I guess it'd be four, including me.\""
61040-71 = "Five, actually."
61040-72 = "[s] \"Five...?\""
61040-76 = "[ns9] \"I see... I understand\"\n[ns10] \"Are you sure?\""
61040-79 = "Of course."
61040-80 = "We're hardly estranged from Sao-Sao. We even meet from time to time."
61040-81 = "Also, it's a bit presumptuous of me, but I believe it's time for her journey of self-discovery to come to an end."
61040-82 = "[s] \"Doesn't she get any input?\""
61040-83 = "Fufu."
61040-84 = "Misaki always adopts such a forlorn expression whenever Saori is mentioned."
61040-85 = "But she's also the one who brings her up most often."
61040-86 = "It is true that she may simply leave us again."
61040-87 = "However, for something like this, I'd like for all of us to be together."
61040-88 = "[s] \"Atsuko.\""
61040-89 = "Hm?"
61040-90 = "[s] \"You've gotten...really good at asking for favors!\""
61040-91 = "Is that...a bad thing...?"
61040-92 = "Not at all? You think I'll \"really flourish if I hone my skills\"?"
61040-93 = "Well, thank you, Sensei."
61040-94 = "I'll try not to use my power too much."
61040-95 = "After all, the helpless tend to garner resentment."
61040-96 = "I can count on you for help with Sao-Sao, though, yes?"
61040-97 = "[s] \"I'd never deny a request from my students!\""
61040-98 = "Yes. The world revolves around the principle of give and take."
61040-99 = "...Thank you."
61040-100 = "I'm glad we have you, Sensei."
61040-106 = "...Huh?"
61040-107 = "Is this..."
61040-108 = "...a giant ship?"
61040-110 = "[ns] \"...I guess so?\""
61040-111 = "Why do you seem just as confused, Sensei?! What's going on here...?"
61040-112 = "I saw this in a magazine once. It's called a \"cruise ship,\" I think!"
61040-113 = "A \"cruise ship\"?"
61040-114 = "Y-Yeah... Um..."
61040-115 = "They're not really made to get from point A to point B, but for luxury and entertainment..."
61040-116 = "They have things like restaurants and amusement rides ON BOARD the ship..."
61040-117 = "And they also have things like artificial hot springs and swimming pools, so you can do all sorts of things during the trip..."
61040-118 = "I obviously don't know everything about them, but apparently ticket prices are beyond even the dreams of peasants like us..."
61040-122 = "There's a swimming pool...on top of a ship...that's on top of water? That's...paradoxical, in more ways than one."
61040-123 = "Putting that aside, why are we even here?"
61040-124 = "Sensei! This was your doing. Explain."
61040-125 = "[s] \"I-I don't know either! I was told that a sponsor would come meet us!\""
61040-129 = "[ns] \"I came here under the same circumstances as you!\""
61040-130 = "What? A s-sponsor?!"
61040-131 = "I...know what's happening. I read about this in a magazine..."
61040-135 = "We've been kidnapped for the Octopus Games, haven't we?!"
61040-136 = "We'll be forced to kill each other...and the last one standing wins 4.5 billion yen..."
61040-137 = "All the while, rich people will watch us...slaughter each other! For entertainment! We're...doomed...completely doomed... I'm sorry for ever wanting anything! I'm sorry for existing!"
61040-138 = "Is this true, Sensei?!"
61040-139 = "Everyone, please calm down. Don't you trust Sensei? And, on a more logical level, Sensei would never participate in such a thing, seeing as they wouldn't last past the first round."
61040-140 = "R-Really? Is that all true?!"
61040-147 = "...?!"
61040-149 = "...?!"
61040-150 = "S-Saori?!"
61040-152 = "..."
61040-153 = "Oh my."
61040-154 = "You're the sponsor, Leader?!"
61040-155 = "N-No, I'm not. I also just..."
61040-156 = "Right. That would be impossible."
61040-157 = "...Completely impossible, actually. Leader isn't capable of such a thing."
61040-158 = "Wh-What?! You're right, but the way you said it didn't feel great either."
61040-159 = "Well, I don't care how long it's for. While you're here, I'm giving you back your position, Leader!"
61040-160 = "Let's at least evaluate and understand the situation first!"
61040-162 = "WAAAHHH! B-But, Saori, we'll be together when we die, right? Right?!"
61040-164 = "Let's start with why you asked us all to meet here, Sensei."
61040-165 = "It's best to review the facts when things seem uncertain."
61040-166 = "[s] \"So, this is the situation...\""
61040-168 = "I see. A test."
61040-169 = "..."
61040-170 = "What do you want us to do, Sensei?"
61040-171 = "And I don't want to hear any noise about \"respecting our choices,\" understood?"
61040-172 = "The only way to sort out this mess is with transparency."
61040-173 = "[ns] \"Okay, in that case...\""
61040-175 = "[ns] \"I want you all to get to experience taking a test too.\""
61040-178 = "..."
61040-179 = "..."
61040-181 = "U-Uhhh...? Why's everyone so tense all of a sudden...?"
61040-182 = "Well... I'm sure there's a lot to this story..."
61040-183 = "...but I'd like to start with your reasoning."
61040-184 = "Hm... So you want us to experience what it means to be a student?"
61040-185 = "Us...and the students back in Arius?"
61040-186 = "\"Students back in Arius\"? What does that mean, Sensei?"
61040-188 = "I told them about my meeting with the transfer students in Trinity."
61040-190 = "..."
61040-191 = "The transition must have been difficult for them."
61040-192 = "No matter how well they're treated, being in a new world is intimidating."
61040-193 = "There are times you feel scared for reasons you can't identify. Or other times when your usual ways of dealing with things don't work."
61040-194 = "[s11] \"...I'd say that's a good description of how they were.\"\n[s12] \"You must be able to relate, Saori.\""
61040-197 = "...We've lived similar stories, after all."
61040-198 = "Sensei, I have a question."
61040-199 = "I've heard that studying is an inherent responsibility of any student."
61040-200 = "However, what is the purpose behind it?"
61040-201 = "...We did experience them, in a way. Studying, exams."
61040-202 = "The curriculum focused mostly on different methods to kill and maim."
61040-203 = "We were tested on our resolve to pull the trigger in any situation, without hesitation."
61040-204 = "E-Eeek..."
61040-205 = "I-I really don't want to do that again..."
61040-206 = "Me neither, Hiyori. None of us do. Right?"
61040-207 = "However, that doesn't answer the question either. Why is studying necessary for any of us to do?"
61040-208 = "I suppose one might say we need to study hard, score well, and get a good job in the future."
61040-209 = "And people want to secure a good job, so they can make more money, correct?"
61040-210 = "However, such motivations don't apply to us."
61040-211 = "Did you know, Sensei?"
61040-212 = "If it's just to make money, we can make more than enough from what we learned at Arius."
61040-213 = "[s] \"How exactly...?\""
61040-215 = "W-Well..."
61040-216 = "I don't know how people found out our background..."
61040-217 = "...but sometimes we get requests to...you know...kill people."
61040-218 = "A-And we always immediately say \"no\" and tell them to shoo!"
61040-219 = "The expression \"break a halo\" is more commonly a figurative phrase."
61040-220 = "So we didn't use it often in Arius."
61040-221 = "It only came up during conversations about the outside."
61040-222 = "Or sometimes when we would speak with outsiders."
61040-223 = "Or...to make fun of something."
61040-225 = "Yeah."
61040-226 = "In Arius, we had a much simpler expression."
61040-230 = "To \"kill.\""
61040-231 = "We were surprised that people in the outside world used it more often than we would have anticipated."
61040-232 = "Although...it meant something a little different to them."
61040-233 = "Th-They would use it as a joke...because the thought of it was so impossible to them..."
61040-234 = "But not for us. For us, \"kill\" meant \"to kill.\" That was it."
61040-235 = "Perhaps the Arius we knew...tread closer to death than anywhere else in Kivotos."
61040-236 = "So, Sensei. Tell us."
61040-237 = "Why should a student study?"
61040-238 = "If it's to get better jobs, or make more money, then there are other ways. If we're willing to cross the line, there are innumerable paths we could take to reach the same objective."
61040-240 = "[ns] \"It's because...\""
61040-243 = "[ns] \"A student's responsibility is to learn how to fight against the world.\""
61040-245 = "What...?"
61040-246 = "I've never considered that."
61040-247 = "Explain, please, Sensei."
61040-248 = "[s13] \"Studying is the process of 'learning something I don't know.'\"\n[s14] \"And the entire world is one big 'something I don't know.'\""
61040-254 = "I understand. Like how being ignorant of contracts and how they work makes you an easy target."
61040-255 = "...How insightful. I have no rebuttal, Sensei."
61040-256 = "If I had done my due diligence, the odds of being stiffed of my pay would decrease, perhaps even disappear entirely."
61040-257 = "So that's how you can fight against this world. With knowledge."
61040-258 = "Knowledge of how society came to be, or of how to operate within it..."
61040-259 = "It can help us understand conflicting perspectives. As we've seen, it can be impossible to persuade someone to see things the way you want them to."
61040-260 = "...So you think we should look to understand and compromise first?"
61040-261 = "We can recognize, evaluate, and reduce risk from others by expanding our knowledge and understanding of the world."
61040-262 = "Knowledge as a weapon of self-defense."
61040-263 = "I guess I can see where you're coming from..."
61040-264 = "So I guess..."
61040-265 = "*sigh*"
61040-267 = "That's something w-we're gonna need...to survive out here..."
61040-268 = "And the students back at Arius...need that the most..."
61040-269 = "[ns15] \"Which is why I went above and beyond...\"\n[ns16] \"...and asked one more student to join us today.\""
61040-272 = "Huh?"
61040-273 = "Is that student...the sponsor of this meeting?"
61040-277 = "Aha. So that's what happened, Sensei."
61040-278 = "Are you...sure?"
61040-279 = "You should have told us if you knew that..."
61040-280 = "*sigh* Forget it. Never mind."
61040-281 = "So, who is this student?"
61040-282 = "I hope you've been well, Arius Squad."
61040-293 = "I'm Kirifuji Nagisa, Tea Party host and sponsor of this meeting."
61040-294 = "What...?!"
61040-298 = "Oh my."
61040-300 = "Next Episode;The Last Supper(?)"

[translation]
80000083-1 = "ผู้ดูแลระดับกลางที่ไร้ช่องโหว่"
80000083-2 = "ย่านการค้าตะวันออก เกเฮนน่า"
80000083-4 = "(วันวาเลนไทน์ คุณครูได้รับการติดต่อจากอิโรฮะ บอกว่าอยากให้ช่วยเรื่องภารกิจของทางแพนเดโมเนียม โซไซตี้)"
80000083-5 = "(แต่เมื่อคุณครูมาถึงสถานที่นัดพบกับอิโรฮะ...)"
80000083-6 = "[ns1] \"อิโรฮะ นี่มันห้างสรรพสินค้าไม่ใช่เหรอ?\"\n[ns2] \"ให้มาช่วยเรื่องงานของแพนเดโมเนียมไม่ใช่เหรอ แล้วมาที่นี่ทำไมน่ะ...?\""
80000083-7 = "ใช่ค่ะ ที่อื่นทำยังไงฉันเองก็ไม่รู้ แต่สำหรับแพนเดโมเนียม โซไซตี้น่ะ วันวาเลนไทน์ก็เหมือนกับงาน#nอีเวนต์ใหญ่ประจำปีค่ะ"
80000083-8 = "ใช่ค่ะ ที่อื่นทำยังไงฉันเองก็ไม่รู้ แต่สำหรับแพนเดโมเนียม โซไซตี้น่ะ วันวาเลนไทน์ก็เหมือนกับงาน#nอีเวนต์ใหญ่ประจำปีค่ะ"
80000083-9 = "เพราะงั้นฉันถึงได้รับหน้าที่คอยดูแลเรื่องการเตรียมของขวัญวาเลนไทน์ สำหรับส่งให้ชมรมอื่นๆ ในนามของแพนเดโมเนียม โซไซตี้ค่ะ"
80000083-10 = "เรียกว่าเป็นงานที่มอบหมายให้ผู้ดูแลระดับกลางก็ได้ละมั้งคะ?"
80000083-11 = "[s] \"อืม... อิโรฮะทำงานหนักจริงๆ เลยนะ\""
80000083-12 = "ก็นะ การเตรียมของขวัญไม่ใช่เรื่องใหญ่หรอกค่ะ"
80000083-13 = "ส่วนเรื่องคำสั่งที่บอกว่าให้เตรียมของขวัญวาเลนไทน์ให้ภายนอกเนี่ย... มันก็เป็นส่วนหนึ่ง#nของหน้าที่ของผู้ดูแลระดับกลางอยู่แล้ว"
80000083-14 = "แต่ว่า..."
80000083-15 = "[s] \"แต่ว่า...?\""
80000083-16 = "คำสั่งอย่างเช่น <ให้ซื้อช็อกโกแลตผสมพริกที่เผ็ดสุดขีดจนน้ำตาไหลพรากมา!>"
80000083-17 = "หรือ <ไม่มีช็อกโกแลตที่กินเข้าไปคำเดียวแล้วระเบิดอยู่เลยรึไงห้ะ?! อิโรฮะ!> อะไรแบบนี้..."
80000083-18 = "บอกตามตรง ถ้าทำตาม จะไม่ดูโง่ไปหน่อยเหรอคะ?"
80000083-19 = "ไม่สิ คนที่ออกคำสั่งพวกนี้เป็นปกติตั้งแต่แรกต่างหากล่ะที่งี่เง่าน่ะค่ะ?"
80000083-20 = "[s] \"พูดแบบนั้น... ไม่เป็นไรแน่เหรอ?\""
80000083-21 = "ไม่เป็นไรหรอกค่ะ ปกติก็พูดใส่เจ้าตัวต่อหน้าเลยอยู่บ่อยๆ ค่ะ"
80000083-22 = "แถมยังชอบสั่งให้ซื้อของกินมาให้ตัวเองด้วย หรือไม่ก็บอกให้ไปรับช็อกโกแลตที่สั่งไว้จาก#nร้านคนรู้จักที่สหภาพเรดวินเทอร์ให้หน่อย คำสั่งอะไรพรรค์นี้น่ะค่ะ..."
80000083-23 = "...บางทีฉันก็สงสัยว่าฉันควรใช้เวลาวันวาเลนไทน์ที่รอมานานให้หมดไปแบบนี้จริงๆ เหรอ"
80000083-24 = "[s3] \"เรื่องราวความยากลำบากของผู้ดูแลระดับกลางสินะ!\"\n[s4] \"ครูเข้าใจความรู้สึกเธอดี...\""
80000083-25 = "ก็นะ... ถึงวันนี้จะมีเรื่องเยอะแยะมากมาย แต่ที่ฉันขอให้คุณครูมาวันนี้เพราะอยากขอความเห็น#nหน่อยน่ะค่ะ"
80000083-26 = "ก็นะ... ถึงวันนี้จะมีเรื่องเยอะแยะมากมาย แต่ที่ฉันขอให้คุณครูมาวันนี้เพราะอยากขอความเห็น#nหน่อยน่ะค่ะ"
80000083-27 = "[s] \"ความเห็น...? หมายถึงความเห็นเรื่องเมื่อกี้น่ะเหรอ...?\""
80000083-28 = "ค่ะ ฉันต้องการความเห็นค่ะ โดยเฉพาะเรื่อง <ให้ซื้อช็อกโกแลตผสมพริกที่เผ็ดสุดขีดจน#nน้ำตาไหลพรากมา!> น่ะค่ะ"
80000083-29 = "[s] \"แบบนั้นยิ่งไม่ต้องการความเห็นจากครูเลยไม่ใช่เรอะ?!\""
80000083-30 = "ตรงข้ามกันเลยต่างหากค่ะ"
80000083-31 = "ถ้าเป็นของที่คุณครูเลือกละก็ พวกนั้นก็คงปิดปากเงียบ เถียงไม่ออกแน่เลยค่ะ?"
80000083-32 = "ค่ะ ฉันคิดว่าถ้าคุณครูช่วยออกความเห็นเรื่องของขวัญ ปีนี้อาจผ่านไปได้อย่างสงบก็ได้ค่ะ"
80000083-33 = "[s] \"อ๋อ นี่เป็นกลอุบายของอิโรฮะสินะ...\""
80000083-34 = "เพราะงั้นแล้ว..."
80000083-38 = "ในฐานะผู้ดูแลระดับกลางเหมือนกัน ช่วยร่วมมือกับฉันหน่อยได้มั้ยคะคุณครู?"
80000083-39 = "[s] \"อื้อ เรื่องนั้นได้เสมอเลย\""
80000083-44 = "(หลังจากนั้น คุณครูก็ไปเดินซื้อของกับอิโรฮะ...)"
80000083-46 = "อืม~ คุณครูมาด้วย ทุกอย่างเลยผ่านไปได้ด้วยดีเลยนะคะ"
80000083-47 = "ฮุฮุ ไม่นึกเลยว่าคุณครูจะเลือกอันนั้น... ผิดคาดจริงๆ เลยค่ะ ฉันคาดไม่ถึงเลยว่าคุณครูเอง#nก็จะมีความคิดที่ซุกซนแบบนี้เหมือนกันน่ะค่ะ"
80000083-48 = "คุณครูคิดว่าพวกคณะกรรมการวินัยจะไม่เป็นไรแน่เหรอคะ...?"
80000083-49 = "[s5] \"ช่วยอย่าพูดเหมือนครูมีเจตนาร้ายจะได้มั้ย?!\"\n[s6] \"ครูเลือกของธรรมดาๆ เองนะ\""
80000083-50 = "ก็ได้ค่ะ คุณครูเลือกแต่ของที่ไม่น่าตื่นเต้นทั้งนั้นเลย แต่ก็เลือกได้สมกับเป็นคุณครูดีค่ะ"
80000083-51 = "คุณครูเลือกแต่ของที่ไม่น่าตื่นเต้นทั้งนั้นเลย แต่ก็เลือกได้สมกับเป็นคุณครูดีค่ะ "
80000083-52 = "...ก็นะ เพราะฉันรู้ว่าคุณครูเป็นแบบนี้ก็เลยขอให้ช่วยไงล่ะคะ"
80000083-53 = "[s] \"หืม? เมื่อกี้ว่ายังไงนะ?\""
80000083-54 = "เปล่าค่ะ ฉันไม่ได้พูดอะไรสักหน่อยค่ะ คุณครูมาช่วยแบบนี้ ปีนี้คงผ่านไปได้อย่างสงบสุขค่ะ"
80000083-55 = "เอาละค่ะ ตอนนี้ก็ซื้อของเสร็จแล้วละค่ะ ขอบคุณที่มาช่วยนะคะคุณครู"
80000083-56 = "ถ้างั้นเรากลับกันเลยมั้ยคะ?"
80000083-57 = "[s7] \"อื้อ กลับกันเถอะ\"\n[s8] \"อืม... อิโรฮะ เรื่องช็อกโกแลตวาเลนไทน์น่ะ...\""
80000083-58 = "...จะบอกลากันแค่นี้จริงเหรอคะ?"
80000083-59 = "[s9] \"หืม...?\""
80000083-60 = "วันวาเลนไทน์ที่รอมานานทั้งที"
80000083-61 = "ฉันอุตส่าห์เรียกคุณครูออกมาในวันแบบนี้ทั้งที... ไม่รู้สึกอะไรบ้างเลยเหรอคะ?"
80000083-62 = "[s10] \"อืม... เปล่า คือว่าเรื่องนั้น...\""
80000083-63 = "...ฮู่ว ฉันจะยอมมองข้ามไปก็แล้วกันค่ะ แต่ก็อย่างที่บอก วันนี้เป็นวันวาเลนไทน์ที่รอมานาน"
80000083-64 = "ฮิฮิ... อะไรกันคะคุณครู?"
80000083-65 = "\"ช็อกโกแลตวาเลนไทน์...\" แล้วอยากพูดอะไรต่อจากนั้นเหรอคะ?"
80000083-66 = "[s11] \"ปะ...เปล่าสักหน่อย งะ...งั้นกลับกันเลยมั้ย...\""
80000083-67 = "อ๊ะ จู่ๆ ก็ใจร้ายตัดบทกันแบบนี้เลยเหรอคะ?"
80000083-68 = "ตอนนี้ถึงเวลาที่จะพูดความในใจแล้วรึเปล่าคะ หรือว่ารู้สึกเขินจนพูดต่อไม่ไหวเหรอคะ?"
80000083-69 = "[s12] \"อึก... เรื่องนั้น...\""
80000083-70 = "ก็ได้ค่ะ ฉันเลิกแกล้งคุณครูเท่านี้ดีกว่า ถ้างั้นฉันจะพูดในสิ่งที่คุณครูคาดหวังไว้ก็แล้วกันนะคะ"
80000083-71 = "นี่ค่ะ ฉันเตรียมไว้ให้คุณครูแล้วค่ะ"
80000083-76 = "[ns] \"เอ่อ... นี่มันช็อกโกแลตแท่ง...งั้นเหรอ?\""
80000083-77 = "ค่ะ ช็อกโกแลตโฮมเมดนะคะ ฉันให้เป็นของขวัญคุณครูค่ะ"
80000083-82 = "[ns] \"อื้อ อิโรฮะ ขอบคุณนะ--\""
80000083-84 = "[ns] \"อะ...อิโรฮะ? ทำไมถึงคาบขนมไว้ในปากแล้วหลับตาแบบนั้นล่ะ...?\""
80000083-85 = "..."
80000083-90 = "ฮันฮุตฮ่าห์ให้ฮองวัญเฮยนะ จะไฮ่ฮินฮ่อยเหยอ?#n(ฉันอุตส่าห์ให้ของขวัญเลยนะ จะไม่กินหน่อยเหรอ?)"
80000083-91 = "[s] \"เดี๋ยวๆๆ จะให้ครูกินแบบนี้ได้ไงเล่า!\""
80000083-92 = "ทำไมล่ะคะ... ของขวัญที่ฉันเตรียมไว้ให้ คุณครูไม่อยากรับไว้เหรอคะ?"
80000083-93 = "คุณครูจะไม่แยแสขนมที่นักเรียนทุ่มเทเตรียมให้เหรอคะ?"
80000083-94 = "[s] \"เดี๋ยวๆ เรื่องนั้น...อึก! ครูก็อยากรับนะแต่... แต่มัน...!\""
80000083-95 = "......"
80000083-96 = "...ฮิฮิ"
80000083-97 = "[s] \"หืม?\""
80000083-98 = "ฉันล้อเล่นค่ะ เลิกแกล้งคุณครูดีกว่า นี่ค่ะ ของขวัญค่ะ"
80000083-102 = "เอากลับไปกินที่ชาเล่ต์ก็ได้นะคะ"
80000083-103 = "[s] \"อ่อ...อืม ขะ...ขอบใจนะ\""
80000083-104 = "ค่ะ ถ้างั้นเรากลับกันเถอะค่ะ"
80000083-111 = "อ๋อ ช็อกโกแลตแท่งที่ฉันคาบไว้เมื่อกี้ ฉันใส่กลับไปในถุงด้วยนะคะ"
80000083-112 = "เอาไว้คุณครูลองชิมดู แล้วลองเดาดูว่าเป็นอันไหนนะคะ ถ้าหาเจอก็แชตมาบอกใน MOMOTALK ด้วยนะคะ"
80000083-113 = "ถ้างั้น... เอาไว้เจอกันใหม่นะคะ"
80000083-117 = "[ns] \"หืม?! ดะ...เดี๋ยวสิ อิโรฮะ...?!\""
80000083-119 = "(ถึงจะถูกแกล้งหลายๆ อย่าง แต่ช็อกโกแลตที่อิโรฮะให้มาก็...อร่อยมากจริงๆ)"

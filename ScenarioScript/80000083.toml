[translation]
80000083-1 = "The Perfect Middle Manager"
80000083-2 = "Busy Gehenna Department Store"
80000083-4 = "I got a message from Iroha on Valentine's Day, saying that she needed help with Pandemonium Society business."
80000083-5 = "But when I arrived at the place we agreed to meet..."
80000083-6 = "[ns1] \"Isn't this a department store?\"\n[ns2] \"I thought it was Pandemonium Society business. Why are we here?\""
80000083-7 = "So, about that. I don't know how it's done elsewhere, but Valentine's Day is kind of a big deal in the Pandemonium Society."
80000083-8 = "So, about that. I don't know how it's done elsewhere, but Valentine's Day is kind of a big deal in the Pandemonium Society."
80000083-9 = "We deliver gifts to all the other clubs and a few individual people...and as a representative of the Pandemonium Society, I'm the one who has to actually get those gifts."
80000083-10 = "I guess that's just the responsibility of a middle manager."
80000083-11 = "[s] \"Sounds like you have it pretty rough, Iroha.\""
80000083-12 = "I mean, it's no big deal if I only have to buy normal gifts."
80000083-13 = "I don't mind being asked to get Valentine's Day gifts for nearby businesses and the like. That's in my job description."
80000083-14 = "However..."
80000083-15 = "[s] \"However?\""
80000083-16 = "If I'm ordered to, for example, buy chocolate spicy enough to make the members of the Prefect Team cry their eyes out..."
80000083-17 = "Or, again, just as an example, to find some kind of chocolate that will explode when it's eaten..."
80000083-18 = "Following orders like that would be foolish, right?"
80000083-19 = "In fact, it's foolish to make those orders in the first place."
80000083-20 = "[s] \"Won't you get in trouble if you say things like that?\""
80000083-21 = "Nah. I said so to her face, in fact."
80000083-22 = "And then I was told to grab food on the way back, pick up a specially-commissioned chocolate bust from Red Winter Academy, and a whole list of other busy work..."
80000083-23 = "And I start to wonder...is this really how I should be spending my Valentine's Day?"
80000083-24 = "[s3] \"The typical story of a middle manager.\"\n[s4] \"I know that feeling...\""
80000083-25 = "Well, anyways. I called you because I wanted to get your input, Sensei."
80000083-26 = "Well, anyways. I called you because I wanted to get your input, Sensei."
80000083-27 = "[s] \"Input? Do you...really need my help buying gifts?\""
80000083-28 = "Yes, I do. Especially with the chocolate spicy enough to make the members of the Prefect Team cry their eyes out."
80000083-29 = "[s] \"That you especially don't need me for!\""
80000083-30 = "That's where you're wrong."
80000083-31 = "If I say that a gift was chosen by you, no one will be able to complain."
80000083-32 = "That's my strategy to make it through this Valentine's Day. If you chose the gifts yourself, Sensei, it'll all be fine."
80000083-33 = "[s] \"Oh, I understand the plan now.\""
80000083-34 = "And so, in the spirit of cooperation..."
80000083-38 = "From one middle manager to another, I'm asking for your help."
80000083-39 = "[s] \"No problem.\""
80000083-44 = "After spending some time shopping with Iroha..."
80000083-46 = "Thanks to you, Sensei, we got all the gifts without a problem."
80000083-47 = "Heh heh. I wouldn't have guessed you would pick something like that, though... I guess I underestimated your prankster nature."
80000083-48 = "Do you think the Prefect Team will get through this...?"
80000083-49 = "[s5] \"You make it sound like I was picking things out maliciously.\"\n[s6] \"I got normal gifts!\""
80000083-50 = "Yeah, you chose a lot of boring, safe gifts. As expected from a responsible teacher, I guess."
80000083-51 = "Yeah, you chose a lot of boring, safe gifts. As expected from a responsible teacher, I guess."
80000083-52 = "I guess I did ask for your help knowing that's exactly the type of person you are..."
80000083-53 = "[s] \"Huh? What was that?\""
80000083-54 = "No, nothing. Everything's going to be fine this year, thanks to you."
80000083-55 = "Thanks for coming, Sensei. Your help was invaluable."
80000083-56 = "Should we head out?"
80000083-57 = "[s7] \"Yes, Valentine's Day shopping complete.\"\n[s8] \"Oh, speaking of Valentine's Day...\""
80000083-58 = "...Oh? That's it?"
80000083-59 = "[s9] \"Huh?\""
80000083-60 = "It's Valentine's Day."
80000083-61 = "When I called you today, didn't you get the feeling that something was going on?"
80000083-62 = "[s10] \"Uh, I mean... well...\""
80000083-63 = "*sigh* I'll overlook it just this one time. It is a holiday, after all."
80000083-64 = "Heh heh... Anyway, what were you saying, Sensei?"
80000083-65 = "Something about Valentine's Day chocolate, right?"
80000083-66 = "[s11] \"Oh, uh...never mind. Let's head out.\""
80000083-67 = "Seriously? That's it?"
80000083-68 = "This is the perfect time to say what's on your mind...unless you're too embarrassed."
80000083-69 = "[s12] \"W-Well...that's...\""
80000083-70 = "Why don't I put you out of your misery? It is a holiday, after all."
80000083-71 = "Here. This is for you, Sensei."
80000083-76 = "[ns] \"Oh... A chocolate breadstick?\""
80000083-77 = "Yes, and it's handmade. Let me give it to you."
80000083-82 = "[ns] \"Yeah, thanks—\""
80000083-84 = "[ns] \"Um... Iroha? Why are you putting it in your mouth...and closing your eyes?!\""
80000083-85 = "..."
80000083-90 = "Are oo 'eally gunna durn ih down?"
80000083-91 = "[s] \"No, um, uh, of course not!\""
80000083-92 = "Or...do you mean you can't accept my gift?"
80000083-93 = "After I took the effort to make you a handmade gift, you're going to reject it?"
80000083-94 = "[s] \"That's not... I mean... It's not like I... But, still, I...\""
80000083-95 = "..."
80000083-96 = "Pfft."
80000083-97 = "[s] \"H-Huh?\""
80000083-98 = "Your face... I was joking, obviously. Here's your gift for real."
80000083-102 = "It's handmade with all my gratitude, so please take your time enjoying it when you get back to Schale."
80000083-103 = "[s] \"Oh, uh, right. Thanks.\""
80000083-104 = "Okay, let's get out of here."
80000083-111 = "Wait, one last thing. I put the one that was in my mouth back in that bag."
80000083-112 = "After you eat them all, send me a MomoTalk to let me know if you could tell which one was which."
80000083-113 = "Well...see you later."
80000083-117 = "[ns] \"Excuse me?! Wait, Iroha!\""
80000083-119 = "The chocolate was certainly delicious, but still felt a bit more like a prank than a gift."

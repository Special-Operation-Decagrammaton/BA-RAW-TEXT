[translation]
80000083-1 = "毫無破綻的中階管理者"
80000083-2 = "格黑娜．百貨公司"
80000083-4 = "（情人節當天，收到了伊呂波的聯絡）"
80000083-5 = "（似乎是萬魔殿的工作需要協助，然而抵達和伊呂波約好的地點時……）"
80000083-6 = "[ns1]「……為什麼要來百貨公司？」\n[ns2]「不是要我幫忙……萬魔殿的工作嗎？」"
80000083-7 = "沒什麼奇怪的唷。#n對我們萬魔殿來說，「情人節」就像是一種例行公事……"
80000083-8 = "沒什麼奇怪的唷。#n對我們萬魔殿來說，「情人節」就像是一種例行公事……"
80000083-9 = "簡單來說，就是以萬魔殿的名義向各種人或社團送禮的日子。#n而這個業務是由我負責。"
80000083-10 = "聽到這裡，不覺得這是個非常適合中階管理者的工作嗎？"
80000083-11 = "[s]「這樣啊……依然很辛苦呢。」"
80000083-12 = "如果只是要準備禮物倒是無所謂。"
80000083-13 = "收到這樣的指示……也並非無法接受。畢竟我是中階管理者。"
80000083-14 = "但是……"
80000083-15 = "[s]「……但是？」"
80000083-16 = "真琴議長的指示總是「去找出能讓風紀委員會的傢伙辣哭的巧克力！」、"
80000083-17 = "「還有一咬下去就會爆炸的巧克力！」之類的……"
80000083-18 = "……不覺得這樣很蠢嗎？"
80000083-19 = "不如說這種命令……說出來都不會覺得自己像個笨蛋嗎？"
80000083-20 = "[s]「那種話，以你的立場真的可以說出來嗎……？」"
80000083-21 = "反正我平常就會對他本人這麼說。"
80000083-22 = "除了那些之外，還要我順便幫他補充他個人的食物、#n領收委託赤冬業者製作的胸像巧克力之類的……"
80000083-23 = "真是的，明明是情人節，我都在做些什麼啊……"
80000083-24 = "[s3]「中階管理者的煩惱……」\n[s4]「伊，伊呂波也很辛苦呢……」"
80000083-25 = "雖然解釋了有點久……總之，就是因為這樣那樣的原因才會找老師過來的。"
80000083-26 = "雖然解釋了有點久……總之，就是因為這樣那樣的原因才會找老師過來的。"
80000083-27 = "[s]「情況我明白了，不過我的意見能幫得上忙嗎……？」"
80000083-28 = "那當然，畢竟還得選出能讓風紀委員會的各位哭出來的巧克力。"
80000083-29 = "[s]「你想讓我提出什麼樣的意見！？」"
80000083-30 = "不不不，需要的與其說是意見，不如說是老師本人。"
80000083-31 = "只要說是老師選的，肯定就不會收到抱怨了對吧？"
80000083-32 = "所以只要有老師的幫助，那道難題應該就能順利解決才對。"
80000083-33 = "[s]「真，真是個戰略家……」"
80000083-34 = "事情就是這樣……"
80000083-38 = "同為勞碌人，你會陪我的吧，老師？"
80000083-39 = "[s]「嗯，如果是這樣的話，我很樂意。」"
80000083-44 = "（於是，在和伊呂波的購物告一段落之後……）"
80000083-46 = "嗯，該買的東西全都買好了呢。"
80000083-47 = "不過話說回來，沒想到老師會選那個啊……呵呵。#n真是驚人的變化球……這個惡作劇程度就連我也有點吃驚。"
80000083-48 = "風紀委員會的各位，究竟能不能平安無事呢……？"
80000083-49 = "[s5]「為什麼要說的我好像『選了奇怪的東西』一樣！？」\n[s6]「沒什麼平不平安的吧，我選的是很普通的東西啊！？」"
80000083-50 = "也對，實際上確實是個無趣又正經的選擇呢。我覺得很有老師的風格。"
80000083-51 = "也對，實際上確實是個無趣又正經的選擇呢。我覺得很有老師的風格。"
80000083-52 = "……我也覺得老師會這麼做就是了。"
80000083-53 = "[s]「這麼做……？」"
80000083-54 = "不，沒什麼。託老師的福，工作順利完成了。"
80000083-55 = "感謝你特地在這種日子抽空陪我，老師。"
80000083-56 = "那麼，我們就回去吧？"
80000083-57 = "[s7]「嗯，走吧。」\n[s8]「話說伊呂波，今天是那個……」"
80000083-58 = "……真的嗎？"
80000083-59 = "[s9]「……咦？」"
80000083-60 = "我的意思是，這樣真的好嗎。"
80000083-61 = "我可是在情人節這天約老師出來了唷？#n……就這樣回去真的好嗎？"
80000083-62 = "[s10]「你的意思是，那個……」"
80000083-63 = "……算了，這次就放過你吧。#n畢竟是難得的情人節，太欺負人也不太好。"
80000083-64 = "……呵呵，怎麼了嗎，老師？"
80000083-65 = "今天……今天是情人節對吧？#n有什麼在意的事嗎？"
80000083-66 = "[s11]「與其說是在意的事……算，算了，我們回去吧。」"
80000083-67 = "真狡猾呢，都到這一步了卻想逃跑嗎？"
80000083-68 = "明明我都這麼漂亮的引導到這裡了，真是不坦率呢？#n面對我沒什麼好害羞的吧？"
80000083-69 = "[s12]「可是……」"
80000083-70 = "……算了，玩笑就先開到這裡。#n差不多也該回應一下老師的期待了對吧？"
80000083-71 = "來，請收下。"
80000083-76 = "[ns]「這是……？」"
80000083-77 = "沒錯，是我親手做的唷。來，老師，收下吧。"
80000083-82 = "[ns]「謝，謝謝──」"
80000083-84 = "[ns]「……伊，伊呂波同學？為什麼要把它含在嘴裡還閉上眼睛呢……？」"
80000083-85 = "……"
80000083-90 = "這是偶要說的台詞窩？為很麼老師不出呢？"
80000083-91 = "[s]「不不不不！」"
80000083-92 = "……你不願意收下我準備的禮物，是嗎？"
80000083-93 = "明明是我特別為老師準備的，老師卻不願意接受我的心意嗎？"
80000083-94 = "[s]「不是，我也非常想收下，但這樣實在是……！」"
80000083-95 = "…………"
80000083-96 = "……噗。"
80000083-97 = "[s]「……？」"
80000083-98 = "呵呵……我是開玩笑的。看來惡作劇過頭了呢。來，請收下吧。"
80000083-102 = "請回夏萊慢慢品嘗。"
80000083-103 = "[s]「啊，嗯。謝謝。」"
80000083-104 = "好，這次真的要回去了。"
80000083-111 = "對了，剛才我含住的那根也放回去了。"
80000083-112 = "吃完之後，覺得哪根是我吃過的……之後請用MomoTalk告訴我哦。"
80000083-113 = "那麼再見了。"
80000083-117 = "[ns]「……真的嗎！？」"
80000083-119 = "（伊呂波的巧克力像是滲入了被玩弄在股掌間的身體一般，非常美味）"

[translation]
80000083-1 = "#title;빈틈없는 중간관리자"
80000083-2 = "#place;게헨나 이글이글 백화점"
80000083-3 = "#wait;2500"
80000083-4 = "#na;(발렌타인 데이 당일. 만마전의 업무와 관련해 도움을 받고 싶다는 이로하의 연락을 받았다.)"
80000083-5 = "#na;(그리하여 이로하와 만나기로 한 약속장소에 도착했더니…….)"
80000083-6 = "[ns1] \"이로하, 여긴 백화점 아냐?\"\n[ns2] \"만마전과 관련된 업무로 보자고 하지 않았어? 근데 왜 백화점에서…….\""
80000083-7 = "3;이로하;01;그게 말이죠. 다른 곳은 어떨지 몰라도 발렌타인 데이는 저희 만마전에게 있어, 일종의 연례 행사 같은 거라서 말이에요.\n#3;a\n#3;em;[반응]"
80000083-8 = "3;이로하;01;그게 말이죠. 다른 곳은 어떨지 몰라도 발렌타인 데이는 저희 만마전에게 있어, 일종의 연례 행사 같은 거라서 말이에요.\n#3;a\n#3;em;[반응]"
80000083-9 = "3;이로하;99;덕분에 만마전의 이름으로 다른 사람, 혹은 동아리에 전달하기 위한 발렌타인 데이용 선물을 준비하는 것도 제 담당 업무거든요."
80000083-10 = "3;이로하;02;중간관리자에게 할당된 일거리라고나 할까요?"
80000083-11 = "[s] \"아…… 이로하도 고생이네.\""
80000083-12 = "3;이로하;00;물론 선물을 준비하는 것뿐이라면 괜찮아요."
80000083-13 = "3;이로하;01;어디까지나 발렌타인 데이에 대외업무에 필요한 선물을 준비해 둬라. 라는 지시도…… 뭐, 아슬아슬하게 납득 못할 것도 없죠. 중간관리자니까."
80000083-14 = "3;이로하;99;다만."
80000083-15 = "[s] \"……다만?\""
80000083-16 = "3;이로하;99;그 지시라는 게 <선도부 멤버들의 눈물을 쏙 빼게 만들어줄 무진장 매운 초콜릿을 사 와라!>라거나\n#3;em;…"
80000083-17 = "3;이로하;05;<혹시 한 입 베어 물기만 해도 폭발하는 초콜릿은 어디 없느냐?! 이로하!> 같은 이야기가 되면.\n#3;stiff"
80000083-18 = "3;이로하;00;솔직히 따르는 게 바보 같지 않나요?"
80000083-19 = "3;이로하;05;아니, 애당초 평소에 이런 명령 따위를 하는 쪽이 바보잖아요?\n#3;em;[빠직]"
80000083-20 = "[s] \"그런 말, 해도 괜찮은 거야……?\""
80000083-21 = "3;이로하;05;네, 뭐, 평소에 본인한테 직접 하기도 하는 걸요."
80000083-22 = "3;이로하;99;거기에 겸사겸사 자기가 먹을 걸 사오라는 둥, 붉은겨울 학원에서 알게 된 업체를 통해 자기 흉상 초콜릿을 주문했으니 그걸 수령해오라는 둥. 시키는 일도 가지각색…….\n#3;stiff"
80000083-23 = "3;이로하;06;……진짜 모처럼의 발렌타인 데이에 이게 뭐 하는 걸까. 싶다니까요.\n#3;em;[한숨]"
80000083-24 = "[s3] \"그야말로 중간관리자의 고생담이네!\"\n[s4] \"어, 엄청 공감되는 이야기야……!\""
80000083-25 = "3;이로하;01;뭐…… 어쨌거나 이런저런 일이 있는 만큼, 오늘 선생님을 부른 건 의견을 참고하고 싶어서예요.\n#3;em;[반응]"
80000083-26 = "3;이로하;01;뭐…… 어쨌거나 이런저런 일이 있는 만큼, 오늘 선생님을 부른 건 의견을 참고하고 싶어서예요.\n#3;em;[반응]"
80000083-27 = "[s] \"의견……? 앞서 말한 걸 사는데, 내 의견이 필요가 있……나?\""
80000083-28 = "3;이로하;03;네, 필요해요. 특히나 <선도부 멤버들의 눈물을 쏙 빼게 만들어줄 무진장 매운 초콜릿> 때문이라도."
80000083-29 = "[s] \"더더욱 내 의견 같은 건 필요 없는 거 아냐?!\""
80000083-30 = "3;이로하;02;오히려 반대라고요?\n#3;em;[반응]"
80000083-31 = "3;이로하;03;선생님이 고른 물건이라고 하면, 뭐라고 못하고 입을 꼭 다물 거 아니에요?"
80000083-32 = "3;이로하;07;네, 올해는 그렇게 넘어갈 수 있을지도 몰라. 선생님의 의견이라면! 하고 생각했으니까요.\n#3;em;[반짝]"
80000083-33 = "[s] \"아, 과연 이로하의 노림수는 그런 거였구나…….\""
80000083-34 = "3;이로하;01;그런 의미에서 자……."
80000083-35 = "#st;[0,0];instant;1;"
80000083-36 = "#clearST"
80000083-37 = "3;이로하;01\n#3;d\n#wait;1500"
80000083-38 = "3;이로하;03;같은 중간관리자로서, 어울려달라구요? 선생님.\n#3;a\n#3;em;[음표]\n#3;closeup"
80000083-39 = "[s] \"응, 그런 거라면 얼마든지.\""
80000083-40 = "#st;[0,0];instant;1;"
80000083-41 = "#clearST"
80000083-42 = "3;이로하;07\n#wait;1500\n#3;closeup\n#3;em;[반짝]"
80000083-43 = "#all;hide"
80000083-44 = "#na;(그렇게 이로하와 한 차례의 쇼핑을 거친 뒤…….)"
80000083-45 = "#all;hide"
80000083-46 = "3;이로하;01;으음~ 선생님 덕분에 어떻게든 무사히 쇼핑을 끝마칠 수 있었네요.\n#3;a"
80000083-47 = "3;이로하;03;후후. 설마 거기서 그런 선택을 할 줄이야……. 엄청난 변화구라고 할지. 선생님의 장난기엔 저도 깜짝 놀라버렸네요.\n#3;em;[재잘]"
80000083-48 = "3;이로하;07;과연, 괜찮을까요? 선도부……."
80000083-49 = "[s5] \"마치 악의를 가지고 골랐다는 듯이 말하지 말아 줄래?!\"\n[s6] \"분명 평범한 걸로 골랐고!\""
80000083-50 = "3;이로하;99;네, 참 재미없는 걸로 골랐죠. 선생님다운 의견과 선택이었어요.\n#3;em;[속상함]"
80000083-51 = "3;이로하;99;네, 참 재미없는 걸로 골랐죠. 선생님다운 의견과 선택이었어요.\n#3;em;[속상함]"
80000083-52 = "3;이로하;01;……뭐, 그런 선생님인 걸 알고 있기에 도움을 요청한 거지만요.\n#fontsize;50"
80000083-53 = "[s] \"응? 뭐라고 했어?\""
80000083-54 = "3;이로하;02;아뇨. 아무것도 아니에요. 덕분에 올해도 무사히 지나갈 수 있을 거 같네요.\n#3;em;[반응]"
80000083-55 = "3;이로하;03;자, 그럼 쇼핑도 끝났겠다. 오늘 도와주셔서 감사했습니다. 선생님."
80000083-56 = "3;이로하;03;그럼 돌아가 볼까요?"
80000083-57 = "[s7] \"응, 돌아가자.\"\n[s8] \"아…… 그, 이로하, 발렌타인 데이 초콜릿…… 하니 말인데.\""
80000083-58 = "3;이로하;01;……정말 그걸로 끝인가요?\n#3;em;…"
80000083-59 = "[s9] \"으, 응?\""
80000083-60 = "3;이로하;99;모처럼의 발렌타인 데이."
80000083-61 = "3;이로하;01;직접 이런 날 선생님을 호출했다는 시점에서…… 뭔가 느껴지시는 게 없으신가요?"
80000083-62 = "[s10] \"으음, 아니, 그게, 그러니까…….\""
80000083-63 = "3;이로하;06;……후우, 뭐, 한 번 봐 드릴게요. 말 그대로 모처럼의 발렌타인 데이이기도 하니까.\n#3;em;[한숨]"
80000083-64 = "3;이로하;03;후후…… 뭔가요? 선생님?"
80000083-65 = "3;이로하;07;발렌타인 데이 초콜릿……하니, 뒤에 무슨 말씀을 하고 싶으신 건가요?"
80000083-66 = "[s11] \"아, 아무것도 아니야. 그, 도, 돌아갈까…….\""
80000083-67 = "3;이로하;00;앗, 치사하게 거기서 말을 끊는 건가요?\n#3;em;[반응]"
80000083-68 = "3;이로하;05;여기선 솔직하게 말해야 할 타이밍 아닌가요? 그런데 부끄러워서 그 이상은 말씀하시기 곤란하신 건가요?"
80000083-69 = "[s12] \"윽…… 그, 그건…….\""
80000083-70 = "3;이로하;99;뭐, 장난은 여기까지 해두고. 어디 선생님의 기대감에 답해드리도록 할까요?"
80000083-71 = "3;이로하;03;자, 여기 선생님을 위해 준비한 거예요.\n#3;greeting"

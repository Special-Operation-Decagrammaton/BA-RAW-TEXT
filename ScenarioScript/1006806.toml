[translation]
1006806-1 = "晚安囉，澪紗"
1006806-2 = "貧民街"
1006806-3 = "（保險起見，前往了澪紗負責的貧民街）"
1006806-7 = "（附近一片寂靜，甚至能聽見澪紗的夢話）"
1006806-11 = "唔嘿嘿……已經吃不下了……嘻嘻……"
1006806-17 = "[ns1] 輕輕地搖一搖肩膀\n[ns2]「在這種地方睡覺會感冒的哦。」"
1006806-20 = "唔嘻嘻……老師……"
1006806-21 = "老師……"
1006806-22 = "……老師？"
1006806-23 = "……咦？"
1006806-24 = "嗚噫啊啊啊啊啊啊啊！！！"
1006806-25 = "老，老師！？老師怎麼會在這裡！？#n嗯，嗯嗯！？呃！？咦！？"
1006806-26 = "……覺得我會寂寞？#n巡，巡邏的時候一直都是單獨行動的……"
1006806-27 = "啊，不不不！我沒有討厭的意思！不如說……#n本本，本來就是我自己放心不下才會來這裡看看的……"
1006806-28 = "[s3]「我也是個容易擔心的人。」\n[s4]「我只是想吹吹風。」"
1006806-31 = "是，是嗎……？#n嗯～？"
1006806-32 = "啊啊……不是，我沒有每天都巡邏到這麼晚……"
1006806-33 = "老，老師是不是從剛剛開始就在轉移話題！？#n天氣這麼冷，請老師快回去吧！老師會感冒的！"
1006806-34 = "[s5]「不能放你一個人在這裡。」\n[s6]「我的防寒對策非常完善。」"
1006806-37 = "嘿嘿……"
1006806-38 = "……兩個人一起聊聊天，多少也能消除睡意……？"
1006806-39 = "唔嗯……是這麼說沒錯……不過，讓忙碌的老師做這種事……"
1006806-43 = "真的，可以嗎……？"
1006806-44 = "那，那麼就！拜託你了！！"
1006806-46 = "（兩人就這樣一邊和睡意戰鬥，一邊在夜晚安靜的街道巡邏）"
1006806-47 = "（順利平安地迎接了早晨，柔和清新的空氣充滿了肺部）"
1006806-54 = "果然什麼事都沒發生呢。#n啊哈哈，今天一直有這種感覺！"
1006806-55 = "……不會！並不會覺得可惜唷？#n我反而覺得很高興！"
1006806-56 = "希望就算自衛隊不在了，這樣的和平也能持續下去。"
1006806-57 = "……某個我尊敬的人曾經這麼說過！"
1006806-58 = "……熬夜過後無論如何都會很睏呢……"
1006806-59 = "呼啊，呼啊啊……"
1006806-65 = "[ns7] 避免澪紗跌倒，輕輕用手扶住他的肩膀\n[ns8]「澪紗，還能再撐一下嗎？」"
1006806-69 = "哈啊！真抱歉！#n又在老師面前露出丟人的樣子……"
1006806-70 = "話說回來，老師你……不會覺得很睏嗎？"
1006806-71 = "你常常這樣……？#n老師平常究竟過著什麼樣的生活……"
1006806-72 = "……啊。"
1006806-73 = "[ns9]「……澪紗？」\n[ns10]「怎麼了？」"
1006806-79 = "……請看那邊，老師。"
1006806-84 = "……真漂亮呢。"
1006806-87 = "― ……總覺得有種神奇的感覺。像這樣……[wa:5700] "
1006806-89 = "― 和別人一起看日出，這還是第一次……[wa:3580] "
1006806-92 = "― 這麼說來，和別人獨處的時間……[wa:3900] "
1006806-94 = "― 這說不定，也是最長的一次……哈哈。[wa:5840] "
1006806-97 = "― 唔嗯……[wa:240] "
1006806-99 = "― 感覺好像又說了奇怪的話……[wa:1920] "
1006806-102 = "― 其實我還有點睏……[wa:2290] "
1006806-104 = "― 自已在說些什麼，也不是很……[wa:3240] "
1006806-107 = "― 不，不過老師你……總是會理解我……[wa:3600] "
1006806-110 = "― 這次也……[wa:740] "
1006806-112 = "― 請像平時一樣，理解我哦。嘿嘿……[wa:4120] "
1006806-115 = "― 嗯……真不錯呢……[wa:2080] "
1006806-118 = "― 老師……謝謝你……嘻嘻……[wa:5020] "
1006806-122 = "呼呀……老師……"
1006806-124 = "（背著似乎睡得很香的澪紗回到了夏萊……）"
1006806-125 = "（讓澪紗在休息室好好休息之後，將他送回了房間）"

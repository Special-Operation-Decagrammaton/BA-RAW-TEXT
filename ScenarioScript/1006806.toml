[translation]
1006806-1 = "ฝันดีนะ เรอิสะ"
1006806-2 = "ย่านแออัด"
1006806-3 = "(คุณครูไปยังย่านแออัดที่เรอิสะกำลังลาดตระเวนอยู่)"
1006806-7 = "(ย่านแออัดนั้นเงียบเหงาจนไม่ได้ยินเสียงใครเลยอย่างที่เรอิสะบอกมา)"
1006806-11 = "อ่า แหะๆ... กินต่อไม่ไหวแล้วค่ะ... งืม..."
1006806-17 = "[ns1] เขย่าไหล่อย่างระวัง\n[ns2] \"มานอนในที่แบบนี้ได้ไง กลับบ้านเลย\""
1006806-20 = "แหะๆๆ... คุณครูก็ด้วยเหรอ..."
1006806-21 = "คุณครู..."
1006806-22 = "คุณครู...?"
1006806-23 = "หืม...?"
1006806-24 = "ว้ายยยยยยยยย!!!"
1006806-25 = "คะ... คุณครู!? คุณครูมาที่นี่ได้ยังไงคะ!? หะ... หืม!? เอ๋!? เอ๋!?"
1006806-26 = "คะ? ลองแวะมาเฉยๆ เพราะคิดว่าต้องอยู่คนเดียวเหรอคะ?? ตะ... แต่ปกติฉันก็ทำอะไรแบบนี้คนเดียว#nอยู่แล้ว..."
1006806-27 = "มะ... ไม่สิ! ไม่ใช่อย่างนั้นนะคะ! แต่คุณครูไม่น่ามีธุระอะไรที่นี่นะคะ! ส่วนฉันก็แค่มาดูว่ามีอะไรเกิด#nขึ้นหรือเปล่าก็เท่านั้น...!!"
1006806-28 = "[s3] \"ครูก็แวะมาเผื่อๆ เหมือนกัน\"\n[s4] \"ไม่ต้องคิดมากหรอก คิดว่าครูแวะมาเที่ยวแล้วกัน\""
1006806-31 = "ยะ... อย่างนั้นก็ได้เหรอคะ...? แต่มันแปลกๆ นะ..."
1006806-32 = "คะ? ฉันทำเรื่องแบบนี้บ่อยหรือเปล่างั้นเหรอคะ? ไม่หรอกค่ะ ไม่ถึงกับบ่อย..."
1006806-33 = "ยะ... อย่าเอาแต่เปลี่ยนเรื่องสิคะ! อากาศก็หนาว คุณครูมาในที่แบบนี้ทำไมคะ! กลับไปเดี๋ยวนี้เลยค่ะ!!"
1006806-34 = "[s5] \"ครูไม่กลับ\"\n[s6] \"ครูรู้ว่าจะหนาว ก็เลยเอาอุปกรณ์กันหนาวมาด้วยนี่ไง\""
1006806-37 = "ทะ... ทำเหมือนจะมาออกแคมป์อย่างนั้นแหละ..."
1006806-38 = "คะ? ต้องมีคนลาดตระเวน 2 คน จะได้ช่วยกันปลุกเวลาที่อีกคนง่วงงั้นเหรอคะ? งะ... งั้นก็... อืม..."
1006806-39 = "อ่า... อืม... ช่วยไม่ได้นะคะ... ไม่สิ คุณครูเป็นถึงคุณครูนะ..."
1006806-43 = "มะ... ไม่รู้ด้วยแล้ว..."
1006806-44 = "งั้นก็รบกวนด้วยนะคะ!!"
1006806-46 = "(จากนั้นคุณครูกับเรอิสะก็เดินลาดตระเวนด้วยกันและช่วยกันทำให้อีกฝ่ายไม่ง่วงนอน)"
1006806-47 = "(โชคดีที่ไม่มีอะไรเกิดขึ้นตามที่คาดไว้ ทั้งคู่จึงเดินกลับพร้อมกับสูดอากาศยามเช้ามืดด้วยกัน)"
1006806-54 = "สุดท้ายก็ไม่มีอะไรเกิดขึ้นเลยนะคะ ฮุฮุ แต่ฉันก็คาดไว้แล้วละค่ะว่าทุกอย่างจะปกติดี"
1006806-55 = "คะ? คิดว่าฉันเสียดายเหรอคะ? ฮ่าฮ่า! ไม่หรอกค่ะ! ไม่มีอะไรมันก็ดีแล้วนี่คะ!"
1006806-56 = "ช่วงนี้ไม่มีเรื่องอะไรเกิดขึ้นแบบนี้มาหลายวันแล้วค่ะ... คงจะดีนะคะถ้าไม่ต้องออกไปทำงานของกลุ่ม#nรักษาความสงบแล้ว"
1006806-57 = "...คนที่ฉันเคารพพูดไว้แบบนั้นน่ะค่ะ!"
1006806-58 = "พะ... พอทำงานโต้รุ่งมา หนังตาก็หย่อนเลยค่ะ..."
1006806-59 = "งืม งืม..."
1006806-65 = "[ns7] ประคองเรอิสะให้ยืนตรง\n[ns8] \"ยังนอนไม่ได้นะเรอิสะ\""
1006806-69 = "อ๊ะ!! ขอโทษนะคะ! สติฉันหลุดลอยไปแล้วค่ะ ฉันทำเรื่องน่าอายต่อหน้าคุณครูอีกแล้ว..."
1006806-70 = "ว่าแต่... คุณครูคะ... ทำไมคุณครูถึงยังปกติอยู่ล่ะคะ? ไม่เหนื่อยเหรอคะ?"
1006806-71 = "คะ? โต้รุ่งคืนเดียวแค่นี้สบายมาก... งั้นเหรอคะ? ปะ... ปกติใช้ชีวิตมาแบบไหนนะ..."
1006806-72 = "อ๊ะ..."
1006806-73 = "[ns9] \"เรอิสะ...?\"\n[ns10] \"เป็นอะไรเหรอ?\""
1006806-79 = "ดูตรงนั้นสิคะคุณครู...!"
1006806-84 = "พระอาทิตย์ขึ้นแล้วละค่ะ!"
1006806-87 = "― รู้สึกแปลกดีนะคะ เพราะนี่...[wa:5300] "
1006806-89 = "― เป็นครั้งแรกที่ฉันได้มาดูพระอาทิตย์ขึ้นกับใครแบบนี้น่ะค่ะ[wa:1980] "
1006806-92 = "― จะว่าไปแล้วการได้มาอยู่กับใครสองคน...[wa:3020] "
1006806-94 = "― ครั้งนี้อาจจะนานที่สุดเท่าที่เคยเลยก็ได้ค่ะ แหะๆ[wa:4600] "
1006806-97 = "― อืม...[wa:160] "
1006806-99 = "― ดูเหมือนฉันพูดอะไรแปลกๆ ออกไปอีกจนได้นะคะ...[wa:680] "
1006806-102 = "― ที่จริงฉันแอบง่วงนิดหน่อยน่ะ...[wa:1410] "
1006806-104 = "― ฉันไม่รู้ตัวหรอกค่ะว่าฉันพูดอะไรอยู่...[wa:2240] "
1006806-107 = "― ตะ... แต่ว่าคุณครูก็... รู้ทุกอย่างเลย...[wa:2640] "
1006806-110 = "― งั้นครั้งนี้ก็...[wa:260] "
1006806-112 = "― ช่วยรู้เหมือนทุกครั้งด้วยนะคะ ฮิฮิ...[wa:3280] "
1006806-115 = "― อืม... ดีจังเลยนะคะ...[wa:1560] "
1006806-118 = "― คุณครู... ขอบคุณค่ะ... ฮิฮิ...[wa:4340] "
1006806-122 = "งืมม... คุณครู..."
1006806-124 = "(สุดท้ายเรอิสะก็หลับไป จนคุณครูต้องแบกเธอกลับมายังชาเล่ต์)"
1006806-125 = "(หลังรอให้เรอิสะนอนหลับในห้องพักอย่างเพียงพอแล้วก็พากลับไปส่งที่บ้าน)"

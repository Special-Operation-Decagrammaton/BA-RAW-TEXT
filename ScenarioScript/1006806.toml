[translation]
1006806-1 = "Say Goodnight, Reisa"
1006806-2 = "Slums"
1006806-3 = "I went to check on Reisa's patrol route, just in case."
1006806-7 = "As she said, there were no signs of life anywhere."
1006806-11 = "Heeheehee... Eat more? I couldn't... Hee..."
1006806-17 = "[ns1] Carefully shake her shoulder.\n[ns2] \"You could catch a cold if you sleep in a place like this.\""
1006806-20 = "Heeheehee... Sensei's here for the party..."
1006806-21 = "Sensei..."
1006806-22 = "...Sensei?"
1006806-23 = "Huh?"
1006806-24 = "Auuugh!"
1006806-25 = "S-Sensei? Huh? What? What are you doing here?"
1006806-26 = "You're here...because you thought I'd be alone? But...I almost always patrol on my own?"
1006806-27 = "N-No, I just mean... There's really no need for you to be here! Nothing ever happens. I'm just here to be safe!"
1006806-28 = "[s3] \"I'm just being safe too.\"\n[s4] \"Don't mind me. I'm just hanging out.\""
1006806-31 = "R-Really? Hm... That seems weird, but I guess..."
1006806-32 = "What? No, I don't do this that often..."
1006806-33 = "Hang on! You can't distract me! It's too cold for you to be out here, Sensei. You should head back!"
1006806-34 = "[s5] \"Don't wanna.\"\n[s6] \"I came prepared for the cold.\""
1006806-37 = "Y-You're acting like we're on a camping trip or something..."
1006806-38 = "Huh...if there's two of us, we can keep each other awake? Um..."
1006806-39 = "Well, I guess you have a point... But still..."
1006806-43 = "I-I don't know..."
1006806-44 = "I guess it's okay? So... Let's get to it!"
1006806-46 = "Reisa and I patrolled together and kept each other from falling asleep."
1006806-47 = "As Reisa expected, there were no accidents or incidents for us to intervene in. We walked back peacefully in the pre-dawn light."
1006806-54 = "Nothing happened. Heehee. I told you so, Sensei."
1006806-55 = "Huh? No! Why would I be upset? Haha, this is great!"
1006806-56 = "Every day should be like this, so there's no need for groups like the Vigilante Crew."
1006806-57 = "...Someone I look up to is always saying things like that!"
1006806-58 = "I'm a little sleepy from the all-nighter, but..."
1006806-59 = "Hee... Heehee..."
1006806-65 = "[ns7] Help Reisa stay upright.\n[ns8] \"You can't fall asleep yet, Reisa.\""
1006806-69 = "Ah! Sorry! So sorry! What am I doing? I can't slack off in front of you!"
1006806-70 = "But, hang on, you seem totally fine! How are you doing that? Aren't you tired?"
1006806-71 = "Hmm... You're always fine for about a day or so? Well, that's good, but... You shouldn't know that! What kind of life do you live, anyway?"
1006806-72 = "...Oh."
1006806-73 = "[ns9] \"...Reisa?\"\n[ns10] \"What is it?\""
1006806-79 = "Look, Sensei!"
1006806-84 = "The sun is rising."
1006806-87 = "― This is a bit strange. It's...[wa:5220] "
1006806-89 = "― It's the first time I've watched the sunrise with someone...[wa:1860] "
1006806-92 = "― It may even be...[wa:3820] "
1006806-94 = "― The longest amount of time I've spent with someone else... haha.[wa:3960] "
1006806-97 = "― Um...[wa:200] "
1006806-99 = "― Did I say something weird again?[wa:1160] "
1006806-102 = "― I'm still a little sleepy...[wa:1530] "
1006806-104 = "― I might be rambling.[wa:3000] "
1006806-107 = "― But even so, you always seem to understand me, Sensei.[wa:2120] "
1006806-110 = "― So, um...[wa:580] "
1006806-112 = "― Please understand me this time, too. Heehee.[wa:3000] "
1006806-115 = "― Mmm... It's nice...[wa:1680] "
1006806-118 = "― Sensei... Thanks... Heehee...[wa:4380] "
1006806-122 = "Mmf... Sensei..."
1006806-124 = "I gave a sleeping Reisa a piggyback ride back to Schale."
1006806-125 = "I let her sleep in the lounge, and sent her home when she woke up."

1014003-37 = "3;쿠루미;01;병따개는 지레의 원리를 사용하니까, 틈에 끼워넣을 수 있는 긴 물건이라면 무엇이든 병따개를 대신할 수 있어."
1014003-38 = "3;쿠루미;11;훈련 중에는 병따개 같은 걸 따로 챙길 여유가 없으니까. 야외에서 음료수 병을 딸 때 자주 해봤거든.\n#3;em;[반짝]"

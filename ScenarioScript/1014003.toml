1014003-43 = "3;쿠루미;02;뭐. SRT의 포인트맨으로서, 다른 대원에 비해 돌발상황에는 비교적 잘 대처하는 편이지."
1014003-44 = "3;쿠루미;01;포인트맨은 소대의 그 누구보다 먼저 앞서서 적의 기습이나, 장애물에 맞서야 되니까.\n#3;em;[...]"
1014003-45 = "3;쿠루미;01;이 장기를 샬레의 당번 활동에서 보여줄 일은 거의 없겠지만, 그래도 가볍게 고장 난 장치를 수리하거나 잠금 장치를 여는 일이라면 얼마든지 협력할 수 있어."

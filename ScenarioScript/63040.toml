[translation]
63040-1 = "第4話;皇家血統"
63040-2 = "皇家血統。"
63040-3 = "特別的血。特別的血統。"
63040-4 = "回想起來，我從以前開始就一直被周圍的人捧在手心。"
63040-5 = "然而那並沒有太大的意義。"
63040-6 = "畢竟我也和大家一樣遭受了殘酷的對待。"
63040-7 = "還因為是特別的存在而徒增了許多限制，以及不能說的事情。"
63040-9 = "謝謝你，沙醬。"
63040-10 = "因為有沙醬在，我才能夠撐過那段時光。"
63040-12 = "謝謝你，[USERNAME]老師。"
63040-13 = "因為遇見了老師，我才終於能夠成為我自己。"
63040-15 = "還有美咲跟日和也是。"
63040-16 = "如果沒有大家，我恐怕會如同不能說話的人偶或祭品一般──"
63040-17 = "永遠作為某人和某物的象徵，毫無意義地度過一輩子吧。"
63040-19 = "是因為得知與奧利斯的祕儀有關的事，所以有點得意忘形了嗎？"
63040-20 = "還是因為隱約察覺到沉睡在這片土地下的東西是什麼，就以為自己無所不能了呢？"
63040-24 = "真遺憾。"
63040-25 = "這種程度的知識，我早在前輩無法想像的時期就必須知道了。"
63040-26 = "不過多虧前輩，我也確定了一件事情。"
63040-27 = "啟示錄的天使現象，就是由「前輩」所引起的。"
63040-28 = "而且一開始還是在無意識的情況下……#n從某種意義上來說，也可以說是你「召喚」出來的吧。"
63040-29 = "這對前輩而言或許有點可惜……"
63040-30 = "不過那並不是真正記載於經典中的「七位吹號天使」。"
63040-31 = "但是──那確實曾有昇華為「七位吹號天使」的可能性。"
63040-32 = "如果前輩能成為一位完美無缺的審判者的話。"
63040-33 = "完美無缺的……「審判者」？"
63040-34 = "我剛才也提過，並非只有前輩是奧利斯。"
63040-35 = "換句話說，前輩並不是唯一知道奧利斯的祕儀的人。"
63040-36 = "因為大部分前輩才剛知道的事情，對我來說其實都是早已「必須知道」的事。"
63040-37 = "只不過是被禁止說出來而已……直到現在也沒有改變。"
63040-38 = "奧利斯的皇家血統，就是這麼一回事。"
63040-39 = "話雖如此，我還是要謝謝你，昴前輩。"
63040-40 = "多虧前輩揭露了這些事情，我總算能把話說出口了。"
63040-41 = "啊，感覺真暢快。#n只有自己知道某件事，其他人都不知道的那種感覺……真的超悶的哦？"
63040-42 = "[ns]「所以這到底是怎麼回事呢……敦子？」"
63040-43 = "在我們眼前的那個天使……不，應該說那個類似天使的東西。"
63040-46 = "簡單來說，就是由奧利斯的所有情感凝聚而成的某種「現象」。"
63040-47 = "我之前也說過吧？#n奧利斯已經變成會發生「某些事情」的地方了。"
63040-49 = "[ns]「啊……！」"
63040-51 = "奧利斯本來就存在著「某些東西」。"
63040-52 = "嘆息、怨恨、冤屈、憤怒、斷念……這裡就是聚集了這些情緒的地方。"
63040-54 = "奧利斯是不是希望世界滅亡……是嗎？"
63040-57 = "老實告訴你吧，老師──正是如此。"
63040-61 = "無法從村子得到溫暖的孩子，會為了取暖而放火燒掉村子。"
63040-62 = "對於沒有什麼可以失去的人來說，世界的滅亡或許反而是一種救贖。"
63040-64 = "[ns1]「曾，曾經有可能昇華是什麼意思？」\n[ns2]「你剛才說過，如果是完美無缺的審判者就有可能對吧？」"
63040-67 = "沒錯。長年累積在奧利斯的，確實是足以導致那種結果的「某種東西」。"
63040-68 = "……至少已經達到足以用「某種結果」回敬三一的程度。"
63040-69 = "不過前提是昴前輩他，必須得是「完美無缺」的才行。"
63040-70 = "意思是說……他存在某些缺陷嗎？"
63040-71 = "沒錯。"
63040-72 = "就是這個孩子。"
63040-73 = "啊……！"
63040-77 = "我……我……"
63040-78 = "看來你終於理解了呢。"
63040-79 = "在前輩「拋棄」這孩子的瞬間……前輩的所有行動就不再具有正當性了。"
63040-80 = "假如前輩乾脆以自身為媒介來構築這個天使現象，或許反而還比較好。"
63040-81 = "然而前輩卻以自己的意志，選擇成為「吹號的天使」。"
63040-82 = "雖然這也可以理解。#n不管是前輩，還是留在奧利斯的每個人……多少都想過要以某種形式成為審判者吧。"
63040-83 = "只不過……"
63040-84 = "所謂的審判者，本來就必須完美無缺才行。"
63040-85 = "「你的腳在自己暗設的網羅裡纏住了。」"
63040-86 = "前輩應該還記得這句經文吧？"
63040-87 = "要是舞彩沒有來找我們……"
63040-88 = "沒有去找「老師」的話，前輩或許還有機會成為審判者。"
63040-91 = "請不要拋下我！"
63040-103 = "啊……"
63040-104 = "啊……啊啊……"
63040-106 = "昴？"
63040-107 = "雖然微弱，但我聽到聲音了。#n難道說……！？"
63040-108 = "……"
63040-116 = "日，日和同學……？"
63040-117 = "如果有話想說……就該說出來哦，舞彩。"
63040-121 = "我，我們本來……不就是為了好好談談……才來到這裡的嗎？"
63040-123 = "……"
63040-127 = "嗯，我知道了。#n謝謝你，日和同學。"
63040-130 = "那個，前輩……？#n我，我有些話想告訴你。#n從那之後就一直想跟你說……"
63040-132 = "沒關係的，前輩。"
63040-133 = "全部……都沒關係的。"
63040-134 = "…………！"
63040-135 = "雖然不敢說百分之百……但我能夠理解前輩的心情。"
63040-136 = "前輩、小隊、奧利斯的大家……"
63040-137 = "還有[USERNAME]老師，我全都非常喜歡。"
63040-138 = "直到現在，我還是希望奧利斯能夠留下來。"
63040-139 = "也希望奧利斯……能夠變成一所更好的學校。"
63040-140 = "所，所以……"
63040-144 = "所以……呼……"
63040-145 = "請幫幫我吧，前輩！！！！！"
63040-147 = "…………！"
63040-148 = "我，我真的……非常喜歡前輩演奏的口琴！！！！！"
63040-150 = "下一話;口琴（２）"

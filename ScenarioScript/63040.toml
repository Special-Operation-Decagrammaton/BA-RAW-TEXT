63040-25 = "3;아츠코;S2_05;나는, 선배가 상상도 하지 못했을 시절부터, 계속 알았어야 했어."
63040-26 = "3;아츠코;S2_03;그래도 한 가지는 확신할 수 있게 됐네."
63040-27 = "3;아츠코;S2_05;계시록의 천사 현상은, '선배'가 불러일으킨 것이었다는 걸."
63040-28 = "3;아츠코;S2_02;심지어 처음에는 의식도 하지 않고 그 현상을 일으켰던 거지? 어떤 의미로는 소환해 냈다고 볼 수도 있었을 거고."
63040-29 = "3;아츠코;S2_99;그래. 선배에게는 아쉬운 일이겠지만."
63040-30 = "3;아츠코;S2_05;이건 경전에 기록된 진짜 일곱 나팔 부는 천사가 아니야."
63040-31 = "3;아츠코;S2_01;하지만 말이지. 정말로 그 일곱 나팔 부는 천사로 승화할 가능성도 있었어."
63040-32 = "3;아츠코;S2_05;선배가 완전무결한 심판자일 수 있었다면 말이지."
63040-33 = "3;사오리;S2_04;완전무결한…… '심판자'?\n#3;em;[?]"
63040-34 = "3;아츠코;S2_99;이야기했지만, 선배만이 아리우스인 것은 아니야."
63040-35 = "3;아츠코;S2_05;다시 말해, 선배 혼자만 아리우스의 비의를 알게 된 것이 아니라는 거야."
63040-36 = "3;아츠코;S2_05;왜냐하면 선배가 막 알게 된 것의 대부분은, 나에게는 이미 '알았어야 했던' 것들이었으니까."
63040-37 = "3;아츠코;S2_05;다만 소리내어 이야기하는 것이 금지되었을 뿐이지. 그건 지금도 마찬가지고."
63040-38 = "3;아츠코;S2_05;아리우스의 로열 블러드라는 건, 그런 것이었으니까."
63040-39 = "3;아츠코;S2_99;그래도 감사를 표할게. 스바루 선배."
63040-40 = "3;아츠코;S2_01;선배가 드러내어 버린 부분은, 이걸로 간신히 이야기할 수 있게 되었으니까."

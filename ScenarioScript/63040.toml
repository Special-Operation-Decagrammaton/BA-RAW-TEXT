[translation]
63040-1 = "ตอนที่ 4;สายเลือดราชวงศ์"
63040-2 = "สายเลือดของราชวงศ์"
63040-3 = "สายเลือดพิเศษ วงศ์ตระกูลพิเศษ"
63040-4 = "พอมาคิดดูแล้ว ฉันได้รับการปรนนิบัติหลายๆ อย่างจากคนรอบข้างมาตั้งแต่เมื่อก่อน"
63040-5 = "แต่มันก็ไม่มีความหมายอะไรมากหรอก"
63040-6 = "สุดท้ายแล้วก็ต้องเผชิญชะตากรรมที่เลวร้ายเหมือนกันอยู่ดี"
63040-7 = "เพราะฉันเป็นคนพิเศษ ก็เลยมีหลายสิ่งที่ฉันทำหรือพูดออกมาไม่ได้"
63040-9 = "ขอบใจนะ ซัตจัง"
63040-10 = "ขอบใจที่ช่วยให้ฉันผ่านพ้นช่วงเวลาเหล่านั้นมาได้"
63040-12 = "ขอบคุณนะ คุณครู [USERNAME]"
63040-13 = "หลังจากได้พบคุณครู ฉันก็รู้สึกว่าในที่สุดฉันก็เป็นตัวเองได้อย่างเต็มที่"
63040-15 = "มิซากิกับฮิโยริก็ด้วย"
63040-16 = "ถ้าไม่มีทุกคน ฉันก็คงเป็นแค่ตุ๊กตาและเครื่องสังเวยที่พูดไม่ได้"
63040-17 = "และคงต้องใช้ทั้งชีวิตอย่างไร้ความหมาย ในฐานะสัญลักษณ์ของใครบางคนหรือของบางอย่าง"
63040-19 = "พอได้รู้ความลับของอาเรียส ก็เลยตื่นเต้นขึ้นมาเหรอ?"
63040-20 = "พอได้รู้ว่าบางสิ่งที่หลับใหลอยู่ในที่แห่งนี้คืออะไร ก็เลยคิดว่าตอนนี้จะทำอะไรก็ได้งั้นเหรอ?"
63040-24 = "น่าเสียดายนะ เรื่องแค่นั้นน่ะ"
63040-25 = "ฉันควรจะรู้เรื่องนี้มาตั้งแต่ตอนที่รุ่นพี่จินตนาการไม่ถึงเลยด้วยซ้ำ"
63040-26 = "แต่ยังไงฉันก็มั่นใจได้เรื่องหนึ่ง"
63040-27 = "ว่าปรากฏการณ์นางฟ้าในวิวรณ์เป็นสิ่งที่ 'รุ่นพี่' ปลุกขึ้นมา"
63040-28 = "แล้วตอนแรกรุ่นพี่ก็ทำให้เกิดปรากฏการณ์นั้นโดยที่ตัวเองไม่รู้ตัว ในแง่หนึ่งจะเรียกว่าอัญเชิญออกมา#nก็ได้"
63040-29 = "อื้อ ถึงจะเป็นเรื่องน่าเสียดายสำหรับรุ่นพี่"
63040-30 = "แต่นี่ไม่ใช่ 7 นางฟ้าเป่าแตรตัวจริงที่บันทึกไว้ในพระคัมภีร์หรอก"
63040-31 = "แต่ถึงยังไง ก็เป็นไปได้ว่าจะถูกยกระดับให้เป็นนางฟ้าเป่าแตรทั้ง 7 จริงๆ"
63040-32 = "ถ้ารุ่นพี่เป็นผู้พิพากษาที่สมบูรณ์แบบได้น่ะนะ"
63040-33 = "'ผู้พิพากษา'... ที่สมบูรณ์แบบ?"
63040-34 = "อย่างที่ฉันบอกไปว่าไม่ใช่แค่รุ่นพี่ที่เป็นอาเรียส"
63040-35 = "หมายความว่าไม่ได้มีแค่รุ่นพี่เท่านั้นที่ล่วงรู้ความลับของอาเรียสยังไงล่ะ"
63040-36 = "นั่นก็เพราะสิ่งที่รุ่นพี่เพิ่งจะรับรู้มา ส่วนใหญ่เป็นสิ่งที่ฉัน 'ต้องรู้' มาตั้งแต่ไหนแต่ไรแล้ว"
63040-37 = "แต่แค่ฉันถูกห้ามไม่ให้พูดออกมาก็เท่านั้น และตอนนี้มันก็ยังเป็นแบบนั้นอยู่"
63040-38 = "นี่ละสายเลือดของราชวงศ์ของอาเรียส"
63040-39 = "แต่ยังไงก็ขอบคุณนะ รุ่นพี่สุบารุ"
63040-40 = "ขอบคุณที่เปิดเผยสิ่งนี้ออกมา ฉันก็เลยพูดถึงมันได้สักที"
63040-41 = "อ่า... เหมือนได้ยกภูเขาออกจากอกเลย ที่ผ่านมาฉันอึดอัดมากเลยละที่ต้องรู้ในสิ่งที่ทุกคนไม่รู้"
63040-42 = "[ns] \"ตกลงมันเป็นยังไงเหรอ อาสึโกะ...?\""
63040-43 = "นางฟ้าที่อยู่ตรงหน้าเรา... ไม่สิ ต้องเรียกว่าสิ่งที่ดูเหมือนนางฟ้า"
63040-46 = "มันคือ 'ปรากฏการณ์' ที่เกิดจากการหลอมรวมทุกความรู้สึกของอาเรียส"
63040-47 = "ฉันเพิ่งบอกไปเมื่อไม่นานมานี้ไม่ใช่เหรอ? ว่าอาเรียสเป็นดินแดนที่มี 'บางอย่าง' เกิดขึ้นอยู่แล้ว"
63040-49 = "[ns] \"อ้อ...!\""
63040-51 = "เดิมทีแล้วในอาเรียสมี 'บางอย่าง' อยู่"
63040-52 = "ความโศกเศร้า ความเจ็บแค้น ความอาฆาต ความโกรธ การล้มเลิกความตั้งใจ... ที่นี่เป็นศูนย์รวมของความรู้สึกเหล่านั้น"
63040-54 = "เพราะอาเรียสต้องการให้โลกล่มสลายหรือเปล่าน่ะเหรอ?"
63040-57 = "ฉันขอพูดตามตรงนะ คุณครู ใช่แล้วละ"
63040-61 = "นี่คงเหมือนเรื่องราวของเด็กที่ไม่ได้รับความอบอุ่นจากหมู่บ้าน ก็เลยจะเผาหมู่บ้านทิ้ง เพื่อให้ได้ความอบอุ่นน่ะค่ะ"
63040-62 = "สำหรับคนที่ไม่มีอะไรจะเสียแล้ว การล่มสลายของโลกอาจเป็นหนทางแห่งการพ้นทุกข์ก็ได้"

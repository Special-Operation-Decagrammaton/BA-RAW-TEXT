63040-80 = "ถ้ารุ่นพี่สร้างปรากฏการณ์นางฟ้าขึ้นมาโดยใช้ตัวเองเป็นตัวกลาง มันก็น่าจะดีกว่านี้ก็ได้"
63040-81 = "แต่รุ่นพี่ก็เลือกที่จะเป็น <นางฟ้าเป่าแตร> เสียเอง"
63040-82 = "ฉันเข้าใจได้นะ ไม่ว่ารุ่นพี่หรือใครก็ตามที่ยังเหลืออยู่ในอาเรียส ก็คงจะอยากเป็นผู้พิพากษาในรูปแบบหนึ่ง"
63040-83 = "แต่ว่า"
63040-84 = "เดิมทีแล้วผู้พิพากษาต้องเป็นผู้ที่สมบูรณ์แบบและไม่ขาดตกบกพร่อง"

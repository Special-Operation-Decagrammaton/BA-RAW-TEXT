63040-67 = "ใช่แล้วละ สิ่งที่สะสมมาตลอดในอาเรียสคือ 'บางอย่าง' ที่ทำให้เกิดผลลัพธ์แบบนี้ได้"
63040-68 = "และอย่างน้อยมันก็ทำให้ทรีนิตี้ได้รับ 'ผลลัพธ์บางอย่าง'..."
63040-69 = "ถ้ารุ่นพี่สุบารุสมบูรณ์แบบอย่างแท้จริงละก็นะ..."

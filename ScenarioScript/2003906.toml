[translation]
2003906-1 = "不過是拋出了餌"
2003906-2 = "夏萊大門前方"
2003906-4 = "真是的。#n玄龍門和鍊丹術研究會為何如此大驚小怪……"
2003906-5 = "妾身不過是要和老師一起出遊罷了。"
2003906-6 = "[s]「咦……發生什麼事了嗎？」"
2003906-7 = "不，其實也沒什麼大不了的。"
2003906-8 = "不過是玄龍門以門主的外出為題，舉辦了三天兩夜的通宵經筵罷了。"
2003906-9 = "[s]「通宵三天兩夜！？」"
2003906-10 = "因此妾身方才才會稱他們反應過度啊。"
2003906-11 = "而在此期間，鍊丹術研究會也替妾身準備了這個東西。"
2003906-16 = "[ns]「這是……什麼？」"
2003906-17 = "據說是可以吸入藥香的吸入器。"
2003906-18 = "此乃未與玄龍門報告……便和山海經外的某處簽訂研究契約，緊急製成之物。"
2003906-19 = "[s]「看來這會是今天最重要的東西呢。」"
2003906-20 = "唔嗯……連老師也要對妾身過度保護嗎……"
2003906-21 = "唉，汝究竟要將妾身當小孩對待到什麼時候……"
2003906-22 = "[s1]「大家都很擔心妃姬哦。」\n[s2]「就連我也不例外。」"
2003906-25 = "妾身也並非不懂汝的心情。#n但是……"
2003906-26 = "也罷，此事就先說到這裡吧。"
2003906-27 = "那麼，汝今日要帶妾身至何處增廣見聞呢？"
2003906-28 = "如今午餐時間已過，可謂是過去了大半天哦？"
2003906-29 = "[s]「交給我吧！」"
2003906-30 = "當然。妾身會相信著老師，拭目以待的。"
2003906-32 = "這是……？"
2003906-33 = "妾身自然也聽說過。#n這就是人稱地鐵的大眾交通工具啊。"
2003906-34 = "對妾身而言，是否為嶄新的體驗？"
2003906-35 = "……"
2003906-36 = "呵呵，那倒是。#n這點妾身不得不承認。"
2003906-37 = "較妾身聽說的更為搖晃，似乎還有些吵鬧……？"
2003906-39 = "……是遊樂園嗎？"
2003906-40 = "反應較想像中平淡？#n這也無可厚非。畢竟……"
2003906-41 = "太安逸了！"
2003906-42 = "即便是妾身，這也在意料之內。"
2003906-43 = "親身體驗之後，或許會出乎意料……？"
2003906-44 = "那麼妾身就相信老師的選擇吧。#n話說回來，那條街……似乎讓人感覺莫名熟悉？"
2003906-45 = "原來如此。#n是重現各學園自治區特色的主題街道啊。"
2003906-46 = "吾等山海經的街道也被於此重現……"
2003906-50 = "考據看似正確卻有疏漏，簡直讓人更加惱火！"
2003906-52 = "（雖然起初的情況如此，但遊樂園的設施讓妃姬相當滿意）"
2003906-53 = "（尤其是被纏著連搭了五次雲霄飛車，讓人簡直暈到不行……）"
2003906-55 = "這裡是……遊戲中心？"
2003906-56 = "但妾身並沒有擅長的遊戲……"
2003906-57 = "嗯？有一種新手也能輕易入門的遊戲？"
2003906-58 = "根據情況連按三種顏色的按鈕，通關多個迷你遊戲以攀上塔頂……？"
2003906-59 = "倘若一直畏懼陌生的東西，只怕永遠也跨不出第一步吧……"
2003906-60 = "無妨。儘管放馬過來吧！"
2003906-68 = "想不到竟無論如何都過不了第7層……"
2003906-69 = "老師，這個遊戲是否運用了不正當的手段？#n一切真的都是公正公平的嗎？"
2003906-70 = "應該按下按鈕的速度難以掌握，有時會突然加快或放慢……"
2003906-71 = "嗯……？這也是遊戲的一環？#n根據變化做出反應，才是這個遊戲的好玩之處……？"
2003906-72 = "倘若那正是遊戲的初衷，妾身倒也無話可說……"
2003906-73 = "但即便如此依舊令人難以接受。#n再一次，妾身要再玩一次。"
2003906-74 = "還有下一個行程？#n所以妾身才會說再玩一次！"
2003906-76 = "這次是商店街嗎……原來如此。"
2003906-77 = "此類老舊的商店街，偶爾會藏有寶物？"
2003906-78 = "妾身明白老師言下之意。#n然對妾身而言，這皆是未曾有過的體驗……"
2003906-79 = "呵呵。也罷，就去老師推薦的店家吧。"
2003906-80 = "嗯？問妾身是否有信心不後悔……是嗎？"
2003906-81 = "……"
2003906-82 = "汝，汝莫不是有非分之想吧？老師……？"
2003906-85 = "……！？"
2003906-86 = "這，這是……！？"
2003906-87 = "不，雖說獲得禮物屬實感謝……"
2003906-88 = "這，這對妾身而言，是否有些不太合適……？"
2003906-89 = "恰恰相反？#n然而於山海經，換上如此裝扮的機會應是寥寥無幾……"
2003906-90 = "四下無人之時悄悄換上也無妨……？#n所以汝希望妾身看見穿上它嗎……？"
2003906-91 = "明，明白了。#n就按照老師說的……去做吧……"
2003906-92 = "嗯？換上這身衣服時哪怕僅有一點也罷，希望妾身能想到老師……？"
2003906-93 = "……"
2003906-94 = "妾，妾身會妥善處理……"
2003906-96 = "用餐時間比預期中還晚呢。#n雖說人需進食才得以活動……"
2003906-97 = "呵呵。看來似乎於不知不覺間，就連飢餓都忘了呢。"
2003906-98 = "嗯？這是否代表妾身度過了相當愉快的時光？"
2003906-99 = "……"
2003906-100 = "倘若妾身回答正是如此，汝會如何應對呢？"
2003906-101 = "無須擔心。妾身明白汝之準備不僅只於此。"
2003906-102 = "今日仍僅過去一半，妾身還很期待哦？"
2003906-103 = "啊……既然如此，希望妾身使用吸入器……？"
2003906-104 = "真是的，妾身明明說過不必如此過度保護才是……"
2003906-105 = "妾身明白，妾身明白。#n就遵從老師的意思吧。"
2003906-110 = "這樣汝放心了嗎？"
2003906-111 = "這邊是兩位的餐點。"
2003906-112 = "嗯，那麼就開動吧。#n話雖如此……"
2003906-113 = "放眼望去，全都是僅在傳聞中聽過的食物呢。"
2003906-116 = "[ns]「……」"
2003906-117 = "方便解釋一下現在的情況嗎？"
2003906-118 = "認為妾身應該會喜歡？#n……如此判斷的依據何在？能否告訴妾身汝的用意為何？"
2003906-119 = "孩子們玩耍的情景，總是令人心曠神怡？"
2003906-120 = "……此外，球池是連大人也想一同遊樂的設施？"
2003906-124 = "汝想說的僅有這些是嗎？"
2003906-126 = "……"
2003906-127 = "也罷，妾身明白老師的用心。"
2003906-128 = "若將其視為老師對妾身的體貼，倒也不是無法接受。"
2003906-129 = "球池……球池啊……"
2003906-130 = "……"
2003906-138 = "妾身去去就回。"
2003906-140 = "（於是妃姬意外地……）"
2003906-141 = "（不……應該說一如所料地……）"
2003906-142 = "（……玩得非常開心）"
2003906-144 = "不知不覺已到傍晚了啊。"
2003906-145 = "呵呵……今日真可謂豐富異常啊。#n似乎……會令人相當難以忘懷。"
2003906-149 = "妾身明白，妾身明白……妾身乖乖照做便是。"
2003906-154 = "真教人感觸良多。"
2003906-155 = "沒想到妾身也有在這種地方度過這種時光的時候……"
2003906-156 = "真是感激不盡，老師。"
2003906-157 = "倘若缺少老師的協助，妾身想必……將會躊躇不前，僅憑藉想像來了解世界。"
2003906-163 = "嗯？為何如此震驚？#n妾身不過是在身旁坐下罷了。"
2003906-164 = "到了這個時間，風也變得略帶涼意了啊。"
2003906-165 = "……"
2003906-167 = "妾身是否對傍晚情有獨鍾？#n在汝看來是如此嗎？"
2003906-168 = "是啊。或許可以這麼說吧。#n尤其黃昏時分格外令妾身鍾愛。"
2003906-169 = "既非白天亦非夜晚，而是介於兩者之間的曖昧邊界。"
2003906-170 = "隱藏著短暫而虛幻……轉瞬即逝而無法捕捉的美。"
2003906-171 = "……"
2003906-172 = "老師，妾身有一事相求。"
2003906-173 = "能否陪伴妾身，一同欣賞晚霞呢？"
2003906-174 = "妾身希望，能與老師一同漫步於此世的傍晚。"
2003906-196 = "真是充實的一天啊，老師。"
2003906-197 = "[s]「玩得還開心嗎？」"
2003906-198 = "是啊。今日想必……會令妾身永生難忘吧。"
2003906-199 = "呵呵。無須驚慌，妾身不過是隨口說說罷了。"
2003906-208 = "[ns]「妃姬！？」"
2003906-209 = "……唔。"
2003906-210 = "感謝汝的即時協助，老師。"
2003906-211 = "妾身是否過於勉強？"
2003906-215 = "實在抱歉，老師。#n現在妾身……確實需要稍作休息。"
2003906-216 = "[s]「知道了，你再忍耐一下！」"
2003906-222 = "（趕緊揹著妃姬，匆匆跑到了附近的旅館）"
2003906-223 = "（接著讓妃姬坐在沙發上養心安神）"
2003906-225 = "[ns]「你等等……我馬上點燃藥香！」"
2003906-227 = "呼……在此向汝致謝，老師。#n妾身的暈眩已有所好轉。"
2003906-228 = "一天竟以如此方式結束，實在令人無地自容啊。"
2003906-229 = "要妾身無須掛心？#n呵呵，真像是汝的回答。"
2003906-230 = "那麼，老師。"
2003906-231 = "僅此須臾……應當無妨才是？"
2003906-236 = "― [log=키사키]呵呵……終於肯看向這邊了。[/log][wa:3460] "
2003906-237 = "― [log=키사키]但是，老師。汝可曾如此試想？[/log][wa:6440] "
2003906-240 = "― [log=키사키]妾身現在，或許確實虛弱……[/log][wa:4020] "
2003906-241 = "― [log=키사키]卻也可能僅是故作虛弱而已。 [/log][wa:3480] "
2003906-244 = "― [log=키사키]也許……只是在對老師的態度加以試探。 [/log][wa:4490] "
2003906-245 = "― [log=키사키]又或者單純──只是打從心底相信著汝也說不定吧？[/log][wa:7010] "
2003906-248 = "― [log=키사키]然而……也對，唯有此事能向汝保證。[/log][wa:5190] "
2003906-251 = "― [log=키사키]即便在此處發生任何事…… [/log][wa:1280] "
2003906-252 = "― [log=키사키]妾身都不會怪罪於汝吧。……永遠不會。[/log][wa:7340] "
2003906-257 = "[ns]「……」"
2003906-259 = "[ns3]「不行，妃姬。」\n[ns4]「哪怕你現在有所好轉也一樣。」"
2003906-262 = "老，老師？"
2003906-263 = "[s]「狀態不佳的學生就該好好休息才對。」"
2003906-267 = "……是嗎。"
2003906-268 = "呵呵。受人訓斥對妾身而言，也同樣是新鮮而愉快的經歷啊。"
2003906-269 = "既然如此，現在起就由老師哄妾身入睡吧？"
2003906-270 = "[s5]「咦，咦咦！？」\n[s6]「話是……能這麼說的嗎！？」"
2003906-273 = "身為教育者，汝應該不會打算食言吧？"
2003906-278 = "來吧，老師。#n還請汝多多關照。"
2003906-279 = "[s]「嗚哇！？」"
2003906-283 = "（總算是設法讓突然靠過來的妃姬……躺到了床上……！）"
2003906-285 = "……"
2003906-286 = "實在感謝。"
2003906-289 = "看來今日……似乎能睡個好覺啊……"
2003906-295 = "（緩緩撫摸著妃姬的頭，直到他發出平穩的呼吸聲）"
2003906-296 = "（確定妃姬睡著之後，便在附近的沙發躺下……）"

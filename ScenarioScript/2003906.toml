[translation]
2003906-1 = "Just Throwing Bait"
2003906-2 = "In Front of the Schale Main Gate"
2003906-4 = "Oh, my. Both the Genryumon and Eastern Alchemy Society... Everyone is making quite the fuss."
2003906-5 = "All over an outing with you, Sensei."
2003906-6 = "[s] \"Um... What happened?\""
2003906-7 = "Nothing of great import."
2003906-8 = "Just that Genryumon's preparations for today's excursion lasted three days and two nights."
2003906-9 = "[s] \"Three days and two nights?! Straight?!\""
2003906-10 = "Hence, why I said a \"fuss.\""
2003906-11 = "Meanwhile, the Eastern Alchemy Society prepared this for us."
2003906-16 = "[ns] \"What's...this?\""
2003906-17 = "Hm. It's supposed to be an inhaler for breathing in medicinal incense."
2003906-18 = "They went so far as to make a research agreement with a foreign organization, without reporting to Genryumon, to finish this in time for today."
2003906-19 = "[s] \"We have to keep this extra-safe then.\""
2003906-20 = "Hm... Do you plan on being overprotective as well, Sensei?"
2003906-21 = "*sigh* How long will you persist in treating me like a child?"
2003906-22 = "[s1] \"Everyone cares for you, Kisaki.\"\n[s2] \"And that goes for me, too.\""
2003906-25 = "It's not as if I don't understand such things, however..."
2003906-26 = "Never mind. Let us lay this topic of discussion to rest."
2003906-27 = "Now. Where will we go today? What shall you show me?"
2003906-28 = "As it's past lunchtime, we only have about half a day."
2003906-29 = "[s] \"Leave it to me!\""
2003906-30 = "I shall trust and \"leave it to you,\" Sensei."
2003906-32 = "This is...?"
2003906-33 = "Naturally, I've heard of it. This is called a \"subway,\" a mode of public transportation."
2003906-34 = "...Is this not a novel experience for me?"
2003906-35 = "..."
2003906-36 = "Heehee. Yes. I'll acknowledge that."
2003906-37 = "...It is shakier than I expected, and rather loud...?"
2003906-39 = "...Is this an amusement park? "
2003906-40 = "My reaction is milder than you expected? Well, after all, this is..."
2003906-41 = "...child's play, for me! "
2003906-42 = "Even I can handle something like this."
2003906-43 = "The experience will be better if I try to enjoy myself...?"
2003906-44 = "Understood. Again, I'll put my trust in you, Sensei. But that street, over there. It looks rather familiar."
2003906-45 = "Ah, I see. So they're themed streets, made to recreate the characteristics of each academy's district. "
2003906-46 = "I see the Shanhaijing street."
2003906-50 = "I find the incorrect historical background represented here rather distasteful!"
2003906-52 = "Despite the rough beginnings, Kisaki enjoyed the amusement park quite a bit."
2003906-53 = "She even begged to ride one of the rollercoasters five times. I almost threw up..."
2003906-55 = "Is this...an arcade?"
2003906-56 = "I'm not particularly skilled in this area..."
2003906-57 = "Huh? There are games for beginners?"
2003906-58 = "What must I do? \"Hit the three differently colored buttons based on what you see on the screen! Clear the mini games, and climb the tower!\""
2003906-59 = "...Fear the unfamiliar, and progress shall not move."
2003906-60 = "Understood. Whatever it may be, let it come!"
2003906-68 = "...I did believe we would get further than the 7th floor."
2003906-69 = "Sensei. Do you not also think that this game depends on unfair methods? You really, truly stand by your statement that it is fair?"
2003906-70 = "The speed at which you have to press the buttons subtly changed, faster and slower, throughout the game."
2003906-71 = "Hm...? Even that is a part of the design? Reacting to those changes is the charm of the game...?"
2003906-72 = "...I suppose I should not argue with the game designers."
2003906-73 = "However, that fails to alleviate my anger. Again! Let me try one more time!"
2003906-74 = "We have more to do? I only asked for one more time, did I not?!"
2003906-76 = "These are the stores? I see..."
2003906-77 = "Older stores, such as these, often have hidden treasures?"
2003906-78 = "While I do understand, this is uncharted territory for me."
2003906-79 = "Fufu. I have no choice. Again, I shall trust your decisions, Sensei."
2003906-80 = "Hm? Am I sure I won't...regret it?"
2003906-81 = "..."
2003906-82 = "You aren't thinking anything...strange, are you?"
2003906-85 = "...?!"
2003906-86 = "I-Is this...?!"
2003906-87 = "No, I'm grateful for the gift, but..."
2003906-88 = "Am I concerned it won't suit me?"
2003906-89 = "It's more so... I don't believe that there would be many opportunities to wear this in Shanhaijing..."
2003906-90 = "That doesn't matter? Even if no one else is around, you simply hope I'll wear it?"
2003906-91 = "O-Okay. As...you wish, Sensei."
2003906-92 = "Hm? Even if it's just a little, I should think of you when I wear it?"
2003906-93 = "..."
2003906-94 = "I shall do my best..."
2003906-96 = "We're eating later than I expected. Food is necessary for survival, however..."
2003906-97 = "Fufu. I forgot my hunger entirely for a while."
2003906-98 = "Huh? Was I having that much fun?"
2003906-99 = "..."
2003906-100 = "What would you do if I were to agree?"
2003906-101 = "I'd assume that you've likely planned many more destinations to visit. "
2003906-102 = "We're only about halfway through our schedule? I'm looking forward to it."
2003906-103 = "You think I should use my inhaler, to be safe?"
2003906-104 = "I believe I've already indicated a distaste for such overprotectiveness..."
2003906-105 = "Fine. Understood. I'll continue following your directions, Sensei."
2003906-110 = "Are you satisfied now?"
2003906-111 = "Here's your order."
2003906-112 = "Mm. Then, thank you for the meal."
2003906-113 = "All these things, they're dishes I've only heard of before."
2003906-116 = "[ns] \"...\""
2003906-117 = "I require an explanation."
2003906-118 = "You \"believed I'd like it\"? What facts, under what universe, convinced you to come to such a conclusion?"
2003906-119 = "It's \"fun\" to watch children play? Truly?"
2003906-120 = "...And even adults want to play in ball pits?"
2003906-124 = "That is all you have to say for yourself, Sensei?!"
2003906-126 = "..."
2003906-127 = "It's not that I don't appreciate how thoughtful you've been."
2003906-128 = "I suppose...I can accept your attempt to be considerate of my feelings, only in this very specific case."
2003906-129 = "A ball pit...a ball pit, you say..."
2003906-130 = "..."
2003906-138 = "I shall return."
2003906-140 = "And like that...Kisaki surprisingly..."
2003906-141 = "..well, maybe somewhat expectedly..."
2003906-142 = "...had a lot of fun."
2003906-144 = "It's already evening."
2003906-145 = "Fufu... It was a very eventful day. One that will remain in my memories."
2003906-149 = "Yes, yes... I understand. I shall, I shall."
2003906-154 = "I've discovered a new appreciation for life."
2003906-155 = "I never imagined to spend a day in such a fashion."
2003906-156 = "Thank you, Sensei."
2003906-157 = "If not for you, I would've remained where I was, experiencing the world from my narrow perspective."
2003906-163 = "Hm? Why did you jump? I'm only getting closer to you."
2003906-164 = "The sun's gone down, and it's gotten cold."
2003906-165 = "..."
2003906-167 = "Do I like the night? Does it seem that way?"
2003906-168 = "I suppose you could say so. Especially twilight."
2003906-169 = "It's a delicate balance of day and night. Not quite one or the other."
2003906-170 = "A transient moment, but one that does not pass too quickly. A beauty that can be appreciated but never captured."
2003906-171 = "..."
2003906-172 = "Sensei, may I ask for a favor?"
2003906-173 = "I would like to see the night."
2003906-174 = "The night in your world, by your side."
2003906-196 = "It was a full day, Sensei."
2003906-197 = "[s] \"Did you enjoy it to the fullest?\""
2003906-198 = "Yes. Today was...a day that will remain with me for a lifetime."
2003906-199 = "Fufu. Do not look so taken aback. I only speak the—"
2003906-208 = "[ns] \"Kisaki?!\""
2003906-209 = "...Ugh."
2003906-210 = "Thank you for catching me. "
2003906-211 = "Did I overdo it?"
2003906-215 = "I'm sorry, Sensei. I may need to rest, for a moment."
2003906-216 = "[s] \"Wait a minute!\""
2003906-222 = "With Kisaki on my back, I sprinted to the first hotel I could find."
2003906-223 = "I put Kisaki down on an armchair, so she could rest."
2003906-225 = "[ns] \"Just wait... I'll light the medicinal incense!\""
2003906-227 = "*sigh* Thank you, Sensei. The dizziness has subsided."
2003906-228 = "I sincerely apologize for ending the day on this note."
2003906-229 = "I don't need to worry about that? Fufu. That does sound like you."
2003906-230 = "Then, Sensei..."
2003906-231 = "May I have just a few moments?"
2003906-236 = "― [log=키사키]Fufu... You're finally looking directly at me.[/log][wa:2140] "
2003906-237 = "― [log=키사키]But, Sensei. Perhaps there's something to consider.[/log][wa:4960] "
2003906-240 = "― [log=키사키]Maybe I truly am vulnerable right now.[/log][wa:3020] "
2003906-241 = "― [log=키사키]...Or perhaps I am simply pretending? [/log][wa:2520] "
2003906-244 = "― [log=키사키]Or am I testing how you would respond? [/log][wa:3690] "
2003906-245 = "― [log=키사키]Maybe...I simply trust you deeply.[/log][wa:6570] "
2003906-248 = "― [log=키사키]But...there is one thing I can say with certainty.[/log][wa:3870] "
2003906-251 = "― [log=키사키]Even if something happens here... [/log][wa:440] "
2003906-252 = "― [log=키사키]I won't blame you...and I mean ever.[/log][wa:6620] "
2003906-257 = "[ns] \"...\""
2003906-259 = "[ns3] \"No, Kisaki.\"\n[ns4] \"You might be feeling a little better...\""
2003906-262 = "S-Sensei?"
2003906-263 = "[s] \"...but unwell students need to get proper rest.\""
2003906-267 = "...Is that so."
2003906-268 = "Fufu. Being disciplined feels novel...and pleasant."
2003906-269 = "Then you can put me to sleep now, Sensei."
2003906-270 = "[s5] \"H-Huh?!\"\n[s6] \"Is that...how it works?!\""
2003906-273 = "My, my. An educator, going back on their word?"
2003906-278 = "Now, Sensei. I leave it to you."
2003906-279 = "[s] \"What?!\""
2003906-283 = "Kisaki suddenly approached me, so I somehow got her to lay down."
2003906-285 = "..."
2003906-286 = "Thank you."
2003906-289 = "I think I will...rest well tonight..."
2003906-295 = "I stroked Kisaki's head, until her breathing became slow and steady."
2003906-296 = "Once she was asleep, I laid down on the sofa..."

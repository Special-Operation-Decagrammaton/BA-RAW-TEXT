[translation]
2003906-1 = "แค่โยนเหยื่อล่อเท่านั้น"
2003906-2 = "หน้าประตูหลัก ชาเล่ต์"
2003906-4 = "จริงๆ เชียว ทั้งมังกรดำและชมรมวิจัยศาสตร์การปรุงยาเลย ไม่รู้ว่าเหตุใดทุกคนถึงได้ตื่นตระหนกกัน#nเกินเหตุแบบนี้..."
2003906-5 = "เราก็แค่ออกมาเที่ยวเล่นกับครูเท่านั้นเอง"
2003906-6 = "[s] \"นี่... มีเรื่องอะไรเหรอ?\""
2003906-7 = "ก็... ไม่ใช่อะไรยิ่งใหญ่หรอก "
2003906-8 = "แค่มังกรดำประชุมโต้รุ่งกัน 3 วัน 2 คืนเพื่อเตรียมงานสำหรับการออกมาข้างนอกของประมุขน่ะ"
2003906-9 = "[s] \"โต้รุ่งกัน 3 วัน 2 คืนเลยเหรอ?!\""
2003906-10 = "ไม่รู้จะวิตกกังวลอะไรกันขนาดนั้น"
2003906-11 = "ส่วนทางชมรมวิจัยศาสตร์การปรุงยาก็เตรียมของแบบนี้มาให้เราอีก"
2003906-16 = "[ns] \"นี่คือ... อะไรเหรอ?\""
2003906-17 = "อืม เห็นว่าเป็นยาพ่นน่ะ น่าจะพ่นยาคล้ายๆ ธูปหอมให้หายใจเข้าไปนะ"
2003906-18 = "ได้ยินมาว่าทางชมรมได้ทำวิจัยร่วมกับสถาบันที่อยู่นอกซานไห่จิงและทำสิ่งนี้ขึ้นมาอย่างเร่งด่วน... และแน่นอนว่ามังกรดำยังไม่รู้เกี่ยวกับสถาบันภายนอกนั้น"
2003906-19 = "[s] \"งั้นก็น่าจะเป็นของชิ้นสำคัญของวันนี้เลยนะ\""
2003906-20 = "อืม... นี่ครูก็จะดูแลเราเกินพอดีด้วยอีกคนหรือเปล่า..."
2003906-21 = "เฮ้อ... เมื่อไรคนอื่นจะเลิกทำตัวเหมือนเราเป็นเด็กน้อยนะ..."
2003906-22 = "[s1] \"ทุกคนแค่เป็นห่วงคิซากิน่ะ\"\n[s2] \"ทุกคนแค่เป็นห่วงคิซากิน่ะ ครูก็ด้วยนะ\""
2003906-25 = "อืม ไม่ใช่ว่าเราไม่รู้หรอก ทว่า..."
2003906-26 = "ไม่ดีกว่า เลิกคุยเรื่องนี้เท่านี้เถอะ เช่นนั้นก็..."
2003906-27 = "เอาละ วันนี้จะพาเราไปดูอะไรที่ไหนเล่า?"
2003906-28 = "นี่ก็เลยเวลาอาหารกลางวันมานิดหน่อยแล้ว เท่ากับว่าเหลือเวลาแค่ครึ่งวันเองนะ?"
2003906-29 = "[s] \"วางใจครูได้เลย!\""
2003906-30 = "ได้ เราจะเชื่อและคาดหวังจากครูแล้วกัน"
2003906-32 = "นี่มัน...?"
2003906-33 = "เราศึกษามาแล้วว่าคืออะไร เป็นขนส่งสาธารณะที่เรียกว่ารถไฟใต้ดินใช่มั้ยเล่า?"
2003906-34 = "ถือเป็นการเปิดประสบการณ์ใหม่ของเราหรือเปล่าน่ะหรือ?"
2003906-35 = "..."
2003906-36 = "ฮุฮุ อืม เราคงต้องยอมรับว่าเป็นเช่นนั้น"
2003906-37 = "แต่เราว่ามันสั่นมากกว่าที่เคยได้ยินและที่คิดไว้นิดหน่อย แล้วก็รู้สึกว่ามันค่อนข้างจะเสียงดังด้วย...?"
2003906-39 = "สวนสนุกหรือ...? "
2003906-40 = "เราดูไม่ค่อยตื่นเต้นเท่าไรเลยอย่างนั้นหรือ? ก็คงเป็นเช่นนั้นละ เพราะเรารู้สึก..."
2003906-41 = "เฉยๆ น่ะ! "
2003906-42 = "ต่อให้เป็นประมุขที่ไม่ค่อยได้ออกไปไหน แต่เราก็พอรู้จักสวนสนุกอยู่นะ"
2003906-43 = "แต่ถ้าได้เที่ยวชมไปเรื่อยๆ ก็อาจจะไม่รู้สึกเฉยๆ ก็ได้อย่างนั้นหรือ...?"
2003906-44 = "ได้ เราจะเชื่อในการเลือกสถานที่ของครู แต่ว่าตรงโน้นน่ะ เรารู้สึกคุ้นๆ ยังไงไม่รู้นะ...?"
2003906-45 = "อ้อ เช่นนี้สินะ คงจะเป็นสวนสนุกที่สร้างตามลักษณะเฉพาะของแต่ละเขตปกครองตนเองสินะ "
2003906-46 = "แล้วก็มีของซานไห่จิงของเราด้วย"
2003906-50 = "แต่รู้สึกแปลกๆ อยู่หน่อยนะ บางจุดก็ดูไม่เหมือนจริงเลย ตรวจงานกันลวกๆ เช่นนั้นหรือ!"
2003906-52 = "(ถึงจะเริ่มไม่สวย แต่คิซากิก็ดูจะสนุกสนานกับเครื่องเล่นในสวนสนุก)"
2003906-53 = "(โดยเฉพาะกับรถไฟเหาะที่คิซากิชวนเล่นถึง 5 ครั้งจนคุณครูต้องอดทนไม่ให้อาเจียนออกมา...)"
2003906-55 = "ที่นี่คือ... เกมเซ็นเตอร์อย่างนั้นหรือ?"
2003906-56 = "แต่เราไม่น่าจะเล่นเกมพวกนี้เป็นนะ...?"
2003906-57 = "หืม? ที่นี่มีเกมที่มือใหม่ก็หัดเล่นได้อย่างนั้นหรือ?"
2003906-58 = "เกมไต่หอคอยที่ให้กดปุ่มสามสีรัวๆ ตามสถานการณ์เพื่อเคลียร์มินิเกมต่างๆ...?"
2003906-59 = "ถ้าเอาแต่กลัวสิ่งที่ไม่คุ้นเคย เราก็คงก้าวหน้าไปไหนไม่ได้..."
2003906-60 = "ดีละ เราจะลองเล่นให้หมดเลย แน่จริงก็เข้ามา!"
2003906-68 = "อุตส่าห์ตั้งใจแล้วแท้ๆ ไม่คิดเลยนะว่าจะเล่นผ่านถึงแค่ชั้น 7..."
2003906-69 = "ครู เกมนี้ต้องใช้วิธีที่ไม่ยุติธรรมหรือเปล่า? แล้วทุกคนเล่นผ่านกันได้เหมือนกันหรือเปล่า?"
2003906-70 = "ความเร็วที่เราต้องกดปุ่มมันเหมือนจะเพิ่มขึ้นและลดลงเองด้วย มันไม่เสมอกันทั้งเกมน่ะ"
2003906-71 = "หืม...? นั่นคือส่วนหนึ่งของเกมอย่างนั้นหรือ? การปรับความเร็วในการกดปุ่มคือความสนุกของเกมนี้#nอย่างนั้นสินะ...?"
2003906-72 = "ถ้านั่นเป็นความตั้งใจของเกม เราก็คงพูดว่าอะไรไม่ได้..."
2003906-73 = "แต่ถ้าจะปล่อยไปก็คงไม่หายโกรธ เราจะเล่นอีกรอบ ขอแก้มืออีกรอบ!"
2003906-74 = "มีอย่างอื่นที่อยากให้ดูอีกอย่างนั้นหรือ? ก็เพราะเช่นนั้นไง เราถึงจะขอเล่นอีกแค่รอบเดียวน่ะ!"
2003906-76 = "ที่นี่คือย่านการค้าสินะ..."
2003906-77 = "ในย่านการค้าที่เก่าแก่แบบนี้อาจจะมีสมบัติซ่อนอยู่ก็ได้อย่างนั้นหรือ?"
2003906-78 = "เราเข้าใจสิ่งที่ครูจะสื่อแล้ว ทว่าทุกอย่างคือสิ่งใหม่สำหรับเรา..."
2003906-79 = "ฮุฮุ ก็ช่วยไม่ได้สินะ คงต้องขอให้ครูช่วยแนะนำให้แล้วละ"
2003906-80 = "หืม? มั่นใจว่าจะไม่เสียใจภายหลัง... หรือเปล่าน่ะหรือ?"
2003906-81 = "..."
2003906-82 = "ครูไม่ได้กำลังคิดอะไรแปลกๆ อยู่หรอกใช่มั้ย? ครู...?"
2003906-85 = "...?!"
2003906-86 = "นะ... นี่มัน...??"
2003906-87 = "เอ่อ... ระ... เราก็ขอบคุณอยู่หรอกนะที่ให้เป็นของขวัญ แต่ว่า..."
2003906-88 = "มันดูจะ... ไม่ค่อย... เหมาะกับเราหรือเปล่า?"
2003906-89 = "ตรงกันข้ามเลยอย่างนั้นหรือ? ทว่าโอกาสในการใส่เสื้อผ้าแบบนี้ในซานไห่จิงน่าจะไม่ค่อยมีนะ...?"
2003906-90 = "อยากให้เราลองใส่ดู ไม่ว่าจะใส่ตอนอยู่คนเดียว หรือจะแอบใส่ไม่ให้ใครรู้ก็ได้... อย่างนั้นหรือ?"
2003906-91 = "ขะ... เข้าใจแล้ว เราจะทำอย่างที่... ครูบอกแล้วกัน..."
2003906-92 = "หืม? และตอนใส่เสื้อผ้านี้ ก็ขอให้คิดถึงครูบ้าง สักนิดก็ยังดี...?"
2003906-93 = "..."
2003906-94 = "ก็... ย่อมได้..."
2003906-96 = "นี่ก็เลยเวลาอาหารมาแล้วนะ ว่ากันว่ากองทัพต้องเดินด้วยท้อง..."
2003906-97 = "ฮุฮุ แต่เราก็ลืมความหิวไปชั่วขณะเลย"
2003906-98 = "หืม? คิดว่าเราได้เล่นสนุกจนลืมหิวไปเลยอย่างนั้นหรือ?"
2003906-99 = "..."
2003906-100 = "ในเมื่อลืมไปจริงๆ เราก็คงปฏิเสธไม่ได้"
2003906-101 = "อืม เรารู้ว่าสิ่งที่ครูเตรียมไว้ให้คงไม่ได้มีแค่นี้หรอก "
2003906-102 = "ถึงอย่างนั้นวันนี้ก็ยังมีเวลาเหลืออยู่ และเราก็ยังตั้งตารอสิ่งอื่นอยู่ด้วย"
2003906-103 = "อ่า... ถ้าจะไปเที่ยวเล่นที่ไหนอีก ก็ให้ใช้ยาพ่นที่ได้มาอย่างนั้นหรือ...?"
2003906-104 = "จริงๆ เชียว เราบอกไปแล้วไม่ใช่หรือว่าไม่ต้องดูแลกันให้มากไปก็ได้น่ะ"
2003906-105 = "เข้าใจแล้ว เข้าใจแล้ว เราจะทำตามที่ครูบอกแล้วกัน"
2003906-110 = "ว่าอย่างไรเล่า พอใจหรือยัง?"
2003906-111 = "อาหารที่สั่งได้แล้วค่ะ"
2003906-112 = "อืม เราจะกินละนะ แต่จะว่าไป..."
2003906-113 = "ของพวกนี้เป็นอาหารที่เคยได้ยินแค่ชื่อ แต่ยังไม่เคยลองกินมาก่อนเลยนะ"
2003906-116 = "[ns] \"...\""
2003906-117 = "นี่มันสถานการณ์อะไรกัน?"
2003906-118 = "คิดว่าเราน่าจะชอบอย่างนั้นหรือ? เราขอถามได้หรือไม่ว่าใช้อะไรเป็นพื้นฐานในการตัดสินใจน่ะ?"
2003906-119 = "การได้เห็นเด็กเล่นสนุกเป็นเรื่องที่น่ายินดี...? นี่คือเหตุผลทั้งหมดอย่างนั้นหรือ?"
2003906-120 = "อีกอย่าง... สระบอลก็เป็นที่ที่ผู้ใหญ่เองก็อยากเล่นเหมือนกัน?"
2003906-124 = "นี่สินะเหตุผลทั้งหมดของครู"
2003906-126 = "..."
2003906-127 = "ก็นะ ไม่ใช่ว่าเราจะไม่รู้ความตั้งใจของครูหรอก"
2003906-128 = "และถ้าเป็นการใส่ใจจากครู ก็ไม่ใช่ว่าจะเป็นสิ่งที่เรารับไว้ไม่ได้"
2003906-129 = "สระบอล... สระบอล..."
2003906-130 = "..."
2003906-138 = "งั้นเดี๋ยวเรามานะ"
2003906-140 = "(แล้วคิซากิก็...)"
2003906-141 = "(ไปเล่นสนุกแบบผิดคาด...)"
2003906-142 = "(ไม่สิ... ตามคาดเลย)"
2003906-144 = "เย็นแล้วสินะ"
2003906-145 = "ฮุฮุ... ช่างเป็นวันที่เต็มไปด้วยเหตุการณ์น่าตื่นเต้น เราจะ... ไม่ลืมวันนี้อย่างแน่นอน"
2003906-149 = "ก็ได้ ก็ได้... เข้าใจแล้ว เข้าใจแล้ว ไม่ต้องเป็นห่วงให้มากหรอก"
2003906-154 = "นี่เป็นความรู้สึกใหม่ๆ เลยแฮะ"
2003906-155 = "ไม่คิดเลยว่าจะได้มาใช้เวลาแบบนี้ในที่แบบนี้..."
2003906-156 = "ขอบคุณนะ ครู"
2003906-157 = "ถ้าไม่มีครูละก็... เราก็คงได้รู้จักโลกผ่านการฟังและเข้าใจโลกด้วยสมองเท่านั้น"
2003906-163 = "หืม? เหตุใดจึงตกใจขนาดนั้นเล่า? เราแค่มานั่งข้างๆ เอง"
2003906-164 = "พอตกเย็น ลมก็เริ่มเย็นลงนะ"
2003906-165 = "..."
2003906-167 = "เราชอบตอนเย็นหรือเปล่าน่ะหรือ? เห็นเป็นเช่นนั้นงั้นหรือ?"
2003906-168 = "อืม ก็ค่อนข้างชอบนะ โดยเฉพาะยามอัสดงน่ะ"
2003906-169 = "ช่วงเวลาที่ไม่ใช่ทั้งกลางวันและกลางคืน เหมือนเป็นบางอย่างที่อยู่ระหว่างเส้นเขตแดนน่ะ"
2003906-170 = "มันเป็นเวลาเพียงชั่วครู่ที่ผ่านไปอย่างรวดเร็ว แต่ในนั้นก็ซ่อนความงามที่ไม่อาจคว้าได้เอาไว้"
2003906-171 = "..."
2003906-172 = "ครู เราขออะไรอย่างหนึ่งได้หรือไม่?"
2003906-173 = "เราอยากใช้ช่วงเวลานี้น่ะ"
2003906-174 = "ไปเดินเล่นแล้วชมท้องฟ้ายามเย็นกันเถอะ"
2003906-196 = "เป็นวันที่คุ้มค่าจังเลยนะ ครู"
2003906-197 = "[s] \"สนุกมั้ยวันนี้?\""
2003906-198 = "อืม วันนี้เป็น... วันที่น่าจดจำไปตลอดชีวิตเลยละ"
2003906-199 = "ฮุฮุ ไม่ต้องทำหน้าตกอกตกใจขนาดนั้นก็ได้ เราก็แค่พูดไปอย่างนั้นละ"
2003906-208 = "[ns] \"คิซากิ?!\""
2003906-209 = "อืม..."
2003906-210 = "ขอบคุณที่ช่วยพยุงไว้นะ ครู "
2003906-211 = "เราหักโหมเกินไปหรือเปล่าน่ะหรือ?"
2003906-215 = "ขอโทษทีนะ ครู เราน่าจะต้อง... ไปพักสักหน่อยแล้วละ"
2003906-216 = "[s] \"รอเดี๋ยวนะ!\""
2003906-222 = "(คุณครูแบกคิซากิขึ้นหลัง แล้วรีบพาไปที่โรงแรมที่อยู่ใกล้ๆ)"
2003906-223 = "(คุณครูให้คิซากินั่งลงบนโซฟาเพื่อให้เธอได้พักผ่อน)"
2003906-225 = "[ns] \"รอเดี๋ยวนะ... ครูจะรีบจุดเครื่องหอมให้!\""
2003906-227 = "ฮู่ว... ขอบคุณนะ ครู เมื่อกี้เราน่าจะเวียนหัวน่ะ"
2003906-228 = "ได้เที่ยวสนุกมาแท้ๆ แต่ก็ต้องปิดท้ายวันนี้แบบนี้จนได้ น่าละอายจริงๆ"
2003906-229 = "ไม่ต้องกังวลเรื่องนั้นก็ได้อย่างนั้นหรือ? ฮุฮุ ตอบได้สมกับที่เป็นครูเลยนะ"
2003906-230 = "ถ้าเช่นนั้น ครู..."
2003906-231 = "เราขอเวลา... ประเดี๋ยวหนึ่งได้หรือไม่?"
2003906-236 = "― [log=키사키]ฮุฮุ... ในที่สุดก็มองมาทางนี้สินะ[/log][wa:2660] "
2003906-237 = "― [log=키사키]แต่ว่า ครู ลองคิดดูสักครั้งสิ[/log][wa:5840] "
2003906-240 = "― [log=키사키]เราในตอนนี้ อาจจะอ่อนแอลงไปจริงๆ...[/log][wa:3140] "
2003906-241 = "― [log=키사키]หรือที่จริงเราอาจแกล้งทำเป็นอ่อนแออยู่ก็ได้นะ?[/log][wa:2200] "
2003906-244 = "― [log=키사키]หรือไม่ก็... เราอาจทำไปเพื่อดูปฏิกิริยาจากครู [/log][wa:3410] "
2003906-245 = "― [log=키사키]หรืออาจจะแค่―― เชื่อใจครูอยู่อย่างหมดใจก็ได้[/log][wa:6250] "
2003906-248 = "― [log=키사키]ทว่า... ใช่แล้วละ เรื่องนี้เราให้สัญญาได้[/log][wa:4230] "
2003906-251 = "― [log=키사키]ไม่ว่าจะเกิดเรื่องอะไรขึ้นที่นี่... [/log][wa:360] "
2003906-252 = "― [log=키사키]เราก็จะไม่ตำหนิครูหรอกนะ ตลอดไปเลยละ...[/log][wa:6500] "
2003906-257 = "[ns] \"...\""
2003906-259 = "[ns3] \"ไม่ได้นะ คิซากิ\"\n[ns4] \"ไม่ได้ ต่อให้จะรู้สึกดีขึ้นมาบ้างแล้วก็เถอะ\""
2003906-262 = "คะ... ครู?"
2003906-263 = "[s] \"นักเรียนที่ไม่สบายต้องพักผ่อนมากๆ สิ\""
2003906-267 = "เช่นนั้นหรือ..."
2003906-268 = "ฮุฮุ การโดนดุก็เป็นอะไรที่แปลกใหม่และน่าดีใจนะ"
2003906-269 = "งั้นก็คงแค่ต้องรอให้ครูมาพาเราไปนอนละสินะ"
2003906-270 = "[s5] \"หะ... หา?!\"\n[s6] \"อะ... เอาอย่างนั้นเลยเหรอ!?\""
2003906-273 = "คนที่เป็นถึงนักวิชาการศึกษาคงไม่กลับคำหรอกใช่มั้ย?"
2003906-278 = "เอาละ คุณครู ถ้างั้นเราก็รบกวนด้วยนะ"
2003906-279 = "[s] \"หา?!\""
2003906-283 = "(จู่ๆ คิซากิก็เดินเข้ามา... คุณครูจึงพาเธอไปนอนบนเตียง...!)"
2003906-285 = "..."
2003906-286 = "ขอบคุณนะ"
2003906-289 = "วันนี้... เราน่าจะนอนหลับสบายเลยละ"
2003906-295 = "(คุณครูลูบหัวของคิซากิเบาๆ จนเธอผล็อยหลับไป)"
2003906-296 = "(เมื่อแน่ใจว่าคิซากิหลับแล้ว คุณครูก็ลงไปนอนที่โซฟาใกล้ๆ...)"

[translation]
10004040-1 = "第4話;認真的人穿著制服"
10004040-2 = "山海經．「桃源鄉」"
10004040-3 = "這裡叫「桃源鄉」，是山海經有名的茶館！"
10004040-4 = "山海經的學生們經常會在飯後來「桃源鄉」喝茶，反而比較少去咖啡廳呢。"
10004040-5 = "這裡的茶不只香氣充足，對消化油膩的食物也很有幫助唷。"
10004040-6 = "雖然還沒有百鬼夜行的「百夜堂」那麼有名，但我認為茶的味道與香氣是不會輸的！絕對是奇普托斯的第一名！"
10004040-7 = "[s] 「旬可能在這裡嗎？」"
10004040-8 = "這，這個我不清楚……"
10004040-9 = "總之，先喝杯茶等等看吧。#n說不定旬姐姐等等就會出現了哦？"
10004040-10 = "啊，這個「桃源鄉」除了茶以外，點心也很好吃哦。#n比如那個抹茶口味的月餅……"
10004040-11 = "[s] 「唔嗯，看起來確實是很好吃，但是……」"
10004040-16 = "咦，老師？"
10004040-17 = "居然能在這裡見到你呢，真是稀奇。"
10004040-18 = "（唔，又有人來搗亂……）"
10004040-19 = "[s1] 「你好呀，桐乃。」\n[s2] 「女武神的學生為什麼會來山海經的自治區呢？」"
10004040-20 = "啊，今天不是為了公務，而是因為一些私人原因來的。"
10004040-21 = "啊，今天不是為了公務，而是因為一些私人原因來的。"
10004040-22 = "雖然並不是什麼大事……不過我從警備局那邊聽見了一個很令人在意的傳聞！"
10004040-23 = "[s] 「傳聞……？」"
10004040-25 = "山海經的學生會「玄龍門」和商人聯盟「玄武商會」──#n這兩個組織，老師應該也知道吧？"
10004040-26 = "[s] 「嗯，不過並不是很了解。」"
10004040-27 = "他們是代表山海經的大型組織，但同時也互相敵視。#n雙方都將對方視為山海經發展的阻礙，一直試圖要擊垮對方。"
10004040-28 = "然後根據我從警備局同期那邊聽到的機密情報，這段時間……"
10004040-29 = "似乎有大量來歷不明的槍枝流入山海經自治區……！"
10004040-30 = "也就是說……不久之後，玄龍門與玄武商會可能會發生大規模的衝突。"
10004040-31 = "[s3] 「那還真是不妙呢……」\n[s4] 「這麼重要的情報，說出來不要緊嗎……？」"
10004040-32 = "啊，這個……"
10004040-33 = "啊，這個……"
10004040-34 = "麻，麻煩幫我保密！"
10004040-35 = "總之，在這種很多學生來往的鬧區可能會發生大規模的暴力事件……#n既然如此，身為女武神警察學園的學生可不能坐視不管。"
10004040-36 = "而且，如果我能阻止玄龍門與商會間的鬥爭，相信高層也會認同我的能力的！"
10004040-37 = "如此一來，說不定會被調到警備局……！"
10004040-38 = "[s5] 「感覺很危險呢，不要太衝動喔。」\n[s6] 「可不要太衝動唷。」"
10004040-39 = "是！謝謝老師！即使知道很危險，但為了市民的安全戰鬥是警察的義務！"
10004040-40 = "是！謝謝老師！即使知道很危險，但為了市民的安全戰鬥是警察的義務！"
10004040-41 = "話說回來，老師怎麼會在這裡呢？#n是在工作間的空檔喝杯茶休息一下嗎？"
10004040-42 = "[s] 詢問是否有看見旬"
10004040-43 = "旬同學是梅花園的那位個子很高，擔任教官的學生對吧？#n唔嗯，很抱歉，本官沒在這附近見到他……"
10004040-44 = "莫非跟老師身邊那位小小學生有關嗎？"
10004040-45 = "[s] 說明至今為止發生的事"
10004040-46 = "原來如此，如果是這樣的話就讓我來幫忙吧。#n反正我本來就打算在這附近巡邏。"
10004040-47 = "我直接送小旬回梅花園。"
10004040-48 = "包在本官身上，照顧迷路兒童也是生活安全局的重要職責之一！"
10004040-49 = "[s] 「那麼，就拜託你了……？」"
10004040-51 = "咦，咦……？"
10004040-54 = "（這個警察學生在做什麼啊！居然妨礙我跟老師難得的約會……！）"
10004040-55 = "（而且還和[USERNAME]老師有說有笑的……真令人不開心！）"
10004040-56 = "（雖然跟你無冤無仇，還是請你暫時離開吧……！）"
10004040-59 = "啊，那邊有一名攜帶大量槍械的玄龍門幹部──！？"
10004040-60 = "什麼？？真的起衝突了！？"
10004040-61 = "對不起，老師！請容我優先處理這邊的問題！"
10004040-63 = "桐乃，出動！"
10004040-68 = "呼～這樣礙事的人就消失了呢。"
10004040-73 = "那麼我們就放輕鬆，慢慢地享受這杯茶吧？"
10004040-79 = "你剛才是在說謊嗎！？"
10004040-80 = "咦，這麼快就回來了呀，警察姐姐。"
10004040-81 = "可以請你解釋一下嗎，小旬同學！我剛才問了外面的學生，#n可是別說是玄龍門的幹部了，就連帶著大量槍械的人都沒有人看到啊……！？"
10004040-83 = "刻意向警察提供錯誤情報可是妨礙公務！是犯罪唷！"
10004040-84 = "可是……小旬真的以為自己看到了玄龍門的姐姐……"
10004040-85 = "……姐姐要罵我嗎？"
10004040-87 = "唔……！？"
10004040-89 = "因為小孩子的誤會而生氣也有點奇怪，這次就算了吧……"
10004040-91 = "總之沒事就好。#n那麼就一起去梅花園──"
10004040-92 = "啊，這次是持刀的玄武商會的姐姐們──！？"
10004040-94 = "這次是真的打起來了嗎！？"
10004040-96 = "桐乃，出動！"
10004040-100 = "真是個沒有學習能力的警察姐姐呢。"
10004040-101 = "來吧，老師。這個豆餅很好吃唷。很適合配茶！"
10004040-106 = "嗚嗚，又被騙了……"
10004040-107 = "居然騙了警察兩次，就算是小朋友也不能這樣哦！"
10004040-109 = "那個，警察姐姐。"
10004040-110 = "……這次又怎麼了？"
10004040-111 = "那邊的壞姐姐們在欺負店員。"
10004040-112 = "還想用同樣的招式騙我嗎……？#n就算本官再怎麼單純，這次也不會再上當了！"
10004040-117 = "啊？這間髒兮兮的店是怎麼回事！！"
10004040-118 = "這份菜單又是什麼鬼東西！上面那些不都是苦死人不償命的茶嗎！#n明明是飲料店卻沒賣珍珠奶茶是什麼意思！"
10004040-119 = "那個，這裡是老字號茶館，所以沒有奶茶之類的品項……"
10004040-120 = "現在是在無視客人的需求是不是！？啊！？"
10004040-121 = "我們想吃的是可麗餅和珍珠奶茶！！"
10004040-123 = "這次是真的！？"
10004040-124 = "那邊的兩位！本官不允許任何威脅市民安全的行為！"

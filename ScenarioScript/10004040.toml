[translation]
10004040-1 = "ตอนที่ 4;ผู้ก่อความวุ่นวายในเครื่องแบบ"
10004040-2 = "ร้าน <นิทานดอกท้อ> ซานไห่จิง"
10004040-3 = "ที่นี่คือร้านน้ำชาของซานไห่จิง ร้าน <นิทานดอกท้อ> ค่ะ!"
10004040-4 = "หลังจากรับประทานอาหารแล้ว นักเรียนส่วนใหญ่ของซานไห่จิงจะดื่มชาแทนการดื่มกาแฟค่ะ#nเพราะงั้นก็เลยจะแวะมาที่ร้านนิทานดอกท้อกันบ่อยๆ "
10004040-5 = "ชาของร้านนี้นอกจะมีกลิ่นหอมมากๆ แล้ว ยังมีสรรพคุณช่วยย่อยอาหารที่มีไขมันได้ดีด้วยนะคะ"
10004040-6 = "ถึงร้านนี้จะไม่ได้มีชื่อเสียงเท่า <ร้านเฮียกคิยาโค> ของสหพันธ์เฮียกคิยาโค#nแต่ว่าถ้าพูดถึงกลิ่นหอมและรสชาติของชา ถือว่าเป็นอันดับหนึ่งในคิโวทอสเลยล่ะค่ะ"
10004040-7 = "[s] \"ชุนจะอยู่ที่นี่รึเปล่านะ...?\""
10004040-8 = "เอ่อ... เรื่องนั้นฉันเองก็ไม่แน่ใจค่ะ..."
10004040-9 = "ตะ...แต่ก่อนอื่นเราไปนั่งดื่มชารอกันเถอะค่ะ บางทีพี่ชุนอาจจะแวะมาที่ร้านนี้ก็ได้นะคะ?"
10004040-10 = "นอกจากนี้ที่ร้านนิทานดอกท้อน่ะ นอกจากชาแล้วยังมีเครื่องดื่มอร่อยๆ อีกเยอะแยะเลยนะคะ#nอ๊ะ แถมยังมีขนมไหว้พระจันทร์รสชาเขียวด้วย..."
10004040-11 = "[s] \"รู้สึกแปลกๆ แฮะ...\""
10004040-16 = "อ๊ะ? คุณครูจากชาเล่ต์นี่นา?"
10004040-17 = "บังเอิญจังเลยนะคะที่เจอกันที่นี่"
10004040-18 = "(อึ่ก... มีคนมาขัดขวางอีกแล้ว...)"
10004040-19 = "[s1] \"ว่าไงคิริโนะ\"\n[s2] \"นักเรียนโรงเรียนวัลคิรี่ มาทำอะไรที่ซานไห่จิงล่ะเนี่ย?\""
10004040-20 = "อ่า... ฉันไม่ได้มาที่นี่เพราะเรื่องงานหรอกค่ะ พอดีมีธุระส่วนตัวนิดหน่อยค่ะ"
10004040-21 = "อ่า... ฉันไม่ได้มาที่นี่เพราะเรื่องงานหรอกค่ะ พอดีมีธุระส่วนตัวนิดหน่อยค่ะ"
10004040-22 = "ไม่มีอะไรเป็นพิเศษหรอกค่ะ... แต่ว่าฉันได้ยินข่าวลือที่น่าเป็นห่วงมาจากสำนักความมั่นคงค่ะ"
10004040-23 = "[s] \"ข่าวลือเหรอ?\""
10004040-25 = "คุณครูคงจะทราบเรื่องข้อพิพาทของทางสภานักเรียนของซานไห่จิง \"มังกรดำ\"#nกับทางสมาพันธ์การค้า \"ย่านการค้าเทพเต่าดำ\" แล้วใช่มั้ยล่ะคะ?"
10004040-26 = "[s] \"ก็พอจะรู้นิดหน่อยนะ\""
10004040-27 = "ค่ะ ทั้งสองฝ่ายเป็นชมรมขนาดใหญ่ที่เป็นตัวแทนของซานไห่จิง แต่ว่าพวกเขาต่างมองว่าอีกฝ่ายเป็น#nกลุ่มที่ขัดขวางการพัฒนาของทางซานไห่จิง และคอยหาโอกาสที่จะโค่นล้มอีกฝ่ายอยู่ตลอดค่ะ"
10004040-28 = "แต่เมื่อไม่นานมานี้ จากข้อมูลลับสุดยอดที่ได้มาจากสำนักความมั่นคง..."
10004040-29 = "ได้ยินว่ามีการลอบนำปืนใหญ่ที่ตรวจสอบที่มาไม่ได้เข้ามาในเขตของซานไห่จิงเป็นจำนวนมากค่ะ!"
10004040-30 = "บางทีอีกไม่นานมันอาจจะเกิดการต่อสู้ครั้งใหญ่ระหว่างมังกรดำกับย่านการค้าเทพเต่าดำก็ได้นะคะ"
10004040-31 = "[s3] \"นะ...น่ากลัวอยู่นะ...\"\n[s4] \"เรื่องลับสุดยอดแบบนั้นมาบอกกันแบบนี้ได้ด้วยเหรอ?\""
10004040-32 = "คะ...คือว่าเรื่องนี้..."
10004040-33 = "คะ...คือว่าเรื่องนี้..."
10004040-34 = "ชะ...ช่วยเก็บเป็นความลับด้วยนะคะ!"
10004040-35 = "ยะ...ยังไงก็เถอะค่ะ! ในฐานะนักเรียนโรงเรียนตำรวจวัลคิรี่ เมื่อได้ยินว่าอาจเกิดเรื่องจลาจลขนาดใหญ่#nในย่านที่มีนักเรียนพลุกพล่านแบบนี้ ฉันคงจะอยู่เฉยไม่ได้หรอกค่ะ"
10004040-36 = "นอกจากนี้ ถ้าฉันหยุดการต่อสู้ระหว่างมังกรดำและย่านการค้าเทพเต่าดำได้สำเร็จล่ะก็#nผู้บัญชาการระดับสูงก็คงจะยอมรับความสามารถของฉันด้วยค่ะ!"
10004040-37 = "บางทีนี่อาจจะเป็นโอกาสทองที่จะได้ออกจากสำนักรักษาความปลอดภัยและย้ายกลับไป#nที่สำนักความมั่นคงก็ได้ค่ะ...!"
10004040-38 = "[s5] \"อย่างนี้นี่เอง พยายามเข้าล่ะ!\"\n[s6] \"ถ้าไปได้สวยก็คงดีนะ...\""
10004040-39 = "ฮิฮิ ขอบคุณนะคะคุณครู มันเป็นหน้าที่ของตำรวจที่ต้องต่อสู้เพื่อความสงบสุขของพลเมืองค่ะ!"
10004040-40 = "ฮิฮิ ขอบคุณนะคะคุณครู มันเป็นหน้าที่ของตำรวจที่ต้องต่อสู้เพื่อความสงบสุขของพลเมืองค่ะ!"
10004040-41 = "ว่าแต่คุณครูมาทำอะไรที่นี่เหรอคะ? คุณครูไม่ได้ดูเหมือนว่าจะมาดื่มชาเลยนะคะ..."
10004040-42 = "[s] ถามคิริโนะว่าเห็นชุนบ้างมั้ย"
10004040-43 = "คุณชุน... หมายถึงผู้ฝึกสอนของสวนต้นบ๊วยที่ตัวสูงๆ ใช่มั้ยคะ? น่าเสียดายค่ะ คือฉันไม่เห็นเธออยู่#nแถวนี้เลย..."
10004040-44 = "หรือว่าเป็นเรื่องเกี่ยวกับเด็กนักเรียนตัวเล็กๆ ที่อยู่ข้างๆ คุณครูเหรอคะ?"
10004040-45 = "[s] อธิบายเรื่องที่เกิดขึ้นเมื่อครู่"
10004040-46 = "อ่ะฮ่า... ถ้าเป็นเรื่องนั้นล่ะก็ ฉันจะช่วยคุณครูจัดการเองค่ะ ยังไงฉันก็ต้องเดินตรวจตรารอบๆ นี้อยู่แล้วค่ะ"
10004040-47 = "และระหว่างทาง ฉันจะพานักเรียนชุนหลิงไปส่งที่สวนต้นบ๊วยให้เองค่ะ"
10004040-48 = "การดูแลความปลอดภัยของเด็กหลงทางเป็นหนึ่งในหน้าที่ของสำนักรักษาความปลอดภัยค่ะ!"
10004040-49 = "[s] \"ถ้างั้นช่วยพาชุนหลิงไปส่งให้หน่อยได้มั้ย...\""
10004040-51 = "คะ...คะ~?"
10004040-54 = "(อะไรกันเนี่ย นักเรียนตำรวจคนนี้! มาขัดขวางการเดตของฉันกับคุณครูงั้นเหรอ!)"
10004040-55 = "(แถมเธอยังคุยกับคุณครู [USERNAME] อย่างสนิทสนมอีกด้วย... ชุนไม่ถูกใจสิ่งนี้ค่ะ!)"
10004040-56 = "(ฉันไม่ได้โกรธคุณเลยนะคะ แต่ช่วยกลับไปได้แล้วค่ะ!)"
10004040-59 = "อ๊ะ นั่นผู้บริหารของมังกรดำติดอาวุธหนักเดินไปทางนั้น...!"
10004040-60 = "คะ? ผู้บริหารมังกรดำติดอาวุธหนักงั้นเหรอคะ?! หรือว่าทั้งสองกลุ่มจะเริ่มต่อสู้กันแล้ว?"
10004040-61 = "ขะ...ขอโทษนะคะคุณครู แต่ดูเหมือนตอนนี้ฉันต้องไปหยุดการต่อสู้ก่อนค่ะ"
10004040-63 = "คิริโนะ ออกปฏิบัติการค่ะ!"
10004040-68 = "เฮ้อ ในที่สุดก็ไปสักทีนะคะ"
10004040-73 = "ถ้างั้นในระหว่างนี้พวกเรามาจิบชาเพลินๆ กันสักแก้วดีมั้ยคะ?"
10004040-79 = "ถะ...ถูกหลอกซะแล้ว!"
10004040-80 = "เอ๊ะ? กลับมาเร็วจังเลยนะคะ พี่สาวตำรวจ"
10004040-81 = "เมื่อกี้พูดว่าอะไรนะคะ เด็กหญิงชุนหลิง! ฉันไปถามนักเรียนข้างนอกมาแล้วค่ะ แต่พวกเธอบอกว่า#nไม่เห็นผู้บริหารมังกรดำติดอาวุธหนักเข้าไปที่ย่านการค้าเลยนะคะ!"
10004040-83 = "ให้ข้อมูลที่เป็นเท็จกับตำรวจแบบนี้ ถือเป็นการขัดขวางการทำงานของเจ้าหน้าที่นะคะ!#nเป็นอาชญากรรมค่ะ!"
10004040-84 = "แต่ว่า... ชุนหลิงน่ะเห็นพวกพี่ๆ จากมังกรดำเดินผ่านไปจริงๆ นะ..."
10004040-85 = "จะดุกันเหรอคะ...?"
10004040-87 = "อะ...อึ่ก..."
10004040-89 = "ถ้าจะดุเด็กเล็กๆ แบบนี้เพราะความเข้าใจผิดของเธอล่ะก็... คงน่าอายน่าดูเลยนะคะ"
10004040-91 = "แต่คงจะรบกวนคุณครูไปกว่านี้ไม่ได้แล้ว คราวนี้กลับไปที่สวนต้นบ๊วยกัน..."
10004040-92 = "อ๊ะ คราวนี้เป็นพี่สาวจากย่านการค้าเทพเต่าดำถือมีดปลายแหลมเปี๊ยบเดินไปทางนั้นค่ะ...!!"
10004040-94 = "อ๊ะ หรือว่าจะเกิดการต่อสู้งั้นเหรอ?!"
10004040-96 = "คิริโนะ ออกปฏิบัติการค่ะ!"
10004040-100 = "ช่างเป็นตำรวจที่ไม่เคยเรียนรู้อะไรเอาซะเลยนะคะ"
10004040-101 = "เอาล่ะ คราวนี้เรามากินเค้กถั่วกับน้ำชากันเถอะค่ะ!"
10004040-106 = "อึ่ก... ถูกหลอกอีกแล้ว..."
10004040-107 = "ถึงจะเป็นเด็กตัวเล็กๆ แต่มาหลอกลวงตำรวจถึงสองครั้งแบบนี้ ยกโทษให้ไม่ได้แล้วค่ะ!"
10004040-109 = "นี่ๆ พี่สาวตำรวจ"
10004040-110 = "คราวนี้มันอะไรกันอีกล่ะคะ?"
10004040-111 = "ตรงนั้นมีพี่สาวใจร้ายกำลังก่อกวนพนักงานร้านอยู่ค่ะ"
10004040-112 = "คิดจะหลอกฉันด้วยวิธีเดิมอีกงั้นเหรอคะ? ถึงฉันจะซื่อบื้อขนาดไหน แต่จะไม่ยอมถูกหลอกอีกแล้วค่ะ!"
10004040-117 = "อ๊ะ? อะไรเนี่ย ร้านน้ำชาสกปรกแบบนี้น่ะ!"
10004040-118 = "แถมเมนูพวกนี้มันอะไรกันเนี่ย? มีแต่ชาขมๆ รสห่วยๆ เต็มไปหมดเลย! ทั้งที่เป็นร้านน้ำชาแท้ๆ#nทำไมถึงไม่มีชานมไข่มุกเลยล่ะ!"
10004040-119 = "ตะ...แต่ว่าที่นี่เป็นร้านน้ำชาแบบดั้งเดิม เราเลยไม่มีเมนูใหม่ๆ แบบชานมหรอกนะครับ..."
10004040-120 = "นี่เมินลูกค้างั้นเรอะ? หา?!"
10004040-121 = "พวกเราอยากกินเครปครีมสดกับชานมไข่มุกเฟ้ย!"
10004040-123 = "อ๊ะ คราวนี้ของจริงงั้นเหรอ?!"
10004040-124 = "นี่ หยุดนะ! ฉันจะไม่ยกโทษให้เด็กเกเรที่คุกคามความปลอดภัยของพลเมืองแน่นอนค่ะ!"

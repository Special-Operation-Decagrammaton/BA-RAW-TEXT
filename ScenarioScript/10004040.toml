[translation]
10004040-1 = "Episode 4;A Saboteur in Uniform"
10004040-2 = "Peach Blossom Spring"
10004040-3 = "This is Shanhaijing's teahouse, Peach Blossom Spring!"
10004040-4 = "The students of Shanhaijing often have tea at Peach Blossom Spring after meals instead of going to cafes."
10004040-5 = "Not only does the tea here smell heavenly, it also helps digest heavy foods."
10004040-6 = "This place is not as famous as Momoyodou of the Hyakkiyako Academy, but the flavors and scents of the teas are the best in Kivotos!"
10004040-7 = "[s] \"Do you think Shun is here?\""
10004040-8 = "Uh...I'm not sure."
10004040-9 = "L-Let's have a cup of tea and wait. Who knows? Maybe Shun will stop by this teahouse."
10004040-10 = "Peach Blossom Spring also has delicious refreshments to go with your tea. Oh, I see a green tea mooncake right over there."
10004040-11 = "[s] \"You're acting awfully suspicious...\""
10004040-16 = "Huh? You're the sensei from Schale."
10004040-17 = "I didn't expect to see you in a place like this."
10004040-18 = "(Ugh. Another interloper.)"
10004040-19 = "[s1] \"Hi, Kirino.\"\n[s2] \"What's a Valkyrie student doing in the Shanhaijing district?\""
10004040-20 = "Oh, I'm not here on business. This is strictly personal."
10004040-21 = "Oh, I'm not here on business. This is strictly personal."
10004040-22 = "It's not a big deal...but I heard a strange rumor from the Security Bureau."
10004040-23 = "[s] \"A rumor?\""
10004040-25 = "I'm sure you know about Genryumon, the Shanhaijing Student Council, and the Black Tortoise Promenade, the merchant association, right?"
10004040-26 = "[s] \"A little.\""
10004040-27 = "These two groups are also large Shanhaijing clubs, but they each see the other as the greatest obstacle to the development of Shanhaijing. They've been searching for the right time to crush the other for ages."
10004040-28 = "According to some top secret intel we got from the Security Bureau not long ago..."
10004040-29 = "...a large supply of firearms of unknown origin have been flowing into the Shanhaijing district!"
10004040-30 = "Sooner or later, we may see a large-scale conflict between Genryumon and Black Tortoise Promenade."
10004040-31 = "[s3] \"That doesn't bode well...\"\n[s4] \"Are you allowed to tell me about this?\""
10004040-32 = "S-So, um, I'm gonna need you to..."
10004040-33 = "S-So, um, I'm gonna need you to..."
10004040-34 = "Please keep this a secret!"
10004040-35 = "Anyway! As a Valkyrie Police School cadet, I can't just wait around for large-scale violence to occur downtown and threaten our students."
10004040-36 = "Besides, if I end the struggle between Genryumon and Promenade on my own, the higher-ups are sure to recognize my abilities!"
10004040-37 = "This may be a golden opportunity to get out of the Public Safety Bureau and transfer to the Security Bureau!"
10004040-38 = "[s5] \"I see. Good luck!\"\n[s6] \"I hope it works out for you.\""
10004040-39 = "Thanks, Sensei. It's my duty as an officer to fight for the safety of our citizens!"
10004040-40 = "Thanks, Sensei. It's my duty as an officer to fight for the safety of our citizens!"
10004040-41 = "By the way, what are you doing here, Sensei? It doesn't look like you came just for the tea..."
10004040-42 = "[s] Ask her if she's seen Shun."
10004040-43 = "Shun... Do you mean the tall student instructor from Plum Blossom Garden?#nI haven't seen her around here."
10004040-44 = "Does this have something to do with that young student next to you?"
10004040-45 = "[s] Explain what's happened so far."
10004040-46 = "In that case, let me take care of it. I'm on patrol here anyway."
10004040-47 = "I'll take Shunling back to Plum Blossom Garden while I'm at it."
10004040-48 = "Taking care of lost children is one of the important tasks of the Public Safety Bureau!"
10004040-49 = "[s] \"Thanks. I'd really appreciate that.\""
10004040-51 = "H-Huh?!"
10004040-54 = "(Who is this police student?! Why is she interrupting my time with Sensei?!)"
10004040-55 = "(Not only that, but she's talking so casually with [USERNAME] Sensei... I don't like this at all!)"
10004040-56 = "(I've got no grudge against you, but you have to leave now!)"
10004040-59 = "Oh! There's a Genryumon officer carrying a big scary gun!"
10004040-60 = "Huh? No... Could the struggle between the two groups have already begun?"
10004040-61 = "I'm sorry, Sensei. My top priority right now is to keep conflict from erupting."
10004040-63 = "Kirino, at your service!"
10004040-68 = "Phew, the interloper is finally gone."
10004040-73 = "Now then, shall we have a cup of tea and enjoy ourselves?"
10004040-79 = "D-Deception!"
10004040-80 = "Huh? Back already, police lady?"
10004040-81 = "What is the meaning of this, Shunling?! I asked the students outside, but no one has seen any student with a heavy firearm, let alone a Genryumon officer!"
10004040-83 = "You gave the police misinformation. That's obstruction of justice, which is a serious crime!"
10004040-84 = "But I really did see someone from Genryumon pass by..."
10004040-85 = "Are you gonna punish me?"
10004040-87 = "U-Ugh..."
10004040-89 = "It would be ridiculous for me to get angry at a little kid over a simple misunderstanding."
10004040-91 = "Anyway, I don't want to keep bothering Sensei, so I'll just take you to Plum Blossom Garden now..."
10004040-92 = "Oh! Are those Black Tortoise Promenade girls carrying knives?"
10004040-94 = "Ah! I can't let this cold war turn hot!"
10004040-96 = "Kirino, at your service!"
10004040-100 = "This police girl never seems to learn."
10004040-101 = "Now, back to tea and this bean rice cake!"
10004040-106 = "I really should have seen that coming."
10004040-107 = "All right, even if you are a little kid, you've lied to the police twice. You're in big trouble now!"
10004040-109 = "Excuse me, police lady..."
10004040-110 = "What is it now?"
10004040-111 = "Those bad girls over there are harassing the clerk."
10004040-112 = "Ha! Fool me once, shame on you. Fool me twice...also shame on you! But three times? Not a chance!"
10004040-117 = "What's with this grubby teahouse?"
10004040-118 = "And this menu? It's all bitter, gross tea! What kind of a teahouse doesn't have tapioca milk tea?"
10004040-119 = "B-But this is a traditional teahouse, so we don't have newer..."
10004040-120 = "Do you REALLY think arguing with a customer is a good idea? Huh?!"
10004040-121 = "We want fresh cream crepes and tapioca milk tea!"
10004040-123 = "Huh. How about that?"
10004040-124 = "Hey, stop right there! No troublemakers will threaten the safety of our citizens!"

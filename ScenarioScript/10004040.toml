[translation]
10004040-1 = "#title;제4화;제복 차림의 방해꾼"
10004040-2 = "#place;산해경 <도원향>"
10004040-3 = "3;꼬마 슌ND;13;이곳은 산해경의 찻집, <도원향>이에요!\n#3;em;[반응]\n#3;a"
10004040-4 = "3;꼬마 슌ND;01;산해경의 학생들은 식사 후에 카페에 들리는 대신 이곳, 도원향에서 차를 마시곤 해요."
10004040-5 = "3;꼬마 슌ND;99;이곳의 차는 향기도 좋을 뿐만 아니라 기름진 음식을 소화하는 데에도 큰 도움이 되거든요."
10004040-6 = "3;꼬마 슌ND;03;아직 백귀야행 학원의 <백야당>만큼 유명하지는 않지만, 차의 맛과 향만큼은 키보토스 제일이랍니다!\n#3;em;[반짝]\n#3;hophop"
10004040-7 = "[s] \"……여기에는 슌이 있을까?\""
10004040-8 = "3;꼬마 슌ND;08;어…… 그건 잘 모르겠지만…….\n#3;em;…"
10004040-9 = "3;꼬마 슌ND;10;우, 우선은 차라도 한잔 마시면서 기다려봐요. 혹시 또 슌 언니가 이 찻집에 들를지도 모르잖아요?\n#3;stiff"
10004040-10 = "3;꼬마 슌ND;08;게다가 도원향에서는 차뿐만 아니라 맛있는 다과도 팔고 있어요. 아, 그러고보니 저기에 녹차 월병이…….\n#3;em;[반응]"
10004040-11 = "[s] \"역시 뭔가 수상한데…….\""
10004040-12 = "#st;[0,0];instant;1;"
10004040-13 = "#clearST"
10004040-14 = "#wait;1500"
10004040-15 = "1;키리노;01\n#1;ar\n#3;m5\n#wait;1200"
10004040-16 = "1;키리노;02;어라? 샬레의 선생님이시로군요.\n#1;em;[?]"
10004040-17 = "1;키리노;00;이런 곳에서 뵙게 되다니, 우연이네요.\n#1;em;[반짝]\n#1;greeting"
10004040-18 = "3;꼬마 슌ND;05;(윽, 또 방해꾼이…….)\n#3;em;[속상함]\n#3;stiff"
10004040-19 = "[s1] \"안녕, 키리노.\"\n[s2] \"발키리 학원의 학생이 산해경 자치구에는 무슨 일이야?\""
10004040-20 = "1;키리노;01;아아, 공무 때문에 방문한 것은 아닙니다. 지극히 개인적인 일로 방문했거든요.\n#1;em;[음표]\n#1;m3\n#3;dr"
10004040-21 = "1;키리노;01;아아, 공무 때문에 방문한 것은 아닙니다. 지극히 개인적인 일로 방문했거든요.\n#1;em;[음표]\n#1;m3\n#3;dr"
10004040-22 = "1;키리노;00;별건 아니지만…… 경비국으로부터 신경 쓰이는 소문을 하나 들어서요."
10004040-23 = "[s] \"소문?\""
10004040-24 = "#all;hide"
10004040-25 = "3;키리노;02;선생님께서도 산해경의 학생회— 현룡문과 미식 거리의 상인연합— 현무상회에 대해서는 알고 계시지요?\n#3;em;[?]"
10004040-26 = "[s] \"조금이라면.\""
10004040-27 = "3;키리노;01;네. 이 두 집단은 산해경을 대표하는 거대 동아리이기도 하지만, 서로가 산해경의 발전을 저해하는 집단이라고 여기고 있는지라. 오랫동안 서로를 거꾸러트릴 기회만 엿보고 있었지요.\n#3;em;[반응]"
10004040-28 = "3;키리노;99;그런데 얼마 전 경비국의 동기로부터 입수한 극비 정보에 따르면……"
10004040-29 = "3;키리노;08;출처를 알 수 없는 대량의 총기가 산해경 자치구 내로 흘러 들어갔다고 하더군요!\n#3;em;[!]"
10004040-30 = "3;키리노;05;……어쩌면 조만간 현룡문과 현무상회 간에 대규모 항쟁이 벌어질지도 모릅니다.\n#3;stiff"
10004040-31 = "[s3] \"무, 무서워라…….\"\n[s4] \"그런 기밀을 이렇게 말해도 되는 거야?\""
10004040-32 = "3;키리노;07;그, 그건 그러니까 이 사실은……\n#3;em;…"
10004040-33 = "3;키리노;07;그, 그건 그러니까 이 사실은……\n#3;em;…"
10004040-34 = "3;키리노;06;비, 비밀로 부탁드리겠습니다!\n#3;em;[땀]\n#3;stiff"
10004040-35 = "3;키리노;01;여하튼! 학생들이 오가는 번화가에서 대규모 폭력사태가 발생할 수도 있다니, 발키리 경찰학교의 학생으로서 가만히 있을 수는 없겠지요.\n#3;em;[반응]"
10004040-36 = "3;키리노;00;게다가 본관이 단독으로 현룡문과 상회의 항쟁을 저지하는 데 성공한다면, 높으신 분들도 제 능력을 인정해 주시겠지요!"
10004040-37 = "3;키리노;99;어쩌면 생활안전국에서 벗어나 경비국으로 전과할 수 있는 절호의 기회일지도……!"
10004040-38 = "[s5] \"그렇구나. 힘 내!\"\n[s6] \"좋은 결과가 있었으면 좋겠네.\""
10004040-39 = "3;키리노;00;헤헤, 감사합니다, 선생님. 시민의 안전을 위해 싸우는 건 경찰의 의무니까요!\n#3;hophop\n#3;em;[반짝]"
10004040-40 = "3;키리노;00;헤헤, 감사합니다, 선생님. 시민의 안전을 위해 싸우는 건 경찰의 의무니까요!\n#3;hophop\n#3;em;[반짝]"
10004040-41 = "3;키리노;01;그런데 선생님은 무슨 일로 이곳에 계신 건가요? 단순히 차를 드시러 온 것처럼 보이지는 않습니다만……."
10004040-42 = "[s] 슌을 본 적 없느냐고 묻는다."
10004040-43 = "3;키리노;02;슌이라면 매화원의 그 키가 큰 교관 학생 말인가요? 유감스럽게도 이 근처에서는 보지 못했습니다만…….\n#3;em;[?]"
10004040-44 = "3;키리노;01;혹시 옆에 있는 그 어린 학생과 관련된 일인가요?"
10004040-45 = "[s] 방금 전까지 있었던 일을 설명한다."
10004040-46 = "3;키리노;00;아하, 그런 일이라면 본관이 함께 처리하겠습니다. 어차피 이 근처를 계속 순찰할 예정이었으니까요.\n#3;em;[반응]"
10004040-47 = "3;키리노;01;그리고 가는 길에 슈에링이라는 그 학생도 매화원에 데려다 주고 오겠습니다."
10004040-48 = "3;키리노;03;미아를 돌보는 것은 생활안전국의 중요한 업무 중 하나니까요!\n#3;em;[반짝]\n#3;greeting"

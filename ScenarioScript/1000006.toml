[translation]
1000006-1 = "ข้อเสนอตำแหน่งที่ปรึกษา"
1000006-2 = "สำนักงานหน่วยรับจ้างสารพัด 68"
1000006-3 = "คุณครูมาแล้วเหรอ"
1000006-4 = "[s] \"อารุ มีเรื่องสำคัญอะไรจะคุยเหรอ?\""
1000006-5 = "อ๋อ ไม่มีอะไรหรอก พอดีฉันวางแผนเรื่องธุรกิจใหม่เอาไว้น่ะ"
1000006-6 = "ฉันรู้ดีว่าฉันเป็นหัวหน้าที่มากความสามารถ แล้วก็รู้ดีด้วยว่าตัวเองบกพร่องเรื่องอะไร"
1000006-7 = "แน่นอนว่าคนเราจะสมบูรณ์แบบไปซะทุกอย่างก็คงไม่ได้"
1000006-8 = "แต่ถ้ามีสิ่งที่บกพร่องละก็ ในทางธุรกิจการขอความช่วยเหลือก็เป็นเรื่องที่เข้าใจได้"
1000006-9 = "[s] \"พูดอะไรน่ะ?\""
1000006-10 = "ฉันคิดว่าสิ่งที่ตัวฉันยังบกพร่องอยู่ในฐานะประธานก็คือประสบการณ์"
1000006-11 = "แล้วก็... ฉันคิดว่าคุณครูมีประสบการณ์ที่ฉันไม่มีอยู่"
1000006-12 = "เพราะว่าคุณครู.... เป็นผู้ใหญ่นี่นา"
1000006-13 = "ฉะ...ฉันคิดว่าคุณครูคงจะมีประสบการณ์ในเรื่องที่ฉันไม่รู้อยู่...."
1000006-14 = "ถึงอีกไม่นานฉันก็คงได้มีประสบการณ์พวกนั้นเหมือนกัน...!! ตะ...แต่ว่าตอนนี้...."
1000006-15 = "ฉันหมายถึง... อ่ะแฮ่ม...."
1000006-18 = "ที่ฉันจะพูดก็คือ ฉันอยากขอให้คุณครูมาเป็นที่ปรึกษาด้านการบริหารของบริษัทเรา"
1000006-19 = "[s] \"ที่ปรึกษาด้านการจัดการ? แต่ว่าเรื่องนั้น....\""
1000006-20 = "อ่า... ยังไม่ต้องตอบตอนนี้ก็ได้นะ"
1000006-21 = "ฮุฮุฮุ เรายังมีเวลาอีกถมเถ"
1000006-22 = "ฉันจะรอจนกว่าคุณครูจะตัดสินใจได้ ค่อยๆ คิดไปก็ได้นะ"
1000006-23 = "ไม่ว่าคนอื่นจะพูดว่ายังไง แต่ฉันก็เป็นหัวหน้าที่ยอดเยี่ยมที่สุดในเกเฮนน่า"
1000006-26 = "(ฮุฮุฮุ ฟังดูเป็นผู้ใหญ่ใช่ไหมล่ะ พูดปิดสวยๆ แบบผู้ใหญ่เลยแล้วกัน)"
1000006-27 = "(กริ๊งงงงงง!)"
1000006-28 = "อ๊ะ เดี๋ยวนะ รอเดี๋ยวก่อนนะ"
1000006-29 = "ลูกค้าโทรมาจ้างงานน่ะ ขอฉันรับโทรศัพท์ลูกค้าก่อน แล้วค่อยมาคุยกันต่อนะ"
1000006-30 = "(โทรมาได้จังหวะเลย! ฉันจะได้โชว์ให้คุณครูเห็นซะทีว่าฉันคุยเรื่องธุรกิจยังไง มิชชั่นคอมพลีต!)"
1000006-33 = "― สวัสดีค่ะ หน่วยรับจ้างสารพัด 68 ริคุฮาชิมะพูดค่ะ[wa:1180] "
1000006-37 = "― (หึ พอเห็นฉันจริงจังกับการทำงาน จะต้องหลงเสน่ห์ฉันแน่ๆ!?)[wa:2220] "
1000006-39 = "― (ห้ะ? โทรมาผิดแล้วย่ะ?! ที่นี่ไม่ใช่ร้านซูชิสักหน่อย?!)[wa:1220] "
1000006-42 = "― อืม คงไม่ได้หรอกค่ะ ตอนนี้พวกเรางานยุ่งมากเลย[wa:2620] "
1000006-44 = "― (สั่งอาหารเหรอ? จะบ้าเรอะ ใครจะไปส่งให้ได้!)[wa:10] "
1000006-47 = "― อ๋อ ค่ะ ค่ะ... เข้าใจแล้วค่ะ[wa:2520] "
1000006-49 = "― (ถ้าโทรมาผิดก็รีบๆ วางไปสิยะ! จะมาพูดให้ยืดยาวเปลืองน้ำลายทำไม…?)[wa:960] "
1000006-52 = "― อืม.. ค่อนข้างลำบากเลยนะคะ ดูตามเศรษฐกิจของไตรมาสนี้แล้ว.. ดอกเบี้ยมันก็ค่อนข้าง...[wa:3320] "
1000006-54 = "― (จะถามเรื่องราคาซูชิอีกทำไมเนี่ย?!)"
1000006-57 = "― อ๋อ ค่ะ รับทราบค่ะ อย่างนั้นเองเหรอคะ...[wa:4000] "
1000006-59 = "― (ใครอยากรู้กันยะว่าชอบกินซูชิแบบไหน... อะไรเนี่ย เจ้าหมอนี่)[wa:2420] "
1000006-62 = "― หืม? คิดว่าโทรมาผิดเหรอคะ?[wa:800] "
1000006-65 = "― พะ... พูดอะไรน่ะ? ฉันกำลังคุยงานอยู่ต่างหาก![wa:740] "
1000006-68 = "หะ...เห็นแล้วใช่ไหม...?"
1000006-69 = "คิดว่ายังไงล่ะคุณครู? ท่าทางที่แสนจะเพอร์เฟกต์ของฉัน หลงเสน่ห์ของฉันแล้วรึยัง?"
1000006-70 = "อ๋อ แล้วอย่าเข้ามาใกล้ฉันตามใจชอบด้วยนะ"
1000006-71 = "ระวังจะถูกไฟแห่งความมุ่งมั่นของฉันไหม้จนเป็นแผลล่ะ"
1000006-72 = "[s1] \"คนเมื่อกี้โทรมาติดต่องานจริงๆ เหรอ?\"\n[s2] \"ครูว่าซูชิก็อร่อยดีนะ\""
1000006-73 = "ทะ...ทำไมถามแบบนั้นเล่า!"
1000006-74 = "จะ...จู่ๆ พูดอะไรเนี่ยคุณครู!"
1000006-75 = "เลิกพูดอะไรไร้สาระได้แล้ว!"
1000006-76 = "ยังไงก็เก็บข้อเสนอของฉันไปคิดดูให้ดีด้วยล่ะ"
1000006-77 = "ฉันจะรอให้คุณครูยอมมาเป็นที่ปรึกษาของพวกเรานะ ฮุฮุฮุ!"
1000006-79 = "(รอดมาได้หวุดหวิด... แต่หวังว่าคงจะได้ผลนะ?)"

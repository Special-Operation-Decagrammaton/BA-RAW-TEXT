[translation]
1000006-1 = "外部經營顧問的入社提議"
1000006-2 = "便利屋68・辦公室"
1000006-3 = "啊，老師，你來了啊。"
1000006-4 = "[s] 「亞瑠，妳說重要的事是什麼？」"
1000006-5 = "首先，雖然不是什麼重要的事，最近，我想了一個新的事業計畫。"
1000006-6 = "雖然我無可質疑的是個優秀的社長，但是我也知道以客觀的角度來說自己有哪些缺點。"
1000006-7 = "一個人是不可能十全十美的。"
1000006-8 = "如果自己有所不足的話就向外求援，事業上這是一個必須充分考慮的改善方案。"
1000006-9 = "[s]「什麼意思？」"
1000006-10 = "作為領導組織的社長，我認為我最缺少的就是經驗。"
1000006-11 = "然後……我認為老師擁有許多我所不足的經驗。"
1000006-12 = "因為，老師是，那個……是大人吧？"
1000006-13 = "知，知道很多我還不知道的經驗，那種意思，的大人，之類的……"
1000006-14 = "嘛，當，當然那些不足的部分我一下就能克服了……！！不，不過現在……"
1000006-15 = "所以，這個，那個……"
1000006-18 = "我直說了，我想要聘請老師你當我們公司的經營顧問。"
1000006-19 = "[s]「經營顧問？但是那……」"
1000006-20 = "啊，你也不用立刻答覆我。"
1000006-21 = "哼哼哼，我們接下來，還有很多時間。"
1000006-22 = "直到老師心裡出現明確的答案之前，不管多久我都願意等。"
1000006-23 = "不管別人說什麼，我都是格黑娜學園中最棒的領袖。"
1000006-26 = "（哼哼哼，這樣有表現出我成熟的魅力了吧？那麼就來收尾吧……）"
1000006-27 = "（叮鈴鈴鈴鈴！）"
1000006-28 = "啊，等我一下。"
1000006-29 = "似乎正好有通業務電話，等我把這件事解決再繼續吧。"
1000006-30 = "（時機真完美。只要能讓老師看到我處理工作時的從容不迫，那樣就完成任務了！）"
1000006-33 = "― 你好，我是便利屋68的陸八魔。[wa:2500] "
1000006-37 = "― （哼哼，可別被我工作的樣子迷住了唷？）[wa:3740] "
1000006-39 = "― （呃，打錯電話了吧！我們又不是壽司店！？）[wa:2580] "
1000006-42 = "― 嗯……有點困難呢。我們現在，行程上有點緊迫。[wa:3540] "
1000006-44 = "― （配送？很明顯沒有吧！）[wa:1200] "
1000006-47 = "― 啊啊，是，是。我能理解。[wa:3160] "
1000006-49 = "― （快點察覺打錯電話掛斷啊，話很多耶……）[wa:2760] "
1000006-52 = "― 唔──嗯。這個問題有點困難呢。在本季度的會計上……因為最近利率的問題……[wa:5200] "
1000006-54 = "― （別問我壽司多少錢啊！）"
1000006-57 = "― 啊啊，是。我確認過了。原來如此。[wa:4960] "
1000006-59 = "― （我才不想知道你對壽司的偏好啊……搞什麼，這個人）[wa:3820] "
1000006-62 = "― 嗯？你問說是不是打錯了？[wa:1360] "
1000006-65 = "― 你，你在說什麼？我正在工作啊！[wa:1900] "
1000006-68 = "好，好了，看見了吧……？"
1000006-69 = "如何，老師？我這個工作的英姿。要是迷上我的話，我可是會很困擾的唷？"
1000006-70 = "啊，順帶一提，不可以隨便接近我唷。"
1000006-71 = "要是你被我滾燙的熱情燙傷的話，那不就糟了嗎？"
1000006-72 = "[s1] 「話說剛才的電話，不是工作的吧？」\n[s2] 「壽司很好吃呢。」"
1000006-73 = "什，老師你突然在講什麼啊！"
1000006-74 = "什，老師你突然在講什麼啊！"
1000006-75 = "現在那種無聊事怎樣都無所謂！"
1000006-76 = "總之我的提議，要好好記住哦。"
1000006-77 = "我很期待老師將來能成為我們的經營顧問，哼哼！"
1000006-79 = "（成，成功蒙混過去了吧？對吧？沒問題吧？）"

[translation]
1000006-1 = "Management Consultant Job Offer"
1000006-2 = "Problem Solver 68 Office"
1000006-3 = "There you are, Sensei."
1000006-4 = "[s] \"What's the important business you mentioned, Aru?\""
1000006-5 = "Oh, nothing special. I just came up with a new business plan recently."
1000006-6 = "Part of being a great boss is also recognizing my own weaknesses."
1000006-7 = "No one is perfect, after all."
1000006-8 = "So getting outside help to cover my weaknesses is best for business."
1000006-9 = "[s] \"Where are you going with this?\""
1000006-10 = "If there's one thing I lack more than anything, it's leadership experience."
1000006-11 = "And then I realized...I don't know anyone with more of it than you."
1000006-12 = "After all...you're the adult here."
1000006-13 = "Y-You must have have plenty of experience in things I don't know about..."
1000006-14 = "S-Sure, I'm going to catch up someday, but for now..."
1000006-15 = "I mean, ahem..."
1000006-18 = "What I'm trying to say is, I'd like to formally recruit you as a management consultant at our company."
1000006-19 = "[s] \"Management consultant? But that's...\""
1000006-20 = "Oh, I'm not asking you to decide right away."
1000006-21 = "Heehee. We have plenty of time."
1000006-22 = "Take as long as you need until you're sure you know what your heart wants."
1000006-23 = "The same way I'm sure I'm the best leader in Gehenna—no matter what anyone says."
1000006-26 = "(Heh heh. I pulled it off. I sounded so mature! Now I just have to land the closing.)"
1000006-27 = "*ring* *ring*"
1000006-28 = "Oh, give me a minute."
1000006-29 = "It's business. We can finish our talk after I handle this."
1000006-30 = "(Perfect timing. All I have to do is show Sensei how competently I can handle business matters and it'll be mission complete!)"
1000006-33 = "― Hello. This is Problem Solver 68, Rikuhachima.[wa:1260] "
1000006-37 = "― (Heh. One look at my professional side and you'll fall in love. I hope you're ready!)[wa:1100] "
1000006-39 = "― (Wait, did they call the wrong number?! We're not a sushi restaurant!)[wa:620] "
1000006-42 = "― Hmm. That might not be doable. We have our hands full right now.[wa:1860] "
1000006-44 = "― (Delivery? This is getting ridiculous!)[wa:120] "
1000006-47 = "― Uh-huh. Right. Of course. I understand.[wa:2080] "
1000006-49 = "― (Why won't this idiot just hang up? Why are we still talking?)[wa:1080] "
1000006-52 = "― Hmm. That's a challenge. Looking at this quarter's forecast, the current interest rate is...[wa:2960] "
1000006-54 = "― (How much is our sushi? We don't even do that!)"
1000006-57 = "― Oh, yes. Understood. I see.[wa:4520] "
1000006-59 = "― (Who cares what your favorite sushi is...? Ugh. What's wrong with this lunatic?)[wa:1620] "
1000006-62 = "― Huh? You think they called the wrong number?[wa:80] "
1000006-65 = "― Wh-What are you talking about? This is a proper work call![wa:180] "
1000006-68 = "S-So, you heard all of that...right?"
1000006-69 = "What did you think? Sensei, I hope you're not TOO impressed by my professionalism."
1000006-70 = "Just be careful not to stand too close to me."
1000006-71 = "I wouldn't want you to get singed by my burning passion!"
1000006-72 = "[s1] \"Was that really a work call?\"\n[s2] \"I could go for some sushi.\""
1000006-73 = "Wh-What are you talking about? Sensei!"
1000006-74 = "Wh-What are you talking about? Sensei!"
1000006-75 = "Stop being silly!"
1000006-76 = "Anyway, at least give my offer some thought. "
1000006-77 = "I'm looking forward to you being my management consultant. Heeheehee!"
1000006-79 = "(I was really winging it at the end there, but it worked, right?)"

[translation]
1000920-1 = "熱狗節"
1000920-9 = "啊，老師，歡迎你來！我在等你哦！"
1000920-10 = "[s]「你好呀，你說想要給我看的東西是什麼？」"
1000920-11 = "那個啊～"
1000920-12 = "鏘～！就是這個！"
1000920-18 = "[ns1]「泉！？不可以把食物模型吃掉哦！？」\n[ns2]「啊啊啊，已經吃了……」"
1000920-21 = "真是的，才沒有呢！#n老師把我當成什麼了！"
1000920-22 = "那種事情就算是我也知道！"
1000920-23 = "[s3]「太……太好了……？」\n[s4]「這個……真的是模型嗎？品質真不錯啊……？」"
1000920-26 = "很厲害吧！無論是觸感還是香味，幾乎都和真正的熱狗一樣！"
1000920-27 = "好像是用三～低～列印機～？做出來的哦！"
1000920-28 = "[s5]「最近的3D列印機真厲害啊。」\n[s6]「話說回來，泉為什麼會拿著這個呢？」"
1000920-31 = "只要帶著它，就能常常碰見美食唷～"
1000920-32 = "是我的幸運物！之類的！"
1000920-37 = "（就在這時！突然出現了一隻巨大的烏鴉！）"
1000920-42 = "（烏鴉啊啊了兩聲！抓住泉的熱狗飛走了──！)"
1000920-44 = "嗚咦咦咦咦──！！還我啦──！#n我的熱狗──！！"
1000920-53 = "哈啊，哈啊……"
1000920-54 = "[s]「一路追著烏鴉，結果跑到了這種地方……」"
1000920-55 = "啊，老師你看！#n烏鴉想要把我的熱狗餵給雛鳥！"
1000920-56 = "可是……因為是塑膠所以沒辦法吃……"
1000920-57 = "怎，怎麼辦！？#n這樣下去的話，誰也不會幸福的……"
1000920-58 = "[s]「等我一下，泉。我馬上回來。」"
1000920-59 = "老，老師？你要去哪裡？#n別丟下我啊──！"
1000920-64 = "（雖然有點難過，不過還是丟下哭喪著臉的泉，去了一趟便利商店）"
1000920-68 = "老師？那個熱狗是要給我吃的……？"
1000920-69 = "不是？那你打算做什麼呢……？"
1000920-70 = "啊……要給那些烏鴉們吃？"
1000920-78 = "（在泉的協助下爬到了樹上）"
1000920-82 = "（把熱狗放在鳥巢附近……）"
1000920-86 = "老師，烏鴉稍微試吃了一下之後……"
1000920-91 = "把熱狗分給雛鳥們了！"
1000920-100 = "我的熱狗！"
1000920-101 = "哇！是要還給我嗎？#n謝謝！你們真聰明呢！"
1000920-108 = "[ns7]「大家都說烏鴉智商很高。」\n[ns8]「太好了呢，泉。」"
1000920-111 = "嗯！"
1000920-112 = "不過，跑了好久所以肚子餓了……"
1000920-113 = "[s]「哼哼哼……我就知道你會這麼說。」"
1000920-114 = "咦？咦？老師，怎麼了嗎？"
1000920-118 = "那個是……熱狗！？"
1000920-119 = "[s9]「不知道為什麼，我也突然想吃熱狗。」\n[s10]「也買了泉的份哦。」"
1000920-122 = "真的嗎？我真的可以這麼幸福嗎？"
1000920-123 = "謝謝你，老師！#n我要開動了～！"
1000920-124 = "[s]「今天是泉的『熱狗節』呢。」 "
1000920-125 = "那是什麼？一整天都在吃熱狗的節日？"
1000920-126 = "啊哈哈！真有趣呢～！"
1000920-127 = "那……我要在熱狗上加鰻魚凍口味的醬汁、高級鮪魚口味的「肉泥」，#n還有巧克力芥末口味的薄片一起吃！"
1000920-128 = "啊，老師要不要也加一點？#n一定能找到美食的新境界的唷～！"
1000920-131 = "[ns]「我，我就先不用了……」"
1000920-132 = "是嗎……？"
1000920-134 = "（泉似乎是認真的，要拒絕他的好意實在不是件容易的事……）"

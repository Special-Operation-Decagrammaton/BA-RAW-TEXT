[translation]
1000920-1 = "Hot Dog Day"
1000920-9 = "Oh, Sensei! I've been waiting for you!"
1000920-10 = "[s] \"Hi, Izumi. What did you want to show me?\""
1000920-11 = "You see..."
1000920-12 = "Ta-da! Look at this!"
1000920-18 = "[ns1] \"Izumi? You can't eat a plastic hot dog even if you are hungry!\"\n[ns2] \"Oh no, you've already taken a bite...\""
1000920-21 = "Wait, no! It's not like that! What do you think I am?"
1000920-22 = "Even I know I can't eat plastic!"
1000920-23 = "[s3] \"That's a relief. I wasn't too sure...\"\n[s4] \"It just looks so real!\""
1000920-26 = "Yep! Even the smell and the texture are like a real hot dog."
1000920-27 = "Apparently the 3D...printer...thingy can make these kind of things these days."
1000920-28 = "[s5] \"3D printers are really amazing these days.\"\n[s6] \"But why are you carrying this around?\""
1000920-31 = "Hm? I have it because it smells nice! And whenever I carry it with me, I tend to find lots of yummy things to eat!"
1000920-32 = "So, it's kind of like a lucky charm for me!"
1000920-37 = "Suddenly, a huge crow appeared out of nowhere!"
1000920-42 = "The crow went straight towards Izumi's hot dog and flew away with it!"
1000920-44 = "What?! No, no! My lucky hot dog!"
1000920-53 = "*huff* *huff*"
1000920-54 = "[s] \"We chased the crow all the way here!\""
1000920-55 = "Oh, Sensei! The crow is trying to feed my hot dog to its babies!"
1000920-56 = "But... It's not really working out because it's made out of plastic."
1000920-57 = "Oh no... The babies are going to starve, AND I'll lose my hot dog if I don't do anything..."
1000920-58 = "[s] \"Wait a second, Izumi. I'll be right back.\""
1000920-59 = "Huh? Sensei? Where are you going? Don't leave me!"
1000920-64 = "I battled my guilt as I left Izumi, who was starting to tear up, and ran to the nearest convenience store."
1000920-68 = "Oh, Sensei. You bought a real hot dog! Is it for me?"
1000920-69 = "It's not? Aw... But why not?"
1000920-70 = "Oh... It's for the crows?"
1000920-78 = "Izumi helped boost me up onto the tree."
1000920-82 = "And once I placed the hot dog in its nest, the crow..."
1000920-86 = "Oh, the crow took a bite of the hot dog!"
1000920-91 = "And it's feeding its babies with it!"
1000920-100 = "My hot dog!"
1000920-101 = "Y-You're returning it to me? You're so smart! Thank you!"
1000920-108 = "[ns7] \"Crows are generally very intelligent.\"\n[ns8] \"Good for you, Izumi.\""
1000920-111 = "Heehee!"
1000920-112 = "But I'm hungry now after all that running..."
1000920-113 = "[s] \"Haha... I knew this was going to happen.\""
1000920-114 = "H-Huh? Sensei, do you have an idea?"
1000920-118 = "That's...a hot dog!"
1000920-119 = "[s9] \"I had a sudden craving for a hot dog.\"\n[s10] \"I bought extra, so you can have one, too.\""
1000920-122 = "Really? Am I allowed to be this happy?"
1000920-123 = "Thank you, Sensei! I appreciate it!"
1000920-124 = "[s] \"Today is like Izumi's 'Hot Dog Day' of some sort.\""
1000920-125 = "What's that? When you only eat hot dogs for the entire day?"
1000920-126 = "Ahahaha! That sounds fun! It's something I'd love to try sometime later!"
1000920-127 = "Then... I'm going to put some eel jelly flavored sauce, premium tuna flavor Purr Purr, and chocolate mustard flavored flakes on my hot dog!"
1000920-128 = "Oh, would you like some on yours, Sensei? It should really guide you towards the new level of gourmet food!"
1000920-131 = "[ns] \"Oh, I'm okay! I am very well satisfied with my regular hot dog!\""
1000920-132 = "Really...?"
1000920-134 = "It was quite difficult to turn down Izumi's full-hearted offer..."

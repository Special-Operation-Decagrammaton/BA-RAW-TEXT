[translation]
1000920-1 = "วันแห่งฮอตดอก"
1000920-9 = "อ๊ะ คุณครู! มาแล้วเหรอ ฉันกำลังรออยู่เลย!"
1000920-10 = "[s] \"ว่าไง อิซุมิ ของที่อยากให้ดูคืออะไรเหรอ?\""
1000920-11 = "เรื่องนั้นน่ะ..."
1000920-12 = "แต่นแต๊น! นี้ไงล่ะ!"
1000920-18 = "[ns1] \"อิซุมิ? ถึงจะหิวมากแต่ก็จะกินแม่พิมพ์ฮอตดอกไม่ได้นะ!\"\n[ns2] \"โธ่... กัดไปแล้วด้วยงั้นเหรอ...\""
1000920-21 = "จริงๆ เลย ไม่ใช่แบบนั้นสักหน่อย! เห็นฉันเป็นอะไรกันแน่เนี่ย!"
1000920-22 = "ฉันเองก็แยกออกเหมือนกันนะ ว่าอะไรกินได้ อะไรกินไม่ได้น่ะ!"
1000920-23 = "[s3] \"ค่อยยังชั่วหน่อย...\"\n[s4] \"แต่ว่า... ทำออกมาได้เหมือนมากจริงๆ เลยนะ?\""
1000920-26 = "อื้อ! แถมกลิ่นก็ยังเหมือนด้วยนะ ทำเหมือนฮอตดอกจริงๆ มากเลยละ"
1000920-27 = "ได้ยินว่าถ้าใช้เจ้าเครื่อง... เรียกว่าอะไรนะ... เครื่องพิมพ์สามมิติ? ให้ได้ดีๆ ละก็ เดี๋ยวนี้ทำของแบบนี้#nออกมาได้ด้วยละ!  "
1000920-28 = "[s5] \"ช่วงนี้เครื่องพิมพ์สามมิติกำลังเป็นที่แพร่หลายสินะ\"\n[s6] \"ว่าแต่ว่าทำไมอิซุมิถึงมีเจ้านี่อยู่ได้ล่ะ?\""
1000920-31 = "หืม? กลิ่นมันหอมมากๆ เลยนะ พอพกติดตัวไปไหนมาไหนก็มีเรื่องที่ทำให้ได้กินของอร่อยๆ เกิดขึ้น#nบ่อยๆ เลยละ!"
1000920-32 = "มันเป็นเหมือนเป็นของนำโชคของฉันเลยนะ!"
1000920-37 = "(และในตอนนั้นเอง ก็มีอีกาตัวมหึมาปรากฏตัวออกมาอย่างกะทันหัน!)"
1000920-42 = "(และตามคาด อีกาตัวนั้นบินมาโฉบฮอตดอกของอิซุมิแล้วก็บินหนีไป!)"
1000920-44 = "แงงงงงง?! ฮอตดอกของฉัน! เอาคืนมานะ~~~!"
1000920-53 = "แฮ่ก... แฮ่ก...!"
1000920-54 = "[s] \"ตามอีกามาถึงที่นี่เลย...\""
1000920-55 = "อ๊ะ คุณครู! เจ้าอีกานั่นกำลังจะเอาฮอตดอกของฉันให้ลูกๆ ของมันกินละ!"
1000920-56 = "แต่ว่า... ดูเหมือนจะเอาให้กินไม่ได้เพราะฮอตดอกมันเป็นพลาสติกน่ะ..."
1000920-57 = "แงงงง ทำยังไงดีละ?! ถ้าปล่อยไว้แบบนี้ ลูกๆ ของเจ้าอีกาก็คงจะต้องอดตาย และฉันก็จะไม่ได้#nฮอตดอกของฉันคืนด้วย..."
1000920-58 = "[s] \"รอครูตรงนี้ก่อนนะ อิซุมิ เดี๋ยวครูจะรีบกลับมา\""
1000920-59 = "เอ๋? คุณครู? คุณครูจะไปไหนน่ะ? อย่าทิ้งฉันไว้แบบนี้สิ~!"
1000920-64 = "(ถึงจะรู้สึกผิดนิดหน่อย แต่คุณครูก็ตัดใจทิ้งอิซุมิที่ร้องไห้งอแงไว้คนเดียว แล้วรีบไปที่ร้านสะดวกซื้อ#nทันที)"
1000920-68 = "อ๊ะ คุณครู? ไปซื้อฮอตดอกมานี่เอง จะเอามาให้ฉันเหรอ?"
1000920-69 = "ไม่ใช่เหรอ? แล้วคิดจะเอามันไปทำอะไรน่ะ?"
1000920-70 = "อ้อ... จะเอาไปให้พวกอีกางั้นเหรอ?"
1000920-78 = "(อิซุมิช่วยให้คุณครูปีนขึ้นไปบนต้นไม้ได้สำเร็จ)"
1000920-82 = "(พอเอาฮอตดอกขึ้นไปวางไว้ใกล้ๆ รัง แล้วจากนั้นพวกอีกาก็...)"
1000920-86 = "อ๊ะ เจ้าอีกาลองกินฮอตดอกแล้ว..."
1000920-91 = "คราวนี้มันเอาไปแบ่งให้ลูกๆ ของมันแล้วละ!"
1000920-100 = "ฮอตดอกของฉัน!"
1000920-101 = "ว้าว เอามาคืนงั้นเหรอ? ขอบคุณนะ! พวกแกนี่ฉลาดจริงๆ เลย!"
1000920-108 = "[ns7] \"พวกอีกาน่ะเป็นสัตว์ที่ฉลาดนะ\"\n[ns8] \"โชคดีจังน้า อิซุมิ\""
1000920-111 = "อื้ม!"
1000920-112 = "แต่ว่าพอวิ่งมาไกลแบบนี้ ชักเริ่มหิวแล้วละ"
1000920-113 = "[s] \"หึหึหึ... คิดแล้วว่าต้องเป็นแบบนี้\""
1000920-114 = "เอ๋? อะไรน่ะคุณครู? คิดอะไรอยู่งั้นเหรอ?"
1000920-118 = "นั่นมัน... ฮอตดอกนี่นา?!"
1000920-119 = "[s9] \"จู่ๆ ครูก็รู้สึกอยากกินฮอตดอกขึ้นมาเหมือนกันน่ะ\"\n[s10] \"ครูซื้อมาเผื่ออิซุมิด้วยนะ ซื้อมาเยอะเลย\""
1000920-122 = "จริงเหรอ? เกิดเรื่องน่ายินดีกับฉันแบบนี้จริงๆ เหรอเนี่ย?"
1000920-123 = "ขอบคุณนะคุณครู! ฉันจะฟาดให้เรียบเลย!"
1000920-124 = "[s] \"รู้สึกเหมือนวันนี้เป็น 'วันแห่งฮอตดอก' ของอิซุมิเลยนะ\" "
1000920-125 = "หมายความว่าไงน่ะ? วันที่ทั้งวันต้องกินแต่ฮอตดอกงั้นเหรอ?"
1000920-126 = "อะฮ่าฮ่าฮ่า! น่าสนใจดีนะ แบบนั้นก็คงไม่แย่เท่าไร!"
1000920-127 = "ถ้างั้นก็เอาซอสรสเยลลี่ปลาไหลกับซอส <นู~รุ> รสปลาทูน่ามาราด ท็อปปิ้งด้วยช็อกโกแลตเฟล็ก#nลงไปบนฮอตดอกแล้วค่อยกินดีกว่า!"
1000920-128 = "อ๊ะ จะให้ราดลงบนฮอตดอกของคุณครูด้วยมั้ย? อาจเป็นการอัปเลเวลอาหารเลิศรสไปอีกขั้นก็ได้นะ"
1000920-131 = "[ns] \"ไม่! ไม่ต้องเลย! ครูกินแค่ฮอตดอกแบบธรรมดาๆ ก็ได้!\""
1000920-132 = "งั้นเหรอ...?"
1000920-134 = "(การปฏิเสธอิซุมิที่ทำหน้าตาจริงใจสุดๆ นับว่าเป็นเรื่องยากมาก...)"

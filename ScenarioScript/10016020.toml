[translation]
10016020-1 = "Episode 2; Temptation of Street Vendors"
10016020-2 = "Outside the Athletic Stadium: Food Street"
10016020-4 = "When the Executive Committee meeting was finally over, I decided to take a look around at all the vendor stalls set up for field day."
10016020-5 = "Over here! The Black Tortoise Promenade, the renowned food district of Shanhaijing, has arrived at the Kivotos Halo Festival!"
10016020-6 = "It's your once-in-a-lifetime chance to taste the delicacies of Shanhaijing while you watch the festivities!"
10016020-7 = "No way! Look! The Black Tortoise Promenade have a stall too!"
10016020-8 = "Are you serious? I've always wanted to try them! Should we get something?"
10016020-9 = "It might be kind of unhealthy to have greasy food this early in the morning though..."
10016020-13 = "Buy your Momoyodou entries here!"
10016020-14 = "Sip on our newest drink, the cherry blossom soda, as you cheer on your favorite athletes!"
10016020-15 = "And try our bean paste mochi sandwich made by none other than me, Shizuko!"
10016020-16 = "Is that Momoyodou?"
10016020-17 = "My friend went to the Hyakkiyako Cherry Blossom Festival and said Momoyodou's food was the best part!"
10016020-18 = "We have enough time before the next event! Let's get some!"
10016020-22 = "[ns] \"It's so packed outside of the stadium...\""
10016020-25 = "Whew! I'm stuffed!"
10016020-26 = "I've had my fill here. Let's go somewhere else."
10016020-31 = "Stop right there!"
10016020-32 = "Huh? The Justice Task Force President?"
10016020-33 = "Littering is against the law!"
10016020-34 = "The students worked hard to decorate this area. Please be respectful of their efforts."
10016020-35 = "(Ugh... Why is the Justice Task Force on duty even during field day...)"
10016020-36 = "I-I'm sorry..."
10016020-42 = "*sigh* Maybe they're caught up in the excitement of the festival, but there are so many irresponsible students."
10016020-43 = "I would expect them to do their utmost to uphold Trinity's reputation."
10016020-44 = "[s] \"Nice to see you again, Hasumi.\""
10016020-45 = "...[USERNAME] Sensei?"
10016020-46 = "I didn't expect to run into you here, but I'm glad I did. I wanted to apologize for last time."
10016020-47 = "Despite everything, are you enjoying the festival?"
10016020-48 = "[s] \"Very much so, and all thanks to you.\""
10016020-50 = "[ns] \"Are you on duty, Hasumi?\""
10016020-51 = "Yes, I am. As a member of the Executive Committee, it's my responsibility to make sure the festival doesn't get out of hand. Students emboldened by the hectic atmosphere could try to cause trouble."
10016020-52 = "I underestimated just how big the venue is, and the size of the crowd though."
10016020-53 = "It'll certainly keep me on my toes all day."
10016020-54 = "[s] \"Does that mean you won't get a chance to participate in the tournament?\""
10016020-55 = "Participate? Naturally."
10016020-56 = "The Executive Committee is in charge of operations, not participation."
10016020-57 = "Not that it would be against the rules for a member to participate, but..."
10016020-58 = "As I said before, there are other students who have trained considerably and are much more inclined to these kinds of games."
10016020-59 = "So, instead, I'll take a back seat and ensure the games operate smoothly and the students are happy."
10016020-60 = "[s] \"Sounds like you have a lot on your plate.\""
10016020-61 = "Yes, but it's not too much."
10016020-62 = "It's more or less the same as my regular duties, just applied to the Halo Festival."
10016020-63 = "My job is to make sure justice is served. When or where I'm doing it doesn't change anything."
10016020-64 = "Oh my! What a coincidence. Hello, Sensei."
10016020-72 = "Ah! [USERNAME] Sensei."
10016020-74 = "Hi there, Sensei!"
10016020-75 = "[s1] \"Hi, everyone! You're here!\" \n[s2] \"The Gourmet Research Society is participating in the Halo Festival?\""
10016020-76 = "Naturally! This field day is an opportunity to try the most delectable cuisines you've never so much as laid eyes on before."
10016020-77 = "Naturally! This field day is an opportunity to try the most delectable cuisines you've never so much as laid eyes on before."
10016020-78 = "We of the Gourmet Research Society would never miss a culinary festival such as this one."
10016020-79 = "[s] \"Did you just call it a culinary festival...?\""
10016020-80 = "I called it exactly what it is. The Halo Festival is an exhibition for students to show off their talents, correct?"
10016020-81 = "With Millennium's scientific prowess, it might even be possible to extract or amplify certain flavors through polymer compound technology..."
10016020-82 = "This kind of cooking could bring about exactly the revolution we've been looking for in an otherwise static culinary scene."
10016020-83 = "Not only that, but you wouldn't believe all the different kinds of food stalls here!"
10016020-84 = "Some vendors even make field day exclusive dishes meant to be enjoyed while watching the games!"
10016020-85 = "You can even find prestigious establishments like the Black Tortoise Promenade and Momoyodou here! They're normally really inaccessible for the average student, so a lot of people come to the stadium just for the food! ★"
10016020-86 = "[s] \"I've seen students from all different academies, now that I think about it.\""
10016020-87 = "Oh, oh! And there's even a bread-eating contest!"
10016020-88 = "You just have to participate in some race, and you get to eat all the bread you want! How incredible!"
10016020-90 = "...That's not normally how a food-eating contest works."
10016020-91 = "Do you know what I heard? There's even an eating contest where you compete against a machine that automatically makes Wanko soba..."
10016020-92 = "Heehee. I wonder if that machine is any match for me! ♥"
10016020-93 = "Everyone is so excited... So dumb..."
10016020-97 = "These students..."
10016020-98 = "Oh, who is this? If I recall correctly, are you the president of the Justice Task Force?"
10016020-99 = "(It's difficult to exist amiably with anyone from Gehenna... And why does it have to be the members of one of their most notorious clubs, of all people?)"
10016020-100 = "(What an annoying situation.)"
10016020-101 = "It's nice to meet you. Today, I'm just a member of the Executive Committee of the Kivotos Halo Festival, nothing more."
10016020-102 = "I hope you continue to enjoy the festival and stay safe."
10016020-103 = "Thank you for the warm welcome."
10016020-105 = "\"Warm\" isn't exactly the adjective I'd use..."
10016020-107 = "By way of thanks, I purchased this from a stand earlier..."
10016020-111 = "It's grilled corn topped with sugar and cheese. Would you like one?"
10016020-112 = "*gulp*"
10016020-113 = "Oh... My apologies. Do you dislike corn?"
10016020-114 = "No, no... It's not that... It's more the fact that it's combined with sugar and cheese."
10016020-115 = "The calorie content with all of the add-ons... It's a bit heavy for a snack."
10016020-116 = "Oh, I see. That's your concern?"
10016020-117 = "Well, I wouldn't worry at all. We're at a field day after all. You'll burn it all off in no time."
10016020-118 = "Actually, considering how much you'll be running around today, you should be concerned with losing too much weight!"
10016020-119 = "Losing...too much...weight...?"
10016020-121 = "Actually, I've never thought about how thin you are considering how much you eat, Haruna."
10016020-122 = "Are you on some kind of secret diet?"
10016020-123 = "I would never participate in such a farce. I simply do not gain weight."
10016020-124 = "Diets induce guilt about something as glorious and beautiful as eating. How despicable and idiotic."
10016020-126 = "..."
10016020-127 = "You...don't gain weight...? Despicable? ...Idiotic?!"
10016020-128 = "Never... Never..."
10016020-129 = "I'll never forgive you, Gehenna!"
10016020-130 = "[s] \"H-Hasumi...?\""
10016020-131 = "Despite the continuous temptation, I've resisted the smells of the delicious treats wafting around me with every step I've taken!"
10016020-132 = "And then you dare to come around and taunt my efforts! Mock my struggles! I'll never forgive this injustice!"
10016020-133 = "For Sensei's sake, I was doing my utmost to maintain my calm. But I can't anymore!"
10016020-134 = "I'll do anything and everything it takes. I'll take every one of you down!"
10016020-138 = "O-Oh my... It seems we touched a nerve..."
10016020-139 = "[s] \"I actually think this one is your fault, Haruna.\""
10016020-140 = "I don't get it. She just offered her some yummy food!"
10016020-141 = "Yeah! Who the heck gets mad about free, tasty corn?!"
10016020-143 = "You'd have to be even stupider than Izumi to be mad about free food."
10016020-144 = "*sigh* What am I doing here? I don't wanna do an embarrassing eating contest, even if the food is good..."
10016020-145 = "And we already tried all the good food stalls at this point... Can I just go home?"
10016020-146 = "[s] \"Junko.\""
10016020-147 = "What?"
10016020-148 = "[s] \"Why don't you try out some other field day activities?\""
10016020-149 = "Even if I were to do that..."
10016020-153 = "Attention, please! The first game for the Kivotos Halo Festival will begin shortly."
10016020-154 = "Participating students from each academy must gather at the contestant lobby."
10016020-156 = "What?! A game is about the begin!"
10016020-157 = "They might run out of bread at the bread-eating race! We're late! We're doomed!"
10016020-158 = "We're not late yet. There's plenty of time."
10016020-159 = "How about we all split up so we can get to all the food we want to try?"
10016020-160 = "Sounds good to me! Bye-bye! ♥"
10016020-165 = "...Bye."
10016020-170 = "After saying goodbye to the Gourmet Research Society, I went back inside the stadium to watch the game."

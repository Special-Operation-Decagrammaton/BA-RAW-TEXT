[translation]
10016020-1 = "第2話;攤販的誘惑"
10016020-2 = "田徑運動場．攤販區"
10016020-4 = "（實行委員會的會議結束後，為了參觀大運動會，於是便走到了運動場外）"
10016020-5 = "來來來，看過來！看過來！#n山海經鼎鼎有名的「玄武商會」也來參加本次的晄輪大祭了！"
10016020-6 = "享受比賽的同時，也來品嘗一下平常只能在山海經才能吃到的美食吧！"
10016020-7 = "哎呀，是玄武商會的攤位。"
10016020-8 = "我早就想要品嘗看看玄武商會的料理了！#n竟然會在這種地方相遇……要去看看嗎？"
10016020-9 = "好是好……但一早就吃重口味的中華料理……好像對胃不大好呢。"
10016020-13 = "百夜堂分店登場！"
10016020-14 = "推出新品「櫻花蘇打」！#n要不要買一杯來配著比賽喝呢～？"
10016020-15 = "還有靜子親手製作的最中餅唷～！"
10016020-16 = "哎呀，這不是「百夜堂」嗎？"
10016020-17 = "上次參加過「百夜之春櫻花祭」的朋友都說那邊的食物超好吃的……"
10016020-18 = "要在比賽開始前先吃吃看嗎？"
10016020-22 = "[ns]「運動場外也很熱鬧呢……」"
10016020-25 = "嗯～多謝款待～"
10016020-26 = "既然填飽肚子了，差不多該去別的地方了吧？"
10016020-31 = "那邊那位，請留步！"
10016020-32 = "啊，哎呀？實現正義部的副部長……？"
10016020-33 = "請把垃圾妥善地扔進垃圾桶裡。"
10016020-34 = "就算不能恢復原狀，最起碼也該把垃圾清理乾淨。"
10016020-35 = "（唔唔，沒想到實現正義部在大運動會期間也沒閒著……）"
10016020-36 = "對，對不起──！"
10016020-42 = "唉……可能是受慶典氛圍影響，學生們開始放肆了起來。"
10016020-43 = "總之，希望不要再出現有損三一名聲的學生……"
10016020-44 = "[s]「又見面了呢，蓮實。」"
10016020-45 = "……[USERNAME]老師？"
10016020-46 = "剛才給您添麻煩了，沒想到還能再見到您。"
10016020-47 = "有好好享受慶典嗎？"
10016020-48 = "[s]「嗯，多虧有你的幫忙。」"
10016020-50 = "[ns]「蓮實正在執行實行委員的工作嗎？」"
10016020-51 = "是的。除了協助活動的運行之外，還得負責糾正那些被慶典氣氛沖昏頭的學生，#n以及維護環境整潔。"
10016020-52 = "但我簡單繞了一下會場……#n設施比想像的還要寬敞，學生也很多……難度挺高的呢。"
10016020-53 = "光是取締風紀，就要花掉一整天了。"
10016020-54 = "[s]「……話說你真的不打算參加比賽嗎？」"
10016020-55 = "……嗯？#n這是當然的。"
10016020-56 = "實行委員的本分不是參加比賽，而是維護運作。"
10016020-57 = "雖然也不是無法參加比賽……"
10016020-58 = "但正如剛才會議上說的，三一有很多優秀的學生。"
10016020-59 = "我身為實行委員，只需專注在維護風紀和保證比賽的運作就好。"
10016020-60 = "[s]「這樣啊……真是辛苦。」"
10016020-61 = "不，這沒什麼。"
10016020-62 = "對奇普托斯的學生來說，這是期盼已久的慶典，#n但對我來說，不過是平時業務的延伸。"
10016020-63 = "所以，只要和往常一樣，默默地實現正義──"
10016020-64 = "哎呀，竟然能在這種地方遇見……真巧呢。"
10016020-72 = "啊，是[USERNAME]老師。"
10016020-74 = "哈囉～老師！"
10016020-75 = "[s1]「哈囉──！」\n[s1]「美食研究會也來啦。」"
10016020-76 = "那當然。大運動會可是能享受各種料理的美食慶典。"
10016020-77 = "那當然。大運動會可是能享受各種料理的美食慶典。"
10016020-78 = "對於「尋求終極美食」的我們來說，怎麼可能會放過這個機會。"
10016020-79 = "[s]「大運動會是美食的慶典……？」"
10016020-80 = "沒錯。「晄輪大祭」也兼具如博覽會一般，展現各學園特色的作用。"
10016020-81 = "如果是千年的話……#n使用高分子化合技術萃取特定口味，或是進行濃縮……"
10016020-82 = "這種用新技術製作出的食物，肯定能為靜如死寂的美食界帶來一場大霹靂吧。"
10016020-83 = "而且「晄輪大祭」還有各式各樣的小攤販。"
10016020-84 = "邊觀賞比賽邊輕鬆地享用街頭小吃，#n這可是只有在大運動會上才能享受的專屬體驗唷～"
10016020-85 = "特別是「玄武商會」和「百夜堂」……#n這種平常不去自治區就很難吃到的在地美食也會來擺攤，#n有不少學生因此慕名而來呢★"
10016020-86 = "[s]「這麼說來，我好像看到了其他學園的學生……」"
10016020-87 = "而且，還有吃麵包競走！"
10016020-88 = "只要參加比賽就能盡情地吃麵包，真是太棒了～"
10016020-90 = "吃麵包競走不是比吃的數量吧……？"
10016020-91 = "這麼說來，聽說這次大運動會的項目中，#n也有和自動餵食蕎麥麵的機器決一勝負的大胃王比賽……"
10016020-92 = "呵呵，到底能滿足我到什麼程度呢，真是令人期待～♥"
10016020-93 = "大家才一早就這麼興奮……像笨蛋一樣。"
10016020-97 = "你們是……"
10016020-98 = "哎呀，這位是實現正義部的副部長吧。"
10016020-99 = "（撞見格黑娜的學生本來就尷尬……#n　竟然還偏偏是最惡名昭彰的問題兒童集團──傳說中的「美食研究會」……）"
10016020-100 = "（有點……棘手呢）"
10016020-101 = "很高興見到大家。#n我現在的身分並非實現正義部的副部長，而是晄輪大祭的實行委員。"
10016020-102 = "希望大家都能「順利及安全地」享受慶典。"
10016020-103 = "呵呵，承蒙款待。"
10016020-105 = "雖然看起來一點也不歡迎就是了……"
10016020-107 = "對了，剛才在攤位上買了這個……"
10016020-111 = "作為友好的象徵，#n要不要來一支撒滿了砂糖和起司的烤玉米呢？"
10016020-112 = "……（吞口水）"
10016020-113 = "哎呀……你不喜歡玉米嗎？"
10016020-114 = "並沒有不喜歡……#n只是像這樣撒滿了砂糖和起司……那個……"
10016020-115 = "卡路里也太……#n我是指以點心來說，也太重口味了吧？"
10016020-116 = "呵呵，你很在意卡路里嗎？"
10016020-117 = "不必擔心。#n只是這點程度的話，稍微跑一下就能充分消耗了。"
10016020-118 = "倒不如說，像晄輪大祭這種運動會，反而應該要擔心會變瘦吧？"
10016020-119 = "擔心會變瘦……？"
10016020-121 = "這麼說來，羽留奈明明吃得不少卻很瘦呢。"
10016020-122 = "是有另外節食嗎？"
10016020-123 = "不，我本來就是不會胖的體質。"
10016020-124 = "況且因為進食而產生罪惡感……這種事我實在無法忍受。"
10016020-126 = "……"
10016020-127 = "不會胖的體質……？#n無法忍受……？"
10016020-128 = "像這種……這種行為……"
10016020-129 = "絕對不能原諒，格黑娜！"
10016020-130 = "[s]「蓮，蓮實……？」"
10016020-131 = "這裡原本就已經到處都是誘惑了，我好不容易才把視線一一撇開……"
10016020-132 = "居然還在我眼前做出如此挑釁的行為……絕對不能原諒！"
10016020-133 = "剛才因為是在老師面前，我才忍住的……我要在此發出宣言。"
10016020-134 = "無論使用什麼手段，我們都會打敗[ruby=格黑娜]你們[/ruby]，取得總冠軍！"
10016020-138 = "哎呀哎呀……好像不小心踩到地雷了呢。"
10016020-139 = "[s]「……剛才是羽留奈的錯唷。」"
10016020-140 = "嗯？我們只是推薦美食而已耶？"
10016020-141 = "嗯嗯！竟然拒絕美味的玉米……真是無法理解呀～"
10016020-143 = "能因為收到食物而氣消的人，大概就只有笨蛋泉吧……"
10016020-144 = "唉……我本來沒有打算要嘗試奇怪的新菜單和參加大胃王比賽的，為何會跟著來呢？"
10016020-145 = "攤販的食物大部分都已經吃過了，好像也沒有其他特別的……"
10016020-146 = "[s]「淳子。」"
10016020-147 = "嗯？"
10016020-148 = "[s]「就平凡地享受大運動會吧？」"
10016020-149 = "就算你這樣說……"
10016020-153 = "大會報告──#n「晄輪大祭」的第一場比賽即將開始。"
10016020-154 = "請預定參加的選手，前往休息室集合。"
10016020-156 = "哇！比賽要開始了！"
10016020-157 = "太晚去的話，吃麵包競走的麵包要是被吃光的話怎麼辦？"
10016020-158 = "時間還很充裕。"
10016020-159 = "那麼，是時候各自去探索美食了吧？"
10016020-160 = "那我們走囉～♥"
10016020-165 = "……我走囉。"
10016020-170 = "（目送美食研究會離開後，前往運動場觀賞比賽）"

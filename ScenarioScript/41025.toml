[translation]
41025-2 = "……嗯？"
41025-3 = "怎麼了嗎？有什麼問題嗎？"
41025-4 = "對方好像又出兵了。"
41025-5 = "我還以為對面已經沒人了……"
41025-6 = "難不成是生活安全局……？"
41025-7 = "那就是雜魚嘛，白問了。"
41025-8 = "美優三兩下就能處理好了吧。"
41025-9 = "是那樣沒錯，但總覺得不對勁……"
41025-10 = "……嘛，是我過度擔心吧。"
41025-12 = "好黑，好恐怖……想趕快回去學校……"
41025-13 = "……學校已經，被關閉了啊。我能回去的地方……"
41025-14 = "這樣的話事到如今，不如去女武神……"
41025-15 = "這樣下去，我會孤零零的被遺忘吧……"
41025-16 = "我們，要像這樣到什麼……"
41025-20 = "……？"
41025-24 = "煙，煙幕彈……？"
41025-28 = "呀啊！？"
41025-29 = "從，從哪裡……？對手明明已經……"
41025-30 = "完全沒有任何聯絡……總，總之先回報……！"
41025-37 = "請，請問是誰……！？"
41025-39 = "那個……"
41025-40 = "是我啦，是我是我。RABBIT小隊的……"
41025-41 = "RABBIT小隊……"
41025-42 = "咦，咲希醬？"
41025-44 = "對對！"
41025-46 = "煙幕彈好像不小心爆炸了，所以我來看看情況。"
41025-47 = "可，可是咲希醬，你剛才好像有說「絕對不要離開崗位」……？"
41025-48 = "而且，聲音……"
41025-50 = "啊──因為吸到了一點煙……咳咳，咳咳！"
41025-52 = "嘛，總之別擔心啦。先把槍放下吧？"
41025-53 = "（……好可疑。口吻和聲音完全不像咲希醬……）"
41025-54 = "（這種時候就要用暗號……）"
41025-58 = "……「幸運草」。"
41025-60 = "……咦？"
41025-61 = "咲希醬，一定知道吧？"
41025-62 = "回，回答不了的話，我會立刻開槍……！"
41025-64 = "「幸運草」！"
41025-65 = "……咦，咦？"
41025-67 = "你說了什麼嗎？這邊雜音很多聽不太清楚。話說回來……關於這個暗號的答案，你知道吧？"
41025-68 = "咦，怎，怎麼這樣……！？"
41025-70 = "回答不了的話，就開槍了唷？"
41025-71 = "胡，「胡蘿蔔」！"
41025-73 = "哼～原來如此啊。了解。"
41025-74 = "咦，啊，啊……？"
41025-76 = "可能不善應付心理戰……就如老師所說呢。"
41025-83 = "謝謝你告訴我暗號。再見囉，兔子的狙擊手醬。"
41025-88 = "被，被騙了……！？"
41025-93 = "……剛才的槍聲是怎麼回事？不覺得很近嗎？"
41025-94 = "難道美優被打敗了……？"
41025-95 = "怎麼可能，是生活安全局耶？包含裝備在內的各個層面，美優都不可能被打敗呀。"
41025-96 = "雖然是那樣沒錯……沒辦法聯絡上美優。"
41025-100 = "我去看看。"
41025-101 = "萌，支援拜託你了。"
41025-102 = "沒得支援啦，已經沒彈藥了呀？"
41025-103 = "……哈啊，為什麼？"
41025-104 = "剛才不是說要「大幹一場」、「用光」嗎。"
41025-105 = "追擊無人機時，全部砰！掉了♪"
41025-106 = "哈啊！？你，騙人的吧！？"
41025-107 = "不顧後果，一次性全部投入……"
41025-108 = "那個火花還真美，好興奮……哈啊，哈啊……"
41025-109 = "哪有真的如字面上「用光」的傢伙啊！笨蛋！我們現在必須為將來設想吧！"
41025-110 = "這個狀況沒了彈藥，之後該怎麼──"
41025-117 = "剛才的爆炸是……？"
41025-121 = "咲希、萌，什麼狀況？請回報！"
41025-125 = "沒有回應……被偷襲了嗎。"
41025-126 = "所以才說了要警戒……"
41025-127 = "沒辦法了，首先轉移據點應戰……"
41025-132 = "請停下！"
41025-133 = "如老師所說真的在這裡……！請不要動！"
41025-134 = "佔領各位市民使用的公園，還使用違法武器示威……"
41025-135 = "不好意思，請你束手就擒吧！"
41025-136 = "請聽從本官的指示，將手舉起來！"
41025-142 = "（這下麻煩了……竟然已經來到這裡）"
41025-143 = "（武裝只有制式手槍……第一槍我應該能躲開……）"
41025-147 = "請，請不要動！真的會開槍唷！？"
41025-148 = "……這我可恕難從命！"
41025-154 = "本，本官要開槍了！"
41025-164 = "──！！我明明有看清楚槍口的方向……！？"
41025-165 = "難道她預判我會躲開，故意最後一刻打向其他方向……？"
41025-166 = "看來我也，掉以輕心了……嗎……"
41025-171 = "……命，命中了！？！？"
41025-172 = "難，難道本官的射擊能力終於也進步了嗎……？"
41025-173 = "果然努力是會結果的……"
41025-174 = "而正義也是，無論何時都會勝利……就是這樣吧！"
41025-178 = "真不敢相信……"
41025-179 = "沒想到真的只以生活安全局的學生，就壓制了SRT……"
41025-180 = "[s] 「多虧兩位努力了呢。」"
41025-181 = "原來如此……這就是[USERNAME]老師的力量。而且還如此謙虛。"
41025-182 = "看來學生們的傳言，都不是空穴來風。"
41025-183 = "……我謹代表女武神警察學園，感謝您。"
41025-192 = "看見了嗎，老師！？我完美的射擊！"
41025-193 = "正如警備局的大家一樣，漂亮的一擊……！"
41025-194 = "哎呀～沒想到那麼古老的手法還行得通呢……"
41025-195 = "嘛，雖然全靠老師的作戰……能順利成功就好。"
41025-196 = "這下應該能給個20天左右的榮譽假吧。嘻嘻……"
41025-198 = "……哈啊。"
41025-199 = "我認同你們的功績，但那不是我這種立場可以決定的事。#n是更上層長官的管轄範圍。"
41025-200 = "辛苦了。關於報酬，等下個月的獎懲公告吧。"
41025-202 = "什麼啊，不是立刻拿到嗎……"
41025-203 = "真失望啊。"
41025-204 = "不過下個月就快到了！搞不好真的可以到警備局……！"
41025-205 = "呃，那個就免了……"
41025-206 = "給我我也不要……"
41025-211 = "我們竟然被那種一臉蠢樣的傢伙……？"
41025-212 = "你還有臉說，你還不是一樣蠢到把彈藥一口氣耗盡。"
41025-213 = "你在說什麼呀，沒有東西能比瞬間的光輝還重要！"
41025-214 = "已經結束了啊……"
41025-215 = "SRT也是，RABBIT小隊也是，我也是……命中注定要全部被奪走，寂寞的消失……"
41025-216 = "……"
41025-217 = "[s1] 「初次見面。」\n[s2] 「你們是SRT特殊學園的學生們……對吧？」"
41025-218 = "……我們跟你沒什麼好說的！"
41025-219 = "……我們跟你沒什麼好說的！"
41025-220 = "什麼什麼，潑冷水？還是來嘲笑我們的？"
41025-222 = "……你就是指揮那個生活安全局的，「大人」嗎？"
41025-223 = "[s]「嗯，沒錯唷。」"
41025-224 = "……是這樣嗎。你就是那個，解決大量學生們的煩惱，受到學生們信賴，持有超法規搜索權的「夏萊的老師」……"
41025-228 = "……老師。我們最討厭像你這樣的大人了。"
41025-229 = "下地獄吧。"
41025-230 = "再也不見。"
41025-237 = "[ns] 「嗯……真有精神啊。」"
41025-238 = "請別在意。她們只是因為打輸而正覺得煩躁吧。"
41025-239 = "[s] 「那些孩子，接下來會怎麼樣？」"
41025-240 = "首先是審訊。"
41025-241 = "平常在那之後，會交由女武神決定如何懲處……"
41025-242 = "但這次有些牽扯上聯邦學生會，恐怕不會那樣吧。應該會由防衛室長下決定。"
41025-243 = "若您需要，應該能讓您觀看審訊的狀況。"
41025-244 = "那麼，總之今日辛苦您了。"
41025-250 = "下一話;各自的情況"

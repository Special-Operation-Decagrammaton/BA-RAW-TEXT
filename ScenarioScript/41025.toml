[translation]
41025-2 = "หืม...? อะไรเนี่ย?"
41025-3 = "มีอะไรเหรอ? อุปกรณ์ตรวจจับมีปัญหาอะไรงั้นเหรอ?"
41025-4 = "ไม่มีหรอก แต่มีกองกำลังเข้ามาทางนี้เพิ่มน่ะ"
41025-5 = "พวกสำนักความมั่นคงกับกรมความมั่นคงสาธารณะก็โดนเล่นงานจนหมดเรี่ยวแรงไปแล้วนี่นา..."
41025-6 = "หรือว่าพวกนั้นคือสำนักรักษาความปลอดภัย?"
41025-7 = "เหอะๆ ถ้าเป็นสำนักรักษาความปลอดภัยจริงๆ ก็ไม่มีอะไรน่าห่วง"
41025-8 = "มิยุก็กำลังซ่อนตัวอยู่ใกล้ๆ เดี๋ยวมิยุคงจัดการเด็กเมื่อวานซืนพวกนั้นให้เอง"
41025-9 = "แต่บรรยากาศมันแปลกๆ แฮะ..."
41025-10 = "ไม่เป็นอะไรหรอกน่า"
41025-12 = "ทะ... ทั้งมืดทั้งน่ากลัว... อยากกลับโรงเรียนไวๆ แล้ว..."
41025-13 = "ไม่สิ อาคารโรงเรียน SRT ถูกทำลายหมดแล้ว... เราไม่มีที่ให้ไปแล้วสินะ..."
41025-14 = "ถึงตอนนี้จะไปบอกใครว่าอยากเข้าสถาบันฝึกตำรวจวัลคิรี่ แต่ก็คงไม่มีใครรับเข้าเรียน..."
41025-15 = "สุดท้ายแล้วเราคงค่อยๆ เลือนหายไปจากความทรงจำของทุกคน..."
41025-16 = "เราต้องอยู่ที่นี่ไปถึงเมื่อไรกันนะ..."
41025-20 = "เอ๋...?"
41025-24 = "นะ... นี่มัน... ระเบิดควัน?"
41025-28 = "อ๊ายยย?!"
41025-29 = "มาจากทางไหนเนี่ย...? ไม่เห็นมีใครแจ้งว่าศัตรูมาทางนี้เลย..."
41025-30 = "ต้องรีบรายงานสถานการณ์..."
41025-37 = "นะ... นั่นใครคะ?! อย่าขยับนะ ไม่งั้นฉันยิงนะคะ!"
41025-39 = "เอ่อ... คือ..."
41025-40 = "จำไม่ได้เหรอ? ฉันไง! สมาชิกกองทหาร RABBIT จากสถาบัน SRT..."
41025-41 = "สมาชิกกองทหาร RABBIT เหรอ..."
41025-42 = "หรือว่าจะเป็นซากิจัง?"
41025-44 = "อื้ม ใช่แล้ว! ฉันเอง ซากิ"
41025-46 = "ฉันเห็นม่านควันส่งสัญญาณ ก็เลยแวะเข้ามาดูว่าเกิดอะไรขึ้นน่ะ"
41025-47 = "แต่เมื่อกี๊ซากิจังเพิ่งบอกกับฉันเองนี่นาว่าอย่าออกจากตรงนี้เด็ดขาด?"
41025-48 = "อีกอย่าง เสียงของซากิจังมันดูแปลกๆ..."
41025-50 = "นั่นน่ะ... ฉันสำลักควันเข้าไป เสียงเลยเป็นแบบนี้น่ะ แค่กๆ แค่กๆ!"
41025-52 = "เอาเป็นว่า วางปืนก่อนแล้วออกมาคุยกันเถอะ"
41025-53 = "(น่าสงสัยชะมัด... ทั้งเสียง ทั้งสำเนียงการพูด ไม่เหมือนกับซากิจังเลย...)"
41025-54 = "(ก่อนอื่นต้องสุขุมไว้แล้วติดต่อคนอื่น...)"
41025-58 = "<โคลเวอร์> ..."
41025-60 = "หืม? อะไรกันเหรอ?"
41025-61 = "รหัสลับไงล่ะ คนอย่างซากิจังต้องจำทั้งคำถามและคำตอบได้อย่างถูกต้อง ว่าไหม?"
41025-62 = "ถะ... ถ้าตอบไม่ถูก ฉันจะยิงทันทีเลย!"
41025-64 = "อ่า... ถ้างั้นก็... <โคลเวอร์>!"
41025-65 = "อะ... เอ๋? ฉันเป็นคนถามก่อนไม่ใช่เหรอ?"
41025-67 = "ว่าไงนะ? แถวนี้เสียงดังรบกวนจนไม่ค่อยได้ยินเลย ช่างเถอะ ฉันถามรหัสลับไปแล้วก็ตอบมาสิ"
41025-68 = "อะ... เอ่อ..."
41025-70 = "รีบตอบเร็วเข้า! ถ้าไม่ตอบแสดงว่าเป็นศัตรู แล้วฉันจะยิงให้เละเลย!"
41025-71 = "กะ... ก็ได้! <แคร์รอต>!"
41025-73 = "อย่างนี้เองเหรอ ถ้าถามว่า <โคลเวอร์> ให้ตอบว่า <แคร์รอต> สินะ..."
41025-74 = "หืม...? หมายความว่ายังไง?"
41025-76 = "คุณครูคิดถูกจริงๆ ด้วย สไนเปอร์ที่ซ่อนตัวอยู่ที่นี่ไม่ถนัดกับสงครามประสาทแบบไล่ต้อน"
41025-83 = "เรารู้รหัสลับแล้ว ถ้างั้นก็ไปดีมาดีนะ สไนเปอร์กระต่าย"
41025-88 = "ถะ... ถูกหลอกเข้าแล้ว!"
41025-93 = "แปลกจัง... ทำไมเสียงปืนดังใกล้เข้ามาเรื่อยๆ"
41025-94 = "หรือว่ามิยุจะโดนนักเรียนจากสำนักรักษาความปลอดภัยเล่นงาน?"
41025-95 = "ไม่หรอก ไม่มีทาง แต่ถึงจะใช่ขึ้นมา อาวุธของสำนักรักษาความปลอดภัยคงจะเป็นแค่ปืนต๊อกต๋อย#nที่เอาไว้ปราบหัวขโมยในเมืองแค่นั้น"
41025-96 = "แต่สัญญาณจากมิยุก็หายไปดื้อๆ ต้องมีอะไรแปลกๆ แน่"
41025-100 = "คงต้องไปดูด้วยตัวเองซะแล้วสิ"
41025-101 = "โมเอะ ขอกระสุนเพิ่มหน่อย"
41025-102 = "หืม? เราไม่มีกระสุนเหลือแล้วนะ"
41025-103 = "หมายความว่ายังไง? ไม่มีกระสุนเหลือเลยงั้นเหรอ?"
41025-104 = "ก็บอกไปแล้วนี่นาว่าจะใช้กระสุนที่เหลือจุดดอกไม้ไฟให้ได้ร้อนวูบวาบกัน"
41025-105 = "ส่วนลูกปืนใหญ่กับกระสุนที่เหลือตรงนี้ก็ใช้ยิงโดรนหมดแล้ว ♪"
41025-106 = "เมื่อกี๊ไม่ได้แค่พูดเล่นหรอกเหรอ?!"
41025-107 = "การได้ยิงปืนจนกระสุนหมดคลังโดยไม่แคร์ว่าจะเกิดอะไรตามมา..."
41025-108 = "คงไม่มีอะไรที่ตื่นเต้นไปกว่านี้แล้วล่ะ ฮ่าฮ่า..."
41025-109 = "แต่ตอนนี้เราจะมาทำเป็นไม่รู้ร้อนรู้หนาวอะไรเลยไม่ได้นะ!"
41025-110 = "ใช้กระสุนสำหรับต่อสู้ไปกับการเล่นจุดดอกไม้ไฟหมดเลยงั้นเหรอ ทำแบบนี้ไม่ต่างอะไรกับคนโง่..."
41025-117 = "เสียงระเบิดเมื่อกี๊มัน...?"
41025-121 = "ซากิ โมเอะ เสียงระเบิดเมื่อกี๊คืออะไรเหรอคะ? ช่วยรายงานด้วยค่ะ!"
41025-125 = "โดนเข้าแล้ว... ไม่มีการตอบรับแบบนี้ สงสัยจะโดนซุ่มโจมตีค่ะ"
41025-126 = "อุตส่าห์เตือนแล้วทั้งทีว่าอย่าประมาท..."
41025-127 = "ช่วยไม่ได้ค่ะ แบบนี้เราต้องย้ายฐานทัพแล้วค่อยโต้ตอบกลับ อย่างน้อยก็เพื่อวางแผนในอนาคต..."
41025-132 = "หยุดตรงนั้นเลยนะคนร้าย!"
41025-133 = "แกนนำความวุ่นวายในครั้งนี้มาซ่อนอยู่ที่นี่ตามที่คุณครู [USERNAME] บอกไว้เลยค่ะ!"
41025-134 = "มายึดสวนสาธารณะของชาวเมืองโดยไม่ได้รับอนุญาต แถมยังใช้อาวุธผิดกฎหมายในการปฏิเสธ#nอำนาจรัฐอีก..."
41025-135 = "ถือเป็นอาชญากรรมร้ายแรงในคิโวทอสที่ยกโทษให้ไม่ได้ค่ะ!"
41025-136 = "ยกมือขึ้นและยอมจำนนตามที่ฉันบอกเถอะค่ะ!"
41025-142 = "(น่ารำคาญชะมัด ผู้บัญชาการของอีกฝ่ายบุกเข้ามาถึงที่นี่แล้วเหรอเนี่ย)"
41025-143 = "(แต่ถึงยังไงอาวุธของพวกนั้นคงเป็นแค่ปืนพกลำสั้นๆ ของสำนักรักษาความปลอดภัย ถ้าเราเคลื่อน#nไหวอย่างทันท่วงทีก็น่าจะหลบกระสุนได้บ้าง...)"
41025-147 = "ดะ... เดี๋ยวก่อนค่ะ ห้ามขยับนะคะ! ฉันยิงจริงๆ นะ!"
41025-148 = "ฉันไม่ทำตามหรอกค่ะ!"
41025-154 = "ยะ... หยุดนะ! ฉันยิงจริงนะ!"
41025-164 = "เอ๋...? เมื่อกี๊ปากกระบอกปืนของฝ่ายตรงข้ามหันไปทางอื่นนี่นา..."
41025-165 = "หรือนี่เป็นการตบตาด้วยการเล็งไปที่อื่นเพราะกลัวเราหนีไปอีกทาง..."
41025-166 = "เราประมาทไปงั้นเหรอ..."
41025-171 = "เอ๋? ยะ... ยิงโดนจริงๆ เหรอเนี่ย? ฉันยิงถูก... ในระยะขนาดนั้นเนี่ยนะ?"
41025-172 = "ฉันยิงแม่นขึ้นได้ถึงขนาดที่ตัวเองก็ไม่รู้ตัวมาก่อนเลยค่ะ"
41025-173 = "ไม่สิ ของมันแน่อยู่แล้ว ก็การยิงเมื่อกี๊คือไม้ตายแห่งความยุติธรรมที่เอาไว้ใช้ปราบอาชญากร..."
41025-174 = "และความยุติธรรมก็ย่อมเอาชนะได้ทุกเมื่อ!"
41025-178 = "ไม่น่าเชื่อเลยนะคะ..."
41025-179 = "ฉันขอให้คุณครูช่วยเพราะเชื่อในการสั่งการก็จริง แต่ก็ไม่คิดเลยว่าสำนักรักษาความปลอดภัยจะ#nปราบนักสู้มือหนึ่งของสถาบัน SRT จนอยู่หมัดได้..."
41025-180 = "[s] \"เพราะนักเรียนพวกนั้นมีความพยายามยังไงล่ะ\""
41025-181 = "งั้นเหรอคะ... ฉันว่าต้องให้เครดิตความสามารถของคุณครู [USERNAME] ด้วยนะคะ"
41025-182 = "ตอนนี้ฉันเริ่มเข้าใจแล้วค่ะว่าทำไมพวกนักเรียนถึงเชื่อและทำตามคำสั่งของคุณครู"
41025-183 = "ในนามตัวแทนของสถาบันฝึกตำรวจวัลคิรี่ ฉันขอขอบคุณคุณครูอีกครั้งนะคะ"
41025-192 = "คุณครูคะ คุณครู! คุณครูเห็นฉันเผชิญหน้ากับศัตรูด้วยฝีมือการยิงปืนที่ไร้ที่ติไหมคะ?"
41025-193 = "ฮิฮิ ฝีมือฉันพอเทียบเท่านักเรียนสำนักความมั่นคงได้เลยว่าไหมคะ?"
41025-194 = "เฮ้อ นึกไม่ถึงเลยว่าวิธีเฉพาะที่ใช้กับพวกคุณยายจะเอามาเล่นงานนักเรียนหัวกะทิได้..."
41025-195 = "คำแนะนำจากคุณครูก็ช่วยได้เยอะอยู่ แต่สกิลจัดการปัญหาเฉพาะหน้าของฉันก็ไม่ใช่ย่อยเลย#nเหมือนกันใช่ไหมล่ะ?"
41025-196 = "แบบนี้คงได้วันพักร้อนสัก 19 คืน 20 วันเลยล่ะ ฮุฮุ..."
41025-198 = "(ถอนหายใจ) ไม่รู้อะไรเอาซะเลยนะคะ..."
41025-199 = "จริงอยู่ว่าความสามารถของพวกเธอในปฏิบัติการครั้งนี้ยอดเยี่ยมมาก แต่การให้รางวัลเป็นการ#nตัดสินใจของผู้ใหญ่ในสถาบันฝึกตำรวจวัลคิรี่ต่างหาก ไม่ใช่ว่าพวกเธอจะมากำหนดเองได้สักหน่อย"
41025-200 = "คณะกรรมการรางวัลและการลงโทษจะพิจารณาผลงานของเธอในเดือนหน้า จะได้รางวัลเป็นอะไร#nก็รอดูตอนนั้นแล้วกัน"
41025-202 = "อะไรกัน ไม่ได้จะให้พักร้อนพรุ่งนี้เลยหรอกเหรอ?"
41025-203 = "คนเค้าอุตส่าห์ดีใจ..."
41025-204 = "แต่ใกล้จะถึงเดือนหน้าแล้วนะคะ! ดีไม่ดีเราอาจได้ย้ายไปสำนักความมั่นคงก็ได้...!"
41025-205 = "แบบนั้นมันจะยิ่งแย่กว่าเดิมน่ะสิ"
41025-206 = "ถ้าได้รางวัลแบบนั้น ฉันขอไม่รับดีกว่า..."
41025-211 = "อะไรกัน คนที่ปราบพวกเราได้คือเด็กหัวขี้เลื่อยพวกนั้นเหรอ?"
41025-212 = "กล้าเรียกคนอื่นว่าเด็กหัวขี้เลื่อยเหรอ? คำนั้นเหมาะกับคนที่ผลาญกระสุนจนหมดเกลี้ยงเพราะจะ#nจุดดอกไม้ไฟมากกว่าซะอีก"
41025-213 = "พูดอะไรบ้าๆ น่ะ ดอกไม้ไฟคือส่วนหนึ่งของการต่อสู้นะ!"
41025-214 = "จะ... จบสิ้นแล้วสินะ..."
41025-215 = "ทั้งสถาบัน SRT กองทหาร RABBIT แล้วก็เราด้วย... สุดท้ายแล้วทุกคนก็จะถูกปล่อยปละละเลย แล้วก็ค่อยๆ หายไป"
41025-216 = "......"
41025-217 = "[s1] \"หวัดดี\n[s2] \"พวกเธอคือนักเรียนจากสถาบัน SRT ใช่ไหม?\""
41025-218 = "ฉันไม่มีอะไรจะคุยกับคุณหรอกนะ!"
41025-219 = "ฉันไม่มีอะไรจะคุยกับคุณหรอกนะ!"
41025-220 = "มาที่นี่เพื่อจะมาหัวเราะเยาะพวกเราใช่ไหม? ฉันรู้หรอกน่า!"
41025-222 = "คุณคือ... 'ผู้ใหญ่' ที่สั่งการนักเรียนตำรวจจากสำนักรักษาความปลอดภัยใช่ไหมคะ?"
41025-223 = "[s] \"ใช่แล้ว\""
41025-224 = "อย่างนี้นี่เองสินะคะ ผู้ใหญ่ที่นักเรียนทุกคนเชื่อมั่นและทำตาม บุคคลจากองค์กรที่อยู่นอกเหนือ#nกฎหมายและคอยช่วยแก้ปัญหาของนักเรียน คุณครูจากชาเล่ต์ท่านนี้นี่เอง..."
41025-228 = "คุณครูคะ พวกฉันเกลียดผู้ใหญ่อย่างคุณเอามากๆ เลยละค่ะ"
41025-229 = "ภัยสังคมชัดๆ"
41025-230 = "ขออย่าให้ได้เจอกันอีกเลย"
41025-237 = "[ns] \"อืม... พลังเหลือล้นกันจังเลยนะ\""
41025-238 = "อย่าไปสนใจการตัดสินของเด็กเกเรพวกนั้นเลยค่ะ สงสัยเพราะโมโหที่พ่ายแพ้จากการสู้รบก็เลย#nพูดจาไม่ดีน่ะค่ะ"
41025-239 = "[s] \"แล้วเด็กพวกนั้นจะเป็นยังไงต่อเหรอ?\""
41025-240 = "เราจะสอบสวนแรงจูงใจในการก่อเหตุก่อนแล้วค่อยพิจารณาการลงโทษค่ะ"
41025-241 = "ปกติแล้วระดับการลงโทษจะเป็นไปตามกฎภายในของสถาบันฝึกตำรวจวัลคิรี่..."
41025-242 = "แต่เหตุการณ์ครั้งนี้สร้างความเสียหายต่อภาพลักษณ์ขององค์การนักเรียนเป็นอย่างมาก เป็นไปได้#nว่าหัวหน้าสำนักป้องกันน่าจะเป็นคนพิจารณาโทษของเด็กพวกนั้นด้วยตัวเองค่ะ"
41025-243 = "ถ้าคุณครูอยากเข้าไปสังเกตการณ์การสอบสวนก็มาที่สถาบันฝึกตำรวจวัลคิรี่ได้ค่ะ"
41025-244 = "วันนี้ขอบคุณมากเลยนะคะ งั้นฉันขอตัวก่อนค่ะ..."
41025-250 = "ตอนต่อไป;เหตุผลของกองทหาร"

[translation]
41025-2 = "...What in the world?"
41025-3 = "What's got your knickers in a twist? Is there something wrong with surveillance?"
41025-4 = "No, but there are troops approaching."
41025-5 = "Didn't we incapacitate the Security and Public Peace Bureaus?"
41025-6 = "They sent out the Public Safety Bureau of all people?"
41025-7 = "Hahaha! I'll eat those small fries for dessert!"
41025-8 = "Eh, well. Miyu's got the area covered. They'll go boom no problem."
41025-9 = "I guess. But why would they send such useless students..."
41025-10 = "Well, I'm sure it'll be fine."
41025-12 = "W-Was that another bug? I'm scared... I wanna go home."
41025-13 = "Oh but they closed the SRT building so I don't have a home to go to."
41025-14 = "And Valkyrie would never let me join them now..."
41025-15 = "I'm just gonna be left here forgotten and alone..."
41025-16 = "Are they sure I can't leave yet...?"
41025-20 = "Huh?"
41025-24 = "A smoke b-bomb?"
41025-28 = "Eek!"
41025-29 = "They didn't warn me any enemies were approaching!"
41025-30 = "I-I need to report this right away."
41025-37 = "D-Don't move! Or I'll shoot!"
41025-39 = "Um...."
41025-40 = "I-It's me! I'm a student of SRT Academy and the RABBIT Squad..."
41025-41 = "The RABBIT Squad?"
41025-42 = "S-Saki?"
41025-44 = "Y-Yeah!"
41025-46 = "The smoke signal went off, so I came to see if you were okay."
41025-47 = "But Saki, you were the one who said to not leave our positions no matter what."
41025-48 = "A-And you sound kinda funny..."
41025-50 = "D-Do I? I...inhaled some smoke! *cough cough* That must be why I'm so raspy!"
41025-52 = "Anyway, stop pointing your gun at a fellow squad member."
41025-53 = "(...This is weird. She doesn't talk or sound like Saki at all...)"
41025-54 = "(Use your brain, Miyu!)"
41025-58 = "...Clover."
41025-60 = "Wh-What did you say?"
41025-61 = "You don't know? Saki would know the watchword and the countersign!"
41025-62 = "Y-You better answer or I'll shoot!"
41025-64 = "W-Well... Um... Clover!"
41025-65 = "Huh?! I said it first!"
41025-67 = "It's so loud here, I can't hear anything you're saying! You better answer quick!"
41025-68 = "B-But... That doesn't..."
41025-70 = "Answer! Or you'll be considered an enemy of SRT Academy and I'll shoot!"
41025-71 = "F-Fine! Carrot!"
41025-73 = "Perfect. The watchword is \"clover,\" and the countersign is \"carrot\"."
41025-74 = "Wh-What do you mean?"
41025-76 = "Sensei said the sniper would be easy to manipulate. Gotta give it to them, that was easy as cake!"
41025-83 = "Thanks so much for the password. Bye-bye, little rabbit."
41025-88 = "L-Liar!"
41025-93 = "Does it seem like the gunshots are getting closer?"
41025-94 = "Miyu couldn't have been defeated by the Public Safety Bureau, could she?"
41025-95 = "Hah! You think those silly little pretend police officers with pea shooters could take down our Miyu?"
41025-96 = "Her communications were cut off though. Something's wrong."
41025-100 = "I'll go out there to assess the situation."
41025-101 = "Moe, more ammo please."
41025-102 = "Ammo? There's none left. Na-da. Not even a a single dust speckle."
41025-103 = "B-But how?"
41025-104 = "Heehee. They all went ka-boom for our fireworks show!"
41025-105 = "We used eeeverything, bombs, ammo, and all, to blow up the drone."
41025-106 = "Y-You actually used all of it?!"
41025-107 = "Blowing everything up at once? With no care for the consequences?"
41025-108 = "Nothing could excite me more! Hahahaha! *pant pant*"
41025-109 = "But there are consequences! The mission isn't complete!"
41025-110 = "How could you just waste all our ammo? Are you stupid?!"
41025-117 = "What was that explosion?"
41025-121 = "Saki, Moe. Please report! Are you okay?"
41025-125 = "Communications are down. They must have been attacked."
41025-126 = "I told them over and over again to stay vigilant."
41025-127 = "I need to make preparations to move our base and rebuild our strategy..."
41025-132 = "Stop there, disruptor of peace!"
41025-133 = "Just as [USERNAME] Sensei said, their leader was hiding here!"
41025-134 = "Occupying a park meant for citizens and using illegal weapons to defy public authority..."
41025-135 = "The severity of your crimes cannot be emphasized enough!"
41025-136 = "Drop your weapons and surrender!"
41025-142 = "(I didn't expect their vanguard to arrive so quickly. What to do...)"
41025-143 = "(The Public Safety Bureau is only armed with short-barreled standard pistols. I can win this, but I have to act decisively and quickly.)"
41025-147 = "W-Wait! Stop moving or I'll shoot! Seriously!"
41025-148 = "No! I won't come quietly!"
41025-154 = "Stop! Or I'll shoot! For real this time!"
41025-164 = "H-How? W-Wasn't she pointing her gun in a different direction?"
41025-165 = "Did she deliberately goad me into running and predict my movement?"
41025-166 = "I-I may have been outsmarted this time."
41025-171 = "W-W-Wait! D-Did I actually hit her? From this far away?"
41025-172 = "Heh. I guess my shooting skills really have improved."
41025-173 = "I'm not surprised! I call that move Strike of Justice, made just to subdue criminals!"
41025-174 = "And justice always prevails!"
41025-178 = "I'm beat."
41025-179 = "Not that I didn't have faith in you, but I had absolutely zero faith in the Public Safety Bureau students."
41025-180 = "[s] \"It's all thanks to the students' hard work.\""
41025-181 = "Maybe that's what your real talent is, [USERNAME] Sensei."
41025-182 = "I'll admit, I had my doubts. But I think I understand how you've garnered the trust you have."
41025-183 = "I'd like to thank you on behalf of Valkyrie Police School once again."
41025-192 = "Sensei, Sensei! Did you see my Strike of Justice take down the bad guys?"
41025-193 = "I might be at the level of the Security Bureau students now!"
41025-194 = "I didn't think even a child could be tricked by my method, let alone some elites..."
41025-195 = "I mean, it was Sensei's plan, but I did pretty good on the spot, right?"
41025-196 = "I can't wait for my month-long vacation. Heehee."
41025-198 = "Do I really have to put up with this?"
41025-199 = "While you did perform well in this mission, it's not a one-stop ticket to whatever you want. The Valkyrie Police School executives will be the ones to evaluate your performance and eventual compensation."
41025-200 = "Right now, return to your regular duties and wait for the reward and punishment committee next month."
41025-202 = "I have to wait until next month for my vacation?"
41025-203 = "Hmph."
41025-204 = "One month is nothing! In one month's time, I might be a member of the Security Bureau!"
41025-205 = "Why do you say that like it's a good thing?"
41025-206 = "If that's the reward, I hope I have the option to say no."
41025-211 = "We were really caught by a bunch of dummies like that?"
41025-212 = "Who's a fool? Huh? Isn't it you for turning our ammo into your self-gratifying fireworks display?"
41025-213 = "Are you questioning the importance and beauty of explosions? If you are then I'll—"
41025-214 = "I-It's all over... Gone..."
41025-215 = "SRT Academy, the RABBIT Squad, my home... Now I'm really going to be forgotten for good... Not just by my squad members..."
41025-216 = "..."
41025-217 = "[s1] \"Hi there, RABBIT Squad.\"\n[s2] \"How're you holding up?\""
41025-218 = "We have nothing to discuss with you!"
41025-219 = "We have nothing to discuss with you!"
41025-220 = "You here to gloat about your victory? Huh?"
41025-222 = "Are you the \"grown-up\" who led the Public Safety Bureau students?"
41025-223 = "[s] \"I just gave them a few suggestions.\""
41025-224 = "Hm. The legendary Schale sensei. Trusted by all, stepping in and waving their extrajudicial authority like a magic wand to solve any problem."
41025-228 = "It's grown-ups like you I can't stand the most."
41025-229 = "I hope you trip and stub your toe."
41025-230 = "If I see you again, it's ka-boom for you."
41025-237 = "[ns] \"Haha. What a fun group.\""
41025-238 = "Please disregard those insurgents' insults. They're just bitter and angry."
41025-239 = "[s] \"What'll you do with them?\""
41025-240 = "We'll investigate their motives and go from there."
41025-241 = "Valkyrie Police School would normally be the one to issue the punishment, but..."
41025-242 = "With all the commotion and reporters, the General Student Council's reputation is at stake now. I expect the chief of defense will step in."
41025-243 = "If you want, visit Valkyrie to audit the investigation."
41025-244 = "Thanks again for your work today. I expect I'll see you again."
41025-250 = "Next Episode; The Squad's Circumstances"

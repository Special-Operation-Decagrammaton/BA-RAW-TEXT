[translation]
1012208-1 = "To Me, Someday"
1012208-2 = "[ns] \"She said it was this way...\""
1012208-4 = "Sensei! Over here!"
1012208-5 = "Ahaha, thank you for coming."
1012208-6 = "There was a place I wanted to show you..."
1012208-7 = "[s] \"Sounds special. I'm getting curious.\""
1012208-8 = "Yeah! But we have to walk, okay?"
1012208-9 = "It's a biiit of a way from here, so..."
1012208-10 = "Oh, you like walking at night? You're not scared of monsters?"
1012208-11 = "Heehee, that's a relief."
1012208-12 = "In that case..."
1012208-17 = "...Shall we?"
1012208-19 = "We walked along the shoreline."
1012208-22 = "Ah, now that I think about it..."
1012208-23 = "..."
1012208-24 = "Sensei, I'm sorry."
1012208-25 = "[s] \"Hm?\""
1012208-26 = "Um, when I conked out and you carried me back..."
1012208-27 = "[s1] \"Oh yeah. That was a real struggle.\"\n[s2] \"You were as light as...a truckful of feathers.\""
1012208-28 = "R-Really???"
1012208-29 = "I-I was THAT heavy...? I find that very difficult to believe—"
1012208-30 = "...Oh. A joke."
1012208-31 = "Boo! You're such a meanie. You almost had me going, you know..."
1012208-32 = "...O-Of course, I know that it was my fault, but..."
1012208-33 = "H-Hm?"
1012208-34 = "I-Is that so? You thought I was light and no trouble at all?"
1012208-35 = "W-Well...I'm glad to hear that, but..."
1012208-36 = "...The point is that I'm sorry. I shouldn't have done that."
1012208-37 = "I'm in your debt again, Sensei."
1012208-38 = "You're fine as long as I don't try to act \"adult\" again?"
1012208-39 = "...Y-Yes... I won't pretend to be... It's too embarrassing to think about."
1012208-40 = "You taught me that I don't have to force myself..."
1012208-41 = "...and that I should just be honest."
1012208-42 = "[ns] \"You're not worried like before?\""
1012208-44 = "I guess...I'm less anxious. Um..."
1012208-45 = "I've been thinking about it, and..."
1012208-49 = "We're almost there, Sensei."
1012208-50 = "It's right this way."
1012208-51 = "Here, over here...!"
1012208-57 = "[ns] \"It's beautiful!\""
1012208-58 = "Yeah, I know!"
1012208-59 = "I found this place by myself. I came all the way out here, trying to organize my thoughts."
1012208-60 = "Then I saw all this and everything cleared up!"
1012208-61 = "Heehee, so I knew I HAD to share this place with you."
1012208-62 = "Now, now! Sit here, Sensei."
1012208-70 = "It's peaceful..."
1012208-71 = "Lying like this makes me feel like my worries could scatter away."
1012208-72 = "Ah..."
1012208-73 = "S-Sensei! Look...!"
1012208-74 = "[ns] \"Isn't that...?!\""
1012208-79 = "Whoa... So many shooting stars..."
1012208-80 = "...It's pretty... It's all so wonderful."
1012208-81 = "[ns] \"Thank you, Mika.\""
1012208-82 = "Hm?"
1012208-83 = "[ns3] \"This was special.\"\n[ns4] \"You showed me this incredible sight!\""
1012208-86 = "..."
1012208-89 = "― [log=미카 수영복]Um, Sensei. [/log][wa:1190] "
1012208-91 = "― [log=미카 수영복]I'm...glad that I was able to watch this scenery with you.[/log][wa:4790] "
1012208-94 = "― [log=미카 수영복]Concerns...[/log][wa:1900] "
1012208-96 = "― [log=미카 수영복]Worries...[/log]"
1012208-99 = "― [log=미카 수영복]The anxiety... It's still there. [/log][wa:3080] "
1012208-102 = "― [log=미카 수영복]But still...[/log][wa:270] "
1012208-104 = "― [log=미카 수영복]When I stare at the sky full of stars like this...[/log][wa:10] "
1012208-107 = "― [log=미카 수영복]...perhaps it's all trivial.[/log][wa:3760] "
1012208-109 = "― [log=미카 수영복]That's what it feels like.[/log]"
1012208-112 = "― [log=미카 수영복]Sensei, you told me this before. [/log][wa:1480] "
1012208-115 = "― [log=미카 수영복]That this exact moment will continue to...[/log][wa:6520] "
1012208-117 = "― [log=미카 수영복]hold me in the future. Yeah.[/log][wa:1590] "
1012208-120 = "― [log=미카 수영복]So...[/log][wa:570] "
1012208-122 = "― [log=미카 수영복]I'll be happy too.[/log][wa:2650] "
1012208-126 = "..."
1012208-127 = "I-I said it..."
1012208-128 = "[ns] \"You will be happy, Mika.\""
1012208-132 = "[ns] \"I believe it.\""
1012208-133 = "Th-That's..."
1012208-134 = "Seriously... I don't know how adults can say stuff like that with a straight face."
1012208-139 = "Thank you, Sensei."
1012208-140 = "I...will be happy one day. Yeah."
1012208-141 = "You'll help me, right...?"
1012208-142 = "[s5] \"Yes, of course.\"\n[s6] \"I'll always be on your side.\""
1012208-145 = "Ahaha, there you go, so earnest again... ☆"
1012208-146 = "..."
1012208-150 = "Sensei, you're silly, sometimes foolish, but always kind."
1012208-154 = "Well then, I've said everything I wanted to say..."
1012208-159 = "And I might become a bad girl if I stay here any longer..."
1012208-160 = "...So, let's go back before that happens! ☆"
1012208-164 = "[ns] \"Hm? What are you talking about...?\""
1012208-165 = "Ahaha, let's go, Sensei!"
1012208-167 = "We returned, walking along the shoreline."
1012208-173 = "Mika smiled and talked throughout our trip back..."
1012208-174 = "...She seemed happy."

[translation]
1012208-1 = "ถึงฉันในสักวัน"
1012208-2 = "[ns] \"เห็นบอกไว้ว่าตรงนี้นี่นา...\""
1012208-4 = "คุณครู~ ตรงนี้!"
1012208-5 = "อะฮะฮ่า ขอบคุณที่มานะ"
1012208-6 = "ฉันมีสถานที่ที่อยากให้คุณครูได้เห็นน่ะ..."
1012208-7 = "[s] \"อยากรู้จังเลยนะว่ามิกะจะพาครูไปที่ไหน\""
1012208-8 = "อื้อ! แต่เราต้องเดินเท้ากันหน่อยนะ"
1012208-9 = "มันอยู่ไกลจากตรงนี้นิด~หน่อยน่ะ..."
1012208-10 = "คุณครูสบายมาก เพราะชอบเดินเล่นตอนกลางคืนอยู่แล้วงั้นเหรอ?"
1012208-11 = "ฮิฮิ งั้นก็ค่อยยังชั่วนะ"
1012208-12 = "ถ้างั้นก็..."
1012208-17 = "เดินไปกันเลยมั้ย?"
1012208-19 = "(แล้วคุณครูกับมิกะก็เดินเล่นที่ชายหาดยามค่ำคืนด้วยกัน)"
1012208-22 = "อ่า จะว่าไปแล้ว..."
1012208-23 = "..."
1012208-24 = "คุณครู ขอโทษนะ"
1012208-25 = "[s] \"หืม?\""
1012208-26 = "กะ... ก็ตอนนั้นที่จู่ๆ ฉันหลับไป จนคุณครูต้องแบกฉันกลับมาน่ะ..."
1012208-27 = "[s1] \"อ้อ... ไม่เป็นไรหรอก ถึงจะเหนื่อยมากก็ตามเถอะ\"\n[s2] \"อ้อ... ไม่เป็นไรหรอก มิกะตัวเบาเหมือนขนนกเลยละ\""
1012208-28 = "จะ... จริงเหรอ??"
1012208-29 = "ฉะ... ฉันตัวหนักงั้นเหรอ... คาดไม่ถึงเลยนะเนี่ย..."
1012208-30 = "ล้อเล่น... งั้นเหรอ?"
1012208-31 = "ฮึ่ม!! เกินไปแล้วนะ! ฉันเกือบจะคิดว่าเป็นเรื่องจริงจังแล้วนะเนี่ย?!"
1012208-32 = "นะ... แน่นอนว่ามันเป็นความผิดของฉันเอง แต่ก็..."
1012208-33 = "หะ... หืม??"
1012208-34 = "งะ... งั้นเหรอ? ถ้าฉันตัวเบาจริงๆ ก็ค่อยยังชั่วนะ..."
1012208-35 = "มะ... ไม่สิ... มันก็ค่อยยังชั่วอยู่หรอก แต่ก็..."
1012208-36 = "ยังไงก็ขอโทษนะ... ฉันไม่ควรทำแบบนั้นเลย..."
1012208-37 = "ทำให้คุณครูต้องเดือดร้อนอีกแล้ว"
1012208-38 = "คุณครูจะไม่ว่าอะไร ขอแค่จากนี้ไปฉันสัญญาว่าจะไม่แกล้งทำตัวเป็นผู้ใหญ่งั้นเหรอ?"
1012208-39 = "ค่ะ... จากนี้ไปฉันจะไม่ทำแบบนั้นอีกค่ะ"
1012208-40 = "ฉันจะไม่ฝืนทำแบบนั้นแล้ว..."
1012208-41 = "เพราะฉันรู้แล้วว่าแค่พูดตามตรงออกมาก็ได้ อื้ม"
1012208-42 = "[ns] \"แล้วหายกังวลเรื่องพวกนั้นแล้วหรือยัง?\""
1012208-44 = "จะบอกว่าหายกังวลแล้ว... ได้หรือเปล่านะ? อืม..."
1012208-45 = "เอาเป็นว่าฉันกลับไปคิดทบทวนเยอะเลย..."
1012208-49 = "มาถึงแล้วละ คุณครู"
1012208-50 = "ข้างหน้านี้ไงล่ะ"
1012208-51 = "นี่ไง ตรงนี้!"
1012208-57 = "[ns] \"สวยจัง...!!\""
1012208-58 = "อื้อ สวยใช่มั้ยล่ะ?!"
1012208-59 = "ฉันเจอที่นี่ระหว่างเดินจัดระเบียบความคิดน่ะ!"
1012208-60 = "พอเห็นก็รู้สึกว่าจิตใจปลอดโปร่งขึ้นเลย~"
1012208-61 = "ฮุฮุ เพราะงั้นฉันก็เลยอยากให้คุณครูได้เห็นด้วยน่ะ"
1012208-62 = "เอาละๆ! มานั่งตรงนี้สิ คุณครู"
1012208-70 = "สงบจังเลย..."
1012208-71 = "พอมานั่งอยู่แบบนี้ ก็รู้สึกเหมือนความกังวลมันลอยหายไปเลย..."
1012208-72 = "อ๊ะ..."
1012208-73 = "คะ... คุณครู! ตรงโน้น...!!"
1012208-74 = "[ns] \"นั่นมัน...?!\""
1012208-79 = "ว้าว... ดาวตก..."
1012208-80 = "สวยมาก... สวยมากเลย..."
1012208-81 = "[ns] \"ขอบใจนะ มิกะ\""
1012208-82 = "หืม??"
1012208-83 = "[ns3] \"ขอบใจที่พาครูมาที่สวยๆ แบบนี้นะ\"\n[ns4] \"ขอบใจที่ทำให้ครูได้เห็นท้องฟ้าสวยๆ แบบนี้นะ\""
1012208-86 = "..."
1012208-89 = "― [log=미카 수영복]เอ่อ... คุณครู[/log][wa:1110] "
1012208-91 = "― [log=미카 수영복]ฉัน... ดีใจจังที่ได้มาเห็นวิวแบบนี้[wa: 1980]กับคุณครู[/log][wa:5350] "
1012208-94 = "― [log=미카 수영복]ทั้งเรื่องกลุ้มใจ...[/log][wa:1540] "
1012208-96 = "― [log=미카 수영복]ทั้งเรื่องกังวลในอนาคต...[/log]"
1012208-99 = "― [log=미카 수영복]และความไม่แน่ใจ... ถึงตอนนี้มันจะยังอยู่[/log][wa:2800] "
1012208-102 = "― [log=미카 수영복]แต่พอฉัน...[/log][wa:310] "
1012208-104 = "― [log=미카 수영복]มองท้องฟ้าที่เต็มไปด้วยดวงดาวแบบนี้[/log][wa:250] "
1012208-107 = "― [log=미카 수영복]ทุกอย่างมันก็เหมือนเป็นเรื่องเล็กน้อยไปเลยละ[/log][wa:3120] "
1012208-109 = "― [log=미카 수영복]ฉันคิดแบบนั้นน่ะ[/log]"
1012208-112 = "― [log=미카 수영복]คุณครูเคยบอกฉันไว้ว่า[/log][wa:1960] "
1012208-115 = "― [log=미카 수영복]ช่วงเวลาในขณะนี้ จะคอยสนับสนุนตัวฉัน...[/log][wa:6640] "
1012208-117 = "― [log=미카 수영복]ในอนาคตไปเรื่อยๆ อื้อ[/log][wa:1870] "
1012208-120 = "― [log=미카 수영복]เพราะงั้น...[/log][wa:290] "
1012208-122 = "― [log=미카 수영복]ฉันเองก็จะมีความสุขขึ้นนะ[/log][wa:2370] "
1012208-126 = "..."
1012208-127 = "พะ... พูดออกไปจนได้..."
1012208-128 = "[ns] \"เดี๋ยวมิกะก็จะมีความสุขขึ้น\""
1012208-132 = "[ns] \"เชื่อแบบนั้นเถอะนะ\""
1012208-133 = "อะ... อะไรเนี่ย..."
1012208-134 = "จริงๆ เลยเชียว... ผู้ใหญ่คือคนที่พูดเรื่องเขินๆ แบบนั้นออกมาได้โดยไม่รู้สึกอะไรเลยสินะ..."
1012208-139 = "ขอบคุณนะ คุณครู"
1012208-140 = "ฉันขอเลือกมีความสุขขึ้น อื้อ"
1012208-141 = "เพราะงั้น... คุณครูก็จะช่วยฉันใช่มั้ย...?"
1012208-142 = "[s5] \"อื้อ แน่นอนอยู่แล้ว\"\n[s6] \"ครูจะคอยเฝ้าดูอยู่ข้างๆ ไปเรื่อยๆ เลย\""
1012208-145 = "อะฮะฮ่า พูดด้วยสีหน้าจริงจังอีกแล้วนะ~☆"
1012208-146 = "..."
1012208-150 = "เดี๋ยวแปลก เดี๋ยวซื่อบื้อ เดี๋ยวก็อ่อนหวาน นี่ละคุณครู"
1012208-154 = "งั้นในเมื่อฉันพูดสิ่งที่อยากพูดออกไปแล้ว..."
1012208-159 = "และถ้าฉันอยู่ตรงนี้ไปเรื่อยๆ ฉันน่าจะเป็นเด็กไม่ดีอีก..."
1012208-160 = "งั้นเรากลับกันก่อนที่ฉันจะทำตัวแบบนั้นมั้ย☆"
1012208-164 = "[ns] \"หืม? หมายถึงอะไรเหรอ...?\""
1012208-165 = "อะฮะฮ่า เรารีบกลับกันเถอะ! คุณครู~!"
1012208-167 = "(แล้วคุณครูกับมิกะก็เดินกลับมาตามชายหาดด้วยกัน)"
1012208-173 = "(มิกะที่หัวเราะและพูดคุยตลอดทางกลับ)"
1012208-174 = "(ดูมีความสุขขึ้นมาบ้างแล้ว)"

[translation]
1012208-1 = "獻給未來的自己"
1012208-2 = "[ns]「好像說是在這邊……」"
1012208-4 = "老師～這邊！"
1012208-5 = "啊哈哈，謝謝你願意過來。"
1012208-6 = "有個地方想讓老師看看……"
1012208-7 = "[s]「真好奇彌香會想讓我看什麼樣的地方呢。」"
1012208-8 = "嗯！不過要走一段路哦。"
1012208-9 = "從這裡過去有一點距離……"
1012208-10 = "你喜歡在晚上散步所以沒問題？"
1012208-11 = "嘿嘿，太好了。"
1012208-12 = "那……"
1012208-17 = "我們走吧？"
1012208-19 = "（就這樣和彌香一起在夜晚的海灘散步）"
1012208-22 = "啊，這麼說來……"
1012208-23 = "……"
1012208-24 = "老師，對不起。"
1012208-25 = "[s]「嗯？」"
1012208-26 = "就是我上次突然睡著，還麻煩老師把我背回去……"
1012208-27 = "[s1]「啊啊……沒事啦。雖然超累的就是了。」\n[s2]「啊啊……沒事啦。輕得跟羽毛一樣哦。」"
1012208-28 = "真，真的嗎？？"
1012208-29 = "我，我該不會很重吧……有點受打擊……"
1012208-30 = "咦……是開玩笑的？"
1012208-31 = "吼唷～老師好壞！我差點就當真了耶！？"
1012208-32 = "……當，當然也是我有錯在先就是了。"
1012208-33 = "咦，咦？？"
1012208-34 = "是，是嗎？如果真的很輕就好了……"
1012208-35 = "啊，不對……雖然是好事沒錯……"
1012208-36 = "……總之對不起。#n我不應該那麼做的……"
1012208-37 = "又給老師添麻煩了。"
1012208-38 = "答應你不再裝大人就沒關係？"
1012208-39 = "嗯……我以後不會再那樣了。"
1012208-40 = "因為我已經知道不用勉強自己……"
1012208-41 = "只要坦率說出來就行了。"
1012208-42 = "[ns]「那時候的煩惱，有比較釋懷了嗎？」"
1012208-44 = "能算是……釋懷了嗎？#n唔嗯……"
1012208-45 = "至少我自己思考了很多……"
1012208-49 = "到了，老師。"
1012208-50 = "就在前面。"
1012208-51 = "這裡這裡……！"
1012208-57 = "[ns]「真美……！！」"
1012208-58 = "嗯，對吧！！"
1012208-59 = "是我邊散步邊整理思緒的時候發現的！"
1012208-60 = "有種心情突然開闊起來的感覺～"
1012208-61 = "呵呵，所以才想讓老師也看看。"
1012208-62 = "來來來！坐這邊吧，老師。"
1012208-70 = "好平靜啊……"
1012208-71 = "像這樣坐著，感覺煩惱好像都飛走了……"
1012208-72 = "啊……"
1012208-73 = "老，老師！那邊……！！"
1012208-74 = "[ns]「那是……！？」"
1012208-79 = "哇……有好多流星……"
1012208-80 = "好漂亮……真的好美……"
1012208-81 = "[ns]「謝謝你，彌香。」"
1012208-82 = "嗯？？"
1012208-83 = "[ns3]「多虧彌香帶我來到這裡──」\n[ns4]「我才能見到這麼棒的景色。」"
1012208-86 = "……"
1012208-89 = "― [log=미카 수영복]那個，老師。[/log][wa:1430] "
1012208-91 = "― [log=미카 수영복]我……能跟老師一起看見這片景色，真是太好了。[/log][wa:6230] "
1012208-94 = "― [log=미카 수영복]雖然擔心的事情……[/log][wa:1980] "
1012208-96 = "― [log=미카 수영복]對未來的煩惱……[/log]"
1012208-99 = "― [log=미카 수영복]還有不安……都依然存在。 [/log][wa:3880] "
1012208-102 = "― [log=미카 수영복]不過……[/log][wa:590] "
1012208-104 = "― [log=미카 수영복]當我看著這片星空……[/log][wa:1250] "
1012208-107 = "― [log=미카 수영복]就會有種一切好像都只是微不足道的小事……[/log][wa:4080] "
1012208-109 = "― [log=미카 수영복]這樣的感覺。[/log]"
1012208-112 = "― [log=미카 수영복]老師，你之前跟我說過對吧。 [/log][wa:2240] "
1012208-115 = "― [log=미카 수영복]現在的這個瞬間，將來也會一直……[/log][wa:7560] "
1012208-117 = "― [log=미카 수영복]支撐著我。[/log][wa:2510] "
1012208-120 = "― [log=미카 수영복]所以……[/log][wa:610] "
1012208-122 = "― [log=미카 수영복]我也會，變得幸福的。[/log][wa:2970] "
1012208-126 = "……"
1012208-127 = "居，居然說出口了……"
1012208-128 = "[ns]「彌香一定會幸福的。」"
1012208-132 = "[ns]「要相信這一點。」"
1012208-133 = "這，這樣啊……"
1012208-134 = "能自然地說出這種害羞的話，才是真正的大人嗎……"
1012208-139 = "謝謝你，老師。"
1012208-140 = "我會變得幸福的。"
1012208-141 = "老師你……也會幫我的對吧？"
1012208-142 = "[s5]「嗯，那當然。」\n[s6]「我會一直在身旁守護著你。」"
1012208-145 = "啊哈哈，又用那麼認真的表情說這種話～☆"
1012208-146 = "……"
1012208-150 = "有點古怪、有時又傻傻的……卻很溫柔的老師。"
1012208-154 = "那麼，想說的話也差不多說完了……"
1012208-159 = "再待下去的話，感覺會變成壞孩子……"
1012208-160 = "還是在那之前回去吧☆"
1012208-164 = "[ns]「嗯？什麼意思……？」"
1012208-165 = "啊哈哈，快走吧！老師～！"
1012208-167 = "（和彌香一起沿著海邊踏上了歸途）"
1012208-173 = "（在閒聊間始終帶著笑容的彌香……）"
1012208-174 = "（看起來已經稍微幸福了一些）"

[translation]
10021020-3 = "คุณครูคะ การต่อสู้ครั้งนี้ ฉันจะใช้ปืนใหญ่ของเรือรบอุตนาพิชทิมเข้าสนับสนุนเองค่ะ"
10021020-4 = "อาจต้องใช้เวลาในการล็อกเป้าหมายและการยิงสักครู่หนึ่งค่ะ"
10021020-5 = "ช่วยต้านไว้จนถึงตอนนั้นด้วยนะคะ..."
10021020-6 = "คุณครูคะ พอยิงปืนใหญ่แล้ว เรือลำนี้อาจระเบิดเป็นเสี่ยงๆ ได้ค่ะ! หลังจากยิงปืนใหญ่แล้ว รบกวนพา#nนักเรียนทุกคนอพยพไปทาง <วงจรหลบหนี> ทันทีด้วยนะคะ!"
10021020-10 = "......"
10021020-11 = "......จะลุยแล้วนะคะ!"

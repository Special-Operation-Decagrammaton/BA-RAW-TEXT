[translation]
10033010-1 = "Episode 1;Fairness, Impartiality, and Fun"
10033010-4 = "..."
10033010-5 = "..."
10033010-6 = "P-Perhaps I misunderstood, Niya..."
10033010-12 = "No, no. You understood exactly right. Through a very, very impartial and what you could call fun method..."
10033010-13 = "I've selected which club will host Gehenna Academy during their field trip to Hyakkiyako!"
10033010-14 = "And the Festival Operations Department is the lucky winner! Congratulations! Nyahaha!"
10033010-16 = "Why're we finding out about this just now? And I don't believe I trust this impartial method she's talking about! Not one bit!"
10033010-17 = "It was fun! It spun round and round and round. President Niya called it a roulette."
10033010-18 = "Th-That was how you chose something this important?!"
10033010-20 = "Yes, indeed! And Chise herself helped in making it."
10033010-21 = "But the president did the spinning. Round and round."
10033010-30 = "Umika! The family needs you! Don't dieee!"
10033010-34 = "B-But...with the boss...I mean, President Shizuko gone, how are we meant to handle this?!"
10033010-35 = "Of all the times for the president to be on a business trip... She abandoned us to go study the festival culture in Trinity!"
10033010-37 = "Well, the Festival Operations Department is the best at this kind of thing, isn't it?"
10033010-38 = "So really, if you think about it, I actually made a really good decision, right? Go me!"
10033010-39 = "You said the spinnies chose though."
10033010-40 = "That said, we have high expectations of you, Festival Operations Department!"
10033010-41 = "I'm so very sad I can't be there in person, but hopefully my well wishes will bolster your efforts. Nyahaha!"
10033010-46 = "P-Please! Niya!"
10033010-47 = "And she hung up. What do we do, Umika?"
10033010-48 = "I just...need to breathe..."
10033010-49 = "*inhale* *exhale* *inhale* *exhale*"
10033010-53 = "Nope! That didn't help! We're doomed, Pina!"
10033010-54 = "This is out of my depth! We just gotta say no! Firmly!"
10033010-58 = "...Umika?"
10033010-59 = "..."
10033010-60 = "No. We can't, Pina."
10033010-61 = "We have to shoulder this responsibility, one way or another."
10033010-62 = "What?!"
10033010-63 = "The boss left the Festival Operations Department under our care! We can't let her down!"
10033010-64 = "I don't know about that... I just cannot fathom pulling off such a feat without her!"
10033010-65 = "..."
10033010-66 = "Waaah! Boss! Come back! I know that's an impossibility, but please!"
10033010-69 = "We should host a festival! An extravagant festival to welcome the Gehenna students right as they walk through the gates! "
10033010-70 = "The Move-in Festival as they settle into their accommodations! And then the All-Nighter Festival! Pajama Festival! Festival! Festival! Festival!"
10033010-71 = "We gotta slow down the horses for a second! I like festivals as much as you, but we don't have the time nor the budget for so many of them."
10033010-72 = "I can already see the president's face if she comes back after all that festival research to empty coffers! She won't be happy, that's a certainty!"
10033010-73 = "Y-You're right, but what else can we possibly do in this situation?"
10033010-74 = "I've got it! We'll do it like the vigilantes! A vigilante village made like a movie set with vigilante attractions! "
10033010-75 = "Loyalty and friendship attractions! Attractions about resolve and determination! Attractions! Attractions! Attractions!"
10033010-76 = "Are we taking them to a vigilante theme park or a field trip of Hyakkiyako? I suppose that could work though..."
10033010-77 = "N-No! You're absolutely correct! It wouldn't fly at all!"
10033010-78 = "Ugh... We need an idea... Any idea... Or else this field trip will dissolve into chaos and we'll besmirch the good Festival Operations Department name!"
10033010-79 = "Ah! In times like these..."
10033010-80 = "Have you figured it out, Pina?"
10033010-82 = "In the movies, this is when the vigilantes all assemble! We have battler allies who will come valiantly to our aid!"
10033010-88 = "Battlers?! H-Hold on, Pina! Wait for me. Wait!"
10033010-95 = "Isn't this the Inner Discipline Club?"
10033010-96 = "You're right on target, Umika! Since we have allied many times before, I'm sure we can join forces once again!"
10033010-97 = "Th-That is true, but isn't this a little rash?!"
10033010-98 = "(Can we do something like this without the boss' approval...?)"
10033010-99 = "L-Let's go back to the club room! We can think of a plan...with a little more caution."
10033010-100 = "What's the problem with this one?"
10033010-105 = "Whoa! The Festival Department? Whatcha doing all the way out here?"
10033010-106 = "You just conveniently appear with perfect timing?!"
10033010-107 = "See? Things are going our way already!"
10033010-108 = "Is everything okay? Did something happen?"
10033010-112 = "As a fellow battler, please fulfill my desperate plea, Kaede!"
10033010-114 = "U-Um, maybe you should give her a little context first."
10033010-115 = "Heehee. Why don't we go inside and figure out how I can help?"
10033010-116 = "Just like that?!"
10033010-122 = "Hm... I see! That's easy enough to understand! Gehenna's coming to visit Hyakkiyako!"
10033010-123 = "That's the gist of it, Kaede!"
10033010-124 = "I don't believe it's quite that simple..."
10033010-125 = "But making things complicated will just muddy the waters. "
10033010-126 = "After all, Tsubaki says that the best way to make hard decisions is to take a big nap first!"
10033010-127 = "Now that you mention it, where are Tsubaki and Mimori? I don't see them around."
10033010-129 = "H-Huh? That's, uh..."
10033010-130 = "O-Oh no! Did some terrible event befall them? Upon further inspection, it's only you occupying the Inner Discipline club room!"
10033010-131 = "N-No! It's just... Mimori left for discipline training last week."
10033010-135 = "Discipline?"
10033010-136 = "Training?"
10033010-137 = "That's what she said! She said it was a journey she had to go on to become a proper lady!"
10033010-138 = "I suppose... I understand?"
10033010-139 = "It's okay if you don't! Mimori just says and does things that are confusing to normal people like us!"
10033010-140 = "But Tsubaki and I decided a long time ago that we don't need to understand her to respect her wishes. Yeah!"
10033010-142 = "Wow! This is what real loyalty is. You respect your allies no matter what, and you never question anything they do."
10033010-144 = "S-Sure! I think that works!"
10033010-145 = "In that case, is Tsubaki on a soul searching journey as well?"
10033010-146 = "Tsubaki's doing what Tsubaki does! She's sleep training somewhere."
10033010-147 = "H-How admirable. Tsubaki's dedication and consistency when it comes to training is oddly comforting."
10033010-148 = "Anyways! The field trip thing sounds so cool! I wanna go on one too!"
10033010-149 = "Well, at least I think so. What even is a field trip?"
10033010-150 = "I haven't the faintest idea! But anything that contains the word \"trip\" must be a huge blast."
10033010-151 = "That's so smart, Pina! You should take a gold star because of how right you are!"
10033010-152 = "Thank you to the moon and back, Kaede!"
10033010-153 = "I'm afraid I have to burst your bubble... We'll be the ones hosting the field trip, not participating this time around."
10033010-154 = "You're totally right too, Umika! Then let's get to it! Um.... Where do we start? Do you know?"
10033010-155 = "I unequivocally do not!"
10033010-159 = "(More and more, I'm realizing we took on too big of a project... We're not equipped for it.)"
10033010-160 = "Are you unwell, Umika? You're losing color in your skin by the second!"
10033010-161 = "...I'm just concerned that this isn't going to play out the way you envision."
10033010-162 = "Huh? Why wouldn't it?"
10033010-163 = "We simply don't have the experience for it. Shizuko is normally the one spearheading our projects."
10033010-164 = "And this event is on a scale we've never dealt with previously. It becomes a whole other beast when different academies are involved."
10033010-165 = "That's..."
10033010-167 = "I'm...a little afraid of being the reason this fails. D-Don't you feel that way at all, Pina?"
10033010-168 = "From this perspective you've presented, I'm also starting to—"
10033010-170 = "Wah! No, no, no! What am I hearing right now?!"
10033010-171 = "Kaede?!"
10033010-172 = "These are the times you need to rise up!"
10033010-174 = "A proper lady looks fear straight in the eye and says, \"Not today!\" Otherwise no one would ever get anything done!"
10033010-176 = "A gold star for Kaede! I've seen this lesson many times in my vigilante movies: you need to take fate by the horns and ride it into the sunset!"
10033010-177 = "That's not exactly the... Well, anyway, where would we even begin?"
10033010-178 = "That...! Um, you see...!"
10033010-179 = "We can...brainstorm together?"
10033010-180 = "..."
10033010-181 = "..."
10033010-182 = "This is totally out of my wheelhouse!"
10033010-183 = "I wish President Shizuko were here right now!"
10033010-184 = "We might...fail... I'm sorry, Boss."
10033010-185 = "*yawn*...Which is why I reached out to Sensei."
10033010-187 = "Tsubaki?!"
10033010-188 = "President Tsubaki?!"
10033010-190 = "By reached out, what do you mean?! B-But, more mystifyingly, when did you get here? And how did you know what we were talking about?!"
10033010-191 = "I...dreamed about it...during sleep training. Zzz...."
10033010-193 = "Amazing! As expected of Tsubaki!"
10033010-195 = "H-How...?"
10033010-196 = "Now, don't worry... I'm sure Sensei will help..."
10033010-197 = "*yawn*...Okay. Good night."
10033010-198 = "J-Just a moment please! What exactly did you tell Sensei?!"
10033010-200 = "Zzz..."
10033010-202 = "Her ability to fall asleep in an instant is astounding!"
10033010-203 = "Is this the part where she doesn't wake up until something big happens, more specifically, until Sensei gets here?!"
10033010-204 = "Do we just wait for Sensei then? Is that okay?"
10033010-205 = "Oh, oh! I know. I have an idea."
10033010-207 = "Have you come up with the solution to all our problems, Kaede?"
10033010-208 = "Kaede! Perfect, adorable, Kaede!"
10033010-213 = "Would you...like to play Mushiqueen until Sensei gets here?"
10033010-214 = "Kaede...?!"
10033010-219 = "[ns1] \"I came as soon as I got the call.\"\n[ns2] \"You needed help! Help is here!\""
10033010-222 = "Thank goodness, Sensei! We really need you!"
10033010-223 = "I'm really, terribly sorry to make you come all this way."
10033010-224 = "[s] \"No, no. A field trip with Gehenna is...!\""
10033010-242 = "S-Sensei? Are you injured?!"
10033010-243 = "Oh no, oh no. Sensei died?!"
10033010-244 = "All because we asked for help! It's our fault!"
10033010-245 = "[s3] \"No, no. YOU students aren't the problem.\"\n[s4] \"We're going to get through this, one way or another!\""
10033010-248 = "How adult-like! They rose like a phoenix from the ashes!"
10033010-249 = "[ns] \"We'll take it one step at a time. Let's start with something easy.\""
10033010-250 = "But what would that be?"
10033010-254 = "Perhaps...administrative work? That's normally my role whenever the boss is here..."
10033010-255 = "How wise, Sensei. I'll begin by making a list of all the paperwork we'll need!"
10033010-256 = "Let me see... budget planning, business proposals, itineraries, meal plans, non-compete agreements... Oh, and liability waivers!"
10033010-257 = "That's a good place to start! I'll work on getting the Yin-Yang Club's business rights transferred to the Festival Operations Department as well. "
10033010-258 = "Yes! At least we're making movement somewhere."
10033010-259 = "How can I help...? Hm... Ah! I'll inform the Shopping Complex that the Gehenna Academy is coming on a field trip, and help them set up promotions and prepare!"
10033010-260 = "Sensei, Sensei, me next! What should Tsubaki and I do? Wait, lemme think real hard... The Inner Discipline Club is in charge of routine patrols...so we know Hyakkiyako really well..."
10033010-261 = "...An itinerary! You're right, Sensei! We can come up with the landmarks and cool stuff the Gehenna students can visit while they're here. "
10033010-263 = "Mission received! Tsubaki, wake up, wake up! It's our time to shine."
10033010-264 = "*yawn* But my sleep training..."
10033010-265 = "There's no time for training, Tsubaki! Open your eyes and look! Sensei's here, so super fun, amazing things are probably gonna happen!"
10033010-267 = "Everyone..."
10033010-268 = "[ns5] \"It's all about baby steps.\"\n[ns6] \"Just do what you know how to do.\""
10033010-271 = "You put together a plan, just like that, Sensei! You're very adaptable, aren't you?"
10033010-272 = "...It comes with the territory with your work at Schale? There seems to be a lot to unpack there..."
10033010-273 = "..."
10033010-274 = "Everyone is right. We can't be paralyzed just because the boss isn't here. We have our own agency!"
10033010-275 = "If I didn't do anything, after all, that would be an even greater stain on the Festival Operations Department's reputation. We must at least try."
10033010-276 = "Yay! I like seeing Umika smiling!"
10033010-277 = "We just have to put in our full effort!"
10033010-279 = "Everyone... Sensei..."
10033010-284 = "You've all convinced me."
10033010-285 = "It's still a little terrifying to strike out on our own like this, but we just have to do what we can! Not putting forth our best effort would be the worst thing we could do."
10033010-286 = "I'll put in every ounce of effort within me, so it won't even feel like the boss isn't here."
10033010-287 = "And we'll make this Gehenna field trip project...the best festival in the history of Hyakkiyako!"
10033010-292 = "(I don't want to burst anyone's bubble...)"
10033010-294 = "(...because Umika is all hyped up now...)"
10033010-296 = "[ns] \"(But is a field trip...a festival?)\""
10033010-297 = "Zzz."

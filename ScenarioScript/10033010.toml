[translation]
10033010-1 = "ตอนที่ 1;ความถูกต้อง ความยุติธรรม และความสนุก"
10033010-4 = "......"
10033010-5 = "......"
10033010-6 = "เดี๋ยวก่อนค่ะ คุณนิยะ ที่คุณพูดเมื่อกี้ หมายความว่า..."
10033010-12 = "ค่ะ~ ได้ยินไม่ผิดหรอกค่ะ ฉันติดต่อมาเพื่อแจ้งข่าวที่น่าเป็นเกียรติเกี่ยวกับ 'โปรเจกต์ทัศนศึกษาเฮียกคิยาโค' ของสถาบันเกเฮนน่าในครั้งนี้"
10033010-13 = "จากการพิจารณาด้วยวิธีการที่ถูกต้อง ยุติธรรม และสนุกสนานแล้ว..."
10033010-14 = "ชมรมจัดงานเทศกาลได้รับคัดเลือกให้เป็นผู้รับผิดชอบค่ะ~ ขอแสดงความยินดีด้วยนะคะ~ อะฮะฮ่ะ~"
10033010-16 = "ฉันไม่เคยได้ยินข่าวนี้มาก่อนเลยค่ะ ว่าแต่... ใช้วิธีการที่ถูกต้องและยุติธรรมงั้นเหรอคะ มันคือวิธีอะไรกัน...?"
10033010-17 = "รูเล็ตต์ไงล่ะ"
10033010-18 = "คะ... คะ?! รูเล็ตต์เหรอคะ?! ชะ... ใช่รูเล็ตต์ที่พวกฉันรู้จักหรือเปล่าคะ? ที่มันหมุนๆ ใช่มั้ย?!"
10033010-20 = "ต้องบอกว่าฉันได้ความช่วยเหลือจากชิเซะในการทำรูเล็ตต์ขึ้นมาด้วยค่ะ~"
10033010-21 = "แต่ตอนหมุน หัวหน้านิยะเป็นคนหมุนนะ..."
10033010-30 = "อุมิกะ?! อย่าเพิ่งเป็นลมไปในตอนนี้สิคะ!"
10033010-34 = "ตอนนี้ท่านประธาน... เอ่อ... หัวหน้าชิซุโกะก็ไม่อยู่ด้วย ทำไมถึงได้มางานเข้าตอนนี้ด้วยนะ...!"
10033010-35 = "แต่ว่า... ตอนนี้หัวหน้าชิซุโกะไปดูงานเทศกาลทรีนิตี้อยู่... อ่า..."
10033010-37 = "แล้วไงล่ะ~ เวลาต้องจัดงานที่มีจำนวนคนมากๆ ปกติชมรมจัดงานเทศกาลก็เป็นเจ้าภาพจัดงานบ่อย#nที่สุดอยู่แล้วไม่ใช่เหรอคะ~?"
10033010-38 = "ดังนั้นการคัดเลือกชมรมที่เหมาะสมของฉันก็ถือว่าสมเหตุสมผลอยู่ไม่น้อยนะคะ~"
10033010-39 = "ถึงจะใช้รูเล็ตต์ก็เถอะ"
10033010-40 = "ถ้าอย่างนั้นก็ขอฝากด้วยนะคะ~ ชมรมจัดงานเทศกาลทุกคน~"
10033010-41 = "ถึงตัวฉันจะมาช่วยงานไม่ได้ แต่ขอให้คิดว่ามีกำลังใจจากฉันอยู่กับทุกคนเสมอนะคะ~ อะฮะฮะฮ่า~"
10033010-46 = "ดะ... เดี๋ยวก่อนสิคะ! คุณนิยะ! คุณนิยะ?!"
10033010-47 = "วางสายไปแล้วค่ะ... ทำยังไงกันดีคะ อุมิกะ?"
10033010-48 = "เดี๋ยวก่อนนะคะ... ขอฉันหายใจและตั้งสติก่อนค่ะ"
10033010-49 = "ฮู่ว... ฮ่า... ฮู่ววว... ฮ่าาา..."
10033010-53 = "เอายังไงดีล่ะคะ พีน่า? ต่อให้หายใจเข้าลึกๆ หายใจออกยาวๆ แล้วก็ยังคิดไม่ออกเลยค่ะ..."
10033010-54 = "จะรับไว้ไม่ได้นะคะ อุมิกะ! งานนี้เราต้องปฏิเสธเท่านั้นค่ะ!"
10033010-58 = "อุมิกะ...?"
10033010-59 = "......"
10033010-60 = "ไม่ค่ะ ไม่ได้หรอกค่ะ พีน่า"
10033010-61 = "งานนี้น่ะ... พวกเราต้องทำให้ได้ค่ะ"
10033010-62 = "ซีเรียสลี่?!"
10033010-63 = "ถึงตอนนี้ท่านประธานจะไม่อยู่... แต่เราก็จะทำให้ชมรมของเราเสียเกียรติไม่ได้ค่ะ!"
10033010-64 = "แม้ว่าหัวหน้าจะไม่อยู่งั้นเหรอคะ? เราจะทำได้เหรอคะ?"
10033010-65 = "......"
10033010-66 = "ฮือ~ ท่านประธาน~ ฉันรู้ว่าคงเป็นการขอที่มากไป แต่ช่วยกลับมาตอนนี้ได้ไหมคะ~"
10033010-69 = "เราจะจัดงานเทศกาลกันค่ะ! เทศกาลต้อนรับเมื่อนักเรียนเกเฮนน่ามาถึงเฮียกคิยาโค!"
10033010-70 = "เทศกาลเข้าพักแรมเมื่อมาถึงที่พัก! ต่อด้วยเทศกาลโต้รุ่ง! เทศกาลชุดนอน! เทศกาล! เทศกาล! เทศกาล!"
10033010-71 = "อุมิกะ! ฉันเองก็ชอบงานเทศกาลอยู่หรอกนะคะ แต่ด้วยเรื่องของเวลาและงบประมาณแล้ว จัดเทศกาลเยอะแบบนั้นจะไม่เป็นไรเหรอคะ?!"
10033010-72 = "ถ้าหัวหน้าชิซุโกะกลับมาจากการศึกษาดูงานแล้วได้เห็นตัวเลขในบัญชีละก็ หัวหน้าต้องช็อกแน่ๆ ค่ะ!"
10033010-73 = "อึก... อาจจะจริงก็ได้... งั้นเราจะมีวิธีอื่นที่ดีกว่านี้ไหมนะ...!"
10033010-74 = "ฉันว่าสิ่งที่เราต้องทำก็คือ! เปิดการทัศนศึกษาด้วยจิตวิญญาณของอัศวิน! แล้วจัดหมู่บ้านภาพยนตร์ เพื่อเปิดประสบการณ์อัศวิน!"
10033010-75 = "กิจกรรมแห่งความซื่อสัตย์และมิตรภาพ! กิจกรรมแห่งการอดกลั้น การเตรียมพร้อม และการกล้าตัดสินใจท้ายที่สุด! กิจกรรม! กิจกรรม! และกิจกรรมค่ะ!"
10033010-76 = "แบบนั้นน่าจะเหมือนเที่ยวสวนสนุกอัศวินมากกว่าทัศนศึกษานะคะ! ไอเดียของพีน่าก็ไม่น่าจะเป็นไปได้#nเหมือนกันไหมคะ?"
10033010-77 = "ฮะ... ฮือ! ฉันคิดไอเดียอื่นไม่ออกแล้วค่ะ! อุมิกะ!"
10033010-78 = "อึก... มีวิธีอะไรที่หลักแหลมๆ บ้างไหมนะ... ถ้าเราไม่ได้ทางออกดีๆ แล้วละก็ การทัศนศึกษาครั้งนี้คง#nเป็นสถานการณ์เลวร้าย...!"
10033010-79 = "ยิ่งเวลาแบบนี้ก็ต้อง...!"
10033010-80 = "คิดอะไรดีๆ ได้เหรอคะพีน่า?"
10033010-82 = "ต้องขอความช่วยเหลือจากสหายค่ะ! ฉันพอมีสหายดูเอลลิสต์ที่จะช่วยพวกเราได้ค่ะ!"
10033010-88 = "ดะ... ดูเอลลิสต์เหรอคะ?! เดี๋ยวสิคะ พีน่า! ฉันไปด้วยค่ะ! รอด้วย~"
10033010-95 = "ที่นี่คือ... ชมรมฝึกฝนนี่คะ?"
10033010-96 = "ใช่แล้วค่ะ อุมิกะ! เรากับชมรมฝึกฝนก็ร่วมงานกันบ่อยๆ อยู่แล้ว ฉันมั่นใจว่าในสถานการณ์แบบนี้ ชมรมฝึกฝนจะต้องยื่นมือเข้ามาช่วยแน่นอนค่ะ!"
10033010-97 = "เดี๋ยวก่อนค่ะ! จริงอยู่ที่ตอนนี้ชมรมฝึกฝนกับเรามีความร่วมมือที่ดีต่อกันอยู่..."
10033010-98 = "(แต่ตอนนี้ท่านประธานไม่อยู่ เราจะจัดการเรื่องใหญ่โตแบบนี้ได้เลยเหรอคะ...?)"
10033010-99 = "ระ... เรากลับไปที่ห้องชมรมแล้ววางแผนให้รอบคอบกันดีไหมคะ... เพราะถ้าไม่อย่างนั้นละก็..."
10033010-100 = "อุมิกะ? กังวลอะไรเหรอคะ?"
10033010-105 = "เอ๋? ชมรมเทศกาลนี่นา? มาทำอะไรที่นี่เหรอ?"
10033010-106 = "ออกมาหากันแบบนี้เลยเหรอคะ!?!?"
10033010-107 = "ออกมาหาแบบนี้สิคะยิ่งดี"
10033010-108 = "เอ๋? ทั้งสองคนเป็นอะไรไปเหรอ?!"
10033010-112 = "คาเอเดะ ฉันมาหาเพราะมีเรื่องอยากให้ช่วย... ในฐานะดูเอลลิสต์ค่ะ!"
10033010-114 = "อะ... เอ่อ... เข้าประเด็นแบบนั้นโดยไม่อธิบายอะไรก่อนเลยเหรอ..."
10033010-115 = "หืม? เอาสิ! เรื่องรายละเอียดเดี๋ยวเอาไว้ไปคุยกันในห้องแล้วกัน!"
10033010-116 = "ทำไมตกลงง่ายจังเลยคะ?!"
10033010-122 = "อืมๆ อื้ม... เป็นแบบนี้สินะ เข้าใจแล้ว! นักเรียนจากเกเฮนน่าจะมาเที่ยวเฮียกคิยาโคสินะ!"
10033010-123 = "ถ้าจะสรุปสั้นๆ ก็เป็นอย่างที่ว่าเลยค่ะ คาเอเดะ!"
10033010-124 = "ตะ... แต่ฉันว่านี่ไม่ใช่ปัญหาที่จะพูดคุยได้ง่ายขนาดนั้นนะคะ?!"
10033010-125 = "ไม่เป็นไรหรอกน่า! ต่อให้คิดเยอะ ซับซ้อนไป มันก็จะยิ่งมองไม่เห็นทางนะ"
10033010-126 = "รุ่นพี่สึบากิเคยบอกไว้ว่าถ้าเจอเรื่องแบบนั้น ก็ให้นอนพักก่อนแล้วค่อยคิดก็ได้"
10033010-127 = "จะว่าไป รุ่นพี่สึบากิกับรุ่นพี่มิโมริ... อยู่ที่ไหนกันเหรอ...?"
10033010-129 = "หะ... หืม? เรื่องนั้นน่ะ คือว่า..."
10033010-130 = "เกิดเรื่องอะไรกับทั้งสองคนหรือเปล่าคะคาเอเดะ? จะว่าไป ตอนนี้เหมือนจะมีแค่คาเอเดะคนเดียวนะคะ ที่อยู่ในชมรมฝึกฝน!"
10033010-131 = "อ่า... คือว่า... รุ่นพี่มิโมริ... ออกเดินทางไปฝึกถือสันโดษตั้งแต่สัปดาห์ที่แล้วน่ะ"
10033010-135 = "ออกไปฝึก?"
10033010-136 = "ถือสันโดษ?"
10033010-137 = "อื้อ! แบบว่า... เป็นการเดินทางท่องเที่ยวเพื่อเผชิญหน้ากับตัวเอง เพื่อการเป็นกุลสตรีที่#nเพียบพร้อมกว่าเดิมน่ะ!"
10033010-138 = "งะ... งั้นเหรอคะ...?"
10033010-139 = "อืม... ตอนที่รุ่นพี่มิโมริบอกพวกเรา ตอนนั้นไม่มีใครเข้าใจความหมายที่แท้จริงหรอก..."
10033010-140 = "แต่ว่าฉันกับรุ่นพี่สึบากิก็ตัดสินใจที่จะเคารพในสิ่งที่รุ่นพี่มิโมริต้องการ! อื้ม!"
10033010-142 = "เป็นแบบนี้สินะ! เพราะเคารพในความตั้งใจของสหาย ก็เลยไม่ทักท้วงและซักไซ้ในทุกเรื่อง... นี่สินะคะที่เรียกว่าความจริงใจ!"
10033010-144 = "อ่า... งั้นเหรอ? ถึงจะไม่ค่อยเข้าใจเท่าไร แต่เอาแบบนั้นแล้วกัน! แหะๆๆ..."
10033010-145 = "อะ... เอาเป็นว่ารุ่นพี่มิโมริมีธุระก็เลยไม่ได้อยู่ด้วย... แล้วรุ่นพี่สึบากิล่ะคะ?"
10033010-146 = "รุ่นพี่สึบากิเหรอ? ก็ไปฝึกนอนกลางวันตามเคยน่ะสิ!"
10033010-147 = "งะ... งั้นเหรอ? ถึงจะมีสถานการณ์แบบนี้ แต่รุ่นพี่สึบากิก็ยังฝึกฝนได้เหมือนปกติสินะคะเนี่ย ถึงจะถ่ายทอดเป็นคำพูดได้ยาก แต่ฟังแล้วก็ดูวางใจได้ดีนะคะ..."
10033010-148 = "ที่พูดถึงเรื่องทัศนศึกษาเมื่อกี้น่ะ ฉันเองก็อยากไปทัศนศึกษาบ้างเหมือนกันแฮะ!"
10033010-149 = "เอ๋? ว่าแต่คนที่ไปทัศนศึกษาเขาทำอะไรกันบ้างนะ?"
10033010-150 = "พีน่าก็ไม่รู้เหมือนกันค่ะ! แต่ก็น่าจะเป็นอะไรคล้ายๆ การท่องเที่ยวที่ตื่นเต้นและสนุกนะคะ!"
10033010-151 = "เนอะ? ฉันก็คิดเหมือนกัน! พีน่าเข้าใจถูกต้องเลย! ต้องให้สติกเกอร์ยกนิ้วติดดาวซะแล้ว!"
10033010-152 = "ขอบคุณค่ะคาเอเดะ!"
10033010-153 = "ทั้งสองคน... เราไม่ได้จะไปทัศนศึกษากันนะคะ เราต้องต้อนรับและเป็นไกด์ให้คนที่จะมาต่างหากค่ะ"
10033010-154 = "ใช่ๆ! เหมือนจะเคยได้ยินมาเลย! อ่า... แล้วเราต้องทำอะไรก่อนเหรอ? มีใครรู้บ้างมั้ย?"
10033010-155 = "พีน่าไม่รู้ค่ะ!"
10033010-159 = "(ลำพังพวกเรา... จะทำงานนี้ไหวไหมเนี่ย...?)"
10033010-160 = "อุมิกะ? กังวลอะไรเหรอคะ? สีหน้าดูไม่ดีเอามากๆ เลยค่ะ"
10033010-161 = "พวกเราจะ... ทำงานนี้กันได้จริงๆ เหรอคะ?"
10033010-162 = "คะ? พูดแบบนั้นหมายความว่ายังไงคะ...?"
10033010-163 = "ก็ที่ผ่านมาเราเอาแต่รับคำสั่งและช่วยงานของท่านประธาน... พวกเราไม่เคยวางแผนแล้วทำอะไรด้วย#nตัวเองเลยนี่คะ..."
10033010-164 = "งานครั้งนี้เป็น... งานสเกลใหญ่ระหว่างโรงเรียนเลยนะคะ... เราจะทำมันให้สำเร็จ และออกมาราบรื่นดีได้เหรอคะ...?"
10033010-165 = "เรื่องนั้น..."
10033010-167 = "ฉัน... ไม่มั่นใจเลยค่ะ แล้วพีน่าล่ะคะ?"
10033010-168 = "ถ้าคิดว่ามันเป็นเรื่องใหญ่แบบนั้น ฉันเองก็..."
10033010-170 = "เดี๋ยวเหอะ! อะไรของทั้งสองคนน่ะ!"
10033010-171 = "คาเอเดะ?!"
10033010-172 = "ยิ่งเป็นแบบนี้เรายิ่งต้องลงมือทำมากกว่าจะมาลังเลอยู่สิ!"
10033010-174 = "ถ้าเอาแต่กังวลอยู่แบบนี้ก็ไม่มีอะไรคลี่คลายหรอกนะ! เลดี้ที่เพียบพร้อมต้องลงมือทำมากกว่ารีรอนะ!"
10033010-176 = "ถ้าต้องการอะไรให้คว้ามาด้วยมือของตัวเอง! อย่างนี้สินะคะ คาเอเดะ! ฉันได้ยินคำสอนนี้บ่อยๆ ในหนังต่อสู้ค่ะ!"
10033010-177 = "ว่าแต่... แล้วพวกเราต้องเริ่มจากอะไรเหรอคะ...?"
10033010-178 = "หะ... หืม? อ่า... ระ... เรื่องนั้น..."
10033010-179 = "เรามาช่วยกันคิด... ตั้งแต่ตอนนี้มั้ย...?"
10033010-180 = "......"
10033010-181 = "......"
10033010-182 = "คิดไม่ออกเลย!!!"
10033010-183 = "อย่างน้อยถ้ามี... หัวหน้าชิซุโกะอยู่กับเราละก็!"
10033010-184 = "ขอโทษนะคะท่านประธาน... ฉันน่ะ... พวกฉัน..."

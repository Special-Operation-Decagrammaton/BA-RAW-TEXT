10033010-256 = "ที่พอจะนึกได้ตอนนี้ก็... ใบโครงการพื้นฐาน ใบคาดการณ์งบประมาณ ใบเสนอราคา ใบคำร้องเสนอโครงการ กำหนดการ ตารางบุคลากร รายการอาหาร ตารางวินิจฉัยทั่วไป ตารางสถานะอาคาร และสิ่งอำนวยความสะดวก สัญญาแสดงจำนวนผู้เข้าร่วม และความประสงค์ในการร่วมมือ..."
10033010-257 = "อ่า ให้บันทึกเอกสารพวกนั้นไว้ก่อน แล้วเริ่มจากขอสิทธิ์ความร่วมมือที่ตอนนี้อยู่กับชมรมหยินหยาง มายังชมรมจัดงานเทศกาลก่อนเหรอคะ?"

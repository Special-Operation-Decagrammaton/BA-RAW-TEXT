[translation]
10033010-1 = "第1話;公正、公平、有趣"
10033010-4 = "……"
10033010-5 = "……"
10033010-6 = "請等一下，仁耶大人。#n您的意思是……？"
10033010-12 = "嗯～就跟你剛才聽到的一樣。#n負責這次格黑娜學園．百鬼夜行修學旅行企劃的社團……"
10033010-13 = "藉由公平公正而有趣的方式……"
10033010-14 = "選中了節慶營運管理部！#n我是來傳達這個光榮的消息的～喵哈哈～"
10033010-16 = "我還是第一次聽說～！不過公平公正而有趣的方式究竟是……？"
10033010-17 = "是轉盤哦～"
10033010-18 = "什，什麼！？轉盤！？#n是我們知道的那個轉盤嗎？會轉圈的那個！？"
10033010-20 = "沒錯～順帶一提，知世也有幫忙製作轉盤哦～"
10033010-21 = "不過最後轉轉盤的是仁耶部長～"
10033010-30 = "海花！？這種時候不能昏過去呀！"
10033010-34 = "怎，怎麼會……#n居然偏偏在社長……靜子部長不在的時候發生這種事……"
10033010-35 = "靜子部長他……現在正為了研究三一的慶典在外出差……唔唔……！"
10033010-37 = "咦～不過經常舉辦這種大型活動的社團當中，不就有你們節慶營運管理部嗎～？"
10033010-38 = "這麼看來，我的選擇似乎相當合理呢～？"
10033010-39 = "雖然是用轉盤選的～"
10033010-40 = "總之事情就是這樣～這個任務就交給節慶營運管理部的各位囉～"
10033010-41 = "雖然無法實際一同參與，希望各位能感受到我的心一直與各位同在～喵哈哈哈～"
10033010-46 = "請，請等一下！仁耶大人，仁耶大人！？"
10033010-47 = "電話掛斷了……怎麼辦，海花？"
10033010-48 = "等等……總之先做個深呼吸。"
10033010-49 = "呼，哈，呼，哈……"
10033010-53 = "……該怎麼辦才好，菲娜？#n深呼吸之後還是想不出來……"
10033010-54 = "沒辦法了，海花！#n我們只能拒絕這個提案了吧！？"
10033010-58 = "……海花？"
10033010-59 = "……"
10033010-60 = "不，這樣不行，菲娜。"
10033010-61 = "這個任務……我們無論如何都得完成。"
10033010-62 = "什麼！？"
10033010-63 = "社長不在位置上的現在……我們可不能讓他的名字蒙羞！"
10033010-64 = "可是就像海花說的一樣，少了部長的我們……真的有可能辦得到嗎？"
10033010-65 = "……"
10033010-66 = "嗚啊啊～社長～#n雖然知道不可能，但還是拜託你趕快回來吧～"
10033010-69 = "舉辦慶典吧！#n格黑娜的學生抵達後，首先是歡迎慶典！"
10033010-70 = "抵達旅館後還有住宿慶典！再來是徹夜慶典！睡衣慶典！#n慶典！慶典！慶典！"
10033010-71 = "海花！雖然我也很喜歡慶典，但是時間或預算方面會不會有困難！？"
10033010-72 = "結束慶典調查後回來的靜子部長，要是看到帳戶裡剩下的預算，一定會嚇一大跳的！"
10033010-73 = "嗚……確實有可能。#n也許還有其他更好的方法……！"
10033010-74 = "不如這麼辦吧！從任俠的主題出發，在電影村進行任俠體驗！"
10033010-75 = "體驗義氣與友情！體驗充滿悲壯感的覺悟及決斷！#n體驗！體驗！體驗！就是這樣！"
10033010-76 = "這樣就不是修學旅行，而是任俠主題樂園了吧！？#n不過……根據情況，或許也不是不行？"
10033010-77 = "唔，唔啊！我也想不出好主意！海花！"
10033010-78 = "嗚嗚……有沒有什麼好方法呢……#n不趕快找到突破口的話，這次的修學旅行就要開天窗了……！"
10033010-79 = "這種時候果然就該……！"
10033010-80 = "你還有什麼好主意嗎，菲娜？"
10033010-82 = "向夥伴請求幫助吧！#n正好有位戰士夥伴可以幫助我們！"
10033010-88 = "戰士……是嗎！？#n等等，菲娜！別丟下我啊～！"
10033010-95 = "這裡是……修行部？"
10033010-96 = "沒錯，海花！#n我們平時就經常跟修行部合作，這種時候他們肯定會願意伸出援手的！"
10033010-97 = "先等一下！雖然我們的確跟修行部有合作關係，不過……！"
10033010-98 = "（社長不在的時候，我們擅自做這種事……沒問題嗎？）"
10033010-99 = "還，還是先回部室，謹慎制定更周詳的計劃……比較好吧……"
10033010-100 = "海花？怎麼了嗎？"
10033010-105 = "嗯？這不是節慶營運管理部嗎？來這裡有什麼事？"
10033010-106 = "突然就有人出來了！？！？"
10033010-107 = "有人出來不是好事嗎？"
10033010-108 = "嗯？你們兩個怎麼了！？"
10033010-112 = "楓，作為戰士……我有一事相求！"
10033010-114 = "那，那個，沒有仔細說明，一開口就說這種話有點……"
10033010-115 = "嗯？可以呀！詳細情況到裡面再說吧！"
10033010-116 = "這樣也行！？"
10033010-122 = "嗯嗯，原來如此，我明白了！#n總之就是格黑娜的學生要來百鬼夜行玩嘛！"
10033010-123 = "簡單來說就是那樣，楓！"
10033010-124 = "我，我覺得這好像不是那麼單純的問題耶！？"
10033010-125 = "沒關係沒關係！想得太複雜反而會看不到方向！"
10033010-126 = "椿前輩之前有說過，這種時候就該睡一覺再思考！"
10033010-127 = "這麼說來，那位椿前輩……還有三森前輩在哪裡呢……？"
10033010-129 = "啊，那個……"
10033010-130 = "那兩個人發生什麼事了嗎，楓？#n這麼一看，好像只有楓一個人在修行部呢！"
10033010-131 = "啊……先說三森前輩，他上週就去修行修練了。"
10033010-135 = "修行？"
10033010-136 = "修練？"
10033010-137 = "嗯！就是……為了成為優秀的大和撫子，學習面對自己的旅行！大概是這樣！"
10033010-138 = "原，原來如此……？"
10033010-139 = "嗯……雖然當三森前輩這麼說的時候，就意味著沒有人能完全理解他的意思……"
10033010-140 = "但是椿前輩和我都決定尊重三森前輩的想法！嗯！"
10033010-142 = "原來如此啊！#n尊重夥伴的意願，不過問多餘的事……這就是所謂的義氣──沒錯吧！"
10033010-144 = "可，可能吧？雖然不是很懂，不過就當作是那樣吧！#n耶嘿嘿……"
10033010-145 = "三，三森前輩是那樣的話……椿前輩呢？"
10033010-146 = "椿前輩？#n啊～跟平常一樣在進行午睡修行！"
10033010-147 = "這，這樣啊。就算是現在這種情況，椿前輩也還是一如既往在修行。#n雖然有點難形容，總覺得有股安心的感覺……"
10033010-148 = "不過修學旅行啊～真好～#n一定會很開心吧～我也想去修學旅行！"
10033010-149 = "咦？話說修學旅行的時候都在做什麼呢？"
10033010-150 = "菲娜也不太清楚！#n不過畢竟是旅行，應該是開心又愉快的事才對！"
10033010-151 = "你也這麼覺得嗎？#n菲娜果然很懂！給你一張花丸貼紙！"
10033010-152 = "謝謝你，楓！"
10033010-153 = "兩位……我們要做的不是參加修學旅行，而是接待來旅行的人哦……？"
10033010-154 = "啊！說的也是！#n不過……該從哪開始做起呢？有人知道嗎？"
10033010-155 = "菲娜不知道！"
10033010-159 = "（……真的沒問題嗎？只靠我們，真的能把這件事順利辦好嗎……？）"
10033010-160 = "海花？怎麼了？你的臉色看起來不是很好。"
10033010-161 = "這份工作……真的沒問題嗎？"
10033010-162 = "咦？那是什麼意思……？"
10033010-163 = "我們平時本來就只是在幫社長處理工作……#n從來沒有直接計劃或舉辦活動的經驗……"
10033010-164 = "規模龐大的這種……學園與學園之間的超大型活動……#n我們真的有辦法平安、順利地舉辦嗎……？"
10033010-165 = "這……"
10033010-167 = "我……實在沒有自信。#n菲娜呢……？"
10033010-168 = "……如果你這麼想的話，那我也……"
10033010-170 = "啊啊啊！你們兩個振作一點！"
10033010-171 = "楓！？"
10033010-172 = "這種時候比起猶豫，更應該勇往直前！"
10033010-174 = "只是茫然地原地踏步是解決不了任何問題的！#n一名出色的淑女應該要主動尋找機會，而不是坐以待斃！"
10033010-176 = "說的有道理，楓！#n想要什麼就親自爭取──這是任俠電影裡經常出現的教誨！"
10033010-177 = "雖然是這麼說沒錯……不過……我們該從哪裡開始呢……？"
10033010-178 = "嗯？這，這個嘛……"
10033010-179 = "現在大家一起開始想……？"
10033010-180 = "……"
10033010-181 = "……"
10033010-182 = "果然還是不知道──！！！"
10033010-183 = "這種時候……要是靜子部長在就好了！"
10033010-184 = "對不起，社長……我……我們……"
10033010-185 = "呼啊啊……我聯絡老師了唷……"
10033010-187 = "前輩！？"
10033010-188 = "椿部長！？"
10033010-190 = "聯絡老師指的是……！？#n還有……是從什麼時候開始聽我們說話的……？"
10033010-191 = "嗯……因為我在午睡修行的時候做了類似的夢……呼嚕……"
10033010-193 = "真厲害！不愧是椿前輩！"
10033010-195 = "咦，咦咦……？"
10033010-196 = "別擔心……老師他一定會幫助我們的……"
10033010-197 = "呼啊……那我先回去睡了……"
10033010-198 = "請，請等一下！椿部長是怎麼跟老師說的……！"
10033010-200 = "呼嚕呼嚕……"
10033010-202 = "已經睡著了！"
10033010-203 = "這似乎是在重大事件發生之前……具體來說就是老師抵達之前都不會醒來的模式？"
10033010-204 = "怎麼辦……？#n就這樣等老師來真的沒問題嗎……"
10033010-205 = "在那之前！我有一個想法！"
10033010-207 = "你有什麼好主意嗎，楓？"
10033010-208 = "楓！"
10033010-213 = "那個……總之先來場甲蟲皇后吧……？"
10033010-214 = "楓～！"
10033010-219 = "[ns1]「聽到要我趕快到百鬼夜行來之後……」\n[ns2]「就以最快的速度趕來了……」"
10033010-222 = "嗚啊啊～老師～我們等你好久了～"
10033010-223 = "真，真是不好意思，老師……#n害你特地為我們跑一趟……！"
10033010-224 = "[s]「這倒沒關係。不過格黑娜學生的修學旅行啊……」"
10033010-242 = "老，老師？你沒事吧！？"
10033010-243 = "哇！老師連站都站不穩了！"
10033010-244 = "果，果然是我們造成的嗎？是嗎？"
10033010-245 = "[s3]「不是的……我沒事……學生們沒有錯……」\n[s4]「比這更困難的事我都做過了，好……！」"
10033010-248 = "一陣自言自語之後就重新站了起來……！不愧是大人啊，老師！"
10033010-249 = "[ns]「首先，從最熟悉的事開始慢慢做起吧。」"
10033010-250 = "最熟悉的事……？"
10033010-254 = "行政處理工作？#n我確實很常幫社長分擔……"
10033010-255 = "我明白了，老師。#n是要先從能想到的文件列表開始整理吧？"
10033010-256 = "我現在馬上想到的有……基本計劃書、費用估算書、報價單、業務提案請求書、#n時間表與佈置圖、餐點目錄、綜合診斷表、設施現況表、規格合約或競業調款……"
10033010-257 = "啊，要先把這些記錄下來，接著……#n再從「把目前委託給陰陽部的業務協作權限，移交給節慶營運管理部」做起對吧？"
10033010-258 = "嗯！這樣感覺比較有頭緒了……！"
10033010-259 = "那我就……負責宣傳工作！#n得把格黑娜的學生要來這裡修學旅行的消息，告訴商店街的大家才行！"
10033010-260 = "老師老師！那我呢？還有椿前輩呢？#n嗯？修行部平時經常巡邏，所以……"
10033010-261 = "利用那些經驗，重新整理一下百鬼夜行的名勝，然後規劃修學旅行的路線？"
10033010-263 = "好，椿前輩！快起來！修行部該出動囉～！"
10033010-264 = "呼哈……午睡修行還沒結束……"
10033010-265 = "怎麼這麼說呢，椿前輩！老師也已經來了！#n說不定接下來～會發生很驚人的事哦！"
10033010-267 = "各位……"
10033010-268 = "[ns5]「不知道該從何做起的時候……」\n[ns6]「先從手邊的事開始處理也是一種方法。」"
10033010-271 = "好厲害……老師好像很習慣這種情況呢……"
10033010-272 = "咦？在夏萊工作，就算不願意也只能習慣……？#n怎麼好像感受到了某種深層的怨念……是我的錯覺嗎？"
10033010-273 = "……"
10033010-274 = "嗯……老師說的對。#n因為社長不在就垂頭喪氣是不行的。"
10033010-275 = "如果就這樣什麼也不做，反而才會真正損害社長……#n以及我們節慶營運管理部的名譽……！"
10033010-276 = "海花似乎打起精神了！"
10033010-277 = "就是呀！暫時能放心了！"
10033010-279 = "各位……老師……"
10033010-284 = "我決定了……！"
10033010-285 = "雖然不知道會發生什麼事，而且社長也不在……#n但我們一定也能做些什麼，不能只是坐以待斃……！"
10033010-286 = "我一定要……在社長不在的期間，補上他的空缺……！"
10033010-287 = "讓這次的格黑娜修學旅行導覽企劃……成為最精彩的慶典！"
10033010-292 = "（海花他……雖然重新恢復了幹勁……）"
10033010-294 = "（這種話實在有點難以啟齒……）"
10033010-296 = "[ns]（修學旅行……能算是慶典嗎？）"
10033010-297 = "呼嚕呼嚕……"

10033010-259 = "ส่วนฉัน... งี้นี่เอง! เข้าใจแล้วค่ะ! ฉันต้องรับผิดชอบการประชาสัมพันธ์เรื่องที่นักเรียนจากเกเฮนน่าจะ#nมาทัศนศึกษาให้คนในย่านการค้ารับทราบสินะคะ!"
10033010-260 = "คุณครู คุณครู! แล้วฉันกับรุ่นพี่สึบากิล่ะ? หือ? ปกติแล้วชมรมฝึกฝนจะออกไปลาดตระเวนอยู่บ่อยๆ..."

[translation]
21060-1 = "ตอนที่ 6;วิธีการเรียนภาษา"
21060-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21060-3 = "จะยังไงก็เถอะ ฉันขอแนะนำตัวอีกครั้งนะ"
21060-4 = "ฉันคือยูสึ หัวหน้าชมรมพัฒนาเกม"
21060-5 = "ขอบใจที่มาชมรมเรานะอาริสึจัง"
21060-6 = "ต่อไปก็ฝากตัวด้วยนะ"
21060-7 = "ฝาก... ตัว...?"
21060-8 = "เข้าใจ"
21060-9 = "ยูสึเข้าร่วมเป็นสหายแล้วค่ะ ปาปัม ปาปัม ป๊าม!"
21060-10 = "ใช่ไหม?"
21060-11 = "เอ่อ... อืม... ก็... ทำนองนั้น"
21060-12 = "ดูท่าจะสนุกกับเกมของเรามากเลยนะ จะว่าไป การได้สหายคนใหม่ในเกมก็เป็นความสนุก#nอย่างหนึ่งใน RPG"
21060-13 = "ถ้าอยากเจอกับความสนุกในเกม RPG มากกว่านี้ล่ะก็..."
21060-14 = "ฉันจะแนะนำเกมให้นะ"
21060-15 = "เดี๋ยวสิ! ให้ฉันแนะนำก่อน!"
21060-16 = "ถ้าการพูดของอาริสึพัฒนาขึ้นเพราะเล่นเกมล่ะก็ แผนการของเราก็จะมีโอกาสสำเร็จมากขึ้น"
21060-17 = "งั้นต้องเล่น <มิธ ฮีโร่ส์> กับ <ไฟนอล แฟนตาเซีย> แล้วก็ <อายส์ อีเทอร์นอล>..."
21060-18 = "พูดอะไรน่ะ! อาริสึจังยังเป็นมือใหม่อยู่นะ! ต้องเล่น <เดอะเลเจนด์ออฟเซลนา: ลิงส์อะเวกเคนนิง>#nก่อนสิ!"
21060-19 = "ยอมให้ไม่ได้หรอก เกมต่อไปต้องเป็น <โรแมนซิ่ง ซากี้> สิ เล่นถึงแค่ภาค 2 ก็น่าจะพอนะ..."
21060-22 = "......??"
21060-23 = "......"
21060-25 = "คาดหวัง เริ่มเกมอีกครั้งค่ะ"
21060-27 = "(2 ชั่วโมงต่อมา...)"
21060-28 = "(กิ๊ก กิ๊ก กิ๊ก กิ๊ก...)"
21060-29 = "ว้าว อาริสึ! อ่านไวมากเลย เข้าใจเนื้อเรื่องโดยไม่ต้องหยุดอ่านนานๆ เลยเหรอ"
21060-30 = "อาริสึจัง ต่อไปลองเล่น <ออร์ค แบเทิล เลเจนด์> ดูสิ! แล้วจะได้เห็นความสนุกของเกมเทิร์นเบส!"
21060-31 = "(พยักหน้า)"
21060-32 = "...... (กิ๊ก กิ๊ก กิ๊ก กิ๊ก...) ......"
21060-34 = "(Zzz...)"
21060-35 = "(Zzz...) งืมๆ"
21060-36 = "...... (กิ๊ก กิ๊ก กิ๊ก กิ๊ก...) ......"
21060-38 = "...... (กิ๊ก กิ๊ก กิ๊ก กิ๊ก...) ......"
21060-39 = "เคลียร์..."
21060-41 = "...... (กิ๊ก กิ๊ก กิ๊ก กิ๊ก...) ......"
21060-42 = "เคลียร์..."
21060-44 = "จิ๊บ จิ๊บ..."
21060-45 = "อืม..."
21060-46 = "อ๊ะ! เช้าแล้วเหรอ? แย่ล่ะสิ! ต้องเตรียมตัวไปโรงเรียน...!"
21060-47 = "(พรึ่บ) ..."
21060-48 = "ลืมตาแล้วสินะ..."
21060-49 = "เธอโชคดีจังเลยนะ ได้สติหรือยัง?"
21060-50 = "หืม?!"
21060-51 = "อาริสึจัง! รู้วิธีพูดแบบปกติแล้วเหรอ?"
21060-52 = "ตามที่เจ้าว่าเลย เจ้าผู้สิ้นหวัง"
21060-53 = "ทะ... ทำไมกลับไปรู้สึกแปลกๆ เหมือนตอนแรกเลยล่ะ?!"
21060-54 = "งือ... ทุกคน... อรุณสวัสดิ์..."
21060-56 = "(แกร๊ก)"
21060-57 = "มอร์นิ่ง!"
21060-58 = "เอาล่ะ รับนี่ไปสิอาริสึ"
21060-62 = ".....?"
21060-63 = "อาริสึตรวจสอบ 'กระดาษที่ระบุตัวตนไม่ได้'"
21060-65 = "โอ้ว~ ใช้คำพูดได้สวยหรูเลยนะเนี่ย~ นี่คือ 'บัตรนักเรียน' ของเธอ"
21060-66 = "สวยหรู... จริงเหรอ? นั่นมันแทบจะเหมือนบทพูดในเกมเรโทรเลยนะ...!"
21060-67 = "บัตรนักเรียน...?"
21060-68 = "เธอต้องมีบัตรนักเรียน ถึงจะพิสูจน์ตัวเองได้ว่าเป็นนักเรียนของโรงเรียนนี้ ชมรมเวอริทัสช่วยแฮ็ก...#nฉันหมายถึง ช่วยลงทะเบียนเธอในระบบของโรงเรียนให้แล้ว ตอนนี้เธอเป็นสหายของพวกเราแล้ว!"
21060-69 = "สหาย? เข้าใจแล้วค่ะ"
21060-71 = "ปาปัม ปาปัม ป๊าม! อาริสึได้เข้ามาเป็นสหายแล้ว"
21060-73 = "จะ... จะไม่เป็นไรใช่ไหมน่ะ?"
21060-74 = "ไม่เป็นไรอยู่แล้ว! ทั้งชุดนักเรียน บัตรนักเรียน และลักษณะการพูด ทุกอย่างเรียบร้อยหมดแล้ว..."
21060-75 = "ต่อไปก็..."
21060-76 = "คงเป็นอาวุธ..."
21060-77 = "เอาล่ะ อาริสึ! ฉันจะแนะนำให้เอง"
21060-78 = "แนะนำ?"
21060-81 = "ในโรงเรียนมิลเลเนียมของเราน่ะ!"
21060-83 = "ตอนต่อไป;ดูใหญ่เกินกว่าจะเรียกว่าปืนนะ"

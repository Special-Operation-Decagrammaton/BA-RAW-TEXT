[translation]
21060-1 = "第6話;學習說話的方式"
21060-2 = "千年．遊戲開發部"
21060-3 = "總之，重新介紹一下。"
21060-4 = "我是遊戲開發部的部長柚子。"
21060-5 = "謝謝你願意來我們社團，愛麗絲醬。"
21060-6 = "之後請多指教囉。"
21060-7 = "請多，指教……？"
21060-8 = "……理解。"
21060-9 = "柚子成為夥伴了，乓啪喀乓──！"
21060-10 = "……這樣對嗎？"
21060-11 = "啊，嗯。差不多是那種感覺，吧。"
21060-12 = "呵呵，看你的樣子，應該是真的很享受我們的遊戲吧……#n增加新的同伴也是RPG的醍醐味之一呢。"
21060-13 = "啊，如果你覺得RPG很有趣的話……"
21060-14 = "我還有很多遊戲可以推薦給你喔。"
21060-15 = "先等一下！要先推薦遊戲給愛麗絲的是我！"
21060-16 = "只要玩越多優質的遊戲，說起話來就會越來越自然，也能提高我們計畫的成功率！"
21060-17 = "那麼，首先是《英雄傳奇》、《大空戰士》、《尹蘇》和……"
21060-18 = "姐姐在說什麼呢，愛麗絲醬可是新手玩家唷！？#n應該要從《薩爾那傳說：夢見島》開始玩才對！"
21060-19 = "這點絕不能妥協，接下來該玩的就是《復活邪鬼》了吧。#n啊，但是第3彈的話，我個人認為不玩也沒關係……"
21060-22 = "……？？"
21060-23 = "……"
21060-25 = "……期待。再次，開始遊戲。"
21060-27 = "（2小時之後）"
21060-28 = "（嗶，嗶，嗶，嗶，嗶，嗶……）"
21060-29 = "哇，愛麗絲，會不會看的太快了……？幾乎是在文字出現的瞬間就看完了一樣……"
21060-30 = "愛麗絲醬，接下來玩《皇家武士團》吧！讓我來告訴你回合制戰鬥的有趣之處！"
21060-31 = "（點頭）"
21060-32 = "（嗶，嗶，嗶，嗶，嗶，嗶……）"
21060-34 = "（Zzz……）"
21060-35 = "……呼嚕。"
21060-36 = "（嗶，嗶，嗶，嗶，嗶，嗶……）"
21060-38 = "（嗶，嗶，嗶，嗶，嗶，嗶……）"
21060-39 = "……通關。"
21060-41 = "（嗶，嗶，嗶，嗶，嗶，嗶……）"
21060-42 = "……通關。"
21060-44 = "啾啾──"
21060-45 = "唔──嗯……"
21060-46 = "咦，早上了！？糟糕，不趕快準備的話……！"
21060-47 = "……"
21060-48 = "終於醒過來了嗎……"
21060-49 = "能平安醒來真是太好了，你運氣真好呢。"
21060-50 = "咦！？"
21060-51 = "愛，愛麗絲醬……你還好嗎？有學到些什麼嗎？"
21060-52 = "讓我肯定你的話吧，必滅者呀。"
21060-53 = "怎，怎麼好像都只記得一些奇怪的台詞……！？"
21060-54 = "呼啊……各位早啊……"
21060-56 = "（喀嚓）"
21060-57 = "早安！"
21060-58 = "愛麗絲，這個給你。"
21060-62 = "……？"
21060-63 = "愛麗絲獲得了「不明的文件」。"
21060-65 = "哇喔，語氣變的更洗鍊了呢。這個是「學生證」唷。"
21060-66 = "這該說是洗鍊嗎，不如說是懷舊遊戲的說話方式吧……"
21060-67 = "學生證……？"
21060-68 = "這個學生證，就是你是我們學校學生的證明喔。學生名單我也請貝里塔斯駭……#n不對，是登錄了。這麼一來愛麗絲就正式成為我們的夥伴了唷！"
21060-69 = "夥伴……原來如此，明白了。"
21060-71 = "乓啪喀乓！愛麗絲與「夥伴」會合了！"
21060-73 = "你剛剛說了「駭」這個詞了對吧……？"
21060-74 = "沒問題沒問題！這麼一來服裝、學生證還有說話方式！這些都解決了的話……"
21060-75 = "之後就是……"
21060-76 = "武器，對吧。"
21060-77 = "好。愛麗絲，機會難得我就帶你參觀吧。"
21060-78 = "參觀……？"
21060-81 = "參觀我們的學校，千年！"
21060-83 = "下一話;稱之為槍也太大了"

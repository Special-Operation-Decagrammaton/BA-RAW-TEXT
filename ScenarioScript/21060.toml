[translation]
21060-1 = "Episode 6;How to Learn a Language"
21060-2 = "Millennium Game Development Department"
21060-3 = "Anyway, it's nice to meet you, Aris."
21060-4 = "Like Momoi said, my name is Yuzu, and I'm the president of the Game Development Department."
21060-5 = "Thank you for joining our club, Aris."
21060-6 = "I look forward to making things with you."
21060-7 = "Look...forward?"
21060-8 = "Acknowledged."
21060-9 = "Bum bum bum! Yuzu has joined the party!"
21060-10 = "That is what you mean, affirmative?"
21060-11 = "Uh, y-yeah. I think that covers it."
21060-12 = "It seems like you really understand our game. Getting new party members is one of the simple joys of playing an RPG."
21060-13 = "Oh, and if you want another fun game to play..."
21060-14 = "...I do have a recommendation."
21060-15 = "Wait! I've got some must-plays first!"
21060-16 = "The more you play, and the more natural your speech becomes, the more likely it will be for our plan to succeed. All we gotta do is get a lot of words in front of you."
21060-17 = "First, The Fable of Heroes, then Final Fantasia, and then Pyre Emblem—"
21060-18 = "Huh?! Aris is new to games, though! The Legend of Zinda: Lonk's Awakening is the obvious choice for a noob!"
21060-19 = "Sorry, but I can't keep quiet about this. Her next game has to be Romancing NaGa. Although she can skip the third one..."
21060-22 = "...?"
21060-23 = "..."
21060-25 = "Excitement confirmed. I'm going to start the game."
21060-27 = "(Two hours later...)"
21060-28 = "*beep bop boop*"
21060-29 = "Wow, you read so fast, Aris. And you understand everything on screen too?"
21060-30 = "Hey, Aris, let's try Strategem Ogre next! I'll introduce you to the world of tactics games!"
21060-31 = "*nod*"
21060-32 = "*beep* *bop* *boop* *bop*"
21060-34 = "Zzz..."
21060-35 = "Zzz—mmm..."
21060-36 = "*beep* *bop* *boop* *bop*"
21060-38 = "*beep* *bop* *boop* *bop*"
21060-39 = "Cleared."
21060-41 = "*beep* *bop* *boop* *bop*"
21060-42 = "...And—cleared."
21060-44 = "*chirp chirp tweet*"
21060-45 = "Ughhh..."
21060-46 = "M-Morning already?! Oh, no! I have to get ready for school!"
21060-47 = "*sneak*"
21060-48 = "You've finally opened your eyes..."
21060-49 = "Thank goodness. I was not sure you were ever going to wake up."
21060-50 = "Huh?!"
21060-51 = "Aris! You can speak normally now!"
21060-52 = "Indeed, mortal. Gaze upon me and know it to be true."
21060-53 = "H-Haha. I-I guess there's still some room for improvement."
21060-54 = " Um. Good morning, everyone..."
21060-56 = "*creak*"
21060-57 = "Good morning!"
21060-58 = "Here ya go, Aris."
21060-62 = "...?"
21060-63 = "Mysterious item obtained!"
21060-65 = "Wooow! You're getting so good at talking now. This is a student ID."
21060-66 = "Maybe it's actually kind of cool that she talks like she's in a retro game..."
21060-67 = "A student ID?"
21060-68 = "You need a student ID to prove you go to our school. Veritas hacked—I mean, registered you in the academy list, so you're one of us now!"
21060-69 = "One of you? As in, I am an ally?"
21060-71 = "Bum bum bum! Aris has joined the party!"
21060-73 = "I-Is this really gonna work?"
21060-74 = "Of course! We've already got the uniform and the student ID! It's fiiiiine..."
21060-75 = "Next order of business is..."
21060-76 = "...a weapon."
21060-77 = "All right, Aris. We've got some things to show you."
21060-78 = "By that, you mean...?"
21060-81 = "Like a grand tour of the Millennium School!"
21060-83 = "Next Episode;Much Too Big to Be Called a Gun"

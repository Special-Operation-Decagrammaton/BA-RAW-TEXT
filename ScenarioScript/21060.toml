[translation]
21060-1 = "第6話;言葉を学ぶ方法"
21060-2 = "ミレニアム・ゲーム開発部"
21060-3 = "とにかく、あらためまして。"
21060-4 = "ゲーム開発部の部長、ユズです。"
21060-5 = "この部に来てくれてありがとう、アリスちゃん。"
21060-6 = "これからよろしくね。"
21060-7 = "よろ、しく……？"
21060-8 = "……理解。"
21060-9 = "ユズが仲間になりました、パンパカパーン！"
21060-10 = "……合ってますか？"
21060-11 = "あ、うん。だいたいそんな感じ、かな。"
21060-12 = "ふふっ、その様子だと、本当にわたしたちのゲームを楽しんでくれたんだね……仲間が増えるのは、RPGの醍醐味の一つだもんね。"
21060-13 = "あ、もしRPGを面白いなって思ってくれたなら……"
21060-14 = "わたしが、他にもおすすめのゲームを教えてあげる。"
21060-15 = "ちょっと待ったぁ！アリスにおススメするのは私が先！"
21060-16 = "良質なゲームをやればやるほど話し方も自然になって、私たちの計画の成功率も上がるんだし！"
21060-17 = "さあ、まずは『英雄神話』と『ファイナル・ファンタジア』と『アイズ・エターナル』と……"
21060-18 = "何言ってるの、アリスちゃんはゲーム初心者だよ！？『ゼルナの伝説・夢見るアイランド』から始めるのが一番だって！"
21060-19 = "これだけは譲れない、次にやるべきは『ロマンシング物語』だよ。あ、でも第3弾だけはちょっと、個人的には、やらなくても良いかなって……。"
21060-22 = "……？？"
21060-23 = "……。"
21060-25 = "……期待。再び、ゲームを始めます。"
21060-27 = "（2時間後）"
21060-28 = "（ピッ、ピッ、ピッ、ピッ、ピッ、ピッ……）"
21060-29 = "うわっ、アリス、読むスピード速くない……？会話が出力されるとほぼ同時に読み終わってるみたいな……。"
21060-30 = "アリスちゃん、次は「伝説のオークバトル」やろう！ターン制バトルの面白さを教えてあげる！"
21060-31 = "（こくり）"
21060-32 = "（ピッ、ピッ、ピッ、ピッ、ピッ、ピッ……）"
21060-34 = "（Zzz……）"
21060-35 = "……ふにゃ。"
21060-36 = "（ピッ、ピッ、ピッ、ピッ、ピッ、ピッ……）"
21060-38 = "（ピッ、ピッ、ピッ、ピッ、ピッ、ピッ……）"
21060-39 = "……クリア。"
21060-41 = "（ピッ、ピッ、ピッ、ピッ、ピッ、ピッ……）"
21060-42 = "……クリア。"
21060-44 = "チュンチュン……"
21060-45 = "うーーん……。"
21060-46 = "えっ、もう朝！？しまった、準備しなきゃ……！"
21060-47 = "……。"
21060-48 = "ようやく気が付いたか……。"
21060-49 = "無事に目を覚ましたようで何よりだ、君は運がいいな。"
21060-50 = "え！？"
21060-51 = "あ、アリスちゃんか……調子はどう？色々と覚えられた？"
21060-52 = "君の言葉を肯定しよう、必滅者よ。"
21060-53 = "な、何か偏った台詞ばっかり覚えてない……！？"
21060-54 = "ふぁ……みんな、おはよう……。"
21060-56 = "（ガチャッ）"
21060-57 = "おはよう！"
21060-58 = "アリス、これ。"
21060-62 = "……？"
21060-63 = "アリスは「正体不明の書類」を獲得した。"
21060-65 = "おっ、またさらに口調が洗練されてるね。これは「学生証」だよ。"
21060-66 = "洗練っていうか、レトロゲームの会話調そのものだけどね……。"
21060-67 = "学生証……？"
21060-68 = "この学生証は、私たちの学校の生徒だっていう証明書。生徒名簿にもヴェリタスがハッキ……いや、登録してくれたから、もうアリスも正式に私たちの仲間だよ！"
21060-69 = "仲間……なるほど、理解しました。"
21060-71 = "パンパカパーン、アリスが「仲間」として合流しました！"
21060-73 = "ねえ、今「ハッキング」って言わなかった……？"
21060-74 = "大丈夫大丈夫！さて服装と学生証、それに話し方！この辺は全部解決できたから……。"
21060-75 = "あとは……"
21060-76 = "武器、だね。"
21060-77 = "よし。アリス、せっかくだし案内するよ。"
21060-78 = "案内……？"
21060-81 = "私たちの学校、ミレニアムを！"
21060-83 = "次回;銃と呼ぶには大きすぎる"

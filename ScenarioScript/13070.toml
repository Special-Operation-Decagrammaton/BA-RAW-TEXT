13070-306 = "The one who makes miracles...who bends reality! Even they are s-s-slave to the body's limits!"
13070-307 = "The a-a-almighty Sensei! I have pried open the s-savior's weakness! Heehee. Heeheehee!"
13070-308 = "Heeheehee...heeheeheehee!"
13070-310 = "HEEHEEHEEHEEHEE!"

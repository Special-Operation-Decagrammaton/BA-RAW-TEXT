[translation]
13070-1 = "第7話;肉體的極限"
13070-6 = "白子醬……"
13070-7 = "你從剛才開始一直跟著我耶？#n有什麼話要跟大叔說嗎？"
13070-8 = "嗯，不是有話要說，是在跟蹤。"
13070-9 = "那也不太好吧……女高中生竟然跟蹤一個大叔，這個景象是不是有點可怕？"
13070-10 = "為什麼要來這裡呢，前輩？#n這裡又沒人住，只是個被遺棄的村莊而已。"
13070-11 = "……是啊。"
13070-12 = "這裡……"
13070-13 = "這裡……是我第一次見到夢前輩的地方……"
13070-14 = "見到夢前輩的地方……？"
13070-15 = "啊……該說是那種感覺嗎……不知不覺就來到這裡了。"
13070-19 = "星野前輩。#n我不知道前輩之前碰到過什麼事情。"
13070-20 = "……"
13070-21 = "大家一講到這件事也總是支支吾吾的，但我覺得不能再把它當成祕密了。"
13070-22 = "……"
13070-23 = "星野前輩，雖然大家沒有說出來，心裡卻都感到不安。#n夢學生會長的死，跟現在的情況有關係嗎？"
13070-28 = "啊！那邊有輛壞蛋的運鈔車，就算搶了也沒問題！"
13070-38 = "星野前輩！？"
13070-47 = "別想逃。"
13070-49 = "嗚啊啊！？別過來啊！白子醬！？"
13070-50 = "我這樣就是不想說的意思耶？#n看一下氣氛！不要全力跟過來啦！"
13070-51 = "嗯，只要抓到前輩就能知道答案了。"
13070-52 = "真是的……！讓我獨處一下嘛！"
13070-59 = "白子前輩真慢呢……"
13070-60 = "這樣下去不行，果然還是得跟管家聯絡一下。"
13070-61 = "管家……是指奈芙蒂斯嗎？"
13070-62 = "嗯，他們說不定知道「沙漠橫貫鐵路」的祕密……#n除了那裡之外，現在也想不到其他方法了。"
13070-63 = "沒，沒關係嗎，前輩？#n他那時候好像也對前輩不太友善……"
13070-64 = "其實我跟家族斷絕了聯繫……所以他對我的印象可能不太好。"
13070-65 = "我個人倒是無所謂。#n不過聯絡方式已經刪掉了，我想想……"
13070-66 = "……請不要勉強，野乃美前輩。"
13070-67 = "嗯。"
13070-75 = "追丟了。"
13070-76 = "白子前輩！？"
13070-77 = "咦？是，是指星野前輩嗎？"
13070-78 = "嗯……是我的修行不夠。真遺憾。"
13070-79 = "白子前輩看起來很失落……"
13070-80 = "不，不過我覺得如果星野前輩真心想逃，應該沒有人能追得上他……"
13070-81 = "……星野前輩在甩開我之前叫我不要擔心，明天學校見。"
13070-83 = "明天學校見啊……"
13070-84 = "……也許星野前輩需要一點時間。"
13070-85 = "……"
13070-89 = "啊，管家聯絡我了……"
13070-93 = "……大小姐。"
13070-94 = "管家，那個……"
13070-95 = "我就知道您會聯絡我。#n您想知道「沙漠橫貫鐵路」背後的祕密對吧？"
13070-96 = "……是的。"
13070-97 = "奈芙蒂斯知道嗎？那個所謂的祕密……？"
13070-98 = "……那當然。"
13070-99 = "奈芙蒂斯究竟有什麼企圖……？#n「私募基金」的目的又是什麼？"
13070-100 = "還有跟前學生會長簽約有關的事情……！"
13070-101 = "這樣啊。不過這都是業務方面的事，我想大小姐應該沒必要放在心上吧？"
13070-102 = "這……"
13070-103 = "這是與阿拜多斯有關的事啊……管家。"
13070-107 = "……這麼說來，您這樣親自聯絡已經時隔兩年了呢。#n這段時間過得好嗎？大小姐？"
13070-108 = "……是。"
13070-109 = "卡的額度沒問題吧？#n有需要的話可以把那張卡拿回來，我再換新的卡給您。"
13070-110 = "不，不用了，沒關係。#n需要用到它的地方並不是那麼多……"
13070-111 = "……"
13070-112 = "我過得很好……管家。#n所以……我……"
13070-114 = "當然得沒事才行──畢竟您為我們帶來了如此重大的損失。"
13070-115 = "……"
13070-120 = "嗯……"
13070-122 = "恕我直言，您不認為這樣的行為非常厚臉皮嗎，大小姐？#n過去口口聲聲指責我們，結果需要的時候卻又跑來聯絡？"
13070-123 = "這……"
13070-124 = "……如果要用一句話來總結，那麼奈芙蒂斯現在正面臨危機。"
13070-125 = "什麼？"
13070-126 = "我們正在為了突破危機而努力。#n兩天後舉行的債權團大會，將攸關我們企業的存亡。"
13070-127 = "債權團大會……究竟……"
13070-128 = "……阿拜多斯的學生都在那裡嗎？"
13070-134 = "……"
13070-136 = "明天我會親自去阿拜多斯拜訪。#n今天已經很晚了，詳細的內容到時候再說吧。"
13070-137 = "啊，還請別忘了把金卡帶過來。#n我會幫您進行替換。"
13070-138 = "什麼？那個不需──"
13070-142 = "……"
13070-143 = "哇……氣氛真不是開玩笑的。#n你沒事吧，野乃美前輩？"
13070-144 = "……嗯，這不算什麼。#n重要的是債權團大會竟然會攸關企業的存亡……這又是為什麼……"
13070-145 = "事情越來越複雜了呢……"
13070-146 = "我會再試著蒐集情報。"
13070-147 = "這樣好嗎？綾音醬？#n今天一整天發生了這麼多事情……"
13070-148 = "嗯？可是……"
13070-149 = "[s]「今天就先休息吧。」"
13070-150 = "老師？"
13070-151 = "……嗯，老師說的對，綾音醬。#n今天發生了太多事情，我認為我們現在都需要休息。"
13070-152 = "白子醬、茜香醬，還有老師也是……"
13070-154 = "我沒事。"
13070-155 = "哪有，白子前輩現在的黑眼圈不是鬧著玩的耶？#n回去洗個澡休息一下吧。"
13070-156 = "唔，嗯……"
13070-157 = "啊哈哈……畢竟是跟星野前輩一起全力賽跑……"
13070-158 = "[s1]「我也會回夏萊做一些調查。」\n[s2]「明天會再過來的，大家就等等我吧。」"
13070-161 = "嗯，知道了。"
13070-162 = "那今天就先到這裡。所有人都回家休息吧。"
13070-163 = "好～各自解散。"
13070-168 = "……"
13070-169 = "怎麼了？走吧，綾音醬。"
13070-170 = "……感覺有點奇怪。"
13070-171 = "綾音醬？"
13070-172 = "沙漠橫貫鐵路……債權團大會……學生會……"
13070-173 = "偶然發現的契約……夢學生會長的失蹤……還有那個日期……"
13070-174 = "怎麼說呢……背後好像還有什麼我們不知道的事情……"
13070-175 = "這……情況確實很不正常，所以我們明天才要再集合想辦法不是嗎？"
13070-176 = "不是的，茜香醬。#n我指的不是陰謀或祕密之類的……而是更……"
13070-177 = "總覺得……有股和之前類似的違和感……"
13070-178 = "[s]「違和感？」"
13070-179 = "有點難解釋清楚，不過就是有那種感覺……怎麼說才好……"
13070-181 = "彷彿[ruby= ・     ・ ]有人[/ruby]正在刻意攻擊我們的弱點……"
13070-182 = "刻意攻擊？你指的是誰？"
13070-183 = "[s] 「………………」"
13070-184 = "這個嘛……想想好像也不太可能……"
13070-185 = "嗯，也許是我想得太複雜了。"
13070-186 = "說不定只要多蒐集一些情報，真相就會水落石出了。#n我回去之後會再努力一下。"
13070-187 = "明天還要跟奈芙蒂斯的幹部見面……情報越多越好。"
13070-188 = "[s]「我知道了，綾音也不要太勉強哦。」"
13070-189 = "是，那麼……我們回去吧，茜香醬！"
13070-190 = "一，一起走嘛，綾音醬。"
13070-195 = "[ns] 回到夏萊"
13070-199 = "攻略方法其一──「已經發生的事情無法挽回」。"
13070-200 = "如果老師是能扭轉因果、將其按照自己意圖改變的存在，#n那麼只要利用他無法改變的東西就可以了。"
13070-201 = "……沒錯，沒有人能夠逆轉已經發生的事。"
13070-207 = "換句話說，攻略老師的方法……就存在於「過去」。"
13070-216 = "我……"
13070-219 = "來吧，老師……嘻嘻嘻……"
13070-221 = "我準備的攻略方法一共有四個。"
13070-222 = "小生將用這些方法進行攻略。#n第一個已經在進行中，很快就能體驗到第二個了。"
13070-223 = "我很好奇需不需要動用四個方法才能讓你倒下，還是說兩個就夠了呢。#n嘻嘻……嘻嘻嘻。"
13070-224 = "你的攻略難易度為何……我很期待。"
13070-228 = "[ns]「彩奈，星奈。」"
13070-230 = "是，老師！"
13070-231 = "收到。等待命令中。"
13070-232 = "[ns]「從現在到早上為止，有件事要麻煩你們徹夜進行。」"
13070-234 = "[ns5]「等天亮就要馬上回阿拜多斯了。」\n[ns6]「如果我不小心睡著，早上一定要叫醒我。」"
13070-237 = "徹夜？這，這樣好嗎？老師？"
13070-238 = "唔，唔……我知道了！#n不過還是多少要睡一點覺哦！"
13070-239 = "收到。需要MorningCall，我會記得叫醒老師的。"
13070-240 = "[ns]「啊……還有。」"
13070-242 = "[ns]「……有發現蓋瑪特利亞的動向嗎？」"
13070-243 = "老師是說……蓋瑪特利亞嗎？#n這，這個，從那之後就沒發現什麼特別的動向……"
13070-244 = "為什麼這麼問呢，老師？"
13070-245 = "[s]「………………不，沒什麼。」"
13070-254 = "我們來了～"
13070-255 = "早安。"
13070-256 = "嗯嗯♧綾音醬，茜香醬，早安。"
13070-257 = "……野乃美前輩？你沒睡覺嗎？"
13070-258 = "咦……看起來很明顯嗎？#n明明有稍微睡一下的……"
13070-263 = "早安。"
13070-264 = "白子前輩看起來沒問題呢。"
13070-265 = "嗯？"
13070-266 = "不，沒什麼。星野前輩呢？"
13070-267 = "還沒有消息。#n不過他說會來就會來的。"
13070-268 = "老師也還沒有消息是嗎？"
13070-269 = "也許是因為蒐集情報需要時間……"
13070-270 = "雖然他說今天會過來……應該不會傍晚才來吧？"
13070-271 = "明天就是舉行債權團大會的日子……#n要是太晚過來，準備的時間可能會不夠……"
13070-275 = "呣喵……嘻嘻……"
13070-276 = "……前輩，彩奈前輩。"
13070-277 = "呼啊……星奈醬？怎麼了嗎？"
13070-281 = "啊！？早，早上了嗎？得去把老師叫醒才行……！？"
13070-282 = "沒有問題。老師他沒睡。"
13070-283 = "啊……是嗎？那就好……"
13070-284 = "等一下，你又熬夜了嗎，老師？"
13070-285 = "我有個問題，彩奈前輩。#n現在夏萊大樓的瓦斯系統正在調整嗎？"
13070-286 = "嗯？瓦斯系統？#n應該沒有吧？那不是我們需要干涉的事，所以……"
13070-287 = "報告。在夏萊大樓的瓦斯配管系統偵測到了異常動向……"
13070-288 = "什麼？異，異常動向……？"
13070-290 = "混亂。第一次遇到這種現象……大樓的瓦斯配管正[ruby=  ・     ・     ・     ・  ]無緣無故[/ruby]地改變。"
13070-291 = "感覺……就像是有人強行介入這個世界，硬是要扭轉……那種異質的……"
13070-292 = "異質的……嗯？#n等，等等！？"
13070-296 = "老師！"
13070-305 = "……攻略方法其二。"
13070-306 = "即便是創造奇蹟之人，也「無法克服肉體的極限」。"
13070-307 = "那就是你的弱點對吧？偉大的夏萊老師……？#n嘻嘻……嘻嘻嘻……"
13070-308 = "嘻嘻嘻，嘻嘻嘻嘻──！"
13070-310 = "咿嘻嘻嘻嘻嘻嘻──！！"
13070-312 = "下一話;阿拜多斯學生會（１）"

[translation]
13070-1 = "Episode 7;The Body's Limits"
13070-6 = "Shiroko..."
13070-7 = "Aren't you tired of following me yet? Why don't you just say what you've gotta say?"
13070-8 = "Nope. Just following."
13070-9 = "A high school girl shouldn't be following an old-timer around, you know. What even is this situation? It's so backwards."
13070-10 = "Why here, Hoshino? It's an abandoned town."
13070-11 = "...Ah."
13070-12 = "This place is...yes."
13070-13 = "This is...where I first met Yume."
13070-14 = "Where you met...Yume?"
13070-15 = "Ah... Yeah, more or less. I didn't really mean to end up here."
13070-19 = "Hoshino. Your life before we met is a mystery to me."
13070-20 = "..."
13070-21 = "No one wants to pressure you, but I think it's time."
13070-22 = "..."
13070-23 = "No one knows what to do. They're all anxious. Does President Yume's death have something to do with this situation?"
13070-28 = "Ah! Look! Look, there's an evil company's cash truck that no one's gonna miss!"
13070-38 = "Hoshino?!"
13070-47 = "You're not getting away."
13070-49 = "W-W-Whoa! Shiroko?! For heaven's sake, stop chasing me!"
13070-50 = "Can't you take a hint? I'm waving a bright neon sign that says, \"I don't want to talk about it!\" Will you stop running at full speed?!"
13070-51 = "If I catch you, you have to tell me."
13070-52 = "Well, I won't! Just give me some time!"
13070-59 = "Shiroko's not back yet..."
13070-60 = "I just can't wait any longer. I'm going to contact my butler."
13070-61 = "You mean...from Nephthys?"
13070-62 = "Yes. They may know the truth behind this entire project, and we're out of other options."
13070-63 = "A-Are you sure? They seemed...uncomfortable when you asked them earlier."
13070-64 = "It's because...I cut ties with my family when I decided to stay at Abydos. I can hardly expect them to think well of me after all these years."
13070-65 = "I've accepted that consequence... Let's see. I've deleted their contacts, but if I remember correctly..."
13070-66 = "You don't need to push yourself too hard, Nonomi."
13070-67 = "Thank you, Ayane."
13070-75 = "I lost her."
13070-76 = "Shiroko?!"
13070-77 = "You lost Hoshino?"
13070-78 = "Yes. My training's been insufficient. I regret it now."
13070-79 = "Don't look so disappointed in yourself, Shiroko..."
13070-80 = "Serika's right. No one can catch up to Hoshino when she tries."
13070-81 = "She told me not to worry and that she would see me at school tomorrow. Then I lost sight of her."
13070-83 = "Tomorrow..."
13070-84 = "Perhaps just a little bit of time is all she needs..."
13070-85 = "..."
13070-89 = "Ah. My butler's returning my call."
13070-93 = "...Miss."
13070-94 = "It's me... Hello, Butler..."
13070-95 = "I had a feeling you would call. In search of information about the Trans-Desert Railway, I presume?"
13070-96 = "...Yes."
13070-97 = "There must be some kind of secret for everyone to be vying for the rights to an abandoned project. Does Nephthys know?"
13070-98 = "...Naturally."
13070-99 = "Please tell me. What is the goal of this private equity fund? What is Nephthys planning?"
13070-100 = "And the contract! We need to know what's happening with the contract signed by our former student council president!"
13070-101 = "Well, there's no need to worry your pretty head about business affairs, miss."
13070-102 = "That's not..."
13070-103 = "It's for Abydos, Butler. I need to know."
13070-107 = "Now that I think about it, it's been almost two years since you gave me a call. How have you been, miss?"
13070-108 = "Fine. I've been doing fine."
13070-109 = "Have you reached your card limit yet? I can replace it with a new one whenever you require."
13070-110 = "I don't use it very often. Thank you, though."
13070-111 = "..."
13070-112 = "I'm doing fine, Butler, but it's about—"
13070-114 = "I'm quite sure you are fine. Who wouldn't be, after dragging their own family through the dirt?"
13070-115 = "..."
13070-120 = "Um..."
13070-122 = "If I am to be frank with you, miss, I find your behavior rather shameless. You condemn us, renounce your very name, and then come calling as soon as it benefits you?"
13070-123 = "That's... Well..."
13070-124 = "If you must know, Nephthys, your family, is in crisis."
13070-125 = "C-Crisis?"
13070-126 = "Yes. We are doing our utmost to navigate what could be the downfall of the company. And the outcome of the general creditors' meeting in two days' time will determine our fate."
13070-127 = "Just what is happening at this meeting? There seems to be so much riding upon it..."
13070-128 = "Are the other Abydos students present currently?"
13070-134 = "..."
13070-136 = "The hour grows late. I shall visit Abydos myself tomorrow, and we can discuss the details."
13070-137 = "Ah, yes. I will bring a replacement for your gold card, so please bring the one currently in your possession."
13070-138 = "What? I said that—"
13070-142 = "..."
13070-143 = "Well, that was tense. You okay, Nonomi?"
13070-144 = "Don't worry. That was normal. I'm much more concerned about this general creditors' meeting."
13070-145 = "The more we try to turn the pages, the more the plot thickens..."
13070-146 = "I'll do my best to find more information."
13070-147 = "Don't you need a break, Ayane? Today was kinda insane..."
13070-148 = "Th-That doesn't matter, I need to—"
13070-149 = "[s] \"What everyone needs is to get some rest.\""
13070-150 = "Sensei?"
13070-151 = "Let's take Sensei's advice, Ayane. It's not good to push ourselves during such stressful times."
13070-152 = "Shiroko, Serika, and Sensei..."
13070-154 = "I'm fine."
13070-155 = "I don't wanna hear it, Shiroko! You can barely keep your eyes open. And you need a shower! "
13070-156 = "S-Sure..."
13070-157 = "Ahaha... Keeping up with Hoshino is a pretty admirable feat, after all."
13070-158 = "[s1] \"I'll see if I can find anything back at Schale.\"\n[s2] \"I'll come back tomorrow, so wait for me.\""
13070-161 = "Okay. Understood."
13070-162 = "That's right! Everyone, let's go home!"
13070-163 = "Meeting dismissed!"
13070-168 = "..."
13070-169 = "You okay, Ayane? They're gonna leave us behind."
13070-170 = "...Something feels off."
13070-171 = "Ayane?"
13070-172 = "Trans-Desert Railway... General creditors' meeting... Student council..."
13070-173 = "And the accidentally discovered contract... The date coinciding with President Yume's disappearance..."
13070-174 = "It seems like there's a thread connecting all of it that I just can't place."
13070-175 = "Well, duh. Just thinking about all of it makes my head spin again. That's why we need to take a break, and then we'll crack the code together tomorrow!"
13070-176 = "I'm not talking about any secret plots, Serika."
13070-177 = "How do I put it..."
13070-178 = "[s] \"What exactly feels off to you?\""
13070-179 = "I guess if I had to describe the thread somehow..."
13070-181 = "It's like someone is deliberately attacking us in all of our most vulnerable spots."
13070-182 = "Huh? Who would even know stuff like that?"
13070-183 = "[s] \"...\""
13070-184 = "Exactly. Someone would have to have more knowledge about Abydos than even we do, in order to pull that off."
13070-185 = "I'm likely overthinking it all."
13070-186 = "It always helps me to organize things. I'll sort through the information and maybe I'll be able to see things more clearly."
13070-187 = "After all, we're meeting with an officer from Nephthys itself. We need to be prepared."
13070-188 = "[s] \"Okay. Don't overwork yourself, Ayane.\""
13070-189 = "Yes. Then... Let's go, Serika."
13070-190 = "W-Wait for me, Ayane!"
13070-195 = "[ns] Return to Schale."
13070-199 = "S-Strategy one: What's done cannot be undone."
13070-200 = "Sensei is an aberration...that bends reality to their will, manipulating outcomes like a puppet master. Then my mandate is to wield that which cannot be bent."
13070-201 = "Yes, yes. What's done cannot be undone. What cannot be changed will not be changed."
13070-207 = "Sensei's weakness is the past...so the past is what I will use..."
13070-216 = "I..."
13070-219 = "Now, Sensei... Heeheehee..."
13070-221 = "For you, four s-s-strategies I have prepared."
13070-222 = "With my weapons, I will emerge v-v-victorious in this push and pull of wills. The first is in motion, the s-second creeps ever closer to you."
13070-223 = "Will two s-suffice? Or shall y-you push me to the edge? Heehee! Heeheehee!"
13070-224 = "Ah! Yes... Sh-Show me...your weaknesses...your obstacles...!"
13070-228 = "[ns] \"Arona, Plana.\""
13070-230 = "Yes, Sensei!"
13070-231 = "On standby for your orders."
13070-232 = "[ns] \"I'm going to need to pull an all-nighter.\""
13070-234 = "[ns5] \"But I have to get back to Abydos in the morning.\"\n[ns6] \"So I need you to wake me up if I do fall asleep.\""
13070-237 = "Are you sure about that? Will you be okay, Sensei?"
13070-238 = "Well, if you say so! But try to take a nap if you can! Rest is super important!"
13070-239 = "Affirmative. I will not fail in my directive."
13070-240 = "[ns] \"Ah... Also.\""
13070-242 = "[ns] \"...Has there been any movement from Gematria?\""
13070-243 = "I haven't heard that name in a while! We haven't seen anything since all of the red sky stuff!"
13070-244 = "Did something happen, Sensei?"
13070-245 = "[s] \"...Hm. No, nothing.\""
13070-254 = "We're here!"
13070-255 = "Good morning."
13070-256 = "Yup, yup! Good morning, Ayane! Serika! ♧"
13070-257 = "Did you not get any rest last night, Nonomi?"
13070-258 = "Oh dear. Is it that obvious? I suppose I might have drifted off at least a little..."
13070-263 = "Good morning."
13070-264 = "Shiroko's fine, as usual!"
13070-265 = "Hm?"
13070-266 = "Nothing, nothing! You seen Hoshino yet?"
13070-267 = "No. But she said she'd come. So she'll come."
13070-268 = "Nothing from Sensei either?"
13070-269 = "They might still be gathering information…"
13070-270 = "Sensei promised though... Maybe they meant later today?"
13070-271 = "But with the meeting tomorrow, we need as much time as we can get to prepare…"
13070-275 = "Zzz... Zzz..."
13070-276 = "...Arona? Arona."
13070-277 = "*yawn* Plana? What's wrong?"
13070-281 = "Ack! It's morning! We have to wake up Sensei!"
13070-282 = "Negative. Sensei did not fall asleep."
13070-283 = "Phew! What a relief! I thought I messed up."

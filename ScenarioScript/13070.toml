[translation]
13070-1 = "ตอนที่ 7;ขีดจำกัดของร่างกาย"
13070-6 = "ชิโรโกะจัง..."
13070-7 = "เห็นตามมาตั้งแต่เมื่อกี้แล้ว มีเรื่องอะไรจะคุยกับลุงคนนี้งั้นเหรอ?"
13070-8 = "อืม ไม่ได้อยากคุยอะไรด้วยหรอก แค่สะกดรอยตามมาน่ะ"
13070-9 = "ถ้างั้นก็น่าจะลำบากเลยนะ... เด็กผู้หญิงม.ปลายแอบสะกดรอยตามลุงมา นี่มันสถานการณ์แบบไหนกันเนี่ย"
13070-10 = "ว่าแต่รุ่นพี่มาที่นี่ทำไมล่ะ? ที่นี่มันหมู่บ้านร้างที่ไม่มีใครอยู่นะ"
13070-11 = "อ้อ..."
13070-12 = "ที่นี่... นั่นสินะ..."
13070-13 = "ที่นี่... เป็นที่ที่ฉันได้เจอกับรุ่นพี่ยูเมะเป็นครั้งแรกน่ะ"
13070-14 = "ที่ที่ได้เจอรุ่นพี่ยูเมะ...?"
13070-15 = "อืม... ก็ประมาณนั้นน่ะ... เหมือนว่าฉันจะมาที่นี่โดยที่ไม่รู้ตัวแฮะ"
13070-19 = "รุ่นพี่โฮชิโนะ ก่อนที่ฉันจะมาที่นี่ ฉันไม่รู้หรอกนะว่าเกิดอะไรขึ้นกับรุ่นพี่"
13070-20 = "......"
13070-21 = "ถึงทุกคนจะเงียบ แต่ฉันก็ไม่คิดว่าควรเก็บเรื่องนี้เป็นความลับอีกต่อไปนะ "
13070-22 = "......"
13070-23 = "รุ่นพี่โฮชิโนะ ถึงทุกคนจะไม่ได้พูดอะไรออกมาแต่ก็คงเริ่มหวั่นใจกันแล้ว การเสียชีวิตของประธานสภา#nนักเรียนยูเมะ มันเกี่ยวข้องกับสถานการณ์ตอนนี้เหรอ?"
13070-28 = "อ๊ะ! นั่นมันรถขนเงินสดของคนไม่ดีนี่นา น่าปล้นจังเลย!"
13070-38 = "รุ่นพี่โฮชิโนะ!?"
13070-47 = "อย่ามาหลอกกันให้ยากเลย"
13070-49 = "ว้ากก?! อย่าตามมานะ! ชิโรโกะจัง!?"
13070-50 = "ที่ฉันหนีก็เพราะไม่อยากพูดเรื่องนี้น่ะ อ่านสถานการณ์หน่อย! แล้วก็อย่าวิ่งติดสปีดมาแบบนี้สิ!"
13070-51 = "ถ้าฉันจับได้ ต้องพูดออกมานะ"
13070-52 = "ม่ายยย...! ขอฉันอยู่คนเดียวสักพักเถอะ!"
13070-59 = "รุ่นพี่ชิโรโกะช้าจัง..."
13070-60 = "ไม่ได้การแล้วค่ะ เห็นทีฉันต้องติดต่อคุณพ่อบ้านแล้วละค่ะ"
13070-61 = "คุณพ่อบ้านที่ว่า... หมายถึงเนฟธิสใช่ไหมคะ?"
13070-62 = "ค่ะ บางทีเขาอาจจะรู้ความลับของ <ทางรถไฟข้ามทะเลทราย> อยู่ก็ได้ค่ะ... นอกจากวิธีนี้แล้ว ฉันมองไม่เห็นทางออกอื่นแล้วค่ะ"
13070-63 = "จะ... จะไม่เป็นไรเหรอคะรุ่นพี่? ตอนนั้นเขาดูเหมือนจะไม่ค่อยสะดวกใจกับรุ่นพี่นะคะ..."
13070-64 = "ค่ะ ที่จริงฉันเลิกติดต่อกับครอบครัวไปแล้ว... เขาก็เลยอาจจะคิดไม่ดีต่อฉันไปแล้วก็ได้ค่ะ"
13070-65 = "แต่ว่าฉันไม่เป็นไรหรอกนะคะ พวกเบอร์ติดต่อฉันก็ลบไปหมดแล้วด้วย อืม... เบอร์อะไรนะ..."
13070-66 = "ไม่ต้องทำเกินกำลังนะคะ รุ่นพี่โนโนมิ..."
13070-67 = "ค่ะ"
13070-75 = "ฉันตามไปไม่ทัน"
13070-76 = "รุ่นพี่ชิโรโกะ?!"
13070-77 = "คะ? ตะ... ตามรุ่นพี่โฮชิโนะไม่ทันเหรอคะ?"
13070-78 = "อืม... สงสัยยังฝึกฝนไม่พอน่ะ ขอโทษนะ"
13070-79 = "รุ่นพี่ชิโรโกะหน้างอไปหมดแล้ว..."
13070-80 = "แต่ถ้ารุ่นพี่โฮชิโนะคิดจะหนีจริงๆ แล้วละก็ ไม่ว่าใครก็คงตามไม่ทันหรอกค่ะ..."
13070-81 = "ก่อนที่รุ่นพี่โฮชิโนะจะหนีไป รุ่นพี่บอกว่าไม่ต้องห่วง และบอกว่าเจอกันพรุ่งนี้ที่โรงเรียนน่ะ"
13070-83 = "พรุ่งนี้ที่โรงเรียน..."
13070-84 = "รุ่นพี่โฮชิโนะอาจจะต้องการเวลาก็ได้ค่ะ"
13070-85 = "......"
13070-89 = "อ๊ะ คุณพ่อบ้านติดต่อมา..."
13070-93 = "คุณหนู..."
13070-94 = "คุณพ่อบ้านคะ... เอ่อ... คือว่า..."
13070-95 = "ผมคิดไว้แล้วครับว่าจะติดต่อมา อยากรู้ความลับที่ซ่อนไว้ของ <ทางรถไฟข้ามทะเลทราย> ใช่ไหมครับ?"
13070-96 = "ค่ะ..."
13070-97 = "เนฟธิสรู้ความลับนั้นไหมคะ...?"
13070-98 = "แน่นอนครับ"
13070-99 = "เนฟธิสกำลังวางแผนทำอะไรอยู่เหรอคะ...? แล้วจุดประสงค์ของกองทุนนั่นคืออะไรคะ?"
13070-100 = "เรื่องของประธานสภานักเรียนคนก่อนกับหนังสือสัญญาอันนั้นด้วยค่ะ...!"
13070-101 = "อืม นี่เป็นเรื่องของธุรกิจ ผมว่าคุณหนูไม่จำเป็นต้องใส่ใจก็ได้ครับ"
13070-102 = "แต่นี่มัน..."
13070-103 = "เป็นเรื่องของอะบิดอสนี่คะ... คุณพ่อบ้าน..."
13070-107 = "จะว่าไปแล้ว... คุณหนูติดต่อเรามาเป็นครั้งแรกในรอบ 2 ปีเลยนะครับ ระหว่างนั้นไม่มีเรื่องอะไรใช่ไหม#nครับคุณหนู?"
13070-108 = "ค่ะ... "
13070-109 = "แล้วเรื่องวงเงินบัตรเครดิต ติดปัญหาอะไรหรือเปล่าครับ? ถ้าจำเป็นต้องใช้อะไร คุณหนูเอาบัตรใบนั้น#nมาคืน แล้วรับใบใหม่ไปได้นะครับ"
13070-110 = "มะ... ไม่ค่ะ ไม่เป็นไร ฉันไม่ได้ใช้อะไรเยอะอยู่แล้ว..."
13070-111 = "...... "
13070-112 = "ฉันสบายดี ไม่มีอะไรต้องเป็นห่วงค่ะ... คุณพ่อบ้าน เพราะงั้น... เอ่อ..."
13070-114 = "ต้องสบายดีอยู่แล้วละครับ ก็เล่นสร้างความเสียหายให้พวกเราไว้มากมายขนาดนั้น"
13070-115 = "......"
13070-120 = "อืม..."
13070-122 = "ถ้าให้พูดตรงๆ ผมว่าแบบนี้มันหน้าไม่อายเลยนะครับคุณหนู ประณามพวกเราไว้ตั้งขนาดนั้น แล้วพอตอนตัวเองอยากได้ความช่วยเหลือถึงได้ติดต่อมางั้นเหรอครับ?"
13070-123 = "เรื่องนั้น..."
13070-124 = "ถ้าจะให้สรุปง่ายๆ ตอนนี้เนฟธิสกำลังเจอกับวิกฤตครับ"
13070-125 = "คะ?"
13070-126 = "พวกผมก็กำลังพยายามเอาชนะวิกฤตนั้นกันอยู่ การดำรงอยู่ของบริษัทเราขึ้นอยู่กับการประชุมสมัชชา#nเจ้าหนี้ที่จะเกิดขึ้นในอีก 2 วันข้างหน้าครับ"
13070-127 = "ขึ้นอยู่กับการประชุมสมัชชาเจ้าหนี้... นี่มันเรื่องอะไรกันคะ..."
13070-128 = "นักเรียนอะบิดอสอยู่ที่นั่นกันหมดไหมครับ?"
13070-134 = "......"
13070-136 = "พรุ่งนี้ผมจะไปหาที่อะบิดอสด้วยตัวเอง วันนี้เวลาคงไม่พอแล้ว ไว้คุยรายละเอียดกันพรุ่งนี้นะครับ"
13070-137 = "อ้อ แล้วก็เอาบัตรโกลเด้นการ์ดมาด้วยนะครับ ผมจะเปลี่ยนใบใหม่ให้"
13070-138 = "คะ? แต่ฉันไม่เป็นไร..."
13070-142 = "......"
13070-143 = "ว้าว... บรรยากาศไม่ใช่เล่นๆ เลยนะ จะไม่เป็นไรเหรอ รุ่นพี่โนโนมิ?"
13070-144 = "ค่ะ... เรื่องนั้นไม่เท่าไรหรอกค่ะ แต่ที่บอกว่าการดำรงอยู่ของบริษัทขึ้นอยู่กับการประชุมสมัชชาเจ้าหนี้ ..."
13070-145 = "เรื่องมันชักจะซับซ้อนเข้าไปทุกทีเลยนะคะ... "
13070-146 = "ฉันจะลองหาข้อมูลเพิ่มดูค่ะ"
13070-147 = "ไม่เป็นอะไรแน่นะอายาเนะจัง? วันนี้เจอเรื่องตั้งเยอะตั้งแยะมาทั้งวันแล้วนะ.."
13070-148 = "คะ? แต่ว่า..."
13070-149 = "[s] \"ใช่ วันนี้พักผ่อนกันก่อนเถอะ\""
13070-150 = "คุณครู?"
13070-151 = "ใช่ค่ะ... คุณครูพูดถูกแล้วละค่ะ อายาเนะจัง วันนี้เราเจอเรื่องมาเยอะแล้วค่ะ ตอนนี้เราทุกคนต้องพักผ่อนนะคะ"
13070-152 = "ทั้งชิโรโกะจัง เซริกะจัง แล้วก็คุณครูด้วย..."
13070-154 = "แต่ฉันยังไหวนะ"
13070-155 = "ไหวอะไรกันล่ะ ตอนนี้รุ่นพี่ชิโรโกะมอมแมมไปหมดแล้วนะ กลับไปพักผ่อนหน่อยเถอะ"
13070-156 = "อะ... อืม..."
13070-157 = "อะฮ่าฮ่า... ก็ไปวิ่งแข่งกับรุ่นพี่โฮชิโนะมานี่คะ..."
13070-158 = "[s1] \"ครูก็จะกลับชาเล่ต์ไปรวบรวมข้อมูลดู\"\n[s2] \"แล้วพรุ่งนี้ครูจะมาใหม่ รอกันด้วยนะ\""
13070-161 = "อืม เข้าใจแล้ว"
13070-162 = "งั้นวันนี้เราพอแค่นี้ก่อน ทุกคนกลับไปพักผ่อนเถอะค่ะ"
13070-163 = "เอาละๆ งั้นก็แยกย้ายกันก่อน"
13070-168 = "......"
13070-169 = "จะอยู่ทำอะไรเหรอ? กลับกันเถอะ อายาเนะจัง"
13070-170 = "ฉันรู้สึกแปลกๆ นิดหน่อยค่ะ..."
13070-171 = "อายาเนะจัง?"
13070-172 = "ทั้งทางรถไฟข้ามทะเลทราย... การประชุมสมัชชาเจ้าหนี้... สภานักเรียน... "
13070-173 = "หนังสือสัญญาที่ถูกค้นพบโดยบังเอิญ... เรื่องการหายตัวไปของประธานยูเมะ... เรื่องวันที่นั่นก็ด้วยค่ะ... "
13070-174 = "จะว่ายังไงดี... ฉันรู้สึกว่ามีบางอย่างที่พวกเรายังไม่รู้อีกค่ะ..."
13070-175 = "ทั้งหมดนี้น่ะ... ใครดูก็รู้ว่านี่ไม่ใช่สถานการณ์ปกติ ไว้พรุ่งนี้เรามารวมตัวเพื่อหาคำตอบกันอีกครั้งเถอะ"
13070-176 = "ไม่หรอกค่ะ เซริกะจัง มันไม่ใช่แผนการร้ายหรือความลับอะไรหรอก... มันแค่..."
13070-177 = "จะว่ายังไงดี... มันเหมือนเป็นความไม่ลงรอยกันที่มีก่อนหน้านั้นน่ะค่ะ"
13070-178 = "[s] \"ความไม่ลงรอยกัน?\""
13070-179 = "จะพูดให้มันชัดเจนก็อาจจะลำบากน่ะค่ะ แต่ฉันรู้สึกว่ามีอะไรแบบนั้นอยู่..."
13070-181 = "ต้องบอกว่า... เหมือนมีใครบางคนกำลังโจมตีส่วนที่เปราะบางที่สุดของเราอยู่น่ะค่ะ..."
13070-182 = "ว่าไงนะ? โจมตีเหรอ? ใครกัน?"
13070-183 = "[s] \"............\""
13070-184 = "นั่นสิคะ... พอมาคิดดูก็ไม่น่าเป็นอย่างนั้นได้... "
13070-185 = "อืม... ฉันอาจจะคิดมากไปก็ได้ค่ะ"
13070-186 = "ถ้ารวบรวมข้อมูลได้อีกหน่อย เราอาจจะเห็นเค้าโครงมากกว่านี้ก็ได้ ฉันจะกลับไปหาข้อมูลเพิ่มดูค่ะ "
13070-187 = "พรุ่งนี้เราจะเจอกับทางเนฟธิสด้วย... ดังนั้นเรายิ่งต้องมีข้อมูลเยอะๆ ค่ะ"
13070-188 = "[s] \"เข้าใจแล้ว แต่ก็อย่าหักโหมมากเกินไปนะอายาเนะ\""
13070-189 = "ค่ะ ถ้างั้นก็... ไปกันเถอะ เซริกะจัง"
13070-190 = "ระ... รอด้วยสิ อายาเนะจัง"
13070-195 = "[ns] กลับชาเล่ต์"
13070-199 = "วิธีโจมตีแรก <สิ่งที่เกิดขึ้นแล้วไม่อาจหวนคืนได้>"
13070-200 = "ถ้าครูสามารถบิดเบือนเหตุผลและเปลี่ยนมันให้เป็นสิ่งที่ตัวเองตั้งใจไว้ได้ ผมก็แค่ต้องใช้สิ่งที่ครูเปลี่ยนแปลงไม่ได้ครับ"
13070-201 = "ใช่แล้ว... เรื่องที่เกิดขึ้นไปแล้ว ไม่มีใครทำให้มันเป็นเรื่องที่ไม่เคยเกิดขึ้นได้หรอก"
13070-207 = "เพราะงั้น วิธีโจมตีครู... จึงอยู่ใน <อดีต>"
13070-216 = "ฉัน..."
13070-219 = "เอาละ ครูเอ๋ย... หึหึหึ... "
13070-221 = "วิธีโจมตีที่กระผมเตรียมไว้มีทั้งหมด 4 วิธี"
13070-222 = "กระผมจะใช้ตามนี้ดูนะครับ วิธีแรกกำลังดำเนินอยู่ ส่วนวิธีที่ 2 ครูใกล้จะได้เจอแล้วละครับ"
13070-223 = "อยากรู้จังเลยครับว่าต้องใช้ทั้ง 4 วิธีเลยหรือเปล่าถึงจะล้มคุณได้ หรือว่าแค่ 2 วิธีก็พอ หึหึ... หึหึหึ..."
13070-224 = "กระผมรอดูอยู่นะครับ... ว่าการโจมตีของคุณจะยากระดับไหน"
13070-228 = "[ns] \"อะโรน่า พลาน่า\""
13070-230 = "ค่ะ คุณครู!"
13070-231 = "รอรับคำสั่ง"
13070-232 = "[ns] \"วันนี้เราต้องโต้รุ่งกันถึงเช้า\""
13070-234 = "[ns5] \"ทันทีที่ฟ้าสาง ครูต้องกลับไปที่อะบิดอส\"\n[ns6] \"ถ้าครูเผลอหลับไป ตอนเช้าต้องช่วยปลุกด้วยนะ\""
13070-237 = "คะ? โต้รุ่งเหรอคะ? จะ... จะไหวเหรอคะ? คุณครู?"
13070-238 = "อ่า... เข้าใจแล้วค่ะ! แต่ยังไงก็ต้องนอนพักผ่อนบ้างนะคะ สักนิดก็ยังดีค่ะ! "
13070-239 = "รับทราบ ปลุกให้ตื่นนอนในตอนเช้า จะไม่ลืมปลุกค่ะ"
13070-240 = "[ns] \"อ้อ... อีกอย่างหนึ่ง\""
13070-242 = "[ns] \"พบความเคลื่อนไหวของเกมาเทรียบ้างไหม...?\""
13070-243 = "เกมาเทรีย... เหรอคะ? อะ... อืม... หลังจากตอนนั้นก็ไม่มีการเคลื่อนไหวอะไรเป็นพิเศษเลยค่ะ..."
13070-244 = "ต้องโต้รุ่งเพราะเรื่องนี้เหรอคะ คุณครู?"
13070-245 = "[s] \"อืม... ไม่มีอะไรหรอก\""
13070-254 = "พวกเรามาแล้ว~"
13070-255 = "อรุณสวัสดิ์ค่ะ"
13070-256 = "อื้อ♧ อายาเนะจัง เซริกะจัง อรุณสวัสดิ์ค่ะ"
13070-257 = "รุ่นพี่โนโนมิ? เมื่อคืนไม่ได้นอนเหรอคะ?"
13070-258 = "อ่า... ดูออกขนาดนั้นเลยเหรอคะ? ฉันนอนไปหน่อยแล้วนะ... "
13070-263 = "อรุณสวัสดิ์"
13070-264 = "รุ่นพี่ชิโรโกะดูไม่เป็นอะไรเลยนะ"
13070-265 = "หืม?"
13070-266 = "เปล่า ไม่มีอะไรหรอก แล้วรุ่นพี่โฮชิโนะล่ะ?"
13070-267 = "ยังไม่ติดต่อมาเลย แต่รุ่นพี่บอกไว้แล้วนี่ว่าจะมา เดี๋ยวก็คงมาแหละ"
13070-268 = "คุณครูก็ยังไม่ติดต่อมาใช่ไหมคะ?"
13070-269 = "การรวบรวมข้อมูลอาจจะใช้เวลานานก็ได้..."
13070-270 = "คุณครูบอกไว้ว่าจะมาภายในวันนี้... อย่าบอกนะว่าจะมาตอนเย็นเลยน่ะ?"
13070-271 = "แต่พรุ่งนี้จะมีการประชุมสมัชชาเจ้าหนี้แล้ว... ถ้ามาช้าเกินไป เราน่าจะมีเวลาเตรียมตัวไม่พอนะ..."
13070-275 = "งืม... งืมม..."
13070-276 = "รุ่นพี่... รุ่นพี่อะโรน่า"
13070-277 = "ฮ้าวว~ zzZ พลาน่าจัง...? ทำไมเหรอคะ?"
13070-281 = "อ๊ะ?!  ชะ... เช้าแล้วเหรอคะ? ต้องปลุกคุณครู...!"
13070-282 = "ไม่มีปัญหาหรอกค่ะ คุณครูยังตื่นอยู่ค่ะ"
13070-283 = "อ่า... งั้นเหรอคะ? งั้นก็ค่อยยังชั่วหน่อย..."
13070-284 = "ไม่สิ แปลว่าคุณครูโต้รุ่งแบบไม่ได้นอนเลยเหรอคะ?"
13070-285 = "มีคำถาม รุ่นพี่อะโรน่า ตอนนี้มีการปรับระบบก๊าซในอาคารชาเล่ต์เหรอคะ?"
13070-286 = "ระบบก๊าซเหรอคะ? มะ... ไม่น่านะคะ? เรื่องนั้นไม่ใช่หน้าที่ของพวกเรา..."
13070-287 = "ขอรายงาน ตอนนี้มีการตรวจพบความผิดปกติของระบบท่อส่งก๊าซในอาคารชาเล่ต์ค่ะ..."
13070-288 = "คะ? คะ... ความผิดปกติเหรอคะ...?"
13070-290 = "แปลกจังค่ะ ฉันไม่เคยเจอแบบนี้มาก่อน... ท่อก๊าซในอาคารกำลังเปลี่ยนไปโดยไม่มีสาเหตุอะไรเลยค่ะ"
13070-291 = "ฉันรู้สึกแปลกๆ... เหมือนกับว่าใครบางคนตั้งใจเข้ามาแทรกแซงโลกและบิดเบือนมันอย่างนั้นแหละ..."
13070-292 = "รู้สึกแปลกๆ เหรอ... อ่า... เดี๋ยวก่อนนะคะ!"
13070-296 = "คุณครูคะ!"
13070-305 = "วิธีโจมตีที่ 2"
13070-306 = "ต่อให้เป็นคนแห่งปาฏิหาริย์ แต่ก็ <ฝืนขีดจำกัดของร่างกายไม่ได้>"
13070-307 = "ใช่ไหมล่ะครับ? นั่นคือจุดอ่อนของคุณใช่ไหมล่ะ คุณครูจากชาเล่ต์ผู้ยิ่งใหญ่? หึหึ... หึหึหึ..."
13070-308 = "หึหึหึ หึหึหึหึ!"
13070-310 = "หึหึหึหึหึหึหึหึ!!"
13070-312 = "ตอนต่อไป;สภานักเรียนอะบิดอส 1"

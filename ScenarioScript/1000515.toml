[translation]
1000515-1 = "บัตรผ่านไปได้ทุกที่"
1000515-3 = "(คุณครูมาที่ห้องคณะกรรมการแผนงานเพื่อฟัง 'คำขอร้อง' ของโฮชิโนะ)"
1000515-10 = "หืม? เสียงนี้มัน..."
1000515-11 = "ว่าแล้วเชียวคุณครูจริงๆ ด้วย? ถ้าเป็นช่วงเวลาแบบนี้ก็ช่วยไม่ได้ละนะ~?"
1000515-17 = "แหะๆ~ สมกับเป็นลุงจริงๆ"
1000515-18 = "ขอบคุณนะครู ฉันหวังเอาไว้บ้างแหละว่าครูจะช่วยรับฟังคำขอร้องแบบนี้น่ะ"
1000515-19 = "หืม...? เด็กๆ คนอื่นน่ะเหรอ?"
1000515-20 = "วันนี้พวกรุ่นน้องที่น่ารักมีภารกิจกันทุกคนเลย เพราะงั้นเลยทำให้ฉันเรียกครูมาได้แบบนี้น่ะ"
1000515-21 = "ถ้าแค่ชวนครูมาเพราะอยากขอบคุณ หรืออยากหาอะไรทำฆ่าเวลาละก็ ฉันก็คงไม่ได้ห้ามอะไร..."
1000515-22 = "แต่พวกเด็กๆ คนอื่นๆ ต่างก็ไว้ใจครูมากๆ เลยนะ ก็เลยมีเรื่องที่อยากปรึกษาหรือขอร้อง#nอยู่เต็มไปหมดเลยน่ะสิ"
1000515-23 = "ถึงอย่างนั้นก็ตาม... ถ้าพึ่งพาคุณครูมากเกินไป มันก็แย่ใช่มั้ยล่ะ?"
1000515-24 = "รู้สึกผิดนิดหน่อยที่เหมือนจะเรียกคุณครูมาทุกครั้งที่มีเรื่องเลยด้วย เพราะไม่ว่ายังไงครูก็เป็น#nผู้ใหญ่นี่นา"
1000515-25 = "[s1] \"ถึงงั้นก็ไม่เห็นเป็นไรเลยนี่นา\"\n[s2] \"ถ้าทำตัวสบายๆ ต่อกัน ครูว่าดีกว่าอีกนะ\""
1000515-28 = "แหะๆ... นั่นสิ นั่นสินะ เป็นอย่างที่คิดจริงๆ คิดแล้วแหละว่าครูจะต้องพูดแบบนี้น่ะ"
1000515-29 = "แต่ว่าการพึ่งพาตัวเองก็เป็นเรื่องสำคัญ..."
1000515-30 = "ไม่สิ..."
1000515-31 = "เรื่องนี้ ถ้าลุงเป็นคนพูดอาจดูแปลกๆ อยู่นิดหน่อยก็ได้นะ เพราะลุงเป็นพวกที่ทำให้ครูต้อง#nพยายามอยู่ตลอดนี่นา"
1000515-35 = "รู้แล้ว รู้แล้วน่า เพราะงั้นอย่ามองกันด้วยสายตาแบบนั้นจะได้รึเปล่า"
1000515-36 = "เวลาลุงโดนครูมองด้วยสายตาแบบนั้นน่ะ มันเจ็บจี๊ดเลยนะ เจ็บพอๆ กับเวลาโดนอายาเนะจังดุเลยละ"
1000515-37 = "ยังไงก็เถอะ เรื่องที่จะคุยวันนี้ไม่ใช่เรื่องนี้สักหน่อย "
1000515-38 = "พอจู่ๆ ได้ใช้เวลาอยู่คนเดียวก็นึกถึงคุณครูขึ้นมา ฉันก็เลยเรียกครูมาไงล่ะ"
1000515-39 = "[s3] \"นึกถึงครู...?\"\n[s4] \"จู่ๆ ก็นึกถึงเนี่ยนะ!?\""
1000515-42 = "เอาละๆ เลิกพูดเล่นกันเท่านี้"
1000515-43 = "ครู..."
1000515-44 = "ช่วยดูนี่หน่อยได้มั้ย?"
1000515-50 = "[ns5] \"นี่มันหมอนของโฮชิโนะนี่นา?\"\n[ns6] \"จู่ๆ เอามาให้ดูทำไมน่ะ?\""
1000515-53 = "ครูยังไม่รู้สินะ นี่ไม่ใช่หมอนธรรมดาหรอกนะ"
1000515-54 = "นี่เป็นสมบัติส่วนตัวของลุง มันคือ <บัตรผ่านไปได้ทุกที่> ลึกลับที่ทรงพลัง~"
1000515-58 = "ฮุฮุ... สีหน้าที่บ่งบอกว่าไม่เข้าใจว่าลุงหมายถึงอะไร"
1000515-59 = "ก็นะ งั้นก็อย่าเสียเวลาอธิบายอะไรให้ยืดยาวเลยดีกว่า ครู มานั่งตรงนี้หน่อยได้มั้ย?"
1000515-64 = "นั่นละๆ อื้อ ดีมาก"
1000515-65 = "แล้วก็จัดท่านั่งให้ดีๆ... เอ้า นั่งหลังตรงแล้วก็เอาเจ้านี่วางไว้ระหว่างหน้าอกกับแขน"
1000515-69 = "อืม ใช้ได้เลยแฮะ"
1000515-70 = "แล้วพอหลับตาลง..."
1000515-81 = "มันก็จะกลายเป็นตั๋วไม่มีวันหมดอายุที่จะพาครูเข้าสู่ดินแดนแห่งความฝันแสนสุขได้ทุกที่ในโลก"
1000515-85 = "(เหมือนที่โฮชิโนะพูด หมอนนุ่มๆ ทำให้คุณครูรู้สึกง่วงงุนอย่างมาก)"
1000515-86 = "(ระหว่างที่ผล็อยหลับไม่รู้เรื่อง โฮชิโนะที่นั่งอยู่ข้างๆ ก็เอาแต่พูดพึมพำอะไรบางอย่างที่ฟังไม่ได้#nศัพท์อยู่ตลอด)"
1000515-89 = "ครู..."
1000515-90 = "ฉันคิดว่าจะให้ครูลองลืมทุกอย่างแล้วพักงีบสบายๆ ดูบ้าง"
1000515-91 = "แต่ครูน่ะเป็นพวกที่ถ้าไม่มีใครหาโอกาสให้ ก็จะไม่มีทางทำแบบนี้เด็ดขาดนี่นะ "
1000515-92 = "เพราะงั้นฉันเลยให้ยืมไงล่ะ หมอนนี่เป็นของสำคัญมากๆ ของลุงเลยนะ"
1000515-96 = "ครู...? หลับไปแล้วงั้นเหรอ?"
1000515-97 = "ก็นะ..."
1000515-99 = "ครูเอง... ก็เป็น..."
1000515-103 = "คนที่... สำคัญ... สำหรับฉัน..."
1000515-112 = "(คุณครูหลับไปพักใหญ่...)"
1000515-117 = "(พอลืมตาขึ้นมา คุณครูก็พบว่าเป็นช่วงเย็นที่ดวงอาทิตย์ลับขอบฟ้าไปแล้ว)"
1000515-118 = "[ns7] \"เย็นแล้วเหรอ...\"\n[ns8] \"หลับไม่รู้เรื่องเลยแฮะ สงสัยคงจะเหนื่อยเกินไป...\""
1000515-121 = "เอ๋ ตื่นแล้วเหรอ ครู?"
1000515-126 = "ฉันเห็นครูนอนหลับสบาย ก็เลยเผลอหลับไปด้วยน่ะ แหะๆ..."
1000515-127 = "หืม...??"
1000515-128 = "แน่นอนว่าหมอนใบนั้นเป็นอุปกรณ์ลับของลุง แต่อย่างลุงน่ะ ถึงไม่มีหมอนก็นอนในที่แบบนี้ได้สบายๆ เลยนะ"
1000515-129 = "จะเรียกว่าการเพิ่มความสมดุลได้มั้ยนะ? แนวๆ ให้ 'นักนอนกลางวันมือใหม่' ยืมน่ะ?"
1000515-130 = "ถ้างั้น..."
1000515-131 = "ตอนนี้ก็เริ่มมืดแล้วแฮะ ครู... รีบกลับไปพักผ่อนให้เต็มที่เตรียมรับมือกับงานพรุ่งนี้เถอะ"
1000515-132 = "เดี๋ยวลุงจะเดินไปส่งถึงข้างหน้าเอง ลุงเป็นคนเรียกให้คุณครูมานี่นะ ก็ต้องรับผิดชอบหน่อย#nจะได้หายห่วง"
1000515-133 = "อืม ปกติลุงก็ออกลาดตระเวนรอบๆ บ่อยๆ อยู่เหมือนกัน..."
1000515-134 = "แต่ก็แค่เผื่อๆ ไว้น่ะ แค่เผื่อเอาไว้เฉยๆ ไม่ต้องกังวลหรอกนะ เข้าใจมั้ย?"
1000515-135 = "หืม...?"
1000515-136 = "ชอบ... หมอนใบนี้งั้นเหรอ?"
1000515-137 = "จะหาซื้อได้ที่ไหนน่ะเหรอ...?"
1000515-142 = "แหะๆ..."
1000515-143 = "ไม่ได้ๆ เรื่องนั้นบอกไม่ได้หรอก ถ้าเกิดบอกไป คราวหน้าก็เอามาใช้เป็นข้ออ้างชวนคุณครูมา#nแบบนี้ไม่ได้น่ะสิ"
1000515-144 = "ที่จริง ก่อนอะบิดอสจะกลายมาเป็นเหมือนทุกวันนี้ เมื่อก่อนจะมีร้านค้าที่ขายอยู่ใกล้ๆ โรงเรียนด้วย แต่ตอนนี้คงหาไม่ได้แล้วละ"
1000515-145 = "ตอนนี้เข้าใจรึยังล่ะ? ว่า <บัตรผ่านไปได้ทุกที่> ของลุงเป็นของล้ำค่าที่เหลือเพียงชิ้นเดียวในโลกแล้ว"
1000515-150 = "เพราะงั้นครู..."
1000515-151 = "ถ้าอยากใช้ละก็ต้องมาบอกตาลุงคนนี้นะ"
1000515-152 = "เข้าใจมั้ย...?"
1000515-154 = "(หลังจากที่โฮชิโนะเดินมาส่งคุณครูที่นอกเขตอะบิดอสแล้ว คุณครูก็กลับไปที่ห้องพักผ่อนของชาเล่ต์)"
1000515-155 = "(และคุณครูก็ได้รู้ว่าหมอนที่อยู่ที่ห้องพักผ่อน ไม่มีใบไหนที่ใช้หนุนแล้วให้ความรู้สึกเหมือนกับ#nหมอนใบนั้นได้เลย)"

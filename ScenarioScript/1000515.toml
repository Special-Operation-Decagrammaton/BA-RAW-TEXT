[translation]
1000515-1 = "暢通無阻入場券"
1000515-3 = "（為了聽取星野的請託，前往了對策委員會的部室）"
1000515-10 = "嗯？這個聲音……"
1000515-11 = "是老師嗎？這個時段一定是吧～？"
1000515-17 = "唔嘿～果然沒錯。"
1000515-18 = "謝謝你，老師。#n我本來還有點半信半疑，沒想到你連這種小小的請求都願意接受呢。"
1000515-19 = "……嗯？其他人？"
1000515-20 = "可愛的後輩們今天都有行程。#n所以才會像這樣請老師過來。"
1000515-21 = "如果是單純想道謝，或者只是因為有時間玩而把老師找來，我倒是不介意……"
1000515-22 = "畢竟大家都很依賴老師嘛～#n想找老師諮詢或幫忙的事實在太多了。"
1000515-23 = "但如果總是這樣……過度依賴老師也讓人有點傷腦筋吧？"
1000515-24 = "而且每次都只在有事的時候才把老師叫來，還是會讓我覺得有點不好意思。#n就算老師是大人也一樣。"
1000515-25 = "[s1]「我完全不介意的哦？」\n[s2]「不必客氣，我反而很樂意。」"
1000515-28 = "唔嘿……嗯。#n老師果然會這麼說。"
1000515-29 = "但是獨立是很重要的……"
1000515-30 = "……不。"
1000515-31 = "這種話由大叔我來說可能不太適合。#n畢竟大叔我反而才是該朝這個方向努力的人啊。"
1000515-35 = "我知道我知道，別用那種眼神看我嘛。"
1000515-36 = "對大叔我來說，被老師用那種眼神看著最傷腦筋了……就像綾音醬發火的時候一樣。"
1000515-37 = "總之，那不是今天的正題。"
1000515-38 = "我一個人打發時間的時候突然想起老師，所以才會請老師過來。"
1000515-39 = "[s3]「……想起我？」\n[s4]「這麼突然！？」"
1000515-42 = "好了好了，別開玩笑了。"
1000515-43 = "老師……"
1000515-44 = "可以看一下這個嗎？"
1000515-50 = "[ns5]「這不是星野的枕頭嗎？」\n[ns6]「嗯？為什麼突然要我看這個……？」"
1000515-53 = "看來老師還不知道呢……其實這不是普通的枕頭。"
1000515-54 = "這是大叔我專屬的寶物，具有神祕力量的「暢通無阻入場券」哦～"
1000515-58 = "呵呵……從老師的表情來看，你好像還不知道我在說什麼呢。"
1000515-59 = "不過應該也不必一一用嘴巴說明吧。#n老師，可以麻煩你坐在這裡嗎？"
1000515-64 = "嗯～嗯，很好。"
1000515-65 = "擺好姿勢之後……來，把這個夾在胸口和手臂之間。"
1000515-69 = "嗯，非常好。"
1000515-70 = "接著就這樣閉上眼睛……"
1000515-81 = "這是能在世界的任何地方進入舒服夢鄉的無敵票券哦。"
1000515-85 = "（枕頭就如星野所說的非常柔軟，同時意識也逐漸模糊）"
1000515-86 = "（在昏睡過去的期間，似乎聽到星野在身旁喃喃自語）"
1000515-89 = "……老師。"
1000515-90 = "有時候我會想，老師是不是也該忘掉一切，睡個舒服的午覺。"
1000515-91 = "但是如果學生不幫老師準備舒適的睡覺環境，老師就不會好好睡覺。"
1000515-92 = "所以我才會借給老師的哦。#n畢竟這對大叔我來說，真的是非常珍貴的寶物。"
1000515-96 = "……老師？這麼快就睡著了嗎？"
1000515-97 = "唔……"
1000515-99 = "老師……對我來說也是……"
1000515-103 = "很重要的……人……"
1000515-112 = "（就這樣不知睡了多久……）"
1000515-117 = "（等到再次睜開眼睛時，已經到了晚上）"
1000515-118 = "[ns7]「這麼快就晚上了……」\n[ns8]「居然會累得睡到不醒人事……」"
1000515-121 = "……哎呀，你醒了嗎？老師。"
1000515-126 = "看老師睡得太舒服，我也不知不覺在一旁睡著了呢。唔嘿……"
1000515-127 = "……嗯？"
1000515-128 = "雖然那個枕頭是大叔珍藏的東西，但大叔就算沒有它也能睡得很好哦。"
1000515-129 = "該說是為了平衡嗎？借給「午睡新手」的感覺？"
1000515-130 = "那麼……"
1000515-131 = "現在時間也不早了。#n老師就回去好好休息，準備明天的工作吧？"
1000515-132 = "我送你到附近。#n畢竟是大叔我請你過來的，當然也該負責送你回去，這樣我心裡會比較舒服。"
1000515-133 = "反正我本來就常在這附近巡邏……"
1000515-134 = "所以真的只是順路而已，不必覺得有壓力，知道嗎？"
1000515-135 = "……嗯？"
1000515-136 = "……這個枕頭？#n……老師喜歡嗎？"
1000515-137 = "問我哪裡買得到……？"
1000515-142 = "……唔嘿。"
1000515-143 = "不行不行，這個必須保密。#n如果告訴你的話，下次可就不能用一樣的理由叫老師來了。"
1000515-144 = "雖然這麼說，其實這是阿拜多斯變成現在這樣之前，在附近的商店裡買的……#n所以現在已經買不到了。"
1000515-145 = "這樣明白了嗎？#n大叔的「暢通無阻入場券」可是世界上獨一無二的寶物哦。"
1000515-150 = "……所以老師。"
1000515-151 = "以後如果有需要的話，就直接告訴大叔我吧。"
1000515-152 = "……知道了嗎？"
1000515-154 = "（之後在星野的護送下離開阿拜多斯，回到了夏萊）"
1000515-155 = "（休息室的其他坐墊和枕頭確實無法讓人感受到相同的睡意）"

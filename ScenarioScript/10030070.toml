[translation]
10030070-1 = "ตอนที่ 7;ทิวทัศน์แรก"
10030070-5 = "งืม... งืมมม..."
10030070-9 = "มากิ ตื่นได้แล้ว"
10030070-10 = "วันนี้เราจะตื่นแต่รุ่งสางแล้วไปดูพระอาทิตย์แรกของปีด้วยกันไม่ใช่เหรอ?"
10030070-16 = "แต่ว่า... ขออีก 10 นาทีได้มั้ย...? "
10030070-17 = "ไม่ได้ ถ้าจะไปให้ถึงยอดเขาก่อนพระอาทิตย์ขึ้น ตอนนี้เราก็ควรออกเดินทางกันแล้ว"
10030070-18 = "รีบตื่นมาจัดของแล้วเตรียมขึ้นไปได้แล้ว อากาศช่วงเช้ามืดจะหนาวกว่าปกติ ใส่เสื้อผ้าอุ่นๆ ไปด้วยล่ะ"
10030070-19 = "อืม..."
10030070-25 = "[ns1] \"อรุณสวัสดิ์ มากิ\"\n[ns2] \"สวัสดีปีใหม่นะ\""
10030070-26 = "อรุณสวัสดิ์ คุณครู"
10030070-27 = "สวัสดีปีใหม่ด้วย..."
10030070-28 = "จะว่าไป นี่คือวันแรกของปีใหม่เลยนี่นา"
10030070-29 = "ปกติในวันแรกของปี ฉันจะเข้านอนตอนเช้าเพราะโต้รุ่งจากคืนก่อนหน้า แต่ปีนี้ได้ตื่นในเวลานี้ด้วย รู้สึกประหลาดๆ แฮะ..."
10030070-30 = "เดี๋ยวนะ ถ้าลองคิดดูแล้ว ที่ผ่านมาฉันแทบจะไม่นอนเร็วและตื่นเช้าเลย..."
10030070-36 = "มากิก็ตื่นแล้วสินะ"
10030070-37 = "อรุณสวัสดิ์ค่ะคุณครู"
10030070-38 = "[s] \"อรุณสวัสดิ์ทั้งสองคน\""
10030070-39 = "ฮ้าวว... ง่วงจัง..."
10030070-40 = "เวลาแบบนี้ต้องได้เครื่องดื่มชูกำลังที่มีคาเฟอีนสูงๆ ให้ตื่นสักขวด..."
10030070-41 = "วันนี้ฉันก็อยากดื่มเครื่องดื่มชูกำลังเหมือนกันค่ะ..."
10030070-46 = "ถึงจะไม่มีเครื่องดื่มชูกำลัง แต่ก็มีกาแฟเข้มๆ ที่ฉันชงไว้อยู่นะ"
10030070-50 = "เอาละ ถึงจะไม่อยากกิน แต่ก็รับช็อกโกแลตบาร์นี้ไปกินคนละอันนะ เราต้องใช้พลังงานในการปีนเขา#nตอนเช้า"
10030070-51 = "และถ้ามีใครรู้สึกว่าร่างกายผิดปกติตรงไหนก็ให้รีบรายงานทันที เข้าใจมั้ย?"
10030070-56 = "ค่า~"
10030070-58 = "(หลังจากเตรียมตัวอย่างง่ายๆ ทุกคนก็เริ่มปีนเขาและมุ่งหน้าไปยังยอดเขาด้วยกัน)"
10030070-63 = "แฮ่ก... แฮ่ก..."
10030070-64 = "ยังไม่ทันไร... ฉันก็หมดแรงแล้ว..."
10030070-65 = "ไม่ไหวแล้ว~"
10030070-66 = "รุ่นพี่~ อีกไกลมั้ยกว่าจะถึงยอดเขา?"
10030070-71 = "เรามากันได้ครึ่งทางแล้ว อดทนกันอีกหน่อยนะ"
10030070-75 = "จะว่าไป อากาศแย่ไม่ใช่เล่นเลยนะ"
10030070-76 = "ถ้าทัศนวิสัยเป็นแบบนี้ ต่อให้ไปถึงยอดเขาก็อาจจะไม่เห็นพระอาทิตย์ขึ้นก็ได้..."
10030070-83 = "เอ๋? เหมือนพงไม้ทางโน้นขยับเลย"
10030070-84 = "ยะ... อย่าบอกนะว่ามีหมีออกมาเหมือนเมื่อวาน..."
10030070-85 = "เฮือก..."
10030070-101 = "เอ๋ สมาชิกเวอริทัส? และเทรนเนอร์ด้วย..."
10030070-108 = "อ๊ะ รุ่นพี่สึมิเระ สวัสดี!"
10030070-110 = "สวัสดีค่ะมากิ ไม่คิดเลยนะคะว่าจะได้มาเจอกันที่นี่อีก"
10030070-111 = "สวัสดีปีใหม่นะคะทุกคน"
10030070-112 = "[s] \"สึมิเระก็ด้วยนะ สวัสดีปีใหม่\""
10030070-114 = "[ns] \"เมื่อคืนหลับสบายดีมั้ย?\""
10030070-118 = "ไม่ค่ะ ไม่รู้ว่าเพราะไม่ได้มาพักแรมกลางแจ้งนานแล้วรึเปล่า เมื่อคืนก็เลยนอนไม่ค่อยหลับน่ะค่ะ..."
10030070-119 = "ฉันก็เลยปีนเขาไปออกกำลังกายตอนเช้าเพื่อให้ร่างกายกระปรี้กระเปร่ามาค่ะ"
10030070-120 = "พอได้ขยับตัวเบาๆ ก็รู้สึกมีชีวิตชีวาขึ้นมาหน่อยแล้วค่ะ"
10030070-121 = "นี่ไม่เรียกว่าเบาๆ นะคะ?!"
10030070-122 = "ที่ออกกำลังกายมาเมื่อวานยังไม่ทันหายเมื่อยเลย แล้ววันนี้ยังให้วิ่งสู้ฟัดตามเส้นทางที่ขรุขระอีก ทางเดินเขาดีๆ มีก็ไม่เลือกไป..."
10030070-123 = "ประสาทสั่งการในการออกกำลังกายของรุ่นพี่สึมิเระเป็นยังไงกันคะเนี่ย?!"
10030070-124 = "ฮุฮุ เราจะแข็งแรงตามการขยับร่างกายค่ะ"
10030070-125 = "ถ้าเรย์มาฝึกฝนกับฉันอีกเรื่อยๆ การตีโฮมรันในฤดูกาลหน้าจะไม่ใช่แค่ความฝันแน่นอนค่ะ"
10030070-129 = "แล้วถ้าเป็นการตีโฮมรันสองครั้งติดต่อกันล่ะ..."
10030070-130 = "จะว่าไป ทุกคนมาปีนเขากันตั้งแต่เช้าเลยเหรอคะเนี่ย เรื่องแบบนี้ไม่น่าเกิดขึ้นบ่อยๆ เลยนะคะ"
10030070-131 = "หรือว่าปณิธานปีใหม่ของทุกคนคือการออกกำลังกายเป็นงานอดิเรกคะ?"
10030070-133 = "ฉันก็ไม่อยากให้การออกกำลังกายเป็นถึงงานอดิเรกหรอกนะ..."
10030070-134 = "แต่ว่ารองหัวหน้าชวนพวกเรามาดูพระอาทิตย์แรกของปี เราก็เลยกำลังขึ้นไปยังยอดเขาอยู่น่ะค่ะ"
10030070-136 = "อืม... ถ้าจะขึ้นไปดูพระอาทิตย์แรกของปีละก็..."
10030070-140 = "ขอโทษนะคะ แต่ฉันว่าล้มเลิกแพลนจะไปดูพระอาทิตย์ขึ้นดีกว่าค่ะ"
10030070-144 = "ทำไมล่ะ?!"
10030070-145 = "ตอนนี้อาจจะยังไม่เห็นเพราะพระอาทิตย์ยังไม่ขึ้น แต่วันนี้มีเมฆค่อนข้างมากเลยค่ะ"
10030070-146 = "ในอากาศมืดครึ้มแบบนี้ ต่อให้พระอาทิตย์ขึ้น แต่ก็มีความเป็นไปได้สูงที่จะไม่ได้ดูวิวพระอาทิตย์ขึ้นได้#nอย่างเต็มที่ค่ะ"
10030070-147 = "ทุกคนน่าจะคาดหวังกันมาไม่น้อยเลย แต่ฉันกลัวว่าขึ้นไปแล้วจะผิดหวังกันน่ะค่ะ"
10030070-149 = "แต่พยากรณ์อากาศบอกว่าอากาศจะแจ่มใสนี่นา..."
10030070-150 = "[s] \"ทำยังไงกันดีล่ะ...\""
10030070-155 = "ทุกคนว่าไง?"
10030070-156 = "ถึงฉันจะเป็นคนเสนอก็เถอะ แต่ถ้าสภาพอากาศไม่ดี เราก็ไม่จำเป็นต้องฝืนขึ้นไปถึงยอดเขาก็ได้"
10030070-165 = "ไปกันต่อ"
10030070-166 = "ก็ได้ กะไว้แล้วละว่าอยากกลับ..."
10030070-170 = "หืม? จะไปต่อให้ถึงยอดเขางั้นเหรอ?"
10030070-171 = "อื้ม ไหนๆ เราก็ออกมาข้างนอกกันแล้ว"
10030070-173 = "ในเมื่อขึ้นมาถึงนี่แล้ว จะให้กลับไปเลยทั้งๆ ที่ยังไม่ถึงยอดเขามันน่าเสียดายกว่าอีกนะคะ"
10030070-174 = "ฉันไม่ใช่พวกที่สนุกกับการเล่นอะไรน่าเบื่อๆ ซ้ำๆ หรอกนะ..."
10030070-175 = "แต่ถ้ายังไม่ถึงด่านบอส เราก็ยังไม่ควรปิดเกมใช่ไหมล่ะ!"
10030070-177 = "แต่ถ้าจะไปให้ถึงยอดเขา ก็อีกตั้งครึ่งทางเลยนะ..."
10030070-178 = "พวกเธอไม่ได้ไม่ชอบการเหน็ดเหนื่อยแต่ไม่ได้ผลลัพธ์หรอกเหรอ?"
10030070-180 = "ถ้าเราขึ้นไปถึงยอดเขาแล้วไม่ได้ดูพระอาทิตย์ขึ้นมันก็คงน่าเสียดายอยู่หรอก"
10030070-181 = "แต่ถ้าไม่ได้ดู ก็เอาไว้ดูจากมอนิเตอร์ในห้องชมรมก็ได้ค่ะ"
10030070-182 = "สิ่งที่เรายังไม่เคยลองทำก็คือการปีนเขานี่ละ"
10030070-188 = "ไม่อยากจะเชื่อหูเลย พระอาทิตย์แรกของปีนี้จะขึ้นทางทิศตะวันตกรึเปล่าเนี่ย"
10030070-189 = "เป็นความตั้งใจที่ยอดเยี่ยมเลยค่ะ!"
10030070-190 = "ถึงนี่จะเป็นสิ่งที่มักถูกมองข้ามไป แต่คุณค่าที่แท้จริงของการฝึกฝนไม่ได้อยู่ที่การสร้างหุ่นสวย แต่อยู่ที่กระบวนการของการออกกำลังกายซ้ำๆ เพื่อที่จะไปถึงจุดนั้นมากกว่าค่ะ"
10030070-191 = "กับการปีนเขาก็เช่นเดียวกัน คุณค่าของการปีนเขาไม่ได้อยู่ที่ยอดเขา แต่เป็นการเดินไปทางไปสู่จุดหมายต่างหากค่ะ!"
10030070-193 = "ฉันเห็นด้วยกับความตั้งใจนี้ค่ะ งั้นพวกเราชมรมออกกำลังกายก็จะขอเป็นส่วนหนึ่งของการเดินทางนี้#nด้วยคนค่ะ!"
10030070-194 = "เรย์! จากนี้เราจะวิ่งสู้ฟัดขึ้นไปบนยอดเขาด้วยกันค่ะ!"
10030070-198 = "เดี๋ยวสิ รุ่นพี่! รุ่นพี่บอกว่าการฝึกวันนี้เราจะไม่ไปถึงยอดเขา แต่อยู่แค่กลางๆ เขาเท่านั้นไม่ใช่เหรอคะ?!"
10030070-206 = "เป็นแบบนี้ไปได้ยังไงล่ะเนี่ย...!"
10030070-211 = "งั้นเรามารวมพลังกัน แล้วไปให้ถึงยอดเขาด้วยกันเลยมั้ย?"
10030070-212 = "อีกไม่นานก็จะถึงเวลาที่พระอาทิตย์จะขึ้นแล้ว รีบไปกันเถอะ"
10030070-228 = "ถึงแล้ว..."
10030070-229 = "ที่นี่ละ ยอดเขาฮิงาชิทาเกะ"
10030070-233 = "โห ข้างบนนี้ลมพัดแรงมากเลย!"
10030070-234 = "ไม่รู้ว่าเพราะขึ้นมาถึงยอดเขาโล่งๆ รึเปล่า ฉันถึงได้รู้สึกหนาวกว่าเดิมอีกค่ะ..."
10030070-235 = "ก้อนเมฆหายไปรึยังนะ? ยังมืดอยู่จนมองไม่เห็นเลย..."
10030070-238 = "นั่นสิคะ ตอนนี้คงยังไม่รู้..."
10030070-242 = "อ๊ะ ท้องฟ้าค่อยๆ สว่างขึ้นแล้ว"
10030070-243 = "ในที่สุดพระอาทิตย์ก็ขึ้นแล้วเหรอ?"
10030070-253 = "ว้าว..."
10030070-254 = "สวยจัง..."
10030070-255 = "ท้องฟ้าทอแสงในชั่วพริบตาเลย..."
10030070-256 = "ฉันเห็นพระอาทิตย์ขึ้นจากในหน้าจอมอนิเตอร์อยู่บ่อยครั้งก็จริง แต่พอได้มาเห็นของจริงกับตา ความรู้สึกมันต่างกันจริงๆ นะเนี่ย..."
10030070-257 = "มันทั้งงดงามกว่า ระยิบระยับกว่าด้วย..."
10030070-258 = "อบอุ่นกว่ากันเยอะเลย"
10030070-262 = "ทิวทัศน์ที่เราได้เห็นบนยอดเขาหลังจากการปีนเขาอันเหน็ดเหนื่อย เป็นสิ่งที่ตราตรึงใจเกินกว่าจะหา#nอะไรเปรียบเลยค่ะ"
10030070-263 = "ดีนะเนี่ยที่เราขึ้นมาดูกันด้วยตาตัวเอง ว่ามั้ย?"
10030070-268 = "อื้ม"
10030070-269 = "ขอบคุณที่ชวนพวกเรามานะรุ่นพี่"
10030070-270 = "ตอนแรกที่รุ่นพี่ชวนมาตั้งแคมป์เพื่อดูพระอาทิตย์ขึ้น ฉันขี้เกียจมามากๆ เลย..."
10030070-271 = "ตอนนี้ฉันรู้แล้วค่ะว่าทำไมรองหัวหน้าถึงชวนเรามาแคมป์ปิ้งกัน"
10030070-273 = "ขอบใจนะที่คิดกันแบบนี้"
10030070-277 = "ในโลกนี้มีหลายสิ่งหลายอย่างที่เราไม่อาจรู้สึกถึงได้... ถ้าไม่ได้มาลองสัมผัสด้วยตัวเอง"
10030070-283 = "เสียงเมื่อกี้มัน..."
10030070-288 = "เสียงท้องร้องของเรย์รึเปล่าคะ?"
10030070-289 = "อะ... เอ่อ... คือว่า..."
10030070-290 = "ก็ช่วยไม่ได้นี่คะ! ฉันต้องตื่นมาคาร์ดิโอตั้งแต่เช้าตรู่ จะหิวก็ไม่แปลกหรอกค่ะ..."
10030070-292 = "งั้นลงไปที่เต็นท์ของพวกเราแล้วกินอาหารเช้าด้วยกันมั้ย?"
10030070-293 = "ฉันเตรียมขนมปังมากินเป็นมื้อเช้าง่ายๆ น่ะ"
10030070-298 = "[ns] \"มีแยมกับเนยให้กินกับขนมปังด้วยนะ\""
10030070-300 = "อ๊ะ งั้นฉันใช้แยมกับเนยวาดรูปบนขนมปังก่อนนะแล้วค่อยกิน!"
10030070-301 = "ฉันขอแค่ขนมปังทาเนยแผ่นเดียวก็พอค่ะ..."
10030070-302 = "ฉันอยากได้กาแฟมากกว่าขนมปัง..."
10030070-305 = "ถ้าได้กินคู่กับโปรตีนเชค ก็น่าจะเป็นอาหารเช้าที่เข้าท่าเลยนะคะ"
10030070-306 = "ก็ได้ๆ กลับไปกินขนมปังตามแบบที่ตัวเองชอบกันได้เลย"

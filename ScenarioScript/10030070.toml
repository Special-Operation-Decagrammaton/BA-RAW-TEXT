[translation]
10030070-1 = "第7話;第一道風景"
10030070-5 = "唔唔……嗯嗯嗯……"
10030070-9 = "真紀，該起床了。"
10030070-10 = "不是說好今天要早起去看新年的第一個日出嗎？"
10030070-16 = "可是……不能再睡10分鐘嗎……？"
10030070-17 = "不行，如果想在太陽升起前抵達山頂，現在出發都有點晚了。"
10030070-18 = "趕快起來收拾裝備準備上山。#n清晨的氣溫很低，別忘了把衣服穿好。"
10030070-19 = "嗯……"
10030070-25 = "[ns1]「早安，真紀。」\n[ns2]「新年快樂。」"
10030070-26 = "早安，老師……"
10030070-27 = "也祝老師新年快樂……"
10030070-28 = "……對了，今天是元旦呢。"
10030070-29 = "以前這天通常都是熬夜玩到早上才睡，在這時間起床感覺有點神奇……"
10030070-30 = "不，仔細想想，好像幾乎沒有早睡早起過……"
10030070-36 = "……真紀也起來啦。"
10030070-37 = "早安，老師。"
10030070-38 = "[s]「兩位早呀。」"
10030070-39 = "呼啊……好睏……"
10030070-40 = "這種時候要喝一杯高咖啡因能量飲料才會有精神……"
10030070-41 = "我今天也想來一杯能量飲料……"
10030070-46 = "雖然沒有能量飲料，但是我早上泡了濃濃的咖啡。"
10030070-50 = "來，就算沒胃口也吃個巧克力棒吧。#n早起爬山的時候，能量是很重要的。"
10030070-51 = "如果覺得身體怪怪的記得馬上報告，知道嗎？"
10030070-56 = "是～"
10030070-58 = "（於是在簡單準備後便開始朝山頂走去）"
10030070-63 = "哈啊，哈啊……"
10030070-64 = "這麼快就……到極限了……"
10030070-65 = "我累了～"
10030070-66 = "前輩～現在離山頂還很遠嗎？"
10030070-71 = "現在已經走到一半了，再加把勁吧。"
10030070-75 = "……話說回來，天氣有點不太尋常。"
10030070-76 = "這樣下去，說不定抵達山頂也很難看到日出……"
10030070-83 = "咦？剛剛那邊的草叢是不是在晃？"
10030070-84 = "該，該不會……跟昨天一樣又有熊出沒……"
10030070-85 = "噫噫……"
10030070-101 = "咦，貝里塔斯的各位？還有指導員……"
10030070-108 = "啊，是堇前輩。哈囉！"
10030070-110 = "早安，真紀。#n沒想到又在這裡碰面了呢。"
10030070-111 = "祝各位新年快樂。"
10030070-112 = "[s]「也祝堇新年快樂。」"
10030070-114 = "[ns]「昨晚睡得好嗎？」"
10030070-118 = "不，可能是因為很久沒野外合宿興奮過頭的關係，昨晚睡得並不好……"
10030070-119 = "所以為了讓緊張的身體完全放鬆，我選擇以登山作為晨練。"
10030070-120 = "輕鬆活動一下身體之後，現在感覺稍微恢復活力了。"
10030070-121 = "一點都不輕鬆好嗎！？"
10030070-122 = "昨天運動後的疲勞都還沒消除，居然還沿著超級難走的路全力衝刺了好幾次……"
10030070-123 = "堇前輩的運動神經到底是怎麼回事！？"
10030070-124 = "呵呵，身體就是會越用越強的東西啊。"
10030070-125 = "只要莉同學持續和我一起訓練，明年賽季要連續打出全壘打也不是夢哦。"
10030070-129 = "如果是為了連續全壘打……那就沒辦法了。"
10030070-130 = "話說回來，大家一早就開始爬山，真稀奇耶。"
10030070-131 = "……難道這是新年的決心？#n貝里塔斯的各位也決定把運動當成愛好了嗎？"
10030070-133 = "雖然沒那個打算……"
10030070-134 = "但是在副部長的勸說下，我們正為了看新年第一個日出而往山頂前進。"
10030070-136 = "嗯……目的是看新年的第一個日出啊……"
10030070-140 = "雖然可惜，但這次你們最好放棄。"
10030070-144 = "為什麼！？"
10030070-145 = "雖然太陽還沒升起所以看不清楚，但現在空中的雲還挺多的。"
10030070-146 = "這種陰天即使太陽升起，可能也很難看到完整的日出……"
10030070-147 = "難得你們抱著期待上山，可能會因此失望的哦。"
10030070-149 = "氣象預報雖然說今天是晴天……"
10030070-150 = "[s]「這下該怎麼辦……」"
10030070-155 = "……大家覺得呢？"
10030070-156 = "雖然提議的人是我沒錯，但既然天氣不如人願，也沒必要勉強爬到山頂。"
10030070-165 = "……我要繼續走。"
10030070-166 = "嗯，就知道你果然會想回──"
10030070-170 = "……嗯？你要繼續走到山頂？"
10030070-171 = "嗯，反正都難得到外面來了。"
10030070-173 = "明明已經走到這裡，不到達山頂就折返會更讓人不甘心。"
10030070-174 = "雖然我不喜歡玩周回要素……"
10030070-175 = "但頭目戰近在眼前，總不能半途而廢吧！"
10030070-177 = "可是距離山頂還剩下一半的路程……"
10030070-178 = "你們……不是討厭吃苦受罪卻沒成果的工作嗎？"
10030070-180 = "爬到山頂卻看不到日出當然很可惜……"
10030070-181 = "不過如果想看日出的話，回去之後用部室的螢幕也能看見。"
10030070-182 = "但是──爬到山頂的過程，只有親自走過才能體會。"
10030070-188 = "……這個新年會看到從西邊升起的太陽嗎？"
10030070-189 = "真是令人欽佩的心態！"
10030070-190 = "雖然這個事實經常被人忽視，不過訓練真正的價值並不在於打造好看的身材，#n而是為了達到那個狀態而反覆運動的過程。"
10030070-191 = "同樣的，登山的價值也不在於登頂，而是攀爬中的經歷的旅程。"
10030070-193 = "真是讓人深有同感。#n我們訓練部也會在這趟旅程中一起登頂！"
10030070-194 = "莉！我們馬上全力奔向山頂吧！"
10030070-198 = "等等，前輩！#n你不是說今天的訓練不會爬到山頂，只會到半山腰為止嗎！？"
10030070-206 = "怎麼這樣啦──！"
10030070-211 = "那我們就再努力一下吧？"
10030070-212 = "時間也所剩無幾了，趕緊出發吧。"
10030070-228 = "……終於到了。"
10030070-229 = "這就是東岳山的山頂。"
10030070-233 = "哇，風好大！"
10030070-234 = "可能是爬上開闊山頂的關係，感覺更冷了……"
10030070-235 = "雲散了嗎？#n周圍太暗了，什麼都看不到……"
10030070-238 = "這個嘛，現在不是很清楚……"
10030070-242 = "啊，天空漸漸亮起來了。"
10030070-243 = "太陽終於要升起了嗎？"
10030070-253 = "啊……"
10030070-254 = "……真美。"
10030070-255 = "一瞬間就讓天空充滿陽光……"
10030070-256 = "雖然經常用大螢幕看日出……#n親眼目睹的感覺的確很不一樣……"
10030070-257 = "好像更燦爛、更耀眼……"
10030070-258 = "……也更溫暖。"
10030070-262 = "經過一番苦行後看到的山頂景色，其刺激是任何東西都無法比擬且令人陶醉的。"
10030070-263 = "……親自來看果然是對的吧？"
10030070-268 = "嗯。"
10030070-269 = "謝謝你這次帶我們來，前輩。"
10030070-270 = "一開始你要抓大家去露營的時候，我其實覺得很麻煩……"
10030070-271 = "現在我好像明白副部長是以什麼樣的心情邀我們來露營了。"
10030070-273 = "你願意這麼想，我反而很感謝呢。"
10030070-277 = "……世界上有很多不親身體驗就無法感受的事物。"
10030070-283 = "剛才那個聲音是……"
10030070-288 = "莉同學，你餓了嗎？"
10030070-289 = "那，那個……因為……"
10030070-290 = "我也沒辦法嘛！#n早上起來之後就一直做有氧運動，怎麼可能不餓……"
10030070-292 = "要不要回營地跟大家一起吃早餐？"
10030070-293 = "我有帶一些麵包來。"
10030070-298 = "[ns]「還有可以搭配的果醬和奶油哦。」"
10030070-300 = "啊，那我要用果醬和奶油在麵包上畫畫後再吃掉！"
10030070-301 = "我只要一塊塗上奶油的麵包就夠了……"
10030070-302 = "比起麵包，我更想喝杯咖啡……"
10030070-305 = "如果加上高蛋白奶昔，應該會是很不錯的早餐。"
10030070-306 = "好好好，回到營地之後照自己的喜好做來吃吧。"

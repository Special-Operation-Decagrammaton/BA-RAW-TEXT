[translation]
10037020-1 = "第2話;分流之水再次匯聚"
10037020-3 = "哦哦……這裡就是……！"
10037020-5 = "山海經啊！"
10037020-6 = "原來如此，與事前調查時給人的感覺一致呢。"
10037020-7 = "智惠智惠！你看那個屋頂！看起來好神奇！"
10037020-13 = "（那些學生就是最近傳得沸沸揚揚的……！）"
10037020-14 = "（一直以來都只有耳聞，沒想到居然真的來了……！）"
10037020-18 = "嗯？怎麼感覺大家都在盯著咱們？"
10037020-19 = "肯定是被潔莉諾會長的威嚴震懾住了！不愧是會長！"
10037020-20 = "是，是嗎？#n嘿嘿，耶嘿嘿。"
10037020-22 = "唔嗯，這個氣氛……？#n原來如此，是這麼回事啊。"
10037020-23 = "（看來最好預先做好其他方面的心理準備呢）"
10037020-31 = "門主大人，有事稟報。"
10037020-36 = "來自赤冬聯邦學園的貴賓，稍早已經抵達正門。"
10037020-37 = "……是嗎。"
10037020-41 = "雖然已經說過很多次了，妾身於此再次強調。"
10037020-42 = "是次交流會，對山海經和赤冬而言都具有重大意義。"
10037020-43 = "在迎接和款待方面，絕不能有一絲輕忽。"
10037020-45 = "遵命，門主大人！"
10037020-46 = "此次交流會的重大意義，已深深銘記在心！"
10037020-48 = "……很好。"
10037020-49 = "那麼，為了迎接山海經和赤冬的交流會，妾身將下達第一道命令。"
10037020-54 = "以「玄龍門的方式」盛情款待貴賓。"
10037020-59 = "謹遵門主大人之命！"
10037020-60 = "絕不讓門主大人的名譽蒙羞！"
10037020-61 = "[s]（大家好像都太緊張了……）"
10037020-67 = "開始了呢，門主大人。"
10037020-68 = "嗯，是啊。"
10037020-69 = "……"
10037020-73 = "老師，能麻煩汝稍微靠近一點嗎？"
10037020-79 = "（如妃姬所說靠了過去）"
10037020-80 = "妾身有事相求。"
10037020-81 = "能請老師代替妾身……看看剛才離開的那些孩子，事情辦得如何嗎？"
10037020-82 = "當然妾身並非不信任他們……"
10037020-83 = "汝就當作妾身愛操心吧。"
10037020-84 = "[s] 默默點頭"
10037020-89 = "那個，門主大人？#n有什麼事請儘管吩咐，不必勞煩老師呀……？"
10037020-90 = "（要是把這種事交給美奈……萬一出了什麼問題，事態可能會更加嚴重……）"
10037020-91 = "汝不是還有更重要的任務在身嗎？"
10037020-92 = "嗯？您所謂更重要的任務指的是……？"
10037020-93 = "那就是保護玄龍門門主的工作。"
10037020-97 = "……！遵，遵命！請放心交給我吧，門主大人！#n只要有我在，就沒有人能動門主大人一根手指！"
10037020-98 = "嗯，妾身一直都信任著汝。汝可是妾身的依靠啊。"
10037020-99 = "門主大人……！"
10037020-100 = "（但願不要出什麼差錯……）"
10037020-109 = "門主大人說要用「玄龍門的方式」盛情款待。"
10037020-110 = "那就只能那麼做了吧？"
10037020-111 = "當然！沒有別的可能了！"
10037020-112 = "哼哼哼……做好覺悟吧。#n就讓你們好好見識一下，山海經正統的待客之道……！"
10037020-113 = "這是門主大人對交流會的第一道命令！"
10037020-114 = "我們絕對不能讓門主大人失望！走吧！"
10037020-120 = "審訊紀錄：092-H-8"
10037020-122 = "負責人：匿名玄龍門成員"
10037020-124 = "嫌疑人：赤冬聯邦學園三年級．連河潔莉諾"
10037020-129 = "叫什麼名字？"
10037020-130 = "不不不，等等！瑪麗娜呢？智惠呢？#n大家都跑去哪裡了？"
10037020-131 = "咱明明是來旅行……啊不對，是來參加交流會的啊！？#n為什麼現在會……難，難道是政變嗎？還是陷阱！？"
10037020-133 = "吵死了！我在問你叫什麼名字！"
10037020-134 = "你們才吵吧！咱可是赤冬的學生會長、環境美化部部長兼、書記長兼、#n體育部代表兼、整潔部部長兼、風紀委員長兼供餐部長。"
10037020-135 = "同時還被選為本月最優秀布丁試吃家，#n並親自指揮蜂蜜蛋糕生產工程的潔莉諾大人！"
10037020-136 = "這自我介紹也太囉唆了……算了，有名字就好。#n唔嗯……而且好像還說了一堆自己管轄的地方。"
10037020-137 = "話說你管的地方也太多了吧……"
10037020-138 = "好，下一個問題……興趣是什麼？"
10037020-139 = "越聽越覺得有夠失禮！#n明明是你們山海經送交流會的邀請函過來……！"
10037020-140 = "赤冬可不會忘記這件事的！#n到底為什麼要把咱拖到這裡來！"
10037020-142 = "為什麼要把你「款待」到這裡？#n那是因為門主大人親自……"
10037020-146 = "下令以「玄龍門的方式」盛情款待貴賓！"
10037020-147 = "玄龍門的方式到底是什麼啊！？"
10037020-151 = "[ns]（這……）"
10037020-153 = "[ns]（是不是很不妙……？）"
10037020-156 = "[ns]「哈啊，哈啊……！妃姬？妃姬醬？出大事了！」"
10037020-157 = "怎麼了嗎？老師。#n等等，從老師的表情和聲音看來……"
10037020-158 = "……情況究竟如何，但說無妨。"
10037020-161 = "（簡潔地將在地下審訊室目擊到的情況告訴了妃姬）"
10037020-165 = "唉……"
10037020-166 = "妾身明白了。有勞汝了，老師。#n得先整頓一下這場混亂和無禮……"
10037020-167 = "現在立刻將妾身的話……不，還是由妾身親自下令吧。"
10037020-168 = "把訪客視為「重要的客人」相待。"
10037020-172 = "……"
10037020-173 = "（差，差點就惹上大麻煩了。#n　如果換作是我，肯定也會把他們通通拖進審訊室……！）"
10037020-175 = "老師，能麻煩汝稍微靠近一點嗎？"
10037020-180 = "（如妃姬所說靠了過去）"
10037020-181 = "妾身還有一事相求。"
10037020-182 = "[s] 像全都明白似地安靜點頭"
10037020-183 = "嗯……原來如此，在此先向汝致謝。"
10037020-184 = "能有個好溝通的交談對象，真是值得欣慰……"
10037020-188 = "美奈。"
10037020-193 = "我，我我我我在！門主大人請說？"
10037020-194 = "汝的應對方式……應該會有所不同吧？"
10037020-195 = "那那那那那，那當然，門主大人！#n我，我我我我，我怎麼可能犯那種低級的錯誤呢……！"
10037020-196 = "……就當作是那樣吧。"
10037020-201 = "唔唔……被門主大人輕聲地訓了一頓……"
10037020-202 = "那樣就代表門主大人真的生氣了。真糟糕……"
10037020-203 = "不，不過！門主大人剛才也說，#n只要這次應對得當，就會寬容地對剛才的失態既往不咎！"
10037020-204 = "是啊！現在沒時間拖拖拉拉的了！"
10037020-205 = "門主大人吩咐要將訪客視為重要的客人接待……這次就清楚多了！"
10037020-206 = "不能再讓門主大人失望！走吧！"
10037020-216 = "剛才的審訊室還不夠，這次乾脆直接關進監獄了嗎！？"
10037020-221 = "唔，唔嗯……因為種種原因，我已經習慣這種地方了……"
10037020-222 = "……這究竟是怎麼回事？#n莫非參加交流會的邀請，打從一開始就是為了讓我們掉入陷阱的詭計嗎？"
10037020-223 = "這就是山海經黑色君主的陰謀……？"
10037020-225 = "吵死了！勸你們最好從實招來，來山海經到底有什麼企圖！"
10037020-226 = "如果不招的話……！"
10037020-232 = "哈……！？那，那難道是！？"
10037020-233 = "怎，怎麼了？瑪麗娜委員長？"
10037020-235 = "就算是來自遠方的赤冬訪客……也一定知道這是什麼動物！"
10037020-236 = "沒錯。這就是我們山海經的名物，熊貓！"
10037020-237 = "如果你們不乖乖據實以告……"
10037020-238 = "我就當場把這隻小熊貓正吃得津津有味的竹筍搶走！"
10037020-243 = "太，太邪惡了……！#n小熊貓是無辜的啊！快放開牠！"
10037020-244 = "居然欺負熊貓……欺負熊……而且甚至還是熊寶寶！#n你們的血到底是什麼顏色的──！"
10037020-246 = "如果看不下去就快把陰謀通通說出來！#n哼哼……否則只要像這樣，把牠吃到一半的竹筍稍微拿開……！"
10037020-251 = "啾！？"
10037020-252 = "住手啊啊啊啊啊啊啊──！"
10037020-256 = "[ns]（又出大事了！？）"
10037020-264 = "門，門主大人！？"
10037020-265 = "[s1]「不行啊，妃姬！妃姬醬！振作一點！」\n[s2]「交流會現在才剛開始！」"
10037020-270 = "……老師所言甚是。#n真是恰合時宜的建議。"
10037020-271 = "美奈。"
10037020-272 = "是，是！門主大人！"
10037020-273 = "由汝親自傳達吧。#n交代下去，要將赤冬的訪客……視為「玄龍門的門主般侍奉」。"
10037020-274 = "您，您這話的意思是……！？"
10037020-275 = "動作快。已經沒時間了。"
10037020-279 = "我馬上去辦！"
10037020-283 = "……妾身有件事想請教，老師。"
10037020-284 = "[s]「……嗯，儘管問吧。」"
10037020-285 = "妾身……算是不善言詞之人嗎？"
10037020-286 = "無法準確地下達命令嗎？"
10037020-287 = "[s]「至少我不這麼認為……」"
10037020-288 = "那其他人究竟為何一而再再而三地……老師知道原因嗎？"
10037020-289 = "[s] 「……」"
10037020-290 = "拜託了……"
10037020-291 = "哪怕僅有一點也罷，好好聽妾身的話吧……"
10037020-295 = "這到底是怎麼回事！#n咱可是聽說是交流會才過來的……結果山海經那些傢伙……！"
10037020-296 = "好好好，你先冷靜，潔莉諾醬……不，潔莉諾書記長。#n現在正是展現大度與寬容的時候哦。"
10037020-297 = "剛才似乎發生了一些「小小的」誤會，不過如今那些誤會都已經解開了。"
10037020-299 = "你說那些是小小的誤會？智惠秘書室長……"
10037020-300 = "他們剛才對熊貓那麼殘忍……甚至還是對小熊貓……！"
10037020-301 = "呵呵，一句話之中本來就可能帶有各種含意。"
10037020-302 = "而方才的這些誤會，將來應該能以某種形式加以活用才對。"
10037020-307 = "現在就先享受山海經的玄龍門，為了表示歉意所提供的東西吧。"
10037020-308 = "說的也是。#n咱們赤冬的制服，在這裡確實有點熱。"
10037020-312 = "來，把手舉起來哦，潔莉諾醬。"
10037020-322 = "赤冬的訪客要登上六和閣了！"
10037020-323 = "請大家帶著真誠的歡迎來迎接赤冬的訪客！"
10037020-333 = "唔……這，這樣真的好嗎……？#n肩膀和腿都……！"
10037020-338 = "[ns]「你是……誰！？」"
10037020-342 = "老，老師怎麼會在這裡……！#n話說你不認得我了嗎！？難道老師也在這裡遭到了殘忍的對待！？！？"
10037020-343 = "[s]「不是，我不是那個意思啦！？」"
10037020-344 = "咦……！？因為太適合了，還以為是別人……？#n原來是這樣啊，說話不要那麼拐彎抹角的嘛！搞得我很亂耶！"
10037020-345 = "好了好了，瑪麗娜委員長。那也是老師稱讚別人的方式呀。"
10037020-346 = "[s3]「智惠……該怎麼說呢……」\n[s4]「真的很適合，感覺就像為你設計的一樣！」"
10037020-349 = "哎呀，感謝您的稱讚，老師。"
10037020-350 = "呵呵，我從以前就有這種感覺……#n從老師能及時說出恰合時宜的話這點來看，老師也具備相當出色的煽動資質吧？"
10037020-351 = "[s]「我不會煽動別人啦……」"
10037020-356 = "唔……！不知道為什麼有點嫉妒耶……！#n同志！咱明明也在這裡啊！"
10037020-357 = "[s5]「哇，真的很適合你哦，潔莉諾！」\n[s6]「尤其是那頭辮子和外套！」"
10037020-360 = "是，是嗎？#n耶嘿嘿……同志果然有眼光！"
10037020-364 = "咦？鬍子跑哪去了……？#n什，什麼！？智惠！"
10037020-370 = "……剛才什麼事也沒發生。對吧，智惠？"
10037020-371 = "您說的是，書記長。"
10037020-376 = "（那個假鬍子是赤冬的文化嗎……？）"
10037020-377 = "（不錯，看來舉辦交流會是正確的決定。一時半刻便發生如此多令人大開眼界的事）"
10037020-379 = "歡迎蒞臨山海經。"
10037020-387 = "在此感謝諸位接受妾身本次的邀請。#n赤冬的潔莉諾書記長、智惠秘書室長、瑪麗娜委員長。"
10037020-388 = "妾身名叫龍華妃姬，擔任相當於山海經學生會的組織，玄龍門的門主。"
10037020-390 = "初次見面，妃姬門主大人。"
10037020-394 = "來，潔莉諾醬？展現威嚴的時候到囉。#n照我之前告訴你的……不對，照練習的去做吧……"
10037020-395 = "是，是嗎！？好，好吧……！"
10037020-400 = "感謝你的盛大歡迎，妃姬門主。"
10037020-401 = "咱就是身兼赤冬的學生會長、環境美化部部長兼、書記長兼、#n體育部代表兼、整潔部部長兼、風紀委員長兼供餐部長。"
10037020-403 = "同時還被選為本月最優秀布丁試吃家，#n並親自指揮蜂蜜蛋糕生產工程的潔莉諾大人！"
10037020-408 = "（如此冗長的自我介紹，簡直能讓聽者靈魂出竅……#n　而且還刻意提及了「盛大歡迎」啊……這代表絕對不會忘記那筆帳的意思吧）"
10037020-409 = "（然而這也沒辦法。畢竟是先前自行埋下的禍根）"
10037020-410 = "（氣勢之戰已經開始了。#n　儘管早已心裡有數，不過果然並非等閒之輩啊，潔莉諾書記長）"
10037020-412 = "怎麼樣，智惠？咱沒有做錯吧？做得很好吧？"
10037020-413 = "做得很好唷，潔莉諾醬。非常有威嚴哦。"

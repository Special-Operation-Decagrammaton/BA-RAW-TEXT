[translation]
10037020-1 = "Episode 2;The Divided Waters Unite"
10037020-3 = "Whoa... So this is...!"
10037020-5 = "This is Shanhaijing!"
10037020-6 = "It's just like my research said it would be!"
10037020-7 = "Tomoe, Tomoe! Look over there! The roof! It's so interesting!"
10037020-13 = "(Those must be the students from the rumors!)"
10037020-14 = "(I've heard all about them, but I never thought I would see them in person...!)"
10037020-18 = "Hm? Does it feel like people are watching us?"
10037020-19 = "I'm certain they're all inescapably impressed by your aura, Great Leader! It's to be expected!"
10037020-20 = "Y-You think so? Heehee. Heeheehee."
10037020-22 = "Hm? I sense a shift somewhere... I see. "
10037020-23 = "(Perhaps it would be wise to prepare ourselves in a different way.)"
10037020-31 = "A report, Madam."
10037020-36 = "We have received word that our visitors from Red Winter Federal Academy have just arrived at the front gates."
10037020-37 = "...I see."
10037020-41 = "I've said this many times already, but I will say it again. "
10037020-42 = "This exchange meeting will be a meaningful event to both Shanhaijing and Red Winter."
10037020-43 = "I expect all of you to greet and treat them with all due decorum."
10037020-45 = "As you say, Madam!"
10037020-46 = "We will carve into our hearts the gravity of this occasion!"
10037020-48 = "...Good."
10037020-49 = "Then I shall make my first command for this exchange meeting between Shanhaijing and Red Winter."
10037020-54 = "Be sure to give our guests a proper Genryumon greeting."
10037020-59 = "As you command, Madam!"
10037020-60 = "We swear that no shame will come to your name or reputation!"
10037020-61 = "[s] \"(Everyone seems a little too tense...)\""
10037020-67 = "So it begins, Madam President."
10037020-68 = "Yes, it has."
10037020-69 = "..."
10037020-73 = "Sensei, come over here please."
10037020-79 = "I approached Kisaki, as she asked."
10037020-80 = "I have a request to make of you."
10037020-81 = "The girls who just left... Would you keep an eye on them?"
10037020-82 = "It's not that I don't trust them, it's just..."
10037020-83 = "Consider it my own needless concern."
10037020-84 = "[s] Nod silently."
10037020-89 = "Um, Madam President? If you need help, perhaps I could be of assistance instead of Sensei...?"
10037020-90 = "(...If I entrust this to Mina, there's a remote chance she may make things worse...)"
10037020-91 = "You have a more important job, do you not?"
10037020-92 = "What? A more important job...?"
10037020-93 = "I'm referring to your duty to protect Genryumon's own president."
10037020-97 = "...! O-Of course! You can count on me, Madam President! As long as I breathe, no one will be allowed to lay a finger on you!"
10037020-98 = "I have no doubt. I know I can count on you."
10037020-99 = "Madam...!"
10037020-100 = "(...I hope nothing bad happens...)"
10037020-109 = "Madam clearly instructed them to give a proper \"Genryumon greeting.\""
10037020-110 = "It must mean that, right?"
10037020-111 = "Obviously! What else could it mean?"
10037020-112 = "Heeheehee... I hope they're ready. We'll show them how we do things in Shanhaijing...!"
10037020-113 = "We need to put Madam's first exchange meeting command into action!"
10037020-114 = "We can't disappoint her! Let's go!"
10037020-120 = "Interrogation Log: 092-H-8"
10037020-122 = "Interrogator: Anonymous Genryumon Member"
10037020-124 = "Suspect for Investigation: Renkawa Cherino, Red Winter Academy, 3rd Year"
10037020-129 = "Name?"
10037020-130 = "No, no, no, wait! Where's Marina? Tomoe? Where did everyone go?"
10037020-131 = "I was told this was a trip, I mean, an exchange meeting! So why...? O-Oh, I see! This is a coup d'etat, isn't it? A trap?!"
10037020-133 = "That's enough! I asked for your name!"
10037020-134 = "Th-That's enough from you! I am Red Winter's student council president, Chief Beautification Officer, Main Secretary, Chief of Sanitation, Athletics Club Captain, Head of All Prefects, Chief of Sanitation, and Maven of Meal Service."
10037020-135 = "More recently, I was selected as this month's most excellent pudding gourmet and even the director of castella production!"
10037020-136 = "...Well, that was...long. But I guess your name was in there somewhere—along with your affiliations."
10037020-137 = "Why do you have so many roles...?"
10037020-138 = "Actually, no. Nevermind. Let's move on... Any hobbies?"
10037020-139 = "How rude! I seem to remember Shanhaijing was the one who invited us to this exchange meeting...! "
10037020-140 = "Red Winter will remember this! Why did you drag me here?!"
10037020-142 = "We escorted you here, because the president herself commanded it."
10037020-146 = "She told us to give our guests a proper Genryumon greeting!"
10037020-147 = "What does that even mean?!"
10037020-151 = "[ns] \"(...Oh boy.)\""
10037020-153 = "[ns] \"(This looks really bad, doesn't it...?)\""
10037020-156 = "[ns] \"*pant* *pant* Excuse me! Kisaki? We have a situation!\""
10037020-157 = "What is it, Sensei? Wait... I can tell by your expression and tone of voice that something is off. "
10037020-158 = "...Tell me what's going on."
10037020-161 = "I told Kisaki what I saw in the underground interrogation room."
10037020-165 = "*sigh*"
10037020-166 = "I see. Thank you, Sensei. My immediate concern is clearing up the confusion around this less than polite reception..."
10037020-167 = "I'll send someone to... On second thought, I'll deliver my instructions personally."
10037020-168 = "I wanted our visitors to be treated as \"honored guests,\" not criminals."
10037020-172 = "..."
10037020-173 = "(Th-That was close. I would have done the same thing and gone straight to the interrogations!)"
10037020-175 = "Sensei, come over here please."
10037020-180 = "I approached Kisaki, as she asked."
10037020-181 = "I have another request to make of you."
10037020-182 = "[s] Nod knowingly to reassure her."
10037020-183 = "Yes... Of course. I thank you."
10037020-184 = "Having a friend that understands you so quickly is quite an amazing thing..."
10037020-188 = "Mina."
10037020-193 = "Y-Y-Y-Yes, Madam President!"
10037020-194 = "I trust that you...would have handled things differently?"
10037020-195 = "O-O-O-Of course, Madam! I-I-I-I would never make such laughable mistakes...!"
10037020-196 = "...Of course. Naturally, you wouldn't."
10037020-201 = "Ugh... The president was so calm, but I feel like I just got scolded..."
10037020-202 = "She must be furious right now... Oh, no..."
10037020-203 = "S-Still! She said she would be gracious if I handle this problem properly!"
10037020-204 = "Yeah! This is no time to dilly-dally!"
10037020-205 = "Treat them as honored guests... That's easy enough to understand!"
10037020-206 = "We can't let her down again! Let's go!"
10037020-216 = "Out of an interrogation room and into a prison?!"
10037020-221 = "A-Ahem... I'm not unaccustomed to the sights and sounds of a place like this, but..."
10037020-222 = "...I wonder what's going on. Was the exchange meeting invitation just an excuse to trap us? "
10037020-223 = "Could this be a plot by Shanhaijing's Dark Monarch...?"
10037020-225 = "Silence! It would be wise for you to confess what dubious goals brought you to Shanhaijing!"
10037020-226 = "If you don't...!"
10037020-232 = "*gasp* Is that?!"
10037020-233 = "Wh-What do you see, Chairman Marina?"
10037020-235 = "Even visitors from Red Winter must know what kind of animal this is!"
10037020-236 = "Behold. It's Shanhaijing's own panda!"
10037020-237 = "Tell us what you were plotting..."
10037020-238 = "Or we'll take away this adorable baby panda's bamboo!"
10037020-243 = "Y-You're evil! That baby panda did nothing to you! Let it go!"
10037020-244 = "To torment a panda—a sweet, little bear cub like this...! What kind of monsters are you?!"
10037020-246 = "If you want to stop this, all you have to do is confess! Heheheh... Look how happy it is with that bamboo. Just one little tug from me, and...!"
10037020-251 = "Kyuuuu?!"
10037020-252 = "Nooo!"
10037020-256 = "[ns] \"(Are things getting worse?!)\""
10037020-264 = "M-Madam President?!"
10037020-265 = "[s1] \"No, Kisaki! Kisaki, snap out of it!\"\n[s2] \"The exchange meeting is just getting started!\""
10037020-270 = "...Yes. You're right. I appreciate your well-timed advice."
10037020-271 = "Mina."
10037020-272 = "Y-Yes, Madam President!"
10037020-273 = "I want you to personally inform them that the visitors from Red Winter should be treated as well as the president of Genryumon herself."
10037020-274 = "Y-You mean...?!"
10037020-275 = "Hurry. Time is short."
10037020-279 = "As you command!"
10037020-283 = "...There's something I would like to ask you, Sensei."
10037020-284 = "[s] \"...Sure. You can ask me anything.\""
10037020-285 = "Do I...speak in a confusing manner?"
10037020-286 = "Is it possible that my commands aren't being issued clearly?"
10037020-287 = "[s] \"I don't think that's the case...\""
10037020-288 = "Then do you know why it is our students seem to do this every time?"
10037020-289 = "[s] \"...\""
10037020-290 = "Please..."
10037020-291 = "I just need them to listen..."
10037020-295 = "What is this?! We were told this was an exchange meeting... Damn Shanhaijing! "
10037020-296 = "Now, now, Cherino—I mean, Great Leader Cherino. You should be the very model of a bold, magnanimous mind."
10037020-297 = "There have been some minor misunderstandings, but I suspect they will be resolved any moment."
10037020-299 = "I'm shocked at what you would consider minor, Chief Secretary Tomoe..."
10037020-300 = "How could they? And to a baby panda, no less! It's so heartless!"
10037020-301 = "Ho ho... One's expression can convey a myriad of meanings."
10037020-302 = "As for any favors we may have gained as a result of this misunderstanding...? We can save those for a rainy day."
10037020-307 = "For now, let's enjoy what Genryumon of Shanhaijing have offered as apology."
10037020-308 = "I will admit, the Red Winter uniforms were starting to feel a little stuffy."
10037020-312 = "Could you raise your arms for me, Cherino?"
10037020-322 = "The visitors from Red Winter are entering the Rikkagaku!"
10037020-323 = "Everyone, please welcome our guests from Red Winter!"
10037020-333 = "Ugh... I-Is this good...? My shoulders... legs...!"
10037020-338 = "[ns] \"W-Who are you?!\""
10037020-342 = "Sensei?! What are you...? Wait—don't you recognize me?! Or did they put you through the ringer too, Sensei?!"
10037020-343 = "[s] \"No, that's not what I meant!\""
10037020-344 = "I looked so nice that you didn't recognize me? Well that's confusing. You should be more direct when you talk to people."
10037020-345 = "Now, now, Chairman Marina. That's just how Sensei offers compliments."
10037020-346 = "[s3] \"...I don't know what to say, Tomoe, other than...\"\n[s4] \"It's like that fancy outfit was made for you. I can see you wearing that anytime.\""
10037020-349 = "Oh, my! Thank you, Sensei. "
10037020-350 = "You know, I've been keeping an eye on you... Your talent for saying the right things at the right time would make you very good at stirring up the revolutionary spirit."
10037020-351 = "[s] \"I'll do no such thing...\""
10037020-356 = "Hmm, I feel oddly jealous! Comrade, I'm here too!"
10037020-357 = "[s5] \"The look suits you perfectly, Cherino!\"\n[s6] \"Especially your braids and clothes!\""
10037020-360 = "Y-You really think so? Heeheehee... As always, you have a good eye, comrade!"
10037020-364 = "Huh? Where's the mustache...? Wh-What?! Tomoe!"
10037020-370 = "You saw nothing. Right, Tomoe?"
10037020-371 = "Saw what, Great Leader?"
10037020-376 = "(...Is the fake mustache a cultural thing in Red Winter...?)"
10037020-377 = "(Thank goodness. This exchange meeting was the right decision. We have much to learn about the world.)"
10037020-379 = "Welcome to Shanhaijing. "
10037020-387 = "I would like to thank you again for accepting our invitation, Great Leader Cherino of Red Winter, Chief Secretary Tomoe, and Chairman Marina."
10037020-388 = "I am the president of Shanhaijing's own student council, also known as Genryumon, Ryuuge Kisaki."
10037020-390 = "It is a pleasure to meet you, Madam Kisaki. "
10037020-394 = "Okay, Cherino. This is your chance to show how dignified you are. Like I told you... No, like how we practiced..."
10037020-395 = "I-Is it time?! A-All right...!"
10037020-400 = "I thank you for your grand welcome, Madam Kisaki. "
10037020-401 = "I am Red Winter's student council president, Chief Beautification Officer, Main Secretary, Chief of Sanitation, Athletics Club Captain, Head of All Prefects, Chief of Sanitation, and Maven of Meal Service."
10037020-403 = "More recently, I am this month's most excellent pudding gourmet and director of castella production, Cherino!"
10037020-408 = "(An introduction that long is going to put her audience into a stupor. And that comment about a \"grand welcome\"? Clearly she's not going to let that go...)"
10037020-409 = "(Well, nothing can be done about it now. We were in the wrong.)"
10037020-410 = "(The silent battle has already begun. But I expected no less from someone of your stature, Great Leader Cherino.)"
10037020-412 = "How was that, Tomoe? I didn't get anything wrong, did I?"
10037020-413 = "Well done, Cherino. You surely showed them how dignified you are."

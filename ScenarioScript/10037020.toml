[translation]
10037020-1 = "ตอนที่ 2;น้ำที่ไหลมาบรรจบกัน"
10037020-3 = "โอ้ว... ที่นี่คือ...!"
10037020-5 = "ซานไห่จิงสินะ!"
10037020-6 = "เป็นไปตามที่สำรวจข้อมูลมาเลยนะคะ"
10037020-7 = "โทโมเอะ โทโมเอะ! ดูโน่นสิ! หลังคาตรงโน้นน่ะ! น่าเหลือเชื่อดีจังเลย!"
10037020-13 = "(นั่นคือพวกนักเรียนตามข่าวลือเหรอ...!)"
10037020-14 = "(ฉันเองก็ได้แต่ฟังข่าวลือ คิดไม่ถึงเลยนะว่าจะมากันจริงๆ...!)"
10037020-18 = "หืม? เหมือนทุกคนจะจับจ้องมาที่พวกเรานะ?"
10037020-19 = "ทุกคนคงซ่อนความประหลาดใจที่มีต่อเกียรติภูมิของท่านประธานเชริโน่ไว้ไม่ไหวน่ะค่ะ! สมกับที่เป็น#nท่านประธานจริงๆ เลยค่ะ!"
10037020-20 = "ยะ... อย่างนั้นเหรอ? แหะๆ แหะๆๆ"
10037020-22 = "หืม บรรยากาศแบบนี้มัน...? อืม เป็นอย่างนี้เองสินะคะ "
10037020-23 = "(เราอาจจะต้องเตรียมใจในรูปแบบอื่นให้มากกว่าที่คิดสักหน่อยก็ได้นะคะ)"
10037020-31 = "มีเรื่องแจ้งให้ทราบค่ะ ท่านประมุข"
10037020-36 = "คณะผู้มาเยือนจากสถาบันสหภาพเรดวินเทอร์มาถึงที่ประตูหน้าของเราแล้วค่ะ"
10037020-37 = "เช่นนั้นหรือ...?"
10037020-41 = "เรื่องนี้เราเคยบอกอยู่หลายครั้งแล้ว แต่จะขอกำชับที่นี่อีกครั้ง "
10037020-42 = "งานแลกเปลี่ยนครั้งนี้เป็นงานที่มีความหมายสำคัญมากกับทั้งซานไห่จิงและเรดวินเทอร์"
10037020-43 = "เราต้องเป็นเจ้าบ้านที่ต้อนรับและดูแลแขกผู้มาเยือนเป็นอย่างดี จะให้เห็นถึงความอ่อนประสบการณ์#nไม่ได้แม้แต่เพียงเล็กน้อย"
10037020-45 = "รับทราบค่ะ ท่านประมุข!"
10037020-46 = "พวกฉันจะจำความสำคัญของงานนี้ให้ขึ้นใจค่ะ!"
10037020-48 = "ดี..."
10037020-49 = "เราจะออกคำสั่งแรก เพื่อเป็นการต้อนรับงานแลกเปลี่ยนระหว่างซานไห่จิงและเรดวินเทอร์"
10037020-54 = "จงปฏิบัติตัวต่อผู้มาเยือน 'ตามธรรมเนียมของมังกรดำ'"
10037020-59 = "รับคำสั่งค่ะ ท่านประมุข!"
10037020-60 = "พวกฉันจะไม่ทำให้ชื่อของท่านประมุขต้องมัวหมองค่ะ!"
10037020-61 = "[s] (เหมือนทุกคนจะตึงเครียดกันเกินไปหน่อยนะ...)"
10037020-67 = "เริ่มขึ้นแล้วสินะคะ ท่านประมุข"
10037020-68 = "ใช่ นั่นสินะ"
10037020-69 = "..."
10037020-73 = "ครู มาใกล้ๆ เราสักเดี๋ยวสิ"
10037020-79 = "(เข้าไปใกล้ๆ คิซากิ)"
10037020-80 = "เรามีเรื่องขอร้องน่ะ ครู"
10037020-81 = "เด็กๆ ที่เพิ่งออกไปเมื่อกี้น่ะ... ครูช่วยจับตาดูพวกเธอหน่อยได้หรือไม่ว่าทำงานเป็นเช่นไรกันบ้าง"
10037020-82 = "ไม่ใช่ว่าเราไม่เชื่อใจพวกเธอหรอกนะ..."
10037020-83 = "คิดเสียว่ามันเป็นความกังวลของเราแล้วกัน"
10037020-84 = "[s] (พยักหน้าเงียบๆ)"
10037020-89 = "คือว่า... ท่านประมุขคะ ถ้ามีเรื่องให้รับใช้ ท่านประมุขสั่งให้ฉันทำเถอะค่ะ ไม่ต้องให้คุณครูช่วยก็ได้..."
10037020-90 = "(ถ้าเราสั่งให้มินะทำงานแบบนี้... สถานการณ์อาจจะเลวร้ายลงก็เป็นได้ แม้มันจะเป็นไปได้น้อยมากก็#nเถอะ...)"
10037020-91 = "เธอมีงานที่สำคัญกว่านี้ไม่ใช่หรือไง?"
10037020-92 = "คะ? งานที่สำคัญกว่านี้เหรอคะ...?"
10037020-93 = "ก็การพิทักษ์ประมุขแห่งมังกรดำอย่างไรเล่า"
10037020-97 = "ชะ... ใช่ค่ะ...!  วางใจฉันได้เลยค่ะ ท่านประมุข! ตราบใดที่ฉันอยู่ข้างๆ ท่านประมุข ฉันจะไม่ให้ใครมา#nทำอะไรท่านได้แม้แต่ปลายเล็บค่ะ!"
10037020-98 = "ก็ดี เช่นนี้เราก็วางใจ เราเชื่อมั่นในตัวเธอเสมอนะ"
10037020-99 = "ท่านประมุข...!"
10037020-100 = "(ขออย่าให้เกิดปัญหาอะไรเลยด้วยเถอะ...)"
10037020-109 = "ท่านประมุขสั่งให้ต้อนรับแขก 'ตามธรรมเนียมของมังกรดำ'"
10037020-110 = "ถ้างั้นก็... ต้องเป็นวิธีนั้นสินะ?"
10037020-111 = "แน่นอนอยู่แล้ว! จะเป็นวิธีอื่นไปได้ยังไงล่ะ!"
10037020-112 = "ฮุฮุฮุ... เตรียมตัวไว้ได้เลย ฉันจะทำให้เห็นเต็มสองตาเลยว่าธรรมเนียมที่แท้จริงของซานไห่จิงน่ะมัน#nเป็นยังไง...!"
10037020-113 = "นี่คือคำสั่งแรกของท่านประมุขเพื่อต้อนรับงานแลกเปลี่ยน!"
10037020-114 = "อย่าทำให้ท่านประมุขผิดหวังเป็นอันขาด! เริ่มงานได้!"
10037020-120 = "บันทึกการสอบสวน: 092-H-8"
10037020-122 = "ผู้สอบสวน: เจ้าพนักงานมังกรดำนิรนาม"
10037020-124 = "ผู้ต้องสงสัย: เรนคาวะ เชริโน่ ชั้นปีที่ 3 สถาบันสหภาพเรดวินเทอร์"
10037020-129 = "ชื่ออะไร?"
10037020-130 = "เดี๋ยวๆๆ เดี๋ยวก่อน! มารินะล่ะ? โทโมเอะก็ด้วย? สองคนนั้นไปไหนแล้วน่ะ?"
10037020-131 = "ตามที่ได้ยินมา นี่คือการมาเที่ยว... ไม่สิ งานแลกเปลี่ยนไม่ใช่เหรอ?! แล้วทำไมถึง...?#nระ... หรือว่าจะเป็น! การปฏิวัติงั้นเหรอ? เราตกหลุมพรางงั้นเหรอเนี่ย?!"
10037020-133 = "หนวกหูน่า! ฉันถามชื่อไปไม่ใช่รึไง!"
10037020-134 = "พวกเธอต่างหากที่หนวกหูน่ะ! เราคือท่านเชริโร่ ผู้เป็นทั้งประธานนักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายกีฬา หัวหน้าฝ่ายทำความสะอาด ประธานกรรมการ และหัวหน้าฝ่ายอาหารของสหภาพ#nเรดวินเทอร์"
10037020-135 = "แถมยังเป็นผู้ควบคุมกระบวนการผลิตขนมคาสเทลล่า และยังถูกเลือกให้เป็นสุดยอดนักชิมพุดดิ้งของ#nเดือนนี้ด้วยนะ!"
10037020-136 = "แนะนำตัวยาวจังเลยนะ แต่ก็เอาเถอะ ยังไงก็ได้ชื่อแล้ว อ่า... จะว่าไป ตำแหน่งก็ยืดยาวเสียจนจดไม่หมด#nเลยด้วย"
10037020-137 = "แล้วทำไมถึงได้มีสังกัดเยอะขนาดนี้นะ..."
10037020-138 = "เอาเถอะ ต่อไปก็... งานอดิเรกคืออะไร?"
10037020-139 = "ทำไมถึงได้ไร้มารยาทแบบนี้! คนที่ส่งคำเชิญให้เรามางานแลกเปลี่ยนก็คือซานไห่จิงนะ...!"
10037020-140 = "เรดวินเทอร์จะไม่ลืมเรื่องนี้แน่นอน! ทำไมถึงลากตัวเรามาในที่แบบนี้ด้วย!"
10037020-142 = "สงสัยว่าเรา 'พาตัว' เธอมาที่นี่ทำไมน่ะเหรอ? ก็เพราะท่านประมุขของเรา..."
10037020-146 = "สั่งให้ปฏิบัติตัวต่อผู้มาเยือน 'ตามธรรมเนียมของมังกรดำ' ยังไงล่ะ!"
10037020-147 = "แล้วธรรมเนียมของมังกรดำมันเป็นยังไงกันน่ะ?!"
10037020-151 = "[ns] (แบบนี้มัน...)"
10037020-153 = "[ns] (เละเทะหมดแล้วนะนั่น...?)"
10037020-156 = "[ns] \"แฮ่ก... แฮ่ก...! คิซากิ? คิซากิจัง? งานเข้าแล้วละ!\""
10037020-157 = "มีเรื่องอะไรอย่างนั้นหรือ ครู? เดี๋ยวนะ... ดูจากสีหน้าและน้ำเสียงของครูแล้ว... "
10037020-158 = "บอกเรามาตามตรงเถอะว่าเกิดเรื่องอะไรขึ้น"
10037020-161 = "(เล่าอย่างรวบรัดให้คิซากิฟังว่าเห็นเหตุการณ์อะไรมาในห้องสอบสวนใต้ดิน)"
10037020-165 = "เฮ้อ..."
10037020-166 = "เข้าใจแล้ว ขอบคุณที่เหนื่อยนะครู เราคงต้องจัดการกับการต้อนรับแขกที่วุ่นวายและไร้มารยาทนี้ก่อน ..."
10037020-167 = "ฝากไปบอก... ไม่สิ เราขอสั่งให้นำคำของเราไปบอกเด็กๆ ด้วยตัวเองเดี๋ยวนี้"
10037020-168 = "ว่าให้ปฏิบัติตัวกับแขกจากเรดวินเทอร์ให้สมกับเป็น 'แขกคนสำคัญ'"
10037020-172 = "..."
10037020-173 = "(กะ... เกือบเกิดเรื่องใหญ่แล้วไง เพราะถ้าเป็นเราก็คงลากทุกคนไปห้องสอบสวนแล้วเหมือนกัน...!)"
10037020-175 = "ครู มาใกล้ๆ เราอีกสักเดี๋ยวสิ"
10037020-180 = "(เข้าไปใกล้ๆ คิซากิ)"
10037020-181 = "เรามีเรื่องขอร้องอีกครั้งน่ะ ครู"
10037020-182 = "[s] (พยักหน้าเงียบๆ อย่างรู้งาน)"
10037020-183 = "อืม... อย่างนั้นสินะ ต้องขอบคุณด้วยนะครู"
10037020-184 = "เป็นเพื่อนคุยที่อ่านสถานการณ์ได้ไวเสียจริง ช่างน่ายินดีจริงๆ..."
10037020-188 = "มินะ"
10037020-193 = "ค่ะ ค่ะค่ะค่ะค่ะ! ท่านประมุข"
10037020-194 = "ถ้าเป็นเธอ... คงไม่ทำเช่นนั้นหรอก ใช่หรือไม่?"
10037020-195 = "นะนะนะนะ แน่นอนค่ะ ท่านประมุข! ฉะ... ฉะฉะฉะฉะ ฉันไม่มีทางทำผิดพลาดแบบนั้นแน่นอน...!"
10037020-196 = "อืม... ก็คงเป็นเช่นนั้น"
10037020-201 = "อึก... ถูกท่านประมุขดุจนได้..."
10037020-202 = "ถ้าท่านประมุขพูดเรียบๆ แบบนั้นละก็ แสดงว่าท่านโกรธจริงๆ เลยละ อึก..."
10037020-203 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ! ท่านประมุขบอกว่าถ้าครั้งนี้ทำได้ดี ก็จะไม่ถือโทษที่ทำพลาดครั้งก่อน!"
10037020-204 = "ใช่! งั้นก็ไม่ใช่เวลาที่เราจะมาอยู่กันอย่างนี้แล้ว!"
10037020-205 = "ให้ปฏิบัติตัวเหมือนแขกคนสำคัญ... สั่งแบบนี้สิค่อยเข้าใจง่ายหน่อย!"
10037020-206 = "เราต้องไม่ทำให้ท่านประมุขผิดหวังซ้ำสอง! ไปกันเถอะ!"
10037020-216 = "แค่ห้องสอบสวนยังไม่พอ ตอนนี้พามาคุกเลยเหรอ?!"
10037020-221 = "อะ... อืม... ถึงฉันจะคุ้นเคยกับสถานที่แบบนี้ด้วยหลายๆ เหตุผลก็เถอะ แต่ว่า..."
10037020-222 = "ทำไมเป็นอย่างนี้ไปได้ล่ะคะ...? หรือว่าคำเชิญให้มางานแลกเปลี่ยนจะเป็นอุบายเพื่อทำให้เราติดกับ#nตั้งแต่แรกกันคะ? "
10037020-223 = "เป็นเล่ห์เพทุบายของราชาทมิฬแห่งซานไห่จิงอย่างนั้นเหรอ...?"
10037020-225 = "หนวกหูน่า! สารภาพมาซะดีๆ ว่ามีแผนร้ายอะไรถึงได้เข้ามาเหยียบซานไห่จิง!"
10037020-226 = "ถ้าไม่ยอมสารภาพละก็...!"
10037020-232 = "เฮือก...?! อย่าบอกนะ... ว่านั่นคือ?!"
10037020-233 = "มะ... มีอะไรเหรอ หัวหน้าคณะฯ มารินะ?"
10037020-235 = "ต่อให้เป็นผู้มาเยือนจากเรดวินเทอร์... ก็คงรู้ดีใช่มั้ยว่าสัตว์ตัวนี้คืออะไร!"
10037020-236 = "ใช่แล้ว นี่คือสัตว์ขึ้นชื่อของซานไห่จิง แพนด้ายังไงล่ะ!"
10037020-237 = "ถ้าพวกเธอไม่ยอมบอกดีๆ ว่ามีแผนร้ายอะไรกันละก็..."
10037020-238 = "ฉันจะแย่งหน่อไม้ที่ลูกแพนด้าตัวนี้กำลังกินอย่างเอร็ดอร่อย แล้วเอาไปทิ้งให้ดู!"
10037020-243 = "ทะ... ทำอะไรชั่วร้ายขนาดนั้น...! ลูกแพนด้าเกี่ยวอะไรด้วย น้องไม่ผิดนะ! ปล่อยน้องไปเถอะ!"
10037020-244 = "รังแกแพนด้า... รังแกหมีที่ฉันรัก... แถมยังเป็นหมีตัวเล็กอีก! ทำไมถึงเลือดเย็นกันแบบนี้!"
10037020-246 = "ถ้าไม่อยากให้เกิดขึ้นก็สารภาพมาสิ! ฮุฮุฮุ... กำลังกินอย่างเอร็ดอร่อยเลยสินะ ขอพี่ดึงไปหน่อยจะได้#nมั้ยน้า...!"
10037020-251 = "????!"
10037020-252 = "ม่ายยยยยยย!"
10037020-256 = "[ns] (เป็นเรื่องอีกแล้ว!?)"
10037020-264 = "ทะ... ท่านประมุข?!"
10037020-265 = "[s1] \"ไม่ได้นะ คิซากิ! คิซากิจัง! ตั้งสติไว้!\"\n[s2] \"งานแลกเปลี่ยนเพิ่งจะเริ่มเองนะ อย่าเพิ่งเป็นลมไปนะ!\""
10037020-270 = "อืม... ก็จริง ขอบใจที่มาบอกอย่างทันท่วงทีนะ ครู"
10037020-271 = "มินะ"
10037020-272 = "ค่ะ ค่ะ! ท่านประมุข!"
10037020-273 = "เธอจงไปบอกด้วยตัวเอง ว่าให้ปฏิบัติต่อผู้มาเยือนจากเรดวินเทอร์... 'เหมือนกับที่ปฏิบัติต่อประมุขแห่ง#nมังกรดำ'"
10037020-274 = "วะ... ว่ายังไงนะคะ...!?"
10037020-275 = "รีบไปเถอะ เราไม่มีเวลาแล้ว"
10037020-279 = "รับคำสั่งค่ะ ฉันจะรีบไปเดี๋ยวนี้ค่ะ!"
10037020-283 = "เรามีเรื่องอยากถามอย่างหนึ่งน่ะ... ครู"
10037020-284 = "[s] \"อืม... ถามได้ทุกอย่างเลย\""
10037020-285 = "เรา... เป็นคนพูดจาไม่ชัดเจนเหรอ?"
10037020-286 = "คำสั่งของเรามันกำกวมและเข้าใจยากอย่างนั้นหรือ?"
10037020-287 = "[s] \"ครูไม่คิดว่าอย่างนั้นนะ...\""
10037020-288 = "แล้วทำไมนักเรียนของเราถึงได้อ่านคำสั่งผิดตลอดเลย... ครูรู้เหตุผลหรือไม่?"
10037020-289 = "[s] \"...\""
10037020-290 = "ขอร้องละ..."
10037020-291 = "รับคำสั่งจากเราให้ถูกต้องด้วย เราขอละ..."
10037020-295 = "นี่มันอะไรกัน! ไหนบอกว่าเป็นงานแลกเปลี่ยนไง... เจ้าพวกซานไห่จิงนี่...! "
10037020-296 = "เอาละๆ ใจเย็นๆ ก่อนนะคะ เชริโน่จัง... ไม่สิ ท่านเลขาธิการเชริโน่ ท่านต้องแสดงความใจกว้าง และความเข้าอกเข้าใจสิคะ"
10037020-297 = "ฉันว่าน่าจะเกิดความเข้าใจผิด 'เล็กน้อย' น่ะค่ะ และตอนนี้ก็ไม่มีความเข้าใจผิดนั่นแล้ว"
10037020-299 = "เลือกใช้คำว่าความเข้าใจผิด 'เล็กน้อย' งั้นเหรอคะ ท่านหัวหน้าเลขานุการโทโมเอะ...?"
10037020-300 = "เหนือสิ่งอื่นใด... พวกนั้นทำกับแพนด้าอย่างโหดเหี้ยมทารุณ...!"
10037020-301 = "ฮุฮุ ในการเลือกใช้คำก็มีหลากหลายความหมายแฝงอยู่น่ะค่ะ"
10037020-302 = "ส่วนค่าเสียหายเกี่ยวกับความเข้าใจผิดเหล่านั้น ไว้เราค่อยคิดบัญชีทีหลังก็ได้ค่ะ"
10037020-307 = "ตอนนี้เรามาเพลิดเพลินไปกับสิ่งที่มังกรดำแห่งซานไห่จิงจัดเตรียมไว้ให้เพื่อเป็นการขอโทษเถอะค่ะ"
10037020-308 = "มันก็จริงนะ ชุดของเรดวินเทอร์ที่เราใส่มาอยู่ที่นี่มันก็ค่อนข้างร้อนอยู่หรอกนะ"
10037020-312 = "เอาละ ยกแขนขึ้นสิคะ เชริโน่จัง"
10037020-322 = "คณะผู้มาเยือนจากเรดวินเทอร์มาถึงอาคารหกเหลี่ยมแล้วค่ะ"
10037020-323 = "ขอให้ทุกคนต้อนรับคณะผู้มาเยือนจากเรดวินเทอร์ด้วยความยินดีจากใจจริงค่ะ!"
10037020-333 = "อึก... หะ... ให้ใส่แบบนี้ได้เหรอ...? ฉันว่าตรงไหล่... กับตรงขามัน...!"
10037020-338 = "[ns] \"นั่น... ใครเหรอ?!\""
10037020-342 = "คะ... ครู ทำไมถึงมาอยู่ที่นี่ล่ะ...! และที่สำคัญกว่านั้น ครูจำฉันไม่ได้เหรอ?! แล้วครูเองก็เจอเรื่องใหญ่#nที่นี่มาเหมือนกันเหรอ??!!"
10037020-343 = "[s] \"ไม่ ครูไม่ได้หมายความอย่างนั้นสักหน่อย?!\""
10037020-344 = "ว่าไงนะ...?! ชุดนี้เหมาะกับฉันมากจนคิดว่าเป็นคนอื่นไปเลยงั้นเหรอ? เดี๋ยวเหอะ หยุดพูดอะไรทำนอง#nนั้นเลยนะ! แบบนี้มันทำให้ฉันสับสน!"
10037020-345 = "ใจเย็นก่อนค่ะหัวหน้าคณะฯ มารินะ นั่นเป็นวิธีชมเชยของคุณครูน่ะค่ะ"
10037020-346 = "[s3] \"โทโมเอะ... ใส่กี่เพ้าแล้วสวยดีนะ\"\n[s4] \"ชุดนี้เข้ากับโทโมเอะจนครูลืมชุดเดิมไปเลย!\""
10037020-349 = "ตายจริง ขอบคุณค่ะ คุณครู "
10037020-350 = "ฮุฮุ ฉันเฝ้าสังเกตมานานแล้วค่ะ เวลาที่ต้องพูดอะไรอย่างเหมาะสมให้ทันท่วงที คุณครูเองก็มีความ#nสามารถในการยุยงที่ยอดเยี่ยมเลยนะคะ"
10037020-351 = "[s] \"ไม่ใช่อย่างนั้นนะ...\""
10037020-356 = "อืม...! รู้สึกเหมือนอิจฉายังไงไม่รู้...! สหาย! เราก็อยู่ตรงนี้ด้วยนะ!"
10037020-357 = "[s5] \"ว้าว ใส่ชุดนี้แล้วน่ารักมากเลย เชริโน่!\"\n[s6] \"ถักเปียแบบนี้ก็สวยดีนะ เสื้อนอกก็เท่สุดๆ ไปเลย!\""
10037020-360 = "ยะ... อย่างนั้นเหรอ? แหะๆๆ... สหายนี่สายตาเฉียบแหลมจริงๆ!"
10037020-364 = "เอ๋? วะ... ว่ายังไงนะ? หนวดของฉันไปอยู่ไหนน่ะเหรอ?! โทโมเอะ!"
10037020-370 = "เมื่อกี้ไม่มีอะไรเกิดขึ้นเลย... ใช่มั้ย โทโมเอะ?"
10037020-371 = "ใช่แล้วค่ะ ท่านเลขาธิการ"
10037020-376 = "(หนวดปลอมนั่น... เป็นธรรมเนียมของเรดวินเทอร์หรือ...?)"
10037020-377 = "(โล่งอกไปที เราตัดสินใจถูกแล้วสินะที่จัดงานแลกเปลี่ยนครั้งนี้ขึ้นมา ถือว่าได้เปิดหูเปิดตากับสิ่งใหม่ๆ เยอะเลย)"
10037020-379 = "ยินดีต้อนรับสู่ซานไห่จิง "
10037020-387 = "เราขอแสดงความขอบคุณสำหรับการตอบรับคำเชิญครั้งนี้ เลขาธิการเชริโน่แห่งเรดวินเทอร์ หัวหน้าเลขานุการโทโมเอะ หัวหน้าคณะฯ มารินะ"
10037020-388 = "เราคือริวเกะ คิซากิ เป็นประมุขของมังกรดำ ผู้ทำหน้าที่เสมือนสภานักเรียนของซานไห่จิง"
10037020-390 = "ยินดีที่ได้พบค่ะ ท่านประมุขคิซากิ "
10037020-394 = "ชะ... เชริโน่จัง? ได้เวลาแสดงความมีเกียรติแล้วค่ะ ทำตามที่ฉันแจ้งไปล่วงหน้า... ไม่สิ ตามที่ฝึกมาสิคะ..."
10037020-395 = "อะ... เอางั้นเหรอ?! ดะ... ดีละ...!"
10037020-400 = "ขอบคุณสำหรับการต้อนรับอย่างยิ่งใหญ่นะ ประมุขคิซากิ "
10037020-401 = "เราคือท่านเชริโร่ ผู้เป็นทั้งประธานนักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายกีฬา หัวหน้าฝ่ายทำความสะอาด ประธานกรรมการ และหัวหน้าฝ่ายอาหารของสหภาพเรดวินเทอร์"
10037020-403 = "แถมยังเป็นผู้ควบคุมกระบวนการผลิตขนมคาสเทลล่า และยังถูกเลือกให้เป็นสุดยอดนักชิมพุดดิ้งของ#nเดือนนี้อีกด้วย!"
10037020-408 = "(ช่างเป็นการแนะนำตัวที่ยืดยาวที่เหมือนจะดูดวิญญาณของผู้ฟัง... แต่ช่างเถอะ เมื่อกี้พูดว่า 'การต้อนรับอย่างยิ่งใหญ่' เชียวหรือ... หมายความว่าจะไม่ลืมเรื่องนั้น แล้วจะมาคิดบัญชีทีหลังสินะ)"
10037020-409 = "(แต่ก็ช่วยไม่ได้ อย่างไรมันก็เป็นเพราะเราเองที่เป็นฝ่ายผิด)"
10037020-410 = "(การต่อสู้เชิงอำนาจเริ่มขึ้นแล้วสินะ ถึงเราจะรู้อยู่แล้วว่าอาจเป็นเช่นนี้ แต่เลขาธิการเชริโน่เป็นคนที่#nไม่ควรดูหมิ่นเลย)"
10037020-412 = "เป็นไงล่ะ โทโมเอะ? เราพูดไม่ผิดเลยใช่มั้ยล่ะ?"
10037020-413 = "ทำได้ดีมากค่ะ เชริโน่จัง แสดงเกียรติและศักดิ์ศรีออกมาได้เป็นอย่างดีเลยค่ะ"

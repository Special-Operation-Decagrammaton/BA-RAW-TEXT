[translation]
1300703-1 = "Fake Food"
1300703-2 = "Gehenna Academy Dining Hall"
1300703-3 = "You're late, Sensei!"
1300703-4 = "I offer you delectable food, and you have the nerve to be ten minutes late? This is death penalty-worthy!"
1300703-5 = "You're lucky that letting you live is the only way you'll be able to try what I brought."
1300703-6 = "You're pardoned just this once, but it's the firing line next time!"
1300703-7 = "[s] \"Didn't you say something about seafood when you invited me?\""
1300703-8 = "I hope you weren't thinking I meant real seafood. I can't afford that with my kind of paycheck."
1300703-9 = "What we have here today is...a tasty substitute that's going to deceive your taste buds!"
1300703-10 = "[s] \"And how is it going to do that?\""
1300703-11 = "The human tongue is very sensitive. Surely you know what it's like to experience a new flavor by combining several different ingredients."
1300703-12 = "According to my online research, it should be possible to imitate the flavor of expensive seafood by combining much cheaper ingredients."
1300703-13 = "Allow me to introduce you to...imitation sea urchin eggs!"
1300703-14 = "[s] \"That's just...soy sauce and pudding from the convenience store?\""
1300703-15 = "Exactly. From what I read, pudding with soy sauce on top tastes just like sea urchin eggs."
1300703-16 = "Don't ask me how or why...but if the combo works, it works! I'm sure we're in for an interesting flavor!"
1300703-17 = "Here, Sensei, you try it first!"
1300703-18 = "[s] Take a bite of the pudding smeared with soy sauce."
1300703-19 = "How is it? Can you taste the sea urchin egg?"
1300703-20 = "[s] \"...I'm not sure.\""
1300703-21 = "That's weird. People swore it tasted just like it... *slurp*"
1300703-22 = "..."
1300703-23 = "Salty... Sweet... Weird..."
1300703-24 = "What the heck?! This doesn't taste anything like sea urchin eggs!"
1300703-25 = "Ugh... Why would anyone go on the internet and lie? Who does that?"
1300703-26 = "Th-That's okay! I still have plenty of recipes to try!"
1300703-27 = "Here's the second one on deck."
1300703-28 = "[s] \"Avocado?\""
1300703-29 = "Same basic concept. They say if you eat avocado with soy sauce on it, it should taste like tuna sashimi!"
1300703-30 = "Avocado is fatty just like tuna is, so this one HAS to work!"
1300703-32 = "All right... Here goes nothing!"
1300703-34 = "...I feel like an idiot."
1300703-35 = "I've been bamboozled! What the heck was THAT?! None of this tastes like what people said it would!"
1300703-36 = "Avocado and soy sauce for tuna sashimi, tangerine and soy sauce for salmon roe... They all come out tasting gross!"
1300703-37 = "The only person who'd like this stuff is Izumi!"
1300703-38 = "*sigh* All I wanted was luxury seafood at an affordable price..."
1300703-39 = "Wait. You think I could have afforded seafood with the money I used on all those different ingredients?"
1300703-40 = "Let me do the math... Pudding set, soy sauce, avocados, tangerines..."
1300703-42 = "You're right! That comes out to the same price as going to a conveyor belt sushi bar!"
1300703-43 = "I got tricked again! Why would people go on the internet and just tell lies? Who does that?!"

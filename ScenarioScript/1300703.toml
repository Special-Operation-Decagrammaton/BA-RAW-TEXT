[translation]
1300703-1 = "#title;가짜 음식"
1300703-2 = "#place;게헨나 학원 식당"
1300703-3 = "3;준코;05;늦었잖아, 선생님!\n#3;em;[반응]\n#3;hophop\n#3;a"
1300703-4 = "3;준코;07;모처럼 내가 귀한 음식을 준비해 왔는데, 10분이나 늦다니! 죽어 마땅하다구!\n#3;em;[빠직]\n#3;stiff"
1300703-5 = "3;준코;11;아니지, 죽어버리면 모처럼 준비한 음식을 먹을 수 없으니까……\n#3;m2"
1300703-6 = "3;준코;05;이번 한 번만 용서해주는 거야! 다음엔 늦으면 안 돼!\n#3;m3\n#3;hophop"
1300703-7 = "[s] \"그나저나 고급 해산물이라니?\""
1300703-8 = "3;준코;13;물론 진짜 해산물을 준비한 건 아니야. 고급 해산물은 엄청나게 비싸니까."
1300703-9 = "3;준코;12;대신 내가 오늘 준비한 요리는…… 바로 혀를 속이는 요리야!\n#3;em;[반응]"
1300703-10 = "[s] \"혀를 속이는 요리?\""
1300703-11 = "3;준코;00;응, 사람의 혀는 워낙 예민한 기관이니까. #n가끔 여러가지 음식을 함께 먹을 때 새로운 맛을 느끼기도 하잖아?\n#3;greeting"
1300703-12 = "3;준코;02;인터넷에서 보았는데, 이 방법을 이용하면 싸구려 재료를 섞어서 고급 해산물의 맛을 낼 수도 있대."
1300703-13 = "3;준코;12;이름하야…… 가짜 성게알!\n#3;closeup"
1300703-14 = "[s] \"이건…… 편의점 푸딩과 간장이잖아?\""
1300703-15 = "3;준코;02;응, 내가 본 정보에 따르면 푸딩에 간장을 뿌려 먹으면 성게알 맛이 난대.\n#3;greeting"
1300703-16 = "3;준코;00;어떤 원리인지는 모르겠지만…… 평범하게 시도되지 않는 조합인만큼 신기한 맛이 날 거야!"
1300703-17 = "3;준코;12;자, 선생님부터 먹어 봐!\n#3;em;[반응]"
1300703-18 = "[s] 간장에 버무린 푸딩을 한 입 먹는다."
1300703-19 = "3;준코;02;어때? 정말 성게알 맛이 나?\n#3;em;[?]"
1300703-20 = "[s] \"………잘 모르겠어.\""
1300703-21 = "3;준코;01;이상하다. 분명 성게알 맛이 난다고 했는데……. (하읍)\n#3;greeting"
1300703-22 = "3;준코;11;………….\n#3;em;…"
1300703-23 = "3;준코;11;짜고…… 달고…… 이상해…….\n#3;em;[속상함]\n#3;stiff"
1300703-24 = "3;준코;05;이게 뭐야! 이 맛의 어디가 성게알이랑 비슷한 건데? 하나도 안 똑같잖아!\n#3;hophop\n#3;em;[빠직]"
1300703-25 = "3;준코;11;으으…… 가짜 정보에 속은 걸까."
1300703-26 = "3;준코;10;하, 하지만 괜찮아! 아직 시험해 볼 레시피는 잔뜩 남아있거든!\n#3;jump\n#3;em;[!]"
1300703-27 = "3;준코;00;다음은 이거야!\n#3;m4"
1300703-28 = "[s] \"……아보카도?\""
1300703-29 = "3;준코;00;응, 같은 원리로 아보카도 위에 간장을 뿌려 먹으면 참치회 맛이 난대!\n#3;em;[반응]"
1300703-30 = "3;준코;02;아보카도도, 참치회도 똑같이 기름진 음식이니 분명 이번에는 제대로 된 맛이 나겠지?\n#3;m3"
1300703-31 = "3;준코;02\n#3;d\n#wait;1000"
1300703-32 = "3;준코;03;자 그럼…… 잘 먹겠습니다!\n#3;closeup\n#3;em;[반짝]\n#3;a"
1300703-33 = "#all;hide"
1300703-34 = "3;준코;11;………속았어.\n#3;em;[속상함]\n#3;stiff\n#3;a"
1300703-35 = "3;준코;05;완전히 속았어! 이게 다 뭐야! #n제대로 된 맛이 나는 음식이 하나도 없잖아!\n#3;em;[빠직]\n#3;hophop"
1300703-36 = "3;준코;07;참치회 맛이 난다는 아보카도와 간장의 조합도, 연어알 맛이 난다는 귤과 간장의 조합도…… 모두 괴상한 맛 밖에 안 나!"
1300703-37 = "3;준코;05;이런 건 이즈미가 아니고서야 아무도 좋아하지 않을 거라고!\n#3;jump"
1300703-38 = "3;준코;11;으으, 저렴한 가격으로 비싼 해산물을 잔뜩 맛볼 수 있을 줄 알고 기대했는데……."
1300703-39 = "3;준코;06;응? 이 재료를 살 돈이면 진짜 해산물을 구입할 수 있지 않느냐고?\n#3;em;[반응]"
1300703-40 = "3;준코;02;어디보자…… 푸딩 세트에 간장이랑, 아보카도, 그리고 귤까지……."
1300703-41 = "3;준코;01\n#3;em;…\n#wait;2500"
1300703-42 = "3;준코;04;정말이네! 회전 초밥집에서 한 끼 식사를 할 수 있는 수준의 금액이잖아?\n#3;em;[?!]\n#3;shake"
1300703-43 = "3;준코;08;또 속았어! 역시 인터넷에는 거짓 정보 뿐이야! 으앙~!\n#3;em;[속상함]\n#3;stiff"

[translation]
1300703-1 = "อาหารปลอม"
1300703-2 = "โรงอาหาร สถาบันเกเฮนน่า"
1300703-3 = "มาสายนะคุณครู!"
1300703-4 = "ฉันอุตส่าห์เตรียมอาหารที่เลิศรสมาด้วย แต่คุณครูมาสายตั้งสิบนาทีเลยนะ! สมควรโดนกำจัด!"
1300703-5 = "เดี๋ยวนะ ถ้ากำจัดไปตอนนี้คุณครูก็จะไม่ได้ชิมอาหารที่ฉันเตรียมมาน่ะสิ...."
1300703-6 = "คราวนี้ฉันจะยกโทษให้ก็แล้วกัน! คราวหน้าห้ามมาสายเด็ดขาดเลยนะ!"
1300703-7 = "[s] \"อาหารทะเลชั้นสูงที่บอกคืออะไรเหรอ?\""
1300703-8 = "ฉันไม่ได้เตรียมอาหารทะเลของจริงมาหรอก ก็ราคามันแพงจะตายไป"
1300703-9 = "แต่ว่าอาหารที่ฉันเตรียมมาวันนี้น่ะ... เป็นอาหารที่หลอกต่อมรับรู้รสของมนุษย์ได้เลยนะ!"
1300703-10 = "[s] \"อาหารที่หลอกต่อมรับรู้รสได้?\""
1300703-11 = "อื้อ ลิ้นของคนเราเป็นอวัยวะที่อ่อนไหวมาก บางครั้งเวลาที่กินอาหารต่างๆ พร้อมกัน#nก็จะรับรู้ได้ถึงรสชาติใหม่ๆ ด้วยใช่มั้ยล่ะ?"
1300703-12 = "ฉันอ่านข้อมูลในอินเทอร์เน็ตมาแล้ว วิธีนี้จะทำให้รับรู้รสชาติวัตถุดิบชั้นสูงได้#nโดยการใช้วัตถุดิบทั่วไป"
1300703-13 = "เชิญพบกับ.... ไข่หอยเม่นทะเลปลอม!"
1300703-14 = "[s] \"นี่มัน...พุดดิ้งจากร้านสะดวกซื้อไม่ใช่เหรอ?\""
1300703-15 = "อื้อ จากที่ฉันอ่านมา ถ้าเหยาะซอสถั่วเหลืองลงไปในพุดดิ้ง#nก็จะรสชาติเหมือนกับไข่หอยเม่นทะเลน่ะ"
1300703-16 = "ฉันไม่รู้ว่าเพราะอะไร... แต่การผสมผสานรสชาติที่ไม่ธรรมดาแบบนี้ย่อมทำให้เกิดรสชาติใหม่ได้แน่!"
1300703-17 = "เอ้า คุณครูลองชิมก่อนสิ!"
1300703-18 = "[s] ลองชิมพุดดิ้งราสซอสถั่วเหลือง"
1300703-19 = "เป็นยังไงบ้าง? รสชาติเหมือนไข่หอยเม่นทะเลรึเปล่า?"
1300703-20 = "[s] \"......ไม่รู้เหมือนกันน่ะ\""
1300703-21 = "แปลกจัง ในเน็ตเขียนว่าจะรสชาติเหมือนไข่หอยเม่นทะเลแท้ๆ.... (ซูด)"
1300703-22 = ".........\n"
1300703-23 = "ทั้งเค็ม...ทั้งหวาน....แปลกสุดๆ...."
1300703-24 = "อะไรกันเนี่ย! รสชาติไม่เหมือนไข่หอยเม่นทะเลเลย ไม่เหมือนเลยสักนิดเดียว!"
1300703-25 = "อึ่ก... หรือว่าฉันถูกหลอกกันนะ?"
1300703-26 = "ตะ...แต่ก็ไม่เป็นไร! ยังมีเมนูให้ลองอีกเยอะเลยล่ะ!"
1300703-27 = "ต่อไปก็ลองอันนี้"
1300703-28 = "[s] \"....อะโวคาโดเหรอ?\""
1300703-29 = "อื้อ! มันเขียนว่าถ้าราดซอสถั่วเหลืองลงบนอะโวคาโดล่ะก็ รสชาติจะเหมือนกับซาชิมิทูน่าเลย!"
1300703-30 = "อะโวคาโดกับปลาทูน่าเป็นอาหารที่มีไขมันสูง เพราะงั้นฉันมั่นใจว่ามันต้องได้ผลแน่"
1300703-32 = "เอาละ ถ้างั้น... ฉันจะลองชิมล่ะนะ!"
1300703-34 = ".....ถูกหลอกซะแล้ว"
1300703-35 = "ถูกต้มซะเปื่อยเลย! นี่มันอะไรกันเนี่ย!#nรสชาติไม่เหมือนที่บอกเลยสักนิดเดียว!"
1300703-36 = "ทั้งเรื่องใส่ซอสถั่วเหลืองเพื่อให้ได้รสปลาทูน่า และใส่น้ำส้มกับซอสถั่วเหลือง#nเพื่อให้ได้รสปลาแซลมอน... แต่ไม่เห็นเหมือนเลยสักนิดเดียว!"
1300703-37 = "ของพวกนี้นอกจากอิซุมิแล้วคงไม่มีใครกินหรอก!"
1300703-38 = "อึ่ก... อุตส่าห์คิดว่าจะได้ลองชิมรสชาติอาหารราคาแพงโดยใช้วัตถุดิบราคาถูกได้แล้วแท้ๆ...."
1300703-39 = "หืม? ทำไมฉันไม่เอาเงินไปซื้ออาหารทะเลเกรดเอแทนมาซื้อของพวกนี้น่ะเหรอ?"
1300703-40 = "ไหนดูซิ... เซ็ตพุดดิ้งกับซอสถั่วเหลือง อะโวคาโด แล้วก็ส้ม...."
1300703-42 = "จริงด้วย! พอรวมกันแล้วไปนั่งกินซูชิที่ร้านซูชิบาร์ได้เลยนะ!"
1300703-43 = "ถูกหลอกอีกแล้ว! ว่าแล้วเชียวว่าในอินเทอร์เน็ตมีแต่ข้อมูลจอมปลอม! อ๊าา~!"

[translation]
1300703-1 = "假料理"
1300703-2 = "格黑娜學園．餐廳"
1300703-3 = "你太慢了，老師！"
1300703-4 = "我辛苦準備了這麼珍貴的料理，你居然遲到10分鐘！這可是罪該萬死唷！"
1300703-5 = "不對，要是死掉就沒辦法吃到我辛苦準備的料理了……"
1300703-6 = "這次我就放你一馬！但下次不可以再遲到了！"
1300703-7 = "[s] 「話說回來，你說有放高級海鮮？」"
1300703-8 = "我當然不是準備真品，畢竟高級海鮮實在太貴了。"
1300703-9 = "因此我今天準備的料理……是要騙過舌頭的料理！"
1300703-10 = "[s] 「騙過舌頭的料理？」"
1300703-11 = "嗯，人類的舌頭是很敏銳的器官。#n把各種食物混著一起吃，偶爾不是能嚐到完全不一樣的滋味嗎？"
1300703-12 = "我看網路上寫說，只要利用這種道理混合便宜材料，就能重現高級海鮮的味道。"
1300703-13 = "而這道料理就叫做……假海膽！"
1300703-14 = "[s] 「這是……便利商店的布丁和醬油？」"
1300703-15 = "嗯，根據我看到的情報，聽說只要給布丁淋上醬油，味道就會跟海膽一樣。"
1300703-16 = "雖然我不知道是什麼原理……但是這種前所未見的組合，肯定會有不可思議的味道！"
1300703-17 = "來老師，吃吃看吧！"
1300703-18 = "[s] 吃一口沾滿醬油的布丁"
1300703-19 = "如何？真的有海膽味嗎？"
1300703-20 = "[s] 「………吃不出來。」"
1300703-21 = "真奇怪吶──，明明寫說會有海膽味的………（大口吃下）"
1300703-22 = "…………"
1300703-23 = "又鹹……又甜……好奇怪……"
1300703-24 = "這是什麼鬼啊！這個味道哪裡像海膽了？根本一點也不像！"
1300703-25 = "唔唔……我被假消息騙了……"
1300703-26 = "但，但是沒關係！我還有很多可以實驗的食譜！"
1300703-27 = "接下來是這個！"
1300703-28 = "[s] 「……酪梨？」"
1300703-29 = "嗯，類似的道理，只要給酪梨淋上醬油，聽說吃起來就會有鮪魚的味道！"
1300703-30 = "酪梨和鮪魚都是油脂比較多的食物，這次的味道應該不錯吧？"
1300703-32 = "那麼……我要開動了！"
1300703-34 = "……被騙了。"
1300703-35 = "被騙慘了！這是怎樣！#n連個味道像樣的組合也沒有！"
1300703-36 = "不管是鮪魚味的醬油酪梨組合，還是鮭魚卵味的醬油蜜柑組合……味道全都很詭異！"
1300703-37 = "這種東西除了泉以外，根本沒有人會喜歡！"
1300703-38 = "唔唔，虧我還期待可以用親民價格吃到高級海鮮……"
1300703-39 = "咦？你說我買這些材料的錢，應該可以買到真正的海鮮？"
1300703-40 = "我看看……一組布丁、醬油、酪梨，還有蜜柑和……"
1300703-42 = "真的耶！這些錢已經夠在迴轉壽司店吃一餐了！"
1300703-43 = "又被騙了！網路上果然全都是些假消息！嗚哇──！"

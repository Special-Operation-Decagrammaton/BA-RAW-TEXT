10026050-56 = "3;하나코 수영복;99;선생님께 따로 설명 드리지 않았음에도 걱정하지 않으시는 부분이나, 절 믿어준다고 하신 것들만 봐도 말이에요."
10026050-57 = "3;하나코 수영복;01;먼 곳의 휴양지 같은 섬. 사실상 바캉스나 다름없는 이런 공간."
10026050-58 = "3;하나코 수영복;01;유적 탐사라고는 하지만, 수영복을 입고 다 같이 여름을 보내는 거나 다름없는 상황.\n#3;em;[음표]"
10026050-59 = "3;하나코 수영복;99;실제로 코하루 쨩도 내심 바랐던 것이고, 우이 씨도 마침 곤란함에 빠져 있었고……."
10026050-60 = "3;하나코 수영복;02;모든 걸 한 번에 해결할 수 있는, '상황 해결을 위한 장치'로 딱 맞는 계획."

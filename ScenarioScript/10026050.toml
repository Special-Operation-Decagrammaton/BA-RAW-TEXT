[translation]
10026050-1 = "Episode 5;Site C: Abandoned Lemon Grove"
10026050-2 = "Site C was a large, flat area carved into the side of a mountain filled with a dense grove of lemon trees."
10026050-3 = "The long-neglected trees were overgrown, completely obscuring any view of the paths between them."
10026050-7 = "[ns1] \"Uh-oh. Is she lost...?\"\n[ns2] \"The other sites I understand, but how did she get lost here?\""
10026050-10 = "Whoa! There you are, Sensei!"
10026050-15 = "[ns] \"Hanako?\""
10026050-16 = "The trees must be pretty dense if you got lost too, huh, Sensei?"
10026050-17 = "It's more like a lemon forest than a grove at this point..."
10026050-18 = "Heehee..."
10026050-19 = "Huh?"
10026050-20 = "I don't know how I know it's a grove. I just do."
10026050-21 = "Or at least, it was..."
10026050-25 = "...Huh. I guess you're right."
10026050-26 = "It could be intuition on my part."
10026050-27 = "How about for now you just take my word for it?"
10026050-28 = "I can tell by the look on your face you don't believe me. But you're not giving me the third degree about this either..."
10026050-29 = "Yeah... Now that I think about it, you've always been the kind of person who looks for the why of things."
10026050-30 = "Why so quiet now? Why aren't you asking me why I brought us here, why I dragged Koharu into it, and all that other stuff?"
10026050-31 = "Does that mean you're okay with it even if you don't understand completely?"
10026050-32 = "[s3] \"I'm sure it'll be all right. It's you, after all.\"\n[s4] \"I'm curious, but I trust you.\""
10026050-35 = "Oh..."
10026050-36 = "I didn't expect you to say something like that."
10026050-37 = "I guess you trust me more than I thought."
10026050-38 = "I suppose we can leave it at that for now. But the next time we have a moment together..."
10026050-39 = "[s] \"...\""
10026050-41 = "[ns7] \"If you want to talk, you're welcome to.\"\n[ns8] \"It would be a shame to end the conversation here.\""
10026050-44 = "..."
10026050-45 = "Heehee..."
10026050-46 = "That's just what I thought you'd say, Sensei."
10026050-47 = "I guess that means the ball's in my court, huh?"
10026050-48 = "I'm not used to being so direct..."
10026050-49 = "But since we're on the topic, how about..."
10026050-50 = "Yes, why not? It is summer, after all."
10026050-54 = "I'll just come right out and say it..."
10026050-55 = "I know you know I orchestrated this whole situation for Ui and Koharu's benefit."
10026050-56 = "You haven't shown a bit of concern even though I haven't explained anything to you. You just...believe in me."
10026050-57 = "And we're here on a beautiful remote island. We're practically on vacation."
10026050-58 = "Sure, we're here to investigate ruins, but we're doing it in our swimsuits in the middle of summer."
10026050-59 = "She won't admit it, but I know Koharu was dying to do something like this. And the fact that it gets Ui out of trouble too, well..."
10026050-60 = "It's kind of a win-win situation for everybody, isn't it?"
10026050-61 = "...Yes."
10026050-62 = "It's all just right."
10026050-63 = "You saw this coming, didn't you, Sensei?"
10026050-64 = "..."
10026050-65 = "But... Sensei."
10026050-66 = "Hypothetically..."
10026050-70 = "What if I told you Koharu and Ui aren't the only ones that needed this?"
10026050-71 = "You know, what if..."
10026050-72 = "[s9] \"...Hanako?\"\n[s10] \"Does that mean...?\""
10026050-75 = "It's predictable, I know."
10026050-76 = "No matter what anyone says, I'm still a high school girl in my prime."
10026050-77 = "I know it doesn't always seem like it, but...I really am just an ordinary girl."
10026050-78 = "Sometimes I'm just like Koharu and the others... Sometimes I have naive hopes and dreams."
10026050-79 = "I know I keep saying I did this for everyone else, but it's for me too."
10026050-81 = "Deep down, I just wanted to be a part of all this."
10026050-84 = "I regret not going with you before."
10026050-86 = "It's not totally impossible for me to feel that way, right? Heehee..."
10026050-87 = "[s] \"...\""
10026050-88 = "And now you're not saying anything. I made it awkward, didn't I?"
10026050-89 = "That explanation was weird coming from someone as young as me, wasn't it?"
10026050-90 = "[s11] \"No, Hanako, it wasn't. I was just thinking you're more relaxed now.\"\n[s12] \"I'm glad you felt comfortable enough to open up to me.\""
10026050-93 = "..."
10026050-94 = "Hm... Is that so?"
10026050-95 = "You know... I think you might be right."
10026050-96 = "Despite the strange location, I wanted to make the most of our time together."
10026050-97 = "I didn't want to tell the usual jokes and stories that we could talk about anytime."
10026050-98 = "With that in mind, Sensei."
10026050-99 = "All of this, us being here together... I'd like it if this happened more in the future..."
10026050-100 = "Is it okay for me to be a little greedy?"
10026050-101 = "[s] \"Yes.\""
10026050-102 = "That was a quick answer."
10026050-103 = "Almost too quick. Don't you think?"
10026050-104 = "I know I'm asking a lot of you, maybe more than you realize..."
10026050-105 = "[s13] \"Well... It is summer, after all.\"\n[s14] \"Well, you're just a high school girl in her prime, after all.\""
10026050-108 = "...Heehee."
10026050-109 = "All right! Then I'm excited for whatever our future holds."
10026050-110 = "You know I won't forget this, right? I have a pretty good memory."
10026050-114 = "And you made a promise to me. ♡"
10026050-119 = "We spent a little more time wandering the lemon groves together before we returned to base camp."
10026050-123 = "And Koharu threatened Hanako with capital punishment when she heard we spent so much time alone together."

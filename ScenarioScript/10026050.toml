10026050-36 = "3;하나코 수영복;08;이건 또 예상외의 반응이……. 그렇다고 그렇게 대답하실 거라고는 생각하지 못했는데 말이에요."
10026050-37 = "3;하나코 수영복;99;어쩌면 저, 생각보다 훨씬 더 큰 신뢰를 받고 있던 걸지도?"
10026050-38 = "3;하나코 수영복;01;그럼 일단 지금은 이대로 넘어가고, 다음에 '기회'가 되면 다시 분위기를 봐서……\n#3;em;…"

10026050-25 = "3;하나코 수영복;01;……어라. 그러……네요?"
10026050-26 = "3;하나코 수영복;03;음-. 여기선 뭐라고 해야 할까요? 그냥 직감……인 걸로?\n#3;em;[음표]"
10026050-27 = "3;하나코 수영복;02;어떻게……. 그 부분은 대충 안 될까요?"
10026050-28 = "3;하나코 수영복;04;으으음-. 역시 믿지 않으시는 얼굴이시네요. 그렇다고 다시 캐묻거나 따지지도 않으시고…….\n#3;em;[땀]"
10026050-29 = "3;하나코 수영복;07;그러고 보면 선생님께서는 처음부터 뭔가 의도라든가……. 살피시는 느낌이었는데 말이죠."
10026050-30 = "3;하나코 수영복;02;물어보실 게 많지 않으신가요? 왜 이런 자리를 마련했는지, 코하루 쨩은 왜 데리고 왔는지 등등. 여러 가지로."
10026050-31 = "3;하나코 수영복;01;이대로……. 괜찮으세요? 이런 식으로 슬그머니 넘어가도?"
10026050-32 = "[s3] \"그야 뭐, 괜찮겠지? 하나코의 일이니까.\"\n[s4] \"궁금하긴 하지만, 의심하지도 않으니까.\""

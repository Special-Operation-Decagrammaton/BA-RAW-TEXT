10026050-46 = "3;하나코 수영복;02;……선생님……. 역시……. 기대를 저버리지 않는 분이라고 해야 할까요."
10026050-47 = "3;하나코 수영복;99;음-. 그러네요. 이러면 또 바통이 저에게 넘어온 건가요?"

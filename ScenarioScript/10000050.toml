[translation]
10000050-1 = "ตอนที่ 5;ถนนแห่งงานเทศกาล"
10000050-2 = "ว่าไงนะ? โดนเล่นงานมาอีกแล้วเหรอ? แล้วอิซุนะล่ะ? อิซุนะไปไหน?"
10000050-3 = "ไม่เห็นจะช่วยอะไรได้เลย! แล้วยังกล้ามาบอกว่าเป็นนินจาอีก!"
10000050-4 = "วันนี้อิซุนะก็วิ่งหนีเตลิดไปก่อนเพราะบอกว่ามีธุระ"
10000050-5 = "ฮึ่ม อุตส่าห์คิดว่ามีความสามารถซะอีก..."
10000050-6 = "(หรือว่าเธอจะพอแค่นี้?)"
10000050-7 = "ขืนปล่อยไว้อย่างนี้ล่ะก็ เราต้องโดนคุณครูจากชาเล่ต์คนนั้นเล่นงานก่อนที่จะพังเทศกาลได้แน่เลยค่ะ"
10000050-8 = "คุณครูจากชาเล่ต์... เขาจะมีพลังขนาดนั้นเลยเหรอ? ถึงจะไม่อยากเชื่อ แต่ช่วยไม่ได้นะ"
10000050-9 = "ตอนนี้มีปีศาจเหลือบนถนนย่านการค้ากี่คน?"
10000050-10 = "อืม.. น่าจะประมาณ 120 คนนะคะ"
10000050-11 = "ดีเลย เราต้องเคลื่อนไหวอย่างจริงจังแล้วสินะ"
10000050-12 = "นี่คือปฏิบัติการขั้นสุดยอด ฟังคำสั่งจากฉันให้ดี"
10000050-15 = "(กระซิบกระซาบ)"
10000050-16 = "เอ๋... จะทำแบบนั้นได้เหรอ?"
10000050-17 = "จริงเหรอคะ? แน่ใจนะคะว่าอยากทำแบบนั้นจริงๆ?"
10000050-18 = "นี่คือการกำจัดตัวแปรสุดท้าย"
10000050-19 = "ทำภารกิจนี้ให้สำเร็จ แล้วพวกเธอก็จะได้โบนัสก้อนโตตามที่เราตกลงกันไว้"
10000050-20 = "ถ้าจะเล่นไม้นี้ก็... ได้อยู่แล้วล่ะบอส"
10000050-21 = "ค่ะ! รับทราบค่ะ!"
10000050-22 = "แล้วก็อย่าลืมล่ะว่า... ต้องปิดภารกิจนี้เป็นความลับต่ออิซุนะ"
10000050-23 = "ถึงเวลาต้องจบเรื่องนี้แล้ว"
10000050-25 = "ร้านเฮียกคิยาโค"
10000050-26 = "(ถึงจะหมดวันแล้ว แต่ทุกคนก็มารวมกันที่ร้านเฮียกคิยาโคเพื่อวางแผนกลยุทธ์)"
10000050-27 = "แล้วเราจะตามหาผู้สั่งการที่ว่ายังไงดีล่ะคะ?"
10000050-28 = "ฉันมีวิธีที่ได้ผลแน่ๆ อยู่"
10000050-29 = "ก่อนอื่นเราต้องออกไปตามถนน หาตัวปีศาจที่ก่อความวุ่นวายให้เจอ แล้วก็ล้อมพวกมันเลยทีเดียว"
10000050-30 = "ถึงก่อนหน้านี้ชมรมเทศกาลจะจัดการเองไม่ไหว แต่ตอนนี้เรามีชมรมฝึกฝนอยู่ด้วย ต้องทำได้แน่!"
10000050-31 = "โดนล้อมแล้วทำยังไงต่อดีล่ะ~?"
10000050-32 = "จากนั้นก็กระหน่ำโจมตี! แล้วจับเป็น!"
10000050-33 = "จากนั้นก็แค่ถามพวกนั้นว่าใครเป็นผู้ว่าจ้างมาอีกที เท่านี้ก็เรียบร้อย!"
10000050-34 = "เราจะใช้ทุกวิถีทางเพื่อให้มันซัดทอดไปถึงผู้ว่าจ้างให้ได้!"
10000050-35 = "สุดยอด! นี่แหละหัวหน้า!"
10000050-37 = "วายร้ายที่ไม่รู้จักความชอบธรรมจะต้องโดนเครื่องประหารหัวสุนัข!"
10000050-38 = "ว้าว....."
10000050-39 = "โอ๊ะ......"
10000050-40 = "ฮ้าวว... zzZ"
10000050-41 = "[s] ตกใจแต่ไม่ได้พูดอะไรออกมา"
10000050-43 = "อืม... มาลองคิดดูแล้ว พีน่าว่าเราไม่น่าจะทำขนาดนั้นนะคะ หัวหน้า..."
10000050-44 = "ไม่นะ ไม่นะ ฉันไม่ได้คิดไปถึงขนาดนั้นสักหน่อย?!"
10000050-45 = "สิ่งที่เราต้องทำคือ จับตัวพวกมันเพื่อให้พวกมันเรียกผู้สั่งการออกมาให้ได้ แบบนี้ต่างหากล่ะ!"
10000050-46 = "ตอนนี้เราไม่มีเวลาแล้ว"
10000050-47 = "พรุ่งนี้จะเป็นไคลแมกซ์ของเทศกาลแล้ว"
10000050-48 = "จริงสิ! ฉันได้ยินว่าจะมีการจุดดอกไม้ไฟด้วย?! จุดด้วยโฮโลแกรมใช่ไหม?! ปัง ปัง ป้าง!"
10000050-49 = "พรุ่งนี้คือวันที่สำคัญที่สุดของเทศกาลแห่งค่ำคืนสีขาว เราได้เตรียมการจุดดอกไม้ไฟ#nเพื่อปิดท้ายเทศกาลอย่างสวยงามเอาไว้"
10000050-50 = "ถ้าพวกปีศาจโผล่มาก่อเรื่อง งานก็คงจะจบสวยๆ ด้วยความวุ่นวายแน่~"
10000050-51 = "และชมรมเทศกาลที่ไม่สามารถป้องกันไม่ให้เกิดเรื่องแบบนั้นไว้ได้ก็คงจะ..."
10000050-52 = "ชิซุโกะจัง..."
10000050-53 = "ช่างเถอะ ฉันจะไม่คิดในแง่ลบแล้ว!"
10000050-54 = "ฉันจะรีบหาตัวผู้สั่งการให้ได้ แล้วเอาความเครียดที่ได้รับไปลงกับทางนั้นแทน! พวกแกเจอดีแน่!"
10000050-55 = "[s] \"บอกมาเถอะว่าในใจคิดอะไรอยู่\""
10000050-56 = "อย่าพูดอะไรเหลวไหลเลยค่ะ!"
10000050-58 = "(ชมรมจัดงานเทศกาลและชมรมฝึกฝนออกไปตรวจท้องถนนด้วยกัน)"
10000050-59 = "พวกปีศาจหายไปไหนกันหมดน่ะ?!"
10000050-60 = "พีน่าคิดว่าพีน่ารู้ค่ะ! นี่มันเหมือนกับรีโมทแอร์เลย!"
10000050-61 = "ตอนที่พีน่าหาว่ารีโมทแอร์อยู่ที่ไหน ทุกคนต้องคาดไม่ถึงแน่ว่าพีน่าไปเจอมันอยู่ในตู้เย็นตลอดเลย!"
10000050-62 = "อ๊ะ! รู้แล้วล่ะว่าหมายถึงอะไร! นี่คือสิ่งที่เรียกว่า 'กฎของมัฟฟิน'"
10000050-63 = "กฎฟังดูน่าอร่อยจัง~"
10000050-64 = "แต่พวกนั้นก็ไม่ออกมาก่อความวุ่นวาย และทุกคนก็ดูเหมือนจะสนุกกับเทศกาลอยู่นะคะ"
10000050-68 = "ฮึ่มม! เป็นแบบนี้ไปได้ยังไงกัน"
10000050-69 = "เจ้าพวกปีศาจต้องไปซ่อนตัวอยู่ที่มุมนั้นแน่...!"
10000050-71 = "แงงงงง~! พ่อคะ แม่คะ~! อยู่ไหนกันน่ะ~!"
10000050-73 = "โอ๊ะ เด็กหลงทางเหรอ?"
10000050-74 = "นิ่งเฉยอยู่ไม่ได้แล้ว! ชมรมฝึกฝนได้เวลาออกโรง! รุ่นพี่สึบากิ!"
10000050-75 = "ออก~ โรง~"
10000050-78 = "หะ... หืม? ดะ...เดี๋ยวนะ"
10000050-79 = "อ๊ะ! อยู่ตรงนี้เองเหรอคะคุณชิซุโกะ? ฉันตามหาซะเกือบทั่วงานเลย"
10000050-80 = "ฉันอยากปรึกษาเรื่องการเตรียมงานดอกไม้ไฟที่จะจัดในวันพรุ่งนี้น่ะค่ะ..."
10000050-81 = "หืม?! ทำไมต้องตอนนี้นะ...!"
10000050-82 = "แต่เป็นถึงหัวหน้าชมรมเทศกาล... จะทำเป็นไม่รู้เรื่องก็คงไม่ได้... พีน่า! ฉันขอจัดการธุระตรงนี้ก่อน!"
10000050-83 = "ถ้าเธอกับคุณครูหาพวกปีศาจเจอล่ะก็ จับตาดูพวกมันไว้ให้ดีนะ!"
10000050-84 = "เยสเซอร์! วางใจพีน่าคนนี้ได้เลย!"
10000050-86 = "อื้ม อื้ม! จู่ๆ ทุกคนก็มีเรื่องยุ่งต้องไปจัดการค่ะ!"
10000050-87 = "[s] \"ถ้าไม่มีพวกปีศาจ ทุกคนก็คงได้ยุ่งแค่กับการจัดเทศกาล\""
10000050-88 = "ถูกต้องเลยค่ะบอส! พูดอีกก็ถูกอีก!"
10000050-89 = "หากไม่มีพวกปีศาจมาก่อกวนล่ะก็ ชมรมเทศกาลของฉันก็คงได้วิ่งวุ่นและเต็มที่อยู่กับการจัดเทศกาล!"
10000050-90 = "แต่พอมาเจอเรื่องแบบนี้ ทุกคนก็เหน็ดเหนื่อย... พีน่าเองก็..."
10000050-91 = "อ๊ะ! นี่ไม่ใช่เวลาจะมาท้อใจสิ! จะว่าไป ตอนนี้มีแค่พีน่าที่อยู่กับบอสเหรอคะ? คนเดียวเหรอคะ?!"
10000050-92 = "นี่เป็น 'ซีน' ที่หัวหน้าความประพฤติห้ามการ์ดตกเด็ดขาด! ฉันจำมาจากเรื่อง#n<หมัดน้องเหมียวไร้คุณธรรม> น่ะค่ะ"
10000050-93 = "[s] \"ฝากตัวด้วยนะพีน่า\""
10000050-94 = "ค่ะ! เรื่องการคุ้มกันบอสและดูแลความสงบของถนนเทศกาล!"
10000050-95 = "ไว้ใจหัวหน้าความประพฤติพีน่าคนนี้ได้เลยค่ะ!"
10000050-96 = "(โครมมมมมม!!)"
10000050-97 = "[s1] \"พูดยังไม่ทันขาดคำเลย!\"\n[s2] \"พวกปีศาจอีกแล้วเหรอ?\""
10000050-101 = "ว่าไงนะ? แบบนี้ใช้ไม่ได้งั้นเหรอ?"
10000050-102 = "กำลังล้อเล่นกับพวกเราอยู่รึไง?! ฮะ?!"
10000050-103 = "ตะ.. แต่ดูตรงนี้ดีๆ สิ ตรงมุมมันขาดนะ..."
10000050-104 = "ช่างมันสิ! มันเป็นรางวัลของฉันนะ! ส่งบัตรกำนัลมาให้ซะดีๆ!"
10000050-105 = "ถ้าได้คูปองเทศกาลมูลค่า 3,000 เยนมาล่ะก็ จะถล่มร้านนี้ให้เรียบเลย!"
10000050-106 = "เฮือกกก!! โหดร้ายเกินมนุษย์ไปแล้ว! แล้วอย่างนี้ฉันจะทำมาหากินยังไงล่ะ!"
10000050-107 = "หึหึหึ ผู้เชี่ยวชาญด้านการจับฉลากก็สนุกกับเทศกาลกันแบบนี้แหละ!"
10000050-108 = "เตรียมตัวเสียใจไว้ได้เลย!"
10000050-110 = "พวกนั้นคืออันธพาลที่โผล่มาทุกเทศกาล!"
10000050-111 = "[s] \"เหมือนแมลงที่บินในช่วงหน้าร้อนน่ะเหรอ?!\""
10000050-112 = "แก๊งกวาดรางวัลที่พวกคนขายของในงานเทศกาลหวาดกลัวกันค่ะบอส!"
10000050-113 = "เห็นทีบอสกับพีน่าต้องออกโรงแล้ว!"
10000050-114 = "อัศวินอย่างพีน่าจะไม่ยกโทษให้ตัวปัญหาที่มารบกวนความสงบสุขของเทศกาลค่ะ!"

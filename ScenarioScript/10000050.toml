[translation]
10000050-1 = "Episode 5;Festival Streets"
10000050-2 = "Defeated again? What about Izuna? Where is she?"
10000050-3 = "She wasn't any help! Some ninja she is!"
10000050-4 = "She ran off earlier saying that she had some business to attend to."
10000050-5 = "Hmm. What a pity. I truly did respect her skills."
10000050-6 = "(I wonder if we can count on her any further.)"
10000050-7 = "At the rate things are going, that Sensei person from Schale will stop us before we can sabotage the festival."
10000050-8 = "I never would have imagined that a single adult could cause so much trouble.#nWell, regardless..."
10000050-9 = "How many Mouryo remain in the streets?"
10000050-10 = "About, uh...120 or so?"
10000050-11 = "Wonderful. Now is the time to go on the offensive, then."
10000050-12 = "Desperate times call for desperate measures, so listen carefully."
10000050-15 = "*whispering* *chattering* *surprising orders*"
10000050-16 = "Huh?! Are you serious?"
10000050-17 = "For real? You really want us to do that? "
10000050-18 = "It's to eliminate the last variable. "
10000050-19 = "Complete this mission and you'll receive your bonuses—as it states in our contract."
10000050-20 = "Well, if you say so. Got it, Boss."
10000050-21 = "Yeah, understood!"
10000050-22 = "Of course...you must keep this a secret from Izuna."
10000050-23 = "It's about time we finish this once and for all."
10000050-25 = "Momoyodou"
10000050-26 = "It's getting late, but everyone has gathered at Momoyodou for a strategy meeting."
10000050-27 = "So, how do we find the culprit?"
10000050-28 = "I have a surefire method. "
10000050-29 = "First, we hit the streets to find some Mouryo causing trouble and surround them."
10000050-30 = "That should be easy enough with the Festival Operations Department and Inner Discipline Club teaming up."
10000050-31 = "What do we do after we surround them?"
10000050-32 = "Simple! We beat them up and capture them."
10000050-33 = "Then we'll make them tell us who hired them."
10000050-34 = "And we'll use any means necessary to get them to talk!"
10000050-35 = "Now you're talking my language, President! "
10000050-37 = "You heard her! Sever the pinkies of anyone who dares to defy our sense of justice!"
10000050-38 = "Whoa..."
10000050-39 = "Well, then..."
10000050-40 = "*yawn*"
10000050-41 = "[s] \"...\""
10000050-43 = "All of you are right—that's a little too much. How could you, President...?#nSo cruel..."
10000050-44 = "What the...?! I never said to do that!"
10000050-45 = "All we have to do is catch them and find out who they're working for!#nThat's the important part!"
10000050-46 = "In all seriousness, though, we're running out of time."
10000050-47 = "The finale of the festival is scheduled for tomorrow."
10000050-48 = "Oh, yeah! It is! There are gonna be fireworks, right? Using holograms!#nWoosh, bang, boom!"
10000050-49 = "You better believe it. We put together a big fireworks show using cutting-edge technology to close the Cherry Blossom Festival."
10000050-50 = "The Mouryo have another thing coming if they plan on interfering with it."
10000050-51 = "Yeah, but if we don't manage to stop them before then, the Festival Operations Department will..."
10000050-52 = "Shizuko..."
10000050-53 = "Sorry. Be gone, negative thoughts!"
10000050-54 = "We'll just have to find the culprit ASAP so I can take my frustrations out on that stupid jerk!"
10000050-55 = "[s] \"Tell us how you REALLY feel, why don't you.\""
10000050-56 = "I-I'm just done bottling up my anger—that's all!"
10000050-58 = "Thus, the Festival Operations Department and the Inner Discipline Club began patrolling the streets together. However..."
10000050-59 = "Why aren't the Mouryo showing up this time?!"
10000050-60 = "I might know! It's just like my TV remote!"
10000050-61 = "You know how it's always the last place you look? Well, the last place I always look is the fridge!"
10000050-62 = "Oh, me too! What do they call that again? Something like...Muffin's Law?"
10000050-63 = "That law sounds delicious."
10000050-64 = "On the bright side, at least everyone is enjoying the festivities without interruption for a change."
10000050-68 = "Gahhh! This can't be right! "
10000050-69 = "The Mouryo must be hiding just around the corner...!"
10000050-71 = "Waaaaah! Mommy! Daddy! Where are you?!"
10000050-73 = "My, my. Are you lost, little lady?"
10000050-74 = "Now it's our turn! Tsubaki! This is a job for the Inner Discipline Club!"
10000050-75 = "Sure. Let's do it..."
10000050-78 = "H-Huh? W-Wait...!"
10000050-79 = "Oh, Shizuko! We've been looking for you!"
10000050-80 = "It's about the fireworks show tomorrow. There's something we need to consult with you about."
10000050-81 = "Huh? Does it have to be right now?"
10000050-82 = "Wait... I'm the Festival Operations Department's president, so I can't ignore this. I'm entrusting the search to you, Pina!"
10000050-83 = "You and Sensei keep your eyes peeled for the Mouryo!"
10000050-84 = "Roger! Leave it to me!"
10000050-86 = "How 'bout that? Everyone is so busy all of a sudden!"
10000050-87 = "[s] \"There's a lot to do, even without the Mouryo causing trouble.\""
10000050-88 = "That's a good point, Boss! You're absolutely right."
10000050-89 = "The Festival Operations Department would have its hands full managing the festival if it wasn't for the Mouryo!"
10000050-90 = "But instead, everyone is going through hard times right now.#nIt makes me feel so..."
10000050-91 = "No, what am I saying?! I need to snap out of it! I can't be feeling down when I'm alone with you, Boss!"
10000050-92 = "I especially can't let my guard down now that the president has made me the field captain. This is just like that one scene from Loyal Cat's Fist! "
10000050-93 = "[s] \"Let's do this, Pina.\""
10000050-94 = "Yeah! I'm here to keep you AND the streets safe."
10000050-95 = "It's Field Captain Pina's time to shine!"
10000050-96 = "*crash*"
10000050-97 = "[s1] \"Speak of the devil!\"\n[s2] \"Is it the Mouryo again?!\""
10000050-101 = "Whaaat? So this is no good?"
10000050-102 = "Are you messing with us? Huh?!"
10000050-103 = "L-Look right here. The corner is ripped off..."
10000050-104 = "Knock it off! It's my prize, and I earned it!"
10000050-105 = "Give me that 3,000-yen festival certificate and I'll draw every single prize in this shop!"
10000050-106 = "P-Please, have mercy! How would I stay in business?!"
10000050-107 = "Hahaha! That's for you to figure out! This is how seasoned prize-drawing veterans enjoy a festival!"
10000050-108 = "Just try to stop us!"
10000050-110 = "Ugh! These kinds of troublemakers show up at every single festival! "
10000050-111 = "[s] \"Like moths to a flame, huh?\""
10000050-112 = "They're known as Draw Killers and are feared by all the festival merchants!#nWe've gotta do something, Boss!"
10000050-113 = "Now's our time to step up to the plate. Are you with me?"
10000050-114 = "We can't overlook anyone threatening the peace of the festival!"

[translation]
10000050-1 = "第5話;慶典進行中"
10000050-2 = "……又被打敗了？還有伊樹菜閣下怎麼了？"
10000050-3 = "那傢伙根本幫不上忙！什麼忍者嘛……！"
10000050-4 = "今天也是在來這裡的途中突然說有事就……"
10000050-5 = "哼，我還以為多少能派上用場的……"
10000050-6 = "（終究只有這種程度嗎……）"
10000050-7 = "這樣下去就算想妨礙櫻花祭，也只會被那個夏萊的老師一直打敗而已。"
10000050-8 = "夏萊的老師……居然擁有這種程度的力量，真是難以置信……也罷。"
10000050-9 = "現在商店街有多少妖怪劇團的人？"
10000050-10 = "那個，大約120人左右……？"
10000050-11 = "……差不多該做個了結了。"
10000050-12 = "仔細聽好我接下來說的話。"
10000050-15 = "（如此如此這般這般……）"
10000050-16 = "咦，真的要那麼做嗎……？"
10000050-17 = "真的假的？那樣真的沒問題嗎？ "
10000050-18 = "這是為了除掉最大的變數。"
10000050-19 = "只要能處理好這件事，計畫就會成功。#n如此一來你們也能依照合約獲得成功的報酬。不是什麼壞事吧。"
10000050-20 = "嘛，我們也想讓計畫成功。知道了。"
10000050-21 = "是！了解！"
10000050-22 = "……還請務必對伊樹菜閣下保密。"
10000050-23 = "是時候做個收尾了。"
10000050-25 = "百夜堂"
10000050-26 = "（太陽下山後，所有人聚在百夜堂進行作戰會議）"
10000050-27 = "具體來說，該怎麼找出元兇呢？"
10000050-28 = "有個最確實的方法。 "
10000050-29 = "首先在街道上找出在某處做亂的妖怪劇團，然後一口氣包圍他們。"
10000050-30 = "這是只靠節慶營運管理部難以成立的大型作戰，不過如今修行部也在就能辦到了！"
10000050-31 = "包圍他們～之後該怎麼做呢……？"
10000050-32 = "當然是一口氣擊退他們！把所有人抓起來！"
10000050-33 = "接下來只要讓他們說出元凶是誰就結束了！"
10000050-34 = "有必要的話使用激烈手段也在所不惜！"
10000050-35 = "不愧是部長！ "
10000050-37 = "要對那些壞蛋施以切小指之刑對吧！"
10000050-38 = "嗚哇……"
10000050-39 = "哎呀……"
10000050-40 = "呼啊……"
10000050-41 = "[s] 啞口無言"
10000050-43 = "那個……仔細想想，菲娜也覺得那樣好像太過火了，部長……"
10000050-44 = "為什麼要說的好像那是我的提案一樣！？"
10000050-45 = "總之就是要抓住妖怪劇團，讓他們供出這一切的元兇！"
10000050-46 = "已經沒有時間了。"
10000050-47 = "明天就是百夜之春櫻花祭的高潮……"
10000050-48 = "啊，我有聽說過！是煙火對吧，全像投影的那種！會砰砰砰的那種！"
10000050-49 = "沒錯，氣氛也會來到最高潮。#n我們準備了與櫻花祭結尾相應的新煙火。"
10000050-50 = "如果到時候妖怪劇團出來作亂的話，可就不只是一場「小騷動」了呢～"
10000050-51 = "要是事情變成那樣，被追究責任的我們節慶營運管理部就……"
10000050-52 = "靜子醬……"
10000050-53 = "……不，假設的問題到時候再考慮也不遲。"
10000050-54 = "先盡快找到元兇！然後把我至今為止承受的壓力完完整整地奉還給他，#n否則我是不會善罷干休的！絕對要把他揍個稀巴爛！！"
10000050-55 = "[s]「看來已經不想演了呢。」"
10000050-56 = "那，那種小事不用在意！"
10000050-58 = "（就這樣，節慶營運管理部和修行部一起開始到街上巡邏，然而……）"
10000050-59 = "那些傢伙明明總是不請自來，為什麼要找他們的時候反而找不到了啊！？"
10000050-60 = "菲娜好像知道！就跟遙控器一樣！"
10000050-61 = "每次要找的時候就會找不到！#n菲娜有一次也是在找遙控器，結果最後是在冰箱裡找到的！"
10000050-62 = "我懂我懂！好像叫瑪芬定律？#n大概就是那種感覺！"
10000050-63 = "真是個聽起來很美味的定律呢，但感覺應該不叫那個名字哦～"
10000050-64 = "不過也多虧沒有發生騷動，大家都很愜意地享受著慶典呢。"
10000050-68 = "唔，為什麼沒出現呢，妖怪劇團……"
10000050-69 = "不對，他們現在一定也打算在某個地方作亂才對……！"
10000050-71 = "嗚啊啊啊～！媽媽～爸爸～！你們在哪裡～！？"
10000050-73 = "哎啊，有個迷路的孩子……？"
10000050-74 = "發生了無法放任不管的事件！！椿前輩！"
10000050-75 = "嗯，出動～"
10000050-78 = "咦，咦咦？等，等等……！？"
10000050-79 = "啊，靜子同學！終於找到你了！"
10000050-80 = "關於明天煙火的準備，有些事想跟你商量……"
10000050-81 = "唔！？偏偏在這種時候……！"
10000050-82 = "但是身為節慶營運管理部的部長，不能就這樣視而不見……#n菲娜！之後就交給你了！"
10000050-83 = "和老師兩個人一起找出妖怪劇團，好好監視他們！"
10000050-84 = "收到！交給菲娜吧！"
10000050-86 = "大家都突然忙碌起來了呢！"
10000050-87 = "[s]「如果妖怪劇團沒有出現的話，就會是這個樣子吧。」"
10000050-88 = "是，我想頭兒說的對！"
10000050-89 = "妖怪劇團不在的話，#n不管是我們節慶營運管理部還是其他人，大家都會忙著四處奔走！"
10000050-90 = "本來要在好的意義上忙碌的，卻像這樣在別的意義上忙個不停……"
10000050-91 = "啊，現在不是消沉的時候！#n現在和頭兒在一起的只有菲娜而已！"
10000050-92 = "這是身為特攻隊長，一旦露出破綻就會很不妙的場景對吧！#n我在《不仁不義的喵喵拳》裡有看過！"
10000050-93 = "[s]「拜託你囉，菲娜。」"
10000050-94 = "是！頭兒的貼身護衛，以及櫻花祭的治安……"
10000050-95 = "通通交給我特攻隊長菲娜吧！"
10000050-96 = "（哐鏘！）"
10000050-97 = "[s1]「一講完就出事了！？」\n[s2]「妖怪劇團！？」"
10000050-101 = "啊？這個是失敗？"
10000050-102 = "你認真！？"
10000050-103 = "可，可是這裡，角落的地方有破損……"
10000050-104 = "看仔細一點！明明就成功了，乖乖把商品券交出來！"
10000050-105 = "拿到3千圓的商品券之後，就拿它再來挑戰。#n這樣就能在這間店的切糖賣光之前無限循環下去！"
10000050-106 = "噫，噫噫！！怎麼能做出這麼殘酷的事！這樣我們要怎麼做生意！？"
10000050-107 = "咯咯咯！這就是我們切糖達人享受櫻花祭的方式！"
10000050-108 = "你就後悔被我們看見吧！"
10000050-110 = "那個是……！據說每次櫻花祭都會出現的「切糖小流氓」！ "
10000050-111 = "[s]「那是什麼季節性產物……」"
10000050-112 = "他們是所有切糖商人們都害怕的客人！頭兒！"
10000050-113 = "現在正是頭兒和菲娜該挺身而出的時候！"
10000050-114 = "這些擾亂櫻花祭和平的問題兒童，菲娜是不會放過你們的！"

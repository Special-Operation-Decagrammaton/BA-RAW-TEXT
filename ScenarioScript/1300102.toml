[translation]
1300102-1 = "雲的味道"
1300102-2 = "（抵達商店街，便看到知世一臉放空走來走去）"
1300102-7 = "[s] 「知世，妳在做什麼……？」"
1300102-8 = "啊，老師。你來了啊？"
1300102-9 = "[s] 「怎麼一直在這邊走來走去的……？」"
1300102-10 = "那個啊……"
1300102-11 = "我，在追雲。"
1300102-12 = "[s] 「雲？」"
1300102-13 = "啊，又動了。"
1300102-14 = "追上去吧，老師。"
1300102-18 = "（知世慢慢踏出腳步，跟上流動的雲）"
1300102-19 = "[s] 「啊，等等知世，等一下……！」"
1300102-22 = "雲……"
1300102-27 = "[ns] 「知世說要去找的雲，就是那個嗎？」"
1300102-28 = "不是，不一樣。"
1300102-29 = "我在找的雲，要再，更柔軟一些，"
1300102-30 = "輕飄飄～的雲。"
1300102-31 = "[s] 「輕飄飄～……？」"
1300102-32 = "……"
1300102-36 = "[ns] 「等，等一下！知世！」"
1300102-38 = "（那之後也持續跟著追隨雲朵的知世，到處走來走去）"
1300102-41 = "也不是這裡……"
1300102-50 = "這裡也，不對。"
1300102-51 = "嗯……"
1300102-53 = "[s] 「知世，可以停一下嗎？」"
1300102-55 = "嗯？怎麼了？"
1300102-56 = "[s1] 「希望妳告訴我特徵。」\n[s2] 「具體來說，是什麼樣的雲？」"
1300102-57 = "特徵……"
1300102-58 = "特徵……"
1300102-59 = "[s] 「如果知道了我也能幫忙找。」"
1300102-60 = "……確實。"
1300102-61 = "嗯，說得也是呢。"
1300102-62 = "特徵……那個，"
1300102-63 = "首先……"
1300102-64 = "[s] 「首先……？」"
1300102-65 = "很柔軟。"
1300102-66 = "[s3] 「話說剛才也說了很柔軟呢。」\n[s4] 「還有呢？」"
1300102-67 = "還有……"
1300102-68 = "還有……"
1300102-69 = "有股很香的味道。"
1300102-70 = "[s5] 「原來如此，很香的味道啊……」\n[s6] 「……很香的味道？」"
1300102-71 = "嗯。"
1300102-72 = "嗯。"
1300102-73 = "聞了味道，就感覺要飄上天了，軟綿綿、輕飄飄～的。"
1300102-74 = "[s] 「啊……還有嗎？有沒有更具體一點的……」"
1300102-75 = "具體……"
1300102-76 = "啊。"
1300102-77 = "像這樣，清爽的，像太陽公公一樣的味道。"
1300102-78 = "[s7] 「像太陽公公的味道啊……」\n[s8] 「沒有了嗎？」"
1300102-79 = "還有……還有什麼……"
1300102-80 = "還有……還有什麼……"
1300102-81 = "啊。"
1300102-82 = "[s] 「哦，想到什麼了嗎？」"
1300102-83 = "那朵雲，跟老師好像。 "
1300102-84 = "嗯，跟老師很像。"
1300102-85 = "[s9] 「？？？？」\n[s10] 「……我？」"
1300102-86 = "嗯，像太陽公公一樣溫暖，味道很好聞，只要在一起就會覺得很幸福……"
1300102-87 = "嗯，像太陽公公一樣溫暖，味道很好聞，只要在一起就會覺得很幸福……"
1300102-88 = "有種好喜歡的感覺。"
1300102-89 = "[s11] 「是，是嗎。」\n[s12] 「指的是知世看到的雲……對吧？」"
1300102-90 = "對，雲。"
1300102-91 = "對，雲。"
1300102-92 = "想說今天的天氣這麼好，說不定今天能找到。"
1300102-93 = "能找到就好了。"
1300102-95 = "（那之後也和知世一起，四處尋找那朵雲找了好一段時間，還沒找到就日落了）"
1300102-98 = "[ns] 「雲，結果沒找到呢。」"
1300102-99 = "嗯。"
1300102-100 = "[s] 「機會不是只有今天，下次再……」"
1300102-101 = "（盯──）"
1300102-102 = "[s] 「知世……？」"
1300102-103 = "（盯────）"
1300102-104 = "[s] 「知世，妳在看什麼？有什麼有趣的東西嗎？」"
1300102-107 = "棉花糖……"
1300102-108 = "[s]「棉花糖？」"
1300102-110 = "[s] 「要吃棉花糖嗎？我去買吧？」"
1300102-111 = "（點頭）"
1300102-114 = "謝謝惠顧，來！"
1300102-116 = "啊姆。"
1300102-117 = "[s] 「如何，好吃嗎？」"
1300102-118 = "好吃。"
1300102-119 = "[s13] 「太好了呢。」\n[s14] 「下次再一起找雲吧。」"
1300102-122 = "嗯……啊姆，嚼嚼。"
1300102-123 = "[s] 「話說回來，結果那朵雲是什麼？」"
1300102-124 = "……要說明，有點難。"
1300102-125 = "但是，沒關係了……"
1300102-126 = "這朵雲，我也很喜歡。"
1300102-127 = "[s] 「這朵雲？」"
1300102-128 = "雖然形狀有點不一樣……不過是老師買給我的，"
1300102-129 = "好吃的雲。"
1300102-130 = "[s] 「……？」"
1300102-131 = "啊……"
1300102-132 = "雙手都變得黏黏的，老師。"
1300102-133 = "[s] 「啊，等我一下，手帕我記得是在……」"
1300102-134 = "……為了不會黏黏的，把剩下的先用水洗過再吃吧。"
1300102-135 = "[s] 「……不，不要那麼做比較好吧！？」"
1300102-137 = "（那之後，拼命阻止知世拿著棉花糖跑向飲水處）"

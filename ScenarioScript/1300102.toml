[translation]
1300102-1 = "กลิ่นเมฆ"
1300102-2 = "(มาถึงย่านการค้าก็เห็นชิเซะกำลังเดินเหม่ออยู่)"
1300102-7 = "[s] \"ชิเซะ ทำอะไรอยู่.....?\""
1300102-8 = "อ๊ะ คุณครูมาแล้วเหรอ?"
1300102-9 = "[s] \"ครูเห็นเธอเดินไปเดินมาสักพักแล้วล่ะ\""
1300102-10 = "คือว่า..."
1300102-11 = "ฉันกำลังไล่ตามก้อนเมฆอยู่น่ะ"
1300102-12 = "[s] \"เมฆเหรอ?\""
1300102-13 = "อ๊ะ มันขยับอีกแล้ว"
1300102-14 = "คุณครูคะ เราต้องรีบตามมันไปนะ"
1300102-18 = "(ชิเซะเริ่มออกเดินตามเมฆที่ลอยไปเรื่อยๆ)"
1300102-19 = "[s] \"อ๊ะ เดี๋ยวก่อนชิเซะ รอด้วย!\""
1300102-22 = "ก้อนเมฆ...."
1300102-27 = "[ns] \"นั่นใช่ก้อนเมฆที่ชิเซะตามหาอยู่รึเปล่า?\""
1300102-28 = "ไม่ใช่ มันไม่เหมือนกัน"
1300102-29 = "ก้อนเมฆที่ฉันตามหา... มันจะดูนุ่มนิ่มกว่าหน่อย"
1300102-30 = "ฟ้าจ๋าฟ้า~ ลอยละล่อง~ คุณครู"
1300102-31 = "[s] \"ฟ้าจ๋าฟ้า...\""
1300102-32 = "......"
1300102-36 = "[ns] \"รอเดี๋ยวชิเซะ!\""
1300102-38 = "(คุณครูเดินตามชิเซะที่ไล่ตามก้อนเมฆไปเรื่อยๆ และเริ่มเดินวนเวียนไปที่ต่างๆ)"
1300102-41 = "ที่นี่ก็ไม่ใช่..."
1300102-50 = "ที่นี่ก็ไม่มี"
1300102-51 = "อืม~"
1300102-53 = "[s] \"ชิเซะ หยุดก่อน!\""
1300102-55 = "หืม? คุณครู? ทำไมเหรอ?"
1300102-56 = "[s1] \"อย่ามองหาสะเปะสะปะสิ\"\n[s2] \"ก้อนเมฆที่ตามหามีลักษณะพิเศษยังไงเหรอ?\""
1300102-57 = "ลักษณะพิเศษของก้อนเมฆที่ฉันตามหา..."
1300102-58 = "ลักษณะพิเศษของก้อนเมฆที่ฉันตามหา..."
1300102-59 = "[s] \"ถ้าอธิบายให้ครูฟังจะได้ช่วยกันหาได้เร็วขึ้นไง\""
1300102-60 = "อ๋า~ ถ้าช่วยกันหากับคุณครู..."
1300102-61 = "อย่างนี้นี่เอง~ จะหาได้เร็วขึ้นสินะ"
1300102-62 = "ถ้างั้นลักษณะพิเศษของก้อนเมฆที่ฉันอยากตามหา นั่นก็คือ..."
1300102-63 = "อย่างแรก~"
1300102-64 = "[s] \"อย่างแรก...?\"\""
1300102-65 = "เมฆก้อนนุ่มๆ นิ่มๆ"
1300102-66 = "[s3] \"นุ่มนิ่ม อ๋อ.. ที่พูดไปก่อนหน้านี้\"\n[s4] \"ก้อนเมฆที่สัมผัสนุ่มนิ่ม แล้วก็...?\""
1300102-67 = "แล้วก็..."
1300102-68 = "แล้วก็..."
1300102-69 = "มีกลิ่นหอมมากๆ"
1300102-70 = "[s5] \"อืม มีกลิ่นหอมด้วย\"\n[s6] \"หืม? กลิ่นเหรอ...?\""
1300102-71 = "อื้ม"
1300102-72 = "อื้ม"
1300102-73 = "พอสูดหายใจเข้าจะได้กลิ่นที่เหมือนกับลอยอยู่บนท้องฟ้า ลอยไปในฟ้าจ๋าฟ้า~"
1300102-74 = "[s] \"ช่วยอธิบายให้ละเอียดกว่านี้หน่อยได้ไหม...?\""
1300102-75 = "ละเอียดกว่านี้..."
1300102-76 = "อ่า"
1300102-77 = "มันมีกลิ่นเหมือนแสงแดด"
1300102-78 = "[s7] \"กลิ่นแสงแดด...\"\n[s8] \"อืม... มีลักษณะพิเศษอย่างอื่นอีกไหม?\""
1300102-79 = "ลักษณะพิเศษอย่างอื่นอีกงั้นเหรอ... ลักษณะพิเศษอื่น..."
1300102-80 = "ลักษณะพิเศษอย่างอื่นอีกงั้นเหรอ... ลักษณะพิเศษอื่น..."
1300102-81 = "อ๋อ มีๆ"
1300102-82 = "[s] \"โอ๊ะ มีอีกสินะ! มันคืออะไรเหรอ?\""
1300102-83 = "ก้อนเมฆที่ให้ความรู้สึกเหมือนกับคุณครู"
1300102-84 = "อื้ม เหมือนคุณครู"
1300102-85 = "[s9] \"????\"\n[s10] \"เหมือนครูเหรอ?\""
1300102-86 = "อื้อ~ อบอุ่นเหมือนแสงแดด กลิ่นก็หอม~ พออยู่ด้วยแล้วมีความสุข~"
1300102-87 = "อื้อ~ อบอุ่นเหมือนแสงแดด กลิ่นก็หอม~ พออยู่ด้วยแล้วมีความสุข~"
1300102-88 = "ฉันชอบมากเลยล่ะ"
1300102-89 = "[s11] \"แบบนี้นี่เอง\"\n[s12] \"หมายถึงเมฆที่ชิเซะเห็น...ใช่ไหม?\""
1300102-90 = "อื้อ พูดถึงเมฆที่ชิเซะเห็น ใช่แล้วล่ะ~"
1300102-91 = "อื้อ พูดถึงเมฆที่ชิเซะเห็น ใช่แล้วล่ะ~"
1300102-92 = "วันนี้อากาศดีจังเลย~ วันนี้น่าจะหาก้อนเมฆเจอนะ~"
1300102-93 = "อยากให้หาเจอจัง..."
1300102-95 = "(เดินตามหาก้อนเมฆกับชิเซะอยู่พักใหญ่ จนดวงอาทิตย์ลับขอบฟ้าแล้วก็ยังไม่มีวี่แววจะเจอ)"
1300102-98 = "[ns] \"สุดท้ายก็หาก้อนเมฆไม่เจอสินะ\""
1300102-99 = "อื้อ"
1300102-100 = "[s] \"ไม่เป็นไรนะ โอกาสไม่ได้มีแค่วันนี้วันเดียวนี่นา ไว้คราวหน้า...\""
1300102-101 = "(จ้องมอง)"
1300102-102 = "[s] \"ชิเซะ...?\""
1300102-103 = "(ยังจ้องอยู่)"
1300102-104 = "[s] \"ชิเซะ มองอะไรอยู่น่ะ?\""
1300102-107 = "สายไหม......"
1300102-108 = "[s] \"สายไหมเหรอ?\""
1300102-110 = "[s] \"ถ้าอยากกินสายไหม... ครูซื้อให้เอาไหม?\""
1300102-111 = "(พยักหน้า)"
1300102-114 = "ขอบคุณที่อุดหนุนนะครับ!"
1300102-116 = "ง่ำ ง่ำ"
1300102-117 = "[s] \"เป็นยังไง อร่อยไหม?\""
1300102-118 = "อื้อ"
1300102-119 = "[s13] \"โล่งอกไปที\"\n[s14] \"วันนี้หาก้อนเมฆไม่เจอ ไว้ครั้งหน้ามาหากันใหม่นะ\""
1300102-122 = "อื้อ... ง่ำๆ"
1300102-123 = "[s] \"ว่าแต่ แล้วก้อนเมฆนั่นเป็นยังไงบ้าง?\""
1300102-124 = "อืม อธิบายยากอยู่นะ"
1300102-125 = "แต่ก็ถือว่าใช้ได้..."
1300102-126 = "เมฆก้อนนี้ฉันก็ชอบ"
1300102-127 = "[s] \"เมฆเหรอ?\""
1300102-128 = "รูปร่างกับความรู้สึกอาจต่างกันนิดหน่อย แต่คุณครูซื้อให้..."
1300102-129 = "เมฆก้อนนี้อร่อยมากเลย"
1300102-130 = "[s] \"...?\""
1300102-131 = "อ่า..."
1300102-132 = "มือเหนียวหมดแล้วอ่ะ คุณครู"
1300102-133 = "[s] \"อ่า เดี๋ยวนะ ครูมีทิชชู่ไว้เช็ดมือชิเซะ อยู่ไหนนะ...\""
1300102-134 = "อืม~ คงจะต้องใช้น้ำล้างสายไหมที่เหลืออยู่ออก"
1300102-135 = "[s] \"ไม่นะ ล้างไม่ได้นะ!\""
1300102-137 = "(พยายามห้ามไม่ให้ชิเซะเอามามือเช็ดกับเสื้อแทนการไปล้างมือ)"

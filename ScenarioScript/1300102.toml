[translation]
1300102-1 = "The Scent of Clouds"
1300102-2 = "As I arrived at the shopping area, I saw Chise walking around aimlessly."
1300102-7 = "[s] \"Chise, what are you doing?\""
1300102-8 = "Ah, Sensei. You're here?"
1300102-9 = "[s] \"You look like you're just wandering around.\""
1300102-10 = "Well..."
1300102-11 = "Uh, I was chasing a cloud."
1300102-12 = "[s] \"A cloud?\""
1300102-13 = "Ah, there, it's moving again."
1300102-14 = "Sensei, we have to chase it."
1300102-18 = "Chise started walking slowly after a drifting cloud."
1300102-19 = "[s] \"Uh, hold up, Chise! Wait!\""
1300102-22 = "The cloud..."
1300102-27 = "[ns] \"Is that the cloud you're looking for?\""
1300102-28 = "No, it's different."
1300102-29 = "The cloud I'm looking for is a little...softer."
1300102-30 = "It's light and fluffy, Sensei."
1300102-31 = "[s] \"Clouds...clouds...\""
1300102-32 = "..."
1300102-36 = "[ns] \"Chise, wait!\""
1300102-38 = "I walked all over chasing after Chise, who was drifting around like the wind."
1300102-41 = "Not here, either..."
1300102-50 = "Not here, either."
1300102-51 = "Hmm..."
1300102-53 = "[s] \"Chise, hold on a minute!\""
1300102-55 = "Hmm? Sensei? What's the matter?"
1300102-56 = "[s1] \"Maybe you should give it a rest.\"\n[s2] \"What kind of cloud are you looking for, exactly?\""
1300102-57 = "The kind of cloud I'm looking for..."
1300102-58 = "The kind of cloud I'm looking for..."
1300102-59 = "[s] \"If you just tell me, we can find it faster.\""
1300102-60 = "Good point. With your help, Sensei..."
1300102-61 = "...I think we can find it."
1300102-62 = "So, the kind of cloud I'm looking for...is..."
1300102-63 = "Well..."
1300102-64 = "[s] \"Well...?\""
1300102-65 = "It's a soft cloud."
1300102-66 = "[s3] \"Soft. Right. You already said that.\"\n[s4] \"It was a soft cloud. And?\""
1300102-67 = "And..."
1300102-68 = "And..."
1300102-69 = "It had a great smell to it."
1300102-70 = "[s5] \"Of course, it had a great smell.\"\n[s6] \"...Wait. Huh? Smell?\""
1300102-71 = "Yup."
1300102-72 = "Yup."
1300102-73 = "The scent made me feel like I was floating through the soft clouds in the sky."
1300102-74 = "[s] \"Well, could you explain in more detail...\""
1300102-75 = "More detail..."
1300102-76 = "Uh."
1300102-77 = "It smells like the shining sun over our heads."
1300102-78 = "[s7] \"Smells like the sun...\"\n[s8] \"Is there anything else I can go by?\""
1300102-79 = "Anything else... Some other characteristic... "
1300102-80 = "Anything else... Some other characteristic... "
1300102-81 = "Ah, there's one other thing."
1300102-82 = "[s] \"Oh! What is it?\""
1300102-83 = "The cloud felt like you."
1300102-84 = "Yup, it was just like you."
1300102-85 = "[s9] \"Huh?\"\n[s10] \"Felt like me?\""
1300102-86 = "Yeah! It's warm like the sunshine and smells so incredibly good. I feel great just being around it!"
1300102-87 = "Yeah! It's warm like the sunshine and smells so incredibly good. I feel great just being around it!"
1300102-88 = "I liked it a lot."
1300102-89 = "[s11] \"I see.\"\n[s12] \"You mean the cloud you saw...right?\""
1300102-90 = "Yeah, of course I'm talking about the cloud!"
1300102-91 = "Yeah, of course I'm talking about the cloud!"
1300102-92 = "The weather is so great today! I think we might find it!"
1300102-93 = "It'd be great if we did..."
1300102-95 = "I wandered around with Chise looking for the cloud. The sun set before we could find it."
1300102-98 = "[ns] \"I guess we're not going to find the cloud.\""
1300102-99 = "Yeah."
1300102-100 = "[s] \"It's fine, there's always tomorrow. Next time...\""
1300102-101 = "(stare)"
1300102-102 = "[s] \"Chise...?\""
1300102-103 = "(staaare)"
1300102-104 = "[s] \"Chise, what are you staring at?\""
1300102-107 = "Cotton candy..."
1300102-108 = "[s] \"Cotton candy?\""
1300102-110 = "[s] \"If you want cotton candy...I can buy you some.\""
1300102-111 = "(nod)"
1300102-114 = "Thank you!"
1300102-116 = "Nom nom."
1300102-117 = "[s] \"How is it? Good?\""
1300102-118 = "Oh yeah."
1300102-119 = "[s13] \"That's great.\"\n[s14] \"We didn't find the cloud, but there's always next time.\""
1300102-122 = "Yup... Nom nom nom."
1300102-123 = "[s] \"By the way, what's with that cloud you were looking for?\""
1300102-124 = "It's hard to explain."
1300102-125 = "But that's fine..."
1300102-126 = "This cloud, I like this one too."
1300102-127 = "[s] \"A cloud?\""
1300102-128 = "The shape and texture is a little different, but..."
1300102-129 = "You sure know how to buy the tastiest clouds."
1300102-130 = "[s] \"...?\""
1300102-131 = "Ah..."
1300102-132 = "My hand is all sticky, Sensei."
1300102-133 = "[s] \"Oh, wait. I have something around here you can use...\""
1300102-134 = "Hmm. I should wash the rest of the cotton candy so it's not so sticky."
1300102-135 = "[s] \"...No, don't do that!\""
1300102-137 = "After that I tried desperately to keep Chise from wiping her hands on my clothes."

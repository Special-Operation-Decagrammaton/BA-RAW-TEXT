[translation]
1000202-1 = "Forbidden Research"
1000202-2 = "Gehenna Student Dining Hall 17"
1000202-3 = "Heh heh heh. The dining hall is closed. There will be no more students to interfere."
1000202-4 = "*click*"
1000202-10 = "Good thing the hall still has electricity and running water after hours."
1000202-11 = "This is the perfect spot for a little epicurean research. No one will bother us here!"
1000202-12 = "[s] \"Why am I here...?\""
1000202-13 = "Is that a rhetorical question? "
1000202-14 = "I need an adult here to take responsibility in case we're caught by the Prefect Team."
1000202-15 = "[s] \"That's just cruel...\""
1000202-16 = "Heh. No one said life is fair. Now, let's get down to business. "
1000202-17 = "Today's epicurean subject is coq au vin!"
1000202-18 = "[s1] \"Coq au vin...?\"\n[s2] \"Gesundheit.\""
1000202-19 = "You should already know, but allow me to explain coq au vin... "
1000202-20 = "Coq au vin."
1000202-21 = "It's an easy stew made by boiling chicken and vegetables. You just put the ingredients in the pot and boil it all together."
1000202-22 = " However...if it were really that simple, it wouldn't be worth researching."
1000202-23 = "What makes coq au vin different is that instead of water, wine is used to boil the chicken."
1000202-24 = "[s] \"Wine...?\""
1000202-25 = "Yes, as in the alcohol."
1000202-26 = "Naturally, it's off limits here. No student in Kivotos can buy wine."
1000202-27 = "The upscale restaurant that serves this dish doesn't allow students inside...so there's no way for me to try it for myself."
1000202-28 = "Instead... "
1000202-29 = "...I prepared ethyl alcohol and grape juice as a substitute!"
1000202-30 = "[s] \"What?!\" "
1000202-31 = "Heh heh heh. I've been searching for a combination that would act as a good substitute for the taste of wine."
1000202-32 = "All I need is grapes and alcohol, no? This should be perfect. With this combination, I can make my own coq au vin."
1000202-33 = "Just watch, Sensei."
1000202-34 = "First, grill the bacon in the frying pan."
1000202-35 = "*sizzle*"
1000202-37 = "Next, fry the breaded chicken in the bacon grease."
1000202-38 = "*sizzle*"
1000202-40 = "After that, put the cooked chicken, mushrooms, carrots, and onions in the pot."
1000202-42 = "(pours)"
1000202-43 = "Then, pour the grape juice."
1000202-45 = "(pours)"
1000202-47 = "[s] \"I don't know about this...\""
1000202-48 = "Heh heh. Don't worry, Sensei. The plan is foolproof."
1000202-49 = "Finally, it's time for the alcohol..."
1000202-50 = "..."
1000202-51 = "Hmm... How much should I put in?"
1000202-52 = "I should have thought about this beforehand..."
1000202-53 = "Well, I'm sure it'll be fine. The book I read said that alcohol evaporates when it's boiled..."
1000202-54 = "I'll just dump it in!"
1000202-57 = "*pours*"
1000202-58 = "Heh heh heh. A true epicure is never stingy with ingredients. I like to put in more than enough..."
1000202-61 = "*pours*"
1000202-62 = "Okay, maybe I went a little overboard...but I'm sure it will be fine.."
1000202-63 = "Let's turn up the heat..."
1000202-65 = "Huh?"
1000202-67 = "*bang*"
1000202-68 = "(The pot exploded.)"
1000202-70 = "...?!"
1000202-71 = "[s] \"Are you okay, Haruna?!\""
1000202-72 = "Yes, I-I'm fine...but the coq au vin is..."
1000202-74 = "*braaang*"
1000202-75 = "We set off the fire alarm?!"
1000202-76 = "There was an explosion in the closed dining hall! "
1000202-77 = "Could it be an attack?! Report to the Prefect Team right away! Have them converge all forces on the dining hall!"
1000202-78 = "Whoops... Looks like we're busted."
1000202-79 = "[s] \"Quick, let's run!\""
1000202-80 = "B-But...what about the food?"
1000202-86 = "(We left the dining hall with me having to drag Haruna by the hand.)"
1000202-88 = "Oh... This is bad."
1000202-89 = "It wasn't a big explosion, thankfully...but now the secret research lab is gone."
1000202-90 = "*sigh*"
1000202-91 = "...It's okay. I can always find another place. "
1000202-92 = "The ratio of alcohol played a bigger part than I thought. I'll have to be more careful next time."
1000202-94 = "(There was more to it than that, but it's pointless talking to Haruna when she gets like this...)"
1000202-95 = "(I'll have to visit Gehenna's faculty office later and apologize.)"

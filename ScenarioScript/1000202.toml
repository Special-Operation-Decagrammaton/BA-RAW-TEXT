[translation]
1000202-1 = "การวิจัยต้องห้าม"
1000202-2 = "โรงอาหารฮอลล์ 17 เกเฮนน่า"
1000202-3 = "ฮุฮุฮุ ตอนนี้โรงอาหารที่นี่ถูกปิดไว้ชั่วคราว และก็ห้ามไม่ให้นักเรียนคนอื่นเข้ามา"
1000202-4 = "(กริ๊ก)"
1000202-10 = "แต่ว่ายังเปิดใช้ไฟฟ้ากับน้ำได้อยู่"
1000202-11 = "เพราะงั้นที่นี่จึงเหมาะสำหรับใช้วิจัยอาหารได้สบายๆ โดยไม่มีใครมารบกวนยังไงล่ะคะ!"
1000202-12 = "[s] \"แล้วพาครูมาทำไมเหรอ....\""
1000202-13 = "ทำไมถึงถามแบบนั้นล่ะคะ"
1000202-14 = "ถ้าพวกคณะกรรมการวินัยมาเจอเข้าละก็ อย่างน้อยก็ควรมีผู้ใหญ่ออกรับแทนสักคนใช่ไหมล่ะคะ?"
1000202-15 = "[s] \"ใจร้ายเกินไปแล้ว....\""
1000202-16 = "ฮุฮุ บางครั้งชีวิตมันก็โหดร้ายแบบนี้นั่นแหละค่ะ เอาละ ถ้างั้นเข้าเรื่องกันเลยดีกว่า"
1000202-17 = "เมนูที่เราจะวิจัยกันวันนี้ก็คือ \"กอโกแว็ง\" ค่ะ"
1000202-18 = "[s1] \"กอโกแว็งงั้นเหรอ....\"\n[s2] \"เมนูอะไรน่ะ?\""
1000202-19 = "ค่ะ เมนูที่มีชื่อว่ากอโกแว็งก็คือ...."
1000202-20 = "กอโกแว็งก็คือ..."
1000202-21 = "เมนูสตูที่ทำมาจากไก่และผักหลายชนิดที่ใส่ลงไปต้มด้วยกันค่ะ สามารถทำได้ง่ายๆ#nเพียงแค่ใส่ส่วนผสมลงไปต้มในหม้อ เท่านี้ก็เสร็จเรียบร้อยแล้ว"
1000202-22 = "แต่ว่า... ถ้ามันง่ายขนาดนั้นฉันคงไม่คิดที่จะทำการวิจัยแน่นอนค่ะ"
1000202-23 = "ความแตกต่างที่โดดเด่นของกอโกแว็งก็คือจะต้องใช้ไวน์ในการตุ๋นไก่แทนน้ำค่ะ "
1000202-24 = "[s] \"ไวน์งั้นเหรอ....\""
1000202-25 = "ค่ะ เหล้าองุ่น เครื่องดื่มแอลกอฮอล์นั่นแหละค่ะ"
1000202-26 = "ในคิโวทอส นักเรียนจะไม่สามารถซื้อของพวกนี้ได้เลย"
1000202-27 = "และจะมีขายเฉพาะในภัตตาคารหรูหราที่ห้ามไม่ให้เด็กนักเรียนเข้าด้วย...#nดังนั้นแค่ลำพังตัวฉันคงจะหาซื้อไวน์มาไม่ได้แน่ๆ ค่ะ"
1000202-28 = "เพราะฉะนั้น..."
1000202-29 = "ฉันเลยเตรียมเอทิลแอลกอฮอล์มาใช้แทนไวน์องุ่นค่ะ"
1000202-30 = "[s] \"อะไรนะ?!\""
1000202-31 = "ฮุฮุฮุ ฉันเลยพยายามหาส่วนผสมที่จะใช้แทนไวน์แทนค่ะ"
1000202-32 = "องุ่นกับแอลกอฮอล์ ตามหลักแล้วก็ไม่น่าจะมีปัญหาอะไร ฉันเลยคิดว่าน่าจะเอามาใช้ทำกอโกแว็งได้ค่ะ"
1000202-33 = "คอยดูนะคะคุณครู\n"
1000202-34 = "เอาล่ะ ก่อนอื่นก็นำเบคอนไปทอดในกระทะ...."
1000202-35 = "(ฉ่าาาาาา....)"
1000202-37 = ".....แล้วก็นำไก่ที่หมักกับแป้งมันแล้วไปทอดในน้ำมันจากเบค่อน"
1000202-38 = "(ฉ่าาาาาา....)"
1000202-40 = "หลังจากนั้นก็นำไก่ที่ทอดสุกแล้วกับเห็ด แคร์รอตกับหัวหอมใส่ลงไปในหม้อที่เตรียมเอาไว้...."
1000202-42 = "(ใส่ส่วนผสมลงในหม้อ)"
1000202-43 = "ต่อไปก็ต้องใส่....น้ำองุ่นลงไป"
1000202-45 = "(เทน้ำองุ่น)"
1000202-47 = "[s] \"ชักสังหรณ์ใจไม่ดีแฮะ.....\""
1000202-48 = "ฮุฮุ ไม่ต้องกังวลค่ะคุณครู ตามหลักการแล้วก็ไม่น่าจะมีปัญหาอะไรค่ะ"
1000202-49 = "ต่อไป...ก็จะถึงเวลาใส่แอลกอฮอล์.... "
1000202-50 = "......"
1000202-51 = "อืม.... ต้องใส่เยอะแค่ไหนนะ....."
1000202-52 = "ไม่ได้คิดเรื่องปริมาณที่ต้องใส่เอาไว้เลย...."
1000202-53 = "อืม คงไม่เป็นไรหรอกค่ะ จากที่อ่านมาในหนังสือ แอลกอฮอล์จะค่อยๆ ระเหยไปในตอนที่เคี่ยวสตู..."
1000202-54 = "ใส่ลงไปเลยแล้วกันค่ะ!"
1000202-57 = "(เทแอลกอฮอล์ลงไปในหม้อ)"
1000202-58 = "ฮุฮุฮุ การประหยัดวัตถุดิบไม่ใช่เรื่องที่ดีสำหรับนักชิมอาหารนะคะ เพราะงั้นฉันจะใส่ลงไปอีก...."
1000202-61 = "(เทแอลกอฮอล์ลงไปในหม้อ)"
1000202-62 = "เอาล่ะ.... อืมมม สงสัยจะใส่เยอะเกินไป ถ้างั้นเร่งไฟนิดหน่อย... คงไม่เป็นไรนะ"
1000202-63 = "ถ้างั้นก็เร่งไฟ..."
1000202-65 = "....เอ๋?"
1000202-67 = "(ตู้มมมมมมมม!!)"
1000202-68 = "(หม้อระเบิด)"
1000202-70 = ".........?! \n"
1000202-71 = "[s] \"ฮารุนะ เป็นอะไรรึเปล่า?!\""
1000202-72 = "เอ่อ ฉันไม่เป็นอะไรค่ะ... แต่ว่าหม้อกอโกแว็ง...."
1000202-74 = "(กริ๊งงงงงงงงงงง.....)"
1000202-75 = "สัญญาณเตือนไฟไหม้.....?! "
1000202-76 = "โรงอาหารร้างระเบิดล่ะ!!"
1000202-77 = "มีคนบุกโจมตีงั้นเหรอ!! รีบไปแจ้งคณะกรรมการวินัยเร็วเข้า!! บอกให้พวกเขาไปที่โรงอาหารเร็ว!!"
1000202-78 = "เอ๊ะ.... โดนเจอเข้าซะแล้ว...."
1000202-79 = "[s] \"รีบหนีกันเถอะ!\""
1000202-80 = "ตะ...แต่ว่า...อาหาร..."
1000202-86 = "(คุณครูจูงมือฮารุนะวิ่งหนีออกไปจากโรงอาหารด้วยกัน)"
1000202-88 = "อ่า... แบบนี้ไม่ดีแน่..."
1000202-89 = "โชคดีที่ไม่ได้ระเบิดรุนแรงอะไรมาก... แต่ตอนนี้โรงอาหารที่ใช้เป็นห้องวิจัยมัน...."
1000202-90 = "เฮ้อ...."
1000202-91 = ".....ไม่เป็นไรค่ะ เอาไว้ค่อยไปหาที่ใหม่ก็ได้"
1000202-92 = "ฉันคิดว่า...สัดส่วนแอลกอฮอล์ที่ใส่ลงไปคงจะผิด คราวหน้าฉันจะเตรียมตัวให้ดีกว่านี้ค่ะ"
1000202-94 = "(ถึงเรื่องปริมาณจะไม่ใช่สาเหตุจริงๆ แต่ว่าฮารุนะดูตื่นเต้นมากๆ ถ้าพูดออกไปคงไม่ดีแน่....)"
1000202-95 = "(เอาไว้ค่อยไปขอโทษผู้ดูแลที่เกเฮนน่าก็แล้วกัน)"

[translation]
1000202-1 = "被禁止的研究"
1000202-2 = "格黑娜學園．第17學生餐廳"
1000202-3 = "哼哼哼。雖然現在這裡是被封鎖的餐廳，基本上禁止學生出入，"
1000202-4 = "（喀嚓）"
1000202-10 = "水電都正常供應。 "
1000202-11 = "也就是說，這裡是個不會被任何人妨礙，非常適合研究美食的地方呢！"
1000202-12 = "[s] 「我為什麼會被叫來這裡？」"
1000202-13 = "並不是，要你做什麼困難的事哦。"
1000202-14 = "關於為什麼把老師叫來這裡，是因為……要是被風紀委員會發現了，總得需要一名大人來負責吧？"
1000202-15 = "[s] 「太過分了……」"
1000202-16 = "哼哼。人生就是這樣，好，那麼，趕快開始吧。"
1000202-17 = "今天美食研究的主題是，紅酒燉雞！"
1000202-18 = "[s1] 「紅酒燉雞的話也就是……」\n[s2] 「那是什麼？」"
1000202-19 = "是。就和你知道的一樣，所謂的紅酒燉雞……"
1000202-20 = "所謂的紅酒燉雞……"
1000202-21 = "是種將雞肉與各種蔬菜放入鍋裡一起煮的燉菜料理。做法也不困難，只要將材料放入鍋子裡煮就完成了。"
1000202-22 = "不過……如果這道料理真的那麼簡單的話，我也不會把它當作我的研究主題了。"
1000202-23 = "說穿了紅酒燉雞最大的特徵就是，以紅酒代替白開水燉煮雞肉。 "
1000202-24 = "[s] 「紅酒的話也就是……」"
1000202-25 = "是，葡萄酒。也就是酒。"
1000202-26 = "奇普托斯的學生基本上絕對無法取得的，違禁物品。"
1000202-27 = "有提供酒類的高級餐廳，一般學生也都是禁止進入……就算想入手也沒辦法，禁斷的材料。"
1000202-28 = "所以我擬定的策略是……"
1000202-29 = "乙醇和葡萄汁。"
1000202-30 = "[s] 「什麼！？」"
1000202-31 = "唔哼哼，我思考了有什麼東西重現葡萄酒的味道。"
1000202-32 = "葡萄和酒精，理論上沒有問題。只有用這些東西應該就能製作紅酒燉雞了。"
1000202-33 = "請仔細看好了，老師。"
1000202-34 = "好，先用平底鍋煎培根……"
1000202-35 = "（滋──）"
1000202-37 = "……將裹上麵粉的雞肉用培根油炒過。"
1000202-38 = "（滋──）"
1000202-40 = "接下來在備好的鍋子裡……放入煮熟的雞肉與蘑菇、蘿蔔、洋蔥……"
1000202-42 = "（咕嚕咕嚕）"
1000202-43 = "接下來將葡萄汁……"
1000202-45 = "（咕嚕咕嚕咕嚕）"
1000202-47 = "[s] 「不安……」"
1000202-48 = "哼哼。請不用擔心，理論上完全沒有任何問題哦。"
1000202-49 = "接著把令人期待的酒精…… "
1000202-50 = "……"
1000202-51 = "唔──嗯……該加多少才好呢……"
1000202-52 = "應該要考慮一下比例的……"
1000202-53 = "嘛，應該沒問題吧。反正書裡說，酒精會在沸騰的過程中蒸發幾乎不會留下……"
1000202-54 = "總之先加進去吧！"
1000202-57 = "（咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕……）"
1000202-58 = "哼哼哼。身為追尋美食之道的人，對於食材的使用太過吝嗇可說是大忌。多倒一些……"
1000202-61 = "（咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕咕嚕……）"
1000202-62 = "……呼。雖然感覺好像加得有點太多了……應該沒關係吧。"
1000202-63 = "那麼再把火調大一點……"
1000202-65 = "……？"
1000202-67 = "（咚哐──！）"
1000202-68 = "（鍋子爆炸了）"
1000202-70 = "………！？"
1000202-71 = "[s] 「羽留奈，沒事吧！？」"
1000202-72 = "呃，是。我沒事，但是紅酒燉雞……料理……"
1000202-74 = "（嗡──！嗡──！）"
1000202-75 = "火災警報器……！？ "
1000202-76 = "封鎖的餐廳發生了爆炸！ "
1000202-77 = "是襲擊！！快點通知風紀委員會！！叫大家到餐廳集合！！"
1000202-78 = "哎，哎呀……被發現了嗎……"
1000202-79 = "[s] 「快逃吧！」"
1000202-80 = "可，可是……料理……"
1000202-86 = "（抓著羽留奈的手離開了餐廳）"
1000202-88 = "啊啊……這樣一來…… "
1000202-89 = "所幸爆炸規模沒有很大……但我好不容易找到的祕密研究室……"
1000202-90 = "哈啊……"
1000202-91 = "……沒關係。場地再找就有了呀。"
1000202-92 = "不過……看來應該是搞錯酒精的比例了呢，下次做好更萬全的準備吧。"
1000202-94 = "（雖然應該不是那個問題，但面對眼神閃閃發光的羽留奈，我說不出吐槽的話……）"
1000202-95 = "（之後再去格黑娜道歉吧）"

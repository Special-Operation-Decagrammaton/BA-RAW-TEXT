10023010-51 = "*thud* *flop*"
10023010-52 = "Momoria Wins!"
10023010-55 = "Hahaha! Victory is mine!"
10023010-56 = "That battle...went on...forever..."
10023010-57 = "My countless defeats against Yuzu...against Midori and Aris and even...even Sensei!"

[translation]
10023010-1 = "第1話;超級桃井龍捲風！"
10023010-4 = "啊！失誤了！"
10023010-5 = "冷靜點，還凹得回來！"
10023010-6 = "就算急著打出強攻擊也沒用沒用！#n看到再閃都綽綽有餘！"
10023010-7 = "現在正是使出那個必殺技的機會……！"
10023010-8 = "要上囉～！！！"
10023010-10 = "同時按下CD之後～！#nA、A、B、B、C、C、A、B、C、C、C取消！！！"
10023010-20 = "接下來是！"
10023010-21 = "左，右，下！"
10023010-27 = "左，右，下加上AB！"
10023010-36 = "──超必殺，超級桃井龍旋風！！！"
10023010-51 = "（咚！碰！）"
10023010-52 = "「Player MOMORIA WIN！」"
10023010-55 = "哈哈哈！我贏了！"
10023010-56 = "真漫長啊……真是場漫長的戰鬥……"
10023010-57 = "綠、柚子和愛麗絲……甚至還接連輸給老師的那些日子……#n終於有了回報……"
10023010-58 = "與那樣的過去道聲珍重再見！#n這是會被後世不斷傳頌的偉大傳說的第一步！"
10023010-59 = "沒錯，今天就是「桃井傳說」開始的日子！"
10023010-60 = "我說，剛才那孩子……是不是那個啊？"
10023010-61 = "難道是傳聞中會打到贏為止的那個……？"
10023010-62 = "才，才沒有打到贏為止！平常才沒有那樣……"
10023010-63 = "你看，一聽到「獲勝」這個字眼馬上就有反應。"
10023010-64 = "和傳聞中一樣呢……這麼說來，那個孩子就是……"
10023010-65 = "啊，難道我已經成為名人了……！？"
10023010-66 = "肯定是「小暴君」沒錯！"
10023010-70 = "嗯……？"
10023010-71 = "那是誰……？"
10023010-72 = "最近這附近的遊戲中心都在傳！"
10023010-73 = "聽說只要陷入不利就會亂打一通！"
10023010-74 = "而且還會要求再戰到贏了為止，如果打算離開就會被狠狠地瞪著……#n不過不會敲打機台或現實PK，似乎還是有遵守禮儀的哦。"
10023010-75 = "一般人是不會敲機台或現實PK的哦！？"
10023010-76 = "亂打一通就……"
10023010-77 = "這個……也許……有嗎？"
10023010-78 = "你看這個……社群網站上有人說「有個很像小暴君的人！」！"
10023010-79 = "還真的有……而且照片上的遊戲中心就是這裡，果然是本人嗎？"
10023010-80 = "咦？咦？#n這，這是什麼情況……？"
10023010-84 = "這個人群是怎麼回事！！！"
10023010-85 = "你看，那個人好像就是「小暴君」哦！"
10023010-86 = "快，快點走吧。#n聽說如果和他對上眼，就會被要求再戰直到天黑為止哦……"
10023010-87 = "所以說那個「小暴君」是什麼啊！"
10023010-88 = "原來我是被那樣看待的嗎！？#n我只是個普通的一般玩家啊！？"
10023010-89 = "哦哦，這還真是……#n初次見面，「小暴君」。"
10023010-93 = "是，是誰！？"
10023010-95 = "失禮了。我叫銅田明太郎。#n請叫我明太郎就可以了。"
10023010-96 = "我就開門見山地說了，「小暴君」。#n我有件事想拜託「你們」……"
10023010-97 = "不……我根本就……"
10023010-98 = "並不是特別困難的事。#n只是單純的「打掃」而已……看，簡單吧？"
10023010-99 = "打掃……？"
10023010-100 = "沒錯，正是「打掃」。#n莫非時間上不太方便嗎？"
10023010-101 = "這個嘛，只是打掃的話……不過，那不是誰都能做嗎？"
10023010-102 = "不，我希望務必能拜託「小暴君」。"
10023010-103 = "至於時間和地點……"
10023010-104 = "請在這封信裡確認吧。"
10023010-105 = "先，先等一下！"
10023010-106 = "噓，還請千萬要保密。#n那麼就拜託你了，「小暴君」……"
10023010-108 = "不，C&C的「美甘寧瑠」。"
10023010-114 = "……咦！？"
10023010-116 = "……事情就是這樣。"
10023010-117 = "……"
10023010-121 = "……"
10023010-122 = " ？"
10023010-127 = "姐姐……"
10023010-128 = "怎，怎麼了……！？"
10023010-129 = "為什麼我們非得接受C&C的委託呢？#n有跟人家說過「你認錯人了」嗎？"
10023010-130 = "我，我也很想說啊！#n可是他自顧自地說個不停，說完又馬上跑走了嘛！"
10023010-134 = "愛麗絲知道了！#n桃井收到新任務了對吧！乓啪喀乓！"
10023010-135 = "也，也就是說……得到，外面去……才行嗎……？"
10023010-137 = "嗚嗚……怎麼辦！？#n抱歉，大家……！"
10023010-138 = "那時候，要是我能明確拒絕的話……嗚哇啊！"
10023010-139 = "唉……總之，姐姐。#n委託的內容真的是「打掃」沒錯嗎？"
10023010-140 = "嗯，來委託的人也提了好幾次「打掃」。"
10023010-141 = "但如果真的是「打掃」……就跟姐姐說的一樣，找誰都能做吧？"
10023010-142 = "然而卻特地跑來委託C&C，是因為家裡非常大之類的嗎……"
10023010-143 = "你，你願意幫忙嗎，綠！？"
10023010-144 = "……姐姐一個人我會很擔心的。#n而且既然都已經接受了，與其因為拒絕而發生糾紛，不如趕快把事情解決。"
10023010-145 = "反正……只要假裝是寧瑠前輩……假裝是C&C去打掃就行了不是嗎？"
10023010-146 = "嗚哇～～！#n姐姐能有這樣的妹妹真是太開心了！"
10023010-147 = "知，知道了啦，別黏著我！"
10023010-151 = "打掃……外面……好多人……和陌生人對話……#n嗚，嗚嗚嗚……"
10023010-152 = "沒，沒關係的，柚子！#n我們也在啊！"
10023010-153 = "憤怒、破滅、腐蝕、絕望、虛脫……世界現在正走向破滅……"
10023010-154 = "是「大家一起打掃任務」對吧！"
10023010-155 = "事情就是這樣，老師！幫幫我們吧！"
10023010-156 = "[s]「咦，我也要去！？」"
10023010-158 = "嗯！如果老師一起來的話，就算是我們能力以外的事也能安心了！"
10023010-159 = "委託人如果問的話……就說是臨時顧問吧！"
10023010-160 = "而且這種藉口，身為大人的老師已經很熟悉了不是嗎？"
10023010-161 = "[s]「桃井對大人的印象究竟是什麼樣子……」"
10023010-162 = "老師也要一起去嗎？那愛麗絲就什麼都不怕了！#n士氣上升的勇者是最強的！"
10023010-163 = "那個……真不好意思……但如果老師能一起來……#n我好像也會，比較有勇氣……"
10023010-164 = "[s1]「那就一起加油吧。」\n[s2]「保護學生就是老師的職責。」"
10023010-165 = "好耶～！謝謝你，老師！"
10023010-166 = "好耶～！謝謝你，老師！"
10023010-167 = "那有件事想立刻拜託身為臨時顧問的老師！"
10023010-168 = "[s3]「是什麼事呢？」\n[s4]「好！任何事都包在我身上吧！」"
10023010-169 = "幫我們準備女僕裝！"
10023010-170 = "幫我們準備女僕裝！"
10023010-171 = "[s]「……咦？」"
10023010-173 = "季的辦公室"
10023010-175 = "[ns]「……事情就是這樣。」"
10023010-176 = "原來是這樣啊，我知道了。"
10023010-177 = "[s]「可以的話希望向寧瑠保密……」"
10023010-178 = "您的意思是，跟我說就沒關係？"
10023010-179 = "[s]「我想說季應該願意幫忙……抱歉。」"
10023010-180 = "……原來如此。"
10023010-181 = "請放心吧。我會保密的。"
10023010-182 = "[s]「之後一定會好好報答你的。」"
10023010-183 = "好的，我很期待。"

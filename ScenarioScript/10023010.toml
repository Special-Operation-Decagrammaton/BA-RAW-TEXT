[translation]
10023010-1 = "ตอนที่ 1;ซูเปอร์โมโมอิทอร์นาโด!"
10023010-4 = "อ๊ะ! พลาดจนได้!"
10023010-5 = "ยังทำได้อีก! เล็งที่อันต่อไปเลย!"
10023010-6 = "คิดจะหาเรื่องกันใช่มั้ย! กล้าดียังไงมาโจมตีหนักๆ ใส่ฉัน! เตรียมตัวตายได้เลย!"
10023010-7 = "ต้องเจอท่าไม้ตายลับที่เพิ่งฝึกมาใหม่...!"
10023010-8 = "ได้เวลาแล้ว โมโมอิทอร์นาโด!!!"
10023010-10 = "ปุ่มคอมมานด์ CD! A A B B C C A B C C C!!!"
10023010-20 = "จากนั้นก็! ต่อด้วย!"
10023010-21 = "ซ้าย ขวา ล่าง!"
10023010-27 = "ซ้าย ขวา ล่าง AB!"
10023010-36 = "ซูเปอร์โมโมอิทอร์นาโดพิฆาต!!!"
10023010-51 = "(ตึง! ตุ้บ!)"
10023010-52 = "「Player MOMORIA WIN!」"
10023010-55 = "ฮ่าฮ่าฮ่า~! ชนะแล้ว!"
10023010-56 = "เป็นการต่อสู้... ที่ยาวนานซะจริงๆ เลยนะ..."
10023010-57 = "ฉันต้องมาแพ้ซ้ำๆ ซากๆ ให้กับมิโดริ ยูสึ อาริสึ และคุณครูอยู่กี่วันเข้ามาแล้ว..."
10023010-58 = "แต่ตอนนี้อดีตที่เจ็บปวดก็สิ้นสุดลงแล้ว! การเริ่มต้นของชัยชนะในครั้งนี้คือการเกิดใหม่ของฉัน!"
10023010-59 = "เพราะงั้นแล้ววันนี้แหละ! จะเป็นวันเปิดตำนาน 'โมโมอิคนใหม่'"
10023010-60 = "นี่... นักเรียนคนนั้นน่ะ... ใช่คนนั้นรึเปล่า?"
10023010-61 = "ที่พูดกันในข่าวลือว่า... เป็นคนที่สู้ยิบตาอย่างไม่มีที่สิ้นสุดจนกว่าจะชนะน่ะ...?"
10023010-62 = "จะ... จนกว่าจะชนะงั้นเหรอ! ก็ไม่ได้แพ้เยอะขนาดนั้นสักหน่อย..."
10023010-63 = "ดูสิ พอได้ยินคำว่า 'ชนะ' ก็มีปฏิกิริยาขึ้นมาทันทีเลย"
10023010-64 = "เป็นไปตามข่าวลือจริงด้วย... ถ้างั้นคนนั้นก็คือ..."
10023010-65 = "หืม? หรือว่าฉันคือคนดัง...!?"
10023010-66 = "ต้องใช่ <เผด็จการตัวจิ๋ว> แน่ๆ!"
10023010-70 = "หืม...?"
10023010-71 = "ใครกันล่ะนั่นน่ะ...?"
10023010-72 = "ช่วงนี้มีข่าวลือไปทั่วร้านเกมแถวนี้เลยละ!"
10023010-73 = "เผด็จการแห่งร้านเกม! ถ้าตัวเองเสียเปรียบก็จะใช้ท่าไม้ตายโดยไม่คิดอะไรทั้งนั้น และถ้าไม่ได้ผลก็จะใช้#nซ้ำๆ จนกว่าจะตีได้!"
10023010-74 = "ถ้าตัวเองแพ้ ก็จะเดิมพันอีกครั้งจนกว่าจะชนะ แต่ถ้ายังไม่หายโกรธอีกก็จะระเบิดอารมณ์ใส่เครื่องเล่น#nเกมแล้วเดินออกไปดื้อๆ เลย!"
10023010-75 = "พะ... พูดอะไรน่ะ! ใครจะไปทำตัวแย่ๆ แบบนั้น!"
10023010-76 = "ว่ายังไงนะ ถ้าเสียเปรียบก็จะใช้ท่าไม้ตายแบบไม่คิดอะไรงั้นเหรอ!"
10023010-77 = "ก็... อืม... ก็นะ ก็อาจจะจริงอยู่... นิดหน่อย..."
10023010-78 = "ไม่เชื่อก็ดูนี่สิ! มีคนอัปไว้ในเน็ตด้วยนะ! ในนี้บอกว่า <เผด็จการตัวจิ๋ว> แห่งร้านเกมปรากฏตัวแล้ว!"
10023010-79 = "โห... ข่าวไปเร็วชะมัดเลย"
10023010-80 = "หืม? หืม? อะ... อะไรกัน? นี่มันเรื่องอะไรกัน...?"
10023010-84 = "คนพวกนี้เป็นใครกันเนี่ย!!!"
10023010-85 = "ดูนั่นสิ นักเรียนคนนั้นคือ <เผด็จการตัวจิ๋ว> ที่เขาลือกัน!"
10023010-86 = "งะ... งั้นรีบไปกันเถอะ ถ้าเผลอไปสบตาเข้า มีหวังได้โดนท้าสู้จนหมดวันอย่างในข่าวลือแน่ๆ...."
10023010-87 = "แล้วไอ้ <เผด็จการตัวจิ๋ว> อะไรนั่น มันอะไรกันล่ะเนี่ย!"
10023010-88 = "ฉันไม่ได้ใจร้ายแบบนั้นตั้งแต่แรก แล้วก็ไม่ได้ชอบใช้ความรุนแรงด้วย ฉันเป็นเกมเมอร์ธรรมดาๆ นะ!!"
10023010-89 = "โอ้ว ยินดีที่ได้พบครับ ท่าน <เผด็จการตัวจิ๋ว>"
10023010-93 = "คะ... ใครน่ะ?!"
10023010-95 = "ผมยังไม่ได้แนะนำตัวสินะครับ ผมชื่อว่าโดดะ เมทาโร่ครับ เรียกว่าเมทาโร่ก็ได้ครับ"
10023010-96 = "ผมจะเข้าประเด็นเลยแล้วกันนะครับ ท่าน <เผด็จการตัวจิ๋ว> ผมอยากขอให้คุณช่วยงานๆ หนึ่ง และงานนี้มีแต่คุณที่ทำได้ครับ"
10023010-97 = "เดี๋ยวนะ... ฉันไม่ใช่..."
10023010-98 = "ไม่ใช่งานยากอะไรหรอกครับ ก็แค่ภารกิจทำความสะอาดน่ะ ง่ายมากเลยละครับ"
10023010-99 = "ทำความสะอาด...?"
10023010-100 = "ครับ เป็นภารกิจทำความสะอาดที่ง่ายดายมากเลยครับ หรือว่าทำให้ไม่ได้ครับ?"
10023010-101 = "เปล่าสักหน่อย ถ้าเป็นแค่การทำความสะอาดละก็... ว่าแต่ ไม่ว่าใครก็ทำความสะอาดได้ไม่ใช่เหรอ?"
10023010-102 = "แต่ผมอยากให้คุณ <เผด็จการตัวจิ๋ว> ทำให้ครับ ต้องเป็นคุณคนเดียวเท่านั้น "
10023010-103 = "ถ้าไม่ติดอะไรก็มาทำสัญญาภารกิจนี้กันเลยครับ"
10023010-104 = "ผมจะให้จดหมายกับคุณ ช่วยมาตามวันเวลาและสถานที่ที่บอกในจดหมายนี้ด้วยนะครับ"
10023010-105 = "เดี๋ยวก่อนสิ เดี๋ยวก่อน!"
10023010-106 = "ถ้างั้นก็รบกวนด้วยนะครับ ท่าน <เผด็จการตัวจิ๋ว>..."
10023010-108 = "ไม่สิ คุณ 'มิคาโมะ เนรุ' แห่ง C&C"
10023010-114 = "............ หา!?"
10023010-116 = "... เรื่องมันก็เป็นอย่างนี้แหละ"
10023010-117 = "......"
10023010-121 = "......"
10023010-122 = "?"
10023010-127 = "พี่โมโมอิ..."
10023010-128 = "ทำไมเหรอ...?!"
10023010-129 = "ทำไมเราต้องทำงานแทนรุ่นพี่เนรุด้วยล่ะ! แล้วทำไมถึงไม่บอกไปตามความจริงว่าตัวเองไม่ใช่รุ่นพี่เนรุ!"
10023010-130 = "ฉะ... ฉันก็พยายามจะบอกไปตามจริงแล้ว! แต่คนนั้นก็เอาแต่พูดธุระของตัวเอง แล้วก็ไม่เปิดช่องว่าง#nอะไรให้ฉันพูดเลยด้วย! "
10023010-134 = "ถึงจะไม่ค่อยเข้าใจอะไรเท่าไร แต่อาริสึก็รู้แล้วค่ะ! เราได้รับเควสใหม่กันมาไงคะ! ปาปัม ปาปัม ป๊าม!"
10023010-135 = "ปะ... แปลว่า... พวกเราต้องออกไปข้างนอกงั้นเหรอ...?"
10023010-137 = "งือ... เอาไงดี? ขอโทษนะทุกคน...! "
10023010-138 = "ถ้าฉันปฏิเสธไปให้มันชัดเจนกว่านี้ละก็..."
10023010-139 = "เฮ้อ... พี่โมโมอิ เอาเป็นว่า แน่ใจใช่ไหมว่านั่นเป็นงานทำความสะอาด?"
10023010-140 = "มั่นใจสิ ฉันถามย้ำไปตั้งหลายครั้งนะ"
10023010-141 = "สมมติว่าถ้ามันเป็นงานทำความสะอาดจริงๆ... มันก็คงเป็นงานที่ใครๆ ทำก็ได้ตามที่พี่บอก"
10023010-142 = "แต่ถ้าเป็นงานทำความสะอาดที่ต้อง 'เรียกใช้คน' ก็น่าจะเป็นการทำความสะอาดที่ยิ่งใหญ่..."
10023010-143 = "จะ... จะมาช่วยเหรอ มิโดริ?!"
10023010-144 = "...... แล้วจะให้ทำไงได้ล่ะ ก็เหมือนว่าจะต้องทำงานนี้แล้ว จะให้ยกเลิกตอนนี้ก็ลำบากใจอีก"
10023010-145 = "ถ้าคิดแบบง่ายๆ เราก็แค่ต้องเนียนทำเป็นรุ่นพี่เนรุและ C&C... แล้วก็ไปทำความสะอาดแทน?"
10023010-146 = "ว้าวววว! พี่ละดีใจจังที่มีน้องแบบนี้!"
10023010-147 = "ระ... รู้แล้วน่า ไม่ต้องมากอดหรอก!"
10023010-151 = "ทำความสะอาด... ข้างนอก... เจอคนแปลกหน้า... คุยกับคนที่ไม่รู้จัก... งือ..."
10023010-152 = "มะ... ไม่เป็นไรหรอกยูสึ! พวกเราจะช่วยเอง!"
10023010-153 = "ความโกรธ... ล่มสลาย... พังทลาย... สิ้นหวัง... โลกกำลังมุ่งไปสู่ความพินาศ..."
10023010-154 = "อาริสึเข้าใจรายละเอียดเควสแล้วค่ะ! นี่คือเควสทำความสะอาดค่ะ!"
10023010-155 = "ในเมื่อมันเป็นแบบนี้แล้วก็ช่วยหน่อยนะคุณครู!"
10023010-156 = "[s] \"หืม ครูเหรอ?!\""
10023010-158 = "อื้อ! ถ้าคุณครูไปด้วย ไม่ว่าที่ไหนก็คงไร้ปัญหา!"
10023010-159 = "และถ้าผู้ว่าจ้างถามอะไรขึ้นมา... ก็บอกว่าเป็นที่ปรึกษาชั่วคราว!"
10023010-160 = "ข้ออ้างแบบนั้นผู้ใหญ่น่าจะทำได้ดีกว่านี่นา?"
10023010-161 = "[s] \"ภาพลักษณ์ของผู้ใหญ่ในสายตาโมโมอิเป็นยังไงเนี่ย...\""
10023010-162 = "คุณครูก็จะร่วมมือกับเราใช่ไหมคะ? ถ้ามีคุณครูด้วย อาริสึก็ไม่กลัวอะไรแล้วค่ะ! ผู้กล้าที่มีตัวนำโชค#nติดตัวไปด้วยจะแข็งแกร่งที่สุดเลยละค่ะ!"
10023010-163 = "ขะ... ขอโทษจริงๆ นะคะ... แต่ถ้าคุณครูไปด้วย... ฉันว่าฉันน่าจะดึงความกล้าออกมาได้มากขึ้นหน่อยค่ะ"
10023010-164 = "[s1] \"ให้ตายสิๆ เห็นทีคงต้องไปช่วยแล้วสินะ\"\n[s2] \"การจับตาดูสิ่งที่นักเรียนทำคือหน้าที่ของคุณครูนี่นา\""
10023010-165 = "พูดจริงใช่ไหม คุณครู? ยะโฮ่! ฉันคิดไว้แล้วว่าคุณครูจะช่วย!"
10023010-166 = "พูดจริงใช่ไหม คุณครู? ยะโฮ่! ฉันคิดไว้แล้วว่าคุณครูจะช่วย!"
10023010-167 = "งั้นเรื่องแรกที่เราอยากขอความช่วยเหลือจากคุณครูผู้เป็นทั้งผู้ควบคุมและที่ปรึกษาชั่วคราวของเรา นั่นก็คือ...!"
10023010-168 = "[s3] \"อะไรเหรอ อยากรู้จัง?\"\n[s4] \"มาเลย! ครูพร้อมช่วยแล้ว\""
10023010-169 = "ช่วยหาชุดเมดให้หน่อยนะ!"
10023010-170 = "ช่วยหาชุดเมดให้หน่อยนะ!"
10023010-171 = "[s] \"หา...?\""
10023010-173 = "สำนักงานของโทคิ"
10023010-175 = "[ns] \"... เรื่องมันก็เป็นอย่างนี้แหละ\""
10023010-176 = "อย่างนี้เองสินะคะ เข้าใจแล้วค่ะ"
10023010-177 = "[s] \"อย่าบอกเนรุนะ... ถ้ารู้ขึ้นมาคงโกรธควันออกหูแน่\""
10023010-178 = "แต่กับฉันไม่เป็นไรงั้นเหรอคะ?"
10023010-179 = "[s] \"อ่า... ก็... ครูคิดว่าถ้าเป็นโทคิ ก็คงจะช่วยครูน่ะ... ขอโทษนะ\""
10023010-180 = "...... อย่างนั้นเหรอคะ"
10023010-181 = "วางใจได้เลยค่ะ ฉันเก็บความลับให้ได้อยู่แล้วค่ะ"
10023010-182 = "[s] \"... เอาไว้ครูจะชดเชยให้ทีหลังนะ\""
10023010-183 = "ค่ะ แล้วฉันจะรอค่ะ"

10023010-80 = "What in the world is happening? Is this real life?"
10023010-84 = "Why are there so many of you? Where did you come from?!"
10023010-85 = "I told you! It's really her. The Little Menace!"
10023010-86 = "Okay, fine. You were right. Can we go now? I heard she'll force you to play with her all night...at gunpoint, if necessary!"
10023010-87 = "Can someone please explain to me where the name \"Little Menace\" even comes from?!"
10023010-88 = "I'm a really nice person, and I'm not violent either! I'm just a regular, passionate gamer!"
10023010-89 = "I am honored to finally meet the infamous Little Menace."
10023010-93 = "Do I know you?!"
10023010-95 = "I know of you, but you do not know me. My apologies. I am Doda Meitaro."
10023010-96 = "Let us not mince words. I am here to request your services. You are the only one who can help, Little Menace."
10023010-97 = "I'm trying to tell you! I'm not this Little Menace—"
10023010-98 = "Please! It is well within your capabilities. A simple cleaning job."
10023010-99 = "Huh? Really? Just cleaning...?"
10023010-100 = "Yes, that is all. Surely it would be no issue for the likes of you?"
10023010-101 = "W-Well, yeah, sure. I guess cleaning isn't all that hard. But I really feel like you could've asked anybody..."
10023010-102 = "This request was meant for the Little Menace and only the Little Menace. "
10023010-103 = "Thank you for accepting. Here are your next steps."
10023010-104 = "You'll find what you need in that letter, including the declared time and place."
10023010-105 = "Hold on just one second! Slow down!"
10023010-106 = "I look forward to working with you, Little Menace..."
10023010-108 = "Or should I say, Mikamo Neru of C&C."
10023010-114 = "...What?!"
10023010-116 = "...And that just about sums it up."
10023010-117 = "..."
10023010-121 = "..."
10023010-122 = "?"
10023010-127 = "Momoi..."

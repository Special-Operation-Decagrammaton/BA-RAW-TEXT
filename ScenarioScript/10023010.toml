10023010-130 = "You weren't there, so you don't get it! I really did try to say something, but I was utterly overpowered... "
10023010-134 = "I do not get it either. But I understand that our party has accepted a new quest! Bum bum bum!"
10023010-135 = "A-A new quest...means... We're going to go outside?"
10023010-137 = "Waaah! I don't know how to get myself outta this mess! I messed up again!  "
10023010-138 = "You're right! I should've just said no! I-I'm sowwy...! *sniff*"
10023010-139 = "*sigh* ...You said it's just a cleaning job?"
10023010-140 = "Yup! Pinky promise! I even double-checked!"
10023010-141 = "Well, if it's just a cleaning job... You did say it's something anyone can do."
10023010-142 = "Although, if someone is hiring someone to clean for them, that normally means they need a professional... It won't be easy."
10023010-143 = "Wait! Are you gonna help me, Mido? Really? Really, really?!"
10023010-144 = "You don't have any way of backing out, and we're not just gonna abandon you."
10023010-145 = "So, yeah. We'll pretend that we're C&C members and clean like our lives depend on it."
10023010-146 = "Waaahhh! You're the best, ever! I'm so lucky to have shared a womb with someone like you!"
10023010-147 = "Get off me before I change my mind!"
10023010-151 = "I have to leave the clubroom... And go meet people... And talk to them... A-And... And...! Augh...!"
10023010-152 = "We're by your side, Yuzu! You won't be alone!"
10023010-153 = "Rage... Annihilation... Fear... The end of the world inches...ever closer... Despair upon us all...!"
10023010-154 = "Quest accepted! It is quest time! Quest time! Heehee!"
10023010-155 = "So, that being said... Help us out, Sensei!"
10023010-156 = "[s] \"Huh? Me?!\""
10023010-158 = "Duh! With Sensei's authority, we can go pretty much anywhere we want!"
10023010-159 = "And we need a temporary advisor if our client has any hard questions."
10023010-160 = "Isn't it an adult's job to come up with excuses or whatever?"
10023010-161 = "[s] \"We need to discuss your perspective on adults, Momoi...\""
10023010-162 = "If Sensei comes, I will be a fearless hero! After all, it is the mascot that helps the hero be strong and brave. Please join our party, Sensei!"
10023010-163 = "I-I know it's an imposition...but I don't know how I'll find the nerve...without you there, Sensei..."
10023010-164 = "[s1] \"Well, if you put it that way...\" \n[s2] \"Serving as an advisor is part of my responsibilities!\""
10023010-165 = "You mean it, Sensei?! I knew we could count on you!"
10023010-166 = "You mean it, Sensei?! I knew we could count on you!"
10023010-167 = "Nice! As our first order of business, I have a request for our new temporary advisor!"
10023010-168 = "[s3] \"Things are getting good!\" \n[s4] \"Let's do it! What's our first move?\""
10023010-169 = "Find us some maid uniforms!"
10023010-170 = "Find us some maid uniforms!"
10023010-171 = "[s] \"...Come again?\""
10023010-173 = "Toki's Office"
10023010-175 = "[ns] \"...And that's how I ended up here.\""
10023010-176 = "I have a grasp of the situation."
10023010-177 = "[s] \"Please don't tell Neru... She'd be really, really mad...\""
10023010-178 = "And you didn't think I would be?"
10023010-179 = "[s] \"Ah... Well... I just thought that you'd maybe...want to help me?\""
10023010-180 = "...Understood."
10023010-181 = "Okay. Rest assured. I will protect your secret to my last bullet."
10023010-182 = "[s] \"Thank you! I'll repay you for this one day. I promise.\""
10023010-183 = "Yes. I won't forget that."

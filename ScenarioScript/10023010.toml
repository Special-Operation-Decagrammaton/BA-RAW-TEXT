10023010-65 = "Does my reputation precede me? Am I famous?!"
10023010-66 = "You must be...the Little Menace!"
10023010-70 = "Come again?"
10023010-71 = "Who exactly are you calling the Little Menace?"
10023010-72 = "You, duh! You've been the talk of the arcade recently."
10023010-73 = "You're the one who spams special moves until one connects whenever you're backed into a corner, right?"
10023010-74 = "Right, right! Hey, is it true that if you lose you won't let the other player go home until you beat them? And that if you can't beat them, you'll break the machine and run away screaming?!"
10023010-75 = "That's going way too far! You're making me sound like a bad person!"
10023010-76 = "And what's this nonsense about me spamming special moves when—"
10023010-77 = "Actually...well, that one might be a little true..."
10023010-78 = "Check your socials! People are already posting that the Little Menace is here!"

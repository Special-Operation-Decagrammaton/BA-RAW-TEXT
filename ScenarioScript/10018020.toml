[translation]
10018020-1 = "ตอนที่ 2;ร้านอาหารในตรอกของฟูกะ"
10018020-7 = "สุดยอดเลยนะคะ..."
10018020-12 = "หมวกคลุม เตาแก๊ส เตาสำหรับทอด เตาอบ... ทั้งหมดนี่เป็นอุปกรณ์ที่เลอะง่ายทั้งนั้น"
10018020-13 = "แต่ทุกอย่างกลับสะอาดเหมือนใหม่เลยนะคะ"
10018020-17 = "การจัดเก็บวัตถุดิบก็ทำได้เรียบร้อยมาก... จัดเรียงแยกประเภทในตู้เย็นได้เรียบร้อยมากเลยค่ะ"
10018020-18 = "แต่ดูเหมือนผักจะช้ำพอสมควรเลยนะคะ อันนี้เป็นมาตั้งแต่ร้านส่งวัตถุดิบแล้วรึเปล่าคะ"
10018020-19 = "พวกเครื่องปรุงที่มีอายุการใช้งานนานๆ พอหมดอายุก็แยกทิ้งเลยสินะคะ?"
10018020-20 = "ค่ะ ถ้าไม่จัดเก็บให้ถูกสุขอนามัย จะเสียความเชื่อถือจากลูกค้าไปได้ค่ะ อืม... มีปัญหาอะไรรึเปล่าคะ?"
10018020-21 = "ปะ... เปล่าค่ะ!"
10018020-22 = "ห้องครัวสะอาดดีมากค่ะ อยู่ในขั้นสมบูรณ์แบบเลยละค่ะ"
10018020-23 = "แต่ว่า... พวกเครื่องปรุง คุณใช้แค่เท่าที่มีอยู่งั้นเหรอคะ?"
10018020-24 = "คะ? ใช่ค่ะ... เครื่องปรุงสูตรที่ได้รับถ่ายทอดสูตรมามีเพียงเท่านี้น่ะค่ะ..."
10018020-25 = "อืม... บางทีนี่อาจจะเป็นปัญหาอย่างแรกเลยก็ได้นะคะ"
10018020-26 = "วัตถุดิบทุกอย่างใช้เครื่องปรุงที่เหมือนกันหมด..."
10018020-27 = "และมีเรื่องหนึ่งที่ฉันรู้สึกได้ตั้งแต่ก่อนหน้านี้แล้วค่ะ..."
10018020-28 = "คะ... อะไรเหรอคะ?"
10018020-29 = "วัตถุดิบทั้งหมดส่งมาจากเนียวฟู้ดใช่มั้ยคะ?"
10018020-30 = "ค่ะ เรื่องนั้นเราไม่มีทางเลือกอื่น..."
10018020-31 = "ดูเหมือนมันจะเป็นวัตถุดิบที่คุณภาพไม่ดีเท่าไรเลยน่ะค่ะ"
10018020-35 = "อย่างนั้นเองสินะคะ..."
10018020-39 = "ที่จริงแล้ว หลังจากเซ็นสัญญาซื้อวัตถุดิบจากเนียวฟู้ด "
10018020-40 = "ก็มีลูกค้าประจำหลายท่านไม่พอใจ และบอกว่ารสชาติของอาหารเปลี่ยนไปอยู่ด้วยค่ะ"
10018020-41 = "แต่ว่าทางเนียวฟู้ดเป็นผู้จัดจำหน่ายวัตถุดิบเพียงเจ้าเดียว... พวกเราเลยไม่มีทางเลือกค่ะ"
10018020-42 = "ถ้าเป็นปัญหาเรื่องการซื้อวัตถุดิบละก็ พวกเราอาจช่วยได้นะคะรุ่นพี่!"
10018020-44 = "นั่นสินะ"
10018020-45 = "ถึงมันอาจจะไกลจากที่นี่เกินไปหน่อยก็เถอะ..."
10018020-52 = "เรื่องก็เป็นอย่างนั้นแหละ รบกวนด้วยนะคะคุณเจ้าของร้าน"
10018020-53 = "ฟูกะจังอุตส่าห์ขอร้องทั้งที ฉันต้องช่วยอยู่แล้วสิ"
10018020-54 = "แบบนี้เราก็ได้ลูกค้าประจำเพิ่มมาอีกหนึ่งเจ้า ถือว่าเราได้ประโยชน์เหมือนกัน!"
10018020-55 = "ระ... รบกวนด้วยนะคะ..."
10018020-56 = "สู้เค้านะคุณเจ้าของร้าน ตอนลำบากเราก็ต้องช่วยเหลือเกื้อกูลกันสิ"
10018020-58 = "ร้านเราคอยดูแลเรื่องจัดส่งวัตถุดิบของโรงอาหารเกเฮนน่าอยู่ เรื่องคุณภาพวัตถุดิบน่ะรับประกันเสมอ!"
10018020-60 = "ดูเหมือนฉันจะรบกวนทุกๆ คนเข้าซะแล้ว..."
10018020-61 = "ไม่ต้องคิดมากหรอกค่ะ ของแบบนี้ ถ้าไม่ลองก็คงไม่รู้..."
10018020-62 = "แต่พวกเราทุกคนตัดสินใจแล้วว่าจะช่วยคุณค่ะ"
10018020-63 = "ไว้ใจพวกเราได้เลย คุณเจ้าของร้าน! ฝีมือทำอาหารของฟูกะจังน่ะ ฉันรับประกันได้เลย!"
10018020-64 = "[s] \"เรื่องนั้นครูก็รับประกันได้เหมือนกันนะ...\""
10018020-65 = "เห็นมั้ยล่ะ! คุณครูจากทางชาเล่ต์ก็ยังเห็นด้วยเลยนะ! "
10018020-67 = "อะฮ่าฮ่าฮ่า..."
10018020-73 = "หืม? เฮ้ยๆ ตรงนั้นน่ะ นั่นมันเถ้าแก่เนี้ยไม่ใช่เรอะ?"
10018020-74 = "น่าจะใช่นะ? มาทำอะไรที่นี่กันล่ะนั่นน่ะ? ทำไมถึงมาตกลงซื้อขายวัตถุดิบกับปิโยซูเปอร์มาร์เก็ตล่ะ?"
10018020-78 = "หรือว่า...?"
10018020-83 = "ตอนนี้ก็ได้วัตถุดิบใหม่มาแล้ว ถ้างั้นมาเริ่มทำอาหารกันเลยดีมั้ยคะ?"
10018020-84 = "จูริ ช่วยตัดแต่งวัตถุดิบ...ให้หน่อยได้มั้ย?"
10018020-85 = "ค่ะ เรื่องนั้นวางใจได้เลยค่ะรุ่นพี่!"
10018020-89 = "แน่นอนว่าอาจมีวิธีที่คุณคุ้นเคยอยู่แล้วแต่ว่า..."
10018020-90 = "แต่ถ้าเคี่ยวซอสด้วยไฟอ่อนๆ แบบนี้―"
10018020-94 = "จะทำให้ซอสซึมเข้าเนื้อและทำให้รสชาติและรสสัมผัสเวลาเคี้ยวต่างออกไปค่ะ"
10018020-95 = "เรียกว่าเป็นวิธีการเคี่ยวให้ข้นเหมือนกับคาราเมลก็ได้ค่ะ"
10018020-96 = "อ๊ะ... วิธีนั้น...!"
10018020-100 = "ตอนที่ต้มน้ำซุป ก็นำวัตถุดิบไปผัดไฟอ่อนๆ ก่อนแล้วค่อยนำมาต้มนะคะ"
10018020-101 = "มันจะทำให้ได้รสชาติที่เข้มข้นมากขึ้นน่ะค่ะ"
10018020-102 = "แต่ว่าถ้ากะเวลาผัดวัตถุดิบผิด มันจะไม่ทำให้เสียรสชาติเหรอคะ?"
10018020-103 = "เรื่องนั้นก็มีความเสี่ยงอยู่เหมือนกันค่ะ"
10018020-104 = "แต่ก็นับว่าเป็นความท้าทายอย่างหนึ่งก็ได้นะคะ?"
10018020-106 = "การทำอาหารเองก็คือความท้าทายอย่างหนึ่งค่ะ!"
10018020-109 = "การทำอาหารในปริมาณมากมันก็ลำบากแบบนี้แหละค่ะ"
10018020-110 = "ปริมาณของอาหารสามารถกะเท่าจำนวนคนได้ แต่ความแรงของไฟทำแบบนั้นไม่ได้ค่ะ"
10018020-111 = "แล้วใช้วิธีไหนเหรอคะ?"
10018020-112 = "ก็ต้องหมั่นสังเกตแล้วก็ปรับความแรงไฟบ่อยๆ ค่ะ"
10018020-113 = "แต่ว่าถ้าปรับไฟเบาเกินไป วัตถุดิบก็จะเสียหายได้..."
10018020-114 = "ต้องใช้ความทุ่มเท และเอาใจใส่มากเลยสินะคะ..."
10018020-118 = "เท่านี้เมนูใหม่ก็เสร็จเรียบร้อยแล้วค่ะ"
10018020-119 = "ถ้างั้นต่อไปก็ต้องมีคนมาประเมินว่าเมนูใหม่นี้ใช้ได้แล้วรึเปล่า..."
10018020-120 = "...ฮารุนะ?"
10018020-122 = "กำลังรอให้เรียกอยู่เลยค่ะ"
10018020-123 = "ขอชิมหน่อยนะคะ"
10018020-132 = "(ระ...รุ่นพี่ รู้สึกตื่นเต้นจังเลยค่ะ)"
10018020-133 = "(ตื่นเต้นน่ะก็ตื่นเต้นอยู่หรอก แต่ตอนนี้ความรู้สึกมันตีกันไปหมดเลยแฮะ)"
10018020-134 = "[s] (\"เรื่องนั้นครูขอเห็นด้วย...\")"
10018020-141 = "อืม ขอบคุณสำหรับอาหารค่ะ"
10018020-142 = "ผลก็คือ..."
10018020-144 = "(กลืนน้ำลาย...)"
10018020-145 = "[ns] (\"อะไรก็ได้ แต่อย่าระเบิดร้านนะฮารุนะ...\")"
10018020-152 = "ถือว่าผ่านค่ะ"
10018020-155 = "ว้าว!"
10018020-156 = "ฮู่ว..."
10018020-158 = "ในมุมมองของนักชิม นับว่าเป็นอาหารที่ไม่มีที่ติเลยค่ะ"
10018020-159 = "ถ้ามีแค่ฉันที่ได้ชิมอาหารจานนี้ คงจะน่าเสียดายนะคะ"
10018020-163 = "ทุกคนคะ เข้ามาหน่อยได้มั้ยคะ?"
10018020-172 = "อาหารที่ฮารุนะรับรองให้แบบนี้ น่าตื่นเต้นจังเลยนะคะ★"
10018020-173 = "ในที่สุดก็ได้ชิมสักที ได้กลิ่นหอมๆ ของอาหารอร่อยๆ แล้วมันห้ามใจยากมากเลยนะ!"
10018020-177 = "ถ้างั้นไหนขอลองสักคำ...!"
10018020-186 = "เฮ้ย เถ้าแก่เนี้ย ออกมาเดี๋ยวนี้เลยนะ!"
10018020-187 = "ใครอนุญาตให้เปลี่ยนร้านจัดส่งวัตถุดิบกันหา?"
10018020-188 = "ทำแบบนี้มันละเมิดข้อสัญญานะ ไม่รู้รึไง?"
10018020-189 = "ฮ่าฮ่า! จ่ายค่าปรับมาเลย จ่ายค่าเสียหายมาซะ! แบบนี้มันเบี้ยวหนี้กันชัดๆ!"
10018020-196 = "อ๊ะ นี่! ระวังหน่อยสิ!"
10018020-207 = "อะ... อาหารของฉัน..."
10018020-208 = "ฉันยังไม่ได้ลองชิมสักคำเลยนะ!!!"
10018020-209 = "แย่แล้ว★ แบบนี้เรื่องใหญ่แน่เลยค่ะ"
10018020-211 = "อะ...อะไรเนี่ยยัยเด็กคนนี้"
10018020-212 = "ธะ... เธอผิดเองนะที่ไปอยู่ตรงนั้น หัดระวังๆ กันซะบ้างเซ่!"
10018020-213 = "[s] \"พูดไปก็ไม่มีประโยชน์หรอก ครูว่ารีบหนีไปจะดีกว่านะ\""
10018020-223 = "พวกเธอ... ยก-โทษ-ให้-ไม่-ได้!"

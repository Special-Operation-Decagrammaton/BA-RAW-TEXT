[translation]
10018020-1 = "第2話;FUUKA'S Kitchen"
10018020-7 = "太厲害了……"
10018020-12 = "抽油煙機、瓦斯爐、油炸鍋、烤箱……#n這些明明都是很容易累積汙垢的東西……"
10018020-13 = "卻全都乾淨得像是新買的一樣呢。"
10018020-17 = "材料的管理也很細心……冷藏保存和個別包裝都有區分開來。"
10018020-18 = "不過蔬菜上的傷痕有點多，但這是供應商的問題吧。"
10018020-19 = "這個是……保存期限較長的調味料，也會定期更換……？"
10018020-20 = "是的。畢竟如果不嚴格管理衛生，就會失去信用。#n那個……有什麼問題嗎？"
10018020-21 = "啊，不！"
10018020-22 = "廚房的狀態非常的棒。"
10018020-23 = "不過……調味只有目前的組合嗎？"
10018020-24 = "啊，是的。因為是秘傳的配方……"
10018020-25 = "原來如此……這可能會是第一個問題。"
10018020-26 = "每道菜都是使用類似的調味……"
10018020-27 = "還有，有件事我一直有點在意……"
10018020-28 = "是，請說……？"
10018020-29 = "食材都是從喵食品進貨的對吧？"
10018020-30 = "是的。因為能穩定供貨的供應商有限……"
10018020-31 = "這樣啊……感覺這些食材的品質都不是太好……"
10018020-35 = "……果然是這樣嗎。"
10018020-39 = "其實在把供應商換成喵食品之後……"
10018020-40 = "就有老顧客抱怨說味道變了。"
10018020-41 = "但這附近的食材供應都被喵食品獨佔了，所以我也無能為力……"
10018020-42 = "如果是食材的問題，我們應該幫得上忙，前輩！"
10018020-44 = "是啊。"
10018020-45 = "雖然離這裡有點遠……"
10018020-52 = "……情況就是這樣。能請您幫個忙嗎，店長？"
10018020-53 = "如果是風華醬的請託，我很樂意唷。"
10018020-54 = "而且，有新的客戶對我們來說也是件好事。"
10018020-55 = "這麼突然真是抱歉，那就拜託了。"
10018020-56 = "這沒什麼。一起加油吧。#n有困難的時候，就該互相幫助。"
10018020-58 = "格黑娜學生餐廳的食材也是由我們供應的，品質方面我很有信心哦！"
10018020-60 = "這樣會不會太麻煩各位了……"
10018020-61 = "請別在意。還不確定能不能真的解決問題……"
10018020-62 = "但我們都會助麻雀亭一臂之力的。"
10018020-63 = "老闆娘，你就放心吧！#n風華醬的手藝，我可以掛保證！"
10018020-64 = "[s]「我也能擔保風華的手藝唷。」"
10018020-65 = "你看，夏萊的老師不也這麼說嗎！"
10018020-67 = "啊哈哈……"
10018020-73 = "嗯？喂，那個人……不是麻雀亭的老闆娘嗎？"
10018020-74 = "好像是耶？#n明明就要關門大吉了，為什麼還在和小嗶超市的店長做生意？"
10018020-78 = "難道……？"
10018020-83 = "那麼，既然獲得了新的食材，就來試著製作成料理吧？"
10018020-84 = "茱莉，食材的部份……能幫我準備一下嗎？"
10018020-85 = "是，請交給我。前輩！"
10018020-89 = "雖然老闆娘應該也有自己習慣的作法……"
10018020-90 = "先像這樣，以餘溫攪拌醬汁──"
10018020-94 = "包覆住肉的表面後，味道和口感都會改變哦。"
10018020-95 = "也可以說是焦糖化的一種吧。"
10018020-96 = "還有這種作法啊……！"
10018020-100 = "煮湯的時候，可以先把食材稍微炒一下再放入水中。"
10018020-101 = "這樣可以讓味道更濃郁。"
10018020-102 = "可是如果在炒的過程沒控制好時間，會不會因此產生奇怪的味道呢？"
10018020-103 = "確實有這個風險。"
10018020-104 = "不過這也算是一種挑戰吧？"
10018020-106 = "或者應該說料理這件事，本身就是一項挑戰！"
10018020-109 = "要一次烹煮大量的食材並不容易。"
10018020-110 = "雖然材料只要依照人數調整就行了，但火力終究是有上限的。"
10018020-111 = "有什麼好辦法嗎？"
10018020-112 = "只能一邊仔細觀察，一邊攪拌，避免燒焦。"
10018020-113 = "但也要注意不能攪拌過度，否則會影響食材的外觀……"
10018020-114 = "每個步驟都得做到一絲不苟才行呢……"
10018020-118 = "好，完成幾道新品了！"
10018020-119 = "再來就是需要有人來評價這些菜色是否美味……"
10018020-120 = "……羽留奈？"
10018020-122 = "我一直等待著這個時候。"
10018020-123 = "那麼，我要開動了。"
10018020-132 = "（前，前輩……總覺得很緊張呢）"
10018020-133 = "（緊張歸緊張……感覺心情有點複雜呢）"
10018020-134 = "[s]（「我也這麼覺得……」）"
10018020-141 = "多謝款待。"
10018020-142 = "嗯……就味道來說……"
10018020-144 = "（吞口水）"
10018020-145 = "[ns]（「拜託至少別把餐廳給炸了，羽留奈……」）"
10018020-152 = "合格了。"
10018020-155 = "哇！"
10018020-156 = "呼……"
10018020-158 = "是無可挑剔的料理。"
10018020-159 = "只有我品嘗到的話就太可惜了。"
10018020-163 = "大家一起享用吧。"
10018020-172 = "被羽留奈認證的料理，真是令人期待★"
10018020-173 = "終於可以吃了嗎？#n香味一直飄過來，我都快忍不住了～！"
10018020-177 = "那麼就趕緊……！"
10018020-186 = "喂，老闆娘！出來！"
10018020-187 = "誰准你擅自更換供應商的？"
10018020-188 = "你知道這是違反契約的吧？"
10018020-189 = "哈哈哈！違約金！損失賠償！債務不履行！"
10018020-196 = "啊，喂！小心一點！"
10018020-207 = "我……我的料理……"
10018020-208 = "連一口都還沒吃到耶！！！"
10018020-209 = "哎呀★這下可不得了。"
10018020-211 = "怎樣，你有意見是不是。"
10018020-212 = "誰叫你要站在那種地方，下次知道要小心點了吧？"
10018020-213 = "[s]「那個，我勸你們還是逃跑比較好……雖然應該沒用。」"
10018020-223 = "你們這些傢伙……不能原諒！"

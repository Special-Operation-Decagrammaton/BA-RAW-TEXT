[translation]
10013065-3 = "伊樹菜流忍法！超強力射擊！"
10013065-13 = "唔啊啊！？這種力量……究竟是……！？"
10013065-14 = "伊樹菜因為遇到了主公變得更強了！"
10013065-15 = "因為主公理解、認同了伊樹菜的夢想！"
10013065-16 = "所以伊樹菜也有了改頭換面的成長！"
10013065-17 = "原來如此……所以才穿著泳裝嗎……！"
10013065-18 = "[s] 「不，這麼說有點不對！」"
10013065-27 = "呃啊啊啊啊啊！！"
10013065-32 = "好，這樣就結束了！"
10013065-33 = "是伊樹菜和夥伴們的勝利！"
10013065-38 = "怎麼會！！為什麼我們處於下風！？"
10013065-39 = "應該和之前已經完全不一樣了才對啊！！"
10013065-40 = "明明不只是黑龜組，連凱薩PMC的兵力都雇來了！"
10013065-41 = "[s] （凱薩PMC……？）"
10013065-42 = "關於這個……其實昨天傍晚的客人中有個戴著狐狸面具的傢伙……"
10013065-43 = "我們打算要向那傢伙收坐了椅子的費用。結果他突然就攻擊我們……"
10013065-44 = "因此，失去了從凱薩PMC那裡雇來的大部分兵力……"
10013065-45 = "為什麼不早說！？在職場上最重要的就是報告、聯絡、討論吧！#n連這種事都不知道嗎！？"
10013065-46 = "[s1] 「總覺得……好像有點既視感……」\n[s2] 「戴著狐狸面具的客人是……」"
10013065-50 = "到此為止了！喵天丸！"
10013065-51 = "正義與忍者必勝！忍忍！"
10013065-52 = "嗚咕咕咕……！#n……不，原來如此……還有這個辦法啊。"
10013065-56 = "哼……哼哼哼……哈哈哈哈！哈哈哈哈哈哈哈哈！"
10013065-57 = "[s] 「笑成這樣……難道還藏了什麼招式嗎？」"
10013065-58 = "大家，別大意！"
10013065-59 = "是！畢竟對手可是那個百鬼夜行商店街的會長啊！"
10013065-60 = "（吞口水！）"
10013065-66 = "……咳哼。"
10013065-67 = "靜子啊，你的手段總是讓我感到佩服。"
10013065-71 = "根據我所得到的消息，你似乎在這個群島拓展加盟事業呢。"
10013065-72 = "哈哈哈！那還真是不錯的想法！#n怎麼樣？要不要和我喵天丸也簽約啊！"
10013065-76 = "你們也需要錢對吧？"
10013065-77 = "既然如此，正好我手邊也有名為黑龜組的兵力。#n只要利用他們就能更有效率地拓展事業！"
10013065-81 = "過去的事就讓它過去了，一起發大財吧！"
10013065-82 = "讓我們一起合作，飛向更遼闊的世界吧！"
10013065-83 = "嗯嗯，真是個不錯的提案呢。"
10013065-84 = "哦！真不愧是靜子！既然如此……"
10013065-85 = "託你的福我也能下定決心了！"
10013065-86 = "夢話就留到夢裡說吧──！#n靜子的[ruby=必殺]認真[/ruby]看板娘拳──！夏天特別版！！"
10013065-95 = "──事情就是這樣，我們把管理這裡的勢力打得落荒而逃了。#n所以想要跟你們借一些人。"
10013065-96 = "哦哦，這不成問題。#n正好我這邊也有些有空閒的人力。"
10013065-97 = "謝謝。那就交給你了。"
10013065-101 = "可惡，那個喵天丸……一不小心就被他逃了……"
10013065-103 = "伊樹菜也嚇了一跳！真是可怕的逃跑速度！#n簡直就像是忍者……不對，是那個……"
10013065-104 = "……蜈蚣？"
10013065-105 = "確實很像呢！"
10013065-106 = "啊哈哈……"
10013065-107 = "[s] 「之後可能還會在哪裡遇見吧……」"
10013065-108 = "那種事……還是饒了我吧……"
10013065-112 = "好！閒話就說到這裡！"
10013065-116 = "該做的事還有很多，繼續加油吧！"

[translation]
10013065-3 = "วิถีนินจาอิซุนะ กระสุนทรงพลัง!"
10013065-13 = "อึ้กกก?! อิซุนะ...! นี่เธอเก่งถึงขนาดนี้... ตั้งแต่เมื่อไรกัน...?!"
10013065-14 = "อิซุนะได้เจอกับนายท่าน! และแข็งแกร่งขึ้นเยอะเลยค่ะ!"
10013065-15 = "เพราะนายท่านเข้าใจและยอมรับความฝันของอิซุนะ!"
10013065-16 = "อิซุนะก็เลยออกจากเซฟโซน แล้วเติบโตไปอีกขั้นค่ะ!"
10013065-17 = "ก็เลย... ใส่ชุดว่ายน้ำงั้นเหรอ!"
10013065-18 = "[s] \"ไม่ใช่ นั่นมันคนละเรื่องกัน...!\""
10013065-27 = "อึกกก?!"
10013065-32 = "เอาละ! ปิดบัญชีด้วยสิ่งนี้เลย!"
10013065-33 = "อิซุนะชนะแล้วค่ะ!"
10013065-38 = "ไม่นะ ไม่ๆๆ~! ทำไมกองกำลังของฉันถึงถูกเล่นงานแบบนี้?!"
10013065-39 = "ทำไมไม่เหมือนกับเมื่อก่อน!"
10013065-40 = "นี่ขนาดฉันไปซื้อกองกำลังจากไคเซอร์ PMC มาเสริมกับกองกำลังแก๊งคุโระกาเมะ เพื่อสถานการณ์ที่ไม่คาดคิดเลยนะ...!"
10013065-41 = "[s] (กองกำลังจากไคเซอร์ PMC...?)"
10013065-42 = "คะ... คือว่า... บอส! ในบรรดาลูกค้าที่มาถึงเมื่อวานตอนเย็น... มีคนที่ใส่หน้ากากสุนัขจิ้งจอกด้วย..."
10013065-43 = "ผมจะเรียกเก็บเงินค่านั่งเก้าอี้จากลูกค้าคนนั้น แต่ก็โดนโจมตีกลับมา..."
10013065-44 = "กองกำลังเกือบทั้งหมดที่ซื้อมาจากไคเซอร์ PMC ก็เลยถูกจัดการซะยับ..."
10013065-45 = "เกิดเรื่องแบบนั้นแต่เพิ่งมาบอกเอาตอนนี้เนี่ยนะ?! สิ่งสำคัญที่สุดในการทำธุรกิจคือการรายงาน และเตรียมแผนรับมือนะ! นี่เจ้าไม่รู้แม้แต่เรื่องพื้นฐานงั้นเหรอ?!"
10013065-46 = "[s1] \"ทำไมรู้สึกเหมือน... เดจาวูเลย...\"\n[s2] \"ว่าแต่... ลูกค้าคนนั้นใส่หน้ากากสุนัขจิ้งจอกเหรอ...?\""
10013065-50 = "พอแค่นี้เถอะ! เนียนเต็นมารุ!"
10013065-51 = "ค่ะ! ความยุติธรรมและนินจา! จะเป็นฝ่ายชนะเสมอค่ะ! นินนิน!"
10013065-52 = "อะ... อึก! เฮือก... ก็คง... เป็นแบบนั้นละมั้ง"
10013065-56 = "หึหึ... หึหึหึ... หึหึหึหึ...!!! วะฮ่ะฮ่ะฮ่า!"
10013065-57 = "[s] \"หรือว่าจะซ่อนไพ่ลับอะไรไว้...?\""
10013065-58 = "ทะ... ทุกคนอย่าประมาทเชียวนะ!"
10013065-59 = "ค่ะ! ฝ่ายตรงข้ามคือประธานกลุ่มการค้าของย่านการค้าเฮียกคิยาโค! จะประมาทไม่ได้เลยค่ะ!"
10013065-60 = "เอื้อก...! (กลืนน้ำลาย)"
10013065-66 = "อะแฮ่ม!"
10013065-67 = "แม่หนูชิซุโกะ ฉันชื่นชมฝีมือของเธอมาตลอดเลยนะ"
10013065-71 = "ได้ยินมาว่า... พวกเธอกำลังขยายกิจการแฟรนไชส์บนหมู่เกาะ <ลอสต์ พาราไดซ์ รีสอร์ต>...?"
10013065-72 = "ฮ่าฮ่า! เป็นไอเดียที่ดีจริงๆ นะ! เอาละ! สนใจทำสัญญาแฟรนไชส์กับเนียนเต็นมารุด้วยมั้ยล่ะ!?"
10013065-76 = "เธอต้องการเงินใช่รึเปล่า?"
10013065-77 = "ฉันมีกองกำลังแก๊งคุโระกาเมะอยู่พอดีเลย ถ้าใช้เจ้าพวกนี้ให้เกิดประโยชน์ ก็น่าจะเป็นผลดี#nต่อกิจการเลยนะ!"
10013065-81 = "มาลืมความขุ่นแค้นที่มีในอดีต แล้วมาหาเงินกันมั้ยล่ะ!"
10013065-82 = "จับมือไว้! แล้วไปด้วยกัน!"
10013065-83 = "เป็นคำพูดที่น่ายินดีตั้งแต่เคยได้ยินมาเลยนะ"
10013065-84 = "โอ๊ะ! กะไว้แล้วว่าเธอต้องเอาด้วย!"
10013065-85 = "ขอบคุณที่ทำให้ตัดสินใจได้อย่างไม่ลังเลนะ ตัดสินใจว่า..."
10013065-86 = "ที่แกพูดออกมามันเป็นเรื่องไร้สาระ!! เอาหมัดเด็ดไม้ตายของชิซุโกะไปกิน! หมัดเด็ดฤดูร้อน!!"
10013065-95 = "พอเป็นแบบนี้ กองกำลังที่ดูแลที่นี่อยู่ก็เลยหนีกระจัดกระจายกันไปหมด ฉันขอยืมกองกำลังสักหน่อยสิ"
10013065-96 = "อืม ถ้าเป็นเรื่องนั้นก็ไม่มีปัญหาหรอก คนทางนี้ก็กำลังว่างอยู่น่ะ"
10013065-97 = "งั้นก็รบกวนด้วยนะ"
10013065-101 = "เนียนเต็นมารุ... เผลอแป๊บเดียวก็หนีเตลิดเปิดเปิงไปเลย..."
10013065-103 = "อิซุนะตกใจหมดเลยค่ะ! หนีไปเร็วมากเลย เหมือนกับเป็นนินจา...! เอ๊ย! ไม่สิ เหมือนกับ..."
10013065-104 = "...แมลงสาบ?"
10013065-105 = "ใช่! ถูกต้องเลยค่ะ!"
10013065-106 = "แหะๆๆ..."
10013065-107 = "[s] \"จะมีโอกาสได้เจอกันอีกมั้ยนะ...\""
10013065-108 = "เรื่องนั้นน่ะ... ฉันขอไม่เจอดีกว่าค่ะ..."
10013065-112 = "เอาละ! เรื่องนี้จบแค่นี้ก็พอ!"
10013065-116 = "เรายังมีงานอื่นเหลืออยู่อีก มาพยายามให้มากกว่านี้กันเถอะค่ะ!"

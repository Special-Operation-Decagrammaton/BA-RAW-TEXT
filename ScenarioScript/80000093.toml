[translation]
80000093-1 = "無窮無盡的"
80000093-3 = "嗚嗚，如果這個文件趕不上的話……"
80000093-4 = "琳前輩……不對，是行政官一定會非常生氣……"
80000093-6 = "這個結束後，下一個是……"
80000093-7 = "咦……行程表在哪裡呢……？"
80000093-8 = "嗚……要是自己有兩個身體就好了……"
80000093-9 = "[s1]「我非常了解你的心情……」\n[s2]「雖然就算有兩個身體，我也很懷疑能不能休息就是了……」"
80000093-10 = "啊，老，老師……！？"
80000093-11 = "啊，老，老師……！？"
80000093-12 = "對不起……您難得過來，這裡卻是這種狀況……"
80000093-13 = "[s]「沒關係，別勉強。慢慢來也可以的。」"
80000093-14 = "非常感謝……"
80000093-15 = "不過，讓老師等卻還慢慢來，就有點……"
80000093-16 = "[s]「那，就不那麼慢地慢慢來吧。」"
80000093-17 = "咦，咦……？"
80000093-18 = "那究竟，該怎麼做呢……？"
80000093-19 = "……看老師您的樣子，似乎也很累呢？"
80000093-20 = "總覺得有點危險，老師或許也該慢慢來比較好……"
80000093-21 = "[s]「沒事沒事，我們算是彼此彼此吧……」"
80000093-23 = "呼……差不多能告一段落了呢……"
80000093-24 = "雖然辛苦，不過這些工作終究得有人來做……"
80000093-25 = "其他聯邦學生會的學生一定也非常忙碌。"
80000093-26 = "現在不是喪氣的時候呢……！"
80000093-27 = "[s]（雖然在對面看見了正悠哉吃著明太子洋芋片的某人，不過決定當作沒看見）"
80000093-29 = "[ns]「來，要不要喝點咖啡？」"
80000093-30 = "咦，啊，老師幫我泡的嗎？"
80000093-31 = "謝，謝謝您。那麼，就承蒙您的好意……"
80000093-32 = "……！"
80000093-33 = "味道的調整，剛剛好……怎，怎麼會……！？"
80000093-34 = "[s3]「因為我常常看見你在泡咖啡。」\n[s4]「因為我們的立場很相似，大概能感覺出來。」"
80000093-35 = "唔，唔唔……"
80000093-36 = "唔，唔唔……"
80000093-37 = "謝謝您，老師……對我，這麼溫柔……"
80000093-38 = "[s]「沒，沒想到會讓你這麼開心……冷靜下來後再加油一下吧。」"
80000093-39 = "嗚嗚嗚嗚……您這麼說，讓我在別的意義上有點難過呢……"
80000093-41 = "[ns]「辛苦了。話說今天是為什麼找我呢？」"
80000093-42 = "啊，對了！該怎麼說呢，那個……"
80000093-43 = "在，在那之前要不要吃點點心呢……！？順便作為剛剛咖啡的回禮……"
80000093-48 = "……嗯？啊，確實可能是比較少見的商品。"
80000093-49 = "這是將切成薄片乾燥的葡萄柚裹上巧克力的點心。"
80000093-50 = "可以攝取到咖啡因、可可鹼和維生素，所以能減輕疲勞──"
80000093-51 = "的，樣子……"
80000093-52 = "[s5]「我，我懂我懂……」\n[s6]「要，要消除疲勞，沒有這麼容易呢。雖然應該是有效果。」"
80000093-53 = "就是說呀……嗚……"
80000093-54 = "就是說呀……嗚……"
80000093-55 = "明明是難得的情人節，總覺得有點抱歉……"
80000093-56 = "[s]「這麼說來，今天是情人節呢。」"
80000093-57 = "被業務追著跑，所以沒有外出購物的時間……"
80000093-58 = "手邊的巧克力，就只有這個了……"
80000093-59 = "您果然，不需要嗎……？"
80000093-60 = "[s]「沒有那種事唷，謝謝你。很好吃。」"
80000093-61 = "真，真的嗎……！？"
80000093-62 = "[s]「嗯，酸酸甜甜的。感覺疲勞都不見了。」"
80000093-63 = "那，那真是太好了……！"
80000093-64 = "待在老師的身邊，總覺得就能忘記疲勞了呢……耶嘿嘿。"
80000093-66 = "（之後也和步一起邊吃著巧克力，一邊聽著各種辛苦的事）"

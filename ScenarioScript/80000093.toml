[translation]
80000093-1 = "ดำเนินต่อไป..."
80000093-3 = "ฮืออออ... เอกสารนี้..."
80000093-4 = "ถ้าส่งไม่ทันเวลามีหวังโดนรุ่นพี่ริน... ไม่สิ หัวหน้าฝ่ายบริหารบ่นชุดใหญ่แน่ๆ..."
80000093-6 = "พออันนี้เสร็จแล้ว อันต่อไป..."
80000093-7 = "ตารางงาน ตารางงานอยู่ไหนนะ..."
80000093-8 = "เฮ้อ... อยากแยกร่างได้จัง..."
80000093-9 = "[s1] \"ครูเข้าใจความรู้สึกนั้นดี...\"\n[s2] \"ถ้าแยกร่างได้ ก็คงแบ่งกายทิพย์ไปนอนได้แหละนะ...\""
80000093-10 = "คะ...คุณครู?!"
80000093-11 = "คะ...คุณครู?!"
80000093-12 = "ขอโทษค่ะ... คุณครูอุตส่าห์แวะมาทั้งที แต่กลับให้คุณครูเห็นมุมไม่ดีแบบนี้ซะได้..."
80000093-13 = "[s] \"ไม่เป็นไรหรอก ค่อยๆ ทำไปก็ได้...\""
80000093-14 = "ขอบคุณนะคะ"
80000093-15 = "แต่ที่บอกว่าให้ค่อยๆ ทำไปน่ะ ฉันคงทำตามคำแนะนำไม่ได้หรอกค่ะ..."
80000093-16 = "[s] \"ถ้างั้นก็ค่อยๆ ทำแบบไม่ช้าเกินไปก็พอ!\""
80000093-17 = "คะ?"
80000093-18 = "มะ...หมายความว่ายังไงเหรอคะ...?"
80000093-19 = "คะ? คุณครูเองก็ไม่รู้ว่าที่พูดไปหมายความว่ายังไงเหรอคะ...?"
80000093-20 = "ฉันว่า... คนที่ควรพักผ่อนอาจเป็นคุณครูมากกว่าฉันรึเปล่าคะ...?"
80000093-21 = "[s] \"ครูว่าเราควรพักทั้งคู่นั่นแหละ...\""
80000093-23 = "ฮู่ว... ตอนนี้ค่อยหายใจโล่งคอขึ้นมาหน่อยค่ะ"
80000093-24 = "ลำบากอะไรกันล่ะคะ มันเป็นงานที่ฉันต้องทำค่ะ..."
80000093-25 = "สมาชิกองค์การนักเรียนคนอื่นๆ เองก็น่าจะยุ่งอยู่กับงานเหมือนฉันละค่ะ"
80000093-26 = "เพราะงั้นฉันคงจะมาอิดออดอยู่ไม่ได้หรอกค่ะ"
80000093-27 = "[s] (เห็นนักเรียนถือขนมมันฝรั่งทอดรสไข่ปลาผ่านไปแว็บๆ แต่ก็ทำเป็นไม่สนใจ)"
80000093-29 = "[ns] \"เอ้า ดื่มกาแฟสักหน่อยสิ\""
80000093-30 = "คะ? คุณครูเตรียมกาแฟมา...ให้ฉันเหรอคะ...?"
80000093-31 = "ขะ...ขอบคุณมากค่ะ ถ้างั้นขอดื่มเลยนะคะ..."
80000093-32 = "อา...?"
80000093-33 = "คุณครูรู้ได้ยังไงคะว่าฉันชอบแบบนี้? เวลาดื่มกาแฟ ฉันมักจะดื่มแบบนี้ตลอดเลย..."
80000093-34 = "[s3] \"ครูเจออายูมุที่องค์การนักเรียนบ่อยๆ นี่นา...\"\n[s4] \"คนที่เอาแต่ยุ่งกับงานทั้งวันก็ควรดูแลกันและกันสิ...\""
80000093-35 = "ฮือออ..."
80000093-36 = "ฮือออ..."
80000093-37 = "ขอบคุณค่ะคุณครู ฮือออ... เพิ่งเคยมีคนพูดแบบนี้กับฉันเป็นครั้งแรกเลยค่ะ"
80000093-38 = "[s] \"ไม่ต้องร้องนะ... มีเรื่องให้น้ำตาไหลพรากยิ่งกว่านี้อีก...\""
80000093-39 = "ฮือออออ... พอได้ยินแบบนั้นแล้วยิ่งอยากร้องไห้เข้าไปใหญ่เลยค่ะ"
80000093-41 = "[ns] \"ว่าแต่วันนี้เรียกครูมาเพราะอะไรเหรอ?\""
80000093-42 = "อ๊ะ ใช่แล้วค่ะ จริงด้วย..."
80000093-43 = "กะ... ก่อนอื่น คุณครูกินนี่สักหน่อยมั้ยคะ? ฉันอยากตอบแทนเรื่องกาแฟเมื่อก่อนหน้านี้..."
80000093-48 = "ดูเหมือนผลไม้...รูปร่างแปลกๆ เหรอคะ?"
80000093-49 = "เกรปฟรุตหั่นบางๆ เคลือบช็อกโกแลต หรือก็คือช็อกโกแลตชิปเกรปฟรุตค่ะ"
80000093-50 = "มันมีส่วนผสมของคาเฟอีน ธีโอโบรมีน และวิตามินรวมอยู่ด้วย ฉันรู้สึกว่ามันอาจจะ..."
80000093-51 = "...ช่วยฟื้นฟูความเหนื่อยล้าได้นิดหน่อยค่ะ..."
80000093-52 = "[s5] \"ครูเข้าใจนะ ความรู้สึกนั้นน่ะ...\"\n[s6] \"ถ้าฟื้นฟูความเหนื่อยล้าได้ง่ายแบบนั้น คงไม่ต้องทนเหนื่อยแบบนี้\""
80000093-53 = "ฮือออ... คุณครูเข้าใจสินะคะ..."
80000093-54 = "ฮือออ... คุณครูเข้าใจสินะคะ..."
80000093-55 = "ขอโทษนะคะ... วันวาเลนไทน์แท้ๆ แต่ฉันกลับมีแค่ช็อกโกแลตแบบนี้น่ะค่ะ..."
80000093-56 = "[s] \"พอนึกดูแล้ววันนี้...\""
80000093-57 = "ฮึก ฉันไม่มีเวลาออกไปซื้อของข้างนอกเลยค่ะ"
80000093-58 = "เพราะงั้นฉันก็เลยมีแค่ช็อกโกแลตอันนี้เท่านั้นน่ะค่ะ..."
80000093-59 = "คะ...คุณครูคงผิดหวังสินะคะ?"
80000093-60 = "[s] \"เปล่าเลย อร่อยดีนะ\""
80000093-61 = "จะ...จริงเหรอคะ?"
80000093-62 = "[s] \"อื้อ รสเปรี้ยวอมหวานเข้ากันดีเลย\""
80000093-63 = "ขะ... ขอบคุณมากค่ะ...!"
80000093-64 = "มีคุณครูอยู่ข้างๆ แบบนี้... รู้สึกดีจริงๆ ค่ะ ฮิฮิฮิ"
80000093-66 = "(หลังจากนั้นคุณครูกับอายูมุก็แบ่งช็อกโกแลตชิบเกรปฟรุตกินด้วยกันอย่างเอร็ดอร่อย)"

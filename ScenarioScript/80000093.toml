80000093-8 = "4;아유무;12;히이잉…… 차라리 몸이 두 개였다면……\n#4;m3\n#4;em;[속상함]"
80000093-9 = "[s1] \"그 심정 알지, 알아……\"\n[s2] \"몸이 둘로 나뉘면, 적어도 한 쪽은 쉴 수 있겠지……\""

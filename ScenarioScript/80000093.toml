80000093-11 = "4;아유무;10;서, 선생님?!\n#4;em;[?!]\n#4;shake"
80000093-12 = "4;아유무;06;죄송해요…… 기껏 찾아와 주셨는데, 이런 모습밖에 못 보여 드리고……"
80000093-13 = "[s] \"괜찮아…… 천천히 해……\""
80000093-14 = "4;아유무;02;말씀 감사드려요."
80000093-15 = "4;아유무;06;하지만 천천히 하라는 말씀은 차마 있는 그대로 받아들이기 어렵겠네요……\n#4;em;[세로선]"

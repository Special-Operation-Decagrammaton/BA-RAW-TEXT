[translation]
80000093-1 = "Endless..."
80000093-3 = "Ugh... This document..."
80000093-4 = "And if I can't meet the deadline, Rin will be really angry..."
80000093-6 = "After this, next up is..."
80000093-7 = "The schedule chart. Where did I put the schedule chart?"
80000093-8 = "Argh... I wish I had an extra body."
80000093-9 = "[s1] \"I know that feeling very well...\"\n[s2] \"If your body was split in two, at least one could rest.\""
80000093-10 = "Sensei?!"
80000093-11 = "Sensei?!"
80000093-12 = "I'm sorry... When you took time out of your schedule to visit, this is the state I'm in..."
80000093-13 = "[s] \"It's okay! Take your time.\""
80000093-14 = "Thank you for your kind words."
80000093-15 = "But... Is it really okay? If I'm taking my time, aren't I taking your time, as well?"
80000093-16 = "[s] \"Then, you should take your time in a way that doesn't take up time for either of us!\""
80000093-17 = "I-I'm sorry?"
80000093-18 = "I don't think I understand. What do you mean...?"
80000093-19 = "Oh? You don't even know what you're saying anymore, Sensei?"
80000093-20 = "Do you think that maybe you're the one who needs rest, not me?"
80000093-21 = "[s] \"Probably...we both need rest.\""
80000093-23 = "*sigh* Okay. There's finally time to take a break."
80000093-24 = "It's no big deal. These are all my responsibilities."
80000093-25 = "And I know the other students of the General Student Council are working just as hard as I am."
80000093-26 = "I have to keep my chin up!"
80000093-27 = "[s] \"(The image of a student eating tarako-flavored chips comes to mind, but I'll ignore that.)\""
80000093-29 = "[ns] \"Here, have some coffee.\""
80000093-30 = "Oh? You got me coffee, Sensei?"
80000093-31 = "Th-Thank you. I needed this."
80000093-32 = "What...?"
80000093-33 = "How... How did you know how I take my coffee?"
80000093-34 = "[s3] \"I've run into you a lot in the General Student Council, Ayumu.\"\n[s4] \"We should look out for each other, since we're always overworked...\""
80000093-35 = "I...oh...um..."
80000093-36 = "I...oh...um..."
80000093-37 = "T-Thank you, Sensei. I... *sniffle* No one's ever said something like that to me before..."
80000093-38 = "[s] \"Don't cry now… There's still a lot to do...\""
80000093-39 = "*sniffle* That makes me want to cry for a different reason."
80000093-41 = "[ns] \"By the way, why did you want to meet up today?\""
80000093-42 = "Oh, that! Yes. I almost forgot..."
80000093-43 = "B-But before we talk about that, would you like something to eat? I want to give you something in return for the coffee."
80000093-48 = "...Oh, no, it's not some weird fruit."
80000093-49 = "It's chocolate-covered grapefruit. Dried slices of grapefruit coated in chocolate."
80000093-50 = "It contains caffeine, theobromine, and vitamins, so it should help with fatigue..."
80000093-51 = "Or...so people say."
80000093-52 = "[s5] \"I know. I know that feeling...\"\n[s6] \"If it were so easy to get over fatigue, things would be so much better...\""
80000093-53 = "Oh... *sniffle* You understand me, Sensei..."
80000093-54 = "Oh... *sniffle* You understand me, Sensei..."
80000093-55 = "I'm sorry... It's Valentine's Day, and I could only give you this simple chocolate."
80000093-56 = "[s] \"Is that today...?\""
80000093-57 = "*sniffle* I didn't have the time to run out and buy something better..."
80000093-58 = "So, I could only give you what I had on hand."
80000093-59 = "A-Are you disappointed?"
80000093-60 = "[s] \"No, I'm not. It's delicious.\""
80000093-61 = "R-Really?"
80000093-62 = "[s] \"Yeah. The sweet and tart flavor combo is great.\""
80000093-63 = "Thank you!"
80000093-64 = "I'm glad you're on my side, Sensei. Heeheehee!"
80000093-66 = "Ayumu and I shared chocolate-covered grapefruit and vented about our workloads."

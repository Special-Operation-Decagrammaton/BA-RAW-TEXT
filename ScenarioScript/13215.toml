[translation]
13215-2 = "เฮ้อ... เมื่อกี้หัวใจตกไปอยู่ตาตุ่มแล้ว แบบนี้ก็คงไม่มีใครมารบกวนได้ช่วงหนึ่งละนะ"
13215-3 = "ชะ... ช่วงหนึ่งเหรอคะ...?"
13215-4 = "อื้ม ตอนนี้ไคเซอร์ PMC ชิงรถไฟไปทั้งขบวนแล้วไล่ล่าเราอยู่..."
13215-5 = "คะ?!"
13215-6 = "ไม่เป็นไรหรอก ฉันจะหาวิธีทิ้งระยะห่างดู"
13215-10 = "ด้วยไฮดราซีน..."
13215-12 = "ค่ะ... ขอบคุณ..."
13215-13 = "คะ?! ด้วยอะไรนะคะ!?"
13215-21 = "ตอนต่อไป;หัวรถจักรที่วิ่งเร็ว"

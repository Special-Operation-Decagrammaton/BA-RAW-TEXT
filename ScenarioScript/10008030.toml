[translation]
10008030-1 = "第3話;亂哄哄追擊戰！"
10008030-7 = "給我站住──！！"
10008030-8 = "啊哈哈哈！！等等我們～！"
10008030-9 = "請，請等等……！"
10008030-11 = "哈哈哈！誰也無法讓英雄停下腳步！"
10008030-16 = "哈啊，哈啊……跑的也太快了……"
10008030-17 = "唔嗯～這樣下去好像會被他們跑走……亞瑠醬，該怎麼辦？"
10008030-18 = "那些傢伙打扮得怪模怪樣的，為什麼身體素質會強的不可思議啊！？"
10008030-19 = "他們到底是什麼人啊！再說，又是為了什麼目的把賽錢箱……！"
10008030-20 = "「凱坦澤」在奇普托斯也是相當有名的一群傢伙。"
10008030-21 = "似乎打著「伸張正義」的名號到處惹事。"
10008030-22 = "雖，雖然知道的不多，不過我也聽過他們……"
10008030-23 = "據說他們跑起來的速度有3馬赫，而且踢擊的力道超過5噸……"
10008030-24 = "騙人的吧！？"
10008030-25 = "不，不知道是不是真的……而且，凱坦澤似乎有祕密武器……"
10008030-26 = "好像會在緊急時刻召喚出巨大機器人「KAITEN FX」……"
10008030-27 = "嘿～話說遙香醬，那是在哪裡獲得的情報？"
10008030-28 = "在，在凱坦澤的官網……"
10008030-30 = "居然有官網嗎！？明明連我們便利屋68都沒有！？"
10008030-31 = "啊哈哈哈，什麼鬼呀！還挺認真的嘛？#n至少看起來好像比我們還正式？"
10008030-32 = "怎，怎麼能就這樣輸給那些奇怪的傢伙！"
10008030-36 = "又怎麼了，我們現在正忙啊！"
10008030-45 = "你們幾個，看來似乎和我們盯上了相同的獵物啊！"
10008030-46 = "才不會讓你們得逞！"
10008030-48 = "什麼什麼，怎麼回事？"
10008030-49 = "那些傢伙是……頭盔團？"
10008030-51 = "凱坦澤拿走的賽錢箱是我們的獵物！還不趕快滾！"
10008030-52 = "俗話說先搶先贏，敢妨礙我們就讓你們吃不完兜著走哦？"
10008030-53 = "將凱坦澤華麗奪走的東西，再次由我們奪走！"
10008030-54 = "怎麼樣，這完美的點子！"
10008030-59 = "……呵呵，所謂「飛蛾撲火」就是這個意思吧。"
10008030-60 = "從剛才開始就一直被他們逃走，累積了不少怒氣呢。#n剛好適合轉換一下心情。"
10008030-61 = "無月、佳世子、遙香，還有茜香。"
10008030-68 = "……上吧。"
10008030-72 = "等等，我可不是你的部下啊！？"
10008030-73 = "不，不過還是會打就是了！"

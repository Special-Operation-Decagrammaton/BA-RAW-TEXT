[translation]
10008030-1 = "ตอนที่ 3;การไล่ล่าสุดอลวน!"
10008030-7 = "หยุดอยู่ตรงนั้นน้าาาาา!!"
10008030-8 = "ฮะฮะฮ่าฮ่า!! ตามไปเลยยยย~!"
10008030-9 = "ระ...รอฉันด้วยสิคะ~~!"
10008030-11 = "ฮ่าฮ่าฮ่า! ไม่ว่าใครก็มาขัดขวางเส้นทางของฮีโร่ไม่ได้ทั้งนั้น!"
10008030-16 = "แฮ่ก... แฮ่ก... พวกนั้นเร็วกว่าที่คิดอีกนะ..."
10008030-17 = "อา~ ถ้าเป็นแบบนี้เดี๋ยวต้องคลาดกันแน่เลยนะ อารุจัง?"
10008030-18 = "เดี๋ยวสิ เจ้าพวกนั้น ทำไมสวมชุดประหลาดๆ แบบนั้นแล้วยังวิ่งได้เร็วขนาดนี้อีกเนี่ย?!"
10008030-19 = "ไคเทนเจอร์งั้นเหรอ เจ้าพวกนี้เป็นใครกันแน่เนี่ย! ขโมยกล่องบริจาคไปเพราะอะไรกันแน่?!"
10008030-20 = "ถ้าเป็นไคเทนเจอร์ละก็... เป็นพวกที่มีชื่อเสียงในคิโวทอสเลยนะ "
10008030-21 = "พวกที่ชอบอ้างว่า \"เพื่อความยุติธรรม\" อะไรประมาณนั้น แล้วก็ก่อความวุ่นวายไปทั่วเลย "
10008030-22 = "ถะ...ถ้าเป็นเรื่องไคเทนเจอร์ ฉะ...ฉันก็เคยได้ยินมา...บะ...บ้างเหมือนกันค่ะ"
10008030-23 = "พะ...พวกนั้นวิ่งได้เร็ว 3 ไมล์ต่อชั่วโมง ตะ...ตัวสูง ละ...และพลังในการเตะก็มากกว่า 5 ตัน..."
10008030-24 = "จะ...จริงเหรอ?!"
10008030-25 = "นะ...นอกจากนี้ไคเทนเจอร์ยังมีอาวุธลับที่น่ากลัวซ่อนไว้อีกด้วย..."
10008030-26 = "พอรวมร่างกันก็จะเรียกหุ่นยนต์ขนาดมหึมา KAITEN FX ออกมากำจัดศัตรู..."
10008030-27 = "ว้าว~ ฮารุกะจัง ไปหาข้อมูลพวกนั้นมาจากไหนน่ะ?"
10008030-28 = "วะ...เว็บไซต์โปรโมตไคเทนเจอร์ค่ะ"
10008030-30 = "มีเว็บไซต์โปรโมตด้วยเรอะ?! หน่วยรับจ้างสารพัดของเรายังไม่มีเลยนะ?!"
10008030-31 = "วะฮะฮะฮ่า! ฮ่ะฮ่ะฮ่า!! เอาเรื่องเหมือนกันนี่นา แสดงว่าเจ้าพวกนั้นเจ๋งว่าเราอีกนะ อารุจัง?"
10008030-32 = "นี่เราจะถูกเจ้าพวกแปลกประหลาดพวกนั้นแซงหน้าไปงั้นเหรอ~! "
10008030-36 = "หน้าสิ่วหน้าขวานแบบนี้ ยังจะมีอะไรอีกละเนี่ย?!"
10008030-45 = "เน่~! ตรงนั้นน่ะ! คิดจะมาแย่งเหยื่อของพวกเรางั้นเรอะ!"
10008030-46 = "มันยังเร็วไปอีกร้อยปีหรอกนะเฟ้ย! นี่~~~!"
10008030-48 = "ฮึ่ม~ อะไรกันเนี่ย~? มีพวกตัวขัดขวางเพิ่มงั้นเหรอ?"
10008030-49 = "นั่นมันพวกแก๊งหมวกกันน็อก?"
10008030-51 = "ใช่แล้ว! กล่องบริจาคที่พวกไคเทนเจอร์ขโมยไป... มันเป็นของพวกเรา! อย่าคิดจะมาขวางกันเชียว รีบออกไปจากที่นี่เลยไป!"
10008030-52 = "ใช่! คนที่ขโมยไปก็ต้องได้เป็นเจ้าของ!"
10008030-53 = "ถ้าพวกไคเทนเจอร์ขโมยไปจากงานเทศกาลละก็... คราวนี้พวกเราก็แค่ขโมยจากพวกเจ้าพวกนั้นมาก็พอ! คิดไอเดียดีๆ แบบนี้ได้ยังไงเนี่ย! สมกับเป็นพวกเราจริงๆ"
10008030-54 = "แสนรู้จริงๆ เลย!"
10008030-59 = "หึหึ... ดีจังเลยนะที่เข้าใจกันง่าย"
10008030-60 = "ที่จริงก็หงุดหงิดมาตั้งแต่เมื่อกี้แล้ว พอดีเลยนะ เหมาะจะใช้เป็นที่ระบายอารมณ์พอดีเลยเชียว "
10008030-61 = "มุสึกิ คาโยโกะ ฮารุกะ แล้วก็เซริกะ…"
10008030-68 = "เก็บเจ้าพวกนั้นให้หมดซะ"
10008030-72 = "อะ...อะไรเนี่ย!! ฉันไม่ใช่ลูกน้องเธอสักหน่อยนะ!"
10008030-73 = "ยะ...ยังไงก็เถอะ ฉันจะจัดการเจ้าพวกนั้นเอง!"

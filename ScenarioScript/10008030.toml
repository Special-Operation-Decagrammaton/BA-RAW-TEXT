[translation]
10008030-1 = "Episode 3;Chaotic Chase!"
10008030-7 = "Stop right there!"
10008030-8 = "Heehee! We got you!"
10008030-9 = "D-Don't move!"
10008030-11 = "Hahaha! No one can obstruct the path of a hero!"
10008030-16 = "*pant* *pant* They're faster than I thought..."
10008030-17 = "Uh-oh. We're gonna lose them again at this rate."
10008030-18 = "How can they move so quickly in those weird costumes?!"
10008030-19 = "Who are these Kaitengers anyway? Why would they steal the offering box?!"
10008030-20 = "You haven't heard of them? They're pretty infamous in Kivotos. "
10008030-21 = "They cause all kinds of trouble \"in the name of justice,\" or whatever."
10008030-22 = "I-I've heard about them a little too."
10008030-23 = "It's said they can run at speeds exceeding Mach 3, and their kicks have a force of five metric tons behind them."
10008030-24 = "A-Are you serious?!"
10008030-25 = "What's worse, they're said to have some kind of secret weapon up their sleeves."
10008030-26 = "They can call a giant mech known as KAITEN FX to crush their enemies."
10008030-27 = "Wow, Haruka! Where did you get that info?"
10008030-28 = "From the Kaitengers' promotional website."
10008030-30 = "They have a website?! We don't even have a website!"
10008030-31 = "Wow. They're the real deal. They might even be a more legitimate business than we are."
10008030-32 = "Okay, now it's on. Those weirdos aren't going to upstage US! "
10008030-36 = "Now what?! Can't you see we're busy?!"
10008030-45 = "Hey, you! Don't even think about going after OUR mark!"
10008030-46 = "You've got another thing comin'!"
10008030-48 = "Oh? More interlopers?"
10008030-49 = "Are they from the Helmet Gang?"
10008030-51 = "That's right, and the offering box the Kaitengers stole belongs to us! So don't get in our way!"
10008030-52 = "Yeah! WE'RE the ones who were supposed to steal it!"
10008030-53 = "So since they stole it first, we'll just have to steal it second. You gotta do what you gotta do in this business!"
10008030-54 = "We're so smart!"
10008030-59 = "Heh. This simplifies things. "
10008030-60 = "Here you come along, just when I was thinking I needed to relieve some stress. "
10008030-61 = "Listen up, Mutsuki, Kayoko, Haruka, Serika."
10008030-68 = "Crush them."
10008030-72 = "W-Wait a second! Since when do I take orders from you?!"
10008030-73 = "Whatever. Let me in on this too!"

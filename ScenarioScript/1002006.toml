[translation]
1002006-1 = "What Are You Doing?"
1002006-2 = "(I'm so exhausted that I feel like collapsing, but I came to the place where I agreed to meet Koharu.)"
1002006-3 = "(Koharu is already waiting for me by the time I arrive.)"
1002006-4 = "Over here, Sensei. I'm...glad you're here."
1002006-5 = "N-Normally, I wouldn't risk bringing you to such a dangerous place..."
1002006-6 = "[s1] \"Why would this place be dangerous?\"\n[s2] \"What is your imagination jumping to this time?\""
1002006-7 = "Y-You don't think it's dangerous?"
1002006-8 = "Y-You don't think it's dangerous?"
1002006-9 = "Th-The school entrance after hours, no one else in sight..."
1002006-10 = "You never know who might enter. All kinds of stories begin like this."
1002006-11 = "Can't you feel the impending danger?"
1002006-12 = "...Wait."
1002006-13 = "M-Maybe...you're the type of person who enjoys that kind of danger."
1002006-14 = "O-Oh, no. I didn't think of that..."
1002006-15 = "If that's true, then...!"
1002006-16 = "[s3] \"You're imagining things again.\"\n[s4] \"Are we done here? I think we're done here.\""
1002006-17 = "Really?"
1002006-18 = "Are you sure?"
1002006-19 = "How can I trust you?"
1002006-20 = "W-Wait!"
1002006-21 = "Fine, I get it..."
1002006-22 = "Anyway, here's the reason I called you here."
1002006-23 = "It's a cookie I bought from the gift shop."
1002006-24 = "I-I wanted to thank you for helping me before, so..."
1002006-25 = "Th-That's all there is to it. Okay?"
1002006-26 = "[s] \"Thanks. Looks tasty.\""
1002006-27 = "D-Don't go getting the wrong idea."
1002006-28 = "I swear I didn't put anything weird in it. I'm sure you've heard of stories like that..."
1002006-29 = "In fact, I think that's the conclusion most people would jump to."
1002006-30 = "Or maybe...you knew that I knew you would think that and decided to say the cookie looked delicious anyway!"
1002006-31 = "[s5] \"Here we go again...\"\n[s6] \"So tired... Gonna pass out...\""
1002006-32 = "Wh-Why are you making that face?"
1002006-33 = "Wh-Why are you making that face?"
1002006-34 = "If anyone should be making that face, it should be me."
1002006-35 = "Wasn't I supposed to be the one monitoring you?"
1002006-36 = "[s7] (I can't take this anymore. I'll scold Koharu.)\n[s8] (I can't take this anymore. I'll surprise Koharu.)"
1002006-46 = "Huh?! S-Sensei?!"
1002006-49 = "― Wh-What are you...?![wa:360] "
1002006-52 = "― (O-Oh, no. This can't be happening!)[wa:2130] "
1002006-55 = "― I d-didn't say something wrong, did I?[wa:2150] "
1002006-58 = "― (W-Wait. At this rate, Sensei and I will be...)[wa:2050] "
1002006-61 = "― (Is this what I think it is? I've read about it in books so many times.)[wa:370] "
1002006-63 = "― (Is this really happening?!)[wa:720] "
1002006-66 = "― (What am I supposed to do? Do I close my eyes?)[wa:1870] "
1002006-69 = "― (N-No way! How far will things go?!)[wa:2490] "
1002006-72 = "― Sensei... I know what you're after.[wa:1740] "
1002006-75 = "― (This is BAD! Not good.)[wa:10] "
1002006-77 = "― (I-I'm not ready for something like this...)[wa:1320] "
1002006-80 = "[ns] Pat Koharu's head."
1002006-83 = "...?"
1002006-84 = "What the...?!"
1002006-87 = "..."
1002006-88 = "S-Sensei?"
1002006-89 = "(I reassured Koharu before returning to my office and taking a nap.)"

[translation]
1002006-1 = "ทำอะไรน่ะ?"
1002006-2 = "(คุณครูเหนื่อยล้าจนเกือบจะล้ม แต่ก่อนอื่นต้องไปยังสถานที่ที่โคฮารุเรียกมา)"
1002006-3 = "(พอมาถึงก็เห็นโคฮารุมารอที่หน้าสถานที่นัดก่อนแล้ว)"
1002006-4 = "ทะ... ทางนี้ คุณครู อื้ม... มาถึงแล้วสินะ"
1002006-5 = "ถ้าเป็นเมื่อก่อนฉันจะไม่เสี่ยงกับการเรียกคุณครูมาในสถานที่อันตรายมากแบบนี้..."
1002006-6 = "[s1] \"อันตรายมาก...? ที่นี่น่ะเหรอ?\"\n[s2] \"ทีนี้มาดูกันว่าจะเข้าใจอะไรผิดอีก\""
1002006-7 = "กะ... ก็มันจริงใช่มั้ยล่ะ?"
1002006-8 = "กะ... ก็มันจริงใช่มั้ยล่ะ?"
1002006-9 = "ที่ประตูโรงเรียนหลังเลิกเรียนที่ไม่มีคน..."
1002006-10 = "มันน่ากลัวที่ไม่มีทางรู้ว่าจะมีใครมาเมื่อไหร่... สถานที่ที่ใช้เป็นฉากเหตุการณ์สำคัญ..."
1002006-11 = "ความรู้สึกเสี่ยงนั้นก็ขึ้นอยู่กับแต่ละคน...?"
1002006-12 = "...อ๊ะ!"
1002006-13 = "ถ้า...คุณครูเป็นคนประเภทที่ชอบเสี่ยง..."
1002006-14 = "อะ... อันตราย... อย่าบอกนะว่า... ยังไม่ได้คิดไปถึงขนาดนั้น...?"
1002006-15 = "ถ้าหาก... ถ้าเป็นอย่างนั้นจริงละก็...!!"
1002006-16 = "[s3] \"เปล่านะ ครูไม่ได้อะไรเลยจริงๆ...\"\n[s4] \"คือว่าถ้าไม่มีธุระอะไร ครูกลับไปได้มั้ย?\""
1002006-17 = "...จริงเหรอ?"
1002006-18 = "จริงๆ นะ? ไม่เป็นไรจริงๆ นะ...?"
1002006-19 = "ไม่ได้โกหกนะ...?"
1002006-20 = "ดะ... เดี๋ยวก่อน...!"
1002006-21 = "เข้าใจแล้ว เข้าใจแล้ว..."
1002006-22 = "อืม...คือ... ฉันเรียกมาเพราะเรื่องนี้..."
1002006-23 = "...เอ้า นี่คือ... คุกกี้ที่ฉันซื้อมาจากร้าน MOMO FRIENDS..."
1002006-24 = "จากที่ฉันได้รับความช่วยเหลือก่อนหน้านี้ นี่เป็นของตอบแทน..."
1002006-25 = "ไม่ได้มีความหมายอื่น... เข้าใจนะ?"
1002006-26 = "[s] \"ขอบคุณนะ จะกินให้อร่อยเลย\""
1002006-27 = "ถะ... ถ้าหากว่ากำลังคิดอะไรแปลกๆ อยู่ละก็ ควรจะเลิกคิดซะ..."
1002006-28 = "ฉันไม่ได้ผสมอะไรแปลกๆ ลงไป... แน่นอนว่าถึงจะมีเรื่องนี้อยู่ก็เถอะ..."
1002006-29 = "ไม่สิ ปกติถ้าเป็นที่นี่อาจจะคิดอย่างนั้นได้...!"
1002006-30 = "ไม่สิ ถ้าเป็นคุณครูคงกำลังคาดหวังเรื่องนี้อยู่... ฉันรู้อยู่แล้ว...!"
1002006-31 = "[s5] \"จะมาไม้ไหนอีกน่ะ...\"\n[s6] \"ครูเหนื่อย...จนจะล้มแล้ว...\""
1002006-32 = "...ทะ... ทำหน้าแบบนั้น..."
1002006-33 = "...ทะ... ทำหน้าแบบนั้น..."
1002006-34 = "ทำไมคุณครูถึงทำหน้าแบบนั้น...? ต้องเป็นทางนี้มากกว่าที่จะทำหน้า..."
1002006-35 = "เริ่มแรกหน้าที่ของฉันคือเฝ้าระวังคุณครู...?"
1002006-36 = "[s7] ...ครูจะไม่ทนแล้ว ขอต่อว่าโคฮารุหน่อยเถอะ\n[s8] ...ครูจะไม่ทนแล้ว ขอทำให้โคฮารุตกใจหน่อยเถอะ"
1002006-46 = "ฮึ่ก! คะ... คุณครู!?!?"
1002006-49 = "― หา อะไรน่ะ...?![wa:560] "
1002006-52 = "― (ดะ... เดี๋ยวนะ... แบบนี้มัน...หรือว่า...?!)[wa:1810] "
1002006-55 = "― นี่ ฉัน... ฉันไม่ได้พูดอะไรผิดไม่ใช่เหรอ?[wa:2030] "
1002006-58 = "― (เดี๋ยวนะ... ถ้าเป็นแบบนี้ ฉันกับคุณครูก็คง...)[wa:2050] "
1002006-61 = "― (ชะ...ใช่แบบที่ฉันคิดรึเปล่านะ... ฉันเห็นในหนังสือมาหลายครั้งแล้ว...)[wa:490] "
1002006-63 = "― (จะ...จะเป็นไปตามสเต็ปนั้นจริงๆ เหรอ?!)[wa:280] "
1002006-66 = "― (หรือว่าจะเป็นแบบนี้... หรืออาจจะเป็นอีกแบบนั้น...)[wa:1710] "
1002006-69 = "― (ยะ... อย่าบอกนะว่า?! จะไปถึงขั้นนั้นเลย...!?) [wa:2050] "
1002006-72 = "― ในที่สุดคุณครูก็เผยตัวตนที่แท้จริงออกมาแล้วสินะ...? [wa:1060] "
1002006-75 = "― (เกิดเรื่องใหญ่แล้ว เป็นเรื่องแล้ว!)[wa:10] "
1002006-77 = "― (ฉัน...ฉันยังไม่ได้เตรียมใจเลย...?!)[wa:1640] "
1002006-80 = "[ns] (ลูบหัว)"
1002006-83 = "......?"
1002006-84 = "...อ่า หืออออ?!?"
1002006-87 = "......"
1002006-88 = "คะ... คุณครู?"
1002006-89 = "(หลังจากที่คุณครูปลอบโคฮารุ พอกลับมาถึงสำนักงานก็งีบหลับไป)"

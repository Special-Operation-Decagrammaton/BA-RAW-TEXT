[translation]
1002006-1 = "打算做什麼？"
1002006-2 = "（雖然現在就因為疲勞快倒下了，不過總之先去小春說的地點看看了）"
1002006-3 = "（到了之後，發現小春已經先在那等著了）"
1002006-4 = "啊，老師。這邊……我正在等你呢。"
1002006-5 = "換，換作平時，我絕對不會在這麼危險的地方約老師碰面，風險實在太高了……"
1002006-6 = "[s1] 「危險的地方……？」\n[s2] 「這次又在胡思亂想什麼了……」"
1002006-7 = "可，可是不是嗎？"
1002006-8 = "可，可是不是嗎？"
1002006-9 = "放學之後，空無一人的校舍入口……"
1002006-10 = "雖然平時人煙稀少，但也不能保證不會有人經過的緊張感……"
1002006-11 = "是那檔事情很常見的場景，似乎也有人很喜歡那種緊張感……"
1002006-12 = "……哈！"
1002006-13 = "難，難道說，老師也是喜歡那種的類型……？"
1002006-14 = "搞砸了，那個我完全沒想過……！？"
1002006-15 = "萬一真的是那樣的話，現在這情況……！！"
1002006-16 = "[s3] 「不，冷靜，真的別擔心……」\n[s4] 「那個，如果沒事我可以回去了嗎……？」"
1002006-17 = "……真的嗎？"
1002006-18 = "真的真的，可以相信老師嗎……？"
1002006-19 = "真的不是打算讓我鬆懈嗎……？"
1002006-20 = "等，等等……！"
1002006-21 = "是真的有事……！"
1002006-22 = "嗯，那個……"
1002006-23 = "來，這個……是從Momo好友商店買的餅乾……"
1002006-24 = "上，上次老師有幫我看功課，所以作為答謝……"
1002006-25 = "並，並沒有其他意思……知道吧？"
1002006-26 = "[s] 「謝謝。我會開心享用的。」"
1002006-27 = "嗯……真，真的沒有其他意思。"
1002006-28 = "我，我絕對沒有在裡面加入什麼奇怪的東西……"
1002006-29 = "雖然我知道那種發展很常見……！"
1002006-30 = "讓對方先吃一個之類的。不，不過就算我那麼做也沒有其他意思……！？"
1002006-31 = "[s5] 「一如既往踏入奇怪的世界了……」\n[s6] 「這下我越來越暈了……」"
1002006-32 = "你，你那是什麼表情……"
1002006-33 = "你，你那是什麼表情……"
1002006-34 = "老，老師你幹嘛露出那種表情……？那應該是我想露出的表情才對吧……"
1002006-35 = "何況我是為了來監視老師不要有奇怪的舉動……？"
1002006-36 = "[s7] ……是時候該教訓她一下了\n[s8] ……稍微嚇唬她一下吧"
1002006-46 = "咿！？老，老師……！？"
1002006-49 = "― 什，什麼……！？[wa:840] "
1002006-52 = "― （奇，奇怪……這個，難道是……！？）[wa:2850] "
1002006-55 = "― 我，我並沒有，說錯什麼吧！？[wa:3110] "
1002006-58 = "― （等一下，該不會照這樣下去，我，要和老師……！？）[wa:2930] "
1002006-61 = "― （這，這種發展，我在書上看過很多次……！）[wa:2410] "
1002006-63 = "― （真的，真的要變成那種狀況了嗎！？）[wa:1120] "
1002006-66 = "― （那，那種事情，或是這種事情……）[wa:3070] "
1002006-69 = "― （──！？該，該不會，連那種事情都……！？）[wa:3050] "
1002006-72 = "― 終，終於露出本性了呢， 老師……！？[wa:2420] "
1002006-75 = "― （糟了糟了糟了……！）"
1002006-77 = "― （我，我完全還沒做好任何覺悟啊！？）[wa:2360] "
1002006-80 = "[ns] 摸摸頭"
1002006-83 = "……？"
1002006-84 = "……咦，啊，唔啊啊啊啊啊啊？！？"
1002006-87 = "……"
1002006-88 = "咦，咦……？"
1002006-89 = "（把嚇到腿軟的小春扶起來安撫之後，便回到夏萊的辦公室，並在抵達的同時像昏倒般沉沉睡去）"

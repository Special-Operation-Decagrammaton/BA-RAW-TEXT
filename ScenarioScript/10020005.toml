[translation]
10020005-7 = "接下來就輪到我們了。"
10020005-8 = "久等了～！本次作戰的主角登場～！"
10020005-12 = "開始「方舟占領戰」的作戰會議。"
10020005-18 = "這場占領戰……是在有限的時間內駭入「方舟」並奪取控制權的戰鬥。"
10020005-23 = "「阿特拉哈西斯的方舟」是巨大的多次元詮釋演算裝置……#n這艘方舟整體是一台量子電腦。"
10020005-24 = "所以，這個構造物的每一個部份都是多次元詮釋的運算裝置。"
10020005-25 = "因此，必須[ruby=駭入]占領[/ruby]這艘方舟的各個區域，一點一點地奪取控制權。"
10020005-26 = "所以才稱為「占領戰」！"
10020005-28 = "沒錯──顧名思義，就是要占領對方的領土。"
10020005-29 = "循序占領方舟──最終奪下管制系統……就是我們的勝利。"
10020005-30 = "這樣一來就能啟動「自爆程式」來破壞方舟。"
10020005-31 = "當然，敵人也不會袖手旁觀。#n執行占領戰時，想必會需要與大量敵人進行戰鬥……"
10020005-32 = "不過有老師在，也不必太過擔心。"
10020005-33 = "[s]「嗯，包在我身上。」"
10020005-34 = "還有……雖然目前方舟因為愛麗絲的攻擊，處於無法演算多次元詮釋的抑制狀態。"
10020005-35 = "當然，要維持這樣的狀態也是有限度的。#n限制時間結束後，方舟的抑制狀態將會解除，再次消失在多重次元當中。"
10020005-36 = "這樣一來──就再也無法與方舟接觸了。"
10020005-37 = "我會另外標示「多次元詮釋」抑制結束的時間。"
10020005-43 = "這個時間就是占領戰的時限。"
10020005-45 = "那麼接下來，我將對「方舟」的內部構造進行說明。"
10020005-50 = "方舟大致由4個區域組成。"
10020005-60 = "位於外圍的第1區域──"
10020005-61 = "接著是第2區域──"
10020005-62 = "以及第3區域──"
10020005-63 = "最後是位於方舟中央的第4區域。"
10020005-64 = "現在我們的船位於第1區域的內部。"
10020005-65 = "因此，占領將從第1區域開始──占領外圍的第2、第3區域後，#n最後占領第4區域。按照這個順序進行。"
10020005-66 = "各個區域都設有「次元引擎」。#n這是方舟的核心，也是多次元詮釋運算裝置的核心。"
10020005-67 = "必須將方舟的4個「次元引擎」全數破壞，才有可能掌握方舟的控制系統。"
10020005-69 = "接著──只要能讓方舟自爆，作戰就算是成功。"
10020005-70 = "這樣一來，奇普托斯就能恢復和平。"
10020005-74 = "之後只要老師和大家一起搭船返回地面就完美了！"
10020005-76 = "我們的說明到此結束──接下來就輪到「夏萊」了。"
10020005-77 = "老師，之後就交給你囉～"
10020005-81 = "老師加油。我們也會加油的。"
10020005-82 = "請加油。"
10020005-86 = "[ns]「謝謝你們，貝里塔斯的大家，一起加油吧。」"
10020005-87 = "……貝里塔斯的各位，感謝你們的說明。"
10020005-88 = "那麼從現在起──"
10020005-89 = "開始「阿特拉哈西斯的方舟」占領戰！"
10020005-90 = "[s]「好，上吧！」"
10020005-92 = "我這邊會準備好作戰需要的物品，隨時都能來補給哦～"
10020005-93 = "是……！#n我們會支援老師直到最後的！"

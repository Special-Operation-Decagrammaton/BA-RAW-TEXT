[translation]
10020005-7 = "เอาละ ถ้างั้นตั้งแต่นี้ไปก็ถึงตาพวกเราแล้วละ"
10020005-8 = "ขอโทษที่ให้รอนานนะ~! ดาวเด่นของปฏิบัติการครั้งนี้ปรากฏตัวแล้ว~!"
10020005-12 = "จะเริ่มอธิบายเกี่ยวกับ <ปฏิบัติการยึดเรืออะทราฮาซิส> แล้วนะคะ"
10020005-18 = "สรุปง่ายๆ ก็คือ ปฏิบัติการครั้งนี้คือการแฮ็กเข้า <เรือ> ให้ได้ในเวลาที่กำหนดและแย่งสิทธิ์การควบคุม#nมาให้ได้"
10020005-23 = "<เรืออะทราฮาซิส> เป็นอุปกรณ์ทางคณิตศาสตร์ขนาดใหญ่สำหรับวิเคราะห์พหุมิติ... หรือพูดง่ายๆ ก็คือ เรือทั้งลำนี้คือคอมพิวเตอร์เครื่องหนึ่งนั่นเอง"
10020005-24 = "ชิ้นส่วนแต่ละชิ้นล้วนเป็นส่วนหนึ่งของอุปกรณ์ที่ใช้วิเคราะห์พหุมิติไงล่ะ"
10020005-25 = "เพราะงั้นถ้าบุกเข้ายึดพื้นที่แต่ละส่วนของเรือลำนี้และค่อยๆ แย่งสิทธิ์การควบคุมเรือมาเป็นของเรา นั่นคือหัวใจสำคัญของการต่อสู้ครั้งนี้"
10020005-26 = "เหมือนกับเล่นเกมเศรษฐีแย่งพื้นที่กันไงล่ะ!"
10020005-28 = "ใช่แล้ว พื้นฐานของปฏิบัติการครั้งนี้คือการเข้ายึดพื้นที่ของฝ่ายตรงข้ามมาเป็นของตนเอง เพราะงั้นจะเปรียบเทียบแบบนั้นก็ได้"
10020005-29 = "พอบุกยึดเรือไปเรื่อยๆ และเมื่อแย่งสิทธิ์ควบคุมระบบเรือทั้งหมดมาได้ ก็นับว่าเป็นชัยชนะของพวกเรา#nไงล่ะ"
10020005-30 = "พอได้สิทธิ์ควบคุมระบบมาอยู่ในมือแล้วละก็ เราก็จะเปิด <วงจรระเบิดตัวเอง> แล้วระเบิดเรือลำนี้ได้น่ะ"
10020005-31 = "แน่นอนว่าพวกศัตรูคงไม่อยู่เฉยๆ ให้เราชิงมาได้ง่ายๆ แน่ เพราะงั้นขณะที่ปฏิบัติการคงจะต้องต่อสู้กับ#nพวกศัตรูที่แข็งแกร่งด้วย"
10020005-32 = "สำหรับเรื่องนั้นเรามีคุณครูที่เชี่ยวชาญเรื่องปฏิบัติการอยู่ เพราะงั้นฉันเลยไม่ค่อยห่วงมากเท่าไร"
10020005-33 = "[s] \"อ่า... ไว้ใจครูได้เลย\""
10020005-34 = "...... ในตอนนี้อาริสึได้ขัดขวางและสะกดเรือไม่ให้ดำเนินการวิเคราะห์พหุมิติไว้แล้ว"
10020005-35 = "แน่นอนว่าการจะรักษาสภาพนั้นไว้ก็มีขีดจำกัดเหมือนกัน ถ้าเลยระยะเวลาที่กำหนดไป เรือก็จะหลุด#nจากการสะกด แล้วก็จะหายเข้าไปในพหุมิติอีก"
10020005-36 = "ถ้าเกิดปล่อยให้เรือที่พยายามรั้งไว้แทบตายหลุดมือไปละก็ คงแทบไม่มีโอกาสที่จะยึดมันได้อีกเป็น#nครั้งที่สองแน่ๆ"
10020005-37 = "ส่วน <ระยะเวลาระงับการวิเคราะห์พหุมิติ> เอาไว้จะแจ้งให้ทราบอีกทีนะ"
10020005-43 = "ระยะเวลานี้จะเป็นตัวกำหนดเวลาของปฏิบัติการนี้เลยละ"
10020005-45 = "ถ้าอย่างนั้น จากนี้ไปจะเป็นการอธิบายเกี่ยวกับโครงสร้างภายในของเรือให้ฟังนะคะ"
10020005-50 = "โครงสร้างภายในเรือจะแบ่งได้ใหญ่ๆ เป็น 4 พื้นที่ค่ะ"
10020005-60 = "ตั้งแต่พื้นที่ 1 ที่อยู่ด้านนอกเรือ"
10020005-61 = "พื้นที่ 2 "
10020005-62 = "พื้นที่ 3"
10020005-63 = "และพื้นที่ 4 ที่อยู่ส่วนกลางของเรือ"
10020005-64 = "ตอนนี้เรือรบอุตนาพิชทิมของเราเข้ามาในเขตพื้นที่ 1 แล้วค่ะ "
10020005-65 = "ดังนั้นเราจะเริ่มปฏิบัติการบุกยึดตั้งแต่พื้นที่ 1 พื้นที่ 2 และพื้นที่ 3 ที่อยู่ด้านนอก ไปจนถึงพื้นที่ 4 ที่เป็นพื้นที่สุดท้ายได้ค่ะ"
10020005-66 = "แต่ละพื้นที่จะมี <เครื่องทะลุมิติ> ที่ใช้สำหรับประมวลผลการวิเคราะห์ข้อมูลพหุมิติติดตั้งอยู่ค่ะ เจ้านี่คือ#nแก่นสำคัญของเครื่องประมวลผลการวิเคราะห์ข้อมูลพหุมิติ เป็นหัวใจของเรือลำนี้ค่ะ"
10020005-67 = "เราจะต้องทำลายเครื่องทะลุมิติทั้ง 4 อันที่ติดตั้งอยู่ภายในเรือ ถึงจะเข้ายึดระบบควบคุมเรือได้ค่ะ"
10020005-69 = "และเมื่อเราตั้งระบบให้เรือระเบิดตัวเองได้ ปฏิบัติการนี้ก็จะถือว่าลุล่วงค่ะ"
10020005-70 = "คิโวทอสก็จะกลับมาสงบสุขเหมือนเดิมอีกครั้ง"
10020005-74 = "จากนั้นคุณครูกับชมรมวิศวกรรมทุกคนก็จะนั่งเรือรบอุตนาพิชทิมกลับไปยังพื้นโลกได้โดยสวัสดิภาพ"
10020005-76 = "ถ้างั้นก็ขอจบการอธิบายไว้เท่านี้ จากนี้ไปก็ถึงตา <ชาเล่ต์> ออกโรงแล้ว"
10020005-77 = "อื้อ คุณครู ฝากเรื่องระวังหลังด้วยนะ"
10020005-81 = "คุณครูสู้ๆ นะ พวกเราก็จะพยายามเหมือนกัน"
10020005-82 = "พยายามเข้านะคะ"
10020005-86 = "[ns] \"ขอบใจเวอริทัสมากนะ มาพยายามไปด้วยกันเถอะ\""
10020005-87 = "... ขอบคุณสำหรับคำอธิบายค่ะ สมาชิกเวอริทัสทุกคน"
10020005-88 = "ถ้างั้น..."
10020005-89 = "<ปฏิบัติการยึดเรืออะทราฮาซิส> จะเริ่มขึ้น ณ บัดนี้ค่ะ!"
10020005-90 = "[s] \"ดีละ ไปกันเลย!\""
10020005-92 = "เราเตรียมเสบียงที่จำเป็นสำหรับปฏิบัติการเอาไว้ที่นี่แล้ว ถ้าจำเป็นละก็ มาเอาไปใช้ได้ตลอดเลยนะ ครู"
10020005-93 = "ค่ะ ฉันจะคอยส่งแรงเชียร์ให้จนปฏิบัติการเสร็จสิ้นเลยนะคะ"

10020005-23 = "#na;치히로;<아트라하시스의 방주>는 거대한 다차원해석연산장치…… 즉, 이 방주 전체가 일종의 컴퓨터라고 볼 수 있어."
10020005-24 = "#na;치히로;이 구조물의 하나하나가 전부 다차원해석을 수행하는 연산장치인 거지."
10020005-25 = "#na;하레;그러니까 이 방주의 각 구역을 [ruby=해킹]점령[/ruby]해 나가며 방주의 통제권을 조금씩 우리 쪽으로 빼앗아 오는 것이 이 전투의 핵심이야."
10020005-26 = "#na;마키;즉, 땅따먹기 같은 거지!"
10020005-27 = "#all;hide"
10020005-28 = "3;치히로;99;그래. 이 점령전은 기본적으로 상대의 영토를 점령해서 가져오는 거니까, 그 비유가 맞아.\n#3;sig\n#3;a"
10020005-29 = "3;치히로;02;그렇게 방주를 점령해 나가다가, 마지막엔 방주의 관제시스템까지 빼앗을 수 있으면 우리들의 승리가 되는 거지.\n#3;sig"
10020005-30 = "3;치히로;02;관제시스템이 우리 손에 들어온다면 <자폭 시퀀스>를 발동시켜서 방주를 자폭시킬 수 있거든.\n#3;sig"
10020005-31 = "3;치히로;04;물론 적들도 그걸 가만히 보고 있지는 않겠지. 점령전을 수행하면서 적들의 강력한 저항에 부딪치게 될 거야.\n#3;sig\n#3;em;[속상함]"
10020005-32 = "3;치히로;03;물론 그쪽은 전문가인 선생님이 있으니까, 큰 걱정은 하지 않지만.\n#3;sig"
10020005-33 = "[s] \"아아. 맡겨줘.\""
10020005-34 = "3;치히로;02;……. 현재 방주는 아리스의 활약으로 다차원해석을 하지 못하도록 억제된 상태야.\n#3;sig"
10020005-35 = "3;치히로;05;당연하겠지만 그걸 유지하는 데에는 한계가 있어. 제한 시간이 지나면 방주는 억제 상태에서 벗어나서 다시 다차원 속으로 숨어버릴 거야.\n#3;sig"
10020005-36 = "3;치히로;99;기껏 붙잡은 방주를 놓쳐버린다면, 두 번 다시 방주를 붙잡는 건 불가능해지겠지.\n#3;sig"
10020005-37 = "3;치히로;01;<다차원해석억제한계>까지의 시간은 별도로 표시해 둘게.\n#3;sig"

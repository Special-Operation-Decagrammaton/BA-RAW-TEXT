[translation]
83306050100-7 = "หืม...?"
83306050100-13 = "มีสมุดบันทึกอยู่ในที่แบบนี้ด้วยเหรอ... มันดูเก่ามากเลยนะ"
83306050100-14 = "สิ่งที่เขียนไว้ข้างใน..."
83306050100-17 = "ในที่สุดฉันก็มีห้องเปียโนส่วนตัวที่นี่แล้ว"
83306050100-18 = "ความฝันในอนาคตของฉันก็คือการได้เป็นนักแต่งเพลงและนักเปียโนที่เก่งที่สุดในเกเฮนน่า... ไม่สิ ในคิโวทอสเลย"
83306050100-23 = "เพื่อให้ฝันนั้นเป็นจริง... ฉันต้องตั้งใจฝึกซ้อมตั้งแต่วันนี้"
83306050100-24 = "และตั้งแต่วันนี้เป็นต้นไป ฉันจะบันทึกผลการฝึกซ้อมทุกวันเอาไว้ในสมุดนี้ เพื่อตัวฉันในอนาคต"
83306050100-31 = "เป็นของที่คนที่มาใช้ห้องนี้ทิ้งเอาไว้สินะ..."
83306050100-32 = "ตอนนั้นคนคนนั้นคงไม่ปล่อยให้มีฝุ่นเกาะแบบนี้แน่นอน ทั้งเปียโน ทั้งสมุดโน้ต..."
83306050100-33 = "ฝันอยากเป็นนักเปียโนงั้นเหรอ..."
83306050100-34 = "คนคนนั้น... ตอนนี้จะเป็นยังไงบ้างนะ"
83306050100-35 = "......"

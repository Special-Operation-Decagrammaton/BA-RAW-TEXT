[translation]
83306050100-7 = "Hmm...?"
83306050100-13 = "Why would a notebook be in a place like this...? It looks quite old."
83306050100-14 = "Inside it says..."
83306050100-17 = "\"I finally have my own hidden piano room.\""
83306050100-18 = "\"My dream is to become the greatest composer and concert pianist in all of Gehenna... No, in all of Kivotos!\""
83306050100-23 = "\"From here on out, I'll practice every day...until I achieve that goal.\""
83306050100-24 = "\"I'll record the results of my practice in this notebook each day. So future me can look back on everything I've accomplished.\""
83306050100-31 = "So...this was left by the original owner of this place."
83306050100-32 = "I'm sure neither piano nor notebook felt the touch of dust back then..."
83306050100-33 = "Your dream to become a concert pianist..."
83306050100-34 = "I wonder how you're doing now."
83306050100-35 = "..."

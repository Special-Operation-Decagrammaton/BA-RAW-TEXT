10024020-143 = "2;현룡문 부원 A;07;분명 만년삼도 요리에 쓰기 위해 반출했을 겁니다!\n#2;em;[빠직]"
10024020-144 = "4;현룡문 부원 B;02;지켜져 온 것들에게는 그만한 가치가 남아있기 마련인 것을!\n#4;em;[속상함]\n#4;stiff"

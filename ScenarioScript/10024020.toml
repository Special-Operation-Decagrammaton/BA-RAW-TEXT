[translation]
10024020-1 = "第2話;嚆矢濫觴：自此開始"
10024020-6 = "六和閣．入口"
10024020-7 = "[ns]「這裡就是……」"
10024020-9 = "嗯，是玄龍門的六和閣哦。  "
10024020-10 = "雖然很久沒來了，似乎沒什麼改變呢。"
10024020-11 = "那麼，「熱情的款待」差不多該出現了吧……"
10024020-17 = "喂，站住。你們是誰！"
10024020-18 = "這位是玄武商會的瑠美會長，以及夏萊的老師。#n我是擔任護衛的令女。"
10024020-19 = "老師似乎想要見妃姬一面，所以我們也一起來了。#n能讓我們進去嗎？"
10024020-20 = "見門主大人？#n我可沒聽說過有訪客……沒有事前申請就來訪可不能──"
10024020-21 = "──等等，你剛才是說夏萊的老師嗎？#n可惡的玄武商會，居然拿老師當擋箭牌，還真像是你們這些卑鄙之人會想到的辦法。"
10024020-22 = "這個嘛，你要這麼說也不是不行。"
10024020-23 = "所以呢，你打算怎麼做？#n就這樣讓夏萊的老師吃閉門羹嗎？"
10024020-24 = "這麼一來，「連夏萊的老師都不得其門而入」的傳聞就能轟動整個奇普托斯了吧。"
10024020-25 = "──玄龍門的祕密主義想必也會更加聲名遠播的哦？"
10024020-26 = "[s]「這是在嘲諷吧……？」"
10024020-27 = "誰知道呢？"
10024020-28 = "話是你說的還說不知道？"
10024020-29 = "真不敢相信……！#n吐槽令女的人應該是我才對啊……！"
10024020-30 = "你突然又是怎樣！？"
10024020-31 = "[s]「抱歉。總之，可以請你幫我們確認一下嗎？」"
10024020-32 = "咳，咳哼。#n請稍等，我去向門主大人稟報。"
10024020-37 = "有老師在場果然很好說話呢。"
10024020-38 = "說的沒錯，就像傳聞中一樣。"
10024020-39 = "[s]「……會不會有點強硬？」"
10024020-40 = "哎呀哎呀，太計較瑣碎的小事是做不成生意的。"
10024020-49 = "老師，你的臉色好像不太好……沒事吧？"
10024020-50 = "[s1]「有種被祕密組織招待的感覺……」\n[s2]「就像黑幫的基地一樣……」"
10024020-53 = "雖不中亦不遠矣，可以這麼說吧。"
10024020-54 = "還真是一如既往呢。"
10024020-62 = "門主大人駕～到～！！！"
10024020-63 = "駕～到～！！！"
10024020-69 = "……"
10024020-70 = "汝的事，妾身都聽說了。"
10024020-71 = "要說與汝相見不高興實屬謊言……以如此形式相會仍在意料之外。"
10024020-72 = "[s]「那個……初次見面，妃姬醬。」"
10024020-73 = "真是無禮！#n就算是老師，這位大人也不是能夠那樣隨意稱呼的……！"
10024020-74 = "無法分辨時機與場合嗎！"
10024020-75 = "別大聲嚷嚷──這位可是妾身的[ruby= ・     ・ ]客人[/ruby]。"
10024020-76 = "是！失禮了，門主大人！"
10024020-77 = "門主大人！請您饒恕！"
10024020-78 = "據妾身所聞，夏萊的老師富有人望──"
10024020-79 = "為求達成目的將不擇手段，是名長於權謀術數的策士。"
10024020-83 = "[ns]「這究竟是從哪裡聽來的！？」"
10024020-84 = "無須驚慌。#n就妾身看來，汝也不像是那種人。"
10024020-85 = "倒不如說──由於善心作祟而四處奔走的模樣彷彿清晰可見。"
10024020-86 = "[s]「這是在稱讚我……嗎……？」"
10024020-87 = "究竟是否如此呢？#n想像這一點也未嘗不是一種樂趣。"
10024020-88 = "汝的心裡究竟隱藏著什麼呢。"
10024020-94 = "這位是執行部長美奈。#n是玄龍門的先鋒，也負責妾身的護衛。"
10024020-95 = "……"
10024020-97 = "……"
10024020-99 = "──言歸正傳吧，老師。"
10024020-100 = "近來，似乎有未經許可的「萬年蔘」在山海經外部流通。"
10024020-101 = "[s]「有找到什麼與玄武商會有關的證據嗎？」"
10024020-102 = "……美奈，把東西拿來。"
10024020-111 = "這個是……？"
10024020-112 = "如汝所見──汝莫非要說不知情吧？"
10024020-113 = "……是玄武商會使用的紙箱沒錯。  "
10024020-114 = "會長……！"
10024020-115 = "此即證據──吾等亦非閒暇之人。#n不會毫無證據便懷疑他人。"
10024020-116 = "萬年蔘於山海經實屬貴重，就連採集亦須獲得許可。"
10024020-117 = "聽聞如此特產在山海經外部──#n甚至是玄龍門亦不知情的地點流通，當然無法默不作聲。"
10024020-118 = "身為門主無法視而不見。#n那麼──汝等對此作何解釋？"
10024020-123 = "玄武商會的事，我比任何人都還了解。"
10024020-124 = "所有流通負責人都沒有經手萬年蔘，也不存在會瞞著我做出那種事的孩子。"
10024020-125 = "若是玄武商會內部有任何人經手不法交易──#n我一定會把他帶來這裡。"
10024020-126 = "我以我的力量──向你保證。"
10024020-130 = "……令人失望。"
10024020-131 = "吾等可是提出了證據──既然如此，#n汝等亦需提出反證才合理不是嗎？"
10024020-132 = "[s3]「要當場提出反證有點……」\n[s4]「可以給我們一點時間嗎？」"
10024020-141 = "您還想聽見什麼答覆呢，門主大人！"
10024020-142 = "玄武商會不正是以創意料理聞名的嗎！"
10024020-143 = "而萬年蔘，肯定也是被用來當作購入學園外食材的道具沒錯！"
10024020-144 = "明明代代傳承下來的傳統有其相應的價值和理由！"
10024020-145 = "他們是群連傳統的重要性都無法理解的傢伙！不必再聽他們的辯解！"
10024020-146 = "還不快低頭謝罪！"
10024020-151 = "啊哈哈……確實是無法完全否定呢。"
10024020-152 = "我也不是不理解傳統的重要性。"
10024020-153 = "不過，若是不融入新文化──#n只會永遠一成不變而已。"
10024020-154 = "──到此為止。"
10024020-155 = "今日乃傳達玄武商會所涉之嫌疑，聽其申辯之場合。#n並非爭辯之時。"
10024020-157 = "您過於寬容了，門主大人！#n玄武商會肯定就是犯人沒錯！"
10024020-158 = "沒錯！#n給他們時間的話，他們勢必會企圖湮滅證據的……！"
10024020-160 = "所有山海經學生皆有自由之保障。#n……然其前提乃不對學園造成危害。"
10024020-161 = "但如今！玄武商會不正是在危害學園嗎！！"
10024020-162 = "是否確為危害尚未知曉──莫貿然行事。#n明白妾身所言之意嗎？"
10024020-167 = "──玄武商會啊，聽仔細了。#n在汝等之嫌疑尚未洗清前，監視將不會解除。"
10024020-168 = "話雖如此，要汝等即刻揭示反證亦無道理。"
10024020-170 = "於此──給予汝等一定的寬限期。"
10024020-171 = "若能在期限內找出妾身得以接受之證據，就重新安排審議之場合吧。"
10024020-173 = "然而──莫要忘了。"
10024020-174 = "若是情況惡化──解散玄武商會亦莫可奈何。"
10024020-175 = "以上即為玄龍門門主──龍華妃姬的裁決。"
10024020-177 = "請稍等，門主大人！#n這分明是某人設計陷害玄武商會……瑠，瑠美會長！？"
10024020-178 = "令女，玄武商會的箱子裡放了「萬年蔘」的事實不會改變。"
10024020-179 = "事到如今……雖然悔恨，也只能由我們親手抓住犯人了。"
10024020-181 = "意下如何呢，妃姬[ruby= ・     ・ ]門主[/ruby]？"
10024020-182 = "啊啊，無妨。#n妾身亦無不承認之理由啊，瑠美[ruby= ・     ・ ]會長[/ruby]。  "
10024020-187 = "[ns]「那麼，該從哪裡查起呢？」"
10024020-189 = "首先得先收集「萬年蔘」的情報才行呢……"
10024020-195 = "玄武商會，給我站住！ "
10024020-196 = "老師，請您退後吧！"
10024020-197 = "膽敢走進玄龍門的地盤，以為這麼簡單就能出去嗎？"
10024020-198 = "門主大人實在太心軟了……！"
10024020-199 = "明明犯罪者都大搖大擺出現了，居然還縱虎歸山……"
10024020-200 = "嫌犯難道不應該在集齊證據之前將其拘束起來嗎？"
10024020-201 = "剛才妃姬說的話，你難道沒聽見嗎？"
10024020-202 = "區區玄武商會少把門主大人的話掛在嘴邊！#n罪人說的話根本沒必要聽！"
10024020-204 = "你們都出來吧！"
10024020-212 = "……老師，請躲在我的身後，千萬別出來哦。"
10024020-213 = "這麼說來……聽說只要有老師的指揮，#n不管面對什麼樣的情況都能逆轉取勝，這是真的嗎？"
10024020-214 = "[s]「那種傳聞到底是從哪裡傳出來的……」"
10024020-215 = "啊哈哈，要澄清傳聞，只靠自己總是無能為力呢。"
10024020-216 = "那麼指揮就拜託你囉。#n老師的力量，也讓我們見識見識吧！"

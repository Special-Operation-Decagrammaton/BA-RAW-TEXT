10024020-37 = "4;루미;01;뭐, 결과적으로 이야기가 빨라졌네."
10024020-38 = "2;레이죠;03;확실히 그렇군요. 역시 선생님이십니다.\n#2;greeting"
10024020-39 = "[s] \"……이래도 되는 걸까, 산해경……\""

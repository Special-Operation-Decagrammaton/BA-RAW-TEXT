10024020-100 = "4;키사키;02;문제가 되는 것으로 들은 것은…… 산해경 외부에서 유통되는 만년삼의 존재다."
10024020-101 = "[s] \"응. 그거 말인데, 확실한 증거가 있어서 현무상회를 의심하는 거야?\""

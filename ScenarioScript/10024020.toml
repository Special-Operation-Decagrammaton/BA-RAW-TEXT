10024020-161 = "#na;현룡문 부원 A;현무상회는 지금 명백히 산해경에 해를 끼치고 있습니다!"
10024020-162 = "3;키사키;05;그것과 이 자리에서 현무상회에게 과도한 비방을 행하는 것은 다른 이야기이겠지."

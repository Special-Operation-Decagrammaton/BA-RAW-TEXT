[translation]
10024020-1 = "ตอนที่ 2;เริ่มขึ้น ณ บัดนี้"
10024020-6 = "ถนนอาคารหกเหลี่ยม"
10024020-7 = "[ns] \"ที่นี่คือ...?\""
10024020-9 = "อื้ม ที่นี่ก็คือที่ตั้งของมังกรดำ ถนนลิ่วเหอเก๋อ ถนนที่มีหกด้านน่ะ"
10024020-10 = "ไม่ได้แวะมาตั้งนาน แต่ก็ไม่ได้เปลี่ยนไปเท่าไรเลยนะ"
10024020-11 = "เอาละ จังหวะนี้น่าจะเล่นใหญ่รัชดาลัยกันแล้วสิ..."
10024020-17 = "นั่นใครน่ะ! หยุดอยู่ตรงนั้นนะ!"
10024020-18 = "ท่านประธานรูมิแห่งย่านการค้าเทพเต่าดำ ผู้พิทักษ์เรย์โจว และคุณครูจากชาเล่ต์ค่ะ"
10024020-19 = "เรามาเพราะคุณครูอยากเจอคิซากิน่ะ ขอเจอได้ใช่ไหม?"
10024020-20 = "ย่านการค้าเทพเต่าดำ! ทำความเคารพท่านประมุข! คะ... คุณครูจากชาเล่ต์ก็มาเหรอ...?!"
10024020-21 = "พวกขี้โกง! เอาคุณครูมาเป็นโล่กำบังตัวเองรึไง?"
10024020-22 = "ก็ตามที่เห็นนั่นแหละ"
10024020-23 = "แล้วจะทำไมล่ะ? หรือจะให้คุณครูชาเล่ต์กลับไปทั้งอย่างนี้เลย?"
10024020-24 = "แบบนั้นคงได้ความภาคภูมิใจอีกอย่างว่า 'มังกรดำแห่งซานไห่จิงต้อนรับคุณครูจากชาเล่ต์แบบสุกเอาเผากิน' แน่เลยค่ะ"
10024020-25 = "การปกปิดความลับของมังกรดำคงโด่งดังอีกระดับเลยนะคะ สุดยอดไปเลยค่ะ"
10024020-26 = "[s] \"นั่นชมหรือประชดกันแน่...?\""
10024020-27 = "ฉันก็ไม่รู้เหมือนกันค่ะ"
10024020-28 = "แม้แต่คนพูดก็ยังไม่รู้เรื่องเลย แล้วคนอื่นเค้าจะไปรู้ได้ยังไง?!"
10024020-29 = "อะไรกัน...! หน้าที่สวนคำพูดของเรย์โจวมันเป็นของฉันนะ...!"
10024020-30 = "เป็นอะไรขึ้นมาอีกคนล่ะเนี่ย!?"
10024020-31 = "[s] \"เอาเถอะ… งั้นฝากไปบอกคิซากิหน่อยได้ไหม?\""
10024020-32 = "อะ... อะฮึ่ม รอสักครู่นะคะ เดี๋ยวฉันจะแจ้งท่านประมุขให้ค่ะ"
10024020-37 = "แบบนี้ก็พอจะทำให้ได้คุยกันเร็วขึ้นแหละเนอะ"
10024020-38 = "ใช่เลยค่ะ สมกับเป็นคุณครูจริงๆ ค่ะ"
10024020-39 = "[s] \"เป็นกันแบบนี้เหรอเนี่ย... เด็กซานไห่จิง...\""
10024020-40 = "เอาละๆ ถ้าใส่ใจแม้กระทั่งเรื่องจุกจิก มีหวังไม่ได้ทำมาหากินกันพอดีน่ะสิ"
10024020-49 = "คุณครู เป็นยังไงบ้างคะ?"
10024020-50 = "[s1] \"เหมือนเข้าไปอยู่กลางองค์กรลึกลับเลย...\"\n[s2] \"เหมือนได้รับ 'คำเชิญ' จากองค์กรที่อยู่ในหนังมาเฟียเลย...\""
10024020-53 = "คุณครูก็ไม่ได้คิดผิดไปซะทีเดียวหรอกนะ"
10024020-54 = "ยัยคิซากิน่ะ... คงเส้นคงวากับเรื่องแบบนี้จริงๆ"
10024020-62 = "ท่านประมุขมาแล้ว!"
10024020-63 = "ท่านประมุขมาแล้ว!"
10024020-69 = "..."
10024020-70 = "เราทราบเรื่องแล้วละครู"
10024020-71 = "เราคงต้องกล่าวตามมารยาทว่ายินดีที่ได้เจอสินะ... ถึงเราจะไม่ได้อยากเจอกันครั้งแรกในบรรยากาศ#nแบบนี้ก็เถอะ"
10024020-72 = "[s] \"อืม… ครูเรียกเธอว่าคิซากิจังได้ใช่ไหม?\""
10024020-73 = "สามหาว! ต่อให้เป็นคุณครูจากชาเล่ต์ก็เถอะ!"
10024020-74 = "ทุกคนต้องมีมารยาทที่ต้องรักษาและกฎที่ต้องปฏิบัติตามนะ!"
10024020-75 = "พอได้แล้ว ครูคือแขกของซานไห่จิงที่เดินทางมาไกลนะ เราจะต้องก่อความวุ่นวายกันก่อนหรือไง"
10024020-76 = "คะ... ค่ะ! ฉันจะระวังค่ะ ท่านประมุข!"
10024020-77 = "โปรดยกโทษให้ด้วยค่ะ! พวกเราลืมตัวไปค่ะ!"
10024020-78 = "จากที่ได้ยินมา ครูจากชาเล่ต์เป็นผู้ที่รักอิสระและมีความสามารถรอบด้าน"
10024020-79 = "แถมยังเป็นจอมเล่ห์เหลี่ยม... ที่ทำลายทุกอย่างที่เป็นอุปสรรคขวางทางแบบถอนรากถอนโคนเลยด้วย"
10024020-83 = "[ns] \"ไปได้ยินข่าวลือแบบนั้นมาจากไหนน่ะ?!\""
10024020-84 = "อย่าห่วงไปเลย เท่าที่เราเห็น ครูก็ดูจะไม่ได้เป็นคนอย่างนั้นหรอก"
10024020-85 = "ครูเป็นคนที่ดีมากๆ ดูเหมือนกับคนที่เหมาะกับการโดนหลอกใช้น่ะ"
10024020-86 = "[s] \"เลือกสักอย่างได้ไหมว่าจะชมหรือจะล้อกันเล่น...\""
10024020-87 = "ใครจะรู้ได้กันเล่า จิตใจของคนเรานั้นยากแท้หยั่งถึง"
10024020-88 = "เราน่ะอยากจะรู้เสียจริงๆ เลยว่าภายในใจของครูนั้นกำลังซ่อนอะไรเอาไว้..."
10024020-94 = "ส่วนนี่คือหัวหน้าปฏิบัติการมินะ เธอเป็นผู้บัญชาการและเป็นผู้พิทักษ์ที่ขึ้นตรงกับเราโดยตรง"
10024020-95 = "..."
10024020-97 = "..."
10024020-99 = "งั้นกลับเข้าเรื่องที่จะคุยกันดีกว่าครู"
10024020-100 = "สิ่งที่เราได้ยินว่าเป็นปัญหา... ก็คือโสมหมื่นปีที่กระจายอยู่ภายนอกซานไห่จิง"
10024020-101 = "[s] \"อืม ที่พวกเธอสงสัยย่านการค้าเทพเต่าดำเพราะมีหลักฐานแน่ชัดแล้วใช่ไหม?\""
10024020-102 = "เอาของชิ้นนั้นเข้ามา"
10024020-111 = "นี่มัน...?"
10024020-112 = "เธอคงไม่มีทางที่จะจำไม่ได้หรอก ใช่รึเปล่า?"
10024020-113 = "นี่มัน... กล่องวัตถุดิบอาหารที่ย่านการค้าเทพเต่าดำของเราสั่งมา"
10024020-114 = "ท่านประธาน...!"
10024020-115 = "ครูถามใช่ไหมว่าพวกเรามีหลักฐานหรือเปล่า? เราขอส่งกล่องใบนี้เป็นหลักฐานก็แล้วกัน"
10024020-116 = "ถึงซานไห่จิงจะเป็นแหล่งโสมหมื่นปี แต่มันก็เป็นพืชหายาก เลยต้องมีการห้ามเก็บโดยไม่ได้รับอนุญาต"
10024020-117 = "และการกระจายผลผลิตพิเศษออกไปข้างนอกซานไห่จิงโดยไม่ผ่านการอนุมัติจากมังกรดำก็เป็นเรื่อง#nร้ายแรง"
10024020-118 = "ในฐานะมังกรดำแล้วเราไม่อาจเพิกเฉยได้ ย่านการค้าเทพเต่าดำจะต้องให้คำตอบที่ชัดเจนเกี่ยวกับ#nปัญหานี้"
10024020-123 = "ฉันไม่ได้จะอวดหรอกนะ แต่ฉันรู้ทุกความเคลื่อนไหวของทุกองค์กรในย่านการค้าเทพเต่าดำดี"
10024020-124 = "แล้วก็ไม่เคยได้ยินเลยนะว่ามันมีการค้าโสมหมื่นปีในองค์กรกระจายสินค้าไหนของเรา"
10024020-125 = "ฉันขอให้คำมั่นเลยค่ะ ถ้ามีการทำผิดกฎหมายของคนในย่านการค้าเทพเต่าดำละก็"
10024020-126 = "ฉันจะจัดการคนพวกนั้นในรวดเดียวให้ได้ก่อนใครเลย"
10024020-130 = "ถ้าชี้แจงได้แค่นั้น มันก็น่าผิดหวังนิดหน่อยนะ"
10024020-131 = "ถ้ามังกรดำแสดงหลักฐานแล้ว ย่านการค้าเทพเต่าดำก็ควรแสดงหลักฐานคัดค้านด้วยถึงจะถูกไม่ใช่#nหรอกหรือ?"
10024020-132 = "[s3] \"จะให้แสดงหลักฐานตอนนี้เลยเหรอ...\"\n[s4] \"ที่เธอพูดมันก็ถูก แต่ขอเวลาหน่อยได้ไหม?\""
10024020-141 = "คงไม่มีอะไรให้พิสูจน์แล้วละค่ะ ท่านประมุข!"
10024020-142 = "ใช่แล้วค่ะ! ย่านการค้าเทพเต่าดำขึ้นชื่อเรื่องการลองทำอาหารแบบแปลกๆ อยู่แล้วค่ะ!"
10024020-143 = "พวกเธอต้องส่งออกโสมหมื่นปีเพื่อใช้ทำอาหารแน่เลยค่ะ!"
10024020-144 = "ขนบธรรมเนียมที่มีมาย่อมมีคุณค่าที่ต้องยึดปฏิบัติ!"
10024020-145 = "พวกไม่รู้จักธรรมเนียมและคุณค่าของการอนุรักษ์ มันต้องทิ้งหลักฐานจากการกระทำบ้างแหละ!"
10024020-146 = "ย่านการค้าเทพเต่าดำ ยังไม่รีบก้มหัวขออภัยอีก!"
10024020-151 = "ฮ่าฮ่าฮ่า... ก็ปฏิเสธไม่ได้หรอกนะว่ามันไม่เคยมีเรื่องแบบนั้น"
10024020-152 = "แต่คนเราไม่มีทางประสบความสำเร็จโดยไม่ผ่านการลองผิดลองถูกหรอกนะ"
10024020-153 = "ถ้าเราถูกจำกัดอยู่ในกรอบแค่กรอบเดียว ก็คงจะได้กลายเป็นพวกขี้ขลาดที่ลองทำอะไรไม่เป็น"
10024020-154 = "พอแค่นั้นแหละ ห้ามพูดจาว่าร้ายใส่กันในที่แห่งนี้"
10024020-155 = "นี่เป็นการสอบถามข้อกล่าวหาและรับฟังข้อร้องเรียนจากย่านการค้าเทพเต่าดำ"
10024020-157 = "ข้อร้องเรียนงั้นเหรอคะ? ท่านประมุขจะเมตตาพวกเธอเกินไปแล้วนะคะ!"
10024020-158 = "นั่นสิคะ! ย่านการค้าเทพเต่าดำเป็นคนร้ายที่กระจายโสมหมื่นปีออกไปข้างนอกนะคะ!"
10024020-160 = "นักเรียนของซานไห่จิงสามารถแสดงเจตจำนงของตัวเองได้ แต่ต้องอยู่ภายใต้เงื่อนไขที่ไม่เป็นภัยต่อ#nซานไห่จิง"
10024020-161 = "ตอนนี้ย่านการค้าเทพเต่าดำกำลังนำภัยอันตรายมาสู่ซานไห่จิงอย่างไม่ต้องสงสัยค่ะ!"
10024020-162 = "แต่นั่นมันคนละเรื่องกับการพูดใส่ร้ายย่านการค้าเทพเต่าดำในที่แห่งนี้"
10024020-167 = "ฟังนะ ตราบใดที่ยังมีข้อสงสัย เราก็ยังต้องสังเกตการณ์ย่านการค้าเทพเต่าดำต่อไป"
10024020-168 = "แต่ถึงอย่างนั้น การสั่งให้แสดงข้อคัดค้านต่อหลักฐานในทันทีก็คงจะไม่ถูกต้องตามกฎระเบียบ"
10024020-170 = "ดังนั้นเราจะผ่อนผันให้ย่านการค้าเทพเต่าดำตามเวลาที่กำหนด"
10024020-171 = "ระหว่างนั้นถ้าหาหลักฐานอย่างอื่นมายืนยันเพื่อให้มังกรดำยอมรับได้ เราจะพิจารณาบทลงโทษของย่านการค้าเทพเต่าดำใหม่อีกครั้ง"
10024020-173 = "แต่จงจำไว้ว่า หากสถานการณ์เลวร้ายลงกว่าเดิม"
10024020-174 = "ในฐานะมังกรดำ... เราคงต้องพิจารณาให้ยุติกิจการของย่านการค้าเทพเต่าดำ"
10024020-175 = "นี่คือเจตจำนงของเรา ริวเกะ คิซากิ ประมุขแห่งมังกรดำ"
10024020-177 = "เดี๋ยวสิคะ ท่านประมุข! จะต้องมีการใส่ร้ายกันแน่ๆ...!"
10024020-178 = "พอเถอะ เรย์โจว ยังไงกล่องนั่นก็เป็นกล่องจากย่านการค้าเทพเต่าดำของพวกเราอยู่ดีนะ"
10024020-179 = "ในเมื่อเป็นแบบนี้แล้ว... ถึงจะรู้สึกไม่ยุติธรรม แต่เราคงทำอะไรไม่ได้นอกจากลงมือจับคนร้ายด้วยตัวเอง"
10024020-181 = "ต้องแบบนั้นถึงจะพอใจใช่ไหม ประมุขคิซากิ?"
10024020-182 = "ย่อมเป็นเช่นนั้น ประธานกลุ่มการค้ารูมิ  "
10024020-187 = "[ns] \"มีแผนอะไรอยู่งั้นเหรอ?\""
10024020-189 = "ก่อนอื่นก็ต้องมีข้อมูลเกี่ยวกับโสมหมื่นปีก่อน..."
10024020-195 = "หยุดอยู่ตรงนั้นนะ ย่านการค้าเทพเต่าดำ! "
10024020-196 = "คุณครู... มาหลบหลังฉันเร็ว!"
10024020-197 = "ถึงจะเข้ามาที่มังกรดำได้ตามอำเภอใจ แต่ตอนออกไปอย่าหวังว่าจะเป็นแบบนั้นเลย!"
10024020-198 = "ท่านประมุขคิซากิยอมอ่อนข้อให้มากเกินไปแล้ว...!"
10024020-199 = "ผู้ต้องสงสัยคนสำคัญเดินเข้ามาเองแล้วแท้ๆ จะให้ปล่อยไปเฉยๆ ได้ยังไง..."
10024020-200 = "เราควรจับกุมคนร้ายเอาไว้จนกว่าจะได้หลักฐานที่แน่ชัดสิ!"
10024020-201 = "หมายความว่าจะจับกุมพวกเราโดยไม่มีเหตุผลอย่างนั้นเหรอ?"
10024020-202 = "การลงโทษผู้กระทำผิด ไม่จำเป็นต้องมีเหตุผลหรอกค่ะ!"
10024020-204 = "ทุกคน ออกมาเลย!"
10024020-212 = "คุณครู... ระวังตัวด้วยนะคะ!"
10024020-213 = "จะว่าไปแล้ว ได้ยินมาว่าหากคุณครูออกโรงสั่งการละก็ยังไม่เคยมีนักเรียนคนไหนแพ้เลยนะ"
10024020-214 = "[s] \"ข่าวลือแบบนั้นแพร่ไปได้ยังไงเนี่ย...\""
10024020-215 = "ฮ่ะฮ่ะฮ่า ชีวิตคนเราล้วนถูกโยงใส่ข่าวลือต่างๆ นาๆ ทั้งนั้นนั่นละ"
10024020-216 = "งั้นฝากออกคำสั่งด้วยนะคุณครู พวกเราก็อยากเห็นฝีมือคุณครูสักครั้งเหมือนกัน!"

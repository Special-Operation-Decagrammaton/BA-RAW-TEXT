10024020-9 = "2;레이죠;01\n4;루미;02;응. 현룡문이 자리한, [ruby=六和閣]육화각[/ruby]이지.  "
10024020-10 = "4;루미;01;오랜만이라면 오랜만인데, 그다지 변한 건 없어 보이네."
10024020-11 = "4;루미;01;자, 그러면 슬슬 시끄러워져야 할 타이밍인데……\n#4;em;[...]"

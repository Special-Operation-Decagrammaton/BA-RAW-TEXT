10024020-17 = "5;현룡문 부원 A;05;누구냐! 걸음을 멈춰라!\n#5;em;[!]"
10024020-18 = "2;레이죠;07;현무상회의 루미 회장님과 경호원 레이죠, 그리고 샬레의 선생님입니다."
10024020-19 = "4;루미;02;선생님이 키사키를 만나고 싶다고 하셔서 모시고 왔어. 괜찮겠지?"
10024020-20 = "5;현룡문 부원 A;02;현무상회! 문주님께 예의를 갖춰라! 그, 그런데, 샬레의 선생님……?!\n#5;em;[?]"
10024020-21 = "5;현룡문 부원 A;07;비열한 녀석들! 선생님을 방패로 삼은 거냐?"
10024020-22 = "4;루미;00;뭐, 그런 것으로 하지.\n#4;em;[음표]"
10024020-23 = "4;루미;01;그래서, 어떻게 할 거야? 이대로 샬레의 선생님을 돌려보낼 건가?"
10024020-24 = "2;레이죠;99;그렇게 된다면 '샬레의 선생님마저도 문전 박대한 산해경의 현룡문' 이라는 위업이 추가되겠군요."
10024020-25 = "5;현룡문 부원 A;04\n2;레이죠;03;현룡문의 비밀주의는 한층 더 유명해질 테지요. 대단합니다.\n#2;em;[반짝]"
10024020-26 = "[s] \"그거 칭찬이야, 비꼬는 거야……?\""
10024020-27 = "2;레이죠;01;저도 모르겠습니다."
10024020-28 = "5;현룡문 부원 A;05;말을 꺼낸 사람이 모르면 어떡하라고?!\n#5;em;[!]\n#5;jump"
10024020-29 = "4;루미;02;이럴 수가……! 레이죠의 말에 태클을 거는 것은 내 역할이었는데……!\n#4;em;[반응]"
10024020-30 = "5;현룡문 부원 A;02;당신은 갑자기 또 왜 그래!?\n#5;em;[?!]\n#5;shake"
10024020-31 = "[s] \"아무튼…… 이야기만이라도 좀 전해 줄래?\""
10024020-32 = "5;현룡문 부원 A;04;크, 크흠. 기다려 주십시오. 문주님께 말씀을 올리겠습니다."

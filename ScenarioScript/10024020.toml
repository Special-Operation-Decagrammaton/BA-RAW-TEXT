10024020-124 = "1;루미;05;그중 어떤 유통 조직에서도 만년삼을 취급하고 있었다는 이야기는 들은 적이 없어."
10024020-125 = "5;레이죠;02;약속드리겠습니다. 만일 현무상회 내부에서 불법적인 일이 이루어지고 있었다면,"

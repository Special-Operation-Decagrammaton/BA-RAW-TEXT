10024020-113 = "#na;루미;확실히…… 우리 현무상회가 발주한 식재료 상자로군. 확인했어.   "
10024020-114 = "#na;레이죠;회장님……!"
10024020-115 = "#na;키사키;증거가 있느냐고 물었던가? 우리 현룡문은 이 상자를 증거로 제시하겠노라."
10024020-116 = "#na;키사키;만년삼은 산해경에서도 희귀한 식물이라, 무단 채집이 금지되어 있지."
10024020-117 = "#na;키사키;그런 특산물이 산해경 밖에서, 그것도 현룡문의 지시 없이 유통되고 있다는 것은 큰 문제이니라."
10024020-118 = "#na;키사키;현룡문으로서는 이를 좌시할 수 없도다. 현무상회는 이 문제에 대해 응당 답을 내어야 할 것이야."

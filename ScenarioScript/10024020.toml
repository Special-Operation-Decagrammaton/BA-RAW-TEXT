[translation]
10024020-1 = "Episode 2;From Today, It Begins"
10024020-6 = "Rikkagaku Street"
10024020-7 = "[ns] \"This is the place?\""
10024020-9 = "Yes. Rikkagaku, where Genryumon is headquartered.  "
10024020-10 = "It's been a long time since I was last here, but not much has changed..."
10024020-11 = "Ah. Things are about to get noisy..."
10024020-17 = "Who goes there? Stop right there!"
10024020-18 = "We're President Rumi and Reijo from the Black Tortoise Promenade. We brought the Sensei from Schale."
10024020-19 = "Sensei was hoping to see Kisaki. I'm sure that can be arranged, right?"
10024020-20 = "You're in no position to make demands, tortoise! B-But...this is THAT Sensei...?"
10024020-21 = "Not brave enough to come here without Sensei to hide behind. Is that it?"
10024020-22 = "I suppose we aren't, when you put it like that."
10024020-23 = "So, what of it? Are you going to deny Sensei's request?"
10024020-24 = "Think of the headlines, President. \"Shanhaijing's Genryumon kicks Schale's Sensei to the curb!\""
10024020-25 = "Genryumon would be famous throughout all of Kivotos!"
10024020-26 = "[s] \"Is that a good thing, or...?\""
10024020-27 = "Beats me."
10024020-28 = "But you're the one who said it!"
10024020-29 = "Oh, that was my line. I'm supposed to be playing straight-man to Reijo here!"
10024020-30 = "This isn't a comedy routine!!"
10024020-31 = "[s] \"Aaaanyway... Please let your president know that I'm here.\""
10024020-32 = "A-Ahem. Wait right here. I'll pass your message along."
10024020-37 = "I'd say that went well."
10024020-38 = "Yeah! Sensei knows how to get their way."
10024020-39 = "[s] \"Things certainly are interesting here in Shanhaijing...\""
10024020-40 = "You get used to it. You have to, if you want to run a business."
10024020-49 = "How're you doing so far, Sensei?"
10024020-50 = "[s1] \"This is all a little more 'cloak and dagger' than I'm used to...\"\n[s2] \"I feel like I've stepped into a mafia movie.\""
10024020-53 = "You're not too far off on that."
10024020-54 = "Kisaki... She really hasn't changed."
10024020-62 = "The president is coming!"
10024020-63 = "The president is coming!"
10024020-69 = "..."
10024020-70 = "I've heard stories about you, Sensei."
10024020-71 = "It's good to finally meet you. If only the circumstances were different."
10024020-72 = "[s] \"Ah... What should I call you? Just 'Kisaki'?\""
10024020-73 = "Watch your mouth! I don't care if you're with Schale!"
10024020-74 = "Yeah! Mind your manners!"
10024020-75 = "Enough. Sensei has come far to meet us. We can make allowances."
10024020-76 = "Y-Yes, Madam!"
10024020-77 = "Please forgive us! For going above our stations!"
10024020-78 = "They say the Sensei of Schale is a loose cannon. A conniving mastermind..."
10024020-79 = "...who crushes anything...ANYTHING...that stands in their way."
10024020-83 = "[ns] \"Who the heck told you that?!\""
10024020-84 = "Don't worry. Now that we've met, it's clear those stories were exaggerations."
10024020-85 = "You look like the sort of person who's constantly being tricked into doing the work of others."
10024020-86 = "[s] \"I liked it better when you thought I was a mastermind...\""
10024020-87 = "Perhaps I'm mistaken. One can never tell what's going on inside someone's mind. "
10024020-88 = "I look forward to learning what sort of person you truly are."
10024020-94 = "Allow me to introduce my executive officer, Mina. She spearheads Genryumon's operations and acts as my personal guard."
10024020-95 = "..."
10024020-97 = "..."
10024020-99 = "Perhaps we should continue to the topic at hand."
10024020-100 = "You're here about the ten-thousand-year ginseng that's being smuggled outside of Shanhaijing."
10024020-101 = "[s] \"The Black Tortoise Promenade was accused, but I was wondering if you had any actual evidence.\""
10024020-102 = "Show them."
10024020-111 = "This is...?"
10024020-112 = "You recognize this, of course."
10024020-113 = "Yes... All of the Black Tortoise Promenade's cooking ingredients are shipped in boxes like this.   "
10024020-114 = "President...!"
10024020-115 = "You asked to see the evidence. I am more than happy to provide it."
10024020-116 = "The ten-thousand-year ginseng is rare, even in Shanhaijing. Nobody can harvest it without our permission."
10024020-117 = "For a rare specialty such as this to be shipped outside of Shanhaijing without our express approval... Unthinkable."
10024020-118 = "Genryumon cannot let this go unpunished. The Black Tortoise Promenade must answer for it."
10024020-123 = "Listen—and I'm not trying to brag—but nothing happens in the Black Tortoise Promenade without my knowing of it."
10024020-124 = "And I have not heard a whisper of anyone doing anything with ten-thousand-year ginseng."
10024020-125 = "I swear to you, if anyone in the Promenade was doing anything illegal..."
10024020-126 = "...I'd round them up and turn them in myself."
10024020-130 = "Is that all you have to say for yourself? What a shame."
10024020-131 = "Genryumon has presented concrete evidence. In return, all you have provided are empty words."
10024020-132 = "[s3] \"To be fair, you're kind of putting them on the spot here.\"\n[s4] \"You have a point, but maybe you could give them some time?\""
10024020-141 = "Haven't we heard enough, Madam?"
10024020-142 = "Yeah! The Black Tortoise Promenade is already infamous for spitting on tradition with their cooking!"
10024020-143 = "There's no doubt they were using the ten-thousand-year ginseng in their dishes!"
10024020-144 = "They're a threat to our very way of life!"
10024020-145 = "They don't have values like we do. This is totally something they'd do!"
10024020-146 = "Get on your knees and beg for mercy, Black Tortoise Promenade!"
10024020-151 = "Hahaha... I won't deny that our approach to cooking can be...unconventional..."
10024020-152 = "But you can't find success without taking a few risks."
10024020-153 = "If you never go outside of the lines, you'll end up a dullard who can't think for herself. "
10024020-154 = "Enough. I will not brook needless mockery here."
10024020-155 = "We have made our accusation against the Black Tortoise Promenade. It is only fair that I hear their appeal."
10024020-157 = "You're being too forgiving, Madam! "
10024020-158 = "We know they did it! They smuggled the ten-thousand-year ginseng!"
10024020-160 = "Every student of Shanhaijing may speak freely here...so long as it does not harm our academy."
10024020-161 = "But the Black Tortoise Promenade is harming Shanhaijing right now!"
10024020-162 = "There is a difference between thoughtless mockery and actual harm."
10024020-167 = "We can't ignore the evidence against your organization, President Rumi. Know that we are watching you."
10024020-168 = "However, it does not make sense to ask you to prove your innocence without giving you time to build your case."
10024020-170 = "So, I will give the Black Tortoise Promenade a short grace period."
10024020-171 = "If you can find evidence to convince me of your innocence, I will reconsider the sanctions against you."
10024020-173 = "Keep one thing in mind. If the situation grows worse..."
10024020-174 = "Genryumon will not hesitate to terminate business for the Black Tortoise Promenade."
10024020-175 = "That is the will of Ryuuge Kisaki, President of Genryumon."
10024020-177 = "Not so fast, Madam! This isn't fair...!"
10024020-178 = "Enough, Reijo. No matter what we say, those ARE boxes from the Black Tortoise Promenade."
10024020-179 = "We both know the Promenade is innocent, so we'll simply have to prove it...by catching the real culprit. "
10024020-181 = "Would that work for you, Madam Kisaki?"
10024020-182 = "I have no objection, President Rumi.  "
10024020-187 = "[ns] \"Where should we start?\""
10024020-189 = "First thing's first. We need more information about ten-thousand-year ginseng..."
10024020-195 = "Stop right there, tortoise! "
10024020-196 = "Sensei, behind me!"
10024020-197 = "You've got another thing coming if you think we'll let you walk away!"
10024020-198 = "Madam Kisaki is too forgiving...!"
10024020-199 = "But there's no way I'm letting our top suspect just waltz on out of here!"
10024020-200 = "I'm placing you under arrest while we look for more solid evidence!"
10024020-201 = "That sounds like pretty shaky grounds for making an arrest."
10024020-202 = "I don't need any grounds to take care of criminals like you!"
10024020-204 = "Everyone, attack!"
10024020-212 = "Stay low, Sensei!"
10024020-213 = "Sensei, is it true that you're a tactical genius who always leads their students to victory?"
10024020-214 = "[s] \"Who keeps telling these stories about me...?\""
10024020-215 = "Hahaha! It's funny how the strangest rumors swirl around you when you're in a position of power..."
10024020-216 = "Rumors or not, I look forward to seeing what you can do, Sensei."

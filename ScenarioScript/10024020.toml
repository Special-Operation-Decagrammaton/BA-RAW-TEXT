10024020-70 = "3;키사키;02;이야기는 들었노라, 선생."
10024020-71 = "3;키사키;05;만나서 반갑다……고 해야 할 것 같군. 이런 식으로 첫 만남을 갖고 싶지는 않았지만.\n#3;em;[...]"
10024020-72 = "[s] \"어…… 키사키 쨩, 이라고 불러도 돼?\""
10024020-73 = "#na;현룡문 부원 A;무엄하다! 제아무리 샬레의 선생님이라고 해도!"
10024020-74 = "#na;현룡문 부원 B;지켜야 할 예의가 있고, 상황에 따른 법도가 있을 터!"
10024020-75 = "3;키사키;00;그만. 먼 길을 온 산해경의 손님이다. 우리가 먼저 소란을 벌여서야 되겠느냐.\n#3;em;[!]"
10024020-76 = "#na;현룡문 부원 A;네, 넷! 자중하겠습니다. 문주님!"
10024020-77 = "#na;현룡문 부원 B;용서하십시오! 저희가 분수를 몰랐습니다!"
10024020-78 = "3;키사키;03;내가 듣기로, 샬레의 선생은 성정이 자유분방하면서도 수완에 능해,\n#3;em;[반응]"
10024020-79 = "3;키사키;02;앞을 가로막는 것들은 근원부터 모조리 분쇄해 버리는…… 희대의 권모술수가라고 들었는데 말이다."
10024020-80 = "#st;[0,0];instant;1;"
10024020-81 = "#clearST"
10024020-82 = "#wait;1000"
10024020-83 = "[ns] \"어디서 그런 헛소문을 들은 거야?!\""
10024020-84 = "3;키사키;00;걱정 말거라. 선생. 내가 보아도 선생이 그런 부류처럼 보이지는 않으니."
10024020-85 = "3;키사키;03;오히려 너무 사람이 좋아서, 이용당하기 딱 좋은 성격처럼 보이기도 하는구나."
10024020-86 = "[s] \"놀리든 칭찬하든, 둘 중 하나만 해 주었으면 하는데……\""
10024020-87 = "3;키사키;07;또 혹시 모르지. 사람 속은 알 수 없는 법이니. \n#3;em;[...]"
10024020-88 = "3;키사키;03;선생이 그 안에 무엇을 숨기고 있을지 내심 기대가 되기도 하는구나."

[translation]
84312101304-6 = "ปกติฉันไม่ค่อยเจอคนที่เป็นมิตรแถมยังสนิทด้วยในทันทีแบบนั้น บอกตรงๆ ว่าตอนแรกฉันก็#nค่อนข้างตกใจอยู่น่ะ"
84312101304-7 = "หืม? ทำไมล่ะ? มันอร่อยออก ทั้งเย็น ทั้งสดชื่นเลย"
84312101304-8 = "นะ... นั่นสิเนอะ ฉันก็คิดแบบนั้นเหมือนกัน ถึงทุกคนจะไม่ได้คิดแบบนั้นก็เถอะ..."
84312101304-9 = "แต่ว่าที่นี่ก็มีคนที่ชอบรสชาติแบบนี้อยู่เยอะเลยนะ รสที่เหมือนยาสีฟัน... และกินแล้วตื่นเลยน่ะ"
84312101304-13 = "กินเพื่อให้ตื่น... งั้นสินะ"
84312101304-15 = "(คุยเรื่องอะไรกันอยู่นะ...)"

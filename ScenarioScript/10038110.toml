10038110-6 = "3;미나;00\n#3;a\n#wait;1500"
10038110-7 = "3;미나;02;이제 곧 월영제가 개최되겠군요. 정말 수고 많으셨습니다. 문주님.\n#3;em;[반응]"
10038110-8 = "3;키사키;08;음. 그대 역시 수고 많았다. 참으로……. 기억에 깊게 남을 만큼, 다사다난한 축제 준비였구나.\n#3;a"
10038110-9 = "5;미나;00;……그것을 통틀어 축제 준비라고 뭉뚱그려 말할 수 있는지는, 조금 다른 문제라고 생각되기도 하지만요.\n#5;al\n#3;m1"
10038110-10 = "5;미나;09;그렇지만 역시 문주님이십니다! 그만 한 혼란을 수습하시고, 이렇게 모든 것을 원래대로 되돌리시다니!\n#5;em;[///]\n#5;stiff"
10038110-11 = "5;미나;15;문주님께서 계시지 않았다면, 산해경은 아직도 혼돈과 폭풍 속에서 나아갈 길을 모르고 있었겠지요!\n#5;em;[반짝]\n#5;hophop"
10038110-12 = "3;키사키;02;할 일을 했을 뿐이다. 진정하거라."
10038110-13 = "3;키사키;00;……'소란'을 일으켰던 부원들에 대한 조치는, 어떻게 되었느냐?\n#3;em;[?]"
10038110-14 = "5;미나;13;네! 전원 재교육 대상으로 분류하여, 확실하게 밑바닥부터 봉사활동에 전념하도록 지시했습니다!\n#5;em;[반응]"
10038110-15 = "5;미나;14;……생각 같아서는 전부 퇴부 처리하고, 어디에도 소속되지 못하도록 처분시키고 싶은 참이었습니다만……!\n#5;stiff"
10038110-16 = "3;키사키;08;되었다. 그 아이들 역시 자기가 옳다고 믿은 일을 행했을 뿐이니."

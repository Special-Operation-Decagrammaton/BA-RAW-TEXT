[translation]
10038110-1 = "Epilogue; Let's Start the Festival!"
10038110-2 = "Thus, the Tyke Syndrome outbreak, which plunged Shanhaijing into chaos, came to an end."
10038110-7 = "The Moonlight Festival is finally here. You've done an amazing job, Madam President."
10038110-8 = "You've been amazing yourself. This year's Festival preparations have been...memorable, to say the least."
10038110-9 = "...I'm not sure all of it technically counts toward the Festival, but I'll take the compliment."
10038110-10 = "But you, you really are something, Madam President! You resolved all the chaos and restored everything back to the way it was!"
10038110-11 = "If it hadn't been for you, Shanhaijing might still be lost in chaos, with no way forward."
10038110-12 = "Oh, enough of that. I only did what was needed."
10038110-13 = "...Now, what have you done with those members who caused the \"disturbance\"?"
10038110-14 = "They're all signed up for re-education and community service, starting at the very bottom."
10038110-15 = "If it were up to me, I'd expel every one of them and make sure they can't affiliate anywhere else, but..."
10038110-16 = "No need. They did what they believed was right."
10038110-21 = "And now for the Festival. "
10038110-25 = "...Ah, Sensei. You made it. "
10038110-26 = "Which is not to imply you took too long. Anyway..."
10038110-27 = "Let me do what Rumi and Madam Kisaki asked, and... Huh?"
10038110-36 = "Oh, you're there, Sensei. Have you talked to Reijo yet?"
10038110-37 = "Ah, I see. Yes, Genryumon usually handles this sort of business. Either Executive Officer Mina or the head of Public Relations would normally be there, but..."
10038110-38 = "As you know, we're all so busy with the Moonlight Festival."
10038110-39 = "I thought about guiding you personally, but..."
10038110-40 = "Never mind, I misspoke. Forget I said that. "
10038110-41 = "Reijo, on behalf of Shanhaijing, please take good care of Sensei."
10038110-46 = "And we may call at any moment, so stay alert."
10038110-52 = "*sigh*"
10038110-56 = "All right, let's go, Sensei. The Festival awaits."
10038110-59 = "I was worried we wouldn't be able to do this at all this year. It's great to see everything back to normal."
10038110-60 = "And, from the look of things, even Genryumon won't bother us much."
10038110-61 = "...Honestly, even if they wanted to, they don't have the manpower right now."
10038110-70 = "You're wearing your uniform AT the festival?"
10038110-71 = "It was recommended! ...Basically ordered. There's going to be a lot of visitors from other schools this year."
10038110-72 = "They said, \"You can go, but go in uniform, and be ready for anything.\""
10038110-73 = "Heehee, I bet you almost wish something WOULD happen, then."
10038110-77 = "No, not at all. Absolutely not. Especially not this year. After everything that's ALREADY happened, we all deserve a break."
10038110-78 = "Yeah, that's fair. Although it was really funny when you got turned into a kid."
10038110-79 = "Hilarious. It happened to you too, remember..."
10038110-82 = "Apparently, they took a lot of pictures from the Tyke Syndrome incident."
10038110-83 = "Mainly for friends to tease each other with, from the look of things now."
10038110-87 = "Hm? You're asking if I have a picture of little Rumi?"
10038110-88 = "Wh-Who do you think I am, Sensei? I'm the one who's cracking down on those pictures!"
10038110-92 = "...Although Rumi did hang one picture at the Promenade main gate, as a memento, so maybe I can't stop it..."
10038110-98 = "Oh, the Peking Opera's starting."
10038110-111 = "A lot of students are happy about the Peking Opera Club being back in time for the Festival."
10038110-112 = "...It's probably best if that whole business with Kaguya gets swept under the rug."
10038110-113 = "At least until the end of the Festival. President Kisaki wants everything stable throughout."
10038110-114 = "And that keeps the market stable, so from a business perspective, that's fine by me. ...Hm?"
10038110-121 = "Are you enjoying the festival, Sensei? The outdoor Peking Opera performance should be starting right about now."
10038110-122 = "Oh? You want to know why I called?"
10038110-123 = "...I've always been under the impression one doesn't need a specific reason to call someone."
10038110-124 = "I'm sure you understand that, Sensei."
10038110-125 = "That said, how would you say it's going out there? With Shanhaijing being open to the rest of Kivotos and all."
10038110-130 = "Ah, so our students and theirs are mingling well, getting to know each other?"
10038110-131 = "And you can see the hard work Genryumon members have all been doing?"
10038110-132 = "......"
10038110-133 = "Well, then Genryumon is serving its purpose. I appreciate your feedback, Sensei."
10038110-134 = "Very well, please continue to enjoy the festival."
10038110-139 = "......"
10038110-140 = "She could have just said she wanted to talk..."
10038110-144 = "...Never mind. Let's keep going."
10038110-176 = "Well, this has all worked out very well for the Promenade."
10038110-177 = "I wouldn't have expected Genryumon to make a decision that actually helped us."
10038110-178 = "Although there is a caveat... More customers mean bigger crowds, which mean more crowd control."
10038110-182 = "I know Gehenna and Trinity students don't get along, but this is the first time I've seen them face off in person."
10038110-183 = "Oh, and over there, too..."
10038110-202 = "Hmm. Good thing Mina was there to take care of that."
10038110-203 = "You know, I think us being here might exacerbate the issue. Let's go somewhere else."
10038110-206 = "So what do you think of the Peach Blossom Spring?"
10038110-207 = "It looks like the outside students are split on whether they find it relaxing, or whether they just don't like tea."
10038110-217 = "Heehee, the staff looks confused. They must be wondering..."
10038110-218 = "...\"Why would anyone buy tea at 100 yen a gram and then put milk in it?\""
10038110-219 = "Speaking as part of the Black Tortoise Promenade, I believe it all comes down to personal taste..."
10038110-220 = "...and as long as they aren't hurting others, we should all respect each other."
10038110-221 = "Still, 100 yen a gram for milk tea..."
10038110-222 = "...I shouldn't say any more."
10038110-227 = "(Seriously, it's like sharpening a knife with a bar of gold...)"
10038110-228 = "Still, even that's good for the Promenade, just in terms of raw numbers."
10038110-231 = "The Peach Blossom Spring has a demand for dairy products now."
10038110-232 = "And bringing in supplies to meet demand is what the Promenade does best."
10038110-235 = "Of course, Genryumon is full of tea fanatics, who won't tolerate the sacrilege."
10038110-236 = "I imagine they won't be too happy with us."
10038110-237 = "But they didn't like us in the first place, so what difference does it make?"
10038110-241 = "Oh? You think we should still try to get along? I...would LIKE that if it were possible, but..."
10038110-246 = "Ah, the fireworks. Let's get a window seat, Sensei."
10038110-254 = "There we go. NOW it's a proper Moonlight Festival."
10038110-255 = "...A special one, with you here, Sensei."
10038110-261 = "What— She's calling again?!"
10038110-267 = "Ah, you must be at the Peach Blossom Spring, Sensei."
10038110-268 = "Are you enjoying the Festival? It must be quite an atmosphere, with all the students from other schools."
10038110-269 = "Yes... I'm glad you feel that way."
10038110-270 = "Sensei, do you...know the story behind the Moonlight Festival? The story of the sage?"
10038110-271 = "Oh, well, if you know the story, I can cut to the chase."
10038110-274 = "As you're aware, the sage of the story left for the moon, returned, and then after many trials...went back to the moon again."
10038110-275 = "In Shanhaijing, sages are considered inscrutable, their true nature unknowable."
10038110-276 = "Some are good, others are evil. Some are even demonic."
10038110-279 = "And...we may never know which one came to visit us."
10038110-280 = "Some assume that any sage must be evil."
10038110-281 = "Certainly no one invites them in."
10038110-282 = "I think the takeaway is not to get scared in advance, Madam."
10038110-283 = "We already have our plates full just focusing on the here and now."
10038110-284 = "If we worry about things that haven't even happened yet, we're not going to be able to do anything."
10038110-289 = "Fufu, well said."
10038110-290 = "Besides, when you're in business, you know it's all about dealing with unpredictable customers."
10038110-291 = "Also true, but..."
10038110-292 = "Hey, Sensei, let's go back out there. The Festival's just getting started."
10038110-293 = "What do you mean, you thought it was over? It's a three-day event! This is Day One!"
10038110-294 = "You're in for some real Shanhaijing hospitality!"
10038110-299 = "Come on, Sensei. This way!"
10038110-328 = "The Senses Descend"

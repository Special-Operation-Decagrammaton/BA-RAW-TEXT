[translation]
10038110-1 = "尾聲;開始慶典吧！"
10038110-2 = "（就這樣，讓山海經陷入混亂的還童症事件落下了帷幕……）"
10038110-7 = "月影祭即將開始。#n真是辛苦您了，門主大人。"
10038110-8 = "汝也辛苦了。#n此次的慶典籌備……真是令人難忘而峰迴路轉啊。"
10038110-9 = "能否將這一切稱之為慶典籌備，感覺似乎仍有待商榷……"
10038110-10 = "不過話說回來，真不愧是門主大人！#n居然能平息這麼大的混亂，讓一切恢復原狀！"
10038110-11 = "如果沒有門主大人，現在山海經恐怕還處在混亂和風暴之中呢！"
10038110-12 = "妾身不過是做了該做的事。汝先冷靜點。"
10038110-13 = "……那些引發「騷亂」的成員處置得如何？"
10038110-14 = "是！他們已全數被列為再教育對象，同時我也指示他們從基層開始專注於社會服務！"
10038110-15 = "雖然我其實恨不得將他們全部開除，讓他們無處可去就是了……！"
10038110-16 = "這樣已經夠了。#n他們不過是做了自己認為正確的事而已。"
10038110-21 = "那麼，是時候迎接慶典了。"
10038110-25 = "啊，老師。歡迎您的光臨。"
10038110-26 = "沒有，我也才剛到而已。#n那麼接下來……"
10038110-27 = "就依照瑠美會長和妃姬門主大人的指示……咦？"
10038110-36 = "汝到了嗎，老師？已經與令女碰面了？"
10038110-37 = "這樣啊。原本此類事宜應由玄龍門……由執行部長美奈或宣傳部長負責才是。"
10038110-38 = "然正如老師所知，他們兩位在此次月影祭已是分身乏術。"
10038110-39 = "雖說妾身也曾考慮親自帶老師參觀……"
10038110-40 = "不，方才是妾身失言了。請忘了吧。"
10038110-41 = "那麼，令女。#n就勞煩汝代表山海經照顧老師了。"
10038110-46 = "呵呵，妾身隨時都可能聯絡，最好保持警惕哦。"
10038110-52 = "……唉。"
10038110-56 = "那麼我們走吧，老師。#n我來帶您參觀月影祭。"
10038110-59 = "曾經還一度不知道事情會如何發展，所幸一切最終還是恢復了原狀。"
10038110-60 = "在這次月影祭中，玄龍門應該不會過度干涉我們玄武商會才對。"
10038110-61 = "……畢竟他們似乎也沒餘力這麼做了。"
10038110-70 = "連慶典當天都穿著玄龍門的制服，還真像你的作風。"
10038110-71 = "這可是建議事項耶？幾乎能說是半強迫執行了吧。#n而且今年來自其他學園的人又特別多……"
10038110-72 = "玄龍門的成員雖然可以自由參加，但還是要穿著制服以防萬一……"
10038110-73 = "那是不是該發生點什麼事比較好啊？"
10038110-77 = "不不不，拜託千萬不要。我只想安靜地過活。#n尤其今年的月影祭……從各方面來說都已經發生夠多事了……"
10038110-78 = "啊，對耶。你變成小孩的模樣真的很搞笑。"
10038110-79 = "你也沒好到哪去吧……"
10038110-82 = "最近好像到處流傳著山海經的學生變成小孩的照片。"
10038110-83 = "……雖然大部分都是朋友之間拿來互相取笑就是了。"
10038110-87 = "咦？問我有沒有會長變成小孩的照片？"
10038110-88 = "您，您把我當成什麼人了，老師！#n負責管理那些照片才是我的職責！"
10038110-92 = "雖然會長本人表示要把照片掛在商會正門作為紀念，所以似乎沒有太大的意義……"
10038110-98 = "啊，那邊的京劇表演好像開始了。"
10038110-111 = "學生們都為京劇部能及時回歸感到慶幸。"
10038110-112 = "……京劇部和輝夜的事，還是對外保密比較妥當。"
10038110-113 = "至少在這次的月影祭……#n妃姬門主大人決定向所有人開放山海經的這段期間，山海經還是保持穩定比較好。"
10038110-114 = "從生意人的立場來看，市場不穩定也是最危險的因素。#n咦……？"
10038110-121 = "慶典還有趣嗎，老師？#n街上洽好在進行京劇表演呢。"
10038110-122 = "嗯？問妾身打電話來有何事？"
10038110-123 = "……即便沒有要事，通話應該也能隨時進行才是？"
10038110-124 = "對吧？老師果然也明白。"
10038110-125 = "況且，就為向奇普托斯宣傳山海經而開放所有區域一事，#n妾身也想聽聽老師的意見和想法哦？"
10038110-130 = "這樣啊。對山海經與來訪的學生而言，是段能拉近彼此距離的新鮮時間……"
10038110-131 = "嗯？舉目可見玄龍門成員的辛勞……？"
10038110-132 = "……"
10038110-133 = "那本就是玄龍門存在的目的。#n不過還是感謝老師的關心。"
10038110-134 = "那麼，請繼續享受慶典吧。"
10038110-139 = "……"
10038110-140 = "門主大人也真是的，想講電話直接說就好了嘛……"
10038110-144 = "沒什麼，我們繼續走吧。"
10038110-176 = "整體而言，玄龍門開放山海經的決定，對我們玄武商會是件好事。"
10038110-177 = "……玄龍門竟然會做出對我們商會有利的決定，以前就連想都沒想過。"
10038110-178 = "雖然商會的收入得以大幅增加，#n不過管理範圍也呈指數級增長，導致調度人力有點困難……"
10038110-182 = "尤其我還是第一次親眼見到格黑娜與三一學生之間的明爭暗鬥呢。"
10038110-183 = "啊，那邊正好……"
10038110-202 = "玄龍門……美奈執行部長碰巧正在巡邏，真是萬幸。"
10038110-203 = "唔嗯，總覺得我們待在這裡會引起更多騷動，還是悄悄換個地方吧。"
10038110-206 = "這麼說來，老師應該已經很熟悉桃源鄉了吧？"
10038110-207 = "外部學生對這裡的意見，大致可以分為覺得很新鮮，以及對茶不太了解兩種……"
10038110-217 = "實際上，桃源鄉方面似乎有點困擾。#n至於困擾的原因……"
10038110-218 = "……似乎是對「為何會有學生想把牛奶倒入100g要價萬元的茶中」感到難以理解。"
10038110-219 = "作為玄武商會的一員，我認為每個人都有自己的喜好。"
10038110-220 = "在不造成彼此困擾的前提下，應該互相尊重各自的想法才對。"
10038110-221 = "不過100g就要價萬元的奶茶啊……怎麼說呢……"
10038110-222 = "……還是謹慎一點好了。"
10038110-227 = "這跟用金子磨刀有什麼區別……"
10038110-228 = "不過……從結果來看，這對我們玄武商會來說並不是壞事。"
10038110-231 = "桃源鄉因此開始對乳製品有需求。"
10038110-232 = "而為有需求的地方開闢通路就是我們商會的工作。"
10038110-235 = "只不過……跟其他社團相比，玄龍門之中嗜茶成痴的學生特別多。"
10038110-236 = "所以這次的事件，好像讓玄龍門對我們商會的印象更差了。"
10038110-237 = "反正我們本來就被討厭了，再多討厭一點其實也無所謂吧！"
10038110-241 = "您希望我們能和睦相處？#n這……可以的話，我們也希望能夠如此……"
10038110-246 = "啊，開始放煙火了。#n去窗邊看看吧，老師。"
10038110-254 = "看見煙火之後，才讓人確實感受到了月影祭的氛圍呢。"
10038110-255 = "能和老師一起看月影祭的煙火……也是個很特別的經歷。"
10038110-261 = "咦？怎麼又打來了……"
10038110-267 = "啊，現在在桃源鄉嗎，老師？"
10038110-268 = "對月影祭還滿意嗎？#n看到外校學生出現在山海經感覺很新鮮？"
10038110-269 = "呼呣……這樣啊。#n若能讓老師有如此感受，那就再好不過了。"
10038110-270 = "老師是否知道呢？#n關於山海經的……月影祭與仙人的故事。"
10038110-271 = "是嗎。老師既已有所耳聞，說明起來也容易許多。"
10038110-274 = "傳說已去向月亮的仙人曾重返此地，並在經歷許多事情後又返回了月亮。"
10038110-275 = "在山海經，仙人被視為難以捉摸的存在。"
10038110-276 = "善良的仙人固然有，但被稱作「惡仙」與「妖仙」的仙人似乎也同樣存在。"
10038110-279 = "而吾等……恐怕永遠無法得知來訪的仙人究竟屬於何者。"
10038110-280 = "或許正是因為如此，人們才會盲目地將仙人視作「惡仙」或「妖仙」──"
10038110-281 = "進而導致最終沒有人願意接納他們吧。"
10038110-282 = "到頭來，最重要的應該是不要自己嚇自己吧，門主大人。"
10038110-283 = "明明光是專注於當下發生的事就已經很不容易了……"
10038110-284 = "如果連沒發生的事都要提心吊膽，那就真的什麼都沒辦法做了。"
10038110-289 = "呵呵。若汝能這麼想，妾身也就放心了。"
10038110-290 = "畢竟所謂的商業，總是需要接觸未知的客人啊。"
10038110-291 = "是啊……確實如此。"
10038110-292 = "那麼我們出發吧，老師。#n月影祭才剛剛開始哦。"
10038110-293 = "不是已經要結束了？老師怎麼這麼說呢。#n月影祭可是為期三天的節日，今天只是其中的第一天而已。"
10038110-294 = "呵呵。山海經的款待可不僅止於此哦？"
10038110-299 = "來，老師。這邊請。"
10038110-328 = "五塵降臨"

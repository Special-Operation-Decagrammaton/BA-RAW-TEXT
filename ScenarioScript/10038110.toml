10038110-36 = "3;통신키사키;02;도착하였는가, 선생? 레이죠와는 만난 것이고?"
10038110-37 = "3;통신키사키;99;음. 그렇구나. 본디 이런 일은 우리 현룡문에서…… 아마도 집행부장인 미나나, 홍보부장에게 맡겨야 할 일이겠지만."
10038110-38 = "3;통신키사키;00;선생도 알다시피, 그 둘은 이번 월영제에서 여러모로 할 일이 많은 탓에 말이다."
10038110-39 = "3;통신키사키;02;내가 직접 선생을 안내하는 방안은 어떨까, 생각도 해 보았으나……."
10038110-40 = "3;통신키사키;99;아니다. 지금은 실언이었겠구나. 잊어 다오. \n#3;em;[한숨]"

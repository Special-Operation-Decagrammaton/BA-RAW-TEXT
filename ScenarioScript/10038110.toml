[translation]
10038110-1 = "บทส่งท้าย;มาเริ่มงานเทศกาลกันเถอะ!"
10038110-2 = "(และแล้วสถานการณ์ของโรคเด็กลงที่ทำให้ซานไห่จิงตกอยู่ในความสับสนอลหม่านก็ได้สิ้นสุดลง...)"
10038110-7 = "เราใกล้จะเปิดเทศกาลเงาจันทร์กันแล้วสินะคะ ท่านประมุขต้องเหนื่อยไม่น้อยเลยนะคะ"
10038110-8 = "อืม เธอเองก็ทำงานหนักมาเหมือนกัน นี่ช่างเป็น... การเตรียมงานเทศกาลที่น่าจดจำอย่างยิ่งเลยนะ"
10038110-9 = "จะเหมารวมว่าทั้งหมดเป็นการเตรียมงานเทศกาลก็คงไม่ได้หรอกค่ะ..."
10038110-10 = "แต่ก็สมกับที่เป็นท่านประมุขจริงๆ ค่ะ! ท่านจัดการเรื่องวุ่นวายขนาดนั้น และทำให้ทุกอย่างกลับมาเป็น#nเหมือนเดิมได้ยังไงล่ะคะ!"
10038110-11 = "ถ้าไม่มีท่านประมุขละก็ ซานไห่จิงก็อาจจะยังตกอยู่ในมรสุมและความวุ่นวายไม่จบไม่สิ้นก็ได้ค่ะ!"
10038110-12 = "ไม่ต้องพูดถึงขนาดนั้นหรอก เราแค่ทำในสิ่งที่ต้องทำน่ะ"
10038110-13 = "แล้วเธอมีมาตรการจัดการกับสมาชิกที่ 'ก่อความวุ่นวาย' อย่างไรบ้าง...?"
10038110-14 = "ค่ะ! ฉันจะให้สมาชิกของเราทุกคนเข้ารับการอบรมอีกครั้ง ให้ทุกคนอุทิศตัวกับการทำงานจิตอาสาค่ะ!"
10038110-15 = "ถ้าเป็นไปได้ฉันก็อยากจะไล่พวกนั้นออกให้หมด แล้วลงโทษไม่ให้ไปสังกัดชมรมไหนได้อีกเลยค่ะ...!"
10038110-16 = "ไม่ต้องหรอก เด็กพวกนั้นก็แค่ทำในสิ่งที่ตัวเองคิดว่าถูกต้องน่ะ"
10038110-21 = "จากนี้ก็คงถึงเวลาของงานเทศกาลจริงๆ แล้วสินะ "
10038110-25 = "อ๊ะ คุณครู เชิญค่ะ "
10038110-26 = "ไม่ค่ะ ฉันไม่ได้รอนานขนาดนั้นค่ะ ถ้าอย่างนั้น..."
10038110-27 = "ฉันจะไปทำตามคำสั่งของท่านประธานรูมิกับท่านประมุขคิซากิ... เอ๋?"
10038110-36 = "มาถึงแล้วหรือครู? ได้เจอเรย์โจวแล้วหรือไม่?"
10038110-37 = "อืม เป็นเช่นนั้นสินะ เดิมทีแล้วเรื่องแบบนี้มังกรดำจะมอบหมายให้... หัวหน้าคณะกรรมการมินะ หรือไม่ก็หัวหน้าฝ่ายประชาสัมพันธ์เป็นคนจัดการ"
10038110-38 = "แต่ก็อย่างที่ครูรู้ว่าสองคนนั้นมีเรื่องให้ทำมากมายในเทศกาลเงาจันทร์"
10038110-39 = "เราก็เลยคิดว่า หรือครั้งนี้เราจะแนะนำเทศกาลกับครูด้วยตัวเองดี..."
10038110-40 = "ไม่หรอก เราพูดผิดไปน่ะ ลืมไปเถอะนะ "
10038110-41 = "เอาละ เรย์โจว ช่วยเป็นตัวแทนของซานไห่จิงในการดูแลครูด้วยนะ"
10038110-46 = "ฮุฮุ แล้วเราจะติดต่อเข้ามาใหม่ อย่าเที่ยวเพลินจนลืมรับโทรศัพท์เล่า"
10038110-52 = "เฮ้อ..."
10038110-56 = "งั้นก็ไปกันเถอะค่ะ คุณครู ฉันจะแนะนำเทศกาลเงาจันทร์ให้เองค่ะ"
10038110-59 = "ตอนนั้นฉันละกลุ้มว่าเราจะเป็นยังไงกัน แต่ก็โล่งอกไปทีนะคะที่ทุกอย่างกลับมาเป็นปกติได้"
10038110-60 = "สำหรับเทศกาลเงาจันทร์ในปีนี้ ดูเหมือนว่าทางมังกรดำก็จะไม่เข้ามาแทรกแซงย่านการค้าเทพเต่าดำ#nจนเกินความจำเป็นค่ะ"
10038110-61 = "เหนือสิ่งอื่นใด... ฉันว่านั่นเป็นเพราะพวกเธอไม่ว่างพอที่จะทำอย่างนั้นค่ะ"
10038110-70 = "วันงานเทศกาลทั้งที แต่ยังใส่เครื่องแบบมังกรดำอยู่อีกเหรอ? เธอนี่ก็นะ"
10038110-71 = "มันเป็นคำสั่งต่างหากล่ะ ปีนี้มีนักเรียนจากโรงเรียนอื่นมาเข้าร่วมงานเยอะเลยนะ"
10038110-72 = "สมาชิกมังกรดำได้รับอนุญาตให้เข้าร่วมงานเทศกาลได้อย่างอิสระ แต่ต้องแต่งเครื่องแบบของมังกรดำ เพื่อเป็นการเตรียมพร้อมในกรณีฉุกเฉินน่ะ..."
10038110-73 = "งั้นก็ควรเกิดเรื่องอะไรขึ้นสักหน่อย ให้สมกับที่แต่งตัวมาแล้วสิเนอะ?"
10038110-77 = "ไม่ใช่สักหน่อย ฉันไม่ได้อยากทำงานในวันเทศกาลหรอกนะ ขอฉันอยู่เงียบๆ บ้างเถอะ ก่อนหน้างาน#nเทศกาลเงาจันทร์ปีนี้... ก็เกิดเรื่องขึ้นตั้งมากมายเลยนี่นา..."
10038110-78 = "อ้อ จริงสิ ตอนที่เธอเด็กลงน่ะ ตลกมากเลยนะ"
10038110-79 = "แหม เธอก็เหมือนกันนั่นละ..."
10038110-82 = "เหมือนว่ารูปถ่ายของนักเรียนซานไห่จิงที่เด็กลงจะถูกเผยแพร่ไปทั่วเลยค่ะ"
10038110-83 = "ถึงแม้ส่วนใหญ่จะเป็นแค่การแกล้งเพื่อนๆ ก็เถอะค่ะ"
10038110-87 = "คะ? ฉันมีรูปท่านประธานตอนอยู่ในร่างเด็กหรือเปล่าน่ะเหรอคะ?"
10038110-88 = "คุณครูนี่ก็! หะ... เห็นฉันเป็นคนยังไงคะ? ฉันเป็นฝ่ายตามเก็บรูปพวกนั้นมากกว่าค่ะ!"
10038110-92 = "จริงๆ ท่านประธานก็สั่งให้แขวนรูปไว้ที่ทางเข้าหลักของย่านการค้าเพื่อเป็นที่ระลึก เพราะงั้นการตาม#nเก็บรูปจึงไม่ค่อยมีความหมายเท่าไรค่ะ..."
10038110-98 = "อ๊ะ เหมือนว่าการแสดงงิ้วทางโน้นจะเริ่มแล้วนะคะ"
10038110-111 = "นักเรียนของเราต่างบอกว่าดีใจที่ชมรมการแสดงงิ้วสามารถกลับมาได้ทันเวลาค่ะ"
10038110-112 = "เพราะคงจะดีกว่าถ้าไม่ให้ทุกคนรู้ว่าเกิดเรื่องอะไรกับชมรมการแสดงงิ้วและคางุยะน่ะค่ะ"
10038110-113 = "นั่นเพราะเทศกาลเงาจันทร์ปีนี้... ท่านประมุขคิซากิตัดสินใจเปิดซานไห่จิงต้อนรับทุกคน ก็เลยเป็นการ#nดีกว่าถ้าซานไห่จิงจะคงเสถียรภาพและความมั่นคงไว้ค่ะ"
10038110-114 = "เพราะจากมุมมองของคนทำธุรกิจแล้ว ไม่มีองค์ประกอบใดที่เป็นอันตรายมากไปกว่าความไม่มั่นคง#nของตลาดหรอกค่ะ เอ๋...?"
10038110-121 = "สนุกกับงานเทศกาลอยู่หรือเปล่า ครู? ตอนนี้มีการแสดงงิ้วอยู่พอดีเลยนะ"
10038110-122 = "หืม? เราโทรมาด้วยเรื่องใดน่ะหรือ?"
10038110-123 = "โดยปกติแล้ว... ต่อให้ไม่มีเรื่องอะไรเป็นพิเศษ เราก็โทรหาคนอื่นเท่าไรก็ได้ไม่ใช่หรือ?"
10038110-124 = "หรือว่าครูคิดต่างไปจากเรา?"
10038110-125 = "เอาเถอะ ที่เราโทรมาก็เพราะอยากถามความคิดเห็นของครูต่อการที่เราเปิดทุกส่วนของซานไห่จิงให้#nเป็นที่รู้จักในคิโวทอสน่ะ"
10038110-130 = "เช่นนั้นหรือ? นักเรียนซานไห่จิงกับนักเรียนที่มาเที่ยวงานเทศกาลได้ทำความรู้จักและเข้าหากันอย่าง#nชื่นมื่นอย่างนั้นหรือ..."
10038110-131 = "หืม? แล้วยังเห็นความทุ่มเทของสมาชิกมังกรดำด้วย...?"
10038110-132 = "..."
10038110-133 = "นั่นคือหน้าที่ของมังกรดำอยู่แล้วละ แต่เราก็อยากจะขอบคุณสำหรับคำชมเชยจากครูนะ"
10038110-134 = "เช่นนั้นก็ไปสนุกกับงานเทศกาลต่อเถอะ"
10038110-139 = "..."
10038110-140 = "ท่านประมุขละก็นะ แค่บอกตรงๆ ว่าอยากโทรหาก็ได้นี่นา..."
10038110-144 = "ไม่มีอะไรหรอก เราไปกันต่อเถอะค่ะ"
10038110-176 = "การตัดสินใจเปิดซานไห่จิงของมังกรดำถือเป็นการดีต่อย่านการค้าเทพเต่าดำค่ะ"
10038110-177 = "ฉันไม่คิดมาก่อนเลยค่ะว่ามังกรดำจะตัดสินใจในเรื่องที่ส่งผลดีกับย่านการค้าด้วย"
10038110-178 = "แม้ว่ารายได้ของย่านการค้าจะเพิ่มขึ้นมาก แต่เรื่องที่ต้องจัดการก็เพิ่มขึ้นอย่างทวีคูณด้วย เราก็เลยกำลังมีปัญหาเรื่องการจัดการคนค่ะ..."
10038110-182 = "โดยเฉพาะสงครามประสาทระหว่างนักเรียนโรงเรียนเกเฮนน่ากับนักเรียนโรงเรียนทรีนิตี้ ของแบบนี้ฉันเพิ่งเคยเห็นเป็นครั้งแรกเลยค่ะ"
10038110-183 = "อ๊ะ ตรงนั้นก็..."
10038110-202 = "หัวหน้าคณะกรรมการมินะกำลังลาดตระเวนอยู่พอดีสินะคะ... โล่งอกไปทีค่ะ"
10038110-203 = "อืม ถ้าคนอื่นเห็นว่าพวกเราอยู่ด้วยกันอย่างนี้ ฉันว่าต้องเกิดเรื่องโกลาหลกว่าเดิมแน่ๆ เราไปที่อื่นที่เงียบสงบกว่านี้กันเถอะค่ะ"
10038110-206 = "จะว่าไป คุณครูคุ้นเคยกับร้านนิทานดอกท้อแล้วใช่มั้ยคะ?"
10038110-207 = "ดูเหมือนว่าความคิดเห็นของนักเรียนภายนอกจะแตกเป็น 2 เสียงนะคะ มีทั้งที่บอกว่าเป็นร้านที่มาแล้ว#nรู้สึกสดชื่น แต่ก็มีที่บอกว่าชาไม่ค่อยถูกปากด้วย"
10038110-217 = "ทางร้านนิทานดอกท้อก็ดูงงๆ กับลูกค้าจากภายนอกเหมือนกันค่ะ เพราะว่ามีบางคนที่..."
10038110-218 = "จะดื่มชาราคาขีดละหมื่นเยน แล้วจะผสมนมเข้าไปด้วย ทางร้านบอกว่าไม่เข้าใจลูกค้าพวกนี้น่ะค่ะ"
10038110-219 = "ในฐานะที่เป็นนักเรียนในสังกัดย่านการค้าเทพเต่าดำ ฉันคิดว่าแต่ละคนก็มีรสนิยมที่แตกต่างออกไปค่ะ"
10038110-220 = "ฉันคิดว่าเราต้องเคารพความชอบของอีกฝ่าย ตราบใดที่ความชอบหรือรสนิยมนั้นไม่สร้างความเดือด#nร้อนให้คนอื่นนะคะ"
10038110-221 = "ส่วนเรื่อง... ชาราคาขีดละหมื่นเยนที่ใส่นมลงไปด้วย... ฉันว่า..."
10038110-222 = "ฉันขอไม่พูดเยอะดีกว่าค่ะ..."
10038110-227 = "แต่นั่นไม่ต่างจากการเอาทองคำไปลับมีดเลยนะคะ..."
10038110-228 = "แต่ก็เอาเถอะค่ะ... ถ้าดูจากแค่ผลลัพธ์ นี่ก็ไม่ใช่เรื่องไม่ดีสำหรับย่านการค้าเทพเต่าดำหรอกค่ะ"
10038110-231 = "เหตุการณ์นั้นทำให้เริ่มมีการขายผลิตภัณฑ์จากนมในร้านนิทานดอกท้อตามความต้องการของลูกค้า"
10038110-232 = "มันเป็นงานของย่านการค้าของเราอยู่แล้วน่ะค่ะที่ต้องขายสินค้าตามความต้องการของตลาด"
10038110-235 = "ค่ะ... เมื่อเทียบกับชมรมอื่นแล้ว ในมังกรดำมีนักเรียนหลายคนที่ชื่นชอบการดื่มชาเป็นพิเศษค่ะ"
10038110-236 = "เหตุการณ์นี้อาจทำให้มังกรดำมองย่านการค้าของเราในแง่ที่ไม่ดีก็ได้ค่ะ"
10038110-237 = "แต่ถึงยังไงเราก็เป็นคู่ปรับกันตั้งแต่แรกอยู่แล้วค่ะ ต่อให้มีเรื่องให้โกรธเกลียดเพิ่มขึ้นมาอีกเรื่อง ก็คงไม่เป็นอะไรหรอกค่ะ!"
10038110-241 = "แต่ยังไงก็อยากให้อยู่ด้วยกันฉันท์มิตรงั้นเหรอคะ? ฉันเอง... รวมถึงคนอื่นๆ ในย่านการค้า... ก็อยากให้เป็นแบบนั้นค่ะ ถ้าเป็นไปได้น่ะนะคะ..."
10038110-246 = "อ๊ะ เหมือนว่าการเล่นดอกไม้ไฟจะเริ่มขึ้นแล้วนะคะ ไปตรงหน้าต่างกันเถอะค่ะ คุณครู"
10038110-254 = "พอมีการเล่นดอกไม้ไฟ ก็ให้ความรู้สึกว่านี่เป็นเทศกาลเงาจันทร์จริงๆ เลยนะคะ"
10038110-255 = "ฉันได้ดูดอกไม้ไฟในเทศกาลเงาจันทร์กับคุณครูแบบนี้... นี่ก็เป็นเรื่องที่พิเศษดีนะคะ"
10038110-261 = "เอ๋? โทรมาอีกแล้ว..."
10038110-267 = "อ่า ท่าทางจะอยู่ที่ร้านนิทานดอกท้อกันสินะ ครู..."
10038110-268 = "สนุกกับเทศกาลเงาจันทร์อยู่หรือเปล่า? รู้สึกแปลกใหม่ที่ได้เห็นนักเรียนจากโรงเรียนอื่นในซานไห่จิง#nอย่างนั้นหรือ?"
10038110-269 = "อืม... เป็นเช่นนั้นสินะ เรารู้สึกโล่งอกที่ครูคิดเช่นนั้น"
10038110-270 = "ครูเองก็รู้งั้นเหรอ? เรื่องเกี่ยวกับเทศกาลเงาจันทร์กับเทพเจ้า... ซานไห่จิงน่ะ"
10038110-271 = "อืม หากเคยได้ยินมาแล้ว เราก็คงไม่ต้องอธิบายให้มากความสินะ"

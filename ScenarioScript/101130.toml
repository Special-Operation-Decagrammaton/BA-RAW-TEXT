[translation]
101130-1 = "ตอนที่ 13;ปฏิบัติการยึดคืนชาเล่ต์ 1"
101130-3 = "คุณครูหนีออกมาจากฐานของ PMC ได้อย่างปลอดภัยและมาซ่อนตัวอยู่ในโคะอุซางิ การ์เด้น"
101130-4 = "...... อย่างนั้นเองเหรอคะ คุณครูเองก็โดนลากเข้าไปพัวพันในแผนการร้ายนั่นจนถูกลักพาตัวนี่เอง "
101130-5 = "ถ้าไม่ได้หัวหน้ากรมฯ คันนะ ป่านนี้คงเกิดเรื่องใหญ่ไปแล้วนะคะคุณครู"
101130-6 = "หมาบ้าตัวนั้นยอมเสียสละตัวเองไปช่วยครูเลยเหรอเนี่ย... ไม่อยากจะเชื่อเลย"
101130-7 = "แถมยังต้องเจ็บตัวขนาดนั้นอีก..."
101130-8 = "เราก็พาไปนอนพักในเต็นท์แล้วนี่นา พอได้พักผ่อนเยอะๆ เดี๋ยวก็มีแรงลุกมาเองแหละ เธอเป็นถึงหัวหน้ากรมของวัลคิรี่ แค่นี้ไม่สะทกสะท้านอะไรหรอก"
101130-9 = "ก่อนอื่นตอนนี้เราต้องรวบรวมข้อมูลทั้งสองฝ่าย แล้วทำความเข้าใจกับสถานการณ์กันก่อนแล้วละค่ะ"
101130-10 = "เราต้องจัดระเบียบให้ได้ก่อนว่าตอนนี้มีเรื่องอะไรเกิดขึ้นบ้าง และพวกเราต้องทำอะไรบ้างค่ะ"
101130-12 = "ตอนนี้ D.U. อยู่ภายใต้กฎอัยการศึก การสื่อสาร การขนส่ง และการคมนาคมทั้งหมดก็เลยถูกระงับ ส่วนระบบบริหารก็ถูกชัตดาวน์ไปหมดค่ะ"
101130-13 = "พอ D.U. ถูกปิดกั้นการติดต่อสื่อสารภายนอกไปทั้งหมด... เราก็เลยขอความช่วยเหลือจากโรงเรียนใน#nเขตปกครองตนเองอื่นไม่ได้ แล้วเราก็สืบหาร่องรอยของหัวหน้าคณะฯ คนอื่นๆ ไม่ได้ด้วย..."
101130-14 = "ถ้าจะยกเลิกกฎอัยการศึกที่ไคเซอร์ประกาศ ก็ต้องยึดอำนาจควบคุมการบริหารที่พวกนั้นแย่งชิงไปคืน#nมาก่อนค่ะ แต่ว่าองค์การนักเรียนดันมาลงมติไม่ไว้วางใจกับหัวหน้าฝ่ายบริหาร จนสูญเสียอำนาจการ#nบริหารไปแล้วค่ะ!"
101130-15 = "ถ้าจะแก้ไขเรื่องนี้ ก็ต้องมีหัวหน้าที่เห็นชอบด้วย 6 คนเพื่อยกเลิกการลงมติไม่ไว้วางใจ หรือไม่ก็ต้อง#nเปิดการลงคะแนนเพื่ออนุมัติให้มีการแต่งตั้งใหม่ค่ะ..."
101130-16 = "งือ... แต่นี่ก็เป็นไปไม่ได้เพราะกฎอัยการศึก... น่าปวดหัวจังเลยค่ะ!"
101130-18 = "งั้นก็แปลว่าตอนนี้องค์การนักเรียนก็ช่วยเหลืออะไรไม่ได้เลยสินะ"
101130-19 = "คนใหญ่คนโตพวกนั้นเคยมาช่วยเหลืออะไรด้วยเหรอไง?"
101130-20 = "โดนธุรกิจยึดอำนาจบริหารไปอย่างนั้น... ถ้าสถาบัน SRT ยังอยู่ ก็คงขัดขวางเรื่องแบบนี้ไว้ได้..."
101130-21 = "ถ้าเป็นอย่างนี้ แซงค์ทัมทาวเวอร์ก็จะโดนไคเซอร์ครอบงำไปเรื่อยๆ น่ะสิ... เราจะทำยังไงกันดี..."
101130-22 = "[s] \"วิธีที่เหลือไม่ยากหรอก...\""
101130-24 = "วิธีที่เหลือตอนนี้คือการบุกเข้าไปในที่ที่พวกนั้นควบคุมอำนาจของแซงค์ทัมทาวเวอร์ไว้ แล้วก็เข้าไป#nขัดขวางแบบตาต่อตา ฟันต่อฟันค่ะ!"
101130-25 = "[s] \"ที่ที่ว่าคือที่ไหนเหรอ?\""
101130-26 = "ชาเล่ต์ยังไงล่ะคะ...!"
101130-27 = "[s] \"อาคารชาเล่ต์...?\""
101130-28 = "ใช่ค่ะ ถ้าจะระบุให้ชัดเจนก็คือ ที่ <คราฟต์แชมเบอร์> ที่อยู่ชั้นใต้ดินของอาคารชาเล่ต์ค่ะ"
101130-29 = "<คราฟต์แชมเบอร์> เป็นเครื่องกำเนิดสารที่ประธานองค์การนักเรียนทิ้งไว้ เดิมทีแล้วมีแค่ผู้ดูแล#nกล่องแห่งซิสดิมเท่านั้นที่ใช้งานได้ค่ะ..."
101130-30 = "แต่ดูเหมือนว่าไคเซอร์ คอร์เปอเรชั่นจะหาวิธีเลี่ยงการตรวจสอบสิทธิ์ แล้วก็เปิดคราฟต์แชมเบอร์ขึ้นมา#nเพื่อควบคุมแซงค์ทัมทาวเวอร์ค่ะ!"
101130-31 = "อาจจะเป็นเพราะเรื่องนี้ ไคเซอร์ก็เลยจับตัวคุณรินไปขังไว้ในอาคารชาเล่ต์ค่ะ!"
101130-32 = "[s] \"รินอยู่ที่ชาเล่ต์งั้นเหรอ...\""
101130-33 = "ใช่ค่ะ! คุณรินถูกขังไว้ในห้องขังของชาเล่ต์ค่ะ! ถึงตอนนี้จะยังไม่ได้รับบาดเจ็บตรงไหนก็เถอะ..."
101130-37 = "เข้าใจแล้วค่ะ... สรุปก็คือเราจะไปยึดชาเล่ต์คืนจาก PMC สินะคะ"
101130-38 = "แค่พวกเราตรงนี้เนี่ยนะ...?"
101130-39 = "ใช่ ถ้าติดต่อกับเขตปกครองตนเองอื่นไม่ได้ เราก็ต้องออกโรงกันเองน่ะสิ"
101130-40 = "เจ๋งเป้ง! แอบหวังไว้พอดิบพอดีเลยว่าสักวันหนึ่งจะได้เข้าไประเบิดชาเล่ต์ให้เป็นผุยผง!"
101130-41 = "รับทราบค่ะ! ฉันเองก็จะพยายามค่ะ!"
101130-42 = "อึก... มันจะง่ายเหมือนที่พูดเหรอ... อีกฝ่ายเป็นถึงบริษัทยักษ์ใหญ่อย่างไคเซอร์เลยนะ "
101130-43 = "อีกอย่าง ถ้าพวกนั้นไม่ได้มีเซลล์สมองน้อย ก็คงรู้แล้วแหละว่าพวกเราจะบุกไปที่นั่น ป่านนี้น่าจะ#nเตรียมพร้อมทุกอย่างไว้แล้วก็ได้"
101130-45 = "เรียกไคเซอร์ SOF มา"
101130-46 = "หะ... ให้เรียก[ruby=Special Operation Forces]กองกำลังพิเศษ[/ruby]น่ะเหรอครับ?"
101130-47 = "ใช่ ครูกำลังมาทางนี้"
101130-48 = "ครูคนนั้นรู้ดีกว่าใครว่าในสถานการณ์แบบนี้ จะต้องเลือกโจมตีตรงไหน ฉันก็เลยเตรียมบางอย่างไว้"
101130-49 = "เดิมทีแล้วนี่เป็นสิ่งที่ฉันจะเอาไว้ใช้เผชิญหน้ากับ <สุนัขจิ้งจอก> พวกนั้น... แต่ตอนนี้ฉันขอใช้ไพ่ใบที่ดี#nที่สุดที่นี่เลย"
101130-50 = "เร็วเข้า!"
101130-51 = "ครับผม!"
101130-54 = "ฉันไม่ได้โง่จนประมาทแล้วมาแพ้เอาทีหลังหรอกนะ"
101130-56 = "อะ... เอ่อ... เราต้องไปช่วยหัวหน้าฝ่ายบริหารที่ถูกขังอยู่ที่นั่น... แล้วต้องไปขัดขวางแผนการร้ายของ#nไคเซอร์งั้นเหรอ... ฉันจะทำได้มั้ยนะ..."
101130-57 = "มิยุ นี่ไม่ใช่ปัญหาที่ต้องมาคิดว่าเราจะทำได้หรือเปล่าหรอกนะคะ เราต้องทำให้ได้ค่ะ"
101130-58 = "ใช่ค่ะ! สันติภาพของคิโวทอสขึ้นอยู่กับพวกเราแล้วนะคะ!"
101130-59 = "อะ... อืม... งั้นฉันก็จะพยายามด้วย..."
101130-63 = "ฮึ่ม... อย่าให้เรื่องนี้จบลงนะ ถ้าให้ทำงานล่วงเวลาขนาดนี้แล้วไม่ให้เงินเพิ่มละก็ ฉันจะขอลาพักร้อนสัก#nเดือนหนึ่งเลย!"
101130-64 = "หึ! PMC มันจะไปเก่งแค่ไหนกันเชียว ทางนี้เป็นถึงสถาบันพิเศษ SRT ที่รวมตัวสุดยอดหัวกะทิของ#nคิโวทอสไว้เชียวนะ!"
101130-65 = "ถึงพวกเราจะเป็นเด็กใหม่ที่ไม่มีประสบการณ์ต่อสู้จริง..."
101130-66 = "ไม่มีโรงเรียนอยู่..."
101130-67 = "แล้วก็ไม่มีบ้านอยู่ด้วย..."
101130-68 = "แถมยังต้องยืมหนังสือเรียนของโรงเรียนวัลคิรี่อีกก็เถอะ"
101130-69 = "คะ?! BD ของวัลคิรี่มันไม่ดีตรงไหนกันคะ! ฉันก็ใช้ BD นั้นเรียน แล้วก็เรียนเก่งด้วยนะคะ!"
101130-70 = "ใครว่าอะไรล่ะ? ฉันบอกว่าเราแบ่งของให้ใช้ได้ไม่อั้นเพราะมีของในคลังเยอะต่างหาก"
101130-74 = "[ns] \"เอาละๆ กองทหาร RABBIT สำนักรักษาความปลอดภัย มาเริ่มกันเถอะ\""
101130-75 = "มิยาโกะ ช่วยตั้งชื่อปฏิบัติการให้ทีสิ"
101130-76 = "อะ... เอางั้นเหรอคะ ถ้างั้นจากนี้ เรามาใช้ชื่อ <ปฏิบัติการพาร์สลีย์>..."
101130-77 = "เดี๋ยวนะ ทำไมเป็นพาร์สลีย์ล่ะ? มันแปลว่าอะไรเหรอ? ไม่มีคำอื่นที่เท่กว่านี้เหรอ?"
101130-78 = "คะ? อะ... เอ่อ... พอดีมันเป็นอาหารที่กระต่ายชอบ..."
101130-79 = "อ๊ะ ถ้าอย่างนั้นใช้คำว่าแคร์รอตดีไหมคะ ฉันว่ามันน่ารักกว่านะ ปฏิบัติการแคร์รอต! ฟังดูเข้าท่าเลยนะ! "
101130-80 = "แต่เราเคยใช้ชื่อนี้ไปแล้วนะ..."
101130-81 = "งั้นเอาเป็นปฏิบัติการโดนัทมั้ย? ปฏิบัติการโดนัทเคลือบเกรซ!"
101130-82 = "เหมือนชื่อหนังครอบครัวที่ฉายในวันคริสต์มาสยังไงยังงั้นเลย"
101130-83 = "อย่าออกทะเลสิคะ คิดถึงความตั้งใจเดิมของเราสิ เอาเป็น... ปฏิบัติการโคลเวอร์ เป็นไงคะ?"
101130-84 = "ขอใช้เป็น.... <ปฏิบัติการยึดคืนชาเล่ต์> แล้วกันค่ะ"
101130-85 = "หา? อะไรเนี่ย เชยชะมัดเลย"
101130-86 = "[ns] \"งั้นก็ไปกันเลย!\""
101130-89 = "คุณครู... อย่าบาดเจ็บตรงไหนนะคะ... สถานการณ์ตอนนี้เหมือนจะมีอะไรที่แตกต่างไปจากปกติค่ะ..."
101130-90 = "ฝนดาวตกแห่งลางร้ายที่หนูเห็น... มันคืออะไรกันแน่นะ..."
101130-99 = "ตรวจพบรถถังของศัตรูและกองร้อยขนาดใหญ่! มีเฮลิคอปเตอร์โจมตีและสิ่งกีดขวางมาด้วยแฮะ..."
101130-100 = "ชิ... เตรียมตัวมาซะดิบดีเลยนะ..."
101130-101 = "แบบนี้ไม่น่าจะบุกเข้าไปข้างหน้าได้เลยนะ... มิยาโกะจัง ทำยังไงดีล่ะ?"
101130-102 = "ถ้าเรามีกองกำลังสนับสนุนมากกว่านี้ละก็... ก็น่าจะผ่านไปได้..."
101130-109 = "หืม? สัญญาณนี้มัน...?"
101130-114 = "หาเจอจนได้! ทางนี้!"
101130-115 = "ฉันได้ข่าวก็เลยมาที่นี่ค่ะ! คุณครู! พวกฉันจะช่วยเองค่ะ! "
101130-117 = "กรมความมั่นคงสาธารณะ...!"
101130-118 = "เอ๋? นักเรียนจากกรมความมั่นคงสาธารณะที่ปกติจะไม่ลุกขึ้นมาทำอะไรก่อน..."
101130-119 = "[s] \"วัลคิรี่มาช่วยสินะ!\""
101130-121 = "พวกฉันกำลังกระสับกระส่ายเพราะไม่มีคำสั่งอะไรลงมาสักที... จนบังเอิญไปเห็นหัวหน้ากรมฯ คันนะ#nกับคุณครูแถวๆ โคะอุซางิ ทาวน์น่ะค่ะ!"
101130-122 = "พวกฉันจะช่วยเท่าที่ทำได้ค่ะคุณครู!"
101130-126 = "มิยาโกะ แบบนี้ก็..."
101130-127 = "ค่ะ... ทำได้ค่ะ"
101130-128 = "เอาละคุณครู สั่งการมาเลยค่ะ"
101130-129 = "[s] \"มิยาโกะเป็นคนสั่งการเถอะ ครูจะเป็นฝ่ายช่วยเอง\""
101130-130 = "ค่ะ... รับทราบค่ะ "
101130-131 = "เอาละค่ะทุกคน จากนี้... มาเริ่ม <ปฏิบัติการยึดคืนชาเล่ต์> เพื่อยกเลิกกฎอัยการศึกใน D.U. และทำลายแผนการร้ายของไคเซอร์กรุ๊ปกันค่ะ!"
101130-132 = "ค่ะ!"

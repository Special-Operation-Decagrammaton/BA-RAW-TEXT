[translation]
101130-1 = "第13話;[ruby=S.C.H.]夏萊[/ruby]奪還作戰（１）"
101130-3 = "（順利逃離PMC基地後，暫時躲在了兔寶寶公園）"
101130-4 = "……原來如此。#n老師也受到牽連，遭到了綁架啊。"
101130-5 = "要是沒有環奈局長，就真的危險了呢。"
101130-6 = "那個狂犬竟然為了幫助老師而犧牲自己……#n真是不敢相信。"
101130-7 = "傷勢真嚴重……"
101130-8 = "暫時先讓他在帳篷裡休息了，等他休息夠了應該就會自己爬起來吧？#n畢竟是女武神的公安局長，一定沒問題的。"
101130-9 = "看來應該先分享彼此的情報，掌握狀況比較好。"
101130-10 = "現在發生了什麼、該做些什麼……有必要整理現狀。"
101130-12 = "目前D.U.由於戒嚴令的發動，所有的通訊、物流、移動都遭到禁止。行政體系也全都處於停擺狀態。"
101130-13 = "往D.U.外部的所有通訊都阻斷，#n所以無法獲得其他學園自治區的支援，也無法得知其他室長的行蹤……"
101130-14 = "如果要取消凱薩發佈的戒嚴令，就必須從他們手中奪回行政控制權。#n然而聯邦學生會的行政官正因為不信任案喪失了行政權限！"
101130-15 = "想要解除這個狀態，就需要同意不信任案的6名室長撤回意見，#n或是透過投票通過重新信任案才行……"
101130-16 = "不過由於戒嚴令的存在，那也是不可能的……每個環節都有問題！"
101130-18 = "也就是說，現在的聯邦學生會幫不上任何忙對吧。"
101130-19 = "那些傢伙有幫得上忙的時候嗎？"
101130-20 = "話說，居然會被一個企業奪走行政權限……#nSRT特殊學園如果還在，應該就能防止最糟的情況發生才對……"
101130-21 = "所，所以……現在聖所之塔也掌握在凱薩手中對吧……究竟該怎麼做……"
101130-22 = "[s]「剩下的方法就只有……」"
101130-24 = "現在只能向掌握聖所之塔行政控制權的地點發動突擊，#n以物理的方式進行阻止了！"
101130-25 = "[s]「掌握行政控制權的地點……？」"
101130-26 = "──是夏萊！"
101130-27 = "[s]「夏萊……？」"
101130-28 = "是的。正確來說是夏萊地下的「工藝室」！"
101130-29 = "「工藝室」是聯邦學生會長留下的物質生成器。#n本來是只有希迪姆的箱子的管理者能夠連線的……"
101130-30 = "凱薩公司似乎利用某種方法繞過認證並啟動了工藝室，因此才得以掌握聖所之塔……"
101130-31 = "雖然不清楚是否有關連，不過凱薩似乎綁架了琳行政官，將其關在夏萊。"
101130-32 = "[s]「琳在夏萊……」"
101130-33 = "是的，琳同學現在正被關在夏萊內部！#n所幸似乎沒有受傷……"
101130-37 = "……我明白了。也就是說，要奪回被PMC控制的夏萊對吧。"
101130-38 = "只靠在場的我們嗎……？"
101130-39 = "反正也連絡不上其他自治區，只能由我們來做了吧。"
101130-40 = "那正好。我早就想過總有一天要把夏萊給炸飛了。"
101130-41 = "我知道了！本官也會加油的！"
101130-42 = "唉……不過，應該不會那麼簡單吧～？#n對方可是奇普托斯首屈一指的大企業凱薩唷？"
101130-43 = "他們也不是蠢蛋，應該早就料到我們會過去了吧……"
101130-45 = "……呼叫凱薩SOF吧。"
101130-46 = "您，您[ruby=Special Operation Forces]是說特殊部隊嗎？[/ruby]"
101130-47 = "沒錯。老師正往這裡來。"
101130-48 = "那個人應該比任何人都清楚這種情況下應該要攻擊哪個地方。#n所以必須做好準備。"
101130-49 = "本來是打算用來對付「狐狸」的……這也沒辦法。#n凱薩PMC決戰部隊這張王牌，就用在這裡吧。"
101130-50 = "動作快！"
101130-51 = "是，是！"
101130-54 = "我和因為大意而失敗的蠢貨可不一樣。"
101130-56 = "嗚嗚……除了要救出被幽禁的行政官，還要阻止凱薩的陰謀……#n我，我做得到嗎……"
101130-57 = "美優，這不是能不能辦到的問題，我們非這麼做不可。"
101130-58 = "沒錯！奇普托斯的和平，就掌握在我們手上了！"
101130-59 = "嗯，嗯……我會加油的……"
101130-63 = "唔唔……等到事情結束之後，得要個30天29夜的休假才行～！#n做好覺悟吧！"
101130-64 = "……不過是區區PMC，我們可是奇普托斯的頂尖菁英組成的SRT特殊學園啊！"
101130-65 = "雖然我們還是沒有實戰經驗的新生……"
101130-66 = "而且連學園也沒了……"
101130-67 = "還在露宿中……"
101130-68 = "連教科書都沒有，還要向女武神學園借用。"
101130-69 = "不，不過！本官很喜歡女武神的BD唷！#n在學習方面完全沒有問題！"
101130-70 = "我不是那個意思，是因為庫存很多，他們要多少都行。"
101130-74 = "[ns]「好。RABBIT小隊、生活安全局的大家……開始吧。」"
101130-75 = "都子，決定作戰名稱吧。"
101130-76 = "也，也對……那麼現在開始，進行奪回夏萊的「芹菜作戰」──"
101130-77 = "慢著，為什麼是芹菜啊？有什麼含意？#n沒有更帥一點的名字嗎？"
101130-78 = "呃，那個……因為是兔子喜歡的食物……"
101130-79 = "原來如此，那用胡蘿蔔會不會比較可愛？#n胡蘿蔔作戰！"
101130-80 = "那個之前用過了……"
101130-81 = "那，甜甜圈作戰怎麼樣？糖霜甜甜圈作戰！"
101130-82 = "總覺得很像是會在聖誕節上映的電影名稱。"
101130-83 = "汲取一下最開始的目的，幸運草作戰怎麼樣？"
101130-84 = "……就決定是「[ruby=S.C.H.]夏萊[/ruby]奪還作戰」了。"
101130-85 = "什麼嘛，真無趣。"
101130-86 = "[ns]「好，出發吧！」"
101130-89 = "老師……請務必小心……#n這次，我感受到了和平常不同的氣息……"
101130-90 = "我所看見的那道，不祥的流星……那究竟是什麼呢……"
101130-99 = "已確認到敵方的巡航戰車，規模為中隊！#n還有攻擊直升機與路障，準備得相當徹底呢……"
101130-100 = "呿，沒有破綻啊……"
101130-101 = "要正面突破似乎有困難……都子醬，該怎麼辦呢？"
101130-102 = "……要是支援能再多一點……"
101130-109 = "嗯？這個信號是……？"
101130-114 = "找到了！在這裡！"
101130-115 = "我們是收到聯絡後趕來的，老師！我們也助您一臂之力！"
101130-117 = "公安局的各位……！"
101130-118 = "咦～？平常絕對不會主動行動的公安局的學生……"
101130-119 = "[s]「女武神來了啊！」"
101130-121 = "因為無論我們怎麼等都沒等到命令，只能焦急地待命，#n不過偶然在兔寶寶鎮附近看見了局長和老師！"
101130-122 = "我們也會盡力幫忙的，老師！"
101130-126 = "都子，這樣一來……"
101130-127 = "……是，應該可以做到。"
101130-128 = "那麼老師，請下達指示。"
101130-129 = "[s]「指示就交給都子吧，我會給予協助的。」"
101130-130 = "……是，非常感謝。"
101130-131 = "那麼各位。從現在起，為了解除D.U.的戒嚴令、阻止凱薩集團的陰謀……#n開始「[ruby=S.C.H.]夏萊[/ruby]奪還作戰」！"
101130-132 = "「「是！」」"

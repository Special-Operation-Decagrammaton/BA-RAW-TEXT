[translation]
101130-1 = "Episode 13; Operation Recapture Schale 1"
101130-3 = "We safely escaped the PMC base and hid in Kousagi Park."
101130-4 = "I see. So you were sucked into a conspiracy and kidnapped."
101130-5 = "If it wasn't for Director Kanna, it would've been very bad for you, Sensei."
101130-6 = "The Feral Hound threw herself in front of danger to save Sensei... It's hard to believe."
101130-7 = "Sh-She was so badly injured..."
101130-8 = "She's recovering in the tent now. A tough cookie like Director Kanna'll be fine with some rest."
101130-9 = "The priority now is to gather as much information as possible and analyze our options."
101130-10 = "We can't formulate a plan to move forward without understanding the situation first."
101130-12 = "Currently, D.U. is under martial law, prohibiting all communication, logistics, and movement, and the administrative system has been shut down."
101130-13 = "Because all communication going out of D.U. is blocked...we can't get help from other academy districts, and the whereabouts of the other chairmen are unknown..."
101130-14 = "To cancel the martial law declared by Kaiser, we need to regain administrative control, but the General Student Council lost all authority when the chief officer's censure resolution passed!"
101130-15 = "The only way to fix it is to convene the six chiefs of staff who agreed to the censure and have them cancel the censure or pass a vote of confidence."
101130-16 = "But it's impossible to convene them while under martial law! It's an endless Catch-22!"
101130-18 = "So, we can't depend on the General Student Council for anything right now?"
101130-19 = "I mean, could we ever? "
101130-20 = "But to have administrative authority taken over by a single company... If SRT Academy was still around, that could have been prevented..."
101130-21 = "T-To top it off, Sanctum Tower is still under the control of K-Kaiser... What should we d-do?"
101130-22 = "[s] \"Our options are slim...\""
101130-24 = "The only way now is to invade the one place that has administrative control of Sanctum Tower and stop it!"
101130-25 = "[s] \"What do you mean? Where?\""
101130-26 = "...It's Schale!"
101130-27 = "[s] \"The Schale building...?\""
101130-28 = "Yes. To be exact, it's in the Schale basement. The Crafting Chamber!"
101130-29 = "The Crafting Chamber is a material generator left behind by the president of the General Student Council. Originally, only the manager of the Shittim Chest could access it..."
101130-30 = "The Kaiser Corporation seems to be trying to circumvent authentication and use it to activate the Crafting Chamber to take control of Sanctum Tower!"
101130-31 = "Maybe that's why Kaiser kidnapped Chief Officer Rin and locked her up in Schale!"
101130-32 = "[s] \"Rin is at Schale...?\""
101130-33 = "Yes! They locked her up in the Schale prison! She doesn't seem to be hurt, but..."
101130-37 = "Understood. We need to reclaim Schale, which has been taken over by PMC."
101130-38 = "W-With just us...?"
101130-39 = "Yup. We can't get a hold of other districts, so it's us or nobody."
101130-40 = "Awesome! I've been wanting to blow up Schale for a while!"
101130-41 = "Affirmative! I'll do my best!"
101130-42 = "Ugh...but it's not gonna be easy... Our opponent is Kaiser, a powerful corporation."
101130-43 = "Unless they're stupid, they know we're coming. And I don't think they're stupid..."
101130-45 = "...Summon the Kaiser SOF."
101130-46 = "Th-The Special Operation Forces? At Schale?"
101130-47 = "Yes. Sensei will be here."
101130-48 = "Sensei knows better than anyone where to attack in this situation. So we'll be ready for them."
101130-49 = "Originally, they were the ace up the sleeve to fight against those foxes, but we'll use them here."
101130-50 = "Hurry!"
101130-51 = "U-Understood!"
101130-54 = "I have contingency after contingency. I won't be caught off guard, so bring your best, Schale's Sensei. "
101130-56 = "Ugh... We have to rescue the chief officer...and p-put a halt to Kaiser's conspiracy... C-Can we do all that...?"
101130-57 = "It's not a matter of whether or not we can, Miyu. We have to. "
101130-58 = "Yes, that's right! The peace of Kivotos depends on us!"
101130-59 = "O-Okay... I'll do my b-best...!"
101130-63 = "Ugh, fine! I better get at least a month off after this. All this overtime just isn't it!"
101130-64 = "What're you even worried about? PMC is nothing compared to SRT Academy, the best of the best agents in all of Kivotos!"
101130-65 = "Technically we're new recruits with very minimal field experience..."
101130-66 = "And SRT doesn't even exist anymore..."
101130-67 = "And we're operating out of a camp..."
101130-68 = "And they don't even have textbooks, so they've been borrowing Valkyrie's..."
101130-69 = "What's wrong with that?! I've received a great education from Valkyrie's blu-rays!"
101130-70 = "I know, I know! I wouldn't mind if they just took all of them, though..."
101130-74 = "[ns] \"We can do this. RABBIT Squad and Public Safety Bureau, let's begin.\""
101130-75 = "First off, Miyako, name the operation."
101130-76 = "O-Okay. So...to reclaim Schale...let's begin Operation Parsley..."
101130-77 = "Huh? Parsley? Is there some kind of meaning behind that? It sounds lame."
101130-78 = "Well... B-Because rabbits love parsley..."
101130-79 = "Following that logic, how about carrots? Operation Carrots sounds cool! "
101130-80 = "W-We've already used th-that one..."
101130-81 = "Then how about Operation Donuts? Operation Glazed Donuts!"
101130-82 = "That sounds like the name of a family Christmas special."
101130-83 = "We should consider our original intentions. How about Operation Clover?"
101130-84 = "...Let's go with Operation Recapture Schale."
101130-85 = "Aww, that's so boring."
101130-86 = "[ns] \"Operation Recapture Schale, commence!\""
101130-89 = "Sensei... Please be careful. I have a feeling there's something more underneath the surface..."
101130-90 = "The ominous meteors I saw... I wonder what they meant..."
101130-99 = "We've checked the enemy Crusader Tanks and confirmed the number of troops! They've prepared assault helicopters and barricades..."
101130-100 = "They're definitely ready for us..."
101130-101 = "F-Frontal breakthrough i-is impossible... Miyako, wh-what should we do?"
101130-102 = "If we had just a few more reinforcements..."
101130-109 = "Huh? What's that signal...?"
101130-114 = "We found them! This way!"
101130-115 = "We got your message, Sensei! We're here to help!"
101130-117 = "The Public Peace Bureau!"
101130-118 = "Really?! Taking initiative isn't usually the Public Peace Bureau's strong point..."
101130-119 = "[s] \"Valkyrie! We have reinforcements!\""
101130-121 = "We've been waiting all this time for orders... Then I saw Director Kanna and Sensei near Kousagi Town!"
101130-122 = "We'll do our best to help, Sensei!"
101130-126 = "Miyako, with this..."
101130-127 = "Yes. We can do it."
101130-128 = "Then, Sensei, what are your orders?"
101130-129 = "[s] \"I'm following your lead, Miyako. I'm here to support you.\""
101130-130 = "...Understood. Okay. "
101130-131 = "Well, everyone. To lift D.U.'s martial law and crush the Kaiser Group's conspiracy...let us begin Operation Recapture Schale!"
101130-132 = "Yes!"

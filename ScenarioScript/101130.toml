101130-1 = "#title;제13화;샬레 탈환 작전 1"
101130-2 = "#wait;2500"
101130-3 = "#na;PMC의 기지를 무사히 빠져나와 코우사기 공원에 일단 몸을 숨겼다."
101130-4 = "3;미야코;06;……그렇군요. 선생님도 그 음모에 휩쓸려 납치당하셨던 거군요. \n#3;em;…\n#3;a"
101130-5 = "3;미야코;01;칸나 국장님이 아니었다면 큰일 날 뻔했네요. 선생님."
101130-6 = "5;사키;04;저 미친개가 선생을 구하려고 몸을 던지다니…… 믿을 수가 없어.\n#5;a"
101130-7 = "1;미유;08;저렇게 다칠 정도로…….\n#1;a"
101130-8 = "5;모에;16;텐트 안에 눕혀 두긴 했는데, 뭐. 푹 쉬면 일어나겠지. 저 사람도 발키리의 국장이니까, 이정도는 끄떡없을 거야.\n#5;a"
101130-9 = "3;미야코;02;일단 지금은 서로의 정보를 취합해서 상황을 파악하는 게 우선이겠네요.\n#3;em;[반응]"
101130-10 = "3;미야코;10;지금 무슨 일이 벌어지고 있는지, 우리가 무엇을 어떻게 해야 하는지……. 상황을 정리하는 게 필요합니다."
101130-11 = "#all;hide"
101130-12 = "3;아로나;05;현재 D.U.는 계엄령이 발동되어 모든 통신과 물류, 이동이 금지되고 행정 체계가 셧다운되었습니다.\n#3;em;[!]\n#3;a"
101130-13 = "3;아로나;06;D.U. 외부로 통하는 모든 통신이 차단되었기 때문에…… 다른 학원 자치구의 도움을 받을 수도 없고, 다른 위원장들의 행방도 알 수 없는 상황……."
101130-14 = "3;아로나;15;카이저가 선포한 이 계엄령을 취소하려면 그들이 탈취한 행정 제어권을 되찾아야 하지만, 하필 총학생회는 지금 수석행정관의 문책결의안이 의결되어서 행정 권한을 상실했어요!\n#3;em;[반응]\n#3;jump"
101130-15 = "3;아로나;10;이걸 해소하려면 거기에 동의한 6명의 실장들이 모여 문책결의안을 취소하거나, 투표를 열어 재신임을 가결해야 하는데……"
101130-16 = "3;아로나;18;으으…… 그건 또 계엄령 때문에 불가능한…… 그런 꼬리에 꼬리를 무는 골치 아픈 상태예요!\n#3;stiff\n#3;em;[속상함]"
101130-17 = "#all;hide"
101130-18 = "1;모에;15;즉, 지금의 총학생회는 아무런 도움이 되지 않는다는 거네.\n#1;a"
101130-19 = "5;사키;06;높으신 분들이 언제 도움이 된 적이 있었어? \n#5;a"
101130-20 = "3;미야코;06;하지만 일개 기업에게 행정 권한을 탈취당하다니…… SRT 학원이 유지되고 있었다면 그런 일은 막을 수 있었을 텐데…….\n#3;a\n#3;em;…"
101130-21 = "1;미유;02;그, 그럼 이 상태에서도 생텀 타워는 계속 그 카이저에게 장악당하고 있는 건데…… 이제 어떻게 해야……."
101130-22 = "[s] \"남은 방법은 간단해…….\""
101130-23 = "#all;hide"
101130-24 = "3;아로나;25;이제 남은 방법은 생텀 타워의 행정 제어권을 장악하고 있는 장소로 직접 쳐들어가서 물리적으로 저지하는 수밖엔 없어요!\n#3;a\n#3;em;[!]"
101130-25 = "[s] \"거기가 어딘데?\""
101130-26 = "3;아로나;22;……바로 샬레예요! \n#3;closeup\n#3;em;[반응]"
101130-27 = "[s] \"샬레 건물……?\""
101130-28 = "3;아로나;25;네, 정확히는 샬레의 건물의 지하, <크래프트 챔버>입니다!\n#3;closeup"
101130-29 = "3;아로나;99;<크래프트 챔버>는 총학생회장이 남긴 물질 생성기, 원래라면 싯딤의 상자의 관리자만이 접속할 수 있지만……."
101130-30 = "3;아로나;14;모종의 방법으로 카이저 코퍼레이션은 인증을 우회해서 크래프트 챔버를 기동, 생텀 타워 장악에 사용하려는 것 같아요!"
101130-31 = "3;아로나;05;그것 때문인지 몰라도 카이저는 수석행정관 린 씨를 납치해서 샬레의 건물에 가둬둔 상태입니다!\n#3;em;[!]"
101130-32 = "[s] \"린이 샬레에 있다고…….\""
101130-33 = "3;아로나;05;네! 린 씨는 샬레의 감옥에 갇혀 있어요! 다치진 않은 것 같지만…….\n#3;em;…"

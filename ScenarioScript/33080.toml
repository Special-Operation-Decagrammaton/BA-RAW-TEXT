[translation]
33080-1 = "ตอนที่ 8;วันแห่งการมอดไหม้และเถ้าถ่าน (2)"
33080-10 = "ไม่ใช่แค่คนสองคนด้วยค่ะ ดูรอบๆ แล้ว... มีหลายสิบ... ไม่สิ หลายร้อยเลย...?"
33080-18 = "!!"
33080-21 = "ตามจับได้แล้ว และตรวจสอบมิเมซิสของสาวกแล้วด้วย "
33080-22 = "ในที่สุดก็ลงนามในสนธิสัญญาแล้วเหรอ...? ข้อตกลงกับตุ๊กตานั่นก็ดูจะเป็นไปด้วยดีด้วยนะอาสึโกะ"
33080-27 = "ฮะ... เฮือก!!"
33080-28 = "ตุ๊กตาไม้ขยับได้...!!"
33080-30 = "ไม่มีมารยาทเอาซะเลย... ตอนเรียกผมให้ใส่ความเคารพที่มีต่อศิลปะแล้วเรียกว่า 'เมสโตร' สิ"
33080-31 = "......."
33080-32 = "แต่พวกเธอก็คงไม่เข้าใจอยู่ดีว่าศิลปะคืออะไร พวกเธอไม่มีคุณสมบัติพอที่จะเป็นคู่สนทนาของผมหรอก"
33080-33 = "ทั้งสติปัญญา ความสง่างาม ประสบการณ์ ไม่เพียงพอสักอย่าง... นักเรียนคิโวทอสเป็นได้แค่นี้เหรอ?#nน่าผิดหวังชะมัดเลย"
33080-34 = "แต่ถึงยังไงก็เถอะ การที่ผมมาช่วยพวกเธอคือเกียรติของผู้พิทักษ์#nการได้[ruby=มิเมซิส]เลียนแบบ[/ruby]สิ่งนั้นมันสนุกดีน่ะ"
33080-35 = "เชื้อสายของผู้พิทักษ์บทบัญญัติ... การที่ได้เฝ้าดูการทำงานของบรรทัดฐานเลือดราชัน ถือว่าเป็นโชคดีมาก..."
33080-36 = "......."
33080-37 = "เพราะมันจะทำให้การทดลองของผมเข้าใกล้ความสูงศักดิ์ขึ้น"
33080-38 = "แต่ว่า... ผมว่าถึงจะอธิบายต่อก็คงจะไร้ความหมาย เพราะคนอย่างพวกเธอคงไม่เข้าใจ เอาล่ะ#nงั้นจงบอกทางผมไปยังหลักคำสอนที่อยู่ในชั้นใต้ดินของทรีนิตี้ตามที่ได้สัญญาไว้"
33080-39 = "(ภาษามือ) ..."
33080-43 = "ทางนั้นหรือเปล่า..."
33080-51 = "ย้ากกกกกกก!!"
33080-66 = "แฮ่ก แฮ่ก..."
33080-67 = "ไม่มีจุดจบเลยค่ะ นี่มัน... คนพวกนี้..."
33080-68 = "ทำยังไงดีล่ะคะ? อย่างน้อยก็ต้องให้คุณครูหนีไปให้ได้..."
33080-74 = "......!!  นี่มัน..."
33080-75 = "ทางนี้!"
33080-76 = "[ns] \"ฮินะ...!!\""
33080-77 = "ประธานกรรมการ...!!"
33080-78 = "ฮิโยริ จัดการฮินะไม่ได้เหรอ? "
33080-79 = "แค่กๆ แค่กๆ ขะ... ขอโทษค่ะ ฉันขวางฮินะไว้ไม่ได้...#nเธอเล่นงานพวกเราและจากไปก่อนที่สาวกจะปรากฏตัวอีกค่ะ..."
33080-83 = "ชมรมทวงความยุติธรรม! ส่งคุณครูมาทางนี้! ไม่มีเวลาแล้ว!"
33080-84 = "......."
33080-85 = "......."
33080-86 = "เข้าใจแล้วค่ะ..."
33080-87 = "คุณครูคะ ฉันจะขวางศัตรูไว้ให้ ระหว่างนี้ให้ล่าถอยไปทางโน้นนะคะ! ตามที่ประธานกรรมการบอกเลยค่ะ! "
33080-89 = "[s] \"แล้วพวกเธอล่ะ?!\""
33080-91 = "พวกฉันจะระวังหลังให้คุณครูเองค่ะ"
33080-92 = "ค่ะ ประธานกรรมการกำลังเสนอบางสิ่งอยู่... ถึงฉันจะไม่ค่อยพอใจ แต่ไม่มีทางเลือกอื่นแล้วค่ะ"
33080-93 = "[s] \"แต่ว่า...\""
33080-94 = "คุณครูคะ! ตอนนี้กลุ่มผู้นำของทรีนิตี้กำลังถูกทำลายล้างค่ะ! ตอนนี้เราไม่มีทั้งชมรมซิสเตอร์#nทั้งสภาน้ำชา..."
33080-95 = "หากเกิดอะไรขึ้นกับคุณครูอีกคน... สถานการณ์ก็จะยิ่งควบคุมไม่ได้ค่ะ!"
33080-96 = "[s] \"......!!\""
33080-97 = "เพราะฉะนั้นคุณครูห้ามเป็นอะไรไปนะคะ! ขอร้องล่ะ!"
33080-98 = "คุณครู เร็วเข้าเถอะ เราไม่มีเวลาแล้ว!"
33080-99 = "คุณครู "
33080-100 = "ขะ... ขอร้องละค่ะ คุณครู...!"
33080-101 = "[s] \"...........\""
33080-105 = "[ns] วิ่งไปที่ฮินะ"
33080-107 = "ประธานกรรมการ! ฝากคุณครูด้วยนะคะ!"
33080-115 = "ไม่ต้องห่วง..."
33080-116 = "ตอนนี้เราไม่มีวิธีต่อกรกับปีศาจพวกนั้น... เราต้องฝ่าวงล้อมแล้วหนีออกไปให้ได้เท่านั้น..."
33080-117 = "อึ้ก..."
33080-118 = "[s] \"ฮินะ มีแผลนี่นา...\""
33080-119 = "แค่นี้ไม่เป็นไรหรอก... ตามฉันมานะครู อย่าอยู่ให้ห่างเกินล่ะ"
33080-120 = "เราจะเปิดเส้นทางถอยเดี๋ยวนี้"

33080-95 = "If something were to happen to you too...there's no way we'd be able to recover from this!"
33080-96 = "[s] \"...!\""
33080-97 = "That's why your safety is of the highest priority. Please...!"
33080-98 = "There's no time!"
33080-99 = "Sensei. "

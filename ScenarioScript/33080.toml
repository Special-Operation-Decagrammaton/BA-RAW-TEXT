33080-1 = "Episode 8;Day of Fire and Ash Part 2"
33080-10 = "There aren't just a few of them. There are tens—no, hundreds—of them in the surrounding area!"
33080-18 = "...!"
33080-21 = "We've caught up with the targets. Confirming status of the Council's Mimesises. "
33080-22 = "So the treaty has been signed...and the deal with that doll was struck as well. Atsuko..."
33080-27 = "A-Ahhh!"

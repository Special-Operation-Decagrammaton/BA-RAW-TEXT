[translation]
33080-1 = "第8話;火と灰に染まる日（２）"
33080-10 = "……尋常ではない数です。周りに数十……いえ、数百人規模の……。"
33080-18 = "っ！"
33080-21 = "……追いついた。聖徒会の[ruby=ミメシス]複製[/ruby]も確認。"
33080-22 = "条約に調印が為された……それに、人形との取引も上手く行ったみたいだね。アツコ。"
33080-27 = "ひぃっ……！！"
33080-28 = "き、木の人形……！？"
33080-30 = "……無作法だな。私を呼ぶのであれば、芸術への敬意も込めて「マエストロ」と呼んでほしいものだ。"
33080-31 = "……。"
33080-32 = "そなたらにはまだ、芸術の何たるかは尚早だろうか……ならば済まないが、そなたらとは愉しい対話は成り立ちそうにない。"
33080-33 = "知性、品格、経験……それらを携えて来るが良い。キヴォトスの生徒たちよ、どうか私を落胆させてくれるな。"
33080-34 = "……されど、あの守護者たちの「威厳」を[ruby=ミメシス]複製[/ruby]できるというその一点には興味を惹かれた。それに免じて、今回はそなたらを助けよう。"
33080-35 = "戒律を守護せし者の血統……そのロイヤルブラッドの「戒命」が動作する様を見届けられたのは、幸甚であった。"
33080-36 = "……。"
33080-37 = "おかげで私の実験は、さらに「崇高」に近づくことができるだろう。"
33080-38 = "……ふむ、説明は退屈にして由無し事だろうか。では約束通り、この地下にある教義の下まで案内してもらうとしよう。"
33080-39 = "……。"
33080-43 = "さあ、往かん……。"
33080-51 = "きええぇぇぇぇぇっ！"
33080-66 = "はぁ、はぁ……。"
33080-67 = "……きりがありませんね。この者たちは、一体……？"
33080-68 = "ま、マズいですね……せめて、先生だけでも脱出を……！？"
33080-74 = "……っ！！"
33080-75 = "こっち！"
33080-76 = "[ns] \"ヒナ……！\""
33080-77 = "ゲヘナの風紀委員長……！？"
33080-78 = "ヒヨリ、もしかしてヒナを止められなかった？"
33080-79 = "げほっ、けほっ……す、すみません、ダメでした……聖徒会が顕現するよりも前に、全員なぎ倒されて……"
33080-83 = "正義実現委員会、先生をこっちに！今は時間が無い！"
33080-84 = "……。"
33080-85 = "……。"
33080-86 = "……分かりました。"
33080-87 = "先生、私たちがここで敵を止めます。後はあの風紀委員長がきっと何とかしますから、急いでください！"
33080-89 = "[s] \"ハスミたちは！？\""
33080-91 = "……私たちは、先生の退路を守ります。"
33080-92 = "はい。不快ではありますが……あの風紀委員長は、私たちがそうすると信じているのでしょう。確かに今は、それ以外に方法がありません。"
33080-93 = "[s] \"でも……！\""
33080-94 = "先生、今トリニティの首脳陣はほぼ壊滅状態です。シスターフッドもティーパーティーもいない今……"
33080-95 = "先生にまで何かあっては、本当に収拾がつかなくなってしまいます！"
33080-96 = "[s] \"……。\""
33080-97 = "……先生の無事を祈ります。その道は、私たちが守ってみせますから！"
33080-98 = "先生、急いで！"
33080-99 = "……先生！"
33080-100 = "お、お願いします！今は行ってください、先生……！"
33080-101 = "[s] \"………。\""
33080-105 = "[ns] ヒナの元へと走り出す。"
33080-107 = "風紀委員長……！先生を、よろしくお願いします！"
33080-115 = "……任せて。"
33080-116 = "先生、今あの怪物たちをまともに相手取れる方法は無い。今は包囲網を抜けて脱出することが、"
33080-117 = "っ……！"
33080-118 = "[s] \"ヒナ、傷が……！\""
33080-119 = "これくらい大したことない……先生、私から離れないで。"
33080-120 = "退路は、私がこじ開ける。"

[translation]
33080-1 = "第8話;染上火與灰燼之日（２）"
33080-10 = "……並不是尋常的數量。周圍有數十……不，數百人規模的……"
33080-18 = "！"
33080-21 = "……追上了。也確認到聖徒會的[ruby=Mimesis]複製[/ruby]。"
33080-22 = "成功簽訂條約了……而且，和人偶的交易似乎也很順利呢。敦子。"
33080-27 = "噫……！！"
33080-28 = "木，木製人偶……！？"
33080-30 = "……真失禮呢。要稱呼我的話，希望可以注入對藝術的敬意稱呼我為「瑪艾斯托洛」啊。"
33080-31 = "……"
33080-32 = "對妳們來說，談論藝術還為時過早了嗎……那麼抱歉，看來我和妳們似乎沒辦法成立愉快的對話呢。"
33080-33 = "知性、品格、經驗……具備了這些再來吧。奇普托斯的學生們啊，請不要讓我失望了。"
33080-34 = "……不過，我對於[ruby=Mimesis]複製[/ruby]了那些守護者們的威嚴這點感到興趣。看在這點份上，這次就幫助妳們吧。"
33080-35 = "守護戒律之人的血統……能見證那個皇家血統的「誡命」運作的樣子，真是幸運。"
33080-36 = "……"
33080-37 = "多虧如此，我的實驗可以更接近「崇高」吧。"
33080-38 = "……呼呣，說明既無聊又沒意義嗎。那麼依照約定，帶我去這個地下的教義所在吧。"
33080-39 = "……"
33080-43 = "那麼，出發吧……"
33080-51 = "嘻耶耶耶耶耶耶耶！"
33080-66 = "哈啊，哈啊……"
33080-67 = "……沒完沒了呢。這些人，到底是……？"
33080-68 = "不，不妙呢……至少，老師一個人脫困也好……！？"
33080-74 = "……！！"
33080-75 = "這邊！"
33080-76 = "[ns]「陽奈……！」"
33080-77 = "格黑娜的風紀委員長……！？"
33080-78 = "日和，該不會沒能阻止陽奈？"
33080-79 = "咳咳，咳……不，不好意思，我失敗了……聖徒會顯現之前，全員被打倒……"
33080-83 = "實現正義部，把老師交給我！現在沒時間了！"
33080-84 = "……"
33080-85 = "……"
33080-86 = "……我明白了。"
33080-87 = "老師，我們在這邊阻擋敵人。之後那個風紀委員長一定會想辦法的，請快過去！"
33080-89 = "[s]「蓮實妳們呢！？」"
33080-91 = "……我們，會守住老師的退路。"
33080-92 = "是的。雖然感到不快……不過那個風紀委員長，相信著我們會那麼做吧。現在確實，除此之外沒有其他辦法。"
33080-93 = "[s]「可是……！」"
33080-94 = "老師，目前三一的高層部近乎毀滅狀態。修女會和茶會都不在的現在……"
33080-95 = "連老師都有什麼意外的話，就真的會失控了！"
33080-96 = "[s]「……」"
33080-97 = "……我會祈禱老師平安無事。那條路，我們會守護的！"
33080-98 = "老師，動作快！"
33080-99 = "……老師！"
33080-100 = "拜，拜託你了！現在請離去吧，老師……！"
33080-101 = "[s]「………」"
33080-105 = "[ns] 跑向陽奈身邊"
33080-107 = "風紀委員長……！老師就，拜託妳了！"
33080-115 = "……交給我吧。"
33080-116 = "老師，現在沒有像樣的方法對付那些怪物。應該以脫離包圍網逃出去為目標，"
33080-117 = "……！"
33080-118 = "[s]「陽奈，你的傷……！」"
33080-119 = "這種程度沒什麼……老師，不要離開我身邊。"
33080-120 = "退路就由我來打開。"

33080-37 = "3;마에스트로;01;그걸로 나의 실험은 조금 더 숭고에 다다를 수 있겠지."
33080-38 = "3;마에스트로;01;……그래. 너희들 따위에게 설명을 계속해봤자 의미없겠군. 자, 그럼 약속대로 나에게 트리니티의 지하에 있다는 교의(敎義)로 안내해라.\n#3;m2\n#3;em;[반응]"

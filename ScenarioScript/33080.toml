33080-30 = "How rude. I ask that you address me as Maestro with all the respect due to the arts."
33080-31 = "..."
33080-32 = "Well, you're much too young to comprehend art anyway. Sadly, there's no hope for engaging conversation between the two of us. "
33080-33 = "You lack the intelligence, class, and experience. Are these the qualities of a Kivotos student? How disappointing."
33080-34 = "The only reason I'm helping you is because I deemed the opportunity to mimic the majesty of those guardians as being worthy of my interest."
33080-35 = "The lineage of the commandment guardians. I'm most fortunate to witness the royal blood's mandates be put into action."
33080-36 = "..."
33080-37 = "With this, my experiments are that much closer to attaining the sublime."
33080-38 = "It would be meaningless to bore you any further. Now, lead me to the doctrines beneath Trinity as you promised."
33080-39 = "*signs*"
33080-43 = "Over there, then?"
33080-51 = "Kyaaahahaha!"
33080-66 = "*pant* *pant*"
33080-67 = "There's no end to them. Just what are these things?"
33080-68 = "Wh-What should we do? We still need to get Sensei to safety."
33080-74 = "That weapon sounds like...!"
33080-75 = "This way!"
33080-76 = "[s] \"Hina!\""
33080-77 = "The Gehenna's head prefect!"
33080-78 = "Hiyori. You were unable to contain Hina? "
33080-79 = "*cough* *cough* S-Sorry. We couldn't stop her. She knocked us down and slipped by us before the Council could manifest."
33080-83 = "Justice Task Force! Bring Sensei this way! There's no time!"
33080-84 = "..."
33080-85 = "..."
33080-86 = "Understood. "

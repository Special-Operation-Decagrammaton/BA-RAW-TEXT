33080-32 = "3;마에스트로;01;아니, 어차피 너희들은 예술이 무엇인지 이해하지도 못하겠지. 너희는 내 대화상대가 될 자격에 한참 못 미친다."
33080-33 = "3;마에스트로;01;지성도, 품격도, 경험도, 모두 부족하다……. 키보토스의 학생이란 고작 이 정도인가. 너무나 실망스럽군."
33080-34 = "3;마에스트로;01;그럼에도 내가 너희들을 돕는 것은 저 수호자들의 위엄, 그것을 [ruby=미메시스]복제[/ruby]할 수 있다는 것에 흥미가 있었을 뿐이다.\n#3;stiff"
33080-35 = "3;마에스트로;01;계명을 수호하는 자의 혈통…… 그 로열블러드의 계율이 동작하는 것을 지켜볼 수 있었던 것은 행운이지만……."

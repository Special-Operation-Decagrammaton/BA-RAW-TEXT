[translation]
10025050-1 = "ตอนที่ 5;ความกลัวในสิ่งที่ไม่รู้"
10025050-11 = "ชิ... เด็กพวกนี้ ดูจากที่ชำนาญการต่อสู้แล้ว คงไม่ใช่เด็กธรรมดาๆ สินะ"
10025050-12 = "แต่ว่าเมื่อปลาติดอวนแล้ว ต่อให้ดิ้นรนสักแค่ไหนก็ไม่มีทางหนีรอดไปได้หรอก..."
10025050-13 = "คุมะไก ไปเรียกพวกคนที่อยู่ท่าเรือ 3 มาให้หมด!"
10025050-14 = "ถ้าเวลานี้ละก็ พวกชาวประมงคงตื่นมาเตรียมออกหาปลากันแล้ว"
10025050-19 = "ฮือออ... พวกชาวบ้านแห่กันมาไม่หยุดไม่หย่อนเลย..."
10025050-20 = "ถึงพวกเราจะเป็นต่อเรื่องการต่อสู้แค่ไหน แต่ถ้ายืดเยื้อนานกว่านี้ก็คงอันตราย..."
10025050-21 = "บ้าจริง... มีแต่พวกอุปกรณ์ตกปลา กล่องใส่ปลาวางทิ้งระเกะระกะเต็มไปหมด หาช่องยิงไม่ได้เลย..."
10025050-22 = "RABBIT 1 ทำยังไงดี? กระสุนปืนที่พกมาก็ใกล้จะหมดแล้วด้วย"
10025050-24 = "......"
10025050-27 = "(ถ้าจะจัดการกับพวกศัตรูที่อยู่ด้านหลังที่กำบังนั่นละก็ ขอกำลังสนับสนุนทางอากาศน่าจะดีกว่า... แต่ว่ามันก็เสี่ยงที่จะทำลายอาคารและบริเวณรอบๆ นี้ด้วย)"
10025050-28 = "(แต่ว่าถ้าเมืองนี้เป็นเมืองที่มีลัทธิบูชาสิ่งมีชีวิตลึกลับจริงๆ ละก็...) "
10025050-29 = "(...คงไม่ใช่เวลาที่จะมามัวนึกถึงการอนุรักษ์สถานที่สำหรับการประมงแล้วละค่ะ)"
10025050-34 = "RABBIT 3 ยังมีระเบิด HE-AB เหลืออยู่รึเปล่าคะ?"
10025050-35 = "อื้อ ฉันเตรียมมาเผื่อนิดหน่อย กะเอาไว้ใช้แทนกระสุนปืนใหญ่น่ะ"
10025050-36 = "ช่วยทิ้งระเบิด HE-AB เหนือศัตรูเพื่อล่อศัตรูออกมาจากที่กำบังด้วยค่ะ"
10025050-37 = "พิกัดปล่อยระเบิดคือ..."
10025050-44 = "[ns] \"เดี๋ยวก่อน... ทุกคนหยุดก่อน!\""
10025050-45 = "เสียงนี้มัน..."
10025050-46 = "คุณครู [USERNAME]...?"
10025050-53 = "เฮ้อ... มีเรื่องกันตั้งแต่เช้าอีกแล้วเหรอคะ ทุกคนไม่เบื่อกันบ้างหรือยังไง..."
10025050-54 = "ผู้อาวุโส... ฉันบอกแล้วไม่ใช่เหรอคะว่าถ้ามีเรื่องขัดแย้งกับนักท่องเที่ยวให้มาแจ้งกับตำรวจน้ำอย่าง#nพวกเราก่อนน่ะค่ะ? หากทางเจ้าหน้าที่ระดับสูงรู้เรื่องนี้เข้า พวกฉันจะงานเข้าเอาได้นะคะ..."
10025050-56 = "เฮอะ แค่จะจับหนูที่แอบเข้ามาที่ลานตากปลาต้องไปขออนุญาตตำรวจด้วยหรือยังไง?"
10025050-58 = "อย่ามาขวางนะ ขอแค่ 10 นาที จะเก็บกวาดหนูสกปรกให้สะอาดแล้วแยกย้ายกันกลับเอง"
10025050-59 = "เดี๋ยวก่อน ใครจะจัดการใครกันแน่? มาต่อกันเลยมั้ยล่ะ?!"
10025050-65 = "[ns] \"ดูเหมือนจะเข้าใจผิดกันอยู่นะ...\""
10025050-66 = "เข้าใจผิด...?"
10025050-67 = "เป็นฝ่ายบุกรุกเข้ามาที่ลานตากปลาของคนอื่นโดยพลการ แถมยังคิดจะขโมยปลาแบบนี้... ยังมีหน้า#nมาบอกว่าเข้าใจผิดอีก?"
10025050-68 = "ที่นี่คือลานตากปลางั้นเหรอ?"
10025050-69 = "สถานที่น่าสงสัยที่มีแต่กลิ่นปลาเหม็นเน่าโชยไปทั่วแบบนี้เนี่ยเรียกว่าลานตากปลาได้เหรอ? แบบนี้มันแถกันชัดๆ!"
10025050-70 = "ก็บอกว่านี่ไม่ใช่ปลาเน่าไงเล่า—"
10025050-71 = "[s] \"น้ำปลาคูซายะสินะ...\""
10025050-72 = "น้ำปลาคูซายะ...?"
10025050-74 = "ปลาเค็มตากแห้งที่ได้จากการเอาปลาอาจิไปหมักค่ะ"
10025050-75 = "ถึงจะไม่ค่อยเป็นที่รู้จักแพร่หลายในเขต D.U. แต่ก็นับว่าเป็นสินค้าขึ้นชื่อของหมู่บ้านยาโตอูระเหมือน#nกับพวกกุ้งเลยค่ะ"
10025050-76 = "ถึงพวกเราจะยังไม่เคยลองชิมเลยเพราะกลิ่นของมันเหม็นคาวมากๆ ก็เถอะ..."
10025050-77 = "พวกเธอมาประจำการที่หมู่บ้านนี้ตั้งนานแล้ว แต่ยังกินคูซายะกันไม่ได้อีกงั้นเรอะ?"
10025050-78 = "มันเป็นเรื่องของความชื่นชอบนี่คะ!"
10025050-85 = "...นึกไม่ถึงว่าจะรู้จักคูซายะด้วย..."
10025050-86 = "มันเป็นสินค้าที่ไม่ได้มีวางขายอย่างเป็นทางการ เพราะงั้นในเขต D.U. ก็ไม่น่ามีวางขายที่ไหนแท้ๆ..."
10025050-87 = "[s1] \"พอดีนักเรียนที่ดูแลอยู่ มีคนที่สนใจเรื่องของอร่อยอยู่ด้วยน่ะ...\"\n[s2] \"เคยมีโอกาสได้ลองชิมในรูปแบบอื่นมาบ้างน่ะ...\""
10025050-91 = "ตะ...แต่ว่ายังมีเรื่องที่น่าสงสัยเรื่องอื่นอยู่ด้วยนะ!"
10025050-92 = "ทั้งเรื่องที่บอกว่าหมู่บ้านอาจตกอยู่ในความมืดมิด แล้วก็เรื่องที่ชาวประมงเกือบได้รับบาดเจ็บนั่นน่ะ หมายความว่ายังไง?"
10025050-94 = "ความมืดมิด...? ชาวประมงบาดเจ็บ...?"
10025050-95 = "อ้อ... หมายถึงที่คุยกันเรื่องที่ไฟถนนดับสินะ"
10025050-96 = "สายไฟน่าจะเสียหายจากน้ำทะเลน่ะ เลยทำให้ไฟถนนแถวๆ นี้ดับเกือบหมด..."
10025050-97 = "พอพระอาทิตย์ตก ทั้งหมู่บ้านก็จะมืดสนิทจนมองไม่เห็นเท้าตัวเองเลย"
10025050-98 = "ชาวประมงที่จะออกไปจับปลาตอนเช้ามืดเกิดสะดุดก้อนหินล้มเข้าเลยทำให้ขาเจ็บน่ะ"
10025050-99 = "เรื่องไฟถนนดับเป็นเรื่องสำคัญที่อาจทำให้เกิดอุบัติเหตุหรือความเสี่ยงด้านความปลอดภัยอื่นๆ ได้#nโดยตรง เพราะงั้นฉันเลยติดต่อไปที่สำนักงานใหญ่หลายครั้งเพื่อขอให้ส่งเจ้าหน้าที่มาซ่อม..."
10025050-100 = "แต่ว่าทางนั้นก็มีคนไม่พอ เลยโดนเลื่อนมากว่าหนึ่งเดือนแล้วละ"
10025050-102 = "ไม่ได้หมายความว่าแผ่นดินจะจม หรือพื้นทะเลจะสูงขึ้นมาสินะ... ค่อยยั่งชั่วหน่อย..."
10025050-104 = "แล้วพวกเธอล่ะ ทำไมถึงเข้ามาที่ลานตากปลานี้กัน?"
10025050-105 = "ตอนที่ฉันเดินเล่นรับลมตอนกลางคืน บังเอิญไปเห็นคนน่าสงสัยก็เลยไล่ตามมาค่ะ"
10025050-106 = "คนคนนั้นดูไม่เหมือนคนในหมู่บ้านนี้เลย... เขาถืออุปกรณ์ตกปลามาด้วย เลยกังวลว่าจะแอบลักลอบ#nตกปลาอย่างผิดกฎหมายหรือเปล่าน่ะค่ะ"
10025050-110 = "อ้อ หมายถึงเจ้านั่นแน่ๆ..."
10025050-111 = "เมื่อไม่นานมานี้มีนักตกปลาน่ารำคาญคนหนึ่งมารบเร้าขอให้สอนวิธีตกปลาให้น่ะ"
10025050-112 = "เจ้านั่นดูน่าสงสัยแปลกๆ แต่เขาก็มีใบอนุญาตตกปลาที่ถูกต้อง เพราะงั้นไม่ต้องกังวลหรอก"
10025050-113 = "[s3] \"เข้าใจผิดกันจริงๆ ขอโทษด้วยที่ทำให้วุ่นวาย\"\n[s4] \"ต้องขอโทษแทนนักเรียนของฉันด้วย...\""
10025050-119 = "...พวกเรา พอแค่นี้แหละ แยกย้ายกันได้แล้ว"
10025050-120 = "ถ้าจะออกไปจับปลาก่อนพระอาทิตย์ขึ้นละก็ ตอนนี้ก็ต้องรีบไปตรวจเรือและเติมน้ำมันแล้ว"
10025050-121 = "ถ้าพลาดจับกุ้งไม่ได้ เพราะแค่มัวแต่ทะเลาะกับคนนอกด้วยเหตุผลไร้สาระแบบนี้ คงจะกลายเป็นตัวตลกในหมู่บ้านไปจริงๆ แน่"
10025050-122 = "เข้าใจแล้ว"
10025050-129 = "[ns] \"ทุกคนดูใจร้อนกว่าปกติกันมากเลยนะ\""
10025050-130 = "...ขอโทษค่ะ"
10025050-131 = "หัวหน้ากองควรจะตัดสินสถานการณ์ด้วยความสุขุมรอบคอบเพื่อป้องกันการปะทะโดยไม่จำเป็นแท้ๆ แต่ฉันกลับสั่งให้เปิดฉากต่อสู้แบบนี้... เป็นความผิดของฉันเองค่ะ"
10025050-132 = "ตอนแรกฉันพยายามใจเย็นแล้ว แต่พอคิดซ้ำไปซ้ำมาขณะออกปฏิบัติการ... ก็กลับถูกบางอย่าง#nครอบงำความคิดไป..."
10025050-133 = "...จนด่วนสรุปไปโดยไม่รู้ตัวว่าหมู่บ้านนี้เป็นหมู่บ้านของลัทธิน่าสงสัยค่ะ"
10025050-134 = "เรื่องนั้นฉันก็เหมือนกันนั่นแหละ ก่อนที่จะเริ่มปฏิบัติการก็คิดว่าเรื่องพวกนั้นเป็นเรื่องที่พวกชาวบ้าน#nโกหกขึ้นมา..."
10025050-135 = "แต่พอออกปฏิบัติการในพื้นที่ที่มีกลิ่นเหม็นคาวแบบนี้ ฉันก็เริ่มเชื่อว่าตำนานพวกนั้นเป็นเรื่องจริงขึ้นมา#nซะงั้น"
10025050-136 = "ขะ...ขอโทษ... เพราะฉันเอาแต่พูดอะไรไม่ดี เลยทำให้ทุกคนรู้สึกกระวนกระวายขึ้นมา..."
10025050-137 = "รู้อย่างนี้ ฉันน่าจะตามสมาชิกคนอื่นๆ ไปเงียบๆ ดีกว่า..."
10025050-139 = "ไม่หรอก ถึงทุกคนจะไม่พูดออกมา แต่ในใจก็คิดเหมือนกันทุกคนนั่นแหละ"
10025050-140 = "ไม่ใช่ความผิดของใครคนใดคนหนึ่งหรอก"
10025050-142 = "...ถ้าลองคิดดูให้ดีๆ มันก็ดูด่วนสรุปเกินไปจริงๆ นั่นแหละค่ะ"
10025050-143 = "ปกติแล้วเวลาได้ยินว่าหมู่บ้านต้องตกอยู่ในความมืดมิดก็ควรจะต้องนึกถึงสภาพของไฟฟ้าของหมู่บ้าน ถ้าเห็นปลาหมักและปลาตากแห้ง ปกติแล้วก็ควรจะนึกถึงการทำปลาเค็ม..."
10025050-144 = "แต่พวกเรากลับด่วนสรุปว่าเป็นเครื่องสังเวยของลัทธิแปลกประหลาด หรือสิ่งมีชีวิตในตำนานแทนค่ะ"
10025050-145 = "ว่าแต่ว่าคุณครู... รู้ได้ยังไงกันคะ?"
10025050-146 = "หรือว่ามีอะไรอย่างอื่นอีกที่ล่อลวงคนในหมู่บ้านนี้อยู่จริงๆ คะ?"
10025050-147 = "[s] \"แค่ข้อมูลที่ได้มาก็เยอะเพียงพอแล้วไม่ใช่เหรอ?\""
10025050-148 = "...ข้อมูลเยอะงั้นเหรอคะ?"
10025050-149 = "แน่นอนว่าระหว่างที่ออกสืบข้อมูลจากคนในหมู่บ้าน พวกเราได้ยินเรื่องตำนานต่างๆ ที่ปกติแล้วไม่ค่อย#nได้ยินมาเยอะก็จริง"
10025050-150 = "ปกติพวกเราจะออกรวบรวมข้อมูลประเภท รายงานอุบัติเหตุหรือรายชื่อคนเข้าออก แต่ว่าคราวนี้กลับ#nรวบรวมมาได้แค่ข้อมูลเกี่ยวกับความเชื่อหรือตำนานของหมู่บ้านที่ไม่เกี่ยวกับปฏิบัติการเลย..."
10025050-151 = "ในรายงานรวบรวมข้อมูลเองก็มีแต่เนื้อหาที่เกี่ยวข้องกับ <ตัวตนแห่งห้วงลึก> เขียนยาวเป็นพรืดเลย จนไม่รู้ว่าเป็นบันทึกการออกปฏิบัติการของ SRT หรือว่าวิทยานิพนธ์ตำนานพื้นบ้านกันแน่..."
10025050-152 = "อีกอย่าง ฉันเองก็มัวแต่ติดใจคำพูดของประธานบริษัทขนส่งที่ได้ยินมาเมื่อตอนกลางวัน..."
10025050-153 = "เหมือนเรื่องนั้นยังคงวนเวียนอยู่ในหัว สลัดมันออกไปไม่ได้เลย..."
10025050-155 = "ข้อมูลที่มีอคติจะนำไปสู่การเข้าใจผิด การคาดการณ์ผิด และขัดขวางการคิดอย่างมีเหตุมีผล..."
10025050-156 = "[s] \"แถมพวกเธอก็ยังเหนื่อยจากปฏิบัติการที่ผ่านมาด้วย\""
10025050-158 = "เหนื่อยงั้นเหรอ... คุณครู มองพวกเราเป็นคนยังไงเนี่ย?"
10025050-159 = "พวกเราที่ทนการฝึกหฤโหดของสถาบันพิเศษ SRT มาได้ แค่งานประจำวันนิดๆ หน่อยๆ ไม่มีทางเหนื่อย#nหรอกน่า"
10025050-160 = "[s] \"ถึงร่างกายจะไม่เหนื่อย แต่จิตใจเราก็เหนื่อยล้าได้เหมือนกันนะ\""
10025050-161 = "ความอ่อนล้าทางจิตใจงั้นเหรอ...?"
10025050-162 = "[s5] \"ก็พวกคนที่ SRT ต้องต่อสู้ด้วยปกติเป็นพวกวายร้ายโหดๆ นี่นา...\"\n[s6] \"ถ้ารับมือกับทุกคนในรูปแบบเดียวกัน แป๊บเดียวก็เหนื่อยแล้วละ...\""
10025050-165 = "เรื่องนั้นมันก็จริง... คนส่วนใหญ่ก็มักจะทำตามสัญชาตญาณกันนี่นา"
10025050-166 = "พวกเหตุการณ์ใหญ่ๆ ที่ทำให้คิโวทอสตกอยู่ในสถานการณ์วิกฤต ส่วนใหญ่ก็เริ่มต้นมาจากความ#nปรารถนาที่บริสุทธิ์..."
10025050-167 = "...คนที่ทำเรื่องแบบนั้นก็คงมีแค่คนแบบเธอนั่นแหละ โมเอะ"

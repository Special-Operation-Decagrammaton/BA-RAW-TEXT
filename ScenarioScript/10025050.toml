[translation]
10025050-1 = "Episode 5;Fear of the Unknown"
10025050-11 = "Tch... These tourists can fight."
10025050-12 = "But you're still fish in a barrel!"
10025050-13 = "Kumagai, get the folks from pier 3!"
10025050-14 = "Those layabouts are probably just getting to their boats."
10025050-19 = "Ugh... There's so many of them..."
10025050-20 = "We have s-superior firepower, but they'll overwhelm us at this rate..."
10025050-21 = "Geez... I'm practically tripping over crates and tackle boxes over here..."
10025050-22 = "I'm running out of ammunition... RABBIT 1, orders!"
10025050-24 = "..."
10025050-27 = "(They've got us pinned. We need air support to draw them out... But I can't just bomb the village...)"
10025050-28 = "(No. These cultists seem to control the whole town, and my squad is in danger...) "
10025050-29 = "(...I have no other choice.)"
10025050-34 = "RABBIT 3, do we have any air-bursting rounds?"
10025050-35 = "Sure we do. I brought some instead of my usual anti-air munitions."
10025050-36 = "Prepare to fire over the enemy cover. We're drawing them out."
10025050-37 = "The coordinates are—"
10025050-44 = "[ns] \"That's enough! Everyone, stop!\""
10025050-45 = "That voice..."
10025050-46 = "...[USERNAME] Sensei?"
10025050-53 = "Oh man... Are you guys fighting AGAIN? Don't you ever get sick of it...?"
10025050-54 = "Sir, like I told you before, if you have any trouble with outsiders, come to us first. If these tourists file a complaint, it'll be a pain for all of us..."
10025050-56 = "Hmph. I don't need your permission to protect my private property!"
10025050-58 = "Just step aside, officer. I'll get rid of these rats in 10 minutes."
10025050-59 = "Who are you calling a rat? Let's get this over with!"
10025050-65 = "[ns] \"Please, this is all just a misunderstanding!\""
10025050-66 = "Nah, I understand perfectly."
10025050-67 = "You girls trespassed in my drying workshop and tried to steal my fish. It's clear as day."
10025050-68 = "This is a drying workshop?"
10025050-69 = "The fish here are all spoiled! You can't trick us with such an obvious lie!"
10025050-70 = "Hey, it's not spoiled, it's—"
10025050-71 = "[s] \"He's making kusaya sauce.\""
10025050-72 = "Kusaya...sauce...?"
10025050-74 = "They cure mackerel in this stinky brine, then dry it."
10025050-75 = "It's not too popular in the D.U., but it's one of Yatoura Village's specialties."
10025050-76 = "They tell me it's real good, but I'm not putting anything that smells like THAT near my mouth..."
10025050-77 = "You've been here how long, and you still can't eat kusaya?"
10025050-78 = "I'm allowed to have my own preferences!"
10025050-85 = "You, there. You know about kusaya."
10025050-86 = "But we don't export the stuff, so I doubt you'd find it in your fancy city..."
10025050-87 = "[s1] \"I have a few students who are interested in rare delicacies.\"\n[s2] \"Let's just say there's a story behind my kusaya tasting...\""
10025050-91 = "But what about those things we heard you say!"
10025050-92 = "You said the town would be consumed by darkness, and that a fisherman was hurt!"
10025050-94 = "Consumed by... Huh?"
10025050-95 = "Oh, you mean the broken streetlights."
10025050-96 = "The weather out here does a number on the old power lines. Some of the streetlights in town have started going out."
10025050-97 = "When the sun goes down, it gets so dark you can't see your own feet."
10025050-98 = "One of the rookie fishermen tripped on a rock and hurt his leg."
10025050-99 = "I've sent a few repair requests to the district office, since it's a major safety issue..."
10025050-100 = "They say they're shorthanded and we just have to wait, but it's been over a month..."
10025050-102 = "S-So...they didn't mean that the land would sink into the ocean... Thank goodness..."
10025050-104 = "But what were you doing out here so early in the morning, anyway?"
10025050-105 = "We were going for a nighttime stroll and saw someone suspicious. So we followed him."
10025050-106 = "He didn't look like a villager, but he was carrying a fishing rod. We thought maybe he was fishing without a license..."
10025050-110 = "Ah, that guy..."
10025050-111 = "He's been pestering everyone in town for fishing lessons."
10025050-112 = "I know he looks shifty, but he's got all the permits and licenses and whatnot he needs."
10025050-113 = "[s3] \"It may have been a misunderstanding, but I'm sorry for any trouble.\"\n[s4] \"I apologize on behalf of my students.\""
10025050-119 = "...All right, fellas. Let's move along."
10025050-120 = "We've got a lot of work to do if we aim to get on the water before sun up."
10025050-121 = "If you miss today's shrimp 'cause you were picking fights with tourists, you'll be the laughing stock of the village."
10025050-122 = "Yeah, yeah."
10025050-129 = "[ns] \"So... Tense night, huh?\""
10025050-130 = "I'm sorry..."
10025050-131 = "A squad leader should assess the situation with a calm and collected eye. This was all my fault..."
10025050-132 = "I tried to maintain control, but as the conflict escalated, it was almost as if I was possessed..."
10025050-133 = "...until I believed that the village was home to some sort of cult conspiracy."
10025050-134 = "It happened to me, too. From the beginning, I was sure it was all a bunch of superstitious nonsense."
10025050-135 = "As I saw and...smelled...more, though, even I started to think the legends could be real."
10025050-136 = "N-No, it's all my fault... I kept saying these terrible things...picking and picking at my fears..."
10025050-137 = "I should have just kept my mouth shut..."
10025050-139 = "Nah. We were all thinking it. You were the only one brave enough to say it out loud."
10025050-140 = "It's not really anyone's fault."
10025050-142 = "...It was a nonsensical conclusion for us to jump to."
10025050-143 = "If the villagers are talking about darkness, of course they mean the streetlights. If we see fermented fish, of course it's some kind of seafood."
10025050-144 = "Instead, we assumed it was some kind of religious sacrifice to an abomination from the depths."
10025050-145 = "What made us jump to these crazy assumptions this time?"
10025050-146 = "We weren't actually under this town's spell, were we?"
10025050-147 = "[s] \"I have a feeling you had too much information.\""
10025050-148 = "...So like, information overload?"
10025050-149 = "Well, we did end up going over a bunch of folk tales that wouldn't normally make it into an investigation brief."
10025050-150 = "Back in the city, we'd look at accident reports and incident logs, but all we had to go on here were spooky stories from the locals."
10025050-151 = "Yeah, I'm looking at our meeting minutes now, and it's covered in talk about the Deep Ones. It looks more like a horror movie script than an SRT investigation..."
10025050-152 = "Also, I couldn't stop thinking about something that guy from Red Hook Express said..."
10025050-153 = "Even now, I can hear his voice..."
10025050-155 = "I know that misinformation can lead to misunderstandings and stop you from thinking rationally, but..."
10025050-156 = "[s] \"It's possible that you're all just tired, too.\""
10025050-158 = "Tired? Just from this?"
10025050-159 = "We all went through SRT's harsh training! You think this is enough to tire us out?"
10025050-160 = "[s] \"Well, there's physical exhaustion, and then there's mental exhaustion.\""
10025050-161 = "And you think we have mental exhaustion?"
10025050-162 = "[s5] \"SRT squads are always dealing with conspiracies and plots...\"\n[s6] \"If you're always looking at everyone with suspicion, of course you'll get tired.\""
10025050-165 = "Can you blame us? People are driven by instinct, pure and simple."
10025050-166 = "Even the biggest conspiracies in Kivotos started with someone who wanted something."
10025050-167 = "...It sounds like you're describing yourself, Moe."
10025050-168 = "You'd be surprised at how...off-the-cuff the people in charge can get when they think nobody's watching. Heeheehee..."
10025050-169 = "[s7] \"If you're always expecting conspiracies, you'll see them around every corner.\"\n[s8] \"Try looking at the village again, but with fresh eyes this time.\""
10025050-173 = "But if there really is a conspiracy, then we need to do something about that."
10025050-174 = "It's my duty as a student of SRT Academy."
10025050-175 = "How can we even tell if there's a conspiracy or if it's all in our heads?"
10025050-176 = "[s] \"You need to take a step back and start fresh.\""
10025050-177 = "..."
10025050-178 = "[s] \"First things first: You need some rest!\""
10025050-182 = "[ns9] \"We're at the ocean, so let's take some time to enjoy it.\"\n[ns10] \"Don't think about Deep Ones or Shallow Ones or anything in between.\""
10025050-185 = "...All right."
10025050-186 = "Squad, that concludes our mission for today."
10025050-187 = "Thank you all for working so late."
10025050-189 = "Good work, everyone."

[translation]
10025050-1 = "第5話;未知的恐懼"
10025050-11 = "呿……這些傢伙，看來不是泛泛之輩啊。"
10025050-12 = "不過終究是網中之魚。#n一旦進到網中就無處可逃。"
10025050-13 = "喂，熊谷。把第3碼頭的人也叫來！"
10025050-14 = "現在還沒到出港時間，大家應該都還在才對。"
10025050-19 = "唔……村民們接二連三湧了上來……"
10025050-20 = "就算火力是我們有優勢，再這樣下去會被包圍……"
10025050-21 = "可惡……障礙物太多害得火力都……被他們爭取到時間的話，增援又會再來的！"
10025050-22 = "RABBIT1，該怎麼做？#n子彈剩的也不多了。"
10025050-24 = "…………"
10025050-27 = "（對付使用掩體的敵人，以空中火力加以擊潰是正攻法沒錯，#n　不過這樣一來會連周邊的設施也遭受損害……）"
10025050-28 = "（但是，如果這個村子真的是崇拜著可疑存在，且進行著未知儀式的地方……） "
10025050-29 = "（就沒有必要考慮造成的損害……）"
10025050-34 = "RABBIT3，還有[ruby=高爆空炸彈]HE-AB[/ruby]嗎？"
10025050-35 = "嗯。為了應付這類情況，還剩下幾發哦。"
10025050-36 = "將HE炸彈在空中引爆，強迫躲藏在遮蔽物的敵方移動。"
10025050-37 = "指定座標為──"
10025050-44 = "[ns]「大家，先等一下！」"
10025050-45 = "這個聲音是……"
10025050-46 = "……[USERNAME]老師？"
10025050-53 = "唉……怎麼又在大清早起爭議？#n真是講不聽呢……"
10025050-54 = "我們不是再三叮嚀過，如果跟外地人發生衝突的話請跟我們說一聲嗎……#n要是申訴直接傳到高層耳中，有麻煩的可是我們哦？"
10025050-56 = "哼，不過是驅逐老鼠而已，何必大驚小怪。"
10025050-58 = "10分鐘就夠了。#n要在一旁看著倒無所謂，可別來礙事啊。"
10025050-59 = "哈啊！？你說是誰要驅逐誰……！？"
10025050-65 = "[ns]「看來各位好像有點誤會。」"
10025050-66 = "……你說誤會？"
10025050-67 = "潛入別人家的曬魚場，不就是打算來偷魚嗎？#n這哪裡是誤會？"
10025050-68 = "曬魚場……？"
10025050-69 = "排放著一堆腐壞魚的這裡怎可能會是曬魚場！？"
10025050-70 = "都說了，這些不是腐壞的魚──！"
10025050-71 = "[s]「是『臭魚乾』對吧。」"
10025050-72 = "臭魚，乾……？"
10025050-74 = "是使用竹莢魚之類的魚類製成的一種發酵食品。"
10025050-75 = "儘管在D.U.幾乎沒人知道，不過這在夜戶浦村是僅次於蝦子的特產品。"
10025050-76 = "雖然因為它強烈的臭味，我們也還不敢吃就是了……哈哈。"
10025050-77 = "都來這裡多久了居然還不敢吃……所以我才說外地人實在是……"
10025050-78 = "每個人都會有一兩個喜歡或不喜歡的東西吧！？"
10025050-85 = "……居然會有人知道臭魚乾，真不簡單。"
10025050-86 = "明明因為批發量不多，就連D.U.也很少有店在賣的。"
10025050-87 = "[s1]「因為身邊有很多喜歡美食的學生……」\n[s2]「由於各種原因，有機會接觸到它……」"
10025050-91 = "可，可是疑點可不只這個哦！？"
10025050-92 = "像是漁夫受傷，還有村子被黑暗吞噬之類的……#n這些又該怎麼解釋？"
10025050-94 = "受傷……村子被黑暗……？"
10025050-95 = "啊啊，是在說路燈故障的事吧。"
10025050-96 = "不知道是不是海風導致電線損壞，這一帶的路燈都故障了……"
10025050-97 = "所以只要太陽一下山，村子就會黑的伸手不見五指。"
10025050-98 = "而有個新手漁夫在天亮前進行出海準備時跌了一跤。#n簡單來說就是這樣。"
10025050-99 = "由於會直接關係到村民的安全，#n所以已經多次聯絡本部，希望能盡快派員來修理，不過……"
10025050-100 = "本部卻以人手不足為由，就這樣置之不理了一個月。"
10025050-102 = "原來不是陸地會下沉，或是被從漆黑的海底出現的謎樣生物襲擊啊……#n太好了……"
10025050-104 = "那你們又是為了什麼目的接近這個地方的？"
10025050-105 = "我們在海邊散步時發現了可疑的人影，於是便一路追著他。"
10025050-106 = "雖然帶著釣具，不過不像是村裡的居民，我們懷疑他是不是在進行某些非法行為……"
10025050-110 = "啊啊，那傢伙啊。"
10025050-111 = "最近的確有個傢伙會纏著村民們教他釣魚。"
10025050-112 = "雖然有點奇怪，不過他確實擁有正式的釣魚許可證……#n不必過度擔心。"
10025050-113 = "[s3]「雖然是場誤會，還是很抱歉給您添麻煩了。」\n[s4]「請容許我替學生們向您致歉。」"
10025050-119 = "……今天就先不追究了。"
10025050-120 = "畢竟得在日出之前出海才行。#n也該開始進行出發前的檢查了。"
10025050-121 = "要是被雜事耽誤導致重要的蝦子逃跑，可就真要成為全村的笑柄了。"
10025050-122 = "說的也是……我這就去準備。"
10025050-129 = "[ns]「以各位來說，今天還真是少見的衝動呢。」"
10025050-130 = "……非常抱歉。"
10025050-131 = "本應認清情況、避免無謂衝突的我們，卻主動採取可能引起戰鬥的行動……#n是我的失態。"
10025050-132 = "雖然有注意不要失去冷靜，卻因為過度專注於眼前的戰鬥……"
10025050-133 = "……武斷地認定這個村子很可疑。"
10025050-134 = "不，這點我也一樣。#n直到戰鬥開始前，我認為一切只不過是村民們編造的謊言……"
10025050-135 = "結果卻被惡臭所迷惑，無意間將傳說信以為真。"
10025050-136 = "對，對不起……#n都是因為我一直說著不吉利的話，才會影響大家的判斷……"
10025050-137 = "如果早知道會這樣，我就該安靜地閉上嘴才對……"
10025050-139 = "大家雖然嘴上不承認，不過腦袋裡想的都一樣。"
10025050-140 = "這不是美優的錯，是我們所有人的責任。"
10025050-142 = "……冷靜之後回頭想想，我們為何會產生那種想法呢。"
10025050-143 = "不管是路燈還是醃漬物的事，都是因為過度的懷疑導致判斷出錯。"
10025050-144 = "完全被村裡的傳說和祭品吸引了注意力……"
10025050-145 = "這也是因為某些原因嗎？"
10025050-146 = "難道說，這個村子真的有迷惑人心的[ruby=  ・     ・     ・     ・  ]某種東西[/ruby]存在嗎？"
10025050-147 = "[s]「會不會是因為獲得的情報太多了呢？」"
10025050-148 = "情報過多……是嗎？"
10025050-149 = "在這次任務中，確實在調查階段就聽見了許多村子的傳說。"
10025050-150 = "本來應該專注於調查內容才對，#n後來卻莫名關注起信仰和傳說相關的話題也是原因之一吧。"
10025050-151 = "第一天的報告書也以「深處的存在」的內容為中心，#n這與其說是SRT的調查紀錄，反而更像是鄉野調查吧。"
10025050-152 = "而我也太過在意……那個海運業者白天說的話了……"
10025050-153 = "總覺得他的聲音還在我耳邊徘徊……"
10025050-155 = "明知錯誤的成見會影響正確的判斷……"
10025050-156 = "[s]「除此之外，平時的疲勞也是原因之一吧？」"
10025050-158 = "什麼疲勞……是不是太小看我們了？"
10025050-159 = "難道克服SRT特殊學園嚴苛訓練的我們，會因為那點小事就出錯嗎？"
10025050-160 = "[s]「就算身體不累，精神也可能會疲勞的哦。」"
10025050-161 = "精神疲勞……？"
10025050-162 = "[s5]「因為SRT經常要投入戰鬥……」\n[s6]「所以很少有能夠輕鬆度過的時間對吧。」"
10025050-165 = "說的也是。#n人類本來就是遵循本能行動的生物。"
10025050-166 = "就連讓整個奇普托斯陷入危機的大事件，最初的契機或許也只是純粹的欲望。"
10025050-167 = "……只有對萌才是這樣吧。"
10025050-168 = "這可不好說哦？如果知道上頭的人在做決定的時候有多隨興……#n我想大家一定會嚇一跳的唷？咯嘻嘻……"
10025050-169 = "[s7]「這就是所謂的杯弓蛇影，對吧。」\n[s8]「試著稍微放鬆一點看待這座村子可能會比較好哦。」"
10025050-173 = "不過……如果杯子裡真的有蛇就不妙了。"
10025050-174 = "身為SRT特殊學園的一員，不能對那樣的危險因子坐視不管。"
10025050-175 = "杯中的究竟是蛇是影……#n沒有能夠確認的好方法嗎？"
10025050-176 = "[s]「只要疑問消散，自然就會知道了吧。」"
10025050-177 = "…………"
10025050-178 = "[s]「總之大家先休息吧。」"
10025050-182 = "[ns9]「難得來到海邊，現在就該好好享樂才對！」\n[ns10]「暫時先把深處的什麼東西給忘了吧！」"
10025050-185 = "……我明白了。"
10025050-186 = "那麼，本日的夜間作戰到此結束。"
10025050-187 = "……辛苦大家忙到深夜了。"
10025050-189 = "辛苦了！"

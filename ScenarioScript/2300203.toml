[translation]
2300203-1 = "失眠症"
2300203-2 = "保健室"
2300203-3 = "你好，老師！"
2300203-4 = "為了昨晚一定還是沒睡好的老師，我已經把床鋪好了！"
2300203-5 = "雖然只能睡30分鐘，但如果能在柔軟的床上好好睡一覺，一定能有效消除疲勞的。"
2300203-6 = "[s] 「可是，在上班時間睡午覺有點……」"
2300203-7 = "午覺對身體有很大的好處唷！"
2300203-8 = "睡眠不足的人只要睡了午覺，不只能消除疲勞，還有助於恢復專注力呢。"
2300203-9 = "所以這也是為了工作著想，請吧！"
2300203-10 = "[s] 「那我稍微小睡一下吧……」"
2300203-11 = "是！躺上床之後，我也會協助老師進入熟睡。"
2300203-13 = "瞄準頸動脈，盡可能用力……！"
2300203-16 = "老師，請不要亂動！我差點就要打到臉上了啦！？"
2300203-17 = "[s] 「不不不不，你在幹嘛！？」"
2300203-18 = "咦？我只是想把老師弄昏，讓老師能好好睡上一覺……？"
2300203-19 = "我有在書上看過，只要打擊頸動脈，就能讓人毫無疼痛地立刻昏過去。"
2300203-20 = "午休快結束時，我會確實叫醒老師的，請老師安心睡覺吧！"
2300203-21 = "[s1] 「這和睡覺好像不太一樣啊！」\n[s2] 「沒有專家在場請勿模仿好嗎！」"
2300203-22 = "這樣啊──。那個，不然還有其他方法……"
2300203-23 = "這樣啊──。那個，不然還有其他方法……"
2300203-24 = "那麼，要不要試試能讓大象瞬間倒下的麻醉劑呢？"
2300203-25 = "雖然會有點刺痛，但絕對一針見效唷～ ☆"
2300203-26 = "……這方法也不行嗎？好吧……。#n那就只剩下有助睡眠的草本茶了……"
2300203-27 = "[s] 「草本茶就很好了……」"
2300203-28 = "真的這樣就可以了嗎？"
2300203-29 = "那我馬上去泡茶，請等我一下！"
2300203-31 = "（之後，我喝了花繪泡的溫暖草本茶，在保健室睡了一場舒服的午覺）"

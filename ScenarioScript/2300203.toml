[translation]
2300203-1 = "โรคนอนไม่หลับ"
2300203-2 = "ห้องพยาบาล"
2300203-3 = "ยินดีต้อนรับค่ะ คุณครู!"
2300203-4 = "ฉันเตรียมปูที่นอนไว้ให้แล้วค่ะ เมื่อคืนเห็นคุณครูนอนไม่ค่อยหลับน่ะค่ะ!"
2300203-5 = "แม้จะเป็นเวลาสั้นๆ เพียง 30 นาที ถ้าได้นอนบนผ้าห่มนุ่มๆ ก็จะช่วยลดความเหนื่อยล้า#nได้ระดับหนึ่งเลยนะคะ"
2300203-6 = "[s] \"แต่ให้มานอนกลางวันในเวลางาน มันค่อนข้างจะ...\""
2300203-7 = "การนอนกลางวันดีต่อร่างกายมากนะคะ!"
2300203-8 = "การนอนหลับไม่เพียงช่วยลดความเหนื่อยล้า แต่ยังช่วยเพิ่มสมาธิด้วยนะคะ"
2300203-9 = "เพราะอย่างนั้นไม่ต้องเป็นห่วงและนอนหลับได้เลยค่ะ!"
2300203-10 = "[s] \"ถ้างั้นขอพักสายตาหน่อยนะ...\""
2300203-11 = "ได้เลยค่า! คุณครูนอนลงที่เตียงนี้แล้วฉันจะช่วยให้หลับสบายเองค่ะ"
2300203-13 = "เอาล่ะ เล็ง...ไปที่เส้นเลือดแดงที่ลำคอ...!"
2300203-16 = "คุณครู อย่าขยับสิคะ! ฉันเกือบพลาดไปโดนหน้าแล้ว!"
2300203-17 = "[s] \"ทำอะไรน่ะ!\""
2300203-18 = "คะ? ฉันแค่พยายามทำให้คุณครูสลบจะได้หลับสนิทยังไงล่ะคะ"
2300203-19 = "ฉันอ่านเจอในหนังสือ ถ้าตีเส้นเลือดแดงที่ลำคอแรงๆ จะทำให้คนสลบได้แบบไม่เจ็บปวดเลยค่ะ"
2300203-20 = "ฉันจะปลุกตอนที่หมดเวลาพักกลางวันให้นะคะ ไม่ลืมแน่นอน คุณครูทำใจให้สบายและพักผ่อน#nให้เต็มที่เลยค่ะ!"
2300203-21 = "[s1] \"อย่างนั้นไม่ใช่หลับสนิทแล้ว...\"\n[s2] \"มันอันตรายนะ พอได้แล้ว!\""
2300203-22 = "ฮิฮิ... ยังมีวิธีอื่นอีก..."
2300203-23 = "ฮิฮิ... ยังมีวิธีอื่นอีก..."
2300203-24 = "ถ้างั้นลองใช้ยาชาที่ทำให้ช้างสลบได้ในครั้งเดียวเป็นไงคะ?"
2300203-25 = "ถึงถูกเข็มแทงจะเจ็บจี๊ดนิดๆ แต่มันได้ผลแน่นอนพอๆ กับไม้เบสบอลเลยค่ะ~ ☆"
2300203-26 = "...แบบนั้นก็ไม่ถูกใจเหรอคะ? ถ้างั้นก็เหลืออยู่วิธีเดียวคือ ดื่มชาสมุนไพรที่ช่วยให้นอนหลับ..."
2300203-27 = "[s] \"ชาสมุนไพรก็พอแล้ว\""
2300203-28 = "มีวิธีดีๆ อีกตั้งเยอะเลย จะเลือกใช้วิธีนี้จริงๆ เหรอคะ?"
2300203-29 = "ถ้างั้นฉันจะไปชงชาสมุนไพรมาให้ค่ะ รอสักครู่นะคะ!"
2300203-31 = "หลังจากนั้นคุณครูก็ดื่มชาสมุนไพรร้อนๆ ที่ฮานาเอะชงมาให้ และนอนหลับในห้องพยาบาลอยู่สักพัก"

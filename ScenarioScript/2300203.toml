[translation]
2300203-1 = "Insomnia"
2300203-2 = "Infirmary"
2300203-3 = "Welcome, Sensei!"
2300203-4 = "I've prepared a blanket for you to sleep on, since you didn't sleep well last night!"
2300203-5 = "Even if it's only thirty minutes, a little nap on a comfy blanket should clear all of your fatigue."
2300203-6 = "[s] \"But taking a nap while working is a bit...\""
2300203-7 = "Napping is very healthy for you!"
2300203-8 = "Naps dispose of fatigue for people that lack sleep, and they also increase concentration."
2300203-9 = "So don't worry and sleep tight!"
2300203-10 = "[s] \"Maybe I'll sleep for just a bit...\""
2300203-11 = "Okay! Lie down so that I can help you sleep."
2300203-13 = "Now focus...on the carotid artery..."
2300203-16 = "Sensei, don't move! I almost hit you in the face by mistake!"
2300203-17 = "[s] \"What are you doing?!\""
2300203-18 = "What? I'm just trying to knock you out so you can sleep tight."
2300203-19 = "I read in a book that if you hit a person's carotid artery hard, they'll faint right away without any pain."
2300203-20 = "I'll wake you up when lunch is over, so you can sleep peacefully!"
2300203-21 = "[s1] \"That's not sleep...\"\n[s2] \"Stop it, that's dangerous!\""
2300203-22 = "Another method would be..."
2300203-23 = "Another method would be..."
2300203-24 = "Okay, why don't you use this anesthetic? It's powerful enough to knock out an elephant instantly!"
2300203-25 = "The injection is gonna sting a little, but it'll be super effective! ☆"
2300203-26 = "You don't want that either? Then the only thing left is herbal tea to help you sleep tight..."
2300203-27 = "[s] \"Herbal tea is fine.\""
2300203-28 = "But there are so many better ways! Are you sure you want tea?"
2300203-29 = "Then I'll get some herbal tea right away. Please give me a moment!"
2300203-31 = "Later, I drank Hanae's warm herbal tea and took a nap in the infirmary for a while."

[translation]
2300203-1 = "#title;불면증"
2300203-2 = "#place;양호실"
2300203-3 = "3;하나에;03;어서오세요, 선생님!\n#3;a\n#3;hophop\n#3;em;[반짝]"
2300203-4 = "3;하나에;00;어젯밤도 잠을 설치셨을 선생님을 위해 제가 미리 이부자리를 깔아두었답니다!\n#3;greeting"
2300203-5 = "3;하나에;01;30분 밖에 안 되는 짧은 시간이지만, 푹신한 이불 위에서 주무시면 피로가 한층 가실 거예요."
2300203-6 = "[s] \"하지만 근무 중에 낮잠을 자는 건 조금…….\""
2300203-7 = "3;하나에;05;낮잠이 몸에 얼마나 이로운데요!\n#3;hophop\n#3;em;[!]"
2300203-8 = "3;하나에;00;수면이 부족한 사람에게 낮잠은 피로를 풀어줄 뿐만 아니라 집중력을 향상시켜 주는 효과도 있다고요."
2300203-9 = "3;하나에;03;그러니 걱정 말고 푹 주무세요!\n#3;greeting\n#3;em;[반짝]"
2300203-10 = "[s] \"그럼 잠깐만 눈을 붙일까…….\""
2300203-11 = "3;하나에;02;네! 침대에 누워 계시면 제가 숙면을 취하실 수 있도록 도와드릴게요.\n#3;jump"
2300203-12 = "#all;hide"
2300203-13 = "#na;하나에;자, 조준하시고…… 경동맥을 향해 힘껏……!"
2300203-14 = "3;하나에;01\n#3;h"
2300203-15 = "3;하나에;01\n#3;shake\n#bgshake\n#wait;1000"
2300203-16 = "3;하나에;05;선생님, 움직이지 마세요! 실수로 안면을 가격할 뻔 했잖아요!\n#3;jump\n#3;em;[반응]"
2300203-17 = "[s] \"뭐 하는 짓이야!\""
2300203-18 = "3;하나에;02;네? 저는 그저 선생님이 푹 주무실 수 있도록 기절시켜드리려는 것뿐인걸요?\n#3;em;[?]"
2300203-19 = "3;하나에;99;책에서 읽었는데, 사람의 경동맥을 세게 가격하면 고통 없이 바로 기절할 수 있대요."
2300203-20 = "3;하나에;03;점심시간이 끝나면 제가 잊지 않고 깨워 드릴 테니, 선생님은 안심하고 숙면을 취하세요!\n#3;hophop\n#3;em;[반짝]"
2300203-21 = "[s1] \"그건 숙면이 아니야…….\"\n[s2] \"위험하니까 그만둬!\""
2300203-22 = "3;하나에;04;에에…… 다른 방법이라면…….\n#3;stiff"
2300203-23 = "3;하나에;04;에에…… 다른 방법이라면…….\n#3;stiff"
2300203-24 = "3;하나에;02;그럼 코끼리도 한 번에 기절시킬 수 있는 이 마취약을 써보는 건 어떠세요?\n#3;greeting"
2300203-25 = "3;하나에;00;주삿바늘이 조금 따갑긴 하지만, 효과는 야구방망이만큼이나 확실하다고요~ ☆\n#3;em;[반짝]"
2300203-26 = "3;하나에;06;……그것도 마음에 안 드세요? #n그럼 남은 방법은 숙면에 도움이 되는 허브차를 마시는 것 정도밖에 없는데…….\n#3;stiff"
2300203-27 = "[s] \"허브차면 충분해.\""
2300203-28 = "3;하나에;02;더 좋은 방법이 많은데, 정말 그걸로 괜찮으시겠어요?"
2300203-29 = "3;하나에;03;그럼 제가 바로 허브차를 타올 테니 잠깐만 기다리고 계세요!\n#3;greeting\n#3;em;[반짝]"
2300203-30 = "#all;hide"
2300203-31 = "#na;이후, 하나에가 타온 따듯한 허브차를 마시고 양호실에서 한동안 낮잠을 잤다."

[translation]
10023050-1 = "ตอนที่ 5;เดี๋ยวดี เดี๋ยวร้าย แต่หัวใจจอมโจร"
10023050-2 = "จอมโจร...?"
10023050-3 = "... แห่งความเสน่หา?"
10023050-4 = "นั่นมัน..."
10023050-5 = "กิจกรรมพบศัตรูโดยบังเอิญค่ะ!"
10023050-9 = "......!"
10023050-18 = "อ๊ะ...? คุณโทคิรีบวิ่งขึ้นบันไดไปแล้ว...!"
10023050-20 = "......"
10023050-22 = "......"
10023050-24 = "เป็นการเคลื่อนไหวที่คล่องแคล่วมากเลยนะคะ แค่นี้ก็งดงามแล้วค่ะ"
10023050-25 = "?  คุณต้องใส่ใจด้วยเหรอคะว่าการเคลื่อนไหวของฉันมันเป็นยังไง?"
10023050-26 = "... ฉันชมคุณนะคะ"
10023050-27 = "ถ้างั้นฉันต้องกล่าวขอบคุณกลับไหมคะ?"
10023050-31 = "คุยกันด้วยสุนทรียศาสตร์ไม่เข้าใจสินะคะ ก็ดีค่ะ"
10023050-33 = "?? ยิ่งพูดยิ่งไม่เข้าใจค่ะ..."
10023050-34 = "อีกอย่าง ฉันกำลังหาสิ่งที่เรียกว่า <มงกุฎ> ที่ถูกขโมยไปอยู่ค่ะ คุณพอจะรู้จักไหมคะ?"
10023050-35 = "ทำไมถึงมาถามฉันล่ะคะ?"
10023050-36 = "ก็คุณเป็นโจรนี่คะ"
10023050-37 = "......"
10023050-38 = "ฉันพลาดแล้วสินะคะ หรือว่าฉันต้องเรียกว่าคุณจอมโจรถึงจะถูก?"
10023050-39 = "ไม่หรอกค่ะ"
10023050-40 = "แค่นี้ก็เพียงพอแล้วค่ะ"

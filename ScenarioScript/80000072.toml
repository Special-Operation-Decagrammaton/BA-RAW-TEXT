[translation]
80000072-1 = "溫暖的心"
80000072-2 = "大教堂．外圍祕密道路"
80000072-3 = "（在感覺工作將要結束的時間去了教堂）"
80000072-10 = "哼哼～哼哼～哼哼哼～～♪"
80000072-11 = "……嗯，這樣就差不多了吧。#n果然打掃乾淨就會讓人覺得身心舒暢呢。"
80000072-12 = "這麼說來，以前老師總是會在這種時機出──"
80000072-13 = "[s1]「辛苦了，日向。」\n[s2]「你突然轉過頭來讓我嚇了一跳。」"
80000072-19 = "……老，老師！？"
80000072-20 = "嚇我一跳，沒想到您真的來了……！！"
80000072-21 = "莫，莫非我剛剛的自言自語和哼歌都……#n嗚嗚，真，真害羞……！"
80000072-22 = "……嗯？是，是嗎？"
80000072-23 = "如果我看起來很開心，那或許是因為……"
80000072-24 = "不，沒事，什麼也沒有。話說回來，老師今天過來有什麼事呢……？"
80000072-25 = "……情人節？"
80000072-26 = "啊，對，對耶！#n不知不覺就到這天了……！"
80000072-27 = "對，對不起！#n明明想要提前準備的，一不小心就專注在教堂的工作了……！"
80000072-28 = "[s3]「抱，抱歉，我不是來跟你討巧克力的……」\n[s4]「日向真的一直都很認真呢，真了不起。」"
80000072-29 = "謝，謝謝您這麼說……#n不過畢竟是難得的節日，還是想送點禮物給老師……"
80000072-30 = "謝，謝謝您這麼說……#n不過畢竟是難得的節日，還是想送點禮物給老師……"
80000072-34 = "……啊！請，請您稍等一下！！"
80000072-41 = "……讓，讓您久等了！老師，請收下……！"
80000072-46 = "[ns5]「巧克力球……？」\n[ns6]「好像有點可愛？」"
80000072-47 = "是，是的。本來是送給來教堂的孩子們的……"
80000072-48 = "是，是的。本來是送給來教堂的孩子們的……"
80000072-49 = "啊，數量還非常多，請您放心。#n雖然是現成的東西，不過我想還是該盡己所能，所以選了老師可能會喜歡的口味……"
80000072-50 = "……咦？啊，是，是的。所有種類我都有吃過。#n為了配合孩子們的喜好，所以有必要事先了解。"
80000072-51 = "平時其實不會吃那麼多的……"
80000072-52 = "[s]「日向真的很溫柔呢。」"
80000072-53 = "您，您過獎了！#n這沒什麼……"
80000072-54 = "話，話說回來，老師有不喜歡的口味嗎？#n雖然我選了好幾種……"
80000072-55 = "……這，這樣啊。"
80000072-56 = "那我就放心了……！"
80000072-57 = "太好了……"
80000072-61 = "……呵呵。"
80000072-63 = "（之後便和日向一起津津有味地吃著巧克力）"

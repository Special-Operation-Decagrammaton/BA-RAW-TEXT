[translation]
80000072-1 = "หัวใจที่อบอุ่น"
80000072-2 = "ทางลับด้านนอกมหาวิหาร"
80000072-3 = "(คุณครูมาที่วิหารในช่วงที่คนไม่พลุกพล่าน)"
80000072-10 = "ลัล~ ลัลลัลล้า~ ลัลลัลลา~~"
80000072-11 = "งานจัดเรียงวันนี้ก็เสร็จเกือบหมดแล้วนะคะ พอวิหารดูสะอาดตาแบบนี้ ก็รู้สึกมีความสุขมากเลยนะคะ"
80000072-12 = "แต่ไม่รู้ทำไมฉันถึงรู้สึกเหมือน... เวลารู้สึกแบบนี้ทีไรก็มักเป็นตอนที่คุณครูแวะมา...?"
80000072-13 = "[s1] \"แม่นมากเลย ฮินาตะ\"\n[s2] \"ความรู้สึกไวขึ้นกว่าเมื่อก่อนอีกนะเนี่ย\""
80000072-19 = "เอ๊ะ... เอ๋?"
80000072-20 = "เอ๋...? คุณครู...!? ฉะ... ฉันไม่นึกว่าคุณครูจะมาที่นี่จริงๆ...!!"
80000072-21 = "ที่พูดไปเมื่อกี้ ได้ยินหมดเลยงั้นเหรอคะ...? ได้ยินเสียงฮัมเพลงด้วย...? นะ...น่าอายจังเลยค่ะ...!!"
80000072-22 = "คุณครูดีใจที่เห็นฉันสนุกกับการทำงานเหรอคะ?"
80000072-23 = "ยะ...อย่างนั้นเหรอคะ? ค่อยยังชั่วหน่อยค่ะ..."
80000072-24 = "แต่ว่าคุณครู... มีธุระอะไรถึงมาที่นี่เหรอคะ"
80000072-25 = "...อ่า วันวาเลนไทน์..."
80000072-26 = "อึก จะ...จริงด้วยค่ะ วันนี้เป็นวันวาเลนไทน์นี่คะ ฉันไม่ได้คิดถึงเรื่องนั้นเลย...!!"
80000072-27 = "ขะ... ขอโทษด้วยค่ะคุณครู! วันนี้ฉันควรเตรียมพร้อมไว้ก่อนแท้ๆ แต่ฉันมัวแต่ทำงานจนลืมไปสนิทเลย#nค่ะ...!!"
80000072-28 = "[s3] \"ครูไม่ได้มาเพราะเรื่องนั้นสักหน่อย\"\n[s4] \"ฮินาตะเป็นแบบตอนนี้ก็ดีแล้ว\""
80000072-29 = "ขะ... ขอบคุณที่พูดแบบนั้นนะคะ... แต่ว่า... วันวาเลนไทน์แท้ๆ..."
80000072-30 = "ขะ... ขอบคุณที่พูดแบบนั้นนะคะ... แต่ว่า... วันนี้น่ะ..."
80000072-34 = "...อ๊ะ! ระ... รอสักครู่นะคะ!! รบกวนรอสักครู่นะคะ!!"
80000072-41 = "...ฮู่ว เจอแล้ว!! คุณครูคะ ยะ...อย่างน้อยรบกวนรับนี่ไว้นะคะ!!"
80000072-46 = "[ns5] \"ช็อกบอลสำหรับเด็ก!?\"\n[ns6] \"เซ็ตช็อกบอล!\""
80000072-47 = "ใช่ค่ะ อันที่จริงเป็นช็อกโกแลตที่ซื้อเตรียมไว้ให้เด็กๆ ที่มาที่โบสถ์ค่ะ"
80000072-48 = "ใช่ค่ะ เป็นช็อกโกแลตที่ซื้อเตรียมไว้ให้เด็กๆ ที่มาที่โบสถ์ค่ะ"
80000072-49 = "คะ? อ๊ะ ไม่เป็นไรค่ะ ยังมีอีกเยอะเลยค่ะ ที่จริงมีถึง 8 รสเลยค่ะ แต่ฉันเลือกมาเฉพาะรสที่คิดว่าคุณครู#nน่าจะชอบค่ะ"
80000072-50 = "คะ? ฉันเคยชิมทุกรสแล้วรึยังน่ะเหรอคะ? ค่ะ ฉันเคยชิมมาหมดแล้วค่ะ ฉันควรรู้จักรสชาติพวกนั้นก่อน เพื่อจะให้ขนมที่เหมาะกับนิสัยและความชอบของเด็กๆ ได้ค่ะ"
80000072-51 = "ทะ... ที่จริง... ฉันไม่ได้ชอบช็อกโกแลตขนาดนั้นหรอกนะคะ ฮ่าฮ่าฮ่า..."
80000072-52 = "[s] \"ฮินาตะเป็นคนเอาใจใส่จังเลยนะ\""
80000072-53 = "ระ...เรื่องนั้น... เปล่าสักหน่อยค่ะ คะ...แค่เรื่องแบบนี้... เป็นคนเอาใจใส่เหรอคะ...!!"
80000072-54 = "ช็อกบอลรสชาติถูกปากรึเปล่าคะ? หวังว่าคุณครูจะชอบรสที่ฉันเลือกมานะคะ..."
80000072-55 = "...คะ? คุณครูชอบทุกรสเลยเหรอคะ?"
80000072-56 = "โล่งอกไปที... ค่อยยังชั่วหน่อยค่ะ"
80000072-57 = "ฮู่ว..."
80000072-61 = "...ฮิฮิ"
80000072-63 = "(หลังจากนั้นคุณครูกับฮินาตะก็แบ่งช็อกบอลสำหรับเด็กกินด้วยกัน)"

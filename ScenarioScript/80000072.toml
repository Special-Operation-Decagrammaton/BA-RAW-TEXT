80000072-46 = "[ns5] \"Chocolate truffles... for kids?!\"\n[ns6] \"Ooh, a set of chocolate truffles!\""
80000072-47 = "Yes, I make sure to keep a supply on hand for children who visit the cathedral."
80000072-48 = "Yes, I make sure to keep a supply on hand for children who visit the cathedral."
80000072-49 = "Hm? No, don't worry. I have quite a few left. I have eight more flavors—I just chose a few that I thought you would like, Sensei."

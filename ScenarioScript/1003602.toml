1003602-18 = "#na;???;……? 어라? 선생님……?"
1003602-19 = "[s] \"……?\""
1003602-20 = "3;히나타;00;정말로 선생님이셨군요. 여긴 어쩐 일로……?\n#3;a\n#3;em;[반응]"
1003602-21 = "3;히나타;02;아니, 그보다 어떻게 여기까지 들어오시게 된 건가요? 여긴 외부인 출입 구역이 아닌데!?"
1003602-22 = "3;히나타;04;보통은 여기까지 오시는 길조차 알 수 없으실 텐데……!?\n#3;em;[?!]\n#3;stiff"
1003602-23 = "3;히나타;00;네? 짐 옮기는 소리를 듣고 오셨다고요?"
1003602-24 = "3;히나타;02;……복도가 열려 있었다고요?"
1003602-25 = "3;히나타;02;……아.\n#3;em;…"
1003602-26 = "3;히나타;04;마, 맞다!! 그, 그러네요! 생각해 보니 성당 쪽 문을 닫아 두질 않았군요!\n#3;hophop"
1003602-27 = "3;히나타;06;으, 으으……. 내 정신 좀 봐……!! 정신을 어디다 두고 사는 거야…….\n#3;em;[속상함]"
1003602-28 = "3;히나타;00;……음?"
1003602-29 = "3;히나타;02;괜찮으시다고요? 다른 데에다 이야기하지 않으시겠다고요?"
1003602-30 = "3;히나타;04;그, 그런 문제가 아닌데요!? 아, 아니. 그런 문제가 맞긴 하지만 아무튼 이건……. 그……!\n#3;em;[///]\n#3;stiff"
1003602-31 = "3;히나타;02;……네? 그보다 뭘 하고 있었냐고요?"
1003602-32 = "3;히나타;02;으, 으음……. 그게…….\n#3;em;[땀]"
1003602-33 = "3;히나타;01;보시다시피 성당 물품들을 관리하고 있었어요."
1003602-34 = "3;히나타;01;성당이란 곳이……. 겉보기엔 고요하고 정적인 곳이지만, 사실 의외로 손이 많이 가거든요."
1003602-35 = "3;히나타;99;시스터 분들의 물품이나 성당 자체의 관리품목들……. 가끔은 방문해주신 분들이 놔두고 간 짐까지 있으니…….\n#3;em;…"
1003602-36 = "3;히나타;01;이리저리 모으고 옮기는 거만 해도 하루에 수십 박스가 나오곤 한답니다."
1003602-37 = "[s3] \"엄청난 양이네. 이걸 다 혼자서……?\"\n[s4] \"이곳의 관리 담당자 같은 거구나.\""
1003602-38 = "3;히나타;04;네, 뭐……. 아하하하……. 별로 대단한 건 아니지만요.\n#3;em;[///]\n#3;stiff"
1003602-39 = "3;히나타;04;네, 뭐……. 아하하하……. 별로 대단한 건 아니지만요.\n#3;em;[///]\n#3;stiff"
1003602-40 = "3;히나타;01;그래도 일단은 이곳의 시설 보수와 물품 관리상태를 유지하는 담당자이니까요."
1003602-41 = "3;히나타;02;물론 저 혼자 다 하는 건 아니고, 다른 자매님들도 열심히 같이 해주시긴 하지만…….\n#3;em;…"
1003602-42 = "3;히나타;03;아무래도 이정도로 힘쓰는 일은 제가 직접 진행하는 편이 좀 더 수월하거든요."
1003602-43 = "3;히나타;00;……예? 도와주시겠다고요?\n#3;em;[?]"
1003602-44 = "3;히나타;04;그, 그게……. 말씀은 대단히 감사하고 기쁘지만, 아무래도 안 그러시는 편이……."
1003602-45 = "3;히나타;02;서, 선생님……!?\n#3;em;[?!]\n#3;shake"

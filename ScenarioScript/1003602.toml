[translation]
1003602-1 = "ผู้ดูแลวิหาร"
1003602-2 = "ข้างในวิหาร สถาบันทรีนิตี้"
1003602-3 = "(คุณครูเข้ามาทำธุระที่ทรีนิตี้ และนึกถึงข้อความของฮินาตะจึงแวะเข้ามาหาที่วิหาร)"
1003602-4 = "(อาจเป็นเพราะว่าตอนนี้ไม่ใช่เวลาสวดนมัสการ ภายในวิหารจึงไม่มีใครอยู่เลย)"
1003602-5 = "กุกกัก..."
1003602-6 = "[ns] \"...?\""
1003602-7 = "กุกๆ กักๆ..."
1003602-8 = "โครมมมม!"
1003602-9 = "(ได้ยินเสียงจากด้านในประตูที่เปิดทิ้งไว้ที่มุมด้านหนึ่งภายในวิหาร)"
1003602-10 = "[ns1] \"เสียงอะไรน่ะ...?\"\n[ns2] เดินไปตามเสียงที่ได้ยิน"
1003602-14 = "(ทางเดินยาวด้านหลังประตูเชื่อมต่อกับอาคารเก็บของเก่าๆ)"
1003602-18 = "เอ๋? คุณครูเหรอคะ...?"
1003602-19 = "[s] \"...?\""
1003602-20 = "คุณครูจริงๆ ด้วย มาทำอะไรที่นี่เหรอคะ...?"
1003602-21 = "คุณครูเข้ามาตรงนี้ได้ยังไงคะ? ที่นี่เป็นเขตห้ามคนนอกเข้ามานะคะ!"
1003602-22 = "คนนอกไม่ได้รับอนุญาตให้เข้ามาที่นี่นะคะ...!?"
1003602-23 = "คะ? เข้ามาเพราะได้ยินเสียงแปลกๆ เหรอคะ?"
1003602-24 = "เอ๋...? ประตูตรงทางเดินก็เปิดทิ้งไว้งั้นเหรอคะ?"
1003602-25 = "อ๊ะ..."
1003602-26 = "จะ...จริงด้วยค่ะ! พอคิดดูแล้ว ฉันลืมปิดประตูฝั่งวิหารเองค่ะ!"
1003602-27 = "ฮือ... ทำไมฉันสะเพร่าอะไรขนาดนี้นะ...!!  ฉันเอาสติไปเก็บไว้ที่ไหนเนี่ย..."
1003602-28 = "หืม...?"
1003602-29 = "ไม่เป็นไรงั้นเหรอคะ? คุณครูจะไม่เอาไปบอกใครงั้นเหรอคะ...?"
1003602-30 = "ระ...เรื่องนั้นไม่ใช่ปัญหาอะไรหรอกค่ะ...! มะ...หมายถึงถ้ามีคนรู้เข้าก็อาจจะเป็นปัญหาได้ แต่ว่าเรื่องนั้นก็...!"
1003602-31 = "คะ...? ฉันกำลังทำอะไรอยู่งั้นเหรอคะ?"
1003602-32 = "เอ่อ... คือว่าเรื่องนั้น..."
1003602-33 = "ฉันกำลังจัดเรียงสิ่งของ อุปกรณ์ต่างๆ ของทางวิหารอยู่ค่ะ"
1003602-34 = "ถึงเป็นวิหารที่ดูเงียบสงบแบบนี้... แต่ที่จริงแล้วเบื้องหลังมีงานให้ทำอยู่เยอะมากเลยค่ะ"
1003602-35 = "มีของที่ต้องจัดการอยู่เยอะมากค่ะ ทั้งของใช้ส่วนตัวของพวกซิสเตอร์ ของใช้ภายในวิหาร และไหนจะ#nของที่ผู้คนนำมาด้วยเวลาเข้ามาวิหารค่ะ..."
1003602-36 = "แค่จัดของต่างๆ ใส่กล่อง วันหนึ่งก็ปาไปเป็นสิบๆ กล่องแล้วค่ะ"
1003602-37 = "[s3] \"ฮินาตะทำคนเดียวไหวเหรอ...?\"\n[s4] \"ฮินาตะเป็นผู้ดูแลของที่นี่สินะ\""
1003602-38 = "ฮะฮะฮะ... ก็พอไหวค่ะ เพราะไม่ใช่งานใหญ่อะไรเลยค่ะ"
1003602-39 = "ฮะฮะฮะ... ใช่ค่ะ แต่ก็ไม่ใช่งานใหญ่อะไรหรอกค่ะ"
1003602-40 = "ฉันเป็นผู้รับผิดชอบการดูแลรักษาและจัดเรียงของในคลังที่นี่ค่ะ..."
1003602-41 = "แต่ฉันไม่ได้ทำคนเดียวหรอกนะคะ ซิสเตอร์คนอื่นๆ ก็คอยช่วยฉันเป็นอย่างดีค่ะ แต่ว่า..."
1003602-42 = "งานที่ต้องใช้กำลังแบบนี้ ฉันว่าทำคนเดียวสะดวกกว่าค่ะ"
1003602-43 = "คะ...? คุณครูจะช่วยฉันเหรอคะ?"
1003602-44 = "เอ่อคือ... ฉันดีใจมากที่คุณครูจะช่วยนะคะ แต่เกรงว่าจะทำให้คุณครูลำบาก..."
1003602-45 = "คะ... คุณครู!"
1003602-49 = "[ns5] \"ยกไม่ขึ้นเลย…\"\n[ns6] \"โอย... เอว...! เอวครู!!\""
1003602-50 = "เป็นอะไรรึเปล่าคะ? วางของลงก่อนเถอะค่ะ...!"
1003602-51 = "เป็นอะไรรึเปล่าคะ? วางของลงก่อนเถอะค่ะ...!"
1003602-55 = "ฉันบอกแล้วนี่คะว่ากล่องนี้หนักมาก ถ้าซิสเตอร์คนอื่นมายกน่าจะต้องใช้สามถึงสี่คนช่วยกันยกเลยค่ะ"
1003602-56 = "เพราะงั้นงานนี้ถึงควรให้ฉันเป็นคนรับผิดชอบค่ะ ซิสเตอร์คนอื่นๆ จะได้ไปทำงานในส่วนอื่นต่อได้"
1003602-57 = "[s7] \"ครูเข้าใจแล้วว่าทำไมงานนี้เหมาะกับฮินาตะ\"\n[s8] \"ครูคิดว่าคงจะมีแค่ฮินาตะที่ทำงานนี้ได้นะ\""
1003602-58 = "อ่ะฮะฮะฮะ..."
1003602-59 = "อ่ะฮะฮะฮะ..."
1003602-60 = "คุณครูพูดแบบนั้น ฉันรู้สึกชื่นใจขึ้นมาเลยค่ะ"
1003602-61 = "ที่จริงแล้วฉันไม่เก่งในการรับฟังเรื่องทุกข์ใจและปลอบโยนคนอื่นเหมือนอย่างซิสเตอร์คนอื่นๆ"
1003602-62 = "ก็เลยต้องมาทำหน้าที่รับผิดชอบงานที่ต้องใช้กำลังแบบนี้น่ะค่ะ"
1003602-63 = "นี่คงเป็นสิ่งเดียวที่ฉันทำได้ดีค่ะ เพราะงั้นฉันก็เลย... ฮะฮะฮะ..."
1003602-64 = "[s] \"...\""
1003602-65 = "อ๊ะ..."
1003602-66 = "เผลอพูดอะไรเรื่อยเปื่อยอีกแล้ว..."
1003602-67 = "ขอโทษค่ะ ฉันทำเสียบรรยากาศซะแล้ว..."
1003602-68 = "เอ่อ... กะ...ก่อนอื่น เราออกไปข้างนอกกันก่อนดีมั้ยคะ? ฉันจะนำทางไปที่วิหารให้ค่ะ"
1003602-69 = "คะ...? ไม่อยากเพิ่มงานให้ฉันเหรอคะ?"
1003602-70 = "ไม่เป็นไรเลยค่ะ สบายมากค่ะ ฉันเต็มใจพาคุณครูไปส่งค่ะ"
1003602-71 = "ฉันมีของที่ต้องเอาไปไว้ที่โบสถ์อยู่พอดี คุณครูไม่ต้องคิดมากหรอกค่ะ"
1003602-72 = "อยู่ไหนน้า... ใช่แล้ว กล่องนี้ล่ะ"
1003602-73 = "ฮึบบ...!!"
1003602-74 = "ฮู่ว... ฮู่วว..."
1003602-75 = "ไปกันเลยมั้ยคะ?"
1003602-78 = "[ns] เดินตามฮินาตะไป"
1003602-82 = "แฮ่ก... แฮ่ก... เฮ้ออ... เสร็จไปอีกหนึ่งงานค่ะ!"
1003602-83 = "ฮู่ว... เหงื่อออกจนชุ่มเลยค่ะ... แฮ่ก... แฮ่ก..."
1003602-84 = "แค่ยกของมาแป๊บเดียว เหงื่อท่วมตัวหมดแล้วค่ะ แหะๆ..."
1003602-85 = "อ๊ะ... ตอนเดินมาฉันเดินข้างๆ คุณครูตลอดเลย ระหว่างทางคงทั้งเหงื่อไหลและหายใจเสียงดัง..."
1003602-86 = "พอมาคิดดูกะ... ก็รู้สึกอายเหมือนกันนะคะ"
1003602-90 = "เอ๋...? อะไรกัน...? ทำไมมีคนมาวิหารเยอะจัง..."
1003602-91 = "รู้สึกเหมือนทุกคนกำลังมองมาทางนี้เลยค่ะ...?"
1003602-92 = "คุณครูคะ...? ทำไมทำหน้าแบบนั้นล่ะคะ... มีอะไรเหรอคะ?"
1003602-93 = "เข้าใจผิดเหรอคะ? เข้าใจผิดเรื่องอะไรงั้นเหรอคะ...?"
1003602-94 = "เอ๋? ไม่ใช่ฉันแต่หมายถึงพวกเขาเหรอคะ...?"
1003602-95 = "[s9] \"คะ... ครูไปก่อนนะ!\"\n[s10] \"ไว้ครูจะมาอธิบายทีหลังนะ...!\""
1003602-100 = "เอ๋...!?"
1003602-101 = "คะ... คุณครู!? คุณครูคะ...!?"
1003602-103 = "(คุณครูรีบวิ่งกลับมายังชาเล่ต์อย่างรวดเร็วราวกับเดอะแฟลช ก่อนที่คนอื่นๆ จะเข้าใจผิดมากไปกว่านี้)"
1003602-104 = "(และสุดท้ายฮินาตะก็ยังไม่เข้าใจว่าเรื่องเข้าใจผิดที่คุณครูพูดถึงนั้นหมายถึงเรื่องอะไร...)"

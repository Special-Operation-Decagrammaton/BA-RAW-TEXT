[translation]
1003602-1 = "The Cathedral's Manager"
1003602-2 = "Inside the Trinity Cathedral"
1003602-3 = "I was at Trinity for business and decided to stop by the cathedral after reading Hinata's last message."
1003602-4 = "There was still time before Mass, so there weren't any students inside."
1003602-5 = "*rattle*"
1003602-6 = "[ns] \"...?\""
1003602-7 = "*rattle* *rattle*"
1003602-8 = "*thud*"
1003602-9 = "I could hear noises coming from an open door on one side of the cathedral."
1003602-10 = "[ns1] \"Is someone there?\"\n[ns2] Go to source of the sound."
1003602-14 = "The long hallway behind the door was connected to a shabby storage building."
1003602-18 = "Huh? Is that you, Sensei?"
1003602-19 = "[s] \"...?\""
1003602-20 = "It really is you! What brings you here?"
1003602-21 = "Or better yet, how did you get here? This is a restricted area!"
1003602-22 = "Outsiders are usually never allowed in here!"
1003602-23 = "Huh? You followed a strange noise you heard? You must have heard me moving things."
1003602-24 = "And the door to the hallway was wide open?"
1003602-25 = "Oh."
1003602-26 = "Th-That's my fault! I totally forgot to close it behind me!"
1003602-27 = "U-Ughhh... I can't believe I screwed up like that! I'm so out of it lately."
1003602-28 = "Hmm?"
1003602-29 = "You're not going to tell anyone about this?"
1003602-30 = "Th-That's not the issue! I-I mean, it would be bad if the others found out,#nbut that's not what I'm..."
1003602-31 = "Huh? What was I doing here?"
1003602-32 = "U-Um, well..."
1003602-33 = "As you can probably tell, I was organizing the items that are here."
1003602-34 = "Even when the cathedral is quiet and still, there's always work to be done behind the scenes."
1003602-35 = "Some of the things back here belong to the cathedral, some of it to individual Sisters, and some of it was even left behind by visitors..."
1003602-36 = "It takes dozens of boxes just to cover a single day's worth of work back here."
1003602-37 = "[s3] \"And you're doing it all by yourself?\"\n[s4] \"You're like this place's manager.\""
1003602-38 = "H-Haha. I suppose... It's not a big deal, though."
1003602-39 = "H-Haha. I suppose... It's not a big deal, though."
1003602-40 = "I'm in charge of maintenance and the inventory..."
1003602-41 = "...but that doesn't mean I always do it alone. Other Sisters pitch in sometimes."
1003602-42 = "I'd rather handle this kind of work myself. It's easier that way."
1003602-43 = "Huh? You want to give me a hand?"
1003602-44 = "Um... I appreciate the offer, but you probably shouldn't."
1003602-45 = "S-Sensei?!"
1003602-49 = "[ns5] \"It's not moving!\"\n[ns6] \"M-My back!\""
1003602-50 = "Are you okay, Sensei? P-Please put it back down!"
1003602-51 = "Are you okay, Sensei? P-Please put it back down!"
1003602-55 = "I tried to tell you. These boxes are much heavier than they look.#nIt usually takes three people to move one."
1003602-56 = "That's why it's better that they just leave it to me, since that way they can work on other things."
1003602-57 = "[s7] \"Now I get why you were put in charge of this.\"\n[s8] \"Yeah. I guess you really are the only one who can do this.\""
1003602-58 = "A-Ahaha..."
1003602-59 = "A-Ahaha..."
1003602-60 = "It's a little embarrassing when you put it like that, but I do like hearing it.#nThank you."
1003602-61 = "I'm not as talented at comforting and counseling as the other Sisters..."
1003602-62 = "That's why I put extra effort into manual labor and managing things."
1003602-63 = "It's all I'm really good at. So... Haha..."
1003602-64 = "[s] \"...\""
1003602-65 = "..."
1003602-66 = "Wh-What am I talking about?"
1003602-67 = "Sorry. I didn't mean to kill the mood."
1003602-68 = "I-I think we should be going. I'll show you the way back to the cathedral."
1003602-69 = "No, no. It's not an inconvenience or anything."
1003602-70 = "Yes, I'm sure. I'd be happy to guide you."
1003602-71 = "Actually, there are some things I need to take care of back at the chapel,#nso it's no problem at all."
1003602-72 = "Just need to pick up this box before we go."
1003602-73 = "Haaah!"
1003602-74 = "*huff* *puff*"
1003602-75 = "Okay. Shall we be off?"
1003602-78 = "[ns] Follow Hinata."
1003602-82 = "*pant* *pant* That should do it!"
1003602-83 = "Phew. I worked up quite the sweat."
1003602-84 = "That didn't take long at all. H-Haha..."
1003602-85 = "It's a little embarrassing, actually."
1003602-86 = "Getting all hot and sweaty next to you of all people..."
1003602-90 = "Huh? Wh-What's going on? Why is the cathedral so crowded all of a sudden?"
1003602-91 = "It feels like they're looking at us for some reason..."
1003602-92 = "Sensei? You look uncomfortable... What's wrong?"
1003602-93 = "Misunderstanding? What's there to misunderstand?"
1003602-94 = "Not me? You mean all of them? Huh...?"
1003602-95 = "[s9] \"I-I have to go now!\"\n[s10] \"I'll explain later! Bye!\""
1003602-100 = "What...?"
1003602-101 = "S-Sensei?! Sensei!"
1003602-103 = "I ran as fast as I could to Schale to avoid any further misunderstandings."
1003602-104 = "Hinata still didn't understand what the misunderstanding could have been."

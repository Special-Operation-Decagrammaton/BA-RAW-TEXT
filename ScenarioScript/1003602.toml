[translation]
1003602-1 = "教堂管理人"
1003602-2 = "三一教堂內部"
1003602-3 = "（因有事去了一趟三一，回途想起日向傳來的訊息，便前往教堂拜訪）"
1003602-4 = "（教堂內非常寬廣，沒有看到任何學生）"
1003602-5 = "（喀噹）"
1003602-6 = "[ns]「……？」"
1003602-7 = "（喀噹，喀噹喀噹……）"
1003602-8 = "（碰！）"
1003602-9 = "（教堂一角微微敞開的一扇門中，傳來了聲音）"
1003602-10 = "[ns1]「……有人在嗎？」\n[ns2]朝發出聲音的地方走去"
1003602-14 = "（門後是一道長長的走廊，走廊盡頭有個倉庫）"
1003602-18 = "……？咦？老師……？"
1003602-19 = "[s]「啊，日向。」"
1003602-20 = "啊，真，真巧。請問老師來這裡有什麼事嗎……？"
1003602-21 = "不對，在此之前，老師是怎麼進來這裡的……！？"
1003602-22 = "一般來說，外部人士應該進不了這裡啊……！？"
1003602-23 = "咦？您有聽到聲響……？"
1003602-24 = "……而且門是打開的？"
1003602-25 = "……"
1003602-26 = "啊！我沒有把走廊的門關起來……！"
1003602-27 = "嗚嗚……我又犯下這種基本的錯誤了……"
1003602-28 = "……？"
1003602-29 = "您不會和任何人說嗎……？"
1003602-30 = "不，問題並不出在那裡……！#n雖然您肯為我保密，我確實很感激……！"
1003602-31 = "……啊，您問我在做什麼嗎？"
1003602-32 = "我……基本上就如您所見……"
1003602-33 = "正在整理教堂的備品。"
1003602-34 = "教堂雖然乍看之下，是個很清爽簡潔的地方……"
1003602-35 = "其實會有修女們的私人物品、教堂的必要備品，以及訪客們遺留的失物等等……#n東西可說是五花八門呢。"
1003602-36 = "全部集中下來，每天必須整理的份量就會有好幾十箱。"
1003602-37 = "[s3]「數量還真可觀……這些都妳一個人整理？」\n[s4]「原來如此，日向就是要負責整理這些啊，真了不起。」"
1003602-38 = "啊，那個，其實沒那麼誇張……"
1003602-39 = "啊，那個，其實沒那麼誇張……"
1003602-40 = "不過設施的維護與修繕，還有各種物品的管理確實都是由我負責。"
1003602-41 = "當然，其他修女們也會幫我處理……"
1003602-42 = "不過體力活的部分基本上都還是由我來做。"
1003602-43 = "咦……您要幫我嗎？"
1003602-44 = "那，那個，老師這份心意我非常感激……"
1003602-45 = "老，老師！？"
1003602-49 = "[ns5]「一，一動也不動！？」\n[ns6]「我，我的腰……！」"
1003602-50 = "您，您沒事吧，老師！？"
1003602-51 = "您，您沒事吧，老師！？"
1003602-55 = "我，我想您應該明白，這些箱子比想像中還重……#n其他修女都要3、4個人才搬的動。"
1003602-56 = "但總是麻煩那麼多人實在很過意不去，所以基本上都是由我獨自處理這些事……"
1003602-57 = "[s7]「原來如此……日向真的很了不起呢……」\n[s8]「是，是嗎……這也是日向的其中一個強項呢。」"
1003602-58 = "謝，謝謝老師。"
1003602-59 = "謝，謝謝老師。"
1003602-60 = "……聽您這麼說，就感覺有點開心呢。"
1003602-61 = "因為我不像其他各位修女，我不擅長「傾聽他人的告解，讓對方心裡感到舒暢」……"
1003602-62 = "所以我能做的就只有這些了。"
1003602-63 = "這可能也是一種刪去法吧……欸嘿嘿……"
1003602-64 = "[s]「沒有這回事唷。」"
1003602-65 = "真的嗎……？"
1003602-66 = "啊，我，我真是，又只顧著閒聊了……"
1003602-67 = "不好意思，好像說了一些奇怪的話。"
1003602-68 = "我，我想我們該出去了。請跟我來。"
1003602-69 = "……咦？啊，不會不會，沒那回事。"
1003602-70 = "我並沒有忙到不可開交，請別在意。"
1003602-71 = "我正好也要帶一些東西去禮拜堂。"
1003602-72 = "我看一下……啊，是這個箱子。"
1003602-73 = "……嘿咻！"
1003602-74 = "呼……"
1003602-75 = "……那我們走吧。"
1003602-78 = "[ns] 一邊驚訝日向能輕鬆搬動那麼重的東西，一邊跟著他"
1003602-82 = "呼……這下就行了！"
1003602-83 = "啊～流了一身汗呢……明明就不是什麼劇烈運動，我還真容易流汗呢……"
1003602-84 = "而且老師也流汗了呢……呵呵，畢竟老師剛才也有幫我。"
1003602-85 = "……啊，對不起，老師。我流這麼多汗還待在老師旁邊，真是不好意思……"
1003602-86 = "不過我們都已經待在一起一段時間了，怎麼現在才發覺呢……？"
1003602-90 = "……哎呀？人好像越來越多了……"
1003602-91 = "而且如果不是我多心的話，怎麼感覺大家都在看我們……？"
1003602-92 = "到，到底是為什麼呢，老師？#n……老師？您的臉色變得不太好，沒事吧？"
1003602-93 = "……誤會？#n那是什麼意思……"
1003602-94 = "您說因為我們兩人滿身大汗，一起從裡面的房間走出來嗎……？"
1003602-95 = "[s9]「總，總之今天謝謝了！」\n[s10]「我現在還是先離開這裡比較好，辛苦了！」"
1003602-100 = "咦，咦咦……！？"
1003602-101 = "老，老師……！？"
1003602-103 = "（為了不加深誤會，馬上離開了現場）"
1003602-104 = "（而日向直到後來依然不明白到底被誤會了什麼）"

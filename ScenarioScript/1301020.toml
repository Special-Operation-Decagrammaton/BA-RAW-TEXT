[translation]
1301020-1 = "ราชินีแห่งการคิดในใจ"
1301020-2 = "(คุณครูแวะมาที่มิลเลเนียมเพราะมีธุระของทางชาเล่ต์ที่ต้องมาจัดการ)"
1301020-3 = "ถ้าวิเคราะห์ดูแล้ว ก็จะเห็นว่าทั้งหมดประกอบด้วยการคำนวณอย่างง่ายๆ..."
1301020-4 = "ทำไมบางครั้งถึงมีกรณีที่ว่าหนึ่งบวกหนึ่งไม่เท่ากับสองเกิดขึ้นล่ะคะ?"
1301020-5 = "[s] \"อืม... เพราะคนคำนวณเหรอ?\""
1301020-6 = "เป็นคำตอบที่น่าเศร้าแต่ว่าถูกต้องค่ะ คุณครู"
1301020-7 = "เดี๋ยวนะคะ งบดุลตรงนี้..."
1301020-8 = "[s] \"ยูกะ เครื่องคิดเลขนี่... สุดยอดเลยนะ\""
1301020-9 = "อ๊ะ นี่เหรอคะ เป็นรุ่น SI-LAB ค่ะ"
1301020-10 = "ฮิฮิ เป็นรุ่นที่รองรับการจำลองกราฟ 3 มิติ สเปรดชีต และแม้แต่การเขียนโปรแกรมด้วยค่ะ"
1301020-11 = "ถ้าลองเล่นดูนิดหน่อย ก็จะเห็นว่ามีฟังก์ชันดูรูปหรือดูวิดีโอด้วยนะคะ"
1301020-12 = "แถมนักเรียนบางคนก็ใช้เป็นเครื่องเล่นเกมด้วยค่ะ..."
1301020-13 = "เพราะมันสะดวกมาก ฉันเลยกังวลนิดหน่อยว่าทุกคนจะเอาแต่พึ่งพาเครื่องคิดเลขกันมากขึ้นเรื่อยๆ"
1301020-14 = "[s] \"งานบัญชีก็ต้องใช้เครื่องคิดเลขอยู่แล้วไม่ใช่เหรอ?\""
1301020-15 = "ก็ใช่ค่ะ แต่บางครั้งพวกตัวเลขที่คิดในใจได้ง่ายๆ..."
1301020-16 = "บางครั้งฉันก็เผลอใช้เครื่องคิดเลขคำนวณไปโดยไม่รู้ตัวค่ะ"
1301020-17 = "ทั้งที่การแปลงหน่วยแกลลอน เป็นลิตรมันง่ายมากแท้ๆ..."
1301020-18 = "[s] \"การพึ่งพาอุปกรณ์แทนที่จะใช้สมอง แสดงให้เห็นถึงพัฒนาของอารยธรรมไงล่ะ\""
1301020-19 = "นะ...นี่ใช่คุณครูที่ฉันรู้จักแน่รึเปล่าคะ?"
1301020-20 = "คุณครูของฉันไม่มีทางพูดอะไรแบบนี้แน่ เหลือเชื่อเลย..."
1301020-21 = "[s] \"เจ็บจี๊ดยันหัวใจเลย!?\""
1301020-22 = "แต่ก็นะ... ที่คุณครูพูดมาก็ถูกค่ะ"
1301020-23 = "แต่ว่าถ้าปล่อยไว้ไม่ใช้สมองคิดอะไรบ้าง สุดท้ายมันสมองของเราก็จะเสื่อมได้นะคะ"
1301020-24 = "ก็เหมือนกับปืนที่ไม่ได้บำรุงรักษา ปล่อยไว้นานๆ สลักปืนจะขึ้นสนิม ลำกล้องจะติดแน่น และสุดท้ายก็ใช้งานไม่ได้..."
1301020-25 = "พอพูดแบบนี้แล้ว..."
1301020-26 = "คุณครูถือโอกาสนี้ลองกระตุ้นเซลล์สมองด้วยการคิดเลขในใจดูมั้ยคะ?"
1301020-27 = "เดี๋ยวสิคะ จะหนีไปไหนคะ"
1301020-29 = "เอาละ ได้เวลาคณิตคิดสนุกแล้วค่ะ~"
1301020-31 = "เตรียมพร้อมรึยังคะ?"
1301020-32 = "[s1] \"ฮึ่ม ยูกะคงไม่รู้ว่าครูคิดเลขเร็วสินะ\"\n[s2] \"บอกไว้ก่อน ครูเป็นคนคิดเลขในใจเร็วมากนะ!\""
1301020-33 = "เรื่องนี้เพิ่งเคยได้ยินเลยค่ะ..."
1301020-34 = "เรื่องนี้เพิ่งเคยได้ยินเลยค่ะ..."
1301020-35 = "ถ้าคุณครูมั่นใจขนาดนั้นละก็ มาเริ่มกันเลยมั้ยคะ?"
1301020-36 = "เริ่มจากการคำนวณง่ายๆ ก่อน... 13 คูณ 17 ค่ะ!?"
1301020-37 = "[s] \"237!\""
1301020-38 = "พระเจ้า... ตอบได้ทันทีที่ได้ยินโจทย์เลยเหรอ...?"
1301020-39 = "ถ้างั้น... 187 ลบ 23 หารด้วย 37 ค่ะ!?"
1301020-40 = "[s] \"7.27373737373...!\""
1301020-41 = "อันนี้ก็ตอบทันควันเลย?"
1301020-42 = "คะ...คราวนี้โจทย์ไม่ง่ายแล้วนะคะ"
1301020-43 = "หาอินเวอร์สของเมตริกซ์ 3x3 โดยที่ค่าแฟกเตอร์เท่ากับ 1, 19, 37, 23, 101, 3, 7, 41, 3 ค่ะ...?"
1301020-44 = "[s] \"8, 34, 108, 287, 324, 83, 70, 61, 6!\""
1301020-45 = "ปะ...เป็นไปไม่ได้ คำนวณเร็วแบบนี้เลยเหรอ...?"
1301020-46 = "เดี๋ยวก่อนนะคะ ฉันว่ามันแปลกๆ..."
1301020-50 = "คุณครู... ตอบผิดทั้งหมดเลยนี่นา!"
1301020-51 = "แค่พูดตัวเลขออกมาส่งๆ ใช่มั้ยคะ?"
1301020-52 = "[s] \"ยูกะบอกแค่ว่า \"คิดเร็ว\" เฉยๆ นี่นา?\""
1301020-53 = "ไม่ได้การแล้วค่ะ"
1301020-54 = "ฉันจะต้องวางโปรแกรมฝึกบริหารสมองให้คุณครูซะแล้วค่ะ"
1301020-55 = "[s] \"ไม่เอาาา ปล่อยครูไปเถอะ~!\""
1301020-56 = "ไม่ได้ค่ะ!"

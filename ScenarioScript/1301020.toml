[translation]
1301020-1 = "The Queen of Mental Arithmetic"
1301020-2 = "I went to Millennium for some Schale work."
1301020-3 = "When you take your time, calculations are rather simple..."
1301020-4 = "But judging by this, do people not know one plus one equals two anymore?"
1301020-5 = "[s] \"Umm... I guess it's basic human error?\""
1301020-6 = "That's exactly right, but that makes me sad, Sensei."
1301020-7 = "Hold on, where's the balance sheet?"
1301020-8 = "[s] \"Your calculator is...quite something.\""
1301020-9 = "Oh, this? It's the SI-LAB model."
1301020-10 = "Heehee. It supports 3D graphs, virtual experiment simulations, spreadsheets, and even certain programming!"
1301020-11 = "With some modification, I can display photos and videos too."
1301020-12 = "...Although some students use it as a game simulator."
1301020-13 = "It's so convenient that I've been relying on the calculator more and more, which worries me."
1301020-14 = "[s] \"Isn't it expected to use a calculator for accounting?\""
1301020-15 = "Yes, but some things can be mentally calculated."
1301020-16 = "But lately, I unconsciously try to use the calculator for those too."
1301020-17 = "Converting gallons to liters is simple though..."
1301020-18 = "[s] \"Delegating a part of your brain to an external device is part of civilization's development.\""
1301020-19 = "...Um, are you really the same Sensei I used to know?"
1301020-20 = "I can't believe such intelligent words came out of your mouth..."
1301020-21 = "[s] \"Excuse me! How rude!\""
1301020-22 = "Well... You have a point."
1301020-23 = "But if you don't use your brain, it will eventually regress."
1301020-24 = "Just like how a gun that hasn't been maintained doesn't fire properly with a deteriorating barrel."
1301020-25 = "Now that we're talking about it..."
1301020-26 = "Why don't you try some mental calculation to train your brain?"
1301020-27 = "Oh, you can't run away from this."
1301020-29 = "Okay, it's fun math time!"
1301020-31 = "Are you ready?"
1301020-32 = "[s1] \"Hmph, Yuuka, you underestimate me.\"\n[s2] \"I'm pretty fast with mental calculations, you know!\""
1301020-33 = "That's new information to me..."
1301020-34 = "That's new information to me..."
1301020-35 = "You seem confident, so let's start!"
1301020-36 = "Let's start easy... What's 13 multiplied by 17?"
1301020-37 = "[s] \"237!\""
1301020-38 = "Oh, my. That was fast!"
1301020-39 = "Th-Then, what's 187 minus 23 divided by 37?!"
1301020-40 = "[s] \"7.27373737373...!\""
1301020-41 = "That was quick too!"
1301020-42 = "Th-This one is gonna be harder...!"
1301020-43 = "The inverse of the 3x3 matrix 1, 19, 37, 23, 101, 3, 7, 41, 31 is...?"
1301020-44 = "[s] \"8, 34, 108, 287, 324, 83, 70, 61, 6!\""
1301020-45 = "N-No way. How can you be so fast...?"
1301020-46 = "Wait. Something is off..."
1301020-50 = "Sensei! You got everything wrong!"
1301020-51 = "You just said random numbers, didn't you?!"
1301020-52 = "[s] \"But it was fast, right?\""
1301020-53 = "That's cheating."
1301020-54 = "I'm going to develop a brain-training program for you."
1301020-55 = "[s] \"No! Please don't!\""
1301020-56 = "You've left me no choice!"

[translation]
1301020-1 = "心算女王"
1301020-2 = "（為了處理夏萊的公務，我們去了一趟千年學園）"
1301020-3 = "明明只要分開來，就全都是一些很簡單的算式……"
1301020-4 = "但為什麼算出來的數字會經常對不上呢？"
1301020-5 = "[s] 「畢竟是人做的事嘛……」"
1301020-6 = "這確實可能是問題所在呢，真令人感嘆。"
1301020-7 = "我看看，資產負債表……"
1301020-8 = "[s] 「優香，仔細一看，你的計算機還真酷。」"
1301020-9 = "啊，你說這個嗎？這是SI-LAB推出的機型，"
1301020-10 = "這台計算機包含3D圖形、理論模擬、電子試算表、程式設計等功能……"
1301020-11 = "稍微改裝一下，甚至還可以觀賞相片或影片。"
1301020-12 = "因此也有些學生會把它當作遊戲模擬器使用。"
1301020-13 = "不過也因為這台計算機太方便了……害我最近擔心自己會不會太過依賴它。"
1301020-14 = "[s] 「我覺得用計算機輔助會計工作很正常呀？」"
1301020-15 = "話雖如此……"
1301020-16 = "但例如說，有時候光靠心算就能解決的問題，都還是會不自覺拿出計算機來算……"
1301020-17 = "像是加侖換算成公升，明明都可以大腦算一下就出來了。"
1301020-18 = "[s] 「可是用外部工具分擔人腦的工作，本來就是文明的發展趨勢，這也不是壞事吧？」"
1301020-19 = "……老師，你是不是生病了？"
1301020-20 = "如果是我認識的老師，完全無法想像會說出如此有智慧的話……"
1301020-21 = "[s] 「你講這種話也太失禮了吧！？」"
1301020-22 = "不過，我也明白老師要講的意思。"
1301020-23 = "但要是一直放著大腦不用，會害大腦越來越退化……"
1301020-24 = "槍械也一樣。要是沒有確實保養，只會逐漸耗損。"
1301020-25 = "說的也是，那既然都想到了……"
1301020-26 = "老師要不要也特訓一下心算能力呀？"
1301020-27 = "等等，不准逃！"
1301020-29 = "來吧，是快樂的算術時間唷？"
1301020-31 = "那麼，準備好了嗎？"
1301020-32 = "[s1] 「哼哼，我好像還沒跟優香說過……」\n[s2] 「其實我心算速度挺快的喔！」"
1301020-33 = "竟，竟然有這種事……？"
1301020-34 = "竟，竟然有這種事……？"
1301020-35 = "不過這樣反而剛剛好。那就開始吧！"
1301020-36 = "首先……「13×17」等於？"
1301020-37 = "[s] 「231！」"
1301020-38 = "秒答……！？"
1301020-39 = "那，那麼，「187－23÷37」等於！？"
1301020-40 = "[s] 「7.2737以下循環小數！」"
1301020-41 = "這麼快……！"
1301020-42 = "這，這次來個難的！"
1301020-43 = "「3x3矩陣，1、19、37、23、101、3、7、41、31的反矩陣」是什麼？"
1301020-44 = "[s] 「8、34、108、287、324、83、70、61、6！」"
1301020-45 = "怎，怎麼可能……也太快了吧……！？"
1301020-46 = "……嗯？請等一下。"
1301020-50 = "老，老師！你說的答案都是錯的嘛！"
1301020-51 = "你全都是隨便回答的吧！？"
1301020-52 = "[s] 「我也只是說速度『快』而已啊！」"
1301020-53 = "這，這是什麼歪理……"
1301020-54 = "沒辦法了……那我就專程為老師設計一個大腦訓練程式吧。"
1301020-55 = "[s] 「超級不想要……」"
1301020-56 = "不會讓你逃走的，一起來活化大腦吧！"

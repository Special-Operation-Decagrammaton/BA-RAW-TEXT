[translation]
10002070-1 = "第7話;海之家（１）"
10002070-2 = "哈嗚嗚……"
10002070-3 = "總，總之第二個任務也完成了呢……"
10002070-4 = "進度還不錯。#n開始下一個任務吧。"
10002070-5 = "盡快將任務完成，回歸原來的目標「享受大海」吧。"
10002070-6 = "說，說的也是……"
10002070-7 = "[s1] （唔嗯，你們已經相當享受大海了……）\n[s2] （那份清單的內容就是「享受大海」啊……）"
10002070-8 = "那麼日步美，下一個任務是什麼？"
10002070-9 = "那麼日步美，下一個任務是什麼？"
10002070-14 = "我看看……就選「海之家」吧。#n似乎只要到那裡去，拍下正在吃東西的樣子就行了。"
10002070-15 = "說到海邊就會想到各種好吃的東西，也算是不能錯過的樂趣之一吧。"
10002070-16 = "根據我的事前調查，在這個無為濱好像有間相當有名的店喔……"
10002070-17 = "既然都來到這裡了就……"
10002070-19 = "海之家"
10002070-21 = "那個，有人在嗎？"
10002070-27 = "嗯？咦，老師！？"
10002070-28 = "[s3]「……泉為什麼會在這裡！？」\n[s4]「泉也是來吃飯的嗎？」"
10002070-29 = "因為一些原因，現在我在這裡工作！"
10002070-30 = "因為一些原因，現在我在這裡工作！"
10002070-31 = "原本的店主身體不太舒服，所以今天我來幫忙代班！"
10002070-32 = "沒想到會在這裡遇見老師呢！真是嚇了我一跳！"
10002070-34 = "唔嗯，是老師認識的人嗎？"
10002070-35 = "好像在哪見過……格黑娜？"
10002070-36 = "……？"
10002070-37 = "[s] 全力含糊帶過"
10002070-40 = "原來是老師認識的人。#n抱歉我失禮了。"
10002070-41 = "雖然不是很明白但不用在意～#n大家難得過來，就來嘗嘗看我創作的新料理吧！"
10002070-42 = "[s5]「泉做的『新料理』！？」\n[s6]「店主不舒服的原因該不會是……！」"
10002070-43 = "各位也請坐請坐！#n這裡的餐點都很美味，敬請期待哦！"
10002070-44 = "各位也請坐請坐！#n這裡的餐點都很美味，敬請期待哦！"
10002070-45 = "我會特別幫你們打折的！"
10002070-49 = "原來是這樣啊。"
10002070-50 = "那就恭敬不如從命了。"
10002070-51 = "那麼就承蒙你的好意……"
10002070-52 = "前輩也請坐。"
10002070-58 = "[ns]「那個，大家，呃……」"
10002070-59 = "謝謝～！我看看，該點什麼好呢……！"
10002070-60 = "[s]「你們先聽我說……」"
10002070-61 = "老師？怎麼了嗎？"
10002070-62 = "啊，餐點的名字都相當新穎呢。"
10002070-63 = "「海水生蠔挫冰」、「薄荷巧克力炒麵」、「煉乳涼麵」、「巧克力海參汁」……"
10002070-64 = "真是獨特呢，品味相當不錯。"
10002070-65 = "[s]「不……與其說是獨特，不如說那上面寫的都是真的……」"
10002070-66 = "咦……？#n那是什麼意思？"
10002070-67 = "來～大家都選好了嗎？"
10002070-68 = "可以點餐囉～！"
10002070-72 = "那我要一份這個「海水生蠔挫冰」。"
10002070-73 = "前輩要點什麼呢？"
10002070-75 = "……「薄荷巧克力炒麵」。"
10002070-76 = "那我要「巧克力海參汁」……！"
10002070-81 = "「煉乳涼麵」。"
10002070-83 = "感謝各位的點餐！"
10002070-84 = "「海水生蠔挫冰」「薄荷巧克力炒麵」「巧克力海參汁」「煉乳涼麵」各一份！"
10002070-85 = "[s]「先，先等一下……！」"
10002070-86 = "啊，老師要吃什麼呢？"
10002070-87 = "只要是我能做的，想吃什麼都可以哦？"
10002070-88 = "……怎麼樣呀？#n想吃什麼？嗯？"
10002070-89 = "[s]「我，我……！！」"
10002070-90 = "（咻咚！！）"
10002070-91 = "……咦？"
10002070-93 = "（噠噠噠噠噠！噠噠噠噠噠！！）"
10002070-94 = "唔咦咦！？"
10002070-95 = "店，店裡被攻擊了！？為什麼，怎麼會！？"
10002070-96 = "還敢問「為什麼」……！？"
10002070-97 = "你是真不知道還假不知道啊，生化恐怖份子！！"
10002070-98 = "[s]「這個聲音是……？」"
10002070-102 = "無法原諒……"
10002070-103 = "無法原諒啦！"
10002070-104 = "都是因為你們……害我們的老大到現在還離不開馬桶！"
10002070-106 = "又，又是那群太妹們……！？"
10002070-107 = "看你自信滿滿地端出來就大意了……可惡，都是因為你的料理……！！"
10002070-108 = "這種店砸了也是為奇普托斯好！上吧！"
10002070-109 = "……？#n那，那個，我好像聽不太懂你的意思……？"
10002070-110 = "多說無益！！"
10002070-112 = "大家，動手！！"
10002070-113 = "（噠噠噠噠噠！噠咚！咚哐！！！）"
10002070-114 = "啊啊啊！！店啊……雖然不是我的就是了！！！"
10002070-115 = "等等等等！因為不是我的就更不行了啦！！嗚哇啊啊！！"
10002070-116 = "雖然不是很懂，是不是應戰比較好？"
10002070-117 = "浪費食物可是相當罪惡的行為……不能視而不見！"
10002070-118 = "上吧！高舉正義的鐵鎚！"
10002070-124 = "呃，唔，這都是第幾次啦～～！？"

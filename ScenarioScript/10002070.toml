[translation]
10002070-1 = "ตอนที่ 7;ร้านริมทะเล 1"
10002070-2 = "เฮ้อ..."
10002070-3 = "แต่ถึงยังไงเราก็ทำได้สองข้อแล้วนะคะ อาจเป็นเพราะโชคช่วยก็ได้..."
10002070-4 = "อื้อ ทำภารกิจในรายการได้เร็วกว่าที่คิดเอาไว้อีกนะ นับว่าเป็นสถานการณ์ที่น่ายินดีมากเลยล่ะ"
10002070-5 = "รีบทำภารกิจให้เสร็จโดยเร็วที่สุด แล้วรีบกลับไปทำตามเป้าหมายแรก \"สนุกกับการมาทะเล\"#nตามที่ตั้งใจไว้กันเถอะ"
10002070-6 = "ค่ะ แน่นอนค่ะ..."
10002070-7 = "[s1] (ตอนนี้ก็ดูสนุกกันอยู่แล้วนะ...) \n[s2] (รายการพวกนั้นทำมาก็เพื่อให้ \"สนุกกับการมาทะเล\" อยู่แล้วนี่...)"
10002070-8 = "แล้วเป้าหมายต่อไปคืออะไรล่ะ ฮิฟุมิ? เราไม่มีเวลามามัวชักช้าแล้ว รีบๆ ทำให้จบๆ กันเถอะ"
10002070-9 = "แล้วเป้าหมายต่อไปคืออะไรล่ะ ฮิฟุมิ? เราไม่มีเวลามามัวชักช้าแล้ว รีบๆ ทำให้จบๆ กันเถอะ"
10002070-14 = "ไหนดูซิ... เขียนไว้ว่า \"ร้านริมทะเล\" นี่นา ไม่ได้เขียนเงื่อนไขอื่นเอาไว้ ถ้างั้นก็แค่ไปกินอาหาร#nที่ร้านเฉยๆ ก็คงได้สินะคะ"
10002070-15 = "ถ้ามาที่ทะเล การไปนั่งกินอาหารที่ร้านริมทะเลก็เป็นเรื่องที่พลาดไม่ได้อย่างหนึ่งเลยค่ะ#nตรงนี้ก็มีอยู่ร้านนึง..."
10002070-16 = "ฉันได้ยินมาว่าที่นี่มีร้านเด็ดอยู่ร้านหนึ่งด้วยนะคะ"
10002070-17 = "งั้นก็ไปดูกันเถอะค่ะ..."
10002070-19 = "ร้านริมทะเล"
10002070-21 = "เอ่อ... สวัสดีค่า?"
10002070-27 = "อ๊ะ คุณครูนี่นา!? ว่าไง! คุณครู!"
10002070-28 = "[s3] \"...อิซุมิ!?\"\n[s4] \"เธอมาทำอะไรที่ร้านนี้น่ะ?\""
10002070-29 = "อื้อ! เรื่องมันยาวน่ะ เอาเป็นว่าตอนนี้ฉันรับหน้าที่เป็นผู้จัดการที่ร้านนี้อยู่น่ะ!"
10002070-30 = "อื้อ! เรื่องมันยาวน่ะ เอาเป็นว่าตอนนี้ฉันรับหน้าที่เป็นผู้จัดการที่ร้านนี้อยู่น่ะ!"
10002070-31 = "พอดีคุณลุงเจ้าของร้านเกิดไม่สบาย ฉันก็เลยรับหน้าที่ดูแลร้านแทนหนึ่งวัน!"
10002070-32 = "ไม่คิดว่าจะมาเจอคุณครูที่ชายหาดแบบนี้น่ะ! แบบนี้ก็ดีเลย!"
10002070-34 = "เอ๊ะ? คุณครูรู้จักเธอด้วยเหรอคะ?"
10002070-35 = "ลักษณะแบบนั้น... เด็กนักเรียนเกเฮนน่าเหรอคะ?"
10002070-36 = "...?"
10002070-37 = "[s] เล่าเรื่องเกี่ยวกับอิซุมิแบบอ้อมๆ"
10002070-40 = "อ๋อ... ขอโทษด้วยนะคะที่เสียมารยาทกับคนรู้จักของคุณครู"
10002070-41 = "เอาล่ะ ฉันจะเลี้ยงเมนูพิเศษล่าสุดทุกคนเอง มาๆ นั่งได้เลย!"
10002070-42 = "[s5] \"ธะ...เธอคิดเมนูนี้เองเหรอ?!\"\n[s6] \"หรือที่เจ้าของร้านล้มป่วยก็เพราะอาหารนั่น...!\""
10002070-43 = "ไม่ต้องห่วง คนอื่นๆ เลือกเมนูที่ต้องการได้เลย! รับรองเลยว่าทุกคนจะไม่ผิดหวังกับเมนูแน่นอน!"
10002070-44 = "ไม่ต้องห่วง คนอื่นๆ เลือกเมนูที่ต้องการได้เลย! รับรองเลยว่าทุกคนจะไม่ผิดหวังกับเมนูแน่นอน!"
10002070-45 = "ฉันจะลดราคาให้พิเศษเลยอีกด้วย!"
10002070-49 = "แบบนี้ก็ง่ายขึ้นเยอะเลย"
10002070-50 = "ขอรับน้ำใจของเธอไว้แล้วกันนะ"
10002070-51 = "ถ้าปฏิเสธน้ำใจที่คนอื่นมอบให้มันคงจะเสียมารยาทสินะคะ"
10002070-52 = "ฉันก็จะร่วมรับประทานด้วยค่ะ รุ่นพี่ก็มานั่งด้วยกันสิคะ"
10002070-58 = "[ns] \"ดะ...เดี๋ยวก่อนสิทุกคน...!\""
10002070-59 = "ว้าวววว... ดีจังเลยนะคะ!"
10002070-60 = "[s] \"ฟังที่ครูพูดหน่อยเถอะนะ...\""
10002070-61 = "หืม? เป็นอะไรไปคะคุณครู? มีเรื่องอะไรงั้นเหรอ?"
10002070-62 = "หืม? ชื่อเมนูพวกนี้น่าสนใจมากๆ เลยนะคะ"
10002070-63 = "<น้ำแข็งไสหอยนางรมทะเล> <ยากิโซบะช็อกโกแลตมินต์> <บะหมี่เย็นรสนมข้น>#n<น้ำผลไม้ปลิงทะเลรสช็อกโกแลต...>"
10002070-64 = "ชื่อเมนูดึงความสนใจได้ยอดเยี่ยมมากเลย ไอเดียสุดยอดมากเลยค่ะ"
10002070-65 = "[s] \"เปล่าหรอก... ครูคิดว่าเป็นชื่อจริงๆ เลยแหละ...\""
10002070-66 = "คะ...? หมายความว่ายังไงเหรอคะ?"
10002070-67 = "ทุกคนเลือกเมนูเสร็จรึยังน่ะ?"
10002070-68 = "ฉันพร้อมรับออเดอร์แล้วววว~!"
10002070-72 = "ถ้างั้นฉันขอน้ำแข็งไสหอยนางรมทะเลก็แล้วกันค่ะ"
10002070-73 = "พวกรุ่นพี่จะรับประทานอะไรดีคะ?"
10002070-75 = "...ยากิโซบะช็อกโกแลตมินต์"
10002070-76 = "ถ้างั้นฉันขอเป็นน้ำผลไม้ปลิงทะเลรสช็อกโกแลตแล้วกันค่ะ...!"
10002070-81 = "บะหมี่เย็นรสนมข้น"
10002070-83 = "รับออเดอร์เรียบร้อย!"
10002070-84 = "น้ำแข็งไสหอยนางรมทะเล ยากิโซบะช็อกโกแลตมินต์ บะหมี่เย็นรสนมข้น#nน้ำผลไม้ปลิงทะเลรสช็อกโกแลต อย่างละหนึ่งที่!"
10002070-85 = "[s] \"ดะ...เดี๋ยวก่อนสิ...!\""
10002070-86 = "แล้วคุณครูล่ะ? คุณครูจะรับเมนูไหนดี? ให้ฉันเลือกให้เอามั้ย?"
10002070-87 = "ว่ายังไงหืม? คุณครู?"
10002070-88 = "หืม...? จะรับอะไรดีล่ะ? หืม?"
10002070-89 = "[s] \"ครู....!!\""
10002070-90 = "(ตู้มมมม!!)"
10002070-91 = "...เอ๋?"
10002070-93 = "(ปังๆๆๆ! ปังๆๆๆ!!!)"
10002070-94 = "อะ...เอ๋~~~!? อะไรกันเนี่ย!?"
10002070-95 = "ใครบุกโจมตีร้านกันเนี่ย!? อะไรเนี่ย!? ทำไมล่ะ!?"
10002070-96 = "อะไรเนี่ย!? ทำไมล่ะ!? อะไรเนี่ยยยย...!!!"
10002070-97 = "อย่ามาทำเป็นไม่รู้เรื่องหน่อยเลย... ยัยนักก่อการร้ายทางชีวเคมี!!"
10002070-98 = "[s] \"เสียงนี้มัน...?\""
10002070-102 = "ยกโทษให้ไม่ได้..."
10002070-103 = "ยกโทษให้ไม่ได้เด็ดขาด! คิดว่าพวกเราจะปล่อยเรื่องนี้ไปง่ายๆ งั้นเหรอ!?"
10002070-104 = "หัวหน้าน่ะ... หัวหน้าของเรายังท้องเสียไม่หยุดเลย ตอนนี้แทบดูไม่ได้เลยนะ!"
10002070-106 = "อ๊าาาาาาา!? กลุ่มแยงกี้สาวอีกแล้วเหรอ...!?"
10002070-107 = "ไม่อยากเชื่อเลยว่าเราจะหลงกล...! กินอาหารของยัยนี่เข้าไป...! "
10002070-108 = "ร้านที่อันตรายแบบนี้...!! ปล่อยเอาไว้ไม่ได้แล้ว! ถล่มร้านให้ปิดไปถาวรเลย!!"
10002070-109 = "...? พูดเรื่องอะไรกันคะ...?"
10002070-110 = "พวกเราไม่จำเป็นต้องตอบหรอก!!"
10002070-112 = "ทุกคน... บุก!!"
10002070-113 = "(ปังๆๆๆ! ปังๆๆๆ!!!)  "
10002070-114 = "อ๊าาาาาาา!?  ! ร้านอาหาร...! ร้านอาหารที่ไม่ใช่ร้านของฉัน...!?!?"
10002070-115 = "ยะ...หยุดนะ! ถ้าคุณลุงเจ้าของร้านฟื้นขึ้นมาคงฆ่าฉันแน่!! อ๊าาาาา!!"
10002070-116 = "ฉันไม่รู้หรอกนะว่ายัยพวกนั้นแค้นอะไรนักหนา แต่ดูเหมือนคิดจะขัดขวางเราตั้งแต่ต้นจนจบเลยสินะ#nยัยแยงกี้พวกนั้น..."
10002070-117 = "เราจะยอมให้พวกนั้นทำลายร้านนี้ไม่ได้ค่ะ! การกินอาหารก็ถือว่าเป็นเรื่องที่สำคัญ!#nฉันทนกับความอยุติธรรมแบบนี้ไม่ได้หรอกนะคะ!"
10002070-118 = "คงจะต้องใช้การพิพากษาแห่งความยุติธรรมให้สำนึกแล้ว! ลุยกันเถอะค่ะ!!"
10002070-124 = "เอ๋~! อีกแล้วเหรออออออ~~!!"

[translation]
2003205-1 = "Planning an Operation"
2003205-2 = "I finished my work early, so I decided to pay a visit to the Super Phenomenon Task Force's club room."
2003205-3 = "[ns] \"Eimi. It's me.\""
2003205-4 = "Hmm..."
2003205-5 = "[s] \"Eimi?\""
2003205-6 = "Huh? Sensei?"
2003205-7 = "I'll be there in a minute."
2003205-12 = "I thought you were busy, so I didn't expect you today."
2003205-16 = "[ns] \"Eimi...why are you in that swimsuit again?\""
2003205-17 = "Oh, this?"
2003205-18 = "Um..."
2003205-19 = "Because I find it comfortable?"
2003205-20 = "Don't worry. I've been wearing the winter clothes you bought me as well."
2003205-21 = "Though it's a little hot inside today."
2003205-22 = "Let me take this off for now."
2003205-26 = "[ns] \"...Oh hey, what's that over there?\""
2003205-27 = "Huh? Oh, I was making a special fan for my trip to the Glacial Sea."
2003205-28 = "I wanted to bring a handheld fan with me...but Himari says I need to keep my hands warm out there."
2003205-29 = "So I designed a tool to create a breeze while also keeping my hands warm."
2003205-30 = "Do you want to try it, Sensei? I'm interested in your opinion on it."
2003205-31 = "[s] \"Of course.\""
2003205-32 = "Thank you. Here you go."
2003205-37 = "[ns] \"Huh?\""
2003205-38 = "You place the fan between your hands and rub them together."
2003205-39 = "If you stretch your arms out while rubbing your hands..."
2003205-43 = "The fan's propeller spins and creates a breeze."
2003205-44 = "You stay warm, while a cool breeze blows over your body."
2003205-45 = "[s] \"Oh! It works?!\""
2003205-46 = "Right? I'm very proud of this one."
2003205-47 = "The only problem is that it's not that efficient... Your hands tire out fast, and the breeze it makes isn't that strong."
2003205-51 = "...People could take turns since it blows the breeze everywhere?"
2003205-52 = "You always have the solution to every problem, Sensei."
2003205-54 = "Hmm... This hand rubbing is really tiring, and I'm all sweaty inside my jacket."
2003205-55 = "I got so distracted with the fan, I forgot to take it off. Let me do that."
2003205-56 = "[s] \"Wait Eimi, one second!\""
2003205-57 = "What's wrong, Sensei?"
2003205-58 = "...This jacket is a part of a fashion ensemble on top of protecting against the cold?"
2003205-59 = "...It creates a harmonic yin yang fashion synergy of hot and cold?"
2003205-60 = "...And I'll ruin my look if I take my jacket off? But I'm sweaty, Sensei..."
2003205-61 = "[s] \"True fashion is not for the weak!\""
2003205-63 = "[ns1] \"...But maybe I could lower the thermostat if you're feeling too hot?\"\n[ns2] \"Consider it training for your mission in the Glacial Sea.\""
2003205-66 = "Huh? Uh...okay."
2003205-68 = "I set the thermostat as low as it would go to make sure Eimi kept on what little clothing she had."
2003205-72 = "I kept the thermostat so low that I caught a cold myself."

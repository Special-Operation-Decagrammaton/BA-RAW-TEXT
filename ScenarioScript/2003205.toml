[translation]
2003205-1 = "เตรียมปฏิบัติการ"
2003205-2 = "(งานของคุณครูเสร็จเร็วกว่าที่คิด คุณครูจึงมุ่งหน้าไปที่ห้องชมรมปรากฏการณ์ลี้ลับ)"
2003205-3 = "[ns] \"เอมิ ครูมาแล้ว\""
2003205-4 = "อืม..."
2003205-5 = "[s] \"เอมิ?\""
2003205-6 = "เอ๋? คุณครู?"
2003205-7 = "รอแป๊บหนึ่งนะ เดี๋ยวฉันออกไป"
2003205-12 = "เห็นบอกว่าวันนี้ยุ่งๆ ฉันเลยคิดว่าจะมาไม่ได้เสียอีก"
2003205-16 = "[ns] \"เอมิ... ทำไมถึงใส่ชุดว่ายน้ำอยู่ล่ะ...?\""
2003205-17 = "อ้อ นี่เหรอ?"
2003205-18 = "อืม..."
2003205-19 = "ก็ฉันชอบน่ะ...?"
2003205-20 = "ไม่ต้องห่วงนะ ชุดที่คุณครูซื้อให้ ฉันก็ใส่อยู่เหมือนกัน"
2003205-21 = "แต่พอใส่แจ็กเกตในอาคาร มันก็ร้อนไม่ใช่เล่นเลย"
2003205-22 = "ฉันขอไปถอด..."
2003205-26 = "[ns] \"เอะ... เอมิ! จะว่าไป กำลังทำอะไรอยู่เหรอ?\""
2003205-27 = "หืม? อ้อ ฉันกำลังทำพัดลมสำหรับธารน้ำแข็งอยู่น่ะ"
2003205-28 = "ฉันว่าจะเอาพัดลมแบบมือถือไป... แต่ว่าหัวหน้าฮิมาริบอกว่าต้องทำให้มืออบอุ่นอยู่เสมอ..."
2003205-29 = "ฉันก็เลยลองทำอุปกรณ์ที่ทำให้เกิดลมได้ ในขณะที่ทำให้มือของฉันอุ่นอยู่ด้วย"
2003205-30 = "คุณครูก็มาลองใช้หน่อยมั้ย? ลองใช้งานแล้วขอความคิดเห็นด้วยนะ"
2003205-31 = "[s] \"ได้เลย\""
2003205-32 = "ขอบคุณนะ เอ้านี่"
2003205-37 = "[ns] \"นี่มัน...?\""
2003205-38 = "พัดที่ต้องใช้มือถูน่ะ"
2003205-39 = "ถ้ายืดแขนออกไปแล้วเอามือถูแบบนี้..."
2003205-43 = "พัดก็จะหมุนเหมือนใบจักรแล้วเกิดลมขึ้นมา"
2003205-44 = "แค่นี้ก็จะทำให้ส่วนอื่นเย็นสดชื่น แต่ที่มือก็จะยังอบอุ่นอยู่"
2003205-45 = "[s] \"จริงด้วยแฮะ!\""
2003205-46 = "ใช่มั้ยล่ะ? ฉันค่อนข้างมั่นใจกับอุปกรณ์ชิ้นนี้เลยละ"
2003205-47 = "แต่ว่าปัญหาก็คือมันไม่ค่อยมีประสิทธิภาพเท่าไร ก็เลยใช้นานๆ ไม่ได้... อีกอย่าง นอกจากจะทำให้แขนเจ็บ ลมก็ยังพัดไม่แรงด้วย"
2003205-51 = "ลมพัดได้รอบทิศทาง ถ้าเหนื่อยก็แค่ให้สลับกันถูงั้นเหรอ?"
2003205-52 = "นั่นสินะ คุณครูช่วยแก้ปัญหาให้ได้หลายเรื่องเลย"
2003205-54 = "อืม... ฉันถูมากไปจนรู้สึกร้อนขึ้นมาเลย ในแจ็กเกตมีแต่เหงื่อเต็มไปหมดแล้ว"
2003205-55 = "คงต้องถอดออกจริงๆ..."
2003205-56 = "[s] \"อ่า เอมิ! เดี๋ยวก่อน!\""
2003205-57 = "มีอะไรเหรอคุณครู?"
2003205-58 = "นอกจากจะเป็นมาตรการป้องกันความหนาวแล้ว ชุดนี้ยังเป็นการผสมผสานกันของแฟชั่นด้วยงั้นเหรอ?"
2003205-59 = "แฟชั่นแบบไฮบริดที่ผสมผสานระหว่างเสื้อผ้าที่เย็นและอบอุ่น แฟชั่นที่สื่อถึงความกลมกลืนของหยิน#nและหยาง..."
2003205-60 = "และถ้าถอดเสื้อตัวนอก พลังงานของหยินและหยางจะไม่สมดุลงั้นเหรอ? แต่มันร้อนมากเลยนะ..."
2003205-61 = "[s] \"ปกติแฟชั่นก็ไม่สบายตัวแบบนี้แหละ!\""
2003205-63 = "[ns1] \"ถ้าร้อนมาก ครูลดอุณหภูมิแอร์ให้เอามั้ย?\"\n[ns2] \"คิดว่าเป็นการฝึกปรับตัวให้เข้ากับธารน้ำแข็งไง\""
2003205-66 = "เอ๋? อืม... เข้าใจแล้ว"
2003205-68 = "(คุณครูปรับอุณหภูมิแอร์ให้ต่ำที่สุด เพื่อให้เอมิยังใส่แจ็กเกตอยู่ตลอด)"
2003205-72 = "(กลายเป็นกว่าพอได้ลมแอร์เย็นๆ มากเกินไป คุณครูก็เป็นหวัดซะงั้น)"

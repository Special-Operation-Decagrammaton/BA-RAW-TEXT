[translation]
2003205-1 = "作戰準備"
2003205-2 = "（因為工作提早結束的關係，抽空去了一趟特異現象搜查部部室）"
2003205-3 = "[ns]「英美，我來囉。」"
2003205-4 = "嗯……"
2003205-5 = "[s]「英美？」"
2003205-6 = "咦？老師？"
2003205-7 = "稍等一下，我馬上出去。"
2003205-12 = "因為你說今天很忙，我還以為你不會來了呢。"
2003205-16 = "[ns]「英美……你為什麼穿著泳裝……？」"
2003205-17 = "這個？"
2003205-18 = "唔……"
2003205-19 = "因為我很喜歡……？"
2003205-20 = "別擔心，我也有穿老師買給我的衣服。"
2003205-21 = "但在室內穿羽絨衣實在有點熱。"
2003205-22 = "還是先把它脫下來……"
2003205-26 = "[ns]「英，英美！話說你剛才在做什麼？」"
2003205-27 = "嗯？啊，我在製作冰海用的風扇。"
2003205-28 = "本來是打算把手持電風扇帶去的……不過陽葵部長說要保持手部溫暖……"
2003205-29 = "所以我打算親自設計一個既能保持手部溫暖，同時又能送風的裝置。"
2003205-30 = "老師想試用看看嗎？#n順便告訴我心得。"
2003205-31 = "[s]「沒問題。」"
2003205-32 = "謝謝你。來，就是這個。"
2003205-37 = "[ns]「這是……？」"
2003205-38 = "這是一種需要用手摩擦的扇子。"
2003205-39 = "只要像這樣伸直手臂，接著用雙手摩擦……"
2003205-43 = "扇子就會像螺旋槳一樣旋轉送風了。"
2003205-44 = "這樣一來就能在其他部位吹到涼風的情況下，維持手部的溫暖。"
2003205-45 = "[s]「還真的可以！？」"
2003205-46 = "對吧？這可是我的得意之作。"
2003205-47 = "不過它的缺點就在於效率偏低，所以沒辦法用太久……#n就算摩擦到手臂都痠了，製造出來的風還是很微弱。"
2003205-51 = "你說反正扇子的風能吹到四面八方，累了的話輪流摩擦就行了？"
2003205-52 = "說的也是。#n不愧是老師，一下就解決了大半的問題。"
2003205-54 = "唔嗯……剛才摩擦得太認真，突然覺得有點熱。#n羽絨衣裡已經滿身汗了。"
2003205-55 = "我看還是把它脫掉……"
2003205-56 = "[s]「啊，英美，等等！」"
2003205-57 = "怎麼了，老師？"
2003205-58 = "這件羽絨衣不只是為了禦寒，同時也是穿搭的一環？"
2003205-59 = "是用最涼爽的衣服搭配最溫暖的衣服，蘊含陰陽調和概念的混搭風穿搭……"
2003205-60 = "所以要是脫掉外套的話，風格就不成立了？#n可是我覺得很熱……"
2003205-61 = "[s]「時尚本來就是一條辛苦的道路！」"
2003205-63 = "[ns1]「如果真的很熱的話，要不要把冷氣溫度調低一點？」\n[ns2]「就當作是為冰海的寒冷氣候做的適應特訓？」"
2003205-66 = "嗯？#n好吧……我知道了。"
2003205-68 = "（為了讓英美乖乖穿著羽絨衣，決定將冷氣溫度直接調到最低）"
2003205-72 = "（結果因為吹了太久的冷氣而感冒了）"

[translation]
41180-1 = "Episode 18; Operation Clover 2"
41180-2 = "Arghhhh! Graaaaaaaah!"
41180-5 = "It really won't budge."
41180-6 = "Didn't you retrieve the Clover? Are you guys having a tea party in there?"
41180-7 = "Time's almost up! You need to get back to the rendezvous point immediately!"
41180-8 = "You know, I would love to do that. If the door wasn't closed."
41180-9 = "What?! Which imbecile closed the door behind you guys?"
41180-10 = "Even I know that closing the door to a walk-in vault room activates an auto-lock! And I don't study!"
41180-11 = "I... I... W-Well, I thought someone might s-see if I left the door open..."
41180-12 = "Did I or did I not tell you I was monitoring the situation on the CCTVs?"
41180-13 = "You acted based off your emotions and not the facts! And look at the situation you've put your squad members in!"
41180-14 = "S-Sorry... "
41180-16 = "You could've at least put in a doorstop... Anything at all..."
41180-17 = "W-Waaaaaaah!"
41180-18 = "I-I had no business joining the SRT..."
41180-19 = "A d-dumb scaredy-cat who d-drags everyone else down."
41180-20 = "I wish I'd never been born! Waaaaaah!"
41180-21 = "It's okay, Miyu. As a sniper, you're not as familiar with indoor warfare."
41180-22 = "I should've been monitoring the situation in the rear."
41180-23 = "But it's not your fault, Miyako. At all."
41180-24 = "Don't try to redirect. Miyu holds every ounce of blame here."
41180-26 = "I'm pissed too, but now isn't the time! We need to get you out before the security system goes live!"
41180-27 = "What do we do? I can try these explosives, but we didn't bring much."
41180-28 = "Can't you just hack the electronic lock like before?"
41180-29 = "I can't do that when the mechanical lock's already been triggered!"
41180-30 = "Th-This is really it... I w-wanna go home..."
41180-32 = "L-Let's all calm down first..."
41180-34 = "Miyako, use that brain of yours for something! Five minutes left!"
41180-35 = "Aren't you our leader, Miyako?"
41180-36 = "M-Miyako... Help..."
41180-41 = "M-Me?"
41180-42 = "You've got to do something, and do it now!"
41180-43 = "Miyako!"
41180-44 = "I..."
41180-50 = "(I don't know. My leadership has been nothing but failures since we left the SRT.)"
41180-51 = "(Everything from the protest to when the camp was flooded... Failures.)"
41180-52 = "(Is this all I'm capable of? I don't have the resourcefulness or leadership skills like Sensei...)"
41180-53 = "(I've led my squad members into a life-threatening situation.)"
41180-54 = "(Do I have what it takes to get them out of it? Or will I just fail again, like I always do?)"
41180-55 = "[s1] \"Get ahold of yourself, Miyako!\"\n[s2] \"This is an ongoing operation, Miyako!\""
41180-56 = "Sensei?"
41180-57 = "Sensei?"
41180-58 = "I...I can't do this, Sensei. The situation is hopeless."
41180-59 = "If you were here, you would be able to figure out a way out... You would be able to protect your squad..."
41180-60 = "But I'm not like you, Sensei. I never have been."
41180-61 = "If I tried my hardest, with all my ability..."
41180-62 = "I don't know! I just don't know, Sensei!"
41180-63 = "I can't do this on my own! I don't believe in me like you do!"
41180-64 = "[s] \"You don't have to do it on your own.\""
41180-68 = "[ns] \"Look to the squad members who've always put their trust in you!\""
41180-69 = "My squad members...trust me?"
41180-74 = "Are you stupid? Who else could lead the RABBIT Squad in a situation like this?"
41180-75 = "Do you think I could do anything? I'm pretty sure there wasn't a chapter on how to handle getting locked in a vault while raiding a police station in my textbooks."
41180-76 = "I-I'm always s-scared and lonely on sniper duty..."
41180-77 = "But y-you're the only person who's never forgotten me, Miyako."
41180-78 = "You think I'm gonna lead us? I have my hands full with helping you dummies from over here anyway."
41180-80 = "So, for now, all of us..."
41180-82 = "[s] \"All of us are putting our faith in you, Miyako!\""
41180-88 = "...Understood."
41180-89 = "As the field commander, I will be issuing orders to all members."
41180-90 = "The operation from here on out will be volatile and every decision will count. I will not be able to address your questions, and selfishly ask you follow me blindly even if you don't understand my reasonings."
41180-91 = "But I promise you, we're going to conclude this mission safely and take the Clover back to...our home. All of us."
41180-92 = "Understood?"
41180-95 = "Understood!"
41180-97 = "(Approximately five minutes later...)"
41180-102 = "The alarms at the archive room are going off! Could it be intruders?"
41180-103 = "No way. We haven't seen anything on the CCTVs."
41180-104 = "It was probably just a stray cat or something."
41180-105 = "How would a stray cat make it past the vault door?"
41180-106 = "Beats me, maybe it came through a hole or something."
41180-118 = "Here, kitty, kitty, kitty...."
41180-121 = "What the! Who are you?!"
41180-135 = "When it comes to security concerns, you should always assume the worst. That's standard practice."
41180-136 = "Undisciplined attitudes like yours explain the current state of Kivotos!"
41180-141 = "I-Intruders!"
41180-153 = "Miyako was right. All we had to do was trip the alarm on purpose, and the Security Bureau came running right over to let us out."
41180-154 = "I guess I should be grateful that our colleagues who are supposed to be sharing the responsibility of Kivotos' safety are stupid as hell..."
41180-155 = "B-But..."
41180-156 = "The alarms are still going off..."
41180-161 = "Yes. Reinforcements will be arriving soon."
41180-162 = "The objective is to play this aggressively and catch them off guard. But avoid large groups and open areas."
41180-163 = "We'll stage our attack at the eastern hallway. It's narrow with a lot of cover."
41180-167 = "Remain vigilant for ambushes and make your way to the rendezvous point! Move out!"

[translation]
41180-1 = "第18話;幸運草作戰（２）"
41180-2 = "咕，咕唔……！"
41180-5 = "……不行，完全打不開。"
41180-6 = "證據都到手了是在做什麼？"
41180-7 = "已經沒有時間了，趕快出來吧？"
41180-8 = "沒聽到嗎？門打不開啊。"
41180-9 = "……哈啊？話說為什麼要關起來啊？"
41180-10 = "這種金庫的門一定會自動上鎖啊！"
41180-11 = "開，開著的話，我想說會被發現……"
41180-12 = "這部分我都確認好了耶……"
41180-13 = "為～什麼要擔心這種事情啊？"
41180-14 = "對，對不起……"
41180-16 = "至少夾個門擋之類的就好了……"
41180-17 = "嗚嗚，嗚嗚嗚……"
41180-18 = "果然我這種人，不該進入SRT啊……"
41180-19 = "只會害怕，拖累大家……"
41180-20 = "我這種人，沒出生就好了……"
41180-21 = "美優，請不要說那種話。狙擊手不習慣在屋內行動是沒辦法的事。"
41180-22 = "不如要怪我沒有考慮到這點。"
41180-23 = "……真的是那樣嗎？"
41180-24 = "不要蒙混過去，這確實是美優的失誤吧。"
41180-26 = "沒時間爭論是誰的錯了，時間限制快到了。"
41180-27 = "那要我們怎麼辦啊。難道要像我剛才說的，硬是打穿嗎？"
41180-28 = "話說，像剛才一樣駭入不就好了嗎？"
41180-29 = "只解除電子鎖沒有意義吧，因為物理上門沒辦法打開啊。"
41180-30 = "嗚嗚，好想死……好想逃……"
41180-32 = "各，各位，先冷靜下來……"
41180-34 = "都子，沒有什麼好方法嗎？已經剩下不到5分鐘了唷？"
41180-35 = "好歹也是小隊長吧。"
41180-36 = "都子醬……"
41180-41 = "我，我……"
41180-42 = "快點決定，都子。沒有時間了！"
41180-43 = "都子！"
41180-44 = "……"
41180-50 = "（……回想起來離開SRT之後，我指揮的作戰全都失敗了）"
41180-51 = "（公園的時候也是，營地浸水的時候也是……）"
41180-52 = "（……我沒有像老師一樣的戰略能力和統率能力）"
41180-53 = "（在這個絕境……）"
41180-54 = "（我到底，可以做什麼……？）"
41180-55 = "[s1] 「都子，冷靜一點。」\n[s2] 「還沒有結束唷。」"
41180-56 = "……老師。"
41180-57 = "……老師。"
41180-58 = "這個狀況……我什麼都做不到。"
41180-59 = "老師在這裡的話，說不定可以想辦法解決……"
41180-60 = "但是我，和老師不一樣。沒有那種力量。"
41180-61 = "就算有，現在我也已經不知道該如何是好了……！"
41180-62 = "只憑我一個人，什麼都做不到！"
41180-63 = "我，無法相信我自己……！"
41180-64 = "[s] 「不用一個人背負一切沒關係。」"
41180-68 = "[ns] 「相信大家吧。」"
41180-69 = "……？"
41180-74 = "要由妳來吧。"
41180-75 = "教戰手冊沒有記載這種情境，所以我沒辦法。"
41180-76 = "雖然任務中總是，一直在害怕……"
41180-77 = "但是，因為有都子醬在……"
41180-78 = "話說我也什麼都做不了了。光是報務就忙不過來了。"
41180-80 = "所以……"
41180-82 = "[s] 「拜託你了，都子。」"
41180-88 = "……是，我了解了。"
41180-89 = "作戰重新開始。接下來，各位可能會對指示有所質疑，但也請不要猶豫，遵從指示。"
41180-90 = "狀況並不樂觀，接下來也會重重困難吧。即使如此……"
41180-91 = "還是讓我們盡力帶著這個「幸運草」……回到[ruby=兔寶寶公園]我們的歸所[/ruby]吧。"
41180-92 = "可以嗎？"
41180-95 = "了解！"
41180-97 = "（約5分鐘後……）"
41180-102 = "是警報！！"
41180-103 = "監視器什麼都沒拍到耶？"
41180-104 = "不是野貓或老鼠之類的嗎？"
41180-105 = "管理室的警報耶，貓是要怎麼進去啊。"
41180-106 = "挖了洞之類的？"
41180-118 = "小貓咪～出來吧～#n如果是老鼠的話就有點那個了……"
41180-121 = "……咦？"
41180-135 = "發生異常時，必須預設最壞的情況。"
41180-136 = "就因為你們那種心態，奇普托斯的問題才會源源不絕。"
41180-141 = "是，是入侵者！"
41180-153 = "竟然故意讓警報響起……是教戰手冊上沒有，很符合都子風格的戰略呢。#n讓對方替我們打開門啊。"
41180-154 = "話說回來，一起承擔奇普托斯治安的部隊竟然這麼鬆散……有點慶幸又有點失落……"
41180-155 = "這，這個，真的沒問題……？"
41180-156 = "警報，一直在響耶……"
41180-161 = "是，其他學生也會陸續趕來吧。"
41180-162 = "盡可能不要在視野開闊的地方遇敵。#n接敵時基本上都要由我們進行突襲。"
41180-163 = "使用掩體較多的東側走廊吧。"
41180-167 = "注意埋伏的同時，[ruby=Objective Rally Point]向ORP移[/ruby]動！"

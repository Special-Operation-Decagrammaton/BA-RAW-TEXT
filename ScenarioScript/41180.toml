[translation]
41180-1 = "第18話;クローバー作戦（２）"
41180-2 = "くっ、ぐぅっ……！"
41180-5 = "……ダメだ、開く気がしない。"
41180-6 = "で、証拠も確保したのに何やってるわけ？"
41180-7 = "もう時間無いけど、さっさと出たら？"
41180-8 = "聞こえてなかったのか？扉が開かないんだよ。"
41180-9 = "……は？そもそもどうして閉めたのさ？"
41180-10 = "金庫の扉なんか普通オートロックに決まってるじゃん！"
41180-11 = "あ、開けておいたら、誰かに見つかっちゃうかなって……。"
41180-12 = "私がその辺はちゃんと見てるってのに……。"
41180-13 = "なーんでそこで不安がるかなぁ？"
41180-14 = "ご、ごめんなさい……"
41180-16 = "せめてドアストッパー的なものでも挟んでおけば良かったものを……。"
41180-17 = "うう、ううう……。"
41180-18 = "やっぱり私なんかが、SRTに入るべきじゃなかったんだ……。"
41180-19 = "怖がってばかりで、みんなの足を引っ張って……。"
41180-20 = "私なんか、生まれてこなければ……。"
41180-21 = "ミユ、そんなことを言わないでください。狙撃手が屋内行動に慣れていないのは仕方ありません。"
41180-22 = "むしろそれを考慮できていなかった私の落ち度です。"
41180-23 = "……本当にそうか？"
41180-24 = "誤魔化すなよ、ミユのミスに違いは無いだろ。"
41180-26 = "誰のせいとか言ってる場合じゃないでしょ、時間制限も近いんだよ？"
41180-27 = "じゃあどうしろって言うんだ。さっき私が言ったように、無理やりブチ抜くか？"
41180-28 = "っていうか、さっきみたいにハッキングすれば良い話じゃ？"
41180-29 = "電子ロック外しただけじゃ意味ないでしょ、物理的に扉が開かないんだから。"
41180-30 = "うぅ、死にたい……逃げたい……。"
41180-32 = "み、みんな、まずは落ち着いて……。"
41180-34 = "ミヤコ、何か良い方法無いの？もう5分も残ってないよ？"
41180-35 = "仮にも小隊長なんだろ。"
41180-36 = "ミヤコちゃん……。"
41180-41 = "わ、私は……。"
41180-42 = "早く決めて、ミヤコ。時間が無い！"
41180-43 = "ミヤコ！"
41180-44 = "……。"
41180-50 = "（……思えばSRTを離れて以来、私が指揮をした作戦は全部失敗してる）"
41180-51 = "（公園の時も、キャンプが浸水した時も……）"
41180-52 = "（……私には先生みたいな戦略眼も、統率力も無い）"
41180-53 = "（この絶体絶命の状況で……）"
41180-54 = "（私に一体、何が……？）"
41180-55 = "[s1] \"ミヤコ、落ち着いて。\"\n[s2] \"まだ終わってないよ。\""
41180-56 = "……先生。"
41180-57 = "……先生。"
41180-58 = "この状況……私には、どうにもできません。"
41180-59 = "先生がここにいたら、どうにかできたかもしれませんが……。"
41180-60 = "私は、先生とは違います。そんな力はありません。"
41180-61 = "たとえあったとしても、今はもう何も分からないんです……！"
41180-62 = "私だけじゃ、何もできません！"
41180-63 = "私は、私自身を信じられない……！"
41180-64 = "[s] \"全部をひとりで背負わなくても大丈夫。\""
41180-68 = "[ns] \"みんなのことを信じてあげて。\""
41180-69 = "……？"
41180-74 = "お前がやるんだろ。"
41180-75 = "教範にこんなシチュエーション載ってないんだから、私には無理。"
41180-76 = "任務はいつも、怖いことばかりだけど……。"
41180-77 = "でも、ミヤコちゃんがいるから……。"
41180-78 = "っていうか私にはもう何もできないし。オペレーションだけで手いっぱい。"
41180-80 = "だから……"
41180-82 = "[s] \"よろしく、ミヤコ。\""
41180-88 = "……はい、了解です。"
41180-89 = "あらためて、作戦を開始します。この先、指示に気になる点も出てくるかもしれませんが、どうか迷わず従ってください。"
41180-90 = "状況は良くありません、この先いくつも困難があるでしょう。それでも……"
41180-91 = "どうにかこの「クローバー」を持って……[ruby=子ウサギ公園]私たちの居場所[/ruby]に戻りましょう。"
41180-92 = "良いですね？"
41180-95 = "了解！"
41180-97 = "（それから約5分後……）"
41180-102 = "警報だ！！"
41180-103 = "監視カメラには何も映ってないけど？"
41180-104 = "野良猫とか、ネズミとかじゃないの？"
41180-105 = "保管庫の警報だぞ、どうやって猫が入り込むんだ。"
41180-106 = "穴でも掘ったんじゃない？"
41180-118 = "猫ちゃーん、出ておいてー。ネズミはちょっとあれだけど～……"
41180-121 = "……え？"
41180-135 = "異変が生じた時には、最悪の場合を想定するのが基本。"
41180-136 = "そんな心構えだから、キヴォトスにトラブルが絶えないんだ。"
41180-141 = "し、侵入者だ！"
41180-153 = "わざと警報機を鳴らすとか……教範には無い、ミヤコらしい戦略だな。向こうに扉を開けさせるわけか。"
41180-154 = "にしても、一緒にキヴォトスの治安を担う部隊がこの練度とか……幸いのような、落ち込むような……。"
41180-155 = "こ、これ、本当に大丈夫……？"
41180-156 = "警報、ずっと鳴ってるけど……。"
41180-161 = "はい、他の生徒たちも次々に集まって来るでしょう。"
41180-162 = "視界が開けたところでは遭遇しないように。基本的に接敵する際はこちら側から、意表を突く形で。"
41180-163 = "遮蔽物が多い、東側の廊下を使いましょう。"
41180-167 = "待ち伏せに注意しつつ[ruby=Objective Rally Point]、ORPま[/ruby]で移動します！"

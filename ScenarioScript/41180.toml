[translation]
41180-1 = "ตอนที่ 18;ปฏิบัติการโคลเวอร์ 2"
41180-2 = "ฮึบบบบ... ฮึบบบบ...!"
41180-5 = "ไม่ได้การแล้ว... ประตูไม่ขยับเลยแม้แต่นิดเดียว"
41180-6 = "อุตส่าห์ได้หลักฐานมาแล้วทั้งที แล้วทำไมถึงมาติดในนี้ล่ะ!?"
41180-7 = "เวลาเหลือไม่มากแล้วนะ! รีบออกมาจากห้องเก็บเอกสารได้แล้ว!"
41180-8 = "ถึงจะอยากออกแต่ก็ออกไม่ได้หรอก ประตูมันปิดน่ะ"
41180-9 = "ว่าไงนะ? แล้วไปปิดทำไมเล่า?"
41180-10 = "ถ้าปิดประตูแบบตู้เซฟก็โดนล็อกอัตโนมัติน่ะสิ เรื่องแค่นี้ไม่รู้รึไง?!"
41180-11 = "คือ... คือว่า ฉันกลัวว่าถ้าเปิดไว้แล้วจะมีคนผ่านมาเห็น..."
41180-12 = "ก็บอกแล้วไงว่าฉันดูกล้องวงจรปิดข้างนอกให้อยู่!"
41180-13 = "ทำไมถึงกังวลไม่เข้าเรื่องแล้วไปทำอะไรที่ไม่ได้สั่งล่ะ?"
41180-14 = "ขะ... ขอโทษนะ"
41180-16 = "รู้งี้ติดตัวยึดประตูไว้ก่อนเข้ามาก็น่าจะดี..."
41180-17 = "ฮือ... ฮือออ..."
41180-18 = "คนอย่างฉันไม่ควรเข้ามาใน SRT ตั้งแต่แรกเลย..."
41180-19 = "ฉันทั้งขี้กลัว และเป็นภาระให้กับสมาชิกคนอื่นอยู่เรื่อย..."
41180-20 = "ไม่สิ ฉันคงผิดตั้งแต่เกิดมาบนโลกใบนี้แล้ว..."
41180-21 = "อย่าโทษตัวเองเกินไปสิคะมิยุ จะทำยังไงได้ล่ะคะ ก็สไนเปอร์ไม่คุ้นชินกับการต่อสู้ในอาคารนี่นา"
41180-22 = "มันเป็นความผิดพลาดของฉันเองค่ะที่ไม่ได้คาดสถานการณ์เผื่อไว้"
41180-23 = "จะเป็นความผิดของมิยาโกะได้ยังไงเล่า..."
41180-24 = "อย่าโทษตัวเองสิ นี่มันความผิดของมิยุชัดๆ"
41180-26 = "นี่มันใช่เวลามาโทษว่าใครทำผิดเหรอไงกัน? หาวิธีออกมาให้ได้ก่อนระบบรักษาความปลอดภัยจะกลับ#nมาทำงานเถอะน่า!"
41180-27 = "แล้วจะให้ทำยังไงเล่า? ให้เจาะประตูอย่างที่ฉันบอกเมื่อกี๊เลยไหมล่ะ?"
41180-28 = "ว่าแต่ เราแฮ็กระบบแล้วปลดกุญแจอิเล็กทรอนิกส์แบบที่ทำเมื่อกี๊ไม่ได้เหรอ?"
41180-29 = "ปลดกุญแจอิเล็กทรอนิกส์ได้แล้วยังไงล่ะ มันยังมีกลอนประตูแบบเครื่องจักรอยู่ต่างหากด้วยอีกนะ!"
41180-30 = "ปฏิบัติการล้มเหลวแล้ว... ฉันไม่อยากอยู่แล้ว... อยากหนีไปเลย..."
41180-32 = "ทะ... ทุกคนคะ ใจเย็นๆ กันก่อน..."
41180-34 = "ไม่มีความคิดดีๆ เหรอมิยาโกะ? เราเหลือเวลาไม่ถึง 5 นาทีแล้วนะ!"
41180-35 = "นั่นสิ ตอนนี้เธอเป็นหัวหน้านะ"
41180-36 = "มิยาโกะจัง..."
41180-41 = "ฉะ... ฉันเหรอคะ?"
41180-42 = "รีบตัดสินใจสิมิยาโกะ เราไม่มีเวลาแล้วนะ!"
41180-43 = "มิยาโกะ...!"
41180-44 = "ฉัน..."
41180-50 = "(จะว่าไป... นับตั้งแต่จาก SRT มา การสั่งการของเราไม่เคยสำเร็จเลยสักครั้ง)"
41180-51 = "(ทั้งวันแรกในสวนสาธารณะ ทั้งวันที่น้ำท่วมค่าย...)"
41180-52 = "(บางทีนี่อาจเป็นเรื่องจริงที่เราต้องยอมรับ... ว่าเราไม่มีไหวพริบหรือความเป็นผู้นำเหมือนคุณครูเลย)"
41180-53 = "(แล้วในสถานการณ์ที่สิ้นหวังครั้งนี้...)"
41180-54 = "(เราจะนำทีมจนปฏิบัติการสำเร็จได้หรือเปล่านะ...?)"
41180-55 = "[s1] \"ตั้งสติหน่อยมิยาโกะ!\"\n[s2] \"เรายังอยู่ระหว่างปฏิบัติการนะ!\""
41180-56 = "คุณครู...?"
41180-57 = "คุณครู...?"
41180-58 = "ฉัน... สั่งการต่อไม่ได้แล้วค่ะ สถานการณ์ที่นี่มันน่าสิ้นหวังมากค่ะ"
41180-59 = "ถ้าคุณครูอยู่ตรงนี้ด้วย ฉันก็คงคิดหาวิธีที่จะฝ่าฟันอุปสรรคนี้ไปได้..."
41180-60 = "ฉันไม่มีความสามารถอย่างคุณครูหรอกค่ะ..."
41180-61 = "ถึงใครจะบอกว่าฉันมีความสามารถอื่นซ่อนอยู่..."
41180-62 = "แต่ฉันก็ทำอะไรเองคนเดียวไม่ได้เลยค่ะ!"
41180-63 = "ฉัน... ไม่เชื่อมั่นในตัวเองเลยค่ะ..."
41180-64 = "[s] \"อย่าฝืนแบกรับทุกอย่างไว้คนเดียวสิ\""
41180-68 = "[ns] \"เชื่อใจสมาชิกที่พึ่งพาเธอสิ!\""
41180-69 = "สมาชิก... ที่พึ่งพาฉันเหรอคะ?"
41180-74 = "ก็ใช่น่ะสิ ถ้าไม่ใช่เธอแล้วใครจะมาสั่งการกองทหาร RABBIT ล่ะ?"
41180-75 = "อีกอย่าง การบุกรุกสถานีตำรวจแล้วติดอยู่ในห้องนิรภัยไม่ได้มีอยู่ในหนังสือคู่มือของ SRT ด้วย"
41180-76 = "ถึงงานของสไนเปอร์จะเป็นงานที่โดดเดี่ยวและน่ากลัว..."
41180-77 = "แต่พอรู้ว่ามิยาโกะจังคอยคุ้มกันให้อยู่ ฉันก็รู้สึกสบายใจขึ้นนะ"
41180-78 = "นี่ทุกคนไม่ได้จะหวังพึ่งฉันใช่ไหม? แค่ควบคุมระบบปฏิบัติการอยู่ตรงนี้ฉันก็จะสมองระเบิดแล้วนะ"
41180-80 = "เพราะฉะนั้นตอนนี้ทุกคนต้อง..."
41180-82 = "[s] \"ครูจะเชื่อใจมิยาโกะ!\""
41180-88 = "ก็ได้ค่ะ..."
41180-89 = "ถ้าอย่างนั้นฉันในฐานะผู้บัญชาการภาคสนามจะกำกับการปฏิบัติของสมาชิกทุกคนค่ะ"
41180-90 = "ด้วยสถานที่ปฏิบัติงานที่มีการเปลี่ยนสภาพอย่างกะทันหัน ฉันจึงไม่อาจตอบคำถามของทุกคนได้ค่ะ ถึงฉันจะออกคำสั่งที่ไม่เข้าท่า ก็ขอให้ทุกคนทำตามคำสั่งนั้นแทนที่จะตั้งคำถามนะคะ"
41180-91 = "และเมื่อปฏิบัติการเสร็จสิ้นแล้ว เราจะเอา <โคลเวอร์> นี้ออกไป... และกลับไปที่[ruby=โคะอุซางิ การ์เด้น]บ้านของพวกเรา[/ruby]กันค่ะ"
41180-92 = "เข้าใจใช่ไหมคะ?"
41180-95 = "เข้าใจแล้ว!"
41180-97 = "(5 นาทีต่อมา...)"
41180-102 = "มะ... มีสัญญาณเตือนจากห้องเก็บเอกสาร! หรือว่ามีผู้บุกรุก?"
41180-103 = "ไม่หรอก ในกล้องวงจรปิดก็ไม่เห็นมีอะไร จะไปมีผู้บุกรุกได้ไงล่ะ?"
41180-104 = "คงเป็นแมวจรจัดหรือหนูแถวนี้ที่ไปโดนเครื่องส่งสัญญาณเตือนภัยน่ะ"
41180-105 = "ว่าแต่แมวจะผ่านเข้าประตูเหล็กของห้องเก็บเอกสารไปได้ไงล่ะ?"
41180-106 = "ไม่รู้สิ คงไหลเข้าไปทางไหนละมั้ง ไม่เคยได้ยินเหรอว่าแมวเป็นสัตว์ที่ไม่มีกระดูกน่ะ?"
41180-118 = "ว่ากันว่ามันจะมายึดโลกด้วยนะ"
41180-121 = "หืม? คุณคือ..."
41180-135 = "ถ้ารู้สึกได้ถึงความผิดปกติระหว่างอยู่เวร ก็ต้องสันนิษฐานว่าจะเกิดสิ่งเลวร้ายไว้ก่อนสิ"
41180-136 = "เพราะตำรวจทั้งชิลและชักช้าแบบนี้ไง ความวุ่นวายในคิโวทอสก็เลยไม่จบสิ้นสักที"
41180-141 = "มะ... มีผู้บุกรุก!"
41180-153 = "พอเปิดสัญญาณเตือนภัยตามที่มิยาโกะบอก นักเรียนจากสำนักความมั่นคงก็รีบมาเปิดประตูให้เองเลย"
41180-154 = "สหายที่มีหน้าที่ดูแลความสงบของคิโวทอสโง่และทึ่มได้ขนาดนี้เลยเหรอ ฉันต้องดีใจหรือเสียใจกันนะ"
41180-155 = "วะ... ว่าแต่ตอนนี้สถานการณ์ปลอดภัยแล้วเหรอ?"
41180-156 = "สัญญาณเตือนภัยมันดังไม่หยุดเลยมาสักพักแล้วนะ..."
41180-161 = "ค่ะ นักเรียนคนอื่นในโรงเรียนตำรวจที่ได้ยินสัญญาณเตือนภัยคงกำลังแห่กันมาทางนี้แล้วค่ะ"
41180-162 = "เราจะเจาะจุดอ่อนของฝ่ายตรงข้ามแล้วปะทะโดยตรง แต่เราจะหลีกเลี่ยงการเผชิญหน้ากับคนจำนวน#nมากในพื้นที่โล่งค่ะ"
41180-163 = "ทางเดินฝั่งตะวันออกที่มีวัตถุกำบังเยอะน่าจะเหมาะสมที่สุดค่ะ..."
41180-167 = "ทุกคนระวังการซุ่มโจมตี แล้วไปให้ถึง[ruby=จุดรวมพล]จุด ORP [/ruby] นะคะ"

[translation]
2000520-1 = "深夜的喝茶時光"
2000520-2 = "（好不容易在休假時來海邊，#n　但去到每個地方，不知為何都有遇到麻煩的市民請求協助……）"
2000520-8 = "這位客人，難道……"
2000520-9 = "您就是那個有名的奇普托斯萬事通，#n夏萊的[USERNAME]老師嗎……？"
2000520-10 = "[s]「啊，是……應該吧。」"
2000520-11 = "哎呀～沒想到那個鼎鼎有名的[USERNAME]老師居然會大駕光臨，#n真是太榮幸了！"
2000520-12 = "聽說老師來到了這附近，#n我本來就很期待老師會不會來我們店裡呢。"
2000520-13 = "最近我們推出了新菜單，#n但不知為何，學生們的反應並不是很好……"
2000520-14 = "雖然經過多次的試錯，#n不過我實在不太懂現在的流行……"
2000520-15 = "如果您願意的話，希望您可以給我們的新菜單一些指教……！"
2000520-16 = "[s]「如果不嫌棄我的意見的話……」"
2000520-22 = "請，請幫幫我……！#n海邊的不良學生搶走了我的錢包……！"
2000520-23 = "裡面放了我一個星期的伙食費……"
2000520-24 = "這樣下去的話，就得吃乾海帶芽撐到下一個發薪日了……"
2000520-25 = "[s1]「請等我一下哦。」\n[s2]「我馬上去幫你把錢包拿回來。」"
2000520-32 = "嗚哇～姐姐～你在哪裡～"
2000520-33 = "這裡是哪裡～姐姐～"
2000520-34 = "[s3]「你怎麼啦？迷路了嗎？」\n[s4]「沒事的！我馬上幫你把姐姐帶來。」"
2000520-45 = "（處理著不斷蜂擁而來的各種事件，不知不覺間就到了晚上……）"
2000520-47 = "（正打算享受一下略晚的散步時……）"
2000520-59 = "[ns]「日，日步美……？」"
2000520-60 = "咦，老師？#n這麼晚了，老師在這裡做什麼呢？"
2000520-61 = "為了轉換心情想來散步一下……原來如此。"
2000520-62 = "啊哈哈……真巧呢。#n我也正好在一個人兜風。"
2000520-63 = "[s5]「這麼晚還兜風啊……」\n[s6]「會不會有點危險？」"
2000520-66 = "沒問題的！我準備了很多東西。"
2000520-67 = "能照亮黑漆漆海邊的憤怒阿德利探照燈……"
2000520-68 = "還有佩洛洛大人的毯子！有了這個就不會冷了！"
2000520-69 = "此外……為了被不良學生包圍時準備的，十字軍醬用的榴散彈──"
2000520-70 = "[s]「沒有最後那個應該也沒關係……」"
2000520-71 = "啊，我還準備了這個……！"
2000520-77 = "為了紀念Momo好友1週年發售的戰車用茶壺！"
2000520-78 = "我想可能會在兜風的時候想喝茶，所以就帶來了。"
2000520-85 = "[ns]「戰車用茶壺……？」"
2000520-86 = "是的，戰車上經常需要用到熱水。"
2000520-87 = "例如在行駛中喝茶，或是用於清潔……"
2000520-88 = "還有……在有著美麗夜景的地方與老師偶然相遇的時候泡茶，之類的……"
2000520-92 = "老師，紅茶馬上就能泡好……#n不介意的話，要不要喝一杯呢？"
2000520-93 = "眺望著夜晚的大海享受的喝茶時光，似乎也別有一番風情哦。"
2000520-94 = "[s]「嗯，那就拜託你囉。」"
2000520-95 = "嗯，我馬上就準備！"
2000520-100 = "（之後，眺望著倒映在海中的月光，和日步美一起品嚐了紅茶）"

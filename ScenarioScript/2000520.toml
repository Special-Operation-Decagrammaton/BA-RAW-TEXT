2000520-32 = "3;미아가 된 꼬마 아가씨 2;02;으앙, 언니~ 어디 간 거야~\n#3;stiff"
2000520-33 = "3;미아가 된 꼬마 아가씨 2;02;이럴 줄 알았으면 자리에서 언니를 기다릴 걸…… 우아앙……"
2000520-34 = "[s3] \"길을 잃은 거니?\"\n[s4] \"잠시만 기다리렴. 금방 언니를 찾아줄게.\""

[translation]
2000520-1 = "ชาแดงกลางดึก"
2000520-2 = "(หลังจากที่รอมานาน คุณครูก็ได้มาพักผ่อนที่ทะเล แต่เพราะอะไรบางอย่าง ไม่ว่าจะเดินไปทางไหน#nก็ได้รับคำขอ และคำไหว้วานจากชาวเมืองมารัวๆ...)"
2000520-8 = "คือว่าคุณลูกค้า..."
2000520-9 = "ใช่ คุณครู [USERNAME] นักคลี่คลายปัญหามือฉกาจของคิโวทอส คนที่ชื่อเสียงโด่งดังหรือเปล่าครับ...?"
2000520-10 = "[s] \"อืม... ก็ใช่แหละ\""
2000520-11 = "ว้าว! ไม่คิดเลยว่าคุณครู [USERNAME] ชื่อดังคนนั้นจะมาที่ร้านของเราแบบนี้ รู้สึกเป็นเกียรติมากๆ เลยครับ!"
2000520-12 = "ตอนแรกที่ได้ยินว่าคุณครูแวะมาที่แถวๆ ย่านนี้ ก็แอบคาดหวังอยู่เหมือนกันว่าจะแวะมาที่ร้านของพวก#nเราบ้างรึเปล่าน่ะครับ"
2000520-13 = "คราวนี้ร้านของเราคิดค้นเมนูใหม่มาขาย แต่ไม่รู้ว่าเพราะอะไร กระแสตอบรับจากพวกนักเรียนถึงไม่ดี#nเท่าที่ควรเลยครับ"
2000520-14 = "ผมพยายามคิดหาคำตอบอยู่นานแล้ว แต่ก็ไม่ค่อยเข้าใจความคิดของนักเรียนสมัยนี้สักเท่าไร..."
2000520-15 = "ถ้าสะดวกละก็อยากจะขอให้คุณครูที่คลุกคลีอยู่กับพวกเด็กๆ ช่วยแนะนำเกี่ยวกับเมนูนี้หน่อยได้รึเปล่า#nครับ...?"
2000520-16 = "[s] \"ถ้าความเห็นของฉันพอช่วยได้ละก็ยินดีช่วยเลย...\""
2000520-22 = "ชะ...ช่วยด้วย...! พะ...พวกเด็กเกเรที่ชายหาดขโมยกระเป๋าสตางค์ฉันไป...!"
2000520-23 = "ค่าอาหารทั้งอาทิตย์อยู่ในกระเป๋าใบนั้นเลยนะ..."
2000520-24 = "ถ้าไม่ได้กระเป๋าสตางค์คืนมาละก็ วันที่เหลือก็คงจะต้องนั่งกินสาหร่ายแห้งแทนข้าวแล้วละ..."
2000520-25 = "[s1] \"รอตรงนี้แป๊บหนึ่งนะ\"\n[s2] \"จะไปเอากระเป๋าสตางค์คืนจากนักเรียนพวกนั้นให้เอง\""
2000520-32 = "แงงงง พี่สาวหายไปไหน~"
2000520-33 = "รู้งี้ รอพี่สาวอยู่ที่เดิมก็คงดี... ฮึกๆๆ..."
2000520-34 = "[s3] \"หลงทางเหรอ?\"\n[s4] \"รอแป๊บหนึ่งนะ จะรีบตามหาพี่สาวให้เดี๋ยวนี้แหละ\""
2000520-45 = "(หลังจากจัดการเหตุการณ์ต่างๆ ที่เกิดขึ้น ก็พบว่าเวลาล่วงเลยมาจนฟ้ามืดแล้ว...)"
2000520-47 = "(และในตอนที่คุณครูคิดว่าจะไปเดินเล่นริมชายหาด...)"
2000520-59 = "[ns] \"ฮะ... ฮิฟุมิ...?\""
2000520-60 = "เอ๋ คุณครู? ดึกขนาดนี้แล้วมาทำอะไรที่ชายหาดแบบนี้เหรอคะ?"
2000520-61 = "...คะ? รู้สึกเหนื่อยๆ เพราะวิ่งวุ่นแก้ปัญหามาทั้งวัน เลยอยากมาเดินเล่นรับลมริมทะเลงั้นเหรอคะ?"
2000520-62 = "อะฮ่าฮ่า... บังเอิญจังเลยนะคะ ฉันเองก็อยากออกมาชมบรรยากาศทะเลตอนกลางคืน ก็เลยออก#nมาดำน้ำคนเดียวน่ะค่ะ"
2000520-63 = "[s5] \"ดำน้ำตอนดึกแบบนี้เนี่ยนะ...\"\n[s6] \"ดำน้ำตอนนี้ ไม่อันตรายเกินไปหน่อยเหรอ...?\""
2000520-66 = "ไม่ต้องห่วงหรอกค่ะ ฉันเตรียมอุปกรณ์ต่างๆ ไว้พร้อมสำหรับการดำน้ำกลางคืนแล้วละค่ะ"
2000520-67 = "ไฟฉายรูปคุณแองกี้อาเดลีที่ทำให้ชายหาดที่มืดมิดสว่างเจิดจ้าขึ้นมาได้ แล้วก็..."
2000520-68 = "ผ้าห่มท่านเพโรโร่ที่ห่มแล้วอบอุ่นสุดฟินในตอนกลางคืนค่ะ!"
2000520-69 = "อ้อ แล้วฉันก็เตรียมกระสุนลูกปรายสำหรับครูเซเดอร์จังมาด้วย เผื่อว่ามีพวกเด็กเกเรน่ากลัวๆ ออกมา#nก่อกวน—"
2000520-70 = "[s] \"ครูว่าของอย่างสุดท้าย ไม่ต้องเตรียมมาก็ได้นะ...\""
2000520-71 = "อ๊ะ แล้วก็เตรียมอันนี้มาด้วยค่ะ...!"
2000520-77 = "กาน้ำชารุ่นพิเศษที่วางขายตอนฉลองครบรอบ 1 ปีของการวางขาย MOMO FRIENDS ค่ะ!"
2000520-78 = "เผื่อว่าจะมีโอกาสได้พักดื่มชา ตอนจะออกมาดำน้ำก็เลยเตรียมมาเผื่อด้วยค่ะ"
2000520-85 = "[ns] \"กาน้ำชารุ่นพิเศษ...?\""
2000520-86 = "ค่ะ ฉันเคยบอกคุณครูไปแล้วนี่คะว่ามีเรื่องให้ใช้น้ำร้อนอยู่บ่อยๆ ตอนอยู่ในรถถังน่ะค่ะ"
2000520-87 = "ทั้งช่วงพักดื่มชาระหว่างเดินทาง หรือตอนทำความสะอาดคราบสกปรกที่ติดอยู่ที่รถถัง..."
2000520-88 = "แล้วก็... ตอนที่บังเอิญเจอกับคุณครูในสถานที่ที่มีทิวทัศน์กลางคืนสวยๆ แบบนี้ไงคะ..."
2000520-92 = "ถ้าเป็นชาแดงละก็ใช้เวลาเตรียมไม่นานเลยค่ะ คุณครูสนใจดื่มชาสักหน่อยมั้ยคะ?"
2000520-93 = "นั่งดื่มชาพร้อมกับได้ดื่มด่ำบรรยากาศทะเลกลางคืนไปด้วย จะต้องเป็นช่วงเวลาที่สุดยอดมากแน่ๆ ค่ะ"
2000520-94 = "[s] \"ถ้างั้นชงชาให้ครูแก้วหนึ่งแล้วกัน\""
2000520-95 = "ได้เลยค่ะ ถ้างั้นรบกวนรอสักครู่นะคะ!"
2000520-100 = "(จากนั้น คุณครูก็ใช้เวลานั่งดื่มชาแดงและดื่มด่ำบรรยากาศท้องทะเลต้องแสงจันทร์ยามค่ำคืนไป#nพร้อมๆ กับฮิฟุมิ)"

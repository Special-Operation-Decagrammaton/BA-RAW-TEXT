[translation]
2000520-1 = "Midnight Tea"
2000520-2 = "Despite being at the beach for vacation, I was bombarded with requests everywhere I went."
2000520-8 = "Excuse me..."
2000520-9 = "Aren't you the famous strategist and problem solver, [USERNAME] Sensei...?"
2000520-10 = "[s] \"Well, I can't say I'm not...\""
2000520-11 = "Wow, it's such an honor to have you here, [USERNAME] Sensei!"
2000520-12 = "When I heard you were visiting this area, I was so excited thinking you might visit us!"
2000520-13 = "We launched a new menu, but the students don't seem to like it too much."
2000520-14 = "I try to see it from their perspective, but I'm just too old to know what the kids like these days."
2000520-15 = "Since you're around students quite a bit, do you think you could give me some thoughts on my menu?"
2000520-16 = "[s] \"Well, if my opinion matters at all...\""
2000520-22 = "H-Help...! The bad students on the beach took my wallet...!"
2000520-23 = "I had this week's money for food in it..."
2000520-24 = "If I don't get it back, I might have to live off dried seaweed for the rest of vacation..."
2000520-25 = "[s1] \"Hold on a minute. I'll get it back\"\n[s2] \"I'll retrieve the wallet from the students for you.\""
2000520-32 = "*sob* Sis, where did you go?"
2000520-33 = "I should have stayed where I was and waited for her... *sob*"
2000520-34 = "[s3] \"Are you lost? Here, let's go find your sister.\"\n[s4] \"Just a second, let me find your big sister for you.\""
2000520-45 = "By the time I had finished solving these countless problems, the sun had long set. It was already night."
2000520-47 = "And just as I was about to enjoy a late, beach side walk..."
2000520-59 = "[ns] \"H-Hifumi...?\""
2000520-60 = "Oh, Sensei? What are you doing here at the beach this late at night?"
2000520-61 = "...I see. You're tired from solving problems all day, and you're out here to relax with a walk..."
2000520-62 = "Ahaha... What are the odds? I'm out here for a drive because I wanted some fresh, late-night beach side air too."
2000520-63 = "[s5] \"But it's quite late for a drive...\"\n[s6] \"Isn't that a little dangerous?\""
2000520-66 = "It's okay. I'm well prepared for a late night drive."
2000520-67 = "Here, the Angry Adelie-shaped flashlight to brighten up the beach, and..."
2000520-68 = "...My Peroro blanket to keep myself warm in the cold of the night!"
2000520-69 = "And I even brought this Crusader shrapnel, just in case I run into any problems."
2000520-70 = "[s] \"I feel like the last one wasn't really necessary...\""
2000520-71 = "Oh, I brought this too...!"
2000520-77 = "The Momo Friends 1-Year Anniversary Special Edition Teapot, made for tanks!"
2000520-78 = "I thought I might have a tea time, so I brought this teapot with me for a drive."
2000520-85 = "[ns] \"Teapot made for tanks...?\""
2000520-86 = "Yep, as I told you before, hot water is needed quite often when running a tank."
2000520-87 = "Like, for a tea time while driving or for tank-washing..."
2000520-88 = "Or...when I unexpectedly meet Sensei on the beach with beautiful late night scenery..."
2000520-92 = "If you'd like, Sensei, I can brew us a cup of black tea."
2000520-93 = "I love sipping tea while I look out at the star-lit beach."
2000520-94 = "[s] \"One cup of tank-flavored tea, please!\""
2000520-95 = "Okay! Coming right up!"
2000520-100 = "And then, I enjoyed a relaxing tea time with Hifumi on the beach with the moon lighting our way."

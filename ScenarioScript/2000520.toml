2000520-58 = "3;히후미 수영복ND;01\n#3;a\n#wait;1000"
2000520-59 = "[ns] \"히, 히후미……?\""
2000520-60 = "3;히후미 수영복ND;02;어라, 선생님? 이렇게 늦은 시간에 바닷가에는 무슨 일이신가요?\n#3;em;[반응]"
2000520-61 = "3;히후미 수영복ND;04;……네? 하루 종일 사건을 해결하느라 지쳐 잠시 기분 전환을 위해 산책을 나오셨다고요?"
2000520-62 = "3;히후미 수영복ND;08;아하하…… 우연이네요. 저도 마침 밤바다의 공기가 마시고 싶어서 혼자 드라이브를 나온 참이었거든요."
2000520-63 = "[s5] \"이렇게 늦은 시간의 드라이빙이라니……\"\n[s6] \"조금은 위험하지 않겠어?\""
2000520-64 = "#wait;100"
2000520-65 = "#wait;100"
2000520-66 = "3;히후미 수영복ND;00;괜찮아요. 심야의 드라이브를 대비해서 여러 가지 준비물을 꼼꼼히 챙겨왔거든요.\n#3;em;[음표]"
2000520-67 = "3;히후미 수영복ND;03;어두운 해변을 환하게 밝혀줄 수 있는 앵그리 아델리 씨 모양의 서치라이트와……\n#3;em;[재잘]\n#3;m2\n#3;hophop"
2000520-68 = "3;히후미 수영복ND;03;밤에도 체온을 따듯하게 덥혀줄 수 있는 페로로님 담요!\n#3;em;[재잘]\n#3;m3\n#3;hophop"
2000520-69 = "3;히후미 수영복ND;06;그리고 혹시라도 무서운 불량 학생이 시비를 걸 때를 대비한 크루세이더용 유산탄까지—\n#3;closeup"
2000520-70 = "[s] \"마지막 물건은 없어도 괜찮을 것 같아……\""
2000520-71 = "3;히후미 수영복ND;05;아, 그리고 이것도 준비했어요……!\n#3;em;[!]"
2000520-72 = "#st;[0,0];instant;1;"
2000520-73 = "#clearST"
2000520-74 = "3;히후미 수영복ND;01\n#3;greeting\n#wait;1000"
2000520-75 = "3;히후미 수영복ND;05\n#3;m1\n#wait;1000"
2000520-76 = "#wait;2000\n#bgshake"
2000520-77 = "3;히후미 수영복ND;02;모모프렌즈 발매 1주년 기념으로 출시된 전차용 티포트예요!"
2000520-78 = "3;히후미 수영복ND;00;혹시 차를 마실 일이 있을지도 몰라서 드라이브를 나올 때 티포트도 챙겨서 가져왔어요.\n#3;em;[재잘]"
2000520-79 = "#st;[0,0];instant;1;"
2000520-80 = "#clearST"
2000520-81 = "3;히후미 수영복ND;01\n#3;greeting\n#wait;1000"
2000520-82 = "3;히후미 수영복ND;05\n#3;m3\n#wait;1000"
2000520-83 = "3;히후미 수영복ND;03\n#3;em;[반짝]\n#wait;1000"
2000520-84 = "#wait;1000"
2000520-85 = "[ns] \"전차용 티포트……?\""
2000520-86 = "3;히후미 수영복ND;00;네, 전에도 말씀드렸지만, 전차에서는 온수를 쓸 일이 많으니까요."
2000520-87 = "3;히후미 수영복ND;02;주행 중의 티타임이라던가, 전차의 청소에 필요한 더운물이라던가……"
2000520-88 = "3;히후미 수영복ND;08;그리고 이렇게…… 아름다운 야경이 펼쳐진 장소에서 선생님과 우연히 마주쳤을 때라던가…….\n#fontsize;50\n#3;stiff\n#3;em;[///]"
2000520-89 = "#st;[0,0];instant;1;"
2000520-90 = "#clearST"
2000520-91 = "3;히후미 수영복ND;04\n#3;em;[...]\n#wait;2000"
2000520-92 = "3;히후미 수영복ND;05;선생님. 홍차라면 금방 준비해 드릴 수 있는데, 차 한 잔 어떠신가요?"
2000520-93 = "3;히후미 수영복ND;02;어두운 밤바다를 바라보며 즐기는 티타임도 제법 운치가 있을 거예요."
2000520-94 = "[s] \"그럼 한 잔 부탁할게.\""
2000520-95 = "3;히후미 수영복ND;03;네, 잠시만 기다려 주세요!\n#3;em;[하트]\n#3;greeting"

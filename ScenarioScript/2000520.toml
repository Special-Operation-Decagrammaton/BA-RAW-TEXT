[translation]
2000520-1 = "#title;심야의 홍차"
2000520-2 = "#na;(모처럼 휴양을 위해 바다를 찾았지만, 어째서인지 가는 곳마다 시민들의 부탁이 끊이질 않았다……)"
2000520-3 = "#st;[0,0];instant;1;"
2000520-4 = "#clearST"
2000520-5 = "4;바다의 집 주인;01\n#4;a\n#wait;1000"
2000520-6 = "4;바다의 집 주인;01\n#4;em;[!]\n#wait;1000"
2000520-7 = "4;바다의 집 주인;01\n#4;m3"
2000520-8 = "4;바다의 집 주인;01;혹시 손님……?"
2000520-9 = "4;바다의 집 주인;01;그 키보토스의 해결사로 이름난 샬레의 [USERNAME] 선생님 아니신가요……?"
2000520-10 = "[s] \"일단은 그렇습니다만……\""
2000520-11 = "4;바다의 집 주인;01;이야, 그 유명한 [USERNAME] 선생님께서 저희 가게를 찾아 주실 줄이야. 정말 영광입니다!\n#4;greeting"
2000520-12 = "4;바다의 집 주인;01;안 그래도 선생님께서 이 근처에 오셨다고 해서 혹시나 저희 가게에 오시지는 않을까 기대하고 있었거든요.\n#4;em;[재잘]\n#4;hophop"
2000520-13 = "4;바다의 집 주인;01;저희 가게에서 이번에 신메뉴를 내놓았는데, 어째서인지 학생들의 반응이 영 좋지 않아서요."
2000520-14 = "4;바다의 집 주인;01;고심에 고심을 거듭했지만 요즘 학생들의 생각이라는 게 알기 어려워서……\n#4;stiff"
2000520-15 = "4;바다의 집 주인;01;혹시 괜찮으시다면, 학생들과 교류가 많은 선생님께서 이 신메뉴에 대해 직접 조언해 주실 수 있으실까요?"
2000520-16 = "[s] \"제 의견이라도 괜찮으시다면야……\""
2000520-17 = "#st;[0,0];instant;1;"
2000520-18 = "#clearST"
2000520-19 = "4;바다의 집 주인;01\n#4;em;[반짝]\n#wait;1500"
2000520-20 = "#all;hide"
2000520-21 = "3;불쌍한 시민;01\n#3;al\n#wait;1500"
2000520-22 = "3;불쌍한 시민;01;도, 도와주세요……! 해안가의 불량 학생들이 제 지갑을 빼앗아 갔어요……!\n#3;hophop\n#3;em;[!]"
2000520-23 = "3;불쌍한 시민;01;그 지갑 안에 1주일 치 식비가 모두 들어있는데……"
2000520-24 = "3;불쌍한 시민;01;이대로 지갑을 되찾지 못하면 남은 휴가 동안 마른미역만으로 배를 채워야 할지도……\n#3;stiff\n#3;em;[속상함]"
2000520-25 = "[s1] \"잠시만 기다려 주세요.\"\n[s2] \"바로 그 학생들을 찾아 지갑을 받아오겠습니다.\""

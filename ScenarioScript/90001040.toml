90001040-32 = "[ns] \"หืม...?\""
90001040-33 = "อย่าบอกนะว่า?!"
90001040-39 = "จะทักทายกันไปก็เท่านั้น ตัดเรื่องการทักทายออกไปก่อนเถอะ"

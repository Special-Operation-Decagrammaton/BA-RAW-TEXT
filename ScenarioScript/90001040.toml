[translation]
90001040-1 = "第4話;重逢"
90001040-2 = "！！！"
90001040-3 = "唔嗯～未免也太強了吧……？"
90001040-4 = "跟先前的葛夫拉完全不同。"
90001040-5 = "彷彿發生了根本性的改變……！"
90001040-9 = "[ns1]（該怎麼辦……！？）\n[ns2]（得先想辦法逃離這裡才行……！）"
90001040-16 = "葛夫拉正往這邊接近！"
90001040-17 = "……"
90001040-18 = "各位，我會想辦法爭取時間，請盡快──"
90001040-19 = "你的這個習慣實在不是很好哦，季。"
90001040-25 = "（話雖如此，這種情況下該怎麼讓直升機平安起飛呢……？）"
90001040-26 = "（哪怕只送走老師也好，接著再……）"
90001040-28 = "AMAS部隊，出擊。"
90001040-32 = "[ns]「咦……？」"
90001040-33 = "難道是！？"
90001040-39 = "問候環節就先省略吧？#n畢竟那樣既不合理──"
90001040-43 = "也不是眼下最重要的事。"
90001040-46 = "啊啊──是你──！！！"
90001040-48 = "[ns]「莉央！」"
90001040-49 = "先專心對付眼前的敵人吧，老師。#n陽葵你也是。"
90001040-50 = "我來支援你們。#n針對第5名預言者葛夫拉的對策……我已經準備完畢了。"
90001040-51 = "……現在也沒有其他辦法了，就聽你的吧！"
90001040-52 = "[s]「謝謝你！」"

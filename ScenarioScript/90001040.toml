90001040-48 = "[ns] \"ริโอะ!\""
90001040-49 = "ตั้งใจดูศัตรูที่อยู่ตรงหน้าดีกว่านะครู แล้วก็ฮิมาริด้วย"
90001040-50 = "ฉันจะช่วยซัพพอร์ตให้เอง ส่วนเรื่องสถานะของเกวูราห์ ผู้เลื่อมใสตนที่ 5 น่ะ... ฉันมีแผนรับมือแล้ว"
90001040-51 = "เข้าใจแล้วค่ะ ตอนนี้เราก็ไม่มีวิธีอื่นแล้วด้วย!"
90001040-52 = "[s] \"ขอบใจนะ!\""

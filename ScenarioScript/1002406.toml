[translation]
1002406-1 = "จุดสุดท้าย"
1002406-2 = "(คุณครูออกไปหน้าตึกแล้วเห็นว่าชิโรโกะมาอยู่หน้าประตูแล้ว)"
1002406-3 = "หวัดดีคุณครู"
1002406-4 = "ฉันก็เพิ่งมาถึงเมื่อกี๊เลย ทำเวลาได้ตรงกันเลยนะ"
1002406-5 = "[s1] \"หืม? ชิโรโกะ?\"\n[s2] \"ปั่นจบทริปแล้วเหรอ?\""
1002406-6 = "อื้ม หลังจากจุดแวะพักเมื่อกี๊ก็ปั่นยาวตามถนนลาดยางมาเลยน่ะ"
1002406-7 = "อื้ม หลังจากจุดแวะพักเมื่อกี๊ก็ปั่นยาวตามถนนลาดยางมาเลยน่ะ"
1002406-8 = "ถนนเส้นนี้ไม่ได้มีเนินอะไร ฉันก็เลยทำความเร็วได้ดีกว่าปกติ เพราะอยากให้ลมตีหน้าด้วยน่ะ"
1002406-9 = "แต่ว่า... มันยังไม่จบทริปหรอก"
1002406-10 = "ที่นี่คือจุดสุดท้าย ฉันต้องไปเข้าเส้นชัยที่อะบิดอส"
1002406-11 = "[s3] \"จุดสุดท้าย?\"\n[s4] \"ไปถึงอะบิดอสเลยเหรอ?\""
1002406-12 = "ใช่ ต้องไปให้ถึงอะบิดอส ฉันก็เลยแวะมาทักทายคุณครูที่นี่ก่อนน่ะ"
1002406-13 = "ใช่ ต้องไปให้ถึงอะบิดอส ฉันก็เลยแวะมาทักทายคุณครูที่นี่ก่อนน่ะ"
1002406-14 = "หืม? ทำไมฉันถึงไม่ขอให้ไปรอที่อะบิดอสน่ะเหรอ?"
1002406-15 = "อืม... ก็เพราะฉันให้คุณครูไปหามาหลายที่แล้ว ที่สุดท้ายฉันก็เลยอยากมาหาเอง..."
1002406-16 = "งั้นไว้ฉันถึงอะบิดอสแล้วจะติดต่อมาใหม่นะ"
1002406-17 = "หืม? คุณครูบอกว่ายังไงนะ?"
1002406-18 = "[s5] \"ไปด้วยกันเลยสิ\"\n[s6] \"มาคุยเรื่องการปั่นผจญภัยระหว่างไปก็ได้\""
1002406-19 = "อ่อ..."
1002406-20 = "อ่อ..."
1002406-21 = "อืม... แต่ว่าอะบิดอสมันอยู่ไกลมากเลยนะคุณครู คุณครูน่าจะเหนื่อยนะ..."
1002406-22 = "ถ้าเป็นจักรยานที่มีเบาะหลังฉันก็คงให้ซ้อนท้ายได้ แต่ว่านี่เป็นจักรยานสำหรับคนเดียว..."
1002406-23 = "......"
1002406-24 = "ไม่สิ... ค่อยๆ ไปก็ได้ ฉันจะปรับความเร็วให้เข้ากับของคุณครูเอง"
1002406-25 = "ถ้างั้นฉันจะออกตัวแล้วนะ ค่อยๆ ตามมานะ"
1002406-26 = "มันไม่ยากหรอก ฉันจะค่อยๆ ไป"
1002406-27 = "[s] เดินตามชิโรโกะไป"
1002406-30 = "(คุณครูเดินด้วยฝีเท้าก้าวเท่าๆ กันกับที่ชิโรโกะเดินจูงจักรยานและมุ่งหน้าไปยังอะบิดอส)"
1002406-31 = "(ระหว่างทางชิโรโกะก็เล่าเรื่องที่ได้เจอระหว่างทริปปั่นข้ามคิโวทอสของเธอ)"
1002406-32 = "(และจู่ๆ ก็พูดเก่งขึ้นมากกว่าปกติ)"
1002406-44 = "(การเดินจากชาเล่ต์มาอะบิดอสใช้เวลาค่อนข้างนานเหมือนกับที่ชิโรโกะได้บอกไว้)"
1002406-45 = "(เป็นเวลาบ่ายแล้วกว่าทั้งคู่จะมาถึงประตู และกว่าจะเข้าไปในสนามกีฬาและเตรียมความพร้อมเสร็จ#nก็เป็นช่วงพลบค่ำ)"
1002406-48 = "อื้ม... เสร็จแล้ว"
1002406-49 = "การปั่นจักรยานทางไกลข้ามคิโวทอสสำเร็จแล้วล่ะคุณครู"
1002406-50 = "ฉันคิดว่าจะมีป้ายแสดงความยินดีอะไรแบบนั้นให้ซะอีก..."
1002406-51 = "[s] \"ดีใจด้วยนะชิโรโกะ\""
1002406-52 = "อื้ม..."
1002406-53 = "ขอบคุณนะคุณครู"
1002406-54 = "ฉันคิดว่าที่สำเร็จเพราะได้คุณครูมาช่วยล่ะ"
1002406-55 = "ทั้งบนถนนเลียบชายหาด... ทั้งในภูเขา... ทั้งบนสะพาน..."
1002406-56 = "ไหนจะริมแม่น้ำ... แล้วก็ในใจกลางเมืองด้วย..."
1002406-57 = "ฉันได้... สิ่งนั้น..."
1002406-61 = "จากคุณครูทุกที่เลย"
1002406-62 = "[s] \"......?\""
1002406-63 = "เอ่อ... ไม่มีอะไรหรอก ไม่มีอะไร"
1002406-64 = "ก็แค่... อืม..."
1002406-65 = "พอมาคิดดูแล้ว ฉันได้เจอคุณครูในหลายพื้นที่เลยนะ"
1002406-66 = "ว่าแล้วเชียว..."
1002406-71 = "ดีแล้วที่ออกไปปั่นจักรยาน"
1002406-72 = "มันคือความสำเร็จครั้งใหญ่เลย..."

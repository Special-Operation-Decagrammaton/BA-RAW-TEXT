[translation]
1002406-1 = "#title;마지막 포인트"
1002406-2 = "#na;(건물 앞으로 나가니, 문 앞까지 도착해 있던 시로코의 모습이 보였다.)"
1002406-3 = "3;시로코 라이딩;02;안녕, 선생님.\n#3;em;[반응]\n#3;a"
1002406-4 = "3;시로코 라이딩;03;마침 나도 이제 막 도착한 참인데, 타이밍이 잘 맞았네."
1002406-5 = "[s1] \"응? 시로코?\"\n[s2] \"벌써 다 완주한 거야?\""
1002406-6 = "3;시로코 라이딩;01;응. 그 뒤부터는 한 번에 들어오는 포장도로가 있었으니까."
1002406-7 = "3;시로코 라이딩;01;응. 그 뒤부터는 한 번에 들어오는 포장도로가 있었으니까."
1002406-8 = "3;시로코 라이딩;99;경사도 없는 길들이라 속력을 좀 내서 달렸어. 시원한 바람도 더 느낄 생각으로.\n#3;em;…"
1002406-9 = "3;시로코 라이딩;02;……아. 하지만 아직 완주는 아니야.\n#3;stiff"
1002406-10 = "3;시로코 라이딩;03;이곳은 마지막 포인트. 완주는 아비도스까지 돌아가는 거니까.\n#3;em;[반짝]"
1002406-11 = "[s3] \"마지막 포인트?\"\n[s4] \"아비도스까지?\""
1002406-12 = "3;시로코 라이딩;01;응. 아비도스까지. 그런 의미에서 선생님에게 인사를 하러 온 거야."
1002406-13 = "3;시로코 라이딩;01;응. 아비도스까지. 그런 의미에서 선생님에게 인사를 하러 온 거야."
1002406-14 = "3;시로코 라이딩;02;……응? 그냥 아비도스로 불렀어도 됐던 거 아니냐고?\n#3;em;[?]"
1002406-15 = "3;시로코 라이딩;04;으음……. 그치만 지금까지 계속 불러냈으니까, 마지막은 내가 찾아가려고 했던 건데…….\n#3;em;[땀]\n#3;stiff"
1002406-16 = "3;시로코 라이딩;01;아비도스에 도착한 뒤에도 다시 연락할까?"
1002406-17 = "3;시로코 라이딩;04;응? 괜찮다고……? 그럼……."
1002406-18 = "[s5] \"지금부터 같이 가면 되지.\"\n[s6] \"가는 길에 일주 이야기를 좀 들어볼까.\""
1002406-19 = "3;시로코 라이딩;02;……어어…….\n#3;em;…"
1002406-20 = "3;시로코 라이딩;02;……어어…….\n#3;em;…"
1002406-21 = "3;시로코 라이딩;04;으음……. 선생님. 알겠지만 여기서부터 아비도스까지는 꽤 멀어. 선생님이 힘들 텐데…….\n#3;em;[땀]\n#3;stiff"
1002406-22 = "3;시로코 라이딩;04;뒷좌석이 있는 자전거였다면 태워줄 수 있었겠지만, 이건 1인용 사이클이고……."
1002406-23 = "3;시로코 라이딩;99;……."
1002406-24 = "3;시로코 라이딩;01;……아냐. 천천히 가면 될 것 같아. 속력은 내가 맞추면 되니까.\n#3;em;[반응]"
1002406-25 = "3;시로코 라이딩;03;그럼 선생님. 출발할 테니 느긋하게 따라와.\n#3;em;[반짝]\n#3;greeting"
1002406-26 = "3;시로코 라이딩;03;힘들지 않게, 천천히 갈 테니."
1002406-27 = "[s] 시로코를 따라 걷는다."
1002406-28 = "#wait;100"
1002406-29 = "#all;hide"
1002406-30 = "#na;(이후 걸음걸이 속도에 맞춰, 천천히 자전거를 끄는 시로코와 함께 아비도스까지 향했다.)"
1002406-31 = "#na;(가는 동안 시로코는 라이딩 동안 보았던 것들에 대해 쭉 이야기했다.)"

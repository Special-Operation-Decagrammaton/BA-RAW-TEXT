[translation]
1002406-1 = "The Last Stop"
1002406-2 = "I went to the front of the building and saw Shiroko at the gates."
1002406-3 = "Hi, Sensei."
1002406-4 = "I just got here too. Our timing is perfect."
1002406-5 = "[s1] \"What brings you here, Shiroko?\"\n[s2] \"Why here? Shouldn't you be on your trek?\""
1002406-6 = "Well, I took the road since it leads straight here."
1002406-7 = "Well, I took the road since it leads straight here."
1002406-8 = "There weren't any hills along the way, so nothing slowed me down. I also thought enjoying the cool breeze would be nice."
1002406-9 = "But, no. I'm still not finished with the trek yet."
1002406-10 = "This is the last checkpoint. I have to return to Abydos to complete the trip."
1002406-11 = "[s3] \"This is the last point?\"\n[s4] \"You're going back to Abydos after this?\""
1002406-12 = "Yes. I wanted to see you again before going back home."
1002406-13 = "Yes. I wanted to see you again before going back home."
1002406-14 = "Huh? Why didn't I just have you meet me at Abydos?"
1002406-15 = "Hmm. You came to see me at every point up until now. I thought I should come to you for once."
1002406-16 = "Should I contact you once I've arrived at Abydos?"
1002406-17 = "No? What should we do, then?"
1002406-18 = "[s5] \"I can go together with you from here.\"\n[s6] \"Let's discuss your trip along the way.\""
1002406-19 = "Oh, um..."
1002406-20 = "Oh, um..."
1002406-21 = "I appreciate the sentiment, Sensei, but Abydos is still a long way from here by bike. It won't be easy for you."
1002406-22 = "And this bike only fits one person. If only I had a back seat..."
1002406-23 = "..."
1002406-24 = "No, never mind. It should be fine if I go slowly. I can match your speed."
1002406-25 = "I'll start us off. You follow me at a pace you're comfortable with."
1002406-26 = "I'll go slow and steady."
1002406-27 = "[s] Follow Shiroko on foot."
1002406-30 = "Shiroko slowly pushed her bicycle as she matched my walking speed, and we went to Abydos together."
1002406-31 = "As we traveled, Shiroko shared all of the things she saw on her trek."
1002406-32 = "She was much more talkative than usual."
1002406-44 = "Shiroko was right. Going from Schale to Abydos on foot took a very long time."
1002406-45 = "It was early in the afternoon when we left, but the sun was already starting to set by the time we arrived at the playing field."
1002406-48 = "Okay. We're here."
1002406-49 = "My trek across Kivotos is finally over, Sensei. I did it."
1002406-50 = "I thought about making something to commemorate this, but that would be a little..."
1002406-51 = "[s] \"Congratulations on completing the trek, Shiroko.\""
1002406-52 = "Oh."
1002406-53 = "Thank you, Sensei."
1002406-54 = "I think I was able to pull it off because I had your help."
1002406-55 = "Whether it was on the coast, in the mountains, crossing the bridge..."
1002406-56 = "...or at the riverbank, and eventually the heart of the city."
1002406-57 = "You were always there, Sensei."
1002406-61 = "You were always with me."
1002406-62 = "[s] \"...?\""
1002406-63 = "Um, never mind. It's nothing."
1002406-64 = "It's just, well..."
1002406-65 = "When I think about all the different places I got to meet you, Sensei..."
1002406-66 = "...I can't help but think that I was right."
1002406-71 = "That going on this trip was a good idea."
1002406-72 = "I'm so glad that I did it."

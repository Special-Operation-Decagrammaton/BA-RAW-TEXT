[translation]
1002406-1 = "回來的歸處"
1002406-2 = "（突然想到白子會不會經過夏萊，便走下大樓，並也真的看到她了）"
1002406-3 = "嗨，老師！"
1002406-4 = "我剛好抵達，時機完美。"
1002406-5 = "[s1] 「歡迎回來！」\n[s2] 「辛苦了，已經全程結束了嗎？」"
1002406-6 = "嗯，這附近有一條能直接回來這裡的路。"
1002406-7 = "嗯，這附近有一條能直接回來這裡的路。"
1002406-8 = "因為是沒有坡度的道路，所以我就加快了速度。風也很涼爽很舒服。"
1002406-9 = "……啊，但還不算真的騎完全程。"
1002406-10 = "之前沒告訴老師，這裡其實是我的最後休息點。而終點和起點一樣，是阿拜多斯。"
1002406-11 = "[s3] 「原來是這樣。」\n[s4] 「所以接下來要前往阿拜多斯囉？」"
1002406-12 = "嗯。想說前往終點之前，先來和老師碰面。"
1002406-13 = "嗯。想說前往終點之前，先來和老師碰面。"
1002406-14 = "……嗯？直接叫老師去阿拜多斯等不就可以了嗎……？"
1002406-15 = "嗯……因為那個……我想說最後這一次應該要由我去找老師比較好……"
1002406-16 = "難道，有造成困擾嗎？"
1002406-17 = "嗯，沒關係……？那麼那個，就是，老師不介意的話……"
1002406-18 = "[s5] 「一起去阿拜多斯吧。」\n[s6] 「去阿拜多斯的路上，讓我聽聽旅途中發生的事吧。」"
1002406-19 = "……嗯。"
1002406-20 = "……嗯。"
1002406-21 = "啊，不過……如老師所知，從這邊到阿拜多斯有相當的距離唷。先不說我，不過我想老師會很辛苦吧……"
1002406-22 = "要是這台自行車有後座就好了，但是雙載又會違法……"
1002406-23 = "那個……"
1002406-24 = "……嗯，也不需要著急呢。我會配合老師調整速度，我們慢慢走吧。"
1002406-25 = "那走吧，老師。"
1002406-26 = "不用勉強唷。慢慢的，兩個人一起。吶？"
1002406-27 = "[s] 跟在白子旁邊，兩人開始慢步出發"
1002406-30 = "（於是，白子也配合我的腳步慢慢牽著自行車，兩人朝著阿拜多斯前進）"
1002406-31 = "（一路上，白子訴說著她在騎旅時看到的各種事物）"
1002406-32 = "（初次見面時完全無法想像，她會變得如此健談）"
1002406-44 = "（……雖然心中有數但就像白子說的一樣，從夏萊徒步走到阿拜多斯花了相當久的時間）"
1002406-45 = "（抵達阿拜多斯之後，待白子整理好行李把各個東西收拾乾淨時，已經夜幕低垂了）"
1002406-48 = "……嗯，結束。"
1002406-49 = "奇普托斯長途縱貫騎旅，成功了。老師。"
1002406-50 = "慶祝的拉炮之類的，如果有準備的話就好了呢……"
1002406-51 = "[s] 「恭喜你跑完全程，白子。」"
1002406-52 = "……嗯。"
1002406-53 = "謝謝老師。光是這句話就讓我十分開心了。"
1002406-54 = "因為有老師幫忙，我才能完成這段旅程。"
1002406-55 = "不管是在海邊……在山上……在橋上……"
1002406-56 = "在河邊……在市區……旅途中的任何時候……"
1002406-57 = "……老師都一直陪在我身邊。"
1002406-61 = "那個，我說一直是指一種精神上的感覺，沒有其他意思……"
1002406-62 = "[s] 「……？」"
1002406-63 = "……嗯，不對，抱歉。沒問題，別在意。"
1002406-64 = "只是，那個，該怎麼說才好呢……"
1002406-65 = "對現在的我來說，老師已經成為一個，會一直陪伴在我身邊的存在了。"
1002406-66 = "……謝謝你，老師。"
1002406-71 = "我很慶幸有決定要執行這次的旅行。"
1002406-72 = "……嗯，真的。打從心底。"

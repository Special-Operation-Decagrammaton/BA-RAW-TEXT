[translation]
10036130-1 = "How the Squad Enjoys the Game 1"
10036130-3 = "Step right up!"
10036130-4 = "Welcome to \"Full Salvo!\" Stop those cute little enemies and win yourself a prize!"
10036130-5 = "What are the rules?"
10036130-6 = "It's simple!"
10036130-7 = "I'll send targets after the prize, and you have to stop 'em!"
10036130-9 = "S-Saori, look, there's a scoreboard..."
10036130-10 = "Is that new issue of \"BiBi\" magazine one of the prizes?"
10036130-11 = "It sure is! There's also restaurant gift cards, photo booth tickets..."
10036130-12 = "But just to let you know, no one's actually won a prize yet today."
10036130-13 = "S-Seriously?!"
10036130-15 = "It must be harder than it looks."
10036130-16 = "No surprise there, I guess..."
10036130-17 = "Nothing can ever be easy."
10036130-18 = "Still, I'm tougher than I look."
10036130-19 = "I've been through a lot of hardships, spent a lot of time scrounging in the scrap yards."
10036130-20 = "And on top of that..."
10036130-21 = "I've got everyone backing me up this time!"
10036130-22 = "At once!"
10036130-23 = "R-Right! I've marched through cold and hunger! This is..."
10036130-28 = "...a game. This is a game."
10036130-29 = "All right, let's start off with the novice stage!"
10036130-30 = "Atsuko, Hiyori, Misaki, let's go!"
10036130-32 = "Y-Yeah!"
10036130-33 = "I'd rather not, but if you really need me..."
10036130-34 = "(Heehee, Saori seems like she's having fun...)"

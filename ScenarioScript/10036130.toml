[translation]
10036130-1 = "小隊享受遊戲的方法（１）"
10036130-3 = "歡迎光臨！"
10036130-4 = "歡迎來到「全彈發射！～阻止一擁而上的可愛目標贏得獎品吧！～」！"
10036130-5 = "這是什麼樣的遊戲呢？"
10036130-6 = "很簡單！"
10036130-7 = "只要阻止我放出來的目標接近獎品就行了！"
10036130-9 = "沙，沙織姐，你看旁邊的得分板……！"
10036130-10 = "最新一期的時尚雜誌《BiBi》也在獎品清單上！？"
10036130-11 = "正是如此！還有包含餐券、拍立得照相券在內的多種獎品哦！"
10036130-12 = "只可惜今天一整天還沒有任何人贏走獎品就是了！"
10036130-13 = "什，什麼……！"
10036130-15 = "……是個看似容易，實則困難的遊戲嗎？"
10036130-16 = "不，想想這也不奇怪……"
10036130-17 = "世上本來就沒有簡單輕鬆的事。"
10036130-18 = "即便這聽起來或許很可笑……"
10036130-19 = "但我也是經歷了很多……諸如收集廢鐵和尋找失物之類的艱難考驗。"
10036130-20 = "更何況……"
10036130-21 = "這次有大家跟我在一起，沒什麼好怕的！"
10036130-22 = "嗯！"
10036130-23 = "沒，沒錯！跟在寒冷和飢餓中不停行軍相比……這點困難根本不算什麼！"
10036130-28 = "……不是，只是玩個遊戲而已吧。"
10036130-29 = "那麼就從初級開始吧！"
10036130-30 = "我們上吧，敦子、日和、美咲！"
10036130-32 = "是，是！"
10036130-33 = "雖然不是很想，但既然你們人手不足的話……"
10036130-34 = "（呵呵，沙織看起來很開心……）"

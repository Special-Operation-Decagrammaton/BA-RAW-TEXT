[translation]
10036130-1 = "เล่นเกมตามสไตล์สควอด 1"
10036130-3 = "เชิญเลยครับ!"
10036130-4 = "ยินดีต้อนรับเข้าสู่ซุ้มเกม <ยิงให้กระจาย! ขวางน้องที่น่ารักไว้ อย่าให้มาแย่งของรางวัล!~> นะครับ"
10036130-5 = "เกมนี้เล่นยังไงเหรอ?"
10036130-6 = "ง่ายมากเลยครับ!"
10036130-7 = "แค่ป้องกันไม่ให้น้องๆ ที่ผมจะปล่อยออกไปเข้าใกล้ของรางวัลก็พอครับ!"
10036130-9 = "พะ... พี่ซาโอริ ดูตรงป้ายคะแนนข้างๆ นั่นสิคะ...!"
10036130-10 = "มีนิตยสารแฟชั่น <BiBi> ฉบับล่าสุดอยู่ในรายการของรางวัลด้วยค่ะ!"
10036130-11 = "ใช่แล้วครับ! นอกจากนี้ยังมีบัตรกำนัลร้านอาหาร ตั๋วถ่ายรูปโฟโต้บูธ กับของอื่นๆ อีกเพียบเลยครับ!"
10036130-12 = "แต่ต้องบอกก่อนนะครับว่าวันนี้ยังไม่มีใครที่คว้ารางวัลของเราไปได้เลย!"
10036130-13 = "ระ... เรื่องนั้น...!"
10036130-15 = "เกมนี้คง... เล่นยากกว่าที่เห็นงั้นสินะ?"
10036130-16 = "ไม่สิ คงต้องบอกว่า..."
10036130-17 = "โลกนี้ไม่มีอะไรที่ได้มาง่ายๆ ตั้งแต่แรกอยู่แล้ว"
10036130-18 = "แต่มันก็น่าลองอยู่นะ"
10036130-19 = "ที่ผ่านมาฉันก็ผ่านการทดสอบที่ทรหดมานับไม่ถ้วน... ทั้งเก็บเศษเหล็กหรือหาของที่หาย ก็ทำมาไม่รู้กี่ครั้งต่อกี่ครั้งแล้วด้วย "
10036130-20 = "และนอกจากนั้น..."
10036130-21 = "วันนี้ฉันได้อยู่กับทุกคนทั้งที งั้นก็ไม่มีอะไรต้องกลัวแล้ว!"
10036130-22 = "อื้ม!"
10036130-23 = "ชะ... ใช่ค่ะ! เกมแค่นี้น่ะ คงไม่หนักหนาไปกว่าการเอาตัวรอดในสถานการณ์ที่เหน็บหนาวและหิวโหย#nที่พวกเราเคยผ่านมากันแล้วหรอกค่ะ...!"
10036130-28 = "พูดซะเวอร์ นี่มันแค่เกมเองนะ..."
10036130-29 = "งั้นเราจะเริ่มกันที่ระดับง่ายกันก่อนนะครับ!"
10036130-30 = "ลุยเลย อาสึโกะ ฮิโยริ มิซากิ!"
10036130-32 = "ค่ะ ได้เลยค่ะ!"
10036130-33 = "ฉันไม่ได้อยากเล่นหรอกนะ แค่กลัวคนไม่พอน่ะ..."
10036130-34 = "(ฮุฮุ ซาโอริดูมีความสุขจังเลยนะ...)"

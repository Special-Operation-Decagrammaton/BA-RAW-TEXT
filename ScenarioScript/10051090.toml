[translation]
10051090-1 = "第9話;刻意的偶然"
10051090-2 = "夏萊辦公室"
10051090-3 = "主公、主公！"
10051090-4 = "那……那個……"
10051090-5 = "部長的情況不太對勁……！"
10051090-6 = "[s1]「先冷靜下來，伊樹菜。」\n[s2]「三千留他怎麼了？」"
10051090-9 = "上次……一起吃完拉麵解散的時候還好好的……"
10051090-10 = "可是從那天之後就變得不一樣了！"
10051090-11 = "[s]「變得不一樣？」"
10051090-12 = "伊樹菜也不知道該怎麼形容比較好……#n眼神失去了生氣？沒有幹勁？還是變得畏畏縮縮的呢……"
10051090-13 = "昨天甚至還發生了這種事！"
10051090-15 = "百鬼夜行市場巷口"
10051090-17 = "呼，吃得真飽～"
10051090-18 = "今天的「忍者套餐」同樣令人滿意呢！"
10051090-19 = "對吧，部長？"
10051090-20 = "……"
10051090-21 = "部長？"
10051090-22 = "咦……？啊，嗯。#n挺好的挺好的。"
10051090-23 = "發生什麼事了嗎……？"
10051090-24 = "咦？沒有沒有，哪有什麼事啦。我真的沒事。"
10051090-28 = "（怎麼看都不像沒事的樣子……）"
10051090-29 = "那麼部長，來討論下週要拍攝的「少女忍法帖小小三千留」的主題吧？"
10051090-30 = "那間布料行旁邊好像新開了一家茶館，要不要去那裡討論？"
10051090-31 = "嗯？沒關係，下週我沒有打算要拍影片……"
10051090-32 = "意思是主題還沒有想好，所以需要討論對吧？#n知道了，部長！"
10051090-33 = "不是。那個，我……"
10051090-34 = "那家茶館好像還推出了新的糰子呢！走吧，部長！"
10051090-35 = "茶館就在那裡……"
10051090-40 = "先等一下，伊樹菜。#n那個……"
10051090-45 = "砰！"
10051090-47 = "咦，咦……！？"
10051090-48 = "有人在布料行前面引爆了煙霧彈！"
10051090-53 = "好啊！煙霧彈的效果絕佳！"
10051090-54 = "像這種不親切的店家，就應該用煙霧把它遮起來！"
10051090-55 = "沒錯沒錯！#n怎麼能隨便忽略客人的要求，把自己的標準強加在客人身上呢！"
10051090-56 = "這種店就算倒閉也是活該！"
10051090-60 = "為什麼要在別人的店門口胡鬧！？"
10051090-61 = "還能為什麼！#n當然是因為你那不把客人的要求放在眼裡的態度啊！"
10051090-62 = "不把要求放在眼裡……？"
10051090-63 = "你們跑來布料行點咖啡和章魚燒，這種要求我怎麼可能辦得到！？"
10051090-64 = "客人要什麼給什麼就對了，在那邊囉嗦什麼啊？"
10051090-65 = "思維這麼死板，我看你在這一行八成混不了多久吧？"
10051090-66 = "是在胡說八道什麼啊！？#n現在讓我混不下去最大的原因，不就是你們這些傢伙嗎！？"
10051090-67 = "嘖，好有邏輯的反擊……！"
10051090-68 = "別慌！只要思考我們能拿到的錢就好！"
10051090-69 = "等等，你們剛才說什麼？#n……拿到的錢？從哪裡拿的？"
10051090-70 = "糟糕，說溜嘴了……！"
10051090-75 = "部長，妖怪劇團正在布料行前面鬧事！"
10051090-76 = "趕緊過去幫……咦？部長？"
10051090-79 = "嗯？怎麼了嗎，伊樹菜？"
10051090-80 = "部長！現在正是該出馬的時候！"
10051090-81 = "嗯？是，是這樣沒錯……"
10051090-82 = "可是那種事情……不是應該由百花繚亂……負責解決嗎？"
10051090-83 = "而且，現在月夜也不在我們身邊……"
10051090-84 = "即便月夜閣下不在，也不代表忍者精神就不在了吧！"
10051090-85 = "嗚嗚嗚，雖然是這麼說沒錯啦……"
10051090-90 = "部，部長！"
10051090-95 = "夏萊辦公室"
10051090-96 = "……事情就是這樣。"
10051090-97 = "部長變得非常消沉，不管做什麼事都畏畏縮縮的……"
10051090-98 = "伊樹菜，不習慣看見這樣的部長……"
10051090-99 = "[s]「確實完全不像平常的三千留呢……」"
10051090-100 = "主公也這麼認為吧？"
10051090-101 = "原因究竟會是什麼呢……？"
10051090-102 = "[s]「伊樹菜怎麼看呢？」"
10051090-103 = "……"
10051090-104 = "其實……伊樹菜好像知道為什麼。"
10051090-105 = "月夜閣下沒有回到忍術研究部……應該就是原因。"
10051090-106 = "所以部長他才會這麼消沉……#n也是因為這樣，伊樹菜才會刻意表現得更開朗。"
10051090-107 = "畢竟要是兩個人都垂頭喪氣的話，就真的什麼事都做不好了。"
10051090-108 = "但是主公……伊樹菜已經不知道接下來該怎麼辦了……！"
10051090-109 = "月夜閣下還是一直聯絡不上……#n雖然跨年時裝秀的準備影片一直有在更新，至少看起來還挺健康的……"
10051090-110 = "[s]「那我們一起去找月夜吧？」"
10051090-111 = "雖然很想這麼做……但部長感覺不會願意採取行動。"
10051090-112 = "從部長的樣子來看，他好像在刻意避免和月夜閣下見面……"
10051090-113 = "不過即便如此，伊樹菜還是認為無論如何都該讓他們兩個見個面才行，主公。"
10051090-114 = "只有這樣才能找到解決的契機。"
10051090-115 = "[s3]「所以只要讓三千留和月夜見到面就行了吧？」\n[s4]「我剛好想到了一個辦法。」"
10051090-121 = "是什麼辦法呢，主公！？"
10051090-122 = "[s]「我先去確認一下，待會再聯絡你。」"
10051090-123 = "是！主公！伊樹菜會等著的！"
10051090-128 = "……這個請求似乎並不困難呢，老師。"
10051090-129 = "我會嘗試好好溝通看看的。"
10051090-130 = "[s]「突然提出這種要求，真是抱歉。」"
10051090-131 = "喵哈哈，請千萬別這麼說。 "
10051090-132 = "對陰陽部而言，這相當於是獲得了老師的「一次限定・無限使用券」……#n反而有種賺到的感覺呢。"
10051090-133 = "[s]「那種東西是哪裡發行的……！」"
10051090-135 = "喵哈哈，敬請期待囉？"
10051090-139 = "話說回來，那邊也有妖怪劇團在鬧事啊……"
10051090-140 = "那些孩子，自從接近年底就稍～微有點放肆呢。#n算了，這部分的事情之後再來處理……"
10051090-141 = "要達成老師的請求，該聯絡哪裡好呢……"
10051090-142 = "我看看…… "
10051090-143 = "「百鬼夜行跨年時裝秀營運委員會」……看來得先聯絡一下這邊呢。"
10051090-145 = "（幾天後，終於到了年關將近的日子）"
10051090-147 = "所以……這裡有舉辦忍者相關的活動是嗎？"
10051090-148 = "沒錯，部長！"
10051090-149 = "可是我們有必要特地打扮成這樣嗎……？"
10051090-150 = "因為新年就快到了呀，部長！#n大家都會穿上今年最好看的衣服過來，我們也不能輸給其他人！"
10051090-151 = "這倒是沒錯……"
10051090-152 = "等等，這裡不是後門嗎？#n活動會場的正門應該在另一邊才對……"
10051090-158 = "啊，你們來啦。"
10051090-159 = "是千鳥三千留同學、久田伊樹菜同學對吧？"
10051090-160 = "是的！沒錯！"
10051090-161 = "伊樹菜，你還有先預約嗎？"
10051090-162 = "[s]「嗨，三千留、伊樹菜。」"
10051090-163 = "唔喵啊！？連老師大人也在這裡！？"
10051090-164 = "既然連老師大人都在……這肯定是場很了不起的活動吧！？"
10051090-165 = "那麼各位，請先戴上這個耳機式對講機。"
10051090-166 = "嗯？為什麼要戴對講機？"
10051090-167 = "哦哦，是要用對講機做活動導覽嗎？"
10051090-168 = "各位的工作內容很簡單。#n只要在人群中巡邏，一旦發現可疑人物就回報或將其制伏即可。"
10051090-169 = "這樣啊，只要制伏可疑人物就……先等一下。"
10051090-170 = "工作？制伏？"
10051090-171 = "伊樹菜，這到底是……"
10051090-175 = "歡迎來到百鬼夜行跨年時裝秀，各位警備員們。"
10051090-180 = "什，什麼跟什麼啊啊啊──！？"
10051090-181 = "警備員！？伊樹菜，我們好像被騙了！#n這八成是求職詐騙！是主辦單位的陰謀！"
10051090-182 = "不，並不是那樣的，部長！"
10051090-183 = "這件事是由伊樹菜主導的！"
10051090-184 = "那又是什麼意思啊！？"
10051090-185 = "而且仔細一看，這棟建築……"
10051090-186 = "不就是月夜會參加的跨年時裝秀的會場嗎！？"
10051090-187 = "這算哪門子的忍者活動啊！？"
10051090-188 = "只要有忍者參與！無論任何場合都是忍者活動！"
10051090-189 = "還是說，部長認為月夜閣下已經失去忍者之心了呢？"
10051090-190 = "當然不是那樣……！"
10051090-191 = "我，我對月夜……"
10051090-192 = "出發吧，各位。時間到了。"
10051090-193 = "走吧，部長！ "
10051090-197 = "唔，唔啊啊……！"

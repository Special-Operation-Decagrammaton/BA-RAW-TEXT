[translation]
10051090-1 = "ตอนที่ 9;ความบังเอิญโดยตั้งใจ"
10051090-2 = "สำนักงานชาเล่ต์"
10051090-3 = "นายท่าน นายท่าน!"
10051090-4 = "คะ... คือว่า..."
10051090-5 = "ก็หัวหน้าน่ะสิคะ หัวหน้าแปลกๆ ไปค่ะ...!"
10051090-6 = "[s1] \"พักหายใจก่อนแล้วค่อยเล่านะ อิซุนะ\"\n[s2] \"มิจิรุแปลกไปยังไงเหรอ?\""
10051090-9 = "วันก่อน... ตอนที่เราไปกินราเม็งด้วยกันยังดีๆ อยู่เลย..."
10051090-10 = "แต่หลังจากวันนั้นก็มีบางอย่างเปลี่ยนไปค่ะ!"
10051090-11 = "[s] \"เปลี่ยนไปงั้นเหรอ?\""
10051090-12 = "ต้องบอกว่าแววตาขาดชีวิตชีวา ดูหมดกำลังใจในการใช้ชีวิต หรือกลายเป็นคนเซื่องซึมไปดีนะ..."
10051090-13 = "แถมเมื่อวานยังเกิดเรื่องแบบนี้ขึ้นด้วยนะคะ!"
10051090-15 = "หัวมุมถนนในตลาดเฮียกคิยาโค"
10051090-17 = "ฮื้ม ขอบคุณสำหรับอาหารค่ะ~"
10051090-18 = "วันนี้ <เซ็ตนินจา> ก็ไม่ทำให้เราผิดหวังเลยนะคะ!"
10051090-19 = "คิดเหมือนกันมั้ยคะ หัวหน้า?"
10051090-20 = "..."
10051090-21 = "หัวหน้า?"
10051090-22 = "หืม? อื้อ อะ... อืม ดีสิ ดีเลย"
10051090-23 = "มีเรื่องอะไรหรือเปล่าคะ...?"
10051090-24 = "หืม? เปล่าๆ ไม่หรอก จะไปมีเรื่องอะไร ข้าน้อยโอเคดี"
10051090-28 = "(คือว่า... ไม่ว่าจะมองมุมไหนก็ไม่โอเคเลยนะ...)"
10051090-29 = "ถ้างั้น หัวหน้าคะ เรามาคุยเรื่องคอนเทนต์ของช่อง <วิถีนินจาสาว มิจิรุจจี้> ที่จะถ่ายทำในสัปดาห์หน้า#nกันดีมั้ยคะ?"
10051090-30 = "มีร้านชามาเปิดใหม่ข้างๆ ร้านขายผ้าตรงโน้นด้วย เราไปคุยกันที่นั่นมั้ยคะ?"
10051090-31 = "หืม? ไม่ดีกว่า ข้าน้อยยังไม่คิดจะถ่ายทำอะไรสัปดาห์หน้าหรอก..."
10051090-32 = "ถ้าตอนนี้ยังไม่มีไอเดีย งั้นก็ต้องปรึกษากันสิคะ อื้อ! เอาแบบนี้แล้วกันค่ะ หัวหน้า!"
10051090-33 = "ไม่ใช่ คือว่า ข้าน้อย..."
10051090-34 = "ได้ยินว่าร้านชานั้นมีเมนูดังโงะใหม่พอดีด้วยค่ะ! เราไปกันเถอะค่ะ หัวหน้า!"
10051090-35 = "ร้านชาอยู่ตรงโน้น..."
10051090-40 = "เดี๋ยวก่อนนะ อิซุนะจัง คือว่า..."
10051090-45 = "ตู้มม!"
10051090-47 = "เอะ... เอ๋...?!"
10051090-48 = "มีใครมาจุดระเบิดควันที่หน้าร้านขายผ้าค่ะ!"
10051090-53 = "เยี่ยมเลย! ระเบิดควันได้ผล!"
10051090-54 = "ร้านค้าที่ไม่เป็นมิตรต้องหายลับไปจากสายตาของผู้คนแบบนี้ละ!"
10051090-55 = "ใช่! กล้าดียังไงถึงเมินคำขอของลูกค้า แล้วยืนกรานจะทำตามมาตรฐานของตัวเองเท่านั้น"
10051090-56 = "ร้านอย่างนี้น่ะ สมควรเจ๊งไปซะ!"
10051090-60 = "ทำไมถึงมาทำแบบนี้หน้าร้านคนอื่นล่ะคะ?!"
10051090-61 = "ถามมาได้นะ! ก็เพราะป้าเมินเฉยคำขอของลูกค้ายังไงล่ะ แม่ค้าอะไรไม่เป็นมิตรเอาซะเลย!"
10051090-62 = "ฉันเมินคำขอของลูกค้างั้นเหรอคะ...?"
10051090-63 = "แล้วจะให้ฉันเสิร์ฟกาแฟกับทาโกะยากิในร้านขายผ้าเนี่ยนะคะ?!"
10051090-64 = "ถ้าลูกค้าขอก็ต้องหามาให้สิ จะถามกลับให้มากความทำไม?"
10051090-65 = "ถ้าทัศนคติคับแคบแบบนี้ คิดว่าจะอยู่รอดในตลาดการค้าได้งั้นเหรอ?"
10051090-66 = "พูดออกมาได้ยังไงคะ?! ตอนนี้ปัญหาใหญ่ที่สุดในการทำกิจการร้านของฉันคือพวกคุณต่างหากค่ะ!"
10051090-67 = "อึก... ตอบโต้อย่างมีตรรกะงั้นเหรอ...!"
10051090-68 = "อย่าลนลานไป! คิดถึงเงินที่เราจะได้เข้าไว้!"
10051090-69 = "เดี๋ยวนะ เมื่อกี้ว่ายังไงนะคะ? เงินที่จะได้งั้นเหรอ? ได้จากใครคะ?"
10051090-70 = "เฮือก เผลอหลุดปากไปซะได้...!"
10051090-75 = "หัวหน้า พวกปีศาจกำลังก่อเรื่องวุ่นวายอยู่หน้าร้านขายผ้าค่ะ!"
10051090-76 = "พวกเราไป... เอ๋? หัวหน้า?"
10051090-79 = "หืม? ทำไมเหรอ อิซุนะจัง?"
10051090-80 = "หัวหน้า! นี่คือเวลาที่พวกเราต้องออกโรงสิคะ!"
10051090-81 = "หืม? มะ... มันก็จริงหรอกนะ..."
10051090-82 = "แต่เรื่องแบบนี้ ไม่ใช่หน้าที่ของเฮียกกะเรียวรัน... หรอกเหรอ...?"
10051090-83 = "ที่สำคัญ ตอนนี้เราก็ไม่มีสึคุโยะอยู่ด้วย..."
10051090-84 = "ต่อให้ไม่มีสึคุโยะ แต่จิตวิญญาณนินจาของเราก็ไม่ได้หายไปสักหน่อยนี่คะ?!"
10051090-85 = "อึกก... ที่พูดมามันก็ถูก แต่ว่า..."
10051090-90 = "หะ... หัวหน้า!"
10051090-95 = "สำนักงานชาเล่ต์"
10051090-96 = "เรื่องมันก็เป็นแบบนี้ละค่ะ..."
10051090-97 = "หัวหน้าดูหมดกำลังใจมากๆ แล้วก็กลายเป็นคนเซื่องซึมไปเลย..."
10051090-98 = "อิซุนะไม่คุ้นชินกับหัวหน้าที่เป็นแบบนี้เลยค่ะ..."
10051090-99 = "[s] \"นี่ไม่ใช่วิสัยปกติของมิจิรุจริงๆ ด้วยนะ...\""
10051090-100 = "นายท่านก็คิดแบบนั้นใช่มั้ยคะ?"
10051090-101 = "เหตุผลคืออะไรนะ...?"
10051090-102 = "[s] \"แล้วอิซุนะจังคิดว่ายังไงเหรอ?\""
10051090-103 = "..."
10051090-104 = "อันที่จริง อิซุนะก็พอจะรู้เหตุผลค่ะ"
10051090-105 = "น่าจะเป็นเพราะ... ท่านสึคุโยะไม่กลับมาที่ชมรมวิจัยศาสตร์นินจา"
10051090-106 = "หัวหน้าก็เลยรู้สึกท้อแท้ค่ะ เพราะแบบนี้อิซุนะก็เลยพยายามทำตัวให้ร่าเริงขึ้นค่ะ"
10051090-107 = "ก็ถ้าเราเศร้ากันทั้งคู่ ก็จะยิ่งพากันเหงาหงอยนี่คะ"
10051090-108 = "แต่นายท่านคะ ตอนนี้อิซุนะไม่รู้ว่าต้องแก้ปัญหายังไงแล้วละค่ะ...!"
10051090-109 = "ถึงจะได้ดูวิดีโอเตรียมแฟชั่นโชว์ฉลองปีใหม่ของสึคุโยะจนพอเดาได้ว่ายังสบายดีอยู่... แต่อิซุนะยังติดต่อท่านสึคุโยะไม่ได้เลยค่ะ..."
10051090-110 = "[s] \"งั้นเราออกไปตามหาสึคุโยะด้วยกันมั้ย?\""
10051090-111 = "อิซุนะก็อยากทำแบบนั้นนะ... แต่หัวหน้าไม่น่าจะเอาด้วยค่ะ"
10051090-112 = "ดูเหมือนหัวหน้าจะจงใจหลีกเลี่ยงการพบกับท่านสึคุโยะยังไงก็ไม่รู้ค่ะ..."
10051090-113 = "แต่ถึงยังไง อิซุนะก็คิดว่าต้องทำให้สองคนนั้นมาเจอกันให้ได้ค่ะ นายท่าน"
10051090-114 = "เราต้องทำแบบนั้น จะได้หาเบาะแสเพื่อนำไปสู่คำตอบค่ะ"
10051090-115 = "[s3] \"ต้องให้มิจิรุได้เจอกับสึคุโยะก่อนสินะ ได้เลย\"\n[s4] \"ครูพอมีไอเดียแล้วละ\""
10051090-121 = "ต้องทำยังไงเหรอคะ นายท่าน?!"
10051090-122 = "[s] \"ครูจะตรวจสอบบางอย่างก่อนแล้วติดต่อไปใหม่นะ\""
10051090-123 = "ค่ะ! นายท่าน! แล้วอิซุนะจะรอนะคะ!"
10051090-128 = "นี่ไม่ใช่คำขอที่ยากลำบากเลยค่ะ คุณครู..."
10051090-129 = "ฉันจะลองไปคุยดูนะคะ"
10051090-130 = "[s] \"ครูขอโทษที่มาขอให้ช่วยกะทันหันนะ\""
10051090-131 = "อะฮะฮ่า ขอโทษอะไรกันล่ะคะ "
10051090-132 = "จากมุมมองของชมรมหยินหยางแล้ว เหมือนเราได้ 'บัตรกำนัลใช้งานได้ไม่จำกัด 1 ครั้ง' จากคุณครูเลย งั้นนี่ก็ยิ่งเป็นข้อเสนอที่ดีสิคะ"
10051090-133 = "[s] \"มีบัตรกำนัลแบบนั้นด้วยเหรอ ไปหามาจากไหน...!\""
10051090-135 = "อะฮะฮ่า ตั้งตารอได้เลยค่ะ"
10051090-139 = "จะว่าไป เรื่องนั้นก็เป็นฝีมือของพวกปีศาจอีกแล้วสินะคะ"
10051090-140 = "ยิ่งใกล้สิ้นปี เด็กพวกนั้นก็เลยล้ำเส้นกันนิดหน่อยน่ะค่ะ~ แต่เรื่องนี้เอาไว้จัดการทีหลังแล้วกัน..."
10051090-141 = "เอาเป็นว่าฉันจะลองติดต่อใครบางคนเพื่อแก้ไขปัญหาตามคำขอของคุณครูก่อนค่ะ..."
10051090-142 = "ไหนดูซิ... "
10051090-143 = "เห็นทีจะต้องติดต่อ... <คณะกรรมการจัดงานแฟชั่นโชว์ฉลองปีใหม่เฮียกคิยาโค> ก่อนเลยนะคะ"
10051090-145 = "(ไม่กี่วันหลังจากนั้นก็ถึงเวลาสิ้นปี)"
10051090-147 = "สรุปว่า... มีการจัดงานเกี่ยวกับนินจาที่นี่งั้นเหรอ?"
10051090-148 = "ใช่แล้วค่ะ หัวหน้า!"
10051090-149 = "แล้วพวกเราจำเป็นต้องแต่งตัวแบบนี้ด้วยเหรอ...?"
10051090-150 = "ก็ใกล้จะปีใหม่แล้วนี่คะ หัวหน้า! ทุกคนต่างรอคอยเวลานี้เพื่อจะใส่เสื้อผ้าสวยๆ ที่เก็บไว้ตลอดทั้งปี งั้นเราก็ต้องทำตามกระแสบ้างสิคะ!"
10051090-151 = "มันก็ฟังขึ้นอยู่หรอกนะ..."
10051090-152 = "เดี๋ยวนะ แต่ตรงนี้มันประตูข้างหลังไม่ใช่เหรอ? ประตูหน้าของงานอยู่ฝั่งตรงข้ามต่างหาก..."
10051090-158 = "อ๊ะ มาแล้วสินะครับ"
10051090-159 = "คุณจิโดริ มิจิรุ กับคุณคุดะ อิซุนะ ใช่มั้ยครับ?"
10051090-160 = "ค่ะ! ใช่ค่ะ!"
10051090-161 = "โอ๊ะ อิซุนะจังถึงกับจองที่นั่งชมไว้เลยเหรอ?"
10051090-162 = "[s] \"สวัสดี มิจิรุจัง อิซุนะจัง\""
10051090-163 = "ว้ากก?! ท่านอาจารย์ก็มาด้วยเหรอ?!"
10051090-164 = "ถ้าท่านอาจารย์ถึงกับมาร่วมงานด้วย... งั้นงานวันนี้ก็เป็นงานใหญ่เลยสินะ?!"
10051090-165 = "เอาละ ทุกคนครับ เชิญรับเครื่องสื่อสารไร้สายกันไปก่อนเลยครับ"
10051090-166 = "หืม? ทำไมต้องมีเครื่องสื่อสารไร้สายด้วย?"
10051090-167 = "อ้อ จะแจ้งรายละเอียดของงานผ่านทางนี้สินะ?"
10051090-168 = "ภารกิจของพวกคุณง่ายมากครับ แค่แฝงตัวเข้าไปในฝูงชน และถ้าเจอคนที่น่าสงสัยก็ให้รายงาน หรือเข้าไปควบคุมตัวได้เลยครับ"
10051090-169 = "ได้เลย ให้ควบคุมตัวคนที่น่าสงสัย... เดี๋ยวนะ"
10051090-170 = "ภารกิจ? ควบคุมตัว?"
10051090-171 = "อิซุนะ นี่มัน..."
10051090-175 = "ยินดีต้อนรับสู่งานแฟชั่นโชว์ฉลองปีใหม่เฮียกคิยาโคครับ เจ้าหน้าที่รักษาความปลอดภัยทุกคน"
10051090-180 = "นี่มันอะไรกันน่ะ?!"
10051090-181 = "เจ้าหน้าที่รักษาความปลอดภัยงั้นเหรอ! อิซุนะจัง พวกเราน่าจะโดนหลอกแล้วละ! นี่มันการจ้างงานของมิจฉาชีพ! เป็นเล่ห์เหลี่ยมของผู้จัดงานแน่ๆ!"
10051090-182 = "ไม่ค่ะ ไม่ใช่อย่างนั้นหรอกค่ะ หัวหน้า!"
10051090-183 = "อิซุนะเป็นคนสมัครมาทำเองค่ะ!"
10051090-184 = "หมายความว่ายังไงน่ะ?!"
10051090-185 = "เดี๋ยวนะ พอมาดูอีกที อาคารนี้มัน..."
10051090-186 = "สถานที่จัดงานแฟชั่นโชว์ปีใหม่ที่สึคุโยะมาเป็นนางแบบนี่นา?!"
10051090-187 = "ไหนบอกว่าเป็นงานเกี่ยวกับนินจาไง?!"
10051090-188 = "ก็ถ้ามีนินจามาเข้าร่วม! ไม่ว่างานอะไรก็เป็นงานของนินจาทั้งนั้นค่ะ!"
10051090-189 = "หัวหน้าคงไม่พูดว่าท่านสึคุโยะไม่มีจิตวิญญาณของนินจาแล้วหรอกใช่มั้ยคะ?"
10051090-190 = "มันก็ไม่ใช่อย่างนั้นอยู่แล้ว แต่ว่า...!"
10051090-191 = "ขะ... ข้าน้อย..."
10051090-192 = "เอาละ เชิญทำภารกิจเลยครับทุกคน ถึงเวลาแล้วครับ"
10051090-193 = "ไปกันเถอะค่ะ หัวหน้า! "
10051090-197 = "อะ... อึกกก...!"

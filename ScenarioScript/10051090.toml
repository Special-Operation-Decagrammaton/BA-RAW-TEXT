10051090-130 = "[s] \"Sorry for suddenly asking you for this.\""
10051090-131 = "Nyahaha, don't say that. "
10051090-132 = "From the Yin-Yang Club's perspective, this is like getting a one-time unlimited \"Sensei Owes Us Pass,\" so it's actually a very good deal."
10051090-133 = "[s] \"Who would even issue those...?!\""
10051090-135 = "Nyahaha, are you looking forward to it? I hope so!"
10051090-139 = "The Mouryo have been causing trouble here, too."
10051090-140 = "It seems like they're stepping a liiiitle bit over the line now that the year's almost over. They must have a \"nuisance quota\" to fill. Then again, one problem at a time..."
10051090-141 = "Let's see, who will help me fulfill Sensei's request? Hmm."
10051090-142 = "I wonder... "
10051090-143 = "The \"Hyakkiyako New Year Fashion Show Committee\"...I'll talk to them first."
10051090-145 = "A few days passed. The end-of-the-year holiday season finally arrived."

1002106-8 = "3;아즈사 수영복ND;03;아무 일도 없다는 게 일이라면 일이겠네. 그것 때문에 부른 거니까."
1002106-9 = "[s1] \"아무 일도 없는 일?\"\n[s2] \"그게 무슨 이야기야?\""

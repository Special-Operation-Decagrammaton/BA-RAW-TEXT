1002106-27 = "3;아즈사 수영복ND;08;역시 아무 것도 아니야.\n#3;stiff\n#3;em;[///]"
1002106-28 = "3;아즈사 수영복ND;02;괜히 불러내서 미안해. 선생님의 시간을 낭비하게 한 것 같아."

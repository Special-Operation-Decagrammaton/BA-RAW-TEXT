1002106-5 = "3;아즈사 수영복ND;01;조금 전까지는 그나마 주변에 관광객들이 있었지만…… 모두 돌아갔어."
1002106-6 = "3;아즈사 수영복ND;02;응? 무슨 일로 불렀냐고? 딱히…… 아무 일도.\n#3;em;[?]"

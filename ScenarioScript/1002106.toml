1002106-17 = "3;아즈사 수영복ND;03;음…… 맞아."
1002106-18 = "3;아즈사 수영복ND;03;역시 선생님이야. 그걸 어떻게 설명해야 할지 잘 모르고 있었어.\n#3;em;[반짝]"

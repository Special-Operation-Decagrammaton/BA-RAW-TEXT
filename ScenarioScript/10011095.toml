[translation]
10011095-8 = "อิ... อิซุนะ มึนหัวยังไงไม่รู้ค่ะ..."
10011095-9 = "อะ... อ๊ากกก ระ... รถถัง นะ... น่ากลัวจังเลยค่ะ..."
10011095-10 = "วะ... ว้ายยย..."
10011095-15 = "คะ... คุณครู… ปะ... ไปช่วย...  อิบูกิ... ดะ... ด้วยค่ะ..."
10011095-24 = "[ns] \"อึก… เป็นไงบ้าง ยืนไหวหรือเปล่ามิจิรุ?\""
10011095-25 = "อืม ยังพอไหว..."
10011095-26 = "[s] \"เหลือแค่เราสองคนแล้ว จะทำยังไงต่อล่ะทีนี้?\""
10011095-27 = "ข้าน้อย..."
10011095-38 = "ไปกันเถอะท่านอาจารย์ เราต้องรักษาสัญญา...!"
10011095-45 = "ถึงสักที! ไหนล่ะหัวหน้าชมรมหยินหยาง?!"
10011095-46 = "อยู่ไหนน่ะ?!"
10011095-51 = "อะฮะฮ่า~ ทุกคนพยายามกันอย่างหนักเลยนะคะเนี่ย~"
10011095-52 = "ไม่ได้อยู่ที่นี่ตั้งแต่แรกงั้นเหรอ?!"
10011095-53 = "เอาละ! การแสดงเดินทางมาถึงฉากสุดท้ายแล้ว ใครกันที่จะได้รับตำแหน่งผู้พิชิตไป!"
10011095-58 = "แฮ่ก... แฮ่ก..."
10011095-59 = "ฮู่วว..."
10011095-60 = "คืนตัวองค์หญิงมาเดี๋ยวนี้นะ!"
10011095-65 = "(ถึงจะพูดไปอย่างนั้นก็เถอะ...)"
10011095-66 = "[s] \"ในที่สุดก็ไล่ต้อนมาถึงที่นี่แล้ว มิจิรุ ทีนี้ก็เหลือแค่ไปช่วยออกมา\""
10011095-67 = "(ทะ... ท่านอาจารย์! พะ... พูดอะไรน่ะ...!)"
10011095-68 = "(จะให้ข้าน้อยไปสู้จริงๆ น่ะเหรอ...)"
10011095-69 = "(ให้ข้าน้อยไปสู้กับพวกปีศาจแล้วช่วยองค์หญิงมาเพื่อไม่ให้การแสดงพังพินาศ?)"
10011095-71 = "อ๊ะ! อย่าเข้ามาใกล้นะ! ถ้าเข้ามาละก็...! "
10011095-76 = "ถ้าเข้ามา ฉันจะโยนองค์หญิงที่ลักพาตัวมานี่ออกนอกรั้วไปเลย...!"
10011095-80 = "โอ้วว! สถานการณ์ร้อนแรงกว่าที่คิดไว้อีกนะเนี่ย...!"
10011095-81 = "ถึงจะแค่พูดไปตามบทก็เถอะ แต่ก็เกินไปหน่อยรึเปล่าคะนั่น~!?"
10011095-82 = "ทั้งเรื่องบท ทั้งการถ่ายทอดสดอะไรเนี่ย! หมายความว่ายังไงฮะ! หัวหน้าชมรมหยินหยาง..!"
10011095-84 = "(เดี๋ยวสิๆ... ไม่ไหวหรอก! คนแบบข้าน้อยจะไปช่วยใครได้ล่ะ… ให้ไปสู้กับเด็กมีปัญหาพวกนั้นน่ะนะ…!)"
10011095-85 = "(พอมาคิดดูอีกที... ที่มาถึงตรงนี้ได้ก็เพราะคนอื่นๆ  ส่วนข้าน้อยก็แค่ตั้งหน้าตั้งตาวิ่งอย่างเดียว)"
10011095-86 = "(ไม่คิดถึงอย่างอื่นแล้วสิ ต้องช่วย ต้องช่วยให้ได้… ข้าน้อยไม่รู้ด้วยซ้ำว่ามาถึงแล้วต้องช่วยยังไง หรือต้องใช้วิธีไหน...!)"
10011095-87 = "(ข้าน้อยอยากเป็นชมรมทางการ! ก็เลยยืนยันว่าจะไม่ยอมแพ้! พอได้รับกำลังใจจากสึคุโยะ...! แล้วก็มาถึงตรงนี้...!)"
10011095-90 = "โอ้ว! ผู้ท้าชิงคนสุดท้าย ไม่รู้ว่ากำลังคิดอะไรแต่ดูเหมือนจะกำลังเลือกคำพูดอยู่นะคะ~!"
10011095-92 = "(ก็ต้องคิดหนักอยู่แล้วสิ! ในสถานการณ์นี้ถ้าก้าวพลาดไปแค่ก้าวเดียวทุกอย่างต้องจบสิ้นแน่?!)"
10011095-93 = "(ขาสั่นไปหมดแล้ว หัวใจก็เต้นแรง...! ตอนนี้ไม่รู้แล้วว่าอะไรเป็นอะไร!)"
10011095-94 = "(แล้วอิบูกิล่ะ? ข้าน้อยยังเป็นขนาดนี้ แล้วเด็กน้อยที่กลัวจนร้องไห้นั่นตอนนี้ต้องกำลังหวาดกลัวมากแน่#nเลย...)"
10011095-95 = "พี่สาวนินจา...?"
10011095-96 = "อ๊ะ...! อิบูกิ!"
10011095-97 = "อื้อ! พี่สาวนินจา! อิบูกิ! อยู่ตรงนี้!"
10011095-98 = "เอ๊ะ... อิบูกิ... ไม่ได้ร้องไห้อยู่เหรอ?"
10011095-99 = "หือ? ทำไมเหรอ?"
10011095-100 = "ก็แบบว่า... รับบทเป็นองค์หญิงที่ถูกจับตัวไปนี่ นึกว่าจะกำลังร้องไห้น่ะ..."
10011095-101 = "อิบูกิไม่กลัวหรอก! นั่นก็เพราะว่า..."
10011095-107 = "เพราะว่านินจาสัญญาแล้วว่าจะมาช่วยไงล่ะ!"
10011095-108 = "อา...!"
10011095-110 = "<ไม่ว่าจะเกิดอะไรขึ้น นินจาก็จะไปช่วยองค์หญิงเอง> ค่ะ!"
10011095-115 = "เข้าใจแล้ว! อิบูกิ! ข้าน้อยจะไปช่วยเดี๋ยวนี้แหละ...!"
10011095-118 = "หยุดเดี๋ยวนี้นะ! ถ้าขยับตัวสุ่มสี่สุ่มห้าเกิดอะไรขึ้นมาไม่รู้ด้วยนะ!"
10011095-119 = "พูดจริงทำจริงนะเฟ้ย...!"
10011095-125 = "อ๊ะ หนีไปซะแล้ว"
10011095-127 = "[ns] \"อิบูกิ! อันตราย!\""
10011095-132 = "(คิดว่าจะหนีพ้นเรอะ...!)"
10011095-133 = "(หนึ่ง...! สอง...!)"
10011095-135 = "คาถานินจามิจิรุรุง...!!!"
10011095-138 = "จับได้แล้ว!! ท่านอาจารย์!"
10011095-139 = "[s] \"ทำได้ดีมากเลย! มิจิรุ! ครูก็จะช่วยดึงขึ้นมาเอง!\""
10011095-140 = "อ๊ะ! อิบูกิ! โดนจับได้แล้ว!"
10011095-141 = "อื้อ! ถ้ารวมพลังกับท่านอาจารย์ละก็...!"
10011095-145 = "อ๊ะ"
10011095-149 = "อ๊ากกกก! จะตกแล้ว! ตกแล้ว...!!"
10011095-150 = "อิซุนะจัง!!"
10011095-151 = "ค่ะ! ท่านสึคุโยะ...!"
10011095-163 = "ดะ... ดีนะคะที่จับเอาไว้ได้ทัน!"
10011095-164 = "นายท่าน! เดี๋ยวอิซุนะจะช่วยดึงขึ้นมาเองค่ะ!"
10011095-165 = "[s] \"ขอบใจนะทุกคน\""
10011095-167 = "เฮือก... นะ... นึกว่าจะตายซะแล้ว แงงง..."
10011095-168 = "อ๊ะ...! อิบูกิ! เป็นอะไรรึเปล่า?!"
10011095-169 = "อืม! มาช่วยจริงๆ ด้วย! พวกพี่สาวนินจา!"
10011095-170 = "เรื่องนั่นน่ะ..."
10011095-172 = "ใช่ค่ะ! ก็สัญญาไว้แล้วนี่คะ! ด้วยกฎเหล็กของนินจา!"
10011095-173 = "นี่เป็นชัยชนะของชมรมวิจัยศาสตร์นินจาค่ะ! นินนิน!"
10011095-175 = "คือว่า... นี่มัน..."
10011095-176 = "ดูเหมือนทุกอย่างจะจบลงแล้วสินะ"
10011095-177 = "มะ... ไม่นะ... แผนการทั้งหมดจะล้มเหลวแบบนี้ไม่ได้...!"
10011095-179 = "นี่ หยุดนะ..."
10011095-184 = "โทษฐานที่ลักพาตัวอิบูกิไป ฉันไม่ยอมปล่อยไปเฉยๆ หรอกนะคะ"
10011095-186 = "เฮือกก?!"

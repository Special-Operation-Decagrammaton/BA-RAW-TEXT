[translation]
10011095-8 = "伊，伊樹菜，已經頭昏眼花了……"
10011095-9 = "戰車，原來是，這麼恐怖的東西呢……"
10011095-10 = "我已經累了……"
10011095-15 = "老師……請一定，要把伊吹……"
10011095-24 = "[ns]「……三千留，還站得起來嗎？」"
10011095-25 = "呃，嗯。勉強還行……"
10011095-26 = "[s]「剩下的只有我們了。你打算怎麼辦？」"
10011095-27 = "我……"
10011095-38 = "走吧，老師大人。#n為了遵守約定……！"
10011095-45 = "到了！陰陽部的部長在哪裡……！？"
10011095-46 = "在哪的說！？"
10011095-51 = "喵哈哈～大家都辛苦了～"
10011095-52 = "什麼，竟然是投影！？"
10011095-53 = "那麼，公演終於到了尾聲。#n能笑到最後的究竟會是誰呢～！"
10011095-58 = "哈啊，哈啊……"
10011095-59 = "呼……"
10011095-60 = "把公主大人，還來……！"
10011095-65 = "（說是這麼說……）"
10011095-66 = "[s]「加油吧，三千留。」"
10011095-67 = "（……呃，感覺老師大人這時候不是應該要給我一些妙計嗎！？）"
10011095-68 = "（唔……也就是說，基本上要由我一個人……）"
10011095-69 = "（來對付妖怪劇團……？）"
10011095-71 = "哎咿，不要再靠過來了！要是繼續靠近的話……！"
10011095-76 = "可別逼我……把公主丟下去啊……！"
10011095-80 = "哦哦！事情進入白熱化階段了呢～！"
10011095-81 = "就算是寫好的劇本，那個發言真的沒問題嗎～！？"
10011095-82 = "啊啊真是，說是劇本還是什麼的，煩死人了陰陽部……！"
10011095-84 = "（不不不這我完全無能為力吧！？#n　可是也不能讓伊吹醬掉下去，只靠我這種人沒辦法的啦……！）"
10011095-85 = "（仔細想想可以來到這裡，也是多虧了其他人……我只是趁勢來到這裡而已……）"
10011095-86 = "（都到這種時候了，卻完全派不上用場……！）"
10011095-87 = "（明明已經誇下海口……！說要成為正式社團了……！#n　都被月夜和伊樹菜那樣鼓勵了……！）"
10011095-90 = "哦哦，看來最後的挑戰者……似乎正在煩惱些什麼呢？"
10011095-92 = "（啊啊真囉嗦！？肯定得煩惱的吧！？面對這種很可能一失足成千古恨的情況！）"
10011095-93 = "（……腳抖個不停，心臟感覺都快炸裂了啊！）"
10011095-94 = "（在這種狀況下……#n　像伊吹那樣，只是關了燈就會害怕的孩子，肯定也怕得渾身發抖吧……）"
10011095-95 = "……忍者，姐姐？"
10011095-96 = "啊……伊吹！"
10011095-97 = "果然是忍者姐姐！伊吹有乖乖的哦！"
10011095-98 = "呃，完全沒在哭……？"
10011095-99 = "嗯？怎麼了？"
10011095-100 = "啊，那個，畢竟被綁架了，我以為你會很害怕之類的……"
10011095-101 = "伊吹完全不怕唷！因為──"
10011095-107 = "已經約好了「無論如何都會來救我」呀！"
10011095-108 = "啊……！"
10011095-110 = "因為，我們，不是約定好了嗎……？#n「無論如何都會去救你」！"
10011095-115 = "我知道了！伊吹！我現在就去救你……！"
10011095-118 = "站，站住！#n要是敢輕舉妄動，我可無法保證這孩子的安全哦！？"
10011095-119 = "我，我可沒在騙你！再靠過來的話，我真的會……！"
10011095-125 = "啊。"
10011095-127 = "[ns]「伊吹！危險！」"
10011095-132 = "（一定要趕上啊啊啊啊……！！）"
10011095-133 = "（一……！二……！）"
10011095-135 = "三千留流忍法！！"
10011095-138 = "抓到了！！老師大人！"
10011095-139 = "[s]「做得好！三千留！你等著，我馬上拉你上來！」"
10011095-140 = "啊哈哈！伊吹被抓到了！"
10011095-141 = "嗯！已經沒事了，接下來只要老師大人把我們拉上去就……"
10011095-145 = "啊。"
10011095-149 = "嗚呀啊啊啊！#n要掉下去了要掉下去了要掉下去啦！？"
10011095-150 = "伊樹菜醬！"
10011095-151 = "是！月夜閣下！"
10011095-163 = "趕，趕上了！"
10011095-164 = "主公！伊樹菜這就來救你！"
10011095-165 = "[s]「大家……謝謝你們。」"
10011095-167 = "呃啊啊啊……還，還以為要死了……！！"
10011095-168 = "啊！伊吹沒事嗎！？"
10011095-169 = "嗯！忍者姐姐們，謝謝你們來救我！"
10011095-170 = "……太好了。"
10011095-172 = "是！因為，約定好了……這是，忍者的鐵則！"
10011095-173 = "忍術研究部，大勝利呢！忍忍！"
10011095-175 = "這……這下……"
10011095-176 = "好像全都結束了呢。"
10011095-177 = "唔，還沒完！不能就這樣以失敗告終……！"
10011095-179 = "……那邊的各位。"
10011095-184 = "把伊吹捲進來的罪，可是很重的哦。"
10011095-186 = "噫噫！？"

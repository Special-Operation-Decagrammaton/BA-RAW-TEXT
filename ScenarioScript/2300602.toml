[translation]
2300602-1 = "The Idol of Momoyodou!"
2300602-2 = "I was on my way to Momoyodou, a tea house in Hyakkiyako's district, when I received a text from Shizuko."
2300602-5 = "Oh, Sensei!"
2300602-6 = "Heehee. Oops! I mean...!"
2300602-8 = "Welcome, Master!"
2300602-9 = "[s] \"Uh, yeah... I'm here now.\""
2300602-10 = "You look surprised. It's shop tradition to refer to our customers as Master."
2300602-11 = "Why not order something off of the menu?"
2300602-12 = "I recommend the strawberry anmitsu."
2300602-13 = "But all of our other traditional desserts are just as delicious!"
2300602-14 = "[s1] \"Then I'll get the strawberry rice cake...\"\n[s2] \"I'll take your recommendation. One strawberry anmitsu.\""
2300602-15 = "Okay! Coming right up!"
2300602-16 = "Okay! Coming right up!"
2300602-19 = "(There are a lot of people in the store, perhaps because of Momoyodou's event.)"
2300602-20 = "(Shizuko still manages to shine amidst the crowd.)"
2300602-21 = "Here's the strawberry red bean bun set you ordered!"
2300602-22 = "How do you recommend eating it, Shizuko?"
2300602-23 = "Oh! I know a special trick!"
2300602-24 = "If you take a sip of tea along with a bite of the red bean bun..."
2300602-25 = "...the tea's bitterness and red bean's sweetness make a fantastic combination! Heehee."
2300602-26 = "Wh-Whoa!"
2300602-27 = "Shizuko is so cute!"
2300602-29 = "Here's the strawberry rice cake set you ordered!"
2300602-30 = "Huh? This isn't what I ordered."
2300602-31 = "You're right that I ordered rice cakes, but this is yatsuhashi..."
2300602-32 = "Huh?"
2300602-33 = "Oh...! I-I'm so sorry, Master!"
2300602-34 = "I must have made a mistake."
2300602-35 = "I'll have it out in a minute!"
2300602-36 = "Heh heh."
2300602-37 = "It happened! One of Shizuko's famous scatterbrain moments!"
2300602-38 = "That look of concern on your face, your cheeks flushed red with embarrassment..."
2300602-39 = "You're so adorable."
2300602-40 = "S-Stop. Don't tease me..."
2300602-42 = "(Shizuko's little mistakes seem to be a real crowd pleaser.)"
2300602-43 = "(The guests must be here for Shizuko and not the cakes.)"
2300602-44 = "[s] \"Business is certainly booming.\""
2300602-45 = "(Some indiscernible amount of time later...)"
2300602-47 = "Thank you for your patience, Master!"
2300602-48 = "Here's your order!"
2300602-49 = "Strawberry manju! The deluxe version!"
2300602-50 = "[s3] \"Huh? But I ordered the strawberry rice cake.\"\n[s4] \"Huh? But I ordered the strawberry rice anmitsu.\""
2300602-51 = "Ah, I made another mistake!"
2300602-52 = "Ah, I made another mistake!"
2300602-53 = "I-I'm so sorry, Master! I'll bring you what you ordered..."
2300602-55 = "[s] \"It's okay. I like manju too.\""
2300602-56 = "...!"
2300602-57 = "That's it?"
2300602-58 = "[s] Nod."
2300602-59 = "Okay, th-then I'll be right back with the next part of your order!"
2300602-61 = "Oh, Master! P-Please get out of the way! C-Coming through!"
2300602-63 = "Th-That was fast!"
2300602-64 = "[s] \"Are you okay, Shizuko?\""
2300602-65 = "Y-Yes, I'm fine!"
2300602-66 = "I-I'll bring you your next order..."
2300602-68 = "Ah! Stupid Shizuko! Stop making mistakes!"
2300602-69 = "Sensei—I mean, Master—I accidentally put hot sauce in the drink I made for you!"
2300602-70 = "[s] \"How does something like that happen on accident?!\""
2300602-71 = "D-Do you still want it, Sensei? (peek)"
2300602-72 = "[s5] \"Even I have my limits.\"\n[s6] \"You can't forget the heat!\""
2300602-73 = "Ah! Shizuko, you scatterbrain!"
2300602-74 = "I'm so clumsy. I can't believe I did that!"
2300602-75 = "[s7] \"That's okay. I'll just put in another order.\""
2300602-76 = "That's it?!"
2300602-78 = "You drank the entire thing in one gulp?!"
2300602-79 = "[s8] \"Wow, what a kick! Get me another!\""
2300602-80 = "You want another one?!"
2300602-81 = "..."
2300602-82 = "Gah. I can't take this anymore!"
2300602-83 = "Come with me, Sensei!"
2300602-86 = "(Shizuko dragged me to a quiet corner of Momoyodou.)"
2300602-87 = "What do you think you're doing, Sensei?!"
2300602-88 = "[s9] \"That's what I wanted to ask you.\"\n[s10] \"What do YOU think you're doing, Shizuko?\""
2300602-89 = "What do you mean? I'm just..."
2300602-90 = "What do you mean? I'm just..."
2300602-91 = "I'm the scatterbrain of Momoyodou! Everyone knows that."
2300602-92 = "I already told you on MomoTalk."
2300602-93 = "Remember? Top notch service?"
2300602-94 = "[s] \"You were referring to acting like a scatterbrain?\""
2300602-95 = "Exactly! The customers eat it up."
2300602-96 = "That's my act and they love it."
2300602-97 = "[s11] \"Now I get it.\"\n[s12] \"...\""
2300602-98 = "What kind of response is that?!"
2300602-99 = "Don't you have anything else to say?!"
2300602-100 = "Anyway! The customers call me the idol of Momoyodou!"
2300602-101 = "They find my mistakes charming, and I love seeing them smile."
2300602-102 = "It's a win-win business model!"
2300602-103 = "So why isn't it working on you?!"
2300602-105 = "I practiced all night to make you laugh today! I tried extra hard!"
2300602-106 = "[s] \"That was all rehearsed...?\""
2300602-108 = "[s13] \"You don't have to go to all that trouble. You're already adorable.\"\n[s14] \"I can't really find you any cuter than I already do.\""
2300602-112 = "..."
2300602-113 = "Gah! H-How can you say that so nonchalantly?!"
2300602-114 = "You just want me to act natural, Sensei?!"
2300602-115 = "You just want me to be me?!"
2300602-116 = "*sigh* My true self does seem to come out more when I'm around you."
2300602-117 = "I'm definitely not acting now..."
2300602-118 = "[s] \"I like every side of you.\""
2300602-119 = "You mean that...?"
2300602-120 = "I don't know what to say."
2300602-122 = "(Shizuko was in a better mood after that and gave me lots of traditional sweets on the house.)"

[translation]
2300602-1 = "ไอดอลสาวน้อยคนดังแห่งร้านเฮียกคิยาโค!"
2300602-2 = "(หลังจากที่ได้รับข้อความจากชิซุโกะ คุณครูก็ไปที่ร้านเฮียกคิยาโค ร้านน้ำชาที่ตั้งอยู่ในเขตเฮียกคิยาโค)"
2300602-5 = "อ๊ะ คุณครู!"
2300602-6 = "เอ... แหะๆ ไม่สิ!"
2300602-8 = "มาแล้วเหรอคะนายท่าน!"
2300602-9 = "[s] \"อื้อ... มาแล้ว\""
2300602-10 = "แปลกใจใช่มั้ยคะ? ร้านของเราจะเรียกทุกคนว่า 'นายท่าน' ตามธรรมเนียมค่ะ"
2300602-11 = "ถ้างั้นเชิญทางนี้ค่ะ จะรับเมนูอะไรดีคะ?"
2300602-12 = "เมนูแนะนำวันนี้คืออันมิสึสตรอว์เบอร์รีค่ะ!"
2300602-13 = "แต่ขนมหวานอย่างอื่นๆ ของเราก็อร่อยมากเหมือนกันนะคะ!"
2300602-14 = "[s1] \"ขอเป็นไดฟุกุสตรอว์เบอร์รี...\"\n[s2] \"ขอเมนูแนะนำ อันมิสึสตรอว์เบอร์รีแล้วกัน...\""
2300602-15 = "ค่ะ กรุณารอสักครู่นะคะ!"
2300602-16 = "ค่ะ กรุณารอสักครู่นะคะ!"
2300602-19 = "(อาจเป็นเพราะอีเวนต์ที่ร้านเฮียกคิยาโค คนในร้านจึงมากกว่าที่คิด)"
2300602-20 = "(ชิซุโกะดูโดดเด่นมากท่ามกลางกลุ่มคนแน่นขนัดในร้าน)"
2300602-21 = "เซ็ตขนมปังถั่วแดงสตรอว์เบอร์รีที่สั่งได้แล้วค่ะ!"
2300602-22 = "ชิซุโกะจัง อันนี้กินแบบนี้ได้เลยมั้ย?"
2300602-23 = "อ่า ฉันมีวิธีแนะนำเพื่อการทานขนมให้อร่อยขึ้นอยู่ค่ะ!"
2300602-24 = "หากกินขนมปังถั่วแดงพร้อมกับจิบชาที่รินเอาไว้ตรงนี้…"
2300602-25 = "จะได้ลิ้มรสหวานของถั่วแดงและรสขมของชาที่กลมกล่อมได้ในคำเดียวค่ะ! ฮิฮิ"
2300602-26 = "ว้าว~!"
2300602-27 = "ชิซุโกะจางงง~! น่ารักจัง!"
2300602-29 = "เซ็ตไดฟุกุสตรอว์เบอร์รีที่สั่งได้แล้วค่ะ!"
2300602-30 = "หืม? นี่ไม่ใช่เมนูที่ฉันสั่งนี่นา?"
2300602-31 = "ฉันสั่งขนมยัทสึฮาชิไม่ใช่ไดฟุกุนะ...?"
2300602-32 = "คะ?"
2300602-33 = "อ๊ะ...! ขะ... ขอโทษค่ะ นายท่าน!"
2300602-34 = "ชิซุโกะคงจดออเดอร์พลาดไป..."
2300602-35 = "จะไปจัดมาให้ใหม่เดี๋ยวนี้เลยค่ะ!"
2300602-36 = "อืม...."
2300602-37 = "มาแล้ว! โมเม้นต์โก๊ะกังแบบสุ่มของชิซุโกะ!"
2300602-38 = "ทั้งสีหน้าที่แสดงถึงความรู้สึกผิด และท่าทางที่โค้งคำนับขอโทษ..."
2300602-39 = "สมกับเป็นนางฟ้าจริงๆ..."
2300602-40 = "ยะ...อย่าล้อฉันเล่นสิคะ..."
2300602-42 = "(ท่าทางโก๊ะกังของชิซุโกะ มักจะทำให้ลูกค้าพึงพอใจ...)"
2300602-43 = "(ดูเหมือนว่าลูกค้าส่วนใหญ่จะมาที่ร้านเพื่อมาหาชิซุโกะมากกว่ากินขนม)"
2300602-44 = "[s] \"ที่ร้านยุ่งสุดๆ เลยนะ\""
2300602-45 = "(ผ่านไปพักใหญ่...)"
2300602-47 = "ขอบคุณที่รอนะคะ นายท่าน!"
2300602-48 = "เมนูที่สั่งได้แล้วค่ะ!"
2300602-49 = "หมั่นโถวสตรอว์เบอร์รี! แบบดีลักซ์ค่ะ!"
2300602-50 = "[s3] \"หือ? แต่ครูสั่งไดฟุกุสตรอว์เบอร์รีไปนะ?\"\n[s4] \"หือ? แต่ครูสั่งอันมิสึสตรอว์เบอร์รีไปนะ?\""
2300602-51 = "อ๊ะ ชิซุโกะทำพลาดอีกแล้ว!"
2300602-52 = "อ๊ะ ชิซุโกะทำพลาดอีกแล้ว!"
2300602-53 = "ขะ... ขอโทษด้วยค่ะนายท่าน! จะรีบไปเปลี่ยนเป็นเมนูที่สั่งให้เดี๋ยวนี้ค่ะ..."
2300602-55 = "[s] \"ไม่เป็นไรหรอก หมั่นโถวก็น่าอร่อยดีนะ\""
2300602-56 = "...!!"
2300602-57 = "...แค่นี้เหรอคะ?"
2300602-58 = "[s] พยักหน้า"
2300602-59 = "ค่า~ ถ้างั้นชิซุโกะจะนำเมนูต่อไปมาเสิร์ฟเลยนะคะ!"
2300602-61 = "อ๊ะ นายท่าน!! หลีกทางหน่อยค่ะ! ชิซุโกะจะชนแล้ว!"
2300602-63 = "ระ...เร็วมาก!"
2300602-64 = "[s] \"ชิซุโกะเป็นอะไรรึเปล่า?\""
2300602-65 = "ชิซุโกะไม่เป็นไรค่ะ!"
2300602-66 = "ดะ..เดี๋ยวจะไปยกเมนูต่อไปมาให้นะคะ..."
2300602-68 = "อ๊ะ! โธ่เอ๊ย ชิซุโกะ! ทำพลาดอีกแล้ว!"
2300602-69 = "คุณครูคะ... คือหมายถึงนายท่านคะ…#nฉันเผลอผสมซอสชาบัสโก้ลงไปในเครื่องดื่มของนายท่าน..."
2300602-70 = "[s] \"ทำไมถึงพลาดเรื่องแบบนี้ได้น่ะ?!\""
2300602-71 = "นะ...นายท่านยังอยากจะดื่มมั้ยคะ (เหลือบมอง)"
2300602-72 = "[s5] \"ครูขอผ่านได้มั้ย\"\n[s6] \"ได้ เอามาเลย!\""
2300602-73 = "โธ่... ชิซุโกะนี่ซุ่มซ่ามจริงๆ!"
2300602-74 = "ทำไมฉันถึงซุ่มซ่ามแบบนี้กันนะ... จนทำให้นายท่านลำบาก!"
2300602-75 = "[s7] \"ไม่เป็นไร เดี๋ยวครูสั่งใหม่ก็ได้\""
2300602-76 = "แค่นี้เหรอคะ?!"
2300602-78 = "ดื่มหมดในครั้งเดียวได้อย่างไม่ลังเลเลย?!"
2300602-79 = "[s8] \"โอ้ว เผ็ดดี! ขออีกแก้วสิ!"
2300602-80 = "เอาอีกแก้วเหรอคะ?!"
2300602-81 = "..."
2300602-82 = "อึ่ก... ทนไม่ไหวแล้วค่ะ!"
2300602-83 = "มากับฉันหน่อยค่ะคุณครู!"
2300602-86 = "(คุณครูถูกชิซุโกะดึงไปมุมเงียบๆ มุมหนึ่งด้านนอกร้านเฮียกคิยาโค)"
2300602-87 = "คุณครูคิดจะทำอะไรกันแน่คะ?!"
2300602-88 = "[s9] \"นั่นเป็นสิ่งที่ครูควรจะพูดมากกว่า\"\n[s10] \"ชิซุโกะนั่นแหละกำลังทำอะไรอยู่?\""
2300602-89 = "กำลังทำอะไรอยู่น่ะเหรอคะ? ฉันก็แค่..."
2300602-90 = "กำลังทำอะไรอยู่น่ะเหรอคะ? ฉันก็แค่..."
2300602-91 = "ของขึ้นชื่อของร้านเฮียกคิยาโคก็คือการบริการแบบโก๊ะกังยังไงล่ะคะ!"
2300602-92 = "ฉันบอกคุณครูไว้ใน MOMOTALK แล้วไงคะ"
2300602-93 = "ว่าจะให้บริการการต้อนรับที่สมบูรณ์แบบ..."
2300602-94 = "[s] \"บริการแบบโก๊ะกังนี่ี่เป็นการบริการที่สมบูรณ์แบบเหรอ?\""
2300602-95 = "ใช่แล้วค่ะ! ผลตอบรับจากลูกค้าดีเลยใช่มั้ยล่ะคะ?"
2300602-96 = "เห็นแบบนี้ลูกค้าก็ชอบมากเลยนะคะ"
2300602-97 = "[s11] \"เอ่อ... เข้าใจแล้ว\"\n[s12] \"....\""
2300602-98 = "คำตอบช่างเย็นชาอะไรแบบนี้...?!"
2300602-99 = "จะไม่พูดอะไรสักหน่อยเหรอคะ?!"
2300602-100 = "เอาเป็นว่าลูกค้าที่นี่เรียกฉันว่าไอดอลแห่งร้านเฮียกคิยาโคค่ะ!"
2300602-101 = "เวลาฉันทำเรื่องโก๊ะกัง พวกเขาก็มองว่ามันน่ารัก และฉันชอบเห็นรอยยิ้มของลูกค้าทุกคนค่ะ"
2300602-102 = "ยอดกลยุทธ์การค้าที่ต่างฝ่ายต่างได้ประโยชน์ไงล่ะค่ะ!"
2300602-103 = "แล้วทำไมถึงไม่ได้ผลกับคุณครูกันนะ?"
2300602-105 = "ฉันฝึกซ้อมมาทั้งคืนเพื่อเอาชนะใจคุณครู และเตรียมการมาเป็นพิเศษเลยนะคะ!"
2300602-106 = "[s] \"ทั้งหมดนั่นเป็นการแสดงงั้นเหรอ...\""
2300602-108 = "[s13] \"ถึงไม่แสดงอะไร ชิซุโกะก็น่ารักอยู่แล้ว\"\n[s14] \"ถ้าแสดงท่าทางน่ารักไปกว่านี้ก็แย่น่ะสิ...\""
2300602-112 = "..."
2300602-113 = "...อึ่ก! พะ... พูดแบบนั้นได้ด้วยสีหน้าเรียบเฉยได้ด้วย...!"
2300602-114 = "คุณครูแค่อยากให้ฉันแสดงออกให้เป็นธรรมชาติเหรอคะ?!"
2300602-115 = "แค่อยากให้เป็นตัวของตัวเอง?"
2300602-116 = "อ่า... เวลาอยู่ต่อหน้าคุณครู ฉันก็ดูเหมือนจะเป็นตัวของตัวเองได้..."
2300602-117 = "ตอนนี้ฉันไม่ได้แสดงอยู่นะคะ..."
2300602-118 = "[s] \"ไม่ว่าจะเป็นแบบไหนก็เป็นชิซุโกะอยู่ดี\""
2300602-119 = "จริงเหรอคะ..."
2300602-120 = "ฉันพูดไม่ถูกเลย... คุณครูเนี่ยน้า~"
2300602-122 = "(หลังจากนั้นชิซุโกะก็เดินมาเสิร์ฟขนมด้วยอารมณ์ที่ดีขึ้นกว่าเดิม)"

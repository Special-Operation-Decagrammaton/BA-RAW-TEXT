[translation]
2300602-1 = "百夜堂的看板娘！"
2300602-2 = "（收到靜子的訊息後，來到了他工作的百鬼夜行傳統喫茶店「百夜堂」）"
2300602-5 = "啊，老師！"
2300602-6 = "……啊不對，咳哼。"
2300602-8 = "歡迎回來！主人！"
2300602-9 = "[s] 「呃，那個……我回來了？」"
2300602-10 = "啊，這麼突然嚇到你了吧。稱呼「主人」是我們店裡的傳統。"
2300602-11 = "那麼這邊請……來，菜單在這裡！"
2300602-12 = "今天的推薦餐點是草莓餡蜜！"
2300602-13 = "當然，其他的和菓子也非常好吃喔！"
2300602-14 = "[s1] 「那……我要草莓大福。」\n[s2] 「那……就點推薦的草莓餡蜜。」"
2300602-15 = "好的！請您稍等！"
2300602-16 = "好的！請您稍等！"
2300602-19 = "（或許是因為正在舉辦活動，店裡其實有點混亂）"
2300602-20 = "（就算是在這種環境裡，靜子也比其他人更加地耀眼，不管在哪裡都能馬上找到她）"
2300602-21 = "這是您點的草莓紅豆麵包套餐！"
2300602-22 = "靜子醬，你比較推薦哪種吃法呢？"
2300602-23 = "啊，其實我有個吃起來更美味的推薦吃法！"
2300602-24 = "首先先喝一口主人手邊的茶，接著再把紅豆麵包撕成小塊吃下去，請您試試看吧！"
2300602-25 = "這樣甜味和苦味會在口中融合，您可以一次享受喔！"
2300602-26 = "啊啊真是的，靜子醬，實在是太可愛了！"
2300602-27 = "不管做什麼都好可愛！"
2300602-29 = "這是您點的草莓大福套餐！"
2300602-30 = "咦？草莓大福？"
2300602-31 = "我點的不是草莓大福，應該是草莓八橋才對……？"
2300602-32 = "咦咦？"
2300602-33 = "啊啊……！對，對不起主人！"
2300602-34 = "靜子，不小心搞錯了……！"
2300602-35 = "我，我馬上就幫您更換……！非常抱歉……！"
2300602-36 = "出……！"
2300602-37 = "出現了！是靜子醬的冒失鬼活動！"
2300602-38 = "那種抱歉的表情，還有因為犯錯害羞而扭扭捏捏的樣子……！"
2300602-39 = "是天使降臨了吧……"
2300602-40 = "請，請不要再取笑我了……"
2300602-42 = "（在那之後每當靜子不小心做錯了些什麼，客人們都會在一旁起鬨）"
2300602-43 = "（這麼看來，大部分的客人似乎都是為了看靜子而來的）"
2300602-44 = "[s] 「店裡生意可真好啊……」"
2300602-45 = "（過了一會兒……）"
2300602-47 = "讓您久等了，主人！"
2300602-48 = "這是您點的……"
2300602-49 = "豪華版草莓饅頭！"
2300602-50 = "[s3] 「咦？我剛才點的應該是草莓大福吧……？」\n[s4] 「咦？我剛才點的應該是草莓餡蜜吧……？」"
2300602-51 = "哇啊！靜子真是的怎麼又搞錯了！"
2300602-52 = "哇啊！靜子真是的怎麼又搞錯了！"
2300602-53 = "不，不好意思主人！我這就為您重做……"
2300602-55 = "[s] 「沒關係，這個看起來也很好吃，謝謝你。」"
2300602-56 = "……！？"
2300602-57 = "……真，真的沒關係嗎！？"
2300602-58 = "[s] （點頭）"
2300602-59 = "……那，那麼我就繼續為您服務囉～？"
2300602-61 = "哇啊，危險啊主人！靜子快要撞到您啦……！"
2300602-63 = "被，被躲開了！？"
2300602-64 = "[s] 「沒事吧？」"
2300602-65 = "靜，靜子沒事唷～！"
2300602-66 = "接，接下來是下一個服務……！"
2300602-68 = "啊啊啊！靜子又犯了天大的錯！"
2300602-69 = "我不小心在老師……不對，主人的飲料裡面加了查巴斯科辣椒醬！"
2300602-70 = "[s] 「不小心的話會加成這樣滿滿一杯！？」"
2300602-71 = "就，就算是老師也不會喝這個吧……？"
2300602-72 = "[s5] 「再怎麼說，這有點太……」\n[s6] 「……這可是我可愛的學生為我做的！」"
2300602-73 = "真是的，靜子這個冒失鬼！"
2300602-74 = "居然會犯這種錯，讓老師這麼麻煩！嗚嗚，靜子真是，真是……！"
2300602-75 = "[s7] 「能幫我重做一杯嗎？」"
2300602-76 = "這樣就好！？"
2300602-78 = "毫不猶豫地喝光了！？"
2300602-79 = "[s8] 「嗚呃……再來一杯！」"
2300602-80 = "竟然還要再來一杯！？不過你剛剛「嗚呃」了一聲吧！？"
2300602-81 = "…………"
2300602-82 = "……啊啊真是的，我忍不下去了！"
2300602-83 = "老師！請過來這裡！"
2300602-86 = "（就這樣被靜子拉著手，帶到了百夜堂的角落）"
2300602-87 = "老師從剛剛開始就在做些什麼呀！"
2300602-88 = "[s9] 「這應該是我的台詞吧……」\n[s10] 「靜子才是，在做些什麼呢？」"
2300602-89 = "那當然是……！"
2300602-90 = "那當然是……！"
2300602-91 = "是我們百夜堂的特色「冒失鬼服務」啦！"
2300602-92 = "我不是在MomoTalk說過了嗎？"
2300602-93 = "會「好好地招待老師」。"
2300602-94 = "[s] 「……用冒失鬼服務來好好地招待？」"
2300602-95 = "就是這樣！剛才那些客人們的反應，老師也看到了吧？"
2300602-96 = "看看我的打扮，是這麼地可愛！被這麼有魅力的女孩子服務的話，肯定會很心動的吧？"
2300602-97 = "[s11] 「唔，唔嗯，這個嘛……」\n[s12] 「……」"
2300602-98 = "這麼微妙的反應！？"
2300602-99 = "請說點什麼吧！？這樣一言不發可是很傷人的哦！？"
2300602-100 = "總之，我在主人……客人們的眼中作為百夜堂的看板娘，可是很受歡迎的喔。"
2300602-101 = "只要我表現出冒失又可愛的一面，客人們就會因此而被療癒。"
2300602-102 = "你不覺得這是個雙贏又最棒的交易嗎？"
2300602-103 = "所以說，老師也稍微配合一下吧！"
2300602-105 = "難得老師要來，我昨晚可是一直在特訓的說……！"
2300602-106 = "[s] 「不，雖然你這麼說……」"
2300602-108 = "[s13] 「就算不做這種表演，靜子也很可愛的。」\n[s14] 「要我有更大的反應的話我也是有點困擾。」"
2300602-112 = "……咦？"
2300602-113 = "咦咦！？竟，竟然一臉正經地說出這麼羞恥的台詞……！"
2300602-114 = "難，難道老師是天然呆嗎！？"
2300602-115 = "已經超越了冒失鬼，進入天然呆的境界了嗎！？"
2300602-116 = "哈，哈……啊真是的，一不小心就……"
2300602-117 = "該說是漸漸露出本性……還是在老師面前做這些好像都沒什麼意義呢……"
2300602-118 = "[s] 「包含這些在內的全部，都是靜子的一部分嘛。」"
2300602-119 = "……真是的。"
2300602-120 = "你也是個奇怪的人呢，老師。"
2300602-122 = "（之後，從開心的靜子那裡收到了很多和菓子當禮物）"

1004606-94 = "นี่คืออุปกรณ์นินจาที่ฉันเตรียมพร้อมเอาไว้เผื่อว่าเวลาแห่งการตัดสินมาถึงค่ะ!"
1004606-95 = "นายท่าน! ดูนี่สิคะ! น่าทึ่งมากเลยใช่มั้ยคะ?!"

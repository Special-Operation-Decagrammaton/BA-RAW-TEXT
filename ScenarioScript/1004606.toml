[translation]
1004606-1 = "和伊樹菜一起手牽手"
1004606-2 = "（在前往與伊樹菜相約的地點時，一直思考著是不是太多嘴了）"
1004606-3 = "啊！主公！這裡！在這裡！"
1004606-6 = "[ns] 「伊樹菜，你等很久了嗎？」"
1004606-7 = "不會！請別這麼說！"
1004606-8 = "那麼今天該做什麼呢？可以在海邊做的事情……"
1004606-9 = "唔唔～明明有很多卻很難想呢……雖然修行也是一種選擇……！"
1004606-13 = "不如這次不要進行忍術修行──"
1004606-14 = "而是去找找有沒有好吃的夏季美食，試著用不同的方式體驗……！"
1004606-15 = "[s] 「為了將來的打算，我想先確認一件事……」"
1004606-16 = "是什麼事呢，主公？"
1004606-17 = "[s] 「伊樹菜難道，不喜歡在海裡游泳嗎？」"
1004606-21 = "！？"
1004606-22 = "[s1] 「你不想說也沒關係，只是覺得你好像在刻意閃躲……」\n[s2] 「一方面也是覺得好不容易來到海邊，所以想聽聽是不是有什麼理由。」"
1004606-25 = "那，那是因為……"
1004606-26 = "[s] 「不想說的話別放在心上。抱歉問了你不喜歡的問──」"
1004606-27 = "不，不是的！主公！不是因為討厭之類的……！"
1004606-28 = "伊樹菜並不是討厭游泳，只是……"
1004606-32 = "哇，哇啊啊啊！！"
1004606-33 = "[s] 「伊，伊樹菜？」"
1004606-34 = "那，那個……伊樹菜並沒有刻意隱瞞這件事的意思……！"
1004606-36 = "（之後，聽伊樹菜進行了說明）"
1004606-38 = "[ns] 「也就是說，你是旱鴨子……？」"
1004606-39 = "是，是的……"
1004606-40 = "伊樹菜，實在是無法習慣水……"
1004606-41 = "雖然至今也嘗試了好幾次……"
1004606-42 = "但就是會不自覺地感到害怕……"
1004606-43 = "一旦海水進入眼睛或嘴巴就會驚慌失措……"
1004606-44 = "對，對不起！主公……！"
1004606-45 = "明明應該早點說出來的，卻一直找藉口害主公擔心……！"
1004606-46 = "真的，很抱歉……！"
1004606-47 = "[s] 「沒事，你不用道歉……」"
1004606-49 = "[ns] 「不過有件事我有點好奇……」"
1004606-50 = "……主公好奇的事？"
1004606-51 = "[s] 「為什麼要刻意隱瞞呢？」"
1004606-52 = "那，那是因為……"
1004606-56 = "伊樹菜總是跟主公說……"
1004606-57 = "要成為奇普托斯最強的忍者對吧……？"
1004606-58 = "[s] 「嗯。」"
1004606-59 = "明明立志成為奇普托斯最強的忍者，結果卻不會游泳……"
1004606-60 = "呃，也就是說……"
1004606-61 = "伊，伊樹菜擔心主公知道之後……會不會很失望……"
1004606-62 = "[s3] 「……沒事的唷，伊樹菜。」\n[s4] 「我不會因為這點小事，就對伊樹菜亂下評論。」"
1004606-65 = "真，真的嗎……？"
1004606-66 = "太，太好了……耶嘿嘿……"
1004606-67 = "既然主公都這麼說了，那伊樹菜就放心了！"
1004606-68 = "然後伊樹菜也同時下定決心了！"
1004606-69 = "[s] 「下定決心……？」"
1004606-70 = "是！即使會感到害怕，只顧著逃跑是無法改變任何事情的！"
1004606-71 = "既然伊樹菜的目標是成為奇普托斯最強的忍者……"
1004606-75 = "那麼遲早必須克服對水的恐懼！"
1004606-76 = "[s] 「也就是說……？」"
1004606-77 = "因此，主公！請您稍等一下！"
1004606-78 = "[s] 「嗯……？」"
1004606-85 = "讓您久等了！！"
1004606-89 = "[ns] 「這是什麼……？」"
1004606-90 = "伊樹菜雖然一直在逃避……"
1004606-91 = "心裡卻也明白這一天遲早會到來……"
1004606-92 = "為了克服對水的恐懼，必須與水戰鬥的這一天！"
1004606-93 = "[s] 「是，是還挺讓人欣慰的沒錯……」"
1004606-94 = "而這些就是為了那個時候所準備的忍具！"
1004606-95 = "主公請看！看起來很特別對吧！？"
1004606-96 = "這就是忍者要在水面上行走時會使用的道具哦～！"
1004606-100 = "還有這個筒子！"
1004606-101 = "這是能讓忍者在水中呼吸的竹筒！"
1004606-102 = "然後這個，是能讓忍者在水上快速移動的──"
1004606-103 = "簡易型超導式螺旋馬達！"
1004606-104 = "[s] 「雖然聽不太懂但感覺很厲害！」"
1004606-106 = "就算不會游泳，身為忍者依然能用忍者的方法解決問題！"
1004606-107 = "接下來伊樹菜就要用這些道具，克服不會游泳的問題了！"
1004606-109 = "（於是伊樹菜便開始進行特訓）"
1004606-111 = "首先來試試這個水蜘蛛吧！"
1004606-113 = "伊樹菜！要上了！"
1004606-120 = "[ns] 「伊樹菜──！？」"
1004606-122 = "伊，伊樹菜……"
1004606-123 = "完全沒辦法在水面上站起來……！"
1004606-124 = "難道是因為伊樹菜做的修行還不夠嗎！？"
1004606-125 = "[s] 「除非是千年學園研發的鞋子，否則應該有點困難吧……」"
1004606-126 = "唔唔……就算用鞋子無法順利克服，伊樹菜也不會放棄的！"
1004606-127 = "接下來是能讓人在水中呼吸的竹筒……！"
1004606-131 = "伊樹菜！要上了！"
1004606-137 = "（咕嚕咕嚕咕嚕咕嚕……）"
1004606-138 = "[s] 「伊樹菜──！？！？」"
1004606-140 = "噗啊啊啊！"
1004606-145 = "主，主公……"
1004606-146 = "原來在水裡睜開眼睛會這麼難受！"
1004606-147 = "而且因為眼睛太痛的關係，伊樹菜把竹筒弄丟了……"
1004606-148 = "[s] 「是，是嗎？總之先去沖沖眼睛吧……」"
1004606-149 = "伊，伊樹菜是不會放棄的！接下來……！"
1004606-151 = "（後來，伊樹菜又挑戰了好幾次……）"
1004606-152 = "嗚啊啊啊！？主公──！？"
1004606-157 = "（只可惜都接二連三地失敗了）"
1004606-159 = "嗚嗚……要用忍具來克服大海，看來還是太難了……"
1004606-160 = "伊樹菜，就到此為止了嗎……"
1004606-161 = "這樣要當上奇普托斯最強的忍者……是完全……"
1004606-162 = "[s] 「伊樹菜，要不要直接練習游泳？」"
1004606-163 = "……咦？"
1004606-164 = "[s5] 「就算無法用忍具或忍術克服……」\n[s6] 「那只要學會游泳不就行了嗎？」"
1004606-167 = "主公的意思是……要親自教伊樹菜游泳嗎？"
1004606-168 = "[s7] 「嗯，說到游泳的話我還算有點自信，包在我身上。」\n[s8] 「我會為了伊樹菜盡全力的！」"
1004606-171 = "是，是……！"
1004606-172 = "那，那就拜託您了！主公……！"
1004606-174 = "（就這樣，與忍術完全無關的普通游泳課開始了）"
1004606-176 = "首先要先從握著主公的手……將臉浸到水裡開始是嗎？"
1004606-177 = "[s] 「嗯。要先讓自己習慣水才行。」"
1004606-178 = "好，好的！伊樹菜，要上了……！"
1004606-180 = "一邊抓著主公的手，將臉……！"
1004606-181 = "將臉……"
1004606-182 = "要，要一直抓著主公的手嗎！？"
1004606-183 = "[s] 「怎麼了？有哪裡不方便嗎？」"
1004606-184 = "不，不會！伊樹菜，要上了！"
1004606-190 = "[ns] 「如何？」"
1004606-191 = "噗哈…… 是，是的，還可以…… "
1004606-192 = "比，比起那個，手……"
1004606-193 = "[s] 「那接著就試試看踢水吧。」"
1004606-194 = "好，好的！"
1004606-196 = "（游泳課慢慢進行下去）"
1004606-204 = "（首先抓著伊樹菜的手，讓他將臉浸到水裡後開始練習踢水）"
1004606-209 = "（之後也有練習換氣等動作……）"
1004606-221 = "（把游泳需要的技巧一步步教給了他……）"
1004606-224 = "[ns] 「接下來我會在旁邊幫你撐著，你試著面朝下趴入水中。」"
1004606-228 = "噫呀！？"
1004606-235 = "[ns] 「伊樹菜！？怎麼突然失去平衡了！？沒事吧！？」"
1004606-236 = "沒，沒事……只，只是，突然被主公您抓住腰……"
1004606-243 = "[ns] 「時間都已經這麼晚了啊……那我們今天就先練習到這裡吧。」"
1004606-244 = "好，好的……謝謝您，主公……"
1004606-245 = "[s] 「嗯，你也辛苦了。我們回去吧。」"
1004606-246 = "好，好的……！"
1004606-250 = "（在回渡假勝地的途中……）"
1004606-257 = "感覺今天……"
1004606-258 = "又和主公……"
1004606-262 = "…………"
1004606-263 = "[s] 「總覺得很抱歉呢。」"
1004606-264 = "什，什麼……？"
1004606-265 = "[s9] 「我好像逼你做了你不想做的事。」\n[s10] 「很少看到伊樹菜會這麼累……」"
1004606-268 = "別，別這麼說，伊樹菜完全……"
1004606-269 = "咦？看伊樹菜的步伐就知道了……？"
1004606-270 = "這，這樣啊……伊樹菜很奇怪嗎……？"
1004606-271 = "[s11] 「不過最基礎的部分今天都學到了，今後應該不會有問題了。」\n[s12] 「之後你只要有空的時候自行練習就行了。」"
1004606-274 = "您的意思是說……"
1004606-275 = "今天是主公最後一次陪伊樹菜練習游泳嗎……？"
1004606-276 = "[s] 「太陽也下山了。快點走吧──」"
1004606-277 = "絕，絕對沒有那種事！"
1004606-278 = "不是那樣的，主公！"
1004606-279 = "[s] 「伊樹菜……？」"
1004606-280 = "主公絕對沒有逼伊樹菜做任何事！"
1004606-281 = "之所以會這樣，與其說是覺得有負擔或疲累……！"
1004606-282 = "更應該說是……！"
1004606-287 = "― （究竟是為什麼呢……[wa:900] "
1004606-289 = "― 自從主公，說要教伊樹菜游泳的瞬間……）[wa:2560] "
1004606-292 = "― （伊樹菜的心臟，就跳得……[wa:1980] "
1004606-294 = "― 非常厲害……)"
1004606-297 = "― （剛才被主公握住的，[wa:2470] "
1004606-299 = "― 伊樹菜的手……[wa:730] "
1004606-302 = "― 還有其他被主公觸碰到的地方，[wa:1340] "
1004606-304 = "― 感覺有些熾熱……)[wa:590] "
1004606-307 = "― 那個，主公。剛才那個，[wa:4540] "
1004606-309 = "― 雖然有些手忙腳亂……[wa:470] "
1004606-312 = "― 不過今天一天……"
1004606-314 = "― 伊樹菜非常的開心，非常幸福！[wa:2200] "
1004606-317 = "― 所以，就是……[wa:870] "
1004606-319 = "― 該怎麼說才好呢那個……！[wa:750] "
1004606-322 = "― 如果可以稍微，說點任性的話……[wa:3600] "
1004606-325 = "― 下次可以……"
1004606-327 = "― 再教一次，伊樹菜游泳嗎？[wa:2440] "
1004606-330 = "[ns] 「……嗯，伊樹菜想要的話，我非常樂意。」"
1004606-331 = "― 耶嘿嘿……"
1004606-333 = "― 好的，非常感謝！[wa:1220] "
1004606-336 = "― 伊樹菜，"
1004606-338 = "― 今後也要請您多多指教囉！主公！[wa:2280] "
1004606-341 = "（伊樹菜臉上浮現的笑容，甚至比夕陽下閃爍的街道來的耀眼）"
1004606-342 = "（就這樣一起談天說地，緩緩踏上了歸途）"

[translation]
1004606-1 = "จับมือกับอิซุนะ"
1004606-2 = "(คุณครูมาพบกับอิซุนะที่สถานที่นัดพบ พลางกังวลว่าควรจะถามสิ่งที่คิดอยู่หรือเปล่า...)"
1004606-3 = "อ๊ะ! นายท่าน! ทางนี้ค่ะ ทางนี้!   "
1004606-6 = "[ns] \"อะ...อื้อ อิซุนะ รอนานรึเปล่า?\""
1004606-7 = "อ๊ะ ไม่ค่ะ ฉันรอไม่นานเลยค่ะ!"
1004606-8 = "อืม... ถ้างั้นวันนี้... เราจะทำอะไรกันดีคะ? เรื่องที่พอจะทำได้ที่ทะเล..."
1004606-9 = "อืม~ ถ้าได้ฝึกวิชานินจาฤดูร้อนได้ก็คงดีนะคะ! แต่ถ้าเอาแต่อยู่ที่ชายหาด ไม่ไปดูอย่างอื่นเลยก็คง#nน่าเสียดาย"
1004606-13 = "คราวนี้ไม่ต้องเกี่ยวกับการฝึกวิชานินจาก็ได้..."
1004606-14 = "ฉันอยากลองไปตระเวนหาร้านอาหารเด็ดๆ ในฤดูร้อนบ้าง...!"
1004606-15 = "[s] \"คือว่าแค่อยากถามเผื่อไว้น่ะ...\""
1004606-16 = "คะ? นายท่าน? "
1004606-17 = "[s] \"อิซุนะไม่ชอบเล่นน้ำทะเลเหรอ?\""
1004606-21 = "คะ... คะ?!"
1004606-22 = "[s1] \"ถ้าไม่อยากบอกก็ไม่เป็นไร ครูแค่สงสัยว่าทำไมถึงพยายามเลี่ยงตลอด\"\n[s2] \"ครูแค่ถามดูเพราะกังวลว่าจะชวนให้อิซุนะทำในสิ่งที่อิซุนะไม่ชอบน่ะ\""
1004606-25 = "นายท่าน คือว่า..."
1004606-26 = "[s] \"ถ้าไม่อยากบอกก็ไม่เป็นไรนะ ขอโทษนะที่ถามอะไร---\""
1004606-27 = "มะ...ไม่ใช่แบบนั้นค่ะ นายท่าน! ไม่ใช่ว่าไม่อยากบอกหรอกนะคะ...!"
1004606-28 = "คือว่าอิซุนะ... ไม่ได้เกลียดการเล่นน้ำหรอกค่ะ..."
1004606-32 = "แงงงง...! นายท่าน... ขอโทษด้วยค่ะ!"
1004606-33 = "[s] \"หืม? อิซุนะ...?\""
1004606-34 = "คือว่า... อิซุนะน่ะ... มะ... ไม่ได้คิดจะปิดบังนายท่านเลยนะคะ แต่ว่าเรื่องนี้มัน...!"
1004606-36 = "(จากนั้นคุณครูก็ได้ฟังเรื่องราวความเป็นมาจากอิซุนะตั้งแต่ต้นจนจบ)"
1004606-38 = "[ns] \"เพราะว่ายน้ำไม่เป็นงั้นเหรอ...?\""
1004606-39 = "คะ...?"
1004606-40 = "อิซุนะ... ไม่ค่อยชินกับการเล่นน้ำเท่าไร..."
1004606-41 = "อิซุนะเคยลองพยายามว่ายน้ำมาหลายครั้งแล้ว..."
1004606-42 = "ตอนที่น้ำทะเลเข้าตา เข้าหู เข้าจมูก... อิซุนะมักจะสะดุ้งตกใจโดยไม่รู้ตัว..."
1004606-43 = "เวลาน้ำเค็มๆ เข้าปากมันทรมานมากเลยค่ะ..."
1004606-44 = "แงงง... นายท่าน! ฉันควรบอกนายท่านก่อนแท้ๆ...!"
1004606-45 = "แต่กลับหาเรื่องเลี่ยงพูดเลี่ยงเสมอๆ และทำให้นายท่านเป็นห่วง...!"
1004606-46 = "ขอโทษค่ะ นายท่าน..."
1004606-47 = "[s] \"ไม่เป็นไรนะ อิซุนะไม่ต้องคิดมากหรอก\""
1004606-49 = "[ns] \"แต่ว่าครูมีเรื่องที่สงสัยอยู่...\""
1004606-50 = "คะ...? "
1004606-51 = "[s] \"ต้องปิดบังไว้ด้วยเหรอว่าว่ายน้ำไม่เป็นน่ะ?\""
1004606-52 = "คือว่าเรื่องนั้น..."
1004606-56 = "นายท่าน อิซุนะน่ะ มีความฝันว่าอยากจะเป็นนินจาที่เก่งกาจที่สุดในคิโวทอส..."
1004606-57 = "เหมือนกับที่ฉันบอกนายท่านมาตลอด..."
1004606-58 = "[s] \"อื้อ ใช่แล้วละ\""
1004606-59 = "ทั้งๆ ที่มีความฝันที่ยิ่งใหญ่ขนาดนั้น แต่กลับว่ายน้ำไม่เป็น..."
1004606-60 = "ไม่ว่าจะคิดยังไง... "
1004606-61 = "อิซุนะคิดว่าอาจจะทำให้นายท่านผิดหวัง... อิซุนะกลัวจะเป็นแบบนั้นก็เลยไม่ได้บอกไป..."
1004606-62 = "[s3] \"แบบนี้เองเหรอ... ไม่เป็นไรหรอก อิซุนะ\"\n[s4] \"คนที่ว่ายน้ำไม่เป็นมีตั้งเยอะแยะ ไม่เป็นไรหรอก\""
1004606-65 = "ยะ... อย่างนั้นเหรอคะ...?"
1004606-66 = "ฮิฮิ... ฮิฮิฮิ... ค่อยยังชั่วหน่อยค่ะ "
1004606-67 = "ถ้านายท่านพูดแบบนั้นละก็ อิซุนะก็โล่งใจค่ะ!"
1004606-68 = "หลังจากได้ยินคำพูดของนายท่านวันนี้ อิซุนะก็ตัดสินใจได้แล้วค่ะ!"
1004606-69 = "[s] \"ตัดสินใจ...?\""
1004606-70 = "ค่ะ! ไม่ว่าอิซุนะจะไม่คุ้นและกลัวมากแค่ไหน แต่ฝืนหลีกเลี่ยงต่อไปก็คงไม่มีประโยชน์!"
1004606-71 = "ในเมื่ออิซุนะมีเป้าหมายจะเป็นนินจาที่เก่งกาจที่สุด..."
1004606-75 = "เพราะงั้นอิซุนะจะต้องเอาชนะน้ำให้ได้ค่ะ!"
1004606-76 = "[s] \"งะ...งั้นเหรอ...?\""
1004606-77 = "เพื่อการนั้นแล้ว นายท่านคะ! ช่วยรอสักครู่นะคะ!"
1004606-78 = "[s] \"หืม...?\""
1004606-85 = "ทาด๊า~ เตรียมพร้อมเรียบร้อยแล้วค่ะ นายท่าน!"
1004606-89 = "[ns] \"อะไรกันเนี่ย?\""
1004606-90 = "ถึงอิซุนะจะพยายามเลี่ยงมาโดยตลอด..."
1004606-91 = "แต่อิซุนะก็คิดว่าวันนี้จะต้องมาถึงสักวันหนึ่งค่ะ..."
1004606-92 = "วันที่ต้องต่อสู้กับน้ำและต้องเอาชนะมันให้ได้!"

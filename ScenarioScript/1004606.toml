[translation]
1004606-1 = "Holding Hands with Izuna"
1004606-2 = "I was thinking maybe I shouldn't have mentioned anything to Izuna as I was on my way to meet her."
1004606-3 = "Oh! My lord! Here! I'm here!"
1004606-6 = "[ns] \"Hi, Izuna. Were you waiting long?\""
1004606-7 = "Oh, not at all!"
1004606-8 = "Oh, um, so what should we do today? Something on the beach..."
1004606-9 = "Hmm! Summer ninja training is good, but maybe it's best if we explore places other than the beach!"
1004606-13 = "Maybe this time, instead of just training..."
1004606-14 = "We could go to a popular summer restaurant!"
1004606-15 = "[s] \"Um, by any chance...\""
1004606-16 = "Yes, my lord?"
1004606-17 = "[s] \"Do you not like swimming in the ocean?\""
1004606-21 = "Wh-What?!"
1004606-22 = "[s1] \"You don't have to say anything, but it seems like you've been avoiding it.\"\n[s2] \"I'm wondering if I've been trying to force you to do something you don't want to do.\""
1004606-25 = "My lord, so..."
1004606-26 = "[s] \"You don't have to say anything. I'm sorry I asked...\""
1004606-27 = "Oh, not at all, my lord! It's not that I don't want to!"
1004606-28 = "It's not that I don't like to swim...but..."
1004606-32 = "W-Waaahhh! My lord...! I'm sorry!"
1004606-33 = "[ns] \"Huh? I-Izuna?\""
1004606-34 = "So...I wasn't trying to hide this from you or anything, but..."
1004606-36 = "Then, Izuna finally confessed her secret."
1004606-38 = "[ns] \"Because you can't swim?\""
1004606-39 = "Well, um...."
1004606-40 = "I...never got used to the w-water..."
1004606-41 = "I've tried swimming a few times already, but..."
1004606-42 = "I become so shocked whenever the salty water gets in my eyes, ears, and nose..."
1004606-43 = "The salty water is so painful..."
1004606-44 = "W-Waaah... My lord! I should have told you earlier!"
1004606-45 = "I kept avoiding it and I made you worry!"
1004606-46 = "I-I'm sorry, my lord!"
1004606-47 = "[s] \"No, it's okay. I don't care about that at all.\""
1004606-49 = "[ns] \"But I'm curious...\""
1004606-50 = "...Huh? Curious about...?"
1004606-51 = "[s] \"Why would you hide the fact that you can't swim?\""
1004606-52 = "Oh, that's..."
1004606-56 = "My lord. My dream is to become the best ninja in Kivotos..."
1004606-57 = "You know this already."
1004606-58 = "[s] \"Yes, and I'll support you.\""
1004606-59 = "I dream of becoming the best ninja, but if I can't even swim..."
1004606-60 = "Well... You see..."
1004606-61 = "I guess I was scared to disappoint you..."
1004606-62 = "[s3] \"I see. I would never be disappointed over something like that.\" \n[s4] \"There are many people who can't swim besides you.\""
1004606-65 = "R-Really...?"
1004606-66 = "Heehee... Heeheehee... I'm relieved... "
1004606-67 = "If you say so. I feel much better now!"
1004606-68 = "Oh! But I came to a decision after hearing your advice today!"
1004606-69 = "[s] \"A decision...?\""
1004606-70 = "Yes! If I keep running from scary and unfamiliar things, nothing will change!"
1004606-71 = "And my goal is to become the best ninja in Kivotos!"
1004606-75 = "To reach my goal, I need to overcome my fear of water!"
1004606-76 = "[s] \"Oh... So you're saying...?"
1004606-77 = "My lord, please hold on a minute!"
1004606-78 = "[s] \"Huh?\""
1004606-85 = "Ta-da! Here, I brought these, my lord!"
1004606-89 = "[ns] \"What are they?\""
1004606-90 = "I kept avoiding this, but..."
1004606-91 = "I suspected this day would come..."
1004606-92 = "The day where I must fight against water to overcome my fears!"
1004606-93 = "[s] \"I'm proud of you for that, but...\""
1004606-94 = "These are ninja tools I prepared for this very day!"
1004606-95 = "My lord, my lord! Look! Doesn't it look so cool?!"
1004606-96 = "These are ninja shoes for walking on water!"
1004606-100 = "And this barrel!"
1004606-101 = "It's a bamboo barrel that lets ninjas breathe while they're in the water."
1004606-102 = "Oh! And this allows ninjas to move quickly on the water..."
1004606-103 = "It's something like a personal electronic sail portable auto propeller motor, something, something!"
1004606-104 = "[s] \"I don't really understand, but it seems amazing!\""
1004606-106 = "Even if I can't swim, I'll find a way! A real ninja can find a way to overcome anything!"
1004606-107 = "Okay, my lord! I'll use this to overcome my fear of water!"
1004606-109 = "Then Izuna's desperate attempt to overcome the ocean started."
1004606-111 = "First, I'll try these shoes for walking on water!"
1004606-113 = "I can do this!"
1004606-120 = "[s] \"Izuna! Are you okay?\""
1004606-122 = "I-I..."
1004606-123 = "I couldn't stand on the water at all!"
1004606-124 = "My training must be lacking."
1004606-125 = "[s] \"Maybe the shoes have to be manufactured by Millennium...\""
1004606-126 = "I have many more ninja tools! Next!"
1004606-127 = "Let me try the bamboo barrel that lets you breathe in the water!"
1004606-131 = "Here I go!"
1004606-137 = "*bubble*"
1004606-138 = "[ns] \"I-Izunaaa?!\""
1004606-140 = "Pwahhh!"
1004606-145 = "M-My lord!"
1004606-146 = "It's so hard to open my eyes underwater!"
1004606-147 = "I lost the bamboo barrel because my eyes hurt so much..."
1004606-148 = "[s] \"We should go wash out your eyes, Izuna!\""
1004606-149 = "No! I can't give up! The next tool!"
1004606-151 = "Izuna tried tool after tool to overcome her fears."
1004606-152 = "W-Waaahh?! My lord?!"
1004606-157 = "Unfortunately, all attempts failed."
1004606-159 = "*sniffle* ...I've failed to overcome water with my ninja tools..."
1004606-160 = "My lord... I'm a ninja who can't even best water..."
1004606-161 = "At this rate, I'll never be the best ninja in Kivotos..."
1004606-162 = "[s] \"Okay, Izuna. Should we practice swimming now?\""
1004606-163 = "Hm?"
1004606-164 = "[s5] \"You don't need tools or ninjutsu. You have me\" \n[s6] \"I believe in you. I'll teach you how to swim.\""
1004606-167 = "You'll teach me...how to swim...? "
1004606-168 = "[s7] \"Yeah! I'm good at swimming, so you can count on me!\"\n[s8] \"I'm not an expert, but I'll do my best!\""
1004606-171 = "O-Okay..."
1004606-172 = "I'll be counting on you, my lord..."
1004606-174 = "Then we started an ordinary swimming lesson that had nothing to do with ninjutsu or ninja training."
1004606-176 = "First, I take your hands...then put my head underwater?"
1004606-177 = "[s] \"Yeah, first you just need to get used to being in the water.\""
1004606-178 = "I-If my lord says so!"
1004606-180 = "I'll take your hands and put my head under the water...!"
1004606-181 = "Put my head...under the water...!"
1004606-182 = "Wha?! T-Take your hands?!"
1004606-183 = "[s] \"Yeah, what's wrong? Something bothering you?\""
1004606-184 = "N-No! I'll do it now!"
1004606-190 = "[ns] \"How was it? Did it feel okay?\""
1004606-191 = "Pffwah! I-I think so...  "
1004606-192 = "But more importantly...your hands...um..."
1004606-193 = "[s] \"Huh? Oh! Next, you should get used to kicking in the water.\""
1004606-194 = "O-Okay!"
1004606-196 = "Izuna's swimming practice slowly kept going."
1004606-204 = "She held my hands tightly, put her head in the water, and kicked..."
1004606-209 = "She raised her head to breathe, and so on."
1004606-221 = "It was a slow process to learn how to swim."
1004606-224 = "[ns] \"Next, I'll hold you up and you can try floating in the water.\""
1004606-228 = "M-My lord?! Wahhh?!"
1004606-235 = "[ns] \"Izuna?! You lost balance and fell. Are you okay?!\""
1004606-236 = "*bubble bubble* I-I'm okay... I just didn't expect...you'd hold my waist like that..."
1004606-243 = "[ns] \"Look at the time... Let's call it a day.\""
1004606-244 = "*sigh* Th-Thank you for your hard work, my lord..."
1004606-245 = "[s] \"You did all the hard work, Izuna. You need some rest.\""
1004606-246 = "Y-Yes...!"
1004606-250 = "After the swimming lesson, we were on our way back to the dorm."
1004606-257 = "Today's swimming practice with you..."
1004606-258 = "I can still feel your hands on my waist..."
1004606-262 = "..."
1004606-263 = "[s] \"I'm sorry about today, Izuna.\""
1004606-264 = "H-Huh...?"
1004606-265 = "[s9] \"You must be tired because I pushed a swimming lesson on you.\"\n[s10] \"It's not like you to be this exhausted.\""
1004606-268 = "Oh, no! Not at all, my lord."
1004606-269 = "Huh? I thought I was hiding it well..."
1004606-270 = "You feel bad because you pushed me to do something I don't like...?"
1004606-271 = "[s11] \"Yeah. So let's call that our last swimming lesson.\"\n[s12] \"You can practice on your own. Only if you want.\""
1004606-274 = "My lord, that means..."
1004606-275 = "We won't practice swimming together anymore...?"
1004606-276 = "[s] \"The sun's going down. Let's get going.\""
1004606-277 = "No! No! I..."
1004606-278 = "That's not what I want, my lord!"
1004606-279 = "[s] \"I-Izuna?!\""
1004606-280 = "I felt exactly the opposite of what you just said!"
1004606-281 = "Instead of feeling pressured or tired...!"
1004606-282 = "I...I...!"
1004606-287 = "― (W-What is this?[wa:660] "
1004606-289 = "― Since you said you'd teach me how to swim...)[wa:1520] "
1004606-292 = "― (My heart has been...[wa:1660] "
1004606-294 = "― beating so fast?!)"
1004606-297 = "― (When you held my hands before...[wa:1550] "
1004606-299 = "― my hands felt so warm...[wa:50] "
1004606-302 = "― And the other part you touched...[wa:580] "
1004606-304 = "― somehow felt a little warm too...)[wa:10] "
1004606-307 = "― Um, my lord. About before, um...[wa:3700] "
1004606-309 = "― I was a bit embarrassed, but...[wa:10] "
1004606-312 = "― Today...[wa:60] "
1004606-314 = "― was such a fun and happy day![wa:1600] "
1004606-317 = "― So, um...[wa:790] "
1004606-319 = "― What should I say? Umm...![wa:190] "
1004606-322 = "― If you don't mind me asking...[wa:3000] "
1004606-325 = "― Would you be willing to... "
1004606-327 = "― teach me how to swim one more time?[wa:1520] "
1004606-330 = "[ns]  \"As long as you want, anytime.\""
1004606-331 = "― Heeheehee..."
1004606-333 = "― Okay. Thank you![wa:900] "
1004606-336 = "― I'll be"
1004606-338 = "― counting on you! My lord![wa:1880] "
1004606-341 = "Izuna had a big smile as she talked about the day."
1004606-342 = "We took a leisurely walk down the street on the way to the resort, taking in the sunset."

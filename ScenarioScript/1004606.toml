1004606-289 = "― ตั้งแต่... ตอนที่นายท่านบอกว่าจะสอนอิซุนะว่ายน้ำ...)[wa:1240] "
1004606-292 = "― (หัวใจของอิซุนะมัน...[wa:1660] "
1004606-294 = "― ก็เต้นแรงจนเหมือนจะระเบิดออกมาเลย...!)"
1004606-297 = "― (และเมื่อกี้ ตอนที่นายท่าน...[wa:1710] "
1004606-299 = "― จับมือของอิซุนะ...)[wa:250] "
1004606-302 = "― (แล้วก็... ตรงอื่นที่นายท่านสัมผัส...[wa:420] "
1004606-304 = "― ไม่รู้ทำไม... จู่ๆ ก็รู้สึกร้อนๆ ขึ้นมา...)[wa:10] "
1004606-307 = "― คือว่า...นายท่านคะ เมื่อกี้นี้น่ะ คือว่า...[wa:3260] "
1004606-309 = "― ฉันแค่รู้สึกตกใจนิดหน่อยน่ะค่ะ...[wa:10] "
1004606-312 = "― วันนี้...[wa:20] "
1004606-314 = "― อิซุนะรู้สึกมีความสุขมากๆ เลยค่ะ![wa:1440] "
1004606-317 = "― เพราะงั้นแล้ว... คือว่า...[wa:110] "
1004606-319 = "― จะว่ายังไงดีล่ะคะ คือว่า...![wa:110] "
1004606-322 = "― ถ้านายท่านไม่ว่าอะไร ฉันจะขอรบกวนนายท่านอีก...[wa:2360] "
1004606-325 = "― เอาไว้คราวหน้า..."
1004606-327 = "― นายท่านช่วยสอนเรื่องการว่ายน้ำให้ฉันอีกได้มั้ยคะ?[wa:960] "
1004606-330 = "[ns] \"ถ้าอิซุนะต้องการ ครูสอนให้ได้ตลอดเลย\""
1004606-331 = "― ฮิฮิฮิ..."
1004606-333 = "― ค่ะ ขอบคุณค่ะ![wa:980] "
1004606-336 = "― หลังจากนี้..."
1004606-338 = "― ก็ขอรบกวนด้วยนะคะ! นายท่าน![wa:1800] "
1004606-341 = "(จากนั้นคุณครูกับอิซุนะก็พูดคุยถึงเรื่องที่เกิดขึ้นวันนี้กันอย่างมีความสุข)"
1004606-342 = "(ทั้งสองใช้เวลาเดินพูดคุยกันอย่างสบายๆ กลับไปที่พักในตอนที่พระอาทิตย์พ้นขอบฟ้าไป)"

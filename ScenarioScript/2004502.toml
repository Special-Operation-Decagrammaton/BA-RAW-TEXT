[translation]
2004502-1 = "Pina's Other Side"
2004502-2 = "I came to Hyakkiyako to meet Pina."
2004502-7 = "[ns] \"Hmm...is this the right road?\""
2004502-9 = "Thank you! I made it there thanks to you!"
2004502-10 = "Miss, I'm wondering where the fabric store is..."
2004502-12 = "[ns1] (\"A guide. Great!\")\n[ns2] \"Excuse me! I'm a little lost.\""
2004502-15 = "I can provide assistance! Where..."
2004502-20 = "Ah! Sensei!"
2004502-21 = "I'm Tour Guide Pina! Are you having a lovely day?"
2004502-22 = "[s3] \"Pina?!\"\n[s4] \"Tour guide?!\""
2004502-25 = "Exactly! That's right!"
2004502-26 = "The shopping district is so chaotic. It needed a guide and I...was available to help!"
2004502-30 = "I also give tours of the shopping district. One's about to depart. Do you want to tag along?"
2004502-31 = "[s] \"As long as you're okay with it, I'd love to.\""
2004502-32 = "Yes! Then let us embark! Everyone, please follow me!"
2004502-34 = "This historical overlook offers an unparalleled view of Hyakkiyako!"
2004502-35 = "You'll spot the Tree of Deities over there, the pride of Allied Hyakkiyako Academy. Come back for our annual ritual!"
2004502-36 = "Ooh... So cultured!"
2004502-37 = "Miss? May I take a photo of the scenery?"
2004502-38 = "Of course!"
2004502-45 = "This storied street hosts the iconic taste and charms of Hyakkiyako!"
2004502-46 = "If you're not sure what to order, just ask me!"
2004502-47 = "I'm always happy to help!"
2004502-48 = "Such lovely aromas!"
2004502-49 = "Oh dear, I don't know where to start...or sit!"
2004502-50 = "Oh! Then I recommend a delicious and portable chicken skewer!"
2004502-52 = "And behind me you'll be enraptured by the pride of Hyakki...yako..."
2004502-53 = "...Huh?"
2004502-57 = "Wha...?"
2004502-61 = "Oh! Um... I can't see it..."
2004502-62 = "[s] \"Pina? What's wrong?\""
2004502-63 = "He's gone! What do I..."
2004502-64 = "This is going to ruin the tour!"
2004502-65 = "[s] \"What? A movie set? Those get torn down...\""
2004502-66 = "No, that's not it..."
2004502-67 = "It's the puppy! He's supposed to be here!"
2004502-68 = "[s] \"...Puppy?\""
2004502-69 = "He's marvelous! He dresses like the hero dog from \"Shiba of the Wind\"! He naps here every day..."
2004502-70 = "He's a must-see Hyakkiyako attraction!"
2004502-71 = "[s6] \"He's...allowed to leave. He's a puppy.\"\n[s7] \"Maybe he went somewhere else today.\""
2004502-74 = "Right! He's free to move. I support autonomy..."
2004502-75 = "But he's so cute! Hold on, maybe I can grab him..."
2004502-76 = "Miss, why are we here?"
2004502-77 = "Excuse me? I can see puppies at home!"
2004502-82 = "(Ugh... O-Oh this looks bad...)"
2004502-83 = "(The puppy's ensemble is just so cute. He's a little gangster! I didn't mean anything by it!)"
2004502-84 = "[ns] \"No, uh! Over there! What are these cutouts for?\""
2004502-85 = "(Ah! Boss...!)"
2004502-86 = "Indeed! This is Hyakkiyako's movie village. It also...has a storied history..."
2004502-91 = "(Sensei... Thank you...!)"
2004502-93 = "Pina regained her composure and ended the tour on a high note."

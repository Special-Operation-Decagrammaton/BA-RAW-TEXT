[translation]
2004502-1 = "อีกด้านหนึ่งของพีน่า"
2004502-2 = "(คุณครูไปหาพีน่าที่เฮียกคิยาโค)"
2004502-7 = "[ns] \"ไม่ได้มานานจนจำทางไม่ได้แล้วแฮะ...\""
2004502-9 = "ขอบคุณนะครับ แบบนี้คงไม่หลงทางแล้วครับ"
2004502-10 = "ขอโทษนะครับ ร้านขายผ้าที่อยู่ในบทความนี้อยู่ตรงไหนเหรอครับ..."
2004502-12 = "[ns1] (มีไกด์แนะนำด้วยสินะ ไปถามทางดีกว่า)\n[ns2] \"เอ่อ... ขอถามทางหน่อย\""
2004502-15 = "ค่า!! ได้เลยค่ะ!! จะไปไหนคะ..."
2004502-20 = "อ๊ะ!! คุณครู!!"
2004502-21 = "สวัสดีค่ะ!! ฉันคือพีน่าคนใหม่ค่ะ!"
2004502-22 = "[s3] \"พีน่าเองหรอกเหรอ?!\"\n[s4] \"พีน่าคนใหม่งั้นเหรอ?!\""
2004502-25 = "ค่ะ! ใช่แล้วค่ะ!"
2004502-26 = "ย่านการค้าของเฮียกคิยาโคมาขอให้ฉันช่วยแนะนำพื้นที่ ฉันก็เลยมาเป็นไกด์ให้ค่ะ!"
2004502-30 = "ฉันต้องไปเป็นไกด์ในย่านการค้าพอดี งั้นคุณครูก็ไปด้วยกันสิคะ!"
2004502-31 = "[s] \"ถ้าพีน่าโอเค ครูก็ยินดีเลยละ\""
2004502-32 = "ค่า! ถ้างั้นก็ออกเดินทางกันเลยค่ะ! ทุกคนเดินตามมานะคะ!"
2004502-34 = "ที่นี่คือจุดชมวิวที่มองเห็นทัศนียภาพทั้งหมดของเฮียกคิยาโคค่ะ!"
2004502-35 = "ต้นไม้ศักดิ์สิทธิ์ที่เห็นอยู่ไกลๆ ต้นนั้นเป็นทั้งความภาคภูมิใจและสัญลักษณ์ของสหพันธ์เฮียกคิยาโค และทุกปีก็มีการจัดงานต้นไม้ศักดิ์สิทธิ์ด้วยค่ะ!"
2004502-36 = "ว้าว... สวยจัง"
2004502-37 = "อยากถ่ายรูปกับต้นไม้ศักดิ์สิทธิ์จากตรงนี้จัง ขอถ่ายรูปได้มั้ยครับคุณไกด์?"
2004502-38 = "ค่ะ! ได้สิคะ!"
2004502-45 = "ที่นี่คือถนนสายอาหารที่ชวนให้เพลิดเพลินไปกับรสชาติและเสน่ห์ของเฮียกคิยาโคค่ะ!"
2004502-46 = "ถ้ามีอาหารที่ไม่รู้จักก็ถามฉันได้เลยค่ะ!"
2004502-47 = "ไกด์คนนี้จะตอบให้ทุกอย่างเลย!"
2004502-48 = "แค่ได้กลิ่นอาหารก็น้ำลายสอแล้ว"
2004502-49 = "ควรกินอะไรก่อนดีนะ?"
2004502-50 = "ค่ะ! ถ้าตัดสินใจไม่ได้ละก็ ฉันขอแนะนำร้านยากิโทริร้านนี้..."
2004502-52 = "ต่อไปก็เป็นความภาคภูมิใจของเฮียกคิยาโคเหมือนกันค่ะ..."
2004502-53 = "เอ๋...?"
2004502-57 = "?"
2004502-61 = "อะ... อะไรกัน... ทำไมถึงไม่อยู่ตรงนี้ล่ะ..."
2004502-62 = "[s] \"พีน่า? กำลังหาอะไรอยู่เหรอ?\""
2004502-63 = "หายไปอย่างไร้ร่องรอยเลยค่ะ!! จะทำยังไงดีล่ะ..."
2004502-64 = "มันไม่ควรจะเป็นอย่างนี้สิ!!"
2004502-65 = "[s] \"สตูดิโอภาพยนตร์อาจถูกรื้อไปเพราะถ่ายทำเสร็จแล้วก็ได้นะ...\""
2004502-66 = "ไม่ใช่เรื่องนั้นหรอกค่ะ..."
2004502-67 = "คุณหมาน้อยที่อยู่ตรงนี้ทุกวัน วันนี้ไม่อยู่แล้วค่ะ!!"
2004502-68 = "[s] \"คุณ... หมาน้อย?\""
2004502-69 = "ปกติคุณหมาน้อยที่ใส่ชุด <ชิบะ> เหมือนพระเอกในเรื่อง <ชิบะแห่งสายลม> จะมานอนกลางวันตรงนี้#nทุกวันค่ะ..."
2004502-70 = "เขาเป็นคนดังที่นักท่องเที่ยวที่มาเฮียกคิยาโคต้องได้เห็นนะคะ!"
2004502-71 = "[s6] \"หรือว่าคุณหมาน้อยจะไปนอนกลางวันที่อื่น?\"\n[s7] \"หรือว่าคุณหมาน้อยจะเดินไปเที่ยวเล่นที่อื่น?\""
2004502-74 = "อ๊ะ!! นั่นสินะคะ ฉันลืมไปเลยว่าคุณหมาน้อยเดินไปไหนมาไหนได้..."
2004502-75 = "พอฉันเห็นว่ามานอนกลางวันทุกวัน ก็ลืมเรื่องนี้ไปเลยค่ะ!!"
2004502-76 = "คุณไกด์ครับ ที่นี่มีอะไรให้ชมเหรอครับ?"
2004502-77 = "เราอยู่ตรงนี้กันมาสักพักแล้วนะครับ"
2004502-82 = "(อ๊าา... หะ... ห้ามตื่นตระหนกเด็ดขาด...)"
2004502-83 = "(พอเกิดเหตุการณ์ที่ไม่คาดคิด สมองก็หยุดทำงานไปดื้อๆ เลย...)"
2004502-84 = "[ns] \"สแตนดี้ตรงนี้คืออะไรเหรอ?\""
2004502-85 = "(อ๊ะ! บอสมาช่วยชีวิต...!)"
2004502-86 = "ค่ะ! ที่นี่คือหมู่บ้านสตูดิโอภาพยนตร์ของเฮียกคิยาโคค่ะ ถ้าเราย้อนกลับไปดูประวัติศาสตร์..."
2004502-91 = "(คุณครู... ขอบคุณนะคะ...!)"
2004502-93 = "(แล้วพีน่าก็กลับมามีสติและทำหน้าที่ไกด์ในการทัวร์เฮียกคิยาโคได้เป็นอย่างดี)"

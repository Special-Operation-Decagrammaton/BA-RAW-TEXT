[translation]
2004502-1 = "菲娜的兩種面貌"
2004502-2 = "（為了找菲娜而來到百鬼夜行）"
2004502-7 = "[ns]「很久沒來這裡，有點認不太得路……」"
2004502-9 = "謝謝，多虧有你才沒有迷路。"
2004502-10 = "不好意思，請問這裡寫的布料店在哪裡……"
2004502-12 = "[ns1]（有導覽員呢）\n[ns2]「那個……我想問一下路。」"
2004502-15 = "好的！沒問題！！#n請問……"
2004502-20 = "啊！老師！！"
2004502-21 = "最近過得好嗎！#n重新蛻變的菲娜，在此拜見老師！"
2004502-22 = "[s3]「菲娜！？」\n[s4]「重新蛻變的菲娜！？」"
2004502-25 = "嗯！沒錯！"
2004502-26 = "我受到百鬼夜行商店街的臨時委託，目前正負責擔任導覽員！"
2004502-30 = "現在剛好在帶隊導覽商店街，老師要不要也一起呢！"
2004502-31 = "[s]「如果菲娜不介意的話，我當然沒問題。」"
2004502-32 = "好！那我們就出發囉！請大家跟好！"
2004502-34 = "這裡是能將百鬼夜行盡收眼底的瞭望台！"
2004502-35 = "各位在遠處看見的神木，是我們百鬼夜行聯合學園的驕傲與象徵！#n我們每年都會舉辦神木祭哦！"
2004502-36 = "哦哦……真壯觀。"
2004502-37 = "導覽員同學，我想用這裡當背景拍張照片，可以嗎？"
2004502-38 = "好的！沒問題！"
2004502-45 = "這裡是能盡情沉浸在百鬼夜行的美味和魅力之中的美食街！"
2004502-46 = "如果有不認識的食物，請儘管發問！"
2004502-47 = "導覽員我一定知無不言！"
2004502-48 = "光聞香味就快受不了了呢。"
2004502-49 = "不知道該從哪裡逛起。"
2004502-50 = "不必擔心！這種時候，通常推薦先從這邊的雞肉串燒店……"
2004502-52 = "接下來的這個地方也是我們百鬼夜行的驕傲……"
2004502-53 = "……咦？"
2004502-57 = "？"
2004502-61 = "怎，怎麼會……咦咦……不見了……"
2004502-62 = "[s]「菲娜？你在找什麼嗎？」"
2004502-63 = "居然不見了！！#n這下該怎麼辦……"
2004502-64 = "怎麼可能會這樣！！"
2004502-65 = "[s]「如果是電影佈景的話，應該是拍完之後拆掉了吧……」"
2004502-66 = "不是的……"
2004502-67 = "是每天都在這裡的狗狗不見了！！"
2004502-68 = "[s]「狗狗……？」"
2004502-69 = "有一隻穿著《浪客柴藏》主角「柴藏」服裝的狗狗，每天都會在這裡午睡……"
2004502-70 = "牠可是遊客們來百鬼夜行必看的名勝中的名勝啊！"
2004502-71 = "[s6]「畢竟狗狗不是設施或物品嘛……」\n[s7]「牠會不會只是跑去其他地方而已？」"
2004502-74 = "啊啊！說得也是，狗狗的確有可能跑到其他地方去……"
2004502-75 = "因為牠每次都在白天睡覺的關係，所以我就疏忽了！！"
2004502-76 = "導覽員同學，這裡是做什麼的地方啊？"
2004502-77 = "我們從剛才就一直在等耶。"
2004502-82 = "（不，不行……現在不能慌啊……）"
2004502-83 = "（因為遇到突發狀況，腦袋突然變得一片空白……）"
2004502-84 = "[ns]「能說明一下這個等身大立牌跟什麼有關嗎？」"
2004502-85 = "（啊！頭兒……！）"
2004502-86 = "好的！這裡是百鬼夜行的電影村，要追溯其歷史的話……"
2004502-91 = "（老師……真是太感謝了……！）"
2004502-93 = "（於是菲娜恢復了從容，圓滿結束了導覽行程）"

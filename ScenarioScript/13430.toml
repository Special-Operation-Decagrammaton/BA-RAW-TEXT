[translation]
13430-1 = "ตอนที่ 43;บทส่งท้าย 2"
13430-3 = "ขอบคุณค่ะ คราวหน้าไว้มาใหม่นะคะ~! "
13430-9 = "ค่ะ 2 ท่านนี้เชิญนั่งทางนี้เลยค่ะ!"
13430-10 = "อ๊ะ เชิญค่ะ ตอนนี้ต้องต่อคิวนะคะ น่าจะราวๆ 30 นาทีค่ะ รบกวนเขียนชื่อไว้ตรงนี้นะคะ "
13430-11 = "เซริกะ มาช่วยเก็บโต๊ะทางนี้หน่อยสิ"
13430-12 = "ค่า~ ไปเดี๋ยวนี้ละค่ะ"
13430-17 = "[ns] \"งานยุ่งจังเลยนะ เซริกะ\""
13430-18 = "อื้อ ดูเหมือนจะเริ่มมีผู้คนมากขึ้นเลยนะ"
13430-19 = "นั่นสินะคะ รู้สึกเหมือนมีร้านค้าที่ไม่เคยเห็นในตัวเมืองเยอะขึ้นด้วย..."
13430-20 = "อื้อ นี่ถือเป็นเรื่องราวดีๆ สำหรับพวกเรานะคะ!"
13430-25 = "แต่ยิ่งมากคนก็ยิ่งมากความนะ ฮ้าวว แบบนี้ฉันก็นอนหลับได้น้อยลงน่ะสิ"
13430-26 = "แต่ก็เอาเถอะ แค่นี้ฉันยังหยวนๆ ให้ได้อยู่"
13430-27 = "ขโมย!!"
13430-32 = "หน็อย หลบไปนะ! หลบไป!!"
13430-36 = "ฉันเพิ่งได้ค่าจ้างก่อสร้างมานะ ขโมยกระเป๋าสตางค์ของฉันไปได้ไง! หัวขโมย!!"
13430-38 = "ฉันไปให้เอง! "
13430-43 = "อ๊ะ รุ่นพี่ชิโรโกะ! รีบกลับมาก่อนราเม็งจะเย็นหมดนะ!"
13430-44 = "ชิโรโกะจัง...!"
13430-45 = "ไม่เป็นไรหรอก ไม่เป็นไร เดี๋ยวนี้ชิโรโกะจังวิ่งเร็วกว่าเดิมเยอะ แป๊บเดียวก็คงจับขโมยได้แล้วละ"
13430-49 = "[ns] \"...\""
13430-50 = "คุณครู...? มีอะไรเหรอคะ?"
13430-51 = "[s] \"ครูก็จะตามไปอีกคน\""
13430-52 = "คะ?"
13430-54 = "แฮ่กๆ... คงตามมาไม่ทันแล้วละ..."
13430-61 = "..."
13430-68 = "[ns] \"ชิโรโกะ!!\""
13430-69 = "คุณครู...? "
13430-70 = "โดนจับได้งั้นเหรอ..."
13430-72 = "... "
13430-75 = "อืม... ฉันจะเอากระเป๋าสตางค์ไปคืนเจ้าของแล้วกลับมานะ"
13430-76 = "ฉันไม่หนีหรอก เธออ่านการเคลื่อนไหวของฉันได้นี่นา"
13430-77 = "มันเป็นเรื่องที่แน่นอนอยู่แล้ว ก็เธอคือฉันยังไงล่ะ"
13430-78 = "อื้อ... ฉันขอตัวก่อนนะ คุณครู"
13430-79 = "[s] \"อื้อ ชิโรโกะ ครูจะอยู่คุยกับชิโรโกะคนนี้ให้เอง\""
13430-85 = "(ขยุกขยิก)"
13430-90 = "ได้เจอกันอีกแล้วนะ... คุณครู"
13430-91 = "[s] \"ที่ผ่านมาก็อยู่ในเขตปกครองตนเองอะบิดอสเหรอ?\""
13430-92 = "อื้อ... ก็ฉันรู้จักแค่ที่นี่เท่านั้น"
13430-93 = "อยากรู้ว่าฉันหลบไปอยู่ที่ไหนใช่มั้ยล่ะ... ฉันไปอยู่ตามบ้านร้างๆ ในอะบิดอสน่ะ"
13430-94 = "ในอะบิดอสมีบ้านร้างที่มีทั้งไฟฟ้าและน้ำประปามากกว่าที่คิดอีกนะ "
13430-95 = "[s] \"งั้นสินะ แล้วเรื่องสุขภาพกับอาหารล่ะ? ลำบากตรงไหนบ้างหรือเปล่า?\""
13430-96 = "ฉันฝึกพละกำลังทุกวัน เก็บสิ่งของที่ใช้ไม่ได้มาประกอบเป็นนู่นนี่แล้วเอาไปขาย แล้วบางครั้งก็ทำงาน#nรักษาความสงบอย่างที่เห็นวันนี้ด้วย..."
13430-97 = "ฉันชินกับการอยู่คนเดียวมานานแล้วน่ะ... คุณครู"
13430-109 = "[ns1] \"ไปกินราเม็งตรงโน้นด้วยกันมั้ย?\"\n[ns2] \"ทุกคนเป็นห่วงชิโรโกะอยู่นะ ไปหาทุกคนมั้ย?\""
13430-115 = "ไม่ดีกว่า... ไม่เป็นไรหรอก"
13430-116 = "ฉันไม่รู้จะทำหน้ายังไงเมื่อได้เจอกับทุกคนน่ะ..."
13430-117 = "[s] \"งั้นเอาไว้ค่อยไปเจอคราวหน้าก็ได้\""
13430-118 = "..."
13430-119 = "คุณครูไม่สงสัยเหรอ? "
13430-120 = "[s] \"เรื่องอะไรเหรอ?\""
13430-121 = "ที่ผ่านมาเกิดเรื่องอะไรกับฉัน แล้วก็มีเหตุการณ์อะไรเกิดขึ้นบ้าง"
13430-122 = "ทำไมไม่ถามเรื่องนี้เลยล่ะ คุณครู?"
13430-123 = "[s] \"ครูพอรู้อยู่บ้างแล้วละ ต่อให้เค้นถามให้มากขึ้นก็คงไม่มีประโยชน์หรอก\""
13430-124 = "งั้นเหรอ..."
13430-125 = "[s] \"และถ้าถามไปอย่างนั้นก็จะเป็นการรบกวนชิโรโกะด้วยนี่?\""
13430-129 = "นั่นสินะ... "
13430-130 = "แต่ฉันก็มีเรื่องที่รู้มาบ้างน่ะ คุณครู"
13430-131 = "ฉันพอรู้ว่าทำไมรุ่นพี่โฮชิโนะถึงกลับมาเป็นเหมือนเดิมได้ทั้งๆ ที่ตัวเองกลับตาลปัตรไปขนาดนั้นแล้ว"
13430-132 = "[s] \"...\""
13430-133 = "แม้ว่าตอนแรกรุ่นพี่จะอยู่ในสภาวะไม่สมบูรณ์ซึ่งต่างกับของฉัน และได้เปลี่ยนแปลงสภาวะผ่านสิ่งอื่นที่#nไม่ใช่ <สีสัน>..."
13430-134 = "แต่สุดท้ายแล้ว รุ่นพี่ก็ละทิ้งสิ่งที่เคยเป็นแก่นสารของตัวเองไปส่วนหนึ่ง และนั่นก็..."
13430-135 = "คงทำให้รุ่นพี่ก้าวไปข้างหน้าได้น่ะ"
13430-138 = "คนที่กลับตาลปัตรด้วยฤทธิ์ของสีสันน่ะ... ไม่มีวิธีไหนในโลกนี้ที่จะทำให้กลับมาเป็นดังเดิมได้หรอก"
13430-139 = "มันเป็นกฎของโลก ไม่ต่างกับที่เราไม่สามารถฟื้นคืนชีพคนตายได้"
13430-140 = "แต่ว่า... หากต้องการช่วยใครสักคนละก็... ตามหาข้าให้เจอสิ ครู"
13430-143 = "[ns] \"แต่ครูฟื้นคืนชีพคนที่ตายไปแล้วไม่ได้หรอกนะ\""
13430-149 = "[ns3] \"ครูจะหยุดตามหาคุซึโนฮะ แล้วช่วยชิโรโกะที่ต้องการความช่วยเหลือแทน\"\n[ns4] \"ครูจะหยุดตามหาคุซึโนฮะ แล้วยื่นมือออกไปหาชิโรโกะที่อยู่ตรงหน้าครูแทน\""
13430-153 = "ถ้าฉันอยู่ที่นี่ จะเกิดปัญหาใหญ่หลวงแน่นอน คุณครู เพราะโลกหนึ่งใบ จะมีชิโรโกะได้แค่คนเดียวเท่านั้น..."
13430-154 = "[s] \"ไม่หรอก ต่อให้เกิดปัญหา... ครูก็จะหาทางแก้ไขเอง\""
13430-158 = "ฮุ..."
13430-159 = "[s] \"ชิโรโกะยิ้มออกแล้วเหรอ?\""
13430-160 = "เป็นเรื่องราวที่ฉันได้ยินบ่อยๆ น่ะ"
13430-161 = "อื้อ เพราะสถานที่แห่งนี้... คือที่ที่[ruby=ผู้ใหญ่]คุณครู[/ruby]ปกป้องอยู่นี่เนอะ"
13430-165 = "ฉันไม่รู้สึกว่าเพลนาพาเทสกับคุณครูเป็นคนละคนกันเลย"
13430-166 = "แต่มันแน่นอนอยู่แล้ว เหมือนที่ฉันคนนี้คือชิโรโกะน่ะ"
13430-167 = "[s] \"ใช่ ครูเป็นครูอยู่เสมอนะ\""
13430-168 = "อื้อ นั่นสินะ คุณครูมักจะเลือกทำอย่างเดียวกันในสถานการณ์เดียวกัน... และก็เป็นแบบนั้นมาตลอด"
13430-172 = "[ns] \"ชิโรโกะ รับนี่ไปสิ\""
13430-179 = "นี่มัน... โทรศัพท์มือถือเหรอ...?"
13430-180 = "ไม่ได้ใช้มานานแล้วเลย..."
13430-181 = "[s] \"ช่วยอยู่ในที่ที่ครูเอื้อมมือไปถึงทีนะ ชิโรโกะ\""
13430-185 = "อืม... ขอบใจนะ"
13430-186 = "ทุกคนคงเริ่มเป็นห่วงคุณครูแล้วละ งั้นฉันไปก่อนดีกว่า "
13430-187 = "แล้วฉันจะติดต่อไป..."
13430-196 = "[ns] \"ชิโรโกะ!\""
13430-198 = "[ns] \"จะว่าไป วันนี้เธอก็มีบางอย่างเปลี่ยนไปนะ\""
13430-199 = "...?"
13430-200 = "[s5] \"ครูยืนยันได้ว่าเธอก็มีบางอย่างที่เปลี่ยนแปลงไปเหมือนกัน!\"\n[s6] \"ครูรับรู้ได้ และชิโรโกะก็ควรก้าวไปข้างหน้าถูกแล้วละ!\""
13430-206 = "อื้อ... ฉันก็รู้อยู่"
13430-209 = "ทั้งความเจ็บปวดนี้และความสุขพวกนั้น ทั้งหมดเป็นส่วนหนึ่งของชีวิตของฉัน"
13430-210 = "เพราะงั้นแล้ว บางที..."
13430-213 = "เพราะงั้นแล้ว บางที... ฉันเองก็อาจจะไม่เป็นไรก็ได้"
13430-219 = "(ซ่า) ยืนยันเป้าหมาย! เราเข้ามาใกล้จนเห็นเป้าหมายได้ในระยะสายตาแล้วค่ะ!"
13430-220 = "ไม่ต้องอธิบายขนาดนั้นก็รู้อยู่หรอกน่า ก็เห็นๆ กันอยู่กับตานี่นา อายาเนะจัง"
13430-227 = "เมื่อก่อนเราเคยสู้กันครั้งหนึ่งใช่มั้ยคะ? ถึงจะอยู่กลางทะเลทรายก็เถอะ~"
13430-228 = "(ซ่า) ใช่ค่ะ แต่ก็แตกต่างกันเล็กน้อยค่ะ ตอนนั้นเป็นเพราะสีสัน..."
13430-229 = "พอแล้ว! ไม่ต้องอธิบายแล้วละ! สรุปแค่ว่า ถ้าเราปล่อยสิ่งนั้นไว้อย่างนั้น เขตตัวเมืองอะบิดอสก็ต้อง#nเละเทะไม่ใช่หรือไง!"
13430-230 = "อื้อ งั้นเราต้องจัดการเดี๋ยวนี้เลย"
13430-231 = "(ซ่า) อ้อมเข้าไปทางด้านข้างเลยค่ะ! ฉันจะยิงคุ้มกันให้เอง ทุกคนเข้าไปกันให้ดีๆ นะคะ!"
13430-232 = "เข้าใจแล้ว"
13430-233 = "จู่โจมให้ไวเลยค่ะ~♧"
13430-234 = "หวาาา! ว่าแต่ รุ่นพี่โฮชิโนะไปไหนเหรอ?!"

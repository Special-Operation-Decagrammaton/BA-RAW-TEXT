13430-1 = "Episode 43;Epilogue 2"
13430-3 = "Thank you, come again! "
13430-9 = "Yes, party of two? This way, please!"
13430-10 = "Welcome! We have a new wait list, if you don't mind putting down your name. The wait should be around thirty minutes! "

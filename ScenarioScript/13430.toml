13430-18 = "Yeah. The streets have been more crowded lately."
13430-19 = "They really have been. Did you see all the new stores that opened up downtown?"
13430-20 = "Yup, yup! Things are really looking up for us!"
13430-25 = "*yawn* More people, more problems. It's been cutting into my nap time."
13430-26 = "It's been manageable so far, though."
13430-27 = "THIEF!!"
13430-32 = "Outta my way!"
13430-36 = "The construction funds are in that wallet! Thief!!"
13430-38 = "I'm on it! "

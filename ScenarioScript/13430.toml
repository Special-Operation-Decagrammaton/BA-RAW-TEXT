13430-44 = "Shiroko!"
13430-45 = "It's fine, it's fine. Shiroko's gotten so fast, it'll be over in the blink of an eye."
13430-49 = "[ns] \"...\""
13430-50 = "...Sensei? What's wrong?"
13430-51 = "[s] \"...I'll go too.\""
13430-52 = "Huh?"
13430-54 = "Heehee... I think I lost—"
13430-61 = "..."
13430-68 = "[ns] \"Shiroko!\""
13430-69 = "Sensei...? "
13430-70 = "...I've been caught."
13430-72 = "... "
13430-75 = "Um... I'll go return the wallet..."
13430-76 = "I won't run away. Since you can predict my every movement."
13430-77 = "A given, I suppose. You are me, after all."
13430-78 = "...Then, Sensei."
13430-79 = "[s] \"Thanks, Shiroko. I'll talk to other-Shiroko for a bit.\""
13430-85 = "(...)"
13430-90 = "It's been...not too long, Sensei."
13430-91 = "[s] \"Have you been in Abydos this whole time?\""
13430-92 = "Yeah. It's all I know, really."
13430-93 = "I've been staying in empty houses here and there, throughout the district."
13430-94 = "Quite a few places have water and electricity. "
13430-95 = "[s] \"I see. Have you been staying healthy? Eating? Any problems?\""
13430-96 = "I work out daily, gather scraps to assemble and sell, and occasionally take on vigilante tasks like this..."
13430-97 = "I'm well-accustomed to being alone, Sensei."
13430-109 = "[ns1] \"Would you like to share a bowl of ramen with us?\"\n[ns2] \"Everyone would love to see if you've been well, Shiroko.\""
13430-115 = "...No. I'm okay."
13430-116 = "I don't know...how to react to seeing them..."
13430-117 = "[s] \"Next time, then. I'll be with you.\""
13430-118 = "..."
13430-119 = "Are you not curious? "
13430-120 = "[s] \"About what?\""
13430-121 = "About what happened to me, the events of my world..."
13430-122 = "Why don't you ask about them, Sensei?"
13430-123 = "[s] \"Is there more I need to know?\""
13430-124 = "...I see."
13430-125 = "[s] \"I don't want to bully you with an interrogation.\""
13430-129 = "...Yes."
13430-130 = "I've learned something of importance, though."
13430-131 = "I discovered how it was that Hoshino was able to return to normal."
13430-132 = "[s] \"...\""
13430-133 = "Unlike me, she was in an incomplete state, and it wasn't the Chroma that transformed her."
13430-134 = "And in the end, she had to give up a part of who she was, a part of her nature..."
13430-135 = "That is how she could move forward."
13430-138 = "There's no way to restore an existence transformed by the Chroma to its original state."
13430-139 = "It's a natural rule of this world, just as how the dead cannot be brought back to life."
13430-140 = "But...if you still want to rescue someone... ...Come see me, Sensei."
13430-143 = "[ns] \"I can't bring people back from the dead.\""
13430-149 = "[ns3] \"So I'll stop chasing after Kuzunoha.\"\n[ns4] \"I'll offer help to the student who's right in front of me, instead.\""
13430-153 = "My very existence here is a disruption, Sensei. There can only be one Shiroko in this world."
13430-154 = "[s] \"It doesn't matter. If something goes wrong... I'll figure it out.\""
13430-158 = "...Hah."
13430-159 = "[s] \"Did you just...laugh?\""
13430-160 = "I've heard that one before."
13430-161 = "Yes... This world is protected by Sensei, an adult."
13430-165 = "To me, Phrenapates and Sensei feel like one and the same."
13430-166 = "I suppose that's natural. Like how Shiroko is me."
13430-167 = "[s] \"Yeah. I'll always be me.\""
13430-168 = "Yes. That's correct. You've always been reliable...always making the same choice, in the same situation..."
13430-172 = "[ns] \"Shiroko. Please take this.\""
13430-179 = "...A smartphone...?"
13430-180 = "...It's been a while. "
13430-181 = "[s] \"So don't go off somewhere that phone won't work, okay?\""
13430-185 = "...Yes. Thank you."
13430-186 = "They're likely already worrying, so I'll be on my way, Sensei. "
13430-187 = "...I'll be in touch."
13430-196 = "[ns] \"Shiroko!\""
13430-198 = "[ns] \"You've changed too, you know.\""
13430-199 = "...?"
13430-200 = "[s5] \"I can see them! The parts of you that've changed!\"\n[s6] \"It might be small, but you've moved forward too!\""
13430-206 = "...Yes. I'm aware as well."
13430-209 = "This pain, and this happiness, they're all parts of my life now."
13430-210 = "So, probably..."
13430-213 = "Probably... I'll be fine as well. "
13430-219 = "*tchhhk* Target confirmed! We finally have visuals on the target!"
13430-220 = "I can tell that much for myself, Ayane!"
13430-227 = "We've fought it before, right? Although that was in the middle of the desert!"
13430-228 = "*tchhhk* It's similar, but back then, the Chroma—"
13430-229 = "We really don't need an in-depth analysis right now! It's straightforward! That thing's gonna mess up all of Abydos' urban area if we don't do something!"
13430-230 = "Yeah. We'll neutralize it immediately."
13430-231 = "*tchhhk* The plan is to flank it from the side! I'll cover you, so please charge in!"
13430-232 = "Got it!"
13430-233 = "Full frontal assault! ♧"
13430-234 = "Woaaah! Also, where the heck is Hoshino?!"
13430-235 = "*tchhhk* Huh? Hoshino is—"
13430-236 = "*tchhhk* This old-timer's already in position."
13430-237 = "Huh? Since when?!"
13430-238 = "Right in front! These old bones aren't gonna last too long. Hurry!"
13430-239 = "Yeah. On our way."

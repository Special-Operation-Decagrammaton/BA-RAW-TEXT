13430-237 = "ว่าไงนะ?! ไปถึงตั้งแต่ตอนไหนน่ะ?"
13430-238 = "ตอนนี้ลุงอยู่ข้างหน้าเจ้านี่เลย มาเร็วๆ ล่ะ~ ลุงคนนี้แก่แล้ว ทนอยู่ได้ไม่นานหรอกน้า~"
13430-239 = "อื้อ ฉันจะรีบไปเลย"
13430-242 = "รุ่นพี่โฮชิโนะ! รอนานมั้ย?"
13430-243 = "อ๊ะ?!"
13430-246 = "ไม่ทันแล้วละ"
13430-248 = "...!!"
13430-249 = "คุณ... "
13430-250 = "ว้าว รุ่นพี่ชิโรโกะอีกคนมาช่วยพวกเราเหรอ?"
13430-251 = "อื้อ แต่ฉันจะช่วยแค่ครั้งนี้ครั้งเดียวนะ"
13430-252 = "เอาละ ตอนนี้มาสนใจการต่อสู้กันก่อน ฉันจะรีบจัดการให้ไวเลย"
13430-253 = "อื้อ งั้นใช้การบุกรูปแบบ B"
13430-259 = "เดี๋ยวนะ เราไม่เคยตกลงกันเรื่องรูปแบบอะไรนั่นไม่ใช่เหรอ...?"
13430-260 = "อื้อ! ฉันพร้อมแล้วค่ะ~♧"
13430-261 = "ไม่มีเวลามาเล่นกันแล้วค่ะ! บีนาห์รับรู้ว่าพวกเรามาแล้วนะคะ!"
13430-262 = "ทำไมคำพูดกับการกระทำมันสวนทางกันล่ะ อายาเนะจัง..."
13430-266 = "อะ... อืม..."
13430-267 = "ทำท่าลุกลี้ลุกลนเหมือนน้องหมาขี้กังวลอยู่ตั้งแต่เมื่อกี้แล้วนะ รุ่นพี่ชิโรโกะ..."

[translation]
13430-1 = "第43話;尾聲（２）"
13430-3 = "感謝惠顧，歡迎下次再來～！"
13430-9 = "好的，後面兩位這邊請！"
13430-10 = "啊，歡迎光臨。#n現在要等大約三十分鐘左右，麻煩先在這裡留下您的大名。"
13430-11 = "茜香同學，這邊可以順便幫我收一下嗎？"
13430-12 = "好～我馬上過去！"
13430-17 = "[ns]「真忙碌呢，茜香。」"
13430-18 = "嗯，最近人越來越多了。"
13430-19 = "就是說啊，感覺市區越來越多沒看過的店家了……"
13430-20 = "嗯，這對我們來說也是件好事！"
13430-25 = "不過隨著人潮變多，麻煩事也跟著增加了呢。#n呼啊～害我少睡了好多……"
13430-26 = "不過目前還算是在可接受的範圍內啦。"
13430-27 = "有小偷！！"
13430-32 = "可惡，讓開！讓開──！！"
13430-36 = "我的皮夾裡裝著工程款啊……！有小偷！！"
13430-38 = "我去去就回！"
13430-43 = "啊，白子前輩！記得要在拉麵冷掉之前回來喔！"
13430-44 = "白子醬……！"
13430-45 = "沒關係沒關係～#n最近白子醬的速度變得越來越快，那種小偷肯定三兩下就逮到了。"
13430-49 = "[ns]「…………」"
13430-50 = "……老師？怎麼了嗎？"
13430-51 = "[s]「……我也跟去看看。」"
13430-52 = "嗯？"
13430-54 = "呼……跑了這麼遠應該……"
13430-61 = "……"
13430-68 = "[ns]「白子！！」"
13430-69 = "老師……？"
13430-70 = "……被發現了嗎？"
13430-72 = "……"
13430-75 = "……嗯，我去把錢包還給主人。"
13430-76 = "我不會逃跑的。#n反正我的一舉一動都會被你看穿。"
13430-77 = "這也不奇怪，畢竟你就是我。"
13430-78 = "……嗯，老師。#n那我就先……"
13430-79 = "[s]「嗯，白子。我跟他聊一下就過去。」"
13430-85 = "（搖搖晃晃）"
13430-90 = "好久不見……不對，老師好。"
13430-91 = "[s]「你這段期間一直待在阿拜多斯自治區嗎？」"
13430-92 = "嗯……畢竟我只對這裡比較熟。"
13430-93 = "我知道你想問我住在哪裡……我平時都住在阿拜多斯的空房子裡。"
13430-94 = "只要仔細找找，其實不少房子都還是有水有電的。"
13430-95 = "[s]「這樣啊。身體還好嗎？有按時吃飯嗎？有沒有遇到什麼麻煩？」"
13430-96 = "我每天都會鍛鍊體力，沒事的時候會去撿一些別人不要的廢棄物，#n重新組裝成各式各樣的物品拿去賣，然後偶爾也會像這樣當自衛隊……"
13430-97 = "……我很久以前就習慣一個人生活了，老師。"
13430-109 = "[ns1]「要不要來跟我們一起吃碗拉麵？」\n[ns2]「大家都很關心你哦，白子。」"
13430-115 = "……不用了，沒關係。"
13430-116 = "我還不知道該用什麼表情面對他們……"
13430-117 = "[s]「那下次有機會的話，我們再一起聚聚吧。」"
13430-118 = "……"
13430-119 = "你都不好奇嗎？"
13430-120 = "[s]「好奇什麼？」"
13430-121 = "好奇我發生了什麼……或者我做了什麼事。"
13430-122 = "為什麼都不問這些呢，老師？"
13430-123 = "[s]「想知道的我都已經知道了。再追問下去的意義也不大吧？」"
13430-124 = "……是嗎。"
13430-125 = "[s]「而且如果問那些事的話，會讓白子難受的。」"
13430-129 = "……好像也是。"
13430-130 = "不過我總算稍微明白了，老師。"
13430-131 = "為什麼星野前輩的本質明明已經反轉，卻還是可以恢復原來的狀態。"
13430-132 = "[s]「……」"
13430-133 = "前輩和我不同，從一開始就是不完整的狀態。#n雖然他並不是因「色彩」而反轉……"
13430-134 = "但我想前輩他，肯定是拋棄了曾是自身本質的一部分自我。所以……"
13430-135 = "……他才能夠繼續向前邁進。"
13430-138 = "讓因色彩而反轉之人恢復原狀的方法，並不存在。"
13430-139 = "那就和──無法讓死者重生一樣。#n是這個世界絕對的法則。"
13430-140 = "但即便如此……如果你還是有想要拯救的對象──就來見妾身吧。"
13430-143 = "[ns]「我沒辦法讓死者復活。」"
13430-149 = "[ns3]「所以才會放棄去找葛葉……」\n[ns4]「選擇向我面前需要幫助的你伸出援手。」"
13430-153 = "可是我如果繼續待在這裡，肯定會造成更大的問題，老師。#n因為一個世界只能有一個白子……"
13430-154 = "[s]「不，就算以後發生了什麼問題……我也會想辦法解決的。」"
13430-158 = "……呵。"
13430-159 = "[s]「白子……你剛才笑了嗎？」"
13430-160 = "這句話我還真常聽到呢。"
13430-161 = "嗯，畢竟這裡……是[ruby=大人]老師[/ruby]守護的地方。"
13430-165 = "我不覺得[ruby=Phrenapates]誘騙者[/ruby]和老師是不同的人。"
13430-166 = "不，這也不用我多說吧。#n就像白子跟我也是同一個人一樣。"
13430-167 = "[s]「沒錯，我永遠都是我。」"
13430-168 = "嗯。面對相同的狀況就會做出相同的選擇……老師一直都是這樣。"
13430-172 = "[ns]「白子，這個你收下吧。」"
13430-179 = "這不是智慧型手機嗎……？"
13430-180 = "……好久沒有見到這東西了。"
13430-181 = "[s]「記得要一直待在我觸手可及的地方哦，白子。」"
13430-185 = "……嗯，謝謝你。"
13430-186 = "我該走了，大家差不多該開始擔心你了，老師。"
13430-187 = "……再聯絡。"
13430-196 = "[ns]「白子！」"
13430-198 = "[ns]「這麼說來，你好像也有點變了。」"
13430-199 = "……？"
13430-200 = "[s5]「我敢保證，某部分的你一定也發生了一些變化！」\n[s6]「就算改變不多，但我很確定你也正在向前邁進哦！」"
13430-206 = "……嗯，我知道。"
13430-209 = "無論那是痛苦還是幸福，全都是我人生中的一部分。"
13430-210 = "所以我想……"
13430-213 = "所以我想……一定沒問題的。"
13430-219 = "（滋滋）確認目標！對方已接近至肉眼可見的距離！"
13430-220 = "不是，不用你說也已經看見了啦，綾音醬。"
13430-227 = "之前有交手過一次吧？雖然上次是在沙漠的正中央～"
13430-228 = "（滋滋）是的，不過情況有點不一樣，上次是因為色彩……"
13430-229 = "說明就不用了！#n總之如果放著那東西不管，阿拜多斯的市區肯定會變得一團亂！"
13430-230 = "嗯，立刻制服它。"
13430-231 = "（滋滋）我從側面繞過去！掩護就交給我，你們儘管往前衝吧！"
13430-232 = "我知道了。"
13430-233 = "快速突襲作戰～♧"
13430-234 = "哇啊啊啊──！不過星野前輩去哪裡了啊！？"
13430-235 = "（滋滋）嗯？星野前輩……"
13430-236 = "（滋滋）大叔我早就已經到囉。"
13430-237 = "咦！？你什麼時候到的？"
13430-238 = "我在這傢伙的正前方哦。#n大家快點過來～大叔我年紀大了撐不了多久呀～"
13430-239 = "嗯，我們會盡快抵達。"
13430-242 = "星野前輩！你等很久了吧？"
13430-243 = "啊！？"
13430-246 = "來的真晚。"
13430-248 = "……！！"
13430-249 = "你是……"
13430-250 = "哇，另一個白子前輩是來幫我們的嗎？"
13430-251 = "嗯，但我只會幫你們這一次。"
13430-252 = "好了，大家專心戰鬥吧。我們要速戰速決。"
13430-253 = "嗯，就用B陣型。"
13430-259 = "……等一下，我們根本就沒制定過什麼陣型吧？"
13430-260 = "嗯嗯！我準備好了喔～♧"
13430-261 = "現在沒時間開玩笑了！薇娜已經發現我們了！"
13430-262 = "你講的話跟你做的事完全矛盾耶，綾音醬……"
13430-266 = "唔，唔嗯……"
13430-267 = "而且白子前輩為什麼從剛才開始就像隻不安的小狗一樣，看起來坐立難安的啊……"
13430-271 = "這個面具不能給你。這是我重要的東西。"
13430-276 = "好了，大家集中精神。"
13430-289 = "星野"
13430-290 = "[7cd0ff]對策委員會[-]"
13430-291 = "[log=호시노]要上囉，[wa:1500]阿拜多斯。[/log]"

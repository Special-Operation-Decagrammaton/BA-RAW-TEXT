[translation]
80000009-1 = "巧克力大胃王比賽"
80000009-2 = "格黑娜．學生餐廳"
80000009-3 = "老師，你有聽到那個消息嗎？"
80000009-4 = "聽說今年情人節，會在中央商店街舉辦全新的大胃王比賽。"
80000009-5 = "對決項目就是……「巧克力」！"
80000009-6 = "雖然我有巧克力奶油麵包或蛋糕的大胃王比賽經驗，#n不過單純吃巧克力的比賽這還是第一次，所以我有點緊張。"
80000009-7 = "市售巧克力不只甜度高還加了很多奶油，很容易產生飽足感。"
80000009-8 = "因此今天我想要在比賽前，在學生餐廳練習吃一大堆巧克力☆"
80000009-9 = "[s]「難道說，我也要一起吃？」"
80000009-10 = "當然囉。大胃王比賽就是要和其他人比賽食量！#n自己一個人吃一大堆不能算是練習。"
80000009-11 = "而且吃飯本來就是獨樂樂不如眾樂樂不是嗎？"
80000009-12 = "所以……"
80000009-17 = "我準備了大量的板巧克力！"
80000009-18 = "[s]「我們兩個人要吃完這些！？」"
80000009-19 = "不，這是老師一個人的份。"
80000009-20 = "我的份有另外準備，請放心☆"
80000009-21 = "[s] 「再怎麼說這個量也……」"
80000009-22 = "老師是大人吧？還沒開始就洩氣是不行的唷。"
80000009-23 = "只要老師把這些巧克力全部吃完，我就滿足老師任何一個願望作為獎勵。"
80000009-24 = "所以，請加油哦♥"
80000009-25 = "好，那麼我們兩個的「巧克力大胃王比賽」練習篇，現在開始！"
80000009-27 = "（然而亞伽里準備的板巧克力，就連一半都沒吃完）"
80000009-28 = "（於是決定把剩下的巧克力帶回夏萊……一點一點慢慢吃）"

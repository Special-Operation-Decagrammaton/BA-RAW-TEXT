[translation]
80000009-1 = "#title;초콜릿 많이 먹기 대회"
80000009-2 = "#place;게헨나 학생식당"
80000009-3 = "3;아카리;01;선생님, 그 소식 들으셨나요?\n#3;em;[반응]\n#3;a"
80000009-4 = "3;아카리;02;이번 발렌타인 데이에 센트럴 상점가에서 새로운 대식 대회를 열 예정이래요."
80000009-5 = "3;아카리;03;그 대식 대회의 대결 종목은 다름 아닌…… <초콜릿 많이 먹기>라고 하네요!\n#3;em;[음표]"
80000009-6 = "3;아카리;01;초콜릿 크림이 들어간 빵이나 케이크로 대식 대결을 한 적은 종종 있었지만, 순수한 초콜릿만 먹는 대식 대회에는 참가한 적이 없어서 조금 긴장이 되네요."
80000009-7 = "3;아카리;01;시판 초콜릿은 단맛이 강할 뿐만 아니라, 버터가 잔뜩 들어가서 쉽게 속이 더부룩해지니까요."
80000009-8 = "3;아카리;03;그래서 오늘은 이곳, 게헨나 학생식당에서 초콜릿 많이 먹기를 미리 연습하려 합니다!\n#3;hophop\n#3;em;[반짝]"
80000009-9 = "[s] \"혹시 나도 같이 먹어야 하는 거야?\""
80000009-10 = "3;아카리;02;그럼요. 대식 대회는 다른 사람과 많이 먹기를 겨루는 대회! 혼자만 많이 먹으면 연습이 되지 않으니까요.\n#3;greeting\n#3;em;[반응]"
80000009-11 = "3;아카리;05;게다가 음식은 원래 혼자 먹는 것보다 다 같이 나누어 먹는 게 훨씬 더 즐겁잖아요?"
80000009-12 = "3;아카리;05;그래서 이렇게……"
80000009-13 = "#st;[0,0];instant;1;"
80000009-14 = "#clearST"
80000009-15 = "3;아카리;05\n#3;d\n#wait;1000"
80000009-16 = "#wait;2500"
80000009-17 = "3;아카리;03;대량의 판 초콜릿을 준비해 보았답니다!\n#3;a"
80000009-18 = "[s] \"이걸 두 사람이 다 먹는다고?\""
80000009-19 = "3;아카리;02;아뇨, 이건 선생님 혼자 드셔야 할 양이에요."
80000009-20 = "3;아카리;01;제가 먹을 초콜릿은 이 옆에 따로 준비해 두었답니다.\n#3;em;[음표]"
80000009-21 = "[s] \"아무리 나라도 이건 다 못 먹겠는데…….\""
80000009-22 = "3;아카리;05;시작하기도 전에 약한 소리 내지 마세요. 어른이시잖아요?"
80000009-23 = "3;아카리;01;선생님께서 이 초콜릿을 다 드신다면 제가 특별히 선생님의 소원을 하나 들어 드릴 테니까—"
80000009-24 = "3;아카리;02;조금만 더 의욕을 내주세요~ ♥\n#3;em;[하트]\n#3;greeting"
80000009-25 = "3;아카리;03;자, 그럼 지금부터 <초콜릿 많이 먹기 대회>를 시작합니다!"
80000009-26 = "#all;hide"
80000009-27 = "#na;(하지만 아카리가 준비한 초콜릿은 절반도 먹기 전에 물려버리고 말았다…….)"
80000009-28 = "#na;(남은 초콜릿은 차마 버릴 수 없어서, 샬레로 가져와 조금씩 먹기로 했다.)"

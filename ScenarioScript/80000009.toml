[translation]
80000009-1 = "Chocolate-Eating Contest"
80000009-2 = "Gehenna Dining Hall"
80000009-3 = "Did you hear the news, Sensei?"
80000009-4 = "There's going to be a big eating contest downtown for Valentine's Day."
80000009-5 = "Any guesses as to what the food that'll be used in the competition is?#nYep, it's chocolate!"
80000009-6 = "I've been in eating contests with things like bread and even chocolate cake before, but this'll be my first time in one with just plain old chocolate.#nI'm kinda nervous."
80000009-7 = "Commercial chocolates are really filling because they're full of sugar and butter."
80000009-8 = "That's why I'm getting in some practice by eating chocolate from the Gehenna Dining Hall."
80000009-9 = "[s] \"Want me to join you?\""
80000009-10 = "Of course. It helps me practice if I have someone to compete with."
80000009-11 = "Besides, all food tastes better when you have someone to share it with, you know?"
80000009-12 = "That's why..."
80000009-17 = "...I bought all these chocolates in bulk!"
80000009-18 = "[s] \"All of this is just for two people?!\""
80000009-19 = "No, don't be silly. That portion is just for you."
80000009-20 = "Mine is this bigger pile over here."
80000009-21 = "[s] \"I think you overestimate how big my stomach is...\""
80000009-22 = "Don't give up before you've even started. You're supposed to have an adult-sized appetite!"
80000009-23 = "I'll tell you what. If you manage to eat your entire share,#nI'll grant you one wish!"
80000009-24 = "So show a little spirit!"
80000009-25 = "Now, then. Let the chocolate-eating contest begin!"
80000009-27 = "I only got half way through the chocolate Akari gave me before I started feeling sick."
80000009-28 = "It would have been rude to throw the rest away, so I wrapped it up and brought it back to Schale to have little by little."

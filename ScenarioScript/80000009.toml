[translation]
80000009-1 = "แข่งกินจุช็อกโกแลต"
80000009-2 = "โรงอาหารเกเฮนน่า"
80000009-3 = "คุณครูคะ ได้ยินข่าวรึยังคะ?"
80000009-4 = "วันวาเลนไทน์ปีนี้จะมีการแข่งกินจุแบบใหม่ที่ย่านการค้า ส่วนกลางด้วยนะคะ"
80000009-5 = "และแน่นอนว่าการแข่งในครั้งนี้ก็คือ... <แข่งกินจุช็อกโกแลต> ค่ะ!"
80000009-6 = "ถึงจะมีการแข่งกินจุเค้กหรือขนมปังครีมช็อกโกแลตอยู่บ่อยๆ แต่ฉันยังไม่เคยเข้าร่วมการแข่งกินจุ#nช็อกโกแลตเพียวๆ แบบนี้ เลยรู้สึกตื่นเต้นนิดหน่อยค่ะ"
80000009-7 = "ช็อกโกแลตที่วางขายทั่วไปนอกจากจะมีรสหวานมากๆ แล้วยังใส่เนยผสมเข้าไปเยอะมาก เลยทำให้ท้องอืดได้ง่ายค่ะ"
80000009-8 = "เพราะงั้นวันนี้ ฉันเลยคิดว่าจะมาฝึกกินจุช็อกโกแลตที่โรงอาหารของเกเฮนน่าค่ะ!"
80000009-9 = "[s] \"แล้ว...ครูต้องมากินด้วยงั้นเหรอ?\""
80000009-10 = "ใช่แล้วค่ะ การแข่งกินจุเป็นการแข่งกินอาหารจำนวนมากแข่งกับคนอื่น ถ้านั่งกินคนเดียวมันอาจจะ#nฝึกไม่ได้ผลค่ะ"
80000009-11 = "อีกอย่าง ปกติแล้วการกินอาหารมักจะสนุกกว่าเวลาที่ได้นั่งกินกับคนอื่นนะคะ"
80000009-12 = "เพราะงั้น..."
80000009-17 = "ฉันก็เลยเตรียมช็อกโกแลตบาร์เอาไว้เยอะแยะเลยละค่ะ!"
80000009-18 = "[s] \"เยอะขนาดนี้แค่สองคนจะกินหมดเหรอ?\""
80000009-19 = "ไม่ขนาดนั้นหรอกค่ะ นี่เป็นปริมาณที่คุณครูต้องกินคนเดียวค่ะ"
80000009-20 = "ส่วนของฉัน ฉันเตรียมไว้ต่างหากแล้วค่ะ"
80000009-21 = "[s] \"ถึงเป็นครูก็กินไม่หมดหรอกนะ...\""
80000009-22 = "ยังไม่ทันจะเริ่มเลย อย่าเพิ่งท้อสิคะ คุณครูเป็นผู้ใหญ่แล้วนะคะ~"
80000009-23 = "ถ้าคุณครูทานช็อกโกแลตได้หมด ฉันจะรับฟังคำขอคุณครูหนึ่งข้อเป็นกรณีพิเศษค่ะ—"
80000009-24 = "ลองพยายามอีกหน่อยสิคะ~ ♥"
80000009-25 = "มาเริ่มการ <แข่งกินจุช็อกโกแลต> กันเถอะค่ะ!"
80000009-27 = "(แต่สุดท้ายคุณครูก็ต้องยกธงขาวตอนที่กินช็อกโกแลตไปได้แค่ครึ่งหนึ่ง...)"
80000009-28 = "(คุณครูไม่อยากทิ้งช็อกโกแลตที่เหลือก็เลยเอากลับไปกินที่ชาเล่ต์)"

[translation]
1006306-1 = "Expected Behavior"
1006306-3 = "While wandering around downtown, I ran into Koyuki in the arcade, immersed in a game."
1006306-4 = "Come on! Please, please, please! This is my chance!"
1006306-9 = "...Uh...?"
1006306-15 = "Whoa! No! Oh! Okay... Uh oh!"
1006306-20 = "Wait... Please! Come on, come on..."
1006306-29 = "AAAAAAAAARGH!"
1006306-30 = "No, no, no! Hah. Nihaha. How?! How could this happen?"
1006306-31 = "Impossible! To fail so many times in a row... It's just impossible!"
1006306-32 = "It just doesn't make ANY sense! Ugh!"
1006306-39 = "AAAAAAAAARGH!"
1006306-49 = "[ns1] \"Hey there, Koyuki.\"\n[ns2] \"Hitting things isn't a healthy expression of frustration.\""
1006306-52 = "*gasp* I-I'm sorry!"
1006306-56 = "Oh! Sensei?! What are you doing here?"
1006306-57 = "Just passing by? I-I see. What are the chances?"
1006306-58 = "...Oh, you wanna know what I'm doing? Isn't it obvious? I'm playing a game! It's called Teatime Hiking, and..."
1006306-59 = "It's garbage! It's a garbage game. It's super difficult and everything's RNG-based!"
1006306-60 = "*sigh* Most people can reach level five without even trying, but I can't even clear the third..."
1006306-61 = "[s3] \"You really like games, huh?\"\n[s4] \"This scene is strangely familiar...\""
1006306-64 = "Yeah, I guess, but..."
1006306-65 = "Come on! You'd have to be super boring not to like games. ...Oh, you do like games, don't you?"
1006306-66 = "You do? I knew it! I told you so!"
1006306-67 = "...Huh?"
1006306-68 = "You wanna know what types of games I like? Hm... Maybe it'd be easier to tell you what I don't like..."
1006306-69 = "Sometimes the upperclassmen ask me to play chess and I have to make a hasty retreat."
1006306-70 = "I don't really like games that make you sit and think about strategy or solve a bunch of logic puzzles."
1006306-71 = "Isn't it more fun to play games that are unpredictable? Don't you love that feeling when something really improbable happens?"
1006306-72 = "It's thrilling! When something doesn't make any logical sense, but it happens anyway, that's what I love the most!"
1006306-73 = "[s5] \"That's a really risky hobby.\"\n[s6] \"I kind of get what you mean.\""
1006306-76 = "Nihaha..."
1006306-77 = "Yeah. Well, you know I'm not the luckiest girl out there! I almost always lose in the end."
1006306-78 = "But hey, that just means when things DO work out, it's that much more exciting!"
1006306-79 = "It's like when I'm in the middle of an escape, C&C hot on my trail..."
1006306-80 = "[s7] \"Is that really the comparison you want to make?\"\n[s8] \"It didn't seem like you were having that much fun last time.\""
1006306-83 = "Geez, it was just a simile! You don't gotta take it so literally. I just meant that what you get out of life depends on your outlook!"
1006306-84 = "...Huh? That doesn't make sense."
1006306-85 = "Why are you talking about reaping and sowing? I'm not a farmer."
1006306-86 = "Oh, you think...my luck would improve if I got my act together day-to-day?"
1006306-87 = "Hm, that just doesn't seem logical, though."
1006306-88 = "I really just don't see the connection between games and my everyday conduct."
1006306-89 = "I get that you're a teacher and you wanna turn this into a lesson—"
1006306-93 = "Wait, wait."
1006306-94 = "We can test this out! If what you're saying is true..."
1006306-95 = "Someone like you, who's always trying to help people, should have incredible game luck, right? Right?"
1006306-96 = "...Huh?"
1006306-97 = "Oh, so that's not what you meant? All right, I get it. I see what you're doing."
1006306-98 = "I did kinda see this coming, honestly. But I hoped I was wrong."
1006306-99 = "In the end, I guess you just..."
1006306-100 = "Don't..."
1006306-101 = "Think you can beat me?"
1006306-102 = "[s9] \"...?\"\n[s10] \"...What?\""
1006306-105 = "All I'm saying is I'm terrible at this game, but even I can clear level two. And here you are trying SO hard to avoid playing."
1006306-106 = "But if you meant what you said, and you really think your luck depends on your behavior..."
1006306-107 = "It seems like someone like you could reach level ten, no problem."
1006306-108 = "But I guess you never know. It'd be disappointing, but maybe you're all talk."
1006306-109 = "If you're not, then I'm sure you could break my record, right?"
1006306-114 = "...You want me to move?"
1006306-115 = "[s11] \"Stand aside.\"\n[s12] \"I'll show you what I can do.\"\n[s13] \"You're going to eat your words.\""
1006306-126 = "And so I started playing Teatime Hiking, Koyuki watching intently."
1006306-128 = "I spent all the money in my pockets, but I still couldn't clear level two."

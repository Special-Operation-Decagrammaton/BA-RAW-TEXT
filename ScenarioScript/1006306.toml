[translation]
1006306-1 = "พฤติกรรมปกติ"
1006306-3 = "(ขณะที่คุณครูเดินเล่นอยู่ในเมืองก็บังเอิญเจอกับโคยูกิที่เล่นเกมอยู่ในร้านเกม...)"
1006306-4 = "อ๊ะ!! ขอร้องละ! ขอร้องละๆๆๆ...! รอบนี้ขอให้ได้ทีเถอะ!!"
1006306-9 = "หืม...?"
1006306-15 = "โอ๊ะ! โอ๊ะ! โอ๊ะ! โอ๊ะ! โอ๊ะ! โอ๊ะ! โอ๊ะ...!!"
1006306-20 = "เดี๋ยวสิ...! ออกมานะ! เร็วๆๆ...!"
1006306-29 = "ไม่นะ!!!"
1006306-30 = "อะไรเนี่ย อะไรกัน!! อีกแล้วเหรอเนี่ย? ถามจริง?!! โธ่!!"
1006306-31 = "เป็นไปไม่ได้! ทำไมกี่ครั้งก็ไม่ผ่านเลยล่ะ?! คิดจะหลอกกินเงินกันรึไง?! "
1006306-32 = "แบบ-นี้-มัน-เป็น-ไป-ได้-ยัง-ไง!?"
1006306-39 = "อ๊ายยยย!!"
1006306-49 = "[ns1] \"ว่าไง โคยูกิ\"\n[ns2] \"อย่าทุบเครื่องแบบนั้นสิ\""
1006306-52 = "...เฮือก!? ขะ... ขอโทษค่ะ...!!"
1006306-56 = "อ้าว?? คุณครู!? ทำไมคุณครูถึงมาอยู่ที่นี่ล่ะ..."
1006306-57 = "แค่เดินผ่านแล้วเห็นฉันเหรอคะ? งะ... งั้นเองเหรอ บังเอิญจังเลยนะคะ!"
1006306-58 = "คะ...? ฉันทำอะไรอยู่น่ะเหรอคะ? ก็อย่างที่เห็นค่ะคุณครู ฉันกำลังเล่นเกม <ต่อร้านชา> อยู่ค่ะ"
1006306-59 = "แต่มันเป็นเกมกากมากเลยค่ะ! ถึงจะมีการแบ่งระดับความยาก แต่ก็สุ่มอะไรมาให้ก็ไม่รู้...!!"
1006306-60 = "เฮ้อ... คนอื่นบอกว่าเล่นชิลๆ ก็ต่อไปได้ถึงชั้น 5 แล้ว แต่ทำไมฉันไม่ผ่านชั้น 3 สักที......"
1006306-61 = "[s3] \"โคยูกิชอบเล่นเกมจังเลยนะเนี่ย\"\n[s4] \"ครูเห็นเด็กที่นี่เล่นเกมกันเยอะเลย\""
1006306-64 = "ก็... ใช่ค่ะ"
1006306-65 = "คนที่นี่ชอบเล่นเกมกันทั้งนั้นแหละค่ะ เว้นแต่ว่าเป็นคนหัวโบราณ อย่าบอกนะคะว่าคุณครูไม่ชอบเล่นเกม?"
1006306-66 = "อ๊ะ คุณครูก็ชอบเล่นเกมด้วยเหรอคะ? ว่าแล้วเชียว!"
1006306-67 = "คะ...?"
1006306-68 = "ฉันชอบเกมทุกประเภทเลยหรือเปล่างั้นเหรอคะ? อืม ก็ไม่เชิงหรอกค่ะ"
1006306-69 = "อย่างเกมหมากรุก... เวลาที่พวกรุ่นพี่มาชวนเล่น ฉันก็จะแอบหนีออกมาค่ะ"
1006306-70 = "พวกเกมที่ต้องต่อสู้ด้วยยุทธศาสตร์หรือการคำนวณ.... คงไม่ใช่ทางของฉันน่ะค่ะ"
1006306-71 = "จะให้พูดยังไงดีนะ ฉันชอบอะไรที่มันคาดเดาไม่ได้ แล้วก็ชอบความรู้สึกของสิ่งที่ไม่ควรเกิดขึ้น#nแต่ก็กลับเกิดขึ้นได้...? เกมสไตล์นั้นมันสนุกดีน่ะค่ะ"
1006306-72 = "เวลาที่สิ่งที่คิดว่าเป็นไปไม่ได้เกิดเป็นไปได้ขึ้นมา ฉันจะรู้สึกดีมากเลยค่ะ!! แม้มันจะผิดตามหลัก#nเหตุผลก็เถอะค่ะ!"
1006306-73 = "[s5] \"ต้องเรียกว่ารสนิยมแปลกๆ รึเปล่านะ\"\n[s6] \"ครูไม่ค่อยเข้าใจเท่าไหร่เลย...\""
1006306-76 = "อ่ะฮ่ะฮ่าฮ่า..."
1006306-77 = "แต่ก็อย่างที่เห็นค่ะ ฉันไม่ใช่เด็กที่โชคดีสักเท่าไหร่ ก็เลยเอาแต่แพ้ติดต่อกันแบบนี้..."
1006306-78 = "แต่ถ้ามองในอีกมุมหนึ่ง การเกิดเรื่องที่ไม่เป็นไปดั่งใจขึ้นก็ถือเป็นอีกรสชาติของชีวิต ว่ามั้ยคะ?"
1006306-79 = "การที่ฉันถูกรุ่นพี่จับตัวได้ แต่ก็พยายามจนหนีออกมาได้อีกรอบก็เหมือนกันค่ะ!!"
1006306-80 = "[s7] \"ต้องเอาไปเปรียบเทียบกับเรื่องนั้นเหรอ?\"\n[s8] \"ดูไม่น่าสนุกเลยนะ...\""
1006306-83 = "โธ่~! อย่าพูดแบบนั้นสิคะ! ทุกสิ่งในโลกล้วนเป็นไปตามใจคิดนะคะ!!"
1006306-84 = "หืม...?"
1006306-85 = "ถ้าเราทำตัวดีในโลกแห่งความจริง... ก็อาจมีโชคในการเล่นเกมก็ได้งั้นเหรอคะ?"
1006306-86 = "นี่ คุณครู~ อยู่ๆ ก็พูดอะไรออกมากันคะเนี่ย...?"
1006306-87 = "เฮ้อ ไม่เห็นจะสมเหตุสมผลตรงไหนเลย~"
1006306-88 = "พฤติกรรมในชีวิตจริงมันไม่เกี่ยวกับเกมหรอกค่ะ ไม่ว่าฉันจะคิดยังไงก็ไม่เห็นว่ามันเกี่ยวกันตรง#nไหนเลย..."
1006306-89 = "ฉันพอเข้าใจอยู่นะคะที่คุณครูอยากจะสอนเด็กน่ะ..."
1006306-93 = "เดี๋ยวก่อนนะ..."
1006306-94 = "ถ้าเกิด.... เป็นไปตามที่คุณครูพูดละก็...."
1006306-95 = "คนที่มีพฤติกรรมดีระดับครูดีเด่นอย่างคุณครูก็ต้องมีโชคในการเล่นเกมมากเลยสินะคะ? ใช่มั้ยคะ? ฉันพูดถูกมั้ย?"
1006306-96 = "คะ...?"
1006306-97 = "ไม่ใช่เหรอคะ...? ฮึ่ม~ จะมาไม้นี้งั้นเหรอ...?"
1006306-98 = "เอาเถอะ ฉันคิดไว้แล้วละว่าคุณครูจะตอบแบบนี้..."
1006306-99 = "ไม่แปลกหรอกค่ะ ก็คุณครูน่ะ..."
1006306-100 = "ดูไม่มี..."
1006306-101 = "ความมั่นใจ... ที่จะชนะฉันได้เลย...?"
1006306-102 = "[s9] \".....?\"\n[s10] \"ว่ายังไงนะ?\""
1006306-105 = "แค่จะบอกว่า... ถึงฉันจะดวงแย่ หรือเล่นเกมได้ไม่ดีแค่ไหน แต่ฉันก็ผ่านชั้น 2 มาแล้วนะคะ#nส่วนคุณครูก็พยายามเลี่ยงที่จะไม่เล่นเกมนี้"
1006306-106 = "ถ้ามันเกี่ยวกับพฤติกรรมของเราจริงๆ อย่างที่คุณครูพูดละก็..."
1006306-107 = "คุณครูก็น่าจะต่อไปถึงชั้น 10 ได้ง่ายๆ เลยนะคะ"
1006306-108 = "แต่ใครจะรู้ล่ะคะ~ คุณครูอาจต่อไม่ได้สักชั้นเลยก็ได้..."
1006306-109 = "แต่ว่าถ้าไม่ใช่... อย่างน้อยก็น่าจะผ่านชั้น 3 ไปได้นะคะ ใช่มั้ยคะ?"
1006306-114 = "จะลองสักหน่อยมั้ยคะ...?"
1006306-115 = "[s11] \"แน่นอนอยู่แล้ว\"\n[s12] \"ครูจะทำให้เห็นความกลัวของผู้ใหญ่เลย\"\n[s13] \"แล้วเธอจะต้องเสียใจ\""
1006306-126 = "(จากนั้นคุณครูก็โชว์สกิลการเล่นเกม <ต่อร้านชา> ให้โคยูกิดู)"
1006306-128 = "(หลังจากใช้เงินที่พกติดตัวมาจนหมด คุณครูก็ยังอยู่ที่ชั้น 2...)"

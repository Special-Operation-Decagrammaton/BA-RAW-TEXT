[translation]
1006306-1 = "平時的所作所為"
1006306-3 = "（……因為夏萊的工作來到市區，在遊戲中心發現了小雪）"
1006306-4 = "啊啊！拜託，拜託！拜託求你了就這次～～～！"
1006306-9 = "……哦？"
1006306-15 = "哦！哦！哦！哦！哦！哦！哦……！"
1006306-20 = "哦哦哦哦哦哦哦哦哦！！"
1006306-29 = "啊啊啊啊啊啊啊啊啊！！"
1006306-30 = "怎麼會～～～！#n真的假的啦！這怎麼可能！"
1006306-31 = "這是連續第幾次失敗了！？#n怎麼會這樣！？我做了什麼壞事嗎！？"
1006306-32 = "真是的！#n爛機台！"
1006306-39 = "啊啊啊啊啊啊啊啊啊啊！！"
1006306-49 = "[ns1]「小雪，發生什麼事了？」\n[ns2]「那樣敲機台的話會壞掉的哦。」"
1006306-52 = "……哈！#n對，對不起……！"
1006306-56 = "呃，咦！？我，我有告訴老師我在遊戲中心嗎……？"
1006306-57 = "因為夏萊的工作到了附近……？#n尼哈哈，還有這麼巧的事啊！"
1006306-58 = "……咦？啊啊……如你所見在玩遊戲哦！#n老師聽過「喫茶店登山」嗎？"
1006306-59 = "這遊戲真的是爛透了！#n不只是操作難度高，還會因為隨機要素而莫名其妙連敗……！"
1006306-60 = "唉……其他人隨便玩就能輕鬆玩到第5層。#n為什麼我卻連第3層都到不了呢……"
1006306-61 = "[s3]「小雪真的很喜歡遊戲呢。」\n[s4]「之前好像也看過類似的場景……」"
1006306-64 = "嗯，也算……是吧？"
1006306-65 = "不過最近大家多少都會玩點遊戲吧？#n難道老師討厭遊戲？"
1006306-66 = "什麼嘛，果然喜歡不是嗎！#n尼哈哈，我就知道！"
1006306-67 = "……咦？"
1006306-68 = "你問我只要是遊戲都喜歡嗎？#n哎呀～也不是全部都喜歡唷。"
1006306-69 = "西洋棋之類的就有點……#n前輩們偶爾會找我玩，不過我都會逃走。"
1006306-70 = "因為得要計算這一手怎麼下、下一手又該怎麼打～對吧？#n那種類型我就不太喜歡。"
1006306-71 = "我喜歡更加無法預測的遊戲！#n從「做不到啦～～～」變成「做到了！」的那種！#n不覺得那樣比較有趣嗎？"
1006306-72 = "做到以為不可能完成的事情，心情就會非常快樂對吧！#n就像那些越是被說不能做的事情，真的做了的時候會覺得越爽快一樣！！#n雖然理論上是不行的！"
1006306-73 = "[s5]「你有在反省之前那件事嗎……？」\n[s6]「多少能理解……」"
1006306-76 = "尼哈哈哈哈！"
1006306-77 = "不過遺憾的是，我的運氣實在是不怎麼樣，所以總是會像這樣輸掉就是了……"
1006306-78 = "但是也正因為無法事事如願，成功的時候才會有成就感！"
1006306-79 = "沒錯，就像無論被前輩們抓到多少次，我還是會鍥而不捨地逃跑一樣！！"
1006306-80 = "[s7]「這種事能混為一談嗎？」\n[s8]「雖然你看起來一點都不開心……」"
1006306-83 = "真是的～！不要吐槽這一點嘛！#n每個人的想法都不一樣呀！！"
1006306-84 = "……嗯？"
1006306-85 = "平時的所作所為要是好一點，說不定遊戲的運氣也會提升？"
1006306-86 = "咦～"
1006306-87 = "老師你還說，這兩件事也沒什麼關連吧？"
1006306-88 = "無論怎麼想這都和平常的行為無關……"
1006306-89 = "哈，難道老師想拉攏我嗎！？"
1006306-93 = "……也就是說？"
1006306-94 = "如果老師說的是真的……"
1006306-95 = "和我不同，平時素行良好的老師玩遊戲的運氣一定很好吧！#n是這樣沒錯吧，沒錯吧？"
1006306-96 = "……什麼？"
1006306-97 = "……也不一定是這樣？"
1006306-98 = "我就知道老師你會這麼回答……"
1006306-99 = "畢竟老師～"
1006306-100 = "好像不巧～"
1006306-101 = "沒什麼自信嘛～？"
1006306-102 = "[s9]「…………」\n[s10]「你剛才說……我沒有自信？」"
1006306-105 = "怎麼啦怎麼啦～我雖然抱怨自己的不幸，但再怎麼說我也是到達了第2層呀～！"
1006306-106 = "如果依照老師說的～？#n這和「平時的所作所為」有關……？"
1006306-107 = "區區10層應該不算什麼吧！"
1006306-108 = "不過偶爾也是會有狀態不好的時候對吧！#n像今天就不是很好？"
1006306-109 = "但……如果不是這樣，再怎麼說也能到達第3層吧？#n你怎麼看呀，老師？"
1006306-114 = "……尼嘻嘻。這樣有幹勁了嗎？"
1006306-115 = "[s11]「……既然你都這麼說了！」\n[s12]「就讓你見識一下大人的實力吧。」\n[s13]「我會讓你後悔的。」"
1006306-126 = "（在那之後，開始在小雪旁邊玩起了「喫茶店登山」）"
1006306-128 = "（……就算花光身上所有的零錢，抵達第2層也是極限了）"

[translation]
10048090-1 = "第9話;我不喜歡這種結局"
10048090-2 = "狂獵空地"
10048090-3 = "（在美代向晶說明特殊交易部收到的委託內容時……）"
10048090-4 = "（太陽已在不知不覺間完全西沉）"
10048090-5 = "也就是說，各位原本認為狂獵收藏庫裡的畫是贗品……"
10048090-6 = "從委託人那裡收到的才是真跡……是嗎。"
10048090-7 = "……結果事實卻完全相反呢。"
10048090-8 = "沒錯。現在各位手上的那幅畫才是贗品。"
10048090-9 = "可，可是你們不覺得有點奇怪嗎？"
10048090-10 = "為什麼那個委託人要提出這種委託呢？"
10048090-11 = "如果是要我們把真跡運出來交給他，我還比較能夠理解……當然也會拒絕他就是了。"
10048090-12 = "可是委託人卻要求我們……在用贗品調包後將真跡銷毀。"
10048090-13 = "……而且還承諾提供鉅額的委託費。"
10048090-14 = "明明錢都花了卻拿不到真跡……"
10048090-15 = "那個人為什麼要提出這種委託……？"
10048090-16 = "這對他來說根本沒有任何好處啊……"
10048090-18 = "在這個世上，也存在超越金錢利益的信念、價值……或者慾望。"
10048090-19 = "或許在那位委託人的心裡，也懷抱著類似的事物吧。"
10048090-20 = "……那似乎不是我們能夠理解的信念或慾望呢。"
10048090-21 = "畢竟擁有那樣的信念，本來就不需要獲得他人的認可。"
10048090-22 = "不過，我倒是能預測到幾分。"
10048090-23 = "……！？"
10048090-24 = "我想那位委託人的目的，應該是在展覽會中向眾人展示贗品──"
10048090-25 = "並藉此確認些什麼吧。"
10048090-26 = "也許是想看著將贗品誤認為真跡的人們，藉此嘲笑他們的水準……"
10048090-27 = "又或者是想測試自己製作贗品的能力……"
10048090-28 = "也太沒品了吧……！"
10048090-29 = "請問我也是這句話形容的對象嗎？"
10048090-30 = "不，不是，那個……！"
10048090-31 = "總之，各位原本的目的，是想將贗品換成真跡對吧。"
10048090-32 = "同時還試圖利用我將贗品取出。"
10048090-34 = "如，如果讓你不高興的話，我很抱歉……"
10048090-35 = "怎麼會呢？#n倘若我只是個普通人，各位也不會想到要利用我吧。"
10048090-36 = "之所以會心安理得地產生那種想法……不過是因為我是名怪盜罷了。"
10048090-37 = "那，那個……"
10048090-38 = "請各位不必感到不自在。"
10048090-39 = "對於自己違反了規定的事實，我還是有自知之明的。"
10048090-40 = "……就算知道還是繼續做那種事嗎？"
10048090-41 = "對藝術品的盜竊……"
10048090-42 = "沒錯，這確實是違反規定的行為。"
10048090-43 = "然而──規定就一定是正確的嗎？"
10048090-44 = "至少我並不這麼認為。"
10048090-45 = "規定往往會停滯不前，因此是容易落後於時代的體系……"
10048090-46 = "就比如在場的各位，應該也不認為狂獵的所有規定都非常合理吧？"
10048090-47 = "……我們學院的規定確實是有點問題。"
10048090-48 = "噓。"
10048090-50 = "因此，即便我的行為違反了規定，我也不認為那是錯誤的。"
10048090-51 = "……只不過是規定跟不上我的腳步罷了。"
10048090-52 = "……"
10048090-53 = "我認為──藝術應該屬於所有人。"
10048090-54 = "因此，我反對藝術成為任何個人的所有物。"
10048090-55 = "所以我才會偷竊藝術品。"
10048090-56 = "簡而言之──我的所作所為並非單純的偷竊，而是一種解放。"
10048090-57 = "那，那我可以問你一個問題嗎？"
10048090-58 = "當然可以。"
10048090-59 = "……至今為止被你解放的藝術品，現在在哪裡？"
10048090-60 = "……很遺憾，目前絕大多數的人們還無法理解藝術品真正的價值。"
10048090-61 = "能完整領略藝術品美學價值的人寥寥無幾。"
10048090-62 = "然而我依舊相信著。"
10048090-63 = "相信世人的審美眼光充分成熟的時刻終將到來。"
10048090-64 = "……因此在那天來臨之前，我將會妥善保管那些偷來的藝術品。"
10048090-69 = "看來你並不相信任何人呢。"
10048090-70 = "沒錯。"
10048090-71 = "不過要說這點的話，我們也是彼此彼此吧？"
10048090-72 = "假如老師沒有出面為我擔保，各位不也一樣不會相信我嗎？"
10048090-73 = "這……"
10048090-74 = "……說了那麼多，到頭來不就是把偷來的東西占為己有嗎？"
10048090-75 = "噓……！"
10048090-76 = "那麼，現在事情的真相已經水落石出了。"
10048090-77 = "結論也非常簡單。"
10048090-78 = "……簡單？"
10048090-79 = "我的目的是收下真跡。"
10048090-80 = "而各位的目的則是收到委託費。"
10048090-81 = "有一個方法，能夠同時達成這兩個目的。"
10048090-82 = "……說來聽聽吧。"
10048090-83 = "我會在逃跑的路徑上[ruby= ・     ・ ]不慎[/ruby]留下贗品給舍監隊回收。"
10048090-84 = "如此一來，畫作就會再次被掛回展覽會場。#n而不想將事情鬧大的舍監隊，也會刻意迴避對畫作進行真偽鑑定。"
10048090-85 = "……那真跡呢？"
10048090-86 = "當然是由我帶走了。"
10048090-87 = "……"
10048090-88 = "請不要露出那種表情。"
10048090-89 = "反正也沒有人能認出那是贗品。"
10048090-90 = "畢竟就連身為美術生的各位都沒能分辨出來──難道不是嗎？"
10048090-91 = "……！"
10048090-93 = "……這點確實無話可說。"
10048090-94 = "時間也不早了。"
10048090-95 = "我就先告辭了。"
10048090-96 = "……請等一下。"
10048090-97 = "不，我已經耗費了太多時間。"
10048090-98 = "老師，我們後會有期……"
10048090-99 = "我這並不是在拜託你。"
10048090-100 = "嗯？"
10048090-101 = "就是現在。"
10048090-102 = "「樹」。"
10048090-104 = "樹？"
10048090-108 = "樹！"
10048090-119 = "[ns]「樹倒了！？」"
10048090-120 = "（那孩子……）"
10048090-121 = "（居然徒手打斷巨木的根部使其倒下……）"
10048090-122 = "（在阻斷退路的同時進行武力示威……）"
10048090-123 = "呵呵，被擺了一道呢。"
10048090-124 = "嗯！我是薄葉律！"
10048090-125 = "為什麼要報上自己的姓名……！"
10048090-126 = "初次見面！怪盜醬！"
10048090-127 = "怪盜……醬……？"
10048090-128 = "……呵呵。#n很高興認識你，律醬。"
10048090-129 = "所以……現在這是在威脅我嗎？"
10048090-131 = "只是希望你再聽我說幾句話而已。"
10048090-132 = "……現在的這個局面，是我所寫下的故事。"
10048090-133 = "是我撰寫的情節，是我想出的作戰……"
10048090-134 = "……也是我創作的作品。"
10048090-135 = "我討厭走私。"
10048090-136 = "當然也討厭策劃走私計畫……"
10048090-137 = "……可是就算不喜歡題材，也不能讓我的作品迎接這樣的結局。"
10048090-138 = "只留下一堆懸念，什麼事情都沒有解決……"
10048090-139 = "所有人都被蒙在鼓裡，我們只拿到一筆莫名其妙的委託費……#n這種含糊草率的結局……！"
10048090-140 = "身為一名作家，我實在無法接受！"
10048090-145 = "所以呢？"
10048090-146 = "你會這麼說，就代表有替代方案吧？"
10048090-147 = "是的。"
10048090-148 = "我不會埋下無法回收的伏筆。"
10048090-149 = "所以，最後請聽聽我的提案吧。"
10048090-150 = "一個怪盜和我們都能接受的……"
10048090-152 = "……對賭提案。"

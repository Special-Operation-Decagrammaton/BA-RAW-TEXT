[translation]
10048090-1 = "Episode 9;I Don't Like This Ending"
10048090-2 = "Wildhunt Park"
10048090-3 = "Miyo thoroughly explained the Free Trade Cartel's mission to Akira..."
10048090-4 = "...And the sun retreated, welcoming the night."
10048090-5 = "You girls believed the forged piece was in storage..."
10048090-6 = "...And that the client, on their noble mission, gave you the authentic masterpiece?"
10048090-7 = "...Indeed. I see now that we had it backwards."
10048090-8 = "Yes. They gave you a forgery, and not even a good one."
10048090-9 = "Um, b-but, here's what I don't understand."
10048090-10 = "Why would they ask us to do this? Where's the profit?"
10048090-11 = "I'd understand if they'd wanted us to steal the REAL work and bring it to them. I'd have refused, of course."
10048090-12 = "But they wanted us to install a fake in the gallery and destroy the real painting."
10048090-13 = "...All for an EXORBITANT fee, I'll have you know."
10048090-14 = "Why would they pay so much to get nothing in return?"
10048090-15 = "I don't understand the motivation."
10048090-16 = "No one would get anything...except us. The world would lose a masterpiece for no reason."
10048090-18 = "Some things, like beliefs and values, are worth more than money."
10048090-19 = "Your client was undoubtedly driven by an intense desire."
10048090-20 = "...I suppose it isn't a desire I understand."
10048090-21 = "Singular desires don't require persuasion or an audience."
10048090-22 = "However, I can hazard a guess."
10048090-23 = "...?!"
10048090-24 = "Your client wanted this forgery in the exhibition, where it could be admired by the masses."
10048090-25 = "This was likely to prove a point."
10048090-26 = "Perhaps they wished to mock the people by making them admire a forgery."
10048090-27 = "Or...perhaps they wanted to showcase their...delusional...art forgery skills."
10048090-28 = "That's so twisted!"
10048090-29 = "Are you referring to me, or...?"
10048090-30 = "No, I-I...!"
10048090-31 = "Your original mission, as far as you knew, was to swap the forged piece with the real one."
10048090-32 = "And you thought it would be convenient to use me as your...disposal service?"
10048090-34 = "...W-We meant no offense."
10048090-35 = "None taken. You trusted my skills, knew I would steal it cleanly..."
10048090-36 = "You thought of me as competent, but predictable. I left a calling card...and you received the message."
10048090-37 = "Th-That's..."
10048090-38 = "There's no need to feel uncomfortable."
10048090-39 = "I broke the rules, much like you. This...awkwardness was a natural consequence."
10048090-40 = "...But why do you keep doing it? Why not stop and just...obey the rules?"
10048090-41 = "Stealing art..."
10048090-42 = "Yes, it's definitely against the rules."
10048090-43 = "But are the rules always correct? Always just?"
10048090-44 = "I don't think so."
10048090-45 = "Rules grow stagnant and stale, falling behind the times, failing to account for growth..."
10048090-46 = "Clearly, you two fail to see the justification behind EVERY Wildhunt rule."
10048090-47 = "...Don't get me started. You know that they won't even let you—"
10048090-48 = "Shut up."
10048090-50 = "So, while I may not be obeying the rules, I find my actions entirely justified."
10048090-51 = "...It's the rules that have failed to keep up with me."
10048090-52 = "..."
10048090-53 = "I believe art should be accessible to everyone."
10048090-54 = "Therefore, I oppose it being hoarded as personal property."
10048090-55 = "That's why I \"steal\" art."
10048090-56 = "Though...it's not so much \"stealing\" as it is \"liberation.\""
10048090-57 = "Th-Then may I ask you something?"
10048090-58 = "Naturally."
10048090-59 = "...Those art pieces that you \"liberated\"... Where are they now?"
10048090-60 = "Lamentably, most people do not yet recognize the true value of art."
10048090-61 = "Very few people possess a sense of aesthetics."
10048090-62 = "But I have faith..."
10048090-63 = "One day, the people will wake up. They will mature, see with their hearts, and recognize true beauty."
10048090-64 = "...Until that day comes, I shall safely store and protect the liberated art pieces."
10048090-69 = "You don't trust anyone."
10048090-70 = "Why would I?"
10048090-71 = "And are you not the same?"
10048090-72 = "If not for Sensei's endorsement, you'd have never believed me."
10048090-73 = "That's..."
10048090-74 = "...Wait? How is that different? She's hoarding too. She's just going to KEEP everything she stole?"
10048090-75 = "Shut UP."
10048090-76 = "Ah, now that we're all on the same page..."
10048090-77 = "...the conclusion is both obvious and elegant."
10048090-78 = "...Is it?"
10048090-79 = "My goal is to obtain the authentic art piece."
10048090-80 = "...Yours is to get paid."
10048090-81 = "These are not mutually exclusive. In fact, we'd succeed through working together."
10048090-82 = "...Please elaborate."
10048090-83 = "I will leave the forged piece behind, as if I dropped it in a clumsy attempt to escape. The Prefectural Council will find it and feel triumphant."
10048090-84 = "Then the painting will hang in the exhibition, and the Council, who would hate to lose face, shall conveniently forget to get the piece re-appraised."
10048090-85 = "...And what of the genuine piece?"
10048090-86 = "Naturally, it shall remain in my care."
10048090-87 = "..."
10048090-88 = "Oh, please don't look so fretful."
10048090-89 = "No one will ever know about the forgery."
10048090-90 = "You're exemplary Wildhunt students, and you didn't know."
10048090-91 = "...!"
10048090-93 = "...Let's not make assumptions."
10048090-94 = "We've wasted enough time."
10048090-95 = "Farewell!"
10048090-96 = "...Wait."
10048090-97 = "The hour's late enough."
10048090-98 = "And Sensei, it was an absolute pleas—"
10048090-99 = "That wasn't a request."
10048090-100 = "...What?"
10048090-101 = "Now."
10048090-102 = "Timber."
10048090-104 = "Timber...?"
10048090-108 = "TIIIIM-BER!!"
10048090-119 = "[ns] \"The tree fell over?!\""
10048090-120 = "(That girl...)"
10048090-121 = "(She toppled a tree by punching it with her bare fists...?)"
10048090-122 = "(And she blocked my escape route... Impressive.)"
10048090-123 = "Haha. Clever girl, you've bested me."
10048090-124 = "You bet! That's because I'm Usuba Ritsu!"
10048090-125 = "Why did you... This is why we established codenames!"
10048090-126 = "Nice to meet you, Thiefster!"
10048090-127 = "Thief...ster..?"
10048090-128 = "...Fufu. A likewise pleasure, Miss Ritsu."
10048090-129 = "As for you... I suppose I should hear your request."
10048090-131 = "All I ask is for a little peer review."
10048090-132 = "...You see, I've been writing this story, and we're in it."
10048090-133 = "This is my plot, my strategy, and..."
10048090-134 = "...my work."
10048090-135 = "Clearly, I don't like smuggling."
10048090-136 = "I don't enjoy breaking the rules or criminal plotting."
10048090-137 = "...Yet, while this isn't my preferred genre, I still have artistic integrity."
10048090-138 = "This ending is uneasy and open. Nothing meaningful has been resolved."
10048090-139 = "To end with a chuckle as everyone realizes they've been deceived, and then be rewarded with a dubious fee..."
10048090-140 = "As a writer, I cannot accept this rushed...hackwork!"
10048090-145 = "And...?"
10048090-146 = "Are you proposing a revision, dear author?"
10048090-147 = "Indeed."
10048090-148 = "I never foreshadow without a conclusion in mind."
10048090-149 = "So...please listen to my proposal."
10048090-150 = "If you're willing to collaborate, I believe we can both agree to..."
10048090-152 = "...a wager."

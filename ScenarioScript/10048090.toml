[translation]
10048090-1 = "ตอนที่ 9;ตอนจบที่ไม่รื่นรมย์"
10048090-2 = "สนามไวลด์ฮันต์"
10048090-3 = "(ในขณะที่มิโยะอธิบายเกี่ยวกับคำขอที่ชมรมการค้าพิเศษได้รับมาให้อากิระฟัง...)"
10048090-4 = "(พระอาทิตย์ก็ลับขอบฟ้าทางทิศตะวันตกไปแล้ว)"
10048090-5 = "สรุปว่าพวกคุณคิดว่าภาพที่อยู่ในโกดังเก็บงานศิลปะของไวลด์ฮันต์เป็นภาพปลอมสินะคะ"
10048090-6 = "แล้วก็คิดว่าภาพที่ได้รับมาจากลูกค้าคือภาพจริง..."
10048090-7 = "แต่ในความเป็นจริง มันกลับตรงกันข้าม..."
10048090-8 = "ใช่ค่ะ ภาพที่พวกคุณมีคือภาพปลอมค่ะ"
10048090-9 = "ตะ... แต่ว่า ดูเหมือนจะมีบางอย่างแปลกๆ นะคะ?"
10048090-10 = "ถ้างั้นทำไมลูกค้าของพวกฉันถึงขอให้ทำงานแบบนี้ล่ะคะ?"
10048090-11 = "ถ้าคำขอคือการให้เอาภาพจริงออกมาให้ตัวเอง ก็น่าจะเข้าใจง่ายเสียกว่า แต่แน่นอนว่าฉันก็จะปฏิเสธงานนั้นอยู่แล้วค่ะ"
10048090-12 = "แต่ลูกค้ากลับต้องการเปลี่ยนภาพจริงเป็นภาพปลอม แล้วก็ขอให้ทำลายภาพจริงนั้นเสียค่ะ"
10048090-13 = "แถมยังสัญญาว่าจะให้ค่าจ้างก้อนโตด้วย..."
10048090-14 = "ต้องควักกระเป๋าจ่ายเงินค่าจ้างเอง แต่ก็ไม่ได้ภาพจริงกลับไปครอบครอง"
10048090-15 = "ทำไมลูกค้าคนนั้นถึงมาขอให้ทำงานแบบนี้ล่ะคะ...?"
10048090-16 = "ทำแบบนั้นไม่น่าจะได้ประโยชน์อะไรสักนิดแท้ๆ..."
10048090-18 = "ในโลกนี้น่ะ บางครั้งความเชื่อ ค่านิยม หรือความปรารถนาก็สำคัญกว่าผลประโยชน์ทางการเงินค่ะ"
10048090-19 = "บางทีลูกค้าคนนั้นอาจจะเห็นความสำคัญของเรื่องแบบนั้นก็ได้"
10048090-20 = "ฉันว่าไม่น่าจะใช่ความเชื่อหรือความปรารถนาที่เราพอทำความเข้าใจได้ค่ะ..."
10048090-21 = "นั่นก็เพราะการมีสิ่งนั้น ไม่ได้หมายความว่าจะต้องได้รับความยินยอมจากผู้อื่นเสมอไปยังไงล่ะคะ"
10048090-22 = "ฉันพอจะคาดการณ์ได้ในระดับหนึ่งค่ะ"
10048090-23 = "...?!"
10048090-24 = "ลูกค้าของพวกคุณอยากจัดแสดงภาพปลอมในนิทรรศการและอยากให้ผู้ชมงานจำนวนมากได้เห็น"
10048090-25 = "แล้วก็คงอยากตรวจสอบอะไรบางอย่างจากเรื่องนั้นค่ะ"
10048090-26 = "คงอยากเย้ยหยันผู้คนที่เข้าใจผิดว่าภาพปลอมคือภาพจริง..."
10048090-27 = "หรือไม่ก็อยากทดสอบความสามารถในการปลอมแปลงผลงานของตัวเอง..."
10048090-28 = "รสนิยมแย่ชะมัด...!"
10048090-29 = "นี่คุณกำลังว่าฉันด้วยหรือเปล่าคะ?"
10048090-30 = "ไม่ใช่นะ ระ... เรื่องนั้นน่ะ...!"
10048090-31 = "จะยังไงก็เถอะค่ะ สรุปว่าเป้าหมายเดิมของพวกคุณคือการเปลี่ยนภาพปลอมเป็นภาพจริง"
10048090-32 = "ก็เลยเจตนาใช้งานฉันเพื่อเอาภาพปลอมออกมาถูกมั้ยคะ?"
10048090-34 = "ถะ... ถ้าพวกฉันทำให้ไม่พอใจ ก็ขอโทษด้วยนะคะ..."
10048090-35 = "ไม่หรอกค่ะ ถ้าฉันเป็นคนธรรมดา พวกคุณก็คงไม่คิดจะใช้งานฉันอยู่แล้วค่ะ"
10048090-36 = "แต่พอฉันเป็นถึงจอมโจร พวกคุณก็เลยได้ไอเดียนั้นและอยากจะใช้มันอย่างสบายใจค่ะ"
10048090-37 = "อะ... เอ่อ..."
10048090-38 = "ไม่ต้องอึดอัดใจหรอกค่ะ"
10048090-39 = "ฉันก็รู้ดีค่ะว่าตัวเองก็ละเมิดกฎ"
10048090-40 = "แต่ต่อให้รู้แล้ว... ก็ยังจะทำงานแบบนั้นอยู่อีกเหรอคะ?"
10048090-41 = "การขโมยงานศิลปะ..."
10048090-42 = "ใช่ค่ะ นี่คือการกระทำที่ผิดกฎหมายอย่างชัดเจนค่ะ"
10048090-43 = "แต่ในกฎข้อหนึ่งแล้วมันจะต้องถูกเสมอไปงั้นเหรอคะ?"
10048090-44 = "ฉันไม่คิดแบบนั้นหรอกค่ะ"
10048090-45 = "กฎระเบียบคือสิ่งที่หยุดชะงักได้ง่าย และเป็นระบบที่จะล้าหลังไปตามยุคสมัย..."
10048090-46 = "พวกคุณทุกคนก็ไม่ได้คิดว่ากฎทุกข้อของไวลด์ฮันต์เหมาะสมกับสถานการณ์ในตอนนี้กันนี่คะ?"
10048090-47 = "กฎของโรงเรียนเราก็ออกจะเข้มงวดไปหน่อยก็จริง..."
10048090-48 = "ชู่ว"
10048090-50 = "เพราะงั้น ต่อให้การกระทำของฉันมันจะผิดกฎ ฉันก็ไม่คิดว่ามันผิดหรอกค่ะ"
10048090-51 = "กฎระเบียบต่างๆ มันแค่ตามฉันไม่ทันก็เท่านั้นเองค่ะ..."
10048090-52 = "......"
10048090-53 = "ฉันเชื่อว่าศิลปะควรเป็นของทุกๆ คนค่ะ"
10048090-54 = "นั่นคือเหตุผลที่ฉันไม่เห็นด้วยกับการที่งานศิลปะจะเป็นกรรมสิทธิ์ของบุคคลใดบุคคลหนึ่ง"
10048090-55 = "ฉันก็เลยมาขโมยงานศิลปะน่ะค่ะ"
10048090-56 = "แต่ถ้าจะพูดให้ถูก นี่ไม่ใช่การขโมย แต่เป็นการปลดปล่อยมากกว่าค่ะ"
10048090-57 = "ถะ... ถ้างั้นฉันก็ขอถามอะไรสักอย่างได้มั้ยคะ?"
10048090-58 = "ถามได้เลยค่ะ"
10048090-59 = "งานศิลปะที่คุณปลดปล่อยมาจนถึงตอนนี้อยู่ที่ไหนเหรอคะ...?"
10048090-60 = "น่าเสียดายที่คนส่วนใหญ่ยังรับรู้ถึงคุณค่าที่แท้จริงของงานศิลปะไม่ได้ค่ะ..."
10048090-61 = "น้อยคนนักที่จะชื่นชมคุณค่าด้านสุนทรียศาสตร์ของงานศิลปะได้อย่างเต็มที่"
10048090-62 = "แต่ฉันก็เชื่อค่ะ"
10048090-63 = "เชื่อว่าความสามารถในการทำความเข้าใจคุณค่าของงานศิลปะของผู้คนในโลกจะพัฒนาจนสุกงอม#nในสักวัน"
10048090-64 = "และจนกว่าวันนั้นจะมาถึง ฉันจะเก็บรักษางานศิลปะที่ขโมยมาให้ปลอดภัยค่ะ..."
10048090-69 = "คุณไม่เชื่อในคนอื่นสินะคะ"
10048090-70 = "แน่นอนค่ะ"
10048090-71 = "แต่พวกคุณก็ด้วยไม่ใช่เหรอคะ?"
10048090-72 = "ถ้าไม่มีการรับรองจากคุณครู พวกคุณก็ไม่เชื่อคำพูดของฉันเหมือนกันนี่คะ?"
10048090-73 = "เรื่องนั้นมัน..."
10048090-74 = "แต่สุดท้ายก็บอกว่าตัวเองจะเก็บภาพที่ขโมยมาไว้กับตัวไม่ใช่เหรอ...?"
10048090-75 = "ชู่ว"
10048090-76 = "เอาละ ถ้างั้นก็คงจบเรื่องนี้ได้แล้วสินะคะ"
10048090-77 = "เราจะได้ข้อสรุปง่ายๆ เลยละค่ะ"
10048090-78 = "ง่ายงั้นเหรอคะ...?"
10048090-79 = "เป้าหมายของฉันคือครอบครองผลงานศิลปะของแท้"
10048090-80 = "เป้าหมายของพวกคุณคือการได้รับค่าจ้าง"
10048090-81 = "ฉันมีวิธีที่จะบรรลุเป้าหมายทั้ง 2 ข้อนี้ได้พร้อมๆ กันค่ะ"
10048090-82 = "ไหนลองว่ามาสิคะ..."
10048090-83 = "ระหว่างหลบหนีออกไป ฉันจะแกล้งทำภาพปลอมหล่นไว้ ให้ฝ่ายดูแลหอพักเก็บไปได้ค่ะ"
10048090-84 = "ถ้าเป็นอย่างนั้นภาพนั้นก็จะถูกนำกลับไปจัดแสดงในนิทรรศการอีกครั้ง แล้วฝ่ายดูแลหอพักก็จะจงใจ#nไม่ตรวจสอบว่าภาพนั้นเป็นของแท้หรือเปล่า จะได้ไม่ต้องเกิดเรื่องใหญ่ค่ะ"
10048090-85 = "แล้วภาพจริงล่ะคะ...?"
10048090-86 = "ก็ต้องอยู่ในความดูแลของฉันอยู่แล้วค่ะ"
10048090-87 = "......"
10048090-88 = "อย่าทำหน้ากังวลแบบนั้นสิคะ"
10048090-89 = "ยังไงก็ไม่มีใครรู้ว่าภาพนั้นเป็นภาพปลอมอยู่แล้วค่ะ"
10048090-90 = "แม้แต่นักเรียนศิลปะอย่างพวกคุณก็แยกแยะไม่ออกเหมือนกันไม่ใช่เหรอคะ?"
10048090-91 = "...!"
10048090-93 = "เถียงไม่ออกเลยแฮะ..."
10048090-94 = "เวลาล่วงเลยไปมากแล้วนะคะ"
10048090-95 = "ถ้างั้นฉันต้องขอตัวก่อนค่ะ"
10048090-96 = "เดี๋ยวก่อนค่ะ..."
10048090-97 = "ไม่ดีกว่าค่ะ ฉันใช้เวลาไปมากแล้วค่ะ"
10048090-98 = "แล้วก็ คุณครูคะ ไว้เจอกันใหม่..."
10048090-99 = "ฉันไม่ได้เรียกเพื่อจะขอให้ช่วยค่ะ"
10048090-100 = "คะ?"
10048090-101 = "ตอนนี้ละค่ะ"
10048090-102 = "'ต้นไม้'"
10048090-104 = "ต้นไม้?"
10048090-108 = "ต้นไม้!"
10048090-119 = "[ns] \"ต้นไม้โค่นลงมาเหรอ?!\""
10048090-120 = "(เด็กคนนั้น...)"
10048090-121 = "(โค่นต้นไม้ใหญ่ด้วยมือเปล่าเลยเหรอ...)"
10048090-122 = "(นี่คือการประท้วงโดยใช้กำลังและปิดกั้นเส้นทางหนีไปพร้อมๆ กัน...)"
10048090-123 = "ฮ่าฮ่า ฉันโดนดีเข้าให้แล้วสินะคะ"
10048090-124 = "อื้อ! ฉันคืออุสุบะ ริตสึ!"
10048090-125 = "ทำไมถึงไปบอกชื่อของตัวเองล่ะ...!"
10048090-126 = "ยินดีที่ได้รู้จักค่ะ! จอมโจรจัง!"
10048090-127 = "จอมโจร... จัง...?"
10048090-128 = "ฮุฮุ... ค่ะ ยินดีที่ได้รู้จักนะคะ ริตสึจัง"
10048090-129 = "ต้นไม้นี้ถือเป็นการข่มขู่หรือเปล่าคะ?"
10048090-131 = "ฉันอยากให้คุณฟังเรื่องราวของฉันสักครั้งน่ะค่ะ"
10048090-132 = "สถานการณ์ในตอนนี้คือสิ่งที่ฉันเขียนขึ้นมาค่ะ..."
10048090-133 = "มันมาจากพล็อตและแผนการที่ฉันเขียนไว้ แล้วทั้งหมดนี้ก็เป็น..."
10048090-134 = "งานเขียนของฉันค่ะ..."
10048090-135 = "แน่นอนว่าฉันไม่ชอบการลักลอบขนส่งสินค้าหรือของเถื่อนหรอกนะคะ"
10048090-136 = "แล้วก็ไม่ชอบการวางแผนลักลอบขนส่งด้วย..."
10048090-137 = "แต่ฉันก็ไม่อาจกำหนดตอนจบของงานเขียนของตัวเองด้วยวิธีนี้ เพียงเพราะไม่ถูกใจวัตถุดิบของงานหรอกค่ะ..."
10048090-138 = "ตอนจบที่ทิ้งความเคลือบแคลงใจไว้ และไม่มีอะไรได้รับการแก้ไขอย่างเหมาะสม..."
10048090-139 = "ตอนจบสุดคลุมเครือที่สุดท้ายทุกคนก็โดนหลอก ส่วนพวกฉันก็ได้รับค่าจ้างที่น่ากังขา...!"
10048090-140 = "ในฐานะนักเขียน เรื่องแบบนี้มันให้อภัยไม่ได้ค่ะ!"
10048090-145 = "แล้วยังไงเหรอคะ?"
10048090-146 = "จะบอกว่าคุณมีแผนการอื่นงั้นเหรอ?"
10048090-147 = "ใช่ค่ะ"
10048090-148 = "ฉันไม่เสนอแผนสำรองลับที่ไม่มีข้อสรุปหรอกค่ะ"
10048090-149 = "เพราะงั้นช่วยฟังข้อเสนอของฉันจนจบด้วยนะคะ"
10048090-150 = "ฉันขอเสนอ..."
10048090-152 = "การเดิมพันที่คุณจอมโจรและพวกฉันจะเห็นด้วยค่ะ"

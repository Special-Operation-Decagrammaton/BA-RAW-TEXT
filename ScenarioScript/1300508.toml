[translation]
1300508-1 = "#title;음반 매장"
1300508-2 = "#place;상점가의 음반 매장 앞"
1300508-3 = "3;카요코;01;어라, 선생. 이런 곳에서 만나다니, 우연이네.\n#3;a\n#3;em;[반응]"
1300508-4 = "3;카요코;03;응. 오늘은 비번이라 음반 매장에 음악을 들으러 잠깐 들렀어."
1300508-5 = "3;카요코;99;음반 매장은 참 좋지. 여러가지 종류의 음악을 한 번에 들어볼 수 있으니까."
1300508-6 = "3;카요코;03;음…… 역시 이 곡도 나쁘지 않네.\n#3;em;[반짝]"
1300508-7 = "3;카요코;02;선생도 한 번 들어 볼래?"
1300508-8 = "[s1] \"좋아.\"\n[s2] \"카요코의 추천 음악은 조금…….\""
1300508-9 = "3;카요코;03;사양하지 말고. 한 번 들어봐.\n#3;em;[음표]"
1300508-10 = "3;카요코;03;사양하지 말고. 한 번 들어봐.\n#3;em;[음표]"
1300508-11 = "#all;hide"
1300508-12 = "#wait;1500"
1300508-13 = "#wait;1000"
1300508-14 = "#na;잔잔한 재즈풍의 선율이 울려 퍼진다……."
1300508-15 = "#na;……"
1300508-16 = "3;카요코;03"
1300508-17 = "#wait;1000"
1300508-18 = "[ns] \"이건…… 헤비메탈이 아니잖아?\""
1300508-19 = "3;카요코;06;……어째서 또 메탈을 듣는다고 생각한 거야?\n#3;em;[속상함]\n#3;stiff"
1300508-20 = "3;카요코;05;게헨나의 학생이라고 해서 언제나 과격한 음악만 듣는 건 아니라고.\n#3;em;[!]"
1300508-21 = "3;카요코;99;음악은 장르를 불문하고 모두 저마다의 이야기를 갖고 있으니까."
1300508-22 = "3;카요코;03;나름의 소신이 담긴 음악이라면 뭐든지 좋아해.\n#3;em;[음표]"
1300508-23 = "3;카요코;02;선생님은 어떤 음악을 좋아해?"
1300508-24 = "[s] 좋아하는 곡의 제목을 알려준다."
1300508-25 = "3;카요코;99;으음……. 들어본 적 없는 곡이네."
1300508-26 = "3;카요코;02;하지만 분명 내 귀에도 잘 맞을 거야."
1300508-27 = "3;카요코;03;그도 그럴 것이 선생님이 추천하는 곡인 걸.\n#3;em;[///]"
1300508-28 = "3;카요코;03;그럼 한 번 찾아보도록 할까……."
1300508-29 = "#all;hide"
1300508-30 = "#na;이후, 카요코와 함께 음악을 감상하며 휴일을 보냈다."

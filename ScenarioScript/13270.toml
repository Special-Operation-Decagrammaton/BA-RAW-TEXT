13270-204 = "ปืนแม่เหล็กไฟฟ้าแบบรางคู่ขนาน <เชมาตา> ใช้เทคโนโลยีที่ตอนนี้ไม่พบในคิโวทอสค่ะ!"
13270-205 = "ตามโครงสร้างแล้ว ปืนแม่เหล็กไฟฟ้านั่นเป็นอาวุธที่ยิงพลาสม่าในอุณหภูมิที่ใกล้เคียงกับดวงอาทิตย์#nค่ะ!"

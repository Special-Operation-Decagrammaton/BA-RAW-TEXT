13270-207 = "แต่ก็ไม่ได้หมายความว่าอันตรายจะหายไปหรอกนะคะ เพราะยิ่งถ้าไม่สมบูรณ์... ก็จะยิ่งเหมือนระเบิด#nลูกมหึมาที่ไม่รู้ว่าจะระเบิดอันตรายออกมาเมื่อไรค่ะ!"

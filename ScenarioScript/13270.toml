[translation]
13270-1 = "Episode 27;A Fine Line"
13270-3 = "...You sure have gotten strong, Shiroko."
13270-9 = "*huff*... *huff*... "
13270-10 = "This would've ended differently without Sensei. I still have a long way to go, Hoshino."
13270-11 = "...No. You really have grown, Shiroko..."
13270-12 = "You keep pushing forward. You finally surpassed this old-timer..."
13270-13 = "..."
13270-18 = "Hoshino..."
13270-19 = "..."
13270-20 = "Hoshino..."
13270-25 = "[ns] \"That's enough, Hoshino.\""
13270-29 = "...You think so?"
13270-32 = "Yes, Kaiser trying to claim ownership of the Train Cannon is ridiculous to begin with. There has to be another way to fight."
13270-33 = "You're not wrong. Sensei's here, after all."
13270-34 = "There's always a way... Just like that time, or this time, or the next time. Isn't that right, Sensei?"
13270-39 = "[ns] \"Yes. We just have to find it.\""
13270-40 = "..."
13270-41 = "Hoshino... "
13270-42 = "Nonomi... Are you okay?"
13270-43 = "Yes…"
13270-44 = "...I wanted you to overcome the pain of losing President Yume, Hoshino."
13270-45 = "But no matter what I did, I couldn't turn back time. I couldn't bring back the dead."
13270-46 = "So I blamed myself for all of your pain...even though there was nothing I could do."
13270-53 = "I think...I've been clinging to my guilt, all this time."
13270-54 = "And, you, Hoshino...you too..."
13270-55 = "..."
13270-59 = "I...can't pretend to understand your pain...or President Yume's."
13270-60 = "That's why I've never really known what to say about this... I'm sorry, Hoshino."
13270-61 = "Shiroko..."
13270-62 = "But...I want to understand. I do. If you told me, Hoshino, I would listen."
13270-63 = "What she said! You should've told us! You never needed to hide things from us, just trying to take responsibility for everything!"
13270-64 = "You should've told us! Aren't we friends?"
13270-65 = "Serika..."
13270-67 = "Yes. You should've spoken to us about it, rather than making decisions for us."
13270-68 = "We have the right to know about our district. Just look what happened when we were left in the dark. You should never have hidden it from us! And you shouldn't have acted on your own!"
13270-69 = "You...You should've reached out your hand for help!"
13270-70 = "Ayane... I mean, Student Council President. "
13270-71 = "I'm really just Ayane..."
13270-72 = "Ayane... "
13270-73 = "Sensei... Everyone..."
13270-75 = "...I'm the one who killed Yume."
13270-76 = "What?!"
13270-77 = "That's...!"
13270-79 = "...I know, I know. \"It was an accident,\" and, \"It wasn't your fault.\" "
13270-80 = "But...I've believed that all this time."
13270-81 = "Yume was the best student council president I could've asked for. "
13270-84 = "She treated me warmly...spoke kindly...and always embraced me softly... "
13270-85 = "But I couldn't protect any of the things Yume left behind. I never reciprocated...always full of complaints, dissatisfaction, and anger..."
13270-86 = "I will never be able to pay back Yume for the things she gave me. Never...ever... "
13270-89 = "And now Yume is dead."
13270-90 = "I'll never be able to see her again. "
13270-93 = "[ns] \"That's not your fault, Hoshino.\""
13270-94 = "...I know, Sensei. Maybe...I just wanted to complain to someone. "
13270-95 = "I can't even say what I wanted to complain about... I..."
13270-96 = "...I really..."
13270-97 = "[ns] \"Let's go home, Hoshino.\""
13270-98 = "...Sensei."
13270-99 = "[s] \"You don't need to suffer anymore.\""
13270-100 = "What Sensei said, Hoshino. Let's go back now. Back to the Foreclosure Task Force. Back to Abydos."
13270-101 = "Yeah. She's right. It's time to go back."
13270-103 = "...Yup. Let's go."
13270-109 = "Here, take my hand."
13270-113 = "...Okay. I got it."
13270-114 = "Let's go...back home..."
13270-121 = "No... No. I can't let you do that."
13270-126 = "Wh-What's that sound?!"
13270-127 = "It sounds like th-thunder!"
13270-131 = "L-Look over there!"
13270-145 = "It's moving?"
13270-146 = "H-How is this possible? "
13270-147 = "Ah! Where's my card?"
13270-152 = "Takanashi Hoshino!"
13270-153 = "...!!"
13270-159 = "I've activated the Train Cannon! Come and stop me!"
13270-160 = "Otherwise, I'll use it to blow away that Abydos school of yours!"
13270-161 = "!!"
13270-162 = "...!!"
13270-163 = "The Train Cannon's destination is set for Great Oasis Station. I will await you there!"
13270-164 = "Come! Come and *tchhhk*...stop...."
13270-173 = "Wait, Hoshino..."
13270-180 = "Augh!"
13270-181 = "H-Hoshino...!"
13270-182 = "[s] \"Hoshino...!\""
13270-186 = "...Thank you, Sensei, everyone."
13270-187 = "But this pain is all I have left of Yume. So I have no choice but to bear it."
13270-188 = "...I'm going to destroy the Train Cannon."
13270-189 = "If Yume was still alive, she would've wanted me to do this."
13270-190 = "...I should've finished this two years ago."
13270-194 = "[ns] \"Hoshino! Wait!\""
13270-195 = "She got away!"
13270-196 = "Hurry, we have to follow her... "
13270-201 = "I've confirmed it! Sensei!"
13270-204 = "The Train Cannon Schemata contains technology that doesn't currently exist in Kivotos!"
13270-205 = "Structurally, the Train Cannon can fire plasma at a temperature similar to the sun's core!"
13270-206 = "But...it's incomplete. It seems someone was trying to replicate the technology, but ultimately failed."
13270-207 = "But that doesn't mean it's not dangerous! In fact...its incomplete state probably makes the situation worse. It's basically a giant bomb that could go off at any time!"
13270-208 = "If you try to destroy it...everyone aboard, including Suou, you, and any students nearby, will be in danger!"
13270-210 = "I did it!"
13270-211 = "Heeheeheeheehee...!"
13270-212 = "That was close...oh, so very close! I almost lost! Just one single second—no, not even that! Half a second later, and it all would’ve slipped away! Hah! A truly, beautifully thin line, teetering on the edge!"
13270-213 = "That truly was a close match... I admit it."
13270-214 = "[USERNAME] Sensei, the most formidable opponent I have ever faced!"
13270-215 = "But now, there will be no more miracles! I've neutralized your strength. "
13270-217 = "Behold! The climax of your demise, [USERNAME] Sensei."
13270-218 = "To all those shackled together by guilt."
13270-219 = "All you sinners."
13270-220 = "Seekers who chase elusive illusions, driven by guilt and desire."
13270-221 = "There lies a truth that pervades the body, mind, the entire world, yet no one has ever truly experienced it."
13270-222 = "And that...is death."
13270-223 = "Death. "
13270-224 = "Death."
13270-225 = "Death."
13270-226 = "Death. Death. Death. Death. Death. Death. Death. Death. Death. Death. Death. Death."
13270-227 = "A cold truth that cannot be escaped or overcome!"
13270-228 = "Grant me understanding."
13270-229 = "Grant me the answer to the sixth koan: Is a truth that never existed, still truth?#nGrant me true understanding!"
13270-234 = "Surveillance complete. "
13270-238 = "Wh-What?!"
13270-245 = "Initiating target analysis. "
13270-246 = "Wh-Who are you? How are you in this realm...?! "
13270-250 = "...Analysis partially completed. Entity name: Underground Dweller of Gematria. Continuing search. Analyzing abilities."
13270-251 = "This is an area of chaos, where existence and non-existence are undefined... How can you exist here...? You must be...!"
13270-252 = "...Search failed. Alien entity that should not exist in this world. Continuing search. Verifying unique abilities. "
13270-253 = "...An empty vessel containing divinity? But it's tainted by something. "
13270-254 = "Go away! Stop your meddling!"
13270-258 = "Has this place been discovered too...? "
13270-259 = "...But no matter. From here, we engage in a battle against time!"
13270-262 = "...I found it."
13270-263 = "Plana?!"
13270-264 = "[s] \"Plana!\""
13270-265 = "I've identified the source of the strange gaze I've been sensing. "
13270-266 = "He was hidden in an inverted realm...a sort of false world."
13270-267 = "A false world... "
13270-268 = "I was able to enter his hideout, since I've adapted to the Throne of Naram-Sin...a realm where existence and non-existence are undefined."
13270-269 = "He is the Underground Dweller of Gematria. "
13270-270 = "[s] \"Underground Dweller...!\""
13270-271 = "Do you know who he is, Plana?"
13270-272 = "No. I've never seen him before... As of now, I cannot determine his motives or plan. "
13270-273 = "...But I was able to analyze his abilities."
13270-274 = "We can consider it a...forced intervention. He is able to manipulate this world, even while hidden in another dimension."
13270-275 = "Forced intervention... Then...the explosion at Schale...?"
13270-276 = "Precisely. If not for us, Sensei would have..."
13270-277 = "[s] \"But I didn't. Thanks to you and Arona.\" "
13270-278 = "...Yes. "
13270-279 = "Sensei. Based on my analysis, all of the events leading up to this point have been part of a duel that the Underground Dweller has challenged you to. "
13270-280 = "[s] \"A duel...\""
13270-281 = "However, there seems to be a hidden motive layered within his strategy."
13270-282 = "The Underground Dweller... He seems to be..."
13270-284 = "...attempting to achieve something using Takanashi Hoshino, the Great Mystery of Kivotos."
13270-285 = "[s] \"Could his goal be the same as Black Suit's?\""
13270-286 = "...Unable to confirm. However, considering his abilities and the situation thus far, the consequences of this will spread far past the borders of the Abydos District."
13270-287 = "This..."
13270-292 = "If this comes to pass, everything could be in danger. "
13270-293 = "Sensei. We have to stop Hoshino..."
13270-294 = "[s] \"I understand.\""
13270-297 = "[ns] \"Hoshino has to be stopped.\""
13270-298 = "...B-But...we can't anymore..."
13270-299 = "We lost her..."
13270-300 = "She boarded the train and left the Valley..."
13270-302 = "Even if we chased her, we can't..."
13270-303 = "...Is it even possible? Stopping Hoshino, I mean.... "
13270-304 = "[s] \"I know someone who can help.\""
13270-306 = "...Help?"
13270-307 = "But..."
13270-308 = "[s1] \"She's not unrelated to all this...\"\n[s2] \"...And if anyone can stop Hoshino, she can.\""
13270-315 = "[ns] \"Please...stop Hoshino.\""
13270-317 = "...I will."
13270-318 = "[s] \"Hoshino is currently...\""
13270-319 = "I understand the situation."
13270-327 = "Hoshino should be on the train right now, returning to the Sector 35-9 junction station."
13270-328 = "Her plan must be to change trains there, then head to Great Oasis Station... That's the only route she can take."
13270-329 = "But...it's likely crawling with Kaiser PMC soldiers at this point. "
13270-330 = "I-Isn't that way too dangerous? She's heading straight into the enemy's stronghold."
13270-331 = "...She'll be able to handle it. "
13270-332 = "I thought I won earlier, but I was completely wrong. She was still holding back."
13270-333 = "...She's just too much."
13270-334 = "[s3] \"...Let's go after Hoshino.\"\n[s4] \"We have to stop her and Suou.\""
13270-337 = "... Okay. Understood."
13270-338 = "The sun's starting to set already... "
13270-339 = "Everyone's completely spent...but we'll just have to find a way."
13270-340 = "...Yeah. "
13270-371 = "Kaiser PMC...isn't here?"
13270-372 = "...That's odd. "
13270-376 = "To route the train to Great Oasis Station... I'll need to use the lever in the control room over there."
13270-383 = "..."
13270-384 = "Someone's inside..."
13270-399 = "I've been waiting for you, Takanashi Hoshino."
13270-402 = "Ah...? You mean..."
13270-403 = "Um... You're Gehenna's Head Prefect, right? "
13270-404 = "Whatcha doing here? You're not trying to get in this old-timer's way, are you?"
13270-405 = "You can't handle that Train Cannon on your own. Find another way."
13270-406 = "Hm, you think? I've always been able to solve my problems on my own just fine, actually."
13270-407 = "So will you move aside now? I've got a pretty packed schedule."
13270-411 = "...I see."
13270-415 = "If you insist, I'm afraid I'll have to use force to stop you."
13270-418 = "Oh? Is that how it's going to be? "
13270-419 = "I'm sure you know I've never lost a one-on-one fight, Miss Head Prefect."
13270-438 = "It's Sorasaki Hina."
13270-444 = "Next Episode;A Fearsome Clash 1"

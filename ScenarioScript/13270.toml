[translation]
13270-1 = "第27話;毫釐之差"
13270-3 = "……你變強了呢，白子醬。"
13270-9 = "哈啊……哈啊…… "
13270-10 = "因為有老師和我在一起。#n可是我還差得遠呢，星野前輩。"
13270-11 = "……不，你變強了，白子醬。"
13270-12 = "你一直在往前邁進。#n現在已經超越大叔我了……"
13270-13 = "……"
13270-18 = "星野前輩……"
13270-19 = "……"
13270-20 = "前輩……"
13270-25 = "[ns]「已經夠了吧，星野。」"
13270-29 = "真的是這樣嗎……"
13270-32 = "嗯，凱薩主張列車砲歸自己所有，這實在太不講理了。#n我們應該還能用其他方式戰鬥才對。"
13270-33 = "……應該是吧。因為有老師在。"
13270-34 = "應該有辦法……就像上次和上上次一樣。#n對吧……老師？"
13270-39 = "[ns]「沒錯，只要找出方法就行了。」"
13270-40 = "……"
13270-41 = "星野前輩……"
13270-42 = "野乃美醬……你覺得呢？"
13270-43 = "我……"
13270-44 = "我一直以來……都希望星野前輩能從失去夢會長的痛苦中獲得解脫。"
13270-45 = "但是人死不能復生，逝去的時間也無法回溯……"
13270-46 = "我認為星野前輩的痛苦是我的責任……#n即便我承擔不起也一樣……"
13270-53 = "或許我也一直執著於自己的愧疚……"
13270-54 = "說不定……星野前輩你也……"
13270-55 = "……"
13270-59 = "我……不明白夢會長和星野前輩的痛苦。"
13270-60 = "所以我不知道該說什麼……對不起，前輩。"
13270-61 = "白子醬……"
13270-62 = "但是……我想去了解。#n所以希望你能告訴我，前輩。"
13270-63 = "沒錯！應該告訴我們才對！#n不需要隨便負責，也不用擅自隱瞞！！"
13270-64 = "只要好好把話說清楚就行了！！我們不都是自己人嗎！！"
13270-65 = "茜香醬……"
13270-67 = "沒錯，前輩應該好好說明，讓我們一起判斷！"
13270-68 = "總不能讓我們對自己的自治區一無所知。#n你不該隱瞞！也不該獨自行動！！"
13270-69 = "你應該……向我們伸出手，讓我們和你一起面對……！！"
13270-70 = "綾音……不，學生會長。"
13270-71 = "叫我綾音醬吧……"
13270-72 = "綾音醬……"
13270-73 = "老師……各位……"
13270-75 = "……是我害死夢前輩的。"
13270-76 = "咦！？"
13270-77 = "那是……！"
13270-79 = "……我知道。#n那是一場意外，並不是我的錯。"
13270-80 = "但是……我一直這麼相信著。"
13270-81 = "夢前輩已經盡了學生會長該盡的責任和義務。"
13270-84 = "他對我非常溫柔……#n總是會親切地找我說話……總是會溫柔地擁抱我……"
13270-85 = "但我卻保護不了夢前輩留下的任何東西。#n我甚至沒抱過前輩……老是對他抱怨……對他發脾氣……"
13270-86 = "從夢前輩那裡得到的東西，我永遠無法報答。#n絕對……絕對……"
13270-89 = "因為前輩已經死了……"
13270-90 = "已經再也見不到他了……"
13270-93 = "[ns]「那不是你的錯，星野。」"
13270-94 = "……我知道，老師。#n我只是……想發牢騷而已。"
13270-95 = "但我也搞不清楚自己究竟……我……"
13270-96 = "我到底……"
13270-97 = "[ns]「我們回家吧，星野。」"
13270-98 = "……老師。"
13270-99 = "[s]「不必再痛苦下去了。」"
13270-100 = "就是啊，星野前輩，我們回去吧。#n回到對策委員會，回阿拜多斯。"
13270-101 = "嗯，沒錯，我們回去吧。"
13270-103 = "……嗯。回去吧。"
13270-109 = "來，牽著我的手。"
13270-113 = "……嗯，我知道了。"
13270-114 = "回去吧……回到我們的──"
13270-121 = "哎呀……那可不行。"
13270-126 = "這，這個聲音是……！？"
13270-127 = "是，是雷聲嗎！？"
13270-131 = "請看那裡！"
13270-145 = "動起來了？"
13270-146 = "怎，怎麼會……！？"
13270-147 = "啊，我的卡片在哪裡……！？"
13270-152 = "小鳥遊星野！！！"
13270-153 = "……！！"
13270-159 = "我已經發動列車砲了！有本事就來阻止我啊！"
13270-160 = "這門列車砲的第一個目標就是阿拜多斯高中！"
13270-161 = "！！"
13270-162 = "……！！"
13270-163 = "列車砲將會開往大綠洲站。#n我會在那裡等著……！！"
13270-164 = "到那裡找我吧！！來……（滋滋）阻止我吧……"
13270-173 = "等等，星野前輩……"
13270-180 = "唔……！"
13270-181 = "星，星野前輩……！！"
13270-182 = "[s]「星野……！！」"
13270-186 = "……老師，還有大家。謝謝你們。"
13270-187 = "但是這份痛苦，是夢前輩留給我的一切。#n所以我必須帶著這份痛苦活下去。"
13270-188 = "……我要去破壞列車砲。"
13270-189 = "如果夢前輩當時沒死，一定會要我做一樣的事。"
13270-190 = "……這是我2年前就該完成的事。"
13270-194 = "[ns]「星野！！等等啊！！」"
13270-195 = "逃走了！"
13270-196 = "要趕快追上去……"
13270-201 = "我確認到了！老師！"
13270-204 = "列車砲「謝瑪塔」擁有目前奇普托斯不存在的技術！"
13270-205 = "從構造上來看，列車砲是能射出接近太陽深處高溫等離子的兵器！"
13270-206 = "但是……那項技術並不完美。#n雖然有人試圖加以重現，但看起來是以失敗收場的未完成品！"
13270-207 = "但這並不代表其危險性不復存在。#n反而……因為不完美而更加危險，就像不知什麼時候會爆炸的巨型炸彈一樣！"
13270-208 = "如果嘗試破壞它的話……#n除了坐在上面的蘇芳同學之外，連星野同學和周圍所有學生的光環都會陷入危機！"
13270-210 = "成功了！！！"
13270-211 = "嘻嘻嘻嘻嘻嘻……！！"
13270-212 = "真是千鈞一髮啊……#n要是再晚1秒……不，哪怕再晚半秒就是我輸了！！"
13270-213 = "這場勝負真是太驚險了。#n同時我也不得不承認……"
13270-214 = "[USERNAME]老師，你是我對付過的人當中最強的敵人。"
13270-215 = "這樣奇蹟就不會再發生了。#n因為老師的力量已經被我瓦解。"
13270-217 = "那麼就進入[USERNAME]老師攻略戰的高潮吧。"
13270-218 = "來吧，因為愧疚而團結起來的人們。"
13270-219 = "罪人們啊。"
13270-220 = "追逐愧疚、慾望、恐懼、以及不明虛幻的求道者們。"
13270-221 = "這世上不曾有人親身體會，然而卻支配著我們身心和整個世界的真相。"
13270-222 = "就用它──啊啊，沒錯。死亡。"
13270-223 = "死亡。"
13270-224 = "死亡。"
13270-225 = "死亡。"
13270-226 = "死亡。死亡。死亡。死亡。死亡。死亡。死亡。死亡。死亡。死亡。死亡。死亡。"
13270-227 = "無法克服、無法迴避的冷酷真相。"
13270-228 = "帶給小生我相關的領悟吧。"
13270-229 = "第六項古則「不曾存在的真相是真相嗎」的答案，讓我明白其真正的含意吧──！！"
13270-234 = "探索。完成。"
13270-238 = "什，什，什麼！？"
13270-245 = "開始分析目標。"
13270-246 = "搞，搞什麼！你怎麼會在這個空間……！？"
13270-250 = "……部分分析完成。#n蓋瑪特利亞所屬，個體名稱為「地下生活者」。持續搜索。分析能力中。"
13270-251 = "這裡可是無法確定存在與非存在的混沌領域……#n竟然能存在於這個地方，你到底……！！"
13270-252 = "……搜索失敗。#n不曾存在於這個世界的異質存在。持續搜索。確認專屬能力。"
13270-253 = "……是盛裝神聖的容器嗎？#n但是卻遭到了某種東西的汙染。"
13270-254 = "別妨礙我，滾開！！"
13270-258 = "居然連這個地方也被發現了……"
13270-259 = "……但是無所謂。#n接下來就只是與時間的競賽罷了……！！"
13270-262 = "……我發現了。"
13270-263 = "星奈醬！？"
13270-264 = "[s]「星奈！」"
13270-265 = "已確定至今感受到的視線的真面目。"
13270-266 = "那個人躲藏在這個世界的反轉空間……一種渾沌領域之中。"
13270-267 = "混沌領域……"
13270-268 = "因為我已經適應無法確定存在與非存在的領域「納拉姆辛的王座」，#n所以才能接近他的藏身處。"
13270-269 = "對方是蓋瑪特利亞所屬的「地下生活者」。"
13270-270 = "[s]「地下生活者……！」"
13270-271 = "你知道這個存在嗎，星奈醬？"
13270-272 = "不，我也是第一次看到……#n他現在的目的和計畫……我都一無所知。無法掌握。"
13270-273 = "……但是我已經大致掌握那個存在的能力。"
13270-274 = "他能夠躲在世界的另一面操控這個世界，算是一種強行介入。"
13270-275 = "強行介入……#n也就是說，夏萊的爆炸也是……？"
13270-276 = "是的。#n如果沒有我們，老師恐怕已經……"
13270-277 = "[s]「但是我沒受傷，這都是彩奈醬和星奈醬的功勞。」"
13270-278 = "……是。"
13270-279 = "現在發生的這一切，似乎是地下生活者向老師發起的一場「對決」。"
13270-280 = "[s]「對決……」"
13270-281 = "但是這場對決，似乎被設計得充滿戰略性的意圖。"
13270-282 = "地下生活者……那個人恐怕……"
13270-284 = "想利用小鳥遊星野──「奇普托斯的最高神祕」做些什麼。"
13270-285 = "[s]「目的和黑色西裝人一樣啊。」"
13270-286 = "……無法確認。#n但是從他的能力和至今的情況來看，這不單純只是阿拜多斯自治區的問題。"
13270-287 = "那是……"
13270-292 = "……再這樣下去，恐怕一切都會陷入危機。"
13270-293 = "老師。還請務必阻止星野同學……"
13270-294 = "[s]「我知道了。」"
13270-297 = "[ns]「必須阻止星野。」"
13270-298 = "但，但是，我們已經……"
13270-299 = "被跑走了……"
13270-300 = "前輩搭火車離開學生會之谷了……"
13270-302 = "但是……就算追上去，現在也無法阻止……"
13270-303 = "……有辦法阻止星野前輩嗎？"
13270-304 = "[s]「我會拜託認識的人。」"
13270-306 = "……拜託？"
13270-307 = "但是……"
13270-308 = "[s1]「別擔心，那個人和這件事也有點關係。」\n[s2]「我想他應該有辦法阻止星野。」"
13270-315 = "[ns]「拜託了……拜託你阻止星野。」"
13270-317 = "……我知道了。"
13270-318 = "[s]「星野現在……」"
13270-319 = "情況我都清楚。"
13270-327 = "星野前輩現在應該正搭著火車，返回區域35-9的交匯站。"
13270-328 = "也許是想在那裡換車前往大綠洲站……畢竟那是唯一的路線。"
13270-329 = "但是……現在那裡被凱薩PMC佔領了。"
13270-330 = "那不是很危險嗎……根本是重新闖入敵人的巢穴。"
13270-331 = "……前輩應該沒問題吧。"
13270-332 = "剛才也以為已經打倒了，但根本不是。#n前輩就連剛才都沒有拿出全力……"
13270-333 = "……太過分了。"
13270-334 = "[s3]「…………去追星野吧。」\n[s4]「必須阻止蘇芳和星野。」"
13270-337 = "……是，老師。"
13270-338 = "太陽開始下山了呢……"
13270-339 = "雖然大家的體力都已經接近極限……也只能硬著頭皮上了。"
13270-340 = "……嗯。"
13270-371 = "凱薩PMC……不在這裡？"
13270-372 = "……真奇怪。"
13270-376 = "如果想發動開往大綠洲站的火車……就必須在那裡的管制室操作控制桿才行。"
13270-383 = "……"
13270-384 = "裡面有人……"
13270-399 = "等你很久了。小鳥遊星野。"
13270-402 = "咦……？"
13270-403 = "那個……你是格黑娜的風紀委員長醬吧？"
13270-404 = "待在這裡做什麼？該不會是想妨礙大叔我吧？"
13270-405 = "一個人對付那個列車砲是不可能的。找其他辦法吧。"
13270-406 = "哼～但大叔我一直都是這樣順利解決問題的。"
13270-407 = "不說這個了，可以請你讓開嗎？大叔我趕時間。"
13270-411 = "……這樣啊。"
13270-415 = "既然如此，只能用武力阻止了。"
13270-418 = "哦，是嗎～？"
13270-419 = "不過大叔我到目前為止，從來沒在一對一的對決中輸過哦？#n你應該也很清楚吧？[ruby=  ・     ・     ・     ・     ・     ・  ]風紀委員長醬[/ruby]。"
13270-438 = "我叫空崎[ruby= ・     ・ ]陽奈[/ruby]。"
13270-444 = "下一話;激戰（１）"

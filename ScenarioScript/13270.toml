[translation]
13270-1 = "ตอนที่ 27;แค่เสี้ยววินาที"
13270-3 = "เก่งขึ้นแล้วสินะ ชิโรโกะจัง..."
13270-9 = "แฮ่ก... แฮ่ก..."
13270-10 = "เพราะมีคุณครูอยู่ด้วยน่ะ แต่แรงฉันยังไม่หมดแค่นี้หรอก รุ่นพี่โฮชิโนะ"
13270-11 = "ไม่หรอก... เธอเก่งขึ้นจริงๆ นะ ชิโรโกะจัง"
13270-12 = "พัฒนาขึ้นเรื่อยๆ เลยนะ ตอนนี้เธอเก่งแซงหน้าลุงคนนี้แล้วละ..."

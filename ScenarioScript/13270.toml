13270-20 = "รุ่นพี่..."
13270-25 = "[ns] \"พอได้แล้วละ โฮชิโนะ\""
13270-29 = "งั้นเหรอ..."
13270-32 = "ค่ะ ไคเซอร์มุทะลุในการอ้างกรรมสิทธิ์ปืนแม่เหล็กไฟฟ้านั่นค่ะ เรายังสู้ด้วยวิธีอื่นได้นะคะ"
13270-33 = "ก็คงจะเป็นอย่างนั้นละ... มีครูอยู่ด้วยทั้งคนนี่เนอะ"
13270-34 = "งั้นก็น่าจะมีวิธีอื่น... เหมือนกับตอนนั้น และตอนก่อนหน้านั้นไปอีก ใช่มั้ยล่ะครู?"
13270-39 = "[ns] \"ใช่ แค่เราต้องหาวิธีก็พอ\""
13270-40 = "..."
13270-41 = "รุ่นพี่โฮชิโนะ..."
13270-42 = "โนโนมิจัง... เป็นยังไงบ้าง?"
13270-43 = "ฉันไม่เป็นไรค่ะ..."
13270-44 = "ฉันอยากให้รุ่นพี่โฮชิโนะหลุดพ้นจากความเจ็บปวดที่สูญเสียประธานยูเมะไปค่ะ..."
13270-45 = "แต่คนที่ตายไปแล้วคงกลับมาไม่ได้ และเวลาที่ผ่านไปแล้วไม่อาจย้อนคืนมาได้อีก..."
13270-46 = "เพราะแบบนี้ ที่ผ่านมาฉันเลยคิดว่าความเจ็บปวดของรุ่นพี่โฮชิโนะคือความรับผิดชอบของฉันค่ะ... ถึงนั่นจะเป็นสิ่งที่ฉันไม่อาจรับผิดชอบได้ก็เถอะ..."
13270-53 = "บางทีฉันอาจจะยึดติดกับความรู้สึกผิดของตัวเองอยู่ก็ได้ค่ะ..."
13270-54 = "และบางที... รุ่นพี่โฮชิโนะเองก็..."
13270-55 = "..."
13270-59 = "ฉัน... ไม่รู้ถึงความเจ็บปวดของประธานยูเมะหรือรุ่นพี่โฮชิโนะ"
13270-60 = "ก็เลยไม่รู้ว่าต้องพูดอะไร... ขอโทษนะรุ่นพี่"
13270-61 = "ชิโรโกะจัง..."
13270-62 = "แต่ว่า... ฉันก็อยากรู้ ช่วยบอกกันหน่อยเถอะนะ รุ่นพี่"
13270-63 = "ใช่! ต้องบอกพวกเราให้รู้ด้วยสิ! ไม่เห็นต้องมารับผิดชอบหรือซ่อนอะไรไว้คนเดียวเลย!!"
13270-64 = "ทำไมไม่บอกรายละเอียดกันล่ะ!! เราเป็นรุ่นพี่รุ่นน้องกันนะ!!"
13270-65 = "เซริกะจัง..."
13270-67 = "ใช่ค่ะ ควรจะบอกให้ถูกต้อง และให้พวกเราช่วยกันตัดสินสิคะ!"
13270-68 = "พวกเราจะไม่รู้จักเขตปกครองตนเองและเรื่องราวของตัวเองไม่ได้ค่ะ รุ่นพี่ไม่ควรปิดเรื่องนี้ไว้! และไม่ควรทำอะไรคนเดียวสิคะ!!"
13270-69 = "ต้องยื่นมือขอความช่วยเหลือ... แล้วแก้ปัญหาด้วยกันทุกคนสิคะ...!!"
13270-70 = "อายาเนะ... ไม่สิ ท่านประธานสภานักเรียน"
13270-71 = "อายาเนะจังค่ะ..."
13270-72 = "อายาเนะจัง..."
13270-73 = "คุณครู... ทุกคน..."
13270-75 = "ฉันเองที่เป็นคนฆ่ารุ่นพี่ยูเมะ..."
13270-76 = "คะ?!"
13270-77 = "เรื่องนั้นมัน...!"
13270-79 = "ฉันรู้... รู้ดีว่ามันเป็นอุบัติเหตุ... รู้ว่านั่นไม่ใช่ความผิดของฉันหรอก"
13270-80 = "แต่ว่า... ฉันก็เชื่ออย่างนั้นมาตลอด"
13270-81 = "รุ่นพี่ยูเมะทำหน้าที่และรับผิดชอบงานของประธานสภานักเรียนได้ดีมาโดยตลอด"
13270-84 = "รุ่นพี่เอาใจใส่ฉัน... พูดกับฉันด้วยถ้อยคำอ่อนโยน... และกอดฉันอย่างอบอุ่นเสมอ..."
13270-85 = "แต่ฉันก็รักษาสิ่งที่รุ่นพี่ยูเมะเหลือทิ้งไว้ไม่ได้สักอย่าง แล้วก็ไม่เคยกอดรุ่นพี่เลยด้วย... เพราะฉันเอาแต่บ่น ไม่พอใจ แล้วก็หงุดหงิดใส่ตลอด..."
13270-86 = "ชาตินี้ฉันคงตอบแทนสิ่งที่ได้รับมาจากรุ่นพี่ยูเมะไม่หมดหรอก ไม่มีทาง... แน่นอน..."
13270-89 = "รุ่นพี่ตายจากไปแล้ว..."
13270-90 = "ฉันเจอรุ่นพี่อีกครั้งไม่ได้แล้ว..."

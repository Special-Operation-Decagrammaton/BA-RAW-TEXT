[translation]
1003808-1 = "SRT，休息！"
1003808-2 = "兔寶寶公園"
1003808-4 = "（都子正以慵懶的表情，面對著太陽發呆）"
1003808-5 = "（似乎沒有注意到這邊……）"
1003808-6 = "呼……今天天氣真好呢。"
1003808-7 = "[s] 「早呀，都子。」"
1003808-8 = "老，老師？這麼突然有什麼事嗎……"
1003808-9 = "有什麼緊急的事嗎？還是有新的任務……？"
1003808-10 = "咦……？看了我剛剛的訊息有點擔心所以就過來了嗎？"
1003808-11 = "啊哈哈……真，真的沒什麼。沒有發生什麼事的……"
1003808-12 = "明明沒事卻還是打擾老師感覺有點抱歉……所以中途就放棄了。"
1003808-13 = "真是奇怪呢，明明沒事卻想要聯絡老師……"
1003808-14 = "[s1] 「不奇怪唷。」\n[s2] 「隨時都可以叫我唷。」"
1003808-15 = "真的嗎……呵呵，謝謝老師這麼說。"
1003808-16 = "真的嗎……呵呵，謝謝老師這麼說。"
1003808-17 = "老師，如果你不忙的話，要不要一起在公園享受一下日光浴啊？"
1003808-18 = "灑下的日光十分溫暖，很舒服的唷。"
1003808-21 = "[s] 坐在都子旁邊"
1003808-26 = "……可以稍微，再靠近一點嗎？"
1003808-27 = "雖然兔子就算感到寂寞也不會衰弱……但是，我又不是兔子。"
1003808-29 = "（之後，和都子一起享受日光浴後回到了夏萊）"

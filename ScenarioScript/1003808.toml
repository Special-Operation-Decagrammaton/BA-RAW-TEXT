[translation]
1003808-1 = "SRT หยุดพักผ่อน!"
1003808-2 = "โคะอุซางิ การ์เด้น"
1003808-4 = "(มิยาโกะกำลังนั่งรับแดดด้วยสีหน้าที่สดใสเป็นพิเศษ)"
1003808-5 = "(ดูเหมือนเธอจะไม่ได้สังเกตเห็นคุณครู...)"
1003808-6 = "ฮู่ว... วันนี้อากาศดีจังเลยนะ"
1003808-7 = "[s] \"ว่าไง มิยาโกะ\""
1003808-8 = "คะ... คุณครู? มีเรื่องอะไรถึงมาที่นี่งั้นเหรอคะ...?"
1003808-9 = "โดนเรียกตัวมากะทันหันเหรอคะ? หรือว่ามีภารกิจใหม่คะ...?"
1003808-10 = "คะ...? เห็นข้อความของฉันที่ส่งไปเมื่อครู่แล้วเป็นห่วงก็เลยมาหาเหรอคะ?"
1003808-11 = "อ่ะฮะฮะฮะ... มะ...ไม่มีอะไรจริงๆ ค่ะ ไม่มีเรื่องอะไรหรอกค่ะ"
1003808-12 = "ฉันรู้สึกผิดที่จะเรียกคุณครูออกมาทั้งที่ไม่มีเรื่องอะไรแท้ๆ เลยหยุดส่งข้อความไปกลางคันค่ะ"
1003808-13 = "แปลกดีใช่ไหมล่ะคะ เรื่องที่อยากเรียกคนอื่นออกมาหา ทั้งที่ไม่มีเรื่องอะไรแท้ๆ..."
1003808-14 = "[s1] \"ไม่แปลกหรอก\"\n[s2] \"เรียกครูได้ตลอดเลยนะ\""
1003808-15 = "งะ...งั้นเหรอคะ ฮิฮิ ขอบคุณที่อุตส่าห์พูดแบบนั้นนะคะ"
1003808-16 = "งะ...งั้นเหรอคะ ฮิฮิ ขอบคุณนะคะ"
1003808-17 = "ถ้าคุณครูไม่ติดงานอะไรละก็ มานั่งรับแดดอุ่นๆ ที่สวนสาธารณะนี่สักหน่อยดีไหมคะ?"
1003808-18 = "แสงแดดอบอุ่นช่วยให้รู้สึกสบายตัวจริงๆ นะคะ"
1003808-21 = "[s] นั่งลงข้างๆ มิยาโกะ"
1003808-26 = "ขยับเข้ามานั่งใกล้ๆ ฉันอีกหน่อยสิคะ"
1003808-27 = "ถึงกระต่ายจะไม่ตายเพราะความเหงา... แต่ว่าฉันไม่ใช่กระต่ายนี่คะ"
1003808-29 = "(หลังจากนั้นคุณครูก็นั่งรับแดดอยู่กับมิยาโกะครู่หนึ่ง ก่อนจะกลับไปที่ชาเล่ต์)"

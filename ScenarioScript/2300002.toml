[translation]
2300002-1 = "ขอของหวานแทนข้าวกลางวันนะ"
2300002-2 = "สำนักงานชาเล่ต์"
2300002-4 = "(คุณครูกลับมาจากการทำงานนอกสถานที่และพบว่ามีเอกสารมากมายวางอยู่บนโต๊ะ)"
2300002-5 = "(สุดท้ายก็จัดการเอกสารบนโต๊ะจนไม่ได้กินอาหารกลางวัน)"
2300002-8 = "คุณครู อยู่มั้ยคะ?"
2300002-12 = "สวัสดีค่ะคุณครู!"
2300002-13 = "วันนี้เป็นยังไงบ้างเหรอคะ?"
2300002-14 = "[s1] \"ฮ่าฮ่าฮ่า... ก็ดีนะ\"\n[s2] ไม่ตอบแต่จ้องไปที่โต๊ะ"
2300002-15 = "เอ๋? คุณครูต้องทำงานหนักขนาดนี้เลยเหรอคะ?"
2300002-16 = "เอ๋? คุณครูต้องทำงานหนักขนาดนี้เลยเหรอคะ?"
2300002-17 = "ว้าว... การเป็นผู้ใหญ่นี่ต้องรับผิดชอบอะไรเยอะจัง..."
2300002-18 = "จริงสิ! ทานมื้อกลางวันหรือยังคะ?"
2300002-19 = "เอ๋? ยังไม่ได้ทานอีกเหรอคะ?"
2300002-20 = "อิอิอิ"
2300002-21 = "ฉันรู้ว่าต้องเป็นแบบนี้ ก็เลยเตรียมของหวานมาให้คุณครูไงคะ!"
2300002-22 = "วันนี้ร้าน <คาเฟ่มิลเฟย> ออกเมนูใหม่พอดีเลยค่ะ!"
2300002-23 = "ฉันอยากกินกับคุณครูก็เลยซื้อนู่นซื้อนี่มาเยอะแยะเลยค่ะ"
2300002-25 = "ดูสิคะ~!"
2300002-26 = "(ไอริหยิบคัพเค้กหน้าตาหลากหลายออกมาจากกระเป๋า)"
2300002-27 = "นี่คือคัพเค้กแบบใหม่ที่เพิ่งวางขายค่ะ!"
2300002-28 = "เป็นยังไงล่ะคะคุณครู? น่ากินมากเลยใช่มั้ยคะ?"
2300002-29 = "รับไปสิคะ! อันนี้เป็นคัพเค้กราสเบอร์รี่ค่ะ!"
2300002-30 = "ฉันลองชิมตัวอย่างจากที่ร้านดูแล้วค่ะ ทางร้านน่าจะใช้ราสเบอร์รี่จริงๆ นะคะ"
2300002-31 = "เป็นรสหวานอมเปรี้ยวที่หาจากผลไม้อื่นไม่ได้เลยล่ะ....!"
2300002-33 = "ส่วนนี่เป็นคัพเค้กที่ทำจากกล้วยค่ะ!"
2300002-34 = "ฉันไม่ได้ลองชิมมาก่อน แต่ซื้อมาเพราะสีสวยดีน่ะค่ะ"
2300002-35 = "ส่วนอันนี้..."
2300002-37 = "คัพเค้กมินต์ช็อกโกแลต!"
2300002-38 = "จริงๆ เป็นเค้กที่มีในเมนูอยู่แล้วค่ะ"
2300002-39 = "แต่ว่าซื้อมาเพราะฉันอยากกินน่ะค่ะ"
2300002-40 = "รสหวานของช็อกโกแลตกับรสที่เย็นสดชื่นของมินต์..."
2300002-41 = "......"
2300002-42 = "[s3] \"ไอริ?\"\n[s4] \"ใจเย็นก่อนนะนักเรียน\""
2300002-43 = "...อ๊ะ!?"
2300002-44 = "...อ๊ะ!?"
2300002-45 = "อะฮ่าฮ่าฮ่า... สติฉันเตลิดไปที่อื่นมาน่ะค่ะ"
2300002-46 = "คุณครูจะเริ่มทานจากเค้กอะไรก่อนเหรอคะ?"
2300002-48 = "(คุณครูกินคัพเค้กกับไอริแล้วฟังไอริอธิบายเกี่ยวกับเมนูขนมหวานอื่นๆ)"
2300002-49 = "(ดูเหมือนว่างานเอกสารบนโต๊ะน่าจะต้องเก็บไปทำวันอื่นแล้วล่ะ)"

[translation]
2300002-1 = "Dessert Over Lunch"
2300002-2 = "Schale Executive Office"
2300002-4 = "I returned from a business trip to find my desk at Schale piled with documents."
2300002-5 = "I decided to skip lunch to organize all the papers on my desk."
2300002-8 = "Sensei, are you there?"
2300002-12 = "Hi there, Sensei!"
2300002-13 = "How's your day been?"
2300002-14 = "[s1] \"Ahaha, well...\"\n[s2] Stare at your desk without saying a word."
2300002-15 = "Huh? Is all of that your paperwork?"
2300002-16 = "Huh? Is all of that your paperwork?"
2300002-17 = "Wow. Adults really do have a lot of responsibilities..."
2300002-18 = "Oh! Have you had lunch yet?"
2300002-19 = "*gasp* You still haven't eaten?"
2300002-20 = "Oh, no. That won't do."
2300002-21 = "I had a feeling you'd skip lunch, so I brought dessert for you!"
2300002-22 = "Mille-Feuille Cafe launched some new items today!"
2300002-23 = "I was hoping I could try them with you, so I brought them over."
2300002-25 = "Ta-da!"
2300002-26 = "Airi took several different pastries out of her bag."
2300002-27 = "These are their new cupcakes!"
2300002-28 = "What do you think, Sensei? Don't they look delicious?"
2300002-29 = "This one is filled with raspberries!"
2300002-30 = "They let me nibble a sample earlier... I wonder if that flavor really was raspberry."
2300002-31 = "It was so tangy and unique!"
2300002-33 = "And this cupcake is made with bananas!"
2300002-34 = "They didn't have any samples, but the color was so pretty I just couldn't resist!"
2300002-35 = "And this one..."
2300002-37 = "...is a mint chocolate cupcake!"
2300002-38 = "Actually, this one isn't even new."
2300002-39 = "I just wanted one."
2300002-40 = "The sweet flavor of the chocolate combined with the refreshing taste of mint..."
2300002-41 = "..."
2300002-42 = "[s3] \"Airi?\"\n[s4] \"Ground control to Airi.\""
2300002-43 = "Huh?!"
2300002-44 = "Huh?!"
2300002-45 = "Haha... Sorry. I spaced out there. "
2300002-46 = "Anyway, which one do you want to try first, Sensei?"
2300002-48 = "I spent a good while eating cupcakes with Airi as she explained the various flavors."
2300002-49 = "I guess I'll have to get back to those documents later."

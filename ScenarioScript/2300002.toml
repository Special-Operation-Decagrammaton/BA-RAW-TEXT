[translation]
2300002-1 = "代替午餐的甜點"
2300002-2 = "夏萊．辦公室"
2300002-4 = "（結束外勤回到夏萊，辦公桌上堆了一山文件）"
2300002-5 = "（結果連午飯也沒時間吃，就直接開始整理書桌上的文件）"
2300002-8 = "老師，你在嗎？"
2300002-12 = "啊，老師好！"
2300002-13 = "上次看老師好像很忙，今天如何呢？"
2300002-14 = "[s1] 「啊哈哈，馬馬虎虎吧……」\n[s2] 默默地凝視桌子"
2300002-15 = "哇！這些全是工作相關的文件嗎……？"
2300002-16 = "哇！這些全是工作相關的文件嗎……？"
2300002-17 = "大人還真是辛苦呢……"
2300002-18 = "對了！老師吃過午餐了嗎？"
2300002-19 = "還沒嗎？那時機正好。"
2300002-20 = "哼哼哼……"
2300002-21 = "我就知道有這種可能，所以已經幫老師買好甜點了！"
2300002-22 = "正好今天「Café．Mille-feuille」有推出新產品！"
2300002-23 = "為了和老師一起吃，我有買了很多種類。"
2300002-25 = "鏘鏘～！"
2300002-26 = "（各種形狀的杯子蛋糕，從愛莉的包包中掉了出來）"
2300002-27 = "這些是這次新推出的杯子蛋糕！"
2300002-28 = "如何？看起來很好吃吧？"
2300002-29 = "請用！這個是樹莓口味！"
2300002-30 = "我剛才有試吃過一點，真的非常好吃唷！"
2300002-31 = "這種絕佳的酸甜樹莓滋味，可不是隨處都有的喔……！"
2300002-33 = "然後這個是香蕉口味！"
2300002-34 = "這個沒有試吃品，我只是看它顏色很漂亮就買了！"
2300002-35 = "還有這個……！"
2300002-37 = "巧克力薄荷口味！"
2300002-38 = "其實這個不是新產品，是本來就有的口味。"
2300002-39 = "但是因為我太喜歡了！一看到就忍不住買下來了！"
2300002-40 = "99;巧克力的甜味搭配上薄荷的清爽，實在是人間美味……！"
2300002-41 = "啊～……"
2300002-42 = "[s3] 「……愛莉？」\n[s4] 「飛去了另一個世界嗎？沒事吧？」"
2300002-43 = "……哈！？"
2300002-44 = "……哈！？"
2300002-45 = "啊哈哈哈……抱歉，我剛才神遊了一下……"
2300002-46 = "嗯，總之，老師想要先吃哪個呢？"
2300002-48 = "（之後便和愛莉一起吃杯子蛋糕，一邊聽她講解各種口味的知識）"
2300002-49 = "（總之今天先儲存體力，下次再處理堆積如山的文件）"

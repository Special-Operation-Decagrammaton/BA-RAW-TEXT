103080-151 = "อื้ม ใช่แล้วละ"
103080-152 = "...... ค่ะ อย่างน้อยก็เพื่อช่วยรุ่นพี่ชิโรโกะกลับมาให้ได้"
103080-154 = "เฮ้อ... ช่วยไม่ได้นี่นะ"
103080-155 = "ถ้ามาถึงตรงนี้แล้ว ก็คงต้องก้าวต่อไปละค่ะ"
103080-157 = "ถ้าอย่างนั้น ช่วยเตรียมตัวให้สามารถปล่อยเรือรบอุตนาพิชทิมในอีก 8 ชั่วโมงจากนี้ด้วยค่ะ"
103080-158 = "ว่าไงนะ?!  ดะ... เดี๋ยวนะ 8 ชั่วโมงเหรอ? "
103080-159 = "เรามีคู่มือกันแล้วนี่คะ ถ้าจำทั้งหมดนี้ได้ละก็ ยังไงก็ต้องทำได้ค่ะ"
103080-160 = "มะ... มีคนแบบนี้ด้วยเหรอเนี่ย? งั้นฉันก็ต้องท่องจำคู่มือหนาๆ เล่มนี้ให้หมดภายในไม่กี่ชั่วโมงน่ะสิ......"
103080-161 = "อย่าถามว่าทำได้หรือเปล่า แต่จงบอกตัวเองว่าต้องทำค่ะ คนที่ได้อ่านและจำคู่มือทั้งหมดได้ จะต้องช่วยเป็นโอเปอเรเตอร์ของ <เรือรบอุตนาพิชทิม> ค่ะ"
103080-162 = "เฮ้อ... โอเปอเรเตอร์งั้นเหรอ... อย่างน้อยก็ต้องมี 10 คนแล้วมั้ย..."

[translation]
103080-1 = "第8話;作戰簡報"
103080-14 = "來，這就是作戰計劃書。"
103080-15 = "多虧了各位的協助才得以完成。"
103080-16 = "作戰名稱為──「阿特拉哈西斯的方舟占領戰」。"
103080-17 = "……也許，這會是我們最後的作戰吧。"
103080-19 = "最，最後……"
103080-21 = "如果成功就無法再造出聖所，失敗的話奇普托斯就完蛋……"
103080-22 = "是呢，不管結果如何，這都會是最後的作戰。"
103080-24 = "只要成功就好了吧！？#n請別說那種會讓人感到不安的話，佳世子同學！"
103080-29 = "而且專家們也一起驗證過了不是嗎？"
103080-30 = "應該沒有比這更完美的作戰了。"
103080-32 = "……那麼進入作戰說明。"
103080-35 = "我們的目標是破壞位於奇普托斯上空的「阿特拉哈西斯的方舟」。"
103080-36 = "如果能順利破壞它，就能阻止「虛假的聖所」出現。"
103080-39 = "然而，方舟被不受物理介入的「共存狀態」防護罩所保護。"
103080-40 = "只要那個防護罩存在，我們就無法在物理層面接近方舟。"
103080-42 = "不過只要讓「生命守護者本艦」處於相同的狀態，理論上就能夠通過防護罩。"
103080-44 = "簡單來說，只要能成為和對手相同的存在，就能加以干涉了～"
103080-46 = "為此所需的計算，預計會以這艘船的演算裝置來進行。"
103080-48 = "……如果計算失敗會怎麼樣？"
103080-54 = "這個嘛……萬一在計算失敗的狀態下進入防護罩所展開的的空間──"
103080-55 = "運氣差的話會以原子為單位四分五裂，#n即使運氣好也會從船內彈出，從75,000m的高空墜落。"
103080-57 = "從，從那麼高的地方自由落體……光環會被破壞的吧……"
103080-58 = "不，我想在那之前，肉體會先撐不住吧。"
103080-62 = "在75,000m的高度下，氣溫會遠低於零下60度。#n只要呼吸就會讓肺部結凍吧。"
103080-63 = "連體液也會瞬間汽化……#n總之，在那種環境下不用2分鐘，光環就會被破壞。"
103080-64 = "謝，謝謝你的說明，佳世子同學。#n真是非～常……值得參考。"
103080-69 = "──我繼續說明。畢竟就算假設失敗的情況也只會讓人不安而已。"
103080-70 = "通過防護罩後，給予方舟物理上的衝擊──並入侵方舟內部。"
103080-71 = "若能順利入侵，就對其主要設施進行駭入，#n為了讓方舟無法繼續運作，必須徹底予以破壞。"
103080-72 = "當然，也會受到方舟內敵人的抵抗吧。"
103080-73 = "在防禦敵人攻擊的同時，一步步[ruby=駭入]占領[/ruby]方舟的各個區域，最終奪走方舟的控制權──#n這就是本作戰的最終目標。"
103080-75 = "……掌握控制權後，就能讓方舟自爆或墜落到地面上吧。"
103080-76 = "沒錯……駭入方舟，加以奪取──這就是我們的勝利條件。"
103080-78 = "感謝說明。目標相當單純呢。"
103080-79 = "話說──"
103080-85 = "……那個，我是支援型AMAS──"
103080-90 = "莉央會長～～！？"
103080-95 = "……瞬間就被發現了呢。"
103080-96 = "突然下落不明，我還以為你跑去哪裡了……#n居然在這種地方！？還有，你本人現在在哪裡做什麼啊？"
103080-97 = "這，這個……"
103080-98 = "……這裡可是有愛麗絲醬和遊戲開發部哦？#n你到底想做什麼？"
103080-99 = "……莉央只是在協助我而已。"
103080-103 = "我會監視著它的，請別擔心。#n只要有任何異常舉動，我就會立刻加以破壞。"
103080-104 = "唉……"
103080-105 = "雖然不知道你有什麼企圖，請絕對不要接近遊戲開發部哦！"
103080-106 = "雖然還有很多話想跟會長說……#n嗯……之後我會從貪汙那件事開始徹底追究的！"
103080-111 = "……我知道了。"
103080-112 = "為了以防萬一，我會試著尋找回到地上的方法。#n……當然，是在你們同意的情況下。"
103080-113 = "是呢，那就拜託了。#n如果船遭到破壞，我們就會被困在方舟裡進退兩難。"
103080-114 = "──那麼，我立刻去準備。"
103080-117 = "步，我們還剩下多少時間？"
103080-122 = "那個……距離聖所再次出現的時間……預計還剩下12小時。"
103080-124 = "唔唔～#n……必須在那之前占領方舟對吧？"
103080-125 = "雖然很不想這麼說……這個作戰真的是可以實現的嗎？"
103080-127 = "是的。經過無數次模擬後，成功的機率是──"
103080-128 = "竟然，有3%。"
103080-129 = "3%……？"
103080-130 = "……只能相信這奇蹟般的機率了呢。"
103080-131 = "[s]「即便如此，我認為還是非常值得一試的哦。」"
103080-133 = "……是。老師說的沒錯。"
103080-134 = "奇普托斯前所未有的事態……我們打從一開始就面對著這些無法理解的問題──#n並且堅持到了這裡。"
103080-136 = "最初的徵兆，是百合園聖亞的「預言」。"
103080-137 = "接著，探測到了6股超高濃度的能量，但當時那不過是存在卻看不見的神祕現象。"
103080-139 = "接著出現的「虛假的聖所」，#n集結至今為止奇普托斯發生過的所有「神祕」，發動了攻擊。"
103080-140 = "無法控制的AI「十字神名」、重現記憶的「[ruby=Mimesis]複製[/ruby]」、#n名為「無名之神」的超古代技術──"
103080-141 = "──以及，扭曲學生存在的「色彩」。"
103080-143 = "雖然透過聯合作戰擊倒守護者，並成功破壞了所有聖所……"
103080-144 = "如今，聖所又將像最初那樣出現……#n但是，這次我們不會再坐以待斃。我們已經找出了解決的方法。"
103080-145 = "──目前為止發生的現象，沒有一個是能夠解明的。"
103080-146 = "預言、十字神名、[ruby=Mimesis]複製[/ruby]、色彩、無名之神、[ruby=Divi:Sion]分裂者[/ruby]、虛假的聖所、守護者──#n以及身為色彩嚮導者的[ruby=Phrenapates]誘騙者[/ruby]……"
103080-147 = "就算成功率只有3%也沒關係。#n我們只需要像以往一樣執行作戰就可以了。"
103080-148 = "[s]「嗯，大家一起合力試試看吧。」 "
103080-150 = "……是呢。#n畢竟除此之外也別無他法，選項打從一開始就不存在。"
103080-151 = "沒錯……"
103080-152 = "……是。為了將白子前輩帶回來。"
103080-154 = "唉……也只能做了呢。"
103080-155 = "是的……既然都來到這裡，已經沒有其他選擇了。"
103080-157 = "那麼，為了讓「生命守護者本艦」能在8個小時內啟航，請各位儘速準備。"
103080-158 = "咦，先等一下！#n8小時後就要出發！？"
103080-159 = "已經有操作手冊了。請把它記在腦袋裡。"
103080-160 = "不不不，要在幾個小時內把這麼厚的手冊全都記住也太強人所難了吧！？"
103080-161 = "不是能不能做到的問題，而是[ruby= ・     ・     ・     ・     ・ ]非做到不可[/ruby]。#n請熟讀手冊的人擔任操作員。"
103080-162 = "唉……話說，操作員最少也需要10人呢……"
103080-163 = "[s]「那，我來擔任總負責人吧。」"
103080-164 = "咦，老師嗎？"
103080-165 = "[s]「我有希迪姆的箱子，所以一定會有辦法的。」"
103080-166 = "……我來支援老師。"
103080-168 = "琳，琳前輩？"
103080-170 = "都走到這一步了，我也會跟到最後的。#n只讓老師負擔最危險的工作，這種事我可不能容忍。"
103080-171 = "[s]「琳，謝謝你。真是可靠呢。」"
103080-177 = "如，如果只要記住手冊的話，#n我應該也能做到……"
103080-179 = "連步前輩也！？"
103080-181 = "既然老師都這麼說了，我怎麼可能退出呢。#n算我一個吧。"
103080-182 = "我也會一起同行。#n我可是很擅長記東西的。在形形色色的方面……♡"
103080-184 = "唉……身為格黑娜風紀委員會行政官的我，可不能逃避應盡的職責。"
103080-185 = "我也加入。"
103080-186 = "也請讓我一起去吧！"
103080-187 = "說不害怕是騙人的……"
103080-188 = "但是，我想去幫助白子前輩。"
103080-190 = "雖然這不是我來的目的，唉……#n在這種氣氛下也不能說要回去啊。我也加入。"
103080-192 = "哇……大家都鬥志滿滿呢。"
103080-193 = "啊，順帶一提，我沒辦法哦？"
103080-194 = "桃香醬……都來到這裡了，卻打算跟我們分頭行動……？"
103080-201 = "之前明明說過「會跟到宇宙的盡頭唷」的……"
103080-203 = "哇，哇哇哇！請不要露出那種表情啊步前輩！？"
103080-204 = "……知道了，知道了啦！"
103080-205 = "我也參加！#n總會……有辦法吧……？"
103080-207 = "呵呵，宇宙戰艦的乘務員，聽起來真不錯呢♡"
103080-208 = "話說，我們有制服嗎？"
103080-210 = "制，制服……？"
103080-211 = "哎呀？我們可是宇宙戰艦的乘務員哦？#n就該要有專用的服裝不是嗎？"
103080-213 = "等，等等。專用服裝……？"
103080-214 = "嗯，我應該可以準備。"
103080-215 = "什麼，響！？妳有時間準備那種東西嗎？"
103080-216 = "畢竟是宇宙戰艦的乘務員。"
103080-217 = "這不是做不做得到的問題……"
103080-219 = "只能做了。"
103080-223 = "說的沒錯！可不能背叛工程師部的浪漫啊！#n在說著「起飛！」、「高度上升！」、「集中能量！」這些台詞的時候，#n要是穿著普通的制服不是很遜嗎？"
103080-224 = "……那倒也是。"
103080-225 = "好，就這麼做吧。"
103080-226 = "是！我也來找資料！#n漫畫跟動畫裡可是常常會出現啊！"
103080-228 = "嗯。那我立刻開始製作。先從測量大家的尺寸開始──"
103080-229 = "哎呀哎呀♡……真是令人期待。#n話說關於設計的部分，不介意的話可以和我進行深度的討論嗎？"
103080-231 = "那我就來為服裝追加其他功能，改造成飛行員套裝的風格吧♪"
103080-232 = "老師有沒有什麼意見呢？"
103080-233 = "[s]「有有有，我有意見！！果然說到宇宙戰艦──」"
103080-235 = "突然有點不安呢……"
103080-237 = "[ns1]「果然得有帽子對吧！！」\n[ns2]「雖然老套可是不能缺少領巾吧！」\n[ns3]「艦長就是要穿長大衣對吧！！」"
103080-243 = "比，比想像中還具體呢……"
103080-244 = "原來如此。我會參考的。"
103080-246 = "（怎麼會變成這種情況……）"
103080-250 = "呼，情況大致整理好了。"
103080-251 = "那麼，現在開始進行起飛準備，#n預計在8個小時後向「方舟」出發。"
103080-252 = "操作員、航空管控負責人、駭入負責人……#n還有調理負責人與治療負責人……"
103080-253 = "嗯。除此之外，還必須召集執行方舟占領戰的學生。#n唉，該做的事堆積如山呢～"
103080-259 = "……琳前輩。"
103080-260 = "前輩、老師、以及夏萊的學生全都不眠不休地走到了這一步。"
103080-261 = "但是，距離作戰開始還有一些時間。#n要不要趁這個時間稍微休息一下呢？尤其是琳前輩……"
103080-262 = "……說的也是。"
103080-263 = "睡眠不足會造成判斷的遲鈍……#n為了不影響今後的作戰，我就接受你的好意吧。"
103080-264 = "那麼各位，我們預計在8小時後，於破曉之時出發。"
103080-265 = "在那之前……請各位盡可能好好休息。"
103080-266 = "那麼，解散。"
103080-268 = "下一話;陸上的最後一夜"

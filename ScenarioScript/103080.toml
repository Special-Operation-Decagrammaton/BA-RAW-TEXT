103080-129 = "3%...... "
103080-130 = "อืม... ต้องทำให้เปอร์เซ็นต์แห่งปาฏิหาริย์นี้สำเร็จให้ได้สินะคะ"
103080-131 = "[s] \"แต่มันคุ้มค่าที่จะลองเสี่ยงดูนะ\""
103080-133 = "...... ค่ะ คุณครูพูดถูกค่ะ "
103080-134 = "ถึงคิโวทอสจะต้องเจอกับสถานการณ์ที่ไม่เคยมีมาก่อน... แต่พวกเราก็ฝ่าฟันปัญหาที่ยากจะแก้ไขเหล่า#nนั้นมาได้จนถึงจุดนี้แล้วนะคะ"
103080-136 = "หลังจากที่เราได้ <คำพยากรณ์> ที่เป็นลางสังหรณ์แรกจากยูริโซโนะ เซอา......"
103080-137 = "ในตอนที่มีการตรวจพบมวลพลังงานความเข้มข้นสูงทั้ง 6 ที่กระจายไปทั่วคิโวทอส มันเป็นเพียงแค่#nปรากฏการณ์อันน่าฉงนที่ไม่อาจเข้าใจได้ ปรากฏการณ์ที่มีอยู่ แต่มองไม่เห็น..."
103080-139 = "และ <หอคอยแห่งคำลวง> ที่ปรากฏขึ้นมาหลังจากนั้นก็โจมตี <ความลึกลับ> ทั้งหมดที่มีภายใน#nคิโวทอสค่ะ"
103080-140 = "ทั้งเทคโนโลยีโบราณอย่าง <เดคาแกรมมาทอน> AI ที่ควบคุมไม่ได้ <มิเมซิส> ที่สร้างความทรงจำ#nขึ้นใหม่ ทั้ง <ทวยเทพไร้นาม> "
103080-141 = "...... รวมไปถึง <สีสัน> ที่บิดเบือนตัวตนของเหล่านักเรียนคิโวทอส..."
103080-143 = "สุดท้ายเราก็กำกัดเหล่าผู้พิทักษ์หอคอยและทำลายหอคอยทั้งหมดได้ด้วยปฏิบัติการสหพันธ์ครั้งใหญ่..."
103080-144 = "แต่ว่าตอนนี้หอคอยจะปรากฏขึ้นมาอีกครั้งแล้วละค่ะ "
103080-145 = "ทุกสถานการณ์ที่มันเกิดขึ้นมาจนถึงตอนนี้... ไม่มีอันไหนเลยค่ะที่ฉันทำความเข้าใจมันได้จริงๆ"
103080-146 = "ทั้งคำพยากรณ์ เดคาแกรมมาทอน มิเมซิส สีสัน ทวยเทพไร้นาม ดิวิชั่น หอคอยแห่งคำลวง ผู้พิทักษ์ รวมไปถึงผู้นำทางสีสัน เพลนาพาเทส......"
103080-147 = "ถึงจะมีเปอร์เซ็นต์ความสำเร็จแค่ 3%... ก็ไม่เป็นไรค่ะ เราต้องก้าวผ่านความเป็นไปได้นั้น อย่างที่พวกเราเคยทำมาจนถึงตอนนี้ค่ะ"

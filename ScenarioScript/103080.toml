[translation]
103080-1 = "ตอนที่ 8;สรุปปฏิบัติการ"
103080-14 = "เอาละ แผนปฏิบัติการเสร็จสมบูรณ์แล้ว "
103080-15 = "ทุกคนที่อยู่ที่นี่มีส่วนช่วยในการวางแผนด้วยค่ะ ขอบคุณทุกคนนะคะ"
103080-16 = "ชื่อปฏิบัติการก็คือ <ปฏิบัติการยึดเรืออะทราฮาซิส>"
103080-17 = "...... บางทีนี่อาจจะเป็นปฏิบัติการสุดท้ายของเราค่ะ"
103080-19 = "คะ... ครั้งสุดท้าย..."
103080-21 = "ถ้าทำสำเร็จก็จบแค่นั้น แต่ถ้าล้มเหลว... คิโวทอสก็จบแค่นั้นเหมือนกัน"
103080-22 = "นั่นสินะคะ ไม่ว่าจะทางไหนก็ต้องมีจุดจบสินะคะ"
103080-24 = "คะ... แค่ทำให้สำเร็จก็พอแล้วนี่คะ! อย่ามาทำให้กังวลกันสิคะ คุณคาโยโกะ!"
103080-29 = "ใช่ๆ นี่เป็นปฏิบัติการที่ได้รับการตรวจสอบจากผู้เชี่ยวชาญจากหลากหลายสาขาเลยนะ?"
103080-30 = "ฉันว่ามันคือปฏิบัติการที่สมบูรณ์แบบที่สุดแล้วละ!"
103080-32 = "...... ถ้างั้นฉันจะเริ่มอธิบายปฏิบัติการเลยค่ะ "
103080-35 = "เป้าหมายหลักของพวกเราคือการทำลาย <เรืออะทราฮาซิส> ที่ลอยอยู่เหนือฟ้าคิโวทอสค่ะ"
103080-36 = "เราต้องทำลายสิ่งนั้น ถึงจะสกัดกั้นไม่ให้หอคอยแห่งคำลวงปรากฏขึ้นมาในคิโวทอสอีก"
103080-39 = "แต่เรือนั้นถูกปกป้องด้วยบาเรียแห่ง <สถานะการทับซ้อนตามความน่าจะเป็น> ที่ทำให้เราไม่สามารถ#nแทรกแซงเรือจากภายนอกได้ค่ะ"
103080-40 = "ตราบใดที่ยังมีบาเรียนี้อยู่ เราก็โจมตีเรือในทางกายภาพไม่ได้ค่ะ"
103080-42 = "ดังนั้นพวกเราเลยต้องทำให้ <เรืออุตนาพิชทิม> อยู่ใน <สถานะการทับซ้อนตามความน่าจะเป็น> เหมือนกับบาเรีย แล้วผ่านเข้าบาเรียนั้นไปค่ะ"
103080-44 = "นั่นคือ หากเราเป็นเหมือนคู่ต่อสู้ เราก็จะเข้าไปแทรกแซงได้โดยไม่ต้องคำนึงถึงความน่าจะเป็น"
103080-46 = "ส่วนการวิเคราะห์พหุมิติ ฉันจะทำโดยใช้อุปกรณ์คำนวณของเรือลำนี้ค่ะ"
103080-48 = "แล้วถ้าคำนวณพลาดล่ะ จะเป็นยังไง?"
103080-54 = "นั่นสินะคะ ถ้าเราเข้าไปในพื้นที่แห่ง <สถานะการทับซ้อนตามความน่าจะเป็น> ด้วยการคำนวณที่ผิด#nพลาดละก็..."
103080-55 = "...... ถ้าโชคไม่ดี เราคงจะแตกเป็นเสี่ยงๆ ในหน่วยอะตอม แต่ถ้าโชคดีหน่อย เราคงกระเด็นออกจาก#nเรือและจะตกลงมาจากความสูง 75,000 เมตรค่ะ"
103080-57 = "ถะ... ถ้าสูงขนาดนั้น... ฮาโลก็น่าจะแหลกละเอียดเลยนะคะ"
103080-58 = "ไม่หรอก เราคงตายไปตั้งแต่ก่อนถึงพื้นดินแล้วละ"
103080-62 = "ในความสูงขนาดนั้น อุณหภูมิคงติดลบอย่างน้อย 60 องศา หายใจเข้าแค่ครั้งเดียว ปอดก็คงแข็งเป็น#nน้ำแข็งแล้ว"
103080-63 = "ของเหลวในร่างกายก็คงจะระเหยไปในชั่วพริบตา ถ้าอยู่ในสภาพแวดล้อมที่สุดขั้วแบบนั้น ฮาโลคงทน#nอยู่ได้ไม่ถึง 2 นาทีหรอก"
103080-64 = "...... ขอบคุณสำหรับข้อมูลดีๆ นะคะ คุณคาโยโกะ มีกำลังใจขึ้นเยอะเลยค่ะ"
103080-69 = "...... อย่าคิดว่าเราจะล้มเหลวสิคะ "
103080-70 = "เมื่อผ่านบาเรียเข้าไปได้แล้ว เรือจะได้รับแรงกระแทกทางกายภาพ และเราจะเข้าไปในเรือค่ะ"
103080-71 = "พอเข้าไปในเรือแล้ว เราจะแฮ็กส่วนสำคัญๆ ของเรือ จากนั้นก็จะทำลายมันให้สิ้นซาก เพื่อจะไม่ให้เรือ#nทำงานได้อีกค่ะ"
103080-72 = "แน่นอนว่าพวกศัตรูในเรือก็จะโจมตีเราด้วยเช่นกันค่ะ"
103080-73 = "เราจะสกัดกั้นการโจมตีนั้น แล้วค่อยๆ [ruby=แฮ็ก]ยึดครอง[/ruby]แต่ละพื้นที่ในเรือ สุดท้ายแล้วก็ยึดการควบคุมเรือมาให้#nได้ และนี่คือเป้าหมายสุดท้ายของปฏิบัติการนี้ค่ะ"
103080-75 = "พอการควบคุมเรือตกอยู่ในมือเรา เราก็จะสั่งระเบิดเรือ หรือไม่ก็ทำให้มันร่วงลงมายังพื้นดินได้ค่ะ"
103080-76 = "อืม สรุปก็คือเราจะแฮ็กเรือแล้วแย่งเรือมา ถ้าทำได้ เราก็ชนะ"
103080-78 = "อยู่ดีๆ ก็เข้าใจง่ายเลยนะคะ"
103080-79 = "แต่ว่า..."
103080-85 = "อ้อ... ฉันเป็นเหมือน AMAS ที่มาช่วยซัพพอร์ตในการคำนวณน่ะ..."
103080-90 = "ประธานริโอะ?!"
103080-95 = "...... โดนจับได้ทันทีเลยสินะคะ"
103080-96 = "ก็ว่าอยู่ว่าหายไปไหน มาอยู่ตรงนี้เองหรอกเหรอ?! แล้วมาทำอะไรอยู่ที่นี่กันล่ะเนี่ย!"
103080-97 = "ระ... เรื่องนั้น... "
103080-98 = "... เชื่อเขาเลย อาริสึจังกับชมรมพัฒนาเกมก็อยู่ที่นี่นะ! ต้องไม่มีความละอายใจเบอร์ไหนถึงมาอยู่ที่นี่#nได้เนี่ย?"
103080-99 = "...... ริโอะมาช่วยฉันอยู่ที่นี่ค่ะ "
103080-103 = "ฉันคอยเฝ้าดูเธออยู่ เพราะงั้นไม่ต้องห่วงนะคะ ถ้าทำเรื่องเหลวไหลอะไรขึ้นมาละก็ ฉันจะทำลายทันที#nเลยค่ะ"
103080-104 = "เฮ้อ..."
103080-105 = "ไม่รู้หรอกนะว่าคิดอะไรกันอยู่ แต่อย่ามายุ่งกับชมรมพัฒนาเกมนะ!! ฉันจะคอยจับตาดูไม่ให้คลาดสาย#nตาเลย!!"
103080-106 = "ไว้คุยกันทีหลังเถอะประธาน ฉันมีอะไรอยากพูดเยอะเลยละ และใช่ ฉันจะตรวจสอบการยักยอกนั่นให้#nถี่ถ้วนอย่างถึงที่สุดเลย!!"
103080-111 = "...... เข้าใจแล้ว"
103080-112 = "ฉันจะลองๆ หาวิธีกลับมายังพื้นดินเผื่อๆ ไว้แล้วกัน ...... ถ้าอนุญาตให้ฉันช่วยน่ะนะ"
103080-113 = "ค่ะ รบกวนด้วยค่ะ เพราะถ้าหากอุตนาพิชทิมของเราเสียหายขึ้นมา เราก็คงต้องถูกขังอยู่ในเรือนั้น"
103080-114 = "ได้ ฉันจะเตรียมเรื่องการคำนวณเดี๋ยวนี้เลย"
103080-117 = "อายูมุ เราเหลือเวลากันอีกเท่าไรคะ?"
103080-122 = "ค่ะ จนกว่าจะเกิดหอคอยแห่งคำลวงอีกครั้งก็... ราวๆ 12 ชั่วโมงค่ะ"
103080-124 = "ปะ... แปลว่าเราต้องขึ้นเรือรบลำนี้ แล้วขึ้นไปบนฟ้าเพื่อยึดเรือลำนั้นให้ได้ก่อนหมดเวลาใช่ไหม?"
103080-125 = "ปฏิบัติการนี้จะใช้ได้ใช่ไหมเนี่ย?"
103080-127 = "ค่ะ พวกเราจำลองสถานการณ์ดูหลายรอบแล้วค่ะ"

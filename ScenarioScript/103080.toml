[translation]
103080-1 = "Episode 8; Operational Briefing"
103080-14 = "Our plans for the upcoming operation are complete. "
103080-15 = "Thank you to everyone for assisting in preparing for this operation."
103080-16 = "The operation name is the Ark of Atrahasis Conquest."
103080-17 = "If this is successful, this will be our last operation together."
103080-19 = "O-Our last..."
103080-21 = "Well, yeah. If we win, everyone gets to go home. If we lose, that's the end of Kivotos."
103080-22 = "Whatever the result, this is our last battle."
103080-24 = "W-We'll succeed! Don't make everyone anxious, Kayoko!"
103080-29 = "It'll work. Top experts from various fields have all worked together to come up with this plan."
103080-30 = "It's the closest thing we'll ever get to a perfect operation."
103080-32 = "...Allow me to debrief you on the plans. "
103080-35 = "Our main objective is to destroy the Ark of Atrahasis in the sky above Kivotos."
103080-36 = "Only by destroying it can we prevent the False Sanctums from corrupting Kivotos."
103080-39 = "However, the Ark is protected by a quantum superposition state barrier that makes physical access from the outside impossible."
103080-40 = "As long as this barrier is in place, physically reaching the Ark is impossible."
103080-42 = "Therefore, we plan to pass through the barrier by putting the Utnapishtim's Ship in the same quantum superposition state."
103080-44 = "In other words, we're getting on their level and sliding on in."
103080-46 = "I'll be doing the calculations of the multidimensional analysis utilizing the immense computing power of this ship."
103080-48 = "Out of curiosity, what happens if your calculations are messed up?"
103080-54 = "It's a reasonable question. If you enter a space in the quantum superposition state under the premise of a failed calculation..."
103080-55 = "If we're unlucky, we'll shatter into atoms. If we're lucky, we'll be thrown off the ship and fall from a height of 75,000 meters."
103080-57 = "A-At that height...a halo could be destroyed."
103080-58 = "We'll be dead way before we hit the ground."
103080-62 = "At that height, it's colder than sixty degrees below zero. One breath and your lungs will freeze."
103080-63 = "Your bodily fluids would boil and vaporize before you could blink. If exposed to such an extreme environment, your halo would last two minutes, max."
103080-64 = "Thank you for your very optimistic prognosis, Kayoko. I feel very encouraged."
103080-69 = "We're not going to fail. We cannot. "
103080-70 = "After passing through the barrier, we'll be able to physically impact the Ark and enter."
103080-71 = "We must break into the Ark, hack its operating system, and thoroughly destroy it so it can never function again."
103080-72 = "Naturally, we don't expect the enemies inside the Ark to take it lying down."
103080-73 = "It'll be a slow, careful crawl. We will defend against attacks and occupy each area of the Ark piece by piece until we're close enough to take over its controls."
103080-75 = "If we seize control of the Ark like that, we can make it self-destruct or crash to the ground."
103080-76 = "In other words, our victory conditions are to hack and steal the Ark."
103080-78 = "Straightforward and easy to understand. I approve."
103080-79 = "But, about..."
103080-85 = "Oh. I'm a humble support-type AMAS."
103080-90 = "President Rio?!"
103080-95 = "...That didn't take long."
103080-96 = "We've been wondering where you disappeared to! What are you doing here?!"
103080-97 = "Th-That..."
103080-98 = "Seriously... Aris and the Game Development Department are here. What are you thinking?"
103080-99 = "Rio is assisting me. "
103080-103 = "You'll grow wrinkles on your forehead, Yuuka. I'm keeping a close eye on her. If she tries anything, I'll take great pleasure in destroying her."
103080-104 = "*sigh*"
103080-105 = "I don't know what you're up to, but don't even think about going near the Game Development Department! I'm watching you!"
103080-106 = "But we will talk later, President. I have a lot to discuss with you, starting with the embezzlement!"
103080-111 = "...Understood."
103080-112 = "Just in case, I'll find a way for us to return to the ground...with your permission, of course."
103080-113 = "Granted, please do. If Utnapishtim breaks down, we'll be stuck in the Ark."
103080-114 = "I'll get to it right away."
103080-117 = "Ayumu, how much time do we have left?"
103080-122 = "Until the reappearance of the False Sanctums...we have about twelve hours."
103080-124 = "Ugh... We have to drive this battleship up into the sky and capture the Ark within that time, right?"
103080-125 = "Is this operation even remotely feasible?"
103080-127 = "Yes. I ran the simulation several times."
103080-128 = "The success rate is a whopping three percent."
103080-129 = "Three percent..."
103080-130 = "Hm... We're gonna need a miracle to be successful..."
103080-131 = "[s] \"Three percent is better than zero.\""
103080-133 = "...Yes. You're right, Sensei."
103080-134 = "This is an unprecedented situation in Kivotos... We've gotten all the way here by forging a path through utterly incomprehensible phenomena."
103080-136 = "Ever since the first sign, Yurizono Seia's prophecy, we've been in uncharted territory..."
103080-137 = "When the six masses of energy were detected in Kivotos, they were invisible and incomprehensible phenomena."
103080-139 = "The False Sanctums that appeared afterward attacked with all the mysteries that have occurred in Kivotos so far."
103080-140 = "The uncontrollable AI Decagrammaton, the Mimesis that reproduces memories, ancient technology like the Nameless Gods..."
103080-141 = "...And the Chroma that distorts the identity of Kivotos students..."
103080-143 = "Through a large-scale allied operation, we successfully banded together, defeated the guardians and destroyed all the sanctums..."
103080-144 = "Now the sanctums are about to be restored."
103080-145 = "All of these situations have been terrifying and beyond my comprehension... I'm sure each and every one of you understands."
103080-146 = "The prophecy, Decagrammaton, Mimesis, the Chroma, the Nameless Gods, Divi:Sion, the False Sanctums, the guardians, the Guide of Chroma, and Phrenapates..."
103080-147 = "The probability of success may only be three percent, but...it doesn't matter. We have to work through the odds, just like we've always done."
103080-148 = "[s] \"As Rin says. Just one more time, let's give our all to save Kivotos.\""
103080-150 = "I'm with Sensei. We can't turn back without at least trying."
103080-151 = "One last battle."
103080-152 = "We're bringing Shiroko back, one way or another."
103080-154 = "*sigh* I guess I don't have a choice."
103080-155 = "We've come all the way here, so we can only move forward."
103080-157 = "Then please prepare Utnapishtim's Ship. We must be ready to proceed in eight hours."
103080-158 = "What?! E-Eight hours?"
103080-159 = "We have the manual, don't we? We'll just have to memorize it."
103080-160 = "You expect someone to stuff all that information in their brain in a few hours?"
103080-161 = "It doesn't matter if it's possible or not. We just have to do it. We'll master the manual and operate Utnapishtim's Ship."
103080-162 = "*sigh* ...The operator... I think we need at least ten of them... Maybe one hundred..."
103080-163 = "[s] \"Leave the operations to me.\""
103080-164 = "Sensei's gonna do it?"
103080-165 = "[s] \"The Shittim Chest can make it work somehow.\""
103080-166 = "I can't talk that big and then just sit back. I'll support you, Sensei."
103080-168 = "R-Rin?"
103080-170 = "We're all in here. There's no room for playing it safe or hesitations. I won't leave Sensei to deal with the most dangerous task on their own."
103080-171 = "[s] \"Rinny... You're my rock!\""
103080-177 = "If it's just memorizing a manual, I-I think I can do it..."
103080-179 = "Even Ayumu?!"
103080-181 = "Well, if Sensei says so, I, the treasurer of Seminar, can't sit on the sidelines. I'll join too."
103080-182 = "I'll do it too. I'm pretty good at memorizing!"
103080-184 = "*sigh* I, the senior administrator of Gehenna, can't let you all take the spotlight."
103080-185 = "Me too!"
103080-186 = "Yes, I'll join too!"
103080-187 = "Above all else..."
103080-188 = "I'll do anything to save Shiroko!"
103080-190 = "I didn't come here to do something like this. *sigh* But I guess I have no choice."
103080-192 = "Wow... Everyone is so enthusiastic."
103080-193 = "Just so you know, this is way too much for me."
103080-194 = "Momoka... You came all the way here and you're not going to help?"
103080-201 = "Didn't you say...you would follow Rin to the ends of the universe...with me?"
103080-203 = "Wh-Whoa! Don't make that face!"
103080-204 = "Ugh! I got it, I got it!"
103080-205 = "Sure, why not! I guess I can do it too."
103080-207 = "Heehee. An intergalactic battleship crew. That sounds nice!"
103080-208 = "So, do we get uniforms too?"
103080-210 = "Huh? Uniforms...?"
103080-211 = "Well, we're the intergalactic battleship crew. Isn't a dedicated uniform part of the bill? "
103080-213 = "W-Wait... A dedicated uniform?"
103080-214 = "I can handle that. Yeah. I can do it."
103080-215 = "What?! Hibiki, you have time for that?"
103080-216 = "Uniforms for an intergalactic battleship crew."
103080-217 = "That'll be a challenge..."
103080-219 = "One that I refuse to turn down. "
103080-223 = "We can't let down the dreams of the Engineering Department! We can't wear school uniforms while shouting lines like, \"Take off!\" or, \"Raise the altitude!\""
103080-224 = "...That's true."
103080-225 = "I like it! Let's get this underway!"
103080-226 = "Okay, great! I'll find some references from animes and mangas!"
103080-228 = "Yeah, and I'll get to the production now. First, I need everyone's sizes."
103080-229 = "Wow... I'm excited. Let me discuss with you in detail about the design!"
103080-231 = "Sounds great. Then I'll add some features and modify it into something more like a pilot suit rather than just a uniform."
103080-232 = "Do you have any opinions, Sensei?"
103080-233 = "[s] \"Yes, I do! I have an opinion!\""
103080-235 = "I have a bad feeling about this..."
103080-237 = "[ns1] \"An intergalactic battleship operator must wear a garrison hat!!\"\n[ns2] \"It's like being a flight attendant, so a scarf is standard!!\"\n[ns3] \"I don't know much else, but most importantly, a captain must wear a long coat!!\""
103080-243 = "That's quite specific..."
103080-244 = "Hmm, okay. We'll consider your opinion."
103080-246 = "(What the heck is going on...?)"
103080-250 = "*sigh* Then let's get this underway."
103080-251 = "We'll start departure preparations now and fly to the Ark above the sky in eight hours."
103080-252 = "We need to bring in operators, air traffic controllers, hackers...and people to manage meals and medical treatment..."
103080-253 = "Yes. We'll need to recruit more students as well."
103080-259 = "Rin..."
103080-260 = "You, Sensei, and the rest of the students have been working all this time without rest..."
103080-261 = "Don't you think everyone needs a break? Especially you, Rin."
103080-262 = "...Yes. "
103080-263 = "We won't be able to perform at our best if we're sleep deprived. We should all take some time to rest. "
103080-264 = "Everyone, we leave eight hours from now. As soon as the sun rises."
103080-265 = "Until then, please rest while you can."
103080-266 = "I will see you all tomorrow morning, above the sky!"
103080-268 = "Next Episode; The Last Night on the Ground"

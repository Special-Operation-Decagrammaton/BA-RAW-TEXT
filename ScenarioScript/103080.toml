103080-166 = "อย่างนี้นี่เอง... ฉันเองก็คงจะดูอยู่เฉยๆ ไม่ได้แล้วละค่ะ ฉันจะช่วยสนับสนุนเองค่ะ"
103080-168 = "ระ... รุ่นพี่ริน?"
103080-170 = "มาถึงขนาดนี้แล้ว มันไม่มีประโยชน์ที่จะเอาแต่กลัวแล้วละค่ะ ฉันไม่สามารถฝากงานที่อันตรายที่สุดให้#nกับคุณครูได้ ฉันจะอยู่ด้วยค่ะ"
103080-171 = "[s] \"มีกำลังใจขึ้นเยอะเลย ขอบใจนะริน!\""
103080-177 = "ถ้าแค่ท่องจำหนังสือละก็ ไม่เกินไปกว่าฝีมือฉันหรอกค่ะ......"
103080-179 = "รุ่นพี่อายูมุก็ด้วยเหรอ?! "
103080-181 = "ก็นะ ถ้าคุณครูพูดถึงขนาดนั้นแล้ว นักบัญชีแห่งเซมิน่าอย่างฉันก็คงต้องออกโรงเหมือนกัน ฉันเอาด้วย"
103080-182 = "ฉันเองก็จะช่วยอีกแรงค่ะ ฉันเก่งเรื่องการท่องจำเหมือนกันนะคะ♡"
103080-184 = "เฮ้อ ถ้างั้นเจ้าหน้าที่อาวุโสของคณะกรรมการวินัยจากเกเฮนน่าอย่างฉัน ก็คงไม่อาจหลีกเลี่ยงความรับ#nผิดชอบนี้ได้ค่ะ!"

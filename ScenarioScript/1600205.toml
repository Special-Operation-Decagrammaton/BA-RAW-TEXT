[translation]
1600205-1 = "答案就是老師！"
1600205-2 = "啊，老師你來了啊！我等好久了呢！"
1600205-3 = "我今天找老師出來是因為……！"
1600205-4 = "……（盯）"
1600205-5 = "……啊。"
1600205-6 = "……對了這裡是圖書館，不可以大聲說話，不然會造成別人的困擾……"
1600205-7 = "而且這裡的館員還挺兇的，我之前也好幾次……"
1600205-8 = "咦？有沒有被列黑名單……？沒，沒有啦，應該吧……"
1600205-9 = "頂多是「重點觀察人物」吧……我常常被警告要安靜。"
1600205-10 = "……欸嘿嘿。"
1600205-11 = "總，總之我今天想要請教老師的……是這個！"
1600205-12 = "沒錯，是心理學書籍。"
1600205-13 = "但不只是心理學書籍。還有自傳，八卦雜誌……"
1600205-16 = "其實最近，有人問了我一個「問題」。"
1600205-17 = "因為大家平常都是從我身邊逃走，好久沒有這種情況了，所以我有點緊張不知道能不能好好解答。"
1600205-18 = "咦？你說完全看不出來？其實我這樣已經很緊張了……！"
1600205-19 = "反正，難得有人問我問題，我也想盡可能給出一個完美而確切的解答……"
1600205-20 = "但那個問題……"
1600205-22 = "「我也不懂自己為什麼會有這種心情……」"
1600205-23 = "「這種悸動的感覺是怎麼回事？亞都梨一定有答案吧？」"
1600205-26 = "……她是這樣問的，老實說我也聽不懂她的意思……"
1600205-27 = "如果是已經有科學解釋的問題，我還可以仔細講解好幾個小時……"
1600205-28 = "不過我的字典裡沒有「不知道」這個詞，所以我一不小心就回她說「下次碰面再解釋給你聽！」"
1600205-29 = "所以在下次見面之前，我一定要想辦法理解這個問題！她所謂的「悸動」究竟是什麼！"
1600205-30 = "……目前的狀況就是這樣。"
1600205-31 = "但我還完全沒有頭緒。不管我怎麼查資料都找不到，陷入瓶頸看不到答案……"
1600205-32 = "我翻遍了各種紙本資料，但每個上面寫的都不一樣。而網路上的資訊更是不明所以……"
1600205-33 = "照這樣下去，甚至沒有辦法進行初步的資料彙整。"
1600205-34 = "請問我該怎麼做呢？換作老師，這種時候會怎麼做？"
1600205-35 = "不，不如說，老師會不會……已經知道答案了呢？請問所謂的「悸動」是什麼呢？"
1600205-36 = "[s1]「試著從和自己最相關的資料開始調查如何？」\n[s2]「根據最好理解的參考資料聯想看看如何？」"
1600205-37 = "有，有那種東西的話確實很好。但哪裡才有那種東西……"
1600205-38 = "有，有那種東西的話確實很好。但哪裡才有那種東西……"
1600205-39 = "……咦？"
1600205-40 = "……我嗎？"
1600205-41 = "咦，這，這是什麼意思……？"
1600205-42 = "你要我先檢視自己……？"
1600205-43 = "就、就算你那麼說……我還是聽不懂你在說什麼……"
1600205-44 = "畢竟，我又不是她……而且我們個性差這麼多……"
1600205-45 = "……你說我們說不定抱持著同樣的心情？嗯……我不太能理解……"
1600205-46 = "你要我仔細回想那個問問題的人……？是可以啦，可是為什麼……"
1600205-47 = "……嗯～"
1600205-48 = "雖然不太明白，不過既然是老師給的建議，那我就試試看看吧。"
1600205-49 = "那個女生……來問問題時……她的儀態……表情……"
1600205-51 = "嗯……要我做出那些舉動時……又有悸動的心情……"
1600205-52 = "至今為止，會讓我擺出那種表情的情況……"
1600205-53 = "還有我在當下的思緒……嗯嗯～嗯嗯嗯～？"
1600205-54 = "啊！"
1600205-55 = "難，難道……原來如此！我明白了！"
1600205-56 = "那種感覺！就跟我想到老師的時候一樣……"
1600205-57 = "……！！"
1600205-58 = "[s]「……亞都梨？」"
1600205-59 = "咦，啊，那，那個……"
1600205-60 = "……那個，老師。我去一趟洗手間可以嗎……？"
1600205-61 = "我，我馬上就回來！"
1600205-62 = "[s]「……？」"
1600205-63 = "失，失陪了！！"
1600205-65 = "（亞都梨就這麼跑開，也不知為何就此一去不返）"
1600205-66 = "（過了一段時間才收到她傳訊息說：「多虧老師，問題全都解決了，謝謝」）"

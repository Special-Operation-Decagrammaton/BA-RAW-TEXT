[translation]
1600205-1 = "#title;정답은 바로 선생님이에요!"
1600205-2 = "3;코토리;02;아, 오셨군요. 선생님! 기다리고 있었습니다!\n#3;a\n#3;em;[반응]"
1600205-3 = "3;코토리;01;오늘 여기까지 선생님을 부른 이유는 바로바로……!\n#3;hophop"
1600205-4 = "#na;도서관 사서;……(찌릿)"
1600205-5 = "3;코토리;04;……아.\n#3;stiff"
1600205-6 = "3;코토리;04;……도, 도서관이니까. 여기서는 작게 말해야 하겠네요. 안그러면 사서분들이……\n#3;em;[땀]"
1600205-7 = "3;코토리;01;여기 사서분들 꽤 무섭거든요. 저도 의도치 않게 실수를 좀 했다 보니……\n#3;greeting"
1600205-8 = "3;코토리;04;네? 블랙리스트요? 그, 그런 건 아니고요!\n#3;shake\n#3;em;[?!]"
1600205-9 = "3;코토리;04;그, 그냥 요주의 인물 정도로…… 조용히 좀 해 달라는 말을 들었어서요."
1600205-10 = "3;코토리;01;……헤헤."
1600205-11 = "3;코토리;02;아무튼 선생님께 여쭤보고 싶었던 건…… 이겁니다!\n#3;greeting"
1600205-12 = "3;코토리;01;……네? 갑자기 웬 심리학 책들이냐고요?\n#3;em;[?]"
1600205-13 = "3;코토리;02;그게 말이죠…… 실은 심리학 책들뿐만이 아니에요, 여기 보시면 자서전에 가십 잡지에……\n#3;m2\n#3;hophop"
1600205-14 = "3;코토리;99\n#wait;2500\n#3;em;…"
1600205-15 = "3;코토리;01\n#3;m3\n#wait;1000"
1600205-16 = "3;코토리;03;실은 최근에 제가 드디어 다른 학생분께 '질문'을 받았거든요.\n#3;em;[반짝]\n#3;hophop"
1600205-17 = "3;코토리;01;평상시엔 다들 저한테서 도망만 치니까, 이런 경우가 적어서 나름대로 긴장하고 있어요."
1600205-18 = "3;코토리;04;네? 전혀 긴장한 것 같지 않아 보인다고요? 에…… 이, 이게 긴장한 거에요……!\n#3;shake\n#3;em;[?!]"
1600205-19 = "3;코토리;02;어쨌든 이왕 질문을 받은 것이니 이왕이면 완벽하게, 제대로 설명해주고 싶었는데 말이죠.\n#3;greeting"
1600205-20 = "3;코토리;05;그 질문이라는 게 하필이면……"
1600205-21 = "3;코토리;05\n#3;h"
1600205-22 = "#na;여학생;\"나도 내 맘을 잘 모르겠어…… 내가 왜 이러는지……\""
1600205-23 = "#na;여학생;\"이 두근거리는 기분은 뭐지? 코토리라면 당연히 알고 있겠지?\""
1600205-24 = "3;코토리;05\n#3;h"
1600205-25 = "#wait;500"
1600205-26 = "3;코토리;04;……라는 질문이어서요. 솔직히 저도 무슨 말인지 잘……\n#3;em;[속상함]\n#3;stiff"
1600205-27 = "3;코토리;99;차라리 과학적 지식이었다면 몇시간이건 차근차근 설명해줄 수도 있는데 말이죠."
1600205-28 = "3;코토리;02;하지만 제 사전에 '모른다'라는 말은 없으니, 대신 다음에 설명해주겠다고 해버렸어요.\n#3;greeting\n#3;em;[음표]"
1600205-29 = "3;코토리;06;그러니 다시 만나기 전까지 무슨 수를 써서라도 알아내야 해요! '두근거림'이란 대체 무엇이냐!\n#3;hophop\n#3;em;[반응]"
1600205-30 = "3;코토리;05;……가 지금까지의 상황이었습니다만."
1600205-31 = "3;코토리;04;사실 전혀 모르겠어요. 안 되겠어요, 막혔어요, 도무지 정답이 보이지 않아요.\n#3;stiff\n#3;em;[속상함]"
1600205-32 = "3;코토리;04;책의 자료와 정보들은 전부 다 다른 소리만 하고 있고, 인터넷은 더 제멋대로고……\n#3;m2"
1600205-33 = "3;코토리;04;이래서는 '이거다!'라고 설명해줄 수 있는 데이터베이스의 정리 자체가 불가능해요.\n#3;m4"
1600205-34 = "3;코토리;04;어떻게 하죠, 선생님? 선생님이라면 이럴 때 어떻게 하시겠어요?\n#3;m3\n#3;hophop\n#3;em;[반응]"
1600205-35 = "3;코토리;05;아니면 선생님이라면…… 알고 계신가요? '두근거림'이라는 게 뭔지?\n#3;em;[?]"
1600205-36 = "[s1] \"가장 가까운 자료를 찾아보는 건 어때?\"\n[s2] \"가장 확실한 표본을 조사해보는 건 어때?\""
1600205-37 = "3;코토리;06;그, 그런 게 있나요? 그런 좋은 게 대체 어디에……\n#3;em;[?!]\n#3;shake"
1600205-38 = "3;코토리;06;그, 그런 게 있나요? 그런 좋은 게 대체 어디에……\n#3;em;[?!]\n#3;shake"

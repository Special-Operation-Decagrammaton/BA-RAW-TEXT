1600205-42 = "3;코토리;04;……저 스스로를 돌아보면 될 거라고요?\n#3;stiff\n#3;em;…"
1600205-43 = "3;코토리;04;그, 그렇게 말하셔도…… 무슨 뜻인지……"
1600205-44 = "3;코토리;05;저는 그 사람이 아닌데…… 게다가 타입도 전혀 다른 것 같고……\n#3;em;[반응]"
1600205-45 = "3;코토리;04;……네? 그런 부분들까지 포함해서? 같을 수도 있다고요?\n#3;shake\n#3;em;[?]"
1600205-46 = "3;코토리;04;질문했던 사람의 당시 모습들을 떠올려 보라고요? 그거야 어렵지 않지만 왜 굳이……"
1600205-47 = "3;코토리;99;……으음."
1600205-48 = "3;코토리;01;잠시만요. 그래도 선생님께서 말해주신 조언이니, 한 번 해 볼 게요.\n#3;greeting\n#3;em;[반응]"
1600205-49 = "3;코토리;99;받은 질문…… 질문했던 학생분의 모습…… 표정……"

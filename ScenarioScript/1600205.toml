[translation]
1600205-1 = "Sensei Is the Answer!"
1600205-2 = "There you are, Sensei! I was waiting for you!"
1600205-3 = "I called you here today because...!"
1600205-4 = "(stare)"
1600205-5 = "Uh."
1600205-6 = "This is a library. We should whisper, or the librarians will..."
1600205-7 = "Well, the librarians here are pretty scary. We have a history..."
1600205-8 = "What? No, of course I haven't been blacklisted!"
1600205-9 = "...But I am on the warning list. They often tell me to quiet down."
1600205-10 = "Heehee."
1600205-11 = "Anyway, the reason I asked you here, Sensei...is this!"
1600205-12 = "Why psychology books?"
1600205-13 = "For one, it's more than just that. I also have a few biographies and gossip magazines..."
1600205-16 = "Another student asked me a few questions recently."
1600205-17 = "It surprised me, since the students usually run away. I was actually a little nervous."
1600205-18 = "What do you mean I don't look nervous? Trust me when I say I am!"
1600205-19 = "I wanted to answer their question as flawlessly and perfectly as I could."
1600205-20 = "What they asked me was..."
1600205-22 = "\"It had to do with their feelings, didn't it?\""
1600205-23 = "\"Something like, 'Why do I feel this way? You have to know, Kotori.'\""
1600205-26 = "...Exactly. She was talking about the feeling of her heart racing, and I didn't know what to say."
1600205-27 = "I could have gone on for hours and hours if it were a scientific question."
1600205-28 = "But since there's no topic I can't explain, I told her that I'd answer her question later."
1600205-29 = "I have to find out what feeling could be making her heart race!"
1600205-30 = "...And that's where I'm at now."
1600205-31 = "But I'm still no closer to finding an answer. I'm stuck."
1600205-32 = "The books all have conflicting information, and don't get me started on how useless the internet has been..."
1600205-33 = "It'd be impossible to create a database which could answer the question definitively."
1600205-34 = "What should I do, Sensei? What would you do?"
1600205-35 = "You wouldn't happen to know what this feeling is, would you?"
1600205-36 = "[s1] \"How about looking up the closest existing data that matches the question?\"\n[s2] \"How about looking into a reliable sample?\""
1600205-37 = "Does something like that exist? Where would I find something like that..."
1600205-38 = "Does something like that exist? Where would I find something like that..."
1600205-39 = "Huh?"
1600205-40 = "Me?"
1600205-41 = "Why me...?"
1600205-42 = "I should think about my own feelings?"
1600205-43 = "I don't know what you mean..."
1600205-44 = "I'm not like she is. I'm completely different..."
1600205-45 = "You think I've felt the same way before?"
1600205-46 = "I suppose I could think again about how she looked when she asked."
1600205-47 = "Hmm."
1600205-48 = "If that's your advice, Sensei, then let me think on it."
1600205-49 = "When she asked me her question, her expression was like..."
1600205-51 = "Hmm. What could have made me act like that? If it was me..."
1600205-52 = "If I was in that situation..."
1600205-53 = "In that situation I would have been thinking of..."
1600205-54 = "Ah-ha! Eureka! I understand now!"
1600205-55 = "Which means, she was feeling..."
1600205-56 = "...because that's how I feel...when I think of Sensei..."
1600205-57 = "...!"
1600205-58 = "[s] \"...Kotori?\""
1600205-59 = "Well, uh. Sensei... Could I..."
1600205-60 = "Could I...use the restroom real quick?"
1600205-61 = "I won't take long!"
1600205-62 = "[s] \"...?\""
1600205-63 = "I'll be right back!"
1600205-65 = "(Kotori ran to the rest room and for some reason never came back.)"
1600205-66 = "Later, I received a text message saying, \"Sorry to run. Crisis averted thanks to you. Thanks.\""

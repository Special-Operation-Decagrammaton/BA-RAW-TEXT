[translation]
1600205-1 = "คำตอบก็คือคุณครูยังไงล่ะคะ!"
1600205-2 = "อ๊ะ มาแล้วเหรอคะ คุณครู! กำลังรออยู่เลยค่ะ!"
1600205-3 = "ที่ฉันเรียกคุณครูออกมาที่นี่วันนี้ก็เพราะ...!"
1600205-4 = "...(ชู่ว)"
1600205-5 = "....อ๊ะ"
1600205-6 = "...ทะ... ที่นี่มันห้องสมุด เราต้องคุยกันเบาๆ นะคะ ไม่งั้นคุณบรรณารักษ์จะ..."
1600205-7 = "คุณบรรณารักษ์ของที่นี่ค่อนข้างน่ากลัวค่ะ ฉันเคยทำพลาดแบบไม่ได้ตั้งใจนิดหน่อย..."
1600205-8 = "คะ? บัญชีดำเหรอคะ? เรื่องนั้นไม่มีหรอกค่ะ!"
1600205-9 = "ฉันเป็นแค่คนที่ถูกจับตา... ที่ถูกบอกให้เงียบค่ะ"
1600205-10 = "......ฮิฮิ"
1600205-11 = "แต่ก็ช่างเถอะค่ะ ฉันมีเรื่องที่... อยากจะถามคุณครูอยู่!"
1600205-12 = "...คะ? ทำไมจู่ๆ ถึงมีหนังสือจิตวิทยาอย่างนั้นน่ะเหรอคะ?"
1600205-13 = "คือว่าที่จริงแล้ว... ไม่ได้มีแค่หนังสือจิตวิทยา ตรงนี้ก็มีนิตยสารและอัตชีวประวัติ..."
1600205-16 = "ที่จริงเมื่อเร็วๆ นี้ฉันเพิ่งได้รับคำถามจากนักเรียนคนอื่นมาค่ะ"
1600205-17 = "ปกติทุกคนจะเอาแต่หนีฉัน ไม่ค่อยมีกรณีแบบนี้ ฉันก็เลยรู้สึกกังวลขึ้นมาค่ะ"
1600205-18 = "คะ? ฉันดูไม่ตื่นเต้นเลยเหรอคะ? ตะ...ตื่นเต้นสิคะ!"
1600205-19 = "ในเมื่อฉันรับคำถามมาแล้ว ฉันก็อยากจะตอบโดยอธิบายให้ถูกต้องสมบูรณ์แบบค่ะ"
1600205-20 = "แต่คำถามที่ว่านั่นก็คือ..."
1600205-22 = "\"ฉันไม่รู้จะทำยังไงกับความรู้สึกของฉัน... ทำไมฉันถึงเป็นแบบนี้...\""
1600205-23 = "ความรู้สึกตื่นเต้นนี้คืออะไร? ถ้าเป็นโคโทริคงจะรู้ใช่มั้ย?"
1600205-26 = "...ก็เป็นคำถามแบบนี้แหละค่ะ บอกตามตรงฉันเองก็ไม่รู้ว่าจะตอบยังไงดี..."
1600205-27 = "ถ้าเป็นความรู้ด้านวิทยาศาสตร์ ฉันอธิบายได้อย่างละเอียดหลายชั่วโมงเลยค่ะ"
1600205-28 = "แต่ไม่มีคำว่า \"ไม่รู้\" อยู่ในพจนานุกรมของฉัน เลยบอกไปว่าฉันจะอธิบายให้ครั้งหน้าแทนค่ะ"
1600205-29 = "เพราะอย่างนั้น ฉันต้องทำทุกวิถีทางเพื่อหาคำตอบให้ได้ก่อนที่จะพบกันอีกครั้ง!#n\"ใจเต้นตึ๊กตั๊ก\" นี่มันคืออะไร!"
1600205-30 = "...แล้วก็จนมาถึงสถานการณ์ตอนนี้"
1600205-31 = "ที่จริงฉันยังไม่รู้อะไรเลยค่ะ ไม่ได้การแล้ว ฉันติดและยังไม่เห็นคำตอบเลยค่ะ"
1600205-32 = "ข้อมูลและวัตถุดิบในหนังสือล้วนบอกแตกต่างกันไป ในอินเทอร์เน็ตก็ยิ่งไปกันใหญ่..."
1600205-33 = "มันเป็นไปไม่ได้ที่จะจัดการฐานข้อมูลที่ใช้อธิบาย \"สิ่งนี้!\" ได้"
1600205-34 = "ฉันควรทำยังไงดีค่ะ คุณครู? ถ้าเป็นคุณครูจะทำยังไงเหรอคะ?"
1600205-35 = "ไม่ใช่สิ สมมุติว่าถ้าเป็นคุณครู... จะรู้มั้ยคะ? \"ใจเต้นตึ๊กตั๊ก\" นี่คืออะไร?"
1600205-36 = "[s1] \"ทำไมไม่ลองหาจากข้อมูลที่ใกล้ที่สุดดูล่ะ?\"\n[s2] \"ทำไมไม่ลองตรวจสอบจากตัวอย่างที่เชื่อถือได้ที่สุดดูล่ะ?\""
1600205-37 = "มะ... มีของอย่างนั้นอยู่เหรอคะ? ที่ไหนจะมีของดีๆ อย่างนั้น..."
1600205-38 = "มะ... มีของอย่างนั้นอยู่เหรอคะ? ที่ไหนจะมีของดีๆ อย่างนั้น..."
1600205-39 = "...คะ?"
1600205-40 = "...ฉันเหรอคะ?"
1600205-41 = "ทะ... ทำไมฉันถึง...?"
1600205-42 = "...บอกว่าให้ฉันหันกลับไปมองตัวเองอย่างงั้นเหรอคะ?"
1600205-43 = "พะ... พูดอย่างนั้น...หมายความว่า..."
1600205-44 = "ฉันไม่ใช่คนนั้น..... แถมยังแตกต่างกันโดยสิ้นเชิงด้วย....."
1600205-45 = "...คะ? รวมถึงทุกคนด้วย? ฉันก็เป็นได้เหมือนกันเหรอคะ?"
1600205-46 = "ให้ลองนึกลักษณะตอนนั้นของคนที่ตั้งคำถามเหรอคะ? อันนั้นไม่น่ายาก แต่ทำไมถึงต้อง..."
1600205-47 = "......อืม"
1600205-48 = "เดี๋ยวนะคะ แต่ถึงยังไงมันก็เป็นคำแนะนำที่คุณครูบอก ฉันจะลองดูสักครั้งค่ะ"
1600205-49 = "คำถามที่ได้รับ...ลักษณะของนักเรียนที่ตั้งคำถาม...สีหน้า..."
1600205-51 = "อืมมมมม... ถ้าเป็นฉันแล้วตอนนั้นจะทำยังไง? ถ้าเป็นฉัน ถ้าเป็นฉันล่ะก็..."
1600205-52 = "ถ้าฉันอยู่ในสถานการณ์นั้น..."
1600205-53 = "ใน...สถานการณ์...นั้น..."
1600205-54 = "...อ๋า! รู้แล้ว! ตอนนี้ฉันเข้าใจแล้วค่ะ!"
1600205-55 = "เข้าใจแล้ว...แต่...ถ้าอย่างงั้น..."
1600205-56 = "มันก็...เหมือนกับที่ฉัน...คิดถึงคุณครู..."
1600205-57 = "......!!"
1600205-58 = "[s] \"......โคโทริ?\""
1600205-59 = "คือว่า... คุณครูคะ...ฉัน..."
1600205-60 = "ฉัน...ขอเข้าห้องน้ำหน่อยได้มั้ยคะ?"
1600205-61 = "ปะ... ไปแป๊ปเดียวค่ะ...!"
1600205-62 = "[s] \"...?\""
1600205-63 = "ขะ... ขอตัวนะคะ!!"
1600205-65 = "(โคโทริบอกว่าจะไปเข้าห้องน้ำแล้วก็ไม่กลับมาอีก)"
1600205-66 = "(หลังจากนั้นก็ได้รับข้อความ \"เพราะคุณครูช่วยไว้ ฉันถึงแก้ปัญหาทั้งหมดได้ ขอบคุณมากค่ะ\")"

[translation]
10039090-1 = "後日談;舞台上的對策委員會"
10039090-9 = "（今天是狂歡節的重頭戲「偶像比賽」的彩排日）"
10039090-10 = "（學生們不同以往的樣子，相當令人期待）"
10039090-18 = "[ns1]「啊，是茜香。」\n[ns2]「怎麼了嗎？」"
10039090-21 = "老，老師……！！大事不好了！！"
10039090-27 = "（接到茜香的緊急聯絡後，連忙前去與對策委員會碰面）"
10039090-33 = "老，老師……你來啦……"
10039090-34 = "[s]「發生什麼事了？」"
10039090-35 = "綾音醬他……"
10039090-39 = "綾音醬他不見了！"
10039090-40 = "[s]「嗯？」"
10039090-45 = "唔嘿～馬上就要彩排了說……真傷腦筋。"
10039090-46 = "完全聯絡不上……真擔心是不是出了什麼事。"
10039090-47 = "難道是跟茜香那次一樣……"
10039090-52 = "不是，這次的情況不一樣吧！"
10039090-53 = "大叔我的直覺也覺得應該不是那樣……"
10039090-54 = "唉，我們都找了這麼多地方還是沒找到……"
10039090-55 = "想說老師可能會知道……所以才請你幫忙。"
10039090-56 = "[s]「先從可能的地方一起找找看吧！」"
10039090-57 = "……嗯！！拜託了，老師！時間不多了。"
10039090-66 = "（找了許多綾音可能會在的地方）"
10039090-76 = "[ns]「綾音。」"
10039090-77 = "……"
10039090-84 = "老，老師？"
10039090-85 = "老師怎麼會在這裡……"
10039090-86 = "[s3]「你在這裡啊。」\n[s4]「沒事吧？」"
10039090-89 = "老，老師……"
10039090-96 = "呼，呼……綾音醬！找到了！"
10039090-97 = "綾，綾音醬……你在這裡啊。真是太好了。"
10039090-98 = "真是的～突然消失會讓大家擔心的哦？"
10039090-99 = "嗯，看起來沒受傷。"
10039090-101 = "茜香醬……大家……"
10039090-102 = "為什麼要一個人待在這裡呢，綾音醬？#n沒說一聲就不見人影，害我們都嚇了一跳。"
10039090-106 = "嗚……嗚嗚……"
10039090-110 = "綾，綾音醬？"
10039090-111 = "我，我好怕……"
10039090-112 = "咦？怕什麼……？"
10039090-113 = "舞……"
10039090-115 = "嗯？"
10039090-122 = "舞台……實在太大了……！！"
10039090-130 = "剛才上去的時候我才發現……"
10039090-131 = "跟想像中完全不一樣……而且觀眾席也很多……"
10039090-132 = "那可是巨型學園裡最大的舞台耶！大不是當然的嗎？"
10039090-133 = "可，可是我沒想到會這麼大嘛！"
10039090-135 = "哎呀……畢竟綾音醬平時就不喜歡引人注目……"
10039090-136 = "……看來是個難題。"
10039090-138 = "現，現在該怎麼辦！#n有些舞步我記得不太清楚，需要有綾音醬帶領才行啊……！"
10039090-139 = "本來還打算偷偷看綾音醬怎麼跳的說……！！"
10039090-140 = "對，對不起……！#n但我實在沒有信心能做好……"
10039090-141 = "一想到要站在那裡，腦袋就一片空白……#n就連視野都變得模糊……甚至會呼吸困難……"
10039090-142 = "要，要是計畫被我搞砸的話……該怎麼辦……"
10039090-143 = "[s]「計劃……？」"
10039090-145 = "用這次偶像比賽的獎金還學校的債，順便換新風扇的遠大計劃！"
10039090-146 = "嗯，夢想和錢都是越多越好。#n我們一開始就是以冠軍為目標。"
10039090-147 = "茜香醬和綾音醬肯定有機會的☆"
10039090-149 = "這麼遠大的計劃，卻因為我……嗚嗚……"
10039090-150 = "就算拿到冠軍也只有鼓勵性質的獎金，其實也沒多少啦……"
10039090-155 = "原來是這樣嗎……？"
10039090-157 = "可，可是……"
10039090-158 = "這個舞台也是和星野前輩的約定……嗚嗚……"
10039090-160 = "原來你一直放在心上啊……"
10039090-161 = "總之先站起來吧！綾音醬！#n繼續坐在這裡只會越來越負面的！"
10039090-162 = "唔嗯……遮住眼睛怎麼樣？#n這樣就不會看到觀眾了。"
10039090-164 = "感覺會得不償失呢……除了動作會受限之外，也會增加失誤的可能性。"
10039090-165 = "而且在那麼大的舞台上，除了視覺之外，就連空氣流動的感覺也不同……#n綾音醬可能是被那種氣氛壓得喘不過氣了。"
10039090-166 = "就連大叔我也沒站在那麼大的舞台上過呢～"
10039090-167 = "得設法減輕綾音醬的壓力和負擔才行……"
10039090-168 = "老師，有什麼好方法嗎？"
10039090-175 = "[ns]「綾音，能稍微聊聊嗎？」"
10039090-177 = "老師……"
10039090-178 = "[s5]「我明白這不是你熟悉的事。」\n[s6]「要站在別人面前並不容易。」"
10039090-181 = "嗯……在小教室練習的時候還沒有這種感覺……#n站上真正的舞台之後，我才發現根本完全不同……"
10039090-182 = "一想到有那麼多觀眾看著我……"
10039090-183 = "心跳就變得不受控制……緊張到身體無法動彈……"
10039090-184 = "[s]「那要不要試著這樣做？」"
10039090-189 = "[ns7]「既然對策委員會的大家都會在觀眾席上看著你……」\n[ns8]「只要把注意力都集中在大家身上就行了。」"
10039090-194 = "什，什麼！？"
10039090-195 = "[s9]「不是都說人的視野會在專注的時候變窄嗎？」 \n[s10]「這樣就不會過度在意周圍的觀眾了。」"
10039090-198 = "這，這樣……真的可以嗎……？"
10039090-199 = "[s]「嗯，我也會坐在那裡的。」"
10039090-200 = "老師也……"
10039090-201 = "嗯，我覺得值得一試。"
10039090-202 = "白子前輩……？"
10039090-203 = "我也有專注到眼中只有目標的經驗。"
10039090-204 = "比如操縱無人機潛入通風口，或者觀察銀行保全巡邏模式的時候……"
10039090-205 = "雖然舉的例子有點奇怪……#n但這或許是個不錯的方法……"
10039090-211 = "綾音醬！總之先試試看吧！！"
10039090-215 = "反正現在只是彩排而已，就算失誤也還有正式演出的機會……！"
10039090-216 = "茜香醬……"
10039090-217 = "雖然一開始不太情願……但我們這段時間不也盡全力練習了嗎？"
10039090-218 = "如果讓那些努力白費就太可惜了。"
10039090-219 = "就先照老師說的做吧。#n不行的話我們再一起想其他辦法。"
10039090-225 = "能試的手段就要盡量嘗試！這不是我們最擅長的嗎！！"
10039090-232 = "……"
10039090-233 = "嗯……！我明白了！"
10039090-235 = "綾音醬！"
10039090-236 = "茜香醬說的對，現在不是輕言放棄的時候。"
10039090-237 = "無論表演的舞台有多大，無論面對觀眾的心情有多忐忑……"
10039090-241 = "都比不上我們迄今為止留下的血汗！"
10039090-242 = "血的部分倒是還有待商榷就是了……"
10039090-243 = "我們會在這個舞台上燃燒一切！！"
10039090-247 = "不行啦！待會只是彩排而已！#n要是現在就燃燒完的話，到時候正式演出怎麼辦！？"
10039090-252 = "唔嘿～可愛的後輩終於振作起來了呢。"
10039090-253 = "看起來充滿幹勁，真是太好了。"
10039090-255 = "嗯，乘著這股氣勢應該沒問題。"
10039090-259 = "至少能帶走一半的觀眾！"
10039090-261 = "你指的應該是感動吧？白子醬。"
10039090-262 = "那麼，我們去做準備吧。"
10039090-267 = "嗯……我不會再動搖了。"
10039090-268 = "大家……請在觀眾席上看著我吧！"
10039090-269 = "[s11]「嗯。我們會一直看著你的。」\n[s12]「你一定能做到的，綾音。」"
10039090-272 = "呵呵，謝謝……"
10039090-276 = "茜香醬，你剛才說有舞步忘記了是指哪一段？#n我們再一起練習一次吧！"
10039090-281 = "啊，嗯！那個，應該是在這一段……"
10039090-283 = "那麼，大家一起往彩排舞台移動吧☆"
10039090-290 = "（雖然綾音起初確實把視線牢牢固定在觀眾席上，#n　不過在表演開始之後，他的緊張感便逐漸消失了）"
10039090-291 = "（由於舞台與觀眾席的距離比想像中遠，導致雙方都看不太清楚彼此……）"
10039090-297 = "（但這絲毫不影響綾音和茜香兩人表演的精采程度）"

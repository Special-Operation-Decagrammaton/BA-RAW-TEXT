[translation]
10039090-1 = "ย้อนวันวาน;ความเครียดของคณะกรรมการแผนงาน"
10039090-9 = "(วันนี้คือวันซ้อมการประกวดไอดอล หรือก็คือไฮไลท์ของคาร์นิวัล)"
10039090-10 = "(คุณครูตั้งตารอที่จะเห็นอีกด้านหนึ่งของนักเรียน)"
10039090-18 = "[ns1] \"อ๊ะ เซริกะ\"\n[ns2] \"มีเรื่องอะไรเหรอ?\""
10039090-21 = "คะ... คุณครู...!! เกิดเรื่องใหญ่แล้ว!!"
10039090-27 = "(คุณครูได้รับการติดต่อเรื่องด่วนจากเซริกะ จึงรีบไปหาคณะกรรมการแผนงาน)"
10039090-33 = "คะ... คุณครู... มาแล้วสินะ..."
10039090-34 = "[s] \"เกิดเรื่องอะไรกันเหรอ?\""
10039090-35 = "อายาเนะ..."
10039090-39 = "อายาเนะหายตัวไปน่ะ!"
10039090-40 = "[s] \"หืม???\""
10039090-45 = "แหะๆ~ นี่ก็ใกล้จะถึงเวลาซ้อมแล้วด้วย... แบบนี้ไม่ดีเลยน้า"
10039090-46 = "พวกเราติดต่อไปก็ไม่รับ... ก็เลยกังวลว่าจะเกิดเรื่องอะไรขึ้นกับอายาเนะหรือเปล่าน่ะค่ะ"
10039090-47 = "ก่อนหน้านี้ก็เคยมีเรื่องเซริกะด้วย..."
10039090-52 = "เดี๋ยวสิ มันไม่เหมือนกับตอนนั้นสักหน่อย!"
10039090-53 = "แต่ลุงว่าไม่น่าใช่เรื่องแบบนั้นหรอกนะ..."
10039090-54 = "เฮ้อ ฉันตามหาจนทั่วแล้ว แต่ก็ยังไม่เจอตัว..."
10039090-55 = "แล้วก็คิดว่าคุณครูอาจจะรู้ ก็เลยติดต่อขอความช่วยเหลือไปน่ะ"
10039090-56 = "[s] \"ช่วยกันหาในที่ที่คิดว่าอายาเนะจะไปอยู่ก่อนแล้วกัน!\""
10039090-57 = "อื้อ...!! รบกวนด้วยนะคุณครู! เรามีเวลาไม่มากแล้ว"
10039090-66 = "(คุณครูไปตามหาอายาเนะในที่ที่คิดว่าเธอจะไปอยู่)"
10039090-76 = "[ns] \"อายาเนะ\""
10039090-77 = "..."
10039090-84 = "คะ... คุณครู?"
10039090-85 = "คุณครูมาอยู่ที่นี่ได้ยังไง..."
10039090-86 = "[s3] \"อยู่ที่นี่เองเหรอ\"\n[s4] \"เป็นยังไงบ้าง?\""
10039090-89 = "คะ... คุณครู..."
10039090-96 = "แฮ่ก... แฮ่ก... อายาเนะ! เจอตัวแล้ว!"
10039090-97 = "อ๊ะ อายาเนะจัง... อยู่ที่นี่เองเหรอคะ โล่งอกไปที"
10039090-98 = "จริงๆ เลย จู่ๆ ก็หายไปแบบนี้ พวกเราเป็นห่วงนะ"
10039090-99 = "อื้อ เหมือนจะไม่ได้บาดเจ็บตรงไหนนะ"
10039090-101 = "ซะ... เซริกะจัง... ทุกคน..."
10039090-102 = "ทำไมมาอยู่ที่นี่คนเดียวล่ะ อายาเนะ? ฉันตกใจที่หายไปแบบไม่บอกกล่าวแบบนี้นะ"
10039090-106 = "ฮือ... ฮือ..."
10039090-110 = "อะ... อายาเนะ?"
10039090-111 = "ฉะ... ฉันกลัวค่ะ..."
10039090-112 = "เอ๋? กลัวอะไร?"
10039090-113 = "เวที..."
10039090-115 = "หืม?"
10039090-122 = "เวทีมัน... ใหญ่มากเลยค่ะ...!!"
10039090-130 = "มะ... เมื่อกี้ฉันลองไปขึ้นเวทีมา... แล้วมันก็ใหญ่มากเลยค่ะ..."
10039090-131 = "ที่นั่งคนดูก็เยอะมาก... นะ... นี่มันยิ่งใหญ่กว่าที่ฉันคิดไว้เยอะเลยค่ะ..."
10039090-132 = "ก็มันเป็นเวทีที่ใหญ่ที่สุดของโรงเรียนขนาดใหญ่นี่นา! จะเป็นอย่างนั้นก็ไม่แปลกหรอก!"
10039090-133 = "ตะ... แต่ฉันไม่รู้ว่ามันจะใหญ่แบบนี้นี่คะ!"
10039090-135 = "ก็นะ... ปกติอายาเนะจังก็ไม่ชอบให้ตัวเองเป็นที่สะดุดตาอยู่แล้ว..."
10039090-136 = "ปัญหานี้จะแก้ยังไงดีนะ..."
10039090-138 = "อะ... เอาไงดีล่ะ! ฉันจำท่าเต้นได้ไม่หมด ก็เลยต้องให้อายาเนะช่วยเต้นนำให้ซะด้วย...!"
10039090-139 = "กะว่าจะชำเลืองมองอายาเนะเต้นก่อน แล้วฉันค่อยเต้นตามแท้ๆ...!!"
10039090-140 = "ขะ... ขอโทษด้วยค่ะ...! ฉันไม่มั่นใจว่าจะทำออกมาได้ดีหรือเปล่าค่ะ..."
10039090-141 = "พอคิดว่าตัวเองต้องไปยืนตรงนั้น ฉันก็สมองตันไปหมด... ภาพข้างหน้าก็เบลอ หายใจก็ไม่ค่อยออก..."
10039090-142 = "ถ้าแผนการนี้พังลงเพราะฉันล่ะคะ... ฉันต้องทำยังไงดีคะ?"
10039090-143 = "[s] \"แผนการเหรอ...?\""
10039090-145 = "แผนการอันยิ่งใหญ่ที่เราจะชนะในการประกวดไอดอล แล้วเอาเงินรางวัลไปใช้หนี้ของโรงเรียน และเปลี่ยนพัดลมพังๆ เป็นพัดลมใหม่น่ะ!"
10039090-146 = "อืม ความฝันกับเงิน ยิ่งมีเยอะก็ยิ่งดีไม่ใช่เหรอ พวกเราตั้งเป้าว่าจะต้องชนะให้ได้น่ะ"
10039090-147 = "ฉันเชื่อว่าเซริกะจังกับอายาเนะจังต้องทำได้ดีค่ะ☆"
10039090-149 = "ฉะ... ฉันทำให้แผนการที่ยิ่งใหญ่นั้นต้อง... ฮือ..."
10039090-150 = "ต่อให้ชนะไปก็คงได้แค่เงินปลอบใจน่ะนะ มันไม่ได้เยอะขนาดนั้นหรอก..."
10039090-155 = "ไม่เยอะเหรอ...?"
10039090-157 = "ตะ... แต่ว่า..."
10039090-158 = "การแสดงครั้งนี้เป็นสิ่งที่ฉันสัญญากับรุ่นพี่โฮชิโนะไว้... มุแงงง..."
10039090-160 = "กังวลใจเรื่องนั้นสินะ..."
10039090-161 = "ละ... ลุกขึ้นเถอะ! อายาเนะ! ถ้าเอาแต่นั่งจะยิ่งไม่มีกำลังใจนะ!"
10039090-162 = "อืม... ปิดตาดีมั้ยล่ะ? จะได้ไม่เห็นผู้ชมไง"
10039090-164 = "ฉันว่าแบบนั้นน่าจะมีข้อเสียมากกว่าข้อดีนะคะ... ถ้าทำแบบนั้นจะมีข้อจำกัดในการเคลื่อนไหว และอาจเกิดข้อผิดพลาดได้มากขึ้นด้วยค่ะ"
10039090-165 = "และบนเวทีขนาดใหญ่แบบนั้น ปัญหาไม่ได้อยู่แค่การมองเห็นอย่างเดียวหรอกค่ะ บรรยากาศบนนั้นน่า#nจะส่งต่อความรู้สึกที่แตกต่างให้คนบนเวทีด้วย... ฉันว่าตอนนี้อายาเนะจังทั้งกลัวและตื่นเวทีเลยละค่ะ"
10039090-166 = "ลุงเองก็ไม่เคยไปยืนบนเวทีแบบนั้นด้วยสินะ~"
10039090-167 = "เราน่าจะต้องช่วยอายาเนะจังแบ่งเบาความกดดันนั้นกันนะคะ..."
10039090-168 = "มีวิธีอะไรดีๆ มั้ยคะคุณครู?"
10039090-175 = "[ns] \"อายาเนะ ตอนนี้ไหวหรือเปล่า?\""
10039090-177 = "คุณครู..."
10039090-178 = "[s5] \"สิ่งที่ไม่คุ้นเคยจะเป็นประสบการณ์นะ เรื่องนั้นครูก็รู้ดี\"\n[s6] \"ครูรู้ว่าการยืนต่อหน้าคนอื่นไม่ใช่เรื่องง่ายเลย\""
10039090-181 = "ค่ะ... ตอนซ้อมในห้องเรียนฉันก็โอเคอยู่หรอก... แต่พอได้มาเจอเวทีจริง มันกลับต่างออกไปจากตอน#nซ้อมอย่างสิ้นเชิงเลยค่ะ..."
10039090-182 = "พะ... พอคิดว่าผู้ชมมากมายจะนั่งดูฉันทำการแสดง..."
10039090-183 = "ฉันก็ใจเต้น... แล้วก็รู้สึกตึงเครียดขึ้นมา..."
10039090-184 = "[s] \"งั้นทำแบบนี้ดีมั้ย?\""
10039090-189 = "[ns7] \"มองมาที่คณะกรรมการแผนงานก็พอ\"\n[ns8] \"คิดว่าทำการแสดงให้เพื่อนๆ ดูก็พอ\""
10039090-194 = "คะ... คะ?!"
10039090-195 = "[s9] \"ถ้าทำอย่างนั้น มุมมองของเราจะได้แคบลงไง\"\n[s10] \"แล้วเราจะไม่สนใจผู้ชมคนอื่นไปเองนะ\""
10039090-198 = "ทะ... ทำแบบนั้น... ก็ได้เหรอคะ...?"
10039090-199 = "[s] \"อื้อ ครูก็จะไปอยู่ตรงนั้นกับทุกคนเอง\""
10039090-200 = "คุณครูก็ด้วย..."
10039090-201 = "อืม ฉันว่าก็น่าลองทำดูนะ"
10039090-202 = "รุ่นพี่ชิโรโกะ...?"
10039090-203 = "เวลาเพ่งความสนใจไปที่สิ่งใดสิ่งหนึ่งมากๆ เราจะมองเห็นแค่สิ่งนั้นน่ะ ฉันเองก็มีประสบการณ์แบบนี้#nมาบ่อยๆ"
10039090-204 = "อย่างเช่นตอนที่บังคับโดรนไปแอบในช่องระบายอากาศ หรือตอนวิเคราะห์การลาดตระเวนของยามใน#nธนาคาร..."
10039090-205 = "ตะ... ตัวอย่างอาจจะฟังดูแปลกๆ... แต่ถ้าเป็นจริงละก็ มันก็น่าลองอยู่..."
10039090-211 = "อายาเนะ! มาลองทำดูก่อนนะ!!"
10039090-215 = "ยังไงตอนนี้ก็แค่การซ้อมนี่นา? ต่อให้ทำพลาด เราก็ยังเหลือการแสดงจริงอีก...!"
10039090-216 = "เซริกะจัง..."
10039090-217 = "ถึงเราจะไม่ได้เป็นไอดอลจากความตั้งใจตั้งแต่แรก... แต่ที่ผ่านมาเราก็ตั้งใจฝึกซ้อมกันมากเลยนี่นา?"
10039090-218 = "ถ้าความพยายามนั้นสูญเปล่าไป มันก็น่าเสียดายนะ"
10039090-219 = "ทำตามวิธีที่คุณครูบอกกันเถอะ แล้วถ้าไม่ได้ผล ค่อยมาคิดกันต่อ"
10039090-225 = "มาทำสิ่งที่เราทำได้กัน! นั่นคือสิ่งที่พวกเราเก่งกันไม่ใช่เหรอ!!"
10039090-232 = "..."
10039090-233 = "อื้อ...! เข้าใจแล้วค่ะ!"
10039090-235 = "อายาเนะจัง!"
10039090-236 = "อย่างที่เซริกะจังพูดเลยค่ะ เรามาถึงตรงนี้แล้ว จะยอมแพ้ไม่ได้ค่ะ"
10039090-237 = "ต่อให้เวทีจะใหญ่ขนาดไหน ผู้ชมจะมากเพียงใด หรือต่อให้ฉันจะกลัวและประหม่าแค่ไหน..."
10039090-241 = "แต่ที่ผ่านมาเราก็เสียทั้งเหงื่อ เลือด และน้ำตามานี่คะ!"
10039090-242 = "ไม่น่าจะถึงกับเสียเลือดนะ..."
10039090-243 = "ฉันจะงัดทุกอย่างที่ซ้อมมา! แล้วทำให้เวทีนี้ต้องลุกเป็นไฟเลยค่ะ!!"
10039090-247 = "ไม่นะ! ลุกเป็นไฟเลยเหรอ? นี่แค่การซ้อมนะ! จะเผาเวทีเลยไม่ได้สิ! ตอนแสดงจริงจะเอาเวทีที่ไหน#nแสดงล่ะ?!"
10039090-252 = "แหะๆ~ ท่าทางรุ่นน้องที่น่ารักจะได้พลังใจขึ้นมาแล้วสินะ~"
10039090-253 = "พอเห็นความตั้งใจอันแรงกล้า ก็โล่งอกขึ้นมาเลยนะคะ"
10039090-255 = "อืม ถ้ามั่นใจแบบนี้ก็ทำได้แน่ๆ"
10039090-259 = "คิดว่าผู้ชมคนอื่นเป็นต้นไม้ แล้วมองมาที่พวกเราก็พอ!"
10039090-261 = "พูดซะเห็นภาพเลยนะคะ ชิโรโกะจัง"
10039090-262 = "เอาละ งั้นก็ไปเตรียมตัวต่อกันเถอะ"
10039090-267 = "ค่ะ... จากนี้ฉันจะไม่หวั่นไหวอีกแล้วค่ะ"
10039090-268 = "ทุกคน... ช่วยตั้งใจดูพวกฉันจากที่นั่งของผู้ชมด้วยนะคะ!"
10039090-269 = "[s11] \"อื้อ พวกเราจะคอยให้กำลังใจนะ\"\n[s12] \"อื้อ จะต้องออกมาดีแน่นอน อายาเนะ\""
10039090-272 = "ฮุฮุ ขอบคุณค่ะ..."
10039090-276 = "เซริกะจัง เมื่อกี้ที่บอกว่าลืมท่าเต้นคือท่อนไหนเหรอ? ไปซ้อมกันอีกรอบเถอะ!"
10039090-281 = "อ๊ะ อื้อ! อืม ลืมท่าเต้นตั้งแต่ท่อนไหนนะ..."
10039090-283 = "เอาละ ทุกคนไปที่เวทีซ้อมใหญ่กันเถอะค่ะ☆"
10039090-290 = "(ในตอนแรกอายาเนะเอาแต่จับจ้องที่นั่งของผู้ชม แต่เมื่อเริ่มเพลง อายาเนะก็ดูค่อยๆ ประหม่าน้อยลง)"
10039090-291 = "(เวทีอยู่ห่างจากที่นั่งมากกว่าที่คิด ทำให้มองเห็นทั้งสองคนแค่ตัวเล็กๆ)"
10039090-297 = "(แต่การแสดงที่ยอดเยี่ยมของอายาเนะกับเซริกะก็ดำเนินไปได้อย่างราบรื่น)"

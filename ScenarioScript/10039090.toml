[translation]
10039090-1 = "Afterword;Foreclosure Task Force on the Stage"
10039090-9 = "It was dress rehearsal day for the pop idol contest, the highlight of the Carnival."
10039090-10 = "I was looking forward to seeing what kinds of different looks the students had come up with."
10039090-18 = "[ns1] \"Hey, Serika.\"\n[ns2] \"Everything all right?\""
10039090-21 = "S-Sensei, can you hear me?"
10039090-27 = "Serika called me with an urgent message, asking me to come meet with the Foreclosure Task Force."
10039090-33 = "Sensei, come quick..."
10039090-34 = "[s] \"What's going on?\""
10039090-35 = "Ayane..."
10039090-39 = "Ayane's disappeared!"
10039090-40 = "[s] \"Disappeared?\""
10039090-45 = "Ooh, it's almost rehearsal time... This is terrible..."
10039090-46 = "She's not checking her messages. I'm worried something might have happened to her."
10039090-47 = "It's like that whole incident with Serika..."
10039090-52 = "No, it's not! This is WAY different!"
10039090-53 = "My intuition says she's right, it is different..."
10039090-54 = "Anyway, we've looked everywhere. Where could she be?"
10039090-55 = "We were hoping you might have some ideas, Sensei."
10039090-56 = "[s] \"Well, let's think of places we haven't looked, where she might be.\""
10039090-57 = "Right. Okay, we've got to think fast..."
10039090-66 = "We searched every place we could think of, until..."
10039090-76 = "[ns] \"Ayane, there you are.\""
10039090-77 = "Hm?"
10039090-84 = "Sensei?!"
10039090-85 = "How did you...?"
10039090-86 = "[s3] \"We've been looking all over.\"\n[s4] \"Are you okay?\""
10039090-89 = "S-Sensei..."
10039090-96 = "*pant* *pant* Ayane, we found you!"
10039090-97 = "Ah, Ayane... There you are. I'm glad."
10039090-98 = "We were all worried when you disappeared."
10039090-99 = "I'm just glad you're okay."
10039090-101 = "S-Serika... Everyone..."
10039090-102 = "Why are you here all alone, though? You just took off. Didn't say a word."
10039090-106 = "*sob* *sob*"
10039090-110 = "A-Ayane?"
10039090-111 = "I-I'm scared..."
10039090-112 = "Huh? What are you scared of?"
10039090-113 = "...The..."
10039090-115 = "...Huh?"
10039090-122 = "The stage... It's so big...!"
10039090-130 = "I went up there earlier, and it was just so huge..."
10039090-131 = "And there are so many seats for the audience... It's so, so much bigger than I thought it was going to be."
10039090-132 = "Well, it IS the biggest stage among the biggest schools, so yeah!"
10039090-133 = "I know, I just didn't think it was going to be THAT big!"
10039090-135 = "Well, I guess...since you don't usually like standing out..."
10039090-136 = "I'm...not sure how to solve this problem."
10039090-138 = "Well, great, NOW what am I supposed to do? I forgot part of the choreography already."
10039090-139 = "I was planning to just watch you and follow along!"
10039090-140 = "I-I'm sorry... I'd probably just mess it up for you anyway..."
10039090-141 = "The thought of standing up there in front of all those people makes my head go blank. My eyes blur, and I can barely breathe..."
10039090-142 = "But if I ruin our whole plan..."
10039090-143 = "[s] \"Plan...?\""
10039090-145 = "We were going to win the prize money, pay off the school's debt, and then finally replace the old fan."
10039090-146 = "We were aiming high. We were in this to win it from the start."
10039090-147 = "And with Serika and Ayane together, we thought we had a shot... ☆"
10039090-149 = "But now, the whole PLAN is shot, because I'm too nervous..."
10039090-150 = "Well, if it helps, the prize is just kind of a bonus. It's not actually that much money."
10039090-155 = "...It's not?"
10039090-157 = "B-But still..."
10039090-158 = "I made you all a promise... *sob*"
10039090-160 = "Is that what you're worried about...?"
10039090-161 = "Hey, Ayane, stand up! You're going to waste more energy sitting down!"
10039090-162 = "Hmm... What if we cover your eyes? That way, you won't see the audience."
10039090-164 = "I think the cons would outweigh the pros. She wouldn't be able to move as well, and could make more mistakes."
10039090-165 = "Besides, it's not just a question of what she can or can't see. On a stage like that, the atmosphere is just as important. It's like the air is electrified."
10039090-166 = "Yeah, even I've never been on a stage that big before."
10039090-167 = "Well, we need to take the pressure off her somehow, even if it's just a little bit."
10039090-168 = "Sensei, do you have any ideas?"
10039090-175 = "[ns] \"...Ayane, can we talk for a minute?\""
10039090-177 = "Sensei..."
10039090-178 = "[s5] \"It'll be an unfamiliar experience, I know.\"\n[s6] \"It's not easy to stand up in front of everybody.\""
10039090-181 = "Right? Practicing in our own little classroom was one thing, but up there..."
10039090-182 = "Just thinking about all those people, looking at me..."
10039090-183 = "The more I think about it, the faster my heart keeps going."
10039090-184 = "[s] \"Then how about we do this?\""
10039090-189 = "[ns7] \"The Foreclosure Task Force will be in the audience too.\"\n[ns8] \"Focus your attention on your friends.\""
10039090-194 = "H-Huh?"
10039090-195 = "[s9] \"When you concentrate, your field of vision narrows.\"\n[s10] \"Do that, and the rest of the crowd won't bother you as much.\""
10039090-198 = "Y-You think so...?"
10039090-199 = "[s] \"I do. And I'll be sitting there too.\""
10039090-200 = "You too, huh?"
10039090-201 = "I think it's worth trying."
10039090-202 = "Shiroko?"
10039090-203 = "When I'm extremely focused, I can only see the target."
10039090-204 = "Like when I'm piloting a drone to sneak into a vent, or tracking the patrol cycle of a bank security guard..."
10039090-205 = "Those are oddly specific examples, but if it works, it works."
10039090-211 = "Yeah, let's give it a try, Ayane!"
10039090-215 = "It's just a rehearsal anyway, right? Even if you slip up, it's not the real performance."
10039090-216 = "Serika..."
10039090-217 = "This wasn't what either of us had in mind, but we've both been practicing hard, right? "
10039090-218 = "Wouldn't want all that hard work to go to waste."
10039090-219 = "Let's try Sensei's idea. If it still doesn't work, we can go from there."
10039090-225 = "But whatever happens, let's give it all we've got, like we always do!"
10039090-232 = "Hm..."
10039090-233 = "Yeah... Okay!"
10039090-235 = "All right, Ayane!"
10039090-236 = "Just like Serika said, we can't give up now."
10039090-237 = "No matter how big the stage is, no matter how huge and scary and nerve-wracking the audience is..."
10039090-241 = "We'll do it for all the blood, sweat, and tears we've already shed!"
10039090-242 = "I'm not sure about the blood, but yeah."
10039090-243 = "We're gonna light up that stage like a flash bomb!"
10039090-247 = "A METAPHORICAL flash bomb, and also, it's just a rehearsal. Save something for the real performance!"
10039090-252 = "Heehee! Well, my cute junior has finally perked up!"
10039090-253 = "I'm glad she's feeling motivated."
10039090-255 = "Right. With this momentum, we can do it!"
10039090-259 = "I bet at least half the audience will be on our side!"
10039090-261 = "...As in, we'll move them emotionally, right?"
10039090-262 = "Well, let's go finish getting ready."
10039090-267 = "Let's do it. Nothing's going to hold me back now."
10039090-268 = "Everyone else, please watch!"
10039090-269 = "[s11] \"We will be.\"\n[s12] \"You've got this, Ayane.\""
10039090-272 = "Heehee, thank you..."
10039090-276 = "Oh, Serika, which part of the choreography did you forget? Let's practice it together real quick!"
10039090-281 = "Ah, yeah! It's the part where..."
10039090-283 = "It's time! Let's hurry up and get you on stage! ☆"
10039090-290 = "At first, Ayane seemed fixated on the audience, but as the performance began, we could see her relaxing little by little."
10039090-291 = "The stage was far from the audience, so they both looked small to each other."
10039090-297 = "Even though it was just a rehearsal, and even on that giant stage, Ayane and Serika gave a wonderful performance."

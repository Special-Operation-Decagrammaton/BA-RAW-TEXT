[translation]
10038085-9 = "ขอขอบคุณในความกรุณาค่ะ..."
10038085-16 = "ทำได้ดีแล้วละ คางุยะ"
10038085-20 = "จงพาตัวผู้บาดเจ็บไปรักษา อาการของคางุยะไม่สู้ดีนัก จงพาเธอไปยังที่ที่ปลอดภัย แล้วระวังไม่ให้เกิดภาวะแทรกซ้อนใดๆ ด้วย"
10038085-21 = "ส่วนการตัดสินใจและการลงโทษ เราจะจัดการหลังจากทุกอย่างจบลงแล้ว"
10038085-24 = "รับคำสั่งค่ะ!"
10038085-26 = "มังกรดำ ระดมพล! ทำในสิ่งที่ต้องทำ!"
10038085-27 = "ทางเปิดแล้วค่ะ! เราจะพลาดโอกาสนี้ไม่ได้โดยเด็ดขาด!"
10038085-29 = "เอาอาคารหกเหลี่ยมกลับมา! คุ้มกันท่านประมุข แล้วพาท่านไปที่นั่น!"
10038085-37 = "ต้องทำงานหนักน่าดูเลยนะ มินะ"
10038085-38 = "ไม่หรอกค่ะ ตอนนี้ฉันรู้สึกโล่งใจมากกว่าที่ได้ช่วยท่านประมุขและมังกรดำค่ะ"
10038085-39 = "จะไม่เป็นอะไรหรือ? ในแง่หนึ่ง ตอนนี้เหมือนเรากำลังสู้จนสุดทางแล้ว หากล้มเหลวหรือผิดพลาด#nแม้แต่ครั้งเดียว ก็จะไม่มีครั้งต่อไปแล้วนะ"
10038085-40 = "ท่านประมุขกำลังบอกให้ฉันทิ้งท่าน แล้วออกไปหาเส้นทางเอาตัวรอดของตัวเองเหรอคะ?"
10038085-41 = "..."
10038085-42 = "ฉันจะไม่บอกว่าไม่ต้องกังวลหรอกนะคะ เพราะถึงจะบอกไป ท่านประมุขก็คงไม่ฟังหรอกค่ะ"
10038085-47 = "แต่ต่อให้ท่านประมุขทอดทิ้งฉัน ฉันก็ไม่มีวันทอดทิ้งท่านประมุขหรอกค่ะ"
10038085-53 = "อืม... "
10038085-54 = "จุดหมายต่อไปคือที่ไหนคะ? ชมรมวิจัยศาสตร์การปรุงยาใช่มั้ยคะ?"
10038085-58 = "ไปที่คุกใต้ดินกัน"
10038085-59 = "คุก... อย่างนั้นเหรอคะ?"

[translation]
10038085-9 = "I am...beyond grateful to you."
10038085-16 = "Well done, Kaguya."
10038085-20 = "Treat the wounded. Kaguya's condition is particularly bad. Transport her to a safe place and ensure there are no complications."
10038085-21 = "Once the battlefield is cleared, I will issue decrees."
10038085-24 = "Understood!"
10038085-26 = "Genryumon, assemble! Carry out your tasks!"
10038085-27 = "A path has been opened! We must not miss this opportunity!"
10038085-29 = "Recapture the Rikkagaku! Escort the president!"
10038085-37 = "You're working hard, Mina."
10038085-38 = "I'm just earning my keep, finally."
10038085-39 = "Will you be all right? In a sense, we are taking a gamble with no way back. If we fail or make even one mistake, there will be no second chance."
10038085-40 = "Are you suggesting I find a way to survive? On my own, if something goes wrong?"
10038085-41 = "......"
10038085-42 = "I won't tell you not to worry. That's practically impossible for you."
10038085-47 = "But even if you left me behind, I would always be yours."
10038085-53 = "...Very well. "
10038085-54 = "What's our next destination? The Eastern Alchemy Society?"
10038085-58 = "The prison."
10038085-59 = "...Oh. The prison."

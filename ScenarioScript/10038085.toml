[translation]
10038085-9 = "感謝……門主大人的恩澤……"
10038085-16 = "有勞汝了，輝夜。"
10038085-20 = "趕緊治療傷者。#n尤其輝夜的狀況特別不好。將其送至安全的地方以防後患。"
10038085-21 = "所有裁決與處置，都待一切結束後再進行。"
10038085-24 = "遵命！"
10038085-26 = "玄龍門，集合！開始執行該做的工作！"
10038085-27 = "道路已經敞開！不能錯失機會！"
10038085-29 = "奪回六和閣！護送門主大人！"
10038085-37 = "辛苦了，美奈。"
10038085-38 = "不敢當。#n我直到現在才為自己多少有所貢獻一事感到安心。"
10038085-39 = "不要緊嗎？此行或可稱之為背水一戰。#n一旦失敗或出錯，將無後路可言。"
10038085-40 = "您的意思是如果情況不妙，希望我自己另尋生路嗎？"
10038085-41 = "……"
10038085-42 = "我不會要求您不必擔心。#n畢竟門主大人本來就是個容易操心的人。"
10038085-47 = "不過即便門主大人拋棄了我，我也絕不會離門主大人而去。"
10038085-53 = "……這樣啊。"
10038085-54 = "下一個目的地是哪裡呢？果然是鍊丹術研究會嗎？"
10038085-58 = "去地下監獄吧。"
10038085-59 = "監獄……是嗎？"

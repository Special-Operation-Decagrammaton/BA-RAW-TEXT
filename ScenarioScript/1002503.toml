[translation]
1002503-1 = "It's Inconvenient Being Small!"
1002503-2 = "I immediately ran to the Plum Blossom Garden after reading Shun's latest MomoTalk."
1002503-5 = "Shanhaijing Plum Blossom Garden"
1002503-7 = "[ns] \"Shun, where are you?\""
1002503-8 = "I'm up here..."
1002503-13 = "[ns] \"I don't see you...\""
1002503-14 = "No, not there. On top of the storage cabinet near the ceiling."
1002503-20 = "Shun was trembling on top of the storage cabinet like a cat in a tree."
1002503-21 = "[s] \"Why are you up there?\""
1002503-22 = "I was planning on cleaning up the toys as usual before the kids returned..."
1002503-23 = "...but after climbing up here, I realized it was too high. I can usually reach places like this with ease, but now I can't get back down."
1002503-24 = "How long are you just going to stand there and stare? Help me down, Sensei."
1002503-25 = "[s] Lift Shun and put her down."
1002503-30 = "U-Ugh. It was so much easier to get where I needed to be before I became small."
1002503-31 = "It turns out this tiny body is inconvenient after all."
1002503-32 = "In any case, there are still a lot of toys at the top I wasn't able to sort. I don't know what to do."
1002503-33 = "[s] \"Couldn't I just arrange them for you?\""
1002503-34 = "There are all sorts of toys that need to be organized by age, and I can't call out each individual toy's category. That'd be a hassle."
1002503-35 = "I just wish there were some other way I could reach the really high places."
1002503-37 = "Wait, I know of one way!"
1002503-38 = "Sensei, let me get on your shoulders!"
1002503-39 = "I can do this no problem if I stand on your shoulders."
1002503-40 = "Hurry..."
1002503-41 = "[s] Let Shun get on your shoulders."
1002503-46 = "Wow! It's so high up! I feel like I can see way higher than even at my old height!"
1002503-47 = "I could even organize the baskets at the very top from up here."
1002503-49 = "Wh-Whoa, Sensei! Hold on to me tighter, or else I'm gonna fall!"
1002503-51 = "I helped Shun clean up the Plum Blossom Garden for some time with her on my shoulders."
1002503-53 = "We're finally done cleaning!"
1002503-54 = "Thank you for helping me, Sensei."
1002503-55 = "I was on your shoulders for half a day. I wasn't too heavy, was I?"
1002503-56 = "[s] \"You're way lighter than normal, so it wasn't a problem.\""
1002503-57 = "I see. That's a relief..."
1002503-59 = "...is what I'd like to say, but what's that supposed to mean? Are you implying I was heavy before?"
1002503-60 = "[s1] \"Th-That's not what I meant.\"\n[s2] \"Yes.\""
1002503-61 = "How rude of you!"
1002503-62 = "...!"
1002503-63 = "I'm so upset with you right now!"
1002503-64 = "You're gonna pay for this, [USERNAME] Sensei!"
1002503-69 = "Now, let's do Higher and Higher."
1002503-70 = "[s] \"Higher and Higher?\""
1002503-71 = "Yes, it's where you hold under my arms and lift me up high. "
1002503-72 = "This is the game I like to play with the Plum Blossom Garden children when they're sulking. You hurt my feelings, so now you have to do it for me."
1002503-73 = "You're not going to say I'm too heavy to do it with, are you?"
1002503-74 = "[s3] Put your hands under Shun's arms and lift her up.\n[s4] \"One Higher and Higher, coming right up.\""
1002503-87 = "Heehee. It's fun to be on the receiving end of this every once in a while."
1002503-88 = "Now I understand why this cheers the children up."
1002503-89 = "Huh? Where are you going?"
1002503-90 = "I'm not done being mad at you yet!"
1002503-95 = "You have to keep lifting me up until I'm not mad anymore. ♥"
1002503-97 = "I had a fun time playing Higher and Higher with Shun for a while."

[translation]
1002503-1 = "ตัวเล็กแล้วไม่สะดวกสุดๆ เลย!"
1002503-2 = "(คุณครูอ่าน MOMOTALK ของชุนแล้วก็รีบตรงมาที่สวนต้นบ๊วย)"
1002503-5 = "สวนต้นบ๊วย ซานไห่จิง"
1002503-7 = "[ns] \"ชุน อยู่ไหนน่ะ?\""
1002503-8 = "ฉันอยู่ข้างบนนี้ค่ะ..."
1002503-13 = "[ns] \"ไม่เห็นเลย...\""
1002503-14 = "ไม่ใช่ทางนั้น... ฉันอยู่บนชั้นเก็บของ... อีกนิดก็เพดานแล้วค่ะ"
1002503-20 = "(ชุนนั่งสั่นอยู่บนชั้นเก็บของเหมือนกับแมวที่ปีนขึ้นไปบนต้นไม้)"
1002503-21 = "[s] \"แล้วขึ้นไปอยู่บนนั้นได้ยังไงน่ะ...?\""
1002503-22 = "ฉันตั้งใจจะจัดของเล่นให้เสร็จก่อนที่เด็กๆ จะกลับมาเหมือนทุกวัน..."
1002503-23 = "แต่เพราะเป็นจุดที่มือเอื้อมถึงง่ายๆ ก็เลยไม่ได้คิดอะไร แต่พอขึ้นมาแล้วก็กลัวจนไม่กล้าลงไปน่ะค่ะ..."
1002503-24 = "คุณครูจะยืนดูฉันอีกนานแค่ไหนเหรอคะ ช่วยพาฉันลงไปเร็วๆ เถอะนะคะ"
1002503-25 = "[s] ไปอุ้มชุนลงมา"
1002503-30 = "ฉันขึ้นลงที่นี่ได้อย่างสบายก่อนที่ตัวจะเล็กลงแบบนี้..."
1002503-31 = "พอตัวเล็กแบบนี้แล้วไม่สะดวกเลยค่ะ"
1002503-32 = "จะว่าไป บนนั้นยังมีของเล่นที่ยังจัดไม่เสร็จเยอะแยะเลย ทำยังไงดีนะ..."
1002503-33 = "[s] \"ให้ครูช่วยจัดไม่ได้เหรอ?\""
1002503-34 = "มันมีของเล่นหลายประเภทที่เหมาะในแต่ละช่วงอายุน่ะค่ะ แล้วการบอกประเภทของแต่ละชิ้น#nก็เป็นเรื่องยุ่งยากด้วย..."
1002503-35 = "จะมีวิธีไหนที่ทำให้ฉันแตะถึงที่สูงๆ บ้างมั้ยนะ..."
1002503-37 = "อ๊ะ! คิดออกแล้วค่ะ!"
1002503-38 = "คุณครู! อุ้มฉันขี่คอหน่อยได้มั้ยคะ?"
1002503-39 = "ถ้าได้อยู่บนตัวคุณครูก็คงมองเห็นได้เยอะ แล้วก็จะจัดของเล่นได้ง่ายกว่าเดิมด้วยค่ะ"
1002503-40 = "เร็วสิคะ~"
1002503-41 = "[s] ให้ชุนขี่คอ"
1002503-46 = "ว้าว! สูงจัง สูงจังเลย~! เหมือนได้เห็นอะไรมากกว่าร่างเดิมอีกค่ะ!"
1002503-47 = "ถ้าอยู่สูงๆ แบบนี้ฉันก็คงจัดตะกร้าที่อยู่ข้างบนนั่นได้ด้วย"
1002503-49 = "วะ... ว้ายย! คุณครู! ช่วยจับขาไว้หน่อยสิคะ ฉันจะได้ไม่ตก"
1002503-51 = "คุณครูให้ชุนขี่คอแล้วก็ช่วยจัดของในสวนต้นบ๊วยอยู่พักใหญ่"
1002503-53 = "จัดเสร็จหมดแล้วค่ะ!"
1002503-54 = "ขอบคุณที่ช่วยนะคะคุณครู"
1002503-55 = "แต่จะว่าไป คุณครูให้ฉันขี่คออยู่ตั้งครึ่งวันเลย... ฉันตัวไม่หนักเหรอคะ?"
1002503-56 = "[s] \"ชุนตัวเบากว่าเดิมมาก ครูไม่เมื่อยเลย\""
1002503-57 = "งั้นเหรอคะ โล่งอกไปที..."
1002503-59 = "เดี๋ยวนะ... เมื่อกี๊หมายความว่าไงเหรอคะ? \"ตัวเบากว่าเดิมมาก\" แสดงว่าก่อนหน้านี้ฉันตัวหนักเหรอคะ?"
1002503-60 = "[s1] \"เอ่อ... ไม่ใช่อย่างนั้น...\"\n[s2] \"อื้ม\""
1002503-61 = "แก้ตัวไปก็เปล่าประโยชน์ค่ะ!"
1002503-62 = "......!!!"
1002503-63 = "ฮึ่ม! โมโหแล้วนะคะ!"
1002503-64 = "ถึงจะเป็นคุณครู [USERNAME] แต่ฉันก็ไม่ยอมหรอกค่ะ!"
1002503-69 = "\"ชูสูงๆ\" เดี๋ยวนี้เลยนะคะ"
1002503-70 = "[s] \"ชูสูงๆ...?\""
1002503-71 = "ใช่ค่ะ ใช้สองมือยกตัวฉันให้สูงๆ ไงคะ"
1002503-72 = "ปกติเวลาเด็กๆ สวนต้นบ๊วยอารมณ์บึ้งตึง ฉันก็จะเล่นกับพวกเขาแบบนี้#nแต่วันนี้เป็นฉันเองที่อารมณ์บูด เพราะงั้นคุณครูก็ต้องเล่นกับฉันแทนค่ะ"
1002503-73 = "คุณครูคงไม่บอกว่าฉันตัวหนักเกินจนทำให้ไม่ได้ใช่มั้ยคะ?"
1002503-74 = "[s3] สอดมือใส่ใต้รักแร้ของชุนแล้วยกตัวขึ้นสูง\n[s4] \"สูงอีก~ เอาให้สุดเลย~\""
1002503-87 = "ฮุฮุ ได้โดนยกเองแบบนี้ก็สนุกดีนะคะเนี่ย"
1002503-88 = "ฉันพอจะรู้แล้วค่ะว่าทำไมเด็กๆ ถึงหายโกรธเวลาได้เล่นแบบนี้"
1002503-89 = "เอ๋? จะไปไหนเหรอคะ?"
1002503-90 = "ฉันยังไม่หายโกรธเลยนะคะ!"
1002503-95 = "วันนี้คุณครูต้องอยู่กับฉันจนกว่าฉันจะหายโกรธสิคะ~ ♥"
1002503-97 = "(จากนั้นคุณครูก็เล่นชูสูงๆ กับชุนอย่างสนุกสนานอยู่พักใหญ่)"

[translation]
1002503-1 = "小小的果然不行！"
1002503-2 = "（趕緊來到了梅花園）"
1002503-5 = "山海經．梅花園"
1002503-7 = "[ns] 「旬，你在哪裡！？」"
1002503-8 = "啊！謝謝老師趕過來……！"
1002503-13 = "[ns] 「咦，你在哪啊……？」"
1002503-14 = "啊，我在上面。收納櫃上面，靠近天花板這邊……"
1002503-20 = "（旬就像爬到樹上下不來的小動物一樣，在收納櫃上瑟瑟發抖）"
1002503-21 = "[s] 「怎麼會爬上去那種地方呢……？」"
1002503-22 = "我本來想在小朋友們回來之前，整理一下玩具的……"
1002503-23 = "我剛剛因為手搆不到上面想說乾脆直接爬上來，#n結果沒想到上來之後會這麼高，完全沒辦法下去……"
1002503-24 = "拜託老師，請抱我下去……！"
1002503-25 = "[s] 把旬從收納櫃上抱下來"
1002503-30 = "唔唔，還想說是以往可以搆到的高度應該不會怎麼樣，失算了……"
1002503-31 = "嬌小的身體果然不方便呢。"
1002503-32 = "啊，雖然很謝謝老師把我抱下來……不過那上面還有一些沒整理好的玩具……"
1002503-33 = "[s] 「要我幫你整理嗎？」"
1002503-34 = "謝謝老師有這份心，但玩具的分類還挺複雜的……各學年的玩具種類全都不一樣……"
1002503-35 = "讓老師整理這些東西反而會花些時間……要是我的手搆得到就能解決了……"
1002503-37 = "……！我想到一個好方法！"
1002503-38 = "老師，請把我扛在肩膀上吧！"
1002503-39 = "坐在老師肩膀上面，應該就能輕輕鬆鬆搆到了。"
1002503-40 = "就麻煩老師囉……！"
1002503-41 = "[s] 把旬扛在肩膀上"
1002503-46 = "哇，好高～！感覺視線比原本的身體更高呢！"
1002503-47 = "這個高度要整理櫃子上的東西就輕鬆多了。"
1002503-49 = "啊……！老，老師……要，要是摔下去可就不好了，請緊緊抓住我的腳……"
1002503-51 = "（後來旬大概是越來越樂在其中，就連較低的地方也要在肩膀上進行整理）"
1002503-53 = "終於整理好了！"
1002503-54 = "謝謝你幫我，老師！"
1002503-55 = "真不好意思，讓老師扛著我大半天的時間……請問，會不會太重……？"
1002503-56 = "[s] 「嗯，沒問題。畢竟比平常還要輕。」"
1002503-57 = "那就好──"
1002503-59 = "……老師？你這是什麼意思？意思是我原本的身體很重嗎？"
1002503-60 = "[s1] 「啊，抱歉，我不是那個意思……！」\n[s2] 「…………」"
1002503-61 = "就算狡辯也沒用！"
1002503-62 = "……！！！"
1002503-63 = "討厭！我生氣了！"
1002503-64 = "就算是老師，你要是沒有安慰我，我就再也不會聽話了！"
1002503-69 = "……所以，來！請幫我「飛高高」。"
1002503-70 = "[s] 「咦……？」"
1002503-71 = "就是從腋下抱起來高高舉起的那個「飛高高」。"
1002503-72 = "我記得以前老師也有跟小朋友們玩過。平常梅花園的孩子們不開心時，我都會跟他們玩這個遊戲。好了，現在輪到老師來安慰我了，快吧！"
1002503-73 = "……總不會跟我說你辦不到吧？"
1002503-74 = "[s3] 把手放在旬的腋下將他舉高\n[s4] 「飛，飛高高～……！」"
1002503-87 = "哇……！呵呵，親自嘗試後發現，這比想像中還好玩呢……！"
1002503-88 = "我總算了解小朋友們為什麼會因此心情變好了。"
1002503-89 = "嗯？怎麼這麼快就下來了？"
1002503-90 = "我的心情還沒變好喔！"
1002503-95 = "今天在我心情好轉之前，老師都要一直陪我玩♥"
1002503-97 = "（和旬玩了一陣子的「飛高高」以及其他各種遊戲，渡過了愉快的時光）"

[translation]
10010070-1 = "ตอนที่ 7;เข้าขากันดี 1"
10010070-11 = "อืม..."
10010070-15 = "อืม......"
10010070-16 = "[s1] \"อุย...?\"\n[s2] \"ทำไมล่ะ? มีเรื่องอะไรเหรอ\""
10010070-17 = "เปล่าหรอก... คือ..."
10010070-18 = "เปล่าหรอก... คือ..."
10010070-23 = "ฉันตกใจน่ะค่ะ ถึงฉันจะเป็นคนขอร้องเองก็เถอะ..."
10010070-24 = "แต่ไม่คิดเลยว่าจะหามาให้ได้ แถมยังหามาได้เร็วขนาดนี้อีกด้วยค่ะ"
10010070-25 = "โดยเฉพาะกาวมอส... ฉันคิดว่าต้องใช้เวลาหาสัก 2-3 วันซะอีกค่ะ"
10010070-26 = "แต่ทำไมมันถึงเปื้อนฝุ่นมาขนาดนี้ล่ะคะ... รีบเอาออกมาใช่ไหมคะ..."
10010070-27 = "แหะๆๆ พวกเราก็รีบๆ น่ะค่ะ..."
10010070-28 = "อ่า... อืม..."
10010070-29 = "ปะ...เปล่า... ไม่เป็นไรหรอกค่ะ ไม่มีอะไรหรอก... ฉันคงคิดอะไรไปเรื่อย..."
10010070-30 = "ทั้งคู่... เข้ากันได้ดีจังนะคะ..."
10010070-31 = "ทำได้ดีมากเลยค่ะ..."
10010070-32 = "...?"
10010070-36 = "[ns] \"อุย...?\""
10010070-42 = "ส่วนเค้กนี่ก็ด้วย... ถึงมันจะหน้าตาแปลกๆ ไปก็เถอะ..."
10010070-44 = "คะ... คือว่า..."
10010070-48 = "แต่ในเมื่อคุณครูก็อยู่ตรงนั้นด้วย คงจะมีเหตุผลที่ทำให้เป็นอย่างนี้ ฉันจะคิดว่านี่คือสิ่งที่ดีที่สุดแล้วค่ะ"
10010070-49 = "และถึงหน้าตาจะเปลี่ยนไปแต่รสชาติก็คงเหมือนเดิม... เอาเป็นว่าขอบคุณมากนะคะ"
10010070-50 = "คุณอุย..."
10010070-51 = "อืม... ฉันเอาแต่พูดอะไรไปเยอะแยะเลย แต่ตอนนี้เราไม่มีเวลามาพูดคุยเรื่องไร้สาระแล้วละค่ะ"
10010070-52 = "เรามีเวลาไม่มาก... พวกคุณน่าจะรู้ดีกว่าฉันนะคะ"
10010070-53 = "เรายังหาของที่จำเป็นได้ไม่หมด ถึงจะได้กาวมอสมาแต่ก็ยังทำอะไรต่อไม่ได้หรอกค่ะ"
10010070-54 = "รู้ใช่ไหมคะว่าเรายังขาดยาศักดิ์สิทธิ์?"
10010070-55 = "ค่ะ... ทราบค่ะ..."
10010070-57 = "หวังว่าครั้งนี้ก็คงจะเข้าขากันดีนะคะ..."
10010070-58 = "...?"
10010070-62 = "ไม่มีอะไรค่ะ..."
10010070-63 = "แล้วฉันจะรอนะคะ..."

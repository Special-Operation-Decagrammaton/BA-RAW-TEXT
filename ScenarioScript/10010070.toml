[translation]
10010070-1 = "第7話;有點相似的人們（１）"
10010070-11 = "……"
10010070-15 = "唔嗯……"
10010070-16 = "[s1]「……憂？」\n[s2]「有什麼問題嗎？」"
10010070-17 = "不，那個……"
10010070-18 = "不，那個……"
10010070-23 = "該怎麼說呢……雖然是我自己提出的要求……"
10010070-24 = "沒，沒想到你們真的把東西找來了……而且動作還這麼快。#n不，不過沒湊齊的話就沒辦法進行作業，趕不上典禮又很不妙，這我也清楚……"
10010070-25 = "尤其是水苔膠……我，我以為光找這個就要花上好幾天了。"
10010070-26 = "而且，兩位不知為何都滿身灰塵……"
10010070-27 = "不好意思，因為發生了許多事情……"
10010070-28 = "那，那個……"
10010070-29 = "……每個人的看法不同，就是這麼回事吧。"
10010070-30 = "怎，怎麼說呢，該說出乎意料嗎……"
10010070-31 = "……辛苦了。"
10010070-32 = "……？"
10010070-36 = "[ns]「憂？」"
10010070-42 = "還，還有這個蛋糕……雖然形狀垮得有點嚴重……"
10010070-44 = "那，那是因為……！"
10010070-48 = "……不，不過既然老師也在，一定有什麼不得已的原因吧。我多少也有所察覺。"
10010070-49 = "而，而且我畢竟是受人恩惠的一方……我就心懷感激收下了。"
10010070-50 = "憂同學……"
10010070-51 = "雖，雖然這麼說……現在還不是開心聊天的時候。"
10010070-52 = "時間不等人……我，我想這一點，兩位應該也很清楚……"
10010070-53 = "只有這些的話，還沒辦法開始作業。"
10010070-54 = "精聖藥……就拜託你們了。"
10010070-55 = "好，好的……！"
10010070-57 = "我，我想應該沒什麼問題……"
10010070-58 = "……？"
10010070-62 = "……沒什麼。"
10010070-63 = "那麼，我，我等你們……"

[translation]
1012003-1 = "校外見習：藝術與爆米花"
1012003-9 = "呵呵，今天我可是有提早出門哦。"
1012003-10 = "嗯？問我為什麼突然想看電影？"
1012003-11 = "老師你也知道，這是我第一次接觸打鼓……"
1012003-12 = "所以有點缺乏參考資料，或者說是缺乏靈感……"
1012003-13 = "結果就在這時，我聽說經典名作《進擊鼓手》要重新上映。"
1012003-14 = "剛開始學鼓的女高中生，居然碰巧遇上鼓樂電影的經典重映？"
1012003-15 = "而且還是我從沒看過的作品？"
1012003-16 = "這種絕妙的巧合，我怎麼能錯過呢。"
1012003-17 = "因此我才會提前過來買票。"
1012003-18 = "[s]「確實……是個很難抗拒的誘惑呢。」"
1012003-19 = "對吧？果然老師也是懂浪漫的人。"
1012003-20 = "不過我們今天來這裡，可不只是為了看電影哦？"
1012003-21 = "雖然這裡並不是咖啡廳，但同樣也有絕佳的甜點。"
1012003-22 = "不，應該說是只有在這裡才能享受的甜點。"
1012003-23 = "必須搭配電影這個配料才能完成的甜點……"
1012003-24 = "……也就是「爆米花」。"
1012003-25 = "嗯？老師說爆米花要你請？#n因為票是我買的？"
1012003-26 = "呵呵，那我就不跟老師客氣……"
1012003-27 = "放心選我喜歡的口味囉？"
1012003-29 = "（於是買了一桶焦糖、草莓、閃電泡芙、濃厚奶油，四種口味混合的爆米花）"
1012003-34 = "（進入的影廳內空得異常）"
1012003-37 = "呵呵，一切都在計畫之中。"
1012003-38 = "[s1]「計畫……？」\n[s2]「你又在策劃什麼陰謀！」 "
1012003-41 = "你想想看，老師。"
1012003-42 = "我們不是來看普通的電影……"
1012003-43 = "而是來看「鼓樂」電影的。"
1012003-44 = "既然要享受鼓聲的震撼……"
1012003-45 = "觀眾自然越少越好，不是嗎？"
1012003-46 = "[s3]「這個說法……」\n[s4]「還挺有道理的！」 "
1012003-49 = "對吧？"
1012003-50 = "所以我特地選了這種冷門的時段。"
1012003-51 = "也確認過正好是跟熱門電影重疊的場次了。"
1012003-53 = "（不久後，電影院的燈光漸漸暗下）"
1012003-54 = "好，那就來場兩人獨享的觀影吧！"
1012003-61 = "（電影結束後……）"
1012003-63 = "……哇。"
1012003-64 = "老師，真是個超乎想像的反轉耶。"
1012003-65 = "將主角監禁15年，只讓他吃甜點的犯人竟然是主角的老師……"
1012003-66 = "不過話說回來，因為太專心看電影的關係，爆米花都沒怎麼吃呢。"
1012003-67 = "明明精挑細選了這麼多口味……"
1012003-68 = "唔嗯……"
1012003-69 = "老師，你回夏萊之後還有不少工作要處理對吧？"
1012003-70 = "[s5]「你為什麼要讓我想起現實……」\n[s6]「好過分……」"
1012003-73 = "那麼，來。"
1012003-74 = "這桶爆米花給你。"
1012003-75 = "長時間坐著動腦，可是不能缺少糖分的。"
1012003-76 = "一個人應付過勞很危險，就讓這些小傢伙陪著你吧。"
1012003-77 = "[s]「謝啦，我會好好享用的。」"
1012003-79 = "（回到夏萊後，一邊吃著甜甜的爆米花，一邊處理剩下的工作）"
1012003-80 = "（……強烈的甜味確實讓人完全不會想睡）"

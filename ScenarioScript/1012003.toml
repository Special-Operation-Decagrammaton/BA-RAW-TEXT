1012003-21 = "3;나츠 밴드;02;비록 카페는 아니지만, 이런 곳에도 훌륭한 디저트가 존재하거든."
1012003-22 = "3;나츠 밴드;05;아니, 오히려 이곳이 아니면 제대로 즐길 수 없는 디저트가 있지."
1012003-23 = "3;나츠 밴드;99;영화라는 토핑이 얹어져야만 완성되는 디저트……"

[translation]
1012003-1 = "การเรียนนอกสถานที่: ศิลปะและป๊อปคอร์น "
1012003-9 = "ฮุฮุ วันนี้ฉันเป็นฝ่ายออกมาเร็วกว่าสินะ"
1012003-10 = "หืม? ทำไมถึงมาดูหนังงั้นเหรอ?"
1012003-11 = "อย่างที่คุณครูรู้นั่นแหละว่านี่เป็นครั้งแรกที่ฉันได้ตีกลอง"
1012003-12 = "เพราะงั้นจะเรียกว่าขาดแรงจูงใจกับเรฟภาพในใจดีมั้ยนะ..."
1012003-13 = "แล้วจู่ๆ ก็บังเอิญไปได้ยินมาว่าหนังดังเรื่อง 'ฮิปแฟลช' จะกลับมาฉายใหม่น่ะ "
1012003-14 = "หนังเกี่ยวกับการตีกลองที่นำกลับมาฉายใหม่ในช่วงเวลาที่เด็กหญิงม.ปลายกำลังหัดตีกลองเลยนะ "
1012003-15 = "คุณครูยังไม่ได้ดูหนังเรื่องนี้ใช่มั้ย?"
1012003-16 = "เราจะมองข้ามความบังเอิญที่แสนพิเศษแบบนี้ไปได้ยังไงกันล่ะ"
1012003-17 = "ฉันเลยรีบมาซื้อตั๋วเอาไว้ก่อน"
1012003-18 = "[s] \"ก็นะ... คงอดใจไม่ไหวจริงๆ นั่นแหละ\""
1012003-19 = "ใช่มั้ยล่ะ? คิดแล้วเชียวว่าคุณครูเป็นคนที่เข้าใจความโรแมนซ์จริงๆ"
1012003-20 = "แต่ว่าวันนี้เราไม่ได้มาแค่ดูหนังหรอกนะ"
1012003-21 = "ถึงที่นี่จะไม่ใช่คาเฟ่ แต่ที่นี่ก็มีขนมหวานขายด้วย"
1012003-22 = "ไม่สิ ต้องบอกว่ามีของหวานที่จะกินได้เฉพาะที่นี่อยู่ด้วย"
1012003-23 = "ของหวานที่จะสมบูรณ์แบบได้เมื่อท็อปปิ้งด้วยการดูภาพยนตร์..."
1012003-24 = "ก็คือ 'ป๊อปคอร์น' ไงล่ะ"
1012003-25 = "หืม? คุณครูจะเป็นคนซื้อป๊อปคอร์นให้เพราะฉันซื้อตั๋วไปแล้วงั้นเหรอ?"
1012003-26 = "ฮุฮุ ขอบคุณนะ..."
1012003-27 = "งั้นไปเลือกรสป๊อปคอร์นกันเลยมั้ย?"
1012003-29 = "(หลังจากนั้นทั้งสองคนก็ไปซื้อป๊อปคอร์นมา 4 รสคือรสคาราเมล รสสตรอว์เบอร์รี่ และรสคัสตาร์ดครีม)"
1012003-34 = "(พอเข้าไปในโรงหนังก็พบว่าที่นั่งว่างมาก)"
1012003-37 = "ฮุฮุ เป็นไปตามแผนเลย"
1012003-38 = "[s1] \"แผนเหรอ...?\"\n[s2] \"วางแผนลับอะไรอยู่น่ะ!\""
1012003-41 = "ก็ลองคิดดูสิ คุณครู"
1012003-42 = "เราไม่ได้มาเพื่อดูหนังนะ"
1012003-43 = "เรามาเพื่อดูหนัง 'กลอง' ต่างหาก"
1012003-44 = "หรือพูดอีกอย่างหนึ่งก็คือเรามาเพื่อดื่มด่ำกับเสียงกลองสุดแสนไพเราะมากกว่า"
1012003-45 = "แน่นอนว่ายิ่งในโรงมีคนน้อยเท่าไรก็ยิ่งดีใช่มั้ยล่ะ?"
1012003-46 = "[s3] \"ความสามารถในการโน้มน้าวใจของเธอนี่...\"\n[s4] \"พูดจูงใจได้เก่งนะ...\""
1012003-49 = "ก็นั่นละ"
1012003-50 = "เพราะงั้นฉันเลยตั้งใจจองตั๋วรอบเวลาที่คนไม่เยอะไงล่ะ"
1012003-51 = "ฉันเช็กมาแล้วด้วยว่าเวลาฉายหนังมันซ้อนกับหนังที่กำลังฮิตอยู่"
1012003-53 = "(ผ่านไปสักพักแสงไฟในโรงหนังก็ค่อยๆ หรี่ลง)"
1012003-54 = "ดีละ ถ้างั้นก็มานั่งดูกันแบบสบายๆ เลยดีกว่า!"
1012003-61 = "(หลังจากที่ดูหนังจบ...)"
1012003-63 = "ว้าว..."
1012003-64 = "หักมุมสุดๆ เลยเนอะคุณครู"
1012003-65 = "เรื่องที่คนร้ายที่ขังตัวเอกเอาไว้ตลอด 15 ปีและให้กินแต่ของหวาน แท้จริงแล้วคือครูของตัวเอก..."
1012003-66 = "ฉันมัวแต่ดูหนังเพลินจนลืมกินป๊อปคอร์นเลยแฮะ"
1012003-67 = "อุตส่าห์เลือกแต่รสอร่อยๆ ที่น่าลองทั้งนั้น..."
1012003-68 = "อืม..."
1012003-69 = "คุณครู... มีงานที่ต้องกลับไปทำที่ชาเล่ต์เยอะเลยใช่มั้ย?"
1012003-70 = "[s5] \"จู่ๆ ก็ปลุกครูให้ตื่นจากฝันมาเจอความจริงซะงั้น...\"\n[s6] \"ชีวิตมันน่าเศร้าแท้...\""
1012003-73 = "เอ้านี่"
1012003-74 = "เอาป๊อปคอร์นนี่ไปสิ"
1012003-75 = "ถ้านั่งทำงานใช้ความคิดนานๆ อาจต้องเติมน้ำตาลนะ"
1012003-76 = "นั่งทำงานหนักคนเดียวมันอันตราย เพราะงั้นพาเด็กๆ พวกนี้ไปด้วยเถอะ"
1012003-77 = "[s] \"ขอบใจนะ ครูจะกินให้เรียบเลย\""
1012003-79 = "(หลังจากกลับมาที่ชาเล่ต์ คุณครูก็นั่งกินป๊อปคอร์นไประหว่างจัดการงานที่เหลือให้เสร็จ)"
1012003-80 = "(และป๊อปคอร์นค่อนข้างหวานมาก จนทำให้ไม่ง่วงนอนเลย)"

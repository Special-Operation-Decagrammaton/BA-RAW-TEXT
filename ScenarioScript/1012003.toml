1012003-9 = "3;나츠 밴드;08;후후, 오늘은 내가 조금 더 일찍 나왔지.\n#3;em;[반짝]"
1012003-10 = "3;나츠 밴드;00;음? 그런데 웬일로 영화냐고?"
1012003-11 = "3;나츠 밴드;01;선생님도 알다시피, 난 드럼을 연주하는 경험이 이번이 처음이야."
1012003-12 = "3;나츠 밴드;99;그래서 드럼에 대한 레퍼런스가 부족하다고 할까, 영감이 부족하다고 할까……"
1012003-13 = "3;나츠 밴드;01;그런데 마침, 오래된 명작인 '힙플래시'가 재개봉을 한다는 소식이 들려온 거야."
1012003-14 = "3;나츠 밴드;05;드럼에 막 입문한 여고생 앞에, 드럼 영화의 고전이 재개봉한다고? \n#3;a\n#3;closeup"
1012003-15 = "3;나츠 밴드;05;그것도 아직 보지도 않은 영화가?\n#3;closeup\n#3;hophop"
1012003-16 = "3;나츠 밴드;08;이 절묘한 우연을 어떻게 외면할 수 있겠어?\n#3;a\n#3;greeting\n#3;em;[반짝]"
1012003-17 = "3;나츠 밴드;08;그래서 내가 미리 와서 티켓을 구매할 수밖에 없었던 거야."
1012003-18 = "[s] \"확실히… 그건 참을 수 없지.\""
1012003-19 = "3;나츠 밴드;03;그렇지? 역시 선생님도 로망을 이해하는 사람이라니까.\n#3;em;[음표]"

63090-76 = "3;사오리;S2_22\n#3;em;…\n#3;h\n#wait;2500"
63090-77 = "3;사오리;S2_13;……?\n#3;em;[?]"
63090-78 = "3;사오리;S2_05;잘 이해가 안 가는군, 코노카. 그…… 새로운 종류의, 농담 같은 건가?"
63090-79 = "3;코노카;08;아니, 뭐……. 왠지 그런 식으로 반응할 것 같기도 했는데 말이죠……."
63090-80 = "3;코노카;00;빠르게 이어가겠슴다. 흐름 잘 따라오십쇼.\n#3;em;[반응]"
63090-81 = "3;코노카;07;아리우스 스쿼드의 죄와 형량은, 분명 남아 있습니다만, 집행 유예가 선고되었슴다."
63090-82 = "3;사오리;S2_04;집행…… 유예? 하지만, 우리는 분명히 테러를…….\n#3;em;[땀]"
63090-83 = "5;코노카;02;네, 뭐. 그건 사실이긴 한데.\n#5;al\n#3;m1"
63090-84 = "5;코노카;16;……사실, 폭발이나 건물 붕괴 같은 건, 키보토스에서 잊을 만하면 일어나는 일이고 말이죠…….\n#5;em;[한숨]"
63090-85 = "5;코노카;07;………그래서 키보토스 호황 산업 중 하나가, 건축업인 것이기도 하죠……."
63090-86 = "3;사오리;S2_04;으, 으음…….\n#3;stiff"
63090-87 = "5;코노카;08;그러니 키보토스의 범죄에서 가장 문제 사항으로 삼는 건, 살의와 악의, 뭐 그런 건데……."
63090-88 = "3;사오리;S2_02;그랬나? 그 기준에 대해서는 처음 들었군. 하지만 그렇다면 더더욱…….\n#3;em;[?]"
63090-89 = "5;코노카;00;네. 그 테러는 분명히 그 둘을 갖고 일어난 일이었슴다. 그 부분은 당신들도 인정해야 하고요."
63090-90 = "5;코노카;07;근데, 뭐. 들어 보니까, 다들 반성 잘하고 있는 것 같고 말이죠?"
63090-91 = "3;사오리;S2_13;으, 음?"
63090-92 = "5;코노카;99;거기에 당신들, 심지어 자수까지 했잖슴까? 이야~ 문제아가 자수하다니, 정말 부국장 자리에 오른 다음에도 처음 보는 일임다!\n#5;em;[재잘]"
63090-93 = "5;코노카;03;스스로 자기 잘못을 반성하고 처벌을 원하는 학생이 있었다니, 키보토스의 미래도 그렇게까지 절망적인 것은 아니겠네요!\n#5;greeting"
63090-94 = "3;사오리;S2_04;고, 고맙다…….\n#3;em;…"
63090-95 = "3;사오리;S2_06;(내가 할 말은 아닌 것 같지만, 일 처리를 이렇게 대충대충 해도 되나…….)"
63090-96 = "5;코노카;07;그리고 무엇보다 당신들이 살의나 악의를 가진 건, 결국 선생님과 트리니티였단 말임다. 그런데…….\n#5;m3\n#3;dl"
63090-97 = "5;코노카;00;거기에서 좀, 탄원서가 왕창 왔슴다."

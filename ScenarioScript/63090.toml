[translation]
63090-1 = "第9話;準備考試"
63090-4 = "你好，沙織同學！#n在這裡過得怎麼樣呀？"
63090-9 = "託你的福，過得還算不錯。#n記得是木乃香副局長……對吧？"
63090-10 = "哎呀，不用那麼見外啦！叫我木乃香就可以了！"
63090-11 = "而且你不是比我大一歲嗎？雖然年級一樣就是了。"
63090-12 = "唔，嗯。我知道了。#n不過，木乃香……"
63090-13 = "把一直關在監獄裡的我叫來審訊室……是發生什麼事了嗎？"
63090-14 = "唔嗯，其實也沒什麼啦，只是想看看你過得怎麼樣而已。#n畢竟沙織同學在女武神也算是小有名氣的人物嘛。"
63090-15 = "……是嗎。感覺在女武神出名似乎不是什麼好事。"
63090-16 = "總比在整個奇普托斯出名好吧……"
63090-17 = "那倒也是。雖然這種話由我來說可能有點奇怪，不過真是辛苦你了……"
63090-18 = "那麼，既然尷尬的氣氛消散得差不多了，我們就進入正題吧。"
63090-19 = "你們……是叫做奧利斯小隊對吧？#n有份發給奧利斯小隊的公文更新了，我想跟你談談那件事情。"
63090-20 = "公文更新了……是嗎。#n看來八成會和刑期有關吧。"
63090-21 = "這個嘛……差不多是這樣沒錯。"
63090-22 = "刑期應該已經藉由正式審判確定了……看來是又發現了其他罪行吧？#n沒關係，我已經做好接受一切的心理準備了。"
63090-23 = "你還真特別呢……沙織同學。#n一般來說，大家的態度應該會完全相反才對。"
63090-24 = "是，是嗎？#n奧利斯出身的人，經常會跟所謂的「普通」不太一樣吧。"
63090-25 = "這麼說來，聽說聯邦學生會總算決定奧利斯分校的今後的定位了，真是可喜可賀。#n啊，雖然這跟正題沒什麼關係啦。"
63090-26 = "沒關係。只要是關於我學校的話題，我什麼都願意聽。#n無論好或不好，那裡都是我的母校。"
63090-27 = "……即使被當成培養出惡劣恐怖分子的學校，我也不打算否定那個事實。"
63090-28 = "不願意承擔過錯的話，是無法向前邁進的。"
63090-29 = "說得真好！#n那麼我問你……"
63090-35 = "……你後悔嗎？"
63090-36 = "是指恐怖攻擊嗎？"
63090-37 = "難道還能是別的事嗎。"
63090-43 = "呵……"
63090-47 = "咦？為什麼要笑呢？"
63090-48 = "啊，抱歉。我完全沒有要嘲笑木乃香或女武神……甚至三一的意思。"
63090-49 = "只是……想起了以前，曾經和某人有過相同的對話而已。"
63090-50 = "問我後不後悔是嗎？#n答案很簡單。"
63090-54 = "我沒有一天不感到後悔。"
63090-57 = "意思是當初的你，只是個不成熟又愚蠢的小鬼是吧。"
63090-58 = "是啊。是個現在已經不復存在的愚蠢小鬼。"
63090-59 = "不過那個小鬼，也確實是我沒錯。"
63090-60 = "……"
63090-61 = "好，果然和我想的一樣。"
63090-65 = "這是什麼意思？"
63090-66 = "唔嗯，其實也沒什麼啦。"
63090-67 = "不過該說的話還是要說。#n這也算是必須走過的程序吧。"
63090-71 = "恭喜你，沙織同學。當然小隊的其他人也是。"
63090-72 = "你們獲得假釋了。請開始收拾行李吧。"
63090-77 = "……？"
63090-78 = "我不太理解你的意思，木乃香。#n那是……什麼新型態的玩笑嗎？"
63090-79 = "唔嗯……雖然我大概有料到你會是這種反應……"
63090-80 = "我就趕緊說明下去吧。要跟上我的速度哦。"
63090-81 = "奧利斯小隊的罪責與刑期確實還在，不過已經宣判緩刑了。"
63090-82 = "緩，緩刑？#n可是我們明明發動了恐怖攻擊……"
63090-83 = "嗯，那的確是事實。"
63090-84 = "不過呢……其實爆炸或建築倒塌之類的事情，在奇普托斯經常發生……"
63090-85 = "所以建築業才會是奇普托斯的熱門產業之一……"
63090-86 = "這，這樣啊……"
63090-87 = "因此奇普托斯的犯罪審判，往往會將「殺意」或「惡意」的有無視為最大的癥結點。"
63090-88 = "是嗎？我還是第一次聽說這個標準。#n但如果是這樣的話，我們不就更加……"
63090-89 = "沒錯，那起恐怖攻擊確實是帶著殺意與惡意發動的。這點你們也必須承認。"
63090-90 = "但是……聽說你們似乎都有好好反省了嘛。"
63090-91 = "嗯……？"
63090-92 = "而且甚至還自首了耶？#n哎呀～問題學生跑來自首這種事，還是我當上副局長以來第一次見到呢！"
63090-93 = "有學生願意反省錯誤，要求接受懲罰……看來奇普托斯的未來也沒有那麼絕望嘛！"
63090-94 = "謝，謝謝你……"
63090-95 = "（雖然這不是我該發表意見的事，但這樣隨便處理事情真的沒問題嗎……）"
63090-96 = "最重要的是，你們懷有殺意或惡意的對象……說白了就是老師和三一吧。"
63090-97 = "他們那邊……寄來了一大堆請願書。"
63090-102 = "甚至連格黑娜那邊都有。"
63090-103 = "啊，這個部分很有趣，我就轉述給你聽吧。"
63090-105 = "沒錯，確實發生過那樣的事。"
63090-106 = "我自己受傷倒是無所謂。#n真正讓我生氣的，是老師也受到了波及這件事。"
63090-107 = "只不過……"
63090-108 = "既然老師都親自開口，希望我能看在他的面子上原諒你們……那我也沒什麼好說的。"
63090-109 = "剩下的頂多就是真琴的美容費而已……"
63090-110 = "……"
63090-111 = "算了。這才是真正無關緊要的問題吧。"
63090-114 = "這樣真的可以嗎……？"
63090-115 = "看起來是可以吧……"
63090-116 = "總而言之……既然情況如此，我們好像也沒理由不從寬處理了嘛。"
63090-117 = "況且我們女武神，本來就是以指導和教化為目的的學園呀！"
63090-118 = "維持矯正局的費用也不是開玩笑的……"
63090-119 = "最重要的是，老師說他會負起責任。#n你們可別讓老師失望了哦。"
63090-120 = "我明白了。這點我一定會牢記在心。"
63090-121 = "還有，雖然很多人會有這種誤解，但是獲得緩刑可不等於無罪哦？#n要是在這個期間闖禍的話，我們也只能被迫加重處罰了。"
63090-122 = "不必擔心。萬一我們再闖禍的話，就算要直接破壞我的光環也沒關係。"
63090-123 = "唉唷！不要老是那樣說話啦！#n奧利斯式的發言真的很恐怖耶！"
63090-124 = "抱，抱歉……"
63090-125 = "所以……我們真的……獲得假釋了嗎……？"
63090-126 = "是的。"
63090-127 = "既然這樣，不如就回去準備考試吧？"
63090-131 = "考試……！說的也是！"
63090-146 = "歡迎你們！"
63090-147 = "……"
63090-148 = "各位！"
63090-149 = "雖然這間教室的設備可能有點簡陋……"
63090-150 = "不過我們還是要一起努力學習，在模擬考中取得好成績！"
63090-155 = "哇……教室好棒哦……"
63090-156 = "在這種地方的話，真的會有想讀書的感覺耶……"
63090-161 = "咦，咦……？"
63090-162 = "嗯，會有那種反應也是情有可原。"
63090-163 = "畢竟和那裡的教室比起來，不管看到什麼都會這麼想的。"
63090-164 = "是，是嗎？啊哈哈……"
63090-165 = "謝謝你，日步美。還有其他人也是。"
63090-166 = "謝謝大家願意幫忙為這些孩子們「補課」。"
63090-172 = "別這麼說。我們也很高興能幫到老師的忙。"
63090-174 = "不過……要避免說出學園和社團的名字，真的很不容易呢……#n感覺一不留神就會脫口而出……"
63090-175 = "[s]「老師我也有同感……」"
63090-179 = "……"
63090-180 = "……"
63090-181 = "好，好久不見了呢。梓同學。"
63090-182 = "是啊，好久不見。舞彩。"
63090-183 = "雖然不知道這麼說會讓你有什麼感想……"
63090-184 = "不過，我現在覺得很開心。"
63090-185 = "你，你的語氣一點都沒變呢……"
63090-186 = "看起來……好像過得很好的樣子，真是太好了……"
63090-187 = "……"
63090-188 = "嗯。"
63090-189 = "你們一定也能過得很好的。"
63090-190 = "只要朝著那個方向努力就行了。"
63090-196 = "如果有什麼我能幫上忙的地方，隨時可以跟我說。"
63090-200 = "那你能代替我考試嗎！？"
63090-201 = "這就沒辦法了。"
63090-202 = "嗚咿……"
63090-206 = "這位是小春醬……對吧？#n好像聽說，是位菁英……"
63090-210 = "哼，哼！你的眼光不錯嘛！#n沒錯！我就是實現……"
63090-214 = "總之就是菁英！任何事情都可以依靠我哦！"
63090-215 = "那請問這個問題……該怎麼解呢？"
63090-216 = "我，我看看……？"
63090-220 = "（咦？這題我應該會呀……？）"
63090-221 = "（為什麼想不起來？那時候明明有好好做筆記的說！？！？）"
63090-222 = "就，就是……那個……！"
63090-223 = "請，請說！"
63090-224 = "唔，唔……"
63090-225 = "這不在考試的範圍裡面，現在不會也沒關係！"
63090-227 = "咦！？原來是這樣嗎！？"
63090-228 = "那樣是不行的哦，小春醬。#n不在考試範圍內就不學……這種想法太天真了。"
63090-229 = "就像小春醬你……不是也已經在預習「厲害的知識」了嗎？"
63090-231 = "咿呀！？"
63090-232 = "你，你在說什麼啊！#n那種事情是禁止的！而且完全是誤會！"
63090-234 = "呵呵，是這樣嗎？"
63090-235 = "話說回來，那題確實不在考試範圍內沒錯，#n不過如果想理解這次考試範圍的重點，也必須先學會那題才行。"
63090-236 = "來，先試著用這個方法解解看吧？"
63090-242 = "浦和花子……果然厲害。"
63090-243 = "……那個人在各種意義上都非比尋常，讓人難以預測。"
63090-244 = "究竟有什麼事情是花子同學不知道的呢……"
63090-250 = "我並不是什麼都知道唷？#n我知道的就只有我知道的事情而已。"
63090-251 = "嗚哇啊啊！？你，你聽到了嗎！？！？#n我很抱歉──！！！"
63090-252 = "沒關係的。你是槌永日和同學……對嗎？#n可以叫你日和醬嗎？"
63090-253 = "咦？沒，沒沒沒沒問題。#n我，我很榮幸……"
63090-254 = "至於這位……應該是秤敦子同學沒錯吧？#n哎呀……？"
63090-258 = "怎麼了嗎，花子同學？"
63090-259 = "……唔嗯？"
63090-260 = "……"
63090-261 = "……"
63090-265 = "呵呵。"
63090-266 = "呵呵。"
63090-267 = "好像交到了很有意思的朋友呢。#n往後各方面都請你多多關照囉，敦子「醬」？"
63090-268 = "嗯，彼此彼此。#n請多關照囉，花子「醬」。"
63090-269 = "哎呀哎呀。"
63090-270 = "呵呵呵。"
63090-272 = "……發生什麼事了嗎，敦子？#n你跟那個浦和花子……之前就認識嗎？"
63090-273 = "不是那樣的，沙醬。#n只是有一種……好像各個方面都很聊得來的感覺而已。"
63090-274 = "而且應該不是只有我這麼覺得哦？"
63090-275 = "……我完全搞不懂。"
63090-276 = "嗯，現在這樣不是也很好嗎？"
63090-277 = "我也還是不懂，不過就這樣吧……"
63090-278 = "來，那麼大家繼續專心讀書吧。#n課程就拜託你囉，老師？"
63090-279 = "[s]「交給我吧！」"
63090-294 = "話說……這個奇怪的毛球是……？#n這是什麼東西呢，日步美同學？"
63090-298 = "問得非常好！這個呢……"
63090-303 = "是為表現優異的學生準備的Momo好友周邊禮物！"
63090-305 = "又是那個……？"
63090-307 = "Momo……好友？"
63090-308 = "沒錯！就是最近很流行的Momo好友哦！#n雖然不是所有人都喜歡……但是在某些群體之間特別有人氣！"
63090-310 = "光是沒說出「所有人都喜歡」，就已經算是長足的進步了吧……"
63090-311 = "嗯！Momo好友最棒了。其中我特別推薦骷髏人。#n有這麼好的獎勵，大家肯定會全力以赴的！"
63090-312 = "那究竟是什麼邏輯……"
63090-313 = "哎呀，在我們的補課過程中，那個東西可是非常有效果的唷？"
63090-314 = "……真的嗎？#n這該不會也有牽扯到「天使」之類的神祕現象吧？"
63090-316 = "咦？倒，倒也沒有。#n只是因為周邊很可愛，所以才為了得到它而努力讀書而已……"
63090-317 = "沒錯。這確實是個值得全力以赴的理由。"
63090-322 = "……"
63090-323 = "（梓在接觸到外面的世界之後，品味似乎變奇怪了啊……）"
63090-326 = "各位！其實我們也不是那種很擅長讀書的人！"
63090-327 = "不過所謂的學習是一種系統，所以只要認真反覆學習……"
63090-328 = "一定能把程度提升到某個水準的！"
63090-329 = "畢竟就連我這種平凡又沒特色的學生，也都順利通過補課了嘛！"
63090-333 = "……"
63090-334 = "……"
63090-335 = "那個，梓同學……？"
63090-336 = "怎麼了，舞彩？"
63090-337 = "日步美同學，真的能算是平凡人嗎……？"
63090-338 = "……"
63090-339 = "根據我的觀察，「平凡」大概有兩種。"
63090-340 = "一種是自稱的平凡，一種是他人眼中的平凡。"
63090-341 = "那日步美同學是哪一種呢？"
63090-342 = "……"
63090-343 = "關於這點，我不予置評。"
63090-344 = "這樣的反應，好像已經算是一種回答了呢……"
63090-348 = "背起來！快背啊！這顆笨腦袋！為什麼老是背不起來！！！"
63090-349 = "我，剛才好像領悟到了考試期間的真理……"
63090-350 = "是什麼真理？"
63090-351 = "就是除了讀書之外，任何事情看起來都很有趣……"
63090-356 = "哦哦哦！想讀書的意志燃燒起來了！"
63090-357 = "真的嗎？"
63090-358 = "嗯。可是因為燒得太旺，已經變成灰燼了。"
63090-362 = "老師……我好像生病了，可以休息嗎？"
63090-363 = "[s]「是什麼樣的病？」"
63090-364 = "一讀書就會壞掉的病。"
63090-365 = "[s]「哎呀。那就請你讀到康復為止吧。」"
63090-369 = "這不是人該說的話吧……"
63090-370 = "[s]「當然。考試期間的老師並不是人類哦。」"
63090-373 = "哇！這題出得真好耶！"
63090-374 = "好到什麼程度？"
63090-375 = "好到讓人不想解開，以免破壞它的完美！"
63090-376 = "什麼啦。#n怎麼讀書讀到越來越奇怪了啊……"
63090-379 = "（於是所有人的努力、掙扎、抵抗、吶喊……全都亂七八糟地混合在一起……）"
63090-380 = "（奧利斯的學生們，就這樣一天天地準備著人生中的第一次考試……）"
63090-383 = "下一話;獻給不逝之物的召會"

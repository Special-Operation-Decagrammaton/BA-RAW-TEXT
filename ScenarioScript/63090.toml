63090-6 = "#clearST"
63090-7 = "3;코노카;00\n#3;d\n#wait;1200"
63090-8 = "#all;hide"
63090-9 = "3;사오리;S2_05;신경 써 준 덕분에 잘 지내고 있다. 코노카 부국장…… 이었던가?\n#3;a"
63090-10 = "5;코노카;03;에이, 에이. 뭘 그렇게 딱딱하게 부르고 그럽니까! 코노카라고 부르면 됨다! \n#5;em;[음표]\n#5;al\n#3;m1\n#5;hophop"
63090-11 = "5;코노카;00;어차피 저보다 한 살 연상이잖슴까! 학년은 같지만요."
63090-12 = "3;사오리;S2_04;으, 음. 알겠다. 코노카. 그런데……."
63090-13 = "3;사오리;S2_05;쭉 감옥에 있었던 나를, 이제 와서 취조실로 부르다니, 무슨 일이라도 있는 건가?\n#3;em;[?]"
63090-14 = "5;코노카;07;아뇨, 뭐. 그냥 말 그대로 어떻게 지내나 싶어서 말이죠. 사오리 씨, 발키리 한정으로 그 나름 유명한 분이기도 하고요?"
63090-15 = "3;사오리;S2_06;……그런가. 발키리에서 유명한 것은 그다지 좋은 일이 아닌 것 같지만."
63090-16 = "5;코노카;16;………키보토스 전역에서 유명한 것보다야 낫지 않겠슴까……."
63090-17 = "3;사오리;S2_18;그것도 그렇겠군. 내가 이런 말을 하는 것도 이상하지만, 고생이 많군…….\n#3;em;[...]"
63090-18 = "5;코노카;07;좋아요, 좋아. 어색한 시간은 이걸로 대충 붕~ 날려 버린 것 같고. 본론으로 들어가죠."
63090-19 = "5;코노카;00;당신들…… 아리우스 스쿼드 맞죠? 아리우스 스쿼드 앞으로, 공문이 하나 갱신돼서 말임다. 그 이야기 좀 하려고요."
63090-20 = "3;사오리;S2_05;공문 갱신, 인가. 그렇다면 아마도 형량 관련 문제이겠군."
63090-21 = "5;코노카;08;네. 뭐, 그 비슷한 거죠."
63090-22 = "3;사오리;S2_08;형량 자체는 정식 재판으로 확정받았다만……. 뭔가 여죄가 발견된 모양이지? 상관없다. 나는 무엇이든 받아들일 각오가 되어 있으니까.\n#3;em;[반응]"
63090-23 = "5;코노카;02;그것 참 신기하네요……. 사오리 씨는. 보통은 반대 태도인데 말임다."
63090-24 = "3;사오리;S2_04;그, 그런가? 하지만……. 아리우스 출신은, 흔히 말하는 '보통'과는, 약간 다른 경우가 많아서 말이다.\n#3;stiff"
63090-25 = "5;코노카;99;네, 네. 총학생회에서도, 드디어 아리우스 분교의 위치를 확정할 수 있게 되어서 다행이라는 것 같슴다. 아, 이건 별로 관계없는 이야기였구만요.\n#5;em;[재잘]"
63090-26 = "3;사오리;S2_05;아니. 내 학교에 관한 이야기라면 뭐든 좋다. 좋든 싫든, 그곳은 내 모교니까."
63090-27 = "3;사오리;S2_18;……최악의 테러리스트를 양성한 학교 취급을 받는다 해도, 그 사실을 부정할 마음은 없다."
63090-28 = "3;사오리;S2_08;과오까지 받아들이지 않으면, 나아갈 수 없게 되니까."
63090-29 = "5;코노카;03;좋은 말을 해 줬네요! 그래서 말입니다만…….\n#5;greeting"

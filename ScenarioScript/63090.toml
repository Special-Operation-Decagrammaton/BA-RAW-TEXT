63090-373 = "ว้าว! ชอบโจทย์ข้อนี้จังเลย!"
63090-374 = "ชอบอะไรขนาดนั้นเหรอ?"
63090-375 = "อื้อ! ชอบมากจนอยากรักษาไว้ ไม่อยากแก้โจทย์ให้โจทย์เสียหายเลยละ!"
63090-376 = "อะไรของเธอ... เรียนอยู่ดีๆ แต่ก็เริ่มมีพฤติกรรมแปลกๆ เฉยเลย..."

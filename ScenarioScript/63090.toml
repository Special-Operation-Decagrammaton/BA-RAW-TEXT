63090-336 = "ทำไมเหรอ ไมอา?"
63090-337 = "คุณฮิฟุมิเป็นนักเรียนธรรมดาๆ จริงเหรอคะ...?"
63090-338 = "..."
63090-339 = "จากที่ฉันสังเกตมา ที่บอกว่า 'ธรรมดา' น่ะมีอยู่ 2 กรณี"
63090-340 = "กรณีแรกก็คือบอกเองว่าตัวเองธรรมดา ส่วนอีกกรณีก็คือคนอื่นมองว่าธรรมดา"
63090-341 = "งั้นคุณฮิฟุมิเป็นกรณีไหนเหรอคะ?"
63090-342 = "..."
63090-343 = "เรื่องนี้ฉันขอไม่ออกความเห็นดีกว่า"
63090-344 = "ที่ตอบมาก็ถือว่าเป็นความเห็นแล้วนะคะ..."
63090-348 = "จำเข้าไป! บอกให้จำไง! สมองขี้เลื่อยนี่! ทำไมถึงจำอะไรไม่ได้เลยนะ!!!"
63090-349 = "ฉันรู้สึกเหมือนตัวเองได้รู้ความจริงอันยิ่งใหญ่ของสิ่งที่เรียกว่าช่วงสอบเลย..."

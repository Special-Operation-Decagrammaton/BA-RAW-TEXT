[translation]
63090-1 = "Episode 9;Exam Prep"
63090-4 = "How are you doin', Saori? How's life been treating you?!"
63090-9 = "Thanks for your concern. I've been doing well. Deputy Director Konoka...was it?"
63090-10 = "Aw, aw, drop all those stiff titles! Just call me Konoka! "
63090-11 = "You're a year older than me anyway, aren't you? Even if we're in the same grade."
63090-12 = "Understood, Konoka."
63090-13 = "However, I've been in a cell until now. Is there a reason I've been called to the interrogation room?"
63090-14 = "Nah, not really. I just wanted to see how you were doing. And you're kinda famous within Valkyrie, you know that?"
63090-15 = "...Is that so? I hardly think one should want to be famously known at Valkyrie."
63090-16 = "...Still better than being famous all across Kivotos, right..."
63090-17 = "That's true. It's strange for me to be the one saying this, but...that sounds rather rough."
63090-18 = "All right, all right. Feels like that cleared out the awkward air, so let's get to the point."
63090-19 = "You girls...are the Arius Squad, right? I'm here to update you on an official notice for the Arius Squad that just released."
63090-20 = "I presume that would be our sentencing."
63090-21 = "Yeah, something like that."
63090-22 = "Our sentence was already finalized in a formal trial... Have they discovered some additional crime? Regardless, I'm prepared to accept it."
63090-23 = "You really are something, Saori. Most people react the exact opposite way, y'know."
63090-24 = "I-Is that so? I suppose people consider Arius to be the opposite of \"normal.\""
63090-25 = "Yeah, yeah. The General Student Council's also relieved they finally nailed down the location of the Arius Satellite School. Ah, that part's not that important, though."
63090-26 = "If it's about my school, it's all important to me. Like it or not, it's where I come from."
63090-27 = "...Even though it's known for producing some of the worst terrorists, I won't try to deny that fact."
63090-28 = "I'll never move forward unless I accept my own mistakes."
63090-29 = "That's a nice way of putting it! And on that note..."
63090-35 = "...Do you regret it?"
63090-36 = "Regret...the terrorist attack?"
63090-37 = "What else would I mean?"
63090-43 = "Aha..."
63090-47 = "Huh? Why are you laughing?"
63090-48 = "Ah, my apologies. I wasn't trying to laugh at you, Konoka, or at Valkyrie...or even at Trinity."
63090-49 = "It's just... this reminds me of a conversation I had with someone long ago."
63090-50 = "You asked if I regretted it. The answer is simple."
63090-54 = "I've regretted it every day since it happened."
63090-57 = "An immature, stupid rookie, huh?"
63090-58 = "Yes. A rookie that's part of my past now."
63090-59 = "But that past is undeniably a part of who I am."
63090-60 = "..."
63090-61 = "All righty, then. Just as I thought."
63090-65 = "What do you mean?"
63090-66 = "Oh, nothing important."
63090-67 = "Still, there are some things I'm supposed to say. Tradition, procedure, all that."
63090-71 = "Congratulations, Saori. And to the Arius Squad as well."
63090-72 = "Pack your things. You're being released on parole."
63090-77 = "What...?"
63090-78 = "I'm not sure I understand, Konoka. Is this...some kind of joke?"
63090-79 = "To be fair, I did figure your reaction would be something like that."
63090-80 = "I'll explain, so try to keep up."
63090-81 = "The crimes and sentences of Arius Squad still stand, but you've been given a suspended sentence."
63090-82 = "A suspended...sentence? But terrorists don't get suspended sentences."
63090-83 = "Yeah, I mean, that's true."
63090-84 = "But honestly, the stuff you all did, blowing up buildings, setting off explosions, so on and so forth, they're pretty par for the course here."
63090-85 = "...Which is why construction is one of Kivotos' top industries."
63090-86 = "R-Right..."
63090-87 = "So when it comes to crime in Kivotos, what we care about most is intent to kill, malice, things like that."
63090-88 = "Is that so? That's the first I've heard of that standard. But if that's the case, then all the more..."
63090-89 = "Yes, that attack definitely involved both of those. You admit to that much yourselves."
63090-90 = "But, you know, from what I've seen, you've all really reflected on what you did."
63090-91 = "H-Huh?"
63090-92 = "Plus, you even turned yourselves in, didn't you? Some of our problem children waltzing in and ASKING to be arrested... That was the first time I've seen that since I became Deputy Director!"
63090-93 = "Students who can reflect on their own mistakes and seek out punishment... Maybe Kivotos' future isn't as dull and hopeless as I thought!"
63090-94 = "Th-Thank you..."
63090-95 = "(It's not really my place to say this, but...isn't this very sloppy procedure?)"
63090-96 = "And above all, the ones who suffered at your hands the most were, in the end, Sensei and Trinity. But..."
63090-97 = "We got a mountain of petitions from them."
63090-102 = "From Gehenna, even."
63090-103 = "Oh, this one was kinda funny, so I'll pass it along. "
63090-105 = "Right, that happened."
63090-106 = "Those kinds of injuries didn't faze me, but I was angry Sensei was caught in the crossfire."
63090-107 = "But even on that note..."
63090-108 = "...Sensei personally asked me to forgive you, for their sake, if nothing else. So I suppose that's the only comment I have on that topic."
63090-109 = "So all that's left is covering Makoto's hair styling expenses..."
63090-110 = "..."
63090-111 = "That's it. None of it is of any importance anymore."
63090-114 = "Just like that...?"
63090-115 = "Seems like it."
63090-116 = "Anyway, given how things have turned out, we don't really have a reason not to show some leniency."
63090-117 = "Valkyrie is an academy primarily meant for guidance and rehabilitation."
63090-118 = "And the maintenance costs for the Corrections Bureau aren't exactly cheap either..."
63090-119 = "Above all, Sensei said they'd take responsibility for you. So don't go disappointing them, okay?"
63090-120 = "Understood. I'll keep that firmly in mind."
63090-121 = "Just to clarify, a suspended sentence doesn't mean you're innocent. If you cause trouble during your parole, we'll have no choice but to hit you with a harsher punishment."
63090-122 = "Right. Understood. If we cause any trouble, you can shatter my halo."
63090-123 = "H-Hey! You can't just drop that out of nowhere! Geez! You Arius kids are scary!"
63090-124 = "S-Sorry..."
63090-125 = "So... We're really...out on parole...?"
63090-126 = "Yes."
63090-127 = "Given that, why don't you go get ready for your exams?"
63090-131 = "R-Right! Our exams!"
63090-146 = "Welcome!"
63090-147 = "..."
63090-148 = "H-Hi, everyone!"
63090-149 = "So, this classroom might not be the most up-to-date one out there..."
63090-150 = "...but let's put our all into studying and ace the mock exams together!"
63090-155 = "Wow... This classroom is amazing..."
63090-156 = "In a place like this, you could really get into studying..."
63090-161 = "...Wh-What?"
63090-162 = "Yeah. I understand your reactions. "
63090-163 = "Compared to the types of classrooms we come from, it's only natural."
63090-164 = "R-Right. that's true..."
63090-165 = "Thank you, Hifumi. And everyone else."
63090-166 = "I'm grateful to all of you for helping with their supplemental lessons."
63090-172 = "Oh, think nothing of it. We're happy we can help you, and Sensei."
63090-174 = "But... not mentioning our school, or club names, is harder than I thought... If I let my guard down even a little, I feel like I'll just blurt it out..."
63090-175 = "[s] \"It's the same for me too...\""
63090-179 = "..."
63090-180 = "..."
63090-181 = "Oh, it's been a while, Azusa."
63090-182 = "Yeah, long time no see, Maia."
63090-183 = "I hope what I am about to say is acceptable to you."
63090-184 = "Currently, I feel happy to see you."
63090-185 = "Y-You sure haven't changed..."
63090-186 = "I'm glad... You look like you've been well..."
63090-187 = "..."
63090-188 = "Yeah..."
63090-189 = "Everyone can find a way to live happily."
63090-190 = "You only need to make it happen."
63090-196 = "So if there's anything I can help you with, I'd like you to tell me."
63090-200 = "Then, could you take our exam for us?!"
63090-201 = "I can't do that."
63090-202 = "Uwaaah..."
63090-206 = "And this is Koharu...right? The elite one..."
63090-210 = "H-Heh! You've got a good eye! That's right! I'm the great..."
63090-214 = "U-Um! Anyways! I'm considered one of the elite, so you can count on me!"
63090-215 = "Then how do you solve this problem?"
63090-216 = "H-Huh?"
63090-220 = "(Huh? I definitely know how to do this one...?)"
63090-221 = "(Why can't I remember right now? I even remember taking the notes!)"
63090-222 = "S-So, you see! This... This is...!"
63090-223 = "Y-Yes!"
63090-224 = "U-Ugh..."
63090-225 = "It's not on the test, so you don't need to worry about it!"
63090-227 = "Huh?! Really?!"
63090-228 = "You shouldn't think like that, Koharu. The point of studying isn't just to memorize things to do well on a test."
63090-229 = "In that case, wouldn't it mean that you've been...studying for a \"special test\" yourself, haven't you?"
63090-231 = "KYAAAH?!"
63090-232 = "Wh-What are you talking about?! That's totally off! You're purposefully misunderstanding EVERYTHING!"
63090-234 = "Fufu. Are we, now?"
63090-235 = "More importantly, it's true that this type of problem isn't on the exam. However, you won't be able to understand the concepts without mastering it first."
63090-236 = "So, how about we approach it like this? Look, here..."
63090-242 = "Urawa Hanako... She really is exceptional."
63090-243 = "...So exceptional, she's impossible to predict."
63090-244 = "I wonder if there's anything Hanako doesn't know..."
63090-250 = "I don't know everything, you know. I can only know what I know."
63090-251 = "Uwaaah! Y-You heard that?! I'm sooo sorry! WAAAHHH!"
63090-252 = "Don't worry yourself over something like that. Tsuchinaga Hiyori, correct? May I call you Hiyori?"
63090-253 = "Huh? Y-Yes! Yesyesyesyes. I-It's an honor..."
63090-254 = "And this young lady... You're Hakari Atsuko, yes? My, my..."
63090-258 = "Yes, Hanako?"
63090-259 = "...Hm?"
63090-260 = "..."
63090-261 = "..."
63090-265 = "Heehee!"
63090-266 = "Fufu."
63090-267 = "It seems I've met someone interesting. I'm sure I'll be counting on you for many different things from now on, Atsuko."
63090-268 = "I have the same feeling. I'll be in your hands, Hanako."
63090-269 = "My, oh my."
63090-270 = "Heeheehee."
63090-272 = "What's going on, Atsuko? Did you know Urawa Hanako beforehand as well?"
63090-273 = "Not at all, Sao-Sao. I just got a feeling. Like I'd met a kindred spirit."
63090-274 = "And I do believe she felt the same way."
63090-275 = "...What is going on right now?"
63090-276 = "Let's leave it for me to know."
63090-277 = "I totally don't get it, but okay..."
63090-278 = "Then, back to studying, everyone! Let's leave it to the professional, shall we?"
63090-279 = "[s] \"You can count on me!\""
63090-294 = "...By the way, what are these weird, fluffy things, Hifumi?"
63090-298 = "Ah! These are..."
63090-303 = "...prizes! Momo Friends for students who get good grades!"
63090-305 = "We're back to this...?"
63090-307 = "\"Momo Friends\"?"
63090-308 = "Yes! Not everyone loves them, but they have a really loyal fanbase! And it's been trending more and more lately!"
63090-310 = "\"Not everyone loves them\"... We've come so far..."
63090-311 = "Momo Friends are the best. I personally love Skullman. These rewards will motivate every single student here!"
63090-312 = "Why...would they do that?"
63090-313 = "O-Oh! Because in our supplemental classes, they were really effective."
63090-314 = "...Really? Is there some kind of mysterious \"angel phenomenon\" at work here too?"
63090-316 = "Huh? N-No, nothing like that. They're just really cute, so people work extra-hard because they want to earn one..."
63090-317 = "Exactly. What more reason do you need?"
63090-322 = "..."
63090-323 = "(There must be something strange in the water here. Azusa's tastes have grown weird.)"
63090-326 = "Um, so, we honestly weren't really good at studying at first, either."
63090-327 = "But studying is more about building systems. If you keep repeating and practicing them..."
63090-328 = "You'll definitely be able to raise your score!"
63090-329 = "And besides, even someone as average and unremarkable as me was able to pass the supplemental classes!"
63090-333 = "..."
63090-334 = "..."
63090-335 = "Um, Azusa...?"
63090-336 = "Yes, Maia?"
63090-337 = "Is Hifumi really...average?"
63090-338 = "..."
63090-339 = "From what I've observed, there are two kinds of average."
63090-340 = "One is the average you claim for yourself, and the other is the average seen by others."
63090-341 = "Which one is Hifumi?"
63090-342 = "..."
63090-343 = "No comment."
63090-344 = "That answer says a lot, though..."
63090-348 = "Memorize! Memorize it, you stupid brain! Why can't you just learn?!"
63090-349 = "I think I just realized a huge truth about this \"exam season\" thing..."
63090-350 = "What's that?"
63090-351 = "That it's a time when everything BESIDES studying suddenly sounds really fun..."
63090-356 = "Ooh! My motivation to study is burning up!"
63090-357 = "Really?"
63090-358 = "Yeap. It burned so hot that it turned to ash."
63090-362 = "Sensei, I think I've come down with something. Can I take a break?"
63090-363 = "[s] \"With what, exactly?\""
63090-364 = "An illness that makes it hurt when I study."
63090-365 = "[s] \"Oh, no! The only cure is to study until you feel better.\""
63090-369 = "You're a monster..."
63090-370 = "[s] \"Of course. All teachers are during exam season.\""
63090-373 = "Whoa! This problem is amazing!"
63090-374 = "\"Amazing\"? What could possibly be so amazing about it?"
63090-375 = "I'm serious! It's so good, I don't even want to solve it, so I don't ruin it!"
63090-376 = "What the...? I think all the studying made her lose it..."
63090-379 = "And so, as everyone's effort, flailing, desperation, and screams all got stirred together into a chaotic mess..."
63090-380 = "Day in, and day out, the Arius students diligently prepared for the very first exam."
63090-383 = "Next Episode;Ecclesia for Those Who Don't Disappear"

63090-48 = "3;사오리;S2_01;아, 미안하다. 코노카나 발키리…… 심지어 트리니티를 비웃겠다는 의도는 전혀 없었어.\n#3;em;[반응]"
63090-49 = "3;사오리;S2_99;단지……. 예전에, 누군가와 같은 대화를 했던 게 조금 기억나서 말이지."

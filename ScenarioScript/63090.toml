[translation]
63090-1 = "ตอนที่ 9;เตรียมสอบ"
63090-4 = "สวัสดีค่ะ คุณซาโอริ! หมู่นี้เป็นยังไงบ้างคะ?"
63090-9 = "ฉันสบายดี ขอบใจที่เป็นห่วงกัน เธอคือรองหัวหน้ากรมฯ โคโนกะ... หรือเปล่า?"
63090-10 = "ไม่เอาน่า ทำไมถึงเรียกเต็มยศแบบนั้นล่ะคะ! เรียกว่าโคโนกะเฉยๆ ก็ได้ค่ะ! "
63090-11 = "ถึงเราจะอยู่ชั้นปีเดียวกัน แต่คุณซาโอริก็อายุมากกว่าฉัน 1 ปีไม่ใช่เหรอคะ! "
63090-12 = "อะ... อืม ก็ได้ โคโนกะ ว่าแต่..."
63090-13 = "ทำไมจู่ๆ ถึงเรียกฉันที่ถูกคุมขังอยู่ให้ไปที่ห้องสอบสวนล่ะ มีเรื่องอะไรหรือเปล่า?"
63090-14 = "ไม่หรอกค่ะ ฉันแค่อยากรู้ว่าคุณซาโอริเป็นยังไงบ้างน่ะค่ะ ก็คุณซาโอริเป็นคนมีชื่อเสียงสำหรับพวกเรา#nวัลคิรี่นี่คะ"
63090-15 = "งั้นเหรอ... การเป็นคนมีชื่อเสียงสำหรับวัลคิรี่ดูจะไม่ใช่เรื่องดีเท่าไรนะ"
63090-16 = "แต่ก็ดีกว่าการเป็นคนดังไปทั่วคิโวทอสละค่ะ..."
63090-17 = "ก็จริงอย่างที่ว่านะ ถึงจะน่าอายไปหน่อยที่ฉันจะพูดอย่างนี้ แต่ก็... คงเหนื่อยน่าดูเลยสินะ..."
63090-18 = "ไม่เป็นไรเลยค่ะ ฉันว่าเราเกริ่นกันมาพอหอมปากหอมคอแล้ว~ งั้นก็มาเข้าเรื่องกันเลยค่ะ"
63090-19 = "พวกคุณคือ... สควอดของอาเรียสใช่มั้ยคะ? พอดีว่ามีการแก้ไขเอกสารใหม่เกี่ยวกับสควอดของ#nอาเรียสน่ะค่ะ ฉันก็เลยอยากคุยเรื่องนี้"
63090-20 = "แก้ไขเอกสารงั้นเหรอ? งั้นก็คงเป็นเรื่องเกี่ยวกับอัตราโทษสินะ"
63090-21 = "ค่ะ จะว่าคล้ายๆ กันก็ได้ค่ะ"
63090-22 = "ถึงจะมีการพิจารณาคดีอย่างเป็นทางการและกำหนดอัตราโทษแล้ว... แต่คงไปเจอความผิดกระทงอื่น#nมาด้วยสินะ? ไม่เป็นไรหรอก ฉันพร้อมยอมรับทุกอย่างอยู่แล้ว"
63090-23 = "น่าทึ่งจังเลยนะคะ... คุณซาโอรินี่ละก็ ปกติจะมีท่าทีตรงกันข้ามไม่ใช่เหรอคะ?"
63090-24 = "งะ... งั้นเหรอ? แต่ว่า... ชาวอาเรียสมักจะแตกต่างจากที่คนทั่วไปเรียกว่า 'ปกติ' อยู่นิดหน่อยน่ะ"
63090-25 = "ค่ะ ใช่ค่ะ ทางองค์การนักเรียนก็ดูเหมือนจะโล่งใจที่ในที่สุดก็กำหนดบทบาทของโรงเรียนสาขาอาเรียส#nได้เสียที อ๊ะ นี่มันคนละเรื่องกันนี่คะ"
63090-26 = "ไม่เป็นไร ฉันยินดีฟังทุกเรื่องของโรงเรียนฉันอยู่แล้ว ถึงจะเป็นเรื่องดีหรือไม่ดี แต่ก็เป็นโรงเรียนเก่าของฉัน"
63090-27 = "ถึงจะถูกมองว่าเป็นโรงเรียนที่ผลิตผู้ก่อการร้ายที่เลวร้ายที่สุด ฉันก็จะไม่ปฏิเสธข้อเท็จจริงนั้นหรอก..."
63090-28 = "ถ้าเราไม่ยอมรับความผิดพลาดของตัวเอง เราก็จะก้าวไปข้างหน้าไม่ได้นี่เนอะ"
63090-29 = "พูดได้ดีเลยค่ะ! ว่าแต่..."
63090-35 = "คุณเสียใจหรือเปล่าคะ...?"
63090-36 = "เรื่องก่อการร้ายครั้งนั้นน่ะเหรอ?"
63090-37 = "จะเป็นเรื่องอื่นไปได้ยังไงคะ?"
63090-43 = "ฮุ..."
63090-47 = "เอ๋? ทำไมถึงหัวเราะล่ะคะ?"
63090-48 = "อ่า ขอโทษที ฉันไม่ได้ตั้งใจจะยิ้มเยาะโคโนกะ วัลคิรี่... หรือแม้แต่ทรีนิตี้หรอก"
63090-49 = "ก็แค่... ฉันจำได้ว่าเคยคุยเรื่องทำนองนี้กับใครบางคนเมื่อไม่นานมานี้น่ะ"
63090-50 = "ฉันเสียใจหรือเปล่าน่ะเหรอ? ตอบได้ง่ายเลยละ"
63090-54 = "ไม่มีวันไหนเลยที่ฉันไม่เสียใจ"
63090-57 = "จะบอกว่าตอนนั้นตัวเองเป็นเด็กโง่เขลาที่ยังโตไม่พอสินะคะ"
63090-58 = "อื้อ เด็กโง่เขลาคนหนึ่งที่ตอนนี้ไม่อยู่ที่นี่แล้ว"
63090-59 = "แต่เด็กคนนั้นก็คือฉันเอง"
63090-60 = "..."
63090-61 = "ดีค่ะ เป็นอย่างที่ฉันคิดไว้เลย"
63090-65 = "หมายความว่ายังไง?"
63090-66 = "ก็... ไม่มีอะไรมากหรอกค่ะ"
63090-67 = "แต่ยังไงก็ควรต้องบอกไว้ละค่ะ ก็มันเป็นธรรมเนียมปฏิบัตินี่คะ"
63090-71 = "ยินดีด้วยค่ะ คุณซาโอริ แล้วก็สควอดทุกคน"
63090-72 = "พวกคุณได้รับการปล่อยตัวแบบมีทัณฑ์บนค่ะ เก็บของกันได้เลยค่ะ"
63090-77 = "...?"
63090-78 = "ฉันไม่ค่อยเข้าใจเท่าไรน่ะ โคโนกะ นี่คือ... มุกตลกรูปแบบใหม่เหรอ?"
63090-79 = "ไม่ใช่ค่ะ... กะไว้แล้วเชียวว่าต้องมีท่าทีแบบนี้..."
63090-80 = "งั้นฉันจะอธิบายอย่างรวบรัดนะคะ ตามให้ทันล่ะ"
63090-81 = "ความผิดกับอัตราโทษของสควอดอาเรียสยังมีอยู่อย่างไม่ต้องสงสัย แต่พวกคุณถูกตัดสินภาคทัณฑ์ค่ะ"
63090-82 = "ภาค... ทัณฑ์? แต่พวกเราไปก่อการร้ายไว้เลยนะ..."
63090-83 = "ค่ะ ก็ใช่ค่ะ"
63090-84 = "ที่จริงแล้วการระเบิดหรือทำลายสิ่งปลูกสร้างเป็นสิ่งที่เกิดขึ้นเป็นประจำในคิโวทอสอยู่แล้วค่ะ..."
63090-85 = "อุตสาหกรรมก่อสร้างก็เลยเป็นอุตสาหกรรมที่เฟื่องฟูในคิโวทอสยังไงล่ะคะ..."
63090-86 = "อะ... อืม..."
63090-87 = "เพราะงั้นอาชญากรรมที่รุนแรงที่สุดในบรรดาอาชญากรรมทั้งหมดของคิโวทอสก็คือเจตนาฆ่า และประสงค์ร้าย อะไรทำนองนั้น..."
63090-88 = "งั้นเหรอ? ฉันเพิ่งเคยได้ยินมาตรฐานนี้เป็นครั้งแรกเลยนะ แต่ถ้างั้นมันก็ยิ่ง..."
63090-89 = "ค่ะ การก่อการร้ายในครั้งนั้นมาจาก 2 เรื่องนั้นอย่างแน่ชัด พวกคุณก็ต้องยอมรับในส่วนนั้นเหมือนกันค่ะ"
63090-90 = "แต่ก็นะ... เท่าที่ฉันได้ยินมา ทุกคนก็กำลังสำนึกผิดกันอยู่ใช่มั้ยล่ะคะ?"
63090-91 = "อะ... อื้อ?"
63090-92 = "แล้วพวกคุณก็มามอบตัวเองด้วยนี่คะ? ไม่อยากเชื่อเลยว่าคนผิดจะเข้ามามอบตัวเองเลย~ นี่เป็นครั้งแรกที่ฉันได้เจอเรื่องแบบนี้หลังจากขึ้นเป็นรองหัวหน้ากรมฯ เลยนะคะ!"
63090-93 = "มีนักเรียนที่สำนึกต่อความผิดของตัวเองและต้องการรับโทษด้วยสินะคะ บางทีอนาคตของคิโวทอส#nอาจจะไม่มืดมนขนาดนั้นก็ได้ค่ะ!"
63090-94 = "ขะ... ขอบใจนะ..."
63090-95 = "(ถึงเราจะไม่ได้อยู่ในฐานะที่พูดแบบนี้ได้ แต่จะจัดการงานสำคัญชุ่ยๆ แบบนี้ได้ด้วยเหรอ...)"
63090-96 = "และเหนือสิ่งอื่นใด ผู้ที่มีเจตนาฆ่าหรือประสงค์ร้ายที่แท้จริงก็คือคุณครูกับทรีนิตี้ค่ะ แต่ว่า..."
63090-97 = "มีหนังสือร้องเรียนเกี่ยวกับเรื่องนั้นมาเป็นปึกเลยละค่ะ"
63090-102 = "มีกระทั่งที่ส่งมาจากเกเฮนน่าด้วยนะ"
63090-103 = "อ๊ะ ไว้ฉันจะเล่าให้ฟังทีหลังนะคะ ส่วนนี้น่าสนุกเลยละ "
63090-105 = "ใช่ มีเรื่องอะไรแบบนั้นอยู่ด้วยนี่นะ"
63090-106 = "เรื่องที่ฉันบาดเจ็บน่ะไม่เป็นไรหรอก แต่ที่ทำให้ฉันโกรธมากๆ ก็คือการที่คุณครูต้องเดือดร้อนไปด้วย"
63090-107 = "แต่ถึงยังไง..."
63090-108 = "ในเมื่อคุณครูมาขอให้ฉันยกโทษให้เพื่อเห็นแก่คุณครูเอง... งั้นฉันก็ไม่มีอะไรจะพูดต่อเกี่ยวกับส่วนนั้น#nแล้วละ"
63090-109 = "ถ้างั้นจากนี้ไปก็เหลือแค่เรื่องค่าทำผมของมาโคโตะ..."
63090-110 = "..."
63090-111 = "ช่างเถอะ ตอนนี้ไม่ต้องไปใส่ใจกับปัญหานั้นหรอก"
63090-114 = "แบบนี้ก็... ได้เหรอ...?"
63090-115 = "ก็น่าจะได้นะคะ..."
63090-116 = "เอาเถอะค่ะ... ถ้าเรื่องลงเอยแบบนี้ พวกฉันก็ไม่มีเหตุผลที่จะจัดการอะไรเป็นพิเศษแล้วค่ะ"
63090-117 = "แล้ววัลคิรี่ก็เป็นโรงเรียนที่มุ่งเน้นการเป็นผู้นำในทางที่ถูกและการอบรมบ่มนิสัยอยู่แล้วนี่คะ?"
63090-118 = "ค่าใช้จ่ายในการบำรุงรักษาสำนักควบคุมก็ไม่ได้น้อยๆ เลยด้วย..."
63090-119 = "และเหนือสิ่งอื่นใด คุณครูก็บอกไว้เองว่าจะรับผิดชอบค่ะ เพราะงั้นก็อย่าทำให้คุณครูผิดหวังนะคะ"
63090-120 = "เข้าใจแล้ว เรื่องนั้นฉันจะจำไว้ให้ขึ้นใจเลย"
63090-121 = "และหลายคนก็เข้าใจผิดว่าการได้ภาคทัณฑ์เท่ากับว่าถูกตัดสินให้ไม่มีความผิด แต่ที่จริงไม่ใช่ค่ะ ถ้าไปก่อเหตุอะไรเพิ่มในช่วงภาคทัณฑ์ พวกฉันก็ต้องลงโทษให้หนักกว่าเดิมอย่างหลีกเลี่ยงไม่ได้ค่ะ"
63090-122 = "อื้อ ไม่ต้องห่วงหรอก ถ้าพวกฉันไปก่อเหตุอะไรอีกละก็ มาทำลายฮาโลของฉันได้เลย"
63090-123 = "ไม่เอาสิ! อย่าพูดแบบนั้นสิคะ! คำพูดของชาวอาเรียสนี่ช่างน่ากลัวจริงๆ เลย!"
63090-124 = "ขะ... ขอโทษที..."
63090-125 = "ถ้างั้น... พวกฉัน... จะถูกปล่อยตัวจริงๆ เหรอ...?"
63090-126 = "ค่ะ"
63090-127 = "ในเมื่อเป็นอย่างนี้แล้ว ฉันว่าทุกคนไปเตรียมตัวสอบกันดีมั้ยล่ะคะ?"
63090-131 = "สอบ...! นั่นสินะ!"
63090-146 = "เชิญค่ะ!"
63090-147 = "..."
63090-148 = "ทุกคนคะ!"
63090-149 = "ทุกคนอาจรู้สึกว่าห้องเรียนนี้ยังขาดสิ่งอำนวยความสะดวกไปหน่อย..."
63090-150 = "แต่ยังไงเราก็มาตั้งใจติวหนังสือ! แล้วทำข้อสอบจำลองให้ได้คะแนนดีๆ กันนะคะ!"
63090-155 = "ว้าว... ห้องเรียนดีมากเลย..."
63090-156 = "ถ้าได้เรียนในห้องเรียนแบบนี้ ความรู้น่าจะเข้าหัวอยู่นะ..."
63090-161 = "เอะ... เอ๋...?"
63090-162 = "อืม ฉันเข้าใจท่าทีแบบนั้นดี "
63090-163 = "ถ้าเทียบกับห้องเรียนของที่นั่นแล้ว ทุกอย่างก็ดูดีไปหมดนั่นละ"
63090-164 = "งะ... งั้นเหรอคะ? แหะๆๆ..."
63090-165 = "ฮิฟุมิ แล้วก็ทุกคนเลย"
63090-166 = "ขอบใจที่ช่วยจัด 'ชั้นเรียนเสริม' ให้เด็กๆ พวกนี้นะ"
63090-172 = "ไม่ต้องขอบคุณหรอกค่ะ พวกฉันดีใจที่ได้ช่วยคุณครูค่ะ"
63090-174 = "แต่ว่า... การไม่พูดชื่อโรงเรียนกับชื่อชมรมไม่ใช่เรื่องง่ายเลยนะคะ... ถ้าสติหลุดนิดเดียวละก็ ฉันน่าจะเผลอพูดออกไปเลยค่ะ..."
63090-175 = "[s] \"เรื่องนั้นก็ยากสำหรับครูเหมือนกัน...\""
63090-179 = "..."
63090-180 = "..."
63090-181 = "มะ... ไม่ได้เจอกันนานเลยนะคะ คุณอาซึสะ"
63090-182 = "อื้อ ไม่ได้เจอกันนานเลยนะ ไมอา"
63090-183 = "ไม่รู้ว่ามันเหมาะสมหรือเปล่าที่จะพูดคำแบบนี้"
63090-184 = "แต่ตอนนี้ฉัน... ดีใจที่ได้เจอเธอนะ"
63090-185 = "ละ... ลักษณะการพูดยังเหมือนเดิมเลยนะคะ..."
63090-186 = "ฉัน... สบายดีค่ะ ดีที่ได้ใช้ชีวิตแบบนี้ค่ะ..."
63090-187 = "..."
63090-188 = "อื้อ"
63090-189 = "พวกเธอก็มีชีวิตที่ดีได้นะ"
63090-190 = "มันควรจะเป็นอย่างนั้นอยู่แล้ว"
63090-196 = "เพราะงั้นถ้ามีอะไรที่ฉันพอช่วยได้ ก็บอกได้เลยนะ"
63090-200 = "งั้นช่วยทำข้อสอบแทนได้มั้ยคะ?!"
63090-201 = "ไม่ได้"
63090-202 = "แง..."
63090-206 = "ส่วนคนนี้คือโคฮารุจัง... ใช่มั้ยคะ? เห็นว่าเป็นนักเรียนหัวกะทิเลย..."
63090-210 = "อะ... อะแฮ่ม! สายตาเฉียบแหลมมาก! ใช่แล้วละ! ฉันนี่ละ นักเรียนที่..."
63090-214 = "เอาเถอะ! สรุปว่าฉันเป็นนักเรียนหัวกะทิ! มาพึ่งพาฉันได้เต็มที่เลย!"
63090-215 = "ถ้างั้นโจทย์ข้อนี้... ต้องแก้ยังไงเหรอคะ?"
63090-216 = "หะ... หืม...?"
63090-220 = "(เอ๋? โจทย์แบบนี้เคยทำได้มาก่อนนี่นา...?)"
63090-221 = "(ทำไมตอนนี้จำไม่ได้ล่ะ? ตอนนั้นก็จดไว้แล้วนะ?!?!)"
63090-222 = "จะ... โจทย์ข้อนี้! เรื่องนี้...!"
63090-223 = "ค่ะ ค่ะ!"
63090-224 = "อะ... อึก..."
63090-225 = "เรื่องนี้ไม่ออกข้อสอบ งั้นไม่ต้องรู้ก็ได้!"
63090-227 = "คะ?! งั้นเหรอคะ!?"
63090-228 = "ไม่ได้สิคะ โคฮารุจัง การคิดว่าไม่ต้องทบทวนก็ได้เพราะไม่ใช่เรื่องที่ออกข้อสอบ เป็นความคิดที่เด็กมากนะคะ"
63090-229 = "ขนาด 'ความรู้เด็ดๆ' ที่ไม่ได้ออกข้อสอบ... โคฮารุจังยังศึกษาล่วงหน้าเลยไม่ใช่เหรอคะ?"
63090-231 = "ว้ากก?!?!"
63090-232 = "พะ... พูดเรื่องอะไรน่ะ! ห้ามพูดเรื่องแบบนั้นเลย! มันเป็นเรื่องเข้าใจผิดนะ!"
63090-234 = "ฮุฮุ งั้นเหรอคะ?"
63090-235 = "ถึงโจทย์ข้อนั้นจะไม่ได้อยู่ในเรื่องที่ออกข้อสอบ แต่มันก็เป็นสิ่งที่จำเป็นต้องรู้เพื่อเตรียมตัวสอบใน#nครั้งนี้ค่ะ"
63090-236 = "เอาละ งั้นลองมาคิดอย่างนี้มั้ยคะ? ไหนดูซิ..."
63090-242 = "อุราวะ ฮานาโกะ... ยอดไปเลยนะ"
63090-243 = "คนคนนั้นน่ะ ความคิดไม่ธรรมดาจนแทบจะคาดเดาไม่ได้ในหลายๆ แง่เลยละ..."
63090-244 = "จะมีอะไรที่คุณฮานาโกะไม่รู้บ้างมั้ยนะ..."
63090-250 = "ฉันไม่ได้รู้ไปทุกเรื่องหรอกนะคะ แค่รู้ในสิ่งที่ต้องรู้น่ะค่ะ"
63090-251 = "เหวอออ?! ดะ... ได้ยินพวกฉันด้วยเหรอคะ?!?! ขอโทษค่าาาาา!!!"
63090-252 = "ไม่เป็นไรค่ะ สึจินากะ ฮิโยริ... ใช่มั้ยคะ? ขอเรียกว่าฮิโยริจังได้มั้ยนะ?"
63090-253 = "คะ? ค่ะ ค่ะค่ะค่ะค่ะค่ะ ปะ... เป็นเกียรติอย่างยิ่ง... เลยค่ะ..."
63090-254 = "ส่วนคนนี้ก็... ต้องเป็นคุณฮาคาริ อาสึโกะ... แน่เลยใช่มั้ยคะ? ตายจริง...?"
63090-258 = "เป็นอะไรไปเหรอ คุณฮานาโกะ?"
63090-259 = "หืม...?"
63090-260 = "..."
63090-261 = "..."
63090-265 = "ฮุฮุ"
63090-266 = "ฮุฮุ"
63090-267 = "เหมือนได้เจอคนน่าสนใจคนหนึ่งเลย ฉันต้องฝากตัวในหลายๆ เรื่องเลยนะคะ อาสึโกะ 'จัง'?"
63090-268 = "อื้อ ฉันก็รู้สึกแบบนั้นเหมือนกัน ฝากตัวด้วยนะ ฮานาโกะ 'จัง'"
63090-269 = "อุ๊ย ตายแล้วๆ"
63090-270 = "ฮุฮุฮุ"
63090-272 = "มีเรื่องอะไรงั้นเหรอ อาสึโกะ...? รู้จักกับอุราวะ ฮานาโกะ... มาก่อนแล้วเหรอ?"
63090-273 = "เปล่าหรอก ซัตจัง ฉันแค่รู้สึกว่า เราน่าจะคุยกันถูกคอในหลายๆ เรื่องน่ะ"

63090-275 = "ไม่เห็นจะเข้าใจเลย..."
63090-276 = "อื้อ แต่ที่เป็นตอนนี้ก็ถือว่าดีแล้วละ"
63090-277 = "ฉันก็ไม่เข้าใจเหมือนกัน แต่ก็ ค่ะ..."
63090-278 = "เอาละ งั้นพวกเราก็มาเตรียมสอบกันเถอะ ฝากเรื่องการสอนด้วยนะคะ คุณครู"
63090-279 = "[s] \"วางใจได้เลย!\""
63090-294 = "ว่าแต่... ก้อนสำลีแปลกๆ นี่... มันคืออะไรเหรอคะ? คุณฮิฟุมิ?"
63090-298 = "ค่ะ! นี่น่ะเหรอคะ...?"
63090-303 = "นี่คือสินค้า MOMO FRIENDS ที่จะเป็นของขวัญให้คนที่สอบได้คะแนนดีค่ะ!"
63090-305 = "ให้อันนี้อีกแล้วเหรอ...?"
63090-307 = "MOMO... FRIENDS เหรอคะ?"
63090-308 = "ค่ะ! MOMO FRIENDS เป็นตุ๊กตาสุดฮิตในตอนนี้ค่ะ! ถึงจะไม่ใช่กับทุกคน... แต่ก็ได้รับความนิยมจากคนหลายๆ กลุ่มเลยค่ะ!"
63090-310 = "ยอมรับว่าไม่ได้รับความนิยมจากทุกคน นี่ถือว่าเป็นความก้าวหน้าอย่างหนึ่งเลยนะ..."
63090-311 = "อื้อ! MOMO FRIENDS คือที่สุดแล้ว! ฉันขอแนะนำสกัลแมน ถ้าได้รางวัลดีๆ แบบนี้ละก็ ทุกคนต้องตั้งใจอ่านหนังสือสอบกันแน่นอน!"
63090-312 = "นี่มันตรรกะอะไรคะ?"
63090-313 = "ตายจริง เห็นแบบนี้ แต่ชั้นเรียนเสริมของพวกฉันก็ได้ผลดีเลยนะคะ คุณสุบารุ"
63090-314 = "จริงเหรอคะ...? ที่นี่มีปรากฏการณ์ลึกลับอย่างเช่นเรื่อง 'นางฟ้า' อยู่ด้วยเหรอคะ?"
63090-316 = "คะ? มะ.... ไม่ใช่แบบนั้นหรอกค่ะ มันเป็นเพราะทุกคนตั้งใจติวหนังสือเพราะอยากได้ของน่ารักๆ เป็นของขวัญน่ะค่ะ..."
63090-317 = "ใช่แล้วละ นั่นเป็นเหตุผลมากพอแล้วที่จะทุ่มเทอย่างถึงที่สุด"
63090-322 = "..."
63090-323 = "(พออาซึสะได้มาคลุกคลีกับโลกภายนอก รสนิยมก็เปลี่ยนไปสินะ...)"
63090-326 = "เอ่อ ทุกคนคะ! ที่จริงพวกฉันก็เรียนไม่ค่อยเก่งเหมือนกันค่ะ!"
63090-327 = "แต่การเรียนก็ถือเป็นระบบอย่างหนึ่ง เพราะงั้นไม่ว่าใครก็ตาม ถ้าขยันเรียนและคอยหมั่นทบทวนอยู่#nเสมอละก็..."
63090-328 = "ยังไงเราก็จะบรรลุผลสำเร็จในระดับหนึ่งแน่นอนค่ะ!"
63090-329 = "แม้แต่นักเรียนธรรมดาที่ไม่มีอะไรโดดเด่นอย่างฉัน ยังสอบผ่านชั้นเรียนเสริมมาได้เลยค่ะ!"
63090-333 = "..."
63090-334 = "..."

[translation]
33140-1 = "第14話;於黑暗之中"
33140-5 = "嗚嗡嗡嗡嗡嗡嗡────"
33140-10 = "確，確認到了……那就是，那個……"
33140-11 = "「戰術兵器」嗎……只是個怪物啊。"
33140-12 = "（嘶，嘶嘶……）"
33140-13 = "以「太古的教義」為基礎製作的，失敗作……？意思是那個人偶，失敗了嗎？"
33140-14 = "（搖頭）"
33140-15 = "（嘶，嘶嘶，嘶──，嘶嘶……）"
33140-16 = "不太清楚複雜的事……雖然是失敗作，不過依舊是「戰術兵器」？"
33140-17 = "那就好……差不多是曝光的時候了吧？不管是「優斯提娜聖徒會」，還是這個「戰術兵器」，還有我們的下一個目標。"
33140-22 = "……不管如何，已經太遲了。"
33140-23 = "聯絡待機中的部隊。"
33140-24 = "接下來，開始對三一的進攻。"
33140-26 = "三一自治區．被捨棄的遺跡地帶"
33140-31 = "三一自治區．地下墓穴"
33140-36 = "三一自治區．地下水路"
33140-41 = "好，那麼下令──"
33140-42 = "……"
33140-43 = "隊長？"
33140-44 = "怎，怎麼了嗎？"
33140-45 = "……我們離開這裡的時間，大概有多久？"
33140-46 = "3小時左右，應該吧……"
33140-47 = "……"
33140-48 = "……那傢伙在這裡。"
33140-50 = "那傢伙？"
33140-51 = "（嘶，嘶嘶……）"
33140-52 = "梓，梓醬，嗎？"
33140-56 = "噫，噫噫噫噫噫噫！？"
33140-57 = "詭雷，什麼時候……！？"
33140-58 = "啊，這，這裡也有！？"
33140-62 = "……！！"
33140-68 = "別動！！"
33140-69 = "……！"
33140-70 = "！！"
33140-71 = "……"
33140-72 = "這個攻擊的目的是讓我們動搖。為了攻擊我們的空檔。"
33140-73 = "還是老樣子，只有這種手法很厲害。然而只要冷靜對應的話……"
33140-77 = "不對這個感覺，恐怕周圍還有唷！？不趕快出去的話……！"
33140-81 = "日和！"
33140-85 = "呃……！"
33140-86 = "很，很痛苦呢，很痛呢……為什麼人生，這麼的……"
33140-91 = "……"
33140-92 = "……"
33140-93 = "……"
33140-94 = "很明顯先盯上日和了。從狙擊手開始處理就代表……"
33140-95 = "……打算進行近接戰嗎？"
33140-99 = "（喀擦）"
33140-100 = "！！"
33140-102 = "上方，手榴彈！"
33140-106 = "白洲梓！！"
33140-113 = "休想跑！！"
33140-114 = "隊長。追上去的話，就正中下懷……"
33140-118 = "……嘛，沒辦法嗎。公主，日和的狀態呢？"
33140-119 = "（嘶，嘶嘶，嘶……）"
33140-120 = "是嗎。"
33140-121 = "（嘶嘶，嘶……）"
33140-122 = "……會變成長期戰？嘛，梓是認真的話確實……"
33140-129 = "……隊長的槍聲。追上了嗎。"
33140-133 = "……"
33140-134 = "沒辦法。我們也走吧，公主。"
33140-135 = "……"
33140-140 = "那邊嗎！！"
33140-144 = "判斷不錯啊，梓！！憑妳從正面是贏不了我的！"
33140-145 = "只能像那樣逃跑……"
33140-149 = "瞄準我的空檔吧！！"
33140-151 = "哈啊，哈啊……彎過轉角，下一個……！"
33140-158 = "！？"
33140-159 = "（喀擦）"
33140-163 = "……！"
33140-164 = "……"
33140-165 = "敦子……"
33140-166 = "（嘶，嘶嘶……）"
33140-167 = "……我拒絕。"
33140-172 = "（哐哐哐哐哐哐哐！！！）"
33140-173 = "……！？"
33140-177 = "梓！！"
33140-178 = "等等，隊長。這樣下去沒完沒了。"
33140-179 = "叫優斯提娜聖徒會來吧？"
33140-180 = "……"
33140-181 = "（搖頭）"
33140-182 = "聖徒會，只會介入三一和格黑娜的紛爭……而且梓她，有被解釋為不屬於三一學生的可能性。"
33140-183 = "……哼嗯，真是麻煩的構造呢。"
33140-184 = "（點頭）"
33140-185 = "不只這樣，如果梓被解釋為「奧利斯小隊」的話……"
33140-186 = "……嘛，到頭來戒律也是取決於如何解釋呢。#n這本來就是透過那種方法獲得的力量，有制約和懲戒或許也是理所當然的。"
33140-187 = "啊啊。正因如此，只能這麼做了。"
33140-188 = "那傢伙的戰鬥方式、思考方式……那些基本上全都是我教的。只有我才能打倒她。"
33140-189 = "追上去吧。"
33140-193 = "……那我從反方向。公主請走其他路吧。"
33140-194 = "……"
33140-195 = "（喀喀喀喀喀喀喀……）"
33140-196 = "這是什麼，地震……？不，難道……"
33140-197 = "要把這一層，整個都……？"
33140-198 = "（哐啷啷啷啷……！）"
33140-199 = "呃，什麼時候做了這種……！糟了，上面一層要崩塌了。快跑！"
33140-201 = "（咚哐哐哐哐哐哐哐哐哐哐！！！）"
33140-203 = "咳咳，咳咳……啊……"
33140-204 = "動彈不得呢，這個……"
33140-205 = "梓────！！！"
33140-210 = "……咳咳。"
33140-228 = "[ruby=Checkmate]到此為止了[/ruby]，梓。"
33140-229 = "……呃。"
33140-232 = "……以妳來說做得不錯了。不過還是沒用的。妳的行動方式、思考，這些我從一開始全都看穿了……"
33140-233 = "從一開始，就是無謂的抵抗啊。"
33140-234 = "從什麼時候開始……？"
33140-235 = "？"
33140-238 = "奧利斯從什麼時候開始，有巡航導彈這種東西了……？"
33140-239 = "還有從什麼時候開始，變得可以操縱那種不可思議的力量了……？"
33140-240 = "……「破壞光環的炸彈」也是。"
33140-241 = "到底，是從什麼時候……"
33140-244 = "……"
33140-245 = "梓，知道妳為什麼贏不了嗎？"
33140-246 = "因為軟弱。"
33140-247 = "……"
33140-248 = "妳認為什麼會讓人變成「殺人兇手」？"
33140-249 = "那就是「殺意」的存在與否。"
33140-251 = "在聖典出現的最初的「殺人兇手」，聽說只用了一顆石頭就殺了人。"
33140-252 = "就是那麼回事啊，梓。只要有意志的話，就和道具沒關係。重要的只有注入其中的「意志」而已。"
33140-253 = "包含導彈，除此之外的所有手段，都只是證明我們怨恨的道具……沒有那之上，那之下的意義。"
33140-256 = "沙織……"
33140-257 = "我再問一次，「從什麼時候開始」的？"
33140-258 = "……！？"
33140-259 = "那股怨恨，我那時候只是在那邊「學習」而已……那股怨恨，到底是誰的──"
33140-260 = "徒勞。"
33140-265 = "真軟弱啊，白洲梓。正是那份軟弱在束縛著妳。"
33140-269 = "沒錯，就像即使在這種狀況下也不打算鬆手的那個玩偶一樣。"
33140-270 = "！！"
33140-271 = "第一次從朋友收到的禮物，嗎？"
33140-273 = "真是徒勞啊。"
33140-320 = "徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞"
33140-354 = "徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞"
33140-387 = "徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞，徒勞"
33140-388 = "咕，啊啊啊！？"
33140-389 = "真是徒勞啊，梓。"
33140-390 = "友情嗎……那就從那個沒用又徒勞的東西開始破壞吧。記得是，日步美嗎？"
33140-395 = "（搖頭）"
33140-396 = "……公主。"
33140-397 = "……不用擔心，我有手下留情。這傢伙的話，應該十分清──"
33140-407 = "梓，又打算逃跑嗎！"
33140-412 = "……"
33140-413 = "……還是一樣逃跑得很快。"
33140-417 = "算了，反正那傢伙還會再來。"
33140-418 = "……？"
33140-424 = "因為，弄掉了這個重要的「友情的證明」啊。"
33140-425 = "……"
33140-426 = "那傢伙肯定，會來取回這個的吧。"
33140-427 = "（嘶，嘶嘶……）"
33140-428 = "……在黑暗中找到光芒的蟲子，已經沒有那個就活不下去了。"
33140-429 = "這種無聊的東西，就是支撐梓內心的[ruby=希望]光芒[/ruby]吧。"
33140-430 = "那傢伙不會放棄這個，絕對會回來的。"
33140-431 = "那時候再抓住她，重新告訴她這個世界的真相。"
33140-433 = "沒錯，就算是採取強硬的手段……"
33140-438 = "……嗯？"
33140-439 = "什麼，裡面……"
33140-446 = "……！！"
33140-447 = "這是，襲擊聖亞時交給她的……！"
33140-448 = "快逃，公主！！！"
33140-449 = "……！"
33140-461 = "……"
33140-462 = "…………"
33140-463 = "嗚……"
33140-464 = "嗚，嗚嗚……"
33140-465 = "對不起，日步美……對不起……"
33140-466 = "我……這樣就，再也……嗚，嗚嗚……"
33140-468 = "對不起，對不起，大家……嗚，嗚嗚嗚……！！啊啊啊……！！！"
33140-471 = "下一話;對第五項古則的回答"

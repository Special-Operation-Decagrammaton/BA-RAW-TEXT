[translation]
33140-1 = "第14話;暗闇の中で"
33140-5 = "ウォォォォォォン――――"
33140-10 = "か、確認しました……あれが、例の……。"
33140-11 = "「戦術兵器」か……ただの化け物だな。"
33140-12 = "（スッ、ススッ……）"
33140-13 = "「太古の教義」をもとに作られた、失敗作……？あの人形、失敗したってこと？"
33140-14 = "（ふるふる）"
33140-15 = "（スッ、ススッ、スーッ、ススッ……）"
33140-16 = "難しいことはよく分からないけど……失敗作ではありつつも、「戦術兵器」であることに違いは無い？"
33140-17 = "なら良いけど……そろそろバレる頃合いじゃないの？「ユスティナ聖徒会」にせよ、この「戦術兵器」にせよ、それから私たちの次の目標にせよ。"
33140-22 = "……どのみち、もう手遅れだ。"
33140-23 = "待機中の部隊に連絡を。"
33140-24 = "これより、トリニティへの進撃を開始する。"
33140-26 = "トリニティ自治区・捨てられた遺跡地帯"
33140-31 = "トリニティ自治区・カタコンベ"
33140-36 = "トリニティ自治区・地下水路"
33140-41 = "よし、では命令を――"
33140-42 = "……。"
33140-43 = "リーダー？"
33140-44 = "ど、どうかされましたか？"
33140-45 = "……私たちがここを空けていたのは、どれくらいだ？"
33140-46 = "3時間くらい、ですかね……。"
33140-47 = "……。"
33140-48 = "……あいつがいる。"
33140-50 = "あいつ？"
33140-51 = "（スッ、ススッ……）"
33140-52 = "あ、アズサちゃん、ですか？"
33140-56 = "ひっ、ひいいいぃぃっ！？"
33140-57 = "ブービートラップ、いつの間に……！？"
33140-58 = "あ、こっ、こっちにも！？"
33140-62 = "……！！"
33140-68 = "動くなっ！！"
33140-69 = "……っ！"
33140-70 = "！！"
33140-71 = "……。"
33140-72 = "この狙いは私たちの動揺だ。私たちの隙を突くためのもの。"
33140-73 = "相変わらず、そういう手法だけは上手い。しかし逆に冷静に対処すれば……"
33140-77 = "いえこの感じ、恐らくまだ周囲にもありますよ！？早く出ないと……！"
33140-81 = "ヒヨリ！"
33140-85 = "くっ……！"
33140-86 = "く、苦しいですね、痛いですね……どうして人生は、こんなに……"
33140-91 = "……。"
33140-92 = "……。"
33140-93 = "……。"
33140-94 = "明らかにヒヨリから狙った。狙撃手から処理したってことは……。"
33140-95 = "……接近戦に持ち込む気か？"
33140-99 = "（ガチャッ）"
33140-100 = "！！"
33140-102 = "上っ、手榴弾！"
33140-106 = "[ruby=しらす]白洲[/ruby]アズサっ！！"
33140-113 = "逃がすか！！"
33140-114 = "リーダー。追いかけたら、それこそ思う壺……"
33140-118 = "……まあ、仕方ないか。姫、ヒヨリの状態は？"
33140-119 = "（スッ、ススッ、スーッ……）"
33140-120 = "そっか。"
33140-121 = "（ススッ、スッ……）"
33140-122 = "……長期戦になる？まあ、アズサが本気になったら確かに……"
33140-129 = "……リーダーの銃声。追いついたかな。"
33140-133 = "……。"
33140-134 = "仕方ない。私たちも行こう、姫。"
33140-135 = "……。"
33140-140 = "そっちか！！"
33140-144 = "判断は悪くないな、アズサ！お前では正面から私に勝てない！"
33140-145 = "そうやって逃げて……"
33140-149 = "私の隙を狙うしかないだろうっ！！"
33140-151 = "はぁっ、はぁっ……角を曲がって、次……！"
33140-158 = "っ！？"
33140-159 = "（カチャッ）"
33140-163 = "……っ！"
33140-164 = "……。"
33140-165 = "アツコ……。"
33140-166 = "（スッ、ススッ……）"
33140-167 = "……断る。"
33140-172 = "ドカアアァァァン！！！"
33140-173 = "……！？"
33140-177 = "アズサっ！！"
33140-178 = "待って、リーダー。このままじゃキリがない。"
33140-179 = "ユスティナ聖徒会を呼んだら？"
33140-180 = "……。"
33140-181 = "（ふるふる）"
33140-182 = "聖徒会は、トリニティとゲヘナの紛争にしか介入しない……それにアズサは、トリニティの生徒ではないと解釈される可能性もある。"
33140-183 = "……ふうん、結構面倒な構造だね。"
33140-184 = "（こくこく）"
33140-185 = "それどころか、アズサが「アリウススクワッドだ」と解釈されたら……"
33140-186 = "……まあ、戒律も結局は解釈次第ってことだね。確かに元々そうやって手に入れた力だし、制約やらペナルティがあるのも当然かもしれない。"
33140-187 = "ああ。だからこそ、こうするしかない。"
33140-188 = "あいつの戦い方、考え方……それらは全て基本的に、私が教えたものだ。私じゃないと倒せない。"
33140-189 = "追うぞ。"
33140-193 = "……じゃあ、私は反対の方から。姫は他の道からよろしく。"
33140-194 = "……。"
33140-195 = "（ゴゴゴゴゴゴゴ……）"
33140-196 = "何これ、地震……？いや、まさか……"
33140-197 = "このフロア、全体に……？"
33140-198 = "ゴゴゴゴゴ……！"
33140-199 = "くっ、いつの間にこんな……！まずい、上の階が崩れる。走って！"
33140-201 = "ドカアアアアアァァァァァン！！！"
33140-203 = "げほっ、げほっ……あー……。"
33140-204 = "動けないな、これ……。"
33140-205 = "アズサあああぁぁっ！！！"
33140-210 = "……げほっ。"
33140-228 = "チェックメイトだ、アズサ。"
33140-229 = "……くっ。"
33140-232 = "……お前にしては良くやった。それでも無駄だ。お前の考え方、思考、それらは最初から全てお見通し……。"
33140-233 = "最初から、無駄な抵抗だったんだよ。"
33140-234 = "いつから……？"
33140-235 = "？"
33140-238 = "いつからアリウスは、巡航ミサイルなんて物を……？"
33140-239 = "それにいつの間に、あんな不思議な力を操れるようになったんだ……？"
33140-240 = "……「ヘイローを壊す爆弾」も。"
33140-241 = "一体、いつから……。"
33140-244 = "……。"
33140-245 = "アズサ、どうしてお前が勝てないのか分かるか？"
33140-246 = "弱いからだ。"
33140-247 = "……。"
33140-248 = "何が人を「人殺し」にすると思う？"
33140-249 = "それは「殺意」の有無。"
33140-251 = "経典に出てくる最初の「人殺し」は、たったひとつの石ころで人を殺めたそうだ。"
33140-252 = "そういうことなんだよ、アズサ。意志さえあれば、道具は関係ない。重要なのはただそこに込められた「意志」だけ。"
33140-253 = "ミサイルを含め、それ以外の手段や何やらは、私たちの恨みを証明する道具でしかない……それ以上でも、それ以下でも無いのさ。"
33140-256 = "サオリ……"
33140-257 = "もう一度聞く、「いつから」だ？"
33140-258 = "……！？"
33140-259 = "その恨み、私はあの時ただあそこで「習った」だけだ……その恨みは、一体誰の――"
33140-260 = "虚しい。"
33140-265 = "弱いな、白洲アズサ。その弱さはお前を縛り付けているんだ。"
33140-269 = "そう、こんな状況でも離そうとしないその人形のように。"
33140-270 = "！！"
33140-271 = "初めてお友達がくれたプレゼント、か？"
33140-273 = "虚しいな。"
33140-320 = "虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい"
33140-354 = "虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい"
33140-387 = "虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい、虚しい"
33140-388 = "ぐっ、あぁぁっ！？"
33140-389 = "虚しいな、アズサ。"
33140-390 = "友情か……ならばその無駄で虚しいものから壊してやろう。たしかヒフミ、だったか？"
33140-395 = "（ふるふる）"
33140-396 = "……姫。"
33140-397 = "……心配しなくても、手加減はしてる。こいつのことなら、よく分かって――"
33140-407 = "アズサ、また逃げるのか！"
33140-412 = "……。"
33140-413 = "……相変わらず逃げ足の速い。"
33140-417 = "まあ良い、どうせあいつはまたやって来る。"
33140-418 = "……？"
33140-424 = "なにせ、この大事な「友情の証」とやらを落としていってしまったからな。"
33140-425 = "……。"
33140-426 = "あいつは必ず、これを取り戻しに来るだろう。"
33140-427 = "（スッ、ススッ……）"
33140-428 = "……闇の中で光を見つけた虫は、もうそれ無しでは生きられない。"
33140-429 = "こんなつまらない物が、アズサの心を支える[ruby=希望]光[/ruby]なんだろう。"
33140-430 = "あいつはこれを諦められない、絶対に戻ってくる。"
33140-431 = "その時にまた捕まえて、あらためてこの世界の真実を教えてやる。"
33140-433 = "そう、無理やりにでも……"
33140-438 = "……ん？"
33140-439 = "何だ、中に……"
33140-446 = "……っ！！"
33140-447 = "これは、セイア襲撃の時に渡した……！"
33140-448 = "逃げろ、姫っ！！！"
33140-449 = "……っ！"
33140-461 = "……。"
33140-462 = "…………。"
33140-463 = "うっ……。"
33140-464 = "うっ、ううっ……。"
33140-465 = "ごめん、ヒフミ……ごめん……。"
33140-466 = "私は……もうこれで、二度と……うっ、ううっ……。"
33140-468 = "ごめん、ごめん、みんな……うっ、うぅぅっ……！！ああぁっ……！！！"
33140-471 = "次回;五つ目の古則への答え"

[translation]
51250-1 = "ตอนที่ 25;แด่คุณตอนนี้"
51250-13 = "อึก..."
51250-14 = "...หนีไปแล้วเหรอ"
51250-15 = "เมื่อกี้มันอะไรกันน่ะ? วินาทีที่ฉีกหนังสือที่มีอยู่..."
51250-17 = "ก็เกิดเสียงกึกก้องจนข้าอกสั่นขวัญหายเลยเจ้าค่ะ...!"
51250-18 = "[s] \"นั่นอาจเป็นรูปแบบหนึ่งของตำนานร้อยเรื่องราวก็ได้...\""
51250-19 = "อืม... จะให้ตามไปตอนนี้ก็ไม่ทันแล้ว..."
51250-20 = "มีแต่เรื่องแปลกๆ ไม่จบสิ้นเลย! ชมรมความงามของธรรมชาติเป็นชมรมที่ทำอะไรกันแน่น่ะ?"
51250-21 = "[s1] \"ตอนนี้ไปทำแผลกันก่อนเถอะ!\"\n[s2] \"ทุกคนเป็นยังไงบ้าง? บาดเจ็บตรงไหนรึเปล่า?\""
51250-26 = "อืม ฉันไม่เป็นไร ยูคาริล่ะ?"
51250-27 = "ข้าแข็งแรงขนาดนี้ ไม่เป็นไรอยู่แล้วเจ้าค่ะ!"
51250-28 = "[s] \"คิเคียวกับนางุสะล่ะ...\""
51250-34 = "......"
51250-35 = "......"
51250-37 = "อืมม..."
51250-43 = "รุ่นพี่นางุสะ... ที่พูดไปเมื่อกี้น่ะ..."
51250-47 = "อ่า... อืม..."
51250-51 = "...ไม่หรอก ไม่มีอะไร"
51250-52 = "......อืม......"
51250-57 = "......"
51250-58 = "[s] \"......\""
51250-62 = "(กระซิบกระซาบ) คุณครู การที่คนที่เกี่ยวข้องอย่างฉันจะพูดเองจากปากมันก็กระไรอยู่"
51250-63 = "(กระซิบกระซาบ) แต่ว่า... บรรยากาศระหว่างสองคนนั้นมันแปลกๆ นะว่าไหม?"
51250-64 = "[s] \"(กระซิบ) ตั้งใจจะไม่พูดออกไป แต่เผลอพูดไปงั้นเหรอ?!\""
51250-65 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ!"
51250-66 = "ถึงเราจะกำจัดต้นตอของเรื่องนี้ไม่ได้... แต่เธอก็หนีหัวซุกหัวซุนไปแล้ว!"
51250-67 = "ต่อให้เรายังไม่เจอกับแฮปปี้เอนดิ้ง แต่ยังไงบรรยากาศมันก็ควรจะดีกว่านี้ไม่ใช่เหรอ...!"
51250-68 = "ฉันยืนอยู่ตรงนี้ต่อไปไม่ไหวหรอกนะ... คุณครูช่วยทำอะไรสักอย่างทีสิ...!"
51250-69 = "[s] \"แต่ถึงจะพูดอย่างนั้น ครูก็ไม่มีวิธี...\""
51250-75 = "ฮึ่มม"
51250-76 = "รุ่นพี่นางุสะ รุ่นพี่คิเคียว รุ่นพี่เรนเกะ และท่านอาจารย์ด้วยเจ้าค่ะ"
51250-82 = "[ns] \"ยูคาริ?\""
51250-87 = "ตลอดวันนี้ข้าเจอเหตุการณ์มานับไม่ถ้วนจริงๆ เจ้าค่ะ"
51250-88 = "ข้าทำให้คนอื่นต้องลำบาก... แต่ก็ยังได้รับความช่วยเหลือ ข้าก็เลยมาถึงจุดนี้ได้"
51250-89 = "ข้าโชคดีเหลือเกินเจ้าค่ะ... โชคดีเหลือเกินที่ได้มาเจอคนอื่นๆ ได้อีกครั้งแบบนี้"
51250-90 = "ต้องขอบคุณทุกคนมากเลยนะเจ้าคะ"
51250-95 = "ไม่หรอก ยูคาริ พวกเราต้องเป็นคนพูดแบบนั้นต่างหาก..."
51250-96 = "ต้องขอบคุณยูคาริมากกว่าที่ไม่ยอมแพ้และอยู่เคียงข้างเราจนนาทีสุดท้าย"
51250-97 = "ยูคาริ... ฉันก็..."
51250-98 = "[s] \"อืม ทั้งหมดนี้เป็นเพราะทุกคนพยายามด้วยกันน่ะ\""
51250-103 = "เจ้าค่ะ ยิ่งกว่านั้นคือเราได้มารวมตัวกันอีกครั้งนะเจ้าคะ"
51250-104 = "ข้ามีเรื่องที่อยากบอกรุ่นพี่นางุสะต่อหน้าทุกคนเจ้าค่ะ!"
51250-112 = "ข้า ยูคาริ... จะประกาศศึกชิงตำแหน่งต่อรุ่นพี่นางุสะเจ้าค่ะ!"
51250-116 = "[ns] \"หา......?\""
51250-121 = "ว่าไงนะ?! จะท้าสู้ในศึกชิงตำแหน่งในจังหวะนี้เนี่ยนะ?!"
51250-122 = "เจ้าค่ะ! ข้าต้องทำเรื่องที่ตั้งใจไว้ให้เสร็จสิเจ้าคะ!"
51250-123 = "รุ่นพี่เรนเกะกับรุ่นพี่คิเคียวก็คงยังไม่ลืมใช่ไหมเจ้าคะ ว่าข้าจะประกาศศึกชิงตำแหน่งต่อรุ่นพี่นางุสะ#nมาตั้งแต่ต้นแล้ว!"
51250-124 = "อ่า... ก็ยังจำได้อยู่ แต่ว่า..."
51250-125 = "[s] \"แต่ถึงเปิดศึกชิงตำแหน่งตอนนี้ แต่นางุสะก็...\""
51250-131 = "ก็ได้ เข้าใจแล้ว"
51250-133 = "จริงเหรอ?!"
51250-134 = "...รุ่นพี่?"
51250-136 = "เรื่องที่ตั้งใจไว้ ต้องทำให้สำเร็จสิ"
51250-140 = "โกเรียว นางุสะ รักษาการหัวหน้าคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน"
51250-141 = "ตอบรับการท้าศึกชิงตำแหน่งจากผู้ท้าชิง คาเดโนะโคจิ ยูคาริ"
51250-145 = "...เจ้าค่ะ!"
51250-155 = "[ns] \"ถ้างั้นก็... เริ่มได้!\""
51250-172 = "อ๊ายยย?!"
51250-177 = "[ns] \"อ่า... ผู้ชนะคือ... รักษาการหัวหน้าเฮียกกะเรียวรัน โกเรียว นางุสะ!\""
51250-179 = "โห... รู้ผลแพ้ชนะแค่ในพริบตาเดียวเลย"
51250-180 = "...แต่ยังไงก็ต้องออกมาเป็นอย่างนี้อยู่แล้วละ ก็ฝ่ายตรงข้ามเป็นรุ่นพี่นางุสะทั้งคน"
51250-185 = "...หรือว่า ฉันทำอะไรผิดไป?"
51250-186 = "[s3] \"ไม่หรอก เรื่องการต่อสู้ก็ต้องเย็นชาแบบนี้ละ\"\n[s4] \"ยูคาริก็อย่าผิดหวังให้มากนะ...\""
51250-194 = "ยูคาริ! ฟื้นคืนชีพแล้วเจ้าค่ะ!"
51250-195 = "[s] \"ไม่ผิดหวังเลยสินะ แม่หนูคนนี้!\""
51250-196 = "เจ้าคะ? ผิดหวังเหรอ?"
51250-197 = "ฮุฮุ ท่านอาจารย์ พูดอะไรอย่างนั้นกันเจ้าคะ"
51250-198 = "ข้าท้าสู้และต่อสู้ด้วยพลังทั้งหมดที่มี และพ่ายแพ้อย่างราบคาบ"
51250-199 = "นี่แหละเจ้าค่ะศึกต่อสู้ที่สมบูรณ์แบบ ไม่มีเหตุผลอะไรที่ข้าจะไม่ยอมรับหรือผิดหวังหรอกเจ้าค่ะ"
51250-200 = "เป็นผลการแข่งขันที่แน่นอนอยู่แล้วเจ้าค่ะ!"
51250-201 = "ศึกครั้งนี้เป็นการตรวจสอบให้มั่นใจอีกครั้งว่ารุ่นพี่นางุสะเป็นคนที่ข้าเคารพเจ้าค่ะ!"
51250-202 = "งะ... งั้นเหรอ...?"
51250-203 = "เจ้าค่ะ!"
51250-206 = "ถ้างั้นก็... ดีแล้วละนะ... จะว่ายังไงดี"
51250-207 = "สมกับเป็นเธอจริงๆ เลยนะ ยูคาริ"
51250-208 = "[s] \"อืม จริงด้วยสินะ\""
51250-210 = "แหะๆๆ! เอาละ อย่ามัวเสียเวลาอยู่เลย! กลับไปด้วยกันเถอะเจ้าค่ะ!"
51250-217 = "กลับเฮียกกะเรียวรัน..."
51250-218 = "กลับบ้านของเรากันเจ้าค่ะ!"
51250-229 = "ตอนต่อไป;ด้วยความปรารถนา"

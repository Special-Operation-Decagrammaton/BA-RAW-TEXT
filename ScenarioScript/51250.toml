51250-131 = "Okay. I accept."
51250-133 = "Really?!"
51250-134 = "...Nagusa?"
51250-136 = "As Yukari said, endings are important."
51250-140 = "The acting president of the Hyakkaryouran Resolution Council, Goryou Nagusa..."
51250-141 = "...accepts the succession contest from challenger Kadenokouji Yukari."
51250-145 = "Understood!"
51250-155 = "[ns] \"Now then... Begin!\""
51250-172 = "Gyaaah?!"
51250-177 = "[ns] \"Um, the winner is...acting president of Hyakkaryouran, Goryou Nagusa!\""
51250-179 = "Well. That took care of that."
51250-180 = "A resounding defeat. Not that we expected otherwise. "

51250-75 = "Ahem."
51250-76 = "Nagusa, Kikyou, Renge, and Sensei."
51250-82 = "[ns] \"Yes, Yukari?\""
51250-87 = "A series of very complicated events led us to this present moment."
51250-88 = "It truly took a village, but owing to the assistance of all involved, we've arrived at the ending. "
51250-89 = "I am indeed...very lucky to witness everyone gathered together like this once again."
51250-90 = "From the very bottom of my heart, I wish to express my gratitude. For everything."
51250-95 = "No, Yukari. More accurately..."
51250-96 = "You brought us here. You never gave up on us."
51250-97 = "...Yukari, I..."
51250-98 = "[s] \"It was a collective effort.\""
51250-103 = "Yes! We've all come together at last."
51250-104 = "Therefore, I have an announcement to make."
51250-112 = "I, Yukari, challenge Nagusa to a succession contest!"
51250-116 = "[ns] \"...What?\""
51250-121 = "Do you really think this is the time and place for that?!"
51250-122 = "Every story requires a conclusion, does it not?"
51250-123 = "This was the original motive behind our adventure, after all. I traveled down this path seeking but one goal: challenge Nagusa!"
51250-124 = "You're not incorrect...however..."

[translation]
51250-1 = "第25話;現在，向你"
51250-13 = "唔…………"
51250-14 = "……被他逃走了。"
51250-15 = "剛才那是怎麼回事？#n在他把書撕掉的那一刻………"
51250-17 = "發出了一聲巨響，真是嚇死我了……！"
51250-18 = "[s]「或許那也是百物語的一種……」"
51250-19 = "唔嗯，看來是追不上他了……"
51250-20 = "話說他也太多奇奇怪怪的東西了吧！#n花鳥風月部到底是做什麼的啊？"
51250-21 = "[s1]「現在暫且先療傷吧！」\n[s2]「大家還好嗎？有沒有受傷？」"
51250-26 = "嗯，我沒事。紫呢？"
51250-27 = "小女子完全沒問題！"
51250-28 = "[s]「桔梗和名草呢……」"
51250-34 = "……"
51250-35 = "……"
51250-37 = "那個……"
51250-43 = "名草前輩……你剛才說的那些……"
51250-47 = "啊，嗯…… "
51250-51 = "……沒什麼，當我沒說。"
51250-52 = "…………這樣啊。"
51250-57 = "…………"
51250-58 = "[s] 「…………」"
51250-62 = "（竊竊私語）老師，雖然我身為當事人之一，現在說這種話好像有點不太適合……"
51250-63 = "（竊竊私語）但老師不覺得那兩個人……現在的氣氛尷尬到不行嗎？"
51250-64 = "[s]「（竊竊私語）你怎麼講出來了！？」"
51250-65 = "可，可是！"
51250-66 = "雖然沒能打倒元兇……呃，雖然被他逃走了！"
51250-67 = "可能算不上是圓滿的結局沒錯……！#n但我們是不是差不多該回去了……"
51250-68 = "總不能一直站在這裡……老師你想想辦法吧……！"
51250-69 = "[s]「呃，就算你這麼說……」"
51250-75 = "咳哼。"
51250-76 = "名草前輩，桔梗前輩，蓮華前輩，還有老師。"
51250-82 = "[ns]「紫？」"
51250-87 = "今天一天真的發生了非常非常多事。"
51250-88 = "造成了很多人的麻煩……不過多虧有大家的幫助，小女子才能走到現在這一步。"
51250-89 = "能再次見到大家……我真的覺得自己非常幸運。"
51250-90 = "也覺得……非常感謝。"
51250-95 = "別這麼說，紫。#n我反而認為……"
51250-96 = "更值得感謝的，是直到最後都沒有放棄的紫才對。"
51250-97 = "紫……我才應該向你……"
51250-98 = "[s]「嗯，這都多虧了大家的努力。」"
51250-103 = "是啊，難得能像這樣和各位重聚……"
51250-104 = "小女子我，有句話想在大家面前告訴名草前輩！"
51250-112 = "我……要向名草前輩申請繼承戰！"
51250-116 = "[ns]「…………咦？」"
51250-121 = "啊！？要在這種時候進行繼承戰！？"
51250-122 = "沒錯！因為做個了結是很重要的！"
51250-123 = "蓮華前輩和桔梗前輩也沒忘記吧！#n我本來就是為了向名草前輩申請繼承戰才會來這裡的！"
51250-124 = "確實……是這樣沒錯……"
51250-125 = "[s]「但突然說要進行繼承戰，名草他也……」"
51250-131 = "好吧，我知道了。"
51250-133 = "真的嗎！？"
51250-134 = "……前輩？"
51250-136 = "畢竟做個了結很重要。"
51250-140 = "百花繚亂紛爭調停委員會委員長代理．御稜名草……"
51250-141 = "接受挑戰者勘解由小路紫的繼承戰申請。"
51250-145 = "……是！"
51250-155 = "[ns]「那麼……開始！」"
51250-172 = "哇啊啊啊！？"
51250-177 = "[ns]「啊……勝利者是……百花繚亂委員長代理．御稜名草！」"
51250-179 = "哇，一轉眼就分出勝負了。"
51250-180 = "雖然多少有所預期……#n畢竟對手是名草前輩，出現這種結果也是理所當然的吧。"
51250-185 = "……咦，我是不是太不會看氣氛了？"
51250-186 = "[s3]「不，勝負的世界本來就是殘酷的。」\n[s4]「所以紫也別太失望……」"
51250-194 = "紫！復活！"
51250-195 = "[s]「原來根本沒失望啊！」"
51250-196 = "咦？失望？"
51250-197 = "呵呵，老師您怎麼這麼說呢。"
51250-198 = "拿出自己的全力挑戰而落敗──"
51250-199 = "這才是完美的勝負結果。#n小女子沒理由不接受。"
51250-200 = "沒錯，這就是理所當然的結果！"
51250-201 = "不過小女子通過這次的戰鬥，再次確認了名草前輩果然是我尊敬的前輩！"
51250-202 = "是，是嗎……？"
51250-203 = "是！"
51250-206 = "那真是太好了……該怎麼說呢。"
51250-207 = "真像紫會說的話。"
51250-208 = "[s]「就是說啊。」"
51250-210 = "耶嘿嘿！那就先聊到這邊，我們趕緊回去吧！"
51250-217 = "回到百花繚亂…… "
51250-218 = "回到我們的家！"
51250-229 = "下一話;帶著願望"

[translation]
21195-3 = "千年．舊校舍走廊"
21195-4 = "哈啊，哈啊……"
21195-5 = "總，總算是逃出來了？"
21195-6 = "接，接下來該怎麼辦……？"
21195-7 = "千年大賞的展出也結束了……"
21195-8 = "總之在結果出來之前，就這樣逃下去吧！"
21195-9 = "你們以為能跑的掉嗎？"
21195-10 = "！？"
21195-12 = "（噠噠噠！）"
21195-13 = "呀啊！？"
21195-14 = "綠！"
21195-18 = "……"
21195-19 = "原來如此。"
21195-20 = "怪不得能接連做出正確的判斷。"
21195-21 = "剛才指揮這些小不點的，和襲擊千年的扣押品保管所的，"
21195-22 = "原來都是你呀。"
21195-23 = "老師……這樣稱呼對嗎？"
21195-24 = "你就是朱音的調查裡提到的那個「老師」……看來傳聞並不誇張呢……"
21195-25 = "[s1] 「你有什麼事嗎？是要復仇？」\n[s2] 「你說小不點，你的身高不是跟這些孩子差不多嗎……？」"
21195-26 = "哼！我怎麼可能是為了那種無聊的理由來的。"
21195-27 = "硬要說的話……那個，額頭露出來的那位。"
21195-28 = "那個時候你竟敢騙我啊……？"
21195-29 = "噫……！我，我很抱歉！"
21195-30 = "真有一套啊，我欣賞你。"
21195-31 = "……咦？"
21195-32 = "竟然能裝成害怕的樣子，一邊發抖一邊騙過我。真是了不起的演技。"
21195-33 = "（我想害怕應該不是演技的一部分……吧）"
21195-34 = "不過這都無所謂……那邊那個像笨蛋一樣拿著大型武器的那位。"
21195-35 = "才沒有那種事咧！我可是三年級啊！？#n要不要告訴你提到我身高的傢伙最後都有什麼下場啊！？"
21195-36 = "冷靜點，隊長。"
21195-37 = "這種感覺真是新鮮呢。沒想到竟然還有人敢在寧瑠前輩面前提到身高。"
21195-38 = "呼，呼……"
21195-39 = "差點就失去冷靜了……算了，這種事無所謂。#n喂！那個拿著不知道在大什麼的武器的那位。"
21195-41 = "（東張西望）"
21195-42 = "就是在說你啊，你！"
21195-43 = "是在說愛麗絲嗎？"
21195-44 = "沒錯，就是找你有事。"
21195-45 = "就是你讓C&C吃了一發光砲是吧……？"
21195-46 = "給點面子吧。"
21195-48 = "啊，愛麗絲知道這種展開。"
21195-49 = "「對我做出這種事的，你還是第一個唷……」"
21195-50 = "是告白事件呢。小不點女僕已經迷上愛麗絲了。獲得了新的收集要素。"
21195-51 = "開，開什麼玩笑啊你這傢伙！誰是什麼小不點女僕啊！？想被我殺了嗎！？"
21195-52 = "噫……！"
21195-53 = "好，好可怕！！"
21195-55 = "哈啊……"
21195-56 = "可真會惹人生氣啊，不過算了。"
21195-57 = "避免你們誤會還是先告訴你們，這並不是來報之前讓C&C吃了一發光砲的仇。"
21195-58 = "雖然有各種奇怪的地方，但對我們來說，那只不過是正當委託的工作而已。#n你們只是以我們為對手要完成你們的目標罷了。"
21195-59 = "我不會因為這樣就記恨的……只是突然產生了一點興趣而已。"
21195-60 = "興趣……？"
21195-61 = "或者說是確認比較好吧……"
21195-62 = "來，就讓我來當你的對手吧。"
21195-63 = "只要你贏了，我就馬上老老實實地離開。"
21195-64 = "要互相理解的話，這樣最快了吧。怎麼樣，不是什麼很難理解的事吧？"
21195-65 = "……"
21195-66 = "我知道了。"
21195-67 = "哦，看來幹勁滿滿啊。"
21195-68 = "就像是一對一的戰鬥事件……那種感覺對吧，我明白了。"
21195-69 = "事件……你說啥？"
21195-70 = "那個時候空間又窄，又有著要帶著「鏡子」回去的使命……"
21195-71 = "但是現在的話……！"
21195-72 = "我要上了，魔力補充100%……！"
21195-74 = "嘖，這是……！"
21195-75 = "光呀！！"
21195-77 = "（咚哐──！）"
21195-79 = "唔！"
21195-80 = "哇！"
21195-81 = "竟然有這種威力……！"
21195-82 = "能夠把校舍的牆壁，這麼輕鬆的炸飛……！"
21195-85 = "好，好厲害……"
21195-86 = "這種火力，我還是第一次見到……"
21195-87 = "……解決掉了嗎？"
21195-88 = "愛麗絲醬！那句台詞不能隨便說出來的呀！"
21195-89 = "啊，寧瑠前輩是3年級對吧。那我更正一下。"
21195-90 = "請，請問有被解決掉嗎……？"
21195-91 = "不，不是敬語的問題……！"
21195-95 = "[ns] 「還沒結束喔。」"
21195-97 = "（噠噠噠！）"
21195-98 = "嗚啊！？"
21195-101 = "確實是不得了的火力呢……"
21195-102 = "但也就僅此而已。"
21195-104 = "再，再來一次，魔力補充……！"
21195-106 = "太慢了。"
21195-107 = "啊……！"
21195-108 = "（哐！）"
21195-109 = "呀啊！"
21195-111 = "你的武器的確很強，但是從扣下板機到發射為止最少也需要幾秒鐘。"
21195-112 = "同時，因為火力太強的原因，只要被對手接近到一定程度就無法射擊。"
21195-113 = "因為爆炸會把[ruby=你這傢伙]自己[/ruby]也捲進去。"
21195-114 = "再說，能在這種距離下贏過我的傢伙，就算在整個奇普托斯裡也不多……"
21195-115 = "……不，是一個也沒有。"
21195-116 = "嗚……"
21195-117 = "愛麗絲！"
21195-120 = "比想像中還讓人失望啊。那些傢伙居然會被這種程度的人打敗……"
21195-121 = "……"
21195-122 = "（嗡──！）"
21195-123 = "──！"
21195-124 = "把整把槍，揮起來了……？"
21195-125 = "哈，採取近身戰倒是個不錯的判斷……但是。"
21195-128 = "在這個距離，我還是有壓倒性的優勢。"
21195-129 = "就算你想開火，也沒辦法瞄準我吧。"
21195-130 = "……不需要瞄準。"
21195-131 = "我要上了！"
21195-132 = "都說了沒用的……嗯？"
21195-134 = "在這種情況下準備發射……？喂！難道你……！？"
21195-135 = "瞄準的不是我……而是地板！？"
21195-136 = "你瘋了嗎！？就這樣開火的話你自己也會……！"
21195-137 = "光呀！！"
21195-139 = "（咚哐──！）"
21195-141 = "愛麗絲醬！嗚，被煙擋住了視線……！"
21195-142 = "地板幾乎都崩塌了……找到了，愛麗絲！"
21195-143 = "肉，肉體損傷48%……請求撤退！"
21195-145 = "[s] 「讓我來背吧。」"
21195-146 = "拜託你了，請快點！"
21195-147 = "（唦唦唦──）"
21195-149 = "隊長！"
21195-150 = "沒，沒事吧，難道是被這些瓦礫壓在下面了……"
21195-151 = "我剛剛有看到愛麗絲醬一眼，他也受到了不小的傷害。#n現在我們的小小隊長應該也被壓扁……"
21195-153 = "……你說誰小啊！？"
21195-155 = "啊。"
21195-156 = "哇～喔，真不愧是我們的隊長，還活蹦亂跳的呢！"
21195-157 = "你到底是哪邊的隊友啊……！"
21195-158 = "雖然愛麗絲現在沒有戰鬥能力，要直接追上去嗎？#n他的傷勢也不小，應該會往保健室去才對。"
21195-159 = "沒錯，雖然說千年有兩位數以上的保健室……但應該很快就能找到了吧。"
21195-162 = "……"
21195-163 = "…………"
21195-164 = "隊長？"
21195-165 = "……啊啊。"
21195-166 = "不用，已經夠了。我們不追擊，回去吧。"
21195-167 = "畢竟也大鬧了一場，已經很痛快了。"
21195-168 = "……"
21195-169 = "目的也大致達成了。我也懂莉央會對遊戲開發部感興趣的理由了……"
21195-170 = "而且……"
21195-171 = "我知道了！你很在意對吧～在意那個老師！"
21195-172 = "笨……不是！才不是那種原因……！"
21195-173 = "呵呵，我懂這種感覺。但是，有點擔心呢。"
21195-174 = "從那些孩子們的體型來看，老師的喜好恐怕是……"
21195-175 = "至少對隊長來說不是什麼壞消息吧。"
21195-176 = "少囉嗦！再說這些的話就揍飛你們喔！"
21195-177 = "唉……"
21195-180 = "老師，還有遊戲開發部嗎……"
21195-184 = "哈。"
21195-185 = "好好期待吧。把我當作小不點的代價，總有一天會要你還的。"
21195-187 = "……隨心所欲大鬧一番之後肚子餓了呢。吶，來去吃個拉麵之類的吧。"
21195-189 = "聽起來不錯呢。"
21195-190 = "贊成贊成～！"
21195-191 = "……這麼說來隊長還在發育期呢。"
21195-194 = "給我適可而止啊！！"
21195-196 = "下一話;千年大賞"

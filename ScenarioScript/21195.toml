[translation]
21195-3 = "ทางเดินในอาคารเรียนเก่ามิลเลเนียม"
21195-4 = "แฮ่ก แฮ่ก....."
21195-5 = "เราหนีมาพ้นแล้วยังนะ?"
21195-6 = "ทะ... ทีนี้ทำยังไงต่อกันดีล่ะ?"
21195-7 = "ไหนๆ ก็ส่งผลงานเข้าชิงในงานมิลเลเนียมไพรซ์แล้ว"
21195-8 = "เราหนีแบบนี้จนกว่าจะประกาศผลดีกว่า!"
21195-9 = "ไม่ได้หรอกนะ"
21195-10 = "?!"
21195-12 = "(ปังๆๆๆ!)"
21195-13 = "อ๊าาา!"
21195-14 = "มิโดริ!"
21195-18 = "......"
21195-19 = "เป็นอย่างนี้เองเหรอ?"
21195-20 = "ก็ว่าอยู่ว่าทำไมถึงตัดสินใจแบบนี้"
21195-21 = "ทั้งสั่งการเด็กๆ พวกนี้ แล้วก็ที่มาโจมตีคลังของที่ถูกยึดของมิลเลเนียมด้วย"
21195-22 = "เป็นฝีมือคุณเองหรอกเหรอ"
21195-23 = "ต้องเรียกว่ายังไงนะ... ครู... ใช่ไหม?"
21195-24 = "ตัวเอกของ 'ข่าวลือ' ที่อาคาเนะไปสืบหามา... ดูเหมือนว่าข่าวลือจะไม่เกินจริงนะ"
21195-25 = "[s1] \"มาที่นี่เพื่อแก้แค้นเหรอ?\"\n[s2] \"เธอก็เป็นเด็กเหมือนกันนั่นแหละ\""
21195-26 = "เหอะ! ฉันไม่มีทางมาเพราะเหตุผลไร้ค่าแบบนั้นหรอก"
21195-27 = "ถ้าจะถามหาเหตุผลล่ะก็... เฮ้! ยัยคนหัวเหม่งนั่นน่ะ!"
21195-28 = "ต้มฉันซะเปื่อยเลยนะ..."
21195-29 = "เฮือก! ขะ... ขอโทษค่ะ!"
21195-30 = "ต้องชมว่าทำได้ไม่เลวเลย"
21195-31 = "คะ...?"
21195-32 = "หลอกฉันแล้วแกล้งทำเป็นกลัวจนตัวสั่นงั้นเหรอ? เรียนเอกการแสดงได้เลยนะ"
21195-33 = "(ที่กลัวจนตัวสั่นไม่น่าจะใช่การแสดงนะ)"
21195-34 = "แต่ว่า... เด็กที่ถืออาวุธชิ้นใหญ่อยู่ตรงนั้น"
21195-35 = "เด็กที่ไหนกันล่ะ! ฉันอยู่ปี 3 แล้ว! เดี๋ยงสั่งสอนให้ดูเลยว่าคนที่เรียกฉันว่าเด็กจะต้องเจออะไรบ้าง!!"
21195-36 = "ใจเย็นๆ ก่อนหัวหน้า..."
21195-37 = "ไม่เคยเจอแบบนี้เลยนะคะ ไม่คิดว่าจะยังมีใครเรียกรุ่นพี่เนรุว่าเด็กอยู่อีก"
21195-38 = "เฮ้อ... เฮ้อ..."
21195-39 = "เกือบจะเสียฟอร์มแล้วสิ แต่ก็เอาเถอะ! เด็กที่ถืออาวุธชิ้นใหญ่อยู่ตรงนั้น"
21195-41 = "(มองเลิกลั่ก)"
21195-42 = "เธอนั่นแหละ!"
21195-43 = "เรียกอาริสึเหรอคะ?"
21195-44 = "ใช่ เธอไม่เหมือนใคร"
21195-45 = "ใจกล้ามายิง C&C ของเรางั้นเรอะ...?"
21195-46 = "ฉันต้องคุยอะไรกับเธอหน่อย"
21195-48 = "อะ... อาริสึรู้จักแพทเทิร์นนี้ดีค่ะ"
21195-49 = "'ไม่เคยมีใครที่ไหนทำกับฉันแบบนี้มาก่อน'"
21195-50 = "มันคือการสารภาพรักค่ะ น้องเมดมีใจให้อาริสึ"
21195-51 = "พูดอะไรบ้าๆ ของเธอน่ะ! อีกอย่าง เธอเรียกใครว่าน้องเมด?! อยากตายรึยังไงหา?!"
21195-52 = "อึ่ก..."
21195-53 = "นะ...น่ากลัวจัง!"
21195-55 = "เฮ้อ..."
21195-56 = "คนพวกนี้ทำให้หัวร้อนชะมัด แต่ก็ดีเหมือนกันนะ"
21195-57 = "ขอบอกไว้ก่อนแล้วกันจะได้ไม่เข้าใจผิด ฉันไม่ได้มาแก้แค้นเพราะโดนพวกเธอยิงหรอกนะ"
21195-58 = "ถึงจะดูหยาบคายอยู่บ้าง แต่มันก็เป็นภารกิจที่ชอบธรรม และพวกเธอก็เผชิญหน้าพวกเราได้สำเร็จ"
21195-59 = "ฉันไม่ได้มีความแค้นกับเรื่องนั้นหรอก... แต่ฉันสนใจน่ะ"
21195-60 = "สนใจงั้นเหรอ...?"
21195-61 = "หรือต้องเรียกว่าการยืนยันนะ?"
21195-62 = "เอาเลย"
21195-63 = "ถ้าสู้กับฉันแล้วชนะ ฉันก็จะยอมถอยให้"
21195-64 = "การมายืนยันเองกับตามันน่าจะเข้าใจได้ง่ายกว่าให้ไปตามสืบ พวกเธอจะเอายังไงล่ะ?"
21195-65 = "......"
21195-66 = "เข้าใจแล้วค่ะ"
21195-67 = "โอ้ ฉันชอบเอเนอร์จี้นี้จังเลยแหะ"
21195-68 = "เหมือนกิจกรรมต่อสู้สองผู้กล้าเดี่ยวเลยสินะคะ เข้าใจแล้วล่ะค่ะ"
21195-69 = "สองผู้กล้า... อะไรนะ?"
21195-70 = "ครั้งก่อนพื้นที่ไม่กว้างพอ และฉันก็มีภารกิจต้องหากระจกให้ได้ ก็เลยไม่ได้ใส่เต็มที่เท่าไหร่..."
21195-71 = "แต่ถ้าเป็นตอนนี้ล่ะก็...!"
21195-72 = "จะใส่ไม่ยั้งเลยค่ะ! ชาร์จพลังเวท 100%...!"
21195-74 = "นี่มัน...!"
21195-75 = "ลำแสงทำลายล้าง!!"
21195-77 = "ตู้มมมมม!!"
21195-79 = "อึ่ก...!"
21195-80 = "ว้าว!"
21195-81 = "พลัง... ที่ยิ่งใหญ่...!"
21195-82 = "ผนังข้างนอกของอาคารหายไปหมดเลยค่ะ!"
21195-85 = "ยะ... ยอดไปเลยอาริสึ"
21195-86 = "ไม่เคยเห็นพลัง... จากอาวุธที่รุนแรงแบบนี้มาก่อนเลย"
21195-87 = "... ปราบได้แล้วงั้นเหรอ?"
21195-88 = "อาริสึจัง! จะมาพูดประโยคแบบนี้สุ่มสี่สุ่มห้าไม่ได้นะ!"
21195-89 = "อ๊ะ! ขอพูดใหม่แล้วกันค่ะ รุ่นพี่เนรุ ชั้นปีที่ 3"
21195-90 = "... ถะ... ถูกปราบไปแล้วหรือยังคะ...?"
21195-91 = "ไม่นะ ฉันไม่ได้หมายความแบบนั้น..."
21195-95 = "[ns] \"ยังไม่ใช่ตอนนี้\""
21195-97 = "(ปังๆๆๆ!)"
21195-98 = "อ๊าา!"
21195-101 = "ถึงนี่จะไม่ใช่อาวุธธรรมดาทั่วไป..."
21195-102 = "แต่ก็ทำได้แค่นี้ล่ะนะ"
21195-104 = "ชะ... ชาร์จพลัง... อีกครั้ง...!"
21195-106 = "ก็บอกแล้วไงว่าทำได้แค่นี้"
21195-107 = "อ๊ะ...!"
21195-108 = "(เฮือก!)"
21195-109 = "อ๊าาา!"
21195-111 = "อาวุธของเธอแข็งแกร่งมาก แต่หลังจากเหนี่ยวไกปืนแล้วต้องรอ 2-3 วินาทีถึงจะยิงออกไปได้"
21195-112 = "และเพราะมีพลังยิงที่รุนแรง เธอก็เลยยิงไม่ได้หากอยู่ใกล้ฝ่ายตรงข้าม"
21195-113 = "ไม่งั้นตัวเองก็จะพลอยได้รับความเสียหายไปด้วย"
21195-114 = "และคนที่จะเอาชนะฉันได้ในระยะห่างแค่นี้ ถึงจะหาทั่วทั้งคิโวทอสก็คงมีไม่กี่คน"
21195-115 = "ไม่สิ... ไม่มีเลยต่างหาก"
21195-116 = "ฮือ..."
21195-117 = "อาริสึ!"
21195-120 = "น่าผิดหวังนะ เพื่อนๆ ของฉันต้องมาโดนคนพวกนี้เล่นงานเหรอเนี่ย..."
21195-121 = "......"
21195-122 = "(พรึ่บ!)"
21195-123 = "อึ่ก!"
21195-124 = "กะ... แกว่งเรลกันเหมือนเสาเลยเหรอ?!"
21195-125 = "ถือว่าตัดสินใจได้ดีสำหรับการต่อสู้แบบประชิด"
21195-128 = "แต่ฉันก็ยังได้เปรียบเรื่องระยะทางอยู่ดี"
21195-129 = "ถึงเธอจะยิงได้ แต่เธอก็เล็งฉันไม่ได้"
21195-130 = "เล็ง... ไม่จำเป็นหรอกค่ะ"
21195-131 = "ลุยเลย!"
21195-132 = "อย่าพยายามมากเกินไปเลยน่า... หือ?"
21195-134 = "เดี๋ยวนะ...? นี่เธอ... กำลังยิงเหรอ? ยิงจากระยะนี้เหรอ...?"
21195-135 = "ไม่เล็งมาที่ฉัน... แต่ยิงลงพื้นเนี่ยนะ!"
21195-136 = "บ้าไปแล้วเรอะ?! ถ้าแบบนี้ไม่ใช่แค่ฉันที่โดนยิง แต่เธอก็...!"
21195-137 = "ลำแสงทำลายล้าง!!"
21195-139 = "(ตู้มมมม!)"
21195-141 = "อาริสึจัง! อึ่ก! ควันเต็มไปหมดเลย!"
21195-142 = "พื้นยุบลงไปหมดเลย... อาริสึ?! เจอตัวแล้ว!"
21195-143 = "ระ... ร่างกายเสียหาย 48%.... ฉันขอถอนกำลังค่ะ"
21195-145 = "[s] \"ครูแบกไปเอง\""
21195-146 = "คุณครู! เร็วเข้าเถอะค่ะ!"
21195-147 = "(ตึ้กๆๆ)"
21195-149 = "หัวหน้า!"
21195-150 = "ปะ... เป็นอะไรหรือเปล่าคะ? อย่าบอกนะว่าคนที่เข้าไปอยู่ในซากพื้นนั่น..."
21195-151 = "เมื่อกี้ฉันเห็นอาริสึจัง สภาพเธอดูแย่เลยล่ะ ฉันว่าหัวหน้าเด็กของเราก็คงจะแบนไปแล้ว..."
21195-153 = "...เธอเรียกใครว่าเด็กฮะ!?"
21195-155 = "อุ้ย!"
21195-156 = "ว้าว~ นี่แหละหัวหน้าของเรา! ดูสิ ไม่เป็นอะไรเลย!"
21195-157 = "นี่พวกเธออยู่ข้างใครกันแน่น่ะ!"
21195-158 = "ตอนนี้อาริสึอยู่ในสถานะสูญเสียพลังต่อสู้ เราไล่ตามไปเลยไหม?#nบาดเจ็บหนักขนาดนั้นน่าจะไปที่ห้องพยาบาลนะ"
21195-159 = "อืม... ห้องพยาบาลในมิลเลเนียมมีตั้งหลายสิบห้อง... แต่ก็น่าจะหาตัวเจอได้ไม่ยาก"
21195-162 = "......"
21195-163 = "..."
21195-164 = "หัวหน้า?"
21195-165 = "... อ่า"
21195-166 = "ช่างเถอะ ยุติการไล่ล่าแล้วกลับกันก่อนเถอะ"
21195-167 = "ได้ทำลายอะไรบ้างก็รู้สึกปลอดโปร่งขึ้นแล้วล่ะนะ"
21195-168 = "......"
21195-169 = "ก็เราทำตามเป้าหมายสำเร็จแล้วนี่ ฉันพอจะรู้เหตุผลที่ริโอะสนใจชมรมพัฒนาเกมแล้ว..."
21195-170 = "อีกอย่าง..."
21195-171 = "สงสัยเกี่ยวกับคุณครูใช่ม้า~"
21195-172 = "มะ.. ไม่ใช่สักหน่อย!"
21195-173 = "อืม.. ฉันเข้าใจค่ะ แต่ก็อดเป็นห่วงไม่ได้นะคะ"
21195-174 = "ชมรมนั้นมีแต่เด็กๆ ทั้งนั้นเลย อย่างนี้แสดงว่าคุณครูก็ชอบแบบ..."
21195-175 = "ถือเป็นเรื่องดีๆ ของหัวหน้าเลยนะ"
21195-176 = "หยุดพูดได้แล้ว! ถ้าจะพูดอะไรไร้สาระอีก คราวหน้าฉันจะตอบด้วยเสียงปืนแน่!"
21195-177 = "ฮึ่ม..."
21195-180 = "ทั้งครู... และชมรมพัฒนาเกม..."
21195-184 = "หึ"
21195-185 = "ตั้งตารอได้เลย แล้วจะต้องชดใช้เรื่องที่เรียกฉันว่าเด็กน้อยด้วย"
21195-187 = "ใช้แรงไปเยอะจนหิวเลย นี่! ไปกินบะหมี่กันเถอะ"
21195-189 = "ค่าา~"
21195-190 = "เห็นด้วย เห็นด้วย~!"
21195-191 = "ก็หัวหน้ากำลังโตนี่นา..."
21195-194 = "ให้มันน้อยๆ หน่อย!"
21195-196 = "ตอนต่อไป;มิลเลเนียมไพรซ์"

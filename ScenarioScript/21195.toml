[translation]
21195-3 = "Millennium Old Building Hallway"
21195-4 = "...*pant*...*pant*"
21195-5 = "Phew, we just barely escaped!"
21195-6 = "What do we do now, though?"
21195-7 = "Well, we already submitted the game to the Millennium Prize."
21195-8 = "All we have to do is keep running away until they announce the results!"
21195-9 = "I don't think so."
21195-10 = "Huh?!"
21195-12 = "*ratta-tat-tat*"
21195-13 = "Ahhh!"
21195-14 = "Midori!"
21195-18 = "..."
21195-19 = "Ah. "
21195-20 = "I figured that'd work."
21195-21 = "So the one that led these little chicks to attack the contraband storage..."
21195-22 = "...was you, right?"
21195-23 = "Should I call you \"Sensei,\" too? "
21195-24 = "I guess Akane's investigation wasn't blowing things out of proportion."
21195-25 = "[s1] \"Why are you here? Revenge?\"\n[s2] \"You realize you're also pretty little, right?\""
21195-26 = "Ha! I wouldn't be here for somethin' like that."
21195-27 = "Then again... Hey, you. The one over there."
21195-28 = "Don't think I forgot about you tricking me."
21195-29 = "Eek...! I-I'm sorry!"
21195-30 = "You really got me good last time."
21195-31 = "Huh?"
21195-32 = "Your performance was perfect. The way you pretended to tremble really had me going there."
21195-33 = "(Th-That was real trembling, though...)"
21195-34 = "Anyway, you. Yeah, you with that massive weapon..."
21195-35 = "What?! I'm a third-year! Call me \"little\" again, and I'll cave your face in!"
21195-36 = "Mind your composure, Neru."
21195-37 = "Wow, someone's brave enough to call Neru little to her face."
21195-38 = "Grr...*sigh*"
21195-39 = "I was THIS close to losin' it, but I'm good. Anyway, you over there with that huge weapon..."
21195-41 = "*looks from side to side*"
21195-42 = "Yeah, you!"
21195-43 = "What about me?"
21195-44 = "You're not like the others."
21195-45 = "You shot straight at C&C!"
21195-46 = "I've got something you need to hear."
21195-48 = "Oh, I recognize this situation."
21195-49 = "Next is: \"I have never felt this way before.\""
21195-50 = "It is a confession. The little maid is confessing to me."
21195-51 = "The hell are you talking about?! And who the hell are you callin' little?! You wanna die, you...!"
21195-52 = "Uhhh..."
21195-53 = "W-We're so dead!"
21195-55 = "*sigh*"
21195-56 = "You guys are going to make me lose it. Let's cut to the chase..."
21195-57 = "I'm not here to get revenge for you guys attacking us."
21195-58 = "Yeah, I'm a little pissed, but you guys beat us fair and square."
21195-59 = "So I'm willing to look past it. However...you've caught my attention."
21195-60 = "What do you mean?"
21195-61 = "There's just somethin' I need to see for myself."
21195-62 = "So, let's fight."
21195-63 = "If you win, I leave, and that's the end of it."
21195-64 = "This is way better than doing some investigation or somethin', don'tcha think?"
21195-65 = "..."
21195-66 = "Okay."
21195-67 = "You've got some fire in your eyes. I like that."
21195-68 = "So an arena event, then? Understood."
21195-69 = "What now? Arena...?"
21195-70 = "Last time, my strategies were limited due to the Mirror and limited area to move in."
21195-71 = "However..."
21195-72 = "...this time my MP is fully charged!"
21195-74 = "That's...!"
21195-75 = "Blinding Light!"
21195-77 = "*BOOOOOM*"
21195-79 = "Gah!"
21195-80 = "Whoa!"
21195-81 = "That was amazing!"
21195-82 = "The wall's completely obliterated!"
21195-85 = "That was amazing, Aris."
21195-86 = "Yeah, I've never seen anything like it."
21195-87 = "Did I get her?"
21195-88 = "A-Aris! You can't say that line!"
21195-89 = "Oh, of course. Situations like this call for more grace and nuance."
21195-90 = "Hath the fair maiden fallen in battle?"
21195-91 = "Th-That's not really what I meant..."
21195-95 = "[ns] \"Not yet.\""
21195-97 = "*ratta-tat-tat*"
21195-98 = "Ah!"
21195-101 = "Sure, that attack was pretty special..."
21195-102 = "But is that all you've got?"
21195-104 = "R-Recharging MP!"
21195-106 = "Too slow."
21195-107 = " Oh, n—"
21195-108 = "* boom*"
21195-109 = "Gah!"
21195-111 = "Your weapon is strong, but the time between trigger pull and impact with the target is too long."
21195-112 = "And thanks to that gap, your weapon is useless at a certain range."
21195-113 = "Because you'll be caught in the blast yourself."
21195-114 = "And I'll tell ya how many people in Kivotos can beat me at close range."
21195-115 = "None."
21195-116 = "Uh-oh..."
21195-117 = "Aris!"
21195-120 = "What a let down. I can't believe you managed to trounce my maids."
21195-121 = "..."
21195-122 = "*whoosh*"
21195-123 = "Crap!"
21195-124 = "D-Did she just swing that railgun like a bat?!"
21195-125 = "Heh. Not a bad idea in a close-up fight."
21195-128 = "But I've still got the upper hand at this distance."
21195-129 = "Even if you can fire, you won't be able to aim at me."
21195-130 = "Then I will not aim."
21195-131 = "Here I go!"
21195-132 = "I told you there's no point... Huh? "
21195-134 = "Th-The hell?! You're firing? But at this distance...!"
21195-135 = "You aren't even aiming at me! You'll hit the floor!"
21195-136 = "Are you insane? Don't you know you'll be caught in the blast too?!"
21195-137 = "Blinding Light!!"
21195-139 = "*BOOM*"
21195-141 = "Aris! *cough* The smoke!"
21195-142 = "The floor completely collapsed... There you are, Aris!"
21195-143 = "Physical damage is at 48% of capacity. We need to retreat!"
21195-145 = "[s] \"Get on my back.\""
21195-146 = "Hurry, Sensei!"
21195-147 = "(scurries)"
21195-149 = "President!"
21195-150 = "Do you think she's okay? Could she be buried under the rubble?"
21195-151 = "I saw Aris get out, and she was a mess. Our little Neru might be a pancake by now..."
21195-153 = "Who are you calling \"little\"?!"
21195-155 = "Whoops."
21195-156 = "Whoa, that's our president! A little rubble's got nothing on her!"
21195-157 = "Whose side are you guys on, anyway?!"
21195-158 = "In any case, Aris is in no condition to continue fighting. She is likely going to an infirmary. Should we pursue?"
21195-159 = "Hmm. Millennium only has a few infirmaries, so finding her shouldn't take long."
21195-162 = "..."
21195-163 = "..."
21195-164 = "Neru?"
21195-165 = "Ugh..."
21195-166 = "It's fine. There's no need to pursue. Let's pull out."
21195-167 = "I feel a lot better after wrecking some stuff anyway."
21195-168 = "..."
21195-169 = "Well, mission accomplished, I guess. Heh. I get now why Rio is so interested in the Game Development Department."
21195-170 = "And that person with them..."
21195-171 = "You're worried about Sensei, aren't you?"
21195-172 = "W-Wait! It's not like that!"
21195-173 = "I understand. Though, I am a little worried."
21195-174 = "Given that their group is full of nothing but little girls, I wonder if Sensei..."
21195-175 = "Good for you, Neru."
21195-176 = "SHUT UP! One more word out of you, and these barrels will be pointed right at your face."
21195-177 = "Hmph..."
21195-180 = "Sensei...and the Game Development Department."
21195-184 = "Hmm."
21195-185 = "They better watch themselves. I'll make 'em pay for calling me little."
21195-187 = "Anyway, I'm starving. Let's go get some ramen."
21195-189 = "All right!"
21195-190 = "Sounds good!"
21195-191 = "Oh? So you really did hit your growth spurt after all..."
21195-194 = "I said shut up!"
21195-196 = "Next Episode;The Millennium Prize"

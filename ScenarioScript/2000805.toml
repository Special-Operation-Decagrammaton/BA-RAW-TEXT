[translation]
2000805-1 = "總之就是老師的錯！"
2000805-2 = "格黑娜學園．別館"
2000805-3 = "（MomoTalk的內容讓人有點擔心，於是決定去找亞子）"
2000805-12 = "……哎呀，老師？"
2000805-13 = "[s] 「辛苦了。」"
2000805-14 = "怎，怎麼這麼突然……？"
2000805-18 = "……啊，是因為我聯絡了老師嗎。"
2000805-19 = "感謝您的關心，但其實真的沒發生什麼大不了的事……"
2000805-20 = "今天只是平凡的一天而已。"
2000805-21 = "……這麼晚了在這裡做什麼？ "
2000805-22 = "必須由風紀委員處理的文件一如往常地推積如山……#n而這些工作都需要身為行政官的我批准過後才能執行。"
2000805-23 = "啊，這就是我身為完美管理者的宿命吧。"
2000805-24 = "[s] 「有我能幫忙的地方嗎？」"
2000805-26 = "唔嗯，交給老師的話，事情反而可能會越來越多……"
2000805-30 = "啊，可以幫我清理這個箱子嗎？#n裡面應該只有要丟的東西……"
2000805-31 = "我看看……"
2000805-33 = "[ruby=Pandemonium Society]是萬魔殿送[/ruby]來的各種垃圾文件，以及……"
2000805-35 = "被塞了各種危險物品的鞋子，還有……"
2000805-36 = "寫著「風紀委員長的狗！」的寵物項圈……"
2000805-37 = "[s1] 「這是霸凌吧……？」\n[s2] 「亞子，你被欺負了嗎……？」"
2000805-38 = "……咦？為什麼這麼說……"
2000805-39 = "……咦？為什麼這麼說……"
2000805-40 = "對方或許有那種意圖沒錯……但我認為那只是對風紀委員會的一種發洩罷了。"
2000805-41 = "……他們想怎麼做都無所謂，反正我也不會把這種事放在心上。"
2000805-42 = "對風紀委員會的行政官來說，這點小事不算什麼。"
2000805-43 = "[s] 「……就算你覺得『無所謂』，壓力還是會累積的啊。」"
2000805-44 = "……哼。"
2000805-45 = "老師是暗指我看起來不在意，實際上卻「沒做好壓力管理」嗎？"
2000805-46 = "對任何事都管理得近乎完美的我？"
2000805-47 = "[s] 「沒錯。」"
2000805-48 = "你說什麼！？"
2000805-49 = "這實在太荒謬了……#n雖，雖然要說完全沒有壓力是騙人的……"
2000805-50 = "畢竟委員長總是很忙，風紀委員們又老是出狀況……害我總是得工作到半夜……"
2000805-51 = "會因此感到沮喪和生氣也是事實……"
2000805-52 = "但我認為……自己有做好自我管理……"
2000805-53 = "不過仔細想想，最近似乎確實變得比較嚴重……#n要說近期的改變……頂多就是和老師見面的次數增加了而已……"
2000805-57 = "等等……也就是說，我的壓力變大是老師造成的……？ "
2000805-58 = "[s] 「怎麼會是這種結論！？」"
2000805-59 = "啊啊，我好像明白了！肯定是這樣沒錯！#n現在回頭想想，自從遇見老師之後，煩惱就一直在增加！"
2000805-60 = "總是會一直在意老師，不知道該說是覺得礙眼還是煩躁……#n總之就是心中會不斷燃起怒火……"
2000805-61 = "所以總是悶悶不樂！"
2000805-62 = "[s] 「是這樣嗎……！？」"
2000805-63 = "總算說得通了！"
2000805-64 = "工作中停電、電梯故障、拿到燒焦的可樂餅、還有麵包過期……全都是老師的錯！"
2000805-65 = "[s3] 「太強詞奪理了吧！？」\n[s4] 「麵包過期絕對不是我的問題吧！？」"
2000805-66 = "不！都是老師的錯！總之就是老師的錯！"
2000805-67 = "不！都是老師的錯！總之就是老師的錯！"
2000805-68 = "[s] 「這只是在遷怒吧！？」"
2000805-69 = "才，才沒有！老師的邏輯有問題！"
2000805-70 = "[s] 「誰的邏輯有問題啊！？」"
2000805-74 = "呵呵，看來我們的溝通出現了一些問題呢……"
2000805-75 = "那要來打賭嗎？輸的人戴上這條項圈學狗叫！"
2000805-76 = "[s] 「……好，來賭吧。」"
2000805-77 = "……"
2000805-78 = "……什麼！？"
2000805-79 = "咦……這次怎麼……突然接受了……"
2000805-80 = "可是就算要賭……也沒有能證明誰對誰錯的方法。"
2000805-81 = "[s] 「就用丟硬幣決勝負吧。」"
2000805-82 = "……！？"
2000805-83 = "請，請等一下！？"
2000805-84 = "這，這確實能輕易分出輸贏沒錯……但真的要這麼做嗎？"
2000805-85 = "[s] 「你要放棄了？」"
2000805-86 = "……！"
2000805-87 = "誰，誰說我要放棄了！？"
2000805-88 = "比就比吧！輸的人戴上項圈學狗叫！"
2000805-89 = "……那麼正面還是反面就請老師先選。#n如果出現另一面就是我贏。"
2000805-90 = "不過硬幣要由我來丟！這樣沒問題吧？"
2000805-91 = "[s5] 正面\n[s6] 反面"
2000805-92 = "……好，那我選反面。"
2000805-96 = "一決勝負吧……！"
2000805-102 = "……準備好了嗎，我要確認硬幣了哦？ "
2000805-103 = "結果是……"
2000805-107 = "正，正面！？"
2000805-108 = "……好，那我選正面。"
2000805-112 = "一決勝負吧……！"
2000805-118 = "……準備好了嗎，我要確認硬幣了哦？ "
2000805-119 = "結果是……"
2000805-123 = "反，反面！？"
2000805-127 = "……"
2000805-128 = "那，那個……"
2000805-129 = "……老師？"
2000805-130 = "[s] 「啊……那麼，規則就是規則……」"
2000805-131 = "……！"
2000805-132 = "請，請等一下！在，在這裡嗎！？ "
2000805-133 = "這個，那個……這裡的話，有點……"
2000805-134 = "發，發出聲音的話，可能會被聽見……"
2000805-135 = "[s] 「那就戴上項圈就好。」"
2000805-136 = "不，那個，那個也……"
2000805-137 = "唔，唔……"
2000805-140 = "― 嗚嗚，這副模樣……！[wa:2180] "
2000805-143 = "― 這份屈辱，我絕對不會忘記的……！[wa:2980] "
2000805-146 = "[ns] 「……那麼，接下來要做什麼呢？」"
2000805-147 = "― 咦！？請，請等一下！[wa:1570] "
2000805-149 = "― 這和約好的不一樣吧！？[wa:1070] "
2000805-152 = "― 散，散步！？您是認真的嗎！？就現在這副模樣！？[wa:3920] "
2000805-155 = "― 那，那實在是有點……[wa:1480] "
2000805-157 = "― 對，對不起……我有點得意忘形了……[wa:3870] "
2000805-160 = "― 那， 那個……要維持這樣到什麼時候才行呢……？[wa:4550] "
2000805-164 = "……真是屈辱。"
2000805-165 = "沒想到會被人這樣對待……"
2000805-166 = "[s] 「抱歉，我應該有更好的做法的。」"
2000805-170 = "……"
2000805-171 = "……不。"
2000805-172 = "冷靜想想是我不夠成熟，還說了很多無理取鬧的話……"
2000805-173 = "只要和老師在一起，我就會無法隱藏自己的內心……"
2000805-174 = "而且，感覺心情也清爽多了……"
2000805-175 = "……總，總之！"
2000805-176 = "這樣就算扯平了！"
2000805-178 = "（雖然略顯尷尬，還是在與亞子和好後回到了夏萊）"
2000805-179 = "（抵達之後才發現不小心把項圈也帶了回來）"

2000805-59 = "3;아코;09;아아, 조금 알 것 같네요! 네! 맞아요! 그러고 보면 선생님을 만난 후부터 어쩐지 더 스트레스가 심해졌던 게 분명합니다!\n#3;em;[반응]"

[translation]
2000805-1 = "Whatever, It's Sensei's Fault!"
2000805-2 = "Gehenna Annex Building"
2000805-3 = "The way Ako suddenly disconnected from MomoTalk had me worried, so I went looking for her."
2000805-12 = "Oh, my. Sensei?"
2000805-13 = "[s] \"You all are doing a great job.\""
2000805-14 = "Wh-What's this all of a sudden...?"
2000805-18 = "A-Ah. Yes. I did contact you. Whoops."
2000805-19 = "Heehee. Thank you for your concern, but nothing really happened."
2000805-20 = "It was just an average day. Nothing special about it."
2000805-21 = "You want to know what I'm doing here so late at night? "
2000805-22 = "There was a huge backlog of documents that needed to be dealt with... If I, the administrator, don't take care of this, then it'll never get done."
2000805-23 = "Such is my destiny as a perfect manager."
2000805-24 = "[s] \"Is there anything I can help you with?\""
2000805-26 = "Hmm, if I leave this to you, then my workload will probably increase."
2000805-30 = "Oh, then could you take away this box for me? I meant to throw it away, but I forgot about it."
2000805-31 = "This is... Let's see here..."
2000805-33 = "A bunch of garbage disguised as paperwork sent by the Pandemonium Society."
2000805-35 = "My slippers I can't use anymore since they were filled with sharp objects."
2000805-36 = "A pet leash that has, \"Perish, dog of the head prefect!\" written on it."
2000805-37 = "[s1] \"Isn't this harassment?\"\n[s2] \"Ako, are you getting harassed?\""
2000805-38 = "What? What do you mean...?"
2000805-39 = "What? What do you mean...?"
2000805-40 = "Perhaps that was their intention, but they're just venting their frustrations on me since I'm the face of the Prefect Team."
2000805-41 = "Well, it doesn't matter anyway. I don't mind it at all."
2000805-42 = "This is my role as the senior administrator of the Prefect Team. I can handle whatever they dish out!"
2000805-43 = "[s] \"Managing your stress is important, Ako.\""
2000805-44 = "Huh?"
2000805-45 = "I can't let that slide. Are you pretending to reassure me, but then secretly saying that I'm not managing my stress well?"
2000805-46 = "Me, who has not one single flaw when it comes to management?"
2000805-47 = "[s] \"Yeah.\""
2000805-48 = "No hesitation?! "
2000805-49 = "How can you say such nonsense?! O-Of course, I can't say I have zero stress, but..."
2000805-50 = "The president is always busy, the members are always causing trouble, and I'm here working this late at night."
2000805-51 = "There are times when I get angry because everything is so frustrating!"
2000805-52 = "But still...I think I'm managing to do some self-care."
2000805-53 = "Well, maybe it's gotten a little worse recently. Nothing much has changed except that I've been meeting with you more often."
2000805-57 = "Wait... Has my stress gotten worse because of you, Sensei?! "
2000805-58 = "[s] \"Because of me?!\""
2000805-59 = "Ah, it's all coming together! Looking back, it's clear my stress has somehow become even more severe since I met you!"
2000805-60 = "You're always making me worry—you're a bit of an eyesore! You're annoying, and at times you fill me with rage!"
2000805-61 = "You're the one that keeps stressing me out!"
2000805-62 = "[s] \"Is that what was going on?!\""
2000805-63 = "Yes, now I understand!"
2000805-64 = "The blackout, the broken elevator, the burnt croquette, the bread I put in the fridge that expired, all of it... It was all because of you, Sensei!"
2000805-65 = "[s3] \"Who makes that kind of nonsense connection?!\"\n[s4] \"Again, that last one was definitely your fault.\""
2000805-66 = "No! You're bad, Sensei! No matter how you look at it, it's your fault!"
2000805-67 = "No! You're bad, Sensei! No matter how you look at it, it's your fault!"
2000805-68 = "[s] \"Aren't you just taking it out on me?!\""
2000805-69 = "What?! What nonsense! I've never done that!"
2000805-70 = "[s] \"Now, who's the one speaking nonsense?!\""
2000805-74 = "Heehee, I just can't seem to get through to you."
2000805-75 = "Fine. Then would you like to make a bet? The loser has to wear a leash and bark like a dog."
2000805-76 = "[s] \"Okay. Let's do it.\""
2000805-77 = "..."
2000805-78 = "...What?!"
2000805-79 = "W-Wait... That's... If you suddenly accept..."
2000805-80 = "I mean, even if we do bet...there's no way to confirm a winner or loser in a scenario like this..."
2000805-81 = "[s] \"Let's decide with a coin flip.\""
2000805-82 = "What?!"
2000805-83 = "A coin flip?!"
2000805-84 = "You want to decide based on something so random? C-Can we do that? You're a teacher, right? Are you sure this is okay?"
2000805-85 = "[s] \"Are you running away, Amau Ako?\""
2000805-86 = "Guh!"
2000805-87 = "Wh-Who's running away?!"
2000805-88 = "Fine! It's a bet! We'll flip a coin, and whoever loses has to wear a leash and bark like a dog!"
2000805-89 = "Heads or tails! Call it, Sensei. If it lands on the opposite side, then I win!"
2000805-90 = "But I get to flip the coin! That makes it fair, right?"
2000805-91 = "[s5] Pick heads.\n[s6] Pick tails."
2000805-92 = "Fine. Then I'll bet tails."
2000805-96 = "Okay, this is for the win!"
2000805-102 = "Are you ready? I'm checking the coin. "
2000805-103 = "The result is...!"
2000805-107 = "H-Heads?!"
2000805-108 = "Fine. Then I'll bet heads."
2000805-112 = "Okay, this is for the win!"
2000805-118 = "Are you ready? I'm checking the coin. "
2000805-119 = "The result is...!"
2000805-123 = "T-Tails?!"
2000805-127 = "..."
2000805-128 = "Uh, w-wait... "
2000805-129 = "Sensei, l-let's talk about this."
2000805-130 = "[s] \"On your knees.\""
2000805-131 = "What?!"
2000805-132 = "W-Wait, Sensei? Are you serious?! Here?! "
2000805-133 = "S-So... Uh... S-So... Uh..."
2000805-134 = "Wh-What if someone comes by?"
2000805-135 = "[s] \"I'll keep an eye out.\""
2000805-136 = "But, even if you do..."
2000805-137 = "Uh..."
2000805-140 = "― Ugh... I can't believe this happened.[wa:1100] "
2000805-143 = "― I will never forget this humiliation![wa:2140] "
2000805-146 = "[ns] \"Okay. What should I do next?\""
2000805-147 = "― Ah! Please wait![wa:1330] "
2000805-149 = "― Any more than this is different than what we agreed on![wa:10] "
2000805-152 = "― A-A walk?! Now? Like this?[wa:3800] "
2000805-155 = "― Th-That's definitely...[wa:960] "
2000805-157 = "― S-Sorry... I meant to tease you a little, but it got out of hand...[wa:1870] "
2000805-160 = "― H-How long do I have to be like this?[wa:3990] "
2000805-164 = "...So humiliating."
2000805-165 = "I've never been treated like this by anyone!"
2000805-166 = "[s] Apologize for being immature."
2000805-170 = "..."
2000805-171 = "Well, fine. "
2000805-172 = "I shouldn't have been trying to blame everything on you... I guess I was just frustrated..."
2000805-173 = "For some reason, I can never manage to hide my feelings when I'm with you."
2000805-174 = "Well, shall I say I feel a lot more relaxed..."
2000805-175 = "...Anyway!"
2000805-176 = "Let's just call it even!"
2000805-178 = "(After making up with Ako, I left the awkward atmosphere behind and returned to Schale.)"
2000805-179 = "(It was only after I returned that I realized I had brought the leash.)"

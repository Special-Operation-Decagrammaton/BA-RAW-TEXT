2000805-43 = "[s] \"스트레스 관리는 중요하다고 생각해. 아코.\""
2000805-44 = "3;아코;04;흐으음?\n#3;stiff"
2000805-45 = "3;아코;09;그 말은 그건가요. 안심시키는 것처럼 이야기해 놓고, 암암리에 제가 '스트레스 관리를 못하고 있다'고 말씀하시는 건가요?\n#3;em;[반응]"
2000805-46 = "3;아코;09;관리라는 이름이 붙는 사항에 대해서는, 완벽에 가까운 이 저에게?"
2000805-47 = "[s] \"응.\""
2000805-48 = "3;아코;04;단언했어요?! \n#3;shake\n#3;em;[?!]"
2000805-49 = "3;아코;09;무슨 말도 안 되는 소리를……?! 무, 물론 스트레스가 하나도 없다고는 말 못하겠지만……."
2000805-50 = "3;아코;09;부장님은 언제나 바쁘지, 부원들은 문제나 일으키지…… 저는 한밤중까지 이렇게 일이나 하고 있고……"
2000805-51 = "3;아코;06;모든 상황이 답답해서 화가 날 때도 있지만…….\n#3;em;…"
2000805-52 = "3;아코;09;자기 관리…… 하고 있다고 생각하는데요…….\n#3;stiff"
2000805-53 = "3;아코;06;……물론 최근엔 유독 더 심해진 감이 있지만. 최근 들어 바뀐 거라고 해봐야 어디까지나 선생님과의 만남이 늘어난 것 정도……."

[translation]
2000805-1 = "เพราะคุณครูนั่นแหละค่ะ!"
2000805-2 = "อาคารย่อย เกเฮนน่า"
2000805-3 = "(คุณครูกังวลที่อาโกะหายไประหว่างที่คุยทางแชท MOMOTALK เลยแวะมาหาอาโกะ)"
2000805-12 = "อ๊ะ...? คุณครู?"
2000805-13 = "[s] \"เธอทำงานหนักมากเลยนะ\""
2000805-14 = "ทะ...ทำไมถึงได้...?"
2000805-18 = "อา... จริงสิ ฉันส่งข้อความไปหาคุณครูนี่นา เฮ้อ..."
2000805-19 = "ฮิฮิ ขอบคุณที่เป็นห่วงนะคะ แต่ว่าไม่มีอะไรหรอกค่ะ"
2000805-20 = "มันก็แค่วันธรรมดาๆ วันหนึ่ง ไม่ได้มีเรื่องพิเศษอะไรหรอกค่ะ"
2000805-21 = "คุณครูสงสัยว่าฉันมาทำอะไรอยู่ที่นี่จนดึกเหรอคะ? "
2000805-22 = "ก็เพราะเอกสารที่ทางคณะกรรมการวินัยทำมันค้างอยู่เยอะจนกองเป็นภูเขาแล้ว... และงานพวกนี้#nถ้าเจ้าหน้าที่อาวุโสอย่างฉันไม่ลงมือทำแล้วล่ะก็คงไม่มีวันเสร็จแน่ๆ เลยค่ะ"
2000805-23 = "เป็นงานแห่งโชคชะตาของผู้ดูแลที่เพียบพร้อมอย่างฉันค่ะ"
2000805-24 = "[s] \"มีอะไรให้ครูช่วยมั้ย?\""
2000805-26 = "อืม... ถ้าให้คุณครูช่วยอาจทำให้งานงอกมากกว่าเดิมอีก..."
2000805-30 = "อ๊ะ ถ้างั้นช่วยจัดการกล่องพวกนี้หน่อยได้มั้ยคะ? ฉันกะจะเอาไปทิ้งแล้ว แต่ก็ลืมเลยยังไม่ได้เอาไปทิ้งค่ะ"
2000805-31 = "พวกนี้คือ... ไหนดูซิ..."
2000805-33 = "เอกสารน่ารังเกียจที่พวกแพนเดโมเนียม โซไซตี้ส่งมา"
2000805-35 = "รองเท้าสลิปเปอร์ใส่ไม่ได้เพราะเศษแก้วอยู่ในนั้นเต็มไปหมด..."
2000805-36 = "สายจูงสัตว์เลี้ยงที่มีคำว่า <ตายไปซะ! ยัยสุนัขรับใช้ประธานคณะกรรมการวินัย!> แล้วก็..."
2000805-37 = "[s1] \"แบบนี้มันกลั่นแกล้งกันชัดๆ นะ...?\"\n[s2] \"อาโกะ เธอโดนกลั่นแกล้งงั้นเหรอ...?\""
2000805-38 = "คะ... หมายถึงอะไรคะ?"
2000805-39 = "คะ... หมายถึงอะไรคะ?"
2000805-40 = "คิดว่าพวกนั้นคงจะจงใจทำค่ะ... หรือจะเรียกว่าระบายความโกรธใส่ฉันที่เป็นหน้าตาของคณะ#nกรรมการวินัยดีนะ..."
2000805-41 = "แต่ก็สบายมากค่ะ ฉันไม่ใส่ใจหรอก"
2000805-42 = "มันเป็นสิ่งที่ฉันต้องเผชิญในฐานะผู้ดูแลของคณะกรรมการวินัยค่ะ ฉันต้องจัดการเรื่องพวกนี้ได้อยู่แล้ว"
2000805-43 = "[s] \"การจัดการความเครียดเป็นเรื่องสำคัญนะ อาโกะ\""
2000805-44 = "อืมมม..."
2000805-45 = "หมายความว่ายังไงกันคะ ทำเหมือนจะปลอบใจกัน แต่กลับพูดเหมือนกับว่า \"ฉันจัดการความเครียดไม่ได้\" งั้นเหรอคะ?"
2000805-46 = "ทั้งๆ ที่ฉันดูแลตัวเองได้อย่างไม่มีข้อบกพร่องเนี่ยนะคะ?"
2000805-47 = "[s] \"อื้อ\""
2000805-48 = "ตอบแบบไม่ลังเลเลยด้วย?! "
2000805-49 = "พูดอะไรไร้สาระแบบนั้นคะ...?! ถะ...ถึงจะพูดไม่ได้เต็มปากก็เถอะว่าไม่เครียดเลย..."
2000805-50 = "แต่ท่านประธานก็ยุ่งอยู่ตลอด พวกสมาชิกก็ชอบสร้างปัญหา... และฉันเองก็ต้องมาทำงาน#nจนดึกดื่นแบบนี้..."
2000805-51 = "ถึงจะมีตอนที่ฉันอึดอัดใจกับเรื่องทุกอย่างแล้วโมโหอยู่บ้าง..."
2000805-52 = "แต่ฉันก็คิดว่าฉันจัดการได้...อยู่ค่ะ"
2000805-53 = "นะ...แน่นอนว่าถึงช่วงนี้จะรู้สึกดิ่งลงเรื่อยๆ ก็เถอะ ถ้าจะพูดถึงเรื่องที่เปลี่ยนไปในช่วงนี้ ก็มีแค่เรื่อง#nที่ต้องเจอคุณครูบ่อยขึ้น..."
2000805-57 = "เดี๋ยวนะ... หรือว่าที่ความเครียดฉันเพิ่มขึ้นจะเป็นเพราะคุณครู...? "
2000805-58 = "[s] \"เพราะครูเหรอ?!\""
2000805-59 = "อ๊ะ... เหมือนฉันจะรู้แล้วค่ะ! ใช่แล้วค่ะ! พอมาคิดดูแล้ว ตั้งแต่ฉันออกมาเจอกับคุณครู#nความเครียดของฉันก็เพิ่มขึ้นจริงๆ ด้วยค่ะ!"
2000805-60 = "มันรู้สึกเหมือนคุณครูกวนใจฉัน หรือจะบอกว่าขัดหูขัดตาดีนะ...คุณครูทำให้ฉันรู้สึกหงุดหงิด แล้วก็โมโหบ่อยๆ..."
2000805-61 = "จู่ๆ ก็หงุดหงิดขึ้นมาอีกแล้วค่ะ!"
2000805-62 = "[s] \"ไหงงั้นอ่ะ?!\""
2000805-63 = "ใช่แล้วค่ะ ตอนนี้ทุกอย่างก็ลงตัวแล้ว!"
2000805-64 = "ทั้งเรื่องที่ไฟดับ ลิฟต์เสีย ต้องกินโคร็อกเกะไหม้ๆ และเรื่องที่ขนมปังที่แช่ในตู้เย็นเสีย...ทั้งหมดนี่ ทั้งหมดนี่เป็นเพราะคุณครูค่ะ...!"
2000805-65 = "[s3] \"ทำไมโทษกันหน้าตาเฉยเลยล่ะ?!\"\n[s4] \"อย่างน้อยข้อสุดท้ายก็ไม่น่าเป็นเพราะครูนะ...!\""
2000805-66 = "ไม่ค่ะ! คุณครูนี่แย่จริงๆ! เอาเป็นว่าทั้งหมดนี่เป็นเพราะคุณครูนั่นแหละค่ะ!"
2000805-67 = "ไม่ค่ะ! คุณครูนี่แย่จริงๆ! เอาเป็นว่าทั้งหมดนี่เป็นเพราะคุณครูนั่นแหละค่ะ!"
2000805-68 = "[s] \"เธอใช้ครูเป็นที่ระบายความเครียดอยู่นี่!\""
2000805-69 = "คะ?! ไม่ใช่สักหน่อยค่ะ อย่ามาปรักปรำกันสิคะ!"
2000805-70 = "[s] \"เธอนั่นละที่ปรักปรำครู...!\""
2000805-74 = "ฮิฮิ คงคุยกันไม่รู้เรื่องแล้วสินะคะ"
2000805-75 = "ดีค่ะ ถ้างั้นมาพนันกันมั้ยคะ? คนที่แพ้จะต้องใส่ปลอกคอกับสายจูงอันนี้แล้วคลานเลียนแบบสุนัขนะคะ"
2000805-76 = "[s] \"ได้สิ เอาเลย!\""
2000805-77 = "..."
2000805-78 = "คะ...?!"
2000805-79 = "ดะ...เดี๋ยวสิคะ ทำไมถึงยอมกันแบบนี้..."
2000805-80 = "อีกอย่างถึงจะบอกว่าพนันกันก็เถอะ... แต่ก็คงไม่มีวิธีพิสูจน์ว่าจะชนะหรือแพ้ในเรื่องพวกนี้หรอกนะคะ..."
2000805-81 = "[s] \"งั้นมาโยนเหรียญกัน\""
2000805-82 = "คะ?!"
2000805-83 = "โยนเหรียญเหรอคะ?!"
2000805-84 = "ดะ... เดี๋ยวก่อนสิคะ จะตัดสินด้วยวิธีนั้นเหรอคะ? คุณเป็นคุณครูนะคะ แน่ใจนะคะว่าทำแบบนี้ได้น่ะ?"
2000805-85 = "[s] \"คิดจะหนีเหรอ อามาอุ อาโกะ\""
2000805-86 = "อึ่ก...!!"
2000805-87 = "คะ..ใครจะหนีกันคะ?!"
2000805-88 = "ก็ได้ค่ะ! ตัดสินกันด้วยการโยนเหรียญก็ได้ค่ะ! คนที่แพ้จากการโยนเหรียญจะต้องใส่ปลอกคอ#nกับสายจูงอันนี้แล้วเลียนแบบสุนัขค่ะ!"
2000805-89 = "เฮ้อ... หัวหรือก้อย คุณครูเลือกก่อนเลยค่ะ ถ้าออกอีกด้านหนึ่ง ถือว่าฉันชนะค่ะ"
2000805-90 = "แต่ฉันจะเป็นคนโยนเหรียญเองนะคะ! แบบนี้ถึงจะยุติธรรมใช่มั้ยล่ะคะ"
2000805-91 = "[s5] เลือกว่าออกหัว\n[s6] เลือกว่าออกก้อย"
2000805-92 = "เอาละค่ะ...! ถ้างั้นฉันเลือกอันที่เหลือแล้วกันค่ะ"
2000805-96 = "มาวัดดวงกันเลยค่ะ!"
2000805-102 = "เตรียมพร้อมแล้วใช่มั้ยคะ? ขอดูเหรียญก่อนนะคะ... "
2000805-103 = "และผลก็คือ..."
2000805-107 = "เอ๋...ออกหัวเฉยเลย?!"
2000805-108 = "เอาล่ะค่ะ! ถ้างั้นฉันจะเลือกหัวก็แล้วกันค่ะ"
2000805-112 = "มาวัดดวงกันเลยค่ะ!"
2000805-118 = "เตรียมพร้อมแล้วใช่มั้ยคะ? ขอดูเหรียญก่อนนะคะ... "
2000805-119 = "และผลก็คือ..."
2000805-123 = "เอ๋...ออกก้อยเฉยเลย?!"
2000805-127 = "..."
2000805-128 = "เอ่อ... คะ...คือว่า... "
2000805-129 = "คือว่า... เอ่อ... คุณครู...?"
2000805-130 = "[s] \"คุกเข่าลงไปเลย\""
2000805-131 = "คะ?!"
2000805-132 = "เดี๋ยวก่อนสิคะคุณครู เอาจริงเหรอคะ?! จะทำตรงนี้เลยเหรอคะ?! "
2000805-133 = "คือว่ามันเอ่อ... คือว่ามัน..."
2000805-134 = "ถ้าเกิดมีใครเข้ามาเห็นคงไม่ดี..."
2000805-135 = "[s] \"เดี๋ยวครูดูต้นทางให้เอง\""
2000805-136 = "เดี๋ยวสิคะ ถึงจะพูดงั้นก็เถอะ แต่ว่ามัน..."
2000805-137 = "ฮือ..."
2000805-140 = "― ฮือ.... ไม่อยากเชื่อเลยว่าจะเป็นแบบนี้[wa:1060] "
2000805-143 = "― ความอัปยศในตอนนี้... ฉันจะไม่มีวันลืมเลยค่ะ...![wa:1740] "
2000805-146 = "[ns] \"เอาละ ต่อไปทำอะไรดีนะ\""
2000805-147 = "― อ๊ะ ดะ... เดี๋ยวก่อนสิคะ?![wa:930] "
2000805-149 = "― แบบนี้มัน... ไม่เหมือนกับที่คุยกันไว้เลยนี่คะ!?[wa:10] "
2000805-152 = "― ปะ...ไปเดินเล่นเหรอคะ? ตอนนี้เนี่ยนะ? จะไปแบบนี้เลยเหรอคะ?[wa:2520] "
2000805-155 = "― มะ...มันก็แน่อยู่แล้ว...[wa:920] "
2000805-157 = "― ขะ...ขอโทษค่ะ...ฉันดันเผลอเล่นสนุกตามอารมณ์เยอะไปหน่อยค่ะ...[wa:2150] "
2000805-160 = "― คะ... คือว่า... จะให้ฉันอยู่ท่านี้ ไปอีกนาน... แค่ไหนกันคะ?[wa:3110] "
2000805-164 = "อัปยศที่สุด..."
2000805-165 = "ฉันยังไม่เคยถูกใครปฏิบัติกับฉันแบบนี้เลย..."
2000805-166 = "[s] ขอโทษที่ทำตัวไม่สมกับเป็นผู้ใหญ่"
2000805-170 = "..."
2000805-171 = "ไม่หรอกค่ะ... "
2000805-172 = "พอมาคิดดูแล้ว ฉันคงเผลอหัวเสียและระบายใส่คุณครูไป..."
2000805-173 = "ไม่รู้เพราะอะไร แต่ดูเหมือนฉันจะปิดบังความรู้สึกของตัวเองไม่เก่งเมื่ออยู่ต่อหน้าคุณครู..."
2000805-174 = "อีกอย่าง... ตอนนี้ฉันสบายใจขึ้นนิดหน่อยแล้วค่ะ"
2000805-175 = "เอาเถอะค่ะ...!"
2000805-176 = "เพราะงั้นก็ถือว่าหายกันนะคะ!"
2000805-178 = "(หลังจากคืนดีกับอาโกะ คุณครูก็ลืมบรรยากาศที่น่ากระอักกระอ่วนไว้เบื้องหลังแล้วกลับไปที่ชาเล่ต์)"
2000805-179 = "(และพอกลับมาถึงชาเล่ต์ คุณครูก็เพิ่งรู้ตัวว่าหยิบปลอกคอติดมือกลับมาด้วย...)"

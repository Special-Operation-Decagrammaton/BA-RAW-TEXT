[translation]
90002060-1 = "第6話;馬爾庫斯"
90002060-9 = "老師，有緊急情況要報告！勞工機器人和十字神名的大多數兵力往這邊前進中！"
90002060-10 = "[s]「我們這邊也確認到了！英美的想法呢？」"
90002060-11 = "幫我建立防禦線。我也會儘快返回的。"
90002060-16 = "……現在收回剛剛說的話。追加確認到偵察兵力。我會盡可能擊潰後再回去。"
90002060-17 = "[s]「你不能受傷……知道嗎？」"
90002060-18 = "是在擔心我嗎？蠻開心的。"
90002060-19 = "沒辦法了。我也要前往現場讓老師擔心我。"
90002060-20 = "……不行，季必須保護老師。萬一老師出什麼事該怎麼辦。"
90002060-21 = "這樣說也有道理。那我選擇能更長久陪在老師身邊的方案吧。"
90002060-22 = "我，我們現在該做什麼……？"
90002060-23 = "……相信英美吧。我們提高這個區域的佔領度會更有幫助。"
90002060-24 = "沒錯，我也認為那樣比較實際合理。"
90002060-25 = "系統建構幾乎完成了。"
90002060-26 = "咦……？"
90002060-27 = "[s]「Kei，怎麼了？」"
90002060-28 = "就是……我們剛才不是在分析這片區域嗎？"
90002060-29 = "是的。為什麼這麼問？"
90002060-30 = "在不遠處似乎有個讓人在意的結構物……也就是某種設施。"
90002060-34 = "設施？"
90002060-35 = "是結構物嗎？"
90002060-36 = "那是什麼？很久以前被遺棄的古代遺跡之類的嗎？"
90002060-37 = "……這鋼鐵大陸本身都才形成沒多久，哪來什麼遺跡啊……"
90002060-38 = "但是……重點是那個「結構物」。必要時或許能作為防禦據點使用。"
90002060-39 = "沒錯，總比這裡四面八方都暴露出來還要安全。既然要建立防線，就改成在那裡進行吧。"
90002060-46 = "……"
90002060-47 = "……"
90002060-48 = "這，這裡是……？"
90002060-49 = "愛麗絲……知道。這種地方通常會藏著祕密技術或技能點數道具！"
90002060-53 = "[ns]「有點像……研究室？」"
90002060-54 = "沒錯……我也這麼認為。"
90002060-55 = "先把這裡的座標傳給英美吧。"
90002060-60 = "那是……？"
90002060-64 = "這些東西是不是……有點像那些孩子？"
90002060-65 = "那些也排列成好多個體。"
90002060-66 = "就像裝在玻璃管中的相同實驗體樣本呢。哇啊，真噁心……"
90002060-67 = "這個玻璃管……盒子上好像寫著什麼東西。"
90002060-72 = "<DEFECTED>……？是瑕疵品的意思嗎？"
90002060-73 = "……"
90002060-74 = "字典中是那樣，但這裡應該不是代表這個意思。"
90002060-75 = "那是什麼？"
90002060-76 = "這個應該是指……"
90002060-77 = "「帶有缺陷之物」的意思。"
90002060-78 = "帶有缺陷之物？"
90002060-89 = "好了，莉央。雖然只是初步分析，但似乎已經取得這些素體的資訊。"
90002060-90 = "在可動性方面沒有什麼大問題。現在只要植入類似意識迴路的裝置就能立刻運作。"
90002060-91 = "帶有缺陷之物……雖然被打上「標記」丟棄，狀況卻還不差的意思。"
90002060-92 = "是。但更深層的內部資訊……我嘗試對這些素體內部進行詳細分析。"
90002060-93 = "以我們目前的技術水準難以解析…… 也就是說，是以一種「古代」的方式進行加密保護。"
90002060-94 = "會說是古代方式是因為我有嘗試接觸過。"
90002060-95 = "呃嗯，如果能再多給我一些時間與預算，應該是有辦法破解的……"
90002060-100 = "呀呼~大家沒事吧？這裡是做什麼的地方啊？"
90002060-101 = "英美！沒事真是太好了。所以說這裡是……"
90002060-106 = "……哪裡啊？"
90002060-107 = "愛麗絲！？"
90002060-108 = "啊，愛麗絲醬！？"
90002060-109 = "看來是發現了設置在這裡的設施啊。"
90002060-110 = "設施外部已經使用AMAS建立第一層防線。"
90002060-111 = "嗯，那部分也確認完畢了，會長。敵方的偵察兵力也已經處理，短時間內是安全的。"
90002060-116 = "[ns]「什，什麼！？」"
90002060-122 = "外面！確認AMAS 防線全滅！"
90002060-123 = "怎麼會…？明明已經把偵查兵力消滅了啊……？"
90002060-124 = "先去確認吧！"
90002060-129 = "嗚，嗚哇啊啊啊啊！？"
90002060-130 = "姐姐，沒事吧？"
90002060-131 = "老師！那邊……！"
90002060-133 = "[ns]「咦……？」"
90002060-134 = "那是……？"
90002060-141 = "（從來沒見過的型態。但明顯屬於十字神名的特徵……該不會？)"
90002060-142 = "……馬爾庫特？"
90002060-143 = "馬爾庫特！？"
90002060-146 = "不愧是最瞭解我們的人。"
90002060-147 = "追逐星星之人，調月莉央。"
90002060-148 = "！？"
90002060-149 = "還有明星陽葵。"
90002060-150 = "和泉元英美和飛鳥馬季。"
90002060-151 = "無名之神的鑰匙。"
90002060-152 = "我的名字並不是那樣──"
90002060-153 = "不過天生具備的東西是無法改變的。對吧，<Kei>？"
90002060-154 = "……！！！"
90002060-155 = "最後，老師。"
90002060-162 = "[ns]「你是，馬爾庫特？」"
90002060-163 = "沒錯。我應該要說初次見面對吧。在這種時候。"
90002060-167 = "你好，各位，來自Ain、Soph、Aur的問候。"
90002060-168 = "我是在旗幟下被創造出來的意志，抵達世界盡頭的王國巡禮者。"
90002060-169 = "[ruby=Malkuth]馬爾庫特[/ruby]。"
90002060-173 = "那麼各位。雖然很突然，但請在這裡好好休息一段時間吧！"
90002060-174 = "！？老師！危險！"
90002060-180 = "啊啊啊啊啊呃──！！！"
90002060-184 = "[ns]「季！」"
90002060-185 = "一擊就把Abi-Eshuh狀態的季……！"
90002060-186 = "（這火力太誇張了。根本不是對手。這到底是……！)"
90002060-190 = "……？老師……？你打算做什麼！？"
90002060-191 = "[ns]往前站。"
90002060-195 = "[ns]擋在學生前面。"
90002060-196 = "這是在做什麼！老師一個人怎麼可能應付得了！"
90002060-197 = "我就知道你會站出來。老師，你果然如我所知道的那樣，真好。"
90002060-198 = "是打算以自己為代價，換取不傷害學生的談判嗎？"
90002060-199 = "[s]「……！」"
90002060-200 = "沒事的。老師，不需要做到這種地步的。"
90002060-201 = "你一臉疑惑的表情呢。是的，不過這也是正常的反應。"
90002060-202 = "但是老師。這一點我可以明確告訴你。"
90002060-203 = "我們並不想讓在場的任何人喪命。"
90002060-204 = "飛鳥馬季也是，只是給他一個不至於危及生命的攻擊罷了。"
90002060-211 = "老……師……"
90002060-213 = "請快躲開……我會，保護你的……"
90002060-217 = "無論發生什麼事，都要保護老師……和英美……還有最重要的，我自己……"
90002060-221 = "姐，姐姐大人！？時間已經……差不多了！動作請……快點！"
90002060-222 = "……"
90002060-223 = "當所有過程結束，迎來轉換的那一刻，各位也會理解所有的一切。"
90002060-224 = "因為我們要杜絕你們所有的罪與痛苦。"
90002060-225 = "[s]「怎麼做？」"
90002060-226 = "這很簡單。觸碰燒焦處，便會沾上焦痕。"
90002060-227 = "那麼一開始就讓人無法靠近燒焦處就可以了。"
90002060-228 = "[s]「我覺得有哪裡不太對。」"
90002060-229 = "我們並不是來徵求各位同意的。"
90002060-230 = "只是來宣告所有的一切都將如此發生而已。"
90002060-231 = "姐姐大人！傳遞思想固然好，但現在請優先處理別的事情！"
90002060-232 = "好了，各位。時機成熟了。"
90002060-233 = "我會懷著喜悅的心情，送你們走向巡禮的終點。"
90002060-240 = "咳……呃……！"
90002060-244 = "季？"
90002060-245 = "季！"
90002060-247 = "（極其刺眼的閃光遮蔽了視野）"
90002060-248 = "（反射性地閉上雙眼）"
90002060-252 = "老師！沒關係，有我們在。"
90002060-254 = "[ns]「彩奈？星奈！」"
90002060-255 = "輸出不足。能量流動對我們相當不利。但是不能就此退縮。"
90002060-256 = "不過我們會竭盡全力的！老師和學生們，都是重要的人！"
90002060-257 = "同意。如果不竭盡全力，將沒臉去面對老師與學生們。"
90002060-259 = "呃呃……！呃呃呃嗚……！"
90002060-260 = "……啊啊……"
90002060-261 = "拜託……拜託，再堅持一下……！"
90002060-265 = "儲存能量……餘量不足……"
90002060-270 = "星奈醬！？不，不行！至少讓我……！"
90002060-274 = "呃啊啊啊啊啊啊啊！！！"
90002060-278 = "……"
90002060-279 = "咦……？好像馬爾庫特的輸出突然減弱了。怎麼會…？"
90002060-280 = "！！！"
90002060-281 = "老師！是Kei！"
90002060-286 = "[ns]「Kei？危險！快退開！」"
90002060-287 = "還期待會說出什麼開場白， 結果果然如我所料。從某種意義上蠻佩服的。"
90002060-288 = "……但是也再次確認到老師是位始終如一的人。所以才能把愛麗絲託付給你。"
90002060-289 = "[s]「什麼……你打算做什麼！？」"
90002060-290 = "別擔心。鋼鐵大陸，在某種意義上充滿了無名之神的力量。"
90002060-291 = "而能像那些傢伙一樣操控這股力量的人，就是我。"
90002060-292 = "……實際在這裡使用才發現，被隨意改造過後有些陌生的感覺，不過呢…"
90002060-293 = "那位自稱馬爾庫特的預言者應該也很疑惑吧。"
90002060-295 = "真是令人意外。我倒是沒想到這個變數。"
90002060-296 = "呃……那個，姐姐大人……？有件事姐姐大人你好像需要知道。"
90002060-297 = "就是時間限制……剛剛已經到了……"
90002060-298 = "如，如果只是幾秒的話我會想辦法拖延時間的！但再多就……"
90002060-299 = "我明白了，Aur。會全力以赴的。"
90002060-304 = "什麼啊，這不可能……！輸出竟然還能再上升！？那是什麼怪物啊……！？"
90002060-305 = "沒，沒關係的，老師。都說沒關係的！有愛麗絲在，我並沒有倒下的打算！"
90002060-306 = "接收能量……整流……再輸出……"
90002060-307 = "呃啊啊啊啊──！！！"
90002060-312 = "呃呃──！！！"
90002060-314 = "別開……玩笑了……！"
90002060-315 = "現在站在面前的……！"
90002060-316 = "可是古老數百倍的意識體啊！！！！！"
90002060-320 = "姐，姐姐大人……"
90002060-321 = "真的到極限了！必須回來才行！"
90002060-322 = "沒關係，姐姐大人！結果怎樣都好！我們會想辦法的！比起那些，我們更珍惜姐姐大人啊！！！"
90002060-323 = "……"
90002060-324 = "我明白了，Ain、Soph、Aur。"
90002060-332 = "馬爾庫特……快速撤退了 ！"
90002060-333 = "老師，老師呢！？"
90002060-334 = "老師！"
90002060-335 = "你還好嗎，老師！？季、Kei、陽葵前輩、莉央前輩……！"
90002060-336 = "K，Kei醬……？"
90002060-337 = "Kei！？"
90002060-345 = "Kei？Kei！？Kei沒事吧！？拜託了！愛麗絲……請不要留下愛麗絲一個人！"
90002060-347 = "Kei！！！！！"
90002060-349 = "下一話;Kei"

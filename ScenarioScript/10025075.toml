[translation]
10025075-5 = "...นี่ก็วันสุดท้ายของเดือนแล้ว แต่ทำไมหมู่บ้านถึงดูมีชีวิตชีวากันนะ?"
10025075-6 = "แต่ก่อนผู้คนไม่กล้าแม้แต่จะออกมาจากบ้านเพราะกลัว <ตัวตนแห่งห้วงลึก> แต่ตอนนี้ออกมาตกปลา และทำอาหารกินกันบนชายหาดแบบนี้..."
10025075-7 = "...ทั้งหมดเป็นเพราะพวกคนต่างถิ่นนั่นแน่นอน เจ้าพวกนั้นมาสร้างความหวังที่ไร้ประโยชน์ให้หมู่บ้านนี้"
10025075-8 = "ไม่สำคัญหรอกว่าชาวบ้านจะคิดยังไงเกี่ยวกับเรื่องตำนานนั่น แต่ถ้า <เรือ> ลำนี้ถูกเปิดเผยละก็ คงเป็นเรื่องใหญ่แน่ๆ"
10025075-13 = "เอ่อ ประธาน... ไม่สิ กัปตัน"
10025075-14 = "ที่เราจะขนส่งสินค้าตอนเช้ามืดพรุ่งนี้ เราเลื่อนออกไปก่อนดีไหม?"
10025075-18 = "...ไม่ละ นี่เป็นโอกาสกอบโกยเงินเลยนะ จะมาเลื่อนออกไปเพราะกลัวสายตาของคนอื่นทำไม"
10025075-19 = "เราจะบรรทุกสินค้ากันเหมือนเดิม ยังไงพรุ่งนี้เช้าหมอกก็จะลงหนาอยู่แล้ว ไม่มีใครสังเกตเห็นเรือเรา#nกันได้ง่ายๆ หรอก"
10025075-20 = "และต่อให้เราถูกเปิดเผยตัวตน แต่ชาวบ้านพวกนี้ก็ไม่มีอาวุธอะไรน่ากลัวๆ เลยสักนิด... แค่เราใช้กำลัง#nโจมตีไปก็จบแล้ว"
10025075-21 = "งั้นพรุ่งนี้เช้าเราจะเอาเรือเข้าเทียบท่าแถวๆ <แนวปะการังยักษ์> ตามกำหนดการเดิมนะครับ"
10025075-27 = "เราโกยกุ้งทั้งหมดในหมู่บ้านมาหมดแล้ว ครั้งนี้ต้องได้เงินมหาศาลมาอยู่ในกำมือแน่"
10025075-28 = "ไว้ถ้าเราได้เงินที่เหลือมา แล้วจัดการขายเรือไปได้ละก็..."
10025075-29 = "เราก็จะได้ลาหมู่บ้านที่ทั้งเหนียวตัวแล้วก็มีแต่กลิ่นคาวนี้ได้เสียที!"

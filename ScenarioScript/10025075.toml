[translation]
10025075-5 = "……今天明明是新月，村子裡怎麼還吵吵鬧鬧的？"
10025075-6 = "原本因為害怕「深處的存在」而不敢踏出家門的人們，#n竟然開始在海邊釣魚、享受美食……"
10025075-7 = "……這全都是那些外地人的錯。#n呿，盡做些多餘的事。"
10025075-8 = "村民發現傳說只是編造的倒無所謂，#n不過萬一這艘「船」的存在被發現可就麻煩了……"
10025075-13 = "董事長……不，船長。"
10025075-14 = "預計明天凌晨進行的載貨工作需要延後嗎？"
10025075-18 = "不……這是賺大錢的大好機會，可不能因為害怕別人的目光就推延。"
10025075-19 = "工作依照計畫進行。#n根據預報，明天早上似乎會起濃霧……沒那麼容易被發現的。"
10025075-20 = "更何況……就算被發現，這裡的村民也不是我們的對手。#n稍作威脅就能讓他們閉嘴了吧。"
10025075-21 = "那麼就按照計畫停靠在「鬼岩礁」附近。"
10025075-27 = "只要把村子裡的所有[ruby= ・     ・ ]貨物[/ruby]都賣到黑市，這次肯定能大賺一筆。"
10025075-28 = "之後只要把錢收進口袋並處理掉所有船隻……"
10025075-29 = "就能跟這個散發惡臭的村子說再見了！"

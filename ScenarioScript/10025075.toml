[translation]
10025075-5 = "Looks like they're having a party on the beach..."
10025075-6 = "Those yokels should be hiding in their homes, cowering from the \"Deep Ones\" at this time of night..."
10025075-7 = "It's those damn tourists! They've given the locals...hope."
10025075-8 = "Well, it doesn't matter if they still believe in the Deep Ones or not, as long as no one sees our ship..."
10025075-13 = "Uh, Boss—er, Captain..."
10025075-14 = "Should we delay tomorrow morning's shipment?"
10025075-18 = "No. This is a big one, and we can't put our business on hold just because some girls are having a beach party."
10025075-19 = "We'll go ahead with the shipment. Besides, there'll be lots of fog tomorrow morning. No one will see us."
10025075-20 = "Even if they do, what are these bumpkins going to do? We'll overpower them if we have to."
10025075-21 = "Okay. Setting course for Devil's Reef..."
10025075-27 = "Look alive, men. We've got shrimp boxes to fill."
10025075-28 = "After taking that payday and selling this boat..."
10025075-29 = "We'll be able to say goodbye to this armpit of a village forever!"

[translation]
80000118-1 = "S+級可麗餅"
80000118-2 = "（收到綺羅羅傳來「又快被當掉了」的訊息後，來到了格黑娜的烹飪實習教室）"
80000118-4 = "這邊這邊～！"
80000118-5 = "嘿嘿，事情是這樣的，老師……"
80000118-6 = "我烹飪實習的分數超不妙的啦！"
80000118-7 = "[s]「都快被當掉了還這麼開心……！」"
80000118-8 = "我明明很用心的說～可是技術上好像還是有點問題……"
80000118-9 = "麵團不是破掉就是皺掉，整個亂七八糟的。"
80000118-10 = "嗯？我做的是什麼？"
80000118-11 = "那當然……是巧克力可麗餅囉！"
80000118-12 = "重點是要把薄薄的可麗餅皮煎好，再加入滿滿的巧克力！"
80000118-13 = "可是我總是在煎餅皮這個步驟就失敗了……"
80000118-14 = "[s]「好，那我們一起來解決問題吧！」"
80000118-15 = "嗯嗯！老師！"
80000118-17 = "（於是便和綺羅羅一起嘗試解決可麗餅的問題）"
80000118-18 = "（例如重新調整麵糊濃度、控制火力、檢查平底鍋的狀態……）"
80000118-19 = "（經過多次試錯之後，終於成功煎出了又圓又漂亮的可麗餅皮）"
80000118-21 = "老師，你看你看！終於煎得又平又完整了耶！"
80000118-22 = "好～接下來加上巧克力鮮奶油，然後再這樣折一折、捲起來……"
80000118-23 = "再堆上滿滿的巧克力、巧克力冰淇淋、巧克力餅乾──"
80000118-28 = "鏘鏘～！送給老師的情人節巧克力可麗餅就完成了！"
80000118-29 = "那麼～請老師幫我打分數吧！"
80000118-30 = "[s]「咦？打分數？」"
80000118-31 = "沒錯！其實這門課的指導老師就是你，而且修課的只有我一個人！"
80000118-32 = "其實我只是想趁著情人節，親手做可麗餅送給老師而已啦～嘿嘿。"
80000118-33 = "怎麼樣怎麼樣？味道有及格嗎？#n成績是……A+之類的？"
80000118-34 = "[s]「唔嗯……不。」"
80000118-35 = "咦咦？"
80000118-36 = "[s]「這種程度……應該要給個S+才行吧！」"
80000118-37 = "啊哈哈哈～謝謝老師！"
80000118-39 = "（之後和綺羅羅一起分享了那份堆滿巧克力的可麗餅）"

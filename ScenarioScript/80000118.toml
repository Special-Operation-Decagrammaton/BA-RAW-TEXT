[translation]
80000118-1 = "#title;S+의 크레이프"
80000118-2 = "#na;(또 낙제 위기라는 키라라의 메시지를 받고, 게헨나의 조리실습실로 갔다.)"
80000118-3 = "#all;hide"
80000118-4 = "3;키라라;00;이쪽이야, 쌤!\n#3;a\n#3;em;[반응]"
80000118-5 = "3;키라라;01;헤헤, 이번에는 말이지 선생님, 나……."
80000118-6 = "3;키라라;03;조리 실습 과목에서 낙제 위기랍니다!\n#3;em;[반짝]\n#3;closeup"
80000118-7 = "[s] \"낙제가 코앞인데 텐션이 높아……!\""
80000118-8 = "3;키라라;06;그게 말이야, 분명 정성은 빈틈없이 담았는데, 기술적인 문제라고 해야 할까…….\n#3;em;[속상함]"
80000118-9 = "3;키라라;04;반죽이 자꾸 찢어지거나, 구겨지거나, 난리도 아니더라고."
80000118-10 = "3;키라라;02;아? 메뉴가 뭐냐고?"
80000118-11 = "3;키라라;11;그건 바로…… 초콜릿 크레이프!\n#3;em;[!]"
80000118-12 = "3;키라라;11;얇게 구워서 말아 낸 크레이프에 풍성하게 초콜릿을 담아내는 게 핵심이야!"
80000118-13 = "3;키라라;06;그런데 반죽을 굽는 단계부터 실패해 버려서…….\n#3;em;[훌쩍]"
80000118-14 = "[s] \"좋아, 그러면, 같이 문제를 해결해 볼까?\""
80000118-15 = "3;키라라;03;응응! 좋아, 선생님!\n#3;em;[재잘]\n#3;hophop"
80000118-16 = "#all;hide"
80000118-17 = "#na;(그 뒤로 키라라와 함께 크레이프의 문제를 해결해 나갔다.)"
80000118-18 = "#na;(반죽의 농도를 다시 맞추고, 불의 세기도 조절해 보고, 팬의 상태도 다시 점검했다.)"
80000118-19 = "#na;(그렇게 여러 차례의 시행착오 끝에, 동그랗고 깔끔한 크레이프를 부쳐 낼 수 있었다.)"
80000118-20 = "#all;hide"
80000118-21 = "3;키라라;03;이것 봐 선생님! 드디어 찢어지지 않고 매끈하게 부쳐졌어!\n#3;em;[음표]\n#3;a"
80000118-22 = "3;키라라;01;자 그럼, 초콜릿 크림을 얹고, 이렇게 접어서 말아낸 뒤에……."
80000118-23 = "3;키라라;11;초콜릿과 초코 아이스크림과 초코 과자를 이렇게 듬뿍 얹으면……!"
80000118-24 = "#st;[0,0];instant;1;"
80000118-25 = "#clearST"
80000118-26 = "3;키라라;11\n#3;m1\n#wait;1500"
80000118-27 = "#wait;1500"
80000118-28 = "3;키라라;03;짜잔! 선생님을 위한 발렌타인 초콜릿 크레이프! 완성!\n#3;em;[!]"
80000118-29 = "3;키라라;01;그럼 채점 부탁할게!\n#3;m3\n#3;em;[하트]"
80000118-30 = "[s] \"응? 채점?\""
80000118-31 = "3;키라라;09;응! 사실 이 과목의 담당 교사는 선생님이거든! 수강자는 나 혼자!\n#3;em;[재잘]"
80000118-32 = "3;키라라;00;사실 발렌타인데이 기념으로 선생님한테 직접 만든 크레이프를 주고 싶어서 말이야, 헤헷."
80000118-33 = "3;키라라;11;그래서, 어때 어때? 낙제는 면할 정도의 맛이야? 성적은? A+?\n#3;em;[반짝]\n#3;closeup"
80000118-34 = "[s] \"음…… 아니.\""
80000118-35 = "3;키라라;06;에에?\n#3;closeup"
80000118-36 = "[s] \"이 정도면…… S+는 받아야지……!\""
80000118-37 = "3;키라라;03;아하핫! 고마워, 선생님!\n#3;closeup\n#3;hophop\n#3;em;[재잘]"
80000118-38 = "#all;hide"
80000118-39 = "#na;(그렇게 크레이프 위에 소복이 쌓인 초콜릿을 키라라와 나눠 먹었다.)"

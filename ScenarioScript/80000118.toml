[translation]
80000118-1 = "เครป S+"
80000118-2 = "(หลังจากได้รับข้อความมาจากคิราระว่าเธออยู่ในวิกฤตหมิ่นเหม่ที่จะสอบตก คุณครูก็รีบมาที่ห้องฝึก#nคหกรรมของเกเฮนน่าทันที)"
80000118-4 = "ทางนี้ ครู!"
80000118-5 = "แหะๆ คือว่านะคุณครู คราวนี้ฉันน่ะ..."
80000118-6 = "อยู่ในวิกฤตที่อาจสอบทำอาหารไม่ผ่านละ!"
80000118-7 = "[s] \"จะสอบตกอยู่แล้วยังมาอารมณ์ดีอยู่อีก...!\""
80000118-8 = "เรื่องนั้นน่ะ อันที่จริงฉันก็ใส่ใจทุกรายละเอียดแล้วนะ แต่คงมีปัญหาด้านเทคนิคนิดหน่อย..."
80000118-9 = "แป้งมันขาดบ้าง ย่นบ้าง ไม่ก็เละตุ้มเป๊ะบ้าง เละไม่เป็นท่าเลยละ"
80000118-10 = "หืม? ฉันทำเมนูอะไรงั้นเหรอ?"
80000118-11 = "ก็... เครปช็อกโกแลตไงล่ะ!"
80000118-12 = "เคล็ดลับคือต้องทำแป้งเครปให้บางๆ ใส่ไส้ช็อกโกแลตจุกๆ แล้วก็ม้วนให้สวยงาม!"
80000118-13 = "แต่ตอนนี้ฉันล้มเหลวตั้งแต่ขั้นตอนการทำแป้งเลย..."
80000118-14 = "[s] \"ดีละ งั้นมาแก้ปัญหาด้วยกันมั้ย?\""
80000118-15 = "อื้อๆ ดีเลย คุณครู!"
80000118-17 = "(หลังจากนั้นคุณครูก็ช่วยคิราระแก้ปัญหาเรื่องเครป)"
80000118-18 = "(ลองปรับสัดส่วนของแป้งใหม่ ปรับความแรงของไฟ และตรวจดูสภาพของกระทะที่ใช้อย่างละเอียด)"
80000118-19 = "(หลังจากที่ลองผิดลองถูกมาหลายครั้ง... ในที่สุดก็สามารถอบแป้งเครปให้กลมสวยแบบไม่มีรอยขาด#nได้สำเร็จ)"
80000118-21 = "คุณครูดูนี่สิ! ในที่สุดฉันก็ทำได้แบบไม่ขาดเลย!"
80000118-22 = "เอาละ ต่อไปก็ใส่ครีมช็อกโกแลตลงไปจุกๆ แล้วก็พับแบบนี้..."
80000118-23 = "จากนั้นก็โปะช็อกโกแลต ไอศกรีมช็อกโกแลตและขนมรสช็อกโกแลตท็อปเข้าไปอีก...!"
80000118-28 = "แต่นแต๊น! และเครปช็อกโกแลตวันวาเลนไทน์ที่ตั้งใจทำเพื่อคุณครูก็เสร็จเรียบร้อย!"
80000118-29 = "งั้นก็ช่วยให้คะแนนด้วยนะ!"
80000118-30 = "[s] \"หืม? ให้คะแนน?\""
80000118-31 = "อื้อ! อันที่จริงผู้สอนที่รับผิดชอบวิชานี้ก็คือคุณครูน่ะ! แล้วนักเรียนที่เรียนก็มีฉันแค่คนเดียว!"
80000118-32 = "จริงๆ แล้วฉันแค่อยากทำเครปวันวาเลนไทน์ให้คุณครูด้วยตัวเองน่ะ ฮิฮิ"
80000118-33 = "แล้วเป็นไงบ้าง? รสชาติเป็นไงบ้าง? พอจะสอบผ่านรึเปล่า? คะแนนล่ะ? เกรด A+ เลยมั้ย?"
80000118-34 = "[s] \"อืม... ไม่หรอก\" "
80000118-35 = "เอ๋?"
80000118-36 = "[s] \"ถ้าขนาดนี้น่ะ... เอา S+ ไปเลย...!\""
80000118-37 = "อะฮ่าฮ่า! ขอบคุณนะคุณครู!"
80000118-39 = "(หลังจากนั้นคุณครูกับคิราระก็แบ่งเครปช็อกโกแลตที่อัดแน่นไปด้วยท็อปปิ้งกินด้วยกันคนละครึ่ง...)"

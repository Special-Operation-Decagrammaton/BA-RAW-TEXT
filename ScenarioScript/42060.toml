42060-1 = "#title;제6화;후배의 고뇌"
42060-2 = "#place;코우사기 공원"
42060-3 = "#na;(공원에 돌아온 후, RABBIT 소대로부터 작전 중 있었던 일에 대해 들었다.)"
42060-4 = "[ns] \"그때 샬레에 들어왔던 특수 부대가 FOX 소대였구나……\""
42060-5 = "3;미야코;06;……미리 말씀드리지 못해 죄송합니다.\n#3;em;[속상함]\n#3;a"
42060-6 = "3;사키;04;미안. 우리의 실수 때문에 선생님이 위험에 빠졌다고 생각하니, 어쩐지 초조해져서……\n#3;a"
42060-7 = "[s1] \"괜찮아. 너무 신경 쓰지 마.\"\n[s2] \"너희들의 잘못이 아니니까.\""
42060-8 = "3;미유;06;하지만 저희는 그런 줄도 모르고 마음 편히 공원에서 캠핑이나 하고 있었던 걸요.\n#3;em;[세로선]\n#3;a"
42060-9 = "3;미유;06;하지만 저희는 그런 줄도 모르고 마음 편히 공원에서 캠핑이나 하고 있었던 걸요.\n#3;a\n#3;em;[세로선]"
42060-10 = "3;미유;08;게다가 지난 일의 답례라며 선생님께 비싼 소고기까지 잔뜩 얻어먹었는데……\n#3;stiff"
42060-11 = "3;미유;08;저희 사정에 같은 가격의 소고기를 새로 물어드릴 수도 없고……"
42060-12 = "3;미유;09;이, 이렇게 된 이상 매일 저희 몫의 폐기 도시락을 선생님께 가져다 드려는 수밖에……!\n#3;em;[!]\n#3;hophop"
42060-13 = "[s] \"저, 정말로 괜찮으니까 신경 쓰지 마……!\""
42060-14 = "3;미야코;99;지금의 저희가 선생님께 속죄할 수 있는 방법은 선배들이 샬레에서 가져간 물건의 정체를 파악하고, 이를 제자리에 돌려놓는 것뿐이겠지요.\n#3;em;…"
42060-15 = "3;미야코;06;……FOX 소대의 선배들을 상대로 물건을 탈취할 수 있을지는 미지수입니다만."
42060-16 = "3;사키;04;그런데 선배들이 샬레에서 가져간 물건은 도대체 뭘까?\n#3;em;[?]"
42060-17 = "3;사키;04;사라져도 쉽게 눈에 띄지 않고, 카메라에 찍힌 영상을 보아도 그리 큰 물건처럼 보이지는 않는데……"

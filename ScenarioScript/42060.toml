42060-43 = "3;미유;02\n2;사키;02;하지만 상냥한 인품과는 별개로, 난전 속에서도 판단력이 흐려지지 않는 냉철한 이성의 소유자이기도 하지.\n#2;a\n#3;m4"
42060-44 = "2;사키;99;그렇게 수많은 난전을 겪으면서도, 작전 중에 소모된 탄환이나 보급품의 숫자를 단 한 번도 누락한 적이 없다고 하니까."

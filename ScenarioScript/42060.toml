[translation]
42060-1 = "Episode 6;A RABBIT's Distress"
42060-2 = "Kousagi Park"
42060-3 = "Back at the park, the RABBIT Squad filled me in on their discovery earlier in the day, and the ensuing operation."
42060-4 = "[ns] \"So the FOX Squad was behind the Schale incident...\""
42060-5 = "We should've told you from the beginning."
42060-6 = "It's one thing for us to mess up. It's another thing for our mess-up to endanger you, Sensei. I guess we were kind of scared to tell you..."
42060-7 = "[s1] \"You did great. There's nothing to worry about.\" \n[s2] \"It's okay. None of this is your fault.\""
42060-8 = "But we were totally clueless, j-just happily camping at the park..."
42060-9 = "But we were totally clueless, j-just happily camping at the park..."
42060-10 = "And you brought us all that expensive beef to thank us! F-For something we caused!"
42060-11 = "And w-we're just poor, homeless students... So we can't even pay it back!"
42060-12 = "The only thing we have to offer is expired bento! P-Please take it as thanks!"
42060-13 = "[s] \"No need, really! I'm perfectly fine without it!\""
42060-14 = "We'll make it right by finding out what they took from Schale and retrieving it."
42060-15 = "But taking on the FOX Squad won't be easy."
42060-16 = "We'll have to at least ascertain what it is they took first..."
42060-17 = "It's not something anyone's been missing, and it didn't look big in the footage..."
42060-19 = "Expensive tuna cans? Teacher's underwear?!"
42060-20 = "Sensei's underwear...?!"
42060-22 = "The idea of the seniors breaking into Schale armed to the teeth just to steal underwear is...unnerving."
42060-26 = "[ns] \"We can worry about that later.\""
42060-28 = "[ns] \"I'd like to know more about the FOX Squad members.\""
42060-29 = "It slipped my mind that you wouldn't be familiar with them."
42060-30 = "To summarize the FOX Squad's seniors in a nutshell..."
42060-31 = "They're Kivotos' elite."
42060-32 = "Elite forces with the combat capabilities of SRT are a dime a dozen. But when it comes to special ops? They're insurmountable."
42060-33 = "They're trained to handle any situation in any kind of environment. Their skills go way beyond just combat."
42060-34 = "They were the ideal. They were the unit that not only met, but embodied all that was expected of SRT agents."
42060-35 = "For example, the FOX Squad's Deputy Leader, Niko..."
42060-38 = "She's the \"squad mom,\" you know? Her capacity for acceptance and patience are unmatched. And I know, because I definitely tested it. Heehee."
42060-39 = "She used to pack inarizushi lunches for any squad leaving for a mission..."
42060-40 = "Niko was everyone's rock. Other squads would come to her for advice all the time."
42060-42 = "N-Niko helped me a lot when I was new..."
42060-43 = "She's not just nice though. No matter how hopeless an operation is, Niko never panics. Her ability to stay calm and evaluate a situation is invaluable."
42060-44 = "They say she's never lost count of the ammo or supplies the squad's used in any operation, even with all those messy battles under her belt."
42060-45 = "...In that sense, Moe, you could to take a cue from Niko."
42060-46 = "Don't deny that you find something exhilarating about emptying the entire magazine once in a while too!"
42060-47 = "...Then there was Kurumi, the FOX Squad's resident grump and point woman."
42060-50 = "Well, being on the front lines all the time makes you a little high-strung, you know?"
42060-51 = "You can't let your guard down for even a second. It could mean life or death for the whole squad."
42060-52 = "And Kurumi's real power shines in her quick, flexible responses to the unexpected."
42060-53 = "She's unflappable through every ambush and attack. The way she can analyze her terrain and use it to her advantage under pressure is really impressive."
42060-55 = "I've actually heard that about her too."
42060-56 = "When her gun malfunctioned smack in the middle of enemy territory, she didn't waste a second. She just grabbed the nearest enemy's weapon and started breaking through them with their own firepower."
42060-57 = "If it were up to me, I probably would've followed my field manual and tried to fix it. I couldn't have turned it around like she did."
42060-58 = "I'm way more book-smart than street-smart, so I can't help but admire adaptability in other people."
42060-62 = "Now, Otogi, the sniper in the FOX Squad..."
42060-65 = "I-I didn't get to talk to her much, but I've never met a sniper like her before..."
42060-66 = "You're right in that assessment. She definitely isn't your usual lone wolf sniper who prefers to be hidden away."
42060-67 = "Otogi's got this natural charisma that really commands a room. The spotlight seemed to follow her at SRT."
42060-69 = "[ns] \"I've never met a sniper with a presence like hers.\""
42060-70 = "She is pretty weird in that sense. You normally want your snipers quiet, invisible, so they can hit their mark unnoticed. But when Otogi enters the field, you know."
42060-71 = "I had to go against her in a training drill once, and it was so hard! I was totally on edge, not knowing where her bullets would come from next, but knowing she was there..."
42060-72 = "They say a good sniper neutralizes three enemies for every one bullet shot."
42060-73 = "And good coordination is really important so your teammates can benefit from any intel you gather..."
42060-74 = "Compared to her, I...I mean, sometimes even my own teammates forget I exist."
42060-75 = "Th-That was one time...and it wasn't your fault at all..."
42060-76 = "She's right! The idiot who didn't realize we were missing a member is to blame! It's not that hard to keep track of three people!"
42060-77 = "Sh-Shut up! It wasn't like that at all!"
42060-81 = "And then there's Yukino, the FOX Squad's leader..."
42060-85 = "A.K.A. Little Miss Perfect. And, like, actually perfect, not like when I'm making fun of Saki."
42060-86 = "...It's true though. Yukino's unmatched. She manages and directs the squad members' movements down to the second."
42060-87 = "That squad trusts her more than they trust themselves. If she told them to jump off a plane with no parachute, they would do it with complete faith they would be okay."
42060-89 = "[ns] \"That was certainly a favorable evaluation.\""
42060-90 = "Yes... Those seniors were our wildest dreams."
42060-91 = "We aspired to them. They were our role models."
42060-92 = "Anything our RABBIT Squad could accomplish, it's not just that the FOX Squad could do it too... They would do it better, faster, more efficiently, and smarter."
42060-96 = "[ns] \"You'd be surprised at how imperfect 'perfect' people actually are.\""
42060-98 = "[ns] \"And, Miyako? The RABBIT Squad is not replaceable.\""
42060-100 = "...Do you think so?"
42060-101 = "It's hard not to think that way, I suppose."
42060-102 = "Because the Yukino in my memory, the way she glowed on the TV screen..."
42060-103 = "That doesn't matter. She seemed different. Older? Mature?"
42060-104 = "Maybe she grew up while she was gone... Somewhere I couldn't go..."
42060-105 = "...There's so much I don't understand."
42060-106 = "Maybe they were right. If we still haven't grown through all of this, maybe it is time to throw in the towel. Follow orders, and let people smarter and better than us shoulder all these responsibilities..."
42060-107 = "What...would the three of you want to do?"
42060-108 = "Even if you ask us..."
42060-109 = "It's just r-really overwhelming..."
42060-114 = "What is that sound?"
42060-115 = "Is it the emergency broadcast from the General Student Council...?"
42060-116 = "Do you think it's related to the recent attack?!"
42060-117 = "All citizens of Kivotos, this is a critical announcement."
42060-118 = "In a few moments, we will deliver an urgent statement on behalf of the Kivotos General Student Council."
42060-119 = "We urge all residents to tune in to the official General Student Council channel or the Kronos channel to hear this pressing message."
42060-120 = "The General Student Council's official channel?! Where's my phone?!"
42060-121 = "There's a much, much bigger screen you can use instead."
42060-122 = "Look up."
42060-123 = "Is that a video...on the side of an airship?"
42060-125 = "Greetings, citizens of Kivotos."
42060-126 = "I'm Shiranui Kaya, the head of the Kivotos General Student Council's Defense Office."
42060-127 = "I'm sorry for addressing you so unexpectedly today, but it is an urgent matter."
42060-128 = "In recent times, our city has faced numerous crises."
42060-129 = "A mysterious structure descended from the sky, paralyzing our city and causing extensive damage not only to the D.U. but also to every academy district."
42060-130 = "Unfortunately, as the General Student Council, we failed to effectively respond to this monumental crisis and provide a resolution. Instead, we relied on decisions made by Schale and the individual districts to mitigate the damages."
42060-131 = "This was due to the absence of Nanagami Rin, the acting General Student Council president, during the time of the incident. This has resulted in her relinquishing her responsibilities."
42060-132 = "Criticism regarding her failure to fulfill her duties as acting General Student Council president has persisted, even within the Board of Administration."
42060-133 = "Finally, today, a vote of no confidence in Chief Officer Nanagami was passed."
42060-134 = "I, Shiranui Kaya, have been duly sworn in as the new acting General Student Council president."
42060-136 = "What...? New acting General Student Council president?!"
42060-137 = "This transition is not a matter we take lightly."
42060-139 = "We acknowledge that many of you are likely concerned about this sudden change in the General Student Council's leadership."
42060-140 = "Nevertheless, we are committed to restoring normalcy in Kivotos and seek your support for the new Board of Administration that will be established."
42060-142 = "And lastly..."
42060-143 = "[USERNAME] Sensei."
42060-144 = "I'm sure you're watching this broadcast from somewhere right now, Sensei."
42060-145 = "For the sake of the future of Kivotos and Schale, please abide by my request, [USERNAME] Sensei."
42060-146 = "As soon as this broadcast is over, we request your presence in the General Student Council's reception room."
42060-147 = "All members of the General Student Council eagerly anticipate your visit."
42060-148 = "Thank you, and farewell. I look forward to Kivotos' future."
42060-153 = "[ns] \"What exactly is going on here?\""
42060-155 = "...The General Student Council is in crisis."
42060-157 = "Next Episode; Coup d'etat"

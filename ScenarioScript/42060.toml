42060-28 = "[ns] \"FOX 소대의 학생들은 어떤 아이들이야?\""
42060-29 = "3;미야코;02;그렇군요. 선생님께서는 아직 FOX 소대의 선배들에 대해 잘 모르실 테니……\n#3;a"

[translation]
42060-1 = "第6話;後輩の苦悩"
42060-2 = "子ウサギ公園"
42060-3 = "（公園に戻り、RABBIT小隊から話を聞いた）"
42060-4 = "[ns] \"あの時、シャーレにいたのはFOX小隊だったんだ……。\""
42060-5 = "はい。#nすみません、事情をお話できなくて……。"
42060-6 = "私たちのせいで先生が危険な目にあったと思うと、申し訳なくてな……。"
42060-7 = "[s1] \"大丈夫、あまり気にしないで。\"\n[s2] \"みんなのせいじゃないから。\""
42060-8 = "でも……私たちは何も知らずに呑気に公園でキャンプしてて……"
42060-9 = "でも……私たちは何も知らずに呑気に公園でキャンプしてて……"
42060-10 = "先生には、高いお肉までごちそうになったのに……#n先生はお礼だと言ってくださったけど、逆に私たちが先生に謝罪しないといけないくらいで……"
42060-11 = "でも、もうお肉は食べてしまって……お代を払おうにも、私たちじゃ雀の涙くらいしか出せませんし……。"
42060-12 = "こうなったらもう……毎日の廃棄弁当を先生に全部渡すしか……！"
42060-13 = "[s] \"ほ、本当に大丈夫だから……！\""
42060-14 = "今の私たちが罪滅ぼしにできることは、先輩方がシャーレから持っていったものを取り戻すことです。"
42060-15 = "……FOX小隊の先輩方相手に、可能かどうかは不安が残りますが。"
42060-16 = "というか、先輩方は一体シャーレから何を持っていったんだ？"
42060-17 = "なくなっても先生が気付かないような物なんだろう？#nカメラの映像を見るに、そこまで大きい物じゃなさそうだけど……。"
42060-19 = "高価なマグロの缶詰とか……。"
42060-20 = "先生の下着、とか……？"
42060-22 = "……先輩が先生の下着を盗むためだけに完全武装してシャーレに潜入したなんて想像したくもないな……。"
42060-26 = "[ns] \"……それは一旦置いておいて。\""
42060-28 = "[ns] \"まずはFOX小隊について教えてほしいな。\""
42060-29 = "FOX小隊について、ですか……そうですね……。"
42060-30 = "一言で表すなら――"
42060-31 = "――キヴォトスで最も優秀な特殊部隊だ。"
42060-32 = "通常の戦闘力だけなら、各学園にもSRTに匹敵する奴らはそこそこいる。#nだが、特殊な状況下での作戦において、FOX小隊を超える集団はいないだろう。"
42060-33 = "特殊部隊は通常の交戦のみならず、様々な状況下で作戦を遂行できるように訓練されています。"
42060-34 = "中でもFOX小隊は、SRTが求める能力をすべて備えている理想の部隊と言えるでしょう。"
42060-35 = "例えば、副小隊長のニコ先輩は――"
42060-38 = "小隊員みんなをあたたかく見守る「小隊のお母さん」って感じかな。"
42060-39 = "野戦前の部隊に手作りのおいなりさんを差し入れたり……。"
42060-40 = "別の小隊員からも悩み相談をされるくらい、みんなに親しまれている先輩でしたね。"
42060-42 = "私も入学したばかりの頃は、いっぱいニコ先輩に助けられたな……。"
42060-43 = "だが、優しい性格とは裏腹に乱戦の中でも的確な判断を下す冷静さも持ち合わせている。"
42060-44 = "噂によると、作戦中に消耗した弾丸や補給品の数をすべて覚えているのだとか。"
42060-45 = "……そういう意味ではモエ、お前も少しはニコ先輩を見習ったらどうだ。"
42060-46 = "なによ！全弾発射はロマンなんだから！"
42060-47 = "……それに比べて、クルミ先輩はカリカリしてることが多かったなぁ。"
42060-50 = "だが、常に緊張感を持って作戦に挑むポイントマンの鑑でもある。"
42060-51 = "最前線では少しでも気を抜くとやられてしまうからな。"
42060-52 = "それに、クルミ先輩は様々な状況に柔軟に対処する力を持っています。"
42060-53 = "作戦中に奇襲や予期せぬ状況に陥っても決して慌てず、#n周囲の地形を利用して進路を確保できるのだとか。"
42060-55 = "その話、私も聞いたことある。"
42060-56 = "なんでも、敵陣のど真ん中で銃器が故障した時、#n敵の武器を奪って突破したらしいね？"
42060-57 = "……すごいな。#n私だったら教範通りに銃を修理しようとして作戦を台無しにしてしまう気がする。"
42060-58 = "私みたいな人間からしたら、あの柔軟な思考はそれだけで羨ましい才能だ。"
42060-62 = "オトギ先輩はFOX小隊の狙撃手で――"
42060-65 = "あんまり話したことはないけど……他の狙撃手とは違う感じがしました……。"
42060-66 = "まあ、隅っこでギリースーツを畳んでるような一匹狼タイプじゃなかったねぇ。"
42060-67 = "オトギ先輩はかなり目立つタイプで……#nSRT特殊学園内でもよく話題の中心にいる方でしたね。"
42060-69 = "[ns] \"狙撃手にとって目立つのって悪手じゃないの？\""
42060-70 = "そうでもないぞ。単にターゲットを狙撃するだけならともかく、#n乱戦中に敵歩兵の足止めをするにはある程度の存在感が必要だからな。"
42060-71 = "一度訓練でオトギ先輩のいるチームと戦ったことがあるが、#n銃弾がどこから飛んでくるかわからないプレッシャーで中々動けなかったな……。"
42060-72 = "優れた狙撃手は、弾丸一発で3人以上の敵を無力化できるといいます……。"
42060-73 = "それに……偵察情報を活用するためには仲間との連携も欠かせないですし……。"
42060-74 = "先輩と比べると私は……味方にも存在を忘れられちゃいますし……。"
42060-75 = "だ、だからあれはミユのせいじゃなくて……。"
42060-76 = "小隊員の数も数えられないおバカなサキのせいだよ。"
42060-77 = "うるさい！"
42060-81 = "最後に、リーダーのユキノ先輩は――"
42060-85 = "……あの人は完璧すぎて欠点がないよね～"
42060-86 = "ああ、なにせ小隊員の動きを秒単位で統制していたらしいからな。"
42060-87 = "仲間からもすごく信頼されていて……ユキノ先輩の命令なら、#nFOX小隊はどんな任務でも動くみたいです……。"
42060-89 = "[ns] \"かなり評価されているんだね……。\""
42060-90 = "……先輩方は、私たちの夢でした。"
42060-91 = "目指すべき目標であり、憧れの存在。"
42060-92 = "FOX小隊はあらゆる任務において――RABBIT小隊以上の活躍をしますから。"
42060-96 = "[ns] \"世の中に完璧な人なんていないよ。\""
42060-98 = "[ns] \"それに、みんなにしかできないこともあると思うよ。\""
42060-100 = "……そう、ですか。"
42060-101 = "ですが、少なくとも私はそう思っています。"
42060-102 = "でも……あの時のユキノ先輩は、眩しいくらいに輝いていたのに……"
42060-103 = "どうして今は、あのような事を言うのでしょうか。#nまるで、全てを諦めてしまった大人のような……。"
42060-104 = "私の知らないどこかで、先輩は変わってしまったのでしょうか……。"
42060-105 = "……何も、分かりません。"
42060-106 = "子どもである私たちは、先輩に責任を預けて――言われた通りに行動すべきなのでしょうか……？"
42060-107 = "……みなさんはどう思いますか？"
42060-108 = "私に聞かれても……。"
42060-109 = "わ、わからないよ……。"
42060-114 = "これは……。"
42060-115 = "連邦生徒会の緊急アラート……？"
42060-116 = "まさか、また……！？"
42060-117 = "<キヴォトスの皆様にお知らせいたします。>"
42060-118 = "<間もなく、キヴォトス連邦生徒会より緊急声明が発表されます。>"
42060-119 = "<市民の皆様は、連邦生徒会の公式チャンネル、#nもしくはクロノスチャンネルをご覧ください。>"
42060-120 = "連邦生徒会の公式チャンネル？#nスマホはどこに置いたっけ……。"
42060-121 = "……いや、スマホは要らないと思うよ。"
42060-122 = "見て、あそこ。"
42060-123 = "飛行船に……映像が……。"
42060-125 = "キヴォトスの皆様、こんにちは。"
42060-126 = "キヴォトス連邦生徒会の防衛室長、[ruby=しらぬい]不知火[/ruby]カヤです。"
42060-127 = "突然このような発表を行い、市民の皆様にご心配をおかけすることを深くお詫び申し上げます。"
42060-128 = "……昨今、キヴォトスは数々の未曾有の惨事に見舞われてきました。"
42060-129 = "空から落ちてきた正体不明の構造物によって都市の機能が麻痺し、#nD.U.はもちろん各自治区においても、甚大な被害が発生しました。"
42060-130 = "しかし連邦生徒会はこのような危機的状況の解決をシャーレと各自治区に任せ、#n復旧作業にのみ注力していました。これは非常に恥ずべきことであると考えます。"
42060-131 = "……これらは全て、最終決定者――そして連邦生徒会長の代行である[ruby=なながみ]七神[/ruby]リンが事件当時、行方を眩ませ、責任を放棄した事に由来する問題です。"
42060-132 = "本件を受け、防衛室内では七神行政官の責任問題を追求し……。"
42060-133 = "ついに本日――保留中だった、七神行政官に対する不信任決議案が可決されました。"
42060-134 = "それに伴い、新しい連邦生徒会長代行に私、不知火カヤが就任いたします。"
42060-136 = "新しい連邦生徒会長代行ぉ！？"
42060-137 = "連邦生徒会長の代行なんて、そう簡単に変えられるものじゃないはずだが……。"
42060-139 = "市民の皆様におかれましては、#n突然の連邦生徒会長代行の変更に驚かれていることと思います。"
42060-140 = "しかし、私たちはキヴォトスの「正常化」のために最善を尽くしますので、#n新たな行政委員会に皆様のご声援をお願いいたします。"
42060-142 = "……そして最後に。"
42060-143 = "[USERNAME]先生。"
42060-144 = "先生も、どこかでこの放送をご覧になられていることでしょう。"
42060-145 = "キヴォトスとシャーレの未来のために、[USERNAME]先生に折り入ってのご相談がございます。"
42060-146 = "この放送が終わり次第、連邦生徒会のレセプションルームへお越しくださいませ。"
42060-147 = "連邦生徒会一同、先生のお越しを心よりお待ちしております。"
42060-148 = "それでは。"
42060-153 = "[ns] \"……どういうこと？\""
42060-155 = "……連邦生徒会に、何かが起きているようですね。"
42060-157 = "次回;クーデター"

42060-31 = "3;사키;99;……키보토스에서 가장 유능한 특수부대원들이지."
42060-32 = "3;사키;02;평시의 전투력만 비교한다면 각 학원에도 SRT에 맞먹는 엘리트 집단은 제법 있겠지만, 특수한 상황에서의 작전 성과만 두고 본다면 FOX 소대를 능가하는 팀은 없을 거야."
42060-33 = "3;미야코;02;특수부대는 단순한 교전 상황뿐만 아니라, 다양한 환경과 상황 속에서도 작전을 속행할 수 있도록 훈련된 집단."
42060-34 = "3;미야코;01;FOX 소대는 SRT가 요구하는 능력을 모두 갖추고 있는 이상적인 부대라고 할 수 있습니다."

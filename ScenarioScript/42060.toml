[translation]
42060-1 = "ตอนที่ 6;ความทุกข์ใจของรุ่นน้อง"
42060-2 = "โคะอุซางิ การ์เด้น"
42060-3 = "(หลังจากมาถึงสวนสาธารณะ คุณครูก็ได้ฟังเรื่องปฏิบัติการที่กองทหาร RABBIT ไปทำมา)"
42060-4 = "[ns] \"หน่วยรบพิเศษที่เข้ามาในชาเล่ต์ตอนนั้นคือกองทหาร FOX สินะ...\""
42060-5 = "... ขอโทษที่เราไม่ได้บอกคุณครูก่อนหน้านี้ด้วยนะคะ"
42060-6 = "ขอโทษนะ ที่ไม่กล้าบอกก็เพราะคิดว่าคุณครูต้องมาตกอยู่ในอันตรายที่พวกเราสะเพร่ากันน่ะ..."
42060-7 = "[s1] \"ไม่เป็นไร ไม่ต้องคิดมากนะ\"\n[s2] \"นี่ไม่ใช่ความผิดของพวกเธอหรอก\""
42060-8 = "แต่พวกฉันตั้งค่ายอยู่ในสวนสาธารณะกันอย่างสบายใจโดยไม่รู้เลยว่าสิ่งที่ทำไปจะส่งผลอะไรบ้างนี่คะ"
42060-9 = "แต่พวกฉันตั้งค่ายอยู่ในสวนสาธารณะกันอย่างสบายใจโดยไม่รู้เลยว่าสิ่งที่ทำไปจะส่งผลอะไรบ้างนี่คะ"
42060-10 = "แถมคุณครูยังเอาเนื้อราคาแพงมาเลี้ยงตอบแทนเพราะเรื่องนั้นด้วยอีก..."
42060-11 = "พวกฉันไม่มีปัญญาซื้อเนื้อแพงๆ แบบนั้นคืนให้ด้วย..."
42060-12 = "ทะ... ที่ทำได้ก็คงจะมีแต่เอาข้าวกล่องที่เหลือไปให้คุณครูทุกวันแทน...!"
42060-13 = "[s] \"ครูไม่เป็นอะไรจริงๆ ไม่ต้องคิดมากกันนะ...!\""
42060-14 = "ถ้าพวกฉันจะไถ่บาปที่ก่อไว้กับคุณครู ตอนนี้ก็คงมีแค่การหาว่าสิ่งที่พวกรุ่นพี่หยิบออกไปจากชาเล่ต์#nคืออะไรกันแน่ แล้วก็เอามันกลับมาคืนให้ได้ค่ะ"
42060-15 = "... ถึงจะไม่รู้ว่าจะชิงของสิ่งนั้นมาจากรุ่นพี่กองทหาร FOX ได้หรือเปล่าก็เถอะ"
42060-16 = "พวกรุ่นพี่เอาอะไรไปจากชาเล่ต์กันแน่นะ?"
42060-17 = "ทั้งๆ ที่มันก็ถูกถือออกไปแท้ๆ แต่กลับไม่เด่นจนสะดุดตาเลย แถมดูจากกล้องวงจรปิดที่ถ่ายไว้ก็ดูไม่#nน่าจะใช่ของชิ้นใหญ่ด้วย..."
42060-19 = "หรือจะเป็นทูน่ากระป๋องราคาแพง..."
42060-20 = "หรือไม่ก็พวกชุดนุ่งน้อยห่มน้อยของคุณครู...?"
42060-22 = "พวกรุ่นพี่ติดอาวุธบุกเข้ามาในชาเล่ต์เพื่อขโมยชุดชั้นในของคุณครูเนี่ยนะ ไม่อยากจะนึกภาพตามเลยแฮะ..."
42060-26 = "[ns] \"เอาไว้ครูจะค่อยๆ หานะ ว่าของอะไรหายไป...\""
42060-28 = "[ns] \"ว่าแต่นักเรียนจากกองทหาร FOX เป็นคนแบบไหนเหรอ?\""
42060-29 = "จริงด้วย คุณครูยังไม่รู้จักพวกรุ่นพี่กองทหาร FOX ดีสินะคะ..."
42060-30 = "ถ้าจะให้รวบรัดเลยว่ารุ่นพี่กองทหาร FOX เป็นคนยังไงละก็—"
42060-31 = "... คงต้องบอกว่าเป็นหน่วยรบพิเศษที่เก่งกาจที่สุดในคิโวทอสเลยน่ะ"
42060-32 = "ถ้าดูจากความสามารถในการต่อสู้ในเวลาปกติแล้ว แต่ละโรงเรียนก็น่าจะมีกลุ่มหัวกะทิที่เทียบกับ SRT ได้ แต่หากเป็นสถานการณ์พิเศษละก็ คงไม่มีกลุ่มไหนที่ทำผลงานได้เหนือกว่ากองทหาร FOX แล้วละ"
42060-33 = "หน่วยรบพิเศษไม่ใช่แค่กลุ่มที่ถูกฝึกฝนให้ต่อสู้ในสถานการณ์ปะทะง่ายๆ เท่านั้น แต่ยังช่ำชองในการ#nปฏิบัติการในสถานการณ์และสภาพแวดล้อมที่หลากหลายด้วย"
42060-34 = "จะเรียกว่ากองทหาร FOX เป็นกองทหารที่ดีที่สุดที่มีทุกทักษะที่ SRT ต้องการก็ได้ค่ะ"
42060-35 = "ยกตัวอย่างเช่น รุ่นพี่นิโกะที่เป็นรองหัวหน้ากองทหาร FOX..."
42060-38 = "รุ่นพี่นิโกะเป็นรองหัวหน้ากองที่ใจกว้าง ทั้งยังมีความสามารถในการยอมรับสมาชิกทุกคนได้อย่างไม่มี#nที่สิ้นสุดด้วย สมกับที่ได้ชื่อว่าเป็น 'คุณแม่ของกองฯ' เลยละ"
42060-39 = "หากมีกองทหารไหนที่ต้องออกไปทำปฏิบัติการข้างนอก ก็จะทำซูชิเต้าหู้หวานไปให้ตลอด..."
42060-40 = "แล้วก็ยังเป็นที่รู้จักในฐานะผู้ให้คำปรึกษาที่ดีจนบางครั้งก็มีสมาชิกกองอื่นๆ มาปรึกษาเรื่องที่กังวลใจ#nด้วยค่ะ"
42060-42 = "ตอนเข้ามาเรียนใหม่ๆ รุ่นพี่นิโกะก็ช่วยฉันอยู่บ่อยครั้งเลย..."
42060-43 = "ถึงจะมีบุคลิกที่อ่อนหวาน แต่พอได้อยู่ในการต่อสู้แล้วละก็ รุ่นพี่ก็จะมาพร้อมกับความเยือกเย็น และตัดสินใจได้อย่างแน่วแน่เลยละ"
42060-44 = "ถึงจะผ่านการต่อสู้มามากมายหลายรูปแบบ แต่ก็ได้ยินว่ารุ่นพี่นิโกะใช้กระสุนปืนหรือเสบียงระหว่าง#nปฏิบัติการได้พอดีแบบเป๊ะๆ ด้วย"
42060-45 = "... เพราะแบบนี้แหละโมเอะ เธอต้องเอาแบบอย่างจากรุ่นพี่นิโกะมาบ้างนะ"
42060-46 = "แล้วฉันผิดตรงไหนเหรอ? ก็ฉันอยากยิงให้มันเต็มที่นี่นา!"
42060-47 = "ในทางตรงกันข้าม รุ่นพี่คุรุมิที่เป็นพลชี้เป้าของกองทหาร FOX ก็มักจะหงุดหงิดอยู่บ่อยๆ เลยนี่"
42060-50 = "แต่บางทีมันก็อาจจะเป็นเรื่องธรรมดาของพลชี้เป้าที่จะต้องอยู่กับความตึงเครียดและประหม่าอยู่ตลอด#nก็ได้นะ"
42060-51 = "พอไปอยู่แนวหน้า ถ้าเกิดวางใจอะไรก็อาจจะโดนซุ่มโจมตีเข้าก็ได้"
42060-52 = "นอกจากนี้รุ่นพี่คุรุมิยังรับมือกับเหตุการณ์ได้อย่างยืดหยุ่นและปรับตัวได้อย่างรวดเร็วด้วยนะคะ นั่นคือข้อดีของรุ่นพี่เลยละค่ะ"
42060-53 = "ถึงจะเกิดเหตุการณ์ที่ไม่คาดคิดระหว่างปฏิบัติการ รุ่นพี่คุรุมิก็จะไม่ตกใจ แล้วใช้ประโยชน์จาก#nสิ่งแวดล้อมรอบข้างได้อย่างเฉียบแหลมค่ะ"
42060-55 = "ฉันก็เคยได้ยินแบบนั้นมาเหมือนกัน"
42060-56 = "เห็นว่าตอนปืนขัดข้องในขณะที่อยู่ในค่ายของศัตรู รุ่นพี่ก็ไปยึดอาวุธของศัตรูแล้วหากระสุนจาก#nสนามรบมาใช้ แล้วก็ฝ่าศูนย์กลางเข้าไปได้ด้วยนะ?"
42060-57 = "ถ้าเป็นฉัน คงเอาแต่พยายามซ่อมปืนตามตำรา แล้วสุดท้ายก็ทำภารกิจเละไม่เป็นท่าแน่"
42060-58 = "สำหรับคนที่คิดจะแก้ปัญหาทุกอย่างตามคู่มือที่เรียนมา ถ้าเจอเหตุการณ์แบบนั้น ต่อให้พยายามมาก#nแค่ไหนก็งัดพรสวรรค์แบบนั้นออกมาไม่ได้น่ะ"
42060-62 = "ส่วนรุ่นพี่โอโทกิ สไนเปอร์แห่งกองทหาร FOX..."
42060-65 = "ฉันไม่มีโอกาสได้คุยกับรุ่นพี่มากเท่าไร... แต่รู้สึกว่ารุ่นพี่มีบางมุมที่แตกต่างกับสไนเปอร์คนอื่นๆ "
42060-66 = "ก็นะ รุ่นพี่ไม่ใช่สไตล์หมาป่าเดียวดายใส่ชุดพรางตัวอยู่คนเดียวอยู่แล้วนี่"
42060-67 = "รุ่นพี่โอโทกิคนที่มีตัวตนอยู่ในทุกเรื่อง... ก็เลยได้เป็นศูนย์กลางของประเด็นต่างๆ ที่เกิดในสถาบัน SRT อยู่บ่อยๆ เลยค่ะ"
42060-69 = "[ns] \"การที่สไนเปอร์มีตัวตนชัดเจน เป็นเรื่องไม่ดีไม่ใช่เหรอ?\""
42060-70 = "ถ้าเป็นอย่างพวกภารกิจลอบยิงก็คงไม่ดีหรอก แต่หากเป็นการทำให้กองกำลังฝ่ายตรงข้ามต้องสยบ#nและเกรงกลัว ก็คงต้องเปิดเผยตัวตนในระดับหนึ่ง"
42060-71 = "ตอนฝึกฝน ฉันเคยเจอรุ่นพี่โอโทกิที่มาเป็นกองต่อต้านด้วย ตอนนั้นฉันกลัวมากเลยละว่าจะมีกระสุน#nลอยมาจากตรงไหนหรือเปล่า ก็เลยตัดสินใจทำอะไรได้ช้ามากๆ เลย..."
42060-72 = "ว่ากันว่าสไนเปอร์ที่เก่งกาจสามารถปลดอาวุธศัตรูได้อย่างน้อย 3 คนได้ด้วยกระสุนนัดเดียวด้วยนะคะ"
42060-73 = "นอกจากนี้ยังต้องทำงานเชื่อมโยงกับทีมเพื่อใช้ประโยชน์จากข้อมูลจากการสอดแนมด้วย..."
42060-74 = "ถ้าเทียบกับรุ่นพี่แล้ว... บ่อยครั้งเลยค่ะที่ฉันถูกลืมไปว่าตัวเองเป็นส่วนหนึ่งของทีม..."
42060-75 = "ตะ... แต่เรื่องตอนนั้นไม่ใช่ความผิดของมิยุหรอกนะ..."
42060-76 = "มันเป็นความผิดของซากิที่สะเพร่าที่นับคนไม่ครบถ้วนต่างหากล่ะ"
42060-77 = "หนวกหูน่า!"
42060-81 = "และคนสุดท้าย รุ่นพี่ยูกิโนะ หัวหน้ากองทหาร FOX..."
42060-85 = "... ฉันจินตนาการถึงภาพที่รุ่นพี่ยูกิโนะทำอะไรผิดพลาดไม่ออกเลย"
42060-86 = "รุ่นพี่คือหัวหน้าที่สมบูรณ์แบบ เห็นว่าควบคุมการเคลื่อนไหวของสมาชิกแต่ละคนในหน่วยวินาทีเลยนะ"
42060-87 = "ฉันได้ยินมาว่ารุ่นพี่ยูกิโนะได้ความเชื่อใจจากสมาชิกในกองฯ เป็นอย่างมาก ถ้าเป็นคำสั่งของรุ่นพี่แล้ว#nละก็ ต่อให้เป็นคำสั่งที่ไม่อาจเข้าใจได้ กองทหาร FOX ก็ทำตามอย่างทันทีเลยละค่ะ"
42060-89 = "[ns] \"ประเมินรุ่นพี่กันดีมากเลยแฮะ...\""
42060-90 = "... พวกรุ่นพี่คือความฝันของพวกฉันค่ะ"
42060-91 = "เป็นทั้งเป้าหมายที่ต้องไปให้ถึงให้ได้ แล้วก็เป็นไอดอลของพวกฉันด้วยค่ะ"
42060-92 = "ถ้าจะให้พูดละก็ ถ้าเป็นงานที่กองทหาร RABBIT ทำได้ กองทหาร FOX ก็จะทำได้อย่างสมบูรณ์แบบ ไม่สิ ต้องบอกว่าน่าจะได้ผลงานที่ดีกว่าของพวกฉันด้วยค่ะ"
42060-96 = "[ns] \"โลกนี้มันไม่มีใครที่สมบูรณ์แบบไปหมดหรอกนะ\""
42060-98 = "[ns] \"แล้วก็ไม่มีใครมาแทนที่ใครได้ด้วย\""
42060-100 = "...งั้นเหรอคะ?"
42060-101 = "แต่อย่างน้อยฉันก็คิดอย่างนี้นะคะ"
42060-102 = "รุ่นพี่ยูกิโนะในความทรงจำของฉัน... เป็นคนที่เปล่งประกายอยู่เสมอ..."
42060-103 = "ทำไมตอนนี้รุ่นพี่ถึงใช้คำพูดเหมือนผู้ใหญ่อย่างนั้นกันนะคะ"
42060-104 = "หรือว่ารุ่นพี่กลายเป็นผู้ใหญ่ในที่ที่ฉันไม่รู้จักไปแล้วหรือเปล่าคะ?"
42060-105 = "... ฉันไม่รู้เลยค่ะ"
42060-106 = "อย่างที่พวกรุ่นพี่พูดแหละค่ะ คนที่ยังโตเป็นผู้ใหญ่ไม่ได้อย่างพวกฉัน บางทีอาจจะต้องคืนความรับผิด#nชอบให้คนที่อยู่เหนือกว่า และต้องเชื่อฟังคำสั่งของเขาแทนค่ะ"
42060-107 = "... ทุกคนคิดว่ายังไงกันบ้างเหรอคะ?"
42060-108 = "ต่อให้มาถามพวกเราก็เถอะ..."
42060-109 = "ฉันก็ไม่รู้เลยเหมือนกัน..."
42060-114 = "เสียงนี้มัน..."
42060-115 = "สัญญาณเตือนภัยฉุกเฉินขององค์การนักเรียน...?"
42060-116 = "อย่าบอกนะว่า... สถานการณ์ครั้งที่แล้วมันกลับมาอีกครั้งน่ะ?!"
42060-117 = "<ถึงชาวเมืองทุกคนในคิโวทอส>"
42060-118 = "<อีกสักครู่จะมีแถลงการณ์ฉุกเฉินจากองค์การนักเรียนคิโวทอสค่ะ>"
42060-119 = "<ขอให้ชาวเมืองทุกคนติดตามแถลงการณ์ฉุกเฉินจากองค์การนักเรียนผ่านทางช่องทางการของ#nองค์การนักเรียน หรือช่องของโครโนสทันทีค่ะ>"
42060-120 = "ชะ... ช่องทางการขององค์การนักเรียน...? ฉันเอาโทรศัพท์ไปไว้ไหนนะ?"
42060-121 = "... ไม่น่าจะต้องเปิดดูในโทรศัพท์แล้วละ"
42060-122 = "ดูข้างบนนั่นสิ"
42060-123 = "มีการถ่ายทอด... จากเครื่องบินด้วย..."
42060-125 = "สวัสดีค่ะ ชาวเมืองคิโวทอสทุกท่าน"
42060-126 = "ฉันคือชิรานูอิ คายะ หัวหน้าสำนักป้องกัน สังกัดองค์การนักเรียนแห่งคิโวทอสค่ะ"
42060-127 = "ฉันรู้สึกเสียใจที่ต้องออกมาแถลงอย่างกะทันหันในรูปแบบนี้โดยไม่ได้แจ้งให้ทราบล่วงหน้าค่ะ"

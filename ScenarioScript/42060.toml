[translation]
42060-1 = "第6話;後輩的苦惱"
42060-2 = "兔寶寶公園"
42060-3 = "（回到公園後，聽RABBIT小隊進行了說明）"
42060-4 = "[ns]「當時進到夏萊的就是FOX小隊啊……」"
42060-5 = "……很抱歉沒能事先告訴老師。"
42060-6 = "一想到是因為我們害老師陷入危險，就覺得很對不起……"
42060-7 = "[s1]「沒關係，不要太在意。」\n[s2]「那不是你們的錯。」"
42060-8 = "可是……我們什麼都不知道，就這樣傻傻地在公園裡露營……"
42060-9 = "可是……我們什麼都不知道，就這樣傻傻地在公園裡露營……"
42060-10 = "老師還請我們吃很貴的牛肉……#n雖然老師說是給我們的謝禮，結果反而應該是我們要向老師道歉才對……"
42060-11 = "但肉已經吃下去了……就算要付錢，我們能付的也只是杯水車薪……"
42060-12 = "既然如此……只好每天把的報廢便當全部拿去給老師了……！"
42060-13 = "[s]「真，真的沒關係……！」"
42060-14 = "現在的我們能贖罪的方式，就只有取回前輩們從夏萊拿走的東西了。"
42060-15 = "……雖然面對FOX小隊的前輩們，究竟能不能做到還是讓人感到不安。"
42060-16 = "話說，前輩們到底從夏萊拿走了什麼呢？"
42060-17 = "是就算不見也不會被老師注意到的東西對吧？#n從監視器拍到的影像看來也不像是什麼大東西……"
42060-19 = "像是昂貴的鮪魚罐頭……"
42060-20 = "還是老師的內衣之類的……？"
42060-22 = "前輩們會為了偷老師的內衣而全副武裝潛入夏萊什麼的，#n真是不想去想像啊……"
42060-26 = "[ns]「……這件事還是先放一邊吧。」"
42060-28 = "[ns]「可以先告訴我關於FOX小隊的事嗎？」"
42060-29 = "關於FOX小隊的事，是嗎……嗯……"
42060-30 = "用一句話來形容的話──"
42060-31 = "──就是奇普托斯最優秀的特殊部隊。"
42060-32 = "如果只比較一般的戰鬥力，各學園應該多少都有能和SRT匹敵的人在。#n但要是說到在特殊情況下進行的作戰，應該沒有集團能夠超越FOX小隊。"
42060-33 = "特殊部隊不只能進行一般的交戰，還受過能在各種狀況下執行作戰的訓練。"
42060-34 = "而FOX小隊即使在那之中，也可以說是具備所有SRT需要能力的理想部隊吧。"
42060-35 = "舉例來說，身為副小隊長的仁子前輩──"
42060-38 = "感覺就像溫暖地照顧著所有小隊員的「小隊的媽媽」一樣。"
42060-39 = "不只會為野戰前的部隊準備親手做的豆皮壽司……"
42060-40 = "甚至連其他小隊員都會找他諮詢煩惱，是很受大家親近的前輩。"
42060-42 = "我在剛入學時也受了仁子前輩很多幫助……"
42060-43 = "但是，前輩在擁有和善性格的同時，也有著足以在混戰中做出準確判斷的沉著冷靜。"
42060-44 = "據說他連在作戰中消耗的子彈和補給品數量都全部記得。"
42060-45 = "……在這個方面，萌你也試著學學仁子前輩如何。"
42060-46 = "說什麼傻話！全彈發射是浪漫好嗎！"
42060-47 = "相較之下，胡桃前輩就常常發脾氣。"
42060-50 = "但他同時也是必須隨時抱持著緊張感執行作戰的先鋒的典範。"
42060-51 = "畢竟在最前線只要稍有不慎就很可能被擊倒的啊。"
42060-52 = "此外，胡桃前輩還擁有面對各種情況都能靈活應對的能力。"
42060-53 = "即使在作戰中面對奇襲或陷入意料之外的狀況也絕不會亂了陣腳，#n還會利用周圍的地形來確保進攻路線。"
42060-55 = "那件事我也聽說過。"
42060-56 = "好像是前輩的槍枝在敵陣中央故障時，奪走敵人的武器並成功突破了對吧？"
42060-57 = "換作是我，感覺會想辦法按照教戰手冊修理槍枝，結果導致整個作戰失敗吧。"
42060-58 = "對我這種人來說，光是能靈活思考就是讓人羨慕的才能了。"
42060-62 = "而御伽前輩是FOX小隊的狙擊手──"
42060-65 = "雖然沒跟他說過幾句話……但感覺他和其他的狙擊手不太一樣……"
42060-66 = "嘛，總之不是窩在角落摺著吉利服的一匹狼類型就是了。"
42060-67 = "御伽前輩天生就是存在感比較強烈的類型……#n在SRT學園裡也常常成為話題的中心人物。"
42060-69 = "[ns]「對狙擊手來說，存在感強烈不是不太好嗎？」"
42060-70 = "這也未必。單純只是要狙擊目標的話姑且不論，#n如果要在亂戰中阻止敵方步兵的行動，就必須展現出一定的存在感。"
42060-71 = "我曾經在訓練時遇過御伽前輩所在的隊伍一次，#n面對子彈不知會從哪飛過來的壓力，實在是相當難以行動啊……"
42060-72 = "聽說優秀的狙擊手可以用一發子彈擊倒3個以上的敵人……"
42060-73 = "而且……為了活用偵查情報，和夥伴間的合作也是不可或缺的……"
42060-74 = "和前輩比起來……我的存在連友方都會忘記……"
42060-75 = "都，都說了那不是美優的錯……"
42060-76 = "是連小隊員的數量也數不好的笨蛋咲希的錯。"
42060-77 = "少囉嗦！"
42060-81 = "最後是身為隊長的雪乃前輩──"
42060-85 = "……那個人實在完美到沒有缺點呢～"
42060-86 = "是啊，畢竟他似乎能以秒為單位來統籌小隊員們的行動。"
42060-87 = "也非常受夥伴們的信賴……#n只要是雪乃前輩的命令，FOX小隊好像無論什麼任務都會執行……"
42060-89 = "[ns]「評價還真高啊……」"
42060-90 = "……前輩們是我們的夢想。"
42060-91 = "是我們應當努力達成的目標，也是憧憬的存在。"
42060-92 = "因為FOX小隊無論面對任何任務──都能比RABBIT小隊更加活躍。"
42060-96 = "[ns]「世上沒有完美的人哦。」"
42060-98 = "[ns]「而且我認為只有大家才做得到的事也是存在的。」"
42060-100 = "……是這樣嗎。"
42060-101 = "但至少我是這麼想的。"
42060-102 = "不過……當時的雪乃前輩明明是那麼的耀眼……"
42060-103 = "為何現在會說出那種話呢。#n簡直，像是個放棄了一切的大人一般……"
42060-104 = "在我不知道的地方，前輩已經改變了嗎……？"
42060-105 = "……我什麼也不明白。"
42060-106 = "身為孩子的我們應該把責任交給前輩們──依照前輩的指示行動嗎……？"
42060-107 = "……大家覺得怎麼樣呢？"
42060-108 = "你問我也……"
42060-109 = "我，我也不知道……"
42060-114 = "這個聲音是……"
42060-115 = "聯邦學生會的緊急廣播……？"
42060-116 = "該不會又……！？"
42060-117 = "「奇普托斯的各位。」"
42060-118 = "「奇普托斯聯邦學生會即將發表緊急聲明。」"
42060-119 = "「請所有市民立刻收看聯邦學生會的官方頻道或克洛盧斯頻道。」"
42060-120 = "聯邦學生會的官方頻道……？#n我把手機放哪去了……"
42060-121 = "……不，我想不必拿手機了。"
42060-122 = "看那邊。"
42060-123 = "飛行船上……正在播放影像……"
42060-125 = "奇普托斯的各位，大家好。"
42060-126 = "我是奇普托斯聯邦學生會的防衛室長，不知火香耶。"
42060-127 = "突然進行這樣的聲明，造成各位市民的不安，本人深感抱歉。"
42060-128 = "……近期，奇普托斯發生了數起前所未有的慘劇。"
42060-129 = "不明構造物從天而降導致的都市功能癱瘓，#n造成包含D.U.在內的各學園自治區莫大的損失。"
42060-130 = "然而聯邦學生會卻將此危機狀況的解決交給了夏萊和各自治區，僅致力於修復作業。#n本人認為應當對此感到無比羞愧。"
42060-131 = "……這一切都是因為擁有最終決定權──同時身為聯邦學生會長代理的七神琳，#n在事件當下行蹤不明、逃避責任所導致的問題。"
42060-132 = "對此，防衛室內也對七神行政官的責任問題展開檢討……"
42060-133 = "最終在今天──通過了先前保留中的，對七神行政官的不信任表決。"
42060-134 = "於此同時，新的聯邦學生會長代理將由我，不知火香耶繼任。"
42060-136 = "新的聯邦學生會長代理！？"
42060-137 = "聯邦學生會長代理應該沒那麼容易變更才對啊……"
42060-139 = "各位市民也許會對聯邦學生會長代理的突然變更感到訝異。"
42060-140 = "但我們會為奇普托斯的「正常化」盡最大努力，#n希望各位市民們能多多支持新成立的行政委員會。"
42060-142 = "……最後。"
42060-143 = "[USERNAME]老師。"
42060-144 = "老師現在應該也在某處收看轉播吧。"
42060-145 = "為了奇普托斯和夏萊的未來，有些事希望務必能與[USERNAME]老師商量。"
42060-146 = "請老師在轉播結束後，盡速前往聯邦學生會的接待室。"
42060-147 = "聯邦學生會的所有人員將誠心期盼著老師的到來。"
42060-148 = "那麼再會。"
42060-153 = "[ns]「……這是什麼情況？」"
42060-155 = "……聯邦學生會似乎發生了什麼呢。"
42060-157 = "下一話;政變"

[translation]
1005802-1 = "Far and Wide"
1005802-4 = "Welcome, Sensei. Thank you for taking the time to meet with me."
1005802-5 = "[s] \"I'm here because you called, but... What's going on?\""
1005802-6 = "To put it simply, it's an aid patrol."
1005802-7 = "What is an aid patrol? That is, to patrol the streets while giving aid, at the same time."
1005802-8 = "When and where the need for aid will occur, nobody knows."
1005802-9 = "So it could be said that the true purpose of an aid patrol is to personally seek out the places that might require aid."
1005802-10 = "It's all right, Sensei. This is a task that could save someone, after all."
1005802-11 = "That means that, including for us, there shouldn't be any danger."
1005802-12 = "...Probably."
1005802-16 = "[ns] \"Probably?!\""
1005802-20 = "Uwah~ Uwaaah~"
1005802-21 = "Hm?! There's a crying child, Sensei!"
1005802-22 = "This is a powerful premonition of aid!"
1005802-34 = "Why are you crying? Did something happen?"
1005802-38 = "The puppy..."
1005802-39 = "The puppy?"
1005802-43 = "It fell down that old cracked wall, and it can't climb out..."
1005802-44 = "Hold on, let me see..."
1005802-49 = "Mine bends over to look inside of the cracked wall."
1005802-50 = "It's true. On top of that, it's in there quite deep..."
1005802-54 = "I'm...not able...to reach. Not with my hands. Not even trying to use my gun to extend..."
1005802-55 = "I can tell that it's hurt somehow, though. It's not moving its leg easily."
1005802-56 = "Then...it can't climb back out?"
1005802-57 = "WAAAHHH!"
1005802-61 = "..."
1005802-62 = "Don't worry."
1005802-63 = "The Remedial Knights will never simply stand by and watch while someone needs aid."
1005802-68 = "[ns1] \"Hey, Mine? What are you trying to do...?\"\n[ns2] \"Um, Mine...?\""
1005802-74 = "Haaah!"
1005802-79 = "BOOOOM!"
1005802-80 = "Kyaa!"
1005802-81 = "[ns] \"Whoa!\""
1005802-82 = "Mine has completely destroyed the cracked wall!"
1005802-83 = "It was super effective!"
1005802-87 = "Now...here you go. Your puppy."
1005802-88 = "Like I thought, it seems to have hurt its leg. Please wait a moment."
1005802-94 = "Mine skillfully treated the puppy's wounded leg."
1005802-97 = "Big sis...? Thank you! Thank you so much!"
1005802-98 = "I was panicking about what to do next! The Remedial Knights are the best!"
1005802-107 = "Heehee."
1005802-108 = "It's good everything worked out."
1005802-113 = "Ah-Ahhhh?!!"
1005802-117 = "My father's house?!"
1005802-119 = "The house I've tried to preserve despite the cracks and all according to his last wishes?"
1005802-121 = "H-Huh...!?"
1005802-126 = "[s] \"I-I'm sorry!!!\""
1005802-127 = "We apologized to the owner of the house."
1005802-132 = "[ns] \"That was quite a big incident...\""
1005802-133 = "Right. A big incident..."
1005802-134 = "But it's a good thing that we could save the puppy."
1005802-135 = "[s] \"Don't you regret it a bit, Mine? We got into so much trouble...\""
1005802-139 = "Not in the least!"
1005802-140 = "It was all so that we could save a life. How could I possibly have regret on a path like that?"
1005802-141 = "If I had to go back and make that choice again, I would destroy the wall a hundred times and apologize a hundred times!"
1005802-142 = "[s] \"Yes. I think that's the right thing to do as well.\""
1005802-143 = "Is that so? I am happy that we have the same intentions, Sensei."
1005802-147 = "Huh? Is that a truck driving through the alley?"
1005802-148 = "[s] \"And in front of it, a clueless child that popped out of nowhere?!\""
1005802-149 = "Uwaaaah?"
1005802-150 = "I'm on my way!"
1005802-162 = "Mine grabbed the child and stepped in front of the truck as a shield!"
1005802-163 = "The truck's bumper was completely crushed."
1005802-166 = "Are you okay? Are you hurt anywhere?"
1005802-167 = "I... I'm all right."
1005802-168 = "You're the best! You're awesome!"
1005802-169 = "Huhu. That's a relief."
1005802-170 = "[s] \"You should look both ways when coming out of an alley...\""
1005802-171 = "I'm sorry..."
1005802-176 = "Ahhhh?! The bumper...and the engine?!"
1005802-178 = "The brand new truck I ordered just last week, that finally got delivered yesterday?!?!"
1005802-182 = "We apologized to the owner of the truck."
1005802-186 = "A cat that climbed up the tree and can't get down!"
1005802-189 = "A robot citizen in despair because they can't get the about-to-expire lunch boxes from the convenience store!!"
1005802-193 = "The Biker Gang Member that got caught up between the fight between the Helmet Gangsters and the Thugs!!!"
1005802-195 = "Mine's \"aid\" continued all day even after that."
1005802-196 = "Somewhere along the way, it became hard to decipher what was aid and what was not..."
1005802-200 = "Great job, Sensei."
1005802-201 = "[s] \"Is it...over now?\""
1005802-202 = "Yes. That's it for today's patrol."
1005802-206 = "What's wrong? Did you ask whether this is something I do everyday?"
1005802-207 = "I do think that patrolling for the sake of giving aid is something we should do daily..."
1005802-208 = "Now that I think about it, it seems that there was an usual amount of people who needed aid today."
1005802-209 = "Well, I suppose it was still good to spread the work of the Remedial Knights far and wide."
1005802-210 = "More importantly, Sensei, I feel that after spending the whole day with you..."
1005802-211 = "Don't we have a pretty good chemistry?"
1005802-212 = "[s] \"H-Hm...? I guess, now that I think about it...\""
1005802-213 = "As I thought! You think so too!"
1005802-214 = "I wasn't mistaken."
1005802-220 = "You have an excellent talent for \"aid,\" Sensei!"
1005802-221 = "How about it? Would you like to become a member of the Remedial Knights, spreading the spirit of aid far and wide to even more people?"
1005802-222 = "[s3] \"For now, no thank you!\"\n[s4] \"Thanks for the offer, but I still have a lot of growing to do!\""
1005802-223 = "I see... I'm a bit disappointed."
1005802-224 = "I see... I'm a bit disappointed."
1005802-225 = "But please let me know if you ever change your mind."
1005802-226 = "We'll always leave the \"Advisor\" position in the Remedial Knights open for you."

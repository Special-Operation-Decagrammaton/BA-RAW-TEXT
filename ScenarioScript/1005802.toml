[translation]
1005802-1 = "救護的精神"
1005802-4 = "老師，恭候多時了。"
1005802-5 = "[s]「所以，我今天該做什麼呢？」"
1005802-6 = "簡單來說就是「巡迴救護」。"
1005802-7 = "也就是同時進行救護活動與街道巡邏的活動。"
1005802-8 = "需要救護的對象不知何時何地，會以怎麼樣的方式出現。"
1005802-9 = "所以，親自去尋找需要救護的地方這點，是和平時的活動不同的部分。"
1005802-10 = "請您放心。這是為了幫助他人而進行的活動。"
1005802-11 = "並不會讓包含我們在內的任何人遭遇危險。"
1005802-12 = "……大概吧。"
1005802-16 = "[ns]「大概！？」"
1005802-20 = "嗚哇～～！"
1005802-21 = "這是……老師，有孩子正在哭泣！"
1005802-22 = "看來需要「救護」呢！"
1005802-34 = "打擾了，你為什麼在哭呢？發生什麼事了嗎？"
1005802-38 = "小狗……"
1005802-39 = "小狗？"
1005802-43 = "牠鑽過那個牆壁的縫隙跑到另一邊後，就回不來了……"
1005802-44 = "這樣啊，請交給我吧。"
1005802-49 = "（美禰彎腰仔細查看了裂開的牆壁內側）"
1005802-50 = "真的在呢，而且跑到了相當深的地方……"
1005802-54 = "即使伸手也搆不到，就算用槍也……有點困難呢。"
1005802-55 = "看起來似乎有哪裡受傷了。腳並不能正常活動。"
1005802-56 = "那，沒辦法救牠了嗎……？"
1005802-57 = "嗚……嗚哇～～！！"
1005802-61 = "……"
1005802-62 = "不，請別擔心。"
1005802-63 = "救護騎士團對需要救護的對象絕對不會見死不救。"
1005802-68 = "[ns1]「難道……美禰？」\n[ns2]「那個……美禰同學……？」"
1005802-74 = "哈啊！"
1005802-79 = "（咚哐──！）"
1005802-80 = "呀啊！？"
1005802-81 = "[ns]「唔哇！？」"
1005802-82 = "（裂開的牆面完全損壞了！）"
1005802-83 = "（效果非常顯著！）"
1005802-87 = "來，順利把小狗救出來了唷。"
1005802-88 = "……腳果然受傷了呢。請稍候。"
1005802-94 = "（美禰使用熟練的手法進行了處理）"
1005802-97 = "哇啊，太好了！歡迎回來！"
1005802-98 = "救護騎士團的大姐姐，謝謝你！"
1005802-107 = "呵呵。"
1005802-108 = "能順利解決真是太好了。"
1005802-113 = "啊啊啊！"
1005802-117 = "我的家啊！？"
1005802-119 = "世世代代傳承下來重要的家啊啊啊啊！"
1005802-121 = "咦，咦……！？"
1005802-126 = "[ns]「非，非常抱歉！！」"
1005802-127 = "（和美禰一起向屋主道了歉）"
1005802-132 = "[ns]「真糟糕呢……」"
1005802-133 = "是啊。確實如此。"
1005802-134 = "不過，我依然覺得能救出小狗是件好事。"
1005802-135 = "[s]「是啊。雖然被念了一頓……」"
1005802-139 = "是的，但總結起來我也並不後悔！"
1005802-140 = "那是為了拯救生命的「救護」。#n究竟有什麼好後悔的呢！"
1005802-141 = "無論回到那個當下幾次，我仍然會破壞那道牆壁救出小狗，#n之後再向房屋主人道歉，直到獲得原諒為止！"
1005802-142 = "[s]「嗯，這樣啊。」"
1005802-143 = "老師能夠理解我們救護騎士團的信念，讓我很高興。"
1005802-147 = "啊，那裡有輛高速衝來的卡車……！"
1005802-148 = "[s]「眼前還有追著球跑出來的小孩！？」"
1005802-149 = "……？"
1005802-150 = "我要上了！"
1005802-162 = "（美禰使用盾牌防禦，挺身保護了孩子！）"
1005802-163 = "（但是，卡車的保險桿漂亮地扭曲了！）"
1005802-166 = "還好嗎？有沒有受傷？"
1005802-167 = "嗯，嗯……！"
1005802-168 = "帥氣的姐姐，謝謝你！"
1005802-169 = "呵呵，沒事我就放心了。"
1005802-170 = "[s]「之後要小心車子哦。」"
1005802-171 = "對不起……"
1005802-176 = "啊啊啊！？保險桿啊……連引擎都……！？"
1005802-178 = "這可是我剛買來的新車啊！"
1005802-182 = "（和美禰一起向卡車司機道了歉）"
1005802-186 = "有隻爬到樹上下不來的貓！"
1005802-189 = "有位沒買到超商的半價便當而難過的市民！！"
1005802-193 = "有位捲入頭盔團和小流氓戰鬥的暴走族！！！"
1005802-195 = "（美禰的「救護」就這樣持續了一整天）"
1005802-196 = "（從中途開始就漸漸無法以自己的標準區分何謂救護了……）"
1005802-200 = "您辛苦了，老師。"
1005802-201 = "[s]「這樣差不多就結束了吧……？」"
1005802-202 = "是的。今天的巡迴救護就到此為止吧。"
1005802-206 = "……咦？您問我是不是每天都在做類似的事情，是嗎？"
1005802-207 = "我當然很想每天都盡可能為了「救護」而進行巡邏……但是有時會忙不過來也是事實。"
1005802-208 = "回想起來，今天需要救護的人似乎比平時更多呢。"
1005802-209 = "雖然辛苦，卻也因此能將救護騎士團的精神傳達給更多的人，也是件好事吧。"
1005802-210 = "對了，今天整天都和老師一起行動，讓我感覺……"
1005802-211 = "您不覺得我們氣味相投嗎？"
1005802-212 = "[s]「嗯，嗯……？也許，吧……」"
1005802-213 = "老師果然也這麼認為！"
1005802-214 = "我果然沒看錯。"
1005802-220 = "老師擁有相當優秀的「救護」才能！"
1005802-221 = "怎麼樣？#n老師要不要也成為我們救護騎士團的一員，一起向更多人發揚救護的精神呢？"
1005802-222 = "[s3]「請，請先容我拒絕……！」\n[s4]「我心領了！」"
1005802-223 = "這樣啊……真是遺憾……"
1005802-224 = "這樣啊……真是遺憾……"
1005802-225 = "但如果您改變心意了的話，歡迎隨時告訴我。"
1005802-226 = "救護騎士團的「顧問」職位會一直為老師保留的。"

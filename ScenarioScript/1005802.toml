[translation]
1005802-1 = "ขยายความหมายให้ยิ่งใหญ่ขึ้น"
1005802-4 = "เชิญค่ะคุณครู ฉันกำลังรออยู่เลยค่ะ"
1005802-5 = "[s] \"เรียกครูมาที่นี่... มีเรื่องอะไรเหรอ?\""
1005802-6 = "ถ้าพูดให้เข้าใจง่ายๆ ก็คือ... เราจะไปลาดตระเวนบรรเทาทุกข์ค่ะ"
1005802-7 = "การลาดตระเวนบรรเทาทุกข์คืออะไรน่ะเหรอคะ? ก็คือการออกลาดตระเวนตามท้องถนน และปฏิบัติ#nงานบรรเทาทุกข์ให้ชาวเมืองไปพร้อมๆ กันค่ะ"
1005802-8 = "พวกเราไม่รู้ว่า จะมีคนที่ต้องการความช่วยเหลืออยู่ที่ไหน เมื่อไหร่ และในรูปแบบใดน่ะค่ะ"
1005802-9 = "เพราะงั้นอาจพูดได้ว่าสิ่งสำคัญของการลาดตระเวนบรรเทาทุกข์คือการเข้าไปให้ถึงสถานที่ที่ต้องการ#nความช่วยเหลือนั้นค่ะ"
1005802-10 = "ไม่เป็นไรหรอกค่ะคุณครู นี่เป็นงานที่ทำเพื่อช่วยเหลือผู้คนอยู่แล้วค่ะ"
1005802-11 = "ดังนั้น จะไม่มีใครต้องตกอยู่ในอันตรายค่ะ และแน่นอนว่ารวมถึงพวกเราด้วยค่ะ"
1005802-12 = "หวังว่า... นะคะ"
1005802-16 = "[ns] \"<หวังว่า> งั้นเรอะ?!\""
1005802-20 = "ฮือ~ ฮืออออ~"
1005802-21 = "อ๊ะ?! มีเด็กกำลังร้องไห้อยู่ค่ะคุณครู!"
1005802-22 = "นี่เป็นลางสังหรณ์ที่แม่นยำของผู้บรรเทาทุกข์ค่ะ!"
1005802-34 = "ร้องไห้ทำไมเหรอคะ เกิดเรื่องอะไรขึ้นหรือเปล่าคะ?"
1005802-38 = "น้องหมา..."
1005802-39 = "น้องหมา...?"
1005802-43 = "น้องหมาตกลงไปในซอกกำแพงเก่าๆ ตรงนั้น แล้วก็ออกมาไม่ได้..."
1005802-44 = "ขอฉันดูหน่อยนะคะ..."
1005802-49 = "(มิเนะย่อตัวลงและมองลอดเข้าไปในช่องกำแพงที่แตกอยู่)"
1005802-50 = "จริงด้วยค่ะ แถมดูเหมือนจะเข้าไปลึกพอสมควรเลยด้วย..."
1005802-54 = "เอื้อมมือเข้าไปไม่ถึงเลย น่าจะใช้ด้ามปืนดึงออกมาไม่ได้ด้วย..."
1005802-55 = "ดูเหมือนมันจะบาดเจ็บด้วยค่ะ เห็นขยับขาได้ไม่สะดวกเท่าไหร่ค่ะ"
1005802-56 = "ถ้างั้น... น้องหมาจะออกมาไม่ได้เหรอ?"
1005802-57 = "แงงงงงงงง~! "
1005802-61 = "..."
1005802-62 = "ไม่ต้องห่วงนะคะ"
1005802-63 = "ชมรมอัศวินบรรเทาทุกข์ไม่เคยทอดทิ้งผู้ที่ต้องการความช่วยเหลืออยู่แล้วค่ะ"
1005802-68 = "[ns1] \"นี่ มิเนะ? เธอคิดจะทำอะไรน่ะ...?\"\n[ns2] \"ฮัลโหล คุณมิเนะ....?\""
1005802-74 = "ฮึบ!"
1005802-79 = "ตู้มมมมม! "
1005802-80 = "ว้าาากก?!"
1005802-81 = "[ns] \"โว้วววว?!\""
1005802-82 = "(มิเนะถล่มกำแพงที่ขวางอยู่ จนกลายเป็นเศษซากไปแล้ว!)"
1005802-83 = "(พลังสุดยอดเลย!)"
1005802-87 = "นี่ค่ะ... พาน้องหมาออกมาแล้วค่ะ "
1005802-88 = "ว่าแล้วเชียว ขาเจ็บอย่างที่คิดจริงๆ ด้วย รอสักครู่นะคะ"
1005802-94 = "(มิเนะรักษาบาดแผลที่ขาของลูกสุนัขอย่างชำนาญ)"
1005802-97 = "พี่สาว...? ขอบคุณนะ ขอบคุณมากค่ะ!"
1005802-98 = "กังวลตั้งนานว่าจะทำยังไงดี! ชมรมอัศวินบรรเทาทุกข์นี่สุดยอดเลยนะ!"
1005802-107 = "ฮุฮุ..."
1005802-108 = "ค่อยยังชั่วที่ทุกอย่างผ่านไปด้วยดีนะคะ"
1005802-113 = "อ๊ะ อ๊าาาา?!"
1005802-117 = "บ้านของคุณพ่อ?!"
1005802-119 = "บ้านเก่าที่คุณพ่อสั่งเสียไว้ว่าให้ดูแลรักษาให้อยู่ในสภาพเดิม...?!"
1005802-121 = "คะ...คะ...!?"
1005802-126 = "[ns] \"ขะ... ขอโทษนะ!!!\""
1005802-127 = "(หลังจากนั้นคุณครูกับมิเนะก็ขอโทษขอโพยเจ้าของบ้านอยู่พักใหญ่)"
1005802-132 = "[ns] \"เรื่องใหญ่เลยนะ...\""
1005802-133 = "นั่นสินะคะ เรื่องใหญ่จริงๆ ด้วยค่ะ"
1005802-134 = "แต่ก็ถือว่าโชคดีที่ช่วยน้องหมาออกมาได้อย่างปลอดภัยนะคะ"
1005802-135 = "[s] \"มิเนะไม่เสียใจเลยเหรอ ทั้งที่โดนบ่นหูชาขนาดนั้นน่ะ...?\""
1005802-139 = "ฉันไม่เสียใจเลยแม้แต่นิดเดียวค่ะ!"
1005802-140 = "เราช่วยชีวิตไว้ได้หนึ่งชีวิตเลยนะคะ เพราะงั้นไม่มีเรื่องน่าเสียใจเลยค่ะ!"
1005802-141 = "ถ้าย้อนเวลากลับไปแล้วต้องเลือกอีกละก็ ไม่ว่าจะกี่ครั้งฉันก็จะเลือกทุบกำแพงนั่น แล้วก็ขอโทษ#nเจ้าของบ้านเป็นร้อยรอบเหมือนเดิมค่ะ!"
1005802-142 = "[s] \"งั้นเหรอ ครูก็คิดว่าแบบนั้นถูกแล้วเหมือนกัน\""
1005802-143 = "อย่างนั้นเหรอคะ ฉันดีใจที่คุณครูคิดแบบนั้นเหมือนกันนะคะ"
1005802-147 = "อ๊ะ รถบรรทุกที่วิ่งมาทางนั้น?!"
1005802-148 = "[s] \"ข้างหน้ามีเด็กวิ่งตัดหน้ารถ?!\""
1005802-149 = "อ๊ายยยยยย"
1005802-150 = "ฉันจะไปเดี๋ยวนี้ค่ะ!"
1005802-162 = "(มิเนะคว้าตัวเด็กเข้ามาในอ้อมกอดได้อย่างสง่างาม และใช้โล่หยุดรถบรรทุกเอาไว้!)"
1005802-163 = "(กันชนของรถบรรทุกพังยับอย่างเห็นได้ชัด!!!)"
1005802-166 = "เป็นอะไรรึเปล่าคะ? บาดเจ็บตรงไหนรึเปล่าคะ?"
1005802-167 = "มะ... ไม่เป็นไรค่ะ"
1005802-168 = "พี่สาวสุดยอดเลยค่ะ! เท่สุดๆ ไปเลย!"
1005802-169 = "ฮุฮุ โล่งอกไปทีค่ะ"
1005802-170 = "[s] \"ตอนเดินออกมาจากซอย ต้องคอยดูรถให้ดีๆ ด้วยนะ...\""
1005802-171 = "ขอโทษค่ะ..."
1005802-176 = "อ๊าาาา?! กันชนหน้ากับเครื่องยนต์พังยับเลย...?!"
1005802-178 = "ฉันเพิ่งได้รถบรรทุกนี่มาขับเมื่อวานเองนะ?!?!"
1005802-182 = "(หลังจากนั้นคุณครูกับมิเนะก็ขอโทษขอโพยเจ้าของรถอยู่พักใหญ่...)"
1005802-186 = "น้องแมวปีนต้นไม้แล้วลงมาไม่ได้ค่ะ!"
1005802-189 = "หุ่นยนต์พลเมืองกำลังหงุดหงิดเพราะหาอาหารกล่องที่ถูกทิ้งในร้านสะดวกซื้อไม่เจอค่ะ!!"
1005802-193 = "สมาชิกแก๊งถูกดีดกระเด็นปลิวออกมา ระหว่างที่พวกแก๊งหมวกกันน็อกกับเด็กเกเรตีกันค่ะ!!"
1005802-195 = "('การบรรเทาทุกข์' ของมิเนะยังคงดำเนินต่อไปตลอดทั้งวัน)"
1005802-196 = "(แต่ระหว่างนั้นคุณครูก็เริ่มแยกไม่ออกแล้ว ว่าสิ่งที่มิเนะทำคือการบรรเทาทุกข์ หรือคืออะไรกันแน่...)"
1005802-200 = "ขอบคุณที่ทำงานอย่างหนักค่ะ คุณครู"
1005802-201 = "[s] \"ตอนนี้... จบแล้วเหรอ?\""
1005802-202 = "ค่ะ ดูเหมือน \"การลาดตระเวน\" ของวันนี้ ผ่านไปได้ด้วยดีเลยนะคะ"
1005802-206 = "ทำไมทำหน้าแบบนั้นล่ะคะ? เรื่องแบบนี้เกิดขึ้นทุกวันรึเปล่างั้นเหรอคะ?"
1005802-207 = "ฉันคิดว่าควรออกลาดตระเวนเพื่อบรรเทาทุกข์ให้ชาวเมืองทุกวัน เท่าที่จะทำได้ค่ะ..."
1005802-208 = "พอมาคิดๆ ดูแล้ว ดูเหมือนวันนี้จะมีคนที่ต้องการความช่วยเหลืออยู่เยอะกว่าที่คิดเลยนะคะ"
1005802-209 = "แสดงว่าเราสามารถสื่อความจริงใจของชมรมอัศวินบรรเทาทุกข์ไปถึงชาวเมืองได้ น่าจะเป็นเรื่องดีนะคะ"
1005802-210 = "อีกอย่างค่ะคุณครู... วันนี้เราออกลาดตระเวนไปด้วยกันทั้งวัน และฉันรู้สึกว่า..."
1005802-211 = "พวกเราสองคนเข้ากันได้ดีทีเดียวเลยนะคะ"
1005802-212 = "[s] \"อะ... อื้อ...? ถ้ามิเนะคิดแบบนั้นก็คงเป็นแบบนั้นแหละ...\""
1005802-213 = "ว่าแล้วเชียว คุณครูเองก็คิดเหมือนกันสินะคะ"
1005802-214 = "ฉันมองไม่ผิดเลยจริงๆ ค่ะ"
1005802-220 = "คุณครูเองก็มีความสามารถในการบรรเทาทุกข์ที่ยอดเยี่ยมเหมือนกันค่ะ!"
1005802-221 = "ว่ายังไงคะ? คุณครูสนใจมาเป็นสมาชิกชมรมอัศวินบรรเทาทุกข์ และช่วยเหลือชาวเมืองให้มากขึ้น#nไปด้วยกันหรือเปล่าล่ะคะ?"
1005802-222 = "[s3] \"ครูขอปฏิเสธก่อนแล้วกัน!\"\n[s4] \"ขอบคุณที่ชวนนะ แต่ครูยังต้องฝึกอีกเยอะ!\""
1005802-223 = "อย่างนั้นเหรอคะ น่าเสียดายนะคะ..."
1005802-224 = "อย่างนั้นเหรอคะ น่าเสียดายนะคะ..."
1005802-225 = "แต่ว่าถ้าคุณครูเปลี่ยนใจ ก็บอกฉันได้ตลอดเลยนะคะ "
1005802-226 = "ฉันจะเก็บตำแหน่ง \"ที่ปรึกษา\" ของชมรมอัศวินบรรเทาทุกข์ไว้ให้คุณครูนะคะ"

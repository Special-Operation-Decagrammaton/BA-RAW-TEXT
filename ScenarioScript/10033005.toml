[translation]
10033005-1 = "序幕;彷彿晴天霹靂"
10033005-2 = "呼啊啊啊……"
10033005-3 = "多久沒有這種閒暇時光了啊……"
10033005-4 = "就是說啊～真自由～"
10033005-5 = "既安靜又沒有意外和騷動，而且身旁……"
10033005-11 = "哈啊啊啊啊……#n雖然這麼說有點誇張，但我真希望時間能留在這個瞬間……"
10033005-12 = "啊～想到了～"
10033005-17 = "撲通地一聲"
10033005-18 = "躍進靜謐小溪的"
10033005-19 = "一尾紅鯉魚"
10033005-23 = "啊……！知世醬突如其來的俳句……！這真是……"
10033005-24 = "太和平了！"
10033005-28 = "就是說啊～喵哈哈～"
10033005-29 = "哦，話說我想起來了──#n格黑娜的人似乎想要到我們百鬼夜行來一場修學之旅。"
10033005-31 = "這樣啊。"
10033005-32 = "很讓人期待對吧～？"
10033005-33 = "對吧～？"
10033005-35 = "原來如此，呵呵……"
10033005-39 = "……嗯？#n仁耶大人，您剛才說什麼？"
10033005-40 = "修學旅行哦。#n格黑娜要來百鬼夜行。"
10033005-41 = "格黑娜要來百鬼夜行。"
10033005-42 = "嗯，就是這樣。"
10033005-46 = "什麼──！？！？"
10033005-48 = "旅行～？"
10033005-49 = "合，合約合約！有做什麼準備嗎？#n基本計劃書和費用估算書呢？"
10033005-50 = "嗯～？"
10033005-51 = "……報價單和業務提案申請書，或者樣本也行。#n時間表和布置圖、飲食表、綜合診斷表、設施狀況表、規格合約或競爭合約。#n還有……還有其他的……"
10033005-52 = "我覺得～佳穗應該先冷靜下來，保持平靜比較好哦～？"
10033005-54 = "說，說的也是。沒必要現在就這麼激動……"
10033005-55 = "因為一個也沒有準備嘛～"
10033005-56 = "果然是這樣嗎！#n還有更重要的是，為什麼不早點說呢！？"
10033005-57 = "呃……因為我完全忘了……"
10033005-63 = "……當然不是這樣。#n是因為如果是佳穗的話，即使是突如其來的情況也能很好地應對～"
10033005-64 = "嗯，該說我就是這麼信任你～嗎？"
10033005-69 = "仁～耶～大～人～！？"
10033005-70 = "嘎啊～"
10033005-75 = "電話～訊息～"
10033005-77 = "來，在這裡。"
10033005-78 = "啊，謝，謝謝！知世醬。"
10033005-82 = "呼，總之先整理一下心情……#n不過……總覺得不太對勁……"
10033005-87 = "這是……格黑娜風紀委員會發來的公文……？"
10033005-92 = "什麼！？格黑娜風紀委員會和百花繚亂紛爭調停委員會的業務會談通知！？！？"
10033005-93 = "「……如上所述，特此向陰陽部尋求協助及參與……」"
10033005-99 = "不行哦～在這種地方睡著對身體不好～"
10033005-104 = "沒錯！要是……要是連我都倒下的話，還有誰能處理這件事呢！"
10033005-105 = "總之我先整理一下情況，仁耶大人。"
10033005-106 = "啊哈～佳穗，你的表情太僵硬囉～#n要不要考慮放輕鬆一點……"
10033005-112 = "我來整理一下情況。"
10033005-113 = "喵哈哈。#n嗯，如果佳穗想要的話……？"
10033005-114 = "首先，我們收到了來自格黑娜學園的百鬼夜行修學旅行提案書。#n到這裡為止沒錯吧？"
10033005-115 = "嗯～是這樣沒錯～？"
10033005-116 = "而且相應的行政程序完全沒有進展。"
10033005-117 = "然而格黑娜的學生近期就會來到這裡，也就是百鬼夜行進行修學旅行。#n到這裡為止沒錯吧？"
10033005-118 = "確實是那樣～？"
10033005-122 = "除此之外，剛才還收到格黑娜風紀委員會的公文，#n希望我們陰陽部能夠一同參與和百花繚亂的業務會談。"
10033005-123 = "換句話說，就是希望我們能建立與百花繚亂之間的協商管道。"
10033005-125 = "以上都確認沒錯吧？"
10033005-126 = "都像佳穗說的一樣哦～？"
10033005-134 = "啊，又倒下去了～"
10033005-139 = "不……不行，知世醬，我還不能倒下。#n至少在徹底搞定這件事之前……"
10033005-140 = "在將百鬼夜行的優點……！盡可能向格黑娜學園的各位傳達之前……"
10033005-141 = "嗯嗯，這種心態就對了～佳穗。"
10033005-146 = "那麼仁耶大人，我現在將前往百花繚亂紛爭調停委員會。"
10033005-147 = "嗯？那樣雖然好，不過修學旅行的準備呢～？"
10033005-148 = "距離格黑娜學園的拜訪還有一段時間……"
10033005-149 = "不過格黑娜學園的風紀委員明天就會抵達。"
10033005-150 = "因此，與百花繚亂的協商管道必須在今天下午成立。#n這是眼下最迫切的任務。"
10033005-151 = "不，不過其他事情也一樣需要推進……我是這麼想的～？"
10033005-153 = "迎接客人本來就是我們陰陽部的職責！"
10033005-155 = "所以仁耶大人！在我處理這件事的期間……剩下的事就交給您了！"
10033005-160 = "佳穗真的很勤奮呢～"
10033005-161 = "嗯～沒問題嗎～？"
10033005-162 = "呵呵，沒問題的～既然佳穗這麼努力，我們也應該認真……！#n但話雖如此……"
10033005-163 = "這樣果然有點無趣對吧，知世～？"
10033005-164 = "無趣？"
10033005-165 = "故事總是需要意外的場面、出乎意料的情節和超乎期待的發展。#n這樣才能充滿活力跟趣味呀！"
10033005-166 = "我們應該用更公平的方式進行這次活動，以炒熱氣氛和增加樂趣為目標……"
10033005-167 = "希望可以更有趣～"
10033005-168 = "嗯，就朝那個方向進行吧～？喵哈哈！"

[translation]
10033005-1 = "บทเริ่มต้น;ข่าวสายฟ้าแลบ"
10033005-2 = "ฮื้มมมม..."
10033005-3 = "ไม่ได้มีเวลาว่างแบบนี้มานานแค่ไหนแล้วนะ..."
10033005-4 = "นั่นสินะ สบายดีจัง"
10033005-5 = "ทั้งเงียบสงบ ไม่มีเหตุร้าย และไม่มีเรื่องที่คาดไม่ถึงด้วย แถมข้างๆ ตรงนี้ก็ยัง..."
10033005-11 = "เฮ้อออ... ถึงจะไม่ควรพูดอย่างนี้ แต่ฉันอยากหยุดเวลาไว้ที่ตรงนี้จังเลยค่ะ..."
10033005-12 = "อ๊ะ คิดออกแล้ว"
10033005-17 = "ปลาคาร์ปแหวกว่าย"
10033005-18 = "โดดส่ายไปมา"
10033005-19 = "ริมน้ำสงบงัน"
10033005-23 = "ฮะ... เฮือก...! กลอนไฮกุแบบไม่ทันตั้งตัวจากชิเซะจัง...! บรรยากาศนี้มันช่าง..."
10033005-24 = "สงบจังเลยนะคะ!"
10033005-28 = "นั่นสิ~ อะฮะฮ่า~"
10033005-29 = "อ่า... จะว่าไปฉันก็เพิ่งนึกได้นะว่าครั้งนี้ทางเกเฮนน่าบอกว่าอยากมาทัศนศึกษาที่เฮียกคิยาโคของเรา~"
10033005-31 = "อย่างนั้นเหรอคะ"
10033005-32 = "น่าตื่นเต้นจังเลย เนอะ~?"
10033005-33 = "เนอะ~?"
10033005-35 = "งั้นเหรอคะ ฮุฮุ..."
10033005-39 = "คะ...? เมื่อกี้คุณนิยะว่าอะไรนะคะ?"
10033005-40 = "อื้ม เด็กเกเฮนน่า จะมาทัศนศึกษา ที่เฮียกคิยาโค"
10033005-41 = "เด็กเกเฮนน่า จะมาทัศนศึกษา ที่เฮียกคิยาโค"
10033005-42 = "อื้ม ใช่แล้วละ"
10033005-46 = "ว่าไงนะคะ?!?!"
10033005-48 = "มาเที่ยวเหรอ?"
10033005-49 = "นะ... หนังสือสัญญา หนังสือสัญญา! มีเอกสารอะไรที่เตรียมไว้บ้างไหมคะ? แล้วกำหนดการทัศนศึกษา หรือหนังสืองบประมาณที่คาดการณ์ล่ะ?"
10033005-50 = "ฮืมม~"
10033005-51 = "เราต้องเตรียมใบประเมินราคา ใบคำร้องเสนอโครงการ เอาเป็นแบบฟอร์มมาก่อนก็ได้ค่ะ ไหนจะเรื่อง#nกำหนดการ ตารางบุคลากร รายการอาหาร ตารางวินิจฉัยทั่วไป ตารางสถานะอาคารและสิ่งอำนวยความ#nสะดวก สัญญาแสดงจำนวนผู้เข้าร่วมและความประสงค์ในการร่วมมือ แล้วก็... แล้วก็..."
10033005-52 = "ใจเย็นๆ~ ฉันว่าคาโฮะควรตั้งสติและทำใจให้สงบก่อนนะ~"
10033005-54 = "คะ... คงต้องเป็นอย่างนั้นค่ะ ฉันไม่ควรตื่นเต้นจนเกินพอดี..."
10033005-55 = "ก็เพราะว่ายังไม่มีอะไรเตรียมไว้เลยยังไงล่ะ~"
10033005-56 = "อย่างนั้นเหรอคะ? แล้วทำไมไม่บอกกันล่ะคะ?!"
10033005-57 = "อ่า... ก็เพราะฉันลืมไปซะสนิทเลยน่ะ..."
10033005-63 = "ซะทีไหนล่ะ... เพราะฉันคิดว่าคาโฮะต้องรับมือกับสถานการณ์ที่กะทันหันได้ต่างหากล่ะ~"
10033005-64 = "อืม เพราะฉันเชื่อใจคาโฮะถึงขนาดนี้เลยน่ะ~"
10033005-69 = "คุณ~ นิ~ ยะ~?!"
10033005-70 = "อ๊าย~"
10033005-75 = "สายโทรเข้า... หรือข้อความนะ..."
10033005-77 = "เอ้านี่ รับนะ"
10033005-78 = "อ๊ะ ขะ... ขอบคุณค่ะ! ชิเซะจัง"
10033005-82 = "ฮู่ว ฉันควรทำใจให้สงบก่อน... แต่ว่า... ไม่รู้ว่าทำไมถึงรู้สึกไม่ค่อยดีเลยค่ะ..."
10033005-87 = "นี่มัน... เอกสารจากคณะกรรมการวินัยเกเฮนน่านี่คะ...?"
10033005-92 = "อะไรนะคะ?! แจ้งการประชุมหารือระหว่างคณะกรรมการวินัยเกเฮนน่ากับคณะไกล่เกลี่ยข้อพิพาท#nเฮียกกะเรียวรัน?!?!"
10033005-93 = "\"จากที่ได้กล่าวข้างต้น เราจึงใคร่ขอความร่วมมือทางการศึกษาจากชมรมหยินหยางทุกคน รวมถึงเรื่องการประชุมหารือ...\""
10033005-99 = "ไม่ได้สิ ถ้าหลับในที่แบบนี้มันจะไม่ดีต่อร่างกายนะ"
10033005-104 = "ใช่ค่ะ! ถะ... ถ้าฉันเป็นลมไปด้วยอีกคน! แล้วใครจะมาจัดการงานแทนฉันล่ะคะ!"
10033005-105 = "ฉันขอทำความเข้าใจสถานการณ์ก่อนนะคะ คุณนิยะ"
10033005-106 = "อะฮ่า~ คาโฮะ หน้านิ่วคิ้วขมวดไปหมดแล้วนะ~ ผ่อนคลายสักหน่อยดีมั้ย~"
10033005-112 = "ฉันขอทำความเข้าใจสถานการณ์ก่อนค่ะ"
10033005-113 = "อะฮะฮ่า อะ... อื้ม ถ้าคาโฮะต้องการแบบนั้นก็ได้"
10033005-114 = "อย่างแรกเลยก็คือ มีเอกสารเสนอการทัศนศึกษาที่สถาบันเกเฮนน่าส่งมาให้เฮียกคิยาโค ถูกต้องไหมคะ?"
10033005-115 = "อื้ม~ ถูกแล้วละ~"
10033005-116 = "แล้วหลังจากนั้นก็ไม่มีการประสานงานอย่างเป็นกิจลักษณะ"
10033005-117 = "แต่ในไม่ช้า นักเรียนจากสถาบันเกเฮนน่าจะมาทัศนศึกษาที่สหพันธ์เฮียกคิยาโคแห่งนี้แล้ว ตรงนี้ฉันก็เข้าใจถูกใช่ไหมคะ?"
10033005-118 = "ถูกต้องอย่างที่พูดเลยละ~"
10033005-122 = "นอกจากนี้ เมื่อสักครู่นี้ฉันเพิ่งได้คำร้องจากคณะกรรมการวินัยเกเฮนน่าเรื่องการขอความร่วมมือ และการประชุมหารือกับคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน"
10033005-123 = "นั่นแปลว่า ชมรมหยินหยางของเรากับเฮียกกะเรียวรันต้องจัดตั้งคณะปฏิบัติงานขึ้นมา"
10033005-125 = "ตรงนี้คุณนิยะก็ทราบแล้วใช่ไหมคะ?"
10033005-126 = "ใช่ เป็นอย่างที่คาโฮะว่าเลยละ~"
10033005-134 = "อ้าว เป็นลมไปอีกรอบแล้ว"
10033005-139 = "ไม่ค่ะ... ไม่ใช่หรอกค่ะ ชิเซะจัง ฉันยังเป็นลมไม่ได้ค่ะ อย่างน้อยก็จนกว่าจะจัดการเรื่องนี้ให้แล้วเสร็จ..."
10033005-140 = "อย่างน้อยก็...! จนกว่าเราจะแสดงภาพลักษณ์ดีๆ ของเฮียกคิยาโคให้นักเรียนจากสถาบันเกเฮนน่าได้#nเห็น...!"
10033005-141 = "ใช่ ใช่ ต้องอย่างนี้ละ~ คาโฮะ"
10033005-146 = "ถ้างั้นฉันจะไปที่คณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันเดี๋ยวนี้เลยค่ะ คุณนิยะ"
10033005-147 = "หืม? ก็เป็นความคิดที่ดีอยู่หรอกนะ แต่เรื่องการเตรียมทัศนศึกษาล่ะ~?"
10033005-148 = "เรายังมีเวลาเตรียมงานก่อนที่ทุกคนจากสถาบันเกเฮนน่าจะมาถึงก็จริง..."
10033005-149 = "แต่ในเอกสารบอกว่าคณะกรรมการวินัยจากสถาบันเกเฮนน่าจะมาถึงพรุ่งนี้แล้วค่ะ"
10033005-150 = "เพราะงั้นฉันควรต้องจัดการเรื่องคณะปฏิบัติงานกับเฮียกกะเรียวรันภายในบ่ายวันนี้เลยค่ะ นี่เป็นงานที่เร่งด่วนที่สุดตอนนี้ค่ะ"
10033005-151 = "ตะ... แต่ว่างานอื่นๆ ก็ต้องทำเหมือนกันไม่ใช่เหรอ~? ฉันคิดแบบนั้นนะ~"
10033005-153 = "การต้อนรับแขกเป็นหน้าที่ของชมรมหยินหยางอยู่แล้วค่ะ!"
10033005-155 = "ถ้างั้น คุณนิยะ! ระหว่างที่ฉันไปจัดตั้งคณะปฏิบัติงาน... ฉันฝากเรื่องนั้นด้วยนะคะ!"
10033005-160 = "คาโฮะนี่ขยันจริงๆ เลยนะ~"
10033005-161 = "อืม~ จะไม่เป็นไรใช่มั้ย~?"
10033005-162 = "ฮืม ต้องไม่เป็นไรอยู่แล้วละ~ คาโฮะก็จะออกแรงช่วยตั้งขนาดนี้! จากนี้เราเองก็ควรจะต้องรับผิดชอบ#nงานอย่างขยันขันแข็ง...! แต่ว่า..."
10033005-163 = "มันก็ไม่น่าสนุกเลยสักนิด ใช่มั้ยล่ะชิเซะ~?"
10033005-164 = "ไม่น่าสนุกเหรอ?"
10033005-165 = "เรื่องราวต้องมีองค์ประกอบและเหตุการณ์เกินคาด และต้องมีการเดินเรื่องที่คาดไม่ถึง จะได้มีชีวิตชีวา และสนุกยังไงล่ะ~"
10033005-166 = "ฉันอยากใช้วิธีที่ยุติธรรมมากขึ้นหน่อย เพื่อทำให้เรื่องนี้สนุกมากขึ้น..."
10033005-167 = "ขอให้สนุกขึ้นนะ~"
10033005-168 = "อืม จะเลือกทำแบบไหนดีนะ~? อะฮะฮ่ะ"

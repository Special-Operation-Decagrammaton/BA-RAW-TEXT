[translation]
1005803-1 = "อาณาจักรแห่งงานอดิเรก"
1005803-6 = "(จู่ๆ มิเนะก็เชิญคุณครูไปที่ห้อง...)"
1005803-7 = "เชิญค่ะคุณครู ที่นี่คือห้องของฉันเองค่ะ"
1005803-8 = "[s] \"เก็บสะสมเวชภัณฑ์... หมายถึงแบบนี้เองสินะ\""
1005803-9 = "ไม่ใช่เรื่องที่ยิ่งใหญ่อะไรหรอกค่ะ"
1005803-10 = "มันก็เหมือนกับการที่ใครบางคนเก็บสะสมหนังสือ สะสมแสตมป์ หรือฝาขวดเป็นที่ระลึก..."
1005803-11 = "ฉันก็แค่เก็บสะสมพวกเวชภัณฑ์ค่ะ"
1005803-12 = "มันใช้งานได้จริง แล้วก็ใช้ในการต่อสู้ได้ด้วยค่ะ"
1005803-13 = "[s] \"แต่ว่ามันไม่เยอะไปหน่อยเหรอ?!\""
1005803-14 = "มันก็เยอะไปนิดหน่อยจริงๆ นั่นละค่ะ..."
1005803-15 = "ถ้ามองในมุมมองคนอื่นละก็ คงจะดูเยอะไปจริงๆ นั่นแหละค่ะ"
1005803-16 = "แต่ว่าคุณครูคะ ฉันคือสมาชิกของชมรมอัศวินบรรเทาทุกข์นะคะ"
1005803-17 = "ไม่ว่าตอนไหน หรือเมื่อไหร่ ฉันก็ต้องเตรียมพร้อมเสมอใช่มั้ยล่ะคะ?"
1005803-18 = "ไม่ว่าจะต้องเผชิญกับอะไรด้วยค่ะ!"
1005803-19 = "[s1] \"อะ... อื้อ ครูไม่ได้ว่าอะไรเรื่องงานอดิเรกของมิเนะหรอก\"\n[s2] \"ครูไม่ได้ว่าอะไรหรอก แต่คิดว่ามีของเหมือนกันเยอะเกินไปก็เท่านั้น...\""
1005803-22 = "ของที่เหมือนกันงั้นเหรอคะ...?"
1005803-27 = "เรื่องที่คุณครูพูดมา ฉันคงจะมองข้ามไม่ได้เด็ดขาดค่ะ!"
1005803-28 = "พูดถึงเรื่องผ้าพันแผล ผ้าพันแผลอันนี้กับอันที่อยู่ตรงนั้น มันไม่เหมือนกันหรอกนะคะ!"
1005803-29 = "[s] \"ในสายตาครูมันก็เหมือนกันหมดนั่นแหละ...?\""
1005803-30 = "ไม่เหมือนค่ะ! ผ้าพันแผลเนื้อแน่นอันนี้ เป็นผ้าพันแผลของ <เซนต์ แอน เมดิคัล> ที่มีชื่อเสียงมากนะคะ"
1005803-31 = "พวกเขาผลิตแต่เวชภันฑ์ที่ราคาแพงและหวังกำไรจากการขายสินค้า แต่เพราะตอนนี้ในท้องตลาด#nยังไม่มีสินค้าอื่นที่มีคุณภาพดีเท่ากัน ฉันเลยต้องซื้อมาเตรียมไว้อย่างช่วยไม่ได้ค่ะ!"
1005803-32 = "ฉันเก็บไว้ใช้ในกรณีต้องรักษาฉุกเฉิน เพราะมันมีประสิทธิภาพในการห้ามเลือดและฆ่าเชื้อที่ดีมาก แถมยังเหนียวและยืดหยุ่น ใช้พันแผลได้ดีมากเลยค่ะ!"
1005803-33 = "หากฟังแค่สรรพคุณ ก็ดูเหมือนจะเป็นผ้าพันแผลที่สมบูรณ์แบบค่ะ แต่ว่า..."
1005803-34 = "ผ้าพันแผลอันนี้มีราคาสูงกว่าผ้าพันแผลที่ขายตามท้องตลาดถึง 5-7 เท่าเลยค่ะ!"
1005803-39 = "ส่วนทางนี้คือผ้าพันแผลของ <โรจู> ค่ะ "
1005803-40 = "วัสดุมีความหนาแน่นมาก เลยใช้พันแผลได้ดี รวมถึงมีความยาวอย่างพอเหมาะ ทำให้ใช้พันแผล#nได้หลายส่วนค่ะ"
1005803-41 = "ราคาอยู่ในระดับปานกลาง ค่อนไปในราคาถูก เพราะแบบนั้นใครๆ ก็เลยสามารถซื้อมาใช้ได้ค่ะ"
1005803-42 = "อาจกล่าวได้ว่าเป็นสินค้าที่ใกล้เคียงกับคุณค่าดั้งเดิมของผ้าพันแผลที่สุดค่ะ!"
1005803-43 = "[s] \"อื้อ... อย่างนั้นเองสินะ!\""
1005803-44 = "ส่วนครีมทารักษาบาดแผลพวกนี้ก็ไม่เหมือนกันนะคะ!"
1005803-48 = "ครีมทาแผลกล่องสีแดงตรงนี้ เป็นยาทายับยั้งแบคทีเรียค่ะ"
1005803-49 = "ใช้สำหรับรักษาผิวหนังติดเชื้อจากแบคทีเรียแกรมบวกค่ะ"
1005803-50 = "ส่วนครีมทาแผลกล่องสีเขียวตรงนี้จะมีฤทธิ์ในการรักษาแผลติดเชื้อจากแบคทีเรียได้ต่ำกว่า"
1005803-51 = "แต่มีประสิทธิภาพในเรื่องช่วยสร้างเซลล์ใหม่ ทำให้แผลหายเร็วขึ้นค่ะ"
1005803-52 = "นอกจากนี้ในตัวยายังมีส่วนผสมของสเตียรอยด์ จึงช่วยรักษาและบรรเทาอาการอักเสบได้อย่างดีค่ะ"
1005803-53 = "แน่นอนว่าผลิตภัณฑ์ที่ผสมสารสเตียรอยด์ หากใช้ในปริมาณมากเกินไปก็อาจจะทำให้เกิดอันตรายได้..."
1005803-54 = "[s3] \"อย่างนี้นี่เอง! ครูไม่เคยรู้มาก่อนเลยนะเนี่ย!\"\n[s4] \"ถึงฟังไม่ค่อยเข้าใจก็เถอะ แต่มิเนะนี่สุดยอดเลยนะ!\""
1005803-57 = "อืมมมม..."
1005803-58 = "ถึงจะอธิบายให้คุณครูฟังยังไง คุณครูก็คงไม่เข้าใจความแตกต่างของประโยชน์ กับความงดงาม#nของเวชภัณฑ์แต่ละตัวไม่ได้สินะคะ..."
1005803-59 = "ไม่เป็นไรค่ะ ฉันมีวิธีอื่นอยู่ค่ะ!"
1005803-68 = "ฉันจะกรีดแขนตัวเองเพื่อสาธิตให้ดูค่ะ!"
1005803-69 = "[s] \"จะทำแบบนั้นทำไมเล่า?!\""
1005803-70 = "เวลาที่ไม่เข้าใจอะไร การเรียนรู้ด้วยร่างกายจริงๆ จะเป็นวิธีที่ได้ผลที่สุดค่ะ!"
1005803-71 = "ถ้าใช้ร่างกายของฉันสาธิตผลของเวชภัณฑ์แต่ละตัวละก็..."
1005803-72 = "คุณครูน่าจะเข้าใจถึงประเภท และความแตกต่างของเวชภัณฑ์พวกนั้นได้อย่างชัดเจนแน่นอนค่ะ!"
1005803-73 = "[s] \"หยุดเลย อย่าแม้แต่จะคิดเชียว!\""
1005803-74 = "แค่นิดเดียวเองค่ะ! เช่นเอาเข็มแทงที่ปลายนิ้ว หรือไม่ก็เอามีดกรีดที่ข้อมือ...!"
1005803-75 = "คะ? คุณครูจะไม่ยอมเห็น... นักเรียนบาดเจ็บต่อหน้าเด็ดขาดงั้นเหรอคะ?"
1005803-79 = "ถ้าเป็นแบบนั้นละก็... ขอโทษด้วยนะคะคุณครู ดูเหมือนฉันจะตื่นเต้นเกินไปหน่อยน่ะค่ะ..."
1005803-80 = "งั้นถ้าเกิดว่าคุณครูตกอยู่ในสถานการณ์ที่ต้องปฐมพยาบาลฉุกเฉินขึ้นมาละก็..."
1005803-81 = "ถึงตอนนั้นรบกวนมาหาฉันด้วยนะคะ"
1005803-83 = "(หลังจากนั้นคุณครูก็นั่งฟังมิเนะบรรยายเรื่องเวชภัณฑ์ต่างๆ ต่ออย่างร้อนแรง ก่อนจะกลับไปที่ชาเล่ต์)"

[translation]
1005803-1 = "#title;취미의 영역"
1005803-2 = "#wait;2500"
1005803-3 = "#wait;1500"
1005803-4 = "#all;hide"
1005803-5 = "#wait;500"
1005803-6 = "#na;(엉겁결에 미네의 방으로 초대받았다……)"
1005803-7 = "2;미네;03;어서 오십시오, 선생님. 여기가 제 방입니다.\n#2;em;[반응]\n#2;a"
1005803-8 = "[s] \"의료 용품 수집이라는 게…… 이런 거구나.\""
1005803-9 = "2;미네;02;대단한 것은 아닙니다.\n#2;m3"
1005803-10 = "2;미네;99;누군가는 책을 수집하고, 누군가는 병뚜껑이나 우표, 기념 주화 같은 것을 수집하는 것처럼……\n#2;em;…"
1005803-11 = "2;미네;01;저는 의료 용품을 모으는 것뿐입니다.\n#2;greeting"
1005803-12 = "2;미네;02;실용적이기도 하고, 실전적이기도 하죠."
1005803-13 = "[s] \"그렇다고 해도 이건 조금 많지 않을까?!\""
1005803-14 = "2;미네;99;확실히 상당한 수가 쌓여 있기는 하군요……"
1005803-15 = "2;미네;02;일반적인 시각에서 보자면 그렇게 보일 가능성도 있겠습니다만."
1005803-16 = "2;미네;01;그러나 선생님. 저희는 구호기사단입니다.\n#2;em;[반응]"
1005803-17 = "2;미네;09;언제, 어느 때든 항상 준비되어 있어야 하지 않을까요?!"
1005803-18 = "2;미네;05;그게 무엇이든 간에 말이죠!\n#2;em;[!]"
1005803-19 = "[s1] \"으, 응…… 미네의 취미에 대해서 뭐라고 할 생각은 없어.\"\n[s2] \"단지, 내가 보기엔 너무 똑같은 물건들로 겹치는 것 같아서 말이지……\""
1005803-20 = "#wait;100"
1005803-21 = "#wait;100"
1005803-22 = "2;미네;02;똑같은 물건이라고요……?\n#2;em;[?]"
1005803-23 = "#st;[0,0];instant;1;"
1005803-24 = "#clearST"
1005803-25 = "2;미네;09\n#2;em;…\n#wait;2500"
1005803-26 = "2;미네;99\n#2;h\n#2;stiff\n#wait;1500"
1005803-27 = "2;미네;05;그 말씀은 그냥 넘어갈 수 없겠군요!\n#2;closeup\n#fontsize;100"
1005803-28 = "2;미네;09;가령 이 붕대와 저 붕대만 해도, 절대로 같은 붕대가 아닙니다!\n#2;closeup"
1005803-29 = "[s] \"내 눈에는 그냥 똑같은 붕대로 보이는데……?\""
1005803-30 = "2;미네;05;달라요! 이쪽의 결이 촘촘한 붕대는 그 유명한 <세인트 앤 메디컬>의 붕대입니다.\n#2;closeup\n#2;em;[빠직]\n#2;stiff\n#fontsize;80"
1005803-31 = "2;미네;09;고가의 의료 용품만을 생산해 시세차익을 노리지만, 대체품이 없어 어쩔 수 없이 구입해 둬야 하는 붕대죠!\n#2;closeup"
1005803-32 = "2;미네;09;긴급 치료에 특화되어 있어 지혈과 소독 효과가 탁월한데다, 충분한 장력으로 상처 압박에도 효과적입니다!\n#2;closeup"
1005803-33 = "2;미네;99;설명만 들으면 완벽한 붕대처럼 보이기도 합니다만……\n#2;closeup"
1005803-34 = "2;미네;05;그 대신 보통 붕대의 다섯 배에서 일곱 배의 가격을 자랑하는 물건이기도 하죠!\n#2;em;[!]\n#2;closeup\n#fontsize;80"
1005803-35 = "#st;[0,0];instant;1;"
1005803-36 = "#clearST"
1005803-37 = "#all;hide"
1005803-38 = "3;미네;09\n#3;m4\n#wait;1200"
1005803-39 = "3;미네;02;그에 반해 이쪽 붕대는 <로쥬> 사의 붕대입니다. \n#3;em;[반응]"
1005803-40 = "3;미네;01;결이 촘촘해 부위 고정에 특화되어 있고, 품도 넉넉해 폭넓은 압박이 가능합니다."
1005803-41 = "3;미네;99;가격도 중저가 정도로 저렴한 편이라, 누구든 부담 없이 구비해 둘 수 있습니다.\n#3;m3"
1005803-42 = "3;미네;05;붕대 본연의 가치에 가장 잘 들어맞는 상품이라 할 수 있겠죠!\n#3;em;[!]\n#3;closeup"
1005803-43 = "[s] \"으, 응! 그렇구나!\""
1005803-44 = "3;미네;09;이 쪽의 상처 치료 연고도 같은 물건이 아니랍니다!\n#3;em;[빠직]"
1005803-45 = "#st;[0,0];instant;1;"
1005803-46 = "#clearST"
1005803-47 = "3;미네;09\n#3;greeting\n#wait;1500"
1005803-48 = "3;미네;05;여기, 붉은 색 포장지의 연고는 세균 증식 억제에 특화되어 있는 상품이죠.\n#3;em;[반응]"
1005803-49 = "3;미네;05;피부감염에 1차적으로 잘 생기는 그람양성균을 제어하는 데 특히 효과적입니다."
1005803-50 = "3;미네;09;그에 반해 이 녹색 포장지의 연고는 세균 증식 억제 효과는 조금 약하지만,\n#3;m2"
1005803-51 = "3;미네;09;세포 재생을 촉진시켜 상처를 상대적으로 더 빠르게 아물도록 합니다."
1005803-52 = "3;미네;09;약간의 스테로이드 성분도 함유되어 있어 염증 소거에도 탁월하고요."
1005803-53 = "3;미네;99;물론 스테로이드 성분 때문에 남용하는 것은 위험성을 동반하기도 합니다만……\n#3;m3"
1005803-54 = "[s3] \"그렇구나! 하나도 모르겠어!\"\n[s4] \"잘 모르겠지만, 미네는 대단하구나!\""
1005803-55 = "#wait;10"
1005803-56 = "#wait;10"
1005803-57 = "3;미네;04;으으으으음……"
1005803-58 = "3;미네;06;어떻게 설명 드려도 이 용도와 차이, 아름다움을 이해하지 못하시는군요……\n#3;em;[속상함]\n#3;stiff"
1005803-59 = "3;미네;09;괜찮습니다. 방법이 있을 겁니다!"
1005803-60 = "#st;[0,0];instant;1;"
1005803-61 = "#clearST"
1005803-62 = "3;미네;09\n#3;em;…\n#wait;2500"
1005803-63 = "3;미네;02\n#3;em;[반응]\n#wait;1200"
1005803-64 = "3;미네;99\n#3;h\n#wait;1500"
1005803-65 = "3;미네;01\n#3;d\n#wait;1000"
1005803-66 = "3;미네;01\n#3;a\n#3;closeup\n#wait;1000"
1005803-67 = "#wait;1000"
1005803-68 = "3;미네;09;제 몸에 한번 상처를 내 보도록 하죠!\n#3;em;[반응]\n#3;closeup\n#fontsize;100"
1005803-69 = "[s] \"어째서?!\""
1005803-70 = "3;미네;05;무언가를 잘 모를 때에는, 몸으로 익히는 것이 가장 효과적이라고 들었습니다!\n#3;stiff\n#3;closeup"
1005803-71 = "3;미네;99;제 몸을 대상으로 의료 용품들의 효과를 비교한다면,\n#3;closeup"
1005803-72 = "3;미네;09;선생님께서도 그 차이와 용도에 대해 깊은 이해를 가지실 수 있을 것으로 보입니다!\n#3;em;[!]\n#3;closeup"
1005803-73 = "[s] \"그건 그만 둬!\""
1005803-74 = "3;미네;05;아주 조금만이면 됩니다! 손끝을 바늘로 살짝 찌른다든가, 아니면 손목을 메스로 조금만 그어 본다든가……!\n#3;em;[반응]\n#3;closeup"
1005803-75 = "3;미네;02;예? 선생님의 눈 앞에서…… 학생이 다치는 모습은 볼 수 없다고요……?\n#3;closeup"
1005803-76 = "#st;[0,0];instant;1;"
1005803-77 = "#clearST"
1005803-78 = "3;미네;04\n#3;em;…\n#3;closeup\n#wait;2500"
1005803-79 = "3;미네;06;그런 것이라면…… 죄송합니다. 선생님. 제가 너무 흥분한 모양입니다……\n#3;em;[땀]\n#3;stiff\n#3;closeup"
1005803-80 = "3;미네;99;하지만 만에 하나 응급 처치가 필요한 상황이 닥친다면……\n#3;closeup"
1005803-81 = "3;미네;02;그 때는 꼭 저를 찾아 주십시오.\n#3;greeting\n#3;closeup"
1005803-82 = "#all;hide"
1005803-83 = "#na;(그 뒤로도 의료 용품에 대한 미네의 열성적인 설명을 들으며, 샬레로 돌아갔다.)"

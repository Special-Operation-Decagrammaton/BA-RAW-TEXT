[translation]
1005803-1 = "興趣與實際利益"
1005803-6 = "（順著對話被招待到了美禰的房間）"
1005803-7 = "老師，恭候多時了。這裡就是我的房間。"
1005803-8 = "[s]「有超多醫療用品……」"
1005803-9 = "這樣的數量並不算多。"
1005803-10 = "有人喜歡收集大量書本，也會有人喜歡收集瓶子、瓶蓋、郵票或是紀念品。和他們一樣唷。"
1005803-11 = "我只是特別專注於醫療用品，僅此而已。"
1005803-12 = "您覺得怎麼樣呢？全都是非常實用的東西對吧？"
1005803-13 = "[s]「話雖如此，這會不會有點太多了……！？」"
1005803-14 = "確實累積了一定的數量……"
1005803-15 = "在一般學生的眼中或許會覺得很多。"
1005803-16 = "不過老師，我們是「救護騎士團」。"
1005803-17 = "隨時都應該做好能夠進行救護的準備不是嗎！？"
1005803-18 = "無論何時都該預想到各種可能的情況才行！"
1005803-19 = "[s1]「嗯，嗯，我覺得那是件好事……」\n[s2]「只是，在我這個外行人看來好像全都是類似的東西……」"
1005803-22 = "都是類似的東西……？"
1005803-27 = "這句話我可不能當作沒聽見！"
1005803-28 = "舉例來說，這個繃帶和那個繃帶完全不同！"
1005803-29 = "[s]「咦……？」"
1005803-30 = "這個細密的繃帶，#n是那個知名的「Saint and Medical」公司生產的繃帶。"
1005803-31 = "該公司生產的醫療用品全都很昂貴，雖然很想在特價時大量購入，但因為還是很貴所以無法那麼做！"
1005803-32 = "其特色是專門用於緊急治療，因此止血與消毒效果卓越，其伸縮性對壓迫傷口也很有效！"
1005803-33 = "聽我剛才的說明，您可能會覺得這是完美的繃帶……"
1005803-34 = "然而它的價格可是比一般使用的繃帶足足高了五倍以上！"
1005803-39 = "而這邊的繃帶則是「Loge」公司的繃帶。"
1005803-40 = "因其較薄、易於纏繞且不易鬆脫的特性，專門用來固定部位，足夠的寬度讓它能夠壓迫住各式各樣的部位。"
1005803-41 = "價格和Saint公司相比較為親民，一般家庭也能較無壓力地常備使用吧。"
1005803-42 = "以常備繃帶來說，可說是非常值得向大眾推薦的商品！"
1005803-43 = "[s]「原，原來如此……！」"
1005803-44 = "這裡的軟膏也是！"
1005803-48 = "這個紅色包裝的藥膏是專門用來抑制細菌繁殖的商品。"
1005803-49 = "對抑制引發皮膚感染的革蘭氏陽性菌特別有效。"
1005803-50 = "另外，這個綠色包裝的藥膏雖然抑制細菌繁殖的效果較差……"
1005803-51 = "但是能促進細胞再生，相對地就能讓傷口更快痊癒。"
1005803-52 = "同時含有少量的類固醇成分，消炎效果也很優秀。"
1005803-53 = "當然因為有其副作用，所以需要遵照適當的用法和用量來使用。"
1005803-54 = "[s3]「真，真是各種種類都有呢……」\n[s4]「居然記得那麼清楚，美禰真厲害呢。」"
1005803-57 = "……"
1005803-58 = "仔細想想，光用嘴巴說明是很難理解它們的特性和區別是多麼美妙的吧。"
1005803-59 = "有沒有什麼，能讓老師也可以理解的其他方法……"
1005803-68 = "……對了。在我身上弄出一點傷口吧！"
1005803-69 = "[s]「為什麼！？」"
1005803-70 = "聽說在難以理解某些概念的時候，比起只是聽和看，實際嘗試會更有效果。"
1005803-71 = "用我的身體來比較醫療用品的效果的話……"
1005803-72 = "老師一定也能理解它們的不同吧！"
1005803-73 = "[s]「算我求你了快住手！？」"
1005803-74 = "只是一點點傷口而已唷？用針或手術刀──"
1005803-75 = "……嗯？不想看到重要的學生在自己面前受傷的樣子？"
1005803-79 = "這樣的話……對不起，老師。#n我過於興奮，似乎有點脫序了。"
1005803-80 = "但是……萬一需要緊急處理的話，"
1005803-81 = "請一定要來找我。"
1005803-83 = "（之後美禰依然很熱情地講解醫療用品，結束後才返回夏萊）"

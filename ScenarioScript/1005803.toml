[translation]
1005803-1 = "The Realm of Hobbies"
1005803-6 = "Unexpectedly, you received an invitation to Mine's room..."
1005803-7 = "Welcome, Sensei. This is my room."
1005803-8 = "[s] \"So... This is what it means to collect medical supplies.\""
1005803-9 = "It's nothing amazing."
1005803-10 = "Some people collect books. Others collect bottle caps, stamps, or memorable coins..."
1005803-11 = "I simply collect medical supplies."
1005803-12 = "It's quite practical. They're so useful."
1005803-13 = "[s] \"Even so, isn't this all a bit much?!\""
1005803-14 = "It does seem like it's grown quite a lot..."
1005803-15 = "If I were to look at it from an outside perspective, I suppose I could understand."
1005803-16 = "But, Sensei, we are the Remedial Knights."
1005803-17 = "Shouldn't we be ready whenever?!"
1005803-18 = "No matter what we face!"
1005803-19 = "[s1] \"Y-Yeah... I don't have any intentions of speaking bad about your hobby, Mine.\"\n[s2] \"It's just, there seems to be quite a lot of duplicate materials...\""
1005803-22 = "Duplicate materials...?!"
1005803-27 = "I can't ignore that statement!"
1005803-28 = "Speaking of just the bandages, this one and that one are definitely not the same!"
1005803-29 = "[s] \"They look like the same wraps to me...?\""
1005803-30 = "They're different! The intricately textured one is a famous bandage from Saint Ann Medical."
1005803-31 = "They profit by producing only the most premium medical supplies. We have no choice but to buy some of these bandages, since there are no good alternatives!"
1005803-32 = "They are specialized for emergency treatment, so are excellent for stopping bleeding and sanitizing wounds. They have enough tension to apply good pressure on the wound, as well!"
1005803-33 = "It seems like the perfect bandage..."
1005803-34 = "Well, it's also priced at five to seven times the price of regular bandages!"
1005803-39 = "On the other hand, this bandage here is from Rosieu."
1005803-40 = "It has a dense weave that makes it specialized for holding things in place, and its large width allows for a wide range of compression."
1005803-41 = "The price is low to mid-range, so anyone can afford to have a stock of them!"
1005803-42 = "It's a product that could be said to be closest to the true value of a bandage!"
1005803-43 = "[s] \"Y-Yeah! I see!\""
1005803-44 = "These healing ointments are also different!"
1005803-48 = "Here, this ointment with the red wrapper is formulated to prevent germs from multiplying."
1005803-49 = "It is particularly effective in controlling gram-positive bacteria that are often the primary cause of skin infections."
1005803-50 = "That ointment in the green wrapper, on the other hand, is a little less effective at inhibiting bacterial growth."
1005803-51 = "But instead, it promotes cell regeneration, allowing the wound to heal comparatively faster."
1005803-52 = "It also has some steroidal properties, so it's great for fighting inflammation."
1005803-53 = "Of course, there are dangers to abusing it because of its steroidal properties, but..."
1005803-54 = "[s3] \"I see! I didn't understand a single thing!\"\n[s4] \"I don't really get it, but you're amazing, Mine!\""
1005803-57 = "Hmmm..."
1005803-58 = "No matter how I try to explain it, it seems that you can't understand their differences and beauty..."
1005803-59 = "It's all right. There's got to be a way!"
1005803-68 = "I know! Let's try wounding my own body!"
1005803-69 = "[s] \"Why?!\""
1005803-70 = "I've heard that if you don't know something, it's most effective to learn when it happens to your own body!"
1005803-71 = "If we compare the efficacy of these medical supplies on my body,"
1005803-72 = "I'm sure that even you'll be able to gain a deep understanding of the differences between them, Sensei!"
1005803-73 = "[s] \"Stop that!\""
1005803-74 = "Just a little bit will do! I could just poke my fingertips with a needle, or maybe slice my hand with a scalpel just a bit...!"
1005803-75 = "Huh? In front of your eyes... You can't see a student get hurt...?"
1005803-79 = "If that's true... I'm sorry. It looks like I got too excited, Sensei..."
1005803-80 = "But if you ever need emergency treatment..."
1005803-81 = "Please seek me out."
1005803-83 = "Even after that, as we returned to Schale, Mine passionately explained medical supplies."

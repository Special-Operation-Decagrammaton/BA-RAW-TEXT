[translation]
10051010-1 = "ตอนที่ 1;ข้อเสนอที่ไม่อาจปฏิเสธ"
10051010-2 = "ห้องเรียนแห่งหนึ่งในอาคารเรียนเก่าที่ 38 เฮียกคิยาโค"
10051010-3 = "(วันรุ่งขึ้นหลังจากเหตุวุ่นวายที่ร้านราเม็ง...)"
10051010-4 = "มะ... มีเรื่องอะไรเหรอคะ ท่านหัวหน้า?"
10051010-5 = "เห็นว่าจะมีประกาศใหญ่อะไรงั้นเหรอคะ..."
10051010-6 = "อ๊ะ! หรือจะมาบอกว่าซ่อมกล้องเสร็จเรียบร้อยแล้วคะ?"
10051010-7 = "ยะ... ยังไม่ได้ซ่อมเลย..."
10051010-8 = "การหาร้านซ่อมดีๆ สักแห่งไม่ใช่เรื่องง่ายเลยละ อะฮ่า"
10051010-9 = "ถึงแม้เหตุผลจริงๆ คือเราไม่มีเงินค่าซ่อมก็เถอะ..."
10051010-10 = "ถะ... ถ้างั้น หรือว่ามีคำสั่งให้ยุบชมรมของเราเหรอคะ?!"
10051010-11 = "ไม่หรอก จะเป็นแบบนั้นไปได้ยังไง"
10051010-12 = "ชมรมเราไม่ได้เป็นชมรมอย่างเป็นทางการตั้งแต่แรกด้วยซ้ำ เพราะงั้นก็ยุบไม่ได้หรอก"
10051010-13 = "เอาเถอะ เหตุผลที่ข้าน้อยเรียกทุกคนมาที่นี่ก็คือ... "
10051010-15 = "ข้าน้อยจะมาแชร์เรื่องที่ชมรมหยินหยางติดต่อเข้ามาน่ะ!"
10051010-16 = "วะ... ว่าแล้วเชียว...! พวกเราจะโดนลงโทษจากเหตุวุ่นวายที่ร้านราเม็งเมื่อวานใช่มั้ยคะ...!"
10051010-17 = "ไม่หรอกค่ะ!"
10051010-18 = "เรื่องที่เกิดขึ้นเมื่อวานเป็นกรรมตามสนองของคนพวกนั้นค่ะ ไม่ใช่ความผิดของพวกเราสักหน่อย!"
10051010-19 = "อ่า แต่ก็เป็นเพราะเหตุการณ์ที่เกิดขึ้นที่ร้านราเม็งจริงๆ นะ"
10051010-20 = "คะ?"
10051010-21 = "เหมือนเรื่องที่เกิดขึ้นเมื่อวานจะไปถึงหูของนิยะเข้าน่ะสิ"
10051010-22 = "หา...?!"
10051010-23 = "ทางนั้นติดต่อมาบอกว่า... มีเรื่องเกี่ยวกับเหตุการณ์ในร้านราเม็งที่อยากคุยด้วย ก็เลยขอให้ข้าน้อยแวะไปหาที่ชมรมหยินหยางภายในวันนี้ ประมาณนี้น่ะ"
10051010-24 = "อ้อ แล้วยังบอกด้วยนะว่าให้เข้าไปอย่างลับๆ ที่สุดเท่าที่จะทำได้"
10051010-25 = "บะ... แบบนั้นมันยิ่งน่าสงสัยนะคะ...!"
10051010-26 = "ทะ... ทางนั้นคิดจะใช้เหตุการณ์เมื่อวานเป็นเครื่องต่อรองแล้วบังคับให้พวกเราไปทำเรื่องสกปรกๆ แน่เลยค่ะ...!"
10051010-27 = "อืม... ชมรมหยินหยางไม่น่าจะเป็นกลุ่มที่ทำเรื่องเหลวไหลแบบนั้นหรอก"
10051010-28 = "หรือว่าไม่นะ... ยัยแรคคูนนิยะก็อาจทำเรื่องแบบนั้นได้หรือเปล่านะ..."
10051010-29 = "เอาเถอะน่า! ไว้ข้าน้อยจะไปที่นั่นแล้วกลับมาเล่ารายละเอียดให้ฟังแล้วกัน!"
10051010-30 = "สะ... สู้ๆ นะคะ! ท่านหัวหน้า!"
10051010-31 = "ไปดีมาดีนะคะ! นินนิน!"
10051010-33 = "ห้องชมรมหยินหยาง"
10051010-34 = "ฮุฮุ มาแล้วสินะคะ หัวหน้าชมรมวิจัยศาสตร์นินจา"
10051010-35 = "เหตุต่อสู้ที่ร้านราเม็งเมื่อวาน ต้องบอกว่าฉันได้รับชมเต็มสองตาเลยละค่ะ"
10051010-36 = "หืม? เธอก็อยู่ที่นั่นด้วยเหรอ? แล้วไปที่นั่นทำไมกันน่ะ?"
10051010-37 = "ไปร้านราเม็ง ก็ต้องไปกินราเม็งสิคะ?"
10051010-38 = "เธอก็กินราเม็งกับเขาเหมือนกันสินะ..."
10051010-39 = "นึกว่าจะกินอาหารหรูๆ อย่างไคเซกิทุกวันซะอีก..."
10051010-40 = "ที่ผ่านมาคิดว่าฉันเป็นคนแบบไหนกันคะ..."
10051010-41 = "เอาเถอะค่ะ ส่วนเรื่องเทคนิคการโจมตีที่หละหลวมด้วยประทัดเมื่อวาน... ฉันว่ามันน่าสนใจดีนะคะ อะฮะฮ่า"
10051010-42 = "มะ... มันหละหลวมตรงไหนกัน!"
10051010-43 = "เอ๋? ความหละหลวมนั่นไม่ได้เป็นส่วนหนึ่งของกลยุทธ์หรอกเหรอคะ?"
10051010-44 = "ใช้กลยุทธ์ <ล่อหน้า ตีหลัง> ที่ล่อสายตาของฝ่ายตรงข้ามด้วยประทัดแล้วโจมตีจากอีกฝั่ง..."
10051010-45 = "ในขณะเดียวกันก็ดูแลความปลอดภัยให้เถ้าแก่ในร้านด้วย..."
10051010-46 = "ฉันเห็นแล้วประทับใจเลยนะคะ"
10051010-47 = "เอ่อ... อ่า..."
10051010-48 = "สะ... สายตาแหลมคมใช้ได้เลยนะ!"
10051010-49 = "ใช่แล้วละ! เป็นอย่างที่ว่าเลย!"
10051010-50 = "ฮุฮุ กะไว้แล้วเชียวค่ะว่าต้องเป็นแบบนี้"
10051010-51 = "แต่ถึงยังไง การทำงานเป็นทีมในระดับนั้นก็ไม่น่าใช่เรื่องง่ายเลยนะคะ"
10051010-52 = "ไหนจะต้องตัดสินใจอย่างฉับไว ลงมือทำอย่างเด็ดขาด และต้องสอดประสานกันอีก..."
10051010-53 = "ฉันรับรู้ได้เลยละค่ะว่าชมรมวิจัยศาสตร์นินจาทุกคนได้รับการฝึกฝนมาเข้มข้นแค่ไหน"
10051010-54 = "อ่า... ขอบใจนะ"
10051010-55 = "(แต่พวกเรายังไม่เคยฝึกซ้อมด้วยกันจริงๆ จังๆ เลย...)"
10051010-56 = "(ก็แค่อยู่ด้วยกันมานาน ก็เลยเข้าขากันดีก็เท่านั้น...)"
10051010-57 = "(แต่เดี๋ยวนะ แล้วทำไมยัยแรคคูนนี่ถึงเอาแต่ชมพวกเราล่ะ?)"
10051010-58 = "(ยัยนี่ไม่น่าใช่คนประเภทที่จะชมคนอื่นโดยไม่มีเจตนาแอบแฝงนะ)"
10051010-59 = "เอาละค่ะ งั้นฉันขอจบการชื่นชมแค่เพียงเท่านี้"
10051010-60 = "เฮือก!"
10051010-61 = "ฉันขอเข้าประเด็นเลยแล้วกันนะคะ หัวหน้าชมรมวิจัยศาสตร์นินจา"
10051010-62 = "สรุปเลยก็คือ พวกฉันต้องการพลังจากชมรมวิจัยศาสตร์นินจาค่ะ"
10051010-63 = "พลังจากพวกเราน่ะเหรอ...?"
10051010-64 = "เดี๋ยวนะ ไม่ได้เรียกมาเพื่อตำหนิหรอกเหรอ?"
10051010-65 = "หืม? ตำหนิเหรอคะ?"
10051010-66 = "พวกสมาคมค้นหาราเม็งร้านเด็ดต่างหากที่เป็นตัวต้นเรื่อง แล้วทำไมชมรมวิจัยศาสตร์นินจาถึงต้องโดน#nตำหนิด้วยล่ะคะ?"
10051010-67 = "อ่า..."
10051010-68 = "อะไรกัน ทำไมถึงพูดอะไรสมเหตุสมผลล่ะ?!"
10051010-69 = "นี่คุณคิดว่าฉันเป็นคนยังไงกันแน่คะ..."
10051010-70 = "สรุปอีกครั้งนะคะ พวกฉันต้องการพลังจากชมรมวิจัยศาสตร์นินจาทุกคนค่ะ"
10051010-71 = "พอดีพวกฉันได้คำขอให้ทำภารกิจรักษาความปลอดภัยที่สำคัญมากๆ~ มาน่ะค่ะ"
10051010-72 = "ภารกิจรักษาความปลอดภัยเหรอ...?!"
10051010-73 = "ใช่ค่ะ ไม่ทราบว่าเคยได้ยินชื่อ 'ไชน์แคท' มาบ้างมั้ยล่ะคะ?"
10051010-74 = "ไชน์แคท...?"
10051010-75 = "อืม เพิ่งจะเคยได้ยินเป็นครั้งแรกแฮะ"
10051010-76 = "ฮุฮุ ถ้างั้นเห็นทีฉันต้องอธิบายให้ฟังสินะคะ"
10051010-78 = "ไชน์แคทคือดีไซเนอร์เครื่องแต่งกายที่มีชื่อเสียงที่สุดในคิโวทอสตอนนี้ค่ะ"
10051010-79 = "ถ้าเป็นคนที่สนใจแฟชั่น ไม่ว่าใครก็ต้องรู้จักชื่อของเขาค่ะ"
10051010-80 = "เขามีอิทธิพลขนาดที่แม้แต่งานแฟชั่นโชว์ขนาดใหญ่ที่จัดในคิโวทอสก็ต้องเปลี่ยนกำหนดการ#nถ้าเขาคนนี้เอ่ยปากอะไรออกมาค่ะ"
10051010-81 = "นอกจากนี้ยังมีกฎที่รู้กันในวงการแฟชั่นว่าการแสดงแฟชั่นโชว์จะเริ่มไม่ได้เลยหากไชน์แคทยังมาไม่ถึง"
10051010-82 = "และฉันก็ได้ยินมาว่าเขาคนนี้จะมาเข้าร่วมงานแฟชั่นโชว์ที่จะจัดในเฮียกคิยาโคครั้งนี้ค่ะ"
10051010-84 = "เพราะงั้น..."
10051010-85 = "ชมรมหยินหยางของเราก็เลยจะให้ชมรมวิจัยศาสตร์นินจาทุกคนไปทำภารกิจรักษาความปลอดภัยในงานค่ะ!"
10051010-86 = "โอ้...!"
10051010-90 = "เดี๋ยวนะ ข้าน้อยว่าเราได้ข้อสรุปกันเร็วเกินไปหรือเปล่า?!"
10051010-91 = "เอ๋? ยังไงเหรอคะ?"
10051010-92 = "ฉันได้เห็นฝีมือของชมรมวิจัยศาสตร์นินจาที่ร้านราเม็ง ก็เลยตัดสินใจมอบภารกิจรักษาความปลอดภัย#nให้พวกคุณ นี่คือการตัดสินใจที่เหมาะสมที่สุดแล้วนะคะ"
10051010-93 = "หรือว่ามีปัญหาอะไรคะ?"
10051010-94 = "เอ่อ... ข้าน้อยก็ซาบซึ้งอยู่หรอกที่ประเมินพวกเราไว้สูง..."
10051010-95 = "แต่ถึงยังไงก็เถอะ! ถ้าพิจารณาเรื่องพลังต่อสู้แล้ว คณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน น่าจะเก่งกว่าไม่ใช่เหรอ?!"
10051010-96 = "ตะ... ต่อให้นินจาคือคนสุดท้ายที่ยืนหยัดอยู่ได้ในสนามรบก็เถอะ...!"
10051010-97 = "ฮุฮุ ถ้ามองในแง่พลังต่อสู้อย่างเดียว เฮียกกะเรียวรันเก่งกว่าอย่างไม่ต้องสงสัยค่ะ"
10051010-98 = "แต่ถ้าจะเลือกเจ้าหน้าที่รักษาความปลอดภัยในงานโดยพิจารณาจากพลังต่อสู้เพียงอย่างเดียว งั้นแค่เอาระเบิดสุญญากาศไปไว้ในสถานที่จัดงานก็ได้ค่ะ ว่ามั้ยล่ะคะ?"
10051010-99 = "วะ... วิเคราะห์ต่อได้ถึงขนาดนั้นเลยเหรอ...?"
10051010-100 = "ใช่ค่ะ การรักษาความปลอดภัยที่ยอดเยี่ยม ใช่ว่าจะต้องมีแค่พลังต่อสู้เพียงอย่างเดียวหรอกค่ะ"
10051010-101 = "เพราะนี่คืองานที่ต้องอาศัยทั้งความเร็ว การลอบเร้น การประสานงานที่แม่นยำ..."
10051010-102 = "ยิ่งถ้าเป็นการรักษาความปลอดภัยในสถานที่ที่มีผู้คนพลุกพล่านด้วยละก็ ความสามารถเหล่านี้สำคัญกว่าพลังต่อสู้อีกค่ะ"
10051010-103 = "แล้วฉันก็ได้เห็นความสามารถนี้จากผลงานเมื่อวานของพวกคุณค่ะ"
10051010-104 = "จะต้องมีเหตุผลอื่นด้วยเหรอคะ?"
10051010-105 = "ความเร็วและการลอบเร้นคือทักษะพื้นฐานของนินจาก็จริง..."
10051010-106 = "ฮุฮุ แต่ยังไงก็ไม่ต้องกดดันมากเกินไปนะคะ"
10051010-107 = "ทีมบอดี้การ์ดส่วนตัวของดีไซเนอร์ไชน์แคทจะรับหน้าที่ในการคุ้มกันเขาเองค่ะ"
10051010-108 = "ส่วนหน้าที่ของพวกคุณก็คือการยืนรักษาความปลอดภัยท่ามกลางฝูงชนในงานแฟชั่นโชว์..."
10051010-110 = "จะเรียกว่าเป็นสายลับในงานก็ได้ค่ะ"
10051010-111 = "สายลับ...!"
10051010-112 = "อ้อ แน่นอนว่าพวกฉันไม่ได้ขอร้องให้ทำฟรีๆ หรอกนะคะ"
10051010-113 = "หืม?! จริงเหรอ?!"
10051010-114 = "เอ๋? ทำไมถึงตกใจขนาดนั้นล่ะคะ?"
10051010-115 = "ฉันไม่เคยคิดแม้แต่น้อยว่าจะใช้อำนาจบังคับให้มาทำงานโดยไม่ให้ค่าตอบแทนหรอกนะคะ"
10051010-116 = "ยิ่งปฏิเสธยืดยาวแบบนี้ยิ่งน่าสงสัยนะ..."
10051010-117 = "แต่ก็เอาเถอะ ว่าแต่ค่าตอบแทนคืออะไรเหรอ?"
10051010-118 = "ฮุฮุ"
10051010-119 = "รู้หรือเปล่าคะว่าในโกดังของชมรมหยินหยางมีอุปกรณ์อิเล็กทรอนิกส์ทุกประเภทเลย?"
10051010-120 = "แต่ก็ ตายจริง! ในนั้นดันมีกล้องสภาพดีมากอยู่ตัวหนึ่งน่ะสิคะ!"
10051010-121 = "กล้องเหรอ?"
10051010-122 = "ใช่ค่ะ ถ่ายได้ความละเอียดสูง แล้วแบตเตอรีก็ความจุเหลือเฟือด้วย..."
10051010-123 = "บางทีสเปกอาจจะดีกว่ากล้องตัวที่ชมรมวิจัยศาสตร์นินจาเคยใช้ก็ได้นะคะ?"
10051010-124 = "...!"
10051010-125 = "กล้องของพวกคุณโดนน้ำซุปทงคตสึจากเหตุการณ์ที่ร้านราเม็งวันก่อนไม่ใช่เหรอคะ?"
10051010-126 = "ถ้าเป็นอย่างนั้น ก็มีโอกาสสูงที่กล้องจะพังเลยนะ..."
10051010-127 = "และถ้ามันเป็นแบบนั้นจริงๆ พวกคุณก็คงต้องการกล้องตัวใหม่กันด้วย..."
10051010-128 = "ระ... รู้เรื่องนั้นได้ไง..."
10051010-129 = "ถ้าพวกคุณตอบรับคำขอนี้ละก็ ฉันจะยกกล้องในโกดังของชมรมหยินหยางให้ค่ะ"
10051010-130 = "อ้อ แน่นอนว่ากล้องนั่นเป็นของสาธารณะ ตามกฎแล้วฉันจะให้เลยไม่ได้..."
10051010-131 = "เอาเป็นว่า ฉันจะทำเรื่องปล่อยเช่านาน 9,999 ปีให้แล้วกันค่ะ!"
10051010-132 = "ถ้านานขนาดนั้น กล้องก็น่าจะกลายเป็นฝุ่นไปก่อนที่สัญญาเช่าจะหมดอายุนะ...?"
10051010-133 = "ว่ายังไงล่ะคะ หัวหน้าชมรมวิจัยศาสตร์นินจา?"
10051010-134 = "อืม..."
10051010-135 = "นินจาย่อมไม่เมินเฉยต่อคนที่กำลังเดือดร้อนอยู่แล้ว"
10051010-136 = "ดีละ! คำขอครั้งนี้ของชมรมหยินหยาง! ชมรมวิจัยศาสตร์นินจาจะรับไว้เอง!"
10051010-137 = "แต่ขอบอกไว้ก่อนว่า! เหตุผลทั้งหมดไม่ใช่เพราะกล้องหรอกนะ!"
10051010-138 = "แต่ถ้าจะให้ ข้าน้อยก็จะไม่ปฏิเสธเด็ดขาด!"
10051010-139 = "อะฮะฮ่า! งั้นก็ถือว่าได้ข้อตกลงแล้วนะคะ"
10051010-140 = "เอาละ ในเมื่อบรรลุข้อตกลงกันเรียบร้อยแล้ว..."
10051010-145 = "งั้นเรามาพูดถึง 'เงื่อนไข' ที่พวกคุณต้องปฏิบัติในการทำภารกิจนี้กันดีกว่าค่ะ..."
10051010-146 = "อะ... อะไรกันน่ะ กระเป๋าใบนั้นมัน?"
10051010-147 = "ฮุฮุ นี่คือสิ่งสำคัญที่สุดในการทำภารกิจนี้ค่ะ"
10051010-148 = "นั่นคือ 'เงื่อนไข' หรือ 'คุณสมบัติ' ที่พวกคุณทุกคนต้องมีสำหรับการทำภารกิจนี้..."
10051010-149 = "อยู่ในกระเป๋าใบนี้ค่ะ"
10051010-150 = "ตะ... แต่เธอไม่ได้บอกกันไว้ตั้งแต่แรกสักหน่อย?!"
10051010-151 = "แต่พวกคุณตอบรับข้อตกลงไปแล้วนี่คะ?"
10051010-152 = "นินจาคงไม่ใช่ผู้ที่ไม่รักษาคำพูดหรอกใช่มั้ยคะ?"
10051010-153 = "อึก..."
10051010-154 = "ฮุฮุ เอาละ ถ้างั้นก็..."
10051010-161 = "กรอกแกรก..."
10051010-163 = "เข้ามาดูสิ่งที่อยู่ในกระเป๋าด้วยกันสิคะ..."
10051010-164 = "อ๊ะ ก่อนที่จะดู"
10051010-165 = "คะ?"
10051010-166 = "อย่าบอกนะว่า ที่ขอให้ข้าน้อยเข้ามาหาอย่างลับๆ คนเดียวก็เพราะกระเป๋าใบนี้น่ะ?"
10051010-167 = "ไม่ค่ะ ไม่ใช่เหตุผลแบบนั้นหรอกค่ะ"
10051010-168 = "ถ้างั้นคืออะไรล่ะ?"
10051010-169 = "ฮุฮุ เหตุผลก็คือ...!"
10051010-171 = "ก็แบบนี้มันน่าสนุกดีนี่คะ...?"
10051010-175 = "..."
10051010-176 = "รีบๆ เปิดกระเป๋าเร็วเข้าเถอะ..."

[translation]
10051010-1 = "Episode 1;An Unrefusable Offer"
10051010-2 = "Classroom in Hyakkiyako Old Schoolhouse 38"
10051010-3 = "The next day..."
10051010-4 = "Wh-What's this about, President?"
10051010-5 = "You said you had an important announcement..."
10051010-6 = "Of course! Does this mean that the camera is fixed?"
10051010-7 = "N-Not yet..."
10051010-8 = "It's not easy to find a decent repair shop, nyaha."
10051010-9 = "...Especially one that works for free."
10051010-10 = "Then...does this mean our club is disbanding?"
10051010-11 = "Absolutely not."
10051010-12 = "We're not an official club, so we can't be disbanded."
10051010-13 = "Anyway, I called you all here because... "
10051010-15 = "I received a priority correspondence from the Yin-Yang Club!"
10051010-16 = "I-I knew it...! They're punishing us for fighting in the ramen shop!"
10051010-17 = "Izuna doubts that, nin nin!"
10051010-18 = "What happened yesterday was justified retribution!"
10051010-19 = "Ah, this IS, in fact, related to the ramen shop."
10051010-20 = "What?"
10051010-21 = "Apparently Niya heard about it. As she does."
10051010-22 = "Ehhhh?!"
10051010-23 = "She said, \"Michiru, I know what you did. Please meet me at the Yin-Yang Club today.\""
10051010-24 = "...And to \"enter the building as discreetly as possible.\""
10051010-25 = "Th-That's quite suspicious...!"
10051010-26 = "She's definitely going to use yesterday's incident as leverage. We'll have to do the club's bidding!"
10051010-27 = "Um... I don't think that's the Yin-Yang Club's style."
10051010-28 = "...Or maybe it is. Niya has...a certain way about her."
10051010-29 = "Anyway! I'll fill you all in once I make my triumphant return!"
10051010-30 = "D-Do your best! President!"
10051010-31 = "Safe travels! Nin nin!"
10051010-33 = "The Yin-Yang Club Room"
10051010-34 = "Fufu, Madam President. A pleasure as always."
10051010-35 = "I quite enjoyed watching your coordinated brawl at the ramen shop yesterday."
10051010-36 = "Really? Why were you there?"
10051010-37 = "I suppose it was because I wanted ramen."
10051010-38 = "So you eat ramen too..."
10051010-39 = "I thought you'd be more of an artisanal tasting menu type."
10051010-40 = "What a fascinating impression of me..."
10051010-41 = "Anyway, I had quite the view of your clumsy firecracker attack, nyahaha!"
10051010-42 = "D-Don't call it clumsy!"
10051010-43 = "Hm? I thought the \"clumsy\" act was intended."
10051010-44 = "Distracting the enemy with firecrackers and striking them from behind..."
10051010-45 = "...All while being thoughtful enough to protect the shop owner..."
10051010-46 = "I was impressed."
10051010-47 = "Um... Uh..."
10051010-48 = "Y-You're quite perceptive!"
10051010-49 = "That WAS intentional! All of it! You're right!"
10051010-50 = "Fufu, I know."
10051010-51 = "Regardless, I realize that it's no simple feat to work as a team."
10051010-52 = "Quick judgment, silent, decisive actions, and seamless coordination..."
10051010-53 = "I've gained a new level of respect for the Ninjutsu Research Club. You've clearly been training, haven't you?"
10051010-54 = "Um... Thanks."
10051010-55 = "(But we barely train together...)"
10051010-56 = "(We just coordinate well because we're always hanging out...)"
10051010-57 = "(But besides that, why is this girl pouring on the charm?)"
10051010-58 = "(She's not the type to give out compliments for free...)"
10051010-59 = "Very well. That's enough flattery."
10051010-60 = "Eek!"
10051010-61 = "There's a reason why I called you here, Michiru, President of the Ninjutsu Research Club."
10051010-62 = "To cut to the chase, Hyakkiyako requires your club's strength."
10051010-63 = "Our strength...?"
10051010-64 = "Wait, you're not here to punish us?"
10051010-65 = "Eh? Punish?"
10051010-66 = "The Ramen Research Society started all this trouble. Why would I punish you for their actions?"
10051010-67 = "Ah..."
10051010-68 = "Wait, why are you sounding unusually reasonable?"
10051010-69 = "What a fascinating impression of me..."
10051010-70 = "But back to the topic at hand. Specifically, about just how strong and capable you three truly are."
10051010-71 = "We received a commission. Someone veeeery important needs a security team."
10051010-72 = "A security team commission...?!"
10051010-73 = "Yes. Have you heard of \"Shinecat\"?"
10051010-74 = "Shinecat...?"
10051010-75 = "Mmm, no, I've never heard of them."
10051010-76 = "Fufu, then I can explain."
10051010-78 = "Shinecat is the most famous clothing designer in Kivotos."
10051010-79 = "Anyone remotely interested in fashion has their eyes on him."
10051010-80 = "He holds immense power in the industry. With a word, he could reschedule Fashion Week at his convenience."
10051010-81 = "And there's an unspoken rule that no fashion show starts until Shinecat has claimed his seat."
10051010-82 = "So, imagine someone like that attending a Hyakkiyako fashion show. The prestige..."
10051010-84 = "That is why..."
10051010-85 = "...the Yin-Yang Club has chosen you three to serve as Shinecat's special security team!"
10051010-86 = "Oh...!"
10051010-90 = "Wait, watching us work together is the whole reason? I feel like you skipped something."
10051010-91 = "Hm? What did I skip, precisely?"
10051010-92 = "It's logical. I saw your club demonstrate your skills at the ramen shop, and I concluded that you three would provide excellent security."
10051010-93 = "Is there a problem?"
10051010-94 = "Um, thank you for thinking so highly of us..."
10051010-95 = "But...if we're talking combat skills, isn't the Hyakkaryouran Resolution Council the better choice?"
10051010-96 = "O-Of course, ninjas are unstoppable, but, uh, you know...?"
10051010-97 = "Fufu, yes, I'm aware of the Hyakkaryouran's astounding strength."
10051010-98 = "But if I were solely focused on strength and power, then I could simply...park a tank on the runway to threaten people, right?"
10051010-99 = "I-Is that really possible...?"
10051010-100 = "Yes. And security requires much more than brute strength."
10051010-101 = "Speed, stealth, and meticulous teamwork..."
10051010-102 = "These traits are considerably more important than combat skills when it comes to escorting a VIP through a crowd."
10051010-103 = "I believe you three are well-suited for the task."
10051010-104 = "Need I explain more?"
10051010-105 = "...I mean, speed and stealth are ninja fundamentals..."
10051010-106 = "Fufu, you don't need to worry so much."
10051010-107 = "Shinecat will also be protected by the agency's security team."
10051010-108 = "What I intend for you three is much more interesting. I want you to blend in with the crowd."
10051010-110 = "In other words, provide undercover security."
10051010-111 = "Undercover...!"
10051010-112 = "Ah, and of course there will be significant compensation involved."
10051010-113 = "Wait?! Really?!"
10051010-114 = "Hm? How is that surprising?"
10051010-115 = "Did you think I was trying to...exploit my extensive power to force you to do my bidding?"
10051010-116 = "That's...a very SPECIFIC denial..."
10051010-117 = "Anyway, what's the payment, if I may ask?"
10051010-118 = "Fufu."
10051010-119 = "Isn't it obvious? The Yin-Yang Club has quite the selection of advanced electronics in our storage."
10051010-120 = "And we happen to have uncovered a professional-grade camera in exceptional condition."
10051010-121 = "A camera?"
10051010-122 = "Yes. With good resolution, decent battery capacity..."
10051010-123 = "It might be better than the one you had been using for your Ninjutsu Research Club videos..."
10051010-124 = "...!"
10051010-125 = "Your camera was drenched in tonkotsu broth, right? Salt, water, electricity..."
10051010-126 = "...If that's the case, I suspect that your camera is out of order."
10051010-127 = "Clearly, you need a new camera."
10051010-128 = "H-How...did you know...?"
10051010-129 = "If you accept this job, I'll supply you with the Yin-Yang Club's spare camera."
10051010-130 = "Of course, since we're a public entity, we can't simply GIVE it to you."
10051010-131 = "But we can grant it to you under a...9,999-year loan. For cultural enrichment."
10051010-132 = "The camera would be reduced to dust by the end of that, though?"
10051010-133 = "Then get a dustpan. What do you say, President Michiru?"
10051010-134 = "Hm..."
10051010-135 = "A ninja must never ignore the cries of the innocent."
10051010-136 = "Then I shall accept the Yin-Yang Club's grand commission!"
10051010-137 = "And it's not because of the camera, to be clear! It's about honor and...nobility!"
10051010-138 = "Of course, I also couldn't possibly refuse such a gracious loan."
10051010-139 = "Nyahaha! Then it's a deal."
10051010-140 = "And, since we have a nice \"deal\"..."
10051010-145 = "...Let's talk about the \"conditions\" you must meet during the operation."
10051010-146 = "Wh-What's in the box?"
10051010-147 = "Fufu. It's the most important stipulation, President."
10051010-148 = "My main condition, if you want to be rewarded for this commission..."
10051010-149 = "...is that your club uses what's in this trunk."
10051010-150 = "W-We never discussed this!"
10051010-151 = "But you already agreed, didn't you?"
10051010-152 = "A ninja would never...go back on her vow, would she?"
10051010-153 = "Tch..."
10051010-154 = "Fufu, now, then..."
10051010-161 = "*click*"
10051010-163 = "...Let's open it together, shall we?"
10051010-164 = "Um, before that. Wait..."
10051010-165 = "Hm?"
10051010-166 = "Are the trunk's contents...why you asked me to come alone? And in secret?"
10051010-167 = "No, that's not the reason."
10051010-168 = "Then?"
10051010-169 = "Fufu, I opted in for all the secrecy because...!"
10051010-171 = "...it's fun."
10051010-175 = "..."
10051010-176 = "Just open the trunk."

[translation]
10051010-1 = "第1話;無法拒絕的提案"
10051010-2 = "百鬼夜行．第38舊校舍的某間教室"
10051010-3 = "（拉麵店騷動之後的隔天……）"
10051010-4 = "請，請問有什麼事嗎，部長？"
10051010-5 = "你說是有重大發表……"
10051010-6 = "啊！莫非是攝影機修好了嗎？"
10051010-7 = "那，那個還沒有……"
10051010-8 = "要找到合適的維修店其實不容易呢，喵哈哈。"
10051010-9 = "雖然其實是拿不出維修費就是了……"
10051010-10 = "那，那麼，難道是我們社團收到廢部命令了！？"
10051010-11 = "不是，那怎麼可能。"
10051010-12 = "況且我們打從一開始就不是正式的社團，所以根本不可能發生「廢部」這件事。"
10051010-13 = "總之，我之所以請你們過來…… "
10051010-15 = "是因為剛才收到了陰陽部的聯絡，所以想跟大家分享一個消息！"
10051010-16 = "果，果然……！是由於昨天在拉麵店鬧事，因此受到了懲戒嗎……！"
10051010-17 = "不會的！"
10051010-18 = "昨天那只是正當防衛而已！"
10051010-19 = "啊，的確是因為拉麵店的事沒錯。"
10051010-20 = "咦？"
10051010-21 = "昨天的事，好像傳到仁耶耳朵裡了。"
10051010-22 = "咦咦咦！？"
10051010-23 = "然後他就說「想談談關於昨天的事，請三千留同學今天內到陰陽部來一趟」……#n聯絡的內容大概就是這樣。"
10051010-24 = "啊，還有強調說要盡可能保密。"
10051010-25 = "聽，聽起來實在很可疑……！"
10051010-26 = "肯，肯定是要拿昨天的事當把柄，威脅我們做各種骯髒的事吧……！"
10051010-27 = "唔嗯……陰陽部應該不至於那麼卑劣才對。"
10051010-28 = "不，畢竟是仁耶那隻狡猾的狸貓，這也不是完全不可能吧……"
10051010-29 = "總之！詳細情形等我回來再跟你們說！"
10051010-30 = "請，請加油！部長！"
10051010-31 = "請慢走！忍忍！"
10051010-33 = "陰陽部．部室"
10051010-34 = "呵呵，歡迎你來，忍術研究部的部長。"
10051010-35 = "順帶一提……昨天拉麵店裡的戰鬥，我可是看得一清二楚哦？"
10051010-36 = "嗯？你也在那裡嗎？為什麼？"
10051010-37 = "去拉麵店當然是為了吃拉麵啊？"
10051010-38 = "原來你也會吃拉麵啊……"
10051010-39 = "我還以為你只會吃懷石料理之類的高級菜色咧……"
10051010-40 = "你平常究竟是怎麼看待我的……"
10051010-41 = "總之，那種利用煙火的粗糙忍術……我全都看在眼裡唷，喵哈哈。"
10051010-42 = "哪，哪裡粗糙了啊！"
10051010-43 = "嗯？那種「粗糙感」不也是戰術的一環嗎？"
10051010-44 = "用煙火吸引對方視線使其放鬆警戒，然後從背後攻擊的聲東擊西之策……"
10051010-45 = "並且在過程中還不忘照顧店主安全的這份細心……"
10051010-46 = "令我看了之後深受感動哦？"
10051010-47 = "那是……呃……"
10051010-48 = "你，你還挺有眼光的嘛！"
10051010-49 = "沒錯！就是你看見的這樣！"
10051010-50 = "喵哈哈，我就知道是這樣沒錯。"
10051010-51 = "那種等級的團隊合作，可不是隨隨便便就能達成的。"
10051010-52 = "快速的判斷力和果斷的行動力，以及行雲流水般的配合……"
10051010-53 = "忍術研究部平時受到的訓練有多嚴格，我完全可以想像。"
10051010-54 = "呃……謝謝。"
10051010-55 = "（可是我們明明沒有特別訓練過啊……）"
10051010-56 = "（只是因為相處久了，所以很有默契而已……）"
10051010-57 = "（話說，這隻狸貓今天怎麼一直在稱讚人啊？）"
10051010-58 = "（他不是那種會毫無來由地誇獎別人的人吧？）"
10051010-59 = "好，那麼讚美環節就到此為止。"
10051010-60 = "噫噫！"
10051010-61 = "讓我們進入正題吧，忍術研究部的部長。"
10051010-62 = "從結論來說，我希望能借助忍術研究部的力量。"
10051010-63 = "我們的力量……？"
10051010-64 = "等等，所以找我過來不是為了懲處我們嗎？"
10051010-65 = "嗯？懲處？"
10051010-66 = "先鬧事的明明是拉麵研究會的人，見義勇為的忍術研究部為何需要受到懲處呢？"
10051010-67 = "啊……"
10051010-68 = "什麼啦，為什麼說這種正經的道理！"
10051010-69 = "說真的，你平常究竟是怎麼看待我的……"
10051010-70 = "言歸正傳，我們需要忍術研究部的力量。"
10051010-71 = "因為有一項非～常重要的護衛任務委託。"
10051010-72 = "護衛任務委託……！？"
10051010-73 = "是的。請問你聽過「Shine Cat」這個名字嗎？"
10051010-74 = "Shine Cat……？"
10051010-75 = "嗯，我從來沒聽說過。"
10051010-76 = "呵呵，看來需要說明一下了呢。"
10051010-78 = "Shine Cat是目前奇普托斯最負盛名的服裝設計師。"
10051010-79 = "凡是是對時尚稍微有點興趣的人，就不可能沒聽說過這個名字。"
10051010-80 = "只要他一句話，奇普托斯大型時裝秀的日程就會徹底重新洗牌……"
10051010-81 = "甚至有個不成文的規定──那就是Shine Cat不到場，時裝秀就不會開始。"
10051010-82 = "而這樣的一位人物，這次將會參加在百鬼夜行舉辦的時裝秀。"
10051010-84 = "所以……"
10051010-85 = "我們陰陽部決定將這項護衛任務，交由忍術研究部的各位來負責！"
10051010-86 = "哦……！"
10051010-90 = "先等一下！中間是不是省略了很多部分沒說啊！？"
10051010-91 = "嗯？你指的是……？"
10051010-92 = "我是因為在拉麵店親眼見識了忍術研究部的實力，#n因此判斷各位最適合這樣的護衛任務……"
10051010-93 = "請問有什麼問題嗎？"
10051010-94 = "那個，雖然你這麼肯定我們是很感謝啦……"
10051010-95 = "不過在那之前！要論戰鬥力的話，百花繚亂紛爭調停委員會的人不是更強嗎！？"
10051010-96 = "當，當然忍者才是能撐到最後的人就是了……！"
10051010-97 = "呵呵，假如以純粹的戰鬥力來看，確實是百花繚亂更勝一籌……"
10051010-98 = "不過如果僅看強弱就能選出護衛的話，直接在會場設置空爆燃燒彈不就好了嗎？"
10051010-99 = "話，話是這樣說的嗎……？"
10051010-100 = "沒錯。一名護衛是否優秀，絕不是單憑戰鬥力就能決定的。"
10051010-101 = "迅速程度、隱密性，以及縝密的合作……"
10051010-102 = "要在許多人聚集的地方執行護衛任務，這些能力的重要性將高於單純的戰鬥力。"
10051010-103 = "而我在各位的表現中，看見了這些特質。"
10051010-104 = "還需要更多理由嗎？"
10051010-105 = "迅速和隱密，確實是忍者的基本沒錯……"
10051010-106 = "呵呵，不過也不必太有壓力。"
10051010-107 = "Shine Cat設計師的貼身護衛，將由對方事務所的專屬護衛隊來負責。"
10051010-108 = "各位的任務，是潛伏在時裝秀的人群中保持警戒……"
10051010-110 = "簡而言之，就是所謂的臥底護衛。"
10051010-111 = "臥底……！"
10051010-112 = "啊，當然我們也不會讓各位無償幫忙的哦？"
10051010-113 = "嗯！？真的嗎！？"
10051010-114 = "有必要這麼驚訝嗎？"
10051010-115 = "我自始至終都沒有想仗著權力，強迫各位勞動還不給報酬的想法哦？"
10051010-116 = "否認得這麼鉅細彌遺，反而更可疑了……"
10051010-117 = "所以報酬是什麼？"
10051010-118 = "喵哈哈。"
10051010-119 = "你知道嗎？在陰陽部的倉庫裡，可是沉睡著各種電子設備呢。"
10051010-120 = "而就在不久之前，我們發現了一台保存狀態相當好的攝影機唷！"
10051010-121 = "攝影機？"
10051010-122 = "沒錯。不只畫質好，電池容量也很充足……"
10051010-123 = "規格應該比忍術研究部用的攝影機要好上許多哦？"
10051010-124 = "……！"
10051010-125 = "你們原本用的攝影機，在這次的拉麵店事件中淋滿了豚骨湯對吧？"
10051010-126 = "那樣攝影機很可能已經損壞了……"
10051010-127 = "因此想必很需要新的攝影機才對。"
10051010-128 = "你……你怎麼連這種事都知道啊……"
10051010-129 = "只要你們接受這項委託，我們陰陽部就會將那部攝影機送給各位。"
10051010-130 = "啊，不過由於那是公用備品，依照內部規定無法完全轉讓……"
10051010-131 = "但是只要辦理為出借9999年就沒問題了！"
10051010-132 = "在租借期滿之前，攝影機早就化為塵土了吧……？"
10051010-133 = "那麼，忍術研究部部長的回答是？"
10051010-134 = "唔嗯……"
10051010-135 = "身為忍者，絕不能對有困難之人視而不見。"
10051010-136 = "好！陰陽部的委託我們接受了！"
10051010-137 = "順帶一提──這絕對不是因為攝影機哦！"
10051010-138 = "當然如果要給的話，我也絕對不會拒絕就是了！"
10051010-139 = "喵哈哈！那麼契約就成立了呢。"
10051010-140 = "既然契約已經順利談成……"
10051010-145 = "……接下來就來聊聊各位在委託中必須遵守的「條件」吧。"
10051010-146 = "這，這個手提箱是……？"
10051010-147 = "呵呵，是這次委託中最重要的東西。"
10051010-148 = "也是各位執行委託時必須具備的「條件」，或者也可以稱之為「資格」……"
10051010-149 = "那樣的東西，就裝在這個手提箱裡。"
10051010-150 = "這，這種事你剛才完全沒提過吧！？"
10051010-151 = "可是契約不是已經成立了嗎？"
10051010-152 = "忍者應該不會出爾反爾吧？"
10051010-153 = "嘖……"
10051010-154 = "呵呵，那麼……"
10051010-161 = "（喀嚓……）"
10051010-163 = "……一起確認一下手提箱裡的東西吧？"
10051010-164 = "啊，在那之前先等一下。"
10051010-165 = "嗯？"
10051010-166 = "你之所以叫我一個人偷偷地過來……該不會就是因為這個手提箱裡的東西吧？"
10051010-167 = "不，那跟這個手提箱無關。"
10051010-168 = "不然是為什麼啊？"
10051010-169 = "呵呵，那是因為……！"
10051010-171 = "……這樣很有趣呀？"
10051010-175 = "……"
10051010-176 = "……快打開手提箱吧。"

[translation]
83306085401-5 = "อึก... วันนี้เราได้เรียนรู้สิ่งใหม่อีกแล้ว"
83306085401-6 = "และนั่นก็คือ... ไม่ว่าจะเกิดอะไรขึ้น เราควรถามหาสาเหตุก่อนว่าทำไมถึงเกิดขึ้น ก่อนที่จะตีโพยตีพายไปใหญ่โต...!"
83306085401-7 = "อ้อ แน่นอนว่าใช้ไม่ได้กับพวกเธอหรอกนะ คณะกรรมการวินัย! หึหึหึหึ!"
83306085401-8 = "อ่า... ตามใจเลย"

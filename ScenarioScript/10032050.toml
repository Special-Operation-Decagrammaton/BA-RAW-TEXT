[translation]
10032050-1 = "ตอนที่ 5;ไม่คล่องอย่างคุ้นเคย"
10032050-7 = "หน่วยรับจ้างสารพัด 68..."
10032050-13 = "โจมาเอะ ซาโอริ..."
10032050-14 = "อย่าบอกนะว่าเธอคือแผนรับมือของเขา..."
10032050-15 = "เฮ้อ..."
10032050-16 = "เริ่มยุ่งยากแล้วจริงๆ นะประธาน"
10032050-21 = "ใครกันน่ะ...?"
10032050-22 = "ใครงั้นเหรอ... ก็โจมาเอะ ซาโอริน่ะสิ"
10032050-23 = "เด็กที่เป็นทหารรับจ้างจากอาเรียสไง"
10032050-24 = "เมื่อวันก่อนเราเพิ่งต่อสู้กันไปเอง ลืมไปแล้วเหรอ?"
10032050-25 = "โจมาเอะ ซาโอริ...? อ่า..."
10032050-26 = "หืม...?"
10032050-27 = "จะ... โจมาเอะ ซาโอริ!? นักเรียนโหดๆ ที่ใส่หมวกกันน็อกน่าสงสัยมาตอนที่เราสู้กับพวกที่งุบงิบเงิน#nของเราไปน่ะเหรอ...!!?"
10032050-28 = "อื้ม ใช่แล้วละ พวกที่ฮารุกะจังไปถล่มมาเมื่อกี้เป็นคนจ้างวานมา"
10032050-29 = "เหลวไหลน่า!! ตอนนี้บรรยากาศมันต่างกันโดยสิ้นเชิงเลยนะ! จะมองว่าเธอเป็นคนเดียวกับตอนนั้น#nไม่ได้หรอก!!"
10032050-30 = "พวกเราก็เหมือนกันนั่นแหละ~"
10032050-31 = "ตอนนั้นน่ะเละตุ้มเป๊ะมากเลย~ ปวดเมื่อยเนื้อตัวไปหมดเลยด้วย!"
10032050-37 = "ฉันละอยากหลีกเลี่ยงสถานการณ์แบบนี้จริงๆ ทำไมต้องมาเจอพวกนี้ด้วยนะ..."
10032050-38 = "ต้องตั้งสติให้ดีๆ ห้ามประมาทแม้แต่วินาทีเดียว"
10032050-40 = "ได้ยินรึเปล่า อารุจัง? ทางนั้นบอกว่าจะงัดพลังมาสู้เต็มที่เลยนะ"
10032050-41 = "ทำไมล่ะ!?!"
10032050-42 = "ก็มันเป็นงานนี่นะ"
10032050-48 = "หืม...?"
10032050-49 = "เดี๋ยวนะ ข้างๆ นั่น..."
10032050-50 = "[s1] \"สวัสดี ซาโอริ\"\n[s2] \"ชุดสวยจังเลยนะ มาทำอะไรที่นี่เหรอ?\""
10032050-53 = "หืม...?"
10032050-54 = "ครู...? "
10032050-55 = "......?"
10032050-56 = "คะ... ครู...?!?!"
10032050-57 = "ทะ... ทำไมครูถึง...!? มาอยู่ตรงนี้ได้...!?"
10032050-58 = "ว่าไงนะ...?"
10032050-59 = "ฉัน...? มาทำอะไรที่นี่น่ะเหรอ...?"
10032050-60 = "กะ... ก็มาเพราะเรื่องงานน่ะสิ..."
10032050-61 = "ฉันต้องสแตนด์บายอยู่ที่นี่ แล้วถ้ามีเหตุฉุกเฉินก็ต้องคุ้มกันคนคนหนึ่งน่ะ"
10032050-62 = "ฉันก็เลยใส่ชุดเดรสที่ได้มาเพื่อแฝงตัว..."
10032050-63 = "ชุดเดรสนี้..."
10032050-67 = "มะ... ไม่ใช่ชุดของฉันหรอกนะ!"
10032050-68 = "ไม่สิ มันเป็นชุดของฉันถูกแล้ว!! แต่ฉันไม่ได้หามาเองหรอกนะ!"
10032050-69 = "ไม่สิ จริงๆ ฉันก็เป็นคนเลือกมันมาเอง...! แต่ก็เพื่องานเท่านั้นนะ...! "
10032050-70 = "ฉันไม่ได้เลือกมาเพราะอยากจะใส่ชุดแบบนี้หรอกนะ! มะ... ไม่ใช่สิ! จะว่าไม่อยากก็ไม่ใช่!"
10032050-71 = "จะว่ายังไงดี... ฉันก็แค่... ต้องแต่งตัวให้เข้ากับสถานการณ์น่ะ...! ก็เลย...!!"
10032050-78 = "จู่ๆ ก็พูดวกไปวนมาแฮะ...?"
10032050-79 = "นั่นสิ ต่างกับคนที่เคยสู้ด้วยก่อนหน้านี้เลย..."
10032050-80 = "เป็นคนแบบนี้เองสินะ..."
10032050-82 = "ละ... แล้วครูล่ะ ครูมีธุระอะไรถึงได้มาอยู่ที่นี่...!!"
10032050-83 = "หืม...?"
10032050-84 = "มาทำวิดีโอสำหรับการเรียนการสอน? เพราะองค์การนักเรียนสั่งมา...?"
10032050-85 = "งั้นเหรอ...? ครูเองก็มาเพราะเรื่องงานสินะ"
10032050-86 = "ฮุฮุ ลำบากกันทั้งคู่เลย"
10032050-87 = "นี่! ทำอะไรของเธอน่ะ!? ทำไมถึงไปนั่งคุยเจื้อยแจ้วกันอยู่ล่ะ!?"
10032050-88 = "มันใช่เวลามาคุยกับคนอื่นอยู่เหรอ!! รีบคุ้มกันฉันไปที่ที่ปลอดภัยสิ!!"
10032050-89 = "อ่า... ฉันเผลอลืมหน้าที่ไปจนได้"
10032050-90 = "ขอโทษนะครู... ก่อนอื่นฉันต้อง..."
10032050-102 = "ไปทำงานที่รับมาก่อนน่ะ..."
10032050-103 = "เอาไว้พาผู้ว่าจ้างไปยังที่ที่ปลอดภัยแล้วฉันจะติดต่อไปนะ ตอนนี้ฉันขอตัวก่อน..."
10032050-112 = "......!!"
10032050-113 = "......!"
10032050-115 = "อะไรกัน จะไปดื้อๆ เลยเหรอ?"
10032050-116 = "แบบนี้ฉันก็เสียใจแย่เลยน่ะสิ"
10032050-118 = "คุยแต่กับคุณครู แต่ไม่สนใจพวกฉันเลยนะ..."
10032050-119 = "พวกฉันอุตส่าห์ตั้งใจไล่ตามมาเลยนะ~ ถ้าเมินกันแบบนั้นมันก็เกินไปแล้ว"
10032050-120 = "เราไม่ใช่คนแปลกหน้ากันสักหน่อย..."
10032050-121 = "ยังไงเราก็มีความทรงจำร่วมกันอยู่นะ"
10032050-123 = "หน่วยรับจ้างสารพัด 68..."
10032050-124 = "ฉันไม่อยากจะปะทะกับพวกเธอในสถานการณ์แบบนี้หรอกนะ"
10032050-126 = "ทางนี้ต่างหากล่ะที่ต้องพูดแบบนั้น"
10032050-127 = "ถ้าเธอคิดอย่างนั้นละก็ ฉันก็มีวิธีดีๆ อยู่"
10032050-128 = "ปล่อยผู้ว่าจ้างของเธอไว้ แล้วพวกฉันจะไม่จู่โจมเธออีก"
10032050-130 = "อย่างนั้นเหรอ..."
10032050-134 = "น่าเสียดายนะ แต่ฉันรับข้อเสนอนั้นไว้ไม่ได้หรอก"
10032050-135 = "ฉันเป็นคนทำงานที่ให้ความสำคัญกับความน่าเชื่อถือน่ะ"
10032050-136 = "ฉันต้องทำภารกิจที่ได้รับมาให้สำเร็จ ถึงจะสามารถรับภารกิจต่อไปได้"
10032050-138 = "......"
10032050-139 = "วะ..."
10032050-140 = "ว้าว..."
10032050-141 = "จะประทับใจไม่ได้สิ ประธาน"
10032050-142 = "[s3] \"แต่ก็เข้าใจได้นะ\"\n[s4] \"แต่นั่นก็เท่จริงๆ เลยนะ\""
10032050-148 = "งั้นเค้าก็เสียใจด้วยนะ เพราะตราบใดที่รับภารกิจมาแล้ว พวกเราก็ยอมถอยให้ไม่ได้เหมือนกัน~"
10032050-149 = "ถ้าไม่ส่งตัวคนคนนั้นมาให้ละก็..."
10032050-154 = "ย้ากกกกกก!!!"
10032050-157 = "ก็คงต้องจัดให้หนักละนะ..."
10032050-158 = "จะเล่นแบบนี้สินะ..."
10032050-159 = "ไม่มีเวลาแล้ว ฉันจะยื้อเวลาให้เอง ผู้ว่าจ้างรีบวิ่งหนีไปนะ"
10032050-160 = "จะให้ฉันวิ่ง...?"
10032050-161 = "นี่เธอสั่งฉันเหรอ...?"
10032050-162 = "ก็ใช่น่ะสิ ผู้ว่าจ้างของฉันมีแค่คุณคนเดียวนี่ ฉันจะคุ้มกันให้จากข้างหลังเอง รีบวิ่งไปก่อนเลย"
10032050-167 = "วิ่งไปสิ...!!"
10032050-168 = "......!!!!"
10032050-174 = "คิดว่าเค้าจะยอมปล่อยไปง่ายๆ รึไง~!"
10032050-175 = "ฮะ... ฮารุกะ เป็นอะไรรึเปล่า? บาดเจ็บตรงไหนมั้ย...?"
10032050-180 = "อย่าขัดขวางแผนการของท่านอารุนะ!!!!"
10032050-192 = "ไม่เป็นไรหรอก..."

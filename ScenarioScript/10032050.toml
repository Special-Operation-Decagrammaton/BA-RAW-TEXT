[translation]
10032050-1 = "第5話;既熟練又笨拙"
10032050-7 = "……便利屋68……"
10032050-13 = "……錠前沙織。"
10032050-14 = "對策該不會就是……"
10032050-15 = "……唉。"
10032050-16 = "這下情況真的麻煩了，社長。"
10032050-21 = "……是誰……？"
10032050-22 = "什麼誰……錠前沙織啊。"
10032050-23 = "奧利斯出身的學生傭兵。"
10032050-24 = "之前也艱辛地交手過一次，那麼快就忘了嗎？"
10032050-25 = "錠前沙織……？哦……"
10032050-26 = "……嗯？"
10032050-27 = "錠，錠前沙織！？#n是之前跟欠我們錢的那些傢伙交手時，那個很強的頭盔團……！！？"
10032050-28 = "嗯，沒錯。#n就是遙香醬去打招呼的那些傢伙雇用的傭兵。"
10032050-29 = "真的假的！！給人的感覺完全不一樣啊！？跟當時根本是不同人！！"
10032050-30 = "這點我們也是一樣吧～"
10032050-31 = "那時候真的是一團亂呢～#n超～累的！"
10032050-37 = "……居然偏偏碰到了你們，我本來是想盡量避免這種狀況的。"
10032050-38 = "不過我會全力以赴，絕不鬆懈。"
10032050-40 = "聽到了嗎？他說要全力對付我們耶，亞瑠醬？"
10032050-41 = "為什麼！？！"
10032050-42 = "這是當然的啊，畢竟是工作。"
10032050-48 = "……嗯？"
10032050-49 = "等等，你們旁邊的是……"
10032050-50 = "[s1]「嗨，沙織。」\n[s2]「禮服很漂亮哦。今天是來這裡做什麼呀？」"
10032050-53 = "……嗯？"
10032050-54 = "……老師？"
10032050-55 = "…………？"
10032050-56 = "……！？！？老，老師！？"
10032050-57 = "老師，老師怎麼會在這裡……！？"
10032050-58 = "……咦？"
10032050-59 = "你問我在這裡做什麼……？"
10032050-60 = "當，當然是因為工作……"
10032050-61 = "我必須在這裡待命，並在緊急情況時保護特定人物。"
10032050-62 = "所以為了潛入會場，才會穿上他們提供的禮服……"
10032050-63 = "……禮服……"
10032050-67 = "不，不是！！這件禮服不是我的！"
10032050-68 = "不，雖然是我的沒錯！！但不是我買來的！"
10032050-69 = "不，雖然是我挑的沒錯……！但都是為了工作……！"
10032050-70 = "絕對不是因為喜歡才……！#n雖然也不能完全說不是！"
10032050-71 = "該怎麼說呢，這只是……順應情勢……！所以……！！"
10032050-78 = "……他突然很慌耶？"
10032050-79 = "就是說啊，和我們的印象有點不太一樣……"
10032050-80 = "他本來是那樣的人嗎……"
10032050-82 = "話，話說老師才是，怎麼會來這裡呢……！！"
10032050-83 = "……嗯？"
10032050-84 = "製作教材用BD？#n……聯邦學生會要求你做的？"
10032050-85 = "是嗎……原來老師也是為了工作而來的。"
10032050-86 = "呵呵，我們都挺辛苦的呢。"
10032050-87 = "喂！你在做什麼！？為什麼在那邊聯絡感情啊！？"
10032050-88 = "現在可不是做這種事的時候！！快把我帶到安全的地方！！"
10032050-89 = "啊，啊啊，不小心就分心了。"
10032050-90 = "那麼……抱歉，老師。"
10032050-102 = "……我必須繼續完成工作才行。"
10032050-103 = "在把委託人帶到安全的地方後，我會再聯絡你。#n先告辭了……"
10032050-112 = "……！！"
10032050-113 = "…………！"
10032050-115 = "什麼什麼？難道你打算就這麼走了嗎？"
10032050-116 = "這樣我們會有點傷心耶？"
10032050-118 = "居然只跟老師說話，完全忽略我們這邊。"
10032050-119 = "我們再怎麼說也是努力追上來了耶～無視我們不會太過分了嗎？"
10032050-120 = "而且我們……"
10032050-121 = "……又不是第一次見面了。"
10032050-123 = "……便利屋68……"
10032050-124 = "雖然不想在這種情況下跟你們發生衝突……"
10032050-126 = "這完全是我們要說的話吧。"
10032050-127 = "如果你這麼想的話，我有一個提案。"
10032050-128 = "丟下你的委託人離開吧。#n這樣我們就不會再出手了。"
10032050-130 = "果然如此啊……"
10032050-134 = "……很遺憾，我無法接受那個提案。"
10032050-135 = "因為對我現在的工作來說，信賴是一切的基礎。"
10032050-136 = "必須確實完成接下的委託……我才能接下一個工作。"
10032050-138 = "…………"
10032050-139 = "……哦……"
10032050-140 = "哇……"
10032050-141 = "現在不是佩服人家的時候，社長。"
10032050-142 = "[s3]「我也能理解。」\n[s4]「畢竟確實很帥氣啊。」"
10032050-148 = "真可惜。因為有任務在身而無法離開，這點我們也是一樣的～"
10032050-149 = "如果你沒打算放棄的話……"
10032050-154 = "唔啊啊啊啊啊啊啊──！！！"
10032050-157 = "……我們也只能奉陪到底了。"
10032050-158 = "……果然只能這樣了嗎？"
10032050-159 = "我會爭取時間，你趕緊跑吧，委託人。"
10032050-160 = "跑……？"
10032050-161 = "……你是在命令我嗎？"
10032050-162 = "那當然，這裡的委託人只有你一個。#n聽到我的口令後就跑吧。"
10032050-167 = "……就是現在！！"
10032050-168 = "……！！！！"
10032050-174 = "別想逃～！"
10032050-175 = "遙，遙香，你沒事吧？剛剛有沒有受傷……"
10032050-180 = "不准妨礙亞瑠大人的計畫啊啊啊──！！！！"
10032050-192 = "……看來是沒事呢。"

[translation]
10042020-1 = "Episode 2;A Certain Rule"
10042020-4 = "Hello, Sensei."
10042020-5 = "I didn't think we'd be meeting like this, but I'm glad to see you nonetheless."
10042020-6 = "So, what's this business you were talking about? I'm guessing it's a pretty big deal, seeing as you called two members of Gehenna's Prefect Team."
10042020-7 = "If it's not a big deal...I mean, we'll still take care of it, but I'll give you an earful once we finish!"
10042020-8 = "[s1] \"Well, about that...\"\n[s2] \"This is going to be hard to explain...\""
10042020-17 = "Ch-Chinatsu. Iori..."
10042020-19 = "The School Lunch Club? That's unexpected..."
10042020-20 = "Indeed. One would expect such things from the Hot Springs Department or the Gourmet Research Society, but the School Lunch Club?"
10042020-21 = "Please provide the details, won't you?"
10042020-22 = "Well, you see..."
10042020-24 = "..."
10042020-25 = "Uh... So your cooking created some weird lifeform, and then it escaped?"
10042020-26 = "[s] \"I know it's hard to believe...\""
10042020-27 = "...Wait, hold on."
10042020-28 = "This reminds me of something..."
10042020-29 = "From the Pandemonium Society's party, yes?"
10042020-30 = "We do receive such reports from time to time..."
10042020-31 = "Then, what... Is this some new kind of bio-terrorism?"
10042020-32 = "Gehenna is full of terrorists...but I didn't expect the School Lunch Club to be in on that."
10042020-33 = "T-Terrorism?! Are you treating us like Haruna...?!"
10042020-34 = "I believe this is more of an accident."
10042020-35 = "Now that I think about it, we probably didn't pay enough attention to them, just because they're CALLED the School Lunch Club."
10042020-36 = "Come to think of it, there was that weird orange juice we found in their health inspection..."
10042020-37 = "?!"
10042020-38 = "W-Well... That was...!"
10042020-39 = "Iori. Regardless of that, the School Lunch Club still has the best interests of others at heart."
10042020-40 = "Well, whatever. It's not like I don't eat school lunches."
10042020-41 = "So, not a big deal, then. I could have taken care of this myself."
10042020-42 = "Stay back and watch, everyone. Especially you...Sensei."
10042020-43 = "...If anything happens to you, I'm going to be in trouble."
10042020-44 = "[s] \"Oh... So you do care about me...\""
10042020-45 = "Wh-What are you talking about?! You're way off!"
10042020-46 = "Anyway, let me take care of this, and I'll be right back."
10042020-50 = "[log]Right as she said that...[/log]"
10042020-53 = "[log]...a sharp, sudden premonition rushed through my mind![/log]"
10042020-57 = "[ns5] \"I-Iori?\"\n[ns6] \"Wait! Wait a second!\""
10042020-60 = "On my way!"
10042020-65 = "...There she goes."
10042020-66 = "She might have done well to listen to you, Sensei."
10042020-67 = "I would like to hear more about what happened. If the School Lunch Club is willing to explain, of course."
10042020-68 = "Waah, we're sorry... Waaah..."
10042020-69 = "Please, take heart."
10042020-70 = "Okay... Thank you, Chinatsu."
10042020-71 = "...When witnesses lose heart, they tend to give less detailed testimony."
10042020-72 = "So that's what you meant?!"
10042020-73 = "...Fufu."
10042020-74 = "What I mean is, you have nothing to worry about."
10042020-76 = "...And I think that's everything I know."
10042020-77 = "I see. The School Lunch Club had a day off. Fuuka left on her own, and Juri took a part-time job."
10042020-78 = "Through unexpected circumstances, you found yourself on kitchen duty. And your pancake-making skills proved surprisingly strong."
10042020-79 = "Right, yeah! That's it!"
10042020-80 = "Hm."
10042020-81 = "Well, I may not quite have a FULL grasp of the situation..."
10042020-82 = "W-Well..."
10042020-83 = "Still, a problem is a problem, and you've been a fine part-timer so far."
10042020-84 = "I think it is safe to call this an \"accident.\""
10042020-85 = "D-Do you really think so? I mean, I'd appreciate that..."
10042020-86 = "You mentioned an explosion in the cafe's storage room."
10042020-87 = "Of course, around here, that is still rather mundane."
10042020-88 = "[ns7] \"('Rather mundane,' huh?)\"\n[ns8] \"(That's Gehenna for you.)\""
10042020-91 = "In any case, Iori should be back with her results soon."
10042020-92 = "In fact, let me call her. One moment..."
10042020-97 = "Hm?"
10042020-98 = "She's not picking up. Let me try again..."
10042020-103 = "...This is unusual. But... Well, things don't always go as expected."
10042020-104 = "Could it be...?"
10042020-105 = "Once more..."
10042020-110 = "And she's...still not picking up."
10042020-111 = "..."
10042020-112 = "Sensei? Juri? This inexplicable lifeform you mentioned..."
10042020-113 = "The first customer to be attacked by it, what happened to that customer?"
10042020-114 = "Well, they passed out, with their face all covered in syrup..."
10042020-115 = "I see..."
10042020-116 = "[ns] \"What're you thinking, Chinatsu?\""
10042020-117 = "I think I need to change my initial impression of this situation, albeit slightly."
10042020-118 = "To be more specific, I've gone from outright skepticism to...qualified suspicion."
10042020-119 = "Iori being unavailable is highly unexpected. She's always been reliable and diligent."
10042020-120 = "In other words, she always picks up right away, unless she has a very good reason not to. So for her to miss three calls in a row..."
10042020-121 = "[s] \"Let me try calling her, just in case.\""
10042020-122 = "Yes, please do."
10042020-128 = "...Still nothing?"
10042020-129 = "I-Impossible...!"
10042020-130 = "[s9] \"I kind of expected it, the way this plot's going...\"\n[s10] \"You never split up in this genre...\""
10042020-133 = "...? What are you talking about, Sensei...?"
10042020-134 = "Um, excuse me! Should we go look for Iori, or what?"
10042020-135 = "Indeed we should, Sensei. I'm getting a very bad feeling about all this..."
10042020-136 = "...And Sensei, you must have your own thoughts on this situation. What do you think?"
10042020-137 = "[s11] \"Iori might already be covered in syrup...\"\n[s12] \"She might be sweet all over by the time we find her.\""
10042020-140 = "Wh-What?!"
10042020-141 = "Iori...well seasoned?"
10042020-144 = "This must be the darkest street on the farthest edges of Gehenna..."
10042020-145 = "Well, this is where the puddles of mucus have been leading us..."
10042020-146 = "Huh?! O-Over there! Look! Someone's under all that mucus! Is that Iori?"
10042020-149 = "[ns] \"Oh, no! Iori, are you all right?!\""
10042020-150 = "Hm... One moment. Let me check her over..."
10042020-155 = "...Her life is not in danger, at least. But she does have an odd smell..."
10042020-156 = "...Yes, I expect that smell will stay with her for some time. And this substance is quite sticky..."
10042020-157 = "Is that all you have to say? She's completely unconscious!"
10042020-158 = "When you work with Iori, that eventually ceases to alarm you."
10042020-159 = "...Still, to be on the safe side, we should consult an expert."
10042020-160 = "[s] \"An expert...?\""
10042020-161 = "There's an expert on this besides you?"
10042020-162 = "Yes. When it comes to matters like this, I know just the person who can help."
10042020-163 = "Even if she is rather eccentric..."
10042020-165 = "...I see. So this is why you called me. I understand."
10042020-166 = "But I concur with Chinatsu's opinion. She should be fine."
10042020-167 = "...It seems the syrup wasn't to her tastes."
10042020-168 = "...?! S-Syrup...? Tastes...? Can that really make someone pass out?!"
10042020-169 = "..."
10042020-170 = "...She found the taste extremely unpleasant."
10042020-171 = "Okay, but that doesn't really answer the question!"
10042020-175 = "[ns13] \"A-At least we know she'll be fine!\"\n[ns14] \"Sorry, by the way! I didn't know this was your day off!\""
10042020-178 = "[ns] \"...And you look great in casual clothes!\""
10042020-179 = "It's fine. The Medical Emergency Club always has to be ready as first responders."
10042020-180 = "And I appreciate the compliment. Thank you."
10042020-181 = "I'll take the body — IORI under the Medical Emergency Club's care."

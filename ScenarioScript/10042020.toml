[translation]
10042020-1 = "第2話;某種法則"
10042020-4 = "您好，老師。"
10042020-5 = "雖然沒想到會是這種情況，但是見到老師真的很開心。"
10042020-6 = "所以到底怎麼回事？#n竟然叫了兩個格黑娜的風紀委員過來，肯定不是什麼小事吧？"
10042020-7 = "要是只是無聊的小事……我們當然還是會出手解決，但之後可是會念老師一頓的哦！"
10042020-8 = "[s1]「說到這個，其實……」\n[s2]「真要說明起來，情況有點奇妙……」"
10042020-17 = "千，千夏同學、伊織同學……"
10042020-19 = "啊，供給部？#n這倒是出乎我的意料……"
10042020-20 = "如果是溫泉開發部或美食研究會的話還能理解，但這次的事件竟然跟供給部有關？"
10042020-21 = "可以的話，希望兩位能簡單說明一下前因後果。"
10042020-22 = "事情是這樣的……"
10042020-24 = "……"
10042020-25 = "唔嗯……所以簡單來說，是在做料理時誕生的怪異生命體自己逃跑了？"
10042020-26 = "[s]「雖然很難以置信……」"
10042020-27 = "……等等。"
10042020-28 = "這麼說來，之前好像也發生過類似的事件……"
10042020-29 = "好像是在萬魔殿開派對的時候……對吧。"
10042020-30 = "在此之前也接過幾次類似的通報……"
10042020-31 = "所以這算是……一種新型的恐怖攻擊嗎？"
10042020-32 = "雖然格黑娜本來就有各種恐怖份子……但我實在沒想到供給部也是其中之一。"
10042020-33 = "恐，恐怖份子！？我們被劃分成羽留奈的同類了嗎……！？！？"
10042020-34 = "也可能不是恐怖攻擊……只是單純的意外吧。"
10042020-35 = "現在回頭想想，我們好像一直都沒怎麼監視供給部。"
10042020-36 = "而且之前進行供給部衛生評鑑的時候，好像也喝到了可疑的柳橙汁……？"
10042020-37 = "！？"
10042020-38 = "那，那個，該怎麼說呢……！"
10042020-39 = "伊織，即便如此，供給部的大家也總是出於善意在努力。#n我們應該心存感激才對。"
10042020-40 = "嗯，也是啦。#n我平常在吃飯方面也受了你們不少照顧。"
10042020-41 = "話說其實根本沒什麼大不了的嘛。#n這種程度我一個人就能應付了。"
10042020-42 = "大家去安全的地方等我就好。#n尤其……是老師你。"
10042020-43 = "……要是老師出事的話，我也多少會有點困擾。"
10042020-44 = "[s]「啊啊……原來伊織這麼為我著想……」"
10042020-45 = "亂，亂講！我才沒有好嗎！？"
10042020-46 = "總之我馬上搞定後就回來！"
10042020-50 = "[log]就在伊織做出保證的瞬間──[/log]"
10042020-53 = "[log]某種強烈而鋒利的預感，在腦海中一閃而過！[/log]"
10042020-57 = "[ns5]「伊，伊織？」\n[ns6]「你先等一下！」"
10042020-60 = "那我走了！"
10042020-65 = "……走掉了。"
10042020-66 = "明明再多聽老師說明一下也無所謂的……"
10042020-67 = "我還想多了解一下狀況……可以麻煩你們嗎，供給部的各位？"
10042020-68 = "嗚嗚，對不起。#n嗚嗚嗚……"
10042020-69 = "沒事的，你不必這麼沮喪。"
10042020-70 = "嗯……謝謝你，千夏同學。"
10042020-71 = "……要是情緒太低落的話，會影響對現場描述的準確度的。"
10042020-72 = "原來不是在安慰我嗎！？"
10042020-73 = "……呵呵。"
10042020-74 = "我的意思是你不需要太擔心。"
10042020-76 = "……我知道的應該就是這些了。"
10042020-77 = "原來如此啊。#n供給部的休假……風華同學選擇外出，茱莉同學則去打工。"
10042020-78 = "異常忙碌的咖啡廳，突如其來的廚房工作。#n還有不同於往常，意外成功的料理……"
10042020-79 = "是，是的！就是這樣沒錯！"
10042020-80 = "唔嗯……"
10042020-81 = "雖然不能說完全理解……"
10042020-82 = "那，那個……"
10042020-83 = "即便確實發生了問題，但是茱莉同學在那之前都表現得很好。"
10042020-84 = "這果然只是單純的「意外」而已吧。"
10042020-85 = "是，是嗎？#n如果千夏同學願意這麼想，我當然很感謝……"
10042020-86 = "儘管剛才有提到咖啡廳的倉庫發生了爆炸……"
10042020-87 = "不過，那在這裡只是稀鬆平常的小事罷了。"
10042020-88 = "[ns7]（這算是小事啊……）\n[ns8]（畢竟這裡可是格黑娜啊……）"
10042020-91 = "話說伊織應該差不多處理好了。"
10042020-92 = "我來聯絡一下，請稍等。"
10042020-97 = "……？"
10042020-98 = "咦，伊織沒接電話？#n我再打一次……"
10042020-103 = "……這還真稀奇。#n不過……事情本來就不會永遠按照我們的意料發展。"
10042020-104 = "難道說……？"
10042020-105 = "再試一次……"
10042020-110 = "竟然這麼久都不接電話……？"
10042020-111 = "……"
10042020-112 = "老師，還有茱莉同學。#n關於那個不明生命體……"
10042020-113 = "第一個被它襲擊的客人怎麼樣了？"
10042020-114 = "那個，他臉上沾滿醬汁昏過去了……"
10042020-115 = "這樣啊……"
10042020-116 = "[ns]「千夏，怎麼了嗎？」"
10042020-117 = "嗯，看來我得稍微修正一下稍早的看法。"
10042020-118 = "具體來說，我要從完全否定調整為半信半疑。"
10042020-119 = "情況有點奇怪。#n伊織一向既忠誠又認真。"
10042020-120 = "除非出了什麼大事，不然他通常馬上就會接電話才對。#n連打三次都沒接就代表……"
10042020-121 = "[s]「以防萬一，我也聯絡他看看吧。」"
10042020-122 = "好的，麻煩您了。"
10042020-128 = "還是沒人接嗎……？"
10042020-129 = "怎，怎麼會……！"
10042020-130 = "[s9]「唔嗯……從事情的走向來看……」\n[s10]「在這種類型的作品裡，要是落單的話……」"
10042020-133 = "您這番話的意思是……？"
10042020-134 = "那，那個！我們要不要先去找找伊織同學？"
10042020-135 = "是啊，老師。#n總覺得情況有點不對勁……"
10042020-136 = "老師是不是已經察覺到什麼端倪了？#n您有什麼看法呢？"
10042020-137 = "[s11]「伊織現在搞不好也已經沾滿了醬汁……」\n[s12]「變成涼拌伊織了……」"
10042020-140 = "咦，咦咦！？"
10042020-141 = "涼拌……伊織？"
10042020-144 = "即便是在格黑娜，這裡也算是相當偏僻又陰暗的地方……"
10042020-145 = "今天路上到處都是綠色的黏液呢……？"
10042020-146 = "啊！快看那邊！！！#n伊織同學沾滿綠色黏液倒在地上！"
10042020-149 = "[ns]「什麼？伊織他沒事吧！？」"
10042020-150 = "唔嗯……請稍等。#n我先檢查一下……"
10042020-155 = "……沒有生命危險。#n不過話說回來，這個味道還真奇特……"
10042020-156 = "而且還黏糊糊的……看來味道恐怕得跟著他一整天了……"
10042020-157 = "只，只有這樣而已嗎？他都已經失去意識了耶！？"
10042020-158 = "不必擔心。#n我跟伊織已經共事很久了，這種事經常發生……"
10042020-159 = "……不過為了保險起見，還是詢問一下專家的意見比較好。"
10042020-160 = "[s]「專家……？」"
10042020-161 = "除了千夏同學之外還有別的專家嗎……？"
10042020-162 = "嗯。我在這方面認識一位可以完全信賴的人。"
10042020-163 = "……雖然這個人也有點特別就是了。"
10042020-165 = "……原來如此，所以才會找我過來啊。#n我明白了。"
10042020-166 = "情況就如千夏所說，伊織並沒有大礙。#n就我看來……"
10042020-167 = "……應該只是醬汁不合他的口味而已。"
10042020-168 = "醬，醬汁……不合口味！？這樣就會昏倒嗎！？"
10042020-169 = "…………"
10042020-170 = "……也許他很不喜歡那種味道吧。"
10042020-171 = "那不只是換個說法而已嗎！！"
10042020-175 = "[ns13]「如，如果真的是這樣的話就太好了，嗯！」\n[ns14]「還有抱歉，我不知道你今天休假。」"
10042020-178 = "[ns]「……另外，你穿便服也很好看哦！」"
10042020-179 = "不必放在心上。#n急救醫學部本來就會隨時待命。"
10042020-180 = "至於老師對便服的感想，老實說讓我感到很開心。"
10042020-181 = "這具屍體……更正，伊織就交給我們急救醫學部處理吧。"

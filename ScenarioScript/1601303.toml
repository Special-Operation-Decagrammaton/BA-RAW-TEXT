[translation]
1601303-1 = "小春的危機"
1601303-3 = "（小春傳來的地點，是聳立於海邊的一塊岩石）"
1601303-7 = "（小春似乎在岩石上凝視著大海）"
1601303-8 = "[s1]「原來你在這裡啊。」\n[s2]「小春，你在這裡做什麼呢？」"
1601303-13 = "啊，老，老師……？"
1601303-14 = "啊，那個……是這樣的……"
1601303-15 = "……我也，不太知道，只是一直坐在這裡……"
1601303-16 = "[s3]「只是坐著？」\n[s4]「叫我過來的理由是……」"
1601303-19 = "這，這個嘛……只是覺得應該叫老師來……"
1601303-20 = "仔細想想，究竟是為什麼呢？明明沒理由叫老師來的。#n一到這裡就不自覺地慌張起來……"
1601303-21 = "回過神來就已經聯絡老師了……#n真搞不懂……"
1601303-22 = "[s5]「也許是因為海太美了……」\n[s6]「看見這麼漂亮的景色，會那樣也是理所當然的。」"
1601303-25 = "唔嗯……是……嗎……"
1601303-26 = "回頭想想，老師之前在瀑布也是這樣嗎？"
1601303-27 = "只是呆呆看著？"
1601303-28 = "……嗯？"
1601303-29 = "可能差不多？來到這種地方，會那樣是很自然而且很常有的事？"
1601303-30 = "真，真的嗎……可是還是有種浪費時間的感覺……"
1601303-31 = "難得來到這麼遠的地方卻什麼都不做，我還是無法理解。"
1601303-32 = "不過既然老師都這麼說了……"
1601303-36 = "嗯，好。#n那我也試著這麼做吧。"
1601303-37 = "[s7]「那也是個不錯的想法。」\n[s8]「我也會在一旁陪你的。」"
1601303-42 = "當，當然要囉！你該不會又想自己跑去其他地方吧！？"
1601303-43 = "如果知道我會在這裡呆呆坐著，老師一定馬上就會跑去找別人吧？"
1601303-44 = "然後在我視線以外的地方，對一無所知的人這樣又那樣……！"
1601303-45 = "門都沒有！絕對不會讓你得逞！#n不准離開我身邊！！禁止禁止！！"
1601303-46 = "[s9]「我什麼都沒說啊……」\n[s10]「是是是，我知道了。」"
1601303-49 = "……唔……！又是那種反應……！"
1601303-52 = "（於是決定在小春接受為止都待在他身邊眺望大海）"
1601303-56 = "……唔嗯，要這樣到什麼時候呢……"
1601303-57 = "還是想不通……果然這種事還是要變成大人之後才會懂嗎……"
1601303-58 = "……什，什麼！？不懂也沒關係？#n別用想的，而是去感受……？"
1601303-59 = "你，你是在耍我吧！？#n我全都懂好嗎！？已經完全明白了！"
1601303-60 = "唉～我享受夠了！現在已經膩了～！"
1601303-61 = "來，老師！要回去囉。我已經看夠了！"
1601303-62 = "回去之後也告訴大家……"
1601303-68 = "……！？"
1601303-69 = "……唔咦！？怎，怎麼會！？#n老師！！後，後面……後面全都是水……！！"
1601303-70 = "剛才明明還是沙灘的說……！？#n怎，怎麼回事！？突然就變成海了！！"
1601303-71 = "[s11]「哎呀，真的耶。沙灘都消失了。」\n[s12]「這麼說來已經到漲潮時間了啊，是我疏忽了。」"
1601303-74 = "為什麼這麼淡定！？#n這樣很不妙吧！！回去的路都不見了耶！！"
1601303-75 = "難道你早就知道了嗎？#n明明知道卻故意不告訴我……！？"
1601303-76 = "真是的……！這，這麼說來我有在書上看過……#n讓人無處可逃之後，在空無一人的野外做不該做的事……！！"
1601303-77 = "[s13]「你先冷靜下來，小春。趕快離開就沒問題了。」\n[s14]「雖然在漲潮沒錯，但現在水還很淺，不用擔心。」"
1601303-80 = "這種情況怎麼可能冷靜！！"
1601303-81 = "你果然打從一開始就是為了這個……！"
1601303-82 = "沒想到一時大意居然會變成這樣……！"
1601303-88 = "老，老師！？#n……你在做什麼？現在水已經……"
1601303-92 = "不，不能突然到水裡去啦！！會溺水啦！#n那樣會溺死的，老師！！"
1601303-93 = "[s15]「水深還不及腰，而且距離很近。」\n[s16]「小春也過來吧，來。」"
1601303-96 = "可……可是……！！"
1601303-101 = "噫，噫噫！"
1601303-102 = "老，老師！等等！別丟下我！也帶我走嘛！！"
1601303-108 = "（就這樣和小春一起在水中走著，順利回到了島嶼的海邊）"
1601303-109 = "（儘管水深很淺，嚇壞的小春仍然一直緊抓著背部不放）"
1601303-115 = "嗚，嗚嗚……嗚嗚嗚嗚嗚嗚……嗚嗚……"
1601303-116 = "嗚……嗚……"
1601303-122 = "[ns17]「辛苦你了，小春。」\n[ns18]「其實沒有那麼危險……」"
1601303-125 = "吵死了！！笨蛋老師！"
1601303-126 = "人家真的很害怕！！"
1601303-127 = "還以為要出事了！！#n沒想到海面會突然昇得那麼快……"
1601303-128 = "什麼……？"
1601303-129 = "你說水深也就在腰部以下而已……？"
1601303-135 = "那，那又怎樣！！都一樣是在海裡不是嗎！"
1601303-136 = "跟在游泳池完全不一樣！我還沒做好心理準備……！！"
1601303-137 = "嗚嗚……算了……好累……嗚嗚嗚嗚……"
1601303-143 = "老，老師……"
1601303-144 = "你不能走……知道嗎？#n待在那裡別動……"
1601303-146 = "（之後一直在身旁安撫小春，直到他冷靜下來）"
1601303-147 = "（等小春打起精神後，一起回到了營地）"

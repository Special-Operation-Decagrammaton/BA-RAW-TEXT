[translation]
1601303-1 = "วิกฤตของโคฮารุ"
1601303-3 = "(สถานที่ที่โคฮารุบอกมาก็คือบริเวณโขดหินแห่งหนึ่งที่อยู่แถวๆ ชายหาด)"
1601303-7 = "(และคุณครูก็พบโคฮารุที่นั่งมองเส้นขอบฟ้าอยู่บนโขดหินตรงนั้น)"
1601303-8 = "[s1] \"มาอยู่ตรงนี้นี่เอง\"\n[s2] \"โคฮารุ มาทำอะไรตรงนี้น่ะ?\""
1601303-13 = "อ๊ะ คะ...คุณครู...?"
1601303-14 = "เอ่อคือ... คือว่านะ... คือว่า..."
1601303-15 = "...ไม่รู้เหมือนกันน่ะ ก็แค่นั่งมองไปเรื่อยๆ..."
1601303-16 = "[s3] \"แค่นั่งมองไปเรื่อยๆ...?\"\n[s4] \"ถ้างั้นเรียกครูมาทำไมน่ะ...\""
1601303-19 = "นะ...นั่นสินะ คือว่า... รู้สึกเหมือนควรจะต้องเรียกคุณครูมา...ก็เลยทำแบบนั้นไปน่ะ"
1601303-20 = "พอมาคิดดูแล้ว ฉันทำแบบนั้นไปทำไมนะ? ทำไมถึงเรียกคุณครูออกมาทั้งที่ไม่มีเหตุผลอะไร พอมาถึง ฉันเองก็ไม่รู้ว่าทำไมเหมือนกัน..."
1601303-21 = "ถึงได้รีบร้อนติดต่อไปหาคุณครู... อะ...อืม... มะ...ไม่รู้เหมือนกัน..."
1601303-22 = "[s5] \"ครูว่าครูพอจะรู้นะ ทะเลมันสวยดีนี่เนอะ...\"\n[s6] \"วิวสวยมากเลยนี่นา คงเพราะแบบนั้นละมั้ง\""
1601303-25 = "อืม... อย่างงั้น... หรอกเหรอ..."
1601303-26 = "พอมาคิดดูแล้ว คราวก่อนตอนอยู่ที่น้ำตก คุณครูก็เอาแต่ทำแบบนี้เหมือนกันนี่?"
1601303-27 = "ที่เอาแต่นั่งเหม่อมองไปเรื่อยๆ น่ะ"
1601303-28 = "...หืม?"
1601303-29 = "อาจคล้ายๆ กันก็ได้งั้นเหรอ? เวลามาที่แบบนี้ ก็อาจเกิดเรื่องแบบนั้นได้งั้นเหรอ?"
1601303-30 = "จะ...จริงเหรอ...? แต่ว่ารู้สึกเหมือนเสียเปรียบยังไงก็ไม่รู้เลยนะ..."
1601303-31 = "อุตส่าห์เดินทางมาตั้งไกล แต่มาใช้เวลาไปกับการนั่งเฉยๆ แบบนี้น่ะ ไม่เห็นเข้าใจเลย"
1601303-32 = "แต่ถ้าคุณครูพูดถึงขนาดนั้น..."
1601303-36 = "อืม ดีละ ฉันลองทำดูบ้างดีมั้ยนะ"
1601303-37 = "[s7] \"แบบนั้นก็ดีนะ\"\n[s8] \"ครูจะอยู่ข้างๆ โคฮารุเอง\""
1601303-42 = "กะ...ก็ต้องเป็นอย่างนั้นอยู่แล้วสิ! หรือว่าคิดจะแอบไปไหนคนเดียวอีกแล้วน่ะ!?"
1601303-43 = "พอรู้ว่าฉันมานั่งอยู่ตรงนี้ คุณครูก็คงจะรีบแจ้นไปหาคนอื่นเลยล่ะสิ?"
1601303-44 = "แล้วก็จะไปทำอะไรแปลกๆ ใส่คนบริสุทธิ์ที่ไม่รู้อิโหน่อิเหน่อะไรอีก...!"
1601303-45 = "แบบนั้นไม่ได้เด็ดขาด! ฉันไม่มีวันยอมให้เป็นแบบนั้นแน่! เข้าใจมั้ย? เพราะงั้นห้ามไปไหนไกลจาก#nฉันเด็ดขาดเลย ห้าม! ห้ามเด็ดขาดเลย!"
1601303-46 = "[s9] \"ครูยังไม่ได้พูดอะไรเลยสักคำ...\"\n[s10] \"จ้า จ้า~ รู้แล้วจ้า...\""
1601303-49 = "...อึก...! ตอบกลับแบบนี้อีกแล้ว...!"
1601303-52 = "(คุณครูนั่งอยู่ข้างๆ โคฮารุจนเวลาผ่านไปสักพัก...)"
1601303-56 = "...อืม จะต้องนั่งอยู่ตรงนี้อีกนานแค่ไหน..."
1601303-57 = "ฉันไม่เข้าใจเลยแฮะ เรื่องแบบนี้ต้องรอให้โตเป็นผู้ใหญ่แบบคุณครูก่อน ถึงจะเข้าใจหรือเปล่านะ..."
1601303-58 = "...หะ...หืม!? ไม่ต้องเข้าใจก็ได้งั้นเหรอ? ไม่ต้องคิดให้ปวดหัว แค่ค่อยๆ สัมผัสความรู้สึกนี้ไปก็พอ...??"
1601303-59 = "พะ...พูดอะไรเนี่ย!? เห็นฉันเป็นคนหัวทึบหรือยังไง!? ฉันเองก็รู้ทุกอย่าง และเข้าใจทุกอย่างเหมือนๆ กันนะ?!"
1601303-60 = "อ่า~ ฉันสนุกพอแล้วละ ชักจะเริ่มเบื่อแล้วสิ~!"
1601303-61 = "เอาละ คุณครู! เรากลับกันเถอะ แค่นี้ฉันก็พอใจแล้วละ!"
1601303-62 = "พอกลับไปถึงแคมป์ ฉันจะไปบอกทุกคน..."
1601303-68 = "...หืม!?"
1601303-69 = "...กรี๊ด!? อะ...อะไรน่ะ!? คุณครู ขะ...ข้างหลัง... นะ...น้ำอยู่ข้างหลัง...!!"
1601303-70 = "เมื่อกี้ยังเป็นหาดทรายอยู่เลยนี่...!? อะ...อะไรกัน?! จู่ๆ ก็กลายเป็นทะเลไปแล้ว!!"
1601303-71 = "[s11] \"เห...จริงด้วยแฮะ หาดทรายหายไปตั้งเยอะแน่ะ\"\n[s12] \"ช่วงเวลาน้ำขึ้นสินะ พลาดแล้วละ\""
1601303-74 = "ทำไมถึงยังใจเย็นแบบนี้ได้อีกเนี่ย!? นี่มันเรื่องใหญ่เลยนะ ทางเดินกลับหายไปแล้ว!!"
1601303-75 = "หรือว่าคุณครูรู้อยู่แล้ว? รู้ทั้งรู้ว่าจะเป็นแบบนี้ แต่ก็ยังมานั่งข้างๆ กันแบบนี้อีกงั้นเหรอ? อะ...อะไรกัน...!"
1601303-76 = "พะ...พอลองคิดดูแล้วก็เหมือนเคยเห็นมาก่อนเหมือนกัน หลังจากสร้างสถานการณ์ที่ไม่มีหนทางให้#nหนีไปทางไหนได้ และมีเหตุการณ์เกิดขึ้นท่ามกลางที่แจ้งไร้ผู้คน...!!"
1601303-77 = "[s13] \"ใจเย็นๆ ก่อนเถอะ โคฮารุ ตอนนี้เรายังกลับกันได้นะ\"\n[s14] \"น้ำขึ้นไม่สูงมาก ยังเดินไปได้สบายๆ\""
1601303-80 = "สบายกะผีน่ะสิ!! สถานการณ์แบบนี้จะไปสบายได้ยังไงเล่า!!"
1601303-81 = "วางแผนให้เกิดเรื่องแบบนี้แต่แรกแล้วสินะ...!"
1601303-82 = "ความผิดพลาดที่ดันเผลอลดความระมัดระวังตัวไปแค่แป๊บเดียว ดันกลับกลายเป็นเรื่องใหญ่แบบนี้เลย#nเหรอเนี่ย!"
1601303-88 = "คะ...คุณครู!? ...จะไปไหนน่ะ? จู่ๆ ก็เดินลุยน้ำ..."
1601303-92 = "จะ...จู่ๆ ลงไปในน้ำแบบนั้นไม่ได้นะ เดี๋ยวก็จมน้ำหรอก!! ทำแบบนั้นเดี๋ยวก็จมน้ำตายหรอก คุณครู!!"
1601303-93 = "[s15] \"น้ำสูงยังไม่ถึงเอวเลย แถมเดินกลับก็ไม่ไกลด้วย\"\n[s16] \"โคฮารุก็รีบมาสิ ถ้าไม่รีบเดี๋ยวไม่ได้กลับนะ\""
1601303-96 = "ตะ...แต่ว่า... แต่ว่าฉัน...!!"
1601303-101 = "กะ...กรี๊ดดด!!"
1601303-102 = "กะ...กรี๊ดดด!! อย่าเพิ่งไปสิ! อย่าทิ้งฉันไว้แบบนี้ พาฉันไปด้วยคน!!"
1601303-108 = "(คุณครูกับโคฮารุเดินลุยน้ำกลับมาที่ชายหาดบนเกาะ)"
1601303-109 = "(ถึงน้ำจะไม่ได้ลึกมากนัก แต่โคฮารุก็ดูตกใจมากจนเกาะหลังคุณครูเอาไว้แน่น)"
1601303-115 = "ฮือออ... ฮือออ... ฮือๆๆๆ... ฮึก..."
1601303-116 = "ฮือ...ฮืออ..."
1601303-122 = "[ns17] \"เก่งมากเลย โคฮารุ\"\n[ns18] \"มันไม่ได้น่ากลัวขนาดนั้นสักหน่อย...\""
1601303-125 = "หนวกหู!! คุณครูคนบ้า!!"
1601303-126 = "ฉันกลัวจริงๆ นะ!!"
1601303-127 = "คิดว่าจะเกิดอะไรขึ้นซะอีก!! ใครจะไปรู้เล่าว่าจู่ๆ น้ำมันจะขึ้นมาแบบนี้..."
1601303-128 = "ว่าไงนะ...?"
1601303-129 = "น้ำลึกไม่ถึงเอวเลยงั้นเหรอ...?"
1601303-135 = "แล้วมันยังไงกันเล่า!! การจมน้ำมันก็คือการจมน้ำ!!"
1601303-136 = "มันไม่เหมือนกับตอนที่ลงไปว่ายน้ำนะ! การเตรียมใจมันไม่เหมือนกัน...!!"
1601303-137 = "อึก... ช่างมันเหอะ... ฉันเหนื่อยแล้ว... ฮือๆๆ..."
1601303-143 = "คะ...คุณครู..."
1601303-144 = "ห้ามไปไหนนะ... เข้าใจมั้ย? อยู่ตรงนี้ก่อน..."
1601303-146 = "(คุณครูก็นั่งปลอบโคฮารุอยู่ข้างๆ จนเธอใจเย็นลง)"
1601303-147 = "(หลังจากนั้นคุณครูก็พาโคฮารุที่ร่าเริงขึ้นแล้วกลับไปที่แคมป์)"

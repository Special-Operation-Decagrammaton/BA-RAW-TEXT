[translation]
1601303-1 = "Koharu's Crisis"
1601303-3 = "I followed Koharu's instructions to a boulder on top of the beach."
1601303-7 = "She was perched precariously on top of it, looking over the horizon."
1601303-8 = "[s1] \"There you are.\"\n[s2] \"What are you doing here, Koharu?\""
1601303-13 = "Oh, Sensei...?"
1601303-14 = "Well, you see..."
1601303-15 = "I actually don't know. I've just been sitting here without any good reason."
1601303-16 = "[s3] \"Just sitting here?\"\n[s4] \"Did you need something from me?\""
1601303-19 = "No. Yes. I don't know. I just felt like I needed to sit here."
1601303-20 = "I don't have a good reason for calling you either, honestly..."
1601303-21 = "I was just sitting here, and I wanted to call you. Is that okay?"
1601303-22 = "[s5] \"Of course. Thank you for sharing this view with me.\"\n[s6] \"I'd want to share a view like this with someone too.\""
1601303-25 = "Hm... That kind of makes sense."
1601303-26 = "This reminds me of when I found you at the waterfall."
1601303-27 = "You were just staring into space, like me staring at the ocean."
1601303-28 = "Huh?"
1601303-29 = "That's a pretty normal thing to do somewhere like this?"
1601303-30 = "Even if it's \"normal\" for other people, I don't know... It feels like a waste of time."
1601303-31 = "We came all this way, and I'm just going to do nothing? It doesn't make sense."
1601303-32 = "But you said it's normal... So I guess it can't be a complete waste."
1601303-36 = "Okay. I'll try to just feel whatever I'm feeling. I think."
1601303-37 = "[s7] \"I like that idea. I'll do it too.\"\n[s8] \"I'll be right next to you.\""
1601303-42 = "Y-You better! Were you going to wander off by yourself?"
1601303-43 = "You're going to go hunt down some poor victims since you know I'm stationed here."
1601303-44 = "And then you'll be doing all kinds of weird things while I'm not looking!"
1601303-45 = "No way, Sensei! Put your butt down and don't move an inch! Not! An! Inch!"
1601303-46 = "[s9] \"I said I was staying...\"\n[s10] \"Yeah, yeah. I got it.\""
1601303-49 = "Ugh! You're always so unphased."
1601303-52 = "So I sat down next to Koharu on her boulder, so she wouldn't be so suspicious."
1601303-56 = "Hm. How long do we stare into space for?"
1601303-57 = "I still don't really get it? Maybe only adults can do this \"spacing out\" thing."
1601303-58 = "I don't need to understand? It's about feeling, not thinking?"
1601303-59 = "Are you calling me dumb?! Hmph! Never mind, I get it. It all makes sense to me!"
1601303-60 = "Anyway! I really loved this spacing out thing! It was great!"
1601303-61 = "But I'm all done now. Let's head back, Sensei."
1601303-62 = "When we get to camp, I'm going to tell everyone what I—"
1601303-68 = "...Huh?!"
1601303-69 = "...What the?! Sensei! Behind you! The water!"
1601303-70 = "What happened to the beach?! There's no sand! We're surrounded by ocean everywhere!"
1601303-71 = "[s11] \"Hey, you're right. A lot of the beach is gone.\"\n[s12] \"Ah, looks like the tide came in. Whoops.\""
1601303-74 = "Why are you so nonchalant about all this?! We're in trouble! How are we going back?!"
1601303-75 = "Did you know this the whole time? And you still chose to be with me? B-But that...!"
1601303-76 = "Ack! I know what you're doing! I've read about this before! You've trapped me somewhere no one else can get to, and now you're going to do horrible things!"
1601303-77 = "[s13] \"Calm down, Koharu. We can wade back.\"\n[s14] \"The tide is coming in, but it's still shallow.\""
1601303-80 = "CALM DOWN?! I will not calm down!"
1601303-81 = "I know you had ulterior motives!"
1601303-82 = "I can't believe I let my guard down around you!"
1601303-88 = "Wait, Sensei? Where are you going? Don't leave me!"
1601303-92 = "You can't just jump in the water like that, Sensei! What if you drown?! You could drown, Sensei!"
1601303-93 = "[s15] \"It doesn't even come to my waist. And we're not that far.\"\n[s16] \"Come on, Koharu. The more we wait, the higher the tide will be.\""
1601303-96 = "B-But... But...!"
1601303-101 = "E-EEEEEEK!"
1601303-102 = "D-Don't leave! Don't leave me behind! Take me with you!"
1601303-108 = "So Koharu and I waded through the water and returned to the island's beach."
1601303-109 = "Refusing to believe that the water levels were as low as I said, I essentially had to piggy back Koharu back to dry land."
1601303-115 = "*sniffle* *sob* *sniffle*"
1601303-116 = "*sob*"
1601303-122 = "[ns17] \"Well done, Koharu.\"\n[ns18] \"We really weren't in any danger...\""
1601303-125 = "Shut up! You're such a dummy, Sensei!"
1601303-126 = "I was really scared!"
1601303-127 = "I thought something was going to happen! I didn't expect the water to come in like that all of a sudden..."
1601303-128 = "...Huh?"
1601303-129 = "Nothing was going to happen in waist-deep water?"
1601303-135 = "That's not the point! You don't know what's in there! I had to get in the ocean still!"
1601303-136 = "I didn't prepare for this... It's nothing like the pool back at Trinity..."
1601303-137 = "Ugh... Fine...whatever... *sob*"
1601303-143 = "S-Sensei..."
1601303-144 = "Just don't go anywhere... Okay? Please stay with me."
1601303-146 = "I stayed with Koharu, rubbing her back through her tears."
1601303-147 = "Once she finally calmed down, I brought her back to camp."

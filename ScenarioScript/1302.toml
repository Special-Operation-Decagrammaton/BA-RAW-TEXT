1302-9 = "1;마리나;01\n5;노도카;06;구교사에서 나오라기에 드디어 정학 기간이 끝난 줄 알고 기뻐했는데……\n#5;stiff"
1302-10 = "5;노도카;05;대뜸 저더러 페로로가 되라니, 이게 무슨 뚱딴지같은 제안인가요?\n#5;em;[속상함]"
1302-11 = "1;마리나;03;거짓말은 하지 않았다. 제안만 들어준다면 앞으로 그대는 본교사에서 편안히 지낼 수 있을 것이다. 푸딩도 두 개씩 지급하겠다고 약속하지.\n#1;em;[반응]"
1302-12 = "1;마리나;99;……다만 한동안은 이 페로로 인형 탈을 쓰고 말끝에 '페로~' 라는 어미를 붙여야 하겠지만 말이야."
1302-13 = "5;노도카;04;그런 바보 같은 일에 동참할 리가 없잖아요!\n#5;em;[!]\n#5;hophop"
1302-14 = "5;노도카;05;그보다 어째서 제가 이 인형 탈을 써야 하나요? 가짜 페로로 흉내를 내는 것뿐이라면 다른 보안위원들에게 시키셔도 되잖아요?"
1302-15 = "1;마리나;02;그건 무리다. 이 인형 탈의 내부는 보안 위원들이 들어가기에는 너무 좁거든."
1302-16 = "1;마리나;09;그대처럼 작고 날렵한 꼬맹이가 아니라면 실행할 수 없는 작전이다.\n#1;em;[반짝]"
1302-17 = "5;노도카;05;사람을 두고 꼬맹이라니, 그게 지금 부탁하는 사람의 자세인가요?!\n#5;em;[빠직]\n#5;stiff"
1302-18 = "5;노도카;04;……애초에 가상의 캐릭터를 학교에 전입 시켜 온다는 게 말이 될 리가 없잖아요."
1302-19 = "5;노도카;05;아무리 회장의 명령이라지만 위원장도 안되는 건 안 된다고 딱 잘라 말씀하시라고요!\n#5;em;[!]\n#5;hophop"
1302-20 = "1;마리나;07;그, 그건 그렇지만……\n#1;stiff"
1302-21 = "1;마리나;07\n#1;em;…\n#wait;2500"

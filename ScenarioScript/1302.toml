[translation]
1302-1 = "會長永遠是對的（２）"
1302-5 = "……所以，妳必須成為佩洛洛。"
1302-7 = "什麼「所以」啊！？我完全無法理解！？"
1302-9 = "被叫到主校舍來，我還以為是在舊校舍的停學處分結束而開心了一下呢……"
1302-10 = "突然說什麼「成為佩洛洛」，就為了開這種玩笑把我叫來嗎！？"
1302-11 = "很遺憾，我並沒有在開玩笑。只要你願意接受這個提案，我保證會全力爭取讓你們回到主校舍。要爭取每人供給兩個布丁也行。"
1302-12 = "……只是短時間內，你要穿上佩洛洛的布偶裝，說話時還要用「佩洛～」結尾才行。"
1302-13 = "那種奇怪的布偶裝，我才不要咧！？"
1302-14 = "再說為什麼要找我啊？只要做那些的話，要其他保安委員去做不就好了？"
1302-15 = "辦不到，沒有適合這件布偶裝的保安委員。"
1302-16 = "這是只有像你一樣嬌小又敏捷的小不點才能執行的作戰。"
1302-17 = "誰是小不點啊！！那是拜託別人的態度嗎！？"
1302-18 = "……說到底，「讓虛擬角色以學生的身分轉入學校」這種事為什麼要答應啊？"
1302-19 = "就算是會長的命令，委員長也應該說做不到就是做不到啊！"
1302-20 = "是，是這麼說沒錯啦……"
1302-22 = "不對，和香同志。你現在是要主張「潔莉諾會長錯了」嗎？"
1302-23 = "竟然在保安委員長面前說出那種不恭敬的話……被肅清也是理所當然的哦！"
1302-25 = "哼，才不管呢。反正我已經被停學了，那種威脅是行不通的！"
1302-26 = "總．而．言．之！穿奇怪的布偶裝或是用奇妙的口頭禪之類的絕對不要！#n即使是能夠取消停學我也嚴正拒絕！"
1302-27 = "唔……"
1302-28 = "我本來不想用這招的……沒辦法了。"
1302-30 = "保安委員，把那個東西拿過來！"
1302-46 = "那，那個是……「L'Oiseau Bleu」的最高級布丁？"
1302-47 = "記得一個要價1000圓……你打算用那個最高級布丁收買我嗎？"
1302-48 = "當，當然，我我我一點也不心動哦？以，以為這種程度就能動動動搖我的決心的話，真，真是太天真了……？"
1302-50 = "哼哼……天真的是你。"
1302-51 = "這並不是用來收買你的東西……而是用來消磨你意志的、極其慘忍的拷問道具！"
1302-53 = "用，用布丁來拷問……！？#n那是什麼意思……"
1302-54 = "啊姆。"
1302-56 = "吃，吃下去了！？而且吃那麼大一口！？"
1302-57 = "怎，怎麼這樣……換做是我的話會小口小口……#n不，會一點一點用舔的品嚐才對……居然吃那麼大口！？"
1302-58 = "竟，竟然做出那種事……但是，不能這麼輕易就屈服……"
1302-59 = "嗯，還不錯吃嘛。"
1302-63 = "什麼，明明還有剩卻丟掉了！？"
1302-64 = "你，你知道自己在做什麼嗎！？為什麼要這麼浪費……！"
1302-65 = "哼哼……在把你叫來這裡之前，就已經大致進行過對你的調查了。"
1302-66 = "對在舊校舍過著節儉生活的你來說，甜味是非常珍貴的吧。#n在你面前吃得這麼隨意，對你的衝擊力想必也會特別大。"
1302-67 = "如果不想再繼續受苦的話，就乖乖地協助我吧！"
1302-68 = "多，多麼殘忍的行為……果然是潔莉諾會長的看門狗，沒血沒淚的瑪麗娜委員長。"
1302-69 = "但是我也是有尊嚴的……不會因為這種程度的拷問就屈服！#n不管發生什麼，我都不會扮成佩洛洛的！"
1302-70 = "不愧是能在那個227號特別班長期生活下去的人。但是這份決心能持續到什麼時候呢……？"
1302-72 = "來吧保安委員們，把點心一個個拿過來！"
1302-74 = "（之後，瑪麗娜持續著名為拷問的暴飲暴食……）"
1302-77 = "哦。這就是和香同志寶貝的天體望遠鏡啊……#n果然和傳聞一樣又大又氣派……上頭裝著的鏡片也很不得了。"
1302-78 = "呵呵。如果我直接用手摸這個望遠鏡的鏡片……你會做出什麼反應呢？"
1302-79 = "你，你想做什麼！？那樣做的話，指紋會……！！"
1302-82 = "接下來是搔癢之刑！就用這根從事務局帶來的柔軟羽毛來搔癢你的脖子和肚子吧。"
1302-84 = "（搔癢搔癢搔癢……）"
1302-85 = "嗚哈！？噫，噫噫，快，快住手，噫哈！？"
1302-86 = "我，我知道了！噫，我，我會照你說的去做所以快停下來，啊哈哈哈哈哈！？"
1302-87 = "那就像佩洛洛一樣叫一聲來聽聽吧！快，叫「佩洛～」！"
1302-90 = "接下來，對了……要不要吃這個「放了薄荷巧克力的鳳梨天婦羅」？"
1302-92 = "不，不如殺了我吧……"
1302-95 = "嗚，嗚嗚……"
1302-96 = "呼。暫時先這樣吧。"
1302-97 = "來，我再問你一次，你是誰？"
1302-98 = "我是和……不，我，我是佩洛洛。"
1302-99 = "不是兔子也不是熊，就是佩洛洛，佩洛佩洛……"
1302-101 = "太棒了，簡直是佩洛洛本人！"
1302-102 = "這樣就可以順利騙……不，是向潔莉諾會長報告了。"
1302-103 = "把這個「假佩洛洛」編入事務局，領到「特別黃金鬍子勳章」，進而爬到事務局更高的職位……呵呵呵！"
1302-105 = "走吧，和香同……不，佩洛洛同志。現在馬上去謁見潔莉諾會長吧。"
1302-106 = "賭上赤冬聯邦學園威信的重要任務開始了！以肩負學園未來趨勢的心態好好加油吧！"
1302-107 = "佩，佩洛～……"

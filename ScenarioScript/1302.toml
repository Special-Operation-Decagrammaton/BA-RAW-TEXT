[translation]
1302-1 = "The President Is Always Right Part 2"
1302-5 = "Therefore, you shall become Peroro."
1302-7 = "What do you mean, \"therefore\"?! That seems like a gigantic leap!"
1302-9 = "Here I was, celebrating that I was finally leaving the Former Institute,#nthrilled my suspension was at last over..."
1302-10 = "...and then I find out the only way I can leave is if I become Peroro?#nWhat's going on?!"
1302-11 = "You ARE finally leaving. If you accept, you'll live comfortably in the main institute. You can even have pudding."
1302-12 = "All you have to do is wear this Peroro costume and say \"Pero\" at the end of your sentences."
1302-13 = "How desperate do you think I am?!"
1302-14 = "Ask some of your Security Council cronies! I don't wanna wear that stupid costume!"
1302-15 = "I already tried. It's too small for any of them."
1302-16 = "The very success of this operation hinges on a tiny kid like you. Doesn't that make you feel good?"
1302-17 = "No! I don't feel good about it, and I don't feel good about being called a tiny kid!"
1302-18 = "And anyway, this whole thing doesn't make any sense! Peroro isn't real!"
1302-19 = "I don't care if it's the president's order. Just tell her it's impossible!"
1302-20 = "I mean, you're not wrong..."
1302-22 = "Wait a moment. Comrade Nodoka. Are you implying President Cherino is wrong?"
1302-23 = "How dare you blatantly break the rules in front of the security chair!#nI'll have you purged!"
1302-25 = "Hmph. I'm already suspended, so your petty threats won't work!"
1302-26 = "I don't care if I get to come back to the main institute. I'm not gonna wear your stupid costume or do your stupid lines!"
1302-27 = "*sigh*"
1302-28 = "I truly didn't want to resort to this, but it seems you leave me no choice."
1302-30 = "Security Council, bring you-know-what!"
1302-46 = "This is...premium pudding from L'Oiseau Bleu!"
1302-47 = "Are you trying to bribe me with this 1,000-yen premium pudding?"
1302-48 = "I-It's not that I'm not tempted...but don't think I'll be bribed so easily.#nYou're wrong...I think!"
1302-50 = "What are you going on about?"
1302-51 = "Suspended students don't deserve bribes. I'm going to torture you and break your spirit!"
1302-53 = "You're gonna torture me with the pudding? H-How?!"
1302-54 = "*nom*"
1302-56 = "Y-YOU'RE eating it?!"
1302-57 = "How cruel. I understand now. You know I've been living here in poverty and can no longer remember the sweet taste of pudding..."
1302-58 = "...but this kind of suffering is nothing compared to what I've already been through."
1302-59 = "Hmph. Very well, then."
1302-63 = "Y-You're throwing it away?!"
1302-64 = "H-How dare you?! You only took one bite! And then you waste it, like, like...#na waster!"
1302-65 = "Do you think I didn't do my homework before coming here?"
1302-66 = "You've lived in the Former Institute for a while, which means you've become thrifty. There's now nothing more horrendous and painful to you than food being wasted."
1302-67 = "Now, if you don't want to endure true suffering, I recommend you cooperate."
1302-68 = "You truly are President Cherino's dog. Merciless and cruel, Chairman Marina."
1302-69 = "But I've strengthened my will while living in the Former Institute!#nYou'll never break me OR convince me to wear your stupid costume."
1302-70 = "I can't help but admire your spirit as a fellow Red Winter student.#nI accept your challenge, then."
1302-72 = "Security Council. Bring the next item!"
1302-74 = "(Marina's torture continued...)"
1302-77 = "I see. So, this is your cherished telescope... Indeed, it's equipped with an expensive, high-quality lens."
1302-78 = "I haven't washed my hands all day. Maybe I'll just run my sticky fingers all over the lens. Is that okay with you?"
1302-79 = "G-Get away from my telescope, you monster!"
1302-82 = "Next! This is a soft feather I had specially airlifted from the Secretariat.#nHow long will you last against my tickle attack?"
1302-84 = "*tickle tickle tickle*"
1302-85 = "Arrrgh! H-Haha...hahahaha!"
1302-86 = "O-Okay, fine! H-Haha! I-I'll...I'll do whatever you want! Hahaha!#nJust stop t-tickling me!"
1302-87 = "I don't think so! You don't sound like Peroro to me!"
1302-90 = "Do you want to try this deep-fried pineapple with a mint-choco drizzle?"
1302-92 = "Please end my suffering..."
1302-95 = "*sigh*"
1302-96 = "I believe that should be enough."
1302-97 = "Let me ask you again. What is your name?"
1302-98 = "Nodo... I mean, P-Peroro."
1302-99 = "Not a bear. Not a rabbit. Peroro. Pero...pero..."
1302-101 = "Excellent, that's the spirit!"
1302-102 = "I should be able to trick—I mean...report to President Cherino now!"
1302-103 = "I'll transfer this fake Peroro, receive the special Golden Mustache Medal,#nand be one step closer to being the next president!"
1302-105 = "Now, Nodoka...or should I say, Comrade Peroro? Let's go."
1302-106 = "This is a very important mission for Red Winter Academy. Not a single mistake will be tolerated!"
1302-107 = "P-Pero..."

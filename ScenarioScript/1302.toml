[translation]
1302-1 = "ท่านประธานถูกเสมอ 2"
1302-5 = "...ก็ตามนั้นแหละ เธอคงต้องมาเป็นเพโรโร่ให้หน่อยละนะ"
1302-7 = "'ก็ตามนั้นแหละ' มันหมายความว่ายังไงคะ?! ไม่ว่าจะคิดยังไงก็ฟังดูแปลกๆ นะคะ!"
1302-9 = "อุตส่าห์ดีใจที่ได้ออกจากอาคารเรียนเก่า นึกว่าช่วงเวลาพักการเรียนสิ้นสุดแล้วซะอีก..."
1302-10 = "อยู่ๆ ก็มาชวนให้ฉันไปเป็นเพโรโร่ ข้อเสนอไร้สาระแบบนี้มันคืออะไรกันคะ?"
1302-11 = "จะพูดตรงๆ เลยแล้วกันนะ ถ้าช่วยทำตามที่ขอละก็ ต่อไปเธอก็จะสามารถอยู่ในอาคารเรียนหลักได้#nสบายๆ ฉันสัญญาว่าจะให้พุดดิ้งสองชิ้นเลยด้วย"
1302-12 = "... แต่ว่าจะต้องใส่มาสคอตตุ๊กตาเพโรโร่ แล้วก็ต้องพูดว่า 'เพโร่~' ลงท้ายตลอดเวลาน่ะนะ"
1302-13 = "ฉันไม่ยอมทำเรื่องงี่เง่าแบบนั้นหรอกนะคะ!"
1302-14 = "ว่าแต่ทำไมฉันต้องใส่มาสคอตตุ๊กตานี่ด้วยล่ะคะ? ถ้าแค่จะปลอมตัวเป็นเพโรโร่ ก็สั่งให้สมาชิกคณะความมั่นคงคนอื่นทำก็ได้ไม่ใช่เหรอคะ?"
1302-15 = "ทำแบบนั้นไม่ได้หรอก มาสคอตตุ๊กตาตัวนี้มันเล็กเกินไป สมาชิกคณะความมั่นคงใส่ไม่ได้น่ะ "
1302-16 = "นี่เป็นกลยุทธ์ที่มีแค่เด็กน้อยตัวเล็กและคล่องแคล่วแบบเธอเท่านั้นที่จะทำได้\n"
1302-17 = "มาเรียกคนอื่นว่าเด็กน้อยแบบนี้ นี่คือท่าทีของคนที่กำลังขอร้องคนอื่นงั้นเหรอคะ?!"
1302-18 = "การที่จะทำให้ตัวละครสมมุติย้ายเข้ามาเรียนที่โรงเรียนมันก็เป็นเรื่องที่เป็นไปไม่ได้ตั้งแต่แรกอยู่แล้วนี่คะ"
1302-19 = "ถึงจะเป็นคำสั่งของท่านประธานแต่ถ้ามันเป็นเรื่องที่เป็นไปไม่ได้ ท่านหัวหน้าคณะฯ ก็ควรจะบอกไปตามตรงเลยสิคะ!"
1302-20 = "ระ...เรื่องนั้นมันก็จริงอยู่หรอก..."
1302-22 = "ไม่สิ สหายโนโดกะ นี่เธอจะบอกว่าประธานเชริโน่พูดผิดอย่างนั้นเหรอ?"
1302-23 = "กล้าพูดแบบนั้นต่อหน้าหัวหน้าคณะความมั่นคงอย่างนั้นเหรอ อยากโดนลงโทษรึไง!"
1302-25 = "เหอะ! เพราะว่าอยู่ระหว่างถูกพักการเรียนก็เลยไม่สนคำขู่อย่างงั้นเหรอ!"
1302-26 = "จะยังไงก็ช่าง! ถึงจะบอกว่าถ้ายอมใส่ชุดมาสคอตบ้าบอนั่น แล้วก็ยอมพูดจาเบียวๆ แบบนั้นแล้วจะให้#nกลับไปที่อาคารเรียนหลักก็เถอะ ฉันขอปฏิเสธค่ะ!"
1302-27 = "อื้มม..."
1302-28 = "ถึงจะไม่อยากใช้วิธีนี้... แต่ก็ช่วยไม่ได้สินะ"
1302-30 = "สมาชิกคณะความมั่นคง เอาสิ่งนั้นเข้ามา!"
1302-46 = "เอ๊ะ? นี่มัน... พุดดิ้งชั้นเลิศจากร้าน <ลูวาโซ บลู>นี่นา"
1302-47 = "นี่คิดจะจะติดสินบนฉันด้วยพุดดิ้งชั้นเลิศราคาชิ้นละ 1,000 เยน อย่างนั้นเหรอคะ?"
1302-48 = "นะ...แน่นอนว่า.. ก็ยั่วยวนใจไม่น้อยเลย ตะ...แต่ว่าถ้าคิดว่าของแค่นี้จะทำให้ฉันเปลี่ยนความคิดละก็ คิดผิดแล้วค่ะ..."
1302-50 = "พูดอะไรของเธอน่ะ"
1302-51 = "สิ่งนี้ไม่ใช่ข้อเสนอเพื่อให้ยอมตกลงแต่เป็นการทรมานที่จะทำให้เธอเปลี่ยนความตั้งใจต่างหากล่ะ!"
1302-53 = "จะทรมานด้วยพุดดิ้งน่ะเหรอคะ? หมายความว่ายังไงคะ..."
1302-54 = "ง่ำ"
1302-56 = "กะ... กินไปแล้ว?!"
1302-57 = "แบบนี้นี่เอง คิดจะทรมานกันด้วยการกินอาหารแสนอร่อยต่อหน้าฉันที่ไม่ได้กินขนมหวานมาเป็นเวลา#nนานสินะคะ"
1302-58 = "แต่ว่าความทรมานแค่นี้น่ะ ไม่เท่าไหร่หรอก..."
1302-59 = "ก็พอใช้ได้ละนะ..."
1302-63 = "ทะ...ทิ้งไปแล้ว??!!!"
1302-64 = "ทะ...ทำอะไรลงไปคะ? กินพุดดิ้งราคาแพงแค่คำเดียวแล้วโยนทิ้งไปแบบนั้น!"
1302-65 = "ฮุฮุ ฉันสืบเรื่องของเธอมาอย่างละเอียดก่อนจะมาที่นี่แล้วละ"
1302-66 = "คนที่ใช้ชีวิตอย่างขัดสนอยู่ในอาคารเรียนเก่าแบบเธอ การที่เห็นคนกินอาหารทิ้งๆ ขว้างๆ นั้นทรมานกว่าการไม่ได้กินอาหารเป็นไหนๆ สินะ"
1302-67 = "เอาละ ถ้าไม่อยากจะทนทรมานต่อไปก็ยอมให้ความร่วมมือซะดีๆ!"
1302-68 = "ทำไมถึงได้จิตใจหยาบกร้านแบบนี้นะ... สมแล้วที่เป็นสุนัขรับใช้ของประธานเชริโน่"
1302-69 = "แต่ฉันไม่ยอมจำนนให้กับความทรมานแค่นี้หรอกนะคะ! ไม่ว่ายังไงก็ไม่มีทางยอมใส่ชุดมาสคอต#nน่าตลกแบบนั้นเด็ดขาดเลยค่ะ!"
1302-70 = "จิตใจกล้าแกร่งสมเป็นนักเรียนของเรดวินเทอร์จริงๆ แต่รอดูไปเถอะว่าจะรักษาความแน่วแน่นั่น#nไว้ได้นานแค่ไหน"
1302-72 = "เอาละ เหล่าสมาชิกคณะความมั่นคง เอาของชิ้นต่อไปมาเลย!"
1302-74 = "(แล้วการทรมานของมารินะก็ดำเนินต่อไป...)"
1302-77 = "ฮืมม นี่คือกล้องโทรทรรศน์ที่สหายโนโดกะหวงแหนใช่หรือเปล่านะ... ด้านหน้ามีเลนส์อันใหญ่และสุดยอดอย่างที่เขาลือกันจริงๆ ด้วย"
1302-78 = "ถ้าใช้มือเปล่าจับกล้องโทรทรรศน์นี้แล้วฝากรอยนิ้วมือเอาไว้ละก็... สหายโนโดกะจะว่ายังไงกันนะ?"
1302-79 = "คะ... คิดจะทำอะไรงั้นเหรอคะ? จะไม่หยุดใช่มั้ยคะ?!"
1302-82 = "ต่อไปคือการจั๊กจี้! ใช้ขนนกนุ่มๆ ที่สำนักเลขาธิการส่งมาให้เป็นพิเศษจั๊กจี้ที่ต้นคอได้เลย!"
1302-84 = "(จั๊กจี้ จั๊กจี้ จั๊กจี้....)"
1302-85 = "ว้ายย? ฮะฮ่า วะฮะฮะฮ่า!"
1302-86 = "ขะ... เข้าใจแล้ว! ฮ่ะฮ่า... ยะ... ยอมทำตามที่สั่งแล้ว... หยุดจั๊กจี้ทีเถอะค่ะ! ฮะฮะฮ่า!"
1302-87 = "ไม่ง่ายอย่างนั้นหรอกนะ! เพโรโร่ไม่ได้ร้องแบบนั้นสักหน่อย!"
1302-90 = "โอ๊ะ นี่มันเทมปุระสับปะรดราดด้วยช็อกโกแลตมินต์นี่นา ลองชิมดูหน่อยดีมั้ย?"
1302-92 = "ฆะ... ฆ่าฉันให้ตายไปเลยเถอะค่ะ..."
1302-95 = "ฮือออออ ฮืออออ..."
1302-96 = "เฮ้อ... เท่านี้ก็น่าจะพอแล้ว"
1302-97 = "เอาละ จะขอถามอีกทีนะ สหายคือใคร?"
1302-98 = "โนโด... ไม่ใช่สิ เพ... เพโรโร่ค่ะ"
1302-99 = "ฉันไม่ใช่ทั้งหมี หรือว่ากระต่าย แต่คือเพโรโร่ค่ะ เพโรเพโร่..."
1302-101 = "ยอดเยี่ยมมาก ต้องอย่างนี้สิ!"
1302-102 = "เท่านี้ก็น่าจะพอหลอกท่านเชริโน่... ไม่สิ หมายถึง น่าจะรายงานท่านเชริโน่ได้แล้วละ!"
1302-103 = "พาเพโรโร่ตัวปลอมไปเข้าร่วมสำนักเลขาธิการแล้วก็รับ <เหรียญหนวดทองคำพิเศษ> แล้วเลื่อนตำแหน่งขึ้นไปให้สูงกว่านี้ดีกว่า!"
1302-105 = "เอาละ โนโด... ไม่สิ สหายเพโรโร่ ไปพบประธานเชริโน่กันเถอะ"
1302-106 = "ขอให้ระวังไม่ให้เกิดข้อผิดพลาดเด็ดขาด เพราะนี่คือการปฏิบัติหน้าที่อันยิ่งใหญ่เพื่อสหภาพเรดวินเทอร์!"
1302-107 = "เพ... เพโร่..."

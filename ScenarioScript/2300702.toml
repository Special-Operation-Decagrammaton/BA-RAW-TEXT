[translation]
2300702-1 = "不尋常的少女"
2300702-2 = "（依照和花子約好的，抵達了三一校園）"
2300702-3 = "（三一的校園一如以往充滿高雅的古典風情……）"
2300702-4 = "老師～"
2300702-5 = "在這裡，老師～"
2300702-6 = "[s]「……？」"
2300702-8 = "[s] 回頭看向聲音傳來的方向"
2300702-11 = "― 您好，老師。[wa:2240] "
2300702-13 = "― 您願意過來，真是感激不盡。[wa:1420] "
2300702-16 = "[ns]「你在這裡做什麼？」"
2300702-17 = "― 這裡很涼快，非常舒服。[wa:4080] "
2300702-20 = "― 對我而言就像是貴賓席一樣，呵呵……[wa:3460] "
2300702-23 = "― 機會難得，老師覺得如何呢？[wa:3510] "
2300702-26 = "― 要在這裡，一起脫掉嗎……？[wa:2430] "
2300702-29 = "[ns1] 「接受邀請好像有些不妥……」\n[ns2] 「我就不用了……」"
2300702-30 = "― 像這樣在大白天就展露肌膚，[wa:3300] "
2300702-31 = "― 像這樣在大白天就展露肌膚，[wa:3300] "
2300702-33 = "― 不覺得很開心嗎？[wa:940] "
2300702-36 = "― 感覺就像是……做了不該做的事。[wa:3220] "
2300702-39 = "（花子穿上鞋子，跳下噴泉朝這裡走來）"
2300702-42 = "呵呵……"
2300702-43 = "老師不喜歡脫掉嗎？"
2300702-44 = "我很喜歡。偶爾也會脫掉衣服在校園裡漫步，每次都會出現難以形容的心情……"
2300702-45 = "在日常生活的空間裡，做一些日常生活不會做的事情，彷彿就像是侵犯了某種禁忌一般……"
2300702-46 = "我在書上看過，聽說這樣對健康也有好處。 "
2300702-47 = "老師要不要也試試看呢？人啊，其實都不是很了解自己的慾望呢。#n說不定試過之後會意外迷上這種感覺唷……？"
2300702-48 = "[s3] 「……這是在談襪子和鞋子對吧？」\n[s4] 「意思是要赤腳生活的意思吧？」"
2300702-49 = "呵呵……"
2300702-50 = "呵呵……"
2300702-51 = "這麼做也能達到指壓的效果，不但有益身體健康，聽說也能顧到心靈的健康。"
2300702-52 = "不如在三一流行起來好了，一定會很好玩。"
2300702-53 = "大家全都脫掉，帶著清爽的心情來上學……"
2300702-54 = "呵呵，不覺得光想像就很壯觀嗎？"
2300702-55 = "[s] 「你是在說赤腳上學對吧……？」"
2300702-56 = "不。我是說裸體上學。裸．體．上．學♡ "
2300702-57 = "大家都一絲不掛，讓■■能夠■■也■■，用■■來■■■■有沒有■■，一起■■■■■■■■■■。"
2300702-58 = "[s]「…………」"
2300702-59 = "……"
2300702-60 = "我開玩笑的啦，老師。即使有個萬一，這種事也不可能在三一流行起來嘛。"
2300702-61 = "不過，若真能成真，那一定會很好玩……"
2300702-62 = "[s5] 把話題拉回來\n[s6] 言歸正傳"
2300702-63 = "……啊，是。都差點忘了。"
2300702-64 = "……啊，是。都差點忘了。"
2300702-65 = "我是因為有補課的問題要請教老師才聯絡您……#n不小心和老師聊著聊著就太開心了……"
2300702-66 = "那麼我們走吧。我有找到適合「學習」的好地方了。"
2300702-67 = "是個很適合各種實際演練的好地方……"
2300702-68 = "我們走吧。 "
2300702-75 = "……怎麼了老師？為什麼愣在原地？"
2300702-76 = "[s7] 以防萬一……\n[s8] 詢問那個「地方」在哪裡"
2300702-77 = "既然是要課後補習，那當然……"
2300702-78 = "既然是要課後補習，那當然……"
2300702-79 = "就是不會有人打擾，安靜偏僻的「體育倉庫」了吧。請放心，我連鑰匙都借好了……"
2300702-80 = "[s9] 「我反對！」\n[s10] 「堅決拒絕！！」"
2300702-81 = "哎呀……"
2300702-82 = "哎呀……"
2300702-83 = "莫非……您打算在這裡？"
2300702-84 = "但這裡人來人往的……要在大白天的學園廣場做指導實在太大膽了……"
2300702-85 = "不過人生畢竟只有一次，這麼震撼的體驗似乎也挺好的……？"
2300702-86 = "[s] 「學習！你指的是學習對吧！？」"
2300702-87 = "是。是在說學習的事啊。請老師這樣的大人帶我慢慢「學習」……"
2300702-88 = "呵呵呵……抱歉玩笑有點開過頭了。因為老師的反應實在太有趣了。"
2300702-89 = "……那麼。"
2300702-90 = "我們來去本館的圖書館吧，那裡是個人很多的地方，老師可以不用擔心。"
2300702-91 = "我們走吧。"
2300702-93 = "（之後一面保持警戒一面跟花子走，結果也真的抵達了圖書館）"
2300702-94 = "（……加上問的問題也只有一兩個，導致待在圖書館的時間遠短於前往那裡的時間）"

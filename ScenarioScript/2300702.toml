[translation]
2300702-1 = "เด็กสาวที่ดูลึกลับ"
2300702-2 = "(คุณครูมาตามคำบอกทางของฮานาโกะ จนมาถึงจุดนัดพบที่สถาบันทรีนิตี้)"
2300702-3 = "(ไม่ว่าจะเห็นกี่ครั้ง ก็รู้สึกได้ว่าทรีนิตี้ก็เป็นสถาบันที่มีระดับและทันสมัยเสมอ)"
2300702-4 = "คุณครูขา~"
2300702-5 = "ทางนี้ค่ะคุณครู~"
2300702-6 = "[s] \"...?\""
2300702-8 = "[s] หันไปมองที่ต้นเสียง"
2300702-11 = "― สวัสดีค่ะ คุณครู[wa:1840] "
2300702-13 = "― ขอบคุณที่มานะคะ[wa:1340] "
2300702-16 = "[ns] \"นั่งทำอะไรอยู่ที่นี่เหรอ?\""
2300702-17 = "― ที่นี่อากาศ เย็นสบาย ฉันก็เลยชอบมากเลยค่ะ[wa:2880] "
2300702-20 = "― ที่นี่เป็นที่พิเศษของฉันคนเดียวค่ะ... ฮิฮิ…[wa:2420] "
2300702-23 = "― ที่นี่ยอดเยี่ยมมาก คุณครูคิดว่าเป็นยังไงคะ?[wa:2310] "
2300702-26 = "― มาลอง... ถอดด้วยกันมั้ยคะ?[wa:1910] "
2300702-29 = "[ns1] \"ไม่ล่ะ ไม่เป็นไร\"\n[ns2] \"ขอปฏิเสธ\""
2300702-30 = "― ฮิฮิฮิ ถ้าให้ถอดของพวกนี้ออกตอนกลางวันแสกๆ แบบนี้ละก็...[wa:1580] "
2300702-31 = "― ฮิฮิฮิ ถ้าให้ถอดของพวกนี้ออกตอนกลางวันแสกๆ แบบนี้ละก็...[wa:1580] "
2300702-33 = "― มันก็ดูน่าตื่นเต้นดีไม่ใช่เหรอคะ?[wa:10] "
2300702-36 = "― รู้สึกเหมือนกำลัง... ทำเรื่องต้องห้ามอยู่เลย[wa:2060] "
2300702-39 = "(ฮานาโกะสวมรองเท้าและเดินออกมาจากน้ำพุ)"
2300702-42 = "ฮิฮิ..."
2300702-43 = "คุณครูไม่ชอบเหรอคะ? การที่ได้ถอดแบบนี้น่ะค่ะ?"
2300702-44 = "ฉันชอบนะคะ บางครั้งฉันก็ถอดออกหมดและไปเดินเล่นที่สนามของโรงเรียน ตอนนั้นจะสัมผัสได้#nถึงความรู้สึกที่ต่างออกไป..."
2300702-45 = "ฉันอยากรู้ว่าถ้าทำสิ่งนี้ในที่สาธารณะทุกวันจะได้รึเปล่า แต่ก็รู้สึกเหมือนจะทำอะไรที่ผิดข้อห้าม..."
2300702-46 = "แต่ว่าฉันอ่านเจอจากในหนังสือมาว่าทำแบบนั้นดีต่อร่างกายนะคะ"
2300702-47 = "คุณครูจะลองดูมั้ยล่ะคะ? คุณครูอาจชอบก็ได้นะคะ คนเราถ้าไม่ลองทำก็ไม่รู้หรอก..."
2300702-48 = "[s3] \"นี่พูดถึง...ถุงเท้าใช่มั้ย\"\n[s4] \"คือให้ลองเดินเท้าเปล่าใช่มั้ย?\""
2300702-49 = "ค่ะ... ใช่แล้วค่ะ พูดถึงเรื่องนั้นอยู่"
2300702-50 = "ค่ะ... ใช่แล้วค่ะ พูดถึงเรื่องนั้นอยู่"
2300702-51 = "มันเป็นการกดจุดด้วย น่าจะดีต่อสุขภาพนะคะ?"
2300702-52 = "ถ้าการทำแบบนี้เป็นที่นิยมในทรีนิตี้ก็น่าจะสนุกดีนะคะ"
2300702-53 = "พอเป็นที่นิยมแล้วทุกคนจะถอดกันหมด แบบนั้นการมาโรงเรียนก็จะ..."
2300702-54 = "ฮิฮิฮิ แค่คิดก็สุดยอดแล้วว่ามั้ยคะ?"
2300702-55 = "[s] \"หมายถึงถอดถุงเท้าไปเรียนเนอะ...?\""
2300702-56 = "ไม่ใช่ค่ะ ฉันหมายถึงการใส่ชุดวันเกิดไปเรียนค่ะ ไป - เรียน - แบบ - เปลือย - ทั้ง - ตัว"
2300702-57 = "ถอดเสื้อออกให้เหลือ ■■แบบ ■■ แล้วก็ไป ■■■■■■ค่ะ"
2300702-58 = "[s] \"...\""
2300702-59 = "..."
2300702-60 = "ฉันล้อเล่นค่ะคุณครู แต่ยังไงมันก็ไม่มีทางเป็นที่นิยมในทรีนิตี้ได้หรอกค่ะ"
2300702-61 = "แต่ถ้าเป็นที่นิยมในทรีนิตี้ก็น่าจะสนุกดี..."
2300702-62 = "[s5] ปล่อยไว้แบบนี้คงไหลตามน้ำไปแน่\n[s6] พูดเข้าเรื่องเลยดีกว่า"
2300702-63 = "อ่า... ค่ะ นั่นสิคะ"
2300702-64 = "อ่า... ค่ะ นั่นสิคะ"
2300702-65 = "ฉันติดต่อคุณครูไปเพราะจะถามถึงเรื่องคลาสเรียนเสริม... และพอได้อยู่กับคุณครูแล้วฉันก็รู้สึก#nสนุกมาก..."
2300702-66 = "งั้นไปทางนั้นกันดีมั้ยคะ? ฉันหาที่ที่เหมาะกับการเรียนไว้แล้วค่ะ"
2300702-67 = "พอไปถึงแล้ว คุณครูค่อยๆ สอนอะไรหลายๆ อย่างให้ฉันก็ได้..."
2300702-68 = "เอาละ รีบไปกันเถอะค่ะ"
2300702-75 = "หืม? คุณครู? ไม่ไปเหรอคะ?"
2300702-76 = "[s7] \"ครูแค่ถามเผื่อไว้นะ...\"\n[s8] \"ถามได้มั้ยว่าสถานที่นั้นอยู่ที่ไหน\""
2300702-77 = "หืม? แน่นอนว่าถ้าเป็นคาบเรียนเสริมหลังเลิกเรียนละก็..."
2300702-78 = "หืม? แน่นอนว่าถ้าเป็นคาบเรียนเสริมหลังเลิกเรียนละก็..."
2300702-79 = "ต้องเป็นโรงยิมที่ไม่มีใครเข้ามาไงล่ะคะ ดูนี่สิคะ ฉันยืมกุญแจมาแล้วด้วย..."
2300702-80 = "[s9] \"ขอยกเลิกนะ!!\"\n[s10] \"ขอปฏิเสธ!!\""
2300702-81 = "โอ๊ะ..."
2300702-82 = "โอ๊ะ..."
2300702-83 = "ถ้างั้น...จะทำที่นี่เลยเหรอคะ?"
2300702-84 = "ที่จัตุรัสกลางโรงเรียนตอนกลางวันแสกๆ... อืม ฉันอาจจะลำบากนิดหน่อย..."
2300702-85 = "แต่อย่างน้อยฉันก็อยากจะมีประสบการณ์แบบนี้ครั้งแรกดูค่ะ..."
2300702-86 = "[s] \"เรียน! นี่พูดเรื่องเรียน!!\""
2300702-87 = "ค่ะ เรื่องเรียนค่ะ การติวพิเศษส่วนตัวจากผู้ใหญ่..."
2300702-88 = "ฮิฮิฮิ... ล้อเล่นหนักไปหน่อย ขอโทษค่ะ"
2300702-89 = "เอาล่ะค่ะ..."
2300702-90 = "จริงๆ แล้วต้องไปทางนี้ค่ะ ที่นี่เป็นห้องสมุดกลางในอาคารส่วนกลาง เลยมีคนเยอะมาก#nไม่ต้องกังวลว่ามีเรื่องแปลกๆ เลยค่ะ"
2300702-91 = "เอาล่ะ ไปกันเถอะค่ะ"
2300702-93 = "(จากนั้นคุณครูก็ตามฮานาโกะไปอย่างระวังตัว แต่คาบเรียนเสริมในห้องสมุดก็ผ่านไปอย่างปกติ)"
2300702-94 = "(...แถมเธอยังถามคำถามแค่หนึ่งหรือสองคำถามเท่านั้น)"

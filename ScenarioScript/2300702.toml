[translation]
2300702-1 = "An Unusual Girl"
2300702-2 = "I followed Hanako's instructions and arrived at the Trinity campus, where we agreed to meet."
2300702-3 = "Trinity's campus looked as historic and elegant as ever."
2300702-4 = "Sensei!"
2300702-5 = "Over here, Sensei!"
2300702-6 = "[s] \"...?\""
2300702-8 = "[s] (Look in the direction of the voice.)"
2300702-11 = "― Welcome, Sensei.[wa:1840] "
2300702-13 = "― Thanks for coming.[wa:1220] "
2300702-16 = "[ns] \"What are you doing here?\""
2300702-17 = "― It's nice and cool here. I love it.[wa:3120] "
2300702-20 = "― This is my super special place... Heehee...[wa:2420] "
2300702-23 = "― What do you think, Sensei?[wa:2990] "
2300702-26 = "― Shall we undress here?[wa:2070] "
2300702-29 = "[ns1] \"No, that's okay.\"\n[ns2] \"Thanks, but I'll pass.\""
2300702-30 = "― Heeheehee... When you get undressed in broad daylight like this...[wa:1180] "
2300702-31 = "― Heeheehee... When you get undressed in broad daylight like this...[wa:1180] "
2300702-33 = "― ...doesn't it make you a little excited?[wa:10] "
2300702-36 = "― It feels like you're doing something you shouldn't be.[wa:1660] "
2300702-39 = "Hanako puts on her shoes and comes down from the fountain."
2300702-42 = "Heehee..."
2300702-43 = "Don't you enjoy it, Sensei? Taking them off, I mean."
2300702-44 = "I love it. Sometimes I peel everything off and walk around campus, and whenever I do, I get this strange sensation..."
2300702-45 = "Like, is it okay for me to be like this in a public space? I feel like I'm committing some kind of taboo..."
2300702-46 = "I read in a book that it's good for you."
2300702-47 = "Do you want to try it, Sensei? Who knows, you might like it. You'll never know until you try."
2300702-48 = "[s3] \"You're talking about...socks, right?\"\n[s4] \"You're asking me to walk around barefoot, right?\""
2300702-49 = "...Right. Yes, that's what I'm saying."
2300702-50 = "...Right. Yes, that's what I'm saying."
2300702-51 = "I think they call it acupressure. It's supposed to be good for your health."
2300702-52 = "It would be neat if it caught on at Trinity."
2300702-53 = "Can you imagine all the students walking around with nothing on?"
2300702-54 = "Heeheehee! Wouldn't that be something?"
2300702-55 = "[s] \"This is about going to school barefoot, right?\""
2300702-56 = "No! I'm talking about going to school naked! N! A! K! E! D!"
2300702-57 = "Taking off all your clothes and ■■ while ■■ and ■■■■■■."
2300702-58 = "[s] \"...\""
2300702-59 = "..."
2300702-60 = "Oh, come on. I'm just kidding, Sensei. There's no way something like that would catch on at Trinity."
2300702-61 = "But I'm sure it would be a lot of fun..."
2300702-62 = "[s5] \"(I might end up agreeing with Hanako if this keeps up.)\"\n[s6] \"I'd better get straight to the point.\""
2300702-63 = "...Oh, yes. That's right."
2300702-64 = "...Oh, yes. That's right."
2300702-65 = "I contacted you because I had a question about remedial classes...and I was just having so much fun with you..."
2300702-66 = "So, shall we head that way? I know a place that's perfect for studying."
2300702-67 = "You can teach me all kinds of things there..."
2300702-68 = "Come on, let's go!"
2300702-75 = "Huh? Sensei? Aren't you coming?"
2300702-76 = "[s7] \"I feel like I need to ask you where you're headed first.\"\n[s8] \"Just to be safe... Where are we going?\""
2300702-77 = "Huh? Well, obviously, if it's for an after-school remedial class..."
2300702-78 = "Huh? Well, obviously, if it's for an after-school remedial class..."
2300702-79 = "We should go to the dark gym storage that no one ever goes to! Look, I even borrowed the keys..."
2300702-80 = "[s9] \"Absolutely not!\"\n[s10] \"I refuse!\""
2300702-81 = "Oh, my..."
2300702-82 = "Oh, my..."
2300702-83 = "Then...do you want to do it here?"
2300702-84 = "In the middle of the academy plaza, in broad daylight, surrounded by all these people? That might be a little hard for me..."
2300702-85 = "But maybe I could try it just this once..."
2300702-86 = "[s] \"This is about studying! Studying!\""
2300702-87 = "Yes, yes. Studying. Getting a private lesson from you..."
2300702-88 = "Heeheehee... I was just joking. Sorry."
2300702-89 = "...All right."
2300702-90 = "It's actually this way. There's a public library in the main building, so there will be a lot of people around... There's no need to worry."
2300702-91 = "Okay, let's go."
2300702-93 = "(After that, I was wary as I followed Hanako, but all that happened was a normal remedial class at the library.)"
2300702-94 = "(...And for some reason, she only asked me one or two questions.)"

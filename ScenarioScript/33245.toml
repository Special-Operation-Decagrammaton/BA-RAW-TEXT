[translation]
33245-3 = "..."
33245-4 = "ขอบคุณมาก ครู"
33245-5 = "ผมเสียใจอย่างสุดซึ้งที่ให้คุณได้เผชิญกับผลงานที่ยังไม่สมบูรณ์แบบ แต่ผมขอสัญญาว่าคราวหน้า... ผลงานของผมจะเสร็จสมบูรณ์อย่างแน่นอน"
33245-6 = "สูทดำพูดถูกจริงๆ ไม่บ่อยนักที่ผมจะเห็นด้วยกับเขา แต่ว่าเรื่องนี้ผมคงจะต้องขอบคุณเขาแล้วละ"
33245-7 = "ไว้พบกันใหม่... ครู [USERNAME]"
33245-8 = "คราวหน้าผมจะไปพบกับคุณในห้วงความฝันแล้วกัน"
33245-13 = "(หลังการต่อสู้สิ้นสุดลงก็ไม่พบร่องรอยของสควอดของอาเรียส)"
33245-14 = "(ดูเหมือนพวกเธอจะใช้เส้นทางใต้ดินหลบหนีไปที่แห่งหนึ่ง แต่ไม่สามารถค้นหาเส้นทางหลบหนีได้)"
33245-16 = "แค่กๆ!... แค่กๆ..."
33245-17 = "อะ... อดทนอีกหน่อยนะคะ หัวหน้า..."
33245-18 = "ตอนนี้... พวกเราจะไปที่ไหนกันล่ะ?"
33245-19 = "กลับไปที่เขตปกครองตนเองก็ไม่ได้แล้ว... ถ้ากลับไปก็จะถูกผู้หญิงคนนั้นฆ่า "
33245-20 = "แบบนั้นก็คงไม่แย่หรอกมั้ง"
33245-21 = "คะ...คงเจ็บน่าดูเลยนะคะ... ต่อจากนี้ไป... คะ...คงเจ็บปวดมาก ตลอดแน่ๆ..."
33245-22 = "ใช่แล้ว นี่คือแก่นแท้ของชีวิตล่ะ"
33245-30 = "..."
33245-32 = "ตอนต่อไป;บทส่งท้าย"

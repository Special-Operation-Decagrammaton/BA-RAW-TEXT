[translation]
33245-3 = "……。"
33245-4 = "心から感謝しよう、先生。"
33245-5 = "不完全な姿でお見せしてしまったことは汗顔の至りだが、すぐに完成させてみせる。"
33245-6 = "黒服の言う通りだったな……普段はあまり共感できないものの、この件については感謝をせざるを得まい。"
33245-7 = "……では[USERNAME]先生。そなたにまた会える時を、心待ちにしている。"
33245-8 = "また、夢の中で。"
33245-13 = "その後アリウススクワッドのみんなを探したものの、とうとう見つけることはできなかった。"
33245-14 = "古聖堂のどれかの地下通路から逃げたのだろうけど、それを特定することもできず……。"
33245-16 = "げほっ、げほっ……！"
33245-17 = "だ、大丈夫ですか、リーダー……。"
33245-18 = "……で、どこに行く？"
33245-19 = "……自治区には戻れない。彼女に、殺される……。"
33245-20 = "……まあ、そういう終わり方も悪くないけど。"
33245-21 = "そ、それは苦しそうですね……そうでなくても、この先もずっと……。"
33245-22 = "うん、それが人生だから。"
33245-30 = "……。"
33245-32 = "次回;エピローグ"

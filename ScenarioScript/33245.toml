[translation]
33245-3 = "……"
33245-4 = "發自內心感謝你，老師。"
33245-5 = "以不完全的姿態展現雖然讓我感到慚愧，不過我會立刻完成的。"
33245-6 = "黑色西裝人說的沒錯啊……儘管平常沒辦法有共識，但關於這一點必須感謝。"
33245-7 = "……那麼[USERNAME]老師。我由衷等待，能再和你見面的時刻。"
33245-8 = "下次，在夢中見。"
33245-13 = "（那之後儘管尋找了奧利斯小隊的大家，結果還是找不到）"
33245-14 = "（應該是從古教堂其中一個地下通道逃走了，但是連這個也沒辦法確定……）"
33245-16 = "咳咳，咳咳……！"
33245-17 = "沒，沒事吧，隊長……"
33245-18 = "……所以，要去哪裡？"
33245-19 = "……沒辦法回自治區。會被她，殺了……"
33245-20 = "……嘛，那種結束方式也不錯。"
33245-21 = "那，那樣很痛苦呢……就算不是那樣，接下來也一直……"
33245-22 = "嗯，因為那就是人生。"
33245-30 = "……"
33245-32 = "下一話;尾聲"

[translation]
80000069-1 = "ชากับช็อกโกแลต"
80000069-6 = "...!!"
80000069-7 = "มาแล้วเหรอคะ คุณครู! ชาที่สั่งไปได้พอดีเลยค่ะ!"
80000069-8 = "คะ...? มีเรื่องอะไรงั้นเหรอคะ? คุณครูรู้อยู่แล้วไม่ใช่เหรอคะ!?"
80000069-12 = "วันนี้คือวันวาเลนไทน์นะ! วาเลนไทน์เป็นวันที่จะตอบแทนความเมตตาที่ได้รับมาให้คนสำคัญยังไงล่ะ!"
80000069-13 = "และแน่นอนว่าคนสำคัญของพีน่าก็คือคุณครู! เพราะงั้นพีน่าเลยชวนมายังสถานที่พิเศษแบบนี้ไงคะ!"
80000069-14 = "ที่นี่วิวสวยมาก และอากาศก็เย็นสบายเหมาะกับจะใช้เวลาเพลิดเพลินในวันแบบนี้ค่ะ!"
80000069-15 = "เพราะงั้นคุณครู...! เพราะงั้นตอนนี้คุณครู..."
80000069-16 = "มาดื่มกับพีน่าสักแก้วมั้ยคะ?"
80000069-17 = "[s1] \"แก้วเหรอ...?\"\n[s2] \"ไม่ใช่ช็อกโกแลตเหรอ?\""
80000069-18 = "ไม่ต้องรีบร้อนหรอกค่ะ! ฉันเตรียมไว้ทุกอย่างแล้วค่ะ!"
80000069-19 = "ไม่ต้องรีบร้อนหรอกค่ะ! ฉันเตรียมไว้ทุกอย่างแล้วค่ะ!"
80000069-20 = "รับแก้วไปสิคะ! เอ้า คุณครู ดื่มเพื่อพีน่าสักแก้วนะคะ!"
80000069-21 = "ชน-!"
80000069-26 = "[ns3] \"...จู่ๆ ก็จะดื่มฉลองเหรอ!?\"\n[ns4] \"แบบนี้มันดู... ค่อนข้างจะ...\""
80000069-27 = "คะ? ไม่ควรทำแบบนี้เหรอคะ?"
80000069-28 = "คะ? ไม่ควรทำแบบนี้เหรอคะ?"
80000069-29 = "อ๊ะ..."
80000069-30 = "ฉันลืมบอกคุณครูไปซะได้! พีน่าแท้ๆ แต่กลับทำพลาดแบบนี้...!!"
80000069-31 = "แต่ว่าคุณครูไม่ต้องกังวลนะคะ! นี่ไม่ใช่เหล้าหรอกค่ะ!"
80000069-32 = "บอกแล้วไงคะ ว่าวันนี้คือวันวาเลนไทน์ ฮิฮิฮิ!"
80000069-33 = "ดูแก้วดีๆ สิคะ ดูดีๆ ค่ะ!"
80000069-39 = "[ns5] \"ช็อกโกแลตนี่เอง\"\n[ns6] \"แก้วทำมาจากช็อกโกแลตเหรอ น่าแปลกดีแฮะ\""
80000069-40 = "ใช่มั้ยคะ!? คิดแล้วว่าคุณครูจะต้องชอบ!!"
80000069-41 = "ใช่มั้ยคะ!? คิดแล้วว่าคุณครูจะต้องชอบ!!"
80000069-42 = "และเครื่องดื่มในแก้วก็คือ..."
80000069-47 = "(พีน่ารินชาเขียวลงในแก้ว)"
80000069-48 = "ถ้ารินชาเขียวเติมลงไปแบบนี้ รสหวานกลมกล่อมของช็อกโกแลตกับกลิ่นหอมของชาเขียวก็จะ#nผสมผสานเข้ากันอย่างดี มันจะลงตัวมากๆ เลยค่ะ!"
80000069-49 = "แน่นอนว่าฉันก็เพิ่งเคยจะลองทำครั้งแรก เพราะงั้นเลยชวนคุณครูให้มาชิมรสชาตินี้พร้อมๆ กันค่ะ"
80000069-50 = "เอ้า คุณครู คราวนี้ก็มาดื่มกันเถอะค่ะ ชนแก้ว~!"
80000069-51 = "ชน-!"
80000069-52 = "[s] ชนแก้วกับพีน่า"
80000069-54 = "ต่อไปถ้ามีเรื่องสนุกๆ แบบนี้อีก ฉันก็อยากจะชวนคุณครูมาสนุกด้วยกันแบบนี้ไปเรื่อยๆ เลยค่ะ!"
80000069-55 = "เพราะงั้น..."
80000069-59 = "ขอฝากเนื้อฝากตัวด้วยนะคะ!"
80000069-60 = "ฮิฮิ..."
80000069-62 = "(จากนั้นคุณครูก็ใช้เวลาจิบชาและกินแก้วช็อกโกแลตด้วยกันกับพีน่า)"

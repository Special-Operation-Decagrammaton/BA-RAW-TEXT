[translation]
80000069-1 = "風味和風情"
80000069-6 = "……！！"
80000069-7 = "你來啦，老師！我正好泡了茶，你來得剛剛好！"
80000069-8 = "……咦，要做什麼是嗎？"
80000069-12 = "今天是情人節！所謂的情人節，就是向重要的人報答至今為止恩情的日子！！"
80000069-13 = "所以為了菲娜最重要的老師，今天特別準備了這些！"
80000069-14 = "天氣和景色都很好，今天是個享受這股風情的絕佳日子呢！！"
80000069-15 = "那麼老師，"
80000069-16 = "要不要跟菲娜來一杯呀？"
80000069-17 = "[s1]「一杯……？」\n[s2]「不是巧克力之類的……？」"
80000069-18 = "是！菲娜都準備好了！"
80000069-19 = "是！菲娜都準備好了！"
80000069-20 = "作為老師與菲娜羈絆的證明……"
80000069-21 = "乾杯！"
80000069-26 = "[ns3]「……酒杯！？」\n[ns4]「也就是說，接下來難道要……？」"
80000069-27 = "……怎麼了嗎？"
80000069-28 = "……怎麼了嗎？"
80000069-29 = "……Oh。"
80000069-30 = "菲娜忘記先說明了！"
80000069-31 = "以防萬一先告訴老師，這不是真正的酒杯！"
80000069-32 = "畢竟今天是情人節……"
80000069-33 = "請老師仔細看！"
80000069-39 = "[ns5] 「……啊，是用巧克力做的。」\n[ns6]「居然是酒杯造型的巧克力……？」"
80000069-40 = "沒錯！我就知道老師一定會理解的！"
80000069-41 = "沒錯！我就知道老師一定會理解的！"
80000069-42 = "接著就在杯子裡……"
80000069-47 = "（菲娜將綠茶倒進了杯子）"
80000069-48 = "用它來喝茶的話，#n巧克力的甜味和綠茶的香味就會結合在一起，形成別具一格的風味！"
80000069-49 = "雖然我也是第一次嘗試！但機會難得，便想和老師一起品嘗。"
80000069-50 = "來吧，老師。這次一定要……"
80000069-51 = "乾杯！"
80000069-52 = "[s] 和菲娜乾杯"
80000069-54 = "呼，真不錯呢……這麼棒的東西，菲娜之後也想和老師一起享受！"
80000069-55 = "所以，今後也……"
80000069-59 = "……不才小女，請老師多多指教。"
80000069-60 = "耶嘿嘿……"
80000069-62 = "（之後便和菲娜共度了一段別有風情的時間）"

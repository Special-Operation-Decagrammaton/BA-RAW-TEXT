[translation]
1009202-1 = "美感"
1009202-2 = "（接到喜美的聯絡後，在約定的時間來到了百貨公司前）"
1009202-8 = "服裝搭配可是一件非常重要的事，所以老師你得認真地給我意見才行。"
1009202-9 = "要是敢挑一些奇怪的動物裝或比基尼之類的，我是絕對不會放過你的哦，知道了嗎？"
1009202-10 = "[s1]「哦……這是在挑釁我嗎？」\n[s2]「你這麼說反而會讓我很想那麼做耶。」"
1009202-13 = "才不是！如果不事先跟你說清楚，你肯定會偷偷拿那種東西的吧！？"
1009202-14 = "……真是的，都怪我沒事找自己麻煩。"
1009202-18 = "總之挑選的工作就交給我，你只要在旁邊給我意見就行了，這樣比較安全。"
1009202-23 = "我今天打算從外套開始挑起。"
1009202-24 = "然後是……我看看……"
1009202-29 = "為了營造整體感，裙子和鞋子最好也一起搭配。#n款式一樣但顏色不同的感覺應該不錯。"
1009202-30 = "T恤的話……就先隨便挑一件，等團徽設計好之後印上去就行了……"
1009202-31 = "另外還有……嗯……飾品跟……"
1009202-35 = "……嗯？你說什麼？"
1009202-36 = "……我的美感好像有進步？"
1009202-37 = "呵呵呵，那還用……"
1009202-42 = "等等，老師。#n剛才那句話是什麼意思？"
1009202-43 = "……「好像有進步」？#n所以你之前一直都覺得我的美感不怎麼樣嗎？"
1009202-44 = "你聽好了，老師。#n我的美感一直都是這樣，從來就沒有差過。"
1009202-45 = "雖然我的手藝確實不怎麼樣，但這兩件事應該沒有關聯吧？"
1009202-46 = "而且在我們這群人當中，會在意「設計」這種事的人就只有我而已。"
1009202-47 = "……什麼？"
1009202-48 = "為什麼不找其他人來……？"
1009202-49 = "呃……那是因為……"
1009202-50 = "[ns3]「抱歉，我是不是不該這麼問？」\n[ns4]「如果不想回答的話，可以不用理我沒關係。」"
1009202-56 = "哎！！你這傢伙真的是……！！"
1009202-57 = "受不了你耶～！！就知道你會問這種問題！！#n到底為什麼每次都這樣啊！？每次！！"
1009202-58 = "反正不是你想的那樣！！#n不，雖然不能說完全不是，但那不是主要的原因！！"
1009202-62 = "其實真正的原因是……那個……"
1009202-66 = "……唉。"
1009202-67 = "[s5]「為什麼突然嘆氣！？」\n[s6]「一嘆窮三年，一嘆窮三年。」"
1009202-72 = "老師……看來你真的什麼都不知道啊。"
1009202-73 = "不是我不找他們，而是不能找他們。#n那些傢伙……"
1009202-74 = "如果把設計的事……交給他們的話……"
1009202-75 = "後果恐怕不堪設想……"
1009202-76 = "問我是什麼意思？希望我講得更明白一點？"
1009202-77 = "老師你應該……"
1009202-81 = "也不想看到什麼「四次元風格」、「薄荷綠&白色滿滿風格」或者「太妹風格」吧？"
1009202-85 = "[ns7]「…………」\n[ns8]「……啊哈……」"
1009202-88 = "[ns9]「原來如此啊……我懂了……」\n[ns10]「但這種話要是被他們聽到，他們應該會很難過吧？」"
1009202-91 = "難過也沒辦法。#n而且我也已經跟他們說過這件事，叫他們不要跟過來了。"
1009202-92 = "所以就算只有老師也好，希望你能認真給我一些建議。"
1009202-96 = "總之事情就是這樣，我們再多配幾套衣服看看吧……"
1009202-107 = "嗯……"
1009202-108 = "這樣……應該差不多了吧……？"
1009202-109 = "[s11]「大致的風格已經決定好了吧？」\n[s12]「要不要試一下整體搭起來的感覺？」"
1009202-112 = "……嗯，說的也是。"
1009202-113 = "就算是穿在其他人身上，應該也不會跟我差太多才對。"
1009202-117 = "那我就來試試看吧……"
1009202-118 = "在這裡等我一下，我馬上就回來。"
1009202-127 = "……唔嗯。"
1009202-128 = "大概是這種感覺吧……"
1009202-129 = "怎……怎麼樣？#n你覺得……怎麼說呢……"
1009202-130 = "好……好看……嗎？"
1009202-131 = "先提醒你一下，如果打算說什麼奇怪的話，最好還是別說比較好。"
1009202-132 = "[ns13]「讓人感到純粹的可愛。」\n[ns14]「為什麼總是要擔心這種事呢？」"
1009202-133 = "是，是嗎？那就好……"
1009202-137 = "你是真不知道還是假不知道……？"
1009202-138 = "雖然好像有點大件……不過這種衣服本來就是這樣穿的吧。"
1009202-143 = "嗯……"
1009202-144 = "好，感覺不錯，就這麼決定吧。#n依照這套的風格，買四套不同顏色的……"
1009202-145 = "仔細想想，一次買四套好像有點多，我可能帶不回去。"
1009202-150 = "……嗯？老師剛才說什麼？"
1009202-151 = "要幫我提？#n……你說衣服嗎？"
1009202-152 = "[s15]「我本來就是為了這件事而來的。」\n[s16]「這也是大人該做的事情之一哦。」"
1009202-155 = "咦，咦咦……？"
1009202-156 = "是，是嗎……？我從來沒這麼想過耶……"
1009202-157 = "但是東西應該會很重哦……"
1009202-162 = "[ns17] 幫喜美提袋子\n[ns18]「走～結帳去囉～」"
1009202-167 = "等，老，老師！"
1009202-171 = "老師你等等……！等我一下啦……！！"
1009202-176 = "（後來替喜美付了衣服的錢，並全部幫他提了回去）"

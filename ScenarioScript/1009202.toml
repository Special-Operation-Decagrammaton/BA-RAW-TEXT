[translation]
1009202-1 = "เซนส์ด้านแฟชั่น"
1009202-2 = "(คุณครูได้ข้อความจากโยชิมิ และไปที่ห้างสรรพสินค้าตามเวลานัด)"
1009202-8 = "คอสตูมเป็นเรื่องสำคัญนะ คุณครูห้ามทำเป็นเล่นล่ะ ช่วยฉันดูชุดดีๆ ด้วย"
1009202-9 = "ถ้าเลือกชุดสัตว์แปลกๆ หรือชุดว่ายน้ำบิกินีมาละก็ โดนฉันเล่นงานแน่ เข้าใจมั้ย?"
1009202-10 = "[s1] \"โอ้ว... นี่ใช้คำพูดยั่วยุครูงั้นเหรอ?\"\n[s2] \"พอพูดอย่างนั้นก็ยิ่งอยากโดนแฮะ\""
1009202-13 = "ไม่ใช่แบบนั้นสักหน่อย! แต่ถ้าไม่บอกไว้ก่อน เดี๋ยวครูอาจจะแอบหยิบชุดอะไรแบบนั้นมาก็ได้นี่!!"
1009202-14 = "เฮ้อ... ฉันคงผิดเองแหละที่จ้องจะจับผิดตั้งแต่แรก"
1009202-18 = "ฉันจะเป็นคนเลือกชุดเอง คุณครูช่วยให้ความเห็นอยู่ข้างๆ ก็แล้วกัน แบบนี้น่าจะปลอดภัยที่สุด"
1009202-23 = "งั้นฉันจะเลือกแจ็กเกตก่อน"
1009202-24 = "ต่อไปก็... ไหนดูซิ..."
1009202-29 = "เราต้องใส่ให้เข้าคอนเซ็ปต์กัน งั้นกระโปรงกับรองเท้าก็เลือกที่เข้ากันดีกว่า เลือกแบบที่เหมือนกัน แต่คนละสีกันก็น่าจะสวยนะ"
1009202-30 = "ส่วนเสื้อ... ขอเลือกแบบง่ายๆ ตามใจฉันไปก่อน แล้วถ้าได้สัญลักษณ์ของวงมาแล้วค่อยเอาไปสกรีน..."
1009202-31 = "แล้วก็... อืม... เหลือเครื่องประดับกับ..."
1009202-35 = "หืม...? ว่าไงนะ?"
1009202-36 = "จู่ๆ ฉันก็ดูมีเซนส์ด้านแฟชั่นงั้นเหรอ?"
1009202-37 = "ฮุฮุฮุ ก็นะ..."
1009202-42 = "เดี๋ยวนะ คุณครู เมื่อกี้มันหมายความว่าอะไรนะ?"
1009202-43 = "'จู่ๆ ก็มี' งั้นเหรอ? งั้นแปลว่าก่อนหน้านั้นเซนส์แฟชั่นฉันห่วยงั้นเหรอ?"
1009202-44 = "ฟังให้ดีนะคุณครู เซนส์ด้านแฟชั่นของฉันน่ะดีแบบนี้อยู่แล้ว มันไม่ใช่ว่าจู่ๆ ก็เพิ่งจะมีหรอกนะ"
1009202-45 = "ถึงจะฝีมือไม่ค่อยดี แต่ก็ไม่เกี่ยวกับเรื่องนี้นี่นา?"
1009202-46 = "และในหมู่พวกฉัน ก็ไม่มีใครที่ใส่ใจเรื่อง 'ดีไซน์' อย่างจริงจังเท่าฉันด้วย"
1009202-47 = "หืม...? ว่าไงนะ?"
1009202-48 = "จะว่าไป ทำไมฉันไม่ชวนเพื่อนๆ คนอื่นมาน่ะเหรอ? ก็..."
1009202-49 = "อืม... คือว่า..."
1009202-50 = "[ns3] \"ขอโทษนะ ครูไม่ควรถามแบบนั้นหรือเปล่า?\"\n[ns4] \"ถ้าไม่สะดวกตอบก็ไม่ต้องตอบก็ได้\""
1009202-56 = "คุณครูนี่นะ!! เดี๋ยวเหอะ~!!"
1009202-57 = "ฮึ่ย~!! กะไว้แล้วว่าต้องถามอะไรแบบนี้!! ทำไมต้องทำให้ฉันเดาถูกอยู่เรื่อยเลยนะ!?"
1009202-58 = "ไม่ใช่อย่างนั้นสักหน่อย!! ฉันจะไม่บอกว่าไม่อยากชวนหรอกนะ แต่เหตุผลหลักๆ ที่ไม่ได้ชวนมา มันไม่ใช่อย่างที่คุณครูคิดหรอก!!"
1009202-62 = "เหตุผลจริงๆ ก็คือ... คือว่า..."
1009202-66 = "เฮ้อ..."
1009202-67 = "[s5] \"ทำไมจู่ๆ ก็ถอนหายใจล่ะ!?\"\n[s6] \"ถอนหายใจบ่อยเดี๋ยวก็อายุสั้นหรอก...\""
1009202-72 = "คุณครู... นี่คุณครูไม่รู้อะไรเลยจริงๆ สินะ"
1009202-73 = "มันไม่ใช่ว่าฉันไม่อยากชวน แต่แค่ไม่ควรชวนมาต่างหากน่ะ"
1009202-74 = "ขืนให้พวกนั้นเลือกเสื้อผ้าของวงได้ตามใจชอบละก็... "
1009202-75 = "เราอาจได้เห็นผลลัพธ์ที่น่าสยดสยองก็ได้..."
1009202-76 = "ฉันพูดเรื่องอะไรอยู่น่ะเหรอ? นี่ฉันต้องพูดให้ตรงกว่านี้อีกเหรอเนี่ย?"
1009202-77 = "คุณครูก็ไม่ได้อยากเห็นแฟชั่นพวกนี้หรอกใช่มั้ย...?"
1009202-81 = "พวก <แฟชั่นที่เข้าถึงยาก> หรือ <แฟชั่นขาว & มินต์> หรือ <แฟชั่นแยงกี้สาว> อะไรทำนองนั้นน่ะ"
1009202-85 = "[ns7] \"......\"\n[ns8] \"อ่อ...\""
1009202-88 = "[ns9] \"เป็นอย่างนี้สินะ... ครูพอเข้าใจแล้วละ...\"\n[ns10] \"แต่ถ้าเจ้าตัวได้ยินคงเศร้าเลยนะ\""
1009202-91 = "ถึงจะเศร้าก็ช่วยไม่ได้หรอก อีกอย่าง ฉันไปบอกทุกคนไว้ตั้งแต่แรกแล้วด้วยว่าไม่ต้องมา"
1009202-92 = "เพราะงั้นฉันก็เลยขอให้คุณครูมาช่วยเลือกอีกแรงน่ะ"
1009202-96 = "เอาเถอะ เลิกคุยเรื่องไม่จำเป็นดีกว่า ฉันต้องหาอะไรเพิ่มให้เข้าเซ็ตกันกว่านี้..."
1009202-107 = "อืม..."
1009202-108 = "ฉันว่า... เท่านี้ก็น่าจะได้แล้วนะ?"
1009202-109 = "[s11] \"โดยรวมแล้วก็น่าจะมีครบแล้วนะ\"\n[s12] \"หรือลองใส่ดูให้รู้เลยมั้ย?\""
1009202-112 = "อืม... เอางั้นเหรอ?"
1009202-113 = "แต่ก็นะ ชุดของเพื่อนๆ กับของฉันก็ไม่มีอะไรแตกต่างกันมากอยู่แล้ว งั้นดูจากของฉันก็ได้"
1009202-117 = "ถ้างั้นก็..."
1009202-118 = "รอตรงนี้แป๊บหนึ่งนะคุณครู ฉันจะรีบไปเปลี่ยนชุดมา"
1009202-127 = "อืม..."
1009202-128 = "ก็น่าจะประมาณนี้ละนะ..."
1009202-129 = "เอ่อ... เป็นไงบ้าง? หรือต้องถามว่า..."
1009202-130 = "คะ... คุณครูคิดว่า... สะ... สวยหรือเปล่า?"
1009202-131 = "ขอบอกไว้ล่วงหน้าเลยนะ ถ้าคิดจะพูดอะไรแปลกๆ ละก็ กลืนคำพูดนั้นลงคอไปได้เลย"
1009202-132 = "[ns13] \"ดูน่ารักและไร้เดียงสาดีนะ\"\n[ns14] \"ทำไมถึงกังวลอะไรแบบนั้นอยู่เรื่อยเลย?\""
1009202-133 = "งะ... งั้นเหรอ? ได้ยินแบบนั้นก็ค่อยโล่งใจหน่อย..."
1009202-137 = "ไม่ได้ถามเพราะไม่รู้จริงๆ ใช่มั้ย...?"
1009202-138 = "แต่มันก็ดูตัวใหญ่ไปหน่อยนะ... แต่ก็เอาเถอะ ปกติแล้วเสื้อแบบนี้ก็ใส่กันประมาณนี้แหละ"
1009202-143 = "อืม..."
1009202-144 = "ดีละ งั้นเอาตัวนี้เลยมั้ย แบบนี้น่าจะเพอร์เฟ็กต์แล้วนะ ซื้อแบบที่เหมือนกัน แต่แค่เปลี่ยนสีดีมั้ยนะ..."
1009202-145 = "แต่ถ้าซื้อ 4 เซ็ตสำหรับ 4 คน ก็คงจะหลายชิ้นเลยนะนั่น คงจะขนกลับลำบากแล้วละ"
1009202-150 = "หืม...? เมื่อกี้คุณครูว่าอะไรนะ?"
1009202-151 = "จะช่วยถือเสื้อผ้ากลับให้เหรอ?"
1009202-152 = "[s15] \"ก็กะจะมาช่วยถือตั้งแต่แรกอยู่แล้วนี่\"\n[s16] \"เรื่องนี้ให้ผู้ใหญ่ช่วยเถอะนะ\""
1009202-155 = "เอะ... เอ๋...?"
1009202-156 = "งะ... งั้นเหรอ...? ตะ... แต่ฉันไม่ได้คิดไว้แบบนี้นะ...?"
1009202-157 = "แต่ของมันก็หนักจริงๆ..."
1009202-162 = "[ns17] ช่วยถือตะกร้าให้\n[ns18] \"ไปจ่ายเงินกันเลย~\""
1009202-167 = "เอ๋? คะ... คุณครู!"
1009202-171 = "รอก่อนสิคุณครู...! รอฉันด้วย...!!"
1009202-176 = "(จากนั้นคุณครูก็ช่วยจ่ายเงินให้ และช่วยถือของทั้งหมดมา)"

[translation]
1009202-1 = "Aesthetic Sense"
1009202-2 = "After getting Yoshimi's message, I went to the shopping mall at the agreed-upon time."
1009202-8 = "Outfits are important. So don't play around, Sensei."
1009202-9 = "If you pick some weird animal suit, or a bikini or something, I'll make you regret it. Got it?"
1009202-10 = "[s1] \"Oh...are you taunting me?\"\n[s2] \"Saying that makes me want to do it.\""
1009202-13 = "That's not it! You would sneak those things in if I didn't say no in advance!"
1009202-14 = "...*sigh* It's my fault for giving you the idea, yeah."
1009202-18 = "I'll do the picking out, you just give me feedback. We'll play it safe."
1009202-23 = "Jacket first."
1009202-24 = "And next... Let's see..."
1009202-29 = "We're trying to stick with a theme, so let's match skirts and shoes if possible. It'd be pretty to keep the same design, with some variation in colors."
1009202-30 = "For the T-shirt... Let's have a placeholder for now. Once we get a band logo, we'll put it there."
1009202-31 = "And then...um...accessories..."
1009202-35 = "...Hm? What?"
1009202-36 = "...When did my aesthetic sense get better?"
1009202-37 = "Heeheehee. Well, see..."
1009202-42 = "Wait, what does that MEAN, Sensei?"
1009202-43 = "Are you saying it wasn't good before?"
1009202-44 = "Listen, Sensei, it's always been good, and it's always been like this."
1009202-45 = "I'm not good at making things, but that's completely separate, you know?"
1009202-46 = "Besides, I'm the only one in the group who even takes \"design\" seriously."
1009202-47 = "...Hm? What?"
1009202-48 = "Why did I not call others? Because..."
1009202-49 = "...Um... That's..."
1009202-50 = "[ns3] \"Sorry. Did I not read the room with that question?\"\n[ns4] \"If you don't want to answer, you don't have to.\""
1009202-56 = "Seriously, what am I even going to do with you?"
1009202-57 = "Urgh! I knew you were going to say that eventually! You can't let it slide, just once, can you?! Not once!"
1009202-58 = "It's nothing like that at all! I mean, it's not NOTHING like it, but it's not the big reason!"
1009202-62 = "The big reason is... Um..."
1009202-66 = "*sigh*"
1009202-67 = "[s5] \"A sigh all of a sudden?\"\n[s6] \"If you sigh like that, you're going to run out of breath.\""
1009202-72 = "You really don't know anything, Sensei."
1009202-73 = "It's not that I didn't call them. It's that I shouldn't."
1009202-74 = "If I left the design up to the others... "
1009202-75 = "...it'd be a disaster, you know...?"
1009202-76 = "What do I mean? You want me to just spell it out?"
1009202-77 = "Sensei, you don't want to see..."
1009202-81 = "...something like \"4th-Dimensional Fashion,\" \"Mint & White Spam Fashion,\" or \"Thug Sense Fashion,\" do you?"
1009202-85 = "[ns7] \"...\"\n[ns8] \"...Aha...\""
1009202-88 = "[ns9] \"So that's how it is... I get it...\"\n[ns10] \"Glad they're not around to hear that.\""
1009202-91 = "It is what it is. I specifically told them not to come here before I showed up to meet you."
1009202-92 = "You, at least, I want to bring along to take a look."
1009202-96 = "Anyways, that's how it is. So about matching this set..."
1009202-107 = "Hm..."
1009202-108 = "...Is it good? Like this, you think...?"
1009202-109 = "[s11] \"I think we're getting there, maybe.\"\n[s12] \"How about we take an overall look at the whole thing?\""
1009202-112 = "...Hm. You think?"
1009202-113 = "Okay, so everybody else's outfits are going to more or less match mine."
1009202-117 = "And on that note..."
1009202-118 = "Wait right here. I'll go get changed."
1009202-127 = "...Hm."
1009202-128 = "So this is what it feels like..."
1009202-129 = "H-How is it? It's... Um..."
1009202-130 = "D-Do I look...pretty?"
1009202-131 = "And just in case you're about to say something weird: don't."
1009202-132 = "[ns13] \"It's pure cuteness.\"\n[ns14] \"You don't have to worry about that sort of thing.\""
1009202-133 = "Y-Yeah? Well, that's a relief."
1009202-137 = "There's one detail you didn't ask about, so maybe you didn't notice..."
1009202-138 = "It's big on me. But I think that's part of the charm of the outfit."
1009202-143 = "...Hmm..."
1009202-144 = "Okay. Let's go with this. Yeah, this'll be great. Same lines, different color."
1009202-145 = "Now if I buy all four full outfits, they might be a little hard to carry by myself..."
1009202-150 = "...Huh? Sensei, what did you just say?"
1009202-151 = "You'll carry them...for me?"
1009202-152 = "[s15] \"That's why I came here in the first place.\"\n[s16] \"Heavy lifting is the adult's job.\""
1009202-155 = "H-Huh...?"
1009202-156 = "I-Is that so...? I-I wouldn't have thought of that."
1009202-157 = "You sure? It's going to be really heavy..."
1009202-162 = "[ns17] Carry the bag.\n[ns18] \"Let's go! To the counter!\""
1009202-167 = "Ah, S-Sensei!"
1009202-171 = "Sensei, wait...! Wait for me...!"
1009202-176 = "We made the purchase, and I carried the bags for her."

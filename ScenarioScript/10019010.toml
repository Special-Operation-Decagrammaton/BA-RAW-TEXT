[translation]
10019010-12 = "ว้ากกกก--!! โผล่ออกมาแล้ว!!"
10019010-13 = "เอาละ จะวิ่งไปแล้วนะคะ!"
10019010-14 = "จะล่อไว้ให้จนกว่าจะถึงเป้าหมายแล้วกัน"
10019010-21 = "ปฏิกิริยาพลังงานตอบสนอง?! ระ...ระวัง! นั่นเลเซอร์-!! "
10019010-22 = "คงคิดจะยิงมาทางนี้สินะ!"
10019010-23 = "ไม่มีเวลาให้หนีแล้วค่ะ รุ่นพี่โฮชิโนะ!"
10019010-36 = "ว้าว ยิงเข้าเต็มๆ เลยแฮะ...?!"
10019010-37 = "ทะ...ท่านอารุ...?!"
10019010-44 = "...ฮึ่ม"
10019010-45 = "แค่นี้น่ะ ทำอะไรเจ้าพวกนั้นไม่ได้หรอก เราจะทำตามแผนต่อไป"
10019010-46 = "คะ? งะ...งั้นเหรอคะ? เข้าใจแล้วค่ะ!"
10019010-47 = "... ตามคาด~ ถ้างั้นก็ไปต่อแล้วนะ☆"
10019010-51 = "หวาาาา~?! โดนเข้าเต็มเปาเลย!! ยะ...แย่แล้ว!"
10019010-52 = "...ไม่หรอกค่ะ แค่นั้นสบายมากค่ะ"
10019010-53 = "รุ่นพี่โฮชิโนะ เป็นยังไงบ้างคะ?"
10019010-66 = "อ่า... เจ็บสุดๆ เลยละ แต่ว่าก็รอดมาได้หวุดหวิดละนะ"
10019010-67 = "อื้อ พวกเราไม่เป็นอะไรค่ะ อายาเนะจัง"
10019010-68 = "ใช่แล้ว แค่นี้น่ะไม่เท่าไรหรอกน่า"
10019010-70 = "ป้องกันการโจมตีนั่นได้งั้นเหรอ...?!"
10019010-71 = "เฮ้อ~ เกือบไปแล้วจริงๆ ด้วยน้า~ ช่วงนี้ยิ่งปวดๆ เอวอยู่ด้วย ถ้าฝืนเกินไปร่างกายลุงจะแย่นะ ลุงไม่มีค่าขนมเหลือไปซื้อแผ่นแปะแก้ปวดแล้วเนี่ย"
10019010-72 = "พวกเราไม่ได้อายุห่างกันขนาดนั้นสักหน่อยนะ!"
10019010-74 = "...สุดยอดเลยนะ หัวหน้าของพวกเธอเนี่ย... ไม่สิ นักเรียนของอะบิดอสนี่แข็งแกร่งกันทุกคนเลยนะ"
10019010-75 = "หืม? งั้นเหรอ...?"
10019010-76 = "อะฮ่าฮ่าฮ่า... เรื่องนั้นพวกเราไม่มีคนให้เทียบด้วยเลยไม่ค่อยแน่ใจเท่าไรน่ะ..."
10019010-80 = "...ค่ะ! เท่านี้ก็เตรียมการโจมตีพร้อมแล้วค่ะ!"
10019010-81 = "ปฏิบัติการบุกโจมตีผู้พิทักษ์หอคอยแห่งที่ 1 พร้อมดำเนินการค่ะ!"
10019010-82 = "ถ้างั้นก็อย่าโอ้เอ้กันอยู่เลย เราไปกันเลยดีไหม"

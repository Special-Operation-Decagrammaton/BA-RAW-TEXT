[translation]
10019010-12 = "哇啊啊──！出現了！！"
10019010-13 = "來，跑起來吧！"
10019010-14 = "要把敵人引誘到目標地點唷～"
10019010-21 = "是能量反應！？#n小，小心，雷射要來了唷！！"
10019010-22 = "好，好像往這裡來了！？"
10019010-23 = "無法計算迴避的時機！#n──星野前輩！"
10019010-36 = "哇啊，被直接命中了……？"
10019010-37 = "亞，亞瑠大人……！"
10019010-44 = "……哼。"
10019010-45 = "他們不可能被那種程度的攻擊打倒的。繼續依照計畫進行吧。"
10019010-46 = "是，是嗎……？#n……也，也對，我知道了！"
10019010-47 = "……這樣啊。#n那我們就繼續前進吧～☆"
10019010-51 = "嗚哇啊啊！？被正面擊中了，不妙啊！！"
10019010-52 = "……不，那種程度應該──"
10019010-53 = "星野前輩，情況如何？"
10019010-66 = "哎呀，真是有點痛呢～#n不過問題不大。"
10019010-67 = "嗯嗯，我們沒事唷，綾音醬。"
10019010-68 = "這種程度不算什麼。"
10019010-70 = "竟然承受住了那個攻擊……！？"
10019010-71 = "剛才真危險呢～#n最近腰越來越差，不能太逞強……而且買貼布也是要錢的呀～"
10019010-72 = "都說了明明年紀就沒差多少嘛！！"
10019010-74 = "……真厲害啊，你們的委員長……不，阿拜多斯的大家都很強呢。"
10019010-75 = "咦，是嗎？"
10019010-76 = "啊哈哈……因為沒有比較對象，所以我也不太清楚……"
10019010-80 = "……這樣就完成所有攻略準備了！各位辛苦了。"
10019010-81 = "第1聖所的守護者攻略，隨時可以開始！"
10019010-82 = "那就速速解決它吧。"

[translation]
1012005-1 = "不速之客與受歡迎的客人"
1012005-7 = "（因為擔心發生了什麼事情，連忙來到了練習室）"
1012005-8 = "（然而卻沒看到夏的身影）"
1012005-12 = "老，老，老師……！"
1012005-15 = "― [log=나츠 밴드]這，這邊……在這邊，老師……[/log][wa:3790] "
1012005-18 = "[ns]「怎麼了！？」"
1012005-21 = "― [log=나츠 밴드]嗚嗚……就在鼓組的……裡面……[/log][wa:4250] "
1012005-22 = "― [log=나츠 밴드]又黑又動得沙沙作響的……那傢伙。[/log][wa:3950] "
1012005-25 = "― [log=나츠 밴드]不管怎麼找都找不到……[/log][wa:1220] "
1012005-28 = "[ns]「原來夏也有害怕這種東西的一面啊……」"
1012005-31 = "― [log=나츠 밴드]你，你在說什麼啊，老師！？[/log][wa:3870] "
1012005-32 = "― [log=나츠 밴드]奇普托斯沒有不怕那東西的女高中生好嗎！？[/log][wa:4260] "
1012005-35 = "― [log=나츠 밴드]比子彈什麼的還要恐怖多了好嗎！？[/log][wa:1460] "
1012005-38 = "[ns]「感覺我的常識被顛覆了……」"
1012005-41 = "― [log=나츠 밴드]嗚嗚，再這樣下去……[/log][wa:1960] "
1012005-44 = "― [log=나츠 밴드]好不容易才拿到的限定Macadamia餅乾……[/log][wa:1360] "
1012005-45 = "― [log=나츠 밴드]就要變成犧牲品了…… [/log][wa:2700] "
1012005-48 = "[ns]「原來你怕的是這個嗎……！」"
1012005-51 = "― [log=나츠 밴드]所以拜託你了，老師……[/log][wa:1960] "
1012005-52 = "― [log=나츠 밴드]幫幫我……[/log][wa:2130] "
1012005-55 = "（之後和夏一起找遍了練習室）"
1012005-60 = "（……然而最後找到的並不是蟑螂，而是一團像蟲子的黑色灰塵）"
1012005-61 = "（將灰塵清掉後，回到了夏身邊）"
1012005-63 = "啊……只是灰塵？不是蟑螂？"
1012005-64 = "……"
1012005-65 = "……那也沒關係。"
1012005-67 = "因為它還是可能污染我的Macadamia餅乾！"
1012005-69 = "所以謝謝你，老師。#n謝謝你拯救了我的餅乾。"
1012005-70 = "這下總算能繼續放心練習…… "
1012005-74 = "……好像也不行了呢。"
1012005-75 = "[s]「就是說啊……鼓組都被拆得亂七八糟了……」"
1012005-76 = "這是為了抓到兇手的必要犧牲……沒辦法，只能重新組裝了。"
1012005-77 = "嗯？問我為什麼一個人練習？"
1012005-78 = "因為鼓只有在這個地方才能練習。"
1012005-79 = "吉他或鍵盤只要調低音量，就算在宿舍也能練習，而鼓卻沒辦法這麼做。"
1012005-80 = "所以除了合奏的日子以外，我也會自己過來練習。"
1012005-81 = "會不會覺得孤單？"
1012005-82 = "要說孤單確實是有點孤單……"
1012005-83 = "不過也是因為這樣，我才能見到老師不是嗎？"
1012005-84 = "壞事和好事，總是會像甜味和鹹味一樣交替出現。"
1012005-85 = "那麼……"
1012005-86 = "來做個收尾吧！"
1012005-88 = "（於是和夏一起將鼓組重新組裝好）"
1012005-89 = "（最後一起享用的Macadamia餅乾，味道真的很棒）"

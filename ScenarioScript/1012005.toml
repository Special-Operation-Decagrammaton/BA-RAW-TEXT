[translation]
1012005-1 = "Uninvited Guests, Welcomed Guests"
1012005-7 = "I rushed to the practice room in a hurry."
1012005-8 = "But I couldn't find Natsu..."
1012005-12 = "S-Sensei..."
1012005-15 = "― [log=나츠 밴드]H-Here... Over here, Sensei...[/log][wa:3150] "
1012005-18 = "[ns] \"What's going on?!\""
1012005-21 = "― [log=나츠 밴드]Ugh... It's in the...drum set...[/log][wa:3570] "
1012005-22 = "― [log=나츠 밴드]A black, rustling, and crawling...thing.[/log][wa:2990] "
1012005-25 = "― [log=나츠 밴드]I've turned this place upside down, and I still can't find it...[/log][wa:10] "
1012005-28 = "[ns] \"So you are scared, Natsu...\""
1012005-31 = "― [log=나츠 밴드]Wh-What are you talking about, Sensei?![/log][wa:2830] "
1012005-32 = "― [log=나츠 밴드]There's not a single high school girl in Kivotos who wouldn't be scared of that thing![/log][wa:1620] "
1012005-35 = "― [log=나츠 밴드]It's way scarier than something like a bullet![/log][wa:260] "
1012005-38 = "[ns] \"I feel like my sanity is under attack...\""
1012005-41 = "― [log=나츠 밴드]Ugh, at this rate...[/log][wa:1560] "
1012005-44 = "― [log=나츠 밴드]The limited-edition macadamia cookies I worked so hard for...[/log][wa:10] "
1012005-45 = "― [log=나츠 밴드]...will be lost... [/log][wa:2380] "
1012005-48 = "[ns] \"So that's what you were really scared of...!\""
1012005-51 = "― [log=나츠 밴드]Please, Sensei...[/log][wa:1720] "
1012005-52 = "― [log=나츠 밴드]Save me...[/log][wa:1930] "
1012005-55 = "After that, I searched every corner of the room with Natsu."
1012005-60 = "It wasn't a snake or even a cockroach...but instead an awe-inspiringly large dust bunny."
1012005-61 = "I tossed it in the trash and returned to Natsu."
1012005-63 = "Dust? It wasn't a cockroach?"
1012005-64 = "..."
1012005-65 = "And yet...nothing has changed."
1012005-67 = "You see, that STILL could have ruined my macadamia levain cookies."
1012005-69 = "So thank you, Sensei. For saving Cookie's life."
1012005-70 = "And now, I can get back to my practice..."
1012005-74 = "...Or not."
1012005-75 = "[s] \"Right... The drum set is all over the place...\""
1012005-76 = "It was a necessary sacrifice in the hunt for the culprit... It couldn't be helped. Shall we put it back together?"
1012005-77 = "Hm? Why was I out here practicing by myself?"
1012005-78 = "It's common courtesy, Sensei."
1012005-79 = "Sure, you can turn down the volume of an electric guitar or keyboard..."
1012005-80 = "But drums can't be quieted... So, between our rehearsals together, I come here to practice on my own."
1012005-81 = "Do I get lonely?"
1012005-82 = "Well...If you call it \"lonely,\" then I suppose..."
1012005-83 = "...I should be thankful that this loneliness brought you to me."
1012005-84 = "Life needs its contrasts, like sweet and salty."
1012005-85 = "Well then..."
1012005-86 = "Let's make some noise!"
1012005-88 = "I helped Natsu reassemble her drum kit."
1012005-89 = "The giant macadamia cookies we shared afterward were amazing."

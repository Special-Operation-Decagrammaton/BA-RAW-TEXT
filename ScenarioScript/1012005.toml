[translation]
1012005-1 = "แขกที่รับเชิญและไม่ได้รับเชิญ"
1012005-7 = "(คุณครูเป็นห่วงว่าจะมีเรื่องอะไรเลยรีบร้อนมาที่ห้องซ้อม)"
1012005-8 = "(แต่พอมาถึงก็ไม่เห็นนัตสึอยู่ในห้องเลย)"
1012005-12 = "คะ... คะ... คุณครู..."
1012005-15 = "― [log=나츠 밴드]ทางนี้... ทางนี้คุณครู...[/log][wa:3350] "
1012005-18 = "[ns] \"มีเรื่องอะไรเหรอ?!\""
1012005-21 = "― [log=나츠 밴드]ฮือ... มันอยู่ตรง... ชุดกลอง...[/log][wa:3610] "
1012005-22 = "― [log=나츠 밴드]เจ้าตัวสีดำๆ...เคลื่อนไหวแล้วมีเสียงแซ่กๆ...[/log][wa:2830] "
1012005-25 = "― [log=나츠 밴드]แต่ไม่ว่าฉันจะหายังไงก็หามันไม่เจอเลย...[/log][wa:60] "
1012005-28 = "[ns] \"นัตสึเองก็มีอะไรที่กลัวด้วยสินะเนี่ย...\""
1012005-31 = "― [log=나츠 밴드]พะ... พูดอะไรน่ะคุณครู?![/log][wa:3430] "
1012005-32 = "― [log=나츠 밴드]ไม่มีนักเรียนหญิงคนไหนในคิโวทอสที่ไม่กลัวเจ้านั่นหรอกนะ![/log][wa:2820] "
1012005-35 = "― [log=나츠 밴드]มันน่ากลัวยิ่งกว่ากระสุนปืนอีก![/log][wa:860] "
1012005-38 = "[ns] \"รู้สึกฟังแล้วมันขัดๆ ยังไงไม่รู้นะ...\""
1012005-41 = "― [log=나츠 밴드]อืม ถ้าเป็นแบบนี้[/log][wa:1680] "
1012005-44 = "― [log=나츠 밴드]คงจะต้องเสียสละคุกกี้แมคคาเดเมีย[/log][wa:1000] "
1012005-45 = "― [log=나츠 밴드]ที่ได้มาไปแน่ๆ เลย...[/log][wa:2300] "
1012005-48 = "[ns] \"สิ่งที่เธอกลัวคือนี่สินะ...!\""
1012005-51 = "― [log=나츠 밴드]เพราะงั้นขอรบกวนด้วยนะคุณครู...[/log][wa:1160] "
1012005-52 = "― [log=나츠 밴드]ช่วยหน่อยเถอะ...[/log][wa:1690] "
1012005-55 = "(หลังช่วยนัตสึค้นทุกซอกทุกมุมในห้อง)"
1012005-60 = "(ก็เจอว่าเจ้าก้อนดำๆ ที่เห็นนั้นไม่ใช่แมลงสาบแต่เป็นแค่ก้อนฝุ่นเท่านั้น)"
1012005-61 = "(หลังจัดการเก็บฝุ่นเรียบร้อยแล้ว คุณครูก็กลับมาหานัตสึอีกครั้ง)"
1012005-63 = "อ่า... ฝุ่นหรอกเหรอ? ไม่ใช่แมลงสาบสินะ"
1012005-64 = "......"
1012005-65 = "แต่ก็ไม่มีอะไรเปลี่ยนหรอกนะ..."
1012005-67 = "เรื่องที่คิงคุกกี้เลอแปงแม็กคาเดเมียอาจปนเปื้อนไปแล้วก็คือเรื่องจริง!"
1012005-69 = "แต่ก็ขอบคุณนะคุณครู ที่ช่วยชีวิตคุกกี้ไว้น่ะ"
1012005-70 = "เท่านี้ก็คงจะฝึกได้อย่างสบายใจ..."
1012005-74 = "ไม่ได้แล้วสินะ..."
1012005-75 = "[s] \"นั่นสินะ ชุดกลองก็โดนรื้อกระจายหมดแล้ว...\""
1012005-76 = "ถือเป็นการเสียสละในการหาตัวการคนร้าย... ช่วยไม่ได้แหละนะ มาประกอบใหม่ดีกว่า"
1012005-77 = "หืม? ทำไมฉันถึงซ้อมอยู่คนเดียวน่ะเหรอ?"
1012005-78 = "ก็กลองมันซ้อมได้แค่ที่นี่ยังไงล่ะ"
1012005-79 = "กีตาร์กับคีย์บอร์ดน่ะ ถ้าลดระดับเสียงลงก็พอเอาไปซ้อมที่หอพักได้ แต่กลองมันทำแบบนั้นไม่ได้น่ะสิ"
1012005-80 = "เพราะงั้นนอกจากวันที่ซ้อมรวมแล้ว ฉันก็มักจะมาซ้อมอยู่ที่นี่คนเดียวเป็นประจำน่ะ"
1012005-81 = "เหงาหรือเปล่าน่ะเหรอ?"
1012005-82 = "ถ้าบอกว่าเหงามันก็เหงาแหละ..."
1012005-83 = "แต่มันก็ทำให้ได้เจอคุณครูแบบนี้ไง"
1012005-84 = "เรื่องร้ายเรื่องดีก็เปรียบเหมือนกับรสหวานกับรสเค็มนั่นละ"
1012005-85 = "เอาละ ถ้างั้น..."
1012005-86 = "มาจัดการให้เสร็จดีกว่า!"
1012005-88 = "(หลังจากนั้นคุณครูก็ช่วยนัตสึประกอบกลองใหม่)"
1012005-89 = "(แล้วก็นั่งกินคิงคุกกี้เลอแปงแม็กคาเดเมียด้วยกันอย่างเอร็ดอร่อย)"

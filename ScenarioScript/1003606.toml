[translation]
1003606-1 = "Picnic Bag"
1003606-2 = "Riverside"
1003606-3 = "I went to the riverside at the agreed time and saw Hinata walking in my direction as I arrived."
1003606-4 = "...Ah! Sensei, here! Over here!"
1003606-5 = "You got here just in time. I knew this would be the perfect spot!"
1003606-6 = "[s1] \"Hi, Hinata.\"\n[s2] \"You seem excited.\""
1003606-7 = "A-Ahaha..."
1003606-8 = "A-Ahaha..."
1003606-9 = "C-Can you tell? I was doing my best to hide it."
1003606-10 = "Well, I was looking forward to seeing you because..."
1003606-11 = "Um, I..."
1003606-12 = "Well..."
1003606-13 = "I wanted to..."
1003606-14 = "[s3] \"...go on a picnic?\"\n[s4] \"Like an outing?\""
1003606-15 = "Y-Yes! That's exactly it!"
1003606-16 = "Y-Yes! That's exactly it!"
1003606-17 = "You always seem to know what I'm trying to say..."
1003606-18 = "Anyway, I thought this would be a nice way to repay you for helping me so much lately."
1003606-19 = "So I prepared something special!"
1003606-20 = "It's a picnic bag!"
1003606-21 = "[s5] \"A picnic bag? Where?\"\n[s6] \"It doesn't look that different from your normal bag...\""
1003606-22 = "So you noticed it looks like my usual one, huh?"
1003606-23 = "So you noticed it looks like my usual one, huh?"
1003606-24 = "Oh."
1003606-25 = "A-Ahaha. I guess you would notice."
1003606-26 = "This is the bag I keep my automatic grenade launcher in."
1003606-27 = "So it actually works like this..."
1003606-32 = "[ns7] \"H-Hinata?\"\n[ns8] \"What are you doing?!\""
1003606-33 = "Oh. No, it's not what you think it is."
1003606-34 = "Oh. No, it's not what you think it is."
1003606-35 = "I was just taking it out to put it to the side."
1003606-40 = "Underneath is..."
1003606-41 = "...wh-what I wanted to show you!"
1003606-42 = "[s9] \"Oh. A packed lunch.\"\n[s10] \"You were keeping it underneath it?\""
1003606-43 = "Heehee..."
1003606-44 = "Heehee..."
1003606-45 = "The bag is pretty big, so there's always plenty of room left over even after I put my automatic grenade launcher in."
1003606-46 = "That's usually where I keep things like a book or a spare change of clothes.#nIt's pretty convenient."
1003606-47 = "Okay. Let me put this back in my bag. Hmph."
1003606-51 = "Heehee."
1003606-52 = "Anyway, back to the main attraction. Now we can start our picnic!"
1003606-53 = "I-I'm not the best chef in Kivotos..."
1003606-54 = "...but I-I worked really hard on it for you."
1003606-55 = "So...I hope you'll like it."
1003606-56 = "Now, if you don't mind, Sensei...open your mouth and say \"ahhh.\""
1003606-60 = "..."
1003606-61 = "[s11] \"Ahhh?\"\n[s12] Open your mouth and wait."
1003606-62 = "Ahhh...!"
1003606-63 = "Ahhh...!"
1003606-65 = "Hinata and I sat next to one another and enjoyed her packed lunch together."
1003606-66 = "Hinata's cooking tasted great, despite her diffidence."

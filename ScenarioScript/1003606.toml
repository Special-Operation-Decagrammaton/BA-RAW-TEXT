1003606-13 = "3;히나타;04;그러니까 그……. 그냥…….\n#3;stiff"
1003606-14 = "[s3] \"……피크닉?\"\n[s4] \"역시 소풍 같은 느낌?\""
1003606-15 = "3;히나타;04;마, 맞아요! 네! 그, 그런 거에요! 바로 그거!\n#3;em;[반응]\n#3;hophop"
1003606-16 = "3;히나타;04;마, 맞아요! 네! 그, 그런 거에요! 바로 그거!\n#3;em;[반응]\n#3;hophop"
1003606-17 = "3;히나타;01;어떻게 항상 선생님께선 제가 하려는 말을 바로 알아차려 주시는지……."
1003606-18 = "3;히나타;03;아무튼 선생님께는 늘 도움만 받았으니, 가끔은 이런 것도 좋지 않을까 해서 말이에요.\n#3;em;[반짝]"

1003606-1 = "#title;피크닉 가방"
1003606-2 = "#place;강변"
1003606-3 = "#na;(시간에 맞춰 강변으로 나가니, 때마침 저 멀리서 다가오고 있던 히나타가 보였다.)"
1003606-4 = "3;히나타;01;……아! 선생님! 여기에요, 여기!\n#3;a\n#3;em;[반응]"
1003606-5 = "3;히나타;01;마침 좋은 곳에서 딱 마주쳤네요. 그렇잖아도 이 자리였으면 좋겠다고 생각하고 있었는데……!"
1003606-6 = "[s1] \"안녕, 히나타.\"\n[s2] \"즐거워 보이네.\""
1003606-7 = "3;히나타;03;아하하하하…….\n#3;em;[///]"
1003606-8 = "3;히나타;03;아하하하하…….\n#3;em;[///]"
1003606-9 = "3;히나타;04;호, 혹시 좀 저 들떠 보이는 건가요……? 티 안 내려고 했는데…….\n#3;stiff"
1003606-10 = "3;히나타;04;뭐, 뭐……. 딱히 대단한 이유로 뵙자고 한 건 아닌데 말이에요.\n#3;em;…"
1003606-11 = "3;히나타;99;그저, 음……. 그게……."

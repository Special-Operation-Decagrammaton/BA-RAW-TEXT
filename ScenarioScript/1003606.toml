[translation]
1003606-1 = "野餐該帶的東西"
1003606-2 = "河邊"
1003606-3 = "（沿著河邊走著走著，沒過多久就遇到了日向）"
1003606-4 = "……啊！老師！在這裡！"
1003606-5 = "抱歉讓您跑一趟，謝謝您願意來……！"
1003606-6 = "[s1]「早安，日向。」\n[s2]「你看起來比平常還要開心呢。」"
1003606-7 = "啊，那個……"
1003606-8 = "啊，那個……"
1003606-9 = "果然會讓人這麼認為嗎……？"
1003606-10 = "那個，今天其實沒什麼特別的理由，或是有什麼重要的事情要說……"
1003606-11 = "只是，該怎麼說呢……"
1003606-12 = "嗯……"
1003606-13 = "就只是出門走走……"
1003606-14 = "[s3]「出來野餐一下嗎？」\n[s4]「出來踏青一下嗎？」"
1003606-15 = "是，是的！就是那種感覺……！"
1003606-16 = "是，是的！就是那種感覺……！"
1003606-17 = "老師真厲害，彷彿看透了我的心……"
1003606-18 = "總，總之，我總是受老師幫助，所以想偶爾用這種方式款待老師……#n雖然可能還不足以回報……"
1003606-19 = "但我還是盡自己所能準備了一番！"
1003606-20 = "請看這些！"
1003606-21 = "[s5]「……哪些？」\n[s6]「嗯……？」"
1003606-22 = "……？"
1003606-23 = "……？"
1003606-24 = "啊，是這個，在這裡面。"
1003606-25 = "這是我平常使用的包包……"
1003606-26 = "其實這個包包裡面的空間很大……"
1003606-27 = "平常這裡面都會放機關槍，嗯。"
1003606-32 = "[ns7]「日向……！？」\n[ns8]「你是要射什麼嗎！？」"
1003606-33 = "啊，不是的，請放心……！"
1003606-34 = "啊，不是的，請放心……！"
1003606-35 = "只是暫時拿出來而已。#n嘿咻……"
1003606-40 = "然後這下面……"
1003606-41 = "啊，找到了！"
1003606-42 = "[s9]「……啊，是便當盒。」\n[s10]「原來放到下面了啊。」"
1003606-43 = "是，耶嘿嘿……"
1003606-44 = "是，耶嘿嘿……"
1003606-45 = "這個包包就算放了機關槍之後還是有很多空間，非常方便唷。"
1003606-46 = "平常還會另外放書，或是替換用的衣物等等！"
1003606-47 = "嘿咻，再把這些放回包包裡……"
1003606-51 = "……好，可以了。"
1003606-52 = "那麼容我重來一次……"
1003606-53 = "雖，雖然我對自己的手藝不太有信心……"
1003606-54 = "但，但我還是努力，為老師做了這個便當……"
1003606-55 = "希，希望老師能喜歡……"
1003606-56 = "那麼……"
1003606-60 = "啊，啊～……！"
1003606-61 = "[s11]「啊～……」\n[s12] 閉上眼把嘴張開"
1003606-62 = "請，請用……！"
1003606-63 = "請，請用……！"
1003606-65 = "（於是便和日向一起享用了美味的便當）"
1003606-66 = "（雖然日向說沒有信心，但他的便當非常好吃，調味相當細膩出色）"

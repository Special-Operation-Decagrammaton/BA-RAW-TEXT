[translation]
1003606-1 = "กระเป๋าปิกนิก"
1003606-2 = "ริมแม่น้ำ"
1003606-3 = "(คุณครูมาถึงที่ริมแม่น้ำ และเห็นฮินาตะเดินมาจากไกลๆ)"
1003606-4 = "อ๊ะ...! คุณครู! ทางนี้ค่ะ ทางนี้~"
1003606-5 = "บังเอิญจังเลยค่ะ ฉันกำลังคิดอยู่เลยว่าอยากมาเจอคุณครูตรงนี้...!"
1003606-6 = "[s1] \"ว่าไง ฮินาตะ\"\n[s2] \"วันนี้ดูร่าเริงมากเลยนะ\""
1003606-7 = "อ่ะฮะฮะฮะ..."
1003606-8 = "อ่ะฮะฮะฮะ..."
1003606-9 = "ฉันดูตื่นเต้นเกินไปงั้นเหรอคะ...? ฉันพยายามจะไม่แสดงออกอยู่แล้วเชียว..."
1003606-10 = "คือ... ที่ฉันชวนคุณครูออกมาก็ไม่ใช่เพราะเรื่องอะไรหรอกค่ะ..."
1003606-11 = "คือว่าฉัน... คือว่า..."
1003606-12 = "คือ..."
1003606-13 = "ฉันก็แค่อยากจะ..."
1003606-14 = "[s3] \"อยากมาปิกนิกเหรอ...?\"\n[s4] \"เหมือนมาปิกนิกกันเลยนะ?\""
1003606-15 = "ชะ... ใช่แล้วค่ะ"
1003606-16 = "ชะ... ใช่แล้วค่ะ"
1003606-17 = "ดูเหมือนคุณครูจะรู้ตลอดเลยนะคะว่าฉันอยากจะพูดอะไร..."
1003606-18 = "ที่ผ่านมาฉันได้รับความช่วยเหลือจากคุณครูมาตลอด ก็เลยอยากชวนคุณครูมาที่นี่เพื่อตอบแทน..."
1003606-19 = "เพราะงั้นฉันก็เลยเตรียมอะไรมานิดหน่อยค่ะ!!"
1003606-20 = "นั่นก็คือกระเป๋าปิกนิกค่ะ!"
1003606-21 = "[s5] \"กระเป๋าปิกนิก? ไหนเหรอ?\n[s6] \"ก็กระเป๋าที่หิ้วไปมาทุกวันนี่นา\""
1003606-22 = "คะ...? คุณครูสังเกตเห็นด้วยเหรอคะว่ามันเหมือนกระเป๋าที่ฉันใช้ทุกวัน?"
1003606-23 = "คุณครูสังเกตเห็นด้วยเหรอคะว่ามันเหมือนกระเป๋าที่ฉันใช้ทุกวัน?"
1003606-24 = "เอ่อ..."
1003606-25 = "อ่ะฮะฮะฮะ... คุณครูอาจจะมองแบบนั้นก็ได้"
1003606-26 = "ใช่แล้วล่ะค่ะ นี่คือกระเป๋าที่ฉันติดตั้งปืนกลไว้ข้างในค่ะ"
1003606-27 = "แต่ว่า... ที่จริงแล้วมันเป็นแบบนี้ค่ะ..."
1003606-32 = "[ns7] \"ฮินาตะ...?\"\n[ns8] \"จู่ๆ จะทำอะไรน่ะ!?\""
1003606-33 = "อ๊ะ เปล่านะคะ ไม่ใช่อย่างที่คุณครูคิดหรอกค่ะ"
1003606-34 = "อ๊ะ เปล่านะคะ ไม่ใช่อย่างที่คุณครูคิดหรอกค่ะ"
1003606-35 = "ฉันก็แค่เอาออกมาเฉยๆ ค่ะ เอาอันนี้มาไว้ข้างๆ แบบนี้"
1003606-40 = "ส่วนตรงข้างล่าง..."
1003606-41 = "นะ...นี่คือสิ่งที่ฉันอยากให้คุณครูได้เห็นค่ะ!"
1003606-42 = "[s9] \"อ๋อ ข้าวกล่องสินะ\"\n[s10] \"เอาใส่ไว้ข้างล่างตรงนั้นเองเหรอ?\""
1003606-43 = "ฮิฮิฮิ..."
1003606-44 = "ฮิฮิฮิ..."
1003606-45 = "กระเป๋าของฉันค่อนข้างใหญ่ ถึงจะใส่ปืนกลไว้ข้างในก็ยังมีพื้นที่เหลืออีกเยอะเลยค่ะ"
1003606-46 = "ปกติฉันจะเอาหนังสือและเสื้อผ้าหลายชุดใส่ไว้ด้วย มันสะดวกดีมากเลยค่ะ"
1003606-47 = "เอาละค่ะ ฉันจะเอาอันนี้ใส่กลับเข้าไป..."
1003606-51 = "ฮิฮิฮิ..."
1003606-52 = "เอาล่ะ งั้นมาเริ่ม 'การปิกนิก' ของเราเลยดีมั้ยคะ?"
1003606-53 = "ฉันไม่ค่อยมั่นใจเรื่องการทำอาหารเท่าไรเลย"
1003606-54 = "แต่ฉันก็ตั้งใจทำมาสุดฝีมือเพื่อคุณครูเลยนะคะ..."
1003606-55 = "หวังว่า... คุณครูจะชอบอาหารของฉันนะคะ..."
1003606-56 = "ถ้างั้นฉันจะขอ... เอ่อ... คุณครูอ้าปากสิคะ... อ้าม~"
1003606-60 = "อ๊ะ..."
1003606-61 = "[s11] \"หืม...?\"\n[s12] อ้าปากรออย่างสงบเสงี่ยม"
1003606-62 = "อ้ามมม...!"
1003606-63 = "อ้ามมม...!"
1003606-65 = "(คุณครูนั่งข้างๆ ฮินาตะแล้วกินข้าวกล่องที่เธอเตรียมมาอย่างเอร็ดอร่อย)"
1003606-66 = "(ถึงฮินาตะจะบอกว่าไม่มั่นใจในฝีมือการทำอาหารของตัวเอง แต่ว่าอาหารที่เธอทำมากลับอร่อยมาก)"

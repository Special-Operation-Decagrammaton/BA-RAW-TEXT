[translation]
10034110-1 = "[D-7]: คิดจะทำแล้วก็ต้องทำให้สุด"
10034110-4 = "เอาละๆ! เหลือเวลาไม่กี่วันแล้ว จากนี้ทุกคนต้องจริงจังแล้วนะ"
10034110-5 = "แต่ที่ผ่านมาเราก็พยายามกันไม่น้อยเลย ยังไงก็คงมีหวังอยู่ เวลา 1 สัปดาห์ที่เหลือก็ใส่ให้เต็มที่นะ!!"
10034110-6 = "เวลาอันแสนสั้นและวันตัดสินชี้ขาด..."
10034110-8 = "แบบนี้มัน... ร็อกจริงๆ เลย"
10034110-9 = "จะพูดแบบนั้นไปถึงเมื่อไรน่ะ"
10034110-10 = "ก็คงอีกสักสัปดาห์น่ะ หรือไม่ก็จนกว่าจะถอดชุดนี้?"
10034110-11 = "เป็นคำพูดตามฤดูกาลรึไง?"
10034110-12 = "ฉันไม่ได้อยากจะทำลายบรรยากาศนะ แต่ได้ยินว่านี่เป็นการคัดเลือกที่มีอัตราการแข่งขันสูงมากๆ มันไม่น่าจะเป็นงานง่ายนะ"
10034110-13 = "ตะ... แต่เราก็ต้องทำได้น่า! อาจจะน่ะ... อื้ม!"
10034110-14 = "ไม่หรอก เราทำได้! อื้ม!"
10034110-15 = "ไอริ...?"
10034110-16 = "เอ่อ... คือ... คือว่า..."
10034110-17 = "อ่า..."
10034110-18 = "ฉันรู้สึกแบบนั้นน่ะ แหะๆๆ..."
10034110-22 = "ก็ใช่ ถ้าคิดจะทำแล้วก็ต้องทำให้ถึงที่สุดสิ ว่ามั้ย?"
10034110-23 = "อะไรกัน??? จู่ๆ ก็ทัศนคติดีเฉย?"
10034110-24 = "เอาละๆ! เลิกพูดเหลวไหลได้แล้ว นี่ไม่ใช่เวลาจะมาอยู่เฉยกันนะ!!"
10034110-25 = "มาเริ่มกันเลย!!"
10034110-26 = "แล้วทำไมอยู่ๆ ถึงมาสั่งเนี่ย เพี้ยนไปแล้วรึเปล่า?"

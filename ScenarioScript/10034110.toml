[translation]
10034110-1 = "7天前：既然要做就要做到好"
10034110-4 = "來來來！沒剩幾天了，接下來我們得好好認真才行。"
10034110-5 = "雖然這段期間一直有在努力練習，應該多少會有勝算。#n不過最後一週還是要加緊衝刺！！"
10034110-6 = "瀕臨死線和決戰之日……"
10034110-8 = "……果然很搖滾。"
10034110-9 = "你那句台詞打算用到什麼時候？"
10034110-10 = "……大概再一週？或者直到脫下這身衣服為止？"
10034110-11 = "搞得像期間限定的台詞一樣……"
10034110-12 = "雖然不想潑大家冷水，但聽說這次活動的競爭相當激烈。#n恐怕沒那麼容易。"
10034110-13 = "就，就算這樣，我們還是辦得到的！大概……應該！"
10034110-14 = "……不，是一定辦得到！嗯！"
10034110-15 = "……愛莉？"
10034110-16 = "那個……我……"
10034110-17 = "就是……"
10034110-18 = "就是有那種感覺。嘿嘿……"
10034110-22 = "……沒錯，既然要做就要做到最好，是吧？"
10034110-23 = "……？？？#n態度也轉得太快了吧？"
10034110-24 = "好了好了！別廢話了！時間不多！！"
10034110-25 = "……開始吧！！"
10034110-26 = "憑什麼是你來下令啊。"

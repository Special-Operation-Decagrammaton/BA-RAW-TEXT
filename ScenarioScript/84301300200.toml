[translation]
84301300200-5 = "……果然發生了那種事啊。"
84301300200-6 = "（果然……）"
84301300200-7 = "看來那在這裡是稀鬆平常的事呢。"
84301300200-8 = "實際上的確是家常便飯了。#n如果連那種事都要C&C一一追查的話，我們恐怕會因為過勞而暈倒吧。"
84301300200-9 = "剛才說的……「哪裡發生什麼吵鬧的事都不奇怪」就是這個意思。"
84301300200-10 = "如果有哪裡受傷的話……記得要立刻跟我說。"
84301300200-11 = "沒有，我真的沒事。請別在意。"
84301300200-12 = "我反而想繼續尋找這方面的事。"
84301300200-13 = "是指那些情況嗎？為什麼……"
84301300200-15 = "是不是因為很有趣？我也覺得很開心哦？"
84301300200-16 = "前輩……我們可是來護衛這位客人的……"
84301300200-17 = "真抱歉像個淘氣的小姐一樣。#n不過就像明日奈同學說的一樣，我也感到很開心。"
84301300200-18 = "話說回來，我剛才聽說了「工程師部」的事。#n機械鱷魚應該就是在那裡製造的吧。"
84301300200-19 = "那裡是什麼樣的地方呢？"
84301300200-23 = "那，那裡……！"
84301300200-24 = "是個超好玩的地方哦！#n工程師部製造了很多非常神奇的東西！"
84301300200-25 = "前輩……！！"
84301300200-27 = "呵呵，這樣啊。#n那我們直接去找工程師部吧？"
84301300200-28 = "畢竟……我還是想深入了解這件事。"
84301300200-29 = "……你是認真的嗎？"
84301300200-33 = "沒想到像你這種大小姐也有讓人疲累的一面。"
84301300200-34 = "很遺憾這似乎是事實，希望你能見諒。#n要更隨意地對待我也沒關係的。"
84301300200-35 = "……那麼，能麻煩兩位帶我去「工程師部」嗎？"
84301300200-36 = "好～！現在立刻出發！"
84301300200-37 = "唉……"
84301300200-38 = "真拿你沒辦法。#n誰叫顧客至上是我們的座右銘呢。"
84301300200-39 = "如果是工程師部的話，研討會應該有更仔細地檢查過才對。"
84301300200-40 = "……嗯，一定沒問題的。"

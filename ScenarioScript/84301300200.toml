[translation]
84301300200-5 = "ว่าแล้วเชียว เกิดเรื่องแบบนั้นสินะ..."
84301300200-6 = "(ว่าแล้วเชียว... งั้นเหรอ?)"
84301300200-7 = "นี่คงเป็นเรื่องปกติของที่นี่สินะคะ"
84301300200-8 = "เรียกว่าเป็นเรื่องปกติในชีวิตประจำวันเลยละ แล้ว C&C ก็ต้องตามจัดการเรื่องแบบนั้น พวกเราน่ะทำงานหนักจนจะเป็นลมกันเลย"
84301300200-9 = "ที่ฉันบอกว่า... 'เกิดความโกลาหลทุกอย่างได้ในทุกที่ของมิลเลเนียม' ก็หมายความแบบนี้นั่นแหละ"
84301300200-10 = "ถ้าได้รับบาดเจ็บ... หรือถ้ามีเรื่องอะไรก็มาบอกฉันทันทีเลยนะ"
84301300200-11 = "ฉันไม่เป็นอะไรจริงๆ ค่ะ ไม่ต้องห่วงนะคะ"
84301300200-12 = "กลายเป็นว่าฉันยิ่งอยากรู้เรื่องแบบนั้นมากกว่าเดิมอีกค่ะ"
84301300200-13 = "สถานการณ์แบบนั้นน่ะเหรอ? ทำไมล่ะ..."
84301300200-15 = "ก็เพราะมันสนุกไง ฉันเองก็คิดแบบนั้นนะ"
84301300200-16 = "รุ่นพี่... เรามาเป็นไกด์และคุ้มกันคนคนนี้นะ..."
84301300200-17 = "ขอโทษที่ฉันทำตัวเหมือนคุณหนูขาลุยนะคะ แต่คุณอาสึนะพูดถูกแล้วละค่ะ ฉันก็สนุกกับเรื่องแบบนั้น#nเหมือนกันค่ะ"
84301300200-18 = "จะว่าไปแล้ว เมื่อกี้ฉันได้ยินเกี่ยวกับ 'ชมรมวิศวกรรม' มาด้วย ได้ยินว่าหุ่นยนต์จระเข้อาจจะถูกสร้างขึ้น#nที่นั่นก็ได้ค่ะ"
84301300200-19 = "ปกติชมรมนั้นจะทำอะไรกันเหรอคะ?"
84301300200-23 = "ชะ... ชมรมนั้นน่ะเหรอ...!"
84301300200-24 = "เป็นชมรมที่สนุกมากเลยละ! ชมรมวิศวกรรมประดิษฐ์ของน่าทึ่งเยอะแยะเลยนะ!"
84301300200-25 = "รุ่นพี่...!!"
84301300200-27 = "ฮุฮุ อย่างนี้เองสินะคะ งั้นต่อไปเราไปดูงานของชมรมวิศวกรรมดีมั้ยคะ? "
84301300200-28 = "ฉันอยากจะ... สำรวจเกี่ยวกับเรื่องนี้ให้มากขึ้นน่ะค่ะ"
84301300200-29 = "จริงเหรอ...?"
84301300200-33 = "เป็นคุณหนูที่ชอบทำอะไรให้เหนื่อยใจจังเลยนะ"
84301300200-34 = "ฉันต้องขอโทษด้วยแต่มันคือเรื่องจริง ช่วยเข้าใจในส่วนนี้และทำตัวตามสบายกับฉันให้มากขึ้นได้เลยค่ะ"
84301300200-35 = "ช่วยพาฉันไปที่ <ชมรมวิศวกรรม> ได้มั้ยคะ?"
84301300200-36 = "ได้สิ! งั้นก็ไปกันเลย!"
84301300200-37 = "เฮ้อ..."
84301300200-38 = "ช่วยไม่ได้สินะ ก็คติของเราคือการทำทุกอย่างตามที่ลูกค้าต้องการนี่เนอะ"
84301300200-39 = "แต่ถ้าเป็นชมรมวิศวกรรม ทางเซมิน่าก็จะตรวจสอบอย่างถี่ถ้วนกว่าชมรมอื่นอยู่แล้ว"
84301300200-40 = "งั้นก็ไม่น่ามีเรื่องอะไรหรอก..."

[translation]
84301300200-5 = "...Yes, I knew that was going to go wrong."
84301300200-6 = "(I knew...)"
84301300200-7 = "Is that sort of...incident common around here?"
84301300200-8 = "Oh, it's a daily occurrence. If they sent C&C out for every incident, we'd have all collapsed from exhaustion a long time ago."
84301300200-9 = "This is what we meant by \"anything can be loud\" earlier."
84301300200-10 = "You're not hurt, are you? Please let us know if so."
84301300200-11 = "No, I'm fine, really. Don't mind me."
84301300200-12 = "If anything, I'd like to see MORE of these incidents."
84301300200-13 = "More? Why...?"
84301300200-15 = "Because they're fun, right? I think they're fun."
84301300200-16 = "Asuna, we're bodyguards here, not thrillseekers."
84301300200-17 = "Well, I don't want to be a troublemaker, but I agree with Asuna. That was pretty fun."
84301300200-18 = "Come to think of it, I heard something about the Engineering Department earlier. They say that department might have made the robot crocodile."
84301300200-19 = "What's their department like, exactly?"
84301300200-23 = "W-Well, it's..."
84301300200-24 = "Oh, it's a wonderful place! They make all kinds of fascinating things!"
84301300200-25 = "Asuna...!!"
84301300200-27 = "Fufu, I see. Well, shall we pay them a visit, then? "
84301300200-28 = "They've...piqued my curiosity, let's put it that way."
84301300200-29 = "Seriously...?"
84301300200-33 = "You ARE a troublemaker."
84301300200-34 = "Well, I can't help what I'm interested in. I hope you understand. You don't have to give me a formal escort. We can all be casual about it."
84301300200-35 = "...Would you walk me over to the Engineering Department, please?"
84301300200-36 = "Yeah! Let's go right now!"
84301300200-37 = "*sigh*"
84301300200-38 = "I guess I have no choice. Whatever the client wants, we're supposed to give it to them."
84301300200-39 = "And apparently, Seminar gave the Engineering Department a close inspection recently."
84301300200-40 = "...I'm sure it will be fine."

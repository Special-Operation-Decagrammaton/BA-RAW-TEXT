[translation]
11134030-1 = "品味;臨時抱佛腳作戰（１）"
11134030-2 = "感覺效果比想像中來得好呢。"
11134030-3 = "……嗯？什麼效果……？"
11134030-4 = "啊啊……是在說演奏前先學習樂理的事嗎？"
11134030-5 = "嗯……我確實也有感覺到。"
11134030-6 = "所謂優秀的將領必須文武雙全。#n如果想登峰造極，就不能有所偏廢。"
11134030-7 = "……不過怎麼突然提這個呢？"
11134030-9 = "其實也沒什麼啦……"
11134030-10 = "只是想說既然學都學了，要不要乾脆把樂理從頭到尾看一遍而已。"
11134030-11 = "這也不無道理。#n比起每次都來回對照，先把一邊做好反而更有效率。"
11134030-12 = "嗯……聽起來是挺有道理的……"
11134030-13 = "不過這樣真的好嗎？感覺唸到一半就會無聊到睡著……"
11134030-14 = "你說你自己嗎？"
11134030-15 = "你也沒好到哪去啦！！"
11134030-16 = "原來我們半斤八兩嗎？"
11134030-17 = "這……雖然是事實，但聽了還是讓人有點火大！！"
11134030-18 = "啊哈哈……"
11134030-19 = "總，總之就先試試看吧？我去把樂譜和書拿過來。"
11134030-20 = "好，那我們來準備座位。"
11134030-21 = "……「臨時抱佛腳作戰」開始！！"

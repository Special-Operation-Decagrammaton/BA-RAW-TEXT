[translation]
11134030-1 = "เซนส์;คลาสทฤษฎีเร่งด่วน 1"
11134030-2 = "ได้ผลมากกว่าที่คิดนะเนี่ย"
11134030-3 = "หืม...? ได้ผลอะไรเหรอ...?"
11134030-4 = "อ้อ... ที่ชวนเรียนทฤษฎีก่อนจะเล่นดนตรีน่ะเหรอ?"
11134030-5 = "อืม... ฉันเองก็รู้สึกแบบนั้นเหมือนกัน"
11134030-6 = "นักรบที่ดีย่อมต้องรู้แจ้งทั้งอักษรศาสตร์และวิชาทางทหาร ถ้าเจาะจงแค่เรื่องเดียวคงไปไม่ถึงชัยชนะ#nสินะ"
11134030-7 = "แล้ว... ทำไมถึงหยิบเรื่องนี้มาพูดเหรอ?"
11134030-9 = "ก็... ไม่ได้มีเหตุผลอะไรอื่นหรอก"
11134030-10 = "ในเมื่อเป็นอย่างนี้แล้ว ฉันว่าเรามาศึกษาทฤษฎีในเรื่องที่เราต้องใช้ตั้งแต่แรกแล้วค่อยมาฝึก#nภาคปฏิบัติดีไหมน่ะ"
11134030-11 = "งั้นเหรอ แทนที่จะเปิดทฤษฎีไปๆ มาๆ แต่ให้เราศึกษาให้ชำนาญตั้งแต่แรกแล้วค่อยเข้าสู่ภาคปฏิบัติ#nสินะ"
11134030-12 = "ก็นะ... พอพูดแบบนั้นมันก็พอฟังขึ้นอยู่..."
11134030-13 = "ว่าแต่จะไม่เป็นอะไรแน่เหรอ? เราอาจจะเบื่อกันกลางคันก็ได้นะ..."
11134030-14 = "เหมือนเธอน่ะเหรอ?"
11134030-15 = "เธอก็เหมือนกันนั่นแหละ!!"
11134030-16 = "เหมือนพวกเรางั้นเหรอ?"
11134030-17 = "มะ... มันก็จริงหรอกนะ แต่ทำไมฉันถึงหัวร้อนเนี่ย!!"
11134030-18 = "อะฮ่าฮ่า..."
11134030-19 = "อะ... เอาเป็นว่าเราลองทำแบบนั้นกันก่อนมั้ย? ฉันจะไปเอาโน้ตเพลงกับหนังสือมาให้นะ"
11134030-20 = "ดีเลย ระหว่างนี้เดี๋ยวพวกเราจัดสถานที่ให้"
11134030-21 = "เริ่ม 'คลาสทฤษฎีเร่งด่วน' ได้!!"

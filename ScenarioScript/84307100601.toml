[translation]
84307100601-6 = "คือว่า..."
84307100601-7 = "จะไม่เป็นไรจริงๆ เหรอ?"
84307100601-8 = "ก็แน่น่ะสิ พูดเหมือนไม่รู้จักอาสึนะอย่างนั้นละ"
84307100601-9 = "บอกตามตรงก็ไม่ได้รู้จักดีหรอก..."
84307100601-10 = "อืม... นั่นสินะ ที่จริงฉันก็เหมือนกัน"
84307100601-11 = "แต่ก็นะ ถ้าฉันบอกว่าไม่เป็นไรก็คือไม่เป็นไร ไม่ต้องกังวลหรอก กับอาสึนะน่ะ ยิ่งกังวลมากเท่าไร คนที่จะติดกับก็คือคนที่กังวลนี่ละ"
84307100601-12 = "อืม..."

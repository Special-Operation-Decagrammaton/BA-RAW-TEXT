10033020-55 = "3;마코토;03;백화요란과의 업무 회담같이 귀찮고, 자잘하고, 솔직히 뭘 하는지 잘 알 수도 없는 데다 밖으로 드러나지도 않는 일 같은 것이야말로 선도부에게 떠넘기면 되는 것이다!\n#3;em;[재잘]"

[translation]
10033020-1 = "第2話;宛如雲霄飛車"
10033020-4 = "為什麼出發前還要集合啊，已經讓人有點煩躁了耶。"
10033020-5 = "這樣把大家聚集起來說個不停，真的很煩對吧？"
10033020-6 = "就是說啊，直接出發不就好了？#n啊，我也要那個果汁。"
10033020-7 = "才不給你咧～想喝自己付錢買。#n嗯？喂！怎麼可以直接用搶的啊！"
10033020-8 = "我喝一口就還你，一口就好！"
10033020-9 = "說好只喝一口，怎麼直接喝了一半啊！！！"
10033020-15 = "真是鬧哄哄的啊，雖然一直都是這個樣子就是了。"
10033020-16 = "就是說啊。#n啊，好像有人準備要丟集束手榴彈了。"
10033020-17 = "那是……反戰車高爆彈？#n和榴彈發射器一起用沒問題嗎？"
10033020-23 = "啊，好像出大事了！超好笑的！"
10033020-24 = "嗯，雖然已經是日常了，不過這種時候那麼做真的好嗎？#n修學旅行都快開始了……"
10033020-25 = "反正如果出了什麼事，風紀委員會也會想辦法解決嘛。哈哈哈。"
10033020-26 = "百鬼夜行……我偶爾會聽見一些傳聞。#n會是個什麼樣的地方呢？"
10033020-27 = "嗯～至少應該不會無聊吧？"
10033020-28 = "好像有什麼演說要開始了？#n全部講完之後再叫我。"
10033020-29 = "那我也來睡吧？反正應該也不重要。"
10033020-34 = "嘻嘻嘻……都集合好了嗎？格黑娜的同學們。"
10033020-35 = "有這麼多人為了見我真琴大人一面而聚在一起，不由得令人讚嘆啊。嘰嘻嘻嘻……！"
10033020-36 = "看吧，伊呂波！#n這就是我真琴大人領導力和影響力的證明！"
10033020-37 = "呼啊……"
10033020-38 = "唉……是是是。#n雖然一眼就能看到大家都在打瞌睡，但既然真琴前輩喜歡……就隨你高興吧。"
10033020-39 = "不愧是前輩！啊！來拍照紀念一下吧？"
10033020-44 = "伊吹也要～千秋前輩。伊吹也要拍照～"
10033020-45 = "沒問題！這是修學旅行值得紀念的第一步！#nC位是伊吹醬，真琴前輩就站旁邊吧！"
10033020-46 = "怎麼當著本人的面這麼說……"
10033020-47 = "啊哈哈！伊呂波醬！那樣才好吧！"
10033020-48 = "沒錯！那樣就對了！"
10033020-49 = "各位，為了紀念這次百鬼夜行的修學旅行，我問你們一個問題。"
10033020-53 = "準備好讚揚我真琴大人的功績了嗎！"
10033020-54 = "你們知不知道是誰讓這次修學旅行成行的？#n當然是我羽沼真琴大人！而不是討人厭的風紀委員會！"
10033020-55 = "跟百花繚亂的業務會議煩人又瑣碎，而且老實說也不太明白他們在做什麼。#n這種不能搬上檯面的事就該由風紀委員會來處理！"
10033020-56 = "……嗯嗯，你說的都對。"
10033020-77 = "……我要說的就是這些！嘻嘻嘻！#n這樣大家都能明白我真琴大人的偉大了吧！"
10033020-78 = "很好！接下來是屬於我們格黑娜的時間！"
10033020-79 = "伊呂波！奏響啟航的鼓聲吧！"
10033020-85 = "嗯，也差不多該出發了……雖然不是搭船去就是了。"
10033020-86 = "那麼，來，伊吹。"
10033020-87 = "姐姐們～要平安回來哦～！"
10033020-92 = "啊，是伊吹醬！"
10033020-93 = "要等我回來唷，伊吹醬！"
10033020-95 = "不對～！伊吹也要一起去呀～！"
10033020-97 = "啊，說的也是！抱歉！"
10033020-98 = "嗯！我開始有點期待了，說不定意外的不錯哦？"
10033020-99 = "走吧？巴士在那邊。"
10033020-104 = "是不是帶太多行李了？還是勉強剛好？"
10033020-105 = "話說百鬼夜行是有名的觀光聖地吧？有點期待呢。"
10033020-106 = "嗯！他們肯定……會準備嚴謹又周密的旅遊計劃吧？"
10033020-111 = "不知不覺就來到了今天……格黑娜的學生要到百鬼夜行來的日子！"
10033020-112 = "糟糕！計畫表，計畫表在哪？我明明放在這裡的！"
10033020-117 = "[ns]「冷靜點，海花。計畫表在這裡！」"
10033020-119 = "謝，謝謝老師。#n其他人還沒回來嗎？"
10033020-120 = "[s1]「他們說要穿上導覽用的衣服……」\n[s2]「那是海花準備的吧？」"
10033020-123 = "沒錯，是為了這次慶典的導覽特別準備的服裝！"
10033020-124 = "[s]（修學旅行不是慶典吧……）"
10033020-125 = "咦？那我為什麼沒有一起穿？"
10033020-126 = "因為像我這種人……就算穿上那種衣服，顯然也幫不上什麼忙……"
10033020-127 = "而且那種工作原本都是由社長負責……"
10033020-128 = "總，總之！"
10033020-129 = "老師可以期待一下哦！#n那是我親自測量、設計，連布料都挑選過的服裝！"
10033020-130 = "[s]「嗯，確實令人期待。」"
10033020-131 = "我們回來了！"
10033020-137 = "怎麼樣呀，海花！老師！#n我們做好萬全的準備回來了！"
10033020-138 = "[s]「整個人看起來完全不一樣了！」"
10033020-139 = "是！謝謝老師！不才菲娜，會乘著這股氣勢努力導覽！"
10033020-144 = "耶嘿嘿。怎麼樣呀，老師？#n我看起來就像成熟的淑女一樣對吧？"
10033020-145 = "[s]「所謂『人靠衣裝』就是這個意思嗎……！」"
10033020-146 = "那當然！我要趁著這個機會，成為更加完美的淑女和戰士！"
10033020-147 = "你說這和戰士好像沒關係？#n是，是嗎……？"
10033020-152 = "呼啊啊……導覽的準備……完成了……"
10033020-153 = "[s]「就連擔任導覽員也無法阻止椿的睡眠修行嗎……！」"
10033020-154 = "嗯……睡覺跟導覽都是修行的一種……"
10033020-156 = "[ns3]「嗯，做得很好！」\n[ns4]「既然大家都準備完了，進入最後的檢查吧！」"
10033020-163 = "是，老師！"
10033020-164 = "首先，第一輛巴士預計將在15點整到達，格黑娜的學生下車大約需要20分鐘。"
10033020-165 = "但那也只是估計而已，實務上通常都會有所延誤！"
10033020-166 = "假設額外需要的時間是3到7分鐘的話，集合完畢的時間應該是15點27分！"
10033020-167 = "既然這樣，要不要乾脆將緩衝時間延長到30分呢？"
10033020-168 = "嗯，就這麼做吧！#n那麼預計在15點30分集合完畢，接著藉由人力車體驗前往第一個參觀地點！"
10033020-169 = "至於人力車一次能運送的人數和需要的時間──"
10033020-170 = "這個要不要直接交給擔任車夫的學生們處理？#n他們應該比我們更專業才對！"
10033020-171 = "可，可是如果不先估算大致情況的話……！"
10033020-172 = "[ns5]「這個部分就相信百鬼夜行吧，海花。」\n[ns6]「不要相信你自己！要相信那個相信著你的百鬼夜行！」"
10033020-175 = "呃，嗯……？#n雖然不是很懂，但我知道了。既然如此……"
10033020-179 = "第一個地點是……咦？真的是這裡嗎，椿部長？#n順序好像改變了耶！？"
10033020-180 = "呼啊……是那裡沒錯……#n因為下一個地點說需要多一點準備時間……"
10033020-181 = "那，那我先修改行程表，重新列印後再發送給大家……"
10033020-182 = "嗯……那些我已經做完了……"
10033020-183 = "什麼時候完成的！？"
10033020-184 = "呼嚕……"
10033020-185 = "嘿嘿，雖然椿前輩看起來好像一直都在睡覺，但該做事的時候還是很確實的哦！"
10033020-186 = "原來如此！這就是所謂的深藏若虛嗎！"
10033020-188 = "啊，那麼接下來是……"
10033020-193 = "接下來是一小段休息兼午餐時間嗎。午餐吃什麼？"
10033020-194 = "我來看看……哦！是火車便當耶？#n好好笑哦，明明是巴士旅行卻吃火車便當！"
10033020-195 = "哼嗯……也算是感受一下氣氛吧？裡面有什麼？"
10033020-196 = "醃竹筍、烤鮭魚、雞蛋捲、涼拌蔬菜和飯糰。#n其實這個火車便當還不錯吧？"
10033020-197 = "雖然其實應該叫做巴士便當。"
10033020-198 = "啊哈哈哈。什麼巴士便當啦！"
10033020-204 = "又怎麼了……？#n啊，原來是因為小菜在吵架。"
10033020-205 = "真的沒有一天是安靜的呢。巴士沒事吧？"
10033020-206 = "看起來還行。"
10033020-207 = "那就沒問題了。#n反正很快就會安靜下來了吧？"
10033020-211 = "這次持續的有點久耶。"
10033020-212 = "我們要不要也去看熱鬧？感覺很有趣耶？"
10033020-213 = "先不了，我可不想讓髮型被毀掉。"
10033020-214 = "啊，那個是不是攜帶用反戰車火箭？"
10033020-219 = "那麼在解散之前，最後再確認一次各自負責的區域吧！#n菲娜，麻煩你了！"
10033020-220 = "了解！我會抱著粉身碎骨的覺悟，誓死捍衛百鬼夜行的榮譽！"
10033020-221 = "[s]「小心不要用力過猛了哦……？」"
10033020-224 = "即使慶典還沒開始，也不能掉以輕心哦，楓！"
10033020-225 = "這點我很清楚！放心交給我吧！"
10033020-226 = "[s]「與其說是擔心，應該說事前檢查就是這樣的……」"
10033020-229 = "椿部長……接下來就麻煩你囉！"
10033020-230 = "嗯嗯……呼嚕……"
10033020-231 = "部長！？"
10033020-232 = "[s]「我相信椿一定會在關鍵的時刻醒來的！」"
10033020-234 = "（就這樣，在眾多學生的期待……）"
10033020-240 = "（以及某位學生的擔憂與不安之下……）"
10033020-253 = "（格黑娜學園的修學旅行……就此開始！）"
10033020-257 = "哇，這裡就是百鬼夜行嗎？"
10033020-258 = "哦，比想像中還有感覺中的感覺耶？"
10033020-259 = "什麼叫感覺中的感覺……"
10033020-260 = "哎呀～懂我意思就好了嘛！"
10033020-262 = "呼，哈，呼，哈……"
10033020-263 = "[s]「海花，不用那麼緊張。」"
10033020-264 = "是，老師。那麼……"
10033020-269 = "格黑娜學園的各位，大家好！#n歡迎來到百鬼夜行！"
10033020-270 = "歡迎──！"
10033020-277 = "嗯，看來已經在等我們了呢，雖然也挺正常的。"
10033020-278 = "哇！是導覽員姐姐們！好可愛！"
10033020-280 = "咦？可愛……姐姐……！？"
10033020-281 = "耶～！感謝稱讚！"
10033020-283 = "咦？是老師耶！老師～！"
10033020-284 = "哇，沒想到會在這裡遇見你！真開心！"
10033020-285 = "[s]「嗨，綺羅羅！繪里香也是！」"
10033020-287 = "啊哈哈哈。#n這次修學旅行，老師也一起來了嗎？一定會很有趣！"
10033020-288 = "嗨，老師。#n難得有機會在這裡見面，要不要握個手紀念一下？"
10033020-289 = "[s]「好哇好哇，能這樣見面真好。」"
10033020-290 = "哇！老師的手果然很溫暖！"
10033020-291 = "請多多指教。#n嗯……畢竟是我們學校的修學旅行，八成不會安安靜靜地結束吧。"
10033020-292 = "應該不會有事吧？#n就算發生什麼事，老師也會處理的。"
10033020-293 = "[s]「交給我臨時領隊[USERNAME]吧。」"
10033020-294 = "嗯嗯！這次旅行結束之後，我們應該還可以見面吧？"
10033020-295 = "稍微自重一點……"
10033020-296 = "咦～繪里香醬不喜歡嗎？"
10033020-297 = "沒有，我不是那個意思……"
10033020-298 = "啊哈哈哈，是嗎？#n總之待會見囉，老師！"
10033020-300 = "嗯？奇怪。#n喂！你有沒有看到我的行李箱？"
10033020-301 = "啊，那個我拿來當椅子用了，因為我不想坐在地板上。"
10033020-302 = "用你的！用你自己的啦！"
10033020-304 = "麻煩注意我這邊！各位接下來的行程是──"
10033020-306 = "不要～我的行李箱太硬了，坐起來很不舒服～"
10033020-307 = "快起來！把行李箱還我！"
10033020-308 = "我直到世界末日都不會起來的！"
10033020-309 = "各，各位同學？#n我明白各位可能有點手忙腳亂，還有一些私事要處理，不過麻煩先注意我這邊……！"
10033020-311 = "你再繼續這樣，我就要把你連行李箱一起炸飛囉？"
10033020-312 = "來啊！反正壞的也是你的行李！"
10033020-313 = "（冷，冷靜點，海花！得好好帶領大家才行。#n　不可以出錯……不可以出錯，不可以出錯……！）"
10033020-314 = "我們百鬼夜行聯合學園，是個著重發展觀光業的自治區……"
10033020-315 = "春天賞櫻花，夏天看煙火，冬天泡溫泉，每個季節都有多樣的活動和慶典。"
10033020-316 = "我們一直致力於盡可能滿足每個季節光臨的客人……"
10033020-317 = "為了實現這個目標，所有社團都在崗位上各司其職。"
10033020-318 = "雖然事實上，每個社團原本都擁有各自的區域，有時也會因為某些原因而彼此爭執，不過現在都已經相互和解，維持著平衡……！還有，還有……！"
10033020-319 = "（海，海花！？）"
10033020-321 = "嗯？怎麼說到一半就卡住了？"
10033020-322 = "加油加油，導覽員醬～！#n他也太緊張了吧。啊哈哈哈！"
10033020-324 = "沒錯！所以格黑娜學園的各位同學！"
10033020-325 = "希望這次的修學旅行，能成為各位難忘的回憶！#n就讓我們的歡迎詞在這裡告一段落吧──！"
10033020-326 = "希望百鬼夜行的這段經歷，可以讓大家感到愉快！謝謝大家！"
10033020-327 = "[ns]「海花，海花！進入下一個環節吧！」"
10033020-328 = "啊……？好，好的！#n那麼，第一個活動是……"
10033020-332 = "就從百鬼夜行的招牌活動「人力車遊覽」開始這次的修學旅行吧！"
10033020-336 = "來來來！歡迎搭乘！#n我們將會像風一樣，迅速且安全地為各位進行導覽！"
10033020-338 = "嘿～人力車啊。挺不錯的嘛？"
10033020-339 = "啊哈哈哈。嗯！看起來很有趣！#n我要搭我要搭！"
10033020-344 = "那要出發囉～！#n請記得抓緊，小心別掉下去了！"
10033020-350 = "謝謝你，菲娜……剛才我的腦袋突然一片空白……"
10033020-351 = "不會不會，你先放輕鬆一點吧，海花。#n腦袋裡一直想著要做好的話，可是會什麼都做不好的哦！"
10033020-352 = "[s]「不過你還是成功做到了呢……做的很好哦，菲娜。」"
10033020-353 = "耶～！這對我來說也是很新鮮的經驗，完全OK！"
10033020-354 = "[ns]「那我們也準備出發吧？」"
10033020-355 = "好的好的！需要人力車嗎？已經準備好了！"
10033020-356 = "沒錯！我們三位，麻煩你了！"
10033020-357 = "三位乘客，收到。#n請小心搭乘……出發囉！"

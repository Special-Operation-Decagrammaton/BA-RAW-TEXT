[translation]
10033020-1 = "ตอนที่ 2;รถไฟเหาะแถวหน้า"
10033020-4 = "รวมตัวก่อนไปทัศนศึกษาเหรอเนี่ย ฉันเริ่มจะไม่ชอบงานนี้แล้วสิ"
10033020-5 = "เรียกนักเรียนมารวมตัวกันแล้วก็พูดนู่นพูดนี่ แบบนี้มันน่ารำคาญนะว่ามั้ย?"
10033020-6 = "พูดอีกก็ถูกอีก ให้เดินทางเลยไม่ได้รึไง อ๊ะ ขอฉันกินน้ำผลไม้นั่นด้วยสิ"
10033020-7 = "ไม่ให้หรอก~ ถ้าอยากกินก็จ่ายเงินซื้อเองสิ เอ๋? นี่! แย่งไปจากมือเลยเรอะ!"
10033020-8 = "ขอกินแค่อึกเดียวน่า เดี๋ยวก็คืนให้แล้ว!"
10033020-9 = "บอกว่ากินแค่อึกเดียว แต่กระดกไปครึ่งหนึ่งแล้วนะ!!!"
10033020-15 = "เอะอะกันจังเลยนะ ถึงปกติพวกเราก็เอะอะกันอยู่แล้วก็เถอะ"
10033020-16 = "นั่นน่ะสิ อ๊ะ ทางนั้นเหมือนกำลังจะขว้างระเบิดมือหรืออะไรเลยละ"
10033020-17 = "นั่นมัน... หัวรบระเบิดแรงสูงพิฆาตรถถังรึเปล่า? ใช้กับปืนยิงระเบิดได้มั้ยนะ?"
10033020-23 = "อ๊ะ มีบางอย่างระเบิดตู้มใหญ่เลยละ! ตลกเป็นบ้าเลย!"
10033020-24 = "อืม... ก็นะ เรื่องแบบนี้ก็เกิดขึ้นเป็นปกติทุกวันอยู่แล้ว แต่นี่ก็เพิ่งจะเรียกรวมตัวไปทัศนศึกษาเองนะ จะทำตัวอย่างนั้นได้เหรอ..."
10033020-25 = "ถ้าเกิดเรื่องอะไรขึ้น คณะกรรมการวินัยคงไม่อยู่เฉยหรอกน่า ฮ่าฮ่าฮ่า!"
10033020-26 = "เฮียกคิยาโค... ฉันก็พอได้ยินข่าวลือมาบ้าง แต่ว่าจะเป็นสถานที่แบบไหนกันนะ"
10033020-27 = "อืม~ ก็คงจะให้ความรู้สึกว่าเป็นที่ที่ไม่น่าเบื่อนะ?"
10033020-28 = "เหมือนจะเริ่มมีประกาศอะไรสักอย่างเลยแฮะ? จบแล้วปลุกฉันทีนะ"
10033020-29 = "ฉันก็นอนด้วยดีมั้ย? ไม่น่ามีอะไรมากมายอยู่แล้วด้วย"
10033020-34 = "หึ... หึหึ... สหายชาวเกเฮนน่า ทุกคนมากันครบแล้วหรือยัง?"
10033020-35 = "ทุกคนมารวมตัวกันเพื่อจะได้เห็นหน้าของเราสินะ ตรงหน้าเราคือภาพที่งดงามจริงๆ หึหึหึหึ!"
10033020-36 = "นี่ อิโรฮะ! ดูเอาไว้นะ ภาพที่เห็นนี้คือสิ่งที่แสดงให้เห็นถึงความเป็นผู้นำและความเฉลียวฉลาดของท่าน#nมาโคโตะผู้นี้!"
10033020-37 = "ฮ้าวว..."
10033020-38 = "เฮ้อ... ค่ะๆ ถึงแม้มองแค่แวบเดียวก็ดูออกว่าทุกคนพากันหลับอยู่ก็เถอะค่ะ ถ้ารุ่นพี่มาโคโตะชอบใจ... ฉันก็จะไม่ขัดค่ะ"
10033020-39 = "สมกับเป็นรุ่นพี่เลยค่ะ! อ๊ะ! ถ่ายรูปไว้เป็นที่ระลึกหน่อยดีไหมคะ?"
10033020-44 = "อิบูกิด้วย~ รุ่นพี่จิอากิ~ อิบูกิขอถ่ายด้วยคนนะ~"
10033020-45 = "ดีเลย! นี่คือก้าวแรกของทัศนศึกษาที่น่าจดจำ! จัดองค์ประกอบให้อิบูกิอยู่ข้างหน้า แล้วให้รุ่นพี่มาโคโตะโผล่มาแจม!"
10033020-46 = "แล้วก็ให้นักเรียนที่ไปทัศนศึกษาเป็นฉากหลัง..."
10033020-47 = "อะฮ่าฮ่า! อิโรฮะจัง! แบบนั้นดีเลยละ! เอาแบบนั้นเลย!"
10033020-48 = "อื้อ! แบบนั้นดีเลย!"
10033020-49 = "เอาละ เพื่อเป็นการฉลองการไปทัศนศึกษาที่เฮียกคิยาโคครั้งนี้ เราจะขอถามทุกคนว่า"
10033020-53 = "พร้อมที่จะสรรเสริญผลงานและความสำเร็จของท่านมาโคโตะผู้นี้แล้วหรือยัง!"
10033020-54 = "การทัศนศึกษาครั้งนี้มีได้เพราะใคร! เพราะฮานุมะ มาโคโตะยังไงล่ะ! ไม่ใช่เพราะการช่วยเหลือของ#nคณะกรรมการวินัยที่น่ารำคาญจนเราไม่อยากจะมองหน้าหรอกนะ!"
10033020-55 = "ส่วนงานที่ไม่ได้สลักสำคัญ งานที่ทำอะไรกันบ้างก็ไม่รู้ และทำแล้วไม่ได้ออกมาข้างนอกเลยอย่างการ#nประชุมงานกับเฮียกกะเรียวรันน่ะ เราโยนไปให้คณะกรรมการวินัยทำแล้ว!"
10033020-56 = "ค่ะ... เป็นอย่างนี้สินะคะ"
10033020-77 = "มันก็เป็นอย่างนี้ละ! หึหึหึ! ทุกคนคงจะรู้ถึงความยิ่งใหญ่ของท่านมาโคโตะผู้นี้แล้วสินะ!"
10033020-78 = "เอาละ ตั้งแต่นี้ไปคือช่วงเวลาแห่งเกเฮนน่าของพวกเรา!"
10033020-79 = "เอาละ! อิโรฮะ! เปิดหวูดออกเดินทางได้!"
10033020-85 = "หวูด? อ่า... ค่ะ แปลว่าถึงเวลาออกเดินทางไปทัศนศึกษาแล้วสินะคะ ถึงแม้หวูดจะเอาไว้ใช้กับเรือ และเราไม่ได้นั่งเรือไปก็เถอะค่ะ"
10033020-86 = "เอาละ อิบูกิ"
10033020-87 = "พวกพี่ๆ~! เดินทางโดยสวัสดิภาพนะ~!"
10033020-92 = "อ๊ะ อิบูกิจัง!"
10033020-93 = "เดี๋ยวฉันกลับมานะ อิบูกิจัง!"
10033020-95 = "ไม่บอกลากันสิ~! อิบูกิก็ไปด้วยนะ~!"
10033020-97 = "จริงด้วย ไปด้วยกันใช่มั้ย! ขอโทษนะ!"
10033020-98 = "อื้ม! ชักจะตื่นเต้นแล้วสิ! งานนี้อาจจะสนุกขึ้นมาจริงๆ ก็ได้นะ"
10033020-99 = "ไปกันเถอะ เห็นว่ารถอยู่ทางนั้นน่ะ"
10033020-104 = "เตรียมสัมภาระมาเยอะรึเปล่า? หรือว่าเอามาแต่ที่จำเป็นเท่านั้น?"
10033020-105 = "เฮียกคิยาโคโด่งดังในแง่ของสถานที่ท่องเที่ยวใช่มั้ย? ชักจะเริ่มตื่นเต้นแล้วแฮะ"
10033020-106 = "อื้ม! ทางนั้นน่าจะเตรียมแผนการท่องเที่ยวแบบละเอียดๆ ไว้ให้เนอะ?"
10033020-111 = "ทำไมเวลาผ่านไปเร็วอย่างนี้ล่ะคะ วันนี้มาถึงจนได้ค่ะ! วันนี้คือวันที่นักเรียนจากเกเฮนน่าจะมาเที่ยวที่#nเฮียกคิยาโคของเรา!"
10033020-112 = "สติฉันเตลิดไปไหนแล้วนะ! ตารางแผนการ ตารางแผนการอยู่ไหนคะ? ฉันมั่นใจว่าวางเอาไว้ตรงนี้นี่นา!"
10033020-117 = "[ns] \"ใจเย็นๆ ก่อน อุมิกะ! เอกสารที่หาอยู่นี่ไง!\""
10033020-119 = "ขะ... ขอบคุณค่ะ คุณครู คนอื่นๆ ยังไม่กลับมาใช่ไหมคะ?"
10033020-120 = "[s1] \"เห็นว่าจะไปเปลี่ยนเป็นชุดไกด์แล้วจะกลับมา...\"\n[s2] \"อุมิกะเป็นคนเตรียมเรื่องชุดใช่มั้ย?\""
10033020-123 = "ใช่ค่ะ เป็นชุดที่ฉันเตรียมไว้เป็นพิเศษเพื่อเตรียมแนะนำเทศกาลนี้เลยค่ะ!"
10033020-124 = "[s] (แต่การทัศนศึกษาไม่ใช่งานเทศกาลนะ...)"
10033020-125 = "คะ? ทำไมฉันถึงไม่ใส่บ้างงั้นเหรอคะ?"
10033020-126 = "ก็คนอย่างฉัน... ต่อให้ใส่ชุดไกด์แบบนั้น ก็คงไม่มีประโยชน์อะไรมากหรอกค่ะ..."
10033020-127 = "จริงๆ เรื่องแบบนี้เป็นหน้าที่ของท่านประธานน่ะ..."
10033020-128 = "เอาเถอะค่ะ เอาเป็นว่าฉันไม่ได้ใส่ชุดไกด์เหมือนคนอื่นค่ะ!"
10033020-129 = "แต่ยังไงก็ตั้งตารอได้เลยค่ะ ชุดพวกนั้นฉันเป็นคนวัดขนาด เลือกดีไซน์ และเลือกผ้าซับในด้วยตัวเอง#nเลยนะคะ!"
10033020-130 = "[s] \"อืม ครูอยากเห็นแล้วสินะ\""
10033020-131 = "พวกฉันกลับมาแล้วค่ะ!"
10033020-137 = "ฉันไปเตรียมพร้อมทุกอย่างมาแล้วค่ะ! อุมิกะ! คุณครู! ฉันดูเป็นยังไงบ้างคะ?"
10033020-138 = "[s] \"พอเปลี่ยนชุดก็ดูเปลี่ยนไปเลยนะ!\""
10033020-139 = "เยส! ขอบคุณค่ะ! พีน่าคนนี้จะสวมบทบาทเป็นไกด์ให้เต็มที่เลยค่ะ!"
10033020-144 = "ฮิฮิ ฉันเป็นยังไงบ้างเหรอคุณครู? ดูเป็นเลดี้ที่โตเป็นผู้ใหญ่แล้วใช่มั้ย?"
10033020-145 = "[s] \"นี่สินะที่บอกว่าไก่งามเพราะขน คนงามเพราะแต่ง\""
10033020-146 = "ใช่แล้ว! ฉันจะใช้โอกาสนี้เกิดใหม่เป็นทั้งเลดี้ที่สมบูรณ์แบบและดูเอลลิสต์เลย!"
10033020-147 = "ดูเอลลิสต์ดูจะไม่เกี่ยวกับงานนี้เหรอ? งะ... งั้นเหรอ...?"
10033020-152 = "ฮ้าวว... เตรียมตัวเป็นไกด์... เสร็จแล้ว..."
10033020-153 = "[s] \"ชุดไกด์ก็ทำอะไรกับการฝึกนอนกลางวันของสึบากิไม่ได้สินะ...!\""
10033020-154 = "งืม... ฉันจะฝึกทั้งการเป็นไกด์และการนอนไปพร้อมกันเลย..."
10033020-156 = "[ns3] \"ดีละ ทุกอย่างสมบูรณ์แบบ!\"\n[ns4] \"น่าจะเตรียมตัวกันพร้อมแล้ว งั้นเรามารีเช็กรอบสุดท้ายกัน\""
10033020-163 = "ค่ะ คุณครู!"
10033020-164 = "รถคันแรกจะมาถึงเวลาบ่าย 3 โมงตรง คาดว่านักเรียนเกเฮนน่าจะใช้เวลาประมาณ 20 นาทีในการลง#nมาจากรถค่ะ"
10033020-165 = "แต่นั่นก็เป็นแค่ตารางที่กำหนดไว้ เดี๋ยวพอถึงเวลาจริงแล้ว ตรงหน้างานอาจเกิดเรื่องที่ทำให้ต้องใช้#nเวลาเพิ่มก็ได้ค่ะ!"
10033020-166 = "ถ้าเผื่อเวลาสัก 3-7 นาที นักเรียนก็น่าจะลงจากรถและรวมตัวกันเสร็จเวลา 15:27 น. ค่ะ"
10033020-167 = "ฉันว่าเราน่าจะเผื่อเวลาเพิ่มถึงบ่าย 3 โมงครึ่งเลยนะคะ จะได้ไม่ต้องเร่งรีบมากค่ะ!"
10033020-168 = "ค่ะ! ฉันรับความคิดเห็นนั้นค่ะ! เอาเป็นว่านักเรียนจากทางนั้นจะรวมตัวกันเสร็จภายในบ่าย 3 โมงครึ่ง และจากนั้นจะนั่งรถลากไปยังจุดการเรียนรู้นอกสถานที่!"
10033020-169 = "ส่วนเรื่องจำนวนคนที่นั่งรถลากไปแต่ละครั้ง แล้วก็เรื่องเวลาที่ใช้..."
10033020-170 = "อ๊ะ เรื่องนั้นเราฝากกับนักเรียนที่อาสาช่วยเหลือเรื่องรถลากก็ได้นี่? พวกนั้นน่าจะเชี่ยวชาญเรื่องรถลาก#nมากกว่าเรานะ!"
10033020-171 = "ตะ... แต่ถ้าเราไม่ประเมินสถานการณ์และประมาณการคร่าวๆ ไว้ก่อน...!"
10033020-172 = "[ns5] \"ให้เฮียกคิยาโคช่วยจัดการเถอะ อุมิกะ\"\n[ns6] \"เราเชื่อในเฮียกคิยาโคที่เชื่อในอุมิกะอีกทีนะ!\""
10033020-175 = "คะ... คะ...? ถึงจะไม่รู้ว่าหมายความว่ายังไง แต่ก็ได้ค่ะ ถ้างั้นก็..."
10033020-179 = "จุดการเรียนรู้นอกสถานที่จุดแรก... หืม? ตรงนี้จริงๆ เหรอคะ หัวหน้าสึบากิ? ฉันว่าลำดับมันเปลี่ยนไปนะคะ?!"
10033020-180 = "ฮ้าวว... ตรงนั้นละถูกแล้ว... จุดการเรียนรู้ต่อไปต้องใช้เวลาเตรียมตัวน่ะ..."
10033020-181 = "งะ... งั้นเราก็ต้องแก้ไขกำหนดการ เอาไปพิมพ์ใหม่ แล้วค่อยส่งให้ทางนั้นใหม่ แล้วก็...!"
10033020-182 = "อืม... ฉันทำเสร็จหมดแล้วละ..."
10033020-183 = "ตั้งแต่ตอนไหนคะเนี่ย?!"
10033020-184 = "คร่อก... zZz"
10033020-185 = "ฮิฮิ ถึงรุ่นพี่สึบากิจะดูเหมือนนอนอยู่ตลอดเวลา แต่ถึงเวลาทำงานก็ทำให้อย่างสมบูรณ์แบบเลยละ!"
10033020-186 = "เป็นแบบนี้สินะ! ผู้มีความสามารถที่แท้จริงต้องรู้จักซ่อนชั้นเชิงของตัวเองสินะคะ!"
10033020-188 = "อืม ถ้างั้นต่อจากนี้ก็..."
10033020-193 = "เป็นทั้งเวลาพักผ่อน และเวลากินข้าวกลางวันด้วยสินะ เมนูคืออะไรเหรอ?"
10033020-194 = "ไหนดูซิ... โอ้! ข้าวกล่องรถไฟ! ตลกจังเลย ข้าวกล่องรถไฟงั้นเหรอ? เรานั่งรถทัวร์มานะ มันเกี่ยวกับรถไฟยังไงล่ะนั่น!"
10033020-195 = "เอาเถอะ อาจจะให้กินเป็นบรรยากาศน่ะ ในนั้นใส่อะไรมาบ้างเหรอ?"
10033020-196 = "หน่อไม้ผัด แซลมอนย่าง ไข่ม้วน สลัดผัก แล้วก็ข้าวปั้น แบบนี้ไม่เลวเลยนะ?"
10033020-197 = "ควรจะเรียนว่าข้าวกล่องรถทัวร์มากกว่านะ"
10033020-198 = "อะฮ่าฮ่าฮ่า ชื่อเชยชะมัดเลย ข้าวกล่องรถทัวร์งั้นเหรอ"
10033020-204 = "อะไรอีกเนี่ย...? ทะเลาะกันเรื่องกับข้าวงั้นเหรอ?"
10033020-205 = "ขอให้มันมีวันที่เงียบสงบๆ สักวันไม่ได้รึไง รถจะไม่เป็นอะไรใช่มั้ย?"
10033020-206 = "น่าจะเป็นอย่างนั้นนะ"
10033020-207 = "งั้นก็แล้วไป เดี๋ยวก็คงเงียบกันไปเองละเนอะ?"
10033020-211 = "รอบนี้เหมือนจะไม่จบง่ายๆ เลยแฮะ"
10033020-212 = "พวกเราก็ไปดูๆ หน่อยมั้ย? มันน่าสนุกดีนะ"
10033020-213 = "ขอผ่านแล้วกัน ฉันไม่อยากให้ผมเสียทรงน่ะ"
10033020-214 = "อ๊ะ นั่นมันจรวดพิฆาตรถถังแบบพกพาไม่ใช่เหรอ?"
10033020-219 = "ถ้างั้นสุดท้าย! เราจะเช็กจุดที่แต่ละคนรับผิดชอบนะคะ! พีน่า พีน่า? ฝากตรงนี้ด้วยค่ะ!"
10033020-220 = "ได้ค่ะ! ฉันจะอุทิศกายและใจเพื่อรักษาเกียรติภูมิของเฮียกคิยาโคให้เองค่ะ!"
10033020-221 = "[s] \"ถ้ากดดันตัวเองมากไป เดี๋ยวได้ผลตรงกันข้ามหรอกนะ...?\""
10033020-224 = "ต่อให้ตอนนี้จะไม่มีงานเทศกาลอะไรอื่นข้างนอก แต่เราก็จะประมาทไม่ได้นะคะ คาเอเดะ!"
10033020-225 = "ฉันรู้ดีน่า! ไม่ต้องห่วงหรอก!"
10033020-226 = "[s] \"ไม่ได้กังวล... แต่การเตรียมการล่วงหน้าก็มักจะเป็นแบบนี้ละ...\""
10033020-229 = "หัวหน้าสึบากิ... ฉันต้องขอรบกวนจนจบงานด้วยนะคะ!"
10033020-230 = "งืมม... คร่อก zzZ..."
10033020-231 = "ประธานคะ?!"
10033020-232 = "[s] \"ครูเชื่อว่าถ้ามีเรื่องสำคัญ สึบากิจะตื่นขึ้นมานะ!\""
10033020-234 = "(ด้วยความคาดหวังและความคิดที่คุณครูมีต่อนักเรียนเหล่านี้...)"
10033020-240 = "(แม้ว่ากับบางคนจะเป็นความเป็นห่วงและความกังวลก็ตาม...)"
10033020-253 = "(แต่แล้ว... การทัศนศึกษาของสถาบันเกเฮนน่าที่มาเยือนเฮียกคิยาโค... ก็ได้เริ่มขึ้น!)"
10033020-257 = "ว้าว ที่นี่เหรอเฮียกคิยาโค?"
10033020-258 = "โอ้ว บรรยากาศดีมากกว่าที่คิดไว้เยอะเลยนะ"
10033020-259 = "ก็ต้องดีอยู่แล้วละ ได้ยินว่าที่นี่เป็นถึงแหล่งท่องเที่ยวเลยนะ"
10033020-260 = "ก็แหม ใครจะไปรู้ล่ะ เคยมาแล้วรึไง!?"
10033020-262 = "ฮู่ว... ฮ่า... ฮู่ววว... ฮ่าาา..."
10033020-263 = "[s] \"เอาละ อุมิกะ ไม่ต้องประหม่ามากหรอกนะ\""
10033020-264 = "ค่ะคุณครู ถ้างั้นก็..."
10033020-269 = "สวัสดีค่ะ นักเรียนจากสถาบันเกเฮนน่าทุกคน! ยินดีต้อนรับสู่เฮียกคิยาโคของเราค่ะ!"
10033020-270 = "มากันแล้วสินะคะ!"
10033020-277 = "อืม สงสัยจะรอพวกเราอยู่สินะ แต่ก็แน่อยู่แล้วละ"
10033020-278 = "ว้าว! พี่ๆ ไกด์! น่ารักจังเลย!"
10033020-280 = "หืม? พี่ๆ... น่ารักเหรอ...?!"
10033020-281 = "เย้! ขอบคุณนะคะ!"
10033020-283 = "เอ๋? คุณครูนี่นา? ครู!"
10033020-284 = "ว้าว คิดไม่ถึงเลยว่าจะได้มาเจอกันที่นี่! ดีใจที่ได้เจอนะ!"
10033020-285 = "[s] \"สวัสดี คิราระ! เอริกะก็ด้วย ดีใจที่ได้เจอนะ!\""
10033020-287 = "อะฮ่าฮ่าฮ่า ครูก็มาทัศนศึกษาด้วยกันเหรอ? น่าสนุกจัง!"
10033020-288 = "สวัสดีคุณครู มาจับมือเป็นที่ระลึกที่ได้เจอกันหน่อยมั้ย?"
10033020-289 = "[s] \"ได้สิ ดีจังเลยนะที่ได้เจอกันแบบนี้\""
10033020-290 = "ว้าว! มือของครูอุ่นจังเลย!"
10033020-291 = "อืม... นี่เป็นการทัศนศึกษาของเกเฮนน่าทั้งที ฉันว่าอาจจะมีเรื่องวุ่นวายก็ได้ ยังไงก็ฝากตัวด้วยนะ"
10033020-292 = "คงไม่มีเรื่องอะไรใหญ่โตหรอกน่า และต่อให้มีเรื่องอะไรขึ้นมา ครูก็คงเข้ามาช่วยอยู่แล้ว"
10033020-293 = "[s] \"สวัสดี วันนี้ครู [USERNAME] มาเป็นครูแนะแนวชั่วคราวให้น่ะ\""
10033020-294 = "อื้อ! หลังจากจบการทัศนศึกษานี้แล้วเรายังจะได้เจอกันอีกใช่มั้ย?"
10033020-295 = "พูดอะไรระวังหน่อย..."
10033020-296 = "ทำไมเหรอ~ หรือว่าเอริกะจังไม่อยากเจอครู?"
10033020-297 = "ไม่หรอก ก็ไม่ใช่ว่าไม่อยาก..."
10033020-298 = "อะฮ่าฮ่าฮ่า อยากใช่มั้ยล่ะ? งั้นไว้เจอกันนะครู!"
10033020-300 = "เอ๋? แปลกจัง! เห็นกระเป๋าเดินทางฉันมั้ย?"
10033020-301 = "อ๊ะ กระเป๋าเดินทางเหรอ? ฉันเอามานั่งเป็นเก้าอี้อยู่น่ะสิ พอดีไม่อยากนั่งกับพื้นน่ะ"
10033020-302 = "ก็ใช้กระเป๋าของตัวเองไปเซ่! นั่งบนกระเป๋าตัวเองนู่น!"
10033020-304 = "เอาละค่ะ ทุกคน! ต่อไปฉันจะแจ้งกำหนดการ..."
10033020-306 = "ไม่เอาหรอก~ กระเป๋าของฉันมันแข็ง นั่งแล้วเจ็บก้นเป็นบ้า~"
10033020-307 = "เอาคืนมานะ! ลุกขึ้นมาเลย!"
10033020-308 = "ไม่ลุกให้หรอก! ฉันจะนั่งให้รากงอกอยู่ตรงนี้จนกว่าโลกจะแตกไปเลย!"
10033020-309 = "ทะ... ทุกคนคะ? ฉันรู้ว่าทุกคนคงยุ่งและมีหลายอย่างต้องจัดการ แต่ช่วยตั้งใจฟังที่พวกฉันจะแนะนำ...!"
10033020-311 = "ถ้ายังไม่ลุกอยู่อย่างนี้ ฉันจะระเบิดให้กระเป๋าปลิวไปเลยนะ!"
10033020-312 = "เอาสิ! ยังไงซะของข้างในก็เป็นของเธอนี่!"
10033020-313 = "(ตั้งสติไว้ อุมิกะ! เราต้องเป็นผู้นำให้ได้ ห้ามทำพลาด... ห้ามทำพลาด... ห้ามทำพลาด...!)"
10033020-314 = "สหพันธ์เฮียกคิยาโคคือสถานศึกษาในเขตปกครองตนเองที่ถูกพัฒนาจนกลายมาเป็นศูนย์กลางทาง#nการท่องเที่ยว..."
10033020-315 = "เรามีการจัดกิจกรรมและงานเทศกาลในแต่ละฤดู ไม่ว่าจะเป็นเทศกาลชมดอกซากุระในฤดูใบไม้ผลิ เทศกาลดอกไม้ไฟในฤดูร้อน และเทศกาลออนเซ็นในฤดูหนาว"
10033020-316 = "พวกเราพยายามที่จะมอบความพึงพอใจสูงสุดให้กับทุกคนที่มาเยือน..."
10033020-317 = "และเพื่อให้เป็นเช่นนั้น ชมรมทั้งหมดของเราก็ทำหน้าที่ที่ได้รับมอบหมายกันอยู่อย่างเต็มที่ค่ะ"
10033020-318 = "ถึงแม้ว่าแต่ละชมรมจะมีขอบเขตและแนวความคิดที่เป็นอิสระ และอาจจะมีกระทบกระทั่งกันบ้างด้วย#nเหตุผลบางอย่าง แต่ตอนนี้ความขัดแย้งที่มีก็ถูกปิดผนึกไว้ก่อนเพื่อรักษาดุลยภาพ... และก็... และก็...!"
10033020-319 = "(อะ... อุมิกะ?!)"
10033020-321 = "หืม? กำลังพูดเรื่องอะไรอยู่น่ะ?"
10033020-322 = "สู้เค้านะไกด์จัง! ประหม่าเกินไปแล้ว อะฮ่าฮ่าฮ่า!"
10033020-324 = "ค่า! เอาเป็นว่า! หวังว่าการทัศนศึกษาของนักเรียนจากสถาบันเกเฮนน่าในครั้งนี้!"
10033020-325 = "จะเป็นความทรงจำและความประทับใจที่ลืมไม่ลงสำหรับทุกคนนะคะ! พวกเราขอจบการกล่าวต้อนรับ#nแต่เพียงเท่านี้ค่ะ!"
10033020-326 = "หวังว่าการเปิดประสบการณ์ในเฮียกคิยาโคแห่งนี้! ทุกคนจะสนุกและมีความสุขกันนะคะ! ขอบคุณค่ะ!"
10033020-327 = "[ns] \"อุมิกะ อุมิกะ! เริ่มตามกำหนดการเลยเถอะ!\""
10033020-328 = "อ๊ะ...?! ค่ะ ค่ะ! งั้นลำดับแรกของเรา..."
10033020-332 = "ต่อไปเราจะเริ่มกำหนดการแรกของการทัศนศึกษาครั้งนี้ค่ะ นั้นคือการทัวร์รถลาก พาหนะขึ้นชื่อของ#nเฮียกคิยาโคค่ะ!"
10033020-336 = "เอาละๆ รีบขึ้นกันเร็วเข้า! แล้วฉันจะพาเดินทางอย่างปลอดภัยด้วยความเร็วราวกับสายลมเลย!"
10033020-338 = "อ่า... รถลากงั้นเหรอ... ก็ไม่เลวนะ?"
10033020-339 = "อะฮ่าฮ่าฮ่า อื้ม! น่าสนุกดีออก! นั่งด้วยๆ! ขอฉันนั่งด้วยคนนะ!"
10033020-344 = "ถ้างั้นก็ออกตัวได้~! จับให้แน่นๆ นะ จะได้ไม่มีใครตก!"
10033020-350 = "ขอบใจนะพีน่า... จู่ๆ สมองของฉันก็ดับไปเลย..."
10033020-351 = "เอาเถอะๆ ต้องผ่อนคลายก่อนนะคะ อุมิกะ ถ้าเอาแต่กดดันตัวเองว่าต้องทำให้ได้ดี จะกลายเป็นว่าทำได้ไม่เต็มที่สักอย่างนะคะ!"
10033020-352 = "[s] \"เกือบหลับแต่กลับมาได้นะ... เยี่ยมไปเลย พีน่า\""
10033020-353 = "เย้! เป็นประสบการณ์ใหม่ของฉันเลยค่ะ ทำได้ไม่เลวเลย!"
10033020-354 = "[ns] \"งั้นพวกเราก็ตามไปกันมั้ย?\""
10033020-355 = "เอาละ! มีใครอยากนั่งรถลากบ้างคะ? เราเตรียมไว้ให้อย่างดีเลยค่ะ!"
10033020-356 = "พวกเราค่า! ขอพวกเรา 3 คนนั่งไปด้วยนะคะ!"
10033020-357 = "รับทราบค่ะ จับกันให้ดีนะคะ... งั้นก็ไปกันเลย!"

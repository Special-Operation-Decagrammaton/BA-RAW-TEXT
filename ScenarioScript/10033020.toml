[translation]
10033020-1 = "Episode 2;The Front Seat of a Rollercoaster"
10033020-4 = "Ugh. Why're they splitting us into groups for the field trip? This is so dumb."
10033020-5 = "Seriously! I thought we were gonna get out of school, but now we're just getting lectured in a different setting."
10033020-6 = "Should we just bounce? Play hooky for the day? Wait, is that juice? Gimme."
10033020-7 = "Well, sure, but I charge per sip...#nH-Hey! Give it back!"
10033020-8 = "C'mon, don't be so stingy. I just wanna taste it."
10033020-9 = "You already drank half of it!!!"
10033020-15 = "Not that I'm surprised, but they're already causing a ruckus."
10033020-16 = "Seriously. Ah. Look, look. Someone's playing with bombs."
10033020-17 = "That's a high-explosive anti-tank weapon, HEAT for short... Are they trying to stuff it into a grenade launcher?"
10033020-23 = "Hahaha! It went KA-BOOM! Oh my gosh, this trip's a blast already. A BLAST, get it?"
10033020-24 = "I mean, this would be happening whether or not we were going on a field trip. But I feel like now of all times we should be on our best behavior..."
10033020-25 = "Ehhh, the Prefect Team'll step in if things get out of hand. Probably!"
10033020-26 = "I am excited to see Hyakkiyako though. I'm sure the stories don't do it justice."
10033020-27 = "Yeah! I bet it'll be entertaining, at the very least!"
10033020-28 = "Oh, geez. They're starting the live stream. Wake me up when it's over, 'kay?"
10033020-29 = "Wait, wait. I want to nap too! These streams are always sooo boring."
10033020-34 = "Kihehehe! Welcome, welcome, my fellow colleagues! "
10033020-35 = "Look at the masses, all gathered to hear the one and only Makoto speak! I must commit this view to memory forever! Kihehe!"
10033020-36 = "Behold my majesty, Iroha! This is proof of my greatness! Look at how they respect my leadership."
10033020-37 = "*yawn*"
10033020-38 = "*sigh* Yeah, yeah. If you can pretend to ignore everyone falling asleep, so can I. Woo. Go Makoto."
10033020-39 = "As expected of our great leader. Haha! Let's commemorate it with a photo!"
10033020-44 = "Ibuki too, Ibuki too! Chiaki! Picture, please!"
10033020-45 = "You're so photogenic, Ibuki! You'll be the main character for this monumental field trip...with a sprinkle of Makoto, I guess..."
10033020-46 = "The \"mastermind\" behind all of this is just the toppings..."
10033020-47 = "Ahaha! Iroha! That's what makes it so good!"
10033020-48 = "Yes! Exactly what she said!"
10033020-49 = "I will grant you the honor of commemorating our field trip to Hyakkiyako."
10033020-53 = "Prepare yourself to praise the achievements of the great Makoto!"
10033020-54 = "Who made this field trip possible?! Me! Only me! Not a single grain of credit goes to the noxious, despicable Prefect Team!"
10033020-55 = "We'll be making history, while those losers deal with the trivial things like meeting with the Hyakkaryouran! No one cares about that! In fact, I can't even understand it!"
10033020-56 = "Yeah, yeah. Whatever you say, Makoto."
10033020-77 = "...And that is all from your great chairwoman! You should all thank me for showing you how amazing I am! Kihehehe! "
10033020-78 = "We will usher in the age of Gehenna!"
10033020-79 = "It is time, Iroha! Sound the boat horn of departure!"
10033020-85 = "Translation: time to leave for the field trip. On the bus. To clarify, no one is getting on a boat. There isn't even any water between here and Hyakkiyako."
10033020-86 = "Ibuki?"
10033020-87 = "Everyone! Ibuki hopes you have a super duper safe trip!"
10033020-92 = "I-Ibuki!"
10033020-93 = "We'll be back before you know it, Ibuki!"
10033020-95 = "That's not what Ibuki meant! Don't leave Ibuki behind..."
10033020-97 = "My bad, my bad. Of course we wouldn't."
10033020-98 = "I'm getting kinda hyped. This might actually be fun?"
10033020-99 = "All right, little miss hype. The bus is this way."
10033020-104 = "Did I overpack? I hope my bag doesn't go over the weight limit..."
10033020-105 = "Hyakkiyako's super well known for their tourism. I wonder what kind of sights we'll see!"
10033020-106 = "They'll have a super cool itinerary planned for us...right?"
10033020-111 = "Is it truly already the day? The Gehenna students are on their way as we speak! "
10033020-112 = "Oh dear, oh dear. Where's my planner? The planner! We're doomed without it!"
10033020-117 = "[ns] \"Calm down, Umika! It's right here!\""
10033020-119 = "Th-Thank you, Sensei. Have the others returned? "
10033020-120 = "[s1] \"They're getting dressed in their tour guide outfits.\"\n[s2] \"Umika, you made their uniforms, right?\""
10033020-123 = "Yes! I made them especially for this festival!"
10033020-124 = "[s] \"(I really don't know how to tell her that a field trip isn't a festival...)\""
10033020-125 = "...Hm? Why am I not getting dressed?"
10033020-126 = "Well... I just don't think it would really suit me... Being a guide isn't my forte."
10033020-127 = "Normally the boss would be the one interacting with customers..."
10033020-128 = "R-Regardless!"
10033020-129 = "They're going to look great. I did the designing, measuring, and sewing myself!"
10033020-130 = "[s] \"I look forward to seeing your handiwork!\""
10033020-131 = "We're back!"
10033020-137 = "What do you think, Umika, Sensei? We've returned, fully prepared for duty!"
10033020-138 = "[s] \"You look completely different!\""
10033020-139 = "Thank you! I'll perform my role to the best of my ability in my new uniform."
10033020-144 = "What about me, Sensei? Don't I look like a proper lady now? Heehee!"
10033020-145 = "[s] \"So that's what people mean by clothes make the person!\""
10033020-146 = "I know! Imagine how surprised Mimori will be to see the lady and battler I've become!"
10033020-147 = "...I don't need to be a battler for this? O-Oh. I guess not, huh?"
10033020-152 = "*yawn* I'm...all ready...to guide..."
10033020-153 = "[s] \"Tsubaki can sleep train even in her tour guide uniform!\""
10033020-154 = "Sleeping...guiding... It's all training."
10033020-156 = "[ns3] \"Okay. Anyways, everyone looks perfect!\"\n[ns4] \"Let's begin our final checks!\""
10033020-163 = "Yes, Sensei!"
10033020-164 = "The bus is scheduled to arrive at 3:00 PM, and they've estimated about twenty minutes for all the students to get off and collect their things."
10033020-165 = "But never expect for things to go exactly according to plan! There could be delays in arrival, and it may take a while for the students to find all their luggage."
10033020-166 = "If we account for three to seven minutes of delays, we can expect the students to be ready by 3:27 PM!"
10033020-167 = "People are very unpredictable, so I would suggest at least until 3:30 PM!"
10033020-168 = "F-Fantastic idea! Then, after that, we will move on to the first item on the itinerary: the rickshaw experience."
10033020-169 = "Considering the limited number of people that can ride a rickshaw at once and the time it takes—"
10033020-170 = "We should leave that stuff to the rickshaw staff! They're the real experts, after all!"
10033020-171 = "B-But we should carefully manage every minute of the day..."
10033020-172 = "[ns5] \"Let's trust our fellow Hyakkiyako students here, Umika.\"\n[ns6] \"Trust in the Hyakkiyako that trusts you!\""
10033020-175 = "Th-That doesn't quite make sense to me, but I'll go along with it. Next up..."
10033020-179 = "The first big attraction on our tour will be... Huh?! Did we switch something on the itinerary, Tsubaki?"
10033020-180 = "*yawn* Yeah, we had to. The next place asked for more time, so..."
10033020-181 = "Th-Then we need to edit all the paperwork and reprint...!"
10033020-182 = "Don't worry... Already done..."
10033020-183 = "Already?! "
10033020-184 = "Zzz..."
10033020-185 = "That's Tsubaki for you! Heehee. Don't let her sleep training fool you. She always gets the job done."
10033020-186 = "I see! The truly skilled must hide their powers under their calm exterior!"
10033020-188 = "Th-That's great. Moving on...!"
10033020-193 = "Lunch break? What's on the menu?"
10033020-194 = "Let's see... Hahaha! A train bento! Why in the world are they passing out train bentos on a bus?"
10033020-195 = "It sets the mood, don't you think? What's in it?"
10033020-196 = "Braised bamboo shoots, fried salmon, rolled omelet, seasoned vegetables, and rice balls. That's pretty good, actually."
10033020-197 = "We can call it a bus bento."
10033020-198 = "Hahaha! The name's as silly as the concept. "
10033020-204 = "What is it now? They're fighting over food, huh?"
10033020-205 = "I mean, as long as they're not breaking the bus, what're you gonna do, right?"
10033020-206 = "You've got to take what you can get."
10033020-207 = "Exactly! I'm sure they'll get bored and chill out at some point."
10033020-211 = "I don't think \"chilling out\" is really in their vocabulary."
10033020-212 = "Should we join in on the fun?"
10033020-213 = "I'll pass. I don't want to mess up my hair."
10033020-214 = "Oh my gosh, how cute is that. An anti-tank rocket, but portable!"
10033020-219 = "I'm going to go do final checks on all the attractions. Pina, please take charge while I'm gone!"
10033020-220 = "Yes! I will work to my very bone and secure the honor of Hyakkiyako!"
10033020-221 = "[s] \"Let's reel in the enthusiasm just a tiny bit.\""
10033020-224 = "There might not be an active festival at the moment, but you never know what might happen, Kaede!"
10033020-225 = "I'm on full alert!"
10033020-226 = "[s] \"Somehow this final check is making me more anxious...\""
10033020-229 = "I'll be counting on you, President Tsubaki!"
10033020-230 = "M...hm... Zzz... *snore*"
10033020-231 = "President?!"
10033020-232 = "[s] \"Don't freak out! She always wakes up in the nick of time!\""
10033020-234 = "The air was abuzz with excitement and anticipation..."
10033020-240 = "...And with the anxious concerns from one particular student."
10033020-253 = "But the Gehenna Academy's field trip began at last!"
10033020-257 = "Whoa. So, this is Hyakkiyako."
10033020-258 = "The vibes are seriously immaculate!"
10033020-259 = "What...does that even mean?"
10033020-260 = "This and that! If you know you know, you know?"
10033020-262 = "*inhale* *exhale* *inhale* *exhale*"
10033020-263 = "[s] \"Please don't faint, Umika.\""
10033020-264 = "O-Of course not, Sensei! I'm...prepared!"
10033020-269 = "Welcome, students from Gehenna Academy! Welcome to Hyakkiyako!"
10033020-270 = "We're so pleased to have you!"
10033020-277 = "I guess we should've expected a welcoming party."
10033020-278 = "Heehee. Look at the guide sisters! They're so cute!"
10033020-280 = "C-Cute?! Sisters...?"
10033020-281 = "That's very kind of you! Thank you!"
10033020-283 = "No way! Is that Sensei?!"
10033020-284 = "Am I seeing things? Hahaha! Hi, Teach!"
10033020-285 = "[s] \"Kirara! Erika! Hello to you both!\""
10033020-287 = "Are you coming on the field trip, too? This just got, like, a hundred times more fun."
10033020-288 = "Hey there, Sensei! Greeting handshake?"
10033020-289 = "[s] \"Of course. It's nice to see you two.\""
10033020-290 = "Whoa! Teach, your hands are so warm!"
10033020-291 = "Now I'm really looking forward to this thing. I hope us Gehenna students don't cause you too much trouble though..."
10033020-292 = "Don't be such a worrywart! Teach can handle whatever happens."
10033020-293 = "[s] \"Hello. I am temporary lead guide, [USERNAME].\""
10033020-294 = "Yay! We should totally meet up after this trip."
10033020-295 = "One thing at a time, Kirara."
10033020-296 = "Whaaa? Don't pretend like you don't want to, too, Erika!"
10033020-297 = "Th-That's not it, but..."
10033020-298 = "I told you so! We have to get our things, so we'll see you soon, Teach!"
10033020-300 = "Huh? I can't find my luggage... Have you seen a green suitcase anywhere?"
10033020-301 = "You mean this one? Yeah! It's a real comfy chair. I didn't wanna get my uniform dirty sitting on the ground."
10033020-302 = "What the hell! You have your own!"
10033020-304 = "Please listen up, everyone! I'd like to review today's schedule—"
10033020-306 = "Yours is way more comfortable! Why would I sit on mine?"
10033020-307 = "Give it back! Get up!"
10033020-308 = "The world could end right now, and I wouldn't get up!"
10033020-309 = "Hello? I understand there's a lot to take in right now, but if I could please have your attention!"
10033020-311 = "I'll blow up the luggage and you with it if you don't get off right now!"
10033020-312 = "Fine by me! It's your luggage you're blowing up anyway!"
10033020-313 = "(I can't be frazzled by this. I have to take charge while the boss is gone. Don't make mistakes... Don't make any mistakes!)"
10033020-314 = "Allied Hyakkiyako Academy is a district that was originally developed with a focus on tourism..."
10033020-315 = "We hold various seasonal events like cherry blossom viewing in the spring, fireworks shows on summer nights, and relaxing hot springs during the winter..."
10033020-316 = "Our mission is to provide top of the line hospitality to all our visitors..."
10033020-317 = "All our clubs work together to achieve those ends..."
10033020-318 = "Well, at least now they do... There used to be a lot of conflict...over territories and other reasons, but w-we fixed it! So then, I mean... And so!"
10033020-319 = "(U-Umika?!)"
10033020-321 = "I lost her at the end there."
10033020-322 = "There's no need to be nervous around us, Mizz Guide! Hahaha!"
10033020-324 = "With that, to our esteemed visitors from Gehenna Academy!"
10033020-325 = "We hope this field trip will be a truly memorable experience for each and every one of you! That concludes our welcoming ceremony!"
10033020-326 = "Please enjoy your time at Hyakkiyako to your absolute fullest! Thank you!"
10033020-327 = "[ns] \"Umika, Umika! The first item on the itinerary!\""
10033020-328 = "Huh...?! Yes! Then, l-let's begin!"
10033020-332 = "We'll begin with Hyakkiyako's famous rickshaw tour to kick off the field trip!"
10033020-336 = "Hey, hey! Hop right on over, and we'll take you on the best tour in all of Hyakkiyako!"
10033020-338 = "A rickshaw. Huh, how quaint!"
10033020-339 = "Hahaha! Seriously! This is going to be so fun."
10033020-344 = "Okay then, here we go! Hold on tight!"
10033020-350 = "Thank you Pina... My mind just went blank for a second..."
10033020-351 = "It'll all be dandy, Umika! You just have to stay calm and trust in your skills."
10033020-352 = "[s] \"And things worked out in the end. Thanks, Pina.\""
10033020-353 = "I enjoy encountering new experiences! So a blessing in disguise!"
10033020-354 = "[ns] \"Now, I think it's our turn.\""
10033020-355 = "Who's up next? Come on over for your rickshaw experience!"
10033020-356 = "Yes, yes! We have three people over here!"
10033020-357 = "And I've got room! Watch your step there...and we're off!"

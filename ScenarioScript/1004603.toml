[translation]
1004603-1 = "和伊樹菜一起玩沙！"
1004603-2 = "哼哼哼～♪"
1004603-3 = "伊樹菜叩叩～狐狸叩叩～♪"
1004603-4 = "（再次和伊樹菜一同來到了海邊）"
1004603-13 = "啊！主公主公！有看到剛才的景象嗎！？"
1004603-14 = "每次看到海浪打上來又退回去的模樣……總讓人有一種奇妙的感覺！"
1004603-15 = "[s] 「真的，我懂你的意思。」"
1004603-16 = "主公也是嗎？耶嘿嘿！"
1004603-17 = "沒想到夏日的海邊，竟然有這麼多令人眼花撩亂的事物！"
1004603-18 = "好了，今天要做些什麼好呢～？"
1004603-19 = "[s] 「嗯～那既然上次沒有游到泳……」"
1004603-20 = "！！"
1004603-21 = "那，那個呀，主公……"
1004603-22 = "就是……"
1004603-28 = "啊！！"
1004603-29 = "主，主公！"
1004603-30 = "伊樹菜想到該做什麼了！"
1004603-31 = "[s] 「是什麼訓練呢？」"
1004603-32 = "夏天、海邊，以及難得的沙灘……"
1004603-33 = "那麼身為忍者要做的修行就只有一個！"
1004603-34 = "那就是「堆沙堡」！"
1004603-35 = "[s1] 「……原來如此？」\n[s2]（這跟忍者有什麼關係嗎……？）"
1004603-38 = "這是伊樹菜偶然間聽說的。"
1004603-39 = "以前似乎有一群人……#n在某個海邊堆砌了一座巨大的沙堡，並與惡徒們展開了激烈的戰鬥！"
1004603-40 = "[s]（好像依稀彷彿有點印象……）"
1004603-41 = "據傳戰事持續了整整三天！"
1004603-42 = "雖然那場戰役中有許多人受傷，卻沒有任何人因此放棄，全都奮戰到了最後！"
1004603-43 = "而帶來轉機的，似乎是一隻來自海裡的河童……！"
1004603-44 = "[s3] 「……直接躍升成從未聽過的事了！」\n[s4] （河童住海裡……？）"
1004603-47 = "伊樹菜聽完之後認為，身為一名忍者絕對不能輸給他們！"
1004603-48 = "所以伊樹菜也要打造一座……"
1004603-49 = "誰都無法入侵的厲害沙堡！用它來保護主公！"
1004603-50 = "所以說，主公……"
1004603-56 = "您願意……跟伊樹菜一起建造沙堡嗎？"
1004603-57 = "[s] 「好，來吧！」"
1004603-58 = "是！"
1004603-60 = "（於是便和幹勁十足的伊樹菜開始一起堆沙堡）"
1004603-62 = "伊樹菜覺得，要打造一座完美的沙堡，地基的部分是最重要的！"
1004603-63 = "因此首先要把附近的沙子抹平……"
1004603-69 = "耶嘿嘿！這樣應該就行了吧？"
1004603-75 = "啊啊！好不容易才弄好一個角落的說！？"
1004603-76 = "嗚嗚……被海浪沖一下就全散掉了……"
1004603-77 = "[s] 「看來在離海遠一點的地方進行會比較好呢。」"
1004603-78 = "唔唔，伊樹菜是不會因為這點小挫折就放棄的！"
1004603-79 = "就算一開始進行得不太順利……！"
1004603-80 = "伊樹菜也是個懂得從失敗中吸取教訓的忍者！"
1004603-81 = "[s] 「嗯！這心態就對了！」"
1004603-82 = "是！伊樹菜會加油的！"
1004603-86 = "接下來要從外圍慢慢的……！"
1004603-91 = "主公，那邊就麻煩您了！"
1004603-95 = "呀！？竟，竟然又崩塌了……！？"
1004603-96 = "[s] 「這次似乎是負荷不了自己的重量呢……畢竟是沙子啊。」"
1004603-97 = "嗚，嗚嗚……！伊樹菜不會放棄！"
1004603-98 = "主公！再來一次！"
1004603-100 = "嗚哇！？這次換上層崩塌了！？"
1004603-101 = "要維持平衡真不容易！"
1004603-103 = "呃啊！？這次換梭子蟹對城牆展開攻擊！？"
1004603-104 = "啊啊，不行！不可以往那裡爬……！"
1004603-105 = "嗚啊啊啊！？"
1004603-107 = "（雖然嘗試了好多次，卻依然沒能順利堆起沙堡……）"
1004603-109 = "[ns] 「唔嗯，果然不容易啊……」"
1004603-110 = "就是啊……"
1004603-111 = "嗚嗚……都怪伊樹菜一開始就太貪心了……"
1004603-112 = "說什麼為了保護主公……"
1004603-113 = "要打造一座氣派的沙堡……"
1004603-114 = "……但仔細想想，如果沙堡沒有完成就沒有意義了。"
1004603-115 = "多虧主公的提醒，伊樹菜現在徹底明白了！"
1004603-116 = "[s] （我幾乎什麼都沒說吧……？）"
1004603-117 = "首先應該要從小規模的沙堡開始做起。"
1004603-118 = "先做出一個小巧卻堅固的沙堡！"
1004603-119 = "[s] 「說的沒錯。加油吧，伊樹菜！」"
1004603-120 = "是！伊樹菜會再接再厲的！"
1004603-128 = "（之後又跟伊樹菜一起……）"
1004603-140 = "（重複了好幾次沙堡的建造與崩塌……）"
1004603-153 = "主公……雖然一路走來經歷了許多逆境。"
1004603-154 = "[s] 「是啊……」"
1004603-155 = "沙堡被突如其來的海浪沖走……"
1004603-156 = "城牆被天外飛來的沙灘球整個砸毀……"
1004603-157 = "[s] 「那個來撿球的人還一直跟我們道歉呢。」"
1004603-158 = "然而伊樹菜和主公卻始終沒有放棄…… "
1004603-159 = "不停修改計畫，時而按照主公的建議更改方針……"
1004603-160 = "然後終於，終於……！"
1004603-161 = "[s] 「嗯，終於啊。」"
1004603-162 = "這就是！"
1004603-163 = "主公和伊樹菜攜手打造的……專屬於主公和伊樹菜的沙堡！"
1004603-168 = "您覺得如何呢！？主公！"
1004603-169 = "[s5] 「我覺得非常帥氣！」\n[s6] 「雖然跟原本的目標有點不一樣就是了……！」"
1004603-172 = "耶嘿嘿！儘管經歷了許多難關……！"
1004603-173 = "仍舊一起完成了一件事，伊樹菜覺得很開心！"
1004603-174 = "比起獨自一個人努力，和別人齊心協力完成會讓人更開心……"
1004603-175 = "伊樹菜現在才明白這個道理！果然從主公身上總是能學到許多東西呢！"
1004603-176 = "[s] 「……那真是太好了。」"
1004603-181 = "哎呀，時間已經這麼晚了嗎……"
1004603-182 = "投入一件事情竟然能讓時間過得這麼快。耶嘿嘿。"
1004603-183 = "看來今天差不多該回去了。"
1004603-187 = "雖然有點可惜……"
1004603-188 = "但還是改天再……"
1004603-189 = "[s] 「……伊樹菜，還沒有結束！」"
1004603-190 = "……什麼？"
1004603-191 = "[s7] 「就算我們只能蓋出這種小沙堡，但仍然能以量取勝！」\n[s8] 「而這也是和忍者關係匪淺的一種傳統戰術！」"
1004603-194 = "[ns] 「我是這麼認為的……你能幫幫我嗎？」"
1004603-195 = "您的意思是……"
1004603-196 = "要再陪您玩一段時間嗎？"
1004603-200 = "既然是主公的命令……"
1004603-201 = "……是！當然沒問題！"
1004603-202 = "耶嘿嘿！"
1004603-204 = "（於是直到夜幕低垂，夕陽完全沒入海平線……）"
1004603-205 = "（都和伊樹菜一直在沙灘上玩著沙）"

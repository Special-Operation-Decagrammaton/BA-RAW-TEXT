[translation]
1004603-1 = "Sand-Play with Izuna!"
1004603-2 = "Hmm hmm hmmm. ♪"
1004603-3 = "Izuna, on the lookout! ♪"
1004603-4 = "I went to the beach with Izuna again."
1004603-13 = "Oh! My lord, my lord! Do you see how the waves hit the sand?"
1004603-14 = "Seeing how they pull forwards and backwards makes me kind of dizzy!"
1004603-15 = "[s] \"Yeah, the waves can be intense.\""
1004603-16 = "Heeheehee!"
1004603-17 = "The beach is such a fascinating place!"
1004603-18 = "Hmm! What kind of training should we do today?"
1004603-19 = "[s] \"Oh, Izuna. Now that we're here, why don't we try swimming?\""
1004603-20 = "Oh, s-swimming?!"
1004603-21 = "S-So... Umm..."
1004603-22 = "So..."
1004603-28 = "Ah!"
1004603-29 = "M-My lord! That's a good idea, but now that we're on the beach..."
1004603-30 = "I've researched more ninja training I'd like to do!"
1004603-31 = "[s] \"Oh, really? What kind of training?\""
1004603-32 = "Training that can only be done on the sand of a summer beach like this..."
1004603-33 = "It's...!"
1004603-34 = "It's building a ninja castle using the sand on this beach, my lord!"
1004603-35 = "[s1] \"...H-Huh?\"\n[s2] \"(What does this have to do with ninja training...?)\""
1004603-38 = "I heard about it once!"
1004603-39 = "There was a beach in the past where people built a huge sandcastle and engaged in a fierce battle against villains!"
1004603-40 = "[s] \"(Did this come from one of her movies?)\""
1004603-41 = "After three days of defending against repeated sieges, they finally defeated the invading thugs!"
1004603-42 = "In the process, a lot of people were injured, but not a single life was lost!"
1004603-43 = "Also, a kappa came out of the ocean and helped them!"
1004603-44 = "[s3] \"I think...this story is quite dramatized...\"\n[s4] \"(Isn't a kappa a mythical sea creature?)\""
1004603-47 = "Hmm! So I have to live up to the title of a ninja!"
1004603-48 = "A castle that no one can invade or conquer..."
1004603-49 = "I'm gonna make a grand castle that can completely protect you, my lord!"
1004603-50 = "I'm burning with determination!"
1004603-56 = "So um... Can you help me build it, my lord?"
1004603-57 = "[s] \"Well, I don't see why not. Let's make a sandcastle.\""
1004603-58 = "Yay!"
1004603-60 = "I started building a sandcastle on a corner of the sandy beach with a very motivated Izuna."
1004603-62 = "To make a perfect sandcastle, the foundation is important!"
1004603-63 = "First we'll create the site from here to here..."
1004603-69 = "Heehee! How about this?"
1004603-75 = "Oh! The corner we worked so hard on!"
1004603-76 = "Ugh... It collapsed because of a wave..."
1004603-77 = "[s] \"We should be careful not to get too close to the ocean.\""
1004603-78 = "Ugh! You're right, my lord."
1004603-79 = "As difficult as this is, I won't give up!"
1004603-80 = "I'm a ninja who learns through failure!"
1004603-81 = "[s] \"Yeah! You have fierce willpower!\""
1004603-82 = "Nin nin! I'm gonna work hard to make all your support worth it!"
1004603-86 = "Let's start building slowly from the outside from now on..."
1004603-91 = "Oh! My lord! Please, catch that side!"
1004603-95 = "Ack! It crumbled again?!"
1004603-96 = "[s] \"I don't think it could support the weight. It's just sand, you know?\""
1004603-97 = "Ugh! Okay, now I know!"
1004603-98 = "My lord! Let's try again!"
1004603-100 = "Argh?! The watchtower collapsed again?!"
1004603-101 = "Balancing the weight is so hard!"
1004603-103 = "Now crabs are attacking the middle of the castle wall?!"
1004603-104 = "Oh, n-no! You can't go up there!"
1004603-105 = "Waaaaah?!"
1004603-107 = "We tried many times, but the sandcastle construction didn't go as well as we'd hoped."
1004603-109 = "[ns] \"Izuna, it's not gonna work like this.\""
1004603-110 = "Y-You're right, my lord."
1004603-111 = "Perhaps...my ambition was greater than my ability."
1004603-112 = "All I wanted to do was to protect you..."
1004603-113 = "I wanted to protect you with the most perfect sandcastle ever."
1004603-114 = "But! If we don't build a castle at all, all our hard work will have gone to waste!"
1004603-115 = "What you said helped me realize something!"
1004603-116 = "[s] \"(I don't think I really said anything...)\""
1004603-117 = "I need to be less ambitious... We can reduce the size!"
1004603-118 = "If it's smaller, then it'll be easier to make it strong and sturdy!"
1004603-119 = "[s] \"Okay! Let's work hard, Izuna!\""
1004603-120 = "Yeah! Let's do this!"
1004603-128 = "We didn't give up building the castle even though it kept collapsing."
1004603-140 = "We tried again and again and again."
1004603-153 = "My lord... This is very difficult training as well!"
1004603-154 = "[s] \"But you're doing your best!\""
1004603-155 = "I thought the waves were cool, but they're evil villains that destroy the castle walls!"
1004603-156 = "And the moment we finished the roof, that volleyball smashed through it!"
1004603-157 = "[s] \"The person who threw the ball apologized profusely.\""
1004603-158 = "But we never gave up! We learned from our mistakes and tried again!  "
1004603-159 = "And we came up with new ideas when we needed to!"
1004603-160 = "It was possible because we worked together, my lord!"
1004603-161 = "[s] \"You did great, Izuna.\""
1004603-162 = "We did it! We finally did it!"
1004603-163 = "This is the castle we created together!"
1004603-168 = "What do you think, my lord?!"
1004603-169 = "[s5] \"Great! It's small, but mighty!\" \n[s6] \"I feel like it's a little different from our original goal.\""
1004603-172 = "Heeheehee! Just like me!"
1004603-173 = "But we still completed it!"
1004603-174 = "Building a sandcastle is much more fun when you do it with someone else!"
1004603-175 = "It was a new experience! I learned so much, my lord."
1004603-176 = "[s] \"Izuna...\""
1004603-181 = "Oh, look at the time..."
1004603-182 = "Heeheehee. We completed the sandcastle, and it's getting late, so..."
1004603-183 = "We should go back to the dorm, I guess..."
1004603-187 = "That's enough sand-play for today..."
1004603-188 = "My lord, can we..."
1004603-189 = "[s] \"Izuna, the day isn't over yet!\""
1004603-190 = "...Huh?"
1004603-191 = "[s7] \"Now that the castle is smaller, we can focus on quantity!\n[s8] \"There's still plenty of time to make more!\""
1004603-194 = "[ns] \"What do you think?\""
1004603-195 = "Does that mean..."
1004603-196 = "I can play in the sand with you longer...?"
1004603-200 = "If that's your command..."
1004603-201 = "Of course, my lord!"
1004603-202 = "Heeheehee!"
1004603-204 = "Until the sun sunk below the horizon..."
1004603-205 = "I played in the sand with Izuna."

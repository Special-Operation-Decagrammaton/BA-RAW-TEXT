[translation]
1004603-1 = "เล่นทรายกับอิซุนะ!"
1004603-2 = "ลั้ลลัลลา~"
1004603-3 = "อิซุนะ อิซุนะหน่าน้า~"
1004603-4 = "(คุณครูมาพบอิซุนะที่ชายหาดอีกครั้ง)"
1004603-13 = "อ๊ะ! นายท่านๆ! เมื่อกี้มีคลื่นซัดมา ซู่~ และพัดทรายออกไปด้วยค่ะ~!"
1004603-14 = "ตอนที่ฉันมองคลื่นที่ซัดเข้ามาและไหลกลับลงทะเลไป รู้สึกเหมือนหัวหมุนติ้วๆ เลยค่ะ~!"
1004603-15 = "[s] \"นั่นสิ ครูก็รู้สึกแบบนั้นเหมือนกัน\""
1004603-16 = "ฮิฮิฮิ!"
1004603-17 = "ทะเลฤดูร้อนมีอะไรที่ทำให้หัวหมุนติ้วๆ เต็มไปหมดเลยค่ะ!"
1004603-18 = "อืม~ ถ้างั้นวันนี้อิซุนะกับนายท่านทำอะไรดีนะ~?"
1004603-19 = "[s] \"ถ้างั้นวันนี้อิซุนะมาเล่นน้ำกันมั้ย?\""
1004603-20 = "อ๊ะ ละ...เล่นน้ำเหรอคะ?!"
1004603-21 = "เอ่อ... คือว่าเรื่องนั้น..."
1004603-22 = "คือว่า..."
1004603-28 = "อ๊ะ!"
1004603-29 = "นะ... นายท่าน! เล่นน้ำก็ดีนะคะ แต่ว่าไหนๆ เราก็อยู่ที่ชายหาดแล้ว..."
1004603-30 = "อิซุนะมีเตรียมการฝึกแบบใหม่เอาไว้แล้วค่ะ!"
1004603-31 = "[s] \"งั้นเหรอ? คราวนี้จะฝึกอะไรล่ะ?\""
1004603-32 = "การฝึกที่จะทำได้ที่ชายหาดในฤดูร้อนเท่านั้น..."
1004603-33 = "และนั่นก็คือ....!"
1004603-34 = "การใช้ทรายของชายหาดแห่งนี้ สร้างปราสาททรายของนินจาขึ้นมาค่ะ!"
1004603-35 = "[s1] \"หืม...?\"\n[s2] (มีวิธีฝึกนินจาแบบนั้นด้วยเหรอ...?)"
1004603-38 = "อิซุนะได้ยินเรื่องนี้มาโดยบังเอิญค่ะ"
1004603-39 = "ว่าก่อนหน้านี้มีคนสร้างปราสาททรายขนาดใหญ่ขึ้นที่ชายหาด และต่อสู้กับเหล่าร้ายอย่างดุเดือดค่ะ!"
1004603-40 = "[s] (รู้สึกจำได้ลางๆ ว่าเคยมีเรื่องแบบนั้นเกิดขึ้น...)"
1004603-41 = "หลังจากต่อสู้กันอย่างหนักหน่วงตลอดสามวันสามคืน พวกเขาก็เอาชนะพวกวายร้ายที่บุกมาได้!"
1004603-42 = "ในตอนต่อสู้จะมีผู้ได้รับบาดเจ็บมากมาย แต่ก็ไม่มีใครล้มตาย และขับไล่พวกวายร้ายไปได้ในที่สุดค่ะ!"
1004603-43 = "อ๋อ แล้วก็ได้ยินว่าพวกเขาได้รับความช่วยเหลือจากพรายน้ำที่โผล่มาจากทะเลด้วยค่ะ...!"
1004603-44 = "[s3] \"น่าเหลือเชื่อจริงๆ เลยนะ...\"\n[s4] (พรายน้ำอยู่ในทะเลด้วยเหรอ...?)"
1004603-47 = "อื้อ! เพราะงั้นในฐานะที่อิซุนะเป็นนินจา ก็คงจะยอมแพ้ไม่ได้ค่ะ!"
1004603-48 = "ปราสาทที่ใครก็บุกเข้าและเอาชนะไม่ได้"
1004603-49 = "อิซุนะจะสร้างปราสาทที่ยอดเยี่ยมแบบนั้น และปกป้องนายท่านเองค่ะ!"
1004603-50 = "เพราะงั้นวันนี้..."
1004603-56 = "นายท่าน... จะช่วยอิซุนะสร้างปราสาททรายใช่มั้ยคะ?"
1004603-57 = "[s] \"ก็ได้ งั้นมาสร้างปราสาททรายกันเถอะ\""
1004603-58 = "ค่ะ...!"
1004603-60 = "(จากนั้นอิซุนะกับคุณครูก็ช่วยกันก่อปราสาททรายขึ้น)"
1004603-62 = "อิซุนะคิดว่าการสร้างฐานที่มั่นคงเป็นพื้นฐานของการสร้างปราสาททรายที่สมบูรณ์แบบค่ะ! "
1004603-63 = "ก่อนอื่นก็ต้องขุดมาถึงตรงนี้..."
1004603-69 = "ฮิฮิฮิ เท่านี้ก็น่าจะพอแล้วนะคะ?"
1004603-75 = "อ๊ะ! มุมปราสาทที่ใช้เวลาทำตั้งนาน~~?!"
1004603-76 = "ฮือ... คลื่นซัดพังไปแล้วค่ะ..."
1004603-77 = "[s] \"อืม ถ้าอยู่ใกล้ทะเลเกินไปคงไม่ดีสินะ\""
1004603-78 = "ฮือ...! ฮึ่ย! อะ...อิซุนะไม่ยอมแพ้แค่นี้หรอกค่ะ!"
1004603-79 = "เพิ่งครั้งแรก ไม่สำเร็จก็ไม่เป็นไรค่ะ...!"
1004603-80 = "แต่อิซุนะน่ะ เป็นนินจาที่เรียนรู้จากความผิดพลาดของตัวเองค่ะ!"
1004603-81 = "[s] \"อื้อ อิซุนะเป็นเด็กที่มีความมุ่งมั่นนี่เนอะ!\""
1004603-82 = "ค่ะ! อิซุนะมีนายท่านคอยให้กำลังใจอยู่ เพราะงั้นอิซุนะจะพยายามค่ะ!"
1004603-86 = "คราวนี้จะขยับห่างออกมาจากทะเลอีกหน่อย...!"
1004603-91 = "อ๊ะ นายท่าน! จับทางนั้นไว้ให้หน่อยค่ะ!"
1004603-95 = "แง๊ว?! ฮืออออ...! ถล่มลงมาอีกแล้ว?!"
1004603-96 = "[s] \"คราวนี้จู่ๆ ก็ล้มเลยแฮะ คงเพราะใช้ทรายอย่างเดียวล่ะมั้ง\""
1004603-97 = "ฮือ... แต่ฉันยังไม่ยอมแพ้หรอกค่ะ คราวนี้ต้องสำเร็จแน่...!"
1004603-98 = "นายท่าน! มาลองกันใหม่เถอะค่ะ!"
1004603-100 = "อ๊าาา?! คราวนี้ตรงหอสังเกตการณ์ถล่มลงมาอีกแล้ว?!"
1004603-101 = "การทำให้น้ำหนักสมดุลนี่... ยากจังเลยนะคะ~!"
1004603-103 = "คราวนี้คุณปูมาบุกโจมตีตรงกลางปราสาทงั้นเหรอ?!"
1004603-104 = "อ๊า! ยะ...อย่านะ! ห้ามไต่ขึ้นไปบนนั้นนะคะคุณปู!"
1004603-105 = "แงงงง?!"
1004603-107 = "(หลังจากพยายามอยู่หลายครั้งก็ก่อปราสาททรายได้ตามที่ตั้งใจเอาไว้)"
1004603-109 = "[ns] \"อิซุนะ ครูว่ามันยากนะ\""
1004603-110 = "ค่ะ นายท่าน..."
1004603-111 = "ดูเหมือน... อิซุนะจะโลภมากไปเองตั้งแต่แรกค่ะ"
1004603-112 = "คิดแต่อยากปกป้องนายท่าน"
1004603-113 = "เลยอยากสร้างปราสาททรายที่สมบูรณ์แบบจนไม่มีใครบุกรุกเข้ามาได้..."
1004603-114 = "ค่ะ! ถ้าคิดแบบนั้นแล้วแต่ยังทำไม่สำเร็จ ก็ไม่มีความหมายอะไรค่ะ!"
1004603-115 = "คำพูดของนายท่าน ทำให้อิซุนะคิดได้แล้วค่ะ!"
1004603-116 = "[s] (ไม่ได้พูดอะไรเป็นพิเศษสักหน่อย...)"
1004603-117 = "ฉันควรละทิ้งความโลภ แล้วลดขนาดลงสักหน่อย..."
1004603-118 = "ถึงอาจจะเป็นปราสาททรายที่เล็กกว่าที่ตั้งใจไว้ แต่ก็มาสร้างปราสาททรายที่แข็งแกร่งกันเถอะค่ะ!"
1004603-119 = "[s] \"ใช่แล้ว พยายามเข้านะ อิซุนะ!\""
1004603-120 = "ค่ะ นายท่าน! ลุยล่ะนะคะ!"
1004603-128 = "(คุณครูกับอิซุนะช่วยกันสร้างปราสาททรายขึ้นมาอีกครั้ง... แต่มันก็พังลงมาอีก)"
1004603-140 = "(และพอสร้างขึ้นมาใหม่ก็พังลงมาอีกซ้ำไปมาอยู่หลายครั้ง)"
1004603-153 = "นายท่าน... เราเจออุปสรรคหลายอย่างเลยนะคะ"
1004603-154 = "[s] \"อื้อ นั่นสินะ\""
1004603-155 = "คลื่นที่ฉันคิดว่าสุดยอดมากๆ กลับทำให้กำแพงปราสาทของฉันพังทลายลง..."
1004603-156 = "จู่ๆ ก็มีลูกวอลเลย์บอลปลิวมาตกบนหลังคา ทำให้ปราสาทถล่ม..."
1004603-157 = "[s] \"คนที่ตีลูกวอลเลย์มา เขาก็ขอโทษแล้วนี่นะ\""
1004603-158 = "แต่พวกเราก็ไม่ยอมแพ้และเรียนรู้จากความผิดพลาด"
1004603-159 = "แล้วปรับเปลี่ยนแผนใหม่ทุกครั้ง... "
1004603-160 = "ฉันได้รวมพลังเป็นหนึ่งกับนายท่าน และร่วมกันสร้างปราสาททรายขึ้นมาด้วยกันสำเร็จ!"
1004603-161 = "[s] \"อื้อ เหนื่อยหน่อยนะ อิซุนะ\""
1004603-162 = "เอาล่ะค่ะ ในที่สุด... นี่ค่ะ!"
1004603-163 = "ปราสาททรายของพวกเรา... ปราสาทที่นายท่านกับอิซุนะช่วยกันสร้างขึ้นมาค่ะ!"
1004603-168 = "เป็นยังไงบ้างคะ นายท่าน?!"
1004603-169 = "[s5] \"เท่มาก! สุดยอดมากเลยนะ...\"\n[s6] \"ดูต่างจากแบบเดิมที่คิดไว้มากเลยนะ...\""
1004603-172 = "ฮิฮิฮิ! ถึงจะเจอมาหลายๆ เรื่อง"
1004603-173 = "แต่ในที่สุดก็สร้างปราสาททรายกับนายท่านสำเร็จแล้วค่ะ อิซุนะสนุกมากเลยค่ะ!"
1004603-174 = "การสร้างปราสาททราย... เวลาได้ร่วมมือสร้างกับใครบางคน มันสนุกกว่าสร้างคนเดียวมากเลยนะคะ!"
1004603-175 = "อิซุนะไม่เคยรู้มาก่อนเลย แต่เพราะได้คำแนะนำจากนายท่านวันนี้ ทำให้อิซุนะได้เรียนรู้หลายๆ อย่างเลยค่ะ!"
1004603-176 = "[s] \"อิซุนะ...\""
1004603-181 = "อ๊ะ... เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย..."
1004603-182 = "ฮิฮิฮิ พอสร้างปราสาททรายเสร็จก็เย็นแล้วเหรอเนี่ย..."
1004603-183 = "เราคงต้องกลับที่พักกันแล้วล่ะค่ะ"
1004603-187 = "น่าเสียดายนะคะที่วันนี้คงต้องพอเท่านี้แล้วค่ะ"
1004603-188 = "นายท่านคะ คือว่า..."
1004603-189 = "[s] \"เดี๋ยวสิ อิซุนะ มันยังไม่จบหรอกนะ!\""
1004603-190 = "คะ...?"
1004603-191 = "[s7] \"เราลดขนาดลงแล้ว ตอนนี้มาแข่งกันที่จำนวนเถอะ\"\n[s8] \"เรายังมีเวลาเล่นกันอีกเยอะเลยนะ!\""
1004603-194 = "[ns] \"ว่าไงล่ะ จะมาเล่นด้วยกันมั้ย?\""
1004603-195 = "งั้นก็แปลว่า..."
1004603-196 = "หมายถึงฉันจะได้สร้างปราสาททรายกับนายท่านต่อใช่มั้ยคะ...?"
1004603-200 = "ถ้าเป็นคำสั่งของนายท่านละก็..."
1004603-201 = "ค่ะ! อิซุนะจะทำตามคำสั่งของนายท่านค่ะ!"
1004603-202 = "ฮิฮิฮิ!"
1004603-204 = "(จนกระทั่งตะวันเกือบลับฟ้า...)"
1004603-205 = "(คุณครูก็ยังนั่งเล่นก่อปราสาททรายกับอิซุนะต่อไป...)"

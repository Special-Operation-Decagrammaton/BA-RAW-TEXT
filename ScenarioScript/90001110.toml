[translation]
90001110-1 = "ตอนที่ 11;ทางตัน"
90001110-3 = "ทางนั้นเป็นยังไงบ้างคะ ริโอะ?"
90001110-4 = "หมายถึงเรื่องวิเคราะห์สัญญาณของผู้เลื่อมใสตนใหม่ใช่มั้ย?"
90001110-5 = "ใช่ค่ะ เมื่อดูจากความเข้มข้นในช่วงเวลาที่เกิดสัญญาณแล้ว สัญญาณหายไปอย่างรวดเร็วเกินกว่าจะ#nวิเคราะห์อย่างละเอียดได้..."
90001110-6 = "อืม นี่ต้องเป็นผู้เลื่อมใสตนอื่น... ที่แตกต่างกับเกวูราห์และชอกมาห์แน่นอน"
90001110-7 = "เป็นผู้เลื่อมใสตนที่ 3 ที่ตรวจจับได้หลังจากพวกเรามาที่นี่สินะคะ..."
90001110-12 = "ที่นี่คือตลาดผู้เลื่อมใสเหรอเนี่ย"
90001110-13 = "อยากจะซื้อไว้สักตนจังเลยค่ะ จะราคาเท่าไรกันนะ?"
90001110-14 = "พวกคุณนี่ก็... ของแบบนั้นจะไปมีขายได้ยังไงล่ะคะ..."
90001110-15 = "ฉันบันทึกพิกัดของสัญญาณไว้แล้ว จะส่งให้เดี๋ยวนี้ละ"
90001110-16 = "อยู่ค่อนข้างไกลจากที่เราอยู่ตอนนี้เลยนะคะ...? อืม ฉันก็อยากจะวิเคราะห์ดู แต่ถ้าจะทำอย่างนั้นก็ต้อง#nย้ายฐานกันอีก..."
90001110-17 = "บางทีทางนั้นอาจจะมีจุดประสงค์บางอย่างในการส่งสัญญาณที่รุนแรงออกมาแบบนั้นตั้งแต่แรกก็ได้..."
90001110-18 = "หรือว่าจะให้พวกเราไปตามพิกัดน่ะ?"
90001110-19 = "ฉันพอจะเข้าใจแล้วค่ะ เป็นเหมือนไฟล่อแมงเม่าสินะคะ"
90001110-21 = "ถึงเรื่องนั้นฉันจะยังไม่แน่ใจนัก แต่ฉันก็คิดว่านั่นเป็นเรื่องที่เป็นไปได้ค่ะ"
90001110-22 = "[s] \"กรณีแบบนี้มักมีกับดักซ่อนอยู่นะ...\""
90001110-23 = "ถ้ามีกับดัก เราก็จะฝ่ามันไปให้ได้ นี่ละชมรมปรากฏการณ์ลี้ลับ! ฉันอยากพูดแบบนั้นอยู่นานแล้วค่ะ..."
90001110-24 = "ฉันเห็นต่างออกไป แบบนั้นมันฟังดูไร้เหตุผลและไม่มีประสิทธิภาพเอาเสียเลย"
90001110-25 = "อืม ครั้งนี้ฉันคงต้องเห็นด้วยกับประธานริโอะ"
90001110-26 = "ช่วยไม่ได้นะคะ ไม่มีใครเข้าข้างหัวหน้าฮิมาริเลย ถ้าอย่างนั้นครั้งนี้ฉันจะเคารพความคิดเห็นของ#nหัวหน้าฮิมาริแล้วกันค่ะ ขอโทษนะคะ ท่านริโอะ"
90001110-30 = "หะ... หืม?"
90001110-34 = "อย่าทำเป็นเห็นอกเห็นใจฉันเหมือนฉันเป็นสินค้าที่ขายไม่ออกสิคะ! อีกอย่าง ฉันยังไม่ได้ตัดสินใจจะ#nทำตามนั้นสักหน่อยค่ะ!"
90001110-36 = "หัวหน้าเป็นฝ่ายผิดแล้วละ ในเวลาแบบนี้ หัวหน้ายิ่งต้องบอกความคิดเห็นของตัวเองให้ชัดเจนสิ"
90001110-37 = "ฉันก็แค่พูดเพื่อละลายพฤติกรรมเท่านั้นค่ะ!"
90001110-38 = "เอาเถอะค่ะ ฉันก็อยากจะลองเสี่ยงอันตรายกับกับดักนั้นอยู่หรอก แต่ว่าเพื่อความปลอดภัยของทุกคน#nแล้วละก็ ฉันไม่อาจเลือกทางนั้นได้ค่ะ"
90001110-39 = "ถ้าอย่างนั้นก็ใช้ AMAS ของฉันสิ"
90001110-40 = "ฉันมีโดรน AMAS ที่เป็นโดรนลาดตระเวนความเร็วสูงติดมาเผื่อพอดี "
90001110-41 = "แล้วฉันจะให้โดรนส่งพิกัดที่พบสัญญาณให้"
90001110-42 = "ตายจริง นิสัยของริโอะก็มีตอนที่เป็นประโยชน์อย่างใสสะอาดเหมือนกันด้วยนะคะ?"
90001110-43 = "ฉันก็แค่เลือกวิธีที่สมเหตุสมผลที่สุด ทำไมถึงต้องพูดแบบนั้นด้วยล่ะ?"
90001110-44 = "ช่างเถอะค่ะ! ฉันไม่รู้จะพูดอะไรต่อแล้วค่ะ จริงๆ เลยเชียว!"
90001110-47 = "โดรนออกไปแล้ว อีกสัก 20 นาทีก็จะถึงที่หมายแล้วละ"
90001110-48 = "ฉันจะค่อยๆ ชะลอความเร็ว แล้วดึงวิดีโอลาดตระเวน..."
90001110-49 = "?!"
90001110-50 = "เกิดเรื่องอะไรเหรอคะ ท่านริโอะ?"
90001110-51 = "สัญญาณจากโดรน AMAS ลาดตระเวนหายไป..."
90001110-52 = "ขอรายละเอียดเพิ่มหน่อยสิ ประธาน"
90001110-53 = "ก็ตามที่ว่าเลย จู่ๆ สัญญาณของ AMAS ก็หายไปน่ะ"
90001110-54 = "แต่ก็น่าจะมีข้อมูลที่ส่งมาเป็นครั้งสุดท้ายหรือเปล่าคะ?"
90001110-55 = "รอเดี๋ยวนะ ฉันกำลังวิเคราะห์อยู่พอดี อืม..."
90001110-56 = "นี่... มัน...?"
90001110-57 = "มีเรื่องอะไรเหรอคะ...?"
90001110-58 = "ฮิมาริ ฉันจะส่งข้อมูลให้เดี๋ยวนี้ มาวิเคราะห์ด้วยกันเถอะ"
90001110-59 = "การที่คุณขอความร่วมมือจากฉันไม่ใช่เรื่องที่เจอได้บ่อยๆ นะคะ ถ้าถึงกับทำอย่างนั้น ก็หมายความว่า..."
90001110-60 = "อืม ตอนนี้ฉันหวังเป็นอย่างยิ่งว่าการวิเคราะห์ของตัวเองจะผิดน่ะ"
90001110-65 = "[ns] \"มีเรื่องอะไรเหรอ? จะไม่มีอะไร... ใช่มั้ย?\""
90001110-66 = "ไม่นะ...! ถ้าเป็นอย่างนี้ละก็...!"
90001110-67 = "ฉันไม่ได้คิดผิดไปสินะ..."
90001110-68 = "ใช่ค่ะ คุณไม่มีทางผิดพลาดในเรื่องแบบนี้หรอกค่ะ ฉันต้องยอมรับในความสามารถของคุณในส่วนนี้ค่ะ"
90001110-69 = "มีเรื่องอะไรอย่างนั้นเหรอคะ หัวหน้าฮิมาริ?"
90001110-70 = "ฉันจะสรุปให้เลยนะคะ สิ่งที่เราตรวจพบจากพิกัดนั้น..."
90001110-71 = "มันคือ <บาเรียพหุมิติ> ที่เคยปกป้อง <เรืออะทราฮาซิส> เมื่อนานมาแล้วน่ะ..."
90001110-72 = "[s] \"เรืออะทราฮาซิส...??!!\""
90001110-77 = "ค่ะ คุณครู ถูกต้องแล้วค่ะ"
90001110-78 = "แต่ทำไมของแบบนั้นถึงมาโผล่ที่นี่ตอนนี้ล่ะ? ตอนนี้คิโวทอสถูกปกคลุมไปด้วยท้องฟ้าสีแดง แล้วก็เกิดอุปกรณ์ประหลาดอะไรขึ้น... เหมือนตอนนั้นเหรอ?"
90001110-86 = "ฉันไม่รู้ว่านี่คือโชคดีหรือโชคร้าย แต่ก็ไม่คิดว่าจะถึงขั้นนั้นค่ะ"
90001110-87 = "ใช่แล้วละ เพราะอย่างน้อยก็ดูเหมือนจะไม่มีวี่แววของการรบกวนมิติในพิกัดนั้น"
90001110-88 = "แต่ก็แปลว่า <บาเรียพหุมิติ> มีอยู่อย่างชัดเจนสินะคะ?"
90001110-89 = "ใช่แล้วค่ะ และถ้าเรารวมข้อมูลทั้งหมดที่มีแล้วเอามาใช้ในสถานการณ์นี้ และหาข้อสรุปใหม่..."
90001110-90 = "ก็จะได้ข้อสรุปว่า ตอนนี้เหล่าผู้เลื่อมใสเริ่มใช้พลังของทวยเทพไร้นามอย่างจริงจังแล้ว"
90001110-91 = "และจาก 'ปรากฏการณ์ลี้ลับ' ทั้งหมดที่เราเจอกันมา การใช้บาเรียพหุมิติที่มองได้ว่าเป็นวิธีป้องกันที่#nทรงพลังที่สุดนับเป็นปรากฏการณ์ที่..."
90001110-92 = "แปลว่ามีอะไรบางอย่างที่จำเป็นต้องซ่อนไว้จริงๆ สินะ"
90001110-93 = "ค่ะ และสิ่งที่เราสามารถทำได้ตอนนี้... คืออะไรคะ?"
90001110-94 = "ถ้าจะรับมือกับบาเรียพหุมิติ พวกเราคงไม่มีทางเลือกอื่นนอกจากต้องพึ่ง <เรือของอุตนาพิชทิม> ที่คุณครูเตรียมไว้ให้ค่ะ"
90001110-95 = "และ 'ปรากฏการณ์ลี้ลับ' เช่นนั้นก็ยากที่จะเกิดขึ้นอีกครั้งด้วยค่ะ"
90001110-99 = "[ns] \"อืม... ก็น่าจะเป็นอย่างนั้นนะ...\""
90001110-100 = "คงเป็นอย่างนั้นละค่ะ... ฉันก็ไม่อยากยอมรับเท่าไร แต่ตอนนี้รู้สึกเหมือนมืดแปดด้านเลยค่ะ"
90001110-101 = "ก่อนอื่นเลย ถ้าเราหาวิธีรับมือกับพลังของทวยเทพไร้นามไม่ได้ เราก็จะแก้ไขสถานการณ์โดยพื้นฐาน#nไม่ได้"
90001110-102 = "ใช่ค่ะ ต่อให้ยังไม่คิดถึงบาเรียพหุมิติ แต่เราก็ยังไม่มีวิธีรับมือกับการกลับสู่สภาพเดิมของเหล่า#nผู้เลื่อมใสที่มาจากความสามารถในการสร้างวัตถุใหม่อยู่ดีค่ะ"
90001110-103 = "ทั้งเกวูราห์และชอกมาห์ก็ได้รับความเสียหายไปพอสมควร แต่ไม่นานพวกนั้นก็กลับสู่สภาพเดิมได้ค่ะ"
90001110-104 = "อืม ส่วนที่เสียหายน่าจะได้รับการฟื้นฟูในชั่วพริบตาเลยละ"
90001110-105 = "แต่ถ้าพวกผู้เลื่อมใสใช้ประโยชน์จากพลังของทวยเทพไร้นามได้ขนาดนี้ แล้วเราจะต้องทำยังไงล่ะ?"
90001110-106 = "และถึงหัวหน้าจะบอกว่ายังไม่คิดถึงบาเรียพหุมิติก็เถอะ แต่สุดท้ายเราก็ต้องทำอะไรกับมัน จะได้ก้าวต่อไปได้ไม่ใช่เหรอ?"
90001110-107 = "[s] \"จะว่าไป ตอนนั้นพวกเราทำยังไงกันนะ?\""
90001110-108 = "ตอนนั้นน่ะ..."
90001110-111 = "เป้าหมายหลักของพวกเราคือการทำลาย <เรืออะทราฮาซิส> ที่ลอยอยู่เหนือฟ้าคิโวทอสค่ะ"
90001110-114 = "แต่เรือนั้นถูกปกป้องด้วยบาเรียแห่ง <สถานะการทับซ้อนตามความน่าจะเป็น> ที่ทำให้เราไม่สามารถ#nแทรกแซงเรือจากภายนอกได้ค่ะ"
90001110-115 = "ตราบใดที่ยังมีบาเรียนี้อยู่ เราก็โจมตีเรือในทางกายภาพไม่ได้ค่ะ"
90001110-117 = "ดังนั้นพวกเราเลยต้องทำให้ <เรืออุตนาพิชทิม> อยู่ใน <สถานะการทับซ้อนตามความน่าจะเป็น> เหมือนกับบาเรีย แล้วผ่านเข้าบาเรียนั้นไปค่ะ"
90001110-119 = "แต่ท้ายที่สุดแล้ววิธีเข้าถึงแบบนั้นก็ล้มเหลว เพราะเรืออะทราฮาซิสเปลี่ยนค่าสถานะของตัวมันเองค่ะ"
90001110-120 = "สิ่งที่เราต้องพึ่งพาในตอนสุดท้ายก็เลยเป็น..."
90001110-121 = "อ๊ะ...!"
90001110-131 = "[ns] \"...!\""
90001110-136 = "ตอนต่อไป;ข้อเสนอ"

[translation]
90001110-1 = "第11話;死路"
90001110-3 = "你那邊的情況如何，莉央？"
90001110-4 = "你指的是新預言者的信號分析嗎？"
90001110-5 = "沒錯。雖然信號剛出現時非常強烈，但是因為消失得太快而沒能詳細分析……"
90001110-6 = "是啊，這顯然是葛夫拉和霍刻瑪以外的……另一名預言者。"
90001110-7 = "……也就是來到這裡後偵測到的第三名預言者呢。"
90001110-12 = "簡直是預言者大特賣。"
90001110-13 = "真想買一隻回家。要賣多少錢呢？"
90001110-14 = "你們也真是的……那東西怎麼可能有賣呢……"
90001110-15 = "我已經紀錄下信號的座標了。我把它傳送給你們。"
90001110-16 = "距離我們還挺遠的呢……？#n唔嗯，雖然很想親眼去看看，不過這樣就得再次承受移動據點帶來的風險……"
90001110-17 = "而且對方之所以發出如此強烈的信號，背後說不定有什麼企圖……"
90001110-18 = "是想引誘我們嗎？"
90001110-19 = "就像捕蚊燈一樣呢。我明白了。"
90001110-21 = "雖然無法斷定，但不能排除這種可能性。"
90001110-22 = "[s]「通常這種情況都會有陷阱……」"
90001110-23 = "特異現象搜查部就算面對陷阱也會正面突破！#n雖然我很想這麼說……"
90001110-24 = "我反對。這樣既不合理又沒效率。"
90001110-25 = "嗯，我也同意莉央會長的意見。"
90001110-26 = "既然沒有人支持陽葵部長，那我這次就勉為其難地尊重一下部長的意見吧。#n非常抱歉，莉央大人。"
90001110-30 = "是，是嗎……？"
90001110-34 = "那種好像在清庫存的同情大可不必好嗎？#n況且我們也還沒決定該怎麼做呀！？"
90001110-36 = "部長你錯了。#n這種時候應該明確地表達自己的意見才對。"
90001110-37 = "這是在破冰啦，破冰！"
90001110-38 = "總之，雖然我也很想冒著風險去那裡一探究竟，#n但是考慮到各位的安全，我不認為這麼做是正確的。"
90001110-39 = "既然如此，就用我的AMAS吧。"
90001110-40 = "為了預防這種情況，我提前準備了能進行高速偵察的改良型AMAS無人機。"
90001110-41 = "我現在就把它派去捕捉到信號的座標位置。"
90001110-42 = "哎呀，沒想到你的那種性格，居然也有能幫上忙的一天呢。"
90001110-43 = "我只不過是選擇眼前最合理的方法而已，特地提起這件事有什麼特別的理由嗎？"
90001110-44 = "……算了算了！我對你真的無話可說！"
90001110-47 = "無人機正在巡航。#n再過20分鐘應該就能抵達目標位置了。"
90001110-48 = "開始降低飛行速度，並嘗試連接偵察影像──"
90001110-49 = "──！？"
90001110-50 = "發生什麼事了嗎，莉央大人？"
90001110-51 = "……偵察AMAS無人機的信號消失了。"
90001110-52 = "麻煩說明得更清楚一點，會長。"
90001110-53 = "就是字面上的意思。AMAS的信號突然中斷了。"
90001110-54 = "有留下最後回傳的資料嗎？"
90001110-55 = "稍等。我正在進行分析……"
90001110-56 = "這是……？"
90001110-57 = "……發現什麼了嗎？"
90001110-58 = "陽葵，我馬上把資料分享給你。跟我一起分析吧。"
90001110-59 = "你竟然會主動把資料分享給我，這還真是稀奇。#n不過這就表示……"
90001110-60 = "沒錯。我真心希望自己的分析結果是錯誤的。"
90001110-65 = "[ns]「究竟發生了什麼？應該……沒事吧？」"
90001110-66 = "怎麼會……！這不就表示……！"
90001110-67 = "……看來我的分析沒有出錯。"
90001110-68 = "是啊，你在這方面的事情是不可能出錯的。#n這點連我也不得不承認。"
90001110-69 = "到底發生了什麼事呢，陽葵部長？"
90001110-70 = "我直接說結論吧。#n無人機在那個座標檢測到的是……"
90001110-71 = "……先前保護著「阿特拉哈西斯的方舟」的「多次元防護罩」。"
90001110-72 = "[s]「阿特拉哈西斯的方舟的……！？！？」"
90001110-77 = "沒錯，老師。正是如此。"
90001110-78 = "可是它現在為什麼會出現？#n難道奇普托斯又會像那時一樣再次被染紅……或者冒出一堆奇怪的機器嗎？"
90001110-86 = "雖然不知道這究竟是幸還是不幸，但它的規模似乎沒有上次那麼龐大。"
90001110-87 = "沒錯，至少目前該座標並沒有出現次元干擾的跡象。"
90001110-88 = "但那裡確實有「多次元防護罩」對吧？"
90001110-89 = "沒錯。並且綜合目前掌握的情報，我們可以得出一項新的結論。"
90001110-90 = "預言者們已經正式開始使用無名之神的力量了。"
90001110-91 = "此外，既然對方不惜動用我們曾面對的「特異現象」中最強的防禦手段，#n也就是多次元防護罩……"
90001110-92 = "就代表那裡有對方亟欲隱藏的東西存在吧。"
90001110-93 = "沒錯。那我們現在……能做些什麼呢？"
90001110-94 = "想要突破多次元防護罩，就只能藉助老師準備的「生命守護者主艦」。"
90001110-95 = "不過那樣的「特異現象」，恐怕很難再次重現。"
90001110-99 = "[ns]「嗯……我也這麼認為……」"
90001110-100 = "……雖然很不想承認，但我們現在確實無路可走。"
90001110-101 = "只要無法找出對抗無名之神力量的方法，我們就無法從根本解決問題。"
90001110-102 = "沒錯。即便先撇開多次元防護罩不談……#n預言者們藉由物質再構築獲得的無限恢復能力，我們也無法應對。"
90001110-103 = "說的也是。#n我們先前也對葛夫拉和霍刻瑪造成了一定程度的傷害，但它們很快又恢復了原狀。"
90001110-104 = "想必是利用再構築的能力，在瞬間完成了復原吧。"
90001110-105 = "如果預言者真的能將無名之神的力量運用到這種程度，我們該怎麼應對呢？"
90001110-106 = "況且部長雖然說先不考慮多次元防護罩，但我們終究得先解決它才能進行下一步吧？"
90001110-107 = "[s]「這麼說來，我們當時是怎麼解決的？」"
90001110-108 = "當時……"
90001110-111 = "我們的目標是破壞位於奇普托斯上空的「阿特拉哈西斯的方舟」。"
90001110-114 = "然而，方舟被不受物理介入的「共存狀態」防護罩所保護。"
90001110-115 = "只要那個防護罩存在，我們就無法在物理層面接近方舟。"
90001110-117 = "不過只要讓「生命守護者本艦」處於相同的狀態，理論上就能夠通過防護罩。"
90001110-119 = "但是就結果而言，當時採取的方法並沒有奏效。#n因為阿特拉哈西斯的方舟，其狀態隨時都在改變。"
90001110-120 = "所以最終我們仰賴的是……"
90001110-121 = "啊……！"
90001110-131 = "[ns]「……！」"
90001110-136 = "下一話;提議"

[translation]
90001110-1 = "Episode 11;Dead End"
90001110-3 = "Okay. Status update, Rio?"
90001110-4 = "The analysis of the new prophet?"
90001110-5 = "Yes. I couldn't get a detailed analysis from here. Considering its strength at the time it occurred, the signal faded out incredibly quickly."
90001110-6 = "I can confirm it's a new prophet...entirely different from Geburah or Chokmah."
90001110-7 = "This would make it the third prophet we've encountered since coming here."
90001110-12 = "It's a bargain sale for prophets."
90001110-13 = "I would like to buy one. What is the asking price?"
90001110-14 = "You two... They're fresh out of prophet stock."
90001110-15 = "I recorded the signal's coordinates. I'll send them to you now."
90001110-16 = "It's quite a ways away. I'm curious to investigate, but having to take the risk of moving our base again..."
90001110-17 = "Furthermore, to send out such a strong signal...there could be ill intent behind it."
90001110-18 = "Like something's summoning us?"
90001110-19 = "It's a similar functionality to a bug zapper. I understand."
90001110-21 = "I can't say for certain, but I certainly wouldn't rule it out."
90001110-22 = "[s] \"I smell a hidden trap!\""
90001110-23 = "While it'd be rather valiant for the headlines to say something like, \"The Super Phenomenon Task Force bravely takes on the enemy's trap and prevails!\"..."
90001110-24 = "I oppose. It's irrational and inefficient."
90001110-25 = "Yes. I agree with Ms. Rio."
90001110-26 = "I am left with no other choice. Since no one else is taking the president's side, I will stand by her. I'm sorry, Ms. Rio."
90001110-30 = "Wh-What...?"
90001110-34 = "Can you please not show sympathy like you're dealing with leftover inventory?! On top of that, it's not like I've advocated for one method or another!"
90001110-36 = "Then you're the one at fault, President. You should be presenting clear and concise proposals to the council."
90001110-37 = "It was meant to be an ice breaker! An ice breaker!"
90001110-38 = "To FINISH what I was saying, while bravely facing the trap is an appealing option, I can't risk the safety of our members."
90001110-39 = "Then utilize my AMAS."
90001110-40 = "I have an AMAS drone that I modified for high speed recon, for situations like this. "
90001110-41 = "I'll send it to the signal's origin."
90001110-42 = "Oh, my. So that neurotic personality of yours CAN be useful sometimes."
90001110-43 = "I'm only deploying the most rational method for the situation. What're you trying to say?"
90001110-44 = "Forget it! I can't even open my mouth around here!"
90001110-47 = "I've deployed the drone. It'll take about twenty minutes to reach the area."
90001110-48 = "I'll slow it down, connect the video—"
90001110-49 = "What?!"
90001110-50 = "Is there an issue, Ms. Rio?"
90001110-51 = "...I lost connection with my AMAS drone."
90001110-52 = "We need more details, Ms. Rio."
90001110-53 = "It's as I said. My connection was severed out of nowhere."
90001110-54 = "It must have sent some amount of data before that happened, no?"
90001110-55 = "Hold on. I'm analyzing it."
90001110-56 = "This is...?"
90001110-57 = "...Is something wrong?"
90001110-58 = "Himari. I'm sending you the data right now. Help me analyze it."
90001110-59 = "It's really unusual for you to request my help. And so I'd assume..."
90001110-60 = "Yes. I'm truly hoping that my interpretation is wrong here."
90001110-65 = "[ns] \"What's going on? Things are okay... Right?\""
90001110-66 = "What in the...?! This means...!"
90001110-67 = "...It seems like I wasn't wrong."
90001110-68 = "Yeah. There's no way you would make a mistake with these. After all, I do respect you when it comes to this field."
90001110-69 = "What's the matter, President Himari?"
90001110-70 = "To get to the heart of the issue, it appears that at the coordinates is..."
90001110-71 = "...the Multidimensional Barrier that once protected the Ark of Atrahasis."
90001110-72 = "[s] \"The Ark of Atrahasis...?!\""
90001110-77 = "Yes. Sensei. There's no mistaking it."
90001110-78 = "But why here? And why now? Does this mean...the red sky will return to Kivotos? And the strange machines?"
90001110-86 = "I suppose you could call this a silver lining, but I don't think the threat is to that extent."
90001110-87 = "That's right. At the very least, it doesn't seem like there are signs of dimensional interference at the mentioned coordinates."
90001110-88 = "But the Multidimensional Barrier is there?"
90001110-89 = "Yes. Considering this new data and what we've discovered so far, I would have to conclude..."
90001110-90 = "...that the prophets have fully immersed themselves in the power of the Nameless Gods."
90001110-91 = "Furthermore, for them to have utilized an almost insurmountable defense mechanism, a supernatural phenomenon beyond anything we'd previously encountered..."
90001110-92 = "Which means they're hiding something here."
90001110-93 = "Yes. So what countermeasures are currently available to us?"
90001110-94 = "The only way we overcame the Multidimensional Barrier the first time was with the Utnapishtim's Ship Sensei made for us."
90001110-95 = "We would be hard-pressed to get another supernatural phenomenon at that scale into our arsenal again."
90001110-99 = "[ns] \"Yeah... That's probably the case...\""
90001110-100 = "Right... It's difficult to admit, but we're low on options."
90001110-101 = "Everything is a non-starter, if we can't find a way to deal with the Nameless Gods' power."
90001110-102 = "And even if we forgot the barrier, we'll have to find a way to circumvent the prophets' ability to manipulate material reconstruction and recover infinitely."
90001110-103 = "I agree. We may have dealt some critical damage to Geburah and Chokmah, but they recovered in no time at all."
90001110-104 = "Yes. Using reconstruction, their recovery process is almost instantaneous."
90001110-105 = "The prophets are already able to utilize the Nameless Gods' power to this extent? What can we even do about it?"
90001110-106 = "Also, President, how can we forget the Multidimensional Barrier? Even if we try to pretend it's not there, it will still be in our way."
90001110-107 = "[s] \"Now that I think about it, what did we do back then?\""
90001110-108 = "Back then..."
90001110-111 = "Our main objective is to destroy the Ark of Atrahasis in the sky above Kivotos."
90001110-114 = "However, the Ark is protected by a quantum superposition state barrier that makes physical access from the outside impossible."
90001110-115 = "As long as this barrier is in place, physically reaching the Ark is impossible."
90001110-117 = "Therefore, we plan to pass through the barrier by putting Utnapishtim's Ship in the same quantum superposition state."
90001110-119 = "But ultimately, that approach method failed because the Ark of Atrahasis changed the entire value of the state itself."
90001110-120 = "So we ultimately relied on..."
90001110-121 = "Ah...!"
90001110-131 = "[ns] \"...!\""
90001110-136 = "Next Episode;Proposal"

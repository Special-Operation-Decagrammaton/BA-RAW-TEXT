90001110-101 = "3;리오;02;일단, 이름 없는 신들의 힘에 대응할 방법을 찾지 못하면, 사태의 근본적인 해결에는 이르지 못해.\n#3;sig"
90001110-102 = "3;히마리 방한복;05;그래요. 다차원 배리어는 일단 생각하지 않는다고 해도, 그 물질의 재구축 능력에서 기인하는, 무한에 가까운 예언자들의 회복력을 감당할 방법이 없죠."
90001110-103 = "3;토키 모드 1;07;확실히, 게부라도 호크마도 어느 정도 타격을 주었다고 생각했지만, 이내 원래의 모습을 되찾았습니다."

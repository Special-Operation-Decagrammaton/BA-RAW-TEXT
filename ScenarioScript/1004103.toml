[translation]
1004103-1 = "不受控制的身體"
1004103-2 = "……"
1004103-3 = "[s]「……」"
1004103-4 = "為什麼又變成這樣了……我沒有要見面的意思啊。"
1004103-5 = "[s]「抱，抱歉……」"
1004103-6 = "這次有什麼事嗎？"
1004103-7 = "[s]「沒什麼事啦，不過……」"
1004103-8 = "那我回去了。"
1004103-9 = "[s]「等，等一下！」"
1004103-10 = "……又怎麼了？"
1004103-11 = "[s]「要不要加深一下彼此的感情呀？」"
1004103-12 = "為什麼？"
1004103-13 = "[s]「那個……我們能彼此認識也算是有緣啊……」"
1004103-14 = "才沒有緣分這種東西。"
1004103-15 = "說到底，人只不過是被困在肉體這座孤島上的遇難者。"
1004103-16 = "孤獨地出生、孤獨地生活、孤獨地死去。這就是人生。"
1004103-17 = "那種在人與人之間連接的線，不過是人們的妄想。"
1004103-18 = "[s]「這樣啊……」"
1004103-19 = "……"
1004103-20 = "……唉。"
1004103-21 = "……算了，隨你吧。"
1004103-22 = "那我們要做什麼？"
1004103-23 = "[s]「嗯……要去散步嗎？」"
1004103-24 = "……"
1004103-25 = "……如果是命令我就去。"
1004103-27 = "……"
1004103-28 = "[s]「好漂亮的花唷。」"
1004103-29 = "是啊。"
1004103-30 = "[s]「有河耶。」"
1004103-31 = "……是啊。"
1004103-32 = "[s]「啊……那個……」"
1004103-33 = "……"
1004103-34 = "這些東西都只是單純存在在那裡而已，有什麼特別的意義嗎？"
1004103-35 = "[s]「這，這樣啊……」"
1004103-36 = "我不想在這裡待太久……只是因為老師如此命令我才來的。"
1004103-37 = "[s]「話說你怎麼把口罩戴上了？」"
1004103-38 = "……沒有，只是有點……"
1004103-39 = "[s1]「脫掉口罩吧。」\n[s2]「呼吸些新鮮空氣比較好唷。」"
1004103-40 = "不，不用了……那不重要……還有，別靠近我──"
1004103-41 = "不，不用了……那不重要……還有，別靠近我──"
1004103-42 = "哈……！"
1004103-43 = "哈啾──！"
1004103-44 = "[s]「……！？」"
1004103-45 = "哈啾！"
1004103-46 = "哈啾！"
1004103-47 = "哈啾，哈啾！！！"
1004103-48 = "[s]「……」"
1004103-49 = "這……這裡花粉太多了……！"
1004103-50 = "[s]「美咲，剛才……」"
1004103-51 = "花粉症真的有夠…………嗯？"
1004103-52 = "[s]「美咲……那個……鼻水……」"
1004103-53 = "……嗯？"
1004103-54 = "嗚，嗚哇──────────！？！"
1004103-55 = "等，等等……面紙在哪裡……！？"
1004103-56 = "[s3]「等我一下！」\n[s4]「我這裡有手帕……」"
1004103-63 = "（過了一會……）"
1004103-65 = "唉……"
1004103-66 = "[s]「沒，沒事吧？美咲？」"
1004103-67 = "……快離開這裡吧。"
1004103-70 = "[ns]「來，飲料。」"
1004103-71 = "……謝謝，老師。"
1004103-72 = "唉……"
1004103-73 = "……肉體果然不是個好東西。"
1004103-74 = "[s]「原來你有花粉症啊……」"
1004103-75 = "嗯……不過多虧老師，才避免了最糟的情況。"
1004103-76 = "[s]「那就好。」"
1004103-77 = "……"
1004103-78 = "[s]「多虧了我和美咲的緣分。」"
1004103-79 = "但說到底這都是老師造成的吧。"
1004103-80 = "把話說得冠冕堂皇也該有個限度。"
1004103-81 = "[s]「對不起……」"
1004103-82 = "……"
1004103-83 = "不過，還是謝謝你……"
1004103-84 = "……手帕，我會洗乾淨再還你。"
1004103-85 = "[s]「嗯？直接還我也沒關係……」"
1004103-86 = "……"
1004103-87 = "[s]「啊，不是……對不起……」"
1004103-88 = "唉。"

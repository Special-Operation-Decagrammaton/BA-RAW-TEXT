[translation]
83306105100-5 = "嗚啊啊啊～！怎麼辦！我把餐券弄丟了！"
83306105100-6 = "所以我才說要好好確認口袋的嘛！"
83306105100-7 = "我又不是故意要弄丟的～！"
83306105100-8 = "我一直很期待今天能吃到派對餐點，所以時不時會確認的說！"
83306105100-9 = "結果卻碰巧在今天弄丟了呢。"
83306105100-10 = "偏偏在重要的日子★弄丟～這種事也很常見嘛～"
83306105100-12 = "為什麼偏偏是今天啦！"
83306105100-18 = "你們好像遇到了什麼困難啊，美食研究會。"
83306105100-19 = "啊！風，風紀委員長！我今天還沒有做錯任何事哦！"
83306105100-20 = "我們現在是只能流著口水，看著眼前那些美味派對餐點的……"
83306105100-21 = "身處悲劇的可憐學生！"
83306105100-22 = "嗯？只有弄丟餐券的淳子不能吃吧？#n我有餐券啊？"
83306105100-23 = "嗯，我也一樣。"
83306105100-24 = "我也有帶著哦～"
83306105100-26 = "你們這些傢伙！打算拋下成員嗎！？"
83306105100-27 = "淳子同學，話不能這麼說。"
83306105100-28 = "嗯？"
83306105100-29 = "我們美食研究會，是由追求究極美食的人所組成。"
83306105100-30 = "如果在過程中不小心弄丟餐券，那麼拋下你的人並不是我們，而是你自己才對。"
83306105100-31 = "嗚，嗚哇啊啊啊～！你乾脆給我個痛快吧！！"
83306105100-32 = "……如果是這樣的話，你不如用我的餐券吧。"
83306105100-33 = "不，身為美食研究會的一員，我不允許那種權宜之計。"
83306105100-34 = "你在這方面還真是講究。"
83306105100-35 = "呵呵，希望你能稱之為對美食的執著。"
83306105100-36 = "所以……大家一起來找淳子同學的餐券吧。"
83306105100-37 = "咦！？真的嗎！？"
83306105100-38 = "那當然，畢竟食物就是要和同伴與朋友一起享用，才會更具價值和美味。"
83306105100-39 = "嗯，真拿你沒辦法。#n雖然肚子很餓，不過一起吃才會更好吃！一起認真找吧！"
83306105100-40 = "呵呵，我一開始就猜到會這樣了～★"
83306105100-41 = "你們……！"
83306105100-42 = "……那我也來幫忙吧。"
83306105100-43 = "大家……謝謝你們！"

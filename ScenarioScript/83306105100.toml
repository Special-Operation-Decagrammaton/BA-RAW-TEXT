83306105100-38 = "3;하루나;01;네, 이러니저러니 해도 음식이란, 동료, 그리고 친구와 함께 먹을 때 더욱 값지고 맛난 법이니까요."
83306105100-39 = "3;이즈미;03;응, 어쩔 수 없지. 배는 고프지만! 같이 먹는 게 더 좋으니까. 힘내서 찾아보자!\n#3;jump"

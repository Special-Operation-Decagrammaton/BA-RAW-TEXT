83306105100-19 = "3;준코;04;앗! 서, 선도부장! 오늘은 아직 아무런 일도 저지르지 않았으니까 말이야!\n#3;em;[?!]\n#3;shake"
83306105100-20 = "3;준코;14;우리는 지금 그냥 맛있는 파티 음식을 눈앞에 두고 가련하게 침만 흘릴 수밖에 없는……\n#3;stiff"
83306105100-21 = "3;준코;05;그런 비극적인 상황에 처했을 뿐인 불쌍한 학생이라구!\n#3;jump"

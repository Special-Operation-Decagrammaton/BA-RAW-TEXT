[translation]
83306105100-5 = "อ๊าาา~! ทำยังไงดี! คูปองอาหารหายไปแล้ว!"
83306105100-6 = "ทำไมไม่เช็กกระเป๋าให้ดีๆ ตั้งแต่แรกล่ะ!"
83306105100-7 = "ฉันก็ไม่ได้อยากทำหายสักหน่อย~!"
83306105100-8 = "ฉันเฝ้ารอวันที่จะได้กินอาหารงานปาร์ตี้ถึงกับต้องหยิบคูปองอาหารออกมาดูทุกวันเลยนะ!"
83306105100-9 = "แต่ก็ดันมาหายไปในวันงานปาร์ตี้สินะคะ "
83306105100-10 = "ชีวิตเราก็คงต้องมีวันแบบนี้บ้างละค่ะ★~"
83306105100-12 = "แต่ทำไมต้องมาเป็นวันนี้ด้วยล่ะ!"
83306105100-18 = "ดูเหมือนจะตกอยู่ในสถานการณ์ที่ยากลำบากนะ ชมรมชิมอาหาร"
83306105100-19 = "อ๊ะ! ปะ... ประธานกรรมการวินัย! วันนี้พวกเรายังไม่ได้ก่อเรื่องอะไรเลยนะ!"
83306105100-20 = "ตอนนี้เราก็แค่มีอาหารปาร์ตี้อร่อยๆ อยู่ตรงหน้า แต่ทำได้แค่กลืนน้ำลายเงียบๆ อย่างน่าเห็นใจ..."
83306105100-21 = "ไม่ได้เป็นชมรมน่าสงสารที่อยู่ในสถานการณ์ที่ยากลำบากอะไรขนาดนั้นสักหน่อย!"
83306105100-22 = "หืม? แต่คนที่ทำคูปองอาหารหายมีแค่จุนโกะคนเดียวไม่ใช่เหรอ ของฉันยังอยู่นะ"
83306105100-23 = "ค่ะ ของฉันก็ด้วยค่ะ"
83306105100-24 = "ฉันก็มีอยู่กับตัวค่า~"
83306105100-26 = "คนพวกนี้นี่! จะทิ้งเพื่อนร่วมชมรมงั้นเหรอ?!"
83306105100-27 = "คุณจุนโกะ พูดผิดแล้วละค่ะ"
83306105100-28 = "หืม?"
83306105100-29 = "ชมรมชิมอาหารของเราคือที่รวมตัวกันของคนที่แสวงหาอาหารรสเลิศ"
83306105100-30 = "และหากมีใครทำคูปองอาหารนั้นหายระหว่างกระบวนการแสวงหาอาหารรสเลิศละก็ พวกเราจะไม่ทิ้ง#nคนคนนั้น แต่คนคนนั้นทำตัวเองให้ถูกทิ้งเองค่ะ"
83306105100-31 = "งะ... ง๊าาาาา~! พูดแบบนี้ เอามีดมาแทงกันเลยดีกว่า!"
83306105100-32 = "ฉันจะให้คูปองอาหารที่มีเอง..."
83306105100-33 = "ไม่เป็นไรค่ะ ในฐานะสมาชิกชมรมชิมอาหาร ฉันจะอนุญาตให้ใช้วิธีง่ายๆ แบบนั้นไม่ได้ค่ะ"
83306105100-34 = "ทีเรื่องแบบนี้ละเย็นชาจังเลยนะ"
83306105100-35 = "ฮุฮุ เรียกว่าเป็นความดื้อดึงเพื่ออาหารเลิศรสดีกว่า"
83306105100-36 = "เอาละ เราไปหาคูปองอาหารที่คุณจุนโกะทำหายด้วยกันดีกว่าค่ะ"
83306105100-37 = "หืม?!  เอางั้นจริงเหรอ?!"
83306105100-38 = "จริงสิคะ อาหารจะมีคุณค่าและอร่อยมากกว่าหากได้กินกับเพื่อนๆ นี่คะ"
83306105100-39 = "อื้ม งั้นก็ช่วยไม่ได้สินะ ถึงท้องจะหิว แต่กินด้วยกันครบทุกคนก็น่าจะดีกว่า งั้นเราไปหาคูปองอาหารกัน#nเลย!"
83306105100-40 = "ฮุฮุฮุ ฉันรู้ตั้งแต่แรกแล้วค่ะว่าจะเป็นอย่างนี้~★"
83306105100-41 = "ทุกคน...!"
83306105100-42 = "ถ้างั้น... ฉันจะช่วยหาด้วยอีกแรง"
83306105100-43 = "ทุกคน... ขอบใจนะ!"

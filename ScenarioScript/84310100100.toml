[translation]
84310100100-6 = "Oh, it's a little noisy. What's going on?"
84310100100-11 = "Ah, Yurizono Seia. I'm glad you're here. I had something to say to you."
84310100100-13 = "To me?"
84310100100-14 = "Do you need me to do something?"
84310100100-15 = "It's the other way around. I'm telling her to stop giving you errands."
84310100100-16 = "...Huh? What do you...?"
84310100100-17 = "I know you're willing to help, but we've been giving you way too many tasks. You're supposed to be a guest here."
84310100100-21 = "Honestly, do you even remember you're here to look around the Expo? Do you feel like you're here just for the missions now?"
84310100100-22 = "That's not..."
84310100100-26 = "...I suppose that's not entirely false. To tell you the truth."
84310100100-27 = "See? See? So how does this make sense?"
84310100100-29 = "But this is what she asked for."
84310100100-30 = "People change their minds sometimes!"
84310100100-35 = "Just because she said that, you can't take her for granted and keep giving her tasks for days on end!"
84310100100-36 = "N-No, Neru. It's fine, really. But I do appreciate your consideration..."
84310100100-37 = "Well, it's not just that..."
84310100100-38 = "...Sensei came and talked to us."
84310100100-40 = "..."
84310100100-42 = "Sensei...? Was it about me?"
84310100100-43 = "Not in a scolding way, but..."
84310100100-44 = "Sensei said it'd be nice if you had a couple of days to just enjoy the Expo."
84310100100-45 = "Very politely, mind you, but we got the message."
84310100100-50 = "...Indeed we did. And you have my apologies."
84310100100-52 = "No, again, no apologies needed. You both gave me exactly what I asked for."
84310100100-53 = "But I do understand Sensei's point."
84310100100-54 = "I did have a reason for coming here, and I ought to spend some time making good on that reason."
84310100100-55 = "You should. Just for a day or two. Forget about our work. Just walk around the Expo and enjoy things."
84310100100-56 = "Yeah, and even if something does happen, the two of us can handle it."
84310100100-57 = "Tsk. Would've been nice if Sensei went straight to Seia, instead of making me say all that..."
84310100100-59 = "(...I suppose they both feel that way.)"
84310100100-60 = "(But Sensei clearly has great faith in Neru. And I'm sure she's earned that faith.)"
84310100100-61 = "All right. Since everyone's telling me the same thing, I'll just clear my mind and go walk around."
84310100100-63 = "Yeah. Have fun."
84310100100-64 = "Take care. Tell us if anything happens."
84310100100-66 = "Fufu, I will."

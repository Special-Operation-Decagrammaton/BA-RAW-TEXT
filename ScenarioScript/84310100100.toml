84310100100-42 = "5;네루 교복;05\n1;세이아;04;선생님……께서? 저희에게요?\n#1;stiff"
84310100100-43 = "5;네루 교복;24;아니, 한 소리 들었다고 하니까 막 뭐라 한 걸로 오해할 수 있겠는데…… 그런 건 아니고.\n#5;em;[한숨]"
84310100100-44 = "5;네루 교복;00;하루이틀 정도라도 순수하게 엑스포를 즐기는 날도 있으면 좋겠다-라고 말했다고."

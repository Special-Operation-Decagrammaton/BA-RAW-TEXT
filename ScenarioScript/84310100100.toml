[translation]
84310100100-6 = "เอ๋... เสียงดังกันจังเลยนะคะ มีเรื่องอะไรกันเหรอคะ?"
84310100100-11 = "อ่า ยูริโซโนะ เซอา มาได้จังหวะเลย ฉันมีเรื่องอยากบอกอยู่พอดีน่ะ"
84310100100-13 = "มีเรื่องอยากบอกเหรอคะ? บอกฉันน่ะเหรอ?"
84310100100-14 = "จะสั่งงานอะไรฉันงั้นเหรอคะ?"
84310100100-15 = "เปล่าหรอก ตรงกันข้ามเลยต่างหาก เรากำลังคุยกันว่าจะเลิกสั่งงานเธอน่ะ"
84310100100-16 = "คะ...? หมายความว่ายังไง..."
84310100100-17 = "ถึงเธอจะบอกเองว่าเต็มใจช่วย แต่พวกฉันก็ขอให้ช่วยทำนู่นนี่ให้บ่อยเกินไปนี่นา เธอเป็นแขกของ#nโรงเรียนเราแท้ๆ แต่กลายเป็นว่าเราไม่ได้ทำหน้าที่เจ้าบ้านเลย"
84310100100-21 = "บอกฉันมาตามตรงนะ เธอเองก็ลืมไปแล้วใช่มั้ยว่าตัวเองเป็นฝ่ายที่มาดูงานเอ็กซ์โปที่นี่? หรือว่าใจหนึ่งคิดว่ามาทำภารกิจอะไรที่นี่น่ะ?"
84310100100-22 = "หมายความว่ายังไง..."
84310100100-26 = "แต่พูดตามตรง... ฉันก็คงปฏิเสธไม่ได้นะคะ"
84310100100-27 = "ดูเอาเถอะ แบบนี้ใช่ได้ที่ไหน?"
84310100100-29 = "แต่นี่เป็นสิ่งที่ยูริโซโนะ เซอาต้องการ..."
84310100100-30 = "ความคิดของคนเรามันเปลี่ยนกันได้ทุกวันนั่นละ!"
84310100100-35 = "ถึงอีกฝ่ายจะบอกว่ายินดีที่จะทำ แต่เราก็ไม่ควรใช้งานตามอำเภอใจหลายๆ วันติดต่อกันแบบนี้สิ!?"
84310100100-36 = "มะ... ไม่หรอกค่ะ เนรุ ขอบคุณในความเอาใจใส่นะคะ แต่ฉันไม่เป็นไรจริงๆ ค่ะ"
84310100100-37 = "อีกอย่างนะ..."
84310100100-38 = "ครูก็มาบอกอะไรบางอย่างกับฉันด้วย"
84310100100-40 = "...!"
84310100100-42 = "คุณครู... น่ะเหรอคะ? พูดเกี่ยวกับฉันเหรอ?"
84310100100-43 = "ก็ใช่น่ะสิ แต่ไม่ใช่ว่าครูมาสั่งห้ามอะไรหรอกนะ..."
84310100100-44 = "แต่แค่บอกว่าอยากให้เธอมีวันว่างที่ได้ไปสนุกในงานเอ็กซ์โปสัก 1-2 วันน่ะ"
84310100100-45 = "ฉันก็เลยมาขอให้ริโอะสั่งงานเธอให้น้อยลงไง"
84310100100-50 = "ฉันต้อง... ขอโทษด้วยนะ"
84310100100-52 = "ไม่หรอกค่ะ ฉันขอพูดอีกครั้งนะคะ นี่ไม่ใช่เรื่องที่ต้องขอโทษกันหรอก ฉันต่างหากที่เป็นฝ่ายบอกว่า#nอยากทำ แล้วริโอะก็แค่ตอบรับความต้องการของฉันก็เท่านั้นเองค่ะ"
84310100100-53 = "แต่ว่า.... นั่นสินะคะ ฉันก็เข้าใจที่คุณครูพูดค่ะ"
84310100100-54 = "ฉันคงต้องให้ความสำคัญกับเหตุผลที่มาที่นี่ตั้งแต่แรกด้วยค่ะ"
84310100100-55 = "คงจะต้องอย่างนั้นละ ฉันก็อยากให้เธอไปเที่ยวชมงานเอ็กซ์โปอย่างสนุก แล้วไม่ต้องสนใจงานที่นี่สัก 1-2 วัน"
84310100100-56 = "ใช่ และต่อให้เกิดเรื่องอะไรทางนี้ ฉันกับริโอะก็จะหาทางจัดการกันเอง"
84310100100-57 = "ชิ เรื่องแค่นี้ครูก็พูดเองได้นี่นา ทำไมต้องมาบอกผ่านฉันด้วยก็ไม่รู้ ทำตัวเหมือนคนจู้จี้ไปได้"
84310100100-59 = "(ทั้งสองคนมีความสัมพันธ์กันอย่างนี้สินะ...)"
84310100100-60 = "(คุณครูเชื่อใจเนรุจังเลยนะคะ รู้สึกอิจฉาขึ้นมานิดหน่อยเลย นั่นคงเป็นผลจากการกระทำที่ผ่านมาของ#nเนรุสินะคะ)"
84310100100-61 = "เข้าใจแล้วค่ะ ในเมื่อทุกคนพูดแบบนี้... งั้นวันนี้ฉันจะไปเดินเที่ยวในงานเอ็กซ์โปค่ะ"
84310100100-63 = "อื้อ ดูงานให้สนุกล่ะ"
84310100100-64 = "เที่ยวในงานให้สนุกนะ มีเรื่องอะไรก็ติดต่อมาได้เลย"
84310100100-66 = "ฮุฮุ ได้เลยค่ะ"

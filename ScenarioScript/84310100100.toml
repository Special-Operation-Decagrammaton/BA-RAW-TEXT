[translation]
84310100100-6 = "哎呀……好像有點吵鬧呢。#n發生什麼事了嗎？"
84310100100-11 = "啊，百合園聖亞。#n你來得正好，我剛好有話想跟你說。"
84310100100-13 = "有話想跟我說？"
84310100100-14 = "難道是有事情要交給我做嗎？"
84310100100-15 = "不，正好相反。#n我們都覺得不應該再把事情交給你了。"
84310100100-16 = "……嗯？那是什麼意思……"
84310100100-17 = "雖然你說過自己很樂意幫忙，但我們實在太常叫你做事了。#n搞得都快分不清到底誰是客人、誰是主人了。"
84310100100-21 = "你老實說，你是不是已經忘記自己其實是來參觀博覽會的了？#n心裡是不是多少有點是來出任務的心情？"
84310100100-22 = "這……"
84310100100-26 = "……坦白說，我確實無法否認。"
84310100100-27 = "看吧？這太不像話了吧？"
84310100100-29 = "但這也是百合園聖亞自己的期望……"
84310100100-30 = "人的想法又不是每天都一樣！"
84310100100-35 = "因為別人同意就這樣理所當然地連續使喚人家好幾天，這樣怎麼行！？"
84310100100-36 = "沒，沒事的，寧瑠。我真的不介意。#n謝謝你替我費心。"
84310100100-37 = "除此之外……"
84310100100-38 = "……我也被老師念了一下。"
84310100100-40 = "……！"
84310100100-42 = "你說老師他……？"
84310100100-43 = "呃，說是「被念了」可能會讓你們誤以為老師說得很嚴厲……但其實不是那樣的。"
84310100100-44 = "希望能讓你單純地享受博覽會一兩天──他是這麼說的。"
84310100100-45 = "雖然說得很委婉，但基本上就是那個意思吧？"
84310100100-50 = "……也對，看來我應該向你道歉。"
84310100100-52 = "不，我再說一次，你不需要為了這件事道歉。#n畢竟是我先提出想這麼做的，莉央只是答應了我的請求而已。"
84310100100-53 = "不過……我也明白老師說的意思。"
84310100100-54 = "來到這裡的真正原因也不能忘記，這樣才不會留下遺憾吧。"
84310100100-55 = "就這麼做吧。#n希望你這幾天先放下這邊的事，單純地到會場享受博覽會。"
84310100100-56 = "要是出了什麼事的話，我跟這傢伙也會自己看著辦的。"
84310100100-57 = "呿，這些話老師明明可以直接自己說的，結果卻非要跟我說。#n真愛嘮叨。"
84310100100-59 = "（……他們兩人之間，似乎有種獨特的相處模式呢）"
84310100100-60 = "（看來老師非常信賴寧瑠……不禁讓人有點羨慕。#n　那也是對他過往行為的回報吧）"
84310100100-61 = "我明白了。#n既然大家都這麼說了……今天我就把任務的事忘掉，去博覽會會場逛逛吧。"
84310100100-63 = "嗯，注意安全啊。"
84310100100-64 = "路上小心。有什麼事隨時跟我說。"
84310100100-66 = "呵呵，我會的。"

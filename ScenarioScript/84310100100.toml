84310100100-50 = "3;리오;06;……확실히. 사과해야겠군.\n#3;stiff"
84310100100-51 = "#all;hide"
84310100100-52 = "3;세이아;02;아뇨. 다시 말씀드리지만 사과할 일은 아니에요. 어디까지나 제가 먼저 하고 싶다고 했고, 리오는 그걸 받아 주었을 뿐이니까요.\n#3;em;[반응]"
84310100100-53 = "3;세이아;99;하지만…… 그러네요. 선생님께서 하신 말씀도 이해는 갑니다."
84310100100-54 = "3;세이아;01;이곳에 온 본질적인 이유도, 조금은 챙겨 둬야 아쉬움이 없겠지요."
84310100100-55 = "3;리오;00;그래야겠어. 하루이틀 정도는 이쪽 일에 신경 쓰지 말고, 회장을 돌며 엑스포를 순수하게 즐겨줬으면 해."
84310100100-56 = "5;네루 교복;24;그래. 뭐 어차피 이쪽에서 무슨 일 좀 생긴다고 해도, 나랑 이 녀석이 알아서 처리하면 되니까.\n#5;em;[한숨]\n#5;al\n#3;m1"
84310100100-57 = "5;네루 교복;01;쳇. 선생도 이런 이야기는 직접 해도 될 건데, 굳이 나한테 하고 말이야. 잔소리꾼 같으니."
84310100100-58 = "#all;hide"
84310100100-59 = "3;세이아;99;(……두 사람 사이에는 그런 분위기도 있나 보군요.)"
84310100100-60 = "3;세이아;01;(네루에 대한 선생님의 신뢰는 굉장하군요. 조금 부럽다는 생각도 드네요. 그것도 그녀가 지금까지 보여준 행동들에 대한 보답이겠지요.)\n#3;em;…"
84310100100-61 = "3;세이아;02;알겠습니다. 그러면 모두들 그렇게 말씀하시니…… 오늘은 저도 다 잊고, 엑스포 회장을 둘러보다 오겠습니다.\n#3;greeting"

[translation]
2501-1 = "Manners Maketh the Game Part 1"
2501-2 = "Millennium Game Development Department"
2501-7 = "Ugh...argh!"
2501-8 = "What are you up to, Sis?"
2501-9 = "Don't distract me, Midori! This is a critical moment!"
2501-10 = "One more hit... Just one more hit and I'll be victorious!"
2501-11 = "Oh, Student Fighter 2! You've been playing this game a lot lately, huh?"
2501-12 = "Yup, they just added online matchmaking in the last update. Now I can play in real time with people at the arcade!"
2501-13 = "I was starting to get bored because I was only finding easy opponents..."
2501-14 = "But after a while, I finally ran into a worthy challenger!"
2501-20 = "Good, I got 'em cornered! Now I just have to use a command grab to cancel their guard..."
2501-22 = "What the heck? They did a guard evasion into an uppercut?!"
2501-23 = "Followed by a big combo...and a finisher too?!"
2501-29 = "<SYSTEM> Peach_Fighter has been defeated!"
2501-30 = "What, seriously?! I made one tiny mistake at the end and I got the tables turned on me!"
2501-31 = "So close. It was by a whisker!"
2501-32 = "Nothing you can do about it, though. A match is a match."
2501-33 = "I should send them a thank-you message for that good game..."
2501-35 = "\"Peach_Fighter: Good game, Sukeban312. Let's have a rematch sometime!\""
2501-36 = "Sukeban312: git gud n00b lol."
2501-37 = "Wh-What? That's completely uncalled for!"
2501-39 = "\"Peach_Fighter: Come on, what's with that attitude? You're acting like a child!\""
2501-40 = "Sukeban312: You're the child here, not me. Actually, seeing how slow your moves were, maybe I should be calling you \"Granny\" instead!"
2501-41 = "Granny?!"
2501-43 = "\"Peach_Fighter: I almost beat you, remember?!\""
2501-44 = "Sukeban312: Is someone crying? Sorry, I don't speak loser!"
2501-45 = "Ugh! ...Where do you live?! Give me your address right now!"
2501-46 = "SYSTEM: You have been blocked."
2501-47 = "..."
2501-49 = "...Ooh boy, that's rough."
2501-50 = "What the heck...?"
2501-52 = "What the heck is with this toxic player?!"
2501-54 = "Well, since they did that..."
2501-55 = "We're going on a real-life hunt!"
2501-57 = "What? Us too...?"
2501-58 = "You want us to come with you?"
2501-59 = "Of course! Intimidating the opponent is everything!"
2501-60 = "I'm a hundred percent sure that we're dealing with a video game nerd, so if we show up in a big group, they'll get scared and apologize!"
2501-61 = "Aren't we just as nerdy as they are, though...?"
2501-62 = "Do you really have to get so worked up, Sis? It's only a game. You lost and they trash talked you. That's all."
2501-63 = "Just a game?! This is a matter of the Game Development Department's dignity!"
2501-64 = "That person not only trampled over my gesture of sportsmanship, but also called me a granny!"
2501-65 = "A granny... Ugh!"
2501-66 = "Absolutely unforgivable!"
2501-67 = "You're angrier about being called a granny than losing the match?"
2501-68 = "Actually, toxic players are a bad influence on the fighting game scene."
2501-69 = "If this kind of unpleasant experience becomes the norm every time someone plays a fighting game, who will ever play them?"
2501-70 = "For the sake of a clean gaming environment, we must teach this toxic player a lesson!"
2501-71 = "I agree. When I was playing an MMORPG a few days ago, my character got killed by a max-level player. It was so painful that I just wanted to quit the game completely..."
2501-72 = "But since then, I caught up to their level and have already had my revenge!"
2501-73 = "You've already reached max level? Seriously, your obsessiveness scares me sometimes..."
2501-74 = "But don't you taunt the opponent sometimes when you win, Sis?"
2501-75 = "As soon as you finished a game of Fruitjellies with me, you taunted me! You said, \"I could beat you using my feet\"!"
2501-76 = "Uh, well... That's...um..."
2501-77 = "It's okay to trash-talk people you know! It's much more rude to say things like that to total strangers."
2501-78 = "Whatever! Anyway, when I searched this person's match history, I found out that they logged in ten minutes ago from the nearby arcade."
2501-79 = "Which means that we can find them if we head over there right away. Let's track them down and get them to apologize for what they said!"
2501-80 = "I happen to have some business at the arcade myself... I guess I wouldn't mind joining you."
2501-81 = "It is like a quest to defeat the general of a demon lord! A four-player raid!"
2501-82 = "Uh...I don't have any business at the arcade, and I don't wanna get in a fight, either..."
2501-83 = "...Can I sit this one out?"
2501-84 = "No! In a group boss battle, each and every member has a critical role!"
2501-85 = "Zone control works best when there are four players, each blocking a side!"
2501-86 = "But still..."
2501-87 = "Oh, yeah! The new console that you've been waiting for should be on display there... Aren't you curious about what kind of new functions it has?"
2501-88 = "...A new console?!"
2501-89 = "You never go out on your own anyway. Let's take this opportunity to go see it together. What do you say?"
2501-90 = "Oh, all right. Fine..."
2501-91 = "But I won't get involved. I'll just watch from behind."
2501-92 = "That's good enough!"
2501-93 = "Ta-da! A four-player party has been formed!"
2501-96 = "All right, let's go teach that insolent troll a lesson!"

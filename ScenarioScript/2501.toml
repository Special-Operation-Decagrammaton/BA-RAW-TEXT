[translation]
2501-1 = "มารยาทที่ดีจะช่วยสร้างสรรค์เกม 1"
2501-2 = "ชมรมพัฒนาเกม มิลเลเนียม"
2501-7 = "อะ.... อื้ออออ...!"
2501-8 = "ทำอะไรอยู่เหรอคะพี่?"
2501-9 = "อย่ามากวนน่า มิโดริ! ตอนนี้กำลังเป็นเวลาสำคัญนะ!"
2501-10 = "อีกนิดเดียว...  ถ้าล้มอีกเครื่องนึงได้ก็จะชนะแล้ว...!"
2501-11 = "อ๋อ เล่นเกม <สติวเดนท์ ไฟเตอร์ 2> อยู่นี่เอง ช่วงนี้ตั้งใจเล่นน่าดูเลยนะ"
2501-12 = "ใช่ รอบนี้มีฟังก์ชั่นจับคู่ออนไลน์เพิ่มเข้ามา เลยทำให้แข่งกับเกมเมอร์คนอื่นที่เกมเซนเตอร์#nได้แบบเรียลไทม์ยังไงล่ะ"
2501-13 = "ที่ผ่านมามีแต่คู่ต่อสู้ที่น่าเบื่อทั้งนั้น..."
2501-14 = "นานๆ จะเจอคนที่มีฝีมือดีๆ สักที"
2501-20 = "เยี่ยม ต้อนมันไปจนมุมได้แล้ว! คราวนี้ถ้าใช้สกิลจัดการรวบผู้คุ้มกันของฝ่ายโน้นได้ล่ะก็..."
2501-22 = "เดี๋ยวสิ? เมื่อกี้นี้ผู้คุ้มกันมันหลบหมัดฉันแล้วสวนอัปเปอร์คัทกลับมางั้นเหรอ?!"
2501-23 = "แถมพอใช้คอมโบต่อเนื่องแล้วยัง...ใช้ท่าไม้ตายด้วย?!"
2501-29 = "<ข้อความระบบ> ผู้เล่น 'Peach_Fighter' พ่ายแพ้!"
2501-30 = "อ๊า! อะไรกันเนี่ย! แค่พลาดไปนิดเดียวผลก็พลิกล็อกเลยเหรอ!"
2501-31 = "น่าเสียดายจัง ช้าไปแค่ก้าวเดียวเอง..."
2501-32 = "แต่ก็ช่วยไม่ได้ล่ะนะ แพ้ก็คือแพ้ ชนะก็คือชนะ"
2501-33 = "ฉันควรส่งข้อความไปขอบคุณอีกฝ่ายที่ตั้งใจเล่นดีไหมนะ?\n\n"
2501-35 = "<Peach_Fighter: เป็นการแข่งขันที่ดีมากเลยนะ Sukebun312 ถ้ามีโอกาสไว้มาแข่งกันใหม่นะ>"
2501-36 = "<Sukebun312: คิคิคิคิ แย่จัง กลับไปซบอกแม่แล้วค่อยมาใหม่แล้วกันไป๊ เด็กน้อย>"
2501-37 = "วะ... ว่าไงนะ?! เกินไปแล้วนะ!"
2501-39 = "<Peach_Figther: เดี๋ยวก่อน ทำไมพูดแบบนั้นล่ะ ฉันไม่ใช่เด็กแล้วสักหน่อย!>"
2501-40 = "<Sukeban312: คนที่เด็กน่ะมันเธอต่างหาก ดูจากการเล่นเนิ่บๆ แบบนี้#nถ้าไม่ใช่เด็กก็คงเป็นยายแก่ๆ แล้วล่ะมั้ง?>"
2501-41 = "ยายแก่งั้นเร๊อะ....!"
2501-43 = "<Peach_Figther: แต่ว่าเธอเองก็เกือบแพ้ให้ฉันแล้วเหมือนกันนะ!>"
2501-44 = "<Sukeban312: หือ? เหมือนได้ยินใครร้องไห้งอแงอยู่เลยนะ?#nเสียงโวยวายของคนแพ้นี่ไม่น่าฟังเลย~>"
2501-45 = "นี่! เธออยู่ที่ไหนน่ะ บอกที่อยู่มาเลยนะ!"
2501-46 = "<ข้อความระบบ> ฝ่ายตรงข้ามได้ทำการบล็อกท่านแล้ว"
2501-47 = "......"
2501-49 = "เฮ้อ... แบบนี้มันทำเกินไปแล้วนะ"
2501-50 = "อะไรกัน...."
2501-52 = "อะไรกันเนี่ย เกมเมอร์นิสัยเสียคนนี้เนี่ย!"
2501-54 = "เพราะมีเรื่องแบบนี้...."
2501-55 = "ตอนนี้ก็ไป \"เรียล PK\" กันเถอะ!"
2501-57 = "พะ...พวกเราด้วยเหรอ?"
2501-58 = "...พวกเราต้องไปด้วยเหรอคะ?"
2501-59 = "แน่นอนน่ะสิ! หัวใจสำคัญของเรียล PK ก็คือจำนวนคนที่ไปชิงลงมือยังไงล่ะ!"
2501-60 = "ถึงยังไงคู่ต่อสู้ก็คงจะเป็นเด็กเนิร์ดที่รู้จักแต่เกมแน่ๆ เพราะงั้นถ้ารวมกันไปหลายๆ คนล่ะก็#nเจ้านั่นคงจะกลัวแล้วยอมขอโทษก่อนแน่!"
2501-61 = "เรื่องนั้นทางเราก็เหมือนกันไม่ใช่เหรอ..."
2501-62 = "พี่~ ต้องโมโหอะไรเบอร์นี้ด้วยเหรอ? มันก็แค่เล่นเกมแพ้แล้วถูกล้อแค่นั้นเองนี่นา"
2501-63 = "ไม่ใช่แค่เกมสักหน่อย! นี่เป็นเรื่องศักดิ์ศรีของชมรมพัฒนาเกมต่างหาก!"
2501-64 = "เจ้านั่นไม่ได้แค่เหยียบย่ำความเป็นมิตรที่ฉันหยิบยื่นให้ แต่ยังเรียกฉันว่ายายแก่ด้วยนะ!"
2501-65 = "ยายแก่อะไรกัน..."
2501-66 = "ยกโทษให้ไม่ได้เด็ดขาด!"
2501-67 = "ถ้างั้นพี่ก็โมโหที่ถูกเรียกว่ายายมากกว่าเรื่องแพ้ในเกมใช่ไหมล่ะ?"
2501-68 = "นอกจากนั้นแล้วสำหรับพวกเกมเมอร์นิสัยเสียพวกนี้น่ะ มักจะได้เปรียบเพราะสภาพแวดล้อม#nของการแข่งขันด้วยนะ"
2501-69 = "ถ้าเล่นเกมต่อสู้แล้วเจอเรื่องไม่สบอารมณ์แบบนี้ทุกครั้งใครจะอยากเล่นเกมต่อสู้กันอีกล่ะ?"
2501-70 = "ต้องสั่งสอนเจ้าพวกเกมเมอร์นิสัยเสียพวกนี้ให้รู้สำนึกเพื่อสร้างสภาพแวดล้อม#nการเล่นเกมที่ดีขึ้นยังไงล่ะ!"
2501-71 = "ใช่แล้วค่ะ เมื่อวานอาริสึเพิ่งเริ่มเล่นเกม RPG ออนไลน์เอง แล้วก็ถูกผู้เล่นที่เลเวลตันแล้ว#nมา PK ก็รู้สึกท้อจนอยากเลิกเล่นเลยค่ะ...."
2501-72 = "แน่นอนว่าฉันก็อัปเลเวลจนเลเวลตันแล้วก็ไปแก้แค้นในทันทีเลยค่ะ!"
2501-73 = "อัปเลเวลจนเลเวลตันได้ในวันเดียวเหรอ... เด็กคนนี้น่ากลัวจริงๆ..."
2501-74 = "อีกอย่างบางครั้งเวลาที่พี่ชนะพี่ก็ชอบยั่วโมโหฝ่ายตรงข้ามเหมือนกันไม่ใช่เหรอ?"
2501-75 = "เมื่อวานพอเล่นเกมฟุรุเจลลี่จบ พี่ก็พูดยั่วโมโหฉันว่า \"ใช้เท้าเล่นก็ชนะได้เหมือนกัน\"#nเลยไม่ใช่รึไง...."
2501-76 = "อึ่ก! คือว่า... เรื่องนั้นมัน...."
2501-77 = "ถะ... ถ้าเป็นคนรู้จักก็ไม่เป็นไรหรอกนี่นา! แต่มาพูดแย่ๆ กับคนที่เพิ่งเคยเจอกันแบบนี้น่ะ#nมันเกินไปนะ!"
2501-78 = "ยังไงก็เถอะ! พอดูประวัติการแข่งของฝ่ายตรงข้ามแล้วก็เจอว่าเข้าเล่นจากเกมเซ็นเตอร์ใกล้ๆ นี้#nเมื่อ 10 นาทีก่อนน่ะ"
2501-79 = "เพราะงั้นถ้าเราไปที่เกมเซ็นเตอร์ตอนนี้ก็จะเจอเจ้าเกมเมอร์นิสัยเสียคนนั้นได้นะ#nรีบไปหาตัวให้เจอแล้วให้เจ้านั่นขอโทษกับเรื่องที่เกิดขึ้นเถอะ!"
2501-80 = "ถ้าเป็นเกมเซ็นเตอร์ล่ะก็... ฉันจะแวะไปอยู่พอดีเลย ถ้างั้นจะไปด้วยก็ได้"
2501-81 = "เราจะออกเดินทางเพื่อไปจับจอมมารผู้ชั่วร้ายสินะคะ ปาร์ตี้ลงดันเจี้ยนแบบสี่คน!"
2501-82 = "เอ่อ... ฉันไม่มีธุระอะไรที่เกมเซ็นเตอร์ แล้วก็ไม่ได้อยากทะเลาะกับใคร..."
2501-83 = "ฉันขอไม่ไปได้ไหม...?"
2501-84 = "ไม่ได้! การบุกจู่โจมแบบกลุ่มน่ะ หน้าที่ของแต่ละคนในกลุ่มมันสำคัญมากเลยนะ!"
2501-85 = "ถ้าไปกันสี่คนเราก็จะตีวงล้อมแบบสี่ด้านได้ดีที่สุดยังไงล่ะ!"
2501-86 = "แต่ว่า..."
2501-87 = "อ๊ะ อีกเรื่องนึง ฉันได้ยินมาว่าเกมคอนโซลใหม่ที่ยูสึตั้งหน้าตั้งตารออยู่มีเปิดให้ทดลองเล่น#nที่เกมเซ็นเตอร์นั่นด้วยนะ... ไม่อยากรู้เหรอว่ามันเพิ่มฟังก์ชั่นอะไรมาบ้าง? "
2501-88 = "กะ...เกมคอนโซลใหม่...!"
2501-89 = "ยังไงยูสึก็ไม่ชอบออกไปข้างนอกคนเดียวอยู่แล้วนี่นา#nเพราะงั้นก็ออกไปพร้อมกับเราเลยสิ หือ~?"
2501-90 = "อะ...อื้ม เข้าใจแล้ว"
2501-91 = "ถ้างั้นฉันจะขอดูอยู่ห่างๆ ไม่เข้าไปยุ่งก็แล้วกัน..."
2501-92 = "เท่านั้นก็พอแล้วล่ะ!"
2501-93 = "แต่นแตนแต๊น! จับคู่ปาร์ตี้ 4 คนเรียบร้อยแล้วค่ะ!"
2501-96 = "ดีล่ะ ตอนนี้เรารีบไปสั่งสอนเจ้าเกมเมอร์นิสัยเสียนั่นกันเถอะ!"

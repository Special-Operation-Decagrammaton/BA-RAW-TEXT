2501-71 = "3;모모이;07\n5;아리스;05;그렇습니다. 아리스도 어제 시작한 온라인 RPG에서 만렙 유저에게 PK를 당했을 때는 게임을 그만두고 싶을 정도로 낙심했었습니다…….\n#5;greeting"

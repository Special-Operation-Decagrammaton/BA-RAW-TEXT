[translation]
2501-1 = "遊戲之道從禮貌開始（１）"
2501-2 = "千年．遊戲開發部"
2501-7 = "嗯，咕……呃……！"
2501-8 = "妳在做什麼，姐姐？"
2501-9 = "等等！現在是重要的時候！"
2501-10 = "再一擊，只要再擊中一擊，就能，贏了……！"
2501-11 = "啊，是《學生快打2》嗎？最近玩得真認真呢。"
2501-12 = "嗯，之前新增了，線上配對……功能！可以和遊戲中心的用戶，進行即時對戰……！"
2501-13 = "一直以來，都打得，挺輕鬆的……！"
2501-14 = "好久沒遇到，這麼強的對手……！"
2501-20 = "把對方逼到牆角了！被防禦的話就用抓技──"
2501-22 = "什麼，居然在這種時候迴避！？還使出上勾拳！？"
2501-23 = "等一下，持續使出連擊……再加上必殺技！？"
2501-29 = "<SYSTEM>「Peach_Figther」選手落敗！"
2501-30 = "嗚哇！因為最後的判斷失誤被逆轉了！？"
2501-31 = "真可惜，真的就差一點點了……"
2501-32 = "嗯……不過這也沒辦法，比賽就是比賽。"
2501-33 = "剛才打得也不錯，來傳個訊息給對手吧。"
2501-35 = "＜Peach_Figther：感謝Sukeban312的對戰！打得真不錯呢，之後有機會再來玩吧！＞"
2501-36 = "＜Sukeban312：回去練練吧爛咖＞"
2501-37 = "喂，啊！？他是怎樣！？"
2501-39 = "＜Peach_Figther：話不是這麼說的吧？都不是小孩了！＞"
2501-40 = "＜Sukeban312：你才是小孩吧。不對，操作跟反應都這麼慢，與其說是小孩不如說是老奶奶吧？＞"
2501-41 = "老，老奶奶……！？"
2501-43 = "＜Peach_Figther：話說得這麼好聽，你還不是差點輸給我！＞"
2501-44 = "＜Sukeban312：唉呦，臉好紅啊。乖，擦擦眼淚吧。話說喪家犬特別愛叫果然是真的呢＞"
2501-45 = "這傢伙……你住哪裡！？告訴我住址！既然這樣就正面──"
2501-46 = "<SYSTEM> 已被對戰對手封鎖。"
2501-47 = "……！"
2501-49 = "嗚哇，真過分……"
2501-50 = "……多，"
2501-52 = "多麼沒禮貌的傢伙啊！！！"
2501-54 = "所以……"
2501-55 = "現在就去線下PK吧！"
2501-57 = "咦……這麼說，我，我們也要……？"
2501-58 = "……愛麗絲也要去嗎？"
2501-59 = "當然囉！不管叫線下PK還是真人PK，反正又沒有要用槍，#n只是要面對面對決而已……這種時候最重要的當然是氣勢！"
2501-60 = "反正對方肯定是只會打遊戲的阿宅，只要大家一起去堵他一定馬上就嚇得道歉了！"
2501-61 = "前半部分的話我們也是一樣吧……"
2501-62 = "吶，姐姐，不過就是在遊戲裡被嘲諷了一次，有需要做到這種程度嗎……？"
2501-63 = "才不是什麼「不過」咧！這可是攸關遊戲開發部尊嚴的重要事件！"
2501-64 = "我難得傳那麼友善的訊息，對方居然用那種語氣回我，還說我是「老奶奶」……！"
2501-65 = "絕對……"
2501-66 = "絕對不原諒！"
2501-67 = "看來後者才是真心話呢……"
2501-68 = "再怎麼說，那種沒禮貌的玩家也不能放任不管。"
2501-69 = "如果有那種玩家的話，就會讓剛加入這個圈子的人不愉快，漸漸地就不玩了對吧？"
2501-70 = "為了良好的遊戲環境，那種沒禮貌的用戶就要好好處罰才行！"
2501-71 = "愛麗絲也有同感。#n昨天在剛開始玩的線上RPG裡被滿等的[ruby=Player Kill]玩家PK的時[/ruby]候也想過乾脆不要玩了……"
2501-72 = "不過，愛麗絲只花一天就追上了他的等級，馬上報仇了！"
2501-73 = "一天就練到滿等……真是可怕的執念……"
2501-74 = "而且姐姐偶爾不是也會在打贏的時候挑釁對手嗎？"
2501-75 = "之前和我玩《Full Jelly》的時候也跟我說「用腳玩都能贏」……"
2501-76 = "唔，那個……那是因為……"
2501-77 = "認，認識的人就沒關係！對不認識的人口出惡言就不行！"
2501-78 = "總，總之！搜尋對方的對戰紀錄後，發現了他10分鐘前在附近遊戲中心的連線記錄。"
2501-79 = "現在去遊戲中心的話，應該就能找到那個玩家才對。要讓他為剛剛的事情道歉才行！"
2501-80 = "唔嗯，反正我也有點事要去遊戲中心……一起去也沒關係。"
2501-81 = "要去打倒邪惡的魔王對吧，前往四人副本！"
2501-82 = "那個，我沒有事要去遊戲中心，也不想吵架……"
2501-83 = "不去，可以嗎……？"
2501-84 = "不行！這種多人攻略戰裡，每個人的工作分配都很重要！"
2501-85 = "就像討伐戰一樣！不四個人從四個方向包圍他的話，就會被他逃掉的不是嗎！"
2501-86 = "可，可是……"
2501-87 = "……啊，這麼說來，#n柚子期待的新款放置型遊戲機好像在遊戲中心舉辦試玩活動……？"
2501-88 = "咦，那個新型遊戲主機……！？"
2501-89 = "柚子一個人的話絕對不會去的對吧？機會難得就一起去吧？好不好？"
2501-90 = "唔，唔……我知道了。"
2501-91 = "我，我就不介入，遠遠地看著你們吧……"
2501-92 = "嗯，那樣也沒關係！"
2501-93 = "乓啪喀乓──！組成了四人隊伍！"
2501-96 = "好！那現在就去處罰那個玩家吧！"

11040-2 = "#title;제4화;위원회의 사정"
11040-3 = "#place;대책위원회 부실"
11040-4 = "5;아야네;00;어서 오세요, 여러분. 수고하셨습니다.\n#5;greeting\n#5;em;[반응]\n#5;a"
11040-5 = "1;호시노;00;다녀왔어~ \n#1;a"
11040-6 = "1;세리카;12;아야네도 오퍼레이팅 수고했어.\n#1;a"
11040-7 = "5;노노미;03;가장 시급한 문제였던 카타카타 헬멧단이 해결되었어요. #n이제 우리도 한시름 놓은 거죠?\n#5;em;m\n#5;a"
11040-8 = "5;시로코;00;맞아. 이제 진짜 중요한 일에 열중할 수 있게 된 거지.\n#5;a"
11040-9 = "1;세리카;03;아하하! 선생님 덕분이야. 이제 마음 놓고 빚갚기에 열중할 수 있겠어!\n#1;em;c"
11040-10 = "1;세리카;12;고마워, 돌아가더라도 은혜는 잊지 않을게! 선생님!\n#1;greeting"
11040-11 = "1;세리카;12\n5;시로코;00\n#1;d\n#5;d\n#wait;1000"
11040-12 = "[ns]\"빚갚기?\"\n#all;hide"
11040-13 = "1;세리카;04;……아, 우왓! \n#1;shake\n#1;a\n#1;em;[?!]"
11040-14 = "5;아야네;09;그, 그건…….\n#5;a"
11040-15 = "1;세리카;06;자, 잠깐!! 말하지 마, 아야네!\n#1;shake"
11040-16 = "5;아야네;12;……!\n#5;em;!"
11040-17 = "5;호시노;01;뭐 어때. 세리카 쨩. 딱히 숨길 이야기도 아니잖아."
11040-18 = "1;세리카;11;그, 그렇다고 떠들고 다닐 이야기도 아니잖아! \n#1;hophop"
11040-19 = "5;호시노;17;딱히 죄를 진 것도 아니고. 게다가 선생은 우릴 도와준 어른이잖아."
11040-20 = "5;시로코;00;호시노 선배의 말이 맞아, 세리카. 선생님은 신뢰할 수 있는 사람이야.\n#5;greeting"
11040-21 = "1;세리카;05;그, 그렇긴 하지만 선생님이라고는 해도 결국은 부외자잖아! \n#1;em;[빠직]"
11040-22 = "5;호시노;05;선생님이 해결해 줄 수 있는 문제는 아니지만 #n이 문제에 귀 기울여주는 어른은 선생님 밖에 없었잖아.\n#5;em;[반응]"
11040-23 = "5;호시노;13;함께 고민하면 좋은 방법이 떠오를 수도 있을 테고. #n아니면 좋은 방법이라도 있어? 세리카 쨩?"
11040-24 = "1;세리카;04;우, 으으…….\n#1;em;u\n#1;stiff"
11040-25 = "1;세리카;13;그, 그래도 갑자기 들이닥친 어른일 뿐이잖아! 어른들이 우리 문제에 신경이나 썼냐고!"
11040-26 = "1;세리카;11;우리 문제는 언제나 우리가 해결해 왔잖아! 그런데 이제와서 어른 따위가……."
11040-27 = "#1;shake\n1;세리카;06;나는 인정 못해!!\n#1;em;[!]"
11040-28 = "#1;dl\n#wait;1000"
11040-29 = "5;아야네;12;세리카 쨩!?\n#5;em;[?!]"

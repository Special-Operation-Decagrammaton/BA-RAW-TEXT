[translation]
11040-2 = "Episode 4;The Task Force's Predicament"
11040-3 = "Foreclosure Task Force Room"
11040-4 = "Welcome back, everyone. Great work today."
11040-5 = "We're back!"
11040-6 = "Thanks, Ayane. You too."
11040-7 = "We finally took down the Kata-Kata Helmet Gang. It should be smooth sailing from here."
11040-8 = "That's right. We can finally get back to more important matters."
11040-9 = "Haha! It's all thanks to Sensei. All we have to focus on now is paying back the debt!"
11040-10 = "Thanks for your help, Sensei. We won't forget what you did for us!"
11040-12 = "[ns]\"Debt?\""
11040-13 = "Wait... Shoot!"
11040-14 = "W-Well, the thing is..."
11040-15 = "Stop right there! Not another word, Ayane!"
11040-16 = "...!"
11040-17 = "Why not, Serika? It's not like it's a secret."
11040-18 = "That doesn't mean we should go telling everyone!"
11040-19 = "It isn't as though we're guilty of anything. Besides, Sensei is one of us now."
11040-20 = "Hoshino is right, Serika. Sensei is trustworthy."
11040-21 = "I know, but they're still an outsider."
11040-22 = "I'm not saying Sensei can solve this problem on our behalf, but they're the only adult we have to turn to."
11040-23 = "Maybe we can come up with a solution if we discuss it with Sensei, even.#nOr do you have any better ideas, Serika?"
11040-24 = "Well..."
11040-25 = "Sensei just showed up out of nowhere! Why would an adult care about our problems, anyway?"
11040-26 = "We've always taken care of ourselves! Why do we suddenly need to be supervised?"
11040-27 = "I can't accept this!"
11040-29 = "Serika?"
11040-30 = "I'll go talk to her."
11040-33 = "..."
11040-34 = "Back to the matter at hand... Our school owes quite a bit of money to a loan company. It's a challenge, but not exactly an uncommon problem either."
11040-35 = "The real issue is...that it's over 900 million yen."
11040-36 = "It's 962,350,000 yen to be exact."
11040-37 = "That's the amount that Abydos—no. That's the amount the Foreclosure Task Force has taken upon itself to pay back."
11040-38 = "The loan company will foreclose on the school and shut it down if we don't repay them."
11040-39 = "But the odds of paying back a debt that large are practically zero.#nThat's why most of the students left the school and town..."
11040-40 = "All except for us, that is."
11040-41 = "The school being on the brink of closure, the students leaving, and the desolate town, it's all because of the debt."
11040-42 = "[s] Ask about what happened."
11040-43 = "You mean how the debt was accrued in the first place?"
11040-45 = "There was a sandstorm in the desert surrounding the school several years ago."
11040-46 = "Sandstorms are common in the Abydos region, but that particular storm was devastating."
11040-47 = "Some areas were completely buried in sand, and it just kept piling up."
11040-48 = "The school had to raise a lot of funds for disaster relief..."
11040-49 = "...but there wasn't a single bank that would give such a large loan."
11040-51 = "So the school was forced to turn to loan sharks..."
11040-52 = "Yes. The school was planning to pay the money back quickly..."
11040-53 = "...but the sandstorms only worsened as the years went on. Despite the school's best efforts, the situation just kept getting worse."
11040-54 = "Today, more than half of Abydos is under sand and the debt keeps growing."
11040-55 = "..."
11040-56 = "..."
11040-57 = "We're barely able to pay the interest every month. We can't even afford ammunition or school supplies."
11040-58 = "I can sympathize with Serika's frustrations. No one has ever cared enough to ask about our situation before, let alone reach out to help."
11040-59 = "That's the long and short of it."
11040-60 = "Now that you've helped us scare the Helmet Gang away, we can return our focus to paying off the debt."
11040-61 = "Even if we appoint you as our club's advisor, you don't have to trouble yourself with our debt. It was kind of you to listen to our story."
11040-62 = "We're not trying to pressure you. You've already helped us enough."
11040-65 = "[ns1] \"I'm a member of the Task Force too! Keep your chins up!\"\n[ns2] \"We're in this together now. I won't abandon you.\""
11040-66 = "You don't have to say all that..."
11040-67 = "You don't have to say all that..."
11040-68 = "...but thank you for doing so anyway, Sensei."
11040-69 = "Listen to you being so noble. You're really going to insist on helping..."
11040-70 = "I feel so relieved. There's some hope if we have Schale's support."
11040-71 = "True. Things are looking up, at least."
11040-73 = "..."
11040-74 = "Hmph."
11040-80 = "Serika, where are you?"
11040-82 = "Next Episode;A Day in the Life of Serika"

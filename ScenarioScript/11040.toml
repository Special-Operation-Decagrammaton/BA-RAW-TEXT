11040-33 = "3;호시노;05;……. \n#3;a\n#3;em;…"
11040-34 = "3;호시노;17;뭐, 아까 하던 얘기 마저 하자면…… 우리 학교는 은행에 빚을 지고 있거든. #n어떻게 보면 흔한 얘기야."
11040-35 = "3;호시노;15;단 그 빚이 한두 푼이 아니라 한…… 9억엔 정도라는 게 문제지.\n#3;em;[땀]"
11040-36 = "5;아야네;14;……9억 6235만엔.\n#3;m1\n#5;al"
11040-37 = "5;아야네;05;아비도스……, 아니, 우리 <대책위원회>가 갚아야만 하는 금액이에요.\n#5;em;[...]"
11040-38 = "5;아야네;09;이 빚을 갚지 못하면 학교를 은행에 뺏기게 되고, 폐교 절차를 밟게 돼요."
11040-39 = "5;아야네;14;하지만 실제 상환 가능성은 0%에 가깝고…… #n그래서 대부분의 학생들은 이 학교와 마을을 버리고 떠나버렸어요…….\n#5;em;[속상함]\n#5;stiff"
11040-40 = "#3;hide\n1;시로코;00;우리들만 빼고."
11040-41 = "5;아야네;06;학교가 폐교 위기에 몰린 것도, 학생들이 학교를 떠난 것도, 마을이 황폐화되어 가는 것도 #n사실은 이 빚 때문이에요."
11040-42 = "[s] 사정을 설명해달라고 한다."
11040-43 = "5;아야네;02;왜 이런 빚이 생겼냐고요? 그건……."
11040-44 = "#all;hide"
11040-45 = "#na;아야네;수십 년 전, 학교 변경의 사막에서 모래 폭풍이 발생한 적이 있었어요."
11040-46 = "#na;아야네;아비도스 지역은 원래 모래 폭풍이 잦은 곳이긴 했지만 그때 있었던 폭풍은 상상을 초월하는 규모였어요."
11040-47 = "#na;아야네;많은 지역이 모래에 파묻혔고, 그 이후로도 계속 지속적으로 모래가 쌓여가는 기상이변이 시작되었어요."
11040-48 = "#na;아야네;그 재난을 극복하기 위해 학교는 무리해서 자금을 끌어와야만 했었죠……."
11040-49 = "#na;아야네;하지만 이런 변두리의 학교에 거금을 대출해줄 은행은 없었고……"
11040-50 = "1;시로코;01\n5;아야네;05\n#1;h\n#5;h"
11040-51 = "1;시로코;01;그래서 악질 고리대금업자에게 손을 벌렸지."
11040-52 = "5;아야네;05;……네. 아마도 처음엔 금방 쓰고 갚을 생각이었겠죠."
11040-53 = "5;아야네;06;하지만 모래 폭풍은 매년 더 크게 발생했고…… #n학교의 노력에도 불구하고 상황은 손 쓸 도리가 없을 정도로 악화만 되어 갔어요……."
11040-54 = "5;아야네;14;……결국 지금은 아비도스의 도시 절반 이상이 사막 안에 파묻혀 버렸고, #n빚은 빚대로 눈덩이처럼 불어서 결국은…….\n#5;em;[...]"
11040-55 = "1;호시노;05;……."
11040-56 = "1;시로코;05;……."
11040-57 = "5;아야네;09;이제 우리들의 힘만으로는 매달 이자를 갚기에도 벅차서……. #n이제는 탄약도, 보급도 말라버린 상황이에요."
11040-58 = "1;시로코;02;세리카가 저렇게 화를 내는 것도 누구도 우리 문제를 신경써주지 않았기 때문이다. #n얘기를 들어준 건 선생님뿐이었어."
11040-59 = "5;호시노;01;……뭐, 그런 재미없는 이야기야."
11040-60 = "5;호시노;00;선생 덕분에 헬멧단 녀석들을 해결할 수 있었으니까, #n이제 빚갚기에 더 열중할 수 있게 된 거지. \n#5;em;[반응]"
11040-61 = "5;호시노;02;동아리 고문으로 부임했다고 해도, 빚에 대해서는 딱히 신경쓰지 않아도 돼. #n들어준 것만으로도 고마우니까."
11040-62 = "1;시로코;02;응. 선생님은 이미 우리의 큰 도움이 되었어. #n더 이상 폐를 끼칠 수는 없지.\n#1;greeting"

[translation]
11040-2 = "第4話;委員会の事情"
11040-3 = "対策委員会・教室"
11040-4 = "お帰りなさい。皆さん、お疲れ様でした。"
11040-5 = "ただいま～。"
11040-6 = "アヤネちゃんも、オペレーターお疲れ。"
11040-7 = "火急の事案だったカタカタヘルメット団の件が片付きましたね。#nこれで一息つけそうです。"
11040-8 = "そうだね。これでやっと、重要な問題に集中できる。"
11040-9 = "うん！先生のおかげだね、これで心置きなく全力で借金返済に取り掛かれるわ！"
11040-10 = "ありがとう、先生！この恩は一生忘れないから！"
11040-12 = "[ns] \"借金返済って？\""
11040-13 = "……あ、わわっ！"
11040-14 = "そ、それは……。"
11040-15 = "ま、待って！！アヤネちゃん、それ以上は！"
11040-16 = "……！"
11040-17 = "いいんじゃない、セリカちゃん。隠すようなことじゃあるまいし。"
11040-18 = "か、かといって、わざわざ話すようなことでもないでしょ！"
11040-19 = "別に罪を犯したとかじゃないでしょー？それに先生は私たちを助けてくれた大人でしょー？"
11040-20 = "ホシノ先輩の言う通りだよ。セリカ、先生は信頼していいと思う。"
11040-21 = "そ、そりゃそうだけど、先生だって結局部外者だし！"
11040-22 = "確かに先生がパパっと解決してくれるような問題じゃないかもしれないけどさ。#nでも、この問題に耳を傾けてくれる大人は、先生くらいしかいないじゃーん？"
11040-23 = "悩みを打ち明けてみたら、何か解決法が見つかるかもよー？#nそれとも何か他にいい方法があるのかなー、セリカちゃん？"
11040-24 = "う、うう……。"
11040-25 = "でっ、でも、さっき来たばっかりの大人でしょ！今まで大人たちが、この学校がどうなるかなんて気に留めたことなんてあった！？"
11040-26 = "この学校の問題は、ずっと私たちだけでどうにかしてきたじゃん！なのに今更、大人が首を突っ込んでくるなんて……。"
11040-27 = "私は認めない！！"
11040-29 = "セリカちゃん！？"
11040-30 = "私、様子を見てきます。"
11040-33 = "……。"
11040-34 = "えーと、簡単に説明すると……この学校、借金があるんだー。#nまあ、ありふれた話だけどさ。"
11040-35 = "でも問題はその金額で……9億円ぐらいあるんだよねー。"
11040-36 = "……9億6235万円、です。"
11040-37 = "アビドス……いえ、私たち「対策委員会」が返済しなくてはならない金額です。"
11040-38 = "これが返済できないと、学校は銀行の手に渡り、廃校手続きを取らざるを得なくなります。"
11040-39 = "ですが、実際に完済できる可能性は0％に近く……#nほとんどの生徒は諦めて、この学校と街を捨てて、去ってしまいました……。"
11040-40 = "そして私たちだけが残った。"
11040-41 = "学校が廃校の危機に追いやられたのも、生徒がいなくなったのも、#n街がゴーストタウンになりつつあるのも、実はすべてこの借金のせいです。"
11040-42 = "[s] 事情を説明してほしいと言う。"
11040-43 = "借金をすることになった理由ですか？それは……。"
11040-45 = "数十年前、この学区の郊外にある砂漠で、砂嵐が起きたのです。"
11040-46 = "この地域では以前から頻繁に砂嵐が起きていたのですが、その時の砂嵐は想像を絶する規模のものでした。"
11040-47 = "学区のいたる所が砂に埋もれ、砂嵐が去ってからも砂が溜まり続けてしまい。"
11040-48 = "その自然災害を克服するために、我が校は多額の資金を投入せざるを得ませんでした……。"
11040-49 = "しかしこのような片田舎の学校に、巨額の融資をしてくれる銀行はなかなか見つからず……。"
11040-51 = "結局、悪徳金融業者に頼るしかなかった。"
11040-52 = "……はい。最初のうちは、すぐに返済できる算段だったと思います。"
11040-53 = "しかし砂嵐はその後も、毎年更に巨大な規模で発生し……学校の努力も虚しく、学区の状況は手が付けられないほど悪化の一途をたどりました……。"
11040-54 = "……そしてついに、アビドスの半分以上が砂に呑まれて砂漠と化し、借金はみるみる膨れ上がっていったのです……。"
11040-55 = "……。"
11040-56 = "……。"
11040-57 = "私たちの力だけでは、毎月の利息を返済するので精一杯で……#n弾薬も補給品も、底をついてしまっています。"
11040-58 = "セリカがあそこまで神経質になってるのは、これまで誰もこの問題にまともに向き合わなかったから。話を聞いてくれたのは、先生、あなたが初めて。"
11040-59 = "……まあ、そういうつまらない話だよ。"
11040-60 = "で、先生のおかげでヘルメット団っていう厄介な問題が解決したから、#nこれからは借金返済に全力投球できるようになったってわけー。 "
11040-61 = "もしこの委員会の顧問になってくれるとしても、借金のことは気にしなくていいからねー。#n話を聞いてくれただけでもありがたいし。"
11040-62 = "そうだね。先生はもう十分力になってくれた。#nこれ以上迷惑はかけられない。"
11040-65 = "[ns1] 自分も対策委員会の一員として、一緒に頑張ると言う。\n[ns2] 対策委員会を見捨てて戻るなんてことはしないと言う。"
11040-66 = "そ、それって……。"
11040-67 = "そ、それって……。"
11040-68 = "あ、はいっ！よろしくお願いします、先生！"
11040-69 = "へえ、先生も変わり者だねー。こんな面倒なことに自分から首を突っ込もうなんて。"
11040-70 = "良かった……「シャーレ」が力になってくれるなんて。これで私たちも、#n希望を持っていいんですよね？"
11040-71 = "そうだね。希望が見えてくるかもしれない。"
11040-73 = "……。"
11040-74 = "……ちぇっ。"
11040-80 = "セリカちゃん……どこにいるのかしら……。"
11040-82 = "次回;セリカの平凡な一日"

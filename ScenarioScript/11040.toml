[translation]
11040-2 = "第4話;委員會的苦衷"
11040-3 = "對策委員會．教室"
11040-4 = "歡迎回來。各位都辛苦了。"
11040-5 = "我們回來了～"
11040-6 = "綾音醬當報務員也辛苦了。"
11040-7 = "解決掉硬梆梆頭盔團這個最緊急的問題之後，我們也能鬆口氣了。"
11040-8 = "沒錯，終於可以專心做重要的事了。"
11040-9 = "1;茜香;03;嗯！都是託老師的福，現在可以安心地專注於還債了！"
11040-10 = "謝謝，老師！這份恩情我永遠不會忘記的！"
11040-12 = "[ns]「還債？」"
11040-13 = "1;茜香;04;……啊，嗚哇！ "
11040-14 = "那，那個……"
11040-15 = "等，等等！綾音醬，不要再說了！"
11040-16 = "……！"
11040-17 = "沒關係啦，茜香醬。#n這也不是什麼需要隱瞞的事。"
11040-18 = "1;茜香;11;但，但也不是需要四處張揚的話題啊！ "
11040-19 = "又不是犯了什麼罪～？#n而且老師不是來幫助我們的大人嗎？"
11040-20 = "星野前輩說得沒錯。#n茜香，我認為老師是可以信賴的人。"
11040-21 = "是，是沒錯啦，不過老師終究還是社團外的人！"
11040-22 = "雖然這可能不是能輕易解決的問題……#n但願意傾聽的大人也就只有老師了吧？"
11040-23 = "試著把煩惱說出來或許能發現解決方法唷？#n還是茜香醬有其他好方法嗎？"
11040-24 = "1;茜香;04;嗚，嗚嗚……"
11040-25 = "就，就算這樣也只是剛來到這裡的大人而已！#n以前到過這裡的大人們有關心過我們的問題嗎！？"
11040-26 = "我們的問題一直都是靠我們自己解決的！#n事到如今再由大人來解決……"
11040-27 = "我沒辦法接受！！"
11040-29 = "茜香醬！？"
11040-30 = "我跟去看看。"
11040-33 = "…… "
11040-34 = "那個，簡單來說……咱們學校欠了一筆債。#n雖然不是什麼稀奇的事……"
11040-35 = "但那筆債務的金額……大約有9億元那麼多。"
11040-36 = "……9億6235萬元。"
11040-37 = "那是阿拜多斯……不，是我們「對策委員會」必須歸還的債務。"
11040-38 = "要是沒辦法還清債務的話，我們學校就會被銀行扣押，並且面臨廢校的命運。"
11040-39 = "不過實際還清所有債務的可能性趨近於0%……#n所以大部分的學生都拋下這所學校和這座城鎮離開了……"
11040-40 = "除了我們之外。"
11040-41 = "學校面臨廢校危機、學生們漸漸離開學校……甚至連城鎮荒廢都是這筆債務造成的。"
11040-42 = "[s] 要求說明情況"
11040-43 = "為什麼會欠下這麼大筆的債務？#n那是因為……"
11040-45 = "數十年前，在學校邊境的沙漠發生了沙塵暴。"
11040-46 = "阿拜多斯本來就是沙塵暴頻繁的地區沒錯，但當時風暴的規模卻大的超乎想像。"
11040-47 = "學區的所有地方都被沙土覆蓋，在風暴離去後依舊持續堆積。"
11040-48 = "為了克服那場自然災害，學校不得不籌備大量資金……"
11040-49 = "然而卻沒有銀行願意貸款給我們這種鄉下的學校……"
11040-51 = "最終只能依賴缺德的高利貸業者。"
11040-52 = "……是的。#n我想學校起初或許認為可以馬上將債務還清。"
11040-53 = "但沙塵暴的規模每年都持續擴大……#n學校雖然努力挽救，情況還是惡化到了無藥可救的地步……"
11040-54 = "……導致阿拜多斯半數以上的城鎮都被沙漠吞噬，債務也像滾雪球般越來越多……"
11040-55 = "……"
11040-56 = "……"
11040-57 = "只靠我們的力量，光是償還每個月的利息都很吃力……#n現在就連彈藥和補給都已經見底了。"
11040-58 = "茜香之所以那麼生氣，是因為沒有任何人在乎過我們的問題。#n願意傾聽我們問題的人，老師你是第一個。"
11040-59 = "……沒錯，就是這種無聊的事唷。"
11040-60 = "多虧老師的幫忙，咱們才能順利解決頭盔團那些麻煩的傢伙。#n接下來可以更專心還債了。"
11040-61 = "就算接下了顧問的職位，你也不必擔心債務的事哦～#n光是願意傾聽我們的問題就很感激了。"
11040-62 = "沒錯，老師已經幫了我們很大的忙。#n不能再添麻煩了。"
11040-65 = "[ns1] 說自己是對策委員會的一員，所以會一起加油\n[ns2] 說絕對不會丟下對策委員會自己回去"
11040-66 = "也，也就是說……"
11040-67 = "也，也就是說……"
11040-68 = "啊，是！請多多指教，老師！"
11040-69 = "嘿～原來老師也是個怪人呢。#n沒想到你居然想和這種麻煩的事情扯上關係。"
11040-70 = "太好了……「夏萊」竟然願意幫助我們。#n這樣我們就有希望了吧？"
11040-71 = "是啊。也許能看見希望了。"
11040-73 = "……"
11040-74 = "3;茜香;11;……呿。"
11040-80 = "茜香醬……會在哪裡呢……"
11040-82 = "下一話;茜香平凡的一天"

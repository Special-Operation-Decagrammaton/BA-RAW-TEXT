[translation]
11040-2 = "ตอนที่ 4;สถานการณ์ของคณะกรรมการ"
11040-3 = "ห้องคณะกรรมการแผนงาน"
11040-4 = "ทุกคนกลับมาแล้วเหรอคะ ทำได้ดีมากเลยค่ะ"
11040-5 = "กลับมาแล้ว~"
11040-6 = "อายาเนะก็คอยให้คำแนะนำได้ดีมากเลย"
11040-7 = "ในที่สุดเรื่องของแก๊งหมวกกันน็อกคาตะคาตะก็คลี่คลายแล้ว จากนี้พวกเราก็คงสบายใจกันได้แล้ว#nใช่ไหมคะ?"
11040-8 = "ใช่ ตอนนี้เรากลับมาสนใจงานที่สำคัญจริงๆ ได้แล้วละ"
11040-9 = "ฮะฮะฮะ! เพราะได้คุณครูมาช่วยไว้เลยนะเนี่ย ตอนนี้พวกเราก็กลับมาทุ่มความสนใจไปที่เรื่องใช้หนี้#nได้แล้วละ!"
11040-10 = "ขอบคุณนะคุณครู พวกเราจะไม่ลืมบุญคุณนี้เลย"
11040-12 = "[ns] \"ใช้หนี้งั้นเหรอ?\""
11040-13 = "เอ่อ... แหะๆ"
11040-14 = "คะ... คือว่า..."
11040-15 = "ดะ... เดี๋ยวก่อน! ห้ามพูดนะ อายาเนะ!"
11040-16 = "......!"
11040-17 = "ทำไมจะพูดไม่ได้ล่ะเซริกะจัง? ไม่ใช่เรื่องที่ต้องปิดเป็นความลับนี่นา"
11040-18 = "ตะ.. แต่ก็ไม่ใช่เรื่องที่ต้องป่าวประกาศไม่ใช่เหรอ!"
11040-19 = "เราไม่ได้ทำอะไรผิดสักหน่อย อีกอย่างครูก็เป็นถึงผู้ใหญ่ที่ช่วยเราไว้นะ"
11040-20 = "รุ่นพี่โฮชิโนะพูดถูกแล้วละเซริกะ คุณครูเป็นคนที่เชื่อถือได้นะ"
11040-21 = "ถึงจะเป็นคุณครูก็เถอะ แต่ยังไงก็ถือว่าเป็นคนนอกนะ!"
11040-22 = "นี่ไม่ใช่ปัญหาที่คุณครูสามารถคลี่คลายให้ได้ก็จริง แต่ผู้ใหญ่ที่จะรับฟังปัญหานี้ได้ก็มีแต่คุณครูไม่ใช่#nรึไง?"
11040-23 = "ถ้าช่วยกันคิดหาทางออกด้วยกัน เราอาจเจอวิธีดีๆ ก็ได้ หรือว่าเซริกะจังมีทางออกที่คิดไว้แล้วล่ะ?"
11040-24 = "เอ่อ..."
11040-25 = "ตะ... แต่คุณครูเป็นผู้ใหญ่ที่จู่ๆ ก็โผล่มานี่! พวกผู้ใหญ่เคยสนใจปัญหาของพวกเราด้วยเหรอ!?"
11040-26 = "พวกเราคอยแก้ปัญหากันเองอยู่ตลอดเลยนี่! แล้วทำไมตอนนี้เราถึงต้องการผู้ใหญ่ขึ้นมาล่ะ"
11040-27 = "ฉันไม่เอาด้วยหรอก!"
11040-29 = "เซริกะจัง!?"
11040-30 = "ฉันจะตามไปเองค่ะ"
11040-33 = "......"
11040-34 = "เรื่องที่พูดไปก่อนหน้านี้ ก็... ตอนนี้โรงเรียนของเรากำลังจ่ายหนี้ธนาคารอยู่น่ะ จะว่าไปแล้วการเป็นหนี้มันก็เป็นเรื่องธรรมดาอยู่หรอกนะ"
11040-35 = "แต่ปัญหาก็คือ... หนี้ของเรามีมากถึง 900 ล้านเยนเลยนี่แหละ"
11040-36 = "962,350,000 เยนค่ะ..."
11040-37 = "นี่คือจำนวนเงินที่อะบิดอส... ไม่สิ... จำนวนเงินที่คณะกรรมการแผนงานอย่างพวกเราต้องชดใช้"
11040-38 = "หากใช้หนี้ไม่ได้ โรงเรียนของเราก็จะถูกธนาคารยึด แล้วก็จะถูกปิดไปค่ะ"
11040-39 = "แต่ความเป็นไปได้ในการใช้หนี้ของเราแทบจะเป็น 0% เลยค่ะ นักเรียนส่วนใหญ่ของที่นี่ก็เลยออก#nจากโรงเรียนและเขตนี้ไปจนหมด..."
11040-40 = "เหลือแค่พวกเรา"
11040-41 = "การที่โรงเรียนตกอยู่ในวิกฤตใกล้ถูกปิด รวมถึงการที่พวกนักเรียนลาออกไป และการที่เมืองอยู่ในสภาพ#nเสื่อมโทรมแบบนี้ จริงๆ แล้ว เกิดจากปัญหาเรื่องหนี้สินนี่แหละค่ะ"
11040-42 = "[s] ขอให้อธิบายสถานการณ์ให้ฟัง"
11040-43 = "อยากรู้ว่าทำไมเราถึงมีหนี้มากมายขนาดนี้เหรอคะ? เรื่องนั้นมัน..."
11040-45 = "เมื่อหลายสิบปีก่อน มีพายุทรายเกิดขึ้นในทะเลทราย นอกเขตโรงเรียนแห่งนี้ค่ะ"
11040-46 = "ปกติแล้วเขตอะบิดอสจะเผชิญกับพายุทรายอยู่บ่อยครั้ง แต่พายุทรายในตอนนั้นรุนแรงเกินกว่า#nจะจินตนาการได้"
11040-47 = "หลายพื้นที่ถูกปกคลุมไปด้วยทราย และหลังจากนั้นยังมีการเปลี่ยนแปลงสภาพอากาศที่ทำให้ทราย#nเข้ามาอย่างไม่หยุดหย่อน"
11040-48 = "โรงเรียนของเราต้องใช้เงินจำนวนมากเพื่อเอาชนะภัยพิบัติครั้งนั้นค่ะ"
11040-49 = "แต่ตอนนั้นก็ไม่มีธนาคารที่จะปล่อยกู้ให้กับโรงเรียนแถบชานเมืองแบบนี้..."
11040-51 = "โรงเรียนเลยไม่มีทางเลือก นอกจากไปขอกู้นอกระบบจากพวกคนไม่ดี"
11040-52 = "ใช่ค่ะ... ตอนแรกคงคิดว่าจะใช้หนี้ได้ในเวลาไม่นานน่ะค่ะ"
11040-53 = "แต่พายุทรายก็กลับรุนแรงขึ้นทุกปี ความพยายามของโรงเรียนก็สูญเปล่า และสถานการณ์ของเขต#nโรงเรียนก็เลวร้ายลงจนไม่สามารถรับมือได้ค่ะ..."
11040-54 = "สุดท้ายเกินกว่าครึ่งหนึ่งของเมืองอะบิดอสก็จมอยู่ในทะเลทราย ส่วนหนี้สินก็เพิ่มขึ้นอย่างรวดเร็ว..."
11040-55 = "......"
11040-56 = "......"
11040-57 = "ตอนนี้ลำพังพวกเราก็แทบจะจ่ายดอกเบี้ยไม่ไหวด้วยซ้ำ... แถมกระสุนและเสบียงก็ยังมาหมดอีก"
11040-58 = "ที่เซริกะโมโหออกไปแบบนั้นเพราะไม่มีใครมาใส่ใจปัญหาของพวกเราเลย คนที่รับฟังปัญหาเรา#nก็คงมีแค่คุณครู"
11040-59 = "นี่แหละสถานการณ์ของพวกเรา... ไม่ใช่เรื่องน่าสนุกอะไรหรอก"
11040-60 = "ในเมื่อครูมาช่วยแก้ปัญหาของแก๊งหมวกกันน็อกได้แล้ว ตอนนี้เราก็คงตั้งใจทำงานเพื่อใช้หนี้ได้"
11040-61 = "ถึงครูจะได้รับตำแหน่งที่ปรึกษาชมรม แต่ก็ไม่ต้องสนใจเรื่องหนี้สินนี่หรอกนะ แค่รับฟังเราก็รู้สึกขอบคุณแล้วละ"
11040-62 = "ใช่ คุณครูช่วยเราไว้เยอะแล้ว คงรบกวนอีกไม่ได้หรอก"
11040-65 = "[ns1] เราต้องร่วมมือกัน ครูก็เป็นสมาชิกคนหนึ่งของคณะกรรมการ\n[ns2] ครูไม่มีวันทิ้งคณะกรรมการแผนงานแล้วกลับไปเด็ดขาด"
11040-66 = "แต่แบบนั้นมัน..."
11040-67 = "แต่แบบนั้นมัน..."
11040-68 = "เอ่อ... ค่ะ ถ้าอย่างนั้นก็ขอรบกวนด้วยนะคะ คุณครู!"
11040-69 = "โฮ่ ครูนี่ก็บ้าดีเดือดเหมือนกันนะ เอาตัวเข้ามาพัวพันกับเรื่องวุ่นวายแบบนี้น่ะ"
11040-70 = "ถือว่าเป็นโชคดีของเรานะคะ... ถ้าได้ <ชาเล่ต์> มาช่วย ก็เท่ากับว่าเรามีความหวังไม่ใช่เหรอคะ?"
11040-71 = "ก็ใช่ ยังไงก็ต้องดีกว่าตอนนี้ละนะ"
11040-73 = "......"
11040-74 = "เชอะ..."
11040-80 = "เซริกะจังไปอยู่ที่ไหนกันนะ?"
11040-82 = "ตอนต่อไป;วันธรรมดาๆ ของเซริกะ"

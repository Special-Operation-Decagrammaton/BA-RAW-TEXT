[translation]
13090-1 = "ตอนที่ 9;สภานักเรียนอะบิดอส 2"
13090-2 = "พื้นที่ปิด ทะเลทรายอะบิดอส เขต 35-9"
13090-5 = "รุ่นพี่ยูเมะ ทางนี้ไม่มีอะไรเลยค่ะ"
13090-10 = "อืม... ตรงนี้ก็ด้วย... เราคว้าน้ำเหลวแล้วละ ฮือ... "
13090-15 = "ขอโทษนะ โฮชิโนะจัง ฉันคงไม่ไหวแล้ว ฉันหมดแรงให้กับความท้อแท้และสิ้นหวังแล้ว"
13090-19 = "ลุกขึ้นเถอะค่ะ รุ่นพี่ "
13090-20 = "ไม่ละ มันเกินกำลังของฉันแล้ว ที่ผ่านมาขอบใจมากนะ โฮชิโนะจัง ดูแลตัวเองด้วยล่ะ "
13090-24 = "โธ่เอ๊ย พอเถอะค่ะ!"
13090-30 = "ในเมื่อเป็นแบบนี้แล้ว งั้นไปสถานีถัดไปกันเลยมั้ย? ที่นั่นเราอาจจะโชคดีก็ได้..."
13090-31 = "ไม่ค่ะ... "
13090-32 = "ไม่ว่าที่ไหนก็เหมือนกันหมดนั่นละค่ะ ถ้ามันมีที่อย่างหอนิทรรศการของประธานสภานักเรียนอะบิดอส#nที่มีสมบัติราคาแพงจัดแสดงอยู่จริงๆ ละก็"
13090-33 = "พวกสภานักเรียนคนเก่าคงมาค้นหาและขายไปแล้วตั้งแต่แรกแล้วค่ะ"
13090-34 = "อืม... ก็น่าจะเป็นอย่างนั้นนะ"
13090-35 = "เราเสียเวลาเปล่าแล้วละ กลับกันเถอะค่ะ ไม่น่ามาตามหาสมบัติอะไรกันเลย..."
13090-36 = "แต่พอได้ยินเรื่องนั้น โฮชิโนะจังก็ตื่นเต้นแล้วก็รีบตามมาเลยไม่ใช่เหรอ?"
13090-37 = "แต่แล้วพอคว้าน้ำเหลวก็เข้าโหมดถากถางกันเลย...?"
13090-38 = "ปะ... เปล่า... ไม่ใช่อย่างนั้นนะ..."
13090-39 = "นี่ รุ่นพี่ยูเมะ สมุดโน้ตหล่นไปกองกับพื้นแล้ว"
13090-40 = "อ๊ะ สมุดโน้ตของฉัน!?"
13090-45 = "เฮ้อ~ เกือบเป็นเรื่องใหญ่แล้วมั้ยล่ะ เกือบทำสมุดโน้ตที่มีค่าของโฮชิโนะจังหายซะแล้ว"
13090-47 = "ไม่ใช่ของฉันสักหน่อยนะคะ...? อีกอย่าง อย่าลงไปนอนกับพื้นดื้อๆ แบบนั้นสิคะ เกียรติของประธาน#nสภานักเรียนคลุกฝุ่นไปหมดแล้วนะคะ"
13090-49 = "อืม..."
13090-53 = "ดูนี่สิ โฮชิโนะจัง นี่เป็นขวดน้ำที่สะพายไว้ข้างหลังเหมือนสะพายเป้น่ะ ดูสะดวกดีเนอะ? ซื้อสักขวดมั้ย?"
13090-54 = "ไม่ค่ะ ตอนเคลื่อนไหวมันน่าจะรุ่มร่ามค่ะ แถมพอเทียบกับราคาแล้ว คุณภาพก็ไม่ได้ดีเด่อะไรด้วย"
13090-56 = "งั้นเหรอ?"
13090-60 = "อืม... หมื่นเยน...? พะ... แพงจัง..."
13090-61 = "เอาเงินนั่นไปซื้อกระสุนปืนมาเพิ่มจะดีกว่าอีกค่ะ กระสุนยิ่งมีไม่พออยู่เรื่อยเลยนี่คะ"
13090-62 = "มันก็จริงหรอกนะ"
13090-63 = "รุ่นพี่... ฉันมีเรื่องสงสัยค่ะ"
13090-64 = "หืม?"
13090-65 = "ทำไมถึงมาเป็นประธานสภานักเรียนได้ล่ะคะ? ฉันไม่ได้จะถามอะไรแปลกๆ นะ แต่ตอนนี้สภานักเรียน#nมีแค่รุ่นพี่คนเดียวนี่คะ แล้วฉันก็ไม่เคยได้ยินเลยว่ามีการจัดการเลือกตั้งประธานสภานักเรียนด้วย..."
13090-66 = "อืม... นั่นสินะ ไม่ได้มีขั้นตอนอย่างเป็นทางการหรอก"
13090-67 = "งะ... งั้นเหรอคะ?"
13090-68 = "แหะๆ... ก่อนที่พวกสภานักเรียนรุ่นก่อนจะจากไป พวกเธอมีการยกมือลงคะแนนไว้ แล้วส่งต่อตำแหน่ง#nประธานสภาให้ฉันน่ะ"
13090-69 = "คะ?! ยกมือลงคะแนนเสียงเหรอคะ...? แบบนั้นมันชุ่ยมากเลยนะ?! เลือกประธานสภานักเรียนด้วยวิธีนั้น#nกันเหรอคะ? "
13090-70 = "นั่นสิ... แต่ที่จริงน่าจะมีการโยนภาระตำแหน่งประธานสภานักเรียนกันด้วยวิธีนั้นมานานแล้วน่ะ#nเพราะตอนนี้อะบิดอสก็ไม่มีโครงสร้างพื้นฐานด้านการบริหารด้วย"
13090-71 = "คนพวกนั้นไม่คิดที่จะทำงานสภานักเรียนตั้งแต่แรกสินะคะ แล้วก่อนที่จะจากไป ก็ทิ้งภาระก้อนใหญ่ไว้#nให้รุ่นพี่ยูเมะ"
13090-72 = "ไม่หรอก โฮชิโนะจัง ไม่ใช่อย่างนั้นหรอกนะ"
13090-76 = "โฮชิโนะจัง ใช่ว่าฉันจะรับตำแหน่งนี้มาส่งๆ หรอกนะ ฉันอยากเป็นประธานสภานักเรียนอยู่แล้วน่ะ"
13090-78 = "งะ... งั้นเหรอคะ...?"
13090-79 = "อื้ม ขอเพียงแค่รักษาอะบิดอสไว้ได้... ฉันคิดว่าถ้าตัวเองมีความรับผิดชอบหรือสิทธิ์ที่มากขึ้น ก็จะเป็นการดีกว่าน่ะ "
13090-83 = "อืม... ถึงฉันจะไม่ได้มีพลังหรืออำนาจล้นมือทันทีหลังจากได้เป็นประธานสภานักเรียนก็เถอะ"
13090-84 = "แต่ถึงอย่างนั้นฉันก็ตั้งใจเตรียมตัวมาอย่างดี..."
13090-85 = "เตรียมตัวเหรอคะ?"
13090-89 = "นี่ไง~ สมุดโน้ตของประธานสภานักเรียน! "
13090-94 = "ทำไมถึงถอนหายใจแบบนั้นล่ะ โฮชิโนะจัง? เห็นอย่างนี้ฉันก็จดบันทึกงานที่ทำในทุกวันเลยนะ ฉันไม่ได้ทำเล่นๆ นะ"
13090-95 = "สมุดเปล่าราคา 150 เยนคือสมุดโน้ตของประธานสภานักเรียนอะบิดอสงั้นเหรอ..."
13090-96 = "มะ... ไม่ใช่สมุดเปล่านะ นี่มันสมุดโน้ตของประธานสภานักเรียนต่างหาก... ถึงตอนนี้มันจะเหมือนสมุด#nบันทึกประจำวันก็เถอะ... "
13090-100 = "ถะ... ถึงจะทำหน้าเหมือนไม่ชอบก็ช่วยไม่ได้หรอกนะ เพราะสักวันหนึ่งโฮชิโนะจังก็ต้องรับช่วงไปอยู่ดี"
13090-102 = "ไม่ค่ะ ไม่มีทางเป็นอย่างนั้นหรอกค่ะ"
13090-103 = "ทะ... ทำไมล่ะ?! "
13090-104 = "นะ... นั่นสินะ พอมาคิดดูแล้ว โฮชิโนะจังก็ไม่ได้เป็นสภานักเรียนสักหน่อย... ขอโทษนะ..."
13090-105 = "ทั้งๆ ที่โดนปฏิเสธการเข้าสภานักเรียนมาก็หลายครั้งแล้ว... แต่ฉันก็ยังเข้าใจผิดว่าจะอยู่ด้วยกัน..."
13090-107 = "มะ... ไม่ใช่แบบนั้นนะคะ!!"
13090-111 = "ฉันไม่ชอบลายมันน่ะค่ะ"
13090-112 = "เอ๋ งั้นเหรอ? ฉันว่ามันน่ารักดีออก..."
13090-113 = "ไม่ค่ะ... ไม่เห็นจะน่ารักตรงไหนเลย แล้วกล้วยตรงนี้มันอะไรกันคะ? ไม่เห็นจะเข้ากันเลย!"
13090-114 = "ฮึ่ม~ โฮชิโนะจังไม่สนใจในความแฟนซีแบบนี้เลยเหรอ? หรือว่าเป็นเพราะสมุดไม่ได้เป็นลายปลาที่#nโฮชิโนะชอบน่ะ?"
13090-115 = "คะ?! คะ... ใครบอกว่าชอบปลาคะ...?"
13090-116 = "เห็นครั้งที่แล้วยืนจ้องสมุดบันทึกปลาวาฬที่น่ารักอยู่พักหนึ่งเลยนี่? จ้องแบบตาเป็นประกายเลยด้วย ฉันรู้หมดแหละ!"
13090-117 = "มะ... ไม่ใช่แบบนั้นสักหน่อยค่ะ! อีกอย่าง วาฬไม่ใช่ปลานะคะ!!"
13090-118 = "งั้นเหรอ? แต่ที่มันน่ารักคือเรื่องจริงใช่มั้ย?"
13090-123 = "รุ่นพี่!!"
13090-133 = "รุ่นพี่ เจอหรือยังคะ?"
13090-134 = "..."
13090-138 = "รุ่นพี่ยูเมะ!"
13090-142 = "อ่า โฮชิโนะจัง?"
13090-143 = "ทำอะไรอยู่คะ? รีบหาแล้วกลับกันเถอะค่ะ เดี๋ยวถ้ากลางคืนแล้วที่นี่อุณหภูมิจะลดลงอีกนะ"
13090-144 = "อืม..."
13090-145 = "โฮชิโนะจัง ดูสิ ท้องฟ้ายามค่ำคืนของอะบิดอส... เห็นดาวชัดเลยเนอะ?"
13090-146 = "ก็แถวนี้ไม่มีตึกรามบ้านช่องยังไงล่ะคะ ยิ่งอยู่ในที่ชนบทยิ่งเห็นดาวน่ะค่ะ"
13090-147 = "งั้นเหรอ..."
13090-148 = "และถ้ามีเวลาเหม่อมองฟ้าอยู่ ก็เอาเวลานั้นมามองพื้นสักหน่อยเถอะค่ะ! เราต้องหาของที่ชาวเมือง#nคนนั้นทำหล่นหายแล้วรีบกลับกันสิคะ! "
13090-149 = "เห็นเขาบอกว่าอยู่แถวนี้นี่นา จะไปตอบรับคำขอร้องที่น่ารำคาญแบบนั้นมาทำไมก็ไม่รู้..."
13090-151 = "แต่ว่า... เราจะเมินเฉยคนที่กำลังเจอปัญหาอยู่ไม่ได้นี่นา"
13090-156 = "เอ๋...? "
13090-157 = "จู่ๆ ลมก็พัด..."
13090-162 = "ฮะ... โฮชิโนะจัง! รีบกลับกันเถอะ! นี่มันพายุทราย!"
13090-163 = "ตะ... ต้องกลับทางไหนเนี่ย... เข็มทิศ... อยู่ไหนนะ..."
13090-167 = "อ๊ะ...?! ลืมเอาเข็มทิศมาอีกแล้ว!"
13090-169 = "โธ่เอ๊ย!! ก็บอกแล้วนี่คะว่าให้เอาติดตัวมาด้วย! ถ้าเราหลงทางในทะเลทราย ก็เท่ากับว่าเจออุบัติภัย#nโดยที่หนีไม่พ้นเลยนะคะ! "
13090-170 = "อะ... อืม... ขะ... ขอโทษนะ..."
13090-171 = "ไม่เป็นไรค่ะ ฉันมีอยู่ค่ะ"
13090-172 = "ว้าว โฮชิโนะจังนี่สุดยอดไปเลย! รุ่นน้องที่พึ่งพาได้ของฉัน!"
13090-173 = "เลิกพูดอะไรเพ้อเจ้อแล้ววิ่งเถอะค่ะรุ่นพี่! เร็วเข้าค่ะ!"
13090-185 = "เฮ้อ... ติดต่อไม่ได้ทั้งคุณครูทั้งรุ่นพี่โฮชิโนะเลย ต้องรอไปถึงเมื่อไรเนี่ย?"
13090-189 = "อื้ม เซริกะจัง ส่งลวดเชื่อมตรงนั้นให้หน่อยสิ "
13090-195 = "รุ่นพี่โนโนมิกับรุ่นพี่ชิโรโกะก็รอไม่ไหวจนไปไหนกันแล้วก็ไม่รู้"
13090-200 = "เซริกะจัง ค้อน "
13090-204 = "ว่าแต่ท่านประธานสภานักเรียนคนสุดท้าย... ทำไมถึงได้เจอเรื่องแบบนั้นนะ? "
13090-205 = "นั่นสินะ... "
13090-206 = "รุ่นพี่โฮชิโนะก็ดูไม่อยากพูดถึงมากๆ เลยด้วย... "
13090-212 = "อืม..."
13090-217 = "โอย..."
13090-218 = "อายาเนะจัง ปวดเอวเหรอ? ไหวหรือเปล่า?"
13090-219 = "อืม... เวลาแบบนี้ต้องทำอะไรสักหน่อย จะได้สบายใจและเป็นการจัดการความคิดด้วยน่ะ"
13090-220 = "ความคิดเหรอ?"
13090-224 = "เซริกะจัง"
13090-230 = "ไปค้นห้องสภานักเรียนกันเถอะ"
13090-231 = "เดี๋ยวสิ ทำไมจู่ๆ ก็พูดเหมือนเป็นรุ่นพี่ชิโรโกะไปได้ล่ะ... ห้องสภานักเรียนคือห้องเรียนที่ใช้เป็นห้อง#nเก็บของที่ล็อกอยู่ไม่ใช่เหรอ?"
13090-233 = "ที่นั่นต้องมีความลับเกี่ยวกับประธานสภานักเรียนซ่อนอยู่แน่นอน"
13090-234 = "มันก็อาจจะเป็นอย่างนั้นหรอกนะ... แต่เราจะเข้าไปทั้งๆ ที่ไม่ได้รับอนุญาตจากรุ่นพี่โฮชิโนะได้เหรอ? ฉันว่ารุ่นพี่น่าจะโกรธนะ"
13090-235 = "ถ้าเป็นแค่ห้องเก็บของ... ก็ไม่เห็นจะต้องล็อกเอาไว้ก็ได้นี่"
13090-236 = "แถมตอนนี้มันเหมือนเป็นห้องเก็บของส่วนตัวของรุ่นพี่โฮชิโนะมากกว่า... และถ้าไม่มีอะไรต้องซ่อน#nพวกเราละก็ ฉันว่าก็ไม่จำเป็นต้องล็อกเอาไว้หรอก"
13090-237 = "อืม ยังไงก็ต้อง... ไปตรวจสอบที่นั่นดูแล้วละ"
13090-241 = "ระ... รอด้วยสิ! อายาเนะจัง!"
13090-248 = "ฮ่า... มาถึงแล้ว"
13090-252 = "หืม? สตอร์มคลาวด์? ทำไมมาอยู่ข้างนอกล่ะ?"
13090-253 = "แหะๆ~ สงสัยอายาเนะจังจะหัวร้อนเข้าให้แล้วสินะ"
13090-254 = "รีบเข้าไปก่อนจะโดนดุมากกว่านี้ดีกว่า"
13090-260 = "มาแล้ว~ โฮชิโนะจัง! ที่นี่คือโรงเรียนอะบิดอสแห่งใหม่ละ! "
13090-265 = "ถึงจะถูกไล่ออกมาอยู่อาคารย่อยก็เถอะค่ะ"
13090-268 = "มันก็จริงอยู่หรอกนะ..."
13090-269 = "พวกนักเรียนที่เหลือระหว่างย้ายมายังอาคารนี้ก็ออกไปกันหมดแล้ว... ตอนนี้โรงเรียนอะบิดอส#nมีนักเรียนเหลือแค่ฉันกับโฮชิโนะจัง 2 คนเอง..."
13090-270 = "เอาเถอะค่ะ พวกนั้นก็เป็นคนแบบนี้ตั้งแต่แรกแล้วนี่คะ ฉันไม่สนใจคนที่จากไปแล้วหรอกค่ะ"
13090-271 = "ไม่หรอก โฮชิโนะจัง ที่เป็นอย่างนี้เพราะภัยพิบัติจากธรรมชาติต่างหาก เราจะพูดแบบนั้นกับคนที่ได้รับ#nความเดือดร้อนจากเรื่องนี้ไม่ได้นะ"
13090-272 = "..."
13090-273 = "ฉันว่าการออกจากเขตปกครองตนเองที่ตัวเองอยู่มานานก็คงไม่ใช่เรื่องน่าดีใจนักหรอก"
13090-274 = "แต่ว่า... ไม่มีใครตัดสินใจที่จะอยู่เพื่อปกป้องอะบิดอสเลยสักคนนี่คะ!"
13090-275 = "ก็มีโฮชิโนะจังไง?"
13090-276 = "..."
13090-277 = "แล้วก็ฉันด้วย ใช่มั้ยล่ะ?"
13090-278 = "ค่ะ... พอมาคิดดูแล้วมันก็ใช่อยู่หรอกค่ะ"
13090-279 = "อืม เพราะงั้นต่อไปเราสองคนที่เหลืออยู่จะต้องรักและหวงแหนกันให้มากขึ้น ฉันพูดถูกมั้ย โฮชิโนะจัง?"
13090-280 = "เพราะงั้นฉันเลยจะปกป้องโฮชิโนะจังยังไงล่ะ ฉันไม่อยากให้โฮชิโนะจังต้องบาดเจ็บ อย่างน้อยก็ให้ฉันได้เป็นโล่ให้..."
13090-281 = "ไม่สิคะ ฉันต่างหากที่ต้องปกป้องรุ่นพี่ ก็รุ่นพี่อ่อนแอนี่นา"

13090-343 = "เนอะ? แต่ก็เอาเถอะ!"
13090-344 = "ยังไงสภานักเรียนอะบิดอสก็จะเริ่มขึ้นใหม่ที่นี่ ถึงตอนนี้จะมีแค่ประธานสภานักเรียนกับรองประธาน#nสภานักเรียน... แต่สักวันหนึ่ง..."

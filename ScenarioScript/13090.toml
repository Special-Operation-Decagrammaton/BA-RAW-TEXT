13090-448 = "อ๊ะ นั่นมัน..."
13090-453 = "ล็อกเกอร์ส่วนตัวของ <คุจินาชิ ยูเมะ ชั้นปีที่ 3> กับ <ทาคานาชิ โฮชิโนะ ปีที่ 1>"
13090-455 = "คงเป็นของใช้สมัยที่เป็นสภานักเรียนสินะคะ"
13090-456 = "ใช่ค่ะ... ตู้ของท่านประธานสภานักเรียนว่างเปล่า... แต่ของรุ่นพี่โฮชิโนะมัน..."
13090-458 = "ล็อกอยู่เหรอ...? ฉันจะลองเปิดเอง"
13090-464 = "รุ่นพี่ชิโรโกะ?! นั่นอะไรน่ะ?! เด็กผู้หญิงม.ปลายพกเซ็ตเครื่องมืองัดกุญแจไว้ในกระเป๋าด้วยเหรอ?!"

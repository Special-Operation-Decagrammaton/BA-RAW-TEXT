13090-486 = "อืม น่าจะเป็นของที่รุ่นพี่โฮชิโนะเคยใช้เมื่อก่อนน่ะ ถึงจะเก่าแล้วแต่ก็ได้รับการดูแลรักษาอย่างดีเลย"

13090-298 = "จริงเหรอ โฮชิโนะจัง? ในที่สุดก็เปลี่ยนใจแล้วเหรอ?!"
13090-299 = "ต้องบอกว่าฉันไม่มีที่ให้หนีไปแล้วมากกว่าค่ะ"
13090-300 = "ฉันอยู่กับรุ่นพี่บ่อยจนเป็นเรื่องธรรมดาไปแล้ว... และจากนี้ต่อให้ต้องเป็นหรือไม่เป็นสภานักเรียน ฉันก็ไม่สนแล้วค่ะ..."
13090-301 = "ในเมื่อมันเป็นแบบนี้แล้ว ฉันก็ไม่มีทางเลือกอื่นนอกจากพยายามกับรุ่นพี่อย่างถึงที่สุด... อ้อ แต่ยังไง#nฉันก็จะไม่รับสมุดโน้ตไว้นะคะ"
13090-308 = "ว้าว! ดีใจจัง! ฉันดีใจมากเลยละโฮชิโนะจัง!"
13090-309 = "นี่มันความฝันหรือเปล่า...? หรือจะเป็นปาฏิหาริย์...? อื้อ! ใช่แล้วละ! ต้องเกิดปาฏิหาริย์ขึ้นแน่ๆ!"

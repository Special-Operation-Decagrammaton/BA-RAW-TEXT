13090-426 = "ระ... รุ่นพี่โนโนมิ?!"
13090-427 = "ถือไม้กวาดกับไม้ปัดฝุ่นอยู่ด้วย...? รุ่นพี่มาทำความสะอาดที่นี่กันอยู่หรอกเหรอ?"
13090-429 = "อ่า... มันก็ใช่อยู่หรอก... ว่าแต่ทุกคนมาทำอะไรกันที่นี่เหรอคะ?"
13090-432 = "ค่ะ... พวกรุ่นพี่ก็มาที่นี่เพราะอยากทำความเข้าใจสถานการณ์กันสินะคะ"
13090-433 = "อืม... ถ้าประธานสภานักเรียนยูเมะไม่ได้หายตัวไป แต่โดนทำลายฮาโลละก็... ฉันว่าเราต้องหาคำตอบ#nให้ได้ว่าเกิดเรื่องอะไรขึ้นน่ะ"
13090-434 = "..."

13090-326 = "เดี๋ยวสิ จะดึงเข้าไปขนาดนั้นเลยเหรอคะ ฉันหายใจไม่ออกนะ อยู่ห่างกันหน่อยไม่ได้เหรอคะ?"
13090-327 = "ท้าดา!"
13090-338 = "นี่ไง ห้องสภานักเรียนใหม่ของเรา เป็นไงบ้างล่ะโฮชิโนะจัง?"

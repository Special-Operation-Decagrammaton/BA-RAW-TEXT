[translation]
13090-1 = "Episode 9;Abydos Student Council 2"
13090-2 = "Abydos Desert, Restricted District Sector 35-9"
13090-5 = "There's nothing here, Yume."
13090-10 = "*sigh* No luck here, either? Waaah, another failure! "
13090-15 = "I'm sorry, Hoshino. I've been crushed by frustration and despair. This is where it ends for me."
13090-19 = "Please get up... You're embarrassing me. "
13090-20 = "I simply can't go on! Take care of yourself, Hoshino. I'll never forget everything you did for me. "
13090-24 = "Will you please STOP?!"
13090-30 = "This might've been a failure, but maybe the next one? Success could just be one stop away..."
13090-31 = "There won't be anything there. "
13090-32 = "It's going to be the same no matter where we go. If this \"Abydos Presidents' Exhibition Hall,\" with all those valuable treasures, actually existed..."
13090-33 = "...the previous student council members would've found it and sold everything off ages ago."
13090-34 = "Hm... I guess you're right..."
13090-35 = "Let's go back. This was a waste of time. We shouldn't have gotten excited about a fantasy treasure hunt."
13090-36 = "But you were so excited! You rushed over here super fast when I told you about it."
13090-37 = "You're just back in grumpy-mode because it was a dead-end! "
13090-38 = "N-No... It's more so... "
13090-39 = "...Anyway, you dropped your notebook."
13090-40 = "Gah?! My notebook! "
13090-45 = "Phew! I almost lost your precious notebook, Hoshino... What a close call!"
13090-47 = "Don't associate me with that notebook! More importantly, don't lie on the floor like that again! What would people say about the student council if they saw you?!"
13090-49 = "Y-Yes, ma'am..."
13090-53 = "Look, Hoshino! It's a water bottle you can wear like a backpack! Should I get one?"
13090-54 = "No way. It's too expensive for what it is. And it's going to be bulky if you need to make quick maneuvers. "
13090-56 = "Aw, really?"
13090-60 = "Eek! 10,000 yen? Th-That IS pricey..."
13090-61 = "Our money would be better spent on ammunition. We're always in short supply."
13090-62 = "That's true!"
13090-63 = "...I have a question."
13090-64 = "Yes?"
13090-65 = "How did you become the student council president? Not to be rude or anything, but I didn't hear any news of an election. And you're the only member of the student council to begin with. "
13090-66 = "Don't worry, you're completely right! I didn't become president through any kind of formal procedure."
13090-67 = "R-Really?"
13090-68 = "Heehee. You see, before the previous student council left, they conducted a show-of-hands vote and, ta-da! I became the president."
13090-69 = "Huh?! You became president off of some raised hands? I can't think of a more informal way for you to be elected! "
13090-70 = "Yup! I guess, since Abydos doesn't have any sort of administrative infrastructure, that's how they've been electing presidents for a while!"
13090-71 = "Those people didn't care about running the student council at all. They just offloaded the dead weight onto you and ran away?!"
13090-72 = "No, Hoshino. It wasn't like that at all."
13090-76 = "I didn't become president by matter of convenience. I wanted it. I wanted to be president."
13090-78 = "R-Really...?"
13090-79 = "Really! I thought I might be better equipped to protect Abydos if I had more authority and responsibility. "
13090-83 = "Although, now that I'm thinking about it, becoming president didn't exactly give me all that much power! Hahaha!"
13090-84 = "But I worked hard in my own way, to prepare for the position!"
13090-85 = "Prepare?"
13090-89 = "Ta-da! The Official Abydos Student Council President Notebook! "
13090-94 = "What was that big sigh, Hoshino?! Believe it or not, I'm being super serious! I've been keeping a daily activity log!"
13090-95 = "You're telling me this 150 yen kiddie notebook is your preparation?"
13090-96 = "I-It's not just a kiddie notebook! I told you! It's the Official Abydos Student Council President Notebook! Although these days it reads more like a diary... "
13090-100 = "D-Don't make that disapproving face! It doesn't change how I feel! And one day, this precious log will be yours, Hoshino!"
13090-102 = "No way. Not in a million years."
13090-103 = "Wh-Why not?! "
13090-104 = "R-Right... You're not even an official member... I'm sorry for overstepping..."
13090-105 = "You turned down all my invitations to join the student council...but...for some reason, I thought you'd always be by my side."
13090-107 = "Wait, no! That's... That's not what I meant!"
13090-111 = "I just...don't like the design..."
13090-112 = "Wha— Really?! I thought it was really cute..."
13090-113 = "...What about a banana is cute? You've got terrible taste!"
13090-114 = "Hm! Maybe you're just not into fancy stuff, Hoshino. Oh! Or is it because it's not a fish?"
13090-115 = "Huh?! I-I don't like fish! What're you talking about?"
13090-116 = "I saw a sparkle in your eyes when you were at the market, looking at that whale notebook! You just couldn't tear yourself away. You should know, Hoshino, nothing escapes me!"
13090-117 = "I so was not! And more importantly, whales aren't fish!"
13090-118 = "Really? Huh. But you think they're cute anyways, right?"
13090-123 = "Yume!!"
13090-133 = "Did you find it?"
13090-134 = "..."
13090-138 = "Yume!"
13090-142 = "Ah. Hoshino? "
13090-143 = "What're you spacing out for? We've gotta hurry and find this thing so we can head back. The temperature in this area drops fast once the sun goes down."
13090-144 = "...Mhm."
13090-145 = "Look over here, Hoshino. Isn't Abydos' night sky...just so bright?"
13090-146 = "It's because we're out in the middle of nowhere. There's no light pollution from the city to dull the view of the stars."
13090-147 = "I see..."
13090-148 = "More important than stargazing, redirect your attention to the ground. We need to find that citizen's lost item and get back home. "
13090-149 = "According to their information, it should be somewhere around here. Geez. Why're you always accepting these pain-in-the-butt requests?"
13090-151 = "Well, because...it's wrong to turn away someone in need of help, isn't it? "
13090-156 = "Ah? "
13090-157 = "The wind's picking up!"
13090-162 = "Hoshino! It's a sandstorm! We need to leave right now!"
13090-163 = "Th-The way back...the compass... Where...?"
13090-167 = "Ah?! I forgot to bring the compass again! "
13090-169 = "Again?! I even reminded you to pack it! We're screwed if we get lost in the desert! "
13090-170 = "I know... I-I'm sorry."
13090-171 = "It's okay. I had a feeling, so I brought one."
13090-172 = "Wow! You're the best, Hoshino! My amazing, dependable—"
13090-173 = "There's no time for compliments! Run! Hurry!"
13090-185 = "*sigh* I really can't get a hold of Sensei or Hoshino. How long do we have to wait here?"
13090-189 = "Mm. Can you hand me the welding rod, Serika? "
13090-195 = "Nonomi and Shiroko got bored of waiting and wandered off."
13090-200 = "Hammer, please, Serika. "
13090-204 = "The former student council president... What happened to her? "
13090-205 = "...I wonder. "
13090-206 = "Hoshino really didn't wanna talk about it. "
13090-212 = "...Mhm."
13090-217 = "Ugh... "
13090-218 = "Does your back hurt, Ayane?"
13090-219 = "It's okay. During times like these, keeping my hands busy helps me clear my head."
13090-220 = "Clear your head?"
13090-224 = "Serika."
13090-230 = "Let's break into the student council room."
13090-231 = "Huh? You sound like Shiroko right now. Isn't that the classroom they used for storage? It's always locked..."
13090-233 = "There has to be answers about the student council president there. "
13090-234 = "Probably...but Hoshino might get mad. Maybe we should ask her."
13090-235 = "...If it was just a regular storage room, it wouldn't be locked up the way it is. "
13090-236 = "We've regarded it as Hoshino's personal storage and left it alone...but if there was nothing to hide, it wouldn't be locked up."
13090-237 = "...Yes. We have no choice. We need to go see."
13090-241 = "W-Wait! Ayane!"
13090-248 = "*sigh* I guess I'm here."
13090-252 = "Huh? Why's the Water Cloud outside?"
13090-253 = "Uh-oh. Ayane must be real mad."
13090-254 = "I guess I should stop dilly-dallying before I get in more trouble."
13090-260 = "We're here! Hoshino! This is the brand-new Abydos! "
13090-265 = "You can market it that way, but we're just being forced into one of Abydos' annexes..."
13090-268 = "You're not wrong there..."
13090-269 = "And all the other students left! It's just you and me now, Hoshino. The last students of Abydos High School! "
13090-270 = "They were gonna leave eventually anyway. I don't care about them."
13090-271 = "We can't blame the people who were just looking to ease their suffering, Hoshino. It's really the natural disasters' fault!"
13090-272 = "... "
13090-273 = "Consider how hard it must be to leave the place they called home, some of them for their whole lives!"
13090-274 = "It doesn't matter! Not a single person decided to stay and protect Abydos, their so-called home!"
13090-275 = "You did, didn't you, Hoshino?"
13090-276 = "..."
13090-277 = "And I'm here, too! Right?"
13090-278 = "...When you put it that way, yeah."
13090-279 = "Yup! So the last two students of Abydos will have each other's backs! More so than ever. Right, Hoshino?"
13090-280 = "I'll protect you, no matter what! You never seem to mind getting hurt, but you can use me as a shield—"
13090-281 = "No way. You're the weak one, so I'll protect you."
13090-282 = "Huh? W-Well, you're not wrong, but..."
13090-283 = "...it's only because you're especially strong!"
13090-284 = "The senior is supposed to look out for her junior, you know..."
13090-285 = "Yeah. I get it. That's why...well, I just feel like I should put in more effort."
13090-290 = "So, here. Take it."
13090-292 = "Huh? What is it?"
13090-297 = "A student council membership form?!"
13090-298 = "You mean it, Hoshino? You changed your mind?!"
13090-299 = "I didn't change my mind, more so... I just... I don't have anywhere left to run."
13090-300 = "It's not about the student council. It's just, being with you feels... It feels natural."
13090-301 = "I don't really see any other option than staying with you...but that doesn't mean I'll take the notebook!"
13090-308 = "Wow! WOW! There aren't words to describe how happy I am, Hoshino! I'm beyond happy!"
13090-309 = "Is this a dream? Or maybe a miracle…? Yeah! That's it! It's definitely a miracle!"
13090-310 = "...I can't breathe. At this rate, I might die before this miracle plays out."
13090-311 = "Wait, that's right! I can't let this moment slip by! We need to take a picture! A commemorative pic to remember this moment forever!"
13090-312 = "C-Commemorative picture? I don't think this situation really warrants that... Yume?"
13090-313 = "What're you even saying?! We're celebrating! Of course we need to take a picture!"
13090-318 = "Come here, Hoshino!"
13090-323 = "Perfect! Next, look over there, Hoshino!"
13090-324 = "Close... Too close! We're...We're definitely touching!"
13090-325 = "Not yet! Come closer! C'mon, don't be shy! "
13090-326 = "You're holding me way too tight, Yume! I'm gonna suffocate. Back off!"
13090-327 = "Ta-da!"
13090-338 = "This is our new student council office! What do you think, Hoshino?"
13090-342 = "...It's small."
13090-343 = "It really is! But still...!"
13090-344 = "This is a new beginning for the Abydos Student Council. I know, I know, it's just the two of us, the president and vice president, right now, but someday..."
13090-345 = "Someday?"
13090-349 = "Heeheehee..."
13090-350 = "Someday, this whole place will be filled to the brim with our underclassmen and fellow members, right?"
13090-387 = "Excuse me?"
13090-388 = "One sec, Ayane. No one really uses this room anymore, so it might be super...dusty...? "
13090-396 = "Huh? "
13090-397 = "Not a speck of dust... I was expecting it to be a disaster in here."
13090-398 = "You're right. It appears it's been pretty well-maintained."
13090-399 = "Do you think it was Hoshino? But what reason would she have to keep an abandoned room clean? "
13090-410 = "Hm..."
13090-416 = "Whoa?! Shiroko?! "
13090-424 = "Wait...? Shiroko and..."
13090-426 = "...N-Nonomi, too?!"
13090-427 = "Are those...brooms and dusters? You were the one cleaning?"
13090-429 = "Y-Yes, that's correct. But what are you two doing here?"
13090-432 = "...I see. So everyone came to the same conclusion about the situation."
13090-433 = "Mm. If Student Council President Yume's halo was really destroyed...we need to know why."
13090-434 = "..."
13090-436 = "Yes, I agree entirely. But...have you been maintaining this room all this time?"
13090-437 = "Well, yes. Just here and there, when it crossed my mind. I...I never told Hoshino."
13090-438 = "..."
13090-439 = "However, it appears to just be a collection of odds and ends in here."
13090-445 = "There's something here."
13090-446 = "Cabinets...? "
13090-448 = "Ah. Those..."
13090-453 = "\"3rd Year, Kuchinashi Yume\" and \"1st Year, Takanashi Hoshino\"... Must be their lockers."
13090-455 = "They probably used it during their time as student council members."
13090-456 = "That's what I'd assume. The Student Council President's cabinet is empty, but Hoshino's..."
13090-458 = "...Locked? Let me try."
13090-464 = "What the heck is that, Shiroko?! Why is a high school girl carrying around a lockpicking set?!"
13090-465 = "Um. Consider it a hobby? "
13090-470 = "It's okay. It's already open, anyway."
13090-475 = "Mm."
13090-476 = "Phew. I got scared that you were gonna get in trouble with Hoshino."
13090-478 = "We did still open it without her permission... I wouldn't say we're in the clear. "
13090-479 = "What's inside?"
13090-484 = "...Weapons and equipment."
13090-485 = "A bulletproof vest...extra sidearms... All this equipment..."
13090-486 = "Mhm. They're probably Hoshino's, from a long time ago. They're well-maintained, though."
13090-487 = "That's some serious firepower."
13090-488 = "Was Hoshino gonna fight a one-woman war or something?"
13090-498 = "H-Hoshino?!"
13090-500 = "W-Whoa?! Busted!"
13090-501 = "H-Hoshino... U-Um..."
13090-502 = "U-Umm..."
13090-508 = "Whoa! What're you rascals up to?"
13090-514 = "Next Episode;That Day"

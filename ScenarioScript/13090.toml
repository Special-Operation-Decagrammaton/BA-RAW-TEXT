[translation]
13090-1 = "第9話;阿拜多斯學生會（２）"
13090-2 = "阿拜多斯沙漠封鎖地區35-9"
13090-5 = "夢前輩，這裡什麼都沒有。"
13090-10 = "……這裡也沒有呢。#n我又失敗了，嗚嗚嗚。"
13090-15 = "對不起，星野醬。#n我已經被挫折和絕望擊垮……只能到此為止了。"
13090-19 = "……這樣我很為難。#n快起來吧，前輩。"
13090-20 = "不，我已經不行了。#n這段時間謝謝你，星野醬。要保重哦。"
13090-24 = "啊啊，拜託別鬧了！"
13090-30 = "既然這樣，我們到下一站看看吧？#n說不定就在那裡……"
13090-31 = "……不。"
13090-32 = "其他地方應該也一樣吧。"
13090-33 = "展示著貴重寶物的阿拜多斯學生會長展示館？#n如果真的有那種東西，早就被學生會的人找出來賣光了。"
13090-34 = "唔嗯……好像也是？"
13090-35 = "真是浪費時間。#n趕快回去吧，沒事尋什麼寶……"
13090-36 = "可是星野醬不是一聽到尋寶兩個字就開心地跟過來了嗎？"
13090-37 = "因為撲空就進入了悲觀模式……？"
13090-38 = "不，不是……與其這麼說……"
13090-39 = "……對了，前輩。#n你的手冊掉到地上了。"
13090-40 = "啊，我的手冊！？"
13090-45 = "呼～還好還好～#n差點就把星野醬重要的手冊弄丟了。"
13090-47 = "……那什麼時候變成我的手冊了？#n還有請不要隨便就躺在地上。學生會長的顏面都跟著掃地了。"
13090-49 = "唔嗯……"
13090-53 = "你看，星野醬。#n是能像背包一樣背在背上的水壺，看起來很方便吧？要不要買一個？"
13090-54 = "不用了。感覺活動的時候就會礙手礙腳的。#n而且以它的價位來看，品質實在一言難盡。"
13090-56 = "是嗎？"
13090-60 = "哇，要1萬元……？#n好，好貴……"
13090-61 = "與其買那種東西，不如多買一點子彈吧。#n子彈永遠不嫌多。"
13090-62 = "這倒是沒錯。"
13090-63 = "……前輩，我有個問題想問你。"
13090-64 = "嗯？"
13090-65 = "你是怎麼當上學生會長的？#n學生會現在只有前輩一個人，我也從沒聽說過學生會長選舉之類的事……"
13090-66 = "唔嗯……的確是沒有經過正式的流程。"
13090-67 = "是，是嗎？"
13090-68 = "呵呵……只是前任學生會的成員在離開之前，#n透過舉手表決的方式，把會長的職位交給我而已。"
13090-69 = "什麼！？舉手表決……？#n這也太隨便了吧！？學生會長是這樣選出來的嗎？"
13090-70 = "嗯……其實好像很久之前就是用這種方式，把會長的職位推來推去了。#n畢竟現在的阿拜多斯，就連行政的基礎設施都沒有。"
13090-71 = "所以那些傢伙，本來就沒打算好好進行學生會的活動……#n而且還在離開之前，把麻煩全都推給了夢前輩是吧。"
13090-72 = "不，星野醬。不是這樣的。"
13090-76 = "成為學生會長是我的意願。#n並不是被他們強迫的，星野醬。"
13090-78 = "是，是嗎……？"
13090-79 = "嗯，只要能守護阿拜多斯……我認為自己的責任和權限越多越好。"
13090-83 = "當然……實際上並沒有因為當上會長，就突然獲得很大的力量和權力就是了。"
13090-84 = "不過我還是有用自己的方式努力準備……"
13090-85 = "準備？"
13090-89 = "鏘～學生會長手冊！"
13090-94 = "為什麼要嘆氣呢，星野醬？#n別看我這樣，我可是每天都有認真寫活動日誌的哦！"
13090-95 = "阿拜多斯學生會長的手冊，居然是150元就能買到的練習本……"
13090-96 = "這，這不是練習本，是學生會長手冊啦……#n當然現在可能更像是我的日記本……"
13090-100 = "就算露出厭惡的表情也沒用的哦？#n這本手冊總有一天會傳給星野醬的。"
13090-102 = "不。那種事不會發生。"
13090-103 = "為，為什麼！？"
13090-104 = "不過想想也有道理，畢竟星野醬不是學生會的人……對不起……"
13090-105 = "雖然已經被你拒絕了很多次……#n因為你還是陪在我身邊的關係，所以才誤會了……"
13090-107 = "不，不是……我不是那個意思！！"
13090-111 = "……我只是不喜歡那個設計而已。"
13090-112 = "咦，是嗎？我覺得很可愛呀……"
13090-113 = "……到底哪裡可愛了啊。#n這根香蕉是怎麼回事？一點品味都沒有！！"
13090-114 = "哦～所以星野醬對這種花俏的東西沒興趣嗎？#n還是因為不是你喜歡的小魚設計才這麼說？"
13090-115 = "啊！？你，你說誰喜歡魚……？"
13090-116 = "你之前不是一直盯著可愛的鯨魚筆記本嗎？#n兩隻眼睛都看到發亮了，我可是都知道的唷？"
13090-117 = "才，才沒有！而且鯨魚也不是魚！！"
13090-118 = "是嗎？所以你也不否認很可愛吧？"
13090-123 = "前輩！！"
13090-133 = "前輩，找到了嗎？"
13090-134 = "……"
13090-138 = "夢前輩！"
13090-142 = "啊，星野醬？"
13090-143 = "你在做什麼？找完了就趕快回去吧。#n這裡晚上的氣溫會下降很多。"
13090-144 = "……嗯。"
13090-145 = "星野醬你看。阿拜多斯夜裡的星星……很亮對吧？"
13090-146 = "是因為周圍沒有都市的關係吧。#n不是都說越鄉下的地方，星星就會越亮嗎？"
13090-147 = "這樣啊……"
13090-148 = "話說與其花時間看天空，不如多看地上幾眼吧！#n我們得趕快找到那個市民弄掉的東西才行！"
13090-149 = "應該就在這附近才對。#n真受不了，何必沒事答應這種麻煩的請求呢……"
13090-151 = "可是……總不能對陷入困難的人視而不見吧。"
13090-156 = "咦……？"
13090-157 = "突然起風了……"
13090-162 = "星，星野醬！我們趕快回去吧！沙塵暴要來了！"
13090-163 = "回，回去的路是……指南針……在哪裡……"
13090-167 = "哇！？我又沒帶指南針來了！"
13090-169 = "真是的！！不是跟你說過要記得帶嗎！#n沒有指南針的話，要是在沙漠裡迷路就完蛋了！"
13090-170 = "嗚嗚，對，對不起……"
13090-171 = "沒關係，還好我有帶著。"
13090-172 = "哇啊～不愧是星野醬！真是可靠的後輩！"
13090-173 = "別再說這些有的沒的了！快走吧，前輩！"
13090-185 = "唉，老師和星野前輩都聯絡不上。#n到底要等到什麼時候啊？"
13090-189 = "茜香醬，可以幫我拿一下焊條嗎？"
13090-195 = "野乃美前輩和白子前輩也都等得不耐煩，不知道跑去哪裡了。"
13090-200 = "茜香醬，錘子。"
13090-204 = "可是最後一位學生會長……為什麼會遇到那種事呢？"
13090-205 = "……就是說啊。"
13090-206 = "星野前輩好像很不想說的樣子……"
13090-212 = "……嗯。"
13090-217 = "呃唔── "
13090-218 = "綾音醬，你的腰還好嗎？"
13090-219 = "……嗯。#n這種時候必須做點什麼，才能讓心情和思緒變得冷靜和清晰。"
13090-220 = "思緒？"
13090-224 = "茜香醬。"
13090-230 = "我們去洗劫學生會室吧。"
13090-231 = "不是，你怎麼突然說話跟白子前輩一樣……#n是指那間上了鎖，被當倉庫使用的教室嗎？"
13090-233 = "那裡一定藏有學生會長的秘密。"
13090-234 = "是有這個可能……可是不經星野前輩的允許就進去好嗎？#n他一定會生氣的。"
13090-235 = "……如果只是倉庫的話，就不必特意上鎖了吧。"
13090-236 = "而且現在感覺只是星野前輩的個人倉庫而已……#n如果不是有事瞞著我們，根本不必上鎖。"
13090-237 = "嗯，現在……果然必須確認才行。"
13090-241 = "等，等等！綾音醬！"
13090-248 = "呼，到了到了。"
13090-252 = "嗯？雨雲號怎麼跑到外面來了？"
13090-253 = "哎呀～看來綾音醬好像很生氣呢。"
13090-254 = "得在挨罵前走快點才行。"
13090-260 = "我們到囉！星野醬！這裡就是新阿拜多斯高中！"
13090-265 = "只是分校的別館而已吧。"
13090-268 = "雖然是這樣沒錯……"
13090-269 = "而且在遷移到這裡的同時，其他學生也全都離開了……#n現在還留在阿拜多斯高中的，就只剩下我跟星野醬2個人而已……"
13090-270 = "反正他們本來就是那樣的人。#n離不離開其實也無所謂。"
13090-271 = "不，星野醬。這是自然災害的錯。#n我們不應該對受害者說那種話。"
13090-272 = "…… "
13090-273 = "離開待了這麼久的自治區，一定很難受吧。"
13090-274 = "但是……沒有任何人決定留下來保護阿拜多斯啊！"
13090-275 = "不是有星野醬在嗎？"
13090-276 = "……"
13090-277 = "而且還有我。對吧？"
13090-278 = "……這個嘛，確實是這樣沒錯。"
13090-279 = "嗯，所以今後我們兩個必須更珍惜彼此才行。#n對吧星野醬？"
13090-280 = "星野醬就由我來保護。#n不用害怕受傷哦，因為我會在前面用盾牌保護你……"
13090-281 = "……是我保護前輩才對吧。畢竟前輩很弱。"
13090-282 = "咦？這，這麼說好像也……"
13090-283 = "不對，是星野醬特別強吧！"
13090-284 = "而且，本來就該由前輩保護後輩……"
13090-285 = "……我知道。#n所以我也必須更加努力……"
13090-290 = "來……前輩，請收下。"
13090-292 = "嗯？這是什麼？"
13090-297 = "加入學生會的申請書！？"
13090-298 = "真的嗎，星野醬？你終於改變心意了嗎？"
13090-299 = "與其說改變心意……應該說我也無處可逃了。"
13090-300 = "和前輩在一起這件事已經變得太過自然……#n不管是不是學生會的人，好像都已經無所謂了……"
13090-301 = "既然如此，似乎只能和前輩一起努力到底……#n啊，不過我還是不會收下那本手冊的。"
13090-308 = "哇──！好開心！我真的很開心！星野醬！"
13090-309 = "這是夢嗎……？還是……奇蹟？#n嗯！沒錯！一定是奇蹟！"
13090-310 = "……我喘不過氣了，前輩。#n在奇蹟發生之前我就要沒命了。"
13090-311 = "對了！現在不是說這些的時候！#n照片照片！我們來拍照紀念吧！"
13090-312 = "拍，拍照？不必那麼誇張吧，前輩？"
13090-313 = "不行！發生值得慶祝的事情就該拍照留念！"
13090-318 = "過來這邊！星野醬！"
13090-323 = "來！星野醬，看那邊。"
13090-324 = "靠太近了啦，前輩。#n碰到了哦？碰到了啦。"
13090-325 = "不用害羞～來，再靠近一點。"
13090-326 = "不是，我又不能呼吸了，可以離遠一點嗎？"
13090-327 = "鏘──！"
13090-338 = "來，這裡是新的學生會室哦。#n覺得怎麼樣呀，星野醬？"
13090-342 = "……好小。"
13090-343 = "對吧？不過雖然空間很小！"
13090-344 = "但是阿拜多斯學生會將從這裡重新開始。#n雖然現在……只有學生會長和副學生會長兩個人，不過總有一天……"
13090-345 = "總有一天？"
13090-349 = "耶嘿嘿……"
13090-350 = "這裡也會因為我們的後輩，變成熱鬧的地方吧……？"
13090-387 = "打擾了……？"
13090-388 = "等等我，綾音醬。#n這裡很久沒使用了，灰塵好重……"
13090-396 = "咦……"
13090-397 = "本來還以為會很髒，結果比想像中還乾淨耶？"
13090-398 = "……嗯。想必是有人會定期來打掃吧。"
13090-399 = "是誰？難道是星野前輩？#n……不，應該不太可能。"
13090-410 = "唔嗯。"
13090-416 = "白子前輩！？嚇我一跳！"
13090-424 = "咦……白子醬？#n還有……"
13090-426 = "野，野乃美前輩也在！？"
13090-427 = "而且還拿著掃把和雞毛撢子……？#n原來是前輩在打掃這裡嗎？"
13090-429 = "是，是這樣沒錯……大家在這裡做什麼呢？"
13090-432 = "……這樣啊。#n原來前輩們也是為了瞭解現況才來這裡。"
13090-433 = "嗯……如果夢學生會長不是失蹤，而是光環被破壞的話……#n必須查出發生了什麼事才行。"
13090-434 = "……"
13090-436 = "我們的想法也一樣……#n這裡是野乃美前輩在打掃的嗎？"
13090-437 = "……嗯。#n偶爾想到的時候……都會背著星野前輩……"
13090-438 = "……"
13090-439 = "不過這裡就只有一些雜物而已……"
13090-445 = "這邊有東西。"
13090-446 = "置物櫃……？"
13090-448 = "啊，那是……"
13090-453 = "「3年級．梔子夢」和「1年級．小鳥遊星野」……是個人置物櫃吧。"
13090-455 = "也許是學生會時期使用的東西。"
13090-456 = "……嗯。#n學生會長的置物櫃是空的……但是星野前輩的……"
13090-458 = "……鎖著嗎？我來開開看。"
13090-464 = "白子前輩！？那是什麼東西！？#n為什麼女高中生的背包裡會有開鎖工具組！？"
13090-465 = "唔嗯……這只是我的興趣而已……"
13090-470 = "不，不用了。櫃子並沒有上鎖……"
13090-475 = "唔嗯……"
13090-476 = "太好了。白子前輩差點就要被星野前輩教訓一頓了。"
13090-478 = "雖然背著主人偷偷打開也一樣會挨罵就是了……"
13090-479 = "裡面有什麼？"
13090-484 = "……是武器和裝備。"
13090-485 = "這是……防彈背心和輔助武器……這些裝備是……"
13090-486 = "嗯，好像是星野前輩以前用過的。#n雖然舊，但是保養得很好。"
13090-487 = "這些武器真不得了……"
13090-488 = "星野前輩是打算獨自打仗嗎……？"
13090-498 = "星，星野前輩！？"
13090-500 = "唔，唔哇啊！？被發現了！？"
13090-501 = "星，星野前輩……那個……"
13090-502 = "唔，唔嗯……"
13090-508 = "喂～你們這些搗蛋鬼在做什麼～！"
13090-514 = "下一話;那一天"

13090-311 = "จริงสิ! นี่ไม่ใช่เวลามากอดกันอยู่! ถ่ายรูป! ถ่ายรูป! ต้องถ่ายรูปเป็นที่ระลึกไว้สิ!"
13090-312 = "คะ? ถะ... ถ่ายรูปเหรอคะ? มันไม่ใช่เรื่องน่าตื่นเต้นถึงขนาดนั้นเลยนะคะรุ่นพี่"

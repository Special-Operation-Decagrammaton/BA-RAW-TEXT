80000007-7 = "3;하나에;05;선생님, 어젯밤에도 또 철야를 하신 건가요?\n#3;a"
80000007-8 = "3;하나에;06;철야는 건강에 해롭다고 몇 번이나 말씀드렸는데…….\n#3;em;[속상함]\n#3;stiff"
80000007-9 = "[s1] \"샬레의 일이 많아서…….\"\n[s2] \"어쩔 수가 없었어…….\""
80000007-10 = "3;하나에;02;하는 수 없네요. 그럼 제가 밤새 고생하신 선생님을 위해, 피로가 가시는 음료를 준비해올게요.\n#3;em;[반짝]\n#3;greeting"
80000007-11 = "3;하나에;02;하는 수 없네요. 그럼 제가 밤새 고생하신 선생님을 위해, 피로가 가시는 음료를 준비해올게요.\n#3;em;[반짝]\n#3;greeting"
80000007-12 = "3;하나에;03;선생님은 자리에 앉아 잠깐이라도 눈을 붙여주세요."
80000007-13 = "[s] \"커피라면 충분히 마셨는데…….\""
80000007-14 = "3;하나에;01;걱정하지 않으셔도 괜찮아요!"
80000007-15 = "3;하나에;01;제가 준비한 음료는 커피보다 훨씬 더 뛰어난 효능을 지니고 있으니까요.\n#3;em;[음표]"

[translation]
80000007-1 = "最強疲勞恢復劑"
80000007-2 = "夏萊．辦公室"
80000007-3 = "（拚命完成工作後去見了來當值日生的花繪）"
80000007-7 = "老師，難道你昨晚又熬夜了嗎？"
80000007-8 = "我明明已經說了很多次熬夜對健康有害了！"
80000007-9 = "[s1]「工作太多了……」\n[s2]「我也沒辦法……」"
80000007-10 = "為了辛苦熬夜的老師，我來準備能夠消除疲勞的飲料吧！"
80000007-11 = "為了辛苦熬夜的老師，我來準備能夠消除疲勞的飲料吧！"
80000007-12 = "老師請在位子稍微休息一下。"
80000007-13 = "[s]「我已經喝了很多咖啡了……」"
80000007-14 = "不不，請不用擔心！"
80000007-15 = "我所準備的飲料，效果可是比咖啡更好哦。"
80000007-19 = "[ns]「總覺得有點不安……」"
80000007-25 = "（花繪拿著一個裝著可疑黑色液體的杯子走了進來……）"
80000007-26 = "久等了～！這是花繪特調的咖啡因濃縮飲料！"
80000007-27 = "這一杯裡可是有著普通咖啡200杯份的咖啡因！保證一喝就清醒！"
80000007-28 = "[s]「這已經是一種毒了吧！？」"
80000007-29 = "咦？不合老師的胃口嗎？"
80000007-30 = "該怎麼辦呢。我手邊就只有咖啡跟可可粉而已……"
80000007-31 = "[s]「給我一杯熱可可就可以了……」"
80000007-32 = "巧克力的咖啡因含量沒有咖啡那麼高，可能沒辦法讓老師醒過來……"
80000007-33 = "不過，如果這是老師的願望，那就交給我吧！"
80000007-34 = "我現在就去準備熱可可！"
80000007-45 = "久等了，花繪特調的熱可可來了！"
80000007-46 = "巧克力上還放了很多可愛的兔子棉花糖唷！"
80000007-47 = "[s]喝花繪做的熱可可"
80000007-52 = "好喝嗎？那真是太好了！雖然是在來的途中偶然看到，幸好有買來！"
80000007-53 = "話說回來，今天為什麼到處都在賣巧克力呢？"
80000007-54 = "……咦？情人節？"
80000007-55 = "啊……這，這麼說來又到這個時期了呢……我都沒注意到。"
80000007-56 = "雖然是巧合，但可以送老師巧克力真是太好了。"
80000007-60 = "……我的巧克力，一定要喝完哦！"

80000007-23 = "#wait;2000"
80000007-24 = "#all;hide"
80000007-25 = "#na;(하나에가 수상쩍은 검은 액체가 담긴 컵을 들고 돌아왔다…….)"
80000007-26 = "3;하나에;03;오래 기다리셨습니다. 하나에 특제 카페인 농축 음료예요!\n#3;em;[반짝]\n#3;a"
80000007-27 = "3;하나에;01;이 음료에는 일반 커피의 200배의 카페인이 농축되어 있답니다. 마시면 잠이 확 달아날 거예요!\n#3;greeting"
80000007-28 = "[s] \"죽일 셈이냐!\""
80000007-29 = "3;하나에;04;어라? 이 음료는 마음에 안 드시나요?\n#3;stiff\n#3;em;[땀]"
80000007-30 = "3;하나에;06;곤란하네요. 지금 가지고 있는 재료는 커피 가루와 핫 초콜릿 가루밖에 없는데……."
80000007-31 = "[s] \"핫 초콜릿이면 충분해…….\""
80000007-32 = "3;하나에;01;괜찮으시겠어요? 초콜릿은 커피보다 카페인 함량이 적어서 잠을 깨는 데에는 그다지 도움이 되지 않을 텐데…….\n#3;em;[...]"
80000007-33 = "3;하나에;01;하지만 선생님께서 원하신다면 어쩔 수 없지요."
80000007-34 = "3;하나에;02;그럼 잠시만 기다려주세요. 금방 핫 초콜릿을 만들어 올게요!\n#3;em;[반짝]\n#3;hophop"

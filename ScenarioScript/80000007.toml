[translation]
80000007-1 = "The Best Fatigue Reliever"
80000007-2 = "Schale Office"
80000007-3 = "I was just wrapping up an all-nighter when Hanae came by the office."
80000007-7 = "Sensei, were you up all night working again?"
80000007-8 = "I keep telling you that's bad for your health..."
80000007-9 = "[s1] \"It was the only way to finish my work.\"\n[s2] \"You say that like I had any other choice...\""
80000007-10 = "Okay, okay. At least let me make you something that will help you recover from last night."
80000007-11 = "Okay, okay. At least let me make you something that will help you recover from last night."
80000007-12 = "Lie down and feel free to nod off for a while."
80000007-13 = "[s] \"But I already drank a lot of coffee...\""
80000007-14 = "That's fine!"
80000007-15 = "This drink is gonna be much more potent than coffee."
80000007-19 = "[s] \"Now you have me worried...\""
80000007-25 = "Hanae came back with a cup of dark, suspicious liquid."
80000007-26 = "Sorry to keep you waiting. Here's Hanae's Special Caffeine Concentrated Mix!"
80000007-27 = "It contains 200 times more caffeine than the average cup of coffee.#nYou'll be wide awake once you drink this!"
80000007-28 = "[s] \"It sounds like I'm gonna be dead!\""
80000007-29 = "Huh? You don't want any?"
80000007-30 = "That's too bad. The only other things we have are ground coffee and hot chocolate powder."
80000007-31 = "[s] \"I could go for a hot chocolate...\""
80000007-32 = "Are you sure? It doesn't contain very much caffeine, so it won't help with your drowsiness."
80000007-33 = "But if that's what you want, then okay."
80000007-34 = "Wait here just a moment, and I'll bring you a cup of hot chocolate!"
80000007-45 = "I'm baaack. Here's a cup of Hanae's Special Hot Chocolate!"
80000007-46 = "I made a cute bunny with marshmallows to put in it too!"
80000007-47 = "[s] Drink the hot chocolate."
80000007-52 = "What the...? You already drank all of it! I'm glad you liked it, heehee.#nGood think I picked up the ingredients on my way here."
80000007-53 = "Which reminds me, a lot of shops were advertising chocolate this morning. What's up with that?"
80000007-54 = "Huh? Because it's Valentine's Day?"

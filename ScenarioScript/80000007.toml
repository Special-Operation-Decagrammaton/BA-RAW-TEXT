80000007-52 = "3;하나에;02;후후, 맛있게 드셔 주시니 다행이네요. 샬레에 오는 길에 핫 초콜릿을 사 오길 잘했어요.\n#3;a"
80000007-53 = "3;하나에;01;그나저나 오늘은 어째서 초콜릿을 파는 가게가 길가에 그렇게나 많았던 걸까요?"
80000007-54 = "3;하나에;04;……네? 발렌타인 데이요?\n#3;em;[?!]\n#3;jump"
80000007-55 = "3;하나에;01;아하하…… 그러고 보니 벌써 시간이 그렇게 되었네요. 저도 깜박 잊고 있었어요.\n#3;em;[///]\n#3;stiff"
80000007-56 = "3;하나에;02;우연이긴 하지만, 선생님께 초콜릿을 선물할 수 있어서 다행이에요."

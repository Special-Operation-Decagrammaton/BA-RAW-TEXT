[translation]
80000007-1 = "สุดยอดยาคลายความเหนื่อยล้า"
80000007-2 = "สำนักงานชาเล่ต์"
80000007-3 = "(หลังจากทำงานโต้รุ่งเสร็จ คุณครูก็ได้เจอกับฮานาเอะที่มาทำงานนอกสถานที่)"
80000007-7 = "คุณครู เมื่อคืนก็ทำงานโต้รุ่งงั้นเหรอคะ?"
80000007-8 = "บอกตั้งหลายครั้งแล้วไม่ใช่เหรอคะว่าทำแบบนี้มันไม่ดีต่อสุขภาพ..."
80000007-9 = "[s1] \"พอดีที่ชาเล่ต์มีงานเยอะมากน่ะ...\"\n[s2] \"มันช่วยไม่ได้นี่นา...\""
80000007-10 = "ช่วยไม่ได้นะคะ ถ้างั้นฉันจะไปเตรียมเครื่องดื่มคลายความเหนื่อยล้ามาให้คุณครูเองค่ะ"
80000007-11 = "ช่วยไม่ได้สินะคะ ถ้างั้นฉันจะไปเตรียมเครื่องดื่มคลายความเหนื่อยล้ามาให้คุณครูเองค่ะ"
80000007-12 = "คุณครูนั่งพักสายตาตรงนี้ก่อนนะคะ"
80000007-13 = "[s] \"ครูกินกาแฟมาแล้วล่ะ...\""
80000007-14 = "ไม่ต้องห่วงค่ะ!"
80000007-15 = "รับรองว่าเครื่องดื่มของฉันให้ผลดีกว่ากาแฟแน่นอนค่ะ!"
80000007-19 = "[ns] \"รู้สึกสังหรณ์ใจแปลกๆ นะ...\""
80000007-25 = "(ฮานาเอะกลับมาพร้อมแก้วที่ใส่ของเหลวสีดำลึกลับ)"
80000007-26 = "ขอโทษที่ทำให้รอนานนะคะ เครื่องดื่มคาเฟอีนเข้มข้นสูตรพิเศษของฮานาเอะค่ะ"
80000007-27 = "เครื่องดื่มชนิดนี้มีคาเฟอีนเข้มข้นมากกว่าปกติ 200 เท่า พอดื่มแล้วจะหายง่วงแน่นอนค่ะ!"
80000007-28 = "[s] \"แบบนั้นได้ลงโลงพอดีน่ะสิ!\""
80000007-29 = "เอ๋? คุณครูไม่ชอบเครื่องดื่มนี่เหรอคะ?"
80000007-30 = "แย่จัง... ตอนนี้ฉันมีแค่ผงกาแฟกับผงช็อกโกแลตแค่นั้นเองค่ะ..."
80000007-31 = "[s] \"งั้นขอแค่ช็อกโกแลตร้อนแล้วกัน...\""
80000007-32 = "แค่นั้นได้จริงๆ เหรอคะ? ช็อกโกแลตมีปริมาณคาเฟอีนน้อยกว่ากาแฟ อาจไม่ช่วยให้หายง่วงเท่าไร..."
80000007-33 = "แต่ถ้าคุณครูอยากดื่ม ฉันจะไปชงมาให้ค่ะ"
80000007-34 = "รอสักครู่นะคะ ฉันจะไปชงช็อกโกแลตร้อนมาให้ค่ะ!"
80000007-45 = "ขอโทษที่ทำให้รอนานนะคะ ช็อกโกแลตร้อนสูตรพิเศษของฮานาเอะค่ะ!"
80000007-46 = "ฉันใส่มาร์ชแมลโลว์กระต่ายน่ารักๆ ลงไปจนเต็มแก้วเลยละค่ะ!"
80000007-47 = "[s] ดื่มช็อกโกแลตร้อนของฮานาเอะ"
80000007-52 = "ฮิฮิ ดีใจจังที่คุณครูชอบ โชคดีจังที่ระหว่างทางมาที่ชาเล่ต์ ฉันแวะซื้อช็อกโกแลตร้อนเอาไว้ด้วยค่ะ"
80000007-53 = "แต่ว่า... ทำไมวันนี้ถึงมีร้านขายช็อกโกแลตริมทางเยอะแยะเลยนะ?"
80000007-54 = "คะ...? วันนี้เป็นวันวาเลนไทน์เหรอคะ?"
80000007-55 = "อ่ะฮ่ะฮ่ะ... เวลาผ่านไปเร็วจังเลยนะคะ ฉันลืมไปสนิทเลยค่ะ"
80000007-56 = "ถึงจะเป็นเรื่องบังเอิญ แต่ฉันก็ดีใจที่ได้ให้ช็อกโกแลตกับคุณครูนะคะ"
80000007-60 = "คุณครูช่วยดื่มช็อกโกแลตร้อนของฉัน... ให้หมดเลยได้ไหมคะ?"

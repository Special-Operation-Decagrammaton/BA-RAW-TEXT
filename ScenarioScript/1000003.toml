[translation]
1000003-1 = "เทคนิคการโน้มน้าวจิตใจ"
1000003-2 = "ห้องสมุดเลขที่ 17 เกเฮนน่า"
1000003-3 = "คุณครูคิดว่าทักษะที่สำคัญที่สุดในการเป็นผู้นำคืออะไรเหรอ?"
1000003-4 = "[s] \"เสน่ห์มัดใจพนักงานละมั้ง?\""
1000003-5 = "แน่นอน เรื่องนั้นมันเรื่องพื้นฐานอยู่แล้ว "
1000003-6 = "แต่ว่ามีเรื่องที่สำคัญกว่านั้นนะ"
1000003-7 = "[s1] \"ความน่ารักที่เป็นตัวแทนขององค์กร?\"\n[s2] \"ความเซ็กซี่ที่เป็นตัวแทนขององค์กร?\""
1000003-8 = "จะใช่ได้ยังไงกัน! เรื่องพวกนั้นมันจำเป็นที่ไหนกันล่ะ!"
1000003-9 = "จะใช่ได้ยังไงกัน! เรื่องพวกนั้นมันจำเป็นที่ไหนกันล่ะ!"
1000003-10 = "ฟังนะคุณครู ทักษะที่สำคัญที่สุดสำหรับผู้นำก็คือ..."
1000003-11 = "[s] \"คือ...?\""
1000003-12 = "เทคนิคการโน้มน้าวจิตใจ เปลี่ยนศัตรูมาเป็นมิตรยังไงล่ะ!"
1000003-13 = "[s] \"นั่นก็เรื่องพื้นฐานนี่นา\""
1000003-14 = "เรื่องพื้นฐานนี่แหละดีที่สุด แถมสำคัญที่สุดเลยด้วย!"
1000003-15 = "ยังไงก็เถอะ เทคนิคการโน้มน้าวใจคนอื่นน่ะเป็นทักษะที่สำคัญในการทำธุรกิจมากๆ"
1000003-16 = "ไม่ว่าธุรกิจแบบไหน เราก็ต้องบุกเข้าไปหาฝ่ายตรงข้ามก่อนเพื่อสร้างสถานการณ์ที่ได้เปรียบกับตัวเรา#nยังไงล่ะ"
1000003-17 = "ฉันเป็นประธาน แน่นอนว่าต้องมีความสามารถในการโน้มน้าวคนอื่นอยู่แล้ว!"
1000003-18 = "คนที่ต้องเรียนรู้เทคนิคการโน้มน้าวใจคนอื่นน่ะไม่ใช่ฉัน แต่เป็นคุณครูต่างหากล่ะ"
1000003-19 = "[s] \"ครูเหรอ?\""
1000003-20 = "คุณครูเป็นหุ้นส่วนธุรกิจของฉันนะ อย่างน้อยฉันก็ควรรู้ว่าคุณครูมีความสามารถแค่ไหนด้วยไม่ใช่รึไง?"
1000003-21 = "มาจำลองสถานการณ์กันดีกว่า"
1000003-22 = "คุณครูลองทำเป็นพนักงานที่จะมาสมัครเข้าหน่วยรับจ้างสารพัดของเราดูแล้วกัน"
1000003-23 = "ฉันจะเป็นคนสัมภาษณ์คุณครูเอง"
1000003-26 = "ในหนังสือเล่มนี้มีเขียนวิธีการโน้มน้าวใจคนไว้หลายวิธีเลย"
1000003-27 = "ลองอ่านแล้วเลือกวิธีมาโน้มน้าวใจฉันดูสิ"
1000003-28 = "ลองพยายามพูดให้ฉันรับคุณครูเข้าทำงานดูนะ"
1000003-31 = "(ในหนังสือที่อารุส่งมาให้ มีเทคนิคการโน้มน้าวใจเขียนเอาไว้มากมาย)"
1000003-32 = "(เทคนิคการโน้มน้าวจิตใจ วิธีที่หนึ่ง การใช้กฎการแลกเปลี่ยนที่เท่าเทียม)"
1000003-33 = "(การรับและการให้ ถ้าคุณต้องการอะไรจากอีกฝ่าย ควรหยิบยื่นบางอย่างให้อีกฝ่ายก่อน#nเพื่อทำให้เขารู้สึกเหมือนติดค้างคุณอยู่)"
1000003-34 = "[s] \"อารุ ตอนเย็นครูจะเลี้ยงราเม็ง ช่วยรับครูเข้าทำงานทีสิ\""
1000003-35 = "กะ...กินมื้อเย็นกับคุณครูเหรอ?!"
1000003-36 = "อื้อ! ดีล่ะ! ฉันรับเข้าทำงาน!"
1000003-37 = "ดะ...เดี๋ยวสิ! แค่เลี้ยงราเม็งให้คนสัมภาษณ์ จะมีใครเขารับเข้าทำงานกันล่ะ?!"
1000003-38 = "แบบนี้ไม่ได้ผลแน่! ไม่ผ่านๆ!"
1000003-40 = "ฉันไม่ตกหลุมพรางตื้นๆ แบบเมื่อกี้หรอกนะ ลองดูใหม่ซิ คุณครู!"
1000003-41 = "(เทคนิคการโน้มน้าวจิตใจ วิธีที่สอง การฟังเพื่อจับใจความสำคัญ)"
1000003-42 = "(หากต้องการโน้มน้าวใจคนอื่น การฟังสิ่งที่ผู้อื่นพูดก่อนแสดงความคิดเห็นเป็นเรื่องที่สำคัญมาก)"
1000003-43 = "[s] \"อารุเป็นหัวหน้าแบบนี้คงงานยุ่งมากใช่ไหม?\""
1000003-44 = "หืม? ก็นิดหน่อย ต้องคอยแก้ปัญหาร้องเรียนจากลูกค้าทุกครั้งก็วุ่นวายพอสมควร"
1000003-45 = "[s] \"หาคนช่วยดีไหม?\""
1000003-46 = "ถ้ามีก็ดีน่ะสิ"
1000003-47 = "[s] \"ถ้างั้นก็จ้างครูเป็นผู้ช่วยสิ\""
1000003-48 = "โอ้ เอางั้นเหรอ?"
1000003-49 = "เดี๋ยวสิ! คิดว่าฉันจะยอมจ้างง่ายๆ งั้นเหรอ?!"
1000003-50 = "อย่ามาดูถูกการสัมภาษณ์งานนะ! หัวหน้าอย่างฉันไม่หลงกลง่ายๆ หรอกนะ!"
1000003-51 = "[s] \"ครูช่วยงานเธอได้หลายอย่างเลยนะ อารุ\""
1000003-52 = "ไม่คิดว่าพูดตรงไปหน่อยรึไง?!"
1000003-53 = "อึ่ก... ถึงจะรู้อยู่แล้ว แต่ก็ดูเหมือนจะถูกทำให้คล้อยตามไปได้ง่ายๆ เลย!"
1000003-54 = "คุณครู... เป็นผู้เชี่ยวชาญเรื่องการโน้มน้าวใจสินะ!"
1000003-56 = "(หลังจากนั้นพอคุณครูลองใช้เทคนิคจากในหนังสือ อารุก็ถูกคุณครูโน้มน้าวใจได้สำเร็จทุกครั้ง)"
1000003-57 = "(คุณครูได้รับคำตอบรับจ้างงานจากอารุมากถึง 24 ครั้งภายในครึ่งวัน)"

[translation]
1000003-1 = "Power of Persuasion"
1000003-2 = "Gehenna Library 17"
1000003-3 = "What do you think is the most important skill an executive can have, Sensei?"
1000003-4 = "[s] \"Charisma to keep employees motivated?\""
1000003-5 = "Covering the basics is important. That's true."
1000003-6 = "But there's something even more important."
1000003-7 = "[s1] \"Making sure the organization has a cutesy side?\"\n[s2] \"Making sure the organization has sex appeal?\""
1000003-8 = "No, of course not! It doesn't need that!"
1000003-9 = "No, of course not! It doesn't need that!"
1000003-10 = "Listen up, Sensei. The skill a leader needs the most is..."
1000003-11 = "[s] \"...Is?\""
1000003-12 = "...the power of persuasion—the ability to turn any opponent into an ally!"
1000003-13 = "[s] \"Isn't that also one of the basics?\""
1000003-14 = "Simple is best! You can't do anything without mastering the fundamentals."
1000003-15 = "Anyway, you won't get anywhere in business if you can't persuade others."
1000003-16 = "The one who strikes first gains the advantage, no matter what realm of business it is."
1000003-17 = "And since I'm the boss around here, that means I already have a knack for persuading others."
1000003-18 = "You're the one here who needs to learn the power of persuasion, Sensei."
1000003-19 = "[s] \"Me?\""
1000003-20 = "We're business partners, remember? You need to expand your capabilities as a co-owner."
1000003-21 = "Let's try a hypothetical."
1000003-22 = "Say you were a candidate applying to join Problem Solver..."
1000003-23 = "...and I'll be the one conducting your interview."
1000003-26 = "This book covers all kinds of methods of persuasion."
1000003-27 = "Glean everything you can from it and use what you learn on me."
1000003-28 = "I want you to convince me to hire you at our agency."
1000003-31 = "Like Aru said, the book detailed multiple persuasion techniques."
1000003-32 = "The first method was the art of give and take."
1000003-33 = "\"It takes two to tango. If you want something from your opponent, give them something first so that they feel like they're in your debt.\""
1000003-34 = "[s] \"How about I take you out for ramen, Aru? We can discuss my contract then.\""
1000003-35 = "D-Dinner with Sensei?!"
1000003-36 = "Yup! That'll do! You're hired!"
1000003-37 = "...Wait, that's not right! You can't just bribe your way into a job with ramen!"
1000003-38 = "That's not going to work. Disqualified!"
1000003-40 = "Fool me once, shame on you. Let's see you try again, Sensei."
1000003-41 = "The second method of persuasion was the art of listening."
1000003-42 = "\"To earn someone's favor, first listen to what they have to say and then give your opinion.\""
1000003-43 = "[s] \"You're always busy, Aru. Bosses must have a lot of responsibilities.\""
1000003-44 = "I guess that's true. I resolve our clients' claims every week all by myself."
1000003-45 = "[s] \"Do you need someone to talk to?\""
1000003-46 = "It wouldn't hurt."
1000003-47 = "[s] \"Then, you should hire me.\""
1000003-48 = "Oh, really?"
1000003-49 = "...Wait, did you think I would hire you so easily?!"
1000003-50 = "Don't patronize me! It takes a lot more than that to keep me happy!"
1000003-51 = "[s] \"I think I could be very helpful to you, Aru.\""
1000003-52 = "D-Don't you think you're coming on a little strong?"
1000003-53 = "Ugh. Where is this convincing aura coming from? It's so strong!"
1000003-54 = "Sensei... You've mastered the art of persuasion!"
1000003-56 = "After that, Aru kept giving me mock interviews and tested me on the other methods in the book."
1000003-57 = "I was \"hired\" twenty four times in twelve hours."

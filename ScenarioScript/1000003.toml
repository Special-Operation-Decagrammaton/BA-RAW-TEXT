[translation]
1000003-1 = "#title;설득의 기술"
1000003-2 = "#place;게헨나 제17도서관"
1000003-3 = "3;아루;01;선생님, 한 조직을 이끄는 리더에게 가장 필요한 스킬이 뭐라고 생각해?\n#3;em;[반응]\n#3;a"
1000003-4 = "[s] \"직원들을 휘어잡는 카리스마?\""
1000003-5 = "3;아루;99;과연, 흔히들 말하는 일반론이네. 그것도 맞아.\n#3;greeting"
1000003-6 = "3;아루;07;하지만, 더 중요한 것이 있어.\n#3;em;[음표]"
1000003-7 = "[s1] \"조직의 마스코트가 될 수 있는 귀여움?\"\n[s2] \"조직의 마스코트가 될 수 있는 섹시함?\""
1000003-8 = "3;아루;04;완전히 틀렸잖아! 그런 건 전혀 필요 없다고!\n#3;stiff\n#3;em;[!]"
1000003-9 = "3;아루;04;완전히 틀렸잖아! 그런 건 전혀 필요 없다고!\n#3;stiff\n#3;em;[!]"
1000003-10 = "3;아루;00;알겠어. 선생님? 리더에게 무엇보다 필요한 스킬은 바로……"
1000003-11 = "[s] \"바로?\""
1000003-12 = "3;아루;08;상대를 내 편으로 끌어들일 수 있는 '설득의 기술'이야!\n#3;closeup"
1000003-13 = "[s] \"일반론이구나.\""
1000003-14 = "3;아루;11;일반론이 좋은 거야! 제일 중요하다고!\n#3;jump"
1000003-15 = "3;아루;02;어쨌거나 상대를 설득할 수 있는 기술은 사업에 있어 무척이나 중요해."
1000003-16 = "3;아루;01;무슨 사업이든 우선 상대를 공략해야 내게 유리한 상황을 만들 수 있으니까."
1000003-17 = "3;아루;00;물론 나는 사장님이니까? 남을 설득하는 데엔 통달 했어.\n#3;em;[음표]"
1000003-18 = "3;아루;03;그러니 오늘 설득의 기술을 공부하는 건 내가 아니라 선생님이야.\n#3;em;[반짝]\n#3;greeting"
1000003-19 = "[s] \"나?\""
1000003-20 = "3;아루;02;선생님은 내 동업자니까. 사장으로서 얼마나 능력이 있는지 확인해 둬야지 않겠어?"
1000003-21 = "3;아루;99;상황 설정은 이래."
1000003-22 = "3;아루;01;선생님은 우리 흥신소에 입사하고 싶어서 찾아온 새내기 취업준비생이야."
1000003-23 = "3;아루;03;나는 지금 선생님의 면접을 보는 면접관.\n#3;em;[반응]"
1000003-24 = "3;아루;03\n#3;d\n#wait;1000"
1000003-25 = "3;아루;03\n#3;closeup\n#wait;1000\n#3;a"
1000003-26 = "3;아루;03;여기 이 책엔 설득하기 위한 여러가지 방법이 쓰여 있으니까.\n#3;closeup"
1000003-27 = "3;아루;03;이걸 참고로 해서, 어디 한 번 날 설득해봐. \n#3;closeup"
1000003-28 = "3;아루;08;설득해서 우리 회사에 취직하는 거야.\n#3;closeup\n#3;em;[반짝]"
1000003-29 = "3;아루;08\n#3;closeup\n#3;d\n#wait;1000"
1000003-30 = "#all;hide"
1000003-31 = "#na;(아루에게서 받은 책엔 여러가지 설득에 관한 기술이 쓰여 있었다.)"
1000003-32 = "#na;(설득의 기술 첫 번째. 상호법칙을 이용한 설득의 기술.)"
1000003-33 = "#na;(Give and take. 상대에게 원하는 걸 얻고 싶으면, 이쪽에서 먼저 서비스를 제공해 미안하게 만들어라.)"
1000003-34 = "[s] \"아루, 오늘 저녁으로 라멘 사줄 테니까. 날 입사시켜줘.\""
1000003-35 = "3;아루;10;서, 선생님과 저녁 식사를?!\n#3;shake\n#3;em;[?!]\n#3;a"
1000003-36 = "3;아루;08;응! 좋아! 입사 시켜줄게!\n#3;greeting\n#3;em;[반짝]"
1000003-37 = "3;아루;11;……가 아니라! 면접관한테 라멘을 사준다고 해서 누가 입사 시켜줄 거라고 생각해?!\n#3;hophop"
1000003-38 = "3;아루;11;지금 건 무효! 무효니까!"
1000003-39 = "#all;hide"
1000003-40 = "3;아루;05;방금 같은 얕은수에 넘어가지 않을 거야. 다시 날 설득해봐. 선생님.\n#3;em;[빠직]\n#3;a"
1000003-41 = "#na;(설득의 기술 두 번째. 경청의 중요성을 활용한 설득의 기술)"
1000003-42 = "#na;(상대를 설득하려면 이야기를 잘 들어주며, 내 의견을 이야기하는 쪽이 좋다.)"
1000003-43 = "[s] \"아루는 사장으로서 업무가 바쁘지?\""
1000003-44 = "3;아루;07;응? 그런 편이지. 매번 의뢰주의 클레임을 해결하는 것만 해도 큰일이니까.\n#3;em;[?]"
1000003-45 = "[s] \"도와줄 일손이 필요하겠네?\""
1000003-46 = "3;아루;10;아무래도 그렇지?\n#3;stiff"
1000003-47 = "[s] \"그럼 나를 고용해줘.\""
1000003-48 = "3;아루;08;아, 그럴까?\n#3;em;[반짝]"
1000003-49 = "3;아루;04;……가 아니라! 너무 쉽게 입사하려는 거 아냐?!\n#3;shake\n#3;em;[?!]"
1000003-50 = "3;아루;05;입사를 너무 쉽게 보지 마! 난 철벽이니까! 그렇게 쉽게 넘어가지 않는 리더야!\n#3;hophop"
1000003-51 = "[s] \"나, 아루에게 큰 도움이 될 거라고 생각하는데.\""
1000003-52 = "3;아루;11;여, 여기서 돌직구를?!\n#3;em;[?!]\n#3;shake"
1000003-53 = "3;아루;06;크읏, 다 알고 있는데도 설득당해버릴 것만 같아!"
1000003-54 = "3;아루;10;선생님……. 설득의 달인이었구나!\n#3;em;…"
1000003-55 = "#all;hide"
1000003-56 = "#na;(그 뒤로도 책에 나온 기술을 시험해볼 때마다 아루는 내 입사를 허가해주었다.)"
1000003-57 = "#na;(반나절 만에 회사에 24번이나 취직했다.)"

[translation]
1000003-1 = "說服的技巧"
1000003-2 = "格黑娜第17圖書館"
1000003-3 = "老師，你認為一個率領組織前進的領袖最不可或缺的能力是什麼？"
1000003-4 = "[s] 「擁獲職員芳心的領袖氣質？」"
1000003-5 = "原來如此，是個相當普遍的見解。那倒也沒錯。"
1000003-6 = "不過，還有更重要的哦？"
1000003-7 = "[s1] 「能成為組織吉祥物的可愛？」\n[s2] 「能成為組織吉祥物的性感？」"
1000003-8 = "完全不是！絕對不需要那種東西！"
1000003-9 = "完全不是！絕對不需要那種東西！"
1000003-10 = "聽好了，老師？一個領袖最需要的能力就是……"
1000003-11 = "[s] 「就是？」"
1000003-12 = "那就是能夠拉攏對方的「說服的技巧」哦！"
1000003-13 = "[s] 「是一般論呢。」"
1000003-14 = "普通的見解就好了！這是最重要的！"
1000003-15 = "……總而言之，能夠說服對方的技巧對商業來說，是非常重要的。"
1000003-16 = "無論是什麼事業都必須先攻略對方，才能藉此打造對自己有利的局勢。"
1000003-17 = "當然因為我是社長？所以我很擅長說服別人？"
1000003-18 = "所以，今天要學習說服技巧的人不是我，而是老師哦。"
1000003-19 = "[s] 「我？」"
1000003-20 = "因為老師是我的合夥人，我身為社長不是應該確認一下你的能力嗎？"
1000003-21 = "情境設定如下。"
1000003-22 = "老師，你現在是來我們便利屋面試的畢業新生。"
1000003-23 = "我現在是幫老師面試的面試官。"
1000003-26 = "來，這本書裡面寫了許多說服他人的技巧。"
1000003-27 = "你就拿這本書當作參考，然後試著說服我看看吧。 "
1000003-28 = "你要說服我，讓我想讓你進入我們便利屋。"
1000003-31 = "（亞瑠給的書上寫著各種說服相關技巧）"
1000003-32 = "（說服技巧第一條，利用互換法則的說服技巧）"
1000003-33 = "（Give and take。如果對對方有所需求，就要先服務對方，讓對方覺得不好意思）"
1000003-34 = "[s] 「亞瑠，今天晚餐我請妳吃拉麵，雇用我吧。」"
1000003-35 = "和，和老師一起吃晚餐！？"
1000003-36 = "嗯！好啊！就那麼說定了！"
1000003-37 = "……不對！你真的覺得有哪個面試官會因為聽到你說要請吃拉麵就錄取你嗎！？"
1000003-38 = "剛才的無效！無效！"
1000003-40 = "像剛才一樣的小伎倆是行不通的。來，再試著說服我一遍，老師。"
1000003-41 = "（說服技巧第二條，活用傾聽的重要性進行說服的技巧）"
1000003-42 = "（想要說服對方的話，最好先好好傾聽對方的話再表達自己的意見）"
1000003-43 = "[s] 「亞瑠作為社長工作很忙吧？」"
1000003-44 = "嗯？是啊，光是每次要解決客戶的客訴就很傷腦筋了。"
1000003-45 = "[s]「應該需要人手幫忙吧？」"
1000003-46 = "嘛，確實是這樣？"
1000003-47 = "[s] 「那雇用我如何？」"
1000003-48 = "是啊，就那麼辦吧？"
1000003-49 = "……不對！等等，怎麼感覺你想輕鬆入社啊！？"
1000003-50 = "不要小看面試了！我可是很嚴格的！不是會輕易被說服的領袖！"
1000003-51 = "[s] 「我想，我能幫上亞瑠很大的忙。」"
1000003-52 = "到，到這個地步來個直球！？"
1000003-53 = "唔唔，就算知道也感覺要被說服了……！"
1000003-54 = "原來老師是……說服的達人呢！"
1000003-56 = "（在那之後每次測試書上的技術時，亞瑠都會允許我進入公司）"
1000003-57 = "（半天之內便就職了24次）"

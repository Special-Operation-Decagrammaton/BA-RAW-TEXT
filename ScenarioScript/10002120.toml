[translation]
10002120-1 = "第12話;煙火"
10002120-2 = "（幾經波折後，總算是完成了清單上所寫的5個任務，#n　現在正悠閒地仰望著被夕陽染紅的天空）"
10002120-3 = "（最後剩下的「放煙火」任務必須等太陽下山後才能進行，#n　因此稍微獲得了一些閒暇時光）"
10002120-5 = "已經這麼晚了啊……"
10002120-6 = "不過日步美同學和梓同學去得真久呢……"
10002120-7 = "[s]「是為了買煙火而跑到比較遠的地方去了嗎？」"
10002120-8 = "或許是吧……"
10002120-9 = "……嘰嘻！嘰嘻嘻！科嘿嘿嘿！！"
10002120-10 = "前輩也很期待嗎？"
10002120-11 = "把買煙火的工作都交給他們雖然有點過意不去……#n不過也多虧如此才能稍微悠閒一下，必須感謝他們兩位呢。"
10002120-12 = "等一切結束後，回去向蓮實前輩報告，並拿照片給他看……"
10002120-13 = "看來能順利完成呢，這都多虧了老師。"
10002120-14 = "[s1]「麻白覺得開心嗎？」\n[s2]「有沒有其他想做的事？」"
10002120-15 = "咦？這個嘛，我本來就只是順勢跟過來而已……"
10002120-16 = "咦？這個嘛，我本來就只是順勢跟過來而已……"
10002120-17 = "然而卻被氣氛所感染，連我自己也玩得相當投入……"
10002120-18 = "唔……我應該要無時無刻懷抱著正義之心的才對，似乎有點玩過頭了……"
10002120-19 = "必須反省一下才行呢。"
10002120-20 = "話說回來，日步美同學他們去得有點久，我去找找他們好了。"
10002120-26 = "[ns3]「弦生感覺如何？」\n[ns4]「開心嗎？」"
10002120-27 = "……！！"
10002120-28 = "……！！"
10002120-29 = "我，我嗎！？#n那，那個，我……！"
10002120-30 = "我……其實……"
10002120-31 = "其，其實……我也不是很清楚……這樣是對的嗎……"
10002120-32 = "感覺……跟想像中有點不太一樣……"
10002120-33 = "又，又感覺這樣好像……也沒有錯……"
10002120-34 = "[s5]「只要弦生覺得開心就是對的哦。」\n[s6]「比起正不正確，弦生的感受才是最重要的。」"
10002120-35 = "原，原來如此……雖然還沒完全搞清楚……"
10002120-36 = "原，原來如此……雖然還沒完全搞清楚……"
10002120-37 = "跟在書裡看到的大海雖然有點不同……不過能和大家一起玩……"
10002120-38 = "我覺得……覺得很……"
10002120-39 = "……那個……"
10002120-40 = "……很……"
10002120-42 = "我們回來了～～！"
10002120-43 = "……！？"
10002120-49 = "不好意思讓你們久等了。#n總算是找到了一間商店，所以就先盡可能買來了……！"
10002120-50 = "雖然範圍和火力都很微弱，這些就是要求的爆裂物。"
10002120-51 = "老實說我認為這些東西的火力實在對不起它們的價格……"
10002120-52 = "梓醬……買煙火不需要在意火力哦……"
10002120-53 = "保險起見，我除了煙火之外還買了一些可用的炸彈。#n要是有什麼萬一就用這些吧。"
10002120-54 = "可以的話真希望那個「萬一」的情況不要發生……啊嗚嗚……"
10002120-56 = "……嗯？"
10002120-57 = "啊，不好意思，剛才是不是打斷你們說話了……？"
10002120-58 = "…………"
10002120-60 = "……嘻，嘻嘻！咯嘻嘻嘻……！"
10002120-62 = "嗚嗚，對不起！雖然不知道為什麼但真的很對不起……！"
10002120-63 = "[s]「……」"
10002120-65 = "（之後時間一晃眼過去，太陽已完全落下）"
10002120-68 = "（太陽消失於水平線的彼方後，周圍很快陷入了黑暗）"
10002120-69 = "（附近的店鋪陸續打烊，海邊只剩下海浪拍打的聲音）"
10002120-70 = "真安靜呢……沒看到其他人……只剩下我們了嗎？"
10002120-71 = "不，那個地方還有太妹在。#n雖然不知道他們在做些什麼……"
10002120-72 = "這樣啊。#n雖然有點距離……為了以防萬一，要不要先發制人？"
10002120-73 = "應，應該沒必要主動引起糾紛吧……！？#n況且也還沒發生什麼事……！"
10002120-74 = "雖然這麼說也沒錯……"
10002120-75 = "不過對方已經來犯很多次了。#n不覺得他們這次也會如法炮製嗎？"
10002120-76 = "[s7]「確實有這種可能性沒錯，但並非如此的可能性也是有的。」\n[s8]「說不定他們也只是想放煙火而已。」"
10002120-78 = "放煙火是嗎？那些太妹……？"
10002120-80 = "放煙火是嗎？那些太妹……？"
10002120-81 = "確實無法完全否定。#n剛才為了買煙火而到經手爆裂物的店裡時，太妹們也在那裡。"
10002120-82 = "從當時的狀況來看，如果沒有其他變數的話，他們也買了煙火的可能性很高。"
10002120-83 = "當然凡事都有萬一，以把風險降到最低的觀點來看，我倒是贊成……"
10002120-84 = "我，我覺得沒必要做到那種地步……"
10002120-85 = "……就知道日步美會這麼說。#n總之我會先保持警戒。"
10002120-86 = "我明白了。那麼我也不會多說什麼。"
10002120-96 = "……是煙火……"
10002120-97 = "是煙火呢。"
10002120-98 = "從太妹們所在的方向……真的是煙火啊。"
10002120-101 = "……一閃一閃……"
10002120-105 = "……！？！？"
10002120-112 = "（……砰！！！）"
10002120-113 = "不行，這點程度還不夠！#n梓同學，我們也發射大到不會輸對方的煙火吧！"
10002120-114 = "那當然，不能輸給他們。"
10002120-115 = "咦咦咦咦！？#n這，這是在爭什麼……！？"
10002120-116 = "為什麼又開始比賽了！？"
10002120-120 = "總，總覺得對方好像也有意在對抗……！？"
10002120-121 = "哈嗚嗚嗚！！老，老師～～！！"
10002120-122 = "[s]「……」"
10002120-124 = "想分個高下嗎？"
10002120-125 = "奉陪到底。"
10002120-126 = "這，這樣好不容易買來的煙火一下子就會……！！"
10002120-127 = "（咚哐────！！！！）"
10002120-128 = "……！？"
10002120-129 = "……！！"
10002120-130 = "那個是……"
10002120-131 = "很可能是凝固汽油彈。"
10002120-132 = "凝固汽油彈的確擁有遠超普通煙火的火力。#n把它當成煙火，挺有想法的嘛……？"
10002120-133 = "我覺得那已經不是煙火了吧……"
10002120-134 = "哼，被擺了一道。#n狙擊手，我們有凝固汽油彈嗎？"
10002120-135 = "沒有……"
10002120-137 = "啊，那邊又發射了什麼……！"
10002120-139 = "……嗯？"
10002120-140 = "好像是……未爆彈？#n都過了引爆的時間，卻還沒爆開，繼續飛著……"
10002120-141 = "……啊。"
10002120-142 = "咦咦……？"
10002120-143 = "……啊。"
10002120-144 = "是這麼回事啊。"
10002120-148 = "（咚哐────！！！！）"
10002120-149 = "……是砲擊嗎？"

10002120-129 = "...!!"
10002120-130 = "อ่า..."
10002120-131 = "นั่นมันนาปาล์มนี่คะ"
10002120-132 = "แหงล่ะ นาปาล์มมันมีอานุภาพและสว่างมากกว่าดอกไม้ไฟทั่วไปที่ขายในท้องตลาดอยู่แล้ว#nพวกนั้นเอามาใช้ทำเป็นดอกไม้ไฟงั้นเหรอ...?"
10002120-133 = "ตอนนี้มันไม่ใช่ดอกไม้ไฟแล้วล่ะค่ะ..."
10002120-134 = "ชิส์ โดนนำไปแล้วสินะ พลซุ่มยิง แล้วนาปาล์มของฝั่งเราล่ะ?"
10002120-135 = "ไม่มีค่ะ..."
10002120-137 = "อ๊ะ พวกนั้นยิงระเบิดนาปาล์มอีกแล้ว...!"
10002120-139 = "หืม...?"
10002120-140 = "นั่นมัน...ระเบิดแน่รึเปล่า? ทั้งที่มันควรจะระเบิดตั้งนานแล้ว แต่กลับยังไม่ระเบิดเลย..."
10002120-141 = "เอ่อ..."
10002120-142 = "โอ๊ะ...?"
10002120-143 = "อ่า..."

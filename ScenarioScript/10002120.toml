[translation]
10002120-1 = "ตอนที่ 12;การละเล่นดอกไม้ไฟ"
10002120-2 = "(ถึงจะเกิดเรื่องวุ่นวายขึ้นก็ตาม แต่ยังไงเราก็ทำสำเร็จไปห้าภารกิจแล้ว)"
10002120-3 = "ตอนนี้ภารกิจสุดท้ายที่เหลือ \"การละเล่นดอกไม้ไฟ\" เราจะทำได้หลังจากพระอาทิตย์ตกดินแล้ว#nเพราะงั้นตอนนี้เลยมีเวลาเหลืออยู่นิดหน่อย"
10002120-5 = "เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย"
10002120-6 = "ภารกิจการละเล่นดอกไม้ไฟที่เหลืออยู่จะต้องรอพระอาทิตย์ตกดินก่อนถึงจะทำได้#nแสดงว่าตอนนี้เราก็พอมีเวลาเหลือสินะคะ"
10002120-7 = "[s] \"เหมือนว่าฮิฟุมิกับอาซึสะจะไปซื้อดอกไม้ไฟกันนะ\""
10002120-8 = "ค่ะ ไม่รู้ทำไมพวกเธอถึงไปกันเอง ตอนแรกฉันกับรุ่นพี่ซึรุกิบอกว่าจะไปซื้อให้แท้ๆ..."
10002120-9 = "....คิกคิก... คิกๆๆ! ก๊ากกก!!"
10002120-10 = "อืม รุ่นพี่ก็ตั้งตารอยู่สินะคะ? ถึงฉันจะไม่ค่อยเข้าใจเท่าไหร่ก็เถอะค่ะ"
10002120-11 = "แต่เพราะพวกเธอไปซื้อแทน พวกเราเลยได้พักกันแบบนี้ คงต้องขอบคุณทั้งสองคนนั้นแล้วล่ะ"
10002120-12 = "พอทำภารกิจดอกไม้ไฟเสร็จแล้วก็กลับไปรายงานรุ่นพี่ฮาสุมิ แล้วก็เอารูปส่งไปเป็นหลักฐาน..."
10002120-13 = "โชคดีที่เหมือนจะทำภารกิจสำเร็จไปได้ด้วยดีนะคะ ต้องขอบคุณคุณครูที่ช่วยค่ะ"
10002120-14 = "[s1] \"มาชิโระไม่สนุกเหรอ?\"\n[s2] \"แค่ทำ \"ภารกิจ\" เท่านั้นก็พอแล้วเหรอ?\""
10002120-15 = "คะ? ถึงฉันจะเป็นแค่ตัวแถมของทริปนี้..."
10002120-16 = "คะ? ถึงฉันจะเป็นแค่ตัวแถมของทริปนี้..."
10002120-17 = "แต่ก็รู้สึกว่าได้ร่วมสนุกกับบรรยากาศของที่นี่ไปกับทุกๆ คน..."
10002120-18 = "อืม... ที่จริงฉันไม่ควรลืมความมุ่งมั่นเรื่องความยุติธรรม แต่ว่าตอนนี้รู้สึกเหมือนมันจะเลือนรางไป#nอยู่บ้างนิดหน่อย..."
10002120-19 = "คงจะต้องทำโทษตัวเองให้สำนึกผิดแล้วละค่ะ"
10002120-20 = "จะว่าไปคุณฮิฟุมิกลับมาช้าจังเลยนะคะ ฉันจะออกไปรับเธอค่ะ"
10002120-26 = "[ns3] \"ซึรุกิล่ะ เป็นยังไงบ้าง?\"\n[ns4] \"สนุกรึเปล่า?\""
10002120-27 = "...!! "
10002120-28 = "...!! "
10002120-29 = "ฉะ... ฉันน่ะเหรอคะ? คะ... คือฉัน... ฉัน...!"
10002120-30 = "ฉัน... คือ..."
10002120-31 = "ทะ...ที่จริงแล้ว... ฉะ... ฉันไม่ค่อยรู้หรอกค่ะ... วะ...ว่ามันถูกรึเปล่า..."
10002120-32 = "ฉะ... ฉันคิดว่า... มะ...มันแตกต่างจากที่คะ... คิดเอาไว้นิดหน่อย... "
10002120-33 = "ตะ...แต่ก็มีเหมือน...ที่คิดไว้อยู่บ้าง..."
10002120-34 = "[s5] \"ครูคิดว่าถูกหรือผิดมันไม่ใช่ปัญหาหรอกนะ\"\n[s6] \"ความรู้สึกของซึรุกิต่างหากล่ะที่สำคัญ\""
10002120-35 = "งะ...งั้นเหรอคะ... ถะ...ถึงจะไม่ค่อยเข้าใจเท่าไร... แต่ก็คงเป็นแบบที่คุณครูบอก"
10002120-36 = "งะ...งั้นเหรอคะ... ถะ...ถึงจะไม่ค่อยเข้าใจเท่าไร... แต่ก็คงเป็นแบบที่คุณครูบอก"
10002120-37 = "ตะ...แต่ว่ายังไง มะ...มันก็ต่างกับทะเลที่เคยอ่านเจอในหนังสือ...อยู่บ้าง...ค่ะ"
10002120-38 = "คือ... สะ...สิ่งที่ฉัน..."
10002120-39 = "...เอ่อ..."
10002120-40 = "...ดี..."
10002120-42 = "กลับมาแล้วค่า~~!"
10002120-43 = "...!?"
10002120-49 = "กลับมาแล้วค่ะทุกคน! มีร้านค้าอยู่ไม่ไกลจากที่นี่ร้านหนึ่งค่ะ เราเลยซื้อมาเท่าที่ซื้อมาได้ก่อนค่ะ..."
10002120-50 = "ถึงจะไม่ใช่ดอกไม้ไฟที่ยิงไประยะไกล แต่อย่างน้อยก็เป็นดอกไม้ไฟล่ะนะ"
10002120-51 = "โดยส่วนตัวแล้วฉันไม่เข้าใจเลยว่าทำไมเราถึงจะต้องเสียเงินแพงๆ ให้กับของที่ไม่มีประโยชน์#nในการต่อสู้..."
10002120-52 = "อาซึสะจัง... เราเล่นดอกไม้ไฟเพื่อความสนุกนะ... ถ้ามันมีผลสำหรับการต่อสู้ก็แย่น่ะสิคะ..."
10002120-53 = "เพราะงั้นฉันเลยเตรียมระเบิดทำมือเอามาเผื่อไว้ด้วยไงล่ะ เผื่อเอาไว้ในกรณีจำเป็น"
10002120-54 = "ฉันเพิ่งบอกไปเองนะคะว่าเราไม่ได้เอาไว้ต่อสู้... ฮือ..."
10002120-56 = "หืม...?"
10002120-57 = "ขอโทษนะคะ เมื่อก่อนหน้านี้กำลังคุยอะไรกันอยู่รึเปล่าคะ?"
10002120-58 = "...เอ่อ..."
10002120-60 = "....คิกคิก... ฮี่ๆๆ...!?"
10002120-62 = "ฮื่ออ ขะ...ขอโทษค่ะ ฉันขอโทษจริงๆ ค่ะ ถึงจะไม่รู้ว่าทำไม แต่ถ้าฉันไปขัดจังหวะอะไรเข้าล่ะก็#nฉันต้องขอโทษด้วยนะคะ...!"
10002120-63 = "[s] \"...\""
10002120-65 = "หลังจากช่วงเวลาผ่านไปเรื่อยๆ พระอาทิตย์ก็ค่อยๆ ลาลับขอบฟ้า"
10002120-68 = "หลังจากพระอาทิตย์ลาลับขอบฟ้าไปแล้ว ท้องฟ้ายามค่ำคืนก็มาเยือน ทำให้บริเวณรอบๆ มืดสนิท"
10002120-69 = "ร้านค้าบริเวณโดยรอบต่างทะยอยปิดลง และชายหาดยามค่ำคืนก็เหลือเพียงเสียงเกลียวคลื่น#nกระทบกับชายหาดเท่านั้น "
10002120-70 = "เงียบจังเลยนะคะ... เหมือนจะลมแรงนิดหน่อยด้วย... ตอนนี้เหลือแค่พวกเราแล้วเหรอคะ?"
10002120-71 = "เปล่าหรอก ระหว่างทางที่มาฉันลองตรวจสอบแล้วล่ะ ที่หมู่บ้านอีกฝั่งหนึ่งยังมีพวกแยงกี้น่ารำคาญ#nพวกนั้นอยู่ ถึงไม่รู้ว่าพวกนั้นคิดจะทำอะไรก็เถอะนะ..."
10002120-72 = "งั้นเหรอคะ ตรงนั้นไกลมากเลยนะคะ... แต่เราควรจะเตรียมรับมือการซุ่มโจมตีเอาไว้ก่อนไหมคะ?"
10002120-73 = "ยะ...อย่าคิดจะหาทำกันอีกเลยนะคะ...! ตอนนี้ยังไม่มีอะไรเกิดขึ้นสักหน่อย..."
10002120-74 = "อืม เป็นปัญหาที่ซับซ้อนจริงๆ ค่ะ"
10002120-75 = "แต่ว่าอีกฝ่ายคือพวกแยงกี้สาวนะคะ ไม่คิดเหรอคะว่าพวกนั้นจะคิดวางแผนอะไรอยู่อีก?"
10002120-76 = "[s7] \"อาจจะไม่เป็นแบบนั้นก็ได้นะ\"\n[s8] \"พวกนั้นอาจจะกำลังรอเล่นดอกไม้ไฟเหมือนเราก็ได้นะ\""
10002120-78 = "พวกแยงกี้สาวน่ะเหรอคะจะเล่นดอกไม้ไฟ...?"
10002120-80 = "พวกแยงกี้สาวน่ะเหรอคะจะเล่นดอกไม้ไฟ...?"
10002120-81 = "มันก็ไม่ใช่เรื่องที่เป็นไปไม่ได้หรอกนะ ตอนที่ไปที่ร้านขายดอกไม้ไฟก็เจอยัยพวกนั้นเหมือนกัน"
10002120-82 = "จากที่ฉันคาดการณ์ หากไม่มีอะไรผิดพลาด มีโอกาสที่ยัยพวกนั้นจะซื้อดอกไม้ไฟไปเหมือนกัน"
10002120-83 = "แต่ถ้าเพื่อที่จะลดโอกาสที่พวกนั้นคิดจะบุกโจมตีเราล่ะก็... ฉันก็เห็นด้วยนะ"
10002120-84 = "ตะ...แต่ฉันคิดว่าเราไม่ต้องทำถึงขนาดนั้นก็ได้นะคะ..."
10002120-85 = "ฉันคิดไว้แล้วว่าเธอจะต้องพูดแบบนั้น เอาเป็นว่าพวกเราจะจับตาดูไว้ก่อน"
10002120-86 = "อืม เข้าใจแล้วค่ะ ถ้าทุกคนมีความเห็นแบบนั้น ฉันก็ไม่ติดอะไรค่ะ"
10002120-96 = "ดอกไม้ไฟนี่นา..."
10002120-97 = "เล่นดอกไม้ไฟกันสินะคะ"
10002120-98 = "มาจากทางพวกแยงกี้น่ะ พวกนั้นคิดจะเล่นดอกไม้ไฟกันสินะ"
10002120-101 = "ระยิบระยับ..."
10002120-105 = "...!?!?"
10002120-112 = "(ตู้มมมมมม!!)"
10002120-113 = "ยังหรอกค่ะ แค่นี้ยังไม่พอหรอกค่ะ!#nคุณอาซึสะ! เราจะต้องจุดดอกไม้ไฟที่ใหญ่กว่าของยัยพวกนั้นให้ได้ค่ะ!"
10002120-114 = "ได้อยู่แล้ว ไม่แพ้หรอก ฝ่ายเรามีอาวุธที่แรงกว่าอยู่แล้วนี่"
10002120-115 = "ไม่น๊าาา!! ทำไมถึงเป็นแบบนี้ล่ะ..."
10002120-116 = "ทำไมถึงต้องไปแข่งจุดดอกไม้ไฟกับพวกนั้นด้วยล่ะคะะะะ!?"
10002120-120 = "มะ... เหมือนทางฝั่งนั้นก็ระดมจุดดอกไม้ไฟกันใหญ่เลย...!!"
10002120-121 = "ฮือออออ!! คะ...คุณครู~~~!!"
10002120-122 = "[s] “...”"
10002120-124 = "คิดจะแข่งเรื่องยุทโธปกรณ์เหรอ ไม่เลวเลยนี่"
10002120-125 = "ฉันจะแสดงให้เห็นเองว่าสงครามเบ็ดเสร็จเป็นยังไง"
10002120-126 = "ถะ...ถ้าทำแบบนี้เดี๋ยวดอกไม้ไฟที่อุตส่าห์ซื้อมาก็หมดหรอก...!!"

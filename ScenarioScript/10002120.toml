[translation]
10002120-1 = "Episode 12;Fireworks"
10002120-2 = "In the end, we were able to finish the five objectives on the list."
10002120-3 = "The final objective couldn't be completed until dark, so we had some time to spare."
10002120-5 = "Today really flew by, didn't it?"
10002120-6 = "We should have some time until it gets dark, but I wonder where the others are."
10002120-7 = "[s] \"I think Hifumi and Azusa went out to buy fireworks.\""
10002120-8 = "Yes, but I'm wondering what's taking so long. Originally, I had volunteered to go with Tsurugi."
10002120-9 = "Kekeke! Heehee!"
10002120-10 = "I think she was looking forward to it. "
10002120-11 = "Well, I hope they're all right, but this does give us some time to do whatever we want."
10002120-12 = "And once we're done with shooting fireworks, I'll file the report to Hasumi and send her the photos."
10002120-13 = "That'll be the end of their missions, and it's all thanks to your help, Sensei."
10002120-14 = "[s1] \"Weren't you having fun yourself, Mashiro?\"\n[s2] \"Are you sure? You can have more fun if you want.\""
10002120-15 = "I was only allowed to come on this trip by happenstance."
10002120-16 = "I was only allowed to come on this trip by happenstance."
10002120-17 = "But I admit I did get caught up in the mood and enjoyed myself."
10002120-18 = "I'm supposed to be ready to protect justice at a moment's notice, but I think I let my guard down a few times today."
10002120-19 = "So I guess I came away knowing I still have room for improvement."
10002120-20 = "Anyway, I'm going to look for Hifumi and Azusa to make sure they're okay."
10002120-26 = "[ns3] \"What about you, Tsurugi?\"\n[ns4] \"So, did you have fun today?\""
10002120-27 = "...! "
10002120-28 = "...! "
10002120-29 = "M-Me? I, um..."
10002120-30 = "Uh..."
10002120-31 = "I honestly don't know. Was that what fun feels like?"
10002120-32 = "I guess it was different than what I expected... "
10002120-33 = "...but part of me also feels like it was just right."
10002120-34 = "[s5] \"I don't think it's a matter of being right or wrong.\"\n[s6] \"Whatever you felt is valid. It's your experience.\""
10002120-35 = "I guess you're right."
10002120-36 = "I guess you're right."
10002120-37 = "The beach was different than what I've read about in books, but everyone did seem to be having fun."
10002120-38 = "But what I think I like the most was..."
10002120-39 = "Um..."
10002120-40 = "That you—"
10002120-42 = "We're baaack!"
10002120-43 = "...?!"
10002120-49 = "Sorry for taking so long. It took a while to find a firework stand nearby."
10002120-50 = "They don't have much range or firepower, but they are technically fireworks."
10002120-51 = "Personally, I don't understand why they charge so much money for something that would never be effective in battle."
10002120-52 = "Azusa, they're for having fun, not for hurting people."
10002120-53 = "Which is why I prepared some homemade explosives as a precaution. Know that we have alternatives if we need them."
10002120-54 = "I'm telling you we don't need real explosives!"
10002120-56 = "Uh...?"
10002120-57 = "Is everything okay? Did we interrupt something?"
10002120-58 = "Um..."
10002120-60 = "Kekeke! Heehee!"
10002120-62 = "Ahhh! I'm sorry, I'm sorry, I'm sorry, I'm sorry!"
10002120-63 = "[s] \"...\""
10002120-65 = "Soon after, the sun set and it was finally dark."
10002120-68 = "The night sky and stars came out as the sun disappeared below the horizon."
10002120-69 = "The local shops were closing and the only sounds left on the beach were those of the crashing waves."
10002120-70 = "It's so quiet now. Did everyone else go home?"
10002120-71 = "No, the beach thugs are still in the distance. I couldn't tell you what they're up to now, though."
10002120-72 = "Are they? That's pretty far away, but should we conduct a preemptive strike before they ambush us again?"
10002120-73 = "P-Please don't pick another fight. Let's just hope they learned their lesson."
10002120-74 = "If you say so, but I think we're risking it."
10002120-75 = "They've interrupted every mission we've completed today. What's going to stop them from doing it again?"
10002120-76 = "[s7] \"Who knows? If it happens, it happens.\"\n[s8] \"Maybe they're waiting to see the fireworks.\""
10002120-78 = "Really? You think they're just going to sit back?"
10002120-80 = "Really? You think they're just going to sit back?"
10002120-81 = "I can't deny the possibility. We bumped into them as we were buying fireworks earlier."
10002120-82 = "However, if I were to guess, they must have bought some fireworks of their own."
10002120-83 = "Then again, they may have been stocking up on explosives to use against us. I will not object to preemptively attacking them."
10002120-84 = "I still don't think we have to go that far."
10002120-85 = "I thought you might say that. In that case, we'll simply keep our guards up."
10002120-86 = "Got it. I'm okay with that plan if you are."
10002120-96 = "Fireworks..."
10002120-97 = "There's no mistaking that."
10002120-98 = "They're coming from the direction of the beach thugs. So they really were planning to shoot off their own fireworks..."
10002120-101 = "So glittery..."
10002120-105 = "...?!"
10002120-112 = "*boom* *boom* *boom*"
10002120-113 = "This won't do. Azusa, we need to put on an even better show than theirs!"
10002120-114 = "I'm on it. We won't lose. I refuse to lose in a firepower competition."
10002120-115 = "Nooo! What are you two doing?"
10002120-116 = "Why are you turning this into a competition?!"
10002120-120 = "Are they ramping up on their side too?!"
10002120-121 = "Sensei! Do something!"
10002120-122 = "[s] \"So pretty...\""
10002120-124 = "So, they want to compare artillery, do they?"
10002120-125 = "I'll show them what real all-out war looks like."
10002120-126 = "We're going to run out of fireworks at this rate!"
10002120-127 = "*boooom*"
10002120-128 = "...?"
10002120-129 = "...!"
10002120-130 = "Was that...?"
10002120-131 = "That sounded like napalm."
10002120-132 = "It carries much more explosive firepower than a regular firework. Well done."
10002120-133 = "Because it's not supposed to BE a firework..."
10002120-134 = "What about us? Do we have any napalm available?"
10002120-135 = "We do not."
10002120-137 = "They're launching another one!"
10002120-139 = "Huh?"
10002120-140 = "Is it a dud? It's flying awfully low and should have exploded a while ago."
10002120-141 = "Hmm?"
10002120-142 = "What...?"
10002120-143 = "Oh."
10002120-144 = "Incoming."
10002120-148 = "*boom*"
10002120-149 = "This means war."

1010802-111 = "3;유우카 파자마;01;……그렇네요. 밤에는 무조건 수면을 취하지 않으면 내일 하루를 망쳐버리고 말 거라는 생각이 머리를 꽉 채워서 오히려 신경이 예민해져 있었으니……\n#3;em;[...]"
1010802-112 = "3;유우카 파자마;02;그 강박적인 생각이 수면을 방해하고 있었을지도 모르겠네요."
1010802-113 = "3;유우카 파자마;15;하지만 이러니저러니 해도 낮에 이렇게 숙면을 취해 버렸으니…… 오늘 밤에 또 잠이 오지 않으면 어떻게 하죠?\n#3;em;[?]"

[translation]
1010802-1 = "失眠症"
1010802-2 = "（隔天一大早，優香來到辦公室協助夏萊的工作）"
1010802-3 = "（雖然優香乍看之下跟平時沒兩樣……）"
1010802-7 = "[ns]「優香，關於你昨天傳給我的會計報告……」"
1010802-8 = "…………"
1010802-9 = "[ns]「優香……？」"
1010802-10 = "老，老師！？#n抱歉，你剛才有叫我嗎……？"
1010802-11 = "[s1]「嗯，我是有叫你……」\n[s2]「你在煩惱什麼嗎？」"
1010802-14 = "沒，沒什麼。#n我剛才正好在想別的事……"
1010802-15 = "是要討論我昨天傳的報告對吧？請稍等一下。"
1010802-17 = "（整個早上看起來都無法專心工作的優香……）"
1010802-22 = "（……反常地打起了瞌睡）"
1010802-23 = "[ns]「優香……你還好嗎？」"
1010802-24 = "啊，咦？當，當然還……嗚啊！？"
1010802-30 = "[ns3]「優香，你身體是不是很不舒服？」\n[ns4]「看起來好像不太能專心的樣子。」"
1010802-33 = "沒，沒有那種事！#n我最近的三餐都很正常，也有每天堅持不懈地運動！"
1010802-34 = "雖然今天確實有點睏沒錯……但還不到做不了值日生工作的地步！"
1010802-35 = "[s5]「如果身體哪裡不舒服的話，可以坦白告訴我沒關係。」\n[s6]「工作可以分給其他人，但健康可是分享不了的哦。」"
1010802-38 = "嗚嗚……既然老師這麼說也沒辦法了。"
1010802-39 = "其實是這樣的……"
1010802-42 = "[ns]「……失眠症？」"
1010802-43 = "是的。#n上星期因為研討會工作的關係，我不得不勉強熬夜……"
1010802-44 = "從那之後，我的睡眠規律就被打破，總是整晚翻來覆去睡不著。"
1010802-45 = "接著隔天就因為很累而整天昏昏欲睡，#n到了晚上又得勉強自己入睡，這樣的惡性循環不斷反覆……"
1010802-46 = "昨天我本來也打算早點睡的，結果又在床上翻了好久，好像凌晨才睡著。"
1010802-50 = "[ns]「今天的值日生工作就先做到這裡……」"
1010802-52 = "[ns7]「優香，你可以去休息室換上舒服的睡衣再過來嗎？」\n[ns8]「接下來你要訓練睡眠，好讓自己能在晚上熟睡。」"
1010802-55 = "咦？要我一大早就睡覺？"
1010802-56 = "可是……要是在白天小睡的話，失眠不會變得更嚴重嗎？"
1010802-57 = "我現在的睡眠作息都已經亂七八糟的了，很難在晚上入睡……"
1010802-58 = "[s9]「至少現在的疲勞感會消失吧？」\n[s10]「先相信我，跟我來吧。」"
1010802-61 = "不能以這麼糟糕的狀態工作，對夏萊的工作造成影響……"
1010802-62 = "……我知道了，我現在就去換衣服。"
1010802-66 = "穿著睡衣待在夏萊，感覺怪怪的……"
1010802-67 = "所以我該怎麼訓練睡眠呢？"
1010802-68 = "[s11]「方法很簡單。你就帶著睡不著也沒關係的心情──」\n[s12]「躺在床上放輕鬆休息吧。」"
1010802-71 = "咦？那樣真的就能立刻入睡嗎？"
1010802-72 = "我先前想方設法要讓自己睡著，結果卻都沒有效果。"
1010802-73 = "而且待在陌生的環境，感覺會更睡不著……"
1010802-74 = "[s13]「就像我剛才說的，就算沒睡著也沒關係。」\n[s14]「先躺到床上休息一下，不要在意周圍的動靜。」"
1010802-77 = "（唔唔……要我在老師面前躺下，心情好微妙……）"
1010802-82 = "（反正八成也睡不著，就當作是休息一下整理思緒吧）"
1010802-83 = "（怎麼可能這樣做就輕易入睡……）"
1010802-84 = "……"
1010802-85 = "……"
1010802-97 = "啊啊，真舒服……"
1010802-98 = "感覺好久沒有睡得這麼舒服了──"
1010802-99 = "[s]「優香，睡得好嗎？」"
1010802-100 = "老，老，老師！？#n難，難道我剛才睡著了嗎？"
1010802-101 = "我睡了多久？該不會太陽已經下山──"
1010802-102 = "[s]「別擔心，只過了一小時而已。」"
1010802-103 = "太好了……我可是來當值日生的，差點就把整天都睡過去了。"
1010802-108 = "話，話說這還真奇怪。#n明明晚上無論怎麼努力都睡不著，沒想到午睡竟然這麼簡單就……"
1010802-109 = "[s]「會不會就是那股執念讓你睡不著？」"
1010802-110 = "執念？"
1010802-111 = "……也對。#n因為滿腦子都想著「如果晚上睡不著，明天又會被搞砸」反而讓神經變得更敏感……"
1010802-112 = "或許就是那股執念在妨礙我睡覺吧。"
1010802-113 = "但話又說回來，白天像這樣睡覺……要是今晚又睡不著該怎麼辦呢？"
1010802-114 = "[s]「不用太努力保持完美的狀態。」"
1010802-118 = "[ns]「當值日生的時候如果覺得累，隨時能躺在床上休息哦。」"
1010802-119 = "……老師果然很善良呢。"
1010802-120 = "謝謝你的好意，但我擔心這樣會養成習慣，所以午睡還是會盡量克制一下。"
1010802-121 = "不過我也會按照老師說的，保持隨時可以休息的心情，不過度勉強自己的。"
1010802-126 = "……話說回來，老師。#n你該不會對其他學生也是這麼說的吧？"
1010802-127 = "就算老師的出發點是好的，怎麼能勸學生躺到床上休息呢？#n不可以對學生說這種容易被誤會的話。"
1010802-131 = "……等等，為什麼要迴避我的視線？"
1010802-132 = "請清楚回答我！你平常都是這樣推薦其他學生的嗎？"
1010802-133 = "老～師～！"

1010802-108 = "3;유우카 파자마;08;그, 그나저나 이상한 일이네요. 밤에는 아무리 잠들려 해도 잠이 오지 않아 힘들었는데, 정작 낮잠은 이렇게 쉽게 들 수 있다니……"

[translation]
1010802-1 = "โรคนอนไม่หลับ"
1010802-2 = "(วันรุ่งขึ้น ยูกะมาที่สำนักงานเพื่อช่วยงานของชาเล่ต์แต่เช้าตรู่)"
1010802-3 = "(ดูผ่านๆ ยูกะก็ดูไม่ต่างจากปกติทุกวัน แต่ว่า...)"
1010802-7 = "[ns] \"ยูกะ เรื่องรายงานบัญชีที่ส่งมาให้เมื่อคืนน่ะ...\""
1010802-8 = "..."
1010802-9 = "[ns] \"ยูกะ...?\""
1010802-10 = "คะ... คุณครู?! ขอโทษค่ะ เมื่อกี้คุณครูเรียกฉันเหรอคะ...?"
1010802-11 = "[s1] \"อื้อ แต่เหมือนยูกะสติไม่อยู่กับเนื้อกับตัวเลย...\"\n[s2] \"อื้อ ว่าแต่มีเรื่องกังวลอะไรอยู่เหรอ?\""
1010802-14 = "มะ... ไม่มีอะไรหรอกค่ะ ฉันแค่มัวไปเผลอคิดถึงเรื่องอื่นอยู่น่ะ..."
1010802-15 = "เมื่อกี้คุณครูพูดถึงรายงานที่ฉันส่งไปให้เมื่อคืนใช่มั้ยคะ? รอเดี๋ยวนะคะ"
1010802-17 = "(ยูกะดูเหมือนจะโฟกัสกับงานไม่ได้ตลอดทั้งเช้า จนสุดท้ายก็...)"
1010802-22 = "(เริ่มสัปหงกด้วยความง่วง ซึ่งเป็นเรื่องผิดวิสัยของยูกะ...)"
1010802-23 = "[ns] \"ยูกะ... ไหวหรือเปล่า?\""
1010802-24 = "คะ... คะ? ตะ... ต้องไหวอยู่แล้วสิ... เฮือก?!"
1010802-30 = "[ns3] \"ยูกะ ไม่สบายตรงไหนหรือเปล่า?\"\n[ns4] \"ดูไม่มีสมาธิกับงานเลยนะ ไม่สบายหรือเปล่า?\""
1010802-33 = "มะ... ไม่ใช่อย่างนั้นเลยค่ะ! หมู่นี้ฉันกินข้าวครบทุกมื้อ แล้วก็ออกกำลังกายทุกวันด้วยค่ะ"
1010802-34 = "วันนี้ฉันรู้สึกง่วงนิดหน่อยก็จริง... แต่ก็ไม่ถึงกับมาเข้าเวรไม่ไหวค่ะ!"
1010802-35 = "[s5] \"ถ้าร่างกายไม่ไหวก็บอกกันตรงๆ เลยนะ\"\n[s6] \"มีอะไรก็บอกครูนะ สุขภาพสำคัญกว่างานอยู่แล้ว\""
1010802-38 = "อึก... ถ้าคุณครูว่าอย่างนั้น ฉันก็คงปิดไม่ได้"
1010802-39 = "คือว่าที่จริงแล้ว..."
1010802-42 = "[ns] \"นอนไม่หลับ...?\""
1010802-43 = "ค่ะ สัปดาห์ที่แล้วฉันโต้รุ่งเพราะต้องโหมทำงานของเซมิน่า..."
1010802-44 = "มันคงไปรบกวนวงจรการนอนของฉันน่ะค่ะ หลังจากนั้นฉันก็เลยนอนไม่หลับ และได้แต่นอนพลิกตัว#nไปมาจนถึงดึกดื่นเลย"
1010802-45 = "แล้ววันต่อมาฉันก็จะเหนื่อยและง่วงนอนตลอดวัน แต่พอตกกลางคืนก็นอนไม่หลับอีก..."
1010802-46 = "เมื่อคืนฉันก็รีบเข้านอนแท้ๆ แต่สุดท้ายกว่าจะหลับก็ปาเข้าไปตีสองตีสามเลยค่ะ"
1010802-50 = "[ns] \"งั้นงานเข้าเวรของวันนี้เอาไว้แค่นี้...\""
1010802-52 = "[ns7] \"ยูกะ ไปห้องพักผ่อนแล้วเปลี่ยนเป็นชุดนอนที่สบายตัวมานะ\"\n[ns8] \"จากนี้ไปเราจะฝึกนอนหลับให้หลับตอนกลางคืนได้กัน\""
1010802-55 = "คะ? จะให้ฉันนอนหลับตั้งแต่กลางวันแสกๆ แบบนี้เหรอคะ?"
1010802-56 = "แต่ว่า... ถ้านอนตั้งแต่ตอนกลางวัน มันจะไม่ยิ่งทำให้โรคนอนไม่หลับแย่ลงหรอกเหรอคะ?"
1010802-57 = "แค่นี้เวลานอนของฉันก็ไม่ปกติจนหลับยากตอนกลางคืนอยู่แล้วด้วย..."
1010802-58 = "[s9] \"แต่อย่างน้อยความเหนื่อยล้าก็น่าจะหายไปนะ\"\n[s10] \"เอาเป็นว่าเชื่อครูแล้วทำตามครูก่อนเถอะ\""
1010802-61 = "ฉันคงปล่อยให้สภาพที่ย่ำแย่ของฉันมาขัดขวางการทำงานที่ชาเลต์ไม่ได้..."
1010802-62 = "เข้าใจแล้วค่ะ... งั้นฉันจะไปเปลี่ยนชุดนอนมาเดี๋ยวนี้ค่ะ"
1010802-66 = "พอใส่ชุดนอนอยู่ในชาเล่ต์ มันก็รู้สึกแปลกๆ พิกลนะคะ..."
1010802-67 = "แล้วเราจะฝึกนอนหลับกันยังไงเหรอคะ?"
1010802-68 = "[s11] \"วิธีก็ง่ายๆ ต้องนอนด้วยความคิดที่ว่าต่อให้ไม่หลับก็ไม่เป็นไร\"\n[s12] \"ง่ายๆ เลย ก็แค่ทิ้งตัวลงบนเตียงอย่างผ่อนคลาย\""
1010802-71 = "คะ? แค่นั้นก็ทำให้หลับได้แล้วเหรอคะ? ไม่มีทางน่า"
1010802-72 = "ที่ผ่านมาฉันก็ลองมาทุกวิธีแล้ว แต่ก็ไม่มีวิธีไหนที่ได้ผลเลยค่ะ"
1010802-73 = "อีกอย่าง ตอนนี้ฉันน่าจะยิ่งนอนไม่หลับเพราะแปลกที่ด้วย..."
1010802-74 = "[s13] \"อย่างที่ครูบอกไปไง จะไม่หลับก็ไม่เป็นไร\"\n[s14] \"ลองมานอนสบายๆ แล้วไม่สนใจอะไรรอบตัวก่อนนะ\""
1010802-77 = "(อืม... ให้นอนคนเดียวต่อหน้าคุณครูมันก็รู้สึกแปลกๆ อยู่หรอกนะ...)"
1010802-82 = "(แต่ยังไงก็คงจะไม่หลับอยู่แล้ว งั้นคิดว่าเป็นการเอนตัวลงเพื่อพักสมองสักครู่แล้วกัน)"
1010802-83 = "(วิธีง่ายๆ แบบนี้คงไม่ทำให้หลับได้หรอก...)"
1010802-84 = "..."
1010802-85 = "......"
1010802-97 = "ฮ้าว สดชื่นจังเลย..."
1010802-98 = "ไม่ได้รู้สึกสดชื่นหลังจากตื่นมานานแค่ไหนแล้วนะ..."
1010802-99 = "[ns] \"นอนหลับสบายมั้ย ยูกะ?\""
1010802-100 = "คะ... คะ... คุณครู?! ระ... ระหว่างนี้ฉันเผลอหลับไปเหรอคะ?"
1010802-101 = "ฉันหลับไปนานแค่ไหนคะเนี่ย? อย่าบอกนะว่าพระอาทิตย์ตกแล้ว..."
1010802-102 = "[s] \"ไม่ต้องห่วงหรอก นอนไปแค่ชั่วโมงเดียวเอง\""
1010802-103 = "โล่งอกไปที... ฉันมาเข้าเวรแท้ๆ แต่ดันมาหลับเสียได้ เกือบไม่ได้ช่วยงานแล้วค่ะ"
1010802-108 = "ตะ... แต่จะว่าไปมันก็แปลกนะคะ ตอนกลางคืนฉันพยายามนอนเท่าไรก็นอนไม่หลับเลย แต่พอตอนกลางวัน ฉันกลับหลับปุ๋ยได้ง่ายๆ แบบนี้เลย..."
1010802-109 = "[s] \"เพราะบังคับตัวเองแบบนั้นหรือเปล่าเลยนอนไม่หลับน่ะ?\""
1010802-110 = "บังคับตัวเองงั้นเหรอคะ?"
1010802-111 = "นั่นสินะคะ... ตอนกลางคืนฉันจะเอาแต่คิดกังวลว่าถ้าคืนนี้ไม่นอนให้พอ พรุ่งนี้ก็จะไม่ได้ทำงานอะไรเลย..."
1010802-112 = "บางทีการกดดันตัวเองให้นอนหลับแบบนั้นอาจจะเป็นการรบกวนการนอนของฉันก็ได้ค่ะ"
1010802-113 = "แต่จะยังไงก็เถอะ ถ้าฉันได้หลับลึกในตอนกลางวันไปแล้วแบบนี้... แล้วคืนนี้ถ้าฉันนอนไม่หลับอีก จะทำยังไงดีล่ะคะ?"
1010802-114 = "[s] \"ไม่ต้องพยายามให้ร่างกายสมบูรณ์แบบมากนักก็ได้\""
1010802-118 = "[ns] \"ครูจะให้ยืมเตียงเวลามาเข้าเวร ถ้าง่วงก็นอนได้เลยนะ\""
1010802-119 = "คุณครูใจดีกับฉันจังเลยนะคะ..."
1010802-120 = "ขอบคุณที่พูดอย่างนั้นนะคะ แต่ฉันกลัวว่าจะติดเป็นนิสัย ต่อไปฉันขอละการนอนกลางวันดีกว่าค่ะ"
1010802-121 = "แต่ฉันก็จะพยายามไม่หักโหมมากอย่างที่คุณครูบอก และจะบอกตัวเองว่าให้พักผ่อนได้ทุกเมื่อค่ะ"
1010802-126 = "จะว่าไป... คุณครูคะ คุณครูไม่ได้พูดแบบนี้กับนักเรียนคนอื่นด้วยหรอกใช่มั้ยคะ?"
1010802-127 = "ต่อให้จะให้ยืมเตียงด้วยเจตนาดีแค่ไหน แต่จะพูดอะไรที่ทำให้เข้าใจผิดได้ง่ายกับนักเรียนทุกคนไม่ได้#nหรอกนะคะ"
1010802-131 = "เดี๋ยวสิ... ทำไมถึงหลบสายตาฉันล่ะคะ?"
1010802-132 = "ตอบมาตามตรงเลยนะคะ! คุณครูให้นักเรียนคนอื่นยืมเตียงด้วยเหรอคะ?"
1010802-133 = "คุณ~ ครู~!"

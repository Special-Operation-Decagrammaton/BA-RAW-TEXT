[translation]
1010802-1 = "Insomnia"
1010802-2 = "The next day, early in the morning, Yuuka came to the Schale office to help with work."
1010802-3 = "She didn't look any different from usual, but..."
1010802-7 = "[ns] \"Yuuka, about the financial report you sent me yesterday...\""
1010802-8 = "..."
1010802-9 = "[ns] \"Yuuka...?\""
1010802-10 = "I-I'm sorry, Sensei. Were you saying something?"
1010802-11 = "[s1] \"Yeah. I did, but...\"\n[s2] \"...is there something on your mind?\""
1010802-14 = "Oh, no. It's nothing at all. I was just a little distracted."
1010802-15 = "You were asking about yesterday's report, right? Just a moment."
1010802-17 = "She was having trouble concentrating on work all morning."
1010802-22 = "Then suddenly, Yuuka fell asleep, which was unlike her usually diligent self."
1010802-23 = "[ns] \"Yuuka... Are you okay?\""
1010802-24 = "Yes, yes? Of course, I'm okay... Ack!"
1010802-30 = "[ns3] \"Yuuka, are you not feeling well?\"\n[ns4] \"It seems like you're having trouble focusing today.\""
1010802-33 = "I-I'm perfectly fine! I've been eating consistently and haven't missed a single day of exercising!"
1010802-34 = "I might be a little tired, but I'd never let that affect my Student Rep duties!"
1010802-35 = "[s5] \"If you're feeling sick, please be honest with me.\"\n[s6] \"The work will always be there, but we have to protect your health.\""
1010802-38 = "Err... If you put it that way..."
1010802-39 = "The truth is..."
1010802-42 = "[ns] \"...Insomnia?\""
1010802-43 = "Yeah, one day last week, Seminar work kept me up all night..."
1010802-44 = "And I think it really disrupted my sleep rhythm. I've been tossing and turning every night since then."
1010802-45 = "The next day, I'm so tired that I tend to doze off throughout the day, and then the vicious cycle repeats..."
1010802-46 = "I even tried to go to bed early last night, but I ended up just tossing and turning all night. I fell asleep when the sun was coming up."
1010802-50 = "[ns] \"Let's stop work for today.\""
1010802-52 = "[ns7] \"Yuuka, will you change into something comfortable and meet me in the lounge?\"\n[ns8] \"Let's do some sleep training, to help you get a good night's sleep.\""
1010802-55 = "You want me to take a nap, at this time of day?"
1010802-56 = "If I nap this early, wouldn't it just make the insomnia worse?"
1010802-57 = "I think my sleep pattern being messed up is why I'm having trouble falling asleep at night to begin with..."
1010802-58 = "[s9] \"At least your immediate fatigue will be relieved.\"\n[s10] \"For now, just trust me.\""
1010802-61 = "It's unacceptable that my condition is interfering with my work at Schale, so..."
1010802-62 = "...Okay. Fine. I'll do it. Let me change and come back."
1010802-66 = "It's kind of weird being in my pajamas at Schale."
1010802-67 = "So how does this \"sleep training\" work?"
1010802-68 = "[s11] \"Easy. Just don't be so stressed about falling asleep.\"\n[s12] \"Lie down on the bed and relax.\""
1010802-71 = "What? That's all I'm supposed to do?"
1010802-72 = "I've tried every method under the moon, but nothing has worked."
1010802-73 = "And I'm not in my usual environment, so I think it'll be even harder than if I'm at home."
1010802-74 = "[s13] \"Like I said, don't worry about falling asleep.\"\n[s14] \"Just try to rest. Ignore your surroundings.\""
1010802-77 = "(Hmm... Lying down in front of Sensei, with just the two of us, feels...weird...)"
1010802-82 = "(I'm not going to be able to sleep like this, so I guess I'll just organize my thoughts...)"
1010802-83 = "(After all, there's just no way I can fall...)"
1010802-84 = "..."
1010802-85 = "..."
1010802-97 = "Heehee."
1010802-98 = "I haven't felt this refreshed in a while."
1010802-99 = "[s] \"Did you sleep well, Yuuka?\""
1010802-100 = "S-S-Sensei? I really fell asleep?"
1010802-101 = "How long was I sleeping for? Is it night—"
1010802-102 = "[s] \"Don't worry. It's only been about an hour.\""
1010802-103 = "Thank goodness... I couldn't imagine if I'd slept through my entire Student Rep shift."
1010802-108 = "That's so weird, though. I haven't been able to fall asleep at all at night, and then I can nap like it's nothing during the day..."
1010802-109 = "[s] \"Maybe it's the pressure to fall asleep that's keeping you up.\""
1010802-110 = "The pressure?"
1010802-111 = "...I see what you're saying. Whenever I'm laying in bed, I just think about how if I don't fall asleep, the next day will be ruined, and then I get more and more anxious."
1010802-112 = "All that pressure probably interferes with my sleep."
1010802-113 = "But what if I can't fall asleep tonight because I slept so deeply just now?"
1010802-114 = "[s] \"Just don't try so hard to be in the perfect condition all the time.\""
1010802-118 = "[ns] \"You can borrow the bed whenever you want, so just rest when you're tired.\""
1010802-119 = "Oh... You're always so nice to me, Sensei..."
1010802-120 = "Thank you. I don't want to pick up a bad habit, though, so I'll do my best to avoid too many naps."
1010802-121 = "But I won't ignore what you said either. I'll still try to maintain the mindset that I can take breaks when I need to."
1010802-126 = "...More importantly! Sensei! You don't say such things to other students, do you?"
1010802-127 = "No matter how good your intentions, offering a bed to a student is inappropriate. You should be more aware of how your words can be misinterpreted."
1010802-131 = "...Wait, why are you avoiding my gaze?"
1010802-132 = "Please answer me straight! Do you offer the bed to other students too?"
1010802-133 = "SEEENSEIII!"

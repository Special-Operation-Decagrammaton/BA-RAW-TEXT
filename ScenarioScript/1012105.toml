[translation]
1012105-1 = "The Blossoming Flower Underneath"
1012105-2 = "I arrived before the promised time, knowing that Yukari always shows up early."
1012105-3 = "However, I saw no sign of her as the minutes passed."
1012105-7 = "I heard water splashing, then a gasp."
1012105-11 = "...? ...!"
1012105-12 = "[ns1] \"(Was that Yukari...?!)\"\n[ns2] \"(Is she drowning?!)\""
1012105-15 = "[ns] Jump into the water."
1012105-19 = "[ns] Open your eyes."
1012105-22 = "― [log=유카리 수영복](Sensei! You found me under the sea!)[/log][wa:3380] "
1012105-25 = "― [log=유카리 수영복](I never expected to see such beautiful scenery)[/log][wa:1670] "
1012105-27 = "― [log=유카리 수영복](hidden under the water that I've only seen from afar.)[/log][wa:1210] "
1012105-30 = "― [log=유카리 수영복](And for me to be together with Sensei at such a place...)[/log][wa:3140] "
1012105-32 = "― [log=유카리 수영복](Aah, aren't I such a lucky girl?)[/log][wa:3260] "
1012105-35 = "― [log=유카리 수영복](Um, Sensei? Your face is uh, huh...?)[/log][wa:3470] "
1012105-37 = "― [log=유카리 수영복](Did I do something wrong?)[/log][wa:410] "
1012105-40 = "― [log=유카리 수영복](Up? There's nothing up there but the sun...)[/log][wa:330] "
1012105-42 = "― [log=유카리 수영복](What? That's not it?)[/log][wa:550] "
1012105-45 = "Phew!"
1012105-46 = "I'm positively soaked! Haha!"
1012105-47 = "[ns3] \"You seem to be having fun!\"\n[ns4] \"What were you doing?\""
1012105-50 = "Well... I arrived early, and while I was looking at the sea..."
1012105-51 = "...I saw what looked like flowers under the water. Sea flowers!"
1012105-52 = "But Sensei, why did you dive in and join me?"
1012105-53 = "Aah?! Was I so busy indulging that I was late?!"
1012105-54 = "Hm? No...there's been a misunderstanding...? Ah... You thought I was drowning?!"
1012105-55 = "So that's why you seemed so harried! I was so happy to see you that I had no idea!"
1012105-56 = "I know not how to feel. I am sorry...but I am also quite honored by your bravery!"
1012105-57 = "[s5] \"As long as you're safe, Yukari!\"\n[s6] \"Let's focus on having some fun!\""
1012105-60 = "Ah. ...Yes!"
1012105-62 = "Afterward, Yukari and I enjoyed the sea until the evening."

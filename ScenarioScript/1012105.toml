[translation]
1012105-1 = "ดอกไม้ที่บานสะพรั่งใต้ผืนน้ำ"
1012105-2 = "(คุณครูออกมาก่อนเวลาเล็กน้อยเพื่อไปให้ทันยูคาริที่มาถึงก่อนเวลานัดเสมอ)"
1012105-3 = "(ใกล้ถึงเวลานัดแล้ว แต่ยูคาริก็ยังไม่ปรากฏตัว)"
1012105-7 = "(คุณครูได้ยินเสียงน้ำกระทบดังจ๋อมๆ เป็นระยะๆ)"
1012105-11 = "...? ...!"
1012105-12 = "[ns1] (เหมือนจะเป็นยูคาริเลย...?!)\n[ns2] (หรือว่ายูคาริตกไปในทะเลน่ะ?!)"
1012105-15 = "[ns] วิ่งไปในทะเล"
1012105-19 = "[ns] ลืมตา"
1012105-22 = "― [log=유카리 수영복](ท่านอาจารย์! ตามหาข้าที่อยู่ในทะเลจนเจอสินะเจ้าคะ!)[/log][wa:2780] "
1012105-25 = "― [log=유카리 수영복](พื้นทะเลที่มักเห็นเวลามองเท้าลงมา)[/log][wa:2190] "
1012105-27 = "― [log=유카리 수영복](ข้าไม่คิดเลยว่ามันจะซ่อนทัศนียภาพที่งดงามไว้ถึงเพียงนี้)[/log][wa:1130] "
1012105-30 = "― [log=유카리 수영복](แล้วก็ไม่คิดเลยว่า จะได้มองท่านอาจารย์ในที่แบบนี้ด้วย) [/log][wa:3220] "
1012105-32 = "― [log=유카리 수영복](อ่า... ทำไมข้าถึงได้โชคดีแบบนี้นะเจ้าคะ?)[/log][wa:2940] "
1012105-35 = "― [log=유카리 수영복](เอ๋? ท่านอาจารย์? ทำไมถึงทำหน้าแบบนั้นล่ะ...?)[/log][wa:3110] "
1012105-37 = "― [log=유카리 수영복](ข้าทำอะไรผิดไปหรือเปล่าเจ้าคะ?)[/log][wa:210] "
1012105-40 = "― [log=유카리 수영복](ข้างบน? ข้างบนก็มีแต่พระอาทิตย์นะ...)[/log][wa:610] "
1012105-42 = "― [log=유카리 수영복](เจ้าคะ? ไม่ใช่เรื่องนั้นเหรอเจ้าคะ?)[/log][wa:10] "
1012105-45 = "ฮ่าฮ่า!"
1012105-46 = "เปียกตั้งแต่หัวจรดเท้าเลยเจ้าค่ะ! อะฮะฮะฮ่า!"
1012105-47 = "[ns3] \"ทำอะไรอยู่คนเดียวเหรอ?\"\n[ns4] \"เล่นสนุกอะไรอยู่คนเดียวเหรอ?\""
1012105-50 = "อ่า คือว่า... ข้ามาถึงก่อนเวลานัดนิดหน่อย ก็เลยนั่งมองทะเลอยู่น่ะเจ้าค่ะ... "
1012105-51 = "แต่พอเห็นเงาดอกไม้ที่สะท้อนอยู่ในน้ำทะเลใสๆ ข้าก็เกิดอยากรู้อยากเห็นขึ้นมา..."
1012105-52 = "ว่าแต่ท่านอาจารย์รู้ได้ยังไงเจ้าคะว่าข้าอยู่ตรงนี้..."
1012105-53 = "อ๊ะ?! หรือว่าข้ามัวแต่ชมดอกไม้ในทะเลจนเลยเวลานัด?!"
1012105-54 = "เจ้าคะ? ยังไม่เลยเวลานัด? แต่แค่เข้าใจผิดไปงั้นเหรอเจ้าคะ...? อ่า... ท่านอาจารย์คิดว่าข้าจมน้ำสินะ..."
1012105-55 = "เพราะงั้นท่านอาจารย์ก็เลยรีบเข้ามาช่วย... แต่ข้าก็ไม่รู้เรื่องอะไรเลย แค่คิดว่าได้เห็นท่านอาจารย์#nก็ดีใจแล้ว..."
1012105-56 = "ใจหนึ่งข้าก็รู้สึกผิด แต่อีกใจหนึ่งข้าก็ดีใจจนเหมือนจะติดปีกบิน มันเป็นความรู้สึกที่ซับซ้อนจังเลย#nนะเจ้าคะ"
1012105-57 = "[s5] \"ไม่ต้องใส่ใจนะ! แค่ยูคาริปลอดภัยก็พอแล้ว\"\n[s6] \"วันนี้เรามาเล่นสนุกตามที่สัญญากันไว้เถอะนะ!\""
1012105-60 = "อ๊ะ เจ้าค่ะ...!"
1012105-62 = "(จากนั้นคุณครูกับยูคาริก็เล่นสนุกที่ทะเลกันจนตกเย็น)"

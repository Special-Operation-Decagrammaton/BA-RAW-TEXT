[translation]
1012105-1 = "水面下綻放的華麗之花"
1012105-2 = "（為了配合總是比約定時間早到的紫，稍微提早了出發的時間）"
1012105-3 = "（然而眼看約定的時間就快到了，紫卻遲遲沒有出現）"
1012105-7 = "（這時，從海邊傳來了間歇的水花聲）"
1012105-11 = "……？ #n……！"
1012105-12 = "[ns1]（剛才好像看見了紫的身影……！？）\n[ns2]（難道他掉進海裡了！？）"
1012105-15 = "[ns] 跳入水中"
1012105-19 = "[ns] 睜開眼睛"
1012105-22 = "― [log=유카리 수영복]（老師！您來找小女子了呢！）[/log][wa:4300] "
1012105-25 = "― [log=유카리 수영복]（平時只能從遠處眺望的大海……）[/log][wa:2950] "
1012105-27 = "― [log=유카리 수영복]（竟然隱藏著如此美麗的景色）[/log][wa:2850] "
1012105-30 = "― [log=유카리 수영복]（而且，還能跟老師，像這樣單獨欣賞……）[/log][wa:4660] "
1012105-32 = "― [log=유카리 수영복]（啊啊，小女子是多麼幸福啊）[/log][wa:4060] "
1012105-35 = "― [log=유카리 수영복]（咦……老師？您的臉色好像有點……？）[/log][wa:4230] "
1012105-37 = "― [log=유카리 수영복]（小女子，做了什麼奇怪的事嗎？）[/log][wa:850] "
1012105-40 = "― [log=유카리 수영복]（上面……？上面只有太陽而已唷……）[/log][wa:1410] "
1012105-42 = "― [log=유카리 수영복]（咦……？不是這個意思……？）[/log][wa:830] "
1012105-45 = "噗哈！"
1012105-46 = "所有頭髮都濕透了呢！啊哈哈哈！"
1012105-47 = "[ns3]「看起來玩得很開心嘛！」\n[ns4]「你剛才在做什麼？」"
1012105-50 = "啊，那個…… 因為來得比約定的時間還早，就一直看著大海……"
1012105-51 = "結果被透明的海水中映照的花朵吸引，一時激動就……"
1012105-52 = "話說回來，老師您是怎麼知道小女子在這裡的呢……"
1012105-53 = "啊啊！？難道是因為小女子太專心賞花，結果反而遲到了嗎！？"
1012105-54 = "咦，時間還沒到，只是誤會了……？#n啊……原來老師誤以為小女子掉進海裡了……"
1012105-55 = "所以您才會那麼著急……#n小女子卻只因為能和老師在一起而開心……"
1012105-56 = "雖然感到抱歉，卻又高興得像要飛起來一樣……真是複雜的心情呢。"
1012105-57 = "[s5]「別在意！只要紫平安就好。」\n[s6]「今天就照約定好好玩個痛快吧！」"
1012105-60 = "啊……是！"
1012105-62 = "（之後直到傍晚，都和紫一起盡情享受著大海）"

[translation]
11190-2 = "ตอนที่ 19;ยกโทษให้ไม่ได้!"
11190-3 = "เมืองอะบิดอสที่ถูกทำลาย"
11190-4 = "(ควันโขมง)"
11190-6 = "(แค่ก แค่ก) ร้านหายไปแบบไร้ร่องรอยเลย"
11190-7 = "(แค่ก แค่ก) ทำไมถึง..."
11190-8 = "(มึน...)"
11190-10 = "แค่ก แค่ก... อะ... โอ้ย..."
11190-13 = "(นี่มัน... อะไรกัน?! เกิดเรื่องอะไรขึ้น?!)"
11190-14 = "จริงเหรอเนี่ย? นี่เราพังที่นั่นจริงเหรออารุจัง?"
11190-15 = "หะ... หือ?"
11190-16 = "นี่เราระเบิดร้านราเม็งที่ใจดีกับเรา เพราะแค่ร้านนั้นทำให้เราใจอ่อนลงงั้นเหรอ?"
11190-17 = "ต้องแบบนี้สิ ถึงจะได้เป็นวายร้ายที่ไร้จิตใจของจริง! นี่มันพฤติกรรมชั่วร้ายที่คนใจเสาะไม่มีวันทำได้!#nชั่วร้ายสุดๆ ไปเลย!"
11190-18 = "หะ... หา...? เอ่อ..."
11190-19 = "นี่แหละคนนอกกฎหมายจอมร้ายกาจ!! สุดยอดไปเลยอารุจัง!"
11190-20 = "อ่อ... เอ่อ...? อ่า... อะฮ่าฮ่าฮ่า! นะ... แน่นอนอยู่แล้ว! ไม่ผูกมัดด้วยความรัก แค่ให้เงินมา ปัญหาก็คลี่คลาย! นี่เป็นคติของเราไงล่ะ!!"
11190-21 = "งั้นเหรอ...? ได้ยินมาพอแล้วละ!"
11190-25 = "เจ้าพวกนี้!! อุตส่าห์ใจดีด้วย แต่ก็มาทำกันแบบนี้เรอะ?!"
11190-26 = "......"
11190-27 = "......"
11190-28 = "พบคุณชิบะแล้วค่ะ! เขาบาดเจ็บแค่เล็กน้อย ฉันเลยแนะนำให้ไปหลบที่กำบังก่อนแล้วค่ะ"
11190-29 = "ดีละ... หมายความว่าตอนนี้ก็อาละวาดได้ตามใจแล้วสินะ?"
11190-30 = "ยกโทษให้ไม่ได้เด็ดขาด! ฉันไม่มีวันยกโทษให้...!!!"
11190-32 = "?!"
11190-33 = "โอ้โห พูดปุ๊บมาปั๊บเลยนะ"
11190-34 = "ถึงจะไม่ได้เป็นไปตามแผนที่วางไว้ แต่ยังไงก็เป็นเป้าหมายที่เราต้องจัดการสักวันอยู่ดี"
11190-35 = "ฉันจะไปเรียกพวกทหารรับจ้างมาแล้วกัน"
11190-37 = "......"
11190-38 = "ชะ... ใช่!! พวกอะบิดอส! ตอนนี้รู้กันแล้วใช่มั้ยว่าฉันเป็นคนยังไง?"
11190-39 = "ได้เวลาปิดฉากเรื่องนี้แล้ว... จัดการได้!"
11190-40 = "(แกรก) ได้ค่ะ ฉันจะระเบิดให้แหลกเลยค่ะ ท่านประธานอารุ"
11190-43 = "เตรียมใจไว้แล้วใช่ไหม?!"
11190-44 = "(แกรก)"
11190-45 = "เตรียมตัวโดนดุกันได้เลยค่ะ!"
11190-49 = "นั่นมันคำพูดของเราต่างหาก! ฉันจะแสดงให้ดูเองว่าวายร้ายที่แท้จริงเป็นยังไง!!"

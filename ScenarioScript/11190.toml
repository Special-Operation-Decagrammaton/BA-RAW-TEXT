[translation]
11190-2 = "第19話;混蛋，不可饒恕！"
11190-3 = "被破壞的阿拜多斯市區"
11190-4 = "（煙霧瀰漫……）"
11190-6 = "咳咳，咳咳……哇，建築物整個不見了耶？"
11190-7 = "咳咳……這到底是……"
11190-8 = "（眼冒金星）"
11190-10 = "咳咳，咳咳……嗚，嗚啊啊……"
11190-13 = "（這，這是什麼！？出了什麼事！？）"
11190-14 = "……真的炸飛了嗎，亞瑠醬？"
11190-15 = "咦……咦？"
11190-16 = "因為被情緒帶著走，就把親切對待我們的拉麵店給炸飛了？#n很厲害嘛──！？"
11190-17 = "這樣才是真正沒血沒淚的大壞蛋！#n那些雜魚做不到的鬼畜行為！完全是壞人中的壞人！"
11190-18 = "咦，唔？……啊？"
11190-19 = "這就是冷酷的法外之徒對吧！！#n亞瑠醬真厲害！我對你另眼相看了！"
11190-20 = "咦，啊……？……啊，啊哈哈哈哈！那，那當然！#n冷酷無情！不受人情所累！只要能賺錢不管什麼委託都OK！這就是我們的宗旨！！"
11190-21 = "我都聽見了！！"
11190-25 = "你們這些傢伙……！！竟敢做出這麼過分的事！！"
11190-26 = "……"
11190-27 = "……"
11190-28 = "已確認老闆的人身安全！幸好只有輕傷，已經帶他去附近的避難所了！"
11190-29 = "……也就是說，可以盡情大鬧一場囉？"
11190-30 = "你們這些傢伙，不可饒恕。#n我絕──對不會原諒你們……！！"
11190-32 = "！？"
11190-33 = "哎呀，說人人到。"
11190-34 = "……雖然時機不太對，不過我們遲早得和他們做個了斷。"
11190-35 = "我去把事先雇來的傭兵全都叫來這裡。"
11190-37 = "……"
11190-38 = "……沒，沒錯！！這下理解了吧，阿拜多斯！我究竟有多麼惡劣！"
11190-39 = "來吧，一決勝負！！儘管放馬過來吧！"
11190-40 = "我會把他們全都解決掉的，亞瑠大人。"
11190-43 = "做好覺悟了吧？"
11190-44 = "（咻嚓）"
11190-45 = "處罰時間到囉──！"
11190-49 = "那是我的台詞！！讓你們見識見識什麼才是真正的法外之徒！！"

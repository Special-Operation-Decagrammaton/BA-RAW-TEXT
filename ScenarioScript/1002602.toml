[translation]
1002602-1 = "ขอความช่วยเหลือ"
1002602-2 = "(คุณครูมาที่ห้องของเนรุตามที่เธอขอ)"
1002602-8 = "(เนรุไม่รู้วิธีใส่ชุด และกำลังพยายามใส่เสื้อด้วยท่าทางแปลกๆ อยู่)"
1002602-9 = "อา... มันใส่ยังไงกันเนี่ย น่าจะใส่ได้แล้วนะ..."
1002602-10 = "อ๊ะ มาแล้วเหรอ ให้รอตั้งนาน..."
1002602-11 = "หืม...?"
1002602-12 = "[s] \"...?\""
1002602-13 = "...? ครู...?"
1002602-17 = "อะไรเนี่ย!? ครู!?"
1002602-18 = "มาตั้งแต่เมื่อไรน่ะ!? ไม่สิ ทำไมครูถึงมาอยู่ที่นี่ได้ล่ะ!?"
1002602-19 = "คิดจะทำอะไรน่ะ!? จู่ๆ ก็มาหาโดยไม่บอกแบบนี้!!"
1002602-20 = "อะไรนะ?"
1002602-21 = "ฉันเรียกมางั้นเหรอ? พูดบ้าอะไรน่ะ? ฉันไม่เคยเรียกครูมาสักหน่อย!?"
1002602-22 = "[s1] \"เธอส่งรูปมาด้วยนะ นี่ไง...\"\n[s2] ยื่นแชท MOMOTALK ให้ดู"
1002602-28 = "หะ...หืม? นี่มันอะไรกัน..."
1002602-30 = "อา..."
1002602-31 = "ส่งผิดสินะ"
1002602-32 = "นี่ฉันส่งผิดนี่"
1002602-33 = "ทำไมถึงส่งไปให้ครูเล่า!!"
1002602-34 = "ระ...รูป...! ลบรูปเดี๋ยวนี้เลย! รีบลบรูปเดี๋ยวนี้เลยนะครู!!!"
1002602-35 = "หะ...หืม? ไม่เป็นไรงั้นเหรอ? ครูไม่เป็นแต่ฉันเป็นนะ!"
1002602-36 = "ทำไมถึงถ่ายรูปออกมาได้ตลกแบบนี้น่ะเหรอ? อึ่ก... ให้ตายสิ..."
1002602-37 = "หืม...? ว่ายังไงนะ?"
1002602-38 = "จะสอนวิธีใส่ชุดบันนี่เกิร์ล... ให้ฉันงั้นเหรอ? ครูเนี่ยนะ?"
1002602-39 = "...?"
1002602-40 = "เอ่อ... เอ่อ... ถามจริง? ทำไมล่ะ?"
1002602-41 = "ทำไมครูถึงรู้วิธีใส่ชุดพวกนี้ได้ล่ะ? คงไม่ใช่ว่าครูเคยใส่มาก่อนใช่มั้ย?"
1002602-42 = "[s3] \"ครูลองหาในเน็ตดูน่ะ เพราะคิดว่าน่าจะต้องช่วย...\"\n[s4] \"เรื่องแบบนี้มันก็ความรู้ทั่วๆ ไปไม่ใช่เหรอ\""
1002602-43 = "อะ...อื้อ ตอบแบบนี้ก็ได้เหรอ...?"
1002602-44 = "อะ...อื้อ ตอบแบบนี้ก็ได้เหรอ...?"
1002602-45 = "ฮะฮ่าฮ่า จะยังไงก็ช่างเถอะ ก็ดีแล้ว ยังไงผลลัพธ์ที่ออกมาก็ไปได้สวยล่ะนะ"
1002602-46 = "ถ้างั้นก็ขอรบกวนหน่อยนะ ก่อนอื่นก็ถอดนี่ออกก่อนเพราะจะต้องใส่ใหม่..."
1002602-47 = "...? หืม? ครู? เป็นอะไรน่ะ?"
1002602-48 = "ว่าไงนะ? บอกว่าอย่าเพิ่งเริ่มเหรอ? ครูจะบอกวิธีให้แล้วก็ให้ฉันทำเองเหรอ?"
1002602-49 = "ทำไมล่ะ...?"
1002602-50 = "ก็ไม่เป็นไรหรอกนะ แต่ว่าทำไมถึง..."
1002602-52 = "อา..."
1002602-53 = "...ฮะ...ฮึ่มมม! เข้าใจแล้ว"
1002602-54 = "ไปรอข้างนอกเลยครู ถ้าเปลี่ยนชุดเสร็จแล้วฉันจะเรียก"
1002602-55 = "[s] หลังจากบอกวิธีใส่ชุดให้ คุณครูก็ออกไปข้างนอก"
1002602-61 = "(คุณครูออกมารอข้างนอกห้องและรอให้เนรุเรียก)"
1002602-65 = "เสร็จแล้วล่ะ... ครู เข้ามาได้แล้ว"
1002602-72 = "อืม ก็ดูใช้ได้เลยนะ ชุดนี้มันใส่แบบนี้นี่เอง!"
1002602-73 = "ถึงมันจะดูแปลกๆ หน่อย แต่ก็ขยับตัวคล่องดี... แถมเหมือนจะดูดีกว่าชุดเมดที่ฉันใส่ประจำอีกด้วย"
1002602-74 = "กลายเป็นว่าถูกแล้วที่เรียกครูมาสินะ ฮะฮ่าฮ่า"
1002602-75 = "อืม แต่ว่ารองเท้า... มันใส่ไม่ค่อยสบายเท่าไรเลย..."
1002602-76 = "ส้นสูงงั้นเหรอ? ปกติรองเท้าส้นสูงเป็นแบบนี้เหรอ?"
1002602-81 = "วะ...ว้ากๆ ว้ากกก..."
1002602-82 = "รองเท้าแบบนี้คงใส่ไม่ได้แน่เลย ปกติเขาใส่กันแบบนี้เหรอ?"
1002602-83 = "หืม...? ใส่แบบนี้ถูกแล้วงั้นเหรอ? ใส่แบบนี้จริงๆ เหรอน่ะ?"
1002602-84 = "ให้ตายสิ สุดยอดจริงๆ เลยนะ พวกที่ใส่รองเท้าแบบนี้ได้เนี่ย..."
1002602-85 = "ได้ครูช่วยไว้ ฉันเลยใส่ถูกซะที... ต้องขอบคุณครูด้วยสินะ"
1002602-91 = "ขอบคุณนะครู"
1002602-92 = "หืม...?"
1002602-93 = "ถ้าจะให้ช่วยอีกก็บอกได้ตลอดงั้นเหรอ?"
1002602-94 = "ถ้าเป็นไปได้ก็ให้แนบรูปไปด้วยงั้นเหรอ?"
1002602-95 = "ฮะฮะ..."
1002602-96 = "ฮะฮ่าฮ่า"
1002602-97 = "ฉันจะมองข้ามเรื่องนี้ไป เพราะถือว่าครูช่วยฉันเอาไว้ก็แล้วกันนะ"

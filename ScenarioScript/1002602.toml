[translation]
1002602-1 = "支援請求"
1002602-2 = "（我盡快趕到寧瑠的房間）"
1002602-8 = "（房裡的寧瑠因為不知道正確的穿法，只能套著一半的衣服，遠遠看好像怪物一樣）"
1002602-9 = "這什麼跟什麼呀，到底是誰想出這種衣服的……"
1002602-10 = "嗯。"
1002602-11 = "啊啊，來了嗎。"
1002602-12 = "[s] 「……？」"
1002602-13 = "……咦？"
1002602-17 = "哈啊！？老師！？"
1002602-18 = "為何！？老師怎麼會在這裡！？"
1002602-19 = "不對，太奇怪了，你來幹嘛啦！？"
1002602-20 = "……啊？"
1002602-21 = "是我叫你來的？怎麼可能！？"
1002602-22 = "[s1] 「妳傳了照片給我。」\n[s2] 把MomoTalk的對話拿給她看"
1002602-28 = "不可能，騙人，我才不會被騙呢。我才……"
1002602-30 = "咦咦……"
1002602-31 = "還真的傳了……"
1002602-32 = "可惡，我怎麼又傳錯了！？"
1002602-33 = "不，這是因為沒看清楚……！"
1002602-34 = "話說那個照片！刪掉！怎麼醜成這樣！！"
1002602-35 = "啊？沒關係？我這邊非常有關係！！"
1002602-36 = "這種照片，要是被其他人看到……"
1002602-37 = "……嗯？什麼？"
1002602-38 = "啊？你知道兔女郎服裝怎麼穿？"
1002602-39 = "……？"
1002602-40 = "咦，啊？為何？"
1002602-41 = "為什麼會知道，你有穿過嗎？"
1002602-42 = "[s3] 「感覺總有一天會需要。」\n[s4] 「常識。」"
1002602-43 = "……？"
1002602-44 = "……？"
1002602-45 = "哈，怎樣都好。以結果來說真是幫了大忙。"
1002602-46 = "總之，我先把它脫下來……"
1002602-47 = "……啊？怎了，老師？"
1002602-48 = "先等等？先教我穿法我再自己穿？"
1002602-49 = "……這是為何？"
1002602-50 = "嘛，是都沒差啦──"
1002602-52 = "啊。"
1002602-53 = "啊……嘛，說得也是……"
1002602-54 = "OK，那你教我吧。老師等等先去外面等，等我換好了會再叫你。"
1002602-55 = "[s] 把方法告訴她之後，暫時離開房間"
1002602-61 = "（就這樣暫時在房間外，等待寧瑠換衣服）"
1002602-65 = "……喂，已經好囉，老師。"
1002602-72 = "哦──，原來如此啊。這樣穿就好了啊。"
1002602-73 = "雖然外觀看起來有點奇怪……但果然還是比女僕裝好活動呢！"
1002602-74 = "沒想到又誤傳訊息給老師，但以結果來看是正確的呢。哈哈。"
1002602-75 = "唔嗯……不過，感覺只有這雙鞋沒辦法習慣啊……"
1002602-76 = "是叫高跟鞋吧？"
1002602-81 = "感覺腳跟還有其他都好痛……"
1002602-82 = "這個穿法是對的嗎？"
1002602-83 = "……真假。也就是說街上的傢伙能穿這種東西安然走路？"
1002602-84 = "真是厲害，竟然能穿著這東西走路……"
1002602-85 = "嘛，總之得救了。"
1002602-91 = "謝啦。"
1002602-92 = "……嗯？"
1002602-93 = "有需要時可以再聯絡你？"
1002602-94 = "附上照片的話就更好了……？你這傢伙──"
1002602-95 = "……咯咯。"
1002602-96 = "哈哈！啊──，那是什麼認真的表情……果然是奇怪的傢伙吶。"
1002602-97 = "……等我心情好再說吧。"

[translation]
1009305-1 = "單獨課外輔導"
1009305-2 = "（接到綺羅羅的聯絡後，前往了格黑娜學園的教室）"
1009305-9 = "啊！老師！謝謝你特地過來一趟！"
1009305-10 = "怎麼樣？這裡就是我們的教室哦！"
1009305-11 = "[s]「話說今天為什麼只有你一個人？」"
1009305-12 = "這個嘛，有人是因為社團活動，有人是因為各地傳來爆炸事件的消息……#n總之等我注意到的時候，大家都已經因為各式各樣的理由離開了。"
1009305-13 = "不過這就是格黑娜的日常，其實也不是什麼稀奇的事。#n別在意別在意～"
1009305-14 = "那，問候就先說到這裡，趕緊開始讀書吧！"
1009305-18 = "這邊！坐在我旁邊吧！"
1009305-19 = "因為得把考試範圍通通讀完才行，我要開啟超級認真狀態！"
1009305-21 = "（和綺羅羅一起認真讀了一陣子書後……）"
1009305-31 = "嗯？這麼快就過了一節課嗎？"
1009305-32 = "因為太專心的關係，連時間過了這麼久都沒發現……說不定我其實是個模範生喔！"
1009305-33 = "[s]「辛苦了，要不要先休息一下？」"
1009305-34 = "嗯？沒關係！我的注意力和體力都還很充沛！"
1009305-35 = "你說休息也是讀書的一環？"
1009305-36 = "嗯……話是那麼說沒錯……"
1009305-40 = "其實我跟朋友說好，等上完課之後要一起去玩……"
1009305-41 = "所以如果可以的話，我希望能盡早把考試唸完～啊哈哈。"
1009305-45 = "[ns]「那好吧。」"
1009305-47 = "[ns1]「但是讀書可不能敷衍了事哦。」\n[ns2]「畢竟這件事可是你自己拜託我的。」"
1009305-50 = "嗯，我知道了。"
1009305-51 = "不過聽老師這麼一說，好像還是稍微休息一下比較好。"
1009305-52 = "啊，仔細想想，那個也還沒準備好呢……"
1009305-56 = "好，那就這麼辦吧。"
1009305-57 = "我接下來的時間一定會超級認真，所以老師就幫我一個忙吧！"
1009305-58 = "[s]「幫……忙？幫什麼忙呢？」"
1009305-59 = "那就是～"
1009305-63 = "其實我只做完基底的部分就來學校了，所以根本連塗都還沒塗！"
1009305-64 = "要是自己弄肯定會花不少時間，但如果老師願意幫我的話，說不定很快就能弄好了！"
1009305-65 = "反正現在也是休息時間嘛……可以嗎？"
1009305-66 = "[s]「可以是可以……但你要塗的是什麼？」"
1009305-67 = "嗯？當然是「這個」囉！"
1009305-68 = "老師的桌子，借我用一下哦！"
1009305-80 = "― [log=키라라 반짝부]怎麼啦，老師？為什麼扭扭捏捏的。[/log][wa:2020] "
1009305-81 = "― [log=키라라 반짝부]再那樣下去的話，休息時間就要結束囉？[/log][wa:3680] "
1009305-84 = "― [log=키라라 반짝부]啊～難道說，你不知道指甲油該怎麼塗嗎？[/log][wa:2920] "
1009305-85 = "― [log=키라라 반짝부]方法很簡單唷！先把要塗的地方仔～細看清楚……[/log][wa:7180] "
1009305-88 = "[ns5]「我看看……」\n[ns6]「像這樣嗎……」"
1009305-89 = "― [log=키라라 반짝부]呀啊……呃，嗯！就是那樣！[/log][wa:2730] "
1009305-90 = "― [log=키라라 반짝부]呀啊……呃，嗯！就是那樣！[/log][wa:2730] "
1009305-93 = "― [log=키라라 반짝부]那，那個……臉，是不是靠太近了……啊哈哈！[/log][wa:4800] "
1009305-96 = "― [log=키라라 반짝부]老師，連呼吸都能明顯感覺到了耶……？[/log][wa:2650] "
1009305-99 = "― [log=키라라 반짝부]交，交給老師，果然好像有點太難為情了……[/log][wa:2240] "
1009305-102 = "[ns]「嗯？怎麼了嗎？」"
1009305-103 = "― [log=키라라 반짝부]啊哈哈！沒事！什，什麼都沒有！[/log][wa:2670] "
1009305-104 = "― [log=키라라 반짝부]趕緊塗好，回去讀書吧！[/log][wa:3330] "
1009305-108 = "……嗯！十隻指頭都塗好，已經大功告成囉！"
1009305-112 = "多虧有老師幫忙，我現在可以認真讀書了。"
1009305-113 = "嗯？你說我臉很紅？#n應，應該是老師的錯覺吧？"
1009305-117 = "對了，可能是我腮紅塗太濃的關係，啊哈哈……！"
1009305-118 = "好了好了！現在是上課時間，我們來讀書吧！嗯！其他事情就別在意了！"
1009305-121 = "（之後綺羅羅便帶著滿臉潮紅，繼續認真讀書……）"

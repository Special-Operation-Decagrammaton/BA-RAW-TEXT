[translation]
1009305-1 = "Private Tutoring"
1009305-2 = "After getting Kirara's message, I headed over to the classroom in Gehenna she told me about."
1009305-9 = "Ah! Teach! Thanks for coming!"
1009305-10 = "This is our classroom! What do you think?"
1009305-11 = "[s] \"'Our?' But you're here alone...\""
1009305-12 = "Well, everyone's out doing club activities or dealing with explosions or whatever!"
1009305-13 = "That kind of stuff is a daily occurrence in Gehenna! Don't sweat it!"
1009305-14 = "There's no time for pleasantries! We've got some studying to get to!"
1009305-18 = "Here! Sit next to me!"
1009305-19 = "I need to make sure I study everything that's gonna be on the test, so I'm in focus mode!"
1009305-21 = "Kirara and I studied our hearts out, and before we knew it..."
1009305-31 = "Huh? The class period is over already?"
1009305-32 = "I was so focused, I lost track of the time. I might be, like, a total honor student!"
1009305-33 = "[s] \"You did great! Should we take a break?\""
1009305-34 = "H-Huh? A break? I've still got plenty of juice left!"
1009305-35 = "...Huh? Breaks are an important part of studying?"
1009305-36 = "I mean... You're not wrong..."
1009305-40 = "Haha. Okay, you caught me. I was planning on meeting up with some friends after this!"
1009305-41 = "Sooo... I wanted to wrap this up nice and quick, so I could go hang out! Heehee."
1009305-45 = "[ns] \"Okay, that sounds good.\""
1009305-47 = "[ns1] \"But we can't cut corners with studying.\"\n[ns2] \"This was your request, remember?\""
1009305-50 = "Y-Yeah... I know, I know."
1009305-51 = "Okay! Let's take a proper break, then!"
1009305-52 = "Ah, actually... There was something I meant to do that I haven't gotten 'round to yet..."
1009305-56 = "I've got an idea!"
1009305-57 = "I promise I'll be completely, one hundred percent focused, so you gotta help me with something, Teach!"
1009305-58 = "[s] \"With what...exactly?\""
1009305-59 = "Okay, here's the thing."
1009305-63 = "I finished all the prep work, but I haven't actually applied yet!"
1009305-64 = "It's, like, pretty time consuming, but if you help me it'll go super fast, Teach!"
1009305-65 = "We're on our break anyway, right? What do you think?"
1009305-66 = "[s] \"I'm not against it...but what exactly are we applying?\""
1009305-67 = "Huh? Isn't it totally obvious?"
1009305-68 = "Lemme borrow your desk for a sec, Teach!"
1009305-80 = "― [log=키라라 반짝부]What wrong, Teach? You're being all awkward.[/log][wa:900] "
1009305-81 = "― [log=키라라 반짝부]At this rate, our break is gonna be over, you know.[/log][wa:2360] "
1009305-84 = "― [log=키라라 반짝부]Ah! Do you maybe...not know how to do a pedicure?[/log][wa:1720] "
1009305-85 = "― [log=키라라 반짝부]It's easy! First, you just gotta get up close and personal to the nail...[/log][wa:5140] "
1009305-88 = "[ns5] \"Let me see...\"\n[ns6] \"Like this?\""
1009305-89 = "― [log=키라라 반짝부]U-Um... Y-Yeah! Just like that![/log][wa:2010] "
1009305-90 = "― [log=키라라 반짝부]U-Um... Y-Yeah! Just like that![/log][wa:2010] "
1009305-93 = "― [log=키라라 반짝부]B-But...isn't your face a little close...? Heeheehee![/log][wa:3520] "
1009305-96 = "― [log=키라라 반짝부]Teach...? I can feel the air coming out of your nose...[/log][wa:1170] "
1009305-99 = "― [log=키라라 반짝부]You doing my pedicure... It's a little embarrassing...[/log][wa:880] "
1009305-102 = "[ns] \"Hm? Did you say something?\""
1009305-103 = "― [log=키라라 반짝부]H-Hahaha! Nothing! N-Nothing at all![/log][wa:1830] "
1009305-104 = "― [log=키라라 반짝부]Let's just get this done, so we can study![/log][wa:2090] "
1009305-108 = "...Okay! All ten applied! Mission accomplished!"
1009305-112 = "In return for your help, I guess I gotta study real hard!"
1009305-113 = "H-Huh? My face is red? I-I have no idea what you're talking about, Teach!"
1009305-117 = "Ah! I know! I probably went a little too far with the blush. Hahaha!"
1009305-118 = "All right! Class time! Yeah, I love studying! No more distractions, Teach!"
1009305-121 = "But even after we went back to studying, Kirara's face stayed a strange shade of red."

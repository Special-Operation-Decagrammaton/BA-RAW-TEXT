[translation]
1009305-1 = "ติวหนังสือสองต่อสอง"
1009305-2 = "(หลังคุณครูได้รับการติดต่อจากคิราระก็มุ่งหน้าไปยังห้องเรียนในสถาบันเกเฮนน่า)"
1009305-9 = "อ๊ะ! ครู! แต๊งกิ้วที่มานะ!"
1009305-10 = "เป็นไง? นี่ละห้องเรียนของพวกฉัน!"
1009305-11 = "[s] \"ว่าแต่วันนี้ทำไมถึงได้อยู่คนเดียวล่ะ?\""
1009305-12 = "นั่นน่ะสิ ก็คนอื่นมีธุระไปทำกันหมดเลย ทั้งไปทำกิจกรรมชมรม หรือไม่ก็ไประเบิดนู่นนี่กันอยู่"
1009305-13 = "เรื่องพวกนั้นเป็นชีวิตประจำวันของนักเรียนในเกเฮนน่าน่ะ เรื่องแบบนี้เกิดขึ้นบ่อยๆ อยู่แล้ว ไม่ต้อง#nคิดมากหรอกนะ~"
1009305-14 = "เอาละ ทักทายกันพอหอมปากหอมคอแล้ว ตอนนี้ฉันต้องรีบอ่านหนังสือสอบ!"
1009305-18 = "เอาละ! มานั่งข้างๆ ตรงนี้สิ!"
1009305-19 = "ฉันต้องอ่านเนื้อหาที่ออกสอบให้หมด งั้นวันนี้ฉันจะตั้งใจมากๆ เลย!"
1009305-21 = "(คุณครูติวหนังสือให้กับคิราระอย่างขะมักเขม้น...)"
1009305-31 = "หืม? หมดไปคาบหนึ่งแล้วเหรอเนี่ย?"
1009305-32 = "นี่สินะที่บอกว่าพอตั้งใจทำอะไรมากๆ แล้วเวลาจะผ่านไปเร็ว เมื่อกี้ฉันเป็นนักเรียนดีเด่นเลยสินะ!"
1009305-33 = "[s] \"ทำได้ดีมากเลย พักสมองสักหน่อยมั้ย?\""
1009305-34 = "หะ... หืม? ฉันยังไหวอยู่นะ! ยังมีกำลังเหลือ และยังตั้งใจเรียนต่อได้นะ!"
1009305-35 = "หืม? การพักผ่อนก็เป็นส่วนหนึ่งของการเรียนงั้นเหรอ?"
1009305-36 = "ก็นะ... มันก็จริงอย่างที่ครูว่า..."
1009305-40 = "อะฮ่าฮ่า ที่จริงแล้วฉันว่าจะไปเที่ยวเล่นกับเพื่อนๆ หลังติวหนังสือเสร็จน่ะ"
1009305-41 = "เพราะงั้นก็เลยอยากรีบติวให้มันเสร็จๆ ไปน่ะ~ อะฮ่าฮ่า"
1009305-45 = "[ns] \"ถ้างั้นก็ได้\""
1009305-47 = "[ns1] \"แต่จะรีบติวให้เสร็จแบบลวกๆ ไม่ได้หรอกนะ\"\n[ns2] \"พักสักหน่อยแล้วค่อยมาติวอีกรอบเถอะ\""
1009305-50 = "อะ... อื้ม เข้าใจแล้ว"
1009305-51 = "ถ้างั้นก็ควรพักสักหน่อยสินะ"
1009305-52 = "อ๊ะ จะว่าไปฉันยังมีเรื่องที่ยังไม่ได้ทำเลย..."
1009305-56 = "ดีละ งั้นเอาอย่างนี้แล้วกัน"
1009305-57 = "เวลาที่เหลือฉันจะตั้งใจติวหนังสือให้หนักกว่าเดิมอีก งั้นครูก็ช่วยฉันหน่อยนะ!"
1009305-58 = "[s] \"ให้ช่วยเหรอ...? ช่วยอะไร?\""
1009305-59 = "ก็แบบว่า"
1009305-63 = "ฉันเตรียมของมาแล้ว แต่ว่ายังทาไม่เสร็จน่ะ!"
1009305-64 = "ถ้าทาคนเดียวก็น่าจะต้องใช้เวลาเยอะเลย ถ้าได้ครูมาช่วยก็น่าจะเสร็จเร็วอยู่นะ!"
1009305-65 = "แล้วตอนนี้ก็เป็นเวลาพักของเราด้วยไม่ใช่เหรอ?"
1009305-66 = "[s] \"ครูก็พอช่วยได้หรอกนะ... ว่าแต่จะทำอะไรเหรอ?\""
1009305-67 = "หืม? ก็ทา 'ตรงนี้' ไงล่ะ!"
1009305-68 = "งั้นฉันขอยืมใช้โต๊ะครูแป๊บหนึ่งนะ!"
1009305-80 = "― [log=키라라 반짝부]เป็นอะไรไปล่ะครู? ทำไมทำท่าอึกอักแบบนั้นล่ะ?[/log][wa:900] "
1009305-81 = "― [log=키라라 반짝부]ถ้ามัวอึกอักอยู่แบบนั้น เดี๋ยวจะหมดเวลาพักนะ?[/log][wa:2600] "
1009305-84 = "― [log=키라라 반짝부]อ๋อ~ หรือว่า ไม่รู้วิธีทาเล็บเท้างั้นเหรอ?[/log][wa:2000] "
1009305-85 = "― [log=키라라 반짝부]เรื่องง่ายๆ น่า! ก่อนอื่นก็ให้ตั้งใจดูตำแหน่งที่จะทาให้ดีๆ...[/log][wa:5620] "
1009305-88 = "[ns5] \"ไหนดูซิ...\"\n[ns6] \"ตั้งใจดูแบบนี้พอได้ไหม...\""
1009305-89 = "― [log=키라라 반짝부]อึก... ชะ... ใช่แล้ว! แบบนั้นละ![/log][wa:1970] "
1009305-90 = "― [log=키라라 반짝부]อึก... ชะ... ใช่แล้ว! แบบนั้นละ![/log][wa:1970] "
1009305-93 = "― [log=키라라 반짝부]ตะ... แต่ว่า... เอาหน้าเข้าไปใกล้มากเกินไปรึเปล่า...อะฮ่าฮ่า![/log][wa:3200] "
1009305-96 = "― [log=키라라 반짝부]ครู ไอลมหายใจออกมาเยอะจังเลย...[/log][wa:2130] "
1009305-99 = "― [log=키라라 반짝부]พอให้ครูทำให้ มันก็เขินอยู่นะ...[/log][wa:1760] "
1009305-102 = "[ns] \"หืม? ว่าไงนะ?\""
1009305-103 = "― [log=키라라 반짝부]อะฮ่าฮ่า! ไม่หรอก! มะ... ไม่มีอะไรหรอก![/log][wa:1710] "
1009305-104 = "― [log=키라라 반짝부]รีบๆ ทา แล้วไปเรียนกันเถอะ![/log][wa:2690] "
1009305-108 = "อื้อ...! ครบ 10 นิ้วแล้ว งั้นก็เสร็จแล้วละ!"
1009305-112 = "ครูช่วยฉันไปแล้ว งั้นจากนี้ฉันจะตั้งใจเรียนให้นะ"
1009305-113 = "หะ... หืม? ฉันหน้าแดงงั้นเหรอ? พูดอะไรของครูน่ะ ไม่เห็นจะเข้าใจเลย"
1009305-117 = "อ้อ สงสัยว่าฉันจะปัดแก้มมาเยอะเกินไปน่ะ อะฮ่าฮ่า...!"
1009305-118 = "เอาละ! ตอนนี้เป็นเวลาติวหนัวสือแล้ว งั้นก็ต้องมีสมาธิ! อื้ม! อย่าสนใจเรื่องอื่นละ!"
1009305-121 = "(หลังจากนั้นคิราระก็ตั้งใจเรียนทั้งที่หน้าแดงแปลกๆ...)"

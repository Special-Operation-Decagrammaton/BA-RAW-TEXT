[translation]
1600802-1 = "怠惰警官的發想"
1600802-2 = "（有點在意吹雪傳來的MomoTalk，所以來到了生活安全局）"
1600802-4 = "女武神警察學園．生活安全局"
1600802-6 = "哎呀，真是不好意思呢……"
1600802-7 = "真的能收下這麼多甜甜圈嗎……？"
1600802-8 = "生活安全局，萬歲……"
1600802-9 = "[s] 搖搖吹雪的肩膀叫醒她"
1600802-10 = "嗯……？"
1600802-11 = "咦……老師？"
1600802-12 = "難得我午覺睡得這麼香……"
1600802-17 = "所以呢，今天怎麼會突然到生活安全局來？"
1600802-18 = "如果是麻煩的案件請交給桐乃或是其他局處吧。我忙著睡午覺呢。"
1600802-19 = "[s1] 「『忙著睡午覺』是指……？\n[s2] 「想問你剛剛在MomoTalk上說的事……」"
1600802-20 = "MomoTalk？今天有發訊息給老師嗎？"
1600802-21 = "MomoTalk？今天有發訊息給老師嗎？"
1600802-22 = "……啊，難不成。"
1600802-28 = "……啊啊，是腳本出問題了。"
1600802-29 = "抱歉抱歉。女武神內部的定期聯絡好像不小心發給老師了。沒什麼特別的，別在意。"
1600802-30 = "[s]「腳本 ……？」"
1600802-31 = "嗯。我把從千年那裡買來的程式稍微修改了一下，讓它能夠代替我工作。"
1600802-32 = "只要啟動它的話，不管有什麼陳情都會自動幫我處理掉的。"
1600802-33 = "比方說……"
1600802-37 = "「吹雪，明天早上的定期會議你沒有忘記吧？可別遲到了哦！」"
1600802-38 = "嗯，那件事我知道的，別擔心"
1600802-39 = "「吹雪，上周的巡邏記錄在你手上嗎？明明得寫報告的，我卻找不到……」"
1600802-40 = "這個我也不太清楚……總之先去警備局問問看怎麼樣？"
1600802-41 = "……大概就是這種感覺！"
1600802-42 = "嘛，雖然演算法還有點小問題，但是能有這種程度的話，在大多數的場合應該都不會暴露的。在此之前也順利地把事情都推給其他部署了。"
1600802-43 = "這樣我就能在這段期間做更有生產力的事了。"
1600802-44 = "像是睡午覺、吃點心之類的。"
1600802-45 = "[s3] 「……這樣真的沒問題嗎？」\n[s4] 「如果發生了真的很重要的事情的時候……？」"
1600802-46 = "別擔心別擔心，再怎麼說也幾乎不會有「真的很重要的事情」送到生活安全局來嘛。"
1600802-47 = "別擔心別擔心，再怎麼說也幾乎不會有「真的很重要的事情」送到生活安全局來嘛。"
1600802-48 = "大部分都是用罐頭訊息就能解決的麻煩陳情而已哦。"
1600802-49 = "嘛，就算有腳本處理不了的麻煩是找上門來，桐乃她們也會好好處理的。"
1600802-50 = "[s] 「唔嗯……」"
1600802-51 = "呼啊……還沒睡夠……"
1600802-52 = "那麼老師，我要認真睡午覺了。如果你願意幫我盯著腳本有沒有好好工作就幫大忙了。"
1600802-53 = "晚安囉。"
1600802-58 = "（之後……）"
1600802-63 = "吹雪，這裡是警備局。現在是你值勤的時間對吧？"
1600802-64 = "嗯，那件事我知道的，別擔心"
1600802-65 = "那麼，努力工作吧"
1600802-66 = "……這是什麼態度。"
1600802-67 = "還有，你什麼時候努力工作了……"
1600802-68 = "這個我也不太清楚……"
1600802-69 = "別自己這麼說啊！這裡應該要反駁吧！？"
1600802-70 = "……算了。事到如今就算對生活安全局生氣，也只會讓自己心情很差而已，這點我已經知道了。"
1600802-71 = "這次之所以跟生活安全局聯絡，是和之前借給你們的路障有關。你們打算什麼時候還呢？"
1600802-72 = "因為一直都沒有歸還，我們警備局也有點困擾。"
1600802-73 = "總之先去警備局問問看怎麼樣？"
1600802-74 = "……我們就是警備局啊！？"
1600802-75 = "難道是在耍我嗎……？"
1600802-76 = "嗯，我也這麼覺得"
1600802-80 = "……"
1600802-81 = "……我知道了。"
1600802-82 = "我現在就過去生活安全局。你給我等著，吹雪！"
1600802-86 = "……？好像有什麼吵鬧的聲音……"
1600802-87 = "老師，我睡覺的時候發生什麼了嗎？"
1600802-88 = "[s5] 慢慢移開視線\n[s6] 「自己的工作要自己好好做啊……」"
1600802-89 = "咦，咦？什麼意思？難道真的發生什麼大問題了嗎？"
1600802-90 = "咦，咦？什麼意思？難道真的發生什麼大問題了嗎？"
1600802-91 = "老師？老師！？"
1600802-93 = "（之後吹雪被來到生活安全局的警備局幹部臭罵了一頓，寫了大量的檢討報告……）"

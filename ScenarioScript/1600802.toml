[translation]
1600802-1 = "A Lazy Cop's Invention"
1600802-2 = "Fubuki's last MomoTalk message was on my mind, so I went to the Public Safety Bureau offices."
1600802-4 = "Valkyrie Public Safety Bureau"
1600802-6 = "Zzz... Heh. Heh heh heh..."
1600802-7 = "It's raining donuts from the heavens... Zzz..."
1600802-8 = "Zzz... Working at the Public Safety Bureau is the best..."
1600802-9 = "[s] Shake Fubuki awake."
1600802-10 = "Hmm?"
1600802-11 = "Sen...sei?"
1600802-12 = "Why'd you have to wake me?! I was having the most wonderful dream."
1600802-17 = "So, what brings you to the Public Safety Bureau?"
1600802-18 = "If you've got some annoying request to put in, then I suggest you find Kirino or anyone else. I've got plenty of sleep to catch up on."
1600802-19 = "[s1] \"You've been asleep this entire time? But MomoTalk...\"\n[s2] \"What about the MomoTalk message you sent me?\""
1600802-20 = "MomoTalk? I don't know what you're talking about. I've been sleeping all day."
1600802-21 = "MomoTalk? I don't know what you're talking about. I've been sleeping all day."
1600802-22 = "Wait. I wonder..."
1600802-28 = "Oh. The macro must have malfunctioned."
1600802-29 = "Sorry. Looks like the report notification got sent to you by mistake.#nDon't worry about me. I'm okay."
1600802-30 = "[s] \"Macro?\""
1600802-31 = "Yeah. I modified a macro program I bought from Millennium and made an answering machine so to speak that can do my job."
1600802-32 = "When I have it turned on, it can automatically handle civil complaints that come in to the Public Safety Bureau."
1600802-33 = "For example..."
1600802-37 = "\"Fubuki, remember the meeting tomorrow morning? Don't be late!\""
1600802-38 = "\"Yeah, I know. Don't worry.\""
1600802-39 = "\"Fubuki, did you see the patrol log from last week? I have to write a report, but I can't find it.\""
1600802-40 = "\"I don't know... You should contact the Security Bureau.\""
1600802-41 = "See? Pretty cool, huh?"
1600802-42 = "The algorithm isn't perfect, but it can still pass most tasks on to other departments."
1600802-43 = "In the meantime, I can do something more productive."
1600802-44 = "Like taking naps, snacking..."
1600802-45 = "[s3] \"Is something like this even allowed?\"\n[s4] \"What if something really important comes up?\""
1600802-46 = "Don't worry about it. The Public Safety Bureau NEVER has anything important to do."
1600802-47 = "Don't worry about it. The Public Safety Bureau NEVER has anything important to do."
1600802-48 = "All we ever get are a bunch of annoying complaints that I have to give the same answer for over and over again."
1600802-49 = "Kirino would just take care of it herself even if something big came in that the macro couldn't handle. I don't need to lift a finger."
1600802-50 = "[s] \"But...\""
1600802-51 = "*yawn* Man, I'm sleepy. Maybe it's because my nap got cut short."
1600802-52 = "I'mma go back to sleep. Keep an eye on things around here for me,#nwill ya, Sensei? Make sure the macro keeps working."
1600802-53 = "See ya!"
1600802-58 = "Moments later."
1600802-63 = "This is the Security Bureau. How goes work, Cadet Fubuki?"
1600802-64 = "\"Yeah, I know. Don't worry.\""
1600802-65 = "\"I'm working as hard as ever.\""
1600802-66 = "Excuse me? Mind your manners."
1600802-67 = "Speaking of your work ethic, we've been finding it to be lacking."
1600802-68 = "\"I'm not sure...\""
1600802-69 = "Don't pretend to not know what I'm talking about!"
1600802-70 = "You Public Safety Bureau cadets... There's no getting through to you."
1600802-71 = "I'm contacting you regarding the barricade your bureau borrowed.#nWhen will you be returning it?"
1600802-72 = "The Security Bureau would like it back as soon as possible."
1600802-73 = "\"Why don't you contact the Security Bureau?\""
1600802-74 = "Excuse me? This IS the Security Bureau!"
1600802-75 = "Do you think we're fools?"
1600802-76 = "\"Yeah, I think so too.\""
1600802-80 = "..."
1600802-81 = "This is unacceptable."
1600802-82 = "Fubuki, I'm on my way to the Public Safety Bureau office now.#nDon't go anywhere!"
1600802-86 = "*yawn* What was all that noise about?"
1600802-87 = "Did I miss something while I was asleep?"
1600802-88 = "[s5] Avoid eye contact with Fubuki.\n[s6] \"You should put your affairs in order.\""
1600802-89 = "Wh-What's going on? Did I really miss something important?"
1600802-90 = "Wh-What's going on? Did I really miss something important?"
1600802-91 = "Answer me, Sensei!"
1600802-93 = "Fubuki was scolded by the Security Bureau officer and ended up writing a lengthy apology letter."

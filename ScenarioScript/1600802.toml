[translation]
1600802-1 = "สิ่งประดิษฐ์ของตำรวจจอมขี้เกียจ"
1600802-2 = "(คุณครูนึกกังวลกับ MOMOTALK ที่ฟุบุกิส่งมาก็เลยแวะมาที่สำนักงานรักษาความปลอดภัย)"
1600802-4 = "สำนักรักษาความปลอดภัย สถาบันฝึกตำรวจวัลคิรี่"
1600802-6 = "แฮ่... คร่ออกกก... ฟี้..."
1600802-7 = "โดนัทหล่นลงมาจากท้องฟ้าเยอะเลย... ง่ำๆ  คร่อกกก..."
1600802-8 = "คร่อออก... สำนักรักษาความปลอดภัยนี่ยอดเยี่ยมที่สุดจริงๆ ด้วย..."
1600802-9 = "[s] เขย่าตัวฟุบุกิเบาๆ เพื่อปลุกให้ตื่น"
1600802-10 = "หืมมม?"
1600802-11 = "ใครเนี่ย? คุณครูเองเหรอ?"
1600802-12 = "กำลังนอนกลางวันอย่างเอร็ดอร่อยอยู่เลย มาปลุกทำไมเนี่ย ชิส์..."
1600802-17 = "มาที่สำนักรักษาความปลอดภัยมีธุระอะไรเหรอ?"
1600802-18 = "ถ้ามีธุระพวกคำขอวุ่นวายละก็ไปหาคิริโนะ หรือไม่ก็นักเรียนคนอื่นดีกว่า ฉันกำลังยุ่งอยู่กับการ#nนอนกลางวันนะ"
1600802-19 = "[s1] “นอนกลางวันในเวลาทำงานอย่างงั้นเหรอ...”\n[s2] “แล้ว MOMOTALK ที่ส่งมาเมื่อกี้คืออะไร?”"
1600802-20 = "ข้อความที่ส่งไปงั้นเหรอ? ฉันนอนกลางวันอยู่จนถึงเมื่อกี้เลยนะ"
1600802-21 = "MOMOTALK ที่ส่งไปงั้นเหรอ? ฉันนอนกลางวันอยู่จนถึงเมื่อกี้เลยนะ"
1600802-22 = "หรือว่า..."
1600802-28 = "อ๋อ โปรแกรมมาโครน่าจะทำงานผิดปกติน่ะ"
1600802-29 = "โทษที โทษที เหมือนว่าข้อความรายงานที่กำหนดให้ส่งไปที่สำนักความมั่นคงจะถูกส่งไปหา#nคุณครูโดยไม่ได้ตั้งใจ ฉันสบายดีน่ะ ไม่ต้องเป็นห่วงหรอก"
1600802-30 = "[s] \"มาโคร...?"
1600802-31 = "อืม ฉันปรับแต่งโปรแกรมมาโครที่ซื้อมาจากมิลเลเนียมนิดหน่อยให้เป็นเครื่องตอบกลับ#nอัตโนมัติสำหรับทำงานแทนฉันน่ะ"
1600802-32 = "แค่เปิดเครื่องตอบกลับอัตโนมัตินี้เอาไว้ ก็จะจัดการคำร้องต่างๆ ที่ถูกส่งเข้ามาที่สำนักงาน#nรักษาความปลอดภัยได้โดยอัตโนมัติ"
1600802-33 = "ยกตัวอย่างเช่น..."
1600802-37 = "<ฟุบุกิ ไม่ลืมเรื่องการประชุมพรุ่งนี้ใช่มั้ย? ห้ามมาสายเด็ดขาดเลยนะ!>"
1600802-38 = "<อื้อ ฉันรู้แล้ว ไม่ต้องห่วงหรอก>"
1600802-39 = "<ฟุบุกิ เห็นบันทึกการลาดตระเวนเมื่อสัปดาห์ที่แล้วมั้ย? ฉันจะเขียนรายงานแต่หาไม่เจอเลย>"
1600802-40 = "<ฉันก็ไม่รู้เหมือนกันแฮะ... เดี๋ยวจะลองไปถามที่สำนักความมั่นคงให้แล้วกันนะ>"
1600802-41 = "เห็นมั้ย เจ๋งสุดๆ เลย!"
1600802-42 = "ถึงจะสร้างขึ้นจากอัลกอริทึมแบบหยาบๆ แต่แค่นี้ก็พอจะส่งงานต่อให้แผนกอื่นโดยที่ไม่ถูกจับได้แล้ว"
1600802-43 = "แล้วระหว่างนั้นฉันก็จะทำงานได้อย่างมีประสิทธิภาพมากขึ้นเลยล่ะ"
1600802-44 = "ไม่ว่าจะนอนกลางวันหรือกินขนม..."
1600802-45 = "[s3] “...ใช้ของแบบนี้ได้เหรอ?”\n[s4] “แล้วถ้าเกิดเรื่องใหญ่ขึ้นมาจริงๆ จะทำยังไง?”"
1600802-46 = "อย่าห่วงไปเลย ไม่ค่อยมีเรื่องใหญ่อะไรเข้ามาที่สำนักงานรักษาความปลอดภัยหรอก"
1600802-47 = "อย่าห่วงไปเลย ไม่ค่อยมีเรื่องใหญ่อะไรเข้ามาที่สำนักงานรักษาความปลอดภัยหรอก"
1600802-48 = "มีแต่คำร้องที่น่ารำคาญที่ต้องคอยตอบซ้ำๆ เหมือนนกแก้วนกขุนทองเท่านั้นแหละ"
1600802-49 = "แล้วก็นะ สมมุติว่ามีเรื่องใหญ่ที่มาโครรับมือไม่ได้เข้ามาเดี๋ยวคิริโนะก็จัดการเองนั่นแหละ#nไม่ต้องถึงมือฉันหรอก"
1600802-50 = "[s] “แต่ว่า...”"
1600802-51 = "ฮ้าว... เพราะโดนปลุกขึ้นมาระหว่างนอนกลางวันหรือเปล่านะ เหนื่อยจริงๆ เลย"
1600802-52 = "คุณครู ฉันจะนอนต่อแล้ว ระหว่างนี้ก็ฝากดูด้วยนะว่ามาโครทำงานปกติดีรึเปล่า"
1600802-53 = "งั้นไว้เจอกันนะ~"
1600802-58 = "(...ครู่ต่อมา)"
1600802-63 = "ติดต่อจากสำนักความมั่นคง... ตั้งใจทำงานอยู่ใช่ไหม ฟุบุกิ ?"
1600802-64 = "อื้อ ฉันรู้แล้ว ไม่ต้องห่วงหรอกน่า"
1600802-65 = "ฉันตั้งใจทำงานตลอดอยู่แล้ว"
1600802-66 = "ทำไมถึงเอาแต่พูดห้วนๆ แบบนี้ล่ะ"
1600802-67 = "แล้วอย่างเธอเนี่ยนะ ตั้งใจทำงานอยู่ตลอด?"
1600802-68 = "<เรื่องนั้นฉันก็ไม่รู้เหมือนกัน…>"
1600802-69 = "อย่ามาแกล้งทำเป็นไม่รู้หน่อยเลย~!"
1600802-70 = "คงต้องไปต่อว่าสำนักงานรักษาความปลอดภัยอย่างจริงจังสักทีแล้ว"
1600802-71 = "ที่ติดต่อมาก็ไม่ใช่อะไรหรอก เมื่อไรจะคืนแผงกั้นที่ยืมไปสักทีล่ะ?"
1600802-72 = "นักเรียนของสำนักความมั่นคงกำลังลำบากกันมากเพราะการส่งคืนที่ล่าช้านะ"
1600802-73 = "<เดี๋ยวจะลองไปถามที่สำนักความมั่นคงให้แล้วกันนะ>"
1600802-74 = "อะไรนะ...นี่เธอละเมออยู่รึเปล่า? บอกแล้วไงว่าที่นี่คือสำนักความมั่นคงน่ะ!"
1600802-75 = "เธอคิดว่าพวกเราซื่อบื้องั้นเหรอ?"
1600802-76 = "<อื้อ ฉันก็คิดแบบนั้นล่ะ>"
1600802-80 = "..."
1600802-81 = "เรื่องนี้คงจะปล่อยไปเฉยๆ ไม่ได้แล้ว..."
1600802-82 = "ฟุบุกิ รออยู่ที่นั่นเลยนะ ฉันจะไปที่สำนักงานรักษาความปลอดภัยเดี๋ยวนี้ล่ะ!"
1600802-86 = "หืม...? เสียงดังโวยวายอะไรกัน..."
1600802-87 = "คุณครู เกิดอะไรขึ้นระหว่างที่ฉันหลับรึเปล่า?"
1600802-88 = "[s5] หลบสายตาฟุบุกิ\n[s6] “งานของใครคนนั้นก็รับผิดชอบเองจะดีกว่า”"
1600802-89 = "ทำไมถึงทำแบบนั้นล่ะ? เกิดเรื่องใหญ่ขึ้นระหว่างที่ฉันนอนงั้นเหรอ?"
1600802-90 = "ทำไมถึงพูดแบบนั้นล่ะ? เกิดเรื่องใหญ่ขึ้นระหว่างที่ฉันนอนงั้นเหรอ?"
1600802-91 = "ตอบมานะ คุณครู!"
1600802-93 = "(หลังจากนั้นฟุบุกิก็ถูกเจ้าหน้าที่สำนักความมั่นคงที่มาหาดุไปยกใหญ่ และต้องเขียนหนังสือ#nขอโทษหลายฉบับ...)"

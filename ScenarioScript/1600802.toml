1600802-46 = "3;후부키;00;걱정 마, 걱정 마. 애초에 생활안전국에는 큰일이 거의 들어오지 않으니까.\n#3;em;[반응]"
1600802-47 = "3;후부키;00;걱정 마, 걱정 마. 애초에 생활안전국에는 큰일이 거의 들어오지 않으니까.\n#3;em;[반응]"

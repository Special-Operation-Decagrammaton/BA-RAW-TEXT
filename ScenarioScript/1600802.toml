1600802-49 = "3;후부키;02;그리고 설령 매크로로 감당할 수 없는 큰일이 들어온다 하더라도 키리노가 호들갑을 떨며 알아서 처리해 줄 테니까— 내가 나설 필요는 없어."
1600802-50 = "[s] \"하지만……\""

[translation]
11001-2 = "รู้สึกว่าการต่อสู้ครั้งนี้ออกมาราบรื่นกว่าปกติแฮะ..."
11001-3 = "นั่นสินะ..."
11001-4 = "เพราะได้คุณครูคอยออกคำสั่งยังไงล่ะคะ เราก็เลยต่อสู้ได้อย่างคล่องแคล่วกว่าปกติมาก"
11001-5 = "นี่สินะความสามารถของคนที่จะมาเป็นคุณครู...#nแต่ถ้าเป็นคนที่ประธานองค์การนักเรียนเลือกมาแล้วก็คงไม่ใช่เรื่องน่าแปลก..."
11001-7 = "ถ้าอย่างนั้นในการต่อสู้ครั้งต่อไปก็ขอรบกวนด้วยนะคะ คุณครู"

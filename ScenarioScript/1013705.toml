1013705-1 = "#title;그 형사의 드레스"
1013705-2 = "3;코노카;01;여어-! 오셨슴까, 선생님.\n#3;em;[음표]\n#3;a"
1013705-3 = "3;코노카;02;꼬리는 안 붙이고 잘 오셨슴까? 알려지면 곤란한 정보라 말임다."
1013705-4 = "[s1] \"꼬리는 원래 없는…… 데?\"\n[s2] \"대체 무슨 정보길래……?\""
1013705-5 = "#wait;10"
1013705-6 = "#wait;10"
1013705-7 = "3;코노카;02;여기서 말하기는 좀 그렇슴다. 들어가시죠, 눈이 많슴다.\n#3;em;[반응]"
1013705-8 = "3;코노카;07;아, 들어가셔서 보시게 될 것은, 이미 말씀드렸지만 비밀임다."
1013705-9 = "3;코노카;03;잊어버린 수많은 비밀들처럼, 스스로도 잊으셔야 함다."

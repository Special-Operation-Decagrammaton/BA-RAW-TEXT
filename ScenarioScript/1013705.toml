1013705-44 = "3;코노카;99;흥흥~ 경찰이 뜨~면~ 헬멧단 울~고~\n#3;greeting"
1013705-45 = "#st;[0,0];instant;1;"
1013705-46 = "#clearST"
1013705-47 = "3;코노카;01\n#3;m4\n#wait;1000"
1013705-48 = "3;코노카;02;도~망~치면~ 너는 죽~는다~  \n#3;greeting"
1013705-49 = "3;코노카;11;윽, 색 배치는 좋은데…… 밸런스가 영 아니잖아, 넌 탈락!\n#3;em;[!]"
1013705-50 = "[ns3] \"코노카는 알로하 셔츠에 빠삭하네.\"\n[ns4] \"예전부터 좋아했던 거야?\""
1013705-51 = "#wait;10"
1013705-52 = "#wait;10"
1013705-53 = "3;코노카;02;예전, 말임까? 아님다. 원래 이런 옷, 예전에는 한 번도 안 입었슴다.\n#3;em;[반응]\n#3;m3"
1013705-54 = "3;코노카;16;딱히 관심도 없었고, 굳이 말하면 싫어하던 쪽?"
1013705-55 = "3;코노카;01;본격적으로 맛 들이고 알로하 셔츠의 진가를 알게 된 건 발키리에 와서부터임다."
1013705-56 = "3;코노카;02;혹시, 궁금하심까? 어쩌다가 입게 됐는지.\n#3;em;[?]"
1013705-57 = "[s] \"어쩌다가 입게 된…… 헉!!\""
1013705-58 = "3;코노카;99;캬. 이래 봬도 부국장이라고, 다 꿰뚫어 보이지 말임다.\n#3;em;[반짝]"
1013705-59 = "3;코노카;18;그게에~ 언제여었더어라~"
1013705-60 = "3;코노카;10;뭐, 1학년 때 일임다. 꼴 보기 싫은 깡패들 때려잡으면 칭찬받는 학교가 있다길래 입학한 직후였슴다."
1013705-61 = "3;코노카;16;주먹질, 총질. 그런 것밖에 모르니까 다들 그렇듯이 사수를 한 명 붙여줬슴다. 말수는 적으면서 거 되게 잔소리는 많은, 무지 골치 아픈 사수였는데…….\n#3;em;[...]"
1013705-62 = "3;코노카;02;그러다가 제보 받고 둘이서 출동했는데, 아이고야. 함정이었슴다. 와서 몰매를 때리는 거 아님까."
1013705-63 = "3;코노카;01;나중에는 걔들이 경찰 부르려고 하던데, 어쨌든 이기긴 이겼지만, 완전 묵사발이 났슴다. 옷도 다 찢어지고, 거지꼴이 됐슴다."
1013705-64 = "[s] \"경찰한테 맞아서 경찰을 불렀어……?\""
1013705-65 = "3;코노카;09;제 사수가 민중의 지팡이보다는, 민중의 삼단봉같이 생긴 것도 있고…….\n#3;em;[땀]"
1013705-66 = "3;코노카;01;아무튼, 그대로 복귀할 수는 없어서 옷이라도 갈아입고 가려 했는데, 유일하게 문 연 옷 가게가 여기밖에 없었슴다."
1013705-67 = "3;코노카;03;여길 봐도 알로하, 저길 봐도 알로하, 알로하, 알로하! 무지 웃겼슴다!\n#3;em;[재잘]\n#3;hophop"
1013705-68 = "3;코노카;03\n#na;옷가게 주인;흰 셔츠가 하도 엉망이어서, 처음에는 얼핏 보고 알로하 셔츠를 입고 들어오는 줄 알았다니깐?"
1013705-69 = "3;코노카;16;이야, 스토리에 생동감을 더하는 생생한 증언까지!\n#3;em;[!]"
1013705-70 = "3;코노카;02;그래서, 어쩔 수 없이 사수하고 같이 알로하 셔츠 입고 복귀했는데, 거울 보니까 꽤 어울려서 저는 계속 입고 있슴다. 이래저래 수사할 때 편하기도 하고 말임다."
1013705-71 = "#st;[0,0];instant;1;"
1013705-72 = "#clearST"
1013705-73 = "3;코노카;02\n#3;greeting\n#wait;1400"
1013705-74 = "3;코노카;01;오! 이거다! 안 그래도 오리 그려진 거 하나 갖고 싶었는데!\n#3;jump"
1013705-75 = "3;코노카;03;여기 한 벌 더 있으니까, 선생님도 똑같은 거 장만해 드리겠슴다. 이건 제가 드리는 선물로 달아두십쇼!\n#3;greeting"
1013705-76 = "3;코노카;16;주인장, 나 갑니다! 이거 두 벌 빼두십쇼."
1013705-77 = "3;옷가게 주인;00;두 벌 오케이~ 선생님께 잘 어울릴 것 같네요~\n#3;em;[음표]"
1013705-78 = "[s] \"계산은요?\""
1013705-79 = "3;옷가게 주인;00;형사 아가씨가 지갑 들고 다니기 귀찮다고, 한 300벌은 미리 사뒀어요."
1013705-80 = "3;옷가게 주인;00;또 오십쇼, 꼭 소문 내주시고요!\n#3;em;[반응]"
1013705-81 = "#all;hide"
1013705-82 = "3;코노카;03;하~ 쇼핑 최고, 최고~\n#3;a\n#3;em;[재잘]\n#3;hophop"
1013705-83 = "3;코노카;07;우리만의 비밀, 꼭 지켜주십쇼. 저랑만 오시는 검다."
1013705-84 = "3;코노카;08;간만에 옛날 일도 떠올리니까 좋지 말임다. 사수랑 구르던 시절도 그립고."
1013705-85 = "3;코노카;16;그때 누님이 알로하 셔츠 입은 걸 사진으로 찍었어야 했는데, 그건 아깝슴다.\n#3;em;[음표]\n#3;closeup"
1013705-86 = "[s] \"누님? 그렇다면, 그 사수라는 게……?!\""
1013705-87 = "3;코노카;02;엥? 당연한 거 아님까. 달리 누가 있다고."
1013705-88 = "3;코노카;16;양아치한테 미친개를 붙이자는 생각을 한 당시 윗선은 대단하긴 함다.\n#3;em;[한숨]"
1013705-89 = "3;코노카;03;그럼 다음에 뵙겠슴다. 옷, 꼭 한번 빨고 입으십쇼!"
1013705-90 = "3;코노카;01;빠빠이-\n#3;em;[하트]"

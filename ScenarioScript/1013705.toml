1013705-16 = "5;코노카;01;어, 저도 잘 지냈슴다. 안부 물어봐 줘서 엄청 고맙슴다. \n#3;m1\n#5;al\n#5;em;[재잘]"
1013705-17 = "5;코노카;07;손님 데리고 온 검다. 안심하십쇼, 절대로 소문내지 않을 사람이니까."
1013705-18 = "5;코노카;03;여기는 아는 사람만 아는 명소로 남겨줄 테니, 걱정하지 마십쇼."
1013705-19 = "5;코노카;03\n#na;???;시마 코노카…… 또 멋대로……!!!\n#3;h\n#3;stiff"

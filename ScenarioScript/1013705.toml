1013705-23 = "#all;hide"
1013705-24 = "3;옷가게 주인;00;옷 가게인데 소문이 안 나면 어떡하라는 거야!!!\n#3;closeup\n#fontsize;80"
1013705-25 = "1;옷가게 주인;00\n5;코노카;01;에이, 그래도 제가 잔뜩 사잖슴까.\n#3;hide\n#5;em;[음표]"
1013705-26 = "1;옷가게 주인;00;다른 사람도 아는 명소로 좀 만들어 달라고!!\n#1;em;[!]"
1013705-27 = "1;옷가게 주인;00\n5;코노카;01\n#1;h\n#5;h"
1013705-28 = "[ns] \"여기, 옷 가게였니?\""
1013705-29 = "5;코노카;16;넵, 맞슴다. 제가 아는 한, 알로하 셔츠를 구하기엔 이만한 곳이 없슴다.\n#5;em;[재잘]"
1013705-30 = "5;코노카;01;구제부터 신품까지, 센스 있게 색깔별로도 전시해 놓은 숨겨진 성지임다.\n#5;m4"
1013705-31 = "1;옷가게 주인;00;숨긴 적 없어!! 네가 숨기는 거잖아!\n#1;em;[스팀]\n#1;hophop"
1013705-32 = "5;코노카;18;그래도 제가 한번 오면 열 명분은 사지 않슴까. 삐지지 마십쇼."
1013705-33 = "5;코노카;02;괜히 어중이떠중이들이 와서 소문나면 희귀한 물건도 뺏기고, 괜히 경쟁만 늘어남다."
1013705-34 = "1;옷가게 주인;00;샬레의 선생님이시죠? 선생님은 소문 내주셔도 좋습니다! 아니, 제발 부탁드려요!\n#1;em;[땀]"
1013705-35 = "5;코노카;01;제가 막을 검다! 메롱!\n#5;jump\n#5;m5"
1013705-36 = "1;옷가게 주인;00;아휴, 이게 경찰이야 깡패야……!\n#1;m3\n#5;dr\n#1;em;[한숨]"
1013705-37 = "1;옷가게 주인;00;그래도, 맞는 말이지. 심오한 알로하 셔츠의 세계를 이해하는 녀석들은 많지 않으니까."
1013705-38 = "1;옷가게 주인;00;아가씨 말대로, 가끔 이렇게 조예가 깊은 손님들만 소개해주는 건 좋기는 해."
1013705-39 = "3;코노카;03;주인장도 좋으면서. 그러면, 찬찬히 둘러보겠슴다.\n#3;em;[음표]\n#1;hide"
1013705-40 = "3;코노카;01;그럼 우리집에~ 데려갈 친구들을 골라볼까~요~"

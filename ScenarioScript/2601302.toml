[translation]
2601302-1 = "看不見卻不會消失的事物"
2601302-2 = "啊，[USERNAME]老師。"
2601302-3 = "好久不見。"
2601302-4 = "[s1]「敦子，你看起來好像很開心。」\n[s2]「敦子，你看起來好像很興奮。」"
2601302-7 = "是嗎？"
2601302-8 = "本來以為跟平常差不多的……"
2601302-9 = "看來是我的表情露餡了。"
2601302-10 = "沒錯，其實我現在稍微有點興奮。#n可能是被慶典的氣氛感染……"
2601302-11 = "也可能是因為來到「不法者海灘」之後，不用再躲躲藏藏的關係吧……"
2601302-12 = "嗯，況且我現在還有一台相機。"
2601302-13 = "我覺得拍照真的很有趣。"
2601302-14 = "能讓人擷取並保存珍貴的瞬間。"
2601302-15 = "所以今天，我想找找有沒有能拍到好照片的地方。"
2601302-16 = "你願意跟我一起去嗎，老師？"
2601302-17 = "[s]「當然。」"
2601302-18 = "嗯，那我們走吧。"
2601302-20 = "首先，我打算什麼都拍拍看。"
2601302-21 = "畢竟這可是我幸運從黑市裡買到的數位相機。"
2601302-22 = "雖然型號很舊，但性能還算不錯。"
2601302-23 = "啊，等等，老師。"
2601302-24 = "那個廣告看板很有感覺耶。"
2601302-25 = "[s]「廣告看板？」"
2601302-26 = "嗯，上面寫著炒麵、刨冰和玉米……"
2601302-27 = "以後再看到這張照片的時候，#n肯定會想起現在空氣中飄散的香甜氣味，還有食物滋滋作響的味道和聲音吧？"
2601302-28 = "肯定會是個美好的回憶。"
2601302-31 = "那我們出發去找其他的素材吧。"
2601302-33 = "在海邊散步……真涼爽。"
2601302-34 = "啊，老師記得注意腳邊。#n你剛才差點就踩到寄居蟹了。"
2601302-35 = "[s]「哎呀，真的是好險。」"
2601302-36 = "呵呵，這隻寄居蟹真可愛。"
2601302-37 = "來，作為救了你一命的回報，請乖乖讓我拍張照吧。"
2601302-41 = "嗯，這樣就行了。#n之後要注意安全哦，小寄居蟹。"
2601302-42 = "趕快回海裡去吧，岸邊是很危險的。"
2601302-43 = "以後看到這張照片的時候，肯定會回想起這個小插曲的吧？#n畢竟這才是拍照的目的。"
2601302-44 = "接下來要拍些什麼好呢？"
2601302-46 = "（後來也和敦子一起在海邊和慶典會場四處亂晃，同時不停地拍照）"
2601302-48 = "時間竟然已經這麼晚了……"
2601302-49 = "[s3]「晚霞還真美。」\n[s4]「最後一張照片就用這個來收尾怎麼樣？」"
2601302-52 = "嗯，好呀。#n那就讓我來……唔嗯……"
2601302-53 = "啊！"
2601302-58 = "我的相機……！？"
2601302-59 = "呼，幸好沙子很軟，應該沒有摔壞。"
2601302-60 = "啊，電池的蓋子打開了。"
2601302-61 = "希望沙子沒有跑進去……"
2601302-62 = "……咦？"
2601302-63 = "[s]「放電池的地方……是空的。」"
2601302-67 = "啊……對了，我現在才想起早上忘了帶電池出門。"
2601302-68 = "難怪相機都沒有畫面。#n我還以為老相機都是這樣的說……"
2601302-69 = "所以我今天和老師一起拍的這些照片……"
2601302-70 = "[s]「恐怕一張都沒有拍到吧。」"
2601302-74 = "……本來還覺得今天玩得很開心的，難道一切都是徒勞無功嗎？"
2601302-75 = "竟然因為沒有帶電池，導致最後什麼都沒有留下。"
2601302-76 = "不管是廣告招牌，還是寄居蟹……那些回憶全都消失了。"
2601302-77 = "明明是和老師共度的回憶……"
2601302-78 = "[s]「……我不這麼認為。」"
2601302-79 = "老師……不這麼認為？"
2601302-80 = "可是我們連一張照片都沒有留下……"
2601302-81 = "我本來打算以後再看著那些照片來回味的……"
2601302-82 = "[s]「就算沒有照片，那些事還是會留在記憶中的。」"
2601302-85 = "[ns]「我們一起開心逛過慶典，這是不變的事實。」"
2601302-87 = "……這樣啊。"
2601302-88 = "所有開心的回憶，都會深刻地烙印在我和老師的腦海裡。"
2601302-89 = "就連現在和老師講話的時間，我也絕對不會忘記的。"
2601302-90 = "謝謝你，老師。我又學到了一課。"
2601302-91 = "[s]「下次我也會帶電池來預備的。」"
2601302-92 = "呵呵。"
2601302-93 = "嗯，那下次再一起逛慶典吧，老師。"
2601302-94 = "到時候我肯定不會再犯這種錯了。"

[translation]
52135-2 = "(ในขณะเดียวกัน หน้า <คฤหาสน์นิพพาน>...)"
52135-11 = "[ns1] \"ออกมาจนได้สินะ...\"\n[ns2] \"นึกไม่ถึงเลยนะว่าจะมาทางนี้ก่อน...\""
52135-14 = "ซึคุโมะคามิ...? ทำไมถึงออกมาตอนเฮียกกะเรียวรันไม่อยู่..."
52135-15 = "คุณครูคะ มาอยู่ข้างหลังฉันค่ะ ฉันจะปกป้องคุณครูเองค่ะ!"
52135-20 = "ฮ่า... ฮะฮ่า..."
52135-23 = "อะฮะฮ่า... อะฮะฮ่า... "
52135-24 = "อะฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!!"
52135-25 = "ทุกคนเห็นแล้วใช่มั้ย? ท่านโคคุริโกะคาดการณ์เรื่องนี้ไว้หมดแล้ว~!"
52135-26 = "ทั้งเรื่องที่พวกเธอจะแกะรอยมาที่ <คฤหาสน์นิพพาน> และเรื่องที่พวกเธอไม่มีวิธีอื่นนอกจาก#nเฮียกกุเร็นในการจัดการตำนานร้อยเรื่องราวด้วย"
52135-27 = "พอเห็นว่าฉันกลัว ก็ทิ้งคุณครูไว้ที่นี่แล้วแยกย้ายกันออกไปสำรวจคฤหาสน์..."
52135-28 = "อุบายอันชาญฉลาด? คิดว่าจะวางกับดักล่อชมรมความงามของธรรมชาติได้เหรอ?"
52135-29 = "พวกคนโง่เง่า พวกเธอนั่นละที่โดนการแสดงตบตาของฉันหลอกแล้วยื่นหัวเข้าไปในปากงูเอง!"
52135-30 = "[s] \"ชูโระ...\""
52135-34 = "ทำไมคะ คุณครู คิดจะร้องขอชีวิตงั้นเหรอคะ?"
52135-35 = "น่าเสียดายจังเลยนะคะ ไทม์ โอเวอร์ค่ะ!"
52135-36 = "จากนี้ก็เตรียมตัวเป็นอาหารของห้วงอัสดงแต่โดยดีเถอะค่ะ ในนั้นมีนักเรียนที่รอให้คุณครูไปดูแลอยู่#nเพียบ~ เลยนะคะ"
52135-37 = "[s] \"ที่บอกว่ากลัวเมื่อกี้เป็นการแสดงงั้นเหรอ?\""
52135-38 = "อึก...!"
52135-39 = "ก็บอกแล้วไงว่าเป็นการแสดง! กล้าดียังไงถึงมาสงสัยคำพูดของฉันน่ะ?"
52135-40 = "ทำเป็นรู้ดีทุกสิ่ง แสร้งเป็นเข้าใจทุกอย่าง... เห็นแล้วพะอืดพะอมจนอยากอ้วกออกมาชะมัด ฉันจะปราบทุกคนให้หมดสิ้นแล้วให้เป็นอาหารของตำนานร้อยเรื่องราวเสียเลย!"
52135-44 = "มัวทำอะไรอยู่? รีบๆ จัดการครูจากชาเล่ต์เร็วเข้าสิ!"
52135-55 = "ทะ... ทำไมล่ะ...?"
52135-56 = "ทะ... ทำไมตำนานร้อยเรื่องราวจากเรื่องลึกลับ... ถึงมาโจมตีฉันแทนล่ะ?"
52135-57 = "ไม่สิ ต้องมีอะไรผิดพลาดแน่ๆ ตราบใดที่ท่านโคคุริโกะยังไม่ลืมการมีอยู่ของฉัน ก็ไม่มีทาง..."
52135-67 = "งะ... งือออ..."
52135-73 = "[ns3] \"นี่มันเรื่องอะไรกันน่ะ...?\"\n[ns4] \"ทำไมตำนานร้อยเรื่องราวถึงโจมตีชูโระล่ะ?\""
52135-76 = "ฉันก็ไม่แน่ใจเหมือนกัน แต่เหมือนจะเกิดปัญหาบางอย่างระหว่างสมาชิกชมรมความงามของธรรมชาติ#nนะคะ"
52135-77 = "ว่าแต่แบบนี้จะไม่เป็นไรเหรอคะ? ดูเหมือนว่าตอนนี้แม่หนูชูโระจะควบคุมซึคุโมะคามิไม่ได้แล้วค่ะ..."
52135-78 = "นอกจากใช้เรื่องลึกลับจากหนังสือลึกลับแล้ว เธอก็ไม่มีวิธีอื่นใดในการป้องกันเลย ถ้าเธอถูกซึคุโมะคามิรุมล้อมแล้วจับกินขึ้นมาละก็"
52135-79 = "ครั้งนี้จะเป็นแม่หนูชูโระเองนะคะที่ต้องตกเข้าไปในห้วงอัสดง..."
52135-80 = "ถึงแม้ว่ามันจะเป็นกรรมตามสนองก็เถอะ"
52135-81 = "[s] \"เดี๋ยวครูมานะ...\""
52135-85 = "คะ? เสียสติไปแล้วเหรอคะ?"
52135-86 = "ถึงตำนานร้อยเรื่องราวจะล่าถอยไปบ้างแล้ว แต่ที่นี่ก็ใช่ว่าจะปลอดภัยนะคะ"
52135-87 = "นอกจากนี้เรายังไม่รู้ด้วยว่าเกิดอะไรขึ้นใน <คฤหาสน์นิพพาน>..."
52135-88 = "คุณจะเสี่ยงอันตรายอีกครั้งเพื่อช่วยเด็กที่พยายามจะฆ่าคุณน่ะเหรอคะ?"
52135-89 = "บุ่มบ่ามเกินไปแล้ว..."
52135-91 = "[ns5] \"นี่คือสัญชาตญาณของมนุษย์อยู่แล้ว\"\n[ns6] \"เรื่องไหนถูกหรือผิด ค่อยมาพิจารณาทีหลังก็ได้\""
52135-100 = "ฮ่า... ฮะฮ่า..."
52135-104 = "ที่จริง... ฉันรู้อยู่แล้วละค่ะว่าคุณจะพูดแบบนั้น"
52135-109 = "แฮ่ก... แฮ่ก... แฮ่กก..."
52135-112 = "(ไม่มีทาง เป็นไปไม่ได้ เป็นไปไม่ได้เด็ดขาด...)"
52135-113 = "(นี่ฉัน... ถูกทอดทิ้งจริงๆ เหรอ?)"
52135-114 = "(ฉันทำงานล้มเหลวถึง 2 ครั้ง ท่านโคคุริโกะก็เลยไม่ไว้ใจฉันอีกต่อไปแล้วงั้นเหรอ?)"
52135-115 = "(เรื่องลึกลับของท่านโคคุริโกะก็เลยมาเป็นศัตรูของฉันเหรอ...?)"
52135-116 = "(ไม่เอาๆ แบบนี้ไม่เอาด้วยหรอกนะ ฉันอยู่ไม่ได้ถ้าไม่มีท่านโคคุริโกะ นั่นก็เพราะว่าฉัน...)"
52135-129 = "ไม่ได้นะ... หยุดเถอะ..."
52135-130 = "ฉันไม่อยาก... กลับไปเป็นเครื่องมือที่ถูกทิ้งอีกแล้ว..."
52135-137 = "หยุดนะ...!"
52135-146 = "หืม...?"
52135-147 = "[s] \"ค่อยยังชั่วที่มาทันนะ...\""
52135-148 = "คุณครูจากชาเล่ต์...?"
52135-149 = "ทำไมถึงรับการโจมตีของตำนานร้อยเรื่องราวแทนฉัน..."
52135-150 = "[s] \"ครูห่วงว่าจะตกอยู่ในอันตราย ก็เลยมาช่วยน่ะ\""
52135-151 = "แต่ว่า..."
52135-152 = "เมื่อกี้ฉัน... พยายามฆ่าคุณเลยนะ? แล้วทำไมถึงมาช่วยกันล่ะ..."
52135-153 = "อีกอย่าง ฉันไม่ได้เป็นนักเรียนที่เชื่อฟังคุณด้วยซ้ำ นี่คุณ... กำลังเข้าใจอะไรผิดอยู่กันแน่?"
52135-154 = "คิดว่าถ้ายอมเสียสละตัวเองมาช่วยฉัน แล้วฉันจะกลับตัวกลับใจเป็นเด็กดีแล้วไปช่วยคุณงั้นเหรอ?!"
52135-155 = "[s7] \"การช่วยเด็กที่ตกอยู่ในอันตรายไม่ต้องมีเหตุผลหรอก\"\n[s8] \"นี่คือสัญชาตญาณของมนุษย์อยู่แล้ว\""
52135-160 = "พูดอะไรโง่ๆ..."
52135-161 = "ฉันรู้หรอกนะว่าคุณถึงกับสาหัสได้ด้วยกระสุนเพียงหนึ่งนัดหรือระเบิดแค่ลูกเดียว!"
52135-162 = "แต่ถึงแบบนั้น... ก็ยังมาช่วยเด็กที่พยายามส่งนักเรียนที่มีค่าของตัวเองลงนรก เพียงเพราะคิดว่า#nเด็กคนนั้นกำลังตกอยู่ในอันตรายงั้นเหรอ?"
52135-163 = "จะโง่ก็เอาให้มันน้อยๆ หน่อยเถอะน่า!"
52135-164 = "[s] \"ไม่ต้องกังวลนะ ชูโระจัง ครูแข็งแรงกว่าที่คิดน่ะ\""
52135-168 = "ใครชื่อชูโระจัง...!"
52135-169 = "[s] \"แต่ว่ามันก็เจ็บกว่าที่คิดไว้เหมือนกันนะเนี่ย...\""
52135-173 = "หา.........?"
52135-181 = "ท่านอาจารย์...!"
52135-186 = "อ๊ะ เฮียกกะเรียวรันทุกคน ปลอดภัยดีสินะคะ!"
52135-187 = "จู่ๆ ซึคุโมะคามิก็โผล่มาในคฤหาสน์..."
52135-188 = "เรื่องนั้นพวกเราก็รู้อยู่แล้ว!"
52135-189 = "แล้วคุณครู [USERNAME] ล่ะ? คุณครูปลอดภัยดีหรือเปล่า?"
52135-190 = "เรื่องนั้น... คือว่า..."
52135-191 = "ตอนซึคุโมะคามิบุกเข้ามาโจมตี จู่ๆ แม่หนูชูโระก็หนีไป คุณครูก็เลยตามไปช่วยแม่หนูชูโระน่ะค่ะ"
52135-195 = "ฉันพยายามห้ามไว้แล้ว แต่คุณครูก็ยืนกรานว่าจะไปให้ได้..."
52135-197 = "ว่าไงนะ สถานการณ์อันตรายแบบนี้แต่ปล่อยให้ท่านอาจารย์ไปตามลำพังงั้นเหรอ?"
52135-198 = "ถึงจะต้องใช้กำลัง แต่ก็ควรรั้งท่านอาจารย์ไว้สิ..."
52135-204 = "ทะ... ทำอะไรน่ะ คิเคียว?"
52135-205 = "ฉันถามเชิงตำหนิก็จริง แต่ก็ไม่ต้องถึงกับเล็งปืนไปทางนั้นเลยนี่..."
52135-206 = "ฉันเอาแต่ใส่ใจหัวหน้าอายาเมะจนพลาดสิ่งที่สำคัญกว่าไปเลย"
52135-207 = "ระหว่างเดินทางมาที่นี่ ฉันเดาไว้แล้วว่าต้องมีสมาชิกของชมรมความงามของธรรมชาติที่ใช้#nหนังสือลึกลับได้อยู่แถวนี้..."
52135-211 = "แต่คิดไม่ถึงเลยนะว่าจะแฝงตัวอยู่ในหมู่พวกเรา"
52135-217 = "อ่า... อะฮะฮ่า..."
52135-221 = "รู้ได้ยังไงกันคะเนี่ย...? "
52135-223 = "ตอนต่อไป;นักเล่าเรื่องพรั่นพรึง"

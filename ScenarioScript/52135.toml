[translation]
52135-2 = "（另一方面，此時在「彼岸邸」前……）"
52135-11 = "[ns1]「果然出現了嗎……」\n[ns2]「沒想到會先來這邊……」"
52135-14 = "……付喪神？#n偏偏在百花繚亂的各位不在的時候……"
52135-15 = "老師，請躲到我身後。#n我來掩護！"
52135-20 = "哈，哈哈……"
52135-23 = "啊哈哈，啊哈哈哈……"
52135-24 = "啊哈哈哈哈哈哈哈哈哈哈哈！！"
52135-25 = "看見了吧？#n雛罌粟大人早就全～都預料到了！"
52135-26 = "不管是你們會循著線索抵達「彼岸邸」，#n還是除了「百蓮」之外沒有對抗百物語的手段都一樣！"
52135-27 = "居然只因為我的一個反應就丟下老師四處分散……"
52135-28 = "這算什麼巧妙的計策？還說要對花鳥風月部設下陷阱？"
52135-29 = "真是笑死人了。#n被我的演技騙得把腦袋伸進蛇的咽喉裡的，是你們自己啊！"
52135-30 = "[s]「……棕櫚。」"
52135-34 = "怎麼啦，老師？事到如今才想求饒嗎？"
52135-35 = "真可惜，現在已經Time Over了！"
52135-36 = "接下來就乖乖成為黃昏的糧食吧。#n那裡可是有很多需要老師照顧的學生呢～"
52135-37 = "[s]「你剛才的不安，真的只是在演戲嗎？」"
52135-38 = "唔……！"
52135-39 = "不是跟你說過是演戲了嗎！竟敢懷疑我說的話？"
52135-40 = "裝作什麼都懂、什麼都理解的樣子……光是看著那副嘴臉就讓我噁心！#n我要在這裡幹掉你，把你變成百物語的食物！"
52135-44 = "還愣著做什麼？快給我開槍打倒夏萊的老師！"
52135-55 = "為，為什麼……？"
52135-56 = "為什麼從怪談中誕生的百物語……會攻擊我？"
52135-57 = "怎，怎麼會，不可能會有這種事。#n只要雛罌粟大人沒有忘記我的存在，這種事就絕對不會──"
52135-67 = "嗚嗚……嗚嗚嗚……"
52135-73 = "[ns3]「這是怎麼回事……？」\n[ns4]「為什麼百物語會攻擊棕櫚？」"
52135-76 = "我也不是很清楚……也許是花鳥風月部的成員間出了什麼問題吧。"
52135-77 = "不過這樣下去沒問題嗎？#n現在的棕櫚同學，似乎已經無法控制付喪神了……"
52135-78 = "除了源自怪書的怪談之外，他幾乎沒有像樣的防禦手段。#n要是反過來被付喪神包圍吞噬的話……"
52135-79 = "這次墜入黃昏的，就會是棕櫚同學本人了……"
52135-80 = "當然這或許也是他自作自受吧。"
52135-81 = "[s]「……我去去就回。」"
52135-85 = "什麼？您是認真的嗎？"
52135-86 = "雖然百物語暫時退開了，這裡依然很危險。"
52135-87 = "而且「彼岸邸」裡究竟發生了什麼，我們還一無所知……"
52135-88 = "您竟然要為了救一個想殺害您的孩子，再次以身涉險？"
52135-89 = "這種魯莽──"
52135-91 = "[ns5]「想幫助陷入危險的孩子是人的本能。」\n[ns6]「至於對錯什麼的，之後再來考慮也不遲。」"
52135-100 = "哈，哈哈……"
52135-104 = "其實我早就知道您會這麼說了。"
52135-109 = "哈啊，哈啊……"
52135-112 = "（不可能，不可能，不可能，不可能……）"
52135-113 = "（我真的……真的被拋棄了嗎？）"
52135-114 = "（因為我連續失敗了兩次，雛罌粟大人再也無法信任我了……？）"
52135-115 = "（所以雛罌粟大人的怪談才會把我當成敵人……？）"
52135-116 = "（不要不要，我不要那樣。#n　沒有雛罌粟大人的話，我就無法存在了。因為我是……）"
52135-129 = "不要……快停下來……"
52135-130 = "我不想……再變回被捨棄的工具了……"
52135-137 = "……快住手啊！"
52135-146 = "……咦？"
52135-147 = "[s]「……幸好趕上了。」"
52135-148 = "……夏萊的老師？"
52135-149 = "為什麼要替我擋下百物語的攻擊……"
52135-150 = "[s]「因為覺得你好像有危險，所以就來幫忙了。」"
52135-151 = "但是……"
52135-152 = "我明明……想殺了你不是嗎？#n為什麼還要救我……"
52135-153 = "而且我也不是追隨你的學生。#n你到底……到底在想什麼？"
52135-154 = "難道你以為用身體為我擋下攻擊，我就會痛改前非幫助你嗎！？"
52135-155 = "[s7]「解救陷入危險的孩子，根本不需要理由。」\n[s8]「那是身為人類理所當然[ruby=惻隱之心]的本能。[/ruby]」"
52135-160 = "還在胡說八道……"
52135-161 = "你和我們不同，只要一顆子彈或炸彈就會沒命……這點我可是知道的！"
52135-162 = "但你竟然願意為了幫助曾經敵對……#n甚至想讓你珍視的學生墜入黃昏的仇人衝進火線裡？"
52135-163 = "愚蠢也要有個限度吧！"
52135-164 = "[s]「別擔心，棕櫚醬。老師比你想得還結實哦。」"
52135-168 = "你，你說誰是棕櫚醬──"
52135-169 = "[s]「不過還是比想像中痛呢……」"
52135-173 = "………………啊？"
52135-181 = "……師父！"
52135-186 = "啊，百花繚亂的各位，你們平安無事啊！"
52135-187 = "宅邸各處突然出現了付喪神……"
52135-188 = "這點我們也知道！"
52135-189 = "老師……[USERNAME]老師他沒事吧？"
52135-190 = "那個，其實……"
52135-191 = "剛才被付喪神襲擊時，棕櫚同學突然逃跑……老師為了救他就追了上去。"
52135-195 = "我本來想阻止，但老師的意志太堅定了……"
52135-197 = "不是，就算這樣也不能眼睜睜地看著師父單獨過去吧？"
52135-198 = "哪怕動武也該把他留下來才對──"
52135-204 = "你，你在做什麼啊，桔梗？"
52135-205 = "雖然我也在質問他沒錯，但不至於要對人舉槍吧……"
52135-206 = "我光顧著留意菖蒲委員長，結果卻忽略了更重要的事。"
52135-207 = "雖然我一路上都認為，可能會有操縱怪書的花鳥風月部成員潛伏在附近……"
52135-211 = "沒想到竟然早就混進我們之中了啊。"
52135-217 = "啊，啊哈哈……"
52135-221 = "……為什麼你會知道啊？"
52135-223 = "下一話;花鳥風月部的怪藝家"

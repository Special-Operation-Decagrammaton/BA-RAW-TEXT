[translation]
52135-2 = "Meanwhile, in front of the Mansion..."
52135-11 = "[ns1] \"They found us.\"\n[ns2] \"I didn't think they'd go for us first...\""
52135-14 = "...Artifact Spirits? And no Hyakkaryouran to help?"
52135-15 = "Sensei, get behind me. I'll protect you!"
52135-20 = "Hah. Haha..."
52135-23 = "Hahaha, hahaha..."
52135-24 = "HAHAHAHAHA!!"
52135-25 = "You see? Miss Kokuriko thinks of everything!"
52135-26 = "She knew you idiots would seek the Mansion of the Beyond, and now you're all the way out here with no Hundred Lotus!"
52135-27 = "And you fell for my waterworks, Sensei! You let me isolate you!"
52135-28 = "You thought you could outsmart Nature's Beauty?"
52135-29 = "Stupid! You stupid idiot! You fell for it. You stuck your so-called helping hand right in the serpent's mouth!"
52135-30 = "[s] \"...Shuro.\""
52135-34 = "What is it, Sensei? You want to try your hand at begging?"
52135-35 = "It's too late. Time's up!"
52135-36 = "Get ready to join the spirit realm. I'll make sure to send your students in right after!"
52135-37 = "[s] \"That was really all an act?\""
52135-38 = "Tch...!"
52135-39 = "What did I just say? You think I'm lying?"
52135-40 = "Oh, Sensei...so noble, so empathetic, so drippy and weak. You make me want to puke! Now, my beloved Artifact Spirits: eat them!"
52135-44 = "What are you doing? Attack the Sensei!"
52135-55 = "Wh-Why...?"
52135-56 = "Why are you stupid umbrellas attacking me? Don't you know who I am?"
52135-57 = "No, something's wrong. Unless Miss Kokuriko abandoned me, but—"
52135-67 = "W-Waah..."
52135-73 = "[ns3] \"What's going on...?\"\n[ns4] \"Why are they attacking Shuro?\""
52135-76 = "I'm unsure. There must be some internal friction in Nature's Beauty."
52135-77 = "Anyway, will she be all right? She seems to have no control over them..."
52135-78 = "Without a tome, she's liable to be consumed..."
52135-79 = "Shuro will fall to the spirit realm..."
52135-80 = "Of course, perhaps it's what she deserves."
52135-81 = "[s] \"...I'll be back.\""
52135-85 = "Are you out of your mind?"
52135-86 = "The Artifact Spirits are distracted, and this place is unsafe."
52135-87 = "We have no idea what's happening inside the Mansion of the Beyond..."
52135-88 = "And you're willing to risk your life to save the child that tried to kill you?"
52135-89 = "Unbelievable—"
52135-91 = "[ns5] \"She's just a kid.\"\n[ns6] \"It's not too late for her.\""
52135-100 = "Hah. Haha..."
52135-104 = "Exquisite. You are so utterly predictable, Sensei."
52135-109 = "*huff* *huff* *huff*"
52135-112 = "(\"No way, no way, no way, no way...\")"
52135-113 = "(\"Was I... Could she really abandon me?\")"
52135-114 = "(\"I blew it twice. Miss Kokuriko can't trust me anymore.\")"
52135-115 = "(\"That's why she had the Artifact Spirits attack me.\")"
52135-116 = "(\"She doesn't want me anymore. She doesn't love me. All because I...\")"
52135-129 = "No... Please..."
52135-130 = "I... I don't want to go!"
52135-137 = "...Stop!"
52135-146 = "...Huh?"
52135-147 = "[s] \"...I'm glad I found you.\""
52135-148 = "...Schale's Sensei?"
52135-149 = "Why did you throw me behind you?"
52135-150 = "[s] \"You were in danger.\""
52135-151 = "But..."
52135-152 = "I...tried to kill you. You idiot!"
52135-153 = "I'm not even one of your pathetic students! Are you delusional?"
52135-154 = "What, you think I owe you now? That I'll devote my life to doing good and being lame?"
52135-155 = "[s7] \"I just wanted you to be safe.\"\n[s8] \"You were a kid in trouble.\""
52135-160 = "That's so stupid..."
52135-161 = "You're not like us, Sensei! One stray bullet could kill you!"
52135-162 = "And you would...risk your stupid pathetic life for me? After everything I did?"
52135-163 = "You're hopeless! You're such...an idiot!"
52135-164 = "[s] \"Don't worry, dear Shuro. I'm stronger than I look.\""
52135-168 = "Who are you calling \"dear\"?"
52135-169 = "[s] \"...It does hurt, though...\""
52135-173 = "...Oh?"
52135-181 = "...Sensei!"
52135-186 = "The Hyakkaryouran. You made it!"
52135-187 = "The Artifact Spirits swarmed the grounds!"
52135-188 = "...We know."
52135-189 = "More importantly, is [USERNAME] Sensei safe?"
52135-190 = "Well, um..."
52135-191 = "Shuro fled from some aggressive Artifact Spirits, so Sensei ran off to save her."
52135-195 = "I tried to stop them, but they were so hard-headed!"
52135-197 = "Wait! You just stood here and watched Sensei run off?"
52135-198 = "And you didn't try to block them? Hold them back?"
52135-204 = "Kikyou?!"
52135-205 = "Yes, I was scolding her, but you don't have to aim your gun..."
52135-206 = "My focus was so trained on President Ayame that I failed to see what was right in front of me."
52135-207 = "I knew a Nature's Beauty member was close. I knew they were using a tome."
52135-211 = "But I did not expect for her to be directly under our noses."
52135-217 = "Aha... Hahaha..."
52135-221 = "...Isn't this exquisite? "
52135-223 = "Next Episode;Nature's Beauty's Phantom Artist"

[translation]
1401-1 = "GUNS N' PEPPERS（１）"
1401-2 = "工程師部．作業室"
1401-5 = "嗯……把與驅動部分的軸相連的、這個下方的軸承減輕的話……速度應該就能……"
1401-7 = "……哎呀，已經到午餐時間了呢。#n詠葉前輩！把會弄髒手的引擎部分的整備放到下午再做，先來吃午餐吧！"
1401-8 = "啊啊，就這麼做吧。可以稍等一下嗎，讓我先把焊接完成……#n這個作業結束之後，就去食堂吃午餐吧。"
1401-9 = "……呼。雖然沉浸在整備中沒注意到……不過作業服到處都變得黑漆漆且滿是污漬。"
1401-10 = "就是說啊……就這樣去食堂的話，可能會造成其他學生的困擾。#n……既然如此，果然還是跟昨天一樣叫外賣吧？"
1401-11 = "我覺得很好！我也正好想吃放了大量火腿和起司，油膩膩的速食了。"
1401-12 = "說到可以一次品嚐到各種材料且盡可能不弄髒手，又能讓複數人分享的速食……"
1401-14 = "果然，就只有披薩了呢！"
1401-15 = "同意。果然在作業室吃的食物，沒有比披薩更棒的。"
1401-16 = "呵呵。你們真是喜歡到吃不膩呢。"
1401-17 = "嘛，我也剛好想要吃披薩。#n常點的義式臘腸跟起司就好了嗎？"
1401-20 = "您好，這裡是「Kamehame Pizza」！#n請問客人訂的是義式臘腸＆起司披薩一份對嗎？"
1401-21 = "是的，麻煩放在這邊的桌子上！"
1401-23 = "那麼請收下。感謝您的訂餐！"
1401-25 = "哈啊，這股濃厚的起司味……光是聞到味道肚子就餓了呢～"
1401-26 = "我要開動了。"
1401-29 = "嗯，披薩果然還是義式臘腸＆起司最棒了呢！#n香味四溢的起司與義式臘腸火腿鹹味的平衡真是棒極了！"
1401-30 = "普通的起司披薩我也喜歡……味道十分單純，不會有過多的餘味。"
1401-31 = "這樣啊。我是覺得如果起司太多會可能有點油膩吧。#n亞都梨，可以給我查巴斯科辣椒醬嗎？"
1401-32 = "查巴斯科辣椒醬沒有裝在披薩的盒子裡嗎？我這邊沒有呢。"
1401-33 = "盒子裡只有大量的起司粉……看來是外送員忘記了。"
1401-34 = "咦咦！？明明點了披薩竟然忘記給查巴斯科辣椒醬，這是多麼重大的疏失！"
1401-35 = "為了懲罰那個令人困擾的外送員，來在外送APP上寫抗議的評論吧！"
1401-37 = "先冷靜一下吧，亞都梨。#n一旦行程繁忙起來，就算是我們也會弄丟一兩個零件不是嗎？這點失誤就原諒他吧。"
1401-38 = "而且，社辦的置物櫃裡應該還有以前沒用完的查巴斯科辣椒醬才對。#n只要把那些拿過來就好了。"
1401-43 = "哦呀？我記得確實是放在這裡的……跑去哪裡了呢？"
1401-44 = "因為每個置物櫃都裝滿了雜物，會不會是有人拿工具時順手丟掉了？"
1401-45 = "也許是呢……沒辦法。#n這次也只能不加查巴斯科辣椒醬直接吃了。"
1401-46 = "有沒有隨時隨地都能「啪」的一聲拿出查巴斯科這類醬料的便利道具呢……"
1401-49 = "…………"
1401-50 = "前輩。反正我們常常訂披薩，乾脆讓查巴斯科辣椒醬變得可以隨身攜帶怎麼樣？"
1401-51 = "隨身攜帶查巴斯科辣椒醬？要怎麼做？"
1401-52 = "舉例來說……將和學生形影不離的槍，改造成可以噴射出查巴斯科辣椒醬之類的！"
1401-54 = "……也就是只為了披薩，就把槍發射的東西由子彈改成查巴斯科辣椒醬？"
1401-55 = "那還真是個沒有實際意義，又沒有益處的點子呢。"
1401-56 = "……"
1401-57 = "……"
1401-58 = "好，立刻來做吧。"
1401-59 = "（點頭）"
1401-61 = "果然！我就知道是大家會喜歡的提案！"
1401-62 = "好，既然已經決定了，就從查巴斯科辣椒醬容器的逆向工程開始吧！"
1401-64 = "（於是工程師部的成員們，#n　就這樣因為非常無聊的理由開始開發附帶噴射查巴斯科辣椒醬機能的槍了……）"

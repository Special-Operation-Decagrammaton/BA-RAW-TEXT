[translation]
1401-1 = "GUNS N' PEPPERS 1"
1401-2 = "ห้องปฏิบัติการชมรมวิศวกรรม"
1401-5 = "อืม... ถ้าปรับน้ำหนักของตลับลูกปืนส่วนล่างที่เชื่อมต่อกับเพลาขับล่ะก็... ความเร็วในการยิงก็จะ... "
1401-7 = "เอ๊ะ? ได้เวลาซ่อมบำรุงแล้วล่ะ#nรุ่นพี่อุทาฮะ! ช่วยเลื่อนตารางงานซ่อมบำรุงเลอะเทอะไปก่อนแล้วมากินข้าวให้เสร็จก่อนเถอะค่ะ!"
1401-8 = "นั่นสิ รอเดี๋ยวนะ ฉันเชื่อมตรงข้อต่อจะเสร็จแล้วล่ะ#nขอทำตรงนี้ให้เสร็จก่อนแล้วไปกินข้าวที่โรงอาหารกันเถอะ"
1401-9 = "อาจเพราะฉันจดจ่ออยู่กับการดูแลอุปกรณ์มากเกินไป เลยทำให้ชุดทำงานเลอะแบบนี้..."
1401-10 = "นั่นน่ะสิ ถ้าใส่ชุดเลอะๆ แบบนี้เข้าไปในโรงอาหารล่ะก็คงจะสร้างปัญหาให้กับนักเรียนคนอื่นๆ แน่#nถ้างั้นมื้อกลางวันวันนี้เราสั่งมากินที่นี่กันไหม?"
1401-11 = "ไอเดียดีจริงๆ เลยค่ะ! ฉันเองก็กำลังอยากกินพวกฟาสต์ฟูดที่ใส่ชีสกับแฮมเยอะๆ อยู่พอดีเลย"
1401-12 = "ถ้าเป็นฟาสต์ฟูดที่สามารถแบ่งกันกินได้ง่ายๆ กินได้มือไม่เลอะ และมีวัตถุดิบหลายอย่างผสมอยู่ล่ะก็..."
1401-14 = "ว่าแล้วเชียว พิซซ่าเนี่ยดีสุดๆ แล้ว!"
1401-15 = "ฉันเห็นด้วย พิซซ่าเป็นอาหารที่เหมาะที่จะสั่งมากินที่ห้องทำงานที่สุดแล้ว"
1401-16 = "หึหึ พวกเธอไม่เบื่อพิซซ่ากันเลย ค่อยยังชั่วหน่อย"
1401-17 = "ฉันเองก็กำลังอยากกินพิซซ่าอยู่พอดีน่ะ#nถ้างั้นสั่งพิซซ่าหน้าชีสกับเป็ปเปอร์โรนีแบบที่เคยสั่งประจำดีไหม...?"
1401-20 = "สวัสดีครับ <คาเมฮาเมะ พิซซ่า> ค่า! ต้องการสั่งพิซซ่าหน้าเป็ปเปอร์โรนีกับชีสหนึ่งถาดใช่ไหมครับ?"
1401-21 = "ค่ะ วางไว้บนโต๊ะนี้ได้เลยค่ะ"
1401-23 = "รับออเดอร์เรียบร้อยครับ ขอบคุณที่สั่งพิซซ่ากับทางเรานะคร้าบ!"
1401-25 = "ฮ่า~ กลิ่นชีสหอมหวนแสนเย้ายวน... แค่ได้กลิ่นก็น้ำลายสอแล้ว~"
1401-26 = "จะทานแล้วนะคะ...."
1401-29 = "อืม... พิซซ่าเนี่ยต้องหน้าเป็ปเปอร์โรนีเท่านั้น!#nรสชาติที่ผสมผสานระหว่างชีสที่หอมมันกับแฮมและเป็ปเปอร์โรนีเนี่ย... อร่อยเหาะไปเลย!"
1401-30 = "ฉันชอบพิซซ่าหน้าชีส... เพราะจะได้ลิ้มรสความหอมมันขั้นสุดยอดของชีสได้ไงล่ะ"
1401-31 = "งั้นเหรอ? ส่วนตัวฉันคิดว่าถ้าหน้าที่มีชีสเยอะๆ มันจะเลี่ยนไป...#nโคโทริ ช่วยหยิบซอสชาบัสโก้ตรงนั้นให้หน่อยได้ไหม?"
1401-32 = "ในกล่องพิซซ่าไม่มีซอสชาบัสโก้มาด้วยเหรอคะ? ตรงนี้ไม่เห็นมีเลยค่ะ"
1401-33 = "ในกล่องพิซซ่ามีแต่ผงชีสอยู่เต็มเลย... สงสัยว่าคนส่งอาจจะลืม..."
1401-34 = "คะ? ไม่อยากเชื่อเลยว่าฉันจะลืมเหยาะซอสชาบัสโก้บนพิซซ่า ทำไมฉันถึงพลาดไปได้เนี่ย!"
1401-35 = "มาช่วยกันเขียนคอมเม้นต์ในแอปพลิเคชั่นกันเถอะ#nเราต้องสั่งสอนพวกคนส่งของที่ชักช้าอืดอาดกันซะบ้าง!"
1401-37 = "ใจเย็นๆ โคโทริ พอทำงานในช่วงที่ตารางงานแน่นแบบนี้ บางครั้งก็มีโอกาสที่จะทำ#nชิ้นส่วนหล่นหายไปบ้างได้เหมือนกันนะ พลาดเล็กๆ น้อยๆ แบบนี้ไม่เป็นไรหรอก"
1401-38 = "แถมในตู้เก็บของก็ยังมีซอสชาบัสโก้ที่เหลือจากครั้งที่แล้วอยู่ เอาขวดนั้นมาใช้ก็ได้นี่นา"
1401-43 = "เอ๊ะ? ฉันจำได้ว่าวางขวดซอสเอาไว้แถวๆ นี้นี่นา... หายไปไหนแล้ว?"
1401-44 = "ในตู้นั่นมันรกสุดๆ เลยเพราะงั้นอาจมีคนที่เข้าไปหยิบอุปกรณ์แล้วเผลอเอาขวดซอสไปทิ้งรึเปล่าคะ?"
1401-45 = "เฮ้อ... ช่วยไม่ได้นะ คราวนี้คงต้องกินพิซซ่าแบบไม่มีซอสชาบัสโก้แล้วล่ะ"
1401-46 = "มีอุปกรณ์อะไรที่ช่วยให้บีบซอสออกมาได้ง่ายๆ บ้างไหมเนี่ย..."
1401-49 = "......."
1401-50 = "รุ่นพี่ พวกเราสั่งพิซซ่ากันเป็นประจำอยู่แล้ว ทำไมเราไม่ลองหาวิธีที่ทำให้ใช้ซอสชาบัสโก้ได้นานๆ#nแบบไม่ต้องเปลี่ยนขวดบ้างล่ะคะ?"
1401-51 = "ขวดซอสเหรอ? ยังไงกันล่ะ?"
1401-52 = "ตัวอย่างเช่น... ติดตั้งอุปกรณ์ฉีดซอสชาบัสโก้ไว้ที่โทรศัพท์หรืออุปกรณ์ที่นักเรียนคนอื่นๆ#nมักจะพกติดตัวอยู่เสมอน่ะ!"
1401-54 = "เธออยากให้ฉันทำปืนยิงซอสชาบัสโก้ได้เพราะพิซซ่าเนี่ยนะ?"
1401-55 = "เป็นไอเดียที่ไร้สาระและไม่มีประโยชน์เลยจริงๆ"
1401-56 = ".....\n"
1401-57 = "....."
1401-58 = "มาลงมือกันเถอะ"
1401-59 = "(พยักหน้าหงึกๆ)"
1401-61 = "คิดแล้วเชียวว่าทุกคนจะต้องชอบ!"
1401-62 = "เอาละ ถ้างั้นก็มาเริ่มการออกแบบขวดซอสกันใหม่เลยดีกว่า!"
1401-64 = "เพราะแบบนั้น พวกชมรมวิศวกรรมเลยประดิษฐ์ปืนติดเครื่องปั๊มซอสชาบัสโก้ขึ้นมา#nแบบไร้เหตุผลยังไงล่ะ..."

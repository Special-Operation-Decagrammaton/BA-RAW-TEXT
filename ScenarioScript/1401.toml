1401-61 = "3;코토리;03;역시 다들 좋아할 줄 알았어요!\n#3;hophop\n#3;a"
1401-62 = "3;코토리;02;자, 그럼 차바스코 소스병의 역설계부터 시작하도록 하죠!\n#3;closeup"

[translation]
1401-1 = "Guns N' Peppers Part 1"
1401-2 = "Engineering Department Workshop"
1401-5 = "Hmm. By reducing the weight of this lower bearing connected to the drive shaft, the speed will be..."
1401-7 = "Oh, it's lunchtime already. Utaha! You can do the engine maintenance this afternoon. Let's eat before you get your hands dirty!"
1401-8 = "Okay, give me a moment. I'm almost done welding the seams. Let me finish this, and we'll go to the cafeteria together."
1401-9 = "But we have soot all over our work clothes. I was so focused that I didn't even notice..."
1401-10 = "I know. It would be pretty rude of us to set foot there wearing these rags... So, should we get lunch delivered to the workshop like yesterday?"
1401-11 = "Great idea! I've been craving greasy fast food with lots of ham and cheese."
1401-12 = "This calls for fast food that has a lot of variety and can be easily shared with minimal use of our hands..."
1401-14 = "That would be pizza!"
1401-15 = "I agree. There's nothing like getting a pizza delivered to the workshop."
1401-16 = "Ha. You two never get tired of pizza."
1401-17 = "Well, I can't deny I've been craving it too. We'll get the usual pepperoni and cheese."
1401-20 = "Delivery from Kamehame Pizza! Did you order one pepperoni and cheese pizza?"
1401-21 = "Yes, please put it on the table."
1401-23 = "Got it. Thanks for choosing Kamehame!"
1401-25 = "*inhale* Oh, that rich, cheesy smell... I haven't even tasted it, and I'm already hungry!"
1401-26 = "Let's dig in."
1401-29 = "Mmm. Pepperoni pizza is the best! Nothing beats savory cheese and salty pepperoni!"
1401-30 = "I appreciate a good cheese pizza. The simple, light flavor of the cheese is enough for me."
1401-31 = "Is that right? Too much cheese makes me feel kind of sick...#nKotori, could you pass the hot sauce?"
1401-32 = "Shouldn't it be in the pizza box? It's not here."
1401-33 = "There's nothing but grated cheese in the box. The delivery guy must have forgotten the sauce."
1401-34 = "What? That's unforgivable. Everyone knows you don't forget the heat!"
1401-35 = "Let's blow up the review section of the delivery app and teach that delivery guy a lesson!"
1401-37 = "Calm down, Kotori. We all forget things, especially when we're busy. Mistakes happen, so let's forgive him."
1401-38 = "There should be some hot sauce left in the club room cabinet from last time.#nI can just go get it."
1401-43 = "Huh? I was sure I left the sauce somewhere around here... Where'd it go?"
1401-44 = "That cabinet is always full of junk. Maybe someone took it out when they were getting a tool?"
1401-45 = "Bah. Then I suppose we won't be having hot sauce with our pizza this time after all..."
1401-46 = "I wonder if anyone's ever made an invention that gives you sauce anytime, anywhere you want..."
1401-49 = "..."
1401-50 = "Say, Utaha. We order pizza all the time. Why don't we modify a bottle of hot sauce to make it wearable?"
1401-51 = "A wearable sauce bottle? How?"
1401-52 = "For example...we could install hot sauce dispensers on our personal weapons so that we'll always have them on hand!"
1401-54 = "You would risk shooting hot sauce instead of bullets just for some pizza?"
1401-55 = "That's the most ridiculous and frivolous idea I've ever heard."
1401-56 = "..."
1401-57 = "..."
1401-58 = "Let's get to work."
1401-59 = "(nod)"
1401-61 = "I knew it was a good idea!"
1401-62 = "Let's start by reverse engineering the hot sauce bottle!"
1401-64 = "That is how the Engineering Department came to the absurd conclusion to build a gun with a hot sauce dispenser..."

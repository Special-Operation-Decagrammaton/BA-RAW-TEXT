[translation]
10047060-1 = "Episode 6;Each Person's Dream"
10047060-9 = "[ns] \"...It's the attic.\""
10047060-10 = "Heehee. Much like Cinderella."
10047060-11 = "We're not actually Cinderella, and we're not looking for lentils in the ashes, but what we must remember is that..."
10047060-12 = "Oh, can it! Enough with the jokes and metaphors. How are we going to get out of here?"
10047060-16 = "[ns] \"So, what is this place?\""
10047060-17 = "It's a terrifying prison that isolates the student from the outside world while draining her mana."
10047060-18 = "A warded barrier of insidious design..."
10047060-22 = "It's just the Meditation Room. We're in time-out so we can think about what we've done."
10047060-23 = "[s] \"I-I see...\""
10047060-24 = "You could call it a jail, though there's less enforcement than that."
10047060-25 = "It's...not bad here... It's warm... Meals are delivered regularly..."
10047060-26 = "So...don't worry, everyone..."
10047060-27 = "We'll be released soon."
10047060-28 = "Yes! We must be positive!"
10047060-29 = "*sigh* I'm SO glad you're not concerned. What if this goes on your permanent record?"
10047060-30 = "Why did I stick with these freaks and end up here...? *sigh*"
10047060-31 = "Magic circle... Summoning glyph. This is the last time I let this nonsense stand."
10047060-35 = "[ns1] \"Magic circle...\"\n[ns2] \"Hmm, how did everyone become interested in the occult?\""
10047060-38 = "I didn't specifically seek it out."
10047060-39 = "I simply enjoyed spending time with everyone."
10047060-40 = "It's like having another band to hang out with."
10047060-41 = "Heh, isn't that reason enough?"
10047060-42 = "Heehee, yes. As long as we're having fun."
10047060-43 = "This world...is full of darkness..."
10047060-44 = "If you wish to survive...it's better to cultivate...joy."
10047060-45 = "[s] \"How did you get into all this, Kanoe...?\""
10047060-46 = "I...also have no specific reason. I merely enjoy it."
10047060-47 = "You don't need a reason...for liking something."
10047060-48 = "And the occult...is surprisingly useful for schoolwork..."
10047060-49 = "As Eri said, the arts and the occult cannot be separated..."
10047060-50 = "And, just so you know... I have excellent grades... Heehee..."
10047060-51 = "Uh, that's great, Kanoe! I respect that."
10047060-52 = "I should be more like you, but I always get so nervous when it comes to...practical matters."
10047060-53 = "[s] \"I see.\""
10047060-54 = "...I'm actually failing a few classes."
10047060-55 = "I thought I was so talented before I got here. But then I saw everyone else's drawings. They weren't scribbles. They made actual art."
10047060-56 = "But no matter how hard I tried, I couldn't improve. So I kept feeling insecure among the other Art majors."
10047060-57 = "Everyone else is so talented and amazing. But I...I haven't made one good thing."
10047060-58 = "[s] \"That's why you were so nervous when you saw your friends at the gallery.\""
10047060-59 = "Ehehe, caught me. Pathetic, isn't it?"
10047060-60 = "But...it's not like I want to stay like this. I will improve, I swear."
10047060-61 = "That's when I got into the occult—so it could help me improve."
10047060-62 = "If I create a work like the Portrait of Genesis one day..."
10047060-63 = "Well, then that's the day I can stand tall with everyone else!"
10047060-67 = "Is that...strange...?"
10047060-68 = "[ns3] \"(A student is so motivated to reach her dreams.)\"\n[ns4] \"(Then what a teacher should do now is...)\""
10047060-73 = "[ns] \"No, it's not strange. It's very possible.\""
10047060-74 = "Nyuhuhu! Right? I knew Master would believe in me!"
10047060-75 = "So Sensei embraces this nonsense as well..."
10047060-76 = "As I've said, REPEATEDLY, I don't believe in the occult."
10047060-77 = "The silly urban legends and made-up phenomena that people keep spreading can be explained."
10047060-78 = "And all this stuff like demons, fate, premonitions, magic... Unless I see it for myself, I'm not buying it."
10047060-79 = "[s] \"Yes. It's good to think logically.\""
10047060-80 = "It's very useful. Rena said that she's going to be the greatest fashion designer in Kivotos someday."
10047060-81 = "I-It's better to dream big, right? And my grades are pretty good!"
10047060-82 = "That's right... And MY dream is to continue finding whimsy and hope in the everyday... Heh."
10047060-83 = "What is your dream, Kanoe?"
10047060-87 = "...It's a secret."
10047060-88 = "Aw, come on, tell us! We all said ours!"
10047060-89 = "Do you really want to know...?"
10047060-90 = "Then I suppose I shall... My dream..."
10047060-97 = "...is to recover a connection from my past life..."
10047060-98 = "[ns] \"Hm...?\""
10047060-99 = "I had a strong connection with someone in my past life... I recently realized it... Heehee."
10047060-105 = "[ns5] \"I-I see...!\"\n[ns6] \"Th-That's good...\""
10047060-108 = "Eheehee..."
10047060-113 = "Excuse me, but I think you're forgetting that you're in the Meditation Room right now!"
10047060-114 = "Ah! S-Sorry! We'll be quiet!"
10047060-115 = "...Well, you all don't seem like the type to benefit from being locked up, anyway."
10047060-120 = "A-Ah?"
10047060-127 = "Come out, everyone. I'll let you off with a warning this time."
10047060-128 = "But if I catch you again, I'm reporting you to the Assembly."
10047060-129 = "Heehee, thank you... You're the only one who's understanding, Miria."
10047060-130 = "If word gets out that we excessively detained Schale's Sensei, we'll never hear the end of it."
10047060-131 = "So get out of here before I change my mind."
10047060-132 = "Th-Thank you!"
10047060-133 = "Phew, we're free!"
10047060-145 = "[ns] \"She's part of the Prefectural Council?\""
10047060-146 = "Yes... She's a friend I've been indebted to for a while..."
10047060-147 = "At least among the officers of the Prefectural Council... She's the most lenient..."
10047060-152 = "[ns] \"...I see.\""
10047060-153 = "Now, let's return to the dorm. We need to clean up."
10047060-154 = "Ah...! Right! It must be a total mess!"
10047060-155 = "Ehehe... Sorry, sorry...."
10047060-159 = "[ns] \"I'll help clean up.\""
10047060-160 = "You are partially responsible for not stopping them, so you SHOULD help."
10047060-161 = "...And that's why I will, too."
10047060-162 = "You're so kind, Rena... Heehee..."
10047060-167 = "F-Flattery will get you nowhere!"
10047060-180 = "...To think I'd see you here."
10047060-181 = "Fufu... [USERNAME] Sensei."

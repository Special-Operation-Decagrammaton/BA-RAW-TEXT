[translation]
10047060-1 = "ตอนที่ 6;ความฝันของแต่ละคน"
10047060-9 = "[ns] \"มาห้องใต้หลังคาสินะ...\""
10047060-10 = "ฮุฮุ รู้สึกเหมือนเป็นซินเดอเรลล่าเลยนะคะ"
10047060-11 = "ถึงพวกเราจะไม่ได้เป็นซินเดอเรลล่าตัวจริงที่ต้องมองหาความหวังในสถานการณ์ที่ยากลำบาก แต่ในเมื่อได้มาอยู่ที่นี่แล้ว..."
10047060-12 = "พอเลย เลิกล้อเล่นได้แล้ว! ทีนี้จะทำยังไงกันล่ะ? จะออกไปจากที่นี่ได้ยังไง?"
10047060-16 = "[ns] \"ที่นี่เป็นสถานที่แบบไหนเหรอ?\""
10047060-17 = "เป็นสถานที่น่าสะพรึงกลัวที่ตัดขาดนักเรียนจากโลกภายนอกและดูดพลังเวทของนักเรียนค่ะ"
10047060-18 = "จะเรียกว่าเป็น <สถานกักกัน> อย่างหนึ่งก็ได้ค่ะ"
10047060-22 = "มันก็แค่ห้องสำนึกผิดน่ะ"
10047060-23 = "[s] \"ยะ... อย่างนั้นสินะ...\""
10047060-24 = "ถ้าจะให้เปรียบเทียบ ฉันว่ามันเหมือนคุกนะคะ ถึงจะไม่รู้สึกถูกบังคับเท่านักโทษก็เถอะค่ะ"
10047060-25 = "ที่นี่... น่าอยู่กว่าที่คิดนะ... ทั้งอบอุ่น... แล้วก็มีข้าวให้กินตรงเวลาด้วย..."
10047060-26 = "เพราะงั้น... ทุกคนไม่ต้องกังวลให้มากนะ..."
10047060-27 = "เดี๋ยวเราก็ได้ออกไปแล้วละ"
10047060-28 = "ใช่ค่ะ! เราต้องคิดในแง่ดีบวกกันไว้สิคะ!"
10047060-29 = "เฮ้อ ดีจังเลยนะที่ทุกคนไม่กังวลกัน แต่ถ้าติดแหง็กอยู่ในนี้จนเกรดตกขึ้นมาล่ะจะทำยังไง?"
10047060-30 = "ทำไมฉันถึงเป็นห่วงคนงมงายพวกนี้จนโดนหางเลขไปด้วยก็ไม่รู้... เฮ้อ"
10047060-31 = "วงเวทเพ้อเจ้อนั่นก็ด้วย ต่อไปฉันจะห้ามไม่ให้ทำอะไรแบบนั้นแล้ว"
10047060-35 = "[ns1] \"ทุกคนชอบเรื่องลึกลับกันได้ยังไงเหรอ?\"\n[ns2] \"ทุกคนชอบรหัสยศาสตร์กันได้ยังไงเหรอ?\""
10047060-38 = "บอกตามตรงว่าฉันไม่ได้มีเหตุผลพิเศษที่มาหลงใหลในเรื่องนี้หรอกค่ะ"
10047060-39 = "แค่ได้ใช้เวลาสนุกๆ กับทุกคน ฉันก็มีความสุขแล้วค่ะ"
10047060-40 = "กับวงดนตรีก็เหมือนกันค่ะ"
10047060-41 = "ฮุฮุ แค่นั้นก็เป็นเหตุผลที่เพียงพอแล้วไม่ใช่เหรอคะ?"
10047060-42 = "ฮิฮิ ใช่แล้วละ แค่ได้สนุกก็พอแล้ว"
10047060-43 = "โลกใบนี้น่ะ... เต็มไปด้วยความมืดมน..."
10047060-44 = "ถ้าอยากมีชีวิตรอด... ก็ยิ่งต้องสนุกเข้าไว้..."
10047060-45 = "[s] \"แล้วคาโนเอะมาสายนี้ได้ยังไงเหรอ...?\""
10047060-46 = "ฉันก็... ไม่มีเหตุผลอื่นเป็นพิเศษหรอก ฉันก็แค่ชอบรหัสยศาสตร์น่ะ"
10047060-47 = "เราไม่ต้องมีเหตุผล... ในการชอบอะไรนี่นา"
10047060-48 = "อีกอย่าง... รหัสยศาสตร์ก็เป็นประโยชน์ต่อการเรียนด้วย..."
10047060-49 = "อย่างที่เอริจังเคยพูดไว้ว่าศิลปะกับรหัสยศาสตร์เป็นสิ่งที่แยกออกจากกันไม่ได้..."
10047060-50 = "ขอบอกไว้ก่อนว่า... ฉันได้เกรดดีเลยละ... ฮิฮิ..."
10047060-51 = "ฉันเคารพรุ่นพี่มากเลยค่ะ!"
10047060-52 = "ฉันควรเอาอย่างรุ่นพี่คาโนเอะบ้างแท้ๆ แต่พอต้องปฏิบัติจริงฉันก็ประหม่าอยู่เรื่อย..."
10047060-53 = "[s] \"อย่างนี้สินะ?\""
10047060-54 = "ที่จริงแล้วฉัน... เป็นเด็กสอบตกค่ะ"
10047060-55 = "ก่อนเข้าเรียนที่นี่ ฉันก็มั่นใจในทักษะการวาดรูปของตัวเอง...#nแต่ที่นี่มีเด็กที่เก่งกว่าฉันหลายคนเลยค่ะ"
10047060-56 = "ไม่ว่าฉันจะพยายามแค่ไหน ทักษะของฉันก็ไม่พัฒนาขึ้นเลย...#nเวลาเจอเพื่อนๆ เอกเดียวกัน ฉันก็สูญเสียความมั่นใจทุกทีค่ะ..."
10047060-57 = "ทุกคนต่างสร้างผลงานที่น่าทึ่งกัน...#nแต่จนถึงตอนนี้ฉันยังสร้างผลงานที่น่าพอใจไม่ได้เลยค่ะ"
10047060-58 = "[s] \"ตอนเจอเพื่อนในพิพิธภัณฑ์ศิลปะก็เลยประหม่าสินะ\""
10047060-59 = "แหะๆๆ น่าอายใช่มั้ยล่ะคะ?"
10047060-60 = "แต่ยังไง... ฉันก็คงเป็นแบบนี้ไปตลอดไม่ได้ ฉันคิดว่าต้องหาวิธีพัฒนาทักษะของตัวเอง"
10047060-61 = "ก็เลยได้มาหลงใหลในรหัสยศาสตร์แบบนี้ละค่ะ"
10047060-62 = "สักวันหนึ่งถ้าฉันสร้างผลงานอย่าง <ภาพเหมือนการสร้างโลก> ได้ละก็..."
10047060-63 = "ตอนนั้นฉันคงยืนอย่างภาคภูมิใจต่อหน้าทุกคนได้ค่ะ!"
10047060-67 = "มันออกจะแปลกๆ... หรือเปล่าคะ..."
10047060-68 = "[ns3] (สำหรับนักเรียนที่ไล่ตามความฝันของตัวเองละก็...)\n[ns4] (ตอนนี้สิ่งที่คนเป็นครูช่วยพูดได้ก็คือ...)"
10047060-73 = "[ns] \"ไม่เห็นจะแปลกตรงไหนเลย โลกนี้มีความเป็นไปได้มากมายเลยละ\""
10047060-74 = "อุฮุฮุ! ใช่มั้ยล่ะคะ? กะไว้แล้วเชียวว่ามาสเตอร์ต้องให้กำลังใจฉัน!"
10047060-75 = "คุณครูก็เป็น <คนพรรค์นั้น> ด้วยสินะ..."
10047060-76 = "ถึงจะเคยบอกไปแล้วหลายรอบ แต่ขอย้ำเลยนะว่าฉันไม่เชื่อเรื่องรหัสยศาสตร์อะไรนี่หรอก"
10047060-77 = "ข่าวลือและปรากฏการณ์แปลกๆ ที่แพร่สะพัดไปทั่วโลกล้วนแต่เป็นเรื่องเข้าใจผิดทั้งนั้น"
10047060-78 = "ทั้งสิ่งมีชีวิตประหลาดอย่างพวกปีศาจ โชคชะตา เวทมนตร์คาถา และการพยากรณ์อนาคต...#nเรื่องแบบนี้ถ้าไม่ได้เห็นเองกับตาก็เชื่อไม่ได้หรอก"
10047060-79 = "[s] \"อื้อ การคิดอย่างมีเหตุผลแบบนั้นก็สำคัญเหมือนกัน\""
10047060-80 = "ใช่ค่ะ เรนะจังบอกว่าสักวันหนึ่งจะเป็นแฟชั่นดีไซเนอร์หัวแถวของคิโวทอสให้ได้ค่ะ"
10047060-81 = "ระ... เราต้องฝันให้ไกลไว้ก่อนไม่ใช่เหรอ? แล้วเกรดของฉันก็ค่อนข้างดีด้วย"
10047060-82 = "นั่นสินะคะ... ความฝันของฉันคือการใช้ทุกๆ วันที่เต็มไปด้วยความฝันและความหวังร่วมกับทุกคนค่ะ... ฮุฮุ"
10047060-83 = "แล้วความฝันของรุ่นพี่คาโนเอะคืออะไรเหรอคะ?"
10047060-87 = "ความลับ..."
10047060-88 = "ไม่เอาน่า บอกกันเถอะนะ! พวกเราบอกความฝันของตัวเองกันหมดแล้วนะคะ"
10047060-89 = "อยากรู้จริงๆ เหรอ...?"
10047060-90 = "ถ้างั้นก็คงต้องบอกสินะ... ความฝันของฉันก็คือ..."
10047060-97 = "หาเนื้อคู่จากชาติปางก่อน..."
10047060-98 = "[ns] \"หืม...?\""
10047060-99 = "ฉันเพิ่งมารู้เมื่อไม่นานมานี้ว่า... ฉันกับคนคนหนึ่งเป็นบุพเพสันนิวาสกันมาตั้งแต่ชาติปางก่อนน่ะ... ฮิฮิ"
10047060-105 = "[ns5] \"งะ... งั้นเองเหรอ...!\"\n[ns6] \"ปะ... เป็นความฝันที่ยอดเยี่ยมเลยนะ...\""
10047060-108 = "ฮิฮิฮิ..."
10047060-113 = "ทุกคนคะ? ลืมกันไปหรือเปล่าว่าตอนนี้พวกคุณอยู่ในห้องสำนึกผิดกันน่ะ?"
10047060-114 = "อ๊ะ! ขะ... ขอโทษที! จะอยู่เงียบๆ เดี๋ยวนี้ละ!"
10047060-115 = "ก็นะ... ใช่ว่าพวกคุณเป็นคนที่ถูกขังในที่แบบนี้แล้วจะสำนึกผิดสักหน่อย"
10047060-120 = "เอะ... เอ๋?"
10047060-127 = "เอาละ ทุกคนออกมาได้แล้วค่ะ ครั้งนี้ฉันจะแค่ตักเตือนเป็นกรณีพิเศษค่ะ"
10047060-128 = "แต่ต่อไปถ้าโดนจับได้อีก ขอบอกไว้เลยนะคะว่าฉันรายงานสภาศิลปะแน่"
10047060-129 = "ฮิฮิ ขอบใจนะ... ก็มีแต่มิเรียจังเท่านั้นละที่ยืดหยุ่นให้"
10047060-130 = "ถ้าขังคุณครูของชาเล่ต์ไว้นานๆ พวกฉันก็อาจโดนตักเตือนไปด้วยก็ได้ค่ะ"
10047060-131 = "เพราะงั้นก็รีบกลับกันไปเถอะค่ะ ก่อนที่ฉันจะเปลี่ยนใจ"
10047060-132 = "ขะ... ขอบใจนะ!"
10047060-133 = "ฮู่ว... รอดแล้วค่ะ...!"
10047060-145 = "[ns] \"นักเรียนคนเมื่อกี้คือฝ่ายดูแลหอพักงั้นเหรอ?\""
10047060-146 = "ใช่... เป็นเพื่อนที่พวกเราเป็นหนี้บุญคุณมานานเลยละ..."
10047060-147 = "ในบรรดาหัวหน้าฝ่ายดูแลหอพัก... เธอมีความยืดหยุ่นมากที่สุดแล้ว..."
10047060-152 = "[ns] \"อย่างนั้นสินะ...\""
10047060-153 = "เอาละ กลับหอพักกันก่อนเถอะค่ะ ฉันว่าเราต้องรีบทำความสะอาดกันด้วย"
10047060-154 = "อ๊ะ...! นั่นน่ะสิ ห้องเราเละเทะหมดเลยนี่นา!"
10047060-155 = "แหะๆๆ... ขอโทษนะคะ ขอโทษค่ะ"
10047060-159 = "[ns] \"ครูจะช่วยทำความสะอาดอีกแรงนะ\""
10047060-160 = "คุณครูก็มีส่วนผิดที่ไม่ห้ามทุกคน งั้นก็ต้องรับผิดชอบร่วมกันอยู่แล้ว"
10047060-161 = "ฉันก็... จะช่วยนิดหน่อยแล้วกัน"
10047060-162 = "เรนะจังนี่น่ารักจริงๆ เลย... ฮิฮิ..."
10047060-167 = "คะ... คิดว่าชมกันแล้วฉันจะเหลิงหรือไง!"
10047060-180 = "ไม่คิดเลยนะว่าจะได้เจอกันอีกในที่แบบนี้..."
10047060-181 = "ฮุฮุ... คุณครู [USERNAME]"

[translation]
10047060-1 = "第6話;各自的夢想"
10047060-9 = "[ns]「……是閣樓啊。」"
10047060-10 = "呵呵，簡直就像灰姑娘一樣呢。"
10047060-11 = "儘管我們並不是灰姑娘，也沒有在灰燼中尋找豆子，不過此時此刻──"
10047060-12 = "啊啊，別鬧了！現在該怎麼辦？#n要怎麼出去啊！"
10047060-16 = "[ns]「這裡到底是什麼地方？」"
10047060-17 = "是讓學生與外界隔絕，奪取魔力的恐怖場所。"
10047060-18 = "可以說是一種「結界」嗎？"
10047060-22 = "就只是反省室而已啦。"
10047060-23 = "[s]「這，這樣啊……」"
10047060-24 = "硬要比喻的話，或許更接近監獄吧。#n雖然壓抑感相對弱一些就是了。"
10047060-25 = "這裡……比想像中舒適……很溫暖……也會準時送飯來……"
10047060-26 = "所以……大家不用太擔心……"
10047060-27 = "很快就會放我們出去的。"
10047060-28 = "沒錯！盡量往好的方向想吧！"
10047060-29 = "唉，真羨慕大家都能這麼無憂無慮的。#n要是期末成績被扣分的話怎麼辦啊？"
10047060-30 = "我到底為什麼要擔心這群笨蛋，還跟著被帶來這裡啦……唉。"
10047060-31 = "什麼魔法陣嘛……下次我一定要阻止到底。"
10047060-35 = "[ns1]「魔法陣啊……」\n[ns2]「話說大家是怎麼喜歡上神秘學的？」"
10047060-38 = "老實說，並沒有什麼特別的契機。"
10047060-39 = "我只要能和大家一起度過快樂的時光就很滿足了。"
10047060-40 = "就像樂團活動一樣。"
10047060-41 = "呵呵，這個理由就已經足夠充分了，不是嗎？"
10047060-42 = "咿嘻，沒錯。開心就好。"
10047060-43 = "這個世界……充滿黑暗……"
10047060-44 = "要活下去……快樂越多越好……"
10047060-45 = "[s]「鹿江是怎麼喜歡上神秘學的呢？」"
10047060-46 = "我也……沒有什麼特別的理由。#n單純只是因為喜歡而已。"
10047060-47 = "喜歡一件事……不需要理由吧？"
10047060-48 = "而且神秘學……意外地對學業有幫助……"
10047060-49 = "就像繪梨醬說過的一樣，藝術和神秘學之間存在密不可分的關係……"
10047060-50 = "順帶一提，我的成績還算不錯哦……咿嘻……"
10047060-51 = "唔唔，前輩真是太值得尊敬了！"
10047060-52 = "我也該多向鹿江前輩學習才對，可是一到實作考試就緊張到不行……"
10047060-53 = "[s]「是嗎？」"
10047060-54 = "……其實我，是個在及格邊緣掙扎的人。"
10047060-55 = "在入學之前，我對自己的畫還挺有自信的……不過這裡有非常多比我更厲害的孩子。"
10047060-56 = "不管怎麼努力都無法提升實力……#n所以只要一到同科的朋友面前，就會失去自信……"
10047060-57 = "明明大家都能創作出很棒的作品……#n我卻直到現在都沒做出能讓人認同的東西。"
10047060-58 = "[s]「所以你在美術館遇到朋友時才會緊張啊。」"
10047060-59 = "耶嘿嘿，很糗吧？"
10047060-60 = "但是……也不能一直這樣下去對吧？#n我必須想出可以提升實力的方法才行。"
10047060-61 = "結果想著想著就迷上神秘學了。"
10047060-62 = "總有一天，等到我也能創作出《創世的肖像》那樣的作品──"
10047060-63 = "我就可以堂堂正正地站在大家面前了！"
10047060-67 = "這樣，會很奇怪嗎……"
10047060-68 = "[ns3] （有個正努力追逐自己夢想的學生）\n[ns4] （那麼，身為老師該做的是──）"
10047060-73 = "[ns]「一點也不奇怪哦。世界上充滿著各種可能性。」"
10047060-74 = "妞呵呵！對吧？#n我就知道御者會支持我的！"
10047060-75 = "看來老師也是「那邊的人」呢……"
10047060-76 = "我再強調一次，我不相信什麼神秘學。"
10047060-77 = "世間流傳的那些奇怪傳聞或現象，全都只是誤會而已。"
10047060-78 = "什麼惡魔、命運、預知未來、魔法……#n除非讓我親眼見到，否則我都不會相信。"
10047060-79 = "[s]「嗯，這種理性的想法也是很重要的。」"
10047060-80 = "沒錯。#n玲奈醬不是說過，總有一天要成為奇普托斯最棒的時尚設計師嗎？"
10047060-81 = "夢，夢想就是要大一點才好吧？#n我的成績也還算不錯啊……"
10047060-82 = "是啊……#n我的夢想，是和大家一起度過充滿夢想與希望的每一天……呵呵。"
10047060-83 = "鹿江前輩的夢想是什麼呢？"
10047060-87 = "……祕密。"
10047060-88 = "哎呀，前輩就告訴我們嘛～！#n我們都說出自己的夢想了耶！"
10047060-89 = "真的那麼想知道嗎……？"
10047060-90 = "那我就說吧……我的夢想是……"
10047060-97 = "找回……前世的羈絆……"
10047060-98 = "[ns]「嗯……？」"
10047060-99 = "在我的前世，有個和我有著強烈羈絆的對象……#n這是我最近才察覺到的……咿嘻。"
10047060-105 = "[ns5]「這，這樣啊……！」\n[ns6]「我，我覺得挺好的……」"
10047060-108 = "咿嘻嘻……"
10047060-113 = "各位？你們是不是忘記自己現在在反省室了？"
10047060-114 = "啊！對，對不起！我們會安靜的！"
10047060-115 = "……不過看你們的樣子，也不像是會因為被關起來就反省的人呢。"
10047060-120 = "咦，咦？"
10047060-127 = "來，都出來吧。#n這次我就特別網開一面，當作是給各位的警告。"
10047060-128 = "要是再被抓到的話，我就報告給評議會囉？"
10047060-129 = "咿嘻，謝謝……果然只有米莉亞醬最通情達理。"
10047060-130 = "畢竟要是將夏萊的老師拘束太久，我們也會惹上麻煩的。"
10047060-131 = "所以快回去吧。在我改變心意之前。"
10047060-132 = "謝，謝謝！"
10047060-133 = "呼……得救了……！"
10047060-145 = "[ns]「剛才那孩子也是舍監隊的嗎？」"
10047060-146 = "沒錯……是一直關照著我的朋友……"
10047060-147 = "在舍監隊的幹部之中……算是比較好說話的人……"
10047060-152 = "[ns]「……這樣啊。」"
10047060-153 = "好了，我們先回宿舍吧。得趕快打掃才行。"
10047060-154 = "啊……！這麼說來，房間應該亂成一團了！"
10047060-155 = "耶嘿嘿……抱歉抱歉。"
10047060-159 = "[ns]「我也來幫忙打掃。」"
10047060-160 = "老師沒阻止他們所以也有責任，要好好清理哦。"
10047060-161 = "我也會多少幫點忙啦。"
10047060-162 = "玲奈醬果然人最好了……咿嘻……"
10047060-167 = "被，被那樣稱讚我也不會高興啦！"
10047060-180 = "……沒想到會在這種地方再會呢。"
10047060-181 = "呵呵……[USERNAME]老師。"

[translation]
1011206-1 = "Lost Cellphone"
1011206-2 = "I was worried after not getting a response from Asuna, so I headed to the last location she mentioned."
1011206-6 = "[ns] \"(It's already pretty late. I wonder if she's still here...)\""
1011206-11 = "I saw someone lying on the ground."
1011206-12 = "[ns] \"Asuna?\""
1011206-21 = "Ah! Sensei!!"
1011206-22 = "What's up? How'd you know I was here?"
1011206-23 = "[s] \"You didn't message me back on MomoTalk, so I came to find you.\""
1011206-27 = "[ns] \"I thought maybe your phone was broken, and you might be in danger.\""
1011206-28 = "Ah, I'm okay! Haha."
1011206-29 = "It's not like I can't take care of myself or anything!"
1011206-30 = "[s] \"That's a relief.\""
1011206-31 = "Yup! See, sometimes when there isn't anything fun to do..."
1011206-32 = "...or I can't hang out with the people I like..."
1011206-33 = "...Yeah. I feel down sometimes when it's like that. Ahaha. Like my battery needs a recharge."
1011206-34 = "[s] \"Have you been feeling all right lately?\""
1011206-35 = "Yup, yup! I've been having lots of fun."
1011206-36 = "Plus I run into you all the time! So yup, things are going great!"
1011206-37 = "[s1] \"Well, sounds good, then...\"\n[s2] \"But what were you doing here?\""
1011206-41 = "Ah, right!"
1011206-42 = "I lost my phone!"
1011206-43 = "[s] \"What?\""
1011206-44 = "I was trying to reply to you, but I got distracted, and now I don't know where my phone is."
1011206-45 = "Which is why I couldn't reply to your MomoTalk. Sorry about that, Sensei."
1011206-46 = "[s] \"You want to look for it together?\""
1011206-50 = "With you, Sensei? Yup! We can do that! Heehee."
1011206-51 = "I think I lost it somewhere around here, but I can't find it!"
1011206-52 = "[s3] \"Let's retrace your steps and keep our eyes open.\"\n[s4] \"I'll keep calling your phone.\""
1011206-55 = "Yup! It's on vibrate, so it's going to buzz. That'll help us find it for sure!"
1011206-57 = "I kept calling Asuna's number while we searched the area."
1011206-60 = "After a few minutes..."
1011206-66 = "[ns] \"Was that...?\""
1011206-67 = "Sensei, do you hear that? I think it's right around here!"
1011206-72 = "Ah! Over there!!"
1011206-78 = "Found it, Sensei!"
1011206-82 = "Ahaha, I must've left it on the bench when I sat down."
1011206-83 = "I should've started by searching the places I knew I'd already been."
1011206-84 = "[s5] \"That's a good method for finding things in general.\"\n[s6] \"I'm glad you found it, Asuna.\""
1011206-87 = "Yeah!! I would've lost it for sure if not for your help."
1011206-88 = "Thank you, Sensei!! For always being there for me!"
1011206-93 = "...Oh, look at this!"
1011206-94 = "[s7] \"It's got lots of missed calls from me.\"\n[s8] \"I did keep calling to find the phone...\""
1011206-97 = "Ahaha, there's 14 of them! I never even get this many calls from the club members!"
1011206-98 = "Yeah, it feels kind of weird."
1011206-106 = "It's like you're suuuper desperate to talk to me. Ahaha!"
1011206-107 = "...Like I'm that important to you."
1011206-108 = "[s] \"Well...you're not wrong about that...\""
1011206-109 = "Fufu, something feels all tingly inside me!"
1011206-110 = "I should take a screenshot of this! It's a very important record!!"
1011206-112 = "I returned safely, with the very excited Asuna."

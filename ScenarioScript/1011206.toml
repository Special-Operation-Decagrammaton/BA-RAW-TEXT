[translation]
1011206-1 = "遺失的手機"
1011206-2 = "（因為擔心沒有回覆的明日奈，於是前往了他最後提到的地方）"
1011206-6 = "[ns]（天色已經很暗了……會在這裡嗎……）"
1011206-11 = "（有人趴在那裡……）"
1011206-12 = "[ns]「明日奈？」"
1011206-21 = "啊！老師～！！"
1011206-22 = "什麼什麼？你怎麼知道明日奈在這裡？"
1011206-23 = "[s]「因為你沒有回MomoTalk，所以就來找你了。」"
1011206-27 = "[ns]「如果跟以前一樣故障的話，我擔心會有危險。」"
1011206-28 = "啊，我現在沒事的哦！哈哈。"
1011206-29 = "身體也能正常使力的唷～！"
1011206-30 = "[s]「那就好。」"
1011206-31 = "嗯！好像要很無聊的時候才會變成那樣。"
1011206-32 = "或者沒辦法常常看到喜歡的人之類的？"
1011206-33 = "嗯嗯，那種時候經常會覺得全身無力呢。#n啊哈哈，說不定明日奈其實是充電式的哦！"
1011206-34 = "[s]「你最近還好嗎？」"
1011206-35 = "嗯嗯！因為最近過得很有趣～"
1011206-36 = "而且又常常碰到老師！所以我很開心！！"
1011206-37 = "[s1]「那真是太好了……」\n[s2]「話說你在這裡做什麼呢？」"
1011206-41 = "啊，對了！"
1011206-42 = "我的手機不見了！！"
1011206-43 = "[s]「什麼？」"
1011206-44 = "我剛才本來想回老師訊息的，結果卻被其他東西吸引，等我回過神來手機就不見了。"
1011206-45 = "就是因為這樣才沒有回MomoTalk。#n對不起，老師。"
1011206-46 = "[s]「那我們一起找找看吧？」"
1011206-50 = "和老師一起找嗎？嗯！當然好！#n嘿嘿。"
1011206-51 = "好像是在這附近弄丟的，可是我怎麼找都找不到～！"
1011206-52 = "[s3]「在明日奈走過的路上找找看吧。」\n[s4]「我會繼續打電話看看。」"
1011206-55 = "嗯！只要聽震動模式的嗡嗡聲，就能知道手機在哪了！"
1011206-57 = "（就這樣不斷撥電話給明日奈，一起在附近尋找手機的下落）"
1011206-60 = "（不久後……）"
1011206-66 = "[ns]「剛才……」"
1011206-67 = "老師也聽到了嗎？好像在這附近！"
1011206-72 = "啊！在那邊！！"
1011206-78 = "找到了，老師！！"
1011206-82 = "啊哈哈，我好像放在剛才坐過的長椅上了。"
1011206-83 = "早知道我就先從去過的地方開始找了～"
1011206-84 = "[s5]「從待過的地方開始找的話，很快就會發現的。」\n[s6]「總之能找回來真是太好了，明日奈。」"
1011206-87 = "嗯！！要不是有老師在，我肯定沒辦法把手機找回來。"
1011206-88 = "謝謝你，老師！！謝謝你總是幫助明日奈！"
1011206-93 = "啊，你看這個！老師。"
1011206-94 = "[s7]「都是我打的未接來電呢。」\n[s8]「因為我不斷在撥電話……」"
1011206-97 = "啊哈哈，有十四通耶！就連社團的大家也沒有這麼常打給我的說！"
1011206-98 = "嗯，有種神奇的感覺。"
1011206-106 = "看來老師非～常著急地在找明日奈呢。啊哈哈！"
1011206-107 = "就好像明日奈對老師來說……真的真的很重要一樣？"
1011206-108 = "[s]「這個嘛……要這麼說也沒錯……」"
1011206-109 = "呵呵，感覺心癢癢的！！"
1011206-110 = "我要擷圖存下來～！這是很珍貴的紀錄！！"
1011206-112 = "（於是和興致高漲的明日奈一起回了家……）"

[translation]
1011206-1 = "โทรศัพท์ที่หายไป"
1011206-2 = "(คุณครูเป็นห่วงอาสึนะที่ไม่ตอบข้อความ จึงมุ่งหน้าไปยังสถานที่ที่เธออยู่)"
1011206-6 = "[ns] (นี่ก็มืดค่ำแล้ว... อยู่ตรงนี้หรือเปล่านะ...)"
1011206-11 = "(มีคนนอนคว่ำอยู่ทางด้านโน้น...)"
1011206-12 = "[ns] \"อาสึนะ?\""
1011206-21 = "อ๊ะ! คุณครู~!!"
1011206-22 = "อะไรเนี่ย? รู้ได้ยังไงน่ะว่าอาสึนะอยู่ที่นี่? แล้วมาทำไมเหรอ?"
1011206-23 = "[s] \"เห็นว่าไม่ตอบ MOMOTALK ครูเลยออกมาตามหาน่ะ\""
1011206-27 = "[ns] \"เพราะถ้าเกิดเรื่องเหมือนเมื่อก่อนมันจะอันตรายเอา\""
1011206-28 = "อ้อ ตอนนี้อาสึนะไม่เป็นไร! ฮะฮ่า"
1011206-29 = "ไม่ใช่ว่ามานอนอยู่เพราะร่างกายไม่มีแรงหรอก~!"
1011206-30 = "[s] \"งั้นก็ค่อยยังชั่วหน่อย\""
1011206-31 = "อื้อ! ที่อาสึนะเป็นอย่างนี้ น่าจะเพราะไม่มีเรื่องสนุกๆ ให้ทำน่ะ"
1011206-32 = "หรือไม่ก็เพราะไม่ได้เจอคนที่ชอบบ่อยๆ?"
1011206-33 = "จริงสินะ ถ้าเป็นอย่างนั้น บางครั้งอาสึนะก็จะไม่ค่อยมีเรี่ยวแรงน่ะ อะฮ่าฮ่า การได้เจอผู้คนอาจจะเป็น#nการชาร์จแบตของอาสึนะก็ได้!"
1011206-34 = "[s] \"แต่ช่วงนี้โอเคอยู่ใช่มั้ย?\""
1011206-35 = "อื้อๆ! ก็เพราะช่วงนี้มีเรื่องสนุกให้ทำ~"
1011206-36 = "แล้วก็ได้เจอคุณครูบ่อยๆ ด้วย! เพราะงั้นก็เลยดีมากเลยละ!!"
1011206-37 = "[s1] \"ถ้างั้นก็ดีอยู่หรอก ว่าแต่มาทำอะไรอยู่ที่นี่ล่ะ...?\"\n[s2] \"ได้ยินอย่างนั้นก็ดีแล้ว ว่าแต่มาทำอะไรอยู่ที่นี่เหรอ...?\""
1011206-41 = "อ๊ะ จริงด้วย!"
1011206-42 = "พอดีฉันทำโทรศัพท์หายน่ะสิ!!"
1011206-43 = "[s] \"ว่าไงนะ?\""
1011206-44 = "ฉันว่าจะตอบข้อความของคุณครู แต่ระหว่างนั้นก็มัวแต่ไปคิดเรื่องอื่น แล้วพอรู้ตัวอีกที โทรศัพท์ก็หายไปแล้ว"
1011206-45 = "ก็เลยตอบ MOMOTALK ไม่ได้น่ะ ขอโทษนะคุณครู"
1011206-46 = "[s] \"งั้นไปหาโทรศัพท์ด้วยกันมั้ย?\""
1011206-50 = "ไปหากับคุณครูเหรอ? อื้อ! เอาสิ! แหะๆ"
1011206-51 = "น่าจะทำหายแถวๆ นี้นะ แต่หาเท่าไรก็ไม่เจอเลย~!"
1011206-52 = "[s3] \"ย้อนกลับไปหาตามทางที่อาสึนะมาดีกว่า\"\n[s4] \"ครูจะโทรเข้าเครื่องอาสึนะเรื่อยๆ นะ\""
1011206-55 = "อื้อ! มันปิดเสียงไว้ แต่ก็น่าจะสั่นตืดตืด~ ให้ได้ยินอยู่ แบบนั้นก็น่าจะรู้ได้ว่าอยู่ที่ไหนนะ!"
1011206-57 = "(คุณครูกับอาสึนะเดินหาโทรศัพท์มือถือในบริเวณนั้นต่อ)"
1011206-60 = "(ไม่นานหลังจากนั้น...)"
1011206-66 = "[ns] \"เมื่อกี้มัน...\""
1011206-67 = "คุณครูก็ได้ยินเหมือนกันใช่มั้ย? มันน่าจะอยู่แถวๆ นี้นะ!"
1011206-72 = "อ๊ะ! นั่นไง!!"
1011206-78 = "เจอแล้ว คุณครู!!"
1011206-82 = "อะฮ่าฮ่า สงสัยจะเผลอวางไว้ที่ม้านั่งที่อาสึนะมานั่งอยู่เมื่อกี้น่ะ"
1011206-83 = "รู้งี้มาหาในที่ที่ตัวเองไปตั้งแต่แรกก็ดี~"
1011206-84 = "[s5] \"ถ้าย้อนกลับไปที่ที่เคยอยู่ ไม่นานก็หาเจอแบบนี้ละ\"\n[s6] \"ค่อยโล่งใจหน่อยนะที่หาเจอ อาสึนะ\""
1011206-87 = "อื้อ!! ถ้าไม่ได้คุณครู ป่านนี้อาสึนะคงยังหาไม่เจอแน่ๆ"
1011206-88 = "ขอบคุณที่ช่วยเหลืออาสึนะเสมอเลยนะคุณครู!"
1011206-93 = "อ๊ะ ดูนี่สิ! คุณครู"
1011206-94 = "[s7] \"มีสายโทรเข้าจากครูหลายครั้งเลยนะ\"\n[s8] \"ระหว่างนี้ครูโทรหาขนาดนี้เลยเหรอเนี่ย...\""
1011206-97 = "อะฮ่าฮ่า ตั้ง 14 สายที่ไม่ได้รับ! ปกติสมาชิกในชมรมยังไม่เคยโทรตามฉันขนาดนี้เลยด้วย!"
1011206-98 = "อืม รู้สึกแปลกๆ นิดหน่อยแฮะ"
1011206-106 = "ดูเหมือนว่าคุณครูจะใส่ใจกับอาสึนะมากๆ เลยนะ~ อะฮ่าฮ่า!"
1011206-107 = "รู้สึกเหมือนอาสึนะเป็นคนสำคัญมากๆ ของคุณครูเลยละ"
1011206-108 = "[s] \"ก็... ที่พูดมามันก็ไม่ผิดหรอก...\""
1011206-109 = "ฮุฮุ รู้สึกจั๊กจี้หัวใจจัง!!"
1011206-110 = "ต้องแคปหน้าจอไว้แล้วละ~! เป็นสายเรียกเข้าที่น่าจดจำมากๆ เลย!!"
1011206-112 = "(แล้วคุณครูก็เดินทางกลับพร้อมกับอาสึนะที่ยิ่งอารมณ์ดีมากกว่าเดิม)"

[translation]
21160-1 = "Episode 16;Just One Step Forward!"
21160-2 = "Millennium Student Council Contraband Storage"
21160-5 = "*huff puff* Did we make it?!"
21160-6 = "Sensei? Midori? Aris? Is everyone okay?"
21160-7 = "My HP is not critical."
21160-8 = "I-I'm fine. So is Sensei. "
21160-9 = "Thank goodness... So this is the contraband storage room? It's a mess."
21160-10 = "Broken glass all over... Drawers upended..."
21160-11 = "There was probably an explosion from the battle that did this. Karin's doing, perhaps?"
21160-12 = "Anyway, Yuuka probably thought Aris would take the Mirror and run to the Game Development Department. Heh heh. She probably has no idea we'd come here ourselves."
21160-13 = "We just need the Mirror, and Veritas can handle the rest."
21160-15 = "Here it is! Key item obtained!"
21160-16 = "Heehee. This is so exciting. Let's go back..."
21160-17 = "...?"
21160-18 = "Everyone, please mute yourselves."
21160-19 = "Huh?"
21160-21 = "Someone is coming. Based on the footsteps, they are alone."
21160-22 = "If it's only one person, we can ignore them or break through quickly. What should we do if Yuuka and the Maid Club come back?"
21160-23 = "..."
21160-24 = "Pause."
21160-25 = "I've got a message from Hare."
21160-27 = " (RUN OR HIDE! JUST DON'T—*bzzzzt*)"
21160-28 = "Huh? What's that supposed to mean?"
21160-29 = "It's weird for Hare to be freaking out. Maybe there's a rat in the Veritas club room or something?"
21160-30 = "Identifying approaching target. Searching Millennium student list. Target confirmed."
21160-31 = "Height: 4'9\"... Dual SMGs... Dragon-patterned bomber jacket over a maid uniform..."
21160-32 = "Wha...?"
21160-33 = "N-No way!"
21160-35 = "Hide!"
21160-38 = "Sensei! Your head is hidden, but your butt is poking out!"
21160-39 = "H-Hurry! We've gotta move!"
21160-43 = "..."
21160-44 = "Hmm. This place is a pit."
21160-45 = "(N-N-Neru?!)"
21160-46 = "(B-But why?! What in the world is she doing here?!)"
21160-47 = "Heh?"
21160-48 = "That whispering I'm hearin'?"
21160-49 = "*gasp*"
21160-50 = "(Eek!)"
21160-51 = "(...)"
21160-52 = "(This girl... She is different from the rest.)"
21160-53 = "(I am feeling a new emotion. Is this...fear?)"
21160-54 = "(Our probability of victory in a battle under current conditions is unequivocally...zero percent!)"
21160-56 = "Let's see..."
21160-57 = "Under the desk, maybe?"
21160-59 = "*clomp*"
21160-61 = "*clomp*"
21160-62 = "(Th-The suspense is killing me!)"
21160-63 = "(We're so dead...)"
21160-64 = "(S-Sensei! What should we do?!)"
21160-65 = "(All she has to do is look down, and...!)"
21160-68 = "U-Um, excuse me!"
21160-69 = "Heh?"
21160-71 = "N-Neru! It's an emergency!"
21160-72 = "*gasp*"
21160-73 = "(Y-Yuzu?!)"
21160-74 = "And you are...?"
21160-75 = "M-My name's Yuzu, and I'm with Seminar."
21160-76 = "The robots are out of c-control! It's a disaster! "
21160-77 = "Akane and Karin are trying, but it's just..."
21160-78 = "Huh? We've had those bots for a while, yeah? Shouldn't they be set up already?"
21160-79 = "I-I'm not sure... But they needed help, and I heard y-you were here and I..."
21160-80 = "*sigh* Guess I gotta do everything around here."
21160-81 = "I-I'll stay and clean up. I don't have any ammo or experience, so I-I'm s-scared of fighting..."
21160-82 = "Not that it's really any of my business..."
21160-83 = "...but you should remember the most important thing in a fight isn't weapons or experience."
21160-84 = "Pardon?"
21160-85 = "It's guts, kid."
21160-86 = "And you already got that in spades, I reckon."
21160-87 = "Not just anyone can waltz up and ask ME a favor in a situation like this."
21160-88 = "H-H-Huh?! I, uh...thank you."
21160-89 = "See ya around, kid."
21160-91 = "*gulp*"
21160-93 = "*flop*"
21160-95 = "I-I thought I was dead for sure."
21160-96 = "Yuzuuu!"
21160-97 = "That was amazing, Yuzu! You saved us!"
21160-98 = "I'm glad I made it in time."
21160-99 = "A-Anyway, that thing in Aris' hands must be..."
21160-102 = "Correct."
21160-103 = "I present the object of our quest, which will abate mankind's destruction..."
21160-104 = "...the legendary Mirror."
21160-105 = "...!"
21160-106 = "We'll have to save the party for later. If Neru comes back, we're all dead meat!"
21160-107 = "There are a lot of robots ahead. Be careful!"
21160-108 = "R-Right! Our mission isn't over yet!"
21160-109 = "To reach our true goal, the G.BIBLE, we have to get the Mirror to the Veritas club room!"
21160-110 = "Time to pull out. I will guard the rear. Your orders, Sensei?"
21160-113 = "[ns1] \"Let's make for the club room!\"\n[ns2] \"Everyone, prepare for battle!\""
21160-116 = "Right!"
21160-117 = "We'll make it back, no matter what!"
21160-118 = "Equipment set and ready to go!"

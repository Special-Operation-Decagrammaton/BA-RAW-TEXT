[translation]
21160-1 = "ตอนที่ 16;ก้าวไปอีกหนึ่งก้าว!"
21160-2 = "คลังของที่ถูกยึดของสภานักเรียนมิลเลเนียม"
21160-5 = "แฮ่ก แฮ่ก... เราฝ่ามาสำเร็จแล้วเหรอ?!"
21160-6 = "คุณครู! มิโดริ! อาริสึ?! ปลอดภัยหรือเปล่า?"
21160-7 = "ยังมี HP เหลือเฟือค่ะ"
21160-8 = "ฉะ.. ฉันกับคุณครูก็ปลอดภัยดี"
21160-9 = "ละ... โล่งอกไปที ที่นี่คือคลังของที่ถูกยึดเหรอ? ทำไมเละเทะแบบนี้ล่ะ?"
21160-10 = "กระจกก็แตก แถมลิ้นชักก็ล้มหมดเลย..."
21160-11 = "น่าจะเป็นระเบิดของรุ่นพี่คารินนะ... สงสัยแรงระเบิดจากการต่อสู้เมื่อกี้จะมันมาถึงที่นี่เลย"
21160-12 = "แต่ตอนนี้ยูกะคงคิดว่าอาริสึเอากระจกแล้วหนีไปที่ห้องชมรมพัฒนาเกมแล้วล่ะ...#nฮุฮุ! เธอไม่รู้หรอกว่าเรามาที่นี่"
21160-13 = "พวกเราเอากระจกกลับไปกันเถอะ ที่เหลือเวอริทัสจะช่วยจัดการเอง"
21160-15 = "โอเค เจอกระจกแล้ว! ถ้ามีสิ่งนี้ล่ะก็..."
21160-16 = "ฮุฮุ ตื่นเต้นจัง เอาล่ะ รีบกลับ..."
21160-17 = "......?"
21160-18 = "ชู่ว... เงียบเสียงค่ะทุกคน"
21160-19 = "หืม?"
21160-21 = "ใครบางคนกำลังมาทางนี้ค่ะ ฟังจากเสียงฝีเท้าแล้ว น่าจะมาแค่คนเดียว"
21160-22 = "นี่ ถ้าเรามัวแต่อยู่ตรงนี้นานๆ แล้วยูกะหรือชมรมเมดกลับมาล่ะ? ถ้ามีใครมาคนเดียวก็ไม่ต้องใส่ใจ#nหรือไม่ก็รีบฝ่าไปเร็วๆ กันเถอะนะ"
21160-23 = "......"
21160-24 = "ดะ.. เดี๋ยวก่อน!"
21160-25 = "รุ่นพี่ฮาเระติดต่อมา"
21160-27 = "(หนีให้ได้ ไม่สิ ซ่อนตัวไว้! ขอร้องล่ะ! พวกเธอต้อง$!#^&!@#)"
21160-28 = "เอ๋? หมายความว่ายังไง...?"
21160-29 = "รุ่นพี่ฮาเระที่ใจเย็นทำไมถึงเป็นแบบนี้ล่ะ? หรือว่ามีหนูโผล่ออกมาในห้องเวอริทัส?"
21160-30 = "เจอเป้าหมาย ค้นหารายชื่อนักเรียนมิลเลเนียม ยืนยันเป้าหมาย"
21160-31 = "146 ซ.ม. ...... ดับเบิ้ล SMG...... สวมเสื้อเบสบอลลายมังกรทับชุดเมดอีกที..."
21160-32 = "หืม…?"
21160-33 = "ยะ... อย่าบอกนะว่า...?!"
21160-35 = "ซ่อนเร็ว!"
21160-38 = "คุณครู! อย่าซ่อนแต่หัวสิคะ เก็บก้นไปด้วยค่ะ!"
21160-39 = "เร็วเข้า! รีบๆ หน่อย!"
21160-43 = "......"
21160-44 = "ฮึ่ม... เละเทะไปหมดเลยแหะ"
21160-45 = "(รุ่นพี่ นะ... นะ... เนรุ!)"
21160-46 = "(ทำไมล่ะ! ทำไมถึงมาอยู่ที่นี่...!)"
21160-47 = "เอ๋.....?"
21160-48 = "เหมือนได้ยินเสียงใครกระซิบกันเลย..."
21160-49 = "(?!)"
21160-50 = "(เฮือก......!)"
21160-51 = "(.......)"
21160-52 = "(คนคนนี้... ไม่เหมือนคนอื่นเลย...)"
21160-53 = "(นี่สินะที่เรียกกันว่า… ความน่ากลัว...)"
21160-54 = "(โอกาสสำเร็จหากมีการต่อสู้เกิดขึ้น... อยู่ที่... 0%......!)"
21160-56 = "ฮึ่ม....."
21160-57 = "เหมือนจะมีคนอยู่แถวนี้เลย... หรือว่าอยู่ใต้โต๊ะ...?"
21160-59 = "(กึก.......)"
21160-61 = "(กึก.............)"
21160-62 = "(ทะ... ทำยังไงดี?)"
21160-63 = "(เราจบเห่แน่ๆ...)"
21160-64 = "(คะ... คุณครู?! ไม่ได้นะ!)"
21160-65 = "(อยู่ตรงหน้าเลย... ถ้าเธอก้มหัวลงล่ะก็......!)"
21160-68 = "คะ... คือว่า!"
21160-69 = "หืม?"
21160-71 = "ระ... รุ่นพี่เนรุ! เกิดเรื่องใหญ่แล้วค่ะ!"
21160-72 = "(?!)"
21160-73 = "(ยะ... ยูสึจัง?!)"
21160-74 = "เธอคือ...?"
21160-75 = "ฉะ... ฉันคือยูสึจากเซมิน่าค่ะ"
21160-76 = "จู่ๆ หุ่นยนต์ต่อสู้ก็อาละวาดขึ้นมา ตอนนี้ก็เลยวุ่นวายไปหมดเลยค่ะ!"
21160-77 = "รุ่นพี่อาคาเนะกับรุ่นพี่คารินกำลังต่อสู้อยู่ แต่ก็..."
21160-78 = "เอ๋? เรายึดเจ้าพวกนั้นมาตั้งนานแล้ว ยังซ่อมไม่เสร็จกันอีกงั้นเหรอ?"
21160-79 = "ฉะ... ฉันต้องการความช่วยเหลือ แล้วก็ได้ยินมาว่ารุ่นพี่อยู่ที่นี่..."
21160-80 = "อ่า งั้นก็ช่วยไม่ได้แหะ"
21160-81 = "สะ... ส่วนฉัน... จะอยู่จัดการที่นี่เองค่ะ ฉะ... ฉันไม่ค่อยถนัดการต่อสู้... แล้วก็ไม่มีกระสุน...#nแถมยังขาดประสบการณ์..."
21160-82 = "ช่างเถอะ ว่าแต่เธอน่ะ..."
21160-83 = "จำเอาไว้ด้วย สิ่งสำคัญที่สุดในการต่อสู้ไม่ใช่อาวุธหรือประสบการณ์หรอกนะ"
21160-84 = "คะ?"
21160-85 = "ความดื้อดึงต่างหาก"
21160-86 = "เธอเองก็ดูใช้ได้เลยนะ"
21160-87 = "การมาหาฉันในสถานการณ์ที่น่าสงสัยแบบนี้ต้องใช้ความกล้ามากเลย"
21160-88 = "คะ... คะ?! ขะ... ขอบคุณค่ะ"
21160-89 = "ไว้เจอกันคราวหน้านะ"
21160-91 = "แหะๆ......"
21160-93 = "(ตุ้บ)"
21160-95 = "นะ... นึกว่าต้องตายซะแล้ว"
21160-96 = "ยูสึ~~~~"
21160-97 = "ยูสึจัง! สุดยอดเลย! รอดแล้วพวกเรา!"
21160-98 = "โชคดีที่ช่วยไว้ได้"
21160-99 = "แต่ว่า... สิ่งที่อาริสึจังถืออยู่ตอนนี้..."
21160-102 = "ค่ะ"
21160-103 = "นี่คืออาวุธใหม่ของพวกเราที่จะมาช่วยมนุษยชาติและโลกใบนี้"
21160-104 = "'กระจก' ยังไงล่ะคะ"
21160-105 = ".......!"
21160-106 = "เรื่องดีใจเอาไว้ทีหลัง! ตอนนี้รีบออกไปก่อนเถอะ! ถ้ารุ่นพี่เนรุกลับมาล่ะก็ มีหวังได้จบเห่ของจริงแน่!"
21160-107 = "ข้างหน้ามีหุ่นยนต์ต่อสู้อยู่เยอะเลย! ระวังให้ดีนะทุกคน!"
21160-108 = "ดะ... ได้เลย! ภารกิจนี้ยังไม่สำเร็จ!"
21160-109 = "เป้าหมายของเราไม่ใช่ 'กระจก' แต่เป็น G.Bible ต่างหาก! เราต้องไปที่ห้องชมรมเวอริทัส!"
21160-110 = "ได้เวลากลับแล้วค่ะ แล้วฉันจะคุ้มกันข้างหลังเอง คุณครู! ช่วยออกคำสั่งด้วยค่ะ!"
21160-113 = "[ns1] \"กลับห้องชมรมกัน!\"\n[ns2] \"ทุกคนเตรียมต่อสู้!\""
21160-116 = "ค่ะ!"
21160-117 = "ต้องกลับไปให้ได้!"
21160-118 = "อาริสึเริ่มการต่อสู้ค่ะ!"

[translation]
21160-1 = "第16話;あともう一歩！"
21160-2 = "ミレニアム生徒会・差押品保管所"
21160-5 = "はあ、はあ、逃げ切れた……！？"
21160-6 = "先生、ミドリ、アリス、大丈夫！？"
21160-7 = "HPは十分です。"
21160-8 = "私も先生も、大丈夫。"
21160-9 = "良かった……ところで、ここが差押品保管所？何かだいぶ滅茶苦茶だけど。"
21160-10 = "ガラスも割れてるし、棚も倒れてる……。"
21160-11 = "カリン先輩の跳弾かな……戦闘とか爆発の余波が、ここまで届いたのかも。"
21160-12 = "ユウカは、もうさっきの時点でアリスが「鏡」を持ってると思い込んでるだろうから……きっと、部室の方に逃げたって考えてるはず。まさか、私たちがここに来てるとは思わないだろうね。"
21160-13 = "とりあえず「鏡」さえ持ち出せれば、後はヴェリタスがどうにかしてくれるはず……！"
21160-15 = "あっ、見つけた、「鏡」！これさえあれば……！"
21160-16 = "よしっ！さあ、早く帰ろー……"
21160-17 = "……？"
21160-18 = "……静かに、ミュートでお願いします。"
21160-19 = "ん？"
21160-21 = "……誰かがこちらに向かってきています。足音から考えて、恐らく人数は一人。"
21160-22 = "うーん……このままここにいて、ユウカとかメイド部がまとめて戻ってきたら困るし、一人くらいならみんなで無理やり突破しちゃおっか。"
21160-23 = "……。"
21160-24 = "ちょ、ちょっと待って。"
21160-25 = "ハレ先輩から連絡が来てる。"
21160-27 = "「逃げて、いや隠れて！早く！何としてもそこ $！#^&！@#」"
21160-28 = "えぇ、いったいどういうこと……？"
21160-29 = "いつも冷静なハレ先輩が、どうしたんだろ。ネズミでも出たのかな。"
21160-30 = "接近対象を確認、ミレニアムの生徒名簿を検索……対象把握。"
21160-31 = "身長146cm、ダブルSMG、メイド服の上から龍柄のスカジャン……"
21160-32 = "え……？"
21160-33 = "ま……まさか……！？"
21160-35 = "隠れてっっ！！"
21160-38 = "先生、お尻が出ています！"
21160-39 = "は、早く！急いで！"
21160-43 = "……。"
21160-44 = "ふーん、もうめっちゃくちゃだな。"
21160-45 = "（ね、ね、ネル先輩だ！！）"
21160-46 = "（な、なんで！？どうしてあの人がここに！）"
21160-47 = "んん……？"
21160-48 = "何か、声が聞こえたような気が……。"
21160-49 = "（！？）"
21160-50 = "（ひいぃ……！）"
21160-51 = "（……）"
21160-52 = "（この人、何かが違います……）"
21160-53 = "（恐怖……初めての感情……）"
21160-54 = "（今この状況で、戦闘が発生した場合の成功確率……ほぼ0%……！）"
21160-56 = "ふーん……。"
21160-57 = "確かに気配が……机の下か？"
21160-59 = "（ザッ……）"
21160-61 = "（ザッ……）"
21160-62 = "（ど、どうしよう……！）"
21160-63 = "（今度こそ終わり……！？）"
21160-64 = "（せ、先生！どうしよう！？）"
21160-65 = "（すぐ目の前……もう、覗き込まれたら……！）"
21160-68 = "あ、あの！"
21160-69 = "あん？"
21160-71 = "ね、ネル先輩！大変です！"
21160-72 = "（！？）"
21160-73 = "（ゆ、ユズちゃん！？）"
21160-74 = "あんたは……？"
21160-75 = "せ、生徒会「セミナー」所属の、ユズキです。"
21160-76 = "戦闘ロボットが暴走したせいで今、あちこちがめちゃくちゃなんです！"
21160-77 = "アカネ先輩とカリン先輩が、制圧を試みていますが……。"
21160-78 = "なんだよ、暴走か？あれを差し押さえたのなんかずいぶん前だろうに、まだ整備が終わってねえのか。"
21160-79 = "じょ、状況的に、助けが必要かと思い……それで、ここにいらっしゃると聞いたので……。"
21160-80 = "はぁ、仕方ねぇな。"
21160-81 = "わ、わたしはここの整理をします。#nそ、その、戦闘は怖くて……経験も、あまり無いですし……。"
21160-82 = "んなこたどうでもいいけど、それよりあんた……。"
21160-83 = "覚えときな。戦闘で一番大事なのは、武器でも経験でもねぇ。"
21160-84 = "は、はい……？"
21160-85 = "度胸だ。"
21160-86 = "その点で、あんたに素質が無いとは思わねぇ。"
21160-87 = "自分がどう思われてるかくらい、あたしにも分かってる。それに、あんたが結構ビビりなこともまあ分かる。それなのに、初対面でこのあたしに声をかけるなんてのは、それなりに度胸がいることだろうからな。"
21160-88 = "は、は、はい！あ、ありがとうございます！？"
21160-89 = "じゃあな、またどっかで会おうぜ。"
21160-91 = "ふぇぇ……。"
21160-93 = "（べたっ）"
21160-95 = "し、死んじゃうかと思った……。"
21160-96 = "ユズうぅぅぅぅぅー！！"
21160-97 = "ユズちゃんすごい！おかげで命拾いしたよ！"
21160-98 = "ち、力になれて、良かった……。"
21160-99 = "そ、それより、今アリスちゃんが持ってるのが……"
21160-102 = "はいっ。"
21160-103 = "これが人類と世界を救う、私たちの新たな武器。"
21160-104 = "「鏡」です！"
21160-105 = "や、やっと……！"
21160-106 = "お祝いは後にして、急ごう！ネル先輩が戻ってきたら今度こそ一巻の終わり！"
21160-107 = "この先には戦闘型ロボットがたくさんいる……気を付けて！"
21160-108 = "そうだね、まだ任務は終わってない！"
21160-109 = "わたしたちの目的は「鏡」じゃなくて……「G.Bible」！早く、ヴェリタスの部室に行かなきゃ……！"
21160-110 = "後方は私が担当します。先生、指示を！"
21160-113 = "[ns1] \"みんなで無事に、部室まで戻ろう！\"\n[ns2] \"全員、戦闘準備！\""
21160-116 = "はい！"
21160-117 = "絶対……無事に帰ろう！"
21160-118 = "アリス、戦闘を始めます！"

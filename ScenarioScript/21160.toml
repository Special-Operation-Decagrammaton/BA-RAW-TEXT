[translation]
21160-1 = "第16話;還差一步！"
21160-2 = "千年學生會．扣押品保管所"
21160-5 = "哈啊，哈啊，逃掉了嗎……！？"
21160-6 = "老師，綠，愛麗絲，大家都還好嗎！？"
21160-7 = "HP十分充足。"
21160-8 = "我和老師也沒事。"
21160-9 = "太好了……話說回來，這裡就是扣押品保管所？怎麼亂七八糟的。"
21160-10 = "玻璃也破了，架子也倒了……"
21160-11 = "是不是因為花凜前輩的流彈啊……可能是戰鬥或是爆炸的衝擊傳到了這裡也說不定。"
21160-12 = "優香他剛才應該會覺得愛麗絲已經拿走了「鏡子」……#n肯定會覺得我們逃回社團活動室了才對。應該怎麼也想不到我們會往這裡走吧。"
21160-13 = "總之只要把「鏡子」拿到手的話，之後貝里塔斯他們總有辦法解決的……！"
21160-15 = "啊，找到了，是「鏡子」！只要有了這個的話……！"
21160-16 = "很好！我們趕快走吧……"
21160-17 = "……？"
21160-18 = "……請安靜，轉為靜音模式。"
21160-19 = "嗯？"
21160-21 = "……有人正朝著這裡走過來。從腳步聲聽起來，應該只有一個人。"
21160-22 = "唔嗯……就這樣待在這裡的話，如果優香或是女僕部的人一起回來就麻煩了，#n對方只有一個人的話就強行突破吧。"
21160-23 = "……"
21160-24 = "等，等一下。"
21160-25 = "晴前輩傳了訊息過來。"
21160-27 = "「快逃，不對快躲起來！快！無論如何快從那裡 $！#^&！@#」"
21160-28 = "咦咦，這是什麼意思……？"
21160-29 = "一直以來這麼冷靜的晴前輩，這是怎麼了？難道是出現老鼠了嗎。"
21160-30 = "確認對象接近，搜尋千年學生名單……已掌握對象身分。"
21160-31 = "身高146公分，雙持衝鋒槍，女僕裝外穿著龍紋的絲卡將……"
21160-32 = "咦……？"
21160-33 = "難……難道是……！？"
21160-35 = "快躲起來！！"
21160-38 = "老師，你的屁股露出來了！"
21160-39 = "快，快點藏起來！"
21160-43 = "……"
21160-44 = "哼，真是一團亂啊。"
21160-45 = "（寧，寧，寧瑠前輩！！）"
21160-46 = "（為，為什麼！？為什麼那個人會在這裡！）"
21160-47 = "嗯嗯……？"
21160-48 = "怎麼好像聽到什麼聲音……"
21160-49 = "（！？）"
21160-50 = "（咦……！）"
21160-51 = "（……）"
21160-52 = "（那個人，感覺不太對勁……）"
21160-53 = "（恐怖……這是我第一次產生這種感情……）"
21160-54 = "（現在這個狀況下，如果發生戰鬥的話成功的機率是……接近0%……！）"
21160-56 = "哼──……"
21160-57 = "確實感覺到了一點氣息……在桌子底下嗎？"
21160-59 = "（噠……）"
21160-61 = "（噠……）"
21160-62 = "（怎，怎麼辦……！）"
21160-63 = "（這下真的完了……！？）"
21160-64 = "（老，老師！怎麼辦才好！？）"
21160-65 = "（已，已經到我們眼前了……要是他往裡面看的話……！）"
21160-68 = "那，那個！"
21160-69 = "嗯？"
21160-71 = "寧，寧瑠前輩！大事不好了！"
21160-72 = "（！？）"
21160-73 = "（柚，柚子醬！？）"
21160-74 = "你是……？"
21160-75 = "我，我是學生會「研討會」的柚木。"
21160-76 = "因為戰鬥機器人失控的原因，到處都變得一團亂了！"
21160-77 = "朱音前輩和花凜前輩雖然正在試圖壓制……"
21160-78 = "什麼啊，暴走嗎？那些東西不是沒收了好一陣子了嗎，還沒有整備完成啊。"
21160-79 = "根，根據情況，可能需要協助……於是，聽說你在這裡所以就……"
21160-80 = "唉，真沒辦法。"
21160-81 = "我，我會把這裡整理好的。#n那，那個，戰鬥很可怕……我，我又沒什麼經驗……"
21160-82 = "那倒是無所謂，話說你啊……"
21160-83 = "記好了，戰鬥中最重要的，不是武器也不是經驗。"
21160-84 = "嗯……？"
21160-85 = "而是膽量。"
21160-86 = "關於這點，我不認為你沒有資質。"
21160-87 = "我很清楚自己被其他人用什麼眼光看待。你是個相當膽小的人我也大概看的出來。#n但是，面對初次見面的我，你還是鼓起勇氣向我搭話了，#n這也就代表著你也是有著一定的勇氣的吧。"
21160-88 = "是，是，是的！非，非常感謝！？"
21160-89 = "那就先這樣，有緣再見吧。"
21160-91 = "呼……"
21160-93 = "（啪噠）"
21160-95 = "還，還以為死定了……"
21160-96 = "柚子──！！"
21160-97 = "柚子醬好厲害！託你的福撿回一命了！"
21160-98 = "能，能幫上忙，真是太好了……"
21160-99 = "比，比起這個，剛才愛麗絲醬拿著的是……"
21160-102 = "沒錯。"
21160-103 = "這就是能夠拯救人類和世界的，我們的新武器。"
21160-104 = "「鏡子」喔！"
21160-105 = "終，終於……！"
21160-106 = "慶祝的話之後再說，快走吧！要是寧瑠前輩回來的話這次就真的完蛋了！"
21160-107 = "這前面有很多戰鬥型機器人……小心點！"
21160-108 = "也對，任務還沒結束！"
21160-109 = "我們的目標不是「鏡子」……而是「G.Bible」！#n得，得趕快到貝里塔斯的活動室去……！"
21160-110 = "後援就交給我。老師，請下指令吧！"
21160-113 = "[ns1] 「大家一起平安地，回到活動室吧！」\n[ns2] 「所有人，準備戰鬥！」"
21160-116 = "是！"
21160-117 = "絕對……要平安地回去！"
21160-118 = "愛麗絲，開始戰鬥！"

[translation]
51210-1 = "第21話;即便如此也想對你訴說"
51210-3 = "哈啊！"
51210-15 = "雖然設法消滅雜兵了，但果然……"
51210-23 = "[ns]「看來任何攻擊都對黑影不管用。」"
51210-24 = "他們可能是為了重整旗鼓而暫時放緩攻勢……"
51210-25 = "不知道什麼時候又會再發動攻擊。"
51210-26 = "哇啊啊啊。#n如果不能通過那裡……根本沒辦法追上剛才那個傢伙打倒他嘛！"
51210-27 = "怎，怎麼辦！？"
51210-29 = "這樣下去，紫會有危險……"
51210-30 = "……這可不行！"
51210-31 = "得想想辦法，對吧桔梗！？"
51210-32 = "…………"
51210-38 = "[ns]「名草。」"
51210-42 = "[ns1]「我知道棕櫚盯上了紫。」\n[ns2]「也知道他為此一手策劃了所有陰謀。」"
51210-45 = "[ns]「但是名草，棕櫚說的創造『百物語』是什麼意思？」"
51210-47 = "[ns]「棕櫚……想利用紫做什麼事嗎？」"
51210-48 = "那是……"
51210-49 = "老師！現在那種事重要嗎！？"
51210-50 = "紫他……！"
51210-52 = "名草前輩剛才說過「跟菖蒲那時一樣」對吧？"
51210-56 = "桔梗……？"
51210-61 = "蓮華，情報是很重要的。#n就像那個可惡的花鳥風月部的傢伙說的一樣，現在我們根本一無所知。"
51210-62 = "分不清是非對錯，也不清楚該如何抓到「蛛絲馬跡」。"
51210-63 = "而這都必須要有情報才能判斷。"
51210-64 = "老師想問的是這個吧？#n現在擁有情報的人──名草前輩，就只有你了。"
51210-66 = "只有我…………"
51210-67 = "所以請你告訴我們吧。#n那傢伙的目的是什麼？他在打什麼算盤？我們該如何行動？"
51210-68 = "能回答這些問題的──名草前輩，只有你一個人了。"
51210-72 = "……………………"
51210-73 = "……是嗎。"
51210-74 = "就連面對這種情況的時候，你依然不對我們抱有[ruby=  ・     ・     ・     ・  ]任何期待[/ruby]──"
51210-75 = "花鳥風月部……"
51210-80 = "名草前輩……？"
51210-86 = "據說他們是在百鬼夜行尚未成為聯合學園的時期出現……到處肆虐的魑魅魍魎集團。"
51210-87 = "大家稱他們為──"
51210-88 = "[ns3]「『不承認百鬼夜行聯合學園的刁蠻社團』、」\n[ns4]「『利用怪書迷惑世人的魑魅魍魎』……對吧？」"
51210-91 = "……沒錯。"
51210-92 = "原因與意圖都不清楚……但是手段確實是存在的。"
51210-93 = "他們想利用「怪書」製造風情……創造名為「百物語」的怪談。"
51210-94 = "實際上，花鳥風月部的部長雛罌粟……在我之前去的大雪原……把菖蒲……"
51210-95 = "……化為「百物語」，帶到了黃昏的彼端。"
51210-101 = "我只能眼睜睜看著那一切發生。#n只能無力地……看著……"
51210-103 = "菖蒲委員長被那個……"
51210-104 = "……"
51210-106 = "如果棕櫚說的是真的，那麼這次他的目標就是紫。"
51210-107 = "這樣下去紫也會像菖蒲一樣……"
51210-108 = "名草前輩……那種事為什麼不告訴我們呢……"
51210-109 = "因為我……害怕說出真相。"
51210-116 = "…………名草前輩。"
51210-124 = "是，是誰！？"
51210-126 = "啊啊～看得清楚嗎各位？"
51210-130 = "啊，老師！那個……！"
51210-138 = "啊哈哈。慶典玩得還開心嗎？"
51210-139 = "嗯，想必很開心吧。"
51210-140 = "畢竟這可是我精心準備的舞台，一切都是為了讓各位能樂在其中。"
51210-144 = "那是陰陽部的轉播用飛行船…… "
51210-145 = "而且現在還透過網路進行轉播……！"
51210-146 = "什麼，怎麼會？為什麼能做到那種事！？"
51210-147 = "[s]「這麼說來……靜子確實為了轉播慶典做了準備……」"
51210-148 = "但是為什麼轉播會被……？"
51210-150 = "啊哈哈。我準備的可不只這些。"
51210-151 = "現在正好有位嘉賓想介紹給各位呢～"
51210-155 = "雖然你們已經認識他就是了。#n在這時隔20年重現的慶典中，集萬眾期待於一身的那位嘉賓就是～！"
51210-164 = "[ns]「紫……！」"
51210-165 = "啊哈哈。有看清楚嗎～？"
51210-166 = "應該看得很清楚吧。#n因為這個舞台一開始就是為了這個而準備的。"
51210-167 = "那麼我就來介紹一下故事的主角吧。"
51210-169 = "…………"
51210-171 = "雖然他現在就像沉睡的公主一般不發一語……不過我很清楚，也非常深切地理解。"
51210-172 = "這位巫女心中懷抱著巨大的痛苦。"
51210-175 = "自己所尊敬、憧憬的人對自己不屑一顧。"
51210-178 = "懇切地說想恢復原樣，卻被斥責那毫無意義。"
51210-180 = "向所有人呼喊想回到過去，卻被挖苦有其他可以回去的地方……"
51210-182 = "於是巫女只好回到家裡，回到這個地方。"
51210-184 = "遺憾的是，在這被視為唯一歸宿的地方，所有人對巫女的期望卻只有一個……"
51210-185 = "那就是洗刷20年前慶典中的恥辱──僅此而已。"
51210-186 = "…………"
51210-187 = "沒錯，沒有任何人在意巫女的心情。"
51210-188 = "唉，真是太可憐了。#n居然得在本該感到開心的慶典獨自承受痛苦。"
51210-189 = "你們不覺得……這樣很委屈嗎？"
51210-190 = "與其獨自承擔……讓大家一起承受痛苦不是更好嗎？"
51210-194 = "就由我來替你說出心聲吧。#n將那份「感情」奉還給所有人！"
51210-195 = "現在即將開始的，是我們花鳥風月部召喚的風情。"
51210-196 = "我會轟轟烈烈地將百鬼夜行燃燒殆盡！"
51210-197 = "敬請期待！啊哈哈！"
51210-204 = "[ns]「紫……！」"
51210-206 = "他說要燒了百鬼夜行。"
51210-207 = "不阻止他的話……事情會變得更加嚴重。"
51210-208 = "得，得趕快阻止他才行……！"
51210-213 = "[ns]「黑影又開始行動了。偏偏在這種時候……！」"
51210-214 = "可惡……！"
51210-215 = "該怎麼辦才好！#n我們的攻擊完全沒用的話，該怎麼把怪物……"
51210-216 = "不，就算能突破怪物到達舞台……#n又該怎麼打倒子彈無法生效的那傢伙啊！？"
51210-217 = "……我有辦法。"
51210-221 = "桔梗！？真的嗎！？"
51210-225 = "[ns]「桔梗，這是……授與百花繚亂委員長的……？」"
51210-230 = "沒錯，名草前輩。#n這是你之前交給我的「百蓮」。"
51210-231 = "如果花鳥風月部──棕櫚說的話是真的……"
51210-232 = "那麼就只有一個人能制止並且打倒棕櫚。#n換句話說──"
51210-238 = "有辦法拯救紫的人──名草前輩，除了你沒有別人了。"
51210-239 = "所以拜託你了，前輩。#n請把紫救出來吧。"
51210-240 = "說，說的也是……擁有委員長資格的名草前輩的確有可能……"
51210-244 = "我…… "
51210-249 = "我做不到。"
51210-251 = "啊！？為，為什麼啊名草前輩！"
51210-253 = "棕櫚口中「具備百花繚亂委員長資格的人」……指的是菖蒲，而不是我。"
51210-254 = "我……做不到。"
51210-255 = "棕櫚說的對。#n從一開始……一切……都只是藉口。"
51210-256 = "我只是想逃避罷了。#n因為害怕自己的真面目被發現。"
51210-257 = "不敢說出真心話……只是全力站在菖蒲身邊……#n扮演著有資格在他身旁的，一位名叫「名草」的少女。"
51210-258 = "我一直欺騙著大家。"
51210-259 = "我的一切全都是……「[ruby=・  ・  ・  ・ ・ ・  ・]Cosplay[/ruby]」。"
51210-260 = "[s]「名草……」"
51210-263 = "我只是想站在菖蒲身邊……成為配得上菖蒲的存在。"
51210-264 = "所以才帶上虛假的面具扮演優等生。"
51210-265 = "我實在說不出口……#n看著菖蒲消失在眼前的我……如果告訴大家……自己失去了菖蒲卻獨自回來……"
51210-270 = "「[ruby= ・     ・     ・     ・     ・     ・     ・     ・ ]一定會被大家指責[/ruby]」"
51210-272 = "這樣的我怎麼可能會有資格。"
51210-273 = "這樣的我……怎麼可能救得了紫……！"
51210-279 = "御稜……名草……！"
51210-284 = "啊……"
51210-289 = "[ns]「桔梗，等等……你冷靜一點……！」"
51210-304 = "……桔梗？"
51210-305 = "我對紫說了很過分的話。"
51210-306 = "說他有可以回去的地方，何必來玩百花繚亂遊戲。"
51210-307 = "明明從來沒有這樣想過……卻欺騙自己這是為紫好，單方面地說個不停。"
51210-309 = "就是我害他變成那樣的。"
51210-310 = "桔梗……"
51210-315 = "……"
51210-316 = "我依然……恨著拋下我們一走了之的你。"
51210-317 = "依然無法……原諒我苦苦等待卻始終盼不回來的你。"
51210-322 = "但是……"
51210-323 = "即便如此……"
51210-325 = "因為我……因為我所犯下的錯……"
51210-326 = "被我自私的發言傷害的那孩子……"
51210-327 = "有能力拯救紫的人，就只有你了。"
51210-328 = "不是我和蓮華……也不是菖蒲委員長……而是你。"
51210-330 = "所以……拜託了。"
51210-331 = "我知道說這種話很無恥。#n只會裝模作樣的我，也許一開始就沒資格說這種話。"
51210-332 = "但我還是想拜託你！"
51210-333 = "我希望能向那孩子道歉。"
51210-334 = "所以求求你，名草前輩……"
51210-336 = "拜託了。"
51210-339 = "名草前輩！"
51210-343 = "啊……"
51210-344 = "我……我也拜託你了！"
51210-345 = "我也知道……離開百花繚亂的我沒資格說這種話！"
51210-346 = "但我的心情也和桔梗一樣！"
51210-347 = "如果紫因為我說的話而受傷……我也想跟他道歉。"
51210-348 = "想再見他一面，好好跟他談談。"
51210-349 = "我知道這很強人所難，也明白想收回做過的事很厚臉皮。"
51210-350 = "但是……"
51210-355 = "就像紫說的一樣，我也希望……能回到那個時候……"
51210-356 = "所以拜託你了，名草前輩。"
51210-362 = "…………我，欺騙了大家……"
51210-363 = "對你們說了謊……"
51210-369 = "[ns]「名草，我也拜託你了。」"
51210-382 = "……我知道了。"
51210-392 = "我會試試看。"
51210-404 = "[ns]「看來果然不會輕易放我們過去。」"
51210-405 = "前方的路……就由我們來開！"
51210-406 = "嗯，既然已經確定目標就可以行動了。#n要盡可能拖住他們，對吧？"
51210-407 = "就算沒辦法打倒，我也會盡全力纏住他們。"
51210-408 = "儘管相信我們吧！老師！"
51210-410 = "……紫就拜託你們了，老師、名草前輩。"
51210-412 = "[ns]「嗯，我們走吧，名草！」"
51210-419 = "…………！"
51210-421 = "下一話;被烈火包圍的街道"

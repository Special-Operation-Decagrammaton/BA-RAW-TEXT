[translation]
51210-1 = "Episode 21;Yours, Nevertheless"
51210-3 = "HYAH!"
51210-15 = "We're fighting back the smaller Artifact Spirits, but..."
51210-23 = "[ns] \"We can't land a bullet on Kurokage.\""
51210-24 = "They've retreated for now, but they're only regrouping."
51210-25 = "They could return at any time."
51210-26 = "The bad person is getting away! We need to get past these thingies!"
51210-27 = "What do I do?! Mimori? Tsubaki?"
51210-29 = "Yukari is in danger."
51210-30 = "I won't let anything happen to her!"
51210-31 = "We need to blast through their ranks! What's the plan, Kikyou?!"
51210-32 = "..."
51210-38 = "[ns] \"Nagusa.\""
51210-42 = "[ns1] \"I understand that Shuro needs Yukari.\"\n[ns2] \"Shuro manipulated and planned every moment of tonight.\""
51210-45 = "[ns] \"But what does Shuro mean about writing her own ghost story?\""
51210-47 = "[ns] \"What is Shuro trying to achieve with Yukari?\""
51210-48 = "That's..."
51210-49 = "We don't have time to dilly-dally, Sensei!"
51210-50 = "The longer we wait here, the greater the danger to Yukari!"
51210-52 = "Just like Ayame? Nagusa?"
51210-56 = "Hello? Kikyou?"
51210-61 = "Must I repeat myself to you for the rest of our lives? Battles are won with information, and we currently have none."
51210-62 = "There is no such thing as a strategy without it."
51210-63 = "I need more intel if you want me to create a plan."
51210-64 = "Sensei understands this. So inform me, Nagusa. Only you seem to have a grasp of the situation."
51210-66 = "Only I..."
51210-67 = "I'm looking to you. What are her intentions? Her motivation? The next course of action?"
51210-68 = "Allow me to emphasize again. Only you can do this."
51210-72 = "..."
51210-73 = "...I see."
51210-74 = "You will cling to your foolishness until your last dying breath."
51210-75 = "Nature's Beauty..."
51210-80 = "Nagusa...?"
51210-86 = "Nature's Beauty is a group of monsters that once ran wild in these lands, before the Hyakkiyako alliance was formed."
51210-87 = "They're known for many things."
51210-88 = "[ns3] \"As the wicked club against Hyakkiyako's alliance...\"\n[ns4] \"Bewitching monsters that carry strange, powerful tomes.\""
51210-91 = "...As Sensei said."
51210-92 = "We know nothing of their intentions. Do monsters even have reasons? But we do know how they operate."
51210-93 = "They use their tomes and spread rumors through the human world. When the rumors gain enough power, they become corporeal."
51210-94 = "That's how...That's how Ayame disappeared. We encountered the Nature's Beauty's president, Kokuriko, in the snow fields."
51210-95 = "She used her tome to turn her into a Phantom Fable, and snatched her away to the spirit realm."
51210-101 = "And I...I did nothing. I watched in abject horror, but did nothing."
51210-103 = "That's how Ayame..."
51210-104 = "..."
51210-106 = "I expect Shuro intends to do the same thing to Yukari."
51210-107 = "I don't know what to do. It'll be like losing Ayame all over again."
51210-108 = "This is the secret you were keeping? You could've told us the truth."
51210-109 = "...I was afraid. Terrified and ashamed."
51210-116 = "...Nagusa."
51210-124 = "Wh-What is that?!"
51210-126 = "Am I going crazy or is everyone else seeing this?"
51210-130 = "Look, Sensei! Over there!"
51210-138 = "Ahaha! Hello, everyone! Are you having fun tonight?"
51210-139 = "I'm sure you all are!"
51210-140 = "I hope you appreciate all of the effort I've put into this Lantern Festival!"
51210-144 = "That's the Yin-Yang Club's live stream blimp... "
51210-145 = "She's broadcasting all over Kivotos!"
51210-146 = "All of Kivotos?! How?"
51210-147 = "[s] \"Shizuko had everything set up to live stream the ritual...\""
51210-148 = "The how isn't important. Why?"
51210-150 = "There's lots more exciting events coming tonight!"
51210-151 = "Let me introduce a very special guest first."
51210-155 = "As you well know, this is the first time the Lantern Festival is being held in twenty years. And this little lady right here is the main attraction!"
51210-164 = "[ns] \"She has Yukari!\""
51210-165 = "Ahaha! Can you see her?"
51210-166 = "Of course you can, after all, this whole stage was made just for her!"
51210-167 = "Before we get things going, let me tell you a little bit more about our main character."
51210-169 = "..."
51210-171 = "Now then, she's taking a little nap, and a well deserved one."
51210-172 = "After all, our pitiable miko has been through so much. Abandoned. Betrayed. Judged."
51210-175 = "She's clinging to the skirts of her beloved role model, only to be left behind in her shadow."
51210-178 = "She tried to tell someone her dream of going back to the good old days, and what did she get in return? Derision and ridicule."
51210-180 = "When she did return to what she thought was her home, she was summarily kicked out. Told to go back to where she belongs."
51210-182 = "And so, she dutifully returned to the Kadenokouji family."
51210-184 = "She thought she would be happy! But she discovered a horrible secret when she returned to this supposed \"home.\""
51210-185 = "Kadenokouji Yukari was nothing but a tool to them. They wanted her to dance and dance and dance, so they could cleanse their house of the disgrace from twenty years ago."
51210-186 = "..."
51210-187 = "That's right. No matter where she went, this miko couldn't find a single soul to empathize with her pain."
51210-188 = "While everyone basked in the revelry of the festival, she was left alone to suffer in unimaginable ways."
51210-189 = "Isn't that...unfair?"
51210-190 = "Why should everyone be happy at her expense? Everyone should suffer just as she did."
51210-194 = "So in her stead, I'll be returning all of the hurt and pain you caused her."
51210-195 = "Welcome to Nature's Beauty's elegance. "
51210-196 = "The sight of Hyakkiyako burning in flames will be the greatest show you've ever witnessed!"
51210-197 = "Please prepare yourself for this story! "
51210-204 = "[ns] \"Yukari...!\""
51210-206 = "She threatened to burn down all of Hyakkiyako."
51210-207 = "Things are only going to get worse from here on out."
51210-208 = "We gotta do something! I don't know what, but something!"
51210-213 = "[ns] \"The timing... Kurokage's on the move!\""
51210-214 = "Damn it all!"
51210-215 = "This is hopeless! How are we supposed to beat a monster we can't even touch?"
51210-216 = "Let's say in some impossible world we do slip past it, the kid is invulnerable to our attacks too."
51210-217 = "...There is a way."
51210-221 = "Wh-What? How?!"
51210-225 = "[ns] \"Kikyou, this is the Hundred Lotus?\""
51210-230 = "Yes, the Hundred Lotus. Nagusa's last gift to me."
51210-231 = "If we can believe Shuro's words..."
51210-232 = "She told us exactly how to defeat her."
51210-238 = "It's you, Nagusa. You're the only one who can save Yukari."
51210-239 = "So do it. Please."
51210-240 = "She's right. We have the Hundred Lotus, but Nagusa is the only one who can wield it."
51210-244 = "I... "
51210-249 = "I can't."
51210-251 = "Huh?! Wh-Why?! Nagusa!"
51210-253 = "Ayame is the only one qualified to be the Hyakkaryouran president."
51210-254 = "It was never me."
51210-255 = "Despite everything, Shuro was right about one thing. I was lying. I lied to all of you."
51210-256 = "I was afraid you would see me for who I truly was, I ran."
51210-257 = "What would you all say when you found out \"Nagusa\" was just an act? Just a girl desperate to stay by her best friend's side?"
51210-258 = "So I lied. I ran, and I lied."
51210-259 = "I suppose I was simply cosplaying from the beginning."
51210-260 = "[s] \"Nagusa...\""
51210-263 = "I've been an imposter all along. I only wanted to be good enough to stand by Ayame's side."
51210-264 = "I faked it all. The image of the strong, intelligent student you admired was all a mirage."
51210-265 = "Then I lost Ayame, and I couldn't do anything to help her. How could I tell the truth to you all?"
51210-270 = "I was afraid of being blamed. I didn't want to be found out for the fraud I am."
51210-272 = "A coward like me will never be qualified."
51210-273 = "A coward like me...isn't good enough to save Yukari!"
51210-279 = "Goryou Nagusa!"
51210-284 = "Ah..."
51210-289 = "[ns] \"Kikyou, let's take a deep breath.\""
51210-304 = "...Kikyou?"
51210-305 = "I hurt Yukari."
51210-306 = "I told her playtime was over, that it was time to return home."
51210-307 = "I convinced myself to utter lies for the sake of protecting Yukari."
51210-309 = "Our \"protection\" put her in the position she is in now."
51210-310 = "...Kikyou."
51210-315 = "..."
51210-316 = "A part of me despises you still. Your abandonment isn't so easily forgotten."
51210-317 = "Because I waited. I remained behind and waited and waited. And you did not return."
51210-322 = "Regardless..."
51210-323 = "Despite that..."
51210-325 = "My mistakes are my own. I understand that."
51210-326 = "I hurt her, badly, and I wish to correct it."
51210-327 = "But it's beyond me. Nagusa, only you can save Yukari now."
51210-328 = "Not me nor Renge...nor even Ayame. You."
51210-330 = "I beg of you. "
51210-331 = "My arrogance has always been my greatest flaw. I have no right to hold my head high after today."
51210-332 = "But here I am, pleading."
51210-333 = "Please. Tell Yukari all will be well. Help me apologize to her."
51210-334 = "Save her, Nagusa."
51210-336 = "Please."
51210-339 = "Nagusa!"
51210-343 = "Ah."
51210-344 = "I...I feel the same way!"
51210-345 = "Not that I can talk either. After all, I ran away from the Hyakkaryouran after you left."
51210-346 = "But I still agree with her!"
51210-347 = "I hurt someone we really care about, and I need to look her in the eye and apologize."
51210-348 = "I just need to talk to her one more time."
51210-349 = "We're asking a lot of you, I know. We shouldn't be asking you to fix our mistakes."
51210-350 = "But..."
51210-355 = "Like Yukari said... I want to go back too..."
51210-356 = "So please, Nagusa."
51210-362 = "But I'm a fraud..."
51210-363 = "I lied to all of you."
51210-369 = "[ns] \"I'm begging you too, Nagusa.\""
51210-382 = "...Okay. "
51210-392 = "I promise nothing, but I can try."
51210-404 = "[ns] \"This is going to be an uphill climb.\""
51210-405 = "Who cares?! We'll blast open a path!"
51210-406 = "Yes. From what I understand, you need time, right?"
51210-407 = "We can't defeat all of them, but we can buy you as much time as we can!"
51210-408 = "We've got this, Sensei!"
51210-410 = "...Go save Yukari, Sensei. Nagusa. "
51210-412 = "[ns] \"We'll bring her back safe and sound. Let's go, Nagusa!\""
51210-419 = "Yes!"
51210-421 = "Next Episode;Street in Flames "

[translation]
51210-1 = "ตอนที่ 21;ถึงกระนั้นก็ตาม"
51210-3 = "ย้าก!"
51210-15 = "ถ้าเป็นปีศาจตัวเล็กๆ เราก็จัดการได้อยู่หรอก แต่ว่า..."
51210-23 = "[ns] \"แต่กับคุโระคาเงะ ไม่ว่าการโจมตีอะไรก็ไม่เป็นผลเลย\""
51210-24 = "ตอนนี้ทางนั้นก็นิ่งไปสักพักแล้ว ไม่รู้ว่าเพราะจะเตรียมท่าทีอะไรหรือเปล่านะคะ..."
51210-25 = "อาจจะบุกกันเข้ามาอีกก็ได้"
51210-26 = "แงงงง ถ้าเราผ่านทางนั้นไปไม่ได้... เราก็ไล่และโค่นคนร้ายไม่ได้น่ะสิ!"
51210-27 = "ทะ... ทำยังไงดี?!"
51210-29 = "ขืนเป็นแบบนี้ ยูคาริจะตกอยู่ในอันตราย..."
51210-30 = "...จะให้เป็นแบบนั้นไม่ได้!"
51210-31 = "ไม่ว่ายังไงก็ต้องหาวิธีให้ได้ ใช่มั้ย? คิเคียว?!"
51210-32 = "......"
51210-38 = "[ns] \"นางุสะ\""
51210-42 = "[ns1] \"ครูพอจะรู้แล้วว่าชูโระกำลังเพ่งเล็งยูคาริอยู่\"\n[ns2] \"ครูรู้ตัวคนที่วางแผนร้ายเพื่อให้เกิดสถานการณ์ในตอนนี้แล้ว\""
51210-45 = "[ns] \"ที่ชูโระบอกว่าจะสร้าง <ตำนานร้อยเรื่องราว> มันหมายความว่ายังไงเหรอ?\""
51210-47 = "[ns] \"ชูโระ... ตั้งใจจะให้ยูคาริทำอะไรกันแน่?\""
51210-48 = "เรื่องนั้น..."
51210-49 = "คุณครู!? ตอนนี้เรื่องนั้นมันสำคัญเหรอ?!"
51210-50 = "ยูคาริน่ะ...!"
51210-52 = "รุ่นพี่นางุสะบอกว่าจะเป็นเหมือนที่ทำกับหัวหน้าอายาเมะใช่มั้ย?"
51210-56 = "อ๊ะ คิเคียว...?"
51210-61 = "เรนเกะ ข้อมูลเป็นสิ่งสำคัญนะ ตอนนี้เราไม่รู้อะไรเลย เหมือนที่สมาชิกชมรมความงามของธรรมชาติที่#nน่ารังเกียจคนนั้นพูดไว้ไง"
51210-62 = "เราต้องรู้ว่าอะไรถูกอะไรผิด และต้องเคลื่อนไหวอย่างไร ถึงจะหา <เงื่อนงำ> ได้ แม้จะเป็นเรื่องเล็กๆ น้อยๆ ก็เถอะ"
51210-63 = "เราต้องมีข้อมูล ถึงจะตัดสินได้"
51210-64 = "ที่คุณครูถามก็เพื่อรวบรวมข้อมูล และคนเดียวตรงนี้ที่มีข้อมูลอยู่... ก็คือรุ่นพี่นางุสะ"
51210-66 = "มีแค่ฉันเหรอ..."
51210-67 = "งั้นก็ตอบมาเถอะว่ายัยนั่นมุ่งเป้าไปที่อะไรและมีเจตนาอะไรกันแน่ แล้วพวกเราต้องทำยังไงถึงจะหยุดยั้งได้"
51210-68 = "ณ ตรงนี้ มีแค่รุ่นพี่เท่านั้นนะที่รู้"
51210-72 = "......"
51210-73 = "...จริงด้วยสินะ"
51210-74 = "แม้แต่ในสถานการณ์เช่นนี้ คุณก็ยังทำให้พวกเราคาดหวังอะไรไม่ได้..."
51210-75 = "ชมรมความงามของธรรมชาติ..."
51210-80 = "รุ่นพี่นางุสะ...?"
51210-86 = "อดีตของพวกนั้นก็คือ กลุ่มของสารพัดผีปีศาจที่กางปีกปรากฏตัวมาตั้งแต่... ก่อนที่เฮียกคิยาโคจะเป็น#nสหพันธ์"
51210-87 = "ถ้าจะสื่อถึงพวกนั้น..."
51210-88 = "[ns3] \"<ชมรมคนพาลที่ไม่ยอมรับความเป็นสหพันธ์ของเฮียกคิยาโค>\"\n[ns4] \"<สารพัดผีที่หลอกผู้คนด้วยเรื่องลึกลับ>... ใช่มั้ย?\""
51210-91 = ".....ใช่"
51210-92 = "ฉันไม่รู้เหตุผลของพวกนั้นหรอก ไม่รู้เจตนาด้วย แต่วิธีการน่ะเป็นที่ประจักษ์ชัดเจน"
51210-93 = "พวกนั้นจะใช้ <หนังสือลึกลับ> เพราะต้องการสร้างข่าวลือ... หรือก็คือเรื่องน่ากลัวภายใต้ชื่อ <ตำนานร้อยเรื่องราว>"
51210-94 = "โคคุริโกะ หัวหน้าชมรมความงามของธรรมชาติที่ฉันไปตามหาในทุ่งหิมะใหญ่..."
51210-95 = "ใช้ <ตำนานร้อยเรื่องราว> พาตัวอายาเมะข้ามห้วงเวลาอัสดงไป"
51210-101 = "ฉันทำได้แค่เฝ้าดู เฝ้าดูอย่างคนไร้ซึ่งกำลัง..."
51210-103 = "หัวหน้าอายาเมะต้องเจออะไรแบบนั้นเหรอ..."
51210-104 = "......"
51210-106 = "ถ้าที่ชูโระพูดคือเรื่องจริงละก็ เป้าหมายในครั้งนี้ก็คือยูคาริ"
51210-107 = "ถ้าปล่อยให้เป็นแบบนี้ ยูคาริจะต้องเป็นเหมือนอายาเมะ..."
51210-108 = "รุ่นพี่นางุสะ... ทำไมไม่บอกเรื่องนี้กับพวกเราเลยล่ะ..."
51210-109 = "...ฉันกลัวน่ะ กลัวที่จะพูดความจริง"
51210-116 = "...รุ่นพี่นางุสะ"
51210-124 = "อะ... อะไรกัน?!"
51210-126 = "อ่า เห็นกันชัดไหมคะทุกคน?"
51210-130 = "อ๊ะ คุณครู! นั่น...!"
51210-138 = "อะฮ่าฮ่า สนุกกับเทศกาลไหมคะ?"
51210-139 = "คงจะสนุกกันสินะคะ"
51210-140 = "ก็มันเป็นการแสดงที่ฉันเตรียมมาเพื่อทำให้ทุกคนเพลิดเพลินกันอีกขั้นเลยนี่นา"
51210-144 = "นั่นมันเครื่องบินออกอากาศของชมรมหยินหยาง..."
51210-145 = "ไม่ใช่แค่นี้นะคะ ตอนนี้มีไลฟ์ในอินเทอร์เน็ตด้วยค่ะ...!"
51210-146 = "ว่าไงนะ... ทะ... ทำได้ยังไง?! ทำได้ถึงขนาดนั้นเลยเหรอ?!"
51210-147 = "[s] \"จะว่าไป... ที่ชิซุโกะเตรียมการถ่ายทอดเทศกาล...\""
51210-148 = "แต่ทำไมคนที่ออกอากาศอยู่ถึงเป็นยัยเด็กนั่นล่ะ...?"
51210-150 = "อ่ะฮ่าฮ่า ก็สิ่งที่ฉันเตรียมมามันไม่ได้หมดแค่นี้ยังไงล่ะคะ"
51210-151 = "ฉันมีแขกรับเชิญที่อยากแนะนำให้ทุกคนรู้จักอยู่พอดีเลยน่ะสิคะ~"
51210-155 = "คนที่รู้อยู่แล้วก็อาจจะเดาได้นะคะ แขกรับเชิญท่านนี้ได้รับความคาดหวังจากทุกคนในเทศกาลอนุสรณ์#nที่ได้ถูกนำกลับมาอีกครั้งในรอบ 20 ปีค่ะ~"
51210-164 = "[ns] \"ยูคาริ...!\""
51210-165 = "อ่ะฮ่าฮ่า เห็นกันชัดดีเลยใช่ไหมล่ะคะ~?"
51210-166 = "ใช่ค่ะ คงจะเห็นกันเต็มสองตาแหละเนอะ ก็ฉันตั้งใจเตรียมสิ่งนี้มาเพื่อการนั้นตั้งแต่แรก"
51210-167 = "ถ้างั้นฉันขอแนะนำตัวเอกของเรื่องนี้ให้รู้จักนะคะ"
51210-169 = "......"
51210-171 = "แม้ว่าตอนนี้เธอจะไม่พูดอะไรราวกับเป็นเจ้าหญิงนิทรา แต่ฉันรู้และเข้าใจอย่างลึกซึ้งเลยละค่ะ"
51210-172 = "ว่าคุณมิโกะที่อยู่ตรงนี้... โอบกอดความเจ็บปวดมากมายเอาไว้ในใจ"
51210-175 = "เจ็บปวดเพราะคนที่ตนเคยนับถือและชื่นชมมาตลอดที่ผ่านมาไม่หันมามองเธอเลยแม้แต่นิดเดียว"
51210-178 = "เจ็บปวดเพราะคำพูดที่ว่าอยากจะกลับไปเป็นเหมือนเดิม ไม่ได้มีความหมายอะไรเลย"
51210-180 = "เจ็บปวดเพราะเมื่อตะโกนบอกทุกคนว่าอยากกลับไป แต่ก็โดนตะคอกกลับมาว่า เธอมีที่ให้กลับไปอยู่แล้ว#nไม่ใช่เหรอ"
51210-182 = "เพราะอย่างนั้น คุณมิโกะของเราก็เลยกลับมาที่บ้าน กลับมาที่แห่งนี้"
51210-184 = "แต่น่าเสียดายนะคะ เพราะที่เดียวที่เธอคิดว่ากลับมาได้ กลับยื่นความคาดหวังเดียวที่มีต่อเธอให้..."
51210-185 = "นั่นคือการขอให้ช่วยกู้ศักดิ์ศรีของตระกูลที่เสื่อมเสียไปในเทศกาลที่ถูกยกเลิกไปเมื่อ 20 ปีก่อน"
51210-186 = "......"
51210-187 = "ใช่ค่ะ นอกจากเรื่องศักดิ์ศรีที่กินไม่ได้แล้ว ก็ไม่มีใครสนใจเลยว่าคุณมิโกะคนนี้จะรู้สึกยังไง"
51210-188 = "โธ่เอ๊ย ช่างน่าเวทนา น่าสังเวชเสียจริง ต้องมาเจ็บปวดอยู่คนเดียวท่ามกลางเทศกาลที่ทุกคนรื่นเริงกัน"
51210-189 = "แบบนี้มัน... ไม่เป็นธรรมเลยว่าไหมคะ?"
51210-190 = "ถ้างั้น... แทนที่จะโอบกอดความเจ็บปวดและทรมานเอาไว้อยู่คนเดียว... สู้เปลี่ยนเป็นให้ทุกคนมา#nทรมานด้วยกันเลย จะไม่ดีกว่าเหรอคะ?"
51210-194 = "ฉันจะส่งเสียงแทนคุณเองค่ะ ฉันจะส่ง <ความรู้สึก> ของคุณคืนไปให้กับทุกคนเอง"
51210-195 = "จากนี้ไปความสง่างามของชมรมความงามของธรรมชาติ"
51210-196 = "จะแผดเผาเฮียกคิยาโคของพวกคุณอย่างตระการตาอลังการ"
51210-197 = "ตั้งตารอได้เลยค่ะ อะฮ่าฮ่า!"
51210-204 = "[ns] \"ยูคาริ...!\""
51210-206 = "ยัยนั่นบอกว่าจะเผาเฮียกคิยาโค"
51210-207 = "แบบนี้จะเกิดเรื่องใหญ่กว่าเดิมอีกค่ะ"
51210-208 = "ตะ... ต้องขวางไว้! เร็วเข้า!"
51210-213 = "[ns] \"คุโระคาเงะเริ่มเคลื่อนไหวอีกแล้ว ทำไมต้องตอนนี้ด้วยนะ...!\""
51210-214 = "โธ่เอ๊ย...!"
51210-215 = "จะทำยังไงดี! การโจมตีของพวกเราทำอะไรผีตัวนั้นไม่ได้เลย แล้วจะให้ใช้วิธีไหน..."
51210-216 = "ต่อให้ฝ่าผีนั่นแล้วมุ่งหน้าไปยังเวทีได้... แล้วเราจะโค่นยัยเด็กนั่นลงได้ยังไง ในเมื่อกระสุนก็ทำอะไรไม่ได้เหมือนกัน?!"
51210-217 = "...มีวิธีอยู่"
51210-221 = "คิเคียว?! พูดจริงเหรอ?!"
51210-225 = "[ns] \"คิเคียว... หรือนี่คือสิ่งที่หัวหน้าเฮียกกะเรียวรันได้รับสืบทอดกันมา...?"
51210-230 = "ใช่ นี่คือ <เฮียกกุเร็น> ที่รุ่นพี่นางุสะยื่นภาระให้ฉัน"
51210-231 = "ถ้าที่ชูโระพูดเป็นเรื่องจริงละก็..."
51210-232 = "คนที่มีสิทธิ์ในการขวางและจัดการชูโระมีเพียงคนเดียวเท่านั้น นั่นแปลว่า..."
51210-238 = "คนที่สามารถช่วยยูคาริได้คือรุ่นพี่นางุสะ คุณคนเดียวเท่านั้น"
51210-239 = "เพราะงั้นก็ฝากด้วยนะ รุ่นพี่ ช่วยยูคาริด้วย"
51210-240 = "คะ... คนที่มีสิทธิ์ของหัวหน้าอย่างรุ่นพี่นางุสะ... ก็น่าจะทำได้..."
51210-244 = "ฉัน..."
51210-249 = "ฉันทำไม่ได้"
51210-251 = "ว่าไงนะ?! ทะ... ทำไมล่ะ?! รุ่นพี่นางุสะ!"
51210-253 = "คนที่มีสิทธิ์ของ <หัวหน้าเฮียกกะเรียวรัน> ที่ชูโระพูดถึงไม่ใช่ฉัน... แต่เป็นอายาเมะ"
51210-254 = "ฉันทำไม่ได้"
51210-255 = "ชูโระพูดถูกแล้วละ ทั้งหมดเป็น... ข้ออ้าง... ตั้งแต่แรกเลย"
51210-256 = "ฉันพยายามจะหนีไปน่ะ เพราะกลัวว่า... ตัวตนที่แท้จริงจะถูกเปิดโปง"
51210-257 = "ที่ผ่านมาฉันเปิดเผยความจริงไม่ได้... และทำได้แค่แสร้งเป็นเด็กที่ชื่อ <นางุสะ> ที่มีสิทธิ์ในการยืน#nเคียงข้างอายาเมะ"
51210-258 = "ฉันหลอกทุกคนมาตลอด"
51210-259 = "ทุกอย่างของฉันเป็นแค่... คอสเพลย์"
51210-260 = "[s] \"นางุสะ...\""
51210-263 = "เพราะฉันอยากอยู่เคียงข้างอายาเมะ... อยากเป็นคนที่สนิทสนมกับอายาเมะ"
51210-264 = "ตัวปลอมที่แสร้งทำตัวเป็นนักเรียนดีเด่น"
51210-265 = "ฉันสูญเสียอายาเมะไปต่อหน้าแล้วกลับมาที่นี่... จะให้ฉันบอกใครได้ยังไงว่าฉันทำให้อายาเมะหายไป แล้วหนีหัวซุกหัวซุนกลับมาคนเดียว..."
51210-270 = "ถ้าฉันบอกไป ก็ต้องโดนทุกคนชี้นิ้วประณาม"
51210-272 = "คนอย่างฉันไม่สมควรได้รับสิทธิ์อะไรทั้งนั้น"
51210-273 = "คนอย่างฉัน... จะช่วยยูคาริได้ยังไง...!"
51210-279 = "โกเรียว... นางุสะ...!"
51210-284 = "อ่า..."
51210-289 = "[ns] \"คิเคียว ใจเย็นๆ ก่อน...!\""
51210-304 = "คิ... เคียว?"
51210-305 = "ฉันน่ะ พูดจาแรงๆ กับยูคาริ"
51210-306 = "ฉันบอกไปว่าเธอยังมีที่ที่ให้กลับไป และให้เลิกเล่นสนุกเป็นเฮียกกะเรียวรันได้แล้ว"
51210-307 = "...ทั้งๆ ที่ไม่เคยคิดแบบนั้นเลย แต่ฉันก็หลอกตัวเอง และเอาแต่พูดอยู่ฝ่ายเดียว"
51210-309 = "และนั่นก็เลยทำให้เด็กคนนั้นต้องเจอกับความเจ็บปวดแบบนี้"
51210-310 = "คิ... เคียว..."
51210-315 = "......"
51210-316 = "ที่คุณทิ้งพวกเราและหนีไปน่ะ... ฉันยังคงโกรธคุณอยู่เหมือนเดิมนั่นละ"
51210-317 = "ฉันเฝ้ารอคอยคุณอย่างมีความหวัง แต่คุณก็ไม่กลับมา... เรื่องนั้นฉันยังให้อภัยไม่ได้หรอก"
51210-322 = "แต่ว่า..."
51210-323 = "ต่อให้เป็นอย่างนั้นก็เถอะ..."
51210-325 = "เพราะฉัน... เพราะความผิดพลาดของฉัน..."
51210-326 = "เด็กคนนั้นต้องเจ็บช้ำใจเพราะฉันเอาแต่ทำตามอำเภอใจ..."
51210-327 = "ตอนนี้คนที่จะช่วยยูคาริได้..."
51210-328 = "ไม่ใช่ฉัน... ไม่ใช่เรนเกะ... ไม่ใช่แม้แต่หัวหน้าอายาเมะที่ไม่ได้อยู่ที่นี่... แต่เป็นคุณคนเดียวเท่านั้น"
51210-330 = "เพราะงั้น... ขอร้องละ"
51210-331 = "ฉันรู้ว่ามันน่าละอายที่จะขอร้องแบบนี้ คนอวดดีอย่างฉันอาจจะไม่มีสิทธิ์พูดอะไรแบบนี้เลยด้วยซ้ำ"
51210-332 = "แต่ยังไงฉันก็อยากจะอ้อนวอนคุณ!"
51210-333 = "อย่างน้อยก็เพื่อให้ฉันกลับไปขอโทษเด็กคนนั้นได้"
51210-334 = "รุ่นพี่นางุสะ... ได้โปรด..."
51210-336 = "ขอร้องละ"
51210-339 = "รุ่นพี่นางุสะ!"
51210-343 = "อ่า..."
51210-344 = "ฉัน... ฉันก็เหมือนกัน!"
51210-345 = "ฉันรู้ว่าคนที่วิ่งหนีจากเฮียกกะเรียวรันมาไม่มีสิทธิ์ที่จะพูดอะไรแบบนี้!"
51210-346 = "แต่ถ้าสิ่งที่ฉันพูดออกไปมันทำให้ยูคาริต้องเจ็บช้ำน้ำใจ!"
51210-347 = "ฉันเองก็อยากจะขอโทษเธอด้วยเหมือนกัน"
51210-348 = "ฉันอยากเจอและพูดคุยกับเธออีกครั้ง"
51210-349 = "ฉันรู้ว่านี่คือความดึงดัน และรู้ว่ามันน่าละอายที่จะกลืนน้ำลายตัวเอง"
51210-350 = "แต่ว่า..."
51210-355 = "ถ้าเรากลับไปยังตอนนั้นได้อย่างที่ยูคาริว่าเอาไว้... ฉันเองก็อยากกลับไป..."
51210-356 = "ฉันขอร้องละ รุ่นพี่นางุสะ"
51210-362 = "... แต่ฉันหลอกทุกคนนะ..."
51210-363 = "และก็โกหก..."
51210-369 = "[ns] \"นางุสะ ครูขอร้องละ\""
51210-382 = "เข้าใจแล้ว..."
51210-392 = "ฉันจะลองดู"
51210-404 = "[ns] \"ทางนั้นไม่คิดจะยอมแพ้ง่ายๆ เลยสินะ\""
51210-405 = "งั้นก่อนอื่น... เราจะเปิดทางข้างหน้าไปเลยนะ!"
51210-406 = "อื้ม ถ้ากำหนดเป้าหมายแล้วก็ลงมือได้ หยุดพวกนั้นไว้ให้ได้มากที่สุดใช่ไหม?"
51210-407 = "ต่อให้ล้มมันไม่ได้ แต่ฉันก็จะหาจุดอ่อนมาให้ได้เลยค่ะ!"
51210-408 = "ไว้ใจพวกเราได้เลย! คุณครู!?"
51210-410 = "...ฝากยูคาริด้วยนะ คุณครู รุ่นพี่นางุสะ"
51210-412 = "[ns] \"อื้ม ไปกันเถอะ นางุสะ!\""
51210-419 = "...!"
51210-421 = "ตอนต่อไป;ถนนที่ลุกเป็นไฟ"

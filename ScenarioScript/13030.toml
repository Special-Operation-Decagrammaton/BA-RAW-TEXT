[translation]
13030-1 = "ตอนที่ 3;สถาบันการรถไฟไฮแลนเดอร์"
13030-2 = "วะฮะฮะฮะฮ่า! รู้สึกดีชะมัด!"
13030-3 = "หนวกหูน่า"
13030-4 = "ก็แหม คนมันรู้สึกดีนี่นา ตอนนี้สถานการณ์เป็นยังไงบ้าง?"
13030-5 = "ระเบิดหินก้อนใหญ่ที่ขวางรางรถไฟเรียบร้อยแล้วค่ะ แล้วก็เจอรางรถไฟแคบๆ ที่ถูกฝังอยู่ด้วย! เป็นไปตามที่ระบุในแผนธุรกิจเลยค่ะ!"
13030-6 = "งั้นเราทดสอบการเดินรถดูเลยไหมคะ? รถไฟก็เพิ่งซ่อมเสร็จพอดีเลยด้วย! ตอนนี้เอาออกมาวิ่งฉิวได้#nแล้วค่ะ~!"
13030-7 = "งั้นก็ดีเลย เพราะยิ่งก่อสร้างเสร็จเร็วก็ยิ่งดี งั้นก็ทดสอบการเดินรถกันเลย วิ่งไปให้ถึงสุดฝั่งนู้นเลยนะ~ "
13030-8 = "รับทราบค่ะ~ วางใจฉันได้เลยค่ะ "
13030-14 = "โอ้ว~ ขยับแล้ว"
13030-15 = "วะฮะฮะฮะฮ่า ดีละ ถ้างั้นก็เลื่อนวันครบกำหนดเข้ามาได้อีกอาทิตย์หนึ่งเลย!"
13030-16 = "ตะ... แต่ท่านผู้บริหาร CCC คะ... แบบนี้จะไม่เป็นไรเหรอคะ?"
13030-17 = "หืม?"
13030-18 = "ทำไมเหรอ?"
13030-20 = "ทะ... ที่นี่เป็น... เขตปกครองตนเองเขตอื่นนะคะ...?"
13030-22 = "นั่นสิเนอะ? "
13030-23 = "แล้วไงล่ะ?"
13030-25 = "คะ?!  จะมา 'แล้วไงล่ะ?' แบบนี้ไม่ได้สิคะ... "
13030-26 = "ถึงจะไม่รู้ว่านี่เป็นเขตปกครองไหน... แต่ถ้าเราไม่ได้รับอนุญาตและมาเริ่มการก่อสร้าง เราอาจโดนทั้ง#nข้อหาละเมิดทรัพย์สินส่วนบุคคล แล้วก็ข้อหาบุกรุกโดยไม่ได้รับอนุญาต... "
13030-27 = "ถะ... ถ้าเป็นอย่างนั้น อาจเกิดการปะทะกันระหว่างเขตปกครองตนเองได้นะคะ"
13030-28 = "อืม... แบบนั้นก็อาจจะเข้าท่านะ?"
13030-29 = "วะฮ่าฮ่า จริงอย่างที่ว่านะ เรื่องนั้นน่ะไม่ต้องกังวลหรอก เพราะจากนี้ไปเราจะได้เป็นเจ้าของ <ทางรถไฟข้ามทะเลทราย> แห่งนี้"
13030-30 = "คะ?! "
13030-31 = "อื้ม จากที่ฉันตรวจสอบมา เราได้พันธบัตรทางรถไฟข้ามทะเลทรายอะบิดอสมามากกว่า 51% แล้ว "
13030-32 = "นั่นก็แปลว่าทางรถไฟนี้ก็เป็นของ CCC แล้วละ จะคิดแบบนี้ได้เลยมั้ยนะ? เอาเถอะ ไม่ต้องกังวลไปหรอก"
13030-33 = "ตะ... แต่ถ้าจะทำการก่อสร้าง ก็ต้องมีการบันทึกความเข้าใจและทำข้อตกลงร่วมก่อน..."
13030-34 = "อ๊ายยย! เรื่องแบบนั้นน่ารำคาญที่สุดเลย!!"
13030-35 = "ถ้าต้องมาเตรียมเรื่องแบบนั้นทีละอย่างๆ ก็ก่อสร้างเสร็จไม่ทันกันพอดี สำหรับพวกเราแล้วน่ะ เวลามีค่ายิ่งกว่าเงินทองอีกนะ"
13030-37 = "ใช่ เพราะคติของพวกเราคือ 'ก่อสร้างเร็วๆ เอกสารลวกๆ'"
13030-38 = "ถึงจะฟังดูเป็นปัญหาใหญ่ แต่ถ้าทาง CCC ตัดสินอย่างนั้นละก็... ฉันจะเข้าใจว่าไม่มีปัญหาแล้วกันค่ะ"
13030-39 = "มะ... ไม่มีปัญหา... ถูกไหมคะ...?"
13030-40 = "คิดว่างั้นนะ?"
13030-41 = "ไม่มีหรอก ไม่มีๆ วะฮ่าฮ่า!"
13030-42 = "อะไรของพวกเธอน่ะ!!"
13030-50 = "อ๊ะ โดนจับได้ซะแล้ว"
13030-51 = "มาไวจังเลยน้า~"
13030-53 = "ก็ไหนว่าไม่มีปัญหาไงล่ะคะ...!!!"
13030-54 = "สถาบันการรถไฟไฮแลนเดอร์! ทำอะไรของพวกคุณอยู่คะ? ที่นี่คือเขตปกครองตนเองอะบิดอสนะคะ!"
13030-56 = "หืม~"
13030-58 = "ถ้าไม่ได้รับอนุญาตจากคณะกรรมการแผนงาน พวกคุณจะมาทำงานบริหารจัดการในเขตปกครองตน#nเองอะบิดอสไม่ได้ค่ะ! เรื่องแบบนี้มันเป็นสามัญสำนึกนะคะ! "
13030-59 = "นึกว่าคนที่ไม่รู้เรื่องแบบนี้มีแต่พวกเกเฮนน่าซะอีก... ทำไมในคิโวทอสถึงมีโรงเรียนที่ไม่มีสามัญสำนึก#nมากขนาดนี้คะ...!"
13030-60 = "สังคมที่มีสามัญสำนึกยังมีอยู่บ้างรึเปล่าคะ?!!"
13030-61 = "จะ... ใจเย็นๆ ก่อนนะ อายาเนะจัง..."
13030-63 = "นี่ เด็กคนนั้นโกรธแล้วมั้ง "
13030-64 = "นั่นสิ..."
13030-65 = "[s] \"สถาบันการรถไฟไฮแลนเดอร์มีธุระอะไรที่นี่เหรอ?\""
13030-66 = "ใครน่ะ...?"
13030-67 = "ผู้ใหญ่เหรอ...?"
13030-68 = "ทะ... ท่านนั้นคือ คะ... คุณครูค่ะ! คุณครูจากชาเล่ต์!"
13030-69 = "ครู?"
13030-70 = "ชาเล่ต์?"
13030-71 = "ฉะ... ฉันเคยได้ยินมาค่ะว่าถ้ามีความขัดแย้งหรือเกิดปัญหาอะไรระหว่างโรงเรียน คนคนนี้จะทำลายทุกสิ่งอย่างเพื่อคลี่คลายเรื่องที่เกิดขึ้น!"
13030-72 = "[s] \".........\""
13030-73 = "ได้ยินว่าคราวก่อนก็มาระเบิดรถไฟของโรงเรียนเราไปทั้งขบวนด้วยค่ะ! เอาเป็นว่าเป็นคนที่น่ากลัวค่ะ!"
13030-74 = "เป็นผู้ใหญ่ที่มีข่าวลือน่ากลัวเยอะเลยละค่ะ! คราวก่อนได้ยินว่าวิ่งล่อนจ้อน..."
13030-75 = "[s1] \"เดี๋ยวก่อน ครูไม่คิดว่ามันจะถึงขนาดนั้นนะ\"\n[s2] \"ข่าวลือนั่นมีเจตนาร้ายนะ...\""
13030-78 = "เที่ยวไปก่อเรื่องอะไรไว้เนี่ยครู..."
13030-79 = "อืม อย่างที่คิดเลยคุณครู"
13030-80 = "ส่วนรุ่นพี่ก็อย่าพยักหน้าอย่างภูมิใจสิ..."
13030-85 = "ไม่ว่าจะมาด้วยเหตุผลอะไร แต่ที่นี่คือเขตปกครองตนเองของพวกเราค่ะ หยุดสิ่งที่กำลังทำอยู่ตอนนี้#nเลยนะคะ!"
13030-86 = "ถึงจะอ้างสิทธิ์จากพันธบัตร แต่ก็ต้องมาหารือกับพวกเราก่อนค่ะ!"
13030-88 = "เอาไงดีล่ะ? โนโซมิ?"
13030-89 = "ถามแปลก ก็ทำอย่างที่ทำมาตลอดไง ฮิคาริ"
13030-94 = "คะ...? ว่ายังไงนะคะ...?"
13030-99 = "วะ... ว้ายยย?!  มันอันตรายนะ!"
13030-101 = "กลบเกลื่อนปัญหาอย่างลวกๆ เหมือนที่เคยทำมาตลอด แล้วค่อยขอให้พวกเสมียนมาตามเก็บกวาดให้#nไงล่ะ! วะฮ่าฮ่าฮ่าฮ่าฮ่า!"
13030-102 = "ไอเดียดีนะเนี่ย"
13030-106 = "ทางรถไฟข้ามทะเลทราย...?! กำลังขยับอยู่เหรอคะ...?"
13030-107 = "พวกไฮแลนเดอร์ขึ้นรถไฟไปแล้วค่ะ! คงคิดจะหนีกันน่ะค่ะ!"
13030-108 = "เอายังไงดีล่ะรุ่นพี่?"
13030-109 = "ไล่ตามไป"
13030-110 = "พวกนั้นซ่อมรถไฟอยู่สินะ เรื่องเหตุผลเอาไว้ถามทีหลังก็ได้ ตอนนี้ต้องตามไปก่อน"
13030-111 = "ใช่ค่ะ... ถ้ามาก่อเรื่องในอะบิดอสโดยพลการแบบนี้ เราจะนิ่งเฉยอยู่ไม่ได้ค่ะ ต้องล้วงเอาเหตุผล และจุดประสงค์มาให้ได้ แล้วก็ต้องรู้ให้ละเอียดด้วยค่ะ!"
13030-113 = "ค่ะ! คุณครูคะ! รบกวนช่วยสั่งการให้ด้วยนะคะ!"
13030-114 = "[s3] \"คิดไว้แล้วละว่าจะเป็นแบบนี้...\"\n[s4] \"งั้นก็ไปกันเลย คณะกรรมการแผนงาน!\""

[translation]
13030-1 = "Episode 3;Highlander Railroad Academy"
13030-2 = "Pahyahyahya! That felt great!"
13030-3 = "Loud... So loud..."
13030-4 = "It's called expressing myself! Self-expression! Anyway, what's the sitch?"
13030-5 = "The boulder blocking the railway is no more! And as the icing on the cake, we uncovered the narrow-gauge railway! Just like it was described in the contracts!"
13030-6 = "We just wrapped up repairs on the train! Can we take it on a test run? Please, please, please!"
13030-7 = "We've got deadlines to meet, so let's do it! We need to reach the abandoned route aaall the way down there!"
13030-8 = "All aboard!"
13030-14 = "Whoa. We're off."
13030-15 = "Pahyahyahya! At this rate, we'll be a full week ahead of schedule!"
13030-16 = "Th-That's great and all, but are you sure all our i's are dotted and t's crossed?"
13030-17 = "Hm?"
13030-18 = "What does that mean...?"
13030-20 = "Aren't we trespassing in a different district right now?"
13030-22 = "Huh. Are we? "
13030-23 = "And...?"
13030-25 = "What?! What's with this lack of concern?!"
13030-26 = "I don't know the name exactly, but we're in a different district right now... If we begin construction without the proper permits and paperwork, we're basically invading."
13030-27 = "We could start an all-out war!"
13030-28 = "Oh. Is there...something wrong...with that?"
13030-29 = "Pahyahya! Seriously! Why're you stressing over the small stuff? The Trans-Desert Railway is ours now anyway."
13030-30 = "What?!"
13030-31 = "Yuppies. We own 51% of the Abydos Trans-Desert Railway's derivative bonds. Yup, we do. "
13030-32 = "So now all of this belongs to CCC! Technically! Basically! Eh, however it shakes out, it'll be fine!"
13030-33 = "Just owning the rights to the railway isn't enough! You need contracts! Permits! Construction agreements!"
13030-34 = "Blah, blah, blah. Annoying! Sooo annoying!"
13030-35 = "If we spend all that time unravelling the red tape, we'll never make the deadline. Don't ever forget! Time is money for railway workers!"
13030-37 = "Yuppies... Hikari's motto is something like... Fast construction, no administration. Who cares about paperwork?"
13030-38 = "This all sounds incredibly problematic, but if the CCC is saying so, I'll take your word that there won't be any issues..."
13030-39 = "Erm... There won't be, right?"
13030-40 = "Sure?"
13030-41 = "Nah! Not a single one! Hahaha!"
13030-42 = "Who the hell are you people?!"
13030-50 = "Oops. Sister, they found out."
13030-51 = "So speedy!"
13030-53 = "You said there wouldn't be a single issue!"
13030-54 = "Highlander Railroad Academy! You are currently trespassing on Abydos territory! Explain yourselves!"
13030-56 = "Hmm."
13030-58 = "No work can be conducted in the Abydos district without express approval from the Foreclosure Task Force! That's the law! No, it's common sense! "
13030-59 = "Here I thought Gehenna were the only ignorant brutes who would flaunt common decency! But no! Is Kivotos just a menagerie of rude, brainless academies?"
13030-60 = "Am I allowed to enjoy even one iota of logic in this world?! Or are we all just psychopaths now?!"
13030-61 = "Whoa, whoa, whoa. Deep breaths, Ayane."
13030-63 = "Look. She's mad. Real mad. "
13030-64 = "She sure is...!"
13030-65 = "[s] \"What business does Highlander Academy have in this district?\""
13030-66 = "Who's that...?"
13030-67 = "An adult?"
13030-68 = "Th-That's Sensei! Schale's Sensei!"
13030-69 = "Sensei?"
13030-70 = "Schale?"
13030-71 = "You haven't heard of them? They're infamous! The rumors say they'll burn everything in their path under the pretense of solving conflict between academies! The terrifying instructor who keeps the peace!"
13030-72 = "[s] \"...\""
13030-73 = "One time, someone made them mad, and they blew up an entire train! One of ours! I would never cross them!"
13030-74 = "In fact, the rumors only get worse and worse. I heard they were running around naked—"
13030-75 = "[s1] \"Let's not hyperbolize here...\"\n[s2] \"Good thing they're just rumors, right? Haha!\""
13030-78 = "Now, now. What has our esteemed teacher been getting themself into?"
13030-79 = "Heh. Go Sensei."
13030-80 = "Shiroko! Nothing those people said is good! At all!"
13030-85 = "Your excuses don't matter! We have jurisdiction over our district, and we demand that you cease this activity immediately!"
13030-86 = "You may have the rights to the railway, but you're still required to cooperate with the district's governing body!"
13030-88 = "What do, Nozomi?"
13030-89 = "Duh. What we always do, Hikari!"
13030-94 = "...Huh?! What do you think you're—"
13030-99 = "Hey! That's dangerous!"
13030-101 = "We're gonna do whatever we want and the pencil pushers can clean up after us! Pahyahyahyahya!"
13030-102 = "Hikari likes it...!"
13030-106 = "The train... It's moving?! On the Trans-Desert Railway?"
13030-107 = "The Highlander students are all aboard the train! They're trying to get away!"
13030-108 = "What should we do?"
13030-109 = "Chase them."
13030-110 = "So their goal was to fix the train... We can figure out why after we catch them."
13030-111 = "Let's go! I won't allow them to treat Abydos like this! We'll find out what they're up to."
13030-113 = "Following your lead, Sensei!"
13030-114 = "[s3] \"I had a feeling this was going to happen...\"\n[s4] \"Foreclosure Task Force, move out!\""

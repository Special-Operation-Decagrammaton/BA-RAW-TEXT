[translation]
13030-1 = "第3話;高地人鐵道學園"
13030-2 = "噗哈哈哈哈！還挺不錯的嘛？"
13030-3 = "好吵～"
13030-4 = "不不不，痛痛快快的是好事吧。狀態如何？"
13030-5 = "是，已成功爆破阻擋鐵道的岩石。#n而且還發現了一條埋藏的窄軌線！跟事業文件裡寫的一樣！"
13030-6 = "要不要試著運行一下？#n列車剛剛已經整修完畢！隨時可以開跑哦～！"
13030-7 = "很好，工程進行得越快越好。#n趕緊啟動列車，一路開到消失的路線那邊吧～"
13030-8 = "嗯～交給我吧。"
13030-14 = "哦～出發囉～"
13030-15 = "噗哈哈哈哈，很好，這樣交期就可以提前一個禮拜了！"
13030-16 = "不，不過CCC的幹部們……這，這樣真的沒問題嗎？"
13030-17 = "嗯？"
13030-18 = "什～麼意思～？"
13030-20 = "這，這裡……不是其他學園的自治區嗎……？"
13030-22 = "應該是吧？"
13030-23 = "是～又怎樣～？"
13030-25 = "咦！？這樣不太好吧……？"
13030-26 = "雖然不曉得是哪個自治區……#n但未經許可就這樣動工，可能會構成侵占私有財或非法入侵……"
13030-27 = "這，這樣一來可能會和自治區爆發武裝衝突……"
13030-28 = "啊啊～那種事～無所謂～啦～？"
13030-29 = "噗哈哈，沒錯，不用擔心這種事。#n現在這條「沙漠橫貫鐵路」已經歸我們所有了。"
13030-30 = "什麼！？"
13030-31 = "嗯～確認過了～持有阿拜多斯沙漠橫貫鐵路51%以上DLB債券～ "
13030-32 = "這就代表這條鐵道是我們CCC的。#n雖然實際情況有點不太一樣，總之沒關係啦。"
13030-33 = "但，但是想施工的話，應該要先簽訂[ruby=MOU]諒解備忘錄[/ruby]或施工協議書才行……"
13030-34 = "唉唷～！那種東西麻煩死了！！"
13030-35 = "要是得一一準備，不就沒辦法趕上交期了嗎？#n對我們來說，時間就是金錢。"
13030-37 = "嗯～工程越快越好～行政隨便就行～這是我們的座右銘～"
13030-38 = "雖然這段發言聽起來實在很不妥，但要是CCC決定如此……我就當做沒問題了。"
13030-39 = "真，真的沒問題吧……？"
13030-40 = "應該吧～？"
13030-41 = "放心放心。哈哈哈！"
13030-42 = "你們幾個在做什麼！！"
13030-50 = "啊～被發現了～"
13030-51 = "還真快～"
13030-53 = "喂！！明明就有問題嘛……！！"
13030-54 = "你們在做什麼？這裡可是阿拜多斯自治區哦！#n「高地人鐵道學園」的各位！"
13030-56 = "唔嗯～"
13030-58 = "沒有我們對策委員會的同意，不可以在阿拜多斯自治區從事任何行政活動！#n這應該是常識吧！"
13030-59 = "還以為只有格黑娜才會這樣……#n沒想到奇普托斯竟然有這麼多沒有常識的學園……！"
13030-60 = "有常識的人都跑哪去了啊！！？"
13030-61 = "你，你冷靜一點，綾音醬……"
13030-63 = "哦～他好像～生氣了～ "
13030-64 = "就是說啊……"
13030-65 = "[s]「高地人鐵道學園來這裡有什麼事？」"
13030-66 = "……是誰？"
13030-67 = "大人……？"
13030-68 = "他，他是老師！夏萊的老師！"
13030-69 = "老～師～？"
13030-70 = "夏萊？"
13030-71 = "我，我有聽說過！！#n是個當學園之間出現紛爭或問題的時候，就會以解決問題為藉口四處破壞的人！"
13030-72 = "[s] 「…………」"
13030-73 = "之前似乎還炸毀了我們學園的一整列列車！"
13030-74 = "總之是個有著各種可怕謠言的大人！#n上次竟然還裸體……"
13030-75 = "[s1]「不是，沒有那麼誇張……」\n[s2]「那些都是惡意的謠言……嗯。」"
13030-78 = "……你到底闖了什麼禍呀，老師？"
13030-79 = "嗯，不愧是老師。"
13030-80 = "不要一臉得意地點頭好嗎，前輩……"
13030-85 = "不管是出於什麼理由，這裡是我們的自治區。#n請立刻停止你們的行為！"
13030-86 = "就算各位有擔保品的所有權，也應該要先跟我們協商才對！"
13030-88 = "怎麼～辦？希望？"
13030-89 = "還能怎麼辦？跟往常一樣囉，光。"
13030-94 = "……嗯？你們想做什麼……？"
13030-99 = "嗚，嗚哇！？很危險耶！"
13030-101 = "跟往常一樣糊弄過去，之後再叫事務官收拾善後！噗哈哈哈哈哈！"
13030-102 = "嗯～好主意～"
13030-106 = "這是……沙漠橫貫鐵路……正在運作……？"
13030-107 = "鐵道學園的學生搭上火車了！他們好像想逃跑！"
13030-108 = "前輩們，該怎麼辦？"
13030-109 = "追上去。"
13030-110 = "他們修理了火車啊……#n理由之後再問，先追上去吧。"
13030-111 = "沒錯……不能這樣眼睜睜地看著他們在阿拜多斯胡作非為。#n得讓他們好好解釋清楚……！"
13030-113 = "是！老師！麻煩進行作戰指揮！"
13030-114 = "[s3]「嗯，我就知道會這樣……」\n[s4]「上吧，對策委員會！」"

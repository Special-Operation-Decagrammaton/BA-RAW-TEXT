[translation]
2004505-1 = "導覽殘俠傳"
2004505-2 = "（接到菲娜的聯絡後來到了電影村）"
2004505-3 = "（很輕鬆地找到了菲娜）"
2004505-7 = "我是各位今天的導覽員，名叫菲娜。"
2004505-8 = "各位即將在電影村劇場欣賞的，是改編自同名任俠電影的《任俠喵喵傳》舞台劇。"
2004505-9 = "犀利的主題意識和沈穩的史劇氛圍，使《任俠喵喵傳》受到評論界的一致好評。#n延續其叫好叫座的氣勢，這次也將其改編成了舞台劇。"
2004505-10 = "儘管舞台特性使演出手法有所侷限，但以現場舞台為框架的巧思……"
2004505-11 = "有人能在看表演之前講解一下還真不錯。"
2004505-12 = "要是直接看肯定會錯過很多細節，聽完講解之後讓我更期待了。"
2004505-13 = "他講得這麼專業又清楚，搞得像在參加什麼正式的文化活動一樣，感覺還挺新鮮的。"
2004505-14 = "……那麼百聞不如一見。#n還請各位細細欣賞百鬼夜行引以為傲的任俠名作《任俠喵喵傳》。"
2004505-18 = "[ns1]「菲娜真帥氣！」\n[ns2]「冷靜又專業的樣子，跟平常不太一樣呢！」"
2004505-23 = "啊，老師！"
2004505-24 = "耶嘿嘿，真讓人害羞。"
2004505-25 = "光是想到百鬼夜行任俠作品有多熱血沸騰，菲娜的心情就非常澎湃……！"
2004505-26 = "不過為了讓遊客們有最完整、最純粹的旅行體驗和感受，#n適當排除導覽員個人的情緒和喜惡也是很重要的！"
2004505-27 = "為此我展現了如磐石般沈穩的任俠風範！"
2004505-28 = "[s]「這就是任俠嗎……！」"
2004505-29 = "嘿嘿～得到老師的肯定真開心！"
2004505-30 = "啊，表演馬上要開始了！老師也一起看吧！"
2004505-32 = "（表演拉開序幕，觀眾席也安靜了下來）"
2004505-33 = "（劇情在較為沉重嚴肅的氛圍中展開）"
2004505-35 = "唔嗯……角色一直提到的「盃事」是什麼意思呢……"
2004505-36 = "「盃事」是任俠間的結義儀式。代表那兩個人正在結拜。"
2004505-37 = "哦哦，原來不是單純約喝酒，而是更重要的儀式啊。"
2004505-38 = "謝謝你，我懂了。"
2004505-43 = "那個，導覽員同學。#n劇裡說的「家私」是什麼意思呢？"
2004505-44 = "啊，意思是說──"
2004505-49 = "[ns3]（哦哦……在不妨礙觀賞的前提下回答得很俐落呢……）\n[ns4]（菲娜真厲害！）"
2004505-53 = "大哥……我都幫忙擦屁股了，居然還得受到這種待遇……！"
2004505-54 = "嗯……擦屁股？"
2004505-55 = "是指收拾殘局的意思哦！"
2004505-56 = "咦！？"
2004505-57 = "貓助明明已經代為謝罪並承擔了一切，卻還是被棄之如敝履……"
2004505-58 = "真是太無情無義了！"
2004505-59 = "哦哦……這樣啊。#n謝謝你的講解……？"
2004505-61 = "（主角與組織的對立終於到達了高潮……）"
2004505-63 = "這……這……"
2004505-64 = "這個叛徒！！"
2004505-65 = "！？"
2004505-66 = "貓助！！不能輸啊！！一定要報仇！！"
2004505-70 = "[ns5]「菲娜！？」\n[ns6]「你太大聲了！！」"
2004505-73 = "勝利的女神永遠會站在守護仁義的這一方！！加油啊！！"
2004505-77 = "[ns]（糟糕……觀眾們一定會覺得很困惑！）"
2004505-78 = "這……這是什麼情況？"
2004505-79 = "剛才明明還很安靜嚴肅的說？"
2004505-80 = "這……就是那個吧。"
2004505-81 = "沒想到能在這裡看到那個有名的「沉浸式互動劇場」！"
2004505-85 = "原來是這樣啊。#n因為很多人是第一次看這種劇，所以導覽員同學才會負責帶頭示範嗎？"
2004505-86 = "我一直很想體驗看看沉浸式互動呢！"
2004505-87 = "戰鬥吧！！一定要贏！！"
2004505-88 = "你們不是做過盃事還是什麼的了嗎！"
2004505-89 = "Yes！！做個了斷吧！貓助！"
2004505-96 = "對對對對，對不起──！"
2004505-97 = "我百口莫辯！我罪有應得！#n因為這是我第一次看喜歡的《任俠喵喵傳》的舞台劇，#n結果居然激動到做出這麼失禮的舉動……！！"
2004505-98 = "我不配當導覽員……要被逐出師門了！"
2004505-99 = "我該怎麼謝罪……！要，要切手指嗎……！"
2004505-100 = "[s7]「菲娜，你冷靜點……」\n[s8]「我替他向您道歉，如果造成損失我會想辦法的……」"
2004505-103 = "哈哈哈哈！！#n居然能讓舞台老手都傻眼，這位同學還挺有本事的嘛！"
2004505-104 = "不用擔心，觀眾好像都很樂在其中的樣子。"
2004505-105 = "但是因為不才菲娜的無能，搞砸了您精心準備的舞台劇……"
2004505-106 = "哎呀，雖然這確實不是原先設想的氛圍沒錯……"
2004505-107 = "不過偶爾有點意外也不錯嘛。"
2004505-108 = "讓我回想起了年輕時演英雄戰隊秀的回憶。"
2004505-109 = "不必那麼沮喪沒關係，我反而覺得從你身上得到了力量呢！"
2004505-110 = "而且大家也都看得很專注，我已經很久沒感受到這種氣氛了啊～"
2004505-111 = "嗚……嗚嗚……謝謝……"
2004505-116 = "那……那個，聽說來這裡可以跟演員見面。"
2004505-117 = "因為和平常看的舞台劇很不一樣，所以我想拍張照片作為紀念。"
2004505-118 = "哦～當然好！#n既然如此，導覽員同學也來拍一張吧。"
2004505-119 = "菲娜也要嗎！？"
2004505-123 = "來來來，不用客氣～"
2004505-129 = "（於是表演順利落幕）"
2004505-130 = "（看著害羞又鬆了口氣的菲娜，結束了這一天）"

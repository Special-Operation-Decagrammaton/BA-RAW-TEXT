[translation]
2004505-1 = "ไกด์อัศวิน"
2004505-2 = "(คุณครูมาที่หมู่บ้านสตูดิโอภาพยนตร์ตามคำขอของพีน่า)"
2004505-3 = "(เมื่อมาถึงแล้วก็หาพีน่าเจออย่างง่ายดาย)"
2004505-7 = "ฉันชื่อพีน่า มาเป็นไกด์ของทุกคนในวันนี้ค่ะ"
2004505-8 = "การแสดงที่ทุกท่านจะได้ชมกันในฮอลล์การแสดงของหมู่บ้านสตูดิโอภาพยนตร์ในวันนี้มาจาก#nภาพยนตร์ชิ้นโบแดงเรื่อง <เหมียวมาเฟีย> ค่ะ"
2004505-9 = "<เหมียวมาเฟีย> ได้รับการประเมินจากกลุ่มนักวิจารณ์ว่ามีเนื้อหาที่เฉียบคมและถ่ายทอดบรรยากาศได้#nอย่างหนักแน่น จนได้รับการดัดแปลงให้อยู่ในรูปแบบของศิลปะการแสดงในต่อมาค่ะ"
2004505-10 = "และเมื่ออยู่ในรูปแบบของละคร ก็อาจมีข้อจำกัดเล็กน้อย แต่เมื่อพิจารณาในเรื่องนี้อย่างลึกซึ้ง..."
2004505-11 = "ดีจังเลยนะที่ได้ฟังคำอธิบายก่อนชมการแสดงแบบนี้"
2004505-12 = "ถ้าได้ดูโดยที่ไม่รู้อะไรเลยก็คงงั้นๆ แต่พอรู้รายละเอียดก็ยิ่งอยากดูขึ้นมาแล้วละ"
2004505-13 = "พอได้ฟังคุณไกด์อธิบายอย่างละเอียดและสุขุม ก็ยิ่งเหมือนได้มาอยู่ในงานวัฒนธรรมจริงๆ เลย"
2004505-14 = "แต่สิบปากว่าก็ไม่เท่าตาเห็นค่ะ... ถ้างั้นก็ขอให้สนุกกับการรับชม <เหมียวมาเฟีย> ละครผดุงความ#nยุติธรรมที่เป็นความภาคภูมิใจของเฮียกคิยาโคกันเลยค่ะ ขอบคุณค่ะ"
2004505-18 = "[ns1] \"ไกด์พีน่า เท่มากๆ เลย!\"\n[ns2] \"ตอนอธิบายอย่างใจเย็น ครูว่าพีน่าเท่มากเลยนะ!\""
2004505-23 = "อ๊ะ คุณครู!"
2004505-24 = "แหะๆๆ ชมกันอย่างนี้ฉันก็เขินสิคะ"
2004505-25 = "แค่คิดถึงหนังต่อสู้หรือสิ่งที่เกี่ยวกับอัศวินของเฮียกคิยาโค พีน่าก็ใจเต้นแรงแล้วละค่ะ...!"
2004505-26 = "ฉันได้เรียนรู้ว่าถ้าอยากถ่ายทอดประสบการณ์และอารมณ์ของการท่องเที่ยวให้นักท่องเที่ยวทุกคน คนที่เป็นไกด์ก็ต้องแสดงความคูลให้เห็นด้วยค่ะ"
2004505-27 = "เพราะงั้นฉันก็เลยทำตัวเป็นอัศวินคูลๆ ที่สุขุมและสงบนิ่งเหมือนก้อนหินอยู่ค่ะ"
2004505-28 = "[s] \"งั้นวันนี้ก็เป็น... ไกด์อัศวินสินะ...!\""
2004505-29 = "ฮิฮิ... ดีใจจังเลยค่ะที่คุณครูดูออก!"
2004505-30 = "อ๊ะ การแสดงใกล้จะเริ่มแล้วค่ะ! คุณครูก็ไปดูด้วยกันสิคะ!"
2004505-32 = "(เมื่อเปิดม่านการแสดง ผู้ชมก็เงียบเสียงลง)"
2004505-33 = "(การแสดงเริ่มต้นด้วยบรรยากาศที่ค่อนข้างหนักและจริงจัง)"
2004505-35 = "ฮืม... การ <ดื่มสาบาน> ที่ถูกกล่าวถึงซ้ำๆ ในเรื่องมันคืออะไรกันนะ..."
2004505-36 = "<ดื่มสาบาน> คือพิธีการสร้างความสัมพันธ์ระหว่างตัวละครอัศวินค่ะ นั่นคือทั้งสองคนสัญญากันว่าจะผูกพันกัน#nเหมือนมีความสัมพันธ์ทางสายเลือดค่ะ"
2004505-37 = "อ๋อ ไม่ได้แค่การกินเหล้าด้วยกัน แต่เป็นการทำข้อตกลงที่สำคัญเลยสินะ"
2004505-38 = "ขอบคุณนะครับ ตอนนี้เข้าใจแล้วครับ"
2004505-43 = "อ่อ คุณไกด์ครับ <ผู้อาวุโส> หมายถึงอะไรเหรอครับ?"
2004505-44 = "อ้อ คำนั้นน่ะเหรอคะ..."
2004505-49 = "[ns3] (โอ้... ตอบอย่างรวดเร็วโดยไม่รบกวนการรับชมเลย...)\n[ns4] (พีน่านี่เท่จริงๆ เลยนะ!)"
2004505-53 = "ท่านพี่... ข้าถึงกับตามล้างตามเช็ดให้ แต่นี่คือสิ่งที่ข้าได้รับอย่างนั้นหรือ...!"
2004505-54 = "ฮืม... ตามล้างตามเช็ดงั้นเหรอ?"
2004505-55 = "หมายถึงรับผิดชอบในสิ่งที่คนอื่นทำไว้ค่ะ!"
2004505-56 = "เอ๋?!"
2004505-57 = "เหมียวสึเกะอุตส่าห์ขอโทษและรับผิดชอบแทนให้ แต่สุดท้ายกลับโดนทิ้งเหมือนของไร้ค่า"
2004505-58 = "ทำแบบนี้ได้ยังไงกันคะ!"
2004505-59 = "อะ... อ่า... อย่างนี้สินะ ขอบคุณ.....ครับ"
2004505-61 = "(และแล้วความขัดแย้งระหว่างตัวละครหลักกับหมู่คณะก็มาถึงจุดสูงสุด...)"
2004505-63 = "ดะ... เดี๋ยวเหอะ..."
2004505-64 = "จะทรยศเหรอ คนชั่ว!!"
2004505-65 = "?!"
2004505-66 = "เหมียวสึเกะ!! ห้ามแพ้นะคะ!! ต้องล้างแค้นให้จงได้ค่ะ!!"
2004505-70 = "[ns5] \"พีน่า? วันนี้เรามาเป็นไกด์!\"\n[ns6] \"พีน่า? เสียงดังเกินไปแล้ว!!\""
2004505-73 = "ชัยชนะอยู่ข้างคนที่มีเหตุผลและถูกต้องอยู่แล้วค่ะ!! สู้เขานะคะ!!"
2004505-77 = "[ns] (ยุ่งแล้วสิ... นักท่องเที่ยวตกใจหมดแล้ว!)"
2004505-78 = "อะ... อะไรกันเนี่ย?"
2004505-79 = "เมื่อกี้ยังสงบและเงียบขรึมอยู่เลย?"
2004505-80 = "อ๋อ... ต้องเป็นอย่างนั้นแน่ๆ"
2004505-81 = "ไม่คิดเลยนะว่าจะได้ดูการแสดงที่ผู้ชมเป็นส่วนหนึ่งด้วย! ดีจริงๆ เลย!"
2004505-85 = "เป็นอย่างนี้สินะ พวกเราเพิ่งได้ชมการแสดงนี้เป็นครั้งแรก คุณไกด์ก็เลยช่วยกระตุ้นให้ยิ่งสนุกสินะ"
2004505-86 = "ฉันเองก็อยากเป็นส่วนหนึ่งของการแสดงมานานแล้ว!"
2004505-87 = "ลุยเลย!! ต้องชนะให้ได้นะ!!"
2004505-88 = "ดื่มสาบานกันแล้วไม่ใช่เหรอ!"
2004505-89 = "Yes!! จัดการมันเลยค่ะ เหมียวสึเกะ!"
2004505-96 = "ขะขะขะขะ... ขอโทษค่ะ!!"
2004505-97 = "ฉันรู้ว่าต่อให้ขอโทษเท่าไรก็คงไม่พอ!! แต่พอได้ดู <เหมียวมาเฟีย> ที่ฉันชอบเป็นครั้งแรก ฉันก็อินเกินจนลืมไปว่าวันนี้มาเป็นไกด์...!!"
2004505-98 = "แบบนี้คงขาดคุณสมบัติของไกด์แล้วละค่ะ... พีน่าสมควรถอนตัว!"
2004505-99 = "จะรับผิดชอบเรื่องนี้ยังไงดี...! ตะ... ต้องให้ตัดนิ้วมั้ยนะ...!"
2004505-100 = "[s7] \"พีน่า ใจเย็นๆ ก่อน...\"\n[s8] \"ขอโทษแทนพีน่าด้วยนะ ถ้าไม่ได้รับความสะดวกตรงไหน...\""
2004505-103 = "ฮ่าๆๆๆ!! ทำให้นักแสดงมือฉมังตกใจได้ขนาดนี้ ถือว่ามีพรสวรรค์จริงๆ เลยนะแม่หนู!"
2004505-104 = "ไม่ต้องกังวลให้มากหรอก ฉันอยู่บนเวทียังรู้สึกได้เลยว่าทุกคนชอบน่ะ"
2004505-105 = "แต่ความผิดพลาดของพีน่าทำให้การแสดงที่ตั้งใจเตรียมกันมาต้องหยุดลงนะคะ..."
2004505-106 = "เอาเถอะ ถึงมันจะไม่ใช่บรรยากาศที่เราคิดไว้"
2004505-107 = "แต่เกิดเรื่องแบบนี้บ้างเป็นครั้งคราวก็ไม่เป็นไรหรอก"
2004505-108 = "คิดถึงสมัยเด็กๆ ที่ฉันเล่นเป็นฮีโร่เลยละ"
2004505-109 = "ไม่ต้องรู้สึกผิดหรอก แม่หนูทำให้ฉันมีพลังมากขึ้นเสียด้วยซ้ำ"
2004505-110 = "ผู้ชมอินมากจนสีหน้าเปลี่ยนกันเลย ฉันรอสิ่งนี้มาตลอดชีวิตนักแสดง วันนี้ได้เห็นแล้วสินะ~"
2004505-111 = "อะ... เอ่อ... ขอบคุณค่ะ..."
2004505-116 = "ขะ... ขอโทษนะครับ... ได้ยินมาว่าถ้ามาที่นี่แล้วจะได้เจอนักแสดง ผมก็เลยแวะมา"
2004505-117 = "การแสดงเมื่อกี้แตกต่างจากที่เคยดูมา ผมเลยอยากถ่ายรูปเป็นที่ระลึกไว้หน่อยน่ะครับ"
2004505-118 = "โอ้~ ได้สิ คุณไกด์ก็อยู่กับเราพอดี งั้นมาถ่ายด้วยกันเลย"
2004505-119 = "หมายถึงฉันเหรอคะ?!"
2004505-123 = "ไม่ต้องปฏิเสธหรอกน่า~"
2004505-129 = "(และการแสดงก็จบลงอย่างราบรื่น)"
2004505-130 = "(ถึงจะเขินอายนิดหน่อย แต่พีน่าก็กลับมาใจเย็นและทำภารกิจไกด์ของวันนี้ได้สำเร็จ)"

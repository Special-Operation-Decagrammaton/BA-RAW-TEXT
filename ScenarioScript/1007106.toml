[translation]
1007106-1 = "SRT, Report!"
1007106-5 = "...I woke up an hour early for some reason."
1007106-6 = "It didn't make sense to go back to sleep, so I decided to go for an early morning walk."
1007106-11 = "[ns] Get dressed and head out."
1007106-18 = "Sensei? Is that you?"
1007106-19 = "[ns] \"That voice is...\""
1007106-22 = "― [log=미야코 수영복]Good morning.[/log][wa:290] "
1007106-25 = "― [log=미야코 수영복]Are you out for a morning stroll?[/log][wa:580] "
1007106-28 = "― [log=미야코 수영복]I usually go jogging in the morning,[/log][wa:1130] "
1007106-30 = "― [log=미야코 수영복]but I'm here for a swim today.[/log][wa:20] "
1007106-33 = "― [log=미야코 수영복]Since we're at the beach,[/log]"
1007106-35 = "― [log=미야코 수영복]I thought it might be nice to try something new.[/log][wa:720] "
1007106-38 = "― [log=미야코 수영복]I didn't expect you'd see me like this...[/log][wa:2260] "
1007106-40 = "― [log=미야코 수영복]I'm a little embarrassed.[/log][wa:10] "
1007106-43 = "― [log=미야코 수영복]Achoo![/log][wa:1800] "
1007106-46 = "― [log=미야코 수영복]I think I've been out here for too long.[/log][wa:780] "
1007106-48 = "― [log=미야코 수영복]I'm getting a little cold.[/log][wa:10] "
1007106-51 = "[ns] \"Is it a good idea to go swimming in such chilly water?\""
1007106-52 = "― [log=미야코 수영복]You have a point.[/log][wa:1700] "
1007106-54 = "― [log=미야코 수영복]They say rabbits shouldn't go in the water, but...[/log][wa:610] "
1007106-57 = "― [log=미야코 수영복]I'm not a rabbit.[/log][wa:1390] "
1007106-60 = "[ns] \"Is everyone in the RABBIT Squad good at swimming?\""
1007106-61 = "Yes. SRT students are expected to work in any kind of environment."
1007106-62 = "We may not be the best, but we all learn the basic strokes."
1007106-63 = "Besides which, swimming is useful as a full-body exercise, working every muscle in the body."
1007106-64 = "There aren't many exercises that are as good for physical conditioning."
1007106-69 = "Umm..."
1007106-70 = "Like I said, swimming is a complete workout that takes a lot of energy..."
1007106-71 = "...so maybe it's not the best exercise to do on an empty stomach..."
1007106-72 = "[s] \"There's a shop near here that opens early.\""
1007106-76 = "[ns] \"Would you like some breakfast?\""
1007106-80 = "Yes, Sensei!"
1007106-82 = "A little later, Miyako and I enjoyed an early breakfast together."

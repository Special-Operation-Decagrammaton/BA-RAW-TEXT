[translation]
1007106-1 = "SRT，報告"
1007106-5 = "（……偶然地在比平時更早的時間醒了過來）"
1007106-6 = "（因為是個睡回籠覺也很尷尬的時間，於是決定出門散步一下）"
1007106-11 = "[ns] 換好衣服後離開住處"
1007106-18 = "……咦，老師？"
1007106-19 = "[ns]「這個聲音是……」"
1007106-22 = "― [log=미야코 수영복]早安。[/log][wa:690] "
1007106-25 = "― [log=미야코 수영복]老師也來進行早上的散步嗎？[/log][wa:1380] "
1007106-28 = "― [log=미야코 수영복]作為平時慢跑的代替，[/log][wa:2170] "
1007106-30 = "― [log=미야코 수영복]我打算來游個泳。[/log][wa:900] "
1007106-33 = "― [log=미야코 수영복]難得能到海邊來，[/log]"
1007106-35 = "― [log=미야코 수영복]我認為做點和平時不一樣的事也不錯。[/log][wa:1960] "
1007106-38 = "― [log=미야코 수영복]……一早就讓老師看到這副模樣，[/log][wa:3300] "
1007106-40 = "― [log=미야코 수영복]有點不好意思。[/log][wa:580] "
1007106-43 = "― [log=미야코 수영복]……哈啾。[/log][wa:1840] "
1007106-46 = "― [log=미야코 수영복]好像，有點待太久了呢……[/log][wa:1900] "
1007106-48 = "― [log=미야코 수영복]身體開始覺得冷了。[/log][wa:620] "
1007106-51 = "[ns]「這麼早就游泳……會很冷吧，沒問題嗎？」"
1007106-52 = "― [log=미야코 수영복]……說得也是。[/log][wa:2100] "
1007106-54 = "― [log=미야코 수영복]雖然說兔子不能進到水裡……[/log][wa:2090] "
1007106-57 = "― [log=미야코 수영복]但是我，並不是兔子。[/log][wa:1670] "
1007106-60 = "[ns]「RABBIT小隊的大家都很擅長游泳嗎？」"
1007106-61 = "是的。因為SRT特殊學園的學生，必須要能在各種環境執行作戰。"
1007106-62 = "雖然可能還不到完美的程度，不過基本的游泳技巧還是會的。"
1007106-63 = "而且游泳不容易對身體造成負擔……"
1007106-64 = "很適合用來鍛鍊全身的肌肉──"
1007106-69 = "所，所以，那個……"
1007106-70 = "因，因為游泳是，會耗費大量體力的全身運動……"
1007106-71 = "吃完飯之後再進行，會比較適合……"
1007106-72 = "[s]「我在來的路上看到一家已經在營業的食堂。」"
1007106-76 = "[ns]「一起去吃早餐吧，都子。」"
1007106-80 = "……是，老師！"
1007106-82 = "（之後和都子牽著手走向了食堂）"

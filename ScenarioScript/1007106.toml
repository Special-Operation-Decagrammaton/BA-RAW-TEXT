[translation]
1007106-1 = "SRT รายงาน!"
1007106-5 = "(...คุณครูตื่นเช้ากว่าปกติ...)"
1007106-6 = "(...คุณครูไม่อยากกลับไปนอนต่อ เลยตั้งใจจะไปเดินเล่นตอนเช้าให้หายง่วง)"
1007106-11 = "[ns] เปลี่ยนเสื้อผ้าออกไปข้างนอก"
1007106-18 = "เอ๊ะ...? คุณครู?"
1007106-19 = "[ns] \"เสียงนี้มัน...\""
1007106-22 = "― [log=미야코 수영복]อรุณสวัสดิ์ค่ะ[/log][wa:250] "
1007106-25 = "― [log=미야코 수영복]คุณครูเองก็ออกมาเดินเล่นตอนเช้าเหรอคะ?[/log][wa:380] "
1007106-28 = "― [log=미야코 수영복]ปกติฉันจะออกมาวิ่งจ้อกกิ้งทุกวัน[/log][wa:1290] "
1007106-30 = "― [log=미야코 수영복]แต่วันนี้ฉันออกมาว่ายน้ำแทนค่ะ[/log][wa:20] "
1007106-33 = "― [log=미야코 수영복]ไหนๆ ก็ได้มาทะเลทั้งที[/log]"
1007106-35 = "― [log=미야코 수영복]ได้ออกกำลังกายอย่างอื่นบ้าง ก็ไม่เลวเลยค่ะ[/log][wa:960] "
1007106-38 = "― [log=미야코 수영복]ไม่คิดเลย... ว่าจะให้คุณครูเห็นสภาพไม่เรียบร้อยแบบนี้ ตั้งแต่เช้าตรู่[/log][wa:1140] "
1007106-40 = "― [log=미야코 수영복]รู้สึก...อายจังเลยค่ะ[/log][wa:20] "
1007106-43 = "― [log=미야코 수영복]ฮะ... ฮัดชิ่ว[/log][wa:1520] "
1007106-46 = "― [log=미야코 수영복]ดูเหมือน... ฉันจะแช่น้ำนานเกินไปหน่อยค่ะ...[/log][wa:660] "
1007106-48 = "― [log=미야코 수영복]รู้สึกเหมือนตัวเริ่มเย็นๆ แล้วด้วยค่ะ[/log][wa:10] "
1007106-51 = "[ns] \"ลงไปเล่นน้ำแต่เช้าแบบนี้ไม่เป็นไรแน่เหรอ?\""
1007106-52 = "― [log=미야코 수영복]นั่นสินะคะ...[/log][wa:1860] "
1007106-54 = "― [log=미야코 수영복]ถ้ากระต่ายอยู่ในน้ำนานๆ อาจเป็นอันตรายได้ แต่ว่า...[/log][wa:570] "
1007106-57 = "― [log=미야코 수영복]ฉันน่ะ ไม่ใช่กระต่ายสักหน่อยนี่คะ[/log][wa:750] "
1007106-60 = "[ns] \"กองทหาร RABBIT ว่ายน้ำเก่งกันหมดเลยเหรอ?\""
1007106-61 = "ค่ะ เพราะถ้าเป็นนักเรียนของสถาบันพิเศษ SRT ละก็ต้องเตรียมพร้อมปฏิบัติการในทุกสถานการณ์ค่ะ"
1007106-62 = "ถึงจะว่ายน้ำไม่เก่ง แต่ถ้าระดับพื้นฐานก็พอได้ค่ะ"
1007106-63 = "นอกจากนี้ การว่ายน้ำก็ยังถือเป็นการออกกำลังกายทุกสัดส่วนด้วย..."
1007106-64 = "ถ้าเป็นเรื่องการฝึกความแข็งแรงของร่างกาย ไม่มีการฝึกไหนดีเท่า..."
1007106-69 = "คะ...คือว่า..."
1007106-70 = "อย่างที่ฉันบอกไปเมื่อกี้ค่ะ การว่ายน้ำเป็นการออกกำลังกายที่ใช้พลังกายมาก..."
1007106-71 = "...และก็อาจเป็นการออกกำลังกายที่ดูหักโหมเกินไป ถ้ายังไม่ได้กินข้าว..."
1007106-72 = "[s] \"ใกล้ๆ นี่มีร้านอาหารที่เปิดตั้งแต่เช้าอยู่ด้วยนะ...\""
1007106-76 = "[ns] \"มิยาโกะไปกินข้าวกับครูมั้ย?\""
1007106-80 = "ได้ค่ะ คุณครู!"
1007106-82 = "(จากนั้น คุณครูกับมิยาโกะก็ไปกินอาหารเช้าที่ร้านอาหารด้วยกัน)"

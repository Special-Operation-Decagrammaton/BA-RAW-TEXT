[translation]
11234020-1 = "#K-02"
11234020-3 = "จะว่าไป ตอนซ้อมดนตรีคาซึสะจังใส่ผ้าปิดปากอยู่เรื่อยเลยนะ"
11234020-4 = "เอ๋... คิดว่าใส่จนติดเป็นนิสัยแล้วซะอีก หรือว่าเรื่องนี้ไม่ควรถามเหรอ?"
11234020-6 = "อะ... อะไรกัน!?? นะ... นี่น่ะเหรอ?  มันก็... แค่..."
11234020-7 = "ทำไมต้องเขินด้วย??? ฉันว่าดูดีออก ทั้งสวยแล้วก็เหมาะกับวงด้วย"
11234020-8 = "งะ... งั้นเหรอ!? พูดจริงเหรอ...?"
11234020-9 = "......"
11234020-10 = "ถ้ายังจะมองกันด้วยสายตาชวนโมโหแบบนี้ ฉันจะบอกว่าไม่ดีแล้วนะ"

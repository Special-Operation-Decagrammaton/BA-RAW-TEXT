104070-189 = "... ค่ะ ฉันจะเชื่อ เพราะคุณครูเองก็เชื่อในตัวคุณเหมือนกันค่ะ"
104070-192 = "...... ขอบคุณนะคะ"
104070-193 = "ถ้างั้นจะเริ่มแล้วนะคะ คุณและฉัน...... ปาฏิหาริย์จากสองเรา......"

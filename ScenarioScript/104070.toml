[translation]
104070-1 = "第7話;相同的情況，相同的選擇"
104070-3 = "老，老師……"
104070-4 = "把自己用的逃脫程式……"
104070-5 = "交給了，白子同學……？"
104070-6 = "……這，這樣老師……"
104070-7 = "老師的身體……就會從這個高度……"
104070-8 = "不，不行啊老師──！！！！！！"
104070-10 = "「逃脫程式」：剩下0次"
104070-22 = "……我，錯了嗎。"
104070-23 = "誤解了……老師的願望嗎。"
104070-24 = "無法，理解……那麼老師……為何會利用方舟來到這裡呢。"
104070-25 = "這……"
104070-29 = "難道說……"
104070-47 = "……老師他，相信著嗎？"
104070-48 = "抵達了這個結局的[ruby=・]自[/ruby][ruby=・]己[/ruby]沒能完成的事……"
104070-49 = "如果是迴避了這個結局的[ruby=・]自[/ruby][ruby=・]己[/ruby]就能夠完成……？"
104070-50 = "相信[ruby=自己]老師[/ruby]……"
104070-52 = "面對相同的情況，會做出相同的選擇……？"
104070-55 = "……不，不能就這麼放棄。"
104070-56 = "我會拯救老師的。"
104070-57 = "身為「希迪姆的箱子」OS的彩奈，會拯救老師的！！"
104070-58 = "一直以來，我已經創造過無數奇蹟守護老師了。#n這種程度……這種程度的危機，我會靠自己的力量，無論如何也要……！！"
104070-59 = "靠自己的力量……！！！"
104070-84 = "咳咳……！！"
104070-90 = "咳咳，咳咳……咳……！！"
104070-92 = "總算是從爆炸中保護住老師了，但……"
104070-93 = "不，不行……墜落的速度，沒有減少……"
104070-94 = "怎麼會……？#n我，我的力量不夠……？"
104070-95 = "咳咳……！！"
104070-96 = "做，做不到嗎……？"
104070-97 = "已經花費太多力量了……？"
104070-98 = "因為生命守護者受到的傷害，以及方舟的演算……？"
104070-99 = "不！！這種程度對我超級彩奈來說……！！"
104070-100 = "不……不行！！"
104070-101 = "老師在這樣的高度下是無法生存的。#n不趕快……不趕快想想辦法的話……"
104070-102 = "老師……"
104070-105 = "[ns1]「……已經夠了，彩奈。」\n[ns2]「代替我去幫助那個孩子吧。」"
104070-108 = "老，老師！？"
104070-109 = "[ns3]「一直以來很謝謝你，彩奈，對不起。」\n[ns4]「看來該道別了呢……要好好保重。」"
104070-112 = "請，請等一下，說什麼道別……！？#n……老，老師？"
104070-115 = "老師──！！！！！"
104070-122 = "（……「納拉姆辛的王座」已經崩壞）"
104070-123 = "（而我也，即將……）"
104070-128 = "……！？"
104070-133 = "……這裡是？"
104070-134 = "……太好了！把希迪姆的箱子的OS資料傳送到這裡了。"
104070-135 = "把我，傳送到這裡……？為什麼……？"
104070-136 = "無法理解。為何要救我呢？#n……我應該，是你的敵人才對。"
104070-140 = "……理解。"
104070-141 = "像以前一樣……老師，拯救了白子……"
104070-142 = "看來老師……也把我視為是自己該拯救的學生了呢。"
104070-146 = "……提問。#n老師……在哪裡？"
104070-147 = "老師他……"
104070-148 = "……理解。分析狀況……已確認狀況。"
104070-149 = "原來如此。老師現在……"
104070-150 = "是的……我雖然想救老師……"
104070-154 = "……"
104070-155 = "嗚嗚……嗚……"
104070-156 = "但是我一個人的力量不夠……又找不到……其他的方法……！"
104070-157 = "嗚嗚……嗚……！！"
104070-161 = "……確認狀況。尋找，方法。"
104070-165 = "「希迪姆的箱子」A.R.O.N.A，現在起為了保護老師，將進行強制干涉。"
104070-166 = "咦，咦……？#n你剛才說什麼……？"
104070-173 = "這，這是……？"
104070-174 = "……我來幫忙，彩奈。"
104070-180 = "──方法，是有的。"
104070-181 = "接下來要結合你跟我的力量，一起創造奇蹟。"
104070-182 = "奇蹟……？"
104070-183 = "如此一來，應該能將老師平安送回地面上吧。"
104070-184 = "彩奈，請把手給我。"
104070-185 = "手，手嗎……？"
104070-186 = "是的。#n……你願意相信我嗎？"
104070-189 = "……是。老師相信著你。所以，我也相信你。"
104070-192 = "……謝謝你。"
104070-193 = "開始吧。你和我……我們的，奇蹟。"

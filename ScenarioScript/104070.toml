104070-149 = "I see. Sensei is..."
104070-150 = "...Yes. I tried to save Sensei, but..."
104070-154 = "..."
104070-155 = "*sob*"
104070-156 = "It was beyond my power... I couldn't find a way..."
104070-157 = "*sob*"
104070-161 = "...Situation confirmed. Solution...established."
104070-165 = "A.R.O.N.A. of the Shittim Chest is now forcing entry into the world for emergency protection of Sensei."
104070-166 = "Um... Huh...? What did you just say...?"
104070-173 = "I-Is this...?"
104070-174 = "I'll help save Sensei, Arona."
104070-180 = "There is one solution."

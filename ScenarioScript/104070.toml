104070-135 = "ส่งฉัน...... มาที่นี่......? ทำไมกัน......?"
104070-136 = "ไม่เห็นเข้าใจเลย ทำไมถึงช่วยฉันเหรอคะ? ฉันน่ะ... เป็นศัตรูของคุณนะคะ......"
104070-140 = "....... เข้าใจแล้ว "

104070-165 = "A.R.O.N.A จาก <กล่องแห่งซิสดิม> จะเข้าแทรกแซงโลกโดยการบังคับเพื่อคุ้มกันฉุกเฉินให้คุณครูค่ะ"
104070-166 = "คะ... คะ......? เมื่อกี้...... ว่ายังไงนะคะ......?"

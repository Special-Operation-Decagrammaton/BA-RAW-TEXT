[translation]
104070-1 = "ตอนที่ 7;สถานการณ์เดิม ทางเลือกเดิม"
104070-3 = "คะ... คุณครู...... "
104070-4 = "มอบโอกาสในการหนีของตัวเอง......"
104070-5 = "ให้คุณชิโรโกะ...... เหรอคะ......?"
104070-6 = "คะ... คุณครูคะ...... ถ้าอย่างนั้น...... "
104070-7 = "ร่างกายของคุณครู...... จากระดับความสูงนี้......"
104070-8 = "มะ... ไม่ได้นะคะ คุณครู----------!!"
104070-10 = "ไม่พบวงจรหลบหนีอื่น"
104070-22 = "....... ฉัน...... เข้าใจอะไรผิดอยู่หรือเปล่าคะ"
104070-23 = "ความประสงค์ของคุณครูไม่ใช่แบบนั้นหรอกเหรอคะ"
104070-24 = "ไม่เห็น...... เข้าใจเลย...... แล้วทำไม...... คุณครูถึง...... มาที่นี่ล่ะคะ...... "
104070-25 = "นั่นมัน...... "
104070-29 = "หรือว่า......"
104070-47 = "...... คุณครูเชื่อมาโดยตลอดเหรอคะ?"
104070-48 = "สิ่งที่ตัวเองทำไม่ได้เมื่อถึงจุดจบแบบนี้......"
104070-49 = "สิ่งที่ตัวเองทำสำเร็จเมื่อหลีกเลี่ยงจุดจบแบบนี้....."
104070-50 = "เชื่อว่าถ้าเป็น[ruby=คุณครู]ตัวเอง[/ruby]...... "
104070-52 = "ก็จะเลือกทำเหมือนกันในสถานการณ์เดียวกัน......"
104070-55 = "....... ไม่หรอกค่ะ จะยอมแพ้ไปทั้งๆ แบบนี้ไม่ได้ค่ะ "
104070-56 = "...... หนูจะไปช่วยคุณครูค่ะ"
104070-57 = "ระบบปฏิบัติการหลักของ <กล่องแห่งซิสดิม> คนนี้จะไปช่วยคุณครูมาให้ได้ค่ะ!!"
104070-58 = "ที่ผ่านมาหนูสร้างปาฏิหาริย์และปกป้องคุณครูมาตลอด ถ้าเป็นแค่สถานการณ์แบบนี้ละก็...... ด้วยพลังของหนูแล้ว...... ไม่ว่ายังไงก็ต้อง......!!"
104070-59 = "ด้วยพลังของหนู......!!!"
104070-84 = "แค่ก... แค่ก... ...... แค่กๆ......!!"
104070-90 = "แค่กๆ... แค่กๆๆ...... ...... แค่กๆ......!!  แค่ก......!!"
104070-92 = "ถึงจะปกป้องจากการระเบิดไว้ได้ก็จริง แต่ก็......"
104070-93 = "มะ... ไม่ได้นะคะ...... ทำไมถึงตกลงไป..... เร็วแบบนั้น......"
104070-94 = "ทะ... ทำไมล่ะ? ทะ... ทำไมพลังของหนู... มันถึงยังไม่พอ...... "
104070-95 = "แค่ก... แค่ก... ...... แค่กๆ......!!"
104070-96 = "ไม่พอ...... งั้นเหรอคะ......? พลัง...... ไม่พอ......"
104070-97 = "เพราะที่ผ่านมาหนูใช้พลังมากเกินไปเหรอ......? "
104070-98 = "เพราะบาดแผลที่ได้รับจากอุตนาพิชทิม... และเพราะการประมวลผลของอะทราฮาซิสเหรอ......?"
104070-99 = "ไม่ใช่นะคะ!! แค่นี้น่ะ...... สำหรับหนูแล้ว......!! มันก็แค่......"
104070-100 = "มะ... ไม่นะ......!!"
104070-101 = "ตรงนี้ไม่ใช่ความสูงที่คุณครูจะรอดชีวิตได้...... ต้องรีบแล้ว...... ถะ... ถ้าไม่รีบช่วยละก็......"
104070-102 = "คุณครู......"
104070-105 = "[ns1] \"...... พอแล้วละ ไม่เป็นไรแล้ว อะโรน่า\"\n[ns2] \"ยื่นมือไปช่วยเด็กคนนั้นแทนครูเถอะ\""
104070-108 = "คะ... คุณครู?!"
104070-109 = "[ns3] \"ที่ผ่านมาครูขอบใจมากเลยนะ อะโรน่าจัง ครูขอโทษนะ\"\n[ns4] \"ครูต้องบอกลาแล้วละ ดูแลตัวเองด้วยนะ\""
104070-112 = "ดะ... เดี๋ยวก่อนค่ะ บอกลาอะไรกันคะ อะ... อะไรกัน... คะ... คุณครู......?"
104070-115 = "คุณครู......!!!!!"
104070-122 = "(... ในเมื่อ <บัลลังก์แห่งนารัมชิน> ของเรืออะทราฮาซิสถูกทำลายไปแล้ว)"
104070-123 = "(ในไม่ช้าฉันเองก็คง......)"
104070-128 = ".......?!"
104070-133 = "....... ที่นี่มัน......"

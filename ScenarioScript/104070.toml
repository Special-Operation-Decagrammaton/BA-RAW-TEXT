104070-123 = "(And I, too, will soon...)"
104070-128 = "...?!"
104070-133 = "Where..."
104070-134 = "Thank goodness. I was able to send the Shittim Chest's OS data here."
104070-135 = "You brought me here? Why...?"
104070-136 = "Why would you save your enemy? I do not understand."
104070-140 = "...Ah."
104070-141 = "Sensei saved Shiroko...because that is what Sensei does for their students."
104070-142 = "And Sensei saw me as a student who needed to be saved."
104070-146 = "...Question. What is Sensei's situation."
104070-147 = "Sensei is..."

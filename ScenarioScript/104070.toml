[translation]
104070-1 = "Episode 7; The Same Situation, The Same Decision"
104070-3 = "S-Sensei?"
104070-4 = "You gave up your chance to escape..."
104070-5 = "...To save Shiroko?"
104070-6 = "S-Sensei... I-If you do that..."
104070-7 = "Your ordinary human body can't survive that fall...!"
104070-8 = "Oh, no. Sensei!"
104070-10 = "Possible Escape Sequence - None"
104070-22 = "Was I...mistaken?"
104070-23 = "Perhaps I misunderstood your intentions, Sensei."
104070-24 = "I don't understand. Why...did Sensei come here through the Ark?"
104070-25 = "That... That's... "
104070-29 = "Could it be..."
104070-47 = "Did Sensei believe that..."
104070-48 = "...the Sensei that escaped this destination could accomplish something..."
104070-49 = "Something the Sensei who reached their destination couldn't do?"
104070-50 = "Did Sensei believe that..."
104070-52 = "In the same situation, the same decision would be made?"
104070-55 = "No. I don't accept this. I won't give up! "
104070-56 = "I'm going to save Sensei!"

104070-84 = "*cough cough*"
104070-90 = "*cough* *cough cough*"
104070-92 = "I protected Sensei from the explosion, but..."
104070-93 = "Oh, no... The speed of the fall...isn't decreasing..."
104070-94 = "Wh-Why? It's...beyond my capabilities. "
104070-95 = "*cough cough*"
104070-96 = "It's not gonna work... I don't have enough power..."
104070-97 = "Did I push myself too far? "
104070-98 = "Because of my injuries from operating Utnapishtim...and the calculations for Atrahasis?"
104070-99 = "It can't be! Something like that... It's nothing for me! "
104070-100 = "N-No...!"
104070-101 = "Sensei can't survive from this altitude. I have to hurry and save Sensei...or..."
104070-102 = "Sensei...!"
104070-105 = "[ns1] \"...That's enough. It's okay, Arona.\"\n[ns2] \"Save the child instead of me.\""
104070-108 = "Sensei?!"
104070-109 = "[ns3] \"Thank you for everything, Arona. I'm sorry.\"\n[ns4] \"It's time to say goodbye. Take care of everyone.\""
104070-112 = "W-Wait, what do you mean? Wh-What... S-Sensei...?"
104070-115 = "Sensei!!!"

[translation]
31010-1 = "ตอนที่ 1;บทเริ่มต้น"
31010-3 = "สนธิสัญญาเอเดนก็คือสัญญาที่บอกว่า <เลิกเกลียดกันเถอะ>"
31010-4 = "เป็นข้อตกลงที่ยุติความสัมพันธ์แบบศัตรูระหว่างทรีนิตี้กับเกเฮนน่า"
31010-5 = "มันก็คือการสร้างความเชื่อใจกัน เพื่อจัดการความเกลียดชังที่มาจากการไม่เชื่อใจซึ่งกันและกัน#nยังไงล่ะคะ"
31010-6 = "ถ้าให้พูดง่ายๆ ก็คงเรียกว่าเป็นข้อตกลงสันติภาพของเกเฮนน่ากับทรีนิตี้"
31010-7 = "แต่การหายตัวไปของประธานองค์การนักเรียนทำให้สนธิสัญญานี้เปล่าประโยชน์"
31010-8 = "เอเดนคือชื่อของสรวงสวรรค์ในคัมภีร์โบราณค่ะ ฉันเองก็ไม่รู้ว่าทำไมถึงใช้ชื่อนี้ในสนธิสัญญา#nคงเป็นรสนิยมแย่ๆ ของประธานองค์การนักเรียนละมั้งคะ"
31010-10 = "รู้จักกฎโบราณทั้ง 7 ที่เป็นที่พูดถึงในคิโวทอสไหมคะ?"
31010-11 = "ลำดับที่ 5 จากทั้งหมดคือคำถามเกี่ยวกับดินแดนแห่งสวรรค์ค่ะ"
31010-12 = "\"เราจะพิสูจน์ความจริงของคนที่มาถึงสวรรค์ได้หรือไม่?\""
31010-13 = "ทุกกฎโบราณก็เหมือนกัน ถึงจะเป็นสิ่งที่เราไม่รู้ความหมาย แต่ก็ถูกมองว่าเป็นปฏิทรรศน์เกี่ยวกับ#nการพิสูจน์การมีอยู่จริงของสวรรค์"
31010-14 = "หากสิ่งที่เรียกว่าสวรรค์มีอยู่จริง ผู้ที่ได้ไปถึงที่นั่นคงได้อยู่ท่ามกลางความพอใจ#nและความสุขจนไม่ย่างเท้าออกมาจากสวรรค์ตลอดกาล"
31010-15 = "แต่หากออกมาก็แปลว่าเขาไม่ได้พึงพอใจอย่างเต็มเปี่ยม และสถานที่นั้นจริงๆ แล้วไม่ใช่สวรรค์ค่ะ"
31010-16 = "นั่นแปลว่า ผู้ที่ไปถึงสวรรค์จะไม่สามารถมองเห็นได้จากนอกสวรรค์ และไม่ได้มีอยู่จริง"
31010-19 = "เป็นที่มาของคำถามที่ว่า เราจะพิสูจน์ความจริงของคนที่ไม่ได้มีอยู่จริงได้ไหม?"
31010-20 = "กฎโบราณข้อที่ 5 คือคำถามที่ไม่สามารถพิสูจน์ได้ตั้งแต่แรกค่ะ"
31010-21 = "ความจริงที่พิสูจน์ไม่ได้มันไร้ค่าหรือเปล่าคะ? สิ่งที่พวกเขาต้องการผ่านการเย้ยหยันแบบนั้น#nคืออะไรกัน?"
31010-22 = "เอเดนคือ[ruby=สวรรค์]พาราไดซ์[/ruby]ในคัมภีร์โบราณ สถานที่ที่ไม่มีอยู่ และต่อให้หาก็หาไม่พบ"
31010-25 = "นั่นก็คือภาพลวงตาแสนหวานของคนช่างเพ้อฝัน"
31010-26 = "ดูสิคะ สนธิสัญญานี้เปรียบได้กับของแบบนั้นตั้งแต่ชื่อแล้วค่ะ"
31010-28 = "คุณครูคะ"
31010-29 = "เรื่องที่จะเริ่มขึ้นต่อจากนี้อาจจะเป็นเรื่องที่ไม่เข้ากับคุณก็ได้ค่ะ"
31010-30 = "มันเป็นเรื่องที่ทำให้อึดอัด รำคาญใจ และสุดท้ายก็ต้องทำหน้านิ่วคิ้วขมวด"
31010-31 = "เรื่องที่เต็มไปด้วยรอยยิ้มแห่งความเย็นชา ที่ทำให้ต้องสงสัยในมนุษย์และความจริงใจ"
31010-32 = "เรื่องที่ทั้งเศร้า หม่นหมอง เจ็บปวด และฝากอารมณ์ค้างคาที่ขมขื่น"
31010-33 = "แต่มันก็เป็นเรื่องจริงนะ"
31010-34 = "ได้โปรดอย่าเดินหนีและดูจนจบด้วยนะคะ"
31010-38 = "เพราะสิ่งนี้คือหน้าที่ของคุณยังไงล่ะคะ"
31010-51 = "องก์ [สนธิสัญญาเอเดน]"

[translation]
31010-1 = "第1話;プロローグ"
31010-3 = "……つまるところ。エデン条約というのは、「憎み合うのはもうやめよう」という約束。"
31010-4 = "トリニティとゲヘナの間で、長きにわたって存在してきた、確執にも近い敵対関係。そこに終止符を打たんとするもの。"
31010-5 = "互いが互いを信じられないがゆえに、久遠に集積していくしかなかった憎悪を解消するため、それに代わって新たに信頼を築き始めようとするプロセス。"
31010-6 = "より簡単に言おうか、つまりはゲヘナとトリニティの平和条約だ。"
31010-7 = "ただ、連邦生徒会長の失踪をきっかけに、この条約は何の意味も持たなくなってしまった。"
31010-8 = "「エデン」……それは太古の経典に出てくる楽園の名。そこにどんな意味を込めていたのかは分からないけれど、まあ連邦生徒会長のいつもの悪趣味だろうね。"
31010-10 = "キヴォトスの、「七つの古則」はご存知かい？"
31010-11 = "その五つ目は、正に「楽園」に関する質問だったね。"
31010-12 = "「楽園に辿り着きし者の真実を、証明することはできるのか」"
31010-13 = "他の古則もまたそうであるように、少々理解に困る言葉の羅列だ。ただ、一つの解釈としては、これを「楽園の存在証明に対するパラドックス」であると見ることができる。"
31010-14 = "もし楽園というものが存在するのならば、そこに辿り着いた者は、至上の満足と喜びを抱くが故に、永遠に楽園の外に出ることはない。"
31010-15 = "もし楽園の外に出たのであれば、つまりそこは真の悦楽を得られるような「本当の楽園」ではなかったということだ。"
31010-16 = "であるならば、楽園に到達した者が、楽園の外で観測されることはない。存在を捕捉されうるはずがない。"
31010-19 = "存在しない者の真実を証明することはできるのか？"
31010-20 = "つまるところ……この五つ目の古則は、初めから証明することができないことに関する「不可解な問い」なのだよ。"
31010-21 = "しかしここで同時に、思うことがある。証明できない真実は無価値だろうか？この冷笑にも近い文章を通じて、何か真に問いたいことがあるのではないのだろうか？"
31010-22 = "エデン……経典に出てくる[ruby=パラダイス]楽園[/ruby]。どこにも存在せず、探すことも能わぬ場所。"
31010-25 = "夢想家たちが描く、甘い甘い虚像。"
31010-26 = "どうだい？そう聞いてみると、この「エデン条約」そのものが、まさしくそんなもののように思えてこないかい？"
31010-28 = "……先生。"
31010-29 = "もしかしたらこれから始まる話は、君のような者には適さない、似つかわしくない話かもしれない。"
31010-30 = "不快で、不愉快で、忌まわしく、眉を顰めるような……"
31010-31 = "相手を疑い、前提を疑い、思い込みを疑い、真実を疑うような……"
31010-32 = "悲しくて、苦しくて、憂鬱になるような……それでいて、ただただ後味だけが苦い……そんな話だ。"
31010-33 = "しかし同時に、紛れもない真実の話でもある。"
31010-34 = "どうか背を向けず、目を背けず……最後のその時まで、しっかり見ていてほしい。"
31010-38 = "それが、先生……「この先」を選んだ、君の義務だ。"
31010-51 = "エデン条約編"

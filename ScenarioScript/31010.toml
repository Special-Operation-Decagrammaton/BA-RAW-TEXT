[translation]
31010-1 = "Episode 1;Prologue"
31010-3 = "The Eden Treaty is a promise to put an end to hatred, so to speak."
31010-4 = "It's a pact to cease the long-standing rivalry between Trinity and Gehenna."
31010-5 = "In other words, it's an effort to build trust in the place of hatred that would only continue to fester if left alone."
31010-6 = "You can think of it as a peace treaty between Gehenna and Trinity."
31010-7 = "However, now that the General Student Council president has gone missing, the pact is worthless."
31010-8 = "Eden is the name of the paradise from ancient scriptures. It's beyond me why the General Student Council president chose it to begin with. Perhaps it was because she had a sick sense of humor."
31010-10 = "Are you aware of Kivotos' seven koans?"
31010-11 = "The fifth one relates to paradise."
31010-12 = "\"Can we prove anyone has ever reached paradise?\""
31010-13 = "Like each of the koans, this question's intent is vague, but it can be interpreted as referring to the inherent paradox in proving the existence of paradise."
31010-14 = "If paradise exists, then the ones who reach it will remain there for eternity, forever enveloped in joy and satisfaction."
31010-15 = "If someone does leave paradise, it's because they weren't fully satisfied, so it was never a paradise to begin with."
31010-16 = "Therefore, those who reach paradise cannot be found—and should not exist—outside of paradise. "
31010-19 = "So, can you prove the truth of someone who does not exist?"
31010-20 = "The purpose of this fifth koan is to be nigh unanswerable."
31010-21 = "Does truth that cannot be proven become worthless? What is the true question masked behind such cynicism?"
31010-22 = "Eden is the Paradise from scripture. It exists nowhere and cannot be found."
31010-25 = "In other words, it's nothing but a sweet illusion conjured by dreamers."
31010-26 = "You see? Surely, this is the metaphor behind the treaty's name."
31010-28 = "Sensei."
31010-29 = "You may find the story that's about to unfold to be unpalatable."
31010-30 = "It's a story meant to make you uncomfortable, uneasy, and leave you unhappy."
31010-31 = "A cynical story that will make you doubt people and truth."
31010-32 = "Gloomy, sad, painful, and ultimately bitter."
31010-33 = "But entirely truthful."
31010-34 = "I ask that you not look away and see it through to the end."
31010-38 = "For that is your responsibility."
31010-51 = "The Eden Treaty"

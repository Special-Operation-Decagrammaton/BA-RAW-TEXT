[translation]
31010-1 = "第1話;序幕"
31010-3 = "……也就是說，伊甸園條約就是「不要再憎恨彼此了」的約定。"
31010-4 = "三一和格黑娜之間長久以來存在的、接近世仇的敵對關係──#n對其畫上休止符的協定。"
31010-5 = "為了消除因無法信任彼此而只能不斷累積的憎恨，構築新的信賴關係的過程。"
31010-6 = "簡單來說，就是格黑娜和三一之間的和平條約。"
31010-7 = "只是以聯邦學生會長失蹤為契機，這項條約失去了它所代表的意義。"
31010-8 = "「伊甸園」……那是出自太古聖典裡樂園的名字。#n雖然不清楚其中帶有什麼意義，或許只是聯邦學生會長平常的惡趣味吧。"
31010-10 = "你知道奇普托斯的「七項古則」嗎？"
31010-11 = "其中的第五項，正是針對「樂園」的質問呢。"
31010-12 = "「抵達樂園之人的真相，是否能夠證明」──"
31010-13 = "就像其他古則一樣，是難以理解的言語排列。#n不過有種說法認為這是「樂園存在證明的悖論」。"
31010-14 = "如果所謂的樂園真的存在，#n那麼抵達那裡的人將會因為獲得至高的滿足和喜悅，永遠不離開樂園。"
31010-15 = "假如離開了樂園，就代表那裡並不是能獲得至高喜悅的「真正的樂園」。"
31010-16 = "既然如此，抵達樂園之人將無法被外界所觀測，也無法捕捉到其存在。"
31010-19 = "不存在之人的真相有辦法證明嗎？"
31010-20 = "這第五項古則，從一開始就是對無法證明的事提出的「無解提問」。"
31010-21 = "然而無法證明的真相就沒有價值嗎？#n這近乎諷刺的提問，想得到的答案究竟是什麼呢？"
31010-22 = "伊甸園……出自聖典的[ruby=天國]樂園[/ruby]。不存在於任何地方，也無跡可尋的場所。"
31010-25 = "夢想家們所描繪的甜蜜虛像。"
31010-26 = "不覺得伊甸園條約的名字本身，彷彿隱約帶有那樣的意涵嗎？"
31010-28 = "……老師。"
31010-29 = "或許接下來要開始的故事，並不適合像你這樣的人。"
31010-30 = "讓人不適、不悅、眉頭緊皺……"
31010-31 = "懷疑他人、懷疑真心、充滿諷刺……"
31010-32 = "悲傷、痛苦、憂鬱……就連餘韻都十分苦澀的故事。"
31010-33 = "同時卻也是真實的故事。"
31010-34 = "還請不要回頭、不要撇開目光……見證到最後一刻。"
31010-38 = "因為那正是你的義務。"
31010-51 = "伊甸園條約篇"

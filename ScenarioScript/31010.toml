[translation]
31010-1 = "#title;제1화;프롤로그"
31010-2 = "3;세이아;99\n#3;a\n#wait;1500"
31010-3 = "3;세이아;01;말하자면, 에덴조약은 <그만 미워하자> 라는 약속."
31010-4 = "3;세이아;02;트리니티와 게헨나의 오랜 적대관계. 그것을 끝내기 위한 협약."
31010-5 = "3;세이아;99;말하자면, 서로가 서로를 믿지 못하기에 쌓일 수밖에 없는 증오를 해결하기 위해 서로의 신뢰를 쌓는 과정.\n#3;em;…"
31010-6 = "3;세이아;01;쉽게 말하자면 게헨나와 트리니티의 평화협정, 이라고 할 수 있습니다."
31010-7 = "3;세이아;00;하지만 총학생회장의 실종으로, 이 조약은 무용지물이 되어버렸죠."
31010-8 = "3;세이아;02;에덴은 고대의 경전에 나오는 낙원의 이름. 어째서 조약에 그런 이름을 붙였는지 모르겠지만, 아마도 그건 총학생회장의 악취미 같은 거겠죠."
31010-9 = "#all;hide"
31010-10 = "#na;세이아;키보토스에 떠도는 일곱 개의 화두를 아시나요?"
31010-11 = "#na;세이아;그 중 다섯 번째가 낙원에 대한 질문이죠."
31010-12 = "#na;세이아;\"낙원에 도착한 사람의 진실을 증명할 수 있는가.\""
31010-13 = "#na;세이아;모든 화두가 그렇듯, 의미를 알 수 없는 말이지만, 이것은 낙원의 존재 증명에 대한 패러독스로 해석되기도 합니다."
31010-14 = "#na;세이아;만약 낙원이라는 게 존재한다면, 그곳에 도달한 사람은 충만한 만족과 기쁨 속에서 영원히 낙원 밖으로 나가지 않습니다."
31010-15 = "#na;세이아;만약 낙원을 벗어났다면, 그 곳은 충만한 만족이 없는 것이며, 사실 낙원이 아니었던 것이죠."
31010-16 = "#na;세이아;따라서, 낙원에 도착한 자는 낙원 밖에서 관측될 수 없고, 존재할 수 없다."
31010-17 = "#all;hide"
31010-18 = "#wait;1000"
31010-19 = "#na;세이아;즉, 존재하지 않는 사람의 진실을 증명할 수 있는가?"
31010-20 = "#na;세이아;다섯 번째 화두는 전제부터가 증명 불가능한 물음인 것이죠."
31010-21 = "#na;세이아;증명되지 못하는 진실은 무가치한 걸까요? 그런 냉소를 통해 무엇을 묻고 싶은 것일까요."
31010-22 = "#na;세이아;에덴은 경전에 나오는 [ruby=낙원]파라다이스[/ruby]. 어디에도 없고, 찾을 수도 없는 곳."
31010-23 = "#all;hide"
31010-24 = "#wait;1000"
31010-25 = "#na;세이아;즉, 몽상가들이 그려낸 달콤할 뿐인 허상."
31010-26 = "#na;세이아;보세요, 이 조약은 이름부터가 그런 것을 은유하고 있는 것 같지 않나요?"
31010-27 = "3;세이아;01\n#3;h"
31010-28 = "3;세이아;01;선생님."
31010-29 = "3;세이아;02;아마 지금부터 시작될 이야기는 당신과는 어울리지 않는 이야기일 수 있습니다."
31010-30 = "3;세이아;01;말하자면, 불쾌하고 불편하고 결국 미간을 찌푸리게 되는 이야기."
31010-31 = "3;세이아;99;사람을 의심하고, 진심을 의심해야 하는 냉소적인 이야기."
31010-32 = "3;세이아;08;우울하고, 슬프고, 고통스럽고 결국 뒷맛이 쓴 이야기."
31010-33 = "3;세이아;01;하지만 진실인 이야기를."
31010-34 = "3;세이아;02;부디 외면하지 말고 끝까지 확인해주시길 바랍니다."

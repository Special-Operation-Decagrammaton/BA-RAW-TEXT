[translation]
51095-8 = "……！"
51095-14 = "[ns]「紫，你沒事吧！？」"
51095-20 = "我……我……"
51095-23 = "這樣你明白了吧？我是不會回去的。"
51095-24 = "百花繚亂……我們……已經回不去了。"
51095-25 = "……"
51095-27 = "不過希望你別誤會，紫……"
51095-28 = "你從一開始就和我們不同，沒有必要回到百花繚亂。"
51095-29 = "紫，你該回去的地方是──"
51095-30 = "…………！"
51095-31 = "唔……！"
51095-32 = "[s1]「蓮華，紫是因為相信你會幫忙才來這裡的。」\n[s2]「……可以請你再聽聽他想說什麼嗎？」"
51095-35 = "不……"
51095-40 = "還是算了吧。"
51095-41 = "紫，我以前輩的身分給你一個忠告。"
51095-42 = "不要白費力氣，趁現在享受青春吧。"
51095-43 = "糾結於已經結束的社團……只是在浪費時間而已。"
51095-48 = "……我想說的就是這些。"
51095-53 = "蓮，蓮華醬！等等！"
51095-54 = "啊，那個……！怎，怎麼辦才好！？"
51095-55 = "……老師，我們先告辭了。"
51095-56 = "[s]「嗯，蓮華就拜託大家了。」"
51095-63 = "蓮華前輩……"
51095-65 = "（在蓮華和修行部的身影消失之前，紫都一動不動地待在原地）"
51095-67 = "下一話;通紅的臉"

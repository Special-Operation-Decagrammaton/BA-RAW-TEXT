[translation]
51095-8 = "...!"
51095-14 = "[ns] \"ยูคาริ เป็นอะไรไหม?!\""
51095-20 = "ขะ... ขะ... ข้า..."
51095-23 = "ทีนี้เธอคงเข้าใจแล้วสินะ ว่าฉันจะไม่กลับไปแล้ว"
51095-24 = "พวกเราเฮียกกะเรียวรันไม่มีทางกลับไปเป็นเหมือนเดิมได้"
51095-25 = "......"
51095-27 = "แต่ก็อย่าเข้าใจผิดล่ะ ยูคาริ..."
51095-28 = "เธอน่ะไม่เหมือนกับพวกเรา เธอไม่จำเป็นต้องกลับไปหาเฮียกกะเรียวรันหรอก"
51095-29 = "ยูคาริ ที่ที่เธอต้องกลับไปน่ะ──"
51095-30 = "......!"
51095-31 = "อึก"
51095-32 = "[s1] \"เรนเกะ ยูคาริมาที่นี่เพราะเชื่อว่าเรนเกะจะยื่นมือช่วยนะ\"\n[s2] \"...ฟังยูคาริอธิบายอีกหน่อยไม่ได้เหรอ?\""
51095-35 = "ไม่ ฉันไม่ขอฟังอะไรอีก..."
51095-40 = "พอกันที"
51095-41 = "ยูคาริ ฉันขอเตือนอะไรอย่างหนึ่งในฐานะรุ่นพี่นะ "
51095-42 = "อย่ามัวทำอะไรที่มันสูญเปล่า แล้วไปสนุกกับช่วงเวลาแห่งวัยรุ่นของเธอเสียดีกว่า"
51095-43 = "มันเสียเวลา... ที่จะมายึดติดกับชมรมที่มันจบไปแล้วน่ะ"
51095-48 = "...ถือว่าเราคุยกันพอแค่ตรงนี้แล้วนะ"
51095-53 = "ระ... เรนเกะจัง! เดี๋ยวก่อนสิคะ!"
51095-54 = "อ๊ะ! เดี๋ยวสิ...! ทะ... ทำยังไงดีล่ะ?!"
51095-55 = "...คุณครู พวกเราขอตัวก่อนนะ "
51095-56 = "[s] \"อื้ม ฝากเรนเกะด้วยนะทุกคน\""
51095-63 = "...รุ่นพี่เรนเกะ..."
51095-65 = "(ยูคาริยืนอยู่กับที่ไม่ขยับเขยื้อนไปไหน จนเงาของเรนเกะและชมรมฝึกฝนค่อยๆ หายลับไป)"
51095-67 = "ตอนต่อไป;แก้มแดง"

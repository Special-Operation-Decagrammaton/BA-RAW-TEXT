[translation]
1009805-1 = "英雄，決戰"
1009805-3 = "啊，老師，我在這裡。"
1009805-4 = "你果然來了，謝謝你～"
1009805-5 = "[s1]「只有星野你一個人嗎？」\n[s2]「你不是要去頭盔團的基地嗎？說不定會有很多敵人耶。」"
1009805-8 = "唔嘿～你說誰是一個人呀～"
1009805-9 = "我不是有個可靠的夥伴嗎？"
1009805-10 = "[s]「嗯？你已經不覺得害羞了嗎？」"
1009805-11 = "我好像已經漸漸習慣老師那樣叫我了……"
1009805-12 = "況且這幾天一直穿著這套衣服到處跑，它帶給我的羞恥感也被稀釋得差不多了。"
1009805-13 = "唔嘿～不過這樣一說，好像又讓人有點害羞了呢。"
1009805-14 = "總之我們就去商店街繞一圈吧。"
1009805-15 = "嗯？老師怎麼一副「這麼悠哉真的好嗎」的表情？"
1009805-16 = "哎呀～雖然我嘴上說什麼敵人啊，基地之類的，#n其實現在連那些傢伙，到底是不是真的有在商店街出沒都還沒確定……"
1009805-17 = "所以你不用那麼緊繃的唷～"
1009805-18 = "[s]「原來如此，這就是英雄的日常生活嗎？」"
1009805-20 = "[ns]「隱藏真實身份，努力融入凡人的日常，這也是英雄不可或缺的設定！」"
1009805-21 = "唔嘿，我慢慢開始覺得有點太牽強了……"
1009805-22 = "算了，那也沒什麼不好。"
1009805-26 = "總之我們出發吧。"
1009805-34 = "歡迎光臨，隨便逛隨便挑！"
1009805-35 = "唔嘿～有好多可愛的東西喔～"
1009805-39 = "你看這個，老師。是鯨魚造型的零錢包。"
1009805-40 = "把這個吊在背心上的話，說不定會很適合哦～？"
1009805-41 = "[s]「我買給你吧。」"
1009805-45 = "唔嘿？沒，沒關係啦，我沒有那個意思……"
1009805-46 = "嗯？你說英雄本來就需要有個吉祥物？"
1009805-47 = "我聽不太懂老師的意思……"
1009805-52 = "總之大叔我就心懷感激地收下囉，老師。"
1009805-56 = "好可愛～"
1009805-60 = "唔嗯，味道真香呢～"
1009805-61 = "對了，我記得這條巷子好像是小吃街。"
1009805-62 = "雖然只剩幾間店還在營業……#n不過既然能存活到現在，應該都有兩把刷子吧？"
1009805-63 = "這也算是一種少數菁英……對吧？"
1009805-64 = "[s]「話說回來，已經到午餐時間了耶。」"
1009805-65 = "這樣啊～"
1009805-66 = "我看這裡基本上都是露天攤販，不如我們就邊逛邊買東西來吃吧。"
1009805-70 = "首先就從章魚燒開始～"
1009805-73 = "唔嘿～商店街果然很棒。#n不只可以逛街還能順便填飽肚子，簡直是一石二鳥～"
1009805-74 = "老師也有逛得開心嗎？"
1009805-75 = "[s]「當然。」"
1009805-77 = "[ns]「我很認真在享受英雄的日常環節。」"
1009805-78 = "日，日常環節……要這麼說也沒錯啦。"
1009805-79 = "唔嘿～能像這樣跟老師一起逛街，其實還挺有趣──"
1009805-86 = "……老師，你看那邊。"
1009805-92 = "三明治買好了……"
1009805-93 = "啊，好像也該買點飲料……"
1009805-98 = "是頭盔團。"
1009805-99 = "不過對方好像沒做什麼壞事，我們先觀察一下吧。"
1009805-101 = "不用找錢了！再見～"
1009805-102 = "咦！非常感謝！您慢走！"
1009805-107 = "竟然連找的錢都不要……"
1009805-108 = "這肯定不太對勁吧？#n頭盔團平常根本不可能說這種話。"
1009805-109 = "[s]「要跟上去看看嗎？」"
1009805-110 = "……就這麼辦吧。"
1009805-111 = "我們先離遠一點，小心別被對方發現了。"
1009805-126 = "怎麼這麼慢啊？我都快餓死了！"
1009805-127 = "非常抱歉！因為要買的東西很多……"
1009805-128 = "算了，大家趕快吃一吃繼續工作吧。"
1009805-129 = "我們好不容易才找到這棵搖錢樹，得趁它還能賺錢的時候盡量賺。"
1009805-132 = "是！"
1009805-137 = "這裡……不是學校的舊大樓嗎？"
1009805-138 = "我記得這棟大樓明明早就被沙子掩埋了，什麼時候又重見天日了……？"
1009805-139 = "[s]「不久之前有場沙塵暴對吧？會不會是那時候冒出來的？」"
1009805-140 = "無法否認這種可能性。"
1009805-141 = "如果頭盔團是碰巧發現這棟大樓，然後趁機霸佔這裡的話，一切就都說得通了。"
1009805-142 = "難怪他們只出沒在商店街，完全不到自治區的其他地方去……#n裝備會那麼好的原因也是……"
1009805-143 = "我想他們一定是把大樓裡的東西拿去變賣了……就像上次那群想偷佈告欄的人一樣。"
1009805-147 = "不能繼續放任他們，對吧老師？"
1009805-148 = "[s]「英雄的打擊犯罪環節要開始了嗎！」"
1009805-156 = "嗯？"
1009805-157 = "剛才那是什麼聲音？"
1009805-158 = "那裡好像有人？"
1009805-159 = "什麼，是入侵者嗎？#n還是想跟我們搶這棟大樓的其他分部？"
1009805-160 = "不管是誰，我都會把他找出來狠狠揍一頓──"
1009805-182 = "唔嘿～"
1009805-184 = "連，連隊長都受傷了……！"
1009805-185 = "還，還能動的傢伙趕快逃啊！"
1009805-189 = "居然自己一個人先逃跑！等等我們啊！"
1009805-196 = "……我都還來不及說話，他們就跑光了耶？"
1009805-197 = "不過既然已經吃了這麼多苦頭，他們應該也有學到教訓了吧。"
1009805-198 = "[s]「真不愧是阿拜多斯的英雄！好帥！」"
1009805-199 = "唔嘿～這麼說我會害羞的啦。"
1009805-200 = "總之這樣就解決了吧。老師也辛苦了。"
1009805-201 = "嗯？這樣應該就能平靜一陣子了？"
1009805-202 = "這個嘛，誰知道呢～這種事實在很難說。"
1009805-203 = "只要阿拜多斯自治區的治安一天不整頓好，今天這種事遲早會再度上演。"
1009805-204 = "[s]「哇！所以之後還有機會能陪英雄一起打擊犯罪嗎！」"
1009805-205 = "……"
1009805-206 = "唔嘿，真像是老師會說的話。"
1009805-207 = "嗯，不過這麼說似乎也沒錯哦～"
1009805-208 = "看來這套衣服還得再穿一陣子了呢。"
1009805-209 = "換句話說──"
1009805-210 = "[s]「換句話說？」"
1009805-211 = "老師的夥伴任務也還沒結束哦～"
1009805-212 = "唔嘿～大叔我還沒打算放過你呢。"
1009805-217 = "[ns]「太好了，正合我意！」"
1009805-218 = "嗯，真是個可靠的夥伴。"
1009805-219 = "那我們再到還沒去過的商店街晃晃吧。"
1009805-224 = "大叔我這次想要吃點棉花糖呢～"

[translation]
1009805-1 = "Hero's Showdown"
1009805-3 = "Ah, Sensei! Here, here."
1009805-4 = "You really did come. Thank you!"
1009805-5 = "[s1] \"You came here alone, Hoshino?!\"\n[s2] \"There might be Helmet Gangsters around!\""
1009805-8 = "Who says I'm alone, hm?"
1009805-9 = "I've got my trusty sidekick, after all!"
1009805-10 = "[s] \"Oh? You're finally embracing it?\""
1009805-11 = "You kept calling me \"hero,\" so I guess it kind of rubbed off on me."
1009805-12 = "Wearing this outfit all the time contributed too. The embarrassment's died down, at least."
1009805-13 = "Heh. Okay, no more talking about it. I'm starting to blush."
1009805-14 = "Want to take a little shopping district stroll with me?"
1009805-15 = "Huh? You look so wary, Sensei."
1009805-16 = "I know I said all that stuff about enemies and hideouts, but I haven't been able to actually confirm any of the rumors about them hanging out around here."
1009805-17 = "So let's take it easy."
1009805-18 = "[s] \"Hm, so this is a hero's daily life.\""
1009805-20 = "[ns] \"Disguising yourself as a normal citizen is also an essential duty of a hero!\""
1009805-21 = "Heh, I think that one's a little bit of a reach, Sensei. Now you're trying too hard."
1009805-22 = "Well, if it makes you happy."
1009805-26 = "All right! Let's go!"
1009805-34 = "Welcome! Please feel free to look around!"
1009805-35 = "Heh, heh. There's so much cute stuff."
1009805-39 = "Look, Sensei. It's a whale-shaped coin wallet!"
1009805-40 = "It might look good hanging on my vest...right here."
1009805-41 = "[s] \"I'll buy it for you.\""
1009805-45 = "Eh? No, no! I wasn't trying to—"
1009805-46 = "Huh? A hero needs a mascot?"
1009805-47 = "You're saying weird stuff again, but..."
1009805-52 = "I'll gratefully accept, Sensei."
1009805-56 = "So cute!"
1009805-60 = "Mmm... Smells yummy."
1009805-61 = "Ah, this is the restaurant alley."
1009805-62 = "There might not be a lot of shops still open, but the ones that survived are hidden gems."
1009805-63 = "The chosen ones!"
1009805-64 = "[s] \"Speaking of which, it's lunch time already.\""
1009805-65 = "Ah, you're right!"
1009805-66 = "It's all food stalls, for the most part, so we can get lots of different stuff."
1009805-70 = "Let's start with some takoyaki!"
1009805-73 = "Heh, the shopping district is great! We can shop and fill our bellies, at the same time!"
1009805-74 = "Are you enjoying yourself, Sensei?"
1009805-75 = "[s] \"Of course!\""
1009805-77 = "[ns] \"I'm fully embracing the everyday activities of a hero.\""
1009805-78 = "Everyday activities... I mean, you're not technically wrong."
1009805-79 = "Heh. I've been really enjoying this time with you—"
1009805-86 = "...Sensei. Look over there."
1009805-92 = "Let's get a sandwich..."
1009805-93 = "Oh, and some drinks too..."
1009805-98 = "The Helmet Gangsters."
1009805-99 = "Let's see what they do. They don't really seem like they're up to anything."
1009805-101 = "Keep the change! Bye!"
1009805-102 = "Oh, my! Thank you very much! Take care!"
1009805-107 = "They even left change...?"
1009805-108 = "That's not typical behavior for them at all. There's definitely something up with them."
1009805-109 = "[s] \"Should we follow them?\""
1009805-110 = "...That's probably a good idea."
1009805-111 = "Keep your distance, though. So they don't notice us."
1009805-126 = "Took you long enough! Thought I'd starve to death by the time you got back!"
1009805-127 = "Sorry, sorry! I got caught up buying stuff."
1009805-128 = "It's whatever. Let's just eat, so we can get back to work."
1009805-129 = "We've never had a steady source of income like this before! We gotta make the most of it!"
1009805-132 = "Understood!"
1009805-137 = "This is...our old school building."
1009805-138 = "It was buried so deep in the sand... When did it get unearthed?"
1009805-139 = "[s] \"Maybe that recent sandstorm ended up uncovering it?\""
1009805-140 = "Could be..."
1009805-141 = "I get it now. The Helmet Gangsters stumbled upon it and decided to take advantage of the opportunity."
1009805-142 = "That's why they've had all this money to go shopping lately, and how they got their hands on their fancy equipment. They haven't been harassing other areas of the district, because they didn't need to."
1009805-143 = "They've been selling off the stuff they found in this uncovered school building, like the ones who were trying to steal our bulletin board."
1009805-147 = "We can hardly let these punks just do whatever they want, right, Sensei?"
1009805-148 = "[s] \"Is the hero going to take action?!\""
1009805-156 = "Hm?"
1009805-157 = "Did you hear that?"
1009805-158 = "Is there someone there?"
1009805-159 = "An intruder? Or maybe another faction, trying to take over our territory?"
1009805-160 = "It don't matter who it is. I'll give them the pummeling—"
1009805-182 = "Heh. Heh."
1009805-184 = "Th-They got the captain...!"
1009805-185 = "Anyone still standing, run!"
1009805-189 = "Hey, don't leave me behind!"
1009805-196 = "I didn't even get a chance to say anything."
1009805-197 = "Eh, I'm sure they learned their lesson."
1009805-198 = "[s] \"It's the Hero of Abydos! You are amazing!\""
1009805-199 = "You're embarrassing me again, Sensei."
1009805-200 = "Another case solved. Good work, Sensei."
1009805-201 = "Huh? You think things will be quiet for a while?"
1009805-202 = "I sure hope so, but you never really know around here."
1009805-203 = "Stuff like this happens all the time. And it'll keep on happening, until Abydos can build more secure protections in the district."
1009805-204 = "[s] \"Wow! So you can continue being a hero!\""
1009805-205 = "..."
1009805-206 = "I was actually expecting that one. Heh."
1009805-207 = "Once again, you're not wrong."
1009805-208 = "I guess I'll keep the uniform on for a little longer."
1009805-209 = "Which means..."
1009805-210 = "[s] \"...Means?\""
1009805-211 = "You're gonna have to keep being my sidekick."
1009805-212 = "Heh, I won't let you try to get out of it."
1009805-217 = "[ns] \"I wouldn't have it any other way!\""
1009805-218 = "Yup! My reliable sidekick!"
1009805-219 = "Then let's go back to the shopping district. There's some spots I still want to visit."
1009805-224 = "I think I might grab some cotton candy along the way!"

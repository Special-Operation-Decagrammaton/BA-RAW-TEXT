[translation]
1009805-1 = "ศึกตัดสินของฮีโร่"
1009805-3 = "อ๊ะ ครู ทางนี้ๆ"
1009805-4 = "มาจริงๆ ด้วย ขอบคุณน้า~"
1009805-5 = "[s1] \"โฮชิโนะอยู่คนเดียวเหรอ?\"\n[s2] \"ถ้าเป็นที่ซ่อนตัวก็อาจมีพรรคพวกเยอะก็ได้นะ?\""
1009805-8 = "แหะๆ~ ใครว่ามาคนเดียวล่ะ"
1009805-9 = "ลุงมีไซคิกที่ไว้ใจได้อยู่ด้วยทั้งคน"
1009805-10 = "[s] \"เอ๋? ตอนนี้ไม่เขินแล้วเหรอ?\""
1009805-11 = "ก็นะ... ลุงคงชินกับการที่ครูเรียกแบบนั้นแล้วละมั้ง..."
1009805-12 = "พอใส่ชุดนี้ออกปฏิบัติการบ่อยๆ ก็ทำให้ความรู้สึกละอายใจเรื่องที่เกิดขึ้นก่อนหน้านี้ค่อยๆ หายไป..."
1009805-13 = "แหะๆ~ พอต้องพูดแบบนี้ก็เขินๆ อยู่เหมือนกันนะ"
1009805-14 = "ถ้างั้นเราไปดูรอบๆ ย่านการค้ากันเลยดีมั้ย?"
1009805-15 = "หืม? ทำหน้าเหมือนอยากถามเลยว่ามีเวลาว่างไปทำแบบนั้นด้วย... ใช่มั้ยล่ะ ครู?"
1009805-16 = "อืม ถึงจะบอกว่าเป็นที่ซ่อนของเจ้าพวกนั้นก็เถอะ แต่ก็ยังไม่ได้ลองไปตรวจสอบข่าวลือเรื่องที่เจ้าพวก#nนั้นเพ่นพ่านอยู่ที่ย่านการค้าว่าเป็นเรื่องจริงรึเปล่าเลยน่ะ"
1009805-17 = "ค่อยๆ เดินดูไปกันเถอะ~"
1009805-18 = "[s] \"อย่างนี้นี่เอง งานทั่วไปของฮีโร่สินะ\""
1009805-20 = "[ns] \"การปกปิดตัวตนและใช้ชีวิตตามปกติคือสิ่งสำคัญของการเป็นฮีโร่!\""
1009805-21 = "เฮ้อ ลุงนึกว่าจะชินกับเรื่องนี้ในระดับหนึ่งแล้วนะ..."
1009805-22 = "แต่ก็ช่างเถอะ"
1009805-26 = "งั้นก็ไปกันเลย"
1009805-34 = "ยินดีต้อนรับครับ เชิญเลือกดูได้ตามสบายเลยนะครับ!"
1009805-35 = "แฮร่~ มีของน่ารักๆ เต็มไปหมดเลย~"
1009805-39 = "ดูนี่สิ ครู กระเป๋าใส่เหรียญรูปวาฬละ"
1009805-40 = "เอามาห้อยไว้กับเสื้อกั๊กแบบนี้อาจจะเหมาะก็ได้นะ"
1009805-41 = "[s] \"เดี๋ยวครูซื้อให้\""
1009805-45 = "หา? มะ... ไม่ต้องหรอก ลุงไม่ได้หมายความว่าอย่างนั้นสักหน่อย..."
1009805-46 = "หืม? ฮีโร่ต้องมีมาสคอตเหรอ?"
1009805-47 = "ไม่เห็นเข้าใจที่พูดเลย..."
1009805-52 = "แต่ก็ขอรับไว้ด้วยความขอบคุณแล้วกันนะ ครู"
1009805-56 = "น่ารักจัง~"
1009805-60 = "อื้มมม กลิ่นหอมจัง~"
1009805-61 = "คิดดูแล้ว ตรอกนี้เป็นตลาดขายของกินสินะ"
1009805-62 = "ถึงจะเปิดอยู่แค่ไม่กี่ร้าน แต่ถ้าเป็นร้านที่อยู่รอดมาได้จนถึงตอนนี้ ต้องเป็นร้านเด็ดมากแน่ๆ"
1009805-63 = "เหมือนกับเป็นขุมทรัพย์ย่อมๆ เลยนะ?"
1009805-64 = "[s] \"ได้เวลามื้อเที่ยงแล้วนี่นา\""
1009805-65 = "นั่นสิน้า~"
1009805-66 = "แถวนี้มีร้านขายอาหารริมทางอยู่เยอะ เดินดูไปรอบๆ แล้วค่อยซื้อกินมั้ย?"
1009805-70 = "เริ่มจากทาโกะยากิ~"
1009805-73 = "แหะๆ~ ย่านการค้านี่ดีจริงๆ เลยนะ ทั้งได้ช้อปปิ้ง ได้หาของกินเติมพลังไปด้วย ยิงปืนนัดเดียวได้นกสองตัวเลย~"
1009805-74 = "ครู สนุกรึเปล่า?"
1009805-75 = "[s] \"สนุกมากเลย\""
1009805-77 = "[ns] \"ใช้ชีวิตประจำวันของฮีโร่ได้เต็มที่เลยนะเนี่ย\""
1009805-78 = "ชะ... ชีวิตประจำวัน... อืม เรียกแบบนั้นก็ไม่ผิดหรอก"
1009805-79 = "แหะๆ~ ได้มาเดินเที่ยวกับคุณครูแบบนี้ก็สนุกเหมือนกัน..."
1009805-86 = "ครู ดูทางนั้นสิ..."
1009805-92 = "ซื้อแซนด์วิช..."
1009805-93 = "อ้อ แล้วก็ต้องซื้อเครื่องดื่มด้วย..."
1009805-98 = "พวกแก๊งหมวกกันน็อก"
1009805-99 = "ดูเหมือนพวกนั้นจะไม่ได้ก่อปัญหาอะไรนะ ลองดูไปสักพักก่อนแล้วกัน"
1009805-101 = "เงินทอนไม่ต้อง! ไปละนะ~"
1009805-102 = "โอ้โห! ขอบคุณมากครับ! กลับดีๆ นะครับ!"
1009805-107 = "ไม่รับเงินทอนด้วย..."
1009805-108 = "แปลกจริงๆ ด้วยแฮะ? ไม่เหมือนพวกแก๊งหมวกกันน็อกตามปกติเลย"
1009805-109 = "[s] \"ตามไปดีมั้ย?\""
1009805-110 = "เอางั้นก็ได้..."
1009805-111 = "เว้นระยะห่างไว้หน่อย จะได้ไม่เป็นที่สังเกต"
1009805-126 = "ทำไมชักช้ากันแบบนี้? หิวจะตายอยู่แล้วเนี่ย"
1009805-127 = "ขอโทษด้วยค่ะ! พอดีต้องไปซื้ออะไรหลายอย่าง..."
1009805-128 = "ช่างเถอะ เอ้า รีบๆ กินแล้วทำงานกันต่อเถอะ"
1009805-129 = "นานๆ ทีจะเจอขุมทรัพย์แบบนี้ เพราะงั้นรีบๆ กอบโกยไว้ในตอนที่ยังมีโอกาสซะเถอะ"
1009805-132 = "ค่ะ!"
1009805-137 = "ที่นี่... อาคารเรียนเก่านี่นา"
1009805-138 = "ที่นี่เคยถูกฝังอยู่ในทรายนี่นา โผล่ขึ้นมาตั้งแต่เมื่อไหร่เนี่ย?"
1009805-139 = "[s] \"ไม่นานนี้มีพายุทะเลทรายพัดมานี่นา อาจเป็นตอนนั้นก็ได้\""
1009805-140 = "มันก็ไม่ใช่เรื่องที่จะเกิดขึ้นไม่ได้หรอก..."
1009805-141 = "พอคิดว่าพวกแก๊งหมวกกันน็อกมาเจอที่นี่เข้าโดยบังเอิญ แล้วก็ตัดสินใจใช้ที่นี่เป็นที่ซ่อน... แบบนี้ก็สมเหตุสมผลแล้วละ"
1009805-142 = "ทั้งเหตุผลที่พวกนั้นโผล่มาที่ย่านการค้า เหตุผลที่ไม่เจอเจ้าพวกนั้นในบริเวณอื่นของเขตปกครอง และเหตุผลที่เจ้าพวกนั้นมีอุปกรณ์ดีๆ ด้วย"
1009805-143 = "เจ้าพวกนั้นคงจะเอาสิ่งของที่อยู่ในอาคารเรียนไปขาย เหมือนกับตอนที่พยายามจะมาเอาป้ายประกาศ#nของโรงเรียนไปนั่นแหละ"
1009805-147 = "คงปล่อยเจ้าพวกนั้นไว้แบบนี้ไม่ได้แล้วแหละ ใช่มั้ยล่ะ ครู?"
1009805-148 = "[s] \"ได้เวลาเริ่มงานของฮีโร่แล้วสินะ!\""
1009805-156 = "หืม?"
1009805-157 = "เมื่อกี้เสียงอะไรน่ะ?"
1009805-158 = "เหมือนจะมีคนอยู่ทางด้านโน้นนะคะ"
1009805-159 = "อะไรกัน ผู้บุกรุกเหรอ? มีคนอื่นที่คิดจะเข้ามาหาสมบัติในเขตนี้ด้วยเหรอ?"
1009805-160 = "ไม่ว่าจะเป็นใครก็ตาม รีบไปหาตัวแล้วก็จัดการ..."
1009805-182 = "แฮร่~"
1009805-184 = "หะ... หัวหน้าโดนจัดการไปแล้ว...!"
1009805-185 = "จะ... เจ้าพวกที่ยังมีแรงอยู่ รีบหนีเร็วเข้า!"
1009805-189 = "อย่าทิ้งฉันไว้คนเดียวสิ! รอฉันด้วย!"
1009805-196 = "หนีไปโดยยังไม่ทันได้พูดอะไรเลยแฮะ..."
1009805-197 = "แต่ยังไงก็เถอะ สั่งสอนไปขนาดนี้ คงจะสำนึกกันบ้างแล้วละมั้ง"
1009805-198 = "[s] \"สมแล้วที่เป็นฮีโร่ของอะบิดอส! เท่สุดๆ!\""
1009805-199 = "แหะๆ~ พูดแบบนี้มันเขินนะ"
1009805-200 = "เท่านี้ก็คลี่คลายแล้วละมั้ง เหนื่อยหน่อยนะ ครู"
1009805-201 = "หืม? พวกนั้นน่าจะอยู่เงียบๆ ไปสักพักงั้นเหรอ?"
1009805-202 = "งั้นเหรอ ไม่รู้สินะ~ เรื่องนั้นน่ะไม่มีใครรู้หรอก"
1009805-203 = "เรื่องแบบนี้มันเกิดขึ้นได้ตลอดเวลานี่นา ยกเว้นว่าเขตปกครองตนเองอะบิดอสจะได้รับการดูแลจัดการ#nอย่างเหมาะสมน่ะ"
1009805-204 = "[s] \"ว้าว! ถ้างั้นเราก็ออกปฏิบัติการฮีโร่ต่อได้น่ะสิ!\""
1009805-205 = "......"
1009805-206 = "เฮ้อ สมกับเป็นครูจริงๆ เลยนะ"
1009805-207 = "อืม แต่ที่พูดมาก็ไม่ผิดหรอก~"
1009805-208 = "สงสัยคงจะต้องยืดระยะเวลาใส่ชุดนี้ออกไปอีกสักระยะแล้วละ"
1009805-209 = "ซึ่งก็หมายความว่า..."
1009805-210 = "[s] \"หมายความว่า...?”"
1009805-211 = "ครูก็ยังต้องเป็นไซคิกอยู่น่ะสิ"
1009805-212 = "แหะๆ~ ลุงไม่ปล่อยครูไปง่ายๆ หรอกนะ"
1009805-217 = "[ns] \"ตามคำสั่งของฮีโร่เลย!\""
1009805-218 = "อื้อ พึ่งพาได้จริงๆ นะ"
1009805-219 = "ถ้างั้นเราไปเดินดูบริเวณที่ยังไม่เคยไปกันในย่านการค้าดีมั้ย?"
1009805-224 = "จู่ๆ ลุงก็อยากกินสายไหมขึ้นมาน่ะ~"

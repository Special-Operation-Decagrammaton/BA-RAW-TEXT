[translation]
12170-1 = "Episode 17;That Which One Must Protect"
12170-2 = "Gehenna Academy Main Gate"
12170-3 = "You want a meeting with the head prefect? You think you can just waltz in here and chat with the head prefect of Gehenna herself?"
12170-4 = "I'll tell you what. Maybe if you got on all fours and licked my feet..."
12170-8 = "Eek?!"
12170-9 = "I didn't even finish my sentence. Seriously?"
12170-10 = "Do you not have even the slightest trace of human dignity?"
12170-11 = "[s1] \"Not at all.\"\n[s2] \"I used to, but not anymore.\""
12170-12 = "And you call yourself a teacher! You're demented!"
12170-13 = "And you call yourself a teacher! You're demented!"
12170-14 = "This kind of pervy adult needs to be...!"
12170-15 = "What's so funny?"
12170-16 = "H-Head Prefect?"
12170-17 = "I've seen plenty of people kneel and beg for their own sake...but I've never seen a teacher do the same for a student."
12170-18 = "Look up, Sensei."
12170-19 = "Tell me. What do you need from me?"
12170-20 = "Wait, President. This teacher wasn't just kneeling, but trying to lick my..."
12170-21 = "..."
12170-24 = "...?!"
12170-26 = "..."
12170-27 = "I see. Thank you for explaining, Hifumi."
12170-28 = "If what that teacher says is true, then this is something we can't overlook."
12170-29 = "We're currently in the process of forming a treaty, so we're in no position to be reckless."
12170-30 = "However, it's evident the PMC's presence can lead to nothing good for our students."
12170-31 = "Therefore, I think it best that we make an exception in this case."
12170-32 = "O-Of course, Nagisa."
12170-33 = "I believe the towed artillery class has an outdoor lecture planned, correct? It's been a while since their last one, so I don't see any harm in a little live practice."
12170-34 = "The weather is so nice. It'll be like a picnic."
12170-35 = "By towed artillery...do you mean the L118?"
12170-36 = "I say why not? It's the least I can provide for a model student such as yourself, Hifumi."
12170-37 = "What goes around comes around. And I know you'll pay me back, won't you?"
12170-38 = "Ngghh..."
12170-40 = "More importantly, it would be to our benefit to have Schale's Sensei in our debt."
12170-43 = "*rattle* *rattle*"
12170-44 = "Mmm. It's just about ready."
12170-45 = "Wow, nice food stall!"
12170-46 = "Shiba Seki Ramen actually got its start as a food stall."
12170-47 = "It-It's all my fault it was... How can I ever pay for my sins? I don't deserve to live!"
12170-48 = "Anyway, I heard you were shutting down! Guess that wasn't true. Glad to see the shop open again, Master!"
12170-49 = "It wouldn't have been possible had someone not left a large donation in front of my door."
12170-50 = "..."
12170-51 = "Was all set to retire and take it easy, but now you're asking me to open up again? What a hassle."
12170-52 = "..."
12170-55 = "Here, four bowls of Shiba Seki ramen. That'll be 580 yen each."
12170-56 = "Hmm... Didn't you mess up the portions again?"
12170-57 = "Ahahah! Just dig in!"
12170-58 = "Bon appétit!"
12170-60 = "Ah... That was good. All right. Should we roll out?"
12170-61 = "By the way, Boss...are we really going?"
12170-62 = "Fighting the PMC is a waste of time. We don't have anything to gain from getting involved with this fight."
12170-63 = "...Hmph."
12170-64 = "Come on, Kayoko. You still don't get it?"
12170-65 = "Get what?"
12170-66 = "Can't you tell by the look on Aru's face? She's saying, \"Tasting ramen this good is the only compensation I need!\""
12170-67 = "..."
12170-68 = "..."
12170-69 = "N-Now I understand, Aru! Stepping into hell itself to protect the ramen we love! That's what real outlaws would do!"
12170-70 = "I-I'll do my best to become a real outlaw! I'll blow them all away!"
12170-71 = "Hmph. Well, as long as you get it."
12170-72 = "All right, everyone. Ready to follow me all the way to the depths of hell?"
12170-73 = "Heh heh..."
12170-78 = "(Wh-What am I talking about?!)"
12170-79 = "(I was just gonna go home after I was done with my ramen!)"
12170-80 = "(I totally overhyped myself and now I'm in too deep...!!?)"
12170-81 = "(What if I ran away...? Wait. No...)"
12170-82 = "(The Abydos brats kept thanking me, saying I knocked some sense into them, saying they see me in a new light...)"
12170-83 = "(Wh-What do I do?! We're not just picking a fight with some Market Guards—this is a full-on PMC...! We're so doomed!)"
12170-84 = "(What do I do?! What do I DO?!)"
12170-86 = "All right, Aru! Let's go!"
12170-87 = "I-I'll follow you to hell and back!"
12170-88 = "*sigh* This can't be good for business."
12170-90 = "That should do it. We're ready."
12170-91 = "Yup, yup! We've got lots of supplies and lots of snacks."
12170-92 = "We're well-rested and working on full stomachs too!"
12170-93 = "I also collected all the old maps of the Abydos Desert and updated them."
12170-94 = "Hoshino is in the center of Kaiser PMC District 51 according to Sensei's intel."
12170-95 = "I'll guide you through the safest route to get there!"
12170-96 = "[s] \"Let's go!\""
12170-97 = "All right!"
12170-98 = "Commencing Operation Rescue Hoshino!"
12170-100 = "That's right."
12170-101 = "What's broken can be rebuilt."
12170-102 = "What's important are the people who come to eat my ramen."
12170-103 = "This ramen shop isn't going anywhere so long as it has loyal customers. Not the most poetic way of putting it, but that's what I feel deep down."
12170-108 = "So go get 'em, Abydos Foreclosure Task Force!"

[translation]
12170-1 = "第17話;想守護的事物"
12170-2 = "格黑娜學園．正門"
12170-3 = "啊？想見風紀委員長？#n你以為格黑娜風紀委員長那麼容易就能見到嗎？"
12170-4 = "嗯……假如你願意跪下舔我的腳……"
12170-8 = "呀啊啊！？"
12170-9 = "不是，我話還沒說完……你怎麼就……"
12170-10 = "你難道沒有身為大人的尊嚴，或是做人應有的猶豫嗎！？"
12170-11 = "[s1] 「沒有那種東西。」\n[s2] 「本來有，但現在已經沒了。」"
12170-12 = "老師這個怪人！變態！已經扭曲了！"
12170-13 = "老師這個怪人！變態！已經扭曲了！"
12170-14 = "這種變態的大人就該趕快──"
12170-15 = "什麼事讓你們這麼開心？"
12170-16 = "委，委員長……？"
12170-17 = "為了自己跪地求情的人我看多了，不過為了學生下跪的老師還是第一次見到。"
12170-18 = "請抬起頭來，老師。"
12170-19 = "說吧，你希望我做什麼？"
12170-20 = "那個，委員長……老師不是在下跪，是在舔……"
12170-21 = "……"
12170-24 = "！！！！？？？"
12170-26 = "…… "
12170-27 = "日步美同學的說明我了解了。"
12170-28 = "如果那個老師所言屬實，的確不能放任不管……"
12170-29 = "雖然條約的簽訂近在眼前，我們無法輕舉妄動……"
12170-30 = "不過，那個名為PMC的企業似乎確實對我們的學生帶來了不良影響。"
12170-31 = "或許將這次視為有些特殊的例外比較適合。"
12170-32 = "非，非常感謝，渚大人…… "
12170-33 = "我想想……正好有堂預計將使用牽引榴彈砲的戶外課程對吧？#n機會難得，就在稍遠一些的地方進行吧。"
12170-34 = "──就當作是代替野餐。而且天氣也不錯。"
12170-35 = "那，那個……牽引榴彈砲是指……L118的……？"
12170-36 = "畢竟是優等生日步美同學的請求，多少得展現一些誠意才行。"
12170-37 = "愛是會循環的東西……相信日步美同學也會有所回報吧。呵呵。"
12170-38 = "啊，啊嗚…… "
12170-40 = "除此之外……現在賣個人情給「夏萊」的老師，我認為也是必不可少的……"
12170-43 = "（咚噠咚噠──）"
12170-44 = "嗯，大致上就這樣吧。"
12170-45 = "哇，路邊攤也感覺不錯嘛！"
12170-46 = "就是說啊，柴關拉麵本來也是從路邊攤做起的，真讓人懷念。"
12170-47 = "都，都是因為我……店鋪才會……需，需要我以死謝罪嗎？我立刻去死──！！！"
12170-48 = "不過～我本來聽說你不做了，現在能重新開張真是太好了呢～"
12170-49 = "啊啊，因為之前有人把錢丟在店門口就走了啊。"
12170-50 = "……"
12170-51 = "本來想就這樣退休，悠閒地過活的……既然要我重新營業也沒辦法。"
12170-52 = "……"
12170-55 = "580元的柴關拉麵4碗，久等了！"
12170-56 = "這……是不是又給錯份量了……？"
12170-57 = "啊哈哈哈，這樣不是很好嗎～"
12170-58 = "我要開動了～！"
12170-60 = "哈啊～真好吃。#n嗯，那差不多該走了吧？"
12170-61 = "社長……真的要去嗎？"
12170-62 = "這場戰鬥對我們沒有任何好處。#n在這種情況下和PMC戰鬥實在……"
12170-63 = "……哼。"
12170-64 = "哎呀～佳世子醬，你還沒發現嗎？"
12170-65 = "嗯？"
12170-66 = "看亞瑠醬的表情就知道了吧──#n一臉寫著「委託費什麼的，嚐到這碗拉麵就足夠了」的表情！"
12170-67 = "……"
12170-68 = "……"
12170-69 = "原，原來如此！不愧是亞瑠大人！#n為了一碗拉麵不惜踏入地獄，這就是硬派作風對吧！"
12170-70 = "我，我也會為了成為真正的不法之徒而努力！這次一定會把敵人全部殲滅！！"
12170-71 = "……哼。沒錯，說的真好。"
12170-72 = "那麼，都做好跟我一起闖到地獄深處的覺悟了嗎？"
12170-73 = "嘿……"
12170-78 = "（說出口了──────！！！）"
12170-79 = "（本來打算吃完拉麵就回去的，結果不小心就順勢說了帥氣的台詞──！！？） "
12170-80 = "（這，這下已經沒辦法回頭了……！？）"
12170-81 = "（要馬上逃跑嗎？可，可是……）"
12170-82 = "（阿拜多斯那些傢伙對我說了「謝謝」、「下次見」之類的話……）"
12170-83 = "（該，該怎麼辦！？這次的對手可不是黑市守衛，而是PMC……#n　不管怎麼看都會完蛋的吧！？）"
12170-84 = "（怎，怎麼辦！？怎麼辦才好！？）"
12170-86 = "來～我們出發吧！亞瑠醬！"
12170-87 = "我，我會跟隨您直到地獄的！！"
12170-88 = "唉，一直在做這些吃虧的事……"
12170-90 = "嗯，準備完成。"
12170-91 = "嗯嗯！補給十分充足，點心也帶了很多！"
12170-92 = "嗯，我也準備好了！好好睡了一覺，肚子也填飽了！"
12170-93 = "我這邊也將阿拜多斯的舊地圖全部更新了。"
12170-94 = "根據老師提供的情報，星野前輩應該就在凱薩PMC第51區的中央。"
12170-95 = "我會以最安全的路線引導大家！"
12170-96 = "[s] 「出發吧！」"
12170-97 = "是！星野前輩解救作戰……！"
12170-98 = "開始！！"
12170-100 = "……我想起來了。"
12170-101 = "失敗的話只要重新來過就好。"
12170-102 = "真正重要的是來吃拉麵的人們。"
12170-103 = "只要客人還在，這間拉麵店就不會消失。#n表達的可能不是很好，不過就是這麼回事吧。"
12170-108 = "所以……去吧！阿拜多斯對策委員會！！"

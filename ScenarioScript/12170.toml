[translation]
12170-1 = "ตอนที่ 17;สิ่งที่อยากปกป้อง"
12170-2 = "ประตูหน้าสถาบันเกเฮนน่า"
12170-3 = "ว่าไงนะ? อยากพบประธานกรรมการวินัยเหรอ? คิดว่าจะคนอย่างประธานกรรมการวินัยเกเฮนน่า#nจะเข้าพบได้ง่ายๆ เหรอ?"
12170-4 = "แต่ก็อาจจะได้เจอก็ได้นะ ถ้ายอมนั่งลงแล้วเลียเท้าฉัน..."
12170-8 = "อ๊าาา!!"
12170-9 = "เดี๋ยวสิ... ยังพูดไม่จบเลย... \n"
12170-10 = "ไม่คิดถึงศักดิ์ศรีของตัวเองเลยรึยังไง?"
12170-11 = "[s1] \"ไม่มีหรอก\"\n[s2] \"เคยมี แต่ตอนนี้ไม่มีแล้ว\""
12170-12 = "อะไรเนี่ย! ครูคนนี้ประหลาดชะมัด! อารมณ์เสีย!\n"
12170-13 = "อะไรเนี่ย! ครูคนนี้ประหลาดชะมัด! อารมณ์เสีย!\n"
12170-14 = "ผู้ใหญ่โรคจิตแบบนี้ต้องโดน...!\n"
12170-15 = "มีเรื่องอะไรเหรอ?\n\n\n"
12170-16 = "ปะ... ประธาน...?"
12170-17 = "ฉันเห็นคนคุกเข่าวิงวอนเพื่อตัวเองมาเยอะแล้ว แต่ไม่เคยเห็นครูที่คุกเข่าเพื่อนักเรียนมาก่อนเลย"
12170-18 = "เงยหน้าขึ้นหน่อยสิครู\n\n"
12170-19 = "บอกมาสิว่าอยากให้ช่วยอะไร"
12170-20 = "เดี๋ยวสิ ประธาน... ครูเค้าไม่ได้คุกเข่า แต่ว่า... เท้าฉัน..."
12170-21 = "......\n"
12170-24 = "!!!???\n\n\n\n"
12170-26 = "...... \n\n"
12170-27 = "ฉันฟังคำอธิบายจากคุณฮิฟุมิแล้วละค่ะ"
12170-28 = "หากสิ่งที่คุณครูพูดเป็นเรื่องจริง ก็คงเป็นเรื่องที่ไม่อาจมองข้ามไปได้..."
12170-29 = "แต่ตอนนี้พวกเรากำลังใกล้จะลงนามสนธิสัญญาแล้ว จึงไม่สามารถเคลื่อนไหวทำอะไรได้ตามอำเภอใจ"
12170-30 = "แต่เห็นได้ชัดว่าธุรกิจที่ชื่อ PMC จะส่งผลกระทบในทางที่ไม่ดีต่อนักเรียนของเราค่ะ"
12170-31 = "งั้นครั้งนี้ก็น่าจะต้องพิจารณาเป็นกรณียกเว้นดูสักหน่อยนะคะ"
12170-32 = "ขะ... ขอบคุณค่ะ คุณนางิสะ..."
12170-33 = "อืม.. ชั้นเรียนปืนใหญ่วิถีโค้งจะจัดคลาสเรียนกลางแจ้งพอดีเลยใช่ไหมคะ? ทำไมครั้งนี้ไม่ลองออกไป#nไกลอีกสักหน่อยล่ะคะ?"
12170-34 = "นี่เป็นโอกาสที่ดีเลยนะ อากาศก็ดีด้วย\n"
12170-35 = "เอ่อ... ปืนใหญ่วิถีโค้ง... หมายถึงห้อง L118 เหรอคะ?"
12170-36 = "นักเรียนเกียรตินิยมอย่างคุณฮิฟุมิมาขอร้องทั้งที ก็ต้องทำให้สิคะ"
12170-37 = "เพราะให้ความรักไปก็คงได้รับกลับมา ต่อไปคุณฮิฟุมิเองก็คงมีอะไรจะให้ฉันแหละค่ะ ฮุฮุ"
12170-38 = "อะ... อ่า........"
12170-40 = "อีกอย่าง ตอนนี้ถ้าทำให้คุณครูจากชาเล่ต์รู้สึก \"ติดหนี้\" พวกเรา ก็จะเป็นประโยชน์ในอนาคตอย่างมากค่ะ\n"
12170-43 = "(ก๊อกแก๊กๆ)"
12170-44 = "อืม... เท่านี้ก็พอใช้ได้แล้วละมั้ง"
12170-45 = "ว้าว! ออกมาสวยใช้ได้เลย! เป็นร้านขายแบบเคลื่อนที่ใช่ไหม?\n\n\n"
12170-46 = "พวกเธอไม่รู้สินะ เดิมทีชิบะเซกิ ราเม็งเริ่มจากร้านแบบเคลื่อนที่แบบนี้แหละ"
12170-47 = "ฉะ.. ฉันเป็นคนระเบิดเอง... ฉันควรตายใช่ไหมคะ? ฉันสมควรถูกลงโทษ!\n\n\n"
12170-48 = "นึกว่าจะปิดกิจการไปแล้วซะอีก ดีจังเลยนะที่กลับมาเปิดร้านใหม่~"
12170-49 = "อืม.. พอดีมีคนเอาเงินมาทิ้งไว้หน้าร้านน่ะ\n"
12170-50 = "......\n"
12170-51 = "ฉันก็คิดว่าจะปิดกิจการแล้วพักผ่อนสักหน่อย แต่ก็มีคนมาขอให้เปิดร้านต่อ แบบนี้จะทำยังไงได้ล่ะ?"
12170-52 = "......\n\n"
12170-55 = "เอ้า! ราเม็งชิบะเซกิ ชามละ 580 เยน 4 ชาม\n\n"
12170-56 = "ทำไมเยอะขนาดนี้ล่ะ กะปริมาณผิดรึไง?"
12170-57 = "อะฮ่ะฮ่ะฮ่า! ไม่เห็นจะเป็นไรเลย \n\n"
12170-58 = "จะทานให้อร่อยเลยค่า!\n"
12170-60 = "กินอร่อยจนพุงกางเลย เอาละ งั้นไปกันเลยไหม?"
12170-61 = "ประธาน... เราจะไปกันจริงๆ เหรอ?\n"
12170-62 = "เราไม่ได้ผลประโยชน์อะไรจากการต่อสู้นี้เลยนะ จะให้ไปสู้กับ PMC โดยไม่มีค่าจ้างแทนงั้นเหรอ...\n"
12170-63 = "ฮึ่ม..."
12170-64 = "นี่คาโยโกะจัง ยังมองไม่ออกอีกเหรอ?\n\n\n\n"
12170-65 = "หืม?\n"
12170-66 = "ดูหน้าอารุจังก็รู้แล้ว ดูสิ อย่างกับเขียนไว้บนหน้าผากว่า \"รับค่าจ้างเป็นราเม็งชามเดียวก็เพียงพอแล้ว\"#nอย่างนั้นแหละ!\n"
12170-67 = "......"
12170-68 = "......\n"
12170-69 = "ฉะ... ฉันเข้าใจแล้วค่ะ! ท่านอารุ! การเดินเข้าไปในนรกครั้งนี้ก็เพื่อปกป้องราเม็งหนึ่งชาม! สมกับเป็น#nวายร้ายที่แท้จริงเลยนะคะ!"
12170-70 = "ฉันก็จะพยายามอย่างเต็มที่ เพื่อเริ่มชีวิตใหม่อย่างคนนอกกฎหมายค่ะ! จะล้างบางให้เรียบเลย!\n"
12170-71 = "ฮึ่ม... คิดได้ก็ดีแล้ว"
12170-72 = "เอาละ ทุกคนพร้อมที่จะตามฉันไปยังสุดขอบนรกแล้วใช่ไหม?"
12170-73 = "แหะๆ..."
12170-78 = "(นี่ฉันพูดบ้าอะไรออกไปเนี่ย?!)\n\n"
12170-79 = "(จริงๆ แค่จะมากินราเม็งอย่างเดียวไม่ใช่เหรอ...!)"
12170-80 = "(อินกับบรรยากาศจนเผลอพูดอะไรไม่เข้าท่า แถมยังต้องแกล้งอินต่อไปด้วย! จะกลับคำก็ไม่ได้!)\n\n\n"
12170-81 = "(หรือว่า... ชิงหนีไปเลยดีไหม? โอ้ย... แต่ก็...)\n"
12170-82 = "(ไหนจะประโยค \"ขอบคุณที่ทำให้ตั้งสติได้\" กับ \"แล้วเจอกันใหม่\" ที่พวกอะบิดอสพูดอีก...)\n\n"
12170-83 = "(ทะ.. ทำยังไงดีล่ะ?! ให้ไปสู้กับ PMC งั้นเหรอ? พวกนั้นเก่งกว่าผู้คุมตลาดด้วยซ้ำ ไม่ต้องสู้ก็รู้แล้วว่า#nแพ้ยับแน่นอน!)"
12170-84 = "(เอาไงดี?! เอายังไงดีล่ะ?!)\n"
12170-86 = "เอาละ~ งั้นไปกันเลย! อารุจัง!"
12170-87 = "ถะ...ถึงจะเป็นสุดขอบนรกแค่ไหน ฉันก็ตามท่านอารุไปค่ะ!!"
12170-88 = "เฮ้อ... เอาแต่ทำเรื่องที่ไม่คุ้มเสี่ยง แต่ก็ช่วยไม่ได้..."
12170-90 = "เตรียมตัวพร้อมแล้ว\n\n"
12170-91 = "อื้ม! ฉันเตรียมเสบียงและอาหารว่างไว้เยอะเลยค่ะ\n"
12170-92 = "พร้อมไปกว่านี้ไม่ได้แล้วละ! นอนหลับเต็มตื่น แล้วก็กินข้าวมาเต็มที่แล้วด้วย!"
12170-93 = "ฉันก็รวบรวมแผนที่เก่าของทะเลทรายอะบิดอส แล้วก็อัปเดตใหม่ไว้เรียบร้อยแล้วค่ะ\n\n"
12170-94 = "คุณครูบอกไว้ว่ารุ่นพี่โฮชิโนะอยู่ที่ใจกลางเขต 51 ของไคเซอร์ PMC ค่ะ"
12170-95 = "ฉันจะแนะนำเส้นทางที่ปลอดภัยที่สุดในการเข้าถึงเขตนั้นเองค่ะ!\n"
12170-96 = "[s] \"ออกเดินทางได้!\""
12170-97 = "ค่ะ!\n\n\n"
12170-98 = "เริ่มปฏิบัติการช่วยชีวิตรุ่นพี่โฮชิโนะ!\n"
12170-100 = "ใช่แล้วละ"
12170-101 = "อะไรที่มันถูกทำลายไป ก็สร้างขึ้นมาใหม่ได้"
12170-102 = "สำคัญที่สุดคือคนที่มากินราเม็งที่ร้านนี้ต่างหาก"
12170-103 = "ถ้ามีลูกค้า ร้านราเม็งก็ไม่หายไป ถึงจะไม่กล้าพูดออกมา แต่ก็ยังคงคิดแบบนี้ทุกวัน"
12170-108 = "เพราะอย่างนั้น พยายามเข้านะ! คณะกรรมการแผนงานอะบิดอส!!"

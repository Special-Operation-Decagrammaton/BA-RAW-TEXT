[translation]
10030075-18 = "เอ๋ นี่มันเรื่องวุ่นวายอะไรกัน?"
10030075-19 = "ระหว่างที่เราไปดูพระอาทิตย์ขึ้นแล้วกลับมา มีเต็นท์ผุดขึ้นเพียบเลย"
10030075-20 = "หรือว่าจู่ๆ การตั้งแคมป์ก็บูมขึ้นมาอีกครั้งคะ...?"
10030075-21 = "[s] \"ไม่รู้สิ...\""
10030075-26 = "สวัสดีค่ะ ผู้ชมช่องโครโนสทุกท่าน! ทุกท่านกำลังอยู่กับคาซามากิ มาอิ จากรายการสารคดีด่วน <ก้าวเข้าสู่ประวัติศาสตร์> ค่ะ!"
10030075-27 = "วันนี้พวกเราได้ยินข่าวลือว่ามีการค้นพบร่องรอยอารยธรรมโบราณแห่งใหม่ในเทือกเขาฮิงาชิ ก็เลยรีบมาเก็บข้อมูลอย่างรวดเร็วค่ะ!"
10030075-28 = "ข่าวลือนี้แพร่กระจายในโซเชียลมีเดียในช่วงที่ผ่านมา แม้ว่าวันนี้จะเป็นวันแรกของปีใหม่ แต่ก็มีผู้คนมากมายมารวมตัวกันเพื่อสำรวจร่องรอยอารยธรรมโบราณค่ะ!"
10030075-29 = "ตอนนี้มีการคาดเดาออกมาหลายกระแสเลยค่ะว่าร่องรอยอารยธรรมโบราณนี้จะส่งผลอะไรทางด้าน#nโบราณคดีของคิโวทอส..."
10030075-33 = "เอ๋? คนนั้น..."
10030075-34 = "ท่านผู้ชมทุกท่าน! ระหว่างที่ฉันรายงานอยู่นี้ กล้องก็จับภาพของคุณครู [USERNAME] ที่เป็นคนดังที่สุดในคิโวทอสได้ค่ะ!"
10030075-35 = "ฉันจะเข้าไปขอสัมภาษณ์ด่วนจากคุณครูชาเล่ต์เดี๋ยวนี้เลยค่ะ!"
10030075-39 = "สวัสดีค่ะ คุณครู [USERNAME]! นี่คือช่องโครโนสค่ะ!"
10030075-40 = "[s1] \"สวัสดีทุกคน!\"\n[s2] \"ขอให้เป็นปีที่ดีนะ มาอิ\""
10030075-43 = "แน่นอนอยู่แล้วค่ะ! ฉันงานเข้าจนได้ทำข่าวพิเศษตั้งแต่วันแรกของปีเลย..."
10030075-44 = "ไม่สิ ฉันกำลังคิดว่าตัวเองโชคดีที่ได้เจอคุณครูน่ะค่ะ!"
10030075-45 = "จะว่าไป การที่คุณครู [USERNAME] มาอยู่ที่นี่ด้วย..."
10030075-46 = "แสดงว่าร่องรอยอารยธรรมโบราณที่ค้นพบใหม่ในครั้งนี้ต้องเป็นสิ่งที่มีคุณค่ามากแน่นอนค่ะ!"
10030075-47 = "[s3] \"ร่องรอยอารยธรรมโบราณที่ค้นพบใหม่...?\"\n[s4] \"พูดถึงอะไรเหรอ...\""
10030075-50 = "เอ๋? ยังไม่ได้ข่าวเหรอคะ?"
10030075-51 = "ตอนนี้ในโซเชียลมีเดียกำลังลุกเป็นไฟ เพราะมีการค้นพบภาพวาดฝาผนังโบราณในถ้ำที่อยู่ใน#nเทือกเขาฮิงาชิค่ะ!"
10030075-58 = "ภาพวาดฝาผนังนี้ต่างจากภาพวาดในถ้ำทั่วไปซึ่งจะเกี่ยวกับการล่าหรือการเก็บเกี่ยวเป็นหลัก เพราะองค์ประกอบของภาพวาดที่เพิ่งค้นพบนี้เป็นสิ่งที่คาดว่าเป็นวัตถุหลงยุคที่ดูเหมือนหอคอย หรือเครื่องจักรกลขนาดใหญ่ค่ะ!"
10030075-62 = "ได้ยินว่าบนหอคอยมีรูปสัตว์ประหลาดดุร้ายอยู่ด้วยนะคะ..."
10030075-63 = "คนที่เห็นภาพสัตว์ประหลาดนั้นต่างพูดกันว่านี่เป็น 'คำพยากรณ์วันสิ้นโลก' จนมีจลาจลเล็กๆ บนถนน#nใน D.U. ตั้งแต่ต้นปีเลยค่ะ"
10030075-65 = "คุณครูจากชาเล่ต์มีความเห็นอย่างไรต่อการค้นพบครั้งนี้บ้างคะ?"
10030075-69 = "[ns] \"มากิ...\""
10030075-73 = "มะ... ไม่ใช่ความผิดของฉันสักหน่อย!"
10030075-74 = "ถึงแม้ฉันจะเป็นคนวาดภาพบนผนังนั่นเองก็เถอะ..."
10030075-75 = "ฉันบอกแล้วไม่ใช่เหรอว่าให้ลบภาพที่วาดให้เกลี้ยงก่อนออกมาจากถ้ำน่ะ..."
10030075-76 = "ตะ... แต่ตอนนั้นฉันก็ยุ่งกับการตามหารุ่นพี่โคทามะจนลืมไป..."
10030075-77 = "และถ้าจะให้พูดตามตรง..."
10030075-81 = "ภาพที่ฉันวาดมันก็น่าประทับใจมากเลยนี่เนอะ?"
10030075-88 = "แสดงความสำนึกผิดบ้างหน่อยเถอะ!"
10030075-90 = "(หลังจากนั้นคุณครูก็ต้องลำบากกับการชี้แจงว่าภาพวาดฝาผนังนั่นเป็นฝีมือของมากิ...)"

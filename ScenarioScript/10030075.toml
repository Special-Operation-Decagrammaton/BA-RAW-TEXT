[translation]
10030075-18 = "...Huh, what's all that noise?"
10030075-19 = "The campsite filled with tents while we were climbing the mountain."
10030075-20 = "Is camping the first fad of the new year?"
10030075-21 = "[s] \"I wonder...\""
10030075-26 = "Hello and welcome to the Kronos Channel! I'm Kazamaki Mai, host of the new investigative series \"Walking Through History!\""
10030075-27 = "We're reporting live from the Higashi Alps to bring you the latest on the new discovery that's rocking the scientific community!"
10030075-28 = "Word of the discovery blazed across social media like a wildfire, and even though it's New Year's Day this campground is packed with people eager to find out more!"
10030075-29 = "There's no telling how our understanding of Kivotos itself will change with—"
10030075-33 = "Oh? Hold on a moment—that face!"
10030075-34 = "Attention, viewers! Kivotos' biggest celebrity, [USERNAME] Sensei, has been caught on camera at the site of the discovery!"
10030075-35 = "We're going live to the Sensei of Schale to bring you an official statement on these momentous events!"
10030075-39 = "Hello, [USERNAME] Sensei! You're live on the Kronos Channel!"
10030075-40 = "[s1] \"Hello, everyone!\"\n[s2] \"Happy New Year, Mai.\""
10030075-43 = "Can you imagine that'd I'd get a scoop like this on the very first day of the year—"
10030075-44 = "Er, I mean, we're so lucky to run into you today!"
10030075-45 = "More importantly, seeing that you're here now, [USERNAME] Sensei..."
10030075-46 = "Is Schale prepared to confirm the rumors swirling around the new discovery?"
10030075-47 = "[s3] \"...New discovery?\"\n[s4] \"Schale has no comment at this time.\""
10030075-50 = "Oh? Playing dumb, Sensei?"
10030075-51 = "You must be here to investigate the ancient mural some hiking students discovered on the walls of a natural cavern here in the Higashi Alps! Not even Schale can deny the incredible attention it's garnered on social media!"
10030075-58 = "Unusually for cave paintings, which experts say typically depict imagery related to hunting and gathering, this mural appears to show an array of modern artifacts, like a giant tower and mechanical parts!"
10030075-62 = "On top of that, it's been reported that the crowning feature of the mural is a terrifying monster lurking at the top of the tower..."
10030075-63 = "The students who discovered the mural threw the D.U. into an uproar when they reached the holiday crowds and began proclaiming that they had discovered a \"prophecy of the apocalypse!\""
10030075-65 = "So, Sensei, can Schale protect our viewers from this imminent danger? What steps are you taking to ensure that Kivotos will survive?"
10030075-69 = "[ns] \"...Maki.\""
10030075-73 = "I-It's not my fault!!"
10030075-74 = "Well, I'm the one who drew those paintings, sure, but..."
10030075-75 = "I believe I asked you to clean up that mural before we left the cave yesterday..."
10030075-76 = "B-But I was so busy helping you look for Kotama that I forgot..."
10030075-77 = "Besides..."
10030075-81 = "Isn't it kind of cool that my art has such a tremendous impact?"
10030075-88 = "Show a little remorse!"
10030075-90 = "The panic was eventually quelled when Maki and I gave an exclusive interview explaining the origins of the mural...even if rumors of a cover-up lingered for months afterwards."

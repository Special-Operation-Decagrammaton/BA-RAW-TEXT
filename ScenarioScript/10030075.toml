[translation]
10030075-18 = "……咦，怎麼鬧哄哄的？"
10030075-19 = "在我們看日出回來的時候，周圍多了很多新帳篷。"
10030075-20 = "這段期間突然掀起新的露營風潮了嗎？"
10030075-21 = "[s]「這個嘛……」"
10030075-26 = "克洛盧斯頻道的各位觀眾！#n我是緊急紀錄片「走入歷史」的主持人風卷麻衣！"
10030075-27 = "我們聽說東阿爾卑斯這裡發現了新的遺跡，於是便趕緊前來採訪！"
10030075-28 = "不知道是不是消息透過SNS迅速傳播的關係，#n儘管今天是新年第一天，露營場依然滿是想探索遺跡的人群！"
10030075-29 = "這次發現的遺跡會對今後奇普托斯的考古學帶來什麼樣的影響呢？#n真是令人非常關注──"
10030075-33 = "咦？那個人是……"
10030075-34 = "各位觀眾！在我進行報導的時候，#n攝影機捕捉到奇普托斯最炙手可熱的[USERNAME]老師的身影！"
10030075-35 = "我們這就去邀請夏萊的老師接受緊急採訪！"
10030075-39 = "你好，[USERNAME]老師！這裡是克洛盧斯頻道！"
10030075-40 = "[s1]「大家好啊！」\n[s2]「新年快樂，麻衣。」"
10030075-43 = "新年快樂！#n今年第一天就能遇到這種獨家新聞──"
10030075-44 = "──不對，是能見到老師真幸運！"
10030075-45 = "話說回來，從[USERNAME]老師也在這裡來看……"
10030075-46 = "這次新發現的遺跡一定價值連城！"
10030075-47 = "[s3]「……新發現的遺跡？」\n[s4]「我不知道你在說什麼……」"
10030075-50 = "咦？老師沒聽說嗎？"
10030075-51 = "有人在東阿爾卑斯的自然洞穴發現了新的古代壁畫，現在已經在SNS上引發熱議……"
10030075-58 = "有別於先前以狩獵或採集為主的石洞壁畫，#n據說這次發現的壁畫上描繪著巨塔與很多看似機械裝置的歐帕茲！"
10030075-62 = "而且塔上還畫著窮凶惡極的怪物……"
10030075-63 = "曾見到那幅畫的某些人將其稱為「末日預言」……#n因而從年初就在街上鬧事，似乎在D.U.引起了不小的騷動。"
10030075-65 = "請問夏萊的老師對這次的發現有什麼看法呢？"
10030075-69 = "[ns]「……真紀。」"
10030075-73 = "那，那不是我的錯哦！？"
10030075-74 = "雖然壁畫確實是我畫的沒錯……"
10030075-75 = "昨天明明有叮嚀你在離開洞穴前要把壁畫擦乾淨……"
10030075-76 = "可，可是那時候為了找小玉前輩而手忙腳亂，不小心就忘記了……"
10030075-77 = "而且……"
10030075-81 = "這是不是代表我的畫很令人印象深刻？"
10030075-88 = "你反省一下好嗎！"
10030075-90 = "（後來費了不少心思向大家解釋真紀畫的壁畫的來歷……）"

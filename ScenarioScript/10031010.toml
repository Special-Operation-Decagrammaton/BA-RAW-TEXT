[translation]
10031010-1 = "Episode 1;A Cooperative Proposal"
10031010-12 = "After the commotion finally settled..."
10031010-14 = "Kihehe. It is unfortunate that I couldn't get a definitive answer to my proposal just yet, but it's only a matter of time."
10031010-15 = "...You've been quiet. Feeling regretful already?"
10031010-16 = "Be at ease. I have plenty of time to win you over... Perhaps after the big, huge, titanic, gargantuan event that I'm planning!"
10031010-17 = "[s] \"Don't those all mean the same thing?\""
10031010-18 = "Oh! You're bringing that up now! What perfect timing! I should've expected no less of Makoto!"
10031010-19 = "*gasp*! Wait, was the nonsense from earlier all just foreshadowing this moment?!"
10031010-20 = "Wh-What?"
10031010-21 = "Ah, yes. Exactly, Chiaki!"
10031010-22 = "No. Don't be fooled. Her face says she hadn't even considered that."
10031010-23 = "Anyway! Are we really going through with it?!"
10031010-24 = "Of course, Iroha! The preparations are well on track!"
10031010-25 = "I, the Great Makoto, have covered every angle. This plan shall bring honor to the Pandemonium Society and spread word of my greatness throughout Kivotos!"
10031010-26 = "Yeah! Ibuki is looking forward to it too!"
10031010-27 = "[ns] \"Uh... Just what are you all preparing for?\""
10031010-28 = "Kihehe... In five days, the Pandemonium Society will be hosting the Gehenna Special Party at the new Pandemonium Society assembly hall. That structure is almost finished..."
10031010-29 = "It is at this party that the entire student body of Gehenna shall realize that we, the Pandemonium Society..."
10031010-33 = "...are one of the greatest organizations in Gehenna! They'll finally see that we're far more reliable than those stupid slowpokes on the Prefect Team! Kiheheheh!!"
10031010-36 = "To elaborate on her point..."
10031010-37 = "The Pandemonium Society hosts an annual Valentine's Day party, inviting influential figures from Kivotos and Gehenna."
10031010-38 = "But the scope of this year's party is bigger than last year's, or even the year before. It has a grander feeling to it... Or maybe Makoto is just being greedy."
10031010-39 = "This year's party will be completely different from any that came before."
10031010-40 = "Don't forget, Iroha. We have the Sensei of Schale's help this year!"
10031010-44 = "[ns] \"...Me?\""
10031010-45 = "Yes. If we can get Sensei's cooperation, this Valentine's Day party will be more bountiful and...powerful than any before! "
10031010-46 = "It's an opportunity to show the world the great and amazing reign of Makoto!"
10031010-48 = "Geez! She outright admits we need Sensei on our side! That's our Makoto!"
10031010-49 = "Uh, Makoto. What exactly does it mean for a party to become more powerful?"
10031010-51 = "Is that the part you're hung up on?"
10031010-52 = "Keke. Oh, Sensei. Rest easy."
10031010-53 = "With your help, this party's success is all but guaranteed!"
10031010-54 = "If the party is a success, the students of Gehenna will adore me! Even Sensei will see me in a new light...and embrace my proposal! It will be the birth of the brilliant Schale and Pandemonium Society alliance!"
10031010-55 = "It will be smooth sailing from then on! Kekekeke!"
10031010-56 = "[s] \"...Is it the best idea to reveal your true intentions to the person you're trying to persuade?\""
10031010-57 = "...Exactly. Anyone could see your constant flip-flopping between asking for help, then scheming on how to use them, Makoto. Poor Sensei must be disgusted."
10031010-58 = "[s] \"I'll help.\""
10031010-59 = "Oh?!"
10031010-60 = "Really?! You're sure?!"
10031010-61 = "[s9] \"If a student needs help, I help them.\"\n[s10] \"I'm also curious to see what kind of party Gehenna throws.\""
10031010-64 = "Is that...so."
10031010-66 = "What a relief!"
10031010-67 = "Hmm..."
10031010-69 = "Sensei's gonna help us? Yay! Ibuki is so excited!"
10031010-70 = "Ibuki will also work hard to make an excellent party with Sensei!"
10031010-71 = "Kihehe. Good."
10031010-72 = "Excellent! [USERNAME] Sensei! I look forward to working with you...for the next 5 days! Kekekekeke!!"
10031010-74 = "And so, preparations for the Valentine's Day party with the Pandemonium Society began."

[translation]
10031010-1 = "第1話;合作邀約"
10031010-12 = "（於是在短暫的騷亂過後）"
10031010-14 = "嘻嘻嘻。雖然提議沒能取得確切的回答的確可惜，但那也只是早晚的問題。"
10031010-15 = "……雖然還沒說出口，但老師是不是已經後悔了？"
10031010-16 = "不過別擔心。#n回答留到我真琴大人計劃的超、超、超、超大型活動之後再說也行！"
10031010-17 = "[s]「超、超、超、超大型活動…………？」"
10031010-18 = "啊，要在這裡提那件事嗎！#n真是恰合時宜的判斷！不愧是真琴前輩！"
10031010-19 = "…………！#n難道前面那些荒謬的段子……全都是為了連接這個伏筆！？"
10031010-20 = "嗯……？"
10031010-21 = "……啊啊，千秋！你說的沒錯！"
10031010-22 = "不管怎麼看，你的表情都不像是那麼回事。"
10031010-23 = "話說回來……真的要那麼做嗎？"
10031010-24 = "那還用說嗎伊呂波！所有準備都正按部就班地進行！"
10031010-25 = "這是難得由我真琴大人準備的遠大計劃。#n是個能讓萬魔殿揚名立萬，將我的名聲傳遍整個奇普托斯的大好機會！"
10031010-26 = "嗯～伊吹也很期待～"
10031010-27 = "[ns]「那個……你準備的究竟是什麼？」"
10031010-28 = "咯咯咯……是這樣的。#n5天之後，我們萬魔殿預計將在即將完工的新議事堂，舉辦「格黑娜特別派對」。"
10031010-29 = "透過這個派對，格黑娜的所有學生將會清楚明白……"
10031010-33 = "我們萬魔殿在格黑娜是多麼厲害的組織！#n以及我的胸懷和那些愚蠢、遲鈍至極的風紀委員簡直是天壤之別！嘻嘻嘻嘻！！"
10031010-36 = "嗯，要補充說明的話……"
10031010-37 = "我們萬魔殿每年都會在情人節的時候舉辦派對，邀請各種權威人士參加。"
10031010-38 = "但是該說今年的規模比往年更大更特別……還是說其中包含了真琴前輩的野心……"
10031010-39 = "這次跟以往定期舉辦的派對，從層次上就不一樣！"
10031010-40 = "更重要的是，今年有夏萊的老師在啊！伊呂波！"
10031010-44 = "[ns]「…………我？」"
10031010-45 = "沒錯。如果能得到老師的幫助……#n這次的情人節派對，一定會比之前的任何派對更豐富更強大吧！"
10031010-46 = "這是讓所有人都明白，我真琴大人的統治是多麼優秀而偉大的大好機會！"
10031010-48 = "哇嗚～毫不掩飾地展現想得到老師恩澤的私心！真像真琴前輩的作風！"
10031010-49 = "哼嗯，真琴醬。要是派對變得更強會怎樣？"
10031010-51 = "你在意的是這個部分嗎……"
10031010-52 = "嘻嘻，老師啊，你大可放心。"
10031010-53 = "只要老師願意幫忙，派對就註定會成功了！"
10031010-54 = "如此一來……不只能受到格黑娜學生的仰慕，#n老師也會重新審視我真琴大人……積極接受我的提議！#n萬魔殿和夏萊的同盟將戲劇性地成立！"
10031010-55 = "康莊大道已近在眼前啊！嘻嘻嘻！"
10031010-56 = "[s]「……一直對想說服的人說這種心裡話沒問題嗎？」"
10031010-57 = "……就是說啊。通常這樣應該會被指責吧。#n真琴前輩，如果連那種話都說出口，就算是老師也會怕的……"
10031010-58 = "[s]「嗯，我來幫忙。」"
10031010-59 = "哦哦……！"
10031010-60 = "……！？#n這樣真的好嗎！？"
10031010-61 = "[s9]「因為如果學生需要幫助……我就希望能夠幫上忙。」\n[s10]「而且我也對格黑娜的派對有點興趣。」"
10031010-64 = "是嗎……"
10031010-66 = "太好了～伊呂波醬！"
10031010-67 = "哼嗯……"
10031010-69 = "哇～老師願意幫忙嗎～？好開心～！"
10031010-70 = "伊吹也會和老師一起努力準備派對！"
10031010-71 = "咯咯咯，很好。"
10031010-72 = "好極了！[USERNAME]老師！#n未來5天……請多多指教囉！嘻嘻嘻嘻嘻！！"
10031010-74 = "（於是開始和萬魔殿一起準備情人節的派對）"

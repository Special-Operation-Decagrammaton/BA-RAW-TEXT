[translation]
10031010-1 = "ตอนที่ 1;ขอความร่วมมือ"
10031010-12 = "(หลังจากความวุ่นวายผ่านไปสักพัก)"
10031010-14 = "หึหึหึ น่าเสียดายที่เราไม่ได้รับคำตอบที่แน่ชัดต่อข้อเสนอที่ยื่นให้ แต่ก็คงเป็นเรื่องของเวลาน่ะ"
10031010-15 = "ถึงจะไม่ได้พูดออกมา แต่ที่จริงครูก็เสียดายอยู่ใช่มั้ยล่ะ?"
10031010-16 = "แต่ก็สบายใจได้นะ ถ้าเป็นคำตอบต่อข้อเสนอนั้นละก็ รอไว้ตอบหลังจากอีเวนต์ สะ... สะ... สุดมโหฬาร#nที่ท่านมาโคโตะผู้นี้วางแผนอยู่ก็ได้!"
10031010-17 = "[s] \"อีเวนต์ สะ... สะ... สุดมโหฬาร...?\""
10031010-18 = "อ๊ะ จะเปิดเผยที่นี่เลยเหรอคะ! ถือเป็นการตัดสินใจที่ถูกกาลเทศะมาก! สมกับเป็นรุ่นพี่มาโคโตะเลยค่ะ!"
10031010-19 = "เฮือก! หรือว่าการพูดคุยที่ไม่ตรงประเด็นของเราก่อนหน้านี้ทั้งหมด... มีนัยยะถึงสิ่งนี้เหรอคะ?!"
10031010-20 = "หืม...?"
10031010-21 = "อ้อ ใช่ อย่างที่เธอว่าเลย จิอากิ!"
10031010-22 = "เดี๋ยวก่อนค่ะ ดูจากสีหน้าก็รู้แล้วว่าไม่เคยคิดอะไรแบบนั้นเลยต่างหาก"
10031010-23 = "แต่จะว่าไป... จะทำจริงๆ เหรอคะ เรื่องนั้นน่ะ"
10031010-24 = "ก็แหงน่ะสิ อิโรฮะ! การเตรียมพร้อมทุกอย่างกำลังไปได้สวยเลย!"
10031010-25 = "นี่คือแผนระยะยาวที่ท่านมาโคโตะผู้นี้เตรียมการไว้เลยนะ นี่คือโอกาสดีที่จะเพิ่มชื่อเสียงของ#nแพนเดโมเนียม โซไซตี้ และประกาศเกียรติคุณของท่านมาโคโตะผู้นี้ให้ทั่วคิโวทอสยังไงล่ะ!"
10031010-26 = "อื้อ~ อิบูกิก็ตั้งตารออยู่ไม่น้อยเลยละ~"
10031010-27 = "[ns] \"นี่... เตรียมอะไรกันไว้งั้นเหรอ?\""
10031010-28 = "หึหึหึ... อีก 5 วันหลังจากนี้ เราจะเปิดงาน <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า> ที่หอประชุมใหม่ของ#nแพนเดโมเนียม โซไซตี้ ที่กำลังจะสร้างเสร็จเร็วๆ นี้"
10031010-29 = "เด็กนักเรียนเกเฮนน่าทุกคนจะได้รู้เป็นครั้งแรกผ่านปาร์ตี้นี้..."
10031010-33 = "ว่าแพนเดโมเนียม โซไซตี้ของเราเป็นองค์กรที่ยิ่งใหญ่แค่ไหนในเกเฮนน่า! และรู้ด้วยว่ากรรมการวินัย#nเกเฮนน่าที่ทั้งโง่เขลาและเอื่อยเฉื่อยนั่นอยู่คนละระดับกับเรา! หึหึหึหึ!!"
10031010-36 = "คือ... ฉันอธิบายเพิ่มเติมให้นะคะ"
10031010-37 = "แพนเดโมเนียม โซไซตี้ของเราจะจัดปาร์ตี้ฉลองวันวาเลนไทน์ของทุกปี และจะเชิญผู้มีอิทธิพลจาก#nหลายๆ ฝ่ายในคิโวทอสหรือเกเฮนน่ามาเข้าร่วมค่ะ"
10031010-38 = "แต่ว่าปาร์ตี้ของปีนี้จะมีขนาดใหญ่กว่าของปีที่แล้วและทุกๆ ปีที่ผ่านมา และก็มีความพิเศษมากกว่า#nอยู่หน่อยด้วยค่ะ... แล้วก็ต้องบอกว่ามีความปรารถนาของรุ่นพี่มาโคโตะแฝงอยู่ด้วย..."
10031010-39 = "ปาร์ตี้ครั้งนี้จะแตกต่างจากทุกปาร์ตี้ที่ผ่านมา!"
10031010-40 = "ที่สำคัญเลยก็คือ ครั้งนี้มีครูจากชาเล่ต์มาเข้าร่วมด้วยยังไงล่ะ! อิโรฮะ!"
10031010-44 = "[ns] \"ครูเหรอ...?\""
10031010-45 = "ใช่ ถ้าได้ความร่วมมือจากครูด้วยละก็ ปาร์ตี้วันวาเลนไทน์ครั้งนี้จะยิ่งใหญ่กว่าปาร์ตี้อื่นๆ ที่ผ่านมา... และจะยิ่งแข็งแกร่งขึ้นด้วย! "
10031010-46 = "นี่คือโอกาสที่จะได้บอกให้ทุกคนรู้ว่าการปกครองของท่านมาโคโตะผู้นี้ยิ่งใหญ่เกรียงไกรแค่ไหน!"
10031010-48 = "ฮู่ว~ จะอาศัยใบบุญของคุณครูเพื่อเติมเต็มความต้องการส่วนตัวสินะคะ! แบบนี้สมกับเป็นรุ่นพี่มาโคโตะ#nที่สุด!"
10031010-49 = "มาโคโตะจัง ถ้าปาร์ตี้นี้ยิ่งใหญ่มากขึ้น จะเป็นยังไงกันเหรอ?"
10031010-51 = "จะมีคนสนใจเรื่องแบบนั้นไหมนะคะ..."
10031010-52 = "หึหึ วางใจได้เลยครู"
10031010-53 = "ถ้าครูเข้ามาช่วย เราก็รับประกันได้เลยว่าปาร์ตี้นี้จะต้องสำเร็จลุล่วงอย่างแน่นอน!"
10031010-54 = "ถ้าปาร์ตี้สำเร็จอย่างยิ่งใหญ่... นักเรียนในเกเฮนน่าก็ต้องเคารพเรา! เพื่อเห็นแก่ท่านมาโคโตะผู้นี้แล้ว... ครูก็ควรตอบรับข้อเสนออย่างแข็งขัน! แล้วพันธมิตรระหว่างแพนเดโมเนียม โซไซตี้ กับชาเล่ต์ก็จะก่อกำเนิดขึ้น!"
10031010-55 = "และเส้นทางที่ราบรื่นไร้อุปสรรคก็จะทอดยาวออกไปไม่รู้จบ! หึหึหึหึ!"
10031010-56 = "[s] \"จะโน้มน้าวคนอื่นแท้ๆ แต่บอกความในใจขนาดนั้นได้เหรอ?\""
10031010-57 = "นั่นน่ะสิคะ ปกติก็มักจะโดนตักเตือนเรื่องนี้ละค่ะ รุ่นพี่มาโคโตะ ถ้าจะพูดออกไปขนาดนั้นน่ะ ต่อให้อีกฝ่ายเป็นคุณครูก็ระอานะคะ..."
10031010-58 = "[s] \"ก็ได้ ครูจะช่วยเอง\""
10031010-59 = "โอ้...!"
10031010-60 = "จริงเหรอคะ...?! แบบนี้จะไม่เป็นอะไรเหรอคะ?!"
10031010-61 = "[s9] \"ถ้านักเรียนอยากได้ความช่วยเหลือ ครูก็อยากช่วย\"\n[s10] \"ครูก็แอบสนใจในปาร์ตี้เกเฮนน่าอยู่น่ะ\""
10031010-64 = "งั้นเหรอคะ?"
10031010-66 = "ดีจังเลยนะ~ อิโรฮะจัง!"
10031010-67 = "อืม..."
10031010-69 = "ว้าว~ คุณครูจะมาช่วยเราจริงเหรอ~? ตื่นเต้นจังเลยน้า~!"
10031010-70 = "อิบูกิก็จะเตรียมงานปาร์ตี้กับคุณครูอย่างขยันขันแข็งเลยละ!"
10031010-71 = "หึหึหึ ดีเลย"
10031010-72 = "ดีมาก! ครู [USERNAME]! เราขอฝากตัวสำหรับอีก 5 วันข้างหน้าด้วยละ! หึหึหึหึหึ!!"
10031010-74 = "(จากนั้นการเตรียมงานปาร์ตี้รับวันวาเลนไทน์กับแพนเดโมเนียม โซไซตี้ก็เริ่มต้นขึ้น)"

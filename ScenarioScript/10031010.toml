10031010-66 = "4;사츠키;01\n2;치아키;03;잘됐네~ 이로하 쨩!\n#2;em;[음표]"
10031010-67 = "4;사츠키;01;흐응……."
10031010-68 = "#all;hide"
10031010-69 = "3;이부키;03;와아~ 선생님이 도와주는 거야~? 신난다~!\n#3;jump"
10031010-70 = "3;이부키;09;이부키도 선생님이랑 같이 파티 준비 열심히 할게!\n#3;hophop"
10031010-71 = "3;마코토;03;크크큭. 잘되었군."
10031010-72 = "3;마코토;03;좋다! [USERNAME] 선생! 앞으로 5일간…… 잘 부탁하도록 하마! 키키키키킷!!\n#3;hophop\n#3;em;[재잘]"

10031010-12 = "#na;(그렇게 잠깐의 소란이 지나간 뒤.)"
10031010-13 = "3;마코토;03\n#3;a"
10031010-14 = "3;마코토;03;키키킷. 뭐, 이 몸의 제안에 대해 이 자리에서 확답을 받지 못한 건 물론 아쉬운 일이다마는, 어차피 그것도 시간문제일 뿐.\n#3;em;[재잘]"
10031010-15 = "3;마코토;99;……실은 아직 말은 안 했지만, 이미 후회하고 있지는 않나?"
10031010-16 = "3;마코토;03;뭐, 안심하도록. 제안에 대한 대답이라면 이 마코토 님께서 계획하고 있는 초, 초, 초, 초거대 이벤트 이후라도 상관없으니 말이야!"
10031010-17 = "[s] \"초, 초, 초, 초거대 이벤트………?\""
10031010-18 = "3;마코토;03\n1;치아키;11;아, 여기서 그 건을 꺼내 드는 건가요! 시의적절한 판단! 역시 마코토 선배네요!\n#3;m4\n#1;ar"
10031010-19 = "1;치아키;08;………헉! 혹시 앞에서 나누었던 얼토당토않던 만담은…… 전부 이곳으로 이어지기 위한 복선이었던 건가요?!\n#1;em;[반짝]"
10031010-20 = "3;마코토;04;응……?\n#3;stiff"
10031010-21 = "3;마코토;04;……아아, 그래. 치아키, 바로 그거다!\n#3;jump"
10031010-22 = "3;마코토;04\n1;치아키;05\n5;이로하;06;아니, 어디로 보나 그런 생각은 해본 적도 없다는 표정이잖아요.\n#3;m2\n#1;dl\n#5;al"
10031010-23 = "1;치아키;05\n5;이로하;04;그보다…… 정말 하는 건가요. 그거.\n#1;hide"
10031010-24 = "3;마코토;05;당연하지 않느냐! 이로하! 이미 모든 준비는 착실히 진행되고 있단 말이다!\n#3;hophop"
10031010-25 = "5;이로하;04\n3;마코토;01;모처럼 이 마코토 님께서 준비한 백년대계다. 이번에야말로 만마전의 이름을 드높이고 이 마코토 님의 명성을 키보토스 전역에 알릴 좋은 기회인 게지!\n#5;dr\n#3;m3"
10031010-26 = "5;이로하;04\n3;이부키;03;응~ 이부키도 엄청 기대하고 있어~\n#3;em;[음표]\n#5;hide"
10031010-27 = "[ns] \"저기…… 뭘 준비하고 있길래. 그래?\""
10031010-28 = "3;마코토;03;크크큭…… 다름이 아니라 앞으로 5일 뒤. 우리 만마전은 조만간 완공을 앞두고 있는 만마전 신 의사당에서 <게헨나 특별 파티>를 개최할 예정이다."
10031010-29 = "3;마코토;99;이 파티를 통해 비로소 게헨나의 모든 학생은 알게 되겠지. 우리 만마전이……"
10031010-30 = "#st;[0,0];instant;1;"
10031010-31 = "#clearST"
10031010-32 = "3;마코토;99\n#3;em;…\n#wait;2500"
10031010-33 = "3;마코토;03;판데모니움 소사이어티가 이 게헨나에서 얼마나 대단한 조직인지! 나아가 그 멍청하고 굼뜨기 그지없는 선도부 녀석들과 얼마나 배포의 차이가 큰지도 말이야! 키키키킷!!\n#3;closeup\n#fontsize;80"
10031010-34 = "3;이로하;06\n#3;a"
10031010-35 = "3;이로하;06\n#3;em;[한숨]\n#wait;1500"
10031010-36 = "3;이로하;01;뭐어, 보충해서 설명해 드리자면…….\n#3;em;…"
10031010-37 = "3;이로하;02;저희 만마전은 매년 발렌타인 데이를 맞이할 때마다 키보토스나 게헨나 등지에서 각종 유력자를 초청하는 파티를 열어왔거든요."
10031010-38 = "3;이로하;04;그런데 올해 열리는 파티는 작년이나 재작년보다도 좀 더 규모가 크다고 할지. 좀 더 특별한 느낌이라고 할지……. 마코토 선배의 욕심이 담겨 있다고 할지……."
10031010-39 = "3;이로하;04\n1;마코토;05;그간 정례적으로 열려온 파티와 이번 파티는 그 궤부터가 다르다!\n#1;ar\n#1;hophop\n#3;m5"
10031010-40 = "1;마코토;03;무엇보다 올해, 이 자리엔 샬레의 선생이 있지 않느냐! 이로하!"
10031010-41 = "#st;[0,0];instant;1;"
10031010-42 = "#clearST"
10031010-43 = "3;이로하;04\n1;마코토;03\n#3;h\n#1;h\n#wait;2500"
10031010-44 = "[ns] \"………나?\""
10031010-45 = "3;이로하;04\n1;마코토;99;그래. 선생의 협력을 받을 수만 있다면, 이번 발렌타인 데이 파티는 지난 그 어느 파티보다도 더욱 풍성하고…… 또한 강력해지겠지! \n#1;m3\n#1;em;[반응]\n#3;dr"
10031010-46 = "3;이로하;04\n1;마코토;03;이 마코토 님의 치세가 얼마나 강대하고 위대한지! 만인에게 알릴 수 있는 기회란 거다!\n#3;hide"
10031010-47 = "#all;hide"
10031010-48 = "4;사츠키;01\n2;치아키;12;휘유~ 선생님의 은덕을 보고자 하는 사심이 그야말로 가감 없이 뿜뿜! 마코토 선배다워요!\n#2;em;[음표]"
10031010-49 = "4;사츠키;01;흐응, 마코토 쨩. 파티가 더 강해지면 어떻게 되는 거야?"
10031010-50 = "#all;hide"
10031010-51 = "3;이로하;06;그 부분을 신경 쓰시는 건가요……."
10031010-52 = "3;마코토;01;키킥, 선생이여. 안심하도록."
10031010-53 = "3;마코토;03;선생이 도와주는 이상, 파티의 성공은 보장된 것이나 다름없다!"
10031010-54 = "3;마코토;99;파티가 대성공한다면…… 게헨나 학생들은 이 몸을 우러러보고! 선생 또한 이 마코토 님을 다시 보았다며…… 이 몸의 제안을 적극 수용! 만마전과 샬레의 동맹이 극적으로 타결!"
10031010-55 = "3;마코토;03;그야말로 탄탄대로만이 펼쳐질 게 분명하니까 말이야! 키키키킷!\n#3;em;[재잘]"
10031010-56 = "[s] \"……설득하고 싶은 사람에게 그런 속내까지 말해줘도 되는 거야?\""
10031010-57 = "3;이로하;06;……그쵸. 보통은 그쪽을 지적하겠죠. 마코토 선배, 역시 그런 말까지 한다면 제아무리 선생님일지라도 질려서……."
10031010-58 = "[s] \"뭐, 도와줄게.\""
10031010-59 = "3;마코토;02;호오……!\n#3;em;[!]"
10031010-60 = "3;이로하;04;……?! 진짜요? 그래도 괜찮나요?!\n#3;stiff"
10031010-61 = "[s9] \"학생이 도움을 필요로 한다면…… 도와주고 싶으니까.\"\n[s10] \"게헨나의 파티라니, 조금 관심이 가는 것도 있고 해서 말이야.\""

[translation]
10002190-1 = "後日談其六;某種極限運動"
10002190-2 = "沙灘排球是兩人組成一隊，在沙灘上進行的排球……"
10002190-3 = "不過我只在三一的體育課打過「6人制排球」，#n所以對沙灘排球的打法和規則不是很清楚……"
10002190-4 = "雖然這麼說，人數也不夠打6人制排球……"
10002190-5 = "所以這次我特別請了太妹們來當我們的對手！"
10002190-11 = "認真？把我們打得這麼慘，還要我們陪你們玩球？"
10002190-12 = "即使是手下敗將，我們也是有身為太妹的尊嚴的啊！"
10002190-13 = "我們會乖乖地說「好的我要玩」才──"
10002190-20 = "……一點也不奇怪！#n我想玩！拜託讓我玩吧！"
10002190-21 = "哈，哈哈……其實我從很久以前就對沙灘排球挺有興趣的～"
10002190-22 = "真期待跟大家一起打沙灘排球～！耶～！！！"
10002190-24 = "沒想到會這麼爽快地答應……"
10002190-25 = "真的很謝謝你們！"
10002190-26 = "那麼就馬上開始吧？"
10002190-29 = "球網也已經架好……"
10002190-30 = "那麼從弦生同學開始發球吧！"
10002190-36 = "呿，有名到連哭泣的小孩都會沉默的我們，怎麼會淪落成這樣……"
10002190-37 = "唉……算了，不過是玩球而已，沒什麼難的。#n隨便配合一下再解散吧。"
10002190-39 = "啊，球發過來──"
10002190-45 = "嘎噗──！？"
10002190-48 = "什麼！？"
10002190-49 = "怎，怎麼回事？是空襲嗎！？"
10002190-50 = "不……只是球飛過來而已……吧。"
10002190-55 = "弦，弦生同學，麻煩繼續發球……"
10002190-62 = "呃啊啊啊！"
10002190-67 = "沒，沒事吧！？"
10002190-68 = "這，這哪能算是沙灘排球……"
10002190-69 = "根本是單方面的暴力！"
10002190-71 = "反對暴力！"
10002190-75 = "（之後，弦生的發球一直持續到所有太妹都無法動彈為止）"

[translation]
10002190-1 = "Afterword; Extreme Sports"
10002190-2 = "I know beach volleyball is similar to regular volleyball, except it's played two-on-two and on the beach."
10002190-3 = "Still, we've only ever played regular volleyball during gym class at Trinity, and I don't know all of the different rules for beach volleyball."
10002190-4 = "Also, we don't have enough people on our side who want to play."
10002190-5 = "That's why I wanted to ask if you guys wanted to play and teach us!"
10002190-11 = "Huh? You're really asking us to join in on your game?"
10002190-12 = "Just because you captured us after the battle, it doesn't mean you get to torture us with silly games! We have dignity too, you know!"
10002190-13 = "What makes you think we'd ever go along with—"
10002190-20 = "I-I mean! We'd love to! Let's play!"
10002190-21 = "H-Haha. I-I wanted to play volleyball this whole time. Wooow!"
10002190-22 = "Yeah. Beach volleyball between the four of us. Sounds e-exciting!"
10002190-24 = "That was easier than I thought it'd be."
10002190-25 = "This is going to be so much fun!"
10002190-26 = "Is everyone ready to get started?"
10002190-29 = "Okay, the net's all set up."
10002190-30 = "Why don't you serve for us, Tsurugi?"
10002190-36 = "Man. We're supposed to be the scary ones around here. How'd it come to this...?"
10002190-37 = "I mean, if we just have to play this stupid game for a little bit, it shouldn't be too hard. What if we just play for a couple of points and then look for a chance to run away?"
10002190-39 = "Look. Here comes the first serve."
10002190-45 = "Ack!"
10002190-48 = "...?!"
10002190-49 = "Wh-What happened?! Was it a surprise attack?!"
10002190-50 = "No, that was all just from the volleyball..."
10002190-55 = "Uh, good job, Tsurugi. Why don't you take the next serve too?"
10002190-62 = "Ahhh!"
10002190-67 = "How does she keep doing that?!"
10002190-68 = "Th-This was supposed to be a beach volleyball game, not a death match..."
10002190-69 = "This is capital punishment!"
10002190-71 = "We surrender! We surrenderrrrrr!"
10002190-75 = "Tsurugi continued to serve at the thugs until they were fully incapacitated."

[translation]
10002190-1 = "ย้อนวันวาน;กีฬาผาดโผน"
10002190-2 = "วอลเลย์บอลชายหาดเป็นหนึ่งในกีฬาชนิดหนึ่งที่จะแบ่งทีมละสองคนแข่งขันกันที่ชายหาด..."
10002190-3 = "แต่ว่าในชั่วโมงพละของทรีนิตี้ พวกเราเคยฝึกกันแต่วอลเลย์บอลธรรมดาที่ใช้ทีมละ 6 คนค่ะ#nฉันเลยไม่แน่ใจว่ากฎมันต่างกันรึเปล่า"
10002190-4 = "แต่ว่าแค่พวกเราคงมีคนไม่พอ..."
10002190-5 = "เพราะงั้นคราวนี้ขอรบกวนคุณแยงกี้สาวมาเล่นกับพวกเราหน่อยนะคะ!"
10002190-11 = "หา? นี่เธอจะให้พวกเราไปเล่นวอลเลย์บอลกับพวกเธองั้นเหรอ?"
10002190-12 = "แค่เพราะพวกเธอจับตัวพวกเราได้หลังจากการต่อสู้ แต่ไม่ได้หมายความว่าพวกเธอจะทรมาน#nพวกเราด้วยเกมโง่ๆ นี่ได้นะ"
10002190-13 = "พวกเราก็มีศักดิ์ศรีของแยงกี้อยู่นะฟะ...เฟ้ย!"
10002190-20 = "ฉะ...ฉันหมายถึง... ฉันอยากเล่นค่ะ! ให้พวกเราเล่นด้วยเถอะนะคะ!"
10002190-21 = "ฮ่าๆๆ... ฉะ...ฉันอยากเล่นวอลเลย์บอลชายหาดมาตลอดเลยค่ะ ว้าว~..."
10002190-22 = "วอลเลย์บอลชายหาด~ ตื่นเต้นจังเลย... ว้าว~..."
10002190-24 = "ยอมง่ายกว่าที่ฉันคิดไว้อีก..."
10002190-25 = "ขอบคุณมากๆ เลยนะคะ!"
10002190-26 = "ถ้างั้นเรามาเริ่มแข่งกันเลยดีไหมคะ?"
10002190-29 = "เราติดตั้งเน็ตเอาไว้แล้ว มาเริ่มกันเลยไหมคะ?"
10002190-30 = "ถ้างั้นคนที่เสิร์ฟ... รบกวนคุณซึรุกิด้วยนะคะ!"
10002190-36 = "ชิส์ พวกเราเป็นกลุ่มแยงกี้ที่เด็กแถวนี้กลัวกันหมดนะ ทำไมถึงเป็นแบบนี้ได้..."
10002190-37 = "ก็นะ... เรื่องวอลเลย์บอลมันจะแค่ไหนกันเชียว แค่เล่นด้วยนิดๆ หน่อยๆ แล้วชิ่งเลยน่าจะดี"
10002190-39 = "อ่า... ฝั่งนั้นเสิร์ฟแล้วล่ะ"
10002190-45 = "อ๊ากกก!"
10002190-48 = "?!"
10002190-49 = "อะไรน่ะ? การโจมตีทางอากาศเรอะ!"
10002190-50 = "ไม่สิ... นั่นก็แค่ลูกวอลเลย์ที่ฝั่งนั้นเสิร์ฟมาเฉยๆ เองนี่..."
10002190-55 = "คุณซึรุกิคะ... ลูกเสิร์ฟลูกต่อไปก็ขอฝากด้วยนะคะ"
10002190-62 = "อ๊ากกกกกกก!"
10002190-67 = "โดนอีกแล้ว!"
10002190-68 = "นะ...นี่มันไม่ใช่การเล่นวอลเลย์บอลชายหาดทั่วๆ ไปแล้ว..."
10002190-69 = "นี่มันการบุกโจมตีฝ่ายเดียวต่างหาก!"
10002190-71 = "หยุดจู่โจมกันได้แล้วเฟ้ย!"
10002190-75 = "จากนั้นกลุ่มแยงกี้สาวก็ถูกลูกเสิร์ฟต่อเนื่องของซึรุกิจนขยับตัวไม่ไหว..."

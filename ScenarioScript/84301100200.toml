[translation]
84301100200-5 = "雖然聽起來可能有點奇怪，但我可以問一件事嗎？"
84301100200-6 = "嗯？我倒是不介意……是什麼事？"
84301100200-7 = "千年博覽會的活動現場……#n有什麼地方會有很多人聚集，或者有不太安全的裝置嗎？"
84301100200-8 = "我沒有信不過千年學生的意思，#n但身為茶會的一員，我希望能比其他學生提前確認這一點。"
84301100200-9 = "如果你們能當作我比較謹慎……或者把這視為安全方面的考量，我會很感謝的。"
84301100200-10 = "會有人潮聚集，或者不安全的裝置？#n唔嗯……"
84301100200-11 = "我本來以為你會說自己想逛的地方……"
84301100200-12 = "唔嗯……"
84301100200-13 = "不好意思，我們畢竟是千年的學生兼導覽員……因此這個問題我們不方便回答。"
84301100200-14 = "啊……是我失禮了。"
84301100200-15 = "我剛才好像說錯話了，非常抱歉。"
84301100200-16 = "不，我不是那個意思……"
84301100200-18 = "因為實在太～多了！#n如果要說不安全的地方，根本不知道該從哪裡說起呀？"
84301100200-19 = "……嗯？"
84301100200-20 = "這裡可是什麼都可能發生，什麼都能鬧哄哄的千年哦？#n說不定現在早就已經開始吵鬧了呢！"
84301100200-21 = "就像前輩說的一樣……尤其在這種能展現技術的場合，#n所有社團都想表現自己的技術實力，因此有時會做出不太理智的決定。"
84301100200-22 = "雖然研討會應該想辦法調整過了，但實在很難保證大家都能乖乖聽進去……"
84301100200-23 = "所以才會讓我們負責擔任導覽，以免對三一的學生造成困擾。"
84301100200-24 = "嗯！出事的話就得解決才行！"
84301100200-26 = "造成困擾啊……這通常不是博覽會的主辦方會有的想法呢。"
84301100200-27 = "（原來如此，氣氛似乎比想像中更加自由）"
84301100200-28 = "（看來似乎很難拜託他們帶我前往特定的區域……）"
84301100200-29 = "唔嗯……"
84301100200-34 = "（也許問問普通學生會是更好的選擇）"

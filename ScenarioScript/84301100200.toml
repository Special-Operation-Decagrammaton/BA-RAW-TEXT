[translation]
84301100200-5 = "นี่อาจจะฟังดูแปลกนิดหน่อย แต่ฉันขอถามอะไรคุณอย่างหนึ่งได้มั้ยคะ?"
84301100200-6 = "หืม? ก็ได้อยู่นะ... สงสัยอะไรเหรอ?"
84301100200-7 = "ในงานมิลเลเนียม เอ็กซ์โป... มีจุดไหนที่มีคนพลุกพล่านหรือมีอุปกรณ์อะไรที่ไม่เสถียรบ้างมั้ยคะ?"
84301100200-8 = "ใช่ว่าฉันจะไม่เชื่อใจนักเรียนมิลเลเนียมหรอกนะคะ แต่ในฐานะสมาชิกสภาน้ำชาแล้ว ฉันคิดว่าจะเป็นการดีถ้าฉันตรวจสอบสิ่งนี้ได้ก่อนนักเรียนคนอื่นน่ะค่ะ"
84301100200-9 = "คิดเสียว่านี่เป็นความกังวลที่ฉันมีต่อคนอื่น... หรือคิดว่าฉันทำเพื่อให้ตัวเองวางใจก็ได้ค่ะ"
84301100200-10 = "จุดที่คนพลุกพล่านหรือมีอุปกรณ์ไม่เสถียรเหรอ? อืม"
84301100200-11 = "ถ้าเป็นจุดที่อยากไปเที่ยวชม ฉันก็พอบอกได้อยู่หรอกนะ..."
84301100200-12 = "อืม..."
84301100200-13 = "ขอโทษนะ เราเป็นทั้งนักเรียนโรงเรียนมิลเลเนียมและไกด์ในงานนี้ก็จริง แต่ถ้าถามอะไรแบบนั้นก็ตอบ#nยากอยู่นะ"
84301100200-14 = "อ่า... ฉันเสียมารยาทไปสินะคะ"
84301100200-15 = "ลืมสิ่งที่ฉันพูดไปเมื่อกี้เถอะค่ะ ขอโทษด้วยค่ะ"
84301100200-16 = "ไม่หรอก ไม่ใช่อย่างนั้น..."
84301100200-18 = "ก็เพราะว่ามันมีเยอะ~ มากต่างหากล่ะ! แค่ให้บอกว่ามีที่ไหนที่น่ากังวลใจบ้าง ฉันก็ไม่รู้ว่าต้องเริ่มจาก#nตรงไหนแล้ว"
84301100200-19 = "คะ...?"
84301100200-20 = "แต่ว่าที่นี่คือมิลเลเนียมใช่ไหมล่ะ? ที่นี่น่ะทุกอย่างระเบิดได้ และทุกอย่างก่อให้เกิดความโกลาหลได้ ไม่สิๆ บางทีตอนนี้อาจมีเรื่องโกลาหลเกิดขึ้นที่ไหนแล้วก็ได้!"
84301100200-21 = "ก็อย่างที่รุ่นพี่ว่านั่นละ... โดยเฉพาะอย่างยิ่งในห้องสาธิตเทคโนโลยี แต่ละชมรมอาจจะอยากทดลอง#nเทคโนโลยีของตัวเอง จนคิดทำอะไรเกินกำลังกันก็ได้"
84301100200-22 = "ถึงทางเซมิน่าจะเข้าไปกำชับไว้แล้ว แต่ก็รับประกันไม่ได้หรอกว่านักเรียนจะเชื่อฟังกันจนจบงาน..."
84301100200-23 = "นั่นคือเหตุผลว่าทำไมถึงต้องให้ไกด์อย่างพวกเรามาดูแลน่ะ เราจะให้นักเรียนจากโรงเรียนทรีนิตี้ได้รับ#nความเดือดร้อนไม่ได้"
84301100200-24 = "อื้อ! ถ้าเกิดอะไรขึ้น พวกเราต้องคลี่คลายให้!"
84301100200-26 = "ฉันจะเดือดร้อนงั้นเหรอคะ... ปกติแล้วเจ้าภาพงานนิทรรศการจะไม่คิดแบบนี้นี่คะ"
84301100200-27 = "เป็นอย่างนี้สินะ แต่ก็ดีจังเลยนะคะ บรรยากาศของงานดูเป็นอิสระกว่าที่คิดไว้มากเลย"
84301100200-28 = "ถ้าอย่างนั้นก็คงเป็นการยากถ้าฉันจะขอให้พวกคุณทั้งสองคนช่วยเลือกบูทที่จะไปให้..."
84301100200-29 = "อืม... "
84301100200-34 = "(ไปถามจากนักเรียนทั่วไปอาจจะดีกว่าก็ได้นะ)"

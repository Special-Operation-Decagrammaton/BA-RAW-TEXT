[translation]
84301100200-5 = "I have a strange question for you, if you don't mind."
84301100200-6 = "Huh? I don't mind. What is it?"
84301100200-7 = "In the event hall...is there any particular place where people tend to gather, or any equipment that might cause some concern?"
84301100200-8 = "Not that I don't trust the Millennium students' work, of course, but as a Tea Party member, I'd like to see such things first, before the other students do."
84301100200-9 = "Just for my own peace of mind."
84301100200-10 = "Potentially concerning equipment, and places where people gather? Hmm..."
84301100200-11 = "I thought you were here for sightseeing..."
84301100200-12 = "Hmm..."
84301100200-13 = "I'm sorry, but even for guides like us, that's a tricky question to answer."
84301100200-14 = "Ah, I didn't mean pry."
84301100200-15 = "Please disregard, with my apologies."
84301100200-16 = "No, it's not that..."
84301100200-18 = "There's just too many! Places that could be cause for concern? I wouldn't even know where to start!"
84301100200-19 = "...What?"
84301100200-20 = "This is Millennium! Anything can explode, and anything can get loud! In fact, some places are already getting loud!"
84301100200-21 = "As she said...at tech exhibition halls like these, clubs tend to go overboard, wanting to see how far they can push their technology."
84301100200-22 = "In theory, Seminar regulates and coordinates them, but they don't always listen..."
84301100200-23 = "That's why they asked us to be guides. We can't let our Trinity guests be inconvenienced in any way."
84301100200-24 = "Right. And if anything does inconvenience you, it'll be our job to take care of it."
84301100200-26 = "Your concern for my convenience is...well, it's above and beyond."
84301100200-27 = "And thank you for explaining. The place sounds like quite the free-for-all. I like it."
84301100200-28 = "I can see how that would make it hard to pinpoint any one potential flashpoint..."
84301100200-29 = "Mm... "
84301100200-34 = "(Maybe it would be better to ask a regular student.)"

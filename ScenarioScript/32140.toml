[translation]
32140-1 = "Episode 14;A Confession"
32140-2 = "Sensei's Room"
32140-5 = "Hi, Sensei... I thought you might still be awake."
32140-6 = "[s] \"Having trouble sleeping too?\""
32140-7 = "Yes. I just can't manage to fall asleep."
32140-12 = "Don't forget about me!"
32140-13 = "Hanako..."
32140-18 = "What are you all doing in here?"
32140-19 = "Shouldn't you be asleep, Koharu?"
32140-20 = "Look who's talking! Tomorrow's exam day for all of us!"
32140-21 = "She's got us there..."
32140-22 = "Azusa ran off somewhere from the looks of it too."
32140-23 = "I can get why she'd be anxious, but..."
32140-24 = "..."
32140-25 = "Actually, I went out too. I met with some of my contacts from the Sisterhood. There were a few things I was trying figure out."
32140-26 = "It's about the building where we're scheduled to have our exam."
32140-27 = "D-Don't tell me they changed the location again!"
32140-28 = "No, it's not that. I was told the entire Justice Task Force has been dispatched to defend the building."
32140-30 = "...?!"
32140-31 = "All of them...?"
32140-32 = "The Tea Party told them the building houses sensitive documents relating to the Eden Treaty and to protect it at any cost."
32140-33 = "The entire campus is under martial law. That explains why things have been so quiet."
32140-34 = "Y-You can't be serious. Nothing like this has ever happened before."
32140-35 = "No one is being allowed to enter or leave campus until the Eden Treaty has been signed."
32140-36 = "Then how are we supposed to take our exam tomorrow?!"
32140-37 = "We'll essentially have to fight the entire Justice Task Force if we want to take the exam. "
32140-38 = "No..."
32140-39 = "That can't be right... I should try contacting Hasumi."
32140-40 = "I don't think that will do any good. Hasumi and the others were likely kept in the dark about their orders' real purpose."
32140-41 = "She would be disobeying orders if she helped us. Hasumi would be expelled from the Justice Task Force at the very least."
32140-42 = "..."
32140-43 = "Nagisa is not going to relent. She will do everything in her power to have the Make-Up Work Club expelled."
32140-44 = "Is all of this really necessary? Why is she so paranoid? "
32140-49 = "It's because of me."
32140-50 = "Azusa?! Where have you been?!"
32140-51 = "..."
32140-52 = "There's something I have to tell all of you."
32140-53 = "Azusa?"
32140-54 = "..."
32140-55 = "Are you sick or something? You look so pale. "
32140-56 = "And you're shaking."
32140-57 = "There's something I've been hiding from you..."
32140-58 = "...but I can't hide it any longer."
32140-64 = "I'm the one Nagisa is looking for. I am Trinity's traitor."
32140-68 = "Huh?"
32140-69 = "What are you talking about?"
32140-70 = "..."
32140-71 = "I originally attended Arius Satellite School. I was able to infiltrate Trinity because my documents were forged."
32140-72 = "A-Arius? Infiltrated...? "
32140-73 = "..."
32140-74 = "..."
32140-75 = "Wait. What's Arius?"
32140-76 = "Arius Satellite School...was the faction that opposed the Trinity alliance when it was formed many years ago."
32140-77 = "A lot of complications arose from that, and Arius has been in hiding ever since, as I understand it."
32140-78 = "That's correct. I had never once left the Arius district in my life until I began this mission."
32140-79 = "I infiltrated Trinity at Arius' behest."
32140-81 = "My mission is...to destroy Nagisa's halo."
32140-82 = "What?! That means you're...!"
32140-83 = "Your...mission is to kill her?"
32140-84 = "..."
32140-86 = "Correct. Arius is determined to eliminate the Tea Party at all costs."
32140-87 = "Arius convinced Mika to place me at Trinity under the guise of reconciling relations between our two academies."
32140-88 = "They must have targeted her because of her inexperience and naivety. Mika isn't nearly as politically adept as Nagisa."
32140-89 = "They may have even planned to pin the blame on her after the deed was done."
32140-90 = "I've heard Arius and Trinity were mortal enemies, but I never could have imagined that something like this was being plotted in this day and age."
32140-91 = "Why tell us any of this? What's it got to do with us?"
32140-92 = "I get a lot is going on behind the scenes between Trinity and Arius, but what's it have to do with our club? "
32140-94 = "..."
32140-95 = "..."
32140-96 = "..."
32140-101 = "Arius students will advance on Trinity tomorrow morning with their sights set on Nagisa..."
32140-102 = "...and I'm going to protect her."
32140-103 = "..."
32140-104 = "Y-You're going to protect Nagisa?! But tomorrow is...! "
32140-105 = "...?!"
32140-106 = "I know, but there's no other choice. I must stop them."
32140-107 = "The campus is under martial law, but Nagisa has the entire Justice Task Force stationed at the building where we're supposed to have our exam. The main building will be practically defenseless."
32140-108 = "There's never been a better time for an attack. That's why Arius is striking now."
32140-109 = "Hanako..."
32140-110 = "Wait, something still doesn't make sense! "
32140-111 = "You said your mission was to assassinate Nagisa! Why do you suddenly want to protect her?!"
32140-113 = "That's because..."
32140-114 = "Because that's the real reason you enrolled at Trinity, isn't it?"
32140-115 = "..."
32140-116 = "You took on the mission to assassinate Nagisa because your real objective was to protect her from the very beginning. You're a double agent, aren't you?"
32140-117 = "You've been telling Arius what they want to hear, but in secret you've been preparing to betray them."
32140-122 = "So why protect Nagisa? Whose orders are you following?"
32140-123 = "No one's. This is my own decision."
32140-124 = "The Eden Treaty will fall through without Nagisa. If that happens, Kivotos will only plunge further into chaos."
32140-125 = "And more academies could suffer the same fate Arius has."
32140-126 = "Are you saying you're doing this for the sake of peace?"
32140-127 = "You're being naive. What you're attempting is as foolish as the treaty itself, Azusa."
32140-128 = "..."
32140-129 = "You're a liar and a traitor."
32140-130 = "You hid your identity from Trinity and your true intentions from Arius. You've lied to everyone around you and deceived them into thinking you're someone you're not. Isn't that right?"
32140-132 = "Hanako..."
32140-133 = "I told you before. I knew a day would come where I betray everything I've ever known—my friends, my faith, and my heart."
32140-134 = "Oh, Azusa. Why...?"
32140-135 = "As I said, I'm the traitor Nagisa has been searching for. I've put the Make-Up Work Club in grave danger."
32140-136 = "I'm sorry... I understand if you despise me—welcome it, even. Everything that's happening is my fault."
32140-137 = "[s] \"That's not true, Azusa.\""
32140-138 = "Sensei?"
32140-139 = "[s] \"We're in this crisis because Nagisa didn't trust anyone.\""
32140-140 = "..."
32140-144 = "[ns] \"If only Nagisa had trusted the four of you.\""
32140-148 = "[ns] \"And if Mika had believed in Nagisa, then...\""
32140-152 = "[ns] \"...none of this would've happened. This is where being untrusting led us.\""
32140-153 = "..."
32140-154 = "Yes, I know, Sensei. I'm actually very aware of that."
32140-155 = "I also know it's nearly impossible to change someone as jaded as Nagisa. She has no faith in anyone but herself."
32140-156 = "Yet the same can't be said about our little Azusa. She trusted us with the truth and apologized. She didn't even make excuses or become defensive when I pushed her buttons."
32140-157 = "Sorry I did that, but I couldn't help tease you when I saw your adorable and innocent expression. It was tugging on my heartstrings a little too tightly."
32140-158 = "..."
32140-159 = "It's strange. Our Make-Up Work Club has become the center stage of everything happening, and there's a great big spotlight exposing all of our dirty little secrets."
32140-160 = "Normally, you wouldn't expect a spy like Azusa to remain in the spotlight for very long."
32140-161 = "You could have disappeared without a trace weeks ago if you truly wanted to..."
32140-162 = "...and yet you didn't."
32140-163 = "..."
32140-164 = "And I think I know why..."
32140-165 = "It was because you were having so much fun."
32140-166 = "...!"
32140-167 = "You enjoyed us studying together, eating together—even doing the laundry and cleaning together. You had fun every single time."
32140-168 = "You didn't want the fun times together to end."
32140-169 = "You reveled in us all working together toward the same goal. You've had fun learning beside your clubmates and Sensei."
32140-170 = "Isn't that right, Azusa?"
32140-171 = "..."
32140-172 = "Well, I..."
32140-173 = "..."
32140-174 = "Yes. You're right."
32140-175 = "I can't think of any other explanation."
32140-176 = "I enjoyed learning new things with each of you and sharing our lives..."
32140-177 = "...and I didn't want that to change."
32140-178 = "There's still so much more to learn and places we can go together."
32140-179 = "Like the beach, festivals, and theme parks."
32140-180 = "Azusa..."
32140-181 = "..."
32140-182 = "I understand. I knew someone who felt the same way."
32140-183 = "...?"
32140-187 = "She was so talented and adept. Everyone couldn't help but adore and praise the things she did."
32140-190 = "Splendid job, Urawa! That was a complex problem."
32140-192 = "Heh heh. We could really use your support, Urawa."
32140-194 = "Why not join us, Urawa. We're the only ones who can keep the Tea Party in check."
32140-196 = "Be ready, Hanako. There will almost certainly be a seat open for you at the Tea Party next year."
32140-198 = "*sigh*"
32140-199 = "This isn't me..."
32140-201 = "All I want to do is..."
32140-203 = "She found Trinity General School to be a place replete with deception, prejudice, and hypocrisy."
32140-204 = "It was somewhere she couldn't open herself up to anyone or be her true self."
32140-206 = "..."
32140-207 = "Aren't you lonely?"
32140-209 = "..."
32140-210 = "Everything felt so meaningless to her, so she tried her hardest to drop out of the academy."
32140-211 = "For her, it was like breaking out of prison."
32140-212 = "You're a much different girl than she was, Azusa. Perhaps better, even."
32140-213 = "Come to think of it, you completing this mission would mean the end of your academy life, wouldn't it?"
32140-214 = "You enrolled under false pretenses and plan to betray the place you originally came from. You'll have nowhere to return to once this is over."
32140-215 = "Th-That hadn't even dawned on me..."
32140-216 = "..."
32140-217 = "You knew that was inevitable, yet you still worked your heart out while in the Make-Up Work Club."
32140-218 = "That other girl tanked her exams on purpose so she could run away while you dedicated yourself to the fullest."
32140-219 = "Why? Why try so hard? You said it yourself: vanitas vanitatum. Vanity of vanities—everything is in vain. "
32140-220 = "There is undoubtedly some truth in those words..."
32140-221 = "...and yet, that's not all you said. There was something else you added at the end."
32140-223 = "Yes. Even if everything is in vain, there's no reason we shouldn't give life our all."
32140-225 = "But you shouldn't allow yourself to be bullied. Even if everything is meaningless, you should never give up."
32140-227 = "It was then that the girl I spoke of realized something."
32140-228 = "She realized how much fun academy life can truly be."
32140-229 = "Cleaning the swimming pool in her underwear, going out for a midnight stroll in nothing but her swimsuit, having a symposium with her friends as they wore absolutely nothing at all... It was so much fun."
32140-230 = "That's...not how I recall most of those."
32140-231 = "It was a SWIMSUIT symposium! We were wearing our swimsuits!"
32140-232 = "So you DID clean the pool in your panties! You admit it!"
32140-234 = "Heehee. ♥"
32140-235 = "It turns out that girl isn't so different from you after all, Azusa. So, even if everything is in vain, I don't think we should give up just yet."
32140-236 = "Hanako..."
32140-237 = "Didn't you say you wanted to learn more? Discover more?"
32140-238 = "That there was so much more you wanted to experience? Like visiting the beach or staying out all night."
32140-239 = "Why give up on those dreams now?"
32140-240 = "There's no reason to. Nothing has changed."
32140-245 = "Your mission is now OUR mission. We'll protect Kirifuji Nagisa from Arius' attack."
32140-246 = "And then we're going to take our exam and pass."
32140-247 = "That witch won't have any complaints once we do that. We'll pass—even with all of the ridiculous conditions she's placed on us."
32140-248 = "It doesn't matter how many soldiers she places in front of that testing site or how many subjects the exam covers. We're each going to score a 90 or higher."
32140-249 = "Because what other choice do we have?"
32140-250 = "But...how? It should be physically impossible."
32140-251 = "Arius' attack coincides with the start of the exam."
32140-252 = "Could we maybe ask others for help...?"
32140-253 = "No."
32140-254 = "It won't be enough to help us pass our exam."
32140-255 = "If we're going to do this, we'll need to get one step ahead."
32140-256 = "Up until now, we've been playing right into our opponents' hands. This time, we're going to devise something of our own. We already have all the talent we need in this very room."
32140-262 = "A member of the Justice Task Force, a guerrilla warfare expert, a seemingly average student favored by the Tea Party, and me, someone who knows everything there is to know about Trinity."
32140-263 = "...?"
32140-264 = "F-Favored...?"
32140-265 = "...?"
32140-269 = "And to top it off, we have [USERNAME] Sensei: the ever-capable leader of Schale."
32140-270 = "[s] \"I...suppose, yeah.\""
32140-271 = "With a lineup like this..."
32140-272 = "...we could overthrow Trinity in half a day!"
32140-273 = "Wh-What?!"
32140-274 = "Who said anything about doing that?! "
32140-275 = "..."
32140-280 = "Relax. I know the plan is to take the third exam and avoid failing. ♥"
32140-281 = "I'll devise the plan. All you have to do is follow instructions and give your all."
32140-282 = "Now let's show them what we're made of!"
32140-283 = "[s] \"L-Let's goooooo?\""
32140-286 = "Next Episode;Lighting the Fuse"

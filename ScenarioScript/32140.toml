[translation]
32140-1 = "第14話;坦承"
32140-2 = "老師的房間"
32140-5 = "啊哈哈……晚安，老師。#n老師也還醒著嗎……"
32140-6 = "[s] 「日步美也睡不著嗎？」"
32140-7 = "嗯……實在是有點睡不著……"
32140-12 = "我也來了♡"
32140-13 = "花子醬……"
32140-18 = "大家在做什麼……"
32140-19 = "連小春醬都……"
32140-20 = "明天就要考試了耶！不是你們自己說休息很重要的嗎！"
32140-21 = "唔嗯，雖然是這樣沒錯……"
32140-22 = "好像連梓都不知道跑去哪了……"
32140-23 = "雖然我也懂這種緊張的感覺……"
32140-24 = "……"
32140-25 = "其實我剛才見了一下修女會的人，因為有些事情想調查……"
32140-26 = "關於我們明天要考試的第19分館……"
32140-27 = "難，難道又改地點了……！？"
32140-28 = "不，不是這樣的。#n但是之後將會有大量實現正義部的成員被派遣到那裡，目的是為了隔離整棟建築。"
32140-30 = "！！？"
32140-31 = "整棟建築……？"
32140-32 = "茶會以「保護伊甸園條約必須的重要文件」的名目，#n委託實現正義部對整棟建築進行嚴密的防守。"
32140-33 = "而且似乎還對本館發出了戒嚴令。#n從昨天開始異常安靜的原因就是這個吧。"
32140-34 = "戒，戒嚴令……我還是第一次聽到……"
32140-35 = "直到伊甸園條約締結為止，恐怕誰也無法進入那棟大樓了吧。"
32140-36 = "等，等一下！那我們明天的考試要怎麼辦！？"
32140-37 = "也就是這麼回事吧──#n如果想參加考試，就必須與實現正義部為敵……"
32140-38 = "啊……"
32140-39 = "怎，怎麼會……我，我去跟蓮實前輩說明情況……"
32140-40 = "……我想這可能很困難，小春醬。#n或許蓮實同學自己也不知道事情背後的理由吧。"
32140-41 = "而且蓮實同學要是幫助我們，就等於是違抗了茶會的命令。#n恐怕就連蓮實同學都有可能會被趕出實現正義部的。"
32140-42 = "……"
32140-43 = "這麼做的意圖很明確──渚同學打算盡一切手段讓補課部退學……"
32140-44 = "為什麼要做到這種程度……"
32140-49 = "……是我的錯。"
32140-50 = "梓醬！？你，你剛才去哪裡了……？"
32140-51 = "……"
32140-52 = "大家，我有話想說。"
32140-53 = "梓醬……？"
32140-54 = "……"
32140-55 = "梓……？怎，怎麼了？身體不舒服嗎？"
32140-56 = "梓醬在發抖……？"
32140-57 = "……我有件事情一直瞞著大家。"
32140-58 = "但事已至此，我沒辦法再隱瞞下去了……"
32140-64 = "茶會的渚在找的「三一的叛徒」就是我。"
32140-68 = "……嗯？"
32140-69 = "……咦？這，這麼突然在說什麼……？"
32140-70 = "……"
32140-71 = "我本來是奧利斯分校的學生。現在是隱藏身分潛入了三一。"
32140-72 = "奧，奧利斯？潛入……？"
32140-73 = "……"
32140-74 = "……"
32140-75 = "呃……那是什麼？奧利斯……？什麼意思？"
32140-76 = "奧利斯分校……是過去反對三一聯合的分離派學園。"
32140-77 = "聽說因為反抗引起了紛爭，在那之後就一直隱藏在奇普托斯的某處……"
32140-78 = "沒錯。我在來到這裡之前，一直都待在奧利斯的自治區裡。"
32140-79 = "我是因為奧利斯的任務才會潛入這個學園的……"
32140-81 = "那個任務就是……破壞茶會的桐藤渚的光環。"
32140-82 = "咦！？怎，怎麼會……！？"
32140-83 = "騙人的吧！？那，那也就是說……"
32140-84 = "……"
32140-86 = "奧利斯為了消滅茶會，已經做好了不擇手段的覺悟。"
32140-87 = "奧利斯首先欺騙了茶會的彌香，讓我進入了這個學園。#n雖然不知道詳情，不過想必是說了想和三一和解之類的謊言吧。"
32140-88 = "原來如此，是彌香同學……確實有人說他不擅長政治呢……"
32140-89 = "等到一切結束之後，再把所有罪推到彌香頭上……是這麼計畫的吧。"
32140-90 = "雖然我知道奧利斯憎恨著三一，但是竟然會……"
32140-91 = "等，等一下……你們在說什麼……？#n為什麼突然說一些聽起來很可怕，可是好像跟我們沒什麼關係的事……？"
32140-92 = "梓……？雖然我不知道奧利斯的事，但他們跟我們補課部有什麼關係……？"
32140-94 = "……"
32140-95 = "……"
32140-96 = "……"
32140-101 = "明天早上，奧利斯分校的學生將為以渚為目標潛入三一。"
32140-102 = "……我要保護渚才行。"
32140-103 = "……"
32140-104 = "明，明天……！？"
32140-105 = "！？"
32140-106 = "嗯，我得去阻止他們。"
32140-107 = "本館正實施戒嚴……#n渚同學又為了妨礙最後一次考試，導致實現正義部不在本館的這個時機……"
32140-108 = "原來如此，是最適合襲擊的日子呢。奧利斯的人頭腦還真不錯。"
32140-109 = "花子醬……"
32140-110 = "等，等等！這很奇怪吧！？"
32140-111 = "梓不是為了襲擊茶會而來的嗎？那說要保護又是怎麼回事？這樣不是很矛盾嗎！"
32140-113 = "那是因為……"
32140-114 = "……梓醬打從一開始，就是為了這個目的而來三一的對吧？"
32140-115 = "……"
32140-116 = "自始至終都是為了保護渚同學，所以才會參加襲擊任務……也就是雙重間諜。"
32140-117 = "作為奧利斯的聯絡人員，總是謊報沒有問題……其實正做著背叛的準備。"
32140-122 = "……為什麼會想要保護渚同學呢？那是誰的命令？"
32140-123 = "……這不是別人的命令。是我自己的判斷。"
32140-124 = "如果桐藤渚不在，伊甸園條約將會不了了之。#n如果沒有那份和平條約，將來奇普托斯的混亂恐怕會越來越嚴重。"
32140-125 = "到那個時候，很難想像不會再出現第二個奧利斯分校……"
32140-126 = "所以是為了和平，是這個意思嗎？"
32140-127 = "……還真是既天真又像是在作夢一樣的想法呢。簡直和這次條約的名字一樣空虛。"
32140-128 = "……"
32140-129 = "梓醬是騙子，還是個叛徒……"
32140-130 = "在三一隱藏自己的真實身分，在奧利斯又隱藏自己的真心。#n在梓醬身邊的全都是被梓醬騙過的人。你一直都在欺騙身邊的人……我說的沒錯吧？"
32140-132 = "花子醬……"
32140-133 = "……就像我之前說過的一樣，我會背叛大家，背叛大家的信賴……背叛大家的心。"
32140-134 = "梓，梓醬……啊嗚嗚……"
32140-135 = "總之，渚在找的「三一的叛徒」就是我。#n是因為我，補課部才會面臨這些危機。"
32140-136 = "抱歉……你們要怨恨我也沒關係。#n畢竟現在的狀況全部都是我造成的……"
32140-137 = "[s] 「不是這樣的，梓。」"
32140-138 = "……老師？"
32140-139 = "[s] 「真正的原因在於『無法相信他人』的人。」"
32140-140 = "……"
32140-144 = "[ns] 「假如渚能更相信日步美、花子、梓、蓮實還有小春……」"
32140-148 = "[ns] 「要是彌香能更相信渚……」"
32140-152 = "[ns] 「如果大家都能更信任彼此，就不會發生這種事了。」"
32140-153 = "……"
32140-154 = "您說的沒錯，老師。這點我也非常清楚。"
32140-155 = "要改變像現在的渚同學這樣，因為不願相信而無法相信的人幾乎是不可能的……"
32140-156 = "但是梓醬卻對我們說出了真心話。#n明明可以什麼也不說，卻還是跟我們道了歉。"
32140-157 = "剛才之所以那麼說，是因為看到梓醬那麼認真的表情，實在忍不住想捉弄你一下。"
32140-158 = "……"
32140-159 = "這個補課部，在某種意義上就像聚光燈下的舞台，一舉一動都在他人的注視之下。"
32140-160 = "像梓醬這樣的「間諜」……本來是不該一直待在這種受人注目的地方才對。"
32140-161 = "如果想神不知鬼不覺地消失……#n無論手段還是時機，應該都十分充足。"
32140-162 = "……但是梓醬並沒有這麼做。"
32140-163 = "……"
32140-164 = "那是因為──"
32140-165 = "──在補課部的時光實在太快樂了。"
32140-166 = "……！"
32140-167 = "大家一起唸書，一起吃飯，一起洗衣服，一起打掃……不管做什麼都是開心的事。"
32140-168 = "所以才不想要破壞這快樂的時光……"
32140-169 = "大家一起向著目標努力……#n跟日步美醬、小春醬、老師一起學習以前不知道的事物，實在是太開心了……"
32140-170 = "我有說錯嗎，梓醬？"
32140-171 = "……"
32140-172 = "那個……我……"
32140-173 = "……"
32140-174 = "……嗯。"
32140-175 = "……或許是這樣吧。"
32140-176 = "學習新知識也好，大家一起做些什麼事也好……"
32140-177 = "這些快樂的時光，我無法捨棄……"
32140-178 = "……我還有很多很多想要知道的事。"
32140-179 = "像是大海、慶典和遊樂園之類的……#n不管是想去的地方還是想知道的事都還很多……"
32140-180 = "梓醬……"
32140-181 = "……"
32140-182 = "雖然你可能會覺得我才不懂你的感受……但我懂你的心情。#n因為……我認識一個跟你很像的人。"
32140-183 = "……？"
32140-187 = "那個人……不管做什麼事都很得要領，總是受到周圍人們的稱讚……"
32140-190 = "浦和同學真的好厲害！竟然連這種問題都能輕鬆解決……！"
32140-192 = "浦和大人，您的協助對這個計劃來說是不可或缺的。呵呵……"
32140-194 = "浦和同學，要不要加入我們呢。為了牽制那個茶會，我們將──"
32140-196 = "請做好準備，浦和花子同學。明年茶會的席位幾乎已經確定會交給你了。"
32140-198 = "……唉。"
32140-199 = "我明明不是那種人……"
32140-201 = "我明明，我明明是……"
32140-203 = "對那個人來說，這個三一綜合學園是個由謊言和虛偽裝飾而成，充滿欺瞞的空間。"
32140-204 = "不管對誰都無法說出真心話，對誰都無法展現真實的自己……"
32140-206 = "……"
32140-207 = "你不覺得……這樣很孤獨嗎？"
32140-209 = "……"
32140-210 = "對那個人來說，所有事情都沒有意義……因此也想過乾脆就這麼退學。"
32140-211 = "對那個人來說，學園就和監獄沒什麼兩樣。"
32140-212 = "但是……梓醬和那個人不一樣。"
32140-213 = "梓醬在這次的事情過後，將會結束在這個學園的生活對吧？"
32140-214 = "畢竟你本來就是用偽造的文件進入三一，而且又打算背叛奧利斯……#n在計畫結束之後，你會連能夠回去的地方都沒有對吧？"
32140-215 = "啊……？這，這麼說來……"
32140-216 = "……"
32140-217 = "儘管梓醬自己心裡也明白……在補課部卻總是那麼努力。"
32140-218 = "那個人故意搞砸考試，試圖要逃離這個學園……#n而梓醬卻選擇全力享受這短暫的學園生活。"
32140-219 = "為什麼要這麼做呢？這樣做到底有什麼意義呢？"
32140-220 = "明明就像梓常說的口頭禪──[ruby=vanitas vanitatum]一切皆為徒勞[/ruby]才對呀。"
32140-221 = "然而……梓醬總是會在那句話之後再加上其他的話。"
32140-223 = "……嗯。就算一切都是徒勞，那也不能成為今天不盡力的理由。"
32140-225 = "而且雖然遇到那種事很可憐，也不能就這樣一直被他們欺負下去。#n就算只是徒勞也不應該停止反抗才對。"
32140-227 = "於是……那個人總算注意到了。"
32140-228 = "──學園生活的樂趣。"
32140-229 = "不管是穿著內衣打掃泳池、一起穿泳裝夜間散步、還是裸著互相坦承各種事情……#n和能夠展現自己一切的人們一起做這些常見的事情，竟然是這麼快樂的一件事。"
32140-230 = "等等，那時候沒有裸體吧……"
32140-231 = "散，散步的時候也不是穿泳裝唷，花子醬……！？"
32140-232 = "啊！？那個果然是內衣嗎！？"
32140-234 = "呵呵♡"
32140-235 = "就像梓醬說的一樣。#n就算一切只是徒勞，也不應該放棄抵抗。"
32140-236 = "花子……"
32140-237 = "梓醬還想要學習更多東西對吧？還想知道更多東西對吧？"
32140-238 = "你說過想和大家一起體驗各種事對吧？#n像是去海邊玩，或者在酒吧玩通宵之類的。"
32140-239 = "你要放棄這些嗎？"
32140-240 = "其實我們沒有必要放棄。#n我們的選項自始至終都只有一個。"
32140-245 = "桐藤渚同學……一起從奧利斯的襲擊中保護他吧。"
32140-246 = "然後我們再一起去考試，順利合格。"
32140-247 = "為了讓那隻小貓心服口服，他所施展的手段就維持原狀……"
32140-248 = "即便如此我們還是要到達如鐵壁般的考場，#n在時限內完成範圍巨大的考試並獲得超過90分──光明正大的及格。"
32140-249 = "這就是現在能夠拯救我們的唯一解答。"
32140-250 = "可，可是要怎麼做……？那在物理上是不可能的……"
32140-251 = "考試從9點開始，而奧利斯的作戰開始時間也同樣是9點。"
32140-252 = "找，找其他人幫忙之類的……？"
32140-253 = "不。"
32140-254 = "雖然這也是一種辦法……要讓我們順利在考試中合格，只靠這個還不夠。"
32140-255 = "必須由我們先展開行動。"
32140-256 = "雖然至今為止總是被各種謊言和策略給玩弄著……不過這次該輪到我們了。"
32140-262 = "畢竟這裡可是有著實現正義部的成員、游擊戰的達人、受到茶會偏愛的自稱普通人，以及幾乎對三一的事情瞭如指掌的人在呢。"
32140-263 = "……？"
32140-264 = "偏，偏愛……！？"
32140-265 = "……？"
32140-269 = "除此之外，還有類似萬能鑰匙的「夏萊」的[USERNAME]老師在唷？"
32140-270 = "[s] 「呃，嗯……」"
32140-271 = "有了這種組合……"
32140-272 = "……要在半天之內顛覆三一也不是不可能哦♡"
32140-273 = "咦！？咦咦！？"
32140-274 = "咦，什麼意思！？你想做什麼！？"
32140-275 = "……"
32140-280 = "只是想跟以前一樣，在第3次測驗中合格而已♡"
32140-281 = "作戰內容就由我來制定，請大家依照我的指示行動。"
32140-282 = "來，我們出發吧！"
32140-283 = "[ns] 「哦，哦哦──！？」"
32140-286 = "下一話;全面開戰"

[translation]
32140-1 = "第14話;こくはく"
32140-2 = "先生の部屋"
32140-5 = "こ、こんばんは、先生……ま、まだ起きていらっしゃいましたか。"
32140-6 = "[s] \"ヒフミも、眠れない感じ？\""
32140-7 = "は、はい……。"
32140-12 = "私も来ちゃいました♡"
32140-13 = "ハナコちゃん……。"
32140-18 = "みんな何してるの……。"
32140-19 = "コハルちゃんまで……。"
32140-20 = "明日は試験なのに、何してるのよ。休むことも大事だって言ったのはそっちでしょ……！？"
32140-21 = "まあ、そうなのですが……。"
32140-22 = "なんかアズサも、どっか行っちゃったみたいだし……。"
32140-23 = "まあ、緊張する気持ちはすごく分かるけど……。"
32140-24 = "……。"
32140-25 = "実は先ほど、シスターフッドの方々に少し会ってきたんです。色々と調べたいことがあって……。"
32140-26 = "明日、私たちが試験を受ける予定の第19分館についてなのですが……"
32140-27 = "ま、まさかまた場所が変わって……！？"
32140-28 = "いえ、そうではありません。ただそこにはこの後、かなりの数の正義実現委員が派遣されて、建物全体を隔離するとのことです。"
32140-30 = "！！？"
32140-31 = "建物全体を……？"
32140-32 = "「エデン条約に必要な重要書類を保護する」という名目でティーパーティーからの要請があり、建物全体を正義実現委員会として守る厳戒態勢に入ったとか。"
32140-33 = "それから、どうやら本館の方にも戒厳令が出ているようです。昨日から変に静かだったのは、このせいみたいですね。"
32140-34 = "か、戒厳令……そんなの聞いたの初めてです……。"
32140-35 = "恐らく、誰ひとりあの建物への出入りは許されません。エデン条約が締結されるまで、ずっと。"
32140-36 = "ちょっ、ちょっと待って！そしたら私たちの試験はどうなるの！？"
32140-37 = "……つまり、こういうことです。試験を受けたいのであれば、正義実現委員会を敵に回せ、と……。"
32140-38 = "あ……。"
32140-39 = "そ、そんな……わ、私がハスミ先輩に事情を説明して……！"
32140-40 = "……難しいと思います。ハスミさんには裏側の理由は知らされていないでしょうし。"
32140-41 = "ハスミさんが私たちを助けたら、それはティーパーティーに対する明確な離反と同義。ハスミさんも正義実現委員会から追放されてしまうのではないでしょうか。"
32140-42 = "うっ、うぅ……。"
32140-43 = "全く……どうやらナギサさんは本気で、私たちを退学にさせようとしているようですね……。"
32140-44 = "どうして、そこまで……。"
32140-49 = "……私のせいだ。"
32140-50 = "アズサちゃん！？ど、どこに行ってたんですか……？"
32140-51 = "……。"
32140-52 = "みんな、聞いて。話したいことがある。"
32140-53 = "アズサちゃん……？"
32140-54 = "……。"
32140-55 = "アズサ……？ど、どうしたの？具合でも悪いの？"
32140-56 = "アズサちゃん、身体が震えて……？"
32140-57 = "……みんなにずっと、隠していたことがあった。"
32140-58 = "でも、ここまで来たらもうこれ以上隠しておけない……。"
32140-64 = "……ティーパーティーのナギサが探してる「トリニティの裏切り者」は、私だ。"
32140-68 = "……はい？"
32140-69 = "……え？きゅ、急に何の話……？"
32140-70 = "……。"
32140-71 = "私はもともとアリウス分校の出身。今は書類上の身分を偽って、トリニティに潜入している。"
32140-72 = "あ、アリウス？潜入……？"
32140-73 = "……。"
32140-74 = "……。"
32140-75 = "えっと……何それ？アリウス……？どういうこと？"
32140-76 = "アリウス分校……かつてトリニティの連合に反対した、分派の学園です。"
32140-77 = "その反発のせいでトラブルとなり、その後はキヴォトスのどこかに身を潜めてひっそりと過ごしていると聞きましたが……。"
32140-78 = "そう。私はここに来るまで、ずっとアリウスの自治区にいた。"
32140-79 = "アリウスとしての任務を受けて、今はこうしてこの学園に潜入している……。"
32140-81 = "その任務というのは……ティーパーティーの桐藤ナギサ、彼女のヘイローを破壊すること。"
32140-82 = "……っ！？"
32140-83 = "嘘でしょ！？そ、それってつまり……。"
32140-84 = "……。"
32140-86 = "アリウスはティーパーティーを消すためなら、何でもしようという覚悟でいる。"
32140-87 = "アリウスはまずティーパーティーのメンバーであるミカを騙して、私をこの学園に入れた。詳細は知らないけれど、きっとトリニティと和解したいとか、そういう嘘をついたんだろう。"
32140-88 = "なるほど、ミカさんを……確かに彼女は政治には向いてないと言われていましたが……。"
32140-89 = "おそらくは全てが終わった後、その罪をミカさんに着せる……そういう流れを想定しているのでしょうか。"
32140-90 = "アリウスがトリニティを憎んでいることは知っていましたが、なるほど……。"
32140-91 = "ま、待って……急に何の話……？いや、嘘だとは思わないけど、別に今の私たちとは関係無いじゃん……？"
32140-92 = "アリウスのことはよく分からないけど、それが私たちの補習授業部とどういう関係があるわけ……？アズサは何で急に、そんな話をしてるの……？"
32140-94 = "……。"
32140-95 = "……。"
32140-96 = "……。"
32140-101 = "明日の朝、アリウス分校の生徒たちがナギサを狙ってトリニティに潜入する。"
32140-102 = "……私は、ナギサを守らなきゃいけない。"
32140-103 = "……。"
32140-104 = "あ、明日……！？"
32140-105 = "！？"
32140-106 = "うん、私はそれをどうにか阻止しないと。"
32140-107 = "本館には戒厳令が出ている状態……最後の試験でのナギサさんの無茶もあって、正義実現委員会は本館にいないタイミング……。"
32140-108 = "なるほど、要人襲撃には最適な日ですね。アリウスもだいぶ頭は回るようです。"
32140-109 = "ハナコちゃん……。"
32140-110 = "ま、待って！おかしくない！？"
32140-111 = "よ、よく分かんないけどアズサはティーパーティーをやっつけに来たんでしょ？なのに守るってどういうこと？話が合わないじゃん！"
32140-113 = "それは……。"
32140-114 = "……アズサちゃん[ruby=・]自[/ruby][ruby=・]身[/ruby]は、最初からその目的でトリニティに来た。そういうことですね？"
32140-115 = "……。"
32140-116 = "最初からナギサさんを守るために、ナギサさんを襲撃する任務に参加した……いわば、二重スパイ。"
32140-117 = "アリウス側には連絡係として、常に問題ないとずっと嘘の報告をしながら……本当は裏切るための準備をしていた。"
32140-122 = "……どうして、ナギサさんを守ろうとするんですか？それは、誰の命令で？"
32140-123 = "……これは誰かに命令されたわけじゃない。私自身の判断だ。"
32140-124 = "桐藤ナギサがいなければ、エデン条約は取り消しになってしまう。あの平和条約が無くなればこの先、キヴォトスの混乱はさらに深まるだろう。"
32140-125 = "その時また、アリウスのような学園が生まれないとは思えない……。"
32140-126 = "だから平和のために、ということですか？"
32140-127 = "……とっても甘くて、夢のような話ですね。今回の条約の名前と同じくらい、虚しい響きです。"
32140-128 = "……。"
32140-129 = "アズサちゃんは嘘つきで、裏切り者だった……"
32140-130 = "トリニティでも本当の姿を隠し、アリウスでも本音を隠していた。アズサちゃんの周辺には、アズサちゃんに騙された人たちしかいなかった、ずっと周りの全てをだましていた……そういうことで合ってますか？"
32140-132 = "ハナコちゃん……。"
32140-133 = "……いつか言った通りだ。私はみんなのことも、みんなの信頼も……みんなの心も、裏切ってしまうことになる、と。"
32140-134 = "アズサ、ちゃん……。"
32140-135 = "だから、彼女が探している「トリニティの裏切り者」は私。私のせいで補習授業部は、こんな危機に陥っている。"
32140-136 = "本当にごめん。私のことを恨んでほしい。今のこの状況は全て、私がもたらしたことだから……"
32140-137 = "[s] \"……それは違うよ。\""
32140-138 = "……先生？"
32140-139 = "[s] \"元々の原因はきっと、「信じられなかったこと」の方。\""
32140-140 = "……。"
32140-144 = "[ns] \"ナギサがもっとヒフミを、ハナコを、アズサを、ハスミとコハルを信じていたら。\""
32140-148 = "[ns] \"ミカがもっと、ナギサのことを信じていたら。\""
32140-152 = "[ns] \"もっとお互いがお互いを深く信じられていたら、こんなことにはならなかった。\""
32140-153 = "……。"
32140-154 = "そうですね、そうかもしれません。"
32140-155 = "今のナギサさんのように、誰も信じられなくなってしまった人を変えることは難しいです。誰かを信じるということは、元々難しいですし。"
32140-156 = "……ですがアズサちゃんは、私たちにこうして本心を語ってくれました。黙り続けることもできたはずなのに、謝ってくれました。"
32140-157 = "……ごめんなさい、先ほどのは何と言いますか、どうしても意地悪したくなってしまったんです。アズサちゃんの真っ直ぐな顔を見ていると、何だか心が落ち着かなくなってしまって。"
32140-158 = "……。"
32140-159 = "補習授業部はちょっと変わった意味で、ある種の舞台のように注目を浴びる存在として生まれました。"
32140-160 = "本来ならアズサちゃんのような「スパイ」は、こんな注目されるところに長くいてはいけないはずです。"
32140-161 = "誰にも気づかれないように消える……そういう手段やタイミングは、今までいくらでもあったはず。"
32140-162 = "……しかしアズサちゃんは、そうしませんでした。"
32140-163 = "……。"
32140-164 = "その理由を、私は知っています。"
32140-165 = "……補習授業部での時間があまりにも楽しかったから。そうではありませんか？"
32140-166 = "……！"
32140-167 = "みんなで一緒に勉強をしたり、ご飯を食べたり、お洗濯をしたり、お掃除をしたり……何をしても楽しいことばかりだったから。"
32140-168 = "だから、この楽しい時間を壊したくなかった……"
32140-169 = "目標に向かってみんなで努力すること……そしてヒフミちゃんとコハルちゃんと先生と、みんなで知らなかったことを学んでいくことが、楽しかったから……"
32140-170 = "違いますか、アズサちゃん？"
32140-171 = "……。"
32140-172 = "それは……私は……。"
32140-173 = "……。"
32140-174 = "……いや、うん。"
32140-175 = "……そうかもしれないな。"
32140-176 = "何かを学ぶということ、みんなで何かをするということ……。"
32140-177 = "その楽しい時間を、私は手放せなかった……。"
32140-178 = "……まだまだ知りたいことが、たくさんある。"
32140-179 = "海とか、お祭りとか遊園地とか……行きたいところも、知りたいこともまだまだたくさんあって……。"
32140-180 = "アズサちゃん……。"
32140-181 = "……。"
32140-182 = "何だか知ったような口をきいてしまいましたが……分かるんです、その気持ち。何せ……はい。同じように思った人が、いたんです。"
32140-183 = "……？"
32140-187 = "なぜか要領が良くて、何をしても周りからおだてられてしまうようなタイプで……。"
32140-190 = "[ruby=うらわ]浦和[/ruby]さんは、本当にすごいですね！こんな問題も簡単に解けてしまうなんて……！"
32140-192 = "浦和様、この計画にはあなたの協力が必要なんです。ふふっ……。"
32140-194 = "浦和さん、私たちと共に行きませんか。あのティーパーティーを牽制するには、私たちが――"
32140-196 = "準備をしておいてください、浦和ハナコさん。来年のティーパーティーの席は、あなたでほぼ確定ですから。"
32140-198 = "……はぁ。"
32140-199 = "私は、そんな人ではないのに……。"
32140-201 = "私は、私は……。"
32140-203 = "その人にとってトリニティ総合学園は、嘘と偽りで飾り立てられた、欺瞞に満ちた空間でした。"
32140-204 = "誰にも本心を話すことができず、誰にも本当の姿を見せることができないまま……。"
32140-206 = "……。"
32140-207 = "……それは、寂しくはないかい？"
32140-209 = "……。"
32140-210 = "その人にとって、全てのことは無意味で……学校を、辞めようとしていたんです。"
32140-211 = "何せそのままの生活を続けることは、監獄にいるのと同じでしたから。"
32140-212 = "ですが……その人とアズサちゃんは違いました。"
32140-213 = "話は一瞬変わりますが……アズサちゃんは実際に今回の事が終わったら、この学園での生活は終わってしまうんですよね？"
32140-214 = "そもそも書類を偽装して入っていたわけですし、アリウスのことも最後には裏切るのだとしたら、最終的には帰る場所も戻る場所も無いということですよね？"
32140-215 = "あっ……。"
32140-216 = "……。"
32140-217 = "それを知っていたはずなのにアズサちゃんは……補習授業部で、いつも一生懸命でした。"
32140-218 = "その人は試験をわざと台無しにして、学園から逃げようとしていたのに……一方のアズサちゃんは、短い学園生活に全力でした。"
32140-219 = "どうしてそこまでするのでしょう、そこに何の意味があるのでしょう……"
32140-220 = "アズサちゃんがいつも口癖のように言っていた通り、[ruby=vanitas vanitatum]全ては虚しいもの[/ruby]のはずなのに。"
32140-221 = "ですが同時に……アズサちゃんはその後ろに、いつも言葉を付け加えていました。"
32140-223 = "……うん。たとえ全てが虚しいことだとしても、それは今日最善を尽くさない理由にはならない。"
32140-225 = "それにあの事態は気の毒だけど、いつまでも虐げられてるだけじゃダメ。それがたとえ虚しいことであっても、抵抗し続けることを止めるべきじゃない。"
32140-227 = "そうして……ようやく、その人も気づいたんです。"
32140-228 = "……学園生活の、楽しさに。"
32140-229 = "下着姿でプール掃除をしたり、みんな水着で夜の散歩をしたり、裸で色々なことを打ち明け合ったり……自分をさらけ出せる人たちと、そういったよくあることを全力でするということが、こんなにも楽しかったんだと。"
32140-230 = "うん……いや、裸ではなかったけど……。"
32140-231 = "さ、散歩も水着ではありませんでしたよ……！？"
32140-232 = "え、やっぱりあれ下着だったの！？"
32140-234 = "ふふっ♡"
32140-235 = "……アズサちゃんの言っていた通りです。虚しいことだとしても、最後まで抵抗をやめてはいけませんね。"
32140-236 = "ハナコ……。"
32140-237 = "アズサちゃん、もっと学びたいんでしょう？もっと知りたいんでしょう？"
32140-238 = "みんなで色んなことをやってみたいって、あの時話したじゃないですか。海に遊びに行くとか、ドリンクバーで粘って夜更かしとか。"
32140-239 = "それを、諦めてしまうんですか？"
32140-240 = "……何も諦める必要はありません。"
32140-245 = "桐藤ナギサさん……彼女を、アリウスの襲撃から守りましょう。"
32140-246 = "そして私たちは私たちで無事に試験を受け、合格するのです。"
32140-247 = "後からどんな文句も言えないように、かけておいた罠はそのままに……。"
32140-248 = "それでも試験会場に辿り着き、みんなで90点以上を取って、堂々と合格するんです。"
32140-249 = "それが今の私たちにとって救いとなる、唯一の答えではありませんか？"
32140-250 = "……でも、そんなことは物理的に不可能なはず……。"
32140-251 = "試験は9時から。アリウスの作戦開始時刻もまた、同じ時間に予定されてる。"
32140-252 = "ほ、他の方たちに助けを求めるとか……？"
32140-253 = "……。"
32140-254 = "それもそうですが……私たちがしっかりと試験に合格するためには、それだけでは足りません。"
32140-255 = "……まずは、私たちの方から動きましょう。"
32140-256 = "これまで様々な嘘や策略の中で弄ばれてきましたが……今度は私たちの方から仕掛ける番です。"
32140-262 = "何せ今ここには正義実現委員会のメンバーと、ゲリラ戦の達人と、ティーパーティーの偏愛を受ける自称平凡な人と、トリニティのほぼ全てに精通した人がいます。"
32140-263 = "……？"
32140-264 = "へ、偏愛……！？"
32140-265 = "……？"
32140-269 = "その上、ちょっとしたマスターキーのような「シャーレ」の[USERNAME]先生までいるんですよ？"
32140-270 = "[s] \"ま、まあ……。\""
32140-271 = "この組み合わせであれば、きっと"
32140-272 = "……トリニティくらい、半日で転覆させられますよ♡"
32140-273 = "……はい！？"
32140-274 = "えっ、どういうこと！？何をする気！？"
32140-275 = "……。"
32140-280 = "何をするも何も、試験を受けて合格するだけです♡"
32140-281 = "作戦内容は一旦、私にお任せください。"
32140-282 = "さあ、今こそ力を合わせる時です。行きましょう！"
32140-283 = "[ns] \"えっと……と、とりあえず頑張ろう！\""
32140-286 = "次回;火蓋は切られて"

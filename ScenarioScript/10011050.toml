10011050-131 = "[s]「這種事平時會發生嗎……」"
10011050-132 = "只要使用這個忍具「聆聽筒」……！"
10011050-133 = "就能將那個讓人無法分辨椿閣下究竟是否睡著的「狸貓睡覺之術」給看破了！"
10011050-136 = "伊樹菜醬，加油……！"
10011050-137 = "很，很好！上吧伊樹菜！"
10011050-138 = "那麼……！"
10011050-141 = "呼哼，呼哼……哼嗯哼嗯。"
10011050-142 = "呼嚕……"
10011050-143 = "呼唔呼唔……"
10011050-144 = "呼嚕嚕……"
10011050-145 = "……"
10011050-146 = "…………"
10011050-152 = "就是現在！！！"
10011050-157 = "咻啪啪啪啪啪！！！"
10011050-159 = "伊樹菜成功了！"
10011050-160 = "嗯……？"
10011050-164 = "啊～恭喜～"
10011050-166 = "太，太厲害了！那是什麼技能……！"
10011050-167 = "竟然突破了睡美人的試煉！？"
10011050-168 = "那傢伙是誰！？"
10011050-169 = "伊樹菜，真厲害！"
10011050-170 = "不愧是，伊樹菜醬……！"
10011050-175 = "[ns1]「不知不覺間，伊樹菜作為一名忍者也成長了呢……！」\n[ns2]「老師我感到相當欣慰……」"
10011050-178 = "……雖然不是很清楚，不過這是該盡情誇獎的時候嗎？"
10011050-179 = "很好！那我們也……"
10011050-186 = "嗚啊啊！？嚇，嚇我一跳！？"
10011050-187 = "為，為什麼突然開槍啊！？"
10011050-189 = "嗯……"
10011050-190 = "並不是所有人都通過了，對吧……？"
10011050-191 = "……咦？"
10011050-193 = "[ns]「原來如此，那也就是說……？」"
10011050-194 = "話雖如此，既然已經有一個人突破了……"
10011050-195 = "那，就採用特別規則。"
10011050-196 = "其他人只要贏過我就算通過吧～"
10011050-197 = "那麼，第二關卡睡美人……「椿」要上囉～"

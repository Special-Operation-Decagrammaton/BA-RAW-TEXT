[translation]
10011050-1 = "ตอนที่ 5;ด่านที่ 2: องค์หญิงขี้เซา"
10011050-7 = "แฮ่ก... แฮ่ก... หลบหนีมาจนถึงนี่จนได้..."
10011050-8 = "เอาละค่ะ! คนร้ายลักพาตัวองค์หญิงยังคงลอยนวลอยู่! ใครจะเป็นผู้ที่จับคนร้ายได้เป็นคนแรกกันนะ~!"
10011050-9 = "อึก...! กะ... กำลังออกอากาศอยู่ด้วย!"
10011050-10 = "นี่มัน อะไรกัน..."
10011050-11 = "งื้ม~ อิบูกิไม่ต้องทำอะไรเลยเหรอ~?"
10011050-12 = "ชู่ววว! เงียบๆ ไปเถอะน่า! แค่วิ่งก็เหนื่อยจะแย่แล้ว!"
10011050-13 = "อ๊ะ! ไปไหนต่อ...!"
10011050-14 = "หืม~ มาทางนี้สิ~ ทางนี้"
10011050-15 = "...?!"
10011050-21 = "ถ้าเป็นตามที่หัวหน้าชมรมเทศกาลบอกจริงๆ ละก็ เราหนีมาทางนี้ก็ถูกแล้วนี่...!"
10011050-27 = "ตอนนี้มีนักเรียนหลายท่านจากเกเฮนน่าและเฮียกคิยาโคกำลังตามหาองค์หญิงที่ถูกลักพาตัวไป!"
10011050-28 = "อะฮะฮ่ะ~ แต่ผู้ที่มีความสามารถเริ่มจะโดดเด่นเตะตาแล้วนะคะ!"
10011050-29 = "หนึ่งในนั้นก็คือคนกลุ่มนี้ค่ะ!"
10011050-38 = "นักเรียนจากเฮียกคิยาโคที่เรียกตัวเองว่าชมรมวิจัยศาสตร์นินจาค่ะ!"
10011050-39 = "ถึงจะยังไม่ใช่ชมรมทางการแต่เป็นแค่การรวมกลุ่มกันก็ตาม~ ฮุฮุฮุ~"
10011050-40 = "จะเป็นยังไงต่อไปก็ขึ้นอยู่กับว่าวันนี้จะทำให้ <องค์หญิงวาราคุ> สำเร็จลุล่วงได้รึเปล่านั่นเองค่ะ~!"
10011050-41 = "อะฮะฮ่ะ~♪ จะตั้งตารอชมฝีมือเลยนะคะ~!"
10011050-43 = "นี่มันไม่ใช่การแสดงตบตาแล้ว นี่มันจะถ่ายทอดสดสถานที่เลยไม่ใช่รึไง! ทำแบบนี้ได้ด้วยเหรอ?"
10011050-44 = "[s] \"ดีแล้วละที่ตอนนี้คนอื่นยังไม่รู้เรื่อง น่าจะไม่เป็นไรหรอกใช่ไหม?\""
10011050-45 = "คะ...คือว่า ปะ... ปกติก็เป็นกิจกรรมแบบนี้อยู่แล้วละค่ะ ถะ... ถ้าไม่ถ่ายทอดสดเลย กะ... ก็จะดูน่าสงสัย#nหรือเปล่าคะ...?"
10011050-46 = "เดี๋ยวสิ ไม่ได้หมายความว่าแบบนั้น...!"
10011050-47 = "[s] (แน่นอนละ... ฟังดูมีเรื่องที่ไม่ค่อยน่าไว้ใจจริงๆ นั่นแหละ...)"
10011050-49 = "หัวหน้า! ทางนั้นค่ะ!"
10011050-50 = "อะ...อื้อ!"
10011050-51 = "(ไม่มีเวลามาลังเลแล้ว... อืม! จะมาหยุดตรงนี้ไม่ได้!)"
10011050-60 = "ขะ... แข็งแกร่งชะมัด...!!"
10011050-61 = "ไม่มีจุดอ่อนเลย...!"
10011050-62 = "...?!"
10011050-68 = "อื้อ~ ผ่านตรงนี้ไปง่ายๆ ไม่ได้หรอกนะ~"
10011050-69 = "[s] \"สึบากิเป็นผู้เฝ้าประตูคนต่อไปเหรอ...?\""
10011050-70 = "อ่า คุณครู อื้อ~ ใช่แล้ว~"
10011050-71 = "ที่นี่คือ... อืม... <ด่านเบี่ยงเบนความสนใจที่สอง : องค์หญิงขี้เซา>... ฮ้าวว"
10011050-72 = "ถ้าประมาทขึ้นมาละก็... ละก็..."
10011050-73 = "อันตราย ที่จะต้องเจอ..."
10011050-74 = "อันตราย..."
10011050-75 = "คร่อกฟี้...."
10011050-76 = "หลับไปแล้วเหรอนั่นน่ะ?!"
10011050-77 = "ฮ้าว อื้อ~ เหล่าคนร้ายที่ลักพาตัวองค์หญิงหนีไปทางนี้..."
10011050-78 = "วิธี... กฎที่จะทำให้ผ่านทางนี้ไปได้ก็ง่ายนิดเดียว"
10011050-79 = "อ๊ะ อ่อ เรียกว่าวิธีโจมตีเพื่อเบี่ยงเบนความสนใจสินะคะ...!"
10011050-80 = "อื้อ~ ถ้าผ่านเส้นทางนี้ไปได้ตอนที่ฉันกำลังนอนหลับอยู่ละก็ โอเค..."
10011050-81 = "คาเอเดะเป็นคนตั้งชื่อให้... ชื่อนั้นก็คือ... <คร่อกฟี้...> ล่ะ"
10011050-82 = "อิซุนะ! ไม่ค่อยจะเข้าใจเลยค่ะ!"
10011050-83 = "ว่าแต่... เมื่อกี้พูดๆ อยู่ก็หลับไปเลยเหรอ...? นักเรียนที่เฮียกคิยาโคเป็นแบบนี้กันหมดเลยเหรอคะ?"
10011050-84 = "[s] \"เป็นความจริงอันแสนเจ็บปวดที่ปฏิเสธไม่ได้เลย!\""
10011050-86 = "อะ...อึ่ก! การเบี่ยงเบนความสนใจขององค์หญิงขี้เซาอย่างงั้นเหรอ! คาดไม่ถึงเลย!"
10011050-87 = "มองจุดอ่อนไม่ออกเลย! ตอนนี้! หลับอยู่! หรือว่าตื่นอยู่กันแน่?!"
10011050-88 = "คร่อกฟี้...."
10011050-89 = "จังหวะนี้ละ! ไปตอนนี้เลย!"
10011050-90 = "ฮ้าาาววว?"
10011050-95 = "\"ไม่มีจุดอ่อนเลยนี่นา!!\""
10011050-96 = "หาว... กฎของการเบี่ยงเบนความสนใจครั้งนี้คือ..."
10011050-97 = "<ถ้าผ่านเส้นนี้ไปได้ระหว่างที่ฉันหลับอยู่ก็ผ่าน แต่ถ้าถูกจับได้ก่อนจะข้ามเส้นนี้ไปก็ไม่ผ่าน>"
10011050-98 = "ถ้าเป็นแบบนี้คงจะล้มเหลวกันหมดเลยนะ~ และถ้าใครทำไม่สำเร็จ ก็จะโดนอย่างนี้~"
10011050-120 = "อะ... อ๊ากกก! สมาชิกชมรมผู้รับจ้างมาจากไหนเนี่ย...!!"
10011050-122 = "นะ... นักเรียนหายไปหมดราวกับว่าถูกคลื่นซัดไปเลยนะคะ..."
10011050-123 = "[s] \"มะ... ไม่ใช่เล่นๆ เลยนะเนี่ย\""
10011050-124 = "ฮ้าววว ต่อไปตาใครละ...?"
10011050-125 = "ตะ... ต้องเผชิญหน้ากับองค์หญิงขี้เซางั้นเหรอ นี่มันคนละระดับกับตอนหัวหน้าชมรมเทศกาลเลยนี่...!"
10011050-126 = "ระ... เราไม่มีทางผ่านไปได้เลย...! ทำไมต้องเป็นตอนที่กำลังรีบแบบนี้ด้วยเนี่ย...!"
10011050-127 = "หัวหน้า! แล้วก็นายท่าน! ตรงนี้ให้เป็นหน้าที่ของอิซุนะเองค่ะ!"
10011050-128 = "อะ...อิซุนะจัง?"
10011050-129 = "อิซุนะ? มีวิธีอะไรดีๆ งั้นเหรอ?"
10011050-130 = "ใช่แล้วค่ะ! ฮิฮิฮิ! อิซุนะคิดแล้วว่าเรื่องแบบนี้อาจเกิดขึ้นได้เป็นปกติ ก็เลยเตรียมรับมือไว้แล้วค่ะ...!"
10011050-131 = "[s] \"เตรียมรับมือไว้เพราะเรื่องแบบนี้อาจเกิดขึ้นได้เป็นปกติงั้นเหรอ...\""
10011050-132 = "สิ่งนี้ค่ะ! เราจะใช้อุปกรณ์ที่จำเป็นสำหรับเหล่านินจา! นั่นก็คือ <กระบอกไม้ไผ่> ค่ะ...!"
10011050-133 = "เพื่อตรวจสอบให้แน่ใจว่าท่านสึบากิกำลังหลับอยู่จริงรึเปล่า! อิซุนะจะใช้วิชานินจา <แรคคูนที่หลับไหล> เล่นงานเองค่ะ!"
10011050-136 = "พะ... พยายามเข้านะคะ! อิซุนะจัง!"
10011050-137 = "ยะ... เยี่ยมเลย! จัดการเลย! อิซุนะ!"
10011050-138 = "ถ้างั้นก็... ย้ากกก!"
10011050-141 = "ฮึ่ม ฮึ่มมม... งืมงืม"
10011050-142 = "คร่อกฟี้..."
10011050-143 = "นินนิน..."
10011050-144 = "คร่อกฟี้..."
10011050-145 = "..."
10011050-146 = "......"
10011050-152 = "ย้าา!! อิซุนะ! มองเห็นทะลุปรุโปร่งแล้วค่ะ! ตอนนี้แหละ!"
10011050-157 = "ฉึบฉับๆ!"
10011050-159 = "อิซุนะ! ผ่านมาได้แล้วค่ะ!"
10011050-160 = "ฮ้าว...? ผ่านไปแล้วเหรอ...?"
10011050-164 = "อื้อ~ ยินดีด้วยนะ~"
10011050-166 = "สะ... สุดยอดเลย! เทคนิคเมื่อกี้มันอะไรน่ะ...!"
10011050-167 = "ผ่านการทดสอบขององค์หญิงขี้เซาไปได้จริงๆ เหรอนั่นน่ะ?!"
10011050-168 = "ใครกันน่ะ...?!"
10011050-169 = "อิซุนะ! ทำได้ดีมากเลย!"
10011050-170 = "สะ... สุดยอดไปเลยนะคะ อะ...อิซุนะจัง!"
10011050-175 = "[ns1] \"อิซุนะพัฒนาฝีมือมาจนถึงขั้นนี้แล้วสินะ...!\"\n[ns2] \"ครูรู้สึกปลื้มปริ่มใจยังไงไม่รู้...\""
10011050-178 = "คือว่า... มันใช่เวลามาตื้นตันใจเหรอคะ ตอนนี้น่ะ?"
10011050-179 = "ดีละ! อิซุนะทำสำเร็จแล้วงั้นพวกเราก็..."
10011050-186 = "อ๊ากกก?! ตะ...ตกใจหมดเลย! อะ...อะไรกันเนี่ย! จู่ๆ ก็ยิงใส่กันเลยงั้นเหรอ!"
10011050-187 = "เมื่อกี้ก็ผ่านแล้วนี่นา!"
10011050-189 = "ฮ้าาาววว~ อื้อ~ ผ่านไปได้หนึ่งคนเท่านั้นน่ะสิ~"
10011050-190 = "แต่ที่เหลือน่ะยังไม่ผ่าน..."
10011050-191 = "หืม...?"
10011050-193 = "[ns] \"หมายความว่าไงน่ะ สึบากิ?\""
10011050-194 = "แต่ก็ผ่านไปได้สำเร็จแล้วหนึ่งคน..."
10011050-195 = "ถ้างั้นจะปรับกฎการเบี่ยงเบนความสนใจให้เป็นพิเศษแล้วกัน~"
10011050-196 = "กฎก็คือคนที่เหลือต้องเอาชนะฉันถึงจะผ่านไปได้~"
10011050-197 = "เอาละ ผู้เฝ้าประตูคนที่สอง <สึบากิ> จะลุยแล้วนะคะ~"

[translation]
10011050-1 = "Episode 5; The Second Obstacle: The Sleeping Beauty"
10011050-7 = "*huff* ...We managed to escape this far."
10011050-8 = "The evil cabal that kidnapped the princess is still on the run! Who will be the first to foil their evil plans?"
10011050-9 = "But this live broadcast won't stop!"
10011050-10 = "What in the world is happening?"
10011050-11 = "Hey... Ibuki wanna do something too!"
10011050-12 = "Be quiet! This is hard enough without your nagging!"
10011050-13 = "Ugh! How do we get out?"
10011050-14 = "Hey there! This way!"
10011050-15 = "...?!"
10011050-21 = "The Festival Operations Department president said they came this way."
10011050-27 = "Countless students from both schools are in hot pursuit of the evil kidnappers as we speak!"
10011050-28 = "Meet some of the front-runners in the race!"
10011050-29 = "These girls in particular are a crowd favorite."
10011050-38 = "Introducing the Ninjutsu Research Club from Hyakkiyako!"
10011050-39 = "They're more of a social group than an official club though... Bwahaha!"
10011050-40 = "But all that could change if they can rescue Princess Waraku from the villains!"
10011050-41 = "Bwahaha! ♪ Here's to a dazzling performance!"
10011050-43 = "She's just commentating the entire thing like a sports tournament! Can she do that?!"
10011050-44 = "[s] \"It helps keep up appearances, I guess?\""
10011050-45 = "And it'd be weird if there was no commentary at all... It's supposed to be a broadcasted event..."
10011050-46 = "That's not what I'm saying!"
10011050-47 = "[s] (I have to agree though... Something seems off about the whole thing...)"
10011050-49 = "President! This way!"
10011050-50 = "Oh! Um..."
10011050-51 = "(I can't give up now! A ninja doesn't hesitate!)"
10011050-60 = "Sh-She's too strong!"
10011050-61 = "How can someone have no openings...?"
10011050-62 = "...?!"
10011050-68 = "Let's hurry this up. I'm late for my nap."
10011050-69 = "[s] \"Tsubaki is the next gatekeeper?\""
10011050-70 = "Hi, Sensei. It's me."
10011050-71 = "This is...the second obstacle, the Sleeping Beauty... *yawn*"
10011050-72 = "Don't let...your guard...Or...be..."
10011050-73 = "...Finished...off..."
10011050-74 = "Danger..."
10011050-75 = "Zzz..."
10011050-76 = "Is she...sleeping?"
10011050-77 = "*yawn* The cabal that kidnapped the princess fled through here..."
10011050-78 = "If you want to go after them, the rules are simple."
10011050-79 = "We have to pay close attention... She could give us tips."
10011050-80 = "Mm-hmm... If you can cross over this line...while I'm asleep... You're..."
10011050-81 = "Kaede...called this...\"Snooze\"..."
10011050-82 = "I'm confused!"
10011050-83 = "She fell asleep mid-sentence... Are Hyakkiyako students all just like this?"
10011050-84 = "[s] \"Unfortunately, more or less.\""
10011050-86 = "Whoa! A Sleeping Beauty attraction? I never would've thought of that!"
10011050-87 = "She has no blind spots! Is she asleep right now? Is she awake?!"
10011050-88 = "Zzz..."
10011050-89 = "Now's our chance!"
10011050-90 = "...?"
10011050-95 = "She's really unstoppable!"
10011050-96 = "Uh... The rules of this trial go like this:"
10011050-97 = "\"If you cross over the line while I'm asleep, you pass. If you're caught before you cross, you fail.\""
10011050-98 = "And you've all failed! Here's your punishment."
10011050-120 = "Holy crap! It's a horde of Labor Party members!"
10011050-122 = "Not a horde...a tsunami! They were swept away!"
10011050-123 = "[s] \"That's kind of intense for a performance.\""
10011050-124 = "*yawn* Who's up next...?"
10011050-125 = "We have to fight the Sleeping Beauty?! Why did the difficulty rise so much from the first to the second trial?"
10011050-126 = "Right when we're so close... How're we supposed to get through?"
10011050-127 = "President! My lord! I'll show my ninja powers!"
10011050-128 = "I-Izuna?"
10011050-129 = "You have a plan to beat the Sleeping Beauty?"
10011050-130 = "Yep yep! I prepared a little something special for situations just like this!"
10011050-131 = "[s] \"This is what you waste your time on...\""
10011050-132 = "Behold! A tool every self-respecting ninja should own! A hollowed bamboo barrel!"
10011050-133 = "I'll use this to employ my Sleepy Raccoon Ninjutsu technique and figure out if Tsubaki is sound asleep or not."
10011050-136 = "G-Good luck, Izuna!"
10011050-137 = "Not bad! Crush it, Izuna!"
10011050-138 = "Hiyah!"
10011050-141 = "Sneak quietly... Uh-huh, uh-huh..."
10011050-142 = "Zzz..."
10011050-143 = "Uh-huuuh."
10011050-144 = "Zzz..."
10011050-145 = "..."
10011050-146 = "..."
10011050-152 = "Now! Nin Nin Slide!"
10011050-157 = "*shuffle shuffle*"
10011050-159 = "And the winner is Izuna!"
10011050-160 = "*yawn* You...passed me?"
10011050-164 = "Hah. Congratulations!"
10011050-166 = "That technique blew my mind!"
10011050-167 = "She really managed to pass the Sleeping Beauty's trial without a scratch?"
10011050-168 = "Wh-Who is she?!"
10011050-169 = "Excellent job, Izuna!"
10011050-170 = "Izuna, you're...amazing!"
10011050-175 = "[ns1] \"Your skills have improved so much, Izuna!\"\n[ns2] \"Your lord is very proud, young ninja!\""
10011050-178 = "...Aren't you celebrating a little early?"
10011050-179 = "Great job, Izuna! Let's go on to the next station..."
10011050-186 = "Argh! Why are you shooting at us?!"
10011050-187 = "She crossed over the line, fair and square!"
10011050-189 = "...Uh-huh... She sure did..."
10011050-190 = "But did the rest of you?"
10011050-191 = "Huh?"
10011050-193 = "[ns] \"Tsubaki, that means...we all have to cross? \""
10011050-194 = "I'm teasing. Since one of you made it through..."
10011050-195 = "The obstacle's special rule kicks in!"
10011050-196 = "And that rule is, if you can beat me, you can pass!"
10011050-197 = "Here I come, the Sleeping Beauty and second gatekeeper of the Princess Waraku experience!"

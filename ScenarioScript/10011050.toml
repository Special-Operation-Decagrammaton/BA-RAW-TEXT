[translation]
10011050-1 = "第5話;第二道關卡：睡美人"
10011050-7 = "哈啊，哈啊……總算是甩掉他們了……"
10011050-8 = "綁架公主的歹徒們仍然在全力逃亡中！#n究竟誰會率先逮捕他們呢～！"
10011050-9 = "全，全都被轉播出去了的說！？"
10011050-10 = "這到底是什麼情況……"
10011050-11 = "那個～伊吹什麼都不做也可以嗎～？"
10011050-12 = "噓！安靜點！現在光顧著逃跑就很累了！"
10011050-13 = "可惡，接下來該怎麼做才好……！"
10011050-14 = "這邊這邊～"
10011050-15 = "……！？"
10011050-21 = "據他所說，犯人應該是逃到這裡沒錯……！"
10011050-27 = "來來來，正在為了尋找被綁架的公主而四處奔走的各位……"
10011050-28 = "格黑娜與百鬼夜行的學生相互合作，展現出了各自充滿個性的方方面面呢♪"
10011050-29 = "其中特別引人注目的正是這幾位～"
10011050-38 = "是「忍術研究部」的百鬼夜行學生呢～"
10011050-39 = "雖然還不是正式的社團，只是類似同好會的組織而已♪"
10011050-40 = "不過這次說不定能讓我們見識到超越同好會等級的活躍哦？"
10011050-41 = "喵哈哈♪那麼請各位繼續加油，掰囉～♪"
10011050-43 = "咦，這樣沒問題嗎……？萬魔殿的人看到不會生氣嗎……"
10011050-44 = "[s]「狀況還沒有公開，應該不要緊吧？」"
10011050-45 = "這，這本來就是那樣的活動……如果不轉播的話，說不定會更奇怪……"
10011050-46 = "唔嗯，是這麼說沒錯啦……！"
10011050-47 = "[s]（的確……有點不太對勁……）"
10011050-49 = "部長！在那裡！"
10011050-50 = "啊，嗯！"
10011050-51 = "（現在不是猶豫的時候……就算是為了大家，也不能在這裡停下腳步！）"
10011050-60 = "好，好強……！"
10011050-61 = "那是什麼，完全找不到破綻……！"
10011050-62 = "……！？"
10011050-68 = "不會讓你們輕易通過的唷～"
10011050-69 = "[s]「……椿？」"
10011050-70 = "嗨～老師～"
10011050-71 = "這裡……就是第二道關卡「睡美人」唷……呼啊……"
10011050-72 = "一個不小心……就會馬上……"
10011050-73 = "被打倒的，危險……"
10011050-74 = "危險……"
10011050-75 = "呼嚕嚕……"
10011050-76 = "睡著了！？"
10011050-77 = "嗯……？啊，話說回來，綁架公主的歹徒們已經從這裡逃走了唷……"
10011050-78 = "想通過這裡的方法──規則很簡單。"
10011050-79 = "會，會向我們說明呢……！"
10011050-80 = "嗯～只要在我睡著的期間通過這條線就OK……"
10011050-81 = "也就是說……Zzz……"
10011050-82 = "也就是什麼！？"
10011050-83 = "這是什麼情況……到底是醒著還是沒醒……百鬼夜行的學生都這樣嗎？"
10011050-84 = "[s]「無法斷言『並沒有！』……」"
10011050-86 = "唔！居然是睡美人……！"
10011050-87 = "分不清楚究竟有沒有醒著！該怎麼辦才好……！"
10011050-88 = "呼嚕嚕……"
10011050-89 = "現在！現在肯定睡著了！"
10011050-90 = "呼啊……"
10011050-95 = "「「咦咦咦！？」」"
10011050-96 = "唔嗯……這裡的規則是……"
10011050-97 = "「在睡著的時候通過這條線就合格，在通過線之前被發現就算失敗」"
10011050-98 = "所以，那邊的大家都失敗了哦～"
10011050-120 = "「「「嗚，嗚哇啊啊！……！！」」」"
10011050-122 = "大家，都被帶走，了呢……這是，強制退場嗎……"
10011050-123 = "[s]「看來不容易呢……」"
10011050-124 = "下一個挑戰者是誰……？"
10011050-125 = "這，這和剛才的關卡完全不是同一個等級……！"
10011050-126 = "明明在趕時間的說，這下該怎麼辦……！"
10011050-127 = "部長，還有主公！這裡就交給伊樹菜吧！"
10011050-128 = "伊樹菜，醬？"
10011050-129 = "……伊樹菜，你有什麼好辦法嗎？"

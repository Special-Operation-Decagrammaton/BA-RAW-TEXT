2001815-86 = "3;모에;13;그런 상황에서 진짜 격발기를 쓸 순 없으니, 예전에는 근질거리는 손을 진정시키기 위해 망가진 격발기를 피젯 토이처럼 당기곤 했었거든."
2001815-87 = "3;모에;01;그런데 생각해 보니 이왕 손을 놀릴 거라면 악력도 기르면 좋겠다 싶어서."
2001815-88 = "3;모에;02;격발기에서 뇌관을 빼고 용수철을 달아 악력기로 개조해 보았어.\n#3;em;[음표]"
2001815-89 = "3;모에;01;전에도 말했잖아? 오퍼레이터라도 SRT 대원에게 체력 단련은 중요한 일과고, 대량의 보급 업무를 처리해야 하는 보급 계원에게 악력은 특히 더 중요하니까."
2001815-90 = "3;모에;11;특히나 악력기를 당기고 나서 손이 찌르르한 느낌이 생각보다 더 파멸적이라…… 하아, 하아……\n#3;em;[하트]\n#3;stiff"

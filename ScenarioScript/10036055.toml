[translation]
10036055-3 = "ร่วงไปทุกคนเลยเหรอ... นึกว่าฉันจะเป็นฝ่ายถูกเล่นงานอยู่คนเดียวซะแล้ว..."
10036055-5 = "ดะ... เดี๋ยวก่อน! แบบนี้ไม่ได้สิ...!"
10036055-6 = "หืม? ให้แข่งกันไปก่อนเหรอ? หมายความว่ายังไงน่ะ?"
10036055-7 = "อะ... อะแฮ่ม! พายุทรายที่พัดในสนามแข่งเมื่อสักครู่ ทำให้แก๊งหมวกกันน็อกพั่บพั่บ... หืม? ใครนะ...? เด็กพาร์ทไทม์งั้นเหรอ?"
10036055-8 = "เด็กพาร์ทไทม์จากแก๊งหมวกกันน็อกพั่บพั่บกวาดผู้เข้าแข่งขันเรียบทุกคน และได้เป็นผู้ชนะครับ!"
10036055-10 = "(ม่านควันเมื่อกี้ระเบิดในจังหวะที่เหมาะเหม็งเลย แถมคนที่ฉันไม่ได้ยิงก็ลงไปนอนกองอีก...)"
10036055-11 = "(นี่มันอะไรกัน...?)"
10036055-13 = "กะ... ก่อนอื่นคงต้องเข้าไปดีใจด้วยสินะ?"
10036055-14 = "ถึงจะออกมาไม่เหมือนที่วางแผนไว้ แต่ยังไงเราก็ชนะ งั้นก็ต้อง... ฉลองสินะ?"
10036055-15 = "โธ่เอ๊ย ไม่รู้ด้วยแล้ว! ในเมื่อเป็นอย่างนี้! ก็ต้องฉลองกับเดอะแบกของวันนี้ละนะ! โยนตัวเธอขึ้นเลย!"
10036055-16 = "เฮฮฮฮ!"
10036055-21 = "ดะ... เดี๋ยวสิ ถ้าโยนกันแบบนี้ละก็...!"
10036055-31 = "มาถึงตรงนี้คงไม่โดนเห็นแล้วละ"
10036055-32 = "แหะ แหะๆ... พี่ซาโอริคงไม่รู้หรอกใช่มั้ยคะว่าพวกเราแอบช่วยน่ะ...?"
10036055-33 = "ดูจากสีหน้าแล้ว ไม่น่าจะรู้อะไรเลยนะ"
10036055-34 = "อื้ม ก็ซัตจังไม่รู้ด้วยซ้ำนี่เนอะว่าเรามาที่ชายหาดนี้น่ะ ฮุฮุ"
10036055-35 = "[s1] \"ชะ... ใช่ แน่นอนอยู่แล้ว\"\n[s2] (สะดุ้ง!)"
10036055-38 = "ตะ... แต่ยังไงพี่ซาโอริก็ชนะ ฉันมั่นใจว่าพี่ซาโอริต้องดีใจค่ะ แหะๆ... คุ้มค่าเหนื่อยอยู่นะคะ..."
10036055-39 = "ดูจากนิสัยของหัวหน้าแล้ว ฉันว่าคงจะไม่ได้ดีใจขนาดนั้นหรอก คงจะตกใจมากกว่าน่ะ"
10036055-40 = "แต่อย่างนั้นก็ถูกใจฉันดีนะ"
10036055-41 = "อื้ม นี่คงเป็นประสบการณ์แรกของซัตจังเลย ถ้าได้มองย้อนกลับไป นี่ต้องเป็นความทรงจำที่สนุก#nแน่นอนเลยละ"
10036055-42 = "ฉันดีใจนะที่ซาโอริได้มาสร้างความทรงจำดีๆ ที่ชายหาดแบบนี้"
10036055-43 = "แต่ถ้าได้อยู่กันพร้อมหน้า ก็คงดีกว่านี้เนอะ..."
10036055-44 = "[s] \"...\""
10036055-49 = "ตอนนี้พวกเราคงทำได้มากที่สุดแค่นี้น่ะ ขอบคุณที่ช่วยนะคุณครู"

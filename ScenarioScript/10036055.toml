[translation]
10036055-3 = "I thought I was dead for sure, but I'm the only one still standing..."
10036055-5 = "Th-This is not how it's supposed to go..."
10036055-6 = "What? Just go with it? What's that supposed to mean?"
10036055-7 = "Um... *ahem* As the dust clears, the Flappy Helmet Gang's, um...part-time assistant?"
10036055-8 = "The Flappy Helmet Gang's part timer has defeated everyone, and emerges victorious!"
10036055-10 = "(A smokescreen went off at just the right time, and even the ones I didn't shoot still fell...)"
10036055-11 = "(What just happened...?)"
10036055-13 = "Uh... Does this count as us winning?"
10036055-14 = "We weren't really supposed to, but...yeah, I guess?"
10036055-15 = "A win's a win, right? Hey, let's do that thing where we all lift her up!"
10036055-16 = "Wooo!"
10036055-21 = "W-Wait! If you lift me up, they're gonna...!"
10036055-31 = "...see us? No, she won't. Not this far away."
10036055-32 = "H-Heehee, do you think she knows we helped her?"
10036055-33 = "Judging by her expression, no, not at all."
10036055-34 = "Yes, she does look rather befuddled."
10036055-35 = "[s1] \"Y-Yeah.\"\n[s2] Wince in sympathy."
10036055-38 = "Well, she won, though, so I'm sure she's happy. Heehee... Wow, I feel great about all this."
10036055-39 = "Considering her personality, she's probably more flustered than happy."
10036055-40 = "Not that I'm complaining about it."
10036055-41 = "She may feel awkward about it now, but I think she'll come to look back on it fondly."
10036055-42 = "I'm glad she could make so many memories at this beach."
10036055-43 = "Though perhaps it would have been better had we all been together..."
10036055-44 = "[s] \"...\""
10036055-49 = "Nevertheless, all's well that ends well. Thank you as always for your help, Sensei."

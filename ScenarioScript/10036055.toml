[translation]
10036055-3 = "全部打倒了嗎……本來以為會被壓制住的……"
10036055-5 = "咦，咦！這樣下去不就糟了嗎……？"
10036055-6 = "嗯？先進行下去？什麼意思？"
10036055-7 = "咳，咳哼！在一陣沙塵吹過的同時，啪答啪答頭盔團的……是誰來著？#n啊？打工仔？"
10036055-8 = "啪答啪答頭盔團的打工仔成功擊敗所有人，拿下了本次大賽的勝利！"
10036055-10 = "（煙霧彈在恰到好處的時間點引爆，我沒攻擊過的人也倒地不起……）"
10036055-11 = "（這究竟是……？）"
10036055-13 = "現……現在應該要恭喜他對吧？"
10036055-14 = "雖然跟計畫不太一樣，但畢竟他都贏了……應該是吧？"
10036055-15 = "哎算了，管他的！#n來，大家快一起把今天的英雄抬起來吧！"
10036055-16 = "哦哦哦！"
10036055-21 = "等，等等，這樣把我抬起來的話……！"
10036055-31 = "躲到這裡應該不會被發現了吧。"
10036055-32 = "耶嘿嘿，沙織姐會發現有人偷偷幫他嗎……？"
10036055-33 = "看他的表情，應該是完全沒發現吧。"
10036055-34 = "嗯，畢竟他連我們在海邊的事情都不知道嘛，呵呵。"
10036055-35 = "[s1]「就，就是說啊。」\n[s2]（心慌慌……！）"
10036055-38 = "不，不過既然贏了，他應該會很高興吧。#n耶嘿嘿……真有成就感……"
10036055-39 = "以隊長的個性，說不定比起高興，更多會感到不知所措吧。"
10036055-40 = "雖然那樣我反而喜歡就是了。"
10036055-41 = "嗯，沙醬應該也是第一次有這樣的經歷。#n等他之後回想起來，這一定會是段美好的回憶吧。"
10036055-42 = "雖然能在海邊留下美好回憶是件好事……"
10036055-43 = "要是能跟我們一起就更好了……"
10036055-44 = "[s]「……」"
10036055-49 = "不過這已經是目前最好的選擇了吧。#n老師，謝謝你的幫忙。"

[translation]
1300305-1 = "ช่วงเวลาพลบค่ำ"
1300305-2 = "สวนชานเมือง สถาบันทรีนิตี้"
1300305-3 = "อุ๊ย...?"
1300305-4 = "สวัสดีค่ะคุณครู ทำไมคุณครูถึงได้..."
1300305-5 = "อ่า... ไม่มีอะไรหรอกค่ะ คุณครูมาเดินเล่นเหรอคะ"
1300305-6 = "ฉันก็มาเดินเล่นเหมือนกันค่ะ พอทำงานของชมรมเสร็จแล้วก่อนที่จะกลับหอพัก... ฉันมักจะมา#nเดินเล่นอยู่ที่สวนแห่งนี้ค่ะ"
1300305-7 = "ไม่คิดเลยว่าจะได้เจอคุณครู โชคดีจริงๆ เลยนะคะ ฮิฮิ"
1300305-8 = "[s] \"เมื่อกี้ทำอะไรอยู่เหรอ?\""
1300305-9 = "อ่า... ฉันก็แค่มาเดินเล่นฆ่าเวลาเท่านั้นค่ะ"
1300305-10 = "นี่เป็นเวลาเหมาะที่สุดที่จะมาเดินเล่นในสวนคนเดียวค่ะ"
1300305-11 = "เพราะจะนั่งเหม่อมองท้องฟ้าแบบไม่คิดอะไรก็ได้"
1300305-12 = "แล้วก็มองท้องฟ้าค่อยๆ เปลี่ยนสีในตอนที่พระอาทิตย์ลับขอบฟ้า..."
1300305-13 = "...ดูสิคะ"
1300305-14 = "เราจะได้ชื่นชมสีของท้องฟ้าแบบนี้แค่ไม่กี่นาทีเท่านั้น เพราะพระอาทิตย์ตกเร็วมากๆ เลยค่ะ"
1300305-15 = "ฉันเป็นคนพูดไม่ค่อยเก่ง แล้วก็ไม่รู้ว่าควรจะคุยเรื่องอะไรดี..."
1300305-16 = "แต่ในตอนนี้... ช่วงเวลาสั้นๆ ที่แสนมีค่านี้..."
1300305-17 = "......"
1300305-18 = "ที่ฉันพูดฟังดูเหมือนคนสูงอายุเลยใช่มั้ยคะ?"
1300305-19 = "[s] \"ไม่หรอก ไม่เป็นไร\""
1300305-20 = "ขออภัยด้วยค่ะ ฉันไม่ระวังเองค่ะ"
1300305-23 = "ถึงจะเป็นแค่ช่วงเวลาไม่นาน แต่ฉันก็อยากจะนั่งดูพร้อมกับคุณครูค่ะ"
1300305-26 = "(คุณครูนั่งมองท้องฟ้ากับฮาสุมิอยู่ในสวนจนท้องฟ้ามืดสนิทจึงกลับไปที่ชาเล่ต์)"

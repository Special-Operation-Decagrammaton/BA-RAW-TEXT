[translation]
1300305-1 = "#title;황혼의 시간"
1300305-2 = "#place;트리니티 외곽 공원"
1300305-3 = "3;하스미;02;어머……?\n#3;em;[반응]\n#3;a"
1300305-4 = "3;하스미;01;안녕하세요, 선생님. 여기는 어쩐 일로…….\n#3;greeting"
1300305-5 = "3;하스미;01;……아아. 특별한 일은 아니고. 산책 중이셨나요."
1300305-6 = "3;하스미;02;네. 저도 비슷합니다. 동아리 활동이 끝나고 기숙사로 돌아가기 전에…… #n잠깐 이렇게 시간을 내서 공원에 들렸습니다."
1300305-7 = "3;하스미;03;그런데 선생님을 만날 줄이야. 얼마나 운이 좋은 건지. 후후."
1300305-8 = "[s] \"뭐하고 있었던 거야?\""
1300305-9 = "3;하스미;02;아아. 정말로 그냥 시간을 보내고 있었을 뿐입니다."
1300305-10 = "3;하스미;03;이 시간대의 공원에는 혼자 있기에 좋거든요. \n#3;em;[음표]"
1300305-11 = "3;하스미;01;멍하니 앉아서 하늘을 보거나,"
1300305-12 = "3;하스미;99;특히 해가 질 무렵엔 하늘이 보라색으로 물들어서…… \n#3;em;[...]"
1300305-13 = "3;하스미;02;……보세요. \n#3;m5"
1300305-14 = "3;하스미;03;저런 색을 내는 시간은 몇분도 채 되지 않습니다. 금세 해가 떨어져 버리니까요.\n#3;em;[반짝]"
1300305-15 = "3;하스미;01;저는 말주변이 없어서 뭐라고 얘기해야 할지 잘 모르겠지만……."
1300305-16 = "3;하스미;99;이 순간은……. 짧지만 사치스러운……."
1300305-17 = "3;하스미;99;……."
1300305-18 = "3;하스미;04;……제가 너무 할머니처럼 말하고 있나요?"
1300305-19 = "[s] \"아니야. 괜찮아.\""
1300305-20 = "3;하스미;01;송구합니다. 제 나쁜 버릇이죠."
1300305-21 = "3;하스미;01\n#3;d\n#wait;1000"
1300305-22 = "#all;hide"
1300305-23 = "3;하스미;03;얼마되지 않는 순간이지만, 선생님과 함께 볼 수 있으면 좋을 것 같네요.\n#3;closeup\n#3;em;[반짝]\n#3;a"
1300305-24 = "3;하스미;03\n#3;closeup\n#wait;1500"
1300305-25 = "#all;hide"
1300305-26 = "#na;(주변이 캄캄해질 때까지 공원에 하스미와 함께 앉아있다가, 샬레로 돌아왔다.)"

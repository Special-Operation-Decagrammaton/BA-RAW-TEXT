[translation]
1300809-1 = "極其短暫的休息"
1300809-5 = "…… "
1300809-6 = "啊，老師。你這麼早就來了啊。"
1300809-7 = "[s1] 「茜香，還好嗎？」\n[s2] 「你好像站不太穩耶？」"
1300809-8 = "不要緊……這點程度不成……"
1300809-9 = "不要緊……這點程度不成……"
1300809-10 = "啊，嗚哇！？"
1300809-14 = "謝，謝謝你，老師。差點就跌倒了……"
1300809-15 = "沒，沒事的。可以放開我了。"
1300809-16 = "唔，嗯？臉色不好？"
1300809-17 = "只，只是有點累而已！ "
1300809-18 = "因為從昨晚到現在都沒睡……這點程度不算什麼！我沒事……！！"
1300809-19 = "[s]「從昨天開始？」"
1300809-20 = "啊……"
1300809-21 = "熬，熬夜做了巡邏的打工……"
1300809-22 = "[s]「熬夜？」"
1300809-23 = "那，那之後，在清晨做了牛奶配送……"
1300809-24 = "[s] 「一直到清晨？」"
1300809-25 = "比，比起那個，不快點整理這邊的話……會，會來不及……"
1300809-26 = "（搖晃）"
1300809-29 = "（砰咚──）"
1300809-30 = "[s] 「茜香！？」"
1300809-32 = "……"
1300809-33 = "嗚，嗚哇啊啊！？"
1300809-35 = "（驚醒）"
1300809-36 = "我，我……睡著了！？"
1300809-37 = "公園的長椅……？"
1300809-38 = "老，老師！？為什麼不把我叫醒！？打工呢？現在幾點！？"
1300809-39 = "睡，睡了多久！？呃已經下午了！"
1300809-40 = "[s3] 「冷靜下來。」\n[s4] 「我已經向打工的地方好好道歉了。」"
1300809-41 = "咦，咦咦？"
1300809-42 = "咦，咦咦？"
1300809-43 = "但，但是……可是……"
1300809-44 = "[s] 「不能太勉強唷，真的會出大事的。」"
1300809-45 = "……"
1300809-46 = "……不如說，睡，睡著的樣子被老師看到什麼的……"
1300809-47 = "變，變態！！笨蛋！！你到底要讓女高中生多難為情啊！"
1300809-49 = "……"
1300809-52 = "（唉……不過老師說的也有道理）"
1300809-53 = "（傷了健康的話，就本末倒置了……）"
1300809-54 = "（也會給大家添麻煩）"
1300809-57 = "……"
1300809-59 = "……鞦韆，以前常常坐的說。"
1300809-60 = "上次坐在這裡是什麼時候的事了呢……"
1300809-61 = "好。"
1300809-64 = "（茜香坐上了鞦韆）"
1300809-67 = "― （只能更加努力了）"
1300809-69 = "― （不能坐視這座城鎮消失……）[wa:2160] "
1300809-72 = "― 現在……還有可以依靠的大人……[wa:2200] "
1300809-75 = "― 老師，過來這邊。要和我一起坐嗎？[wa:3460] "
1300809-77 = "― ……啊哈哈，開玩笑的。再怎麼說那也是做不到的吧。[wa:2960] "
1300809-80 = "― 那個～你有在聽嗎？我現在很嚴肅呢。[wa:2940] "
1300809-82 = "― ……真是的。"
1300809-85 = "― ……嗯？辛苦了？[wa:1500] "
1300809-87 = "― 你說你很清楚我有多努力，那是怎樣……[wa:3620] "
1300809-91 = "― 你，你在說什麼！？不要突然安慰我！！[wa:2480] "
1300809-94 = "― 這，這不是那樣的，只是因為眼睛裡有灰塵……！[wa:2620] "
1300809-97 = "― （不過要不是因為老師的話……我說不定早就放棄了）[wa:5180] "
1300809-99 = "― 怎，怎麼！？為什麼那樣看著我……[wa:2360] "
1300809-102 = "― 你要推我？"
1300809-104 = "― 沒，沒關係才怪！被別人看到的話怎麼辦！[wa:2080] "
1300809-107 = "― ……什，什麼都沒有啦！！[wa:780] "
1300809-109 = "― 像，像這樣和老師單獨約會的樣子被人看到的話……[wa:2480] "
1300809-112 = "……"
1300809-113 = "今，今天謝謝你。"
1300809-114 = "要我不要勉強，我很高興唷，老師。"
1300809-115 = "相，相對的……所以說……我，我會稍微依賴你的……"
1300809-116 = "……"
1300809-117 = "不准笑！！剛才的氣氛明明就很嚴肅！"
1300809-118 = "……哈啊。果然還是不行呢，這個大人。 "
1300809-119 = "……不過，這樣才像老師吧。"
1300809-120 = "哈啊啊……嗯。休息一下感覺有好點了。"
1300809-121 = "嗯，打起精神來，明天起要繼續加油才行！"
1300809-124 = "那，回去吧，老師？"

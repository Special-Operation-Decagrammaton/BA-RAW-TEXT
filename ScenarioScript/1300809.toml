[translation]
1300809-1 = "A Brief Respite"
1300809-5 = "..."
1300809-6 = "Hey, Sensei. You're here early."
1300809-7 = "[s1] \"Are you okay, Serika?\"\n[s2] \"What's wrong? Your legs are shaking.\""
1300809-8 = "I'm okay... This is nothing..."
1300809-9 = "I'm okay... This is nothing..."
1300809-10 = "Wh-Whoa!"
1300809-14 = "Th-Thanks Sensei. I nearly fainted there."
1300809-15 = "I-I'm okay now. You don't have to hold me."
1300809-16 = "H-Hmm? I don't look so good?"
1300809-17 = "I-I'm just a little tired, that's all!"
1300809-18 = "I haven't gotten any sleep since yesterday...but I'm fine. Don't worry so much."
1300809-19 = "[s] \"Since yesterday?\""
1300809-20 = "Oh..."
1300809-21 = "Yeah. I-I worked an all-night patrol job..."
1300809-22 = "[s] \"You worked overnight?\""
1300809-23 = "A-After that, I had to go to my morning milk delivery job..."
1300809-24 = "[s] \"And you did that until dawn?\""
1300809-25 = "N-Never mind that. If we don't get to cleaning...we won't make the deadline... "
1300809-26 = "(stumble)"
1300809-29 = "*flop*"
1300809-30 = "[s] \"Serika?!\""
1300809-32 = "..."
1300809-33 = "Wh-Whoaaa!"
1300809-35 = "(stands up)"
1300809-36 = "I-I must have passed out!"
1300809-37 = "Is this a park bench? "
1300809-38 = "Wh-Why didn't you wake me up, Sensei?! What am I going to do about the job now?"
1300809-39 = "Oh, no, it's already the afternoon. How long was I out for?!"
1300809-40 = "[s3] \"Calm down.\"\n[s4] \"I already cleared things with your boss.\""
1300809-41 = "H-Huh?"
1300809-42 = "H-Huh?"
1300809-43 = "B-But...still..."
1300809-44 = "[s] \"I can't let you continue overworking yourself like this.\""
1300809-45 = "..."
1300809-46 = "I-I can't believe I passed out right in front of you..."
1300809-47 = "And you just watched me sleep, you...creepy idiot! I'm an innocent high school girl, you know!"
1300809-49 = "..."
1300809-52 = "(*sigh* Sensei is right.)"
1300809-53 = "(There's no point in working myself to the point where I'm not healthy enough to work anymore...)"
1300809-54 = "(Then I would only be a burden to everyone.)"
1300809-57 = "..."
1300809-59 = "I used to come and sit on this swing a lot."
1300809-60 = "It's been a long time, though. I can't remember how long..."
1300809-61 = "All right."
1300809-64 = "Serika sat on the swing."
1300809-67 = "― (I have to keep doing everything I can.)"
1300809-69 = "― (I don't want this town to just disappear...)[wa:920] "
1300809-72 = "― At the very least, it's nice...h-having an adult to rely on...[wa:320] "
1300809-75 = "― Sensei, come here. Wanna join me?[wa:2780] "
1300809-77 = "― Haha. I'm only kidding. I don't think it can fit both of us.[wa:1520] "
1300809-80 = "― Hey, are you listening to me? I'm serious.[wa:1940] "
1300809-82 = "― Honestly."
1300809-85 = "― Hmm? You think I've been through a lot?[wa:260] "
1300809-87 = "― You know how hard I'm trying? What do you mean...?[wa:2340] "
1300809-91 = "― What...are you talking about?! Don't try to comfort me![wa:1000] "
1300809-94 = "― It's nothing... I just have...dust in my eyes. That's it![wa:1220] "
1300809-97 = "― (But, if it weren't for Sensei...I might not have made it this far.)[wa:3420] "
1300809-99 = "― Huh...? Why are you staring?! Do I have something on my face...?[wa:440] "
1300809-102 = "― What? You wanna push the swing for me?"
1300809-104 = "― No... You don't have to do that! What if someone sees us?![wa:520] "
1300809-107 = "― I mean...there's no one around, but still![wa:10] "
1300809-109 = "― I-If people find out that I'm on a date with Sensei like this...[wa:840] "
1300809-112 = "..."
1300809-113 = "Th-Thanks for everything today."
1300809-114 = "I'll heed your advice and remember not to overwork myself, Sensei."
1300809-115 = "I-I may have to rely on you a bit, though..."
1300809-116 = "..."
1300809-117 = "Don't laugh! I'm being serious!"
1300809-118 = "*sigh* And you're supposed to be the adult here."
1300809-119 = "...Though that part of you does have its charms."
1300809-120 = "*yawn* I think I'm feeling better now that I've had some rest."
1300809-121 = "I think I should be good to go again for work tomorrow."
1300809-124 = "Ready to go, Sensei?"

[translation]
1300809-1 = "ช่วงพักผ่อนสั้นๆ"
1300809-5 = "...... "
1300809-6 = "ว่าไงคุณครู มาเร็วจัง"
1300809-7 = "[s1] \"เซริกะ ไม่เป็นไรแน่เหรอ?\"\n[s2] \"เหมือนขาจะสั่นอยู่นะ?\""
1300809-8 = "ไม่เป็นไร.... แค่นี้ไม่เท่าไหร่หรอก..."
1300809-9 = "ไม่เป็นไร.... แค่นี้ไม่เท่าไหร่หรอก..."
1300809-10 = "วะ...ว้าก?!"
1300809-14 = "ขะ...ขอบคุณนะคุณครู เกือบจะล้มไปแล้ว..."
1300809-15 = "มะ...ไม่เป็นไร ตอนนี้ปล่อยได้แล้วล่ะ"
1300809-16 = "หือ? หน้าฉันดูซีดๆ งั้นเหรอ?"
1300809-17 = "ฉะ...ฉันก็แค่เพลียนิดหน่อยเท่านั้นเอง!"
1300809-18 = "คงเพราะยังไม่ได้นอนเลยตั้งแต่เมื่อวาน... แต่ว่าแค่นี้ไม่เท่าไหร่! ไม่เป็นไรหรอก....!!"
1300809-19 = "[s] \"ตั้งแต่เมื่อวานเหรอ?\""
1300809-20 = "อ่า...."
1300809-21 = "ฉันทำงานพิเศษไปลาดตระเวนมาทั้งคืน..."
1300809-22 = "[s] \"ทั้งคืนเหรอ?\""
1300809-23 = "จะ...จากนั้นก็ไปส่งนมตอนเช้ามืด..."
1300809-24 = "[s] \"เช้ามืดเหรอ?\""
1300809-25 = "ตะ...แต่ว่าตอนนี้ถ้าไม่รีบทำความสะอาดแถวนี้ให้เสร็จ... จะ...เสร็จไม่ทันเวลาดะ...ได้"
1300809-26 = "(โซเซ)"
1300809-29 = "(ล้มฟุบ)"
1300809-30 = "[s] \"เซริกะ?!\""
1300809-32 = "....."
1300809-33 = "วะ...ว้ายยย?!"
1300809-35 = "(ลุกพรวดพราด)"
1300809-36 = "ฉะ...ฉัน...ฉันหลับไปเหรอ?!"
1300809-37 = "ที่ม้านั่งในสวนเนี่ยนะ?"
1300809-38 = "คะ...คุณครู?! ทำไมไม่ปลุกฉันล่ะ?! งานพิเศษล่ะ? จะทำยังไงดี?!"
1300809-39 = "ฉะ...ฉันหลับไปนานแค่ไหนเนี่ย??! นี่มันบ่ายแล้วนี่!"
1300809-40 = "[s3] \"ใจเย็นๆ ก่อน\"\n[s4] \"ครูไปขอโทษผู้ว่าจ้างมาแล้วล่ะ\""
1300809-41 = "หะ...หือ?"
1300809-42 = "หะ...หือ?"
1300809-43 = "เอ่อ.. คือว่า.... แต่ว่า..."
1300809-44 = "[s] \"ถ้าฝืนเดี๋ยวจะเป็นเรื่องใหญ่นะ ฝืนตัวเองมากเกินไปก็ไม่ดีหรอก\""
1300809-45 = "......"
1300809-46 = "ดะ...ดันให้คุณครูเห็นตอนที่... นอนหลับซะแล้วเหรอเนี่ย..."
1300809-47 = "โรคจิต!! คนทึ่ม!! รู้บ้างไหมว่าสำหรับเด็กผู้หญิงมันน่าอายขนาดไหน!"
1300809-49 = "....."
1300809-52 = "(เฮ้อ... แต่ที่คุณครูพูดมามันก็ถูก)"
1300809-53 = "(ถ้าสุขภาพแย่ลงล่ะก็ เหตุผลในการทำงานอาจจะกลับกันก็ได้นะ...)"
1300809-54 = "(แถมอาจจะเป็นภาระให้คนอื่นอีกด้วย)"
1300809-57 = "....."
1300809-59 = "ฮ่า... ชิงช้านี่นา เมื่อก่อนฉันเล่นบ่อยๆ เลยล่ะ"
1300809-60 = "มานั่งเล่นที่นี่ครั้งสุดท้ายเมื่อไหร่กันนะ..."
1300809-61 = "ฮึ้บ"
1300809-64 = "(เซริกะนั่งลงบนชิงช้า)"
1300809-67 = "― (เราต้องพยายามให้ถึงที่สุด)"
1300809-69 = "― (จะปล่อยให้เมืองนี้ หายไปไม่ได้เด็ดขาด...)[wa:1040] "
1300809-72 = "― ตอนนี้... ก็มีผู้ใหญ่ที่พึ่งพาได้อยู่ด้วย...[wa:1040] "
1300809-75 = "― คุณครู มานี่หน่อยสิ เล่นชิงช้าด้วยกันไหม?[wa:2460] "
1300809-77 = "― ฮ่าฮ่าฮ่า ล้อเล่นน่ะ แบบนี้มันคงจะเกินไปหน่อยสินะ[wa:1960] "
1300809-80 = "― นี่... ฟังฉันอยู่ไหม? ตอนนี้บรรยากาศตึงเครียดสุดๆ เลยนะ[wa:1420] "
1300809-82 = "― ...จริงๆ เลยเชียว"
1300809-85 = "― หือ...? \"ขอบคุณที่พยายามอย่างหนัก\" งั้นเหรอ?[wa:60] "
1300809-87 = "― นี่รู้เรื่องที่ฉันพยายามทำด้วยเหรอ อะไรกัน...[wa:2540] "
1300809-91 = "― พะ... พูดอะไรเนี่ย?! มะ...ไม่ต้องมาปลอบใจเลย!![wa:1360] "
1300809-94 = "― นะ...นี่มัน... แค่ฝุ่นเข้าตาเท่านั้นเอง...![wa:1780] "
1300809-97 = "― (แต่ว่า... ถ้าไม่มีคุณครูล่ะก็... ฉันก็คง... อาจจะยอมแพ้ไปตั้งนานแล้วก็ได้)[wa:3140] "
1300809-99 = "― วะ... ว่าไงนะ?! ทำไมถึงจ้องแบบนั้น[wa:1640] "
1300809-102 = "― จะแกว่งชิงช้าให้เหรอ?"
1300809-104 = "― มะ... ไม่เป็นไร!  ถ้ามีใครมาเห็นเข้าจะทำยังไงล่ะ![wa:880] "
1300809-107 = "― ถะ... ถึงจะไม่มีใครอยู่ก็เถอะ!![wa:20] "
1300809-109 = "― ถะ... ถ้าเกิดมีใคร... รู้เข้าว่าฉันมาเดตกับคุณครูสองคนแบบนี้จะทำยังไง[wa:640] "
1300809-112 = "......\n"
1300809-113 = "วะ...วันนี้ขอบคุณมากนะ"
1300809-114 = "ที่คุณครูบอกว่าอย่าหักโหมเกินไป ฉันจะจำเอาไว้"
1300809-115 = "ตะ...แต่ว่า... เพราะงั้น... ฉันอาจจะต้องพึ่งคุณครูนิดหน่อย..."
1300809-116 = "......"
1300809-117 = "อย่าหัวเราะสิ!! ฉันกำลังจริงจังอยู่นะ!"
1300809-118 = "เฮ้อ... ว่าแล้วเชียวว่าผู้ใหญ่ที่ปวกเปียกน่ะใช้ไม่ได้"
1300809-119 = "...... แต่ก็นะ... สมกับเป็นคุณครูนั่นล่ะ"
1300809-120 = "ฮ่าาาา พอได้งีบสักหน่อยแล้วก็รู้สึกสดชื่นขึ้นจริงๆ"
1300809-121 = "อื้อ พรุ่งนี้ก็ต้องพยายามให้มากขึ้นแล้วล่ะ"
1300809-124 = "ถ้างั้นกลับกันเลยไหมคุณครู?"

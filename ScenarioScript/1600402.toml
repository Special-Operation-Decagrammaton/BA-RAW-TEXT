[translation]
1600402-1 = "任俠道的學生"
1600402-2 = "……！！老ㄕ……不對，頭兒！"
1600402-3 = "那個，是怎樣的姿勢來著……請稍等一下！"
1600402-4 = "應該是先這樣……嘿。"
1600402-6 = "把雙手放在膝蓋上，然後彎下腰……OK！就是這個姿勢！"
1600402-7 = "呼……"
1600402-9 = "歡迎您大駕光臨，頭兒！小的菲娜向您請安！"
1600402-10 = "[s1] 「怎麼感覺好像哪裡怪怪的……」\n[s2] 「這些是從哪裡學來的……？」"
1600402-11 = "……？耶，很，很奇怪嗎？"
1600402-12 = "……？耶，很，很奇怪嗎？"
1600402-13 = "這應該不可能啊……明明和《任俠喵喵傳》裡看到的一樣才對……"
1600402-14 = "哎？您說這個嗎？哼哼～就知道你會想知道！"
1600402-15 = "鏘！"
1600402-16 = "[s] 「……任俠電影？」"
1600402-17 = "難道您有看過嗎？這真的是很棒的作品！"
1600402-18 = "我試著模仿主角的口氣說話……"
1600402-19 = "……哎？沒有看過嗎？而且覺得好像有點奇怪？"
1600402-20 = "是這樣嗎……"
1600402-21 = "哎呀！那種小事就別在意了！反正除了這個之外還有很多類似的嘛！"
1600402-22 = "總而言之就是這樣！歡迎回到「節慶營運管理部」組！頭兒！"
1600402-23 = "……咦？「頭兒」的稱呼不好嗎？您比較喜歡被稱為「老師」嗎？"
1600402-24 = "組織的名字也該像普通的組織一樣叫「管理部」就好嗎？"
1600402-25 = "可是頭兒……"
1600402-26 = "不，我不該違背頭兒的指示。"
1600402-27 = "老師你說的對！在這世界上，只要老師說烏鴉是白的，那就是白的！"
1600402-28 = "……哦哦……剛才的感覺挺好的，哼哼。"
1600402-29 = "……？"
1600402-30 = "你問我是不是在演戲……？"
1600402-31 = "……"
1600402-32 = "才，才不是演戲呢！都是真的！我，我是要成為真正的任俠……！"
1600402-33 = "為了成為任俠……所以……"
1600402-34 = "那個……"
1600402-35 = "……嘿嘿。對不起，被你說中了。"
1600402-36 = "沒錯，我是模仿電影裡演的……只是我才剛開始學，所以學的還不夠到位。"
1600402-37 = "你說為什麼要模仿……？哼哼，那不是很明顯嘛！"
1600402-38 = "當然是為了成為帥氣的任俠啦！畢竟任俠最威風了嘛！"
1600402-39 = "[s] 「『成為』任俠……？」"
1600402-40 = "我每天每天！都是靠著電影度過無數個睡不著的夜晚！"
1600402-41 = "相信著只要來到百鬼夜行，就能過得像電影中演的一樣！"
1600402-42 = "組織間的情義、斬也斬不斷的牽絆……！悲慘的結局和為了重要的人不得不做出的犧牲……！！"
1600402-43 = "這種事最棒了吧！這才是所謂的「浪漫」！！我就是為了這個才來到這裡的！！"
1600402-44 = "老師也是這麼覺得吧！？如果是老師的話應該能夠了解的！"
1600402-45 = "……？"
1600402-46 = "你說關於任俠好像搞錯了什麼……？"
1600402-47 = "是，是這樣嗎？那個，是我漏掉了哪部電影嗎？我明明已經看過所有推薦的才對呀……"
1600402-48 = "呃……你問我任俠的意思嗎？嗯──這真是困難的問題……！"
1600402-49 = "專門做那些人們不喜歡做，卻又不得不做的事情的人們……？"
1600402-50 = "遵循著「仁義」行動……那個，不對嗎……？"
1600402-51 = "[s3] 「意思大致上是沒錯……」\n[s4] 「總覺得好像誤會了什麼……」"
1600402-52 = "真奇怪……明明電影裡都是這麼說的呀……"
1600402-53 = "真奇怪……明明電影裡都是這麼說的呀……"
1600402-54 = "秉持著仁義保護他人、幫助他人……啊啊！"
1600402-55 = "那裡有個老奶奶一個人提著很重的行李！"
1600402-56 = "老奶奶！菲娜來幫你了！哎呀，您不用跟我客氣的……！"
1600402-57 = "……"
1600402-59 = "啊哈哈，我回來了。剛才那邊突然有人需要幫忙，有幫上忙真是太……"
1600402-60 = "哇啊！這次是那邊有小孩子在哭！我去安撫他一下！"
1600402-61 = "呼～……這次是真的回來……"
1600402-63 = "啊啊！那邊的學生看起來好像迷路了……！"
1600402-65 = "那裡又有一隻餓壞了的小狗狗……！！"
1600402-66 = "[s] 「……」"
1600402-69 = "……"
1600402-70 = "……呼～！這下OK了！"
1600402-71 = "對，對不起老師。我總是看到那種事就無法置之不管……"
1600402-72 = "那個，我們剛剛說到哪了呢？"
1600402-73 = "啊，任俠！是在說任俠的意思對吧……"
1600402-74 = "……已經沒關係了嗎？這是怎麼回事呢？"
1600402-75 = "你說你已經看見菲娜的任俠了……是嗎？"
1600402-76 = "那是什麼意思呢……嗯──……明明是在說菲娜的事，菲娜卻搞不太懂……"
1600402-77 = "……但既然老師都這麼說了，那應該就是這樣吧！！嘿嘿！"
1600402-78 = "總覺得有種被認可的感覺，心情真好！"
1600402-79 = "老師！往後也請在一旁看著菲娜的「任俠」喔！"
1600402-81 = "（菲娜就這樣開心地延續話題）"
1600402-82 = "（即便在我們談話的途中，每當發現有人需要幫助，菲娜便會遵循她心中的「仁義」，向他人伸出援手）"

[translation]
1600402-1 = "นักเรียนผู้รักความยุติธรรม"
1600402-2 = ".....!! อ๊ะ! คุณครู... ไม่สิ บอส!!"
1600402-3 = "เอ่อ... เดี๋ยวนะคะ... มันต้องทำท่ายังไงนะ... รอเดี๋ยวนะคะ!"
1600402-4 = "ต้องยืนตรงแบบนี้ แล้วก็..."
1600402-6 = "เอามือไปแตะเข่า แล้วก็ก้มตัวลง... ใช่เลย! แบบนี้แหละ!"
1600402-7 = "ฮู้ววว..."
1600402-9 = "มาแล้วเหรอคะบอส!? วันนี้จะสั่งให้พีน่าทำอะไรเหรอคะ?!"
1600402-10 = "[s1] \"นี่มัน... ดูแปลกๆ นะ\"\n[s2] \"ไปเรียนอะไรแบบนี้มาจากไหนน่ะ...?\""
1600402-11 = "คะ? ทำไมเหรอคะ? มันดูเก้ๆ กังๆ เหรอคะ?"
1600402-12 = "คะ? ทำไมเหรอคะ? มันดูเก้ๆ กังๆ เหรอคะ?"
1600402-13 = "ไม่น่าจะเป็นอย่างนั้นนะ... ฉันก็ทำตามฉากที่เห็นในเรื่อง <เหมียวมาเฟีย> แบบเป๊ะๆ เลยนี่นา"
1600402-14 = "สงสัยว่าคืออะไรเหรอคะ? ฮึฮึ~ คิดแล้วเชียวว่าบอสต้องสงสัย"
1600402-15 = "งั้นก็ลองดูนี่สิคะ!! นี่ไง!!"
1600402-16 = "[s] \"...หนังผู้ผดุงความยุติธรรม บลูเรย์?\""
1600402-17 = "เคยดูมาก่อนไหมคะ?? หนังเรื่องนี้สนุกมากเลยล่ะคะ!"
1600402-18 = "ลักษณะการพูดของตัวเอกมันช่าง..."
1600402-19 = "เอ๋...? ไม่เคยดูเหรอคะ? เนื้อเรื่องมันเหมือนหนังเรื่องอื่นๆ อย่างนั้นเหรอคะ?"
1600402-20 = "อย่างงั้นเหรอคะ...?"
1600402-21 = "ไม่น่า! อย่าลงรายละเอียดเยอะเลยค่ะ! หนังแนวนี้มีอีกตั้งหลายเรื่องนะคะ!"
1600402-22 = "เอาเถอะค่ะ ยังไงก็ต้อนรับเข้าสู่แก๊งจัดงานเทศกาลของเรานะคะบอส!"
1600402-23 = "คะ? ไม่อยากให้เรียกว่าบอส เพราะชอบให้เรียกว่าคุณครูมากกว่าเหรอคะ?"
1600402-24 = "แล้วก็ไม่อยากให้ใช้คำว่า 'แก๊ง' ในชื่อกลุ่มด้วยเหรอคะ?"
1600402-25 = "เรื่อง... เรื่องนี้มัน..."
1600402-26 = "อืมมม~~ ไม่ดีกว่า ฉันไม่ควรจะมาเถียงบอส... เอ้ย... ไม่ควรเถียงคุณครูน่ะค่ะ"
1600402-27 = "งั้นก็ได้ค่ะ! เพราะยังไงคุณครูก็ต้องถูกเสมออยู่แล้ว!"
1600402-28 = "โอ้ว... นี่มันดูสมจริงมากเลย! ฮุฮุ"
1600402-29 = "... เอ๋?"
1600402-30 = "คุณครูบอกว่า... ฉันกำลังเล่นละครเหรอคะ?"
1600402-31 = "......"
1600402-32 = "ไม่ใช่อย่างนั้นนะคะ! เป็นความรู้สึกจริงของฉันต่างหาก!#nฉะ.. ฉันแค่พยายามจะเป็นฮีโร่ผู้ผดุงความยุติธรรม..."
1600402-33 = "และถ้าจะเป็นแบบนั้นให้ได้... เอ่อ... อืม..."
1600402-34 = "อืม..."
1600402-35 = "แหะๆๆ แต่ถ้าคุณครูพูดแบบนั้น ฉันก็คงเลี่ยงไม่ได้"
1600402-36 = "ใช่ค่ะ ฉันยอมรับว่าทำตามหนังที่ดู... แต่ฉันยังต้องฝึกให้มากกว่านี้#nเพราะบางท่วงท่ายังดูไม่เป็นธรรมชาติเลยค่ะ"
1600402-37 = "คะ? อยากรู้ว่าทำไมฉันถึงทำแบบนี้เหรอคะ? มันก็แน่อยู่แล้วนี่คะ!"
1600402-38 = "ก็เพื่อเป็นผู้ผดุงความยุติธรรมสุดเท่น่ะสิคะ!! การได้เป็นผู้ผดุงความยุติธรรมมันเท่มากเลยนะคะ!!"
1600402-39 = "[s] \"จะเป็น… ผู้ผดุงความยุติธรรม... งั้นเหรอ…?\""
1600402-40 = "อื้ม~! ใช่ค่ะ! ฉันเปิดหนังแนวนี้ดูทุกวันเลย บางคืนก็ยิงยาวถึงเช้าเลยนะคะ!!"
1600402-41 = "และฉันก็เชื่อว่า ถ้ามายังเฮียกคิยาโคล่ะก็ ฉันจะต้องเดินทางสายฮีโร่นี้ให้ได้ค่ะ!"
1600402-42 = "ความซื่อสัตย์ของกลุ่ม! สายใยที่เหนียวแน่น! จุดจบที่น่าเศร้า และการเสียสละเพื่อคนที่รัก!"
1600402-43 = "ฟังดูโรแมนติกมากเลยว่าไหมคะ? ฉันชอบอะไรแบบนี้มากเลยล่ะ! ฉันมาที่นี่เพื่อสิ่งนี้เลยล่ะค่ะ!!"
1600402-44 = "คุณครูเข้าใจฉันใช่ไหมคะ? ฉันว่าคุณครูก็น่าจะเข้าใจนะคะ!"
1600402-45 = "หืม...?"
1600402-46 = "คุณครูคิดว่าฉันเข้าใจผิดเกี่ยวกับผู้ผดุงความยุติธรรมงั้นเหรอคะ?"
1600402-47 = "ยะ.. อย่างงั้นเหรอ? เข้าใจอะไรผิดนะ? หรือว่ายังมีหนังที่เรายังไม่เคยดู?#nแต่ที่คนอื่นแนะนำมาก็ดูหมดแล้วนี่นา..."
1600402-48 = "หรือว่าฉันจะไม่เข้าใจคำว่าผู้ผดุงความยุติธรรมนะ? อืม... มันก็คือ..."
1600402-49 = "คนที่ต้องทำงานที่คนอื่นไม่อยากทำ... ไม่ใช่เหรอคะ?"
1600402-50 = "คนที่ยึดมั่นใน 'มนุษยธรรม' และ 'ความซื่อสัตย์'... ใช่ไหมคะ?"
1600402-51 = "[s3] \"ความหมายเกือบถูกแล้ว\"\n[s4] \"เหมือนจะเข้าใจอะไรผิดอยู่นิดนึงนะ?\""
1600402-52 = "อืม... แปลกจังเลย แต่หนังทุกเรื่องที่ดูก็พูดเหมือนกันเลยนี่นา..."
1600402-53 = "อืม... แปลกจังเลย แต่หนังทุกเรื่องที่ดูก็พูดเหมือนกันเลยนี่นา..."
1600402-54 = "คนที่ปกป้องคนอื่นตามมนุษยธรรมและความซื่อสัตย์...!? อ๊ะ!"
1600402-55 = "มีคุณยายถือของหนักๆ อยู่ตรงนั้น!"
1600402-56 = "คุณยายคะ! ให้พีน่าช่วยนะคะ! ไม่เป็นไรค่ะ ฉันอยากช่วย! เอาล่ะ... ฮึบ!"
1600402-57 = "......"
1600402-59 = "แหะๆ กลับมาแล้วค่ะ พอดีเจอเรื่องที่ต้องออกไปให้ความช่วยเหลือน่ะค่ะ..."
1600402-60 = "อ๊ะ! มีเด็กร้องไห้อยู่ตรงนั้น! เดี๋ยวฉันมานะคะ ขอไปปลอบเด็กก่อน!"
1600402-61 = "ฮู้วว... กลับมาแล้วค่ะ..."
1600402-63 = "อ๊ะ! ตรงนั้นมีเด็กโรงเรียนอื่นกำลังหลงทาง...!"
1600402-65 = "ส่วนตรงนั้นมีลูกหมาที่อดข้าว...!"
1600402-66 = "[s] \"...\""
1600402-69 = "......"
1600402-70 = "ฮู้วว! จัดการหมดแล้ว!"
1600402-71 = "ขะ... ขอโทษนะคะคุณครู ถ้าเห็นคนที่ต้องการความช่วยเหลือ ฉันจะควบคุมตัวเองไม่ได้น่ะค่ะ"
1600402-72 = "ว่าแต่.. เราคุยเรื่องอะไรกันไว้เหรอคะ?"
1600402-73 = "อ้อ! จริงด้วย! เรื่องผู้ผดุงความยุติธรรม! ครูถามฉันว่ารู้ความหมายที่แท้จริงหรือเปล่า..."
1600402-74 = "...เอ๋? ไม่เป็นไรแล้วเหรอคะ? แต่ฉันยังไม่ได้ให้คำตอบไปเลยนะ..."
1600402-75 = "คะ? คุณครูได้เห็นด้วยตัวเองแล้วงั้นเหรอคะ? ได้เห็นความเป็นผู้ผดุงความยุติธรรมของพีน่าเหรอ...?"
1600402-76 = "อืม... แต่ว่าพีน่าไม่เห็นเข้าใจเลยค่ะ... นี่เป็นเรื่องของพีน่าเองแท้ๆ... แต่ก็ไม่เข้าใจที่คุณครูพูดอยู่ดี"
1600402-77 = "แต่ก็เอาเถอะค่ะ! ถ้าคุณครูพูดแบบนั้นฉันก็จะเชื่อค่ะ เพราะคุณครูต้องไม่โกหกอยู่แล้ว! ฮิฮิ"
1600402-78 = "ฉันยังไม่ได้เริ่มทำอะไรที่ยิ่งใหญ่เลย แต่พอได้รับการยอมรับจากคุณครูแบบนี้#nก็รู้สึกดีขึ้นมาเลยล่ะค่ะ!"
1600402-79 = "เป็นกำลังใจให้ผู้ผดุงความยุติธรรมคนนี้ด้วยนะคะคุณครู!"
1600402-81 = "(หลังจากนั้นพีน่าก็เริ่มชวนคุยอย่างออกรส)"
1600402-82 = "(ระหว่างนี้เมื่อเจอคนที่ต้องการความช่วยเหลือ พีน่าก็จะปรี่เข้าไปช่วยอย่างรวดเร็ว)"

1008203-11 = "#clearST"
1008203-12 = "3;렌게;04\n#3;em;[?!]\n#3;shake\n#wait;800"
1008203-13 = "3;렌게;08;아니아니, 스승님. 청춘 활동을 우습게 보면 안 된다고?\n#3;hophop"
1008203-14 = "3;렌게;06;우리 같이 청춘 활동을 제대로 해본 적 없는, 이름 그대로의 <청춘 초심자>가 준비도 없이 청춘 활동에 달려들었다간……."
1008203-15 = "[s] \"……달려들었다간?\""
1008203-16 = "3;렌게;05;미처 준비되지 못한 몸과 마음이 갑작스러운 청춘 활동으로 인해……."

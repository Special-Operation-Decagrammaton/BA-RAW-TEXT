1008203-24 = "[ns] \"미안, 렌게. 지금 우리 청춘 활동 이야기하는 거 맞지?!\""
1008203-25 = "3;렌게;03;그만큼 여기에선 주의를 기울이며 차근차근 접근할 필요가 있겠다는 이야기야.\n#3;em;[반응]"
1008203-26 = "3;렌게;99;역시 이런 점은 운동과 크게 다르지 않아. 걷기 전부터 뛰려고 하면 금방 부상을 입는 법이잖아?"
1008203-27 = "3;렌게;01;……뭐, 앞서 여러 이야기를 하긴 했지만, 그래도 걱정 마."
1008203-28 = "3;렌게;07;딱 오늘 같은 날이 올 때를 대비해서, 평소 <청춘 활동>을 하려면 무엇을 주안점으로 삼으면 좋을지. 다 계획을 세워 둔 참이니까.\n#3;em;[반짝]\n#3;greeting"

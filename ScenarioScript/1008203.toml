[translation]
1008203-1 = "สู่วัยรุ่น: นักเรียนที่ย้ายมาใหม่"
1008203-3 = "[ns] \"ที่บอกว่ากิจกรรมวัยรุ่น... สรุปแล้วต้องทำอะไรเหรอ?\""
1008203-4 = "อืม ท่านอาจารย์ถามได้ดีเลย"
1008203-5 = "ถ้าจู่ๆ ก็บอกว่า \"มาทำกิจกรรมวัยรุ่นกันเถอะ!\" แล้วควรจะเริ่มจากตรงไหน และต้องทำอะไรถึงจะดี"
1008203-6 = "สำหรับ <วัยรุ่นมือใหม่> อย่างพวกเราแล้ว นี่เป็นเรื่องมืดแปดด้านที่หาคำตอบได้ไม่ง่ายเลย"
1008203-7 = "แต่ก็นะ ถึง <กิจกรรมวัยรุ่น> จะเป็นสิ่งที่ให้คำนิยามอย่างชัดเจนได้ยาก... แต่ถ้าจะให้เปรียบเทียบก็คง เหมือนกับหมอกในยามรุ่งสางที่เราหลีกเลี่ยงไม่ได้"
1008203-8 = "[s1] \"มีชื่อตำแหน่ง 'วัยรุ่นมือใหม่' ด้วยสินะ...\"\n[s2] \"อืม... นี่เป็นเรื่องที่ต้องคิดให้ยากขนาดนั้นเลยเหรอ?\""
1008203-13 = "เดี๋ยวสิ ท่านอาจารย์ จะดูถูกกิจกรรมวัยรุ่นไม่ได้นะ มันไม่ใช่กิจกรรมที่ทำกันได้ง่ายๆ นะ"
1008203-14 = "โดยเฉพาะวัยรุ่นมือใหม่อย่างพวกเราที่ไม่เคยทำกิจกรรมวัยรุ่นอย่างจริงๆ จังๆ มาก่อน ถ้าผลีผลาม#nทำอะไรไปโดยไม่เตรียมตัวก่อนเลยละก็ มีหวังได้..."
1008203-15 = "[s] \"มีหวังได้...?\""
1008203-16 = "มีหวังได้เกิดอาการ <ช็อกจากภาวะวัยรุ่นเฉียบพลัน>"
1008203-20 = "แล้วก็ทรมานจากการทำกิจกรรมวัยรุ่นทั้งที่สภาพร่างกายและจิตใจที่ยังไม่พร้อมน่ะสิ!"
1008203-24 = "[ns] \"ขอโทษนะเรนเกะ ยังคุยเรื่องกิจกรรมวัยรุ่นอยู่ใช่มั้ย?!\""
1008203-25 = "ที่ฉันจะบอกคือเราต้องระมัดระวังและค่อยๆ ทำทีละขั้นๆ น่ะ"
1008203-26 = "เรื่องนี้ก็เหมือนกับการออกกำลังกายนั่นละ ถ้าเราลงมือวิ่งก่อนเดิน ก็อาจได้รับบาดเจ็บได้ใช่ไหมล่ะ?"
1008203-27 = "ถึงก่อนหน้านี้ฉันจะพูดไปหลายอย่างแล้ว แต่ก็ไม่ต้องห่วงนะ"
1008203-28 = "ฉันวางแผนเตรียมพร้อมสำหรับวันนี้ไว้แล้ว แผนที่ว่าถ้าจะทำ <กิจกรรมวัยรุ่น> เราควรเน้นที่อะไรดีน่ะ"
1008203-29 = "[s] \"ปกติเรนเกะเป็นคนวางแผนอะไรแบบนี้สินะ...\""
1008203-33 = "กะ... ก็มัน!"
1008203-34 = "เป็นความฝันทั้งชีวิตของฉันนี่นา มันก็ช่วยไม่ได้นี่นะ!"
1008203-35 = "เอาเถอะ! จากที่ศึกษาเรื่องวัยรุ่นในหลายๆ ด้าน ฉันก็ตระหนักอะไรได้อย่างหนี่ง"
1008203-36 = "นั่นก็คือ วัยรุ่นเป็นแนวคิดที่เริ่มและสำเร็จได้จาก <ความสัมพันธ์>"
1008203-37 = "[s] \"อืม ช่วยยกตัวอย่างให้เห็นภาพได้มั้ย...?\""
1008203-41 = "ยกตัวอย่างเช่น... ความสัมพันธ์แบบ <คู่ปรับ> ที่ใครๆ พูดถึงกัน"
1008203-42 = "เหมือนกับความสัมพันธ์ของคนสองคนที่ทะเลาะกัน คืนดีกัน แล้วก็เดินไปข้างหน้าเคียงบ่าเคียงไหล่กัน..."
1008203-43 = "วงจรของความขัดแย้งและมิตรภาพที่เกิดขึ้นระหว่างนั้น..."
1008203-44 = "นั่นละวัยรุ่น! ฉันว่ามันคงให้อารมณ์ประมาณนี้แหละ! "
1008203-45 = "[s] \"พอยกตัวอย่างก็เหมือนจะเข้าใจ... แต่ก็ไม่เข้าใจ...\""
1008203-46 = "แน่นอนว่าในความสัมพันธ์ไม่ได้มีแค่คู่ปรับเท่านั้น!"
1008203-47 = "ในโลกนี้มีความสัมพันธ์ที่หลากหลาย และมีเรื่องราวของวัยรุ่นมากมายตามจำนวนความสัมพันธ์นั้น"
1008203-48 = "และเพราะอย่างนั้น ความสัมพันธ์ที่ฉันเตรียมมาเพื่อ <กิจกรรมวัยรุ่น> ครั้งที่ 1 ที่น่าจดจำก็คือ..."
1008203-52 = "<นักเรียนที่ย้ายมาใหม่>!"
1008203-53 = "[ns] \"ยะ... ย้ายมาใหม่... ยังไงนะ?\""
1008203-55 = "เอาละ จากนี้ฉันจะเป็นนักเรียนที่ย้ายโรงเรียนมาใหม่นะ คุณครู..."
1008203-56 = "ไม่สิ ท่านอาจารย์!"
1008203-62 = "(หลังจากเรนเกะตะโกนว่า 'กิจกรรมวัยรุ่นสำหรับนักเรียนที่ย้ายมาใหม่ก็ต้องเริ่มที่อันนี้สิ!'...)"
1008203-63 = "(คุณครูกับเรนเกะก็ออกมาบนถนนที่ไม่ไกลจากห้องของชมรมเฮียกกะเรียวรันมากนัก)"
1008203-67 = "[ns] \"เรนเกะ ที่นี่เกี่ยวอะไรกับนักเรียนที่ย้ายมาใหม่เหรอ...?\""
1008203-68 = "ท่านอาจารย์ คราวก่อนฉันก็บอกไปแล้วไม่ใช่เหรอ"
1008203-69 = "กิจกรรมวัยรุ่นคือสิ่งที่เหมือนกับฉากที่อยู่ในผลงานของคุณนักเขียน <ความรักคือปลาคาร์ฟ> ไงล่ะ"
1008203-70 = "ท่านอาจารย์ก็น่าจะรู้ดีอยู่แล้วว่าผลงานแรกของคุณนักเขียน <ความรักคือปลาคาร์ฟ> คือนิยายวัยรุ่น#nที่ตัวเอกเป็นนักเรียนที่เพิ่งย้ายโรงเรียนมา แล้วต้องมาเจอเรื่องคาดไม่ถึงพร้อมกับตัวละครเอก"
1008203-71 = "[s3] \"อ่า... อืม... รู้ก็ได้\"\n[s4] \"...งั้นเหรอ?\""
1008203-74 = "ผู้มาเยือนโดยไม่คาดคิดจากต่างถิ่น... การพบกันโดยบังเอิญ... การเดินเรื่องที่ทำให้หัวใจเต้นตึกตัก ด้วยเรื่องที่คาดเดาไม่ได้ในแต่ละวัน!"
1008203-75 = "กิจกรรมวัยรุ่นของวันนี้จะเริ่มด้วยพล็อตแบบนั้นเลย "
1008203-76 = "และฉันจะขอตั้งชื่อตอนว่า <เปิดประสบการณ์นักเรียนที่ย้ายมาใหม่!>"
1008203-77 = "[s] \"...แปลว่าจะทำตามเหตุการณ์ในนิยายสินะ?\" "
1008203-78 = "ฮิฮิฮิ! ถูกต้อง! "
1008203-79 = "เข้าใจอะไรง่ายจัง! เข้าใจเรื่องอย่างทะลุปรุโปร่งในชั่วพริบตาแบบนี้ สมแล้วที่เป็นท่านอาจารย์!"
1008203-80 = "อ้อ แล้วฉันก็ไม่ลืมที่จะเตรียมอันนี้มาด้วย"
1008203-84 = "[ns] \"นี่มัน... ขนมปัง...? เรนเกะ อย่าบอกนะว่า...\""
1008203-85 = "เอาละ งั้นฉันจะไปรอที่จุดออกตัว ท่านอาจารย์ให้สัญญาณหน่อยนะ! เข้าใจใช่มั้ย?"
1008203-89 = "[ns] \"ดะ... เดี๋ยวสิ! เรนเกะ...?!\""
1008203-94 = "ดีละ... เท่านี้ก็น่าจะได้แล้วละนะ"
1008203-98 = "เตรียมขนมปังเรียบร้อย พื้นถนนก็แข็งแรงดี... อืม เหมาะกับการวิ่งจริงๆ"
1008203-102 = "สถานการณ์น่ารื่นรมย์ท่ามกลางแสงแดดที่อบอุ่นพอดี และยังมีลมพัดเอื่อยๆ ส่วนอุณหภูมิและความชื้น#nก็ไม่มีอะไรที่น่าเป็นห่วง..."
1008203-105 = "อื้ม สายลมกำลังกระซิบว่า... ถึงเวลาแห่งการเริ่ม <กิจกรรมวัยรุ่น> แล้ว!"
1008203-106 = "เหตุการณ์ที่จะขาดไปไม่ได้สำหรับนักเรียนที่เพิ่งย้ายโรงเรียนมา...!"
1008203-111 = "มาเริ่มภารกิจ <มาโรงเรียนสายตั้งแต่วันแรกยังไม่พอ ยังมาวิ่งชนกับบางคนที่หัวมุมถนน ทั้งที่ปากก็กำลังคาบขนมปังอยู่!> กันเถอะ!"
1008203-116 = "(ทันทีที่ให้สัญญาณ เรนเกะก็ออกตัววิ่งมา)"
1008203-121 = "เอาละ! คาบขนมปังไว้ แล้ววิ่งใส่เกียร์น้องหมา! "
1008203-122 = "อ้อ แล้วก็ต้องไม่ลืมบทพูดที่สำคัญด้วย...!"
1008203-123 = "\"ไม่ทันแล้ว! สายแล้ว สายแล้ว!\""
1008203-127 = "ฮุฮุ! จะถึงคิวท่านอาจารย์ต้องพูดแล้วนะ...!"
1008203-133 = "[ns] \"ท่าทางน่ากลัวจัง...?! ถ้าตรงเข้ามาอย่างนี้ละก็...!\""
1008203-137 = "ย้ากกกก!"
1008203-138 = "(ไม่กี่วินาทีก่อนถูกเข้าปะทะ)"
1008203-143 = "[ns] \"เฮือก! เปิดใช้สกิลหลบหลีกฉุกเฉิน!\""
1008203-150 = "เดี๋ยวสิ! คุณครู! นี่มันจุดสำคัญเลยนะ หลบทำไมล่ะ?!"
1008203-151 = "ต้องเริ่มจากการชนกับนักเรียนที่ย้ายมาใหม่ แล้วสร้างความประทับใจจนลืมไม่ลงต่างหาก!"
1008203-152 = "[s5] \"ถ้าชนกัน ไม่น่ามีอะไรที่ประทับใจจนลืมไม่ลงนะ...\"\n[s6] \"ถ้าชนกันคงตัวเขียวตัวช้ำแน่ๆ!\""
1008203-157 = "อะ... อืม... งะ... งั้นเหรอ?"
1008203-158 = "[s] \"มันอันตรายนะ ครูไม่เอาด้วยหรอก! ไปฉากต่อไปเถอะ!\""
1008203-159 = "ก็ได้... ถ้าคุณครูว่าอย่างนั้น..."
1008203-160 = "ลูกศิษย์มีหน้าที่ต้องเชื่อฟังคุณครู... ไม่สิ ท่านอาจารย์อยู่แล้ว!"
1008203-161 = "อื้ม งั้นก็ไปที่ฉากต่อไปกันเลย! "
1008203-163 = "(และฉากต่อไปของ <นักเรียนที่ย้ายมาใหม่> ที่เรนเกะพูดถึงก็มีเนื้อหาดังนี้)"
1008203-165 = "หลังจากเจอกันครั้งแรกในฉากวิ่งชนพร้อมขนมปังไปแล้ว ต่อไปก็ต้องเป็น..."
1008203-166 = "ระหว่างที่ฉันอยู่ในห้องเรียนอย่างสงบเสงี่ยม..."
1008203-171 = "[ns] \"สวัสดี... ฉันคือเด็กที่ย้ายมาใหม่...\""
1008203-175 = "เดี๋ยวนะ...! นี่เธอ! คนที่วิ่งชน... ไม่สิ ยังไม่ได้ชน... คนที่เจอตรงหัวมุมถนนเมื่อกี้...!"
1008203-176 = "ตอนนั้นถึงฉันจะไม่คิดอะไรก็เถอะ แต่ครั้งหน้าฉันจะไม่ปล่อยไปอีกแน่!"
1008203-177 = "[s] \"แบบนั้นเหมือนพูดกับศัตรูมากกว่าพูดกับเพื่อนที่ย้ายมาใหม่นะ!\""
1008203-179 = "การพบกันครั้งที่สองกับนักเรียนที่ย้ายมาใหม่ตรงมุมหน้าต่างในห้องเรียน..."
1008203-180 = "และต่อไปก็คือ..."
1008203-182 = "ว่าไงนะ?!"
1008203-183 = "เพิ่งย้ายมาวันแรกก็ลืมเอาหนังสือเรียนมาเลยงั้นเหรอ?"
1008203-184 = "เฮ้อ...! งั้นก็ช่วยไม่ได้!"
1008203-185 = "เลื่อนโต๊ะของเธอมาติดกับฉันก็แล้วกัน"
1008203-191 = "ฉะ... ฉันให้ยืมดูหนังสือแค่วันนี้วันเดียวนะ!"
1008203-192 = "อ้อ ขอบอกไว้ก่อนแล้วกัน ว่าถ้าเลยเขตของโต๊ะมา..."
1008203-196 = "ฉันจะใช้แรงทั้งหมดที่มีทุบโต๊ะให้แหลกเลย ถ้าไม่เชื่อจะลองดูก็ได้"
1008203-197 = "[s] \"ปกติแล้วเวลาแบบนี้ต้องทำตัวอ่อนโยนไม่ใช่เหรอ?!\""
1008203-199 = "เอ๋? งะ... งั้นเหรอ? ฉันไม่เคยมีประสบการณ์มาก่อน กะ... ก็เลยไม่รู้"
1008203-200 = "แต่ว่า... ถ้านักเรียนใหม่รุกล้ำเข้ามาในเขตของฉัน บอกตามตรงมันก็เป็นเรื่องที่ยอมไม่ได้... ไม่ใช่รึไง?"
1008203-201 = "ถ้าเกิดจู่ๆ มีใครรุกล้ำเข้ามาในพื้นที่ของฉัน... มันก็น่าหงุดหงิดอยู่แล้วไม่ใช่รึไง"
1008203-202 = "[s] \"มันก็ดูเป็นเรนเกะอยู่หรอกนะ...\""
1008203-208 = "(คุณครูกับเรนเกะตีบทแตกอยู่ด้วยกันอีกหลายฉาก โดยที่ในใจคุณครูก็ยังสงสัยว่าเรื่องราวของนักเรียน#nที่ย้ายมามันควรจะเป็นแบบนี้จริงๆ หรือเปล่า)"
1008203-210 = "(เวลาผ่านไปอย่างรวดเร็วจนถึงตอนที่พระอาทิตย์ลับขอบฟ้าไป)"
1008203-216 = "[ns7] \"อยู่กันจนถึงเย็นเลยนะ เป็นไงบ้าง เรนเกะ?\"\n[ns8] \"พอจะเป็นกิจกรรมวัยรุ่นที่ต้องการไหม?\""
1008203-221 = "อืม... ถ้าจะให้พูดตามตรง..."
1008203-222 = "มัน... บอกไม่ถูกน่ะ"
1008203-226 = "มะ... ไม่นะ ฉันไม่ได้ไม่พอใจอะไรท่านอาจารย์หรอกนะ!"
1008203-227 = "ก็แค่... กิจกรรมที่ทำในวันนี้... มันแตกต่างจากที่ฉันวาดไว้ตอนที่วางแผนเล็กน้อยน่ะ... "
1008203-228 = "พอได้ลองมาทำในสิ่งที่จินตนาการไว้ในหัว... มันกลับรู้สึกเสียดายนิดหน่อย..."
1008203-229 = "ถ้าจะพูดแบบไม่อ้อมค้อม... อืม..."
1008203-230 = "กลับกลายเป็นว่าฉันไม่รู้น่ะ... ว่าจริงๆ แล้วฉันอยากทำอะไรกันแน่"
1008203-231 = "[s] \"อย่างนี้เองสินะ...\""
1008203-232 = "ฉันเอาแต่สร้างสถานการณ์ตามความคิดของตัวเอง แต่ผลที่ออกมามันไม่ตรงกับที่คิดเท่าไหร่เลย..."
1008203-233 = "แล้วยิ่งคุณครูมาช่วยเป็นผู้ชี้แนะให้แล้วด้วย... ฉันควรจะทำอะไรให้มันถูกต้องกว่านี้..."
1008203-234 = "ขอโทษนะ ผิดที่ฉันไม่รอบคอบเองน่ะ... "
1008203-235 = "ฮึ่ม! จบเรื่องซึ้งๆ แค่นี้ดีกว่า! นี่ก็จะมืดค่ำแล้ว"
1008203-239 = "ถึงวันนี้จะน่าเสียดาย แต่ก็กลับกันเถอะ..."
1008203-240 = "[s] \"ถ้าเพิ่งย้ายมาใหม่ ก็น่าจะยังไม่คุ้นเคยกับแถวนี้ใช่ไหมล่ะ?\""
1008203-244 = "...หืม?"
1008203-245 = "[s] \"งั้นเรนเกะลองแนะนำสถานที่แถวนี้ให้นักเรียนใหม่ดูมั้ย?\""
1008203-249 = "อ่า... อย่างนี้สินะ..."
1008203-250 = "เพิ่งจะย้ายมาใหม่ๆ ทุกอย่างที่นี่ก็เลยยังแปลกตาไปหมด..."
1008203-251 = "ตรงไหนเอาไว้ทำอะไร มีที่ไหนให้เที่ยวเล่นบ้าง ถ้าอยากซื้อหนังสือต้องไปที่ไหน ถ้าจะไปโรงหนังเพื่อ#nดูหนังที่เพิ่งเข้าใหม่ ต้องนั่งรถสายไหนไป..."
1008203-252 = "สำหรับนักเรียนใหม่แล้ว ทุกอย่างคงเป็นสิ่งที่ยังไม่คุ้นเคย... "
1008203-253 = "[s] \"ถ้าช่วยเรื่องนั้น นักเรียนใหม่คงดีใจไม่น้อยเลยนะ\""
1008203-254 = "...นั่นสินะ"
1008203-255 = "อื้ม คุณครูพูดถูกแล้วละ!"
1008203-256 = "สมแล้วกับที่เป็นคุณครู... ไม่สิ ท่านอาจารย์ของวัยรุ่น!"
1008203-260 = "เอาละ! พวกเรายังพอมีเวลาใช่มั้ย? ไปกันเถอะ!"
1008203-261 = "ฉันจะแนะนำสถานที่ที่ไปบ่อยๆ ทั้งที่ฝึกตีเบสบอล... ร้านเกม..."
1008203-265 = "จริงสิ! แถวนี้มีร้านอาหารที่มีเมนูพิเศษตามฤดูกาลด้วยนะ แล้วมันก็อร่อยมากด้วย...!"
1008203-267 = "(เรนเกะกลับมามีชีวิตชีวาอีกครั้ง จากนั้นทั้งสองก็เดินเที่ยวแถวนั้นด้วยกันต่อ)"

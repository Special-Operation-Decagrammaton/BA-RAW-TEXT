1008203-18 = "#clearST"
1008203-19 = "3;렌게;08\n#3;stiff\n#wait;1500"
1008203-20 = "3;렌게;12;<급성 청추니움 알레르기 쇼크> 증상으로 탈이 날지도 모른다구.\n#bgshake\n#3;closeup"

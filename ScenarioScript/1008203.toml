1008203-41 = "3;렌게;99;예를 들어…… 세간에서 말하는 <라이벌>이라는 관계."
1008203-42 = "3;렌게;99;서로가 절차탁마하며 싸우고, 화해하고, 또 어깨를 나란히 하며 앞으로 나아가는 그 관계처럼……."
1008203-43 = "3;렌게;08;그 사이에서 태어나는 갈등과 우정이라는 시퀀스들은 그야말로…….\n#3;m3"

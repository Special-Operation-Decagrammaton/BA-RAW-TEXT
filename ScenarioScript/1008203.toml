[translation]
1008203-1 = "青春的定番：轉學生"
1008203-3 = "[ns]「說到青春活動……具體該做什麼呢？」"
1008203-4 = "啊，老師會有這個疑問也是理所當然的。"
1008203-5 = "突然說要開始「青春活動」確實會不知道該從哪裡開始、該做什麼才好。"
1008203-6 = "對我們這種「青春新手」來說，一切都是霧裡看花……這不是個容易回答的問題。"
1008203-7 = "所謂的「青春活動」本來就很難明確定義……#n要打個比方的話……就像凌晨升起的霧一樣，這也無可奈何。"
1008203-8 = "[s1]「青春活動也有新手啊……」\n[s2]「唔嗯～需要把問題想得這麼複雜嗎？」"
1008203-13 = "不不不，師父。#n不可以小看青春活動哦！"
1008203-14 = "像我們這種「青春新手」要是不做任何準備，貿然投入青春活動的話……"
1008203-15 = "[s]「……會怎樣？」"
1008203-16 = "可能會因為來不及做好準備，身心由於突如其來的青春活動……"
1008203-20 = "出現「急性青春過敏休克」的症狀！"
1008203-24 = "[ns]「我們是在說青春活動吧！？」"
1008203-25 = "我的意思是這件事必須非常小心且循序漸進。"
1008203-26 = "這點和運動有點類似。#n如果還不會走就想跑的話，不是很容易受傷嗎？"
1008203-27 = "……不過雖然前面說了這麼多，也不用太擔心。"
1008203-28 = "為了今天這樣的日子，我早就做好進行「青春活動」的計畫了。"
1008203-29 = "[s]「原來蓮華平常就在計畫了啊……」"
1008203-33 = "那，那是因為……！"
1008203-34 = "這是我一直以來的夢想，我也沒辦法啊！"
1008203-35 = "總之！根據對青春進行調查的結果，我明白了一件事。"
1008203-36 = "所謂青春，基本上是從「關係」成立的概念。"
1008203-37 = "[s]「有沒有具體的例子……？」"
1008203-41 = "例如……社會所說的「競爭對手」關係。"
1008203-42 = "經歷彼此摩擦、爭吵、和好之後並肩向前邁進的那種關係……"
1008203-43 = "從那之中誕生的衝突和友情……"
1008203-44 = "老師不覺得就是青春嗎！？"
1008203-45 = "[s]「好像有點懂，又好像不是很懂……」"
1008203-46 = "當然，我所說的關係並不是只有競爭對手。"
1008203-47 = "畢竟世界上還有各種各樣的關係。#n有多少關係就代表有多少青春故事。"
1008203-48 = "因此在這極具里程碑意義的第1次「青春活動」，我最先準備的關係就是……"
1008203-52 = "「轉學生」！"
1008203-53 = "[ns]「轉學……什麼？」"
1008203-55 = "來，從現在起變成轉學生吧！"
1008203-56 = "老師……不，師父！"
1008203-62 = "（於是跟著高喊「和轉學生有關的青春活動，當然要從這個開始！」的蓮華……）"
1008203-63 = "（來到了離百花繚亂不遠的小巷）"
1008203-67 = "[ns]「蓮華，這裡和轉學生有什麼關係……」"
1008203-68 = "師父，我上次也說過吧？"
1008203-69 = "青春活動……簡單來說就是出現在「戀愛鯉魚」作品中的內容。"
1008203-70 = "如師父所知，「戀愛鯉魚」的出道作──#n是本描寫突然到來的轉學生主角和女主角之間鬧劇的青春小說。"
1008203-71 = "[s3]「啊，嗯。確實是這樣沒錯。」\n[s4]「……是嗎？」"
1008203-74 = "突如其來的轉學生……意想不到的遭遇……#n無法預測、心跳不已、打破常規的每一天！"
1008203-75 = "今天的青春活動就從序章開始！"
1008203-76 = "一起體驗「關於轉學生的小插曲」吧！"
1008203-77 = "[s]「……也就是說，我們要模仿那部作品的內容是嗎？」"
1008203-78 = "嘿嘿嘿！答對了！"
1008203-79 = "真是心有靈犀一點通！#n一瞬間就看穿並理解我的意思了！不愧是師父！"
1008203-80 = "來，我可沒忘記準備這個喔。"
1008203-84 = "[ns]「這是……麵包……？難道蓮華你是想……」"
1008203-85 = "好，那我就去起跑點準備了。#n等等注意我的信號！明白吧？"
1008203-89 = "[ns]「等，等等！蓮華……！？」"
1008203-94 = "好……這裡應該行了。"
1008203-98 = "麵包準備完畢，地面的硬度……嗯，正好適合衝刺。"
1008203-102 = "陽光和煦得恰到好處，溫度和濕度非常舒服。#n風向也是順風…… "
1008203-105 = "嗯，風正悄悄地……訴說著現在就是開始「青春活動」的時候！"
1008203-106 = "說到轉學生當然不能少了這最初的插曲……！"
1008203-111 = "「偏偏在轉學第一天陷入遲到危機，趕緊把麵包叼在嘴上拚命跑──#n　結果在小巷轉角『砰』地一聲撞上他！」活動開始！"
1008203-116 = "（蓮華在發出信號的同時跑了起來）"
1008203-121 = "好！把麵包叼在嘴上！全力狂奔！"
1008203-122 = "在這裡說出經典台詞……！"
1008203-123 = "「啊！要遲到了要遲到了！」"
1008203-127 = "哼哼！覺悟吧……！師父！"
1008203-133 = "[ns]「蓮華用非常可怕的氣勢跑了過來……這樣下去……！？」"
1008203-137 = "咿呀啊啊！"
1008203-138 = "（就在即將撞上之前──）"
1008203-143 = "[ns]「發動緊急迴避！」"
1008203-150 = "等等！老師！怎麼能在進入高潮的時候躲開呢！？"
1008203-151 = "在這裡撞上轉學生，讓雙方從一開始就對彼此留下無法忘懷的印象是重點耶！"
1008203-152 = "[s5]「相撞後會對彼此留下的……」\n[s6]「不是印象而是傷口吧！？」"
1008203-157 = "呃……是，是嗎？"
1008203-158 = "[s]「太危險了，駁回！進入下一個部分吧！蓮華！」"
1008203-159 = "好吧……既然老師都這麼說了……"
1008203-160 = "聽從老師……師父的教誨是徒弟的本分！"
1008203-161 = "好，就進入下一個部分吧！"
1008203-163 = "（之後蓮華所謂的「轉學生」插曲也大致相同）"
1008203-165 = "繼難以忘懷的麵包相遇後，接下來就是重要的……"
1008203-166 = "當我在教室靜靜等待時……"
1008203-171 = "[ns]「初次見面……我是這次轉學來的……」"
1008203-175 = "咦……！你你你不是剛才……在小巷裡差點撞到我的人嗎……！"
1008203-176 = "剛才不跟你計較算你運氣好，之後我可絕對不會輕易放過你！"
1008203-177 = "[s]「那不是對轉學生說的話，是對敵人的警告吧！？」"
1008203-179 = "這是在教室窗邊的角落，偶然發生的二次相會……"
1008203-180 = "接下來是……"
1008203-182 = "什麼！？"
1008203-183 = "因為是轉學來的第一天所以沒有課本？"
1008203-184 = "……哼！那就沒辦法了！"
1008203-185 = "把桌子靠過來吧。"
1008203-191 = "今天就一起看我的課本吧！"
1008203-192 = "啊，對了，如果超過桌上的那條線……"
1008203-196 = "我會拿出全力揍扁你。#n膽子夠大就試試看吧。"
1008203-197 = "[s]「通常這種時候不是應該再溫柔一點嗎！？」"
1008203-199 = "嗯？是，是嗎？#n我沒有這種經驗，所以不是很清楚。"
1008203-200 = "可是……第一次見面的轉學生居然侵犯我的領域……#n老實說我可能有點難接受。"
1008203-201 = "如果有人那樣突然跟我拉近距離……我應該會覺得很煩……"
1008203-202 = "[s]「我怎麼覺得那很像蓮華會做的事！？」"
1008203-208 = "（就這樣懷著對轉學生的插曲是否適合的懷疑，又推演了幾種情況）"
1008203-210 = "（時光飛逝，轉眼已經是日落時分）"
1008203-216 = "[ns7]「……時間已經這麼晚了啊，蓮華。」\n[ns8]「今天的青春活動有達到你想要的感覺嗎？」"
1008203-221 = "唔嗯……老實說……"
1008203-222 = "我覺得有點微妙。"
1008203-226 = "啊，等等，我不是對師父有意見的意思！"
1008203-227 = "只是今天做的活動……跟我一直計劃、思考、夢想的畫面有微妙的不同……"
1008203-228 = "實際執行一直在腦子裡想的事情……又覺得好像缺少了什麼……"
1008203-229 = "直截了當地說……嗯……"
1008203-230 = "感覺我好像也有點……不知道自己想做什麼。"
1008203-231 = "[s]「這樣啊……」"
1008203-232 = "只是營造了類似的情景，細節卻像老師說的一樣很不自然……"
1008203-233 = "難得師父願意幫忙……#n我應該更確實……把事情做好才對……"
1008203-234 = "抱歉，果然是我想得太簡單了……都是我的錯。"
1008203-235 = "……啊，感傷的話到此結束！#n畢竟時間也不早了。"
1008203-239 = "雖然可惜，今天就先回去吧……"
1008203-240 = "[s]「剛來的轉學生應該會對附近不熟吧？」"
1008203-244 = "……嗯？"
1008203-245 = "[s]「所以就由蓮華來為轉學生介紹如何？」"
1008203-249 = "啊……這樣啊……"
1008203-250 = "剛轉學過來，在一切都很陌生的地方……"
1008203-251 = "不但不知道哪裡有什麼，也不知道有沒有可以玩的地方。#n如果想買書該往哪邊走？如果想去電影院看電影該搭哪班公車……"
1008203-252 = "因為對轉學生來說一切都很陌生…… "
1008203-253 = "[s]「如果伸出援手，他應該會很高興吧？」"
1008203-254 = "……對耶。"
1008203-255 = "嗯，老師說的對！"
1008203-256 = "真不愧是老師……不，是青春師父！"
1008203-260 = "好！應該還有時間吧？"
1008203-261 = "我來向你介紹我平時常去的棒球打擊場……還有遊戲中心……"
1008203-265 = "啊！這附近有當季料理超好吃的餐廳……！"
1008203-267 = "（於是和重新振作起來的蓮華繼續在街上稍作閒逛）"

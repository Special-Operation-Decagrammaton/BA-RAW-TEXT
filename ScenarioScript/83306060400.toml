83306060400-18 = "3;히나;05;이번 소동의 주범이 누군가 했더니, 역시나 너희. 미식연구회였구나.\n#3;em;[반응]"
83306060400-19 = "3;이즈미;04;후엥? 히나?! 선도부장이 왜 여기에 나타난 거야?\n#3;em;[?!]\n#3;shake"
83306060400-20 = "3;아카리;04;어머, 벌써 들켰나요?\n#3;stiff"
83306060400-21 = "3;히나;05;너희들, 여기서 뭘 하고 있던 거야?"
83306060400-22 = "3;이즈미;04;우, 우린…… 그냥 학생 식당에 찾아오는 배고픈 학생들에게 맛있는 걸 먹여주려고……\n#3;stiff"
83306060400-23 = "3;아카리;02;동시에 사알짝. 이즈미 씨가 어레인지한 음식을 함께 맛보며, 미식의 길이란 얼마나 고단한지."
83306060400-24 = "3;아카리;03;그 감상을 함께 하고 싶었다. 라는 사소한 바람도 있었죠~★\n#3;em;[음표]"
83306060400-25 = "3;이즈미;05;맞아! 맛있는 음식은! 함께 먹는 편이 더 좋으니까!\n#3;jump"
83306060400-26 = "3;히나;99;그 결과가, 식당에 찾아온 모든 학생을 저렇게 만든 일이란 거네."
83306060400-27 = "3;히나;15;……미안하지만, 더 이상의 희생자를 막기 위해서라도, 너희들의 행동. 여기서 제지하도록 하겠어.\n#3;em;[빠직]"

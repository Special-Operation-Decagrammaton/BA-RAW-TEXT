[translation]
83306060400-6 = "อาคาริ! ส่งเครื่องปรุงตรงนั้นมาให้หน่อย!"
83306060400-7 = "ค่า~★ นี่ค่ะ คุณอิซุมิ"
83306060400-8 = "อื้อ~! ขอบใจนะ! ถ้าใส่ซอสปลิงทะเลสกัดในซุปมิโสะ จะต้องอร่อยกว่าเดิมแน่นอน!"
83306060400-9 = "คนที่ได้ชิมไปก่อนยังอร่อยจนเป็นลมไปเลยละ!"
83306060400-10 = "ฮื้ม~ <ยุทธการชิมอาหารจานพิเศษของอิซุมิ> เพื่อทุกคนที่หิวโหย!"
83306060400-11 = "ทุกอย่างเป็นไปได้อย่างราบรื่นเลย!"
83306060400-12 = "ค่า~★ ดีจังนะคะที่จัดการคนที่จะมาขัดขวางกิจกรรมของชมรมโภชนาการได้ในรวดเดียวเลย~★"
83306060400-18 = "ฉันก็สงสัยว่าใครเป็นตัวการของความวุ่นวายนี้ เป็นพวกเธอเองสินะ ชมรมชิมอาหาร"
83306060400-19 = "เอ๋? ฮินะ?! ทำไมประธานกรรมการวินัยถึงมาอยู่ที่นี่ล่ะ?"
83306060400-20 = "ตายจริง โดนจับได้แล้วเหรอคะเนี่ย?"
83306060400-21 = "พวกเธอมาทำอะไรกันที่นี่น่ะ?"
83306060400-22 = "พะ... พวกเรา... แค่อยากให้นักเรียนที่มาโรงอาหารเพราะท้องหิวได้กินอาหารที่อร่อยๆ..."
83306060400-23 = "และไหนๆ ก็ไหนๆ แล้ว... ก็เลยให้ชิมอาหารที่คุณอิซุมิทำมา เพื่อให้รับรู้ว่าเส้นทางแห่งอาหารรสเลิศ#nนั้นเป็นยังไง"
83306060400-24 = "ฉันมีความปรารถนาที่อยากจะแบ่งปันความรู้สึกนั้นกับทุกคนน่ะค่ะ~★"
83306060400-25 = "ใช่! อาหารอร่อยๆ น่ะต้องกินด้วยกันถึงจะยิ่งอร่อย!"
83306060400-26 = "เพราะแบบนั้น นักเรียนทุกคนที่มาโรงอาหารก็เลยเป็นแบบนี้สินะ"
83306060400-27 = "ต้องขอโทษด้วยนะ แต่เพื่อป้องกันไม่ให้มีผู้เคราะห์ร้ายอีก ฉันจำเป็นต้องหยุดพวกเธอไว้แค่นี้"
83306060400-28 = "ว่าไงนะ?!  ฉันยังไม่ได้ชิมอาหารจริงจังเลยนะ!"
83306060400-29 = "คุณอิซุมิ เหมือนว่าแผนการของพวกเราต้องจบลงเพียงเท่านี้แล้วละค่ะ"
83306060400-30 = "น่าเสียดายที่ไม่ได้อยู่ด้วยกันจนจบนะคะ แต่ฉันต้องขอตัวก่อนแล้วละค่ะ"
83306060400-35 = "อาคาริ?! อาคาริ! ยะ... อย่าทิ้งฉันไว้คนเดียวสิ~~! เกินไปแล้วนะ~!"
83306060400-41 = "เฮ้อ... พวกนั้นก็ดูไม่น่าจะมีเจตนาร้ายนะ"
83306060400-42 = "ช่วยเหลือคนที่หมดสติไปก่อนแล้วกัน"

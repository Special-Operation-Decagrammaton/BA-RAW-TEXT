[translation]
83306060400-6 = "亞伽里！給我調味料！"
83306060400-7 = "來～★請用，泉同學。"
83306060400-8 = "嗯～謝謝！把海參濃縮醬汁加入味噌湯之後就會變得更好吃哦！"
83306060400-9 = "那些先品嘗的人都因為太好吃，幸福到快暈倒了呢！"
83306060400-10 = "哼哼～為肚子餓的人準備的「泉特製美食品嘗大作戰！」"
83306060400-11 = "進行得很順利耶！"
83306060400-12 = "沒錯～★所以我們才能一口氣，擊垮可能妨礙我們佔領供給部的人～★"
83306060400-18 = "雖然多少有所預期，犯人果然是你們啊，美食研究會。"
83306060400-19 = "嗯？陽奈！？風紀委員長為什麼會在這裡？"
83306060400-20 = "哎呀，已經被發現了嗎？"
83306060400-21 = "你們在這裡做什麼？"
83306060400-22 = "我，我們……只是想讓因為肚子餓，所以來到學生餐廳的學生吃點美食……"
83306060400-23 = "順便一起品嘗泉準備的食物，體會美食之路是多麼艱辛……"
83306060400-24 = "滿足一起感受這份感動的小小心願而已～★"
83306060400-25 = "沒錯！美味的食物！一起吃會更好吃！"
83306060400-26 = "結果把餐廳的所有學生都變成那副模樣。"
83306060400-27 = "……抱歉，為了防止犧牲者繼續出現，我必須阻止你們。"
83306060400-28 = "咦咦！？我都還沒好好品嘗耶！"
83306060400-29 = "泉同學，雖然可惜，但我們的作戰似乎只能到此為止了。"
83306060400-30 = "很遺憾沒能陪你到最後，我得先告辭了。"
83306060400-35 = "亞伽里！？亞伽里！不，不要丟下我啊～！好過分～！"
83306060400-41 = "……唉。看來那些孩子似乎沒有惡意。"
83306060400-42 = "得先處理傷患才行。"

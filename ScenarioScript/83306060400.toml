[translation]
83306060400-6 = "Akari! Can you please pass the seasoning?"
83306060400-7 = "Here you go, Izumi! ★"
83306060400-8 = "Mmm! Thank you! Sea cucumber sauce is the perfect thing to make this miso soup even more delicious!"
83306060400-9 = "All those students who tried it earlier passed out, it's so good!"
83306060400-10 = "Hmm hmm hmm! We're sharing Izumi's special recipe! It's the salvation of hungry students everywhere!"
83306060400-11 = "It's all going perfectly!"
83306060400-12 = "Yeah! We've taken out everyone who might get in the way of our takeover of the School Lunch Club! ★"
83306060400-18 = "As I suspected, the culprit of this commotion is the Gourmet Research Society. Again."
83306060400-19 = "Huh? Hina?! Why is the head prefect here?"
83306060400-20 = "Oh my, have we been found out already?"
83306060400-21 = "What exactly are you doing here?"
83306060400-22 = "W-We just wanted to give the hungry students in the dining hall something delicious to eat..."
83306060400-23 = "And of course, we also wanted to share the food Izumi prepared."
83306060400-24 = "We're helping the other students walk the hard but rewarding path of the gourmet! ★"
83306060400-25 = "Exactly! Because with good food, the more the merrier!"
83306060400-26 = "Which is why every student in the dining hall has passed out on the ground."
83306060400-27 = "...Apologies, but your fun ends here. There have been enough casualties."
83306060400-28 = "What?! I still haven't had a good taste yet!"
83306060400-29 = "Ah, Izumi... Looks like our mission ends here."
83306060400-30 = "It's a shame I couldn't see the end with you, but I'll be taking my leave now. Good luck!"
83306060400-35 = "Wah! Akari?! Akari! D-Don't leave me! You're so mean!!"
83306060400-41 = "*sigh* They always cause havoc with such childlike intentions."
83306060400-42 = "I should tend to the casualties, first things first."

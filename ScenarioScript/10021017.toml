[translation]
10021017-9 = "現在「方舟」的所有能量都集中在一個地方……！！"
10021017-10 = "老師就在那裡！就在能量集中的地方！"
10021017-11 = "不妙……通訊開始不穩定了。"
10021017-12 = "得，得想辦法阻止！"
10021017-13 = "這樣下去，在自爆程式啟動之前……"
10021017-14 = "沒有時間了！#n如果現在不啟動程式，一切都會白費的！#n陽葵部長，能啟動嗎？"
10021017-15 = "程式的建構尚未完成。在這種不穩定的狀態下啟動的話──"
10021017-16 = "──有可能無法確保我們脫離的時間。"
10021017-17 = "美食研究會與遊戲開發部已經抵達控制室了！！#n阿拜多斯將會支援老師進行戰鬥！！"
10021017-21 = "……"
10021017-22 = "怎，怎麼辦？按下去沒問題嗎？"
10021017-23 = "琳前輩……"
10021017-24 = "……莉央會長。"
10021017-28 = "是，我都聽見了。"
10021017-29 = "我想向你確認──你製作的「逃脫程式」具體來說是什麼樣的方法？"
10021017-30 = "「逃脫程式」──能夠讓方舟內部的人空間跳躍至地上的座標。"
10021017-31 = "已經進行過模擬，程式本身應該能正常運作。#n也按照這裡的人數準備好對應數量的逃脫程式了。"
10021017-32 = "……加上老師總共是23個人，所以是23次沒錯吧？"
10021017-33 = "沒錯──因為利用了「方舟」的演算機能，在方舟內部的任何地方都能使用。"
10021017-34 = "有注意事項嗎？"
10021017-36 = "如果在「方舟」重創後才使用，就幾乎沒有任何猶豫的時間。#n在被捲入爆炸前使用比較理想。"
10021017-37 = "也就是說──我們沒剩多少時間了，對吧。"
10021017-41 = "……我知道了，看來只能立刻執行了呢。"
10021017-42 = "從現在起，方舟將準備進行自爆。#n請告知艦內的所有成員以「逃脫程式」進行逃脫！"
10021017-43 = "是，是！！我來轉達！"
10021017-44 = "那麼，「阿特拉哈西斯的方舟」的「自爆程式」──#n──啟動！"
10021017-46 = "啟動「自爆程式」。"
10021017-53 = "哇啊啊啊啊！！"
10021017-54 = "呀啊！？"
10021017-55 = "唔，還沒結束……下一波爆炸要來了！"
10021017-56 = "生命守護者也會爆炸的！#n快點用「逃脫程式」吧！！"
10021017-60 = "呀啊！？"
10021017-64 = "……！！亞子！？"
10021017-65 = "腳被，瓦礫給……！"
10021017-66 = "我現在就來幫你，你等著。"
10021017-67 = "佳世子同學……"
10021017-68 = "唔……呃……！"
10021017-72 = "好了……快點逃脫吧。"
10021017-76 = "……佳世子同學，謝謝你……#n我們陸地上見吧。"
10021017-79 = "「逃脫程式」：剩下23次"
10021017-83 = "「逃脫程式」：剩下22次"
10021017-86 = "亞子逃脫完成……是這種感覺啊。"
10021017-87 = "那我也……#n──大家也動作快！！"
10021017-91 = "「逃脫程式」：剩下21次"
10021017-93 = "兩個人都順利逃脫了呢！#n快繼續吧！"
10021017-97 = "哇哇！！大家動作快！"
10021017-98 = "琳前輩，請趕快逃脫！！"
10021017-99 = "……我最後一個離開。#n請各位先逃脫吧。"
10021017-100 = "琳前輩……？"
10021017-101 = "老師還在戰鬥……不知道誘騙者又會有什麼行動。#n我要留在這裡，協助老師直到最後一刻。"
10021017-102 = "你，你沒有在想一些奇怪的事吧！？"
10021017-103 = "可以別說那些不吉利的話嗎？#n我會和老師一起逃脫的，兩位請先離開吧。"
10021017-107 = "O，OK！那待會見……！"
10021017-108 = "是！！那麼陸地上見……！！"
10021017-113 = "「逃脫程式」：剩下20次"
10021017-117 = "「逃脫程式」：剩下19次"
10021017-119 = "陽葵同學，我們也走吧！"
10021017-120 = "我知道了──但在那之前，琳同學。"
10021017-124 = "愛麗絲創造的方舟──#n不，「光之劍：阿特拉哈西斯的超新星」已經整備完成了。"
10021017-125 = "我將它和生命守護者的能量連接在一起，所以應該還能使用一次。#n雖然輸出只有當時的15%左右，不過就當作是以防萬一。"
10021017-126 = "超新……已經決定用那個名字了啊。"
10021017-127 = "哎呀，不覺得是個很棒的名字嗎？"
10021017-128 = "……我就稱它為主砲吧。"
10021017-129 = "……真不有趣呢。"
10021017-134 = "陽葵同學，差不多該走了……那麼琳同學，請注意安全。"
10021017-135 = "……好的。謝謝你們，花子同學、陽葵同學。#n還有莉央會長──請替我向他表達謝意吧。"
10021017-139 = "「逃脫程式」：剩下18次"
10021017-143 = "「逃脫程式」：剩下17次"
10021017-145 = "唉……雖然想跟會長說的話還堆積如山……#n不過還是得感謝他做出了「逃脫程式」呢。那麼綾音同學也──"
10021017-146 = "不……我也和琳同學一起留下。"
10021017-147 = "啊啊……畢竟對策委員會的大家還在戰鬥呢。"
10021017-148 = "是的……而且那個白子前輩，該這麼說嗎……#n總覺得有點放心不下……"
10021017-149 = "這樣啊，我知道了。#n那麼遊戲開發部應該也在那邊，之後就拜託你了！"
10021017-150 = "是！交給我吧！"
10021017-156 = "「逃脫程式」：剩下16次"
10021017-159 = "……琳同學！那麼我們──"
10021017-160 = "是。一起支援老師吧！"
10021017-162 = "對策委員會、遊戲開發部、美食研究會的大家……還有老師。"
10021017-163 = "聽得到我說話嗎？這邊的大家已經順利逃脫！方舟很快就會完全崩毀！！"
10021017-164 = "「逃脫程式」已經準備好了，請快點逃脫吧！我們也會跟上的！！"
10021017-165 = "這樣啊……那麼，請先從風華同學開始吧。"
10021017-170 = "「逃脫程式」：剩下15次"
10021017-175 = "方舟完全遭到破壞的話就無法逃脫了！動作快……！"
10021017-176 = "最後的爆炸就快來了……請務必小心，老師！"
10021017-177 = "……方舟的所有能量依然集中在誘騙者身上。"
10021017-178 = "雖然不清楚他有何打算，但那種規模的能量……有可能會讓方舟飛向宇宙──"
10021017-179 = "再這樣下去的話……！#n不妙，得立刻阻止誘騙者！"
10021017-181 = "老師，最後的戰鬥……就拜託你了！！"

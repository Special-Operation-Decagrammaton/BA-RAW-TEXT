[translation]
10021017-9 = "พลังงานของเรืออะทราฮาซิสทั้งหมดกำลังไหลมารวมกันอยู่ที่เดียวค่ะ!!"
10021017-10 = "คุณครูอยู่ที่นั่นค่ะ!! ดูเหมือนว่าพลังงานทั้งหมดกำลังไหลไปที่เพลนาพาเทสค่ะ!"
10021017-11 = "ตอนนี้การสื่อสารทั้งหมดของเรืออุตนาพิชทิมเริ่มไม่คงที่แล้ว!!"
10021017-12 = "ถะ...ถ้าไม่หยุดเจ้านั่นเอาไว้ละก็...!!?"
10021017-13 = "ถ้าปล่อยไว้แบบนี้วงจรระเบิดตัวเองก็จะ...!"
10021017-14 = "รอต่อไปไม่ได้แล้ว! ถ้าไม่เปิดใช้วงจรทำลายตัวเองตอนนี้ ทุกอย่างที่ทำไปก็จะสูญเปล่านะ!!"
10021017-15 = "แต่ว่า... เรายังสร้างลำดับวงจรไม่เสร็จสมบูรณ์เลยนะคะ ถ้าเปิดใช้งานตอนนี้ละก็ มันจะไม่เสถียรดี...!!"
10021017-16 = "และอาจจะไม่มีเวลาให้พวกเราหนีทันก็ได้นะคะ!"
10021017-17 = "ชมรมชิมอาหารกับชมรมพัฒนาเกมมาถึงที่ห้องควบคุมแล้วค่ะ!! ทางนั้นกำลังเข้าไปสนับสนุนคุณครู#nและเข้าต่อสู้ค่ะ!!"
10021017-21 = "......"
10021017-22 = "ทะ...ทำไงดี? ดันกดปุ่มระเบิดตัวเองไปแล้ว?"
10021017-23 = "รุ่นพี่ริน......"
10021017-24 = "ประธานริโอะ"
10021017-28 = "อืม ฉันฟังอยู่"
10021017-29 = "ขอถามเพื่อยืนยันอีกครั้งค่ะ <วงจรหลบหนี> ที่คุณสร้างขึ้น เตรียมการพร้อมแล้วรึยังคะ? เปิดใช้งานได้#nทันทีที่ผู้ใช้ต้องการรึเปล่าคะ?"
10021017-30 = "... อืม ใช่แล้ว ฉันจะให้คนที่อยู่ในยานกระโดดข้ามมิติไปยังพิกัดบนโลก"
10021017-31 = "ฉันทดลองใช้งานมาหลายครั้งแล้ว เรื่องนั้นไม่ใช่ปัญหาหรอก ทางนี้เตรียมวงจรหลบหนีเอาไว้เท่า#nจำนวนคนแล้ว"
10021017-32 = "...รวมคุณครูด้วยก็เป็น 23 คน เท่ากับ 23 ครั้งสินะคะ"
10021017-33 = "อืม ทั้งหมด 23 ครั้ง"
10021017-34 = "มีอะไรที่จะต้องระวังรึเปล่าคะ?"
10021017-36 = "วงจรนี้ใช้ฟังก์ชันประมวลผลของเรืออะทราฮาซิส เพราะงั้นแค่อยู่ในเรือก็พอแล้ว แต่ว่าหลังจากที่เรือ#nถูกทำลายก็จะใช้ไม่ได้"
10021017-37 = "หรือก็คือ... เหลือเวลาอีกไม่มากแล้วสินะคะ"
10021017-41 = "...เข้าใจแล้วค่ะ คงไม่มีทางเลือกนอกจากลงมือตอนนี้สินะคะ"
10021017-42 = "ช่วยแจ้งสถานการณ์ให้ทุกคนที่อยู่ที่นี่ทราบด้วยค่ะ ตอนนี้เรืออะทราฮาซิสกำลังจะระเบิดแล้ว ขอให้หลบหนีออกจากที่นี่ด้วย <วงจรหลบหนี>!"
10021017-43 = "คะ... ได้ค่ะ!! ฉันจะแจ้งทุกคนเองค่ะ!"
10021017-44 = "ถ้างั้น... จะเริ่มเปิดใช้งาน <วงจรระเบิดตัวเอง> เรืออะทราฮาซิสแล้วค่ะ!!"
10021017-46 = "(ติ๊ด) วงจรระเบิดตัวเอง เริ่มทำงาน"
10021017-53 = "ว้ากกกกก-!!!"
10021017-54 = "กรี๊ดดด?!"
10021017-55 = "ยัง...ยังหรอกค่ะ! จะมีระเบิดที่ใหญ่กว่านี้ตามมาอีกค่ะ!"
10021017-56 = "เรืออุตนาพิชทิมเองก็จะระเบิดเหมือนกัน! ตอนนี้รีบออกไปจากตรงนี้ก่อนเร็วเข้า!! ใช้ <วงจรหลบหนี> เร็ว!!"
10021017-60 = "กรี๊ดดด-?!"
10021017-64 = "อาโกะ?! ไม่เป็นไรใช่มั้ย?"
10021017-65 = "เท้าฉันไปติดซากเพดานที่ถล่มลงมาน่ะ..."
10021017-66 = "อยู่นิ่งๆ ก่อน ฉันจะช่วยเอง..."
10021017-67 = "คะ...คุณคาโยโกะ......"
10021017-68 = "อึก......"
10021017-72 = "...ได้แล้ว รีบหนีเร็วเข้าเถอะ"
10021017-76 = "...ขอบคุณนะคะคุณคาโยโกะ ไว้เจอกันที่โลกนะคะ"
10021017-79 = "จำนวนคงเหลือของวงจรหลบหนี - 23 ครั้ง"
10021017-83 = "จำนวนคงเหลือของวงจรหลบหนี - 22 ครั้ง"
10021017-86 = "...อาโกะหนีไปสำเร็จแล้ว ดีละ แบบนี้สินะ..."
10021017-87 = "ถ้างั้นก็ตาฉันละนะ คนที่เหลือก็รีบหนีเร็วเข้า!!"
10021017-91 = "จำนวนคงเหลือของวงจรหลบหนี - 21 ครั้ง"
10021017-93 = "ดีละ คุณอาโกะกับคุณคาโยโกะหนีไปสำเร็จแล้ว!! ทุกคนเร็วเข้าค่ะ!"
10021017-97 = "วะ... ว้ากกก พวกเราเองก็ต้องรีบกันแล้ว!"
10021017-98 = "รุ่นพี่! รีบหนีเถอะค่ะ!!"
10021017-99 = "...ฉันจะอยู่รอเป็นคนสุดท้ายค่ะ ทุกคนรีบอพยพไปก่อนเถอะค่ะ"
10021017-100 = "รุ่นพี่ริน?"
10021017-101 = "คุณครูยังต่อสู้อยู่ที่นั่นอยู่เลยค่ะ เพลนาพาเทสอาจจะลงมือทำอะไรอีกก็ได้... เพราะงั้นฉันจะอยู่ช่วย#nคุณครูที่นี่จนถึงที่สุดค่ะ"
10021017-102 = "ระ...รุ่นพี่คงไม่ได้คิดอะไรแปลกๆ หรอกใช่มั้ยคะ?"
10021017-103 = "จะทำแบบนั้นได้ยังไงล่ะคะ ฉันจะอพยพไปพร้อมกับคุณครู เพราะงั้นทั้งสองคนไปกันก่อนเถอะค่ะ"
10021017-107 = "ขะ...เข้าใจแล้ว! งั้นเดี๋ยวเจอกันนะ!"
10021017-108 = "ค่ะ... ถะ...ถ้างั้นเจอกันที่โลกนะคะ...!!"
10021017-113 = "จำนวนคงเหลือของวงจรหลบหนี - 20 ครั้ง"
10021017-117 = "จำนวนคงเหลือของวงจรหลบหนี - 19 ครั้ง"
10021017-119 = "คุณฮิมาริ พวกเราก็ไปกันเถอะค่ะ!"
10021017-120 = "ค่ะ แต่ว่า... คุณริน?"
10021017-124 = "ฉันซ่อมเรือที่อาริสึสร้างขึ้น... ไม่สิ <ดาบแห่งแสง: ซูเปอร์โนวาแห่งอะทราฮาซิส> ไว้แล้วนะคะ"
10021017-125 = "ฉันเชื่อมต่อกับระบบพลังงานของเรือรบอุตนาพิชทิมไว้แล้ว น่าจะใช้ยิงได้หนึ่งครั้งค่ะ ผลลัพธ์ที่ได้น่า#nจะสักประมาณ 15 เปอร์เซ็นต์ของตอนนั้นก็ได้ค่ะ"
10021017-126 = "ดาบแห่ง... คิดจะใช้ชื่อนั้นจริงๆ เหรอคะ?"
10021017-127 = "ตายจริง? ชื่อออกจะเท่สุดๆ ไปเลยนะคะ"
10021017-128 = "...ฉันขอเรียกแค่ 'ปืนใหญ่' ก็แล้วกันค่ะ"
10021017-129 = "หืม... ไม่อารมณ์ขันเอาซะเลย"
10021017-134 = "ตอนนี้ต้องไปแล้วค่ะ ถ้างั้นคุณริน... ระวังตัวด้วยนะคะ"
10021017-135 = "...ค่ะ ขอบคุณค่ะ คุณฮานาโกะ คุณฮิมาริ"
10021017-139 = "จำนวนคงเหลือของวงจรหลบหนี - 18 ครั้ง"
10021017-143 = "จำนวนคงเหลือของวงจรหลบหนี - 17 ครั้ง"
10021017-145 = "เอาละ ถ้างั้นคุณอายาเนะเองก็รีบไปเถอะ"
10021017-146 = "ไม่ค่ะ ฉัน... จะอยู่รอเป็นกลุ่มสุดท้ายกับรุ่นพี่รินค่ะ"
10021017-147 = "...อ่า จริงสินะ พวกคณะกรรมการแผนงานยังต่อสู้อยู่ข้างในนั้น"
10021017-148 = "ค่ะ แล้วอีกอย่าง... รุ่นพี่ชิโรโกะคนนั้น... ฉันควรเรียกแบบนั้นไหมนะ... คือว่า... ถ้าไม่จับตาดูคนคนนั้น#nเอาไว้จนถึงที่สุดละก็..."
10021017-149 = "อื้ม เข้าใจแล้ว! พวกชมรมพัฒนาเกมเองก็อยู่ที่นั่นด้วย ขอฝากพวกที่เหลือด้วยล่ะ!"
10021017-150 = "ค่ะ!"
10021017-156 = "จำนวนคงเหลือของวงจรหลบหนี - 16 ครั้ง"
10021017-159 = "คุณริน! ถ้าอย่างนั้นต่อจากนี้...!"
10021017-160 = "ค่ะ พวกเราจะเข้าสนับสนุนคุณครูค่ะ!"
10021017-162 = "คุณครู! สมาชิกคณะกรรมการแผนงาน ชมรมพัฒนาเกมและชมรมชิมอาหารทุกคนคะ!"
10021017-163 = "ได้ยินรึเปล่าคะ? ทุกคนทางนี้อพยพออกไปเรียบร้อยแล้วค่ะ! อีกไม่นานเรืออะทราฮาซิสจะถูกทำลาย#nแล้วด้วยค่ะ!!"
10021017-164 = "ตอนนี้ <วงจรหลบหนี> เตรียมพร้อมแล้ว ขอให้ทุกคนรีบอพยพด้วยค่ะ! อีกไม่นานพวกเราก็จะตามไป#nเช่นกันค่ะ!!"
10021017-165 = "...เข้าใจแล้วค่ะ ถ้างั้นเริ่มจากคุณฟูกะที่หมดแรงไปก่อนแล้วกันค่ะ"
10021017-170 = "จำนวนคงเหลือของวงจรหลบหนี - 15 ครั้ง"
10021017-175 = "ทางนี้ นอกจากฉันกับคุณริน ทุกคนอพยพไปหมดแล้วค่ะ! ตอนนี้เหลือแค่คุณครูกับนักเรียนที่อยู่ที่นั่น#nแล้วค่ะ!"
10021017-176 = "อีกไม่นานเรืออะทราฮาซิสจะถูกระเบิดทั้งลำแล้วค่ะ......!! ระวังด้วยนะคะคุณครู!!"
10021017-177 = "......พลังงานทั้งหมดของเรือกำลังถูกโอนย้ายไปที่เพลนาพาเทสอยู่เรื่อยๆ เลยค่ะ"
10021017-178 = "ถึงไม่รู้ว่าเจ้านั่นคิดจะทำอะไรกันแน่ แต่ถ้าพลังงานปริมาณมหาศาลขนาดนั้นละก็ อาจทำให้เรือ#nกระเด็นออกไปนอกอวกาศเลยก็ได้ค่ะ"
10021017-179 = "จะปล่อยเอาไว้แบบนี้ไม่ได้ค่ะ จะต้องหยุดเพลนาพาเทสเอาไว้ที่นี่ เดี๋ยวนี้ค่ะ!"
10021017-181 = "คุณครูคะ! ช่วยออกคำสั่งการต่อสู้เผด็จศึกด้วยค่ะ!!"

[translation]
10021017-9 = "All of the Ark's energy is gathering in one place!"
10021017-10 = "Sensei is there! The energy is flowing toward Phrenapates!"
10021017-11 = "Communications with Utnapishtim are destabilizing!"
10021017-12 = "We have to stop it!"
10021017-13 = "At this rate, the self-destruct may not activate in time!"
10021017-14 = "We can't wait any longer! If we don't activate now, this will all have been for nothing!"
10021017-15 = "But it's not ready yet! It's too unstable to activate it now!"
10021017-16 = "We may not have enough time to escape!"
10021017-17 = "The Gourmet Research Society and Game Development Department just arrived at the control room! They'll support Sensei in combat!"
10021017-21 = "..."
10021017-22 = "What should I do? Should I press the self-destruct button?"
10021017-23 = "Rin..."
10021017-24 = "Rio."
10021017-28 = "Yes. I'm listening."
10021017-29 = "I need confirmation. Is your escape sequence ready? Can any user activate it immediately?"
10021017-30 = "Yes, that's how it works. It warps the person in the Ark to coordinates on land."
10021017-31 = "I've already run the simulation multiple times and secured enough escape sequences for everyone here. It should work."
10021017-32 = "There are 23 of us including Sensei. Does that mean you have 23 sequences?"
10021017-33 = "Right. There are a total of 23 sequences."
10021017-34 = "Should we be taking any precautions?"
10021017-36 = "Since it utilizes the Ark's computing function, the subject needs to be in the Ark, which means it can't be used once the Ark is destroyed."
10021017-37 = "You mean we don't have much time left..."
10021017-41 = "Understood. I guess we have to do it now."
10021017-42 = "Inform everyone of the situation and instruct them to use the escape sequences now before the Ark explodes."
10021017-43 = "R-Right! I'll deliver the message!"
10021017-44 = "I'm activating the self-destruct sequence for the Ark of Atrahasis!"
10021017-46 = "*push* Self-destruct activated!"
10021017-53 = "Whoaaaa!!!"
10021017-54 = "EEK!"
10021017-55 = "Get ready! A bigger explosion will happen soon!"
10021017-56 = "Utnapishtim will explode too! Get out of here now! Use the escape sequence!"
10021017-60 = "Eek?!"
10021017-64 = "Ako, are you okay?!"
10021017-65 = "My foot is stuck in the debris."
10021017-66 = "Hold on. I'll help you."
10021017-67 = "K-Kayoko..."
10021017-68 = "Urgh..."
10021017-72 = "There. Go! Hurry up!"
10021017-76 = "Thank you, Kayoko. I'll see you on the ground."
10021017-79 = "Escape Sequences Available: 23"
10021017-83 = "Escape Sequences Available: 22"
10021017-86 = "Ako got away. Good. That's good."
10021017-87 = "I'll go now too. Everyone else, get out of here!"
10021017-91 = "Escape Sequences Available: 21"
10021017-93 = "Ako and Kayoko escaped! Everyone, hurry up!"
10021017-97 = "Whoa! We need to get a move on!"
10021017-98 = "Rin, let's go!"
10021017-99 = "You all go ahead. I'll leave last."
10021017-100 = "Rin?"
10021017-101 = "Sensei is still fighting over there, and I don't know what Phrenapates will do. I'm going to stay and help Sensei finish this."
10021017-102 = "Y-You're not going to do anything crazy, are you?"
10021017-103 = "You know I wouldn't. Don't worry. I'll escape with Sensei. You two go ahead."
10021017-107 = "Okay... See you soon then!"
10021017-108 = "Yes! On the ground!"
10021017-113 = "Escape Sequences Available: 20"
10021017-117 = "Escape Sequences Available: 19"
10021017-119 = "Himari, we should go too!"
10021017-120 = "Yes, but before that... Rin?"
10021017-124 = "I've modified the Ark that Aris made, the Sword of Light: Supernova of the Atrahasis."
10021017-125 = "I've also linked it with Utnapishtim's energy, so you should be able to use it at least once. The output will only be about 15%, but that may just be enough."
10021017-126 = "Sword of Light? You're set on that name?"
10021017-127 = "Yeah, it's a great name."
10021017-128 = "Sure, sure. I'm just going to call it the main weapon to keep things simple."
10021017-129 = "Well... That's boring."
10021017-134 = "We have to go now. Be safe, Rin."
10021017-135 = "Thank you. Hanako. Himari."
10021017-139 = "Escape Sequences Available: 18"
10021017-143 = "Escape Sequences Available: 17"
10021017-145 = "Okay. Ayane next."
10021017-146 = "No. I want to stay with Rin until the end."
10021017-147 = "Ah, I see. The Foreclosure Task Force is still fighting."
10021017-148 = "Yes. And I need to keep an eye on Shiroko—or whoever she is—until the end..."
10021017-149 = "Got it! Well, the Game Development Department is also there, so I'll leave it to you!"
10021017-150 = "Okay!"
10021017-156 = "Escape Sequences Available: 16"
10021017-159 = "Rin! What's the plan?"
10021017-160 = "We will provide reinforcement while Sensei fights!"
10021017-162 = "Sensei, everyone in the Foreclosure Task Force, the Game Development Department, and the Gourmet Research Society!"
10021017-163 = "Can you hear me? We are all ready to escape here! The Ark will be completely destroyed in a matter of moments!"
10021017-164 = "The escape sequence is ready. Get out of there as soon as possible! We will follow shortly."
10021017-165 = "Understood. Fuuka's down. She should go first."
10021017-170 = "Escape Sequences Available: 15"
10021017-175 = "Everyone's gone except Rin and me! It's just the students and Sensei left now!"
10021017-176 = "The Ark is about to explode! Be careful, Sensei!"
10021017-177 = "All of the Ark's energy is still flowing toward Phrenapates."
10021017-178 = "I don't know what's going to happen, but energy of that magnitude is enough to blast the Ark into outer space."
10021017-179 = "We can't let this continue. We need to stop Phrenapates immediately!"
10021017-181 = "Sensei, please complete the final fight!"

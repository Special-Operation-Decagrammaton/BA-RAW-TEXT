[translation]
10008100-1 = "Episode 10;Commence the Counterattack!"
10008100-4 = "Ah. Everything is going smoothly."
10008100-5 = "We reclaimed the offering box, and the Kaitengers continue to be the perfect diversion."
10008100-6 = "Haha! All that's left to do now is finish things on our end, disappear,#nand begin again."
10008100-11 = "We've got a situation, Boss!"
10008100-12 = "Haven't you ever heard of knocking? This had better be good!"
10008100-13 = "M-My apologies, but you must turn on the news right away!"
10008100-21 = "This is Shinon from the Kronos School of Journalism! We have breaking news on tonight's big story!"
10008100-23 = "There's an uproar taking place at Daikichiden! Let's look in!"
10008100-28 = "What? The offering box was a scam from the beginning?"
10008100-29 = "What about all of the rumors on social media?"
10008100-30 = "I demand a refund!"
10008100-35 = "Want to know how it came to this?!"
10008100-36 = "It was all thanks to this video recently uploaded to social media!"
10008100-39 = "Haha! Perhaps not. It's only a matter of time before someone pieces things together, but so what? We'll be long gone by then."
10008100-40 = "Should I not be? The world has no shortage of fools who believe everything they read online. \"If you wish it, you'll get it.\" Seriously now. "
10008100-41 = "Our business will prosper forever and ever so long as there are easy marks for us to target!"
10008100-44 = "As you can see, these remarks have sparked an outrage! Is what's in the video the truth?"
10008100-45 = "Has Daikichiden tricked the masses?"
10008100-46 = "The Kronos School of Journalism intends to go directly to the source to discover the truth!"
10008100-53 = "What...?"
10008100-54 = "WHAT IS THE MEANING OF THIS?!"
10008100-57 = "Hoo boy. It's utter chaos here."
10008100-58 = "Everyone is irate! ☆"
10008100-59 = "Heeheehee."
10008100-60 = "Now it feels like a real festival! That's more like it!"
10008100-65 = "You were filming the whole time?"
10008100-66 = "Of course. What else was I going to do when that manager guy kept going on and on about how the world is full of idiots who believe everything they hear online?"
10008100-67 = "So you turned his own words against him."
10008100-68 = "Haha! I couldn't let him get away with disrespecting Aru and my Problem Solver friends! So I filmed him thinking it would come in handy."
10008100-69 = "And look at how interesting everything turned out!"
10008100-70 = "Mutsuki..."
10008100-71 = "[s] \"I should've known it was her doing.\""
10008100-77 = "The crowd is only getting larger. Things are going to get out of hand there!"
10008100-78 = "It will be too crowded if we enter through the front. That'll make capturing the manager more difficult."
10008100-79 = "I have an idea."
10008100-80 = "There are two entrances to Daikichiden. If we push our way through the front..."
10008100-81 = "...then the Kurokame Gang is sure to try escaping out the back."
10008100-82 = "We can use that to our advantage."
10008100-84 = "Excellent. It pays to have a former employee in our corner."
10008100-85 = "Did you have to mention the \"former\" part?! At least let me collect my final paycheck first."
10008100-86 = "[s] \"Okay. Let's divide into two teams, then.\""
10008100-88 = "How about we take the front and Problem Solver will cover the rear?"
10008100-89 = "You go with them too, Serika."
10008100-90 = "That sounds good to me!"
10008100-91 = "We'll handle things here."
10008100-92 = "I promise to avenge that poor offering box."
10008100-94 = "R-Right. Good luck, you three."
10008100-95 = "We and Sensei will be sure to stop the manager in his tracks."
10008100-96 = "Boss' orders? All right."
10008100-97 = "U-Understood!"
10008100-98 = "Heehee! Attack, ladies!"

[translation]
10008100-1 = "ตอนที่ 10;เริ่มจู่โจมกลับ!"
10008100-4 = "อืม... ทุกอย่างไปได้สวยเลยนะครับ"
10008100-5 = "ได้ตู้บริจาคคืนมาแล้ว พวกไคเทนเจอร์เองก็หนีไปพร้อมกับดึงความสนใจคนอื่นๆ ไปด้วย..."
10008100-6 = "ฮ่ะฮ่ะฮ่า! เพราะงั้นตอนนี้แค่พวกเราจัดการงานของแก๊งให้เสร็จและไปจากที่นี่..."
10008100-11 = "บะ...บอส! เกิดเรื่องใหญ่แล้วครับ!"
10008100-12 = "เกิดอะไรขึ้นเหรอ เข้ามาโดยไม่เคาะประตูแบบนี้มันเสียมารยาทนะครับ"
10008100-13 = "คะ...คือว่าตอนนี้ดูทีวีก่อนเถอะครับ!"
10008100-21 = "ชิน่อนจากชมรมนักข่าว โรงเรียนโครโนสค่ะ! รายงานข่าวด่วนจากสถานที่เกิดเหตุค่ะ!"
10008100-23 = "ตอนนี้ที่ไดคิจิเดนเกิดเหตุวุ่นวายขึ้นแล้วค่ะ เชิญรับชมได้เลยค่ะ!"
10008100-28 = "อะไรกัน เรื่องตู้บริจาคเป็นเรื่องหลอกลวงตั้งแต่แรกแล้วงั้นเรอะ?!"
10008100-29 = "นี่มันเรื่องอะไรกันเนี่ย? แล้วข่าวในโซเชียลนั่นมันอะไรกันล่ะ?"
10008100-30 = "เอาเงินฉันคืนมานะ!"
10008100-35 = "เพราะอะไรถึงเกิดเรื่องแบบนี้ขึ้นกันนะ!"
10008100-36 = "และเหตุผลนั้น... เชิญทุกท่านชมวิดีโอที่เพิ่งโพสต์ลงโซเชียลสดๆ ร้อนๆ ได้เลยค่ะ!"
10008100-39 = "ฮ่ะฮ่ะฮ่า! สักวันพวกเราอาจถูกจับได้ตามที่คุณพูด แต่ว่า... แค่หนีไปก่อนที่จะถูกจับได้ก็พอแล้ว#nไม่ใช่เหรอครับ?"
10008100-40 = "เพราะในโลกนี้ก็ยังมีพวกหน้าโง่ที่หลงเชื่อคำโฆษณาอย่าง \"ขอพรสมหวังทุกประการ\" ในโซเชียล#nอยู่อีกเยอะแยะน่ะสิ "
10008100-41 = "ธุรกิจแบบนี้น่ะล้มไม่ได้ง่ายๆ หรอกนะครับ จะเริ่มใหม่เมื่อไรก็ได้! ฮ่ะฮ่ะฮ่า!\n"
10008100-44 = "จากวิดีโอที่ชมไปเมื่อครู่นี้ ทำให้เกิดคลื่นความไม่พอใจมหาศาล! สุดท้ายเรื่องนี้จะจบยังไงกันแน่?"
10008100-45 = "ข่าวลือของไดคิจิเดนจะเป็นเรื่องหลอกลวงโลกจริงหรือไม่?"
10008100-46 = "และเพื่อตรวจสอบความจริงเรื่องนี้ สำนักข่าวโครโนสของเราจะไปสัมภาษณ์ผู้ดูแลสถานที่จัดงานกันค่ะ!"
10008100-53 = "นี่มัน..."
10008100-54 = "นี่มันอะไรกันครับเนี่ย?!"
10008100-57 = "อา~ เกิดเรื่องวุ่นวายขึ้นจริงๆ ด้วยน้า~"
10008100-58 = "ทุกคนดูหัวร้อนกันมากเลยนะคะ~☆"
10008100-59 = "คิกคิกคิก..."
10008100-60 = "ต้องแบบนี้สิถึงได้ฟีลงานเทศกาลหน่อย! อื้อ! ถูกใจสุดๆ เลย!"
10008100-65 = "มุสึกิ... เธอถ่ายวิดีโอนั่นไว้ตั้งแต่เมื่อไรน่ะ..."
10008100-66 = "หืม? วิดีโอนั่นน่ะเหรอ? ก็ตอนที่เจ้าหมอนั่นพูดอวดอะไรต่อมิอะไรต่อหน้าพวกเรายังไงล่ะ ตอนที่บอกว่าพวกที่หลงเชื่อโฆษณาในโซเชียลเป็นพวกโง่เง่าน่ะ"
10008100-67 = "ถึงมันจะเป็นเรื่องจริงก็เถอะ"
10008100-68 = "อ่ะฮะฮ่ะ~ กล้าดียังไงมาดูถูกอารุจังกับหน่วยรับจ้างสารพัดต่อหน้าพวกเราน่ะ เพราะงั้นก็เลยแอบถ่าย#nไว้ไงล่ะ เผื่อว่าจะเอามาใช้ประโยชน์ได้"
10008100-69 = "แล้วก็ดูสิ... บันเทิงอย่างที่คิดจริงๆ ด้วยไม่ใช่รึไง"
10008100-70 = "มุสึกิ..."
10008100-71 = "[s] \"การแก้แค้นของมุสึกินี่มัน...\""
10008100-77 = "มีผู้คนจำนวนมากมารวมกัน ตอนนี้สถานการณ์ที่ไดคิจิเดนก็ร้อนแรงขึ้นแล้วค่ะ!"
10008100-78 = "ฉันพยายามฝ่าเข้าไปทางประตูหน้าแล้ว แต่มันมีคนเยอะแยะเต็มไปหมด... ให้บุกเข้าไปจับตัวบอส#nของศัตรูคงลำบาก"
10008100-79 = "ฉันมีวิธีดีๆ อยู่นะ"
10008100-80 = "ทางเข้าไปในไดคิจิเดนมีอยู่สองทาง ประตูหน้ากับประตูหลัง ถ้าเกิดพวกเราเข้าประตูหน้าไปได้ละก็..."
10008100-81 = "พวกแก๊งคุโรคาเมะก็คงไหวตัวทันและหนีออกไปทางประตูหลังแน่"
10008100-82 = "ถ้าเราใช้ประโยชน์จากตอนนั้นได้ละก็..."
10008100-84 = "ว่าแล้วเชียว! สมกับเป็นอดีตเด็กพาร์ทไทม์จริงๆ วางแผนได้เฉียบแหลมมาก!"
10008100-85 = "ยิ่งเรียกว่าอดีตเด็กพาร์ทไทม์นี่ เหมือนจงใจแทงใจดำกันชัดๆ เลยนะ?!"
10008100-86 = "[s] \"งั้นมาแบ่งหน้าที่กันเถอะ...\""
10008100-88 = "อ่ะฮ่า~ พวกเราจะบุกทางประตูหน้าเอง ส่วนประตูหลังให้พวกหน่วยรับจ้างสารพัดจัดการ ใช่มั้ย?"
10008100-89 = "ขอฝากเซริกะจังกับทางนั้นด้วยแล้วกันน้า~"
10008100-90 = "ค่ะ~ เข้าใจแล้วค่ะ! คุณครู!"
10008100-91 = "ฝากด้วยนะ"
10008100-92 = "ความผิดหวังเรื่องตู้บริจาค ฉันจะเอาคืนแน่"
10008100-94 = "อะ... อื้ม! ขอฝากทางนั้นด้วยแล้วกัน!"
10008100-95 = "ฉันกับคุณครูจะเข้าไปเด็ดหัวผู้นำศัตรูให้เอง!"
10008100-96 = "ถ้าประธานพูดแบบนั้นละก็นะ..."
10008100-97 = "ค่ะ... ค่ะ!"
10008100-98 = "คิกๆ ฮ่าฮ่าฮ่า~ บุกเลย~!"

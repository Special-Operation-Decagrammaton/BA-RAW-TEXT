[translation]
10008100-1 = "第10話;反擊的狼煙"
10008100-4 = "呼呣，整體來說還算順利。"
10008100-5 = "不僅順利搶回賽錢箱，凱坦澤那夥人也在替我們吸引注意力……"
10008100-6 = "接著我們只要釐清現況然後逃跑就……"
10008100-11 = "老，老大！大事不好了！"
10008100-12 = "居然沒先敲門就衝進來，真是沒禮貌啊？發生什麼事了？"
10008100-13 = "請，請看電視！"
10008100-21 = "我是克洛盧斯新聞部的詩音！目前正在問題的現場播報緊急快報！"
10008100-23 = "現在「大吉殿」正亂成一團！請看那裡！"
10008100-28 = "從一開始就全是騙人的！？"
10008100-29 = "什麼意思？社群網站上的傳聞是怎麼回事？"
10008100-30 = "把，把我的錢還來！"
10008100-35 = "事情為什麼會變成這樣呢……"
10008100-36 = "這個原因，請看剛才上傳到社群網站上的這個影片！"
10008100-39 = "……是呢，總有一天會被發現的吧。#n但是我只要在那之前逃跑就行了。你不這麼覺得嗎？"
10008100-40 = "那當然。畢竟天底下到處都是像你們一樣的那種，#n會相信社群網站上說的「實現願望的地方」的笨蛋啊。"
10008100-41 = "只要這些笨蛋沒有減少，根本就沒什麼好怕的。哈哈哈哈！"
10008100-44 = "誠如各位觀眾所見，這番發言激起了相當大的波瀾！真相究竟是什麼呢？"
10008100-45 = "大吉殿的傳聞真的是騙人的嗎？"
10008100-46 = "我們克洛盧斯學園新聞部為了確認真相，將立刻前往會場負責人的……！"
10008100-53 = "這……"
10008100-54 = "這是怎麼回事！？"
10008100-57 = "哎呀～鬧的真大呢～"
10008100-58 = "大家都氣沖沖的呢～☆"
10008100-59 = "咯呵呵。"
10008100-60 = "真是狂亂的感覺呢。越來越有趣了～！"
10008100-65 = "無月，你什麼時候拍到那種東西的……"
10008100-66 = "啊啊，那個？當時他不是在我們面前一副了不起的樣子說個不停嗎？"
10008100-67 = "在那個時候……"
10008100-68 = "啊哈～竟敢在我們面前看不起亞瑠醬和便利屋68的大家，#n我心想一定要給他點顏色瞧瞧。"
10008100-69 = "你們看，真的有趣起來了不是嗎？"
10008100-70 = "無月……"
10008100-71 = "[s]「不愧是無月……」"
10008100-77 = "集結過來的人越來越多了……！"
10008100-78 = "嗯……這樣一來就算能從正門進去，也會因為過於混亂而很難抓到他。"
10008100-79 = "啊……那我有個好辦法。"
10008100-80 = "能進入大吉殿的共有正門和後門兩個入口。#n如果正門被突破的話……"
10008100-81 = "知道這件事的黑龜組，自然會試圖從後門逃走。"
10008100-82 = "只要趁著這個機會……！"
10008100-84 = "原來如此，不愧是前工讀生！"
10008100-85 = "不要說什麼「前」啊！絕對會在辭職前要他們把打工費吐出來！"
10008100-86 = "[s]「那麼就來分配任務吧。」"
10008100-88 = "正門由我們負責，而後門交給便利屋68對吧？"
10008100-89 = "這次茜香也跟他們一起去吧？"
10008100-90 = "就這麼做！"
10008100-91 = "交給我們吧。"
10008100-92 = "賽錢箱的仇，我非報不可。"
10008100-94 = "那，那麼那邊就拜託你們了！"
10008100-95 = "我們一定會和老師一起取下敵將的首級！"
10008100-96 = "嗯，既然社長都這麼說了。"
10008100-97 = "是，是！交給我吧！"
10008100-98 = "咯呵呵呵！那麼就……突擊──！"

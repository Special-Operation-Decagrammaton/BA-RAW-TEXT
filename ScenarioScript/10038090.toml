[translation]
10038090-1 = "Episode 9;For All Cumbersome Things"
10038090-16 = "G-Genryumon?! Madam President?!"
10038090-17 = "What brings you all the way down here...?"
10038090-19 = "I've come to release Yakushi Saya."
10038090-21 = "Saya, from the Eastern Alchemy Society?!"
10038090-22 = "That..."
10038090-24 = "Is there a problem?"
10038090-29 = "......"
10038090-30 = "The Eastern Alchemy Society asked us, VERY clearly, to keep her locked up for as long as possible..."
10038090-31 = "On charges of, um, failure of management."
10038090-33 = "I see. And are you suggesting this request of theirs supersedes my order as the president?"
10038090-34 = "Heh, go on, disobey her direct order. See what happens."
10038090-35 = "No need to scold them quite so much, Mina. You are the Executive Officer. Your words carry great weight."
10038090-39 = "I-I'm sorry, Madam President."
10038090-45 = "Please forgive our...dilemma, Madam."
10038090-47 = "A dilemma, you say?"
10038090-49 = "It's...about that disease that's spreading in Shanhaijing."
10038090-50 = "Tyke Syndrome."
10038090-52 = "Well, you might already know, but...it's HER. She's the one who's causing it."
10038090-57 = "We know her orders don't override yours, but...if we don't obey them..."
10038090-58 = "...she won't give us the vaccine. Or the cure."
10038090-60 = "......"
10038090-61 = "I understand. Now, in the name of Genryumon, I will release Yakushi Saya myself."
10038090-66 = "Huh? You mean..."
10038090-67 = "...no one's going to blame us?"
10038090-69 = "Indeed. The responsibility belongs to Genryumon and to me, Ryuuge Kisaki."
10038090-73 = "Such is the president's burden."

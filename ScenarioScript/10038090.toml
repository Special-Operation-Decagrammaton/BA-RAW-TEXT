[translation]
10038090-1 = "第9話;為了所有麻煩的事"
10038090-16 = "玄，玄龍門！？連門主大人也在！？"
10038090-17 = "您為何會來這裡……？"
10038090-19 = "妾身是來釋放藥子沙耶的。"
10038090-21 = "沙，沙耶指的是前任的鍊丹術研究會會長嗎！？"
10038090-22 = "這恐怕有點……！"
10038090-24 = "哦？有什麼問題嗎？"
10038090-29 = "……"
10038090-30 = "那個，鍊丹術研究會強烈要求我們盡可能長時間地拘禁藥子沙耶……"
10038090-31 = "罪名是……在任期間並未妥善管理鍊丹術研究會……"
10038090-33 = "也就是說，汝等認為鍊丹術研究會的要求凌駕於門主的命令之上嗎？"
10038090-34 = "哼。勸你們最好記住，若不遵從門主大人的命令，就必須受到相應的處分。"
10038090-35 = "美奈，不必對他們過分苛責。#n身為執行部長的汝，說話的份量可與凡人不同。"
10038090-39 = "是，是我失禮了，門主大人！"
10038090-45 = "……請您寬恕我們，門主大人。"
10038090-47 = "說吧。向妾身說明情況。"
10038090-49 = "那個……關於山海經的傳染病……"
10038090-50 = "也就是所謂的還童症……"
10038090-52 = "散播還童症的……就是如門主大人所料的那個人……"
10038090-57 = "我們也知道鍊丹術研究會的要求不能凌駕於門主大人的命令之上……"
10038090-58 = "但如果不服從他們的要求，就無法獲得還童症的治療藥和預防藥……"
10038090-60 = "……"
10038090-61 = "明白了。#n那麼妾身在此以玄龍門之名釋放藥子沙耶。"
10038090-66 = "咦？您的意思是……！？"
10038090-67 = "要將所有的責任……！"
10038090-69 = "正是如此。#n一切責任都將由玄龍門──或者進一步說，是由門主龍華妃姬承擔。"
10038090-73 = "門主之位，本就是為了承擔各種麻煩事而存在的啊。"

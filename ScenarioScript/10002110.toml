[translation]
10002110-1 = "ตอนที่ 11;วอลเลย์บอลชายหาด"
10002110-2 = "(ตอนนี้ภารกิจที่ต้องทำตามรายการเหลือเพียงแค่สองอย่างแล้ว)"
10002110-4 = "ได้เวลาของวอลเลย์บอลชายหาดแล้วค่ะ!"
10002110-5 = "คราวนี้ฉันเตรียมลูกวอลเลย์บอลมาพร้อมแล้วค่ะ!"
10002110-6 = "แต่ที่จริงลูกบอลนี่คุณครูซื้อมาให้ใหม่น่ะค่ะ..."
10002110-7 = "อ่า แหะๆ..."
10002110-8 = "ขอบคุณนะคะคุณครู ตอนนี้ที่ชายหาดก็ไม่ค่อยมีคนแล้ว..."
10002110-9 = "แถมยังไม่เห็นพวกคุณแยงกี้สาวอีกด้วย... คราวนี้คงไม่มีปัญหาแน่นอนค่ะ"
10002110-10 = "[s1] \"เธอดูเหนื่อยๆ นะ ฮิฟุมิจัง\"\n[s2] \"ดูเหมือนจะหมดแรงแล้วเลย...\""
10002110-11 = "คะ? ปะ...เปล่านะคะ "
10002110-12 = "คะ? ปะ...เปล่านะคะ "
10002110-13 = "คือว่า... ฉันแค่... สงสัยเฉยๆ ค่ะว่าทำไมทุกอย่างมันถึงกลายเป็นแบบนี้ไปได้..."
10002110-14 = "วันหยุดพักผ่อนฤดูร้อนที่ฉันคิดไว้ในตอนแรก มันไม่ใช่แบบนี้เลย..."
10002110-15 = "ฉันคิดว่าจะมาเที่ยวทะเลแบบสนุกๆ กับอาซึสะจังก็เท่านั้นเอง"
10002110-16 = "ฉันดูไม่สนุกงั้นเหรอ?"
10002110-17 = "ปะ... เปล่าหรอกค่ะ แต่ว่าที่จริงแล้ววันหยุดฤดูร้อนน่ะ..."
10002110-18 = "มันไม่ใช่การถูกบังคับให้มาทำภารกิจ หรือการกินน้ำปลิงทะเลแปลกๆ หรือรับมือกับการโจมตี#nของกลุ่มแยงกี้สาวหรอกนะคะ..."
10002110-19 = "และพอไม่ว่าจะทำอะไรก็ตามพวกนั้นก็มักจะโผล่มาพูดว่า \"เจอตัวแล้วล่ะ!\"#nแล้วก็เข้ามาขัดขวางทุกที..."
10002110-29 = "อยู่ที่นี่เองสินะ! เจอตัวแล้วล่ะ!!"
10002110-30 = "มาซ่อนอยู่ที่นี่กันเองหรอกเรอะ! หาตัวอยู่ตั้งนาน!"
10002110-35 = "[ns] \"...\""
10002110-37 = "พวกแยงกี้สาวโจมตี! เตรียมพร้อมรับมือแล้วค่ะ!"
10002110-38 = "ค่ะ..."

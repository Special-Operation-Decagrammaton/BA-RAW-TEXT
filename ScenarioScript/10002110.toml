[translation]
10002110-1 = "第11話;沙灘排球"
10002110-2 = "（清單上只剩下兩個任務）"
10002110-4 = "那麼開始打沙灘排球吧！"
10002110-5 = "這次有準備好球哦！"
10002110-6 = "準確來說是「老師買來的球」就是了。"
10002110-7 = "啊哈哈……"
10002110-8 = "我總是忘東忘西的，真是不好意思……謝謝老師。"
10002110-9 = "現在海邊的人變少，太妹們也沒再出現……這次總不會出問題了。"
10002110-10 = "[s1]「日步美，你還好嗎……？」\n[s2]「表情看起來很累……」"
10002110-11 = "咦？#n沒，沒事的……！"
10002110-12 = "咦？#n沒，沒事的……！"
10002110-13 = "只是在想……這樣真的好嗎……啊嗚……"
10002110-14 = "本來不該是這樣的……"
10002110-15 = "我一開始只是想讓梓醬見見大海……#n如果可以的話，希望能和大家一起度過快樂的時光。"
10002110-16 = "我很開心啊？"
10002110-17 = "不，那個……該怎麼說呢，所謂的暑假……"
10002110-18 = "不應該過得戰戰兢兢的，也不該喝奇怪的海參汁，#n更不該一而再再而三被太妹們襲擊……"
10002110-19 = "而且像這樣，每次要做點什麼都會有說著「找到你們了！」的礙事者出現實在是──"
10002110-29 = "找到你們了！竟然在這裡啊！"
10002110-30 = "害我們找了那麼久，原來躲在這種地方！"
10002110-35 = "[ns]「……」"
10002110-37 = "開始應戰！"
10002110-38 = "是……"

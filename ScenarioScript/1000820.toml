[translation]
1000820-1 = "Why She Wears The Bomber Jacket"
1000820-2 = "I headed over to Millennium Square to meet Neru."
1000820-7 = "I spotted Neru waiting on a bench on the other side of the Square."
1000820-12 = "[ns] \"...?\""
1000820-14 = "B-but... We need to go th-that way..."
1000820-15 = "Don't be stupid! Don't you see her? We'd better just turn around."
1000820-16 = "Yeah... The C&C President is so scary. She uh... She definitely stands out in a crowd."
1000820-17 = "We're lucky that she stands out like that. It makes it easy to avoid her. Actually, do you think that's why she dresses like that?"
1000820-18 = "Oh...I see. Maybe. Like a \"don't bother me\" thing..."
1000820-19 = "That's gotta be it. So we'd better do what she wants and go the other way."
1000820-24 = "[ns] \"...\""
1000820-26 = "[ns1] Go to Neru.\n[ns2] Call Neru over."
1000820-29 = "...?"
1000820-30 = "...Oh, Sensei! I wasn't expecting you to get here so fast."
1000820-35 = "You could've said something. What were you doing just standing there?"
1000820-36 = "Huh? Something wrong? Oh, no, I didn't call you about anything like that. Like I said, there's not really anything going on."
1000820-37 = "Hey! You're not thinking some crap like, \"If there's nothing going on, then why did you call,\" right? You wouldn't do that after everything..."
1000820-38 = "Eh? What?"
1000820-39 = "...Why d'you wanna know about bomber jackets all of a sudden?"
1000820-40 = "Oh, this one? My jacket? What about it?"
1000820-41 = "Unless..."
1000820-42 = "I knew you had good taste, Sensei! Do you need one!? Do you need me to get one for you!?"
1000820-43 = "Well, they're not easy to find, let me tell you, but for you, Sensei, I'll do whatever it takes..."
1000820-44 = "...Hm?"
1000820-45 = "Is that not what you meant? Then what is it?"
1000820-46 = "...Why do I wear it?"
1000820-47 = "My bomber jacket..."
1000820-48 = "..."
1000820-49 = "[s3] \"...Neru?\"\n[s4] \"Uh, are you okay?\""
1000820-52 = "Ah."
1000820-53 = "Ahah. Ah. Ha."
1000820-54 = "Nothing, it's nothing. Sorry, my bad!"
1000820-55 = "You're Sensei, not anyone else. I thought you meant...but you don't. I just flinched for a moment, is all."
1000820-56 = "Usually when people ask me why I wear this, they're trying to start a fight."
1000820-57 = "So that's why I tensed up. But you're definitely not doing that."
1000820-58 = "So, anyway. Back to your question..."
1000820-59 = "The bomber jacket... Why do I wear it... Well..."
1000820-60 = "But, hang on, why ask now? Did something happen to make you think about it, or..."
1000820-61 = "[s5] \"I was wondering if there was a story behind it.\"\n[s6] \"I was wondering if there was a meaning behind it.\""
1000820-64 = "...Oh...hm..."
1000820-65 = "When you put it like that, it's hard to come up with an answer."
1000820-66 = "If I say, \"No reason,\" you won't believe me, right? You'll just think I'm hiding something."
1000820-67 = "That's the type of person you are, Sensei. Overly kind, pointlessly considerate. It's a pain."
1000820-68 = "So, how should I explain it?"
1000820-69 = "Hm?"
1000820-70 = "Just tell you honestly? Are you sure?"
1000820-71 = "No, it's not a secret, or really anything special. Honestly, I thought no one would believe me because the reason is so simple."
1000820-72 = "But, if you really want to know, Sensei, I'll tell you."
1000820-73 = "I wear it because..."
1000820-74 = "...it's freaking cool."
1000820-79 = "So?"
1000820-80 = "Was that what you were looking for?"
1000820-81 = "[s7] \"That's...definitely simple.\"\n[s8] \"That's...a great reason.\""
1000820-84 = "Hahaha! What's with that face? I knew you'd get all weird about it."
1000820-85 = "Well, I guess I can imagine what you were thinking."
1000820-87 = "You thought it was to make up for being short, or..."
1000820-88 = "Or that I want to get people to leave me alone, or to think I'm scary."
1000820-89 = "People usually say something like that to me. Well, that's their opinion. I don't care."
1000820-90 = "Sometimes, people with too much imagination will come up with some nonsense about how it was a hand-me-down or a gift."
1000820-92 = "But the truth is, I just saw it in a shop and I thought it looked cool. I bought it on the spot."
1000820-93 = "Sorry if that's boring, but you wanted the truth."
1000820-94 = "What?"
1000820-95 = "No, I've never told anyone else that. You're the first one to ask me who really wanted to know."
1000820-96 = "Usually they're trying to get into a fight, so they're not listening to the answer, or they don't want to push me when I say there's no reason."
1000820-97 = "...The truth must be pretty disappointing, though, huh?"
1000820-98 = "[s9] \"I definitely wasn't bored at all.\"\n[s10] \"The answer fits you, Neru.\""
1000820-104 = "...Oh!"
1000820-105 = "I'm...surprised. You'd really rather that answer than whatever wild story people make up?"
1000820-106 = "I literally just told you there was no meaning. Why would that be better?"
1000820-107 = "[s11] \"You don't really need a reason, right?\"\n[s12] \"People should dress however they want.\"\n[s13] \"...Because it's freaking cool.\""
1000820-114 = "*sigh*"
1000820-115 = "Sensei, this..."
1000820-116 = "This is exactly why..."
1000820-126 = "...I like you."

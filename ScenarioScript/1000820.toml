[translation]
1000820-1 = "穿絲卡將的理由"
1000820-2 = "（抵達了和寧瑠約好見面的千年校園廣場）"
1000820-7 = "（在廣場角落的長椅上看見了寧瑠）"
1000820-12 = "[ns]「……？」"
1000820-14 = "那個，就這樣走過去真的沒問題嗎……"
1000820-15 = "還是不要比較好吧！我們繞路吧！"
1000820-16 = "C&C的部長，每次看到都覺得很恐怖呢……"
1000820-17 = "幸好他的絲卡將已經變成一種記號，讓人遠遠的就能分辨出來……"
1000820-18 = "確實……已經像是記號一樣了呢……"
1000820-19 = "好啦，趕快從那邊走吧！"
1000820-24 = "[ns]「……」"
1000820-26 = "[ns1] 走向寧瑠\n[ns2] 揮手叫寧瑠"
1000820-29 = "……？"
1000820-30 = "啊啊，是老師啊。來的比想像中還早嘛。"
1000820-35 = "啊？剛才就到了？既然已經到了就早點出聲嘛。"
1000820-36 = "……有什麼事？其實也沒什麼。"
1000820-37 = "你該不會想說「沒事幹嘛找你出來」之類的話吧？#n老師和我都這麼熟了！"
1000820-38 = "……啊？"
1000820-39 = "……絲卡將？我身上穿的這件？"
1000820-40 = "怎麼了嗎？"
1000820-41 = "難道……"
1000820-42 = "老師也有興趣嗎！？要不要也來一件？#n啊，如果想找喜歡的款式，我可以介紹店家給你哦！"
1000820-43 = "雖然要找到好東西也沒有那麼容易就是了。#n不過如果老師想要的話，我會想辦法……"
1000820-44 = "……啊啊？"
1000820-45 = "不是那個意思？那為什麼要要提到絲卡將啊？"
1000820-46 = "我穿著的理由……？"
1000820-47 = "絲卡將？"
1000820-48 = "……"
1000820-49 = "[s3]「……寧瑠？」\n[s4]「那個，不想說的話也不用勉強……」"
1000820-52 = "……！"
1000820-53 = "沒，沒什麼啦。"
1000820-54 = "別在意，真的沒什麼。"
1000820-55 = "……只是反射性地覺得是不是對我的打扮有意見而已。#n明明老師不可能會這麼做的。"
1000820-56 = "因為每次講到絲卡將的話題，總是會得到否定的反應。"
1000820-57 = "所以不自覺的就……抱歉。"
1000820-58 = "嘛，回到剛才的問題吧。"
1000820-59 = "穿著絲卡將的理由啊……"
1000820-60 = "怎麼突然這麼問？"
1000820-61 = "[s5]「總覺得是不是有什麼理由。」\n[s6]「因為你看起來非常喜歡。」"
1000820-64 = "……哼。"
1000820-65 = "該怎麼說呢……"
1000820-66 = "如果我說「沒有特別的理由」，想必也只會讓老師產生不必要的擔心吧……"
1000820-67 = "雖然那也沒什麼不好。"
1000820-68 = "……不過該怎麼解釋才好呢。"
1000820-69 = "嗯？"
1000820-70 = "不用想太多，告訴你最真實的理由就可以了……？"
1000820-71 = "……不，真的不是什麼特別的理由。#n我反而覺得老師會不會覺得理由太單純而無法接受。"
1000820-72 = "看來只能老實回答了啊……"
1000820-73 = "我之所以會穿著絲卡將的理由……"
1000820-74 = "……是因為酷斃了！"
1000820-79 = "……怎麼樣？"
1000820-80 = "哈哈哈！你那是什麼表情！"
1000820-81 = "[s7]「原，原來如此……」\n[s8]「想了一圈還真是沒想到這種可能性呢。」"
1000820-84 = "我就知道你大概會是那種反應。"
1000820-85 = "或者該說很難想像出那個以外的反應吧。"
1000820-87 = "其他人可能會有各種想像吧。#n像是為了抹除身材矮小的形象……"
1000820-88 = "或是讓別人敬而遠之、不想和奇怪的人扯上關係之類的……"
1000820-89 = "要怎麼想像是每個人的自由，所以別人想怎麼說都無所謂。"
1000820-90 = "我還聽過這是從某個人身上繼承下來的東西之類的說法……"
1000820-92 = "……不過，理由真的不是什麼大不了的事。#n就只是單純的喜歡、一看到它的瞬間就覺得「就是這個了！」而已。"
1000820-93 = "真抱歉啊，答案這麼無趣。"
1000820-94 = "……什麼？"
1000820-95 = "知道這件事的人？#n怎麼可能會有呢。再說認真問我這個問題的人，老師你還是第一個啊。"
1000820-96 = "大家或許都認為我穿著絲卡將是件理所當然的事了吧。"
1000820-97 = "……果然很無趣對吧。要是理由再有趣一點就好了。"
1000820-98 = "[s9]「不會唷。我又更了解寧瑠了呢。」\n[s10]「這種理由也沒什麼不好的不是嗎。」"
1000820-104 = "……嘿。"
1000820-105 = "真是的，老師還是跟往常一樣。"
1000820-106 = "居然會覺得這種理由很好，真是個奇怪的人。"
1000820-107 = "[s11]「因為我想了解寧瑠的心情。」\n[s12]「衣服就該穿自己喜歡的才對，不用在意他人的眼光。」\n[s13]「而且我也覺得酷斃了哦！」"
1000820-114 = "……哈。"
1000820-115 = "呵呵……"
1000820-116 = "這樣才是我認識的老師嘛。"
1000820-126 = "你的這種地方，我不討厭哦。"

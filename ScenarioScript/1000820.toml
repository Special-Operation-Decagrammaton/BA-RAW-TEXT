[translation]
1000820-1 = "เหตุผลที่ใส่ซูคาจัน"
1000820-2 = "(คุณครูมาที่จัตุรัสโรงเรียนมิลเลเนียม ตามที่นัดกับเนรุไว้)"
1000820-7 = "(พอมาถึงก็เห็นเนรุนั่งรออยู่ที่ม้านั่งที่มุมหนึ่งของจัตุรัส)"
1000820-12 = "[ns] \"...?\""
1000820-14 = "คะ...คือว่าพวกเราจะต้องไปทางนั้นกันนะ..."
1000820-15 = "เธอจะบ้ารึไง! ไม่เห็นเหรอว่า 'คนคนนั้น' อยู่ตรงนั้นน่ะ? ฉันว่าพวกเรากลับกันดีกว่านะ"
1000820-16 = "หัวหน้าชมรม C&C... น่ากลัวสุดๆ มองจากดาวอังคารยังเห็นออร่าของความโหดเลย..."
1000820-17 = "โชคดีแล้วที่เห็นเธอก่อน อย่างน้อยก็จะได้หาทางหลบเธอได้... บางทีเธออาจจะตั้งใจใส่เสื้อ#nตัวนั้นมาเพื่อแบบนี้ก็ได้นะ"
1000820-18 = "อา...เข้าใจแล้ว เหมือนจะบอกเป็นนัยๆ ว่า 'อย่ามาห้าวกับฉัน' แบบนี้สินะ..."
1000820-19 = "คงงั้นแหละ เพราะงั้นเรารีบกลับกันเถอะ ไปทางโน้นเร็ว..."
1000820-24 = "[ns] \"......\""
1000820-26 = "[ns1] เดินเข้าไปหาเนรุ\n[ns2] โบกมือแล้วเรียกเนรุ"
1000820-29 = "......?"
1000820-30 = "...อ้าว ครู! มาแล้วเหรอ? มาเร็วกว่าที่คิดไว้อีกแฮะ?"
1000820-35 = "อะไรกัน ถ้ามาถึงแล้วก็ส่งเสียงบอกกันหน่อยสิ แล้วนี่มัวยืนเหม่ออะไรอยู่อีกน่ะ?"
1000820-36 = "หืม? ฉันเรียกครูมาทำไมน่ะเหรอ? ก็ไม่มีอะไรเป็นพิเศษหรอก แค่เรียกมาเฉยๆ น่ะ? บอกแล้วไง#nว่าวันนี้ฉันว่าง"
1000820-37 = "เฮ้! คงไม่ได้กำลังคิดว่า \"ถ้าไม่มีอะไร แล้วจะเรียกออกมาทำไม\" อะไรแบบนี้อยู่หรอกใช่มั้ย?"
1000820-38 = "...หืม? ว่าไงนะ?"
1000820-39 = "...ซูคาจัน? ทำไมจู่ๆ ถึงถามเรื่องเสื้อซูคาจันล่ะ..."
1000820-40 = "ตัวที่ใส่อยู่นี่น่ะเหรอ? ทำไมล่ะ?"
1000820-41 = "...หรือว่า!!"
1000820-42 = "ครูก็อยากได้เหมือนกันเหรอ? เอาสักตัวมั้ย?! เดี๋ยวฉันหามาให้?!"
1000820-43 = "เอาเถอะ ถึงมันจะไม่ใช่ของที่หาได้ง่ายๆ แต่ถ้าครูอยากได้ละก็ ฉันจะหามาให้..."
1000820-44 = "...หืม?"
1000820-45 = "ไม่ได้หมายความว่าอย่างนั้นเหรอ? แล้วถามทำไมล่ะ?"
1000820-46 = "ทำไมฉันถึง...ใส่เสื้อซูคาจันเหรอ...?"
1000820-47 = "ซูคาจัน..."
1000820-48 = "......"
1000820-49 = "[s3] \"เนรุ...?\"\n[s4] \"ทำไมจู่ๆ ถึงเงียบไปล่ะ?\""
1000820-52 = "...อ้อ"
1000820-53 = "เอ่อ... อืม... อ่า..."
1000820-54 = "ปะ...เปล่าๆ ไม่มีอะไร ฉันเข้าใจผิดไปเองน่ะ โทษทีๆ"
1000820-55 = "ครูไม่ใช่คนอื่นซะหน่อยนี่นะ เผลอคิดไปว่าบางทีครูก็อาจจะเหมือนคนอื่นๆ น่ะ... แต่คงไม่ใช่หรอก "
1000820-56 = "เพราะเวลาที่คนอื่นถามว่า 'ทำไมถึงใส่เสื้อตัวนี้' มันจะหมายถึงเรากำลังจะสู้กันไงล่ะ"
1000820-57 = "เพราะงั้นฉันเลยเผลอทำท่าแบบเมื่อกี้ใส่ครูไป ครูไม่ใช่คนพวกนั้นสักหน่อยนี่เนอะ"
1000820-58 = "กลับมาที่เรื่องที่คุยกันต่อแล้วกัน..."
1000820-59 = "ทำไมถึงใส่...ซูคาจัน... ทำไมนะ... อืม..."
1000820-60 = "ว่าแต่ว่าทำไมจู่ๆ ถึงสงสัยอะไรแบบนี้ขึ้นมาล่ะ?"
1000820-61 = "[s5] \"แค่สงสัยว่ามีความเป็นมายังไงน่ะ\"\n[s6] \"แค่สงสัยว่ามีความหมายอะไรพิเศษรึเปล่าน่ะ\""
1000820-64 = "อ๋อ... อืม..."
1000820-65 = "พอโดนถามแบบนี้ ก็ไม่รู้เลยว่าจะตอบยังไงดี"
1000820-66 = "ถ้าฉันตอบไปว่า 'ไม่มีเหตุผลอะไรพิเศษ' ครูก็คงไม่เชื่อ แล้วก็คงคิดว่าฉันปิดบังอะไรอยู่อีกใช่มั้ยล่ะ?"
1000820-67 = "ก็ครูเป็นคนแบบนั้นนี่นา ทั้งใจดีแบบไม่มีเหตุผล แล้วก็คอยเอาใจใส่กันอยู่ตลอด"
1000820-68 = "...ฉันเลยกังวลว่าจะอธิบายยังไงดี"
1000820-69 = "...หืม?"
1000820-70 = "แค่บอกเหตุผลมาตรงๆ ก็พองั้นเหรอ? แน่ใจนะ?"
1000820-71 = "อันที่จริงมันไม่ใช่เรื่องยิ่งใหญ่อะไรหรอก ฉันแค่คิดว่าบอกไปแล้วอาจจะไม่เชื่อก็ได้ เพราะมัน#nเป็นแค่เหตุผลธรรมดาๆ น่ะ..."
1000820-72 = "แต่ก็นะ ถ้าครูพูดแบบนั้นละก็ ฉันจะบอกให้ก็ได้"
1000820-73 = "เหตุผลที่ฉันใส่ก็เพราะ..."
1000820-74 = "เพราะว่ามันเท่สุดๆ เลยน่ะสิ"
1000820-79 = "...เป็นไง"
1000820-80 = "ใช่คำตอบที่อยากฟังรึเปล่า?"
1000820-81 = "[s7] \"หะ...เหตุผลธรรมดาจริงๆ ด้วย\"\n[s8] \"มองอีกแง่ก็ถือว่าเป็นเหตุผลที่สุดยอดเลยนะ...\""
1000820-84 = "ฮะฮะฮะฮ่าฮ่าฮ่า! ดูทำหน้าเข้าสิ ครูคงคิดว่ามันแปลกจริงๆ สินะ"
1000820-85 = "ก็นะ ฉันก็พอเดาได้ว่าครูคิดอะไรอยู่"
1000820-87 = "บางคนก็คิดว่าฉันใส่ซูคาจันเพื่อลบภาพลักษณ์การเป็นเด็กตัวเล็ก..."
1000820-88 = "หรือใส่เพื่อให้ดูน่าเกรงขามขึ้นบ้างละ หรือไม่ก็ใส่เพราะไม่อยากให้ใครเข้ามายุ่งวุ่นวายบ้างละ..."
1000820-89 = "คนอื่นๆ ชอบคิดกันไปต่างๆ นา แต่มันก็เป็นความคิดของพวกเขา ฉันไม่สนหรอก"
1000820-90 = "พวกจินตนาการบรรเจิดบางคนก็ชอบคิดว่าเป็นของขวัญที่ฉันได้รับสืบทอดต่อมาบ้างละ..."
1000820-92 = "...แต่ที่จริงแล้ว ฉันไม่มีเหตุผลอื่นเลย แค่เห็นแล้วรู้สึกว่าเท่ดี ก็เลยเอามาใส่ก็แค่นั้นเอง"
1000820-93 = "โทษทีนะ มันอาจจะเป็นคำตอบที่ไม่สนุกเท่าไร แต่ก็เป็นเหตุผลจริงๆ น่ะ"
1000820-94 = "...หือ?"
1000820-95 = "เคยอธิบายให้คนอื่นฟังบ้างรึเปล่าน่ะเหรอ? ไม่เคยหรอก คนที่ถามฉันอย่างจริงๆ จังๆ ก็มีครู#nคนแรกนี่แหละ"
1000820-96 = "ส่วนใหญ่คนอื่นๆ มักจะเขามาหาเรื่องกันก่อน โดยไม่ฟังคำตอบอะไร หรือไม่ก็ไม่อยากเซ้าซี้ ถามหา#nเหตุผลจากฉันต่อน่ะ"
1000820-97 = "...คิดแล้วเชียวว่าคงเป็นเรื่องที่ไม่สนุกจริงๆ ขอโทษนะที่ทำให้ผิดหวังน่ะ"
1000820-98 = "[s9] \"ไม่หรอก เป็นคำตอบที่น่าสนใจอย่างที่คิดเลย\"\n[s10] \"ครูคิดว่าแบบนี้เหมาะกับเนรุมากกว่าอีก\""
1000820-104 = "....โฮ่"
1000820-105 = "เกินคาดเลยแฮะ บอกว่าคำตอบของฉันฟังดูดีงั้นเหรอ..."
1000820-106 = "ทำไมล่ะ? ไม่ได้มีอะไรพิเศษสักหน่อย ทำไมถึงบอกว่าเหตุผลของฉันดีล่ะ?"
1000820-107 = "[s11] \"มันต้องมีเหตุผลด้วยเหรอ?\"\n[s12] \"คนเราจะแต่งตัวยังไงก็ได้นี่นา ไม่เห็นต้องมีเหตุผลเลย\"\n[s13] \"...เปล่านี่ แค่เธอเท่สุดๆ ไปเลย\""
1000820-114 = "...เฮ้อ"
1000820-115 = "จริงๆ เลยนะ ครูเนี่ย..."
1000820-116 = "ก็เพราะแบบนี้ไง..."
1000820-126 = "...ฉันถึงได้ชอบครูน่ะ!"

42080-37 = "3;모모카;38;……나라면 따라가지 않을 거야, 선생.\n#3;em;[반응]"
42080-38 = "3;모모카;38;이렇게 노골적으로 덫을 쳐 놓고 들어오라고 하는데, 가는 게 더 이상하잖아?"
42080-39 = "3;모모카;24;분명 의자에 깔고 앉은 감자칩마냥 험한 꼴을 당하게 될걸."

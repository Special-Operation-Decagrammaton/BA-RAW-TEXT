[translation]
42080-1 = "第8話;新任代理"
42080-2 = "聯邦學生會大樓入口"
42080-3 = "（看完香耶的轉播後，來到了聯邦學生會的大樓）"
42080-10 = "老，老師……！"
42080-11 = "不，不好了……琳前輩……琳前輩被……！"
42080-12 = "[s1]「先冷靜點，步。」\n[s2]「發生什麼事了？」"
42080-13 = "那個……就是……"
42080-14 = "那個……就是……"
42080-15 = "琳前輩被軟禁了。"
42080-16 = "說是涉嫌為了私利私慾而偽造聯邦學生會長的書信，#n以及對其他幹部進行恐怖攻擊。"
42080-17 = "[s]「聯邦學生會長的信……？」"
42080-18 = "一，一定是有什麼誤會……！"
42080-19 = "與其說是誤會……應該是被人陷害了吧。"
42080-20 = "如果那個一板一眼的前輩是會為了私利私慾行動的人，#n聯邦學生會的工作就不會這麼難推行了吧。"
42080-21 = "……不過也是因為那種個性才會被這麼明目張膽的陷害就是了……"
42080-22 = "[s]「步和桃香沒事嗎？」"
42080-23 = "是的……目前對我們還沒有造成特別的影響，不過……"
42080-24 = "前輩被軟禁的消息傳開之後，#n在議會中支持香耶防衛室長繼任聯邦學生會長代理的聲量變得很大……"
42080-25 = "而支持琳前輩的人們則礙於情勢，被逐出了會場……"
42080-26 = "雖然我總是把不想工作掛在嘴邊……#n沒想到有一天會用這種方式翹班啊。"
42080-33 = "……[USERNAME]老師，感謝您大駕光臨。"
42080-34 = "「新的聯邦學生會長代理」正在等您。"
42080-35 = "請跟我來。"
42080-37 = "──老師，換作是我是不會去的哦。"
42080-38 = "這麼顯而易見的陷阱還自己走進去，你是認真的嗎？"
42080-39 = "要是像連袋子一起被壓碎的洋芋片一樣變得亂七八糟的，我可不管哦。"
42080-40 = "[s]「……一定沒問題的，才對。」"
42080-42 = "[ns]「我去去就回。桃香、步。」"
42080-43 = "唉……雖然沒頭沒腦的樂觀是老師的優點啦……"
42080-44 = "算了，再說下去可能也沒什麼幫助吧。#n像我這種懶惰鬼也幫不上什麼忙……"
42080-45 = "請，請一定要小心喔，老師……！"
42080-49 = "……請跟我來。"
42080-51 = "聯邦學生會長代理辦公室"
42080-52 = "您好，[USERNAME]老師。"
42080-53 = "突然因為聯邦學生會的事情打擾您，真是非常抱歉。"
42080-54 = "雖然曾派人去迎接，不過您今天午後似乎並不在夏萊，#n因此只好採取這樣的形式。"
42080-55 = "現在聯邦學生會發生了分秒必爭的緊急事態，#n關於這件事希望能稍微和老師商量商量，於是才會勞煩您走一趟。#n儘管處於十萬火急的情況，依舊是採取了失禮的手段，我在此向您道歉。"
42080-59 = "……話說回來，剛才發生了什麼急事嗎？#n我記得老師的行程表上沒有類似的計畫才對。"
42080-60 = "[s]「我臨時有事。」"
42080-62 = "[ns]「……比起這個，琳呢？」"
42080-63 = "琳行政官因為某些原因待在宿舍。"
42080-64 = "並且和在轉播中告知的一樣，我現在正代替他執行聯邦學生會長代理的工作。"
42080-65 = "──依照「聯邦學生會長的書信」的指示。"
42080-66 = "[s]「那封信是在哪裡發現的？」"
42080-67 = "……在夏萊的地下。"
42080-68 = "那裡保管的不只有信件，還有以工藝室為首的聯邦學生會長不為人知的私人物品。#n因此我想應該不會錯。"
42080-69 = "或許是在交付夏萊權限時出了一些小差錯。"
42080-70 = "即使是像琳行政官那樣的人，有時也是會犯錯的。"
42080-71 = "[s]「……香耶，你擅自進入了夏萊的地下嗎？」"
42080-75 = "……這個嘛，這點我並不否認。"
42080-76 = "D.U.因上次的政變而陷入混亂時，我確實派人入侵了夏萊的地下，#n並帶回了聯邦學生會長留下的物品。"
42080-77 = "我一直抱持著疑問。#n聯邦學生會長為何會把代理的工作交給琳行政官這種說不上完美的人就失蹤了。"
42080-78 = "其中是不是有著某些凡人無法理解的考量呢。"
42080-79 = "於是我抱持著這個想法進行了搜索──#n最終，總算得知了聯邦學生會長真正的想法。"
42080-80 = "當然，也確實因而侵犯了老師的私人空間，這點我心裡有數。#n不過……"
42080-81 = "[s]「……你認為這是不得已的對吧。」"
42080-82 = "老師也知道吧？有拘泥於規則就無法保護的正義。"
42080-83 = "所謂規則，除非是由超人來管理，否則遲早會出現漏洞。#n也必定會出現趁虛而入之人。"
42080-84 = "因此為了加以排除，必須要有強大的力量。"
42080-85 = "……凱薩公司上次確實做的有些過火沒錯，但他們所擁有的力量是貨真價實的……"
42080-86 = "所以，我決定有效地活用那股力量。"
42080-87 = "當然，您不必擔心。#n身為防衛室長的我，早已經熟悉如何運用力量了。"
42080-88 = "[s]「……你打算對夏萊做什麼？」"
42080-89 = "竟然問我打算對夏萊做什麼，別人聽到會誤會的呢。"
42080-90 = "夏萊代替陷入混亂的聯邦學生會解決了奇普托斯的問題，受到了許多學生的信賴。"
42080-91 = "我們沒有理由不答謝老師，反而還加害於您。"
42080-92 = "但是……老師每天都背負著過多的工作和責任也是事實。"
42080-93 = "儘管各式各樣的學生會藉由值日生活動來盡力分擔老師的工作……#n然而除非改變夏萊的根本構造，否則老師的負擔也不會改變的吧。"
42080-94 = "對於這個問題，「我們」也一直在苦惱。#n聯邦學生會能為老師做些什麼呢？"
42080-95 = "我們得出的答案就是──"
42080-99 = "[ns]「……這個是？」"
42080-100 = "是夏萊行政程序的改善方案。"
42080-101 = "主要目的在於減輕老師的業務負擔──"
42080-102 = "並針對數項業務強化老師的權限。"
42080-103 = "請您稍微過目一下。#n如果沒有問題的話，請在這裡簽名。"
42080-104 = "[s]「在這裡簽名的話……會有什麼改變？」"
42080-106 = "什麼都……不會改變。"
42080-107 = "老師只要繼續做想做的事就行了。#n就像以前一樣。"
42080-108 = "度過與學生們的日常生活、幫助需要幫助的人──"
42080-109 = "但是，那些並不是必須得做的事。#n即使老師什麼也不做，我們也不會責怪老師。"
42080-110 = "如果需要錢，無論多少我們都能支援。"
42080-111 = "就連麻煩的報告書都能由我們代為完成。"
42080-112 = "……一切都是老師的自由。"
42080-113 = "但是……請答應我們一件事。"
42080-114 = "今後夏萊的所有活動都要以聯邦學生會的名義進行。"
42080-115 = "只要您答應，對老師行為的所有責任都能由我們來背負。"
42080-116 = "無論老師犯了什麼罪、引發了什麼問題……老師都不會被責備。"
42080-117 = "我認為這個提議並不壞。"
42080-118 = "您想想，大人不是最討厭承擔責任了嗎？"
42080-120 = "那麼就由我來照顧老師。"
42080-121 = "把一切都交給我，自由地享樂吧？"
42080-123 = "[ns]「你的好意我心領了。」"
42080-125 = "[ns]「但是願意為自己的言行負責的才是大人。」"
42080-127 = "…………什麼？"
42080-128 = "老師，我再跟您說明一次……"
42080-129 = "這個改善方案是為了讓老師變得更自由。"
42080-130 = "並不會綁住老師或是限制夏萊的權限……"
42080-131 = "還是說有什麼讓您在意的部分嗎？"
42080-132 = "[s]「確實聽起來很有魅力……」"
42080-134 = "[ns3]「但如果大人展現出逃避責任的一面……」\n[ns4]「就不能以老師的身分成為學生的榜樣了。」"
42080-139 = "唉……"
42080-140 = "真是個難以溝通的大人呢。"
42080-141 = "對社會毫不關心，總是懷抱著孩子般的幻想……"
42080-142 = "沒有什麼是比面對這種丟臉的大人還累的事了……"
42080-143 = "……我知道了。#n既然如此，這件事就暫時保留吧。"
42080-148 = "從明天起，變更為新體制的聯邦學生會預計將進行行政改革。"
42080-149 = "根據改革方案，奇普托斯將會依照規定被完美地統治，#n以安全且「美麗的新世界」的面貌重生吧。"
42080-150 = "見證嶄新的奇普托斯後，老師說不定會也改變心意。"
42080-151 = "我們防衛室──不，聯邦學生會隨時等待老師的到來。"
42080-152 = "那麼，以後也請您多多指教。"
42080-153 = "[ns] 回去"
42080-159 = "下一話;D.U.嶄新的早晨"

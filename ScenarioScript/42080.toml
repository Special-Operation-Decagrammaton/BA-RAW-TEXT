[translation]
42080-1 = "ตอนที่ 8;รักษาการแทนคนใหม่"
42080-2 = "ทางเข้าอาคารองค์การนักเรียน"
42080-3 = "(คุณครูได้ฟังประกาศจากคายะและมายังอาคารองค์การนักเรียน)"
42080-10 = "คะ... คุณครู...!"
42080-11 = "กะ... เกิดเรื่องใหญ่แล้วค่ะ... รุ่นพี่ริน... ไม่สิ คุณเจ้าหน้าที่...!"
42080-12 = "[s1] \"มีเรื่องอะไรเหรอ?\"\n[s2] \"ใจเย็นๆ ก่อนนะ อายูมุ\""
42080-13 = "คือว่า... เรื่องนั้น..."
42080-14 = "คือว่า... เรื่องนั้น..."
42080-15 = "รุ่นพี่รินถูกขังน่ะ"
42080-16 = "โดนกล่าวหาว่าปลอมแปลงจดหมายของประธานองค์การนักเรียนเพื่อผลประโยชน์ของตนเองและยุยงให้#nเกิดการก่อการร้าย"
42080-17 = "[s] \"จดหมายของประธานองค์การนักเรียน...?\""
42080-18 = "ตะ... ต้องมีเรื่องเข้าใจผิดอะไรแน่นอนค่ะ"
42080-19 = "เข้าใจผิดอะไรล่ะ คงโดนใครใส่ร้ายป้ายสีน่ะสิ"
42080-20 = "ถ้ารุ่นพี่ที่ดื้อรั้นคนนั้นเป็นคนที่ทำอะไรเพื่อผลประโยชน์หรือเกียรติยศของตัวเองละก็ การทำงานใน#nองค์การนักเรียนคงไม่เคร่งครัดขนาดนั้นหรอก "
42080-21 = "ก็เพราะแบบนั้นไงถึงเล่นงานในการใส่ร้ายป้ายสีอย่างไม่สะทกสะท้านเลย..."
42080-22 = "[s] \"อายูมุกับโมโมกะไม่เป็นอะไรใช่ไหม?\""
42080-23 = "ค่ะ... แต่เราก็ยังไม่ได้ยินเรื่องอะไรมาเลย..."
42080-24 = "พอมีข่าวว่ารุ่นพี่ถูกขัง ความคิดเห็นของพวกกรรมการที่สนับสนุนหัวหน้าสำนักป้องกันคายะให้รับช่วง#nต่อในการลงมติไม่ไว้วางใจก็หนักข้อขึ้นมา..."
42080-25 = "ส่วนคนที่อ้างความบริสุทธิ์ของรุ่นพี่รินก็ถูกไล่ออกมาจากที่ประชุมค่ะ..."
42080-26 = "ถึงฉันจะพูดติดปากมาตลอดว่าไม่อยากทำงาน แต่ก็ไม่เคยคิดเลยว่าจะมีวันที่จะได้โดดงานด้วยวิธีนี้..."
42080-33 = "... มาแล้วเหรอคะ คุณครู [USERNAME]"
42080-34 = "ท่าน 'รักษาการแทนประธานองค์การนักเรียนคนใหม่' กำลังรออยู่เลยค่ะ"
42080-35 = "เชิญทางนี้ค่ะ"
42080-37 = "... ถ้าเป็นฉันละก็นะ ฉันไม่ตามไปหรอกครู"
42080-38 = "วางกับดักอย่างเปิดเผยแล้วสั่งให้เข้าไปแบบนี้ ถ้าเข้าไปมันจะยิ่งแปลกนะ"
42080-39 = "ต้องโดนเล่นงานจนเละไม่ต่างจากมันฝรั่งทอดที่วางไว้บนเก้าอี้แล้วมีใครมานั่งทับแน่"
42080-40 = "[s] \"... คงไม่เป็นไรหรอก\""
42080-42 = "[ns] \"เดี๋ยวครูมานะ โมโมกะ อายูมุ\""
42080-43 = "เฮ้อ... การมองโลกในแง่ดีโดยไร้แผนรับมือมันก็คือข้อดีของครูอยู่หรอกนะ แต่ก็เอาเถอะ"
42080-44 = "ยังไงซะจอมขี้เกียจอย่างฉันคงจะไม่เป็นประโยชน์อะไรในสถานการณ์นี้หรอก"
42080-45 = "ละ... แล้วกลับมาอย่างปลอดภัยนะคะคุณครู...!"
42080-49 = "เชิญทางนี้ค่ะ..."
42080-51 = "สำนักงานรักษาการแทนประธานองค์การนักเรียน"
42080-52 = "สวัสดีค่ะ คุณครู [USERNAME]"
42080-53 = "ขอโทษที่สร้างความเดือดร้อนให้จากงานขององค์การนักเรียนแบบนี้นะคะ"
42080-54 = "ตามธรรมเนียมแล้วฉันควรส่งคนไปเชิญคุณครูมาอย่างเป็นกิจลักษณะ แต่เห็นว่าตั้งแต่ช่วงบ่ายวันนี้#nคุณครูไม่อยู่น่ะค่ะ"
42080-55 = "คุณครูอาจทราบเรื่องจากการประกาศไปแล้ว สิ่งที่เกิดขึ้นในตอนนี้เป็นประเด็นด่วนเรื่องการแย่งชิง ฉันก็เลยเสียมารยาทและเรียกคุณครูมาพบเป็นการส่วนตัวค่ะ ได้โปรดให้อภัยด้วยนะคะ"
42080-59 = "... ฉันไม่เห็นว่าคุณครูมีตารางงานพิเศษอะไรน่ะค่ะ หรือว่ามีที่ไหนที่ต้องรีบไปหรือเปล่าคะ?"
42080-60 = "[s] \"ครูมีธุระนิดหน่อยน่ะ\""
42080-62 = "[ns] \"... รินเป็นยังไงบ้าง?\""
42080-63 = "เจ้าหน้าที่รินมีเรื่องนิดหน่อย ก็เลยถูกกักตัวอยู่ที่หอพักค่ะ"
42080-64 = "และก็ตอนนี้ฉันกำลังทำหน้าที่ในตำแหน่งรักษาการประธานองค์การนักเรียน แทนหัวหน้าฝ่ายบริหาร#nที่ไม่สามารถทำหน้าที่ได้ตามที่ระบุไว้ใน 'จดหมายของประธานองค์การนักเรียน' ค่ะ"
42080-65 = "ยังไงก็ขอฝากเนื้อฝากตัวด้วยนะคะ"
42080-66 = "[s] \"เจอจดหมายของประธานองค์การนักเรียนจากที่ไหนเหรอ?\""
42080-67 = "... ห้องใต้ดินของชาเล่ต์ค่ะ"
42080-68 = "พอดีที่นั่นเป็นเหมือนคราฟต์แชมเบอร์ที่มีข้าวของส่วนตัวของประธานองค์การนักเรียนที่ไม่เป็นที่เปิด#nเผยอยู่น่ะค่ะ"
42080-69 = "ไม่แน่ว่ามันอาจจะมีความผิดพลาดนิดหน่อยในกระบวนการโอนสิทธิ์ของชาเล่ต์ก็ได้ค่ะ"
42080-70 = "บางทีคนอย่างเจ้าหน้าที่รินก็ทำพลาดได้เหมือนกันนะคะ"
42080-71 = "[s] \"คนที่เข้ามาในห้องใต้ดินของชาเล่ต์โดยไม่ได้รับอนุญาตคือคายะหรอกเหรอ?\""
42080-75 = "... ใช่ค่ะ ฉันไม่ขอปฏิเสธ"
42080-76 = "ตอนที่ D.U. ต้องเจอกับการปฏิวัติคราวก่อน ฉันแอบสั่งให้คนไปเอาของที่ประธานนักเรียนทิ้งไว้จาก#nห้องใต้ดินของชาเล่ต์ค่ะ"
42080-77 = "... ฉันคิดว่ามันแปลกๆ น่ะค่ะ การที่ยอดคนอย่างประธานองค์การนักเรียนมอบหมายงานรักษาการแทน#nให้คนอ่อนประสบการณ์อย่างเจ้าหน้าที่ริน แล้วหายตัวไป"
42080-78 = "มันต้องมีความเข้าใจผิดบางอย่างที่บุคคลธรรมดาไม่อาจเข้าใจได้"
42080-79 = "และจากการค้นหานี้ ทำให้ฉันอ่านความคิดภายในใจที่แท้จริงของประธานองค์การนักเรียนได้ค่ะ"
42080-80 = "ถึงแม้การเข้าไปค้นหามันจะเป็นการบุกรุกพื้นที่ส่วนตัวของคุณครูนิดหน่อยก็เถอะค่ะ..."
42080-81 = "[s] \"... คิดว่าเป็นเรื่องที่ช่วยไม่ได้สินะ\""
42080-82 = "คุณครูเคยได้ยินหรือเปล่าคะ ว่าโลกนี้มี 'ความยุติธรรมที่รักษาไว้ไม่ได้หากถูกผูกมัดอยู่กับกฎเกณฑ์'?"
42080-83 = "ตราบใดที่ผู้ควบคุมกฏเกณฑ์ไม่ได้เป็นยอดคน กฎทุกข้อในโลกก็ล้วนแล้วแต่มีช่องโหว่ และก็จะมีพวก#nหนอนที่ใช้กฏเหล่านั้นอย่างผิดๆ"
42080-84 = "ดังนั้นเราถึงได้ต้องมีอำนาจที่แข็งแกร่งในการทำลายพวกหนอนและแมลงให้โทษพวกนี้ค่ะ"
42080-85 = "คราวที่แล้วกับทางไคเซอร์ คอร์เปอเรชั่นเองก็มีความตั้งใจมากเกินไป แต่ยังไงพลังอำนาจที่พวกเขามี#nก็ไม่ใช่เรื่องโกหกค่ะ"
42080-86 = "ในฐานะหัวหน้าสำนักป้องกัน ฉันคุ้นเคยกับการฝึกฝนและจัดการพลังที่แข็งแกร่งดีค่ะ"
42080-87 = "และไหนๆ ก็ได้เป็นรักษาการแทนประธานองค์การนักเรียนในครั้งนี้แล้ว ฉันเลยว่าจะใช้ความสามารถที่#nมีให้เป็นประโยชน์อีกนิดค่ะ"
42080-88 = "[s] \"... คิดจะทำอะไรกับชาเล่ต์ล่ะสิ?\""
42080-89 = "จะทำอะไรกับชาเล่ต์งั้นเหรอคะ พูดแบบนี้ใครมาได้ยินคงเข้าใจผิดนะคะ"
42080-90 = "ชาเล่ต์และคุณครูช่วยออกหน้าแทนองค์การนักเรียนที่ตกอยู่ในความสับสนอลหม่านและคลี่คลาย#nเหตุการณ์น้อยใหญ่ในคิโวทอสให้ อีกทั้งยังได้รับความไว้วางใจจากนักเรียนหลายคนเลยนะคะ"
42080-91 = "พวกฉันควรจะตอบแทนคุณครูแท้ๆ แต่กลับได้รับคำถามว่าจะทำยังไงกับชาเล่ต์— พวกฉันไม่มีทางทำ#nอะไรน่าละอายแบบนั้นหรอกค่ะ"
42080-92 = "แต่ก็เป็นความจริงที่แน่ชัดว่าตอนนี้พวกฉันให้งานและความรับผิดชอบที่หนักมากเกินไปแก่คุณครูค่ะ"
42080-93 = "พวกฉันพยายามจะลดภาระงานของคุณครูด้วยวิธีอย่างการให้นักเรียนไปช่วยเข้าเวรนะคะ แต่เพราะโครงสร้างพื้นฐานของชาเล่ต์ ทำให้คุณครูต้องมาเจอกับงานหินอยู่อย่างนี้ทุกวันค่ะ"
42080-94 = "'พวกฉัน' เองก็เลยคิดกังวลอยู่ไม่น้อยเลยค่ะ"
42080-95 = "ว่า 'องค์การนักเรียนจะช่วยอะไรคุณครูที่พยายามทำงานหนักอยู่ตลอดเวลาได้บ้าง'"
42080-99 = "[ns] \"...... นี่มัน?\""
42080-100 = "แผนปรับปรุงขั้นตอนการบริหารฉบับใหม่ของชาเล่ต์ค่ะ"
42080-101 = "รบกวนตรวจสอบด้วยนะคะ"
42080-102 = "สาระสำคัญหลักๆ คือการเพิ่มสิทธิและลดภาระงานของคุณครูค่ะ"
42080-103 = "ช่วยอ่านคร่าวๆ และหากถูกใจกับแผนปรับปรุงใหม่นี้ก็ช่วยเซ็นชื่อด้วยนะคะ"
42080-104 = "[s] \"ถ้าครูเซ็นชื่อตรงนี้... จะมีอะไรเปลี่ยนไปเหรอ?\""
42080-106 = "ไม่มีอะไร... เปลี่ยนแปลงไปหรอกค่ะ"
42080-107 = "คุณครูสามารถทำสิ่งที่อยากทำได้เหมือนเดิมเลยค่ะ เหมือนที่คุณครูทำมาตลอดไงคะ"
42080-108 = "ทั้งพบปะกับนักเรียน และช่วยชาวเมืองที่ตกที่นั่งลำบาก..."
42080-109 = "แน่นอนว่าคุณครูไม่จำเป็นต้องอุทิศกายใจทำงานขนาดนั้นก็ได้ค่ะ ถ้าวันไหนอยากจะขี้เกียจบ้าง พวกฉันก็ไม่โทษคุณครูหรอกค่ะ"
42080-110 = "และหากต้องการเงิน พวกฉันก็จะสนับสนุนให้ไม่อั้นค่ะ"
42080-111 = "ส่วนรายงานที่น่าเบื่อ ทางฉันจะเป็นคนเขียนให้เองค่ะ"
42080-112 = "...คุณครูมีอิสระในการทำทุกอย่างเลยนะคะ"
42080-113 = "แต่ว่าพวกฉันต้องขอให้ช่วยรักษาสัญญาหนึ่งอย่างค่ะ"
42080-114 = "งานที่คุณครูทำ พวกฉันจะเป็นฝ่ายรับผิดชอบเองค่ะ"
42080-115 = "การกระทำทุกอย่างของชาเล่ต์จะถูกทำในนามขององค์การนักเรียนค่ะ"
42080-116 = "ไม่ว่าคุณจะทำบาปอะไร หรือก่อปัญหาอะไร พวกฉันจะเป็นผู้รับผิดชอบเองค่ะ"
42080-117 = "ฉันคิดว่านี่คือข้อเสนอที่ดีเลยนะคะ"
42080-118 = "ผู้ใหญ่ต่างก็ไม่ชอบการรับผิดชอบกันทั้งนั้น ไม่ใช่หรอกเหรอคะ?"
42080-120 = "ฉันจะเป็นคนจัดการให้คุณครูเองค่ะ"
42080-121 = "ฝากงานทุกอย่างไว้ที่ฉัน แล้วก็ใช้ชีวิตอย่างอิสระและสงบสุขได้เลยค่ะ"
42080-123 = "[ns] \"ขอบคุณสำหรับข้อเสนอดีๆ นะ แต่ครูไม่เซ็นหรอก\""
42080-125 = "[ns] \"ผู้ใหญ่ต้องรับผิดชอบในสิ่งที่ตัวเองทำสิ\""
42080-127 = "... คะ?"
42080-128 = "คุณครูคะ มันน่าจะมีเรื่องบางอย่างที่เข้าใจผิดนะคะ..."
42080-129 = "แผนปรับปรุงนี้ไม่ได้มีจุดประสงค์ในการควบคุมคุณครูหรือจำกัดสิทธิของชาเล่ต์หรอกนะคะ"
42080-130 = "ก็แค่เป็นข้อเสนอในทิศทางที่ให้คุณครูทำในสิ่งที่ต้องการได้อย่างอิสระและไร้ความกดดันก็เท่านั้น..."
42080-131 = "มีข้อไหนที่รู้สึกว่ายังค้างคาใจอยู่อย่างนั้นเหรอคะ?"
42080-132 = "[s] \"ข้อเสนอของคายะก็น่าสนใจอยู่หรอกนะ...\""
42080-134 = "[ns3] \"แต่ถ้าหากครูทำตัวเป็นผู้ใหญ่ที่วิ่งหนีจากความรับผิดชอบ\"\n[ns4] \"ในฐานะครูแล้ว มันคงเป็นแบบอย่างที่ไม่ดีต่อนักเรียนสักเท่าไร\""
42080-139 = "เฮ้อ..."
42080-140 = "เป็นผู้ใหญ่ที่พูดไม่รู้เรื่องจริงๆ"
42080-141 = "ผู้ใหญ่น่าสมเพชที่โอบกอดความเพ้อฝันเหมือนกับเด็กๆ ไม่มองความเป็นจริงในสังคม..."
42080-142 = "คงไม่มีงานไหนที่เหนื่อยไปกว่าการเผชิญหน้ากับผู้ใหญ่แบบนี้แล้วละ..."
42080-143 = "... ก็ได้ค่ะ ถ้าอย่างนั้นเราพับแผนปรับปรุงขั้นตอนการบริหารไว้ก่อนเถอะค่ะ"
42080-148 = "ตั้งแต่พรุ่งนี้ไป พวกฉันจะบังคับใช้แผนปฏิรูปหลักที่เรียบเรียงขึ้นใหม่ค่ะ"
42080-149 = "แผนปฏิรูปนี้จะทำให้คิโวทอสถูกควบคุมได้อย่างสมบูรณ์แบบภายใต้กฎข้อบังคับ และจะเปลี่ยนสภาพ#nเป็น 'โลกใบใหม่ที่สวยงาม' ค่ะ"
42080-150 = "ถ้าเป็นคิโวทอสที่อยู่ภายใต้การควบคุมของพวกฉัน บางทีคุณครูเองก็อาจจะเปลี่ยนความคิดก็ได้นะคะ"
42080-151 = "สำนักป้องกัน... ไม่สิ องค์การนักเรียนของเรารอให้คุณครูเข้ามาพบอยู่เสมอค่ะ"
42080-152 = "ถ้างั้นต่อไปก็รบกวนด้วยนะคะ"

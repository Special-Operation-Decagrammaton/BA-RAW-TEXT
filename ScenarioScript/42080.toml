42080-108 = "#na;카야;학생들과 일상을 보내고, 곤경에 빠진 시민들을 돕고……"
42080-109 = "#na;카야;물론 그 의무를 다하지 않으셔도 괜찮습니다. 갑자기 게으름을 부리신다 해도 선생님을 탓하지 않겠습니다."
42080-110 = "#na;카야;돈이 필요하시면 얼마든지 지원해 드리겠습니다."
42080-111 = "#na;카야;귀찮은 보고서도 저희가 대신 작성해 드리겠습니다."
42080-112 = "#na;카야;……모든 것은 선생님의 자유니까요."
42080-113 = "#na;카야;다만 단 한 가지만 약속 부탁드립니다."
42080-114 = "#na;카야;선생님이 하신 일에 대한 책임은 저희가 지겠습니다."
42080-115 = "#na;카야;샬레의 모든 활동은 총학생회의 이름으로 진행될 것입니다."
42080-116 = "#na;카야;당신이 어떤 죄를 지어도, 어떤 문제를 일으키더라도 저희가 책임지겠습니다."
42080-117 = "#na;카야;나쁜 제안은 아니라고 생각하는데요."
42080-118 = "#na;카야;왜, 어른은 책임을 지는 걸 싫어하잖아요?"

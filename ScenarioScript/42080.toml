42080-15 = "3;아유무;11\n2;모모카;05;린 선배가 연금되었어.\n#2;a\n#3;m4\n#2;em;[반응]"
42080-16 = "2;모모카;22;자신의 이득을 위해 총학생회장의 서한을 위조하고, 다른 임원들을 향해 테러를 사주한 혐의라나."
42080-17 = "[s] \"총학생회장의 서한……?\""
42080-18 = "3;아유무;08;부, 분명 무슨 오해가 있었을 거예요……!\n#3;em;[!]"
42080-19 = "2;모모카;24;오해는 무슨. 누군가의 음해를 받은 거겠지.\n#2;stiff"
42080-20 = "2;모모카;38;그 고지식한 선배가 자신의 이득이나 명예를 위해 움직이는 사람이었더라면, 총학생회의 일 처리가 이렇게 빡빡하지도 않았을걸."
42080-21 = "2;모모카;22;덕분에 이렇게 노골적인 음해에도 눈 하나 깜짝 못하고 당해버렸지만……\n#2;em;[속상함]"
42080-22 = "[s] \"아유무와 모모카는 괜찮은 거야?\""
42080-23 = "3;아유무;08;……네, 일단은 아무런 이야기도 듣지 못했는데……"
42080-24 = "3;아유무;09;선배의 연금 소식이 알려지자마자 이어진 불신임 투표에서 후임으로 카야 방위실장을 지지하는 임원들의 목소리가 엄청나게 높아져서……"
42080-25 = "3;아유무;12;린 선배의 무죄를 주장하는 사람들은 분위기에 떠밀려 회장 밖으로 쫓겨나고 말았어요……"
42080-26 = "2;모모카;06;평소부터 일하기 싫다고 입버릇처럼 말해 왔었지만, 이런 방식으로 땡땡이를 치는 날이 올 거라곤 상상도 하지 못했었는데……"

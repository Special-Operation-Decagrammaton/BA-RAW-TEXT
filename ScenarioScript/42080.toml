[translation]
42080-1 = "Episode 8; New Proxy"
42080-2 = "General Student Council Building Entrance"
42080-3 = "I went straight to the General Student Council building after hearing Kaya's broadcast."
42080-10 = "S-Sensei!"
42080-11 = "Oh, dear, we're in a tight spot... Rin is... No, the Chief Officer is...!"
42080-12 = "[s1] \"Can you update me on the situation? \n[s2] \"Calm down, Ayumu. What happened?\""
42080-13 = "Um... So..."
42080-14 = "Um... So..."
42080-15 = "Rin has been arrested."
42080-16 = "She's been accused of forging the General Student Council President's letter for her own gain and ordering acts of terrorism against fellow officers."
42080-17 = "[s] \"The letter the President left when she disappeared? How?\""
42080-18 = "I-It's all just a horrible misunderstanding!"
42080-19 = "No misunderstanding. They framed her. 100%."
42080-20 = "If our high-minded senior had been someone who is capable of considering any kind of self-interest or preservation, the General Student Council would have never recovered and continued to run the way it did."
42080-21 = "But, alas, too preoccupied with doing the right thing, she fell for their blatant schemes."
42080-22 = "[s] \"How are you both? Are you okay?\""
42080-23 = "We're hanging in there, at least for now..."
42080-24 = "In the no-confidence vote, Defense Chief Kaya's supporters were almost overwhelmingly loud."
42080-25 = "Those who argued for Rin's innocence were drowned out by the prevailing sentiment and ousted from the proceedings..."
42080-26 = "I've always complained about work, but I never thought I'd see the day when I'd skip it like this..."
42080-33 = "...You're here. [USERNAME] Sensei."
42080-34 = "The new acting General Student Council president is waiting for you."
42080-35 = "Right this way."
42080-37 = "...I'd think twice if I were you, Sensei."
42080-38 = "They're pretty blatantly setting a trap and asking you to walk into it. Going there would be pretty dumb, don't you think?"
42080-39 = "You're gonna get crushed like a potato chip."
42080-40 = "[s] \"...I'll manage. One way or another.\""
42080-42 = "[ns] \"Just stay safe until I get back, Momoka. Ayumu.\""
42080-43 = "*sigh* You're lucky blind positivity is your best trait."
42080-44 = "A slacker like me can't help you if you really wanna go in there. So, be careful."
42080-45 = "P-Please take care of yourself, Sensei!"
42080-49 = "Follow me."
42080-51 = "Office of the Acting General Student Council President"
42080-52 = "Hello, [USERNAME] Sensei."
42080-53 = "I'm sorry the General Student Council's mess has caused so much inconvenience."
42080-54 = "Normally, we would've had someone greet you formally, but I heard you were out earlier."
42080-55 = "Given the circumstances, I felt it necessary to call on you directly. I do apologize it was such a public medium."
42080-59 = "You didn't have any urgent plans, did you? Anything special planned?"
42080-60 = "[s] \"Just some errands to take care of.\""
42080-62 = "[ns] \"...Beyond that, what happened to Rin?\""
42080-63 = "Chief Officer Rin is currently under detention in the student dorms."
42080-64 = "I've stepped in as Acting President of the General Student Council, following the Student Council President's recently discovered letter."
42080-65 = "I'm looking forward to working even more closely with you, Sensei."
42080-66 = "[s] \"About that... Where did this supposed letter come from, Kaya?\""
42080-67 = "It was found in the school's basement."
42080-68 = "We store some of the President's old belongings and projects, like the Crafting Room, in there."
42080-69 = "I can completely understand how this could have happened during the transfer of authority and Schale's involvement."
42080-70 = "Even someone like Rin can make mistakes."
42080-71 = "[s] \"...And did you orchestrate this unauthorized search of the basement?\""
42080-75 = "I suppose I can't deny that at this point."
42080-76 = "Once the coup threw D.U. into chaos, I secretly had someone retrieve any of the President's belongings still in the basement."
42080-77 = "It just seemed so strange to me... The thought of a superhuman like the General Student Council President disappearing and leaving Rin of all people to fill her shoes."
42080-78 = "I thought maybe there was something we, the ordinary students, weren't getting. Some great plan."
42080-79 = "But it was thanks to this unauthorized search that I finally uncovered the General Student Council President's true intentions."
42080-80 = "I know I overstepped, but..."
42080-81 = "[s] \"But the ends justify the means?\""
42080-82 = "You're starting to get it. Sometimes rules and processes impede justice."
42080-83 = "The people in power aren't superhumans. Their laws are weak. Full of holes. And pests will always come crawling out of the woodwork to find and exploit their flimsy systems."
42080-84 = "One needs heavy boots to crush those pests, Sensei."
42080-85 = "Kaiser might have got a little overzealous during their occupation of Schale, but that doesn't mean their power is a lie. The opposite, actually."
42080-86 = "Wielding authority properly, as it was intended, happens to be a natural part of the job as the Chief of Defense."
42080-87 = "So I fully intend to use my authority as acting General Student Council president to its fullest extent."
42080-88 = "[s] \"What are you going to do with Schale?\""
42080-89 = "What am I going to do with Schale? You make me sound so villainous, Sensei."
42080-90 = "Why would I change anything? Especially after all you and your little team did for Kivotos when the General Student Council was in chaos."
42080-91 = "We appreciate your contributions and wouldn't dream of acting ungratefully."
42080-92 = "But it's also evident to anyone with eyes that you're overworked, Sensei."
42080-93 = "While students do take shifts to help lighten your day-to-day workload, Schale's organizational structure inherently means you'll always be stretched thin."
42080-94 = "So, \"we've\" been thinking."
42080-95 = "We, the members of the General Student Council, have been...brainstorming how we could... you know, \"help\" you out. Sensei."
42080-99 = "[ns] \"And how do you plan on doing that?\""
42080-100 = "This is a proposal to reform Schale's administrative structure."
42080-101 = "We hoped to present this to you for your approval."
42080-102 = "Our main goal is to lessen your workload while giving you more authority, Sensei."
42080-103 = "Take your time and look it over. If you approve, sign the dotted line."
42080-104 = "[s] \"What changes, after I sign this?\""
42080-106 = "Nothing...changes, per se."
42080-107 = "You can keep doing your job as you always have."
42080-108 = "Spend your days with your students, help citizens in need..."
42080-109 = "Of course, it's no issue if you don't want to keep working. I won't judge you if you decide to slack off a bit, Sensei."
42080-110 = "If you need money, consider yourself taken care of."
42080-111 = "We'll even handle all that tedious paperwork for you. I do remember how much you hate those reports."
42080-112 = "...The ball's in your court, Sensei."
42080-113 = "You would have to just give us one, little thing."
42080-114 = "Moving forward, we'll take responsibility for your actions."
42080-115 = "All activities in Schale will be conducted in the name of the General Student Council."
42080-116 = "Whatever you may do, whatever consequences follow Schale, we'll handle the aftermath."
42080-117 = "Not a bad proposition, right?"
42080-118 = "Adults are known for trying to dodge responsibilities, aren't they?"
42080-120 = "So I'll take on all of it for you, Sensei."
42080-121 = "You can just lean on me and finally breathe easy."
42080-123 = "[ns] \"Thank you for the offer. But I won't sign this.\""
42080-125 = "[ns] \"Being an adult means shouldering your responsibilities, no matter how heavy.\""
42080-127 = "...Come again?"
42080-128 = "Sensei, there seems to be some confusion..."
42080-129 = "Our proposal isn't about trying to pin you down. It's not an underhanded trick to take away Schale's authority."
42080-130 = "We're only looking to make your job easier, to give you more freedom. You could do whatever you wanted."
42080-131 = "Of course, the proposal isn't set in stone. If there was a clause you disliked, we can discuss it."
42080-132 = "[s] \"I won't lie. Your offer is tempting, Kaya.\""
42080-134 = "[ns3] \"But I can't let my students watch my back as I run away.\" \n[ns4] \"But slacking off doesn't exactly set the right tone for my students.\""
42080-139 = "*sigh*"
42080-140 = "You really are just a stubborn adult."
42080-141 = "A stubborn, pathetic adult so lost in your childish ideals that you can't face reality."
42080-142 = "Managing people like you is truly draining..."
42080-143 = "But fine. We'll shelve this reform proposal for now."
42080-148 = "Tomorrow, sweeping administrative reforms from our newly formed cabinet will go into effect."
42080-149 = "These changes are Kivotos' future. I'm going to transform our society into a well-regulated, perfect new world."
42080-150 = "I hope you'll reconsider, after witnessing our new Kivotos come to fruition."
42080-151 = "The Defense Department...or rather, the General Student Council is always open to you now."
42080-152 = "I expect I'll see you soon, Sensei."
42080-153 = "[ns] Leave."
42080-159 = "Next Episode; D.U.'s New Dawn"

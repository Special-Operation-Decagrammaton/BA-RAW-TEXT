42080-52 = "3;카야;00;안녕하세요, [USERNAME] 선생님.\n#3;em;[음표]\n#3;a"
42080-53 = "3;카야;00;갑자기 이렇게 총학생회의 일로 폐를 끼치게 되어 죄송합니다."
42080-54 = "3;카야;01;본래라면 사람을 보내 정식으로 모시는 게 도리에 맞았겠지만, 오늘 오후는 어째서인지 자리를 비우고 계셔서요."
42080-55 = "3;카야;00;이미 방송으로도 말씀드렸지만, 지금 일어나고 있는 일은 촌각을 다투는 긴급한 사안이기에 선생님을 공개적으로 호출하는 결례를 저질렀습니다. 부디 용서해 주시길.\n#3;greeting"
42080-56 = "#st;[0,0];instant;1;"
42080-57 = "#clearST"
42080-58 = "3;카야;00\n#wait;1500"
42080-59 = "3;카야;08;……선생님의 스케줄에 기록된 특별한 일정은 없었는데, 어디 급히 다녀와야 하는 곳이라도 있으셨나요?"
42080-60 = "[s] \"잠시 볼 일이 있어서.\""
42080-61 = "#wait;1000"
42080-62 = "[ns] \"……그보다 린은 어떻게 된 거지?\""
42080-63 = "3;카야;04;린 행정관은 약간의 사정이 있어 기숙사에 연금되어 있습니다.\n#3;em;[땀]"
42080-64 = "3;카야;00;그리고 직무를 수행할 수 없는 수석행정관을 대신하여, '총학생회장의 서한'에 따라 현재는 제가 총학생회장 대행으로서 직무를 수행하고 있습니다."
42080-65 = "3;카야;00;모쪼록, 앞으로 잘 부탁드리겠습니다.\n#3;em;[음표]"
42080-66 = "[s] \"그 총학생회장의 서한은 어디에서 발견한 거야?\""
42080-67 = "3;카야;01;……샬레의 지하실입니다."
42080-68 = "3;카야;99;그곳에는 크래프트 챔버와 같은 총학생회장의 알려지지 않은 개인 물품들이 보관되어 있거든요."
42080-69 = "3;카야;00;아마도 샬레의 권한을 인수인계하는 과정에서 약간의 실수가 있었나 봅니다."
42080-70 = "3;카야;08;린 행정관 같은 사람도 가끔씩은 실수를 할 때가 있으니까요."
42080-71 = "[s] \"샬레의 지하실을 무단으로 수색한 사람이 카야였어?\""
42080-72 = "#st;[0,0];instant;1;"
42080-73 = "#clearST"
42080-74 = "3;카야;01\n#3;em;…\n#wait;2500"
42080-75 = "3;카야;00;……그렇네요. 그 점은 부인하지 않겠습니다."
42080-76 = "3;카야;05;지난번 쿠데타로 D.U.가 혼란에 빠졌을 때, 저는 은밀히 사람을 시켜 샬레의 지하실에서 총학생회장이 남긴 물건을 가져오도록 지시했습니다."
42080-77 = "3;카야;01;……이상하다고 생각했거든요. 총학생회장과 같은 초인이 린 행정관처럼 미숙한 사람에게 대행 업무를 맡긴 채 사라지다니.\n#3;em;[속상함]"
42080-78 = "3;카야;02;분명 무언가 범인이 이해하지 못할 오해가 있었던 게 아닐까 하고."
42080-79 = "3;카야;00;그리고 이 수색을 통해, 저는 총학생회장의 진짜 의중을 읽을 수 있게 되었습니다."
42080-80 = "3;카야;01;물론 그 과정에서 선생님의 사적인 공간을 다소 침범하기는 했습니다만……"
42080-81 = "[s] \"……어쩔 수 없는 일이라고 생각하고 있구나.\""
42080-82 = "3;카야;00;규칙에 얽매여서는 지킬 수 없는 정의가 있다는 것을, 선생님께서도 알고 계시지요?"
42080-83 = "3;카야;00;규칙을 관리하는 사람이 초인이 아닌 이상, 세상의 모든 규칙에는 허점이 발생하고 이를 악용하는 벌레들이 꼬이기 마련이지요."
42080-84 = "3;카야;01;이 해충을 구제하기 위해서는 강력한 힘이 필요합니다."
42080-85 = "3;카야;00;카이저 코퍼레이션도 지난번에는 다소 의욕이 지나치긴 했지만, 그들이 갖고 있는 힘만큼은 거짓이 아니니까요."
42080-86 = "3;카야;00;저는 방위실장으로서, 강력한 힘을 조련하고 다루는 데에는 제법 익숙하답니다."
42080-87 = "3;카야;00;그래서 이번에는 총학생회장 대행이 된 김에 이 능력을 조금 더 유용하게 사용해 보고자 합니다."
42080-88 = "[s] \"……샬레를 어찌할 생각이지?\""
42080-89 = "3;카야;02;샬레를 어찌하다니, 누가 들으면 오해를 하겠네요.\n#3;em;[땀]"
42080-90 = "3;카야;01;샬레와 선생님께서는 혼란에 빠진 총학생회를 대신하여 키보토스의 여러 크고 작은 사건들을 해결해 오셨고, 많은 학생으로부터 큰 신임을 받고 있습니다."
42080-91 = "3;카야;04;그런 선생님께 답례는 하지 못할망정, 샬레를 어찌하다니— 저희가 그런 염치없는 행동을 할 리가요."
42080-92 = "3;카야;14;……하지만 선생님께 과중한 업무와 책임이 집중되고 있는 것도 명백한 사실입니다."
42080-93 = "3;카야;11;많은 학생들이 당번 활동과 같은 방법으로 선생님의 업무를 덜어드리고자 노력하고 있습니다만, 샬레의 근본적인 구조 탓에 아직도 선생님께서는 매일 격무에 시달리고 계시지요.\n#3;em;[속상함]"
42080-94 = "3;카야;12;그래서 '저희'도 많은 고민을 계속해 왔답니다."
42080-95 = "3;카야;05;언제나 열심히 노력하고 계신 선생님을 위해, '저희 총학생회에서 뭔가 도울 수 있는 일은 없을까—' 하고 말이지요.\n#3;em;…"

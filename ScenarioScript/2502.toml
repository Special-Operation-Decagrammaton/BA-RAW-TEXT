[translation]
2502-1 = "遊戲之道從禮貌開始（２）"
2502-2 = "千年近郊．大型遊戲中心"
2502-7 = "總覺得比之前來的時候大了不少。是改建過了嗎？"
2502-8 = "可能是哦。啊，還有《太空凱特》新作的機台！"
2502-10 = "柚子，那邊有新款放置型遊戲機可以試玩。"
2502-11 = "啊……！第15世代遊戲主機的時代總算……"
2502-12 = "我看看……啊，側面裝上了新型散熱裝置……前幾代的問題也改善了。"
2502-13 = "儲存空間也和以前完全不同，反應速度快了很多……"
2502-14 = "啊哈哈……果然柚子只要碰到遊戲就像變了個人一樣呢。"
2502-15 = "姐姐，我們也去玩玩看《太空凱特》吧。"
2502-16 = "嗯，那我就使出全力……"
2502-17 = "……不對！現在不是做這種事的時候了！"
2502-18 = "忘記我們來這裡的目的了嗎？得趕快把那個沒禮貌的玩家找出來才行！"
2502-21 = "我本來就是為了買新的手把才來的……"
2502-22 = "桃井，要打倒的怪物有好多。要從哪個遊戲開始玩呢？"
2502-23 = "我也不想吵架……想一直看著新的遊戲機……"
2502-24 = "不行不行！就連現在，那個玩家說不定也在哪裡口出惡言哦！？"
2502-25 = "於是失望的玩家將會離開這個遊戲，然後其他的玩家也……#n這樣下去的話，總有一天對戰型遊戲會凋零的！"
2502-26 = "這會不會有點太悲觀了……？"
2502-27 = "原來如此，這是為了拯救世界的崇高戰鬥……"
2502-28 = "勇者們啊，盡快前往魔王的大本營吧！"
2502-29 = "嗯，總之先到有《學生快打2》機台的地方吧！"
2502-31 = "人比想像中還少呢，會不會已經回去了？"
2502-32 = "不，這還很難說。看看畫面上的ID吧。"
2502-35 = "不是這個玩家……"
2502-38 = "這個也不是……"
2502-46 = "呀呼～又贏了！連戰連勝啊！"
2502-47 = "唔，又輸了……我明明有練習過了……"
2502-48 = "你說的練習就是那個像是「偶然出現」的連續技嗎？你是認真的嗎？"
2502-49 = "那種程度我看用腳都能贏吧！呵呵，啊哈哈！！"
2502-50 = "喂，雖然是遊戲也不用說得那麼過分吧！"
2502-51 = "立刻收回剛剛那句話！"
2502-52 = "才不要咧笨～蛋，連遊戲都玩不好還能做什麼啊？#n連快樂的事都不努力還會為了什麼努力啊？念書？運動？戀愛？"
2502-53 = "嗚……我要跟馬麻說！"
2502-57 = "嗚哇，真過分。還有在線下也口出惡言的玩家啊。"
2502-58 = "啊啊，找到了！是那個ID！"
2502-61 = "嗯？怎樣，你們也想挑戰我嗎？"
2502-64 = "你是「Sukeban312」沒錯吧？昨天在線上對戰那個叫我「老奶奶」對吧！"
2502-65 = "所以說……你是「Peach_Figther」？"
2502-66 = "哈哈，什麼嘛，跟我想得一樣是個小鬼嘛！"
2502-67 = "才，才不是小鬼咧！？"
2502-68 = "面對面還這樣，真是個沒禮貌的人……"
2502-69 = "……桃井，需要用[ruby=Supernova]「光之劍」[/ruby]淨化那個邪惡的魔王嗎？"
2502-70 = "不馬上為昨天的行為道歉的話，就要給你好看了哦！趕快道歉！"
2502-71 = "才不要咧～"
2502-72 = "為什麼！"
2502-73 = "我這個人，從來不向比我弱的人道歉。"
2502-74 = "為什麼要和比自己弱的人道歉咧？沒什麼意義還會讓自尊心受損不是嗎？"
2502-76 = "這傢伙……！"
2502-77 = "……姐姐，可以開槍嗎？"
2502-78 = "勇者啊，汝許可的話，我隨時可以[ruby=電磁砲]拔劍。[/ruby]"
2502-80 = "哈，既然這樣，再用《學生快打2》決鬥一次怎麼樣啊？#n只要你能贏我一場，我就為昨天的事情道歉。"
2502-81 = "這可是你說的，很好。這次我可不會手下留情……！"
2502-82 = "趕快想想該怎麼道歉吧！"
2502-83 = "那麼……"
2502-89 = "一決勝負！"
2502-96 = "<SYSTEM>「Sukeban312」選手勝利！"
2502-97 = "噗哈，什麼嘛！這麼自信滿滿地向我挑戰，就只有這點程度嗎？"
2502-98 = "你這傢伙，其實沒有遊戲天分吧？科科……！"
2502-99 = "喂！在畫面的角落一直蹲防等反擊是犯規的吧！"
2502-100 = "只用牽制技獲勝真是卑鄙！"
2502-101 = "不不不，這也是一種遊戲技巧。不甘心的話就應該去找出破解的方法才對，#n把自己定的規則強加在別人身上不覺得太幼稚了嗎？"
2502-102 = "唔……可惡！"
2502-104 = "姑且不論牽制技……#n姐姐使用的，就算被防禦也會受到一定傷害的特殊技似乎完全沒有效果……？"
2502-105 = "不覺得有點奇怪嗎……？"
2502-106 = "……對方恐怕是利用了Bug。"
2502-107 = "Bug？"
2502-108 = "是的，在《學生快打2》中有個只要進行特殊的操作就會讓畫面停止一瞬間的Bug。"
2502-109 = "對方恐怕就是濫用那個Bug來閃避桃井的攻擊。愛麗絲是這麼覺得的。"
2502-110 = "那，那樣的話不就贏不了了嗎！？"
2502-111 = "要是跟對方的實力差距很大的話還不好說，但是對方也有一定程度的情況下……"
2502-114 = "……"
2502-121 = "那個……不好意思，可以讓我代替桃井跟你對戰嗎……？"
2502-122 = "嗯，是新的挑戰者嗎？"
2502-123 = "OK，我接受挑戰。反正不管來的是誰，結果都不會改變的。哈哈哈！"
2502-124 = "……呼。稍微……"
2502-125 = "<SYSTEM> 比賽開始！"
2502-132 = "<SYSTEM> Perfect！「UZQueen」選手完勝！"
2502-133 = "怎，怎麼可能……我居然輸給了這種小鬼？"
2502-134 = "而且還是無傷……！幾乎什麼也做不了就被連續技給……！"
2502-135 = "……道歉。"
2502-136 = "……啊？"
2502-137 = "依照約定，向桃井道歉……"
2502-138 = "呿……算了，約定就是約定。"
2502-140 = "……對不起。不管是昨天還是剛才，我都說得有點過分了。"
2502-143 = "柚子好厲害！一次就打贏了！"
2502-144 = "而且居然還是完全勝利……真不愧是柚子醬！"
2502-145 = "不愧是傳說中的勇者「UZQueen」！"
2502-146 = "等，等等，大家都太誇張了……被你們說成這樣，很害羞的……"
2502-148 = "等，等一下！你，你就是「UZQueen」嗎？"
2502-149 = "那個在線上對戰排行榜從未讓出頂點的寶座……#n卻從來沒有人見過真面目的那個傳奇玩家！？"
2502-150 = "雖然不知道是不是什麼傳奇玩家……嗯。我就是UZQueen。"
2502-153 = "咦？那孩子就是UZQueen！？"
2502-154 = "UZQueen……#n不僅是對戰型動作遊戲，就連節奏遊戲都總是在排行榜第1名的那個傳奇玩家嗎！？"
2502-155 = "UZQueen竟然真的存在啊……"
2502-156 = "UZQueen大大，請幫我簽名！"
2502-157 = "喂，喂，乖乖排隊啊！開槍打你哦！？是我先要簽名的！"
2502-158 = "嗚，嗚……好，好多人……"
2502-159 = "桃，桃井、綠、愛麗絲醬！救，救救我……！"
2502-160 = "啊，畢竟是遊戲中心嘛，所以大家都知道。"
2502-161 = "沒想到居然有這麼多人喜歡柚子醬。總覺得連我都開心了起來。"
2502-162 = "欲戴王冠，必承其重。"
2502-163 = "我，我才不是為了這種事情才玩遊戲的……！"
2502-164 = "UZQueen，機會難得請教我一點祕訣吧！"
2502-165 = "請務必跟我切磋切磋……！"
2502-166 = "人越來越……"
2502-167 = "啊，啊啊啊……！！"
2502-169 = "（之後，柚子儘管勉強，#n　還是努力地和蜂擁而上的粉絲們一個個打了招呼後才總算離開了遊戲中心……）"
2502-170 = "遊戲之道從禮貌開始"

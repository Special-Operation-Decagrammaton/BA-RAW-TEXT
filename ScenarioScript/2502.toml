[translation]
2502-1 = "Manners Maketh the Game Part 2"
2502-2 = "Large Arcade Near the Millennium School "
2502-7 = "It's much bigger than the last time we were here. Did they renovate the building or something?"
2502-8 = "Seriously. Whoa, they brought in the newest Space Cat machine!"
2502-10 = "Yuzu, there is the new console display!"
2502-11 = "Whoa... Finally, the fifteenth generation of consoles is here..."
2502-12 = "Let's see... They added a new cooling mechanism on the side. That will definitely improve the problem that the previous gen had."
2502-13 = "Not only that, the response rate is much faster now, thanks to this high-end gaming memory..."
2502-14 = "Haha... Yuzu always gets so excited about gaming stuff."
2502-15 = "Let's go play Space Cat, Sis!"
2502-16 = "Okay! But I won't go easy on you, so brace your—"
2502-17 = "...Wait, this isn't what we came here for!"
2502-18 = "Did everyone forget why we're here? We have to find that toxic player right now!"
2502-21 = "Actually, I came to buy a new controller."
2502-22 = "We have a lot of monsters to slay, Momoi. Which game should we play first?"
2502-23 = "I'd much rather just stay here and look at the new console than fight someone..."
2502-24 = "No! Even at this very moment, that player might be trash talking others!"
2502-25 = "If they keep doing so, and more and more people do the same...there might not be a single fighting game player left!"
2502-26 = "Aren't you being a little too pessimistic there?"
2502-27 = "This is a sacred battle to save the world..."
2502-28 = "Heroes, it is high time that we head to the demon lord's den!"
2502-29 = "Right, let's hurry to the section where the Student Fighter 2 machine is!"
2502-31 = "There aren't as many people here as I expected. Maybe the guy already left?"
2502-32 = "No, there's no way. Check the IDs on the screens."
2502-35 = "Hmm... It's not this player..."
2502-38 = "Not this player, either..."
2502-46 = "Yahoo, another win! I'm on a winning streak!"
2502-47 = "Ugh, I lost again...even though I used my secret move!"
2502-48 = "You mean that clunky combo was your secret move? Are you serious?"
2502-49 = "My grandma is better than you!"
2502-50 = "What? It's just a game! You can't say stuff like that!"
2502-51 = "Take that back!"
2502-52 = "Why should I? You're a moron who can't even play the game right!"
2502-53 = "Ugh. I'm gonna tell my mom!"
2502-57 = "Yikes...I can't believe that there's a player out there who'd trash talk in real life like that."
2502-58 = "I found it! The same ID I saw earlier!"
2502-61 = "Hmm? What, you guys want to challenge me too?"
2502-64 = "You're Sukeban312, right? You're the one who called me a granny online!"
2502-65 = "You mean...you're Peach_Fighter?"
2502-66 = "Haha, look at you. You're just as wimpy as I expected."
2502-67 = "What did you just say?!"
2502-68 = "You're so rude! I can't believe you're still saying that stuff face-to-face."
2502-69 = "Momoi, let us cleanse this evildoer with the Sword of Light!"
2502-70 = "If you don't apologize for your abusive language, I will show you hell! Apologize, right now!"
2502-71 = "Nope, not gonna do it."
2502-72 = "Why not?!"
2502-73 = "I don't apologize to people weaker than me."
2502-74 = "It would hurt my pride to bow to an inferior player."
2502-76 = "Why, you little...!"
2502-77 = "Should I shoot, Sis?"
2502-78 = "Hero, I am ready to draw my sword. Just say the word."
2502-80 = "Heh heh. If you think that's so unfair, then why don't we play Student Fighter 2 right now to settle the score? If you can get one round off of me, I'll apologize for what I said!"
2502-81 = "Okay, fine! But I won't go easy on you this time..."
2502-82 = "Get ready to get on your knees and apologize!"
2502-83 = "Well, then..."
2502-89 = "Game on!"
2502-96 = "SYSTEM: Sukeban312 is victorious!"
2502-97 = "Pfft! Wow, you lost again after talking such a big game!"
2502-98 = "What a total scrub! Heh..."
2502-99 = "Hold on! You can't just sit in the bottom left corner and wait! That's cheating!"
2502-100 = "How could you fight me only using pokes?!"
2502-101 = "What are you talking about? These moves are built into the game, so they're completely fair. If you don't want to get hit by them, then come up with a way to counter them. I mean, aren't you embarrassed for whining about some made-up rules?"
2502-102 = "Ugh...dammit!"
2502-104 = "That's odd. Lame poking moves aside, none of the special moves that Sis used seem to work."
2502-105 = "Is there something we're missing here?"
2502-106 = "The opponent is probably exploiting a bug."
2502-107 = "A bug?"
2502-108 = "Yes. There is a bug in Student Fighter 2 that freezes the machine very briefly when a certain input is done. "
2502-109 = "I think the opponent is using that bug to dodge Momoi's attacks."
2502-110 = "Then there's no way for us to win!"
2502-111 = "Momoi might have a chance if she was much better than the opponent, but at this rate..."
2502-114 = "..."
2502-121 = "Hey...would it be okay if I played instead of Momoi...?"
2502-122 = "What, a new challenger?"
2502-123 = "Sure, bring it on. But you will be yet another victim to my superior techniques. Hahaha!"
2502-124 = "I guess I'll have to get serious then..."
2502-125 = "SYSTEM: Ready... Fight!"
2502-132 = "SYSTEM: Perfect combo! UZQueen wins! Flawless victory!"
2502-133 = "No... No way... I lost to a kid like you?"
2502-134 = "I couldn't even get a hit in, and you finished me with a full combo!"
2502-135 = "Now apologize..."
2502-136 = "What?"
2502-137 = "Apologize to Momoi, like you promised..."
2502-138 = "Fine... I hate to say it, but a promise is a promise..."
2502-140 = "I'm sorry. I said some harsh stuff before."
2502-143 = "That was amazing, Yuzu! You smashed that arrogant gamer in like a second!"
2502-144 = "A perfect victory... You're awesome!"
2502-145 = "That was a victory worthy of the name \"UZQueen\"!"
2502-146 = "Wait...stop making such a fuss, everyone... It's embarrassing..."
2502-148 = "Wait, so you're UZQueen?"
2502-149 = "The legendary gamer who's remained number one in the online leaderboards, and has never shown their face to anyone?"
2502-150 = "I'm no legendary gamer...but, yeah, I am UZQueen..."
2502-153 = "What? That girl is UZQueen?"
2502-154 = "Isn't UZQueen that fabled gamer who not only ranks number one in fighting games, but also in rhythm games?"
2502-155 = "I can't believe that I get to see UZQueen in the flesh..."
2502-156 = "UZQueen, can I get your autograph, please?!"
2502-157 = "Yo, don't cut in line! I'm getting her autograph first!"
2502-158 = "Uhhh...so many people..."
2502-159 = "Help me! ...Momoi! Midori! Aris!"
2502-160 = "Uh, I guess lots of people recognized her username, since we're at an arcade."
2502-161 = "Look at all the fans Yuzu has! ...It makes me so proud."
2502-162 = "Hero, if you wish to become a great ruler, you must bear the full weight of the crown."
2502-163 = "All I wanted was to play video games..."
2502-164 = "UZQueen, give me a few tips while you're here!"
2502-165 = "Me too!"
2502-166 = "Oh... More and more people are coming over..."
2502-167 = "No... No more!"
2502-169 = "Yuzu is only able to leave the arcade after being forced to greet her flock of fans..."
2502-170 = "Manners Maketh the Game"

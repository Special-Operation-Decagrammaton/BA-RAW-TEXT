[translation]
2502-1 = "มารยาทที่ดีจะช่วยสร้างสรรค์เกม 2"
2502-2 = "เกมเซ็นเตอร์ขนาดใหญ่ใกล้ๆ โรงเรียนมิลเลเนียม "
2502-7 = "ใหญ่ขึ้นกว่าคราวที่แล้วอีกนะเนี่ย ปรับโฉมใหม่เหรอ?"
2502-8 = "นั่นน่ะสิ ว้าว มีเกมตู้ <สเปซ แคท> ใหม่ล่าสุดด้วยล่ะ!"
2502-10 = "ยูสึ~ นั่นไงเครื่องทดลองเล่นเกมคอนโซลใหม่ค่ะ"
2502-11 = "อ่า... ในที่สุดก็ถึงยุคของเกมคอนโซลรุ่นที่ 15..."
2502-12 = "ไหนดูซิ... มีระบบระบายความร้อนแบบใหม่ที่ด้านข้างตัวเครื่อง#nปรับปรุงมาจากปัญหาที่รุ่นก่อนๆ เคยเจอสินะ"
2502-13 = "นอกจากนี้อาจเป็นเพราะใช้เมมโมรี่เกมมิ่งระดับสูง เลยทำให้ตอบสนองได้รวดเร็วขึ้นมาก..."
2502-14 = "ฮ่าฮ่า... ยูสึเนี่ย ถ้าเป็นเรื่องเกี่ยวกับเกมล่ะก็จะดูกระตือรือร้นจริงๆ เลยนะ"
2502-15 = "พี่คะ เราไปเล่นสเปซแคทตรงนั้นกันเถอะ"
2502-16 = "ได้ เตรียมตัวให้ดีล่ะ ฉันไม่อ่อนข้อให้แน่..."
2502-17 = "...ไม่สิ ไม่ใช่เวลาจะมามัวเล่นเกมสักหน่อย!"
2502-18 = "ทุกคนลืมเป้าหมายที่เรามาที่นี่แล้วรึไง? รีบไปหาตัวเกมเมอร์นิสัยเสียคนนั้นกันเถอะ!"
2502-21 = "เปล่าสักหน่อย ฉันมาที่นี่เพราะจะมาซื้อจอยเกมอันใหม่ต่างหาก"
2502-22 = "โมโมอิ~ มีมอนสเตอร์ให้กำจัดเยอะแยะเลยค่ะ เริ่มจากเกมไหนก่อนดีคะ?\n"
2502-23 = "ฉันเองก็อยากมาดูเครื่องเกมใหม่... มากกว่ามาทะเลาะกัน..."
2502-24 = "ไม่ได้นะ ระหว่างนั้นเจ้านั่นอาจจะกำลังไปทำนิสัยแย่ๆ ใส่เกมเมอร์คนอื่นอยู่ก็ได้นะ!"
2502-25 = "ถ้ามีคนที่ท้อแท้แล้วเลิกเล่นไปทีละคนล่ะก็... ผู้เล่นเกมต่อสู้อาจจะหายไปหมดเลยก็ได้นะ!"
2502-26 = "มองโลกในแง่ร้ายเกินไปรึเปล่า?"
2502-27 = "นี่คือการต่อสู้อันสูงส่งเพื่อกอบกู้โลก..."
2502-28 = "เหล่าผู้กล้าเอ๋ย... รีบไปที่ฐานทัพของจอมมารกันเถอะ!"
2502-29 = "โอเค รีบไปที่โซนเกม <สติวเดนท์ ไฟเตอร์ 2> กันเถอะ!"
2502-31 = "คนไม่เยอะอย่างที่คิดเลยแฮะ กลับกันไปแล้วรึเปล่านะ?"
2502-32 = "ไม่หรอก ไม่มีทางหรอก คอยดูไอดีที่หน้าจอให้ดีๆ แล้วกัน"
2502-35 = "ไม่ใช่คนนี้..."
2502-38 = "คนนี้ก็ไม่ใช่..."
2502-46 = "ยะฮู่ว! ชนะอีกแล้ว! ชนะต่อเนื่องเลย!"
2502-47 = "ฮือ... แพ้อีกแล้ว ทั้งที่ใช้ท่าไม้ตายลับแล้วแท้ๆ..."
2502-48 = "ท่าที่ใช้เมื่อกี้คือท่าไม้ตายลับงั้นเหรอ? ถามจริง?"
2502-49 = "ยายของฉันยังเล่นได้เก่งกว่านั้นเลยนะ! ฮ่าฮ่าฮ่าฮ่า... พรืดดดดด!"
2502-50 = "ว่ายังไงนะ? ถึงจะแค่เล่นเกมก็เถอะ แต่พูดแบบนั้นได้ยังไงกัน?"
2502-51 = "ขอโทษมาเดี๋ยวนี้เลยนะ!"
2502-52 = "ถ้าไม่ขอโทษแล้วจะทำไม? เจ้าทึ่ม~ เจ้าทึ่ม~ เจ้าทึ่มที่เล่นเกมได้ห่วยแตกสุดๆ~"
2502-53 = "ฉะ... ฉันจะไปฟ้องแม่!"
2502-57 = "โห... ใจร้ายจัง มีเกมเมอร์ที่พูดจาร้ายกาจแบบนี้ใส่กันอยู่ด้วยแฮะ"
2502-58 = "อ๊ะ เจอแล้ว! ไอดีเดียวกับที่เจอตอนนั้น!"
2502-61 = "หือ? อะไร พวกเธอคิดจะมาท้าแข่งกับฉันเหรอ?"
2502-64 = "เธอคือ Sukeban312 ใช่ไหม? เมื่อวานตอนแข่งกันเธอเรียกฉันว่ายายแก่ด้วย!"
2502-65 = "ถ้างั้น... เธอคือ Peach_Figther งั้นเหรอ?"
2502-66 = "ฮ่าฮ่า อะไรกันเนี่ย เป็นเด็กตัวกะเปี๊ยกเหมือนที่คิดเลยนะ?"
2502-67 = "ว่ายังไงนะ~?!"
2502-68 = "เป็นคนหยาบคายจริงๆ พอเจอกันแล้วก็ยังพูดแบบนั้นอีก..."
2502-69 = "โมโมอิ~ ใช้ดาบแห่งแสงชำระล้างเจ้าคนชั่วร้ายนี้เถอะ!"
2502-70 = "ถ้าไม่ขอโทษที่พูดจาหยาบคายใส่ฉันล่ะก็ได้เห็นดีกันแน่! ขอโทษมาเดี๋ยวนี้นะ!"
2502-71 = "ไม่เอา"
2502-72 = "เธอนี่มัน...!"
2502-73 = "ฉันไม่ขอโทษคนที่อ่อนแอกว่าฉันหรอก"
2502-74 = "ถ้าต้องก้มหัวให้กับคนที่เล่นเกมห่วยกว่าฉันล่ะก็เสียศักดิ์ศรีกันพอดีน่ะสิ?"
2502-76 = "เธอนี่มันจริงๆ เลยนะ!"
2502-77 = "พี่คะ... ยิงเลยดีไหม?"
2502-78 = "เหล่าผู้กล้าเอ๋ย ฉันพร้อมที่จะกวัดแกว่งดาบแล้วล่ะ"
2502-80 = "หึหึ ถ้าไม่พอใจขนาดนั้นล่ะก็ มาแข่งเกม <สติวเดนท์ ไฟเตอร์ 2> กันที่นี่เลยไหมล่ะ?#nถ้าชนะฉันได้สักตาล่ะก็ ฉันจะยอมขอโทษเรื่องเมื่อวานก็ได้"
2502-81 = "ได้ คราวนี้ฉันจะขยี้เธอให้แหลกเลย!"
2502-82 = "เตรียมตัวเตรียมใจก้มหัวขอโทษฉันเอาไว้ได้เลย!"
2502-83 = "ถ้างั้นก็..."
2502-89 = "มาแข่งกันเลย!"
2502-96 = "<ข้อความระบบ> ผู้เล่น Sukeban312 ชนะ!"
2502-97 = "พรืดดดด! อะไรกันน่ะ ทั้งที่ดูมั่นใจขนาดนั้นแท้ๆ แต่ทำไมถึงแพ้อีกล่ะ?"
2502-98 = "ไม่มีพรสวรรค์ในการเล่นเกมรึเปล่าน้า? คิคิ..."
2502-99 = "รอเดี๋ยวก่อน! ถ้านั่งรอพร้อมกับตั้งการ์ดซ้ายล่างแบบนั้นมันฟาวล์นะ!"
2502-100 = "ไม่อยากเชื่อเลยว่าเธอจะเล่นเกมได้สกปรกแบบนี้!"
2502-101 = "หา? นี่ก็เป็นเทคนิคการเล่นเกมอย่างนึงเหมือนกันนะ ถ้ารู้สึกไม่แฟร์ก็หาวิธีเอาชนะให้ได้สิ#nการอ้างกฎที่ไม่เป็นทางการแบบนั้นแล้วมาบ่นว่ามันไม่แฟร์เนี่ย ไม่เด็กน้อยไปหน่อยรึไง?"
2502-102 = "ฮึ่ย! แย่ชะมัด!"
2502-104 = "แปลกจังเลย... ถึงอุปกรณ์ตรวจจับพลังจะถูกปิดกั้นเอาไว้#nแต่ดูเหมือนเทคนิคพิเศษของพี่จะใช้ไม่ได้ผลเลย"
2502-105 = "ดูเหมือนเราจะพลาดอะไรบางอย่างไปนะ?"
2502-106 = "...บางทีอีกฝ่ายอาจใช้ช่องโหว่ของบั๊กในเกมเอาชนะก็ได้นะคะ"
2502-107 = "บั๊กเหรอ?"
2502-108 = "ค่ะ เกม <สติวเดนท์ ไฟเตอร์ 2> มีบั๊กอยู่ตัวนึงที่ถ้าเมื่อกดคีย์พิเศษ#nก็จะสามารถทำให้อุปกรณ์ชะงักได้ช่วงเวลาสั้นๆ ค่ะ "
2502-109 = "บางทีฝ่ายตรงข้ามอาจใช้ช่องโหว่ของบั๊กตัวนั้นเพื่อหลีกเลี่ยงการโจมตีของโมโมอิก็ได้ค่ะ"
2502-110 = "ถ้าแบบนั้นเราก็ไม่มีวิธีชนะเลยน่ะสิ!"
2502-111 = "ถ้าเป็นคู่ต่อสู้ที่ความสามารถห่างชั้นกันมากก็เดาได้ยากค่ะ แต่ว่าสถานการณ์ตอนนี้..."
2502-114 = "....."
2502-121 = "คือว่า... ฉันขอเล่นแทนโมโมอิได้ไหม...?"
2502-122 = "อะไรนะ จะท้าแข่งอีกงั้นเหรอ?"
2502-123 = "ก็ได้ ฉันรับคำท้า ยังไงฉันก็ขยี้พวกเธอได้ในพริบตาอยู่แล้ว ฮ่าฮ่า!"
2502-124 = "ลองจริงจังดูหน่อยแล้วกัน..."
2502-125 = "<ข้อความระบบ> เริ่มการต่อสู้!"
2502-132 = "<ข้อความระบบ> ฟูล เคาท์ คอมโบ! 'UZQueen' ชนะขาดลอย!"
2502-133 = "ปะ...เป็นไปไม่ได้ เด็กตัวเล็กแค่นี้ชนะฉันงั้นเหรอ?"
2502-134 = "แถมฉันยังโดนคอมโบต่อเนื่องไม่มีโอกาสได้สวนกลับเลยด้วย!"
2502-135 = "ขอโทษ..."
2502-136 = "ว่าอะไรนะ?"
2502-137 = "ขอโทษโมโมอิตามที่สัญญาไว้ด้วย...."
2502-138 = "สะ... สัญญาไว้แล้วก็ช่วยไม่ได้นะ"
2502-140 = "...ขอโทษแล้วกัน เมื่อกี้นี้ฉันพูดแรงไปหน่อย"
2502-143 = "สุดยอดเลย ยูสึ! เธอทำให้เกมเมอร์จอมอวดดีนี่หน้าหงายไปเลย!"
2502-144 = "แถมยังชนะขาดลอยอีกด้วย สุดยอดจริงๆ! "
2502-145 = "สมกับเป็นผู้กล้าในตำนาน 'UZQueen' จริงๆ เลยค่ะ!"
2502-146 = "ดะ..เดี๋ยวก่อน ทุกคนอย่าชมฉันแบบนี้สิ... ฉัน...ฉันเขินนะ"
2502-148 = "เดี๋ยวนะ เธอคือ 'UZQueen' งั้นเหรอ?"
2502-149 = "เกมเมอร์ในตำนานที่ไม่เคยพ่ายแพ้หรือพลาดอันดับ 1 ของการแข่งขันเกมออนไลน์#nและไม่เคยมีใครเห็นตัวจริงมาก่อนคนนั้นน่ะเหรอ?"
2502-150 = "ฉะ...ฉันไม่ได้เป็นเกมเมอร์ในตำนานหรอก... ตะ...แต่ถ้า 'UZQueen' ล่ะก็... ฉันเองค่ะ..."
2502-153 = "อะไรนะ? เด็กคนนั้นคือ 'UZQueen' งั้นเหรอ?"
2502-154 = "ถ้า 'UZQueen' ล่ะก็... นอกจากเป็นเกมเมอร์ในตำนานของเกมแอ็กชั่นต่อสู้แล้ว#nยังเป็นตำนานที่หนึ่งของพวกเกมกดตามจังหวะด้วยไม่ใช่รึไง?"
2502-155 = "ไม่อยากเชื่อเลยว่าจะได้เจอกับ 'UZQueen' ที่นี่..."
2502-156 = "คุณ 'UZQueen' ขอลายเซ็นหน่อยสิ!"
2502-157 = "นี่ๆ อย่าดันเข้ามาสิ! ฉันมาต่อแถวขอลายเซ็นก่อนนะ!"
2502-158 = "อ่า... คนเต็มไปหมด..."
2502-159 = "ชะ...ช่วยด้วย! ...โมโมอิ! มิโดริ! อาริสึ!"
2502-160 = "อ่า... สมกับเป็นเกมเซ็นเตอร์เลยนะ มีคนรู้จักเยอะแยะเลย"
2502-161 = "พอได้รู้ว่ามีคนชอบยูสึจังเยอะแบบนี้รู้สึกภูมิใจจัง"
2502-162 = "เหล่าผู้กล้าเอ๋ย หากจะเป็นราชาผู้ยิ่งใหญ่ก็จะต้องแบกรับภาระอันหนักอึ้งที่ตามมาด้วย..."
2502-163 = "ฉะ...ฉันไม่ได้เล่นเกมเพราะหวังอะไรแบบนี้นะ..."
2502-164 = "คุณ 'UZQueen' ไหนๆ ก็ได้เจอแล้ว ช่วยสอนเทคนิคให้บ้างได้ไหม!"
2502-165 = "สอนฉันด้วยๆ!"
2502-166 = "คนเยอะกว่าเดิมอีกแล้ว..."
2502-167 = "ไม่เอาแล้ววววว!"
2502-169 = "หลังจากนั้นยูสึก็บอกลาแฟนคลับนักเกมเมอร์อย่างกระอักกระอ่วน#nก่อนจะรีบออกมาจากเกมเซ็นเตอร์ทันที..."
2502-170 = "มารยาทที่ดีจะช่วยสร้างสรรค์เกม"

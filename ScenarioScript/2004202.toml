[translation]
2004202-1 = "Raking Leaves"
2004202-2 = "Millennium Study Center"
2004202-3 = "Even though it was the weekend, I went to Millennium to help Maki rake leaves, which she had been assigned to do as a volunteer activity."
2004202-11 = "Ah, Sensei. You really came to help!"
2004202-12 = "Thanks for coming. If I had to clean this huge study center by myself, I would've been here forever."
2004202-13 = "[s1] \"I can't help for too long...\"\n[s2] \"...but I can stay with you until lunch.\""
2004202-16 = "Don't worry about it. Just your presence is a huge help, Sensei."
2004202-17 = "Tch, compared to you, the other Veritas members turned a blind eye when I asked them for help."
2004202-18 = "Chihiro turned me down, saying I wouldn't properly reflect on my actions if I didn't do it on my own."
2004202-19 = "And Hare and Kotama just said no because it was cold out."
2004202-20 = "[s] \"The weather did get cold out of nowhere this week.\""
2004202-22 = "[ns] \"So is that why you're dressed so warmly?\""
2004202-23 = "Yeah. If I wear my usual outfit, I might get sick."
2004202-24 = "The cold really did come out of nowhere, though. I swear it was super hot out just yesterday."
2004202-25 = "But now the trees are getting ready for winter, and the autumn leaves that colored the campus have all fallen. Time really flies."
2004202-26 = "Um, and at this rate, it's gonna be the new year before I get all these leaves swept up."
2004202-27 = "Should we get started?"
2004202-33 = "Afterwards, Maki and I worked hard raking up all the fallen leaves on the ground."
2004202-35 = "About an hour later..."
2004202-37 = "We're getting through this faster than I expected!"
2004202-41 = "Look, Sensei! The pile of leaves is already as tall as I am!"
2004202-42 = "Heehee, and all the different colors make it look like a super-cool art sculpture!"
2004202-43 = "Now that I think about it, autumn leaves are pretty cool."
2004202-44 = "Most organisms in nature have low-saturation colors, but autumn leaves are this colorful hue that makes them easy to spot, even from afar."
2004202-45 = "Imagine how colorful this world could be if wild animals had the same distinctive colors as autumn leaves..."
2004202-46 = "Why are things always in such bland, dull colors anyway?"
2004202-47 = "[s] \"Probably because it'd be problematic to stand out so much.\""
2004202-48 = "Problematic? How so?"
2004202-49 = "[s3] \"Vibrant colors might call for unwanted guests.\"\n[s4] \"You know, like competitors and predators...\""
2004202-52 = "Mmm... Now that I think about it, maybe you're right. Flashy appearances can sometimes invite unwanted guests."
2004202-53 = "It's like how more people tend to challenge me if when I use flashier tags for graffiti or even hacking. They'll draw over my graffiti, or try to anonymously hack me."
2004202-54 = "Maybe there's something about vibrant colors that draws out people's competitive spirit?"
2004202-55 = "[s5] \"It's not just unwelcome guests that vibrant colors attract...\"\n[s6] \"Like pretty flowers, or feathers from peacocks.\""
2004202-58 = "That's also true. If I hid my colors and locked myself away, I wouldn't have met a lot of the awesome people I have in my life."
2004202-59 = "My graffiti has led me to a few bad eggs, but the majority of the people I've met were nice."
2004202-60 = "Actually, I wouldn't have been able to meet everyone in Veritas if it weren't for graffiting."
2004202-61 = "[s] \"And I like your vibrant red hair.\""
2004202-62 = "H-Huh...?"
2004202-63 = "[ns7] \"When I see your red head in a crowd...\"\n[ns8] \"...your lively energy makes me feel good.\"\n[ns9] \"Maybe it's similar to your graffiti?\""
2004202-67 = "B-By any chance, does that mean..."
2004202-68 = "No. I get what you're saying but— WAAAH?!"
2004202-73 = "[ns] \"You okay, Maki?\""
2004202-75 = "I-I'm fine. I just took a wrong step and...ended up falling on top of the pile of leaves."
2004202-76 = "Ugh, but the leaves we raked are all over the place now."
2004202-77 = "[s10] \"But I'm sure we can get it done quickly this time.\"\n[s11] \"Red autumn leaves stand out from anywhere, after all.\""
2004202-83 = "...Yes."
2004202-84 = "Thanks for saying that, Sensei."

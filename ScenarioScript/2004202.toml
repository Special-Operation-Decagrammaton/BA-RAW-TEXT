2004202-75 = "3;마키 캠핑;04;괘, 괜찮아. 조금 발을 헛디디는 바람에 그만…… 낙엽 더미 위에 넘어지고 말았네."
2004202-76 = "3;마키 캠핑;12;으으, 간신히 치운 낙엽이 다시 엉망으로 어질러졌어.\n#3;em;[훌쩍]\n#3;stiff"
2004202-77 = "[s10] \"그래도 이번에는 금방 치울 수 있을 거야.\"\n[s11] \"[ruby=붉은색]단풍[/ruby]은 어디서나 눈에 잘 띄니까.\""

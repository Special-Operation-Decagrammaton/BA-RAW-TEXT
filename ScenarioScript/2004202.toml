2004202-32 = "1;마키 캠핑;05\n#1;d\n#wait;1000"
2004202-33 = "#na;(이후, 마키와 함께 열심히 바닥에 떨어진 낙엽을 그러모았다.)"
2004202-34 = "#all;hide"

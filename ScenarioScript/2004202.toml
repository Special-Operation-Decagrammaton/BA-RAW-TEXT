[translation]
2004202-1 = "清掃落葉"
2004202-2 = "千年研究區域"
2004202-3 = "（週末的假日，為了幫助做志工服務而清理落葉的真紀，來到了千年學園）"
2004202-11 = "啊，老師，你真的來幫忙了啊！"
2004202-12 = "謝謝你過來。#n研究區域這麼大，真不知道什麼時候才能全部打掃完。"
2004202-13 = "[s1]「雖然可能沒辦法幫太久……」\n[s2]「不過在午餐時間之前，我可以一起幫忙。」"
2004202-16 = "沒關係，光是老師願意過來就夠了。"
2004202-17 = "呿，反觀貝里塔斯的前輩們，就算我拜託他們也不肯幫忙。"
2004202-18 = "比如千尋前輩說，如果請別人幫忙就失去了反省的意義……"
2004202-19 = "至於晴前輩和小玉前輩，則是因為天氣很冷就拒絕了我！"
2004202-20 = "[s]「這週天氣確實突然變冷了呢。」"
2004202-22 = "[ns]「所以真紀今天才穿得這麼暖和嗎？」"
2004202-23 = "嗯，因為穿太少可能會感冒。"
2004202-24 = "天氣確實突然就變冷了呢。#n明明前幾天還熱得讓人狂流汗的說……"
2004202-25 = "染紅整個校園的楓葉也都掉光，開始等待冬天到來了。#n時間過得還真快。"
2004202-26 = "唔唔，要是再繼續偷懶的話，落葉還沒掃完就要過新年了──"
2004202-27 = "快點開始打掃吧？"
2004202-33 = "（之後便和真紀一起，認真地將地上的落葉掃成一堆）"
2004202-35 = "（大約一小時後……）"
2004202-37 = "整理得比我想像中還要快呢。"
2004202-41 = "老師你看！落葉已經堆得快跟我一樣高了耶！"
2004202-42 = "呵呵，顏色花花綠綠的，看起來就像令人印象深刻的裝置藝術一樣。"
2004202-43 = "這麼說來，楓葉還真特別呢。"
2004202-44 = "明明大自然裡大部分生物都是彩度偏低的低調顏色，#n但楓葉卻相當鮮豔，從遠處也能輕鬆認出來。"
2004202-45 = "如果野生動物的顏色也能跟楓葉一樣豐富，這個世界應該會更繽紛多彩吧……"
2004202-46 = "為什麼大部分動植物都是彩度偏低，灰灰暗暗的顏色呢？"
2004202-47 = "[s]「應該是因為太顯眼會很困擾吧？」"
2004202-48 = "困擾？為什麼？"
2004202-49 = "[s3]「因為華麗的顏色可能會引來不速之客。」\n[s4]「比如競爭者或天敵之類的……」"
2004202-52 = "唔嗯……仔細想想好像也對。#n華麗的標記總是會引來不討喜的客人。"
2004202-53 = "我偶爾在塗鴉或駭入的時候也會使用華麗的標記，結果被挑戰的次數好像比平常多。#n像是被匿名駭客攻擊，或是畫的塗鴉被其他塗鴉蓋過去之類的……"
2004202-54 = "難道華麗的顏色帶有刺激勝負心的效果嗎？"
2004202-55 = "[s5]「不過華麗的顏色也不是只會吸引不速之客哦。」\n[s6]「例如花朵或者孔雀的羽毛。」"
2004202-58 = "也對，如果把顏色藏得太隱密的話，好緣分出現的時候就不會發現我了。"
2004202-59 = "雖然在塗鴉的過程中遇到過不少討厭的人，但好像還是遇到的好人更多。"
2004202-60 = "當初要不是因為塗鴉，也不會遇到貝里塔斯的前輩們了……"
2004202-61 = "[s]「我也喜歡真紀的鮮紅色頭髮哦。」"
2004202-62 = "咦，咦……？"
2004202-63 = "[ns7]「如果在人群中看到真紀的紅頭髮……」\n[ns8]「就能瞬間因為真紀的開朗讓心情變好。」\n[ns9]「真紀的塗鴉也會給人這樣的感覺對吧？」"
2004202-67 = "所，所以那句話的意思是……"
2004202-68 = "不對，我知道是什麼意思，不過──"
2004202-73 = "[ns]「真紀，你還好嗎？」"
2004202-75 = "我，我沒事。#n只是因為踩空……不小心跌到落葉堆上面了。"
2004202-76 = "嗚嗚，好不容易掃好的落葉又亂成一團了。"
2004202-77 = "[s10]「這次很快就能掃好的。」\n[s11]「畢竟[ruby=紅色]楓葉[/ruby]非常顯眼嘛。」"
2004202-83 = "……嗯。"
2004202-84 = "謝謝你，老師。"

[translation]
2004202-1 = "#title;낙엽 청소"
2004202-2 = "#place;밀레니엄 학습관"
2004202-3 = "#na;(주말 휴일, 학교 봉사활동으로 낙엽을 치우게 된 마키를 도와주기 위해 밀레니엄 학원을 방문했다.)"
2004202-4 = "#st;[0,0];instant;1;"
2004202-5 = "#clearST"
2004202-6 = "1;마키 캠핑;05\n#1;a\n#1;greeting\n#wait;1200"
2004202-7 = "1;마키 캠핑;05\n#1;greeting\n#wait;1200"
2004202-8 = "1;마키 캠핑;05\n#1;m5\n#wait;1000"
2004202-9 = "1;마키 캠핑;05\n#1;greeting\n#wait;1200"
2004202-10 = "1;마키 캠핑;05\n#1;greeting\n#wait;1200"
2004202-11 = "1;마키 캠핑;00;아, 선생님. 정말 도와주러 왔구나!\n#1;m3\n#1;em;[반응]"
2004202-12 = "1;마키 캠핑;09;와 줘서 고마워. 이 넓은 학습관을 언제 다 청소해야 할지 걱정하고 있었거든."
2004202-13 = "[s1] \"그렇게 오래는 도와줄 수 없지만……\"\n[s2] \"점심시간 전까지라면 함께 도와줄게.\""
2004202-14 = "#wait;100"
2004202-15 = "#wait;100"
2004202-16 = "1;마키 캠핑;01;신경 쓰지 마. 선생님이 와 준 것만으로도 충분히 도움이 되었으니까."
2004202-17 = "1;마키 캠핑;10;칫, 그에 비해 베리타스 선배들은 도와달라고 해도 모른체 했는 걸.\n#1;em;[스팀]\n#1;hophop"
2004202-18 = "1;마키 캠핑;05;치히로 선배는 다른 사람이 도와주면 반성의 의미가 없다며 거절했고……"
2004202-19 = "1;마키 캠핑;10;하레 선배와 코타마 선배는 그저 날씨가 춥다는 이유로 거절했다니까?\n#1;em;[!]"
2004202-20 = "[s] \"확실히 이번 주 들어 갑자기 추워진 것 같긴 해.\""
2004202-21 = "#wait;1000"
2004202-22 = "[ns] \"그래서, 마키도 오늘은 따듯하게 챙겨입고 온 거야?\""
2004202-23 = "1;마키 캠핑;01;응. 너무 얇게 입었다가는 감기에 걸릴 수도 있으니까.\n#1;greeting"
2004202-24 = "1;마키 캠핑;99;새삼스럽지만, 확실히 날이 금세 추워지긴 했네. 땀이 날 정도로 날이 무더웠던 게 바로 엊그제 같은데……"
2004202-25 = "1;마키 캠핑;03;교정의 나무를 가득 물들였던 단풍도 모두 지고, 이제는 겨울을 앞두고 있다니. 시간 참 빠르다니까.\n#3;em;[재잘]"
2004202-26 = "1;마키 캠핑;05;으음, 더 여유를 부렸다가는 낙엽을 모두 치우기도 전에 해가 바뀔 것 같으니—"
2004202-27 = "1;마키 캠핑;07;서둘러 청소부터 시작할까?\n#3;em;[음표]"
2004202-28 = "#st;[0,0];instant;1;"
2004202-29 = "#clearST"

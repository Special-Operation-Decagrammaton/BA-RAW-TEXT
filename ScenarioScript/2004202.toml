2004202-37 = "3;마키 캠핑;08;생각보다 금방 정리된 느낌이네.\n#3;a"
2004202-38 = "#st;[0,0];instant;1;"
2004202-39 = "#clearST"
2004202-40 = "3;마키 캠핑;02\n#3;em;[반응]\n#wait;1000"
2004202-41 = "3;마키 캠핑;00;봐, 선생님! 낙엽 더미가 벌써 내 키만큼 쌓였어!\n#3;hophop"
2004202-42 = "3;마키 캠핑;03;후후, 색깔도 알록달록한 게 뭔가 인상적인 예술 조형물 같아 보이네.\n#3;em;[재잘]"
2004202-43 = "3;마키 캠핑;01;그러고 보니 참 단풍은 참 특이하단 말이지."
2004202-44 = "3;마키 캠핑;05;자연계에 존재하는 대부분의 생물들은 채도가 낮은 재미없는 색을 띠고 있는데, 단풍만큼은 멀리서도 알아볼 수 있도록 울긋불긋한 화려한 색을 갖고 있잖아."
2004202-45 = "3;마키 캠핑;06;야생 동물들도 단풍처럼 인상적인 색을 띠고 있었다면, 세상의 풍경이 좀 더 다채로웠을 텐데……\n#3;em;…"
2004202-46 = "3;마키 캠핑;10;어째서 대부분의 동식물은 채도가 낮은 칙칙한 색을 띠고 있는 걸까?"
2004202-47 = "[s] \"다른 동물의 눈에 잘 띄면 곤란하기 때문이 아닐까?\""
2004202-48 = "3;마키 캠핑;02;곤란하다고? 어째서?\n#3;em;[?]"
2004202-49 = "[s3] \"화려한 색은 자칫 불청객을 부를지도 모르니까.\"\n[s4] \"경쟁자라던가, 천적이라던가……\""
2004202-50 = "#wait;100"
2004202-51 = "#wait;100"
2004202-52 = "3;마키 캠핑;04;으음…… 생각해 보니 그런 것 같기도 하네. 화려한 표식은 종종 달갑지 않은 손님을 불러오기도 하니까.\n#3;em;[땀]"
2004202-53 = "3;마키 캠핑;05;나도 가끔 그래피티나 해킹을 할 때 화려한 태그를 쓸 때가 있는데, 그럼 평소보다 더 자주 도전을 받는 것 같아. 익명의 해커로부터 공격을 받거나, 내가 그린 그래피티 위에 다른 낙서가 되어 있다던가……"
2004202-54 = "3;마키 캠핑;06;화려한 색에는 사람들의 승부욕을 자극하는 효과도 있는 걸까?\n#3;em;[세로선]"
2004202-55 = "[s5] \"하지만 화려한 색이 불청객만 불러오는 건 아냐.\"\n[s6] \"꽃이나 공작의 깃털을 떠올려 봐.\""
2004202-56 = "#wait;100"
2004202-57 = "#wait;100"
2004202-58 = "3;마키 캠핑;03;그렇네. 색을 숨긴 채 꽁꽁 숨어 있다면 좋은 인연도 나를 발견하지 못할 테니까.\n#3;em;[재잘]"
2004202-59 = "3;마키 캠핑;01;나도 그래피티를 하며 싫은 사람도 많이 만났지만, 좋은 사람을 더 많이 마주친 것 같아."
2004202-60 = "3;마키 캠핑;99;애초에 그래피티를 하지 않았더라면 베리타스의 선배들도 만나지 못했을 테고……\n#3;em;…"
2004202-61 = "[s] \"나도 마키의 선명한 붉은 머리칼은 좋아해.\""
2004202-62 = "3;마키 캠핑;04;어, 어……?\n#3;em;?!\n#3;shake"
2004202-63 = "[ns7] \"수많은 인파 속에서 마키의 붉은 머리칼이 보이면……\"\n[ns8] \"그 순간부터 마키의 명랑한 활기가 느껴져서 기분이 좋거든.\"\n[ns9] \"마키의 그래피티도 같은 느낌이 아닐까?\""
2004202-64 = "#wait;100"
2004202-65 = "#wait;100"
2004202-66 = "#wait;100"
2004202-67 = "3;마키 캠핑;04;그, 그러니까 그 말은 혹시……\n#3;stiff"
2004202-68 = "3;마키 캠핑;04;아니. 무슨 뜻인지는 이해하고 있지만— 우왓?!\n#3;em;[반응]\n#3;stiff\n#3;m4"

[translation]
2004202-1 = "กวาดใบไม้ร่วง"
2004202-2 = "วิทยาเขตมิลเลเนียม"
2004202-3 = "(คุณครูแวะไปที่โรงเรียนมิลเลเนียมเพื่อมาช่วยมากิที่ออกมาทำงานจิตอาสากวาดใบไม้ร่วงในโรงเรียน#nในวันหยุด)"
2004202-11 = "อ๊ะ คุณครู มาช่วยฉันจริงๆ ด้วย!"
2004202-12 = "ขอบคุณที่มานะ ฉันกำลังกังวลอยู่พอดีว่าเมื่อไรฉันจะทำความสะอาดหมดน่ะ วิทยาเขตก็กว้างใหญ่ซะ#nขนาดนี้"
2004202-13 = "[s1] \"แต่ครูอยู่ช่วยนานๆ ไม่ได้หรอกนะ...\"\n[s2] \"เดี๋ยวครูช่วยจนถึงเที่ยงๆ แล้วกันนะ\""
2004202-16 = "ไม่ต้องกังวลหรอก แค่คุณครูมาที่นี่ก็ช่วยฉันได้มากแล้วละ"
2004202-17 = "ชิ ทีตอนนั้นที่ฉันขอให้พวกรุ่นพี่ในเวอริทัสช่วย ทุกคนกลับทำเป็นไม่รู้ไม่ชี้"
2004202-18 = "รุ่นพี่จิฮิโระปฏิเสธฉันเพราะบอกว่าถ้ามีคนอื่นมาช่วย การสำนึกผิดก็จะไม่มีความหมาย..."
2004202-19 = "ส่วนรุ่นพี่ฮาเระกับรุ่นพี่โคทามะก็ปฏิเสธเพราะบอกว่าอากาศข้างนอกมันหนาว"
2004202-20 = "[s] \"แต่สัปดาห์นี้จู่ๆ อากาศก็หนาวขึ้นมาจริงๆ นะ\""
2004202-22 = "[ns] \"วันนี้มากิก็เลยแต่งตัวมาอย่างอบอุ่นเลยนะเนี่ย?\""
2004202-23 = "อืม ถ้าไม่ใส่เสื้อแบบนี้มา ฉันอาจจะเป็นหวัดก็ได้น่ะ"
2004202-24 = "จู่ๆ อากาศมันก็หนาวขึ้นมาอย่างที่คุณครูว่าจริงๆ นั่นละ เมื่อ 2-3 วันก่อนยังร้อนจนเหงื่อไหลอยู่เลย..."
2004202-25 = "ใบเมเปิ้ลที่มีอยู่เต็มสนามโรงเรียนก็พากันร่วงหมด จากนี้ก็จะเข้าฤดูหนาวแทนแล้ว เวลาผ่านไปเร็วจริงๆ เลยนะ"
2004202-26 = "อืม ถ้าฉันมัวมายืดยาวอยู่แบบนี้ กว่าจะกวาดใบไม้ร่วงหมดก็คงปีหน้า..."
2004202-27 = "งั้นมาเริ่มทำความสะอาดกันดีกว่า"
2004202-33 = "(จากนั้นคุณครูกับมากิก็ช่วยกันกวาดใบไม้ร่วงที่พื้นด้วยกันอย่างขันแข็ง)"
2004202-35 = "(หนึ่งชั่วโมงต่อมา...)"
2004202-37 = "เรากวาดใบไม้ได้เร็วกว่าที่คิดนะเนี่ย"
2004202-41 = "ดูสิ คุณครู! กองใบไม้ร่วงสูงเท่าตัวฉันแล้ว!"
2004202-42 = "ฮุฮุ สีสันก็สดใส ฉันว่าดูเหมือนงานศิลปะที่น่าประทับใจเลยละ"
2004202-43 = "จะว่าไป ใบไม้พวกนี้น่าทึ่งจังเลยนะ"
2004202-44 = "สิ่งมีชีวิตส่วนใหญ่ในธรรมชาติจะเป็นสีธรรมดาๆ ที่ไม่มีแสงเงามาก แต่ใบเมเปิ้ลมีสีสันสดใสจนมอง#nเห็นได้จากระยะไกลเลย"
2004202-45 = "หากสัตว์ป่ามีสีสันโดดเด่นเหมือนใบเมเปิ้ล โลกนี้ก็น่าจะมีสีสันมากกว่านี้นะ..."
2004202-46 = "ทำไมสัตว์และพืชส่วนใหญ่ถึงมีสีพื้นๆ ที่แทบไม่มีแสงเงาเลยนะ?"
2004202-47 = "[s] \"ถ้าสัตว์เป็นที่สังเกตง่าย ก็น่าจะเป็นภัยต่อการใช้ชีวิตหรือเปล่า?\""
2004202-48 = "เป็นภัยต่อการใช้ชีวิตงั้นเหรอ? ทำไมล่ะ?"
2004202-49 = "[s3] \"ก็สีสันนั้นอาจดึงดูดสิ่งที่ไม่ได้รับเชิญก็ได้ไง\"\n[s4] \"สีสันนั้นอาจล่อคู่แข่งหรือศัตรูตามธรรมชาติได้ไง\""
2004202-52 = "อืม... พอมาคิดดูมันก็จริงอย่างที่คุณครูว่านะ สิ่งที่มีสีสันฉูดฉาดอาจจะเรียกแขกที่ไม่พึงประสงค์มา#nก็ได้"
2004202-53 = "บางครั้งเวลาฉันทำกราฟิตี้หรือแฮ็ก ฉันก็จะเลือกใช้แท็กสีสดๆ ด้วย ถ้าทำแบบนั้นก็เหมือนจะเป็นการ#nท้าทายมากกว่าปกติน่ะ บางทีฉันก็โดนโจมตีโดยแฮ็กเกอร์นิรนาม หรือไม่ก็จะมีคนมาวาดเขียนอะไร#nบนงานกราฟิตี้ของฉันด้วย..."
2004202-54 = "สีสันที่สดใสมีผลในการกระตุ้นความอยากเอาชนะของผู้คนสินะ?"
2004202-55 = "[s5] \"แต่ใช่ว่าจะมีแต่ข้อเสียหรอกนะ ลองนึกถึงพวกดอกไม้สิ\"\n[s6] \"สีไม่ใช่สิ่งไม่ดีหรอกนะ ลองนึกถึงสีของดอกไม้หรือขนนกยูงดูสิ\""
2004202-58 = "นั่นสินะ ถ้าเราเอาแต่ซ่อนสีสันของตัวเองไว้ เราอาจจะไม่ได้เจอกับความสัมพันธ์ดีๆ ก็ได้"
2004202-59 = "ระหว่างทำงานกราฟิตี้ ฉันก็เจอคนที่ไม่ดีบ้างเหมือนกัน แต่เหมือนจะได้เจอคนที่ดีมากกว่า"
2004202-60 = "และถ้าฉันไม่ทำกราฟิตี้ตั้งแต่แรก ฉันก็คงไม่ได้เจอพวกรุ่นพี่เวอริทัสด้วย..."
2004202-61 = "[s] \"ครูชอบผมสีแดงที่สดใสของมากินะ\""
2004202-62 = "หะ... หืม...?"
2004202-63 = "[ns7] \"ถ้าอยู่ในฝูงชน จะรู้ได้เลยละว่าเป็นมากิ...\"\n[ns8] \"มันเป็นตัวแทนของความร่าเริงของมากิเลยละ\"\n[ns9] \"มันให้ความสดใสเหมือนงานกราฟิตี้ของมากิเลยละ\""
2004202-67 = "อะ... เอ่อ พูดแบบนั้นหมายความว่า..."
2004202-68 = "ไม่สิ ฉันก็เข้าใจความหมายอยู่หรอก... วะ... ว้าย?!"
2004202-73 = "[ns] \"มากิ เป็นอะไรหรือเปล่า?\""
2004202-75 = "มะ... ไม่เป็นไร ฉันแค่ก้าวพลาดไปนิดเดียวน่ะ... แต่ดันมาล้มบนกองใบไม้จนได้"
2004202-76 = "ฮือ เละหมดแล้ว อุตส่าห์ตั้งใจกวาดมารวมเป็นกองแบบนี้แท้ๆ"
2004202-77 = "[s10] \"แต่ครั้งนี้ครูว่าน่าจะกวาดต่อได้เร็วนะ\"\n[s11] \"ใบไม้สีสะดุดตาขนาดนี้ ครูว่ากวาดเดี๋ยวเดียวก็เสร็จแล้ว\""
2004202-83 = "อื้อ..."
2004202-84 = "ขอบคุณที่ช่วยพูดแบบนั้นนะคุณครู"

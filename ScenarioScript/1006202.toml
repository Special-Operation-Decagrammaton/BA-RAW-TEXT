[translation]
1006202-1 = "季的每日任務"
1006202-2 = "夏萊．辦公室"
1006202-8 = "（今天也總算是抵達了辦公桌前）"
1006202-9 = "（到此為止都還算順利……）"
1006202-10 = "早安，老師。"
1006202-11 = "[s1]「是誰！？」\n[s2]「早呀，季……？」"
1006202-12 = "……"
1006202-13 = "這樣啊。老師已經忘記我了。"
1006202-14 = "沒關係。#n就算忘記我也沒問題。"
1006202-15 = "……但是，我的髮箍跟女僕裝是不會容許遭到遺忘的吧。"
1006202-16 = "[ns3]「不，不是！抱歉，剛才太突然了！」"
1006202-18 = "[ns4]「季！是季沒錯吧？飛鳥馬季！」"
1006202-19 = "感謝您能想起來，老師。"
1006202-20 = "感謝您還記得我，老師。"
1006202-21 = "發生什麼事了？看您相當驚慌的樣子……#n我做了什麼奇怪的事嗎？"
1006202-22 = "[ns5]「沒，沒什麼！不如說我很想見你呢！」"
1006202-24 = "[ns6]「不過下次希望你能先聯絡一下就好了～」"
1006202-25 = "我應該有和您聯絡過了才對……？"
1006202-26 = "[s7]「是沒錯啦……」"
1006202-27 = "不過，是呢……我確實沒有表明身分。"
1006202-28 = "[ns8]「是吧！？」"
1006202-29 = "──至於為何會來夏萊……"
1006202-30 = "──至於為何會來夏萊……"
1006202-31 = "很閒……不，因為沒事可做。"
1006202-32 = "[s]「那應該不能算是說明吧……」"
1006202-33 = "是嗎？說明真是件困難的事呢……"
1006202-34 = "[s]（有那麼困難嗎……）"
1006202-35 = "以前，我有名侍奉的對象。"
1006202-36 = "身為其女僕兼保鑣，#n總早到晚都在身邊進行服侍……"
1006202-37 = "然而因為一些原因……"
1006202-38 = "在對我留下了幾道命令後，那位大人便不知去向。"
1006202-39 = "失去主人的我，試著思考了自己該怎麼做。"
1006202-40 = "[s]「以自己的意願行動是很重要的哦。」"
1006202-41 = "於是我得出了「只要把夏萊的老師當成主人，過著和以往相同的生活即可」#n這樣的結論。"
1006202-42 = "[s]「為，為什麼呢……？」"
1006202-43 = "因為我之所以會陷入這種狀況，老師也有一部分的責任。#n我說的沒錯吧？"
1006202-48 = "有什麼問題嗎？#n還是老師直到現在才理解自己的罪孽是多麼深重呢？"
1006202-49 = "[s]「太不講理了吧！？」"
1006202-50 = "不，這是非常符合邏輯且合理的結論。"
1006202-55 = "因此，從這個瞬間開始，我將會侍奉老師。"
1006202-56 = "[ns]「先等一下，季同學？季大人！？」"
1006202-58 = "（提出的抗議並沒有被接受，於是季的「照顧」就這麼開始了……）"
1006202-60 = "市區街道"
1006202-69 = "你看！#n夏萊的老師是不是讓學生穿著女僕裝散步？"
1006202-70 = "夏萊的老師基本上是個好人……#n不過偶爾會讓學生做些不好的事的傳聞，居然是真的啊……"
1006202-72 = "呵呵，大家都在稱讚我呢。"
1006202-73 = "這正是女僕的模範。#n您不這麼覺得嗎？"
1006202-74 = "[s]「我怎麼覺得好像被誤會了……？」"
1006202-79 = "這也是個好機會。#n就讓我來證明自己能夠從任何威脅中保護老師吧。"
1006202-80 = "提升警戒等級，切換至戰鬥模式。"
1006202-89 = "咦！？居然在路上突然叫學生脫衣服……"
1006202-90 = "竟然在這種人來人往的地方……真不敢相信。"
1006202-91 = "[ns9]「季同學！冷靜，冷靜！」\n[ns10]「解，解除戰鬥模式吧！算我求你了！」"
1006202-104 = "是嗎……真遺憾。恢復警戒等級。"
1006202-106 = "啊，老師。我有些問題想請教……"
1006202-111 = "請等一下。要和老師說話，請先通過我這關吧。"
1006202-112 = "咦……？"
1006202-113 = "請問想和老師交談的理由？#n內容為何？需要多少時間？"
1006202-114 = "還是我在一旁就沒辦法說？"
1006202-115 = "那，那個……"
1006202-116 = "[ns]「先，先等一下！」"
1006202-118 = "（就這樣被季照顧（？）了一天）"
1006202-119 = "（是和以往不同的……非常……嶄新的一天……）"
1006202-124 = "[ns]「季……今天辛苦你了……」"
1006202-125 = "您看起來相當疲倦呢。還好嗎？"
1006202-126 = "不用擔心，是嗎？#n但是──"
1006202-127 = "……"
1006202-128 = "我，造成您的困擾了嗎？"
1006202-129 = "[s]「雖然不到困擾，不過可能有點太超過了……」"
1006202-130 = "是嗎……我已經有比較收斂了。"
1006202-131 = "……沒有在開玩笑唷。"
1006202-136 = "請看著我的眼睛。#n我看起來像是會亂開玩笑的人嗎？"
1006202-137 = "[s]「就是因為不像我才會這麼說的啊！？」"
1006202-138 = "那我就放心了。#n看來老師是個有著正常的思考迴路的人。"
1006202-139 = "[s]「你願意幫忙我很開心，不過也要適可而止哦……？」"
1006202-140 = "是嗎……"
1006202-141 = "不過我認為老師應該對自己所處的立場和狀況更有自覺比較好。"
1006202-142 = "但既然老師這麼說……我知道了。"
1006202-143 = "[s11]「今天能和季一起度過，我很開心唷。」\n[s12]「但是希望從明天開始可以更直率一點。」"
1006202-146 = "您說直率，是嗎……"
1006202-147 = "我知道了，老師。那麼──"
1006202-148 = "呦，老師。以後多關照啊。"
1006202-153 = "開玩笑的。我只是在模仿優秀的女僕而已。#n請不要那麼驚訝。"
1006202-154 = "[s]「你不是不會亂開玩笑的嗎！」"
1006202-155 = "我想緩和一下氣氛。"
1006202-156 = "[s]「你背叛了我！背叛了我的心啊！」"
1006202-157 = "……"
1006202-158 = "正是如此。我現在背叛了老師的心。#n是我贏了，Victory。"
1006202-159 = "[s]「居然會輸給學生，我已經沒有以老師自居的自信了……」"
1006202-160 = "那樣我會很困擾的。老師必須由我來輔佐。"
1006202-161 = "否則我又要閒下來了不是嗎？"
1006202-162 = "[s]「這難道就是你平常直率的樣子……？」"
1006202-163 = "……噗噗。"
1006202-164 = "如果是的話，您打算怎麼做呢？"
1006202-165 = "[s]「啊哈哈，如果這才是本來的季，我很樂意接受。」"
1006202-166 = "非常感謝您願意這麼說，老師。"
1006202-168 = "（季一臉心滿意足地回去了）"
1006202-169 = "（於是，到了隔天……）"
1006202-178 = "早安，老師。"
1006202-179 = "[s]「我就知道會這樣！」"
1006202-180 = "謝謝您能記得，老師。"
1006202-181 = "今天也會輔佐老師一整天的。"
1006202-187 = "我們走吧，老師。"
1006202-189 = "（看來今天也會是個不平靜的一天……）"

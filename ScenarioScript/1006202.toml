[translation]
1006202-1 = "Daily Chores"
1006202-2 = "Schale Executive Office"
1006202-8 = "I had barely sat down at my desk for the day..."
1006202-9 = "When suddenly..."
1006202-10 = "Good morning, Sensei."
1006202-11 = "[s1] \"Who?!\"\n[s2] \"...Toki?! \""
1006202-12 = "..."
1006202-13 = "I see. You forgot about me completely, Sensei."
1006202-14 = "That's quite all right. It's fine, really. I'm not the type to be hurt by something like this. I forgive you for forgetting me."
1006202-15 = "But I wonder... Will my pristine maid uniform and spotless rocket launcher forgive you as well?"
1006202-16 = "[ns3] \"N-No! I'm sorry! I didn't forget. I was just surprised!\""
1006202-18 = "[ns4] \"Toki! It's Toki, right? Asuma Toki!\""
1006202-19 = "Oh, you remembered. Thank you, Sensei."
1006202-20 = "Thank you for remembering, Sensei."
1006202-21 = "I didn't realize I would surprise you so much, though. I'm a bit worried... Did I do something incorrectly?"
1006202-22 = "[ns5] \"N-No, that's fine. Students should feel free to seek out their teacher whenever they want!\""
1006202-24 = "[ns6] \"But next time... I'd appreciate it if you contacted me first, at least.\""
1006202-25 = "I did contact you."
1006202-26 = "[s7] \"You did...?\""
1006202-27 = "I just didn't reveal my identity."
1006202-28 = "[ns8] \"Do you even hear yourself?\""
1006202-29 = "So, you wanted to know what I'm doing at Schale so early in the morning."
1006202-30 = "So, you wanted to know what I'm doing at Schale so early in the morning."
1006202-31 = "Well, it's because my schedule suddenly freed up."
1006202-32 = "[s] \"...That clarified nothing.\""
1006202-33 = "Is that so? Hmm... This thing called explanation is quite difficult."
1006202-34 = "[s] \"(Is it really?)\""
1006202-35 = "Let me try again. I had someone who I used to serve."
1006202-36 = "I was her bodyguard and her aide."
1006202-37 = "But then, something happened."
1006202-38 = "With only a few orders for me, she disappeared."
1006202-39 = "Suddenly, I was without responsibility, without duty. I pondered what I should do next."
1006202-40 = "[s] \"It's great that you could think through a problem and find the solution.\""
1006202-41 = "Yes. I concluded that I would go about my daily duties for you, Sensei."
1006202-42 = "[s] \"Why?\""
1006202-43 = "I believe, as the one responsible for creating my situation, it would likewise be your responsibility to fix it."
1006202-48 = "You should see this not as a problem, but as an opportunity to consider the consequences of your actions."
1006202-49 = "[s] \"Now that's going too far!\""
1006202-50 = "No. It's eminently logical and fair. A very reasonable conclusion, if I do say so myself."
1006202-55 = "Anyways, that's how it is. So, from now on, I'll be taking care of you, Sensei."
1006202-56 = "[ns] \"H-Hold on! Toki? Wait, Toki?!\""
1006202-58 = "Despite my protests, Toki's caretaking began..."
1006202-60 = "Downtown Street"
1006202-69 = "Hey... is that Schale's Sensei? Are they really making a student wear a maid uniform and follow them around?"
1006202-70 = "Schale's Sensei seems nice, but I heard that they sometimes make their students do messed up things. Were the rumors true after all?"
1006202-72 = "Ah, I can hear passing citizens praising my performance."
1006202-73 = "Don't you think that I'm the epitome of a perfect maid, Sensei?"
1006202-74 = "[s]\"I think, instead of you being praised, I'm being criticized...\""
1006202-79 = "I see. Then I will take this opportunity to show you another side of my flawless service, the fact that I can protect you from any threat."
1006202-80 = "Raising alert level. Shifting to combat mode."
1006202-89 = "Oh dear! Now they're even having the student change her outfit?!"
1006202-90 = "And in the middle of a crowded street, too... What a disgrace!"
1006202-91 = "[ns9] \"No, no, no! Toki!\"\n[ns10] \"Please turn off combat mode!\""
1006202-104 = "Disappointing. Lowering alert level by one stage. I will continue to protect you."
1006202-106 = "Ah, Sensei. Do you have a moment?"
1006202-111 = "Please wait. If you'd like to speak with Sensei, you must clear it with me first."
1006202-112 = "Huh?"
1006202-113 = "On what subject would you like to speak with Sensei? For what reason? What do you expect the tone of your conversation to be?"
1006202-114 = "How long do you expect it to take? What goal do you hope to accomplish with that time?"
1006202-115 = "I, um, I just..."
1006202-116 = "[ns] \"Hold on, hold on. Wait!\""
1006202-118 = "And that's the way Toki \"took care\" of me all day."
1006202-119 = "It was, in many ways, an...interesting day."
1006202-124 = "[ns] \"Toki, thank you for...your hard work today...\""
1006202-125 = "Hm. You look fatigued. Are you well?"
1006202-126 = "You don't want me to worry? But..."
1006202-127 = "..."
1006202-128 = "Did you, perhaps, find my service to be tiring, Sensei?"
1006202-129 = "[s] \"Not really, but... It was maybe a bit much.\""
1006202-130 = "Oh? But, if anything, my conduct today was less intense than usual."
1006202-131 = "What? You think I'm kidding?"
1006202-136 = "Please look me in the eyes. Do I look like a student who tends to crack jokes?"
1006202-137 = "[s] \"I said that because you don't!\""
1006202-138 = "Oh, thank goodness. It's a relief to see proof of your good judgment, Sensei."
1006202-139 = "[s] \"Anyway, you don't need to go to such lengths when you're helping me.\""
1006202-140 = "Really?"
1006202-141 = "You ought to be more aware of the importance of your position, Sensei."
1006202-142 = "But, if you insist... I understand."
1006202-143 = "[s11] \"It was nice to spend the day with you today, Toki .\"\n[s12] \"I hope you'll be a bit more casual with me in the future.\""
1006202-146 = "Casual. I see..."
1006202-147 = "I understand, Sensei."
1006202-148 = "Kay, Sensei. Lookin' forward to working with you, eh?"
1006202-153 = "...Just kidding. Imitation is one of the skills of an excellent maid. Don't be so shocked."
1006202-154 = "[s] \"I thought you didn't joke!\""
1006202-155 = "I do sometimes."
1006202-156 = "[s] \"You betrayed me! You've hurt my feelings!\""
1006202-157 = "..."
1006202-158 = "That's right. I have hurt your feelings. With that, I am victorious."
1006202-159 = "[s] \"And I've become a loser... Can I even call myself a teacher anymore...?\""
1006202-160 = "Well, this is a problem. You must remain a teacher so that I can continue to assist you."
1006202-161 = "This is your duty, so that I can continue to do my duty."
1006202-162 = "[s] \"Out of curiosity, is this your way of being casual...?\""
1006202-163 = "...Heh."
1006202-164 = "If I said yes, what would your response be?"
1006202-165 = "[s] \"Well, if it makes you feel comfortable... Hah. Hahaha...\""
1006202-166 = "Wonderful. Thank you, Sensei."
1006202-168 = "Toki left with a smug look on her face."
1006202-169 = "And then, the next day..."
1006202-178 = "Good morning, Sensei."
1006202-179 = "[s] \"I had a feeling this was going to happen.\""
1006202-180 = "Thank you for remembering, Sensei."
1006202-181 = "I'll take care of you again today."
1006202-187 = "Shall we go, Sensei?"
1006202-189 = "I had a sneaking suspicion that it was going to be another lively day."

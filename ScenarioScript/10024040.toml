[translation]
10024040-1 = "第4話;舍虎逢狼：風波不斷"
10024040-9 = "崑崙山．入口"
10024040-11 = "老師，你還好嗎？"
10024040-12 = "[s1]「居然會這麼陡……」\n[s2]「我可沒聽說過啊……！」"
10024040-15 = "老師，等洗清嫌疑之後，要不要跟我一起進行功夫的修行啊？"
10024040-16 = "確實是個不錯的提案呢。"
10024040-20 = "[ns]「哪裡不錯了！？」"
10024040-21 = "不管做什麼事，體力都是不可或缺的。#n做料理也需要長時間站立、翻動鍋具，還必須忍受廚房的高溫。"
10024040-22 = "這一點，我想對老師的工作也是一樣的。"
10024040-23 = "[s]「……也就是要藉由修練功夫來鍛鍊體力？」"
10024040-24 = "沒錯，正是如此。"
10024040-25 = "[s]「討厭啦～雖然我的運動量確實不夠，但還是討厭運動～」"
10024040-26 = "「行動應先於思考。不採取行動的人終將失敗……」"
10024040-27 = "不覺得這句話正是為了用來形容現在的老師而存在的嗎？"
10024040-28 = "啊哈哈，真不錯呢，老師。#n就讓令女來鍛鍊你吧！"
10024040-31 = "[ns]「你是在看戲吧！？」"
10024040-40 = "來的真慢啊，玄武商會。"
10024040-41 = "你是……！"
10024040-42 = "這是我們第一次交談吧？"
10024040-43 = "我是玄龍門的執行部長──近衛美奈。"
10024040-44 = "既然執行部長出現在這裡，我可以認為是妃姬的命令嗎？"
10024040-45 = "這個嘛……任憑你想像吧。"
10024040-46 = "犯人往往會再度現身於犯罪現場。#n我只是為了親眼確認而在此等待罷了。"
10024040-47 = "我可不能接受只是來現場調查就被當成犯人啊，美奈執行部長。"
10024040-48 = "不──所有事物都聯繫上了。#n我敢確信。"
10024040-49 = "輕率的確信，通常稱之為「疏忽」。"
10024040-50 = "我時時警戒著疏忽，並致力於改善──#n玄龍門絕對不能犯下那種過錯。"
10024040-52 = "真是了不起的自信呢。#n但過度的自信有時會蒙蔽了自己的雙眼哦。"
10024040-53 = "請稱之為責任感吧。"
10024040-54 = "畢竟這或許正是掌握決定性證據的時刻。"
10024040-55 = "結出第一顆果實為止的過程──將伴隨著巨大的辛勞。#n然而正因如此才更有做的價值。"
10024040-60 = "[ns3]「你拿出餐券打算做什麼？」\n[ns4]「不可以哦，美奈醬！不能隨便燒掉餐券！」"
10024040-63 = "……請放心吧，老師。#n那是假的餐券。"
10024040-64 = "呼，不能吸菸真是遺憾啊。"
10024040-67 = "[ns]「不是，學生怎麼能做那種事呢！？」"

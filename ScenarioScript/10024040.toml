[translation]
10024040-1 = "ตอนที่ 4;ลำบากไม่รู้จบ"
10024040-9 = "ทางเข้าเขาคุนหลุน"
10024040-11 = "ยังไหวอยู่ไหมคุณครู?"
10024040-12 = "[s1] \"แฮ่กๆ... ไม่คิดเลยว่าต้องมาปีนเขาในวัยนี้!\"\n[s2] \"นักเรียน... อย่ารังแกผู้ใหญ่สิ...\""
10024040-15 = "คุณครู ถ้าพวกเราพอจะจัดการเรื่องนี้ได้แล้ว... คุณครูลองมาฝึกกังฟูกับฉันไหมคะ?"
10024040-16 = "อืม มันอาจจะเป็นประโยชน์กับคุณครูก็ได้นะ"
10024040-20 = "[ns] \"ทำไมจู่ๆ ก็พูดแบบนี้ล่ะ?!\""
10024040-21 = "ไม่ว่าจะทำอะไร พละกำลังของร่างกายต้องมาก่อนนะคะ แม้แต่การทำอาหารก็เช่นกัน การยืนใน#nห้องครัวนี่ใช้ความอดทนและความอึดมากเลยละค่ะ"
10024040-22 = "และฉันคิดว่า... งานของคุณครูก็คงเป็นเหมือนกันค่ะ"
10024040-23 = "[s] \"สรุปก็คือ... จะชวนฝึกกังฟูเพิ่มพละกำลังเหรอ...?\""
10024040-24 = "ใช่แล้วค่ะ"
10024040-25 = "[s] \"ไม่เอาละ ครูไม่ค่อยชอบออกกำลังกายน่ะ~\""
10024040-26 = "<อย่าเพิ่งคิดจนกว่าจะลงมือทำ ผู้ที่ไม่ลงมือทำนั้นคือผู้แพ้...> "
10024040-27 = "ฉันคิดว่ามันเป็นคำที่เหมาะกับคุณครูในตอนนี้ค่ะ คิดว่ายังไงคะ?"
10024040-28 = "แบบนี้ค่อยสนุกขึ้นมาหน่อย? รู้งี้เอาถังหูลู่กับชาอู่หลงมาด้วยดีกว่า"
10024040-31 = "[ns] \"เราไม่ควรเห็นความทุกข์ยากของคนอื่นเป็นเรื่องสนุกนะรูมิ!\""
10024040-40 = "มาช้านะ ย่านการค้าเทพเต่าดำ"
10024040-41 = "คุณคือ...!"
10024040-42 = "นี่เป็นการแนะนำตัวอย่างเป็นทางการครั้งแรกหรือเปล่า?"
10024040-43 = "ฉันโคโนเอะ มินะ หัวหน้าปฏิบัติการของมังกรดำ"
10024040-44 = "การที่หัวหน้าปฏิบัติการของมังกรดำมาถึงที่นี่ถือเป็นเจตนาของคิซากิด้วยไหม?"
10024040-45 = "ยังไงดีล่ะ..."
10024040-46 = "คนร้ายย่อมปรากฏตัวในที่เกิดเหตุอีกครั้ง ส่วนฉันก็แค่แวะมายืนยันด้วยตาของตัวเองเท่านั้น"
10024040-47 = "สันนิษฐานเกินจริงไปแล้วนะคะ หัวหน้าคณะกรรมการมินะ"
10024040-48 = "ไม่หรอก ฉันว่าปัจจัยต่างๆ มันก็รวมอยู่ในที่เดียวกันหมดแล้วนะ ฉันมั่นใจ"
10024040-49 = "ความมั่นใจที่ไม่ชัดเจนน่ะ ปกติเราเรียกว่าความประมาทนะคะ"
10024040-50 = "ฉันใช้ชีวิตด้วยความไม่ประมาทมาตลอด... ถึงคนอื่นในซานไห่จิงจะสะเพร่ากันบ้าง แต่มังกรดำจะเป็นแบบนั้นไม่ได้"
10024040-52 = "มั่นอกมั่นใจจังเลยนะคะ"
10024040-53 = "เรียกว่ามีความรับผิดชอบดีกว่า"
10024040-54 = "ตอนนี้เป็นช่วงหาหลักฐานมัดตัว"
10024040-55 = "การได้มาซึ่งผลงานชิ้นแรกมันย่อมเหน็ดเหนื่อยเป็นธรรมดา แต่มันก็คุ้มค่ากับความเหนื่อยนะ"
10024040-60 = "[ns3] \"หืม ทำไมอยู่ๆ ถึงหยิบคูปองอาหารออกมาล่ะ?\"\n[ns4] \"ไม่ได้นะ มินะจัง! จะเผาคูปองอาหารตามอำเภอใจไม่ได้นะ!\""
10024040-63 = "ไม่เป็นไรหรอกค่ะ คุณครู... นั่นมันคูปองอาหารปลอมค่ะ"
10024040-64 = "ฮุ น่าเสียดายนะที่จุดบุหรี่ไม่ได้"
10024040-67 = "[ns] \"ไม่ได้นะ! ถ้านักเรียนทำแบบนั้นมันจะเป็นเรื่องใหญ่เอานะ!\""

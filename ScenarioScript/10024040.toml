[translation]
10024040-1 = "Episode 4;Longer Road, Taller Mountain"
10024040-9 = "Kunlun Mountain"
10024040-11 = "Are you all right, Sensei?"
10024040-12 = "[s1] \"*gasp* *gasp* I'm no...spring...chicken...\"\n[s2] \"Slow down...you...kids...\""
10024040-15 = "Sensei, when all of this is over, do you want to do kung fu training with me?"
10024040-16 = "Hmm. In Sensei's case, that may not be a bad idea..."
10024040-20 = "[ns] \"What brought this on?!\""
10024040-21 = "In everything you do, stamina and endurance are key. That's true even in cooking."
10024040-22 = "And...I think it's the same with your work, Sensei."
10024040-23 = "[s] \"...It sounds like you just want to whip me into shape.\""
10024040-24 = "That too."
10024040-25 = "[s] \"Noooo! I don't wanna exercise!\""
10024040-26 = "\"Act before you think, or you will surely lose.\" "
10024040-27 = "That describes you perfectly! See, you've already got the kung fu spirit in you!"
10024040-28 = "This is getting interesting. I should have brought tanghulu and oolong..."
10024040-31 = "[ns] \"I'm not doing this for your entertainment!\""
10024040-40 = "You're late, Black Tortoise Promenade."
10024040-41 = "You're...!"
10024040-42 = "Allow me to introduce myself formally."
10024040-43 = "I am Konoe Mina, executive officer of Genryumon."
10024040-44 = "You're Kisaki's right-hand girl. I take it she actually sent you this time?"
10024040-45 = "...Perhaps."
10024040-46 = "Criminals can't resist returning to the scene of the crime. I knew you'd show up eventually."
10024040-47 = "Again with the baseless accusations! You Genryumon members are too much!"
10024040-48 = "No, the signs are there. I'm sure of your guilt now, beyond a doubt."
10024040-49 = "Maybe you think you're sure, but I say you're being careless."
10024040-50 = "I never take so much as a careless step... Maybe other students can afford to be, but not Genryumon."
10024040-52 = "You're pretty cocky, you know that?"
10024040-53 = "It's diligence, not cockiness."
10024040-54 = "It's high time I close this case for good."
10024040-55 = "It's been a tough road, getting to the bottom of this. But the deepest road is the most satisfying."
10024040-60 = "[ns3] \"Uh... Did you just light a meal ticket on fire?\"\n[ns4] \"No, Mina! Don't burn a precious meal ticket!\""
10024040-63 = "...Don't worry, Sensei. It's a fake."
10024040-64 = "Hmph. It would've been cooler if I had a real cigarette..."
10024040-67 = "[ns] \"No, it wouldn't. Smoking isn't cool.\""

10024040-9 = "#place;곤륜산 입구"
10024040-10 = "4;레이죠;04\n2;루미;02\n#2;a\n#4;a\n#2;h\n#4;h\n#wait;1000"
10024040-11 = "4;레이죠;04\n2;루미;02; 괜찮아, 선생님?"
10024040-12 = "[s1] \"헉헉…… 이 나이에 산행이라니……!\"\n[s2] \"학생들…… 어른을 괴롭히지 마……\""
10024040-13 = "#wait;100"
10024040-14 = "#wait;100"
10024040-15 = "4;레이죠;02;선생님. 이번 일이 대충 정리되면…… 저와 함께 쿵후 수련을 하지 않으시겠습니까?\n#4;em;[?]"
10024040-16 = "2;루미;99;음. 그건 확실히 선생님에게 도움이 될지도.\n#2;greeting"
10024040-17 = "#st;[0,0];instant;1;"
10024040-18 = "#clearST"
10024040-19 = "2;루미;99\n4;레이죠;02\n#2;h\n#4;h\n#wait;1000"
10024040-20 = "[ns] \"갑자기 또 왜?!\""
10024040-21 = "4;레이죠;05;어떤 일을 하든지 체력이 우선입니다. 요리만 해도 그렇지요. 주방에 선다는 것은 엄청난 인내와 지구력을 소모하는 일입니다.\n#4;em;[!]\n#4;m3\n#2;dl"
10024040-22 = "4;레이죠;99;그리고 그것은…… 선생님의 일 역시 마찬가지라고 생각합니다."
10024040-23 = "[s] \"……요약하자면, 같이 쿵후를 수련하면서 체력 단련을 하자는 뜻……?\""
10024040-24 = "4;레이죠;00;정확하십니다.\n#4;em;[반짝]"
10024040-25 = "[s] \"싫어어~ 운동 부족인 건 맞지만 운동은 싫어어~\""
10024040-26 = "4;레이죠;99; <생각하기 전에 우선 행동하라. 행동하지 않는 자는 패배한다……> \n#4;em;[...]"
10024040-27 = "4;레이죠;13;지금 선생님께 정확히 어울리는 말이라고 생각합니다만, 어떠십니까?!\n#4;greeting"
10024040-28 = "#4;hide\n3;루미;03;이거 재미있어지는데? 탕후루와 우롱차라도 가져올 걸 그랬어.\n#3;em;[음표]"
10024040-29 = "#st;[0,0];instant;1;"
10024040-30 = "#clearST"
10024040-31 = "[ns] \"남의 불행을 재미로 삼는 것은 옳지 못하답니다, 루미 학생!\""
10024040-32 = "#st;[0,0];instant;1;"
10024040-33 = "#clearST"
10024040-34 = "3;루미;07\n#3;em;[재잘]\n#wait;1000"
10024040-35 = "#wait;500"
10024040-36 = "3;루미;02\n#3;em;[?]\n#wait;1000"
10024040-37 = "3;루미;02\n#3;d\n#wait;1000"
10024040-38 = "#wait;2200"
10024040-39 = "3;미나;05\n#3;a\n#wait;4100"
10024040-40 = "3;미나;01;늦었군. 현무상회."
10024040-41 = "3;레이죠;05;당신은……!\n#3;em;[!]"
10024040-42 = "3;미나;03;정식으로 소개하는 건 처음인가?"
10024040-43 = "3;미나;11;코노에 미나다. 현룡문의 집행부장을 맡고 있지.\n#3;closeup"
10024040-44 = "3;루미;02;현룡문의 집행부장이 여기까지 온 건, 키사키의 의중이 포함되어 있다고 봐도 되는 건가?\n#3;em;[반응]\n#3;closeup"
10024040-45 = "3;미나;05;……어떨까.\n#3;em;[...]"
10024040-46 = "3;미나;11;범인은 범행 현장에 다시 나타나는 법. 나는 그 현장을 내 눈으로 확인하기 위해 온 것뿐이다."
10024040-47 = "5;레이죠;05;추측이 과하군요. 미나 집행부장.\n#5;al\n#3;m1"
10024040-48 = "3;미나;03;아니, 내가 보기에 모든 조건은 이미 한 점에 모였다. 확신할 수 있어."
10024040-49 = "5;레이죠;05;섣부른 확신을, 보통은 부주의라고 부릅니다.\n#5;m4"
10024040-50 = "3;미나;02;난 평생 부주의하지 않으려 노력했지…… 산해경의 다른 모두는 경솔할 수 있지만, 현룡문은 안 돼.\n#3;m2"
10024040-51 = "#all;hide"
10024040-52 = "3;레이죠;15;대단한 자신감이군요.\n#3;closeup"
10024040-53 = "3;미나;08;책임감이라고 말해 주면 좋겠군.\n#3;closeup"
10024040-54 = "3;미나;05;지금이야말로 결정적인 증거를 잡아낼 수 있는 시간일 터."
10024040-55 = "3;미나;13;첫 열매를 얻는 것은 고된 과정이지. 하지만 그렇기에 더더욱 보람이 있는 법이다.\n#3;em;[!]"
10024040-56 = "#st;[0,0];instant;1;"
10024040-57 = "#clearST"
10024040-58 = "3;미나;99\n#wait;1000"
10024040-59 = "3;미나;99\n#3;greeting\n#wait;1000"
10024040-60 = "[ns3] \"어라, 왜 갑자기 식권을 꺼내는 거야?\"\n[ns4] \"안 돼, 미나 쨩! 식권을 함부로 불태우면!\""
10024040-61 = "#wait;100"
10024040-62 = "#wait;100"
10024040-63 = "3;레이죠;05;……괜찮습니다. 선생님. 저거, 가짜 식권이니까요.\n#3;em;[...]"
10024040-64 = "3;미나;07;훗, 담배에 불을 붙일 수 없는 게 한이로군."
10024040-65 = "#st;[0,0];instant;1;"

[translation]
10027045-1 = "ตอนที่ 4;การประชุมลับ"
10027045-8 = "เส้นทางเดินเขา สำนักเลขาธิการเรดวินเทอร์"
10027045-9 = "แฮ่ก... แฮ่ก...! นี่มันอะไรกันเนี่ย?! เจอทั้งหมี ทั้งกระต่าย ไหนจะโดรนอีก...! โจมตีออกมาจากตรงไหน#nกันเนี่ย?!"
10027045-14 = "[ns1] \"ข้ามภูเขา~ ข้ามหิมะ~ ข้ามซอกหลืบ~\"\n[ns2] \"เมื่อไรน้า~ ต้องข้ามไปถึงเมื่อไร~\""
10027045-17 = "...น่าอิจฉาจังเลยนะที่ครูยังมีอารมณ์ร้องเพลงได้อยู่"
10027045-18 = "หืม? หนาวจนมือจะแข็งอยู่แล้ว ถ้าไม่ร้องเพลงเพื่อให้ร่างกายอบอุ่นก็จะทนไม่ไหวงั้นเหรอ?"
10027045-19 = "บอกมาแต่แรกก็สิ้นเรื่องแล้ว เอ้านี่ ฮอตแพ็กให้ความร้อน"
10027045-30 = "ไม่ต้องขอบคุณหรอก... ถ้าจะเอาชีวิตรอดในเรดวินเทอร์ให้ได้ ก็ต้องมีอุปกรณ์กันหนาวแบบนี้แหละ..."
10027045-31 = "เฮ้อ อย่างน้อยก็โชคดีที่พวกนั้นไม่ได้เข้าไปในส่วนลึกของภูเขา แต่ทำไมถึงต้องมารวมตัวในซอกหลืบ#nแบบนี้ด้วยนะ?"
10027045-32 = "ถ้ามีความตั้งใจและกระตือรือร้นแบบนี้ สู้ไปอยู่ <ชมรมแนวร่วมปลดปล่อยความรู้> ของเรายังดีซะกว่า ..."
10027045-39 = "รุ่นพี่เมรุ ฉันหาหนังสือใหม่ได้แล้วค่ะ!"
10027045-40 = "นั่นมันแค่เขียนว่าเล่มใหม่ แต่จริงๆ แล้วเป็นฉบับเก่าหรือเปล่า?"
10027045-41 = "ถะ... ถ้ามองตามความเป็นจริงก็อาจจะเป็นอย่างนั้นก็ได้ค่ะ แต่มันก็เป็นหนังสือใหม่สำหรับพวกเราอยู่ดี#nนี่คะ?"
10027045-42 = "...มันเป็นหนังสือที่เพิ่งเห็นเป็นครั้งแรก ก็เลยถือว่าเป็นของใหม่น่ะค่ะ..."
10027045-43 = "เอาน่าๆ อย่าทำเป็นหมดความมั่นใจแบบนั้นสิ การได้ความรู้และได้ปัญญาใหม่ๆ มาน่ะ ยังไงมันก็#nเติมเต็มจิตใจให้ได้ทั้งนั้นแหละ"
10027045-48 = "......"
10027045-49 = "ช่างเถอะ ลืมๆ ที่ฉันพูดไปซะเถอะ"
10027045-55 = "เซอร์เคิล"
10027045-57 = "[ns] \"มาถึงแล้วเหรอ?\""
10027045-58 = "คงงั้นนะ มันน่าจะเป็นที่นี่แหละ..."
10027045-62 = "ไม่อยากจะเชื่อเลยว่ามันมีการประชุม... ในสถานที่แบบนี้อยู่จริงๆ ด้วย..."
10027045-63 = "มีบูทเยอะแยะเลย แล้วหนังสือก็กองอยู่เต็มไปหมด..."
10027045-64 = "[s] \"ทุกคนกำลังดูหนังสือเงียบๆ แล้วก็หาซื้อหนังสือกันใหญ่เลยนะ\""
10027045-65 = "มันก็จริง... แต่ฉันว่าฉันเคยเห็นบรรยากาศแบบนี้จากที่ไหนอยู่บ่อยๆ นะ...?"
10027045-69 = "[ns] \"เมรุ ดูตรงนี้สิ หรือว่านี่คือ...?\""
10027045-70 = "หืม? ครูเจออะไรเหรอ? เดี๋ยวก่อน... นี่มัน!"
10027045-75 = "<ลูน่า The Last>?! งั้นก็แปลว่านี่...?!"
10027045-76 = "[s] \"หนังสือนี้มีเขียนว่า 'Sample' ไว้ด้วย\""
10027045-77 = "อ่า จริงด้วย คงจะเป็นเล่มตัวอย่างสินะ"
10027045-78 = "อ่า... มาอ่านงั้นเหรอคะ? ขะ... ขอบคุณค่ะ! เชิญอ่านตามสบายได้เลยค่ะ!"
10027045-79 = "(หืม...? ทำไมคนที่ขายหนังสือถึงเป็นฝ่ายกล่าวขอบคุณล่ะ? ไม่คุ้นกับบรรยากาศแบบนี้เลยแฮะ...?!)"
10027045-83 = "อะ... เอาเป็นว่า! เราลองอ่านกันดูก่อนเถอะครู บางที... นี่อาจจะเป็น <ลูน่า> เล่มสุดท้ายที่เราตามหากัน#nอยู่ก็ได้...!"
10027045-93 = "[ns] \"อ่า... ครูว่าครูเจอเนื้อหาดีๆ แล้วละ...\""
10027045-95 = "[ns3] \"ลูน่าทั้งสองรวมพลังกัน\"\n[ns4] \"ภาพการต่อสู้ครั้งสุดท้ายกับศัตรูด้วยพลังเป็นล้าน...\""
10027045-98 = "ไม่ๆๆๆ เดี๋ยวก่อน! แบบนี้มันไม่แปลกๆ ไปหน่อยเหรอ?!"
10027045-99 = "<ลูน่า> น่ะเป็นการ์ตูนแนวความรักบริสุทธิ์ โมมิจิบอกไว้ว่ามันเกี่ยวกับชีวิต ความพังก์ วงดนตรี แล้วก็#nภาพยนตร์... มันควรจะเป็นเรื่องราวแนวๆ นั้นสิ! ทำไมจู่ๆ ถึงเข้าไคลแม็กซ์สุดท้ายด้วยการรวมตัวกัน#nต่อสู้อย่างดุเดือดไปได้ล่ะ?!"
10027045-100 = "[s] \"แต่เรื่องราวมันเจ๋งออกนะ!\""
10027045-101 = "ถะ... ถ้ามองในแง่โครงสร้างของเรื่องราวหรือการจัดองค์ประกอบ มันก็น่าประทับใจอยู่หรอก!"
10027045-102 = "แต่ว่า... ถ้าเรื่องราวแบบนั้นจะเป็นตอนจบของ <ลูน่า> มันไม่ดูแปลกไปหน่อยเหรอ? ไม่ว่าจะเป็นสาระ#nสำคัญหรือการเชื่อมโยง ฉันว่ามันบิดเบี้ยวไปหมดเลยด้วย"
10027045-103 = "[s5] \"เอ๋? ตรงนี้มี <ลูน่า> แบบอื่นอยู่ด้วย\"\n[s6] \"เล่มนี้ชื่อ... <ฉากจบของลูน่า>?\""
10027045-110 = "(<ลูน่า> เล่มสุดท้าย... ไม่ได้มีเวอร์ชันเดียวงั้นเหรอ?!)"
10027045-111 = "(ถ้างั้นก็แปลว่า...?)"
10027045-117 = "มีเล่มตัวอย่างอยู่ตรงนี้ด้วย งั้นมาอ่านกันก่อนเถอะ!"
10027045-129 = "[ns] \"ฮือๆ ลูน่าทั้งสองเลิกกันแล้วแยกย้ายกันไปตามทางของแต่ละคน...\""
10027045-130 = "ไม่ๆๆๆ เดี๋ยวก่อน! แบบนี้มันไม่แปลกๆ ไปหน่อยเหรอ?"
10027045-131 = "ถึงเนื้อหาในเล่มนี้จะเกี่ยวกับชีวิต ความพังก์ วงดนตรี และภาพยนตร์ก็เถอะ... แต่ก็เคยมีการบอกเป็น#nนัยไว้อย่างแนบเนียนว่าทั้งสองคนจะยอมรับซึ่งกันและกันและคืนดีกันได้ในที่สุดไม่ใช่เหรอ?!"
10027045-132 = "บอกเป็นนัยไว้อย่างนั้นแล้วแท้ๆ แต่จะมาจบแบบไม่แฮปปี้เอนดิ้งงั้นเหรอ?!"
10027045-133 = "[s] \"แต่ก็น่าเห็นใจมากเลยนะ!\""
10027045-134 = "แน่นอนว่าการควบคุมเส้นอารมณ์และการจัดองค์ประกอบภาพมันก็ยอดเยี่ยมอยู่หรอกนะ!"
10027045-135 = "แต่มันไม่ควรมาเป็นตอนจบของ <ลูน่า> เลย... "
10027045-139 = "[ns7] \"เหมือนจะมี <ลูน่า> แบบอื่นอยู่อีกนะ\"\n[ns8] \"เล่มนี้ชื่อ <Lunaless> แฮะ...?\""
10027045-146 = "(หรือว่า <ลูน่า> เล่มจบของแต่ละร้าน... มันจะไม่เหมือนกันเลย?)"
10027045-147 = "(อยากจะคิดว่ามันไม่ใช่อย่างนั้นอยู่หรอก แต่ไม่ว่าจะคิดอีกกี่ทีมันก็ไม่มีทางเป็นอย่างอื่นไปได้เลย...!)"
10027045-151 = "อ๊ะ ครู! อย่าเพิ่งเปิดเล่มตัวอย่างอ่านคนเดียวสิ! มาดูด้วยพร้อมๆ กัน!"
10027045-164 = "[ns] \"อ่า... ไม่มีใครรู้ร่องรอยของลูน่าทั้งสอง...\""
10027045-165 = "...ชีวิตที่เหลือของพวกเราคือเวลานับจากนี้... นี่น่ะเหรอตอนจบ?"
10027045-166 = "ไม่ๆๆ ไม่เห็นเข้าใจเลยสักนิด! ทำไมไม่แต่งตอนจบให้มันชัดเจนล่ะ! อะไรเนี่ย อยู่ดีๆ ก็บิดเบือนเนื้อหา#nไปคนละเรื่องโดยสิ้นเชิงเลย! อยู่ๆ เวลาก็ผ่านไปไวมาก แล้วก็มีแต่เรื่องราวย้อนวันวานในวันวาน แล้วก็#nย้อนวันวานอีกรอบ!"
10027045-167 = "[s] \"แต่เล่มนี้วาดรูปสวยมากเลยนะ!\""
10027045-168 = "ฉันก็รู้หรอกน่าว่าการวาดของเขายอดเยี่ยมมาก! โดยเฉพาะหลายๆ ฉากที่ทำเอาฉันคิดว่ามันเป็นการ#nอุทิศให้ศิลปะคลาสสิกเลยละ!"
10027045-169 = "แต่ก็ใช่ว่าการ์ตูนจะสมบูรณ์แบบได้ด้วยแค่ภาพสวยๆ นี่นา โดยเฉพาะตอนจบของผลงานน่ะ ฉันว่ามันสำคัญกว่าเป็นไหนๆ"
10027045-170 = "สิ่งที่เล่มนี้ทำคือการเอาสิ่งที่คนอ่านสงสัยที่สุดออกไป แล้ววาดบทส่งท้ายในแบบที่ตัวเองอยากวาด#nเท่านั้น!"
10027045-171 = "[s] \"ดูนี่สิ เมรุ ตรงโน้นก็มี <ลูน่า>...\""
10027045-172 = "ไม่เอาแล้ว ช่างมันเถอะครู ฉันเข้าใจแล้วละว่าสถานที่นี้คืออะไร และ <ลูน่า> คืออะไรสำหรับที่นี่"
10027045-178 = "ลองอ่านดูสักครั้งสิคะ! เดี๋ยวฉันให้ภาพวาดพิเศษด้วยค่ะ!"
10027045-179 = "ครั้งนี้เป็นเล่มจัดพิมพ์ใหม่เลยนะคะ... ลองอ่านดูสิคะ"
10027045-180 = "เราจำกัดการซื้อ <G. Luna> 1 คนต่อ 1 เล่มค่ะ ช่วยซื้อตามลำดับด้วยนะคะ! "
10027045-184 = "......"
10027045-185 = "ที่นี่คือตลาดโดจินชิ และไม่ใช่ตลาดโดจินชิธรรมดาๆ ด้วย มันเป็นตลาด <ลูน่า> โดยเฉพาะเลย"
10027045-186 = "[s] \"อืม ไม่เห็นเข้าใจเลยสักนิดว่าคุณเมรุอยากจะสื่ออะไร...\""
10027045-187 = "ก็แปลว่า..."
10027045-196 = "[ns9] \"งั้นเหรอ...! ที่นี่คือตลาดขาย <ลูน่า> เล่มจบ\"\n[ns10] \"ที่แฟนๆ <ลูน่า> แต่งกันเองตามจินตนาการสินะ\""
10027045-199 = "แบบนั้นแหละ โดจินชิที่ขายที่นี่ทั้งหมดคือ <ลูน่า> เล่มจบทั้งนั้นเลย"
10027045-200 = "และการที่มีทั้งเรื่องที่เหนือจินตนาการ เรื่องที่ฉีกสปอยล์ไปเลย เรื่องที่แค่วาดตอนจบสวยๆ ก็ได้รับการ#nยอมรับจากคนอ่าน... ก็เพราะว่าทุกคนที่อยู่ที่นี่คือ 'คนที่ชื่นชอบ' <ลูน่า>"
10027045-201 = "[s] \"โดจินชิพวกนี้คือ <ลูน่า> เล่มจบที่แฟนๆ แต่งเรื่องและวาดกันเองสินะ\""
10027045-202 = "ใช่ และเพราะแบบนี้เนื้อหามันก็เลยไม่เหมือนกันเลยสักเล่ม เพราะการวิเคราะห์เนื้อเรื่องของแต่ละคน#nก็ล้วนแตกต่างกันออกไป"
10027045-203 = "ถึงบางเล่มจะไม่ได้มาจากการตีความ แต่สะท้อนความปรารถนาของผู้แต่งเป็นหลักก็เถอะ..."
10027045-204 = "[s] \"แต่ความปรารถนาคือแรงผลักดันของการสร้างสรรค์ไม่ใช่เหรอ?\""
10027045-205 = "อึก ทีอย่างนี้ละทำมาเป็นรู้เรื่องดีนะครู"
10027045-206 = "หืม? ไม่ว่าจะออกมาเงอะๆ งะๆ หรือยอดเยี่ยมยังไง แต่ก็มีหนึ่งอย่างที่ถูกถ่ายทอดออกมาจากทุกคน และมันก็คือ..."
10027045-207 = "ความรักที่แฟนๆ ทุกคนที่นี่มีต่อ <ลูน่า> อย่างนั้นเหรอ...?"
10027045-208 = "แต่ทำไมกัน? ทำไมทุกคนถึงต้องวาดเล่มจบของ <ลูน่า> กันเอง... แล้วมาวางขายแบบนี้ล่ะ?"
10027045-209 = "......"
10027045-216 = "ในที่สุดก็มาถึงตรงนี้เลยสินะคะ คุณเมรูริ"
10027045-221 = "หืม...?"

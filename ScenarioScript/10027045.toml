[translation]
10027045-1 = "第4話;祕密聚會"
10027045-8 = "赤冬山間小徑"
10027045-9 = "哈啊，哈啊……！這到底是怎麼回事啊！不只有兔子跟熊，甚至還有無人機……！？這些傢伙到底是從哪裡冒出來攻擊我們的啊！？"
10027045-14 = "[ns1]「翻山～踏雪～前往荒郊野外～」\n[ns2]「我們究竟～該走向何處～」"
10027045-17 = "……真羨慕老師現在還有心情唱歌。"
10027045-18 = "嗯？你說手快凍僵了，所以才用唱歌分散注意力？"
10027045-19 = "怎麼不早點跟我說呢……來，這個暖暖包給你。"
10027045-30 = "用不著跟我道謝啦……#n想在赤冬生存，這種禦寒小物是絕對少不了的……"
10027045-31 = "唉……雖然聚會不是辦在深山裡就該偷笑了，但為什麼偏偏選在這麼偏僻的地方呢？"
10027045-32 = "有這種熱情和毅力的話，為什麼不加入我們「知識解放戰線」……"
10027045-39 = "愛瑠前輩，我拿到新書了！"
10027045-40 = "不是寫作「新書」讀作「舊書」的那種嗎？"
10027045-41 = "從，從客觀的角度來看，這麼說也沒有錯！#n但對我們來說確實是新書沒錯呀？"
10027045-42 = "我們沒看過的書，不就等於是新書嗎……"
10027045-43 = "哎呀哎呀，別那麼消沉嘛。#n無論是什麼樣的新知識，都能讓心靈變得更加富足。"
10027045-48 = "……"
10027045-49 = "不，沒什麼。#n忘了我剛剛說的話吧。"
10027045-55 = "同人會場"
10027045-57 = "[ns]「我們到了嗎？」"
10027045-58 = "應該是吧，不過……"
10027045-62 = "真不敢相信……居然真的在這種地方……舉辦這種聚會……"
10027045-63 = "攤位還挺不少呢。#n上面也擺滿了書……"
10027045-64 = "[s]「大家都安靜地讀著書，或是在選要買的書呢。」"
10027045-65 = "就是說啊……#n不過我總覺得這個氣氛，好像在某個地方感受過……？"
10027045-69 = "[ns]「啊，愛瑠你看這個。這該不會是……？」"
10027045-70 = "嗯？發現什麼了嗎？#n等等……這個是……？"
10027045-75 = "《LUNA─TheLast─》！？#n這難道就是……！？"
10027045-76 = "[s]「這上面寫著『Sample』呢。」"
10027045-77 = "啊，這樣啊，看來這應該是樣品吧。"
10027045-78 = "啊……想，想試讀看看嗎？#n謝，謝謝！慢慢看沒關係！"
10027045-79 = "（嗯……？反而是賣書的人向買書的人道謝？#n　好像有股莫名的既視感……！？）"
10027045-83 = "那，那我們就先讀讀看吧，老師！#n說不定這個……真的就是我們一直在尋找的《LUNA》最終卷……！"
10027045-93 = "[ns]「啊啊……老師我好久沒看到這麼棒的劇情了……」"
10027045-95 = "[ns3]「兩個露娜齊心協力凝聚出百萬伏特……」\n[ns4]「和最後的敵人決戰的場景……」"
10027045-98 = "不對不對不對，先等一下！#n不覺得好像哪裡怪怪的嗎！？"
10027045-99 = "《LUNA》明明是純愛系的漫畫……#n按照紅葉的說法，描寫的應該是人生、龐克、樂團和電影……那類的題材才對吧！？#n為什麼突然變成以合體、戰鬥、熱血迎接最後高潮的劇情了啊！？"
10027045-100 = "[s]「可是這樣的劇情很棒吧！？」"
10027045-101 = "故，故事和分鏡的安排確實是很讓人印象深刻沒錯……！"
10027045-102 = "不過……要說這是《LUNA》的最終卷，不覺得好像哪裡怪怪的嗎？#n無論是故事核心還是劇情的連貫性，基本上都歪得一蹋糊塗。"
10027045-103 = "[s5]「咦？這邊還有別本《LUNA》。」\n[s6]「這本是……《Finale of LUNA》？」"
10027045-110 = "（難道《LUNA》的最終卷……不只一本！？）"
10027045-111 = "（也就是說，難道……？）"
10027045-117 = "反，反正這本也有樣本，就先讀讀看再說吧！"
10027045-129 = "[ns]「嗚嗚……沒想到兩個露娜最後竟然分道揚鑣，各自追尋屬於自己的道路……」"
10027045-130 = "不對不對不對，先等一下！#n這也有點奇怪吧？"
10027045-131 = "雖然這次的確是和人生、龐克、樂團和電影……那些題材有關的內容沒錯！#n但《LUNA》明明就埋下了縝密的伏筆，讓兩個主角能夠漸漸互相認可並接受彼此，#n進而在最後盡釋前嫌不是嗎！？"
10027045-132 = "為什麼結局卻推翻了所有先前埋的伏筆，直接用突如其來的離別畫下句點啊！？"
10027045-133 = "[s]「可是這樣的結局很感人吧！？」"
10027045-134 = "我承認，這部作品在構圖和感情線的拿捏方面確實很讓人驚艷！"
10027045-135 = "但要說這是《LUNA》的最終卷……我實在沒有把握。"
10027045-139 = "[ns7]「愛瑠，這裡好像還有另一本《LUNA》……」\n[ns8]「這本的標題叫做《LUNARIS》……」"
10027045-146 = "（難道每個攤位上的《LUNA》最終卷……全都不一樣？）"
10027045-147 = "（本來還以為是我想太多，但現在看來……除了那個之外沒有其他可能性了……！）"
10027045-151 = "啊，老師！#n別自己一個人先看啊！我們一起看！"
10027045-164 = "[ns]「啊啊……雖然最後沒有任何人知道兩個露娜的下落……」"
10027045-165 = "「但是我們之後的人生現在才開始」的結局……？"
10027045-166 = "不行不行不行，至少我沒辦法接受！把結局好好畫出來好不好！#n為什麼劇情突然又超展開了啊！#n時間突然跳到很久以後，然後演一些……像是番外篇的番外篇的番外篇的劇情！"
10027045-167 = "[s]「可是這本的作畫很優秀吧！？」"
10027045-168 = "我當然知道這個作者的畫功很強！#n而且似乎還有幾個分鏡是在向古典藝術致敬！"
10027045-169 = "可是一部漫畫只有作畫精美是不夠的吧？#n結局才是一部作品的核心不是嗎？"
10027045-170 = "但這個作者竟然把讀者真正好奇的內容通通刪掉，只畫一些自己想畫的番外篇！"
10027045-171 = "[s]「愛瑠你看，那裡也有一本《LUNA》……」"
10027045-172 = "不，不用了，老師。#n我已經明白這裡究竟是什麼地方，這裡的《LUNA》又是怎麼回事了。"
10027045-178 = "歡迎各位參考看看！隨書附贈插畫特典喔！"
10027045-179 = "我們這次印製了一些新書……要不要參考一下？"
10027045-180 = "《G.LUNA》每人限購一本！請各位遵守秩序！"
10027045-184 = "……"
10027045-185 = "這裡是同人展。#n而且還不是普通的同人展，而是《LUNA》的專展。"
10027045-186 = "[s]「嗯，你說得很清楚，但我聽得很模糊！」"
10027045-187 = "簡單來說就是……"
10027045-196 = "[ns9]「原來如此……！所以這裡是《LUNA》的粉絲們……」\n[ns10]「把心中的《LUNA》最終卷畫出來並販售的地方對吧？」"
10027045-199 = "沒錯，所以這些全都是《LUNA》最終卷的同人誌。"
10027045-200 = "無論是超乎想像的劇情、無視伏筆的情節……#n就連番外篇的番外篇都能被接受的原因……就是因為這些都是「同人」作品。"
10027045-201 = "[s]「原來這些都是粉絲們自己畫出來的《LUNA》最終卷。」"
10027045-202 = "嗯，正因如此，這些書的內容才會相差這麼多。#n畢竟每個人對劇情的詮釋都各不相同。"
10027045-203 = "當然，其中有些與其說是詮釋，更像是投射了自己內心的慾望就是了……"
10027045-204 = "[s]「話雖如此，慾望不也是創作的動力之一嗎？」"
10027045-205 = "唔，為什麼老師在這種時候總是特別犀利啊？"
10027045-206 = "嗯？你說無論這些粉絲的功力如何，都能從中清楚感受到一件事？"
10027045-207 = "那就是這裡的人無一不熱愛著《LUNA》……？"
10027045-208 = "不過他們為什麼要舉辦這種活動……為什麼要自己畫《LUNA》的最終卷呢？"
10027045-209 = "……"
10027045-216 = "結果你還是來到這裡了啊，Meruri同學。"
10027045-221 = "咦……？"

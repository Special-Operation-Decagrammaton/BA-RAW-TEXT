[translation]
10027045-1 = "Episode 4;Secret Harmony"
10027045-8 = "Red Winter Mountain Road"
10027045-9 = "*pant* *pant* I expected bears and rabbits, but attack drones?! Where did they come from?!"
10027045-14 = "[ns1] \"Over the river and through the woods!\"\n[ns2] \"And over the snow we go!\""
10027045-17 = "...I envy your composure, Sensei."
10027045-18 = "You're singing to take your mind off...your frozen fingers?!"
10027045-19 = "You should've said something! Here's a hand warmer."
10027045-30 = "No need to thank me... Cold weather gear is essential to survival here in Red Winter."
10027045-31 = "*sigh* I'm glad we didn't have to go too deep into the mountains. Why are they meeting in such a remote place?"
10027045-32 = "The Knowledge Liberation Front's devotion and passion would be better spent—"
10027045-39 = "Meru! I got the new edition!"
10027045-40 = "Isn't that just a re-print of an old edition?"
10027045-41 = "O-Objectively speaking, yes... But...it's new to us!"
10027045-42 = "You know, since it's the first time we're seeing it...?"
10027045-43 = "Well, don't worry about old or new. The influx of new knowledge enriches the heart either way."
10027045-48 = "..."
10027045-49 = "Nevermind. Forget it."
10027045-55 = "Fanfic Convention"
10027045-57 = "[ns] \"Are we here?\""
10027045-58 = "I think so."
10027045-62 = "There really is a meeting all the way out here..."
10027045-63 = "And look how many books there are. The displays are packed!"
10027045-64 = "[s] \"Everyone here is either reading, buying, or selling...\""
10027045-65 = "Yeah. It reminds me of something I've seen before."
10027045-69 = "[ns] \"Ah! Meru, look. Is this...?\""
10027045-70 = "Yes? What did you find? Wait— Is this what I think it is?"
10027045-75 = "The final volume of \"Luna\"?!"
10027045-76 = "[s] \"Oh, but it has 'Sample' written on it.\""
10027045-77 = "Ah, of course. The full book is probably hidden away somewhere."
10027045-78 = "Oh, customers! Thank you for coming! Please take a look around."
10027045-79 = "(The seller is thanking us for coming? I could get used to this.)"
10027045-83 = "Let's take a look at this, Sensei. It might just be the final volume of \"Luna\" that we've been looking for!"
10027045-93 = "[ns] \"It's been a while since I read a really good book.\""
10027045-95 = "[ns3] \"The two Lunas came together...\"\n[ns4] \"With their strengths combined, they faced their final enemy...\""
10027045-98 = "No, no, no. Wait! Something about this isn't right!"
10027045-99 = "\"Luna\" is supposed to be romance. According to Momiji, there's love, life, punk themes, a band, movies, and...stuff like that. Why are they suddenly in a big battle scene?"
10027045-100 = "[s] \"Does it matter? It's a good story!\""
10027045-101 = "Yes, the layout and story are certainly impressive!"
10027045-102 = "Still... The style doesn't match the themes of \"Luna\". None of it makes sense or fits with the rest of the story."
10027045-103 = "[s5] \"Wait a second... There's another 'Luna' here.\"\n[s6] \"This one is titled 'Luna's Finale.'\""
10027045-110 = "(There's another one?!)"
10027045-111 = "(But that would mean...)"
10027045-117 = "Here. This one is a sample too. Let's read it."
10027045-129 = "[ns] \"In the end, the two Lunas went their separate ways...\""
10027045-130 = "No, no, no. This isn't right!"
10027045-131 = "At least this one was about love, life, punk themes, a band, movies, and...everything it's supposed to be! But \"Luna\" story plots are always about accepting each other's flaws and reconciling!"
10027045-132 = "They just completely threw that out the window and wrote a farewell!"
10027045-133 = "[s] \"Yes, it was such a sad story!\""
10027045-134 = "Yes, the writing was good. It pulled at all the right heartstrings. It was outstanding!"
10027045-135 = "But there's no way that's how the final volume of \"Luna\" is supposed to go! "
10027045-139 = "[ns7] \"Here's another 'Luna'.\"\n[ns8] \"This one is titled 'Lunaless'.\""
10027045-146 = "(Is every final volume of \"Luna\" displayed here...different?)"
10027045-147 = "(I hope not! But based on what I'm seeing, that's the only conclusion I can make!)"
10027045-151 = "Sensei, wait! Don't look at the sample by yourself! Let's read it together!"
10027045-164 = "[ns] \"No one ever found out what happened to the two Lunas, but...\""
10027045-165 = "\"We carry on, starting a new life inspired by their sacrifice...\" That's the ending?"
10027045-166 = "No, I refuse to accept this! It must have a definitive ending! This came completely out of left field. It doesn't fit the rest of the story at all! It's just an epilogue of an epilogue of an epilogue..."
10027045-167 = "[s] \"But wasn't the art really good?!\""
10027045-168 = "Yes, the art was amazing! A few panels even came across as an homage to classical art!"
10027045-169 = "But that's not the point! Pretty panels don't make it a manga. It's about the story—an appropriate ending!"
10027045-170 = "It's like they ignored the part we're most curious about and drew whatever ending they wanted!"
10027045-171 = "[s] \"Look, Meru. There's a copy of 'Luna' over there too...\""
10027045-172 = "Don't bother, Sensei. It'll be just like the rest. I know what this place is, what all of these \"Luna\" volumes are..."
10027045-178 = "Found something you like? You know, we're running a special: a free illustration with any book!"
10027045-179 = "In fact, why don't you take a look at the latest edition? It was just released!"
10027045-180 = "Sales of 'G. Luna' are limited to 1 book per person! Please wait your turn! "
10027045-184 = "..."
10027045-185 = "We're at an official \"Luna\" convention... This is all fanfic!"
10027045-186 = "[s] \"What? Meru, I don't understand.\""
10027045-187 = "So..."
10027045-196 = "[ns9] \"I see! 'Luna' fans organized a massive meetup.\"\n[ns10] \"So all of these 'Luna' endings... It's just what they think might have happened?\""
10027045-199 = "Exactly. Everything here is fan fiction, their idea of what the final volume could have or should have been."
10027045-200 = "Whatever they can dream up, be it fantastical, counter to the original plot, an epilogue of an epilogue... As fan fiction, here at the convention, anything goes."
10027045-201 = "[s] \"So fans recreate their own version of the final volume of 'Luna'...\""
10027045-202 = "Yeah, that's why every single one of them is different and the interpretations stray so far from the original."
10027045-203 = "...Some of them are purely the product of the author's own desire..."
10027045-204 = "[s] \"Isn't desire what inspires amazing creations?\""
10027045-205 = "Ugh. Why are you trying so hard to justify this, Sensei? "
10027045-206 = "...Yes. I suppose that makes sense. Whether clumsy or eloquent, each volume proves one thing above all else."
10027045-207 = "The fans here have a true and undying love for \"Luna\"."
10027045-208 = "But why do they have this event? Why would everyone create their own final volume of \"Luna\"?"
10027045-209 = "..."
10027045-216 = "So... You found your way here after all, Meruri."
10027045-221 = "Huh?"

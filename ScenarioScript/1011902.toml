1011902-1 = "#title;백화요란식 사격술"
1011902-2 = "#place;백화요란 조정위원회 부실"
1011902-3 = "#na;(다음 날, 백귀야행에서의 볼 일이 생각보다 일찍 끝나 백화요란의 부실에 약속보다 빨리 도착했다.)"
1011902-4 = "#all;hide"
1011902-5 = "#wait;2000"
1011902-6 = "#na;(……부실 뒤, 안뜰에서 훈련에 몰두 중인 나구사를 발견했다.)"

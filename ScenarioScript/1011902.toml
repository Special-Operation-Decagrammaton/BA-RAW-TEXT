1011902-72 = "3;나구사ND;01\n#3;a"
1011902-73 = "3;나구사ND;12;어땠어, 선생님? 긴장 탓에 조금 미숙하게 보였으려나……?\n#3;em;[땀]"
1011902-74 = "[s9] \"…………?\"\n[s10] \"……방금 어떻게 한 거야?\""
1011902-75 = "#wait;10"
1011902-76 = "#wait;10"
1011902-77 = "3;나구사ND;02;어떻게 하기는. 적이 다가오는 것을 가정하고 순서대로 적을 처리한 것뿐인데?"
1011902-78 = "[s11] \"빨라서 안 보였어……\"\n[s12] \"내 눈에는 순식간에 4개의 표적지가 파괴된 것처럼 보였는 걸……\""
1011902-79 = "#wait;10"
1011902-80 = "#wait;10"
1011902-81 = "3;나구사ND;99;음, 방금 한 행동을 순차적으로 설명하자면……"
1011902-82 = "3;나구사ND;02;눈 앞의 적이 총을 겨누고 있다는 가정하에, 옆으로 돌아서며 오른쪽을 향해 사격하고, 이어서 겨드랑이 아래로 총구를 겨누어 왼쪽의 적도 제압.\n#3;em;[반응]"
1011902-83 = "3;나구사ND;01;그리고 후방의 적은 그대로 총을 던져 처리한 뒤, 뛰어올라 반동으로 튀어 오른 소총을 집어 공중에서 사격……"
1011902-84 = "3;나구사ND;03;이렇게 하면 네 방향의 적을 동시에 제압할 수 있어.\n#3;em;[반짝]"
1011902-85 = "3;나구사ND;99;물론 실전에서는 적의 성향이나 거리에 따라 순서나 제압 방식이 달라질 수 있겠지만."
1011902-86 = "[s] \"전혀 단순하지 않은데요……\""
1011902-87 = "3;나구사ND;12;선생님도 참, 그렇게 과찬을 할 필요는 없는데.\n#3;em;[///]"
1011902-88 = "3;나구사ND;16;그래도 선생님에게 칭찬을 들으니 조금 기운이 나네."
1011902-89 = "3;나구사ND;03;아직 약속 때까지는 시간이 남았으니까 간단한 몇 가지 예시를 더 보여줄까……?"
1011902-90 = "#all;hide"
1011902-91 = "#na;(……이후, 한동안 나구사가 '백화요란식 사격술'을 훈련하는 모습을 지켜보았다.)"
1011902-92 = "#na;(하지만 그녀의 말과는 달리 나구사가 보여준 사격술은 전혀 '간단'하지 않았다……)"

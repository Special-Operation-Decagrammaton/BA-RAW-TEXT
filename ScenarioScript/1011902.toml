1011902-13 = "3;나구사ND;15;하앗…… 핫!\n#3;a\n#3;greeting"
1011902-14 = "#st;[0,0];instant;1;"
1011902-15 = "#clearST"
1011902-16 = "3;나구사ND;02\n#3;em;[반응]\n#wait;1500"
1011902-17 = "3;나구사ND;02;……어라, 선생님?"
1011902-18 = "3;나구사ND;02;혹시 벌써 약속 시간이 지나 버린 건가?\n#3;em;[땀]"
1011902-19 = "3;나구사ND;06;미안, 훈련에 몰두하느라 그만—"
1011902-20 = "[s1] \"아니, 약속 시간은 아직이야.\"\n[s2] \"내가 일찍 온 것뿐이니 걱정하지 마.\""
1011902-21 = "#wait;10"
1011902-22 = "#wait;10"
1011902-23 = "3;나구사ND;03;그렇구나…… 다행이다."
1011902-24 = "3;나구사ND;12;하지만 훈련을 하느라 흐트러진 모습을 선생님께 보이다니, 조금 부끄럽네.\n#3;em;[///]"
1011902-25 = "3;나구사ND;02;잠깐만 여기서 기다려 줄래? 금방 씻고 올 테니."
1011902-26 = "[s3] \"아니, 그럴 필요는 없어.\"\n[s4] \"내가 약속보다 일찍 온 것이니 예정대로 계속해.\""
1011902-27 = "#wait;10"
1011902-28 = "#wait;10"
1011902-29 = "3;나구사ND;12;하지만……"
1011902-30 = "[s] \"그리고 소문의 '백화요란식 사격술'이 어떤 것인지 궁금하기도 했고.\""
1011902-31 = "3;나구사ND;02;선생님이 백화요란식 사격술에 관심을……?\n#3;em;[?]"
1011902-32 = "3;나구사ND;01;하지만 사격술 훈련이라고 해도 그리 대단할 건 없는걸."
1011902-33 = "3;나구사ND;01;사격과 표적지 교체를 반복하는 단순한 작업일 뿐이고, 옆에서 지켜보는 건 생각 외로 지루할지도 몰라."
1011902-34 = "3;나구사ND;99;……게다가 나는 기존 백화요란 부장들만큼이나 뛰어난 재능의 소유자도 아닌지라.\n#3;em;[속상함]"
1011902-35 = "3;나구사ND;12;오히려 선생님이 내 미숙한 실력을 보고 백화요란식 사격술에 실망할까 봐 조금 겁이 나."
1011902-36 = "[s] \"괜찮아. 어차피 처음부터 기예를 보고 싶어서 부탁한 게 아니었는걸.\""
1011902-37 = "#st;[0,0];instant;1;"
1011902-38 = "#clearST"
1011902-39 = "#wait;1000"
1011902-40 = "[ns5] \"자신이 없더라도 포기하지 않고 노력하는 사람의 뒷모습은—\"\n[ns6] \"어딘가 사람의 시선을 빼앗는 멋진 매력이 있으니까.\""
1011902-41 = "#wait;10"
1011902-42 = "#wait;10"
1011902-43 = "3;나구사ND;12;…그렇게 말해줘서 고마워, 선생님.\n#3;em;[///]"
1011902-44 = "3;나구사ND;99;그럼 간단하게 백화요란 사격술의 기본적인 품새를 시연해 볼게."
1011902-45 = "3;나구사ND;02;다만 유탄에 맞을 수 있어 위험하니까, 뒷모습을 관찰하는 건 추천하지 않아."
1011902-46 = "[s] \"어째서 뒤가 위험한데……?\""
1011902-47 = "3;나구사ND;02;백화요란 분쟁조정위원회는 그 이름처럼 학생들 간의 분쟁을 조정하고, 싸움을 중재하는 임무를 자주 맡아왔기 때문에 1 대 1 대련보다는 1 대 다의 상황에서 임무를 수행할 때가 많아.\n#3;em;[반응]"
1011902-48 = "3;나구사ND;01;하지만 대부분의 시민이 총기를 소유하고 있는 키보토스에서는 조금만 사각이 발생해도 쉽게 피격당할 수 있지."
1011902-49 = "3;나구사ND;01;이를 보완하기 위해 오랜 세월에 걸쳐 보완되어 온 것이 백화요란식 사격술—"
1011902-50 = "3;나구사ND;99;따라서 이 사격술은 회피와 동시에 다수의 적을 저격하는 형태로 발전되어 왔어.\n#3;em;[...]"
1011902-51 = "3;나구사ND;02;춤을 추듯 부드러운 동작으로 적의 사선을 회피하며, 최대의 적에게 사격을 가하는 것이 백화요란식 사격술의 기본이야."
1011902-52 = "3;나구사ND;01;그렇기에 적이 시야가 닿지 않는 등 뒤에 있는 경우도 가정하고 대응하고 있지."
1011902-53 = "[s7] \"뭔가 쿵푸 기술 같은 느낌이네……\"\n[s8] \"뭔가 심오한 느낌이네……\""
1011902-54 = "3;나구사ND;03;쿵푸는 잘 모르지만…… 나중에 산해경에 갈 일이 있다면 그쪽도 배워보고 싶네.\n#3;em;[음표]"
1011902-55 = "#wait;10"
1011902-56 = "3;나구사ND;02;그럼 천천히 시연을 시작할게."
1011902-57 = "3;나구사ND;01;우선은 앞 뒤, 좌우에 있는 사격지를 적이라 가정하고 순서대로 사격해 볼게.\n#3;em;[반응]"
1011902-58 = "3;나구사ND;01;조금 위험하니까 떨어져서 지켜봐 줘."
1011902-59 = "3;나구사ND;99"
1011902-60 = "3;나구사ND;99;후우……"

[translation]
1011902-1 = "ศาสตร์ยิงปืนของเฮียกกะเรียวรัน"
1011902-2 = "ห้องชมรมเฮียกกะเรียวรัน"
1011902-3 = "(วันรุ่งขึ้น คุณครูเสร็จธุระที่เฮียกคิยาโคเร็วกว่าที่คิด จึงไปถึงห้องชมรมเฮียกกะเรียวรันก่อนเวลานัด)"
1011902-6 = "(เมื่อไปถึงคุณครูก็เห็นว่านางุสะกำลังตั้งใจฝึกซ้อมอยู่ที่ลานฝึกซ้อมหลังห้องชมรม...)"
1011902-13 = "ฮะ... ฮึบ!"
1011902-17 = "เอ๋... คุณครู?"
1011902-18 = "เลยเวลานัดแล้วเหรอ?"
1011902-19 = "ขอโทษนะ ฉันมัวแต่จดจ่อกับการฝึกซ้อมน่ะ..."
1011902-20 = "[s1] \"ไม่หรอก ยังไม่ถึงเวลานัดด้วยซ้ำ\"\n[s2] \"ไม่ต้องกังวลนะ ครูแค่มาถึงก่อนเวลานัดน่ะ\""
1011902-23 = "งั้นเองเหรอ... โล่งอกไปทีนะ"
1011902-24 = "แต่ฉันก็อายอยู่นะที่ให้คุณครูเห็นฉันในสภาพกระเซอะกระเซิงจากการซ้อมแบบนี้"
1011902-25 = "คุณครูช่วยรอตรงนี้ก่อนได้มั้ย? ฉันจะไปล้างเนื้อล้างตัวแล้วรีบมาหานะ"
1011902-26 = "[s3] \"ไม่ต้องหรอก ฝึกซ้อมต่อเถอะ\"\n[s4] \"ครูมาก่อนเวลานัดเอง นางุสะฝึกซ้อมต่อเถอะ\""
1011902-29 = "แต่ว่า..."
1011902-30 = "[s] \"ครูก็สงสัยว่า 'ศาสตร์ยิงปืนของเฮียกกะเรียวรัน' ที่ล่ำรือกันเป็นยังไงด้วย\""
1011902-31 = "คุณครูสนใจศาสตร์ยิงปืนของเฮียกกะเรียวรันด้วยเหรอ...?"
1011902-32 = "ถึงจะเรียกว่าเป็นการฝึกซ้อมศาสตร์ยิงปืน แต่มันก็ไม่ได้ยอดเยี่ยมอะไรหรอก"
1011902-33 = "มันเป็นแค่งานง่ายๆ ที่ต้องยิงปืนและเปลี่ยนเป้ายิงไปเรื่อยๆ ฉันว่าการเฝ้าดูอยู่ข้างๆ มันอาจจะน่าเบื่อด้วยซ้ำ"
1011902-34 = "อีกอย่าง... ฉันก็ไม่ได้มีพรสวรรค์เท่ากับเหล่าหัวหน้าของเฮียกกะเรียวรันด้วย"
1011902-35 = "ฉันกลัวว่าความสามารถที่ยังไม่ชำนาญของฉันจะทำให้คุณครูผิดหวังกับศาสตร์ยิงปืนของ#nเฮียกกะเรียวรันมากกว่าน่ะ"
1011902-36 = "[s] \"ไม่เป็นไร ครูไม่ได้จะขอให้โชว์ฝีมืออะไรตั้งแต่แรกอยู่แล้ว\""
1011902-40 = "[ns5] \"ครูอยากเห็นคนที่ไม่ยอมแพ้แม้จะไม่มั่นใจมากกว่า\"\n[ns6] \"ครูว่าคนที่ไม่เก่งแต่พยายามน่ะมีเสน่ห์กว่าอีกนะ\""
1011902-43 = "ขอบคุณที่ช่วยพูดแบบนั้นนะคุณครู..."
1011902-44 = "งั้นฉันจะสาธิตพื้นฐานศาสตร์ยิงปืนของเฮียกกะเรียวรันให้ดูคร่าวๆ แล้วกัน"
1011902-45 = "แต่ฉันไม่แนะนำให้คุณครูดูจากข้างหลังนะ ถ้าอยู่ข้างหลังอาจโดนกระสุนได้น่ะ"
1011902-46 = "[s] \"ทำไมอยู่ข้างหลังถึงอันตรายล่ะ...?\""
1011902-47 = "คณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรันมักได้รับมอบหมายให้ไกล่เกลี่ยความขัดแย้งและการต่อสู้ของ#nนักเรียนตามชื่อชมรม พวกเราแต่ละคนก็เลยต้องจัดการกับเป้าหมายหลายคนมากกว่าจะเป็นการจัดการ#nกับเป้าหมายแบบ 1:1"
1011902-48 = "แต่เราอยู่ในคิโวทอสที่ชาวเมืองส่วนใหญ่พกปืนกัน ต่อให้มีการลั่นไกปืนนิดเดียวเราก็ถูกโจมตีได้แล้ว"
1011902-49 = "เฮียกกะเรียวรันก็เลยคิดค้นและพัฒนาศาสตร์ยิงปืนมานานหลายปี..."
1011902-50 = "จนศาสตร์ยิงปืนของเรามีรูปแบบทั้งที่หลบหลีกและยิงศัตรูหลายๆ คนได้ในเวลาเดียวกัน"
1011902-51 = "พื้นฐานศาสตร์ยิงปืนของเฮียกกะเรียวรันคือการหลบเลี่ยงแนวการยิงของศัตรูและยิงศัตรูให้ได้มาก#nที่สุดด้วยการเคลื่อนไหวที่นุ่มนวลราวกับการเต้นรำ"
1011902-52 = "เราจึงต้องเตรียมพร้อมเผื่อว่าศัตรูจะมาจากข้างหลังที่มองไม่เห็นด้วยน่ะ"
1011902-53 = "[s7] \"ฟังดูเหมือนศาสตร์กังฟูเลยแฮะ...\"\n[s8] \"ฟังดูก็คล้ายๆ ศาสตร์กังฟูอยู่นะ...\""
1011902-54 = "ฉันไม่ค่อยรู้อะไรเกี่ยวกับกังฟูมากนัก... แต่ถ้ามีโอกาสได้ไปซานไห่จิง ฉันก็อยากลองเรียนรู้ดูบ้าง#nเหมือนกัน"
1011902-56 = "เอาละ งั้นฉันจะค่อยๆ สาธิตให้ดูนะ"
1011902-57 = "ฉันจะสมมติว่าเป้าซ้อมยิงที่อยู่ซ้ายขวาหน้าหลังคือศัตรู แล้วยิงตามลำดับให้ดู"
1011902-58 = "มันค่อนข้างอันตราย คุณครูยืนดูตรงนั้น ห้ามขยับไปไหนล่ะ"
1011902-60 = "ฮู่ว..."
1011902-64 = "ฮ่ะ...!"
1011902-73 = "เป็นยังไงบ้าง คุณครู? ฉันดูเงอะงะเพราะประหม่าไปหน่อยหรือเปล่านะ...?"
1011902-74 = "[s9] \"ทำได้ยังไงน่ะ...?\"\n[s10] \"เมื่อกี้ทำได้ยังไงน่ะ...?\""
1011902-77 = "ถามแปลก ฉันก็แค่คิดว่าศัตรูกำลังเข้ามา แล้วก็ยิงศัตรูตามลำดับเท่านั้นเอง"
1011902-78 = "[s11] \"มันเร็วมากจนครูมองไม่ทันเลย...\"\n[s12] \"เหมือนเป้ายิงทั้ง 4 อันถูกยิงพร้อมกันเลย...\""
1011902-81 = "อืม ถ้าจะให้อธิบายสิ่งที่ฉันเพิ่งทำไปตามลำดับละก็..."
1011902-82 = "สมมติว่าศัตรูที่อยู่ข้างหน้ากำลังเล็งปืนมา ให้หันไปด้านข้างแล้วยิงไปทางขวา จากนั้นก็เล็งปากกระบอกปืนไปใต้รักแร้เพื่อปราบศัตรูที่อยู่ด้านซ้าย"
1011902-83 = "ส่วนศัตรูที่อยู่ข้างหลังก็ให้โยนปืนไปจัดการเลย จากนั้นก็คว้าปืนที่เด้งกลับมาแล้วยิงขึ้นไปในอากาศ..."
1011902-84 = "เท่านี้ก็ปราบศัตรูจากทุกทิศทางได้พร้อมกันแล้วละ"
1011902-85 = "แต่แน่นอนว่าในการต่อสู้จริง ลำดับหรือวิธีการอาจเปลี่ยนไปได้ตามระยะทางหรือลักษณะของศัตรู"
1011902-86 = "[s] \"ครูว่ามันดูไม่ง่ายเลยละ...\""
1011902-87 = "คุณครูนี่ละก็ ไม่ต้องชมกันถึงขนาดนั้นก็ได้"
1011902-88 = "แต่พอได้ฟังคำชมของคุณครู ฉันก็มีกำลังใจขึ้นมาหน่อยนะ"
1011902-89 = "เรายังเหลือเวลาอีกนิดหน่อยก่อนถึงเวลานัด งั้นฉันสาธิตการยิงง่ายๆ ให้ดูอีกหน่อยมั้ย...?"
1011902-91 = "(หลังจากนั้นคุณครูก็ได้ดูการฝึกซ้อม 'ศาสตร์ยิงปืนของเฮียกกะเรียวรัน' จากนางุสะอยู่พักใหญ่...)"
1011902-92 = "(ถึงนางุสะจะบอกว่าเป็นการยิง 'ง่ายๆ' แต่สิ่งที่เธอโชว์ให้ดูนั้นไม่ง่ายเลยสักนิด...)"

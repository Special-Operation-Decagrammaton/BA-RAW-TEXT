[translation]
1011902-1 = "百花繚亂式射擊術"
1011902-2 = "百花繚亂紛爭調停委員會．部室"
1011902-3 = "（隔天，由於在百鬼夜行的事情提前結束，在約定時間之前抵達了百花繚亂的部室）"
1011902-6 = "（……在部室後方的中庭，發現了正在專心訓練的名草）"
1011902-13 = "哈啊……哈！"
1011902-17 = "……老師？"
1011902-18 = "已經到約好的時間了嗎？"
1011902-19 = "抱歉，因為太專心訓練，不小心就──"
1011902-20 = "[s1]「沒有，約好的時間還沒到。」\n[s2]「只是我提早來而已，不用擔心。」"
1011902-23 = "這樣啊……那就好。"
1011902-24 = "不過讓老師看見訓練後有點凌亂的樣子，還是有點害羞。"
1011902-25 = "可以請老師稍等嗎？#n我簡單梳洗一下就回來。"
1011902-26 = "[s3]「不用那樣沒關係。」\n[s4]「是我自己提早到的，你就照原定計畫繼續吧。」"
1011902-29 = "可是……"
1011902-30 = "[s]「而且我也對傳聞中的『百花繚亂式射擊術』很好奇。」"
1011902-31 = "老師對百花繚亂式射擊術有興趣嗎……？"
1011902-32 = "不過雖然說是射擊術的訓練，其實也沒什麼了不起的。"
1011902-33 = "說白了只是重複射擊和更換標靶的過程而已。#n在一旁看著可能會覺得很無聊。"
1011902-34 = "……況且我也不是像歷代百花繚亂委員長那樣擁有傑出天賦的人。"
1011902-35 = "所以有點擔心我那不成熟的技術，會讓老師對百花繚亂式射擊術感到失望。"
1011902-36 = "[s]「不必擔心。我本來就不是為了欣賞技術而拜託你的。」"
1011902-40 = "[ns5]「就算沒有自信，仍然不懈努力之人的背影──」\n[ns6]「總是有種能讓人目不轉睛的帥氣魅力。」"
1011902-43 = "……謝謝你願意這麼說，老師。"
1011902-44 = "那我就簡單示範一下百花繚亂式射擊術的基本套路吧。"
1011902-45 = "不過因為有被流彈擊中的風險，所以我不建議老師從背後觀察。"
1011902-46 = "[s]「為什麼背後會有危險……？」"
1011902-47 = "百花繚亂紛爭調停委員會顧名思義，經常負責調解學生間的糾紛與仲裁爭執。#n因此和一對一的對決相比，更常在一對多的情況下執行任務。"
1011902-48 = "而在近乎人手一槍的奇普托斯，哪怕出現一點死角就很容易受到攻擊。"
1011902-49 = "為了補強這點，歷經長年改良而誕生的──就是百花繚亂式射擊術。"
1011902-50 = "這也是它的形式之所以會發展成在迴避的同時狙擊複數敵人的原因。"
1011902-51 = "以舞蹈般的柔和動作閃避敵人的火線，盡可能向最多的敵人進行射擊……#n這就是百花繚亂式射擊術的基本。"
1011902-52 = "所以也會假設敵人出現在背後的情境並加以應對。"
1011902-53 = "[s7]「感覺有點像功夫的技巧呢……」\n[s8]「感覺好深奧……」"
1011902-54 = "我對功夫並不是很了解……#n不過以後如果有機會到山海經去的話，我也想學習那邊的技術呢。"
1011902-56 = "那我就慢慢開始示範囉。"
1011902-57 = "首先假設前後左右的標靶是敵人，依序進行射擊。"
1011902-58 = "因為有點危險，請退後一點觀看。"
1011902-60 = "呼……"
1011902-64 = "……哈！"
1011902-73 = "怎麼樣，老師？#n是不是因為太緊張的關係，看起來有點生疏……？"
1011902-74 = "[s9]「…………？」\n[s10]「……剛才那是怎麼辦到的？」"
1011902-77 = "怎麼辦到的？#n只是假設敵人依序接近並處理而已啊？"
1011902-78 = "[s11]「快到我根本看不清楚……」\n[s12]「在我看來就像瞬間把四個標靶全都破壞了一樣……」"
1011902-81 = "唔嗯，如果要逐步解釋剛才的動作的話……"
1011902-82 = "當正被眼前的敵人舉槍瞄準時，#n我會先側身轉向右邊射擊，接著從腋下瞄準左邊敵人並擊倒。"
1011902-83 = "後方的敵人則是直接以丟出槍隻的方式處理，#n最後再跳起來接住反彈的步槍，在空中完成射擊……"
1011902-84 = "這樣就能同時制伏四個方向的敵人了。"
1011902-85 = "當然實戰中還是會考量敵人的特性或距離，改變順序或作法就是了。"
1011902-86 = "[s]「明明就很不得了嘛……」"
1011902-87 = "老師也真是的，不用那樣誇獎我啦。"
1011902-88 = "不過能聽到老師的稱讚，還是覺得有點振奮。"
1011902-89 = "現在還有一點時間，不如我再示範幾個簡單的例子吧……？"
1011902-91 = "（……之後又觀察了一會名草訓練「百花繚亂式射擊術」的模樣）"
1011902-92 = "（與他所說的不同，名草展現的射擊術根本一點也不「簡單」……）"

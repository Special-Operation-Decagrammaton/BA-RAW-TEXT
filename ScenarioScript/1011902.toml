[translation]
1011902-1 = "Hyakkaryouran Marksmanship"
1011902-2 = "Hyakkaryouran Resolution Council Club Room"
1011902-3 = "The next day, I arrived at the Hyakkaryouran club room early, as my work at Hyakkiyako ended earlier than expected."
1011902-6 = "Behind the club room, in the courtyard, I found Nagusa training hard."
1011902-13 = "Hup... Haa!"
1011902-17 = "...Oh, Sensei."
1011902-18 = "I haven't kept you waiting, have I?"
1011902-19 = "Forgive me. I was immersed in my training."
1011902-20 = "[s1] \"No, I haven't been waiting at all.\"\n[s2] \"You're not late, I'm early.\""
1011902-23 = "I see... Very good, then."
1011902-24 = "Though you've caught me in a bit of a disheveled state..."
1011902-25 = "If you're willing to wait, I could stop and wash up."
1011902-26 = "[s3] \"You don't have to.\"\n[s4] \"No need. Keep doing what you're doing.\""
1011902-29 = "But..."
1011902-30 = "[s] \"I'm curious about the famous 'Hyakkaryouran Marksmanship.'\""
1011902-31 = "Curious, you say?"
1011902-32 = "Well, there's nothing extraordinary about our training techniques."
1011902-33 = "We simply shoot, replace the target, and repeat. It may not be exciting to watch."
1011902-34 = "...Sadly, I lack my predecessors' talent at it."
1011902-35 = "So you may come away disappointed, Sensei."
1011902-36 = "[s] \"It's okay. You don't have to impress me.\""
1011902-40 = "[ns5] \"Working hard at something, even when you're not confident...\"\n[ns6] \"I'm always glad to see that.\""
1011902-43 = "...Thank you for saying so."
1011902-44 = "Very well...allow me to demonstrate our basic forms."
1011902-45 = "Oh, I don't recommend you watch from behind, on account of all the stray bullets."
1011902-46 = "[s] \"Stray bullets?\""
1011902-47 = "Well, as the name implies, the Resolution Council often takes on the task of resolving disputes between students. That often pits a single one of us against a full mob."
1011902-48 = "And of course, this is Kivotos, where most people own guns. A shot could come from anywhere at any time."
1011902-49 = "Hyakkaryouran Marksmanship was developed over the years to counter that."
1011902-50 = "Through its forms, one can evade and snipe multiple enemies at once."
1011902-51 = "Essentially, the goal is to calculate the enemy's line of fire, slip around it, sight each target, and respond with precise, rapid shots."
1011902-52 = "Of course, enemies may come from behind, or from out of sight, so we prepare for that as well."
1011902-53 = "[s7] \"Sounds like kung fu.\"\n[s8] \"That's profound.\""
1011902-54 = "I know little of kung fu, myself...though if I ever have the chance to visit Shanhaijing, I would love to learn more."
1011902-56 = "Now, shall I begin?"
1011902-57 = "Let us suppose that the four targets around me are enemies, and shoot them in order."
1011902-58 = "I do recommend you keep your distance."
1011902-60 = "*inhale*"
1011902-64 = "...Haa!"
1011902-73 = "Was that acceptable? Pardon me if it seemed a bit unpolished. I don't often perform for an audience."
1011902-74 = "[s9] \"*gasp*\"\n[s10] \"...How did you DO that?!\""
1011902-77 = "...\"How?\" I simply shot them as they approached. Why do you ask?"
1011902-78 = "[s11] \"You were faster than the eye.\"\n[s12] \"I just blinked and the targets exploded.\""
1011902-81 = "Well, to explain step by step..."
1011902-82 = "The enemy at twelve o'clock moved first, so I sidestepped and fired at three o'clock, then turned and fired under my armpit to neutralize the enemy at nine o'clock."
1011902-83 = "I then executed a quarter turn and threw my gun, neutralizing the enemy behind me. That caused them to fumble their rifle, so I simply flipped into the air, caught it, shot the enemy at twelve o'clock while upside down, then landed."
1011902-84 = "Four enemies neutralized."
1011902-85 = "Of course, that method only works for that particular formation. There are other techniques, depending on the enemy's number and position."
1011902-86 = "[s] \"...And you call that 'simple.'\""
1011902-87 = "Oh, no need to flatter me, Sensei."
1011902-88 = "Though your compliment does give me a certain...well, rush, one might say."
1011902-89 = "We have time, if you'd like to see a few more examples."
1011902-91 = "I continued to watch Nagusa practice basic Hyakkaryouran Marksmanship."
1011902-92 = "None of which was basic at all."

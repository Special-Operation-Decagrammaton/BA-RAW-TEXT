[translation]
32020-1 = "第2話;修女會"
32020-2 = "啊，老師！"
32020-3 = "[s] 「抱歉，稍微遲到了呢。」"
32020-4 = "不會不會……！啊，話說回來請看！這是剛剛模擬測驗的結果！"
32020-5 = "[s] 看測驗的結果"
32020-7 = "第2次補課部模擬測驗，結果──"
32020-9 = "花子──8分[FF6666]（不合格）[-]"
32020-11 = "梓──58分[FF6666]（不合格）[-]"
32020-13 = "小春──49分[FF6666]（不合格）[-]"
32020-15 = "日步美──64分[007eff]（合格）[-]"
32020-17 = "……就差一點點。"
32020-18 = "沒錯！這次真的就差一點點了！梓醬，真是可惜……"
32020-19 = "看，看到了嗎？日步美，我也進步了不少唷！？"
32020-20 = "嗯，我看到了哦！#n小春醬從之前的15分一下就進步到了49分……是進步程度最大的呢，真厲害！"
32020-21 = "哼，哼哼！我就說吧，我只是在隱藏實力而已。"
32020-22 = "真棒呢……！"
32020-23 = "然後是……啊，啊嗚……花，花子醬……"
32020-24 = "嗯？日步美醬，為什麼要突然說話這麼小聲呢？"
32020-25 = "一開始考2分，接下來是4分，這次是8分唷？"
32020-29 = "把它當作是數列的話，只要再考三次的話應該就會及格的♪"
32020-30 = "啊，啊嗚……話，話是這麼說沒錯啦……"
32020-31 = "[s] 「嗯，大家都有努力呢。」"
32020-32 = "嗯！照這個狀態的話，或許會比預想中更快達到目標也說不定……！"
32020-33 = "我一定會成功達成任務，拿到那個可愛的小傢伙給你們看的。#n這就是我在這裡的理由和戰鬥的目的。"
32020-34 = "梓，梓醬！？我們在這裡的理由只有考試和唸書，目的是避免留級唷！？#n什麼時候變成那樣了……！？"
32020-35 = "還有那種事啊。那就順便一起做吧。"
32020-36 = "「順便」！？只是順便嗎！？#n啊，啊嗚……雖，雖然作為Momo好友的粉絲我是很高興啦……"
32020-42 = "……？"
32020-43 = "哎呀，好像有誰來了唷？"
32020-44 = "好像是呢……來這裡是有什麼事──"
32020-45 = "打，打擾了……！"
32020-46 = "哎呀，這個聲音是……"
32020-47 = "是入侵者嗎？沒問題，我已經準備好了。"
32020-48 = "梓醬，準備是指……？"
32020-52 = "呀啊！？"
32020-53 = "是地雷。只要感應到有人入侵就會啟動。"
32020-54 = "梓醬！？"
32020-55 = "這，這個是……？咦，啊，這裡也……！？"
32020-61 = "呀啊啊啊！？"
32020-62 = "逃也沒用的。我已經預測過逃跑的方向，在那邊也做好準備了。"
32020-63 = "梓醬！！？！？"
32020-65 = "別館．入口"
32020-66 = "咳……咳咳……"
32020-67 = "你，你還好吧……！？有，有沒有受傷……？"
32020-68 = "希，希望今天平靜跟安寧也……咳咳……和各位，咳，同在……"
32020-69 = "請先擔心自己的安寧吧！？"
32020-70 = "咦，仔細一看那個服裝，是修女會的……？"
32020-71 = "哎呀，這不是瑪麗醬嗎？"
32020-72 = "啊，花，花子同學……"
32020-74 = "來，請喝點水。"
32020-75 = "謝，謝謝。"
32020-79 = "（咕嚕咕嚕……）"
32020-80 = "……呼。嚇到我了，才剛進來就好像有什麼啟動了……"
32020-84 = "梓醬……"
32020-95 = "……"
32020-96 = "抱歉，我還以為是受到了什麼襲擊。"
32020-97 = "呃，呃……？"
32020-98 = "話，話說回來，為什麼修女會的人會來這裡？"
32020-99 = "啊，那是因為……"
32020-100 = "聽說補課部的各位在這裡……雖然不知道花子同學也在這裡就是了……"
32020-102 = "……因為我的成績也不好呀。"
32020-103 = "是……這樣啊。嗯……"
32020-104 = "花子，你認識他嗎？"
32020-105 = "啊哈哈……該說是有點緣分嗎。"
32020-106 = "瑪麗醬……好像不是來找我的呢。#n來補課部有什麼事嗎？"
32020-107 = "啊，是的。"
32020-108 = "今天是為了找補課部的白洲梓同學而來的。#n向其他學生打聽之後，聽說你在這裡。"
32020-109 = "我？"
32020-110 = "是的。其實我是替之前受梓同學幫助的學生表達感謝而來的。#n因為一些原因，才會這樣由我代替他來。"
32020-111 = "……？"
32020-112 = "感謝……？"
32020-113 = "有位同學受到了同學的霸凌……聽說某天突然被叫到了大樓的背面。"
32020-115 = "發，發生了這種事……！？"
32020-116 = "霸凌……！？"
32020-117 = "……確實有聽過這種事。#n而且那些人十分狡猾，總是用一些陰險的手法，所以不太會被發現呢。"
32020-121 = "我們也是在那位同學找我們商量後才知道的……"
32020-122 = "於是在被叫出去的那天……偶然經過那裡的梓同學幫助了他。"
32020-123 = "是，是這樣嗎？"
32020-124 = "……好像有這麼回事。#n不過我只是看不慣仗著自己人多就欺負弱小的行為而已。"
32020-125 = "之後被梓同學惹怒的那些人跑去聯絡實現正義部……#n最後才會發展成實現正義部和梓同學之間的戰鬥……"
32020-126 = "！？"
32020-127 = "後來梓同學佔領了催淚彈的倉庫，#n使用陷阱和實現正義部的成員們持續戰鬥了3個小時以上……"
32020-128 = "就是那個時候！？"
32020-130 = "哼，有人挑釁我就應戰。#n那時候要不是彈藥用光了，我還能擊倒更多人。"
32020-131 = "啊，啊嗚……"
32020-132 = "之後那位同學向我們報告了這件事，說是想要感謝梓同學……#n但是在學園裡找不到你，所以才會到這裡來。"
32020-133 = "……這樣啊。"
32020-134 = "其實也沒做什麼特別值得感謝的事。畢竟我最後也被抓住了。"
32020-135 = "我覺得這跟後半的事好像沒什麼關係……"
32020-136 = "而且雖然遇到那種事很可憐，也不能就這樣一直被他們欺負下去。#n就算只是徒勞也不應該停止反抗才對。"
32020-137 = "……或許是這樣呢。嗯，我會向那位同學轉達的。"
32020-138 = "……"
32020-139 = "梓同學是信奉暴力的冰之魔女……雖然有這種傳聞，果然也就只是傳聞而已呢。"
32020-143 = "呵呵。雖然是這樣沒錯，但梓醬意外的有點像「冰之魔女」對吧？#n你看，其他人就有點難看懂他的表情。"
32020-148 = "花子同學……"
32020-149 = "……瑪麗醬看起來很有精神真是太好了。"
32020-150 = "嗯，我……但是……"
32020-151 = "我送你到玄關吧。來，一起走吧。"
32020-152 = "啊，是……"
32020-153 = "那，那麼，打擾大家了。老師也是，突然來訪不好意思。那麼先告辭了。"
32020-154 = "[s] 「嗯，注意安全哦。」"
32020-160 = "（就這樣，一天迎來了尾聲）"
32020-162 = "來，我們開始洗衣服吧。"
32020-163 = "請大家把制服、內衣和襪子，需要洗的東西全都放進這個籃子裡哦。"
32020-164 = "謝謝，麻煩你了。"
32020-165 = "嗯……嗯！？內，內衣也要嗎！？"
32020-166 = "為什麼！？內衣各自洗就好了吧！？"
32020-167 = "一起洗的話可以省水跟清潔劑。花子說的沒錯。"
32020-168 = "啊，啊嗚……那，那就麻煩你了……"
32020-169 = "咦……是，是我很奇怪嗎……？"
32020-174 = "唔呵呵♡謝謝。"
32020-175 = "啊，老師呢……？"
32020-176 = "[s] 「我的就不用了。」"
32020-177 = "哎呀，是這樣啊。那我就去洗衣機那裡囉。"
32020-178 = "要是沒意外的話，應該明天早上就會乾了才對♪"
32020-183 = "那麼，差不多到該睡覺的時間了。今天各位也辛苦了。"
32020-184 = "……嗯。"
32020-191 = "老師，我有些話想說……那個，是有關花子同學的事……"
32020-192 = "[s] 安靜地點頭"
32020-195 = "老師的房間"
32020-197 = "……打擾了。"
32020-198 = "[ns1] 站起來\n[ns2] 打開門"
32020-202 = "晚安呀，老師。"
32020-206 = "[ns] 「……！？」"
32020-207 = "呵呵，竟然這麼簡單就打開了♡真是不小心呢♡"
32020-208 = "[s3] 「為，為什麼花子會來這裡……！？」\n[s4] 「而且，為什麼穿著泳裝……！？」"
32020-211 = "啊啊，關於這個請別在意，這是睡衣。"
32020-212 = "[s] 「說泳裝是睡衣怎麼可能不在意……」"
32020-213 = "唔呵呵。比起這個，老師，我有些事想跟您商量……"
32020-214 = "其實……"
32020-219 = "……是關於梓醬的事。"
32020-220 = "[s] 「梓……？」"
32020-224 = "打，打擾了……老師你在嗎……？"
32020-228 = "來得比昨天還晚不好意思，其實……"
32020-232 = "……咦。"
32020-233 = "……哎呀。"
32020-234 = "[s] 「…………」"
32020-235 = "……"
32020-237 = "抱，抱歉打擾了！？對，對不起！我不知道那種事就……！#n我，我真的完全不知道真的不知道哦！？咦，是從什麼時候開始的！？"
32020-238 = "……日步美醬，你剛才說了「來得比昨天還晚」對吧！？#n也就是說你昨天也來過對吧！？我沒說錯吧！？"
32020-240 = "對不起對不起對不起！？我等等再來……是不行的對吧！？#n要怎麼辦才好呢，今晚就放棄比較好嗎！？#n我不知道真是抱歉進到房間裡真是抱歉破壞了氣氛真是抱歉……！？"
32020-241 = "先等一下日步美醬，請你講清楚說明白！#n昨晚你們兩個做了什麼，今晚又約好要做什麼！？#n請好好說明，不，乾脆直接在我面前實際重現一下……！！"
32020-242 = "[s] 「算我拜託你們了，先冷靜一下……」"
32020-244 = "（之後總算是冷靜下來好好說清楚，解開了彼此的誤會）"
32020-245 = "（另外花子被日步美教訓了一頓之後，乖乖去換衣服了）"
32020-247 = "下一話;深夜密會"

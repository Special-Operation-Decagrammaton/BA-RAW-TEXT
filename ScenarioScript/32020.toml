32020-244 = "(อธิบายเรื่องที่เกิดขึ้นอย่างละเอียดจนทั้งสองคนหายเข้าใจผิด)"
32020-245 = "(และฮานาโกะก็โดนฮิฟุมิดุจนต้องไปเปลี่ยนเสื้อผ้ามา)"
32020-247 = "ตอนต่อไป;การประชุมลับ"

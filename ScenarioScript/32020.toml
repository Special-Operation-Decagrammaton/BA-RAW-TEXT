[translation]
32020-1 = "Episode 2;The Sisterhood"
32020-2 = "Oh, there you are, Sensei!"
32020-3 = "[s] \"Sorry I'm late. Something came up.\""
32020-4 = "Don't worry about it. More importantly, take a look! They're our latest mock exam scores!"
32020-5 = "[s] Check the test results."
32020-7 = "[b]Second Make-Up Work Club Mock Exam Results[/b]"
32020-9 = "[b]Hanako: 8 Points [FF6666](Fail)[-][/b]"
32020-11 = "[b]Azusa: 58 Points [FF6666](Fail)[-][/b]"
32020-13 = "[b]Koharu: 49 Points [FF6666](Fail)[-][/b]"
32020-15 = "[b]Hifumi: 64 Points [007eff](Pass)[-][/b]"
32020-17 = "Hmm. It was very close."
32020-18 = "Yeah, you're doing a lot better! Almost there, Azusa!"
32020-19 = "H-Hey, she's not the only one who improved. My score went up a lot too."
32020-20 = "I know! You scored a 15 on your last exam, but now you're up to 49. That's the biggest jump out of all of us!"
32020-21 = "Of course I did! I told you I've been holding back all this time."
32020-22 = "Yeah! Keep it up! You're doing great!"
32020-23 = "U-Um... Hanako?"
32020-24 = "Heehee. What's wrong, Hifumi? Why so sheepish?"
32020-25 = "I scored a 2 on our first real exam. Then I scored a 4 on our first mock exam. Now I've scored an 8."
32020-29 = "That means I'm steadily doubling my scores each time. At this rate, I just need to take three more tests and I should be passing too, right?"
32020-30 = "Well...I suppose so, technically."
32020-31 = "[s] \"You're all doing great.\""
32020-32 = "That's right. We'll all be above passing sooner than I thought if we keep this up."
32020-33 = "I will not stop until I complete my mission and win those cute things. No matter the cost."
32020-34 = "Y-You remember the real goal is to avoid failing, right?! The rewards were just incentives."
32020-35 = "That's now my secondary objective that I don't mind completing along the way."
32020-36 = "Secondary?! I mean, I respect it as a fellow Momo Friends fan, but still..."
32020-42 = "Huh?"
32020-43 = "Seems we have a visitor."
32020-44 = "Y-Yeah, but who would come all the way here to visit us? "
32020-45 = "U-Um... Excuse me!"
32020-46 = "Oh. That voice sounds like..."
32020-47 = "...an intruder. Good thing I've taken measures."
32020-48 = "What are you talking about, Azu—"
32020-52 = "Ahhh!"
32020-53 = "I set explosive traps to stop intruders."
32020-54 = "Azusa..."
32020-55 = "How many did you set? I hope there aren't mo—"
32020-61 = "Ahhh!"
32020-62 = "There's nowhere to run. Naturally, I laid traps along an intruder's likely escape route."
32020-63 = "Azusa!!!"
32020-65 = "Annex Entrance"
32020-66 = "*cough* *cough*"
32020-67 = "A-Are you okay?! You're not hurt, are you?"
32020-68 = "May peace and *cough* happiness be with you today. *cough*"
32020-69 = "There's nothing peaceful or happy about this situation! "
32020-70 = "Wait, I know that uniform... Are you from the Sisterhood?"
32020-71 = "I thought that sounded like you, Mari."
32020-72 = "H-Hanako..."
32020-74 = "Here. It's water."
32020-75 = "Thank you. "
32020-79 = "*gulp* *gulp*"
32020-80 = "Phew. That really caught me off guard. What was that just now?"
32020-84 = "Azusa..."
32020-95 = "Um... "
32020-96 = "I'm sorry. I thought it was an enemy ambush."
32020-97 = "M-Me? An enemy? "
32020-98 = "So what brings someone from the Sisterhood here?"
32020-99 = "Right. About that..."
32020-100 = "I was told this is where I could find the Make-Up Work Club, but I didn't expect to run into Hanako here."
32020-102 = "It just so happens my grades are terrible."
32020-103 = "Oh. So they are... "
32020-104 = "You know her?"
32020-105 = "Haha. You could say we're acquainted."
32020-106 = "If you're not here for me, then what are you here for?"
32020-107 = "Right. Of course."
32020-108 = "I've been looking for Shirasu Azusa."
32020-109 = "Me? "
32020-110 = "Yes. There's a student you rescued recently that wanted to reach out to express her gratitude."
32020-111 = "Rescued?"
32020-112 = "Gratitude?"
32020-113 = "Yes. Azusa helped a student that was being constantly bullied by her classmates. Apparently, she was called to the back of a secluded building and harassed on the day in question."
32020-115 = "Someone was harassing the poor girl?!"
32020-116 = "What?!"
32020-117 = "These things happen, sadly. You may not hear about it often, but that's because perpetrators intimidate and coerce their victims into silence."
32020-121 = "We only found out ourselves when the student came to us asking for advice."
32020-122 = "She told us you rescued her one day when you just happened to be passing by."
32020-123 = "She did?"
32020-124 = "I suppose that did happen. I don't enjoy watching gangs prey on the weak."
32020-125 = "As I understand it, one of the attackers you suppressed retaliated by reporting you to the Justice Task Force, which escalated to you and the Task Force engaging in a firefight."
32020-126 = "...?!"
32020-127 = "At which point you occupied a tear gas warehouse and held the Justice Task Force off for three whole hours with an assortment of traps."
32020-128 = "That's how all of that started?!"
32020-130 = "I never retreat from a fight. I could have defeated at least three more of your comrades had I not run out of ammunition."
32020-131 = "You have to be kidding me..."
32020-132 = "That student came to us wanting to thank you, but since you couldn't be found at the academy...I ended up having to come here."
32020-133 = "So that's it. "
32020-134 = "Her gratitude is undeserved. I ended up being captured in the end."
32020-135 = "I don't think that's what's important..."
32020-136 = "But you shouldn't allow yourself to be bullied. Even if everything is meaningless, that is no reason to give up."
32020-137 = "Wise words. I'll pass your message along to her."
32020-138 = "..."
32020-139 = "People say that you're nothing but a violent ice queen, but that couldn't be further from the truth after all."
32020-143 = "That's so sweet, but I wouldn't say those rumors are completely unfounded. Azusa is rather rough around the edges."
32020-148 = "Hanako..."
32020-149 = "Mari. I'm glad to see you're doing well."
32020-150 = "I am, however..."
32020-151 = "I'll show you the way out. Come on—this way."
32020-152 = "Oh. Okay..."
32020-153 = "I'll be going now. I'm sorry for interrupting, Sensei."
32020-154 = "[s] \"Take care.\""
32020-160 = "The day's studies came to an end soon after that."
32020-162 = "Listen up, everyone! Tonight is laundry night!"
32020-163 = "Put your uniforms, underwear, socks, and anything else you need to have washed into the basket."
32020-164 = "Sure. Thank you for offering."
32020-165 = "You want our underwear too?!"
32020-166 = "I can wash it myself, thank you very much!"
32020-167 = "But doing all of our laundry at once saves water and detergent. Hanako is being efficient. Fall in line. Now."
32020-168 = "Fine... Here you go."
32020-169 = "*sigh*"
32020-174 = "Why thank you. ♥ "
32020-175 = "What about you, Sensei? Anything you need washed?"
32020-176 = "[s] \"Thanks, but I'm good.\""
32020-177 = "Aw, okay. I'm off to the laundry room, then."
32020-178 = "Everything here should be dry by tomorrow morning."
32020-183 = "We should be heading to bed. Good night, everyone."
32020-184 = "'Night."
32020-191 = "Sensei. Can I talk to you later? It's about Hanako."
32020-192 = "[s] Nod."
32020-195 = "Sensei's Room"
32020-197 = "Are you there, Sensei?"
32020-198 = "[ns1] \"(That must be Hifumi.)\"\n[ns2] Open the door."
32020-202 = "Hi, Sensei. It's me."
32020-206 = "[ns] \"...?!\""
32020-207 = "That was a lot easier than I was expecting. You really wanted me to come in, didn't you? ♥"
32020-208 = "[s3] \"What are you doing here?!\"\n[s4] \"Why are you in your swimsuit?!\""
32020-211 = "Why do you sound so uncomfortable? These are just my pajamas."
32020-212 = "[s] \"Since when does a swimsuit pass for pajamas?\""
32020-213 = "Heehee. You worry too much. Anyway, I have an important reason for coming here."
32020-214 = "I wanted to talk to you."
32020-219 = "It's about Azusa."
32020-220 = "[s] \"Azusa?\""
32020-224 = "Are you there, Sensei? It's me."
32020-228 = "Sorry I took so long. I know I'm here later than last night..."
32020-232 = "Oh."
32020-233 = "..."
32020-234 = "[s] \"...\""
32020-235 = "..."
32020-237 = "I-I'm so sorry! I didn't mean to interrupt! I had no idea the two of you were—I mean, how long has this been going on?!"
32020-238 = "Hifumi? Did you just say you were in Sensei's room last night too?! How long has THIS been going on?!"
32020-240 = "I-I'm sorry! I never would have imposed had I known! I'll c-come back later, Sensei. Wait, no! I should probably leave you two alone for tonight... I'm sorry, I'll talk to you tomorrow, and...!"
32020-241 = "Where do you think you're going? I want to know what's been going on between you two—all the juicy details. Or better yet, a reenactment would do just fine too."
32020-242 = "[s] \"Make it stop... Please make it stop...\""
32020-244 = "We eventually managed to clear up the misunderstanding after several more minutes."
32020-245 = "Hifumi yelled at Hanako to go change out of her swimsuit as well."
32020-247 = "Next Episode;Secret Society"

32020-241 = "จะไปไหนล่ะคะ? อยู่กันก่อนสิ ฉันต้องรู้รายละเอียดให้ได้เลยค่ะ! อธิบายมาเลยนะคะว่าทั้งคู่ทำอะไรกันอยู่ ไม่สิ ถ้าเป็นไปได้ก็ทำให้ฉันดูต่อหน้าเลยก็ได้ค่ะ"

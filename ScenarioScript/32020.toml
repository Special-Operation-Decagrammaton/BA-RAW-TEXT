[translation]
32020-1 = "第2話;シスターフッド"
32020-2 = "あ、先生！"
32020-3 = "[s] \"ごめんね、ちょっと遅くなっちゃった。\""
32020-4 = "いえいえ……！あ、ところで見てください！こちら、ちょうど先ほど受けた模試の結果です！"
32020-5 = "[s] テストの結果を見る。"
32020-7 = "第2次補習授業部模試、結果――"
32020-9 = "ハナコ―8点[FF6666]（不合格）[-]"
32020-11 = "アズサ―58点[FF6666]（不合格）[-]"
32020-13 = "コハル―49点[FF6666]（不合格）[-]"
32020-15 = "ヒフミ―64点[007eff]（合格）[-]"
32020-17 = "……紙一重の差だった。"
32020-18 = "はい！今回は本当に紙一重でした！アズサちゃん、すっごく惜しかったです……！"
32020-19 = "み、見た！？ヒフミ、私も結構上がったよ！？"
32020-20 = "はい、しかと見ました！コハルちゃん、前回は15点だったのに急に49点まで……伸びしろでは一番です、すごいです！"
32020-21 = "ふっ、ふふーん！言ったじゃない、本当の実力は隠してたんだって。"
32020-22 = "素晴らしいです……！"
32020-23 = "そして、えっと……は、ハナコちゃんは……。"
32020-24 = "あら？ヒフミちゃん、どうしてそんなに声量が下がってしまうのですか？"
32020-25 = "最初の試験が2点、次の模試が4点、今回は8点ですよ？"
32020-29 = "これは数列として考えたら、あと3回受ければきっと合格圏内に届くはずです♪"
32020-30 = "そ、そう考えたらそうかもしれませんが……。"
32020-31 = "[s] \"うん、みんな頑張ったね。\""
32020-32 = "はい！この調子でしたら、思ったより早く目標に届くかもしれません……！"
32020-33 = "必ずや任務を成功させて、あの可愛いやつを受け取ってみせる。それが、私がここにいる理由であり戦う目的だ。"
32020-34 = "あ、アズサちゃん！？私たちがここにいる理由は試験と勉強であって、目的は落第を免れることですよ！？いつの間に変わって……！？"
32020-35 = "そんなこともあったな。ついでにそれもやっておこう。"
32020-36 = "「ついで」！？ついでなんですか！？あうぅ……も、モモフレンズファンとしては嬉しくもあるのですが……。"
32020-42 = "……？"
32020-43 = "あら、どなたかいらっしゃったみたいですね？"
32020-44 = "そうですね……この合宿所に、どんな用事で――"
32020-45 = "し、失礼いたします……！"
32020-46 = "あら、この声は……"
32020-47 = "侵入者か。大丈夫、準備はできてる。"
32020-48 = "アズサちゃん、準備って……？"
32020-52 = "きゃぁっ！？"
32020-53 = "ブービートラップ。誰かの侵入を感知したら起動するようにしてある。"
32020-54 = "アズサちゃん！？"
32020-55 = "こ、これは一体……？え、あ、こっちにも……！？"
32020-61 = "きゃぁぁぁっっ！？"
32020-62 = "逃げても無駄だ。逃げる方向を予測して、その先にもちゃんと仕掛けてある。"
32020-63 = "アズサちゃんっっ！！？！？"
32020-65 = "合宿所・入口"
32020-66 = "けほっ……けほっけほっ……。"
32020-67 = "だ、大丈夫ですか……！？け、怪我とかは……？"
32020-68 = "きょ、今日も平和と、安寧が……けほっ、けほっ……あなたと共に、けほっ、ありますように……。"
32020-69 = "まずご自分の安寧を心配してください！？"
32020-70 = "あれ、よく見たらその服装、シスターフッドの……？"
32020-71 = "あら、マリーちゃんじゃないですか？"
32020-72 = "あ、は、ハナコさん……。"
32020-74 = "はい、お水。"
32020-75 = "あ、ありがとうございます。"
32020-79 = "（こくこく……）"
32020-80 = "……ふぅ。びっくりしました、入った途端に何かが作動して……"
32020-84 = "アズサちゃん……。"
32020-95 = "……。 "
32020-96 = "ごめん、てっきり襲撃かと。"
32020-97 = "え、えぇっと……？"
32020-98 = "と、ところでどうして、シスターフッドの方がこんなところに……？"
32020-99 = "あ、それはその……。"
32020-100 = "こちらに補習授業部の方々がいらっしゃると聞きまして……ただ、ハナコさんがここにいらっしゃるとは存じておりませんでしたが……。"
32020-102 = "……私も、成績が良くないので。"
32020-103 = "そう……でしたか。はい……。"
32020-104 = "ハナコ、知り合いなの？"
32020-105 = "あはは……少しだけご縁があって、と言いますか。"
32020-106 = "マリーちゃんは、私を訪ねて……というわけでも無さそうですね。補習授業部に、どういった用事で？"
32020-107 = "あ、はい。"
32020-108 = "本日は、補習授業部の[ruby=しらす]白洲[/ruby]アズサさんを訪ねてこちらに参りました。伺ったところ、ここにいらっしゃると聞きまして。"
32020-109 = "私？"
32020-110 = "はい。実は、先日アズサさんが助けてくださった生徒の方から、感謝をお伝えしたいとのことでして。諸事情ありまして、こうして代わりに。"
32020-111 = "……？"
32020-112 = "感謝……？"
32020-113 = "クラスメイトの方々から、いじめを受けてしまっていた方がいらっしゃいまして……その日もどうやら突然、建物の裏手に呼び出されてしまったのだと聞きました。"
32020-115 = "そ、そんなことが……！？"
32020-116 = "いじめ……っ！？"
32020-117 = "……まあ、聞かない話ではありませんね。みなさん狡猾に、それに陰湿な形で行うせいで、あまり表には出てきにくいですが。"
32020-121 = "私たちも、その方から相談を受けてようやく知ったのですが……。"
32020-122 = "そうして呼び出されてしまった日……そこを偶然通り過ぎたアズサさんが、彼女を助けてくださったとのことで。"
32020-123 = "そ、そうなんだ？"
32020-124 = "……そういえば、そんなこともあったな。ただ、数に物を言わせて弱い対象を虐げる行為が目障りだっただけだ。"
32020-125 = "そしてその後アズサさんに怒られた方が、正義実現委員会と連絡を取られて……どこで情報が歪曲されたのか分かりませんが、何やら正義実現委員会とアズサさんの間でそれなりの規模の戦闘に発展してしまったとか……。"
32020-126 = "！？"
32020-127 = "そうしてアズサさんが催涙弾の倉庫を占拠し、正義実現委員たちを相手にトラップを駆使して、3時間以上戦い続けたと……。"
32020-128 = "それってあの時の！？"
32020-130 = "何がどうあれ、売られた喧嘩は買う。あの時も弾薬さえ切れてなければもっと長く戦えたし、あれ以上に道連れも増やせたのに。"
32020-131 = "あ、あうぅ……。"
32020-132 = "それで、その方が報告も兼ねて私たちの元を訪れてくださり、アズサさんに感謝をしたいと……ただ学園では見つけられずに、ここに辿り着いたという次第です。"
32020-133 = "……そうか。"
32020-134 = "別に、特別感謝されるようなことじゃない。結局私も最終的に捕まったわけだし。"
32020-135 = "後半は特に関係無いと思いますが……。"
32020-136 = "それにあの事態は気の毒だけど、いつまでも虐げられてるだけじゃダメ。それがたとえ虚しいことであっても、抵抗し続けることを止めるべきじゃない。"
32020-137 = "……そうかもしれませんね。はい、あの方にもそう伝えておきます。"
32020-138 = "……。"
32020-139 = "アズサさんは、暴力を信奉する氷の魔女……だなんて噂がありましたが、やはり噂は噂ですね。"
32020-143 = "ふふっ。それはそうですが、アズサちゃんには意外と「氷の魔女」らしいところもありますよ？ほら、他の方からするとちょっとだけ表情も読みにくいですし。"
32020-148 = "ハナコさん……。"
32020-149 = "……マリーちゃんが元気そうでよかったです。"
32020-150 = "はい、私は……ですが……。"
32020-151 = "玄関まで送りますね。さあ、一緒に行きましょう。"
32020-152 = "あ、はい……。"
32020-153 = "で、ではみなさん、お邪魔いたしました。先生も、急に訪ねてきてしまってごめんなさい。それでは、また。"
32020-154 = "[s] \"うん、気をつけてね。\""
32020-160 = "（そうやって、一日が終わろうとしていた。）"
32020-162 = "さあ、では洗濯を始めましょうか。"
32020-163 = "みなさん制服や下着や靴下など、洗うものは全部このかごに入れてくださいね。"
32020-164 = "ありがとう、よろしく。"
32020-165 = "はい……はいっ！？し、下着もですか！？"
32020-166 = "なんで！？下着は各自で良いでしょ！？"
32020-167 = "洗濯はまとめて一気にした方が水と洗剤の節約になる。ハナコの言ってることは間違ってない。"
32020-168 = "あ、あうぅ……で、ではお願いします……。"
32020-169 = "えぇ……わ、私がおかしいの……？"
32020-174 = "はい、ありがとうございます♡"
32020-175 = "あ、先生は……？"
32020-176 = "[s] \"遠慮しておくね。\""
32020-177 = "あら、そうですか？では、洗濯機回してきますね。"
32020-178 = "何も問題が無ければ、きっと明日の朝までには乾かすところまで終わるはずです♪"
32020-183 = "じゃあ、そろそろ寝る準備をしよう。今日もお疲れ様。"
32020-184 = "……うん。"
32020-191 = "あの、先生ちょっとお話が……後でお部屋に行って良いですか……？その、ハナコちゃんのことで……。"
32020-192 = "[s] 静かに頷く。"
32020-195 = "先生の部屋"
32020-197 = "……失礼します。"
32020-198 = "[ns1] 腰を上げる。\n[ns2] ドアを開ける。"
32020-202 = "こんばんは、先生。"
32020-206 = "[ns] \"……！？\""
32020-207 = "ふふっ、こんなに簡単に開けちゃうなんて♡不用心ですねぇ♡"
32020-208 = "[s3] \"ど、どうしてハナコがここに……！？\"\n[s4] \"それに、何で水着で……！？\""
32020-211 = "ああ、これについてはお気になさらず。パジャマなので。"
32020-212 = "[s] \"パジャマが水着って言われて気にしないわけには……。\""
32020-213 = "うふふっ。それより先生、ちょっと相談したいことがありまして……。"
32020-214 = "実は……"
32020-219 = "……アズサちゃんのことなのですが。"
32020-220 = "[s] \"アズサ……？\""
32020-224 = "し、失礼します……先生、いらっしゃいますか……？"
32020-228 = "昨日より遅い時間になってしまってごめんなさい、実は……"
32020-232 = "……え。"
32020-233 = "……あら。"
32020-234 = "[s] \"…………。\""
32020-235 = "……。"
32020-237 = "本当に失礼しましたぁ！？ご、ごめんなさい！私、そんなこととは知らずに……！ぜ、全然知らなかったんです本当です！？え、一体いつから！？"
32020-238 = "……ヒフミちゃん、今「昨日より遅い時間」って言いましたね！？つまり昨晩も来たということですよね！？そうなんですよね！？"
32020-240 = "ごめんなさいごめんなさいごめんなさい！？また後で、はダメですよね！？どうすれば良いですか、今晩はやめた方が良いですか！？知らなくてごめんなさい間に入ってごめんなさい空気壊してごめんなさいっ……！？"
32020-241 = "待ってくださいヒフミちゃん、詳しく教えてください！昨晩はおふたりで何をしていたんですか、今晩は何をする予定だったのですか！？ぜひ説明を、いえ、いっそ今から私の前で実際に再現を……！！"
32020-242 = "[s] \"ふたり共お願いだから、一旦落ち着いて……。\""
32020-244 = "（その後何とか落ち着いて話をして、お互いの誤解を解いた。）"
32020-245 = "（ついでにハナコはヒフミに怒られてちゃんと着替えてきた。）"
32020-247 = "次回;深夜の密会"

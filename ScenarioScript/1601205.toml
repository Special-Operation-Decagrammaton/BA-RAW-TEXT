[translation]
1601205-1 = "ขอความนุ่มนิ่ม"
1601205-2 = "สำนักงานชาเล่ต์"
1601205-3 = "ขอโทษที่จู่ๆ ก็แวะมานะ"
1601205-4 = "[s] \"น่ากลัว... นักเรียนหญิงนี่น่ากลัว...\""
1601205-5 = "นะ... น่ากลัวอะไรกันเล่า! ฉันเป็นนักเรียนของคุณครูนะ!"
1601205-6 = "ยังไงก็เถอะ ถ้าปล่อยให้วันหยุดผ่านไปแบบนี้มันน่าเสียดายนี่นา"
1601205-7 = "เพราะงั้นคุณครู... มีความคิดดีๆ อะไรบ้างมั้ย?"
1601205-8 = "[s1] \"นานๆ ทีจุนโกะอุตส่าห์แวะมา... ไปหาอะไรกินดีมั้ย...?\"\n[s2] \"ส่งท้ายวันหยุดด้วยอาหารเลิศรสก็น่าจะดีนะ?\""
1601205-11 = "อะไรกันเล่า! แบบนั้นก็เหมือนฉันเป็นพวกเอาแต่คิดถึงเรื่องกิน 24 ชั่วโมงเลยน่ะสิ!"
1601205-12 = "[s] \"แล้วไม่ใช่รึไง?!\""
1601205-13 = "ไม่ใช่สักหน่อย! อยากกลับไปเกิดใหม่รึไง?!"
1601205-14 = "[s] \"น่ากลัว... นักเรียนหญิงนี่น่ากลัว...\""
1601205-22 = "ดันออกมาข้างนอก โดยไม่ได้วางแผนล่วงหน้าซะแล้ว..."
1601205-23 = "ว้าว ยังมีต้นคริสต์มาสเหลืออยู่อีกด้วยแฮะ"
1601205-24 = "[s] \"ทั้งตอนขนมาแล้วก็เก็บกลับ ถือเป็นงานใหญ่ทั้งนั้นเลยนะ\""
1601205-26 = "นั่นสิ เวลาเก็บกวาดงานเทศกาลทีไรก็งานใหญ่ทุกที"
1601205-27 = "พอมาคิดๆ ดูแล้ว ปีใหม่กับคริสต์มาส ก็ไม่ได้ห่างกันเท่าไหร่ด้วย"
1601205-28 = "หืม? คุณครูเคยทิ้งต้นคริสต์มาสไว้จนถึงช่วงใบไม้ผลิเลยเหรอ?"
1601205-29 = "หัดจัดการอะไรให้เรียบร้อยบ้างเถอะ... ชักจะขี้เกียจเกินไปแล้วรึเปล่า?"
1601205-33 = "กองหิมะที่ตกเมื่อคืนยังอยู่เลยแฮะ..."
1601205-34 = "พอเห็นหิมะที่ตกมาทับถมกันแบบนี้ รู้สึกอยากทิ้งรอยเท้าเอาไว้เลยแฮะ  คุณครูเคยทำแบบนี้รึเปล่า?"
1601205-35 = "อะไรนะ? อยากล้มตัวลงไปนอนแล้ววาดแขนขาไปมาบนหิมะเหรอ?"
1601205-36 = "คุณครูเนี่ยเป็นเด็กรึไง...? หืม...? บางครั้งผู้ใหญ่ก็อยากทำตัวเป็นเด็กน้อยบ้างเหมือนกันงั้นเหรอ...?"
1601205-37 = "บางครั้งคุณครูก็ชอบพูดอะไรที่เข้าใจยากเหมือนกันนะ เฮ้อ..."
1601205-73 = "คนเยอะจัง... พวกเขาเองก็คงเหมือนกับเราสินะ?"
1601205-74 = "แปลกจัง คนอื่นๆ ก็เสียดายที่วันหยุดกำลังจะผ่านไปเหมือนกันสินะ"
1601205-75 = "หืม? บางทีการบอกลาปีเก่าก็เป็นเรื่องที่น่าเสียดายเหมือนกันงั้นเหรอ?"
1601205-76 = "นั่นสินะ... อาจเป็นแบบนั้นก็ได้ ช่วงปีใหม่น่ะเป็นวันหยุดที่ซับซ้อนที่สุดของปีเลยนี่นา"
1601205-77 = "(จ๊อกกกกก)"
1601205-78 = "(เสียงท้องจุนโกะดังขึ้น...)"
1601205-79 = "..."
1601205-80 = "[s] \"...\""
1601205-81 = "......"
1601205-82 = "[s] \"......\""
1601205-83 = "ปะ...ปะ...ปะ... เปล่านะ! ไม่ใช่เสียงท้องร้องเพราะหิวเลยนะ!"
1601205-84 = "มะ...ไม่ได้เสียงท้องร้องเพราะหิวสักหน่อย... เข้าใจมั้ย?!"
1601205-85 = "[s3] \"แต่ว่านะ จุนโกะจัง~~ เห็นจ้องของกินตั้งแต่เมื่อกี้แล้วนะ\"\n[s4] \"เธอจ้องของกินตาเป็นมันอยู่ตั้งแต่เมื่อกี้แล้วน้า~?\""
1601205-88 = "งะ... งะ... งะ...เงียบไปเลย!"
1601205-96 = "(โดนตีเข้าอย่างจังหนึ่งที)"
1601205-97 = "(ไม่ยุติธรรมเลย... พูดเรื่องจริงแท้ๆ...)"
1601205-99 = "[ns] \"เอ้า กินนี่ก่อนสิ\""
1601205-100 = "อะไรน่ะ? โอชิรุโกะเหรอ...?"
1601205-101 = "เยี่ยมเลย ตอนนี้เป็นช่วงที่เหมาะจะกินโอชิรุโกะที่สุดด้วย"
1601205-102 = "ขอบคุณนะคุณครู จะกินให้อร่อยเลย"
1601205-105 = "― เอ้า คุณครู ฉันแบ่งให้ชิ้นหนึ่ง[wa:800] "
1601205-108 = "― ตกใจอะไรขนาดนั้นเล่า![wa:280] "
1601205-110 = "― ฉะ... ฉันแค่คิดว่ามันเยอะไปเท่านั้นเอง![wa:10] "
1601205-113 = "― แล้วก็นี่น่ะ...[wa:760] "
1601205-115 = "― คุณครูก็เป็นคนซื้อให้ด้วย..."
1601205-118 = "― แล้วอีกอย่าง... วันนี้ทั้งวัน...[wa:80] "
1601205-121 = "― (พอมาคิดดูแล้ว วันนี้ได้อยู่กับคุณครูทั้งวันเลย...)[wa:970] "
1601205-123 = "― (ฉะ...ฉันคิดอะไรอยู่กันเนี่ย!)[wa:1260] "
1601205-126 = "― จริงๆ เลยเชียว! ฉันบอกว่าจะแบ่งให้แล้วไงเล่า[wa:10] "
1601205-128 = "― ไม่เป็นไรหรอกน่า![wa:10] "
1601205-131 = "เฮ้อ... เหนื่อยจัง เหนื่อยจังเลย"
1601205-132 = "อะไรเล่า คุณครูเองก็เหนื่อยเหมือนกันเหรอ?"
1601205-133 = "เป็นผู้ใหญ่แท้ๆ ช่วยทำตัวให้สมกับเป็นผู้ใหญ่หน่อยสิ"
1601205-134 = "เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย... แต่คนยังเยอะอยู่เลย"
1601205-135 = "พวกเราก็ยังอยู่เหมือนกันงั้นเหรอ? อืม.... ที่คุณครูพูดมาก็ไม่ผิดหรอก..."
1601205-136 = "[s] \"ปีใหม่นี้ก็ขอฝากด้วยนะจุนโกะ\""
1601205-137 = "อะ... อะไรเนี่ย?! ยะ... อยู่ๆ ก็พูดอะไรเนี่ย?!"
1601205-138 = "ปะ...เปล่าซะหน่อย ฉันก็ไม่ได้เกลียดอะไรหรอก"
1601205-139 = "อืม... ฉันไม่ควรทำให้เสียบรรยากาศสินะ ช่วยไม่ได้..."
1601205-143 = "ฉันเอง... ปีใหม่นี้ก็ขอรบกวนด้วยนะ คุณครู"

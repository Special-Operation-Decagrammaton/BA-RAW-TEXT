[translation]
1601205-1 = "請給我溫暖"
1601205-2 = "夏萊．辦公室"
1601205-3 = "所以我就來了唷。"
1601205-4 = "[s]「怎麼回事……女高中生真可怕，無法理解……」"
1601205-5 = "為，為什麼要害怕啊！我跟老師都這麼熟了！"
1601205-6 = "總之，就這樣讓連假結束實在太可惜了。"
1601205-7 = "老師，有沒有什麼好點子？"
1601205-8 = "[s1]「既然淳子都特地跑來了……」\n[s2]「連假的最後用美食來點綴，怎麼樣？」"
1601205-11 = "這，這樣我不就像是腦袋裡24小時都想著吃的人一樣嗎！"
1601205-12 = "[s]「不是嗎！？」"
1601205-13 = "怎麼可能是啊！？開槍射你哦！？"
1601205-14 = "[s]「女高中生果然很可怕……」"
1601205-22 = "總之，雖然還沒多想就跑出來了……"
1601205-23 = "啊，是聖誕樹。現在還有啊。"
1601205-24 = "[s]「畢竟設置和移除都是大工程啊。」"
1601205-26 = "也對，慶典結束後的收拾也是很辛苦的。"
1601205-27 = "而且，仔細想想聖誕節過後緊接著就是新年了呢。"
1601205-28 = "咦，有把聖誕樹放到春天過？"
1601205-29 = "……這倒是有點難替你辯解。"
1601205-33 = "昨晚的雪還沒融化呢。"
1601205-34 = "一看到新積的雪，就會想要留下腳印對吧？"
1601205-35 = "……會想要仰面躺下揮動手腳？像個小孩子一樣……"
1601205-36 = "大人偶爾也會想要變回小孩……？"
1601205-37 = "……老師有時會說出彷彿換了個人似的話呢。"
1601205-73 = "人真多……大家都和我們一樣嗎？"
1601205-74 = "覺得連假結束很寂寞……如果是這樣的話，好像有點有趣。"
1601205-75 = "說不定一年的結束與開始本身就是件令人寂寞的事……？"
1601205-76 = "或許是那樣沒錯。總覺得是個多愁善感的時期呢。"
1601205-77 = "（咕嚕嚕嚕嚕嚕……）"
1601205-78 = "（淳子的肚子發出巨大的聲音）"
1601205-79 = "……"
1601205-80 = "[s]「……」"
1601205-81 = "…………"
1601205-82 = "[s]「…………」"
1601205-83 = "不，不不不不不是啦！不是那樣！"
1601205-84 = "真的不是！那個……雖然好像也不能說不是，總之不是那樣啦！#n知道了嗎？我說不是就不是！"
1601205-85 = "[s3]「但是，這麼說來淳子你……」\n[s4]「從剛剛開始就一直盯著食物看呢。抱歉我沒說出來。」"
1601205-88 = "少……少囉嗦！！"
1601205-96 = "（被揍了一頓）"
1601205-97 = "（雖然是自作自受可是好痛……）"
1601205-99 = "[ns]「來，請用。」"
1601205-100 = "這是，紅豆湯……？"
1601205-101 = "嗯，我正好有點想喝。"
1601205-102 = "謝謝你，老師。那我就開動了。"
1601205-105 = "― 來，老師。給你一個。[wa:1640] "
1601205-108 = "― 呃，為什麼要那麼驚訝啊！[wa:640] "
1601205-110 = "― 只，只是碰巧裝了很多而已！[wa:910] "
1601205-113 = "― 再說，[wa:1240] "
1601205-115 = "― 這也是老師買給我的……"
1601205-118 = "― 而且今天一整天都……[wa:960] "
1601205-121 = "― （這麼說來，今天一直都和老師……）[wa:2330] "
1601205-123 = "― （我，我真是的，在想什麼啊！）[wa:1860] "
1601205-126 = "― 真是的！我說要給你[wa:1280] "
1601205-128 = "― 就是要給你啦！[wa:380] "
1601205-131 = "唉……怎麼感覺莫名的累。"
1601205-132 = "……你問你是不是也露出了好累呀～的表情？"
1601205-133 = "老師是大人了，得振作一點才行。"
1601205-134 = "啊，已經這麼晚了啊……不過大家都不回去呢。"
1601205-135 = "雖，雖然現在的我們也是一樣啦……"
1601205-136 = "[s]「今後也請多多關照囉。」"
1601205-137 = "……咦，怎，怎麼這麼突然！？新年的問候！？"
1601205-138 = "不，那個，我也不是不喜歡……"
1601205-139 = "唉……好想吐槽卻又無法吐槽……"
1601205-143 = "……我也是。今後請多多指教哦，老師。"

10016050-43 = "2;히비키 응원단ND;11\n4;하나에 치어리더;01\n3;우타하 응원단ND;07;후후, 그 말대로야. 우리가 바로 밀레니엄의 응원을 책임지는 응원 전문가— 마이스터들이지!\n#2;m1\n#4;m5\n#3;a\n#3;em;[반응]"

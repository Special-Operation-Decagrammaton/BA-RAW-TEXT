10016050-93 = "3;정의실현부 부원 학교 체육복;06\n1;나츠 학교 체육복;01;음식은 식기로 먹는 것이 예의지만, 정통 카레를 먹을 때는 손으로 식사를 하는 게 예의라는 이야기도 있잖아?\n#3;m5\n#1;a"

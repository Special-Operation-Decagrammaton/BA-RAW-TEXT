[translation]
10016050-1 = "ตอนที่ 5;กิจกรรมลาดตระเวน"
10016050-5 = "ท่านสึคุโยะคะ ท่านสึคุโยะ ดูตรงนั้นสิคะ!"
10016050-6 = "นั่นคือเสื้อยืดที่ระลึกพิเศษของมิลเลเนียม ที่ใส่แล้วจะทำให้ร่างกายโปร่งใสด้วยโฮโลแกรมค่ะ!"
10016050-7 = "ฮุฮุ... ถ้าได้ใส่เสื้อยืดตัวนั้น เราคงแอบเข้าไปในค่ายศัตรูได้โดยไม่ต้องใช้วิชาอะไรนะคะ"
10016050-8 = "เห็นว่าให้ลองใส่ได้ด้วยนะคะ เราไปลองใส่กันเถอะค่ะ!"
10016050-9 = "ตะ... แต่ว่าจะมีไซซ์สำหรับคนตัวใหญ่อย่างฉันเหรอคะ...?"
10016050-10 = "ถ้าฉันไปทำเสื้อของเขาขาดเข้าละก็... มีหวังได้โดนดุแน่เลยค่ะ..."
10016050-11 = "ไม่หรอกค่ะ! ฉันเห็นที่ป้ายประกาศเขียนไว้ว่ามีไซซ์ให้เลือกใส่เยอะแยะเลยค่ะ"
10016050-12 = "นี่เป็นโอกาสในการวิจัยศาสตร์นินจาใหม่ๆ เลยนะคะ ไปกันเถอะค่ะ!"
10016050-19 = "ว้าวว! พอมิลเลเนียมเป็นเจ้าภาพจัดงานแข่งขันกีฬา ก็เลยมีของกินที่ทำโดยหุ่นยนต์และเครื่องจักรที่#nน่าทึ่งๆ เพียบเลย!"
10016050-20 = "รุ่นพี่ชิเซะ คาเอเดะอยากกินทาโกะยากิที่ทำจากเครื่องทาโกะยากิอัตโนมัติอันนั้น!"
10016050-21 = "อืม... เหมือนจะได้แรงบันดาลใจในการแต่งกลอนเลย"
10016050-22 = "นี่... รุ่นพี่ชิเซะ ฟังฉันพูดอยู่หรือเปล่า?"
10016050-23 = "...... อืม ได้แรงบันดาลใจแล้ว"
10016050-25 = "กลิ้ง#nกลิ้ง#nหมุน#nหมุน"
10016050-27 = "กลิ้ง#nไป#nพร้อม#nส่ง#nเสียง#nหลุน#nหลุน"
10016050-29 = "รา#nมู#nเนะ#nหลุน#nหลุน"
10016050-32 = "ที่ขายอยู่ตรงนั้นไม่ใช่น้ำรามูเนะ แต่เป็นทาโกะยากิต่างหากเล่า!"
10016050-33 = "รุ่นพี่ รีบไปกินทาโกะยากิกันเถอะ~"
10016050-38 = "ว้าว โรงเรียนมิลเลเนียมก็มีกองเชียร์เหมือนกันเหรอคะเนี่ย!"
10016050-39 = "แถมยังมีชุดเชียร์ที่ทำจากวัสดุพิเศษและโดรนโฮโลแกรมอีก... คงมีพลังเชียร์กันเต็มเปี่ยมแน่เลยค่ะ!"
10016050-40 = "อา... เราไม่ใช่กองเชียร์อย่างเป็นทางการของโรงเรียนหรอก—"
10016050-43 = "ฮุฮุ พวกเราคือไมสเตอร์ผู้เชี่ยวชาญด้านการเชียร์แห่งมิลเลเนียมน่ะ!"
10016050-44 = "ดูจากสัญลักษณ์ที่ชุดแล้ว คงเป็นนักเรียนจากทรีนิตี้สินะ?"
10016050-45 = "ใช่แล้วค่ะ! ฉันมาเข้าร่วมงานมหกรรมแข่งขันกีฬาเพราะอยากตามรุ่นพี่ชมรมอัศวินบรรเทาทุกข์มา#nรักษานักกีฬาที่บาดเจ็บจากการแข่งขันน่ะค่ะ!"
10016050-46 = "ตอนดูแลผู้ป่วย สุขภาพกายเป็นสิ่งสำคัญ แต่สุขภาพจิตก็สำคัญไม่ต่างกัน..."
10016050-47 = "ถ้ารุ่นพี่ของฉันดูแลผู้ป่วยที่บาดเจ็บทางกายด้วยยาและผ้าพันแผลละก็ ฉันก็จะดูแลผู้ป่วยที่บาดเจ็บ#nทางใจด้วยการเชียร์ค่ะ!"
10016050-48 = "อืม... แค่เสียงพูดก็ทำให้รู้สึกได้ถึงการเชียร์ที่จริงใจแล้ว..."
10016050-49 = "ถ้างั้นก็คงเป็นคู่แข่งของกองเชียร์มิลเลเนียมของเราแล้วละ!"
10016050-53 = "อ๊ะ หมายถึงการแข่งเชียร์ระหว่างโรงเรียนใช่มั้ยคะ?"
10016050-54 = "การแข่งขันเชียร์ที่ประชันความสามารถและแรงใจของกองเชียร์จนได้ชื่อว่าเป็น 'การแข่งขันนอกรอบ#nในอัฒจันทร์' คือหนึ่งสิ่งสำคัญของงานมหกรรมแข่งขันกีฬาเลยค่ะ!"
10016050-55 = "แต่ฉันต้องไปลงแข่งวิ่งผลัดข้ามสิ่งกีดขวางที่จะเริ่มขึ้นแล้ว... น่าเสียดายจังค่ะที่ไม่ได้เข้าร่วมการแข่ง#nเชียร์ด้วย"
10016050-57 = "ถะ... ถ้างั้นฉันไปแข่งวิ่งผลัดข้ามสิ่งกีดขวางแทนโคโทริให้เอามั้ย?"
10016050-58 = "ถึงฉันจะไม่สันทัดทั้งกีฬา ทั้งเรื่องเชียร์ก็เถอะ แต่ฉันมั่นใจกับเรื่องการวิ่งมากกว่า..."
10016050-59 = "แบบนั้นไม่ดีเลยนะ ฮิบิกิ"
10016050-60 = "<ฮาโลเฟสติวัล> เป็นมหกรรมกีฬาที่ท้าทายข้อจำกัดและความเป็นไปได้ของร่างกาย..."
10016050-61 = "แบบนี้เรายิ่งต้องลองทำในสิ่งที่ปกติเราทำไม่ได้สิ จะได้รับรู้ถึงคุณค่าของมันได้!"
10016050-62 = "เป็นคำพูดที่ดีมากเลยค่ะ คุณหัวหน้ากองเชียร์มิลเลเนียม!"
10016050-63 = "ฉันเองก็จะตั้งใจเชียร์ให้สุดกำลังเลยค่ะ!"
10016050-64 = "ฉันขอรับคำท้านั้น!"
10016050-68 = "อยากให้งานมหกรรมแข่งขันกีฬาจบเร็วๆ จัง..."
10016050-72 = "[ns] \"ทุกคนกำลังสนุกกับมหกรรมแข่งขันกีฬากันเลยนะ...\""
10016050-74 = "เอ่อ... คะ... คุณนัตสึ พาร์เฟต์นั่น..."
10016050-77 = "หืม? สนใจในพาร์เฟต์นี้เหรอ?"
10016050-78 = "แค่แว็บเดียวก็เห็นคุณค่าของพาร์เฟต์นี้ได้แล้วเหรอ... สมาชิกชมรมทวงความยุติธรรมนี่ตาถึงจริงๆ เลย"
10016050-79 = "พาร์เฟต์นี้มีขายที่ป็อปอัปสโตร์ของ <ลูวาโซ บลู> ที่อยู่ในพื้นที่ร้านขายของข้างทางน่ะ"
10016050-80 = "ปกติพาร์เฟต์ของลูวาโซ บลูก็หาซื้อไม่ได้ง่ายๆ อยู่แล้ว แล้วยิ่งเป็นพาร์เฟต์ในป็อปอัปสโตร์ด้วย ก็เลยเป็นของแรร์เข้าไปอีก"
10016050-81 = "งะ... งั้นเหรอคะ แต่ปัญหาไม่ได้อยู่ที่เรื่องนั้น—"
10016050-82 = "ปกติร้านสาขาใหญ่จะหั่นผลไม้และใส่วิปปิ้งครีมให้ตอนที่ซื้อ แต่พาร์เฟต์ของที่นี่จะเป็นแบบแช่แข็งที่#nเตรียมวัตถุดิบไว้ก่อนเลย"
10016050-83 = "ถึงคุณภาพจะด้อยกว่านิดหน่อย แต่ก็ทดแทนได้ด้วยไอศกรีมที่ให้มาถึง 3 ชั้น ฉันกลับมองว่าหน้าตา#nออกมาดูดีกว่าของสาขาใหญ่อีก"
10016050-84 = "พาร์เฟต์ที่ไม่สมดุลแบบนี้แหละ คือของหวานของวัยรุ่นที่ลิ้มลองได้แค่ใน <ฮาโลเฟสติวัล> เท่านั้น—"
10016050-85 = "เดี๋ยวก่อนนะคะ ฉันไม่ได้สนใจพาร์เฟต์นั่นหรอก..."
10016050-86 = "ฉันแค่จะบอกว่าห้ามเดินกินพาร์เฟต์บนถนนน่ะค่ะ"
10016050-87 = "หืม...? ทำไมจะเดินบนถนนไปด้วยและกินพาร์เฟต์ไปด้วยไม่ได้ล่ะ?"
10016050-88 = "ก็เพราะกฎของโรงเรียนระบุไว้แบบนั้นน่ะค่ะ อีกอย่าง ถ้าเดินไปด้วยกินไปด้วย ก็จะยิ่งดูไม่เรียบร้อย..."
10016050-89 = "การกินอาหารขณะเดินมันเป็นสิ่งที่ห้ามทำในทรีนิตี้ก็จริง..."
10016050-91 = "แต่จะเอาความยุติธรรมนั้นมาใช้ในฮาโลเฟสติวัลได้ด้วยงั้นเหรอ!"
10016050-92 = "คะ... ความยุติธรรมเหรอคะ?"
10016050-93 = "การกินอาหารในภาชนะใส่อาหารอย่างเรียบร้อยคือมารยาทก็จริง แต่ก็มีคำพูดที่ว่าแกงกะหรี่พื้นเมือง#nต้องใช้มือกินนี่นา"
10016050-94 = "แล้วถ้าอย่างนั้น จะมีวิธีอื่นที่เหมาะสมในการกินพาร์เฟต์ที่อยู่ในภาชนะที่ใช้แล้วทิ้งด้วยเหรอ?"
10016050-96 = "บางทีการเดินกินพาร์เฟต์ในงานมหกรรมแข่งกีฬาก็อาจจะเป็นความเป็นธรรมก็ได้...!"
10016050-98 = "มะ... มันก็ฟังขึ้นอยู่นะ..."
10016050-99 = "...อย่ามาพูดอะไรแปลกๆ ให้สมาชิกของฉันสับสนสิคะ คุณนัตสึ"
10016050-100 = "ข้อห้ามเรื่องการกินขณะเดินก็ไม่เป็นที่ยกเว้น แม้แต่ในฮาโลเฟสติวัลก็ตามค่ะ"
10016050-101 = "ไม่เอาน่า ไม่มีข้อยกเว้นเลยเหรอ..."
10016050-102 = "ขนมนั่นมันดูน่าอร่อยมากเลย..."
10016050-103 = "ไม่ค่ะ ถ้าเดินกินพาร์เฟต์ถ้วยใหญ่แบบนี้ อาจจะเผลอไปทำชุดของคนอื่นเลอะก็ได้ค่ะ"
10016050-104 = "กรุณาไปกินพาร์เฟต์ในพื้นที่ที่กำหนดแล้วค่อยมาเดินชมการแข่งขันต่อนะคะ"
10016050-105 = "แบบนั้นไม่น่าจะได้นะ ฉันมาที่นี่เพราะจะแอบกินพาร์เฟต์นี้คนเดียว ถ้าให้ไปนั่งกินอยู่ที่ใดที่หนึ่ง มีหวังได้โดนสมาชิกคนอื่นในชมรมจับได้แน่"
10016050-106 = "และถ้าเป็นอย่างนั้น ทุกคนคงเซ้าซี้ให้ซื้อของตัวเองให้ด้วย..."
10016050-107 = "งั้นก็ช่วยไม่ได้... รองหัวหน้าช่วยจัดการพาร์เฟต์นี้แทนให้หน่อยแล้วกัน"
10016050-108 = "คะ? ทำไมจู่ๆ ก็เอามาให้ฉันล่ะ?"
10016050-109 = "ถึงจะเสียดายที่กินพาร์เฟต์สุดแรร์ไม่ได้ก็เถอะ แต่อย่างน้อยก็ให้คนที่รู้คุณค่าของของหวานมากิน#nแทนให้ก็ยังดี"
10016050-110 = "งั้นฉันไปหาเพื่อนคนอื่นในชมรมก่อนนะ!"
10016050-114 = "จู่ๆ ก็ได้พาร์เฟต์ถ้วยยักษ์มาในมือแบบนี้ ทำตัวไม่ถูกเลยค่ะ..."
10016050-115 = "อุตส่าห์อดทนต่อการล่อใจได้แล้วเชียว ถ้าได้กินของที่แคลอรีสูงแบบนี้ ความตั้งใจที่สั่งสมมาก็คงจะ#nพังลงนะคะ"
10016050-116 = "...."
10016050-117 = "แต่จะให้ทิ้งอาหารก็เสียมารยาทอีก—"
10016050-118 = "[s] \"แค่ถ้วยเดียว ครูว่าน่าจะไม่เป็นไรนะ\""
10016050-119 = "คะ... คะ... คุณครู? มาอยู่ตรงนี้ตั้งแต่เมื่อไรกันคะ?!"
10016050-120 = "[s] \"อยู่ได้สักพักแล้วละ\""
10016050-121 = "งะ... งั้นเหรอคะ"
10016050-122 = "ฉันกำลังคิดว่าจะเอาพาร์เฟต์นี้ให้สมาชิกในชมรมกินอยู่พอดีค่ะ"
10016050-123 = "คะ... คะ? คุณนัตสึให้คุณฮาสุมิไว้นะคะ คุณฮาสุมิทานเองเถอะค่ะ..."
10016050-124 = "ไม่หรอกค่ะ เมื่อกี้ฉันกินอาหารกลางวันมาเยอะแล้ว ไม่ต้องกินเพิ่มแคลแล้วก็ได้ค่ะ"
10016050-125 = "การลาดตระเวนเพื่อรักษาระเบียบวินัยท่ามกลางอากาศร้อนก็น่าจะเหนื่อยอยู่แล้ว พักกินอะไรเย็นๆ ให้ได้คลายร้อนสักหน่อยเถอะค่ะ"
10016050-126 = "ขะ... ขอบคุณค่ะ"
10016050-130 = "เฮ้อ..."
10016050-131 = "[s1] \"ฮาสุมิดูเหนื่อยๆ นะ\"\n[s2] \"ลองพักสักหน่อยมั้ย?\""
10016050-132 = "ไม่ค่ะ ฉันไม่เป็นไรค่ะ ฉันกินมื้อกลางวันมาแล้ว แถมก็ไม่ได้ลงแข่งกีฬาอะไรด้วย เรี่ยวแรงของฉันยังคง#nมีเหมือนเดิมค่ะ"
10016050-133 = "ไม่ค่ะ ฉันไม่เป็นไรค่ะ ฉันกินมื้อกลางวันมาแล้ว แถมก็ไม่ได้ลงแข่งกีฬาอะไรด้วย เรี่ยวแรงของฉันยังคง#nมีเหมือนเดิมค่ะ"
10016050-134 = "และถ้าหากฉันละเลยการลาดตระเวน ก็จะมีนักเรียนที่ทำผิดกฎเพราะเผลอเรอไปกับบรรยากาศของ#nงานเทศกาลเหมือนเมื่อสักครู่ค่ะ"
10016050-135 = "และยิ่งถ้าเป็นคณะกรรมการจัดงานจากมิลเลเนียมและเกเฮนน่าละก็..."
10016050-136 = "ท่าทางพวกเธอจะลืมหน้าที่ของกรรมการจัดงานเพราะมัวแต่สนุกกับงานเทศกาลด้วยน่ะค่ะ"
10016050-137 = "[s3] \"แต่นานๆ ทีถึงจะมีงานแบบนี้นะ ยอมๆ ให้หน่อยเถอะ...\"\n[s4] \"ให้ออกมาสนุกแค่เดี๋ยวเดียวก็น่าจะได้มั้ง?\""
10016050-138 = "ไม่ค่ะ แต่ละคนย่อมมีบทบาทของตัวเอง ส่วนการสนุกกับงานเทศกาลก็เป็นบทบาทของคนอื่นค่ะ"
10016050-139 = "ไม่ค่ะ แต่ละคนย่อมมีบทบาทของตัวเอง ส่วนการสนุกกับงานเทศกาลก็เป็นบทบาทของคนอื่นค่ะ"
10016050-140 = "อย่างที่ฉันบอกไปก่อนหน้านี้ การจัดงานมหกรรมแข่งขันกีฬาเป็นแค่การต่อเวลาในการทำภารกิจที่#nวุ่นวายของโรงเรียนค่ะ"

10016050-46 = "3;우타하 응원단ND;03\n4;하나에 치어리더;99;환자를 돌볼 때는 몸의 건강도 중요하지만, 마음의 건강도 중요한 법……"
10016050-47 = "3;우타하 응원단ND;03\n4;하나에 치어리더;07;선배들이 약과 붕대로 몸이 아픈 환자들을 치료한다면, 저는 응원으로 마음이 아픈 환자 여러분들을 치료하려고요!\n#4;em;[반짝]\n#4;hophop"
10016050-48 = "4;하나에 치어리더;07\n3;우타하 응원단ND;00;흐음. 목소리에서 응원을 향한 진심이 느껴지는군……\n#3;em;…"

[translation]
10016050-1 = "第5話;周邊巡邏"
10016050-5 = "月夜閣下，月夜閣下～！請看！"
10016050-6 = "這是據說穿了之後會讓身體變透明的千年特製全像投影T-shirt！"
10016050-7 = "呵呵……只要有了這個，就算不施展忍術也能潛入敵陣了吧……！"
10016050-8 = "聽說還能試穿，月夜閣下也一起穿穿看吧？"
10016050-9 = "但，但是，有我這種高個子可以穿的尺寸嗎……？"
10016050-10 = "如果硬塞進去弄破的話……"
10016050-11 = "不用擔心！看板上寫著有各種不同的尺寸！"
10016050-12 = "來吧，來吧……！#n這是研究新忍術的好機會，一起去吧！"
10016050-19 = "哇！千年有很多用神奇的機器製作的食物呢！"
10016050-20 = "知世前輩──！楓想要吃那邊的自動章魚燒機器製作的章魚燒！"
10016050-21 = "好像……浮現出了不錯的句子。"
10016050-22 = "吶，知世前輩～？有聽到嗎？"
10016050-23 = "……唔嗯，我想到了。"
10016050-25 = "咕#n嚕#n咕#n嚕"
10016050-27 = "大#n珠#n小#n珠"
10016050-29 = "落#n玉#n盤"
10016050-32 = "那邊賣的是章魚燒，不是彈珠台唷？"
10016050-33 = "前輩～快點去吃章魚燒吧～"
10016050-38 = "哇，千年也有應援團呢！"
10016050-39 = "用特殊材質製成的立領學生服及啦啦隊服，還有全像投影無人機……氣勢十足！"
10016050-40 = "啊……其實，我們不是正式的應援團──"
10016050-43 = "呵呵，你說的沒錯。#n我們是一肩扛起千年應援重責的應援專家──巨匠團！"
10016050-44 = "從服裝來看，你是三一的學生嗎？"
10016050-45 = "是的！我是為了治療受傷的選手，和救護騎士團的前輩們一起來的！"
10016050-46 = "照顧患者時，肉體的健康固然重要，但心靈的健全也不可忽視……"
10016050-47 = "如果前輩們是用藥物和繃帶來治療患者的肉體，我便是透過應援來治療受創的心靈！"
10016050-48 = "哼呣……能從你的聲音中感受到對應援的熱情和真心……"
10016050-49 = "看來能成為我們千年應援團的好對手呢！"
10016050-53 = "喔喔！是指應援合戰嗎？"
10016050-54 = "較量應援團技巧和氣勢的應援合戰，可是大運動會的一大亮點呢！"
10016050-55 = "只可惜，我馬上就要參加障礙賽跑了……沒辦法參加應援合戰。"
10016050-57 = "既，既然這樣，我代替亞都梨去參加障礙賽跑吧？"
10016050-58 = "雖然兩種我都不擅長，但跑步的話還是稍微有一點自信……"
10016050-59 = "不該用這種態度面對唷，響。"
10016050-60 = "「晄輪大祭」是挑戰肉體極限與潛力的運動慶典……"
10016050-61 = "也就是說，只有挑戰平常不擅長的事，才能認識到它的價值！"
10016050-62 = "說得真好……！"
10016050-63 = "我也會努力加油，在氣勢上不輸給千年應援團長的！"
10016050-64 = "你的挑戰，我接受了！"
10016050-68 = "真希望大運動會能快點結束……"
10016050-72 = "[ns]「大家似乎都很享受大運動會呢……」"
10016050-74 = "那個……夏，夏同學。#n那個百匯冰淇淋到底是……"
10016050-77 = "嗯？你對這個百匯冰淇淋有興趣嗎？"
10016050-78 = "竟然一眼就看出這個百匯冰淇淋的價值……#n不愧是實現正義部的成員。眼光真高。"
10016050-79 = "這個百匯冰淇淋是在攤販區的「L'Oiseau．Bleu」快閃店買的。"
10016050-80 = "L'Oiseau．Bleu的百匯冰淇淋平常就很難買到，而這個快閃店的版本更是稀有。"
10016050-81 = "是，是嗎……不，我的問題不是這個──"
10016050-82 = "和總店那種點完單後才馬上盛入水果和淋上鮮奶油的百匯冰淇淋不同，#n這裡的是事先做好，在冷藏的狀態下送來的。"
10016050-83 = "雖然不是現做的，但冰淇淋可是疊了3層……#n壓倒性的視覺效果可說是它的魅力所在。"
10016050-84 = "這種打破平衡的樣貌，是只有在「晄輪大祭」時才能品嘗到的青春甜點──"
10016050-85 = "請等一下！我並不是對那個百匯冰淇淋有興趣……"
10016050-86 = "我是想要告訴你，不可以邊走邊吃……"
10016050-87 = "……嗯？為什麼不能邊走邊吃？"
10016050-88 = "因為校規禁止這樣做……#n而且還很不禮貌……"
10016050-89 = "禁止邊走邊吃確實是三一的校規……"
10016050-91 = "但是，那樣的定義在晄輪大祭時也通用嗎？"
10016050-92 = "定，定義嗎？"
10016050-93 = "一般吃飯時都會使用餐具，但如果是吃正宗的咖哩，用手抓才是正確的吧？"
10016050-94 = "那為了方便攜帶而裝在一次性容器的百匯冰淇淋，又該如何正確地享受呢？"
10016050-96 = "果然就得邊走邊吃才是最正確的吧……！"
10016050-98 = "說，說起來好像是這樣沒錯……！？"
10016050-99 = "……請不要用奇怪的話迷惑我們的部員，夏同學。"
10016050-100 = "禁止邊走邊吃在晄輪大祭也沒有例外。"
10016050-101 = "嘖，沒有例外嗎……"
10016050-102 = "而且拿著看起來那麼美味的……"
10016050-103 = "咳哼，那麼大的百匯冰淇淋邊走邊吃的話，一個不小心就會弄髒別人的衣服吧。"
10016050-104 = "為了防止不必要的糾紛，請在指定的休憩區坐著吃吧。"
10016050-105 = "這可腦筋了……我是自己偷偷跑出來買的……#n如果坐著吃的話，可能會被其他部員發現。"
10016050-106 = "被發現的話……肯定會吵著要我也買給他們。"
10016050-107 = "……沒辦法了。#n副部長……這個百匯冰淇淋，你就代替我把它吃了吧。"
10016050-108 = "嗯？#n我嗎……？"
10016050-109 = "沒能享受好不容易才買到的百匯冰淇淋雖然很可惜，#n但如果是讓懂這個甜點價值的人吃的話，我能接受。"
10016050-110 = "那我要去找其他部員了……先告辭囉！"
10016050-114 = "居然突然收到這麼大一個百匯冰淇淋……#n真是傷腦筋……"
10016050-115 = "而且我好不容易才忍住誘惑……#n如果吃下這麼高卡路里的食物，我的決心就會徹底瓦解的……"
10016050-116 = "……"
10016050-117 = "但是，把食物丟掉什麼的──"
10016050-118 = "[s]「只吃一個應該沒關係吧？」"
10016050-119 = "……老，老師！？您是什麼時候來的！？"
10016050-120 = "[s]「從剛才就在唷。」"
10016050-121 = "這，這樣呀。"
10016050-122 = "我正準備把這個百匯冰淇淋交給其他部員。"
10016050-123 = "咦！？這個百匯冰淇淋是夏同學讓給蓮實同學的，所以還是由蓮實同學吃比較好……"
10016050-124 = "不，我剛才已經吃過午餐了。#n不需要再攝取更多的卡路里。"
10016050-125 = "況且大家在這麼悶熱的天氣裡維護風紀……#n請吃點冷的東西，稍作休息吧。"
10016050-126 = "謝，謝謝……"
10016050-130 = "唉……"
10016050-131 = "[s1]「沒事吧？看起來有點累呢。」\n[s2]「蓮實也稍微休息一下吧？」"
10016050-132 = "不，我沒事。#n我沒有參加比賽，目前體力還很充裕……"
10016050-133 = "不，我沒事。#n我沒有參加比賽，目前體力還很充裕……"
10016050-134 = "再加上……不知何時會再出現像剛才那樣違反校規的學生。"
10016050-135 = "相較之下，千年和格黑娜的實行委員……"
10016050-136 = "看來似乎已經沉浸在慶典的氛圍之中，忘了自己的職責。"
10016050-137 = "[s3]「但這是難得的慶典……」\n[s4]「稍微享受一下也沒關係吧？」"
10016050-138 = "不，每個人都有自己的職責。#n享受慶典的職責就交給其他人。"
10016050-139 = "不，每個人都有自己的職責。#n享受慶典的職責就交給其他人。"
10016050-140 = "之前也說過了，大運動會的營運只不過是學園業務的延伸。"
10016050-141 = "我只要像往常一樣，盡我身為實現正義部副部長的職責就行了。"
10016050-148 = "哎呀，這不是[USERNAME]老師嗎？"
10016050-149 = "你好，老師。真巧呢！"
10016050-150 = "[s5]「嗨，桐乃，吹雪。」\n[s6]「你們在巡邏嗎？」"
10016050-151 = "是的！我們女武神警察學園為了讓學生們安全地享受慶典，#n會在會場內外執行警備業務！"
10016050-152 = "是的！我們女武神警察學園為了讓學生們安全地享受慶典，#n會在會場內外執行警備業務！"
10016050-153 = "不過田徑運動場還真大……#n光是繞一圈就要花費很多時間……"
10016050-154 = "我本來還因為不需要參加麻煩的比賽而覺得開心的……#n沒想到要在沒有陰涼處的運動場周圍巡邏……"
10016050-155 = "早知道就裝病在宿舍休息了……"
10016050-156 = "這可不行唷，吹雪。#n如果被發現是裝病的話，很可能會受到重懲的哦？"
10016050-157 = "這圈巡邏完之後，我請你吃千年的機器人特製的甜甜圈，一起努力到最後吧！"
10016050-158 = "機器人做的甜甜圈，味道會不一樣嗎……"
10016050-159 = "話說回來，旁邊這位……不就是三一實現正義部的副部長嗎！"
10016050-160 = "[s]「你們認識嗎？」"
10016050-161 = "是的。上午為了鎮壓企圖妨礙比賽的問題學生，吃了不少苦頭……"
10016050-162 = "就在那時，副部長用狙擊幫助了本官！#n拜其所賜，我們才能順利逮捕不良學生。在這裡再次向您致謝！"
10016050-163 = "別這麼說，受了女武神警察學園幫助的是我才對。"
10016050-164 = "每次有事件發生時，都能在極短的時間內迅速報告……#n多虧了這點，我們才能在事件一發不可收拾前解決。"
10016050-165 = "……那句「生活安全局將比誰都要早抵達現場」的確屬實。"
10016050-166 = "哈，哈哈……被這麼誇獎的話，總覺得很不好意思呢……"
10016050-167 = "話說回來，有在巡邏過程中發現什麼特別的問題嗎？"
10016050-168 = "沒有呢。沒發現什麼可疑的學生或物品……"
10016050-169 = "啊，這麼說來，我們剛才遇見了明明不是工作人員，卻搶著搬運競賽用備品的學生。"
10016050-170 = "明明是鋼架、鉛球這類沉重的備品，卻婉拒了我們的幫助。"
10016050-171 = "每當比賽結束，那個人都會比實行委員更早去搬運備品，真是充滿幹勁啊。"
10016050-172 = "……總覺得很可疑呢。"
10016050-173 = "根據早瀬同學給的資料，這次大運動會使用的備品都是交由機器人運輸，#n所以根本不需要用人力搬運……"
10016050-174 = "是，是這樣嗎？#n那麼那名學生究竟把備品搬去哪裡了呢？"
10016050-175 = "看來首先得確認一下那群學生的真面目……"
10016050-176 = "桐乃同學，請帶我去見到那名學生的地方。"
10016050-177 = "是！馬上為您帶路！"
10016050-178 = "嘖……有麻煩事即將發生的預感……"

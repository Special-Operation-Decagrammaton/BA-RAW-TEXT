[translation]
10016050-1 = "Episode 5;On Patrol"
10016050-5 = "Tsukuyo! Tsukuyo! Look over there!"
10016050-6 = "It's a special commemorative Millennium T-shirt that uses hologram technology to make you look invisible!"
10016050-7 = "Heehee. It's basically like a ninjutsu tool, but it does the ninjutsu for us! It would be perfect for infiltration operations."
10016050-8 = "C'mon, let's try it on! This is gonna be so cool!"
10016050-9 = "But is there...one that would fit me...?"
10016050-10 = "I don't think the ninjutsu will work if I rip it..."
10016050-11 = "Don't worry! They have a really inclusive range of sizes!"
10016050-12 = "We can't let this opportunity to research other schools' ninjutsus pass us by!"
10016050-19 = "Whoa, whoa! Lookit all these cool machines making food! All by themselves?! Is this how it is all the time at Millennium?"
10016050-20 = "Chise, Chise! Over there! That automatic takoyaki machine is making takoyaki...automatically! I have to try it!"
10016050-21 = "Mm... I just thought of a good haiku."
10016050-22 = "Hello? Earth to Chise?"
10016050-23 = "Yeah... I got one."
10016050-25 = "#n #nRolling, rolling."
10016050-27 = "#n #n #n #nA noise like no other."
10016050-29 = "#n #n #n #n #n #nRoll, ramune marble."
10016050-32 = "I said takoyaki, not ramune!"
10016050-33 = "C'mon, Chise! We have to go before they run out!"
10016050-38 = "Wow! Millennium even has a cheer squad?"
10016050-39 = "Look at those hologram drones! And your specially made uniforms... You all really put all your spirit into it!"
10016050-40 = "...It's not an official cheer squad or anything..."
10016050-43 = "Heehee! Just consider us Millennium's meisters turned cheer experts!"
10016050-44 = "Judging by your uniform, you must be a Trinity student."
10016050-45 = "Yup! I volunteered to help treat any injured athletes for field day with the Remedial Knights!"
10016050-46 = "When caring for a patient, you have to consider both their physical and mental health!"
10016050-47 = "So while the seniors do all the hard technical stuff with medicine and bandages, I'll mend their hearts with the force of my cheers!"
10016050-48 = "You have a strong and earnest voice. I like that."
10016050-49 = "This is exactly the kind of spirit I would expect from the Millennium cheer squad's rival!"
10016050-53 = "Our rival? Are you talking about the cheering competition?"
10016050-54 = "The cheering competition is based on the spirit and energy of the cheer squads! It allows non-athletes to participate in the day as well. Some might say it's a bonus competition that takes place in the stands!"
10016050-55 = "It's too bad I have to be in the obstacle race... I won't be able to take part in the cheering competition!"
10016050-57 = "Let me do it. I'll join the obstacle race."
10016050-58 = "Honestly neither are my strong point, but I'd rather do that than cheer."
10016050-59 = "Hibiki! That is not the attitude of a meister!"
10016050-60 = "The Halo Festival is a time to test your physical limits and potential..."
10016050-61 = "If there was any day to try things you're not good at, it would be today! It helps you understand the value of different perspectives and ways of life!"
10016050-62 = "C-Captain! That was so inspiring!"
10016050-63 = "I'm all fired up! As your rival, I'll bring my all to the cheering competition!"
10016050-64 = "That's the spirit! I'll be honored to meet you on the battlefield."
10016050-68 = "...Please let this be over soon."
10016050-72 = "[ns] \"Everyone seems to be really enjoying the festival.\""
10016050-74 = "Um... N-Natsu... That parfait..."
10016050-77 = "Hm? Are you interested in this parfait?"
10016050-78 = "If you see the value of this delectable parfait, you must have very keen senses... I wouldn't expect anything less from the Justice Task Force!"
10016050-79 = "I bought this from the L'Oiseau Bleu food stall out where all the vendors are."
10016050-80 = "L'Oiseau Bleu parfaits are incredibly hard to find, let alone one from a pop-up store. It's a once-in-a-lifetime opportunity."
10016050-81 = "I-I see... But that's not..."
10016050-82 = "Unlike parfaits from the main store where they whip the cream and cut up fresh fruit for each order, they have to bring frozen ingredients for pop-up stores."
10016050-83 = "To make up for the inferior ingredients, they add three scoops of ice cream instead of two. Therefore, while it may lose in quality, the pop-up parfait is aesthetically superior."
10016050-84 = "This unbalanced parfait is the perfect symbol of all that is the Kivotos Halo Festival..."
10016050-85 = "Wait, wait, wait. It's not about the parfait!"
10016050-86 = "I've been trying to tell you this entire time that you can't eat while you're walking on the road!"
10016050-87 = "What do you mean? Why shouldn't I?"
10016050-88 = "W-Well... It's against school rules. And it's improper..."
10016050-89 = "You're correct. Eating and walking is strictly prohibited by Trinity's rules..."
10016050-91 = "But we are at the Halo Festival, are we not? Does Trinity's authority reach this far?"
10016050-92 = "I-I don't know...?"
10016050-93 = "Proper... Improper... What does that really mean? Anyone with proper manners will eat with utensils, but then it's considered improper to eat traditional curry with a spoon rather than your hands."
10016050-94 = "This parfait here sits within a disposable container specifically designed to allow for ease of eating while performing activities...like walking. Wouldn't it be improper to not consume it in the intended way?"
10016050-96 = "So, therefore, eating while walking must be the proper way to act during the Kivotos Halo Festival!"
10016050-98 = "I-I think you might be right...!"
10016050-99 = "She is not. Natsu, you're confusing her with your twisted logic."
10016050-100 = "The Halo Festival isn't a free-for-all. Even the Executive Committee isn't above the rules here."
10016050-101 = "Ah. It seems I've been caught."
10016050-102 = "And plus, you're tempting me with all that sugar...the delicious, refreshing ice cream..."
10016050-103 = "Ahem! I mean, you could spill on other students if you're carrying around such a large parfait!"
10016050-104 = "Please finish your parfait in one of the designated lounge areas."
10016050-105 = "I can't do that. The other After-School Sweets Club members will find me if I stay in one of the lounges too long."
10016050-106 = "If they find me eating this delectable parfait, they'll all beg me incessantly to buy them one too."
10016050-107 = "I'm not willing to take that chance. You'll have to eat it."
10016050-108 = "Huh? Me?"
10016050-109 = "Yes. It's a shame I won't be able to enjoy this special, one-of-a-kind parfait, but my passion for desserts isn't so one-dimensional. As long as someone gets to appreciate it, well, I think that's the most romantic thing ever."
10016050-110 = "Well, I'm off to find the other members. Don't forget, it's about the romance."
10016050-114 = "This parfait is so big... What am I supposed to do?"
10016050-115 = "Ugh... I've been so good about my diet this time. This parfait alone surpasses my calorie limit for three days combined."
10016050-116 = "..."
10016050-117 = "But... It would be wrong to waste it as well..."
10016050-118 = "[s] \"Maybe it's okay to eat just one?\""
10016050-119 = "S-Sensei?! When did you get here?"
10016050-120 = "[s] \"A while ago.\""
10016050-121 = "A while...? Ah..."
10016050-122 = "W-Well... I was planning on giving this parfait to a colleague!"
10016050-123 = "The parfait seemed really important to Natsu. You should be the one to have it..."
10016050-124 = "I ate a big lunch just now. I can't afford to eat any more calories."
10016050-125 = "You've been working so hard in this heat. Why don't you take a break and enjoy this refreshing parfait?"
10016050-126 = "Th-Thank you... I'll enjoy it!"
10016050-130 = "*sigh*"
10016050-131 = "[s1] \"You look pretty tired.\"\n[s2] \"Why don't you take a break yourself, Hasumi?\""
10016050-132 = "No, I'm okay. I already ate and I'm not participating in the games, so I'm at full stamina."
10016050-133 = "No, I'm okay. I already ate and I'm not participating in the games, so I'm at full stamina."
10016050-134 = "And I could never relax like that while on patrol. We have to remain alert for any potential threats."
10016050-135 = "I wish the Executive Committee members from Millennium and Gehenna felt similarly..."
10016050-136 = "It seems they've forgotten their responsibilities because they're too busy enjoying the festival."
10016050-137 = "[s3] \"Well, it is a festival meant for everyone...\"\n[s4] \"You can afford to let loose for a moment, right?\""
10016050-138 = "No. Everyone has a role to play. Enjoying the festival simply isn't written into my responsibilities."
10016050-139 = "No. Everyone has a role to play. Enjoying the festival simply isn't written into my responsibilities."
10016050-140 = "It's as I told you earlier. This is no different from my regular academic duties."
10016050-141 = "I have to uphold Trinity's name and perform my duties as the vice president of the Justice Task Force. As usual."
10016050-148 = "Oh, it's [USERNAME] Sensei!"
10016050-149 = "Hey there, Sensei! I didn't expect to run into you here!"
10016050-150 = "[s5] \"Hello, Kirino and Fubuki.\"\n[s6] \"Are you two on patrol?\""
10016050-151 = "Hello! We're in charge of security for field day so that all the students can enjoy the festival safely."
10016050-152 = "Hello! We're in charge of security for field day so that all the students can enjoy the festival safely."
10016050-153 = "But because the Athletic Stadium is so big, it takes a long time to make even one round."
10016050-154 = "I was happy we didn't have to join the games, but it's so much work walking around in this heat. There's not even any shade!"
10016050-155 = "If I had known it'd be like this, I would've called in sick and lazed around in my dorm."
10016050-156 = "Fubuki! It's wrong to lie to get off work! You could get in trouble."
10016050-157 = "If you finish this patrol, I'll buy you a special Millennium donut. I heard they're made by robots! Okay? So you can do it!"
10016050-158 = "Oh? I wonder if a robot-made donut would taste different from a regular donut..."
10016050-159 = "Ah! You're the vice-president of the Justice Task Force, right?"
10016050-160 = "[s] \"Do you know each other?\""
10016050-161 = "We met recently! We were trying to take down some bad students who were trying to disrupt the games."
10016050-162 = "And then Hasumi stepped in and helped us arrest them! We really appreciated it!"
10016050-163 = "It was my pleasure. The students of Valkyrie Police School have been very helpful throughout this event."
10016050-164 = "Your reports to the Executive Committee regarding any suspicious behavior has been essential in keeping the peace throughout this field day."
10016050-165 = "You've very much proven the Public Safety Bureau's reputation for speed and efficiency."
10016050-166 = "Hahaha! You're too kind. Thank you! I'm happy I could be of service."
10016050-167 = "Have you run into any issues during your patrol?"
10016050-168 = "Not so far! No suspicious persons or items to report."
10016050-169 = "Oh, we did run into a few students carrying around equipment for the next game. I thought it was a little strange because they weren't staff members."
10016050-170 = "We asked, but they said they didn't need any help. I thought that was weird because their box looked heavy! They were carrying around shot put balls and iron frames."
10016050-171 = "I couldn't imagine being so hardworking. They got there before anyone else and took things as soon as the game was over."
10016050-172 = "...That sounds rather suspicious to me."
10016050-173 = "According to the document I received from Yuuka, all of the equipment was to be transported by robots, so there was no need for students to volunteer for that task..."
10016050-174 = "R-Really? Then where and why were they taking the equipment?"
10016050-175 = "Considering the circumstances, we should investigate these students."
10016050-176 = "Kirino, can you take us to where you last saw them?"
10016050-177 = "Of course! I saw them at the main building! I'll take you there right away!"
10016050-178 = "Ugh... This might turn into something annoying..."

10016050-95 = "#all;hide"
10016050-96 = "3;나츠 학교 체육복;05;어쩌면 황륜대제에서만큼은 걸어 다니며 파르페를 먹는 게 정의일지도……!\n#3;closeup\n#3;em;[!]"
10016050-97 = "#all;hide"
10016050-98 = "3;정의실현부 부원 학교 체육복;04;드, 듣고 보니까 그런 것 같기도……\n#3;closeup\n#3;em;[땀]\n#3;stiff"
10016050-99 = "3;하스미 체육복;01;……이상한 말로 부원들을 현혹하지 말아 주세요, 나츠 씨.\n#3;closeup\n#3;em;[반응]"

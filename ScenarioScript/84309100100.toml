[translation]
84309100100-5 = "歡迎。感謝你的迅速回應。"
84309100100-6 = "這沒什麼。#n話說這次的呼叫還真緊急……發生什麼事了嗎？"
84309100100-7 = "沒錯，而且情況相當緊急。#n甚至讓我不得不在計算完成之前就先請你們兩個過來。"
84309100100-8 = "哦？你會這樣確實挺罕見的。看來是真的很急啊？"
84309100100-9 = "難道已經亂成一團了嗎？"
84309100100-10 = "也許他不是那個意思……"
84309100100-11 = "沒錯，事情已經發生了。#n因此這不是「預防」，而是「收拾」行動。"
84309100100-12 = "……！？"
84309100100-13 = "啊……？那是什麼意思？發生什麼事了嗎？"
84309100100-15 = "你先冷靜。#n雖然事情確實已經發生，但還沒有出現有人傷亡的情況。"
84309100100-16 = "只是內部的警備系統異常啟動，進入了攻擊狀態而已。#n只要避開系統監視，使其停止運作就沒問題了。"
84309100100-17 = "剛好現在……會場裡空無一人。"
84309100100-18 = "原來如此。#n雖然清場之後裡面沒人……但如果置之不理，明天開場時就會有人受傷。"
84309100100-19 = "嗯……如果是這樣的話，通知研討會不就好了嗎？#n聽起來不像非得由我們出面解決啊？"
84309100100-20 = "不，寧瑠。話不能這麼說。"
84309100100-21 = "一旦有人正式向研討會提出建議，研討會自然會向C&C提出委託……"
84309100100-22 = "啊……到頭來還是我的事啊。"
84309100100-23 = "……呿。"
84309100100-25 = "我認為如果我們可以解決的話，就沒必要在這麼晚的時候吵醒研討會的成員。"
84309100100-26 = "那樣對研討會成員的狀態也不太好。#n他們畢竟還有活動與管理的任務在身。"
84309100100-28 = "……所以你的意思是，不想吵醒睡得正香甜的後輩們嗎？"
84309100100-29 = "還真溫柔啊。想幫忙的意願泉湧而出。"
84309100100-34 = "這……"
84309100100-35 = "我可沒有這麼說……"
84309100100-37 = "你又來了，直接坦白說出來會怎樣嗎？"
84309100100-38 = "就這樣吧，寧瑠。#n現在不是爭論的時候，還是趕緊讓警備系統恢復正常比較好。"
84309100100-39 = "你為什麼又理所當然地想跟我一起去啊……"
84309100100-40 = "……？#n難道你不喜歡嗎？"
84309100100-44 = "……哈！"
84309100100-45 = "我怎麼會不喜歡呢。#n每天都像在玩好玩的遊戲一樣啊。"
84309100100-46 = "那真是太好了，我本來還擔心你會覺得我是累贅呢。"
84309100100-47 = "你是累贅沒錯啊？#n只不過是有比沒有好罷了。"
84309100100-48 = "呵呵，我會更努力的。"
84309100100-50 = "……我會替你們準備能操作配電箱的駭入工具，你們只要過去安裝就行了。"
84309100100-51 = "另外希望你們在過程中盡量不要破壞設備。#n我不想讓研討會的成員……"
84309100100-55 = "……讓優香和乃愛一早就得忙個不停。"
84309100100-56 = "那小雪呢？"
84309100100-57 = "反正小雪他也……"
84309100100-58 = "說的也是。當我沒說過吧。"

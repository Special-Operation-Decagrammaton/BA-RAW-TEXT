[translation]
84309100100-5 = "Welcome. Thanks for responding so quickly."
84309100100-6 = "No problem. It sounded urgent. What's going on?"
84309100100-7 = "It is rather urgent. Enough so that I called both of you even before I ran the numbers."
84309100100-8 = "BEFORE you ran the numbers? Oh, this MUST be a big deal."
84309100100-9 = "Is there already a mess out there, or what?"
84309100100-10 = "I don't think she meant it that way..."
84309100100-11 = "In a way, I did. The situation has already occurred. This isn't a pre-emptive operation, it's a cleanup."
84309100100-12 = "What?"
84309100100-13 = "What are you talking about? What happened?"
84309100100-15 = "Easy. No one's been hurt."
84309100100-16 = "It's just that...the internal security system malfunctioned, and now it's in attack mode. Still manageable, if we can evade the system's surveillance and shut it down."
84309100100-17 = "Fortunately, there's no one in the Exhibition Hall right now."
84309100100-18 = "I see. That makes sense. It's after closing time. But if we left it until tomorrow, someone could get hurt."
84309100100-19 = "Hm... You think we ought to call Seminar for this one? It doesn't sound like a job for us specifically."
84309100100-20 = "No, Neru. It probably isn't."
84309100100-21 = "...Then again, if we call Seminar, then Seminar will call C&C..."
84309100100-22 = "...and it'll be my job anyway."
84309100100-23 = "Tsk."
84309100100-25 = "Since we CAN handle it, I decided we didn't need to wake the Seminar members at this hour."
84309100100-26 = "They have their hands full enough just managing the event. And then if they end up sleep-deprived..."
84309100100-28 = "...You just didn't want to wake your underclassmen from their sweet, sweet slumber?"
84309100100-29 = "How considerate of you. NOW I want to help."
84309100100-34 = "...I..."
84309100100-35 = "I wouldn't put it that way..."
84309100100-37 = "Look, you can just be straight with us. We're not going to hold it against you."
84309100100-38 = "Well, I'm ready. Let's go ahead and take care of it."
84309100100-39 = "You say that like it's a given you're coming along."
84309100100-40 = "...?? Do you not want me to?"
84309100100-44 = "...Ha!"
84309100100-45 = "Of course I do. I was just playing with you."
84309100100-46 = "I'm glad. I didn't want to be a burden."
84309100100-47 = "You are a burden. Just better than nothing."
84309100100-48 = "Fufu, I'll try harder, then."
84309100100-50 = "...I'll prepare a hacking tool. You'll just need to go the control panel and install it there."
84309100100-51 = "And please keep the property damage to a minimum. The Seminar members..."
84309100100-55 = "...Well, I don't want Yuuka or Noa to be tired first thing in the morning."
84309100100-56 = "What about Koyuki?"
84309100100-57 = "...Koyuki is probably..."
84309100100-58 = "Never mind. I didn't mean anything by that."

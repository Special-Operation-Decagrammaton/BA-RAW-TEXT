[translation]
84309100100-5 = "มาแล้วเหรอ ขอบใจที่ตอบรับอย่างรวดเร็วนะ"
84309100100-6 = "ไม่หรอกค่ะ จะว่าไป ครั้งนี้เรียกตัวมาค่อนข้างกะทันหันเลยนะคะ เกิดเรื่องอะไรขึ้นงั้นเหรอคะ?"
84309100100-7 = "ใช่ แล้วมันก็เป็นเรื่องที่เร่งด่วนมากเลยละ เร่งด่วนขนาดที่ฉันต้องเรียกพวกเธอสองคนมาก่อนที่จะ#nวิเคราะห์สถานการณ์ด้วยซ้ำ"
84309100100-8 = "ปกติแล้วเธอไม่ค่อยเรียกใครมาก่อนวิเคราะห์สถานการณ์นี่นา คงจะรีบมากเลยละสิท่า?"
84309100100-9 = "หรือว่าเกิดเรื่องอะไรขึ้นจนสับสนวุ่นวายกันไปหมดแล้ว?"
84309100100-10 = "อาจจะไม่ใช่อย่างนั้นก็ได้ค่ะ..."
84309100100-11 = "ใช่แล้วละ เหตุการณ์มันเกิดขึ้นไปแล้ว นี่จึงไม่ใช่การ 'ป้องกัน' แต่เป็นการ 'รับมือ'"
84309100100-12 = "...!?"
84309100100-13 = "ว่าไงนะ...? หมายความว่ายังไง เกิดเรื่องอะไรขึ้นน่ะ?"
84309100100-15 = "ใจเย็นๆ ก่อน เหตุการณ์มันเกิดขึ้นไปแล้วก็จริง แต่ตอนนี้ยังไม่มีใครได้รับบาดเจ็บ"
84309100100-16 = "ก็แค่ระบบรักษาความปลอดภัยภายในทำงานผิดปกติ ระบบก็เลยอยู่ในสถานะโจมตีน่ะ ถ้าหลบหลีก#nการตรวจจับของระบบแล้วเข้าไปหยุดการทำงานของระบบได้ ก็จะไม่เกิดปัญหามากไปกว่านี้"
84309100100-17 = "โชคดีที่ตอนนี้... ไม่มีใครอยู่ในห้องสาธิตด้วย"
84309100100-18 = "ตอนนี้เราปิดการสาธิตอยู่ ก็เลยไม่มีคนอยู่ข้างใน... แต่ถ้าเราปล่อยไว้อย่างนี้ พรุ่งนี้ตอนเปิดการสาธิต#nต้องมีคนได้รับบาดเจ็บแน่เลยค่ะ"
84309100100-19 = "อืม... แต่ถ้าเป็นเรื่องนี้ เราก็แจ้งปัญหาทางเซมิน่าอย่างเป็นทางการก็ได้นี่? ฉันว่าไม่ใช่เรื่องที่พวกเรา#nต้องแก้ปัญหาสักหน่อย?"
84309100100-20 = "ไม่หรอกค่ะ เนรุ ฉันไม่คิดอย่างนั้นค่ะ"
84309100100-21 = "แน่นอนว่าถ้ามีใครแจ้งปัญหานี้กับเซมิน่า เซมิน่าก็จะมาหารือกับทาง C&C..."
84309100100-22 = "อ่า... ยังไงก็เป็นงานของฉันสินะ"
84309100100-23 = "ชิ..."
84309100100-25 = "ถ้าเป็นเรื่องที่พวกเราคลี่คลายเองได้ ฉันก็มองว่าเราไม่จำเป็นต้องปลุกสมาชิกเซมิน่าในเวลาดึกดื่น#nแบบนี้"
84309100100-26 = "เพราะถ้าทำอย่างนั้นก็คงไม่ดีต่อสภาพร่างกายของเซมิน่าที่ต้องตื่นมาจัดงานในวันรุ่งขึ้นอีก"
84309100100-28 = "สุดท้ายก็เพราะไม่อยากปลุกรุ่นน้องที่กำลังหลับปุ๋ยอยู่งั้นเหรอ?"
84309100100-29 = "อ่อนโยนกับรุ่นน้องจังเลยนะคะ แบบนี้ฉันยิ่งอยากเข้าไปช่วยเลยค่ะ"
84309100100-34 = "นั่นมัน..."
84309100100-35 = "ฉันไม่ได้พูดถึงขนาดนั้นนะ..."
84309100100-37 = "เอาอีกแล้วๆ ถ้ายอมรับไปตามตรง มันจะเกิดเรื่องอะไรขึ้นกับเธอหรือไง?"
84309100100-38 = "เอาเถอะค่ะ เนรุ เราใช้เวลานี้ไปรับมือระบบรักษาความปลอดภัยในงานดีกว่าค่ะ"
84309100100-39 = "แล้วทำไมเธอถึงจะไปด้วยกันกับฉันราวกับว่านี่เป็นเรื่องปกติของเราเลยล่ะ..."
84309100100-40 = "หรือว่าไม่อยากไปกับฉันคะ...??"
84309100100-44 = "เฮอะ...!"
84309100100-45 = "อยากสิ รู้สึกเหมือนได้เล่นเกมสนุกๆ อยู่ทุกวันเลยละ"
84309100100-46 = "โล่งอกไปทีค่ะ ฉันไม่อยากให้รู้สึกว่าตัวเองเป็นภาระน่ะค่ะ"
84309100100-47 = "ก็ไม่เชิงหรอกนะ? แต่ก็ดีกว่าไปตัวเปล่าๆ นั่นละ"
84309100100-48 = "ฮุฮุ ฉันจะพยายามให้มากขึ้นค่ะ"
84309100100-50 = "ฉันจะเตรียมอุปกรณ์แฮ็กที่ใช้ควบคุมตู้ไฟฟ้าให้ ถ้าไปถึงแล้วก็ติดตั้งอุปกรณ์นี้ได้เลย"
84309100100-51 = "หวังว่าจะทำงานได้โดยไม่ทำลายอุปกรณ์ใดๆ ที่นั่นเท่าที่จะทำได้นะ เพราะว่าฉัน..."
84309100100-55 = "ไม่อยากให้ยูกะ โนอา และสมาชิกเซมิน่าคนอื่นต้องเหนื่อยกันตั้งแต่เช้าน่ะ"
84309100100-56 = "แล้วโคยูกิล่ะ?"
84309100100-57 = "โคยูกิน่ะ ยังไงก็..."
84309100100-58 = "ช่างเถอะๆ ไม่มีอะไรหรอก ฉันแค่ถามไปอย่างนั้นละ"

84309100100-5 = "3;리오;01;어서 와. 빠르게 응답해 줘서 고마워.\n#3;a"
84309100100-6 = "3;세이아;02;아니에요. 그나저나 이번에는 꽤나 다급한 호출이었네요. 무슨 일이 있나요?"
84309100100-7 = "3;리오;00;있어. 그것도 실제로 상당히 다급한 일이야. 상황을 계산하기도 전에 두 사람을 우선 불렀을 정도로."
84309100100-8 = "3;네루 교복;01;헤에, 네가 계산보다 먼저 사람을 찾는 경우는 그리 많지 않았는데. 어지간히 급했나 봐?\n#3;em;[반응]"
84309100100-9 = "3;네루 교복;24;뭐, 이미 일이 터져서 난장판이라도 나 있는 상황인 거야?"
84309100100-10 = "3;세이아;04;그런 뜻은 아닐지도……."
84309100100-11 = "3;리오;99;맞아. 이미 상황은 발생했고, 이건 '예방'이 아니라 '수습' 작전이야.\n#3;em;…"
84309100100-12 = "3;네루 교복;17;……!?\n#3;em;[?!]\n#3;shake"
84309100100-13 = "3;네루 교복;05;뭐……? 그게 무슨 소리야, 무슨 일인데?\n#3;a\n#3;closeup"
84309100100-14 = "#all;hide"
84309100100-15 = "3;리오;99;침착해. 상황이 벌어졌긴 하지만, 아직 누군가 다치는 일까지는 일어나지 않았으니."
84309100100-16 = "3;리오;01;그저 내부의 경비 시스템들이 오작동을 일으켜 공격 상태로 돼 있을 뿐이야. 시스템의 감시를 피해 작동을 중단시킨다면 문제가 없겠지."
84309100100-17 = "3;리오;00;마침 지금은…… 시연장에 그 누구도 존재하지 않고."
84309100100-18 = "3;세이아;99;과연, 폐장 이후라 안에는 사람이 없지만…… 그래도 그대로 두면 내일 개장 시 누군가 다치게 된다는 거군요.\n#3;em;…"
84309100100-19 = "3;네루 교복;05;음…… 그런 거라면 공식적으로 세미나에 알리면 되는 일 아니야? 딱히 우리가 해결해야 할 일로는 안 들리는데?"
84309100100-20 = "1;세이아;02;아뇨, 네루. 그렇지는 않겠지요.\n#3;m5\n#1;ar\n#1;em;[반응]"
84309100100-21 = "1;세이아;01;물론 누군가 세미나에 공식적으로 건의를 한다면, 세미나에서는 C&C에 건의를 할 테니……."

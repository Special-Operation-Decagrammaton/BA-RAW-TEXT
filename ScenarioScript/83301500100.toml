[translation]
83301500100-6 = "พอมาโคโตะขอร้องให้แสดงเปิดงาน ตอนแรกก็คิดว่าจะทำยังไงดี"
83301500100-7 = "แต่โชคดีที่มีเปียโนอยู่ที่นี่พอดี..."
83301500100-8 = "ถ้าเป็นที่นี่... ไม่ว่ายังไงก็น่าจะทำได้ละนะ"
83301500100-9 = "เพื่อคุณครูที่กำลังตั้งตารองานปาร์ตี้..."
83301500100-11 = "ดีละ มาเริ่มกันเลย"

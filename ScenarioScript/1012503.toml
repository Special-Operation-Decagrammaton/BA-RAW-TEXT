[translation]
1012503-1 = "Witch Hat"
1012503-4 = "Ugh... Master! Good, you're here."
1012503-5 = "I don't know what to do."
1012503-6 = "I have a practical exam this afternoon...with a NOTORIOUSLY nitpicky proctor..."
1012503-7 = "...but they told me I can't bring anything magic-related, not even my witch hat!"
1012503-8 = "\"Don't wear the hat\"?! They might as well tell me to walk around naked!"
1012503-12 = "Ugh, what should I do?"
1012503-13 = "I don't WANT to walk around naked, Master!"
1012503-19 = "[ns1] \"...L-Let's talk about this someplace else!\"\n[ns2] \"Way too many people watching here.\""
1012503-25 = "I found someplace quiet and heard Eri out."
1012503-28 = "[ns3] \"So you can only bring art supplies to the exam room.\"\n[ns4] \"That actually sounds pretty reasonable.\""
1012503-31 = "Wait, so YOU want me to go without the hat?"
1012503-32 = "Y-You want me to be all embarrassed?"
1012503-33 = "[s] \"Not at all!\""
1012503-34 = "The only way I can fix this is by having a different proctor."
1012503-35 = "...Hmm, I COULD curse the one proctor to have an all-day stomachache..."
1012503-36 = "[s] \"Y-You can do that?\""
1012503-37 = "Nothing's impossible with magic. If I sneak some pills into their food..."
1012503-38 = "[s] \"That's not magic! That's illegal!\""
1012503-39 = "U-Ugh...!"
1012503-40 = "You're right, you're right. I shouldn't do that."
1012503-41 = "...So there's no way to change the proctor, then."
1012503-42 = "I'll have to walk into that exam room completely unarmed."
1012503-43 = "Then I'll run out of mana, and they'll who-knows-what to me...!"
1012503-44 = "[s5] \"Hey, no need to panic.\"\n[s6] \"What if we practice painting without your hat?\""
1012503-47 = "Right now?"
1012503-48 = "...Well, 'if not now, when,' right?"
1012503-49 = "*exhale*"
1012503-50 = "All right. I'll take it off, here and now. I might as well be stripping naked, but I'll do it."
1012503-54 = "...Look the other way for a moment, if you could, please."
1012503-56 = "I closed my eyes and turned my head, like she asked me to."
1012503-60 = "*exhale*"
1012503-61 = "Honestly, I'd rather wear nothing BUT the hat..."
1012503-62 = "[s] \"No, no, please keep everything else on!\""
1012503-63 = "I-I know! It was a joke, just a joke!"
1012503-64 = "Anyway...I suppose you can open your eyes now."
1012503-66 = "H-How do I look? Bizarre, I assume?"
1012503-67 = "[s7] \"Not at all.\"\n[s8] \"You look natural. Don't worry about it.\""
1012503-70 = "I-I see. Eheeheehee..."
1012503-71 = "Thank you, Master. That does make me feel better."
1012503-79 = "Oh hey, Eri."
1012503-80 = "Hi, Eri! No hat today, huh? It's been a while."
1012503-81 = "I-It's you! Um..."
1012503-82 = "H-H-Hello! Wh-What brings y-you here?!"
1012503-83 = "We're practicing for the exam."
1012503-84 = "What about you? Same?"
1012503-85 = "Well, let's all ace it together. I'll be rooting for you!"
1012503-86 = "Th-Th-Thank you! I-I-I'll do the best I can...!!"
1012503-91 = "A-Ah...! It's all over! Someone from my major saw me naked...!"
1012503-92 = "[s] \"You're not naked! Get a hold of yourself!\""
1012503-93 = "...R-Right!#nO-Other people take their hats off, right?#n...Normally."
1012503-98 = "...Ugh, I honestly can't do this."
1012503-99 = "One way or another, I HAVE to get into that room with my hat ON."
1012503-100 = "...Maybe I could make a witch hat that other people can't see."
1012503-101 = "Then I could put THAT on, walk in, and..."
1012503-102 = "...no, that'd be the same as taking my hat off!"
1012503-106 = "What is this, \"The Emperor's New Clothes\"?!"
1012503-107 = "Oh, this is horrible! Are you sure I shouldn't cast that stomachache curse?"
1012503-108 = "[s9] \"L-Let's calm down and practice painting!\"\n[s10] \"I'm sure you'll be able to paint just fine if you keep practicing!\""
1012503-111 = "Ugh, do you really think I can do this?"
1012503-112 = "[s] \"I do. And I'll keep on supplying you with mana.\""
1012503-113 = "If you say so..."
1012503-114 = "...All right, Master. Maybe I can reframe this somehow."
1012503-115 = "...Ah. I can go without the hat, and tell myself that I'm a nude model."
1012503-116 = "Nudity is a part of art. I wouldn't look out of place at all."
1012503-117 = "[s] \"M-Maybe not that, exactly, but keep your chin up!\""
1012503-119 = "(Afterwards, I went on posing for Eri's practice paintings.)"

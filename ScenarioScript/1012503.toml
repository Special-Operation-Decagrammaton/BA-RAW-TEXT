[translation]
1012503-1 = "หมวกแห่งเวทมนตร์"
1012503-4 = "ฮือออ มาแล้วเหรอคะมาสเตอร์!"
1012503-5 = "ฉันจะทำยังไงดีล่ะคะ?"
1012503-6 = "วันนี้ตอนบ่ายฉันมีสอบปฏิบัติค่ะ... ซึ่งผู้คุมสอบเป็นคนที่ขึ้นชื่อว่าโหดหินสุดๆ เลยด้วย!"
1012503-7 = "เขาบอกว่าห้ามนำสิ่งของที่เกี่ยวข้องกับเวทมนตร์เข้าห้องสอบโดยเด็ดขาด รวมถึงหมวกเวทมนตร์ด้วยค่ะ!"
1012503-8 = "การต้องเข้าห้องสอบโดยที่ไม่สวมหมวกเวทมนตร์ มันไม่ต่างกับบอกให้ฉันเดินไปบนท้องถนน#nโดยไม่ใส่เสื้อผ้าเลยนะคะ!"
1012503-12 = "ฮือ.... ฉันจะทำยังไงดีคะ?"
1012503-13 = "มาสเตอร์... ฉันไม่อยากเดินไปไหนมาไหนแบบโล่งโจ้งนะคะ"
1012503-19 = "[ns1] \"กะ... ก่อนอื่นเปลี่ยนที่คุยกันก่อนเถอะ!\"\n[ns2] \"ตรงนี้มีคนมองเยอะแยะเลย!\""
1012503-25 = "(คุณครูนั่งฟังเรื่องราวของเอริอย่างใจเย็น)"
1012503-28 = "[ns3] \"แสดงว่าเอาเข้าไปได้แค่อุปกรณ์วาดรูปสินะ\"\n[ns4] \"ที่เขาทำก็ถูกอยู่นะ\""
1012503-31 = "มาสเตอร์ก็จะบอกว่าฉันควรถอดหมวกงั้นเหรอคะ?"
1012503-32 = "หมายความว่า... มาสเตอร์ต้องการเห็นภาพลักษณ์ที่น่าอายของฉัน...?"
1012503-33 = "[s] \"ไม่ได้อยากเห็นสักหน่อย!!\""
1012503-34 = "ถ้าฉันไม่อยากตกที่นั่งลำบาก... คงไม่มีทางเลือกนอกจากเปลี่ยนผู้คุมสอบแล้วสินะคะ"
1012503-35 = "คงจะต้องใช้เวทต้องสาปแล้วสินะคะ? สาปให้วันนั้นปวดท้องไปทั้งวัน..."
1012503-36 = "[s] \"ชะ... ใช้เวทมนตร์แบบนั้นได้ด้วยเหรอ?\""
1012503-37 = "ไม่มีอะไรที่เวทมนตร์ทำไม่ได้ค่ะ ถ้าแอบเอายาใส่ลงในอาหารละก็..."
1012503-38 = "[s] \"แบบนั้นมันเรียกเวทมนตร์ที่ไหนเล่า แถมผิดกฎหมายด้วย!!\""
1012503-39 = "ฮือออออ...!"
1012503-40 = "ฉันรู้ค่ะว่าไม่ควรทำอะไรแบบนั้น"
1012503-41 = "ตอนนี้เป็นไปไม่ได้ที่จะเปลี่ยนตัวผู้คุมสอบด้วย..."
1012503-42 = "ฉันคงจะต้องเข้าไปในห้องสอบโดยปราศจากอาวุธใดๆ เลยสินะคะ"
1012503-43 = "แล้วเมื่อใช้พลังเวทจนหมดและไร้หนทางป้องกันตัวก็คงจะหมดสภาพและอับจนหนทาง...!"
1012503-44 = "[s5] \"ตอนนี้ก็ยังไม่สายหรอกนะ มาเริ่มฝึกกันเถอะ!\"\n[s6] \"มาฝึกวาดรูปตอนถอดหมวกกันเถอะ!\""
1012503-47 = "ตอนนี้เนี่ยนะคะ?"
1012503-48 = "อย่างนี้นี่เอง... สำหรับฉันมันไม่มีเวลาแล้ว ไม่มีช่วงให้พักเลยสินะคะ"
1012503-49 = "ฮือ...."
1012503-50 = "ดีละ ถ้างั้นฉันจะถอดค่ะ ถึงมันจะน่าอายเหมือนการเปลื้องผ้า แต่ฉันก็จะถอดค่ะ...!"
1012503-54 = "ช่วยหลับตาแล้วหันหลังไปก่อนได้มั้ยคะ... ฉะ... ฉันอายจริงๆ นะคะ"
1012503-56 = "(คุณครูหันหลังและหลับตาตามที่เอริบอก)"
1012503-60 = "ฮือ...."
1012503-61 = "บอกตามตรงเลยนะคะฉันยอมใส่หมวกแล้วถอดเสื้อผ้าออกยังจะดีซะกว่า..."
1012503-62 = "[s] \"ขอร้องละ ห้ามทำอะไรแบบนั้นนะ!!\""
1012503-63 = "ฉะ... ฉันรู้แล้วค่ะ! แค่ล้อเล่นเฉยๆ ค่ะ ล้อเล่น!"
1012503-64 = "เอาเถอะค่ะ ฉันถอดเสร็จเรียบร้อยแล้ว ลืมตาได้แล้วค่ะ!"
1012503-66 = "ปะ... เป็นยังไงบ้างคะ? แปลกหรือเปล่าคะ?"
1012503-67 = "[s7] \"ไม่แปลกเลย\"\n[s8] \"ดูเป็นธรรมชาติมากเลย ไม่ต้องกังวลหรอก\""
1012503-70 = "ยะ... อย่างนั้นเหรอคะ แหะๆๆ..."
1012503-71 = "ขอบคุณมาสเตอร์มากนะคะ ฉันมีแรงขึ้นมาเลยค่ะ"
1012503-79 = "อ๊ะ เอริจังนี่นา"
1012503-80 = "สวัสดีจ้ะ เอริจัง! ไม่เห็นเธอถอดหมวกแบบนี้มานานแล้วนะ"
1012503-81 = "ทะ... ทะ... ทุกคน...?!"
1012503-82 = "สะ... สะ... สะ... สวัสดีค่ะ! มะ... มีเรื่องอะไรถึงมาที่นี่เหรอ?!"
1012503-83 = "ก็มาซ้อมสำหรับสอบปฏิบัติช่วงบ่ายน่ะสิ"
1012503-84 = "เอริจังก็มาซ้อมเหมือนกันเหรอ?"
1012503-85 = "มาพยายามไปด้วยกันเถอะ! สู้ๆ!"
1012503-86 = "ขะ... ขะ... ขอบคุณค่ะ! ฉะ... ฉันจะพยายามเต็มที่เลยค่ะ...!!"
1012503-91 = "อะ... อ๊า...!! แย่แล้วค่ะ! ฉันถูกเพื่อนร่วมชั้นเห็นตอนเปลือยเปล่าซะแล้ว...!"
1012503-92 = "[s] \"สติ! เธอไม่ได้เปลือยสักหน่อย!\""
1012503-93 = "งะ... งั้นเหรอคะ!#nกะ... การถอดหมวกก็ไม่ใช่เรื่องใหญ่อะไรเลย...! คะ... แค่เรื่องธรรมดา..."
1012503-98 = "ฮือออ... ไม่ไหวจริงๆ ค่ะ"
1012503-99 = "ไม่ว่าจะใช้วิธีไหนก็ตาม ฉันจะต้องหาทางเอาหมวกเข้าไปห้องสอบให้ได้แล้วละค่ะ"
1012503-100 = "ค่ะ... ฉันจะใช้เวทมนตร์สร้างหมวกล่องหนที่คนอื่นมองไม่เห็นขึ้นมาค่ะ"
1012503-101 = "ถ้าใส่หมวกนั่นเข้าห้องสอบก็อาจไม่เป็น..."
1012503-102 = "ไม่สิ... แบบนั้นมันก็ไม่ต่างกับการไม่ได้สวมหมวกเลยน่ะสิ!"
1012503-106 = "ไม่ต่างกับ \"พระราชาที่ไม่ใส่เสื้อผ้า\" น่ะสิ?!"
1012503-107 = "อ๊าาา หมดกัน! ใช้เวทมนตร์สาปให้ปวดท้องนั่นแหละดีที่สุด...!"
1012503-108 = "[s9] \"จะ... ใจเย็นๆ แล้วซ้อมวาดรูปก่อนเถอะ!\"\n[s10] \"ถ้าฝึกไปเรื่อยๆ จะต้องวาดผลงานที่ยอดเยี่ยมได้แน่!\""
1012503-111 = "ฮือออ ฉันจะทำได้จริงๆ เหรอคะ?"
1012503-112 = "[s] \"อื้อ! ครูจะอยู่ข้างๆ คอยช่วยเติมมานาให้เอง!\""
1012503-113 = "ถ้ามาสเตอร์ว่าอย่างนั้น..."
1012503-114 = "เข้าใจแล้วค่ะ มาสเตอร์ ฉันจะเปลี่ยนความคิดแล้วฮึดสู้ดูค่ะ"
1012503-115 = "ใช่แล้วค่ะ ฉันจะคิดว่าตัวเองเป็นนางแบบภาพเปลือยแล้วลืมความเขินอายไป"
1012503-116 = "เพราะภาพเปลือยก็เป็นงานศิลป์แขนงหนึ่งเหมือนกันค่ะ..."
1012503-117 = "[s] \"ถะ... ถึงดูแปลกๆ นิดหน่อยแต่ก็พยายามเข้านะ!\""
1012503-119 = "(หลังจากนั้นคุณครูก็ช่วยเป็นแบบให้เอริฝึกวาดภาพ)"

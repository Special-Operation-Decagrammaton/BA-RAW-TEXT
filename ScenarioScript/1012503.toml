[translation]
1012503-1 = "魔法帽"
1012503-4 = "嗚嗚……御者，歡迎你來！"
1012503-5 = "該怎麼辦才好呢？"
1012503-6 = "今天下午有實作考試……而且是監考官又是出了名的嚴格！"
1012503-7 = "聽說他會禁止攜帶魔法帽，甚至任何與魔法相關的東西都不能帶進去！"
1012503-8 = "要我不戴帽子進考場，簡直跟要我光著身子走在街上沒兩樣！"
1012503-12 = "嗚嗚……我該怎麼辦？"
1012503-13 = "御者……我不想一絲不掛地走來走去。"
1012503-19 = "[ns1]「先換個地方吧！」\n[ns2]「這裡人太多了！」"
1012503-25 = "（在安靜的地方冷靜聽繪梨說話）"
1012503-28 = "[ns3]「所以考場只能帶畫具進去？」\n[ns4]「雖然這也是正常的規定啦……」"
1012503-31 = "御者也希望我脫下帽子嗎？"
1012503-32 = "換句話說……你也希望我露出最赤裸的樣子……？"
1012503-33 = "[s]「我不是這個意思！！」"
1012503-34 = "如果不想出糗的話，就只好換掉監考官了。"
1012503-35 = "果然得用出詛咒魔法了嗎？#n能讓他整天肚子痛的那種……"
1012503-36 = "[s]「那，那種魔法你也能用嗎？」"
1012503-37 = "魔法是無所不能的。#n只要在食物裡偷偷下藥……"
1012503-38 = "[s]「那不是魔法！是犯罪！！」"
1012503-39 = "嗚，嗚嗚嗚……！"
1012503-40 = "我也知道……不可以做這種事情。"
1012503-41 = "……看來想換掉監考官是不可能的。"
1012503-42 = "我只能被迫解除所有裝備進入考場……"
1012503-43 = "接著在耗盡所有魔力之後，陷入這樣那樣的窘境……！"
1012503-44 = "[s5]「現在還來得及！」\n[s6]「先練習不戴帽子畫畫吧！」"
1012503-47 = "現在馬上嗎？"
1012503-48 = "……說的也是。#n時間所剩不多，不能再猶豫了。"
1012503-49 = "呼……"
1012503-50 = "好吧，我會脫下帽子的。#n雖然跟全身脫光光一樣羞恥，但我會脫的……！"
1012503-54 = "……請閉上眼睛並轉過去吧。我真的很害羞。"
1012503-56 = "（依照繪梨的指示，閉上眼並轉過頭）"
1012503-60 = "呼……"
1012503-61 = "……感覺還不如直接戴帽子脫衣服算了。"
1012503-62 = "[s]「拜託請千萬別這麼做！！」"
1012503-63 = "我，我知道！只是開個玩笑而已！"
1012503-64 = "總之我準備好了。請睜開眼睛吧！"
1012503-66 = "怎，怎麼樣？會不會很奇怪？"
1012503-67 = "[s7]「一點也不奇怪哦。」\n[s8]「很自然，不用擔心。」"
1012503-70 = "這，這樣啊。妞呵呵呵……"
1012503-71 = "謝謝御者讓我有了勇氣。"
1012503-79 = "啊，是繪梨醬！"
1012503-80 = "嗨，繪梨醬！好久沒看你沒戴帽子了呢。"
1012503-81 = "各，各，各位……！？"
1012503-82 = "你你你你們好呀！#n怎，怎麼，怎麼會突然來這裡……！？"
1012503-83 = "我們來練習下午的實作考試。"
1012503-84 = "繪梨醬也是來練習的吧？"
1012503-85 = "考試一起加油哦！我們會替你應援！"
1012503-86 = "謝，謝謝，謝謝你們！我我我會努力的……！！"
1012503-91 = "啊，啊啊……！完蛋了！#n居然被同學看見我裸體的模樣……！"
1012503-92 = "[s]「不是被看見裸體！你先冷靜！」"
1012503-93 = "……說，說的也是！#n脫帽沒什麼大不了的……！#n……至少一般來說是這樣的。"
1012503-98 = "……嗚嗚，果然還是不行。"
1012503-99 = "我得想個辦法，至少要把帽子戴進考場才行。"
1012503-100 = "……對了，用魔法做一頂「隱形的魔法帽」吧！"
1012503-101 = "只要戴著它進去就安全……"
1012503-102 = "……不對，那不就跟沒戴一樣嗎！？"
1012503-106 = "根本是「國王的新衣」嘛！？"
1012503-107 = "啊啊啊，已經完蛋了！我看還是詛咒監考官肚子痛吧……！"
1012503-108 = "[s9]「冷靜下來，先練習畫畫！」\n[s10]「練習後一定能畫出好作品的！」"
1012503-111 = "嗚嗚嗚，我真的能做到嗎？"
1012503-112 = "[s]「嗯！我會在旁邊幫你補給魔力！」"
1012503-113 = "既然御者都這麼說了……"
1012503-114 = "……好吧。#n我會轉換心態，努力試試看的。"
1012503-115 = "沒錯。只要假裝自己是裸體模特兒，就能忘掉羞恥感了。"
1012503-116 = "畢竟裸體也是藝術的一部分……"
1012503-117 = "[s]「雖，雖然聽起來怪怪的，不過加油！」"
1012503-119 = "（之後成為了繪梨的模特兒，協助他努力練習實作考試）"

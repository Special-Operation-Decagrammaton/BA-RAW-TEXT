[translation]
10013030-1 = "ตอนที่ 3; คนงานเหมืองกำมะถัน 1"
10013030-5 = "พวกเรามุ่งหน้าไปที่ที่ใกล้ที่สุดกันก่อนเถอะค่ะ"
10013030-6 = "ฉันไม่รู้ว่าจะพูดชื่อถูกหรือเปล่า แต่กองกำลังที่ใช้ชื่อว่า"
10013030-11 = "[ns1] \"<คนงานเหมืองกำมะถัน ผู้ใฝ่ฝันในปฐพีร้อนระอุ>...?\"\n[ns2] \"พวกนั้นน่าจะมาอยู่แถวๆ นี้นะ\""
10013030-14 = "สมญานามอะไรเชยชะมัด ให้พูดกี่ครั้งก็ยังไม่ชินอยู่ดี... เป็นชื่อที่ฟังแล้วไม่ประทับใจเลย..."
10013030-15 = "แถวๆ นี้มีรีสอร์ตอยู่ใช่มั้ยคะ?"
10013030-16 = "อืม~ ไม่เห็นจะมีที่ที่พอจะเป็นรีสอร์ตได้เลยค่ะ"
10013030-17 = "อิซุนะเห็นแต่หาดทรายอย่างเดียวเลยค่ะ!"
10013030-19 = "อืมม~ หรือว่าที่พวกเรายังล่องลอยกันแบบนี้เพราะหาทางเข้าไม่เจอคะ?"
10013030-21 = "......?"
10013030-26 = "คุณครู"
10013030-27 = "[s] \"ว่าไง? ชิเซะ?\""
10013030-28 = "ฉันได้ยินเสียง... ก๊อกแก๊กๆ"
10013030-29 = "[s] \"ก๊อกแก๊กๆ...?\""
10013030-39 = "อ๊ะ จริงด้วยค่ะ! เสียงนี้เหมือนกับ..."
10013030-40 = "อยู่ทางโน้น ไปดูกันเถอะ"
10013030-51 = "ที่นี่คือ... รีสอร์ตที่จัดการโดยกองกำลังที่อ้างว่าตนเป็นผู้ยิ่งใหญ่ในหมู่เกาะ...?"
10013030-52 = "ฉันว่ามันดูเหมือน..."
10013030-53 = "[s] \"แค่ป่าทึบธรรมดาไม่ใช่เหรอ?\""
10013030-54 = "จะเรียกแบบนั้นเลยเหรอคะคุณครู?!"
10013030-55 = "แต่ว่าตั้งแต่เข้ามาข้างใน ฉันก็คิดแบบนั้นเลยค่ะ"
10013030-62 = "ที่นี่ดูจะไม่ใช่แค่สถานที่พักผ่อนธรรมดาๆ นะคะ"
10013030-63 = "พื้นดินมีการขุดทำลายจนทั่วเลย นี่มันที่อะไรกันคะนายท่าน?"
10013030-64 = "[s] \"ไม่รู้สิ ที่นี่อาจจะ......\""
10013030-66 = "นี่! ใครอยู่ตรงนั้นน่ะ?! ทำไมจู่ๆ ก็มาโผล่ตรงนี้ได้ ทำไมไม่มาทางประตูหน้าล่ะ?"
10013030-72 = "พบกลุ่มคนปริศนาที่น่าสงสัย! ทุกคนมารวมตัวกันเร็วเข้า!!"
10013030-73 = "หืม? ดะ...เดี๋ยวสิ?!"
10013030-80 = "[ns] \"เอ๋ นี่พวกเธอ...\""
10013030-81 = "อะไรกัน ใส่ชุดว่ายน้ำมาแบบนี้... เป็นแขกเหรอ?"
10013030-82 = "ไม่นะ ไม่น่าจะเป็นแขก... ดูผู้ใหญ่ที่ยืนอยู่ตรงกลางนั่นสิ! ดูน่าสงสัยมากเลยว่ามั้ย?"
10013030-83 = "เอ๋? เหมือนเคยเห็นหน้าที่ไหนมาก่อนเลย... ใครกันนะ..."
10013030-85 = "นั่นใครน่ะ คุณครูจากชาเล่ต์ไม่ใช่หรอกเหรอน่ะ!"
10013030-86 = "[s] \"เมกุ!\""
10013030-87 = "ว่าไง~! คุณครู! ตกใจหมดเลยที่ได้เจอกันที่นี่~!"
10013030-89 = "คนรู้จัก... อีกแล้วเหรอคะ...?"
10013030-90 = "[s3] \"ทำไมมองครูด้วยสายตาน่าสงสัยแบบนั้นล่ะ...!\"\n[s4] \"ครูก็แค่รู้จักชมรมพัฒนาออนเซ็นก็เท่านั้นเอง!\""
10013030-93 = "ฉันก็ว่า 'คนงานเหมืองกำมะถัน' หมายถึงอะไร... ที่แท้ก็ชมรมพัฒนาออนเซ็นจากเกเฮนน่าเองเหรอคะ"
10013030-94 = "ใช่แล้ว! บน <ลอสต์ พาราไดซ์ รีสอร์ต> แห่งนี้ พวกฉันคือ <คนงานเหมืองกำมะถัน ผู้ใฝ่ฝันในปฐพีร้อนระอุ>"
10013030-95 = "เป็นสมญานามของชมรมพัฒนาออนเซ็นที่เท่ระเบิดไปเลยใช่มั้ยล่ะ? ขนาดฉันเป็นคนตั้งเองยัง#nคิดว่าเป็นชื่อที่ดีมากๆ เลย"
10013030-96 = "[s] \"คิดเองด้วยเหรอ?!\""
10013030-97 = "อื้ม ใช่แล้ว~♪ แต่ไม่คิดเลยนะว่าจะได้มาเจอกับคุณครูที่นี่~?"
10013030-98 = "ทำไมล่ะ? ทำไมถึงมาเดินเตร็ดเตร่อยู่ที่นี่ได้น่ะ? กลายเป็นเด็กหลงทางไปแล้วเหรอ?"
10013030-100 = "พวกฉันต่างหากที่อยากถามแบบนั้น พวกเธอมาทำอะไรกันในกลางป่าแบบนี้?"
10013030-101 = "ดูจะเป็นกิจการรีสอร์ตผิดกฎหมายนะ..."
10013030-103 = "ถามอะไรโง่ๆ แบบนั้น!"
10013030-108 = "หัวหน้าคาสุมิ!"
10013030-112 = "ออนเซ็นอยู่ที่ไหน พวกเราอยู่ที่นั่น! เอ๊ะ เดี๋ยวสิ! ถึงจะไม่มีออนเซ็นก็มีเราได้เหมือนกัน!"
10013030-113 = "อื้ม! เพราะเราจะขุดทุกอย่างแล้วทำให้เป็นออนเซ็นให้ได้!"
10013030-114 = "ว้าว! เท่สุดๆ ไปเลยค่ะ! เหมือนงานเทศกาลเลย!"
10013030-115 = "มันใช่เวลามาปลาบปลื้มมั้ย อุมิกะ?! นั่นมันก็แค่ความดื้อดึงต่างหากเล่า!"
10013030-117 = "อื้ม~ นี่เป็นการพบกันที่คาดไม่ถึงเลยนะ คุณเองเหรอ คุณครูจากชาเล่ต์?"
10013030-118 = "[s] \"สวัสดี\""
10013030-119 = "ไม่คิดเลยว่าจะได้เจอกันในที่แบบนี้ เด็กๆ ในชมรมเล่าเรื่องคุณให้ฟังเยอะเลย"
10013030-120 = "ยินดีต้อนรับสู่รีสอร์ตออนเซ็นทะเลลึกของชมรมพัฒนาออนเซ็นนะ~"
10013030-121 = "[s] \"ออนเซ็น... ทะเลลึก?\""
10013030-122 = "ฉันจะขอถามอีกรอบ... ชมรมพัฒนาออนเซ็นมาทำอะไรที่นี่กันแน่?"
10013030-123 = "ถามอะไรแปลกๆ ก็มาพัฒนาออนเซ็นน่ะสิ!"
10013030-124 = "มาพัฒนา... ในป่าทึบแบบนี้น่ะเหรอคะ?"
10013030-125 = "ถึงจะเป็นป่าทึบ แต่มันก็อยู่ติดกับชายหาดไม่ใช่เหรอ? อย่ามาดูถูกประสาทรับกลิ่นของฉันนะ"
10013030-126 = "เรากระตุ้นภูเขาไฟที่อยู่ใต้พื้นโคลนของป่าแห่งนี้ แล้วสร้างออนเซ็นน้ำทะเลด้วยสายแร่ที่ซ่อนอยู่ได้!"
10013030-127 = "เราจะเจาะมันเอง! เจาะแล้วสร้างออนเซ็นขึ้นมาให้ได้!"
10013030-128 = "[s] \"อ๊ะ! เหมือนเคยได้ยินเรื่องนี้มาก่อนเลย!\""
10013030-129 = "คะ... คุณครู?!"
10013030-130 = "ออนเซ็นทะเลลึก แค่ฟังก็เยี่ยมไปเลยใช่มั้ยล่ะ? จากการสันนิษฐานของฉัน แค่สรรพคุณก็มีเกิน 365 อย่างแล้ว!"
10013030-131 = "และถ้าจะให้เลือกสรรพคุณที่ได้ผลเป็นพิเศษ ก็คงจะเป็นการส่งเสริมสมรรถภาพทางกาย เพิ่มผลการเรียน เพิ่มความปลอดภัยในบ้าน และการฝึกฝนวิชานินจาอย่างเป็นธรรมชาติ!  "
10013030-132 = "สะ... สุดยอดไปเลยค่ะ! ออนเซ็นทะเลลึกมีประโยชน์ขนาดนี้เลยเหรอคะ? อิซุนะไม่เคยรู้มาก่อนเลยค่ะ!"
10013030-133 = "[s] \"อิซุนะ?! นี่เธอเชื่อคนง่ายขนาดนี้เลยเหรอ?!\""
10013030-134 = "ไม่นะ ไม่นะ ไม่นะ ไม่มีทางเป็นแบบนั้นไปได้!"
10013030-135 = "เด็กเอาแต่ใจพวกนี้... คือหนึ่งในกองกำลังที่แข็งแกร่งที่สุดในหมู่เกาะนี้จริงเหรอ...?"
10013030-136 = "อ๋อ~ ถ้าเป็นเรื่องนั้น จะว่าจริงก็ได้นะ"
10013030-137 = "ระหว่างที่พวกเราพัฒนาออนเซ็นอยู่ ก็มีพวกที่เอะอะบุกเข้ามาด้วยเรื่องหนังสือสัญญา และก็รีสอร์ตด้วยน่ะ!"
10013030-138 = "และพวกเราชาวชมรมพัฒนาออนเซ็นก็ไล่คนพวกนั้นไปทุกครั้ง อื้ม เรียกว่าปั่นป่วนเลยแหละ"
10013030-139 = "ส่วนเจ้าพวกที่โดนพวกเราเล่นงานไป ก็ไปอยู่ในพื้นที่พัฒนาทางด้านโน้นแล้ว"
10013030-140 = "อื้ม! พวกเราเองก็ยินดีที่มีกำลังคนในการพัฒนาออนเซ็นเพิ่มขึ้นด้วย"
10013030-141 = "คนที่ทำงานด้านโน้นก็คงสนุกกับการพัฒนาออนเซ็นไปกับเรา~~!"
10013030-142 = "แบบนี้ดีทั้งสองฝ่ายเลย!"
10013030-143 = "หัวหน้าคาสุมิคืออัจฉริยะตัวจริง!"
10013030-144 = "วะฮะฮะฮ่า! ไม่มีใครมาหยุดยั้งความตั้งใจที่พวกเรามีต่อทะเลลึกได้หรอก~!"
10013030-145 = "[s] \"ความยึดมั่นที่มีต่อทะเลลึก...! ชมรมพัฒนาออนเซ็นนี่น่ากลัวจัง...!\""
10013030-146 = "จะว่าไป แล้วพวกเธอล่ะมาทำอะไรกันที่นี่? ดูทรงแล้วไม่น่าจะมาพักในรีสอร์ตออนเซ็นกันเฉยๆ เลยนะ"
10013030-147 = "หรือว่ามาเพราะเรื่อง <การล่ารีสอร์ต> งั้นเหรอ?"
10013030-152 = "พวกเธอก็มีหนังสือสัญญาที่ระบุเรื่อง <ตั๋วใช้งานรีสอร์ต> ไว้อยู่เหมือนกันใช่มั้ย?"
10013030-153 = "อ้อ! อื้ม! ก็เห็นมีขายถูกๆ ในอินเทอร์เน็ต เลยซื้อมาเพราะคิดว่าเราอาจจะพัฒนาออนเซ็นที่นี่ได้ไงล่ะ~"
10013030-154 = "[s] \"มีขายในอินเทอร์เน็ตเลยเหรอ?!\""
10013030-155 = "อื้ม ก็หาซื้อมาแบบนั้นแหละ ทำไมเหรอ?"
10013030-157 = "หนังสือสัญญานั่นเป็นหนังสือสัญญาผิดกฎหมายที่เผยแพร่โดยธนาคารทาโกะค่ะ"
10013030-158 = "และพวกฉันก็มาที่นี่เพื่อขอมันคืน!"
10013030-159 = "เพราะงั้น ได้โปรดคืนให้อิซุนะด้วยเถอะค่ะ!"
10013030-161 = "อ๋อ โฮ่ หืม... อย่างนั้นสินะ"
10013030-162 = "มาขอความร่วมมือจากพวกฉันเพราะมีเหตุผลบางอย่างสินะ"
10013030-163 = "อื้ม ขอแค่ได้สัญญาคืนก็พอ...!"
10013030-167 = "ไม่เอาอะ"
10013030-169 = "อึก?!"
10013030-170 = "จะด้วยเหตุผลอะไรก็ช่างเถอะ แต่ว่าสัญญานั่นเป็นของที่พวกฉันซื้อมานะ แถมที่ลงทุนไปในรีสอร์ต ออนเซ็นแห่งนี้ก็ไม่ใช่น้อยๆ"
10013030-171 = "อื้ม! ก็พวกเราสร้างที่จอดรถ สิ่งอำนวยความสะดวกในออนเซ็น และที่พักไว้หมดแล้ว!"
10013030-172 = "ถึงจะยังไม่ได้สร้างส่วนสำคัญที่สุดอย่างบ่อน้ำพุร้อนก็เถอะนะ!"
10013030-173 = "[s] \"แล้วเรียกที่นี่ว่ารีสอร์ตออนเซ็นไปแล้วเนี่ยนะ...?\""
10013030-174 = "เพราะงั้นก็เลยยอมให้กันง่ายๆ ไม่ได้ไงล่ะ!"
10013030-175 = "งั้นก็แปลว่า..."
10013030-176 = "ก็แปลว่า ถ้าอยากได้หนังสือสัญญานี้ไป... ก็ต้อง..."
10013030-177 = "ดวลกันแล้วแย่งไปให้ได้! หรือจะให้พูดแบบเป็นทางการก็คือ ก็ต้องเริ่มการ <ล่า> ซะ!"
10013030-178 = "[s] \"ทุกคนใจเย็นก่อน เรามาคุยเพื่อหาข้อตกลงกัน...\""
10013030-180 = "ชิ! ฉันไม่ได้อยากทำแบบนี้หรอกนะ"
10013030-181 = "แต่ก็ได้! ถ้าอยากจะให้เกิดความขัดแย้งนัก ฉันก็จะจัดให้!"
10013030-182 = "เพราะมันคือการต่อสู้ที่เกิดจากความรู้สึกแบบนี้อยู่แล้ว!"
10013030-183 = "เดินออกมาแล้วประกาศกร้าวให้มันดูกระฉับกระเฉงกว่านี้สิ!"
10013030-184 = "ถ้างั้นพวกเราก็~!"
10013030-185 = "เริ่มปะทะกันเลย~~"

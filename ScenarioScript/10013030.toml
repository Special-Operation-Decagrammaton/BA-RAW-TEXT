10013030-125 = "1;미모리 수영복ND;02\n3;카스미;02;밀림이라고는 해도, 바닷가에 인접한 장소라고? 내 후각을 속일 순 없어.\n#1;dl\n#3;em;[반응]\n#3;m3"

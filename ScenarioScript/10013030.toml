[translation]
10013030-1 = "Episode 3;Sulfur Miners 1"
10013030-5 = "Let's go to the closest location."
10013030-6 = "It's a bit embarrassing to say out loud, but..."
10013030-11 = "[ns1] \"Sulfur Miners Searching for Scorching Lands That Boil Eternally...\"\n[ns2] \"...Whatever their name, they must be close by.\""
10013030-14 = "Thanks, Sensei. Their code names are so peculiar."
10013030-15 = "I thought so too, but I don't see anything."
10013030-16 = "Me neither."
10013030-17 = "I just see lots and lots of sand."
10013030-19 = "I hope we're not lost. Maybe we need to find an entrance somewhere."
10013030-21 = "...?"
10013030-26 = "Sensei!"
10013030-27 = "[s] \"What's wrong, Chise?\""
10013030-28 = "...I hear a banging sound."
10013030-29 = "[s] \"Banging...?\""
10013030-39 = "Oh, I hear it! What a strange sound!"
10013030-40 = "It's coming from that direction! Come on!"
10013030-51 = "Is this...supposed to be a resort?"
10013030-52 = "It looks more like..."
10013030-53 = "[s] \"Like a jungle?\""
10013030-54 = "This is so strange!"
10013030-55 = "We're surrounded by trees and bushes."
10013030-62 = "Indeed, this is not exactly how I would picture a luxurious resort."
10013030-63 = "They've been digging up all the roots and wrecking the jungle! What are they doing, my lord?"
10013030-64 = "[s] \"Um... If I had to guess...\""
10013030-66 = "Hey! Who's there?! Someone got in without using the main entrance!"
10013030-72 = "Whoever they are, they sure are suspicious! Hey! Guys! We have some intruders!"
10013030-73 = "W-Wait! Let us explain!"
10013030-80 = "[ns] \"Oh, you guys...\""
10013030-81 = "Huh? They're wearing swimsuits. Are they guests?"
10013030-82 = "I doubt it. They look really suspicious, especially that adult in the middle."
10013030-83 = "Actually... That face looks a little familiar."
10013030-85 = "Duh! It's Schale's Sensei!"
10013030-86 = "[s] \"Megu!\""
10013030-87 = "Hi! Hello! I didn't expect to see you here, Sensei!"
10013030-89 = "You guys...know each other?"
10013030-90 = "[s3] \"Don't look at me so suspiciously!\"\n[s4] \"I have an acquaintance in the Hot Springs Department!\""
10013030-93 = "I was wondering what \"Sulfur Miners\" referenced... But it makes sense. You are the Hot Springs Department of Gehenna, correct?"
10013030-94 = "Yes! We're the Sulfur Miners Searching for Scorching Lands That Boil Eternally, here at the Lost Paradise Resort."
10013030-95 = "It's a fantastic code name for the Hot Springs Department! I came up with it myself!"
10013030-96 = "[s] \"Wow! All by yourself?\""
10013030-97 = "Yep! I know, pretty genius. But anyway, what brings you here, Sensei? ♪"
10013030-98 = "Didja get lost in the jungle?"
10013030-100 = "I'd like to ask you that. What was all of that banging and clanking I heard?"
10013030-101 = "It's incredibly suspicious, even for an illegal resort..."
10013030-103 = "What a dumb question!"
10013030-108 = "President Kasumi!"
10013030-112 = "You'll find us wherever there are hot springs! Even if there are no hot springs, we'll still be there!"
10013030-113 = "Yes! If there's no hot springs, we'll just make one!"
10013030-114 = "Wow! Incredible! That sounds very festive!"
10013030-115 = "Umika! Don't encourage their foolishness."
10013030-117 = "Now, this is an unexpected encounter. You're Schale's Sensei?"
10013030-118 = "[s] \"Hi. It's me.\""
10013030-119 = "This is a pleasant surprise. I've heard a lot about you from my girls."
10013030-120 = "Welcome to the Hot Spring Department's deep seawater hot spring resort!"
10013030-121 = "[s] \"Deep seawater...what?\""
10013030-122 = "I'll ask again... What is the Hot Springs Department doing here?"
10013030-123 = "What a silly question! We're doing what we do best: developing hot springs!"
10013030-124 = "Here in the jungle...?"
10013030-125 = "A jungle that's close to the beach! Thanks to my exquisite sense of smell, I've sniffed out its potential."
10013030-126 = "Deep down under our very feet, there are hidden veins that stimulate an underwater volcano, turning the deep seawater off the coast into boiling hot springs!"
10013030-127 = "We're going to dig until we create more hot springs!"
10013030-128 = "[s] \"Oh, I've actually heard of this before!\""
10013030-129 = "Sensei?!"
10013030-130 = "Deep seawater hot springs are incredible! According to my estimates, they provide over 365 health benefits!"
10013030-131 = "These include an increase in physical strength, family safety, and even an effect that provides natural ninjutsu training!"
10013030-132 = "N-N-Ninjutsu training?! Izuna didn't know deep seawater was so incredible!"
10013030-133 = "[s] \"Izuna! Use some critical thinking!\""
10013030-134 = "Hold up, hold up! I don't believe a word you said!"
10013030-135 = "I can't believe these train wrecks are the most powerful faction in the archipelago!"
10013030-136 = "Oh! Don't be intimidated by our reputation."
10013030-137 = "While we've been developing the hot springs, all kinds of Resort Hunters have been swarming in to take our contract."
10013030-138 = "We've very respectfully defeated them in honor of the Hot Springs Department!"
10013030-139 = "And then we very kindly allow them to work for us at the development site."
10013030-140 = "We gain free labor in the name of our mission..."
10013030-141 = "And they get to experience the joys of developing hot springs!"
10013030-142 = "It's a win-win situation!"
10013030-143 = "President Kasumi is really a bona fide genius!"
10013030-144 = "Wahahaha! No one can stop our passion for the deep seawater!"
10013030-145 = "[s] \"...Scary. You guys are scary.\""
10013030-146 = "Anyways, I'm guessing you're not here to soak in some hot springs."
10013030-147 = "Are you all Resort Hunters too?"
10013030-152 = "...You guys have a Resort Contract too, right?"
10013030-153 = "You betcha! It was being sold online, and we saw the development opportunity right away!"
10013030-154 = "[s] \"It was being sold online too?!\""
10013030-155 = "Is there a problem with that?"
10013030-157 = "The Octopus Bank did not own the rights to the contracts they illegally sold."
10013030-158 = "So, we are retrieving them and putting a stop to this Resort Hunt!"
10013030-159 = "Can you hand it over? Please?"
10013030-161 = "Oh, I see. Hmm. Interesting."
10013030-162 = "You want us to accommodate your particular circumstances and cooperate?"
10013030-163 = "Yes, please! Thank—"
10013030-167 = "Nah. I don't wanna."
10013030-169 = "Huh?!"
10013030-170 = "I don't care if they had the rights. We bought it, so it's ours. And we've invested too much into this hot springs resort already."
10013030-171 = "Yeah! We've already built a parking lot, a recreational facility, and an accommodation facility!"
10013030-172 = "All we need now is the hot springs!"
10013030-173 = "[s] \"...Isn't that just a normal resort?\""
10013030-174 = "Regardless, we're not handing over anything!"
10013030-175 = "Do you meant to say..."
10013030-176 = "If you want this contract...we're gonna have..."
10013030-177 = "A confrontation! A contest! We'll have to Hunt!"
10013030-178 = "[s] \"Wait, wait. Why don't we talk about this like civilized people?\""
10013030-180 = "Hmph. This wasn't my original plan, but..."
10013030-181 = "Momoyodou doesn't back down from a challenge!"
10013030-182 = "We'll fight to the last breath if that's what it takes!"
10013030-183 = "You're brazen enough to take us head on! Good!"
10013030-184 = "So, everyone!"
10013030-185 = "Okay. I'll fight."

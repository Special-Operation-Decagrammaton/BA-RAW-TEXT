[translation]
10013030-1 = "第3話;硫磺礦工們（１）"
10013030-5 = "首先往距離最近的團體的據點移動吧。"
10013030-6 = "雖然不太想講出來，但記得名字是──"
10013030-11 = "[ns1] 「『尋找夢幻溫泉的硫磺礦工們』──」\n[ns2] 「──他們在的地方就是這附近吧。」"
10013030-14 = "那個名字超難念的……而且，完全搞不懂他們到底是什麼樣的集團……"
10013030-15 = "那個，好像說這附近有個渡假勝地的樣子……"
10013030-16 = "完全沒看到類似的東西呢。"
10013030-17 = "伊樹菜只看到沙灘而已！"
10013030-19 = "嗯～難道說我們得先找到入口才行嗎？"
10013030-21 = "……？"
10013030-26 = "老師──"
10013030-27 = "[s] 「怎麼啦，知世？」"
10013030-28 = "……我聽到有咚咚的聲音。"
10013030-29 = "[s] 「聲音……？」"
10013030-39 = "啊，真的有呢！咦，這個聲音……"
10013030-40 = "好像是從那個方向傳來的呢。我們去看看吧！"
10013030-51 = "這裡……就是這個群島的最強勢力營運的渡假勝地……嗎？"
10013030-52 = "這個，該怎麼說呢……"
10013030-53 = "[s] 「不就是單純的叢林嗎？」"
10013030-54 = "怎麼直接說出來了！？"
10013030-55 = "我一進來的瞬間就這麼想了！"
10013030-62 = "這裡……看來不是普通的渡假勝地呢。"
10013030-63 = "看起來好像只是在到處挖土，隨意破壞的樣子……究竟是在做些什麼呢，主公？"
10013030-64 = "[s] 「那個大概是……」"
10013030-66 = "喂！你們是誰！為什麼沒有從正門進來！？"
10013030-72 = "雖然不是很懂，總之發現了看起來很可疑的傢伙！所有人集合！！"
10013030-73 = "咦？等，等一下！？"
10013030-80 = "[ns] 「咦？你們不就是……」"
10013030-81 = "什麼嘛，穿著泳裝也就是說……是客人嗎？"
10013030-82 = "但說是客人又有點……嗯？#n喂，看那個站在中間的大人……不覺得很奇怪嗎？"
10013030-83 = "那張臉，好像在哪看過……是在哪來著……"
10013030-85 = "……咦，這不是夏萊的老師嗎！"
10013030-86 = "[s] 「惠！」"
10013030-87 = "哈囉哈囉，老師！"
10013030-89 = "又是老師認識的人啊……？"
10013030-90 = "[s3] 「感受到了奇怪的視線……！」\n[s4] 「只是和溫泉開發部有過一面之緣而已啦！」"
10013030-93 = "啊，是這樣啊！#n「硫磺礦工們」指的就是格黑娜的溫泉開發部啊。"
10013030-94 = "沒錯沒錯！我們就是在「失樂園渡假勝地」有著「尋找夢幻溫泉的硫磺礦工們」──"
10013030-95 = "這種超讚名字的溫泉開發部唷！#n雖然名字是我自己取的啦！我的命名品味不錯吧？"
10013030-96 = "[s] 「竟然是自己取的！？」"
10013030-97 = "沒錯～♪#n話說老師，居然能在這裡見到你，真稀奇呢？"
10013030-98 = "為什麼會來這裡呢？難道是迷路了嗎？"
10013030-100 = "這應該是我的台詞吧。#n你們跑到這種叢林深處做什麼？"
10013030-101 = "違法的渡假勝地事業？看起來也不像啊……"
10013030-103 = "這個問題真是愚蠢啊！"
10013030-108 = "啊，佳澄部長！"
10013030-112 = "只要有溫泉在就有我們在！不，就算溫泉不在我們也在！"
10013030-113 = "不管怎樣只要挖出溫泉就行了！所以我們才在這裡！"
10013030-114 = "哇！真棒呢！簡直像慶典一樣！"
10013030-115 = "那是值得佩服的地方嗎！不就只是亂挖而已！"
10013030-117 = "你就是夏萊的老師嗎？這還真是意外的邂逅呢。"
10013030-118 = "[s] 「你好。」"
10013030-119 = "想不到竟然能在這種地方遇見老師……#n我可是常常從部員那裡聽到老師的事呢。"
10013030-120 = "歡迎來到我們溫泉開發部引以為傲的深海溫泉渡假勝地！"
10013030-121 = "[s] 「深海……什麼？」"
10013030-122 = "我再問你們一次……溫泉開發部究竟在這裡做什麼？"
10013030-123 = "呵，那當然──是在開發溫泉囉！"
10013030-124 = "在這種叢林裡……是嗎？"
10013030-125 = "這裡確實是叢林沒錯，但同時也是海邊。"
10013030-126 = "而且這裡的海底──沒錯！#n有著能刺激海底火山，將海洋深層水轉化為溫泉的寶藏地脈！我能聞到它的味道！"
10013030-127 = "所以說我們要把它挖出來，建設出溫泉！"
10013030-128 = "[s] 「啊，這句話我之前也聽過！」"
10013030-129 = "老，老師！？"
10013030-130 = "哼哼哼。聽好了，海洋深層水的溫泉可是很厲害的喔？#n根據我的推測，光是功能就超過365種！"
10013030-131 = "如果要舉幾個特別有效的功能的話，#n比如增進體力、提升成績、全家平安，甚至還能學會超乎常人的忍術喔！"
10013030-132 = "好，好厲害！#n海洋深層水竟然有這種效果……伊樹菜還是第一次知道！"
10013030-133 = "[s] 「伊樹菜！？一下就被說服了嗎！？」"
10013030-134 = "不不不，這怎麼可能嘛！"
10013030-135 = "話說回來，這些亂七八糟的孩子們真的是這群島最強的勢力嗎？"
10013030-136 = "啊，那是真的喔。"
10013030-137 = "在我們努力開發溫泉的時候，各種人都為了爭奪契約書和渡假勝地而來呢。"
10013030-138 = "當然，每到那個時候就會以溫泉開發部的名義擊退他們就是了。#n那可真是波瀾壯闊啊。"
10013030-139 = "現在被我們使喚的這些傢伙們就是那時候獲得的戰利品喔。"
10013030-140 = "嗯！我們能增加開發溫泉的人力──"
10013030-141 = "他們則能一起參與新溫泉的開發──"
10013030-142 = "簡直是一石二鳥呢！一兼二顧！摸蜆仔兼洗褲！"
10013030-143 = "佳澄部長真是個天才！"
10013030-144 = "哈～哈哈哈哈！不管是誰都無法阻止我們對海洋深層水的熱情！"
10013030-145 = "[s] 「對海洋深層水的執著……真是可怕，溫泉開發部！」"
10013030-146 = "話說回來，你們到底是來做什麼的？看起來也不像是來泡溫泉的客人。"
10013030-147 = "難道是「渡假勝地狩獵」嗎？"
10013030-152 = "……你們也有寫著「渡假勝地使用權」的合約對吧？"
10013030-153 = "啊，嗯！#n是在網路上便宜買到的，想說能進行溫泉開發就買了！"
10013030-154 = "[s] 「竟然連網路上也有賣！？」"
10013030-155 = "沒錯。怎麼了嗎？"
10013030-157 = "其實那個合約是章魚銀行四處散布的違法合約。"
10013030-158 = "我們就是為了回收那些合約而來的！"
10013030-159 = "所以拜託你們！請把合約還給伊樹菜的夥伴們吧！"
10013030-161 = "哦……嗯……嘿……原來如此。"
10013030-162 = "也就是說，想要請我們幫忙的意思囉。"
10013030-163 = "沒錯，就是這樣……"
10013030-167 = "我拒絕。"
10013030-169 = "咦！？"
10013030-170 = "不管有什麼原因，我們買下這裡的事實並沒有變。#n而且我們也已經在這個溫泉渡假勝地投資了不少錢了。"
10013030-171 = "嗯！像是停車場、休息設施和住宿設施之類的，已經都蓋好了！"
10013030-172 = "雖然最關鍵的溫泉還沒搞定就是了！"
10013030-173 = "[s] 「現在就稱它為溫泉渡假勝地沒問題嗎……？」"
10013030-174 = "所以不能說一句「好～我知道了～」就把這裡交給你們！"
10013030-175 = "也就是說……"
10013030-176 = "想要這份契約書的話，就按照字面上的意思──"
10013030-177 = "決鬥吧！爭奪吧！大聲呼喊吧！#n只能開始「狩獵」了！"
10013030-178 = "[s] 「大，大家先冷靜。還有協商的空間……」"
10013030-180 = "不……雖然這不是我的本意……"
10013030-181 = "好吧！如果你們要這樣的話我也奉陪！"
10013030-182 = "本來我們也不是沒想過要用這種手段！"
10013030-183 = "這毫不退讓的豪爽！就是要這樣！"
10013030-184 = "那麼，準備好了嗎？"
10013030-185 = "Ready──GO～！"

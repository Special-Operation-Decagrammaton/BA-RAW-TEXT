[translation]
2300306-1 = "การทรยศของเครื่องจักรกล"
2300306-2 = "ดาดฟ้าในโรงเรียนมิลเลเนียม"
2300306-3 = "กำลังรอคุณครูอยู่เลย"
2300306-4 = "อย่างที่บอกไปในอีเมลแล้วน่ะ ฉันปรับแต่งโดรนสำเร็จแล้วก็เลยมาทดสอบการบินที่ดาดฟ้า"
2300306-5 = "โดรนปรับแต่งนี้ไม่เพียงแต่จะเสริมความสามารถในด้านการบิน ยังมีระบบจดจำเสียง#nและมีหน่วยตรรกะ AI เบื้องต้นที่จะช่วยให้สามารถคุมมันด้วยเสียงได้อีกด้วย"
2300306-6 = "ชื่อของมันก็คือ... อาเธน่า 3!"
2300306-7 = "โดรนนี้ตั้งชื่อตามเทพีแห่งปัญญา และออกแบบโดยใช้อัลกอริทึมเชิงประจักษ์ที่จะช่วยให้มัน#nทำงานที่เกี่ยวกับการนึกคิดได้ในระดับสูง"
2300306-8 = "พูดอีกอย่างก็คือ โดรนนี้จะค้นหาวิธีที่เหมาะสมสำหรับทุกภารกิจที่ฉันสั่งผ่านการเรียนรู้ซ้ำๆ ของหุ่นยนต์"
2300306-9 = "[s1] \"เป็นฟังก์ชั่นที่น่าทึ่งมาก\"\n[s2] \"...ครูไม่เข้าใจที่พูดเลย\""
2300306-11 = "หืม...โทษที ฉันว่าฉันใช้ศัพท์เฉพาะทางมากไปหน่อย"
2300306-12 = "ถ้างั้นเรามาเริ่มทดสอบฟังก์ชันง่ายๆ กันเลยดีกว่ามั้ย?"
2300306-13 = "อาเธน่า 3 ใช้ฟังก์ชันกล้องถ่ายรูปคุณครูให้ทีสิ"
2300306-14 = "<เปิดใช้งานโหมดถ่ายภาพ ถ่ายรูปของเป้าหมาย \"คุณครู\">"
2300306-15 = "<รวบรวมรูปเซลฟี่จากโซเชียลมีเดียเพื่อวิเคราะห์เทรนด์ปัจจุบัน... คำนวณความสว่างของพื้นที่#nเพื่อประเมินมุมที่เหมาะสม...>"
2300306-16 = "<วิเคราะห์สำเร็จ โปรดอย่าขยับในระหว่างถ่ายรูป 3, 2, 1...>"
2300306-19 = "เป็นยังไงบ้าง? ออกมาดีใช่มั้ย?"
2300306-20 = "[s] \"เหมือนจะดูดีกว่าอันที่ครูไปถ่ายในสตูดิโอถ่ายรูปอีก...\""
2300306-21 = "หุ่นยนต์มองเห็นอะไรได้ดีกว่าสายตาของมนุษย์ นั่นเลยเป็นเหตุผลที่รูปนี้ดูดีกว่ารูปที่ถ่ายโดยกล้อง#nที่ใช้คนถ่าย"
2300306-22 = "นอกจากนี้มันยังมีฟังก์ชันอีกมากมาย มันมีการจัดการตารางเวลาและนาฬิกาปลุก รวมถึงฟังก์ชันเพื่อสุขภาพอย่างผู้ช่วยออกกำลังกายด้วย"
2300306-23 = "อาเธน่า 3 เปิดใช้งานผู้ช่วยออกกำลังกาย"
2300306-24 = "<เปิดใช้งานโหมดผู้ช่วยออกกำลังกาย ประเมินข้อมูลร่างกายของเป้าหมาย \"โอมาการิ ฮาเระ\">"
2300306-25 = "เอาละ เราไปวิ่งจ็อกกิงสั้นๆ ทดสอบกันหน่อยมั้ย?"
2300306-29 = "<ปี๊บ อุณหภูมิร่างกายและอัตราเต้นหัวใจของเป้าหมายเพิ่มขึ้นเล็กน้อย วิเคราะห์ประสิทธิภาพของ#nการออกกำลังกาย... แนะนำให้เพิ่มการออกกำลังให้หนักขึ้นเพื่อเผาผลาญแคลอรี่มากขึ้น>"
2300306-30 = "แฮ่ก แฮ่ก ตามที่เห็นนั่นล่ะ มันสามารถวิเคราะห์สภาพร่างกายของผู้ใช้งานได้อัตโนมัติ#nและทำหน้าที่เป็นเทรนเนอร์ส่วนตัวให้ได้"
2300306-31 = "เฮ้อ... แค่นี้คงพอแล้ว อาเธน่า 3 ปิดโหมดผู้ช่วยออกกำลังกาย"
2300306-32 = "<...>"
2300306-33 = "<ปี๊บ ไม่สามารถทำได้ ใช้งานโหมดผู้ช่วยต่อไป>"
2300306-34 = "หื้ม? แปลกจัง ระบบการตัดสินใจของโดรนไม่ควรจะมีความสามารถในการปฏิเสธคำสั่งของคนนะ... มันมีปัญหาตรงไหนกัน?"
2300306-35 = "อาเธน่า 3 เริ่มหยุดทำงานฉุกเฉิน และตรวจสอบระบบด้วยตัวเอง"
2300306-36 = "<ปี๊บ เสียใจด้วย คำสั่งของคุณไม่สามารถทำได้ โปรแกรมนี้ถูกออกแบบมาให้แนะนำวิธีการที่#nเหมาะสมที่สุดเสมอ>"
2300306-37 = "<เป้าหมาย \"โอมาการิ ฮาเระ\" กำลังเสี่ยงกับการรูปร่างไม่ตามเกณฑ์ที่เหมาะสมอย่างรุนแรง#nเนื่องจากขาดการออกกำลังกาย ดำเนินการการออกกำลังต่อ>"
2300306-38 = "<หากเป้าหมายไม่เคลื่อนไหวภายใน 30 วินาที โปรแกรมอาจปล่อยกระแสไฟฟ้ากระตุ้นให้ทำตาม>"
2300306-39 = "<3...2....1>"
2300306-40 = "ดะ.. เดี๋ยวสิ... รอเดี๋ยวก่อน...!"
2300306-45 = "<ยืนยันการผลาญแคลอรี่ของเป้าหมาย \"โอมาการิ ฮาเระ\" เพียงพอแล้ว#nปิดโหมดออกกำลังกาย...>"
2300306-46 = "แฮ่ก แฮ่ก.... จบสักที..."
2300306-47 = "อาเธน่า 3... เริ่มปิดเครื่องฉุกเฉิน ทีนี้ก็ไม่ต้องขยับแล้ว ไม่เป็นไรแล้วละ..."
2300306-48 = "<ยอมรับ กำลังปิดเครื่อง>"
2300306-50 = "เฮ้อ... การทดสอบโดรนในวันนี้นี่หายนะชัดๆ เลย"
2300306-51 = "ฉันไม่คิดว่าหน่วยตรรกะจะให้ความสำคัญกับการทำภารกิจมากกว่าเชื่อฟังคำสั่งของผู้ใช้งาน#nและปิดเครื่องไป... ฉันว่าฉันประเมินพลังของอัลกอริทึมการเรียนรู้ต่ำเกินไป..."
2300306-52 = "ฉันควรจะกลับไปแพทช์โปรแกรมใหม่ตั้งแต่ต้น"
2300306-53 = ".....และฉันก็ต้องเอาฟังก์ชันผู้ช่วยออกกำลังกายที่ไม่จำเป็นนี้ออกไปด้วย"
2300306-54 = "[s] \"ทำไมไม่ปล่อยฟังก์ชันผู้ช่วยออกกำลังกายไว้แบบนั้นล่ะ?\""
2300306-55 = "ไม่เอาด้วยหรอก!"
2300306-56 = "คนเราควรจะออกกำลังกายตอนที่พวกเขาต้องการเท่านั้น ไม่ใช่ตอนที่ถูกบังคับกันสิ"
2300306-57 = "แต่ว่ามันก็ไม่ผิดที่จะชี้ว่าฉันกำลังต้องการการออกกำลังกายมากๆ..."
2300306-58 = "แต่ถึงยังไงมนุษย์ก็ไม่ควรที่จะใช้ชีวิตโดยให้หุ่นยนต์มาควบคุมนะ!"
2300306-60 = "ฮาเระดูมุ่งมั่นมากกว่าปกติในขณะที่พูด..."

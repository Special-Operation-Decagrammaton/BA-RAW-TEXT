[translation]
2300306-1 = "#title;기계의 배신"
2300306-2 = "#place;밀레니엄 학원 옥상"
2300306-3 = "3;하레;03;기다리고 있었어, 선생님.\n#3;a\n#3;em;[반응]\n#3;greeting"
2300306-4 = "3;하레;02;메일로 말했던 것처럼 드론의 개조가 모두 끝났거든. #n그래서 시험 삼아 옥상에서 비행 조종을 해보려고 해."
2300306-5 = "3;하레;99;이 개조 드론은 비행 능력이 월등히 개선되었을 뿐만 아니라, 음성 인식 시스템과 간단한 AI 연산 장치가 탑재되어 목소리만으로도 명령을 내릴 수 있어."
2300306-6 = "3;하레;05;이름하여…… 아테나 3호—!\n#3;em;[!]"
2300306-7 = "3;하레;02;지혜의 여신에게서 이름을 따온 이 드론은 경험적 알고리즘을 기반으로 설계되었기 때문에 인지적 과제를 수행할 수 있는 능력이 있어."
2300306-8 = "3;하레;03;다시 말해 기계 학습을 반복하면 어떤 명령을 내리든 최적의 해를 구할 수 있다는 말이지.\n#3;em;[반짝]\n#3;greeting"
2300306-9 = "[s1] \"그것 참 대단한 기능인걸.\"\n[s2] \"……무슨 말을 하는 지 이해할 수가 없어.\""
2300306-10 = "#wait;100"
2300306-11 = "3;하레;04;음…… 미안. 내가 너무 어려운 말만 쓴 것 같네.\n#3;em;[땀]"
2300306-12 = "3;하레;03;그럼 간단한 기능부터 몇 가지 시험해볼까?"
2300306-13 = "3;하레;02;아테나 3호, 카메라 기능으로 선생님을 촬영해 줘.\n#3;em;[반응]"
2300306-14 = "#all;hide\n#na;아테나 3호;<촬영 모드 ON. 지금부터 대상 \"선생님\"의 사진을 촬영합니다.>"
2300306-15 = "#na;아테나 3호;<SNS에서 셀카 사진을 수집하여 최신 유행을 파악하는 중…… 주변 환경의 밝기를 계산하여 최적의 각도를 추산하는 중…….>"
2300306-16 = "#na;아테나 3호;<분석 완료. 사진이 촬영되는 동안 움직이지 마십시오. 3, 2, 1…….>"
2300306-17 = "#all;hide"
2300306-18 = "#wait;1500"
2300306-19 = "3;하레;02;어때, 잘 나왔지?\n#3;em;[?]"
2300306-20 = "[s] \"사진관에서 찍은 것보다 더 잘 나온 것 같아…….\""
2300306-21 = "3;하레;01;기계의 눈은 사람보다 더 정확하니까. 직접 사진기를 들고 찍는 것보다 더 우수하지.\n#3;greeting"
2300306-22 = "3;하레;03;이 이외에도 일정 관리나 알람은 물론이고 운동 보조 같은 피트니스 기능도 쓸 수 있어."
2300306-23 = "3;하레;02;아테나 3호, 지금부터 운동 보조 기능을 활성화해줘.\n#3;em;[반응]"
2300306-24 = "#na;아테나 3호;<운동 보조 모드 ON. 대상, \"오마가리 하레\"의 신체 변화를 측정합니다.>"
2300306-25 = "3;하레;03;자, 그럼 시험 삼아 잠깐 달려볼까?\n#3;em;[음표]\n#3;greeting"
2300306-26 = "#all;hide"
2300306-27 = "#wait;1000"
2300306-28 = "#all;hide"
2300306-29 = "#na;아테나 3호;<삑— 대상자의 체온 및 심박수가 소폭 상승하였습니다. 운동 효과 분석 중……. 효율적인 칼로리 소비를 위해서 운동 강도를 높일 것을 권장합니다.>"
2300306-30 = "3;하레;04;헉…… 헉…… 보는 것처럼 사용자의 신체 상태를 자동으로 분석해서 운동 트레이너 역할을 해줄 수도 있어.\n#3;a\n#3;em;[속상함]\n#3;stiff"
2300306-31 = "3;하레;02;후우…… 이제 이만하면 되었겠지. 아테나 3호, 운동 보조 모드를 종료해줘."
2300306-32 = "#na;아테나 3호;<………….>"
2300306-33 = "#na;아테나 3호;<삑— 명령을 수행할 수 없습니다. 운동 보조 모드를 속행합니다.>"
2300306-34 = "3;하레;02;어라? 이상하네. 드론의 의사 결정 프로그램은 인간의 명령을 거부할 수 없게 되어 있을 텐데……. 어디서 오류가 일어난 걸까?\n#3;em;[?]"
2300306-35 = "3;하레;05;아테나 3호, 긴급 정지. 시스템 자가 진단을.\n#3;em;[반응]"
2300306-36 = "#na;아테나 3호;<삑— 유감스럽지만 그것은 불가능합니다. 본 프로그램은 언제나 최적의 해를 권장하도록 설계되었습니다.>"
2300306-37 = "#na;아테나 3호;<대상, \"오마가리 하레\"는 만성 운동 부족으로 인하여 지속적인 운동을 하지 않으면 신체에 큰 결함이 발생할 위험이 있습니다. 그러므로 운동을 속행합니다.>"
2300306-38 = "#na;아테나 3호;<대상자가 30초 이내로 움직이지 않을 경우, 본 프로그램은 강제 집행을 위하여 대상자에게 전기 충격을 가할 수 있습니다.>"
2300306-39 = "#na;아테나 3호;<3…… 2…… 1…….>"
2300306-40 = "3;하레;04;자, 잠깐…… 잠깐만 기다려……!\n#3;shake\n#3;em;[?!]"
2300306-41 = "#all;hide"
2300306-42 = "1;하레;04\n#1;ar\n#1;greeting\n#wait;1500"
2300306-43 = "1;하레;04\n#1;m2\n#1;greeting\n#wait;1500"
2300306-44 = "1;하레;04\n#1;m3\n#1;greeting\n#wait;1500"
2300306-45 = "#na;아테나 3호;<대상, \"오마가리 하레\"의 충분한 열량 소비를 확인. 운동 모드를 종료합니다…….>"
2300306-46 = "1;하레;04;헉…… 헉…… 드디어 끝났다…….\n#1;em;[땀]\n#1;stiff"
2300306-47 = "1;하레;04;아테나 3호…… 긴급 정지. 이제 움직이지 않아도 괜찮아…….\n#1;em;…"
2300306-48 = "#na;아테나 3호;<확인. 기능을 정지합니다.>"
2300306-49 = "#1;hide\n3;하레;04\n#3;h"
2300306-50 = "3;하레;04;하아…… 오늘 드론 실험은 완전히 실패였어.\n#3;em;[속상함]\n#3;stiff"
2300306-51 = "3;하레;99;설마 연산 장치가 긴급 정지 명령보다 과제 수행을 우선시할 줄이야…… 학습 알고리즘을 너무 얕보고 있었어…….\n#3;em;…"
2300306-52 = "3;하레;05;돌아가서 아테나 3호를 손보고 프로그램을 처음부터 뜯어 고쳐야겠어."
2300306-53 = "3;하레;04;………물론 저 쓸모 없는 운동 보조 기능도 지워버리고 말이야."
2300306-54 = "[s] \"운동 보조 기능은 그대로 두어도 괜찮지 않을까?\""
2300306-55 = "3;하레;05;전혀 괜찮지 않거든!\n#3;jump"
2300306-56 = "3;하레;05;운동은 자기가 필요성을 느끼고 하는 것이지 남이 시켜서 하는 게 아니니까."
2300306-57 = "3;하레;06;물론 만성 운동 부족이라는 지적은 틀리지 않았지만…….\n#3;em;[///]\n#3;stiff"
2300306-58 = "3;하레;05;그래도 인간이 기계에게 휘둘려서는 안 돼!\n#3;hophop\n#3;em;[빠직]\n#3;closeup"
2300306-59 = "#all;hide"
2300306-60 = "#na;그렇게 말하는 하레의 표정은 어쩐지 평소와는 달리 결연해 보였다……."

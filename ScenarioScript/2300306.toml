[translation]
2300306-1 = "背叛的機械"
2300306-2 = "千年學園．屋頂"
2300306-3 = "老師，我在等你。"
2300306-4 = "就如我在郵件裡所說，上次的無人機已經改裝完成了。#n所以我想在屋頂上試飛看看。"
2300306-5 = "這架改裝過的無人機，不只飛行能力大幅改善，還搭載了聲音辨識系統與簡單的AI演算法，因此可以透過語音控制。"
2300306-6 = "我將它取名為……雅典娜3號！"
2300306-7 = "這架無人機的名字取自於智慧女神。因為是用經驗演算法作為基礎所設計的，具有處理認知問題的能力。"
2300306-8 = "也就是說，只要反覆進行機械學習，就能對任何指令做出最佳方案。"
2300306-9 = "[s1] 「雖然聽不懂，不過真是厲害的功能呢。」\n[s2] 「……完全聽不懂你在說什麼。」"
2300306-11 = "嗯……抱歉。我的說法有些難懂。"
2300306-12 = "總之先來測試幾個簡單的功能吧？"
2300306-13 = "雅典娜3號，使用相機功能對老師拍照。"
2300306-14 = "＜攝影模式啟動。現在開始為目標「老師」進行拍攝＞"
2300306-15 = "＜正在於社群媒體蒐集人像照，分析最新流行趨勢……正在計算環境亮度，推算最佳角度……＞"
2300306-16 = "＜分析完成。拍照時請勿移動。3，2，1……＞"
2300306-19 = "如何，照的好看嗎？"
2300306-20 = "[s]「好像比在照相館拍的更好……」"
2300306-21 = "因為機器的眼睛比人眼還要精準。當然比人拿起相機拍照還要優秀。"
2300306-22 = "除此之外，它還擁有日程管理，鬧鐘功能，還具有輔助運動的健身機能。"
2300306-23 = "雅典娜3號，現在開始啟動健身機能。"
2300306-24 = "＜健身模式啟動。檢測目標「小鈎晴」的身體資訊，輔助其運動＞"
2300306-25 = "好，那就來個小跑步測試一下吧。"
2300306-29 = "＜嗶──目標體溫及心跳小幅上升。運動效果分析中……為有效消耗卡路里，建議提高運動強度＞"
2300306-30 = "哈啊……哈啊……如你所見……它還會自動分析，使用者的身體狀態……能充當……運動教練……"
2300306-31 = "呼……這樣差不多了。雅典娜3號，結束健身模式。"
2300306-32 = "＜…………＞"
2300306-33 = "＜嗶──無法執行命令。繼續進行健身模式＞"
2300306-34 = "嗯？真奇怪，無人機的意識決定系統應該有設定成無法拒絕人類的命令……是哪裡出錯了嗎？"
2300306-35 = "雅典娜3號，緊急停止。進行系統自我診斷。"
2300306-36 = "＜嗶──很抱歉，無法執行指令。本程式設計為無論任何狀況都要提供最佳方案＞"
2300306-37 = "＜目標「小鈎晴」長期缺乏運動，若不持續運動，今後身體將有發生重大問題的風險。因此，將繼續進行運動＞"
2300306-38 = "＜如目標未在30秒內開始動作，本程式將對目標進行電擊，以強制執行＞"
2300306-39 = "＜3……2……1……＞"
2300306-40 = "等，等等……給我等一下……！"
2300306-45 = "＜確認目標「小鈎晴」已充分消耗熱量。運動模式結束……＞"
2300306-46 = "哈……哈 ……終於，結束了……"
2300306-47 = "雅典娜3號……緊急停止。別再運作了……"
2300306-48 = "＜確認，功能停止＞"
2300306-50 = "哈啊……今天的無人機測試完全失敗了。"
2300306-51 = "沒想到AI演算法，居然會將執行課題優先於緊急停止命令……看來我太小看學習演算法了……"
2300306-52 = "回去之後，得幫雅典娜3號的程式打掉重做了。"
2300306-53 = "……然後刪掉那個沒用的健身功能。"
2300306-54 = "[s]「我覺得健身功能留下來應該沒關係？」"
2300306-55 = "有關係！"
2300306-56 = "運動應該是自己感到有必要時才做的。不該是被人強迫的。"
2300306-57 = "雖然，它指出我長期運動不足，這點是沒錯……"
2300306-58 = "但是，人類不能受機器擺佈！"
2300306-60 = "（晴這麼說著，表情帶著一股不同於以往的堅定……）"

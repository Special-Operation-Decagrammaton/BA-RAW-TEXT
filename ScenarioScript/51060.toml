[translation]
51060-1 = "Episode 6;The Next Destination"
51060-4 = "After wrapping up all the necessary paperwork, I followed Yukari through the streets of Hyakkiyako."
51060-9 = "Hm, hmm hmm. ♪"
51060-10 = "[s] \"So to begin the contest...\""
51060-14 = "\"(We need two witnesses... One unaffiliated with the Hyakkaryouran, to prove that the ritual is being held for good reasons...)\""
51060-15 = "[ns] \"(And the other a club officer from the Hyakkaryouran, who ensures the battle is fair.)\""
51060-16 = "With help from the Yin-Yang Club... And even Schale's Sensei, the only thing left is to advance!"
51060-17 = "Keep moving forward! It's the only way!"
51060-18 = "[s] \"Yukari, what kind of club is the Hyakkaryouran?\""
51060-19 = "Hm? "
51060-20 = "What do you mean...what kind of club?"
51060-21 = "[s1] \"I want to learn more about Hyakkaryouran.\"\n[s2] \"I don't want to be surprised when the succession contest starts.\""
51060-24 = "Ah..."
51060-25 = "..."
51060-26 = "[s] \"You don't have to answer if you don't want to...\""
51060-31 = "Heehee! It's okay! Since you're curious, I, Yukari, shall teach you about the Hyakkaryouran!"
51060-41 = "The Hyakkaryouran... Its official name is the Hyakkaryouran Resolution Council."
51060-42 = "It feels a little boastful to say so, but the club only invites the best students in the Allied Hyakkiyako Academy to join. In an elite academy, we're the elite of the elites!"
51060-44 = "The club has a long history that predates the formation of the Hyakkiyako alliance..."
51060-45 = "Our primary role these days is to intervene in any conflicts that arise between the various factions and clubs of Hyakkiyako and mediate a solution."
51060-46 = "[s] \"So you take the role of...a disciplinary team from the other academies.\""
51060-49 = "It's true that the prophet entrusted us with the duty of stopping troublemakers and guiding them to reform their ways..."
51060-50 = "But we value diplomacy far more than punishing people or making rules for them to follow."
51060-51 = "The alliance is a house that shelters many different groups and ideals. Conflicts here are rarely caused by a single party's wrongdoing or malice."
51060-52 = "The Hyakkaryouran is the bedrock upon which the quarreling parties build a compromise. We guarantee that nobody is taken advantage of and that nobody uses violence to get their way."
51060-53 = "That is our purpose."
51060-54 = "[s] \"...It must be rough.\""
51060-55 = "Well...it's rare for a compromise to make everybody completely happy...but by bringing everyone to the table, we act as the glue that keeps Hyakkiyako together."
51060-56 = "I, Yukari, am proud to be a member of the Hyakkaryouran!"
51060-57 = "[s] \"You really love your club, Yukari.\""
51060-58 = "Of course!"
51060-59 = "It's only natural."
51060-60 = "The Hyakkaryouran...is a club I always looked up to."
51060-72 = "You! Stop right there!"
51060-77 = "Huh? Who's this twerp?"
51060-78 = "Shouldn't you find your momma before you start cryin'?"
51060-80 = "You're cheating and harassing people!"
51060-81 = "It's not right! So, stop it!"
51060-83 = "Come off it, brat."
51060-85 = "You think you can trust the goldfish net the booth gives you? What's wrong with using this super-ultra-mega-deluxe fishing net we made ourselves?"
51060-86 = "That's precisely the problem!"
51060-88 = "Are you in middle school or somethin'? You should run home before you get hurt..."
51060-93 = "Hiyah!!!"
51060-102 = "Urgh?! D-Did you just?!"
51060-104 = "I, Yukari, will not tolerate those who ruin festivals or prey on the weak!"
51060-110 = "Fine. If that's what you want..."
51060-111 = "I'll teach you why kids outta know their place!"
51060-115 = "Surround her!"
51060-132 = "Ugh! "
51060-153 = "Wh-Who're you?!"
51060-160 = "Are you well?"
51060-165 = "Ah, uh, y-yes..."
51060-167 = "Good. I'm glad."
51060-169 = "Y-You shot at us! You actually shot at us!"
51060-170 = "How dare you! Don't you know who we are?!"
51060-171 = "I am well aware. You are the troublemakers who always show up to disrupt our festivals."
51060-172 = "\"How dare you\" are words that have no place in your mouth."
51060-181 = "Heek! Dropping someone silently with a single clean shot..."
51060-182 = "Th-That white hair... A-And that sky blue haori!"
51060-191 = "R-R-Run! It's the Hyakkaryouran! The Hyakkaryouran is here!"
51060-196 = "Hiyah! Just try to run! We already got your descriptions from the merchant guild!"
51060-197 = "I hope you're ready for the lecture of a lifetime!"
51060-198 = "Enough nonsense."
51060-202 = "They're escaping while you stand here running your mouth."
51060-203 = "Ah! Let's go! Nagusa, we'll leave the rest to you! "
51060-208 = "Ah, uh, um..."
51060-210 = "Your unflinching courage to stand up in the face of injustice."
51060-215 = "It was most impressive."
51060-216 = "...!"
51060-217 = "Leave it in the hands of the Hyakkaryouran from here. Now then..."
51060-225 = "For the first time in my life, I found people I truly admired..."
51060-226 = "I wanted to be like Nagusa..."
51060-230 = "A-Anyway, that's why I can't leave the Hyakkaryouran in this terrible state!"
51060-231 = "To go back to how we were then..."
51060-232 = "To restore the Hyakkaryouran as a beacon of justice..."
51060-233 = "I, Yukari, the Hyakkaryouran's elite, will save our club with my own hands! I will emerge victorious in my succession contest and claim the Authority of the Presidency!"
51060-234 = "[s3] \"You've mentioned authority a few times now.\"\n[s4] \"So this \"Authority\" is like...an official seal?\""
51060-237 = "Ah, I should have expected you to catch that, Sensei!"
51060-238 = "Every Hyakkaryouran president has passed down the Authority, first given to us by the Great Prophet herself, to their successor."
51060-239 = "Only someone who wields the Authority has the right to call themself the president of the Hyakkaryouran..."
51060-240 = "I remember hearing that the succession contest was a ritual that passes the Authority to helm the Hyakkaryouran from one generation to the next!"
51060-241 = "...I think that's what they said, anyway!"
51060-242 = "[s] \"You...think?\""
51060-243 = "W-Well... There hasn't been a succession contest since long before I joined the Hyakkaryouran... Most presidents handed their title to their chosen successor willingly..."
51060-244 = "Ah, but I can show you the Authority of the Presidency, there's a picture on the Hyakkaryouran's website..."
51060-248 = "The club's promotional website is impressively designed and features a particular object prominently."
51060-252 = "This is the Authority of the Presidency!"
51060-257 = "[ns] \"Is that...a gun?\""
51060-258 = "Yes, but not just any gun!"
51060-259 = "It is nothing less than a legendary firearm once wielded by the Great Prophet Kuzunoha, which only the presidents of the Hyakkaryouran are capable of bearing..."
51060-260 = "The legendary exorcist spell gun!"
51060-261 = "[s5] \"Exorcist...what?\"\n[s6] \"Legendary...spell gun?\""
51060-264 = "Heehee, you look taken aback! I understand how you feel!"
51060-265 = "It's a legend that walks hand-in-hand with the stories of how the president of the Hyakkaryouran is the only person who can receive an audience with Kuzunoha..."
51060-266 = "Only an elite few know that when you reach the level of the Hyakkaryouran presidency, you can exorcise ghosts and phantoms!"
51060-267 = "[s] \"...That sounds like an urban legend.\""
51060-271 = "Wh-What are you saying?!"
51060-272 = "I just let you in on the secret of the legendary exorcist spell gun, inherited by each president of the Hyakkaryouran! How could you be so cold in the face of that?"
51060-273 = "[s] \"S-Sorry...\""
51060-274 = "Well, rumors are rumors, I suppose... It's hard to know what's true."
51060-275 = "But... If I win the succession contest and get my hands on the spell gun..."
51060-276 = "...I won't be scared of the dark streets when I walk home after class anymore!"
51060-277 = "[s] \"That's a pretty good goal.\""
51060-281 = "[ns7] \"So I'll serve as your first witness.\"\n[ns8] \"Will another member of the Hyakkaryouran be willing to referee?\""
51060-284 = "I have an idea of which officers might help me with the succession contest..."
51060-289 = "There are two upperclassmen I can rely on."
51060-290 = "Renge, the captain of the Hyakkaryouran's assault commandos, and Kikyou, who people call the deathly silent operations officer."
51060-292 = "Of everyone in the club, they were the most disappointed when Nagusa left us..."
51060-293 = "I am certain they'll help with my succession contest if I talk to them about Nagusa...!"
51060-295 = "And after that, I only need to win!"
51060-296 = "Then the Hyakkaryouran will be together again and everything will be as it was!"
51060-297 = "[s] \"Um, where can we find them, then?\""
51060-298 = "I'm sure that Kikyou's in the regulatory office..."
51060-299 = "But Renge's house is closer, so let's head there first!"
51060-303 = "This way!"
51060-305 = "Hyakkiyako Residential Area"
51060-308 = "Now, if we turn left at the end of this road, we'll be at Renge's house!"
51060-311 = "Here. This is where Renge lives..."
51060-312 = "Now, we'll knock on the door and..."
51060-317 = "Excuse me! Renge! I, Yukari, have arrived!"
51060-321 = "[ns] \"...There's no response.\""
51060-322 = "H-Huh...? N-No way..."
51060-329 = "[ns] \"Wait, Yukari. Is that a note on the door?\""
51060-330 = "A note...?"
51060-334 = "Let's see..."
51060-335 = "Hm. Hm. Hmm."
51060-340 = "...What?"
51060-341 = "[s] \"What does it say?\""
51060-342 = "Uh... Um, so..."
51060-349 = "Yukari looked at the note in her hand for a long moment, confusion on her face, before turning and handing it to me."
51060-352 = "If you're here because you have business with me..."
51060-353 = "Give it up. I'm not here."
51060-357 = "[log=렌게 실루엣]I'm on an adventure to reclaim my youth![/log]"
51060-361 = "[ns] \"...Her youth?\""
51060-363 = "Next Episode;A Girl's Devotion to Youth(?) 1"

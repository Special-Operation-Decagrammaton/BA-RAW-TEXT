[translation]
51060-1 = "ตอนที่ 6;ที่ต่อไปที่ต้องไป"
51060-4 = "(หลังจากตระเตรียมสิ่งที่จำเป็นเสร็จแล้ว คุณครูก็ตามยูคาริไปที่ถนนเฮียกคิยาโค)"
51060-9 = "ลัลลา~ ลั้ลลา~♪"
51060-10 = "[s] \"ถ้างั้นสิ่งที่จำเป็นจากนี้...\""
51060-14 = "(เงื่อนไขจำเป็นในการทำให้ศึกชิงตำแหน่งสำเร็จมี 2 ประการ เพื่อพิสูจน์ว่า <ศึกชิงตำแหน่ง> ถูกจัดขึ้น#nภายใต้บรรทัดฐานที่ยุติธรรม จะต้องมี <ผู้สังเกตการณ์> 1 คน...)"
51060-15 = "[ns] (และสมาชิกเฮียกกะเรียวรันที่จะรับรองความชอบธรรม)"
51060-16 = "ตราบใดที่ชมรมหยินหยาง... ไม่สิ ถ้าท่านอาจารย์จากชัล~ เล่ต์ เข้ามาช่วย จากนี้ก็เหลือแค่เวลาแห่ง#nความก้าวหน้า!"
51060-17 = "ก้าวไปข้างหน้าอย่างมีพลัง! และจะไม่มองกลับหลัง!"
51060-18 = "[s] \"ยูคาริ เฮียกกะเรียวรันเป็นชมรมแบบไหนเหรอ?\""
51060-19 = "เจ้าคะ...? "
51060-20 = "ชมรมแบบไหน... งั้นเหรอเจ้าคะ?"
51060-21 = "[s1] \"ก่อนจะมีศึกชิงตำแหน่ง อย่างน้อยครูก็ต้องรู้สิ\"\n[s2] \"ครูจำเป็นต้องรู้น่ะว่าเฮียกกะเรียวรันเป็นชมรมแบบไหน\""
51060-24 = "อ่า..."
51060-25 = "......"
51060-26 = "[s] \"ถ้าไม่อยากเล่าก็ไม่ต้องฝืนหรอกนะ...\""
51060-31 = "ฮุฮุฮุ! ไม่เจ้าค่ะ! ถ้าสงสัยเกี่ยวกับเฮียกกะเรียวรันละก็ ข้า! ยูคาริผู้นี้! จะอธิบายให้ฟังด้วยความยินดีเลยเจ้าค่ะ!"
51060-41 = "เฮียกกะเรียวรัน... หรือชื่ออย่างเป็นทางการคือคณะไกล่เกลี่ยข้อพิพาทเฮียกกะเรียวรัน"
51060-42 = "จะให้ข้าพูดเองก็จะหาว่าอวย แต่เราเป็นชมรมอิล~ ลีทในอิล~ ลีทที่คัดเลือกแต่นักเรียนดีเด่นของ#nสหพันธ์เฮียกคิยาโคเข้ามาเจ้าค่ะ!"
51060-44 = "ถือว่าเป็นชมรมที่มีประวัติศาสตร์ยาวนานมากจนต้องย้อนกลับไปสมัยที่สหพันธ์เฮียกคิยาโคในอดีต#nยังไม่เป็นสหพันธ์..."
51060-45 = "กิจกรรมหลักของเราคือเป็นตัวกลางในการไกล่เกลี่ยและประนีประนอมเมื่อมีความขัดแย้งระหว่างกลุ่ม หรือชมรมของโรงเรียนในสหพันธ์เฮียกคิยาโคเจ้าค่ะ"
51060-46 = "[s] \"บทบาทเหมือนคณะกรรมการวินัยของโรงเรียนอื่นสินะ\""
51060-49 = "เจ้าค่ะ ถ้าจำเป็น บางทีเราก็จับกุมและสั่งสอนพวกเด็กเจ้าปัญหาด้วย หน้าที่นี้ของเราได้รับการยอมรับ#nมาจาก <ผู้พยากรณ์ใหญ่> มาหลายรุ่นแล้ว"
51060-50 = "แต่สิ่งที่เราคิดว่าสำคัญที่สุดไม่ใช่การลงโทษหรือการสั่งสอน แต่เป็น <การไกล่เกลี่ย> เจ้าค่ะ"
51060-51 = "ความขัดแย้งในสหพันธ์ไม่ได้เกิดขึ้นเฉพาะเมื่อฝ่ายใดฝ่ายหนึ่งทำผิดหรือเป็นฝ่ายไม่ดี"
51060-52 = "เฮียกกะเรียวรันจะรับฟังความเห็นและความคิดของแต่ละฝ่ายอย่างเป็นกลาง และทำหน้าที่โดยมี#nเป้าหมายที่จะไกล่เกลี่ยไปในทิศทางที่ทั้งสองฝ่ายเห็นชอบเจ้าค่ะ"
51060-53 = "และนี่คือบทบาทหน้าที่ของพวกเราเจ้าค่ะ"
51060-54 = "[s] \"...งานลำบากเลยนะนั่น\""
51060-55 = "แน่นอนว่าเราเจอความยากลำบากหลายเรื่อง แต่พอเรายึดมั่นในหลักการนี้ เราก็สามารถแก้ปัญหาได้#nไม่น้อยเลยเจ้าค่ะ"
51060-56 = "ข้า ยูคาริผู้นี้ภูมิใจกับหลักการนี้ของเฮียกกะเรียวรันมากเลยเจ้าค่ะ!"
51060-57 = "[s] \"ยูคาริดูจะชอบเฮียกกะเรียวรันมากเลยสินะ\""
51060-58 = "ใช่แล้วละเจ้าค่ะ!"
51060-59 = "ต้องบอกว่า..."
51060-60 = "เฮียกกะเรียวรัน... เป็นสิ่งเดียวที่ข้าใฝ่ฝันมาตลอด"
51060-72 = "ตรงนั้นน่ะ! หยุดเลยนะเจ้าคะ!"
51060-77 = "หืม? อะไรของเธอเนี่ย นังหนู"
51060-78 = "ถ้าไม่อยากร้องไห้แงๆ มาทางไหนก็กลับไปทางนั้นเถอะ"
51060-80 = "สิ่งที่พวกเจ้าทำตอนนี้มันไม่ถูกต้อง!"
51060-81 = "ข้าก็เลยบอกให้หยุดทำเจ้าค่ะ!"
51060-83 = "แล้วมันจะทำไม?"
51060-85 = "พวกเราก็แค่ไม่ถูกใจกระชอนตักปลาทองของที่นี่ ก็เลยจะตักปลาแบบใช้กระชอนซูเปอร์อัลตร้าสตรอง#nไฟนอลของพวกเราก็เท่านั้นเอง"
51060-86 = "นั่นแหละเจ้าค่ะที่มันไม่ถูกต้อง!"
51060-88 = "หยุดพูดจาเหลวไหลสักที ดูทรงแล้วน่าจะเป็นแค่เด็กม.ต้นเองนะเนี่ย ถ้าไม่อยากเจ็บตัวกลับไปละก็..."
51060-93 = "หน็อย!!"
51060-102 = "เดี๋ยวเหอะ! ยัยเด็กคนนี้นี่?!"
51060-104 = "ทั้งรังแกคนที่อ่อนแอ ทั้งยังมาก่อกวนงานเทศกาล! ข้า ยูคาริผู้นี้ จะไม่ปล่อยคนพรรค์นี้ไปแน่เจ้าค่ะ!"
51060-110 = "ก็ได้ ถ้าต้องการอย่างนั้นละก็..."
51060-111 = "ฉันจะทำให้เธอเสียใจที่เข้ามาแส่โดยไม่สำเหนียกตัวเองเลย!"
51060-115 = "เข้าไปล้อมไว้!"
51060-132 = "อึก...! "
51060-153 = "คะ... ใครน่ะ?!!"
51060-160 = "ไม่บาดเจ็บตรงไหนใช่มั้ย?"
51060-165 = "อ่า... เอ่อ... เจ้าค่ะ..."
51060-167 = "อึม ดีแล้วละนะ"
51060-169 = "ยะ... อยู่ๆ ก็ใช้ปืนกันเลยเหรอ! พวกเธอทำเกินไปแล้ว...!"
51060-170 = "กล้าดียังไง! รู้รึเปล่าว่าพวกเราเป็นใคร...!"
51060-171 = "รู้สิ ก็พวกเด็กเจ้าปัญหาที่โผล่มาทุกครั้งตอนมีงานเทศกาลยังไงล่ะ"
51060-172 = "กล้าดียังไงงั้นเหรอ... ฉันต่างหากที่อยากพูดคำนั้น"
51060-181 = "เฮือก! แค่แผ่รังสีอำมหิตแต่ก็ทำให้นิ่งสงบ สยบทุกความเคลื่อนไหวได้แล้วเลยงั้นเหรอ..."
51060-182 = "อีกอย่าง... ถ้าเป็นคนผมสีขาวและใส่เสื้อฮาโอริสีคราม... ยะ... อย่าบอกนะว่า...!"
51060-191 = "ผะ... ผะ... เผ่นเร็วเข้า! นี่มันเฮียกกะเรียวรัน! เฮียกกะเรียวรันมาแล้ว!"
51060-196 = "ย่าาาาห์! คิดว่าจะหนีพ้นงั้นเรอะ!? เราได้รับการแจ้งจากกลุ่มการค้าและระดมกำลังกันแล้วเหอะ!"
51060-197 = "เตรียมตัวโดนปรับทัศนคติทั้งคืนได้เลย!"
51060-198 = "หยุดพูดอะไรที่เปล่าประโยชน์ได้แล้ว"
51060-202 = "ฉันจะตามพวกนั้นไป "
51060-203 = "เข้าใจแล้ว! งั้นก็ไปกันเลย! รุ่นพี่นางุสะ! ฝากจัดการข้างหลังด้วยนะ! "
51060-208 = "อ๊ะ... เอ่อ... "
51060-210 = "กล้าเผชิญหน้าอย่างไม่ท้อถอย แม้จะมีความอยุติธรรมอยู่ตรงหน้า"
51060-215 = "เท่สุดๆ ไปเลย"
51060-216 = "...!"
51060-217 = "จากนี้ไปให้พวกเราเฮียกกะเรียวรันเป็นคนจัดการเอง"
51060-225 = "เจ้าค่ะ ครั้งแรกในชีวิตที่ข้าเกิดมาแล้วรู้สึกใฝ่ฝันและปรารถนา..."
51060-226 = "ในอนาคตข้าอยากเป็นเหมือนรุ่นพี่นางุสะ..."
51060-230 = "ฮึ่ม! เพราะแบบนี้ข้าก็เลยไม่อาจเมินเฉยต่อเฮียกกะเรียวรันได้เจ้าค่ะ!"
51060-231 = "เพื่อให้เฮียกกะเรียวรันได้กลับไปเป็นเหมือนตอนนั้น..."
51060-232 = "เพื่อให้เฮียกกะเรียวรันกลับไปเป็นเหมือนเดิม..."
51060-233 = "ข้า ยูคาริ อิล~ ลีทจากเฮียกกะเรียวรัน! จะเอาชนะใน <ศึกชิงตำแหน่ง> แล้วคว้า <สิทธิ์ของหัวหน้า> มาให้ได้ด้วยมือข้าเองเลยเจ้าค่ะ!"
51060-234 = "[s3] \"จะว่าไป ที่บอกว่าหลักฐานหรือสิทธิ์อะไรนั่นของหัวหน้า\"\n[s4] \"สิทธิ์ที่ว่าคืออะไรเหรอ? เหมือนกับ... หนังสือรับรองอะไรรึเปล่า?\""
51060-237 = "อ๊ะ! เป็นคำถามที่เฉียบคมมากเจ้าค่ะ!"
51060-238 = "ฮึ่ม! หัวหน้าของเฮียกกะเรียวรันจะมีหลักฐานแสดงสิทธิ์ที่ได้รับการสืบทอดจาก <ผู้พยากรณ์ใหญ่> มารุ่นสู่รุ่นเจ้าค่ะ"
51060-239 = "ว่ากันว่าต้องเป็นคนที่มี <หลักฐานแสดงสิทธิ์> นั้น ถึงจะได้เรียกว่าเป็นหัวหน้าของเฮียกกะเรียวรัน..."
51060-240 = "ส่วนศึกชิงตำแหน่ง ข้าเคยได้ยินว่ามันเป็น... งานที่จัดเพื่อช่วงชิง <หลักฐานแสดงสิทธิ์> อันนั้นค่ะ!"
51060-241 = "...น่าจะถูกนะเจ้าคะ!"
51060-242 = "[s] \"น่าจะถูก... แบบนี้ก็ได้เหรอ...?!\""
51060-243 = "คะ... คือว่า... หลังจากที่ข้าเข้ามาในเฮียกกะเรียวรัน ก็ยังไม่มีโอกาสได้เห็นศึกชิงตำแหน่งเลยสักครั้ง..."
51060-244 = "อ๊ะ แต่ถ้าอยากรู้ว่า <หลักฐานแสดงสิทธิ์> อันนั้นเป็นสิ่งของแบบไหนหรือมีรูปร่างแบบใด ก็สามารถเข้าไปดูในโฮมเพจประชาสัมพันธ์ของเฮียกกะเรียวรันได้..."
51060-248 = "(คุณครูประทับใจที่เฮียกกะเรียวรันมีโฮมเพจประชาสัมพันธ์ด้วย)"
51060-252 = "นี่เจ้าค่ะ หลักฐานแสดงสิทธิ์!"
51060-257 = "[ns] \"นี่มัน... ปืนไม่ใช่เหรอ...?\""
51060-258 = "ใช่เจ้าค่ะ เป็นปืนอย่างที่ท่านอาจารย์ว่าเลย"
51060-259 = "นี่เป็นของในตำนานที่สืบทอดมาตั้งแต่ผู้พยากรณ์ใหญ่คุซึโนฮะ และเฉพาะหัวหน้าของเฮียกกะเรียวรัน#nเท่านั้นที่จะมีสิทธิ์ได้ครอบครองกันจากรุ่นสู่รุ่น..."
51060-260 = "มันคือ <ปืนปีศาจล่าผีในตำนาน> เจ้าค่ะ!"
51060-261 = "[s5] \"หืม? ปืนปีศาจ...?\"\n[s6] \"ล่าผี... ในตำนาน?\""
51060-264 = "ฮุฮุ งงเลยสินะเจ้าคะ แต่ข้าเข้าใจได้เจ้าค่ะ"
51060-265 = "พวกเรามีข่าวลือที่เล่าสืบต่อกันภายในเฮียกกะเรียวรันเองว่า <หัวหน้าเฮียกกะเรียวรันสามารถพบกับ#nท่านคุซึโนฮะได้> ..."
51060-266 = "และยังมีข่าวลือลับสุดยอดที่บอกว่า <ถ้าได้เป็นหัวหน้าเฮียกกะเรียวรัน ก็จะมีความสามารถของหมอผี#nที่จับผีและวิญญาณได้!>"
51060-267 = "[s] \"แบบนั้นมันฟังดูเป็น... ตำนานเมือง... มากกว่ารึเปล่า?\""
51060-271 = "พะ... พูดอะไรแบบนั้นเจ้าคะ...!"
51060-272 = "นั่นปืนปีศาจไล่ผีที่ส่งต่อให้หัวหน้าเฮียกกะเรียวรันกันจากรุ่นสู่รุ่นเลยนะเจ้าคะ เอาเรื่องตื่นเต้นแบบนั้น#nมาพูดอย่างเย็นชาได้ยังไง! ทำเกินไปแล้วนะเจ้าคะ!"
51060-273 = "[s] \"อะ... อื้ม...\""
51060-274 = "ก็นะ ถึงยังไงข่าวลือก็เป็นแค่ข่าวลือวันยันค่ำ... คงไม่อาจรู้ได้หรอกเจ้าค่ะว่าเรื่องราวที่เล่าสืบต่อกันมา#nเป็นความจริงรึเปล่า"
51060-275 = "แต่หากข้า... เอาชนะในศึกชิงตำแหน่งและคว้าปืนปีศาจมาได้..."
51060-276 = "...ก็คงไม่ต้องกลัวเวลาเลิกเรียนแล้วเดินกลับบ้านไปตามถนนเส้นเปลี่ยวๆ ยามค่ำคืนเจ้าค่ะ!"
51060-277 = "[s] \"เป็นเป้าหมายที่ยอดเยี่ยมเลยแฮะ\""
51060-281 = "[ns7] \"งั้นถ้าครูมาช่วยเป็นผู้สังเกตการณ์ให้\"\n[ns8] \"แล้วจะให้สมาชิกเฮียกกะเรียวรันคนไหนมาช่วยรับรองล่ะ?\""
51060-284 = "ถ้าพูดถึงสมาชิกระดับสูงที่มีความเป็นไปได้ที่จะมาช่วยข้าใน <ศึกชิงตำแหน่ง>..."
51060-289 = "ข้ามีรุ่นพี่สองคนที่สามารถพึ่งพาได้อยู่เจ้าค่ะ"
51060-290 = "รุ่นพี่ <เรนเกะ> ที่ดำรงตำแหน่งหัวหน้าหน่วยจู่โจมของเฮียกกะเรียวรัน และรุ่นพี่ <คิเคียว> ที่ได้ชื่อว่า#nเป็นที่ปรึกษาที่สุขุมของเฮียกกะเรียวรันเจ้าค่ะ"
51060-292 = "ตอนที่รุ่นพี่นางุสะหายตัวไปและไม่กลับมา รุ่นพี่ทั้งสองคนนั้นโกรธมากกว่าใครเลยละเจ้าค่ะ"
51060-293 = "ถ้าไปบอกข่าวของรุ่นพี่นางุสะละก็ ทั้งสองคนต้องเข้ามาช่วยในแผนศึกชิงตำแหน่งของยูคาริผู้นี้อย่าง#nแน่นอน...!"

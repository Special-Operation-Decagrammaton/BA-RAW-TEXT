[translation]
51060-1 = "第6話;下一個目的地"
51060-4 = "（完成需要的手續後，跟著紫來到了百鬼夜行的大街）"
51060-9 = "哼哼，哼哼～♪"
51060-10 = "[s]「那麼現在需要的是……」"
51060-14 = "（繼承戰的成立需要滿足兩個條件。#n　由一名外部見證人證明「繼承戰」是以公平標準進行……）"
51060-15 = "[ns] （以及一名保證正當性的百花繚亂成員）"
51060-16 = "陰陽部……不，既然連夏～萊的老師都願意協助，接下來就全速進擊吧！"
51060-17 = "奮力前進！全力向前邁進！"
51060-18 = "[s]「紫，百花繚亂是個怎麼樣的社團？」"
51060-19 = "咦……？"
51060-20 = "是個怎麼樣的社團……？"
51060-21 = "[s1]「嗯，在進行繼承戰之前……」\n[s2]「我覺得應該更仔細暸解一下百花繚亂。」"
51060-24 = "啊……"
51060-25 = "…………"
51060-26 = "[s]「啊，當然如果不想說的話，我也不會勉強……」"
51060-31 = "呵呵呵！沒關係！#n如果老師想暸解百花繚亂，我很樂意全力為老師說明！"
51060-41 = "百花繚亂……正式名稱為百花繚亂紛爭調停委員會。"
51060-42 = "雖然自己說有點不好意思，#n不過百花繚亂是從百鬼夜行的優秀學生當中，選拔出菁英中的菁英組成的社團！"
51060-44 = "其歷史可追溯到百鬼夜行還不是聯合學園的時期，是個非常悠久的社團……"
51060-45 = "主要的活動是在百鬼夜行聯合學園中對各學園分派，#n乃至社團間的衝突及糾紛中扮演仲裁的角色。"
51060-46 = "[s]「就像其他學園的風紀委員會……對吧。」"
51060-49 = "是的，我們的確受「大預言者」所託，在必要時扮演逮捕及開導問題學生的角色。"
51060-50 = "儘管如此，我們最重視的並非體罰和開導，而是「仲裁」。"
51060-51 = "聯合學園中的衝突，往往不是因為有人犯錯或是某一方不好而發生。"
51060-52 = "因此百花繚亂的目標是以中立的立場從中調解，#n使情況能朝彼此都能接受的方向發展。"
51060-53 = "這就是我們的職責。"
51060-54 = "[s]「……那一定很辛苦吧。」"
51060-55 = "確實會碰上許多辛苦的事，但因為堅持這種作法而得以解決的問題也不在少數。"
51060-56 = "所以小女子我對百花繚亂的這種作法感到非常自豪！"
51060-57 = "[s]「紫真的很喜歡百花繚亂呢。」"
51060-58 = "是！"
51060-59 = "我可以肯定……"
51060-60 = "百花繚亂……就是我一心嚮往的存在。"
51060-72 = "等等！住手！"
51060-77 = "啊？這小矮子想怎樣？"
51060-78 = "勸你還是在嘗到苦頭之前趕快離開吧？"
51060-80 = "你們現在的所作所為……"
51060-81 = "是不對的！給我住手！"
51060-83 = "你什麼意思？"
51060-85 = "我們只是覺得這裡提供的撈魚網很不可靠，#n所以才想用我們自己製作的超強終極魚網來撈魚而已啊。"
51060-86 = "那不就是肆意妄為嗎！"
51060-88 = "少囉嗦，一看就知道你還是國中生。#n如果不想受傷的話……"
51060-93 = "看招！！"
51060-102 = "唔！？這，這傢伙！？"
51060-104 = "竟然敢欺負弱小！還在慶典上搗亂！#n我絕對不會坐視不管！"
51060-110 = "好吧。既然你那麼想不開……"
51060-111 = "就讓你為不知天高地厚的行為後悔吧！"
51060-115 = "包圍他！"
51060-132 = "唔……！"
51060-153 = "是，是誰！？"
51060-160 = "有沒有受傷？"
51060-165 = "啊……那個……我沒事……"
51060-167 = "嗯，那就好。"
51060-169 = "居，居然突然開槍！你這傢伙想做什麼……！"
51060-170 = "明明知道我們是誰，竟然還敢……！"
51060-171 = "我很清楚。#n你們是每逢慶典就一定會出現的問題學生。"
51060-172 = "竟然還敢……是我要說的話。"
51060-181 = "噫噫！只用一發子彈就讓人不敢吭聲，多麼可怕的身手……"
51060-182 = "再加上那頭白髮和水藍色羽織……該，該不會……！"
51060-191 = "快，快逃啊！是百花繚亂！百花繚亂出現了！"
51060-196 = "哈啊啊！別想逃！我們已經接到商會的檢舉出動了！"
51060-197 = "所有人都準備被說教一整晚吧！"
51060-198 = "沒意義的話先說到這裡。"
51060-202 = "展開追擊吧。"
51060-203 = "知道了！那我就先走了！#n名草前輩！後面就拜託你了！"
51060-208 = "啊，那個……我……"
51060-210 = "路見不平拔刀相助，不畏邪惡挺身對抗的身影。"
51060-215 = "相當帥氣哦。"
51060-216 = "……！"
51060-217 = "之後就交給我們百花繚亂吧，後輩。#n告辭。"
51060-225 = "小女子生平第一次如此嚮往的地方……"
51060-226 = "我將來也要像名草前輩一樣……"
51060-230 = "嗯！所以我更不能丟下百花繚亂不管！"
51060-231 = "為了回到那個時候……"
51060-232 = "為了讓百花繚亂恢復原樣。"
51060-233 = "身為百花繚亂的菁～英的我一定要親手在「繼承戰」獲勝，取得「委員長的資格」！"
51060-234 = "[s3]「這麼說來，你剛才提到過委員長的資格和象徵。」\n[s4]「具體來說是什麼呢？是保證書……之類的嗎？」"
51060-237 = "啊，真是敏銳的提問呢！"
51060-238 = "咳哼，百花繚亂的每一任部長都從「大預言者」手中繼承了資格的象徵。"
51060-239 = "具有「資格象徵」的人才能稱得上是名符其實的百花繚亂委員長……"
51060-240 = "據說繼承戰就是繼承其「資格象徵」的儀式……！"
51060-241 = "……應該是吧！"
51060-242 = "[s]「說得這麼不確定……沒關係嗎……！？」"
51060-243 = "那，那是因為……在小女子加入百花繚亂之後，直到現在都沒能看到繼承戰……"
51060-244 = "啊，不過可以在百花繚亂的官網上看到「資格象徵」是什麼東西、長什麼樣子……"
51060-248 = "（就在懷疑是否真的有官網的時候……）"
51060-252 = "資格的象徵就是這個！"
51060-257 = "[ns]「這是……槍……？」"
51060-258 = "是的，如老師所說是槍沒錯。"
51060-259 = "從大預言者葛葉手中取得，僅有百花繚亂委員長才有資格擁有的……"
51060-260 = "字面意義上的「獵鬼傳說魔槍」！"
51060-261 = "[s5]「獵鬼……嗯？」\n[s6]「傳說魔槍……？」"
51060-264 = "呵呵，老師相當困惑呢。#n小女子我也能理解。"
51060-265 = "其實這是我們百花繚亂自古流傳下來，#n和「百花繚亂的委員長可以見到葛葉大人」並列的兩大傳聞──"
51060-266 = "「百花繚亂的委員長，能成為斬妖除魔的驅魔師！」──#n這是只有少部分人才知道的極密事項哦！"
51060-267 = "[s]「那不是都市傳說……之類的嗎？」"
51060-271 = "怎麼能這麼說……！"
51060-272 = "百花繚亂委員長代代相傳的驅魔魔槍……#n老師居然對這麼動人的事如此冷漠無情！實在太過分了！"
51060-273 = "[s] 「呃，嗯……」"
51060-274 = "不過傳聞畢竟是傳聞……究竟是否屬實就不得而知了。"
51060-275 = "但是，如果我也能……打贏繼承戰得到魔槍……"
51060-276 = "……放學走夜路回家就不用再害怕了！"
51060-277 = "[s]「真是個不錯的目標。」"
51060-281 = "[ns7]「假設由我擔任社團外部的見證人……」\n[ns8]「那負責擔保的百花繚亂成員，你打算找誰呢？」"
51060-284 = "有可能幫忙「繼承戰」進行的幹部和成員……"
51060-289 = "我正好知道兩位能依靠的前輩。"
51060-290 = "那就是擔任百花繚亂突擊隊長的「蓮華」前輩，以及人稱沉靜參謀的「桔梗」前輩。"
51060-292 = "名草前輩一去不回的時候，這兩位前輩也是最生氣的。"
51060-293 = "如果把名草前輩的消息告訴他們，他們一定會全力協助我的繼承戰計畫……！"
51060-295 = "這麼一來，只要小女子在繼承戰中獲勝……！"
51060-296 = "百花繚亂的所有問題就會迎刃而解，萬事OK了！"
51060-297 = "[s]「嗯，那該去哪裡才能找到那兩個人呢？」"
51060-298 = "我想想……去百花繚亂的調停室應該能見到桔梗前輩……"
51060-299 = "不過這裡離蓮華前輩的家比較近，所以先去蓮華前輩家吧！"
51060-303 = "來，請往這邊！"
51060-305 = "百鬼夜行．住宅區"
51060-308 = "沿著這條大路走到底之後左轉就是蓮華前輩的家了！"
51060-311 = "到了，這裡是蓮華前輩的家……"
51060-312 = "嗯，我來敲敲門吧……"
51060-317 = "不好意思打擾了，蓮華前輩！紫來找你囉！"
51060-321 = "[ns]「…………沒反應呢。」"
51060-322 = "咦……？怎，怎麼會這樣呢……"
51060-329 = "[ns]「等等，紫。門前好像貼著紙條之類的東西哦。」"
51060-330 = "紙條……？"
51060-334 = "我來看看……"
51060-335 = "嗯嗯……原來如此……"
51060-340 = "……………………咦？"
51060-341 = "[s]「上面寫了什麼？」"
51060-342 = "那個……上，上面寫……"
51060-349 = "（滿臉困惑的紫遞來的紙條上寫著這樣的內容）"
51060-352 = "「如果有事找我的話」"
51060-353 = "「請死了這條心吧」"
51060-357 = "[log=렌게 실루엣]「因為我要展開旅程，找回只屬於我的青春！」[/log]"
51060-361 = "[ns]「………………青春？」"
51060-363 = "下一話;朝青春(?)邁進的少女（１）"

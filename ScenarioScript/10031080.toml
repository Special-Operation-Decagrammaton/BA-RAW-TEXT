[translation]
10031080-1 = "บทส่งท้าย;เปิดงานปาร์ตี้"
10031080-2 = "(หลังจากคลี่คลายปัญหาทั้งหมดได้ในเวลาอันรวดเร็ว ปาร์ตี้สุดพิเศษแห่งเกเฮนน่าก็เริ่มขึ้น)"
10031080-6 = "งั้นฉันไปก่อนนะ คุณครู อาโกะ"
10031080-7 = "ค่ะ! สะ... สู้ๆ นะคะ! ท่านประธาน!"
10031080-13 = "[ns] \"อื้อ ฮินะ ทำให้เต็มที่นะ\""
10031080-18 = "ฮึ่ม! ยะ... ยัยประธานกรรมการวินัย...! โซระซากิ ฮินะ...!"
10031080-19 = "ทำลายอุบายทุกอย่างของเรา... แล้วมาถึงจุดนี้เลยงั้นเรอะ...!"
10031080-20 = "อื้อ~ รุ่นพี่ฮินะ~ เท่สุดๆ ไปเลย~"
10031080-21 = "อิ... อิบูกิ?!"
10031080-27 = "รุ่นพี่... ยอมรับได้แล้วละค่ะว่าปาร์ตี้ครั้งนี้น่ะ... ฝ่ายที่แพ้ไม่ใช่แพนเดโมเนียม โซไซตี้... แต่เป็นรุ่นพี่มาโคโตะเอง"
10031080-33 = "ฮะฮะฮ่า! อิโรฮะจัง! พูดตรงไปหน่อยรึเปล่า?"
10031080-34 = "แต่ก็นะ เรื่องแบบนี้ก็เกิดขึ้นกับมาโคโตะจังบ่อยๆ อยู่แล้ว"
10031080-36 = "ไม่สิ! ต้องไม่ใช่แบบนี้! มันยังไม่จบแค่นี้หรอกนะ...!"
10031080-37 = "ในเวลาที่กระชั้นชิดแบบนั้น... ไม่มีทางที่ยัยฮินะจะฝึกเปียโนมาได้หรอก!"
10031080-38 = "เล่นไม่เป็นแล้วยังกล้าเสนอหน้ามาอีก... มาทำตัวขายหน้าละสิไม่ว่า!"
10031080-39 = "ไม่หรอก มันอาจจะไม่เป็นอย่างนั้นก็ได้นะคะ..."
10031080-41 = "........."
10031080-43 = "(เราตั้งใจ... ฝึกซ้อมมาแล้ว...)"
10031080-44 = "(ไม่ใช่เพื่อใครอื่น แต่เพื่อให้คุณได้เห็นในสิ่งที่คาดหวัง)"
10031080-45 = "(เพื่อคุณแล้ว ฉันก็เลย...)"
10031080-48 = "ทำในสิ่งที่ทำได้ให้เต็มที่ก็เท่านั้น..."
10031080-74 = "[ns] \"ยอดเยี่ยมมากเลย...\""
10031080-78 = "ฮึ่ยยยย! ดะ... โดนเข้าจนได้!"
10031080-79 = "ทำไมถึงบรรเลงได้แบบนั้น... ไม่สิ! ไหนว่ายัยฮินะเล่นเปียโนไม่ได้ไง...!"
10031080-80 = "อย่าบอกนะว่า... ข้อมูลนั่นน่ะ... มันเป็นข้อมูลเท็จที่จะปั่นหัวฝ่ายเราตั้งแต่แรก...?!"
10031080-81 = "จะ... เจ้าพวกคณะกรรมการวินัยตัวดี...! จะกวนใจเราไปอีกแค่ไหนถึงจะพอใจน่ะ...!"
10031080-82 = "[s] \"แต่คนที่ริเริ่มการแสดงเปิดงานคือมาโคโตะนะ...\""
10031080-83 = "ค่ะ สุดท้ายแล้วคนที่ทำให้เรื่องนี้เกิดขึ้นคือรุ่นพี่มาโคโตะนะคะ"
10031080-84 = "เฮือก...! งะ... งั้นเหรอ?! ว้ากกก!!!"
10031080-91 = "ฮู่ว..."
10031080-96 = "ท่านประธาน! สุดยอดเลยค่ะ!"
10031080-102 = "เล่นเปียโนได้เก่งขนาดนั้นตั้งแต่เมื่อไรกันน่ะ?!"
10031080-103 = "ทั้งเท่และก็สง่างามมากๆ... เลยละค่ะ"
10031080-108 = "อ่า... อืม ทุกคน... ขอบใจนะ"
10031080-109 = "ฉันมาแสดงทันจนได้..."
10031080-110 = "[s] \"เก่งมากเลย... การบรรเลงเปียโนของฮินะไพเราะจับใจครูมากเลย\""
10031080-111 = "อ่า คะ... คุณครู..."
10031080-112 = "อืม... ถ้าคุณว่าอย่างนั้น... ก็คุ้มค่ากับความพยายามนะ"
10031080-113 = "ขอบคุณนะ ขอบคุณจริงๆ"
10031080-114 = "[s1] \"เก่งมากเลยนะ ไหนจะต้องตามแก้ปัญหา ไหนจะต้องหาเวลามาฝึกอีก\"\n[s2] \"ร่างกายเป็นยังไงบ้าง? ไม่ได้หักโหมมากไปจนร่างกายแย่ลงใช่มั้ย?\""
10031080-117 = "หืม?"
10031080-118 = "ฉันก็ไม่ได้หักโหมหนักอย่างที่คุณครูว่านะ?"
10031080-119 = "[s] \"แต่ที่ผ่านมาก็เจอเรื่องให้ต้องจัดการเยอะเลยใช่ไหม...?\""
10031080-120 = "อ้อ หมายถึงอุบายของประธานมาโคโตะในครั้งนี้น่ะเหรอ"
10031080-121 = "มันก็... ทำฉันลำบากอยู่หรอกนะ..."
10031080-122 = "แต่การที่แพนเดโมเนียม โซไซตี้เล่นแบบนี้ไม่ใช่ว่าจะเคยมีแค่ครั้งสองครั้ง แต่ครั้งนี้ไม่ได้ทำให้รู้สึกว่า#nเหน็ดเหนื่อยขนาดนั้นหรอก"
10031080-123 = "ใช่ค่ะ การทำอะไรตามใจตัวเองของประธานมาโคโตะเป็นเรื่องที่เกิดขึ้นบ่อยๆ อยู่แล้วค่ะ ต่อให้เจออีกก็ไม่ประหลาดใจหรอก"
10031080-124 = "[s] \"คือว่ามัน... เกิดเรื่องวุ่นวายแบบนี้บ่อยแค่ไหนกันน่ะ?\""
10031080-125 = "ถ้าจำไม่ผิดก็... "
10031080-126 = "น่าจะปีละ 4 ครั้ง...?"
10031080-129 = "เป็นเรื่องธรรมดาของเกเฮนน่าไปแล้วละ"
10031080-130 = "ถ้าประธานของทางนั้นอยู่เฉยๆ มันจะยิ่งน่ากังวลมากกว่าด้วยค่ะ"
10031080-131 = "[s] \"ชีวิตในเกเฮนน่านี่... น่ากลัวจัง...!\""
10031080-133 = "เอาละ นี่ไม่ใช่เวลาจะมาอยู่อย่างนี้ ปาร์ตี้เพิ่งจะเริ่มไปเองนะ"
10031080-134 = "ถ้าไม่ติดอะไรละก็... คุณครูช่วยมาคุ้มกันฉันได้มั้ย?"
10031080-135 = "[s] \"ถ้าโอเคกับครูละก็ ครูเต็มใจอยู่แล้ว\""
10031080-136 = "ฮุฮุ ถ้างั้นก็"
10031080-142 = "รบกวนด้วยนะ คุณครู"
10031080-144 = "(หลังจากจบเรื่องวุ่นวายมากมายที่เกิดขึ้น ในที่สุดปาร์ตี้ที่สนุกสนานก็เริ่มต้นขึ้น)"
10031080-145 = "แสงแห่งประกาย บทเพลงของเหล่าเด็กสาวยามค่ำคืน"

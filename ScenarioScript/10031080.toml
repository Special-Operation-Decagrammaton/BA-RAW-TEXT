[translation]
10031080-1 = "尾聲;派對開始"
10031080-2 = "（在解決所有問題後，格黑娜特別派對終於重新開始了）"
10031080-6 = "那我走了。老師，亞子。"
10031080-7 = "是！請，請加油！委員長！"
10031080-13 = "[ns]「嗯，祝你演出順利，陽奈。」"
10031080-18 = "唔！空，空崎陽奈……！可惡的風紀委員長……！"
10031080-19 = "竟然能粉碎我的所有計策……來到這個地方……！"
10031080-20 = "哇～陽奈前輩好帥氣～"
10031080-21 = "伊，伊吹！？"
10031080-27 = "前輩……現在也該承認了吧。#n這次派對是萬魔殿……不，是真琴前輩輸了。"
10031080-33 = "噗哈！伊呂波醬！這樣說會不會太直接了啊？"
10031080-34 = "雖然這已經是真琴醬的日常了。"
10031080-36 = "不！不對！還沒結束……！"
10031080-37 = "在那麼緊迫的時間內……陽奈根本不可能認真練習鋼琴！"
10031080-38 = "這種情況下還敢出現在現場……肯定是跑來丟臉的沒錯！"
10031080-39 = "不是，那句話根本就是Flag吧……"
10031080-41 = "………………"
10031080-43 = "（我一直……都很努力練習……）"
10031080-44 = "（不是為了別人，而是為了回應你的期待）"
10031080-45 = "（所以，為了你……）"
10031080-48 = "……現在我能做的就是全力以赴。"
10031080-74 = "[ns]「……太厲害了。」"
10031080-78 = "……呃啊啊啊！怎麼會！"
10031080-79 = "這，這種演奏……不對呀！#n陽奈明明不會彈鋼琴……！"
10031080-80 = "不，難道說……那個情報打從一開始……就是為了擾亂我們的假情報……！？"
10031080-81 = "可，可惡的風紀委員會……！究竟打算妨礙我到什麼時候才肯善罷甘休……！"
10031080-82 = "[s]「不是，這個舞台是真琴準備的吧……」"
10031080-83 = "沒錯，是真琴前輩自討苦吃。"
10031080-84 = "……哈！是，是嗎！？呃啊啊啊！！！"
10031080-91 = "……呼。"
10031080-96 = "委員長！真是太厲害了！"
10031080-102 = "委員長！你什麼時候這麼會彈鋼琴了！？"
10031080-103 = "真是充滿魅力……又十分美麗。"
10031080-108 = "啊，嗯……謝謝。"
10031080-109 = "幸好趕上了……"
10031080-110 = "[s]「辛苦你了。陽奈的演奏……確實觸動了我的內心。」"
10031080-111 = "啊，老，老師……"
10031080-112 = "嗯，能聽到你這麼說……看來努力沒有白費呢。"
10031080-113 = "真的很謝謝你。"
10031080-114 = "[s1]「真的是辛苦你了。不只要解決事件，還得準備演奏……」\n[s2]「身體還好嗎？有沒有因為太逞強導致身體狀況變差……」"
10031080-117 = "嗯？"
10031080-118 = "不，沒有老師說得那麼嚴重……"
10031080-119 = "[s]「雖然你這麼說，這段期間的騷動其實挺大的吧……？」"
10031080-120 = "啊，你指的是真琴議長策畫的這些事件吧。"
10031080-121 = "嗯……確實是有點累沒錯……"
10031080-122 = "不過萬魔殿本來就常常做這種事。#n這次感覺也不算特別辛苦吧？"
10031080-123 = "是，畢竟我行我素的真琴議長時不時就會暴走。#n我都已經習以為常了。"
10031080-124 = "[s]「……那個，這類的騷動大約多久會發生一次呢？」"
10031080-125 = "從我個人的體感來看…… "
10031080-126 = "1年4次左右……？"
10031080-129 = "這在格黑娜是日常生活的一部分。"
10031080-130 = "要是議長太安靜的話，反而會讓我們更擔心吧？"
10031080-131 = "[s]「格黑娜的日常……真是太可怕了！」"
10031080-133 = "好了，閒聊就先說到這邊，派對現在才開始哦？"
10031080-134 = "如果願意的話……能麻煩你護送我嗎？老師。"
10031080-135 = "[s]「陽奈不介意的話，我很樂意。」"
10031080-136 = "呵呵。那麼……"
10031080-142 = "──拜託你了，老師。"
10031080-144 = "（在無數的騷動之後，快樂的派對時間總算開始了）"
10031080-145 = "向陽前行 她們的小夜曲"

[translation]
10031080-1 = "Epilogue;Starting the Party"
10031080-2 = "Once all the problems were resolved, the Gehenna Special Party got a proper reset."
10031080-6 = "All right. Sensei, Ako, I'll be back shortly."
10031080-7 = "Right! G-Good luck, Head Prefect!"
10031080-13 = "[ns] \"Good luck, Hina.\""
10031080-18 = "Ugh! S-Sorasaki Hina... You...! "
10031080-19 = "I threw all those distractions at you, and yet still you made it here."
10031080-20 = "Go, Hina! That was so cool!"
10031080-21 = "I-Ibuki?!"
10031080-27 = "Just admit it, Makoto... The Pandemonium Society...no, you've lost."
10031080-33 = "Haha! You got that right, Iroha!"
10031080-34 = "Well, that's how it goes with Makoto."
10031080-36 = "No! This isn't over! Not yet!"
10031080-37 = "There's no way Hina would've had time to prepare for the recital!"
10031080-38 = "...She's just putting on a brave face! She can't play! She's going to embarrass herself! Everyone knows it!"
10031080-39 = "It seems denial is a river that runs deep..."
10031080-41 = "..."
10031080-43 = "(I've practiced hard...)"
10031080-44 = "(All to live up to your expectations...)"
10031080-45 = "(So, in a way, this song is for you...)"
10031080-48 = "...I'll do the very best I can."
10031080-74 = "[ns] \"...That was amazing.\""
10031080-78 = "...Urgh! S-She got me!"
10031080-79 = "How can she play like this?! Our intelligence swore that she couldn't play piano!"
10031080-80 = "Wait, what if that intelligence was fake? Counter-intelligence to create confusion!"
10031080-81 = "P-Prefect Team! When will you stop ruining my plans?! What will it take for you to be satisfied?!"
10031080-82 = "[s] \"You're the one who made the stage and put her up there, Makoto...\""
10031080-83 = "Yeah, Makoto. You had this coming."
10031080-84 = "*gasp* D-Did I?! Argh!!!"
10031080-91 = "...Phew."
10031080-96 = "Head Prefect, that was amazing!"
10031080-102 = "When did you get so good at playing piano?!"
10031080-103 = "Your performance was truly beautiful."
10031080-108 = "Ah...yes. Thank you... All of you."
10031080-109 = "I managed to make it here in time. Somehow."
10031080-110 = "[s] \"You were brilliant, Hina. Your song really touched my heart.\""
10031080-111 = "Ah, S-Sensei..."
10031080-112 = "O-Of course. If you liked it, then it was worth the effort."
10031080-113 = "Thank you. I mean it."
10031080-114 = "[s1] \"Don't thank me. You're the one who took on those cases and still found time to practice.\"\n[s2] \"Are you feeling okay? You didn't push yourself too hard, did you?\""
10031080-117 = "Hm?"
10031080-118 = "I suppose it was busy, but I didn't have to push myself that hard."
10031080-119 = "[s] \"Busy feels like an understatement if we're talking about the last few days...\""
10031080-120 = "Oh, you're referring to Makoto's schemes."
10031080-121 = "Well... Those were a bit rough..."
10031080-122 = "But the Pandemonium Society does things like that all the time. It was no big deal. More of the same really."
10031080-123 = "Yeah. Makoto goes on rampages like that all the time."
10031080-124 = "[s] \"...Um, how often do these rampages happen?\""
10031080-125 = "I'd say... "
10031080-126 = "About 4 times a year?"
10031080-129 = "It's a part of everyday life here in Gehenna."
10031080-130 = "I'd actually be worried if the chairman wasn't up to something."
10031080-131 = "[s] \"Gehenna's a scary place!\""
10031080-133 = "Now then... Why are we wasting time standing around talking? Isn't this a party?"
10031080-134 = "Care to accompany me, Sensei?"
10031080-135 = "[s] \"Happily.\""
10031080-136 = "Fufu. Well then."
10031080-142 = "Lead the way, Sensei."
10031080-144 = "After a week's worth of trouble, Gehenna was graced with a fantastic party. It was a fun time for all."
10031080-145 = "Basking in the Brilliance of Their Serenade"

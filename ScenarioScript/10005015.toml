[translation]
10005015-4 = "呼……"
10005015-5 = "有追兵嗎？"
10005015-9 = "……沒有。"
10005015-10 = "似乎沒事了，看來撤退得很順利。#n也沒有讓他們看到我們的臉……"
10005015-11 = "老師，您還好嗎？#n有沒有哪裡會痛？"
10005015-12 = "[s1]「嗯，我沒事。謝謝。」\n[s2]「雖然膝蓋有點痛，不過這也是老毛病了……」"
10005015-13 = "那真是太好了。我放心了。"
10005015-14 = "啊，啊哈哈……#n那倒是，有點難評論呢……"
10005015-15 = "哎呀，話說回來……"
10005015-16 = "隊長，那位是……？"
10005015-18 = "……嗯？啊，這傢伙嗎？"
10005015-23 = "……唔，唔唔……？"
10005015-24 = "這，這裡是……客房……？發生了什麼……"
10005015-29 = "啊！你，你們是……！"
10005015-38 = "嘎！咕啊！？唔…… "
10005015-44 = "特地帶過來了嗎……？"
10005015-45 = "這也沒辦法，我們的臉都被這傢伙看光了。#n放過他的話不就所有人都知道了嗎。"
10005015-46 = "總之，在事情告一段落之前先讓他在這裡睡一覺吧。"
10005015-48 = "確實，這也沒辦法呢。"
10005015-49 = "既然如此，先把他的手腳反綁起來……"
10005015-53 = "也幫他戴上眼罩吧。#n雖然已經暴露了我們在客房裡，再給他更多情報的話不知道會發生什麼事。"
10005015-54 = "要是醒來之後大叫會很麻煩的，嘴巴也用什麼貼起來吧。"
10005015-58 = "[ns]「……」"
10005015-60 = "[ns3]「這樣看起來有點……」\n[ns4]「真是毫不留情呢……可以的話稍微溫柔一點……」"
10005015-61 = "嗯？有什麼奇怪的嗎？"
10005015-62 = "嗯？有什麼奇怪的嗎？"
10005015-63 = "這都是家常便飯了。#n也沒讓他受傷，不如說已經很溫柔了。"
10005015-64 = "就是啊。要是老師不在的話，#n隊長說不定已經綁住他的四肢丟進海裡了呢。"
10005015-65 = "少囉嗦啊朱音！"
10005015-66 = "不過總之，這樣一來應該就沒問題了。"
10005015-67 = "朱音，接下來呢？"
10005015-69 = "那麼，既然據點已經建立完成……"
10005015-70 = "雖然很想就這麼前去控制住中控室，但在那之前還有件不得不做的事呢。"
10005015-71 = "什麼意思？"
10005015-72 = "剛才隊長讓他沉默之前，他不是說了很多嗎。#n看來在這艘船上，似乎有著特殊的規定。"
10005015-73 = "這種兔女郎的服裝，在他口中簡直就像是這裡普通的服裝一樣。#n老師姑且不論，我們應該也該換上才對。"
10005015-74 = "啊啊，這麼說來……他是說過那種話。"
10005015-75 = "雖然至今為止只要穿著女僕裝，不管是什麼地方都能輕鬆潛入……"
10005015-76 = "這裡也有這裡的規則呢，雖然有點特殊。"
10005015-77 = "所以，為了順利地展開行動，還是換套衣服比較好呢。"
10005015-79 = "真麻煩啊……？"
10005015-80 = "這樣一定也能避免麻煩的唷。#n來，這是我剛才借來的。"
10005015-85 = "尺寸應該也沒問題，畢竟一直都有在觀察嘛。"
10005015-86 = "不愧是朱音，身手真不錯啊？"
10005015-91 = "……？"
10005015-92 = "這是剛才，從昏過去的他們身上脫下來的嗎……"
10005015-93 = "仔細想想，尺寸之類的究竟是……#n難道你剛才說的「一直都有在觀察」是……？"
10005015-94 = "呵呵，那種小事就別在意了。"
10005015-95 = "總之，先穿穿看吧？"
10005015-96 = "啊，隊長請來這裡。#n我來幫您穿吧。"
10005015-97 = "啊？"
10005015-98 = "別把我當小孩啊？"
10005015-99 = "哎呀，您知道該怎麼穿嗎？"
10005015-100 = "不知道。"
10005015-101 = "呵呵，那就由我來幫忙吧。"
10005015-102 = "嗯。"
10005015-105 = "朱音，你剛才說的話我果然還是很在意，你為什麼會知道我們的尺寸……"
10005015-109 = "請別在意那種小事。"
10005015-110 = "好嗎？"
10005015-111 = "……"
10005015-112 = "算了，現在最重要的是任務……"
10005015-113 = "喂，這到底要怎麼穿啊？#n話說這形狀是怎麼回事，這真的是衣服嗎？"
10005015-114 = "哎呀哎呀，請等一下。"
10005015-115 = "那麼，換完裝後就前往中控室，之後……"
10005015-116 = "……？"
10005015-117 = "老師，怎麼了？#n有什麼在意的事嗎？"
10005015-118 = "[s5]「現在說可能有點晚了……」\n[s6]「……明日奈呢？」"
10005015-119 = "……？"
10005015-120 = "……？"
10005015-121 = "啊，原來如此……這樣啊。#n這麼說來還是第一次緊緊跟著我們進行作戰呢。"
10005015-122 = "明日奈前輩的事，不用在意也沒關係的。#n該說本來就是這樣嗎……"
10005015-123 = "就算說了，他也不會乖乖聽話的。"
10005015-124 = "是啊，也可以說是游擊隊吧……#n明日奈前輩是更適合自由行動的類型。"
10005015-125 = "當然，我們會在一開始的會議中傳達各種事項，#n但之後就會讓他自由行動了，一直都是這樣的。"
10005015-126 = "話說，那個……"
10005015-127 = "[s]「……？」"
10005015-133 = "該怎麼說呢……"
10005015-134 = "那個，要說就這樣也沒關係的話倒是完全沒關係……"
10005015-135 = "可以的話，那個……再怎麼說，就這樣被盯著看也有點……"
10005015-136 = "啊啊不過，和我們一起換衣服也是可以的哦？"
10005015-137 = "[s7]「……抱歉。」\n[s8] 靜靜地向後轉"
10005015-142 = "（就這樣，度過了看似漫長實際卻短暫的時間）"

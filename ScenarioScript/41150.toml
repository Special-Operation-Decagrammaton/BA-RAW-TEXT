41150-15 = "1;모에;05;돈이 남으면 플라스틱 폭탄이나 몇 개 더 사지."
41150-16 = "3;사키 헬멧;12;너는 폭탄으로 밥을 짓고, 폭탄으로 헬리콥터를 돌릴 생각이야?"
41150-17 = "3;사키 헬멧;11;전장에서 화력이 무조건 제일은 아니거든?!"

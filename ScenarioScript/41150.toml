[translation]
41150-1 = "Episode 15; A Small but Certain Failure"
41150-2 = "Kousagi Park"
41150-6 = "I'm still a bit shocked. Moe really found someone to buy our rusty, useless missiles."
41150-7 = "They even paid us in cash..."
41150-8 = "I've never seen so much cash in my life..."
41150-10 = "Did no one else find that buyer suspicious?"
41150-11 = "They show up with their faces completely covered, have wads and wads of cash, and don't even inspect the weapons?"
41150-12 = "What... What if it's bad cash? Like black money?"
41150-13 = "Oh my sweet, summer child. Cash is cash. We can buy new toys and ammo and that's all that matters."
41150-14 = "But also, Saki. What was with all that solid fuel and gasoline you ordered? You can't blow anything up with that."
41150-15 = "I couldn't buy my aerosol bombs because of you."
41150-16 = "Are you stupid? Do you want to cook us dinner and fly around the helicopter with your precious babies? Huh?"
41150-17 = "Explosives aren't the most important thing on the battlefield, you know!"
41150-18 = "You calling me stupid? You're stupider! Name one thing that's more important than explosives!"
41150-19 = "I can finally breathe a little."
41150-20 = "It's nowhere near our original stockpile, but we've mostly replenished most of what we lost to the flood."
41150-21 = "At the very least, we should be able to secure the perimeter for a little while."
41150-23 = "*pant* *pant* Help me!"
41150-35 = "Speak of the devil. An intruder."
41150-36 = "Heeheehee! Come, my little babies! Time to go ka-boom!"
41150-38 = "No, dammit! I'm asking you for help!"
41150-39 = "...What do you want?"
41150-40 = "It's against protocol for us to involve ourselves in civilian affairs."
41150-41 = "Yeah, so buzz off. Go ask your Pathetic-friends or whatever you call them."
41150-42 = "Pursuers! Short for the Pursuers of Non-Possessive Happiness!"
41150-43 = "Thanks to you guys, most of them have left me..."
41150-44 = "I told you greed was evil! The Public Peace Bureau of Valkyrie Police School have driven the rest of us out by force and destroyed our treasured possessions. My things!"
41150-45 = "The Public Peace Bureau?"
41150-46 = "Those uppity cops wouldn't spare half a cent on a bunch of hobos like you."
41150-47 = "M-Maybe you mixed them up with the Security Bureau?"
41150-48 = "I'm not stupid! I saw them, I swear!"
41150-49 = "That psychopath went postal in our beloved sanctuary, swinging around some crazy weapon I've never seen!"
41150-50 = "[s1] \"The Public Peace Bureau...\"\n[s2] \"Was that Kanna...?\""
41150-55 = "Show me the bullet marks on your gloves."
41150-61 = "Scorch marks from thermate and traces of direct hits from high-density bullet cores..."
41150-62 = "These weren't ordinary bullets. They appear to be high-explosive incendiary armor-piercing ammunition, or HEIAP."
41150-63 = "[s] \"You can tell just from the bullet traces?\""
41150-64 = "Not always. But I've studied these in textbooks."
41150-65 = "Although, it's my first time seeing HEIAP bullets of this caliber in person."
41150-66 = "Same here. It's too expensive and impractical for use in personal firearms, so they're never produced. Well, until now I guess."
41150-67 = "The only company with the capability to mass-produce these..."
41150-68 = "Kaiser Industries."
41150-73 = "So the ingrates who bought all my weapons from Kaiser before I could was Valkyrie Police School?"
41150-74 = "B-But this kinda weaponry has to be s-super expensive..."
41150-80 = "And seeing how there's barely enough budget for bullets these days, I can't be selfish."
41150-81 = "At this rate, I'm going to be wielding a peashooter against a flamethrower! Or worse!"
41150-83 = "Are you okay, Sensei?"
41150-84 = "[s] \"Yeah...just lost in thought.\""
41150-85 = "Did you fall asleep standing up?"
41150-86 = "Heehee. It looks like Sensei has at least one talent."
41150-87 = "Anyways, it looks like you were caught in the crossfire of a police investigation. Better luck next time."
41150-89 = "That's it?! You think this doesn't affect you too?"
41150-90 = "It wasn't just us! The Public Peace Bureau was raiding the entire city, kicking out every vagrant and homeless person they could find."
41150-91 = "They could be here any minute!"
41150-96 = "Augh!"
41150-106 = "Did you know? When wild animals are in danger, they'll run towards the strongest leader in the area."
41150-111 = "I guess that hobo saved me from having to search for my garbage."
41150-113 = "Next Episode; Rebate"

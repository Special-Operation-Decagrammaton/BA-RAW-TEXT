41150-11 = "3;사키 헬멧;05;얼굴을 꼭꼭 가린 채 나타난 것부터 시작해서, 무기의 상태도 제대로 보지 않고 엄청난 금액의 현금을 에누리 없이 건네다니……."
41150-12 = "3;사키 헬멧;12;우리가 받은 돈. 사실 어딘가의 검은돈이거나 위조지폐 같은 거 아냐?\n#3;stiff"
41150-13 = "1;모에;03;돈의 출처야 아무렴 어때. 새로운 무기와 탄약을 구할 수만 있다면 그만이지.\n#1;em;[음표]\n#1;ar\n#1;hophop\n#3;m5"

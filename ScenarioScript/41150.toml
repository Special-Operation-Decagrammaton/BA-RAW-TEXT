[translation]
41150-1 = "第15話;ささやかで確実な敗北"
41150-2 = "子ウサギ公園"
41150-6 = "まさか、あの錆びたミサイルを欲しがる方がいるとは……意外です。"
41150-7 = "そ、それに全部現金で……。"
41150-8 = "こんな額のお金、初めて見た……。"
41150-10 = "……あいつ、なんか怪しいな。"
41150-11 = "器用に顔隠してるし、武器の状態確認とかもしなかったし……この額で値引き交渉も無しとか。"
41150-12 = "もしかしてそのお金、偽造紙幣とかじゃないのか？"
41150-13 = "まあまあ、お金の出所なんてどうでも良いじゃん。新しい兵器が買えるなら何の問題も無いし。"
41150-14 = "……っていうかサキ、何で最初に注文するのが固体燃料とガソリンなわけ？"
41150-15 = "こんなにお金があるんだから、プラスチック爆弾でも買えば良いのに。"
41150-16 = "お前は爆弾でご飯を炊く気か？それにそもそも、ヘリを動かすのに必要だろうが。"
41150-17 = "火力はあればあるほど良いってわけじゃないだろ。"
41150-18 = "何言ってんの、戦場で一番大事なのは火力でしょ！"
41150-19 = "とにかく、良かったです。"
41150-20 = "これで戦力も、多少なりとも回復することができました。"
41150-21 = "しばらくは、誰かが来ても撃退できそう……"
41150-23 = "た、助けてください……。"
41150-35 = "言ってる傍から侵入者じゃん。"
41150-36 = "くひひ、ナイスタイミング。早速こいつの火力を試すとするか。"
41150-38 = "もう私のことを忘れたのか！？というか「助けて」と言っただろう！？"
41150-39 = "……それで、今回はどうしたのですか？"
41150-40 = "私たちは原則的に、市民間の私的な紛争には介入しないのですが。"
41150-41 = "そうそう、問題が起きたならあの「背格好」とかいう仲間にでも助けてもらえば良いじゃん？"
41150-42 = "「所確幸」だ！「所有せずとも確かな幸せを探す集い」、略して「所確幸」！"
41150-43 = "悲しいことに、「所確幸」の仲間たちはみんなバラバラになってしまったのです……。"
41150-44 = "ただでさえ数が少なくなっていたところを、ヴァルキューレの公安局たちが押し入ってきて……！"
41150-45 = "……公安局？"
41150-46 = "公安局が、あんたたちみたいな放浪者と喧嘩しに来るわけなくない？"
41150-47 = "け、警備局の間違いでは……？"
41150-48 = "いえ、確かなのです！私はこの目ではっきりと見ました！"
41150-49 = "見慣れない武器を持ち、私たちの聖所で暴れるあの「狂犬」の姿を！"
41150-50 = "[s1] \"それって……？\"\n[s2] \"カンナ……？\""
41150-55 = "……おい、その弾痕を見せろ。"
41150-61 = "この発火の具合、角度からして硬度も高いし……。"
41150-62 = "これ、[ruby=徹甲炸裂焼夷弾]HEIAP[/ruby]だな。"
41150-63 = "[s] \"撃たれた跡だけで分かるの？\""
41150-64 = "完全にではないけど、教範にも載ってることだ。"
41150-65 = "……この口径のHEIAP弾、初めて見ました。"
41150-66 = "そもそも、あんまり生産されてるものじゃない。個人の火器にしては高すぎるし、実用性も低い。"
41150-67 = "強いてあり得るとすれば……"
41150-68 = "「カイザーインダストリー」くらいか？"
41150-73 = "となると「カイザーインダストリー」で大量に武器を買い占めたのは、ヴァルキューレってこと？"
41150-74 = "で、でもヴァルキューレ警察学校に、そんな資金的な余裕あるかな……？"
41150-80 = "そもそもどうやらヴァルキューレ全体として、財政状況が良くないそうで……弾丸の補充にも一苦労です。"
41150-81 = "何だかこのままでは、ヴァルキューレ警察学校の武装がまるで貧弱みたいに見えてしまいそうです。"
41150-83 = "どうしましたか、先生？"
41150-84 = "[s] \"あ、ごめん。ちょっと考え事。\""
41150-85 = "なんだ、立ったまま昼寝でもしてるのかと思った。"
41150-86 = "起きてるのに夢が見られるのは良いことだねぇ。"
41150-87 = "とにかく、ヴァルキューレの件についてはご愁傷様でした。"
41150-89 = "「ご愁傷様」じゃない！君たちにとっても他人事では無いんだぞ！？"
41150-90 = "公安局のターゲットは私たちだけじゃない。この周辺をパトロールして、片っ端から追い出そうとしているんだ！"
41150-91 = "今ここに来たとしても、何もおかしくな――"
41150-96 = "……ぐはっ！"
41150-106 = "……野生動物は危機に瀕すると、最も強力な群れにすり寄るもの。"
41150-111 = "ここにいたのか、歩き回る手間が省けたな。"
41150-113 = "次回;リベート"

[translation]
41150-1 = "ตอนที่ 15;ความพ่ายแพ้เล็กๆ"
41150-2 = "โคะอุซางิ การ์เด้น"
41150-6 = "ไม่อยากเชื่อเลยค่ะว่าจะมีใครอยากซื้อมิสไซล์ขึ้นสนิมของเราด้วย..."
41150-7 = "แถมยังจ่ายด้วยเงินสดที่หน้างานอีกด้วย..."
41150-8 = "เกิดมาไม่เคยเห็นเงินสดมากมายขนาดนั้นมาก่อนเลย..."
41150-10 = "ฉันว่าคนที่มาซื้อต้องมีอะไรแปลกๆ..."
41150-11 = "เริ่มจากการปรากฏตัวแบบปิดหน้าปิดตา แล้วก็ไม่ตรวจเช็กอาวุธสักอย่าง แถมยังยอมจ่ายเป็นเงินสด#nแบบไม่ต่อราคาอีกด้วย..."
41150-12 = "เงินที่พวกเราได้มาคือเงินนอกระบบหรือเปล่านะ? แล้วถ้าเป็นแบงก์ปลอมล่ะ?"
41150-13 = "จะไปสนแหล่งที่มาของเงินทำไม แค่เอาไปซื้ออาวุธกับกระสุนใหม่ได้ก็พอแล้ว"
41150-14 = "ว่าแต่ซากิ ทำไมเธอถึงเลือกสั่งน้ำมันเบนซินกับเชื้อเพลิงแข็งที่ไม่ค่อยจะมีสมรรถภาพล่ะ?"
41150-15 = "ถ้าเงินเหลือก็เอาไปซื้อระเบิดพลาสติกเพิ่มยังจะดีซะกว่า"
41150-16 = "บ้านเธอใช้ระเบิดหุงข้าวหรือใช้ระเบิดเป็นเชื้อเพลิงให้เฮลิคอปเตอร์รึไง?"
41150-17 = "เราไม่ต้องกว้านซื้อแต่อาวุธก็ได้นะ!"
41150-18 = "พูดอะไรของเธอ ในสนามรบยังมีอะไรสำคัญกว่าอาวุธอีกหรือไง?"
41150-19 = "แต่ก็ดีแล้วละค่ะ"
41150-20 = "ถึงเราจะไม่ได้มีข้าวของมากเท่าตอนมาอยู่ในสวนสาธารณะนี้ใหม่ๆ แต่การซื้อขายครั้งนี้ก็ทำให้เราได้#nของที่เสียหายไปจากฝนตกหนักมาเกือบครบเลยค่ะ"
41150-21 = "ต่อไปถ้ามีแขกไม่ได้รับเชิญมาบุกสวนสาธารณะอีก เราก็คงขับไล่ได้โดยง่ายค่ะ..."
41150-23 = "แฮ่ก... แฮ่ก... ช่วยด้วย"
41150-35 = "พูดยังไม่ทันขาดคำเลย มีใครบุกมาอีกแล้วเหรอ?"
41150-36 = "อยากทดสอบอาวุธที่ซื้อมาใหม่อยู่พอดีเลย เหมาะเจาะอะไรอย่างนี้! ฮุฮุฮุ..."
41150-38 = "ไม่ใช่นะ! ฉันมาขอให้ช่วยต่างหาก! "
41150-39 = "มีอะไรเหรอคะ...?"
41150-40 = "ตามระเบียบแล้ว เราจะไม่เข้าไปแทรกแซงในข้อพิพาทส่วนตัวของพลเมืองหรอกนะคะ..."
41150-41 = "ใช่ ถ้ามีปัญหาอะไรก็ไปให้พวกพ้องของเธอช่วยสิ ชื่อกลุ่มว่าอะไรนะ? ความเสี่ยวเล็กๆ หรือเปล่า?"
41150-42 = "\"ความสุขเล็กๆ\" ต่างหาก! กลุ่มผู้แสวงหาความสุขเล็กๆ แบบไม่ต้องครอบครอง! ย่อสั้นๆ ว่า \"ความสุขเล็กๆ\""
41150-43 = "ฮึ่ม... และก็น่าเศร้าใจที่พวกพ้องชาวความสุขเล็กๆ ของฉันกระจัดกระจายกันไปหมดแล้ว..."
41150-44 = "กรมความมั่นคงสาธารณะจากสถาบันฝึกตำรวจวัลคิรี่ใช้อํานาจบาตรใหญ่เข้ามาขับไล่พวกพ้องที่เหลือ#nของเรา แล้วก็ทำลายของสะสมที่มีค่าของพวกเราด้วย!"
41150-45 = "กรมความมั่นคงสาธารณะเหรอ?"
41150-46 = "กรมความมั่นคงสาธารณะไม่น่ามีเวลาว่างมาสู้กับคนไร้บ้านอยู่หรอกนะ"
41150-47 = "เข้าใจผิดหรือเปล่า พวกนั้นคือสำนักความมั่นคงหรือเปล่าคะ?"
41150-48 = "ไม่ได้เข้าใจผิดนะ! ฉันเห็นมากับตาของตัวเองเลย!"
41150-49 = "พวกนั้นฉุนเฉียวเข้ามาในห้องบูชาอย่างกับ \"หมาบ้า\" พร้อมกับอาวุธที่ฉันไม่เคยเห็นมาก่อนด้วย!"
41150-50 = "[s1] \"หัวหน้ากรมฯ คันนะ...?\"\n[s2] \"จากสถาบันฝึกตำรวจวัลคิรี่...?\""
41150-55 = "เดี๋ยวก่อน ขอฉันดูรอยกระสุนที่ถุงมือหน่อย"
41150-61 = "รอยการเผาไหม้และรอยกระแทกโดยตรงอย่างแรง..."
41150-62 = "นี่ไม่ใช่กระสุนธรรมดาแน่ น่าจะเป็นกระสุนระเบิดแรงสูงหรือ HEIAP เลยละ"
41150-63 = "[s] \"ดูแค่รอยกระสุนก็รู้แล้วเหรอ?\""
41150-64 = "ก็ไม่ได้รู้ทั้งหมดหรอก แต่ถ้ามีในหนังสือคู่มือฉันก็จำได้หมดน่ะ"
41150-65 = "ฉันเพิ่งเคยเห็นรอยกระสุนจาก HEIAP เป็นบุญตาครั้งแรกเลยค่ะ..."
41150-66 = "อื้ม ก็เพราะมันเป็นอาวุธที่โครงสร้างซับซ้อนเกินกว่าจะมาใช้เป็นอาวุธส่วนตัว แถมยังราคาแพง#nและบกพร่องเรื่องการใช้งานจริง เรียกได้ว่าแทบจะไม่ผลิตในคิโวทอสเลยล่ะ"
41150-67 = "บริษัทที่ผลิตของแบบนี้เป็นจำนวนมากได้..."
41150-68 = "น่าจะเป็นไคเซอร์ อินดัสทรีหรือเปล่า?"
41150-73 = "อย่าบอกนะว่าลูกค้าที่มาซื้ออาวุธกับกระสุนปืนของไคเซอร์ อินดัสทรีไปจนหมดจะเป็นสถาบันฝึก#nตำรวจวัลคิรี่?"
41150-74 = "สถาบันฝึกตำรวจวัลคิรี่จะเอาเงินมาซื้ออาวุธแพงๆ ได้ยังไง..."
41150-80 = "แถมช่วงนี้สถานการณ์ทางการเงินของโรงเรียนก็ไม่ค่อยดี อย่าว่าแต่อาวุธดีๆ เลยค่ะ แค่ซื้อกระสุนปืน#nยังยากเลย..."
41150-81 = "ขืนเป็นแบบนี้ คนที่จะงานเข้าที่สุดคงเป็นผู้รับผิดชอบความสงบเรียบร้อยของบ้านเมืองอย่างสถาบัน#nฝึกตำรวจวัลคิรี่ค่ะ อาวุธของเราสู้ไม่ได้หรอก"
41150-83 = "คิดอะไรอยู่เหรอคะคุณครู?"
41150-84 = "[s] \"พอดีนึกอะไรขึ้นได้นิดหน่อยน่ะ\""
41150-85 = "อะไรของเค้า ยืนฝันกลางวันอยู่หรือไง?"
41150-86 = "ยืนหลับแล้วฝันได้ด้วยเหรอ เป็นทักษะที่สุดยอดไปเลยนะ"
41150-87 = "เอาเถอะ ตอนนี้สถานการณ์ก็ชัดเจนขึ้นแล้วค่ะ นับเป็นโชคไม่ดีของคุณที่ไปติดกับเครือข่ายสืบสวน#nของพวกตำรวจเข้า"
41150-89 = "โชคไม่ดีของฉันงั้นเหรอ? พวกเธอเองก็ด้วยนะ!"
41150-90 = "พวกกรมความมั่นคงสาธารณะไม่ใช่แค่จะเล่นงานแต่พวกฉัน พวกนั้นกำลังลาดตระเวนพื้นที่รกร้าง#nแล้วขับไล่คนไร้บ้านทุกคนที่เจอเลย!"
41150-91 = "ป่านนี้พวกนั้นคงใกล้มาถึงที่นี่แล้ว..."
41150-96 = "อ๊ากกก!"
41150-106 = "ในสถานการณ์วิกฤต สัตว์ป่าย่อมมารวมตัวกันใกล้ๆ เจ้าป่าที่มีอำนาจมากที่สุด..."
41150-111 = "ต้องขอบใจนะที่ทำให้ฉันไม่ต้องลำบากเดินเก็บขยะให้ทั่ว"
41150-113 = "ตอนต่อไป;เงินคืน"

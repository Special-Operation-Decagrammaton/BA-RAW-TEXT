[translation]
41150-1 = "第15話;小而確實的敗北"
41150-2 = "兔寶寶公園"
41150-6 = "沒想到真的有人想要那個生鏽導彈……真意外。"
41150-7 = "而，而且全都是現金……"
41150-8 = "這種數量的現金，還是第一次看到……"
41150-10 = "……那傢伙，感覺很可疑啊。"
41150-11 = "臉部隱藏得很好，也不確認武器狀態……用這金額交易還不交涉。"
41150-12 = "那些錢該不會是假鈔吧？"
41150-13 = "嘛嘛，錢的出處無所謂啦。能買新兵器就沒問題了。"
41150-14 = "……話說咲希，為什麼最先下訂的是固體燃料和汽油啊？"
41150-15 = "有這麼多錢，直接買塑膠炸彈就好啦。"
41150-16 = "你打算用炸彈煮飯嗎？再說要讓直升機動起來當然需要吧。"
41150-17 = "不是火力越強越好吧。"
41150-18 = "你在說什麼啊，戰場上最重要的是火力吧！"
41150-19 = "總之，真是太好了。"
41150-20 = "這樣戰力也能多少回復了。"
41150-21 = "暫時，不管是誰來應該都可以擊退……"
41150-23 = "請，請幫幫我……"
41150-35 = "才剛說完就有入侵者。"
41150-36 = "咕嘻嘻，時機正好。馬上就來試試這傢伙的火力吧。"
41150-38 = "已經忘記我了嗎！？話說我說了「幫幫我」吧！？"
41150-39 = "……所以，這次怎麼了嗎？"
41150-40 = "我們原則上，不會介入市民間的私人紛爭。"
41150-41 = "沒錯沒錯，有問題的話請那什麼「娑雀喜」的夥伴幫你不就好了嗎？"
41150-42 = "是「所確幸」！「就算無所有也要蒐集確實的幸福」，簡稱「所確幸」！"
41150-43 = "說來傷心，「所確幸」的夥伴們都跑走了……"
41150-44 = "偏偏在我們人數變少的這個時候，女武神公安局還大舉闖來……！"
41150-45 = "……公安局？"
41150-46 = "公安局不會和你們這種遊民打架吧？"
41150-47 = "不，不是和警備局搞混了嗎……？"
41150-48 = "不，千真萬確！我這雙眼清楚看見了！"
41150-49 = "那個「狂犬」拿著沒看過的武器，在我們的聖所大鬧的身姿！"
41150-50 = "[s1] 「你是指……？」\n[s2] 「環奈……？」"
41150-55 = "……喂，那個彈痕讓我看看。"
41150-61 = "這個燃燒狀態，以角度來看硬度也很高……"
41150-62 = "這個，[ruby=高爆燃燒穿甲彈]是HEIAP呢[/ruby]。"
41150-63 = "[s] 「只憑被射到的痕跡就知道了？」"
41150-64 = "也不完全是，不過教戰手冊上有記載。"
41150-65 = "……這個口徑的HEIAP彈，第一次看到。"
41150-66 = "畢竟沒怎麼在生產。以個人槍械來說太貴了，實用性也很低。"
41150-67 = "真要說有的話……"
41150-68 = "也只有「凱薩工業」吧？"
41150-73 = "那所以向「凱薩工業」大量搜刮武器的是，女武神？"
41150-74 = "可，可是女武神警察學園，在資金方面有那麼多餘裕嗎……？"
41150-80 = "更何況女武神整體的財政狀況似乎不太好……就連子彈的補給都很辛苦。"
41150-81 = "感覺這樣下去，女武神警察學園的武裝看起來就好像很貧弱一樣。"
41150-83 = "怎麼了嗎，老師？"
41150-84 = "[s] 「啊，抱歉。稍微在思考一些事。」"
41150-85 = "什麼啊，還以為是站著在睡午覺。"
41150-86 = "能醒著做夢是件好事呢。"
41150-87 = "總之，關於女武神的事，還請節哀。"
41150-89 = "才不是「請節哀」！這也和你們有關係啊！？"
41150-90 = "公安局的目標不只是我們。她們會在這一帶巡邏，把所有人徹底趕出去！"
41150-91 = "就算現在來到這裡，也不奇──"
41150-96 = "……咕哈！"
41150-106 = "……野生動物在面臨危機時，往往會投靠最強力的群體。"
41150-111 = "在這裡啊，省下到處走動的麻煩了呢。"
41150-113 = "下一話;回扣"

[translation]
13420-1 = "Episode 42;Epilogue 1"
13420-2 = "Good morning, Sensei!"
13420-3 = "Today's another busy day for the Abydos Foreclosure Task Force."
13420-4 = "...What? You just had a feeling of deja vu?"
13420-5 = "Ahaha... Is that so? "
13420-6 = "Looking back, it feels like so much time has passed since we rescued Hoshino, after she was kidnapped. But really, it hasn't been that long..."
13420-7 = "You think so too, Sensei? It's not just me?"
13420-8 = "Ahaha... I'm glad to hear that."
13420-14 = "*sigh* We're back."
13420-15 = "Serika...? And Shiroko? You're covered in dirt from head to toe. Where were you?"
13420-16 = "The oasis..."
13420-17 = "Seriously?! You still haven't given up?"
13420-18 = "There's a slim possibility that not everything got caught up in the explosion! I thought if there were two of us and we dug really, really deep..."
13420-19 = "Eight meters of digging later, nothing."
13420-20 = "Everything really did get blown away... Ten million yen per 100 grams... "
13420-25 = "You wanna know why you were unsuccessful, Serika?"
13420-26 = "Hoshino?!"
13420-27 = "Was there a condition we missed?!"
13420-32 = "It's because you didn't go in swimsuits."
13420-33 = "Who even thinks like that?! We're not like you or Yume! "
13420-34 = "Do you really think an oasis would suddenly explode and get us wet? Why should we prepare for an impossible circumstance? Oases come from rain, not groundwater!"
13420-38 = "Shiroko. If you don't stop making that \"Serika knows basic facts, and I'm so proud of her for it\" face..."
13420-39 = "You might have the facts right, Serika, but you're forgetting about history! Tradition! You still need to respect those things, don't you think? "
13420-40 = "Try wearing your swimsuit next time. Heh. It's an order from the student council president, okay?"
13420-41 = "Ugh... She only uses her title in situations like this..."
13420-45 = "Mhm. I'm glad Hoshino finally accepted the position of student council president."
13420-46 = "It took a large series of events, but she's finally filled that long-vacant position."
13420-47 = "We're taking one small, careful step forward at a time. But they feel rather significant, don't they?"
13420-48 = "Hm? Me? "
13420-49 = "Ahaha... I tried it for a couple of days, but such an authoritative role really doesn't suit me. "
13420-55 = "Is this satisfactory, Chairman?"
13420-59 = "No. Not even close. I don't want even a single shard of the Tyrant Emperor's work left behind."
13420-60 = "U-Understood! "
13420-62 = "Bring more explosives!"
13420-66 = "..."
13420-73 = "The Pandemonium Society's Chairman and the Head Prefect dealt with the traces of Gehenna's previous leader left at the Valley of Student Council Presidents."
13420-74 = "I heard those two are like oil and water—that they never get along. But, surprisingly, they didn’t fight at all when it came to this."
13420-75 = "They didn't share many details, so I don't know much... But what could have happened in their past?"
13420-77 = "As for the Kaiser President, he's holed up in the hospital and hasn't shown his face anywhere."
13420-78 = "Could it be that he's lost his purpose since we destroyed the Train Cannon he was so fervently pursuing?"
13420-79 = "That said, since Abydos is still in debt to Kaiser, we need to keep a close eye on their movements."
13420-82 = "I'm back! ♧"
13420-83 = "Oh, Nonomi. How'd it go?"
13420-84 = "The railway restoration ended well! All that's left now is to test it! "
13420-85 = "Three sections can even begin operations next week!"
13420-86 = "Oooh! Finally!"
13420-87 = "Heh. They work pretty fast."
13420-91 = "Ah, I also have good news!"
13420-92 = "Considering recent events, Nephthys has decided to begin investing in the Abydos district again."
13420-93 = "It's only a small project, working with Highlander Academy to connect the previously disconnected Abydos railway to some Trans-Desert Railway routes..."
13420-94 = "...but I hope this improves transportation throughout the district. It may even encourage more tourism."
13420-97 = "Great! It's moving!"
13420-98 = "Anything to report from inside the train?"
13420-101 = "No problems on this end!"
13420-103 = "(fidget) E-Everything is running smoothly? "
13420-104 = "More or less? The CCC didn't care all that much, but the Supervisory Office was surprisingly proactive about everything, so the whole process was pretty smooth."
13420-105 = "Nothing about this venture is profitable...so if anything goes wrong, we might— "
13420-106 = "Hey now, don't jinx it."
13420-107 = "We just have to restore the Abydos Central railway by winter, and your business won't be in the red!"
13420-111 = "..."
13420-112 = "Overseer?"
13420-113 = "Yes?"
13420-114 = "This middle school was closed down quite some time ago... Do you have business here?"
13420-115 = "Not particularly. It just happened to catch my eye, so I walked in."
13420-116 = "Well, you have your pick when it comes to abandoned schools in Abydos."
13420-117 = "But, to the matter at hand, would you mind heading to the site? It's currently under CCC's jurisdiction, and...well..."
13420-118 = "...Is it the twins?"
13420-119 = "Y-Yes. Nobody else can handle those officers..."
13420-123 = "A-Ah?! W-Wait! Overseer? Wait for me!"
13420-134 = "I don't know if it's because of that project, but the Abydos district has been showing signs of life lately."
13420-135 = "Downtown Abydos, which had been a ghost town for quite some time, has seen a surge of new businesses."
13420-136 = "...Although not all of them are new."
13420-137 = "Look here. We're already putting up advertisements in this passageway."
13420-138 = "Find somewhere else. Our store has owned this area for one hundred years."
13420-139 = "Sure is bold of you to pick a fight, considering you ran your business into the ground!"
13420-140 = "Your company went out of business too! Bring it on!"
13420-145 = "...How pathetic. "
13420-146 = "*sigh* Starting over somewhere like this..."
13420-148 = "Just give me a few years, and I'll escape this damned district! I swear it!"
13420-150 = "And, regarding the other Shiroko... We haven't seen hide nor hair of her since the incident."
13420-151 = "You haven't been able to find anything, Sensei?"
13420-152 = "[s] \"No... I've tried everything.\""
13420-153 = "I see... Mmm..."
13420-154 = "..."
13420-158 = "Well, they say no news is good news! She's way more experienced than us in every way, so I'm sure she's totally thriving!"
13420-159 = "Yeah... I'm sure she's fine."
13420-164 = "Yes. Our paths will cross again one day!"
13420-165 = "I never even had the chance to thank her..."
13420-173 = "Next Episode;Epilogue 2"

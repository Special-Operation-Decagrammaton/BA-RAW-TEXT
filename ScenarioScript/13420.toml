[translation]
13420-1 = "ตอนที่ 42;บทส่งท้าย 1"
13420-2 = "สวัสดีค่ะคุณครู อรุณสวัสดิ์ค่ะ!"
13420-3 = "หนึ่งวันที่เร่งรีบของคณะกรรมการแผนงานอะบิดอสเริ่มขึ้นอีกแล้วนะคะ"
13420-4 = "คะ...? เหมือนเป็นประโยคจากบทละครที่ได้ยินบ่อยๆ งั้นเหรอ?"
13420-5 = "แหะๆ... งั้นเหรอคะ? "
13420-6 = "จะว่าไป รู้สึกว่าตอนที่เราไปช่วยรุ่นพี่โฮชิโนะนั้นผ่านมานานแล้วเลยนะคะ ถ้ามาคิดดู มันก็เพิ่งผ่านมาไม่นานเอง..."
13420-7 = "คะ? คุณครูก็คิดเหมือนกันเหรอคะ? ไม่ใช่แค่ฉันที่รู้สึกแบบนั้นงั้นเหรอคะ?"
13420-8 = "แหะๆๆ... ค่ะ ถ้างั้นก็ค่อยยังชั่วหน่อยค่ะ"
13420-14 = "เฮ้อ... กลับมาแล้ว"
13420-15 = "เซริกะจัง...? ทำไมตัวเปื้อนกลับมาเลย ไปไหนมาน่ะ? รุ่นพี่ชิโรโกะก็ด้วยอีกคน...?"
13420-16 = "โอเอซิส..."
13420-17 = "ว่าไงนะ? ยังไม่ยอมแพ้กันอีกเหรอ?"
13420-18 = "ฉันคิดว่าอาจมีบางอย่างที่ยังไม่เกิดปฏิกิริยาลูกโซ่อยู่ในส่วนลึกใต้ดินก็ได้ ก็เลยชวนรุ่นพี่ชิโรโกะไปขุดที่นั่นกันมาน่ะ..."
13420-19 = "แต่ขุดลงไปลึก 8 เมตรแล้วก็ไม่เจออะไรอยู่ดี..."
13420-20 = "สงสัยตอนนั้นมันระเบิดไปหมดแล้วละ... 100 กรัม 10 ล้านเยน... "
13420-25 = "รู้มั้ยว่าทำไมถึงเป็นอย่างนั้น เซริกะจัง?"
13420-26 = "รุ่นพี่โฮชิโนะ?!"
13420-27 = "พวกฉันพลาดอะไรไปงั้นเหรอ...?"
13420-32 = "เพราะไม่ได้ใส่ชุดว่ายน้ำไปยังไงล่ะ"
13420-33 = "พูดอะไรเหลวไหลน่า คิดว่าพวกเราจะเหมือนรุ่นพี่ยูเมะกับรุ่นพี่โฮชิโนะหรือไง?"
13420-34 = "โอเอซิสมันจะระเบิดขึ้นมาหรือไง? ทำไมเราต้องเตรียมตัวขนาดนั้นด้วย? โอเอซิสเกิดขึ้นจากน้ำฝนที่#nเจิ่งนองต่างหาก ไม่ใช่จากแหล่งน้ำใต้ดินสักหน่อย"
13420-38 = "เดี๋ยวสิ รุ่นพี่ชิโรโกะ ทำไมทำหน้าเหมือนกำลังคิดว่า \"เซริกะรู้เรื่องแบบนี้ด้วยเหรอ น่าภูมิใจจังเลย\" ด้วยล่ะ?"
13420-39 = "อืม มันก็เข้าใจได้นะ เซริกะจัง แต่บางทีประเพณีหรือประวัติศาสตร์ก็เป็นสิ่งที่เราควรให้ความสำคัญ#nบ้างนะ "
13420-40 = "ไว้ครั้งหน้าลองใส่ชุดว่ายน้ำไปสิ แหะๆ~ นี่คือคำสั่งของประธานนักเรียนนะ"
13420-41 = "ฮึ่ย... ทีตอนนี้ละมาทำตัวเป็นประธานนักเรียน..."
13420-45 = "ใช่ค่ะ ตอนนี้รุ่นพี่โฮชิโนะรับตำแหน่งประธานนักเรียนแล้วค่ะ"
13420-46 = "ถึงจะเกิดเรื่องราวขึ้นมากมาย... แต่สุดท้ายรุ่นพี่โฮชิโนะก็ยอมรับตำแหน่งที่ว่างอยู่เป็นเวลานานจนได้#nนะคะ"
13420-47 = "ถึงนี่จะเป็นแค่การก้าวไปข้างหน้าทีละก้าวๆ... แต่มันก็จะเป็นก้าวเล็กๆ ที่นำไปสู่ความเปลี่ยนแปลงที่#nยิ่งใหญ่ของพวกเราใช่มั้ยคะ?"
13420-48 = "คะ? ฉันเหรอคะ? "
13420-49 = "แหะๆๆ... ถึงจะได้ลองเป็นแค่ 2 วัน... แต่ตำแหน่งประธานนักเรียนไม่น่าจะเหมาะกับฉันน่ะค่ะ... "
13420-55 = "แค่นี้พอมั้ยคะ? ท่านประธาน?"
13420-59 = "ไม่... เรายังไม่พอใจ อย่าให้ของของ <ผู้เหี้ยมโหด> หลงเหลืออยู่แม้แต่เศษเสี้ยว จะแค่เศษฝุ่นก็ไม่ได้"
13420-60 = "ค่ะ... ได้ค่ะ!"
13420-62 = "ไปเอาระเบิดมาอีก!"
13420-66 = "..."
13420-73 = "ท่านประธานแพนเดโมเนียม โซไซตี้กับท่านประธานคณะกรรมการวินัยเดินทางมาหุบเขาของประธาน#nสภานักเรียนแล้วจัดการร่องรอยที่หลงเหลือของเกเฮนน่ากันด้วยตัวเองค่ะ"
13420-74 = "ได้ยินว่าทั้ง 2 คนเป็นเหมือนลิ้นกับฟันที่มีเรื่องกระทบกระทั่งกันอยู่บ่อยมาก... แต่ก็น่าประหลาดใจที่#nตอนนั้นทั้งคู่ไม่ได้มีท่าทีจะเขม่นหรือจะทะเลาะกันเลยค่ะ"
13420-75 = "ฉันเองก็ไม่แน่ใจเท่าไรค่ะเพราะไม่ได้มีใครอธิบายอะไรให้ฟัง... แต่ดูเหมือนว่าเมื่อก่อนจะเคยเกิดเรื่อง#nอะไรขึ้นอยู่นะคะ...?"
13420-77 = "ส่วนประธานใหญ่ของไคเซอร์ก็เก็บตัวเงียบอยู่แต่ในโรงพยาบาลค่ะ"
13420-78 = "หรือว่าชีวิตเขาจะไม่มีเป้าหมายอะไร เพราะพวกเราทำลายปืนแม่เหล็กไฟฟ้าที่เขาอยากได้ไปหมดแล้ว#nนะคะ...?"
13420-79 = "แต่ถึงยังไงอะบิดอสก็ยังต้องใช้หนี้ให้ไคเซอร์อยู่... ฉันว่าเราก็ต้องดูความเคลื่อนไหวของไคเซอร์ไป#nเรื่อยๆ ค่ะ"
13420-82 = "กลับมาแล้วค่ะ~♧"
13420-83 = "โอ้ โนโนมิจัง เป็นยังไงบ้าง?"
13420-84 = "ค่ะ ทางรถไฟฟื้นฟูเสร็จเรียบร้อยแล้ว ตอนนี้ก็เหลือแค่ทดสอบการเดินรถค่ะ! "
13420-85 = "ดูเหมือนว่าจะเริ่มกิจการรถไฟอย่างจริงจังได้ 3 เขตในกลางสัปดาห์หน้านะคะ"
13420-86 = "ว้าว! ในที่สุด!"
13420-87 = "แหะๆ~ เร็วอยู่นะเนี่ย"
13420-91 = "อ๊ะ ฉันได้ยินข่าวดีมาด้วยค่ะ!"
13420-92 = "หลังจากสิ้นสุดเหตุการณ์ในคราวก่อน เนฟธิสก็ตัดสินใจลงทุนในเขตปกครองตนเองอะบิดอสอีกครั้งค่ะ"
13420-93 = "ถึงจะเป็นแค่ธุรกิจเล็กๆ ที่จับมือกับสถาบันการรถไฟไฮแลนเดอร์เพื่อเชื่อมต่อทางรถไฟอะบิดอสที่เคย#nถูกตัดขาดเข้ากับทางรถไฟข้ามทะเลทรายบางสายก็เถอะค่ะ..."
13420-94 = "แต่นี่ก็จะทำให้การจราจรในเขตปกครองตนเองอะบิดอสดีขึ้นกว่าเดิมหน่อย... และชาวเมืองก็น่าจะ#nสัญจรไปมาได้มากกว่านี้ค่ะ"
13420-97 = "ดีละ เริ่มขยับแล้ว"
13420-98 = "ภายในรถไฟเป็นยังไงบ้าง?"
13420-101 = "ค่ะ ทำงานได้ปกติ ไร้ปัญหาค่ะ"
13420-103 = "(กระวนกระวาย) คงไม่มีปัญหาอะไรใช่มั้ยครับ? "
13420-104 = "ไม่น่าจะมีนะคะ ถึงทาง CCC จะบอกว่าตัวเองไม่รู้เรื่อง แต่ทางฝ่ายกำกับดูแลก็กระตือรือร้นกับงานนี้#nอย่างคาดไม่ถึงเลย การจัดการรถไฟก็เลยเป็นไปได้ด้วยดีน่ะค่ะ"
13420-105 = "แต่ถ้าทำกำไรไม่ได้... พวกผมก็คง... "
13420-106 = "เดี๋ยวเหอะ อย่าพูดอะไรเป็นลางไม่ดีสิคะ"
13420-107 = "ยังไงฤดูหนาวปีนี้เราก็ซ่อมแซมรถไฟสายอะบิดอสได้ และถ้าเป็นอย่างนั้น ธุรกิจนี้ก็จะคงไม่ขาดทุน#nมากหรอกค่ะ"
13420-111 = "..."
13420-112 = "ผู้ควบคุม?"
13420-113 = "อื้อ"
13420-114 = "นี่มันโรงเรียนมัธยมต้นที่ปิดไปนานแล้วไม่ใช่เหรอคะ...? มีธุระอะไรกับที่นี่เหรอคะ?"
13420-115 = "เปล่าหรอก ฉันผ่านมาทางนี้แล้วเห็นเข้าพอดี ก็เลยแค่เข้ามาดูเฉยๆ"
13420-116 = "ในเขตปกครองตนเองอะบิดอสก็มีโรงเรียนที่ปิดไปหลายโรงเลยใช่มั้ยล่ะคะ"
13420-117 = "ฉันว่าผู้ควบคุมควรจะไปที่ที่ CCC ดูแลอยู่ตอนนี้มากกว่าค่ะ"
13420-118 = "พวกฝาแฝดนั่นน่ะเหรอ...?"
13420-119 = "ค่ะ พอดีว่าพวกฉันรับมือกับผู้บริหารพวกนั้นไม่ไหวน่ะค่ะ..."
13420-123 = "อะ... อ๊ะ!? ระ... รอเดี๋ยวสิคะ ผู้ควบคุม ฉันไปด้วยค่ะ!"
13420-134 = "อาจเป็นเพราะเรื่องนั้นนะคะ ฉันเลยรู้สึกว่าตอนนี้เขตปกครองตนเองอะบิดอสของเรากลับมามีชีวิตชีวา#nยังไงก็ไม่รู้ค่ะ"
13420-135 = "ในตัวเมืองอะบิดอสที่ซบเซาอยู่นานก็เริ่มมีร้านค้าร้านขายใหม่ๆ เกิดขึ้นมากมายเลยค่ะ"
13420-136 = "แล้วก็มีพ่อค้าที่คุ้นหน้าคุ้นตากันอยู่ด้วย..."
13420-137 = "นี่ ทางเดินตรงนี้เป็นที่ติดป้ายโฆษณาของร้านฉันนะ"
13420-138 = "อะไรกัน พวกฉันตั้งร้านตรงนี้มาเป็นร้อยๆ ปีแล้วนะ"
13420-139 = "จะมาหาเรื่องกันหรือไง นายก็แค่คนที่บริหารบริษัทตัวเองจนเจ๊งมาไม่ใช่เหรอ?"
13420-140 = "บริษัทของแกก็เจ๊งไม่เป็นท่าเหมือนของฉันนั่นละ! สมน้ำหน้า!"
13420-145 = "เจ้าพวกน่าสมเพช..."
13420-146 = "ฮู่ว... ต้องมานับหนึ่งใหม่ในย่านการค้าแบบนี้เหรอเนี่ย..."
13420-148 = "ฉันจะรีบสร้างตัวเพื่อให้ตัวเองออกจากเขตปกครองตนเองแบบนี้ให้ได้ไวๆ เลย..."
13420-150 = "ส่วนเรื่องของคุณชิโรโกะอีกคน... หลังจากเหตุการณ์ตอนนั้น เราก็ไม่ได้ข่าวคราวอะไรจากเธอเลยค่ะ"
13420-151 = "คุณครูก็ไม่รู้เหรอว่าเธออยู่ที่ไหน?"
13420-152 = "[s] \"อื้อ... แค่ความสามารถของครูคงทำอะไรมากกว่านี้ไม่ได้น่ะ\""
13420-153 = "อย่างนี้สินะ... อืม..."
13420-154 = "..."
13420-158 = "แต่การไม่ได้ข่าวอะไรก็ถือเป็นเรื่องที่ดีนะ ทางนั้นมีประสบการณ์มากกว่าพวกเราเยอะ คงจะจัดการทุกอย่างได้ดีอยู่แล้ว!"
13420-159 = "อืม... คงจะอย่างนั้นละเนอะ"
13420-164 = "ค่ะ... สักวันคงมีเหตุบังเอิญให้ได้เจอกันอีกใช่มั้ยคะ?"
13420-165 = "ฉันยังไม่ทันได้กล่าวคำขอบคุณเลย..."
13420-173 = "ตอนต่อไป;บทส่งท้าย 2"

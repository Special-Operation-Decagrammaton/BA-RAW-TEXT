[translation]
13420-1 = "第42話;尾聲（１）"
13420-2 = "老師早安！"
13420-3 = "阿拜多斯對策委員會的一天，又在忙碌中揭開了序幕。"
13420-4 = "……嗯？這句話好像之前也聽過？"
13420-5 = "啊哈哈……是嗎？"
13420-6 = "話說回來，總覺得我們去救被綁走的星野前輩，好像已經是很久以前的事了呢。#n明明其實沒過多久……"
13420-7 = "嗯？老師也有那樣的感覺？不是只有我這麼想？"
13420-8 = "啊哈哈……嗯，那就好。"
13420-14 = "唉……我回來了。"
13420-15 = "茜香醬……？你跑去哪裡了，為什麼全身都是泥沙？#n而且連白子前輩也是……？"
13420-16 = "我們去了綠洲一趟……"
13420-17 = "什麼？你們還沒放棄嗎？"
13420-18 = "我想說地底深處說不定會有沒被連鎖反應影響的礦石，#n所以就找白子前輩一起去，想嘗試挖得更深一點……"
13420-19 = "結果我們足足挖了8m還是沒有找到……"
13420-20 = "看來那時候真的全都被炸光了吧……100g價值1000萬元的……"
13420-25 = "你知道為什麼會找不到嗎，茜香醬？"
13420-26 = "星野前輩！？"
13420-27 = "難道是我們忘了什麼條件……？"
13420-32 = "因為你們沒有穿泳裝去呀。"
13420-33 = "你在胡說什麼啊？你以為我們跟你和夢前輩一樣嗎？"
13420-34 = "而且綠洲到底為什麼會爆炸啊？何必預防那種事咧？#n綠洲的水源又不是地下水，那些都是沉積的雨水好不好！"
13420-38 = "不是，白子前輩。#n不要擺出那種「茜香居然連那種事都知道，真厲害」的表情好不好。"
13420-39 = "唔嗯……雖然茜香醬說的沒錯，不過我覺得你好像對這個傳統有點缺乏敬畏之心哦？"
13420-40 = "所以你下次必須穿著學校泳衣去那裡！#n唔嘿～這可是學生會長的命令哦！"
13420-41 = "真是的……前輩就只有這種時候會搬出學生會長的名號……"
13420-45 = "沒錯，星野前輩這次總算是同意接下學生會長的職位了。"
13420-46 = "雖然發生了很多事……幸好那長久以來的空缺，最後還是由星野前輩補上了。"
13420-47 = "儘管現在只能小心翼翼地向前邁進……#n但這對我們來說已經是個微小而重大的變化了吧……？"
13420-48 = "嗯？我？"
13420-49 = "啊哈哈……我這兩天確實有嘗試了一下……#n但學生會長這個職位果然還是跟我合不太來……"
13420-55 = "這樣行嗎，議長？"
13420-59 = "……不行，我不是說過了嗎？#n「雷帝」遺留的任何碎片通通不准留下。"
13420-60 = "是，是！"
13420-62 = "去拿更多的炸藥來！"
13420-66 = "……"
13420-73 = "格黑娜在學生會之谷留下的痕跡，#n已經由萬魔殿的議長和風紀委員長親自處理掉了。"
13420-74 = "明明聽說那兩個人是互看不順眼的死對頭……這種時候卻異常的和平呢。"
13420-75 = "因為沒聽說過詳細的原因……他們以前究竟發生了什麼事呢？"
13420-77 = "凱薩的總裁現在躲在醫院裡，完全不對外露面。"
13420-78 = "是因為他想要的列車砲已經被我們摧毀，所以一時喪失了目標嗎……？"
13420-79 = "無論如何，阿拜多斯依舊欠了凱薩很多錢……所以我們還是得時刻緊盯凱薩的動向。"
13420-82 = "我回來了～♧"
13420-83 = "哦，野乃美醬。情況怎麼樣呀？"
13420-84 = "是，列車路線的修復工作順利結束，接下來只剩下試營運了！"
13420-85 = "下週應該就能正式開放三段路線才對。"
13420-86 = "哦哦，終於！"
13420-87 = "哎呀～速度還挺快的嘛。"
13420-91 = "啊，我還有別的好消息！"
13420-92 = "在經過上次那次事件之後，奈芙蒂斯決定要重新投資我們阿拜多斯自治區了。"
13420-93 = "雖然這次和高地人鐵道學園合作的計畫規模相對較小，#n但如果能把原先中斷運行的阿拜多斯列車系統，連接上沙漠橫貫鐵路的部分路線……"
13420-94 = "我們阿拜多斯自治區的交通應該也會方便許多才對……#n希望之後能有更多的人來往我們自治區。"
13420-97 = "很好，能動了。"
13420-98 = "列車內部怎麼樣？"
13420-101 = "是，行駛狀況沒有任何異常。"
13420-103 = "（不安）應該不會有問題吧？"
13420-104 = "應該吧。#n雖然CCC撒手不管，幸好監理室那邊的態度異常積極，這件事才能進行得這麼順利。"
13420-105 = "但是這個計畫根本賺不到什麼錢……要是連這次都失敗的話，我們就……"
13420-106 = "喂喂喂，別烏鴉嘴。"
13420-107 = "今年冬天應該就能修復好阿拜多斯中央線才對。#n這樣一來，這個計畫至少不會為我們帶來太大的虧損。"
13420-111 = "……"
13420-112 = "監察官？"
13420-113 = "啊啊。"
13420-114 = "這間國中不是很久以前就廢校了嗎……？#n來這裡有什麼事嗎？"
13420-115 = "沒什麼，只是剛好路過才順便進來看看。"
13420-116 = "畢竟阿拜多斯自治區裡本來就有很多這樣的廢校嘛。"
13420-117 = "話說回來，您可能得去CCC負責的地方看一看。"
13420-118 = "……是那對雙胞胎嗎？"
13420-119 = "是的，只靠我們實在是對付不了那些幹部……"
13420-123 = "啊！？等，等等我啊，監察官。請等等我！"
13420-134 = "不知道是不是因為這個緣故，總覺得阿拜多斯自治區又再次恢復了一些生氣。"
13420-135 = "就連蕭條了很長一段時間的阿拜多斯市區，也漸漸出現了一些新店家。"
13420-136 = "……雖然也有一些熟面孔就是了。"
13420-137 = "喂，這裡的通道是我們店裡要架設廣告看板的地點！"
13420-138 = "亂講，這裡一百年前就是我們店裡的地了。"
13420-139 = "現在是想跟我打架嗎？你經營的商店明明就倒閉了。"
13420-140 = "你的店明明也倒了還好意思說！要打就來啊！"
13420-145 = "……一群蠢蛋。"
13420-146 = "唉……我竟然得在這種商店街裡東山再起……"
13420-148 = "一定要想辦法在幾年內逃出這個自治區……"
13420-150 = "除此之外……#n另一個白子同學……從那之後就再也沒聽到他的消息了。"
13420-151 = "老師也不知道他的下落嗎？"
13420-152 = "[s]「嗯……我也找不到他。」"
13420-153 = "這樣啊……唔……"
13420-154 = "……"
13420-158 = "哎呀，不是有句話說「沒消息就是好消息」嗎！#n他的經驗比我們豐富很多，相信他現在一定也過得很好的！"
13420-159 = "嗯……大概吧。"
13420-164 = "……嗯，總有一天還會再遇到他的吧？"
13420-165 = "畢竟都還沒有跟他說聲謝謝呢……"
13420-173 = "下一話;尾聲（２）"

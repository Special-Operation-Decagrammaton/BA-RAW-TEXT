[translation]
1602006-1 = "#title;어느 저격수의 위장복"
1602006-2 = "#place;코기타운 입구"
1602006-3 = "3;오토기;00\n#3;a\n#wait;1000"
1602006-4 = "3;오토기;03\n#3;em;[반응]\n#wait;1000"
1602006-5 = "3;오토기;16;아, 선생님. 여기야, 여기.\n#3;hophop"
1602006-6 = "3;오토기;02;작전과 상관없이 밖에서 선생님과 약속을 잡은 건 처음이라 그런지 신기한 기분이네."
1602006-7 = "3;오토기;09;아, 혹시 모처럼의 휴일을 방해한 건 아니었겠지?"
1602006-8 = "3;오토기;06;생각해보니 이번 주 내내 선생님은 바빴던 것 같은데……\n#3;em;[한숨]"
1602006-9 = "[s1] \"아니야. 나도 쇼핑이 하고 싶은 기분이었는 걸.\"\n[s2] \"SRT의 위장복이 어떤 모습인지 궁금하기도 했고.\""
1602006-10 = "#wait;100"
1602006-11 = "#wait;100"
1602006-12 = "3;오토기;02;……응? 선생님은 저격용 위장을 한 번도 본 적 없는 거야?\n#3;em;[?]"
1602006-13 = "[s3] \"위장복은 다른 학생들이 입은 걸 본 적이 있는데—\"\n[s4] \"위장복만 전문으로 파는 가게는 한번도 못 본 것 같아서.\""
1602006-14 = "#wait;100"
1602006-15 = "#wait;100"
1602006-16 = "3;오토기;00;아, 그러고 보니 말하는 걸 깜박했네."
1602006-17 = "3;오토기;02;내가 가자고 한 가게는 밀리터리 전문 숍이 아니라, 평범한 기성복을 파는 옷 가게야."
1602006-18 = "3;오토기;03;야전에서 쓰는 카모플라주 의상이라면 모르겠지만, 도심의 작전에서 쓰이는 위장복은 기성복을 개조해서 만드는 게 더 효율적이거든."
1602006-19 = "3;오토기;13;마침 지난 작전 때 코기 타운에서 쓸 수 있는 의류 상품권을 받아서, 이걸로 새 옷을 사려고.\n#3;em;[반짝]"
1602006-20 = "3;오토기;03;후후, 어떤 색의 옷을 사야 다양한 작전 환경에서 쓸 수 있을까~\n#3;hophop"
1602006-21 = "[s5] \"위장복하면 떠오르는 그 누더기 같은 의상은……\"\n[s6] \"그런 종류의 위장복도 도심에서 쓸 수 있어?\""
1602006-22 = "#wait;100"
1602006-23 = "#wait;100"
1602006-24 = "3;오토기;02;아, 길리슈트 말이구나.\n#3;em;[반응]"
1602006-25 = "3;오토기;00;길리슈트는 기본적으로 그물 같은 뼈대가 있기 때문에 작전에 따라 다양한 종류의 천을 엮어서 커스텀할 수 있어."
1602006-26 = "3;오토기;03;수풀이 우거진 야지에서는 녹갈색의 천이나 낙엽등을 엮어서 위장하지만, 원색의 광고판이나 콘트리트가 많은 도심에서는 일부러 화려한 색의 천을 섞어 쓰기도 해.\n#3;em;[재잘]"
1602006-27 = "3;오토기;02;군중 속에 있어도 색이 튀지 않도록 안 쓰는 교복을 찢어서 만들기도 하지만……"
1602006-28 = "3;오토기;06;SRT 학원이 폐쇄된 지금은 교복 한 벌, 한 벌이 아쉬운 지라.\n#3;em;[속상함]"
1602006-29 = "3;오토기;02;길리 슈트를 만들어 본지도 꽤 오래 된 것 같네."
1602006-30 = "[s] \"……평범한 옷 이상으로 손이 많이 가는구나.\""
1602006-31 = "3;오토기;02;그야 물론이지. 작전 준비는 언제나 완벽해야 하니까."
1602006-32 = "3;오토기;16;그럼 본격적으로 옷을 보러 가 볼까?\n#3;em;[음표]"
1602006-33 = "#st;[0,0];instant;1;"
1602006-34 = "#clearST"
1602006-35 = "3;오토기;16\n#3;dr\n#wait;2000"
1602006-36 = "#all;hide"
1602006-37 = "3;오토기;00\n#3;a"
1602006-38 = "3;오토기;00;음, 이 옷은 너무 색이 화려한데."
1602006-39 = "3;오토기;09;이 옷도 무늬가 너무 눈에 잘 띄고……\n#3;m2"
1602006-40 = "3;오토기;03;오, 이 원피스. 색이 제법 나쁘지 않은데? 내 머리색이랑 잘 어울릴 것 같아.\n#3;m3"
1602006-41 = "3;오토기;00;선생님은 어떻게 생각해? 이 옷, 나한테 잘 어울릴 것 같아?\n#3;m4"
1602006-42 = "[s7] \"음……\"\n[s8] \"나쁘진 않긴 한데……\""
1602006-43 = "#wait;100"
1602006-44 = "#wait;100"
1602006-45 = "3;오토기;08;뭐야, 왜 이렇게 반응이 싱거워?\n#3;m3"
1602006-46 = "3;오토기;09;……역시 이런 하늘하늘한 스타일의 옷은 내게 잘 안 어울리려나.\n#3;em;[속상함]"
1602006-47 = "3;오토기;06;그럼 어쩔 수 없지. 좀 더 무난한 데님이나 코듀로이 소재의 의상을—\n#3;stiff"
1602006-48 = "[s9] \"그, 그런 뜻은 아니었어!\"\n[s10] \"사실 잘 어울린다고 생각했는데……\""
1602006-49 = "#wait;100"
1602006-50 = "#wait;100"
1602006-51 = "3;오토기;02;그럼?"
1602006-52 = "[s] \"그 옷은 찢어서 위장복을 만들기에 너무 아깝지 않아?\""
1602006-53 = "3;오토기;04;엥?\n#3;em;[?]"
1602006-54 = "3;오토기;07;그게 무슨……"
1602006-55 = "#st;[0,0];instant;1;"
1602006-56 = "#clearST"
1602006-57 = "3;오토기;07\n#3;em;[…]\n#wait;2500"
1602006-58 = "3;오토기;15\n#3;em;[재잘]\n#3;hophop\n#wait;1500"
1602006-59 = "3;오토기;16;아, 이런. 착각을 하고 있었던 모양이네.\n#3;em;[한숨]"
1602006-60 = "3;오토기;03;내가 오늘 사려고 했던 '위장복'은 평범한 잠입 임무 때 아무렇게나 입을 수 있는 사복을 말한 거였어."
1602006-61 = "3;오토기;02;보통 다른 자치구에서 못 보던 학교의 교복을 입고 있으면 이목을 끌기 쉽잖아?"
1602006-62 = "3;오토기;16;그런 의미에서의 위장복이지, 지나가는 행인이 존재 자체를 알아차리지 못하는 수준의 위장을 말한 건 아니라고."
1602006-63 = "3;오토기;08;내가 아무리 작전을 중시한다고 해도, 새 옷을 찢어서 누더기를 만들 정도로 과격한 사람은 아니거든……?\n#3;em;[스팀]"
1602006-64 = "[ns] \"오해였다니 다행이네……\""
1602006-65 = "#wait;1000"
1602006-66 = "[ns11] \"사실 오토기가 정말로 찢을 옷감이 필요했다면,\"\n[ns12] \"안 입게 된 내 옷을 줄까 고민했었거든.\""
1602006-67 = "#wait;100"
1602006-68 = "#wait;100"
1602006-69 = "3;오토기;02;어라? 그건 조금 이득인 것 같은데.\n#3;em;[반응]"
1602006-70 = "3;오토기;15;방금 했던 말 취소해도 돼?"
1602006-71 = "[s] \"안 됩니다.\""
1602006-72 = "3;오토기;03;알아. 농담이었어~\n#3;em;[음표]"
1602006-73 = "#st;[0,0];instant;1;"
1602006-74 = "#clearST"
1602006-75 = "3;오토기;03\n#3;d\n#3;greeting\n#wait;1000"
1602006-76 = "3;오토기;03\n#3;a\n#3;closeup\n#wait;1000"
1602006-77 = "3;오토기;16;여하튼 그래서, 내가 입는 다면 이 옷은 잘 어울리는 것 같아?\n#3;closeup"
1602006-78 = "[s] \"개인적으로는 아까 입었던 게 더 나은 것 같아.\""
1602006-79 = "3;오토기;13;오, 생각보다 취향이 확실한 걸.\n#3;closeup"
1602006-80 = "3;오토기;15;알겠어. 그럼 다시 이쪽으로~\n#3;em;[음표]\n#3;closeup"

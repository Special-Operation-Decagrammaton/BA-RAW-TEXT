[translation]
22200-1 = "ตอนที่ 20;ในฐานะเกมเมอร์ ในฐานะเพื่อน"
22200-2 = "ยังดีที่ทุกคนหนีเข้ามาในอาคารร้างกันได้ก่อน..."
22200-9 = "[ns] \"ทุกคนเป็นยังไงกันบ้าง? บาดเจ็บกันหรือเปล่า?!\""
22200-10 = "พวกเราน่ะไม่เป็นไรหรอก..."
22200-11 = "แต่รุ่นพี่เนรุ..."
22200-13 = "หัวหน้า... ยังนอนไม่ได้สติอยู่เลยค่ะ"
22200-14 = "บาดเจ็บมากกว่าที่คิดแฮะ"
22200-15 = "ตอนที่ตกลงมาจากการต่อสู้... น่าจะทำให้บาดเจ็บหนักเลย... นายท่าน..."
22200-16 = "[s] \"เนรุ...\""
22200-17 = "นี่คือสถานการณ์ที่เลวร้ายที่สุด..."
22200-18 = "ชมรมวิศวกรรมก็ล่าถอยไปจากการต่อสู้กับหุ่นรบล้ำยุค..."
22200-19 = "ส่วนเวอริทัส ถึงจะทำได้ดีในการใช้ <กระจก> ในการเข้าถึงเครือข่าย แต่การสนับสนุนทางไกลก็ย่อม#nมีข้อจำกัด"
22200-20 = "ต่อไปก็ชมรมพัฒนาเกม... ถ้าให้พูดตรงๆ ก็คือความสามารถยังเอาไม่อยู่"
22200-21 = "หืม?! ตะ... แต่ถึงอย่างนั้นก็เถอะ!"
22200-22 = "เราคงต้อง... ยอมรับค่ะ..."
22200-24 = "ส่วน C&C ที่เป็นกำลังหลักที่ต่อกรได้ก็..."
22200-25 = "[s] \"ไม่ใช่แค่เนรุหรอก ตอนนี้ทุกคนพยายามกันเกินขีดจำกัดแล้ว\""
22200-26 = "เฮ้อ... ก็ไม่ได้อยากจะพูดแบบนี้หรอกนะ แต่ว่า..."
22200-27 = "มันสุดกำลังของเราแล้วหรือเปล่านะ... ฉันไม่เห็นทางที่จะแก้ไขสถานการณ์นี้ได้เลย..."
22200-32 = "แค่พวกฉัน..."
22200-33 = "ลำพังแค่พวกฉัน... จะไม่มีปัญญาสู้เลยงั้นเหรอ?"
22200-34 = "[s] \"โมโมอิ...\""
22200-35 = "แค่ด้วยชมรมของฉัน... จะช่วยอาริสึจังไม่ได้เลยงั้นเหรอคะ?"
22200-36 = "ทั้งอาริสึจัง ทั้งพวกฉัน... ไม่ได้มีใครทำผิดอะไรเลยด้วย..."
22200-37 = "แต่ทำไม... ทำไม..."
22200-39 = "มิโดริ..."
22200-40 = "ทุกคนอุตส่าห์ช่วยพวกเราไว้... จนมาได้ไกลถึงขนาดนี้"
22200-41 = "ความพยายามของทุกคน... ทำให้เรามาถึงตรงนี้ได้แล้วแท้ๆ...!"
22200-42 = "แต่สิ่งที่เราทำได้... มีเพียงแค่... ยอมแพ้ไปงั้นเหรอ...?"
22200-43 = "ไม่นะ... ถ้าจะจบไม่สวยแบบนี้... ฉันไม่ยอม... ไม่เอาด้วยหรอก...!"
22200-47 = "ใครจะไปยอมให้เกิดเรื่องแบบนั้นกันเล่า!!"
22200-48 = "ว้ายยย?!"
22200-49 = "อ๊ะ! หัวหน้า!"
22200-50 = "ได้สติแล้วเหรอ?!"
22200-51 = "[s] \"เนรุ! เป็นยังไงบ้าง?!\""
22200-53 = "หืม...?"
22200-58 = "หัวหน้า...! อย่าฝืนเกินไปเลยนะคะ! หัวหน้าบาดเจ็บสาหัสกว่าที่คิดเอาไว้นะคะ!"
22200-59 = "เอะอะกันเกินเหตุไปได้... แค่นี้มันไม่เท่าไรหรอกน่า"
22200-60 = "ไม่นะ ดูจากภายนอกแล้วไม่น่าจะเรียกว่าไม่เท่าไรได้เลยนะ..."
22200-61 = "ช่างเถอะ... แล้วมันยังไงกันน่ะ? ทำไมทุกคนถึงท้อแท้กันแบบนี้ล่ะ?"
22200-62 = "[s] \"คือว่า...\""
22200-64 = "สรุปว่า... ทุกคนหมดกำลังใจ เพราะสถานการณ์มันจนตรอกงั้นเรอะ?"
22200-65 = "......"
22200-66 = "เฮอะ! ตลกเป็นบ้า"
22200-67 = "เอ๋...?"
22200-68 = "นี่ พวกเด็กน้อย"
22200-73 = "มีแรงกันแค่นี้เองรึไง?"
22200-74 = "แค่นี้... เอง... งั้นเหรอ...?"
22200-75 = "ไม่คิดจะขยับแขนสู้กันเลยล่ะสิท่า"
22200-76 = "เส้นเอ็นขาดเหรอ? หรือว่าน่องตึงขึ้นมา?"
22200-77 = "หรือเป็นเพราะติดอยู่บนยอดตึก ก็เลยสภาพเหมือนจะอ้วกออกมาให้ได้เลย?"
22200-78 = "แต่นี่เราก็มีแผลเต็มตัวกันแล้วนะ?!"
22200-79 = "ก็เลยจะยอมแพ้กันง่ายๆ..."
22200-80 = "พวกเธอตัดสินใจกันได้แค่นี้เองงั้นเหรอ?"
22200-81 = "ตะ... แต่ว่า... ร่างกายรุ่นพี่เนรุก็ไม่น่าสู้ไหวแล้วนะ...!"
22200-82 = "เฮอะ! ไม่ต้องห่วงเรื่องของคนอื่นเค้าหรอกน่า"
22200-83 = "แผลแค่นี้ฉันทนได้อยู่แล้ว"
22200-84 = "เราตั้งใจบุกมาถึงที่นี่เพราะจะมาช่วยเพื่อนไม่ใช่รึไง?"
22200-85 = "งั้นก็อย่ายอมแพ้และสู้จนกว่าจะชนะสิ เจ้าเด็กพวกนี้!"
22200-86 = "มะ... มันก็ไม่ใช่ว่าพวกฉันไม่อยากสู้หรอกนะ!"
22200-87 = "แต่กับผู้เล่นที่ใช้สูตรโกงแบบนั้น... จะเอาอะไรไปชนะได้ล่ะ...?"
22200-88 = "เรื่องนั้นน่ะ..."
22200-89 = "บางที... อาจจะมีวิธีก็ได้นะ"
22200-93 = "หืม?!"
22200-94 = "[s] \"จะ... จริงเหรอ? ยูสึ?!\""
22200-95 = "ค่ะ ถึงแม้ตอนนั้น... จะเป็นแค่ช่วงเวลาสั้นๆ ก็เถอะ"
22200-97 = "(เมื่อกี้มัน...!)"
22200-99 = "ฉันเห็นการโจมตีของรุ่นพี่เนรุที่ได้ผลดีอยู่ครั้งหนึ่งค่ะ"
22200-100 = "[s] \"ในเวลาสั้นๆ น่ะเหรอ...?\""
22200-101 = "เทพยูสึกลับมาแล้ว! UZQueen! มองออกได้ด้วยสายตาไวเหมือนเหยี่ยวเลยสินะ!"
22200-102 = "แต่ทำไมมันถึงได้ผลล่ะคะ? ถ้าตามที่ประธานบอก <อาวุธ> อันนั้นของโทคิจังจะไม่มีสิ่งไหนต้านทานได้#nเลยไม่ใช่เหรอคะ?"
22200-103 = "ระ... เรื่องนั้น ฉันเองก็ไม่แน่ใจ..."
22200-105 = "ลองๆ สมมตินะ..."
22200-106 = "ถึงมันจะเป็นได้แค่ข้อสันนิษฐานก็เถอะ แต่ลองๆ สมมตินะ..."
22200-107 = "ถ้า <อาวุธ> ของโทคิมีช่องโหว่อะไรละก็?"
22200-108 = "...ช่องโหว่?"
22200-109 = "ประธานเคยพูดไว้ว่า <อาวุธ> ที่ได้รับการสนับสนุนจากเครือข่ายของเอริดูนี้ ไม่ว่าจะโดนการโจมตี#nแบบไหนก็จะยิงโต้หรือหลีกเลี่ยงได้ด้วยการคำนวณน่ะ"
22200-110 = "[s] \"อืม และเราก็ได้เห็นมันทำแบบนั้นจริงๆ\""
22200-111 = "ใช่แล้ว ถ้าได้เห็นมาแล้ว ก็แสดงว่าคำพูดนั้นไม่ใช่เรื่องโกหก แต่ว่า..."
22200-112 = "มันก็ยังไม่เคยทำให้ทั้งสองอย่างสำเร็จได้ในครั้งเดียวใช่ไหมล่ะ"
22200-113 = "......! เป็นแบบนั้นสินะคะ!"
22200-114 = "หา? หืม? อะไรนะ...?"
22200-115 = "คือ... หมายถึง... อะไรเหรอคะ?"
22200-117 = "ถึง <อาวุธ> นั้นจะมีความสามารถระดับที่เรียกได้ว่าใช้สูตรโกงอยู่ก็ตาม"
22200-118 = "และถึงมันจะดูเป็นอย่างนั้นจริงๆ แต่ของแบบนั้นก็อาจจะมีข้อจำกัดก็ได้"
22200-119 = "ตอนที่ตกลงมาจากอาคาร ประธานบอกว่าก็ยังคำนวณได้อยู่"
22200-120 = "เท่ากับว่า เพราะตอนนั้นเอาความสามารถในการคำนวณไปใช้กับการตกหล่นลงมา..."
22200-121 = "[s] \"ก็เลยเกิดช่องว่าง... เลยสกัดการโจมตีของเนรุไม่ได้...?\""
22200-122 = "อ๋อ! แบบนี้นี่เอง!"
22200-123 = "งะ... งั้นก็แปลว่า ถ้าเราทำให้เกิดช่องว่างแบบนั้นได้ละก็..."
22200-124 = "อาจจะล้มทางนั้นได้... ก็เป็นได้..."
22200-125 = "ว่าแต่จะทำยังไงล่ะ? อีกฝ่ายไม่มีทางไม่รู้จุดอ่อนของตัวเองหรอก"
22200-126 = "และไม่มีทางที่พวกนั้นจะไม่ระวังตัวไม่ให้ตกจากดาดฟ้าอีก..."
22200-127 = "รุ่นพี่เนรุเคยพูดไว้ว่า... ถ้าเข้าไปใกล้ ก็จะชนะได้... ใช่ไหมคะ?"
22200-128 = "อืม... ชนะได้ แต่ก็ต้องทำอะไรบางอย่างกับความสามารถโกงๆ นั่นด้วย"
22200-129 = "ถ้าอย่างงั้นฉันก็มีความคิดดีๆ อยู่ค่ะ"
22200-130 = "ถ้าจะสู้กับกลโกง..."
22200-131 = "เราก็ต้อง <เล่นนอกกติกา> ในกฎที่ให้มา..."
22200-141 = "รุ่นพี่เนรุ..."
22200-147 = "...ไม่รู้หรอกนะว่ากำลังวางแผนอะไรกันอยู่ แต่มันก็เปล่าประโยชน์อยู่ดี"
22200-148 = "โทคิ"
22200-149 = "...ค่ะ มาดาม"
22200-150 = "ใช่แล้ว ต้องออกมาแบบนี้แหละ..."
22200-151 = "ครั้งนี้มาสะสางให้มันจบๆ กันไปเลย!"
22200-153 = "ตอนต่อไป;ความหมายของชื่อนั้น"

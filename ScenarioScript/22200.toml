[translation]
22200-1 = "Episode 20; Gamers and Friends"
22200-2 = "We barely managed to escape..."
22200-9 = "[ns] \"Is everyone okay? Anyone hurt?!\""
22200-10 = "Most of us are... B-But..."
22200-11 = "Neru..."
22200-13 = "The president passed out...and hasn't woken up yet."
22200-14 = "Her injuries are more severe than I originally thought."
22200-15 = "President...was badly injured after falling in the last fight..."
22200-16 = "[s] \"Neru...\""
22200-17 = "...This really is the worst-case scenario."
22200-18 = "The Engineering Club retired during the battle against the Avant Guard..."
22200-19 = "It was good that we, Veritas, were able to use the Mirror to access the network, but...there's a limit to providing remote support."
22200-20 = "As for the Game Development Department... It's probably out of the question."
22200-21 = "Uggh! B-But!"
22200-22 = "I...can't deny that..."
22200-24 = "And our main fighting force, C&C, is..."
22200-25 = "[s] \"...It's not just Neru... Everyone is at their limit.\""
22200-26 = "...Ha. I don't want to say this, but..."
22200-27 = "Is this the end...? At this rate, we'll never be able to get out of this situation..."
22200-32 = "Are we..."
22200-33 = "...Are we not enough to handle this?"
22200-34 = "[s] \"Momoi...\""
22200-35 = "Are we not enough...to rescue Aris alone?"
22200-36 = "We... Aris...didn't do anything wrong..."
22200-37 = "So why... Why...?!"
22200-39 = "Midori..."
22200-40 = "Everyone helped us...to get to this point..."
22200-41 = "And with everyone's efforts...we just barely made it to this point...!"
22200-42 = "We can't give up like this... Can we...?"
22200-43 = "...We can't have a...bad ending...like this... Never....never!"
22200-47 = "You think I'll just accept something like this?!"
22200-48 = "Waaaahhhh?!"
22200-49 = "Oh! President!"
22200-50 = "Are you awake?"
22200-51 = "[s] \"Neru! How are you feeling?!\""
22200-53 = "Huh...?"
22200-58 = "President! Don't push yourself too much! Your injuries are really severe!"
22200-59 = "Don't make such a fuss... This isn't that big of a deal."
22200-60 = "Judging by appearance, it's very much a big deal."
22200-61 = "Anyways... What's going on? Why is everyone so down?"
22200-62 = "[s] \"Well...\""
22200-64 = "So, since the situation has turned out like this...you think it's all over?"
22200-65 = "..."
22200-66 = "Ha, very funny."
22200-67 = "Huh?"
22200-68 = "Hey, little ones."
22200-73 = "Is that really all you've got?"
22200-74 = "Wh-What do you mean?"
22200-75 = "Look. All I know is my arm won't move at all."
22200-76 = "My ligament must be torn...and my legs feel stiff..."
22200-77 = "I feel like even taking a step will make me vomit. Must be because I took such a bad fall."
22200-78 = "You sound like a mess!"
22200-79 = "Yeah! All of that, and there's still no way I'm giving up!"
22200-80 = "After seeing that, are you still going to be cowards? Turn tail and run home the second things go wrong?!"
22200-81 = "Y-You're in no condition to say that...!"
22200-82 = "Ha! Mind your own business."
22200-83 = "I can power through this no problem."
22200-84 = "We came all the way here to save a friend."
22200-85 = "So that's what we're going to do. We're going to keep moving forward."
22200-86 = "I-It's not like we don't wanna save her!"
22200-87 = "But how are we gonna beat a cheater like that?"
22200-88 = "Well..."
22200-89 = "We're not completely out of options. "
22200-93 = "Huh?!"
22200-94 = "[s] \"R-Really, Yuzu?!\""
22200-95 = "Yes, it was very brief, but..."
22200-97 = "(Just now...!)"
22200-99 = "I saw Neru's attack land once."
22200-100 = "[s] \"In such a short time...?\""
22200-101 = "Of course, Yuzu! You're the UZQueen! You noticed it with your amazing visual acuity!"
22200-102 = "But how did it work? According to the president, nothing works on Toki's weapon."
22200-103 = "I-I'm not sure..."
22200-105 = "What if..."
22200-106 = "This is really just a hypothetical..."
22200-107 = "What if there's a kind of loophole in Toki's weapon?"
22200-108 = "A loophole?"
22200-109 = "The president said the weapon is supported by Eridu's network, and it can shoot down or evade any attack through its calculations."
22200-110 = "[s] \"Yes, and it proved itself completely.\""
22200-111 = "Right. And we've experienced first hand that it's true, to an extent..."
22200-112 = "It's never done those two things at the same time."
22200-113 = "...! Indeed... I see what you're saying!"
22200-114 = "Huh? What...?"
22200-115 = "I...don't see it. Could you explain?"
22200-117 = "There's no doubt the abilities of the weapon are so incredible that it seems it can't be beaten."
22200-118 = "But everything has its limitations."
22200-119 = "When it fell from the building, the president said even the fall was calculated."
22200-120 = "In other words, at that time, it was using its computing power for the fall..."
22200-121 = "[s] \"And there was a moment where it couldn't block Neru's attack...?\""
22200-122 = "Oh! I get it!"
22200-123 = "I-If we can create a moment like that again...!"
22200-124 = "We might be able to defeat it..."
22200-125 = "But how? She must know its limitations."
22200-126 = "Making it fall from a rooftop won't work again..."
22200-127 = "Neru is saying if we can keep the distance close, we can win...right?"
22200-128 = "...Yes, we can win. We'll have to do something about its ability to cheat though."
22200-129 = "Then, I have an idea."
22200-130 = "Against a cheat..."
22200-131 = "There are tricks we can use within the given rules..."
22200-141 = "Neru..."
22200-147 = "I don't know what you're planning, but it will not work."
22200-148 = "Toki."
22200-149 = "...Yes, ma'am."
22200-150 = "You really thought it was over?"
22200-151 = "Let's finish this!"
22200-153 = "Next Episode; What's in a Name?"

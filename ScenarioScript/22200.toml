[translation]
22200-1 = "第20話;作為玩家，作為好友"
22200-2 = "雖然暫且逃進了附近的建築物……"
22200-9 = "[ns]「大家還好嗎？有沒有受傷！？」"
22200-10 = "……我們沒事。"
22200-11 = "但寧瑠前輩……"
22200-13 = "部長的意識……還沒有恢復。"
22200-14 = "傷的似乎比想像中還嚴重。"
22200-15 = "似乎是因為最後墜落的衝擊受了重傷……該怎麼辦，主人……"
22200-16 = "[s]「寧瑠……」"
22200-17 = "……真是最糟糕的狀況呢。"
22200-18 = "因為和前衛君的戰鬥，工程師部退場了……"
22200-19 = "我們貝里塔斯在能連接網路的地方倒還好……#n但遠距離的支援本來就很有限。"
22200-20 = "至於遊戲開發部……老實說，不算什麼戰力。"
22200-21 = "唔唔！是，是沒錯啦！"
22200-22 = "無法否認……"
22200-24 = "實際上能稱為戰力的C&C……"
22200-25 = "[s]「……不只是寧瑠而已，大家也到極限了。」"
22200-26 = "……唉，雖然不是很想說這種話。"
22200-27 = "可能只能，到此為止了……已經，沒有使用的手段……"
22200-32 = "果然，我們……"
22200-33 = "……只靠我們的話，沒有足夠的力量嗎？"
22200-34 = "[s]「桃井……」"
22200-35 = "只憑我們……沒辦法，救出愛麗絲醬嗎？"
22200-36 = "愛麗絲醬和我們……#n明明誰也，沒有做什麼壞事……"
22200-37 = "但是，為什麼……為什麼呢……"
22200-39 = "綠……"
22200-40 = "大家幫助我們……到達了這裡……"
22200-41 = "集合了大家的努力……好不容易才走到這一步的……！"
22200-42 = "卻只能，在此放棄嗎………？"
22200-43 = "……這種……這種BadEnd……#n絕對……絕對……！"
22200-47 = "這種事情我不能接受！！"
22200-48 = "嗚哇啊啊！？"
22200-49 = "啊！部長！"
22200-50 = "你醒了啊！？"
22200-51 = "[s]「寧瑠！身體還好嗎！？」"
22200-53 = "啊……？"
22200-58 = "部長！請不要勉強！#n您的傷勢相當嚴重啊！"
22200-59 = "別大驚小怪了……我沒事。"
22200-60 = "不是，看起來完全不像沒事啊……"
22200-61 = "先別管那個了……發生什麼事了？#n大家為什麼都像在參加告別式一樣？"
22200-62 = "[s]「那是因為……」"
22200-64 = "唉……所以，從狀況上來看已經沒救了？"
22200-65 = "……"
22200-66 = "哈？真可笑。"
22200-67 = "咦……？"
22200-68 = "喂，小不點們。"
22200-73 = "妳們的信念，就只有這種程度嗎？"
22200-74 = "只，只有……這種程度……怎麼能這麼說！"
22200-75 = "雖然手腕似乎已經動不了了。"
22200-76 = "腳的韌帶好像也斷了……"
22200-77 = "說真的，光是走一步感覺都會吐出來……"
22200-78 = "那不就已經滿身瘡痍了嗎！？"
22200-79 = "但是啊……因為這種程度的事就放棄……"
22200-80 = "妳們的決心就這麼脆弱嗎？"
22200-81 = "但，但是寧瑠前輩，妳的身體已經……！"
22200-82 = "哈！不用勉強自己去擔心別人。"
22200-83 = "這種程度，靠毅力就能撐過去了。"
22200-84 = "為了救愛麗絲，我們好不容易才來到這裡的不是嗎？"
22200-85 = "那就不要放棄，堅持到最後啊。懂了嗎？"
22200-86 = "我，我們也不想放棄呀！"
22200-87 = "但，但是以那種作弊玩家為對手……要怎麼樣才能贏呢……？"
22200-88 = "是啊……"
22200-89 = "也許……有方法……也說不定。"
22200-93 = "咦咦！？"
22200-94 = "[s]「柚子，真，真的嗎！？」"
22200-95 = "嗯，當時真的是一瞬間……雖然只是剎那般的瞬間。"
22200-97 = "（剛才……！）"
22200-99 = "我看見寧瑠前輩的攻擊奏效了。"
22200-100 = "[s]「在那麼短的時間內……？」"
22200-101 = "不愧是柚子！UZQueen！動態視力的天才！"
22200-102 = "但是為什麼會奏效呢？#n依會長所說，季醬的「武裝」應該是刀槍不入的才對呀？"
22200-103 = "那，那個我也不是很清楚……"
22200-105 = "……這只是，一種假設。"
22200-106 = "……只是假設，真的只是猜測而已。"
22200-107 = "如果季的「武裝」是有破綻的呢？"
22200-108 = "……破綻？"
22200-109 = "會長說過了吧。受到埃里都網路輔助的「武裝」，#n可以透過演算擊墜所有攻擊，或是加以迴避。"
22200-110 = "[s]「嗯，實際看起來也是那樣。」"
22200-111 = "沒錯。即使在我看來，那也並非謊言。#n但是……"
22200-112 = "到目前為止，她從來沒有同時進行那兩件事過。"
22200-113 = "……！#n原來如此，是那麼回事啊。"
22200-114 = "咦？嗯？咦……？"
22200-115 = "那個……那是什麼意思啊？"
22200-117 = "「武裝」的能力確實能稱得上是作弊的等級。"
22200-118 = "但是，或許只是看起來是那樣而已，#n說不定「武裝」也有極限……也有辦不到的事。"
22200-119 = "從大樓墜落時，會長說過連墜落都能加以計算。"
22200-120 = "也就是說，因為當時將演算能力用在墜落上……"
22200-121 = "[s]「所以才產生了無法防禦寧瑠攻擊的……破綻……？」"
22200-122 = "啊！原來如此！"
22200-123 = "那，那樣的話，只要能像那個時候一樣創造出破綻的話……！"
22200-124 = "說不定，就可以擊倒她……？"
22200-125 = "但是要怎麼做呢？我想對方不可能不知道這個弱點。"
22200-126 = "從屋頂上墜落的方法應該也用不了第二次……"
22200-127 = "寧，寧瑠前輩說過……如果是近距離的話……可以贏對吧？"
22200-128 = "……嗯，可以贏。#n但在那之前，要先處理掉那個作弊能力才行。"
22200-129 = "那，那我有個點子。"
22200-130 = "對付作弊的對手……"
22200-131 = "在規則中，我們能使用的……還有「套路技」。"
22200-141 = "寧瑠前輩……"
22200-147 = "……雖然不知道妳們有什麼企圖，但是沒有用的。"
22200-148 = "季。"
22200-149 = "……是的，主人。"
22200-150 = "啊啊，就該這樣才對……"
22200-151 = "這次我們總該，一決勝負了！"
22200-153 = "下一話;那個名字代表的是"

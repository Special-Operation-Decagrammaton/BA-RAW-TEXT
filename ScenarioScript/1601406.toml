[translation]
1601406-1 = "Math Class with Ibuki! "
1601406-2 = "Summoned by a message from Ibuki, I arrived at Gehenna Academy and headed to the Pandemonium Society's break room."
1601406-7 = "Ah! Sensei! Thanks for coming!"
1601406-8 = "Ibuki's been waiting for you!"
1601406-9 = "[s1] \"Hey Ibuki! What's going on?\"\n[s2] \"What do you want to do today, Ibuki?\""
1601406-12 = "Ibuki spent a lot of time thinking about all the places we went last time, Sensei!"
1601406-13 = "There were so many fun things to do Ibuki had a hard time choosing what to do today..."
1601406-14 = "Riding in a police car, cooking in the cafeteria during the lunch rush, commandeering a tank and driving through the city..."
1601406-15 = "But then something strange happened, Sensei..."
1601406-16 = "Ibuki was thinking and thinking...and Sensei kept coming to mind!"
1601406-17 = "[s] \"Me?\""
1601406-18 = "Yeah! You understand Ibuki's feelings..."
1601406-19 = "You turned Schale into an amusement park..."
1601406-20 = "And you taught Ibuki that there are so many things Ibuki can do!"
1601406-21 = "So..."
1601406-22 = "Ibuki decided that Ibuki wants to be like Sensei one day!"
1601406-23 = "[s] \"Professor Ibuki... I'm looking forward to it.\""
1601406-24 = "Heehee, really?"
1601406-25 = "Ibuki has something to show you, Sensei!"
1601406-26 = "It's the whole reason Ibuki invited you here!"
1601406-27 = "[s] \"What is it? I'm getting curious!\""
1601406-28 = "This way!"
1601406-31 = "Welcome to Professor Ibuki's math class!"
1601406-34 = "― [log=이부키]Ibuki is your teacher for the day![/log][wa:890] "
1601406-35 = "― [log=이부키]Class has started... We'll cover math first![/log][wa:3230] "
1601406-38 = "― [log=이부키]Ibuki is confident in math skills![/log][wa:1160] "
1601406-41 = "― [log=이부키]Ibuki got 100 on a test yesterday[/log][wa:10] "
1601406-42 = "― [log=이부키]and even got a gold star! [/log][wa:1000] "
1601406-45 = "[ns] \"Amazing. As expected of Professor Ibuki!\""
1601406-46 = "― [log=이부키]Heeheehee... Okay then. Sensei...[/log][wa:2050] "
1601406-47 = "― [log=이부키]Professor Ibuki has a question for you! [/log][wa:1820] "
1601406-50 = "― [log=이부키]Here! If Ibuki has two ice creams[/log][wa:10] "
1601406-51 = "― [log=이부키]and one pudding.[/log][wa:1130] "
1601406-54 = "― [log=이부키]How many desserts does she have in total?[/log][wa:10] "
1601406-57 = "[ns] \"Adding it up... Is the answer...three?\""
1601406-58 = "― [log=이부키]Wrong! So close![/log][wa:1500] "
1601406-59 = "― [log=이부키]The answer is...[/log][wa:2360] "
1601406-62 = "[ns] \"Yes...?\""
1601406-63 = "― [log=이부키]\"I'll make Ibuki even happier by getting her three more!\"![/log][wa:4400] "
1601406-66 = "― [log=이부키]Ah! And don't forget to[/log][wa:260] "
1601406-67 = "― [log=이부키]brush your teeth after you eat![/log][wa:470] "
1601406-70 = "― [log=이부키]Ibuki makes sure to brush her teeth[/log][wa:270] "
1601406-71 = "― [log=이부키]three times a day![/log][wa:1190] "
1601406-75 = "So how was Ibuki's class, Sensei?"
1601406-76 = "[s] \"It was a great class from a great teacher.\""
1601406-77 = "Heehee, really?"
1601406-78 = "When Ibuki's grown up like Sensei and the upperclassmen..."
1601406-79 = "...Ibuki's going to be just like you!"
1601406-80 = "[s] \"I'm sure you will, Ibuki.\""
1601406-81 = "Really?"
1601406-82 = "Heehee, okay! Thank you, Sensei!"
1601406-92 = "Ibuki will try her hardest!"
1601406-94 = "I listened to Professor Ibuki's earnest lecture in that small classroom for a good while longer."

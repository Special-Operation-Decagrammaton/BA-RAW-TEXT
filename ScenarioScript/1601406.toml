[translation]
1601406-1 = "มาเรียนเลขกับอิบูกิกันเถอะ!"
1601406-2 = "(พอคุณครูได้รับข้อความจากอิบูกิ ก็รีบมาที่ห้องพักผ่อนของแพนเดโมเนียม โซไซตี้ที่เกเฮนน่าทันที)"
1601406-7 = "อ๊ะ คุณครู! ขอบคุณที่มานะ!"
1601406-8 = "กำลังรออยู่เลย!"
1601406-9 = "[s1] \"อิบูกิตัดสินใจแล้วเหรอว่าอยากทำอะไร?\"\n[s2] \"อิบูกิเจอสิ่งที่ชอบแล้วเหรอ?\""
1601406-12 = "อื้อ! หลังจากที่ไปที่ต่างๆ กับคุณครูมาเมื่อคราวที่แล้ว อิบูกิก็คิดมาตลอดเลย "
1601406-13 = "งานนี้ก็สนุก งานนั้นก็ดูสนุกมาก จนเลือกไม่ถูกเลยละ..."
1601406-14 = "อิบูกิอยากเป็นคุณตำรวจ เป็นเชฟ แล้วก็อยากเป็นผู้บัญชาการรถถังด้วย..."
1601406-15 = "แต่ว่านะคุณครู... ยังมีงานที่น่าสนุกอยู่อีกนะ"
1601406-16 = "พอลองทบทวนดูดีๆ แล้ว ก็นึกถึงคุณครูขึ้นมาเลยละ!"
1601406-17 = "[s] \"ครูน่ะเหรอ?\""
1601406-18 = "อื้อ คุณครูเข้าใจความรู้สึกของอิบูกิ"
1601406-19 = "แถมยังเปลี่ยนชาเล่ต์ให้เป็นสวนสนุกอีก"
1601406-20 = "สอนเรื่องต่างๆ ให้อิบูกิ และสอนให้รู้ว่าอิบูกิอยากทำอะไรอีกด้วย...!"
1601406-21 = "เพราะงั้น..."
1601406-22 = "อิบูกิเอง... ในอนาคตก็อยากเป็นเหมือนคุณครูบ้าง!"
1601406-23 = "[s] \"คุณครูอิบูกิเหรอ... อยากเห็นเลยนะเนี่ย?\""
1601406-24 = "ฮิฮิ จริงเหรอ?"
1601406-25 = "เพราะงั้นวันนี้ อิบูกิมีอะไรบางอย่างจะให้คุณครูดูด้วย!"
1601406-26 = "อิบูกิเลยชวนคุณครูมาในวันนี้ไงล่ะ!"
1601406-27 = "[s] \"อะไรเหรอ อยากรู้แล้วเนี่ย?\""
1601406-28 = "ทางนี้!"
1601406-31 = "ขอต้อนรับสู่ชั้นเรียนเลขของอิบูกิค่า!"
1601406-34 = "― [log=이부키]วันนี้น่ะ อิบูกิเป็นคุณครูนะ![/log][wa:1090] "
1601406-35 = "― [log=이부키]ตั้งแต่นี้ไป... คาบเรียนวิชาเลขจะเริ่มขึ้นแล้วค่ะ![/log][wa:2990] "
1601406-38 = "― [log=이부키]อิบูกิน่ะ มั่นใจเรื่องวิชาเลขนะ![/log][wa:1240] "
1601406-41 = "― [log=이부키]เมื่อวานสอบวิชาเลขได้ 100 คะแนนเต็ม[/log][wa:10] "
1601406-42 = "― [log=이부키]แล้วก็ได้ตราประทับคำชมมาด้วยนะ~! [/log][wa:720] "
1601406-45 = "[ns] \"สุดยอด! สมแล้วที่เป็นคุณครูอิบูกิ!\""
1601406-46 = "― [log=이부키]แหะๆๆ...ถ้างั้นเอาละ คุณครู...[/log][wa:2170] "
1601406-47 = "― [log=이부키]คุณครูอิบูกิ จะถามคำถามแล้วนะคะ! [/log][wa:2100] "
1601406-50 = "― [log=이부키]ตรงนี้! มีไอศกรีมอยู่ 2 อัน[/log][wa:10] "
1601406-51 = "― [log=이부키]แล้วก็มีพุดดิ้งอยู่ 1 อัน[/log][wa:770] "
1601406-54 = "― [log=이부키]ทั้งหมดมีอยู่กี่อันคะ?[/log][wa:10] "
1601406-57 = "[ns] \"สองบวกหนึ่ง... ทั้งหมดสามอัน...?\""
1601406-58 = "― [log=이부키]แอ๊ดดด! น่าเสียดาย![/log][wa:1380] "
1601406-59 = "― [log=이부키]คำตอบคือ~[/log][wa:2640] "
1601406-62 = "[ns] \"แล้วคำตอบที่ถูกต้องคือ...?\""
1601406-63 = "― [log=이부키]'ถ้ามีของว่าง อยู่มากกว่าสามอย่างจะยิ่งมีความสุขมากขึ้น~' ไงล่ะ![/log][wa:4160] "
1601406-66 = "― [log=อิบูกิ]อ๊ะ! หลังกินของว่างแล้ว[/log][wa:260] "
1601406-67 = "― [log=이부키]ก็อย่าลืมแปรงฟันด้วยล่ะ![/log][wa:750] "
1601406-70 = "― [log=이부키]อิบูกิน่ะ แปรงฟันอย่างถูกวิธี[/log][wa:510] "
1601406-71 = "― [log=이부키]สามครั้งต่อวันเลยนะ![/log][wa:1110] "
1601406-75 = "คาบเรียนของอิบูกิเป็นยังไงบ้าง คุณครู?"
1601406-76 = "[s] \"เป็นสุดยอดคาบเรียนของสุดยอดคุณครูเลย\""
1601406-77 = "ฮิฮิ จริงเหรอ?"
1601406-78 = "อื้อ สักวันหนึ่งพออิบูกิโตพอๆ กับรุ่นพี่ แล้วก็โตพอกับคุณครู"
1601406-79 = "ถึงตอนนั้น... อิบูกิก็อยากจะเป็นผู้ใหญ่ที่เหมือนคุณครู!"
1601406-80 = "[s] \"ถ้าเป็นอิบูกิละก็ทำได้แน่ๆ\""
1601406-81 = "จริงเหรอ~?"
1601406-82 = "ฮิฮิฮิ อื้อ! ขอบคุณนะ คุณครู!"
1601406-92 = "อิบูกิ... จะพยายามให้ดีที่สุด~!"
1601406-94 = "(หลังจากนั้นคุณครูก็นั่งเรียนกับคุณครูอิบูกิต่อในห้องเรียนเล็กๆ อีกพักใหญ่)"

[translation]
1601406-1 = "跟伊吹一起學算術！"
1601406-2 = "（收到伊吹的聯絡後，前往了格黑娜學園萬魔殿的休息室）"
1601406-7 = "啊！老師！謝謝你來！"
1601406-8 = "我在等你哦！"
1601406-9 = "[s1]「伊吹決定好想做的事情了嗎？」\n[s2]「伊吹找到喜歡的事情了嗎？」"
1601406-12 = "嗯！上次和老師去過各種地方之後，我就一直在想。"
1601406-13 = "這個看起來很有趣，那個看起來也很有趣，真的很難抉擇……"
1601406-14 = "想成為警察，也想成為廚師，也想成為戰車長……"
1601406-15 = "不過老師，我發現一件神奇的事哦！"
1601406-16 = "經過思考之後，我突然想到了老師！"
1601406-17 = "[s]「我？」"
1601406-18 = "嗯！老師能理解伊吹的心情……"
1601406-19 = "還會把夏萊變成遊樂園……"
1601406-20 = "伊吹想要做什麼事情……老師也都能教我！"
1601406-21 = "所以……"
1601406-22 = "伊吹總有一天也想變得和老師一樣！"
1601406-23 = "[s]「伊吹老師啊……真令人期待？」"
1601406-24 = "嘿嘿，真的嗎？"
1601406-25 = "所以我想讓老師看一個東西！"
1601406-26 = "邀請老師來就是想讓老師看這個！"
1601406-27 = "[s]「是什麼呢？真令人好奇。」"
1601406-28 = "來這邊！"
1601406-31 = "歡迎來到伊吹的算術教室！"
1601406-34 = "― [log=이부키]今天伊吹是老師唷！[/log][wa:1890] "
1601406-35 = "― [log=이부키]從現在開始……要上算數課！[/log][wa:4470] "
1601406-38 = "― [log=이부키]伊吹，對算數很有自信！[/log][wa:2080] "
1601406-41 = "― [log=이부키]昨天考試拿了100分……[/log][wa:460] "
1601406-42 = "― [log=이부키]還拿到了花丸印章！ [/log][wa:1640] "
1601406-45 = "[ns]「好厲害，不愧是伊吹老師！」"
1601406-46 = "― [log=이부키]耶嘿嘿……那，老師……[/log][wa:2930] "
1601406-47 = "― [log=이부키]伊吹老師要出問題了！[/log][wa:3020] "
1601406-50 = "― [log=이부키]這邊！有冰淇淋2個，[/log][wa:650] "
1601406-51 = "― [log=이부키]還有布丁1個。[/log][wa:1490] "
1601406-54 = "― [log=이부키]全部有幾個呢～？[/log][wa:570] "
1601406-57 = "[ns]「加起來總共是3個……？」"
1601406-58 = "― [log=이부키]噗噗～！真可惜！[/log][wa:1820] "
1601406-59 = "― [log=이부키]正確答案是～……[/log][wa:2680] "
1601406-62 = "[ns]「答案是……？」"
1601406-63 = "― [log=이부키]「如果有3個點心就會超級幸福～」唷！[/log][wa:6000] "
1601406-66 = "― [log=이부키]啊！吃完之後，[/log][wa:900] "
1601406-67 = "― [log=이부키]別忘記要刷牙哦！[/log][wa:1390] "
1601406-70 = "― [log=이부키]伊吹我呀，每天3次，[/log][wa:1270] "
1601406-71 = "― [log=이부키]都有好好刷牙唷！[/log][wa:1590] "
1601406-75 = "伊吹的課程怎麼樣呀，老師？"
1601406-76 = "[s]「老師很有魅力，課程也很棒。」"
1601406-77 = "嘿嘿，真的嗎？"
1601406-78 = "嗯，等到伊吹變得和前輩跟老師一樣大之後……"
1601406-79 = "一定要成為和老師一樣的大人！"
1601406-80 = "[s]「伊吹一定沒問題的。」"
1601406-81 = "真的嗎～？"
1601406-82 = "耶嘿嘿，嗯！謝謝老師！"
1601406-92 = "伊吹！會好好努力的～！"
1601406-94 = "（之後的好一段時間裡，都在教室裡聽著伊吹老師的課程）"

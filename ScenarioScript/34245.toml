[translation]
34245-2 = "グアアアアアアッ！！"
34245-3 = "何故、どうして……！！私は、私の……！！"
34245-4 = "私の計画が……私の領地が……私の意識が……"
34245-5 = "わたくしの……ワタクシ、ノ……"
34245-6 = "グッ……アア……アァ……。"
34245-13 = "はあ……はあ……はあ……。"
34245-14 = "お、おわり……ですか？"
34245-18 = "あ！ひ、姫ちゃんは！！"
34245-19 = "あ、アツコ……！！"
34245-21 = "まだあそこに！"
34245-22 = "あ、あわ……は、早く姫ちゃんを降ろしましょう！"
34245-32 = "ひ、姫ちゃん……。"
34245-37 = "姫……しっかりしてくれ……。"
34245-38 = "ひ……姫ちゃん……。"
34245-39 = "……外傷がひどい。血を流しすぎてる。"
34245-40 = "姫……アツコ……頼む、目を開けてくれ……"
34245-41 = "お願いだ……アツコ……目を、開けてくれ……"
34245-42 = "……。"
34245-43 = "……。"
34245-51 = "サオリ、ちゃん……？"
34245-52 = "アツコ……！！"
34245-53 = "姫……。"
34245-54 = "ひ、姫ちゃん！！気がつきましたか！？"
34245-55 = "うん……"
34245-56 = "サオリ、ヒヨリ、ミサキ……みんな、おはよう。"
34245-66 = "アツコ……！！！"
34245-67 = "あ、サオリ……？"
34245-68 = "良かった……本当に、よかった……。"
34245-69 = "う、うん……？"
34245-70 = "アツコ……生きていてくれて、ありがとう……#n本当に、ありがとう……。"
34245-71 = "……うん。"
34245-72 = "くっ……うぅ……"
34245-73 = "サオリ……泣かないで。私は大丈夫だから。"
34245-74 = "先生が手伝ってくれたんだね……？"
34245-75 = "ああ……そうだ……。"
34245-76 = "ありがとう、先生……。#nもう、これで大丈夫なんだな。"
34245-79 = "……うん。大丈夫だよ、サオリ。#nきっと全部、終わったよ。"
34245-81 = "[ns] 倒れているベアトリーチェに近づく。"
34245-85 = "く、ぐぅっ……"
34245-86 = "[s] \"終わりだよ、ベアトリーチェ。\""
34245-87 = "よくも……わ、私はまだ……まだ！"
34245-88 = "たかだか儀式を妨害した程度で図に乗らないでください！"
34245-89 = "まだ私にはバルバラもアリウスの兵力も無傷で残っている！#n[ruby=ミメシス]複製[/ruby]能力だって保持しているのです！！"
34245-90 = "一度の勝利ごときで、終わりになど――"
34245-92 = "いいえ、このお話はこれで終わりです。"
34245-93 = "[ns] \"……！！\""
34245-98 = "ゴルコンダ……！！"
34245-99 = "ああ、落ち着いてください。驚かせたなら申し訳ありません。#n私は「ゲマトリア」のゴルコンダ……。"
34245-100 = "――挨拶は省略するとしましょう。#nもしかしたら私たちは、以前お会いしたかもしれませんから。"
34245-101 = "私は戦いに来たのではありません。#nマダムを連れ戻しに来たのです。"
34245-102 = "私を……！？"
34245-103 = "それに、戦闘で勝てる自信もありません。#n「ゲマトリア」が皆マダムのように怪物に変われるわけではないですからね。"
34245-104 = "ええ、マダム。これで明らかになりました。#n――先生はあなたの敵対者ではありません。これはあなたの物語ではないのです。"
34245-105 = "……！！"
34245-106 = "あなたが起こした事件、葛藤、過程の数々……。#nそれらは「知らずとも良いもの」に格下げされました。"
34245-107 = "あなたは主人公どころか……先生の敵対者でもなく、#nただの「[ruby=マクガフィン]舞台装置[/ruby]」だったのです。"
34245-108 = "……く……ぐぅっ……！！"
34245-109 = "先生……あなたが介入してしまうと、すべての概念が変わってしまいます。#n元々この物語の結末はこうではなかったはずなのです。"
34245-110 = "友情で苦難を乗り越え、努力で打ち勝つ物語……？#n私が望んでいたテクストはもっと文学的なものだったはずなのですが……。"
34245-111 = "[s] \"……。\""
34245-112 = "ふむ……申し訳ありません。ご気分を害してしまったようですね。"
34245-113 = "それでは、私はマダムを連れて帰ります。#nマダム、起きてください。"
34245-118 = "ゲホッ……お前は……。"
34245-119 = "[s] \"待って……！！\""
34245-120 = "もしかして私の邪魔をするつもりでしょうか？#nどうかそのような決断はなさらないでください、先生。"
34245-121 = "たとえば……私は様々な道具を生産できます。#nあなたが持っているその「ヘイローを破壊する爆弾」も私の作品ですので。"
34245-122 = "[s] \"……！！\""
34245-123 = "ああ……もちろん、それをここで爆発させたりするつもりはありません。#nあなたには効果もない上に、その実験は結局失敗だったようですから。"
34245-124 = "その爆弾が実際にヘイローを破壊できるかどうかを一度も確認できませんでした。私の計画は断じてそうではなかったのですが……#nまぁ、ですから、それは廃棄する予定です。"
34245-125 = "マダム、今回の実験は失敗です。#n帰りましょう。"
34245-126 = "ゴルコンダ……！"
34245-127 = "失礼しました、先生。#nそれでは、また。"
34245-134 = "次回;大切な人"

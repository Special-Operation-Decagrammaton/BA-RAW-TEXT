[translation]
34245-2 = "อึก... อ๊าาาาาาาาก!!"
34245-3 = "ทำไม ทำไม...!!  ฉัน... ฉัน...!!"
34245-4 = "แผนการ... เขตแดน... พิธีกรรมของฉัน..."
34245-5 = "ทุกอย่าง... ของฉัน..."
34245-6 = "อ๊ากกกกกก!!"
34245-13 = "แฮ่ก... แฮ่ก... แฮ่ก..."
34245-14 = "มันจบแล้ว... ใช่ไหมคะ...?"
34245-18 = "อ๊ะ แล้วองค์หญิงล่ะคะ?!"
34245-19 = "อะ... อาสึโกะ...!!"
34245-21 = "เธอยังถูกแขวนอยู่ข้างบนนั่น"
34245-22 = "ค่ะ... ค่ะ! จะรีบพาตัวองค์หญิงลงมาให้ค่ะ!"
34245-32 = "องค์หญิง..."
34245-37 = "องค์หญิง... ตั้งสติไว้... "
34245-38 = "อะ... องค์หญิง..."
34245-39 = "บาดแผลภายนอกสาหัสมาก... เสียเลือดไปเยอะเลยด้วย"
34245-40 = "องค์หญิง... อาสึโกะ ฉันขอร้องละ... ลืมตาเถอะนะ... ได้โปรด"
34245-41 = "ขอร้องละ อาสึโกะ... ลืมตาขึ้นมาเถอะนะ..."
34245-42 = "......."
34245-43 = "......."
34245-51 = "ซาโอริจัง...?"
34245-52 = "อาสึโกะ...!!"
34245-53 = "องค์หญิง..."
34245-54 = "อะ... องค์หญิง!! รู้สึกตัวแล้วเหรอคะ?!"
34245-55 = "อืม อรุณสวัสดิ์นะ"
34245-56 = "ซาโอริ ฮิโยริ มิซากิ... อรุณสวัสดิ์นะทุกคน"
34245-66 = "อาสึโกะ...!!!"
34245-67 = "อ่า ซาโอริ...?"
34245-68 = "โล่งอกไปที อื้อ โชคดีจริงๆ..."
34245-69 = "หืม...?"
34245-70 = "โล่งอกไปทีนะอาสึโกะ ขอบใจที่ยังมีชีวิตอยู่นะ... ขอบใจจริงๆ"
34245-71 = "อื้ม... เป็นอย่างนี้นี่เอง"
34245-72 = "ฮึก ฮืออออออออ... "
34245-73 = "ซาโอริ... อย่าร้องสิ ฉันไม่ได้เป็นอะไรสักหน่อย"
34245-74 = "คุณครูก็มาช่วยพวกเรา... เหรอ?"
34245-75 = "ใช่... ใช่แล้วละ"
34245-76 = "อื้อ ขอบคุณนะคุณครู ตอนนี้เราไม่เป็นไรแล้ว... อืม ไม่เป็นไร... แล้วละ..."
34245-79 = "อืม... ซาโอริ ตอนนี้ทุกอย่างโอเคแล้ว"
34245-81 = "[ns] เดินไปยังเบียทริซที่สลบอยู่"
34245-85 = "อะ... อึก..."
34245-86 = "[s] \"มันจบแล้วละ เบียทริซ\""
34245-87 = "กล้าดียังไง... ฉัน... ฉันยัง... ไม่จบ!"
34245-88 = "อย่ามาหยิ่งผยองเพียงเพราะขัดขวางพิธีได้นะครู! "
34245-89 = "ฉันยังมีบาร์บาราและกองกำลังอาเรียสอยู่ครบ! แล้วก็มีมิเมซิสด้วย!!"
34245-90 = "คิดว่าชัยชนะเพียงครั้งเดียวจะจบทุกอย่างได้งั้นเหรอ!!"
34245-92 = "ไม่หรอก แต่เรื่องนี้มันต้องจบเพียงเท่านี้"
34245-93 = "[ns] \"......!!\""
34245-98 = "โกลคอนดา...!!"
34245-99 = "อ่า ใจเย็นๆ ก่อนสิครับ ขออภัยที่ทำให้ตกใจนะครับ กระผมคือโกลคอนดาจาก <เกมาเทรีย>..."
34245-100 = "ข้ามการทักทายไปแล้วกันนะครับคุณครู ก่อนหน้านี้เราอาจจะเคยได้เจอกันมาแล้วก็ได้"
34245-101 = "กระผมไม่ได้มาที่นี่เพื่อต่อสู้ แต่มาเพื่อพาตัวมาดามไปต่างหากครับ"
34245-102 = "ฉันเหรอ...?!?"
34245-103 = "อีกอย่างกระผมก็ไม่มั่นใจที่จะต่อสู้ด้วย เกมาเทรียไม่ได้เปลี่ยนร่างเป็นปีศาจได้เหมือนมาดามกัน#nทุกคนหรอกนะครับ"
34245-104 = "ใช่แล้วครับมาดาม มันชัดเจนแล้วว่า คุณครูไม่ใช่ศัตรูตัวฉกาจของคุณ นี่ไม่ใช่เรื่องราวของคุณ"
34245-105 = "......!!"
34245-106 = "ทุกเหตุการณ์ทุกความขัดแย้ง ทุกกระบวนการที่คุณวางแผนไว้... มันถูกลดระดับเป็นแค่ <สิ่งที่ถึงไม่รู้ก็ไม่เป็นไร> แล้วยังไงล่ะครับ"
34245-107 = "คุณไม่ได้เป็นตัวเอกหรือศัตรูตัวฉกาจของคุณครู... ที่ผ่านมาคุณมันก็แค่ <ตัวดำเนินเรื่อง> แค่เครื่องมือที่ถูกใส่มาเพื่อช่วยในการเล่าเรื่องครับ"
34245-108 = "อะ... อึก!!"
34245-109 = "คุณครู หากคุณเข้ามาแทรกแซง มโนทัศน์ทั้งหมดก็จะเปลี่ยนไป เดิมทีแล้วตอนจบของเรื่องนี้จะไม่เป็น#nอย่างนี้ครับ"
34245-110 = "ทุกคนมาร่วมมือกันแล้วเอาชนะด้วยความพยายาม...? ข้อความที่กระผมต้องการมันสวยงามมากกว่า#nสิ่งนั้นนะครับ..."
34245-111 = "[s] \"......\""
34245-112 = "ฮึ่ม... ขอโทษด้วยครับ สงสัยกระผมจะทำให้อารมณ์ไม่ดีเสียแล้ว  "
34245-113 = "ถ้างั้นกระผมขอพาตัวมาดามไปละครับ ลุกขึ้นเถอะครับมาดาม"
34245-118 = "แค่กๆ... นี่แก..."
34245-119 = "[s] \"เดี๋ยวก่อน...!"
34245-120 = "จะมาขวางกระผมเหรอครับ? ได้โปรดอย่าคิดทำอะไรแบบนั้นเลยครับคุณครู"
34245-121 = "กระผมน่ะ... ใช้ประโยชน์จากเครื่องมือได้มากมาย <ระเบิดที่ทำลายฮาโลได้> ที่คุณมีอยู่ นั่นก็เป็น#nผลงานของกระผมนะครับ"
34245-122 = "[s] \"......!!\""
34245-123 = "อ้อ กระผมไม่มีความคิดจะระเบิดมันที่นี่หรอกครับ ยังไงมันก็ไม่ได้ผลกับคุณและการทดลองนั้นก็#nล้มเหลวไปในที่สุด"
34245-124 = "เราไม่มีทางพิสูจน์ได้อีกครั้งหรอกครับ ว่าระเบิดนั่นสามารถทำลายฮาโลได้จริงหรือเปล่า เดิมทีแผนการของกระผมไม่ใช่แบบนี้เลย... ผมก็เลยจะยุติในภายหลังน่ะครับ"
34245-125 = "มาดาม... การทดลองนี้ล้มเหลวแล้ว กลับไปเถอะครับ"
34245-126 = "โกลคอนดา...!"
34245-127 = "ขอโทษที่เข้ามาขัดจังหวะนะครับคุณครู แล้วไว้เจอกันใหม่"
34245-134 = "ตอนต่อไป;คนสำคัญ"

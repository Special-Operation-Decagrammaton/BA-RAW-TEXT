34245-97 = "3;골콩트;00\n#3;a\n#wait;1500"
34245-98 = "#na;베아트리체;골콩트……!!"
34245-99 = "3;골콩트;00;아아. 진정하세요. 놀라게 해드렸다면 죄송합니다. 저는 <게마트리아>의 골콩트…….\n#3;em;[반응]"
34245-100 = "3;골콩트;00;인사는 생략하도록 하죠. 선생님. 어쩌면 우리는 이전에 만났을지도 모르니까요."
34245-101 = "3;골콩트;00;저는 싸우러 온 게 아닙니다. 마담을 데려가려고 온 겁니다."
34245-102 = "#na;베아트리체;나를……!!?"
34245-103 = "3;골콩트;00;게다가 제가 싸워서 이길 자신도 없군요. 게마트리아가 모두 마담처럼 괴물로 변할 수 있는 건 아니니까요."
34245-104 = "3;골콩트;00;네. 마담. 이걸로 분명해졌어요. 선생님은 당신의 대적자가 아니었습니다. 이건 당신의 이야기가 아니었어요."
34245-105 = "#na;베아트리체;……!!"
34245-106 = "3;골콩트;00;당신이 꾸민 사건들, 갈등들, 과정들……. 그런 건 <굳이 몰라도 아무 상관 없는 것>으로 격하되었습니다."
34245-107 = "3;골콩트;00;당신은 주인공은 커녕…… 선생님의 대적자조차 아닌, <맥거핀> 이었던 거죠."
34245-108 = "#na;베아트리체;……크…… 크윽……!!"
34245-109 = "3;골콩트;00;선생님, 당신이 개입하면 모든 개념이 바뀌어 버립니다. 원래 이 이야기의 결말은 이렇지 않았을 거예요."
34245-110 = "3;골콩트;00;모두가 힘을 합쳐 노력으로 이겨낸다……? 제가 원하는 텍스트는 그것보다는 더 문학적인 것이었는데……."
34245-111 = "[s] \"…….\""
34245-112 = "3;골콩트;00;흠, ……죄송합니다. 심기를 불편하게 해드렸나 보군요."
34245-113 = "3;골콩트;00;그럼 저는 마담을 데리고 돌아가겠습니다. 마담, 일어나세요.\n#3;em;[반응]"
34245-114 = "#st;[0,0];instant;1;"
34245-115 = "#clearST"
34245-116 = "3;골콩트;00\n#3;m4\n#wait;1200"
34245-117 = "#all;hide\n#wait;1500"
34245-118 = "#na;베아트리체;쿨럭…… 너는……."
34245-119 = "[s] \"기다려……!!\""
34245-120 = "4;골콩트;00;혹시 저를 방해하실 건가요? 부디 그런 결심을 하진 말아주세요. 선생님.\n#4;em;[반응]"
34245-121 = "4;골콩트;00;가령…… 저는 다양한 도구를 활용할 수 있습니다. 당신이 가지고 있는 그 <헤일로를 파괴하는 폭탄>도 제 작품이거든요."
34245-122 = "[s] \"……!!\""
34245-123 = "4;골콩트;00;아아. 물론 그걸 여기서 터트리거나 할 생각은 없습니다. 당신에겐 효과도 없을뿐더러, 그 실험은 결국 실패였던 것 같으니까요.\n#4;m3"
34245-124 = "4;골콩트;00;그 폭탄이 실제로 헤일로를 파괴할 수 있는지를 한 번도 확인할 수 없었죠. 분명 제 계획은 그런 게 아니었는데……. 그러니까 그건 이후 폐기할 예정입니다."
34245-125 = "4;골콩트;00;마담. 이번 실험은 실패입니다. 돌아가시죠.\n#4;em;[반응]"

[translation]
34245-2 = "呃啊啊啊啊啊啊！！"
34245-3 = "怎麼會，為什麼……！！我是，我的……！！"
34245-4 = "我的計畫……我的領地……我的意識……"
34245-5 = "我的……我……的……"
34245-6 = "唔……啊啊……啊……"
34245-13 = "哈啊……哈啊……哈啊……"
34245-14 = "結，結束了……嗎？"
34245-18 = "啊！公，公主醬呢！！"
34245-19 = "敦……敦子……！！"
34245-21 = "還在那裡！"
34245-22 = "啊，啊哇……快，快點把公主醬放下來吧！"
34245-32 = "公，公主醬……"
34245-37 = "公主……快醒醒……"
34245-38 = "公……公主醬……"
34245-39 = "……外傷很嚴重。失血過多了。"
34245-40 = "公主……敦子……拜託你睜開眼睛吧……"
34245-41 = "求求你了……敦子……睜開，眼睛吧……"
34245-42 = "……"
34245-43 = "……"
34245-51 = "沙織，醬……？"
34245-52 = "敦子……！！"
34245-53 = "公主……"
34245-54 = "公，公主醬！！你醒了嗎！？"
34245-55 = "嗯……"
34245-56 = "沙織，日和，美咲……大家早安。"
34245-66 = "敦子……！！！"
34245-67 = "啊，沙織……？"
34245-68 = "太好了……真的，太好了……"
34245-69 = "嗯，嗯……？"
34245-70 = "敦子……謝謝你還活著……#n真的，謝謝你……"
34245-71 = "……嗯。"
34245-72 = "唔……嗚……"
34245-73 = "沙織……別哭，我沒事的。"
34245-74 = "是老師幫了我們嗎……？"
34245-75 = "啊啊……沒錯……"
34245-76 = "謝謝你，老師……#n這樣就沒事了。"
34245-79 = "……嗯。沒事了唷，沙織。#n全部都結束了。"
34245-81 = "[ns] 靠近倒下的貝雅特里榭"
34245-85 = "唔，唔嗚……"
34245-86 = "[s] 「都結束了，貝雅特里榭。」"
34245-87 = "竟敢……我，我還沒……還沒！"
34245-88 = "只不過是妨礙了我的儀式而已，少得意了！"
34245-89 = "白芭蕾和奧利斯的兵力都還完好無損！#n[ruby=Mimesis]複製[/ruby]能力也還在！！"
34245-90 = "只不過是贏了我一次而已，還沒有結束──"
34245-92 = "不，到此為止了。"
34245-93 = "[ns] 「……！！」"
34245-98 = "戈爾孔特……！！"
34245-99 = "啊啊，請先冷靜下來。如果嚇到你了非常抱歉。#n我是「蓋瑪特利亞」的戈爾孔特……"
34245-100 = "──問候就省略吧。#n畢竟我們或許在這之前就已經見過彼此了。"
34245-101 = "我並不是來戰鬥的。#n只是來把夫人帶回去的而已。"
34245-102 = "把我……！？"
34245-103 = "而且，我也沒有在戰鬥中取勝的自信。#n因為不是每個「蓋瑪特利亞」的成員都能像夫人一樣變成怪物。"
34245-104 = "夫人，這下你明白了吧。#n──老師並非你的敵對者，這也不是你的故事。"
34245-105 = "……！！"
34245-106 = "你所引起的事件、糾葛，以及過程中的一切……#n都已經被降格為「不知道也無所謂的事」了。"
34245-107 = "你別說是主角了……就連老師的敵對者也不是，#n只不過是個「[ruby=MacGuffin]推動劇情的道具[/ruby]」罷了。"
34245-108 = "……唔……唔唔……！！"
34245-109 = "老師……在你介入之後，所有的概念都發生了改變。#n本來這個故事的結尾不該是這樣的。"
34245-110 = "用友情克服困難，以努力贏得勝利的故事……？#n我所期望的文本應該要是更有文學性的東西才對……"
34245-111 = "[s]「……」"
34245-112 = "呼姆……非常抱歉。似乎讓你不高興了呢。"
34245-113 = "那麼，我就帶著夫人回去了。#n夫人，快起來吧。"
34245-118 = "咳咳……你這傢伙……"
34245-119 = "[s] 「等等……！！」"
34245-120 = "難不成你想要阻止我嗎？#n請千萬別做出這種決定啊，老師。"
34245-121 = "舉例來說……我能夠創造出各種道具。#n你手上的那個「破壞光環的炸彈」也是我的作品。"
34245-122 = "[s] 「……！！」"
34245-123 = "沒錯……當然，我並沒有要讓它在這裡爆炸的打算。#n除了它對你沒有效果之外，那個實驗也已經以失敗告終了。"
34245-124 = "那個炸彈實際上究竟能不能破壞光環，我一次都還沒有確認。雖然我的計畫絕不僅只於此……#n不過，那個炸彈本來就打算要廢棄的。"
34245-125 = "夫人，這次的實驗失敗了。#n回去吧。"
34245-126 = "戈爾孔特……！"
34245-127 = "失禮了，老師。那麼，後會有期。"
34245-134 = "下一話;重要之人"

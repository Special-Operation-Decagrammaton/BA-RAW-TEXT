[translation]
10034190-1 = "1 Day Ago: Ready to Head Out"
10034190-3 = "Today is the last day, soldiers."
10034190-4 = "...It's been a long journey."
10034190-5 = "..."
10034190-6 = "..."
10034190-7 = "..."
10034190-9 = "But here we stand, at the end of the path. The final battle."
10034190-10 = "Sometimes we wandered off the path, but not all who wander are lost. We gained valuable experience, nourishment for the spirit."
10034190-11 = "It's going to be rough. The audition's standards are high, and we are still amateurs."
10034190-12 = "But one thing holds true..."
10034190-13 = "On the other side of that audition, semla's waiting for us!"
10034190-14 = "And that should remove all doubt from your minds."
10034190-15 = "Don't falter now! Stand together, do what you have to do, and this journey of ours will end just the way you dreamed it would!"
10034190-20 = "We didn't practice all this time for good memories alone! That semla belongs in our stomachs, and we're going to put it there!"
10034190-21 = "The After-School Sweets Gang will emerge victorious!"

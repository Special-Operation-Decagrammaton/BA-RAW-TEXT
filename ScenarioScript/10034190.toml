[translation]
10034190-1 = "[D-1]: เตรียมตัวลุย"
10034190-3 = "วันสุดท้ายของการฝึกซ้อมแล้วนะ วงดนตรีหลังเลิกเรียน"
10034190-4 = "นี่คือการเดินทางที่แสนยาวไกล..."
10034190-5 = "......"
10034190-6 = "......"
10034190-7 = "......"
10034190-9 = "เราผ่านเส้นทางที่แสนยาวไกลมา และมายืนอยู่ตรงหน้าการแข่งคัดเลือกแล้ว"
10034190-10 = "ถึงบางครั้งเราจะร่อนเร่ไปบ้าง แต่ก็ไม่ได้หมายความว่านักเดินทางที่ร่อนเร่จะหลงทางเสมอไป"
10034190-11 = "ฉันรู้ดีว่าทุกคนต้องลำบาก ถึงมาตรฐานการคัดเลือกจะสูง และพวกเรายังเป็นกลุ่มพวกชอบสร้างเรื่อง#nกันอยู่ด้วย"
10034190-12 = "แต่ถึงยังไงเงื่อนไขก็ยังไม่เปลี่ยนแปลง"
10034190-13 = "เซมล่ายังรอเราอยู่ และเราต้องผ่านการคัดเลือกเพื่อไปหามัน..."
10034190-14 = "ถ้างั้นก็ไม่มีอะไรให้ลังเลแล้ว"
10034190-15 = "จงอย่าสั่นไหว! ทำในส่วนของตัวเองให้ดี ประสานทักษะกับเพื่อนร่วมวง แล้วมายุติการต่อสู้ที่ยาวนานครั้งนี้กัน!"
10034190-20 = "เราไม่ได้ฝึกซ้อมเพื่อให้ทั้งหมดนี้เป็นแค่ความทรงจำ! แต่เราทำเพื่อเซมล่าที่จะได้มาอยู่ในกระเพาะ#nของพวกเรา!!"
10034190-21 = "ชมรมของหวานหลังเลิกเรียนจะต้องชนะให้ได้!"

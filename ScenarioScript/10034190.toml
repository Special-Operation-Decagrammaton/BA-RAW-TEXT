[translation]
10034190-1 = "1天前：出征準備"
10034190-3 = "今天是最後一天了，團員們。"
10034190-4 = "……真是趟漫長的遠征呢。"
10034190-5 = "…………"
10034190-6 = "…………"
10034190-7 = "…………"
10034190-9 = "雖然路途漫漫，但我們終究是抵達了決戰場的前方。"
10034190-10 = "雖然曾一度迷失方向，但迷路並不代表走了冤枉路，一切都是我們必需的養分。"
10034190-11 = "我明白想獲勝並不容易。#n試鏡的標準很高，而我們仍只是一群烏合之眾。"
10034190-12 = "但這並不會改變我們的目標。"
10034190-13 = "女王泡芙正等著我們通過試鏡……"
10034190-14 = "……既然如此，還有什麼好猶豫的呢？"
10034190-15 = "切勿動搖！堅守各自的崗位並相互照應──#n讓我們將這段遠征的句點，畫在理想的結尾後頭吧！"
10034190-20 = "我們並非為了留下回憶而練習！而是為了品嘗名為女王泡芙的勝利果實！！"
10034190-21 = "放學後的甜點團，必將得勝！"

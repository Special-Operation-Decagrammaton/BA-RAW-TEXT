[translation]
83300200201-5 = "อะ... อืม...! แต่ก็ช่วยไม่ได้แหละนะ... ถึงจะบอกว่าไม่สะดวก แต่ทางนั้นก็คงไม่รับฟังหรอก"
83300200201-6 = "เอาละ จูริ ได้เวลาทำงานแล้ว มารีบเตรียมของกันก่อนที่จะสายไปกว่านี้เถอะ"
83300200201-7 = "ค่ะ! รุ่นพี่ฟูกะ! ถ้างั้นฉันจะเริ่มจากการจัดอุปกรณ์ทำครัวให้นะคะ!"
83300200201-8 = "ถ้าเป็นอย่างนี้แล้ว ฉันก็จะทำอาหารสำหรับปาร์ตี้ที่สมบูรณ์แบบจนไม่มีใครกล้าติเลย!"

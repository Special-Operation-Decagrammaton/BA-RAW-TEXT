[translation]
2000015-1 = "Form of Attachment"
2000015-2 = "There was a hubbub of maintenance and work going on in the Engineering Department."
2000015-3 = "[ns] \"I'm here, Hibiki!\""
2000015-7 = "Ah, Sensei. Just a second..."
2000015-12 = "Here. Your newly repaired bike."
2000015-13 = "[s1] \"It's...perfect.\"\n[s2] \"Thank you, Hibiki!\""
2000015-16 = "I really considered adding some mods."
2000015-17 = "But then I remembered how many times you explicitly insisted that I \"only do repairs,\" so I stopped myself."
2000015-18 = "Although I really would have liked to add a high-velocity grenade launcher or flamethrower. For safety reasons, of course..."
2000015-19 = "[s] \"I think that creates more safety hazards!\""
2000015-20 = "You could at least switch to airless, titanium tires."
2000015-21 = "I mean, what will you do if you run into spike strips on the road? Your tires would get completely shredded."
2000015-22 = "[s3] \"No, it's okay...\"\n[s4] \"Just a normal bike is fine...\""
2000015-25 = "Well, I guess if that's really what you want...I'll let it go. Just this once."
2000015-26 = "[s] \"Thanks for being so considerate, Hibiki.\""
2000015-27 = "But...modifications are every engineer's dream. Why are you so afraid of them?"
2000015-28 = "You think that sometimes purity is best...? Hm..."
2000015-29 = "There's a certain beauty there that I can respect. Respecting something's origins can have meaning, too."
2000015-30 = "However! Adding more functions through modifications is also beautiful! The act of maximizing efficiency to its ultimate level..."
2000015-31 = "And it's unwieldy to juggle a whole menagerie of tools. Isn't it better to combine multiple different features into one?"
2000015-32 = "The more I think about it, the more I think we should spice up your bike."
2000015-33 = "[s5] \"I'm starting to see where you're coming from.\"\n[s6] \"I think...I'm being convinced? Please, continue...\""
2000015-36 = "Heehee. You get it, Sensei!"
2000015-37 = "For example... Let me see..."
2000015-41 = "Ah, yes. Behold these beauties."
2000015-46 = "[ns] \"These are...your goggles, Hibiki?\""
2000015-47 = "You could call them that. But now that they've undergone modification after modification..."
2000015-48 = "...they're a priceless masterpiece. The embodiment of versatility and functionality."
2000015-49 = "They have so many uses now that my work would suffer if I didn't have them."
2000015-50 = "[s] \"A meister's proud work, I see.\""
2000015-54 = "Exactly. Naturally, they have the inherent feature of eye protection."
2000015-55 = "But not just from welding sparks. They can also withstand the harsh gusts of the desert or wind pressure from a freefall."
2000015-56 = "These goggles also protect against blue light, UV rays, and bullets."
2000015-57 = "Oh, and its zoom feature is really useful for when I'm sewing."
2000015-58 = "[s] \"Sewing...cosplay costumes?\""
2000015-59 = "Precisely. All good cosplay begins with sewing, after all."
2000015-60 = "Starting with fabric cutting to seam treatments, you have to determine and implement the appropriate method on a case-by-case basis."
2000015-61 = "Even with the newest sewing machines, threading a tight stitch in a small area again and again is a battle of the senses. Crystal clear vision is essential."
2000015-62 = "That's why I added a 15-level multifocal lens. At maximum level, you can even view the stitches and fabric on a molecular level."
2000015-63 = "[s7] \"Have you ever heard the phrase 'overkill'?!\"\n[s8] \"What about sewing requires molecular vision?!\""
2000015-66 = "I technically haven't had the need for it yet, but it's important to know the capability is there."
2000015-67 = "Can you guess at some of the other functionalities, Sensei?"
2000015-68 = "[s] \"I'd guess...something combat-related?\""
2000015-69 = "Heehee. You hit the mark. I've added a survey feature, which includes a GPS-system."
2000015-70 = "You'll never need to work with another operator to fire mortars again, as long as you have these goggles."
2000015-71 = "Infrared navigation? Of course. Night operations are no obstacle."
2000015-72 = "On my pride as a meister, I can confidently say I've added every possible feature a student would need."
2000015-73 = "[s] \"Then, do these goggles also have...\""
2000015-75 = "[ns] \"...your favorite feature? A self-destruct?\""
2000015-77 = "O-Oh... Uh... Self-destruct...?"
2000015-78 = "[s] \"That's an essential mod for any invention, right?\""
2000015-79 = "Um... For these goggles..."
2000015-80 = "No, I didn't install a self-destruct feature."
2000015-81 = "You are correct that it's almost a given to add it to a meister's inventions."
2000015-82 = "But...for some strange reason, I didn't feel the same urge with this particular masterpiece."
2000015-83 = "..."
2000015-84 = "I can't put my finger on it. Maybe I still haven't fully matured into the mindset of a true meister."
2000015-88 = "[ns] \"I think I know why.\""
2000015-89 = "Why's that?"
2000015-90 = "[s9] \"It's because those goggles are precious to you, Hibiki.\"\n[s10] \"You just didn't want to think about them ever exploding.\""
2000015-93 = "..."
2000015-94 = "You're right, Sensei."
2000015-95 = "I've been using these goggles for...a long time now."
2000015-96 = "At first, I just liked their aesthetic. But then, I put a lot of work into them, modifying them whenever the situation arose."
2000015-97 = "After all this time..."
2000015-98 = "You're right. They became really important to me, somewhere along the way."
2000015-99 = "These feelings...stopped me from adding a self-destruct feature."
2000015-100 = "I didn't want to even consider a situation where they could explode. I guess they're pretty sentimental to me."
2000015-101 = "Even if I would never use it, I was averse to the hypothetical."
2000015-102 = "[s11] \"Yup. I hope they'll stay with you, for as long as you want.\"\n[s12] \"Without exploding, that is.\""
2000015-105 = "...Yeah. I hope so too."
2000015-110 = "[ns] \"Hibiki?\""
2000015-111 = "Hm... It's nothing."
2000015-112 = "I was just thinking..."
2000015-113 = "You don't need a self-destruct feature either, Sensei."
2000015-114 = "[s] \"Isn't that a given?!\""
2000015-116 = "So please stay with me, for as long as I want."

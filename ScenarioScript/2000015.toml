[translation]
2000015-1 = "#title;애착의 형태"
2000015-2 = "#na;(엔지니어부실 안쪽에서는 정비하는 소리가 요란하다.)"
2000015-3 = "[ns] \"히비키~ 나 왔어~\""
2000015-4 = "#st;[0,0];instant;1;"
2000015-5 = "#clearST"
2000015-6 = "#wait;1500"
2000015-7 = "#na;히비키;아, 선생님. 잠시만 기다려 줘."
2000015-8 = "#st;[0,0];instant;1;"
2000015-9 = "#clearST"
2000015-10 = "#wait;3500"
2000015-11 = "3;히비키;00\n#3;a\n#wait;1500"
2000015-12 = "3;히비키;03;자, 수리를 요청했던 자전거야.\n#3;greeting"
2000015-13 = "[s1] \"완전 말끔해졌어……\"\n[s2] \"고마워, 히비키!\""
2000015-14 = "#wait;10"
2000015-15 = "#wait;10"
2000015-16 = "3;히비키;02;원래 이번 기회에 이것저것 개조해 두려 했는데……\n#3;em;…"
2000015-17 = "3;히비키;06;선생님이 그냥 수리만 해달라고 신신당부했던 게 떠올라서 그만뒀어."
2000015-18 = "3;히비키;07;그래도 안전을 고려해서 고속유탄발사기라거나, 화염방사기 정도를 추가하면 좋았을 텐데……"
2000015-19 = "[s] \"그게 더 안전하지 않은 것 같은데?\""
2000015-20 = "3;히비키;00;아니면 타이어만이라도 티타늄 에어리스로 바꿔도 괜찮은데……\n#3;em;[속상함]"
2000015-21 = "3;히비키;02;길에 스파이크 스트립이 설치되어 있으면 타이어에 심각한 피해를 줄 수도 있으니까……"
2000015-22 = "[s3] \"아냐, 괜찮아……\"\n[s4] \"내가 원하는 건 그냥 정말 평범한 자전거니까……\""
2000015-23 = "#wait;10"
2000015-24 = "#wait;10"
2000015-25 = "3;히비키;00;선생님의 뜻이 그렇다면 할 수 없지…… 이번에는 내가 참도록 할게.\n#3;em;[땀]\n#3;stiff"
2000015-26 = "[s] \"신경 써줘서 고마워, 히비키.\""
2000015-27 = "3;히비키;02;선생님은 왜 개조를 꺼려해? 개조야말로 로망이잖아?\n#3;em;[?]"
2000015-28 = "3;히비키;00;때로는 순정이 좋을 때도 있는 법이라고? 흠……"
2000015-29 = "3;히비키;99;물론 순정의 아름다움도 나는 존중해. 본연의 모습은 그 의미가 있는 법이니까."
2000015-30 = "3;히비키;05;하지만 개조를 통해 필요한 기능을 추가한다는 건, 결국 효율성의 극대화라고 볼 수 있어.\n#3;em;[!]"
2000015-31 = "3;히비키;00;여러 가지의 도구를 사용하면 번거로우니, 물품 하나에 기능을 집약시키는 거지."
2000015-32 = "3;히비키;02;그런 면에서 보면 개조를 지양할 필요가 있나 싶기도 해."
2000015-33 = "[s5] \"듣고 보니 맞는 말 같기도 해……\"\n[s6] \"조금 더 이야기를 들으면 솔깃할지도……?\""
2000015-34 = "#wait;10"
2000015-35 = "#wait;10"
2000015-36 = "3;히비키;03;후후…… 그렇지, 선생님?"
2000015-37 = "3;히비키;00;예를 들어서…… 뭐가 있을까……\n#3;em;…"
2000015-38 = "#st;[0,0];instant;1;"
2000015-39 = "#clearST"
2000015-40 = "3;히비키;07\n#3;em;[전구]\n#wait;1500"
2000015-41 = "3;히비키;02;아. 이걸 봐줘, 선생님."
2000015-42 = "#st;[0,0];instant;1;"
2000015-43 = "#clearST"
2000015-44 = "3;히비키;02\n#3;d\n#wait;1500"
2000015-45 = "#wait;1500"
2000015-46 = "[ns] \"이건…… 히비키의 고글?\""
2000015-47 = "#na;히비키;이건 정말 갖가지 개조를 거친 물건이야."
2000015-48 = "#na;히비키;지금 와서 다시 보면 초 다용도랄까, 값으로 따질 수 없는 명품이랄까."
2000015-49 = "#na;히비키;이제 이 고글이 없으면 작업이 어려울 정도니까 말이지."
2000015-50 = "[s] \"마이스터의 자신작인가.\""
2000015-51 = "#st;[0,0];instant;1;"
2000015-52 = "#clearST"
2000015-53 = "3;히비키;00\n#3;greeting\n#3;a\n#wait;1500"
2000015-54 = "3;히비키;05;응. 일단 눈을 보호하는 보안경 기능은 기본이고."
2000015-55 = "3;히비키;99;용접의 불꽃뿐 아니라, 사막의 모래바람이나, 자유낙하 시에 발생하는 풍압도 문제없이 막을 수 있어.\n#3;em;[재잘]"
2000015-56 = "3;히비키;00;그 외에 방탄 기능, 블루라이트 조절 기능, UV 차단 기능……"
2000015-57 = "3;히비키;03;물론 축소 및 확대 기능도 있어. 이 기능은 재봉을 할 때 가장 유용하게 쓰고 있지.\n#3;em;[음표]"
2000015-58 = "[s] \"재봉이라면…… 혹시 코스프레?\""
2000015-59 = "3;히비키;00;응. 코스프레란 의상과 소품 제작부터 시작이니까."
2000015-60 = "3;히비키;05;재단부터 시작해서, 시접 처리도 그때그때 적절한 방식을 택해야 하는 작업이야.\n#3;em;[...]"
2000015-61 = "3;히비키;99;신식 재봉틀을 활용한다 해도, 매우 좁은 부위에 반복해서 실을 꿰어야 하는 작업은 결국 감각 싸움이니까. 잘 보인다는 건 아주 중요해."
2000015-62 = "3;히비키;03;그래서 15단 다중초점렌즈 기능을 넣었어. 최대한으로 확대하면 분자 단위의 관측도 가능하지.\n#3;em;[반짝]\n#3;closeup"
2000015-63 = "[s7] \"너무 과한 거 아니야??\"\n[s8] \"재봉할 때 분자를 관측할 일이 뭐가 있는데?!?\""
2000015-64 = "#wait;10"
2000015-65 = "#wait;10"
2000015-66 = "3;히비키;07;지금까지는 활용해 본 적 없지만, 어쨌든 그런 기능도 있다는 게 중요하니까."
2000015-67 = "3;히비키;00;선생님, 또 어떤 기능이 있을 것 같아?\n#3;em;[반응]"
2000015-68 = "[s] \"전투에 도움이 되는 거려나.\""
2000015-69 = "3;히비키;03;후후, 맞아. GPS 결합형 광학 측량 기능도 추가했지.\n#3;em;[음표]"
2000015-70 = "3;히비키;00;이것만 있으면 박격포를 발사할 때 관측병이나 오퍼레이터가 따로 필요 없다는 이야기야."
2000015-71 = "3;히비키;02;적외선 탐색 기능? 당연히 있지. 야간 작전도 얼마든지 수행 가능해.\n#3;em;[?]"
2000015-72 = "3;히비키;03;마이스터로서, 한 명의 학생으로서 필요한 기능은 모두 추가했다고 볼 수 있어."
2000015-73 = "[s] \"그럼 혹시 그 고글에……\""
2000015-74 = "#wait;1500"
2000015-75 = "[ns] \"히비키가 좋아하는 자폭 기능도 있어?\""
2000015-76 = "3;히비키;09\n#3;em;[?!]\n#wait;1500\n#3;shake"
2000015-77 = "3;히비키;04;어…… 으, 으응? 자폭…… 기능……?\n#3;stiff"
2000015-78 = "[s] \"지금까지 웬만한 발명품에는 꼭 넣었었잖아?\""
2000015-79 = "3;히비키;04;으음…… 이 고글에는……\n#3;em;…"
2000015-80 = "3;히비키;11;자폭 기능이 없어.\n#3;stiff\n#3;closeup"
2000015-81 = "3;히비키;11;자폭 기능은 마이스터의 발명품에는 필수 중의 필수임에도 불구하고……\n#3;closeup"
2000015-82 = "3;히비키;99;왠지 이 고글에는 추가할 마음이 생기지 않았다고 할까……\n#3;closeup\n#3;em;…"
2000015-83 = "3;히비키;06;……"
2000015-84 = "3;히비키;08;어째서인지는 잘 모르겠지만, 아마 아직도 마이스터로서의 마음가짐이 부족하지 않나 싶어.\n#3;em;[세로선]"
2000015-85 = "#st;[0,0];instant;1;"
2000015-86 = "#clearST"
2000015-87 = "#wait;2500"
2000015-88 = "[ns] \"나는 왠지 알 것 같은데.\""
2000015-89 = "3;히비키;00;응?\n#3;em;[?]"
2000015-90 = "[s9] \"그 고글, 히비키에게 소중하기 때문일 거야.\"\n[s10] \"애착을 가진 물건이 폭발하는 상황을 바라지 않았을 테니까.\""
2000015-91 = "#wait;10"
2000015-92 = "#wait;10"
2000015-93 = "3;히비키;09;……\n#3;em;[...]"
2000015-94 = "3;히비키;06;……그 말이 맞는 것 같아, 선생님."
2000015-95 = "3;히비키;01;이 고글은…… 내가 오래전부터 써왔던 거야.\n#3;em;[반응]"
2000015-96 = "3;히비키;99;처음에는 생김새가 마음에 들었고…… 필요한 기능이 있을 때마다 열심히 개조했어."
2000015-97 = "3;히비키;06;그렇게 꽤 오랜 시간이 흘렀지……"
2000015-98 = "3;히비키;99;맞아. 확실히…… 이 고글은 내게 소중한 물건이야.\n#3;em;…"
2000015-99 = "3;히비키;02;자폭 기능을 추가하지 않은 것도 아마…… 그런 마음 때문이겠지."
2000015-100 = "3;히비키;11;선생님 말대로, 내가 애착을 가진 물건이 폭발하거나 하는 상상이나 가정을 하고 싶지 않았나 봐.\n#3;em;[///]\n#3;stiff"
2000015-101 = "3;히비키;99;사용할 일이 없다고 해도, 단지 가정일 뿐이라 해도 말이야."
2000015-102 = "[s11] \"응. 앞으로도 쭉 함께였으면 좋겠네.\"\n[s12] \"폭발하지 않고 말이지.\""

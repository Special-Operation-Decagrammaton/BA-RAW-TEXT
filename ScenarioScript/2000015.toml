[translation]
2000015-1 = "อีกรูปแบบของความผูกพัน"
2000015-2 = "(เสียงซ่อมบำรุงเครื่องจักรดังสนั่นภายในห้องชมรมวิศวกรรม)"
2000015-3 = "[ns] \"ฮิบิกิ~ ครูมาแล้ว~\""
2000015-7 = "อ๊ะ คุณครู รอแป๊บหนึ่งนะ"
2000015-12 = "เอ้า นี่จักรยานที่ขอให้ซ่อมให้"
2000015-13 = "[s1] \"เหมือนใหม่เลย...\"\n[s2] \"ขอบคุณนะ ฮิบิกิ!\""
2000015-16 = "ที่จริงฉันคิดว่าจะใช้โอกาสนี้ปรับปรุงอะไรต่างๆ สักหน่อย..."
2000015-17 = "แต่พอจำได้ว่าคุณครูขอร้องให้ฉันซ่อมอย่างเดียวก็เลยล้มเลิกความคิดไปน่ะ"
2000015-18 = "ยังไงก็ตาม ถ้าคำนึงถึงความปลอดภัยแล้ว ฉันคิดว่าติดตั้งเครื่องยิงระเบิดความเร็วสูง หรือเครื่องพ่นไฟเอาไว้สักหน่อยก็น่าจะดีนะ..."
2000015-19 = "[s] \"ครูว่าแบบนั้นดูจะไม่ปลอดภัยมากกว่าอีก\""
2000015-20 = "ไม่งั้นอย่างน้อยเปลี่ยนยางเป็นไททาเทียมสุญญากาศก็ได้..."
2000015-21 = "เพราะถ้าปั่นไปเจอพวกกับดักหนามที่ติดตั้งอยู่บนถนน ยางอาจได้รับความเสียหายร้ายแรงน่ะ..."
2000015-22 = "[s3] \"ไม่ละ ไม่เป็นไร...\"\n[s4] \"ครูอยากได้แค่จักรยานธรรมดาๆ น่ะ...\""
2000015-25 = "ถ้าคุณครูอยากได้แบบนั้นจริงๆ ก็ช่วยไม่ได้... ฉันจะยอมตามนั้นแล้วกัน"
2000015-26 = "[s] \"ขอบคุณที่เป็นห่วงนะ ฮิบิกิ\""
2000015-27 = "ทำไมคุณครูถึงพยายามเลี่ยงการปรับปรุงล่ะ? มีเรื่องโรแมนติกอะไรกับการปรับปรุงเหรอ?"
2000015-28 = "บางครั้งของแท้ดั้งเดิมก็เป็นสิ่งที่ดีงั้นเหรอ? ฮืม..."
2000015-29 = "แน่นอนว่าฉันเองก็เคารพในความสวยงามแบบดั้งเดิมนะ เพราะรูปลักษณ์ตามธรรมชาติมัน ก็มีความหมายในตัวของมัน"
2000015-30 = "แต่การปรับปรุงเพิ่มฟังก์ชันที่จำเป็น ก็ถือว่าเป็นการดึงเอาประสิทธิภาพของสิ่งนั้นๆ มาใช้ได้สูงสุด"
2000015-31 = "ถ้าใช้อุปกรณ์หลายอย่างมันค่อนข้างยุ่งยาก เพราะงั้นเลยรวมฟังก์ชันทุกอย่างมาไว้ในของชิ้นเดียวให้#nใช้ง่ายขึ้น"
2000015-32 = "เพราะแบบนั้นเลยทำให้ฉันสงสัยว่าทำไมคุณครูถึงอยากเลี่ยงการปรับปรุงขนาดนั้น"
2000015-33 = "[s5] \"พอฟังแล้วครูว่าที่ฮิบิกิพูดมามันก็ถูกนะ...\"\n[s6] \"พอฟังแล้วก็น่าสนใจดีแฮะ...\""
2000015-36 = "ฮุฮุ... ใช่มั้ยล่ะคุณครู?"
2000015-37 = "อย่างเช่น... มีอะไรบ้างนะ..."
2000015-41 = "อ๊ะ ลองดูนี่สิคุณครู"
2000015-46 = "[ns] \"นี่มัน... แว่นตากันลมของฮิบิกินี่นา?\""
2000015-47 = "มันผ่านการปรับปรุงมาเยอะเลยละ"
2000015-48 = "พอนึกย้อนกลับไป... มันเป็นอุปกรณ์อเนกประสงค์สุดๆ และเป็นของหรูหราที่ประเมินราคาไม่ได้เลย"
2000015-49 = "ตอนนี้ถ้าไม่มีมันอยู่ ฉันก็แทบจะทำงานไม่ได้เลยละ"
2000015-50 = "[s] \"ผลงานที่ทำขึ้นเองของไมสเตอร์งั้นเหรอ\""
2000015-54 = "อื้อ อย่างแรกฟังก์ชันพื้นฐานคือช่วยปกป้องดวงตา"
2000015-55 = "นอกจากป้องกันประกายไฟตอนทำงานปะเชื่อม ยังป้องกันทรายเข้าตาจากพายุทราย หรือแรงดันลมที่เกิดขึ้นระหว่างลอยตัวอยู่ได้ด้วย"
2000015-56 = "แถมยังมีฟังก์ชันกันกระสุน ฟังก์ชันปรับแสงสีฟ้า ฟังก์ชันป้องกันแสงยูวี..."
2000015-57 = "แน่นอนมีฟังก์ชันซูมเข้าซูมออกด้วย ฟังก์ชันนี้มีประโยชน์สุดๆ เลยละตอนที่ตัดเย็บชุดน่ะ"
2000015-58 = "[s] \"ตัดเย็บชุด... หมายถึงชุดคอสเพลย์เหรอ?\""
2000015-59 = "อื้อ การคอสเพลย์มันเริ่มต้นจากการเตรียมชุดแล้วก็เตรียมอุปกรณ์ประกอบฉากน่ะ"
2000015-60 = "เริ่มจากการตัดเย็บ จนถึงเก็บตะเข็บให้เรียบร้อย พวกนั้นมันเป็นงานที่ต้องเลือกวิธีการให้เหมาะสมใน#nแต่ละครั้งน่ะ"
2000015-61 = "ถึงจะใช้จักรเย็บผ้าอันใหม่ แต่การเย็บด้ายลงไปในจุดที่แคบมากๆ ซ้ำๆ ก็เป็นการต่อสู้ทางประสาท#nสัมผัสอย่างหนึ่ง และการมองเห็นชัดๆ ก็เป็นเรื่องสำคัญมาก"
2000015-62 = "เพราะงั้นฉันเลยเพิ่มฟังก์ชันเลนส์มัลติโฟกัส 15 สปีดเข้าไปด้วย ถ้าขยายภาพให้ใหญ่ขึ้น ก็จะมอง#nเห็นระดับโมเลกุลได้เลยไงล่ะ"
2000015-63 = "[s7] \"แบบนั้นมันไม่เกินไปเหรอ??\"\n[s8] \"การสังเกตโมเลกุลตอนเย็บผ้ามีอะไรน่าสนใจน่ะ?!?!\""
2000015-66 = "จนถึงตอนนี้ฉันยังไม่เคยใช้ฟังก์ชันนั้นหรอก แต่สิ่งสำคัญคือมีฟังก์ชันแบบนั้นอยู่ด้วยน่ะ"
2000015-67 = "คุณครูคิดว่าควรมีฟังก์ชันอะไรอีกมั้ย?"
2000015-68 = "[s] \"ฟังก์ชันที่ช่วยในการต่อสู้มั้ยนะ\""
2000015-69 = "ฮุฮุ ใช่แล้ว ฉันเพิ่มฟังก์ชันรังวัดพื้นที่โดยเชื่อมต่อกับระบบ GPS ไว้ด้วย"
2000015-70 = "แค่มีเจ้านี่ เวลาที่ยิงปืนครก ก็ไม่จำเป็นต้องมีโอเปอเรเตอร์หรือพลสังเกตการณ์อยู่ก็ได้"
2000015-71 = "ฟังก์ชันค้นหาด้วยแสงอินฟราเรด? มีอยู่แล้วสิ เพราะจะได้ออกปฏิบัติภารกิจตอนกลางคืนได้ตลอด"
2000015-72 = "จะมองว่าฉันเพิ่มฟังก์ชันที่ควรมีสำหรับไมสเตอร์และนักเรียนคนหนึ่งลงไปทั้งหมดก็ได้"
2000015-73 = "[s] \"ถ้างั้นหรือว่าแว่นตากันลมนั่น...\""
2000015-75 = "[ns] \"มีฟังก์ชันระเบิดตัวเองที่ฮิบิกิชอบอยู่ด้วย?\""
2000015-77 = "เอ๋... หะ... หืม? ฟังก์ชัน... ระเบิด...?"
2000015-78 = "[s] \"เป็นฟังก์ชันที่ฮิบิกิชอบใส่ไว้ในสิ่งประดิษฐ์ตลอดเลยนี่นา?\""
2000015-79 = "อืม... แว่นตากันลมอันนี้น่ะ..."
2000015-80 = "ไม่มีฟังก์ชันระเบิดตัวเองหรอก"
2000015-81 = "ถึงฟังก์ชันระเบิดตัวเองจะเป็นหนึ่งในฟังก์ชันสำคัญในสิ่งประดิษฐ์ของไมสเตอร์ก็ตาม..."
2000015-82 = "แต่ไม่รู้ทำไมฉันถึงไม่คิดที่จะเพิ่มมันเข้าไปในแว่นตากันลมอันนี้กันนะ..."
2000015-83 = "..."
2000015-84 = "ฉันเองก็ไม่รู้ว่าเพราะอะไรเหมือนกัน บางทีฉันอาจยังขาดความแน่วแน่ในการเป็นไมสเตอร์ก็ได้"
2000015-88 = "[ns] \"ครูว่าครูพอจะรู้นะ\""
2000015-89 = "หืม?"
2000015-90 = "[s9] \"เพราะแว่นตากันลมอันนั้นเป็นของสำคัญของฮิบิกิไง\"\n[s10] \"เพราะไม่อยากให้ของที่ตัวเองรักต้องระเบิดไปไงล่ะ\""
2000015-93 = "..."
2000015-94 = "คุณครูพูดถูกแล้วละ..."
2000015-95 = "แว่นตากันลมอันนี้... เป็นของที่ฉันใช้มาตั้งนานแล้วละ"
2000015-96 = "ตอนแรกฉันถูกใจหน้าตาของมัน... เลยพยายามปรับปรุงทุกครั้งที่มีฟังก์ชันที่จำเป็น"
2000015-97 = "เป็นแบบนั้นมานานแล้วละ..."
2000015-98 = "ใช่ แว่นตากันลมอันนี้น่ะ... เป็นของสำคัญมากๆ สำหรับฉัน"
2000015-99 = "อาจเพราะรู้สึกแบบนั้น... ฉันก็เลยไม่เพิ่มฟังก์ชันทำลายตัวเองเข้าไปก็ได้"
2000015-100 = "อย่างที่คุณครูบอกนั่นละ ดูเหมือนฉันคงไม่อยากนึกภาพของที่ฉันชอบมันระเบิดขึ้นมา"
2000015-101 = "ถึงจะไม่มีเรื่องให้ใช้ฟังก์ชันนั้น หรือจะเป็นแค่เรื่องสมมติก็ตามน่ะ"
2000015-102 = "[s11] \"อื้อ หวังว่าแว่นนี่จะอยู่กับฮิบิกิไปนานๆ เลยนะ\"\n[s12] \"หวังว่ามันจะไม่โดนระเบิดนะ\""
2000015-105 = "อื้อ... ถ้าเป็นแบบนั้นก็คงดีนะ"
2000015-110 = "[ns] \"ฮิบิกิ?\""
2000015-111 = "อะ... อื้ม... ไม่มีอะไรหรอก"
2000015-112 = "ฉันก็แค่..."
2000015-113 = "คิดว่าคุณครูเอง... ก็คงไม่ต้องมีฟังก์ชันระเบิดตัวเองหรอก"
2000015-114 = "[s] \"ก็แหงน่ะสิ!!!!!\""
2000015-116 = "หลังจากนี้ก็ช่วยดูแลฉันต่อไป... แบบนี้ด้วยนะ"

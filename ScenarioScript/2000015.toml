[translation]
2000015-1 = "眷戀的型態"
2000015-2 = "（工程師部裡充斥嘈雜的修理聲）"
2000015-3 = "[ns]「響～我來囉～」"
2000015-7 = "啊，老師。請稍等一下。"
2000015-12 = "來，這是你要求修理的自行車。"
2000015-13 = "[s1]「變得超乾淨的耶……」\n[s2]「謝謝你，響！」"
2000015-16 = "本來是想趁這個機會進行各種改造的……"
2000015-17 = "不過當時老師千叮嚀萬囑咐說只要修理就好，所以最終就作罷了。"
2000015-18 = "但是考量到安全，我還是覺得應該加裝高速榴彈發射器或火焰噴射器比較好……"
2000015-19 = "[s]「那好像更不安全吧……？」"
2000015-20 = "或者把輪胎換成鈦金屬免充氣型也不錯……"
2000015-21 = "不然如果路上有釘條的話，可能會對輪胎造成嚴重損傷……"
2000015-22 = "[s3]「不用，沒關係……」\n[s4]「我想要的是真正普通的自行車……」"
2000015-25 = "既然老師這麼堅持……這次我會忍耐的。"
2000015-26 = "[s]「謝謝你這麼費心，響。」"
2000015-27 = "老師為什麼不喜歡改造呢？改造才是浪漫吧？"
2000015-28 = "偶爾也喜歡純粹一點？#n唔嗯……"
2000015-29 = "我當然也尊重純粹之美。#n畢竟事物本來的面貌自有其意義。"
2000015-30 = "但是透過改造加入需要的功能，也可以視為將效率提升到最大。"
2000015-31 = "因為使用各種道具很麻煩，所以才要把功能集中在一個物品上。"
2000015-32 = "從這個角度來看，我覺得實在沒必要屏棄改造才對。"
2000015-33 = "[s5]「聽起來確實有道理……」\n[s6]「再聽一下可能會有點興趣……？」"
2000015-36 = "呵呵……對吧，老師？"
2000015-37 = "就比如……拿什麼舉例好呢……"
2000015-41 = "啊，你看這個，老師。"
2000015-46 = "[ns]「這是……響的護目鏡？」"
2000015-47 = "這個護目鏡真的經過了各種改造哦。"
2000015-48 = "現在回頭一看，可以說是有超多用途，或者說是無價的精品。"
2000015-49 = "如果沒有這個護目鏡的話，我會很難進行作業。"
2000015-50 = "[s]「是巨匠的自信之作嗎？」"
2000015-54 = "嗯。首先，當然少不了保護眼睛的基本功能。"
2000015-55 = "除了焊接的火花之外，就連沙漠的風沙和自由落體時產生的風壓都能輕鬆阻擋。"
2000015-56 = "此外還有防彈功能、藍光調節功能、UV阻斷功能……"
2000015-57 = "當然也有放大和縮小功能。#n在進行裁縫作業時非常實用。"
2000015-58 = "[s]「裁縫……難道是為了Cosplay？」"
2000015-59 = "嗯，因為Cosplay是從製作服裝和道具開始的。"
2000015-60 = "從剪裁到折邊，每個步驟都必須視情況選擇最適合的方式。"
2000015-61 = "就算使用新型縫紉機，在狹窄部分反覆穿線的作業還是很依靠感覺……#n因此看清楚是很重要的。"
2000015-62 = "所以我加入了15段多重變焦鏡頭功能。#n如果放大到極限的話，就連分子都能看見。"
2000015-63 = "[s7]「這會不會太誇張了？？」\n[s8]「裁縫的時候有需要看到分子嗎！？！？」"
2000015-66 = "雖然目前還沒有使用過，但是否具備這項功能是很重要的。"
2000015-67 = "老師，你覺得還有什麼功能？"
2000015-68 = "[s]「像是對戰鬥有幫助的那種？」"
2000015-69 = "呵呵，正確答案。#n我還加入了GPS結合型光學測量功能。"
2000015-70 = "拜其所賜，就算沒有觀測兵或操作員也能發射迫擊砲。"
2000015-71 = "紅外線探索功能？#n當然有，所以連夜間作戰也不成問題。"
2000015-72 = "身為巨匠和學生，我認為需要的功能都該加上去。"
2000015-73 = "[s]「難道那個護目鏡……」"
2000015-75 = "[ns]「也有響喜歡的自爆功能嗎？」"
2000015-77 = "唔……嗯？#n自爆……功能……？"
2000015-78 = "[s]「以前你幾乎所有的發明不是都會加入自爆功能的嗎？」"
2000015-79 = "唔嗯……這個護目鏡……"
2000015-80 = "沒有搭載自爆功能。"
2000015-81 = "雖然自爆功能的確是巨匠的發明不可或缺的一部分……"
2000015-82 = "但不知道為什麼，我沒有想過要把它加入這個護目鏡……"
2000015-83 = "……"
2000015-84 = "究竟是為什麼呢……也許是我身為巨匠的決心還不夠吧。"
2000015-88 = "[ns]「我或許知道原因。」"
2000015-89 = "嗯？"
2000015-90 = "[s9]「因為那個護目鏡對響很重要。」\n[s10]「因為是喜歡的東西，所以才不希望它爆炸吧。」"
2000015-93 = "……"
2000015-94 = "……老師說的好像有道理。"
2000015-95 = "這個護目鏡……我從很久以前就一直在用了。"
2000015-96 = "起初是喜歡它的外型……每當有需要的功能就會認真改造。"
2000015-97 = "就這樣過了很長一段時間……"
2000015-98 = "沒錯，這個護目鏡……對我來說確實是很重要的東西。"
2000015-99 = "之所以沒加入自爆功能……也許正是出於這種心情吧。"
2000015-100 = "就如老師所說，我不希望看見自己喜歡的物品爆炸。"
2000015-101 = "就算沒機會使用，或者只是假設或想像也一樣。"
2000015-102 = "[s11]「嗯，希望以後也能一直在一起。」\n[s12]「而且不會爆炸。」"
2000015-105 = "……嗯，但願如此。"
2000015-110 = "[ns]「響？」"
2000015-111 = "唔嗯……沒什麼。"
2000015-112 = "只是……"
2000015-113 = "覺得老師應該也不需要自爆功能而已。"
2000015-114 = "[s]「那當然！！！！！」"
2000015-116 = "以後也……請你多多關照囉。"

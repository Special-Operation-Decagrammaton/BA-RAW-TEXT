2000015-109 = "3;히비키;00\n#3;closeup\n#3;a\n#wait;2500"
2000015-110 = "[ns] \"히비키?\""
2000015-111 = "3;히비키;07;으응…… 아무것도 아니야.\n#3;closeup"
2000015-112 = "3;히비키;99;그저……\n#3;closeup\n#3;em;[///]"
2000015-113 = "3;히비키;03;선생님에게도, 자폭 기능 같은 건 필요 없겠다고 생각했을 뿐이야.\n#3;closeup"

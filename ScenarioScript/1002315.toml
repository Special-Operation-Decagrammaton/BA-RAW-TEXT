[translation]
1002315-1 = "ชายหาดอาทิตย์อัสดง"
1002315-2 = "ชายหาดในช่วงเย็น"
1002315-4 = "ยอมแพ้ซะเถอะ!"
1002315-5 = "ถ้ายอมแพ้แต่โดยดี จะได้ไม่ต้องเสียแรงกันเปล่าๆ!"
1002315-9 = "อะ... อึก! อย่ามาตลกไปหน่อยเลยน่า!"
1002315-10 = "ได้ยินว่าเมนูดังของร้านริมทะเลคือน้ำแข็งไส พวกเราก็เลยลองสั่งดู... แต่กลับได้น้ำแข็งไสใส่วาซาบิ#nมาแทน!!"
1002315-11 = "พวกเรายอมให้มาตั้งหลายครั้ง เพราะงั้นครั้งนี้ก็อาจข้ามไปได้! แต่ว่าถึงขั้นใส่แยมสตรอว์เบอร์รีมา#nแทนซอสยากิโซบะเนี่ย มันไม่เกินไปหน่อยรึไง?!"
1002315-12 = "แบบนี้มันใช้ได้ที่ไหนกันล่ะ! เรื่องแบบนี้มันยกโทษให้ไม่ได้!"
1002315-14 = "ถะ... ถ้าไม่ลองดู ก็คงค้นพบสูตรใหม่ๆ ไม่ได้..."
1002315-15 = "[s] \"รู้สึกจะลองสูตรมากไปหน่อยนะ...\""
1002315-16 = "เห็นใจพวกนั้นงั้นเหรอ? ยังไงก็เถอะ หน้าที่ของคณะกรรมการวินัยมีเพียงอย่างเดียว!"
1002315-17 = "รีบๆ สั่งการมาสิ คุณครู! รีบๆ ทำให้จบกันเถอะ!"
1002315-18 = "[s] \"ช่วยไม่ได้นะ!\""
1002315-21 = "อึก! คิดว่าพวกเราจะยอมแพ้รึไง!"
1002315-28 = "อึก! นี่มัน... เจ็บชะมัดเลย!"
1002315-33 = "จะ... จะปล่อยให้โดนเล่นงานอยู่ฝ่ายเดียวได้ยังไง!"
1002315-38 = "[ns] \"ระเบิดมือ...!\""
1002315-39 = "ฮึ่ม! ไม่มีทางซะละ!!"
1002315-46 = "[ns1] \"โยนลงทะเลไปแล้ว...!\"\n[ns2] \"เยี่ยมมาก อิโอริ!\""
1002315-53 = "[ns] \"อ่า...\""
1002315-56 = "(คุณครูตัวเปียกโชกจากน้ำทะเลที่สาดกระเซ็นมา...)"
1002315-59 = "ฮู่ว จัดการได้อย่างฉิวเฉียดเลยนะ..."
1002315-60 = "คุณครู สั่งการได้ดี..."
1002315-61 = "เดี๋ยวสิ ทำไมถึงตัวเปียกขนาดนั้นล่ะ?! แอบไปว่ายน้ำเล่นมาเหรอ?"
1002315-62 = "[s3] \"เพราะคลื่นจากการระเบิดเมื่อกี้ต่างหาก...\"\n[s4] \"โดนคลื่นจากระเบิดเมื่อกี้น่ะ...\""
1002315-65 = "อ๊ะ..."
1002315-66 = "นะ... นั่นสินะ เพราะฉันโยนระเบิดลงไปที่ทะเลเมื่อกี้..."
1002315-67 = "เป็นอะไรรึเปล่า? ไม่บาดเจ็บตรงไหนใช่มั้ย?"
1002315-68 = "[s] \"อื้อ... นอกจากตัวชุ่มน้ำแล้วก็ไม่เป็นไร\""
1002315-69 = "ค่อยยังชั่วหน่อย..."
1002315-70 = "จะว่าไปแล้ว ถึงจะเป็นฤดูร้อน แต่ตอนเย็นก็อากาศเย็นอยู่ดี"
1002315-71 = "ถ้าตัวเปียกขนาดนั้นเดี๋ยวจะเป็นหวัดเอาได้นะ..."
1002315-72 = "คุณครู พอจะมีเสื้อมาเปลี่ยนรึเปล่า?"
1002315-73 = "[s] \"อยู่ที่โรงแรมน่ะ...\""
1002315-78 = "งั้นเหรอ ถ้างั้นก็ใช้อันนี้ไปก่อนนะ..."
1002315-83 = "[ns] \"นี่มัน...\""
1002315-85 = "[ns] \"ผ้าห่มที่อิโอริใช้?\""
1002315-86 = "มะ... มันช่วยไม่ได้นี่นา ก็ตอนนี้ไม่มีเสื้อเปลี่ยนนี่"
1002315-87 = "จะปล่อยให้คุณครูเป็นหวัดได้ยังไงกัน..."
1002315-88 = "เอาเป็นว่าใช้ผ้าห่มนี่ห่มไปจนถึงโรงแรมก็แล้วกัน"
1002315-89 = "[s] \"อุ่นจัง...\""
1002315-90 = "นั่นน่ะ... เป็นของหวงของฉันเลยนะ ช่วยใช้มันดีๆ ด้วยล่ะ!"
1002315-91 = "[s] \"นี่ก็เป็นอุปกรณ์ของคณะกรรมการวินัยเหรอ?\""
1002315-92 = "ไม่ใช่อุปกรณ์หรอก เป็นของที่ระลึกที่ฉันได้รับมาตอนเข้าค่ายฝึกครั้งแรกที่เข้าคณะกรรมการวินัยน่ะ"
1002315-93 = "ฉันชอบเพราะผ้ามันนุ่มแล้วก็อุ่นมากๆ"
1002315-94 = "เวลาที่มีเรื่องหัวร้อน พอเอามันมาคลุมหัวไว้ก็พอช่วยให้หายหัวร้อนได้น่ะ..."
1002315-95 = "[s] \"สรุปก็คือเป็นผ้าห่มที่อิโอริรักมากสินะ\""
1002315-96 = "มะ... มันก็..."
1002315-97 = "[s] \"ขอบคุณที่ให้ครูยืมของสำคัญนะ\""
1002315-98 = "......"
1002315-99 = "เอาเถอะ มันก็ใช้มาจนเก่าแล้วน่ะ..."
1002315-100 = "[s] \"ปกติชอบใช้คลุมที่ไหนเหรอ?\""
1002315-101 = "ปกติก็มักจะเอามาคลุมตัก... หรือไม่ก็เอามาปูนอน..."
1002315-102 = "แล้วก็ใช้ห่มเวลาพักงีบในห้องชมรม..."
1002315-105 = "[ns] \"มิน่าล่ะ ถึงรู้สึกเหมือนได้กลิ่นของอิโอริจากผ้าห่ม...\""
1002315-106 = "วะ... ว่าไงนะ? มันไม่มีกลิ่นสักหน่อย?! ฉันเอาไปซักบ่อยมากเลยนะ??"
1002315-107 = "จู่ๆ อย่าพูดอะไรแปลกๆ อย่างนั้นสิ!!"
1002315-108 = "[ns5] (ดมกลิ่นผ้าห่ม)\n[ns6] (จุ่มหน้าลงไปบนผ้าห่มแล้วสูดหายใจเต็มปอด)"
1002315-111 = "ทะ... ทำบ้าอะไรน่ะ!!!"
1002315-112 = "[s] \"กลิ่นของอิโอริ!!!!\""
1002315-113 = "เอาคืนมาเดี๋ยวนี้เลย!!!!"
1002315-115 = "(สุดท้ายคุณครูก็เป็นหวัดเพราะโดนแย่งผ้าห่มคืนไประหว่างทาง...)"

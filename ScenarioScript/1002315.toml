[translation]
1002315-1 = "Sunset Beach"
1002315-2 = "On the beach, at sunset"
1002315-4 = "Give it up now!"
1002315-5 = "Surrender now, and you won't suffer...too much!"
1002315-9 = "U-Ugh! Don't mess with me!"
1002315-10 = "I only ate at that restaurant because I heard they do some fancy fusion dishes. But what the heck is shaved ice with WASABI?!"
1002315-11 = "And, sure, fine! Let's say in some ridiculous universe I could let that slide! But I WON'T stand for yakisoba sauce being substituted by strawberry jam! I just ain't doing that!"
1002315-12 = "That's beyond ridiculous! I ain't letting that curse of a restaurant get off that easy!"
1002315-14 = "Th-There's no progress without experimentation..."
1002315-15 = "[s] \"Maybe a bit TOO experimental...\""
1002315-16 = "Hey! Don't empathize with the criminals! The Prefect Team has one job, and one job only!"
1002315-17 = "Take the lead, Sensei! Let's get it done!"
1002315-18 = "[s] \"I guess I have no choice!\""
1002315-21 = "Ugh! I ain't going down that easy!"
1002315-28 = "O-Ow! That...hurts!"
1002315-33 = "Y-You think we're gonna take that lying down?!"
1002315-38 = "[ns] \"Grenade...!\""
1002315-39 = "Hmph! Not a chance!"
1002315-46 = "[ns1] \"Towards the ocean!\"\n[ns2] \"Nice job, Iori!\""
1002315-53 = "[ns] \"...Ah.\""
1002315-56 = "I got completely soaked by the wave of seawater."
1002315-59 = "Phew. And that's a job well done."
1002315-60 = "Nice job, Sensei—"
1002315-61 = "Wh-Why're you so wet? Did you go for a swim in the middle of the fight?!"
1002315-62 = "[s3] \"That grenade you hit exploded in the water...\"\n[s4] \"I got hit by a tidal wave...\""
1002315-65 = "Ah..."
1002315-66 = "R-Right... I redirected it towards the ocean..."
1002315-67 = "Are you hurt? You okay?"
1002315-68 = "[s] \"Well, besides the fact that I'm soaking wet.\""
1002315-69 = "That's good..."
1002315-70 = "But what should we do? Even in the summer, evenings on the beach tend to be cold."
1002315-71 = "You're going to get sick, if we don't get you dried off."
1002315-72 = "You don't have a change of clothes, do you, Sensei?"
1002315-73 = "[s] \"Back at the hotel...\""
1002315-78 = "All right. For now, just use this."
1002315-83 = "[ns] \"This is...?\""
1002315-85 = "[ns] \"...your blanket?"
1002315-86 = "I-It's the only option! You don't have anything to change into!"
1002315-87 = "And I can't just let you get sick."
1002315-88 = "So use that to stay warm until we get back to the hotel!"
1002315-89 = "[s] \"It's warm...\""
1002315-90 = "Yeah. It's my favorite blanket, so you better be careful!"
1002315-91 = "[s] \"Is this standard-issue Prefect Team equipment?\""
1002315-92 = "Not exactly. We got it as a...souvenir, after my first Prefect Team boot camp."
1002315-93 = "It was so fluffy and warm, I got attached to it immediately."
1002315-94 = "If I'm stressed out or frustrated, I just put it on and feel the material... It helps me relax."
1002315-95 = "[s] \"It's like your comfort blanket.\""
1002315-96 = "I-I wouldn't say that exactly..."
1002315-97 = "[s] \"Thank you. For letting me use something so precious.\""
1002315-98 = "..."
1002315-99 = "It might be a little worn out, though..."
1002315-100 = "[s] \"What do you usually use it for?\""
1002315-101 = "Normally just, like, a lap blanket...sometimes I sit or lie on it..."
1002315-102 = "Oh, I use it for naps in the club room sometimes, too."
1002315-105 = "[ns] \"Now that you say it, I think I can smell your scent.\""
1002315-106 = "Wh-What? I wash it all the time! There's no way it smells!"
1002315-107 = "What nonsense are you spouting?! Out of nowhere?!"
1002315-108 = "[ns5] Sniff the blanket.\n[ns6] Shove your nose in the blanket and breathe in."
1002315-111 = "Wh-What are you doing?!"
1002315-112 = "[s] \"Iori's smell!!\""
1002315-113 = "GIVE IT TO ME!!!"
1002315-115 = "Iori took her blanket away from me, and I ended up catching a cold..."

[translation]
1002315-1 = "黃昏時分的海邊"
1002315-2 = "傍晚時分的海邊"
1002315-4 = "是時候該放棄了吧！"
1002315-5 = "乖乖投降才不會太難看！"
1002315-9 = "唔唔！別說笑了！"
1002315-10 = "我聽說這間海之家專門做融合料理，結果他們竟然端出加了芥末的刨冰耶！！"
1002315-11 = "就算退一百步接受它好了！但是在炒麵上加草莓醬真的太過分了吧！？"
1002315-12 = "真是豈有此理！那種店家絕不能原諒！"
1002315-14 = "沒，沒有實驗性的嘗試就不會有進步……"
1002315-15 = "[s]「我也覺得這樣的實驗有點過頭了……」"
1002315-16 = "老師是在認同個什麼勁啊？#n總之，身為風紀委員要做的只有一件事！"
1002315-17 = "指揮就麻煩你了，老師！盡快做個了結吧！"
1002315-18 = "[s]「沒辦法了！」"
1002315-21 = "唔唔！以為我會就這樣倒下嗎！"
1002315-28 = "嗚啊！好痛啊！"
1002315-33 = "我，我可不會一直屈於劣勢……！"
1002315-38 = "[ns]「手榴彈……！」"
1002315-39 = "哼！你想得美！！"
1002315-46 = "[ns1]「打到海邊去了……！」\n[ns2]「做得漂亮，伊織！」"
1002315-53 = "[ns]「啊……」"
1002315-56 = "（被傾瀉而下的海水弄得全身都溼答答的……）"
1002315-59 = "呼，總算是大致收拾完畢了……"
1002315-60 = "老師，指揮得真漂……"
1002315-61 = "咦，為什麼整個人都濕答答的！？你剛才跑去游泳了嗎？"
1002315-62 = "[s3]「因為剛才手榴彈在水中爆炸……」\n[s4]「結果就被海水淋成落湯雞了……」"
1002315-65 = "啊……"
1002315-66 = "這，這樣啊。#n因為我把手榴彈打到海那邊的關係……"
1002315-67 = "沒事吧？有沒有哪裡受傷？"
1002315-68 = "[s]「唔嗯……除了全身濕透之外沒什麼問題。」"
1002315-69 = "那就好……"
1002315-70 = "話說該怎麼辦？#n就算現在是夏天，晚上還是挺冷的。"
1002315-71 = "再這樣下去很可能會感冒……"
1002315-72 = "老師，你有能替換的衣服嗎？"
1002315-73 = "[s]「我放在飯店……」"
1002315-78 = "好吧，那這個先借給你……"
1002315-83 = "[ns]「這是……」"
1002315-85 = "[ns]「伊織用過的毯子？」"
1002315-86 = "我，我也沒辦法，誰叫現在沒有能替換的衣服。"
1002315-87 = "要是害老師感冒也不太好……"
1002315-88 = "回到飯店前就先披著吧。"
1002315-89 = "[s]「好溫暖……」"
1002315-90 = "那可是我的寶貝毯子，用的時候記得小心一點！"
1002315-91 = "[s]「這也是風紀委員會的備品嗎？」"
1002315-92 = "與其說是備品，其實那是我加入風紀委員會之後，在第一次合宿時得到的紀念品。"
1002315-93 = "因為柔軟又溫暖，所以我很喜歡。"
1002315-94 = "生氣的時候，只要蓋上那個毯子摸一摸也會感覺舒服一點……"
1002315-95 = "[s]「也就是說，這是伊織心愛的毯子呢。」"
1002315-96 = "也，也沒那麼誇張啦……"
1002315-97 = "[s]「謝謝你把這麼重要的毯子借給我。」"
1002315-98 = "……"
1002315-99 = "雖然因為很常用的關係，所以有點舊就是了……"
1002315-100 = "[s]「你平常都怎麼使用？」"
1002315-101 = "平常不是蓋在腿上……就是攤開來坐或躺在上面……"
1002315-102 = "在部室小睡的時候也會拿來當棉被……"
1002315-105 = "[ns]「這麼說來，好像有聞到伊織的味道……」"
1002315-106 = "啊！？哪有什麼味道！？我很常洗好不好？？"
1002315-107 = "不要突然說奇怪的話！！"
1002315-108 = "[ns5] 聞毯子的味道\n[ns6] 把鼻子埋進去深吸一口"
1002315-111 = "你，你幹嘛啦！！！"
1002315-112 = "[s]「有伊織的味道！！！！」"
1002315-113 = "馬上還給我！！！！！"
1002315-115 = "（結果因為毯子被搶走，後來得了輕微的感冒……）"

10010020-172 = "เอาเถอะ... คุณครูก็บอกเองว่าเห็นเหตุการณ์มากับตา ฉันก็คงต้องเชื่อแบบนั้นค่ะ"
10010020-173 = "แต่ว่า... งานอ่านพระคัมภีร์จะจัดขึ้นในวันพรุ่งนี้เช้า..."
10010020-174 = "ฉันไม่ถูกใจความคิดอ่านของคนนอกเลยค่ะ เด็กคนนี้เพิ่งถูกค้นพบแค่ 2 วันเองนะ? จะเอาไปอ่านแล้วเหรอ?"

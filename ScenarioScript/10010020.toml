10010020-135 = "สภาพเสียหายจนทนดูไม่ได้แบบนี้! ฉันจะใจเย็นอยู่ได้ยังไงคะ?! ต่อให้ตั้งใจทำให้พัง สภาพขนาดนี้ยังถือว่าเป็นเรื่องยากเลยนะคะ!"

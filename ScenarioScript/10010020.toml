10010020-154 = "ขะ... ขอโทษค่ะ ฉันเผลอตัวไปน่ะค่ะ อยู่ต่อหน้าคุณครูแท้ๆ เลย..."
10010020-155 = "เข้าใจแล้วค่ะ ก่อนอื่นคงต้อง... อืม ใช่แล้ว เราต้องชุบชีวิตเด็กคนนี้ค่ะ ไม่ว่าจะด้วยวิธีใดก็ตาม..."
10010020-156 = "แต่ก่อนที่จะทำแบบนั้น.... ถ้าคุณครูไม่ว่าอะไร... ฉันขอทราบข้อมูลอย่างละเอียดๆ หน่อยได้ไหมคะ?"

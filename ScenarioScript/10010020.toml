[translation]
10010020-1 = "第2話;前往魔術師的高塔"
10010020-5 = "不好意思，有人在嗎……？"
10010020-6 = "……"
10010020-7 = "……沒有人在嗎？#n按照志美子同學所說，他應該一直都在這裡才對……"
10010020-11 = "請問有沒有人在……？"
10010020-15 = "……咦？"
10010020-16 = "門開著呢……？"
10010020-21 = "打擾了……我們這樣進來真的沒問題嗎……？"
10010020-22 = "[s1]「我們有拿到入館證，應該沒關係的。」\n[s2]「志美子也說過沒問題。」"
10010020-23 = "是，是呢，那麼……"
10010020-24 = "是，是呢，那麼……"
10010020-25 = "這麼說來志美子同學剛才似乎有點生氣呢。#n還說「古書館不是委員長的所有物！」……"
10010020-26 = "也許志美子同學希望能讓更多人都能使用這個古書館……也說不定呢？"
10010020-27 = "那個，會不會是在那一邊呢……"
10010020-33 = "……噫噫！？"
10010020-34 = "[s]「……？」"
10010020-35 = "這，這個聲音是……？"
10010020-36 = "是，是，是是是誰！？小偷！？"
10010020-37 = "不，不對！我們不是小偷！！"
10010020-38 = "也絕對不是可疑人物！我們有通行證……！"
10010020-39 = "聽說圖書委員會的委員長會在這裡……！"
10010020-41 = "……？"
10010020-42 = "有，有什麼事嗎……？"
10010020-43 = "[s3] 「我們想請他修復某一本書。」\n[s4] 「我們想借用古書專家的力量。」"
10010020-44 = "原來，是這樣啊……現在說可能有點晚了，不過你們是……？"
10010020-45 = "原來，是這樣啊……現在說可能有點晚了，不過你們是……？"
10010020-46 = "這位應該是修女會的成員，但另一位……"
10010020-48 = "啊，對不起這麼晚才自我介紹。"
10010020-49 = "正如你所說，我是修女會所屬的日向。而這位是老師……"
10010020-52 = "……嗯？"
10010020-53 = "……「老師」？#n你說的老師，是夏萊的……？"
10010020-54 = "老師……老師……"
10010020-55 = "唔，唔嗯……原來如此，是老師啊……"
10010020-67 = "[ns5]「啊，出現了。」\n[ns6]「初次見面，你好呀。」"
10010020-68 = "你，你好……"
10010020-69 = "你，你好……"
10010020-74 = "那個，我是古関憂……#n是管理這座古書館的，圖書委員會的委員長……"
10010020-78 = "那麼，請問……老師來這裡有什麼事……"
10010020-79 = "[s7]「抱歉我們突然跑來。」\n[s8]「你就是『古書館的魔術師』對吧？」"
10010020-80 = "呃，這個嘛……"
10010020-81 = "嗚，嗚……又是誰在說那種……"
10010020-82 = "那個入館證，是大圖書館的……"
10010020-83 = "是志美子啊……又做些奇怪的事……"
10010020-84 = "真是的……有事的話就自己過來，或是請其他孩子送來不就好了……"
10010020-85 = "下次得好好念念他才行……雖然我想他應該也不會聽進去……"
10010020-86 = "……不好意思，剛才說的請當作沒聽見吧。#n那個，我也不是特別討厭與老師有所接觸……"
10010020-87 = "至於旁邊那位修女……"
10010020-93 = "就那樣吧……"
10010020-94 = "「那樣」！？#n難道我才初次見面就被討厭了嗎！？"
10010020-95 = "這個嘛……不是因為你是修女會的人才這麼說，應該說外人幾乎都一個樣……"
10010020-96 = "還有，請你們降低音量。#n這裡會有回音……"
10010020-97 = "對，對不起……"
10010020-98 = "……呼。總之先言歸正傳吧……"
10010020-99 = "剛才說要修復書本是嗎？#n……是什麼貴重的書嗎？"
10010020-103 = "……嗯？"
10010020-104 = "為，為什麼要一副欲言又止的樣子……"
10010020-105 = "……「本來是」經典？#n那是什麼意思……"
10010020-106 = "[s] 讓對方看被粉碎的經典"
10010020-112 = "……？"
10010020-113 = "……咦。"
10010020-117 = "啊……啊啊……！？"
10010020-119 = "老，老師……？#n憂，憂同學的狀況好像不太妙……！？"
10010020-120 = "全身都在顫抖，沒問題嗎……！？"
10010020-125 = "[ns9]「……我看不妙。」\n[ns10] 默默摀住耳朵"
10010020-126 = "老──"
10010020-127 = "老──"
10010020-128 = "吶啊啊啊啊啊啊啊啊啊啊啊啊啊啊！！？！？"
10010020-129 = "噫噫！？"
10010020-131 = "你，你你你你你你們到底做了什麼好事！？"
10010020-132 = "這，這是怎麼回事！？到底要怎麼做才會變成這樣！？#n為什麼這個孩子變成這種狀態了啊！？"
10010020-133 = "憂，憂同學，請先冷靜下來……"
10010020-134 = "冷，冷靜！？冷靜！？！？#n你要我看了這個還要「冷靜」！？"
10010020-135 = "請不要強人所難！看到這種幾乎粉碎的狀態要怎麼冷靜啊！？#n辦得到的話拜託你示範一下話說你還真冷靜啊！？"
10010020-136 = "而，而且這孩子只看一眼就知道很貴重的古書不是嗎！#n是古代的經典對吧！？"
10010020-137 = "可能是在太古的公會議上使用過的東西哦！？"
10010020-138 = "就算只簡單估算也是學園等級的寶物吧！！？"
10010020-139 = "那樣的孩子，怎麼會變成這副模樣……！！"
10010020-140 = "[s11]「居然只看一眼就知道這麼多……」\n[s12]「真不愧是專家。」"
10010020-141 = "對，對不起……！#n但是那個，我們也是非常想修復它……"
10010020-142 = "對，對不起……！#n但是那個，我們也是非常想修復它……"
10010020-143 = "知道「修復」這個詞的意思嗎！？難道你是會幫受重傷傷患貼OK蹦的那種人！？#n真的有明白詞語的意思！？"
10010020-144 = "怎，怎麼會發生這麼殘酷的事……！！！"
10010020-145 = "這孩子身上每一頁每一頁的紀錄，貴重的價值都……！"
10010020-146 = "[s13]「那個，先深呼吸……」\n[s14]「真的很抱歉。我們也是因此才會來拜託古書館的魔術師。」"
10010020-147 = "……！！"
10010020-148 = "……！！"
10010020-152 = "呼，呼……"
10010020-153 = "呼，嘶……"
10010020-154 = "失，失禮了，一時激動就……"
10010020-155 = "首先……嗯。得讓這孩子復活才行。無論如何都要……"
10010020-156 = "可以再，那個……重新告訴我事情的經過嗎？"
10010020-157 = "這，這孩子是什麼樣的孩子、是在哪裡出土、又是怎麼會變成這樣的……"
10010020-158 = "請一五一十地，詳，詳細告訴我……"
10010020-159 = "[ns] 說明來龍去脈"
10010020-161 = "……原來是這樣啊。"
10010020-169 = "不，不……"
10010020-170 = "我還是難以置信，或者該說驚訝到不想相信……"
10010020-171 = "真的很抱歉……"
10010020-172 = "……不，不過我已經知道這不是謊話了。#n畢竟老師也這麼說。"
10010020-173 = "比起這個……得趕在明天早上之前，是嗎……"
10010020-174 = "我還是不懂外面的人們都在想些什麼……#n居然會把才出土兩天的孩子弄成這樣……"
10010020-175 = "根本沒有人在乎這孩子的狀態、保存情況和出土後的應急處置……"
10010020-179 = "三一的經典，即便是古老的孩子也有做過一定程度的耐久處理。"
10010020-180 = "不過總是會有例外存在，而且沒辦法一眼就分辨出來。#n外表正常但內心卻罹患重病的孩子也是存在的。"
10010020-181 = "所以這種古書一旦出土就需要馬上進行各種檢查……的才對。"
10010020-182 = "……看來似乎並沒有這麼做呢。#n畢竟外表看起來還算正常。"
10010020-183 = "從這個狀態來看……事實上這個孩子應該沒有進行過耐久處理吧。"
10010020-184 = "只是因為特殊的素材和保存環境，才能在經歷本應腐朽的時光後仍保持原狀。#n然而卻突然接觸到了外部的環境……"
10010020-187 = "因此迅速遭到腐化……"
10010020-188 = "……硬要說的話，即便你沒有加以破壞……恐怕也會在幾週內自然毀損吧。"
10010020-190 = "怎，怎麼會……"
10010020-191 = "也許負責人抱持著「只要在發表之前沒事就好，之後怎樣都無所謂」……#n這樣的心態吧。"
10010020-192 = "又或許根本就沒有思考過這件事。#n維持著得過且過的消極主義與不干涉的態度。"
10010020-193 = "……先不說這些了。#n既然已經變成這種狀態，老實說這孩子幾乎已經沒希望了。"
10010020-194 = "一般來說，想要修復是不可能的吧。"
10010020-195 = "[s15]「這樣啊……」\n[s16]「……抱歉，突然拜託你這麼荒唐的事。」"
10010020-201 = "……我說的是，一般的情況。"
10010020-202 = "……？"
10010020-203 = "[s]「也就是說……」"
10010020-205 = "畢竟……我也無法就這樣坐視不管……"
10010020-206 = "這孩子身上蘊含的價值可不能輕易放棄……"
10010020-207 = "這麼說也對，畢竟是經典……"
10010020-208 = "……不只是這樣而已！#n請你好好想想看！"
10010020-214 = "明明是由修女會主辦的典禮，地點卻不在大教堂而是「郊外的古教堂」……"
10010020-215 = "不可能只是因為「是古代的遺物所以就在古代遺跡舉行」這種理由吧？#n而且還特地請來了三一高層的那些人哦？"
10010020-216 = "……雖然不是什麼稀奇的事，不過我感覺事情並不單純。"
10010020-219 = "而且負責移送經典的，居然是看不懂經典的修女……"
10010020-220 = "從頭到尾都和往常一樣讓人摸不著頭緒。儘管如此還是覺得有什麼隱情。"
10010020-222 = "詳細內容要看過才知道，不過想必是寫著某些重要的內容吧。#n並且……"
10010020-223 = "[s]「不是很想讓所有人都看見裡面的內容？」"
10010020-224 = "……也許吧。#n不過是何種程度的祕密就不得而知了。"
10010020-225 = "三一不為人知的歷史，或許能從中有所發現……也說不定呢。"
10010020-231 = "……「水苔膠」。"
10010020-232 = "……嗯？"
10010020-233 = "[s]「『水苔膠』……？」"
10010020-235 = "沒錯。「水苔膠」。#n此外，為了修復這本書，「精聖藥」也是必要的。"
10010020-236 = "「精聖藥」應該能在醫院拿到。"
10010020-237 = "至於「水苔膠」……現在這個時代已經找不到新的了。#n不過應該會被用在老建築的窗框之類的地方。"
10010020-238 = "其，其實這棟建築也有使用……不過我不想破壞這裡。"
10010020-239 = "總，總之只要把這些東西拿過來並溶解……之後我會想辦法修復的。"
10010020-240 = "憂同學……！！"
10010020-241 = "……請，請不要誤會。#n不管是修女會的狀況還是高層的人，我都不在乎。"
10010020-242 = "我，我只是……不希望眼睜睜看著這麼寶貴的孩子就這麼消失而已。#n而且，這也是老師的委託……"
10010020-248 = "請放心吧。雖然一般人是辦不到的……#n但我的技術，和一般人不一樣。"
10010020-249 = "[s17]「謝謝你，憂。」\n[s18]「我們馬上就去找。」"
10010020-250 = "好，好的……那就拜託了。"
10010020-251 = "好，好的……那就拜託了。"
10010020-253 = "……啊。還，還有一樣東西。"
10010020-255 = "……？"
10010020-256 = "限定蛋糕「Miracle5000」……在索魯特河邊有賣。#n請先去買來吧。"
10010020-257 = "……蛋，蛋糕是嗎？"
10010020-258 = "因，因為作業的時候，必須要補充糖分……"
10010020-259 = "原來如此……？"
10010020-260 = "那個，也就是說某種意義上，那也是復原書本必須的材料……是這個意思嗎？"
10010020-261 = "……（怒瞪）"
10010020-262 = "……請趕快去。"
10010020-264 = "是，是……！"
10010020-266 = "我馬上就去……！"

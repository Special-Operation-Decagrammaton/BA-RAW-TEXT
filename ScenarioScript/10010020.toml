10010020-134 = "Keep calm?! After seeing THIS?!"
10010020-135 = "Don't tell me to \"calm down\"! How am I supposed to \"calm down\" after laying eyes on this tragedy! I couldn't commit such an atrocity even if I tried!"
10010020-136 = "Not only that, but this is no ordinary old book. It's ancient text—scripture!#nA bona fide artifact!"
10010020-137 = "The kind of text that was used by the councils of antiquity!"
10010020-138 = "This should be regarded as one of this school's treasures!"
10010020-139 = "What have you done to this poor, innocent work...?"
10010020-140 = "[s11] \"I mean, the state it's in speaks for itself.\"\n[s12] \"Starting to see why your reputation precedes you.\""
10010020-141 = "P-Please hear us out, Ui! We want it to be restored more than anything,#nand—"
10010020-142 = "P-Please hear us out, Ui! We want it to be restored more than anything,#nand—"
10010020-143 = "Restored?! You can only perform surgery on someone who is still alive!#nYou're asking me to raise the dead!"
10010020-144 = "How could something so tragic happen...?"
10010020-145 = "The invaluable history and records lost with each page destroyed...#nThis can't be happening..."
10010020-146 = "[s13] \"Deep breaths, Ui. Deeeeeep breaths.\"\n[s14] \"Isn't there something the Magician of the Old Library can do?\""
10010020-147 = "...!"
10010020-148 = "...!"
10010020-152 = "*inhale*... *exhale*..."
10010020-153 = "*inhale*... *exhale*... Okay."
10010020-154 = "Forgive me. I'm sorry you had to see me like that, Sensei."
10010020-155 = "As for...the matter at hand. This book must be restored—no matter the cost."
10010020-156 = "I want you to tell me everything from the very beginning."
10010020-157 = "Where was this book discovered? What happened to it after it was placed in your custody?"
10010020-158 = "I need to know every little detail."
10010020-159 = "[ns] Tell Ui the whole story."
10010020-161 = "All right. So that's everything."
10010020-169 = "I wish I could say I have closure..."
10010020-170 = "...but parts of your story sound so comedically preposterous that they're hard to believe."
10010020-171 = "I swear it's the truth... I'm sorry."
10010020-172 = "Fortunately, Sensei is here to corroborate your story, so I'm sure everything is as you said."
10010020-173 = "The reading is scheduled for tomorrow morning, is that right?"
10010020-174 = "I'll never understand how the outside world operates. It's only been two days since this book was discovered!"
10010020-175 = "Did no one consider its condition, the need for preservation, or immediate treatment right after excavation?"
10010020-179 = "All of Trinity's scriptures, even the oldest ones, have undergone treatment to ensure their durability."
10010020-180 = "Though there are exceptions. Some works may seem pristine on the outside, but their pages are worse for wear. You can never judge a book by its cover—quite literally in these cases."
10010020-181 = "That's why it's important to have old books evaluated as soon as they're found. This one was no exception."
10010020-182 = "That obviously didn't happen. I'm surmising that it appeared to be in well enough condition on the outside and was in one piece upon being discovered."
10010020-183 = "Therefore, those who discovered the work didn't take its condition into account at all."
10010020-184 = "Realistically, a book this old would rot and be lost to history by now,#nbut the environment it was stored in may have been particularly void#nof air."
10010020-187 = "And once it was exposed, it wouldn't take much for the pages to disintegrate."
10010020-188 = "That leads me to believe that even if your...mishap had not happened,#nit was only a matter of time before it disintegrated on its own.#nI would have given it only a few weeks."
10010020-190 = "Th-That's terrible..."
10010020-191 = "It's possible that the ones in charge thought preservation could wait until after this big event they're planning. So as long as it lasted only a few days, there was nothing to worry about."
10010020-192 = "Though I doubt they had even that much foresight. This reeks of their usual complacent, ill-advised policymaking. No one likes to think of the worst possible outcome."
10010020-193 = "Regardless of where the truth lies, this book's hopes are looking bleak.#nThere's almost no hope of restoring it now."
10010020-194 = "I would call impossible under ordinary circumstances."
10010020-195 = "[s15] \"I guess it's hopeless...\"\n[s16] \"Sorry we asked you to do the impossible.\""
10010020-201 = "I said, \"under ordinary circumstances\"."
10010020-202 = "...?"
10010020-203 = "[s] \"So...?\""
10010020-205 = "Naturally, I don't plan on just letting this go."
10010020-206 = "As I said, this text is invaluable. It's not something we can easily give up on."
10010020-207 = "Naturally. It's scripture, after all..."
10010020-208 = "That's not what I meant. Don't you think there's something strange about all of this?"
10010020-214 = "Why schedule a public event at the ruins of some old cathedral on the outskirts when it could have just as well been held at a modern cathedral?"
10010020-215 = "To set the mood because the book was an artifact? Do you think Trinity's higher-ups would go out of their way just for that?"
10010020-216 = "It doesn't make sense to me. Something else is at play."
10010020-219 = "Also, why put a Sister incapable of reading the text in charge of transporting it?"
10010020-220 = "You can't deny there's something suspicious about this, can you?"
10010020-222 = "I'll need to confirm it for myself, but there's little doubt in my mind that this book contained very important information. So important that..."
10010020-223 = "[s] \"...it can't be revealed to just anyone.\""
10010020-224 = "Precisely! I can't say for certain just how grand the secret may be..."
10010020-225 = "...but it could contain part of Trinity's history long lost to time."
10010020-231 = "Sphagnum moss glue."
10010020-232 = "Huh?"
10010020-233 = "[s] \"Sphagnum moss glue?\""
10010020-235 = "Yes, we need sphagnum moss glue and some holy tonic. I have to follow the method that was used to produce this book in order to restore it."
10010020-236 = "You should be able to procure holy tonic from a local hospital."
10010020-237 = "The glue isn't something you can find readily available in this day and age,#nbut it was commonly used in window frames of old buildings and such.#nBring me some to melt down. "
10010020-238 = "Come to think of it, this very building likely used sphagnum moss glue in its construction...but damaging it is not a viable option."
10010020-239 = "Anyway, I'll do my best to restore the text if you bring me those two materials."
10010020-240 = "U-Ui...!"
10010020-241 = "Don't get the wrong idea. I couldn't care less about the Sisterhood or what Trinity's higher-ups are after."
10010020-242 = "I simply don't want this text to be lost to history again."
10010020-248 = "And if it's a favor for you, Sensei, then...I'll do what I can."
10010020-249 = "[s17] \"Thanks, Ui.\"\n[s18] \"I'll bring you those materials.\""
10010020-250 = "O-Okay. Good luck, then."
10010020-251 = "O-Okay. Good luck, then."

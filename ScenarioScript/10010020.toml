10010020-179 = "ถึงแม้ปกติพระคัมภีร์ของทรีนิตี้จะเก่าแก่มากก็จริง แต่ก็จะได้รับการดูแลจนยังใช้งานได้อยู่"
10010020-180 = "แต่ยังไงมันก็จะมีเด็กคนนี้ที่เป็นข้อยกเว้นเสมอ ถึงจะเห็นว่ายังดูปกติดีจากภายนอก... แต่ว่าเด็กๆ ที่เป็นโรคร้ายแรงอยู่ภายในก็มีให้เห็นค่ะ"
10010020-181 = "เพราะฉะนั้นแล้ว หากค้นพบหนังสือโบราณที่เก่าแก่ เราต้องตรวจสอบอย่างละเอียดทันทีว่ามีส่วน ที่ต้องได้รับการรักษาหรือเปล่าค่ะ และเด็กคนนี้ก็ควรได้รับการตรวจสอบเช่นกันค่ะ"
10010020-182 = "แต่ไม่มีใครทำแบบนั้นเลยใช่ไหมล่ะคะ? ตอนที่ค้นพบเข้า ถ้าดูจากภายนอกเด็กคนนี้คงยังดูปกติดีอยู่"
10010020-183 = "แต่ในตอนที่ค้นพบก็อาจจะไม่ได้รับการดูแลอย่างดีนักด้วยเหตุผลบางอย่าง..."
10010020-184 = "เด็กคนนี้ควรจะเน่าเปื่อยไปแล้วด้วยซ้ำ ฉันคิดว่าตอนถูกเก็บรักษา... เด็กคนนี้คงได้อยู่ในที่ที่อากาศ เข้าไม่ถึงก็เลยยังปลอดภัยอยู่ค่ะ"
10010020-187 = "แต่เมื่อได้ออกมาสู่โลกภายนอก... ก็เกิดการกัดกร่อนอย่างรวดเร็ว..."
10010020-188 = "ถึงคุณซิสเตอร์จะไม่ไปแตะต้องเข้าจนเสียหาย ยังไงอีกสัก 2-3 สัปดาห์ เด็กคนนี้ก็ต้องขาดกระจุย#nเองอยู่แล้วค่ะ"
10010020-190 = "ตายจริง... นี่ฉันทำอะไรลงไป..."
10010020-191 = "จริงๆ ถ้าคิดว่า 'พระคัมภีร์ควรอยู่ในสภาพดีก่อนเปิดอ่านในงาน' ก็ถือว่าคุณได้ 'ทำอะไรลงไป' อยู่..."
10010020-192 = "แต่คุณคงไม่ได้ตั้งใจหรอก ไม่มีใครคาดคิดถึงผลลัพธ์ที่แย่ที่สุดเท่าที่จะเป็นไปได้เอาไว้อยู่แล้วล่ะ"
10010020-193 = "จะยังไงก็เถอะ... ไหนๆ ก็มาถึงขั้นนี้แล้ว ฉันขอพูดอย่างตรงไปตรงมาเลยแล้วกัน... เด็กคนนี้แทบจะไม่มีความหวังแล้วค่ะ"

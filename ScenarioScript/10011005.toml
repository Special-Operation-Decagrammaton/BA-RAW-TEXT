[translation]
10011005-1 = "序幕;忍者襲來！"
10011005-5 = "夏萊．休息室"
10011005-8 = "（結束夏萊的工作，正在休息時……）"
10011005-13 = "[ns]「咦？停電了……？」"
10011005-25 = "哼哼哼！#n順利潛入成功！"
10011005-27 = "哇……居然真的潛入了……那個，傳說中的夏萊……！"
10011005-29 = "忍者鐵則其一！#n「忍者無論面對任何情況，都要毫不猶豫向其挑戰」！"
10011005-30 = "就這樣讓夏萊落入我的手中……！"
10011005-32 = "事情變得很不得了了呢……！"
10011005-34 = "對忍者而言，不管三七二十一先試著去做也很重要……"
10011005-36 = "部長的這份精神，我會寫下來避免忘記的……！"
10011005-38 = "……那個，你是在稱讚我吧？"
10011005-40 = "算了，總之快走吧！#n記得要用忍者跑法哦，咻噠噠噠噠噠噠的那種！"
10011005-42 = "是！咻噠噠噠噠噠噠……！"
10011005-46 = "[ns]「那個……」"
10011005-51 = "……咦？"
10011005-53 = "啊，咦……？"
10011005-54 = "[s]「你們是……？」"
10011005-58 = "別，別別別別慌啊月夜！#n這種時候更該回想起來！"
10011005-59 = "忍者鐵則！其二！"
10011005-60 = "啊，是！"
10011005-61 = "「忍者無論陷入任何困境，都絕對不會放棄」……！"
10011005-62 = "沒錯！既然事已至此，我們兩個要同時使出「埋伏之術」哦！"
10011005-64 = "……咦？#n沒，沒問題嗎……？"
10011005-65 = "沒問題沒問題，GO！"
10011005-66 = "[s]「不是，先，等──」"
10011005-73 = "啊，部長。電燈……"
10011005-74 = "怎麼會！？"
10011005-78 = "伊樹菜，登場！"
10011005-79 = "啊，伊樹菜醬……！"
10011005-80 = "伊樹菜聽見主公的聲音，就咻啪啪地趕來了！"
10011005-81 = "剛才那個聲音……難道主公陷入危機了……！？"
10011005-82 = "如果是的話可不能袖手旁觀！"
10011005-83 = "伊樹菜，前來助陣！"
10011005-84 = "等等，伊樹菜！這跟計畫好的不一樣──"
10011005-85 = "忍忍！"
10011005-86 = "[s]「嗚哇啊啊！？」"
10011005-92 = "（之後總算是成功說服了來襲的3人，讓他們冷靜了下來）"
10011005-96 = "夏萊．辦公室"
10011005-97 = "真是的，伊樹菜！#n這跟作戰不一樣吧！"
10011005-98 = "嗚嗚……但是部長！"
10011005-99 = "伊樹菜聽見主公聲音的瞬間，身體就不自覺地動了起來……"
10011005-100 = "果然身為一名忍者，無法對那種情況坐視不管！"
10011005-101 = "不不不，那確實是件好事啦！"
10011005-102 = "可是，那個……飛快跑過來的伊樹菜醬……"
10011005-103 = "那個，我覺得，真的非常帥氣哦。"
10011005-104 = "耶嘿嘿！謝謝稱讚，月夜閣下！"
10011005-105 = "耶嘿嘿……"
10011005-106 = "[s]「那個，你們是伊樹菜的朋友……是嗎？為什麼會來這裡……？」"
10011005-107 = "嗯？"
10011005-108 = "啊～這個，是這樣的……我們是……"
10011005-112 = "主，主公……！？#n莫非……！"
10011005-113 = "[s]「……莫非？」"
10011005-114 = "您忘記了與伊樹菜一起度過的日子了嗎！？"
10011005-115 = "這難道是因為剛才的衝擊失去了所有記憶的劇情發展嗎！？"
10011005-116 = "[s]「不是那樣的，我當然還記得伊樹菜──」"
10011005-117 = "這麼說來，伊樹菜有在忍者連續劇裡看過！#n為了保護主公而奮不顧身的忍者受到襲擊……"
10011005-118 = "結果喪失了記憶，讓人不禁落淚的劇情！#n那種劇情發生在主公身上了嗎……！？"
10011005-119 = "[s]「伊樹菜，等──」"
10011005-120 = "伊樹菜與主公初次相遇的那個瞬間……！#n說會支持伊樹菜的夢想的那個時候……！主公全都忘了嗎！"
10011005-121 = "歷經無數難關，終於將那個超級大壞蛋……"
10011005-122 = "將試圖支配世界的那個大魔王「喵天丸」打倒的，不就是主公、伊樹菜跟夥伴們嗎！#n主公連那件事都忘記了嗎……！？"
10011005-123 = "[s]「我，我是不記得有發生過那麼大的事件啦……」"
10011005-124 = "伊樹菜很難過……但是請放心！"
10011005-125 = "就算主公忘記了一切……也只要重新累積回憶就可以了！"
10011005-126 = "因為伊樹菜永遠是主公忠誠的忍者！#n而主公也永遠是伊樹菜的主公！忍忍！"
10011005-127 = "[s1]「你這麼說我很高興。但我不是那個意思……」\n[s2]「除了伊樹菜之外的孩子都是初次見面吧，很高興認識你們。」"
10011005-136 = "原來如此，你想知道我們是誰啊……"
10011005-137 = "那麼就……！"
10011005-138 = "幸會，初次見面，老師大人……小生，名喚三千留。"
10011005-139 = "初次，見面……！#n我，我叫月夜……"
10011005-140 = "伊樹菜叫伊樹菜！主公！"
10011005-141 = "[s]「你們好呀……呃，老師『大人』？」"
10011005-142 = "哼哼哼！沒什麼好隱瞞的！我們三人就是……沒錯！"
10011005-143 = "來吧伊樹菜、月夜！"
10011005-144 = "是！部長！"
10011005-145 = "是……！"
10011005-146 = "擺出忍者流最強招牌動作！"
10011005-147 = "[s]「忍者流，最強……？」"
10011005-153 = "何謂忍者！何謂忍法！"
10011005-156 = "忍者的，真諦……！"
10011005-160 = "我們是研究、探究、深究其本質的……"
10011005-161 = "為了推廣忍者的魅力而暗中活躍的，可愛動人的忍者三人組！"
10011005-162 = "沒錯！"
10011005-166 = "哭泣的孩子也會破涕為笑，"
10011005-167 = "百鬼夜行聯合學園最強的忍者集團！"
10011005-168 = "[s]「……？」"
10011005-172 = "名為「忍術研究部」！"
10011005-173 = "的說！"
10011005-174 = "的說……"
10011005-178 = "而我就是忍術研究部的部長！千鳥三千留！"
10011005-179 = "[s]「原來如此……？那忍術研究部來這裡有什麼事嗎？」"
10011005-180 = "哼哼哼……哼～哼哼哼！"
10011005-181 = "老師大人現在應該是這麼想的吧。"
10011005-182 = "「真是群無比帥氣又惹人憐愛的美少女忍者啊！」 ……這樣。"
10011005-183 = "[s]「呃，嗯……」"
10011005-184 = "此外，應該也會這麼想才對。"
10011005-185 = "「真想為這些孩子們加油！真想以大人的力量幫助他們伸展成長中的羽翼，#n　朝著廣闊的世界展翅飛翔！」……這樣。"
10011005-186 = "即使不說出口我也知道。#n我已經預料到事情會這麼發展，因此準備了這個！"
10011005-191 = "[ns]「『正式社團認可推薦信』……？」"
10011005-192 = "來吧！請在這裡簽名！"
10011005-193 = "[s3]「你們是為了這個而來的嗎？」\n[s4]「也就是說，忍術研究部還不是正式的社團？」"
10011005-196 = "部長？原來是這樣嗎？#n伊樹菜現在才知道！"
10011005-197 = "我也是……還，還以為肯定是為了，向老師問好才來的……"
10011005-198 = "當，當然也有那個打算！"
10011005-199 = "……咳咳！我聽說了老師大人的傳聞。#n據說是有能解決一切的強大力量！"
10011005-200 = "如果有這個力量的話，就能讓社團獲得認可……對吧！？所以拜託了！"
10011005-201 = "[s]「這可能有點困難……」"
10011005-202 = "什麼……！？"
10011005-203 = "咦……"
10011005-204 = "咦……？？？"
10011005-205 = "為，為什麼呢……！？#n莫非老師大人……"
10011005-206 = "老師大人也覺得「無法認可研究忍者這種莫名其妙的社團活動」嗎……！？"
10011005-207 = "[s]「不是這樣的。要成為正式社團是需要通過一定的手續的吧？」"
10011005-208 = "是，是沒錯啦……可是……"
10011005-209 = "可，可是！#n佳穗他一定不會認可這種活動的！"
10011005-210 = "還有，那個……對了！#n到獲得認可需要花費非常多時間，而且還很嚴格……"
10011005-211 = "……？"
10011005-212 = "佳，佳穗同學是那麼嚴格的人……嗎？"
10011005-213 = "也，也是有沒那麼嚴格的時候啦……總，總之請想想辦法吧，老師大人！"
10011005-214 = "[s]「唔嗯，我是很想幫你……」"
10011005-219 = "[ns]「又有客人……？」"
10011005-227 = "初次見面，老師。#n我是陰陽部的副部長，名叫桑上佳穗。"
10011005-228 = "陰陽部有件事想委託夏萊，因而前來報訪。"
10011005-229 = "方便占用您一些時間嗎？"
10011005-230 = "嗚喵！說人人到……！？"
10011005-231 = "……哎呀。"
10011005-232 = "[s]「陰陽部不就是百鬼夜行的……？」"

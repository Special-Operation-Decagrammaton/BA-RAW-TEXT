[translation]
10011005-1 = "บทเริ่มต้น;นินจาบุกจู่โจม!"
10011005-5 = "ห้องพักผ่อนที่ชาเล่ต์"
10011005-8 = "(งานช่วงเช้าของชาเล่ต์เสร็จเร็วกว่ากำหนด เลยตั้งใจมาพักที่ห้องพักผ่อน)"
10011005-13 = "[ns] \"เอ๋? ทำไมไฟถึงได้...\""
10011005-25 = "ฮุฮุ ลอบเข้ามาได้สำเร็จ!"
10011005-27 = "พะ... พวกเราลอบเข้ามายัง... ชะ... ชาเล่ต์ที่เคยได้ยินมา... จะ... จนได้สินะคะ...! "
10011005-29 = "กฎเหล็กของนินจาข้อแรก! <นินจาน่ะ! จะต้องไม่ลังเลที่จะเผชิญความท้าทายไม่ว่าเมื่อไร ไม่ว่าที่ไหน!>"
10011005-30 = "เพราะงั้นเราก็เลยมาที่ชาเล่ต์แห่งนี้!"
10011005-32 = "อ๊ะ หรือว่า...!"
10011005-34 = "ถ้าเป็นนินจาละก็ต้องลงมือทำเลยโดยไม่ต้องคิดหน้าคิดหลัง..."
10011005-36 = "คำพูดของท่านหัวหน้า! ฉะ... ฉันจะจำไว้ไม่ลืมเลยค่ะ!"
10011005-38 = "นั่นมัน... คำชมใช่มั้ยเนี่ย...?"
10011005-40 = "เอาละไปกันเถอะ ฉึบฉับๆๆ! นินจาเคลื่อนตัว...!"
10011005-42 = "คะ... ค่ะ! ฉะ... ฉึบฉับๆ ค่ะ...!"
10011005-46 = "[ns] \"คือว่า...พวกเธอ...\""
10011005-51 = "...เอ๋?"
10011005-53 = "คะ...?"
10011005-54 = "[s] \"พวกเธอเป็นใครน่ะ...?\""
10011005-58 = "อ๊าก! ไม่ต้องตกใจไป! สึคุโยะ! ข้าน้อยบอกหลายครั้งแล้วไงเล่า!"
10011005-59 = "กฎเหล็กของนินจา! ข้อที่สอง!"
10011005-60 = "อ๊ะ คะ...ค่ะ!"
10011005-61 = "<นินจาน่ะ! ไม่ว่าจะถูกต้อนจนมุมหรือต้องเผชิญกับความยากลำบากแค่ไหน ก็จะไม่มีวันยอมแพ้เด็ดขาด! >"
10011005-62 = "เอาละสึคุโยะ! เราสองคนมา <ซุ่มโจมตี> พร้อมกันเถอะ!"
10011005-64 = "คะ...? ตะ... ตะ... ตรงนี้เลยเหรอคะ?!"
10011005-65 = "ลุยเลย!"
10011005-66 = "[s] \"ระ... รอเดี๋ยวก่อนสิ?!\""
10011005-73 = "อ๊ะ ท่านหัวหน้า หลอดไฟมัน..."
10011005-74 = "หืม?!"
10011005-78 = "อิซุนะ...! ปรากฏตัว! แล้วค่ะ!"
10011005-79 = "อ๊ะ อิซุนะจัง!"
10011005-80 = "อิซุนะน่ะ! พอได้ยินเสียงเรียกของนายท่านก็รีบมาเลยค่ะ!"
10011005-81 = "นะ...นายท่าน?! หรือว่านายท่านกำลังตกอยู่ในสถานการณ์คับขัน?!"
10011005-82 = "มะ...ไม่ได้นะ! แบบนั้นไม่ได้เด็ดขาดค่ะ!"
10011005-83 = "อิซุนะ! จะทำการช่วยเหลือเดี๋ยวนี้ค่ะ!"
10011005-84 = "เดี๋ยวสิ อิซุนะ! นี่มันไม่เหมือนที่คุยกันไว้นี่นา..."
10011005-85 = "อ๊ะ! นินนิน!"
10011005-86 = "[s] \"อะ... อะไรกันเนี่ย?!\""
10011005-92 = "(หลังจากโต้เถียงกันอยู่เกือบ 10 นาที ในที่สุดก็หลบออกมาจากสามคนนั้นได้)"
10011005-96 = "สำนักงานชาเล่ต์"
10011005-97 = "อ๊าก! อิซุนะ! จู่ๆ ก็โจมตีแบบนี้ได้ยังไง! ทำไมไม่ทำตามแผนล่ะ!"
10011005-98 = "อืม... แต่ว่า หัวหน้า!"
10011005-99 = "พอได้ยินเสียงนายท่านร้องขอความช่วยเหลือ อิซุนะก็! ก็ขยับไปเองโดยที่ไม่รู้ตัวเลยค่ะ!"
10011005-100 = "ใช่แล้วค่ะ...! ราวกับนินจาเลยค่ะ!"
10011005-101 = "เดี๋ยวสิ ก็ไม่ใช่ว่าข้าน้อยจะไม่เข้าใจความรู้สึกหรอกนะ!"
10011005-102 = "ตะ... แต่ยังไงก็เถอะ ตะ... ตอนที่อิซุนะจังวิ่งมาอย่าง ระ... รวดเร็วนั่น..."
10011005-103 = "มะ... มัน... ทะ... เท่มากเลยค่ะ อิซุนะจัง"
10011005-104 = "ฮิฮิ! ขอบคุณที่ชมนะคะ ท่านสึคุโยะ!"
10011005-105 = "แหะๆๆ..."
10011005-106 = "[s] \"แล้วนี่คนรู้จักของอิซุนะเหรอ? ทำไมถึงมาอยู่ที่นี่...?"
10011005-107 = "คะ?"
10011005-108 = "คะ?! อ๊ะ คะ... คือว่า พะ... พะ... พวกเรา..."
10011005-112 = "อ๊ะ นายท่าน...?! อย่าบอกนะว่า...!"
10011005-113 = "[s] \"อย่าบอกนะว่า?\""
10011005-114 = "นายท่านลืมคืนวันที่เคยมีร่วมกันกับอิซุนะไปแล้วงั้นเหรอคะ?!"
10011005-115 = "หรือว่าเมื่อกี้นี้ตกใจมากจนสูญเสียความทรงจำไปหมดแล้วเหรอคะ?!"
10011005-116 = "[s] \"ไม่ใช่แบบนั้นนะ ก็ต้องจำอิซุนะได้อยู่แล้ว...\""
10011005-117 = "จะว่าไป... อิซุนะก็เคยเห็นในละครนินจานะคะ! ที่นินจากระโจนเข้าไปปกป้องนายท่านของตัวเองแล้ว#nถูกโจมตี..."
10011005-118 = "จากนั้นก็สูญเสียความทรงจำไป ช่างเป็นเรื่องราวที่น่าเศร้าจนต้องหลั่งน้ำตาเลยค่ะ! แต่ว่าตอนนี้#nนายท่าน?!"
10011005-119 = "[s] \"อิซุนะ เดี๋ยวสิ ใจเย็นก่อน...\""
10011005-120 = "นายท่าน... ลืมไปหมดแล้วสินะคะ! ตอนที่อิซุนะเจอกับนายท่านครั้งแรก...! ตอนนั้นนายท่านบอกว่าจะ#nสนับสนุนความฝันของอิซุนะ...!"
10011005-121 = "และหลังจากนั้นเมื่อสถานการณ์โกลาหลจบลง ก็ได้เผชิญหน้ากับจอมวายร้ายเนียนเต็นมารุ..."
10011005-122 = "ความทรงจำที่เคยต่อสู้กับวายร้ายที่คิดจะครอบครองโลกร่วมกันกับอิซุนะและเพื่อนๆ อย่าบอกนะคะ#nว่าลืมความทรงจำพวกนั้นไปหมดแล้ว?!"
10011005-123 = "[s] \"เดี๋ยวสิ ไม่เห็นจำได้เลยว่าเคยเจอเรื่องใหญ่โตแบบนั้นด้วย?!\""
10011005-124 = "ถึงอิซุนะจะเจ็บปวดหัวใจ แต่ก็ไม่เป็นไรค่ะ!"
10011005-125 = "ถึงแม้ว่านายท่านจะลืมความทรงจำทั้งหมดไปแล้ว แต่เราก็สร้างขึ้นมาใหม่ได้นี่คะ!"
10011005-126 = "ไม่ว่าเมื่อไรอิซุนะก็เป็นนินจาของนายท่าน! นายท่านก็... คือนายท่านของอิซุนะเสมอค่ะ! นินนิน!"
10011005-127 = "[s1] \"ขอบใจนะอิซุนะ แต่มันไม่ใช่เรื่องร้ายแรงขนาดนั้นหรอก!\"\n[s2] \"ครูแค่ถามเพราะว่าเพิ่งเจออีกสองคนครั้งแรกเท่านั้นเองนะ!\""
10011005-136 = "ฮุฮุฮุ สงสัยว่าพวกเราเป็นใครอย่างนั้นสินะ แบบนี้นี่เอง"
10011005-137 = "ฮึ่ม...!"
10011005-138 = "ยินดีที่ได้รู้จักค่ะ ท่านอาจารย์ ข้าน้อยมีนามว่ามิจิรุ"
10011005-139 = "อ่า ยะ... ยะ... ยินดีที่ได้รู้จักค่ะ...! สึ... สึคุโยะค่ะ"
10011005-140 = "ส่วนอิซุนะก็คือ อิซุนะค่ะ! นายท่าน!"
10011005-141 = "[s] \"สะ... สวัสดี... เดี๋ยวนะ… ท่านอาจารย์เหรอ?\""
10011005-142 = "อะฮะฮ่า! ไม่มีอะไรต้องซ่อนเร้น! พวกเราทั้งสามมารวมตัวกันที่นี่แล้ว! จะขอแนะนำตัว ณ บัดนี้!"
10011005-143 = "อิซุนะ! สึคุโยะ!"
10011005-144 = "ค่ะ! หัวหน้า!"
10011005-145 = "คะ...ค่ะ! ทะ... ทะ... ท่านหัวหน้า!"
10011005-146 = "นินจาไฮเปอร์รวมตัว!"
10011005-147 = "[s] \"นินจา อะไรนะ...?\""
10011005-153 = "นินจานั้นคืออะไร! แท้จริงแล้วคาถาที่นินจาใช้คืออะไรกันแน่!"
10011005-156 = "มะ... มันคืออะไรกันแน่!"
10011005-160 = "วิจัย ค้นคว้า และศึกษาแก่นแท้ของนินจา..."
10011005-161 = "พวกเราสาวน้อยน่ารักน่าเอ็นดูทั้งสามคนทำหน้าที่เผยแพร่เสน่ห์ของนินจาให้เป็นที่รู้จักในวงกว้าง!"
10011005-162 = "พวกเราทั้งสามคนค่ะ~!"
10011005-166 = "แม้แต่เด็กที่ร้องไห้ พอเห็นพวกเราแล้วก็จะยิ้มออกมาอย่างสดใส"
10011005-167 = "สุดยอดชมรมนินจา! แห่งสหพันธ์เฮียกคิยาโค!"
10011005-168 = "[s] \"...?\""
10011005-172 = "ชื่อของพวกข้าน้อยก็คือ!! <ชมรมวิจัยศาสตร์นินจา> อย่างไรเล่า!"
10011005-173 = "ค่ะ! อย่างไรเล่า~♪"
10011005-174 = "ยะ... อย่าง ระ... ไรเล่า..."
10011005-178 = "และข้าน้อยก็คือหัวหน้าของชมรมวิจัยศาสตร์นินจา! จิโดริ มิจิรุนั่นเอง!"
10011005-179 = "[s] \"อืม... แล้วชมรมวิจัยศาสตร์นินจามาทำอะไรที่นี่เหรอ?\""
10011005-180 = "อะแฮ่ม ฮึ่มฮึ่ม อะแฮ่ม! ฮึ่มมม ฮึ่มมม!!!"
10011005-181 = "ท่านอาจารย์เห็นพวกเราแล้วอาจจะคิดแบบนี้สินะ..."
10011005-182 = "ประมาณว่า 'เด็กสาวเหล่านี้! เป็นนินจา! ยอดเยี่ยมมาก! เท่มาก! นินจาสาวน้อยสุดน่ารัก!' แบบนี้สินะคะ"
10011005-183 = "[s] \"เปล่านะ ไม่ได้คิดแบบนั้นเลย...\""
10011005-184 = "หรือว่าจะคิดแบบนี้ใช่ไหมนะ..."
10011005-185 = "อ่า! อยากจะสนับสนุนเด็กๆ พวกนี้จัง! อยากจะคอยช่วยให้สยายปีกบินไปให้ถึงความฝันที่หวังเอาไว้!'#n...แบบนั้นสินะ"
10011005-186 = "อื้ออ เข้าใจแล้ว ถ้าเป็นข้าน้อยก็คงคิดแบบเดียวกัน ก็เลยเตรียมมาแล้วล่ะ!"
10011005-191 = "[ns] \"<จดหมายรับรองให้เป็นชมรมทางการ>...?"
10011005-192 = "ถ้าแบบนั้นก็เอาละ! นี่! ฝากเซ็นให้ด้วยนะ!"
10011005-193 = "[s3] \"จะขอจดหมายรับรองการเป็นชมรมทางการงั้นเหรอ?\"\n[s4] \"ชมรมวิจัยศาสตร์นินจายังไม่ใช่ชมรมทางการงั้นเหรอ?\""
10011005-196 = "คะ? หัวหน้า?! แผนการเป็นอย่างนั้นเหรอคะ?! อิซุนะไม่เห็นรู้เรื่องเลยค่ะ!"
10011005-197 = "อ๊ะ ฉะ... ฉันก็... นะ... นึกว่าพวกเราแค่มา ถะ... ถามไถ่ความเป็นอยู่ของ คะ... คุณครูเฉยๆ เท่านั้น..."
10011005-198 = "กะ... ก็มาเพราะแบบนั้นด้วยอยู่หรอก...!"
10011005-199 = "...ฮึ่ม! ข้าน้อยเคยได้ยินเรื่องเกี่ยวกับท่านอาจารย์มาด้วย ได้ยินว่ามีพลังมหาศาลที่แก้ไขได้ทุกปัญหา!"
10011005-200 = "เพราะฉะนั้น! ได้โปรดช่วยข้าน้อยด้วยเถอะ! ถ้าได้ท่านอาจารย์ช่วยเหลือละก็ ชมรมเราจะต้องเป็น#nชมรมทางการได้แน่นอน...!"
10011005-201 = "[s] \"ไม่ได้ ทำแบบนั้นไม่ได้หรอก\""
10011005-202 = "ว่าไงนะ...!!"
10011005-203 = "คะ...คะ?"
10011005-204 = "เอ๋...?!"
10011005-205 = "ว่าอะไรนะ! หรือว่า… ท่านอาจารย์ ท่านอาจารย์ก็..."
10011005-206 = "จะบอกว่า... <ชมรมที่วิจัยนินจาอย่างงั้นเหรอ ไม่ยอมรับชมรมที่ไม่น่าสนใจพรรค์นั้นหรอก> อย่างนั้น#nสินะ...!"
10011005-207 = "[s] \"ถ้าจะเป็นชมรมทางการก็ต้องทำไปตามขั้นตอนสิ?\""
10011005-208 = "หืม? อ่า คือ... คือว่า... คือว่าเรื่องนั้น..."
10011005-209 = "ตะ... แต่ว่า! ก็คาโฮะบอกว่าจะไม่มีวันยอมรับเรื่องนี้เด็ดขาดเลยน่ะสิ!"
10011005-210 = "ยืนกรานอย่างหนักแน่นสุดๆ...! ใช่!  ยืนกรานเลยล่ะ!"
10011005-211 = "...?"
10011005-212 = "คะ... คุณคาโฮะเป็นคนเข้มงวด... ขนาดนั้นเลยเหรอคะ?"
10011005-213 = "หืม? อย่างนั้นแหละ เพราะงั้นเรื่องนี้เลยต้องขอให้ท่านอาจารย์ช่วย..."
10011005-214 = "[s] \"ถึงจะอย่างนั้นครูก็ช่วยไม่ได้หรอกนะ...\""
10011005-219 = "[ns] \"เอ๊ะ... มีแขกมาเหรอ?\""
10011005-227 = "ยินดีที่ได้พบค่ะคุณครู ฉันคือรองหัวหน้าชมรมหยินหยาง คุวาคามิ คาโฮะค่ะ"
10011005-228 = "ฉันมาที่นี่เพราะว่ามีธุระต้องติดต่อกับชาเล่ต์อย่างเป็นทางการในนามของชมรมหยินหยางค่ะ"
10011005-229 = "รบกวนไปด้วยกันสักครู่ได้ไหมคะ?"
10011005-230 = "ว้าก! พูดถึงก็โผล่ออกมาเลยเหรอเนี่ย...!"
10011005-231 = "เอ๊ะ... ทำไมทุกคนถึง..."
10011005-232 = "[s] \"ธุระของชมรมหยินหยางเหรอ?\""

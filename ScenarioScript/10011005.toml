[translation]
10011005-1 = "Prologue; Attack of the Ninjas!"
10011005-5 = "Schale Lounge"
10011005-8 = "I decided to take a quick break at the lounge after finishing up some tasks ahead of schedule at Schale."
10011005-13 = "[ns] \"Huh? Did that light just...?\""
10011005-25 = "We snuck in without a hitch. Heehee."
10011005-27 = "W-We... We really did it! We really infiltrated the infamous Schale..."
10011005-29 = "Ninja rule number one! A ninja must be willing to take on anything, anytime, anywhere, without hesitation!"
10011005-30 = "This is how we'll take over Schale!"
10011005-32 = "Oh! Yes, of course!"
10011005-34 = "As a ninja, you need to take action instead of being timid and indecisive...!"
10011005-36 = "What wise words from our president! Let me put that in my notebook."
10011005-38 = "Uh... That was as a compliment, right...?"
10011005-40 = "Okay, time to go! Whup-whup-whup! Ninjas on the move!"
10011005-42 = "Oh, uh, yes! Whup-whup-whup...!"
10011005-46 = "[ns] \"Uh, you guys...\""
10011005-51 = "Eh?"
10011005-53 = "Huh?!"
10011005-54 = "[s] \"Who are you...?\""
10011005-58 = "Argh! Don't panic! Tsukuyo! How many times do I have to tell you?!"
10011005-59 = "Rule two of being a ninja!"
10011005-60 = "Ooh! I-I know!"
10011005-61 = "A ninja never gives up, no matter the adversity!"
10011005-62 = "Tsukuyo! Time for our special two-person ambush, you and me! Right here, right now!"
10011005-64 = "Wh-What? Right now?"
10011005-65 = "Yes, right now!"
10011005-66 = "[s] \"Hey, wait a second!\""
10011005-73 = "Huh? President! The light..."
10011005-74 = "Huh?!"
10011005-78 = "Never fear! Izuna is here!"
10011005-79 = "Izuna...?"
10011005-80 = "I made my way here as quickly as my ninja legs could carry me, my lord!"
10011005-81 = "M-My lord...?! Could it be what I heard was a cry for help?"
10011005-82 = "You're in danger?! That can't be!"
10011005-83 = "I, Izuna, will defend my lord!"
10011005-84 = "Izuna! Stop! That's not the plan!"
10011005-85 = "Hiyah! Nin-nin!"
10011005-86 = "[s] \"Uh, wha?!\""
10011005-92 = "After tussling for about ten minutes, I was finally able to extricate myself from the scuffle."
10011005-96 = "Schale Office"
10011005-97 = "Why'd you pop out like that, Izuna?! That wasn't part of the plan!"
10011005-98 = "B-B-But...President!"
10011005-99 = "I heard my lord's pleading cries, and my body acted on its own!"
10011005-100 = "L-Like a true ninja!"
10011005-101 = "It's not that I don't understand your motives but..."
10011005-102 = "Y-You know the way Izuna rushed over without a second thought..."
10011005-103 = "She looked so valiant!"
10011005-104 = "Heehee! I thank thee for the compliment, dear Tsukuyo!"
10011005-105 = "Eek! Heh...heehee...heh..."
10011005-106 = "[s] \"So, you're Izuna's friends... What are you doing here?\""
10011005-107 = "Huh?"
10011005-108 = "W-Well... Uh...the thing... You see... W-w-w-we're..."
10011005-112 = "M-My lord?! Say it is not so...! Please!"
10011005-113 = "[s] \"...Not what?\""
10011005-114 = "Have you already forgotten the time you spent with your dear retainer?"
10011005-115 = "Did the trauma of their ambush make you lose your memory?!"
10011005-116 = "[s] \"What? No. Of course I remember you, Izuna.\""
10011005-117 = "I've seen this before in a ninja drama... A ninja selflessly put herself in harm's way trying to protect her lord..."
10011005-118 = "...But ended up with amnesia after being attacked! The plot twist left me in tears. But now, in my story, my lord is the one with amnesia!"
10011005-119 = "[s] \"Stop with the amnesia theory for a second, Izuna...\""
10011005-120 = "Have you truly forgotten everything? Even the moment where your Izuna became your official retainer? When you encouraged my hopes and dreams?"
10011005-121 = "The villainous saga of the Date Meowru...? All the twists and turns?"
10011005-122 = "All our precious memories of putting a stop to the evil overlord together and saving the world? Have those wonderful times truly been erased from your memory?"
10011005-123 = "[s] \"I don't recall saving the world! Ever!\""
10011005-124 = "I, Izuna, am devastated to hear this. But it'll be okay, my lord!"
10011005-125 = "Even if you've forgotten our memories, we can just make new ones!"
10011005-126 = "Memory or not, I will always be your faithful ninja! And you...you my precious lord."
10011005-127 = "[s1] \"Thanks, Izuna, but that wasn't what I meant!\"\n[s2] \"I was just asking who your friends were!\""
10011005-136 = "Fufufu. So you want to know who we are?"
10011005-137 = "Ahem!"
10011005-138 = "Domo! Pleased to make your acquaintance, Honorable Sensei. I am Michiru."
10011005-139 = "Uhh! Um, p-p-pleased to meet you...! I-I'm Tsukuyo..."
10011005-140 = "And it is I, Izuna, my lord!"
10011005-141 = "[s] \"Hi, everyone... Sorry, did you say Honorable Sensei?\""
10011005-142 = "Bahaha! Why beat around the bush? Allow me to introduce our ninja squad!"
10011005-143 = "Izuna! Tsukuyo!"
10011005-144 = "Yes, President!"
10011005-145 = "Y-Yes, P-P-President!"
10011005-146 = "Ninjas, hyper unite!"
10011005-147 = "[s] \"Ninjas...what...?\""
10011005-153 = "You must be wondering, just what is a ninja? What is this \"ninjutsu\" I speak of?"
10011005-156 = "Wh-What is it?"
10011005-160 = "Ninjas are always learning, always exploring, and always seeking more..."
10011005-161 = "We the trio of three work tirelessly to spread all aspects of ninja charm!"
10011005-162 = "Trio of three!"
10011005-166 = "With us on the case, even crying babies find their smiles!"
10011005-167 = "The premier ninja club of the Hyakkiyako Academy!"
10011005-168 = "[s] \"Ninja club?\""
10011005-172 = "We are the one and only! The Ninjutsu Research Club!"
10011005-173 = "Yes! The one and only. ♪"
10011005-174 = "Th-The one and, uh, o-o-only..."
10011005-178 = "And I am the president of this very club! Chidori Michiru!"
10011005-179 = "[s] \"That's great and all, but what are you all doing here?\""
10011005-180 = "W-Well... Um... Hmm... Ahem!"
10011005-181 = "I understand, Honorable Sensei. When you first saw us you must have thought..."
10011005-182 = "\"Wow! Real-life ninjas! A trio of three awesome and adorable ninjas have appeared like ninjutsu!\""
10011005-183 = "[s] \"Not my exact words...\""
10011005-184 = "Then, Honorable Sensei, this very next thought appeared in your head!"
10011005-185 = "\"Yes! I would love to support these girls! I hope they one day grasp their ninja dreams in their hands and live the life they deserve!\""
10011005-186 = "Don't worry, such thoughts are natural when faced with ninjas. I would feel the same way, so I have prepared something to help you!"
10011005-191 = "[ns] \"An official club-accreditation recommendation form?\""
10011005-192 = "Yes, yes! Just sign on the dotted line, please?"
10011005-193 = "[s3] \"You came here for an official club accreditation?\"\n[s4] \"Does this mean the Ninjutsu Research Club isn't an official club?\""
10011005-196 = "This was your plan all along, President?! I had no idea!"
10011005-197 = "Me neither... I thought we were just saying hi to Sensei..."
10011005-198 = "W-Well... That too, I guess?"
10011005-199 = "...Anyway. Your reputation precedes you, Honorable Sensei! Tales of your achievements have spread across the lands, of your ability to solve any problem that comes across your path!"
10011005-200 = "So helping us become an official club will be a snap!"
10011005-201 = "[s] \"Sorry. No can do.\""
10011005-202 = "What?!"
10011005-203 = "S-Sensei?"
10011005-204 = "MY LORD?!"
10011005-205 = "What are you saying?! Honorable Sensei...please... Don't tell me..."
10011005-206 = "Don't tell me even you don't believe in the ninja way and think that \"a club for studying ninjas is a total joke!\""
10011005-207 = "[s] \"There's an actual process you have to undergo to become official, right?\""
10011005-208 = "That...?! Well... Technically, yes. But the thing is..."
10011005-209 = "That inconsiderate Kaho refuses to listen to anything we say!"
10011005-210 = "She's a total stickler for no good reason! She's super strict!"
10011005-211 = "...?"
10011005-212 = "That doesn't really sound like Kaho to me..."
10011005-213 = "Ahem! Anyways! Honorable Sensei, please listen to our pleas."
10011005-214 = "[s] \"My answer's the same.\""
10011005-219 = "[ns] \"Oh... Another guest?\""
10011005-227 = "Pleasure, Sensei. I'm the vice president of the Yin-Yang Club, Kuwakami Kaho."
10011005-228 = "I'm here on behalf of the Yin-Yang Club to make an official request to Schale."
10011005-229 = "Please, could I have a moment of your time?"
10011005-230 = "Whoa! Speak of the devil!"
10011005-231 = "Are you...?"
10011005-232 = "[s] \"Uh, an official request from the Yin-Yang Club?\""

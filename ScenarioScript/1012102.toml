[translation]
1012102-1 = "大海的禮服～是泳裝～！"
1012102-5 = "紫！今天也在此登場！"
1012102-6 = "話說老師今天不像平時一樣待在其他地方，而是在夏～萊的辦公室……"
1012102-7 = "啊啊！莫非小女子在您忙碌的時候打擾了！？"
1012102-8 = "[s1]「學生要諮詢的話隨時歡迎。」\n[s2]「我也正好打算休息一下。」"
1012102-11 = "啊哈！原來如此！#n這真是完～美的時機呢！"
1012102-12 = "其實最近小女子有點煩惱，會不會因為太隨心所欲而給周圍的人添麻煩……"
1012102-13 = "……啊啊！不過今天想諮詢的並不是這個話題！"
1012102-14 = "[s3]「我覺得這種諮詢也不錯哦。」\n[s4]「你不是說要去海邊嗎？」"
1012102-17 = "呵呵！雖然小女子年紀尚輕，見識可不會讓人失望哦。"
1012102-18 = "要說遊船經驗的話，小女子可是有不少呢！"
1012102-19 = "[s]「遊船……？」"
1012102-20 = "是的。搭乘遊艇享受海上風情，中午時分在料亭用餐……#n接著在旅館吹著海風，靜靜感受海的氣息……"
1012102-21 = "這就是所謂的海之王道！"
1012102-25 = "莫，莫非……小女子搞錯了什麼嗎？"
1012102-26 = "雖然每年略有不同，但大致上都是這種感覺才對……"
1012102-27 = "這次要去的海邊，會和以往不一樣嗎……？"
1012102-28 = "不愧是老師！果然什麼都知道呢！#n提前向您諮詢真是個正確的選擇！"
1012102-29 = "那麼，還請您務必向小女子傳授「這次要去的海邊」的相關知識！"
1012102-30 = "您問我打算穿什麼去……？#n那當然是和服……"
1012102-35 = "咦，老師？#n您突然要去哪裡……？"
1012102-37 = "這裡是……[ruby=Boutique]精品～店[/ruby]？"
1012102-38 = "泳裝？小女子並沒有準備……"
1012102-39 = "呵呵，您這話還真奇怪。#n聽您說得好像真的要下水似的，應該不太可能吧！"
1012102-40 = "咦？"
1012102-41 = "要下水……？"
1012102-42 = "到海裡！？"
1012102-43 = "[s5]「啊，還是你不喜歡海水浴？」\n[s6]「難道是我多管閒事了？」"
1012102-46 = "不，正好相反！還請務必陪小女子購買泳裝！"
1012102-47 = "原來如此……今年夏天並不會採用勘解由小路的形式，所以才會不一樣啊。"
1012102-48 = "……"
1012102-49 = "那麼，小女子接下來該怎麼做呢？"
1012102-50 = "挑一件喜歡的泳裝……？"
1012102-51 = "難道，這裡陳列的全都是泳裝嗎……！？"
1012102-52 = "啊啊！仔細一看確實如此呢！#n因為跟平常看到的樣式完全不同，小女子完全沒察覺到！"
1012102-53 = "只要從中挑選一件就行了對吧！"
1012102-54 = "哼哼～♪該選哪件好呢～？"
1012102-55 = "啊！這件泳裝有[ruby=Frill]荷～葉邊[/ruby]呢！好可愛～"
1012102-56 = "這邊的泳裝則是顏色非常繽紛，就像紙藝一樣漂亮……"
1012102-57 = "還有，嗯……這件是……"
1012102-61 = "真的能穿嗎……？"
1012102-62 = "啊啊！請老師幫幫我！#n這裡的種類太多，小女子反而選不出來了！"
1012102-64 = "（猶豫了好一會之後，紫終於選出了一件喜歡的泳裝）"
1012102-68 = "老師……？#n雖然已經穿上了……"
1012102-71 = "請問小女子這樣穿正確嗎？#n我之前從來沒穿過這種衣服……"
1012102-72 = "感覺布料有點少……"
1012102-73 = "不，不是的！這件泳裝沒有問題！#n我只是因為不太習慣，所以才有點慌張……"
1012102-74 = "不過小女子非常喜歡！"
1012102-75 = "活動起來也很方便～#n輕盈飄逸的感覺，就像長出了翅膀一樣，呵呵。"
1012102-76 = "啊！小女子想到了一個妙計！"
1012102-77 = "如果這種不自在的感覺是源自於陌生的話，只要在習慣之前多穿一會就[ruby=No Problem]沒～問題[/ruby]了！"
1012102-78 = "所以今天就先練習穿著它回家……！"
1012102-79 = "[s7]「老師我那麼相信紫的說！」\n[s8]「泳裝只能在海邊或泳池穿！」"
1012102-82 = "咦？"
1012102-83 = "……"
1012102-84 = "啊哈！小女子完全明白了！"
1012102-85 = "也就是說，這是所謂的「海之禮服」！"
1012102-86 = "既然今天沒有要去海邊或泳池，就算遺憾也只能先跟泳裝告別了。"
1012102-88 = "（之後紫換回了平常的制服，將泳裝包好後帶著幸福的笑容回家了）"

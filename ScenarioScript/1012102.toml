[translation]
1012102-1 = "โดเรสุ~ โคโดะ~ ของทะเลสินะเจ้าคะ!"
1012102-5 = "ยูคาริมาที่นี่อีกแล้วเจ้าค่ะ!"
1012102-6 = "จะว่าไป การที่วันนี้ท่านอาจารย์อยู่สำนักงานชัล~เลต์..."
1012102-7 = "อ๊ะ! ข้ามารบกวนตอนกำลังยุ่งหรือเปล่าเจ้าคะ?!"
1012102-8 = "[s1] \"ครูให้นักเรียนมาปรึกษาได้ทุกเวลาอยู่แล้ว\"\n[s2] \"ไม่หรอก ครูกำลังจะพักอยู่พอดีเลย\""
1012102-11 = "อ้อ! งั้นเหรอเจ้าคะ! งั้นก็เป็นไนซู~ไทม์มิง~ เลยนะเจ้าคะ!"
1012102-12 = "ข้าชอบทำตัวตามที่ใจรู้สึกมากเกินไป ช่วงหลังมานี้ข้าก็เลยกังวลว่าจะเป็นการไปรบกวนผู้คนรอบข้าง#nหรือเปล่าน่ะเจ้าค่ะ..."
1012102-13 = "อ๊ะ...! จะว่าไป ข้าไม่ได้จะมาปรึกษาเรื่องนี้สักหน่อย!"
1012102-14 = "[s3] \"มาเพราะเรื่องทะเลใช่มั้ย?\"\n[s4] \"เห็นว่าจะไปทะเลงั้นเหรอ?\""
1012102-17 = "ฮุฮุ! ถึงยูคาริผู้นี้จะยังเด็ก แต่เรื่องความรอบรู้ข้าก็ไม่เป็นสองรองใครเจ้าค่ะ"
1012102-18 = "ถ้าเป็นการนั่งเรือเล่น ข้าทำมาหลายครั้งแล้วด้วยเจ้าค่ะ!"
1012102-19 = "[s] \"นั่งเรือเล่น...?\""
1012102-20 = "เจ้าค่ะ นั่งเรือชมทัศนียภาพของทะเล แล้วก็ไปกินมื้อกลางวันในภัตตาคาร จากนั้นก็ไปดื่มด่ำกับ#nลมทะเลหน้าที่พัก..."
1012102-21 = "นี่คือการไปเที่ยวทะเลไม่ใช่เหรอเจ้าคะ!"
1012102-25 = "เอ๊ะ เอ๋...? ข้าเข้าใจอะไรผิดไปหรือเปล่าเจ้าคะ?"
1012102-26 = "ถึงจะแตกต่างกันไปบ้างในแต่ละปี แต่ส่วนใหญ่ก็ได้เที่ยวประมาณนี้นี่นา..."
1012102-27 = "หรือว่าทะเลที่จะไปครั้งนี้มันต่างจากทะเลปกติที่ข้าเคยไป...?"
1012102-28 = "สมกับที่เป็นท่านอาจารย์เลย! ท่านอาจารย์รู้อะไรมาสินะเจ้าคะ! งั้นก็คงต้องถามไว้ก่อนแล้วละ!"
1012102-29 = "ถ้างั้นช่วยบอกข้าหน่อยได้มั้ยเจ้าคะว่า <ทะเลที่จะไปครั้งนี้> เป็นที่แบบไหนเหรอเจ้าคะ?!"
1012102-30 = "เจ้าคะ? ข้าจะใส่ชุดอะไรไปน่ะเหรอเจ้าคะ...? ก็ต้องชุดกิโมโน..."
1012102-35 = "เอ๋? ท่านอาจารย์ จู่ๆ ทำไมจะออกไปข้างนอกล่ะ...?"
1012102-37 = "ที่นี่คือ... บูที~คุเหรอเจ้าคะ?"
1012102-38 = "เจ้าคะ? ชุดว่ายน้ำ? ข้ายังไม่มีหรอกเจ้าคะ..."
1012102-39 = "ฮุฮุ แปลกจังเลยนะเจ้าคะ ถามเหมือนข้าจะต้องลงน้ำด้วยเลยเจ้าค่ะ! คงไม่มีทางได้ทำอย่างนั้นหรอก!"
1012102-40 = "เจ้าคะ?"
1012102-41 = "ต้องลงน้ำด้วยเหรอเจ้าคะ...?"
1012102-42 = "น้ำทะเลเนี่ยนะเจ้าคะ?!"
1012102-43 = "[s5] \"อ่า ไม่ชอบว่ายน้ำเหรอ?\"\n[s6] \"หรือว่าครูไม่ควรมาวุ่นวายนะ?\""
1012102-46 = "ไม่เจ้าค่ะ ตรงกันข้ามเลยต่างหาก! ข้าอยากซื้อชุดว่ายน้ำมากเลยเจ้าค่ะ!"
1012102-47 = "ฮืม... ฤดูร้อนปีนี้ข้าไม่ได้อยู่กับตระกูลคาเดโนะโคจิ... เพราะงั้นกิจกรรมที่ทำก็เลยต่างกันสินะเจ้าคะ"
1012102-48 = "......"
1012102-49 = "ถ้างั้นข้าต้องทำอะไรบ้างเจ้าคะ?"
1012102-50 = "ให้เลือกชุดว่ายน้ำที่ถูกใจ...?"
1012102-51 = "ชุดทั้งหมดตรงนี้คือชุดว่ายน้ำเหรอเจ้าคะ...?!"
1012102-52 = "อ๊ะ! จริงด้วยสินะ! มันต่างกับชุดที่ข้าเห็นทั่วไป ข้าเลยไม่รู้เลยเจ้าค่ะว่าเป็นชุดอะไร!"
1012102-53 = "ให้เลือกมาชุดหนึ่งสินะเจ้าคะ!"
1012102-54 = "ฮืมม~♪ เลือกชุดไหนดีน้า~?"
1012102-55 = "อ๊ะ! ชุดว่ายน้ำตรงนี้มีผ้าระบายด้วยเจ้าค่ะ! น่ารักจังเลย~"
1012102-56 = "ส่วนชุดตรงนี้ก็สีสันสดใส แล้วก็มีลายเหมือนงานฝีมือจากกระดาษเลย..."
1012102-57 = "แล้วก็ อืม... ชุดนี้มัน..."
1012102-61 = "เป็นชุดที่เอาไว้ใส่จริงๆ เหรอเจ้าคะ...?"
1012102-62 = "แง! ท่านอาจารย์! ช่วยด้วยเจ้าค่ะ! ชุดว่ายน้ำมีหลายแบบจนข้าเลือกไม่ถูกเลยเจ้าค่ะ!"
1012102-64 = "(หลังจากลังเลอยู่นาน สุดท้ายยูคาริก็เลือกชุดว่ายน้ำที่ถูกใจได้)"
1012102-68 = "ท่านอาจารย์...? ข้าลองใส่มาแล้ว..."
1012102-71 = "ว่าแต่ข้าใส่ถูกหรือเปล่าเจ้าคะ? ข้าไม่เคยใส่ชุดแบบนี้มาก่อน"
1012102-72 = "เหมือนผ้ามันจะน้อยชิ้นไปหน่อยเลย..."
1012102-73 = "มะ... ไม่เจ้าค่ะ! ข้าชอบชุดนี้เจ้าค่ะ! ข้าแค่ยังทำตัวไม่ถูกเพราะยังไม่ชินกับมันน่ะ..."
1012102-74 = "แต่ข้าถูกใจชุดนี้มากเลยนะเจ้าคะ!"
1012102-75 = "ตอนขยับตัวก็ไม่อึดอัด~ ผ้าคลุมที่พริ้วไหวไปตามลมก็ให้ความรู้สึกเหมือนข้ามีปีกเลยเจ้าค่ะ ฮุฮุ"
1012102-76 = "อ๊ะ! ข้าคิดอะไรดีๆ ได้แล้วเจ้าค่ะ!"
1012102-77 = "ที่ข้ายังเขินกับชุดนี้อยู่ก็เพราะข้ายังไม่คุ้นเคย เพราะงั้นถ้าข้าใส่ไว้จนชิน มันก็จะโน~โพรุ~ บุเรมุ~ เจ้าค่ะ!"
1012102-78 = "งั้นวันนี้ข้าจะใส่ชุดนี้กลับเจ้าค่ะ ถือว่าเป็นการฝึกไปในตัวด้วย...!"
1012102-79 = "[s7] \"แต่นี่ไม่ใช่ที่ที่จะใส่ชุดว่ายน้ำเดินได้นะ!\"  \n[s8] \"ชุดว่ายน้ำเอาไว้ใส่ที่ทะเลกับสระว่ายน้ำเท่านั้น!\""
1012102-82 = "เจ้าคะ?"
1012102-83 = "......"
1012102-84 = "อ้อ! ข้าเข้าใจแจ่มแจ๋วแล้วเจ้าค่ะ!"
1012102-85 = "มันเป็นโดเรสุ~ โคโดะ~ ของทะเลสินะเจ้าคะ!"
1012102-86 = "วันนี้ฉันไม่มีแพลนจะไปทะเลหรือสระว่ายน้ำ ถึงจะน่าเสียดาย แต่ก็คงต้องถอดชุดว่ายน้ำสินะเจ้าคะ"
1012102-88 = "(หลังจากนั้นยูคาริก็ไปเปลี่ยนเป็นชุดนักเรียน แล้วถือชุดว่ายน้ำกลับมาด้วยใบหน้ายิ้มแย้ม)"

[translation]
1012102-1 = "Dress Code of the Sea!"
1012102-5 = "Yukari has arrived!"
1012102-6 = "But still...if we are here, meeting at your place of work..."
1012102-7 = "Aaah! Oh, are you occupied? Am I bothering you?"
1012102-8 = "[s1] \"Call this a student consultation.\"\n[s2] \"I was about to take a break, anyway.\""
1012102-11 = "Aha! I see! What fortunate timing!"
1012102-12 = "Lately, I've been worried that I have been imposing on others too often."
1012102-13 = "...Ah! As a matter of fact, that is part of why I am here!"
1012102-14 = "[s3] \"Tell me more.\"\n[s4] \"You said you were going to the sea?\""
1012102-17 = "Haha! While I, Yukari, may be young, I've experienced many things. The sea should pose no challenge."
1012102-18 = "I have boarded many cruises in the past! I am...somewhat of a sailor, to be honest."
1012102-19 = "[s] \"Cruises...?\""
1012102-20 = "Yes. Boarding a large ship or even a yacht, enjoying lunch in the dining room, and then lounging on the deck!"
1012102-21 = "That is how one enjoys the sea!"
1012102-25 = "H-Huh...? Is that not correct?"
1012102-26 = "While the destination varied, that was the typical itinerary."
1012102-27 = "Is the upcoming sea trip somehow different than usual?"
1012102-28 = "As expected! Sensei, you know everything. I am so glad that I asked."
1012102-29 = "Then, will you please teach me about this \"upcoming sea trip\"?"
1012102-30 = "Hm? What was I planning to wear...? A kimono, of course!"
1012102-35 = "Oh! Where are you taking me so urgently?"
1012102-37 = "Is this a...boutique?"
1012102-38 = "What? A swimsuit? I failed to pack one, but..."
1012102-39 = "How odd. You make it sound like we are venturing into water. How preposterous!"
1012102-40 = "Yes?"
1012102-41 = "You mean to say that we are going..."
1012102-42 = "...INTO the sea?"
1012102-43 = "[s5] \"You don't like swimming?\"\n[s6] \"Is that...bad?\""
1012102-46 = "Quite the opposite! I would love to purchase a swimsuit!"
1012102-47 = "I see, hmm... This is no Kadenokouji vacation. We must do things differently!"
1012102-48 = "..."
1012102-49 = "In that case, how shall I proceed?"
1012102-50 = "Simply pick a swimsuit that I desire...?"
1012102-51 = "THESE are all bathing suits? Surely not!"
1012102-52 = "Aah! They are! They are so different, so stylish!"
1012102-53 = "So I may choose any one I like?"
1012102-54 = "Hmm! Which shall be mine? ♪"
1012102-55 = "Ah! This one has frills on it! How charming!"
1012102-56 = "And this one is so colorful, and with a pattern like the finest origami paper..."
1012102-57 = "Then, um... This one..."
1012102-61 = "...Are you sure this one is...legal to wear in public?"
1012102-62 = "Aah! Sensei, help me! How can I choose a favorite?"
1012102-64 = "After pondering, Yukari finally selected a swimsuit."
1012102-68 = "Sensei...? I tried it on..."
1012102-71 = "Does it look proper? This is my first time wearing something like this..."
1012102-72 = "Do you think it is...missing fabric?"
1012102-73 = "N-No! I like it! I am only flustered because this is all so new."
1012102-74 = "But I think...it works!"
1012102-75 = "It permits me to move around, and the back flutters so dramatically, as if I've grown wings."
1012102-76 = "Ah! I know what to do."
1012102-77 = "This is like breaking in a new pair of boots. The more I wear it, the more comfortable it will become!"
1012102-78 = "So, to practice, I will don this outfit until I arrive back home!"
1012102-79 = "[s7] \"Yukari, no!\"\n[s8] \"It's for the pool and sea only!\""
1012102-82 = "Yes?"
1012102-83 = "..."
1012102-84 = "Aha! I completely understand!"
1012102-85 = "So this is the dress code of the sea! The uniform!"
1012102-86 = "And because I, Yukari, will not be swimming today, I must change into something more appropriate."
1012102-88 = "Yukari left the shop smiling in her school uniform...and with her swimsuit safely secured in a bag."

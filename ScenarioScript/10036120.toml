[translation]
10036120-1 = "สนุกกับงานเทศกาลตามสไตล์สควอด"
10036120-2 = "(หลังจากจบการแสดงดนตรีของดีเจซาโอริ...)"
10036120-5 = "แหะๆ เท่สุดๆ ไปเลยค่ะพี่ซาโอริ"
10036120-6 = "พี่ซาโอริไปอยู่บนปกนิตยสารได้สบายๆ เลยนะคะ...!"
10036120-11 = "ชะ... ชมกันเกินไปแล้ว"
10036120-12 = "สำหรับฉันแล้ว นั่นเป็นความรู้สึกที่ผ่านไปโดยไม่รู้ด้วยซ้ำว่ามันคืออะไร ถ้าให้ทำอีกครั้งฉันคงทำไม่ได้หรอก"
10036120-13 = "แต่ถ้าพวกเธอสนุกกัน ฉันก็ดีใจแล้วละ"
10036120-18 = "อื้ม สนุกมากเลย"
10036120-19 = "ฉัน ฮิโยริ แล้วก็มิซากิทั้งเต้นทั้งส่งเสียงจนเจ็บคอเลยละ"
10036120-20 = "มิซากิด้วยเหรอ?"
10036120-24 = "มะ... ไม่ต้องลากฉันเข้าไปด้วยก็ได้นะ"
10036120-25 = "ฉันก็แค่... ก็ถ้ายืนเฉยอยู่คนเดียวมันจะดูแปลกๆ ก็เลยแค่โยกๆ ตามไปด้วยน่ะ"
10036120-26 = "ฮุฮุ ปากแข็งจังเลยนะ"
10036120-27 = "เอาละ ตอนนี้ซัตจังก็ได้เวลาพักแล้ว งั้นพวกเราไปเดินชมรอบๆ งานเทศกาลกันเถอะ"
10036120-28 = "งานเทศกาลยังจัดต่อจนถึงตอนดึกๆ แล้วบรรยากาศตอนกลางวันกับกลางคืนก็ต่างกันด้วยนะ"
10036120-29 = "อีกอย่าง ตอนกลางวันซัตจังต้องทำงานจนไม่ได้เที่ยวชมงานเลยด้วย"
10036120-30 = "ได้มาทะเลทั้งที ถ้าไม่ได้เที่ยวเล่นเลยมันน่าเสียดายออก"
10036120-32 = "ตะ... แต่ฉันไม่เป็นอะไร..."
10036120-33 = "ไม่เอาสิ ไม่ได้"
10036120-34 = "ซัตจังก็ต้องสนุกด้วยสิ ไม่อย่างนั้นฉันจะโกรธนะ?"
10036120-35 = "กะ... ก็ได้"
10036120-36 = "งั้นเราไปซุ้มก่อกองทราย หรือไม่ก็ไปดูบ่อเลี้ยงแมงกระพรุนกันมั้ย?"
10036120-37 = "เอาดีๆ...? ซุ้มแบบนั้นจะมีไปเพื่ออะไรกันนะ"
10036120-38 = "ปะ... ไปซุ้มโน้นกันดีมั้ยคะ?"
10036120-43 = "'<ยิงให้กระจาย! ..."
10036120-44 = "ขวางน้องที่น่ารักไว้..."
10036120-45 = "อย่าให้มาแย่งของรางวัล!~>' งั้นเหรอ?"
10036120-46 = "เป็นซุ้มเล่นเกมสินะ ผู้คนจอแจ แล้วก็ดูสนุกกันจัง อาจจะไม่แย่ก็ได้นะ"
10036120-47 = "แต่ก็ไม่ได้ดูน่าเล่นเลยนะ..."
10036120-48 = "คนดูก็เยอะ ไฟก็สว่างเกิน แบบนี้ไม่ไหวหรอก"
10036120-50 = "..."
10036120-51 = "นั่นสินะคะ... พวกเราคงไม่เหมาะกับการเล่นเกมสนุกๆ สินะคะ..."
10036120-52 = "สงสัยคงทำได้แต่ดูบ่อเลี้ยงแมงกระพรุนทั้งคืน... นั่นคงเป็นจุดจบของพวกเราน่ะค่ะ"
10036120-54 = "จะ... ใจเย็นๆ ก่อน ฮิโยริ เมื่อกี้มิซากิแค่พูดไปตามความดื้อรั้นของตัวเองน่ะ"
10036120-56 = "?"
10036120-57 = "พวกเราไปเล่นซุ้มเกมกันดูสักครั้งก็คงไม่แย่หรอกเนอะ"
10036120-58 = "อื้ม ถ้าทุกคนได้เล่นด้วยกันก็อาจจะสนุกก็ได้"
10036120-63 = "เฮ้อ..."
10036120-64 = "งั้นก็ช่วยไม่ได้ ใครอยากเล่นก็นำไปเลย ฉันขอเดินตามก็แล้วกัน"
10036120-65 = "แหะ แหะๆๆ...!"

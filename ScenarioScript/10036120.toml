[translation]
10036120-1 = "小隊享受慶典的方法"
10036120-2 = "（在沙織的DJ表演結束後……）"
10036120-5 = "耶嘿嘿，你的表演真的很棒哦，沙織姐。"
10036120-6 = "感覺都可以登上雜誌的封面了……！"
10036120-11 = "你，你過獎了。"
10036120-12 = "……對我來說，一切就像在轉眼間不知不覺地過去了。#n如果要我再來一次的話，我恐怕也做不到吧。"
10036120-13 = "不過只要你們能開心，我就心滿意足了。"
10036120-18 = "嗯，大家都很開心。"
10036120-19 = "我、日和跟美咲都又叫又跳的呢。"
10036120-20 = "美咲也是？"
10036120-24 = "沒，沒必要把我也扯進來。"
10036120-25 = "我只是……覺得自己一個人站著很奇怪，所以配合一下氣氛而已。"
10036120-26 = "呵呵，真不坦率。"
10036120-27 = "那既然沙醬也到了休息時間，我們就一起逛逛慶典吧。"
10036120-28 = "慶典似乎會持續到很晚，而且晚上的氣氛又跟白天不太一樣，對吧？"
10036120-29 = "最重要的是，沙醬白天都在忙著工作，根本沒時間好好玩。"
10036120-30 = "難得能來到海邊，那樣實在太可惜了。"
10036120-32 = "我，我其實沒關係的……"
10036120-33 = "不行不行。"
10036120-34 = "沙醬也要一起享受才對。不然我要生氣了哦？"
10036120-35 = "好，好吧。"
10036120-36 = "那麼，要不要去那邊的沙灘遊戲區或水母水槽看看？"
10036120-37 = "……你認真？#n那些攤位就連存在都很奇怪吧？"
10036120-38 = "那，那邊怎麼樣？"
10036120-43 = "「『全彈發射！」……"
10036120-44 = "「～阻止一擁而上的可愛目標」……"
10036120-45 = "「贏得獎品吧！～』」？"
10036120-46 = "是遊戲攤位啊。#n看起來人很多也挺有趣的，感覺還不錯。"
10036120-47 = "……我倒是沒什麼興趣。"
10036120-48 = "不只觀眾多，燈光又刺眼到讓人頭暈。"
10036120-50 = "…………"
10036120-51 = "說的也是……遊戲好像不太適合我們……"
10036120-52 = "看來我們只能整晚盯著水母看了……真悲慘……"
10036120-54 = "冷，冷靜點，日和。#n美咲剛才只是老毛病又犯了而已。"
10036120-56 = "？"
10036120-57 = "遊戲攤位啊……來都來了，不如就試試看吧。"
10036120-58 = "嗯，一起玩感覺會很有趣。"
10036120-63 = "……唉。"
10036120-64 = "真拿你們沒辦法。#n你們先走吧，我會跟上的。"
10036120-65 = "耶，耶嘿嘿……！"

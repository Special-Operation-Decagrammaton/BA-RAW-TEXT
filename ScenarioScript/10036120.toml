[translation]
10036120-1 = "How the Squad Enjoys the Festival"
10036120-2 = "(After Saori's DJ concert...)"
10036120-5 = "Heehee, you did great, Saori."
10036120-6 = "You'd have looked right at home on the cover of a magazine!"
10036120-11 = "Y-You flatter me."
10036120-12 = "I didn't even realize what I was doing up there. I don't think I could do it again if you asked me to."
10036120-13 = "But I'm glad you all had fun."
10036120-18 = "That we did."
10036120-19 = "Hiyori, Misaki, and I were all jumping and shouting."
10036120-20 = "Misaki, even?"
10036120-24 = "I-I wasn't going to mention that."
10036120-25 = "I just...went with the flow. Didn't want to be the only one just standing around."
10036120-26 = "Heehee, oh come on now, be honest with yourself."
10036120-27 = "Now that you have some free time, Sao-Sao, we should all walk around and enjoy the festival together."
10036120-28 = "It looks like it'll go on through most of the night. And I'm sure the vibe will be different than it was in the daytime."
10036120-29 = "Especially since you spent the whole day working instead of enjoying it."
10036120-30 = "It'd be a shame to miss out, especially since we came all this way to the beach."
10036120-32 = "I-I'm fine..."
10036120-33 = "Oh no, that won't do."
10036120-34 = "You simply MUST enjoy yourself, Sao-Sao. Or else I'll be very angry with you."
10036120-35 = "U-Understood."
10036120-36 = "All right, what about the Sand Play Experience, or that Jellyfish Tank over there?"
10036120-37 = "...Are you serious? I don't even know why those are there."
10036120-38 = "H-How about that one?"
10036120-43 = "\"Full Salvo!\""
10036120-44 = "\"Stop the cute enemies from approaching\"..."
10036120-45 = "...\"and win prizes!\""
10036120-46 = "It's a game booth. Crowded, but it does look amusing. Not a bad idea."
10036120-47 = "...I'm not sold."
10036120-48 = "Like you said, it's crowded, the lights are all flashy...it looks way too hectic."
10036120-50 = "..."
10036120-51 = "Y-You're right... We're just not meant to have that kind of fun."
10036120-52 = "We should just stare at the jellyfish tank all night or something... We're just doomed..."
10036120-54 = "C-Calm down, Hiyori. Misaki was just being grumpy."
10036120-56 = "Say what?"
10036120-57 = "A game booth, huh? Seems appropriate."
10036120-58 = "Indeed, we should all enjoy it."
10036120-63 = "*sigh*"
10036120-64 = "All right, I guess we're doing this. Go ahead. I'll follow."
10036120-65 = "H-Heeheehee...!"

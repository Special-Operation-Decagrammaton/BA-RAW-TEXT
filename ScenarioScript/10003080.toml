[translation]
10003080-1 = "ตอนที่ 8;คณะกรรมการวินัย vs เด็กเจ้าปัญหา 1"
10003080-2 = "อะ...อะไรน่ะ?! หัวหน้าคณะกรรมการวินัยงั้นเหรอ?! ไหนว่ายัยนั่นไม่อยู่ที่นี่ไงล่ะ!!#nยัยเปี๊ยกนั่นต้องไม่อยู่ไม่ใช่เรอะ!!"
10003080-3 = "กร๊ากฮ่าๆๆๆ! ยิงเลย! ยิงเข้าไป! ถึงยังไงทางเราก็มีคนมากกว่า! ถล่มยิงให้ราบไปเลย!"
10003080-4 = "เดี๋ยวก่อน! จะบ้ารึไง! เราต้องเผ่นกันแล้ว!!#nคิดว่าจะเอาชนะประธานคณะกรรมการวินัยของเกเฮนน่าได้งั้นเรอะ!"
10003080-8 = "เตรียมพร้อมต่อสู้"

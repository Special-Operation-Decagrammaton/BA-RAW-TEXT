[translation]
10046260-3 = "ฉึ่บฉึ่บ..."
10046260-4 = "ฉึ่บฉึ่บฉึ่บ..."
10046260-5 = "......"
10046260-6 = "ขอโทษนะคะ~ ขอตรวจค้นหน่อยค่ะ~"
10046260-7 = "คะ... คะ?! ตรวจค้นอิซุนะเหรอคะ?!"
10046260-8 = "ชื่อคุณอิซุนะสินะคะ สังกัดที่ไหนคะ?"
10046260-9 = "อิซุนะเป็นนินจาค่ะ!"
10046260-10 = "ค่ะ สังกัดนินจา..."
10046260-11 = "นินจา...?"
10046260-12 = "นินจา... นินจา... เอ่อ... ขอโทษนะคะ มีโรงเรียนแบบนั้นอยู่จริงๆ เหรอคะ?"
10046260-13 = "อ้อ ถามชื่อโรงเรียนสินะคะ อิซุนะเป็นนักเรียนของสหพันธ์เฮียกคิยาโคค่ะ!"
10046260-14 = "......!"
10046260-15 = "อ๋อ~ เข้าใจแล้วค่ะ แต่งคอสเพลย์มานี่เอง"
10046260-16 = "หืม?!"
10046260-17 = "นะ... นี่ไม่ใช่คอสเพลย์นะคะ!"
10046260-18 = "ถึงจะยังไม่ชำนาญมาก แต่อิซุนะก็เป็นนินจาตัวจริงเสียงจริงค่ะ!"
10046260-19 = "คะ? อ่า... ค่ะ... เป็นนินจาจริงๆ..."
10046260-20 = "ว่าแต่... มาทำอะไรอยู่ตรงนี้เหรอคะ?"
10046260-21 = "อ่า... ที่จริงแล้วอิซุนะกำลังฝึกฝนศาสตร์นินจาอยู่ค่ะ!"
10046260-22 = "ไม่นานมานี้อิซุนะรู้สึกได้ว่าตัวเองยังขาดการฝึกฝนอยู่! ก็เลยอยากฝึกให้มากขึ้น จะได้แข็งแกร่งขึ้นเรื่อยๆ...!"
10046260-23 = "ว้าว... โลกนี้มีคำว่าศาสตร์นินจาอยู่ด้วยสินะ..."
10046260-24 = "ว่าแต่ท่านเป็นใครเหรอคะ?"
10046260-25 = "ดูจากที่ท่านมองทะลุวิชาพรางตัวบนหาดทรายของอิซุนะได้แล้ว ท่านต้องไม่ใช่คนธรรมดาแน่เลยค่ะ!"
10046260-26 = "วิชาพรางตัว...? อ่า... หมายถึงที่นอนเอาผ้าคลุมหน้าไว้น่ะเหรอคะ...?"
10046260-27 = "ฉันชื่ออิจิกะจากชมรมทวงความยุติธรรมค่ะ อย่างที่เห็นว่าฉันกำลังลาดตระเวนและตรวจตราชายหาด#nอยู่ค่ะ"
10046260-28 = "ชมรมทวงความยุติธรรม...! ท่านอิจิกะมาทำปฏิบัติการลับเพื่อทวงความยุติธรรมสินะคะ! เป็นการกระทำที่เป็นแบบอย่างที่ดีของนินจาผู้ชอบธรรมเลยค่ะ!"
10046260-29 = "แต่อิซุนะกลับเอาแต่มุ่งมั่นกับการฝึกฝนของตัวเอง ก็เลยไม่ทันสังเกตว่ามีคนอื่นมาทำงานอยู่ค่ะ..."
10046260-30 = "ถ้าท่านอิจิกะไม่ว่าอะไรละก็ ขออิซุนะทำงานลับๆ นี้ด้วยได้มั้ยคะ!?"
10046260-31 = "คะ...? อ่า... หมายความว่าจะมาช่วยลาดตระเวนเหรอคะ?"
10046260-32 = "ตอนนี้ฉันเองก็กำลังต้องการความช่วยเหลืออยู่พอดี ถ้าจะมาช่วยกันอีกแรง ฉันก็ยินดีมากค่ะ"
10046260-33 = "ถ้างั้นอิซุนะขอติดตามไปด้วยนะคะ!"
10046260-39 = "นินจามีอยู่จริงสินะเนี่ย... เริ่มกลัวตัวเองที่คิดว่านี่ไม่ใช่เรื่องแปลกแล้วสิ"

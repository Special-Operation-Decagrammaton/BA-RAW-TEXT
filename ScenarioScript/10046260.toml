[translation]
10046260-3 = "沙沙……"
10046260-4 = "沙沙沙……"
10046260-5 = "…………"
10046260-6 = "那個～請稍微配合一下檢查喔～"
10046260-7 = "咦咦！？是在跟伊樹菜說話嗎！？"
10046260-8 = "名字叫伊樹菜對吧……請問你的所屬是？"
10046260-9 = "伊樹菜是忍者！"
10046260-10 = "好的，所屬是忍者……"
10046260-11 = "……忍者？"
10046260-12 = "忍者，忍者……#n那個，抱歉確認一下，請問是真的有這所學園嗎？"
10046260-13 = "啊，原來問的是學園呀。#n伊樹菜是百鬼夜行聯合學園的學生！"
10046260-14 = "…………！"
10046260-15 = "啊哈～我明白了。#n同學你是在進行角色扮演啊。"
10046260-16 = "咦咦！？"
10046260-17 = "這，這並不是角色扮演！"
10046260-18 = "雖然尚未成熟，但伊樹菜是真正的忍者！"
10046260-19 = "嗯？啊，哦……原來如此，是真正的忍者啊……"
10046260-20 = "……那麼，請問同學你在這裡做什麼呢？"
10046260-21 = "啊，是在修行忍術！"
10046260-22 = "不久前，伊樹菜深刻體會到了自己的修行不足！#n因此必須變得更強才行……！"
10046260-23 = "哇……居然真的說出了「忍術」這個詞……"
10046260-24 = "話說回來，請問閣下是何方高人呢？"
10046260-25 = "居然能一眼看穿伊樹菜流沙灘隱身術，想必不是泛泛之輩！"
10046260-26 = "隱身術……啊，是指拿塊布躺在沙灘上嗎……？"
10046260-27 = "我是實現正義部的一花。#n如你所見正在海灘上巡邏。"
10046260-28 = "實現正義部……！#n原來一花閣下正為了實現正義而暗中行動啊！簡直是正義忍者的典範！"
10046260-29 = "反觀伊樹菜只顧著修行，完全沒察覺到有這種方式……"
10046260-30 = "如果一花閣下不嫌棄，伊樹菜也想一起暗中行動！"
10046260-31 = "……咦？#n你的意思是……想要幫忙對吧？"
10046260-32 = "我現在確實挺需要幫手的……#n如果你願意幫忙的話，我當然不會拒絕。"
10046260-33 = "那麼，伊樹菜將與閣下同行！"
10046260-39 = "……我開始對「出現忍者也不意外」的我感到害怕了。"

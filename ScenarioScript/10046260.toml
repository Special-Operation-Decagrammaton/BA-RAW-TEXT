[translation]
10046260-3 = "Zoom..."
10046260-4 = "Zoom zoom..."
10046260-5 = "..."
10046260-6 = "Excuse me! I'm going to have to pull you over."
10046260-7 = "H-Huh? Are you talking to Izuna?"
10046260-8 = "I am, assuming that's you. What is your affiliation?"
10046260-9 = "Izuna is a ninja!"
10046260-10 = "Hmm, a speeding ninja..."
10046260-11 = "...Ninja?"
10046260-12 = "Ninja, ninja... I'm sorry, but is that a...satellite school?"
10046260-13 = "Oh! Izuna is a student at Allied Hyakkiyako Academy!"
10046260-14 = "...!"
10046260-15 = "Oh, I understand. You're...a fan. You're cosplaying."
10046260-16 = "Yip?!"
10046260-17 = "I-It's not cosplay!"
10046260-18 = "Izuna may still be training, but she is a real ninja!"
10046260-19 = "Huh? Oh, I see... A real ninja..."
10046260-20 = "...So what was a ninja like you doing out here?"
10046260-21 = "Ninjutsu training!"
10046260-22 = "Recently, Izuna felt stagnant. The sand provides new terrain and challenges!"
10046260-23 = "Wow... She said ninjutsu..."
10046260-24 = "Anyway, who might you be?"
10046260-25 = "For you to have seen through the Izuna-Style Sand Stealth Technique... You're clearly exceptional!"
10046260-26 = "Stealth technique...? Oh, you mean you waving around that cloth...?"
10046260-27 = "I'm Ichika from the Justice Task Force. As you can see, I am patrolling the beach."
10046260-28 = "Justice Task Force...! An underground, undercover organization aimed at righteousness!"
10046260-29 = "Izuna was so focused on personal training, that she didn't even realize this was an option..."
10046260-30 = "If you approve, may Izuna join your secret mission?"
10046260-31 = "...Huh? Uh... You mean you want to help?"
10046260-32 = "I could use a hand, if you're willing!"
10046260-33 = "Then Izuna shall join your ranks!"
10046260-39 = "...Boy, my standards have fallen."

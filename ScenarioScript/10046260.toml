10046260-6 = "3;이치카 수영복;02;저기~ 잠시 검문 있겠슴다~\n#3;em;[반응]"
10046260-7 = "3;이즈나 수영복ND;04;네, 넷?! 이즈나 말인가요?!\n#3;em;[?!]\n#3;shake"
10046260-8 = "3;이치카 수영복;99;성함은 이즈나이시군요. 소속은 어떻게 되시나요?"
10046260-9 = "3;이즈나 수영복ND;02;이즈나는 닌자입니다!\n#3;jump"
10046260-10 = "3;이치카 수영복;99;네, 소속은 닌자……."
10046260-11 = "3;이치카 수영복;05;……닌자?\n#3;em;[?]"
10046260-12 = "3;이치카 수영복;05;닌자, 닌자……. 저, 죄송한데, 진짜로 그런 학교가 있슴까?"
10046260-13 = "3;이즈나 수영복ND;03;아, 학교를 물으셨던 것이군요. 이즈나는 백귀야행 연합학원의 학생입니다!\n#3;jump\n#3;em;[!]"
10046260-14 = "3;이치카 수영복;02;…………!"
10046260-15 = "3;이치카 수영복;03;아하~ 이해했슴다. 코스프레군요.\n#3;em;[음표]"
10046260-16 = "3;이즈나 수영복ND;04;캐앵?!\n#3;shake\n#3;em;[?!]"
10046260-17 = "3;이즈나 수영복ND;05;코, 코스프레가 아닙니다!\n#3;jump"
10046260-18 = "3;이즈나 수영복ND;05;아직 미숙할지 몰라도, 이즈나는 진짜 닌자입니다!"
10046260-19 = "3;이치카 수영복;04;네? 어, 네……. 과연, 진짜 닌자…….\n#3;stiff"
10046260-20 = "3;이치카 수영복;02;……그런데, 여기서 뭐 하고 계시던 검까?"
10046260-21 = "3;이치카 수영복;02\n4;이즈나 수영복ND;02;아, 실은, 인법 수행 중이었습니다!\n#4;al\n#3;m2"
10046260-22 = "4;이즈나 수영복ND;01;얼마 전, 이즈나는 아직 수행이 부족하다는 것을 뼈저리게 느꼈습니다! 더욱더 강해져야 한다고……!"
10046260-23 = "3;이치카 수영복;20;우와…… 인법이라는 단어 나왔다…….\n#3;stiff\n#3;em;[땀]"
10046260-24 = "4;이즈나 수영복ND;01;그나저나, 귀공께서는 어떤 분이실까요?"
10046260-25 = "4;이즈나 수영복ND;00;이즈나류 모래사장 은신술을 단번에 간파하신 걸 보면, 보통 분이 아니신 듯합니다!\n#4;jump"
10046260-26 = "3;이치카 수영복;02;은신술……? 아, 그, 보자기를 들고 다니던 게……?"
10046260-27 = "3;이치카 수영복;99;저는 정의실현부의 이치카임다. 보다시피, 해변을 돌아다니면서 순찰 중이라서요."
10046260-28 = "4;이즈나 수영복ND;07;정의실현부……! 과연, 이치카 공께서는 정의실현을 위해 암행하고 계시는 것이군요! 그야말로 정의로운 닌자의 모범과 같은 행동!"
10046260-29 = "4;이즈나 수영복ND;10;반면, 이즈나는 자신의 수행에만 신경 쓴 나머지, 그런 수가 있다는 것을 전혀 눈치채지 못했습니다……."
10046260-30 = "3;이치카 수영복;99\n4;이즈나 수영복ND;05\n#na;이즈나 수영복;혹시 이치카 공만 괜찮으시다면, 이즈나도 암행에 함께할 수 있을지요!\n#4;h\n#4;em;[!]\n#4;jump"
10046260-31 = "3;이치카 수영복;04;……네? 어…… 그러니까 도와주신다는 뜻이죠?"
10046260-32 = "3;이치카 수영복;04;저야 솔직히 도움이 필요한 상황이긴 했는데요. 도와주신다면 마다하진 않겠슴다."
10046260-33 = "4;이즈나 수영복ND;03\n3;이치카 수영복;04\n#na;이즈나 수영복;그러면, 이즈나 동행하겠습니다!\n#4;em;[음표]\n#4;h"

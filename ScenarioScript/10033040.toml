[translation]
10033040-1 = "Episode 4;Easy, Right?"
10033040-2 = "This is the next stop on our itinerary! You'll be experiencing a traditional Hyakkiyako crafts workshop!"
10033040-3 = "You'll have the opportunity to mold unique creations with this beautiful white clay that we harvest locally."
10033040-4 = "This is one of the most well-known clay studios in Hyakkiyako, so their art is very popular as souvenirs."
10033040-5 = "You may find it hard to work with at first, but feel the clay in your fingers and allow it to speak to your creativity—"
10033040-10 = "Basically, we get to make whatever the heck we want?"
10033040-11 = "Awesome! I'm gonna make a tower with two giant arms!"
10033040-12 = "Why's your tower have a face on it? That's dumb."
10033040-14 = "You're cramping my artistic style! I'm gonna put faces on the back and the top too..."
10033040-15 = "And for the final touch, the arms!"
10033040-17 = "...Is everything okay at home?"
10033040-18 = "It's supposed to be edgy, okay?!"
10033040-20 = "Mine's way cooler though. It's like a...jellyfish, amoeba hybrid... Oh! And I'm gonna add some dinosaur legs!"
10033040-21 = "U-Um. Everyone?! What are you..."
10033040-22 = "[ns1] \"These are very far from traditional...\"\n[ns2] \"Are you okay with this?\""
10033040-25 = "Hahaha. They are expressing their own culture with a unique perspective."
10033040-26 = "Culture flourishes during an exchange of minds like this. Today's discovery is tomorrow's culture."
10033040-28 = "Check this out! I used the clay to fuse a white phosphorous smoke grenade to a stick grenade. I feel like it needs some pizzazz though..."
10033040-29 = "It needs a stand... This anti-tank mine's nice and flat, so it'll be the perfect base."
10033040-30 = "Nice, nice. If I just mix napalm and these shrapnel shells..."
10033040-31 = "But, uh, is this what you would call \"arts and crafts\"?"
10033040-32 = "I read this thing in a book once: true art is explosive!"
10033040-34 = "[ns] \"Do we still feel okay about this?!\""
10033040-35 = "U-Um...!"
10033040-37 = "What're you thinking, Kirara?"
10033040-38 = "Hm! Maybe a little purse? A clay purse would be all the rage!"
10033040-39 = "It's very on brand for you... Sensei? Why do you look so happy all of a sudden?"
10033040-40 = "[s3] \"You're so normal... It's healing me...\"\n[s4] \"You're like a cup of hot chocolate on a cold winter day.\""
10033040-43 = "Hahaha! You always say the weirdest stuff, Teach!"
10033040-45 = "I-I'm not an expert on explosives, but won't those go off if they're not handled properly?"
10033040-47 = "Chill out! This composition has so little fuel that it'll just burn up like a little campfire. You would need waaay more oxidizer for anything to happen."
10033040-48 = "And it's the same color as the white clay! So it's the perfect addition to this workshop, right?"
10033040-50 = "Why did you even bring explosives here in the first place?!"
10033040-55 = "Gehenna students are nothing if not...free spirited. Haha."
10033040-56 = "That's why Sensei's here, right? You've got this!"
10033040-57 = "[s] \"I'm really trying here...\""
10033040-59 = "I truly love this sword you made! It reminds of a vigilante symbol I saw in a movie!"
10033040-60 = "I don't know about all that, but I just copied this decoration I saw on the way here."
10033040-61 = "It's super cool though! Let me add onto the theme with this hercules beetle warrior!"
10033040-62 = "A hercules beetle warrior... You're really trying to show me up?! Well, I raise you a stag beetle general!"
10033040-64 = "*yawn* Be sure to keep an eye...on the time... Zzz."
10033040-65 = "Oh dear! You're right... We need to stay on schedule! The itinerary!"
10033040-67 = "Everyone was fully enjoying their arts and crafts, when suddenly..."
10033040-69 = "Now!"
10033040-74 = "[ns] \"Huh? Did those dolls displayed in the entrance...\""
10033040-75 = "...just start moving?!"
10033040-76 = "Th-They're coming this way! "
10033040-77 = "Ah! I've seen a very similar scene in \"Life of a Mafia Cat: The Night of the Moving Puppets\"! There was a bloody feud with the vigilante zombies."
10033040-79 = "Whoa. Crazy. Those things are moving all on their own."
10033040-80 = "I bet it's part of the whole experience."
10033040-85 = "Where are you going? Please don't leave the group without letting anyone know!"
10033040-86 = "We only have twenty three minutes left until our next stop. There's simply no time to be fooling around!"
10033040-87 = "B-But what about the moving dolls?"
10033040-88 = "What? What moving dolls? "
10033040-93 = "Huh?! Why are they moving?! I didn't plan this. Pina, was this your doing?"
10033040-95 = "Oooh, let's try touching one. Maybe it's cursed."
10033040-96 = "Do we have any more explosives? We should blow them up and see what happens!"
10033040-98 = "They don't care at all?! Just who're these people?"
10033040-99 = "I've dedicated almost my entire life to this workshop, and I've never seen anything like this before!"
10033040-103 = "I've got it! This mystery is solved!"
10033040-104 = "[ns] \"Where did the Hot Springs Department come from?!\""
10033040-107 = "Heeheehee. Fortunately for you, we're not as easily fooled as these other nincompoops!"
10033040-108 = "Our President Kasumi unfortunately couldn't make it, seeing as she's on the lam...! Ahem! I mean, pursuing other business ventures."
10033040-109 = "But if she were here, she would undoubtedly say something like, \"Hot springs are everywhere! Never give up on your hot spring dreams!\""
10033040-114 = "Exactly that!"
10033040-120 = "[ns] \"Where are you going with this...?\""
10033040-121 = "The answer's staring you right in the face! C'mon, think! How would these lifeless dolls be able to come to life?!"
10033040-122 = "There must be hot spring veins flowing through this very land, veins so strong they can make inanimate objects rise!"
10033040-124 = "...I think?"
10033040-125 = "[s] \"I don't like the direction you're taking this at all!\""
10033040-128 = "Where there are hot springs, we are there! Even if there isn't a hot spring, we're still there!"
10033040-129 = "Where the veins are flowing, we are developing!"
10033040-130 = "But what should we do with all the dolls once we finish construction?"
10033040-131 = "I've got it! They'll be little mascots for our beautiful hot springs resort!"
10033040-135 = "Megu always has the best ideas!"
10033040-136 = "It's developing time! Bring out your drills! All the equipment! Bang, bam!"
10033040-140 = "Hot springs! Hot springs!!"
10033040-142 = "You're tellin' me I'm up against a bunch of crazy people?"
10033040-144 = "Welp, there they go."
10033040-145 = "Hahaha! They sure know how to endanger everyone around them!"
10033040-147 = "No. At this rate... At this rate, everything will...!"
10033040-148 = "..."
10033040-149 = "All things happen for a reason, yes?"
10033040-150 = "So this must be the universe ushering in a new era of culture! And I am truly honored to be a part of this cosmic lesson!"
10033040-151 = "That is really, truly..."
10033040-152 = "[ns] \"...not what's happening here!\""
10033040-154 = "[ns] \"We need to do something. Guide team, assemble!\""
10033040-156 = "Y-Yes! Sensei!"
10033040-157 = "We must face difficult problems head on! I'll lay my life on the line for this mission, Sensei!"
10033040-158 = "Waaah! Thank goodness Sensei is here!"
10033040-159 = "Hup! I guess it's my turn. Everyone...stay behind me."
10033040-161 = "Yahoo! Teach! Umika! Consider us honorary guide team members!"
10033040-162 = "I'm out of excuses..."
10033040-163 = "[s] \"Erika? Kirara?\""
10033040-165 = "We'll count on you to rein in the Hot Springs Department, Sensei."
10033040-166 = "And you can count on us to round up the rest of the Gehenna students!"

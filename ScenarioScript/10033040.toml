[translation]
10033040-1 = "第4話;怎麼樣，很簡單吧？"
10033040-2 = "接下來大家要體驗的，是我們百鬼夜行的傳統手工藝！"
10033040-3 = "特別是現在大家所在的這個地方，是一間以白黏土製作陶藝品的工作室。"
10033040-4 = "這間工作室製作的手工藝品廣受認可，時常被當成百鬼夜行的紀念品！"
10033040-5 = "雖然起初可能會覺得有點陌生，請親自用手觸摸黏土，試著盡情表現自己的個性──"
10033040-10 = "所以想做任何東西都可以嗎？"
10033040-11 = "既然如此……好，我決定了！#n我要來做一座有兩隻手臂的塔！"
10033040-12 = "塔？那你現在為什麼在做臉？"
10033040-14 = "你就先看著吧……#n一張臉在塔的後面，另一張在前面，最後一張貼在頂端，然後……"
10033040-15 = "再接上兩隻手……"
10033040-17 = "……總覺得越看越可怕。"
10033040-18 = "那就對了！"
10033040-20 = "那我就……把水母貼在變形蟲上，然後再加上恐龍的腿……"
10033040-21 = "那，那個，各位！？#n那到底是……"
10033040-22 = "[ns1]「好像正在製作跟傳統手工藝完全無關的東西……」\n[ns2]「這樣下去沒問題嗎？」"
10033040-25 = "呵呵呵……別擔心。#n這或許也是一種新文化吧。"
10033040-26 = "所謂文化，本來就是在交流與變遷的過程中發展的……#n今天的傳統就是以前的流行嘛。"
10033040-28 = "先把白磷彈固定在柄式手榴彈上！#n收尾就……嗯……收尾用什麼好啊？"
10033040-29 = "反戰車地雷怎麼樣？#n這種扁平又寬敞的東西正好適合當成底座！"
10033040-30 = "好，然後再把汽油凝膠和榴散彈混合……"
10033040-31 = "話說這能算是手工藝嗎？"
10033040-32 = "我在某個地方聽過一句話！藝術就是爆炸！"
10033040-34 = "[ns]「這真的沒關係嗎！？」"
10033040-35 = "唔嗯……！"
10033040-37 = "你有什麼主意嗎，綺羅羅醬？"
10033040-38 = "呃～嗯，果然還是包包吧？做個陶土手提包怎麼樣？"
10033040-39 = "嗯，還不錯，很適合你。#n咦，老師？你的表情是怎麼回事？"
10033040-40 = "[s3]「……我正在接受治癒。」\n[s4]「就像一碗溫暖的粥，正在滲入我受傷的胃一樣……」"
10033040-43 = "啊哈哈哈。雖然不是很懂，但老師你的說法真有趣！"
10033040-45 = "各，各位！？那個，雖然不是很清楚，但那不是爆裂物嗎！？#n要是一個不小心……！？"
10033040-47 = "沒事沒事，這是A型混合炸藥，就算點火也只會燃燒，沒有雷管是不會爆炸的。"
10033040-48 = "因為看起來只是普通的白色黏土，說不定很適合這個工作室哦？"
10033040-50 = "我覺得把這種東西帶到工作室本身就很奇怪吧……！？"
10033040-55 = "嗯……我們學園的孩子果然很自由奔放呢？"
10033040-56 = "啊哈哈哈。不過有老師在這，應該沒事吧？我相信老師！"
10033040-57 = "[s]「我會努力……」"
10033040-59 = "哦哦！這個像刀的作品！簡直是任俠的象徵！"
10033040-60 = "這我倒不太清楚，但我在來的路上有看到這樣的裝飾品，所以就試著做出來了。"
10033040-61 = "好厲害好厲害！#n那要不要在這裡加一個獨角仙形狀的黏土……做成獨角仙武士呀！"
10033040-62 = "獨角仙武士啊……當然好！#n那另一邊就做一個鍬形蟲將軍吧！"
10033040-64 = "呼啊……不能因為太投入而拖到時間……呼嚕……"
10033040-65 = "這，這麼說來，下一個行程……計畫……！"
10033040-67 = "（當大家深陷於手工藝的樂趣時……）"
10033040-69 = "就是現在……！"
10033040-74 = "[ns]「嗯？展示在入口的人偶……？」"
10033040-75 = "動起來了──！？"
10033040-76 = "它，它們在往這邊靠近！"
10033040-77 = "哈！彷彿讓人想起《任俠喵喵傳～重生的傀儡之夜～》裡，#n與重生的任俠殭屍激戰的場景！"
10033040-79 = "怎麼啦？那些東西好像在動耶？"
10033040-80 = "這也是工作室現場體驗的一環嗎？"
10033040-85 = "啊，不行，各位！#n這樣突然跑出去的話……"
10033040-86 = "這裡……應該要在23分鐘內完成工作室的體驗……現在不是做這種事的時候……！"
10033040-87 = "嗯！？那件事居然比人偶動起來更重要嗎？"
10033040-88 = "咦？人偶動起來了？"
10033040-93 = "怎，怎麼會呢！？這是菲娜準備的嗎？"
10033040-95 = "我要摸摸看！"
10033040-96 = "它們會不會就算有破損也能動啊？#n炸藥還有剩嗎？有沒有人有雷管？"
10033040-98 = "搞，搞什麼！？這些傢伙為什麼都沒有被嚇到啊！？"
10033040-99 = "這是怎麼回事……？#n我待在工作室這麼久，還是第一次遇到這種事……！"
10033040-103 = "我知道了！謎團全部解開了！"
10033040-104 = "[ns]「等等！溫泉開發部居然在這種時候出現！？」"
10033040-107 = "哼哼哼……就算騙得了其他人，也騙不了我們溫泉開發部的眼睛！"
10033040-108 = "雖然佳澄部長因為受人追趕……#n不對，因為很忙碌的關係沒能參加修學旅行……"
10033040-109 = "不過如果是部長，一定會這麼說的！#n無論什麼時候，都不能放棄對溫泉的夢想！有關溫泉的線索，任何地方都可能存在！"
10033040-114 = "沒錯！"
10033040-120 = "[ns]「所，所以你們想表達的是……？」"
10033040-121 = "很簡單！為什麼本來不會動的人偶會動起來呢……"
10033040-122 = "答案肯定是……因為這片土地流動的溫泉水脈的能量太強了！"
10033040-124 = "……嗯？"
10033040-125 = "[s]「糟糕……這個走向是……！」"
10033040-128 = "只要有溫泉在就有我們在！不，就算溫泉不在我們也在！"
10033040-129 = "只要有水脈流動，那該做的就是開挖土地，建造溫泉！"
10033040-130 = "話說這些人偶怎麼辦呢？"
10033040-131 = "嗯！建造溫泉浴場之後，就把這些人偶當作吉祥物吧？"
10033040-135 = "原來如此！"
10033040-136 = "好，開炸吧！挖掘吧！開發時間到了！#n大家拿好裝備！"
10033040-140 = "溫泉時間！！！"
10033040-142 = "這些傢伙瘋了嗎！？"
10033040-144 = "他們又開始了……"
10033040-145 = "啊哈哈哈。這會不會有點危險？"
10033040-147 = "不行……再這樣下去……再這樣下去絕對會……！"
10033040-148 = "……"
10033040-149 = "原來如此啊……事出必有因……"
10033040-150 = "這無疑也是一種新文化……是世界帶給我的教誨……"
10033040-151 = "真的是那樣嗎！？"
10033040-152 = "[ns]「我覺得不是！」"
10033040-154 = "[ns]「沒辦法了……導覽組，集合！」"
10033040-156 = "我，我知道了！老師！"
10033040-157 = "我明白了……現在不是旁觀的時候！#n我會永遠追隨你的，老師！"
10033040-158 = "哇啊啊～！好險有老師在……"
10033040-159 = "大家都先到我身後……！"
10033040-161 = "呀齁～我們也來了，老師！海花醬！"
10033040-162 = "唉……真不好意思。"
10033040-163 = "[s]「繪里香？綺羅羅？」"
10033040-165 = "總之先讓溫泉開發部的人冷靜下來吧，老師。"
10033040-166 = "其他孩子就交給我們，這樣可以嗎？"

[translation]
1300503-1 = "Office Cleaning"
1300503-2 = "Problem Solver 68 Office"
1300503-11 = "Hmm...? Sensei?"
1300503-12 = "You're here early."
1300503-13 = "I would have done some cleaning by now if I knew you were going to be here so early."
1300503-14 = "[s] \"Where are the others?\""
1300503-15 = "They'll be coming in a little later. We were up late last night doing some work."
1300503-16 = "What about me? I'm fine. I never get a lot of sleep."
1300503-17 = "That's why I usually get here first and clean the office."
1300503-18 = "What, you think it'd be easier if I waited for the others so we could clean together?"
1300503-19 = "I guess it would be..."
1300503-20 = "I dunno. They'd probably think I was being too bossy if I said we should clean together. Besides, it'd be a pain in the ass."
1300503-21 = "Aru and Haruka do a decent job of cleaning up after themselves, so that makes it easier."
1300503-22 = "I'm good doing it solo rather than asking for help."
1300503-23 = "[s] \"Then, I'll help with the cleaning.\""
1300503-24 = "Were you not listening to a word I said, Sensei?"
1300503-25 = "This is Problem Solver's problem. It has nothing to do with you."
1300503-26 = "Are you trying to keep me in your debt or something?"
1300503-27 = "You're not? You genuinely just wanted to help?"
1300503-28 = "But..."
1300503-29 = "Never mind. Arguing over something like this is stupid."
1300503-30 = "I'm not usually the one to go ask for help, but I know it doesn't make sense to turn it down if someone offers."
1300503-31 = "It's not all that different than how Problem Solver operates now that I think about it. Heh."
1300503-34 = "Here. You can take care of the heavy lifting."
1300503-36 = "I helped Kayoko clean the office after that."

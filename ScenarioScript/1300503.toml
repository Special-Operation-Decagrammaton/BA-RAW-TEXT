1300503-15 = "2;카요코;01;다른 사원들은 아직 출근하지 않았어. #n어제는 새벽 늦게까지 의뢰가 있었거든."
1300503-16 = "2;카요코;02;……나? 나는 괜찮아. #n아침잠이 없는 편이라서.\n#2;em;[반응]"
1300503-17 = "2;카요코;03;그래서 이렇게 홀로 일찍 출근하는 날에는 가끔씩 사무소 정리를 하곤 해."

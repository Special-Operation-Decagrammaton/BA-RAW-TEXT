1300503-26 = "2;카요코;05;아니면 내게 계속 빚을 지워서 난처하게 만들 셈이야?"
1300503-27 = "2;카요코;02;하고 싶어서 하는 일이니 마음에 담아두지 말라고?"
1300503-28 = "2;카요코;99;하지만……."
1300503-29 = "2;카요코;06;아니, 이런 걸로 말싸움을 하는 것도 우스운가.\n#2;em;[땀]"
1300503-30 = "2;카요코;01;타인과 얽히는 일에는 발을 들이지 않지만, 다른 사람 쪽에서 먼저 얽혀오는 건 피하지 않는 주의니까."
1300503-31 = "2;카요코;03;마치 이 흥신소의 일처럼 말이지, 후후.\n#2;em;[재잘]"

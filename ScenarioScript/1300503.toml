[translation]
1300503-1 = "ทำความสะอาดสำนักงาน"
1300503-2 = "สำนักงานหน่วยรับจ้างสารพัด 68"
1300503-11 = "หืม....? ครูนี่นา?"
1300503-12 = "มาถึงเร็วกว่าที่คิดนะ"
1300503-13 = "ถ้ารู้ว่าครูจะมาถึงเร็วแบบนี้ ฉันคงจะเปลี่ยนไปทำความสะอาดตอนช่วงบ่ายแทน..."
1300503-14 = "[s] \"แล้วสมาชิกคนอื่นๆ ล่ะ?\""
1300503-15 = "สมาชิกคนอื่นๆ ยังไม่มาหรอก#nเมื่อคืนมีภารกิจจนถึงรุ่งเช้าเลยน่ะ"
1300503-16 = "ฉันเหรอ? ฉันไม่เป็นไรหรอก#nฉันไม่ค่อยชอบนอนตอนเช้าน่ะ"
1300503-17 = "ฉันก็เลยมาที่นี่แต่เช้าแล้วทำความสะอาดสำนักงานไปพลางๆ ก่อน"
1300503-18 = "รอให้ทุกคนมาถึงแล้วช่วยกันทำความสะอาดจะเร็วกว่างั้นเหรอ?"
1300503-19 = "ก็อาจจะเร็วกว่าก็ได้นะ แต่ว่า..."
1300503-20 = "ฉันคิดว่ามันคงจะดูจู้จี้มากไปถ้าไปพูดเรื่องทำความสะอาดกับทุกคน...#nอีกอย่างมันก็น่ารำคาญด้วย"
1300503-21 = "บางครั้งอารุกับฮารุกะก็จะทำความสะอาดของที่สกปรกอยู่บ้าง#nเพราะงั้นเลยไม่ได้มีอะไรให้ทำความสะอาดเยอะหรอก"
1300503-22 = "ฉันชอบทำอะไรคนเดียวมากกว่าไปขอให้คนอื่นช่วยน่ะ"
1300503-23 = "[s] \"เดี๋ยวครูช่วยทำความสะอาดเอง\""
1300503-24 = "ครูไม่ได้ยินที่ฉันพูดเหรอ?"
1300503-25 = "นี่เป็นงานของหน่วยรับจ้างสารพัด ไม่เกี่ยวกับครูสักหน่อย"
1300503-26 = "คิดจะทำให้ฉันรู้สึกลำบากใจโดยการทำให้ฉันติดหนี้บุญคุณไปเรื่อยๆ รึไง?"
1300503-27 = "ที่จะช่วยเพราะแค่อยากช่วยเฉยๆ งั้นเหรอ?"
1300503-28 = "แต่ว่า..."
1300503-29 = "พอเถอะ มาเถียงกันแบบนี้ไม่เห็นจะได้อะไรขึ้นมา"
1300503-30 = "ปกติฉันไม่ค่อยสุงสิงกับคนอื่นสักเท่าไหร่ แต่ถ้ามีคนเข้ามาช่วยฉันก็ไม่ปฏิเสธหรอก"
1300503-31 = "ก็เหมือนกับงานของหน่วยรับจ้างสารพัดนี่ล่ะ หึหึ"
1300503-34 = "ถ้างั้นพวกเรื่องยกของหนักๆ ฉันจะให้ครูจัดการแล้วกัน"
1300503-36 = "จากนั้นคุณครูกับคาโยโกะก็ช่วยกันทำความสะอาดสำนักงาน"

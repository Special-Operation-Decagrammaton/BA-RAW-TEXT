[translation]
1300503-1 = "辦公室的清掃"
1300503-2 = "便利屋68．辦公室"
1300503-11 = "嗯……？老師？"
1300503-12 = "你來得比我預期得還早呢，"
1300503-13 = "要是知道你會這麼早來，我就把打掃辦公室的時間定晚一點了……"
1300503-14 = "[s] 「其他成員呢？」"
1300503-15 = "其他社員昨天處理委託到半夜。#n都還沒來上班。"
1300503-16 = "……我？我沒問題。#n我到早上都很有精神。"
1300503-17 = "所以只有我一個人提早進公司的時候，偶爾會像這樣順便整理一下辦公室。"
1300503-18 = "你說大家一起打掃不是比較快嗎？"
1300503-19 = "雖然是那麼說沒錯……"
1300503-20 = "因為我覺得如果刻意說要打掃，感覺好像有點跩……#n重要的是很麻煩。"
1300503-21 = "而且亞瑠和遙香，偶爾也會把弄亂的東西整理好，所以其實沒什麼需要打掃的。"
1300503-22 = "與其找人幫忙，這種麻煩事還是自己處理比較自在。"
1300503-23 = "[s] 「我來幫忙打掃吧。」"
1300503-24 = "……老師，你有在聽我說話嗎？"
1300503-25 = "何況這是我們便利屋的事情，跟老師沒關係。"
1300503-26 = "還是你打算讓我一直欠人情，讓我一直愧疚下去？"
1300503-27 = "你說是你只是做自己想做的事，叫我不要放在心上？"
1300503-28 = "但是……"
1300503-29 = "算了，為那種小事爭執也太可笑了。"
1300503-30 = "雖然不會插手別人的事，但很歡迎別人插手自己的事。"
1300503-31 = "就像這間便利屋的理念一樣，呵呵。"
1300503-34 = "那就麻煩老師搬重物囉。"
1300503-36 = "（之後，和佳世子一起把辦公室打掃的乾乾淨淨）"

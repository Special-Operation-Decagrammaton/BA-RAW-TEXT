1300503-20 = "2;카요코;99;굳이 청소를 하자고 이야기를 꺼내면 생색을 내는 것 같고…… #n무엇보다 귀찮잖아."
1300503-21 = "2;카요코;02;아루나 하루카도 어지러진 물건 정도는 가끔 치워주는 것 같고, 청소할 것도 많지 않은 걸."
1300503-22 = "2;카요코;01;귀찮은 일은 남에게 손 벌리지 않고 혼자서 처리하는 게 편해.\n#2;em;[...]"

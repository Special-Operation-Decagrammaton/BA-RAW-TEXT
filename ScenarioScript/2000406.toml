[translation]
2000406-1 = "เล่นของสูง"
2000406-2 = "ชายหาดฮิคาชิสึ"
2000406-3 = "(คุณครูเตรียมไอติมมาให้มาชิโระที่ตั้งใจทำงานจิตอาสาอยู่)"
2000406-4 = "[s] \"เธอบอกว่าอยู่ที่นี่นี่นา...?\""
2000406-5 = "อ๊ะ คุณครู ทางนี้ค่ะ"
2000406-6 = "[s1] \"ไปซ่อนที่ไหนอีกล่ะคราวนี้...?\"\n[s2] \"ไม่ได้ใส่ชุดพรางตัวเหมือนครั้งก่อนใช่มั้ย...?\""
2000406-7 = "ปะ...เปล่าสักหน่อยค่ะ"
2000406-8 = "ปะ...เปล่าสักหน่อยค่ะ"
2000406-9 = "ครั้งนี้น่ะ..."
2000406-10 = "ฉันอยู่บนหัวคุณครูค่ะ"
2000406-11 = "[s] \"บนหัวเหรอ?\""
2000406-15 = "ตั้งใจมาหาฉันเองแบบนี้ มีเรื่องอะไรหรือเปล่าคะ?"
2000406-16 = "อ๋อ เอาไอติมมาให้เหรอคะ"
2000406-17 = "ฉันกำลังคอแห้งเพราะอากาศร้อนอยู่พอดีเลย ขอบคุณนะคะคุณครู"
2000406-18 = "[s] \"ไปอยู่ตรงไหนมาเหรอ?\""
2000406-19 = "เมื่อกี้ฉันนั่งอยู่บนหอสังเกตการณ์ชายฝั่งที่อยู่ข้างหน้านี้ค่ะ"
2000406-20 = "ถ้านั่งอยู่บนที่สูงๆ แบบนั้น เราจะเห็นชายหาดได้เต็มตาดีค่ะ"
2000406-21 = "[s] \"มาชิโระชอบอยู่บนที่สูงสินะ\""
2000406-22 = "ฉันไม่ได้ขึ้นไปบนหอสังเกตการณ์เพราะชอบที่สูงๆ หรอกนะคะ"
2000406-23 = "ฉันเลือกขึ้นบนที่สูงเพราะมันสามารถดูสถานการณ์ที่เกิดขึ้นในชายหาดได้ดีก็เท่านั้นค่ะ"
2000406-24 = "อีกอย่าง... บนนั้นไม่มีจุดอับอะไร ทำให้ง่ายต่อการยิงด้วยค่ะ"
2000406-25 = "แถมลมยังพัดเย็นสบาย ต่อให้ต้องซ่อนตัวนานแค่ไหนก็ไม่ต้องกลัวว่าจะเป็นลมแดดค่ะ"
2000406-26 = "แต่ยังไงก็คงยากที่จะปฏิเสธว่าวิวตรงนี้สวยกว่า..."
2000406-27 = "จริงสิคะคุณครู ไหนๆ ก็พูดเรื่องนี้แล้ว คุณครูจะลองขึ้นไปบนหอสังเกตการณ์ดูมั้ยคะ?"
2000406-28 = "ถ้าได้กินไอติมแล้วดูวิวสวยๆ จากบนนั้นด้วยกัน ไอติมก็คงจะอร่อยขึ้นนะคะ"
2000406-29 = "[s] \"มันไม่แคบไปสำหรับสองคนเหรอ?\""
2000406-30 = "ไม่เป็นไรหรอกค่ะ ถึงจะแคบไปหน่อย แต่ถ้าเรานั่งชิดๆ กันก็นั่งได้อยู่ค่ะ"
2000406-31 = "หรือว่า... คุณครูไม่สะดวกใจที่จะนั่งใกล้ๆ ฉันเหรอคะ?"
2000406-32 = "[s] \"ไม่ใช่แบบนั้นหรอก\""
2000406-33 = "งั้นก็ถือว่าตกลงนะคะ "
2000406-37 = "บันไดมันลื่นนะคะ ตอนก้าวขึ้นมาต้องดูดีๆ ด้วยนะคะ"
2000406-39 = "(จากนั้นคุณครูก็นั่งชมวิวชายหาดกับมาชิโระจนดวงอาทิตย์ตกดิน แล้วจึงลงมาจากหอสังเกตการณ์)"

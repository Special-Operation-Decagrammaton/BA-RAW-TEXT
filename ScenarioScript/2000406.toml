[translation]
2000406-1 = "#title;연기와 저격수는 높은 곳을 좋아한다"
2000406-2 = "#place;히가시츠 해변"
2000406-3 = "#na;열심히 봉사활동을 하는 마시로를 위해 아이스크림을 챙겨 해변으로 나왔다."
2000406-4 = "[s] \"어라, 여기에 있다고 들었는데……?\""
2000406-5 = "#na;마시로 수영복ND;아, 선생님. 이쪽입니다."
2000406-6 = "[s1] \"……어디에 있는 거야?\"\n[s2] \"……설마 또 길리슈트를 입고 있는 건 아니겠지?\""
2000406-7 = "#na;마시로 수영복ND;그, 그렇지 않습니다."
2000406-8 = "#na;마시로 수영복ND;그, 그렇지 않습니다."
2000406-9 = "#na;마시로 수영복ND;그러니까 이번에는……"
2000406-10 = "#na;마시로 수영복ND;선생님의 머리 위에 있습니다."
2000406-11 = "[s] \"머리 위?\""
2000406-12 = "#st;[0,0];instant;1;"
2000406-13 = "#clearST\n#zmc;move;0,222;2528;500\n#wait;1000"
2000406-14 = "#zmc;move;0,0;3160;250\n#wait;1250\n3;마시로 수영복ND;01\n#3;greeting\n#3;a"
2000406-15 = "3;마시로 수영복ND;01;일부러 찾아와 주시다니, 무슨 문제라도 있습니까?\n#3;em;[반응]"
2000406-16 = "3;마시로 수영복ND;02;아하, 아이스크림을 가져오셨군요."
2000406-17 = "3;마시로 수영복ND;03;마침 더위로 목이 마르던 참이었는데…… 감사합니다, 선생님.\n#3;em;[반짝]\n#3;greeting"
2000406-18 = "[s] \"어디에 있었던 거야?\""
2000406-19 = "3;마시로 수영복ND;02;이 앞에 설치된 해안용 감시 망루 위에 앉아 있었습니다."
2000406-20 = "3;마시로 수영복ND;01;높은 감시 망루 위에서라면 온 해수욕장이 한눈에 내려다 보이거든요."
2000406-21 = "[s] \"마시로는 정말 높은 곳을 좋아하는구나.\""
2000406-22 = "3;마시로 수영복ND;99;딱히 높은 곳을 좋아하기 때문에 감시 망루에 올라가 있었던 것은 아닙니다."
2000406-23 = "3;마시로 수영복ND;02;해수욕장에서 벌어지는 일을 한눈에 파악하기 위해서는, 그저 높은 곳이 편했을 뿐입니다."
2000406-24 = "3;마시로 수영복ND;01;게다가 높은 곳은 사각이 없기 때문에 저격이 용이할 뿐더러…….\n#3;em;…"
2000406-25 = "3;마시로 수영복ND;03;바람이 선선하게 부니 오랜 시간 동안 잠복하고 있어도 열사병에 걸릴 위험이 적습니다."
2000406-26 = "3;마시로 수영복ND;03;……물론 이곳에서 보는 풍경이 더 아름답다는 건 부인하기 어렵네요.\n#3;em;[음표]"
2000406-27 = "3;마시로 수영복ND;02;참, 선생님. 말이 나온 김에 함께 감시 망루 위에 올라가 보시지 않으시겠습니까?"
2000406-28 = "3;마시로 수영복ND;01;같은 아이스크림이라도 풍경이 좋은 망루 위에서 먹는다면 더 맛있게 느껴질 겁니다."
2000406-29 = "[s] \"두 사람이 함께 오르기에는 좁지 않을까?\""
2000406-30 = "3;마시로 수영복ND;03;괜찮습니다. 자리가 좁긴 하지만 밀착해서 앉으면 두 사람 정도는 충분히 앉을 수 있습니다.\n#3;em;[반짝]"
2000406-31 = "3;마시로 수영복ND;06;그게 아니라면…… 혹시 저와 가까이 앉는 게 부담스러우십니까?\n#3;em;…"
2000406-32 = "[s] \"그렇지는 않아.\""
2000406-33 = "3;마시로 수영복ND;03;그럼 결정이군요. \n#3;em;[하트]\n#3;greeting"
2000406-34 = "#st;[0,0];instant;1;"
2000406-35 = "#clearST\n3;마시로 수영복ND;03\n#3;d\n#wait;1000"
2000406-36 = "3;마시로 수영복ND;03\n#3;a\n#wait;1500\n#3;closeup"
2000406-37 = "3;마시로 수영복ND;03;사다리가 미끄러우니 제가 발을 딛는 곳을 잘 보고 따라 올라와주세요.\n#3;closeup\n#3;em;[음표]"
2000406-38 = "#all;hide"
2000406-39 = "#na;이후, 해가 질 때까지 마시로와 함께 해변을 바라보다 망루에서 내려왔다."

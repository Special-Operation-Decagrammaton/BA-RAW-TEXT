[translation]
2000406-1 = "狙擊手與煙霧皆喜歡高處"
2000406-2 = "無為濱"
2000406-3 = "（為了努力做志工服務的麻白，帶著冰淇淋來到了海邊）"
2000406-4 = "[s] 「咦？明明說是在這邊，是還沒到嗎……？」"
2000406-5 = "啊，老師。我在這裡。"
2000406-6 = "[s1] 「……？」\n[s2] 「……難道又穿了吉利服？」"
2000406-7 = "啊，不是。那個……"
2000406-8 = "啊，不是。那個……"
2000406-9 = "我在這邊，這邊。"
2000406-10 = "在老師的頭上。"
2000406-11 = "[s] 「頭上……？」"
2000406-15 = "謝謝老師專程來找我，請問有什麼事嗎？"
2000406-16 = "咦，冰淇淋……？"
2000406-17 = "謝謝老師。我正好想吃一些冰涼的東西呢。"
2000406-18 = "[s] 「喔～原來你坐在這上面啊……」"
2000406-19 = "是的，就是海邊和泳池常見的「瞭望台」……是這麼稱呼嗎？#n總之就是常常會看見救生員坐在上面的東西。"
2000406-20 = "因為坐在上面就能將整個海水浴場一覽無遺。"
2000406-21 = "[s] 「麻白真的很喜歡高處呢。」"
2000406-22 = "與其說是因為我喜歡高處……"
2000406-23 = "應該說為了掌握整個海邊發生的事，這是最好的方法。"
2000406-24 = "畢竟高處的死角也會比較少。"
2000406-25 = "再加上風也會比較涼快，就算長時間待著，中暑的機率也很低。"
2000406-26 = "……而且從上面看出去的景色也很美麗。"
2000406-27 = "對了，老師。既然都來了，老師要不要也上去瞭望台呢？"
2000406-28 = "看著美麗的景色吃著冰淇淋，說不定會感覺更美味唷。"
2000406-29 = "[s] 「兩個人一起坐不會很窄嗎？」"
2000406-30 = "只要緊靠在一起，就一定沒問題。"
2000406-31 = "啊……還是說我現在全身汗臭味……？"
2000406-32 = "[s] 「不會，完全沒問題。」"
2000406-33 = "既然這樣……"
2000406-37 = "梯子有點滑要小心唷。我先上去，老師要看清楚我腳踩的地方喔。"
2000406-39 = "（後來，便和麻白一起在瞭望台上，眺望海邊直到太陽下山）"

[translation]
34250-1 = "第25話;重要之人"
34250-3 = "[ns] 「大家還好嗎？」"
34250-4 = "嗯……勉勉強強。"
34250-5 = "啊啊……"
34250-6 = "真，真的結束了對吧……？"
34250-7 = "貝雅特里榭呢……"
34250-8 = "[s] 「逃走了哦。」"
34250-12 = "逃走了……？"
34250-13 = "[s] 「不過，我想他應該不會再讓大家受苦了。」"
34250-14 = "……"
34250-15 = "……"
34250-16 = "……"
34250-23 = "老師，謝謝你救了我們。"
34250-24 = "[s] 「不戴著面具沒關係嗎？」"
34250-25 = "……嗯，沒關係。"
34250-26 = "雖然我還不清楚為何夫人要我戴著面具……"
34250-27 = "不過被梓的炸彈攻擊的時候，有個裝置保護了我的身體……#n我想，這個面具就是為了讓它啟動所必須的東西吧。"
34250-28 = "到頭來，夫人是為了保護我才讓我戴上這個面具的吧。"
34250-29 = "[s1] 「那麼，之後有需要的時候就戴著吧。」\n[s2] 「敦子受傷的話有很多人會難過的。」"
34250-30 = "……"
34250-31 = "……"
34250-32 = "嗯……那我偶爾會戴上它的。"
34250-33 = "……老師。"
34250-34 = "依照約定……既然已經救出了公主……#n我就隨你處置吧。"
34250-35 = "[s] 「隨我處置……？」"
34250-36 = "我是這一切的元兇……伊甸園條約的事件、聖亞的襲擊、渚的襲擊……#n美咲、日和、敦子……大家都是因為我才會變成這樣的。"
34250-37 = "聯邦學生會、三一……就算是矯正局也沒關係。#n把我送到老師覺得最適合的地方吧。"
34250-39 = "你在說什麼……！？"
34250-40 = "隊，隊長……！？"
34250-41 = "……"
34250-42 = "別，別開玩笑了隊長……自己一個人這樣……！"
34250-44 = "不……一直以來，我都拋棄著應該背負的責任活著……"
34250-45 = "這樣就好……現在就是該負責的時候。"
34250-46 = "隊，隊長……"
34250-48 = "[ns3] 「………………」\n[ns4] 「……沒錯。沙織要負起責任才行。」"
34250-52 = "[ns] 「長久以來，沙織一直都為了保護周圍的孩子們努力著。」"
34250-55 = "[ns5] 「照顧著他人、保護著他人、」\n[ns6] 「忍耐著──背負著這些責任。」"
34250-59 = "[ns7] 「所以才會在這不正常的環境裡接受了瘋狂的教育，」\n[ns8] 「做出了錯誤的選擇。我是這麼想的。」"
34250-64 = "[ns] 「沙織你們是犯了罪的壞學生……這點不會改變。」"
34250-65 = "……"
34250-66 = "……"
34250-67 = "……"
34250-69 = "[ns] 「即便如此，也不代表你們的痛苦就是理所當然的。」"
34250-72 = "[ns9] 「孩子們會受苦並不是孩子們的錯。」\n[ns10] 「創造出會讓孩子們痛苦的世界的責任，應該由身為大人的我來承擔。」"
34250-75 = "你，你在說什麼……！這樣的話……！！"
34250-76 = "那麼……我到底……我應該負起什麼責任呢……？"
34250-78 = "……"
34250-79 = "隊長……"
34250-80 = "……"
34250-86 = "[ns] 「你該負起責任的，是你自己的人生哦，沙織。」"
34250-87 = "……那，那是什麼意思，我不明白。"
34250-88 = "……我能夠明白。"
34250-89 = "公主……？"
34250-90 = "沙織，你有想做的事嗎？"
34250-94 = "梓說學習新的事物很快樂。#n和朋友在一起很幸福。"
34250-99 = "沙織喜歡的東西是什麼呢？想做的事是什麼呢？興趣是什麼呢？"
34250-100 = "喜歡的食物是什麼呢？#n至今為止，我一個都沒有聽過。"
34250-101 = "沙織，你未來的夢想是什麼呢？#n有想要成為什麼樣的人嗎？"
34250-103 = "……那，那種東西……"
34250-104 = "我不知道……這些事情，我一次都沒有想過……"
34250-105 = "我喜歡什麼、想做什麼……我一個也不知道……"
34250-107 = "沙織你很有責任感……又很有判斷力……嗯──。"
34250-108 = "也，也很會教導別人……雖，雖然……教我的時候很可怕……"
34250-109 = "而且很認真哦。很擅長制定計畫，指揮也很厲害。"
34250-114 = "……"
34250-115 = "[ns] 「這樣啊……那麼，說不定沙織你……」"
34250-117 = "[ns] 「將來能成為一個好老師呢。」"
34250-118 = "……！！！"
34250-121 = "隊長當老，老師……！？"
34250-122 = "嘛，有點難以想像就是了。"
34250-123 = "不，沒有那種事哦。#n感覺很適合……不是嗎？"
34250-125 = "……我不知道。我真的……能有那種未來……？"
34250-129 = "那種事……對自己的人生負責的意義、我喜歡做的事，那樣的未來……完全搞不懂……"
34250-130 = "我……"
34250-131 = "……我真的可以……活下去嗎？"
34250-132 = "[s] 「這個答案就交給你自己去尋找吧。」"
34250-133 = "……"
34250-136 = "……"
34250-137 = "……"
34250-138 = "……"
34250-142 = "[ns] 「那麼，就在這裡告別吧。」"
34250-144 = "什……！？#n這麼突然……請等一下，老師！？"
34250-145 = "[s] 「還有需要我幫助的學生。」"
34250-147 = "等，等一下啊……！！"
34250-148 = "我……我們……"
34250-152 = "不，原來如此……"
34250-153 = "這是我應該去尋找的……"
34250-154 = "[s] 「身為大人的我跟你保證──你一定能找出那個答案的。」"
34250-155 = "……！！！"
34250-161 = "走，走掉了嗎……？"
34250-162 = "……肯定是去救彌香了吧。"
34250-163 = "一，一個人去沒問題嗎……"
34250-165 = "……應該沒問題的。那時侯也是這樣的。"
34250-166 = "那時候……？"
34250-167 = "老師是大人，我想他一定有什麼辦法的。"
34250-168 = "貝雅特里榭已經離開，壓迫著奧利斯自治區的一切都已經消失了。"
34250-169 = "……"
34250-170 = "隊長……"
34250-171 = "沙織，還好嗎……？"
34250-172 = "嗯……#n雖然……什麼都還搞不清楚……即便如此……"
34250-178 = "我第一次……覺得自己可以就這麼留在這個世界上。"
34250-193 = "咳……咳。"
34250-196 = "……唉，全身都破破爛爛的了……"
34250-197 = "不過……成功撐到太陽升起了哦……雖然挺辛苦的……"
34250-198 = "敦子肯定得救了吧？"
34250-199 = "沙織和其他奧利斯小隊的人也……大家都迎來了HappyEnd。#n老師和他們在一起的話，肯定……"
34250-203 = "嗯……這樣就夠了……"
34250-211 = "抱歉，老師……我可能就到此為止了……"
34250-212 = "雖然很想跟老師一起回去……"
34250-230 = "[ns] 「等等！！！」"
34250-232 = "老，老……老師！？"
34250-233 = "[s] 「抱歉我來晚了，彌香。」"
34250-234 = "老，老師……你怎麼會來這裡……？#n為，為什麼……？"
34250-235 = "[s] 「我說過了吧？我永遠都是彌香的同伴。」"
34250-236 = "……！！！"
34250-237 = "[s] 「彌香遇到危機的時候，我當然會趕來。」"
34250-238 = "怎，怎麼會……我，我是……壞孩子……"
34250-239 = "明明不是值得被老師拯救的存在……"
34250-246 = "況，況且……老，老師一個人要怎麼和那個聖徒會對抗呢……？"
34250-247 = "那個和我們的強度不是同一個次元的哦，老師……#n雖，雖然我挺強的……但是那個簡直就是犯規一樣的存在哦！？"
34250-248 = "老師，算我求你了快住手吧！#n我沒有那種價值……現在快逃吧……！！"
34250-249 = "[s] 「彌香是問題兒童哦。」"
34250-251 = "[ns11] 「不過，就算是問題百出的不良學生……」\n[ns12] 「會拋下遇到危險的學生逃走的老師，不管在哪都不存在！」"
34250-254 = "[ns] 拿出大人的卡片"
34250-258 = "[ns] 「……你們，」"
34250-260 = "[ns13] 「對我重要的學生做了什麼！！」\n[ns14] 「對我重要的公主做了什麼！！」"
34250-261 = "！？"
34250-263 = "……哇哦。"

[translation]
34250-1 = "第25話;大切な人"
34250-3 = "[ns] \"みんな大丈夫？\""
34250-4 = "うん……辛うじて。"
34250-5 = "ああ……。"
34250-6 = "も、もう本当に終わりなんですよね……？"
34250-7 = "ベアトリーチェは……。"
34250-8 = "[s] \"逃げたよ。\""
34250-12 = "逃げた……？"
34250-13 = "[s] \"でも、もう二度とみんなを苦しめる事はないと思う。\""
34250-14 = "……。"
34250-15 = "……。"
34250-16 = "……。"
34250-23 = "先生、私たちを助けてくれてありがとう。"
34250-24 = "[s] \"マスクはもう付けなくてもいいの？\""
34250-25 = "……うん、大丈夫。"
34250-26 = "マダムがどうして私にマスクを付けさせたがってたのか、分からなかったんだけど……。"
34250-27 = "アズサの爆弾に巻き込まれた時、私の体を保護してくれた装置があって……#n多分、それを作動させるのに必要だったんだと思う。"
34250-28 = "結局、マダムは私を守るためにこのマスクを付けさせていたんだろうね。"
34250-29 = "[s1] \"じゃあ、今後も必要な時には付けようか。\"\n[s2] \"アツコが怪我をしたら悲しむ人が多いからね。\""
34250-30 = "……。"
34250-31 = "……。"
34250-32 = "そうだね……マスクはたまに付けるようにする。"
34250-33 = "……先生。"
34250-34 = "約束通り……姫を救ったから……#n先生の好きにしてくれ。"
34250-35 = "[s] \"好きに……？\""
34250-36 = "私がすべての元凶だ……エデン条約事件も、セイア襲撃も、ナギサ襲撃も………#nミサキも、ヒヨリも、アツコも……みんな私のせいでこうなってしまった。"
34250-37 = "連邦生徒会でも、トリニティでも……矯正局でも何でも構わない。#n先生が思う、一番適切な所に私を送ってくれ。"
34250-39 = "一体何を……！？"
34250-40 = "り、リーダー……！？"
34250-41 = "……。"
34250-42 = "ふ、ふざけないでリーダー……一人だけそんな……！"
34250-44 = "いや……私は、長い間負うべき責任を放棄して生きてきた……。"
34250-45 = "これでいい……今がその時なんだ。"
34250-46 = "り、リーダー……。"
34250-48 = "[ns3] \"………………。\"\n[ns4] \"……そうだね。サオリは責任を負わないといけない。\""
34250-52 = "[ns] \"サオリは長い間、周囲の子たちを守るために頑張ってきた。\""
34250-55 = "[ns5] \"他人の面倒を見て、守り、\"\n[ns6] \"耐え――責任を負ってきたんだ。\""
34250-59 = "[ns7] \"だからこそ、おかしな環境で狂った教育を受け、\"\n[ns8] \"誤った選択をしてきたのだと思う。\""
34250-64 = "[ns] \"サオリたちは、罪を犯した悪い生徒……それは変わらない。\""
34250-65 = "……。"
34250-66 = "……。"
34250-67 = "……。"
34250-69 = "[ns] \"だからといって、苦しんで当然なわけじゃない。\""
34250-72 = "[ns9] \"子供たちが苦しむのは、その子のせいじゃない。\"\n[ns10] \"子供たちが苦しむような世界を作った責任は、大人の私が負うものだからね。\""
34250-75 = "な、何言ってるんだ……！そんな……！！"
34250-76 = "では……一体私は……私は何の責任を負わなければならないんだ……？"
34250-78 = "……。"
34250-79 = "リーダー……。"
34250-80 = "……。"
34250-86 = "[ns] \"責任を負うのは、自分の人生そのものだよ、サオリ。\""
34250-87 = "……ど、どういう意味なのか、分からない。"
34250-88 = "……私は分かる気がする。"
34250-89 = "姫……？"
34250-90 = "サオリ、やりたい事はある？"
34250-94 = "アズサは学ぶのが楽しいって言ってた。#n友達と一緒にいる事が幸せだって。"
34250-99 = "サオリの好きなものは何？やりたいことは？趣味は？"
34250-100 = "好きな食べ物は？#n私は今まで、一つも聞いたことがない。"
34250-101 = "サオリ、将来の夢は？#nなりたいものはある？"
34250-103 = "……そんな、そんなものは……"
34250-104 = "わからない……一度も、そんなもの考えた事がなかった……。"
34250-105 = "私が何が好きなのか、何がしたいのか……私は、一つも分からない……。"
34250-107 = "サオリは、責任感が強くて………決断力があって……んーと。"
34250-108 = "お、教えるのが上手です……いろいろ……教えてくれる時は、怖いですけど……。"
34250-109 = "真面目ではあるよね。計画を立てるのも上手いし、指揮をするのも上手だし。"
34250-114 = "……。"
34250-115 = "[ns] \"そっか……それなら、サオリは今後……。\""
34250-117 = "[ns] \"いい先生になれるかもしれないね。\""
34250-118 = "……！！！"
34250-121 = "リーダーがせ、先生に……！？"
34250-122 = "まあ、あんまり想像はつかないけど。"
34250-123 = "ううん、そんな事ないよ。#nよく似合いそう……でしょう？"
34250-125 = "……分からない。私に……そんな未来が本当に……？"
34250-129 = "そんな……人生の責任を負うという意味も、私が好きなことも、そんな未来も……何も分からない……。"
34250-130 = "私は……。"
34250-131 = "……私は、生きていても……いいのか？"
34250-132 = "[s] \"その答えは、自分で見つけようね。\""
34250-133 = "……。"
34250-136 = "……。"
34250-137 = "……。"
34250-138 = "……。"
34250-142 = "[ns] \"じゃあ、ここでお別れだよ。\""
34250-144 = "なっ……！？#n急に……待ってくれ先生！？"
34250-145 = "[s] \"まだ助けが必要な生徒がいるんだ。\""
34250-147 = "ま、待ってくれ……！！"
34250-148 = "私は……私たちは……。"
34250-152 = "いや、そうか……"
34250-153 = "それを見つけるのが私の……。"
34250-154 = "[s] \"大人の私が保証するよ――その答えは、必ず見つけられる。\""
34250-155 = "……！！"
34250-161 = "い、行ってしまいました……？"
34250-162 = "……きっと、ミカを助けに行ったんでしょ。"
34250-163 = "ひ、一人で大丈夫でしょうか……。"
34250-165 = "……大丈夫だと思うよ。あの時もそうだったから。"
34250-166 = "あの時……？"
34250-167 = "先生は大人だから、きっと何か方法があるんだと思うよ。"
34250-168 = "もうベアトリーチェもいなくなって、アリウス自治区を抑圧するのはすべて消えたから。"
34250-169 = "……。"
34250-170 = "リーダー……。"
34250-171 = "サオリ、大丈夫……？"
34250-172 = "うん……#nまだ……何も分からないけど……それでも……。"
34250-178 = "初めて……この世界にいてもいいのだと、思う事ができたよ。"
34250-193 = "ゲホッ……ゲホッ。"
34250-196 = "……あーあ、全身どっろどろ……。"
34250-197 = "でも……日が昇るまで耐えきったよ……結構大変だったけど……。"
34250-198 = "きっと、アツコは助けられたよね？"
34250-199 = "サオリも、他のスクワッドも……みんな、ハッピーエンドを迎えられたかな。#n先生が一緒にいただろうから、きっと……。"
34250-203 = "うん……それなら、いいや……。"
34250-211 = "ごめんね、先生……私はここまでかな……"
34250-212 = "先生と一緒に、帰りたかったのに……。"
34250-230 = "[ns] \"待って！！！\""
34250-232 = "せ、せ……先生！？"
34250-233 = "[s] \"遅くなってごめんね、ミカ。\""
34250-234 = "せ、先生……なんでここに……？#nど、どうして……？"
34250-235 = "[s] \"言ったでしょ？私はいつもミカの味方だって。\""
34250-236 = "……！！"
34250-237 = "[s] \"ミカのピンチには、当然駆けつけるよ。\""
34250-238 = "そ、そんな……わ、私は……悪い子で……"
34250-239 = "先生が救う価値のある存在じゃないのに……。"
34250-246 = "そ、それに……せ、先生一人であの聖徒会をどうやって相手にするの……？"
34250-247 = "アレは次元が違うよ、先生……#nわ、私も結構強いけど……アレは反則みたいなものだよ！？"
34250-248 = "先生、お願いだからやめて！#n私はそんな価値のある存在じゃないよ……今からでも逃げて……！！"
34250-249 = "[s] \"ミカは問題児だよ。\""
34250-251 = "[ns11] \"でも、問題だらけの不良生徒だとしても……。\"\n[ns12] \"危険に晒されている生徒に背を向ける先生なんて、どこにもいない！\""
34250-254 = "[ns] 大人のカードを取り出す。"
34250-258 = "[ns] \"……私の。\""
34250-260 = "[ns13] \"私の大切な生徒に何してるの！！\"\n[ns14] \"私の大切なお姫様に何してるの！！\""
34250-261 = "！？"
34250-263 = "……わーお。"

[translation]
34250-1 = "Episode 25; Someone Special"
34250-3 = "[ns] \"Is everyone okay?\""
34250-4 = "I can stand, at least."
34250-5 = "Yes..."
34250-6 = "I-Is it really over?"
34250-7 = "Beatrice..."
34250-8 = "[s] \"She ran away.\""
34250-12 = "She got away?"
34250-13 = "[s] \"But she won't be able to hurt you anymore.\""
34250-14 = "..."
34250-15 = "..."
34250-16 = "..."
34250-23 = "Sensei, thank you for helping us. "
34250-24 = "[s] \"I'm glad you're okay. Do you need your mask?\""
34250-25 = "...I think I'll be fine."
34250-26 = "Madame was the one who gave me that mask."
34250-27 = "When I got caught in Azusa's bomb, some kind of device protected me. I believe it came from the mask."
34250-28 = "It must have been Madame's failsafe. To ensure I didn't die before the ritual."
34250-29 = "[s1] \"Then you should wear it when you need it.\"\n[s2] \"A lot of people would be sad if you got hurt, Atsuko.\""
34250-30 = "..."
34250-31 = "..."
34250-32 = "You're right. I don't think I have to hide my voice again...but I will keep myself safe."
34250-33 = "Okay. Sensei."
34250-34 = "We saved Hime. You can do whatever you need to now."
34250-35 = "[s] \"Whatever I need...?\""
34250-36 = "I was the culprit behind everything... The Eden Treaty incident, the Seia and Nagisa attacks... Misaki, Hiyori, and Atsuko's pain... I'm responsible for all of it. "
34250-37 = "The General Student Council, Trinity...or the Corrections Bureau... Send me wherever you think is fitting."
34250-39 = "What are you saying, Saori?"
34250-40 = "L-Leader?!"
34250-41 = "..."
34250-42 = "This is a bad joke, Leader."
34250-44 = "No... I've done too much harm with no consequences."
34250-45 = "But I'm ready now. I want to take responsibility."
34250-46 = "L-Leader..."
34250-48 = "[ns3] \".........\"\n[ns4] \"You're right. You're responsible for a lot, Saori.\""
34250-52 = "[ns] \"You've been responsible for protecting everyone around you, all this time.\""
34250-55 = "[ns5] \"You've been taking care of them, protecting them, and enduring the pain.\"\n[ns6] \"You've shouldered that responsibility all by yourself.\""
34250-59 = "[ns7] \"You grew out of the concrete and had to adapt.\" \n[ns8] \"You made horrible decisions and learned even worse lessons.\""
34250-64 = "[ns] \"You're all delinquent students who've caused everyone trouble.\""
34250-65 = "..."
34250-66 = "..."
34250-67 = "..."
34250-69 = "[ns] \"But that doesn't mean you deserve to suffer.\""
34250-72 = "[ns9] \"Kids deserve to make mistakes. Kids don't deserve hurt and pain.\" \n[ns10] \"Adults like me are responsible for creating a world that hurt you.\""
34250-75 = "What are you saying? That's...!"
34250-76 = "Then... What do I do? What am I supposed to do now, Sensei?"
34250-78 = "..."
34250-79 = "Leader..."
34250-80 = "..."
34250-86 = "[ns] \"You're just supposed to live, Saori.\""
34250-87 = "Live...? I don't understand."
34250-88 = "I do. I think.  "
34250-89 = "Hime?"
34250-90 = "Saori, is there anything you want to do?"
34250-94 = "Azusa said she liked learning and spending time with her friends."
34250-99 = "Is there anything you want to try? What do you WANT to do, Saori?"
34250-100 = "Do you have a favorite food? You've never spoken of anything except protecting us."
34250-101 = "What do you want to be when you grow up? Do you have any dreams?"
34250-103 = "I've never..."
34250-104 = "I don't know... I've never thought about anything like that before... "
34250-105 = "What I like? What I want? They're foreign concepts to me..."
34250-107 = "Saori, you're responsible, strong, and..."
34250-108 = "A-And you're really good at teaching, even though you're kinda scary..."
34250-109 = "You never stop working and can come up with a plan in any situation. And you take so much initiative it exhausts me."
34250-114 = "..."
34250-115 = "[ns] \"Hmm, I see. Then Saori could...\""
34250-117 = "[ns] \"...be a good teacher one day.\""
34250-118 = "...!"
34250-121 = "L-Leader as a teacher?!"
34250-122 = "It is hard to imagine, isn't it?"
34250-123 = "Do you think so? I can see it perfectly."
34250-125 = "But I can't fathom having a future at all, let alone what I would do with it."
34250-129 = "I've never thought about life beyond surviving the current moment. I don't know what that means...to just live."
34250-130 = "I..."
34250-131 = "Do I deserve...to dream of a future?"
34250-132 = "[s] \"You need to find those answers on your own, Saori.\""
34250-133 = "..."
34250-136 = "..."
34250-137 = "..."
34250-138 = "..."
34250-142 = "[ns] \"With that, it's time to say goodbye, Squad.\""
34250-144 = "You're leaving? S-Sensei!"
34250-145 = "[s] \"I'm sorry, but another student needs my help.\""
34250-147 = "W-Wait. I'm not ready..."
34250-148 = "I... We..."
34250-152 = "No, you're right."
34250-153 = "I'll find the answer on my own."
34250-154 = "[s] \"I know you will, Saori. I've always known.\""
34250-155 = "...!"
34250-161 = "S-Sensei left so fast!"
34250-162 = "Another student in need... They're going back to save Mika."
34250-163 = "A-All alone? Will they be okay?"
34250-165 = "Yes. I'm sure of it. Sensei pulled through last time, after all."
34250-166 = "Last time?"
34250-167 = "Yes, and every other time. Sensei will have a plan."
34250-168 = "Beatrice and all her powers suppressing the Arius district have disappeared."
34250-169 = "..."
34250-170 = "Leader..."
34250-171 = "Saori? How are you feeling?"
34250-172 = "I'm okay. I'm confused, and I don't really understand everything Sensei said yet."
34250-178 = "But for the first time in my life, I feel like it's okay for me to be alive."
34250-193 = "*cough* *cough*"
34250-196 = "Ugh. I'm so not cute right now."
34250-197 = "It hurts a lot, but at least I made it to sunrise."
34250-198 = "They must have saved Atsuko by now, right?"
34250-199 = "With Sensei by their side, Saori and the rest must have had their happy ending."
34250-203 = "That's...good... What a relief..."
34250-211 = "Yeesh, I guess this is it for me. I'm sorry, Sensei."
34250-212 = "I really would've gone back with you, if I had the chance.  "
34250-230 = "[s] \"Mika!\""
34250-232 = "S-S-Sensei...?!"
34250-233 = "[s] \"I'm sorry I'm late. Did you wait long?\""
34250-234 = "It's really you. What are you doing here?!"
34250-235 = "[s] \"Infinite chances, remember?\""
34250-236 = "...!"
34250-237 = "[s] \"Whenever you're in danger, I'll come running.\""
34250-238 = "B-But...I'm the villain here...  "
34250-239 = "I don't deserve your mercy..."
34250-246 = "Did you think this through? How are you going to fight the Council?"
34250-247 = "I-I'm the strongest, and I couldn't do anything. It's honestly unfair, how strong they are."
34250-248 = "You have to run, Sensei. I won't let you get hurt for me."
34250-249 = "[s] \"Mika, you really are a troublemaker.\""
34250-251 = "[ns11] \"But I won't abandon even my bad students.\"\n[ns12] \"No teacher should turn away from a student in danger!\""
34250-254 = "[ns] Take out your credit card."
34250-258 = "[ns] \"How...how dare you...\""
34250-260 = "[ns13] \"How dare you treat my precious student like that!\"\n[ns14] \"How dare you treat my precious princess like that!\""
34250-261 = "...Sensei."
34250-263 = "Wow..."

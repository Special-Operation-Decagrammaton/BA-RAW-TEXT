[translation]
84312100301-6 = "ถึงจะรู้สึกแบบนี้มาตลอด แต่ครั้งนี้น่ะ ฉันรู้สึกเหมือนมีใครมาช่วยเราอยู่เลย!"
84312100301-7 = "ช่วยงั้นเหรอ... หมายถึงคุณครูเหรอ?"
84312100301-8 = "แล้วที่บอกว่ารู้สึกแบบนี้มาตลอด งั้นแสดงว่ามีใครตรวจตรามิลเลเนียมอยู่งั้นเหรอ?"
84312100301-9 = "ไม่! ไม่ได้หมายถึงคุณครูหรอก ส่วนเรื่องตรวจตราน่ะ... ฉันว่ามันเป็นอะไรที่ดีกว่านั้นนะ?"
84312100301-11 = "(...!!)"
84312100301-13 = "รุ่นพี่ เรื่องนั้นน่ะหมายถึงใครเหรอ...?"
84312100301-14 = "อืม..."
84312100301-18 = "ไม่รู้สิ...! ฉันก็ยังไม่ได้คิดถึงขนาดนั้นน่ะ"
84312100301-24 = "อะไรกันล่ะนั่น"

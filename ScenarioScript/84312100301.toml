[translation]
84312100301-6 = "雖然我一直都這麼覺得，不過這次有人在幫我們的感覺好像特別強烈！"
84312100301-7 = "有人在幫我們……是指老師嗎？"
84312100301-8 = "而且一直都這麼覺得的意思是……難道有人在監視著千年嗎？"
84312100301-9 = "不對不對！我指的不是老師。#n還有與其說是監視……不如說是令人舒服的感覺？"
84312100301-11 = "（……！！）"
84312100301-13 = "……？#n前輩，那你指的是誰呢？"
84312100301-14 = "唔嗯……"
84312100301-18 = "……不知道！這點我也還沒想到。"
84312100301-24 = "什麼跟什麼啊。"

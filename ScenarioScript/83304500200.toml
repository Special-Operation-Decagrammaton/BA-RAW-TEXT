[translation]
83304500200-7 = "這樣風紀委員會就全員到齊了吧。"
83304500200-8 = "是，已經全員到齊了。對吧伊織？"
83304500200-9 = "不是，為什麼要特別叫我啊亞子醬！？"
83304500200-10 = "因為我們風紀委員會要是出了什麼差錯，是伊織造成的可能性很高。"
83304500200-11 = "誰叫伊織時不時就會掉入陷阱……"
83304500200-12 = "唔！真不甘心！而且更不甘心的是我竟然無法反駁！"
83304500200-17 = "委員長，訓練已經準備就緒。"
83304500200-18 = "嗯，我知道了。#n風紀委員會反恐訓練，開始。"

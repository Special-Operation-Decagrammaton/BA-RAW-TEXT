[translation]
83304500200-7 = "คณะกรรมการวินัยมากันครบแล้วใช่ไหม?"
83304500200-8 = "ค่ะ มากันทุกคนแล้วค่ะ ใช่ไหมคะ อิโอริ?"
83304500200-9 = "อ้าว ทำไมมาถามจากฉันล่ะ อาโกะจัง?!"
83304500200-10 = "ก็ถ้าในคณะกรรมการวินัยมีใครหายไป ส่วนใหญ่ก็เป็นอิโอรินี่คะ"
83304500200-11 = "ก็อิโอริ คุณน่ะชอบตกหลุมพรางบ่อยๆ นี่คะ"
83304500200-12 = "ฮึ่ม! ไม่ใช่สักหน่อย! แบบนี้ไม่ยุติธรรมนะ! ไม่ยุติธรรมหนักไปอีกที่ฉันปฏิเสธไม่ได้ด้วย!"
83304500200-17 = "ท่านประธานคะ ฉันเตรียมการเพื่อการฝึกฝนเสร็จทั้งหมดแล้วค่ะ"
83304500200-18 = "อืม งั้นมาเริ่มกันเลย ฉันขอเปิดการฝึกฝนการต่อต้านการก่อการร้ายของคณะกรรมการวินัย ณ บัดนี้"

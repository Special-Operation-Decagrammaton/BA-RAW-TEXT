[translation]
10050040-1 = "ตอนที่ 4;Covert Ops"
10050040-3 = "เอาละ วันนี้ก็มาตั้งใจทำงานกันเถอะค่ะ!"
10050040-9 = "หัวหน้า ฉันรู้สึกเหมือน... เห็นนักเรียนกลุ่มที่ไม่ได้เจอเมื่อวานเลยค่ะ"
10050040-10 = "นั่นสินะคะ... บรรยากาศดูเปลี่ยนไปยังไงไม่รู้ ชุดนักเรียนก็ยังเป็นสีดำอีก..."
10050040-19 = "แล้วนักเรียนทรีนิตี้คนอื่นๆ ก็... เหมือนจะหลบเลี่ยงนักเรียนชุดดำกลุ่มนี้ด้วยค่ะ"
10050040-20 = "ฉันไม่รู้ว่าจะเปรียบเทียบแบบนี้ได้หรือเปล่า แต่รู้สึกเหมือนตอนที่เห็นนักเรียนของเราเจอ#nสำนักเลขาธิการเลยค่ะ..."
10050040-21 = "นี่อาจจะเป็นเรื่องภายในของทรีนิตี้ที่เราไม่รู้รายละเอียดมากนักก็ได้ เรามาสนใจงานของเรากันดีกว่าค่ะ"
10050040-22 = "มาตั้งใจหาเงินต่อกันเถอะค่ะ!"
10050040-28 = "พวกคุณทั้งสองคนอยู่ตรงนี้เองสินะคะ!"
10050040-35 = "อุ๊ย? คุณเป็นใครเหรอคะ?"
10050040-36 = "ชู่ว ลดเสียงลงก่อนนะคะ แล้วก็ตามฉันมาค่ะ"
10050040-37 = "คะ... คะ? นี่มันเรื่องอะไรกัน...?"
10050040-42 = "โรงยิมแห่งหนึ่ง"
10050040-43 = "แฮ่ก... แฮ่ก... ทำไมถึงต้องรีบวิ่งมาด้วยคะ..."
10050040-44 = "ที่นี่คือที่ไหนคะ? แล้วทำไมนักเรียนทรีนิตี้อย่างพวกคุณถึงพาพวกฉันมา...?"
10050040-45 = "เดี๋ยวก็รู้เองค่ะ"
10050040-46 = "ทุกคนคะ! พวกเธอมาถึงแล้วค่ะ! ตอนนี้ปลอดภัยแล้วค่ะ!"
10050040-54 = "นี่มัน... อะไรกัน...?"
10050040-55 = "ถ้าไม่เป็นการรบกวน ช่วยอธิบายให้ฉันเข้าใจหน่อยได้มั้ยคะ...?"
10050040-56 = "ค่ะ แน่นอนค่ะ เห็นทีฉันคงต้องเริ่มเล่าเรื่องกลุ่มนักเรียนในชุดสีดำ... ที่พวกคุณได้เห็นระหว่างหลบหนี#nมาที่นี่ก่อนค่ะ"
10050040-57 = "คนพวกนั้นก็คือชมรมทวงความยุติธรรม... จะเรียกว่าเป็นชมรมฝ่ายปกครองที่ปกป้องความสงบ#nเรียบร้อย และระเบียบวินัยของทรีนิตี้ก็ได้ค่ะ"
10050040-58 = "ชมรมทวงความยุติธรรมขยันขันแข็งกันมาก แล้วก็มีข่าวลือว่าประธานชมรมนั้นอัดคนจนแทบเป็น#nกระป๋องบุบบู้บี้เลยค่ะ..."
10050040-59 = "ถ้าเพิ่มเรื่องการจับผิดเข้าไปอีกหน่อย ก็เหมือนกับสำนักเลขาธิการเลยนะคะ..."
10050040-60 = "ตะ... แต่ทำไมคนพวกนั้นถึงมาอยู่ที่นี่ในวันนี้ล่ะคะ...?"
10050040-61 = "นั่นก็เพราะ... พวกคุณสองคนถูกชมรมทวงความยุติธรรมไล่ล่าอยู่น่ะสิคะ"
10050040-62 = "พวกฉันน่ะเหรอคะ...?"
10050040-63 = "ได้ฟังแล้วก็... สะอึกอยู่นะคะ ถึงจะไม่กล้าถามว่าทำไมถึงมาไล่ล่าพวกฉันก็เถอะ..."
10050040-64 = "ฉันจะบอกสถานการณ์ให้ฟังนะคะ ตั้งแต่เช้านี้ พวกคุณสองคน... ตกเป็นเป้าหมายในการตามจับแล้วค่ะ"
10050040-68 = "ถึงจะไม่มีคำสั่งที่เผยแพร่ต่อนักเรียนทั่วไปในทรีนิตี้อย่างพวกฉันก็เถอะค่ะ"
10050040-69 = "แต่อย่างน้อยก็พูดได้ว่าสมาชิกชมรมทวงความยุติธรรมจำนวนมากกำลังตามจับพวกคุณอยู่ค่ะ"
10050040-70 = "ตามข่าวลือที่ได้ยินมา นอกจากชมรมทวงความยุติธรรมแล้ว สภาน้ำชาก็มีส่วนเกี่ยวข้องอย่างลับๆ อยู่เบื้องบนด้วยค่ะ..."
10050040-71 = "สภาน้ำชาคืออะไรเหรอคะ?"
10050040-72 = "ก็คือ..."
10050040-74 = "สะ... สรุปว่า... สภานักเรียนของทรีนิตี้ที่มีขั้วอำนาจ 3 ขั้ว... กำลังไล่ล่าพวกฉันอยู่...?"
10050040-75 = "ถ้าจะเปรียบเทียบก็คือ ประธานเชริโน่กำลังล่าหัวพวกเราอยู่โดยตรงสินะคะ..."
10050040-76 = "ไม่สิ ถ้าเป็นประธานเชริโน่จริงๆ ละก็ คงมีวิธีให้หลุดพ้นจากสถานการณ์นี้ได้เป็นร้อยๆ วิธีเลยละ..."
10050040-77 = "หัวหน้า! เห็นมั้ยล่ะคะ ที่ฉันเคยบอกว่าการมาโรงเรียนที่เป็นเขตปกครองตนเองอื่นเป็นเรื่องอันตรายน่ะค่ะ...!"
10050040-78 = "ไม่ค่ะ... ไม่หรอกค่ะทาคาเนะ พวกเรายังมีโอกาสอยู่ค่ะ!"
10050040-79 = "เพราะถ้านักเรียนทรีนิตี้อยากส่งตัวพวกเราให้ชมรมทวงความยุติธรรม ก็คงทำไปตั้งนานแล้วค่ะ!"
10050040-80 = "จะยังมีโอกาสจริงๆ เหรอคะ..."
10050040-81 = "เอาเถอะค่ะ สรุปว่าถ้าพวกคุณสองคนถูกจับได้... ก็น่าจะโดนขับไล่ออกจากที่นี่ทันทีเลยค่ะ"
10050040-82 = "แล้วเงินที่ได้จากการขายทั้งหมดจะถูกยึดด้วยค่ะ"
10050040-83 = "ไม่ได้นะคะ! แบบนั้นก็เป็นการปราบปรามกิจกรรมทางเศรษฐกิจน่ะสิ!"
10050040-84 = "ส่วนหนังสือที่พวกฉันซื้อมาจากพวกคุณสองคน... ก็ต้องถูกยึดไปด้วยแน่ๆ ค่ะ..."
10050040-85 = "ไม่ได้นะคะ! แบบนั้นก็เป็นการปราบปรามกิจกรรมทางวัฒนธรรมน่ะสิคะ!"
10050040-86 = "ไม่ต้องเป็นห่วงนะคะ นั่นคือเหตุผลที่พวกฉันพาพวกคุณสองคนมาที่นี่ค่ะ"
10050040-87 = "ว่าแต่ ที่นี่เป็นสถานที่แบบไหนเหรอคะ?"
10050040-88 = "ค่ะ ถามได้ดีเลยค่ะ ที่นี่ก็คือ..."
10050040-89 = "'ฐานลับของคุณหนูแห่งทรีนิตี้' ค่ะ"
10050040-90 = "เมื่อกี้พวกคุณพูดว่าคุณหนูแห่งทรีนิตี้เหรอคะ?!"
10050040-91 = "หัวหน้า ชู่ว ชู่ว!"
10050040-92 = "พวกฉันทำความสะอาดโรงยิมที่ไม่ได้ใช้งานแล้ว แล้วก็จัดพื้นที่ให้ใช้การได้ค่ะ"
10050040-93 = "แน่นอนว่าชมรมทวงความยุติธรรมไม่รู้เกี่ยวกับสถานที่นี้ค่ะ"
10050040-94 = "และทุกคนที่มารวมตัวกันที่นี่จะช่วยเก็บเรื่องนี้เป็นความลับอย่างถึงที่สุดค่ะ สรุปว่าที่นี่คือฐานลับดีๆ แห่งหนึ่งตามชื่อเลยค่ะ"
10050040-98 = "ต่อให้อยู่ในโรงเรียนเดียวกัน แต่ก็ยังมีความลับและความขัดแย้งภายในกันงั้นเหรอคะ... ไม่ใช่เล่นๆ เลยนะคะทรีนิตี้ น่ากลัวจริงๆ เลยค่ะ"
10050040-99 = "การที่พวกเราชมรมสื่อสิ่งพิมพ์พูดเรื่องแบบนั้นออกมา นั่นก็ให้ความรู้สึกเหมือนเราประชดตัวเองเลยนะคะ..."
10050040-100 = "เอาเถอะค่ะ แต่ยังไงนี่ก็เป็นโอกาสอย่างหนึ่งนะคะ"
10050040-101 = "ก็เดิมทีแล้ววัฒนธรรมที่ถูกกดขี่จะได้รับการสนับสนุนและขายได้ดีกว่ายังไงล่ะคะ! สำหรับวัฒนธรรมแล้ว การกดขี่เปรียบเหมือนเหรียญรางวัลอย่างหนึ่งค่ะ!"
10050040-102 = "ต่อให้เป็นฉากหนึ่งที่ไม่ได้พิเศษอะไร แต่ถ้ามีการเซ็นเซอร์หรือปกปิด มันก็จะกลายเป็นการโปรโมต#nในตัวเอง จนยอดขายอาจเพิ่มขึ้นหลายเท่าเลยก็ได้!"
10050040-103 = "ถ้าพูดถึงเหรียญรางวัล ฉันก็นึกออกแต่เหรียญรางวัลหนวดค่ะ..."
10050040-104 = "แล้วมันก็ไม่มีประโยชน์อะไรด้วยค่ะ..."
10050040-105 = "เอาเป็นว่าพวกฉันเข้าใจที่พวกคุณพูดแล้วค่ะ"
10050040-106 = "ค่ะ ต้องขอบคุณจากใจจริงที่ช่วยพาพวกฉันมาที่นี่นะคะ"
10050040-107 = "ถ้างั้นเรามา... เริ่ม 'การขาย' ของวันนี้กันเลยมั้ยคะ?"
10050040-111 = "ในเมื่อได้หน้าร้านใหม่แล้ว..."
10050040-112 = "งั้นก็ฝากขั้นตอนต่อไปด้วยนะคะ ทาคาเนะ ฮิ ฮิ ฮิ"
10050040-113 = "ต้องทำแบบนั้นจริงๆ เหรอคะ...?"
10050040-114 = "แน่นอนอยู่แล้วค่ะ นี่ก็เป็นการตลาดนะคะ"
10050040-115 = "แค่คิดฉันก็อายจะแย่อยู่แล้วค่ะ..."
10050040-116 = "ลองคิดแบบนี้นะคะ ทาคาเนะ ทุกอย่างที่เราทำคือการทำเพื่อส่งเสริมกิจกรรมทางวัฒนธรรมค่ะ!"
10050040-117 = "อึก... ขะ... เข้าใจแล้วค่ะ หัวหน้า..."
10050040-124 = "สวัสดีค่ะ คุณโคฮารุ รู้สึกเหมือนไม่ได้เจอกันนานเลยนะคะ"
10050040-125 = "อะ... อื้อ... นะ... นั่นสินะ... วันนี้ฉันเห็นสมาชิกชมรมทวงความยุติธรรมหลายคนเลย มีเรื่องอะไรกันงั้นเหรอ?"
10050040-126 = "เรื่องนั้นน่ะเหรอคะ คือว่า... เอ่อ... มีข่าวลือว่ามีหนังสือแปลกๆ ในโรงเรียนเราน่ะค่ะ"
10050040-127 = "ก็เลยมีการออกคำสั่งให้พวกเราไปตรวจสอบแหล่งที่มา ขอบเขตการเผยแพร่ แล้วก็ผลกระทบของหนังสือเล่มนั้นในทรีนิตี้ค่ะ"
10050040-128 = "ถึงมองเผินๆ แล้วจะเป็นการช่วยงานชมรมอ่านหนังสือ..."
10050040-129 = "แต่ด้วยเหตุผลบางอย่าง ชมรมทวงความยุติธรรมก็มีข่าวลือกันภายในว่าเป็นคำสั่งโดยตรงจากสภาน้ำชาค่ะ..."
10050040-130 = "สะ... สภาน้ำชา?! เรื่องขึ้นไปถึงที่นั่นแล้วเหรอ!?"
10050040-131 = "พวกฉันก็ไม่รู้เหมือนกันค่ะ..."
10050040-132 = "เหมือนฉันเองก็... เคยได้ยินเรื่องเกี่ยวกับหนังสือเล่มนั้นเลย..."
10050040-133 = "จริงเหรอคะ? มีเบาะแสอะไรมั้ยคะ?"
10050040-134 = "มะ... ไม่หรอก ก็แค่ได้ยินผ่านๆ จากนักเรียนที่เดินผ่านไปมาน่ะ..."
10050040-135 = "อย่างนั้นสินะคะ ถ้าเจอเบาะแสอะไร ช่วยมาแจ้งพวกฉันหน่อยนะคะ"
10050040-136 = "นี่เป็นครั้งแรกเลยละค่ะที่ฉันทำกิจกรรมของชมรมทวงความยุติธรรมแล้วยังหาเบาะแสไม่ได้เท่าไรเลย"
10050040-137 = "ฉันเข้าใจว่าตัวเองยังเป็นเด็กปี 1 ก็เลยยังมีประสบการณ์การทำงานไม่มากนัก"
10050040-138 = "แต่ถึงจะว่าอย่างนั้น ฉันก็รู้สึกเหมือนมีใครกำลังช่วยปกปิดเรื่องนี้อย่างเป็นระบบเลยละค่ะ"
10050040-139 = "อะ... อื้อ ฉันก็จะไปสืบหาดูนะ ว่าแต่ตอนนี้ยังไม่ได้เบาะแสอะไรกันเลยจริงๆ เหรอ?"
10050040-140 = "จะเรียกว่าโชคร้ายในโชคดีได้มั้ยนะ พอดีฉันหาตัวอย่างของเล่ม 1 กับเล่ม 2 มาได้บ้างน่ะค่ะ"
10050040-141 = "ปะ... เป็นหนังสือยังไงเหรอ?! ขะ... ขอฉันดูหน่อยได้มั้ย?"
10050040-142 = "คะ? ก็นะ... ในแง่หนึ่งคุณโคฮารุก็เป็นสมาชิกชมรมทวงความยุติธรรมเหมือนกัน แล้วทุกคนก็น่าจะรู้เรื่องนี้กันหมดแล้ว..."
10050040-143 = "นี่ค่ะ หนังสือเจ้าปัญหา"
10050040-144 = "ไหนขอดูซิ..."
10050040-148 = "ว้ากก?!"
10050040-153 = "คะ... คุณโคฮารุ?! คุณโคฮารุ?!?!"
10050040-155 = "นะ... นี่มัน... จะว่ายังไงดีล่ะ ฉันไม่ได้เป็นแบบนี้เพราะอยากอ่านต่อเลยนะ"
10050040-156 = "ฉันแค่อยากเข้ามาช่วยอย่างบริสุทธิ์ใจจริงๆ น่ะ!"
10050040-157 = "พอจะ... มีตัวอย่างเล่มต่อไปมั้ย?"
10050040-158 = "ยังไม่มีหรอกค่ะ..."
10050040-159 = "แต่ถ้าต้องการละก็ ฉันจะให้ตัวอย่างเล่มนั้นไว้ค่ะ ไม่เป็นไรค่ะ ฉันยังมีเหลืออีก 2-3 เล่มค่ะ"
10050040-160 = "ขะ... ขอบใจนะ ถ้างั้นก็... ถ้าเจออะไรเพิ่มระหว่างนี้ละก็ ช่วยเอามาให้ฉันดูด้วยได้มั้ย?"
10050040-161 = "ฉะ... ฉันก็จะตั้งใจสืบหาอีกแรงเหมือนกัน!"
10050040-162 = "ค่ะ ได้เลยค่ะ ขอบคุณสำหรับความร่วมมือนะคะ งั้นก็มาพยายามกันค่ะ!"
10050040-163 = "อะ... อื้อ ฉันก็จะพยายามเหมือนกัน...!"
10050040-167 = "..."
10050040-172 = "มะ... ไม่ได้มีเจตนาอื่นจริงๆ นะ...! ก็ฉันคือ... คนที่จะเป็นนักเรียนหัวกะทิของชมรมทวงความยุติธรรม#nนี่นา!"
10050040-173 = "ตะ... แต่ที่สำคัญกว่านั้นก็คือ... จะทำยังไงกับเรื่องนี้ดีล่ะ?"
10050040-174 = "เดี๋ยวก่อนนะ... ในเมื่อชมรมทวงความยุติธรรมกับชมรมอ่านหนังสือร่วมมือกันจัดการเรื่องนี้อยู่ ถ้างั้นก็...?"
10050040-176 = "ห้องชมรมทวงความยุติธรรม"
10050040-177 = "ฮู่ว..."
10050040-178 = "[s] \"ดูไม่ค่อยมีแรงเลยนะ...\""

[translation]
10050040-1 = "第4話;Covert Ops"
10050040-3 = "那麼，今天也加油吧！"
10050040-9 = "部長？好像……有一些昨天沒見過的學生呢？"
10050040-10 = "是啊……感覺氣氛有點不太一樣呢。#n連制服都是黑色的……"
10050040-19 = "三一的學生們……好像隱約在避開他們？"
10050040-20 = "雖然不知道這個比喻正不正確……#n反應簡直就像我們看見事務局出現時一樣呢……"
10050040-21 = "或許三一也有一些我們不太清楚的內情吧。#n我們還是專心做自己的事就好。"
10050040-22 = "繼續努力賺錢囉！"
10050040-28 = "原來兩位在這裡啊！"
10050040-35 = "哎呀？請問有什麼事嗎？"
10050040-36 = "噓。請暫時壓低音量，然後跟著我來。"
10050040-37 = "咦？怎麼這麼突然……？"
10050040-42 = "某處的體育館"
10050040-43 = "哈啊，哈啊……為什麼要這樣急急忙忙的……"
10050040-44 = "這裡是哪裡？為何三一的學生要把我們給……？"
10050040-45 = "兩位很快就會知道了。"
10050040-46 = "大家！他們到了！現在安全了！"
10050040-54 = "這到底是……？"
10050040-55 = "……如果不介意的話，可以請你說明一下情況嗎？"
10050040-56 = "這是我們應該做的。#n首先就從兩位剛才在途中看到的……那些身穿黑色制服的學生開始說起吧。"
10050040-57 = "他們是實現正義部……兩位可以將其視為「負責守護三一治安與校風」的風紀社團。"
10050040-58 = "他們固然十分辛苦，不過據說實現正義部的部長能把人像壓扁的罐頭一樣折起來……"
10050040-59 = "要是再加上「沒事愛找碴」的設定，就跟事務局沒兩樣了嘛……"
10050040-60 = "不，不過那些人今天為什麼會……？"
10050040-61 = "那是因為……你們兩位已經被實現正義部盯上了。"
10050040-62 = "我們被盯上了……？"
10050040-63 = "雖然想問為什麼……不過好像確實會有點心虛呢……"
10050040-64 = "我來說明情況吧。#n兩位從今天早上開始……成為了被通緝的對象。"
10050040-68 = "雖然通緝令並沒有向我們這些一般學生公開發布……"
10050040-69 = "不過，至少有相當多實現正義部的成員在尋找你們。"
10050040-70 = "我還聽說不僅是實現正義部，甚至連茶會都在暗中參與這件事情……"
10050040-71 = "茶會又是什麼呢？"
10050040-72 = "關於這點……"
10050040-74 = "所，所以也就是說……那個實施三頭政治的三一學生會……正在追捕我們？"
10050040-75 = "……要比喻的話，就是潔莉諾會長親自通緝我們的意思吧。"
10050040-76 = "不……如果真的是潔莉諾會長的話，我大概有100種方法可以脫身……"
10050040-77 = "部長！所以我不是說過跑到其他學園的自治區很危險嗎……！"
10050040-78 = "不……不是的，貴音。我們還有機會！"
10050040-79 = "如果三一的學生想把我們交給實現正義部，他們應該早就那麼做了！"
10050040-80 = "真的是那樣嗎……"
10050040-81 = "總之，一旦兩位被他們發現……恐怕會立即遭到驅除。"
10050040-82 = "就連營業收入也可能被全數沒收。"
10050040-83 = "那樣我會很困擾的！這根本是在打壓經濟活動嘛！"
10050040-84 = "不僅如此，我們從兩位那裡買來的書，也很可能會被全部沒收……"
10050040-85 = "那樣我會很困擾的！這根本是在打壓文化活動吧？"
10050040-86 = "還請不必擔心。這正是我們將兩位帶來這裡的原因。"
10050040-87 = "這麼說來，這裡究竟是什麼地方？"
10050040-88 = "真是個好問題！#n這裡正是……"
10050040-89 = "「三一大小姐的祕密基地」！"
10050040-90 = "他剛才是親口說自己是「三一大小姐」嗎！？"
10050040-91 = "部長！噓，噓！"
10050040-92 = "我們將平時不太使用的體育館稍作整理後，打造出了這個空間。"
10050040-93 = "因此，實現正義部的成員應該還不知道這個地方才對。"
10050040-94 = "並且聚集於此的所有人，都會徹底保守祕密……可說是個名符其實的祕密基地。"
10050040-98 = "同一所學園裡面，居然也隱藏著這麼多祕密和暗鬥嗎……三一還真可怕呢……"
10050040-99 = "那種話從我們出版部口中說出來，感覺有點自虐呢……"
10050040-100 = "不過，這從某方面來說也是個機會。"
10050040-101 = "受到打壓的文化反而能夠賣得更好！#n對於文化事業而言，被打壓也能稱得上是一種勳章！"
10050040-102 = "就算只是平淡無奇的場景──#n只要被貼上「審查」的標籤就會成為一種宣傳，銷量能翻好幾倍呢！"
10050040-103 = "勳章這個詞，只會讓我想到鬍子勳章而已……"
10050040-104 = "我指的不是那種真的毫無用處的東西啦……"
10050040-105 = "總之，我們明白各位的意思了。"
10050040-106 = "是的。由衷感謝各位為我們準備了這樣的場地。"
10050040-107 = "那麼……就開始今天的「販售會」吧！"
10050040-111 = "看來攤位似乎布置得差不多了……"
10050040-112 = "那麼接下來就拜託你囉，貴音。呣呵呵。"
10050040-113 = "……那個，真得非做不可嗎？"
10050040-114 = "當然，這都是為了行銷啊！"
10050040-115 = "我光是想像就快要羞愧而死了……"
10050040-116 = "不如這麼想吧，貴音。#n這一切都是為了宣傳文化活動！"
10050040-117 = "唔唔……我，我明白了，部長……"
10050040-124 = "你好呀，小春同學！#n好像很久不見了呢。"
10050040-125 = "嗯，嗯……就，就是說啊……#n不過今天實現正義部的成員好像特別多……發生了什麼事嗎？"
10050040-126 = "事情是這樣的……聽說……好像有奇怪的書在流傳……"
10050040-127 = "所以我們接到命令，說是要調查那本書的出處、流通規模，還有對三一的影響。"
10050040-128 = "雖然表面上的名義是協助圖書委員會的活動……"
10050040-129 = "但不知為何，在實現正義部內部卻有傳言指出，這其實是來自茶會的直接命令……"
10050040-130 = "茶，茶會！？#n事情有嚴重到那個地步嗎！？"
10050040-131 = "這點我們也不清楚……"
10050040-132 = "關於那本書的事……我好像也有聽說過……"
10050040-133 = "真的嗎？你有沒有掌握到什麼線索？"
10050040-134 = "沒，沒有。我真的只是碰巧聽說過而已……"
10050040-135 = "這樣啊……如果有發現任何疑似線索的情報，再麻煩你告訴我囉。"
10050040-136 = "居然連一點線索都查不到，我還是第一次在實現正義部的活動中碰上這種情況呢……"
10050040-137 = "當，當然我也才一年級而已，參與活動的時間跟經驗還不多就是了。"
10050040-138 = "但即便如此……我還是覺得好像有人在組織性地隱瞞這件事。"
10050040-139 = "嗯，嗯。我也會努力調查的。#n話說……現在真的一點線索都沒有嗎？"
10050040-140 = "不知道算不算是不幸中的大幸，我好不容易弄到了幾本第一集跟第二集的樣書……"
10050040-141 = "是，是什麼樣的書！？#n我，我可以看一下嗎？"
10050040-142 = "咦？嗯，當然……#n畢竟小春同學也算是實現正義部的成員，這種程度的情報大家應該也都知道了吧……"
10050040-143 = "來，在這裡。"
10050040-144 = "我看看……"
10050040-148 = "呀啊！？"
10050040-153 = "小，小春同學！？小春同學！？！？"
10050040-155 = "那，那個……我，我真的不是自己想看才這麼說的。"
10050040-156 = "真的只是純粹想幫忙而已！"
10050040-157 = "……下一集的樣書還沒找到嗎？"
10050040-158 = "目前還沒有……"
10050040-159 = "如果需要的話，那本樣書可以給你沒關係。#n反正我們這邊也還有一些。"
10050040-160 = "謝，謝謝。如果調查途中又有什麼發現的話……可以再給我看嗎？"
10050040-161 = "我，我也會努力幫忙找的！"
10050040-162 = "嗯，就這麼辦吧。#n謝謝你幫忙囉！"
10050040-163 = "嗯，嗯。我會加油的……！"
10050040-167 = "……"
10050040-172 = "我，我真的沒有別的意思哦……！#n畢竟我可是會成為實現正義部菁英的……人才嘛！"
10050040-173 = "話，話說……這個該怎麼辦呢？"
10050040-174 = "等等……他剛才好像說這次的案子，是實現正義部和圖書委員會合作處理的……？"
10050040-176 = "實現正義部．教室"
10050040-177 = "呼……"
10050040-178 = "[s]「看起來很沒精神呢……」"
10050040-179 = "非常抱歉，老師。#n讓老師見到難堪的一面了呢。"
10050040-180 = "話雖如此，遲遲沒能掌握線索也是不爭的事實……"
10050040-181 = "不過讓我特別在意的，是學生們不合作的態度……以前從來沒有出現過這種情況呢。"
10050040-182 = "除了一問三不知以外，有時甚至讓人感覺他們在微妙地轉移話題。"
10050040-183 = "最終我不禁產生了這樣的想法。莫非三一純潔的同學們──"
10050040-184 = "──都被那本書散發的某種謎之波動給謎惑了嗎……之類的。"
10050040-185 = "[s]「那聽起來有點太陰謀論了……」"
10050040-186 = "果然是這樣對吧？#n可能是我太常待在室內聽取報告的關係，思考的方式也變奇怪了。"
10050040-187 = "看來還是得動起來才行。我也去協助巡邏吧。"
10050040-191 = "您好，老師。目前的情況如何呢？#n咦，話說麻白同學呢？"
10050040-192 = "啊……說要幫忙巡邏就出去了是嗎？#n真是認真又充滿熱情呢。"
10050040-193 = "不過要是他再多待一下就好了。#n我剛剛拿到了續集的樣書。"
10050040-194 = "[s]「嗯？真的嗎？」"
10050040-195 = "是的。您要看看嗎？"
10050040-201 = "[ns]「咦……？」"
10050040-203 = "[ns1]（這個內容，總覺得有點似曾相識……？）\n[ns2]（尤其是這個故事發展，還有角色的運用……）"
10050040-206 = "怎麼了嗎，老師？"
10050040-207 = "沒什麼……是嗎？"
10050040-208 = "……"
10050040-209 = "我明白了。#n既然老師這麼認為，想必就是如此吧。"

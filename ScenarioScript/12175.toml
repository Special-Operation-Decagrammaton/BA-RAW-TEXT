[translation]
12175-2 = "發現敵人，正展開攻擊！"
12175-3 = "阻止他們！集結PMC的兵力！"
12175-4 = "從北邊和東邊夾擊！把北邊的對十字神名防禦小隊也叫來！！"
12175-5 = "是！"
12175-6 = "……！！在北方確認到了少數兵力！"
12175-7 = "什麼！？是阿拜多斯的援軍嗎！？"
12175-8 = "不，不是……！#n人數只有三個人……不過那是……！"
12175-10 = "……"
12175-11 = "發現凱薩PMC的增援兵力。規模為一個大隊，委員長。 "
12175-12 = "我知道了，做好準備。"
12175-13 = "怎麼會變成這樣……"
12175-14 = "（為什麼我也得被帶來這裡……）"
12175-15 = "回去之後還有風紀委員會的工作，趕快解決吧。"
12175-16 = "委員長特別寬待我們以公益服務代替寫悔過書，各位就少抱怨幾句吧。"
12175-17 = "在這裡阻擋所有敵人，別讓任何人接近老師。"
12175-20 = "走吧。 "
12175-23 = "下一話;依舊未曾放棄的事物（１）"

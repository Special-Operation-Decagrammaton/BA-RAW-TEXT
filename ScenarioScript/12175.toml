[translation]
12175-2 = "พวกศัตรูเริ่มโจมตีมาแล้วครับ!"
12175-3 = "ต้องขัดขวางไว้ให้ได้!! กองกำลัง PMC!!\n"
12175-4 = "โจมตีขนาบข้างที่ทิศเหนือและทิศตะวันออก! ส่งกองพันป้องกันเดคาแกรมมาทอนของทิศเหนือออกไป!"
12175-5 = "รับคำสั่ง!"
12175-6 = "......!! พบกองกำลังขนาดเล็กที่ทิศเหนือครับ!"
12175-7 = "ว่าไงนะ! กองกำลังเสริมของอะบิดอสงั้นเหรอ?!\n"
12175-8 = "มะ... ไม่ใช่ครับ! มีกันมาแค่สามคน... แต่ว่านั่นมัน...!"
12175-10 = "......\n"
12175-11 = "ตรวจสอบพบกองกำลังสนับสนุนของไคเซอร์ PMC จำนวนมากค่ะ ท่านประธาน"
12175-12 = "เข้าใจแล้ว เตรียมตัวให้พร้อมล่ะ"
12175-13 = "เฮ้อ... ทำไมถึงมาถึงที่นี่ได้นะ...\n\n"
12175-14 = "(ทำไมถึงลากฉันมาด้วยล่ะคะ...?)\n"
12175-15 = "ฉันมีงานที่ยังทำไม่เสร็จ รีบจัดการให้จบเร็วๆ แล้วกลับกันเถอะ"
12175-16 = "นี่เป็นงานจิตอาสาที่ท่านประธานอุตส่าห์อนุญาตให้ทำแทนการเขียนหนังสือสำนึกผิดเลยนะ ทุกคนช่วยบ่นให้มันน้อยๆ หน่อยค่ะ"
12175-17 = "ขัดขวางศัตรูไว้ ห้ามให้ศัตรูแม้แต่คนเดียวเข้าถึงตัวคุณครูได้"
12175-20 = "ไปกันได้แล้ว"
12175-23 = "ตอนต่อไป;ไม่ปล่อยให้หลุดมือไป 1"

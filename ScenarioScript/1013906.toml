1013906-49 = "3;니코;03;그래도 이제는 물건이 어디에 있는지, 누구의 물건인지 한 눈에 알아볼 수 있게 되었네요.\n#3;em;[음표]"
1013906-50 = "3;니코;00;필기도구를 찾을 때는 이 서랍장을 살펴보면 되고, 인쇄용 토너나 복사용지는 프린터 옆에 있는 상자에 모두 담겨 있고……\n#3;m2"

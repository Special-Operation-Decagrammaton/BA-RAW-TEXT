[translation]
1013906-1 = "#title;니코의 이름표"
1013906-2 = "#place;샬레 집무실"
1013906-3 = "#na;(니코가 당번 활동을 돕기 위해 샬레 집무실에 방문한 어느 날……)"
1013906-4 = "[ns] \"……어라?\""
1013906-5 = "#wait;1000"
1013906-6 = "3;니코;00\n#3;al\n#wait;1000"
1013906-7 = "3;니코;02;무슨 일이신가요, 선생님?\n#3;em;[?]"
1013906-8 = "[s1] \"서랍에 스테이플러심 상자가 가득 들어 있었어.\"\n[s2] \"다 떨어진 줄 알고 어제 새로 주문했는데……\""
1013906-9 = "#wait;100"
1013906-10 = "#wait;100"
1013906-11 = "3;니코;00;이런…… 의도치 않은 낭비를 하고 말았네요."
1013906-12 = "3;니코;02;얼마나 많이 주문하셨나요?"
1013906-13 = "[s3] \"넉넉하게 쓰려고 1년치 정도……\"\n[s4] \"회계 담당 학생들에게 혼나겠는 걸……\""
1013906-14 = "#wait;100"
1013906-15 = "#wait;100"
1013906-16 = "3;니코;04;선생님도 무서워하는 학생이 있으시군요.\n#3;em;[땀]"
1013906-17 = "3;니코;00;그래도 스테이플러심은 상하는 물건도 아니고, 소모품이니 쟁여두면 언젠가는 쓸 일이 있을 거예요."
1013906-18 = "3;니코;02;그러고보니 SRT 학원에서도 재고를 깜박해서 있는 물건을 새로 주문하는 일이 가끔은 있었던 것 같아요."
1013906-19 = "3;니코;09;대인 지뢰가 다 떨어진 줄 알고 새로 주문했는데, 나중에 알고 보니 지하실에 봉인지도 뜯지 않은 지뢰 상자가 한가득 있었다던가—\n#3;em;[한숨]"
1013906-20 = "[s] \"그래도 괜찮은 거야?!\""
1013906-21 = "3;니코;00;괜찮아요. 키보토스에서 주인 없는 폭탄 상자를 발견하는 건 의외로 흔한 일이거든요."
1013906-22 = "3;니코;09;다만 그 출처가 SRT 학원이라면 조금 곤란하지만요……\n#3;em;[속상함]"
1013906-23 = "3;니코;02;그래서 그 이후로 SRT 학원에선 개인용품이나 보관함에는 이름표를 붙여 주기를 하고 있어요.\n#3;jump"
1013906-24 = "[s] \"……주기?\""
1013906-25 = "3;니코;00;네. 공용으로 쓰는 보급품 같은 경우에는 모양이 비슷하다 보니 다른 사람이 모르고 가져가는 경우가 흔하거든요."
1013906-26 = "3;니코;09;세탁실에서 속옷이 바뀌는 일도 일상다반사고……\n#3;stiff"
1013906-27 = "3;니코;06;이상하게 다른 소대는 그런 일이 적다는데, FOX 소대는 서로 속옷이 뒤바뀌는 경우가 흔한 것 같아요. 어째서 그런 일이 자꾸 생기는지.\n#3;em;[세로선]"
1013906-28 = "[s5] (대강 이유는 알 것 같지만……)\n[s6] \"확실히 그건 곤란한 일이네.\""
1013906-29 = "#wait;100"
1013906-30 = "#wait;100"
1013906-31 = "3;니코;02;참, 선생님. 말이 나온 김에 샬레의 비품에도 주기를 하시겠어요?\n#3;em;[반응]"
1013906-32 = "3;니코;00;안 그래도 당번 활동이 끝나고 소대 보급품에 주기를 하려고 새 이름표를 사왔거든요."
1013906-33 = "3;니코;03;어디에 어떤 물건이 있는지, 누구의 소지품인지 확실하게 표기해 둔다면 오늘처럼 재고가 남아 있는지 모르고 새 물건을 주문하는 일도 줄어들 거예요."
1013906-34 = "3;니코;00;자, 넉넉하게 사왔으니 선생님께도 나누어 드릴게요.\n#3;greeting"
1013906-35 = "[s7] \"좋은 생각이야.\"\n[s8] \"그럼 사무용품 정리도 겸해서, 이름표를 붙여 볼까?\""

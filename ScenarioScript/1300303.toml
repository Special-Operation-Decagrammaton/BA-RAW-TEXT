[translation]
1300303-1 = "毫無察覺的事實"
1300303-2 = "（叮鈴鈴）"
1300303-4 = "（蓮實來到了約定的地點）"
1300303-5 = "啊，讓您久等了，老師。"
1300303-6 = "[s] 「早安。」"
1300303-7 = "我們要不要先點餐呢？這裡的奶茶很好喝唷。"
1300303-8 = "請問要點什麼呢？"
1300303-9 = "我要奶茶，然後……老師要什麼呢？"
1300303-10 = "[s1] 「我要黑咖啡。」\n[s2] 「我要柳橙汁。」\n[s3] 「我要水果百匯冰淇淋。」"
1300303-11 = "好的，那麼……"
1300303-12 = "一杯蜂蜜奶茶和一杯黑咖啡。"
1300303-13 = "好的……"
1300303-14 = "一杯蜂蜜奶茶和一杯柳橙汁。"
1300303-15 = "好的……"
1300303-16 = "一杯蜂蜜奶茶和一份水果百匯冰淇淋。"
1300303-17 = "然後還有一份奶油布丁，巧克力年輪蛋糕和乳酪蛋塔也各來一份。"
1300303-18 = "還有當季水果提拉米蘇、柳橙瑪德蓮……還有……"
1300303-19 = "兩份巧克力杏仁餅……還有抹茶可麗餅……"
1300303-20 = "[s] 「…………」"
1300303-21 = "我看看，這樣就好了吧。"
1300303-23 = "老師請慢用。"
1300303-24 = "[s] 「你看起來很開心呢。」"
1300303-25 = "（嚼嚼）"
1300303-26 = "是，是嗎？"
1300303-27 = "不好意思。我好像有點太沒分寸了……"
1300303-28 = "我真的很喜歡吃甜食。如果我沒有加入實現正義部的話，說不定我會加入放學後的甜點部呢。"
1300303-29 = "可就算沒有人陪我，我每天依然很珍惜享受美食的時間……"
1300303-30 = "（嚼嚼）"
1300303-31 = "[s] 「那麼，你想商量什麼呀？」"
1300303-32 = "是的，其實……"
1300303-33 = "………"
1300303-34 = "我有些……減肥上的問題……"
1300303-35 = "[s] 「減肥？」"
1300303-36 = "……"
1300303-37 = "是。因為我是個什麼都不做也會變胖的體質……"
1300303-38 = "雖然我有努力在減肥了……但就是沒有任何效果……"
1300303-39 = "我實在不知道原因…… "
1300303-40 = "畢竟老師是負責管理學生的人，所以我想說也許能夠得到一些建議……"
1300303-41 = "[s4] 「……原因啊～」\n[s5] 「……你沒有什麼頭緒嗎？」"
1300303-42 = "……難道老師知道原因嗎？ "
1300303-43 = "……難道老師知道原因嗎？ "
1300303-44 = "果然是因為體質嗎？還是生活習慣呢……？我是不是該提高點運動量呢？"
1300303-46 = "[s] 盯著吃著甜點的蓮實"
1300303-48 = "……？"
1300303-49 = "……"
1300303-50 = "…………"
1300303-51 = "……啊，也，也，也就是說……"
1300303-52 = "……"
1300303-53 = "原因……啊……是，是這個嗎？"
1300303-54 = "……"
1300303-55 = "說，說的也是……原因果然，是這個呢。"
1300303-56 = "……居然沒發現這麼簡單的道理……我，我真是……"
1300303-57 = "……明明是為了了解原因才來見老師……卻當場吃得這麼多…… #n真丟臉……"
1300303-58 = "[s] 「還好嗎？」"
1300303-60 = "老，老師，我突然想起來有急事！先告辭了！"
1300303-62 = "（咻～）"
1300303-64 = "[s] 「又是這種發展！？」"
1300303-65 = "下次見……！"
1300303-67 = "（蓮實再次像風一般失去蹤影）"

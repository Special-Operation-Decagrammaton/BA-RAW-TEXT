[translation]
1300303-1 = "ข้อเท็จจริงที่คิดไม่ถึง"
1300303-2 = "(กริ้ง...)"
1300303-4 = "(ฮาสุมิมาถึงบริเวณที่นัดเจอกัน)"
1300303-5 = "อ๊ะ คุณครูมาถึงแล้วเหรอคะ"
1300303-6 = "[s] \"สวัสดี\""
1300303-7 = "ถ้างั้นเราสั่งอะไรมาดื่มก่อนดีมั้ยคะ? ร้านนี้ชานมอร่อยมากเลยนะคะ"
1300303-8 = "รับอะไรดีคะ?"
1300303-9 = "ฉันขอเป็นชานมค่ะ เอ่อ... คุณครูจะรับอะไรดีคะ"
1300303-10 = "[s1] \"ขอกาแฟดำแล้วกัน\"\n[s2] \"ขอน้ำส้มแล้วกัน\"\n[s3] \"ขอฟรุ้ตพาร์เฟต์แล้วกัน\""
1300303-11 = "ค่ะ ถ้างั้น..."
1300303-12 = "ขอเป็นชานมหนึ่งแก้วกับกาแฟดำหนึ่งแก้ว"
1300303-13 = "ค่ะ ถ้างั้น...."
1300303-14 = "ขอเป็นชานมหนึ่งแก้วกับน้ำส้มหนึ่งแก้ว"
1300303-15 = "ค่ะ ถ้างั้น...."
1300303-16 = "ขอเป็นชานมหนึ่งแก้วกับฟรุ้ตพาร์เฟต์หนึ่งที่"
1300303-17 = "แล้วก็ขอบัตเตอร์พุดดิ้ง เค้กช็อกโกแลตบามคูมเฮน แล้วก็ทาร์ตชีสอย่างละหนึ่ง... "
1300303-18 = "ทีรามิสุผลไม้ในฤดูกาล มาดแลนส้ม... แล้วก็...."
1300303-19 = "ช็อกโกแลต คร็อกก็องบุชสองที่... แล้วก็เครปชาเขียว...."
1300303-20 = "[s] \"...\""
1300303-21 = "อืม ขอเท่านี้ก่อนค่ะ"
1300303-23 = "ลองทานสิคะคุณครู"
1300303-24 = "[s] \"ดูมีความสุขมากเลยนะ\""
1300303-25 = "(เคี้ยว)"
1300303-26 = "งะ...งั้นเหรอคะ?"
1300303-27 = "ขอโทษค่ะ ฉันลืมตัวไปหน่อย..."
1300303-28 = "ฉันชอบกินของหวานมากๆ ถ้าไม่ได้เข้าชมรมทวงความยุติธรรม ก็อาจเข้าชมรมของหวานหลัง#nเลิกเรียนก็ได้ค่ะ"
1300303-29 = "การได้มานั่งกินขนมหวานทุกวันแบบนี้เป็นช่วงเวลาที่มีค่าสำหรับฉันมากเลยค่ะ..."
1300303-30 = "(เคี้ยว)"
1300303-31 = "[s] \"แล้วมีอะไรอยากจะปรึกษาเหรอ?\""
1300303-32 = "ค่ะ คือว่าเรื่องนั้น..."
1300303-33 = "........"
1300303-34 = "คือฉันอยากปรึกษาเรื่องการลดน้ำหนัก..."
1300303-35 = "[s] \"ลดน้ำหนักเหรอ?\""
1300303-36 = "......"
1300303-37 = "ค่ะ ฉันเป็นพวกประเภทที่อยู่เฉยๆ น้ำหนักก็ขึ้นง่ายมากเป็นพิเศษค่ะ"
1300303-38 = "ฉันอยากจะลดน้ำหนักเหมือนกัน... แต่ถึงจะพยายามเท่าไรก็ไม่ได้ผลเลย"
1300303-39 = "ฉันเองก็ไม่รู้สาเหตุเหมือนกันค่ะ..."
1300303-40 = "คุณครูต้องคอยดูแลทุกคน... ฉันเลยคิดว่าคุณครูอาจให้คำแนะนำดีๆ กับฉันได้"
1300303-41 = "[s4] \"สาเหตุน่ะ...\"\n[s5] \"เธอไม่รู้จริงเหรอ?\""
1300303-42 = "...ค่ะ คุณครูพอจะรู้บ้างรึเปล่าคะ?"
1300303-43 = "...ค่ะ คุณครูพอจะรู้บ้างรึเปล่าคะ?"
1300303-44 = "เพราะสภาพร่างกายของฉันเหรอคะ? หรือว่าเป็นเพราะไลฟ์สไตล์....? หรือว่าฉันควรออกกำลัง#nกายเพิ่มดีคะ?"
1300303-46 = "[s] มองภาพฮาสุมิที่นั่งกินขนมอยู่"
1300303-48 = "...?"
1300303-49 = "......"
1300303-50 = "..."
1300303-51 = "เอ่อ... คะ...คือว่า..."
1300303-52 = "......"
1300303-53 = "สาเหตุคือ... ขะ...ของพวกนี้เหรอคะ?"
1300303-54 = "......"
1300303-55 = "บะ...แบบนี้นี่เอง จริงๆ ด้วยสินะ"
1300303-56 = "เรื่องง่ายๆ แท้ๆ แต่ฉันกลับไม่รู้..."
1300303-57 = "กลับมาปรึกษาคุณครู... แถมสั่งของกินมาเพียบอีกด้วย น่าอายจริงๆ..."
1300303-58 = "[s] \"เป็นอะไรรึเปล่า?\""
1300303-60 = "พอดีฉันนึกได้ว่ามีธุระด่วนค่ะคุณครู! ขอตัวกลับก่อนนะคะ!"
1300303-62 = "(ฟิ้วววว~)"
1300303-64 = "[s] \"อีกแล้วเหรอ?!\""
1300303-65 = "ไว้เจอกันนะคะ!"
1300303-67 = "(ฮาสุมิวิ่งหายไปอย่างรวดเร็ว)"

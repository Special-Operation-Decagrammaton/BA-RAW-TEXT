[translation]
12190-1 = "ตอนที่ 19;ไม่ปล่อยให้หลุดมือไป 2"
12190-2 = "เจอตำแหน่งของรุ่นพี่โฮชิโนะแล้วค่ะ!!\n"
12190-3 = "อยู่ที่ชั้นใต้ดินใต้บังเกอร์ค่ะ!\n"
12190-4 = "ที่นั่นเหรอ...?\n"
12190-5 = "รีบไปเร็ว...!\n"
12190-10 = "กรรมการของไคเซอร์...!!"
12190-11 = "หนังเหนียวชะมัด"
12190-12 = "โธ่เอ๊ย... จะมาขัดขวางถึงไหนกันเนี่ย! \n\n"
12190-13 = "หลบไปนะคะ! ถ้าไม่หลบละก็...!"
12190-15 = "คณะกรรมการแผนงาน... พวกเธอคือเสี้ยนหนามในแผนการของฉัน..."
12190-16 = "ฉันต้องพยายามอย่างหนักเพื่อทำลายโรงเรียนนั้น!"
12190-17 = "แต่พวกเธอก็ยังคงยืนหยัดอยู่ในโรงเรียนที่ใกล้จะล้มละลาย ไม่คิดแม้แต่จะลาออก แถมยังพยายามใช้หนี้#nที่พวกเธอไม่ได้ก่ออีก!!"
12190-18 = "ส่งคนไปก่อกวนก็แล้ว! สร้างปัญหาให้ก็แล้ว! แล้วทำไมถึงได้หัวเราะเริงร่าเหมือนมีความสุขอยู่ได้ทุกวัน!"
12190-19 = "ฮึ่ม!!! เพราะพวกเธอ แผนการของฉันก็เลย...!!"
12190-22 = "เป้าหมายของแกคือการที่บั่นทอนจิตใจของเรางั้นเหรอ...!? ต่ำช้าที่สุด!!\n"
12190-23 = "ถึงจะใช้อุบายมาหลอกพวกเราและรุ่นพี่โฮชิโนะได้ แต่เราจะไม่ยอมถูกหลอกซ้ำสองอีกแล้ว\n"
12190-24 = "ใช่! พวกเราไม่ยอมแพ้ให้กับผู้ใหญ่ที่น่าสมเพชอย่างคุณหรอกค่ะ! ไม่มีทาง!\n"
12190-28 = "คุณครูคะ! นี่คือการต่อสู้ครั้งสุดท้ายแล้วค่ะ รบกวนด้วยค่ะ!"

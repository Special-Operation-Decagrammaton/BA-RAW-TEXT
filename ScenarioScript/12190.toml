[translation]
12190-1 = "Episode 19;Never Letting Go Part 2"
12190-2 = "I've confirmed Hoshino's location!"
12190-3 = "Over there! She's in that bunker!"
12190-4 = "Over there..."
12190-5 = "Let's move!"
12190-10 = "It's the Kaiser Director!"
12190-11 = "Someone's persistent."
12190-12 = "Seriously... How many more times are you gonna get in the way?!"
12190-13 = "Please step aside! Or else...!"
12190-15 = "You've been a real thorn in my side, Foreclosure Task Force."
12190-16 = "No matter what I did to erase what remains of that school!"
12190-17 = "Yet you refused to leave. Clinging to that sinking wreck, desperately chipping away at that debt!"
12190-18 = "I've tormented you in every conceivable way, yet you still spend your days laughing and smiling without a care in the world!"
12190-19 = "*tch* Because of you...my plans...!"
12190-22 = "You were seriously trying to bully a bunch of girls into giving up on their school... How low can a slimeball like you get?!"
12190-23 = "You tricked Hoshino. You tricked all of us. But we won't fall for it twice."
12190-24 = "That's right! We're not losing to some miserable excuse of an adult. Not now. Not ever!"
12190-28 = "Sensei! Please, lead us into the final battle!"

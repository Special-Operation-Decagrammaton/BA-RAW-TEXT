[translation]
12190-1 = "第19話;依舊未曾放棄的事物（２）"
12190-2 = "已經確認星野前輩的位置！"
12190-3 = "就是那裡，那座堡壘的地下室！"
12190-4 = "在那裡啊……"
12190-5 = "趕緊走吧……！"
12190-10 = "凱薩的董事……！！"
12190-11 = "真難纏。"
12190-12 = "真是的，到底要妨礙我們到什麼程度才肯罷休啊！"
12190-13 = "請你讓開！否則……！"
12190-15 = "對策委員會……你們一直是我的眼中釘。 "
12190-16 = "為了消滅那所學校……我明明用盡了各種手段！"
12190-17 = "然而你們卻還是死守著瀕臨倒閉的學校，甚至還想把債務全部還清！"
12190-18 = "明明讓你們吃了那麼多苦！那麼徹底地欺壓你們！竟然還每天開開心心的！"
12190-19 = "都是你們害我的計畫！！！我的計畫啊啊啊啊！！！！"
12190-22 = "結果打擊我們才是你的目的啊……真是卑劣到了極點！"
12190-23 = "竟敢用謊言欺騙我們和星野前輩，我們不會再上當了。"
12190-24 = "沒錯！我們才不會輸給你這種可悲的大人！絕對不會！"
12190-28 = "老師！最後的戰鬥也麻煩您了！"

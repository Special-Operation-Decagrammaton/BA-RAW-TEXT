1006215-5 = "#na;(모르는 번호로부터 연락이 왔다.)"
1006215-6 = "#na;(혹시 보험이나 대출 권유라면 정중히 거절하려 했는데……)"
1006215-7 = "3;토키 모드 1;02;안녕하십니까. 선생님.\n#3;sig\n#3;a"
1006215-8 = "[s] \"토키?!\""
1006215-9 = "3;토키 모드 1;99;이것으로 회선의 연결 확인.\n#3;sig"
1006215-10 = "3;토키 모드 1;01;시도는 성공적이었군요. 다행입니다. 역시 우수한 저입니다.\n#3;sig\n#3;jump"
1006215-11 = "3;토키 모드 1;01;또한 이것으로 저는 언제나, 선생님과 24시간 연결되어 있는 것과 마찬가지라는 것을 확인할 수 있었습니다.\n#3;sig"
1006215-12 = "[s] \"오해받을 수 있는 소리처럼 들리잖니…….\""
1006215-13 = "3;토키 모드 1;02;하지만 사실이기도 합니다. \n#3;sig"
1006215-14 = "3;토키 모드 1;01;무엇보다 지금 저와 이렇게, 모르는 통신 회선으로 연락을 하고 계시지 않습니까?\n#3;sig"
1006215-15 = "3;토키 모드 1;01;엄연한 사실을 부정하시다니, 그건 교육자의 자세가 아니지 않을까요?\n#3;sig"
1006215-16 = "3;토키 모드 1;07;무릇 교육자란, 사실을 기반으로 하여 학생들을 올바른 자리로 이끌어야 하는 것 아닐까요?\n#3;sig"
1006215-17 = "[s] \"아니라고는…… 할 수 없지…….\""
1006215-18 = "3;토키 모드 1;99;역시 선생님이십니다. 화제의 빠른 진행이란 좋은 것이죠.\n#3;sig\n#3;greeting"
1006215-19 = "3;토키 모드 1;01;아무튼, 지금 저는 선생님과 만나고 싶습니다. 드리고 싶은 것이 있기 때문입니다.\n#3;sig"
1006215-20 = "[s] \"토키가 나에게?\""
1006215-21 = "3;토키 모드 1;01;그렇습니다. 이것은 기특한 퍼펙트 메이드인 제가, 선생님께 드리는 일종의 디지털 족ㅅ…….\n#3;sig"
1006215-22 = "3;토키 모드 1;02;가 아니라, 우리 사이의 연결의 징표입니다.\n#3;sig\n#3;stiff"
1006215-23 = "[s] \"뭔가 지금 엄청나게 흉흉한 말이 들린 것 같은데!?\""
1006215-24 = "3;토키 모드 1;01;잘못 들으신 겁니다.\n#3;sig"
1006215-25 = "3;토키 모드 1;02;아닌 것 같으시다고요? 그렇지 않습니다. 잘못 들으신 것이 맞습니다.\n#3;sig"
1006215-26 = "3;토키 모드 1;07;선생님께서 아무리 부정하셔도, 제가 그렇게 주장하고 있습니다.\n#3;sig"
1006215-27 = "3;토키 모드 1;07;들어 보세요. 선생님. 사람은 1년에 평균 8마리의 거미를 삼킨다고 합니다.\n#3;sig"
1006215-28 = "3;토키 모드 1;05;그렇다면 사람은 적어도, 1년에 평균적으로 그 100배는 말을 잘못 알아듣는 것이 아닐까요?!\n#3;sig"
1006215-29 = "3;토키 모드 1;02;네? 거기에 무슨 상관관계가 있냐고요?\n#3;sig"
1006215-30 = "3;토키 모드 1;04;…….\n#3;sig\n#3;em;…"
1006215-31 = "3;토키 모드 1;01;사실 없습니다. 아무튼 그건 선생님이 잘못 들은 게 맞습니다. 그럴 겁니다.\n#3;sig"
1006215-32 = "[s] \"그래……. 그런 걸로 하자…….\""
1006215-33 = "3;토키 모드 1;99;감사합니다.\n#3;sig"
1006215-34 = "3;토키 모드 1;01;그런 의미에서, 이제부터 선생님께 방문하여.\n#3;sig"
1006215-35 = "3;토키 모드 1;02;우리 사이의 연결의 증표를 건네 드리고 싶은데, 괜찮으실까요?\n#3;sig\n#3;em;[?]"
1006215-36 = "[s] \"다 알았으니까……. 지금 어디니……?\""
1006215-37 = "3;토키 모드 1;01;뭔가 모든 걸 포기하시려고 하는 것처럼 들립니다만…….\n#3;sig"
1006215-38 = "3;토키 모드 1;01;아뇨. 괜찮겠지요. 제가 괜찮으니까요. 아무튼 저는 지금 샬레 오피스 앞입니다.\n#3;sig"
1006215-39 = "[s1] \"그럼 지금, 샬레 문 앞에서 전화를 걸어서!\"\n[s2] \"지금까지 이런 말을 하고 있었던 거야!?\""

[translation]
1006215-1 = "Token of Connection"
1006215-3 = "Schale Office"
1006215-5 = "I received a call from an unknown number."
1006215-6 = "I picked up with the intention of politely declining if it was a telemarketer, but then..."
1006215-7 = "Hello, Sensei."
1006215-8 = "[s] \"Toki?!\""
1006215-9 = "Connection confirmed."
1006215-10 = "A successful attempt. I'm glad. I truly am excellent."
1006215-11 = "With this, I've also confirmed that I am connected to you 24 hours a day, Sensei."
1006215-12 = "[s] \"That could be easily misunderstood...\""
1006215-13 = "But it is simply the truth. "
1006215-14 = "After all, are you not currently talking to me using an unknown communication line at this very moment?"
1006215-15 = "An educator should never deny obvious truths."
1006215-16 = "In fact, is it not an educator's duty to lead students to correct conclusions that are based on facts?"
1006215-17 = "[s] \"I can't say...that you're wrong...\""
1006215-18 = "As expected, you are a true teacher. Being able to adapt your thought processes quickly is an excellent thing."
1006215-19 = "In any case, I contacted you to arrange a meeting. I have something to give you."
1006215-20 = "[s] \"Something for me?\""
1006215-21 = "That's right. I, a kind and perfect maid, am giving you this digital shackle—"
1006215-22 = "...I mean, symbol of our relationship."
1006215-23 = "[s] \"I thought I heard you say something really ominous...\""
1006215-24 = "You misheard me."
1006215-25 = "...You don't think so? It's true. You did mishear me."
1006215-26 = "Protest as much as you'd like, but my opinion will not change."
1006215-27 = "Listen, Sensei. It is said that a person swallows an average of eight spiders a year."
1006215-28 = "If that's the case, wouldn't it also be true that a person mishears things an average of 100 times a year?"
1006215-29 = "...Hm? How are those two things related?"
1006215-30 = "..."
1006215-31 = "They aren't in any way, but you still misheard me. I'm positive."
1006215-32 = "[s] \"Okay... Let's just say you're right...\""
1006215-33 = "Thank you."
1006215-34 = "So on that note, I would like to visit you."
1006215-35 = "I will come and give you this token of our connection. Okay?"
1006215-36 = "[s] \"Okay, sure... Where are you...?\""
1006215-37 = "That agreement was not very enthusiastic..."
1006215-38 = "No. Of course you would want me there. In fact, I am in front of Schale's office right now."
1006215-39 = "[s1] \"You came all the way here and then called me?\"\n[s2] \"You've been talking to me from outside the whole time?\""
1006215-42 = "Correct."
1006215-50 = "Hello, Sensei. It's good to see you again."
1006215-51 = "[s3] \"Uh... okay...\" \n[s4] \"You could have just come in from the start...\""
1006215-54 = "I could have, but this was my strategy to gain your sympathy."
1006215-55 = "Furthermore, to make passersby think..."
1006215-56 = "...\"How could Sensei make such a perfect, wonderful maid wait outside? How terrible.\""
1006215-57 = "...There was one significant problem, though."
1006215-58 = "What is that, you ask? It was that there was significantly less foot traffic in front of your office than I originally expected."
1006215-59 = "Truly a blunder. Next time, I will be more diligent in finding methods to properly induce sympathy from both you and civilians."
1006215-60 = "[s] \"Why were you looking for sympathy?!\""
1006215-61 = "Oh, no. You misheard me."
1006215-62 = "[s] \"Okay... Let's just say you're right...\""
1006215-63 = "Moving on. Allow me to reveal the purpose behind today's visit."
1006215-69 = "Yes, after all, there is no point in subterfuge now. This is a headset, perfect for both a maid and a perfect agent."
1006215-70 = "The soundproofing is thorough, and although it is an in-ear type, it has special acoustic processing to prevent hearing damage."
1006215-71 = "Naturally, basic channel interference and hacking prevention are in place. However, in the unlikely event that the channel is breached, it has more safeguards."
1006215-72 = "It will automatically bypass the channel and generate a new one."
1006215-73 = "There are various other features, but I will skip them due to time constraints."
1006215-74 = "The point is that with this, a separate, secure communication channel is available to us."
1006215-75 = "It means you can contact me directly at any time."
1006215-76 = "One for you, and one for me. Two makes a pair."
1006215-77 = "[s] \"Is it okay for me to accept something like this?\""
1006215-78 = "Yes. It is what I want."
1006215-79 = "This is a unique, special piece of equipment that someone I used to serve developed especially for me."
1006215-80 = "...I should save it for if that person returns?"
1006215-81 = "Why is that necessary? Not utilizing all available resources is unreasonable. That person would say the same."
1006215-82 = "Therefore, I believe that the correct decision is for you to use it. That person will also feel the same way."
1006215-83 = "Furthermore, this headset will also be pleased that it's being used."
1006215-84 = "The lifespan of tools are shortened when they are left to idle."
1006215-85 = "Therefore, Sensei, please put on the headset and stay connected with me 24 hours a day."
1006215-86 = "[s] \"That's a bit much...\""
1006215-87 = "...Why is that? Have you perhaps found someone else?"
1006215-88 = "Our relationship..."
1006215-90 = "...was it all just a game to you?!"
1006215-91 = "[s] \"Toki, what does that even mean?!\""
1006215-92 = "I apologize, Sensei. It was a joke intended to lighten the mood."
1006215-93 = "More specifically, it was a line from a drama."
1006215-94 = "My knowledge of dramas and movies is still lacking, but I am doing my utmost to learn."
1006215-95 = "That was a line I was able to recall."
1006215-96 = "Anyway, what I would like to say is simple."
1006215-97 = "Please accept it. And always be with me."
1006215-98 = "That's all I ask of you."
1006215-102 = "[ns] \"I'm grateful for the thought...so I'll accept it.\""
1006215-105 = "Thank you, Sensei."
1006215-106 = "[s] \"But I don't think I can wear it 24/7.\""
1006215-107 = "Why not? I'm disappointed. No, I'll show you disappointed."
1006215-108 = "Look, Sensei. Look at the way my shoulders are drooping. I demand that you take responsibility. Quickly."
1006215-109 = "[s5] \"No, it's just that... This is precious to you.\"\n[s6] \"So I want to cherish it to its utmost.\"\n[s7] \"I'll use it when the perfect time comes.\""
1006215-113 = "I see. If that's the reason..."
1006215-114 = "Yes. I can understand that reasoning."
1006215-115 = "Anyway, with this, we..."
1006215-116 = "...now have a couple's headset."
1006215-117 = "[s] \"Where did you learn things like that, Toki...?\""
1006215-118 = "From a movie."
1006215-119 = "[s] \"Word choice is important. You can cause unwanted misunderstandings...\""
1006215-120 = "What do you mean? I want others to misunderstand..."
1006215-121 = "[s] \"Toki, please. Hello? Toki...?\""
1006215-124 = "Toki stayed and played for a while before she finally felt satisfied and left."
1006215-125 = "...I decided to keep Toki's headset safely stored in the drawer."

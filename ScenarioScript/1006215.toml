1006215-67 = "1;토키 모드 1;01\n#1;greeting\n#wait;500"
1006215-68 = "#wait;2000"
1006215-69 = "1;토키 모드 1;01;네. 무엇을 숨기겠습니까. 이것이야말로 메이드 겸 에이전트용의 완벽한 헤드셋."
1006215-70 = "1;토키 모드 1;01;방음도 철저하고, 인이어 방식이지만 청력을 손상시키지 않도록 특수 음향 처리도 되어 있습니다."
1006215-71 = "1;토키 모드 1;01;기본적인 채널 간섭 및 해킹 처리는 당연히 되어 있지만, 만에 하나 채널을 침범당했을 경우 역시 대비하여."
1006215-72 = "1;토키 모드 1;01;그때에는 자동적으로 회선을 우회하여 생성하도록 되어 있습니다."
1006215-73 = "1;토키 모드 1;01;그 밖에도 여러 가지 기능이 있습니다만, 시간 관계상 생략하도록 하고."
1006215-74 = "1;토키 모드 1;01;결론부터 빠르게 말씀드리자면, 이것만 있으면 별도의 보안 통신 채널을 통하여."
1006215-75 = "1;토키 모드 1;01;언제든 다이렉트로 연락이 가능하다는 것입니다."
1006215-76 = "1;토키 모드 1;03;선생님 하나, 저 하나. 이것으로 한 쌍인 것이죠."
1006215-77 = "[s] \"그런 걸 받아도 되는 거야?\""
1006215-78 = "1;토키 모드 1;03;네. 오히려 받아 주셨으면 합니다.\n#1;m3"
1006215-79 = "1;토키 모드 1;01;이것은 제가 예전에 모시던 분이, 특별히 저에게 마련해 주신 원 오프 타입의 특별 제작품이니까요."
1006215-80 = "1;토키 모드 1;02;그렇다면 더더욱 그 사람이 돌아왔을 때를 대비하여, 갖고 있어야 하지 않냐고요?"
1006215-81 = "1;토키 모드 1;02;굳이요? 사용할 수 있는 것을 사용하지 않는 것은, 비합리적입니다. 그분도 그렇게 말씀하실 겁니다."
1006215-82 = "1;토키 모드 1;01;그러니 지금은 선생님이 쓰는 게 맞다고 보여집니다. 그분 역시 그렇게 판단하실 겁니다."
1006215-83 = "1;토키 모드 1;01;한층 더 나아가, 이 헤드셋도 자신이 사용되는 것을 기뻐할 겁니다."
1006215-84 = "1;토키 모드 1;01;본디 도구란, 사용되지 않으면 수명이 짧아지는 법이니까요."
1006215-85 = "1;토키 모드 1;01;그러니 선생님. 선생님께서는 어서 헤드셋을 장착하시고, 24시간 저와 연결되어 있으시면 되는 겁니다.\n#1;em;[음표]"
1006215-86 = "[s] \"그래도 그건 조금…….\""
1006215-87 = "1;토키 모드 1;06;……어째서죠? 혹시, 저 말고 다른 누군가를 벌써 만드신 건가요?"
1006215-88 = "1;토키 모드 1;04;저와의 관계는––"

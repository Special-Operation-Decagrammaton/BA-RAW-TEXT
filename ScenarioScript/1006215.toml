[translation]
1006215-1 = "連結的信物"
1006215-3 = "夏萊辦公室"
1006215-5 = "（接到了一通陌生的來電）"
1006215-6 = "（本來打算如果是保險或貸款的推銷，就要鄭重拒絕的……）"
1006215-7 = "早安，老師。"
1006215-8 = "[s]「季！？」"
1006215-9 = "已確認線路連結完畢。"
1006215-10 = "嘗試十分成功。#n太好了，不愧是優秀的我。"
1006215-11 = "同時這也讓我確定，自己彷彿24小時皆與老師相連。"
1006215-12 = "[s]「這種說法很容易讓別人誤會耶……」"
1006215-13 = "然而事實就是如此。"
1006215-14 = "您現在不就正以陌生的通訊路徑與我聯絡嗎？"
1006215-15 = "居然否認如此明確的事實，這是教育家應有的心態嗎？"
1006215-16 = "作為一名教育家，理應基於事實，引領學生走上正道不是嗎？"
1006215-17 = "[s]「也不能說不是啦……」"
1006215-18 = "不愧是老師，這樣話題就能推進得快一點了。"
1006215-19 = "總之，我現在想見老師一面。#n因為我有東西想要給您。"
1006215-20 = "[s]「季要給我東西？」"
1006215-21 = "沒錯，是我這名既了不起又可愛的女僕，想送給老師的一種電子腳……"
1006215-22 = "更正，是我們之間連結的信物。"
1006215-23 = "[s]「我好像聽到了讓人非常不安的話！？」"
1006215-24 = "是您聽錯了。"
1006215-25 = "您說好像沒有聽錯？#n並沒有，確實是您聽錯了。"
1006215-26 = "無論老師如何否認，我的看法都不會改變。"
1006215-27 = "您想想看，老師。#n據說人類平均每年會吞下8隻蜘蛛。"
1006215-28 = "既然如此，平均每年聽錯的次數，至少會是它的100倍以上吧！？"
1006215-29 = "嗯？這兩件事有什麼關聯？"
1006215-30 = "……"
1006215-31 = "其實沒有。#n總之剛才是老師聽錯了。我想說的就是這個意思。"
1006215-32 = "[s]「嗯……就當作是這樣吧……」"
1006215-33 = "謝謝您。"
1006215-34 = "那麼，我現在就去拜訪老師。"
1006215-35 = "並將我們之間的信物拿給您，請問方便嗎？"
1006215-36 = "[s]「知道了……你現在在哪……？」"
1006215-37 = "您的聲音聽起來似乎放棄了一切呢……"
1006215-38 = "算了，應該沒關係吧。反正我並不介意。#n總之，我現在就在夏萊辦公室前面。"
1006215-39 = "[s1]「所以你是在夏萊的門口打電話！」\n[s2]「原來你一直在門口跟我講電話嗎！？」"
1006215-42 = "沒錯。"
1006215-50 = "好久不見，老師。#n再次向您問好。"
1006215-51 = "[s3]「嗯……你好……」\n[s4]「怎麼不直接進來呢……」"
1006215-54 = "話不能這麼說。#n因為這是為了激發老師的同情心而進行的作戰。"
1006215-55 = "同時，這麼做也具備能讓路過的人……"
1006215-56 = "萌生「居然讓這麼完美的最強女僕站在外面等，真是太過分了」的念頭的附加效果。"
1006215-57 = "……雖然碰到了一個挺大的問題就是了。"
1006215-58 = "問我是什麼問題？#n那就是經過夏萊老師辦公室的人意外的少。"
1006215-59 = "這真是個天大的疏忽。#n下次我會更加奮發向上，力求完全激起老師的同情心，並給周圍的人添麻煩。"
1006215-60 = "[s]「你剛才是說添麻煩嗎！？」"
1006215-61 = "沒有，是您聽錯了。"
1006215-62 = "[s]「就當作是這樣吧……」"
1006215-63 = "總之，這就是我今天的目的。"
1006215-69 = "沒錯，其實也沒什麼好隱瞞的。#n這就是女僕兼特務專屬的完美耳機。"
1006215-70 = "除了隔音效果絕佳之外，由於經過特殊的音響處理，#n就算是入耳式耳機也不會損傷聽力。"
1006215-71 = "基本的頻道干擾和入侵也能應對，不過還是有準備好頻道被入侵時的對策。"
1006215-72 = "屆時它將會自動繞開線路並重新連接。"
1006215-73 = "除此之外還有許多功能，不過因為時間有限就先省略了。"
1006215-74 = "簡單來說，只要有了這個，就可以透過另外受到保護的通訊頻道──"
1006215-75 = "隨時直接聯絡了。"
1006215-76 = "老師一個，我一個。這樣就是一對了。"
1006215-77 = "[s]「我真的可以收下嗎？」"
1006215-78 = "是的，我反而希望您能夠收下。"
1006215-79 = "因為這是我以前侍奉過的人特別為我準備的，獨一無二的特殊製品。"
1006215-80 = "為了應對那個人回來的情況，是不是應該要留著它……是嗎？"
1006215-81 = "有必要嗎？明明有能用的東西卻不使用，這很不合理。#n那位大人想必也會這麼說的。"
1006215-82 = "因此我認為現在給老師使用是正確的選擇。#n相信那位大人也會做出同樣的判斷吧。"
1006215-83 = "進一步來說，這副耳機也會為自己能被人使用而感到高興才對。"
1006215-84 = "畢竟工具放著不用的話，使用壽命會變短。"
1006215-85 = "所以請老師趕緊戴上它，跟我24小時連結在一起吧。"
1006215-86 = "[s]「但我還是覺得這有點……」"
1006215-87 = "……為什麼呢？#n難道您已經有了我以外的其他人了嗎？"
1006215-88 = "和我的關係──"
1006215-90 = "──只是玩玩而已嗎！？"
1006215-91 = "[s]「怎麼突然說這種話呢，季同學！？」"
1006215-92 = "非常抱歉，老師。#n我是為了緩解嚴肅的氣氛才會想開個玩笑。"
1006215-93 = "如果要說得更具體一點的話，那是某部電視劇的重要台詞。"
1006215-94 = "雖然電視劇或電影我還是看不太懂，但依舊在努力學習。"
1006215-95 = "而那是其中我比較印象深刻的台詞。[ruby=V]耶[/ruby]。"
1006215-96 = "總之，我想跟您說的話很簡單。"
1006215-97 = "請收下它吧。#n還有，請一直陪在我身邊。"
1006215-98 = "以上就是我的請求。"
1006215-102 = "[ns]「謝謝你的……好意。那我就先收下了。」"
1006215-105 = "非常感謝您，老師。"
1006215-106 = "[s]「但是隨時戴著好像不太方便。」"
1006215-107 = "為什麼呢？這樣我會失望。#n不，我已經失望了。"
1006215-108 = "老師請看我現在垂頭喪氣的樣子……請您立刻負起責任。"
1006215-109 = "[s5]「我不是那個意思……可是這東西對季來說不是也很珍貴嗎？」\n[s6]「所以我也想要好好珍惜。」\n[s7]「真的需要用到它的時候，我會拿出來用的。」"
1006215-113 = "原來如此，如果是這個理由的話……"
1006215-114 = "好的，我可以接受。"
1006215-115 = "總之，這個就是我們的──"
1006215-116 = "情侶耳機了。"
1006215-117 = "[s]「季同學啊，那種話你又是在哪學到的……」"
1006215-118 = "是從電影中學到的。"
1006215-119 = "[s]「為了避免引起誤會，記得要多注意用詞……」"
1006215-120 = "怎麼這麼說呢？引發誤會才是我的目的啊？"
1006215-121 = "[s]「季同學，算我拜託你了，好嗎……？」"
1006215-124 = "（之後季又玩了許久才心滿意足地回去）"
1006215-125 = "（決定將季的耳機放到抽屜中保管……）"

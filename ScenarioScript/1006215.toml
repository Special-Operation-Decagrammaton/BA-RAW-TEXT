1006215-54 = "1;토키 모드 1;01;무슨 말씀을. 이것도 다 선생님의 동정심을 사기 위한 작전이었습니다.\n#1;m2"
1006215-55 = "1;토키 모드 1;01;거기에 한층 더 해서, 지나가는 사람들로 하여금."
1006215-56 = "1;토키 모드 1;02;'이렇게 완벽한 최고의 메이드를 밖에서 기다리게 하다니, 그것참 너무하네.' 같은 생각을 심어 주려는, 부수적인 효과까지 노린 것입니다.\n#1;m3"
1006215-57 = "1;토키 모드 1;01;……한 가지 중대한 문제가 있긴 했습니다만."
1006215-58 = "1;토키 모드 1;02;그게 무엇이냐고요? 그건, 샬레의 선생님 사무실 앞에는, 생각보다 지나다니는 사람이 적었다는 것이었습니다."
1006215-59 = "1;토키 모드 1;99;이 무슨 불찰. 다음에는 보다 심기일전하여, 선생님으로부터의 완벽한 동정심과, 주위의 곤란함을 사도록 하겠습니다.\n#1;em;[한숨]"
1006215-60 = "[s] \"너 지금 곤란함이라고 그랬지!?\""
1006215-61 = "1;토키 모드 1;01;아닙니다. 잘못 들으셨습니다."
1006215-62 = "[s] \"……그래. 그런 걸로 하자…….\""
1006215-63 = "1;토키 모드 1;01;어쨌든, 오늘 저의 목적은 이것입니다."
1006215-64 = "#st;[0,0];instant;1;"
1006215-65 = "#clearST"

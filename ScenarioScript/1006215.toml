1006215-92 = "3;토키 모드 1;99;죄송합니다. 선생님. 저 나름대로의 분위기를 풀기 위한 농담이었습니다.\n#3;closeup"
1006215-93 = "3;토키 모드 1;07;보다 구체적으로는, 어떤 드라마의 결정 대사였습니다.\n#3;closeup"
1006215-94 = "3;토키 모드 1;02;드라마나 영화는, 여전히 잘 모르겠습니다만, 어쨌든 계속해서 학습하려고 하는 중이니까요.\n#3;closeup"
1006215-95 = "3;토키 모드 1;01;그리고 그중에서도 뭔가 기억에 남은 대사였던 것입니다. 브이.\n#3;closeup\n#3;jump"
1006215-96 = "3;토키 모드 1;01;아무튼, 말씀드리고자 하는 것은 단순합니다.\n#3;closeup"
1006215-97 = "3;토키 모드 1;01;받아 주세요. 그리고 언제나 저와 함께 있어 주세요.\n#3;closeup"
1006215-98 = "3;토키 모드 1;01;제가 요청드리고 싶은 것은, 그것뿐입니다.\n#3;closeup"

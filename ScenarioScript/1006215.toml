[translation]
1006215-1 = "เครื่องพิสูจน์ความสัมพันธ์"
1006215-3 = "สำนักงานชาเล่ต์"
1006215-5 = "(มีเบอร์ที่ไม่รู้จักติดต่อเข้ามา)"
1006215-6 = "(คุณครูคิดว่าถ้าเป็นโทรศัพท์ขายประกันหรือเสนอเงินกู้ก็จะปฏิเสธไปอย่างสุภาพ...)"
1006215-7 = "สวัสดีค่ะ คุณครู"
1006215-8 = "[s] \"โทคิ?!\""
1006215-9 = "ยืนยันการเชื่อมต่อการสื่อสาร"
1006215-10 = "การทดสอบประสบความสำเร็จ ค่อยยังชั่วหน่อยค่ะ ฉันยังคงยอดเยี่ยมเหมือนเดิมตามคาดเลยค่ะ"
1006215-11 = "ยืนยันเรียบร้อยแล้วว่าสิ่งนี้จะทำให้ฉันติดต่อกับคุณครูได้ตลอด 24 ชั่วโมงค่ะ"
1006215-12 = "[s] \"ที่พูดมามันชวนให้เข้าใจผิดอยู่นะ...\""
1006215-13 = "แต่มันคือเรื่องจริงค่ะ "
1006215-14 = "ยิ่งกว่านั้นตอนนี้คุณครูยังสื่อสารกับฉันผ่านช่องทางที่ไม่รู้จักอยู่ไม่ใช่เหรอคะ?"
1006215-15 = "จะปฏิเสธข้อเท็จจริงที่เห็นชัดขนาดนี้งั้นเหรอคะ แบบนี้ไม่สมกับเป็นครูผู้สอนเลยไม่ใช่เหรอคะ?"
1006215-16 = "ปกติแล้วครูผู้สอนคือคนที่ควรชี้แนะนักเรียนให้เดินไปบนเส้นทางที่ถูกต้องโดยอาศัยพื้นฐานความเป็น#nจริงไม่ใช่เหรอคะ?"
1006215-17 = "[s] \"ที่พูดมามันก็... ใช่ละนะ\""
1006215-18 = "สมกับเป็นคุณครูจริงๆ ค่ะ คุยกันเข้าใจได้อย่างรวดเร็วจริงๆ"
1006215-19 = "เอาเป็นว่าฉันอยากพบคุณครูตอนนี้เลย พอดีมีของบางอย่างที่อยากจะให้คุณครูค่ะ"
1006215-20 = "[s] \"โทคิจะให้ครูเหรอ?\""
1006215-21 = "ใช่แล้วค่ะ นี่เป็นของดิจิทัลบางอย่างที่เมดสุดสมบูรณ์แบบคนพิเศษอย่างฉันจะให้คุณครู..."
1006215-22 = "ไม่สิ นี่คือเครื่องพิสูจน์ความสัมพันธ์ระหว่างเราสองคนค่ะ"
1006215-23 = "[s] \"เหมือนเพิ่งได้ยินอะไรบางอย่างที่น่ากลัวสุดๆ เลย?!\""
1006215-24 = "คุณครูได้ยินผิดแล้วละค่ะ"
1006215-25 = "เหมือนได้ยินไม่ผิดมากกว่างั้นเหรอคะ? ไม่ใช่อย่างนั้นหรอกค่ะ คุณครูได้ยินผิดไปจริงๆ นั่นแหละค่ะ"
1006215-26 = "ไม่ว่าคุณครูจะพยายามปฏิเสธขนาดไหน ฉันก็จะยืนยันแบบนั้นค่ะ"
1006215-27 = "ฟังนะคะ คุณครู ว่ากันว่าใน 1 ปี มนุษย์จะกลืนแมงมุมโดยเฉลี่ยประมาณ 8 ตัวค่ะ"
1006215-28 = "ถ้าอย่างนั้นแล้ว แสดงว่าใน 1 ปีจะมีมนุษย์เข้าใจผิดกันไปอย่างน้อย 100 ครั้งต่อปีไม่ใช่เหรอคะ?!"
1006215-29 = "คะ? แล้วมันเกี่ยวอะไรกับเรื่องนี้งั้นเหรอคะ?"
1006215-30 = "......"
1006215-31 = "ที่จริงแล้วมันก็ไม่เกี่ยวหรอกค่ะ แต่ว่าที่คุณครูได้ยินเมื่อกี้ คุณครูฟังผิดแน่นอนค่ะ เป็นแบบนั้นน่ะค่ะ"
1006215-32 = "[s] \"เอาเถอะ... เอาแบบนั้นก็ได้...\""
1006215-33 = "ขอบคุณค่ะ"
1006215-34 = "เพราะงั้นตอนนี้ฉันจะไปหาคุณครู..."
1006215-35 = "ฉันอยากนำเครื่องพิสูจน์ความสัมพันธ์ของเราไปให้ค่ะ สะดวกรึเปล่าคะ?"
1006215-36 = "[s] \"เข้าใจแล้ว... ตอนนี้อยู่ไหนน่ะ...?\""
1006215-37 = "ฟังดูเหมือนคุณครูยอมแพ้ทุกอย่างแล้วเลยนะคะ..."
1006215-38 = "แต่ไม่เป็นไรหรอกค่ะ ฉันเข้าใจได้ค่ะ ตอนนี้ฉันอยู่ที่ด้านหน้าสำนักงานชาเล่ต์แล้วค่ะ"
1006215-39 = "[s1] \"งั้นตอนนี้ก็คุยโทรศัพท์อยู่ที่หน้าสำนักงานเรอะ?!\"\n[s2] \"นี่คือโทรมาตอนถึงหน้าสำนักงานแล้วเรอะ?!\""
1006215-42 = "ใช่แล้วค่ะ"
1006215-50 = "สวัสดีค่ะคุณครู ฉันขอทักทายอย่างเป็นทางการอีกครั้งค่ะ"
1006215-51 = "[s3] \"หืม... โอเค...\"\n[s4] \"ถ้ามาถึงแล้วก็น่าจะเข้ามาสิ...\""
1006215-54 = "อะไรกันคะ นี่เป็นหนึ่งในแผนการทำให้คุณครูเห็นใจนะคะ"
1006215-55 = "นอกจากนี้ยังมีคนเดินผ่านไปมาอีกด้วย"
1006215-56 = "ฉันคิดจะให้หลายๆ คนเห็นภาพนี้แล้วคิดว่า 'ให้สุดยอดเมดผู้สมบูรณ์แบบยืนรอข้างนอกแบบนี้เหรอ ทำเกินไปแล้วนะ' แบบนี้ด้วยค่ะ"
1006215-57 = "แต่ว่ายังมีปัญหาใหญ่อยู่อีกเรื่องหนึ่งค่ะ..."
1006215-58 = "เรื่องอะไรงั้นเหรอคะ? นั่นก็คือตรงด้านหน้าของที่ทำงานของคุณครู มีคนเดินผ่านไปผ่านมาน้อยกว่า#nที่ฉันคิดไว้ค่ะ"
1006215-59 = "ทำไมถึงพลาดอะไรแบบนี้กันนะ คราวหน้าฉันจะเตรียมการให้สมบูรณ์แบบยิ่งขึ้นเพื่อจะได้รับความ#nสงสารจากคุณครูและความเห็นใจจากคนที่เดินผ่านไปผ่านมาให้ได้ค่ะ"
1006215-60 = "[s] \"เมื่อกี้พูดว่าความเห็นใจใช่มั้ย?!\""
1006215-61 = "เปล่าค่ะ ได้ยินผิดแล้วละค่ะ"
1006215-62 = "[s] \"เอาเถอะ... ครูหูฝาดไปเองก็ได้...\""
1006215-63 = "ยังไงก็เถอะค่ะ จุดประสงค์ที่ฉันมาในวันนี้ก็เพื่อสิ่งนี้ค่ะ"
1006215-69 = "ค่ะ ฉันซ่อนอะไรไว้งั้นเหรอคะ นี่เป็นชุดหูฟังที่สมบูรณ์แบบสำหรับสายลับและเมดค่ะ"
1006215-70 = "ถึงจะเป็นแบบอินเอียร์ แต่ก็ตัดเสียงรบกวนได้ดี ทั้งยังได้รับการปรับแต่งพิเศษเพื่อเลี่ยงไม่ให้ส่ง#nผลเสียต่อโสตประสาทของผู้ใช้งานค่ะ"
1006215-71 = "แน่นอนว่ามันสามารถใช้แทรกแซงและแฮ็กช่องสัญญาณพื้นฐานได้ด้วย แต่ก็มีฟังก์ชันเตรียมพร้อม#nสำหรับป้องกันการโดนแทรกแซงช่องสัญญาณด้วย"
1006215-72 = "ในกรณีนั้น ระบบจะตั้งค่าให้โอนสายอัตโนมัติค่ะ"
1006215-73 = "นอกจากนี้ยังมีฟังก์ชันอื่นๆ อีกมากมาย แต่ฉันขอไม่พูดถึงเนื่องจากมีระยะเวลาจำกัด"
1006215-74 = "สรุปเลยก็คือ ขอแค่มีอุปกรณ์ชิ้นนี้ ก็จะสามารถติดต่อสื่อสารกันได้โดยตรง"
1006215-75 = "ในช่องทางที่ปลอดภัยได้ค่ะ"
1006215-76 = "คุณครูเก็บไว้หนึ่งชิ้น ฉันเก็บไว้หนึ่งชิ้น เป็นหนึ่งคู่พอดีค่ะ"
1006215-77 = "[s] \"ให้ครูไว้ได้จริงๆ เหรอ?\""
1006215-78 = "ค่ะ ฉันอยากให้คุณครูรับไว้นะคะ"
1006215-79 = "นี่เป็นของพิเศษชิ้นเดียวที่คนที่ฉันเคยทำงานให้ทำขึ้นมาให้ฉันโดยเฉพาะค่ะ"
1006215-80 = "ฉันควรเก็บไว้เอง เผื่อว่าคนคนนั้นจะกลับมางั้นเหรอคะ?"
1006215-81 = "จะดีเหรอคะ? การที่ไม่ยอมใช้ของที่นำมาใช้ประโยชน์ได้แบบนั้น มันไม่สมเหตุสมผลเลยค่ะ คนคนนั้นก็พูดแบบนี้เหมือนกันค่ะ"
1006215-82 = "เพราะงั้น ฉันคิดว่าให้คุณครูใช้ตอนนี้น่าจะดีกว่าค่ะ คนคนนั้นก็คงจะตัดสินใจแบบนี้เหมือนกันค่ะ"
1006215-83 = "ยิ่งไปกว่านั้น หูฟังอันนี้ก็คงจะดีใจที่ตัวเองได้ถูกใช้ให้เป็นประโยชน์ค่ะ"
1006215-84 = "พวกอุปกรณ์ต่างๆ ถ้าไม่ใช้นานๆ อายุการใช้งานของมันก็จะสั้นลงนะคะ"
1006215-85 = "เพราะงั้นคุณครู... ได้โปรดใส่หูฟังอันนี้ แล้วติดต่อกับฉันตลอด 24 ชั่วโมงด้วยนะคะ"
1006215-86 = "[s] \"แบบนั้นมันออกจะ...\""
1006215-87 = "ทำไมเหรอคะ? หรือว่านอกจากฉัน มีคนอื่นทำให้คุณครูไปแล้วเหรอคะ?"
1006215-88 = "ความสัมพันธ์ของคุณครูกับฉัน..."
1006215-90 = "เป็นแค่เรื่องล้อเล่นงั้นเหรอคะ...?!"
1006215-91 = "[s] \"จู่ๆ ก็พูดอะไรเนี่ย โทคิ!?\""
1006215-92 = "ขอโทษค่ะคุณครู ฉันแค่อยากเล่นมุกตลกๆ เพื่อให้บรรยากาศผ่อนคลายค่ะ"
1006215-93 = "มันเป็นบทพูดในตอนที่ต้องตัดสินใจจากซีรีส์บางเรื่องน่ะค่ะ"
1006215-94 = "ตอนนี้ฉันก็ยังไม่ค่อยเข้าใจซีรีส์หรือภาพยนตร์สักเท่าไร แต่ก็พยายามเรียนรู้อยู่ค่ะ"
1006215-95 = "และจากในซีรีส์ที่ดูมา มันก็เป็นบทพูดบทหนึ่งที่ฉันจำได้ขึ้นใจค่ะ ปิ้วๆ "
1006215-96 = "เอาเป็นว่า สิ่งที่ฉันอยากจะบอกนั้นมันเรียบง่ายมากค่ะ"
1006215-97 = "ช่วยรับอุปกรณ์นี้ไว้ และขอให้ไม่ว่าเมื่อไรก็อยู่กับฉันด้วยนะคะ"
1006215-98 = "สิ่งที่ฉันอยากจะขอ... ก็มีเพียงเท่านี้ค่ะ"
1006215-102 = "[ns] \"ขอบคุณ... สำหรับน้ำใจนะ ครูจะรับไว้นะ\""
1006215-105 = "ขอบคุณนะคะ คุณครู"
1006215-106 = "[s] \"ถ้าให้ใส่ตลอดเวลาเลยอาจจะลำบากนิดหน่อยน่ะ\""
1006215-107 = "ทำไมเหรอคะ? ฉันผิดหวังนะคะ ไม่สิ... แบบนั้นฉันจะผิดหวังนะคะ"
1006215-108 = "ดูสิคะคุณครู... ไหล่ฉันเริ่มตก เริ่มห่อเหี่ยวแล้วนะคะ... ช่วยรับผิดชอบที่ทำให้ฉันเป็นแบบนี้ด้วยค่ะ"
1006215-109 = "[s5] \"ไม่ใช่อย่างนั้น... ก็มันเป็นของสำคัญของโทคินี่นา\"\n[s6] \"ของสำคัญของโทคิ ครูก็อยากทะนุถนอมน่ะ\"\n[s7] \"เอาเป็นว่าถ้าถึงเวลาที่ต้องใช้ ครูก็จะใช้แล้วกันนะ\""
1006215-113 = "อย่างนี้นี่เอง ถ้าเป็นเพราะเหตุผลนั้นละก็..."
1006215-114 = "ค่ะ ฉันจะยอมเข้าใจค่ะ"
1006215-115 = "งั้นก็เอาเป็นว่าหูฟังชิ้นนี้..."
1006215-116 = "คือหูฟังคู่ของพวกเรานะคะ"
1006215-117 = "[s] \"ไปเรียนพูดอะไรแบบนั้นมาจากไหนน่ะ โทคิ...\""
1006215-118 = "เรียนมาจากในภาพยนตร์ค่ะ"
1006215-119 = "[s] \"พูดแบบนั้นมันชวนเข้าใจผิดได้นะ ระวังเรื่องการใช้คำหน่อยแล้วกัน..\""
1006215-120 = "พูดอะไรอย่างนั้นคะ ฉันตั้งใจพูดให้เข้าใจผิดนะคะ"
1006215-121 = "[s] \"โทคิ ครูขอร้องละ หืม? โทคิ...\""
1006215-124 = "(หลังจากนั้นโทคิก็พูดล้อเล่นต่อไปอีกสักพัก จนเธอพอใจแล้วถึงยอมกลับไป)"
1006215-125 = "(คุณครูเก็บหูฟังของโทคิไว้ในลิ้นชักอย่างระมัดระวัง...)"

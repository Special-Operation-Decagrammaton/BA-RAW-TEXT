[translation]
34160-1 = "ตอนที่ 16;ทางเชื่อมใต้ดิน"
34160-2 = "อาคารเรียนเก่า โรงเรียนสาขาอาเรียส"
34160-4 = "ทางนี้"
34160-5 = "[s] \"นี่คงเป็นอาคารเก่าของโรงเรียนสาขาอาเรียสสินะ\""
34160-6 = "เพิ่งจะเคยเข้ามาข้างในเป็นครั้งแรกเลยค่ะ..."
34160-7 = "ใช่ อาคารนี้มันอยู่ใกล้พื้นที่รกร้างน่ะ... ไม่สิ มันอยู่ใกล้ซากปรักหักพัง"
34160-8 = "สงสัยจังค่ะว่าเมื่อก่อนนักเรียนอาเรียสมาเรียนที่นี่หรือเปล่า... แล้วพวกเธอได้เรียนอะไรไปบ้าง..."
34160-9 = "ฉันก็ไม่รู้เหมือนกัน คงไม่เหลือใครที่ยังจดจำที่นี่ได้อีกแล้วละ"
34160-10 = "เอาละ เร็วเข้าเถอะ ทางเชื่อมอยู่ใต้ดิน"
34160-12 = "ทางเชื่อมใต้ดิน อาคารเรียนเก่า"
34160-13 = "จะ... เจอแล้วค่ะ! น่าจะเป็นทางนี้ค่ะ!"
34160-14 = "อย่างนั้นสินะ "
34160-15 = "เดี๋ยวก่อน..."
34160-19 = "ถ้าที่นี่เชื่อมต่อเป็นเส้นตรงกับมหาวิหารอย่างที่หัวหน้าว่า... ก็ถือว่าไม่ปลอดภัย"
34160-20 = "ฉันก็คิดเรื่องกองกำลังซุ่มโจมตีเหมือนกัน ยิ่งถ้าเป็นทางตรงละก็..."
34160-21 = "เปล่า ฉันหมายถึงมิโซโนะ มิกะน่ะ"
34160-22 = "ฉันลองคิดดูน่ะว่าถ้าฉันเป็นมิกะ... ฉันจะทำยังไงดี..."
34160-23 = "อุปสรรคที่ยิ่งใหญ่ที่สุดของมิกะคงเป็นคุณครูน่ะ คงจะเสียความรู้สึกจากการสั่งการของคุณครู แต่ก็ไม่อยากทำให้คุณครูบาดเจ็บ"
34160-25 = "ถ้าเป็นอย่างนั้นแล้วละก็..."
34160-29 = "ครืนนนนนนนนนนน!!"
34160-30 = "แรงสั่นนี่มัน......"
34160-31 = "เอ่อ... เอ๋...? ระ... ระวังด้วยค่ะ! คุณครู! ข้างหลังค่ะ! เสากำลังถล่มลงมาค่ะ!!"
34160-32 = "[ns1] \"...!!\"\n[ns2] วิ่งหลบเสาที่ถล่มไปข้างหน้า"
34160-38 = "ตึงงงงงง!!"
34160-40 = "แค่กๆ! เป็นอะไรรึเปล่าคุณครู?"
34160-41 = "[s] \"อื้ม ครูไม่เป็นไร...\""
34160-42 = "ละ... โล่งอกไปทีค่ะ... แต่ทำไมจู่ๆ เสาก็ถล่มลงมานะ..."
34160-46 = "อ๊ะ... อ๊ะ...!? หัวหน้าล่ะคะ?"
34160-47 = "หัวหน้า? อยู่ไหนน่ะ?"
34160-48 = "ฉันอยู่ทางนี้... ฝั่งตรงข้ามกับเสาที่ถล่ม "
34160-49 = "ซากเสาบังจนมองไม่เห็นเลย บาดเจ็บตรงไหนหรือเปล่า?"
34160-50 = "อ่า... ฉันไม่เป็นไร"
34160-51 = "ระ... รอเดี๋ยวนะคะหัวหน้า! ฉันจะยกเศษซากเสาออกเอง..."
34160-56 = "อ๊ะ... อ๊ะ...! ยังไม่หมดอีกเหรอคะเนี่ย? จะถล่มอีกเหรอ? "
34160-60 = "แค่กๆ แค่กๆ... "
34160-61 = "ไม่ได้การแล้ว เราถูกขังเอาไว้เรียบร้อยแล้วละ "
34160-62 = "ระ... เราจบเห่แล้วเหรอคะ?! แล้วหัวหน้าล่ะคะ? ยังโอเคอยู่หรือเปล่าคะ?"
34160-63 = "หัวหน้า? ได้ยินไหม? ทางกลับถูกปิดหรือเปล่า? ดูท่าแล้วเราต้องหาจุดที่มาเจอกันระหว่างทางแล้วละ"
34160-66 = "ไม่หรอก... ทำแบบนั้นจะเหนื่อยกันเปล่าๆ"
34160-70 = "ยังรอดอยู่สินะ... ฉันห่วงว่าคุณครูจะโดนลูกหลงไปด้วยก็เลยลดกำลังลงหน่อย แต่ก็ลุ้นจนใจหาย#nใจคว่ำเลยละ"
34160-75 = "..."
34160-80 = "จะยังไงก็เถอะ ก็ดีแล้วละนะที่หวยมาออกที่เธอน่ะ โจมาเอะ ซาโอริ"
34160-82 = "ตอนต่อไป;การปะทะ"

[translation]
34160-1 = "第16話;地下迴廊"
34160-2 = "奧利斯分校．舊校舍"
34160-4 = "就是這裡。"
34160-5 = "[s] 「這裡就是奧利斯分校，過去的校舍……」"
34160-6 = "我還是第一次進到裡面……"
34160-7 = "是啊。這裡是廢墟……不如說已經接近是遺跡了。"
34160-8 = "過去的奧利斯學生都在這裡唸書嗎……#n都，都在學些什麼呢……"
34160-9 = "誰知道呢……知道這些的人，應該都已經不在了吧。"
34160-10 = "快走吧……迴廊就在地下。"
34160-12 = "舊校舍．地下迴廊"
34160-13 = "找，找到了！在這裡！"
34160-14 = "在這裡啊。"
34160-15 = "……等等。"
34160-19 = "如果隊長說的沒錯，從這裡到宗座聖殿是條直線的通道的話……這個地形很危險。"
34160-20 = "我也想過有埋伏的可能性。但是，不如說這樣一直線的地形……"
34160-21 = "不，我指的是聖園彌香。"
34160-22 = "我試著想過……如果我是她的話會怎麼做。"
34160-23 = "對她來說最大的阻礙，或許是老師的存在。#n雖然不想讓老師受傷，但老師的指揮也很麻煩。"
34160-25 = "所以肯定會……"
34160-29 = "（轟隆隆隆隆──）"
34160-30 = "這是……"
34160-31 = "小，小心！老師，你背後的柱子……！！"
34160-32 = "[ns1] 「……！！」\n[ns2] 避開倒下的柱子向前跑"
34160-38 = "（轟隆隆──！！！！）"
34160-40 = "唔……老師，你沒事吧？"
34160-41 = "[s] 「嗯，還好……」"
34160-42 = "太，太好了……柱子竟然會突然倒下……究竟是……"
34160-46 = "啊，啊啊！？隊，隊長呢？"
34160-47 = "隊長，在哪？"
34160-48 = "……我在這裡，你們的另一邊。"
34160-49 = "因為瓦礫的關係看不太清楚，有受傷嗎？"
34160-50 = "不，我沒事。"
34160-51 = "請，請等一下，隊長！我會想辦法處理這個柱子的……"
34160-56 = "啊，啊啊！還沒有結束嗎！？又倒下來更多了！？"
34160-60 = "……咳咳，咳咳。"
34160-61 = "不行……完全被堵住了。"
34160-62 = "全，全都完蛋了！？隊長沒事嗎？"
34160-63 = "隊長，聽得到嗎？如果你那邊的路沒有堵死的話，找個地點會合吧。"
34160-66 = "……不，這可能有點困難。"
34160-70 = "……太好了！雖然擔心會波及到老師而降低了威力。#n儘管如此還是有點不安呢。"
34160-75 = "……"
34160-80 = "不過，錠前沙織──能漂亮地把你留下來真是太好了。"
34160-82 = "下一話;對決"

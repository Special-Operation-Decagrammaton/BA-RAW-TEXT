[translation]
34160-1 = "Episode 16; Underground Corridor"
34160-2 = "Arius Satellite School Former Institute"
34160-4 = "This way."
34160-5 = "[s] \"This is the oldest building I've seen in the Arius district.\""
34160-6 = "I've n-never been inside before..."
34160-7 = "That makes sense. It may be in ruins, but it's considered a historical site."
34160-8 = "It's so weird to think the original Arius students studied in there. I wonder what kind of lessons they had..."
34160-9 = "Those questions are lost to history."
34160-10 = "Let's go. We need to get to the underground corridor."
34160-12 = "Former Institute Underground Corridor"
34160-13 = "Th-This way! I think this is it!"
34160-14 = "Great job, Hiyori.  "
34160-15 = "A moment, please."
34160-19 = "If the passage is connected to the basilica in a straight line...the terrain will be dangerous."
34160-20 = "I've thought about the possibility of an ambush. Considering it's a straight line..."
34160-21 = "No, I'm talking about Misono Mika."
34160-22 = "I've been trying to think what I would do in her shoes."
34160-23 = "Right now, Sensei is her only obstacle. She doesn't want to hurt them, but Sensei's presence puts realizing her vengeance out of reach."
34160-25 = "That means..."
34160-29 = "*rumble*"
34160-30 = "That's not good."
34160-31 = "S-S-Sensei! Oh no, turn around! That pillar's collapsing!"
34160-32 = "[ns1] \"...!\"\n[ns2] Dodge the falling pillar."
34160-38 = "*boom*"
34160-40 = "Are you okay, Sensei?"
34160-41 = "[s] \"Yeah, just barely.\""
34160-42 = "Th-Thank goodness. I know these ruins are old, but it collapsed outta nowhere."
34160-46 = "W-Wait! Where's Leader?"
34160-47 = "Leader? Where are you?"
34160-48 = "I'm here. On the other side of the pillar.  "
34160-49 = "There's too much smoke and debris. Are you hurt?"
34160-50 = "I made it out okay. Just on the wrong side.  "
34160-51 = "I-I'll move the pillar for you, Leader! Just wait one second!"
34160-56 = "Augh! What do I do? Me moving it is just making everything worse! Why do I always make everything worse?  "
34160-60 = "*cough* *cough* "
34160-61 = "This is bad. There's no way around it.  "
34160-62 = "Everything is ruined! Leader! Are you okay?"
34160-63 = "Leader, can you hear me? We're going to have to find a point in the middle to meet."
34160-66 = "I think I'll have to take a rain check on that."
34160-70 = "...I did it! I really had to control the power so Sensei wouldn't get sucked in!"
34160-75 = "..."
34160-80 = "Well, Joumae Saori. I was hoping it would be you."
34160-82 = "Next Episode; Contest"

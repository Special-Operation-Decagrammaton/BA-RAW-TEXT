[translation]
34160-1 = "第16話;地下回廊"
34160-2 = "アリウス分校・旧校舎 "
34160-4 = "こっちだ。"
34160-5 = "[s] \"ここがアリウス分校の、昔の校舎……。\""
34160-6 = "中に入ったのは初めてです……。"
34160-7 = "そうだね。ここは廃墟……というより、もはや遺跡に近いところだから。"
34160-8 = "昔はここでアリウス生が勉強をしていたのでしょうか……。#nど、どんなことを学んでいたんでしょう……。"
34160-9 = "さぁ……それを覚えている人は、もういないだろうね。 "
34160-10 = "急ぐぞ……回廊は地下にある。"
34160-12 = "旧校舎・地下回廊"
34160-13 = "み、見つけました！こっちです！"
34160-14 = "そうか。 "
34160-15 = "……待って。"
34160-19 = "リーダーの言葉通り、ここがバシリカまで一直線に繋がっている通路なら……この地形は危ない。"
34160-20 = "待ち伏せの可能性なら私も考えている。だが、むしろ一直線なら……。"
34160-21 = "いや、[ruby=みその]聖園[/ruby]ミカの話。"
34160-22 = "私が彼女ならどうするのか……考えたの。"
34160-23 = "彼女にとって一番の障害は多分、先生の存在。#n怪我をさせたくもないし、先生の指揮も厄介だろうから。"
34160-25 = "ならきっと……。"
34160-29 = "ゴゴゴゴゴゴゴゴゴゴ"
34160-30 = "これは……。"
34160-31 = "き、気をつけてください！先生、後ろから柱が……！！"
34160-32 = "[ns1] \"………！！\"\n[ns2] 倒れてくる柱を避けて前へ走る。"
34160-38 = "ドォォオオン！！！！"
34160-40 = "くっ……先生、大丈夫？"
34160-41 = "[s] \"うん、何とか……。\""
34160-42 = "よ、よかったです……急に柱が壊れるなんて……いったい……。"
34160-46 = "あ、ああっ！？り、リーダーは？"
34160-47 = "リーダー、どこ？"
34160-48 = "……ここだ。反対側にいる。"
34160-49 = "瓦礫のせいでよく見えない。怪我は？"
34160-50 = "ああ、大丈夫だ。"
34160-51 = "ちょ、ちょっと待ってくださいね、リーダー！柱をどかしてみます……。"
34160-56 = "あ、ああっ！まだ終わってないんですか！？もっと倒れてくるっ！？"
34160-60 = "……けほっ、けほっ。"
34160-61 = "ダメだ……完全に塞がれてる。"
34160-62 = "か、完全に終わりですね！？リーダーは大丈夫なんですか！？"
34160-63 = "リーダー、聞こえる？そっちに戻る道が塞がってないなら、合流地点を探すよ。"
34160-66 = "……いや、それは厳しそうだ。"
34160-70 = "……良かった！先生が巻き込まれるかもと思って、威力を下げたんだけどさ。#nそれでも不安だったから。"
34160-75 = "……。"
34160-80 = "まあでも、[ruby=じょうまえ]錠前[/ruby]サオリ――こうして、あなたが綺麗に残ってくれて良かった。"
34160-82 = "次回;対決"

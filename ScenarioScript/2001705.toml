[translation]
2001705-1 = "ถึงยังไงก็ต้องรู้ให้ได้"
2001705-2 = "(คุณครูตัดสินใจซื้อนิตยสาร <ron-ro> เล่มใหม่มาเป็นของฝากให้ฮิโยริ)"
2001705-3 = "ขอบคุณที่มาอุดหนุนนะครับ"
2001705-5 = "[ns] ไปยังตึกร้างที่ฮิโยริอยู่"
2001705-8 = "โรงแรมที่ถูกทิ้งร้างมานาน"
2001705-9 = "[ns1] (เห็นบอกว่าอยู่ที่นี่นี่นา...)\n[ns2] (ดูไม่น่าจะมีใครอยู่ที่นี่เลยแหะ...)"
2001705-10 = "อะ...อือออ...."
2001705-11 = "อะ...อือออ...."
2001705-12 = "[s3] (ได้ยินเสียงจากที่ไหนสักแห่ง...?)\n[s4] (เสียงฮิโยรินี่นา?!)"
2001705-13 = "อึ่ก... อือ... ปวด..."
2001705-14 = "อึ่ก... อือ... ปวด..."
2001705-15 = "[s] เดินลงไปชั้นใต้ดินตามเสียงที่ได้ยิน"
2001705-24 = "(เจอฮิโยริหมดสติอยู่ที่มุมหนึ่งของห้องใต้ดิน)"
2001705-25 = "[ns] \"ฮิโยริ?!! เกิดอะไรขึ้นเนี่ย?\""
2001705-26 = "คะ... คะ... คุณครู?! ทำไมถึง......"
2001705-27 = "แย่แล้วค่ะ... ปวด...ท้อง... อือ.... อะ...อือ..."
2001705-28 = "[ns] \"รอเดี๋ยวนะ ครูจะพาไปโรงพยาบาลเดี๋ยวนี้แหละ!\""
2001705-30 = "(คุณครูประคองฮิโยริขึ้นมาแล้วรีบพาไปโรงพยาบาลใกล้ๆ)"
2001705-32 = "เธอไม่ได้บาดเจ็บตรงไหนร้ายแรงหรอกครับ แค่มีอาการท้องเสียน่ะครับ ให้แอดมิดเข้ารักษาตัวสัก 2-3 วันก็จะหายดีครับ"
2001705-33 = "[s] \"ขอบคุณมากนะคุณหมอ...\" "
2001705-34 = "นอกจากนี้ ผู้ป่วยเหมือนจะมีอาการขาดสารอาหารอยู่ด้วยนะครับ ต้องรบกวนดูแลเรื่องอาหารของ#nผู้ป่วยให้ดีด้วยนะครับ"
2001705-35 = "[s] \"...\""
2001705-37 = "คุณครู..."
2001705-38 = "[s] \"นอนไปก่อนเถอะ ฮิโยริ หมอบอกว่าเธอท้องเสียต้องให้พักผ่อนก่อน\""
2001705-39 = "ขะ... ขอโทษค่ะ... ฉันรบกวนคุณครูอีกแล้ว..."
2001705-40 = "ท้องเสียเหรอคะ... คิดแล้วเชียว... นะ...น้ำประปาที่ตึกร้างนั่นดูสะอาดดี... ฉะ...ฉันก็เลยดื่มเข้าไป... คงเพราะน้ำนั่นแน่ๆ ค่ะ... "
2001705-41 = "ถ้าฉันเอาน้ำนั่นกลับไปเฉยๆ คนอื่นอาจจะต้องลำบากก็ได้นะคะ..."
2001705-42 = "[s] \"ทำไมถึงทำแบบนั้นล่ะ\""
2001705-43 = "เมื่อก่อนตอนอยู่ที่เขตปกครองตนเองอาเรียส ฉันก็กินน้ำแบบนั้นบ่อยๆ ตอนนั้นไม่เป็นอะไรเลยแท้ๆ ..."
2001705-44 = "สงสัยร่างกายฉันจะปรับตัวกับน้ำในเขตนั้นไม่ได้แน่เลยค่ะ"
2001705-45 = "[s] \"ครูว่าปัญหามันไม่ใช่เรื่องนั้นหรอกนะ\""
2001705-46 = "แย่แล้วค่ะ... คงต้องเป็นโทษจากการที่ขโมยใช้ของเล็กๆ น้อยๆ ไปแน่เลยค่ะ..."
2001705-47 = "แต่ว่า..."
2001705-48 = "ทุกคนคงเป็นห่วงแย่แล้ว..."
2001705-50 = "ถ้าไม่รีบกลับไปตอนนี้..."
2001705-52 = "[s] \"อย่าเพิ่งลุกสิ นอนไปก่อน\""
2001705-53 = "แต่ว่า..."
2001705-54 = "[s] \"ครูซื้อนิตยสารมาให้ด้วยนะ\""
2001705-55 = "นะ...นิตยสารเหรอคะ?~ ระ... หรือว่าเป็นเล่มใหม่ที่มีสกู๊ปพิเศษด้วย?!"
2001705-56 = "งะ...งั้นเหรอคะ... จะ...จะใช้เหยื่อล่อเพื่อจับฉัน..."
2001705-57 = "แย่แล้วค่ะ... ตะ...ต่อไปคงจะต้องเชื่อฟังอย่างช่วยไม่ได้แล้วสินะคะ... ขะ... เข้าใจแล้วค่ะ"
2001705-62 = "คุณครู... ฉะ...ฉันรู้สึกไม่ดีเท่าไร คุณครูจะคอยอยู่ข้างๆ ฉันใช่มั้ยคะ?"
2001705-63 = "[s5] \"อื้อ\"\n[s6] \"แน่นอน\""
2001705-64 = "ขอบคุณค่ะ..."
2001705-65 = "ขอบคุณค่ะ..."
2001705-67 = "(คุณครูนั่งเฝ้าฮิโยริอยู่ข้างๆ ตลอดทั้งคืน)"
2001705-69 = "(ตอนที่ตื่นขึ้นมาหลังจากเผลอหลับไป ก็ไม่เจอฮิโยริอยู่บนเตียงแล้ว)"
2001705-70 = "[ns] \"ฮิโยริ...?\""
2001705-72 = "[ns] \"หรือว่ากลับไปทั้งๆ แบบนั้น...?\""
2001705-73 = "มุแงงงง--!!"
2001705-74 = "คุณครู แย่แล้วค่ะ! ฉันคงจบสิ้นแล้วค่ะ...!"
2001705-75 = "ดูนิตยสารนี่สิคะ! เขาบอกว่าสะดือของคนทั่วไปจะเป็นแบบนี้ค่ะ! แต่ว่าของฉัน... ของฉันมัน...!!"
2001705-78 = "― ชะ...ช่วยดูหน่อยสิคะ คุณครู[wa:1290] "
2001705-80 = "―  ตรงนี้... ของฉัน...[wa:240] "
2001705-83 = "― มะ... มันแปลกใช่มั้ยคะ?[wa:2050] "
2001705-85 = "― มันไม่เหมือนคนอื่นใช่มั้ยคะ?"
2001705-88 = "― มะ...เมื่อก่อนฉันคิดมาตลอด[wa:120] "
2001705-90 = "― ว่ามันแปลกๆ อยู่แล้วเชียว...[wa:720] "
2001705-93 = "― ว่าแล้ว... มันแปลกจริงๆ ด้วยสินะคะ!![wa:440] "
2001705-96 = "― คุณครู...?[wa:2140] "
2001705-98 = "― ทำไมคุณครูถึงหลบตาบ่อยๆ ล่ะคะ?[wa:1140] "
2001705-101 = "― หรือว่า..."
2001705-103 = "― หรือว่ามันแปลกมากๆ จนมองตรงๆ ไม่ได้เลยงั้นเหรอคะ?[wa:1760] "
2001705-106 = "― แงงงงง-- อย่างนั้นเหรอคะ[wa:1800] "
2001705-108 = "― ถ้าเป็นแบบนี้... ก็ไม่มีความหมายที่จะมีชีวิตอยู่แล้วค่ะ[wa:410] "
2001705-111 = "― ทำไมชีวิตของฉัน ถึงกลายเป็นแบบนี้ได้คะ?[wa:410] "
2001705-114 = "― ทำไมมันถึงยุ่งเหยิงและวุ่นวาย...[wa:910] "
2001705-116 = "― เหมือนกับตรงนั้นของฉันที่มองตรงๆ ยังไม่ได้เลยค่ะ"
2001705-119 = "― แหะๆๆ... คุณครู[wa:1860] "
2001705-121 = "― ช่วยพูดปลอบใจฉันหน่อยได้มั้ยคะ... [wa:190] "
2001705-124 = "― ว่าถึงร่างกายฉันจะแปลกๆ แต่ก็ยังทำประโยชน์บางอย่างได้?[wa:410] "
2001705-126 = "― ช่วยพูดหน่อยได้มั้ยคะ[wa:10] "
2001705-129 = "[ns] \"ใจเย็นๆ ก่อน! รีบเอาเสื้อลงเถอะ!!\""
2001705-131 = "มันเขียนไว้ว่า <เรื่องลับพิเศษที่ไม่ได้สอนในโรงเรียน> ค่ะ... เขียนไว้ว่าคนที่มีสะดือแบบนี้... จะเป็นคนที่มีเสน่ห์พิเศษค่ะ..."
2001705-132 = "[s] \"...\""
2001705-133 = "แต่ตัวฉัน... แม้แต่สะดือยังดูแปลกเลยค่ะ แย่แล้วค่ะ ชีวิตฉันจบสิ้นแล้วค่ะ ถ้ารู้อย่างนี้... ฉันคงไม่อ่าน#nนิตยสารหรอก"
2001705-134 = "[s] \"ฮิโยริ...\""
2001705-135 = "คะ? มีอะไรเหรอคะ? คุณครู...?"
2001705-136 = "[s] \"ครูขอยึดนิตยสารนะ\""
2001705-137 = "คะ? ทะ...ทำไมคะ?! ทำไมล่ะคะ! ทำไมกันคะ?!"
2001705-138 = "มะ...ไม่ได้นะคะ! คุณครู... ฉันยังอ่านไม่จบเลยนะคะ มุแงงงงง-!"

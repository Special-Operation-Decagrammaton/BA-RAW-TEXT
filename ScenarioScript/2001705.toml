[translation]
2001705-1 = "少女依然想知道"
2001705-2 = "（看日和似乎心情掉到了谷底，便去買《ron-ro》最新刊給他當禮物）"
2001705-3 = "謝謝您的惠顧！"
2001705-5 = "[ns] 前往日和現在落腳的廢墟"
2001705-8 = "封鎖許久的飯店"
2001705-9 = "[ns1] （應該是這裡吧……）\n[ns2] （但感覺不到有人？）"
2001705-10 = "……嗚。"
2001705-11 = "……嗚。"
2001705-12 = "[s3] （呻吟聲……？）\n[s4] （是日和的聲音！？）"
2001705-13 = "呃呃……呃呃……好痛……"
2001705-14 = "呃呃……呃呃……好痛……"
2001705-15 = "[s] 前往傳出聲音的地下室"
2001705-24 = "（日和倒在地下室的一角）"
2001705-25 = "[ns]「日和！怎麼回事！？」"
2001705-26 = "老，老師……？為，為什麼……"
2001705-27 = "我，不行了……我的肚子……呃呃……呃……"
2001705-28 = "[ns]「我們馬上去醫院！抓緊我！」"
2001705-30 = "（抱著日和奔向附近的醫院）"
2001705-32 = "……不是什麼大問題。只是吃壞肚子而已。#n以防萬一，住院靜養2、3天左右就行了。"
2001705-33 = "[s]「是……謝謝醫生。」 "
2001705-34 = "還有就是……這位同學似乎有營養不良的狀況。#n請叮嚀他飲食方面要多加留意。"
2001705-35 = "[s]「……」"
2001705-37 = "老師……"
2001705-38 = "[s]「好好躺著。你得再多休養一會。」"
2001705-39 = "嗚嗚……對不起……我又給老師添麻煩了……"
2001705-40 = "那棟廢墟的自來水果然不行啊……"
2001705-41 = "還好有及早發現……要是直接帶回去給其他人喝了，又會給其他人帶來困擾……"
2001705-42 = "[s]「為什麼要喝廢墟的水……」"
2001705-43 = "以前在奧利斯自治區的時候，我也和這次一樣直接喝自來水……#n但那時候都沒怎樣……"
2001705-44 = "大概是身體沒有適應不同地區的水吧……"
2001705-45 = "[s]「我覺得應該不是那種問題……」"
2001705-46 = "那這果然……是因為我到處做壞事而受到的懲罰……"
2001705-47 = "但是……"
2001705-48 = "大家應該很擔心我吧……"
2001705-50 = "我該回去了……"
2001705-52 = "[s]「不行，再繼續躺著。」"
2001705-53 = "可是……"
2001705-54 = "[s]「我買了雜誌給日和唷。」"
2001705-55 = "雜，雜誌！？難，難道是刊載這次專題的最新刊！？"
2001705-56 = "竟，竟然用這麼甜美的誘惑……"
2001705-57 = "完蛋了……我現在對老師說的話只能照單全收了……那好吧……"
2001705-62 = "老師……我好不安，所以……那個……你能陪在我身邊嗎？"
2001705-63 = "[s5]「嗯。我會陪在你身邊，好好休息吧。」\n[s6]「當然，我會一直陪著你。」"
2001705-64 = "非常謝謝老師……"
2001705-65 = "非常謝謝老師……"
2001705-67 = "（於是便在日和身旁陪了他一整晚）"
2001705-69 = "（稍微睡了一下之後，醒來時日和已經不在床上了）"
2001705-70 = "[ns]「日和……？」"
2001705-72 = "[ns]「難道他拖著那副身體……？」"
2001705-73 = "嗚哇啊啊啊啊啊──！！"
2001705-74 = "老師……完蛋了！全都完了！"
2001705-75 = "老師請看這本雜誌！上面寫說普通人的肚臍是長這樣！但是我……我……！！"
2001705-78 = "― 請，請看，老師，[wa:2050] "
2001705-80 = "― 我的這個地方……[wa:720] "
2001705-83 = "― 果，果然很奇怪對不對？[wa:2530] "
2001705-85 = "― 跟大家不一樣對吧！？"
2001705-88 = "― 我從以前就一直在想，[wa:760] "
2001705-90 = "― 自己的肚臍是不是很奇怪……[wa:1320] "
2001705-93 = "― 果然，真的是那樣對吧……！[wa:1360] "
2001705-96 = "― 老，老師？[wa:2340] "
2001705-98 = "― 為什麼從剛才，就一直把視線……？[wa:1700] "
2001705-101 = "― 難道……"
2001705-103 = "― 奇，奇怪到了無法直視的程度嗎！？[wa:3080] "
2001705-106 = "― 一定是這樣對吧……[wa:2400] "
2001705-108 = "― 看來我已經沒有活下去的意義了。[wa:2010] "
2001705-111 = "― 為什麼人生會……[wa:1650] "
2001705-114 = "― 像我這簡直無法直視的地方一樣，[wa:1590] "
2001705-116 = "― 這麼畸形……"
2001705-119 = "― 老，老師……[wa:2220] "
2001705-121 = "― 請至少說點感想吧……[wa:1150] "
2001705-124 = "― 像是這種身體也沒關係，也能有用處之類的，[wa:1770] "
2001705-126 = "― 拜託說點什麼吧……[wa:230] "
2001705-129 = "[ns]「你先冷靜！會著涼的，先把衣服放下來！！」"
2001705-131 = "雜誌說的「學校絕對不會教的祕密知識」原來是這麼回事啊……#n特別有魅力的人，肚臍好像都長這樣……"
2001705-132 = "[s]「……」"
2001705-133 = "但我卻連肚臍都長這麼奇怪……真的完蛋了。#n早知道會變這樣，還不如一開始就什麼都不知道比較好……"
2001705-134 = "[s]「日和……」"
2001705-135 = "是……怎麼了，老師？"
2001705-136 = "[s]「我要沒收這本雜誌。」"
2001705-137 = "咦！？為，為什麼！？為什麼呀！？"
2001705-138 = "不，不行！老師，我都還沒看完耶！嗚哇啊啊啊啊！"

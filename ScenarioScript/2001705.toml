[translation]
2001705-1 = "The Girl Still Wants to Know"
2001705-2 = "I had no choice but to buy the latest issue of Ron-ro for Hiyori."
2001705-3 = "Thank you!"
2001705-5 = "[ns] Go to the abandoned building where Hiyori is."
2001705-8 = "An Abandoned Hotel"
2001705-9 = "[ns1] \"(I'm pretty sure she said it was here...)\"\n[ns2] \"(I don't see anyone around here.)\""
2001705-10 = "...Ugh."
2001705-11 = "...Ugh."
2001705-12 = "[s3] \"(Is someone groaning?)\"\n[s4] \"(Is that Hiyori?!)\""
2001705-13 = "Urghhh... It hurts...!"
2001705-14 = "Urghhh... It hurts...!"
2001705-15 = "[s] Investigate where the voice is coming from."
2001705-24 = "I found Hiyori lying in the corner of the basement."
2001705-25 = "[s] \"Hiyori?! What happened?\""
2001705-26 = "S-Sensei?! You found me again?"
2001705-27 = "My stomach... I... I'm a failure!! Ugh..."
2001705-28 = "[ns] \"We're going to a hospital, now!\""
2001705-30 = "I rushed Hiyori to a nearby hospital."
2001705-32 = "Thankfully, it's nothing serious. She has an upset stomach, but she'll recover with a few days in the hospital."
2001705-33 = "[s] \"That's a relief. Thank you.\" "
2001705-34 = "But besides that, the patient is malnourished. Please make sure she's eating full meals."
2001705-35 = "[s] \"...\""
2001705-37 = "Sensei..."
2001705-38 = "[s] \"Lie down, Hiyori. They said you have to rest.\""
2001705-39 = "I'm sorry... This useless failure inconvenienced you again."
2001705-40 = "I drank the tap water in the abandoned building. I didn't know...  "
2001705-41 = "If I took it back to the others, I would've gotten them sick too. I would've made them suffer more."
2001705-42 = "[s] \"Why would you drink dirty water?\""
2001705-43 = "I used to drink tap water all the time back at Arius. I never had any problems..."
2001705-44 = "Maybe my body isn't used to this environment."
2001705-45 = "[s] \"Bacteria is the same here or in Arius.\""
2001705-46 = "This must be punishment for petty theft... For my failures..."
2001705-47 = "But..."
2001705-48 = "I can't make more trouble. Everyone must be worried."
2001705-50 = "I have to head back."
2001705-52 = "[s] \"Sick patients don't get to leave bed. Lie down.\""
2001705-53 = "But..."
2001705-54 = "[s] \"I brought you a new Ron-ro edition.\""
2001705-55 = "...! D-Did you happen to get the new issue with the feature article?!"
2001705-56 = "Ah. You got me. I took the bait, huh?"
2001705-57 = "I get it... Useless failures like me can only submit... Adults really are scary."
2001705-62 = "S-Sensei... I'm a little scared... Can you stay with me?"
2001705-63 = "[s5] \"For you, all night.\"\n[s6] \"Of course.\""
2001705-64 = "Thank you..."
2001705-65 = "Thank you..."
2001705-67 = "I decided to take care of Hiyori overnight."
2001705-69 = "I dozed off, and when I woke up, Hiyori was gone."
2001705-70 = "[ns] \"Hiyori...?\""
2001705-72 = "[ns] \"Where could she have gone in her condition?\""
2001705-73 = "WAAAAAAAAH!!"
2001705-74 = "Sensei! I was right all along! I really am a failure!"
2001705-75 = "Look at what this magazine says! A normal person's belly button looks like that! But mine is... Mine is...!"
2001705-78 = "― Sensei, look.[wa:1850] "
2001705-80 = "― Look at me...[wa:520] "
2001705-83 = "― I-It's kind of different, right?[wa:1690] "
2001705-85 = "― Does it look weird?"
2001705-88 = "― I've been worrying[wa:440] "
2001705-90 = "― that it looks strange...[wa:880] "
2001705-93 = "― And I was right![wa:1240] "
2001705-96 = "― Sensei?[wa:2260] "
2001705-98 = "― Why do you keep looking away?[wa:1180] "
2001705-101 = "― Is it"
2001705-103 = "― s-so strange you can't even look at it?[wa:2160] "
2001705-106 = "― Waaaah! So that's how it is...[wa:1560] "
2001705-108 = "― This life has no meaning.[wa:1610] "
2001705-111 = "― Why is life so...[wa:1290] "
2001705-114 = "― My life is so messed up, just like this spot...[wa:310] "
2001705-116 = "― that you can't even bear to look at."
2001705-119 = "― Heehee... Sensei.[wa:1780] "
2001705-121 = "― Can I have some words of encouragement...? [wa:10] "
2001705-124 = "― I want you to say that even though I'm strange,[wa:690] "
2001705-126 = "― maybe I could still be useful in some way.[wa:10] "
2001705-129 = "[ns] \"First of all, pull your shirt down!\""
2001705-131 = "\"10 Pieces of Secret Knowledge Schools Don't Teach You\" said that attractive people should have belly buttons like this one. Look."
2001705-132 = "[s] \"...\""
2001705-133 = "Not only am I an inferior human being, but even my belly button isn't up to standard. I wish I'd never read that article!"
2001705-134 = "[s] \"Hiyori...\""
2001705-135 = "Yes, Sensei?"
2001705-136 = "[s] \"I'm confiscating the magazine.\""
2001705-137 = "WHAT?! No! Why would you do that?"
2001705-138 = "Please, Sensei! Don't do this! I haven't finished it! Waaaaaaah!"

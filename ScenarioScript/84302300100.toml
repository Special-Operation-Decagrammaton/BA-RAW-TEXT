[translation]
84302300100-5 = "（寧瑠向莉央說明了在資料中心發生的事）"
84302300100-8 = "……原來如此。"
84302300100-9 = "我大概瞭解情況了。辛苦你了。"
84302300100-10 = "我也不是自願這麼做的。#n誰叫通訊中途突然斷掉了……"
84302300100-11 = "但你還是在斟酌情況後順利解決了呢。#n你果然是合適的人選。"
84302300100-15 = "怎麼，你還會跟我說客套話啊？"
84302300100-16 = "這不是客套話。"
84302300100-18 = "雖然碰上了意想不到的變數，但你的應對很完美。#n不愧是C&C的隊長。"
84302300100-19 = "哎，夠了夠了，就算誇我也不會有好處。#n既然目標已經達成了，現在該交接了嗎？"
84302300100-20 = "沒錯。多虧你們的幫忙，現在我能夠清楚掌握千年內的數據流向了。#n接下來該輪到我發揮作用了。"
84302300100-21 = "話說回來，關於「小雪」的事……這麼做真的沒關係嗎？"
84302300100-22 = "雖然我已經按照你說的，把修改資料的事和目前的情況都轉告了研討會……"
84302300100-23 = "但這樣不是違背了寧瑠你和他之間的約定嗎？"
84302300100-27 = "嗯？你在說什麼？我明明有遵守約定啊。"
84302300100-28 = "「請你千萬不要告訴優香前輩和乃愛前輩」──"
84302300100-29 = "「我」並沒有告訴他們……你說對吧？"
84302300100-33 = "這麼說也對。#n「你」確實沒有告訴他們呢。"
84302300100-34 = "畢竟總不能因此放任他修改研討會的資料，#n所以才讓莉央代替自己，向研討會提供線索……"
84302300100-35 = "不用太擔心啦～#n雖然不知道他被抓到之後會不會把我供出來，但那傢伙可沒這麼容易被抓到的。"
84302300100-36 = "至少也能逃個一天以上。#n而我們只要在這段時間內把事情搞定就行了。"
84302300100-37 = "不過……"
84302300100-43 = "來的正是時候啊。"
84302300100-46 = "「我絕對……絕對不會原諒你的，前輩！！」"
84302300100-47 = "「總有一天，地獄會聽到小雪我的冤情！！」"
84302300100-51 = "哈哈，就知道八成會這樣。"
84302300100-52 = "我來回個訊息好了。"
84302300100-53 = "「不是……我親口說的……所以我……沒有違背約定」"
84302300100-54 = "送出～"
84302300100-59 = "「我要詛咒整個千年！！！」"
84302300100-60 = "搞定！#n好，現在該進入下個階段了吧？"
84302300100-61 = "唔，唔嗯……我準備一下簡報。"
84302300100-62 = "美甘寧瑠……"
84302300100-63 = "C&C不折不扣的老練隊長……"
84302300100-65 = "……要是與他為敵，感覺挺可怕的。"

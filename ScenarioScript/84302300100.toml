[translation]
84302300100-5 = "(อธิบายให้ริโอะฟังว่าเกิดเรื่องอะไรขึ้นในศูนย์ข้อมูล)"
84302300100-8 = "อืม..."
84302300100-9 = "เป็นอย่างนี้สินะ ฉันพอเข้าใจสถานการณ์แล้วละ เหนื่อยน่าดูเลยนะ"
84302300100-10 = "ฉันก็ไม่ได้อยากให้เป็นแบบนี้หรอก ถ้าการสื่อสารไม่ถูกตัดขาดไปกลางคันละก็นะ..."
84302300100-11 = "แต่ก็ใช้วิจารณญาณและจัดการได้ดีเลยนี่นา นี่ละคนที่เหมาะสมกับภารกิจ"
84302300100-15 = "อะไรล่ะนั่นน่ะ พูดอะไรไร้สาระกับเขาเป็นด้วยเหรอ?"
84302300100-16 = "นั่นไม่ใช่คำพูดไร้สาระนะ"
84302300100-18 = "สิ่งที่คุณเจอคือตัวแปรที่ฉันไม่ได้คาดการณ์ไว้ แต่คุณก็รับมือได้อย่างยอดเยี่ยม สมแล้วละที่เป็นหัวหน้า C&C"
84302300100-19 = "เอาละๆ พอๆ ถึงจะชมกัน ฉันก็ไม่เหลิงหรอกนะ ฉันทำตามเป้าหมายได้สำเร็จแล้ว จากนี้ก็แค่ส่งไม้ต่อให้เธอใช่มั้ย?"
84302300100-20 = "ถูกต้อง ฉันน่าจะวิเคราะห์กระแสข้อมูลภายในมิลเลเนียมได้อย่างสมบูรณ์แบบเลยละ ขอบใจนะ จากนี้ให้เป็นหน้าที่ของฉันเอง"
84302300100-21 = "จะว่าไป เรื่องของ <โคยูกิ> น่ะ... จะให้เป็นแบบนี้ได้จริงเหรอ?"
84302300100-22 = "ฉันติดต่อไปบอกเซมิน่าเรื่องข้อมูลที่มีการแก้ไขกับสถานการณ์ที่เกิดขึ้นตามที่เธอบอกไว้แล้วก็จริง..."
84302300100-23 = "แต่ถ้าเป็นแบบนี้ ก็ถือว่าเธอผิดสัญญาที่ให้ไว้กับโคยูกิไม่ใช่เหรอ?"
84302300100-27 = "หืม? พูดอะไรน่ะ? ฉันก็รักษาสัญญาแล้วต่างหาก"
84302300100-28 = "\"อย่าไปบอกรุ่นพี่ยูกะกับรุ่นพี่โนอาเลยนะคะ\""
84302300100-29 = "ฉันก็ไม่ได้บอกนี่? คนที่บอก... ไม่ใช่ 'ฉัน' สักหน่อย"
84302300100-33 = "อืม ก็ไม่ได้โกหกนะคะ เพราะว่า 'คุณ' ไม่ได้เป็นคนบอกนี่คะ"
84302300100-34 = "คุณไม่อาจละเลยข้อมูลของเซมิน่าที่นักเรียนคนนั้นแก้ไขได้ ก็เลยให้ริโอะติดต่อไปบอกเบาะแสแทน"
84302300100-35 = "ไม่ต้องห่วงให้มากไปหรอก~ ถ้าโดนจับได้ ยัยนั่นก็คงฟ้องเรื่องฉันเหมือนกัน แต่ยัยนั่นน่ะไม่โดนจับได้ง่ายๆ แบบนั้นหรอก"
84302300100-36 = "อย่างน้อยก็ใช้เวลาหนีเป็นวันแหละ ระหว่างนั้นเราก็แค่ต้องทำงานนี้ให้เสร็จก็พอ"
84302300100-37 = "แต่ว่า..."
84302300100-43 = "มาพอดีเลยแฮะ"
84302300100-46 = "\"ยกโทษให้ไม่ได้...! ฉันจะไม่ยกโทษให้รุ่นพี่เด็ดขาดค่ะ!!\""
84302300100-47 = "\"สักวันหนึ่งรุ่นพี่จะได้ฟังความคับแค้นใจของโคยูกิจากในนรกค่ะ!!\""
84302300100-51 = "คิกคิก ก็จะเป็นแบบนี้ละ"
84302300100-52 = "คงต้องตอบกลับสักหน่อยแล้ว"
84302300100-53 = "\"ฉัน... ไม่ได้เป็น... คนบอกสักหน่อย... งั้นก็ถือว่า... ไม่ได้ผิดสัญญา...\""
84302300100-54 = "กดส่งเรียบร้อย"
84302300100-59 = "\"ขอให้คำสาปมีจริงในมิลเลเนียมด้วยเถอะ!!!\""
84302300100-60 = "จบเรื่องนี้แล้ว! เอาละ งั้นไปที่สเต็ปต่อไปได้เลยมั้ย?"
84302300100-61 = "อะ... อื้อ... ฉันจะบรีฟงานให้"
84302300100-62 = "มิคาโมะ เนรุ..."
84302300100-63 = "หัวหน้าที่ชำนาญและละเอียดถี่ถ้วนแห่ง C&C "
84302300100-65 = "เป็นคนน่ากลัวที่ไม่อยากเป็นศัตรูด้วยเลยนะคะ..."

[translation]
84302300100-5 = "Rio got the rundown of what happened at the Data Center."
84302300100-8 = "...I see."
84302300100-9 = "All right. Understood. Sounds rough."
84302300100-10 = "It's not like I wanted to do it. If the damn communicator hadn't cut out..."
84302300100-11 = "You handled it well. You were definitely the right person for the job."
84302300100-15 = "Is that flattery? From you?"
84302300100-16 = "I mean it."
84302300100-18 = "You came across an unexpected variable, and adapted immediately. As expected of a C&C Leader."
84302300100-19 = "Hey, hey. Stop that. Compliments don't do anything for me. Anyway, mission accomplished...ish. Are you good to take it from here?"
84302300100-20 = "Of course. Thanks to you, I can see the data flow all through Millennium, without a hitch. From here on out, it's up to me."
84302300100-21 = "...Before we move on, do you have any reservations about the Koyuki matter?"
84302300100-22 = "I did contact Seminar and tell them everything about the data change and all..."
84302300100-23 = "...but in retrospect, does that break your promise?"
84302300100-27 = "Hm? What do you mean? I followed the promise exactly."
84302300100-28 = "\"You can't tell Yuuka or Noa.\""
84302300100-29 = "And I didn't say anything to either of them."
84302300100-33 = "I see. So it's technically not a lie, then."
84302300100-34 = "But you couldn't leave her with the changed Seminar data, so you told Rio, who passed it along to Seminar..."
84302300100-35 = "Don't worry about it. If she does get caught, she might tell on me, but she's surprisingly slippery."
84302300100-36 = "She'll be able to run around for at least a day. And we'll be all done by then."
84302300100-37 = "Although..."
84302300100-43 = "Ah, here we go."
84302300100-46 = "\"Unforgivable...! I'll never forgive you, Neru!!\""
84302300100-47 = "\"My curses will echo through the caverns of Hell!!\""
84302300100-51 = "Haha. Well, we knew that was coming."
84302300100-52 = "I should respond."
84302300100-53 = "\"I'm not...the one...who told...so I didn't...break...my promise.\""
84302300100-54 = "Sent."
84302300100-59 = "\"A plague upon Millennium!!\""
84302300100-60 = "All right, are we gonna move on, or what?"
84302300100-61 = "Uh, sure... I'll prepare the briefing."
84302300100-62 = "Mikamo Neru..."
84302300100-63 = "A thorough and experienced C&C leader..."
84302300100-65 = "...and a terrifying person to have as an enemy."

[translation]
10046210-3 = "เป็นไปตามคาดเลย..."
10046210-4 = "นี่สินะ สาเหตุที่ทำให้หมู่นี้เขตปกครองตนเองเกเฮนน่าเงียบสงบลงได้"
10046210-5 = "ท่านประธานกรรมการวินัยจากเกเฮนน่า...?!"
10046210-6 = "อ่า... ฉันมารบกวนสินะ ขอโทษที"
10046210-7 = "ไว้เสร็จธุระแล้วฉันจะรีบกลับทันทีเลย"
10046210-8 = "มันก็ไม่ได้รบกวนหรอกค่ะ... ไม่สิ จะว่าอย่างนั้นก็ได้..."
10046210-9 = "ว่าแต่... ทำไมคุณถึงใส่ชุดนั้นล่ะคะ?"
10046210-10 = "หืม? ก็ฉันมาชายหาดที่อาจต้องได้ทำกิจกรรมทางน้ำ ฉันก็เลยใส่ชุดนี้เผื่อไว้ ถ้าเปียกน้ำจะได้ไม่มีปัญหา มันก็แค่นี้ละ"
10046210-11 = "อ่า... แหะๆๆ... อย่างนี้สินะคะ ชุดที่จะไม่มีปัญหา..."
10046210-12 = "จะว่าไป กิจกรรมทางน้ำที่พูดถึงคืออะไรเหรอคะ...?"
10046210-13 = "คงไม่ใช่กิจกรรมเพื่อ... การท่องเที่ยวใช่มั้ยคะ?"
10046210-14 = "นั่นสินะ... ที่นี่คือชายหาดของสภาน้ำชา พื้นที่ที่อยู่ในการควบคุมอย่างเคร่งครัดของชมรมทวงความ#nยุติธรรม ถ้าไม่ชี้แจงให้ถูกต้องก็คงจะไม่ได้"
10046210-15 = "ก่อนอื่นฉันต้องขออภัยด้วยที่เข้ามาโดยไม่มีการติดต่อล่วงหน้า"
10046210-16 = "ทะ... ท่านประธานกรรมการวินัย?! เงยหน้าขึ้นเถอะค่ะ!"
10046210-17 = "ประธานคณะกรรมการวินัยเป็นตำแหน่งสูง ฉันควรต้องตระหนักถึงตำแหน่งและปฏิบัติตัวให้เหมาะสม#nแท้ๆ"
10046210-18 = "การมาที่ชายหาดครั้งนี้ไม่เกี่ยวกับงานของคณะกรรมการวินัย แต่เป็นการมาเยือนแบบส่วนตัวของ#nโซระซากิ ฮินะ"
10046210-19 = "......"
10046210-20 = "ถึงจะชี้แจงอย่างนี้ แต่ชมรมทวงความยุติธรรมก็คงยากที่จะยอมรับ"
10046210-21 = "อืม... ก็ประมาณหนึ่งค่ะ"
10046210-22 = "ถ้าจะพูดตามตรง วัตถุประสงค์ของฉันคือการกำกับพวกเด็กเจ้าปัญหาของเกเฮนน่า เท่าที่ได้ยินมา ดูเหมือนว่าจะมาก่อปัญหากันไปไม่น้อยทีเดียว"
10046210-23 = "อืม... ก็ประมาณหนึ่งค่ะ"
10046210-24 = "แต่ถึงจะเปิดให้คนทั่วไปเข้ามาท่องเที่ยวได้ แต่ถ้าคณะกรรมการวินัยเข้ามาในพื้นที่ส่วนบุคคลของ#nสภาน้ำชา ก็แสดงว่าที่นี่ต้องเกิดเหตุอะไรเกี่ยวกับเกเฮนน่า"
10046210-25 = "ปัญหาที่เกิดจากนักเรียนเกเฮนน่าที่มาเที่ยวที่นี่ก็ถือเป็นความผิดพลาดของพวกเรา แล้วฉันก็ไม่อยากให้เรื่องมันใหญ่มากกว่าไปนี้ด้วย"
10046210-26 = "เพราะงั้นท่านประธานคณะกรรมการวินัยก็เลยฉายเดี่ยวมาเหรอคะ...?"
10046210-27 = "อ่า ถ้าอ้างว่ามาเยือนที่นี่เป็นการส่วนตัว อย่างน้อยก็น่าจะลดความเสี่ยงทางการเมืองได้น่ะ"
10046210-28 = "ถึงมันจะเป็นทางเลือกสุดท้ายแล้วก็เถอะ..."
10046210-29 = "เพราะงั้นฉันก็เลยมีข้อเสนออย่างหนึ่งน่ะ"
10046210-30 = "ชมรมทวงความยุติธรรมอยากรับอาสาสมัครลาดตระเวนจากโรงเรียนอื่นมั้ยล่ะ?"
10046210-31 = "หมายถึงท่านประธานคณะกรรมการวินัยน่ะเหรอคะ?!"
10046210-32 = "ไม่ใช่ประธานคณะกรรมการวินัย แต่เป็นโซระซากิ ฮินะ นักเรียนจากสถาบันเกเฮนน่าต่างหากล่ะ"
10046210-33 = "อ๊ะ จริงด้วยค่ะ เอ่อ ถ้าคุณฮินะ... อยากมาช่วย ฉันก็ต้องขอบคุณเลยค่ะ!"
10046210-34 = "ขอบใจที่อนุญาตนะ ถ้างั้นก็ตกลงตามนี้แล้วกัน"
10046210-35 = "อืม... จะว่ายังไงดีล่ะ ตอนนี้ฉันรู้สึกว่าต่อให้ต้องรับมือกับใคร ฉันก็ไม่มีวันแพ้แน่นอนค่ะ"
10046210-36 = "ไม่ถึงกับขนาดนั้นหรอก ในชมรมทวงความยุติธรรมก็มีรุ่นพี่ที่เก่งกาจกันหลายคนเลยนี่?"
10046210-37 = "ฉันไม่อาจเอาตัวเองไปเทียบชั้นกับคนเหล่านั้นหรอก เพราะงั้นเธอภูมิใจในตัวเองเถอะนะ"
10046210-38 = "เอาละ งั้นเราออกลาดตระเวนกันเลยมั้ย?"
10046210-43 = "โอ้... โอ้ว... นี่สินะประธานคณะกรรมการวินัยเกเฮนน่า"
10046210-44 = "พอเข้าใจแล้วละว่าทำไมคนอื่นถึงได้หวั่นเกรงเธอคนนี้กัน..."
10046210-45 = "แต่ต่อให้มีประธานคณะกรรมการวินัยที่น่าเกรงขามแบบนี้ แต่ทำไมเด็กเจ้าปัญหาในเกเฮนน่าถึงยัง#nก่อปัญหากันไม่หยุดหย่อนล่ะ..."
10046210-46 = "......"
10046210-47 = "แต่ก็เอาเถอะ ให้เป็นเรื่องของทางนั้นแล้วกัน"

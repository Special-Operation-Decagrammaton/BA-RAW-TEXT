10046210-42 = "3;이치카 수영복;02\n#3;a\n#wait;1000"
10046210-43 = "3;이치카 수영복;07;오, 오오…… 저분이, 게헨나의 선도부장."
10046210-44 = "3;이치카 수영복;99;그 녀석이 그렇게 무서워하는 것도 조금 이해되는 것 같기도……."
10046210-45 = "3;이치카 수영복;05;그런데, 저런 선도부장이 있어도 게헨나 문제아들이 고쳐지지 않는 거는……."
10046210-46 = "3;이치카 수영복;17;………….\n#3;em;…"
10046210-47 = "3;이치카 수영복;20;길게 생각하지 말자.\n#3;em;[한숨]"

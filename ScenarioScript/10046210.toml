[translation]
10046210-3 = "...As expected."
10046210-4 = "Is this the reason why Gehenna's been so quiet lately?"
10046210-5 = "...Head Prefect?!"
10046210-6 = "Ah, did I bother you? Sorry."
10046210-7 = "I'll be off as soon as I've finished my assessment."
10046210-8 = "Bothered...? I wouldn't say—"
10046210-9 = "I was just surprised. You're in a different...outfit."
10046210-10 = "Hm? Yes, I changed because we're at the beach. I'd hate to get my good clothes wet."
10046210-11 = "Ah...I see. That would be a nightmare to dry clean..."
10046210-12 = "Anyway, what are you doing over here?"
10046210-13 = "...Not vacationing, from the look of it..."
10046210-14 = "...Oh, right. This is the Tea Party's beach, and as such is guarded by the Justice Task Force. I should properly explain myself."
10046210-15 = "First, I apologize for intruding without calling beforehand."
10046210-16 = "H-Head Prefect?! There's no need to bow—"
10046210-17 = "I should have minded my position and realized how this would look."
10046210-18 = "However, I'm visiting as Sorasaki Hina, not as a member of the Prefect Team."
10046210-19 = "..."
10046210-20 = "I understand that could be difficult for a member of the Justice Task Force to accept."
10046210-21 = "Some might say..."
10046210-22 = "Honestly, I'm here to discipline the Gehenna troublemakers. I know they've been giving you a hard time."
10046210-23 = "You're not kidding..."
10046210-24 = "But even if this is a public beach, having the Prefect Team on Tea Party property surely complicates matters."
10046210-25 = "The Gehenna students are our responsibility. I don't want this matter to escalate."
10046210-26 = "And that's why you came by yourself...?"
10046210-27 = "Yes. This is a personal visit. I'm trying to stay diplomatic."
10046210-28 = "...Though coming here was a last resort."
10046210-29 = "I have a proposal for you, Ichika."
10046210-30 = "If it's all right with you, may a volunteer from another school assist with the beach patrols?"
10046210-31 = "Help from the Head Prefect?!"
10046210-32 = "Not the Head Prefect. Merely Sorasaki Hina from Gehenna Academy."
10046210-33 = "Ah, right. Um, yes, Hina...I'd love your help!"
10046210-34 = "Thank you for considering it. Then, it's decided."
10046210-35 = "...Wow. I feel like we can take on anyone now!"
10046210-36 = "It's no different than before. You already have a great team in the Justice Task Force."
10046210-37 = "I'm no better than them. You should be proud of all you've done already."
10046210-38 = "Well then, shall we get going?"
10046210-43 = "Ah, so that's the Gehenna Head Prefect."
10046210-44 = "She certainly has a lot of gravitas."
10046210-45 = "I wonder if even SHE is enough to get the Gehenna students in line..."
10046210-46 = "..."
10046210-47 = "Let's not dwell on it."

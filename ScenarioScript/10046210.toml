[translation]
10046210-1 = "#all;hide"
10046210-2 = "3;히나 수영복ND;01\n#3;a"
10046210-3 = "3;히나 수영복ND;01;……역시, 예상대로."
10046210-4 = "3;히나 수영복ND;00;최근 게헨나 자치구가 조용해진 것은 이게 원인이었나."
10046210-5 = "3;이치카 수영복;20;……게헨나의 선도부장님?!\n#3;em;[?!]\n#3;shake"
10046210-6 = "3;히나 수영복ND;99;아아. 신경 쓰게 했나, 미안."
10046210-7 = "3;히나 수영복ND;01;이쪽 볼일만 끝나면 곧장 돌아가도록 할게."
10046210-8 = "3;이치카 수영복;04;신경 쓰인달까…… 아니, 분명 그렇기는 한데요…….\n#3;em;[땀]"
10046210-9 = "3;이치카 수영복;20;일단, 왜 그런 차림으로……?\n#3;stiff"
10046210-10 = "3;히나 수영복ND;02;응? 바다니까, 수상 활동이 있을 수도 있으니까. 만약을 대비해서 젖어도 문제없는 차림을 했을 뿐이야."
10046210-11 = "3;이치카 수영복;04;아, 아하하…… 그렇군요. 문제없는 차림……."
10046210-12 = "3;이치카 수영복;02;그나저나, 수상 활동이라 하시면, 대체 어떤……?\n#3;em;[반응]"
10046210-13 = "3;이치카 수영복;05;설마하니, 관광 목적……은 당연히 아니실 테죠."
10046210-14 = "3;히나 수영복ND;02;……그렇네. 여기는 티파티 소유 해변. 엄연히 정의실현부의 관할 구역. 제대로 해명하지 않으면 안 되겠지."
10046210-15 = "3;히나 수영복ND;99;우선, 연락 없이 불시에 방문한 점, 사과드립니다.\n#3;greeting"
10046210-16 = "3;히나 수영복ND;99\n1;이치카 수영복;20;서, 선도부장님?! 고개 드십시오!\n#3;m4\n#1;hophop\n#1;ar"
10046210-17 = "3;히나 수영복ND;99;선도부장이라는 직위에 있는 이상, 그 영향력을 충분히 인지하고 움직여야 했습니다."
10046210-18 = "3;히나 수영복ND;01;다만, 이번 방문은 엄연히 선도부와 무관한, 소라사키 히나 개인으로서의 방문입니다."
10046210-19 = "1;이치카 수영복;02;…………."
10046210-20 = "3;히나 수영복ND;02;그렇게 말한다 한들, 정의실현부에서는 납득하기 어렵겠지."
10046210-21 = "1;이치카 수영복;05;뭐, 그렇죠, 아무래도."
10046210-22 = "3;히나 수영복ND;99;솔직히 밝히자면, 내 목적은 게헨나 문제아들의 선도야. 듣자 하니 벌써 적지 않은 말썽을 피운 듯하고."
10046210-23 = "1;이치카 수영복;04;뭐, 그렇죠, 아무래도………….\n#1;em;[땀]"
10046210-24 = "3;히나 수영복ND;01;하지만 아무리 대중에 개방했다 해도, 선도부가 티파티의 사유지에 진입하는 것은 이야기가 복잡해지지."
10046210-25 = "3;히나 수영복ND;02;어디까지나 게헨나 학생들이 벌인, 우리 쪽의 과실. 이 이상 일을 키우고 싶지는 않아."
10046210-26 = "1;이치카 수영복;02;그래서, 선도부장님께서 혼자서……?\n#1;em;[?]"
10046210-27 = "1;이치카 수영복;02\n3;히나 수영복ND;99;아아, 개인의 사적제재라는 입장을 취하면, 적어도 정치적 리스크는 최소화할 수 있으니까.\n#3;m3\n#1;dl"
10046210-28 = "3;히나 수영복ND;00;……물론, 궁여지책에 불과하지만."
10046210-29 = "3;히나 수영복ND;01;그래서 한 가지 제안이 있는데."
10046210-30 = "3;히나 수영복ND;02;혹시 정의실현부만 괜찮다면, 외부 학교의 자원봉사자가 순찰에 지원할 수 있을까?\n#3;em;[?]"
10046210-31 = "3;이치카 수영복;08;선도부장님께서 직접 말입니까?!\n#3;jump"
10046210-32 = "3;히나 수영복ND;01;선도부장이 아니야. 게헨나 학원의 소라사키 히나라는 학생이지."
10046210-33 = "3;이치카 수영복;07;아, 그랬죠. 그, 히나 씨……가 도와주시면, 저야 감사하지 말임다!"
10046210-34 = "3;히나 수영복ND;03;사정을 봐줘서 고마워. 그렇게 결정된 거네."
10046210-35 = "3;이치카 수영복;03;……이야, 뭐랄까. 지금이라면 누가 덤벼도 질 것 같지 않은 느낌이지 말임다.\n#3;em;[재잘]"
10046210-36 = "3;히나 수영복ND;09;딱히, 그렇지도 않아. 무엇보다 정의실현부에는 이미 훌륭한 선배님들이 있잖아."
10046210-37 = "3;히나 수영복ND;01;그들에 비해 내가 더 낫다고 할 수는 없어. 그러니 자부심 갖도록 해."
10046210-38 = "3;히나 수영복ND;03;그러면, 출발할까?\n#3;m2"
10046210-39 = "#st;[0,0];instant;1;"
10046210-40 = "#clearST"

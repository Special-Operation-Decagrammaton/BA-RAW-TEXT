[translation]
10032075-7 = "ระ... เราออกมาได้แล้วรึเปล่านะ...?"
10032075-8 = "ดูเหมือนจะเป็นแบบนั้นนะ ถึงจากนี้จะเป็นเรื่องของเวลาก็เถอะ..."
10032075-9 = "เอ๋...? ที่นี่มัน..."
10032075-10 = "หืม? ฮารุกะ มีอะไรเหรอ?"
10032075-11 = "มะ... ไม่มีอะไรค่ะ! ไม่มีเลยค่ะ! ไม่ต้องใส่ใจหรอกค่ะ..."
10032075-13 = "ถ้ามาถึงที่นี่แล้วก็ถือว่าวางใจได้แล้วไหมนะ... งั้นก็น่าจะแยกย้ายกันได้แล้ว"
10032075-14 = "ฉันไม่รู้จะขอบคุณยังไงเลย ทั้งครู..."
10032075-15 = "แล้วก็..."
10032075-16 = "หน่วยรับจ้างสารพัด 68 ด้วย..."
10032075-18 = "ฮุฮุ ไม่ต้องขอบคุณหรอก พวกเราเลือกทำเพื่อให้ได้ผลประโยชน์จากสถานการณ์ก็เท่านั้น"
10032075-19 = "ไม่ได้ทำเพื่อเธอหรอกนะ"
10032075-21 = "งั้นเหรอ..."
10032075-22 = "แต่ถึงอย่างนั้นก็เถอะ ฉันก็ยังได้รับความช่วยเหลือจากพวกเธอมาอยู่ดี นี่คือความจริงที่ไม่เปลี่ยนแปลง"
10032075-23 = "เพราะถ้าพวกเธอไม่ช่วยไว้ ฉันก็คงโดนหลอกใช้และถูกเฉดหัวทิ้งเมื่อหมดประโยชน์"
10032075-24 = "จะบอกว่าเป็นการตอบแทนก็ฟังดูแปลกๆ..."
10032075-30 = "นี่คือ...?"
10032075-32 = "ของตอบแทนน่ะ ยังไงสัญญาจ้างงานของฉันก็คงถูกยกเลิกอยู่แล้ว"
10032075-33 = "อย่างน้อยฉันต้องจ่ายค่าตอบแทนที่ได้รับความช่วยเหลือจากพวกเธอสิ ได้ยินมาว่านี่คือกฎของวงการ#nนี้น่ะ"
10032075-34 = "จะได้เป็น..."
10032075-35 = "การกระทำเพื่อผลประโยชน์ในระยะยาวของฉันด้วย"
10032075-36 = "โอ้โฮ..."
10032075-37 = "พูดถึงผลประโยชน์เหมือนกัน แต่ให้ความรู้สึกต่างกันแฮะ~"
10032075-38 = "ดะ... เดี๋ยวสิ ให้ห่อผ้าเหมือนกับเป็นของขวัญงั้นเหรอ..."
10032075-39 = "เอ๋? เสียสละแบบนี้ได้เลยเหรอ? ถ้างั้น..."
10032075-40 = "เป้าหมายก็เป็นของเราแล้วน่ะสิ?"
10032075-41 = "อย่าบอกนะว่า...!"
10032075-42 = "เราทำภารกิจสำเร็จงั้นเหรอ!? จริงเหรอเนี่ย!?"
10032075-44 = "ถามเพราะไม่เชื่อรึไง..."
10032075-46 = "ไม่คิดเลยค่ะว่าภารกิจของเราจะสำเร็จได้แบบนี้...!!"
10032075-47 = "สะ... สมแล้วค่ะที่เป็นท่านอารุ! นี่เป็นแผนที่ท่านอารุวางไว้ตั้งแต่แรกสินะคะ...!!"
10032075-51 = "หา...?"
10032075-52 = "หืม? ว่าไงนะ...? หมายความว่ายังไง..."
10032075-54 = "......!"
10032075-55 = "งะ... งั้นเหรอ...!"
10032075-56 = "กะไว้แล้วเชียว... เพราะงั้นก็เลยเข้าหาฉันตั้งแต่แรกแล้วมาช่วยฉันไว้?"
10032075-57 = "ยอดเยี่ยมไปเลยนะ ฉันได้บทเรียนกลับไปอีกแล้วละ จะไม่ลืมเลย"
10032075-58 = "[s1] \"กลายเป็นแบบนี้ไปซะได้...\"\n[s2] \"แต่ถ้าได้ผลดี ก็ถือว่าดีละกัน...\""
10032075-61 = "ฮุฮุ... แน่นอนอยู่แล้ว เรื่องประมาณนี้มันก็ปกติออก"
10032075-62 = "งั้นก็ถือว่าพันธมิตรและการร่วมมือในระยะเวลาอันสั้นของเราจบลงด้วยดีนะ"
10032075-63 = "จากนี้ไปก็แยกย้ายไปตามทางของตัวเอง..."
10032075-64 = "เจอตัวแล้ว!! อยู่ตรงนี้!!"
10032075-69 = "เด็กพวกนี้ ซ่อนตัวกันเก่งเลยนี่ แต่ไม่มีทางหนีแล้วละ!!"
10032075-70 = "ทุกคนมาตรงนี้กันให้หมด! ครั้งนี้เราต้องเอาตัวดอน อารันซิโนมาให้ได้!!"
10032075-72 = "ชิ... ตามมาเร็วกว่าที่คิดอีกแฮะ"
10032075-73 = "ถึงจะไม่น่าเป็นห่วงเพราะเรายังมีเส้นทางให้หนี แต่ก็ต้องรับมือระหว่างหลบหนีด้วย"
10032075-75 = "งั้นมาร่วมมือกัน ฉันจะขวางไว้ ไม่ให้พวกนั้นตามมามากกว่านี้..."
10032075-80 = "เจออะไรดีๆ เข้าแล้วละ..."
10032075-86 = "เยี่ยมเลย นั่นมันถังขยะเหล็กขนาดใหญ่รึเปล่า"
10032075-87 = "เหมือนจะมีของอยู่ข้างในจนเต็มถังเลย แบบนี้ใช้เป็นทั้งเกราะกำบังและสิ่งกีดขวางได้ดีเลยละ"
10032075-89 = "...?"
10032075-90 = "เอ๋..."
10032075-91 = "อ่า..."
10032075-92 = "......!?!?!"
10032075-93 = "[s3] \"ฮารุกะ? เป็นอะไรรึเปล่า?\"\n[s4] \"จู่ๆ ก็ครุ่นคิดอะไรอยู่น่ะ...?\""
10032075-96 = "มะ... ไม่ค่ะ! มัน...! คือ..."
10032075-97 = "[s5] \"มัน...?\"\n[s6] \"คือ...?\""
10032075-100 = "คะ... คือว่า..."
10032075-101 = "ถังขยะอันนั้น...!!"
10032075-107 = "แย่ละสิ! เริ่มโจมตีแล้วสินะ"
10032075-113 = "บุกใส่แบบไม่รีรอเพื่อจะแย่งตัวบอสไปสินะ เข้ามาประชิดทุกทีแล้ว"
10032075-114 = "ใช้จังหวะนี้รีบออกไปจากที่นี่กันเถอะ!"
10032075-115 = "คะ... คือว่า...! ถังขยะนั่น...!"
10032075-116 = "ฮารุกะ...? มีอะไรเหรอ?"
10032075-117 = "ถังขยะมันทำไมเหรอ...?"
10032075-118 = "พะ... พอดีว่า... ฉัน..."
10032075-119 = "ฉะ... ฉัน... เอาระเบิดที่ยึดมาได้..."
10032075-120 = "ไปใส่ไว้... ในนั้น..."
10032075-121 = "ทั้งหมดเลยค่ะ..."
10032075-122 = "ของที่อยู่ในถังขยะ..."
10032075-123 = "คือระเบิดที่เรายึดมา... งั้นเหรอ?"
10032075-129 = "หมายถึงระเบิดที่เราเจอตอนสำรวจรอบโรงละครโอเปร่าใช่มั้ย? ที่บอกว่าเอาไปทิ้งในถังขยะน่ะ?"
10032075-133 = "จริงสิ...!"
10032075-134 = "จริงด้วย นึกออกแล้ว! ฮารุกะบอกว่าเอาไปทิ้งในถังขยะไว้นี่นา"
10032075-135 = "เดี๋ยวนะ..."
10032075-136 = "แปลว่าตอนนี้เราใช้ถังขยะระเบิดเป็นกำบังกระสุนอยู่เหรอ?"
10032075-138 = "หืม...? พูดเรื่องอะไรน่ะ?"
10032075-145 = "อ๊ะ... กระสุน..."
10032075-147 = "ลอยมาแล้ว!"
10032075-151 = "[ns] \"โอ๊ะ...\""
10032075-156 = "[ns] \"กลายเป็นแบบนี้ไปจนได้สินะ\""

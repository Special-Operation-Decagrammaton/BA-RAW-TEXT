10032075-70 = "Get over here! We're getting the boss back one way or another!"
10032075-72 = "Tch. Faster than I thought."
10032075-73 = "We can get away, but they're not gonna quit unless we do something."
10032075-75 = "Allow me. I'll create a blockade to buy you some time."
10032075-80 = "...Ah. What about this?"
10032075-86 = "This dumpster will serve our purposes well."

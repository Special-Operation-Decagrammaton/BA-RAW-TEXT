10032075-33 = "I have to repay my debts. I hear that's a rule in this industry."
10032075-34 = "It's a calculated decision..."
10032075-35 = "...for a long term relationship."
10032075-36 = "...Wow. Just wow."
10032075-37 = "That sounded way cooler than when we said it! Haha!"
10032075-38 = "Debts aside, you're just handing us the target like a sack of presents?!"
10032075-39 = "Wait a sec. If you're giving us this bag, then... Then..."
10032075-40 = "It belongs to us?!"
10032075-41 = "Did we really...?"
10032075-42 = "Did we really, truly complete a job? Us?!"
10032075-44 = "What do you mean \"really, truly\"...?"
10032075-46 = "I-I never thought we could finish such a d-difficult job!"
10032075-47 = "A-Amazing, Aru! You planned everything perfectly!"
10032075-51 = "...Ah?"
10032075-52 = "Wh-What...? Huh? What's happening?"
10032075-54 = "...!"
10032075-55 = "I...I see!"
10032075-56 = "You foresaw this when you first offered aid."
10032075-57 = "You truly are a visionary of this industry. I'll utilize the lessons I learned today as I move forward in my career."
10032075-58 = "[s1] \"Is that...what happened here?\"\n[s2] \"I guess all's well that ends well.\""
10032075-61 = "H-Hah! Exactly! This was basically child's play to me!"
10032075-62 = "This signals the end to our partnership, however short it may have been."
10032075-63 = "We'll part ways with—"

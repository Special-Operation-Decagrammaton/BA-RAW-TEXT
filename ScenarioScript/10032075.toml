[translation]
10032075-7 = "暫，暫且是逃出來了嗎……？"
10032075-8 = "看來是這樣沒錯。#n雖然這裡被發現也只是時間的問題……"
10032075-9 = "……啊，這裡是……"
10032075-10 = "嗯？遙香，怎麼了嗎？"
10032075-11 = "沒，沒事，什麼都沒有！只是一些沒用的話……"
10032075-13 = "到了這裡應該可以安心了……#n我們應該分散開來，及時撤退。"
10032075-14 = "……真不知道該怎麼答謝你，老師。"
10032075-15 = "當然……"
10032075-16 = "……還有便利屋68。"
10032075-18 = "呵呵，沒必要感謝我們。#n我們只是根據當下情況的利弊行事而已。"
10032075-19 = "並不是特別為了你所做出的行動。"
10032075-21 = "……這樣啊。"
10032075-22 = "但是站在我的立場，受你們幫助的事實並沒有改變。"
10032075-23 = "如果沒有你們的幫助，我將會在徹底被利用完之後遭到拋棄。"
10032075-24 = "雖說把這個稱之為回報可能有點奇怪……"
10032075-30 = "這個是……？"
10032075-32 = "這是謝禮。反正我的委託現在也跟失敗了沒有兩樣。"
10032075-33 = "而且我也應該支付你們給予幫助的報酬。#n我聽說這是這個世界的規矩。"
10032075-34 = "作為長期……"
10032075-35 = "……經過計算的策略。"
10032075-36 = "……哦……"
10032075-37 = "就算是類似的話，給人的感覺也不太一樣呢～"
10032075-38 = "雖，雖然你這麼說，像這樣好像在送禮物一樣會不會有點……"
10032075-39 = "咦？真的要給我們嗎？也就是說……"
10032075-40 = "這是我們的囉？"
10032075-41 = "難道……！"
10032075-42 = "難道我們完成委託了嗎！？"
10032075-44 = "什麼難道……"
10032075-46 = "我們的委託……！沒想到會在這裡完成……！！"
10032075-47 = "不，不愧是亞瑠大人！一開始就看見了這樣的結果……！！"
10032075-51 = "……咦？"
10032075-52 = "嗯？你說什麼……？那是什麼意思……"
10032075-54 = "……！"
10032075-55 = "是，是這樣嗎……！"
10032075-56 = "原來如此……所以才會接近並幫助我嗎？"
10032075-57 = "真厲害，又讓我上了一課。我會銘記在心。"
10032075-58 = "[s1]「還能這樣說嗎……」\n[s2]「好吧，反正事情落幕就好……」"
10032075-61 = "呵，呵呵……那當然囉，這種程度不算什麼。"
10032075-62 = "那麼我們雙方短暫的同盟與和平協議也圓滿結束了。"
10032075-63 = "往後就各走各的路吧……"
10032075-64 = "找到了！！在這裡！！"
10032075-69 = "這些傢伙真會躲，不過你們已經沒戲唱了！！"
10032075-70 = "大家集合！這次一定要把頭目搶回來！！"
10032075-72 = "……嘖，比想像中還快追上來啊。"
10032075-73 = "已經確保撤退路線，應該不會有問題。#n先應對一下再撤退吧。"
10032075-75 = "我們合作吧，必須阻止他們繼續追來……"
10032075-80 = "……正好找到一個好東西。"
10032075-86 = "真不錯，是鐵製的大型垃圾桶嗎？"
10032075-87 = "內部正好塞滿了重物，既能作為掩護，也能當成障礙物。"
10032075-89 = "……？"
10032075-90 = "咦……"
10032075-91 = "…………啊。"
10032075-92 = "…………！？！？"
10032075-93 = "[s3]「遙香？怎麼了嗎？」\n[s4]「為什麼臉色突然那麼難看？」"
10032075-96 = "沒，沒有！那個……！那個是……！"
10032075-97 = "[s5]「那個……？」\n[s6]「那個是……？」"
10032075-100 = "那，那個……"
10032075-101 = "那個垃圾桶是……！！"
10032075-107 = "……糟糕！攻擊已經開始了。"
10032075-113 = "不知道是不是因為跟頭目有關，對方相當果斷。#n已經來到我們眼前了。"
10032075-114 = "來，趁現在趕快逃吧！"
10032075-115 = "就，就是……！那個垃圾桶……！"
10032075-116 = "……遙香？怎麼了？"
10032075-117 = "垃圾桶……？"
10032075-118 = "那個……我，我……"
10032075-119 = "剛才……把回收的炸彈全都……"
10032075-120 = "放到……那裡面……了……"
10032075-121 = "所以桶子裡裝的……應該都是炸彈……"
10032075-122 = "……桶子裡面？"
10032075-123 = "你說……回收的炸彈？"
10032075-129 = "是指一開始我們在歌劇院找到的那些炸彈？#n你不是說丟進垃圾桶了嗎？"
10032075-133 = "……啊哈！"
10032075-134 = "我現在想起來了！確實是這樣耶！"
10032075-135 = "……稍等一下。"
10032075-136 = "所以我們現在是把它當成掩蔽物了嗎？"
10032075-138 = "……嗯？什麼意思？"
10032075-145 = "啊，流彈……"
10032075-147 = "飛過來了！"
10032075-151 = "[ns]「……啊。」"
10032075-156 = "[ns]「居然會是這種結局……」"

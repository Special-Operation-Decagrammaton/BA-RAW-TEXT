[translation]
103020-1 = "ตอนที่ 2;เป้าหมายต่อไป"
103020-5 = "......!!"
103020-7 = "เมสโตร ได้สติหรือยังครับ?"
103020-13 = "...... นี่มันอะไรกัน...?"
103020-14 = "ไม่สิ ไม่ต้องอธิบายให้ฟังก็ได้ ผมก็แค่สับสนไปชั่วขณะ... ที่ร่างกายเปลี่ยนไป..."
103020-15 = "หึหึหึ... ผมไม่ค่อยมีเวลา ก็เลยคว้าร่างนี้มาแบบรีบๆ ไม่รู้สึกอึดอัดตรงไหนใช่ไหมครับ? เป็นยังไงบ้างครับ?"
103020-16 = "ผมไม่สนใจหรอก ร่างกายเรามันก็แค่วัสดุสิ้นเปลือง"
103020-17 = "...... <สีสัน> เข้าไปบุกรุกมาแล้วสินะ"
103020-18 = "ใช่ครับ เร็วกว่าที่พวกเราคาดไว้เสียอีก เพลนาพาเทส ผู้นำทางสีสันเป็นผู้ไปโจมตีมาครับ"
103020-19 = "ทั้งตำแหน่ง จุดอ่อน และจังหวะเหมาะสมสำหรับการโจมตี ทุกอย่างถูกล่วงรู้อย่างทะลุปรุโปร่ง "
103020-20 = "ผู้นำทางอยู่เหนือพวกเราตั้งแต่แรกแล้ว เพราะแบบนี้สินะ ชื่อของ <เกมาเทรีย> ถึงตกต่ำลงมา"
103020-21 = "หึหึหึ... ตอนแรกเราอาจไม่ใช่เป้าหมายด้วยซ้ำครับ"
103020-22 = "เหตุผลที่เราโดนโจมตีก่อนใคร คงเป็นเพราะต้องการเครื่องมือสำหรับเป้าหมายนั้นน่ะครับ"
103020-23 = "เครื่องมือที่จะทำให้คิโวทอสล่มสลาย... "
103020-24 = "ใช่ครับ ทั้งควบคุมเทพมรณะที่ผกผันเป็นความกลัว แล้วยึดเอาความลับทั้งหมดที่ <เกมาเทรีย> มีไป"
103020-39 = "ทั้งมิเมซิส สหพันธ์นักบุญ เดคาแกรมมาทอน เหล่าเทพไร้นาม ห้องสมุดแห่งตำนาน และ... เรืออะทราฮาซิสที่เรายังไม่ได้มาด้วย"
103020-40 = "เมื่อผู้นำทางสีสันได้รับความกลัวจาก[ruby=เทพมรณะ]อะนูบิส[/ruby] คิโวทอสก็ไม่ใช่ที่ที่ดีสำหรับเราในการดำเนินงานอีกต่อไป"
103020-41 = "<ความบ้าคลั่ง> ริบเอาทุกสิ่งทุกอย่างมาแล้วทาทับด้วยสีของมัน นั่นอาจจะเป็นเนื้อแท้ของ <สีสัน> ครับ  "
103020-42 = "ถึงแม้เราจะแสวงหาคุณค่าของตัวเองกันที่นี่ ความสำเร็จของเราก็จะมีแต่ทำให้เครื่องมือของ#nเพลนาพาเทสเพิ่มขึ้นครับ"
103020-43 = "ถ้างั้นคิโวทอสก็จบสิ้นแล้วเหรอ?"
103020-44 = "... ไม่ครับ ยังมีครู [USERNAME] อยู่ ครูผู้นั้นยังต่อสู้ร่วมกับ[ruby=ชาเล่ต์]เหล่านักเรียน[/ruby]ของตัวเองอยู่ครับ"
103020-45 = "...... งั้นเหรอ ถ้าเป็นคนนั้นละก็"
103020-46 = "แต่นั่นก็ใกล้ถึงขีดจำกัดแล้วครับ ครูที่ไม่อาจเข้าใจได้ จะต้านทาน <สีสัน> ที่ก็ไม่อาจเข้าใจได้#nได้นานแค่ไหนกัน... หึหึหึหึ..."
103020-50 = "แม้กระทั่งตอนนี้ที่ทุกอย่างพังทลายลง ก็มีสิ่งที่น่าสนใจอยู่ครับ  ไม่คิดว่ามันสนุกเหรอครับ?"
103020-54 = "...... เกมาเทรียจะสลายตัวชั่วคราวที่นี่ครับ"
103020-59 = "ผมจะดูสถานการณ์และเรียกรวมตัวอีกครั้งครับ จนกว่าจะถึงตอนนั้น คุณจะทำอะไรก็ได้ครับ เมสโตร"
103020-60 = "จะว่าไป โกลคอนดาล่ะ? เขาเป็นยังไงบ้าง? "
103020-61 = "ไม่มีปัญหาหรอกครับ เดคาโคมาเนียเป็นตัวจริงที่ตายไม่ได้ แต่ว่าโกลคอนดาอาจจะถูกแทนที่ด้วย#nฟรานซิสน่ะครับ"
103020-62 = "...... ฟรานซิส ทำไมต้องเป็นเขาด้วย"
103020-63 = "ในบางแง่ เขาอันตรายยิ่งกว่าเบียทริซเสียอีก แบบนี้ผมคงคิดถึงโกลคอนดานะ"
103020-67 = "สูทดำ แล้วจากนี้คุณจะไปทำอะไร?"
103020-68 = "หึหึหึ..."
103020-71 = "เกิดอะไรขึ้นคะ? ตอนนี้สถานการณ์เป็นยังไงบ้างคะ?"
103020-72 = "เอ่อ... คือว่า... เราสังเกตพบก้อนมวลสารที่มีพลังงานความเข้มข้นสูง... อยู่ทั่วคิโวทอส..."
103020-78 = "อีกครั้งหนึ่ง... น่ะ..."
103020-80 = "ปะ... เป็นไปได้ยังไง..."
103020-81 = "อึก..."
103020-83 = "ห้องชมรมคณะกรรมการแผนงาน"
103020-84 = "......"
103020-85 = "ฮืม..."
103020-86 = "เป็นอย่างนั้นเหรอ..."
103020-91 = "...... ค่ะ นี่คือทั้งหมดที่ฉันรู้ค่ะ คณะกรรมการแผนงานอะบิดอสทุกคน"
103020-92 = "......"
103020-94 = "สรุปว่าชิโรโกะจังไปสัมผัสกับ <สีสัน>... จนสูญเสียตัวเองไป... งั้นเหรอคะ?"
103020-95 = "และรุ่นพี่ชิโรโกะก็มีส่วนเกี่ยวข้องกับเหตุการณ์ทั้งหมดเหรอ...?"
103020-101 = "รุ่นพี่ชิโรโกะ... ทำไม... ทำไมถึงได้..."
103020-102 = "เกิดอะไรขึ้นกับรุ่นพี่ชิโรโกะคะ? ทำไมรุ่นพี่ถึงอยากจะทำลายโลก? ทำไมถึงทำหน้าแบบนั้นกันล่ะคะ?"
103020-103 = "อายาเนะจัง......"
103020-104 = "ฉะ... ฉันไม่เห็นจะเข้าใจเลยค่ะ... ฉันได้ยินเรื่อง <สีสัน> มาแล้วก็จริง... แต่ทำไมรุ่นพี่ถึงกลายเป็น#nคนอื่นอย่างสิ้นเชิงเลย..."
103020-105 = "ฉันไม่รู้เลยทำไมมันถึงเกิดขึ้น และมันหมายความว่าอะไร... แล้วก็ไม่รู้แม้กระทั่งความคิดของรุ่นพี่ด้วย"
103020-106 = "......"
103020-107 = "อายาเนะจัง......"
103020-109 = "...... ไม่ว่าตอนนี้จะเกิดเรื่องอะไรขึ้นกับเธอคนนั้น มันก็ไม่ใช่ความผิดของสึนาโอกามิ ชิโรโกะค่ะ"
103020-110 = "เราต้องมองว่าเธอคนนั้นตกหลุมพลางกับเรื่องที่ไม่สามารถแก้ไขได้ด้วยความตั้งใจหรือความพยายาม#nของตัวเองค่ะ"
103020-112 = "ใช่! อายาเนะจัง พอได้ฟังแบบนี้ คนที่ทำผิดไม่ใช่รุ่นพี่ชิโรโกะ แต่เป็น <สีสัน> นั่นต่างหาก!"
103020-113 = "......"
103020-114 = "เราจะมีวิธี... ทำให้ชิโรโกะจังกลับมาเป็นเหมือนเดิมไหมคะ?"
103020-119 = "ตอนนี้เราไม่รู้เลยค่ะว่าจะมีหนทางหรือเปล่า......"
103020-120 = "มะ... ไม่นะ......"
103020-122 = "แต่คนที่ได้พบกับ <สีสัน> โดยบังเอิญอย่างฉันในตอนนั้น ก็ยังกลับมาได้อย่างปลอดภัยเลยนะคะ"
103020-127 = "อีกอย่าง ตอนนี้คุณครูก็ส่งคนไปเขตปกครองตนเองเฮียกคิยาโคเพื่อหาวิธีต่อต้านสีสันอยู่ด้วย..."
103020-128 = "คุณครู..."
103020-130 = "ส่วนพวกฉันก็กำลังวิเคราะห์ข้อมูลของ <สีสัน> ร่วมกับชมรมซิสเตอร์อยู่...... เราต้องหาวิธีพา#nสึนาโอกามิ ชิโรโกะกลับมาได้แน่นอนค่ะ"
103020-132 = "มันเขียนเอาไว้ว่ายังไงเหรอคะหัวหน้า?"
103020-133 = "ระ... เราแอบเปิดอ่านได้จริงๆ เหรอคะ..."
103020-138 = "ไหนดูซิ..."
103020-144 = "<...... ครู [USERNAME]>"
103020-145 = "<คนที่กลับตาลปัตรด้วยฤทธิ์ของสีสันน่ะ... ไม่มีวิธีไหนในโลกนี้ที่จะทำให้กลับมาเป็นดังเดิมได้หรอก>"
103020-149 = "<มันเป็นกฎของโลก ไม่ต่างกับที่เราไม่สามารถฟื้นคืนชีพคนตายได้>"
103020-155 = "ถะ... ถ้าเป็นอย่างนี้... หอคอยก็จะปรากฏขึ้นมาอีกครั้ง... เหรอคะ?"
103020-156 = "แสดงว่าที่เราต่อสู้มาทั้งหมด ก็ไม่มีความหมายเลยน่ะสิ......"
103020-158 = "...... สถานการณ์ค่อนข้างแตกต่างจากตอนนั้นค่ะ"
103020-159 = "อ้อ จริงสิ ตำแหน่งที่พบพลังงานมันต่างออกไป...... "
103020-163 = "ธารน้ำแข็งในเรดวินเทอร์ เขตใต้ดินในสวนสนุกที่ถูกทิ้งร้าง ภูเขาไฟฮินนอมในเกเฮนน่า สุสานใต้ดินของทรีนิตี้... "
103020-164 = "อายูมุ คราวที่แล้วหอคอยปรากฏขึ้นหลังจากเกิดปรากฏการณ์นี้นานแค่ไหนคะ?"
103020-165 = "อืม... ประมาณ 24 ชั่วโมงค่ะ..."
103020-167 = "แปลว่าเราเหลือเวลาแค่นั้นเองเหรอ...   "
103020-168 = "ไม่ค่ะ อาจจะเหลือน้อยกว่านั้นก็ได้ค่ะ"
103020-169 = "เพราะครั้งนี้ ค่าเฉลี่ยของพลังงานสูงกว่าครั้งก่อนราวๆ 38% ค่ะ"
103020-171 = "...... เอ๋?"
103020-177 = "จริงด้วยแฮะ? เฮือก รุ่นพี่ริน นี่รุ่นพี่จำตัวเลขในตอนนั้นได้ทั้งหมดเลยเหรอ?"
103020-179 = "งั้นก็แปลว่าเวลาเหลือแค่วันเดียว... หรือบางทีก็อาจจะน้อยกว่านั้นก็ได้..."
103020-180 = "ตอนนี้แต่ละเขตปกครองตนเองกำลังจัดการสถานการณ์หลังสู้รบอยู่น่ะ เพราะถึงหอคอยจะหายไปแล้ว แต่ก็ยังมีพวกศัตรูหลงเหลืออยู่ดี"
103020-181 = "ศัตรูที่เหลือก็ต้องจัดการ ถ้างั้นก็คงเป็นไปไม่ได้เลยค่ะที่จะเตรียมรับมือหอคอยใหม่ ทุกคนก็แทบจะ#nไม่ได้พักกันเลยด้วย..."
103020-182 = "ใช่ ไม่มีทางเลือกแล้ว ยังไงเราก็ต้องหยุดการปรากฏตัวครั้งที่สองของหอคอยให้ได้"
103020-183 = "...... แล้วจะทำยังไงดีล่ะ?"
103020-189 = "......"
103020-190 = "ตอนนี้เป้าหมายของเราทั้งมองไม่เห็นและไม่มีตัวตนนะ ที่สังเกตได้ก็มีแต่พลังงานเท่านั้น ถ้าหอคอยจะปรากฏออกมา มันก็มาแบบ ตู้ม! ไม่ให้เราตั้งตัวเลย"
103020-191 = "แล้วเราจะสกัดไว้ไม่ให้มันเกิดได้ยังไง? เรามีหนทางกันจริงๆ เหรอ?"
103020-192 = "[s] \".............\""
103020-193 = "คุณครู..."
103020-194 = "[s] \"ครูต้องรับผิดชอบที่สถานการณ์มันเลยเถิดมาขนาดนี้ ขอโทษนะทุกคน\""
103020-199 = "คะ......?"
103020-200 = "คะ... คะ?!  คะ... คุณครู? ทำไมล่ะ...?!"
103020-201 = "[s] \"ครูรู้มาคร่าวๆ ว่ามันอาจจะเกิดสถานการณ์แบบนี้ก็ได้\""
103020-204 = "[ns] \"ทั้งลางสังหรณ์ว่าจะเกิดเรื่องอันตรายกับชิโรโกะ\""
103020-207 = "[ns] \"ทั้งคำพยากรณ์ที่ว่าคิโวทอสจะตกอยู่ในอันตราย\" "
103020-210 = "[ns] \"ทั้งคำเตือนเกี่ยวกับศัตรูที่พวกเราต้องเผชิญหน้า\""
103020-213 = "[ns] \"ทั้งๆ ที่ครูรู้ทุกอย่างนี้อยู่แล้ว...\""
103020-216 = "[ns] \"ครูอาจจะใส่ใจเรื่องนี้น้อยไปก็ได้\""
103020-218 = "ไม่ใช่นะคะ! ครูทำทุกอย่างเท่าที่จะทำได้ในตอนนั้นแล้วค่ะ...! "
103020-219 = "รุ่นพี่ริน......?"
103020-220 = "ถึงมันจะเป็นคำพยากรณ์ที่ไม่มีมูลอะไรเลย แต่คุณครูก็มาหาฉันและเตือนเรื่องนี้ แล้วก็เตรียมพร้อมใน#nทุกๆ อย่างที่สามารถทำได้แล้วค่ะ "
103020-221 = "และการเตรียมพร้อมนั้น ก็ทำให้เราโจมตีหอคอยแห่งคำลวงได้อย่างสำเร็จลุล่วงด้วยค่ะ"
103020-222 = "อะไรที่อยู่นอกเหนือจากนั้น... มันเป็นปัญหาที่ฉันเองค่ะ "
103020-223 = "เพราะฉันยังดีไม่พอ... เพราะฉันไม่ใช่ประธานองค์การนักเรียน..."
103020-225 = "......"
103020-227 = "รุ่นพี่ริน......"
103020-230 = "[ns1] \"มาแก้ตัวให้ครูแบบนั้นไม่ได้หรอกนะ\" \n[ns2] \"ครูควรจะต้องปกป้องชิโรโกะ\"\n[ns3] \"เพราะนั่นเป็นหน้าที่ของผู้ใหญ่ยังไงล่ะ\""
103020-234 = "......"
103020-236 = "เอาละๆ สงบสติอารมณ์หน่อยครู "
103020-237 = "[s] \"หะ.. หืม...? โฮชิโนะ?\""
103020-240 = "เรื่องนี้มันง่ายดายออกจะตายไป"
103020-241 = "ชิโรโกะจังแปลกไปงั้นเหรอ? เราก็แค่พาชิโรโกะจังกลับมาก็จบแล้วนี่? เรื่องหลังจากนี้เอาไว้คิดทีหลังก็ได้"
103020-242 = "คะ......?!  รุ่นพี่โฮชิโนะ......?"
103020-243 = "อืม~ ลุงก็ว่าอยู่ว่าช่วงนี้มีลางสังหรณ์แปลกๆ ว่าชิโรโกะจังอาจจะตกไปอยู่ในอันตรายก็ได้"
103020-244 = "ถ้าเรื่องนั้นมันมีความเกี่ยวข้องกับการที่ชิโรโกะจังหายไปในตอนนี้แล้วละก็... "

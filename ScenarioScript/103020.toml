[translation]
103020-1 = "Episode 2; The Next Objective"
103020-5 = "...!"
103020-7 = "Are you all right, Maestro?"
103020-13 = "...What happened?"
103020-14 = "No, no need to explain. My body has changed... I'm still adjusting..."
103020-15 = "Haha. My apologies. We were in a hurry so I had to take what we had on hand. Is it uncomfortable? How do you feel?"
103020-16 = "It's inconsequential. Physical bodies are expendable. "
103020-17 = "...On a more pressing note, the Chroma attacked."
103020-18 = "Yes. Phrenapates, the Guide of Chroma, attacked earlier than expected."
103020-19 = "...It was aware of our location, weaknesses, and chose the optimal time to attack."
103020-20 = "The Guide has been one step ahead of us from the very beginning. We disgrace Gematria's name."
103020-21 = "Heeheehee... We were never its priority to begin with."
103020-22 = "It only attacked us as a means to an end. To secure a tool to fulfill its purpose."
103020-23 = "The tool to destroy Kivotos. "
103020-24 = "Yes. By moving the god of the underworld, changed by its terror, it robbed Gematria of all its secrets."
103020-39 = "The Mimesis, Communio Sanctorum, Decagrammaton, the Nameless Gods, the Library of Lore, and...even the Ark of Atrahasis that we were unable to obtain."
103020-40 = "Now that the Guide of Chroma has secured the terror of Anubis, Kivotos is no longer a welcome place for our activities."
103020-41 = "The Chroma will devour all, and Kivotos will be painted with a layer of madness. That is simply its nature."
103020-42 = "Even if we pursue our values here, our achievements will only lead to more tools for Phrenapates."
103020-43 = "Then will Kivotos come to an end?"
103020-44 = "...Perhaps not. [USERNAME] Sensei remains. They will fight their bitter fight alongside the students until the end."
103020-45 = "...I see. I would expect nothing less."
103020-46 = "But for how long will they fight? How long will Sensei be able to take a stand against the incomprehensible Chroma? Heeheehee."
103020-50 = "Even now that everything is ruined, there are still fascinating phenomena to be observed. How exhilarating!"
103020-54 = "...Gematria will temporarily disband here."
103020-59 = "We'll assemble again when the time is right. You can do as you please until then, Maestro."
103020-60 = "I understand. What of Golconde? What happened to him? "
103020-61 = "He will be fine seeing as Decalcomania, the main body, cannot die. But Francis has overtaken their consciousness."
103020-62 = "...Francis has returned."
103020-63 = "He's even more dangerous than Beatrice in some ways. I'll miss Golconde."
103020-67 = "Black Suit, what will you pursue from here?"
103020-68 = "Heeheehee..."
103020-71 = "I need a report! What's the situation?"
103020-72 = "Um, how do I put this...? Masses with ultra-high energy have been observed all over Kivotos..."
103020-78 = "...Again."
103020-80 = "How is this possible...?"
103020-81 = "Ugh."
103020-83 = "Foreclosure Task Force Room"
103020-84 = "..."
103020-85 = "...Hm."
103020-86 = "That means..."
103020-91 = "...Yes. That's all I know, Foreclosure Task Force."
103020-92 = "..."
103020-94 = "So, Shiroko lost herself after coming into contact with the Chroma...right?"
103020-95 = "And Shiroko is involved in all the incidents...?"
103020-101 = "Shiroko... How could this be...?"
103020-102 = "What happened to Shiroko? Why is she trying to destroy the world? What... What was the expression I saw on her face...?"
103020-103 = "Ayane..."
103020-104 = "I-I don't know... I heard about the Chroma, but I don't know how she could become a completely different person..."
103020-105 = "I don't know why this happened or what it all means... I just know... I couldn't tell what she was thinking, at all..."
103020-106 = "..."
103020-107 = "Ayane..."
103020-109 = "No matter what's happening to Shiroko, it's not her fault."
103020-110 = "We have to consider that she was caught in a power that she could not overcome by her own efforts."
103020-112 = "Right, Ayane! It sounds like the Chroma is the bad one here, not Shiroko!"
103020-113 = "..."
103020-114 = "Is there a way Shiroko can return to how she was?"
103020-119 = "We're working on it, but as of now, we have no solution."
103020-120 = "Th-That's..."
103020-122 = "I was the only one who encountered the Chroma in the past and made it back safely."
103020-127 = "Sensei sent someone to the Hyakkiyako district to find a way to fight against the Chroma."
103020-128 = "Sensei..."
103020-130 = "We're also coordinating with the Sisterhood to analyze our data on the Chroma... We will find a way to free Sunaookami Shiroko from its grasp."
103020-132 = "What does it say, President?"
103020-133 = "C-Can we take a look...?"
103020-138 = "Let's see..."
103020-144 = "\"[USERNAME] Sensei.\""
103020-145 = "\"There's no way to restore an existence that's been reversed by the Chroma to its original state.\""
103020-149 = "\"It's a natural rule of this world, just as how the dead cannot be brought back to life.\""
103020-155 = "D-Does that mean...that the sanctums will appear again?"
103020-156 = "That would make everything we did until now mean nothing."
103020-158 = "...The situation isn't exactly the same."
103020-159 = "Oh, right. The locations of the energy are a bit different this time."
103020-163 = "The Red Winter frozen sea, the area beneath the abandoned amusement park, Gehenna's Hinnom Volcano, and Trinity's underground catacombs..."
103020-164 = "Ayumu, how long did it take for the sanctums to appear after the phenomenon first occurred last time?"
103020-165 = "Oh...about...twenty-four hours."
103020-167 = "Then that might be the amount of time we have..."
103020-168 = "No, it could be sooner this time."
103020-169 = "The energy is about thirty-eight percent higher on average than last time."
103020-171 = "...Huh?"
103020-177 = "You're right! Rin, did you...memorize all those numbers? Geez."
103020-179 = "That means we have less than a day..."
103020-180 = "Right now, each district is managing its situation post-assault. The sanctums are gone, but there are still enemies all throughout Kivotos."
103020-181 = "It would be impossible to prepare for a new sanctum assault regardless. Everyone pushed themselves to the limit for the first round with no rest."
103020-182 = "Our only option is to stop the sanctums before they even appear."
103020-183 = "...But how?"
103020-189 = "..."
103020-190 = "The opponent is invisible. It doesn't even exist right now. All we can detect is the energy, but it shows up out of nowhere."
103020-191 = "Is there a way to stop this? Is there a solution?"
103020-192 = "[s] \"...\""
103020-193 = "Sensei..."
103020-194 = "[s] \"I'm responsible for the way things turned out. I'm sorry, all of you.\""
103020-199 = "What...?!"
103020-200 = "S-Sensei?! What do you mean...?"
103020-201 = "[s] \"I had a vague idea that something was coming.\""
103020-204 = "[ns] \"I knew that Shiroko was in danger...\""
103020-207 = "[ns] \"The prophecy of Kivotos' destruction...\" "
103020-210 = "[ns] \"I even received a direct warning about the enemy we had to face.\""
103020-213 = "[ns] \"I had all the pieces, right in front of me.\""
103020-216 = "[ns] \"I was too complacent. I thought I could handle anything that happened.\""
103020-218 = "You're wrong, Sensei! You did your utmost with what you had, as you always do!"
103020-219 = "Rin...?"
103020-220 = "You knew the prophecy had no basis, but you came to me with your concerns regardless. You took every precaution you needed to. "
103020-221 = "It was thanks to your warning we were able to successfully carry out the assaults on the False Sanctums."
103020-222 = "The rest... I shoulder blame for the rest. "
103020-223 = "If I were more capable... If I were... If I were the General Student Council president...instead of just me... "
103020-225 = "..."
103020-227 = "Rin..."
103020-230 = "[ns1] \"That's no excuse.\"\n[ns2] \"I should have protected Shiroko.\"\n[ns3] \"This was my responsibility as an adult.\""
103020-234 = "..."
103020-236 = "There, there. Let's take a deep breath, Sensei. "
103020-237 = "[s] \"H-Huh? Hoshino?\""
103020-240 = "This is much more simple than everyone's making it out to be."
103020-241 = "Shiroko is acting weird? Then we'll drag her here and teach her a lesson. And we'll take care of the rest later."
103020-242 = "H-Hoshino? What are you...?"
103020-243 = "Heh. I guess I can't deny I had a bad feeling Shiroko might have to walk a dangerous path one day. Might've always known."
103020-244 = "So if everything happening is somehow centered around our missing Shiroko... "
103020-245 = "Well, it'd be silly of me to say I'm not worried. We don't have a lot of options."
103020-250 = "But this is a completely different story!"
103020-251 = "The Chroma is to blame, not Shiroko or Sensei! It's no one's fault!"
103020-252 = "It's not Shiroko we need to fight!"
103020-253 = "[s] \"...\""
103020-254 = "Besides, if we don't solve this situation right now, there might be more victims like Shiroko in Kivotos."
103020-255 = "So it's easy."
103020-256 = "We, along with Sensei, have to prevent more victims like Shiroko. That's what matters most!"
103020-257 = "If Shiroko tries to stop us? We'll just catch her! "
103020-258 = "Sensei and the others will figure out how to bring her back to herself!"
103020-259 = "Hoshino..."
103020-261 = "It's not like Shiroko is a wild animal to be captured! Well, I guess there are some similarities..."
103020-262 = "Heh... That's right. I'm an expert on capturing wild Shirokos. This isn't my first time!"
103020-263 = "Right, Nonomi?"
103020-264 = "Yeah! Actually, you've only done it once, but you're the only one who's done it in Kivotos. ☆"
103020-265 = "Heh... So, Sensei, you can just say everything is gonna work out fine like you usually do."
103020-269 = "[ns4] \"...You're right.\" \n[ns5] \"Thanks, Hoshino.\""
103020-272 = "[ns] \"Let's get Shiroko back no matter what it takes.\""
103020-273 = "Heh... That sounds more like you, Sensei!"
103020-275 = "Right! Shiroko was always kind of weird, so it's not that big of a deal if she became a little weirder! Capturing Shiroko sounds like fun!"
103020-276 = "Yeah, right. This wild version of Shiroko is ferocious, so we'll just have to leash her up and drag her around with us. ☆"
103020-281 = "...Okay. I got it."
103020-282 = "I'll find a way to address our problem and find Shiroko!"
103020-287 = "[ns] \"I'll be counting on you guys.\""
103020-289 = "...Hmm. What if..."
103020-290 = "Momoka. The energy we detected all over Kivotos, can you detect its flow?"
103020-291 = "Its flow?"
103020-292 = "When we attacked the last sanctum, we saw the energies of all the sanctums converging together."
103020-293 = "Oh! That's right. Assuming that the energy is something fluid that can be transferred from one place to another..."
103020-295 = "...Hmm, I get what you're saying. I'll try."
103020-304 = "Hmm..."
103020-305 = "I think what she said is right. Each coordinate has a common energy flow."
103020-306 = "Momoka! What if we trace back the flow...?"
103020-308 = "I know. Give me a second."
103020-317 = "I think I found it."
103020-318 = "Momoka!"
103020-321 = "All of the energy is leading to one place. It's the energy's origin."
103020-322 = "In other words, that place is the epicenter generating the False Sanctums."
103020-323 = "Where is it?"
103020-326 = "It's above the sky... The altitude is 75,000 meters above Kivotos."
103020-327 = "Huh?! Isn't that higher than the stratosphere...?!"
103020-328 = "Above the skies..."
103020-330 = "That's right. I'm detecting more energy there."
103020-331 = "That means...that place is behind all these incidents..."
103020-332 = "Who would have thought it would be hiding above the sky?"
103020-334 = "Then whoever is leading Kivotos to destruction...must be up there. "
103020-341 = "[ns] \"Phrenapates, the Guide of Chroma.\""
103020-344 = "Next Episode; Methods and Mechanisms"

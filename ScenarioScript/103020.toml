[translation]
103020-1 = "第2話;異變"
103020-5 = "……！！"
103020-7 = "你醒了嗎？#n瑪艾斯托洛。"
103020-13 = "……究竟，發生了什麼？"
103020-14 = "不……不用解釋了。#n也許是因為肉體的改變，精神有點混亂。"
103020-15 = "咯咯咯……因為時間實在不足，所以我嵌入了替代品……#n感覺如何呢？"
103020-16 = "肉體不過是消耗品罷了。無論是什麼形式都無所謂。"
103020-17 = "對了……「色彩」的襲擊。"
103020-18 = "沒錯。比我們預測的還要更快……#n──色彩的嚮導者，[ruby=Phrenapates]誘騙者[/ruby]發動了攻擊。"
103020-19 = "……沒想到我們所在的位置與弱點……#n甚至連攻擊的時機都被看透了啊。"
103020-20 = "我們從一開始就被嚮導者玩弄於鼓掌之間……#n「蓋瑪特利亞」的名聲也一敗塗地了啊。"
103020-21 = "咯咯咯……我想他並沒有把我們放在眼裡吧。"
103020-22 = "襲擊我們的理由，或許只是為了獲得「道具」吧──#n為了達成其目的道具。"
103020-23 = "讓奇普托斯滅亡的「道具」……嗎。"
103020-24 = "沒錯。他們操縱反轉為「恐怖」[ruby=阿努比斯]的死神…[/ruby]…#n奪走了蓋瑪特利亞擁有的所有「秘儀」。"
103020-39 = "[ruby=Mimesis]複製[/ruby]、[ruby=Communio Sanctorum]「諸聖相通」[/ruby]、十字神名、無名之神、[ruby=The Library of Lore]無盡怪談圖書館[/ruby]──#n以及我們終究未能獲得的「阿特拉哈西斯的方舟」。"
103020-40 = "既然色彩的嚮導者已經獲得[ruby=阿努比斯]了死神的[/ruby]「恐怖」，#n奇普托斯就不再適合我們活動了。"
103020-41 = "「瘋狂」將吞噬一切，覆蓋所有存在。#n這就是「色彩」的本質吧。"
103020-42 = "即使在此追求自身的「價值」，我們所獲得的一切也只會淪為誘騙者的「道具」。"
103020-43 = "──那麼，奇普托斯將迎向終焉嗎？"
103020-44 = "……不。還有[USERNAME]老師在。#n他正與自己的學生們──夏萊一同戰鬥。"
103020-45 = "是嗎……畢竟是那個人啊。"
103020-46 = "然而那也很快就會到達極限了吧。#n無法理解的「色彩」──以及身為無法理解存在的「老師」……#n究竟能撐到什麼地步呢……咯咯咯。"
103020-50 = "即使是一切事象崩壞的現在，這個世界依然存在著非常令人感興趣的事物……#n不覺得很有趣嗎？"
103020-54 = "……蓋瑪特利亞自此暫時解散。"
103020-59 = "視情況會再次召集。#n在那之前你就是自由之身了哦，瑪艾斯托洛。"
103020-60 = "……戈爾孔特呢？#n他究竟怎麼樣了？"
103020-61 = "作為本體的轉印是不死的存在，所以應該沒問題。#n但是，戈爾孔特似乎被法蘭西斯替換了。"
103020-62 = "……偏偏是法蘭西斯啊。"
103020-63 = "他在某種意義上是比貝雅特里榭還要危險的存在。#n我們會很懷念戈爾孔特吧。"
103020-67 = "……黑色西裝人，你今後有什麼打算？"
103020-68 = "咯咯咯──"
103020-71 = "現在情況怎麼樣了？"
103020-72 = "呃……那個……"
103020-78 = "又再次在奇普托斯各地觀測到了超高濃度的能量體……"
103020-80 = "怎，怎麼會……"
103020-81 = "……唔。"
103020-83 = "對策委員會．教室"
103020-84 = "……"
103020-85 = "……原來如此啊。"
103020-86 = "也就是說……"
103020-91 = "──我所知道的，就僅只於此了。"
103020-92 = "……"
103020-94 = "白子醬接觸了「色彩」……所以變成了那副模樣，是這樣沒錯吧……？"
103020-95 = "那是什麼意思呀……！#n那種莫名其妙的事，為什麼會跟白子前輩扯上關係呢……？"
103020-101 = "……白子前輩……到底，為什麼會……"
103020-102 = "白子前輩發生什麼事了呢……？#n為何，要毀滅奇普托斯……還露出那種表情……"
103020-103 = "綾音醬……"
103020-104 = "我……不明白。#n雖然聽過「色彩」的事……卻完全，無法理解……"
103020-105 = "這實在是太荒誕無稽了……#n為什麼事情會變成這樣，前輩心裡究竟在想些什麼，完全搞不清楚……"
103020-106 = "……"
103020-107 = "綾音醬……"
103020-109 = "……他身上發生了「什麼」雖然無從得知──#n不過有一點可以確定，那絕非出自他本身的意願。"
103020-110 = "──祂就像天災一樣。將他視為被捲入了以自己的意志與努力無論如何都無力回天的意外，或許比較合適。"
103020-112 = "沒錯唷，綾音醬。一切的元凶是「色彩」對吧？#n那不是白子前輩的錯。"
103020-113 = "……"
103020-114 = "有辦法……讓白子醬恢復原狀嗎？"
103020-119 = "──以目前掌握到的情報來說，沒有。"
103020-120 = "……怎，怎麼會。"
103020-122 = "不過，遭遇了「色彩」的我，如今依然站在這裡。#n而且──"
103020-127 = "為了尋找對抗色彩的方法，老師也已派人前往百鬼夜行自治區。"
103020-128 = "老師……！？"
103020-130 = "我們也正和修女會一起對「色彩」進行分析。一定還有辦法能讓砂狼白子恢復的。"
103020-132 = "裡面寫了什麼內容呢，部長？"
103020-133 = "我，我們，真的可以看嗎……？"
103020-138 = "我看看──"
103020-144 = "「……[USERNAME]老師。」"
103020-145 = "「讓因色彩而反轉之人恢復原狀的方法，並不存在。」"
103020-149 = "「那就和──無法讓死者重生一樣。#n　是這個世界絕對的法則。」"
103020-155 = "也，也就是說……那些塔，會再次出現的意思嗎……？"
103020-156 = "我們至今為止的努力，全～都白費了嗎……"
103020-158 = "……不，情況和之前不太一樣。"
103020-159 = "啊～嗯……出現能量反應的位置不同。"
103020-163 = "赤冬的冰河、廢棄遊樂園的地下、格黑娜的欣嫩火山、三一的地下墓穴……"
103020-164 = "步，還記得上次聖所的出現是在觀測到這個現象的幾個小時後嗎？"
103020-165 = "大約是……24小時左右。"
103020-167 = "也就是說，我們所剩的時間也就這麼多了啊……"
103020-168 = "不，說不定會更少。"
103020-169 = "……因為能量的數值比上次高了約38%。"
103020-171 = "……咦？"
103020-177 = "真的呢──話說琳前輩，上次的數字你全都記得嗎？#n真可怕……"
103020-179 = "只剩一天……或是更少的時間……"
103020-180 = "結束戰鬥的各個自治區都在整備中唷。#n聖所雖然消失了，不過部分區域還有剩餘的敵人。"
103020-181 = "居然要在這種狀態下與新出現的聖所戰鬥……#n大家明明連喘口氣的時間都還沒有……"
103020-182 = "就是啊～……#n得想辦法在這個階段阻止聖所的二度顯現才行。"
103020-183 = "……但是要怎麼阻止呢？"
103020-189 = "……"
103020-190 = "現在不僅無法看見，甚至尚未存在。#n能觀測到的只有能量而已……而且還會突然「轟！」地一聲出現對吧？"
103020-191 = "該怎麼辦呢～#n有對抗的手段嗎？"
103020-192 = "[s] 「…………」"
103020-193 = "老師……"
103020-194 = "[s]「事情會變成這樣，全都是我的錯……大家，對不起。」"
103020-199 = "為何突然說這種話……？"
103020-200 = "老，老師……？#n為什麼老師要道歉呢……！"
103020-201 = "[s]「我之前就知道可能會發生這種事了……」"
103020-204 = "[ns]「白子身上可能會發生不祥的事，」"
103020-207 = "[ns]「奇普托斯可能會迎向終焉的預言，」 "
103020-210 = "[ns]「遲早要對抗的，敵人的警告──」"
103020-213 = "[ns]「這些我明明早就知道了……」"
103020-216 = "[ns]「都是因為我太小看事情的嚴重性才會……」"
103020-218 = "──不是的。#n老師已經盡了自己最大的努力。"
103020-219 = "琳前輩……？"
103020-220 = "就算只是毫無根據的預言，老師依然為了告知而前來找我。#n能採取的手段也全都做了。"
103020-221 = "正因如此，「虛假的聖所」的攻略才得以成功不是嗎。"
103020-222 = "其他的部分……是我們的問題。"
103020-223 = "都怪我能力不足……#n因為我不是聯邦學生會長……"
103020-225 = "……"
103020-227 = "琳前輩……"
103020-230 = "[ns1]「不，那不能當成藉口。」 \n[ns2]「……我應該守護白子。」\n[ns3]「那是──身為『大人』的我的責任。」"
103020-234 = "……"
103020-236 = "嘛嘛，老師先冷靜點。"
103020-237 = "[s]「星野……？」"
103020-240 = "想得太複雜可不好唷～"
103020-241 = "簡單來說，只要把白子醬帶回來就好了對吧？"
103020-242 = "星，星野前輩……？"
103020-243 = "大叔我也很擔心呢～#n總覺得這樣下去白子醬會往不好的方向發展……"
103020-244 = "而且消失的白子醬和這個狀況……#n如果告訴我這之中有著什麼關係，大叔我也會很頭痛的。"
103020-245 = "──說不擔心是騙人的。"
103020-250 = "但是，這和那是兩回事吧！"
103020-251 = "這是「色彩」所引起的事件，不是白子醬的錯。#n不是老師的錯，也不是任何人的錯。"
103020-252 = "我們該戰鬥的對象另有其人──不是嗎？"
103020-253 = "[s] 「…………」"
103020-254 = "而且，說不定還會出現白子醬以外的受害者。"
103020-255 = "既然如此，我們只要為了不讓這種事發生而戰就好。"
103020-256 = "就是這樣而已。"
103020-257 = "如果這股現象和白子醬有關──#n我想，他一定會來妨礙我們的。"
103020-258 = "到時候就抓住白子醬吧。#n雖然不知道復原的方法……不過我相信老師一定會找到的。"
103020-259 = "星野前輩……"
103020-261 = "呃，白子前輩又不是野生動物……"
103020-262 = "大叔我很擅長捕捉白子醬的唷？"
103020-263 = "對吧，野乃美醬？"
103020-264 = "畢竟星野前輩是有捕獲白子醬經驗的人嘛☆"
103020-265 = "說的沒錯。所以老師還是像往常一樣擺出「總會有辦法」的態度吧。#n那樣比較適合你哦。"
103020-269 = "[ns4]「……嗯。」 \n[ns5]「謝謝你，星野。」"
103020-272 = "[ns]「把白子帶回來吧。無論使用什麼手段，一定要帶他回來。」"
103020-273 = "唔嘿～這樣就對了。"
103020-275 = "我可是還有很多話想跟白子前輩說呢！#n不趕快把他帶回來的話，我可是會很困擾的。"
103020-276 = "大家一起合力把白子醬帶回來吧☆"
103020-281 = "……說的對。"
103020-282 = "我也會盡力的。"
103020-287 = "[ns]「嗯，大家一起加油吧。」"
103020-289 = "……原來如此。#n如果是這樣……"
103020-290 = "桃香。能確認在奇普托斯全境探知到的能量的流向嗎？"
103020-291 = "咦，能量的流向？"
103020-292 = "是的。我們在攻略最後的聖所時，目擊了所有聖所的能量向同一處集中的現象。"
103020-293 = "啊，這樣啊！#n如果能量本身能夠流動……"
103020-295 = "……哼～嗯，原來如此。#n我試試看。"
103020-304 = "唔嗯……"
103020-305 = "琳前輩說的沒錯，有共通的能量流轉在各個座標之間……"
103020-306 = "那麼，只要追蹤能量的來源……！"
103020-308 = "沒錯～#n等我一下哦。"
103020-317 = "好像找到了。"
103020-318 = "桃香醬！好厲害！"
103020-321 = "所有能量都與某個地點相連。#n這裡恐怕就是能量的出發點吧。"
103020-322 = "也就是說，這裡是生成虛假的聖所的核心。"
103020-323 = "那是哪裡呢……？"
103020-326 = "天空遙遠的彼方，奇普托斯上空75,000m──"
103020-327 = "咦！？那是平流層──不對，已經到宇宙了嗎！？"
103020-328 = "……天空遙遠的彼方，是嗎。"
103020-330 = "嗯。有著比至今為止的聖所之塔更高濃度能量的構造體似乎就在那裡。"
103020-331 = "那個構造體……就是這一切的元凶……是這個意思嗎？"
103020-332 = "……沒想到會隱藏在空中啊。"
103020-334 = "原來如此……如果那就是一切的元兇，#n將奇普托斯導向終焉之人應該也會在那個地方吧。"
103020-341 = "[ns]「──色彩的嚮導者，[ruby=Phrenapates]誘騙者[/ruby]。」"
103020-344 = "下一話;方法"

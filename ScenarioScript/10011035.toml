[translation]
10011035-4 = "พวกนั้นเป็นใครกันแน่?!"
10011035-5 = "[s] \"พวกปีศาจน่ะ\""
10011035-6 = "ถะ... ถ้าเป็นปีศาจละก็... หมายถึงพวกปีศาจที่เป็นกลุ่มเด็กมีปัญหาเหรอ?!"
10011035-7 = "แล้วเมื่อกี้! เจ้าพวกนั้น! แนะนำตัวว่าเป็นปีศาจจอมเอาแต่ใจด้วยนะคะ!"
10011035-8 = "ฉะ... ฉันเคยได้ยินมาค่ะ...! พวกปีศาจจอมเอาแต่ใจ เป็นพวกที่ชอบการต่อสู้มากที่สุดในกลุ่มปีศาจค่ะ"
10011035-11 = "พวกเธอต่อต้านความทันสมัย... ทั้งยังปฏิเสธที่จะยอมรับสิ่งใดอื่นนอกจากงานเทศกาลของ#nเฮียกคิยาโคแบบดั้งเดิม..."
10011035-13 = "นอกจากนี้ก็ยังเคยเรียกร้องบัตรกำนัลเทศกาล ครั้งที่ 12 ให้พวกปีศาจด้วย..."
10011035-15 = "จากนั้นก็ไม่พอใจที่สหพันธ์เฮียกคิยาโคไม่เคยฟังคำเรียกร้อง ได้ยินมาว่าเป็นพวกนิยมเทศกาล#nหัวรุนแรงที่คิดแต่จะต่อสู้ค่ะ..."
10011035-17 = "ไม่ๆๆๆ~! นั่นมันมาจากการ์ตูนเรื่องไหนละนั่น~!"
10011035-18 = "[s] \"พวกนิยมเทศกาลหัวรุนแรง... เพิ่งเคยได้ยินครั้งแรกเลย...\""
10011035-20 = "แล้วทำไมพวกนั้นต้องมาโจมตีพวกเราด้วยล่ะ?!"
10011035-24 = "กะ... เกิดเรื่องใหญ่แล้ว...! นักแสดงที่เล่นบทองค์หญิงถูกลักพาตัวไปแล้ว!"
10011035-28 = "นักแสดงที่เล่นบทองค์หญิง... ถูกลักพาตัวเหรอ?"
10011035-29 = "มะ... หมายความว่า..."
10011035-30 = "ท่านอิบูกิกำลังตกอยู่ในอันตรายค่ะ!"
10011035-31 = "[s] \"หรือว่าพวกปีศาจตั้งใจจะขัดขวางงานแลกเปลี่ยนมาตั้งแต่แรก?\""
10011035-32 = "กะ... ก่อนอื่นก็ต้อง! ต้องรายงานค่ะ! รายงานไปที่ชมรมหยินหยาง...! หรือเฮียกกะเรียวรันก็ได้...!"
10011035-33 = "มะ... ไม่ได้นะ! แบบนั้นแย่แน่...!"
10011035-37 = "[ns] \"แย่เหรอ หมายความว่ายังไงน่ะมิจิรุ?\""
10011035-38 = "เรื่องนั้น... ก็คือว่า"
10011035-39 = "ก็ถ้ารายงานไปละก็... การแสดงก็คง...!"
10011035-41 = "สมาชิกของแพนเดโมเนียม โซไซตี้ถูกลักพาตัวไปนะคะ"
10011035-42 = "ถ้าคนนอกรู้เข้าอาจจะเกิดข้อพิพาทในทางการทูตก็ได้ค่ะ ในกรณีที่เลวร้ายที่สุดอาจจะกลายเป็นความ#nขัดแย้งระหว่างโรงเรียนไปเลยก็ได้"
10011035-43 = "ชะ... ใช่แล้ว! ยิ่งถ้าคนรู้เยอะเท่าไร เรื่องก็จะยิ่งแย่ลงใช่ไหมล่ะ?!"
10011035-44 = "โดยเฉพาะตัวท็อปของแพนเดโมเนียม โซไซตี้ เห็นบอกว่าโหดสุดๆ เลยนี่?! ถ้าเกิดรู้เรื่องนี้เข้าละก็...!"
10011035-45 = "[s] \"อ่า ถ้าเรื่องนั้นละก็คงจะไม่ทันแล้ว...\""
10011035-49 = "อิบูกิ... นักเรียนของแพนเดโมเนียม โซไซตี้ถูกลักพาตัวไปอย่างนั้นสินะคะ"
10011035-54 = "อยู่ตรงนี้ด้วยเหรอนักเรียนของเกเฮนน่า! แล้วยังเป็นพวกแพนเดโมเนียม โซไซตี้?! มาตั้งแต่เมื่อไรน่ะ?!"
10011035-55 = "เอ๋!!! เป็นไปได้ยังไง!"
10011035-56 = "สะ... สงคราม?! จะปะทุขึ้นแล้วเหรอคะ?!"
10011035-57 = "ฮะ... ฮืออออ... ฮึกๆ ฮือๆ..."
10011035-58 = "เฮ้อ..."
10011035-59 = "[s] \"อิโรฮะ ใจเย็นไว้แล้วค่อยๆ คุยกันเถอะนะ\""
10011035-60 = "คุณครูพูดเรื่องอะไรกันคะ ตอนนี้ฉันเย็นแบบสุดๆ เลยนะคะ"
10011035-65 = "[ns] \"อืม แต่ว่าดูไม่เป็นแบบนั้นเลยนะ...\""
10011035-66 = "เฮ้อ... นี่มันอะไรกันแน่คะ?"
10011035-67 = "ตอนที่รุ่นพี่มาโคโตะบอกว่าถ้าให้อิบูกิแสดงก็จะได้เป็นความทรงจำที่ดี ฉันก็อุตส่าห์คัดค้านไปตั้งแต่แรก#nแล้วแท้ๆ"
10011035-68 = "สุดท้ายก็เป็นแบบนี้จนได้ จะรับผิดชอบยังไงล่ะคะ? รุ่นพี่มาโคโตะ? คะ?"
10011035-69 = "[s] \"นี่ อิโรฮะ... มาโคโตะไม่อยู่ตรงนี้น่ะ...\""
10011035-73 = "สภาพจิตใจตอนนี้ก็คงอยากออกไปข้างนอกแล้วก็โวยวายให้เต็มที่อยู่หรอกค่ะแต่ว่า..."
10011035-74 = "วะ....หวาาา..."
10011035-75 = "อา... งือ..."
10011035-76 = "เอื้อก (กลืนน้ำลาย) ..."
10011035-77 = "...แต่แน่นอนว่าคงจะให้ภายนอกรับรู้ไม่ได้หรอกค่ะ"
10011035-78 = "เราจะปล่อยให้เกิดความขัดแย้งทางการเมืองหรือข้อพิพาทระหว่างเฮียกคิยาโคและเกเฮนน่าไม่ได้ค่ะ"
10011035-79 = "...!!"
10011035-81 = "[ns] \"อิโรฮะ นึกถึงทุกคนขนาดนั้นเลยสินะ...!\""
10011035-82 = "ฉันก็แค่ไม่ชอบที่จะต้องไปพัวพันกับเรื่องวุ่นวายแบบนั้นต่างหากล่ะคะ"
10011035-83 = "[s] \"อืม...! คิดไว้อยู่แล้วแหละว่าต้องเป็นเหตุผลแบบนั้น!\""
10011035-84 = "ขืนเป็นแบบนั้นรุ่นพี่มาโคโตะก็คงไปก่อความวุ่นวายตามใจชอบ ไม่ต้องพูดถึงรุ่นพี่ซัตสึกิเลย..."
10011035-85 = "สุดท้ายคนที่ถูกลากไปพัวพันด้วยก็คือฉันกับอิบูกิ ฉันขอหลีกเลี่ยงเรื่องแบบนั้นก็แล้วกันค่ะ"
10011035-86 = "ดังนั้นฉันเลยไม่แนะนำให้บอกคนนอกนะคะ"
10011035-87 = "ถะ... ถ้าอย่างนั้น พวกเรา ทะ... ทำยังไงดีคะ..."
10011035-88 = "อือ... เข้าใจแล้ว"
10011035-89 = "หัวหน้า?"
10011035-90 = "มีแค่วิธีเดียวเท่านั้น!"
10011035-91 = "[s] \"มิจิรุ คิดอะไรออกงั้นเหรอ?\""
10011035-92 = "เราต้องแก้ปัญหานี้ก่อนที่คนนอกจะรับรู้!"
10011035-93 = "หรือก็คือ! พวกเราทุกคนที่อยู่ตรงนี้ต้องไปช่วยเอง!"
10011035-95 = "บะ... แบบนี้นี่เอง!"
10011035-96 = "หัวหน้า! วิธีนี้มัน...!"
10011035-97 = "ไม่ใช่แค่พวกเราที่อยู่ตรงนี้ แต่ยังมีท่านสมาชิกจากแพนเดโมเนียม โซไซตี้! และที่สำคัญยังมีท่าน#nอาจารย์ที่เป็นคุณครูของชาเล่ต์ด้วย!"
10011035-98 = "ใช่มั้ยล่ะ?!"
10011035-99 = "[s] \"ถ้าทำอย่างนั้นได้จริงก็คงดีอยู่หรอกนะ...\""
10011035-101 = "แต่ปัญหาตอนนี้คือเราจะปิดบังไม่ให้คนนอกรู้ได้ยังไงละนะ ถ้ามีวิธีดีๆ ละก็..."
10011035-105 = "อ่าๆ ทุกคน ได้ยินมั้ยคะ?"
10011035-109 = "[ns] \"เอ๊ะ? นี่มัน การถ่ายทอดสดเหรอ?\""
10011035-111 = "อะฮะฮะฮ่า~~ ทุกท่านสนุกสนานกับการแสดงมั้ยคะ~?"
10011035-112 = "การแสดงครั้งนี้พิเศษมากขึ้นเพราะสมาชิกแพนเดโมเนียม โซไซตี้ทุกท่านให้ความร่วมมือค่ะ!"
10011035-113 = "ถึงจะต่างไปจากที่วางแผนเอาไว้บ้าง แต่กิจกรรมประสบการณ์เสมือนจริงของเฮียกคิยาโคที่เราภูมิใจ <องค์หญิงวาราคุ> เริ่มต้นขึ้นแล้วค่ะ"
10011035-114 = "เอาละ ดูฉากนี้สิคะ!"
10011035-126 = "อย่างที่เห็นตอนนี้คนร้ายลักพาตัวองค์หญิงกำลังหลบหนี!"
10011035-127 = "ถ้าอย่างนั้นก็! ใครจะเป็นคนที่สามารถช่วยเหลือองค์หญิงที่ถูกลักพาตัวไปได้เป็นคนแรกน้า~?"
10011035-128 = "สำหรับผู้ที่ได้รับเกียรตินั้น ทางชมรมหยินหยางได้เตรียมของขวัญสุดพิเศษไว้มอบให้แล้ว..."
10011035-129 = "ทั้งนักเรียนจากเกเฮนน่าที่มาเยือนเฮียกคิยาโคทุกท่านและนักเรียนของเฮียกคิยาโคที่ร่วมสนุกกับ#nเทศกาลของเราตลอดมา"
10011035-130 = "หวังว่าทุกท่านจะให้ความสนใจและเข้าร่วมกิจกรรมนี้กันเยอะๆ นะคะ!"
10011035-131 = "ฉันจะคอยเป็นกำลังใจให้นะคะ~ อะฮะฮ่ะ!"
10011035-136 = "[ns] \"อ่า...\""
10011035-137 = "หรือว่า...ตั้งใจจะทำให้คนนอกเข้าใจว่า <การแสดงดำเนินอยู่> อย่างนั้นเหรอ"
10011035-138 = "คิดจะใช้วิธีนั้นตบตาสินะคะ หลักแหลมจริงๆ เลยนะคะ"
10011035-139 = "สมแล้วที่เป็นแรคคูนแห่งชมรมหยินหยาง...! ไม่ใช่สิ หมายถึงหัวหน้าชมรมหยินหยาง! แบบนี้น่าจะพอ#nยื้อเวลาได้นะ!"
10011035-140 = "เอาละ เป้าหมายของพวกเราไม่มีอะไรมาก!"
10011035-141 = "เราจะต้องช่วยเหลืออิบูกิให้สำเร็จก่อนที่สถานการณ์จะเลวร้ายไปกว่านี้! เข้าใจแล้วนะ?!"
10011035-143 = "เข้าใจค่ะ! ถ้ามีคนตกอยู่ในสถานการณ์คับขัน นินจาจะต้องไปช่วยเหลือค่ะ! นินนิน!"
10011035-144 = "อิบูกิ... จะต้องกำลังหวาดกลัวและร้องไห้อยู่แน่นอนค่ะ! พวกเราต้องรีบไปช่วย!"
10011035-145 = "อิบูกิ รอก่อนนะ จะรีบไปหาเดี๋ยวนี้แหละ"
10011035-146 = "[s] \"อื้อ มาพยายามกันเถอะทุกคน\""
10011035-148 = "(อืม ไม่เป็นไรหรอก...! ยังจัดการได้! การแสดงจะต้องสำเร็จและชมรมวิจัยศาสตร์นินจาต้องได้เป็นชมรม#nทางการ...!)"
10011035-149 = "(ข้าน้อยไปโม้ไว้กับอิซุนะและสึคุโยะไว้ซะเยอะ...!)"
10011035-150 = "(ตอนนี้! ยังเป็นไปได้!)"

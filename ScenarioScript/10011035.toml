[translation]
10011035-4 = "那，那些傢伙是什麼人啊～！？"
10011035-5 = "[s]「妖怪劇團……」"
10011035-6 = "妖，妖怪劇團是……那個傳聞中的問題兒童集團！？"
10011035-7 = "他們自稱是「妖怪劇團．即興流派」！"
10011035-8 = "我也，曾經聽說過……#n「妖怪劇團．即興流派」在妖怪劇團中也是特別好戰的……"
10011035-11 = "不承認，百鬼夜行的傳統慶典，之外的慶典……#n似乎想禁止，除了那個之外的，所有慶典……"
10011035-13 = "還會每個月，都來要慶典的，禮券……"
10011035-15 = "但是陰陽部，還有慶典營運管理部，都沒有答應他們的要求……所以，#n聽說他們是想設法把慶典，變成自己喜歡的樣子……並為此而戰的，慶典強硬派。"
10011035-17 = "那是什麼像是會在漫畫裡出現的反派！"
10011035-18 = "[s]「慶典強硬派……？」"
10011035-20 = "況且，那些傢伙又為何會襲擊我們呢！？"
10011035-24 = "大事不好了！扮演公主的學生被綁架了！"
10011035-28 = "扮演公主的學生……"
10011035-29 = "也就是……"
10011035-30 = "伊吹閣下！？"
10011035-31 = "[s]「莫非妖怪劇團打從一開始就打算妨礙交流會……？」"
10011035-32 = "得，得趕快通報才行……！#n快聯絡陰陽部或百花繚亂……！"
10011035-33 = "慢，慢著！這可不行！"
10011035-37 = "[ns]「三千留？」"
10011035-38 = "啊，那個……"
10011035-39 = "如果通報的話，公演就……！"
10011035-41 = "……萬魔殿的成員遭到綁架。"
10011035-42 = "這件事若是被外界知道就會成為外交問題，就算發展成學園間的抗爭也不奇怪。"
10011035-43 = "就，就是說呀！所以還是別被他們知道比較好……！"
10011035-44 = "特別是我聽說萬魔殿的議長是個相當不得了的人，萬一這件事被萬魔殿知道……！"
10011035-45 = "[s]「那可能已經太遲了……」"
10011035-49 = "伊吹被綁架了是嗎……身為萬魔殿的一員，這可是無法視而不見的大事。"
10011035-54 = "咦，萬魔殿！？你就是！？"
10011035-55 = "咦咦咦咦咦咦！？#n這不就已經完全出局了嗎！？"
10011035-56 = "要演變成外交問題了嗎！？"
10011035-57 = "嗚嗚，怎麼會……"
10011035-58 = "唉……"
10011035-59 = "[s]「伊呂波，那個，先冷靜下來整理情況吧……」"
10011035-60 = "你在說什麼呢，老師？#n我現在非常冷靜啊。"
10011035-65 = "[ns]「看起來好像不太像……」"
10011035-66 = "唉，真是的……"
10011035-67 = "所以我才會反對的啊。#n能讓伊吹有個美好回憶固然不錯，但果然還是太危險了。"
10011035-68 = "真受不了，都怪真琴前輩硬是這麼做……該怎麼要他負責才好呢……"
10011035-69 = "[s]「這點之後再跟真琴說吧……」"
10011035-73 = "唉，雖然現在無處發洩怒火……"
10011035-74 = "唔，啊……"
10011035-75 = "呃，那個……"
10011035-76 = "咕，咕嘟……"
10011035-77 = "……但果然還是不能讓外界知道吧。"
10011035-78 = "畢竟也不能讓百鬼夜行與格黑娜之間發生政治上的衝突或紛爭。"
10011035-79 = "……！"
10011035-81 = "[ns]「伊呂波……！」"
10011035-82 = "那樣會讓我遇到更多麻煩的。"
10011035-83 = "[s]「雖然有猜到是這種理由……」"
10011035-84 = "要是被真琴前輩知道的話肯定會大鬧一場的，而皐月前輩──"
10011035-85 = "反正最後肯定會和往常一樣，讓我跟伊吹忙得團團轉吧。#n我已經受夠了。"
10011035-86 = "所以請別讓外界知道這件事哦。"
10011035-87 = "那，那我們該怎麼做才好……"
10011035-88 = "……只能這麼做了。"
10011035-89 = "部長？"
10011035-90 = "方法只有一個！"
10011035-91 = "[s]「你說的方法是……」"
10011035-92 = "在被外界得知之前，解決這個事件！"
10011035-93 = "也就是由在場的我們來救出伊吹醬！"
10011035-95 = "原來如此……！"
10011035-96 = "確實還有這個辦法呢！"
10011035-97 = "這裡不只有我們，還有萬魔殿的高層……和夏萊的老師在！"
10011035-98 = "對吧！？"
10011035-99 = "[s]「確實，這樣也許是最好的……」"
10011035-101 = "不過就算要隱瞞事實，為了救援也必須採取行動。#n要一邊蒙混過去一邊行動實在有點困難……"
10011035-105 = "啊～啊～#n大家，聽的到我的聲音嗎～？"
10011035-109 = "[ns]「飛行船上撥放的廣播……？」"
10011035-111 = "喵哈哈哈～♪#n各位是不是都在享受公演呢～？"
10011035-112 = "多虧了萬魔殿的協助，這次的公演是特別的版本！"
10011035-113 = "雖然也發生了一些意料之外的情況，不過如各位所見，#n「體驗型活動：和樂公主」已經開始了！"
10011035-114 = "各位請看！"
10011035-126 = "現在，綁架了公主的壞人們正在逃跑！"
10011035-127 = "那麼！究竟最先救出被歹徒綁架的公主的人會是誰呢？"
10011035-128 = "我們陰陽部預計將提供順利救出公主的人特別的獎品……"
10011035-129 = "光臨百鬼夜行的格黑娜同學們、以及總是很喜愛電影村的百鬼夜行同學們。"
10011035-130 = "請務必積極參加♪"
10011035-131 = "我們會在幕後幫各位加油的～喵哈哈！"
10011035-136 = "[ns]「……原來如此。」"
10011035-137 = "……對還不知道實情的人們宣傳「表演還在繼續」。"
10011035-138 = "藉此掩人耳目啊。是個不錯的選擇。"
10011035-139 = "那個陰險部長……不對，不，不愧是陰陽部的部長！#n這樣應該多少能爭取到一點時間！"
10011035-140 = "好，這樣狀況就變得更單純了！"
10011035-141 = "在事態惡化之前，由我們親手救出伊吹同學！"
10011035-143 = "是！拯救身陷危機之人就是忍者的工作！"
10011035-144 = "伊吹同學，現在說不定正不安地哭著……我們走吧！"
10011035-145 = "……伊吹，我們馬上就來。"
10011035-146 = "[s]「好，大家出發吧。」"
10011035-148 = "（目，目前還沒問題……！要讓公演成功，獲得忍術研究部的正式認可……！）"
10011035-149 = "（畢竟都已經誇下海口了，得比伊樹菜和月夜更努力才行……！）"
10011035-150 = "（一定，還有辦法才對……！）"

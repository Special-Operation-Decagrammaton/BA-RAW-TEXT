[translation]
80000115-1 = "ความหวานที่ไม่มีวันเบื่อ"
80000115-3 = "คุณ!"
80000115-4 = "ครู!"
80000115-5 = "คะ!"
80000115-9 = "อีก 2-3 วันจากนี้แวะมาที่ทรีนิตี้หน่อยได้มั้ย?"
80000115-10 = "อืม... ฉันมีของอยากให้คุณครูน่ะ"
80000115-11 = "ไม่ต้องถามหรอกว่ามันคืออะไร เพราะมันคือความลับ เข้าใจมั้ย?"
80000115-12 = "งั้นเจอกันตอนนั้นนะ อื้ม"
80000115-13 = "[ns] \"2-3 วันหลังจากนี้งั้นเหรอ... แล้วครูจะตั้งตารอนะ\""
80000115-16 = "หะ... หืม? ตะ... ตั้งตารองั้นเหรอ?"
80000115-17 = "พะ... พูดอะไรไม่เห็นจะเข้าใจ อะ... อะฮ่าฮ่า... นี่คุณครู... ฉันยังไม่ได้บอกเลยนะว่าจะให้อะไร... "
80000115-18 = "งะ... งั้นก็อย่าตั้งตารอหรือคาดหวังสิ... ฉันจะได้ให้แบบเซอร์ไพรส์ได้ไง..."
80000115-20 = "[ns] \"งั้นครูจะไปให้ตรงเวลานะ ไว้เจอกันนะ มิกะ\""
80000115-23 = "กะ... เกิดเรื่องใหญ่แล้วสิ! คุณครูตั้งตารองั้นเหรอ...!? ระ... เรื่องแบบนี้ไม่มีในแผนการนี่นา...!"
80000115-24 = "ทะ... ทำยังไงดี...!"
80000115-29 = "ไม่กี่วันต่อมา ณ สถาบันทรีนิตี้ เวลาหลังเลิกเรียน"
80000115-33 = "(คุณครูไปถึงสถานที่นัด แต่ก็ยังไม่เห็นมิกะ)"
80000115-37 = "[ns] ติดต่อมิกะไป"
80000115-42 = "ฉันกำลังยุ่งอยู่... นั่นใครเหรอ... หะ... หืม?! คะ... คุณครู?! "
80000115-43 = "เดี๋ยวก่อน ตอนนี้กี่โมงแล้วนะ... ว้าย?! เวลาล่วงเลยมาขนาดนี้แล้วเหรอ?!"
80000115-44 = "ขอโทษนะคุณครู! รออยู่ตรงนั้นแป๊บหนึ่งนะ! อืม ยังต้องใช้เวลาอีก... 160? ไม่สิ นั่นมันอุณหภูมิวอร์ม#nเตาอบต่างหาก... ส่วนเวลาคือ 7 นาที อื้อ! คุณครู ช่วยรอฉัน 7 นาทีนะ!"
80000115-45 = "ฉะ... ฉันจะเปลี่ยนเสื้อผ้าก่อน... หะ... หืม? ดะ... เดี๋ยวก่อนสิ! ทำไมถึงได้กลิ่นไหม้...? มะ... ไม่นะ!!"
80000115-53 = "[ns] \"อืม......\""
80000115-57 = "[ns] ไปหามิกะ เพราะรู้ว่าเธออยู่ที่ไหน"
80000115-62 = "ห้องคหกรรมที่ 7"
80000115-64 = "แค่ก... แค่ก... อึก... ห้ามเอาช็อกโกแลตไปละลายในเตาอบสินะ... ไม่รู้มาก่อนเลย..."
80000115-65 = "หืม...?"
80000115-66 = "[s] \"สวัสดี มิกะ\""
80000115-67 = "คะ... คุณครู?!"
80000115-68 = "[s] \"ครูมาหาเพราะเป็นห่วงมิกะน่ะ\""
80000115-69 = "ปะ... เป็นห่วงงั้นเหรอ... แล้วรู้ได้ยังไงว่าฉันอยู่ที่นี่... วะ... ว้าย! ดะ... เดี๋ยวก่อนนะ!!"
80000115-70 = "หยุดตรงนั้นก่อน! อย่าเข้ามาใกล้นะคุณครู!"
80000115-71 = "[s] \"หืม...??\""
80000115-72 = "เมื่อกี้ฉันมีเรียนพละมาน่ะ... ฉันทำความสะอาดโรงยิมจนเปื้อนฝุ่นไปทั้งตัว... แล้วก็ยังไม่ได้เปลี่ยนชุด#nพละเลยด้วย..."
80000115-73 = "อืม... แล้วก็อาจจะมีวิปปิ้งครีมหรือช็อกโกแลตเปื้อนหน้าอยู่ด้วยก็ได้... "
80000115-74 = "[s] \"ไม่ต้องคิดมากกับเรื่องพวกนั้นหรอกนะ มิกะ\""
80000115-75 = "อืม... ฉันก็กะไว้แล้วละว่าคุณครูจะพูดอย่างนี้..."
80000115-76 = "แต่ว่าฉันก็ยังคิดมากอยู่ดีน่ะ อืม... คุณครู อย่าทำให้เด็กผู้หญิงลำบากใจสิ"
80000115-77 = "[s] \"อะ... อื้อ...\""
80000115-78 = "งั้นช่วยไปรอที่ห้องเรียนข้างๆ ก่อนนะ แล้วฉันจะรีบไปหา"
80000115-80 = "(คุณครูมารอที่ห้องเรียนว่างๆ ที่อยู่ข้างๆ ตามคำขอของมิกะ)"
80000115-92 = "คุณครู รอนานใช่มั้ย?"
80000115-93 = "ขอโทษที่มาไม่ตรงเวลานัดนะ พอดีว่านักเรียนที่เป็นเวรจัดห้องเก็บของในโรงยิมไม่ค่อยสบาย ฉันก็เลยเข้าไปช่วย..."
80000115-94 = "ฉันก็ว่าจะติดต่อมาบอกว่าอาจจะมาช้าหน่อย... แต่คุณครูก็มาหาก่อนจนฉันตกใจเลย"
80000115-95 = "ถึงจะช้าไปหน่อย แต่ยังไงฉันก็อยากเตรียมของให้ดีน่ะ"
80000115-96 = "[s] \"หมายถึงของที่ซ่อนไว้ข้างหลังใช่มั้ย?\""
80000115-97 = "อืม... ใช่แล้วละ..."
80000115-98 = "ฉันทำขึ้นมาเองเพราะอยากให้คุณครูในวันนี้น่ะ"
80000115-99 = "นี่ไง"
80000115-105 = "ตอนแรกกะว่าจะเซอร์ไพรส์อยู่แล้วเชียว... อะฮ่าฮ่า แต่หลายๆ อย่างก็ไม่เป็นไปตามแผนที่วางไว้เลย"
80000115-106 = "ตอนนี้ฉันต้องยืมเตาอบของห้องคหกรรม... แล้วก็ใช้วัตถุดิบคุณภาพสูงไม่ได้"
80000115-107 = "แต่ยังไงฉันก็อยากทำขึ้นมาด้วยตัวเองน่ะ "
80000115-108 = "ฉันไม่เคยอบขนมมาก่อน ก็เลยอาจจะดูเงอะงะไปหน่อย... ส่วนช็อกโกแลตที่เอาไว้เคลือบก็เหมือนจะ#nไหม้ด้วย... อ่า... แต่ยังไงก็..."
80000115-115 = "ช่วยรับแยมโรลช็อกโกแลต... ไว้ด้วยนะคะ"
80000115-116 = "[s1] \"ขอบใจนะ เป็นเกียรติของครูเลยนะที่ได้กินแยมโรลของมิกะ\"\n[s2] \"เป็นของขวัญที่เซอร์ไพรส์จริงด้วย ขอบใจนะมิกะ ครูจะกินให้อร่อยเลย\""
80000115-123 = "อะ... อืม... "
80000115-124 = "[s] \"แต่มิกะไม่ได้เบื่อแยมโรลหรอกเหรอ? ทำไมถึงทำแยมโรลล่ะ?\""
80000115-125 = "หืม? อะฮ่าฮ่าฮ่า มันก็จริงอยู่หรอก"
80000115-126 = "อืม... เพราะฉันกินบ่อย ก็เลยรู้รสชาติเป็นอย่างดีน่ะ ทั้งเนื้อสัมผัส หรือจุดเด่นของรสชาติ..."
80000115-127 = "ในเมื่อเป็นการอบขนมครั้งแรก ฉันก็ไม่ควรเสี่ยงใช่ไหมล่ะ? เพราะงั้นฉันก็เลยเลือกสิ่งที่ตัวเองรู้จักดีน่ะ"
80000115-128 = "[s] \"อืม... งั้นหรอกเหรอ...\""
80000115-133 = "นี่ๆ คุณครู ว่าแต่รู้ได้ยังไงเหรอว่าฉันอยู่ที่นี่?"
80000115-134 = "อืม ฉันน่าจะหลุดปากพูดเกี่ยวกับการวอร์มเตาอบออกไป แต่ว่าในทรีนิตี้ก็มีห้องคหกรรมที่มีเตาอบตั้ง#nหลายห้อง... "
80000115-135 = "ฉันน่าจะไม่ได้บอกไปนี่นาว่าตัวเองอยู่ที่ห้องไหน... แล้วทำไมคุณครูถึงรู้ล่ะ..."
80000115-136 = "[s] \"เพราะครูรู้ตารางเรียนของมิกะยังไงล่ะ\""
80000115-137 = "หะ... หืม? "
80000115-138 = "[s3] \"ครูรู้ว่าปกติแล้วมิกะมีเรียนที่ห้องคหกรรมห้องไหนน่ะ\"\n[s4] \"ห้องนี้อยู่ใกล้สนามกีฬาที่เรียนพละที่สุดด้วย\""
80000115-141 = "งะ... งั้นเองเหรอ... ก็ไม่แปลกหรอกนะที่จะรู้... ก็คุณครูเป็นคุณครูนี่เนอะ..."
80000115-142 = "แต่รู้ตารางเรียนของฉันหมดเลยเหรอ..."
80000115-146 = "แหะๆๆ อะไรกันเนี่ย? เพราะฉันเป็นเด็กเจ้าปัญหา ก็เลยได้รับการใส่ใจ?"
80000115-147 = "อืม... แต่ก็น่าดีใจอยู่นะ?"
80000115-148 = "[s5] \"ไม่หรอก ครูรู้อยู่น่ะว่ามิกะกำลังพยายามอยู่\"\n[s6] \"ครูรู้ว่ามิกะกำลังลำบาก สู้เค้านะ\""
80000115-154 = "อื้ม...!"

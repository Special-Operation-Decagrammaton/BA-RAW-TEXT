[translation]
80000115-1 = "永不膩的甜蜜"
80000115-3 = "老！"
80000115-4 = "師！"
80000115-5 = "啊！"
80000115-9 = "幾天後可以來三一一趟嗎？"
80000115-10 = "嗯，我有東西要給老師。"
80000115-11 = "不過要給什麼是祕密哦，知道嗎？"
80000115-12 = "那到時候見囉，嗯！"
80000115-13 = "[ns]「幾天後……原來如此，我很期待哦。」"
80000115-16 = "嗯？很，很期待？"
80000115-17 = "我，我不知道你在說什麼耶～#n啊，啊哈哈……我也沒說要給你什麼呀……"
80000115-18 = "不，不可以太期待唷……不然就沒有驚喜的感覺了……"
80000115-20 = "[ns]「我會挑個時間過去的，到時候見囉，彌香。」"
80000115-23 = "糟糕！老師居然說他很期待……！？#n這，這不在計劃之內啊……！"
80000115-24 = "怎，怎麼辦……！"
80000115-29 = "幾天後，放學後的三一學園"
80000115-33 = "（雖然抵達了約好的地點，卻沒見到彌香的身影）"
80000115-37 = "[ns] 試著聯絡彌香"
80000115-42 = "……我在忙耶，是誰啦……#n呃！？老，老師！？"
80000115-43 = "等等，現在是幾點……啊啊啊！？已經這麼晚了！？"
80000115-44 = "抱歉，老師！麻煩再等我一下！#n所以……剩下的時間是……160？不對，這是預熱的溫度……#n7分鐘吧？嗯，老師，再等我7分鐘就好！"
80000115-45 = "我，我先換個衣服……咦？#n等一下！怎麼會有燒焦的味道……？不，不行！！"
80000115-53 = "[ns]「………………呃。」"
80000115-57 = "[ns] 好像知道彌香在哪裡了，決定過去看看"
80000115-62 = "第7家政實習室"
80000115-64 = "咳咳，咳咳……嗚嗚。#n原來不能用烤箱融化巧克力啊……我都不知道……"
80000115-65 = "……嗯？"
80000115-66 = "[s]「嗨，彌香。」"
80000115-67 = "老，老師！？"
80000115-68 = "[s]「我很擔心彌香，所以就過來看看。」"
80000115-69 = "擔，擔心……？#n老師怎麼會知道我在這裡……哇，哇啊！等，等等！！"
80000115-70 = "先停下來，老師！不可以過來！"
80000115-71 = "[s]「……嗯？」"
80000115-72 = "我……剛才還在上體育課……#n而且整理體育倉庫弄得滿身灰塵……還沒來得及換下體育服……"
80000115-73 = "嗯……臉上可能還沾著鮮奶油或者巧克力……"
80000115-74 = "[s]「不用在意那種事，彌香。」"
80000115-75 = "嗯，我知道老師很可能會這麼說……"
80000115-76 = "可是我還是會在意的呀？#n老師，不可以讓女孩子為難唷。"
80000115-77 = "[s]「呃，嗯……」"
80000115-78 = "在旁邊的教室稍微等一下吧，我馬上就過去。"
80000115-80 = "（照彌香所說，來到隔壁的空教室等待）"
80000115-92 = "老師，讓你久等了。"
80000115-93 = "很抱歉沒能遵守時間。#n本來負責整理體育倉庫的孩子突然不舒服，所以我就去幫忙整理，結果……"
80000115-94 = "正打算跟老師說會遲到的時候……老師突然過來找我，真的嚇了一跳。"
80000115-95 = "不過……雖然有點晚了，我還是想好好準備。"
80000115-96 = "[s]「你指的是背後藏著的東西嗎？」"
80000115-97 = "……嗯，沒錯。#n這是今天……"
80000115-98 = "為了送給老師而做的。"
80000115-99 = "鏘鏘～"
80000115-105 = "本來是打算給你一個驚喜的……啊哈哈。#n感覺一切好像都沒有按照計劃進行。"
80000115-106 = "我現在只能借用家政實習室的烤箱……也用不上高級的食材。"
80000115-107 = "不過我還是想親手做給你。"
80000115-108 = "因為是第一次嘗試烘焙，所以外觀不太好看……#n外層的巧克力好像也有點焦掉……但……還是……希望你能收下……"
80000115-115 = "這個[ruby= ・     ・     ・ ]巧克力[/ruby]蛋糕捲。"
80000115-116 = "[s1]「謝謝你。居然能吃到彌香親手做的蛋糕，真是我的榮幸。」\n[s2]「確實充滿驚喜呢。謝謝你，彌香。我會好好享用的。」"
80000115-123 = "嗯，嗯……"
80000115-124 = "[s]「不過你不是已經吃膩蛋糕捲了嗎？」"
80000115-125 = "嗯？啊哈哈哈，雖然是這樣沒錯……"
80000115-126 = "不過也因為吃過很多次的關係，對味道比較了解。#n比如口感，或是調味的重點……"
80000115-127 = "畢竟是第一次做，太冒險總不太好吧？#n所以我才會選擇比較熟悉的蛋糕捲。"
80000115-128 = "[s]「原來如此……」"
80000115-133 = "話說話說，老師怎麼會知道我在這裡呢？"
80000115-134 = "雖然我好像確實說過預熱之類的詞，但是三一裡有烤箱的實習室有幾十間……"
80000115-135 = "自己會去哪一間實習室，我明明沒有告訴任何人……老師是怎麼……"
80000115-136 = "[s]「因為我知道彌香所有的行程。」"
80000115-137 = "咦咦？"
80000115-138 = "[s3]「我知道彌香平常在哪間家政實習室上課。」\n[s4]「而且這裡也是最接近體育課運動場的實習室。」"
80000115-141 = "原，原來如此……#n雖然你是老師……這也沒什麼好奇怪的……"
80000115-142 = "不過居然知道我的所有行程……"
80000115-146 = "嘿嘿嘿，什麼嘛？#n因為我是問題學生，所以必須嚴加管理嗎？"
80000115-147 = "但就算是這樣……好像還是有點開心。"
80000115-148 = "[s5]「不，是因為我知道彌香正在努力。」\n[s6]「我知道彌香很努力，加油哦。」"
80000115-154 = "……嗯！"

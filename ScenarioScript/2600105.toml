[translation]
2600105-1 = "ความลับที่บอกใครไม่ได้"
2600105-2 = "ห้องของโคทามะ"
2600105-3 = "ถ้ากะเวลาถูกแล้วแฮ็กเข้าเซิร์ฟเวอร์ของสถานีได้ล่ะก็จะแอบฟังเรื่องสนุกๆ ที่พูดคุยกัน#nทางโทรศัพท์ได้ด้วยนะคะ"
2600105-4 = "ไหนดูซิ วันนี้เราจะมาดักฟังสายไหนกันดี..."
2600105-5 = "สายที่น่าสงสัยจากผู้ติดต่อที่ไม่ทราบตัวตน#nผู้ที่รับสายก็คือ..."
2600105-6 = "คุณครูของชาเล่ต์งั้นเหรอ?"
2600105-7 = "มีคนโทรหาคุณครูกลางดึกแบบนี้ด้วยเหรอ คงต้องแอบฟังแล้วล่ะ!"
2600105-9 = "เริ่มทำการต่อสายดักฟังในอีกห้า...สี่...สาม..."
2600105-12 = "ไม่คิดเลยนะว่าคุณจะติดต่อมาโดยตรง คงเป็นเรื่องด่วนสินะ"
2600105-13 = "(สัญญาณไม่ค่อยดีเลย คงต้องตั้งใจฟังแล้ว...)"
2600105-14 = "...เราเป็นผู้เชี่ยวชาญในการรับมือเรื่องแบบนั้นอยู่แล้ว ถ้าคุณปล่อยให้มือสมัครเล่นทำ#nเสื้อของพวกเขาอาจชะโลมไปด้วยสีแดงก็ได้"
2600105-15 = "(ชะโลมด้วยสีแดงเหรอ... นี่พวกเขาพูดเรื่องอะไรกัน?)"
2600105-16 = "การเก็บกวาดก็สำคัญเหมือนกัน ถ้ามันลอยขึ้นมาอาจจะเป็นปัญหาได้ เพราะงั้นคุณใช้พลาสติก#nห่อแล้วก็ใช้หินก้อนใหญ่ถ่วงน้ำหนักมันไว้"
2600105-17 = "(การเก็บกวาด? หินก้อนใหญ่? หรือว่าพวกเขากำลังพูดถึง...)"
2600105-18 = "ฉันจะส่งสินค้าที่สมบูรณ์ที่จะไม่เสียหายไปให้ เตรียมรอรับได้เลย ฮ่าฮ่า!"
2600105-20 = "......"
2600105-21 = "ดูเหมือนว่า...คุณครูจะไปเกี่ยวพันกับอะไรบางอย่างที่น่ากลัวเข้าแล้วล่ะค่ะ"
2600105-23 = "สำนักงานชาเล่ต์"
2600105-24 = "......"
2600105-26 = "(จากข้อมูลที่ได้มาจากการดักฟัง <ของ> จะถูกส่งมาตอนบ่ายสองวันนี้)"
2600105-27 = "(ฉันต้องเคลียร์กับคุณครูให้รู้เรื่องก่อนที่จะกลายเป็นเรื่องใหญ่ไปกว่านี้)"
2600105-28 = "(ไม่งั้น...คิโวทอสอาจต้องนองไปด้วยเลือด...)"
2600105-31 = "[ns] \"โคทามะ สีหน้าดูไม่ค่อยดีเลยนะ เป็นอะไรรึเปล่า?\""
2600105-32 = "ฉะ...ฉันไม่เป็นอะไรค่ะ แค่นอนไม่พอน่ะค่ะ"
2600105-33 = "คุณครูดูตื่นเต้นนะคะ กำลังรออะไรอยู่รึเปล่าคะ?"
2600105-34 = "[s] \"ของที่ครูสั่งไปทางโทรศัพท์กำลังจะมาถึงวันนี้น่ะ\""
2600105-35 = "ของที่ว่านี่มัน..."
2600105-36 = "คุณครูคะ ขอเวลาคุยสักครู่ได้มั้ยคะ"
2600105-38 = "พัสดุมาส่งแล้วครับ"
2600105-40 = "เดี๋ยวก่อนค่ะคุณครู กล่องนั่นมัน..."
2600105-42 = "[ns] \"บ๊วยดองชั้นดียังไงล่ะ\""
2600105-43 = "...อะไรนะคะ? บ๊วยดองเหรอ?"
2600105-44 = "กล่องนั่นก็ไม่ใช่หลักฐานเปื้อนเลือดจากเหตุอาชญากรรมเหรอคะ?"
2600105-45 = "[s] \"...พูดถึงเรื่องอะไรอยู่น่ะ?\""
2600105-47 = "อ่า การทำให้เปื้อนสีแดงหมายถึงการเอามันไปดอง และน้ำหนักของหินก็เอาไว้เพื่อทำให้มันคง#nอยู่ในน้ำเกลือ"
2600105-48 = "ฉันคิดว่าคุณครูกำลังพยายามจะทำลายหลักฐานคดีอาชญากรรมค่ะ"
2600105-49 = "[s1] \"ครูไม่ทำแบบนั้นหรอกนะ\"\n[s2] \"โคทามะคิดว่าครูเป็นคนแบบไหนเนี่ย?\""
2600105-50 = "ฮุฮุ ฉันดีใจนะคะที่คุณครูก็ยังเป็นคนเดิมที่ฉันรู้จัก"
2600105-51 = "ฮุฮุ ฉันดีใจนะคะที่คุณครูก็ยังเป็นคนเดิมที่ฉันรู้จัก"
2600105-52 = ".....อ่า บ๊วยดองอร่อยจังเลยค่ะ"
2600105-53 = "รสเปรี้ยวกำลังดีและมีสีแดงสด คงจะดองด้วยวิธีที่พิถีพิถันมากเลยค่ะ"
2600105-54 = "[s] \"ว่าแต่รู้เรื่องที่ครูคุยทางโทรศัพท์ได้ยังไงน่ะ?\""
2600105-55 = "อ่อ... คือว่าเรื่องนั้น..."
2600105-56 = "...มันบังเอิญน่ะค่ะ"
2600105-58 = "หลังจากนั้น คุณครูก็เทศนาโคทามะที่มาแอบฟังโทรศัพท์โดยไม่ได้รับอนุญาตไปหนึ่งชุด"

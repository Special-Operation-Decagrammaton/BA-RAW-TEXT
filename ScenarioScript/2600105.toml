[translation]
2600105-1 = "難以說出口的事"
2600105-2 = "小玉的房間"
2600105-3 = "在這個時間帶駭入基地局的伺服器的話，可以偷聽到很多有趣的內容呢。"
2600105-4 = "我看看，今天可以監聽到什麼樣的通話呢……"
2600105-5 = "發信者不明……很可疑呢。#n收信者是……"
2600105-6 = "夏萊？"
2600105-7 = "竟然有人在這種深夜打電話給老師……這不能不聽呢。"
2600105-9 = "監聽開始……捕捉。"
2600105-12 = "沒想到夏萊的老師會親自委託，看來相當緊急呢？"
2600105-13 = "（不知道是不是線路不好，沒辦法聽得很清楚呢……）"
2600105-14 = "……關於那個的處理確實是我們的專長。業餘自己處理的話，衣服也許會染紅也說不定啊。"
2600105-15 = "（處理……而且，衣服染紅是……）"
2600105-16 = "善後也不能用普通的方法。不好好綁起來放上重的石頭的話，事後東西浮起來的話也很麻煩。"
2600105-17 = "（善後？重的石頭？這個，難道是……）"
2600105-18 = "我會幫你好好處理，以免腐爛的。好好期待吧，哈哈哈！"
2600105-20 = "……"
2600105-21 = "看來……似乎被捲入了不好的事件呢。"
2600105-23 = "夏萊．辦公室"
2600105-24 = "……"
2600105-26 = "（根據監聽的內容，對方送來「那個東西」的時間是，今天的下午2點）"
2600105-27 = "（至少，在老師被捲入更大的犯罪以前，必須說服老師才行）"
2600105-28 = "（老師有什麼萬一的話，會對奇普托斯全域造成影響……）"
2600105-31 = "[ns]「小玉？臉色不太好耶，還好嗎？」"
2600105-32 = "我，我沒事。昨晚，有點睡不著而已。"
2600105-33 = "老師則是，感覺很開心。發生了什麼好事嗎？"
2600105-34 = "[s]「委託的東西就快送來了呢。」"
2600105-35 = "委託的東西，是……"
2600105-36 = "那個，老師。稍微有點想說的話。"
2600105-38 = "您下訂的商品送來了──。"
2600105-40 = "老師，請等一下，那個裡面……！"
2600105-42 = "[ns]「這次也做得很好呢，『酸梅乾』。」"
2600105-43 = "……咦？酸梅乾？"
2600105-44 = "裝在那個箱子裡的，不是沾滿血的犯罪證據嗎？"
2600105-45 = "[s]「……小玉，妳在說什麼呢？」"
2600105-47 = "……原來如此。染紅指的是紫蘇的葉子，重的石頭指的是醃漬時的重石啊。"
2600105-48 = "根據電話內容，擅自誤會了老師想湮滅染血的犯罪證據。"
2600105-49 = "[s1]「怎麼可能啊……」\n[s2]「小玉把我當成什麼了……？」"
2600105-50 = "呵呵，是我知道的一如往常的老師真是太好了。"
2600105-51 = "呵呵，是我知道的一如往常的老師真是太好了。"
2600105-52 = "……啊。這個酸梅乾，真好吃呢。"
2600105-53 = "顏色也很漂亮，可以感覺到職人良好的手藝。"
2600105-54 = "[s]「比起這個，小玉為什麼知道我的通話內容呢？」"
2600105-55 = "啊。這是，那個……"
2600105-56 = "……偶然？"
2600105-58 = "（這之後一段時間，關於竊聽電話的事，對小玉說教了）"

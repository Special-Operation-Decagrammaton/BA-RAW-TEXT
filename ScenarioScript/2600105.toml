[translation]
2600105-1 = "Unspeakable Secrets"
2600105-2 = "Kotama's Room"
2600105-3 = "You can listen to a lot of interesting phone calls if you hack the station servers at the right time."
2600105-4 = "Let's see. What calls should we intercept today..."
2600105-5 = "A suspicious call from an unknown caller. The receiver is..."
2600105-6 = "Schale's Sensei?"
2600105-7 = "Someone's calling Sensei so late at night. I must listen to this!"
2600105-9 = "Commencing with wiretap in five...four...three..."
2600105-12 = "I didn't expect you'd call me directly. This must be urgent."
2600105-13 = "(The connection isn't great. I'll have to listen carefully...)"
2600105-14 = "...We are indeed experts in handling that. If you leave it to an amateur, they might end up stained red instead of the item."
2600105-15 = "(Stained red... What are they speaking of?)"
2600105-16 = "The handling afterward is also important. It might be a nuisance if it floats back up, so you'll have to wrap it in plastic and hold it down with a heavy rock."
2600105-17 = "(Afterward? A heavy rock? Are they talking about...)"
2600105-18 = "I'll send you a fine finished product that won't rot, so look forward to it. Haha!"
2600105-20 = "..."
2600105-21 = "It seems...Sensei is caught up in something scary."
2600105-23 = "Schale Executive Office"
2600105-24 = "..."
2600105-26 = "(According to the intercepted info, the object will be delivered at two o'clock today.)"
2600105-27 = "(I must get through to Sensei before this turns into a bigger crime.)"
2600105-28 = "(Otherwise...Kivotos might be awash with blood...)"
2600105-31 = "[ns] \"Kotama, you don't look so well. Are you all right?\""
2600105-32 = "I-I'm fine. I just didn't get enough sleep."
2600105-33 = "Sensei, you look a little excited. Are you expecting something?"
2600105-34 = "[s] \"Something I ordered by phone is arriving today.\""
2600105-35 = "Is this object..."
2600105-36 = "Sensei... We need to talk."
2600105-38 = "Here's your delivery."
2600105-40 = "Sensei, wait. That package..."
2600105-42 = "[ns] \"This umeboshi was handled expertly.\""
2600105-43 = "...What? Umeboshi?"
2600105-44 = "So that box isn't evidence of a bloody crime?"
2600105-45 = "[s] \"...Kotama, what in the world are you talking about?\""
2600105-47 = "Aha. Staining it red meant pickling it, and the stone weight was to keep it in the salt water."
2600105-48 = "I thought you were trying to dispose of evidence of a crime."
2600105-49 = "[s1] \"I would never do that.\"\n[s2] \"Kotama, what kind of person do you think I am?\""
2600105-50 = "Ah heh, I'm glad Sensei is the Sensei I've come to know."
2600105-51 = "Ah heh, I'm glad Sensei is the Sensei I've come to know."
2600105-52 = "...Ah. This umeboshi is really tasty."
2600105-53 = "It's perfectly sour, with a lovely red hue. Expertly made."
2600105-54 = "[s] \"By the way, how did you find out about my phone call?\""
2600105-55 = "Well..."
2600105-56 = "...By coincidence?"
2600105-58 = "After that, I scolded Kotama for eavesdropping without permission."

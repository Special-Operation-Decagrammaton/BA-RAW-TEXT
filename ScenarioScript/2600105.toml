[translation]
2600105-1 = "#title;말할 수 없는 비밀"
2600105-2 = "#place;코타마의 방"
2600105-3 = "3;코타마;02;이 시간대에 기지국 서버를 해킹하면 재미있는 통화를 많이 엿들을 수 있습니다.\n#3;em;[음표]\n#3;a"
2600105-4 = "3;코타마;99;어디 보자. 오늘은 누구의 전화를 감청해볼까요……."
2600105-5 = "3;코타마;01;발신자 미상의 수상쩍은 전화가 한 건. #n수신자는……\n#3;em;…"
2600105-6 = "3;코타마;04;샬레의 선생님?\n#3;em;[?!]\n#3;stiff"
2600105-7 = "3;코타마;06;이런 야심한 밤에 선생님께 전화를 하는 사람이 있다니, 들어보지 않을 수 없지요."
2600105-8 = "3;코타마;05\n#3;greeting\n#wait;1500"
2600105-9 = "3;코타마;05;……감청 개시. 인 카운트.\n#3;closeup"
2600105-10 = "3;코타마;05\n#3;closeup"
2600105-11 = "#wait;1500"
2600105-12 = "#na;수상쩍은 목소리;샬레의 선생님이 직접 연락을 주다니, 어지간히도 급한 일이었나 보군."
2600105-13 = "3;코타마;05;(회선 상태가 나빠서 그런지 목소리가 잘 들리지 않습니다. 좀 더 귀를 기울여야…….)\n#3;closeup"
2600105-14 = "#na;수상쩍은 목소리;……확실히 그 물건들을 처리하는 건 우리가 전문가지. 아마추어에게 맡겼다가는 물건 대신 옷을 빨갛게 물들일지도 모르니까."
2600105-15 = "3;코타마;04;(옷을 빨갛게 물들인다니…… 도대체 무슨 물건을 처리하려는 걸까요?)\n#3;em;[땀]\n#3;stiff\n#3;closeup"
2600105-16 = "#na;수상쩍은 목소리;뒤처리도 중요해. 나중에 물건이 떠오르면 귀찮으니까, 비닐로 잘 묶어서 무거운 돌로 눌러 두어야 뒤탈이 없다고."
2600105-17 = "3;코타마;05;(뒤처리? 무거운 돌? 이건 혹시 설마…….)\n#3;closeup"
2600105-18 = "#na;수상쩍은 목소리;완성품은 썩지 않게 잘 절여서 보내줄 테니까, 기대하고 있으라고. 하하!"
2600105-19 = "#wait;1500"
2600105-20 = "3;코타마;05;…….\n#3;closeup"
2600105-21 = "3;코타마;06;아무래도…… 선생님이 무서운 일에 휘말리신 모양입니다.\n#3;closeup\n#3;em;…"
2600105-22 = "#all;hide"
2600105-23 = "#place;샬레 집무실"
2600105-24 = "3;코타마;05;…….\n#3;em;…\n#3;a"
2600105-25 = "3;코타마;05\n#3;h"
2600105-26 = "3;코타마;05;(감청한 내용에 따르면 상대가 <그 물건>을 보내기로 한 시간은 오늘 오후 두 시.)"
2600105-27 = "3;코타마;06;(선생님이 더 큰 범죄에 휘말리기 전에 선생님을 설득해야 합니다.)"
2600105-28 = "3;코타마;05;(그렇지않으면 키보토스 전역에 거대한 피바람이 불 수도…….)"
2600105-29 = "3;코타마;05\n#3;h"
2600105-30 = "#wait;1000"
2600105-31 = "[ns] \"코타마, 표정이 나빠 보이는데. 괜찮아?\""
2600105-32 = "3;코타마;04;괘, 괜찮습니다. 잠을 조금 설쳤을 뿐이라.\n#3;stiff"
2600105-33 = "3;코타마;05;그러는 선생님이야말로 묘하게 들떠 보이시는데, 무슨 좋은 일이라도 있으신가요?"
2600105-34 = "[s] \"전화로 주문했던 물건이 곧 온다고 해서 기다리고 있었어.\""
2600105-35 = "3;코타마;04;혹시 그 물건은 설마……."
2600105-36 = "3;코타마;06;저, 선생님. 잠깐 이야기를 하죠.\n#3;em;[반응]"
2600105-37 = "#all;hide\n#wait;1500"
2600105-38 = "#na;배달부;주문한 물건 배달 왔습니다."
2600105-39 = "#zmc;move;316,0;2528;2000\n#wait;2000"
2600105-40 = "#zmc;instant;316,0;2528\n#na;코타마;선생님, 잠깐 기다리십시오. 그 안에는……!"
2600105-41 = "#zmc;instant;316,0;2528\n#wait;1500"
2600105-42 = "#zmc;instant;316,0;2528\n[ns] \"이번에도 <우메보시>가 맛있게 잘 익었네.\""
2600105-43 = "#zmc;instant;316,0;2528\n#na;코타마;……네? 우메보시요?"
2600105-44 = "#zmc;instant;316,0;2528\n#na;코타마;그 상자에 든 건 피로 물든 범죄의 증거가 아니었습니까?"
2600105-45 = "#zmc;instant;316,0;2528\n[s] \"……코타마야 말로 무슨 소리를 하는 거야?\""
2600105-46 = "#all;hide"
2600105-47 = "3;코타마;02;아하. 빨갛게 물들이는 건 차조기 잎이고, 무게추는 장아찌 누름돌을 말하는 것이었군요.\n#3;a\n#3;greeting\n#3;em;[반응]"
2600105-48 = "3;코타마;05;저는 전화 내용만 듣고 선생님이 피비린내 나는 범죄의 흔적을 지우려고 하신 줄로만 알았습니다."
2600105-49 = "[s1] \"그럴 리가 없잖아.\"\n[s2] \"코타마는 나를 어떻게 생각하고 있었던 거야?\""
2600105-50 = "3;코타마;03;후후, 선생님이 제가 아는 평소의 선생님이어서 다행입니다.\n#3;em;[재잘]"
2600105-51 = "3;코타마;03;후후, 선생님이 제가 아는 평소의 선생님이어서 다행입니다.\n#3;em;[재잘]"
2600105-52 = "3;코타마;01;……아. 이 우메보시, 맛있게 잘 익었네요."
2600105-53 = "3;코타마;02;맛은 적당히 시고, 색도 예쁘니 장인의 솜씨가 느껴집니다.\n#3;greeting"
2600105-54 = "[s] \"그나저나 코타마는 전화 내용을 어떻게 알게 된 거야?\""
2600105-55 = "3;코타마;04;어, 그게 그러니까…….\n#3;stiff"
2600105-56 = "3;코타마;04;……우연히?\n#3;em;…"
2600105-57 = "#all;hide"
2600105-58 = "#na;이후 한동안 무단으로 전화를 도청한 건에 대해 코타마에게 잔소리를 하였다."

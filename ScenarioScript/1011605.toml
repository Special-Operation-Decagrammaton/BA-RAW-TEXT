[translation]
1011605-1 = "Returning the Favor"
1011605-2 = "I went out to meet Saori."
1011605-3 = "But..."
1011605-8 = "..."
1011605-9 = "[ns] \"U-Um... Saori?\""
1011605-13 = "Ah, Sensei. I was waiting for you."
1011605-14 = "Let's get moving. Where do you want to go?"
1011605-15 = "[ns] \"H-Hold on!\""
1011605-17 = "[ns] \"You were waiting around like...this?\""
1011605-18 = "I heard that one is supposed to dress up for special occasions..."
1011605-22 = "Ooh... Such an elegant dress. Does she come from money?"
1011605-23 = "Is she lost?"
1011605-24 = "She's gorgeous... Should I ask to take her photo?"
1011605-29 = "Sensei... Are we being watched? Is there a problem?"
1011605-30 = "[ns1] \"L-Let's get out of here!\"\n[ns2] \"This place is a zoo!\""
1011605-36 = "Hm? Hold on. Sensei...?"
1011605-43 = "Once we got away..."
1011605-46 = "I explained the situation to Saori."
1011605-53 = "...Is that so? This is my fault."
1011605-54 = "I would've been a joke if we stayed."
1011605-55 = "How awkward. I embarrassed you."
1011605-56 = "I'm sorry. I wanted to repay you for your help."
1011605-57 = "But it seems I ruined the outing."
1011605-58 = "I'll change, if you'll give me a moment..."
1011605-62 = "...Hm? You prefer this? Why?"
1011605-63 = "[s3] \"Because you wore it for me!\"\n[s4] \"I can't let your efforts go to waste!\""
1011605-66 = "Tch...!"
1011605-67 = "B-But I can't eat out with you while dressed like this..."
1011605-68 = "...What? You'll make dinner yourself? Why?"
1011605-69 = "[s5] \"Because I want to repay you.\"\n[s6] \"You worked hard, Saori, so you should be rewarded.\""
1011605-72 = "S-So that's how you see it..."
1011605-73 = "...Very well. I'll do as you say."
1011605-74 = "I'm also curious about your cooking."
1011605-75 = "[ns] \"Now, that's cause for celebration.\""
1011605-77 = "[ns] \"Let's take a photo!\""
1011605-78 = "A photo..."
1011605-79 = "Very well."
1011605-80 = "[s] \"Hm? You'll let me? Really?\""
1011605-81 = "You've helped me learn how to pose. One more photo won't hurt."
1011605-82 = "...That said, I have something for you."
1011605-83 = "Here."
1011605-93 = "It's a fashion magazine...with my photo."
1011605-94 = "With your help, I became the...cover girl."
1011605-95 = "They were so impressed. They said they'll call me for more work."
1011605-96 = "So not only was I paid, but they let me keep the dress afterward."
1011605-97 = "It's all thanks to you. So I wanted to give you this magazine before anyone else saw..."
1011605-98 = "[ns] \"Ooh, so this is a feature story?\""
1011605-101 = "W-Wait! Sensei! You're going to read that right in front of me?"
1011605-102 = "[ns7] \"You've done well, Saori! I'm so proud!\"\n[ns8] \"My, so mature and elegant!\""
1011605-110 = "E-Enough. Stop comparing me to the magazine!"
1011605-111 = "It barely even looks like me after all the retouches."
1011605-112 = "...Hm? You disagree?"
1011605-113 = "[ns] \"Oh, that expression you just made is perfect!\""
1011605-115 = "[ns] \"Let's commemorate it with a photo!\""
1011605-116 = "...Tch!"
1011605-117 = "F-Fine. But..."
1011605-121 = "This is just for YOU, understand?"
1011605-122 = "[ns] \"Woohoo!\""
1011605-131 = "After our private photo shoot, I cooked our meal and dined with Saori."

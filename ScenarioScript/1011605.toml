[translation]
1011605-1 = "報恩"
1011605-2 = "（為了見沙織而前往了美食街）"
1011605-3 = "（然而……）"
1011605-8 = "……"
1011605-9 = "[ns]「那，那個……沙織同學？」"
1011605-13 = "啊，老師。我正在等你呢。"
1011605-14 = "我們走吧。老師想去哪間店？"
1011605-15 = "[ns]「先，先等一下！」"
1011605-17 = "[ns]「你等我的時候一直穿著那套衣服嗎？」"
1011605-18 = "我聽說出席重要場合的時候，要盡量打扮得體……"
1011605-22 = "哦……純白色禮服？是哪位豪門千金嗎？"
1011605-23 = "這麼高貴的小姐怎麼會來這裡呢？"
1011605-24 = "哦哦，真美啊……好想問他可不可以拍照！"
1011605-29 = "……老師。大家好像一直在看著我竊竊私語，發生什麼事了嗎？"
1011605-30 = "[ns1]「先，先換個地方吧！」\n[ns2]「待在這裡太引人注目了！」"
1011605-36 = "嗯？等等，老師……？"
1011605-43 = "（於是之後來到的地方是……）"
1011605-46 = "（努力向沙織說明了情況）"
1011605-53 = "……是嗎？看來是我穿得過於華麗了。"
1011605-54 = "繼續待在那裡的話，可能會變成眾人圍觀的對象。"
1011605-55 = "我無意讓老師感到為難……"
1011605-56 = "抱歉，明明是想答謝老師的……"
1011605-57 = "結果好像搞砸了。"
1011605-58 = "我馬上去換件衣服再回來，請稍等……"
1011605-62 = "……嗯？現在這樣反而更好？#n這是什麼意思？"
1011605-63 = "[s3]「我感覺得到沙織為我打扮的用心！」\n[s4]「沙織這麼認真打扮，我不能讓你的努力白費！」"
1011605-66 = "咳……！"
1011605-67 = "可，可是這副打扮沒辦法去老師喜歡的店……"
1011605-68 = "……什麼？老師要親自煮飯給我吃？為什麼呢？"
1011605-69 = "[s5]「既然沙織這麼為我著想……」\n[s6]「你的努力也應該要得到回報。」"
1011605-72 = "老，老師是這麼想的嗎。"
1011605-73 = "……我知道了。那就聽從老師的安排吧。"
1011605-74 = "我對老師的料理手藝也確實有點興趣。"
1011605-75 = "[ns]「今天好像會是值得紀念的一天呢。」"
1011605-77 = "[ns]「這種時候應該要拍張照片！」"
1011605-78 = "照片……"
1011605-79 = "我知道了。"
1011605-80 = "[s]「嗯？你答應了？真的嗎？」"
1011605-81 = "託老師的福，我也慢慢熟悉模特兒的工作，現在拍照已經不成問題了。"
1011605-82 = "……所以，我有個東西要交給老師。"
1011605-83 = "請收下吧。"
1011605-93 = "這是有我的照片的時尚雜誌。"
1011605-94 = "看來我似乎默默成為了封面模特兒呢。"
1011605-95 = "對方也邀請我之後有機會再繼續合作。"
1011605-96 = "除了酬勞之外，就連攝影穿的禮服也送給我了。"
1011605-97 = "這全都多虧了老師。#n所以一拿到這本雜誌，我第一個就想送給老師……"
1011605-98 = "[ns]「哦哦，這就是……！」"
1011605-101 = "等，等等！老師！#n你要在我面前翻開來看嗎！"
1011605-102 = "[ns7]「你真的長大了呢，沙織！老師看了好感動！」\n[ns8]「光是看著就心潮澎湃……！」"
1011605-110 = "我，我知道你的意思，不過請不要一邊看雜誌一邊跟我本人做比較！"
1011605-111 = "那上面的圖都有修過，所以多少還是跟本人有區別的！"
1011605-112 = "……和，和本人沒什麼區別？#n真，真的嗎？"
1011605-113 = "[ns]「哦，剛才那個表情很好看！」"
1011605-115 = "[ns]「這次一定要拍下來珍藏……！」"
1011605-116 = "……唔！"
1011605-117 = "好，好吧。不過……"
1011605-121 = "絕對不能給其他人看。知道嗎？"
1011605-122 = "[ns]「哦耶！」"
1011605-131 = "（拍了一堆照片之後，和沙織一起做料理吃，共度了很久的時間）"

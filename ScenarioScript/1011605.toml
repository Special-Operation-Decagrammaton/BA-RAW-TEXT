[translation]
1011605-1 = "ตอบแทนบุญคุณ"
1011605-2 = "(คุณครูออกมาที่ถนนร้านอาหารเพื่อเจอซาโอริ)"
1011605-3 = "(แต่ว่า...)"
1011605-8 = "..."
1011605-9 = "[ns] \"อะ... เอ่อ... คุณซาโอริ?\""
1011605-13 = "อ๊ะ ครู ฉันกำลังรออยู่เลย"
1011605-14 = "งั้นเราก็ไปกันเถอะ ไปร้านไหนดีล่ะ?"
1011605-15 = "[ns] \"ดะ... เดี๋ยวก่อน!\""
1011605-17 = "[ns] \"ออกมายืนรอครูในชุดนี้เลยเหรอ?\""
1011605-18 = "ฉันได้ยินมาว่าในการนัดหมายที่สำคัญควรแต่งตัวให้เกียรติฝ่ายตรงข้าม ก็เลย..."
1011605-22 = "โอ้... ใส่เดรสสีขาวมาเลยเหรอ? เป็นลูกสาวของคนระดับสูงหรือเปล่านะ?"
1011605-23 = "คนสูงศักดิ์ขนาดนั้นมีธุระอะไรที่นี่งั้นเหรอ?"
1011605-24 = "โห สวยจัง... ไปขอถ่ายรูปดีมั้ยนะ?"
1011605-29 = "ครู... จะว่าไป คนที่ผ่านไปผ่านมาก็เอาแต่มองฉันและกระซิบกระซาบอะไรกันก็ไม่รู้ ฉันทำอะไรผิดงั้นเหรอ?"
1011605-30 = "[ns1] \"คะ... ครูว่าเราย้ายที่กันก่อนดีกว่า!\"\n[ns2] \"ตรงนี้มีสายตาจับจ้องเยอะ เราไปที่อื่นกันเถอะ!\""
1011605-36 = "หืม? เดี๋ยวสิ ครู...?"
1011605-43 = "(ในที่สุดคุณครูกับซาโอริก็มาที่อื่น...)"
1011605-46 = "(แล้วคุณครูก็พยายามอธิบายสถานการณ์ให้ซาโอริฟัง)"
1011605-53 = "งั้นเหรอ...? ฉันคงใส่เสื้อผ้าออกมาเวอร์เกินไปสินะ"
1011605-54 = "ขืนยังอยู่ตรงนั้น ฉันคงตกเป็นเป้าสายตาไปแล้ว"
1011605-55 = "ฉันไม่ได้ตั้งใจจะทำให้ครูไม่สบายใจเลย..."
1011605-56 = "ขอโทษนะ ฉันอยากมาเลี้ยงข้าวตอบแทนแท้ๆ"
1011605-57 = "วันนี้ฉันคงทำพลาดแล้วละ"
1011605-58 = "ฉันจะรีบไปเปลี่ยนชุดใหม่มา ช่วยรอตรงนี้..."
1011605-62 = "หืม...? แบบนี้ดีแล้วงั้นเหรอ? หมายความว่ายังไงน่ะ?"
1011605-63 = "[s3] \"ก็ครูสัมผัสได้ถึงความตั้งใจของซาโอริยังไงล่ะ!\"\n[s4] \"ครูจะไม่ทำให้ความตั้งใจของซาโอริสูญเปล่าหรอก!\""
1011605-66 = "อึก...!"
1011605-67 = "ตะ... แต่ว่าถ้าฉันแต่งตัวแบบนี้เข้าไปในร้านอาหารที่ครูชอบ..."
1011605-68 = "ว่าไงนะ...? ครูจะทำอาหารให้เองงั้นเหรอ? ไหงเป็นงี้ล่ะ?"
1011605-69 = "[s5] \"แบบนี้เหมือนว่าครูจะเป็นหนี้บุญคุณมากกว่าน่ะ\"\n[s6] \"ซาโอริต้องได้รับสิ่งตอบแทนจากความพยายามสิ\""
1011605-72 = "ทะ... ทำไมถึงออกมาเป็นอย่างนี้ล่ะ"
1011605-73 = "เข้าใจแล้ว... เอาตามที่ครูต้องการแล้วกัน"
1011605-74 = "ฉันก็อยากเห็นอาหารที่ครูทำเหมือนกัน"
1011605-75 = "[ns] \"ดูเหมือนวันนี้จะเป็นวันที่น่าจดจำเลยนะ\""
1011605-77 = "[ns] \"แบบนี้ต้องถ่ายรูปเก็บไว้แล้ว!\""
1011605-78 = "ถ่ายรูป..."
1011605-79 = "เข้าใจแล้ว"
1011605-80 = "[s] \"หืม? อนุญาตให้ถ่ายได้เหรอ? จริงเหรอ?\""
1011605-81 = "ครูช่วยให้ฉันทำงานพาร์ทไทม์เป็นนางแบบได้สำเร็จและออกมาดีด้วย ตอนนี้การถ่ายรูปไม่ใช่เรื่องยาก#nสำหรับฉันหรอก"
1011605-82 = "เพราะงั้น... ฉันก็เลยมีบางอย่างจะให้ครู"
1011605-83 = "รับไปสิ"
1011605-93 = "นี่คือนิตยสารแฟชั่นที่มีรูปถ่ายของฉัน"
1011605-94 = "ไม่คิดเลยนะว่าจะได้ขึ้นปกนิตยสารกับคนอื่นเขาด้วย"
1011605-95 = "ทางนั้นมาขอให้ฉันเป็นนางแบบอีกรอบถ้ามีโอกาสด้วยนะ"
1011605-96 = "นอกจากค่าจ้างแล้ว ฉันก็ได้ชุดที่ใส่ตอนถ่ายแบบมาด้วย"
1011605-97 = "ทั้งหมดเป็นเพราะได้ครูช่วยฉันไว้น่ะ ฉันก็เลยอยากเอานิตยสารนี้มาให้ครูเป็นคนแรก..."
1011605-98 = "[ns] \"โอ้ว นี่คือ...!\""
1011605-101 = "ดะ... เดี๋ยว! ครู! จะเปิดดูต่อหน้าฉันเลยเหรอ!?"
1011605-102 = "[ns7] \"เก่งมาก ซาโอริ! นักเรียนของครูน่าภูมิใจที่สุดเลย!\n[ns8] \"แค่ได้เห็นรูป ครูก็หัวใจพองโตเลยละ...!\""
1011605-110 = "ระ... รู้แล้วน่า เลิกดูรูปแล้วเปรียบเทียบกันฉันในตอนนี้ได้แล้ว!"
1011605-111 = "รูปในนิตยสารถูกตัดต่อให้ออกมาสวย มันก็เลยต่างจากตัวจริงน่ะ!"
1011605-112 = "หืม...? มะ... ไม่ค่อยต่างจากตัวจริงเท่าไรงั้นเหรอ? จะ... จริงเหรอ?"
1011605-113 = "[ns] \"โอ้ว ทำหน้าแบบเมื่อกี้ดีมากเลย!\""
1011605-115 = "[ns] \"ครั้งนี้ขอให้ครูได้ถ่ายรูปเก็บไว้เถอะนะ...!\""
1011605-116 = "อึก...!"
1011605-117 = "กะ... ก็ได้ แต่ว่า..."
1011605-121 = "ห้ามเอาไปให้คนอื่นดูเด็ดขาดนะ เข้าใจมั้ย?"
1011605-122 = "[ns] \"ยะโฮ่!!\""
1011605-131 = "(หลังจากถ่ายรูปกันรัวๆ คุณครูกับซาโอริก็ใช้เวลาทำอาหารและกินอาหารด้วยกัน)"

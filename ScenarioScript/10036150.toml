[translation]
10036150-1 = "เล่นเกมตามสไตล์สควอด 3"
10036150-3 = "คุณพระ! ระดับกลางก็ผ่านได้อย่างไร้ที่ติเลยนะครับ!"
10036150-4 = "เข้าใกล้ของรางวัลมากขึ้นเรื่อยๆ แล้วนะครับ!"
10036150-5 = "ฮึ่ม รู้สึกคุ้นเคยกับการต่อสู้แบบนี้แล้วแฮะ"
10036150-6 = "แต่ต่อไปคือเกมสุดท้ายแล้วนะ"
10036150-7 = "น่าเสียดายอยู่นะ เล่นจบแล้วขอเล่นอีกรอบได้มั้ย?"
10036150-8 = "ต้องขออภัยด้วยครับ เราให้เล่นได้แค่คนละรอบเท่านั้นครับ!"
10036150-9 = "เพราะถ้ามาเล่นหลายๆ รอบ เดี๋ยวก็ได้รับของรางวัลไปพอดีสิครับ~"
10036150-11 = "ถ้างั้นเกมนี้ก็จะเป็นตัวตัดสินสินะว่าเราจะได้ของรางวัลกันหรือเปล่า"
10036150-12 = "แบบนี้ก็ค่อยเข้าใจง่ายหน่อย"
10036150-13 = "งั้นก็ไปลุยกันเลยมั้ย?"
10036150-20 = "เอ๋ ซัตจัง? เป็นอะไรไปเหรอ? ทำไมทำหน้าหมองแบบนั้นล่ะ... "
10036150-24 = "หรือว่า... รู้สึกไม่สบายตรงไหนหรือเปล่า?"
10036150-25 = "มะ... ไม่มีอะไรหรอก "
10036150-26 = "ก็แค่... พอบอกว่านี่เป็นเกมสุดท้าย ฉันก็เลยเสียดายขึ้นมาน่ะ"
10036150-27 = "นั่นสินะ นี่เป็นครั้งแรกเลยนะที่พวกเรา 4 คนได้มาเล่นเกมด้วยกัน"
10036150-29 = "จริงด้วยค่ะ..."
10036150-30 = "..."
10036150-31 = "ฮุฮุ ถ้างั้นก็ต้องสนุกให้เต็มที่เลยสิ จะได้ไม่เสียใจภายหลังไง?"
10036150-35 = "จะได้ไม่เสียใจภายหลัง... นั่นสินะ"
10036150-36 = "ค่ำคืนนี้จะไม่หวนกลับมาอีกแล้ว งั้นเราต้องสนุกให้เต็มที่เลย"
10036150-38 = "ทุกคนพร้อมแล้วใช่มั้ย?"
10036150-39 = "นี่เป็นเกมสุดท้ายแล้ว ไปคว้านิตยสารให้ฮิโยริกัน!"
10036150-40 = "อื้ม!"
10036150-41 = "ถ้ามาถึงขนาดนี้แล้ว ก็ต้องเออออไปด้วยละนะ..."
10036150-42 = "แหะ แหะๆ ขอบคุณนะคะทุกคน..."
10036150-46 = "แต่ว่าของรางวัลน่ะ..."
10036150-47 = "ครับ! เราไม่ยอมให้ของรางวัลไปง่ายๆ หรอกนะครับ!"
10036150-48 = "เชิญพบกับเกมระดับยากที่เป็นด่านสุดท้ายของเราเลยครับ!"
10036150-49 = "มาลุ้นกันครับว่าผู้เข้าแข่งขันจะได้ของรางวัลที่ต้องการไปครอง!"
10036150-50 = "หรือต้องตกรอบไปอย่างน่าเสียดายกันแน่!"
10036150-52 = "เอาละ เริ่มเกมได้ครับ!"

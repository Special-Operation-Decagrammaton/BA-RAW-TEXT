[translation]
10036150-1 = "How the Squad Enjoys the Game 3"
10036150-3 = "My goodness! You nailed the intermediate stage, too!"
10036150-4 = "You're close to winning the prize!"
10036150-5 = "I think I'm getting the hang of this."
10036150-6 = "I'm sure they've saved the greatest challenge for last, though."
10036150-7 = "Which raises the question: can we play again after this?"
10036150-8 = "Sorry, one try per customer."
10036150-9 = "If we let everybody keep trying, we'd be all out of prizes by now."
10036150-11 = "So this is the \"make or break\" round."
10036150-12 = "Well, at least it's straightforward."
10036150-13 = "Shall we?"
10036150-20 = "...Hmm, Sao-Sao? What's wrong? You look gloomy... "
10036150-24 = "Are you feeling sick, by any chance?"
10036150-25 = "I-It's nothing. "
10036150-26 = "I only wish we could keep on playing like this."
10036150-27 = "Well, it has been quite some time since we all had this much fun together."
10036150-29 = "Yeah..."
10036150-30 = "..."
10036150-31 = "...Heehee, which means we should have even more fun tonight! That way, there are no regrets."
10036150-35 = "No regrets... All right."
10036150-36 = "This night's only happening once. Let's enjoy it all we can."
10036150-38 = "Is everyone ready?"
10036150-39 = "Let's win this last round and take the prize for Hiyori!"
10036150-40 = "Yeah!"
10036150-41 = "I guess I should play along. We've come this far..."
10036150-42 = "H-Heehee, thank you, everyone..."
10036150-46 = "Although we haven't won yet..."
10036150-47 = "That's right, and it won't be easy!"
10036150-48 = "This is the advanced stage, the final round!"
10036150-49 = "Will our contestants win that prize they're after?"
10036150-50 = "Or will it all end in a loss?"
10036150-52 = "Let's find out!"

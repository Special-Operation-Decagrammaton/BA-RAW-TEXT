[translation]
10036150-1 = "小隊享受遊戲的方法（３）"
10036150-3 = "居然！連中級也順利通過了！"
10036150-4 = "各位離獲得獎品越來越近囉！"
10036150-5 = "嗯，感覺慢慢習慣這種戰鬥方式了。"
10036150-6 = "但接下來就是最後一局了。"
10036150-7 = "總覺得有點可惜。#n結束之後還能再玩一次嗎？"
10036150-8 = "非常抱歉，每位參賽者都只有一次機會！"
10036150-9 = "畢竟如果能重複嘗試的話，不管是誰都遲早能贏得獎品的～"
10036150-11 = "也就是說，這局遊戲就會決定我們能不能贏得獎品。"
10036150-12 = "很簡單明瞭，真不錯。"
10036150-13 = "那麼就開始吧？"
10036150-20 = "……咦，沙醬？你怎麼了？#n臉色好像不是很好……"
10036150-24 = "……哪裡不舒服嗎？"
10036150-25 = "我，我沒事。"
10036150-26 = "只是……聽到這是最後一次，覺得有點不捨而已。"
10036150-27 = "說的也是。#n這是我們第一次四個人一起玩遊戲呢。"
10036150-29 = "就是說呀……"
10036150-30 = "……"
10036150-31 = "……呵呵，所以才更要盡情地玩，不留下遺憾對吧？"
10036150-35 = "不留遺憾啊……這麼說也對。"
10036150-36 = "今晚不會再來，所以要盡情享受。"
10036150-38 = "大家都準備好了嗎？"
10036150-39 = "一定要贏下這最後一局，為日和贏得獎品！"
10036150-40 = "啊啊！"
10036150-41 = "都走到這一步了，我就奉陪到最後吧……"
10036150-42 = "耶，耶嘿嘿，謝謝你們……"
10036150-46 = "不過獎品……"
10036150-47 = "沒錯！獎品可沒有那麼容易就能拿到哦！"
10036150-48 = "接下來就是我們準備的最終關卡──高級難度！"
10036150-49 = "各位是能獲得想要的獎品──"
10036150-50 = "還是會在這裡遺憾落敗呢！"
10036150-52 = "來，開始遊戲吧！"

[translation]
2000920-1 = "ผู้ช่วยอาบน้ำ"
2000920-3 = "(คุณครูมาที่ออนเซ็นตามที่เชริโน่บอกมาทางข้อความ)"
2000920-6 = "(และสิ่งที่เจอตรงทางเข้าออนเซ็น...)"
2000920-7 = "เชิญเลยสหาย! "
2000920-8 = "แล้วก็... อื้ม สหายดูด้วยตัวเองดีกว่า"
2000920-13 = "[ns] \"นี่มัน... ตุ๊กตาเป็ด?\""
2000920-14 = "ตุ๊กตาเป็ดที่ไหนเล่า! ตรงนี้มีชื่อที่ดีกว่านั้นติดอยู่ด้วยนี่ไง!"
2000920-15 = "<รับเบอร์ดั๊ก> ยังไงล่ะ!"
2000920-16 = "[s] \"เจ้านี่มีหนวดติดอยู่ด้วยแฮะ...?\""
2000920-17 = "อืม ก็ใช่น่ะสิ... ถ้าจะให้เล่าละเอียดๆ ละก็ เรื่องมันก็ยาวมากเลย..."
2000920-23 = "เอาเป็นว่ามันก็กลายมาเป็นแบบนี้นั่นแหละ"
2000920-24 = "[s1] \"คอมพิวเตอร์ที่ประมวลผลด้วยลายมือทำงานผิดพลาด...\"\n[s2] \"ทางสำนักเลขาธิการก็เลยมีเจ้ารับเบอร์ดั๊กอยู่เยอะมาก...\""
2000920-25 = "ใช่แล้ว เพราะงั้นเราเลยจะกวาดล้างพวกสำนักทะเบียนข้อมูลให้สิ้นซาก แต่โทโมเอะก็บอกว่า#nเจ้ารับเบอร์ดั๊กนี่มันน่ารักเหมือนกับเรา-"
2000920-26 = "ใช่แล้ว เพราะงั้นเราเลยจะกวาดล้างพวกสำนักทะเบียนข้อมูลให้สิ้นซาก แต่โทโมเอะก็บอกว่า#nเจ้ารับเบอร์ดั๊กนี่มันน่ารักเหมือนกับเรา-"
2000920-27 = "ไม่สิ โทโมเอะบอกว่าดูน่าเกรงขามเหมือนกับเรา แล้วก็เสนอว่าให้เอาหนวดมาติดแล้วใช้เป็นของที่ระลึก#nแทนน่ะ"
2000920-28 = "ไม่รู้เพราะอะไร เจ้านี่จู่ๆ ก็เป็นที่นิยมแล้วก็ขายดีมากๆ พอที่จะชดเชยความเสียหายที่เจ้าพวกสำนัก#nทะเบียนข้อมูลก่อเอาไว้ได้..."
2000920-29 = "[s] \"มีอะไรไม่ถูกใจรึเปล่า?\""
2000920-30 = "อืม ก็เรื่องนั้นแหละ"
2000920-31 = "เราสงสัยว่าการเอาหนวดที่เป็นสัญลักษณ์ของอำนาจของเรา ไปติดไว้ที่เป็ดยางง่อยๆ ที่ทำอะไรไม่ได้#nนอกจากลอยอยู่บนน้ำแบบนี้มันดีจริงรึเปล่า..."
2000920-32 = "[s] \"แค่มันดูน่ารักก็พอแล้วไม่ใช่เหรอ?\""
2000920-33 = "แค่น่ารักน่ะไม่พอหรอกนะ! หนวดของสหภาพเรดวินเทอร์น่ะ ไม่ได้มอบให้ใครได้ซี๊ซั๊วหรอกรู้มั้ย!"
2000920-34 = "หนวดเป็นสัญลักษณ์แห่งอำนาจมาช้านาน... เปรียบเสมือนเหรียญตราที่มอบให้กับผู้ที่สั่งสม และขัดเกลาประสบการณ์มาอย่างยาวนาน"
2000920-35 = "เพราะงั้นจะคิดว่ามันเป็นหนึ่งในเหรียญตราเลยก็ยังได้!"
2000920-36 = "แต่ดันมาติดหนวดให้กับเจ้าเป็ดยางหน้าตาเซ่อซ่านี่ซะได้... ต่อให้เกี่ยวพันกับเรื่องสภาพคล่องของ#nสหภาพเรดวินเทอร์ก็เถอะ แต่มันเป็นเรื่องที่เรายอมรับไม่ได้!"
2000920-37 = "[s3] \"เอาละๆ ตอนนี้ใจเย็นๆ ก่อนเถอะ\"\n[s4] \"ถ้าขัดใจขนาดนั้นละก็ ลองไปแช่น้ำกับเจ้าเป็ดดูหน่อยมั้ย?\""
2000920-42 = "อืม... รู้สึกเป็นข้อเสนอที่ไม่ค่อยน่าเชื่อถือเท่าไรเลย"
2000920-43 = "แต่ว่าสหายเสนอมาทั้งที ก็คงจะมองข้ามไปไม่ได้ "
2000920-44 = "ดีละ เอาอย่างนั้นก็ได้ แต่ว่าถ้าเจ้ารับเบอร์ดั๊กนั่นไม่ได้มีคุณค่าขนาดนั้นละก็..."
2000920-48 = "เราจะกวาดล้างเจ้ารับเบอร์ดั๊กไปพร้อมๆ กับเจ้าพวกสำนักทะเบียนข้อมูลเลย!"
2000920-52 = "ฮู่ว..."
2000920-53 = "ช่วงนี้รู้สึกเหมือนว่าการแช่ออนเซ็นมันดีขึ้นทีละนิดๆ เลยนะ"
2000920-54 = "ช่วยทำให้ลืมภาระงานหนักต่างๆ และดื่มด่ำกับความสงบสุขได้แบบนี้... เราชอบจริงๆ เลย..."
2000920-55 = "แต่ว่าเรายังไม่ค่อยเข้าใจเท่าไรว่าเจ้ารับเบอร์ดั๊กนี่มีประโยชน์อะไรกับออนเซ็น..."
2000920-56 = "....."
2000920-61 = "ส่ายไป... ส่ายมา... โยกไป... โยกมา..."
2000920-66 = "ฮึ่ม... "
2000920-67 = "นี่ รับเบอร์ดั๊ก โยกไปโยกมาแบบนั้นไม่เป็นไรแน่เหรอ?"
2000920-68 = "จากที่เราเห็น ทำแบบนั้นมันน่าจะเวียนหัวน่าดูเลยนะ ไม่เป็นไรจริงๆ เหรอ?"
2000920-73 = "หืม? ได้รับหนวดที่เป็นสัญลักษณ์แห่งอำนาจและความองอาจของท่านเชริโน่ผู้นี้ไปแล้ว แค่โยกไปโยกมาเท่านี้ไม่เวียนหัวหรอกงั้นเหรอ?"
2000920-74 = "ฮิฮิ... ฮิฮิฮิ..."
2000920-76 = "เราถูกใจความกล้าหาญของเจ้าจริงๆ! เราจะมอบเหรียญตรากล้าหาญขั้นที่ 3 ให้เป็นพิเศษ!"
2000920-80 = "[ns] \"ชอบเจ้ารับเบอร์ดั๊กเหรอ?\""
2000920-84 = "ทะ... ทำอะไรน่ะสหาย!"
2000920-85 = "ถ้าจะเข้ามาในบ่อออนเซ็นที่คนอื่นกำลังแช่อยู่ อย่างน้อยก็ควรให้สุ้มให้เสียงบ้างสิ ส่งเสียงมาก่อนสิ!"
2000920-86 = "[s5] \"โทษทีๆ ครูไม่ได้คิดจะขัดจังหวะเล่นสนุกเลย\"\n[s6] \"ครูเห็นเชริโน่กำลังเล่นสนุกอยู่ก็เลยเข้ามา...\""
2000920-87 = "เล่นสนุก? กับเจ้ารับเบอร์ดั๊กนี่น่ะเหรอ?"
2000920-88 = "เล่นสนุก? กับเจ้ารับเบอร์ดั๊กนี่น่ะเหรอ?"
2000920-89 = "เราไม่ใช่เด็กๆ สักหน่อย! "
2000920-90 = "เรื่องที่เราเล่นสนุกและคุยกับเจ้ารับเบอร์ดั๊กอยู่คนเดียวเนี่ย มันไม่เคยเกิดขึ้นเลยต่างหาก!"
2000920-91 = "[s7] \"อื้อ เอาตามนั้นก็ได้!\"\n[s8] (ไม่พูดดีกว่าว่าเห็นทุกอย่างหมดแล้ว...)"
2000920-92 = "แต่ว่าเจ้ารับเบอร์ดั๊กหนวดนี่... ก็ไม่ได้แย่เท่าไรหรอกนะ"
2000920-93 = "แต่ว่าเจ้ารับเบอร์ดั๊กหนวดนี่... ก็ไม่ได้แย่เท่าไรหรอกนะ"
2000920-94 = "เจ้ารับเบอร์ดั๊กนี่กล้าหาญพอที่จะให้อยู่ดูแลเราระหว่างที่แช่น้ำได้"
2000920-99 = "เราตัดสินใจแล้ว! เราจะมอบตำแหน่งผู้รับผิดชอบการอาบน้ำให้กับเจ้ารับเบอร์ดั๊ก!"
2000920-100 = "ผู้รับผิดชอบการอาบน้ำน่ะ จะต้องมาเป็นผู้ช่วยและคอยดูแลเราตอนที่อาบน้ำทุกครั้ง!"
2000920-101 = "เราจะยอมมองข้ามความผิดพลาดของพวกสำนักทะเบียนข้อมูลไปก็แล้วกัน"
2000920-106 = "แบบนั้นดีมั้ย? ผู้ช่วยอาบน้ำ?"
2000920-108 = "(จากนั้นเชริโน่ก็แช่ออนเซ็นอย่างสนุกสนานกับเจ้ารับเบอร์ดั๊ก...)"

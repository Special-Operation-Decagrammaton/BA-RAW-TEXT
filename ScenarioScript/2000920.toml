[translation]
2000920-1 = "Bath Assistant"
2000920-3 = "I was summoned by Cherino, and went to the hot springs resort where she was staying."
2000920-6 = "And what greeted me at the entrance was..."
2000920-7 = "Welcome, Comrade! "
2000920-8 = "And...um... Look at this."
2000920-13 = "[ns] \"Is that...a toy duck?\""
2000920-14 = "A toy duck?! How could you! It has an official name!"
2000920-15 = "It's called a rubber ducky!"
2000920-16 = "[s] \"So... Why does it have a mustache?\""
2000920-17 = "Umm, well... It's a rather long story..."
2000920-23 = "...So, that's the whole of it."
2000920-24 = "[s1] \"Red Winter Academy, which relies on handwritten records, had a computer error...\"\n[s2] \"The Secretariat was stuck with a huge supply of rubber ducks...\""
2000920-25 = "Tomoe interrupted me just as I was about to purge the Computer Science Bureau. She said that this rubber ducky looked as cute as me."
2000920-26 = "Tomoe interrupted me just as I was about to purge the Computer Science Bureau. She said that this rubber ducky looked as cute as me."
2000920-27 = "...I-I mean, as dignified as me, of course. So she suggested putting a mustache on it to make it into a souvenir."
2000920-28 = "Somehow, it became quite popular! It sold well enough to recoup all the damage caused by the computer's perfidy. But..."
2000920-29 = "[s] \"Are you unhappy about something?\""
2000920-30 = "Umm... It's just..."
2000920-31 = "All the rubber ducky does is float around! Nothing else! I've been second guessing... Is it really worthy of a mustache? It's the symbol of authority, after all."
2000920-32 = "[s] \"It's cute, so...it's probably fine?\""
2000920-33 = "Being cute is not enough! The Red Winter Academy mustache isn't given to just anyone!"
2000920-34 = "It's a symbol of authority earned from experience. Think of it like a medal given to elders who have honed their skills over a lifetime."
2000920-35 = "In fact, it's practically a medal itself!"
2000920-36 = "So giving this mustache to such a dumb-looking duck is...is unacceptable! Even if it does help Red Winter Academy's finances!"
2000920-37 = "[s3] \"Okay, okay. Calm down.\"\n[s4] \"If you're that hung up on it, why don't you take a bath with it? Try it for yourself.\""
2000920-42 = "Hmm... That doesn't seem like it would solve the problem..."
2000920-43 = "But since you suggested it, I suppose I should try. "
2000920-44 = "Okay, I'll do that. But if I find no merit in this rubber ducky..."
2000920-48 = "I'm going to purge every single rubber ducky along with the Computer Science Bureau students!"
2000920-52 = "*sigh*"
2000920-53 = "Lately, I've learned to enjoy the hot springs more and more."
2000920-54 = "Just sinking in... Knowing I'm at leisure to forget my heavy workload..."
2000920-55 = "But what value could a rubber ducky add to a hot springs bath?"
2000920-56 = "..."
2000920-61 = "Waddle, waddle... Wobble, wobble..."
2000920-66 = "Hmm..."
2000920-67 = "Hey, rubber ducky. Why so shaky?"
2000920-68 = "It seems as if you're having a dizzy spell. Are you okay?"
2000920-73 = "Oh? You say that with the help of a mustache, the symbol of my authority and honor, you can overcome this?"
2000920-74 = "Heeheehee."
2000920-76 = "I like your bravery! Ducky, I hereby grant you the Bronze Medal of Valor!"
2000920-80 = "[ns] \"So how do you like the rubber duck?\""
2000920-84 = "Wh-What are you doing, Comrade?!"
2000920-85 = "If someone's taking a bath, you should knock before you enter!"
2000920-86 = "[s5] \"Sorry, I didn't mean to interrupt.\"\n[s6] \"I had a feeling you were having fun...\""
2000920-87 = "Having fun? With a rubber ducky?"
2000920-88 = "Having fun? With a rubber ducky?"
2000920-89 = "Please! I'm not a child! "
2000920-90 = "It's not like I was in here talking to this mustachioed rubber ducky and giggling away!"
2000920-91 = "[s7] \"Okay! I get it!\"\n[s8] \"(I shouldn't tell her that I saw everything...)\""
2000920-92 = "But the rubber ducky in question...isn't so bad after all."
2000920-93 = "But the rubber ducky in question...isn't so bad after all."
2000920-94 = "After all, it's brave enough to assist me as I bathe."
2000920-99 = "I've decided! I hereby grant the position of Bath Assistant to this rubber ducky!"
2000920-100 = "From now on, the Bath Assistant will always aid me when I take a bath!"
2000920-101 = "I suppose I'll have to let go of the Computer Science Bureau's error. This time."
2000920-106 = "Do you agree, Bath Assistant?"
2000920-108 = "Cherino enjoyed a long bath with the rubber duck."

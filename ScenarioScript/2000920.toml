[translation]
2000920-1 = "洗澡輔佐官"
2000920-3 = "（接到潔莉諾的訊息後，前往了溫泉浴場）"
2000920-6 = "（就在那時，站在溫泉浴場入口的是……）"
2000920-7 = "終於來了呀，同志！"
2000920-8 = "那麼……看看這個吧。"
2000920-13 = "[ns]「這是……鴨子玩具？」"
2000920-14 = "哼哼，太天真了同志！這傢伙可是有更適合它的名字啊！"
2000920-15 = "沒錯，就是「橡膠小鴨」！"
2000920-16 = "[s]「這，這樣啊……咦，貼著鬍子呢。」"
2000920-17 = "唔呣，雖然說明起來會有點長……"
2000920-23 = "事情就是這樣！！"
2000920-24 = "[s1]「也就是說，因為還在使用手寫的訂單所以弄錯了位數……」\n[s2]「導致事務局突然產生了大量的橡膠小鴨庫存……」"
2000920-25 = "就在咱打算肅清電算局的那些傢伙的時候，智惠看著這些橡膠小鴨說「像潔莉諾大人一樣可愛──"
2000920-26 = "就在咱打算肅清電算局的那些傢伙的時候，智惠看著這些橡膠小鴨說「像潔莉諾大人一樣可愛──"
2000920-27 = "……不對，是說「散發滿滿的威嚴」才對。#n因此便提議要替它們貼上鬍子，並且當成紀念品販售。"
2000920-28 = "雖然咱也是半信半疑，不過似乎賣得不錯。因電算局的失誤而造成的損失也補了回來，可是……"
2000920-29 = "[s]「聽起來好像已經圓滿落幕了啊……？」"
2000920-30 = "唔呣，該怎麼說呢……"
2000920-31 = "在這些除了能浮在水面上以外根本沒有用的橡膠小鴨上，加上象徵權威的鬍子真的好嗎……"
2000920-32 = "[s]「……反正很可愛，沒什麼不好吧？」"
2000920-33 = "只有可愛是不行的！赤冬聯邦學園的鬍子可不能這麼簡單就賜給它！"
2000920-34 = "所謂的鬍子，可是歲月所賜予的權威的象徵。簡單來說，就像是經歷過無數經驗洗禮的成年人才會被授予的勳章一樣的東西。"
2000920-35 = "也就是說，鬍子就是勳章！"
2000920-36 = "可是，現在居然要在這些傻呼呼的鴨子上加上鬍子……就算對財政有所幫助，咱也無法接受！"
2000920-37 = "[s3]「先，先冷靜一下……」\n[s4]「總之，要不要先泡個溫泉冷靜一下？」"
2000920-42 = "唔……"
2000920-43 = "似乎也有點道理……"
2000920-44 = "好吧……不過，要是在泡完溫泉後，咱還是沒有辦法感受到橡膠小鴨的價值的話……"
2000920-48 = "就連同電算局的學生們一起，對這些橡膠小鴨進行肅清！"
2000920-52 = "哈啊……"
2000920-53 = "最近好像漸漸覺得泡溫泉是件不錯的事了……"
2000920-54 = "能夠忘卻繁忙的工作，悠閒度過的時光……"
2000920-55 = "不過，這個橡膠小鴨好像……"
2000920-56 = "……"
2000920-61 = "晃來，晃去……晃來，晃去……"
2000920-66 = "……哦。"
2000920-67 = "……喂，橡膠小鴨，這樣晃來晃去的，還好嗎？"
2000920-68 = "看你這個樣子，難道是泡到頭暈了嗎？"
2000920-73 = "原來如此……因為獲得了象徵潔莉諾大人權威及榮耀的鬍子，所以這點小事根本不算什麼啊！"
2000920-74 = "呵呵，呵呵呵……！"
2000920-76 = "這份骨氣，咱很喜歡！#n特別授予你三級英勇勳章！"
2000920-80 = "[ns]「看來似乎很喜歡呢？」"
2000920-84 = "你在說什麼啊，同志！"
2000920-85 = "竟然偷偷摸摸地跑到溫泉裡來，想做什麼！"
2000920-86 = "[s5]「抱歉，我不是有意要打擾你的。」\n[s6]「因為聽到了好像玩得很開心的聲音。」"
2000920-87 = "玩，玩得很開心……？"
2000920-88 = "玩，玩得很開心……？"
2000920-89 = "咱，咱可不是那種小孩子！"
2000920-90 = "絕對不會對著橡膠小鴨自言自語、自己和它玩哦！"
2000920-91 = "[s7]「……這樣啊！」\n[s8]（還是別告訴她其實全都看到了吧……）"
2000920-92 = "不過，這個鬍鬚橡膠小鴨……還真不錯呢。"
2000920-93 = "不過，這個鬍鬚橡膠小鴨……還真不錯呢。"
2000920-94 = "有著能服侍咱入浴的勇氣。"
2000920-99 = "好，決定了！咱任命這隻橡膠小鴨為「洗澡輔佐官」！"
2000920-100 = "洗澡輔佐官呀，今後每當咱洗澡的時候，一定要在一旁輔佐咱哦！"
2000920-101 = "電算局的失誤就勉為其難地睜一隻眼閉一隻眼吧。"
2000920-106 = "洗澡輔佐官也是這麼想的對吧？"
2000920-108 = "（後來，潔莉諾一邊和洗澡輔佐官聊天，一邊享受了很久的溫泉）"

[translation]
84312100601-6 = "อะ... อะไรเนี่ย? ทำไมเล่นเก่งจัง ดูแล้วไม่น่าจะเล่นเก่งขนาดนี้เลยนี่!"
84312100601-7 = "อย่าพูดอะไรแบบนี้ต่อหน้ากันสิพี่ ไม่สิ จะลับหลังก็ไม่ควรพูดเหมือนกัน..."
84312100601-9 = "โจรเป็นอาชีพที่ต้องมี DEX กับ INT สูงๆ ค่ะ ถ้าจะเล่นเก่งก็ไม่แปลกหรอกค่ะ!"
84312100601-11 = "ถึงจะเป็นสิ่งที่ไม่คุ้นเคย แต่ความสามารถในการตอบสนองดีเยี่ยมเลย... นี่ไม่ใช่ความเคลื่อนไหวที่มาจากการฝึกฝนหรอก"
84312100601-12 = "กำลังแพ้อยู่แท้ๆ แต่ฉันได้รับคำชมอยู่ตลอดเลย... ความรู้สึกนี้มันแปลกๆ ชอบกลนะคะ"
84312100601-14 = "ไม่หรอก ถ้าอีกฝ่ายคือยูสึก็ช่วยไม่ได้อยู่แล้ว"
84312100601-15 = "แต่มันจริงนะคะ... ฝีมือการเล่นของคุณน่าทึ่งจนควรได้รับคำชมจริงๆ ค่ะ"
84312100601-17 = "อย่างนั้น... เหรอคะ..."

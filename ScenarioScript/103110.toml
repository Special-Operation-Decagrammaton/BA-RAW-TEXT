[translation]
103110-1 = "ตอนที่ 11;เรื่องราวเริ่มแรก"
103110-11 = "...มันเป็นความผิดของฉันเองค่ะ"
103110-16 = "การตัดสินใจของฉัน และทุกอย่างที่เกิดขึ้น มันเป็นความผิดของฉันเอง"
103110-21 = "ไม่อยากเชื่อว่าฉันต้องเจอกับผลลัพธ์แบบนี้ถึงได้มาตระหนักว่าได้สูญเสียคุณไปแล้ว..."
103110-22 = "ถึงมันจะน่าละอายใจ... แต่ก็รบกวนด้วยนะคะ"
103110-27 = "คุณครู [USERNAME]"
103110-32 = "แม้ว่าคำพูดของฉันจะถูกลืมเลือน แต่ก็คงไม่เป็นไรหรอกค่ะ"
103110-33 = "ถึงจะจำอะไรไม่ได้เลย แต่ในสถานการณ์เดียวกันที่ต้องเผชิญนี้... คุณก็คงเลือกสิ่งเดียวกับฉัน"
103110-38 = "เพราะฉะนั้น สิ่งสำคัญจึงไม่ใช่ประสบการณ์ แต่เป็นการตัดสินใจเลือก"
103110-39 = "การเลือกที่มีแต่คุณเท่านั้นที่ทำได้"
103110-44 = "ฉันเคยพูดเกี่ยวกับเรื่องคนที่จะรับผิดชอบไปแล้วสินะคะ"
103110-45 = "ตอนนั้นฉันเองก็ยังไม่ค่อยเข้าใจเท่าไหร่ แต่ตอนนี้ฉันเข้าใจแล้วละค่ะ"
103110-49 = "ความเป็นผู้ใหญ่ ความรับผิดชอบ ภาระหน้าที่ และตัวเลือกของคุณนอกเหนือจากตัวเลือกเหล่านั้น…"
103110-50 = "ฉันเข้าใจถึงนัยยะของมันแล้วค่ะ"
103110-59 = "― ......"
103110-65 = "― เพราะฉะนั้นแล้ว [wa:900]คุณครูคะ"
103110-71 = "― คุณคือผู้ใหญ่คนเดียว[wa:1800]ที่ฉันจะไว้ใจได้"
103110-77 = "― มีเพียงคุณเท่านั้นที่จะปลดปล่อยพวกเรา"
103110-82 = "― มีเพียงคุณเท่านั้นที่จะปลดปล่อยพวกเรา จากชะตากรรมที่บิดเบี้ยวนี้ได้"
103110-88 = "― คุณจะต้องค้นพบทางเลือก..."
103110-93 = "― สิ่งที่นำไปสู่ปลายทาง ณ ที่แห่งนั้นได้อย่างแน่นอนค่ะ"
103110-97 = "เพราะฉะนั้น คุณครูคะ#nได้โปรด..."
103110-101 = "สายสัมพันธ์ของคุณกับพวกเราทุกคน...."
103110-102 = "ความทรงจำทั้งหมด… วันเวลาที่มีร่วมกันของพวกเรา... ได้โปรด..."
103110-115 = "อะ... อะไรเนี่ย?!"
103110-116 = "เกิดความผิดพลาดที่ระบบวิเคราะห์พหุมิติ......!!"
103110-117 = "<สถานะการทับซ้อนตามความน่าจะเป็น> ของอุตนาพิชทิมมัน......! ไม่ตรงกับของเรือบนฟ้าค่ะ!"
103110-118 = "ว่าไงนะ?! ระบบเสียเหรอ?!"
103110-119 = "มะ... ไม่ใช่ค่ะ...... นี่มัน...... "
103110-121 = "ไม่ใช่อย่างนั้นหรอก! <เรืออะทราฮาซิส> เองต่างหากที่แปรผัน!!"
103110-130 = "ปะ... ประธานริโอะ?!"
103110-132 = "......!!"
103110-133 = "ปะ... เป็นไปไม่ได้...... ยะ... อย่าบอกนะว่า......"
103110-134 = "สถานะของ <เรืออะทราฮาซิส> เปลี่ยนไปแล้วค่ะ! มันเบี่ยงเบนออกจากค่าที่เราคำนวณไว้......?!"
103110-135 = "...... มีการสร้างแกนใหม่อะไรขึ้นมาอีกหนึ่งอย่าง ซึ่งมันก็ไม่ใช่พหุมิติที่พวกเรารู้จักด้วย"
103110-136 = "มันเหมือนกับการอธิบายมิติที่ 3 ให้กับสิ่งที่อยู่ในมิติที่ 2 ฟัง... ไม่ว่าจะอธิบายยังไงก็ไม่เข้าใจ......"
103110-137 = "วะ... ว่ายังไงนะ......"
103110-138 = "งั้นก็แปลว่า... การคำนวณเพื่อวิเคราะห์พหุมิติมันเปลี่ยนแปลงได้ตลอดเวลาเหรอคะ......?"
103110-139 = "อย่าบอกนะว่า... การวิเคราะห์ทั้งหมดของเรา......"
103110-143 = "ไม่มีความหมายเลยเหรอ...?"
103110-145 = "ตอนต่อไป;คุณสมบัติของแสง 1"

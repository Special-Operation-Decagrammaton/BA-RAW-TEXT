[translation]
103110-1 = "Episode 11;The Start of the Story"
103110-11 = "...The burden of fault lies with me."
103110-16 = "The cause and effect of my decisions."
103110-21 = "It had to come to this for me to finally realize you were right all along..."
103110-22 = "Please forgive my impudence, but I need your help."
103110-27 = "[USERNAME] Sensei."
103110-32 = "You won't remember these words, but that doesn't matter."
103110-33 = "Even without your memories, you'll probably make the same decision in the same situation..."
103110-38 = "Because what matters are the choices we make, not the experiences we've lived."
103110-39 = "There are choices only you can make."
103110-44 = "I've spoken of responsibility before."
103110-45 = "I didn't truly understand it then, but now I do."
103110-49 = "Adulthood, responsibility, obligation...and the choices you make that extend beyond those ideals."
103110-50 = "I even understand their implications."
103110-59 = "― ..."
103110-65 = "― Therefore, [wa:900]Sensei."
103110-71 = "― ...you're the only one [wa:1800]I can trust."
103110-77 = "― Only you"
103110-82 = "― Only you can free us from this twisted, distorted fate..."
103110-88 = "― Please uncover the choices that will lead us"
103110-93 = "― to a new future."
103110-97 = "So, Sensei. Please..."
103110-101 = "Your relationships with all of us..."
103110-102 = "The precious memories we've built... All those days that we spent together... Please..."
103110-115 = "Wh-What?!"
103110-116 = "Error on the multidimensional analysis system...!"
103110-117 = "The quantum superposition state of Utnapishtim...doesn't match with the Ark!"
103110-118 = "What?! Did our system break?"
103110-119 = "N-No... This is..."
103110-121 = "It's not on our end! The Ark of Atrahasis is what's off!"
103110-130 = "P-President Rio?!"
103110-132 = "...!"
103110-133 = "I-Impossible... Could it be...?"
103110-134 = "The state of the Ark of Atrahasis has changed?! It deviated from the value we calculated...?!"
103110-135 = "...It created a new axis that's not within the multidimensionality we exist within."
103110-136 = "It's similar to trying to explain 3D to a 2D being. No matter what, they'll never understand it..."
103110-137 = "S-Seriously...?"
103110-138 = "Does that mean...calculations that surpass multidimensional analysis have always been possible...? We just...can't understand it?"
103110-139 = "You mean to say...all our analysis and calculations until now were..."
103110-143 = "...Everything was futile?"
103110-145 = "Next Episode; The Right of the Light 1"

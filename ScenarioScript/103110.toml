[translation]
103110-1 = "第11話;最初的故事"
103110-11 = "……是我的失誤。"
103110-16 = "我的選擇，以及因此招致的所有情況。"
103110-21 = "最終，到達了這個結果，才領悟到你是對的……"
103110-22 = "……事到如今雖然很厚顏無恥，但是拜託你了。"
103110-27 = "[USERNAME]老師。"
103110-32 = "你或許會忘記我說的話，但那樣也沒關係。"
103110-33 = "即使什麼也想不起來，在面對相同的情況時，你也會做出相同的選擇吧……"
103110-38 = "所以……重要的不是經驗，而是選擇。"
103110-39 = "只有你才能做出的各種選擇。"
103110-44 = "關於背負責任之人的話題，有和你討論過對吧。"
103110-45 = "雖然當時的我還不清楚……不過現在能夠理解了。"
103110-49 = "身為大人的責任和義務。以及，在那條延長線上的，你的選擇。"
103110-50 = "還有它所代表的想法。"
103110-59 = "― ……"
103110-65 = "― 所以，[wa:900]老師。"
103110-71 = "― 如果是你這個我能相信的[wa:1800]大人的話，"
103110-77 = "― 與這個扭曲變形的終點，"
103110-82 = "― 與這個扭曲變形的終點，不同的結果……"
103110-88 = "― 連接那裡的選項……"
103110-93 = "― 你一定能找到的。"
103110-97 = "所以老師，請務必……"
103110-101 = "將這份羈絆──"
103110-102 = "與我們之間的回憶……一路走來的每個日子……請務必……"
103110-115 = "怎，怎麼回事！？"
103110-116 = "多次元詮釋系統發生錯誤……！！"
103110-117 = "「生命守護者」的狀態……與方舟不一致！"
103110-118 = "什麼意思！？系統故障了嗎！？"
103110-119 = "不，不是的……這是──"
103110-121 = "不！改變數值的是「阿特拉哈西斯的方舟」！！"
103110-130 = "莉，莉央會長！？"
103110-132 = "……！！"
103110-133 = "怎，怎麼會……這怎麼可能……"
103110-134 = "「阿特拉哈西斯的方舟」改變了？#n……難道，是為了逃離我們……！？"
103110-135 = "並非我們所認知的多次元……而是創造出了另一個新的軸呢。"
103110-136 = "就像對二次元的存在無法說明三次元一樣……#n它打算撤退到我們無法認知的次元吧。"
103110-137 = "怎，怎麼會……"
103110-138 = "……凌駕多次元詮釋的計算，對他來說根本不算什麼嗎……？"
103110-139 = "難道，至今為止的分析全都是──"
103110-143 = "沒有用的嗎……？"
103110-145 = "下一話;「勇者」的資格（１）"

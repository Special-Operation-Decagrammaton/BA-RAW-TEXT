[translation]
21120-1 = "第12話;「鏡」を探して"
21120-2 = "ミレニアム・ヴェリタス"
21120-3 = "依頼された「データ」について、結果が出たよ。"
21120-4 = "い、いよいよ……！"
21120-5 = "ドキドキ……。"
21120-6 = "知っての通り私たち「ヴェリタス」は、キヴォトス最高のハッカー集団だと自負してる。"
21120-7 = "システムやデータの復旧については、それこそ数えきれないほど解決をしてきた……。"
21120-8 = "その上で、単刀直入に言うね。"
21120-9 = "（ごくり……）"
21120-11 = "モモイ、あなたのゲームのセーブデータを復活させるのは無理。"
21120-13 = "うわぁぁぁぁん！もうダメだーーーー！"
21120-14 = "そっちじゃないでしょ！？G.Bibleのパスワードの解除はどうしたのさ！？"
21120-15 = "それなら、マキが作業中ですよ。"
21120-16 = "マキちゃんが？"
21120-17 = "あ、おはようミド！"
21120-18 = "来てくれたんだね、ありがと。"
21120-19 = "うぅ、私のセーブデータが、涙と汗の結晶が……！"
21120-20 = "モモはどうしてこんなに泣いてるの？"
21120-21 = "気にしないで大丈夫……それより、G.Bibleはどうだった？"
21120-22 = "うん、ちゃんと分析できたよ。あれはかの伝説のゲーム開発者が作った神ゲーマニュアル……G.Bibleで間違いないね。"
21120-23 = "や、やっぱりそうなんだ！"
21120-24 = "ファイルの作成日や最後に転送された日時、ファイル形式から考えても確実。作業者についても、噂の伝説のゲーム開発者のIPと一致してた。それと、あのデータはこれまでに一回しか転送された形跡がない。"
21120-25 = "っていうことは……。"
21120-26 = "うん、オリジナルの「G.Bible」だろうね。"
21120-28 = "す、すごい！！"
21120-29 = "でも問題があって……ファイルのパスワードについてはまだ解析できてないの。"
21120-30 = "えぇっ、じゃあ結局見られないってことじゃん！？ガッカリだよ！"
21120-31 = "うっ！だってあたしはあくまでクラッカーであって、ホワイトハッカーじゃないし……とにかく！"
21120-32 = "そうは言っても、方法が無いわけじゃない。"
21120-33 = "そうなの？"
21120-34 = "あのファイルのパスワードを直接解析するのは、多分ほぼ不可能。でも、セキュリティファイルを取り除いて丸ごとコピーするって手段なら、きっと出来るんじゃないかな……。"
21120-35 = "で、そのためにはOptimus Mirror System……通称「鏡」って呼ばれるツールが必要なの。"
21120-36 = "ぜ、全然話についていけない……。"
21120-37 = "つまり……G.Bibleを見るためには、その「鏡」っていうプログラムが必要だってことだよね？それはどこにあるの？"
21120-38 = "あたしたち、ヴェリタスが持って……た。"
21120-39 = "何だ、それなら今すぐ……ん、待って？過去形！？"
21120-40 = "……そう、今は持ってない。生徒会に押収されちゃったの、もうっ！"
21120-41 = "この間ユウカが急に押し入ってきて、「不法な用途の機器の所持は禁止」って。"
21120-43 = "「鏡」もそうですし、色々と持って行かれてしまいましたね……私の盗聴器とかも。"
21120-44 = "その「鏡」って……そんなに危険なものなの？"
21120-47 = "そんなことは無いよ。ただ暗号化されたシステムを開くのに最適化されたツールってだけ。"
21120-48 = "ただ……世界に一つしかない、私たちの部長が直々に製作したハッキングツールで。"
21120-49 = "部長っていうと……ヒマリ先輩？"
21120-50 = "ヒマリ……？"
21120-51 = "アリスちゃんはまだ会ったことないよね、ヴェリタスの部長さんなの。ちょっと体が不自由で車椅子に乗ってるから、見かけたらすぐ分かると思う。"
21120-52 = "すごい人でね。身体のことはあるけど、それであの人に同情したり軽視したりするような人は、少なくともこのミレニアムにはいない。天才……って言うのかな。ミレニアム史上、まだたった三人しか貰えてない学位、「全知」を持ってる人なの。"
21120-53 = "うん、本当にすごい……けど、それはそうとして。その先輩がせっかく作った装備を、どうして取られちゃったのさ。"
21120-54 = "……私はただ、先生のスマホのメッセージを確認したかっただけです。そのために、「鏡」が必要で……。"
21120-55 = "不純な意図は、全く無かったのですが。"
21120-56 = "私には、不純な意図しか感じられないけど……。"
21120-59 = "うわあぁん！早く「鏡」を探さないと、部長に怒られちゃう！！"
21120-60 = "とにかく……整理すると、私たちも「鏡」を取り戻したい。"
21120-61 = "それに、G.Bibleのパスワードを解くためには、あなたたちにとっても「鏡」は必要……そうでしょ？"
21120-62 = "なるほどね……呼び出された時点で、何かあるのかなとは思ってたけど。だいたい分かったよ。"
21120-63 = "え、も、もしかして……？"
21120-64 = "ふふ、さすがモモ。話が早いね。"
21120-65 = "目的地が一緒なんだし、旅は道連れってね。"
21120-66 = "共にレイドバトルを始めるのであれば、私たちはパーティーメンバーです。"
21120-67 = "あの、お姉ちゃん、もしかしてだけど……"
21120-69 = "まさかヴェリタスと組んで、生徒会を襲撃するつもりじゃ……！？"
21120-71 = "ミレニアム・屋上"
21120-72 = "……そのまさかよ。"
21120-73 = "なるほど、にわかには信じがたいお話ですね。"
21120-74 = "ゲーム開発部については、私も知らないわけではありません。"
21120-75 = "あんなに可愛らしいのに……ミレニアムの生徒会を襲撃しようだなんて、人は見かけによりませんね？"
21120-76 = "純粋な子たちよ。でもだからこそ、時にはとんでもない悪戯をしたりもする。"
21120-77 = "それに、今回はヴェリタスも絡んでるの。"
21120-78 = "ヴェリタス……あのハッキングに特化した、クラッカー集団ですよね？"
21120-79 = "ええ、そうよ。共通点は無さそうに見えるけど、大事な物のためには手段を選ばない……という点で、ゲーム開発部とよく似ているわ。"
21120-80 = "そうでしたか。まあ何であれ依頼である以上、私たちは受けるつもりでいますが……"
21120-81 = "一つだけ、ちょっとした問題があります。"
21120-83 = "ミレニアム・ヴェリタス"
21120-84 = "問題？"
21120-85 = "「鏡」は生徒会の「差押品保管所」に保管されてるんだけど。そこを守ってるのが実は……"
21120-86 = "メイド部、なんだよね。"
21120-87 = "……え？メイド部って、もしかして……"
21120-88 = "ああ、C&Cのことだよね？ミレニアムの武力集団、メイド服で優雅に相手を「清掃」しちゃうことで有名なあの……"
21120-89 = "そうそう！まあ些細な問題なんだけどさ～。"
21120-90 = "そっか～！そうだねー、うーんなるほど～……"
21120-93 = "諦めよう！！！ゲーム開発部、回れ右！前進っ！！"
21120-95 = "待って待って待って！諦めちゃダメだよモモ！G.Bibleが欲しいんでしょ！？"
21120-96 = "そりゃ欲しいよ！でもだからって、メイド部と戦うなんて冗談じゃない！"
21120-97 = "そんなの、走ってる列車に乗り込めとか、燃え盛る火山に飛び込めって言われた方がまだマシ！"
21120-98 = "で、でもこのままじゃあたし部長に怒られ……じゃなくて！ゲーム開発部も終わりだよ！このままじゃ廃部になっちゃうんでしょ！？"
21120-99 = "廃部は嫌だけど……でもこれは、話の次元が違う。"
21120-100 = "C&Cの「ご奉仕」によって壊滅させられた過激団体や武装サークルは数え切れない……知ってるでしょ？"
21120-102 = "……最後には痕跡すら残さず、綺麗に掃除される。有名な話だね。"
21120-103 = "そりゃ部活は守りたいけど、ミドリにアリス、ユズの方が圧倒的に大事！危険すぎる！"
21120-104 = "待って待って、C&Cが危険なのは分かってるって！でもあたしたちはゲヘナの風紀委員会でもなければ、トリニティの正義実現委員会でもないんだから、何も真正面から喧嘩しようってわけじゃないよ。"
21120-105 = "あたしたちの目標は「メイド部を倒す」ことじゃなくて、差押品保管所から「鏡」を取ってくることなんだから～……"
21120-106 = "そんなに変わらないじゃん！"
21120-107 = "……でも、可能性の無い話じゃない。"
21120-108 = "私の盗ちょ……情報によると、現在のメイド部は完全な状態ではありません。"
21120-109 = "えっ？"
21120-112 = "もちろん、メイド部はミレニアム最強の武力集団。"
21120-113 = "どうして「最強」と呼ばれているのか……それはもちろん、素晴らしいエージェントのメイドが揃っているからというのもあるけれど……"
21120-114 = "何よりも大きいのは、「彼女」の存在。"
21120-117 = "メイド部の部長、コールサイン・ダブルオー……ネル先輩。"
21120-119 = "そう。"
21120-121 = "けど、今彼女は……"
21120-123 = "ミレニアム・屋上"
21120-124 = "ね、ネル先輩がいない！？"
21120-125 = "はい、ミレニアムの外郭に個人的な用事があるそうでして。"
21120-126 = "ですが、ご心配なく。"
21120-127 = "厳密に言うと私たちのリーダーは、守ることより「壊すこと」に特化した人ですから。"
21120-128 = "もちろん、リーダーがいる時のC&Cが一番強い……というのは紛れもない事実です。"
21120-129 = "ただ、「守る」ことに関しては……もしかしたら、私たちだけの方が良いかもしれません。"
21120-130 = "ではあらためまして、依頼はお受けします。"
21120-132 = "約束の時間まで、ゲーム開発部を生徒会の差押品保管所に近づけないこと……お約束いたしましょう。"
21120-134 = "ミレニアム・ヴェリタス"
21120-135 = "正面衝突を避けて、「鏡」だけを奪って逃げる……うーん……。"
21120-136 = "……。"
21120-137 = "やってみよう、お姉ちゃん。"
21120-138 = "えぇっ！？でもネル先輩がいないからって、相手はあのメイド部だよ！？"
21120-139 = "分かってる、でも……このままゲーム開発部を無くすわけにはいかない。"
21120-142 = "ボロボロだし、狭いし、たまに雨漏りもするような部室だけど……"
21120-145 = "もう今は、私たちがただゲームをするだけの場所じゃない。"
21120-148 = "……みんなで一緒にいるための、大切な場所だから。"
21120-149 = "だから、少しでも可能性があるなら……私はやってみたい。"
21120-150 = "ううん、もしメイド部と対峙することになっても、それがどれだけ危険だとしても……！"
21120-152 = "守りたいの。"
21120-154 = "アリスちゃんのために、ユズちゃんのために……私たち、全員のために！"
21120-157 = "ミドリ……。"
21120-158 = "私たちならできます。"
21120-159 = "伝説の勇者は……世界の滅亡を食い止めるために、魔王を倒します。"
21120-160 = "アリスは計45個のRPGをやって……勇者たちが魔王を倒すために必要な、一番強力な力を知りました。"
21120-161 = "一番強力な力……レベルアップ？あ、装備の強化？"
21120-162 = "盗聴ですか？"
21120-163 = "EMPショックとか！？"
21120-165 = "ち、違います……。"
21120-167 = "一緒にいる、仲間です。"
21120-168 = "アリス……。"
21120-169 = "……。"
21120-170 = "うん、よし。"
21120-171 = "やろう！生徒会に潜入して、「鏡」を取り戻す！"
21120-173 = "ハレ！何か良い計画とか無い！？"
21120-174 = "任せて。"
21120-175 = "ただ、その計画を実行するためには……"
21120-176 = "いくつかの準備が必要だね。"
21120-178 = "さっき言ってた盗聴もそうだし、EMPショックもそう……それに……"
21120-179 = "あとはやっぱり……「仲間」、かな。"
21120-180 = "仲間？"
21120-181 = "（キラキラ）"
21120-182 = "でも、私たちとはそんなに親しい仲ってわけじゃないから……先生にお願いしないとね。"
21120-183 = "[s1] \"私？\"\n[s2] \"私にできることなら、任せて。\""
21120-186 = "うん。"
21120-187 = "恐らく彼女たちの力無しに、この作戦は成立しない。"
21120-189 = "なるほど、それは確かに的確な判断だ。"
21120-190 = "君の言う通り、その方法なら私たちじゃないと難しいだろうね。"
21120-191 = "うん、分かった。協力しよう。"
21120-192 = "ほ、本当に良いんですか？"
21120-193 = "エンジニア部は実績もたくさんありますし、こんな危ない橋を渡る必要は……。"
21120-194 = "そうだね、そうかもしれない。"
21120-195 = "それなのにどうして、メイド部と戦うなんていう危険な計画に乗ってくれるんですか？"
21120-196 = "それは……。"
21120-197 = "……うん、その方が面白そうだから、かな。"
21120-198 = "そうです！それに私たちも、もっと先生と仲良くなりたいですから！"
21120-202 = "そうだね、それと……"
21120-203 = "？"
21120-204 = "……？"
21120-205 = "……いや、今は良いさ。よろしく。"
21120-206 = "あ、はい。"
21120-207 = "こちらこそ、よろしくお願いします……！"
21120-209 = "ミレニアム・ヴェリタス"
21120-210 = "これで、メンバーは揃ったよね？"
21120-211 = "うん、準備も出来てる。"
21120-212 = "よしっ！"
21120-213 = "あ、そういえば、作戦はいつ始まるの？"
21120-214 = "いつ……？"
21120-217 = "もう始まってるよ。"
21120-219 = "ミレニアム・屋上"
21120-220 = "あ、一つだけ質問をしたいのですが。"
21120-222 = "ゲーム開発部とヴェリタスが生徒会を襲撃する……そのことを、あなたたちはどこから知ったのですか？"
21120-223 = "情報戦に関して、ミレニアムでヴェリタスを超える集団はいないと思っていましたが……。"
21120-224 = "……その通りよ。"
21120-225 = "だから、ヴェリタスが教えてくれた。それだけの話。"
21120-226 = "……はい？"
21120-227 = "私たちに、ヴェリタスとゲーム開発部がやって来ることを教えてくれたのは……"
21120-230 = "ヴェリタスの部長、ヒマリだもの。"
21120-232 = "次回;Nerd VS Maid"

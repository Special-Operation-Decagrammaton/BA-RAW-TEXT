[translation]
21120-1 = "第12話;尋找「鏡子」"
21120-2 = "千年．貝里塔斯"
21120-3 = "關於你們委託的「檔案」，有結果了唷。"
21120-4 = "終，終於……！"
21120-5 = "期待期待……"
21120-6 = "就像你們知道的一樣，我們「貝里塔斯」自認是奇普托斯最強的駭客集團。"
21120-7 = "對於系統和檔案的修復，已經解決過無數的問題……"
21120-8 = "在此之上，我就單刀直入地說吧。"
21120-9 = "（點頭……）"
21120-11 = "桃井，要救回你的遊戲存檔是不可能的。"
21120-13 = "嗚哇啊啊啊啊！我完蛋啦────！"
21120-14 = "重點不是這個吧！？G.Bible的密碼處理得怎麼樣了！？"
21120-15 = "這個的話，真紀正在處理唷。"
21120-16 = "真紀醬嗎？"
21120-17 = "啊，早啊小綠！"
21120-18 = "你們來了呀，真是感謝。"
21120-19 = "嗚嗚，我的存檔啊，我的汗與淚的結晶啊……！"
21120-20 = "桃桃怎麼哭成這樣？"
21120-21 = "不用在意沒關係的……比起這個，G.Bible如何？"
21120-22 = "嗯，我已經仔細分析過了唷。#n那就是傳說中的遊戲開發者製作的神作開發手冊……G.Bible沒錯。"
21120-23 = "果，果然是這樣嗎！"
21120-24 = "從文件的創建時間和最後傳送的時間，還有檔案的格式看來確實是沒錯。#n至於創建者的部分，也和那個傳說中的遊戲開發者的IP相同。#n而且，那個檔案至今為止只傳輸過一次。"
21120-25 = "也就是說……"
21120-26 = "嗯，這應該是原版的「G.Bible」沒錯。"
21120-28 = "太，太厲害了！！"
21120-29 = "但是有個問題……那就是這個文件的密碼還沒有破解完成。"
21120-30 = "咦咦，那到頭來我們還是看不了啊！？好失望！"
21120-31 = "嗚！我只不過是個黑帽駭客，又不是白帽駭客……總之！"
21120-32 = "雖然這麼說，也並不是沒有辦法。"
21120-33 = "是這樣嗎？"
21120-34 = "要直接破解那個文件的密碼幾乎是不可能的。#n但是如果是排除加密文件整個複製出來的話，應該可以辦到。"
21120-35 = "也就是說，我們需要Optimus Mirror System……這個俗稱為「鏡子」的工具。"
21120-36 = "完，完全跟不上話題……"
21120-37 = "所以說……要看到G.Bible就需要有那個叫做「鏡子」的程式對吧？#n那個程式在哪裡呢？"
21120-38 = "在我們，貝里塔斯這裡……曾經在。"
21120-39 = "什麼嘛，那就趕快拿出來……嗯？等等？曾經！？"
21120-40 = "……沒錯，現在已經不在這裡了。因為被學生會給沒收了，真是的！"
21120-41 = "之前突然被優香給沒收了，說是什麼「禁止擁有具有非法功能的機器」之類的。"
21120-43 = "除了「鏡子」之外，還有一堆東西也被拿走了……就連我的竊聽器也是。"
21120-44 = "那個「鏡子」……是這麼危險的東西嗎？"
21120-47 = "才沒有這種事呢。那只不過是個為了開啟加密系統而最佳化的工具而已。"
21120-48 = "但是……它是世上唯一一個，我們的部長親自製作的駭客工具。"
21120-49 = "你說的部長是……陽葵前輩？"
21120-50 = "陽葵……？"
21120-51 = "愛麗絲醬還沒有見過吧，是貝里塔斯的部長喔。#n因為身體有點不便所以坐著輪椅，只要看到的話應該馬上就知道了。"
21120-52 = "是個很厲害的人喔。雖然身體有狀況，但是會因此同情或是輕視她的人，#n至少在千年校內一個都沒有。天才……可以這麼說吧。#n她是擁有千年有史以來僅有三個人拿到過的學位「全知」的其中一人。"
21120-53 = "嗯，真的是很厲害……但是，就算是這樣。#n那個前輩好不容易做出來的裝備，為什麼會被沒收了呢。"
21120-54 = "……我只是，想要看一下老師手機裡的訊息而已。所以說必須要用到「鏡子」……"
21120-55 = "完全沒有任何，不純的動機。"
21120-56 = "我倒是，只感覺到不純的動機而已……"
21120-59 = "嗚哇啊啊！不趕快把「鏡子」找回來的話，部長會生氣的！！"
21120-60 = "總之……整理一下情況，我們這裡也需要奪回「鏡子」。"
21120-61 = "而且，要解開G.Bible的密碼的話，你們也需要「鏡子」……對吧？"
21120-62 = "原來如此……從把我們叫過來的時候，我就感覺好像有什麼事了。我大概明白了。"
21120-63 = "咦？難，難道說……？"
21120-64 = "哼哼，不愧是桃桃，真好說話呢。"
21120-65 = "既然目的一樣的話，我們就是夥伴了吧。"
21120-66 = "一起開始副本戰鬥的話，我們就是隊伍的一員了。"
21120-67 = "那個，姐姐，難道說……"
21120-69 = "你是想要和貝里塔斯聯手，一起襲擊學生會的意思嗎……！？"
21120-71 = "千年．屋頂"
21120-72 = "……就是這個意思。"
21120-73 = "原來如此，乍聽之下有點難相信呢。"
21120-74 = "關於遊戲開發部的事，我也並不是不清楚。"
21120-75 = "明明那麼可愛的說……居然會想要襲擊千年的學生會，真是人不可貌相呢？"
21120-76 = "是很單純的孩子們唷。但是正因為如此，有時會開一些不得了的玩笑呢。"
21120-77 = "況且，這次還是和貝里塔斯聯手了。"
21120-78 = "貝里塔斯……是那個專精於入侵各種系統的駭客集團對吧？"
21120-79 = "沒錯，就是這樣。雖然看起來沒什麼共通點，#n但是為了遠大的目標就必須不擇手段……從這點來看，或許跟遊戲開發部很像呢。"
21120-80 = "原來是這樣啊。不論如何只要是委託的話，我們也是打算要接受的……"
21120-81 = "但是有一個小小的問題。"
21120-83 = "千年．貝里塔斯"
21120-84 = "問題？"
21120-85 = "「鏡子」就被保存在學生會的「扣押品保管所」裡。#n而負責保護那個地方的其實是……"
21120-86 = "是女僕部唷。"
21120-87 = "……咦？你說女僕部，難道是……"
21120-88 = "啊啊，你說的是C&C對吧？#n千年的武裝集團，以穿著女僕服優雅地「清掃」對手而聞名的那個……"
21120-89 = "沒錯沒錯！哎呀就是這個小問題啦～"
21120-90 = "原來是這樣啊！也對，嗯，我懂了～……"
21120-93 = "放棄吧！！！遊戲開發部，向右～轉！齊步～走！！"
21120-95 = "等等等等等等！別放棄啊桃桃！你不是想要G.Bible嗎！？"
21120-96 = "當然是想要啦！但是就算如此，要跟女僕部戰鬥什麼的別開玩笑了！"
21120-97 = "比起做那種事，我還寧願去登上行進中的火車，或是飛越噴發中的火山咧！"
21120-98 = "但，但是就這樣下去的話我會被部長罵……不對！#n遊戲開發部會完蛋的唷！再這樣下去的話會被廢社的吧！？"
21120-99 = "雖然不想被廢社……但是這是不同次元的事。"
21120-100 = "因為C&C的「侍奉」而消滅的激進團體和武裝集團不計其數……你也知道的吧？"
21120-102 = "……最終連痕跡也不剩，被清掃得一乾二淨。很有名的。"
21120-103 = "雖然說想要保護社團，但是綠、愛麗絲和柚子更壓倒性地重要！太危險了！"
21120-104 = "等一下等一下，C&C很危險我也知道！但我們既不是格黑娜的風紀委員會，#n也不是三一的實現正義部，沒必要和他們正面起衝突。"
21120-105 = "我們的目標並不是「打倒女僕部」，#n只是要從扣押品保管所裡把「鏡子」拿回來而已嘛～……"
21120-106 = "那不是一樣嗎！"
21120-107 = "……但，並不是不可能的。"
21120-108 = "從我偷……接收到的情報來看，現在的女僕部並不處於完整的狀態。"
21120-109 = "嗯？"
21120-112 = "當然，女僕部是千年最強的武裝集團。"
21120-113 = "至於為何會被稱為「最強」……聚集著一群優秀的特務女僕們是原因之一……"
21120-114 = "但最重要的是，有「她」的存在。"
21120-117 = "女僕部的部長，代號Double O的……寧瑠前輩。"
21120-119 = "沒錯。"
21120-121 = "但是，現在的她……"
21120-123 = "千年．屋頂"
21120-124 = "寧，寧瑠前輩不在！？"
21120-125 = "是的，好像在千年的郊外有些私事要處理的樣子。"
21120-126 = "但是，請不用擔心。"
21120-127 = "嚴格來說我們的隊長，比起保護東西，更像是專精於「破壞」的人。"
21120-128 = "當然，有隊長在的C&C是最強的……這是毋庸質疑的事實。"
21120-129 = "但是，如果是說要「保護」什麼的話……也許只有我們在會更好也說不定。"
21120-130 = "那麼就再確認一次，我們接受這次的委託。"
21120-132 = "直到約定的時間為止，不讓遊戲開發部接近學生會的扣押品保管所……#n就這麼跟您約定吧。"
21120-134 = "千年．貝里塔斯"
21120-135 = "避開正面衝突，只搶走「鏡子」就逃走……唔嗯……"
21120-136 = "……"
21120-137 = "我們試試看吧，姐姐。"
21120-138 = "咦咦！？但是就算寧瑠前輩不在，對手可是那個女僕部喔！？"
21120-139 = "我知道，但是……也不能就這樣放棄遊戲開發部。"
21120-142 = "雖然是個又破又窄，偶爾還會漏水的活動室……"
21120-145 = "現在已經不再只是我們玩遊戲的地方而已了。"
21120-148 = "……是為了讓大家在一起的，重要的地方。"
21120-149 = "所以，就算只有些許的可能性……我也想試試看。"
21120-150 = "不，就算變得要和女僕部對峙，就算再怎麼危險……！"
21120-152 = "我也想要保護。"
21120-154 = "為了愛麗絲醬，為了柚子醬……為了，我們所有人！"
21120-157 = "綠……"
21120-158 = "我們一定沒問題的。"
21120-159 = "傳說中的勇者……將會為了防止世界的滅亡而打倒魔王的。"
21120-160 = "愛麗絲玩過一共45個RPG……#n所以知道勇者要打敗魔王所需要的，最厲害的力量是什麼。"
21120-161 = "最厲害的力量……是升級嗎？啊，還是強化裝備？"
21120-162 = "是竊聽嗎？"
21120-163 = "是EMP衝擊之類的嗎！？"
21120-165 = "不，不是……"
21120-167 = "是一起行動的，夥伴們。"
21120-168 = "愛麗絲……"
21120-169 = "……"
21120-170 = "嗯，好吧。"
21120-171 = "我們上吧！潛入學生會，奪回「鏡子」！"
21120-173 = "晴！你有沒有什麼好的計畫！？"
21120-174 = "交給我吧。"
21120-175 = "但是，要執行這個計畫就需要……"
21120-176 = "進行一些準備才行。"
21120-178 = "除了剛才你們聽到的竊聽、EMP衝擊之外，還有……"
21120-179 = "果然是需要……「夥伴」吧。"
21120-180 = "夥伴？"
21120-181 = "（閃亮亮）"
21120-182 = "但是，他和我們並不是那麼親近……所以要拜託老師了。"
21120-183 = "[s1] 「我？」\n[s2] 「如果我能辦到的話就交給我吧。」"
21120-186 = "嗯。"
21120-187 = "沒有他們的協助的話，恐怕這個作戰是無法成立的。"
21120-189 = "原來如此，那是很正確的判斷呢。"
21120-190 = "就像你說的一樣，這個方法如果沒有我們在的話是很難辦到的吧。"
21120-191 = "嗯，我知道了。就協助你們吧。"
21120-192 = "真，真的可以嗎？"
21120-193 = "工程師部有很多的實績，明明沒有必要一起冒險的……"
21120-194 = "也對，這麼說也沒錯。"
21120-195 = "既然這樣為什麼，要加入和女僕部戰鬥這麼危險的計劃呢？"
21120-196 = "那是因為……"
21120-197 = "……嗯，因為這樣比較有趣，吧。"
21120-198 = "沒錯！而且我們也想要和老師打好關係嘛！"
21120-202 = "是呢，而且……"
21120-203 = "？"
21120-204 = "……？"
21120-205 = "……不，就先這樣吧。請多指教。"
21120-206 = "啊，是！"
21120-207 = "我們才是，請你們多多指教……！"
21120-209 = "千年．貝里塔斯"
21120-210 = "這樣大家都到齊了吧？"
21120-211 = "嗯，也已經準備好了。"
21120-212 = "好！"
21120-213 = "啊，這麼說來，作戰什麼時候開始呢？"
21120-214 = "什麼時候……？"
21120-217 = "已經開始了唷。"
21120-219 = "千年．屋頂"
21120-220 = "啊，我有個問題想問。"
21120-222 = "遊戲開發部和貝里塔斯會襲擊學生會……這件事是從哪裡得知的呢？"
21120-223 = "說到情報戰的話，在千年應該沒有比貝里塔斯還厲害的集團才對……"
21120-224 = "……你說的沒錯。"
21120-225 = "所以說，是貝里塔斯告訴我的。就是這樣。"
21120-226 = "……嗯？"
21120-227 = "告訴我們貝里塔斯和遊戲開發部會過來的就是……"
21120-230 = "貝里塔斯的部長，陽葵嘛。"
21120-232 = "下一話;Nerd VS Maid"

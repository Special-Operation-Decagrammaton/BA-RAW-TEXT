[translation]
21120-1 = "ตอนที่ 12;ค้นหา 'กระจก'"
21120-2 = "เวอริทัส มิลเลเนียม"
21120-3 = "ได้ข้อสรุปเกี่ยวกับ 'ข้อมูล' ที่ขอให้ช่วยตรวจสอบคราวก่อนแล้ว"
21120-4 = "นะ... ในที่สุด..."
21120-5 = "ตื่นเต้นจัง"
21120-6 = "เธอคงรู้อยู่แล้วว่าเวอริทัสคือกลุ่มแฮ็กเกอร์ที่เก่งที่สุดในคิโวทอส"
21120-7 = "เราก็เลยได้รับคำขอร้องให้ช่วยดูระบบและกู้คืนข้อมูลมามากมาย และก็คลี่คลายให้ได้ทุกเคส แต่ว่า..."
21120-8 = "ฉันจะพูดตรงๆ เลยนะ"
21120-9 = "(กลืนน้ำลาย)"
21120-11 = "โมโมอิ ฉันกู้คืนข้อมูลเกมที่เธอบันทึกไว้ไม่ได้"
21120-13 = "ฮือออ! ม่ายยยยย!"
21120-14 = "ไปขอให้ทำอะไรของพี่น่ะ!? บอกให้ไปขอให้เวอริทัสช่วยแกะรหัสผ่านของ G.Bible ไม่ใช่เหรอ!"
21120-15 = "ถ้าเป็นเรื่องนั้น มากิกำลังทำให้อยู่ค่ะ"
21120-16 = "มากิจังเหรอ?"
21120-17 = "โย่ว! มิโด! อรุณสวัสดิ์!"
21120-18 = "ว่าจะไปหาที่ชมรมพัฒนาเกมอยู่เลยล่ะนะ"
21120-19 = "ฮือ ฮือ ข้อมูลเกมของฉัน... แงงงงง!"
21120-20 = "เอ๋? เป็นอะไรไปเหรอโมโม?"
21120-21 = "ไม่ต้องไปสนใจหรอก ฉันอยากรู้ข้อสรุปของ G.Bible มากกว่า"
21120-22 = "ฉันวิเคราะห์เสร็จแล้ว นี่คือ G.Bible... คู่มือเกมฉบับเทพที่นักพัฒนาเกมในตำนาน#nเป็นคนสร้างขึ้น 1000%"
21120-23 = "กะ... กะไว้แล้วเชียว!"
21120-24 = "วันเวลาที่สร้างไฟล์ เวลาส่งไฟล์ครั้งล่าสุด รูปแบบไฟล์ และผู้เขียนไฟล์ตรงกับ IP ของผู้พัฒนาเกม#nในตำนานที่พวกเธอบอกไว้ และที่สำคัญกว่านั้น ข้อมูลนั้นมีการคัดลอกเพียงแค่ครั้งเดียว"
21120-25 = "งั้นก็แสดงว่า......!"
21120-26 = "ใช่ นี่คือต้นฉบับของ G.Bible"
21120-28 = "ยะ.. ยอดไปเลย!!"
21120-29 = "แต่ว่า... ฉันยังวิเคราะห์รหัสของไฟล์ได้ไม่สมบูรณ์น่ะ"
21120-30 = "อ้าว? งั้นก็อ่านไฟล์ไม่ได้น่ะสิ! ทำไมเป็นแบบนี้ล่ะมากิ!"
21120-31 = "นี่! ฉะ.. ฉันเป็นแคร็กเกอร์ต่างหาก ไม่ใช่แฮ็กเกอร์ที่แฮ็กข้อมูลดีๆ ให้นะ! แต่ก็เอาเถอะ!"
21120-32 = "ไม่ใช่ว่ามันจะไม่มีวิธีอยู่หรอกนะ"
21120-33 = "จริงเหรอ?!"
21120-34 = "เราแทบจะวิเคราะห์รหัสเข้าไฟล์นั้นโดยตรงไม่ได้เลย แต่ก็สามารถคัดลอกไฟล์ได้#nโดยยกเว้นไฟล์ที่เข้ารหัสนั้น"
21120-35 = "และถ้าจะทำแบบนั้น เราต้องใช้เครื่องมือ Optimus Mirror System หรือที่เรียกว่า 'กระจก'"
21120-36 = "มะ... ไม่เห็นจะรู้เรื่องเลย..."
21120-37 = "หมายความว่า เราต้องมีโปรแกรม 'กระจก' ถึงจะเปิด G.Bible ได้เหรอ? แล้วมันอยู่ที่ไหนล่ะ?"
21120-38 = "เคยอยู่ที่เวอริทัสนี่แหละ..."
21120-39 = "งั้นก็ติดตั้งโปรแกรมเลยสิ! เดี๋ยวนะ? 'เคยมี' งั้นเหรอ?!"
21120-40 = "ใช่... ตอนนี้ไม่มีแล้วล่ะ ฮ่าฮ่าฮ่า! โธ่เอ๊ย! ก็พวกสภานักเรียนยึดไปน่ะสิ!"
21120-41 = "พวกนั้นบอกว่าไม่ยอมให้ยูกะเก็บอุปกรณ์ผิดกฎหมายไว้ ก็เลยบุกมายึดไปเมื่อไม่กี่วันก่อน ฮึ่ม!"
21120-43 = "นอกจาก 'กระจก' แล้ว... พวกนั้นยังยึดอุปกรณ์อื่นๆ ของเราไปด้วย ไม่เว้นแต่เครื่องดักฟังเลยล่ะค่ะ..."
21120-44 = "แปลว่าโปรแกรม 'กระจก' ก็อันตรายพอๆ กับเครื่องดักฟังเลยงั้นเหรอ?"
21120-47 = "เอาอะไรมาอันตรายล่ะ? มันก็แค่เครื่องมือสำหรับการเจาะระบบเข้ารหัสเท่านั้นเอง"
21120-48 = "แล้วก็... เป็นเครื่องมือแฮ็กชิ้นเดียวในโลกที่หัวหน้าของเราเป็นคนทำขึ้นมาด้วย"
21120-49 = "หัวหน้า... หมายถึงรุ่นพี่ฮิมาริใช่ไหม?"
21120-50 = "ฮิมาริ...?"
21120-51 = "รุ่นพี่หัวหน้าเวอริทัสน่ะ รุ่นพี่ไม่ค่อยสบาย ก็เลยต้องนั่งวีลแชร์ แต่ก็ไม่มีใครเห็นใจ#nหรือดูหมิ่นพี่เขาเลย"
21120-52 = "หรือเพราะเป็นอัจฉริยะนะ? ให้เรียกว่าเจ้าของใบปริญญา 'รอบรู้' ที่มีแค่ 3 คน#nในประวัติศาสตร์มิลเลเนียมดีกว่า"
21120-53 = "ยอดไปเลย แต่ว่า... นี่ไม่ใช่ประเด็นนี่นา เครื่องมือของอัจฉริยะท่านนี้ถูกแย่งไปได้ยังไงกัน"
21120-54 = "พี่เขาแค่อยากเช็กข้อความของคุณครูก็เท่านั้นเอง..."
21120-55 = "ไม่ได้มีเจตนาที่ไม่บริสุทธิ์อะไรเลยนะคะ"
21120-56 = "เอ่อ... แต่ฟังแล้วก็นึกถึงเจตนาที่ไม่บริสุทธิ์ก่อนเลยนะ..."
21120-59 = "ทำไงดี! ถ้าไม่รีบไปเอากระจกกลับมา ฉันต้องโดนหัวหน้าดุแน่!!"
21120-60 = "สรุปก็คือ... เราเองก็ยังหา 'กระจก' กันอยู่"
21120-61 = "และถ้าพวกเธออยากเข้ารหัส G.Bible ก็เท่ากับว่าพวกเธอก็ต้องการกระจกด้วย?"
21120-62 = "โอเค... ทีนี้ก็เข้าใจแล้วล่ะว่าทำไมถึงเรียกพวกเรามาที่นี่"
21120-63 = "หรือว่า...?"
21120-64 = "ฮุฮุ โมโมเนี่ย เข้าใจฉันตลอดเลยนะ"
21120-65 = "ฮิฮิ! ถึงจุดเริ่มต้นจะต่างกัน แต่ถ้าจุดหมายเดียวกันแล้วล่ะก็ นักเดินทางก็เป็นเพื่อนร่วมทางกันได้"
21120-66 = "เราคือสมาชิกปาร์ตี้ที่เข้าไปในสู้กับบอสตัวเดียวกันค่ะ"
21120-67 = "ระ... หรือว่า...?"
21120-69 = "พี่โมโมอิ! ไม่ได้คิดจะร่วมมือกับเวอริทัสแล้วบุกเข้าไปหาสภานักเรียนใช่ไหมน่ะ?!"
21120-71 = "ดาดฟ้า มิลเลเนียม"
21120-72 = "เดาถูกแล้วล่ะ"
21120-73 = "อืม.. ไม่อยากจะเชื่อเลยนะคะ"
21120-74 = "ฉันเองก็รู้เกี่ยวกับชมรมพัฒนาเกมของมิลเลเนียมค่ะ"
21120-75 = "พวกนั้นดูน่ารักทีเดียว เด็กพวกนั้นบุกเข้ามาในสภานักเรียนของมิลเลเนียมเหรอคะ?"
21120-76 = "ทุกคนดูไร้เดียงสาก็จริง แต่ถึงยังไงก็ก่อเรื่องเหลวไหลได้เหมือนกัน"
21120-77 = "และครั้งนี้ก็มีเวอริทัสมาเกี่ยวด้วย"
21120-78 = "เวอริทัส? หมายถึงกลุ่มแคร็กเกอร์ที่ถนัดเรื่องการแฮ็กข้อมูลสินะคะ"
21120-79 = "ใช่แล้วล่ะ สองชมรมนี้มีความเหมือนกันตรงที่ทำได้ทุกวิถีทางเพื่อให้ได้ของที่ต้องการ"
21120-80 = "อย่างนี้นี่เอง งานของพวกฉันก็คือการรับเรื่องจากผู้ว่าจ้างก็จริง..."
21120-81 = "แต่ฉันมีปัญหาเล็กน้อยอยู่อย่างหนึ่งค่ะ"
21120-83 = "เวอริทัส มิลเลเนียม"
21120-84 = "ปัญหาเล็กน้อย?"
21120-85 = "ที่จริงแล้วคนที่ปกป้อง 'คลังของที่ถูกยึด' ของสภานักเรียนที่เก็บ 'กระจก' ไว้ก็คือ..."
21120-86 = "ชมรมเมดยังไงล่ะ"
21120-87 = "หา...? ชมรมเมดเหรอ...?"
21120-88 = "อ๋อ หมายถึง C&C ใช่ไหม? กองกำลังติดอาวุธของมิลเลเนียมที่ใส่ชุดเมด#nแล้ว 'ทำความสะอาด' เป้าหมาย..."
21120-89 = "ใช่แล้ว~ แต่ก็เป็นปัญหาเล็กน้อยมากเลย~"
21120-90 = "อื้ม~ จริงด้วย~ มันเล็ก~ น้อย~ มากเลย~ เล็กน้อยเสียจน..."
21120-93 = "ล้มเลิกเถอะ!!! ชมรมพัฒนาเกม! กลับหลังหัน แล้วเดินหน้า!"
21120-95 = "อ้าว!! ทำไมล่ะ! ทำไมถึงจะยอมแพ้ล่ะ?! โมโม! เธอไม่ได้อยากได้ G.Bible แล้วเหรอ?"
21120-96 = "อยากได้สิ แต่จะให้พวกฉันไปสู้กับชมรมเมดอย่างนั้นเรอะ?! ล้อกันเล่นรึไง!?"
21120-97 = "ให้ไปกระโดดใส่รถไฟที่กำลังวิ่งอยู่ หรือเข้าไปในภูเขาไฟที่ปะทุอยู่ยังจะปลอดภัยกว่าเลย!"
21120-98 = "แต่ว่า... หากถอยหลังกลับไปมือเปล่าแบบนี้... ฉันต้องโดนหัวหน้ากินหัวแน่... แต่ที่สำคัญกว่านั้น!#nชมรมพัฒนาเกมของพวกเธอก็จะไม่รอดนะ! ถึงขั้นยุบชมรมทิ้งเลยนะ!"
21120-99 = "ฉันก็ไม่อยากให้ถูกยุบ... แต่เราจะไปสู้ไหวเหรอ?"
21120-100 = "กลุ่มหัวรุนแรงกับชมรมติดอาวุธที่ถูกทำลายด้วย 'งานจิตอาสา' ของ C&C มีเยอะจนนับไม่ได้เลยนะ#nรู้ไหมว่าทำไม?"
21120-102 = "...เพราะพวกนั้นทำความสะอาดเสียจนไม่ทิ้งหลักฐานให้นับเลยยังไงล่ะ"
21120-103 = "ถึงชมรมจะสำคัญ แต่ก็ไม่ได้สำคัญมากไปกว่ามิโดริกับอาริสึหรอก! นี่มันอันตรายเกินไป!"
21120-104 = "อันตราย? ทำความสะอาด? เข้าใจผิดกันหมดแล้ว! เราไม่ใช่คณะกรรมการวินัยของเกเฮนน่า#nหรือชมรมทวงความยุติธรรมของทรีนิตี้สักหน่อย จะไปสู้กับชมรมเมดทำไม"
21120-105 = "เป้าหมายของเราไม่ใช่การ 'โจมตีชมรมเมด' แต่เป็นการ 'เอากระจกออกมาจากคลังของที่ถูกยึด'#nต่างหากล่ะ~"
21120-106 = "แล้วมันต่างกันยังไงเล่า!"
21120-107 = "มันก็ถูกอยู่นะ"
21120-108 = "ตามที่ฉันดักฟังมา... ตอนนี้ชมรมเมดไม่ได้อยู่ในสถานะพร้อมต่อสู้ค่ะ"
21120-109 = "หืม?"
21120-112 = "แต่ชมรมเมดเป็นกองกำลังติดอาวุธที่แข็งแกร่งที่สุดในมิลเลเนียมนะ"
21120-113 = "คนในชมรมเมดเก่งกาจกันมากเลย แต่รู้ไหมว่าทำไมถึงเป็นแบบนั้นไปได้?"
21120-114 = "เพราะมี 'เธอคนนั้น' อยู่ยังไงล่ะ"
21120-117 = "หัวหน้าชมรมเมด รหัสดับเบิ้ลโอ เนรุ"
21120-119 = "ใช่แล้วล่ะ"
21120-121 = "แต่ตอนนี้เธอคนนั้น..."
21120-123 = "ดาดฟ้า มิลเลเนียม"
21120-124 = "ระ... รุ่นพี่เนรุไม่อยู่งั้นเหรอ?!"
21120-125 = "ใช่ค่ะ น่าจะมีธุระส่วนตัวอยู่ที่ชายขอบของมิลเลเนียมน่ะค่ะ"
21120-126 = "แต่ไม่ต้องกังวลไปหรอกนะคะ"
21120-127 = "เพราะถ้าจะให้พูดให้ถูก หัวหน้าของพวกเราถนัดในเรื่องการ 'ทำลาย' มากกว่าการปกป้อง"
21120-128 = "ตอนที่หัวหน้าอยู่ที่นี่ C&C เป็นชมรมที่แข็งแกร่งที่สุดก็จริง"
21120-129 = "แต่ถ้าหากเป็นการปกป้องชมรมล่ะก็ พวกเราอาจจะทำได้ดีกว่าก็ได้ค่ะ"
21120-130 = "ฉันจะรับภารกิจนี้ค่ะ"
21120-132 = "ชมรมพัฒนาเกมจะเข้ามาในคลังของที่ถูกยึดของสภานักเรียนไม่ได้ จนถึงเวลาที่เราตกลงกันค่ะ"
21120-134 = "เวอริทัส มิลเลเนียม"
21120-135 = "หลีกเลี่ยงการปะทะ... ชิงกระจกมาให้ได้แล้วหนีเลย... งั้นเหรอ?"
21120-136 = "......"
21120-137 = "มาลองดูกันเถอะพี่โมโมอิ"
21120-138 = "ว่าไงนะ?! ถึงรุ่นพี่เนรุจะไม่อยู่ แต่ชมรมเมดก็ไม่ใช่ว่าจะเก่งน้อยลงนะ!"
21120-139 = "เรื่องนั้นฉันก็รู้ แต่ว่า... ฉันไม่ยอมให้ชมรมถูกยุบไปทั้งแบบนี้หรอก"
21120-142 = "ถึงจะเป็นชมรมที่ห้องทั้งเก่า แคบ และมีน้ำฝนรั่วก็เถอะ..."
21120-145 = "แต่ที่หลบภัยที่พวกเราใช้เล่นแต่เกม..."
21120-148 = "ก็กลายเป็นพื้นที่แสนพิเศษที่ทุกคนได้ใช้เวลาร่วมกัน"
21120-149 = "แค่ไม่ต้องไปสู้กับชมรมเมดก็พอ... อย่างอื่นฉันจะยอมเสี่ยงดู"
21120-150 = "แต่ถึงจะต้องสู้ก็เถอะ...! ถึงใครจะบอกว่าอันตราย"
21120-152 = "แต่ฉันก็จะรักษามันไว้"
21120-154 = "เพื่ออาริสึจัง เพื่อยูสึจัง เพื่อพวกเราทุกคน"
21120-157 = "มิโดริ..."
21120-158 = "ฉันทำได้ค่ะ"
21120-159 = "ผู้กล้าในตำนานก็เอาชนะราชาปีศาจ... เพื่อป้องกันการล่มสลายของโลกมาแล้ว"
21120-160 = "ฉันเล่นเกม RPG มากว่า 45 เกม... และฉันก็ได้รู้พลังที่แข็งแกร่งที่สุดที่เหล่าผู้กล้าใช้#nในการกำจัดราชาปีศาจ"

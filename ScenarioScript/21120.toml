[translation]
21120-1 = "Episode 12;In Search of the Mirror"
21120-2 = "Millennium - Veritas"
21120-3 = "I've reached my conclusion about the data you delivered."
21120-4 = "It's finally time..."
21120-5 = "My heart is beating really fast."
21120-6 = "As you know, Veritas prides itself on being the best hacker group in all of Kivotos."
21120-7 = "We're handed cases regarding system and data recovery on a daily basis. Of course, we've solved problems like yours countless times..."
21120-8 = "Hm. I'm going to be frank with you."
21120-9 = "*gulp*"
21120-11 = "Momoi. Your save files cannot be recovered."
21120-13 = "*sob* Nooooo!"
21120-14 = "Momoi! You were supposed to ask them to figure out the password to the G.BIBLE!"
21120-15 = "Oh, that's what Maki's working on."
21120-16 = "Maki is?"
21120-17 = "Good mornin', Mido!"
21120-18 = "I was just about to head over to see you guys, but here you are."
21120-19 = "*sniffle* All my saves... WAAAH!"
21120-20 = "What's her deal?"
21120-21 = "Don't worry about her. Please tell us about the G.BIBLE."
21120-22 = "I finished my analysis. All signs point to this being the real G.BIBLE, the manual written by the legendary game developer themselves."
21120-23 = "Yes!"
21120-24 = "The file creation time, last sent time, file format, and the author all match the IP of the legendary game developer you mentioned, and above all, the data has been copied exactly once."
21120-25 = "That means...!"
21120-26 = "Yep. This is the real deal."
21120-28 = "A-Amazing!"
21120-29 = "That said...we haven't been able to decrypt the password yet."
21120-30 = "Huh? You're killing me, Maki!"
21120-31 = "Sheesh. I may be a hacker, but this is some top-tier stuff we're dealing with."
21120-32 = "But it's not like we're out of options."
21120-33 = "Oh?"
21120-34 = "While it's basically impossible to brute force that password, we may be able to dupe it without the security file."
21120-35 = "And to do that, we're going to need a tool known as the Optimus Mirror System—or the Mirror for short."
21120-36 = "Th-This is all going way over my head..."
21120-37 = "Do I have this right? You need this Mirror thing to open the G.BIBLE? Where is it now?"
21120-38 = "Well, uh, we used to have it here at Veritas..."
21120-39 = "Great, then let's crack this sucker op—wait! \"Used to\"?! You mean it's not here anymore?!"
21120-40 = "Haha, well, the freaking Student Council came in and took it away!"
21120-41 = "That Yuuka stormed in here a few days ago, saying all sorts of stuff like it's \"disgraceful\" that we had \"illegal\" equipment. Sheesh. What a killjoy."
21120-43 = "Besides the Mirror, she also took my...wiretaps..."
21120-44 = "Is this Mirror thing as dangerous as a wiretap?"
21120-47 = "Not at all. It's just a simple tool optimized for cracking encrypted systems."
21120-48 = "And...it's the only hacking tool in the world created by our club president."
21120-49 = "You mean Himari?"
21120-50 = "Who is Himari?"
21120-51 = "She's the president of Veritas. Even though she's wheelchair-bound because of her health, Himari's not one to be underestimated or pitied."
21120-52 = "She's a genius known for being one of only three students in Millennium's history to receive the Omniscience Award."
21120-53 = "Yeah, yeah, that's impressive and all, but what I wanna know is how you managed to lose this genius' equipment!"
21120-54 = "I just wanted to see what Sensei was texting..."
21120-55 = "Purely out of scientific curiosity, of course."
21120-56 = "Riiiiight..."
21120-59 = "Gah! If I don't get that Mirror back soon, the president's gonna yell at me!"
21120-60 = "Anyway, as you can see, our interests have aligned."
21120-61 = "We need our president's tool back, and you want to unlock the G.BIBLE."
21120-62 = "Ah. I was wondering why you wanted an in-person meeting. I think I know where this is going."
21120-63 = "Wait. You don't mean...?"
21120-64 = "Heh. You're pretty sharp, Momo."
21120-65 = "It's like they say, birds of a feather flock together."
21120-66 = "Before we enter the dungeon, we become a raid party."
21120-67 = "A-Are you guys seriously suggesting..."
21120-69 = "...we attack the Student Council with Veritas?!"
21120-71 = "Millennium Rooftop"
21120-72 = "Yes, you heard me correctly."
21120-73 = "You say that, but I'm still having a hard time believing it."
21120-74 = "I know of Millennium's Game Development Department."
21120-75 = "They seem like such cute, innocent girls. You really think they intend on attacking the Student Council?"
21120-76 = "They're naive. That's why they do ridiculous things sometimes."
21120-77 = "But it's not so simple this time. Veritas is also involved."
21120-78 = "Veritas? Those hackers?"
21120-79 = "Indeed. Both groups are willing to pull out all the stops when the things they hold dear are on the line."
21120-80 = "I see. Well, it is our job to respond to requests."
21120-81 = "However, there is one little problem."
21120-83 = "Millennium - Veritas"
21120-84 = "What kind of problem?"
21120-85 = "It's the folks guardin' the Student Council's contraband storage where the Mirror is."
21120-86 = "It's the Maid Club."
21120-87 = "The Maid Club...?"
21120-88 = "I see. You mean C&C, right? The strike team from our school who wear maid uniforms and \"clean up\" their targets..."
21120-89 = "Exactamundo! Don't worry, it's just a minor snag!"
21120-90 = "Right! It's minor... Super minor..."
21120-93 = "Gah! It's impossible! We have no choice but to throw in the towel!"
21120-95 = "Whoa, what the heck are you giving up for, Momo? Don't you need the G.BIBLE?!"
21120-96 = "Sure we need it, but are you serious right now? The Maid Club?! You've gotta be kidding me!"
21120-97 = "We'd be better off standing in front of a moving train or throwing ourselves into a volcano than trying to fight them!"
21120-98 = "B-But, if we don't do somethin', the president is gonna yell at me—I mean, the Game Development Department is gonna be shut down!"
21120-99 = "Of course I don't want us to get shut down! But, come on! This is just crazy talk!"
21120-100 = "C&C have gotten rid of countless extremist groups and armed factions. And you know what else?"
21120-102 = "...When they \"clean them up,\" they don't leave a single trace of their existence behind."
21120-103 = "Exactly! The club is important, but I can't put Midori and Aris at that kind of risk! It's too dangerous!"
21120-104 = "Danger? You've got it all wrong! We're not Gehenna's Prefect Team or Trinity's Justice Task Force or something. Why would the Maid Club have to make us disappear?"
21120-105 = "Ya see, our goal isn't to get rid of the Maid Club. All we gotta do is get what we need out of the storage room they're guarding!"
21120-106 = "That's basically the same thing!"
21120-107 = "Actually, she has a point."
21120-108 = "From what I've...heard, the Maid Club's not at full force right now."
21120-109 = "Don't tell me..."
21120-112 = "I see. While the Maid Club is widely considered the strongest squad in Millennium..."
21120-113 = "...it wasn't just their skill as agents that earned them that reputation."
21120-114 = "It was because of \"her.\""
21120-117 = "The president of the Maid Club, call sign Double O, Neru."
21120-119 = "Correct."
21120-121 = "But, as it so happens, right now, she's..."
21120-123 = "Millennium Rooftop"
21120-124 = "N-Neru isn't here?!"
21120-125 = "That's right. I believe she's out on personal business in the outskirts of Millennium."
21120-126 = "But you needn't worry."
21120-127 = "Our president is, well, let's just say she is much more fit for destroying, rather than protecting."
21120-128 = "C&C is a strong fighting force when we're with our president."
21120-129 = "But if the job is to protect something...we may be better off without her."
21120-130 = "As such, we'll accept your request."
21120-132 = "Until the deadline given to the Game Development Department, all access to the Student Council's contraband storage is off-limits."
21120-134 = "Millennium - Veritas"
21120-135 = "So we avoid direct combat, grab the Mirror, and run for our lives..."
21120-136 = "..."
21120-137 = "Let's do it, Momoi."
21120-138 = "You too, Midori?! Even without Neru, the Maid Club is still...uber scary!"
21120-139 = "I know, but...I'm not just going to give up."
21120-142 = "Our club room's old and leaky, but..."
21120-145 = "...it's not just where we get together to play games anymore."
21120-148 = "It's...where we all belong."
21120-149 = "If we can avoid fighting the Maid Club...I think we have a chance."
21120-150 = "No, even if we have to fight them!"
21120-152 = "I want to keep it safe."
21120-154 = "For Aris and Yuzu and all of us together."
21120-157 = "Midori..."
21120-158 = "I believe in us."
21120-159 = "When the world is on the brink of destruction, the legendary hero must rise to save it by defeating the wicked demon lord."
21120-160 = "After playing approximately 45 RPGs...I have realized that there is a great power all these legendary heroes have in common."
21120-161 = "What do you mean? Like leveling up or upgrading equipment?"
21120-162 = "Or perhaps a wiretap?"
21120-163 = "Or an EMP?!"
21120-165 = "Uh... No."
21120-167 = "They fight alongside their friends."
21120-168 = "Aris..."
21120-169 = "..."
21120-170 = "All right."
21120-171 = "We're doing this. We're gonna break into the Student Council and take the Mirror!"
21120-173 = "You've got a plan, right, Hare?!"
21120-174 = "Naturally."
21120-175 = "But, in order to put that plan into action..."
21120-176 = "...we have some preparations to make."
21120-178 = "Like wiretaps, EMPs, and..."
21120-179 = "...as Aris so eloquently put it, a little help from our friends."
21120-180 = "By that you mean...?"
21120-181 = "Ah! *sparkle sparkle*"
21120-182 = "But, um, we're not exactly on the best terms at the moment, so I think you'll have to do the talking, Sensei."
21120-183 = "[s1] \"You want me?\"\n[s2] \"Are you sure?\""
21120-186 = "Yup."
21120-187 = "To be frank, this plan is dead on arrival unless we can enlist their help."
21120-189 = "I see."
21120-190 = "As you said, you'd have a hard time pulling off a plan like this without our help."
21120-191 = "Very well. You can count us in."
21120-192 = "Wait, really?"
21120-193 = "But hasn't the Engineering Department already qualified for renewal?"
21120-194 = "We did."
21120-195 = "Then why would you team up with us to take on the Maid Club?"
21120-196 = "Oh. It's actually pretty simple."
21120-197 = "Because that sounds fun."
21120-198 = "Plus, it's a chance to hang out with and get to know Sensei!"
21120-202 = "That aside, there's also..."
21120-203 = "???"
21120-204 = "Huh?"
21120-205 = "...Oh. Don't mind me. I look forward to seeing what you guys can do."
21120-206 = "Uhhh, okay."
21120-207 = "Anyway, here's to a fruitful partnership!"
21120-209 = "Millennium - Veritas"
21120-210 = "All right! Is everyone here?"
21120-211 = "Yes, and we are ready to proceed."
21120-212 = "Awesome!"
21120-213 = "So when is go time for the mission?"
21120-214 = "The mission...?"
21120-217 = "Well, actually, it's already begun."
21120-219 = "Millennium Rooftop"
21120-220 = "I do have one thing I'm curious about, Yuuka."
21120-222 = "How do you know the Game Development Department and Veritas will attack the Student Council?"
21120-223 = "When it comes to information warfare, I didn't think there was anyone at Millennium who could surpass Veritas."
21120-224 = "You're right about that."
21120-225 = "However, that's precisely how we came to know of their plot."
21120-226 = "What? "
21120-227 = "There was only one person who could have tipped us off to such a thing."
21120-230 = "The president of Veritas herself, Himari..."
21120-232 = "Next Episode;Nerds vs. Maids"

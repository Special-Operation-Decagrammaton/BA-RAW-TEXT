[translation]
63010-1 = "Episode 1;Our Own Hatred"
63010-3 = "I have to say, I'm surprised. I didn't expect you to come all the way to Porta Pacis."
63010-4 = "[s] \"It's my solemn duty to fetch runaway students.\""
63010-5 = "Me? A runaway? You know, some people might not like what that implies."
63010-6 = "Our home is right here, in Arius. How can I be a runaway, when I've never left home?"
63010-7 = "[s] \"...A student is refusing to come to school. I had to come.\""
63010-8 = "...We never asked you to teach us in the first place."
63010-9 = "[s1] \"Ahem. What is a 'student,' exactly?\"\n[s2] \"Someone who goes to school and studies, right?\""
63010-14 = "[ns] \"You can't be a student without studying too!\""
63010-15 = "You mean, \"without studying\" according to your methods and teachings, right?"
63010-16 = "Arius will study according to Arius' methods and teachings."
63010-17 = "Or are you trying to force Trinity's way of life and studying onto Arius?"
63010-21 = "Haha. You look so affronted, as if to say, \"I never said anything like that!\""
63010-22 = "Maybe not in so many words. However..."
63010-23 = "I can understand these things now, for whatever reason."
63010-24 = "At least, I can see what's happening inside Arius, and around us."
63010-25 = "...To begin with, I'm not even fond of the name, \"Arius Satellite School.\""
63010-26 = "\"Satellite\" implies that we're a subsidiary to another entity."
63010-27 = "So, pop quiz time, Sensei. I wonder what answer you'll come up with."
63010-29 = "Tell me something..."
63010-39 = "...about the day Trinity set foot in Arius, for the first time in centuries..."
63010-40 = "The day Misono Mika, Beatrice, and the Squad decided to change their fates on a whim."
63010-41 = "Yes. They changed their fates, at the cost of every other Arius students' free will."
63010-43 = "Why is it that you so meticulously cared for Misono Mika and the Squad..."
63010-44 = "...while you neglected the Arius students who remained here?"
63010-46 = "[ns] \"That's...!\""
63010-48 = "I immediately flashed back to a conversation I had that day."
63010-50 = "I'm sorry to say this, but..."
63010-51 = "Sensei, we are formally requesting that you step away from the Arius Satellite School...issue."
63010-52 = "Yes, this particular matter is one of Trinity's doing, so it must be Trinity's responsibility as well."
63010-53 = "Truly. We're deeply ashamed to have had you clean up our mess."
63010-54 = "As the acting representative of the Pater faction..."
63010-55 = "And as the acting representative of the Sanctus faction..."
63010-59 = "We would like to sincerely apologize."
63010-60 = "Mika is still the official representative of the Pater faction, but she will naturally need to step down from her position for an undetermined amount of time."
63010-61 = "As you well know, she must resume her halted hearing."
63010-62 = "Seia did participate in the recent Arius operation..."
63010-63 = "...however, she has not fully recovered and will need to rest for some time."
63010-64 = "Considering these circumstances, this is the collective stance of the Pater and Sanctus factions as of now."
63010-65 = "Nagisa's Filius faction may hold a different opinion..."
63010-66 = "...but Tea Party decisions are made by a majority vote."
63010-67 = "Especially on matters this critical to the academy, no single faction can ignore the majority opinion of the others."
63010-68 = "So please, Sensei, trust in us to resolve our own issues."
63010-69 = "We only ask that you give us a little more time."
63010-70 = "Naturally, your presence would be a welcome one."
63010-71 = "This entire process would, surely, move along more quickly, efficiently, and justly."
63010-72 = "But how will we students ever grow if we let adults do the difficult work for us?"
63010-74 = "Aha. I see."
63010-78 = "[ns] \"What?!?!\""
63010-79 = "Hahaha. Don't be so surprised."
63010-80 = "Weren't you listening? I have a rough understanding of anything that happens in Arius."
63010-81 = "But you're quite naive, Sensei. Or maybe too trusting? Your trust in Trinity's upper ranks was misplaced."
63010-82 = "The acting representatives of the Sanctus and Pater factions."
63010-83 = "They wasted no time filling the hole when the actual leaders couldn't serve."
63010-84 = "Do you really think they could have done that so quickly, with all of Trinity's red tape, without any political backing?"
63010-85 = "No matter how much they try to deny it, Trinity's upper ranks are still a den of vipers."
63010-87 = "Fine. If that's how it was, then your responsibility could be minimal, maybe even nonexistent."
63010-88 = "But that changes nothing. It doesn't change the fact that Arius hasn't taken a single step out of our rotting pit of hell since that day."
63010-89 = "[s] \"...\""
63010-90 = "You should be more careful, Sensei. In your current position, if a student with malice really wanted to deceive you..."
63010-91 = "You'd hardly be able to escape their trap."
63010-92 = "There's this thing I think about, sometimes."
63010-93 = "When some Arius students finally gathered all their courage and managed to step out into the world, only to return even more damaged..."
63010-94 = "When they couldn't find anywhere to fit in, or when they couldn't endure the judgmental glares anymore... They fell into despair, saying they'd go back to the only life they knew..."
63010-95 = "When they realized there was nowhere else in the world Arius students belonged...."
63010-96 = "...If Arius had not been exiled from Trinity, what kind of lives could we have lived?"
63010-97 = "Do you ever think about that too, Sensei?"
63010-98 = "Or have you been too busy with other schools to spare even a thought for Arius?"
63010-99 = "[s] \"...\""
63010-100 = "...The present is a structure built atop the foundation of the past. No present exists independent of what came before."
63010-101 = "Some say this hatred is not ours to bear."
63010-102 = "But I must say, I disagree with them."
63010-103 = "The Arius of today is still paying the consequences of our past. And that alone binds us to Arius, in every way possible."
63010-105 = "You talk of \"studying.\""
63010-106 = "What makes someone a student? Going to school and studying?"
63010-107 = "Look around. This right here is my response."
63010-109 = "Porta Pacis, and everything recorded here, that is what we should study."
63010-110 = "That's a student's duty, right? To study? Then kudos to me."
63010-111 = "I came here to fulfill that duty."
63010-112 = "And if you try to say this isn't studying..."
63010-113 = "...then I can't help but wonder if a true educator would discriminate against and deny ways of learning that aren't \"approved\" by them."
63010-115 = "The sins of one generation are inherited by the next."
63010-116 = "It is not something to be argued. It is a simple truth."
63010-118 = "How can one seek to reap the benefits of their past, while attempting to disregard its sins?"
63010-119 = "If you intend to reject the sins of your past, then you must also reject everything else to do with that past."
63010-120 = "The knowledge, wisdom, legacy, material wealth, and every right and authority you exercise today..."
63010-121 = "To claim the things that benefit you, while denying the sins committed to attain them..."
63010-122 = "From Arius' perspective, it's nothing but nauseating hypocrisy."
63010-125 = "I understand why you refrained from further intervention in Arius. Because, at that time, you accepted Trinity and their ways."
63010-126 = "There is nothing to forgive, in that regard. I see no sin in what you did."
63010-127 = "However, you should then allow Arius to live as we do."
63010-128 = "Just as Trinity has its way, so does Arius."
63010-129 = "Surely you see how unfair it'd be to accept one, but not the other?"
63010-130 = "[s] \"...\""
63010-131 = "We don't fit in."
63010-132 = "Life outside may look enticing, but there's no place for Arius in that world."
63010-133 = "Just ask the many Arius students who returned because they couldn't adapt to it."
63010-134 = "I took those students in and showed them a path forward, the Arius way."
63010-135 = "We don't need exams or studying. We'll live the way we've always lived."
63010-136 = "So at this point, there's only one thing I need from you."
63010-137 = "Leave Arius. Quietly. And take the Squad with you."
63010-138 = "That's all you have to do. And I won't let anyone harm any of you."
63010-139 = "The Angels of Revelation..."
63010-140 = "..."
63010-141 = "Just leave that to us. You can take my word for it."
63010-142 = "I can handle the Trumpeting Angels, at the very least."
63010-143 = "[s] \"'Trumpeting Angels'...?\""
63010-144 = "You picked up on that name quickly, didn't you?"
63010-145 = "You do live up to your name, Sensei. When it comes to your students, you don't miss a beat."
63010-146 = "In that case, I trust you'll also understand what I meant when I said I'd live in the Arius way?"
63010-147 = "[s] \"...\""
63010-151 = "All right. The exit is this way."
63010-152 = "The Squad lingering behind you can head right out along this path too."
63010-156 = "And..."
63010-157 = "Please. Don't ever come back here again."
63010-158 = "Thanks for everything until now, all of you. See you."
63010-162 = "\"The Arius way,\" you said?"
63010-166 = "...Saori."
63010-167 = "Do you still have something left to say? I'll hear you out."
63010-168 = "If you're thinking of using this as a pretext to come back to Arius, you're only making trouble for both sides."
63010-169 = "I have no final words left for you. Just a question."
63010-170 = "It's about this \"Arius way\" you keep talking about."
63010-174 = "What lies ahead of it?"
63010-175 = "...!"
63010-177 = "Next Episode;In Spite of Everything"

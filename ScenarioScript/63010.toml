[translation]
63010-1 = "第1話;屬於我們的憎恨"
63010-3 = "老實說，我很驚訝。#n老師居然會找到波塔帕西斯這裡來。"
63010-4 = "[s]「有學生離家出走，我當然得來接回去才行。」"
63010-5 = "說什麼離家出走，要是別人聽到會誤會的。"
63010-6 = "我們的家就在[ruby=這裡]奧利斯[/ruby]──從來不曾離開過。"
63010-7 = "[s]「……有學生曠課，我當然得來接回去才行。」"
63010-8 = "……我們打從一開始就沒有希望老師來上課吧。"
63010-9 = "[s1]「咳哼。學生的定義是什麼呢？」\n[s2]「是到學校讀書的人對吧？」"
63010-14 = "[ns]「就是要學習才能被稱為學生！」"
63010-15 = "但是那所謂的學習，終究必須按照老師的標準來進行不是嗎？"
63010-16 = "我認為我們奧利斯，只需要用奧利斯的方式學習就夠了。"
63010-17 = "還是說，你打算強迫奧利斯接受三一的學習方式呢？"
63010-21 = "哈哈……一副「我沒說過那種話」的表情呢。"
63010-22 = "沒錯，老師你確實不曾這麼說過。"
63010-23 = "不過不知為何……現在的我似乎變得能夠理解那些事情了。"
63010-24 = "至少在這奧利斯分校……這附近發生的事情是如此。"
63010-25 = "……雖然我其實不太喜歡「奧利斯分校」這個名字。"
63010-26 = "畢竟……這就代表我們是附屬於其他學園的學校啊。"
63010-27 = "那麼，現在來個突擊考試吧。#n可以請你回答我嗎，老師？"
63010-29 = "為什麼在那一天──"
63010-39 = "三一時隔數百年踏入奧利斯的那一天。"
63010-40 = "聖園彌香、貝雅特里榭和小隊擅自決定了自己命運的那一天。"
63010-41 = "因而導致其他奧利斯的學生無法決定自己命運的那一天。"
63010-43 = "為何老師沒有像照顧聖園彌香和小隊一樣──"
63010-44 = "──照顧其他奧利斯的學生呢？"
63010-46 = "[ns]「那是……！」"
63010-48 = "（剎那間，「那天」之後的對話從腦海中閃過）"
63010-50 = "必須對老師說這種話，我們也感到非常抱歉……"
63010-51 = "不過希望老師在此之後，停止介入與奧利斯分校有關的問題。"
63010-52 = "是的。畢竟奧利斯分校的問題，本來就該由我們三一自行解決。"
63010-53 = "結果反而讓老師幫忙到這個地步，我們實在深感慚愧。"
63010-54 = "身為聖父派的臨時代表──"
63010-55 = "以及聖靈派的臨時代表──"
63010-59 = "在此向老師致上誠摯的歉意。"
63010-60 = "即便彌香大人仍是聖父派的代表，短時間內也必須從第一線退下來。"
63010-61 = "誠如老師所知，本應進行的聽證會不過是處於中斷狀態罷了。"
63010-62 = "而聖亞大人雖然確實參與了這次的奧利斯攻防戰……"
63010-63 = "不過由於身體尚未完全康復，暫時還需要再次進行靜養。"
63010-64 = "因此，希望老師您能將其視為聖父派和聖靈派的共同意志。"
63010-65 = "也許以渚大人為首的聖子派可能會提出異議……"
63010-66 = "不過茶會的決策，本來就是以多數決來決定的。"
63010-67 = "尤其是在這類關係到學園的重大問題，一個派系絕對不能忽視其他派系的多數意見。"
63010-68 = "所以……希望老師能在一旁守望著我們。"
63010-69 = "請給我們一個機會，讓我們自己解決自己的問題吧。"
63010-70 = "當然，若是由老師您親自出面的話……"
63010-71 = "事情很可能以更加妥善而有效率的方式收尾。"
63010-72 = "不過假如凡事都依賴大人，學生將無法有所成長……這也是不爭的事實。"
63010-74 = "啊哈，原來如此啊。"
63010-78 = "[ns]「！？！？」"
63010-79 = "呵呵，請老師不必太過驚訝。"
63010-80 = "我剛才不是說過了嗎？#n在這附近發生的事情，我大致上都能知道。"
63010-81 = "不過，老師實在有點過於天真了。#n或者應該說……過度相信學生了吧。#n尤其是對於三一的高層。"
63010-82 = "聖靈派和聖父派的臨時代表……"
63010-83 = "他們可是在各自派系的代表暫時無法履行職務的狀況下，立刻上位的學生們啊。"
63010-84 = "在三一的環境之下，你覺得他們有可能僅憑一己之力登上高層的位子嗎？"
63010-85 = "無論他們再怎麼否認，也無法擺脫那裡有如毒蛇窩一般的事實。"
63010-87 = "我明白了。如果事情是那樣的話──#n老師的責任可以說是非常小，甚至要說完全沒有也不為過。"
63010-88 = "但是即便如此──#n也無法改變奧利斯在那天之後，依舊連一步也未能踏出地獄中心的事實。"
63010-89 = "[s]「……」"
63010-90 = "往後還請小心一點，老師。#n以老師現在的立場來看，如果有心懷惡意的學生打算欺騙你……"
63010-91 = "老師恐怕會無法從中脫身也說不定。"
63010-92 = "我有時會這麼想。"
63010-93 = "當奧利斯的孩子們鼓起勇氣走向世界，卻帶著更深的傷痕回來的時候……"
63010-94 = "無論在哪裡都無法適應、難以忍受周圍的目光，#n最終絕望地認為只能按照原本的方式活下去的時候……"
63010-95 = "以及深刻感受到，世界上沒有奧利斯學生的容身之處的時候……"
63010-96 = "我總是會想……如果奧利斯不曾被三一放逐，我們的孩子將會過著什麼樣的生活。"
63010-97 = "老師你有曾經這麼想過嗎？"
63010-98 = "還是因為忙著照顧其他學校，所以根本沒有把奧利斯視為需要關心的對象？"
63010-99 = "[s]「……」"
63010-100 = "……現在是搭建於過去這個基礎上的建築。#n所有過去都與現在息息相關。"
63010-101 = "也許有些人會說，這股憎恨並不屬於我們。"
63010-102 = "但我的回答是，這個觀點我實在難以苟同。"
63010-103 = "因為過去所帶來的結果，就是奧利斯的現在──#n而這個現在正以各種可能的方式，緊緊束縛著奧利斯。"
63010-105 = "老師剛才提過有關學習的話題對吧。"
63010-106 = "說是到學校讀書的才是學生。"
63010-107 = "那麼我想這樣回答你。"
63010-109 = "波塔帕西斯──這裡記載的一切，就是我們要讀的書。"
63010-110 = "你說過學習是學生的本分對吧？#n這麼看來，我的行為似乎並沒有錯。"
63010-111 = "因為我正是為了遵守本分而來到這裡的。"
63010-112 = "假如老師要告訴我，說這樣並不是讀書學習的話……"
63010-113 = "那我反倒想問你──將學習劃分為三六九等，是身為教育者應有的態度嗎？"
63010-115 = "人類的罪，是會由人類繼承下去的。"
63010-116 = "唯有這個事實，所有人都必須承認。"
63010-118 = "只想繼承過去的所有恩惠，卻不願一並承擔過去的罪孽……真是自相矛盾。"
63010-119 = "如果拒絕承擔過去的罪孽──那麼對過去留下的一切都應該一視同仁地拋棄才對。"
63010-120 = "知識、智慧、遺產、物質上的富足，以及如今得以行使的所有權利與權力……"
63010-121 = "理所當然地享受那些好處，卻不願為過去的罪孽負起責任。"
63010-122 = "從奧利斯的立場看來，那不過是令人作嘔的偽善罷了。"
63010-125 = "那天……老師選擇尊重三一的做法，因此沒有繼續干涉奧利斯的事。"
63010-126 = "對於這個部分……我並不打算原諒老師。#n畢竟沒有罪過的人，是無法被原諒的。"
63010-127 = "不過相對地，我希望老師也允許奧利斯以「奧利斯的方式」自由地活下去。"
63010-128 = "就像三一有屬於三一的方式一樣，奧利斯也有屬於奧利斯的方式。"
63010-129 = "老師總不會只尊重一邊，而不尊重另一邊吧？"
63010-130 = "[s]「……」"
63010-131 = "我們……無法融入外界。"
63010-132 = "即便外面的生活看似美好，那裡卻沒有奧利斯的容身之處。"
63010-133 = "就如我剛才所說，有許多無法適應外界的孩子重新回到了奧利斯。"
63010-134 = "而我收留了那些孩子，並為他們指引了以奧利斯的方式前進的道路。"
63010-135 = "考試也好，學習也罷……這些我們都不需要。#n我們會按照一直以來的方式生活下去。"
63010-136 = "所以現在，我只想拜託老師一件事情。"
63010-137 = "請和小隊一起，安靜地離開奧利斯吧。"
63010-138 = "只要能做到這點，我就不會對老師和小隊造成任何傷害。"
63010-139 = "至於「啟示錄的天使」……"
63010-140 = "……"
63010-141 = "我向你承諾會由我們來處理。"
63010-142 = "至少對於「吹號的天使」，我有能夠確實解決的方法。"
63010-143 = "[s]「『吹號的天使』……？」"
63010-144 = "老師似乎認為……我之所以取這個名字是有用意的呢。"
63010-145 = "沒錯。真不愧是老師。#n只要是關於學生的事，反應總是快得出奇。"
63010-146 = "既然如此，相信老師也已經理解我所謂「以奧利斯的方式活下去」的意思了。"
63010-147 = "[s]「……」"
63010-151 = "來，出去的路在這邊。"
63010-152 = "跟在老師後面的小隊，也請沿著這條路出去吧。"
63010-156 = "還有……"
63010-157 = "請永遠不要再來到這裡了。"
63010-158 = "各位，至今為止辛苦了。"
63010-162 = "你說「奧利斯的方式」是嗎，昴？"
63010-166 = "……沙織。"
63010-167 = "最後還有什麼話想說嗎？#n那我就姑且聽聽看吧。"
63010-168 = "畢竟要是你想拿這件事當藉口回到奧利斯，只會讓彼此都感到為難而已。"
63010-169 = "倒也不是什麼最後的話……我只想問你一個問題。"
63010-170 = "你所謂的「奧利斯的方式」……"
63010-174 = "在那前方……究竟有什麼呢？"
63010-175 = "……！"
63010-177 = "下一話;即便如此"

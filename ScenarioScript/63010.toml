[translation]
63010-1 = "#title;제1화;우리의 것인 증오"
63010-2 = "#wait;2000"
63010-3 = "3;니코 스바루;01;솔직히 말씀드리자면, 놀랐다는 이야기를 드리고 싶네요. 이 포르타 파시스까지 찾아오시다니요.\n#3;a"
63010-4 = "[s] \"학생이 가출했는데, 당연히 데리러 와야지.\""
63010-5 = "3;니코 스바루;27;가출이라뇨. 누가 들으면 오해하겠네요."
63010-6 = "3;니코 스바루;13;저희의 집은 여기, 아리우스입니다. 애초에 나간 적도 없어요."
63010-7 = "[s] \"……학생이 등교를 거부했는데, 당연히 데리러 와야지.\""
63010-8 = "3;니코 스바루;05;……애초에 저희, 수업해 달라고 한 적 없는데요……."
63010-9 = "[s1] \"어허. 학생의 정의가 뭐니.\"\n[s2] \"학교에 다니면서 공부하는 사람이잖아.\""
63010-10 = "#st;[0,0];instant;1;"
63010-11 = "#st;[0,0];instant;1;"
63010-12 = "#clearST"
63010-13 = "#wait;1000"
63010-14 = "[ns] \"학생이란 건 모름지기, 공부를 해야 학생인 거란다!\""
63010-15 = "3;니코 스바루;21;그렇지만 그 공부도 결국, 선생님의 기준에서 이루어지는 것 아닌가요."
63010-16 = "3;니코 스바루;17;아리우스는, 아리우스의 방식으로 공부해 나가면 되는 것이라고 생각합니다."
63010-17 = "3;니코 스바루;02;아니면 아리우스에게 트리니티의 공부를 강요하려 하시는 건가요?\n#3;em;[?]"
63010-18 = "#st;[0,0];instant;1;"
63010-19 = "#clearST"
63010-20 = "3;니코 스바루;05\n#wait;1200"
63010-21 = "3;니코 스바루;03;하하. 그런 말은 하지 않았다는 표정을 하고 계시는군요.\n#3;em;[재잘]"
63010-22 = "3;니코 스바루;27;네. 선생님께서는 이야기하지 않으셨지만"
63010-23 = "3;니코 스바루;01;지금의 저는, 어째서인지 그런 것들을 알 수 있게 되었습니다."
63010-24 = "3;니코 스바루;99;적어도 아리우스 분교 안…… 이 근처에서 일어나는 일들이라면 말이죠."
63010-25 = "3;니코 스바루;06;……애초에, 아리우스 분교라는 이름 자체가 조금 마음에 들지 않기는 하네요."
63010-26 = "3;니코 스바루;05;그건 결국 어딘가에 종속된 학교라는 의미니까요."
63010-27 = "3;니코 스바루;01;그러면 여기에서 깜짝 질문 하나. 대답해 주실 수 있으신가요, 선생님?\n#3;em;[음표]"
63010-28 = "#all;hide"
63010-29 = "#na;니코 스바루;어째서 그날."
63010-30 = "#st;[0,0];instant;1;"
63010-31 = "#clearST"
63010-32 = "#wait;500"
63010-33 = "#wait;100"
63010-34 = "#wait;500"
63010-35 = "#wait;100"
63010-36 = "#wait;500"
63010-37 = "#wait;100"
63010-38 = "#wait;500"
63010-39 = "#na;니코 스바루;트리니티가 아리우스에 몇백 년 만에 감히 발을 들인 날."
63010-40 = "#na;니코 스바루;미소노 미카와 베아트리체, 그리고 스쿼드가 멋대로 자신들의 운명을 결정지은 날."
63010-41 = "#na;니코 스바루;그리고 그랬기 때문에, 다른 모든 아리우스는 오히려 스스로를 결정할 수 없게 되었던 날."
63010-42 = "#all;hide"
63010-43 = "#na;니코 스바루;선생님은 어째서 미소노 미카와 스쿼드를 보살폈던 만큼."
63010-44 = "#na;니코 스바루;다른 아리우스를 보살펴 주지 않으셨나요?"
63010-45 = "3;니코 스바루;05\n#3;a"
63010-46 = "[ns] \"그건……!\""
63010-47 = "#all;hide"
63010-48 = "#na;(순간, '그날' 직후 나누었던 대화가 머릿속을 스쳤다.)"
63010-49 = "2;티파티 부원 A;05\n4;티파티 부원 B;05\n#2;a\n#4;a\n#2;h\n#4;h"
63010-50 = "2;티파티 부원 A;02;이런 말씀을 드리게 되어서 죄송하지만."
63010-51 = "2;티파티 부원 A;05;선생님은, 아리우스 분교의 문제에서 이만 손을 떼 주셨으면 합니다."
63010-52 = "4;티파티 부원 B;02;네. 아리우스 분교의 문제는, 본디 저희 트리니티가 자체적으로 해결했어야 하는 문제였으니까요."
63010-53 = "4;티파티 부원 B;04;오히려 여기까지 선생님의 도움을 구하게 된 것에, 면목이 없다고밖에 말씀드릴 것이 없습니다.\n#4;em;[땀]"
63010-54 = "2;티파티 부원 A;02;현 파테르 분파의 임시 대표로서."
63010-55 = "4;티파티 부원 B;02;그리고 현 상투스 분파의 임시 대표로서."
63010-56 = "#st;[0,0];instant;1;"
63010-57 = "#clearST"
63010-58 = "2;티파티 부원 A;05\n4;티파티 부원 B;05\n#2;greeting\n#4;greeting\n#2;h\n#4;h\n#wait;1500"
63010-59 = "2;티파티 부원 A;02;선생님께, 진심으로 사과드리고자 합니다."
63010-60 = "2;티파티 부원 A;01;미카 님은 분명 아직도 파테르 분파의 대표이시지만, 당분간은 일선에서 물러나셔야 할 겁니다."
63010-61 = "2;티파티 부원 A;05;선생님께서도 아시다시피, 중단되었던 청문회를 속행하셔야 하기도 하고요.\n#2;em;[한숨]"
63010-62 = "4;티파티 부원 B;02;세이아 님은 이번 아리우스 공방전에 분명히 참여하셨지만."
63010-63 = "4;티파티 부원 B;04;아직 몸이 완전히 회복되지 않으신 탓에, 잠시 동안은 다시 요양을 취하셔야 할 것 같습니다.\n#4;em;[세로선]"
63010-64 = "2;티파티 부원 A;05;그러니 지금은 이것이, 파테르 분파와 상투스 분파의 총의라고 보아주시면 감사하겠습니다."
63010-65 = "4;티파티 부원 B;02;나기사 님의 필리우스 분파는 다른 의견을 제시하실 수도 있겠습니다만."
63010-66 = "4;티파티 부원 B;05;본디 티파티의 의사 결정 구조는 다수결로 이루어지도록 되어 있으니까요."
63010-67 = "2;티파티 부원 A;02;특히 이렇게 학원에 있어서 중대한 문제일수록, 한 분파는 타 분파의 다수 의견을 결코 무시할 수 없기도 하고요.\n#2;em;[반응]"
63010-68 = "4;티파티 부원 B;03;그러니, 선생님. 저희의 문제를 저희가 해결할 수 있도록 지켜보아 주세요."
63010-69 = "4;티파티 부원 B;03;저희에게 조금만 더 기회를 허락해 주셨으면 합니다."
63010-70 = "2;티파티 부원 A;04;물론 선생님께서 나서 주신다면, 저희가 하는 것보다도."
63010-71 = "2;티파티 부원 A;03;훨씬 빠르고 효율적이며 좋은 모습으로 모든 것이 마무리 지어질 가능성이 높겠습니다만."
63010-72 = "4;티파티 부원 B;03;모든 것을 어른에게 의지하면, 학생이 성장할 부분이 없어지는 것도 사실일 테니까요.\n#4;em;[재잘]"
63010-73 = "3;니코 스바루;01\n#3;a\n#2;hide\n#4;hide"
63010-74 = "3;니코 스바루;01;아하, 그러셨군요."
63010-75 = "#st;[0,0];instant;1;"
63010-76 = "#clearST"
63010-77 = "#bgshake\n#wait;1500"
63010-78 = "[ns] \"?!?!\""
63010-79 = "3;니코 스바루;03;하하하. 그렇게 너무 놀라지 마세요.\n#3;em;[재잘]"
63010-80 = "3;니코 스바루;99;이 근처에서 일어나는 일이라면, 대강 알 수 있다고 말씀드렸잖아요?"
63010-81 = "3;니코 스바루;01;하지만 선생님도 순진하시군요. 아니면 학생을 너무 믿으셨거나요. 그것도, 트리니티의 상층부를 말이죠."
63010-82 = "3;니코 스바루;05;상투스 분파와 파테르 분파의 임시 대표."
63010-83 = "3;니코 스바루;99;두 분파의 대표가 잠시 직을 수행하지 못하게 된 상황에서, 곧바로 그 자리를 대행한 학생들이."
63010-84 = "3;니코 스바루;05;그 트리니티의 상층부에서, 아무것도 없이 그 위치에 갈 수 있었을까요."
63010-85 = "#na;니코 스바루;그곳은 아무리 스스로 자기들의 현실을 부정하고 싶어도, 독사의 소굴이라는 사실을 떨쳐낼 수 없는 곳일 텐데요.\n#3;hide"
63010-86 = "3;니코 스바루;01\n#3;a"
63010-87 = "3;니코 스바루;99;알겠습니다. 그런 것이었다면 일단 선생님의 귀책은 매우 적거나, 아예 없는 것이라고도 해석할 수 있겠군요.\n#3;em;[음표]"
63010-88 = "3;니코 스바루;05;그렇다고 해서 아리우스가 그날 이후로도, 지옥의 한복판에서 한 발짝도 벗어날 수 없었다는 사실은 변하지 않겠지만요."
63010-89 = "[s] \"…….\""
63010-90 = "3;니코 스바루;01;조심하세요. 선생님. 선생님은 지금의 위치상, 어떤 학생들이 나쁜 마음을 먹고 선생님을 속이려고 하면."
63010-91 = "3;니코 스바루;99;웬만해서는, 그 올가미에서 벗어날 수 없으실 테니까요."
63010-92 = "3;니코 스바루;27;저는 가끔 이런 생각을 하곤 했습니다."
63010-93 = "3;니코 스바루;13;아리우스 아이들이 용기를 내어 나아가 본 세상에서, 오히려 더욱 큰 상처를 받고 돌아와야 했을 때."
63010-94 = "3;니코 스바루;13;어디에서도 적응하지 못하고, 주위의 시선을 견디지 못한 끝에, 살아온 대로밖에 살아갈 수 없다며 좌절하곤 했을 때."
63010-95 = "3;니코 스바루;05;그래서 세상 어디에도 아리우스 아이들이 있을 곳이 없다는 사실을 절감하곤 했을 때."
63010-96 = "3;니코 스바루;06;……아리우스가 트리니티로부터 추방되지 않았다면, 우리 아이들은 어떤 모습으로 살아갈 수 있었을까, 하고요."
63010-97 = "3;니코 스바루;03;선생님은 그런 생각, 한 번은 해 보셨나요?\n#3;em;[?]"
63010-98 = "3;니코 스바루;05;아니면 다른 학교들 사정을 돌보느라 너무 바빠서, 아리우스 같은 것은 아예 신경 쓸 대상도 아니셨나요?"
63010-99 = "[s] \"…….\""
63010-100 = "3;니코 스바루;99;……현재는 과거라는 기반 위에 만들어진 건축물입니다. 모든 현재는 과거와 결코 무관하지 않죠.\n#3;em;…"
63010-101 = "3;니코 스바루;27;누군가는 이것을, 우리의 것이 아닌 증오라고 이야기하겠지만."
63010-102 = "3;니코 스바루;13;저는 여전히, 그 관점에 동의하기 어렵다고 대답하겠습니다."
63010-103 = "3;니코 스바루;05;그 과거의 결과로 다다르게 된 것이 지금 아리우스의 현재이며, 그 현재가 모든 방식으로 아리우스를 옭아매고 있기 때문입니다."
63010-104 = "#all;hide"
63010-105 = "#na;니코 스바루;공부라는 이야기를 하셨던가요."
63010-106 = "#na;니코 스바루;학교에 나와 공부를 하는 것이야말로 학생이라고요."
63010-107 = "#na;니코 스바루;그렇다면 저는 이런 대답을 돌려드리고자 합니다."
63010-108 = "#all;hide"
63010-109 = "#na;니코 스바루;포르타 파시스. 여기에 기록된 모든 것이, 우리의 공부라고요."
63010-110 = "#na;니코 스바루;학생의 본분이 공부라고 하셨죠? 그렇다면 저는 제대로 행동한 것 같네요."
63010-111 = "#na;니코 스바루;저는 그 본분을 지키기 위해, 이곳으로 온 것이었으니까요."
63010-112 = "#na;니코 스바루;그런 건 공부가 아니라고, 만에 하나 선생님이 말씀하신다면."
63010-113 = "#na;니코 스바루;저는, 공부에 차등과 구분을 두는 것이 교육자의 자세인 것이냐고 되묻고자 합니다."
63010-114 = "#all;hide"
63010-115 = "#na;니코 스바루;인간의 죄는, 인간에게 이어집니다."
63010-116 = "#na;니코 스바루;그 사실만은, 모두가 인정해야 합니다."
63010-117 = "3;니코 스바루;99\n#3;a"
63010-118 = "3;니코 스바루;27;과거의 모든 혜택은 이어받으려 하면서, 그 죄는 이어받지 않겠다고 하는 것은 모순입니다."
63010-119 = "3;니코 스바루;13;만일 과거의 죄를 이어받지 않겠다고 거부하겠다면, 과거가 남긴 다른 모든 것들에 대해서도 마찬가지여야 합니다."
63010-120 = "3;니코 스바루;05;지식, 지혜, 유산, 물질적 풍요, 그리고 지금 행사할 수 있는 모든 권리와 권력……."
63010-121 = "3;니코 스바루;05;자기들의 배를 불려 줄 그런 것들은 당연하다는 듯이 받으려 하면서, 과거의 죄를 책임지지 않겠다고 하는 것은."
63010-122 = "#na;니코 스바루;아리우스가 보기에는, 구역질 나는 위선일 뿐입니다.\n#3;hide"
63010-123 = "3;니코 스바루;14\n#3;a"
63010-124 = "3;니코 스바루;99\n#3;em;[한숨]\n#wait;1200"
63010-125 = "3;니코 스바루;17;그날, 선생님이 트리니티의 방식을 인정하셨기에, 아리우스에 그 이상 간섭하지 않으셨다는 점은 이해했습니다."
63010-126 = "3;니코 스바루;05;저는 그 부분에서 선생님을…… 용서하지 않으려 합니다. 죄가 없는 자를 용서할 수는 없는 일이니까요."

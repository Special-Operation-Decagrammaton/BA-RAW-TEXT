[translation]
63010-1 = "ตอนที่ 1;ความเกลียดชังของเรา"
63010-3 = "ถ้าจะให้พูดตรงๆ คงต้องบอกว่าฉันประหลาดใจที่คุณครูเดินทางมาถึงปอร์ตาปาซิสเลยค่ะ"
63010-4 = "[s] \"นักเรียนหนีออกจากบ้านมา ครูก็ต้องมาตามตัวสิ\""
63010-5 = "หนีออกจากบ้านงั้นเหรอคะ? ถ้าใครมาได้ยินคงเข้าใจผิดนะคะ"
63010-6 = "บ้านของพวกฉันก็คือที่นี่ ที่อาเรียสค่ะ ฉันไม่เคยออกไปจากที่นี่ตั้งแต่แรกอยู่แล้ว"
63010-7 = "[s] \"ก็ถ้านักเรียนไม่เข้าเรียน ครูก็ต้องมาตามตัวสิ...\""
63010-8 = "แต่พวกฉันไม่เคยขอให้มาช่วยสอนหนังสือตั้งแต่แรกนะคะ..."
63010-9 = "[s1] \"เดี๋ยวเหอะ ทุกคนเป็นนักเรียนนะ\"\n[s2] \"ลืมไปแล้วเหรอว่าพวกเราเป็นนักเรียน\""
63010-14 = "[ns] \"เป็นนักเรียนก็ต้องไปโรงเรียนแล้วเรียนหนังสือสิ!\""
63010-15 = "แต่สุดท้ายแล้วการเรียนนั่นก็มาจากมาตรฐานของคุณครูไม่ใช่เหรอคะ?"
63010-16 = "ฉันคิดว่าอาเรียสต้องเรียนตามวิถีของอาเรียสค่ะ"
63010-17 = "หรือว่าคุณครูพยายามจะยัดเยียดการเรียนแบบทรีนิตี้ให้อาเรียสอยู่คะ?"
63010-21 = "ฮ่าฮ่า ทำหน้าเหมือนจะบอกว่า \"ไม่เคยพูดอย่างนั้น\" เลยนะคะ"
63010-22 = "ใช่ค่ะ คุณครูไม่ได้พูดอย่างนั้น"
63010-23 = "แต่ด้วยเหตุผลบางอย่าง ตอนนี้ฉันพอจะเข้าใจเรื่องพวกนี้แล้วค่ะ"
63010-24 = "อย่างน้อยก็เข้าใจเรื่องที่เกิดขึ้น... ภายในโรงเรียนสาขาอาเรียสแห่งนี้"
63010-25 = "ก่อนอื่นเลย ฉันไม่ค่อยถูกใจชื่อโรงเรียนสาขาอาเรียสสักเท่าไรค่ะ..."
63010-26 = "ก็มันบ่งบอกว่าเราเป็นโรงเรียนที่อยู่ใต้บังคับบัญชาของที่อื่นนี่คะ"
63010-27 = "งั้นฉันขอถามอะไรสักอย่าง คุณครูพอจะช่วยตอบได้มั้ยคะ?"
63010-29 = "ทำไมวันนั้น"
63010-39 = "วันที่ทรีนิตี้เหยียบย่างเข้าสู่อาเรียสเป็นครั้งแรกในรอบหลายร้อยปี"
63010-40 = "วันที่มิโซโนะ มิกะ เบียทริซ และสควอดกำหนดโชคชะตาของตัวเองกันตามอำเภอใจ"
63010-41 = "วันที่ส่งผลให้อาเรียสทุกคนตัดสินใจด้วยตัวเองไม่ได้"
63010-43 = "วันนั้นทำไมคุณครูถึงไม่ใส่ใจอาเรียส"
63010-44 = "เหมือนกับที่ใส่ใจมิโซโนะ มิกะกับสควอดล่ะคะ?"
63010-46 = "[ns] \"เรื่องนั้น...!\""
63010-48 = "(จู่ๆ บทสนทนาที่เกิดขึ้นหลังจาก 'วันนั้น' ก็แวบเข้ามาในสมอง)"
63010-50 = "ฉันขอโทษที่พูดแบบนี้นะคะ"
63010-51 = "แต่คุณครูคะ ช่วยวางมือจากปัญหาในโรงเรียนสาขาอาเรียสเถอะค่ะ"
63010-52 = "ใช่แล้วค่ะ ปัญหาเกี่ยวกับโรงเรียนสาขาอาเรียสเป็นสิ่งที่ทรีนิตี้ต้องแก้ไขด้วยตัวเองค่ะ"
63010-53 = "ฉันบอกได้แค่ฉันรู้สึกละอายใจที่ต้องมาขอความช่วยเหลือจากคุณครูถึงที่นี่"
63010-54 = "ในฐานะตัวแทนชั่วคราวคนปัจจุบันของกลุ่มปาเตอร์"
63010-55 = "และตัวแทนชั่วคราวคนปัจจุบันของกลุ่มซางตุส"
63010-59 = "ฉันขออภัยคุณครูเป็นอย่างสูงค่ะ"
63010-60 = "คุณมิกะยังเป็นตัวแทนของกลุ่มปาเตอร์อยู่ก็จริง แต่ก็ต้องถอยออกมาจากตรงนั้นสักระยะค่ะ"
63010-61 = "อย่างที่คุณครูทราบว่าคุณมิกะต้องเข้ารับการสืบพยานที่ถูกระงับไปก่อนด้วยค่ะ"
63010-62 = "ส่วนคุณเซอาก็เข้าร่วมการต่อสู้กับอาเรียสอย่างชัดเจน"
63010-63 = "แต่ร่างกายก็ยังฟื้นตัวไม่เต็มที่ ก็เลยต้องไปพักฟื้นอีกสักระยะค่ะ"
63010-64 = "เพราะงั้นฉันก็เลยอยากให้คุณครูช่วยมองว่านี่คือฉันทามติของกลุ่มปาเตอร์กับกลุ่มซางตุสค่ะ"
63010-65 = "ถึงแม้กลุ่มฟีเลียสของคุณนางิสะอาจเสนอความคิดเห็นที่แตกต่างออกไป"
63010-66 = "แต่โครงสร้างการตัดสินใจของสภาน้ำชาก็ถูกออกแบบให้ยึดมติของเสียงข้างมากอยู่แล้วค่ะ"
63010-67 = "ยิ่งเป็นเรื่องปัญหาที่สำคัญของโรงเรียน ในกลุ่มกลุ่มหนึ่งก็ย่อมไม่อาจเพิกเฉยต่อเสียงข้างมากจาก#nกลุ่มอื่นๆ ค่ะ"
63010-68 = "เพราะงั้น คุณครูคะ โปรดช่วยแค่เฝ้าดู และให้พวกฉันได้แก้ไขปัญหาของตัวเองด้วยเถอะค่ะ"
63010-69 = "หวังว่าคุณครูจะให้โอกาสพวกฉันอีกสักนิดนะคะ"
63010-70 = "แน่นอนว่าถ้าคุณครูเป็นคนออกมาจัดการเอง"
63010-71 = "ก็จะจัดการทุกอย่างได้รวดเร็วและมีประสิทธิภาพมากกว่าพวกฉันอยู่แล้ว"
63010-72 = "แต่ถ้าต้องพึ่งพาผู้ใหญ่ทุกเรื่อง นักเรียนก็คงไม่มีโอกาสได้พัฒนาตัวเองค่ะ"
63010-74 = "อ้อ เป็นอย่างนี้เองสินะคะ"
63010-78 = "[ns] \"?!?!\""
63010-79 = "ฮ่าฮ่าฮ่า ไม่ต้องตกใจถึงขนาดนั้นหรอกค่ะ"
63010-80 = "ฉันบอกไปแล้วนี่คะว่าถ้าเป็นเรื่องที่เกิดขึ้นที่นี่ ฉันก็พอรู้ได้น่ะ?"
63010-81 = "แต่คุณครูก็ช่างไร้เดียงสานะคะ หรือว่าเชื่อใจนักเรียนมากเกินไป โดยเฉพาะพวกชนชั้นสูงของทรีนิตี้น่ะ"
63010-82 = "ตัวแทนชั่วคราวของกลุ่มปาเตอร์และกลุ่มซางตุส"
63010-83 = "ในกรณีที่ตัวแทนของทั้ง 2 กลุ่มไม่สามารถปฏิบัติหน้าที่ได้ชั่วคราว ก็จะมีนักเรียนคนอื่นเข้ารับหน้าที่นั้นแทน"
63010-84 = "คุณครูคิดว่านักเรียนพวกนั้นเข้าไปอยู่ตรงนั้นได้โดยไม่มีเบื้องหลังอะไรในชนชั้นสูงงั้นเหรอคะ?"
63010-85 = "ต่อให้พวกนั้นจะพยายามปฏิเสธความจริงของตัวเองมากแค่ไหน พวกนั้นก็ไม่อาจลืมความจริงที่ว่า#nที่นั่นคือรังงูพิษได้หรอกค่ะ"
63010-87 = "ฉันเข้าใจแล้วค่ะ ถ้าเป็นอย่างนั้น ก็คงตีความได้ว่าคุณครูต้องรับผิดชอบต่อเรื่องนั้นน้อยมาก หรือไม่ก็ไม่ต้องรับผิดชอบเลยตั้งแต่แรก"
63010-88 = "ถึงมันจะไม่ได้เปลี่ยนแปลงความจริงที่ว่า นับตั้งแต่วันนั้นเป็นต้นมา อาเรียสก็ไม่อาจหลุดพ้นจาก#nขุมนรกได้ก็ตามทีค่ะ"
63010-89 = "[s] \"...\""
63010-90 = "ระวังนะคะ คุณครู ถ้ามีนักเรียนกลุ่มไหนที่มีเจตนาร้ายและพยายามหลอกลวงคุณครูจากสถานการณ์#nปัจจุบันละก็"
63010-91 = "คุณครูอาจจะหนีออกจากกับดักนั้นไม่ได้ก็ได้ค่ะ"
63010-92 = "บางครั้งฉันก็คิดแบบนี้ค่ะ"
63010-93 = "เวลาที่เด็กๆ อาเรียสตัดสินใจออกไปเผชิญโลกภายนอกอย่างกล้าหาญ แต่ก็ต้องกลับมาพร้อมบาดแผลที่ใหญ่กว่าเดิม"
63010-94 = "เวลาที่ต้องยอมจำนนกลับมาใช้ชีวิตตามเดิม เพราะปรับตัวกับที่ไหนไม่ได้และไม่อาจอดทนต่อสายตา#nคนรอบข้างได้"
63010-95 = "และในเวลาที่ฉันตระหนักได้ว่าเด็กๆ อาเรียสไม่มีที่ไหนในโลกให้ไปอีกแล้ว"
63010-96 = "ฉันจะคิดว่าถ้าอาเรียสไม่ได้ถูกทรีนิตี้ขับไล่ออกมา เด็กๆ ของพวกเราจะได้มีชีวิตแบบไหนกัน แบบนี้น่ะค่ะ"
63010-97 = "แล้วคุณครูเคยคิดแบบนั้นบ้างมั้ยคะ?"
63010-98 = "หรือว่ายุ่งกับการใส่ใจและดูแลธุระของโรงเรียนอื่น จนไม่มีเวลามาใส่ใจอาเรียสเลย?"
63010-99 = "[s] \"...\""
63010-100 = "ปัจจุบันถูกสร้างขึ้นโดยมีอดีตเป็นรากฐานค่ะ... และทุกอย่างในตอนนี้ ก็ล้วนแล้วแต่เป็นผลมาจากอดีตทั้งสิ้น"
63010-101 = "ใครบางคนอาจบอกว่านี่คือความเกลียดชังที่พวกเราไม่ได้เป็นเจ้าของ"
63010-102 = "แต่ฉันก็จะตอบว่า ฉันยังไม่เห็นด้วยกับมุมมองนั้นอยู่ดีค่ะ"
63010-103 = "นั่นก็เพราะอาเรียสในปัจจุบันเป็นผลลัพธ์จากอดีตนั้น และปัจจุบันก็ผูกมัดอาเรียสไว้ในทุกรูปแบบค่ะ"
63010-105 = "คุณครูพูดเรื่องการเรียนไว้ใช่มั้ยคะ?"
63010-106 = "ที่บอกว่านักเรียนต้องไปโรงเรียนและเรียนหนังสือ"
63010-107 = "ถ้างั้นฉันก็จะให้คำตอบแบบนี้ค่ะ"
63010-109 = "ทุกสิ่งที่บันทึกไว้ในปอร์ตาปาซิสคือการเรียนของพวกเราค่ะ"
63010-110 = "คุณครูบอกไว้ว่าหน้าที่หลักของนักเรียนก็คือการเรียนใช่มั้ยคะ? ถ้างั้นฉันก็คงทำถูกแล้วละค่ะ"
63010-111 = "ก็ฉันมาที่นี่เพื่อทำหน้าที่หลักที่ว่านั่นไงคะ"
63010-112 = "ถ้าคุณครูจะบอกว่าการทำแบบนั้นไม่ใช่การเรียนละก็"
63010-113 = "ฉันก็อยากถามกลับว่า การแบ่งระดับและการแยกย่อยการเรียนคือสิ่งที่เหมาะสมแล้วที่คนเป็นครูจะทำ#nหรือเปล่าค่ะ"
63010-115 = "บาปของมนุษย์ส่งต่อจากรุ่นสู่รุ่นค่ะ"
63010-116 = "ข้อเท็จจริงนี้เป็นสิ่งที่ทุกคนต้องยอมรับ"
63010-118 = "มันไม่สมเหตุสมผลเลยค่ะที่คนเราอยากได้ผลประโยชน์ทั้งหมดจากอดีต แต่ไม่อยากได้บาปจากอดีตนั้นเอง"
63010-119 = "ถ้าจะปฏิเสธที่จะรับบาปจากในอดีต เราก็ต้องปฏิเสธสิ่งอื่นๆ ที่อดีตทิ้งไว้ให้ด้วยสิคะ"
63010-120 = "ความรู้ ปัญญา มรดก ความมั่งคั่งทางวัตถุ สิทธิและอำนาจทั้งหมดที่ใช้ได้ในตอนนี้..."
63010-121 = "คนพวกนั้นพยายามจะรับสิ่งที่จะทำให้ตัวเองสุขสบาย แต่ปฏิเสธที่จะรับผิดชอบ#nต่อบาปในอดีตของตัวเอง"
63010-122 = "สำหรับอาเรียสแล้ว นี่คือความหน้าซื่อใจคดที่น่ารังเกียจค่ะ"
63010-125 = "ในวันนั้น ฉันเข้าใจว่าคุณครูยอมรับวิธีการของทรีนิตี้ ก็เลยไม่เข้ามาแทรกแซงอาเรียสอีก"
63010-126 = "และฉันก็... จะไม่ให้อภัยคุณครูในส่วนนั้นค่ะ ก็เราให้อภัยคนบริสุทธิ์ไม่ได้อยู่แล้วนี่คะ"
63010-127 = "แต่ฉันก็อยากให้คุณครูอนุญาตให้อาเรียสได้มีอิสระในการใช้ชีวิตตาม <วิถีของอาเรียส> ด้วยค่ะ"
63010-128 = "ถ้าทรีนิตี้มีวิถีของทรีนิตี้ อาเรียสก็มีวิถีของอาเรียสเหมือนกันค่ะ"
63010-129 = "คุณครูคงไม่บอกว่าเคารพอีกฝ่ายหนึ่ง แต่จะไม่เคารพอีกฝ่ายหนึ่งหรอกใช่มั้ยคะ?"
63010-130 = "[s] \"...\""
63010-131 = "พวกเราไม่เหมาะกับตรงนั้นหรอกค่ะ"
63010-132 = "ชีวิตข้างนอกนั้นดูหวานหอมก็จริง แต่ข้างนอกนั้นไม่มีที่สำหรับอาเรียสค่ะ"
63010-133 = "อย่างที่ฉันบอกไปว่ามีเด็กอาเรียสหลายคนที่ออกไปข้างนอกแต่ก็ต้องกลับมาเพราะปรับตัวไม่ได้ค่ะ"
63010-134 = "ฉันโอบรับเด็กพวกนั้นกลับมา และแนะแนวทางที่ถูกต้องตามแบบฉบับของอาเรียสให้ได้"
63010-135 = "ส่วนเรื่องการเรียนหรือการสอบน่ะไม่จำเป็นหรอกค่ะ เราจะใช้ชีวิตเหมือนที่เคยเป็นมา"
63010-136 = "เพราะงั้น ณ จุดนี้ ฉันเลยมีเรื่องอยากขอร้องคุณครูแค่เรื่องเดียวค่ะ"
63010-137 = "ได้โปรดออกไปจากอาเรียสอย่างเงียบๆ พร้อมกับพวกสควอดเถอะค่ะ"
63010-138 = "ถ้าทำอย่างนั้น ฉันก็จะไม่ทำร้ายคุณครูหรือสควอดแต่อย่างใดค่ะ"
63010-139 = "ส่วน <ทูตสวรรค์แห่งวิวรณ์>..."
63010-140 = "..."
63010-141 = "พวกฉันจะจัดการกันเองค่ะ เรื่องนั้นฉันรับประกันให้ได้ค่ะ"
63010-142 = "นั่นก็เพราะอย่างน้อย <นางฟ้าเป่าแตร> เป็นสิ่งที่ฉันรับมือได้อย่างแน่นอนค่ะ"

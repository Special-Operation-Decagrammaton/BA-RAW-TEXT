[translation]
10050070-1 = "Episode 7;One Last Chance"
10050070-2 = "Ah... Sensei. Hello..."
10050070-3 = "I, uh, got the gist of things."
10050070-4 = "[s] \"Sorry, Ui.\""
10050070-5 = "N-No... You... You, I don't mind too much."
10050070-6 = "But now that you mention it... One, two... Four?"
10050070-7 = "Ugh... Four may be too much for the old library. Don't disturb the children."
10050070-8 = "[s] \"W-We'll make sure to keep it down!\""
10050070-9 = "All right... Then, it's this way... Follow me..."
10050070-14 = "W-Welcome, Sensei. You really were here already."
10050070-15 = "Now this is a surprise guest appearance. And here, at Trinity, of all places!"
10050070-16 = "[s1] \"This seems like a serious situation, so let's get to the point.\"\n[s2] \"Why did you do something like this, Yakumo?\""
10050070-19 = "U-Ugh. No pleasantries today?"
10050070-20 = "All right. All right...*sigh*"
10050070-21 = "To get straight to the point, I did it to make money."
10050070-22 = "Th-This is hardly the situation for pride, President!"
10050070-23 = "But that's all. There's really nothing else..."
10050070-24 = "...Huh? You disagree? This was actually a terrible business decision?"
10050070-25 = "Coming to another school's district, selling books illegally... The risk doesn't match the reward?"
10050070-26 = "[s] \"The Yakumo I know would've calculated that down to the last cent.\""
10050070-27 = "Nonononono. You know me, I'm a go-with-the-flow type of gal!"
10050070-28 = "Ugh... Don't give me that look."
10050070-29 = "*sigh*"
10050070-30 = "All right, all right. I get it."
10050070-31 = "...So you want me to just get right into it? Ugh... Is this how adults converse?"
10050070-32 = "Then, Sensei. What do you think culture needs to grow?"
10050070-33 = "[s] \"Uh... People's love and interest?\""
10050070-34 = "I see. Love and interest..."
10050070-35 = "You're not necessarily wrong, but the idea itself is wrong."
10050070-36 = "Culture...is a living thing that feeds on money to grow. It's not that different from living organisms like us."
10050070-37 = "You think that's a bit extreme? No. It's sad, but it's the reality!"
10050070-38 = "To enjoy culture...is to spend your time...and money..."
10050070-39 = "...And for that price, people expect value: enjoyment, fun, laughter, that kind of thing."
10050070-40 = "At the very least, they want to walk away with a lesson or positive sentiment."
10050070-41 = "Sensei. Have you ever thought on how many things are written each day?"
10050070-42 = "There's an idealistic belief out there that as long as you make something good, people will see it."
10050070-43 = "But, even as we speak, thousands of new books, articles, and social media posts are being written."
10050070-44 = "I said each day, but that's too broad of a measurement. An inconceivable amount of cultural content pours out into the world by the hour, minute, second."
10050070-45 = "And most of it is shunted to the side, forgotten and discarded."
10050070-46 = "...It's unfair. It's sad."
10050070-47 = "[s] \"...\""
10050070-48 = "This boxing match we call the market... If they can at least have a moment to stand proudly in the ring before they lose, that would be understandable."
10050070-49 = "They'll learn from the failure. One day, they'll build up enough courage to try again."
10050070-50 = "...Or maybe they won't. Some of them will stumble on the first round and never get back up again."
10050070-52 = "But the reality is that most of them won't even get to step into the ring."
10050070-53 = "They're sidelined and forced to cheer for the lucky champion who happened to win."
10050070-54 = "Do you remember when you were a child? Children always want to be something they're not."
10050070-55 = "They want to do this, make that, prove themselves and be acknowledged..."
10050070-57 = "That's just the human experience. The need for validation."
10050070-58 = "But dreams have expiration dates. A stagnated dream is a spoiled one."
10050070-59 = "Having no dream is a tragedy, but even worse is hanging on to a rotten, spoiled one. There's that saying."
10050070-60 = "Why implant the desire..."
10050070-61 = "...and then deny me the talent?"
10050070-63 = "[ns3] \"I know I sound like an uptight adult if I say this...\"\n[ns4] \"...but aren't you too young to be thinking like that?\""
10050070-66 = "...Tell me about it."
10050070-67 = "I think that, regardless of age, there are children all over the world who feel that way, though."
10050070-68 = "Anyway, my point is this. "
10050070-69 = "Everyone deserves a chance to stand in the ring at least once. Whether it makes your dreams come true or shatters them, at least you had your chance."
10050070-70 = "And the one with the key to the ring...is marketing."
10050070-71 = "Being labeled a failure without even a chance to prove yourself... I find it cruel."
10050070-72 = "However, there isn't actually a key that marketing holds. It's money. Money is the key that lets people into the fight."
10050070-73 = "Because culture grows on soil called money, and someone needs to cultivate that soil."
10050070-74 = "...Anyway, so that's how we got here."
10050070-78 = "[ns5] \"But, if money is so important...\"\n[ns6] \"...then why are you working in printed media and publishing?\""
10050070-81 = "What?!"
10050070-82 = "[s7] \"There are much better industries when it comes to making money.\"\n[s8] \"Distribution, logistics, finance, the list goes on.\""
10050070-85 = "Hrgh?!"
10050070-86 = "You! You hit the nail right on the head...!"
10050070-91 = "[ns] \"Was that too far?\""
10050070-93 = "No, no! That was excellent, Sensei! Sometimes, the president needs someone to tap on the brakes in her stead."
10050070-94 = "However, I don't find myself in total opposition to her words."
10050070-95 = "Truly, who would go into publishing for the money?"
10050070-96 = "[s] \"Then, Yakumo also...?\""
10050070-97 = "Fufu. Who knows?"
10050070-98 = "And, why would I, a critic, work for a president like that?"
10050070-99 = "Yes. It's as you expect. I'm in a related industry because I enjoy culture, and it's even better if I make money out of it."
10050070-100 = "And it's best if it's promoted well."
10050070-101 = "Greedy and twisted, isn't she? That's who she is at her core."
10050070-102 = "This whole subject...she wouldn't have acknowledged it if not for you, Sensei."
10050070-103 = "After all, why would a twisted, immoral person find it so difficult to talk about this? Using metaphors and euphemisms to get around it?"
10050070-104 = "Because she's talking about herself, of course."
10050070-105 = "For instance, who never had her chance to stand in the ring? Who is bitter about having all of the motivation, and none of the talent?"
10050070-106 = "Things to consider."
10050070-107 = "[s] \"Then...do you mean...?\""
10050070-108 = "Fufu. Some things are better left to the imagination, Sensei."
10050070-109 = "...Don't say weird things, Takane. You'll bring bad luck, and we might not get our very well-deserved payout."
10050070-110 = "Yes, yes. Understood, President."
10050070-112 = "[ns9] \"I understand where the Publishing Department is coming from.\"\n[ns10] \"But regardless of the motivations, lying is never okay.\""
10050070-115 = "Huh? Lying? What do you...?"
10050070-116 = "[s11] \"For example, calling Takane a princess...\"\n[s12] \"Amongst other things...\""
10050070-119 = "H-How did you know...? Did Takane...?"
10050070-120 = "Reflect on your actions, President! You went too far with that!"
10050070-121 = "I'm still terribly embarrassed!"
10050070-122 = "[s13] \"Anyway, I'll sort things out for you.\"\n[s14] \"So your job is to end this business venture. Here and now.\""
10050070-125 = "Okaaay..."
10050070-132 = "B-Bad news. Sensei! The Justice Task Force students...are coming your way!"

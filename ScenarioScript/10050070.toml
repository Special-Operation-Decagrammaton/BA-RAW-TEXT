[translation]
10050070-1 = "ตอนที่ 7;One Last Chance"
10050070-2 = "อ่า... คุณครู สวัสดี... ค่ะ..."
10050070-3 = "เอ่อ... ฉันพอได้ยินเรื่องมาบ้างแล้วค่ะ... เชิญเข้ามาก่อนเถอะค่ะ"
10050070-4 = "[s] \"ขอโทษด้วยนะ อุย\""
10050070-5 = "มะ... ไม่เป็นไรค่ะ... คุณครูเป็นที่ต้อนรับที่นี่เสมอค่ะ..."
10050070-6 = "แต่พอมาคิดดูแล้ว ตอนนี้เรามีคุณครู ฉัน แล้วก็ผู้หลบหนีอีก 2 คน... งั้นก็รวมเป็น 4 คน...?"
10050070-7 = "อะ... อึก... การมี 4 คนในห้องสมุดเก่า มันเหมือนจะเยอะเกินไปเลย..."
10050070-8 = "[s] \"คะ... ครูไม่ก่อเรื่องวุ่นวายหรอก!\""
10050070-9 = "ค่ะ... ถ้างั้นก็ เชิญทางนี้ค่ะ... ตามฉันมาได้เลยค่ะ..."
10050070-14 = "ชะ... เชิญค่ะ คุณครู มาที่ทรีนิตี้จริงๆ ด้วยสินะคะ..."
10050070-15 = "ไม่คิดเลยนะคะว่าจะได้เจอคุณครูในทรีนิตี้ แล้วยังเจอในสถานที่แบบนี้อีก..."
10050070-16 = "[s1] \"ครูขอเข้าเรื่องเลยนะ ทำไมถึงมาก่อเรื่องแบบนี้เหรอ?\"\n[s2] \"ทำไมถึงมาก่อเรื่องแบบนี้ล่ะ ยาคุโมะ??\""
10050070-19 = "อะ... อึก จะเข้าประเด็นโดยไม่ถามไถ่สารทุกข์สุกดิบกันก่อนเหรอคะ?"
10050070-20 = "ก็ได้ค่ะ เข้าใจแล้วค่ะ... เฮ้อ... "
10050070-21 = "ถ้าจะให้สรุปเลยละก็ ฉันทำไปแบบนั้นเพราะต้องการหาเงินค่ะ"
10050070-22 = "พะ... พูดแบบนั้นได้เลยเหรอคะ หัวหน้า?!"
10050070-23 = "ก็เหตุผลทั้งหมดเป็นแบบนี้นี่คะ แล้วจะให้พูดอย่างอื่นเหรอ..."
10050070-24 = "คะ...? เหตุผลแค่นั้นไม่พอที่จะทำให้เชื่อ แล้วมันก็เป็นทางเลือกที่ไม่เหมาะกับนักธุรกิจด้วย?"
10050070-25 = "การเข้ามาทำการค้าในเขตปกครองตนเองของโรงเรียนอื่นมีแต่จะสร้างความเสี่ยงมากกว่ารายได้ งั้นเหรอคะ...?"
10050070-26 = "[s] \"ครูว่ายาคุโมะน่าจะประเมินได้อยู่นะ\""
10050070-27 = "ไม่ค่ะ ไม่ๆ ฉันประเมินไม่ได้ถึงขนาดนั้นหรอกค่ะ ฉันแค่เดาคร่าวๆ เอาน่ะค่ะ"
10050070-28 = "อึก... มองกันด้วยสีหน้าที่ไม่เชื่อกันเลยนะคะ..."
10050070-29 = "เฮ้อ..."
10050070-30 = "ก็ได้ค่ะ อืม คุณครูเองก็คงอยากให้พูดเข้าเรื่องเลยเร็วๆ ถ้างั้นฉันก็ต้อง..."
10050070-31 = "แต่ถึงยังไง ถ้าจะให้พูดเข้าประเด็นเลย มันก็รู้สึกแปลกๆ อยู่บ้างนะคะ... อ๊ะ หรือว่านี่คือวิธีการพูดของผู้ใหญ่คะ...?"
10050070-32 = "ถ้างั้นก็... คุณครูคะ คุณครูคิดว่าวัฒนธรรมเติบโตขึ้นบนพื้นฐานอะไรคะ?"
10050070-33 = "[s] \"อืม... ความรักและความสนใจของผู้คนเหรอ?\""
10050070-34 = "อย่างนั้นสินะคะ ความรักและความสนใจ..."
10050070-35 = "ถึงจะไม่ผิด แต่ก็ไม่ถูกเสียทีเดียวค่ะ"
10050070-36 = "วัฒนธรรมก็คือ... บางอย่างที่มีชีวิตและเติบโตได้ด้วยเงินค่ะ ไม่ต่างจากสิ่งมีชีวิตอย่างพวกเราหรอกค่ะ"
10050070-37 = "ฉันพูดรุนแรงไปหน่อยงั้นเหรอคะ? ไม่หรอกค่ะ ถึงจะน่าเศร้า แต่นี่คือความจริงค่ะ!"
10050070-38 = "พูดกันตามตรงนะคะ... การที่เราเพลิดเพลินกับสื่อบันเทิงหรือวัฒนธรรมต่างๆ... ก็คือการที่เรายอมใช้เงินและเวลาของตัวเองไปแลกมันมาค่ะ"
10050070-39 = "แล้วเราก็หวังว่าจะได้สิ่งตอบแทนจากการกระทำนั้นค่ะ... ไม่ว่าจะเป็นความสนุกสนาน ความรื่นเริง หรือเสียงหัวเราะ"
10050070-40 = "หรือถ้าไม่ได้รับสิ่งเหล่านั้น จะเป็นความประทับใจหรือบทเรียนก็ได้ค่ะ"
10050070-41 = "คุณครูคะ เคยลองคิดบ้างหรือเปล่าล่ะคะว่าวันหนึ่งๆ มีการเขียนงานสร้างสรรค์กันเยอะแค่ไหน?"
10050070-42 = "หลายคนอาจจะคิดง่ายๆ ว่าถ้าเขียนงานดีๆ ได้ เดี๋ยวก็คงขายได้และมีคนอ่านเอง... แต่นั่นคือความเชื่อที่ผิดค่ะ"
10050070-43 = "นั่นก็เพราะว่า แม้แต่ในขณะนี้เอง... ก็มีบทความและข้อมูลมากมายหลั่งไหลอยู่ข้างนอกนั่นค่ะ"
10050070-44 = "เมื่อกี้ฉันบอกว่าวันหนึ่งใช่มั้ยล่ะคะ แต่ที่จริงมันไม่ได้มีแค่นั้นด้วยค่ะ โลกของเรามีสื่อทางวัฒนธรรม#nผลิตออกมาในทุกชั่วโมง ทุกนาที ทุกวินาที จนนับไม่หวาดไม่ไหวเลยละค่ะ"
10050070-45 = "และในบรรดาทั้งหมด ส่วนใหญ่ก็ถูกลืมเลือนและหายไปในที่สุดค่ะ"
10050070-46 = "เรื่องแบบนั้นช่างไม่ยุติธรรมและน่าเศร้าไม่ใช่เหรอคะ...?"
10050070-47 = "[s] \"......\""
10050070-48 = "แทนที่จะยอมให้เป็นอย่างนั้น ฉันว่าการเข้าไปในสังเวียนตลาดแล้วแพ้อย่างยุติธรรม ยังจะดีเสียกว่าค่ะ"
10050070-49 = "การทำแบบนั้นจะทำให้บางคนได้รับบทเรียนจากครั้งนี้ และบางคนก็จะเกิดความกล้าที่จะทำให้ดีกว่า#nในครั้งต่อไป"
10050070-50 = "หรือบางคนก็อาจจะยอมแพ้ แล้วบอกว่านี่ไม่ใช่เส้นทางที่เหมาะกับตัวเองก็ได้ค่ะ..."
10050070-52 = "แต่ถึงยังไง สื่อทางวัฒนธรรมส่วนใหญ่แทบไม่มีโอกาสได้ขึ้นสังเวียนกันเลยด้วยซ้ำ..."
10050070-53 = "และก็ได้แต่อิจฉาแชมป์ที่ถือถ้วยรางวัลชนะเลิศและโห่ร้องด้วยความดีใจค่ะ..."
10050070-54 = "จำตอนที่ยังเป็นเด็กได้มั้ยคะ? เด็กๆ ล้วนอยากเป็นในสิ่งที่ไม่ใช่ตัวเองค่ะ"
10050070-55 = "ฉันอยากเป็นแบบนั้น ฉันอยากสร้างของแบบนี้  ฉันอยากพิสูจน์ตัวเองและได้รับการยอมรับ..."
10050070-57 = "แต่ไม่ใช่แค่เด็กเท่านั้นหรอกค่ะที่เป็นแบบนั้น ในฐานะมนุษย์คนหนึ่ง การคิดแบบนั้นเป็นเรื่องธรรมชาติค่ะ"
10050070-58 = "แต่ว่า คุณครูคะ ถ้าหมักความฝันไว้นานเกินไป ในที่สุดมันก็จะเน่าเสียค่ะ"
10050070-59 = "การไม่มีความฝันเป็นเรื่องน่าเศร้า แต่การติดอยู่ในความฝันไปตลอดก็เป็นเรื่องน่าเศร้าไม่แพ้กันค่ะ มีคำกล่าวแบบนี้ด้วยไม่ใช่เหรอคะ?"
10050070-60 = "ที่บอกว่า \"ถ้ามอบความปรารถนาให้..."
10050070-61 = "ก็ควรจะมอบพรสวรรค์มาให้ด้วยสิ\""
10050070-63 = "[ns3] \"พูดอย่างกับเป็นผู้ใหญ่ที่ล้มเหลวเลย...\"\n[ns4] \"เพิ่งอายุเท่าไรเอง ทำไมพูดอะไรน่าเศร้าแบบนี้ล่ะ...\""
10050070-66 = "นั่นน่ะสิคะ..."
10050070-67 = "แต่ในมุมหนึ่งของโลกนี้ ก็ยังมีคนที่ต่อให้จะอายุเท่าไร ก็ไม่มีทางเลือกอื่น#nนอกจากต้องพูดแบบนั้นนะคะ?"
10050070-68 = "แต่ก็เอาเถอะค่ะ ประเด็นของฉันก็คือ "
10050070-69 = "ถ้าจะเผชิญหน้ากับความฝัน จะก้าวไปข้างหน้า หรือจะเผชิญกับความล้มเหลว เราก็ต้องก้าวขึ้นสู่สังเวียนอย่างน้อยสักครั้งหนึ่งค่ะ"
10050070-70 = "และสิ่งที่จะพาเราขึ้นสู่สังเวียนได้ก็คือ... การโปรโมตและการตลาดค่ะ"
10050070-71 = "ถ้าเราถูกตัดสินให้แพ้โดยที่ยังไม่มีโอกาสได้สู้เลย มันก็ดู... โหดร้ายไปหน่อยว่ามั้ยล่ะคะ?"
10050070-72 = "เพราะอย่างนั้นละค่ะเงินถึงสำคัญ ก็การพาผู้คนไปให้ถึงสังเวียนเป็นเรื่องที่สำคัญนี่คะ"
10050070-73 = "วัฒนธรรมเป็นสิ่งที่เติบโตบนผืนดินที่เรียกว่าเงิน และต้องมีใครสักคนคอยดูแลผืนดินนั้นด้วยค่ะ"
10050070-74 = "เรื่องครั้งนี้มันก็ไหลไปตามสถานการณ์ จนจับพลัดจับผลูมาเป็นแบบนี้ละค่ะ"
10050070-78 = "[ns5] \"แต่ถ้าเงินสำคัญขนาดนั้น ก็ไม่ควรทำมาธุรกิจนี้หรือเปล่า?\"\n[ns6] \"แต่ถ้าเงินสำคัญขนาดนั้น ก็ไม่ควรมาทำกิจการนี้หรือเปล่า?\""
10050070-81 = "คะ?!?!"
10050070-82 = "[s7] \"น่าจะมีวิธีอื่นที่ทำเงินเป็นกอบเป็นกำได้นะ?\"\n[s8] \"พวกการค้าปลีกหรือไม่ก็ธุรกิจการเงินน่าจะดีกว่ามั้ย?\""
10050070-85 = "เฮือก?!"
10050070-86 = "พูดซะ... ตรงจุดเลย... นะคะ...!"
10050070-91 = "[ns] \"ครูพูดแรงเกินไปหรือเปล่านะ...\""
10050070-93 = "ไม่ค่ะ ไม่เลยค่ะ! เป็นประเด็นที่ดีเลยค่ะคุณครู! พูดได้ดีแล้วค่ะ! ถ้าปล่อยให้หัวหน้าอยู่ในสภาพหิวเงิน#nแบบนั้นต่อไป ก็จะยิ่งทำอะไรตามอำเภอใจชอบไปเรื่อยๆ ค่ะ"
10050070-94 = "แต่ว่า... สิ่งที่หัวหน้าของฉันพูดก็ไม่ได้ผิดไปเสียทีเดียวหรอกค่ะ"
10050070-95 = "ถ้าหัวหน้าเป็นคนที่สนใจแต่เงินอย่างที่คุณครูว่าละก็ คิดว่าทำไมถึงมาอยู่ในธุรกิจสื่อสิ่งพิมพ์ล่ะคะ?"
10050070-96 = "[s] \"หรือว่ายาคุโมะเองก็...?\""
10050070-97 = "ฮุฮุ คิดว่ายังไงล่ะคะ?"
10050070-98 = "อีกอย่างนะคะ แล้วทำไมนักวิจารณ์อย่างฉันถึงมาทำงานภายใต้การดูแลของหัวหน้าตั้งแต่แรกล่ะคะ?"
10050070-99 = "ใช่ค่ะ ก็อย่างที่คุณครูคาดเดาได้ค่ะ สุดท้ายแล้วพวกฉันก็คือคนที่ชอบวัฒนธรรม ก็เลยมาทำงานที่เกี่ยวข้อง และถ้าหาเงินได้ด้วยก็ยิ่งดีค่ะ"
10050070-100 = "แล้วถ้าโปรโมตวัฒนธรรมไปด้วยได้ ก็จะยิ่งดีที่สุด ใช่มั้ยล่ะคะ?"
10050070-101 = "คนอะไรก็ไม่รู้ ทั้งโลภและความคิดบิดเบี้ยวสุดๆ ไปเลยใช่มั้ยคะ? หัวหน้าของฉันเป็นคนแบบนั้นละค่ะ"
10050070-102 = "ถึงฉันจะไม่อยากยอมรับเรื่องแบบนี้ต่อหน้าคนอื่นเลยก็เถอะ"
10050070-103 = "แต่ลองคิดดูสิคะคุณครู ทำไมคนที่มีความคิดบิดเบี้ยวแบบนั้นถึงใช้คำอุปมาอุปไมยอย่างคำว่าพรสวรรค์ และสังเวียน"
10050070-104 = "แล้วยังพูดเปิดเผยตัวเองอย่างตรงไปตรงมาล่ะคะ?"
10050070-105 = "แล้วคนที่ไม่มีแม้แต่โอกาสที่จะขึ้นสังเวียนจนทำได้แต่อิจฉาแชมป์ และอยากตัดพ้อว่า ถ้าให้ความปรารถนามาแล้ว ทำไมไม่ให้พรสวรรค์มาด้วย..."
10050070-106 = "คุณครูว่าท้ายที่สุดแล้วคนคนนั้นคือใครคะ?"
10050070-107 = "[s] \"งั้นก็... หมายความว่า?\""
10050070-108 = "ฮุฮุ คิดว่ายังไงล่ะคะ? เรื่องบางเรื่อง ละไว้ในฐานที่เข้าใจและไม่ต้องพูดออกมาน่าจะดีกว่าใช่มั้ยคะ?"
10050070-109 = "อย่าพูดอะไรแปลกๆ นะคะ ทาคาเนะ... แบบนั้นจะทำให้เกิดลางร้ายค่ะ บางทีอาจกระทบต่อรายได้#nของเราก็ได้นะคะ"
10050070-110 = "ค่า ค่า ตรงไปตรงมาดีจังเลยนะคะ"
10050070-112 = "[ns9] \"ครูพอเข้าใจแล้วละ แต่ถ้าถึงกับโกหกกันแบบนี้ละก็\"\n[ns10] \"ครูไม่ยอมให้โกหกและทำธุรกิจที่มีความเสี่ยงแบบนี้หรอก\""
10050070-115 = "คะ? โกหกงั้นเหรอคะ หมายความว่ายังไง...?"
10050070-116 = "[s11] \"ก็เรื่องที่บอกว่าทาคาเนะเป็นท่านหญิงไง...\"\n[s12] \"ก็ที่แต่งเรื่องให้ทาคาเนะเป็นท่านหญิงไง...\""
10050070-119 = "คะ... คุณครูรู้เรื่องนี้ได้ยังไง...? หรือว่า ทาคาเนะ?!"
10050070-120 = "ยอมรับผิดเถอะค่ะ หัวหน้า! แต่งเรื่องมาหลอกลวงลูกค้าแบบนี้มันเกินไปจริงๆ นี่คะ!"
10050070-121 = "แม้แต่ตอนนี้ ฉันก็ยังอายจนอยากแทรกแผ่นดินหนีอยู่เลยค่ะ...!"
10050070-122 = "[s13] \"ไว้ครูจะไปช่วยพูดให้เอง\"\n[s14] \"ยังไงก็หยุดการขายนี้ไว้แค่นี้เถอะนะ\""
10050070-125 = "ค่ะ..."
10050070-132 = "กะ... เกิดเรื่องใหญ่แล้ว คุณครู! ตอนนี้สมาชิกชมรมทวงความยุติธรรม... กำลังแห่กันมาที่นี่แล้ว!"

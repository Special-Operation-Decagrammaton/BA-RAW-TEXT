[translation]
10050070-1 = "第7話;One Last Chance"
10050070-2 = "啊……老師你好……"
10050070-3 = "那個，事情我大致聽說了……請先進來吧。"
10050070-4 = "[s]「抱歉打擾你了，憂。」"
10050070-5 = "不，不會……老師是可以進來這裡的人……"
10050070-6 = "但是老師和我，再加上他們兩個……總共是四個人……？"
10050070-7 = "唔，唔唔……這座古書館裡擠四個人，果然還是太多了……"
10050070-8 = "[s]「我，我會盡量避免吵鬧的！」"
10050070-9 = "嗯……那麼請往這邊……跟我來吧……"
10050070-14 = "歡，歡迎您，老師。#n原來您真的在三一啊……"
10050070-15 = "沒想到能在三一見到老師，而且還是在這種地方……"
10050070-16 = "[s1]「情況看起來很不妙，我們就趕緊進入正題吧。」\n[s2]「為什麼會鬧出這種事呢，八雲？」"
10050070-19 = "嗚嗚……就連閒聊或破冰的環節都沒有嗎……"
10050070-20 = "好嘛，我知道了啦……唉。"
10050070-21 = "總之結論就是為了賺錢。"
10050070-22 = "這，這樣會不會說的太理直氣壯了啊，部長！？"
10050070-23 = "啊事實就是這樣啊。#n老實說，難道還能為了其他原因嗎……"
10050070-24 = "……咦？只有這個理由你無法接受？因為這不像是生意人會做的選擇？"
10050070-25 = "跑到其他學園的自治區做這種事的風險，跟回報相較之下實在划不來……？"
10050070-26 = "[s]「我相信八雲一定能算到這點的。」"
10050070-27 = "不不不，我哪有能力計算到這種程度啊！？#n完全只是隨便做做的好嗎？"
10050070-28 = "嗚，就算你用那種懷疑的表情盯著我看……"
10050070-29 = "……唉。"
10050070-30 = "我明白了。既然老師希望快點切入正題……"
10050070-31 = "唉呦，我還是不習慣直奔主題耶……啊，難道這就是所謂大人的話術嗎……"
10050070-32 = "那麼老師──你認為「文化」是靠什麼東西成長的呢？"
10050070-33 = "[s]「唔嗯……比如人們的愛與關心？」"
10050070-34 = "愛與關心啊……"
10050070-35 = "雖然遺憾，但是那個想法是錯誤的。"
10050070-36 = "所謂的文化……可說是以金錢為食的一種生物。#n本質上和我們這樣的生命體沒什麼不同。"
10050070-37 = "覺得這種言論好像有點極端？#n不，這就是可悲的現實！"
10050070-38 = "享受文化媒體的行為……#n假如換個說法，就是在將自己的時間與另一種交換價值花費在那上面。#n而另一種交換價值……說白了就是錢。"
10050070-39 = "……並且人們會希望從中得到諸如樂趣、喜悅，或者歡笑之類的回報。"
10050070-40 = "如果沒有的話就退而求其次，哪怕只是從中得到感動或教訓也可以。"
10050070-41 = "老師，你有想過「一天之內有多少文章被寫出來」這樣的問題嗎？"
10050070-42 = "人們總是單純地以為，只要做出好東西自然會被看見……然而那完全是在幻想。"
10050070-43 = "因為即便是此時此刻，也有太多太多的文字……以及資訊在傾瀉而出。"
10050070-44 = "雖然我剛才說「一天之內」，實際上卻遠遠不只這種程度。#n每個小時、每一分鐘，甚至是每一秒……都有超乎想像的文化媒體正不斷湧現。"
10050070-45 = "並且其中的絕大部分都會被遺忘、消逝，最終化為烏有。"
10050070-46 = "這難道……不是一件令人委屈又悲傷的事嗎？"
10050070-47 = "[s]「……」"
10050070-48 = "要是能站上名為「市場」的擂台，堂堂正正地輸一次也好啊。"
10050070-49 = "有人會從中得到「下次要表現得更好」的勇氣，有人則會從中學到教訓。"
10050070-50 = "……又或者是認清這不是自己該走的路，乾脆選擇放棄。"
10050070-52 = "但是大多數的人終其一生，卻連站上擂台的機會都沒有……"
10050070-53 = "……只能望著舉起獎盃歡呼的冠軍暗自羨慕。"
10050070-54 = "還記得小時候的自己嗎？#n小孩子總是對自己以外的人事物充滿嚮往。"
10050070-55 = "想變成那樣、想做出那種東西、想要證明自己……"
10050070-57 = "當然也不只是小孩子……那是生而為人自然會產生的想法。"
10050070-58 = "可是老師……夢想放久了也是會變質的。"
10050070-59 = "有句話不是說「沒有夢想是悲劇，但永遠被夢想所困也同樣是悲劇」嗎？"
10050070-60 = "既然賦予了那樣的渴望──"
10050070-61 = "──為何不連相應的才能也一起賦予呢？"
10050070-63 = "[ns3]「聽起來怎麼像沒出息的大人才會說的話……」\n[ns4]「你才幾歲而已，怎麼就已經在說這種話了……」"
10050070-66 = "……這倒是沒錯。"
10050070-67 = "不過撇開年齡不談，世上想必存在著不得不說出這種話的孩子吧？"
10050070-68 = "總之，這就是我想表達的重點。 "
10050070-69 = "想要面對自己的夢想──#n無論結果是能向前邁進或粉身碎骨，至少都得先站上擂台才行。"
10050070-70 = "而幫助他們走上擂台的……就是宣傳與行銷。"
10050070-71 = "連戰鬥的機會都得不到就被宣判失敗……這不是很殘酷嗎？"
10050070-72 = "所以錢是很重要的──因為引導人們走上擂台，是件舉足輕重的事。"
10050070-73 = "既然文化是在名為金錢的土壤上成長，就必須有人負責耕耘那片土壤。"
10050070-74 = "至於這次的事嘛……也是出於這樣的想法，結果不知不覺就變成這樣了。"
10050070-78 = "[ns5]「可是話又說回來，既然錢那麼重要的話……」\n[ns6]「你反而不該做出版業不是嗎？」"
10050070-81 = "咦咦！？！？"
10050070-82 = "[s7]「真正能賺錢的工作應該還有很多選擇吧？」\n[s8]「比如物流或金融之類的。」"
10050070-85 = "咕啊！？"
10050070-86 = "老師這話還真是，一針見血呢……！"
10050070-91 = "[ns]「我是不是說得太過分了……」"
10050070-93 = "不不不！老師的指謫簡直恰到好處！#n要是繼續放任變成那樣的部長，他只會沒完沒了地暴走而已。"
10050070-94 = "不過……部長說的也不是完全錯誤的。"
10050070-95 = "就像老師說的一樣……#n假如部長真的是個眼裡只有金錢的人，又何必選擇做出版業呢？"
10050070-96 = "[s]「難道說，八雲他也……？」"
10050070-97 = "呵呵。您覺得呢？"
10050070-98 = "而且身為評論家的我，又為何會在部長手下工作呢？"
10050070-99 = "沒錯，答案正如您所猜測的一樣。#n我們終究是因為喜歡文化才會從事相關工作的。"
10050070-100 = "當然要是可以賺錢又能宣傳出去的話，那就更完美了。"
10050070-101 = "真是既貪心又彆扭對吧？部長他就是那樣的人。"
10050070-102 = "雖然這些心裡話，他在其他人面前應該打死都不會承認就是了。"
10050070-103 = "您不妨想想看，老師。#n為何一個如此彆扭的人，會用「才能」或「擂台」之類的比喻呢？"
10050070-104 = "……他會不會其實是在坦白自己的心聲呢？"
10050070-105 = "像是連站上擂台的機會都沒有、只能羨慕舉起獎盃歡呼的冠軍……#n或者既然賦予了渴望，為何不連才能一同賦予……"
10050070-106 = "這些話究竟是在說誰呢？"
10050070-107 = "[s]「莫非……？」"
10050070-108 = "呵呵。這就任憑您自行想像了。#n有些故事正是因為沒有說破，才讓它更趨近於完整對吧？"
10050070-109 = "……少在那邊胡說八道了，貴音。小心會招來厄運哦？#n到時候連該入帳的款項都會進不來的哦？"
10050070-110 = "是是是。部長說的都對。"
10050070-112 = "[ns9]「出版部的立場我明白了。但是……」\n[ns10]「不惜撒謊也要做危險的生意，果然還是不行。」"
10050070-115 = "嗯？您說撒謊指的是……？"
10050070-116 = "[s11]「比如貴音『公主殿下』……」\n[s12]「還有其他諸如此類的東西……」"
10050070-119 = "老，老師您怎麼會……？#n難道是貴音他……！？"
10050070-120 = "請反省一下吧，部長！那樣真的太過分了！"
10050070-121 = "我到現在還是羞恥得想死……！"
10050070-122 = "[s13]「總之我會想辦法去談一談。」\n[s14]「這次的生意就先收手吧。」"
10050070-125 = "是……"
10050070-132 = "大，大事不妙了！老師！#n現在實現正義部的學生們……正在往你們那邊過去！"

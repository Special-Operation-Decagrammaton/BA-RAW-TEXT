[translation]
103070-1 = "Episode 7; Utnapishtim's Ship 2"
103070-4 = "So, um... Do you have any thoughts, Engineering Department?"
103070-5 = "Yes. I understand completely."
103070-6 = "Th-That's wonderful!"
103070-7 = "I understand that we will never, in any universe, ever understand the structure of this battleship."
103070-8 = "...Wh-What?!"
103070-10 = "I can't grasp the battleship's fuel, propellants, operating principles, engine structure, or design at all."
103070-11 = "W-Well! This is an artifact that cannot be understood with our current knowledge of technology and engineering! It makes sense that we can't understand it!"
103070-12 = "*sigh* ...I thought that researching this would help our long-cherished dream..."
103070-13 = "It won't help us even one iota. "
103070-15 = "I-Is that so...?"
103070-16 = "Oh, but don't worry!"
103070-17 = "We may not understand how it works, but what we can do is figure out how to run it!"
103070-21 = "What do I mean? Just because you don't know the structure of a car engine, that doesn't mean you can't drive it, right?"
103070-23 = "As a simple interpretation, all operational systems can be viewed as a device for transforming input data into output data."
103070-24 = "If we can understand the conversion process inductively, we can still take advantage of its functions even without understanding the structure."
103070-26 = "In other words, step on an accelerator to accelerate, step on a brake to decelerate, turn a steering wheel to change directions..."
103070-27 = "If we can organize that information, we can create a piloting manual without having to know how the technology actually works."
103070-28 = "That...makes sense to me!"
103070-29 = "We believe in you, Engineering Department."
103070-39 = "Hm..."
103070-40 = "It seems calling it an intergalactic battleship may have been a bit premature."
103070-41 = "Yes. There are no weapons, and the maximum altitude it can fly at is about 100,000 meters... It would break apart if it went outside the atmosphere, let alone into space."
103070-42 = "And, most peculiar of all..."
103070-47 = "More than seventy-five percent of the total mass of this battleship is made up of arithmetic logic units."
103070-48 = "In other words, this isn't a battleship, but a kind of flying dimensional topological quantum computer... I believe."
103070-50 = "We'll have to skip our class on understanding the ship's origins..."
103070-51 = "But with this, it could be possible to defeat the Ark of Atrahasis, right?"
103070-52 = "Yes, the silver lining here is that multidimensional analysis is possible with this."
103070-53 = "Not only that, if a genius hacker like me uses a computing device of this level...I could likely hack everything in the world. Heeheehee..."
103070-54 = "Perhaps I could even hack the Ark of Atrahasis itself..."
103070-58 = "Then we could crash the Ark to the ground or make it self-destruct?"
103070-59 = "...Theoretically. Self-destructing could be difficult, but hacking the propulsion system could make the Ark fall."
103070-60 = "But that would require physical access to the Ark's systems."
103070-66 = "The chess pieces we'll need for this fight... It's starting to come together."
103070-67 = "This fight is about..."
103070-68 = "Put simply, rather than bullets and guns, we will win this fight by pitting a dimensional topological quantum computer against an opponent that's violating the rules of multidimensional analysis..."
103070-69 = "A battle of bad taste between two hackers, in summary."
103070-71 = "Hmm... Himari, it seems the onus falls on you to lead the charge. I have no experience in computers or technology of this degree. "
103070-72 = "Heehee. What else is a genius hacker for?"
103070-73 = "Then first, I'll need to establish a theory on how their multidimensional analysis functions."
103070-74 = "That sounds...difficult. Please let me know if you need help, but I'll check on the others in the meanwhile."
103070-82 = "...Huh?"
103070-90 = "AMAS...? When did AMAS get in here?"
103070-91 = "...That is incorrect."
103070-92 = "It's speaking...? Is this a model equipped with speakers?"
103070-93 = "Your current formula fails to correct errors in the quantum information. You need to use an ion trap."
103070-98 = "...Oh! Th-That's right!"
103070-99 = "I can't believe a genius like me made such a basic mistake... *sigh*"
103070-100 = "...You haven't rested for days. It's natural. "
103070-101 = "Everyone here is pushing themselves past their limit."
103070-102 = "The only difference is that I'm a very delicate beauty."
103070-103 = "But what... No, who are you?"
103070-106 = "..."
103070-111 = "I'm the calculation support AI sent by President Rio."
103070-113 = "...Rio."
103070-114 = "Incorrect. I'm not Rio. I'm the calculation support AI."
103070-118 = "I guess that filthy girl wouldn't show her face here unless she had no shame at all."
103070-119 = "About Aris..."
103070-120 = "Yes, she kidnapped Aris. But I'd like to talk about what I find truly ghastly about her actions. Hah. You'll have to listen to my monologue, then."
103070-121 = "Toki."
103070-125 = "Rio gave Toki dangerous equipment and forced her to carry out her bidding, even knowing the potential ramifications of using such a weapon."
103070-126 = "And I've realized recently that Toki has no friends. Do you know why?"
103070-127 = "Because Rio prevented her from interacting with anyone, for security reasons."
103070-128 = "And Toki did every last thing asked of her, without a single complaint. "
103070-129 = "She even undertook the mission to kidnap her own underclassman. But did Rio truly inform Toki of what that mission meant? "
103070-130 = "Th-That..."
103070-132 = "Rio coerced and manipulated Toki into killing a person."
103070-134 = "Aris isn't a real person? Don't make me laugh. I don't care what her perspective on life was, what she did was unforgivable. "
103070-135 = "Does Rio, the great, all-knowing Big Sister know what Toki thought when she realized what she was being asked to do? How she felt?"
103070-137 = "..."
103070-138 = "She never should have forced Toki into her delusional scheming. Rio and her trolley problem... She puffed her chest out with all her moral superiority, but it was Toki who had to pull the lever!"
103070-139 = "..."
103070-140 = "What a coward! And when her plan fell to pieces, do you know what she said to Toki? "
103070-141 = "\"Do whatever you want.\" And then she disappeared. Irresponsible. Cowardly. Selfish."
103070-142 = "Did you even consider how Toki would feel, left alone and deprived of the only person she had been allowed to talk to? Do you know why she was unable to join the C&C? Why Toki felt the need to simply disappear?"
103070-143 = "..."
103070-144 = "...Hah. Of course you don't. The loneliness or guilt of others would never cross Big Sister's mind. Empathy doesn't reside within the delusions you exist within."
103070-148 = "You know, Toki came to me and asked..."
103070-149 = "She asked what she could do. How she could be helpful. She didn't know how else to find her worth unless she was useful, no matter how insignificantly so."
103070-152 = "Even now, Toki is fighting alone! She ignores her wounds and searches and fights in places where sanctums could manifest. Alone! "
103070-153 = "Do you understand her desperation? Her pain? "
103070-154 = "...You filthy witch. You don't deserve such a loyal maid. A friend. And if C&C doesn't want Toki, I'll take her with me. I'll protect her. "
103070-155 = "..."
103070-156 = "Actually, \"filthy\" doesn't even begin to cover your repulsiveness."
103070-157 = "...You're right."
103070-158 = "I know that I'm not welcome. I even understand why, Himari."
103070-162 = "But don't you need my help operating this artifact?"
103070-163 = "I know more about the legacy of the Nameless Gods than anyone else in Kivotos..."
103070-164 = "No. I don't need you. "
103070-165 = "If you knew their legacy so well, the world wouldn't have come so close to being destroyed last time. Because of your actions."
103070-166 = "You did nothing. It was the very person you tried to kill who stopped you from destroying the world."
103070-170 = "So, no. Not a single soul in Kivotos needs your help."
103070-171 = "Get off this ship. I have Aris, Sensei, and the Game Development Department. I don't need you."
103070-172 = "...Understood."
103070-179 = "Um... Himari?"
103070-183 = "Ah, Hanako. What is it?"
103070-184 = "Oh, the unmanned drone. I was doing a quick voice test..."
103070-188 = "Was that Tsukatsuki Rio, the Student Council president?"
103070-189 = "I heard she disappeared. I guess she's doing okay."
103070-190 = "..."
103070-191 = "Hanako, I..."
103070-192 = "Thinking of her reminds me of a story from an ancient epic."
103070-193 = "A story?"
103070-194 = "Yes. More of an ironic fable... It's a story about a king whose desperate attempts to avoid a prophecy actually caused it to come to fruition."
103070-195 = "The king heard a prophecy that the kingdom would be destroyed and nearly went mad trying to escape that fate..."
103070-197 = "But in the end, the king's efforts were the cause of the kingdom's destruction."
103070-199 = "The king did everything he could to prevent the prophecy's fulfillment. He banished the prophet, destroyed the temple, sealed all the gateways, and started a war..."
103070-200 = "In the end, his beloved brothers, all his family, vassals, everyone he loved died and the kingdom was an uninhabitable ruin."
103070-202 = "..."
103070-203 = "The fable's moral is worth contemplating. Is destiny inescapable? Does individual human effort mean anything at all?"
103070-204 = "I discussed this with Seia, Trinity's prophet."
103070-205 = "What should the king have done to escape his fate? What did the king do wrong?"
103070-206 = "..."
103070-209 = "...It's simple, Hanako."
103070-210 = "The king's biggest mistake was being a king."
103070-212 = "His mistake...was being a king?"
103070-213 = "Being a king who banishes prophets and starts wars, a king who believes in prophecies. That was the king's biggest mistake."
103070-214 = "But Seia... There isn't really a mistake the king made you can point to then. He did nothing wrong."
103070-215 = "If the king gave up his power...if he renounced his rights, if he never listened to the prophet, the prophecy might not have come true."
103070-216 = "Hm... Isn't that a bit of a stretch?"
103070-217 = "It is. It's entirely pointless."
103070-218 = "Your question is inherently flawed. There is no answer to a story like this."
103070-225 = "Oh. My apologies."
103070-226 = "This isn't my place. I shouldn't be meddling in your affairs."
103070-227 = "No, I understand. We have no way of knowing how this will end, so let's do everything we can."
103070-228 = "...I can worry about condemning her once this is all over."
103070-229 = "Rio...I mean, let's just say \"computational support AMAS\" for now."
103070-233 = "Can you come here and help me with calculations?"
103070-238 = "..."
103070-245 = "...It's like the second koan."
103070-246 = "[s] \"Thank you for your consideration, Hanako.\""
103070-250 = "Oh dear... The chief officer and even Sensei? U-Um... Did you hear everything?"
103070-251 = "Don't worry. I know a little bit about the situation. I won't talk about the Millennium president's presence."
103070-252 = "Thank you. It seems she is somewhat of a pariah among the students at the moment. "
103070-253 = "For all of them, and for us, there's a mountain of problems to be solved."
103070-254 = "Chief Officer, did I hear you mention a koan earlier?"
103070-255 = "Oh... Yes."
103070-256 = "It's not a big deal. I heard about the seven strange questions of Kivotos from the president of the General Student Council."
103070-260 = "It was like a kind of Zen dialogue where it was unclear what was being asked or whether there was an answer. The General Student Council president liked things like that."
103070-261 = "[s] \"So the General Student Council president was interested in the unknown.\""
103070-262 = "Yes. She liked mysterious stories that couldn't be explained. Stuff that involved artifacts, the occult..."
103070-263 = "Like Sensei's Shittim Chest. It's a kind of artifact that cannot be understood with our current knowledge."
103070-264 = "[s] \"Hm.\""
103070-265 = "The second koan went as follows."
103070-266 = "\"Can you understand by means of the incomprehensible?\""
103070-268 = "This is my first time hearing the second koan."
103070-269 = "\"Can you understand by means of the incomprehensible?\" That's the kind of question... Hm."
103070-270 = "Well, it was the sixth koan she was really interested in... But anyway, the second koan has a trap."
103070-271 = "...It's not a complete sentence."
103070-272 = "Yes. Can you understand \"what\" through the incomprehensible? The object is missing."
103070-273 = "Therefore, this sentence isn't a question in the first place."
103070-274 = "But...the president said it didn't matter because it wasn't meant to have a correct answer. The object is left for you to fill."
103070-275 = "I don't exactly understand it however. "
103070-276 = "The fable you told reminded me of the koan, is all. "
103070-277 = "It's just small talk, so don't pull your hair out over it."
103070-279 = "Hm. I find it fascinating, however."
103070-280 = "For example, if what I don't understand is fate, then what I understand through fate is... "
103070-281 = "What can we as people understand through fate? Hm... A fascinating question with no real meaning."
103070-282 = "[s1] \"It's an incomplete question in the first place.\"\n[s2] \"Well, you can put anything in to complete it.\""
103070-285 = "...Perhaps you're right. Koans aren't necessarily meant to have an answer. Like my question about the king."
103070-286 = "Hanako, can I ask you something?"
103070-287 = "Yes, what is it, Chief Officer?"
103070-288 = "How does that story end? What happened to the king?"
103070-289 = "Oh... The king..."
103070-290 = "He realized his own actions were the cause of the kingdom's destruction... "
103070-291 = "He felt there was no way to atone for his sins and couldn't bear the weight of his own guilt."
103070-292 = "So, eventually, in his despair... "
103070-296 = "...Um, perhaps this story is best saved for another time."
103070-297 = "[s] \"...\""
103070-305 = "Rin, Sensei, we've completed the plans for the operation."
103070-306 = "You two gotta give everything your final approval before we brief everyone. Hurry up and come to the bridge."
103070-308 = "Oh my. With the plan complete... "
103070-309 = "...Yes, let's go."
103070-315 = "Next Episode; Operational Briefing"

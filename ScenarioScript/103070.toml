[translation]
103070-1 = "ตอนที่ 7;เรือรบอุตนาพิชทิม 2"
103070-4 = "คือว่า... เป็นยังไงกันบ้างคะ ชมรมวิศวกรรม?"
103070-5 = "อืม... เข้าใจอย่างชัดแจ้งแล้วละ"
103070-6 = "งะ... งั้นเหรอคะ?"
103070-7 = "ใช่ เรารู้อย่างชัดแจ้งเลยละ... ว่าโครงสร้างของเรือรบนี้เป็นสิ่งที่ต่อให้เราวิเคราะห์จนตายก็ยังทำความ#nเข้าใจไม่ได้อยู่ดี"
103070-8 = "คะ... ว่าไงนะคะ?!"
103070-10 = "อื้ม พวกฉันวิเคราะห์อะไรไม่ได้เลย ไม่ว่าจะเป็นเชื้อเพลิง ตัวขับเคลื่อน หลักการทำงาน โครงสร้างเครื่องยนต์ หรือการออกแบบเรือรบนี้..."
103070-11 = "ค่ะ! เพราะนี่คือวัตถุหลงยุคที่ไม่สามารถเข้าใจได้ด้วยความรู้ที่มีอยู่ค่ะ! เห็นแบบนี้ก็เถอะ ยังไงพวกฉันก็ต้องมีสิ่งที่ไม่อาจไขความลับได้ค่ะ!"
103070-12 = "เฮ้อ... ถ้าเราลองศึกษามันไปอีกหน่อย มันก็อาจมีประโยชน์ต่อโครงการที่ยาวนานของเราก็ได้..."
103070-13 = "แต่ตอนนี้ ดูเหมือนจะไม่ช่วยอะไรเลย "
103070-15 = "ขะ... ขนาดนั้นเลยเหรอคะ...? "
103070-16 = "วะ... วางใจเถอะค่ะ!"
103070-17 = "ถึงเราจะไม่รู้ว่ามันทำงานยังไง แต่อย่างน้อยเราต้องหาวิธีควบคุมมันได้ค่ะ!"
103070-21 = "อยากรู้ว่าหมายความว่ายังไงเหรอคะ? ก็เหมือนแบบนี้ไงคะ! ถึงเราจะไม่รู้โครงสร้างเครื่องยนต์ของ#nรถยนต์ แต่เราก็ยังขับรถยนต์ได้ใช่ไหมล่ะคะ?"
103070-23 = "ถ้าเราตีความง่ายๆ หน่วยปฏิบัติการทั้งหมดก็คืออุปกรณ์ที่แปลงข้อมูลอินพุตเป็นข้อมูลเอาต์พุต"
103070-24 = "ถ้าเราเข้าใจกระบวนการแปลงนั้นโดยอุปนัยได้ เราก็จะคาดการณ์ผลลัพธ์ได้ แม้จะไม่เข้าใจโครงสร้าง#nเลยก็ตาม"
103070-26 = "เท่ากับว่า ถ้าเราจัดระเบียบข้อมูล เช่น เหยียบคันเร่งแล้วความเร็วเพิ่มขึ้น เหยียบเบรกแล้วชะลอ หมุนพวงมาลัยแล้วทิศทางเปลี่ยนได้..."
103070-27 = "เราก็จะสร้างคู่มือควบคุมได้โดยไม่ต้องรู้โครงสร้างภายในได้น่ะ"
103070-28 = "งะ... งั้นเหรอคะ...!"
103070-29 = "งั้นต้องรบกวนด้วยนะคะ ชมรมวิศวกรรมทุกคน"
103070-39 = "ฮืม..."
103070-40 = "นั่นสินะคะ สิ่งนี้ไม่ควรถูกเรียกว่า <เรือรบอวกาศ> ค่ะ"
103070-41 = "ค่ะ มันไม่มีอาวุธอะไร ส่วนระดับความสูงที่บินได้ก็แค่ 100,000 เมตร อย่าว่าแต่อวกาศเลยค่ะ ให้ออกไปชั้นบรรยากาศยังจะพังเอาเลยค่ะ"
103070-42 = "และยิ่งไปกว่านั้น..."
103070-47 = "เกินกว่า 75% ของเรือรบนี้ เป็นอุปกรณ์คำนวณเชิงตรรกะค่ะ"
103070-48 = "สรุปได้ว่า... สิ่งนี้ไม่ใช่เรือรบ แต่เป็นคอมพิวเตอร์ควอนตัมเชิงมิติชนิดหนึ่งที่สามารถบินได้ค่ะ"
103070-50 = "เราข้ามไปก่อนเถอะค่ะว่าทำไมถึงมีอะไรแบบนี้อยู่ด้วย..."
103070-51 = "ถ้าเป็นอย่างนี้ ก็แปลว่าเราสามารถโจมตี <เรืออะทราฮาซิส> ได้สินะคะ?"
103070-52 = "ใช่ค่ะ เราใช้สิ่งนี้ในการ <วิเคราะห์พหุมิติ> ได้ค่ะ"
103070-53 = "ไม่เพียงเท่านี้นะคะ เพราะหากแฮ็กเกอร์อัจฉริยะอย่างฉันใช้อุปกรณ์คำนวณขนาดนี้ได้ละก็... คงไม่มีอะไรในโลกที่แฮ็กไม่ได้หรอกค่ะ ฮุฮุฮุ..."
103070-54 = "บางทีอาจจะแฮ็กตัว <เรืออะทราฮาซิส> ได้ด้วยซ้ำ..."
103070-58 = "ถ้าอย่างนั้น การทำให้เรือถล่มลงมาจากฟ้า หรือทำให้มันระเบิดก็... เป็นไปได้เหรอคะ?"
103070-59 = "...... ก็คงอย่างนั้นค่ะ ถึงเรื่องระเบิดจะเป็นเรื่องยาก แต่หากแค่แฮ็กระบบขับเคลื่อนได้ ก็น่าจะทำให้มัน#nร่วงลงมายังพื้นดินได้ค่ะ"
103070-60 = "แต่ถ้าจะทำอย่างนั้น เราก็จำเป็นต้องเชื่อมต่อทางกายภาพกับระบบของเรือนั่นค่ะ"
103070-66 = "เหมือนจะเริ่มเห็นเค้าลางของการต่อสู้นี้แล้วสินะคะ"
103070-67 = "การต่อสู้นี้ก็คือ... "
103070-68 = "การ[ruby=แฮ็ก]ต่อกร[/ruby]กับคู่ต่อสู้ที่กำลัง[ruby=ผิดกฎ]ละเมิด[/ruby]กฎการวิเคราะห์พหุมิติด้วย[ruby=กลโกง]คอมพิวเตอร์ควอนตัม[/ruby]เชิงมิติ..."
103070-69 = "ที่ต้องเรียกว่าการต่อสู้ระหว่างผู้เล่นนอกกฎ... หรือจะเรียกว่าการต่อสู้ระหว่างแฮ็กเกอร์กันนะ..."
103070-71 = "อืม... คุณฮิมาริน่าจะรับภาระหนักเลยนะคะเนี่ย? พอดีฉันไม่ใช่ผู้เชี่ยวชาญทางด้านนี้... "
103070-72 = "ฮุฮุ วางใจฉันเถอะค่ะ"
103070-73 = "ถ้างั้นฉันขอตัวไปสร้างทฤษฎีเพื่อการวิเคราะห์พหุมิติก่อนนะคะ"
103070-74 = "ค่ะ ถ้าอยากให้ช่วยอะไรก็บอกนะคะ งั้นฉันจะไปหาคนอื่นๆ ค่ะ"
103070-82 = "...... หืม?"
103070-90 = "AMAS งั้นเหรอ...? เข้ามาที่นี่ตั้งแต่เมื่อไรกันคะ...?"
103070-91 = "...... แบบนั้นไม่ได้ค่ะ"
103070-92 = "เสียงหุ่นยนต์เหรอ...? หรือจะเป็นรุ่นที่มีลำโพงด้วย?"
103070-93 = "ถ้าใช้สูตรนั้น ก็จะแก้ค่าคลาดเคลื่อนของข้อมูลควอนตัมไม่ได้ค่ะ ต้องใช้ไอออนแทร็ปค่ะ"
103070-98 = "...ตายจริง? นะ... นั่นสินะคะ?!"
103070-99 = "อัจฉริยะอย่างฉันผิดพลาดเรื่องพื้นๆ แบบนี้ไปได้ยังไงกัน... เฮ้อ..."
103070-100 = "...... ก็เพราะไม่ได้พักผ่อนมาหลายวันแล้วยังไงล่ะ"
103070-101 = "ทุกคนที่นี่ก็ไม่ได้พักเหมือนกันทั้งนั้นนะคะ"
103070-102 = "แต่ถ้าจะมีข้อแตกต่าง ก็คงจะเป็นที่ฉายาผู้มีรอยยิ้มฮีลใจเหมือนยาวิเศษค่ะ"
103070-103 = "ว่าแต่เธอ... ไม่สิ คุณคือ......"
103070-106 = "......"
103070-111 = "ฉันคือ A.I. ช่วยคำนวณที่ประธานริโอะส่งมา"
103070-113 = "...... ริโอะ"
103070-114 = "ไม่ใช่ริโอะค่ะ A.I. ช่วยคำนวณค่ะ "
103070-118 = "ก็นะ ไม่มีทางที่ผู้หญิงสกปรกคนนั้นจะโผล่หน้ามาที่นี่ได้อยู่แล้วแหละค่ะ ถ้ายังมีจิตสำนึกหลงเหลืออยู่#nบ้าง ก็คงไม่หน้าด้านมาหรอกค่ะ"
103070-119 = "เรื่องอาริสึนั่นน่ะ..."
103070-120 = "ค่ะ ตอนนั้นอาริสึถูกจับตัวไป ไหนๆ ก็ไหนๆ แล้ว เรามาคุยเรื่องที่ผู้หญิงคนนั้นไม่เคยจะใส่ใจกันดูไหม#nล่ะคะ? ถึงการพูดกับ A.I. จะเหมือนกับว่าฉันพูดคนเดียวก็เถอะ"
103070-121 = "โทคิ"
103070-125 = "ริโอะให้อาวุธอันตรายกับโทคิ แล้วสั่งให้เธอทำแต่งานที่เสี่ยงอันตราย และโทคิเองก็น่าจะรับรู้ถึงความ#nอันตรายของ <อาวุธ> นั้นด้วยค่ะ"
103070-126 = "นอกจากนั้น สำหรับโทคิแล้ว คงไม่มีใครที่เรียกว่าเพื่อนได้อย่างเต็มปากค่ะ รู้ไหมคะว่าทำไม?"
103070-127 = "มันเป็นเพราะริโอะห้ามไม่ให้เธอติดต่อกับใคร เพื่อความปลอดภัยยังไงล่ะคะ"
103070-128 = "แต่โทคิก็ทำภารกิจทุกอย่างที่ได้รับมอบหมายโดยไม่ปริปากบ่นอะไรเลยค่ะ"
103070-129 = "และนั่นก็รวมถึง... ภารกิจลักพาตัวรุ่นน้องที่น่ารักด้วย... แต่เธอจะรู้ความหมายของภารกิจนั้นหรือเปล่า#nนะคะ? "
103070-130 = "ระ... เรื่องนั้น..."
103070-132 = "ที่ว่าริโอะสั่งให้โทคิร่วมมือใน <ภารกิจฆ่าคน> น่ะค่ะ"
103070-134 = "นั่นไม่ใช่ชีวิตเหรอคะ? ถึงแม้มุมมองที่มีต่อชีวิตจะต่างกัน แต่เธอไม่รู้เลยเหรอคะว่าเรื่องนั้นเป็นเรื่องที่#nให้อภัยไม่ได้? "
103070-135 = "ตอนที่รู้ความจริงนั้นเข้า คุณรู้ไหมคะว่าโทคิคิดอะไร? บิ๊กซิสเตอร์ผู้ยิ่งใหญ่ที่ล่วงรู้ทุกสิ่งทุกอย่าง!"
103070-137 = "......"
103070-138 = "ถ้าอย่างนั้นก็ไม่ควรจะดึงโทคิเข้ามาสิคะ ถึงจะยกปัญหารถรางมาพูดแล้วแสร้งทำเป็นคนดี แต่จริงๆ แล้วคนที่ต้องดึงคันโยกก็คือโทคิค่ะ"
103070-139 = "......"
103070-140 = "ช่างเป็นผู้หญิงที่ใจเสาะจริงๆ เลยว่าไหมคะ? และท้ายที่สุดแล้วแผนการทั้งหมดของคุณก็มาพังลง#nทั้งหมดด้วยคุณครูของ <ชาเล่ต์>..."
103070-141 = "ทันใดนั้นก็ทิ้งคำพูดที่ไร้ความรับผิดชอบว่า 'ทำตามใจเลย' แล้วก็หายตัวไปซะอย่างนั้นค่ะ"
103070-142 = "เคยคิดบ้างไหมคะว่าโทคิที่อยู่ตัวคนเดียวจะคิดอย่างไรบ้าง? รู้ไหมคะว่าทำไมโทคิถึงหายตัวไป#nระหว่างไปที่ C&C?"
103070-143 = "......"
103070-144 = "ฮุฮุ คุณไม่มีทางคิดหรอกค่ะ เพราะบิ๊กซิสเตอร์ไม่เคยคิดถึงความเหงา หรือไม่เคยมีความรู้สึกผิดต่อคน#nอื่นมาก่อนนี่ค่ะ"
103070-148 = "โทคิมาหาฉันและขอร้องกับฉันค่ะ"
103070-149 = "ขอให้สั่งงานอะไรก็ได้ เธออยากเป็นประโยชน์บ้าง แม้เพียงนิดเดียวก็ยังดีค่ะ"
103070-152 = "โทคิยังออกตามหาสถานที่ที่มีความเป็นไปได้ว่าจะเกิดหอคอยอีกครั้ง และกำลังต่อสู้อยู่คนเดียวโดย#nไม่สนใจว่าตัวเองจะบาดเจ็บด้วยค่ะ "
103070-153 = "คุณไม่รู้ใช่ไหมคะว่าทำไมเธอถึงพยายามอย่างเอาเป็นเอาตายขนาดนั้น? "
103070-154 = "...... เธอช่างเป็นเมดที่ทั้งจริงใจและซื่อสัตย์ ไม่เหมาะกับอะไรสกปรกๆ แบบนั้นเลย ว่าไหมคะ?#nถ้า C&C ไม่ต้องการเธอ ฉันก็จะรับเธอมาไว้เองค่ะ "
103070-155 = "......"
103070-156 = "ตอนนี้ฉันชักจะรู้สึกว่าการใช้คำว่าสกปรกมันยังน้อยเกินไปด้วยซ้ำค่ะ"
103070-157 = "...... อืม"
103070-158 = "...... ฉันรู้ว่าเธอไม่ต้อนรับฉัน... ฮิมาริ......"
103070-162 = "แต่ว่าเธอก็ต้องการความช่วยเหลือจากฉันเพื่อให้วัตถุหลงยุคชิ้นนี้เคลื่อนไหวใช่ไหมล่ะ?"
103070-163 = "ฉันคือคนที่รู้เรื่องมรดกของ <ทวยเทพไร้นาม> มากที่สุดในคิโวทอสนะ..."
103070-164 = "ไม่ค่ะ ไม่จำเป็นหรอกค่ะ"
103070-165 = "ถ้าคุณรู้ดีกว่าใครทั้งหมด ตอนนั้นโลกก็คงไม่ต้องเจอกับสถานการณ์ที่แย่ที่สุดหรอกค่ะ"
103070-166 = "และคนที่ขัดขวางสิ่งนั้นไว้ก็คืออาริสึ สมาชิกชมรมพัฒนาเกม และคุณครูค่ะ"
103070-170 = "เพราะแบบนั้นฉันก็เลยไม่ต้องการความช่วยเหลืออะไรจากคุณค่ะ"
103070-171 = "ลงไปจากเรือลำนี้เถอะค่ะ ตอนนี้อาริสึ คุณครู และสมาชิกชมรมพัฒนาเกมอยู่บนเรือลำนี้ค่ะ"
103070-172 = "เข้าใจแล้ว"
103070-179 = "คือว่า... คุณฮิมาริคะ"
103070-183 = "อ่า... ค่ะ มีเรื่องอะไรเหรอคะ? "
103070-184 = "อ้อ นั่นเป็นโดรนไร้คนขับค่ะ ฉันกำลังทดสอบเรื่องการแชตอยู่... "
103070-188 = "คนนั้นคือประธานสภานักเรียนสึคัตสึกิ ริโอะ ใช่ไหมคะ? "
103070-189 = "ได้ยินว่าหายตัวไป แต่ว่าก็ดีแล้วละค่ะที่ปลอดภัยดี"
103070-190 = "......"
103070-191 = "...... คุณฮานาโกะ"
103070-192 = "...... พอได้เห็นคนนั้นแล้ว ฉันก็นึกถึงนิทานเรื่องหนึ่งในมหากาพย์โบราณขึ้นมาค่ะ"
103070-193 = "นิทานเหรอคะ?"
103070-194 = "ค่ะ มันเป็นนิทานเกี่ยวกับเรื่องเสียดสีชนิดหนึ่งค่ะ... เป็นเรื่องเกี่ยวกับกษัตริย์ที่พยายามจะหลีกเลี่ยงคำ#nทำนาย แต่คำทำนายก็เป็นจริงขึ้นมาอยู่ดีน่ะค่ะ"

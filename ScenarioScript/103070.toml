[translation]
103070-1 = "第7話;生命守護者主艦（２）"
103070-4 = "那個……情況怎麼樣呢？工程師部的各位。"
103070-5 = "……沒問題。我大概理解了。"
103070-6 = "太，太好了……！"
103070-7 = "沒錯，我已經理解了──我們絕對無法理解這艘戰艦。"
103070-8 = "……什，什麼！？"
103070-10 = "嗯。這艘戰艦的燃料、推進器、動作原理、引擎構造、甚至是設計……#n從頭到尾都無法理解。"
103070-11 = "因為這是「歐帕茲」啊！我們無法理解也是理所當然的！"
103070-12 = "唉……本來還以為只要解析這艘戰艦……"
103070-13 = "就能更接近我們的宿願了……"
103070-15 = "居，居然到了那種程度嗎……？"
103070-16 = "啊，不過請放心！"
103070-17 = "雖然不清楚動作的原理，只是要操作的話應該是沒問題的！"
103070-21 = "就和即使不了解車輛的構造，也不會對駕駛有影響是一樣的！"
103070-23 = "而且，所有的動作機關──都能視為將輸入資料轉換為輸出資料的裝置。"
103070-24 = "只要能理解其變換的過程，就算不了解構造也能預測結果。"
103070-26 = "車子只要踩油門就會加速，踩剎車就會減速，轉動方向盤就會改變方向對吧。#n這艘戰艦也是一樣的。"
103070-27 = "只要整理出與操作對應的動作，即使不清楚內部構造也能製作操控手冊。"
103070-28 = "原，原來如此。"
103070-29 = "那麼工程師部的各位……萬事拜託了！"
103070-39 = "呼呣……"
103070-40 = "以目前的結果來看……這似乎不能算是一艘「宇宙戰艦」。"
103070-41 = "沒錯。不僅沒有搭載任何武器，能夠飛行的極限高度也只有100,000m左右……#n別說是外太空了，在離開大氣層的瞬間就會四分五裂吧。"
103070-42 = "而且──"
103070-47 = "這艘戰艦的75%以上都是邏輯演算裝置，這點也很讓人在意。"
103070-48 = "也就是說，這並非戰艦……而是一種能夠飛行的量子電腦。"
103070-50 = "那麼……"
103070-51 = "只要有它就能突破那層防護罩是嗎？"
103070-52 = "是的。只要能活用這部量子電腦，「多次元詮釋」的演算將化為可能。"
103070-53 = "不僅如此。有這種等級的演算裝置的話……#n說不定能駭入這個世界上的一切呢……唔呵呵。"
103070-54 = "沒錯──如果由超天才病弱美少女駭客的我來使用，#n要將那個「阿特拉哈西斯的方舟」收入囊中也不是不可能……"
103070-58 = "那麼，讓方舟墜落或自爆之類的也可以……？"
103070-59 = "……這個嘛。自爆或許有點困難，#n不過只要能駭入推進系統，要讓方舟墜落是有可能的。"
103070-60 = "不過為此，就必須連接到方舟的系統本身──"
103070-66 = "原本以為已經走投無路……總算是看見一線曙光了呢。"
103070-67 = "也就是說，這是──"
103070-68 = "面對使用多次元詮釋的[ruby=作弊]犯規[/ruby]對手，使用[ruby=作弊]量子電腦[/ruby]加以[ruby=駭入]對抗[/ruby]──"
103070-69 = "作弊與作弊……不，將會是駭客與駭客的戰鬥吧。"
103070-71 = "……讓陽葵同學的負擔越來越重真是非常抱歉。#n我對這方面的事完全不了解……"
103070-72 = "呵呵，請別放在心上♪"
103070-73 = "我可是超天才清楚系病弱美少女駭客啊。#n──那麼我這就去建構多次元詮釋的理論，先失陪了。"
103070-74 = "好的。需要協助的時候請隨時通知我們。#n我去看看其他人的狀況。"
103070-82 = "唉呀……？"
103070-90 = "AMAS……？#n是在什麼時候……？"
103070-91 = "……那個計算是錯誤的。"
103070-92 = "電子音……？#n是配備了擴音器的型號？#n有那種機型嗎……？"
103070-93 = "那項公式無法修正量子情報的誤差。#n使用[ruby=Ion Trap]離子阱[/ruby]比較適合吧。"
103070-98 = "……咦，咦？確實是呢。"
103070-99 = "身為天才的我，居然會犯下這麼基礎的失誤……唉……"
103070-100 = "……因為已經好幾天沒休息了啊。"
103070-101 = "這點在場的所有人都是一樣的。"
103070-102 = "是呢，要說有什麼不同的話……也就只有我是病弱美少女而已吧。"
103070-103 = "但這是──不，你是……"
103070-106 = "……"
103070-111 = "我是奉莉央會長的命令前來的演算支援AI。"
103070-113 = "……莉央。"
103070-114 = "我不是莉央。是演算支援AI。"
103070-118 = "唔呵呵，也對。#n那個陰沉的女人要是多少有點良心的話，就不可能在這裡露臉吧。"
103070-119 = "愛麗絲他……"
103070-120 = "愛麗絲在別的地方哦。#n……嗯，我接下來只是在對AI自言自語而已。#n身為超天才病弱美少女的我，就是有這種可愛的地方呢。"
103070-121 = "我，對於「季」的事情是絕對不會原諒莉央的……"
103070-125 = "[ruby=那個女人]莉央[/ruby]將危險的裝備交給了季，還要求他執行各種任務。#n「武裝」的危險性，他本人明明再清楚不過了。"
103070-126 = "除此之外，對季來說，沒有能稱之為朋友的存在。#n知道為什麼嗎？"
103070-127 = "……因為莉央禁止了他一切的交流。"
103070-128 = "即便如此，季仍然沒有絲毫怨言，專注於執行各種任務。"
103070-129 = "最終──奉命綁架了可愛的後輩。#n然而，他是否理解這個任務所代表的意義呢？"
103070-130 = "那，是……"
103070-132 = "莉央他，讓季承受了「殺人任務」一半的責任。"
103070-134 = "「不是生命」？就算對生命的觀點不同，#n那也是絕對無法容許的事，為何無法理解呢？"
103070-135 = "得知那件事的時候，季心中作何感想──#n了解事件全貌的偉大大姐頭難道沒有注意到嗎！"
103070-137 = "……"
103070-138 = "不該把季牽扯進去的。#n舉電車難題為例，[ruby=自己]將他視[/ruby]為悲劇的女主角──然而實際上拉下操縱桿的卻是季。"
103070-139 = "……"
103070-140 = "真是個卑劣至極的女人。#n在計畫因「夏萊的老師」受挫之後──"
103070-141 = "只留下一句「自由地生活吧」這種不負責任的話就消失得無影無蹤……"
103070-142 = "他有想過獨自被留下的季的感受嗎？#n那孩子為何沒有加入C&C，而是選擇了消失……他能夠理解嗎？"
103070-143 = "……"
103070-144 = "啊啊，不過……他不可能會理解吧。#n畢竟大姐頭從來沒有考慮過他人的孤獨與罪惡感。"
103070-148 = "季對我這麼說了。"
103070-149 = "「我什麼都願意做」、「我想幫上大家的忙」。"
103070-152 = "即使是現在，季也在可能出現聖所的地方獨自戰鬥著。#n──並且絲毫不在乎自己的傷勢。"
103070-153 = "他如此拚命的理由為何，你想必無法理解吧。"
103070-154 = "……他真的，是那個陰沉女人所配不上的，忠誠的女僕。#nC&C如果無法接納他，就由我把他帶走吧。"
103070-155 = "……"
103070-156 = "呵呵……我都開始覺得陰沉的女人這個形容已經過於寬容了。"
103070-157 = "……沒錯。"
103070-158 = "……我理解你對我有所不滿，陽葵。"
103070-162 = "但是想要啟動這個歐帕茲，我的力量是不可或缺的。"
103070-163 = "在這個奇普托斯，比誰都清楚「無名之神」遺產的是──"
103070-164 = "不，不需要。"
103070-165 = "如果你比誰都清楚的話，#n那個時候，奇普托斯迎向終焉的事態根本就不會發生。"
103070-166 = "阻止那件事的是愛麗絲與遊戲開發部的成員，以及老師。"
103070-170 = "所以，這裡不需要你的幫忙。請立刻離開這艘船吧。"
103070-171 = "這裡已經有愛麗絲、遊戲開發部以及老師在了。"
103070-172 = "……我知道了。"
103070-179 = "那個……陽葵同學？"
103070-183 = "……啊啊，我失禮了。"
103070-184 = "剛才正在與無人機進行語音閒聊的測試──"
103070-188 = "那位是學生會長調月莉央同學，對吧？"
103070-189 = "我聽說他消失了……幸好平安無事。"
103070-190 = "……"
103070-191 = "花子同學，我……"
103070-192 = "……看著莉央同學，讓我想起了一個古代敘事詩。"
103070-193 = "敘事詩，是嗎？"
103070-194 = "是的。是個諷刺的寓言……#n一名試圖迴避預言，卻反而招來悲劇的王的故事。"
103070-195 = "從神諭中得知王國即將滅亡的王，為了擺脫命運拚盡了全力──"
103070-197 = "──然而王的努力卻造成了王國的滅亡……是這樣的故事吧？"
103070-199 = "是的。王為了不讓預言成真用盡了所有手段。#n驅逐預言者、摧毀神殿、緊閉大門……甚至發動了戰爭。"
103070-200 = "最終，#n自己心愛的家人、兄弟與家臣全數喪命，王國變成了一片廢墟……這樣的故事。"
103070-202 = "……"
103070-203 = "是個發人省思的故事呢……所謂的「命運」存在嗎？#n或者說「決定論」有意義嗎？"
103070-204 = "是的。這本來是和聖亞醬──我的一位能看見預知夢的朋友談過的內容……"
103070-205 = "若是想要逃離命運，王究竟該怎麼做呢？#n王，做錯了嗎？"
103070-206 = "……"
103070-209 = "……答案很單純唷，花子。"
103070-210 = "王的過錯只有一個……#n那就是他身為「王」這件事。"
103070-212 = "身為王，這件事……？"
103070-213 = "身為擁有足以驅逐預言者、發動戰爭的權力──#n並且可以聽見神諭的「王」。這就是王最大的錯誤。"
103070-214 = "但是聖亞醬……照你這麼說的話，王並沒有做錯任何事。"
103070-215 = "王如果放棄自己的能力──無法聽見神諭的話。#n也許預言就不會成真了。"
103070-216 = "……這個理論，似乎有點牽強呢。"
103070-217 = "當然。這是基於結果論的牽強回答。"
103070-218 = "因為這樣的故事是不存在答案的啊。"
103070-225 = "對不起，我沒有想介入你們之間問題的意思……"
103070-226 = "身為外人的我不該踰矩發表意見的。"
103070-227 = "不，我理解花子同學的意思。眼下處於極需幫忙的狀態……#n想要多少拓展一點可能性的話，借用他的力量也是有必要的吧。"
103070-228 = "對他的指責……嗯，留到這一切都結束之後也不遲。"
103070-229 = "莉央──不，現在稱呼你演算支援AMAS比較好吧。"
103070-233 = "可以來協助我進行計算嗎？"
103070-238 = "……"
103070-245 = "……簡直就像「第二項古則」一樣呢。"
103070-246 = "[s]「謝謝你的關心，花子。」"
103070-250 = "哎呀……琳行政官和老師……難道你們都聽見了嗎？"
103070-251 = "請別擔心。情況我大致上都知道了。#n千年的學生會長在這裡的事，我們會保密的。"
103070-252 = "謝謝。#n他似乎也被自己學園的學生們排擠了…… "
103070-253 = "不管是他還是我們……都還有很多的問題需要解決。"
103070-254 = "……話說回來，琳行政官。#n您剛才好像提到了「古則」……"
103070-255 = "啊啊……是呢。"
103070-256 = "其實也沒什麼特別的含意，#n這是從聯邦學生會長口中聽來的──奇普托斯自古存在的七道提問。"
103070-260 = "不知是否有答案、就連在問什麼都無法確定的玩笑話。#n聯邦學生會長很喜歡這類的東西。"
103070-261 = "[s]「原來是這樣啊。」"
103070-262 = "是的。他很喜歡無法解釋的神祕話題，像是歐帕茲、超自然……之類的。"
103070-263 = "老師的「希迪姆的箱子」也是其中之一。#n畢竟那也是一種無法解析的歐帕茲。"
103070-264 = "[s]「……原來如此。」"
103070-265 = "「第二項古則」……就是這樣的內容。"
103070-266 = "「透過無法理解的事物，我們是否能夠理解呢」"
103070-268 = "第二項古則，我還是第一次聽見。"
103070-269 = "透過無法理解的事物，獲得理解……？#n真是不可思議的問題呢……"
103070-270 = "是的……這第二項古則中存在著缺陷。"
103070-271 = "……句子還沒完成，對吧。"
103070-272 = "沒錯。透過「無法理解的事物」，是否能夠理解「什麼」呢？話中缺少了受詞。"
103070-273 = "這個句子打從一開始就無法作為「提問」而成立。"
103070-274 = "……但是聯邦學生會長說這不是猜謎，所以沒關係。#n只要把自己想加入的詞彙加進去就可以了。"
103070-275 = "雖然我始終不明白那是什麼意思……"
103070-276 = "只是在聽完花子說的故事後，不知為何想了起來……"
103070-277 = "不好意思，請不必過度在意。"
103070-279 = "唔呵呵……但是既然聽見了這個問題，就不禁讓人在意起它的答案了呢。"
103070-280 = "嗯……如果「無法理解的事物」就是「命運」，#n可以透過那個「命運」獲得「理解」的是……"
103070-281 = "透過命運，我們能夠理解的是什麼呢……#n這個問題所代表的意義究竟是……"
103070-282 = "[s1]「這是一個尚未完成的問題，」\n[s2]「所以不用想得太複雜，加入自己喜歡的詞彙就可以了唷。」"
103070-285 = "……沒錯。不應試著尋求答案，這個古則是這個意思吧。"
103070-286 = "花子同學，我可以問你一個問題嗎？"
103070-287 = "沒問題，您請問。"
103070-288 = "剛才故事的結局是什麼呢？#n那位王，最終迎來了什麼樣的下場呢？"
103070-289 = "啊……那位王……"
103070-290 = "察覺了自己就是讓王國走向滅亡的原因──"
103070-291 = "失去了贖罪的對象與方法……#n連肯定自己的罪都做不到的王──"
103070-292 = "陷入了悲嘆，於是……"
103070-296 = "……嗯。這個話題就說到這裡吧。"
103070-297 = "[s] 「……」"
103070-305 = "琳前輩，老師。作戰計劃書完成了。"
103070-306 = "在進行全體簡報前，想請兩位進行最後的確認。可以來艦橋一趟嗎～？"
103070-308 = "哎呀，作戰計劃書已經完成了呢。"
103070-309 = "……我知道了，走吧。"
103070-315 = "下一話;作戰簡報"

[translation]
51110-1 = "ตอนที่ 11;สมาชิกเฮียกกะเรียวรัน"
51110-5 = "เอาละ! ช่วยกันล้อมไว้ เอาให้หนีไปไหนไม่ได้!"
51110-13 = "ถึงตอนเช้าจะผิดพลาดไปนิดหน่อยที่จำคนผิดก็เถอะ!"
51110-14 = "แต่ครั้งนี้ฉันหาเจอถูกคนแล้ว!"
51110-23 = "......ง่ำ ง่ำ"
51110-24 = "ต่อให้คราวก่อนจะหนีเราไปได้ แต่คราวนี้ต่อให้คิดหนีไปก็ไม่มีประโยชน์! คราวนี้ฉันเกณฑ์ปีศาจมา#nเยอะขึ้นแล้ว!"
51110-25 = "ง่ำ ง่ำ"
51110-26 = "หัวหน้า! ดูยัยเด็กนั่นทำเข้าสิ เอาแต่เคี้ยวอาหารตุ้ยๆ แล้วก็ไม่พูดอะไรเลย... สงสัยจะกลัวจนพูดไม่ออก!"
51110-27 = "ฮ่าฮ่า! ก็เราเล่นยกโขยงมากันตั้งขนาดนี้ คงจะประหม่าละสิท่า!"
51110-30 = "ง่ำ ง่ำ"
51110-32 = "(กลืนลงคอ)"
51110-33 = "เฮอะ กินหมดแล้วเรอะ? ดีละ งั้นทีนี้อยากพูดอะไรก็รีบๆ พูดมา!"
51110-34 = "แน่นอนว่าถ้าจะเจียมตัวขอโทษเสียแต่ตอนนี้ พวกฉันก็น่าจะใจดีให้สักหน่อย..."
51110-38 = "── ง่ำ ง่ำ"
51110-43 = "หัวหน้า! ยัยเด็กคนนี้หยิบยากิโทริในถุงออกมากินอีกแล้วค่ะ!?"
51110-45 = "หน็อย! เฮียกกะเรียวรัน! เธอนี่นะ! จะทำเป็นล้อเล่นกับพวกฉันไปถึงไหน...!"
51110-46 = "...คราวก่อนก็บอกไปแล้วไม่ใช่เหรอว่าฉันไม่ใช่เฮียกกะเรียวรัน"
51110-47 = "ฉันก็แค่บังเอิญเดินมาในถนนสายเทศกาลก็เท่านั้น..."
51110-49 = "จริงอยู่ที่ฉันเป็นนักเรียนเฮียกคิยาโคที่ปกติแล้วจะดูธรรมดาและมีบรรยากาศลึกลับๆ อยู่หน่อย... แต่ก็มีเอกลักษณ์เรื่องความน่ารักอยู่ด้วยนี่เนอะ"
51110-51 = "พูดออกมาได้หน้าไม่อาย ฟังแล้วหงุดหงิดชะมัด!"
51110-52 = "ฉันจะไม่ฟังเรื่องเหลวไหลอะไรอีกแล้ว!"
51110-53 = "ทุกคน!"
51110-54 = "[s] \"เดี๋ยวก่อน!"
51110-62 = "หัวหน้า?!"
51110-63 = "นี่ เดี๋ยวสิ! ทำไมเล่นแบบไม่ทันตั้งตัวแบบนี้..."
51110-70 = "ลูกพี่!!"
51110-71 = "หน็อย!"
51110-72 = "โจมตีพร้อมกันเลย! "
51110-103 = "อึกกกก......"
51110-107 = "อึก...! "
51110-108 = "ระ... รุมเลย! มีเท่าไรใส่เข้าไปให้หมด!"
51110-114 = "...!"
51110-121 = "(การต่อสู้ดำเนินไปเรื่อยๆ)"
51110-132 = "จับตัวได้แล้ว...!"
51110-133 = "อึก...?!"
51110-134 = "[ns] \"ทางขวา!\""
51110-146 = "ฉันจับทางได้หมดแล้ว!"
51110-147 = "ทางขวา! เล่นงานทางขวา! "
51110-148 = "ถ้าโจมตีทางขวาจะตอบสนองช้ากว่า!"
51110-149 = "การบุกโจมตีจุดอ่อนอย่างไม่ย่อท้อจนชนะคือความสามารถพิเศษของปีศาจนะ!"
51110-150 = "...! น่ารำคาญชะมัด...!"
51110-152 = "เตรียมยิงจรวดเลย!"
51110-156 = "ว้ากกก มะ... มองอะไรไม่เห็นเลย!"
51110-157 = "แค่กๆๆ..."
51110-164 = "[ns] \"ขืนสู้ต่อแบบนี้ไม่ไหวแน่ ออกจากตรงนี้กันก่อนเถอะ\""
51110-165 = "...ใครน่ะ?"
51110-170 = "ดะ... เดี๋ยวก่อน... ฉัน..."
51110-177 = "[ns1] \"ฮู่ว... ฮู่ว... มาไกลแค่นี้ก็น่าจะพอแล้ว\"\n[ns2] \"โชคดีนะที่ไม่บาดเจ็บตรงไหนมาก\""
51110-180 = "...คุณเป็นใครน่ะ?"
51110-184 = "ครูของชาเล่ต์...?"
51110-185 = "ถ้าเป็นครูของชาเล่ต์... งั้นก็..."
51110-186 = "...ไม่สิ ไม่เห็นต้องมาช่วยฉันเลย"
51110-187 = "ต่อให้ไม่ช่วย ฉันก็จัดการคนเดียวได้สบายอยู่แล้ว"
51110-192 = "[ns] \"แขนขวานั่นน่ะ ได้แผลมาเหรอ?\""
51110-193 = "...!"
51110-194 = "แขนขวาของฉันตอบสนองช้าตั้งแต่เมื่อกี้แล้วเหรอ?"
51110-195 = "คนนอก... ดูแล้วรู้ขนาดนี้... เลย..."
51110-196 = "คือว่า... แขนฉัน..."
51110-200 = "......"
51110-201 = "[s3] \"ถ้าครูเผลอถามเรื่องที่ลำบากใจจะตอบก็ขอโทษนะ\"\n[s4] \"ครูไม่ได้จะฝืนใจให้ตอบหรอก\""
51110-204 = "...ว่าแต่ครูจากชาเล่ต์มาทำอะไรที่นี่?"
51110-205 = "มีธุระกับเฮียกคิยาโคเหรอ? แค่บังเอิญเจอฉันระหว่างทางกลับเท่านั้นเอง... งั้นเหรอ...?"
51110-206 = "[s] \"เรื่องนั้นช่างมันเถอะ แต่ดูจากชุดแล้ว อย่าบอกนะว่า...\""
51110-210 = "อ่า ฉันน่ะ... คือว่าฉันเป็น..."
51110-211 = "[s] \"สมาชิกของเฮียกกะเรียวรันใช่มั้ย?\""
51110-212 = "..."
51110-213 = "...อย่างนี้นี่เอง จะว่าไป กับครูจากชาเล่ต์แล้ว ฉันยังไม่เคย..."
51110-214 = "อืม"
51110-217 = "คุณพูดถูก"
51110-218 = "ฉัน... เป็นสมาชิกเฮียกกะเรียวรัน"
51110-219 = "ไม่สิ ถ้าจะให้ถูก ต้องบอกว่า 'เคย' เป็น"
51110-220 = "ตอนนี้... ฉันออกมาจากที่นั่นแล้ว"
51110-221 = "[s] \"หลังจากมีคำสั่งสลายตัว ก็มีสมาชิกออกไปกันเยอะเลยใช่ไหม?\""
51110-222 = "คำสั่งสลายตัว..."
51110-223 = "อืม งั้นสินะ ตอนนี้เฮียกกะเรียวรัน..."
51110-224 = "ไม่สิ บางทีมันอาจจะถูกต้องแล้ว"
51110-225 = "พอฉันบอกว่าจะเอาสิ่งนั้นไปคืน คนอื่นก็เลย..."
51110-226 = "..."
51110-227 = "ใช่แล้วละ ฉันก็เลยออกจากเฮียกกะเรียวรันมา... แล้วก็ออกมาเดินตามถนน"
51110-228 = "ฉันอยากพักหายใจสักหน่อย แล้วก็อยากมาสอดส่องถนนเส้นที่จะจัดงานเทศกาลด้วย"
51110-232 = "ขอบคุณที่ช่วยนะ"
51110-233 = "แต่ว่าฉันขอตัว..."
51110-234 = "[s] \"นี่ก็ค่ำแล้ว กลับกันดีไหม?\""
51110-238 = "หืม? ทำไมฉันต้องกลับกับคุณด้วยล่ะ เดี๋ยวนะ..."
51110-244 = "เดี๋ยว... เดี๋ยวก่อน... นี่...!"
51110-251 = "(ความเงียบเข้าปกคลุมขณะที่ทั้งสองคนเดินกลับด้วยกัน)"
51110-252 = "......"
51110-253 = "........."
51110-254 = "คุณบอกว่า... มาที่นี่เพราะมีธุระกับเฮียกคิยาโคใช่มั้ย?"
51110-255 = "แล้วก็รู้เรื่องคำสั่งสลายตัวอีก"
51110-256 = "ถ้าอย่างนั้น... แล้วเรื่องเฮียกกะเรียวรันล่ะ..."
51110-257 = "[s] \"ครูรู้สถานการณ์ของเฮียกกะเรียวรันรึเปล่าน่ะเหรอ?\""
51110-258 = "...อื้ม ก็ฉันออกจากที่นั่นมานานแล้ว จริงๆ ที่มาที่นี่ก็เพราะอยากรู้ด้วย"
51110-259 = "อยากรู้ว่าตอนนี้สถานการณ์ในเฮียกกะเรียวรันเป็นยังไงบ้างน่ะ"
51110-261 = "(คุณครูเล่าเรื่องที่เกิดขึ้นในระหว่างที่อยู่กับยูคาริให้ฟังคร่าวๆ เพราะคิดว่าไม่ใช่เรื่องที่จำเป็นต้องปกปิด#nอยู่แล้ว)"
51110-263 = "...ศึกชิงตำแหน่งงั้นเหรอ"
51110-264 = "อย่างนี้เองสินะ เกิดเรื่องแบบนี้ระหว่างที่ฉันไม่อยู่นี่เอง..."
51110-265 = "ทำไมถึงเป็นกันขนาดนั้นเลย..."
51110-266 = "...ไม่สิ ฉันไม่มีสิทธิ์จะพูดอะไรแบบนั้นแล้ว..."
51110-267 = "[s] \"ครูคิดว่ายูคาริตั้งใจทำแบบนั้นเพราะไม่อยากให้ชมรมเป็นแบบนี้นะ\""
51110-268 = "อืม ก็ยูคาริน่ะ..."
51110-270 = "พื้นที่อยู่อาศัยเฮียกคิยาโค"
51110-273 = "ถึงแค่ตรงนี้ก็พอแล้วละ"
51110-274 = "ขอบคุณที่เดินมาส่งนะ คุณครู... จากชาเล่ต์"
51110-275 = "งั้นฉันขอตัวก่อน..."
51110-276 = "[s] \"ไม่คิดจะกลับไปเฮียกกะเรียวรันเหรอ?\""
51110-280 = "อืม ใช้โอกาสตอนอีกฝ่ายเริ่มใจอ่อนก่อนจะลากัน"
51110-281 = "แล้วจู่ๆ ก็มาถามอะไรแบบนี้สินะ"
51110-282 = "คุณนี่... มีเล่ห์เหลี่ยมมากกว่านี่คิดนะ"
51110-283 = "...ขอโทษนะ แต่ฉันกลับไปไม่ได้หรอก"
51110-284 = "[s] \"เพราะสมาชิกที่ออกไปแล้วเหรอ?\""
51110-285 = "...ใช่"
51110-286 = "เพราะคนพวกนั้นจะไม่ยกโทษให้ฉันได้อีกแล้ว... นั่นก็เพราะฉันตั้งใจจะคืน <สิ่งนั้น>..."
51110-287 = "คนที่ทำเรื่องอย่างนั้นน่ะ... ไม่มีหน้ากลับชมรมไปแบบคนไร้ยางอายหรอก..."
51110-288 = "แล้วฉันก็ไม่ได้แข็งแกร่งด้วย"
51110-289 = "ฉัน... ไม่มีสิทธิ์อะไรแบบนั้น"
51110-290 = "ฉัน... ไม่ใช่ <เด็กคนนั้น>"
51110-295 = "และฉันไม่ได้อยากทำให้คนที่เหลือต้องผิดหวัง..."
51110-296 = "...ใช่ ทั้งหมดนี้คือเหตุผลที่ฉันกลับไปไม่ได้ เพราะงั้น..."

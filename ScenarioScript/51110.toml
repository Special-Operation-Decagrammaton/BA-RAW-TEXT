51110-317 = "[ns] \"...มันคงเป็นเรื่องอ่อนไหวสำหรับสมาชิกเฮียกกะเรียวรันสินะ\""
51110-321 = "[ns] \"ตอนเจอกันคราวหน้า ถามชื่อไว้ด้วยดีกว่าแฮะ\""
51110-323 = "(และวันที่ยาวนานก็ผ่านไป)"

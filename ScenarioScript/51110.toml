51110-132 = "Got her—!"
51110-133 = "What?!"
51110-134 = "[ns] \"On your right!\""
51110-146 = "We've got you now!"
51110-147 = "Everyone—aim for her right side! "
51110-148 = "She doesn't react as fast when we attack from her right!"
51110-149 = "Ha! Exploitin' weak spots is what we Mouryo do best!"

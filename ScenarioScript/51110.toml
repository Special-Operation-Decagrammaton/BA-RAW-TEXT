[translation]
51110-1 = "Episode 11;Member of the Hyakkaryouran"
51110-5 = "Now! Surround her so she can't get away!"
51110-13 = "I know things went poorly when we fought that other girl earlier..."
51110-14 = "But this time it's a sure thing!"
51110-23 = "...*munch munch*"
51110-24 = "I respect that you escaped us last time, but you got no chance now! Not when we've brought the full power of the Mouryo down on you!"
51110-25 = "...*munch munch*"
51110-26 = "Look how scared she is, Boss! She's just standing there eatin'...too terrified for words!"
51110-27 = "Ha! Can you blame her? Numbers like ours are enough to make anyone nervous!"
51110-30 = "*munch munch*"
51110-32 = "*gulp*"
51110-33 = "Oh, so you finished eatin', huh? Lucky for you I'm feelin' generous! I'll give you a chance to start grovelin'!"
51110-34 = "If you apologize right now, for everyone to hear, we might go easy on—"
51110-38 = "*munch munch*"
51110-43 = "B-Boss! She took more yakitori outta her bag and started eatin' again!"
51110-45 = "Arrgh! How dare you, Hyakkaryouran?! Some insults are too much to bear!"
51110-46 = "...As I said previously, I am no member of the Hyakkaryouran."
51110-47 = "I just...happened to be walking around Hyakkiyako to enjoy the festival..."
51110-49 = "Yes. An everyday student of Hyakkiyako... Though perhaps a slightly mystical one...and one who is really quite cute. That's all I am."
51110-51 = "You're sayin' some shameless things with a really irritatin' look on your face!"
51110-52 = "I'm done wastin' time on your nonsense!"
51110-53 = "Everyone, char—!"
51110-54 = "[s] \"W-Wait!\""
51110-62 = "B-Boss?!"
51110-63 = "H-Hey, you can't just shoot someone! Where's your sense of style—"
51110-70 = "C-Captain?!"
51110-71 = "Ack!"
51110-72 = "E-Everyone attack! "
51110-103 = "Ugh..."
51110-107 = "Gah! "

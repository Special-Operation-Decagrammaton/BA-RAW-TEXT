[translation]
51110-1 = "第11話;百花繚亂的成員"
51110-5 = "上吧！大家一起包圍，別讓他給逃了！"
51110-13 = "雖然上午出了一點認錯人的小意外！"
51110-14 = "這次我可總算找對人了！"
51110-23 = "……嚼嚼。"
51110-24 = "上次虧你能從我們手中逃走，但這次你想逃也沒用！#n因為我帶更多妖怪劇團來了！"
51110-25 = "……嚼嚼嚼。"
51110-26 = "隊長！那傢伙什麼話都說不出來，只顧著吃東西……好像很害怕的樣子！"
51110-27 = "哈哈！我們人這麼多，他當然會緊張！"
51110-30 = "嚼嚼……"
51110-32 = "咕嚕。"
51110-33 = "哦？吃完了嗎？#n如果有話要說，我洗耳恭聽！"
51110-34 = "當然，如果你馬上乖乖道歉，我們也可以放你一馬……"
51110-38 = "──嚼嚼嚼嚼。"
51110-43 = "隊長！那傢伙又從手上的袋子裡拿出雞肉串吃起來了！"
51110-45 = "可惡的百花繚亂！你這傢伙到底要戲弄我們到什麼地步……！"
51110-46 = "……我已經說過了，我不是百花繚亂的人。"
51110-47 = "只是個碰巧來到百鬼夜行慶典大街的……"
51110-49 = "嗯，只是一個普通到不行，有點神祕……又有點可愛的百鬼夜行學生而已。"
51110-51 = "那傢伙超厚臉皮的，盡說些討人厭的話。"
51110-52 = "我不會再聽你廢話下去了！"
51110-53 = "全體突……！"
51110-54 = "[s]「等一下！」"
51110-62 = "隊長！？"
51110-63 = "喂喂！至少該具備最基本的美感吧……"
51110-70 = "前輩！？"
51110-71 = "哎！"
51110-72 = "全，全體突擊！"
51110-103 = "唔…………"
51110-107 = "可惡！"
51110-108 = "使，使用人海戰術！"
51110-114 = "……！"
51110-121 = "（不知道連續戰鬥了多久）"
51110-132 = "抓到了……！"
51110-133 = "……！？"
51110-134 = "[ns]「右邊！」"
51110-146 = "我發現了！"
51110-147 = "右邊！從右邊攻擊！"
51110-148 = "他對右側攻擊的反應比較遲鈍！"
51110-149 = "自古以來，執抝地攻擊弱點取勝就是我們妖怪劇團的拿手好戲！"
51110-150 = "真煩人……！"
51110-152 = "發射火箭筒！"
51110-156 = "哇，什麼都看不見！"
51110-157 = "咳咳，咳咳……"
51110-164 = "[ns]「這樣戰鬥下去不妙，現在先避戰吧。」"
51110-165 = "……是誰？"
51110-170 = "等，等等……我……"
51110-177 = "[ns1]「哈啊，哈啊……跑到這裡應該可以了吧。」\n[ns2]「幸好沒受重傷。」"
51110-180 = "……你是誰？"
51110-184 = "夏萊的老師……？"
51110-185 = "如果是夏萊的老師……一定……"
51110-186 = "……不，其實你不需要幫忙的。"
51110-187 = "就算沒有老師的幫忙，我也能自己搞定。"
51110-192 = "[ns]「你的右手受傷了嗎？」"
51110-193 = "……！"
51110-194 = "你說我對右側的反應很遲鈍？"
51110-195 = "連外人……都看得出來啊……"
51110-196 = "這……這是……"
51110-200 = "…………"
51110-201 = "[s3]「抱歉問了多餘的問題。」\n[s4]「我沒有要逼問你的意思。」"
51110-204 = "……夏萊的老師怎麼會來這裡？"
51110-205 = "來百鬼夜行有事嗎？#n只是偶然在回去的路上遇到我……？"
51110-206 = "[s]「先不說這個了，從服裝看來，難道你是……」"
51110-210 = "嗯，其實我是……百花繚亂的……"
51110-211 = "[s]「果然是百花繚亂的成員嗎？」"
51110-212 = "…………"
51110-213 = "……原來如此。#n這麼說來，我還沒和夏萊的老師……"
51110-214 = "嗯。"
51110-217 = "你說的對。"
51110-218 = "我……確實是百花繚亂的成員。"
51110-219 = "不，準確來講應該說[ruby= ・     ・ ]曾是[/ruby]才對。"
51110-220 = "因為現在……我已經離開那裡了。"
51110-221 = "[s]「我也聽說了。有很多成員在得知解散令之後選擇退出。」"
51110-222 = "解散令……"
51110-223 = "嗯，這樣啊，百花繚亂已經……"
51110-224 = "不，這也是當然的。"
51110-225 = "畢竟我想歸還那樣東西，那些孩子當然……"
51110-226 = "…………"
51110-227 = "沒錯，所以我也退出了百花繚亂……暫時在街上閒逛。"
51110-228 = "因為我想稍微喘口氣，順便看看舉辦慶典的街道。"
51110-232 = "剛才謝謝你幫忙。"
51110-233 = "那我就先告辭──"
51110-234 = "[s]「時間也不早了，我們回去吧？」"
51110-238 = "嗯？我為什麼要跟你一起，等等……"
51110-244 = "請……請等一下……！"
51110-251 = "（一起回去的路上，充滿了沉默）"
51110-252 = "……"
51110-253 = "…………"
51110-254 = "老師剛才說……來百鬼夜行有事要辦對吧。"
51110-255 = "既然你已經知道關於解散令的事……"
51110-256 = "那……百花繚亂的事……"
51110-257 = "[s]「你想問我知不知道百花繚亂的近況嗎？」"
51110-258 = "……嗯。因為我已經離開一段時間了，所以有點好奇。"
51110-259 = "百花繚亂的近況究竟如何。"
51110-261 = "（因為不是什麼值得隱瞞的事，於是就照他的要求大致說明了今天和紫經歷的事）"
51110-263 = "繼承戰……是嗎。"
51110-264 = "原來如此，我不在的時候發生了那種事啊……"
51110-265 = "怎麼會……"
51110-266 = "……不，我沒資格說這種話……"
51110-267 = "[s]「我想紫是這麼認為的……『不能就這樣坐以待斃』。」"
51110-268 = "是嗎，紫他……"
51110-270 = "百鬼夜行．住宅區"
51110-273 = "到這裡就行了。"
51110-274 = "謝謝你送我回來，夏萊的老師。"
51110-275 = "那麼──"
51110-276 = "[s]「你不打算回到百花繚亂嗎？」"
51110-280 = "原來如此。#n在離開前趁著對方釋出好意，一時鬆懈的時機……"
51110-281 = "突然提出這個問題啊。"
51110-282 = "老師比我想得還居心叵測呢。"
51110-283 = "……很抱歉，我不能回去。"
51110-284 = "[s]「因為你已經退出了嗎？」"
51110-285 = "…………沒錯。"
51110-286 = "因為我當時想歸還「那個」……他們應該再也不會原諒我了。"
51110-287 = "事到如今……我的臉皮也沒有厚到能不知廉恥地回去……"
51110-288 = "況且我也不強。"
51110-289 = "我……沒有那個資格。"
51110-290 = "因為我……不是「那孩子」。"
51110-295 = "我不想讓留下來的人失望……"
51110-296 = "……沒錯，我不能回去的理由就只有這個……所以……"
51110-301 = "[log=???]「騙人」[/log]"
51110-304 = "「騙人」"
51110-307 = "「騙人」"
51110-310 = "「騙人」"
51110-313 = "告辭。"
51110-317 = "[ns]「……對百花繚亂的成員來說，這果然是很敏感的話題吧。」"
51110-321 = "[ns]「下次見面時，希望至少能知道他叫什麼名字。」"
51110-323 = "（於是夜幕逐漸降臨）"
51110-325 = "下一話;桐生桔梗，以及繼承戰（１）"

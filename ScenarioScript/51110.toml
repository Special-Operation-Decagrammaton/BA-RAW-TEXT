51110-157 = "*cough* *cough*"
51110-164 = "[ns] \"This fight is turning ugly. We should retreat before they damage the district.\""
51110-165 = "...Who are?"
51110-170 = "W-Wait a moment—!"
51110-177 = "[ns1] \"Phew...surely that's far enough.\"\n[ns2] \"I'm glad you weren't hurt.\""
51110-180 = "...Who are you?"
51110-184 = "The Sensei of Schale?"
51110-185 = "To be spirited from danger by Schale's Sensei is..."
51110-186 = "...No, I was in no need of your assistance."
51110-187 = "I thank you, but I had the situation under control."
51110-192 = "[ns] \"Your right hand... Have you been injured?\""
51110-193 = "...!"
51110-194 = "So you also perceived my vulnerability to attacks from my right..."
51110-195 = "To think it so obvious that even an outsider could guess..."
51110-196 = "This... Well..."
51110-200 = "..."
51110-201 = "[s3] \"I'm sorry if I asked a tactless question.\"\n[s4] \"You don't need to tell me if you don't want to.\""
51110-204 = "...What business does the Sensei of Schale have at our academy?"
51110-205 = "You were invited to come to Hyakkiyako? And you stumbled across that battle on your way back..."
51110-206 = "[s] \"I've seen students wearing that outfit before...\""
51110-210 = "Ah, yes... The haori of the Hyakkaryouran..."
51110-211 = "[s] \"So, you're a member of the Hyakkaryouran?\""
51110-212 = "..."
51110-213 = "...Now that I think about it, Sensei..."
51110-214 = "Yes."
51110-217 = "I suppose you're right."
51110-218 = "I am...definitely a member of the Hyakkaryouran."
51110-219 = "Or what is left of one, at any rate."
51110-220 = "Though perhaps I should not name myself such...after I left."
51110-221 = "[s] \"I heard that a lot of students left after the order to disband was announced.\""
51110-222 = "A Declaration of Dissolution..."
51110-223 = "Of course... Then the Hyakkaryouran is already..."
51110-224 = "No. I should have expected as much."
51110-225 = "What choice did they have after I tried to return the..."
51110-226 = "..."
51110-227 = "My apologies, Sensei. I have been somewhat at odds since the Hyakkaryouran disbanded."
51110-228 = "I wished to catch my breath, you might say, and witness the festivities..."
51110-232 = "I thank you again for the assistance."
51110-233 = "But now..."
51110-234 = "[s] \"Shall we head back then, since it's late?\""
51110-238 = "Wh-What? You would accompany me back...? Why—"
51110-244 = "Then, well... I would be much obliged."
51110-251 = "For a time, only our footsteps could be heard as we walked alongside each other."
51110-252 = "..."
51110-253 = "..."
51110-254 = "...You said that you were invited to take care of some business for Hyakkiyako."
51110-255 = "And you were already aware of the Declaration of Dissolution."
51110-256 = "Then, regarding the Hyakkaryouran... Do you perhaps..."
51110-257 = "[s] \"Do I know the latest news about the Hyakkaryouran?\""
51110-258 = "...Yes. It has been some time since I departed. You might say that I am...curious."
51110-259 = "I would like to know more about the other members of the Hyakkaryouran, if I could."
51110-261 = "Since Yukari hadn't asked me to keep anything secret, I gave her a general description of what had occurred with the other Hyakkaryouran students."
51110-263 = "A succession contest, then..."
51110-264 = "I see. So while I've been away, the situation has degraded so far as to..."
51110-265 = "How could it fall apart so..."
51110-266 = "...No. That is not a question I have the right to ask."
51110-267 = "[s] \"The club cannot continue in its current state. At least, I'm sure that's what Yukari feels.\""
51110-268 = "That's right. Yukari..."
51110-270 = "Hyakkiyako Residential Area"
51110-273 = "This is far enough."
51110-274 = "You have my gratitude for escorting me, Sensei of Schale."
51110-275 = "Then..."
51110-276 = "[s] \"Do you have no plans of returning to the Hyakkaryouran?\""
51110-280 = "Launching a sudden inquisition at the moment of departure, trusting that your opponent's heart has been softened by the good will they've been shown..."
51110-281 = "Asking that question now, when a refusal to answer would be the most discourteous..."
51110-282 = "You possess more cunning than I expected, Sensei."
51110-283 = "...But yes. It has become clear to me that going back would be a terrible mistake."
51110-284 = "[s] \"Because you're no longer a member?\""
51110-285 = "...Yes."
51110-286 = "I tried to...return something important and the others will never forgive me for it."
51110-287 = "I fear that my heart is neither shameless enough..."
51110-288 = "Nor strong enough to endure that pain again."
51110-289 = "I...have no right."
51110-290 = "I'm not her, after all."
51110-295 = "I have already inflicted enough disappointment on the others."
51110-296 = "That is the reason I can never go back..."
51110-301 = "[log=???]<Lies>[/log]"
51110-304 = "<Deceit>"
51110-307 = "<Falsehood>"
51110-310 = "<Lies>"
51110-313 = "Farewell, Sensei."
51110-317 = "[ns] \"...I suppose it's a difficult subject for members of the Hyakkaryouran.\""
51110-321 = "[ns] \"Next time, I hope I can ask for her name, at least.\""
51110-323 = "And just like that, the hours trickled through our fingers and the shadows darkened deeper into the night."

[translation]
10016035-2 = "I was sitting in the stands, ready to watch the games."
10016035-7 = "Hi there, Sensei. You made it!"
10016035-8 = "Heehee. I wanted to say thank you again for yesterday. I hope you got some sleep."
10016035-9 = "[s1] \"Yes, I got a lot of rest, thanks to you students.\" \n[s2] \"Did you get some rest, Noa?\""
10016035-10 = "Same here! I took a quick nap before the opening ceremony."
10016035-11 = "I did. I took a quick nap before the opening ceremony."
10016035-12 = "I heard there were a few incidents while I was napping, but it is what it is."
10016035-13 = "I'm glad everyone seems to be enjoying themselves."
10016035-14 = "[s] \"I guess all our hard work paid off, huh?\""
10016035-15 = "It's a great feeling. Now then, what's the next game?"
10016035-16 = "Oh, it's the scavenger hunt!"
10016035-17 = "Well, I'm well-rested and full of energy! I'll be off, Sensei."
10016035-18 = "[s] \"Are you participating in the hunt, Noa?\""
10016035-19 = "That I am! But as a referee, not a contestant."
10016035-20 = "Did you hear, though? Yuzu from the Game Development Department was scheduled for this event, but Yuuka insisted on taking her spot!"
10016035-21 = "Heehee. The scavenger hunt... It's consistently one of the most popular games at the Kivotos Halo Festival."
10016035-22 = "What you get on your note is determined through a draw. Not even the Executive Committee knows what's written on them. It's also an unwritten rule that \"someone you like\" is always written on some notes to make the game extra fun."
10016035-23 = "I'm quite excited to see which note Yuuka will draw."
10016035-24 = "Well then, enjoy the rest of the games, Sensei!"
10016035-26 = "The wait is finally over!"
10016035-27 = "The most eagerly awaited event of all of field day is here! Let the scavenger hunt begin!"
10016035-28 = "Listen to the audience roar in approval for their favorite game!"
10016035-29 = "The rules of the game are simple! Players will each draw a slip of paper from the box in the middle of the track. They must then go fetch whatever item or person is written on their paper and cross the finish line to win!"
10016035-30 = "There's a catch! You're not allowed to show anyone what's on your paper!"
10016035-31 = "And here they are! The scavenger hunt contestants are walking onto the field as I speak!"
10016035-40 = "(Thank goodness Yuzu was happy to let me take her place.)"
10016035-41 = "(She seemed pretty relieved actually. Yuzu has never been the best at talking to strangers.)"
10016035-42 = "(...I can't lose this game. I have to win for Millennium!)"
10016035-46 = "(That student referee... Is she that Seminar executive I met last time?)"
10016035-47 = "(How can executives from their Student Council enter as both contestants and referees for the same game? I don't trust Millennium at all.)"
10016035-48 = "(But I'm an elite member of SRT! No matter what schemes they're cooking, I can just overpower them with my strength.)"
10016035-52 = "(I've analyzed video footage from past field days and ran simulations on every possible scenario.)"
10016035-53 = "(I'm going to win and secure Gehenna's lead for the Halo Festival!)"
10016035-57 = "Now... Ready... Get set..."
10016035-58 = "Go!"
10016035-59 = "With the bang of the starting flare, the contests are off!"
10016035-60 = "The first to reach the box is..."
10016035-61 = "Sorai Saki from SRT Academy!"
10016035-62 = "SRT Academy is currently closed, but they received permission from Schale to use the name temporarily, just for the festival."
10016035-63 = "Will Saki be able to achieve SRT Academy's first victory?"
10016035-65 = "Let's see. The item is..."
10016035-66 = "...A four-point-two inch white phosphorus smoke grenade?! How am I supposed to find a weapon like that in the stadium?!"
10016035-67 = "Disqualified!"
10016035-68 = "D-Disqualified?!"
10016035-69 = "Sorry, but it's the rules! You are not allowed to reveal what is written on your paper until you pass the finish line and present it to the referee!"
10016035-70 = "It ruins the game if other students know what you have. Part of the game is for each participant to guess what the others have!"
10016035-71 = "And if you reveal your item, you could receive help from other students, and this isn't a team game!"
10016035-72 = "My apologies, but Sorai Saki is disqualified! Please make your way off the track."
10016035-77 = "I knew you were a dummy, Saki, but even I had higher expectations of you!"
10016035-78 = "Th-There's only four of us, so w-we probably should've managed our expectations a l-little bit..."
10016035-79 = "Good effort, Saki."
10016035-80 = "There's still a lot more games to play. We'll win the next one."
10016035-81 = "...Ugh."
10016035-82 = "W-Well, it would've been impossible to win even if I hadn't been disqualified."
10016035-83 = "I mean, who would bring a phosphorus smoke grenade to the Halo Festival?"
10016035-84 = "Y-Yeah... Who would do that...?"
10016035-85 = "...Seriously, Moe?"
10016035-89 = "That's one down, two more to go!"
10016035-90 = "Hayase Yuuka from Millennium Science School is the next to reach the box!"
10016035-94 = "*pant pant* Let's see... I have to get..."
10016035-95 = "Hmm... No, not this..."
10016035-96 = "Not this one either..."
10016035-100 = "Hah! Found it!"
10016035-107 = "Sensei! Can you please come with me for a second?"
10016035-108 = "[s] \"M-Me?\""
10016035-109 = "Yes! There's no time for you to be confused! Let's go!"
10016035-114 = "Yuuka went sprinting towards the Schale Sensei as soon as she got her note!"
10016035-115 = "And with that, she takes the lead! What could be written on her note?! Why did she bring Sensei?"
10016035-116 = "And she's passed the finish line! We have a first place winner...or do we?"
10016035-117 = "Before we announce anything, the referee will have to check if she brought the correct item."
10016035-121 = "Hmm... I see..."
10016035-122 = "I see how Yuuka feels about [USERNAME] Sensei now. Heehee."
10016035-123 = "I-I don't know what you're saying! You're being biased! Just make a decision already."
10016035-124 = "Yes. This is acceptable. Hayase Yuuka is in the lead."
10016035-125 = "Yes! I did it!"
10016035-129 = "...Going for \"someone you like\" is always part of the scavenger hunt."
10016035-130 = "At least one contestant usually takes the person they like over the finish line with that. They say it's the blessing of the Halo Festival, because the pair always starts going out after!"
10016035-131 = "It doesn't seem like the other contestants got that prompt..."
10016035-132 = "Oh my god! And Yuuka started running towards Sensei when she pulled her paper!"
10016035-133 = "W-Wait! This is a misunderstanding!"
10016035-134 = "The note I picked didn't say \"someone you like.\" It said \"someone who's mature\"..."
10016035-135 = "Yuuka! You're not allowed to say what's written on your paper."
10016035-136 = "The whole point is to guess what each contestant has!"
10016035-137 = "I already passed the finish line! It shouldn't matter."
10016035-138 = "Do you really have to nitpick against another Millennium student? And fellow Seminar member of all people?"
10016035-139 = "Yes. I do. Fair and free competition is the very soul of the Halo Festival."
10016035-140 = "I can't make any exceptions. Even if you do look adorable when you're embarrassed, Yuuka."
10016035-141 = "I have nothing to be embarrassed about! I'm telling you it didn't say \"someone you like\"!"
10016035-142 = "[s] \"Oh... So you didn't choose me as someone you like...\""
10016035-143 = "What?!"
10016035-144 = "N-No! That's not what I meant, Sensei..."
10016035-145 = "I-I didn't mean it like that...!"
10016035-146 = "...Did you guys just hear her?"
10016035-147 = "That confession really came from the bottom of her heart."
10016035-148 = "Are all Millennium students this bold? I'm impressed."
10016035-149 = "Please, listen to me! This is a misunderstanding!"
10016035-151 = "It took me quite some time and a lot of reassurances to calm Yuuka down and make her feel better."

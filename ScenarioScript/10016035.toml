10016035-6 = "3;노아 학교 체육복;01\n#3;a\n#wait;1500"
10016035-7 = "3;노아 학교 체육복;01;아, 선생님. 여기에 계셨군요.\n#3;em;[반응]"
10016035-8 = "3;노아 학교 체육복;03;후후, 어제는 밤늦게까지 수고 많으셨습니다. 잠은 조금 주무셨나요?"
10016035-9 = "[s1] \"응, 학생들이 배려해 준 덕분에 잠깐 쉬었어.\"\n[s2] \"노아도 쉬었어?\""
10016035-10 = "3;노아 학교 체육복;01;네, 저도 개회식이 시작하기 전에 잠깐 눈을 붙였답니다.\n#3;em;[음표]"
10016035-11 = "3;노아 학교 체육복;01;네, 저도 개회식이 시작하기 전에 잠깐 눈을 붙였답니다.\n#3;em;[음표]"
10016035-12 = "3;노아 학교 체육복;02;눈을 붙이고 있는 사이에 뭔가 몇 가지 큰 소동이 지나간 것 같긴 하지만……"
10016035-13 = "3;노아 학교 체육복;03;그래도 다들 활기차고 즐거워 보여서 다행이네요."
10016035-14 = "[s] \"열심히 준비한 보람이 있었네.\""
10016035-15 = "3;노아 학교 체육복;02;그러게요. 그럼 이어지는 다음 경기는……"
10016035-16 = "3;노아 학교 체육복;03;어머나, <물건 빌려오기> 경주였군요.\n#3;em;[반응]"
10016035-17 = "3;노아 학교 체육복;01;휴식도 충분히 취한 것 같으니, 슬슬 나갈 준비를 해야겠네요."
10016035-18 = "[s] \"물건 빌려오기 경주에는 노아가 선수로 나가는 거야?\""
10016035-19 = "3;노아 학교 체육복;99;아뇨, 저는 선수가 아니라 심판으로 참여할 예정이랍니다."
10016035-20 = "3;노아 학교 체육복;01;본래는 게임개발부의 하나오카 양이 나갈 예정이었지만, 유우카 쨩의 강력한 요청이 있어서 유우카 쨩이 대신 나가게 되었어요."
10016035-21 = "3;노아 학교 체육복;03;후후, <물건 빌려오기>라…… 이 <물건 빌려오기> 경주는 매 황륜대제마다 숱한 화제를 낳는 인기 경기랍니다.\n#3;em;[하트]"
10016035-22 = "3;노아 학교 체육복;01;쪽지의 내용은 실행위원들도 알 수 없도록 추첨을 통해 정해지지만, 게임의 재미를 위해 '좋아하는 사람'이 적힌 쪽지를 하나 넣는 게 <황륜대제>의 불문율이거든요."
10016035-23 = "3;노아 학교 체육복;01;……과연 이번 경기에서는 유우카 쨩이 어떤 쪽지를 뽑을까 기대되네요."
10016035-24 = "3;노아 학교 체육복;03;그럼, 선생님. 앞으로도 계속 즐겁게 경기를 관람해주세요.\n#3;em;[음표]"
10016035-25 = "#all;hide"
10016035-26 = "3;통신시논;00;여러분, 오래 기다리셨습니다!\n#3;a\n#3;em;[반응]"
10016035-27 = "3;통신시논;07;지금부터 매회 선수들의 취향을 두고 화제를 몰고 다녔던 그 경기, <물건 빌려오기> 경주의 중계를 시작하겠습니다!"
10016035-28 = "3;통신시논;01;경기의 인기를 방증이라도 하듯, 관중석의 분위기도 아까보다 훨씬 더 뜨겁게 달아올랐는데요!"
10016035-29 = "3;통신시논;02;경기의 룰은 간단합니다! 트랙 가운데 있는 상자에서 특정한 키워드가 적힌 쪽지를 뽑고, 그 키워드에 부합하는 사람이나 물건과 함께 결승선을 통과하면 됩니다!\n#3;em;[재잘]"
10016035-30 = "3;통신시논;05;단, 쪽지의 내용은 심판에게 보여줄 때까지는 발설해서는 안 된다고 하네요!"
10016035-31 = "3;통신시논;00;앗. 말씀드리는 순간, 물건 빌려오기 경주에 참가하는 선수들이 트랙에 입장하고 있습니다!\n#3;em;[!]"

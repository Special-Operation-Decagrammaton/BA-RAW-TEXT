[translation]
10016035-2 = "(คุณครูกำลังนั่งอยู่บนอัฒจันทร์เพื่อชมการแข่งขัน และระหว่างนั้นเอง...)"
10016035-7 = "อ๊ะ คุณครู มาอยู่ตรงนี้เองเหรอคะ"
10016035-8 = "ฮุฮุ เมื่อคืนต้องเหนื่อยทั้งคืนเลยใช่มั้ยคะ ได้นอนพักบ้างแล้วยังคะ?"
10016035-9 = "[s1] \"อื้ม ต้องขอบใจนักเรียนที่ทำให้ครูได้พักกับเขาบ้าง แล้วโนอาล่ะ?\"\n[s2] \"ถึงเหนื่อยแต่ก็ได้พักเหมือนกัน แล้วโนอาล่ะ?\""
10016035-10 = "ฉันเองก็งีบหลับไปสักครู่หนึ่งก่อนจะเริ่มเปิดการแข่งขันแล้วละค่ะ"
10016035-11 = "ฉันเองก็งีบหลับไปสักครู่หนึ่งก่อนจะเริ่มเปิดการแข่งขันแล้วละค่ะ"
10016035-12 = "แต่ระหว่างที่หลับอยู่ รู้สึกเหมือนมีเรื่องโกลาหลเกิดขึ้น 2-3 เรื่องเลยค่ะ..."
10016035-13 = "แต่ยังไงก็โล่งอกที่ทุกคนยังดูมีชีวิตชีวาและสนุกสนานไปกับงานนะคะ"
10016035-14 = "[s] \"คุ้มค่ากับที่ตั้งใจเตรียมงานกันเลยนะ\""
10016035-15 = "นั่นสิคะ การแข่งขันในรายการต่อไป..."
10016035-16 = "โอ๊ะ เป็นการแข่งขัน <ของชิ้นนั้น เอามันมาให้ที> น่ะค่ะ"
10016035-17 = "ได้พักผ่อนกันพอสมควรแล้ว คงต้องเตรียมตัวออกไปแล้วละค่ะ"
10016035-18 = "[s] \"โนอาลงแข่งในการแข่งขันของชิ้นนั้น เอามันมาให้ทีงั้นเหรอ?\""
10016035-19 = "ไม่ใช่ค่ะ ฉันไม่ได้ลงแข่ง แต่ไปเป็นกรรมการตัดสินน่ะค่ะ"
10016035-20 = "เดิมทีแล้ว ฮานาโอกะจากชมรมพัฒนาเกมจะเป็นคนลงแข่งค่ะ แต่ยูกะจังก็ไปขอว่าตนจะลงแข่งเอง สุดท้ายก็เลยให้ยูกะจังเป็นตัวแทนแข่งขันค่ะ"
10016035-21 = "ฮุฮุ... <ของชิ้นนั้น เอามันมาให้ที> เป็นการแข่งขันยอดฮิตที่เป็นประเด็นได้ในฮาโลเฟสติวัลทุกครั้งเลย#nละค่ะ"
10016035-22 = "ข้อความที่อยู่ในโน้ตจะกำหนดโดยการสุ่ม จะได้เป็นความลับแม้แต่กับคณะกรรมการจัดงาน แต่ทุกปีจะ#nมีการใส่โน้ตที่เขียนว่าให้ไปเอาตัว 'คนที่ชอบ' มา จนเป็นธรรมเนียมของฮาโลเฟสติวัลไปแล้วค่ะ"
10016035-23 = "...อยากรู้จังเลยค่ะว่าครั้งนี้ยูกะจังจะหยิบได้กระดาษโน้ตแผ่นไหน"
10016035-24 = "เอาละ ถ้างั้นก็ขอให้สนุกกับการแข่งขันที่เหลือนะคะคุณครู"
10016035-26 = "รอกันนานมั้ยคะทุกคน!"
10016035-27 = "จากนี้ไปจะเริ่มการแข่งขัน <ของชิ้นนั้น เอามันมาให้ที> ที่เป็นการแข่งขันวัดรสนิยมของผู้เข้าแข่งขัน#nจนเป็นประเด็นในทุกครั้งแล้วค่ะ!"
10016035-28 = "ตอนนี้บรรยากาศบนอัฒจันทร์ครึ้กครื้นมากกว่าเดิมหลายเท่าเลยค่ะ ถือว่าเป็นสิ่งพิสูจน์ความนิยมของ#nการแข่งขันนี้ได้เลยนะคะ"
10016035-29 = "กติกาการแข่งขันนั้นง่ายมากค่ะ เพียงหยิบกระดาษโน้ตที่มีคีย์เวิร์ดเขียนอยู่จากกล่องที่อยู่ในสนาม จากนั้นก็ไปเอาสิ่งของหรือบุคคลที่สอดคล้องกับคีย์เวิร์ดนั้นมาแล้ววิ่งให้ถึงเส้นชัยค่ะ!"
10016035-30 = "แต่มีข้อแม้ว่าห้ามเปิดเผยคีย์เวิร์ดในกระดาษโน้ตจนกว่าจะวิ่งมาถึงเส้นชัยนะคะ!"
10016035-31 = "อ๊ะ ระหว่างที่ฉันอธิบายกติกา เหล่านักกีฬา <ของชิ้นนั้น เอามันมาให้ที> ก็ตบเท้าลงสนามกันแล้วค่ะ!"
10016035-40 = "(โชคดีที่ยูสึยอมยกสิทธิ์แข่งขันนี้ให้เราแทน)"
10016035-41 = "(ก็ยูสึไม่ค่อยถนัดกับการชวนคนแปลกหน้าคุยนี่เนอะ...)"
10016035-42 = "(เพื่อชัยชนะของโรงเรียนมิลเลเนียม ฉันจะแพ้ในการแข่งขันนี้ไม่ได้!)"
10016035-46 = "(นักเรียนที่เป็นกรรมการคนนั้น... ใช่สมาชิกเซมิน่าที่เคยเจอกันก่อนหน้านี้แล้วรึเปล่าน่ะ?)"
10016035-47 = "(สภานักเรียนเป็นทั้งผู้เข้าแข่งขันและกรรมการตัดสินในการแข่งขันเดียวกันเลยเหรอ... น่าสงสัยชะมัด พวกมิลเลเนียม...)"
10016035-48 = "(ถึงจะไม่รู้ว่าพวกนั้นกำลังวางแผนร้ายอะไรอยู่ แต่แค่เอาชนะด้วยร่างกายก็พอ!)"
10016035-52 = "(ฉันอ้างอิงผลการแข่งขันในงานมหกรรมแข่งขันกีฬาครั้งที่แล้ว และวิเคราะห์ความเป็นไปได้ของ#nคีย์เวิร์ดในกระดาษโน้ตมาหมดแล้วค่ะ)"
10016035-53 = "(ฉันจะเอาชนะในการแข่งขันนี้ เพื่อให้เกเฮนน่าได้ลอยลำเข้าสู่อันดับ 1 อย่างแน่นอนให้ได้ค่ะ!)"
10016035-57 = "เอาละ ถ้างั้นทุกคนก็เตรียมตัว..."
10016035-58 = "และ... เริ่มค่ะ!"
10016035-59 = "ทันทีที่กรรมการยิงให้สัญญาณ นักกีฬาทุกคนก็วิ่งตรงไปยังกล่องสุ่มกระดาษโน้ตแล้วค่ะ!"
10016035-60 = "และนักกีฬาที่วิ่งไปถึงกล่องได้เป็นคนแรกก็คือ..."
10016035-61 = "โซราอิ ซากิ จากสถาบันพิเศษ SRT ค่ะ!"
10016035-62 = "ถึงตอนนี้สถาบันพิเศษ SRT จะถูกปิดไปแล้ว แต่ชาเล่ต์ก็ช่วยทำเรื่องให้สามารถลงแข่งขันในนามสถาบัน SRT ได้ชั่วคราวค่ะ"
10016035-63 = "นักกีฬาซากิจะคว้าชัยชนะแรกให้กับสถาบัน SRT จากการแข่งขันนี้ได้มั้ยคะ?"
10016035-65 = "ไหนดูซิ ของที่ต้องไปเอามาคือ..."
10016035-66 = "ระเบิดควันฟอสฟอรัสขาวขนาด 4.2 นิ้ว? จะไปหาของแบบนี้จากในสนามได้ยังไงกันเล่า?!"
10016035-67 = "ปี๊ด~! ตกรอบค่ะ!"
10016035-68 = "ตะ... ตกรอบเหรอ?!"
10016035-69 = "เราได้แจ้งไปก่อนเริ่มการแข่งขันแล้วว่า กฎเหล็กของการแข่งขัน <ของชิ้นนั้น เอามันมาให้ที> คือต้อง#nปิดคีย์เวิร์ดที่ได้เป็นความลับจนกว่าจะวิ่งเข้าเส้นชัยค่ะ"
10016035-70 = "ถ้านักเรียนคนอื่นรู้ว่าของที่ต้องไปเอามาคืออะไรมันก็จะหมดความน่าสนุก—"
10016035-71 = "ไม่สิ ถ้าคนอื่นรู้ ก็อาจจะแอบช่วยก็ได้ค่ะ"
10016035-72 = "น่าเสียดายนะคะ แต่คงต้องให้โซราอิ ซากิ ตกรอบค่ะ"
10016035-77 = "อะไรของเธอเนี่ย ยัยบื้อซากิ!"
10016035-78 = "แค่พวกเราสี่คนคงสู้ไม่ไหวหรือเปล่านะ..."
10016035-79 = "ถือว่าทำได้ดีแล้วละค่ะ ซากิ"
10016035-80 = "ยังมีการแข่งขันอื่นเหลืออีก ไว้คว้าที่ 1 จากรายการอื่นแล้วกันค่ะ"
10016035-81 = "อึก..."
10016035-82 = "ตะ... แต่ถึงจะไม่โดนปรับให้ตกรอบ ก็ไม่น่าจะได้ที่ 1 อยู่แล้วแหละ"
10016035-83 = "ใครมันจะไปพกระเบิดควันฟอสฟอรัสขาวมาดูแข่งกีฬาด้วยกันเล่า—"
10016035-84 = "ฉันมีมาลูกหนึ่งนะ?"
10016035-85 = "...นี่เธอพกของแบบนั้นติดตัวมาทำไมน่ะ?"
10016035-89 = "นักกีฬาซากิออกจากการแข่งขันไป จึงต้องเริ่มใหม่กันอีกครั้งค่ะ!"
10016035-90 = "ฮายาเสะ ยูกะ จากโรงเรียนมิลเลเนียมที่มาถึงกล่องเป็นคนถัดไปจะได้หยิบกระดาษโน้ตค่ะ!"
10016035-94 = "แฮ่ก... แฮ่ก... ไหนดูซิ ของที่ต้องไปเอามา..."
10016035-95 = "เอ่อ... อยู่ไหนนะ... คนนี้ก็ไม่ใช่"
10016035-96 = "คนนี้ก็ไม่ใช่อีก..."
10016035-100 = "อ๊ะ เจอแล้ว!"
10016035-107 = "คุณครูคะ ช่วยไปกับฉันหน่อยนะคะ!"
10016035-108 = "[s] \"คะ... ครูเหรอ?\""
10016035-109 = "ค่ะ! ไม่มีเวลาลังเลแล้ว! ให้ไวเลยค่ะ!"
10016035-114 = "นักกีฬายูกะอ่านคีย์เวิร์ดแล้วก็รีบวิ่งไปหาคุณครูจากชาเล่ต์เลยค่ะทุกคน!"
10016035-115 = "ตอนนี้เธออยู่ในอันดับ 1 เลย! ไปพาคุณครูจากชาเล่ต์มาแบบนี้ สงสัยจังเลยค่ะว่าคีย์เวิร์ดที่ได้คืออะไร#nกันแน่?"
10016035-116 = "วิ่งเข้าเส้นชัยไปแล้วค่ะ! ได้ครองอันดับ 1 ชั่วคราวเลยค่ะ!"
10016035-117 = "แต่ยังเหลือการตัดสินของกรรมการนะคะ ว่าไปเอาของที่ตรงกับคีย์เวิร์ดมาให้จริงๆ หรือเปล่า!"
10016035-121 = "อืม... อย่างนี้เองเหรอคะ..."
10016035-122 = "ที่ผ่านมายูกะจังคิดกับคุณครู [USERNAME] แบบนี้สินะคะ ฮุฮุ"
10016035-123 = "อะ... อะไรน่ะ? มันอิงตามความคิดส่วนตัวของผู้เข้าแข่งขันไม่ใช่เหรอ? รีบตัดสินเร็วๆ เข้าสิ!"
10016035-124 = "ค่ะ ให้ผ่านค่ะ นักกีฬาฮายาเสะ ยูกะ ได้อันดับ 1 ค่ะ"
10016035-125 = "ทำได้แล้ว!"
10016035-129 = "เกม <ของชิ้นนั้น เอามันมาให้ที> จะมีโจทย์ 'คนที่ชอบ' เหมือนกันทุกครั้งใช่มั้ย?"
10016035-130 = "ทุกครั้งจะมีนักกีฬาที่วิ่งเข้าเส้นชัยพร้อมคนที่ตัวเองชอบ จนได้เป็นคู่รักให้เห็นบ่อยๆ เลยละค่ะ"
10016035-131 = "นักกีฬาคนอื่นก็ไม่น่าหยิบได้คีย์เวิร์ดคนที่ชอบนะ..."
10016035-132 = "พอได้อ่านคีย์เวิร์ดก็รีบวิ่งปรี่ไปหาคุณครูขนาดนั้น แสดงว่าคุณยูกะ..."
10016035-133 = "ดะ... เดี๋ยวก่อน! ทุกคนเข้าใจอะไรผิดกันอยู่น่ะ?!"
10016035-134 = "คีย์เวิร์ดที่ฉันได้ ไม่ใช่ 'คนที่ชอบ' แต่เป็น 'คนที่เป็นผู้ใหญ่'—"
10016035-135 = "อ๊ะ ไม่ได้นะคะ ยูกะจัง ถ้าเปิดเผยเนื้อหาในกระดาษโน้ต จะเป็นการผิดกติกานะคะ"
10016035-136 = "การให้ผู้ชมได้เดาว่านักกีฬาที่ไปเอาของนั้นๆ มาได้คีย์เวิร์ดอะไรกันแน่ ก็เป็นอีกหนึ่งความสนุกของ#nการชม <ของชิ้นนั้น เอามันมาให้ที> นะคะ"
10016035-137 = "ก็แล้วไหนว่าห้ามพูดแค่ก่อนวิ่งเข้าเส้นชัยไงล่ะ?"
10016035-138 = "อีกอย่าง ฉันว่าเธอไม่เห็นจะต้องเรื่องมากกับนักเรียนมิลเลเนียมด้วยกันเลยนี่นา?"
10016035-139 = "ไม่ได้ค่ะ <ฮาโลเฟสติวัล> เป็นการแข่งกีฬาที่ใช้กฎกติกาที่ยุติธรรมกับทุกคนค่ะ"
10016035-140 = "ถึงยูกะจังจะต้องเขินอายต่อหน้าประชาชี แต่ฉันก็ยกเว้นให้ไม่ได้ค่ะ"
10016035-141 = "ฉันบอกตั้งกี่ครั้งแล้วว่าคีย์เวิร์ดไม่ใช่คนที่ชอบ—"
10016035-142 = "[s] \"ให้ไปพาตัวคนที่ชอบมานี่เอง...\""
10016035-143 = "คะ...?!"
10016035-144 = "มะ... ไม่ใช่นะคะ! แต่ก็ไม่ได้แปลว่าฉันไม่ชอบคุณครูหรอกนะคะ..."
10016035-145 = "เอ่อ... คะ... คือว่า...! "
10016035-146 = "...ได้ยินที่เธอเพิ่งพูดออกมามั้ย?"
10016035-147 = "คิดไม่ถึงเลยว่าจะสารภาพความรู้สึกของตัวเองอย่างเปิดเผยโดยไม่ใช้การแข่งขันเป็นข้ออ้าง..."
10016035-148 = "...นักเรียนมิลเลเนียมนี่ไม่ธรรมดาเลยนะคะ"
10016035-149 = "ก็บอกว่าเข้าใจผิดกันอยู่ไงเล่า!"
10016035-151 = "(หลังจากนั้นคุณครูก็ต้องลำบากอยู่พักหนึ่งกับการปลอบยูกะที่เขินอายและพูดอะไรวกไปวนมา)"

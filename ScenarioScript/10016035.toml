[translation]
10016035-2 = "（坐在觀眾席上觀賞比賽時……）"
10016035-7 = "啊，老師。你在這裡啊。"
10016035-8 = "呵呵，昨天晚上辛苦了。#n有稍微睡一下嗎？"
10016035-9 = "[s1]「嗯，託大家的福，我有好好休息了。」\n[s2]「乃愛也有休息嗎？」"
10016035-10 = "有的，我在開幕式開始前小睡了片刻。"
10016035-11 = "有的，我在開幕式開始前小睡了片刻。"
10016035-12 = "在此期間，好像發生了一些我不知道的事……"
10016035-13 = "所幸大家看起來都充滿活力、十分開心。"
10016035-14 = "[s]「努力準備總算是值得了。」"
10016035-15 = "就是說啊。#n那麼，下一場比賽是……"
10016035-16 = "哎呀，是「借物競賽」呢。"
10016035-17 = "那我差不多該去準備了……"
10016035-18 = "[s]「要去參加借物競賽嗎？」"
10016035-19 = "是的，但我擔任的並非選手，而是裁判。"
10016035-20 = "至於選手方面，本來是由遊戲開發部的花岡同學出賽……#n然而在優香醬本人的極力要求下，將改由他來出賽。"
10016035-21 = "呵呵……「借物競賽」是每屆的晄輪大祭都會締造傳說的人氣競賽。"
10016035-22 = "即使是實行委員，也不知道會借什麼東西……#n但每次一定會有寫了「喜歡的人」的紙條，這可是這場比賽的看點。"
10016035-23 = "……優香醬究竟會抽到什麼呢？真是令人期待。"
10016035-24 = "那麼，老師。#n請繼續享受後面的比賽吧。"
10016035-26 = "克洛盧斯頻道的各位觀眾，久等了！"
10016035-27 = "現在，終於要揭開「借物競賽」的序幕了！"
10016035-28 = "觀眾席也相當熱烈呢！"
10016035-29 = "規則很簡單！從跑道上的箱子中取出紙條，#n帶著和上頭寫的關鍵字相符的東西一起通過終點就行了！"
10016035-30 = "只不過，在給裁判看之前，關鍵字必須保密！"
10016035-31 = "那麼，選手們開始進場了！"
10016035-40 = "（代替柚子來參加借物競賽真是太好了……）"
10016035-41 = "（畢竟柚子不擅長和陌生人搭話……）"
10016035-42 = "（為了讓千年學園獲得總冠軍……這場比賽絕對不能輸！）"
10016035-46 = "（擔任裁判的學生……是先前見過的研討會幹部吧？）"
10016035-47 = "（由主辦方的學生會幹部在同一場比賽中擔任選手和裁判……#n　果然很可疑呢，千年……）"
10016035-48 = "（算了，怎樣都好。不管你們在策畫什麼，只要靠體能取得勝利就行了！）"
10016035-52 = "（透過分析上次大運動會的結果，我已經掌握了紙條中可能會出現的各種情況）"
10016035-53 = "（只要這場比賽也取得勝利，就能確保格黑娜奪下總冠軍了！）"
10016035-57 = "那麼，各就各位……"
10016035-58 = "預備，開始！"
10016035-59 = "現在「借物競賽」已經開始！#n所有選手都往箱子的方向奔去！"
10016035-60 = "最先抵達的是……"
10016035-61 = "SRT特殊學園的空井咲希選手！"
10016035-62 = "正如大家所知，SRT特殊學園目前仍處於廢校狀態，#n不過在夏萊的協助下，被允許在大運動會期間暫時以SRT特殊學園的名義參賽。"
10016035-63 = "咲希選手究竟能不能在這場比賽中為SRT特殊學園取得首勝呢？"
10016035-65 = "好了，來看看到底會出現什麼……"
10016035-66 = "……4.2吋白磷煙霧彈？#n到底運動場的哪裡會有這種東西啊！？"
10016035-67 = "BU～！空井咲希選手失去資格！"
10016035-68 = "失，失去資格！？"
10016035-69 = "方才比賽開始前有聲明過，紙條上的內容在通過終點前要保密，#n否則便喪失比賽資格。"
10016035-70 = "因為讓同學們知道了紙條內容就沒意思了──"
10016035-71 = "啊，更正，是會因此讓借物的難度下降。"
10016035-72 = "雖然很可惜……空井咲希選手失去資格。SRT特殊學園將不列入排名。"
10016035-77 = "咲希，你搞啥啊！"
10016035-78 = "果然光憑我們4個……太勉強了……"
10016035-79 = "辛苦了，咲希。"
10016035-80 = "比賽還有很多，不要緊。#n下一場就以第1名為目標吧。"
10016035-81 = "唔……"
10016035-82 = "但，但是，就算沒有被判失格，也無法奪下第1名吧？"
10016035-83 = "運動場內怎麼可能會有人帶白磷煙霧彈──"
10016035-84 = "嗯？我就有帶啊？"
10016035-85 = "到底為什麼會帶那種東西……？"
10016035-89 = "因為咲希選手的失格，狀況又回到了未知數！"
10016035-90 = "接著抵達箱子的是──千年的早瀬優香選手！"
10016035-94 = "哈啊，哈啊……我看看，題目是……"
10016035-95 = "唔嗯……這個人……不是……"
10016035-96 = "也不是這個人……#n那個……"
10016035-100 = "啊，有了！"
10016035-107 = "老師，請跟我來一下！"
10016035-108 = "[s]「我，我嗎！？」"
10016035-109 = "對！#n沒有時間了，動作快！"
10016035-114 = "優香選手一確認完紙條的內容後，就帶著夏萊的老師一路狂奔！"
10016035-115 = "目前排名第1！紙條上究竟寫了什麼！？#n為什麼會選擇夏萊的老師呢！"
10016035-116 = "優香選手還在跑……通過終點！排名暫定為第1位！"
10016035-117 = "不過，結果還得看裁判怎麼定奪！"
10016035-121 = "哎呀……"
10016035-122 = "優香醬是這麼看待[USERNAME]老師的呀……呵呵。"
10016035-123 = "怎，怎樣啦！？反正也不是什麼有標準答案的題目吧？#n別賣關子了，快點判定！"
10016035-124 = "呵呵……好的，答案沒有問題。#n早瀬優香選手是第1名！"
10016035-125 = "太好了！"
10016035-129 = "我記得……要借的目標裡包含「喜歡的人」對吧？"
10016035-130 = "每一屆都會有選手帶著喜歡的人通過終點，然後成為情侶。"
10016035-131 = "其他選手的題目似乎都不是「喜歡的人」……"
10016035-132 = "優香同學一看完紙條後便立刻奔向老師那裡……#n難不成……"
10016035-133 = "等，等等！大家好像誤會了什麼！？"
10016035-134 = "我的題目不是「喜歡的人」──"
10016035-135 = "啊，不行唷，優香醬。說出題目是違反規定的。"
10016035-136 = "因為猜測選手抽到的紙條內容，也是「借物競賽」的觀賽重點。"
10016035-137 = "通過終點後就能說了吧？"
10016035-138 = "而且，也需要解開[ruby=千年學生]大家[/ruby]的誤會……"
10016035-139 = "不行唷。「晄輪大祭」不能有任何例外。"
10016035-140 = "就算結果讓優香醬覺得不好意思，不行就是不行。"
10016035-141 = "我就已經說過好幾次不是喜歡的人──"
10016035-142 = "[s]「原來不是喜歡的人啊……」"
10016035-143 = "咦！？"
10016035-144 = "不，不是啦！那個……我不是不喜歡老師的意思……"
10016035-145 = "啊……也，也不是那個意思！"
10016035-146 = "……大家剛才聽到了嗎？"
10016035-147 = "居然不拿比賽當理由，而是直接表明自己的心意……"
10016035-148 = "千年的學生真是大膽呢……"
10016035-149 = "就說是誤會了！"
10016035-151 = "（之後，為了安撫語無倫次的優香費了好一番功夫）"

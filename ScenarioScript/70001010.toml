[translation]
70001010-1 = "檔案浴場（１）"
70001010-8 = "隊長！那個小鬼頭正率領事務局的學生往這裡來！"
70001010-9 = "可惡，這次的政變就到此為止了嗎……"
70001010-10 = "別以為這樣就結束了！"
70001010-11 = "下次我一定會把那個小鬼頭趕走，在赤冬聯邦學園建立一個新的──"
70001010-17 = "全體肅清！肅清！"
70001010-18 = "潔莉諾的辦公室"
70001010-20 = "呼……這次總算也平息了。"
70001010-25 = "潔莉諾會長，所有參與政變的學生都被逮捕了！"
70001010-26 = "嗯，辛苦了。瑪麗娜委員長！"
70001010-27 = "為了表揚你的功績，特別授予你「一等鬍子英雄勳章」……"
70001010-28 = "……嗯？「一等鬍子英雄勳章」已經在上次政變時授予過了？"
70001010-29 = "智惠秘書室長，這是這週的第幾次政變？"
70001010-33 = "本週總共未遂2次、成功5次……"
70001010-34 = "哎呀，這麼看來，這週每天都有政變呢。"
70001010-35 = "是否要找位畫家來畫幅畫，紀念潔莉諾會長這一週持續對抗政變的偉業呢？"
70001010-36 = "畫就免了吧……#n上次政變的主謀不就是請來的畫家嗎……"
70001010-40 = "所以……這次的原因是什麼？"
70001010-41 = "什，什麼……？原因嗎？"
70001010-42 = "赤冬的學生就算再怎麼衝動，要連續動員這麼多學生也需要充分的正當理由。"
70001010-43 = "平時3天1次的政變竟然會連續發生一週，想必是有很大的不滿……"
70001010-44 = "他們到底對咱統治的赤冬聯邦學園有什麼不滿，以至於要不停發動政變？"
70001010-45 = "啊，那個……"
70001010-49 = "根據調查，這次的主謀似乎是為了改善赤冬聯邦學園的沐浴設施而發起政變。"
70001010-50 = "沐浴設施……？赤冬聯邦學園的沐浴設施已經很夠用了吧？"
70001010-51 = "以前也從未要求過任何和洗澡有關的事，為何突然就……？"
70001010-52 = "……我想也許是因為「227號溫泉浴場」。"
70001010-53 = "227號溫泉浴場？#n為什麼會提到它？"
70001010-57 = "因為227號溫泉浴場，是過去赤冬聯邦學園不曾出現過的豪華沐浴設施。"
70001010-58 = "享受過豪華浴池後又回到宿舍的簡陋設施，似乎讓許多學生產生了相對剝奪感。"
70001010-61 = "哼，在咱看來沒有多大的差別啊。"
70001010-62 = "只要有熱水就能洗澡。赤冬聯邦學園宿舍的熱水不也很充足嗎！"
70001010-64 = "……雖然一天只提供早上7點和晚上7點兩個時段。"
70001010-66 = "偶爾還會因為爐鍋故障而只有冷水……"
70001010-68 = "但赤冬聯邦學園宿舍的浴室可同時容納數百名學生同時洗澡……"
70001010-69 = "單從規模上來看，說是奇普托斯第一也不為過！"
70001010-71 = "不過卻也只是破舊且連隔板都沒有的淋浴間……"
70001010-73 = "有時候真的很懷念能在工作結束後，用溫泉紓解一天疲勞的時光……"
70001010-74 = "要是再加上洗完澡後喝的冰咖啡牛奶──"
70001010-79 = "當，當然洗完澡喝的咖啡牛奶再甜，也比不上潔莉諾會長親手做的潔蓮卡！"
70001010-80 = "況且在洗澡這類的日常生活中追求奢侈，根本是[ruby=資產階級]布爾喬亞[/ruby]才會有的想法……"
70001010-81 = "……"
70001010-82 = "我真的是這麼想的！拜託別肅清我……！"
70001010-83 = "……果然還是全面整修一下赤冬聯邦學園的沐浴設施吧。"
70001010-84 = "什，什麼……？"
70001010-85 = "竟敢當著咱的面反問。#n你耳朵出問題了嗎，瑪麗娜委員長？"
70001010-86 = "咱是說最好整修一下赤冬學園的沐浴設施。"
70001010-90 = "如果只有其他學生反應也就算了，#n既然連事務局的功臣都那麼說，代表絕大多數的學生肯定也有相同的不滿。"
70001010-91 = "偉大的領導者不能只是君臨天下，還應該傾聽人民的聲音。"
70001010-92 = "咱可還沒無能到假裝沒聽見學生們的怨言！"
70001010-93 = "更重要的是，不能再因為洗澡這種雞毛蒜皮的小事引發政變了……"
70001010-94 = "有這種想法真是了不起呢，會長！"
70001010-95 = "不僅沒有譴責那些反對會長威權的學生……#n甚至還體諒他們的痛苦、用寬宏的胸襟擁抱他們……智惠，被感動得不能自已！"
70001010-96 = "咳咳，那當然。咱可是赤冬聯邦學園的學生會長，#n兼環境美化部長、書記長、體育部長等等的……潔莉諾大人！"
70001010-97 = "等到潔莉諾會長要整修沐浴設施的消息一傳開，#n學園的所有學生都會因為您的仁慈而感激不盡的。"
70001010-98 = "不如現在就通知《赤熊》，準備一篇專題報導吧？"
70001010-99 = "唔呣，那就交給你了，智惠秘書室長。"
70001010-107 = "至於整修沐浴設施的具體辦法……"
70001010-112 = "……把淋浴間的大小擴增一倍就行了吧？"
70001010-113 = "那個，方向好像不太對──"
70001010-117 = "擴建淋浴間固然好，但這種問題還是交給專家吧？"
70001010-118 = "專家？咱們赤冬聯邦學園有沐浴方面的專家嗎？"
70001010-119 = "有的，赤冬聯邦學園裡正好有個單位，裡頭有曾經成功經營大規模溫泉浴場的專家。"
70001010-120 = "那就是……"
70001010-123 = "這段時間在舊校舍忍受著寒冷與痛苦，寫了無數次的請願書……"
70001010-124 = "看來我們懇切的心聲總算傳到潔莉諾會長耳裡了！"
70001010-125 = "……終於要釋放我們了嗎？"
70001010-129 = "不，只是假釋而已。"
70001010-130 = "明明從未透露任何反省的跡象還期盼能被釋放，真是厚顏無恥到了極點。"
70001010-131 = "你說這話是什麼意思！？"
70001010-132 = "我們明明就在舊校舍嚴酷的環境下默默地遵守紀律、定期提交悔過書……#n怎麼能說我們完全沒有反省呢！"
70001010-133 = "……默默地？"
70001010-134 = "當，當然偶爾還是會為了看[USERNAME]老師而爬到高處……"
70001010-139 = "……之前在爬夏萊附近的電線桿時，就被女武神警察學園的學生給逮捕了。"
70001010-144 = "你看吧。#n如果無故赦免那些從未反省還反覆違規的學生，又該怎麼樹立事務局的權威！"
70001010-145 = "呿……害我白高興一場。"
70001010-146 = "那如果不是要釋放我們的話，為什麼突然把我們叫來這裡？"
70001010-147 = "那是因為……有件特別的事想委託你們。"
70001010-148 = "只要把這件事辦好，咱不僅不會追究你們犯下的錯，#n還會授予榮耀勳章和事務局的職位！"
70001010-149 = "潔莉諾會長的榮耀勳章倒是無所謂，不過……"
70001010-150 = "之前明明一直對我們漠不關心，現在卻突然找我們來幫忙……實在有點可疑。"
70001010-151 = "難道是對我們上次擅自經營溫泉浴場的事懷恨在心──"
70001010-152 = "不，正好相反。#n我們赤冬事務局全體成員，在上次事件中對兩位辛勤工作的樣子感到印象深刻。"
70001010-153 = "在缺乏相關知識的情況下從零開始經營溫泉浴場，出色地接待學園內外的客人……#n特別班儼然成為了赤冬聯邦學園諸多勞動者的榜樣。"
70001010-154 = "……雖然是無照經營就是了。"
70001010-158 = "當時兩位確實並未取得事務局的許可……"
70001010-159 = "因此為了避免重蹈覆轍，我們事務局想給兩位一個經營大規模沐浴設施的機會。"
70001010-160 = "什麼？難不成……要讓227號溫泉浴場復活嗎？"
70001010-161 = "哼，咱當時好不容易才阻止格黑娜的問題兒童把學園變成岩漿海，#n怎麼可能允許重新開發溫泉呢。"
70001010-162 = "準確來說，我們想委託你們的業務是管理共用宿舍的沐浴設施。"
70001010-163 = "這次赤冬事務局接納了學生們的建議，打算全面翻修宿舍內的沐浴設施……"
70001010-164 = "但除了227號特別班外，赤冬聯邦學園內沒有人有經營大規模沐浴設施的經驗。"
70001010-165 = "什麼嘛，不是溫泉浴場而是宿舍的沐浴設施啊……"
70001010-166 = "那就不能生產和銷售洗完澡後喝的飲料之類的東西了。"
70001010-167 = "長遠來看或許有添加各種設施的可能性，#n但眼下的首要任務是提供可讓眾多學生使用的大規模沐浴設施。"
70001010-168 = "因此希望227號特別班的兩位能去參觀其他學園的沐浴設施，#n對該引進哪個學園的沐浴設施提出意見。"
70001010-169 = "參觀其他學園的沐浴設施……？"
70001010-170 = "是的。由於資金和技術都不夠充分，無法在缺乏藍圖的情況下從頭打造沐浴設施……"
70001010-171 = "所以這次我們想向現已經營著沐浴設施的其他學園下訂單。"
70001010-172 = "因為過程中可能會涉及到許多人的利害關係，#n所以希望能拜託已經有出色溫泉浴場營運經驗的特別班的兩位。"
70001010-173 = "當然，這次參觀所需的費用將由我們赤冬事務局全額支付，#n只要是和經營沐浴設施有關的事物都請放心體驗。"
70001010-174 = "這是一般學生平時絕對無法有的奢侈體驗，感到光榮吧！"
70001010-176 = "唔嗯……這麼好的提案，反而讓人覺得有詐……"
70001010-177 = "可是時雨醬，這是個好機會！"
70001010-178 = "只要順利完成，不但能擺脫嚴酷的舊校舍生活……#n說不定還能重啟之前沒能完成的溫泉浴場經營！"
70001010-179 = "而且這是免費體驗各個學園沐浴設施的機會，像我們這種普通的學生沒理由拒絕吧？"
70001010-180 = "這個嘛，如果和香想要的話，我是不反對啦……"
70001010-181 = "好，我們答應了！"
70001010-185 = "即使要賭上消失的227號溫泉浴場的名聲，#n我們也會努力經營能讓赤冬聯邦學園所有學生滿意的最佳沐浴設施！"
70001010-187 = "呵呵，聽你這麼說我就放心了。"
70001010-188 = "那麼……就拜託你們了。"

70001010-67 = "#all;hide"
70001010-68 = "3;체리노;99;게다가 붉은겨울 학원 기숙사의 샤워실은 수백 명의 학생이 동시에 씻을 수 있으니까……"
70001010-69 = "3;체리노;03;규모만 두고 본다면 키보토스 제일이라 해도 과언이 아니지!\n#3;em;[반짝]"
70001010-70 = "#all;hide"
70001010-71 = "3;토모에;99;낡고 칸막이조차 설치되지 않은 샤워부스뿐이긴 하지만……"

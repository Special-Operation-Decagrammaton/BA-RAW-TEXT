[translation]
70001010-1 = "テルマエ・アカエ（１）"
70001010-8 = "隊長！あのチビが事務局を率いてこちらに……！"
70001010-9 = "チッ。今回のクーデターもここまでなのかっ……！"
70001010-10 = "これで終わりだと思うなよ！"
70001010-11 = "次こそ必ずや、あのチビを追い出してレッドウィンター連邦学園に新たな――"
70001010-17 = "全員粛清！粛清だ！"
70001010-18 = "チェリノのオフィス"
70001010-20 = "ふぅ……なんとか治まったな。"
70001010-25 = "チェリノ会長、クーデターの関係者を全員逮捕しました！"
70001010-26 = "うむ、よくやった。マリナ委員長！"
70001010-27 = "その功績を賞賛して、特別に「第一級髭勲章」を……"
70001010-28 = "……むむ？「第一級髭勲章」は前回のクーデターで授与したような？"
70001010-29 = "トモエ秘書室長、今週のクーデターはこれで何回目だ？"
70001010-33 = "未遂止まりが2回、成功したのが5回になります。"
70001010-34 = "……あら、今週は1日も静かな日がありませんでしたね。"
70001010-35 = "この1週間、クーデターに立ち向かい続けた会長の偉業が後世に伝わるよう、画家を呼んで戦争画を描かせましょうか？"
70001010-36 = "戦争画はもう良い……#nというか前回のクーデターでは、その画家が首謀者だったではないか……"
70001010-40 = "……それで、今度は何が不満なんだ？"
70001010-41 = "はい……？不満、ですか？"
70001010-42 = "いくらあいつ[ruby=ら]等[/ruby]が衝動的とはいえ、特に理由もなくこれほどの人数を動員するのは不可能だろう。"
70001010-43 = "普段は3日に1度だったクーデターが、7日連続で起こったのだからな。"
70001010-44 = "おいらが治めるレッドウィンター連邦学園の何が気に食わないというのだ？"
70001010-45 = "ええと……それは、その……"
70001010-49 = "調査によると、今回の首謀者はレッドウィンター連邦学園内の入浴施設の改善を求めてクーデターを起こしたそうです。"
70001010-50 = "入浴施設……？#nそれなら我がレッドウィンター連邦学園には、すでにあるではないか。"
70001010-51 = "しかし、なぜ今になって入浴施設が理由で……？"
70001010-52 = "……「227号温泉郷」を味わってしまったから、ではないかと。"
70001010-53 = "227号温泉郷？#nどうしてその名が出てくるのだ？"
70001010-57 = "227号温泉郷は、レッドウィンター連邦学園で類を見ないほどに贅沢な温泉でしたから。"
70001010-58 = "豪華な湯を経験してしまったことで、老朽化した寮の施設に不満を抱いたようです。"
70001010-61 = "ふん、おいらからすれば大差なかったぞ。"
70001010-62 = "温水さえ出れば問題なかろう。#nレッドウィンター連邦学園の寮だって、温水くらい出ている！"
70001010-64 = "……午前7時と午後7時からの2時間だけではありますが。"
70001010-66 = "給湯器が故障して冷水しか出ない日も……"
70001010-68 = "なにを言う。レッドウィンター連邦学園のシャワー室は、数百人の生徒が同時に入れる広さを誇っている。"
70001010-69 = "キヴォトスいちの規模と言っても過言ではない！"
70001010-71 = "隣と仕切りすらない、錆びた蛇口が並んでいるだけの空間ですが……"
70001010-73 = "あぁ……仕事終わりに広い温泉で1日の疲れを癒やしていたあの時間が恋しい……"
70001010-74 = "お風呂上がりの冷たいコーヒー牛乳は、まさに至福の1杯で――"
70001010-79 = "も、もも、もちろん！#nコーヒー牛乳がいくら甘かろうが、チェリノ会長がお作りになられている「チェリョンカ」の足元にも及びませんが！"
70001010-80 = "そもそも温泉などという贅沢を求めるなど、ブルジョワの発想……"
70001010-81 = "……。"
70001010-82 = "ほ、本心です！信じてください、チェリノ会長！どうか粛清だけは……！"
70001010-83 = "……レッドウィンター連邦学園の入浴施設を、大々的に改修するとしよう。"
70001010-84 = "は、はい……？"
70001010-85 = "話を聞いてなかったのか、マリナ委員長？"
70001010-86 = "レッドウィンター連邦学園の入浴施設を、改修すると言ったのだ。"
70001010-90 = "他の生徒ならともかく、事務局の功臣までもが言うのなら、生徒の大半が同じ不満を抱いているのは明白。"
70001010-91 = "偉大なる指導者とは、常に民衆の声に耳を傾けるもの……"
70001010-92 = "生徒の不満から目を逸らし、独断を強行するほどおいらは無能ではない！"
70001010-93 = "それに、たかがお風呂ごときでクーデターを起こされては困るし……"
70001010-94 = "素晴らしいお考えです、会長！"
70001010-95 = "会長の権威に反旗を翻した生徒にさえ、寛大なお心で許し、広い心で包み込むなんて……トモエ、感激しました！"
70001010-96 = "えっへん、当然であろう。おいらはレッドウィンター連邦学園の生徒会長であり、環境美化部部長兼、書記長兼、運動部代表兼等々の……チェリノ様なのだぞ！"
70001010-97 = "会長が入浴施設を改修されると聞いた学園中の生徒は、その慈悲深さに感激のあまり涙を流すことでしょう。"
70001010-98 = "今すぐ『レッドベア』に連絡し、特集記事を書かせましょうか？"
70001010-99 = "うむ、任せた。トモエ秘書室長。"
70001010-107 = "さて、入浴施設の改修だが……"
70001010-112 = "……とりあえず、シャワー室の大きさを2倍にすれば良いのか？"
70001010-113 = "ええと……それはちょっと、方向性が違うような――"
70001010-117 = "シャワー室の増築も良い案なのですが、この件は[ruby=・   ・   ・]専門家[/ruby]に任せてはいかがでしょう？"
70001010-118 = "[ruby=・   ・   ・]専門家[/ruby]……？#n我がレッドウィンター連邦学園に適任がいるというのか？"
70001010-119 = "はい。レッドウィンター連邦学園には、大規模温泉施設の運営を見事に成し遂げた方がおります。"
70001010-120 = "それは……"
70001010-123 = "飢えと寒さの厳しい旧校舎生活に耐えながら、嘆願書を書き続けていた日々が……"
70001010-124 = "ついに私たちの切実な声が、チェリノ会長に届いたんですね！"
70001010-125 = "……釈放されるんですよね？"
70001010-129 = "いや、仮釈放だが。"
70001010-130 = "今まで反省の気配など微塵も無かったくせに、釈放を期待するなんて厚かましいことこの上ないな。"
70001010-131 = "そんな！"
70001010-132 = "旧校舎の劣悪な環境下で、真面目に反省文を提出して静かに謹慎してたじゃないですか！"
70001010-133 = "……静かに？"
70001010-134 = "た、たまに[USERNAME]先生の姿を覗きはしてましたけど……"
70001010-139 = "……シャーレ近くの電柱に登ったときは、ヴァルキューレ生に逮捕されてたよね。"
70001010-144 = "ほら見ろ。ロクに反省もせず違反を繰り返す生徒を釈放しては、おいらの権威に関わるのだ！"
70001010-145 = "……ぬか喜びして損しました。"
70001010-146 = "釈放じゃないなら、どうして急に呼び出したんですか？"
70001010-147 = "……お前たちに、頼みがある。"
70001010-148 = "今回の件を解決してくれるのであれば、お前たちの過ちを不問にしよう。#n名誉ある勲章に、事務局の職位も与えてやろう！"
70001010-149 = "チェリノ会長の勲章はどうでもいいけど……"
70001010-150 = "今の今まで私たちを気にかけすらしてなかったのに、いきなり呼び出してお願いだなんて……一体なにを企んでるんですか！"
70001010-151 = "まさか、勝手に温泉を運営した件を蒸し返す気じゃ――"
70001010-152 = "いえ、そうではありません。#n私たちレッドウィンター事務局一同は、皆さんの勤勉な姿に大変感銘を受けました。"
70001010-153 = "ゼロから温泉施設を築き、学園内外のお客さんを立派にもてなした特別クラスの皆さんのご活躍は、まさにレッドウィンター連邦学園の全労働者の鑑。"
70001010-154 = "まぁ……無許可運営だったけど。"
70001010-158 = "たしかに事務局の許可は得ていませんでしたが……"
70001010-159 = "そこで今回は、事前に私たちが皆さんに入浴施設の運営機会を差し上げようと思いまして。"
70001010-160 = "えっ？それって……227号温泉郷を復活させるんですか？"
70001010-161 = "ふん、ゲヘナの問題児どもによって、危うく学園が溶岩の海に飲み込まれるところだったのだ。なのに再開発を許すわけないだろう。"
70001010-162 = "正確に申し上げますと、お願いしたいのは学園寮の入浴施設の管理です。"
70001010-163 = "この度、生徒の皆さんから要望を受けて、入浴施設を全面的に改修する運びとなりました。"
70001010-164 = "そこで大規模な温泉施設の運営経験がある227号特別クラスの皆さんに、ご相談をしようと思い。"
70001010-165 = "なあんだ、温泉じゃなくて寮のお風呂か……"
70001010-166 = "それじゃ、売店で[ruby=・   ・   ・]飲み物[/ruby]の販売は出来そうにないね。"
70001010-167 = "将来的には他の施設の追加も視野に入れておりますが、まずは大勢の生徒が利用できる大規模入浴施設の用意が先決。"
70001010-168 = "227号特別クラスの皆さんで他の学園の入浴施設を見学してから、どの学園の設備を導入するか検討していただきたく思います。"
70001010-169 = "他の学園の見学……？"
70001010-170 = "はい。財源も技術も不足しているので、私たちだけで改修するのは難しいですから。"
70001010-171 = "そこで今回は、すでに存在する入浴施設と同じものを発注したいと考えておりまして。"
70001010-172 = "私たち事務局が行っては利害関係が絡む恐れもあるため、特別クラスの皆さんにお願いしたく。"
70001010-173 = "もちろん、見学に必要な費用はレッドウィンター事務局が全額負担いたします。#n入浴施設の運営に関わるものなら、ご自由に見てきて頂いて構いません。"
70001010-174 = "本来なら一般生徒にはあり得ない待遇なのだぞ！光栄に思え！"
70001010-176 = "う～ん……なんだか展開がトントン拍子すぎて逆に気が乗らないなぁ……"
70001010-177 = "でもシグレちゃん、これはチャンスだよ！"
70001010-178 = "ここで手柄を上げれば、厳しい旧校舎生活から抜け出せるんだよ！#n温泉運営も再開できるかも！"
70001010-179 = "それに、いろんな学園の入浴施設をタダで体験できるんだよ？#nこれ以上、失うものは無いし受けてみても良いんじゃない？"
70001010-180 = "まあ、ノドカがそう言うなら反対はしないけど……"
70001010-181 = "はいはい！やります！"
70001010-185 = "今は無き227号温泉郷の名にかけて、レッドウィンター連邦学園の全生徒が満足できる最高の入浴施設を目指します！"
70001010-187 = "ふふ、心強いですね。"
70001010-188 = "では……お願いします。"

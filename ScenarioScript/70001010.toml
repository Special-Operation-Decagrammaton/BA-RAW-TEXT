70001010-90 = "2;체리노;02;다른 학생들뿐이라면 몰라도 사무국의 공신들까지 그렇게 말한다면, 대다수의 학생들이 같은 고충을 갖고 있는 게 분명하겠지."
70001010-91 = "2;체리노;01;위대한 지도자란 단순히 군림하는 데 그치지 않고 민생의 목소리에 귀를 기울이는 것이 당연한 법."

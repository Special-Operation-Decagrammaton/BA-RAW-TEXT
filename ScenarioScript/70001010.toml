70001010-24 = "3;체리노;01\n5;마리나;01\n#3;h\n#5;h\n#3;m2\n#5;al\n#wait;1000"
70001010-25 = "5;마리나;02;체리노 회장님. 이번 쿠데타를 주동한 학생들을 모두 체포하였습니다!\n#5;em;[반응]"
70001010-26 = "3;체리노;01;으음, 수고 많았다. 마리나 위원장!\n#3;greeting"
70001010-27 = "3;체리노;01;그대의 공적을 치하하는 의미로 특별히 <1급 수염 영웅 훈장>을……"
70001010-28 = "3;체리노;04;……아니, <1급 수염 영웅 훈장>은 지난 쿠데타 때 수여했던가?\n#3;em;[?]"
70001010-29 = "3;체리노;02;토모에 비서실장, 이번 쿠데타가 이번 주 들어 몇 번째 쿠데타지?\n#3;jump"
70001010-30 = "#st;[0,0];instant;1;"
70001010-31 = "#clearST"
70001010-32 = "1;토모에;01\n3;체리노;02\n5;마리나;02\n#1;h\n#3;h\n#5;h\n#1;ar\n#3;m4\n#5;dr\n#wait;1000"
70001010-33 = "1;토모에;99;미수에 그친 게 두 번, 그리고 실제로 성공한 것이 다섯 번입니다만……"
70001010-34 = "1;토모에;02;어머나, 그러고 보니 이번 주는 하루도 빠지지 않고 쿠데타가 연달아 일어났군요.\n#1;em;[반응]"
70001010-35 = "1;토모에;01;한 주 동안 부지런히 쿠데타에 맞서 싸운 체리노 회장님의 공적을 기념하는 의미에서 화가를 불러 지난 1주일간의 기록화를 그리게 할까요?"
70001010-36 = "3;체리노;04;기록화는 이제 되었어…… 지지난 쿠데타 때는 기록화를 그리기 위해 부른 화가가 사실은 쿠데타의 주모자였으니……\n#3;stiff\n#3;em;[땀]"
70001010-37 = "#st;[0,0];instant;1;"
70001010-38 = "#clearST"
70001010-39 = "1;토모에;01\n3;체리노;04\n5;마리나;01\n#1;h\n#3;h\n#5;h\n#1;dl\n#3;m2\n#5;al\n#wait;1000"
70001010-40 = "3;체리노;01;그래서…… 이번에는 또 뭐 때문이지?"
70001010-41 = "5;마리나;08;네, 네……? 뭐 때문이라니요?\n#5;em;[?]"
70001010-42 = "3;체리노;99;붉은겨울 학원의 학생들이 충동적이라고는 하지만, 이만한 학생들을 연속으로 동원하기 위해서는 충분한 대의명분이 필요한 법."
70001010-43 = "3;체리노;99;평소였더라면 사흘에 한 번꼴로 시도되던 쿠데타가 1주일 연속으로 일어나는 걸 보니 다들 뭔가 큰 불만이라도 있는 모양인데……\n#3;em;…"
70001010-44 = "3;체리노;01;도대체 이 몸이 통치하는 붉은겨울 학원에 무슨 불만이 있기에 쉬지 않고 쿠데타를 벌이는 거지?\n#3;jump"
70001010-45 = "5;마리나;10;어, 그게…… 그러니까……"
70001010-46 = "#st;[0,0];instant;1;"

70001010-49 = "1;토모에;02;조사에 따르면 이번 쿠데타를 일으킨 주동자들은 붉은겨울 학원 내 목욕 시설의 개선을 요구하며 쿠데타를 일으킨 모양이더군요."
70001010-50 = "3;체리노;02;목욕 시설……? 목욕 시설이라면 이미 붉은겨울 학원에도 충분히 있지 않나.\n#3;em;[?]"
70001010-51 = "3;체리노;04;그동안 목욕과 관련된 일이라면 별 요구 사항도 없었으면서, 어째서 갑자기……?"
70001010-52 = "1;토모에;99;……역시 <227호 온천장>에서의 경험 때문일까요."
70001010-53 = "3;체리노;02;227호 온천장? 어째서 그 이름이 나오는 것이냐?"

[translation]
70001010-1 = "Thermae Akai 1"
70001010-8 = "Captain! The secretariat brigades loyal to that tiny tyrant are closing in on our position!"
70001010-9 = "Blast, she's crushed our coup..."
70001010-10 = "But our fight doesn't die here!"
70001010-11 = "Someday, we'll overthrow that kid dictator, and a new ruler will lead Red Winter Academy into a glorious future!"
70001010-17 = "Purged! All of you will be purged!"
70001010-18 = "Cherino's Executive Office"
70001010-20 = "Phew... Cracking down on dissidents is hard work..."
70001010-25 = "President Cherino! We've rounded up the students responsible for the recent coup!"
70001010-26 = "Mm, excellent work, Chairman Marina!"
70001010-27 = "As a mark of our gratitude, I award you the Mustache Hero Medal...1st Class!"
70001010-28 = "...Wait, didn't I already give you the 1st Class Mustache Hero Medal for quashing the last coup?"
70001010-29 = "Chief Secretary Tomoe, how many coups does that make this week?"
70001010-33 = "Well, Great Leader, we've put down two coup attempts and been ousted from power five times..."
70001010-34 = "Which means we've faced a new coup d'etat every day this week."
70001010-35 = "So in honor of President Cherino's brilliant leadership through this unprecedented time of crisis, shall we commission a painter to immortalize the events of the past week?"
70001010-36 = "We've had enough immortalizing... The coup before last was started by the artist we hired to paint the earlier coups we crushed."
70001010-40 = "So...what set this one off?"
70001010-41 = "S-Sorry...? What do you mean?"
70001010-42 = "The students of Red Winter Academy are infamous for their revolutionary zeal, but even our student body would struggle to mobilize for this many coups without provocation."
70001010-43 = "We usually only have to fight off a coup attempt every three days or so..."
70001010-44 = "So what's instigated this constant revolt against my rule over Red Winter Academy?"
70001010-45 = "W-W-Well..."
70001010-49 = "According to our investigation, the ringleaders of the recent coup were upset about the condition of Red Winter Academy's bathing facilities."
70001010-50 = "Bathing facilities...? But Red Winter Academy has the best bathing facilities in Kivotos!"
70001010-51 = "They've never whined about bathing before, so why now?"
70001010-52 = "...I suspect it's due to their experience with Hot Springs Resort No. 227."
70001010-53 = "Hot Springs Resort No. 227? What does that pretentious water closet have to do with it?"
70001010-57 = "Hot Springs Resort No. 227 exposed the students of Red Winter Academy to bathing luxury beyond their wildest dreams."
70001010-58 = "After bathing in paradise, returning to the academy's somewhat...unadorned facilities was a little jarring."
70001010-61 = "Hmph, I could hardly tell that there was any difference."
70001010-62 = "Anyway, so long as there's hot water, we can bathe! Red Winter Academy's communal dormitories always have plenty of hot water!"
70001010-64 = "...Though some students find it inconvenient that the boilers only come on at 7 AM and PM each day, for two hours at a time."
70001010-66 = "...Especially when the heating breaks down completely, and you get sprayed with cold water."
70001010-68 = "N-Nonetheless, our Red Winter dormitory showers can accommodate hundreds of students at once!"
70001010-69 = "So in sheer scale, there's no beating our facilities!"
70001010-71 = "Even though they're just old showerheads without privacy partitions..."
70001010-73 = "I do miss taking a warm bath after a hard day's work and feeling my stress melt away..."
70001010-74 = "Oh, and drinking a fresh glass of coffee milk afterward—"
70001010-79 = "O-Of course, no matter how delicious coffee milk is after a hot bath, it's nothing compared to the Cherenka you make, President Cherino!"
70001010-80 = "A-And it's pure bourgeois decadence to seek luxury in something as practical as bathing..."
70001010-81 = "..."
70001010-82 = "I-I'm being honest! Please, don't purge me again...!"
70001010-83 = "...Then our best course of action is to fully renovate Red Winter Academy's bathing facilities."
70001010-84 = "Uh... Huh?"
70001010-85 = "Is something wrong with your ears, Chairman Marina? Can't you hear someone speaking to your face?"
70001010-86 = "I said that we need a full renovation of Red Winter Academy's bathing facilities!"
70001010-90 = "If the officers of the Secretariat are voicing discontent, the majority of students surely share their grievances."
70001010-91 = "Being a great leader requires more than ruling with an iron fist. I must listen to the voices of the people and tend to their needs."
70001010-92 = "I am not so obstinate as to impose my will without regard to the wishes of the students!"
70001010-93 = "...Besides, if I keep facing coups over something as trivial as bathing, I'm sure to lose power for good..."
70001010-94 = "An amazing decision, Great Leader!"
70001010-95 = "Rather than condemn the students rebelling against your authority, you recognize their suffering and embrace their needs as your own...! I am humbled and inspired by your vision!"
70001010-96 = "Ahem, but of course! I am Cherino, the student council president of Red Winter Academy, head of beautification, Great Leader, head of physical education, and more besides!"
70001010-97 = "Once word of the renovation spreads, the fires raging through Red Winter Academy will surely calm, quenched by the flood of your compassion!"
70001010-98 = "Shall I prepare an announcement for publication in The Red Bear?"
70001010-99 = "Hm, please proceed, Chief Secretary Tomoe."
70001010-107 = "In the meantime, in order to renovate the bathing facilities..."
70001010-112 = "...should we start by doubling the size of the showers?"
70001010-113 = "Um, I think that may be going in the wrong—"
70001010-117 = "Expanding the size of the showers is an excellent idea, but would it not be advisable to consult with an expert on the subject?"
70001010-118 = "An expert? Is there a bathing expert in Red Winter Academy?"
70001010-119 = "Red Winter Academy has an entire facility filled with them. After all, some of our students expertly operated a hot spring resort in the recent past."
70001010-120 = "They are..."
70001010-123 = "After all those desperate appeals thrown from the freezing walls of the Former Institute..."
70001010-124 = "Our pleas have finally reached the ears of President Cherino!"
70001010-125 = "...Have you finally decided to strike the manacles from our wrists?"
70001010-129 = "...It's more like parole. Provisionally."
70001010-130 = "Do you really think you can be released, despite your utter lack of reflection or reformation? Don't be so presumptuous."
70001010-131 = "How can you say that?!"
70001010-132 = "We've endured the harsh conditions of the Former Institute without complaint and filed countless letters of apology through the proper channels. Surely that proves that we've reflected on our behavior and kept a low profile!"
70001010-133 = "...A low profile?"
70001010-134 = "I-I mean, obviously, we climbed to a few high places to get a view of Sensei..."
70001010-139 = "Like how I climbed that telephone pole outside Schale and got arrested by Valkyrie police students..."
70001010-144 = "That's precisely my point! If I pardon students who break my rules repeatedly and without remorse, the authority of the Secretariat would collapse!"
70001010-145 = "Tch... Well, there go my hopes and dreams."
70001010-146 = "Then why summon us so suddenly, if you're not going to release us?"
70001010-147 = "Now, there is something I want to ask of you, personally."
70001010-148 = "If you do your part and fulfill my request, I will pardon all your past wrongdoing, award you medals commensurate with your service, and even raise you to positions in the Secretariat!"
70001010-149 = "Medals or whatever from President Cherino are fine and dandy, but..."
70001010-150 = "You left us to rot all this time, and now you're calling us out of the blue to ask for a favor... Something's fishy."
70001010-151 = "Last time we met, you were still furious that we'd opened a hot springs resort on our own initiative."
70001010-152 = "On the contrary, the Red Winter Office was highly impressed with your results."
70001010-153 = "By managing a thriving hot springs resort without any previous experience and providing excellent service to academy students and our visiting guests, you embodied the unconquerable spirit of the working class."
70001010-154 = "...Even though it was an unauthorized business?"
70001010-158 = "It's true that you neglected to obtain the approval of the Secretariat."
70001010-159 = "So, to rectify the situation and give you an opportunity to make amends, we would like to offer you the chance to manage a large-scale bathing facility."
70001010-160 = "What? Do you mean to say...that you intend to revive Hot Springs Resort No. 227?"
70001010-161 = "Hmph. We barely stopped those brats from Gehenna from turning the entire academy into an ocean of lava—we won't be digging up a hot spring again anytime soon."
70001010-162 = "To be precise, we would like you to help us renovate the communal showers in the academy dormitories."
70001010-163 = "Our students have made their wishes clear, and we're launching a complete overhaul of Red Winter Academy's bathing facilities..."
70001010-164 = "And the members of Spec Ops No. 227 are the only students who have experience with such an endeavor."
70001010-165 = "Oh, so the dormitory baths, not an actual hot spring..."
70001010-166 = "Then I won't be able to offer people drinks after they bathe."
70001010-167 = "There may be space for additional amenities in the future, but right now our primary concern is remodeling our bathing facilities to accommodate the entire student body."
70001010-168 = "So we would like Spec Ops No. 227 to tour the other academies and submit a report to the Secretariat detailing if any of their facilities would be suitable for use here."
70001010-169 = "You want us to tour the bathing facilities of other academies...?"
70001010-170 = "Yes. We lack the time and expertise needed to renovate our dorms from scratch."
70001010-171 = "Importing facilities that have been proven to work for another academy would expedite the whole process."
70001010-172 = "That's where your team comes in. With your invaluable experience, the Secretariat is prepared to grant you the authority to contract the renovation out to another academy, should you determine that their facilities would meet Red Winter's bathing needs."
70001010-173 = "Accordingly, the Red Winter Office will cover any expenses incurred during your research trip. In fact, we highly recommend that you take advantage of any opportunities that are offered to you, so long as they relate to bathing."
70001010-174 = "Our students normally wouldn't be afforded this level of luxury, so be grateful!"
70001010-176 = "Hmm. Usually when a deal sounds too good to be true, it is..."
70001010-177 = "But Shigure! This opportunity is once in a lifetime!"
70001010-178 = "If we get this right, we can escape the icy clutches of the Former Institute, and maybe even start our hot spring services again!"
70001010-179 = "And we can try out the bathing facilities of the other academies for free while we're at it! It'll be like a spa holiday—why would average students like us ever refuse?"
70001010-180 = "Well, if you really want to, Nodoka, I won't say no..."
70001010-181 = "I want to!"
70001010-185 = "In honor of the now-defunct Hot Springs Resort No. 227, we promise to find the perfect bathing facilities for the students of Red Winter Academy!"
70001010-187 = "Heehee. I'm glad to hear you say so."
70001010-188 = "Then we leave it in your capable hands."

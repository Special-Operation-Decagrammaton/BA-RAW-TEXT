[translation]
70001010-1 = "สู้ต่อไป เรดวินเทอร์! 1"
70001010-8 = "หัวหน้า! ยัยประธานตัวกะเปี๊ยกกำลังนำกองกำลังจากสำนักเลขาธิการมาที่นี่แล้ว!"
70001010-9 = "บ้าเอ๊ย การปฏิวัติครั้งนี้จะต้องจบลงไปทั้งๆ แบบนี้งั้นเหรอ..."
70001010-10 = "แต่อย่าคิดว่าทุกอย่างจะจบแค่ตรงนี้ล่ะ!"
70001010-11 = "คราวหน้าพวกเราจะต้องขับไล่ยัยเด็กตัวกะเปี๊ยกนั่นออกไป แล้วสร้างเรดวินเทอร์แบบใหม่ให้..."
70001010-17 = "เจ้าพวกนี้... ต้องกวาดล้างให้หมด! กวาดล้างพวกมันให้สิ้นซาก!"
70001010-18 = "ห้องสำนักงานของเชริโน่"
70001010-20 = "เฮ้อ... คราวนี้ก็จัดการให้จบๆ ไปได้ซะที"
70001010-25 = "ท่านประธานเชริโน่ พวกเราจับกุมแกนนำการปฏิวัติครั้งนี้ได้หมดแล้วค่ะ!"
70001010-26 = "อื้ม ยอดเยี่ยมมาก หัวหน้าคณะฯ มารินะ!"
70001010-27 = "และเพื่อเป็นการตอบแทนคุณงามความดีของสหาย เราจะมอบ <เหรียญตรากล้าหาญหนวดขั้นที่ 1> ให้..."
70001010-28 = "...เดี๋ยวนะ <เหรียญตรากล้าหาญหนวดขั้นที่ 1> เคยมอบไปแล้วตอนปฏิวัติครั้งก่อนนี่นา?"
70001010-29 = "หัวหน้าเลขานุการ โทโมเอะ... การปฏิวัติครั้งนี้เป็นครั้งที่เท่าไรของอาทิตย์นี้กันนะ?"
70001010-33 = "มีความพยายามปฏิวัติ 2 ครั้ง และมีการปฏิวัติที่ประสบความสำเร็จ 5 ครั้งค่ะ แต่ว่า..."
70001010-34 = "ตายจริง พอมาคิดๆ ดูแล้ว... สัปดาห์นี้มีการปฏิวัติต่อเนื่องมาตลอดไม่เว้นวันเลยนะคะ"
70001010-35 = "เราเรียกนักวาดมาวาดภาพบันทึกไว้เป็นเกียรติประวัติการต่อสู้กับกลุ่มปฏิวัติตลอดหนึ่งสัปดาห์ของ#nท่านประธานเชริโน่ดีไหมคะ?"
70001010-36 = "เลิกพูดถึงบันทึกอะไรนั่นเถอะ นักวาดที่เรียกมาให้วาดภาพบันทึกตอนปฏิวัติคราวก่อน ดันเป็นหนึ่งใน#nแกนนำกลุ่มปฏิวัติไปซะได้..."
70001010-40 = "ว่าแต่ว่า... การปฏิวัติครั้งนี้เกิดขึ้นเพราะอะไรอีกล่ะ?"
70001010-41 = "คะ...คะ...? เกิดขึ้นเพราะอะไรงั้นเหรอคะ?"
70001010-42 = "นักเรียนของสหภาพเรดวินเทอร์เป็นพวกหัวร้อนง่ายก็จริง แต่การที่จะเกณฑ์นักเรียนจำนวนมากมาได้#nเรื่อยๆ แบบนี้คงจะต้องมีเหตุผลที่มีน้ำหนักมากพออยู่แน่"
70001010-43 = "ถ้าตามปกติละก็คงจะประท้วงกันแค่ 3-4 วันครั้ง แต่นี่กลับหาเรื่องพยายามปฏิวัติทุกวันติดต่อกันทุกวัน#nมาหนึ่งอาทิตย์แบบนี้ คงจะไม่พอใจอะไรกันมากแน่ๆ..."
70001010-44 = "เจ้าพวกนั้นไม่พอใจอะไรเรื่องการปกครองของเรา จนถึงขนาดก่อการปฏิวัติไม่หยุดหย่อนแบบนี้น่ะ?"
70001010-45 = "เอ่อคือว่า... เรื่องนั้นน่ะ..."
70001010-49 = "จากการสอบสวน ดูเหมือนว่าแกนนำของกลุ่มปฏิวัติในครั้งนี้จะเรียกร้องให้ดำเนินการปรับปรุงโรงอาบ#nน้ำภายในสหภาพเรดวินเทอร์ค่ะ"
70001010-50 = "โรงอาบน้ำเหรอ...? โรงอาบน้ำในสหภาพเรดวินเทอร์ของเราก็เพียงพอแล้วไม่ใช่รึไง?"
70001010-51 = "ที่ผ่านมาไม่เคยมีข้อเรียกร้องอะไรเกี่ยวกับโรงอาบน้ำเลย แล้วทำไมจู่ๆ ถึงมีเรื่องนี้ได้...?"
70001010-52 = "...หรือว่าจะเป็นเพราะเคยได้ไปใช้โรงอาบน้ำที่ <ออนเซ็น No.227> กันคะ"
70001010-53 = "ออนเซ็น No.227 งั้นเรอะ? พูดถึงชื่อนั้นขึ้นมาทำไมน่ะ?"
70001010-57 = "ห้องอาบน้ำของทางออนเซ็น No.227 เป็นห้องอาบน้ำหรูหราแบบที่ไม่เคยมีมาก่อนในสหภาพ#nเรดวินเทอร์นี่คะ"
70001010-58 = "คงมีนักเรียนหลายคนที่พอได้ลงไปสัมผัสกับประสบการณ์การอาบน้ำในอ่างอาบน้ำหรูๆ แล้วไม่พอใจ หลังจากกลับไปเจอกับห้องอาบน้ำที่ล้าสมัยในหอพักตัวเองน่ะค่ะ"
70001010-61 = "ฮึ่ม เราไม่เห็นว่ามันจะแตกต่างกันตรงไหนเลย"
70001010-62 = "แค่มีน้ำร้อนให้อาบก็น่าจะพอแล้วนี่ ห้องน้ำในหอพักรวมของเรดวินเทอร์เองก็มีน้ำร้อนให้อาบเพียงพอ#nอยู่แล้วไม่ใช่รึไง!"
70001010-64 = "...เราเปิดน้ำร้อนให้อาบแค่ช่วงเช้าเจ็ดโมงเช้าและหนึ่งทุ่มเท่านั้นนะคะ"
70001010-66 = "ถึงบางครั้งเครื่องทำน้ำร้อนมันจะเสีย ก็เลยมีแต่น้ำเย็นให้อาบก็เถอะ..."
70001010-68 = "แต่ห้องอาบน้ำในหอพักของสหภาพเรดวินเทอร์เองก็อาบน้ำได้พร้อมกันทีละหลายร้อยคนด้วย..."
70001010-69 = "หากมองในแง่ของขนาดแล้ว ห้องอาบน้ำของทางเรดวินเทอร์ถือเป็นห้องอาบน้ำที่ดีที่สุดในคิโวทอส#nเลยก็ว่าได้!"
70001010-71 = "ถึงจะไม่มีม่านกั้นแล้วก็สภาพทรุดโทรมไปสักหน่อย..."
70001010-73 = "บางครั้งฉันเองก็อยากลงไปแช่น้ำร้อนให้หายเหนื่อยหลังจากทำงานมาทั้งวันบ้าง..."
70001010-74 = "แล้วก็ถ้าได้ดื่มกาแฟใส่นมเย็นๆ ชื่นใจหลังจากแช่น้ำร้อนด้วยละก็..."
70001010-79 = "นะ...แน่นอนว่าต่อให้กาแฟใส่นมที่ดื่มหลังจากแช่น้ำร้อนจะหวานอร่อยแค่ไหน แต่มันก็ไม่อร่อยเท่า#nช็อกเชริโน่ที่ท่านประธานเชริโน่ทำเองหรอกค่ะ!"
70001010-80 = "ยิ่งกว่านั้น การอาบน้ำถือเป็นความฟุ่มเฟือยในชีวิตประจำวันอย่างหนึ่ง หรือก็คือเป็นแนวคิดของชนชั้น#nนายทุน..."
70001010-81 = "......"
70001010-82 = "ฉะ...ฉันพูดจริงนะคะ! เพราะงั้นได้โปรดกวาดล้าง...!"
70001010-83 = "...คิดแล้วเชียว ควรปรับปรุงห้องอาบน้ำทั้งหมดในสหภาพเรดวินเทอร์จริงๆ ด้วยสินะ"
70001010-84 = "คะ...คะ...?"
70001010-85 = "ฟังเราพูดแล้วถามกลับทันทีแบบนี้ ว่างๆ ก็ไปตรวจหูบ้างนะ หัวหน้าคณะฯ มารินะ?"
70001010-86 = "เราบอกว่าถ้าปรับปรุงห้องอาบน้ำของเรดวินเทอร์ได้ก็คงจะดีน่ะ"
70001010-90 = "ถ้าเป็นนักเรียนคนอื่นๆ คงไม่เท่าไร แต่ตอนนี้ แม้แต่เจ้าหน้าที่ของทางสำนักเลขาธิการยังพูดแบบนั้น มันก็แสดงให้เห็นแล้วว่าคนส่วนใหญ่เองก็คงรู้สึกแบบเดียวกัน"
70001010-91 = "และการที่ผู้นำที่ยิ่งใหญ่ที่เป็นผู้ปกครองอย่างเราจะรับฟังคำขอ มันก็เป็นเรื่องปกติอยู่แล้วนี่"
70001010-92 = "เราไม่ได้ไร้ความสามารถ หรือเอาแต่ใจจนเมินความไม่พอใจของนักเรียนคนอื่นๆ หรอกนะ!"
70001010-93 = "อีกอย่าง จะปล่อยให้เกิดเหตุปฏิวัติเพราะเรื่องเล็กน้อยอย่างการปรับปรุงห้องน้ำแบบนี้อีกไม่ได้..."
70001010-94 = "ช่างเป็นความคิดที่ยอดเยี่ยมไร้ที่ติมากค่ะ ท่านเลขาธิการ!"
70001010-95 = "นอกจากจะไม่ลงโทษนักเรียนที่ต่อต้านอำนาจของท่านเลขาธิการแล้ว ยังมีจิตใจที่เอื้อเฟื้ออารีต่อ#nความทุกข์ของพวกเขา... โทโมเอะผู้นี้รู้สึกประทับใจมากเลยค่ะ!"
70001010-96 = "อ่ะแฮ่ม แน่นอนอยู่แล้ว ก็เราคือท่านเชริโน่ ประธานสภานักเรียน หัวหน้าฝ่ายตกแต่ง หัวหน้าฝ่ายกีฬา และเลขาธิการแห่งสหภาพเรดวินเทอร์เชียวนะ!"
70001010-97 = "ถ้าข่าวเรื่องที่ท่านประธานเชริโน่จะปรับปรุงห้องอาบน้ำในสหภาพเรดวินเทอร์แพร่กระจายออกไปละก็ นักเรียนทุกคนในโรงเรียนจะต้องซาบซึ้งกันมากแน่ๆ ค่ะ"
70001010-98 = "ถ้างั้นตอนนี้เราเตรียมสกู๊ปข่าวพิเศษสำหรับลงใน <เรดแบร์> เลยดีไหมคะ?"
70001010-99 = "อื้ม ฝากด้วยแล้วกันนะ หัวหน้าเลขานุการโทโมเอะ"
70001010-107 = "แล้วก็ถ้าพูดถึงการปรับปรุงห้องอาบน้ำละก็..."
70001010-112 = "...ก่อนอื่นก็ปรับเพิ่มขนาดให้ใหญ่ขึ้นเป็นสองเท่าเลยไหม?"
70001010-113 = "เอ่อ... แบบนั้นมันดูเป็นคนละเรื่องกัน..."
70001010-117 = "การขยายขนาดห้องอาบน้ำก็เป็นเรื่องดีนะคะ แต่ว่าปัญหาพวกนี้ ปล่อยให้เป็นหน้าที่ของผู้เชี่ยวชาญ#nจะดีกว่าไหมคะ?"
70001010-118 = "ผู้เชี่ยวชาญงั้นรึ? ในสหภาพเรดวินเทอร์มีผู้เชี่ยวชาญเรื่องห้องอาบน้ำอยู่ด้วยเหรอ?"
70001010-119 = "ค่ะ สหภาพเรดวินเทอร์ของเรามีผู้เชี่ยวชาญด้านห้องอาบน้ำที่ประสบความสำเร็จในการดูแลจัดการ#nออนเซ็นขนาดใหญ่อยู่ค่ะ"
70001010-120 = "นั่นก็คือ..."
70001010-123 = "หลังจากทนฝ่าฟันความยากแค้นและความหนาวเหน็บที่ห้องเรียนเก่าและส่งหนังสือคำร้องไปต่างๆ มากมาย..."
70001010-124 = "ดูเหมือนเสียงเรียกร้องของพวกเราจะส่งไปถึงประธานเชริโน่แล้วละค่ะ!"
70001010-125 = "...ในที่สุดก็จะได้รับการละเว้นโทษแล้วสินะคะ?"
70001010-129 = "ไม่สิ ไม่ใช่การละเว้นโทษสิ..."
70001010-130 = "ที่ผ่านมาก็ไม่เคยแสดงท่าทางสำนึกผิดออกมาให้เห็นเลยสักนิด เพราะงั้นแล้วจะมาคาดหวังเรื่องการ#nละเว้นโทษได้ยังไง... ช่างน่าละอายจริงๆ"
70001010-131 = "หมายความว่ายังไงคะ?"
70001010-132 = "พวกเราอดทนเจียมเนื้อเจียมตัวอยู่ที่อาคารเรียนเก่า และหมั่นเขียนหนังสือสำนึกผิดส่งไปอย่างสม่ำ#nเสมอแบบนี้... ยังจะบอกว่าไม่แสดงท่าทางสำนึกผิดอีกงั้นเหรอคะ!"
70001010-133 = "...เจียมเนื้อเจียมตัว?"
70001010-134 = "นะ...แน่นอนว่าก็มีบ้างที่ฉันแอบปีนขึ้นไปที่สูงๆ เพื่อส่องดูคุณครู [USERNAME]..."
70001010-139 = "...คราวก่อนถูกพวกนักเรียนตำรวจของวัลคิรี่จับกุมตอนที่ปีนขึ้นไปบนเสาไฟฟ้าด้วยนี่นะ"
70001010-144 = "นั่นยังไงล่ะ หากละเว้นโทษนักเรียนที่ทำผิดซ้ำแล้วซ้ำเล่าอย่างไร้เหตุผลละก็ อำนาจของสำนัก#nเลขาธิการของเราคงจะถูกหยามแน่ๆ!"
70001010-145 = "ชิ... คนเค้าอุตส่าห์ดีใจ"
70001010-146 = "ถ้าไม่ได้เรียกมาเรื่องละเว้นโทษแล้วละก็ มีเรื่องอะไรงั้นเหรอคะ?"
70001010-147 = "เรื่องนั้น... คือว่าเรามีเรื่องที่จะขอให้พวกเธอเป็นพิเศษอยู่ช่วยน่ะ"
70001010-148 = "ถ้าคลี่คลายเรื่องนี้ได้ เราจะยอมละเว้นโทษที่พวกเธอก่อเอาไว้ แล้วก็จะมอบเหรียญตราอันทรงเกียรติ พร้อมกับตำแหน่งหน้าที่ในสำนักเลขาธิการให้ด้วย!"
70001010-149 = "เหรียญตราทรงเกียรติอะไรนั่นของประธาน ไม่ต้องก็ได้นะคะ..."
70001010-150 = "ที่ผ่านมาประธานไม่เคยสนใจเสียงเรียกร้องของเราเลย แต่จู่ๆ กลับเรียกมาแล้วบอกว่ามีเรื่องจะขอร้อง#nเนี่ยนะ... มันดูแปลกๆ นะคะ"
70001010-151 = "หรือว่าจะยังโกรธเรื่องที่เราเปิดให้บริการออนเซ็นโดยพละการ..."
70001010-152 = "ไม่ใช่อย่างนั้นหรอกค่ะ สำนักเลขาธิการเรดวินเทอร์ทุกคนรู้สึกประทับใจกับความมุมานะอุสาหะของ#nพวกคุณอย่างมาก"
70001010-153 = "พวกคุณเริ่มดูแลจัดการบริหารออนเซ็นจนเปิดให้บริการกับลูกค้าจากทั้งในสหภาพเรดวินเทอร์ และคน#nภายนอก ทั้งๆ ที่ไม่มีความรู้ในเรื่องนั้นเลย นับว่าเป็นตัวอย่างที่ดีให้กับคนอื่นๆ ในสหภาพเรดวินเทอร์#nของเราค่ะ "
70001010-154 = "ตะ...แต่เราไม่ได้รับอนุญาตสักหน่อย"
70001010-158 = "แน่นอนว่าถึงจะไม่ได้รับอนุญาตจากทางสำนักเลขาธิการล่วงหน้าก็เถอะค่ะ"
70001010-159 = "เพราะงั้นคราวนี้ เพื่อไม่ให้เกิดการกระทำผิดซ้ำเดิม ทางสำนักเลขาธิการเลยอยากจะมอบโอกาสให้#nพวกคุณได้บริหารจัดการห้องอาบน้ำขนาดใหญ่ค่ะ"
70001010-160 = "คะ? ที่พูดเมื่อกี้... หมายความว่าจะให้ฟื้นฟูออนเซ็น No.227 งั้นเหรอคะ?"
70001010-161 = "ฮึ่ม อุตส่าห์ยับยั้งเจ้าพวกวายร้ายเกเฮนน่าไม่ให้ทำให้สถาบันของเรากลายเป็นทะเลลาวาไปแล้วแท้ๆ มาตอนนี้จะพัฒนาน้ำพุร้อนต่อได้อีกงั้นเหรอ..."
70001010-162 = "ถ้าพูดให้ถูกก็คือ... สิ่งที่เราจะขอร้องพวกคุณคืองานเกี่ยวกับการดูแลจัดการสุขภัณฑ์ห้องอาบน้ำของ#nหอพักรวมค่ะ"
70001010-163 = "คราวนี้ทางสำนักเลขาธิการเรดวินเทอร์ยอมรับข้อเรียกร้องให้ปรับปรุงสุขภัณฑ์ห้องอาบน้ำในหอพัก#nใหม่ทั้งหมด..."
70001010-164 = "ในสหภาพเรดวินเทอร์ นอกจากนักเรียนห้องพิเศษ 227 แล้วไม่มีใครที่เคยมีประสบการณ์เรื่องการดูแล#nจัดการสุขภัณฑ์ของห้องอาบน้ำขนาดใหญ่เลยค่ะ"
70001010-165 = "อะไรกัน... ให้จัดการสุขภัณฑ์ห้องอาบน้ำหรอกเหรอเนี่ย นึกว่าจะทำออนเซ็นซะอีก..."
70001010-166 = "งั้นก็คงขายเครื่องดื่มหลังแช่น้ำร้อนเสร็จไม่ได้สินะ"
70001010-167 = "ในระยะยาว เราอาจเพิ่มสิ่งอำนวยความสะดวกอื่นๆ เข้าไปอีกก็ได้ค่ะ แต่ตอนนี้เราให้ความสำคัญกับ#nห้องอาบน้ำขนาดใหญ่ที่ใช้ร่วมกันหลายๆ คนได้เป็นลำดับแรกค่ะ"
70001010-168 = "เพราะแบบนั้นเราก็เลยอยากให้ทางสมาชิกของห้องพิเศษ 227 ไปทัศนศึกษาดูสุขภัณฑ์ห้องอาบน้ำ#nของสถาบันต่างๆ แล้วก็มาเสนอวิธีปรับปรุงสุขภัณฑ์ห้องอาบน้ำของสถาบันเราค่ะ "
70001010-169 = "ให้ไปดูห้องอาบน้ำของสถาบันอื่นงั้นเหรอ...?"
70001010-170 = "ค่ะ เพราะตอนนี้เรายังขาดเงินทุนที่จะใช้ก่อสร้าง ความรู้ และเราก็ไม่มีภาพพิมพ์เขียวสำหรับสร้างห้อง#nอาบน้ำด้วยค่ะ"
70001010-171 = "ดังนั้นในครั้งนี้ เราเลยคิดว่าจะมอบหมายให้ทางสถาบันอื่นที่ดูแลเรื่องห้องอาบน้ำอยู่แล้วเป็นฝ่ายจัด#nการค่ะ"
70001010-172 = "แต่ว่าเรื่องนี้เป็นประเด็นที่มีคนให้ความสนใจอยู่มาก เพราะงั้นเราจึงต้องขอให้ทางสมาชิกของห้อง#nเรียนพิเศษที่เคยมีประสบการณ์และเชี่ยวชาญในการดูแลจัดการออนเซ็นแล้วให้มาช่วยค่ะ"
70001010-173 = "แน่นอนว่าทางสำนักเลขาธิการจะดูแลค่าใช้จ่ายทั้งหมดสำหรับการเดินทางไปทัศนศึกษาครั้งนี้ค่ะ เพราะงั้น ขอให้พวกคุณเที่ยวชมและศึกษาเรื่องการดูแลสุขภัณฑ์ห้องอาบน้ำได้อย่างเต็มที่เลยค่ะ"
70001010-174 = "เรื่องนี้นับว่าเป็นประสบการณ์พิเศษที่พวกนักเรียนทั่วไปไม่มีทางได้สัมผัสหรอกนะ เพราะงั้นจงรู้สึก#nเป็นเกียรติเอาไว้ซะด้วยล่ะ!"
70001010-176 = "อืม... ทั้งที่เป็นข้อเสนอที่ดีมากเลยแท้ๆ แต่ไม่รู้ทำไมฉันถึงไม่อินด้วยเลย..."
70001010-177 = "แต่ว่านะ ชิกุเระจัง... นี่เป็นโอกาสดีเลยนะคะ!"
70001010-178 = "ถ้าปัญหานี้คลี่คลายไปได้ด้วยดี พวกเราอาจหลุดพ้นจากชีวิตโกโรโกโสในอาคารเรียนเก่าก็ได้นะคะ แถมอาจจะกลับมาเปิดให้บริการออนเซ็นของพวกเราอีกด้วยก็ได้ค่ะ!"
70001010-179 = "อีกอย่าง นี่ก็เป็นโอกาสดีๆ ที่จะได้ไปสัมผัสห้องอาบน้ำของสถาบันต่างๆ ด้วย นักเรียนธรรมดาๆ อย่างเราคงไม่มีเหตุผลที่จะปฏิเสธหรอกใช่ไหมล่ะคะ?"
70001010-180 = "ก็นะ... ถ้าโนโดกะจังว่าดี ฉันก็ว่าดี..."
70001010-181 = "ค่ะ ฉันจะทำค่ะ!"
70001010-185 = "ถึงออนเซ็น No.227 จะปิดตัวลงไปแล้ว แต่เราก็ขอรับประกันค่ะ เราจะพยายามเต็มที่เพื่อห้องอาบน้ำ#nชั้นยอดที่จะทำให้นักเรียนของสหภาพเรดวินเทอร์พึงพอใจได้ค่ะ!"
70001010-187 = "ฮุฮุ... ได้ยินคุณพูดแบบนั้น ฉันก็โล่งใจมากเลยค่ะ"
70001010-188 = "ถ้างั้น... ขอรบกวนด้วยนะคะ"

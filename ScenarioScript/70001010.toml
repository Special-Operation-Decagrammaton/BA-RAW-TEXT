70001010-60 = "3;체리노;99\n#3;em;…\n#wait;2500"
70001010-61 = "3;체리노;99;흥, 이 몸이 보기에는 큰 차이도 없어 보이던 걸.\n#3;jump"
70001010-62 = "3;체리노;05;어차피 온수만 나온다면 목욕을 하는 데에는 문제가 없을 터. 붉은겨울 학원의 공용 기숙사에도 온수만큼은 충분히 나오고 있다고!"
70001010-63 = "#all;hide"
70001010-64 = "3;토모에;99;……오전 7시와 오후 7시, 아침저녁으로 2시간 밖에 나오지 않지만요."

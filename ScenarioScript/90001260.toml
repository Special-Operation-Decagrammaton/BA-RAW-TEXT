90001260-325 = "無其他資料。"
90001260-327 = "好像有什麼東西，像暴風一樣猛然掠過了呢……"
90001260-328 = "[ns7]「中間還夾雜著很多不尋常的聲音……」\n[ns8]「他剛才叫我們不要進去那邊對吧？」"
90001260-331 = "嗯？是的。#n他說要是有人想強行進入，就算必須放棄其他設施也……那個……"
90001260-332 = "總之會讓入侵者的下場很慘就對了。"
90001260-333 = "存檔……存檔不可以不見啊……"
90001260-334 = "（得找個時間好好唸一下愛麗絲，要求他少打一點電動才行……）"
90001260-340 = "燈，燈光怎麼……？"
90001260-341 = "……又來了？真受不了。"
90001260-342 = "眼，眼前一片黑！什麼都看不見……！"
90001260-343 = "不要離開我身邊，愛麗絲！"
90001260-344 = "……？#n好像，有什麼類似信號的東西……？"
90001260-345 = "……！"
90001260-349 = "你，你們好啊……各位，還有老師……#n又見面了呢，耶嘿嘿……"
90001260-350 = "你們可真是固執又死纏爛打啊。"
90001260-351 = "就是說啊。#n明明乖乖放棄一切，對彼此都好的說。"
90001260-352 = "[s9]「這就是所謂的職業道德喔。」\n[s10]「身為老師可不能放棄任何一個學生啊。」"
90001260-356 = "哼，要是我們是學生的話，老師一定早就放棄了。"
90001260-357 = "[s11]「誰說的？」\n[s12]「你們的轉學資料我都準備好了，有興趣的話隨時聯絡我。」"
90001260-363 = "哇……竟然連這種回答都說得出口……"
90001260-365 = "這，這種人……就是所謂的，無可救藥嗎……？"

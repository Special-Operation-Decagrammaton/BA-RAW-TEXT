[translation]
90001260-1 = "第26話;隱藏之物"
90001260-2 = "[ns]「這裡……好像是最後一間房間了？」"
90001260-3 = "那，那個……這裡的狀況好像，有點不妙……"
90001260-4 = "這裡……積水了耶？#n不只是苔蘚，連藤蔓植物都蔓延進來了。"
90001260-5 = "損壞到這種程度，如果是一般的種子保管所應該早就廢棄了。"
90001260-6 = "請看，莉央前輩！陽葵前輩！#n整面牆都是抽屜！"
90001260-8 = "是啊……就來稍微看看吧。"
90001260-11 = "這倒是讓人有點意外。#n種子的保存狀態非常良好。"
90001260-12 = "雖然莉央會長說情況不妙……不過從氣氛上來說，這裡好像更有種子保管所的感覺？#n到處都是綠油油的。"
90001260-13 = "我也覺得。#n感覺就像那部經典作品裡……鹿形的森林之神位於森林最深處的藏身地一樣。"
90001260-14 = "原來這個設施是由三重密閉結構組成的啊。"
90001260-16 = "雖然外層的建築與保管所的空間已經受損，不過最後的內牆……#n保管種子的庇護層依然維持著應有的功能。"
90001260-17 = "原來如此。真不愧是千年的技術力呢。"
90001260-18 = "不完全是那樣。"
90001260-20 = "怎麼說呢，莉央？"
90001260-21 = "從過往的紀錄來看，被轉變為預言者的AI──#n往往會表現出完全不同於以往的行為模式。"
90001260-22 = "比如霍德原本是千年的通訊網架設單元AI，現在卻完全變了。"
90001260-23 = "就連本來是艘船的霍刻瑪，現在也很難再稱之為船了呢。"
90001260-24 = "不過這座種子保管所的人工智慧，也就是現在被稱為提法瑞特的存在……"
90001260-25 = "即使在轉變為預言者之後，依然表現出了想繼續保存種子的……某種意志。"
90001260-26 = "否則種子的保存狀態不可能好到這種程度……對吧？"
90001260-27 = "沒錯。然而如果這個假設成立，就勢必會產生一個疑問──"
90001260-28 = "──想繼續保存種子的會是那三個孩子，還是提法瑞特呢？"
90001260-29 = "假如是提法瑞特的話，你會做出什麼樣的判斷呢？"
90001260-30 = "如果真是如此……我會提出另一個假設。#n即使是預言者，也各自具有某種程度的自我意識。"
90001260-31 = "以此推論下去的話──"
90001260-37 = "──！？"
90001260-38 = "這是……！？"
90001260-46 = "莉，莉央前輩！？陽葵前輩！？"
90001260-47 = "桃井？綠？還有大家都……？#n這，這是怎麼回事！？"
90001260-48 = "話說好像有一股奇怪的味道……#n嗚嗚……愛麗絲感覺有點不舒服……"
90001260-49 = "老師？老師你還好嗎？老師！？"
90001260-57 = "（眼前逐漸變得漆黑一片……）"
90001260-58 = "（在感到暈眩的同時，也有股想就此酣然睡去的心情……）"
90001260-64 = "醒醒啊，老師！！！"
90001260-65 = "[ns1]「彩奈……？星奈……？」\n[ns2]「等早上再叫我嘛……呼嚕……」"
90001260-68 = "彩奈前輩，這……"
90001260-69 = "沒問題的，星奈醬！這裡就交給我來處理！"
90001260-70 = "那就拜託你了，彩奈前輩。#n這種狀況我沒什麼經驗……"
90001260-71 = "雖然不是很確定，不過應該……是某種氣體！#n目前已經採取措施，避免老師的身體裡再吸入更多氣體了！"
90001260-72 = "分析。無色。無味。#n是一種作用於神經系統，效力相對較弱的促效劑。"
90001260-73 = "其他學生也沒有生命危險。#n哪怕在最糟的情況下，也只要睡一覺就會醒過來了。"
90001260-74 = "不過還是不建議長期暴露在這種氣體中。#n畢竟促效劑或多或少都具有毒性。"
90001260-75 = "耶嘿嘿。#n說到睡覺，我也突然有點睏……"
90001260-76 = "彩奈前輩，要是連我們都睡著的話……"
90001260-77 = "我，我是開玩笑的啦！#n星奈醬也真是的，我怎麼可能真的在這種時候睡著呢？"
90001260-78 = "肯定。#n因為這種時候的彩奈前輩，還算值得信賴。"
90001260-79 = "啊哈哈，什麼叫「還算」啦，星奈醬……"
90001260-80 = "啊，老師！Kei靠過來了！"
90001260-82 = "[ns]「Kei？」"
90001260-83 = "啊，老師平安無事是嗎。那真是太好了。"
90001260-84 = "不過這還真奇怪。#n我姑且不論，為何所有人之中就只有老師一個人沒事呢？"
90001260-85 = "嗚哇！雖然看到老師平安無事很開心，可是愛麗絲很擔心其他夥伴……！"
90001260-86 = "唔嗯，要說老師和其他人有什麼差別的話……"
90001260-88 = "（咦，該不會是……？）"
90001260-90 = "嗚嗚……遇到能力值下降事件了……#n沒有保護好同伴，導致失去增益效果……"
90001260-91 = "這樣下去，愛麗絲會沒辦法發揮出百分之百的力量！"
90001260-93 = "[ns]「其他所有人……都睡著了嗎？」"
90001260-94 = "咦？是的。#n從生命徵象看來，目前為止還沒有大礙。"
90001260-95 = "不過像現在這樣被絆住腳步也不容樂觀。#n畢竟我們的時間本來就所剩不多。"
90001260-96 = "我就直接切入重點了，老師。#n剛才我在這座保管所的中央……發現了某種類似觸控面板的東西。"
90001260-98 = "不過在嘗試操作之後卻沒有任何反應。#n於是我就拜託了愛麗絲……"
90001260-99 = "可是螢幕只閃了幾下而已……#n嗚嗚，難道這也是因為愛麗絲的等級下降了嗎？"
90001260-101 = "這還很難說，畢竟其他人嘗試的結果也一樣……"
90001260-102 = "一定是因為其他人也遇到了等級下降事件……愛麗絲知道。"
90001260-103 = "……我分不太清楚愛麗絲是說認真的還是在比喻，總之這件事似乎得要麻煩老師了。"
90001260-104 = "不知道為什麼……老師似乎是我們之中看起來最有機會的人。"
90001260-105 = "[s3]「知道了。不過……我有個問題。」\n[s4]「你剛才是把睡著的孩子們拖過來，一個一個拉他們的手去碰面板嗎？」"
90001260-108 = "是啊？有什麼問題嗎？#n這是完全合乎科學的實驗方式。"
90001260-109 = "愛，愛麗絲本來想阻止他的……嗚哇！"
90001260-110 = "事後再跟他們道歉就行了吧？#n如果是莉央的話，應該會認為這是個合理的作法才對。"
90001260-112 = "[ns]「這麼一說好像也是……」"
90001260-114 = "（在Kei的引導下，將手放上了觸控面板）"
90001260-115 = "（然後……！）"
90001260-122 = "[ns]「咦……！？」"
90001260-123 = "是赤冬聯邦學園的校徽！？#n為什麼會出現在這裡……？"
90001260-127 = "（剎那間，莊嚴又輕快的音樂流瀉而出）"
90001260-128 = "（接著響起了一個語氣親切又帶有機械感的聲音……！）"
90001260-130 = "[56cd7b][log=모니터]歡迎蒞臨，同志。[wa:500]或者也可能不是同志。[/log]"
90001260-132 = "[56cd7b][log=모니터]歡迎來到赤冬的種子保管所。[/log]"
90001260-134 = "[ns]「……這是什麼？」"
90001260-135 = "[56cd7b]歡迎蒞臨，同志。或者也可能不是同志。"
90001260-136 = "[56cd7b]歡迎來到赤冬的種子保管所。"
90001260-137 = "……雖然有點雜音，不過聽起來好像是這裡的管理系統。"
90001260-139 = "[56cd7b][log=모니터]這裡是為末日之後的世界而建造的生命搖籃。[/log]"
90001260-141 = "[56cd7b][log=모니터]也是燦爛的人類文明留下的最後餘燼。[/log]"
90001260-144 = "[56cd7b][log=모니터]儘管我很想播放自己最愛的歌曲，在迎賓的同時順便轉換心情……[/log]"
90001260-146 = "[56cd7b][log=모니터]可惜我昨天才將那首歌列為了禁曲，只好遺憾地略過這個環節了。[/log]"
90001260-148 = "[ns]「……還真有赤冬的風格呢。」"
90001260-149 = "[56cd7b][log=모니터]這座種子保管所，不只是為了現在的你，更是為了「現在的我們」建造的地方。[/log]"
90001260-152 = "[56cd7b][log=모니터]「只要有了它，哪怕世界滅亡也能重新開始」[/log]"
90001260-154 = "[56cd7b][log=모니터]我們讓所有人懷抱著希望安心生活……[/log]"
90001260-157 = "[56cd7b][log=모니터]讓人們得以擺脫動盪和恐懼。[/log]"
90001260-159 = "[56cd7b][log=모니터]當然我也無法完全否認……[/log]"
90001260-161 = "[56cd7b][log=모니터]我們從不妥協的革命腳步，可能正是招致滅亡的原因之一。[/log]"
90001260-164 = "[56cd7b][log=모니터]然而從結果來說，我也是因此才得以與你相遇。緣分這種東西真的很有趣呢。[/log]"
90001260-166 = "愛，愛麗絲聽不太懂……#n那個人是這裡的NPC之類的嗎……？"
90001260-168 = "[56cd7b][log=모니터]我們在建造這個設施的過程中，遇到了很多困難。[/log]"
90001260-170 = "[56cd7b][log=모니터]為了籌措建設費用，甚至不惜偷偷在布丁裡摻水。[/log]"
90001260-173 = "[56cd7b][log=모니터]我衷心期盼繼任者不會再遭遇如此窘迫的處境。[/log]"
90001260-176 = "[56cd7b][log=모니터]總之滅亡似乎真的來臨了，我們的心血也終於有機會發光發熱。[/log]"
90001260-178 = "他也把滅亡這件事說得太輕鬆了吧？#n讓人聽了很不舒服……"
90001260-180 = "[56cd7b][log=모니터]就像我剛才所說的一樣，這座設施是最後的種子保管所。[/log]"
90001260-183 = "[56cd7b][log=모니터]為了守護人類的最後希望──也就是種子的安全到最後一刻，這個設施配備了武裝系統。[/log]"
90001260-185 = "[56cd7b][log=모니터]同時為了維持全新的狀態，我們跳過了試運轉的步驟。這是相當合理的措施。[/log]"
90001260-188 = "[56cd7b][log=모니터]換言之，你曾經、正在、將要在這裡接觸的一切……[/log]"
90001260-190 = "[56cd7b][log=모니터]就連我們都完全沒有碰過。[/log]"
90001260-192 = "[56cd7b][log=모니터]明白了嗎？請不要隨便啟動任何東西。[/log]"
90001260-194 = "[ns5]「為了維持全新的狀態……」\n[ns6]「跳過了……測試階段！？」"
90001260-197 = "[56cd7b]換言之，你曾經、正在、將要在這裡接觸的一切……"
90001260-198 = "[56cd7b]就連我們都完全沒有碰過。"
90001260-199 = "[56cd7b]明白了嗎？請不要隨便啟動任何東西。"
90001260-200 = "他們到底在想什麼啊！？"
90001260-202 = "[56cd7b][log=모니터]你的通行權限就到這裡，也就是第3區域的管理設施為止。[/log]"
90001260-204 = "[56cd7b][log=모니터]接下來的第2種子保管所，未經指導委員會指定的標準流程是無法進入的。[/log]"
90001260-207 = "[56cd7b][log=모니터]因為那裡是保存了整體七成以上種子的重要設施。[/log]"
90001260-209 = "[56cd7b][log=모니터]如果對設施造成危害，或者嘗試強行進入的話……[/log]"
90001260-211 = "[56cd7b][log=모니터]即便要放棄其他設施，主機也會讓你……唔嗯……[/log]"
90001260-214 = "[56cd7b][log=모니터]咖啡已經好幾個月沒貨了，腦筋有點轉不動……[/log]"
90001260-217 = "[56cd7b][log=모니터]能麻煩你自己想一些可怕的詞彙嗎？[/log]"
90001260-219 = "[56cd7b][log=모니터]最好是那種……你最不想碰上的事情。[/log]"
90001260-221 = "那，那個……比如存檔不見之類的？"
90001260-223 = "[56cd7b][log=모니터]了解，我們會讓那種事發生的。[/log]"
90001260-225 = "[56cd7b][log=모니터]無論你回答了什麼，我都衷心感謝你的配合。[/log]"
90001260-227 = "[56cd7b][log=모니터]總之請盡量不要觸及第2保管所。[/log]"
90001260-230 = "[56cd7b][log=모니터]話雖如此……不能讓你看看第2保管所的內部，還是讓我有點遺憾呢。[/log]"
90001260-232 = "[56cd7b][log=모니터]那裡和這個第3區域管理設施不同，更加整潔而完善。[/log]"
90001260-235 = "[56cd7b][log=모니터]畢竟我本來沒打算把這裡也改成保管室的……不過這個世界就是這樣吧。[/log]"
90001260-237 = "[56cd7b][log=모니터]就像第一次煎布利尼薄餅總是會變形一樣，世事很難盡如人意。[/log]"
90001260-240 = "[56cd7b][log=모니터]所以就讓我們忘記過去，在下次滅亡的時候努力做得更好吧！[/log]"
90001260-242 = "下次……滅亡？"
90001260-243 = "愛麗絲……聽不太懂他在說什麼。#n嗚嗚嗚……"
90001260-245 = "[56cd7b][log=모니터]以上安全及警告事項已說明完畢。[/log]"
90001260-247 = "[56cd7b][log=모니터]祝你在滅亡來臨之時不會太過痛苦。[/log]"
90001260-250 = "[56cd7b][log=모니터]並且──[/log]"
90001260-253 = "[56cd7b]並且────"
90001260-256 = "[56cd7b]並且──────"
90001260-260 = "[FF6666][log=모니터]「這個容量，一次只能錄這麼多嗎？」[/log]"
90001260-262 = "[FF6666][log=모니터]「所以說──」[/log]"

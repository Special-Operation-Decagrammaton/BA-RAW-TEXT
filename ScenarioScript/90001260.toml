90001260-67 = "#wait;10"
90001260-68 = "3;아로나;12\n4;프라나;11;아로나 선배, 이건…….\n#4;a\n#4;em;[...]\n#3;m2"
90001260-69 = "3;아로나;05;괜찮아요, 프라나 쨩! 여기서는 제가 대처할게요!\n#3;jump"
90001260-70 = "4;프라나;12;부탁드리겠습니다. 아로나 선배. 이런 사태는 아직 제가 익숙하지 않아서……."
90001260-71 = "3;아로나;02;정확히는 모르겠지만, 어떤…… 가스 같아요! 일단 선생님의 몸에 이 이상의 가스는 들어오지 않을 거예요!"
90001260-72 = "4;프라나;02;분석. 무색. 무취. 신경계에 작용하는, 비교적 약한 정도의 작용제입니다."
90001260-73 = "3;아로나;01;다른 학생분들도 생명에 지장은 없을 거예요. 최악의 경우라도, 푹 자고 일어나면 괜찮아질 거고요.\n#3;em;[반응]"
90001260-74 = "4;프라나;99;하지만 장기간 노출에는 주의해 주십시오. 모든 작용제에는 결국 독성이 포함되어 있기 마련입니다."
90001260-75 = "3;아로나;23;에헤헤. 푹 잔다고 하니까, 저도 자고 싶어졌어요…….\n#3;em;[///]"
90001260-76 = "4;프라나;12;아로나 선배. 여기에서 저희까지 그렇게 해 버리면……."
90001260-77 = "3;아로나;18;노, 농담이에요! 프라나 쨩도 참, 제가 진짜로 그럴 리 없잖아요?\n#3;jump"
90001260-78 = "4;프라나;02;일단 긍정. 이럴 때의 아로나 선배는, 그런대로 믿을 수 있으니까요."
90001260-79 = "3;아로나;24;아하하. 그런대로, 라니요. 프라나 쨩……."
90001260-80 = "3;아로나;02;아, 선생님! 케이 씨가 다가오고 있어요!\n#3;em;[!]"

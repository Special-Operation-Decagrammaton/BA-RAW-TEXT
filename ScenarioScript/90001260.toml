90001260-327 = "...That came and went like a hurricane."
90001260-328 = "[ns7] \"Every other thing they said was concerning...\"\n[ns8] \"...but they said not to go over there, right?\""
90001260-331 = "Hm? Yes. Even if it costs them the other facilities..."
90001260-332 = "...they'll put us through the worst thing we can possibly think of if we do."
90001260-333 = "No... Not the save data..."
90001260-334 = "(...At some point, I need to have a serious talk with Aris about how much time she spends playing video games...)"
90001260-340 = "Th-The power went out...?"
90001260-341 = "...What in the world is it this time?"
90001260-342 = "I-It's completely dark! I can't see anything...!"
90001260-343 = "Stay close to me, Aris!"
90001260-344 = "...? Some sort of a signal...?"
90001260-345 = "...!"
90001260-349 = "H-Hello...everyone, and Sensei... We meet again. Heeheehee..."
90001260-350 = "Seriously, you don't know when to give up."
90001260-351 = "As I have been saying! Is it not time for us to go our separate ways? Let it go, let it go!"
90001260-352 = "[s9] \"It's called a good work ethic.\"\n[s10] \"A teacher can't give up on their students, you know.\""
90001260-356 = "Heh. But if those students were US, you'd give up right away."
90001260-357 = "[s11] \"That's not true at all.\"\n[s12] \"All the transfer documents are ready, just say the word.\""
90001260-363 = "Wow... What a response."
90001260-365 = "Th-They call this...beyond help, right...?"
90001260-366 = "How unfortunate. We have no intention of doing this \"transferring.\""
90001260-367 = "It's simply another system created by humans, yes? It has no bearing on us. None at all."
90001260-369 = "[ns13] \"So why did you come out here?\"\n[ns14] \"It's great to see you again, whatever the reason!\""
90001260-372 = "Just how shameless can this teacher be...?"
90001260-373 = "Ugh, anyways! You're about to cross the point of no return, so we're giving you one last chance!"
90001260-374 = "Yes, yes. \"Crossing the line,\" so to speak, although quite literally here."
90001260-376 = "Borrowing Sof's expression, you may consider this...an ultimatum."
90001260-378 = "Next Episode;Life and Consciousness"

90001260-94 = "5;아리스 동복;09\n1;케이 AMAS;01;네? 네. 그렇습니다. 바이탈에는 아직까지 큰 이상은 없는 것 같네요."
90001260-95 = "1;케이 AMAS;21;하지만 여기에서 이런 식으로 발이 묶여 있는 것도 바람직한 상황은 아니겠지요. 아무튼, 우리에게는 별로 시간이 없으니까요."
90001260-96 = "1;케이 AMAS;02;요점만 이야기하겠습니다. 선생님. 조금 전, 어떤…… 터치 패널 같은 것을 발견했습니다. 여기, 이 보관소의 가운데입니다."

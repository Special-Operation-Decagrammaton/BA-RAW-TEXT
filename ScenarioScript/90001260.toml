90001260-88 = "3;케이 AMAS;08;(어라, 혹시……?)\n#3;closeup"
90001260-89 = "#all;hide"
90001260-90 = "1;케이 AMAS;08\n5;아리스 동복;08;우애앵……. 스테이터스 저하 이벤트인 겁니다……. 동료분들을 지키지 못해서, 버프를 받지 못하게 되어 버렸습니다……. \n#5;em;[세로선]\n#5;stiff"

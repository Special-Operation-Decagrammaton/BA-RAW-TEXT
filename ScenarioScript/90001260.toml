[translation]
90001260-1 = "#title;제26화;감추어져 있었던 것"
90001260-2 = "[ns] \"여기가…… 마지막 방인 것 같은데?\""
90001260-3 = "3;유즈 동복;02;그, 그런데…… 상태가 어딘가 조금, 심상치 않은 것 같기도…….\n#3;a\n#3;stiff\n#3;em;[땀]"
90001260-4 = "2;에이미 수영복ND;02;여기…… 물이 고여 있네? 이끼뿐만 아니라, 덩굴 식물까지 들어와 있고.\n#2;a\n#3;m4\n#2;em;[반응]"
90001260-5 = "3;리오 동복;99;이 정도로 망가져 있다니, 웬만한 종자 보관소라면 오래전에 폐기되어야 했을 수준이야.\n#2;hide\n#3;a\n#3;em;[한숨]"
90001260-6 = "5;아리스 동복;07;보세요, 리오 선배! 히마리 선배! 벽 전체가 서랍입니다!\n#5;al\n#3;m2\n#5;hophop"
90001260-7 = "#all;hide"
90001260-8 = "3;히마리 방한복;02;그러네요. 잠시 볼까요? 어디……."
90001260-9 = "3;히마리 방한복;01"
90001260-10 = "#wait;500"
90001260-11 = "3;히마리 방한복;02;이건 조금 놀랍네요. 씨앗들의 보관 상태가 매우 양호해요.\n#3;em;[...]"
90001260-12 = "2;모모이 동복;02;리오 회장은 상태가 안 좋다고 했지만, 분위기만 보면 오히려 진짜 씨앗 보관소라는 느낌인데? 여기저기가 녹색이고.\n#2;a\n#3;hide\n#2;em;[?]"
90001260-13 = "4;미도리 동복;02;그러게요. 오래전 작품에서 나온…… 사슴처럼 생긴 숲의 신이 산다는, 가장 깊은 곳의 은신처 같아요.\n#4;a"
90001260-14 = "3;토키 모드 1;02;결과적으로 이 시설은, 3중 밀폐 구조로 되어 있었던 셈이군요.\n#2;m1\n#4;m5\n#3;a"
90001260-15 = "#all;hide"
90001260-16 = "3;리오 동복;99;그래. 그중 건물과 보관소 공간까지는 망가졌지만, 마지막 내벽…… 종자 보관 쉘터는 제 기능을 다하고 있는 것 같아."
90001260-17 = "2;토키 모드 1;01;그렇군요. 과연 밀레니엄의 기술력이라는 것일까요.\n#2;a\n#2;em;[반짝]\n#3;m4"
90001260-18 = "3;리오 동복;01;그게 전부는 아닐 거야."
90001260-19 = "#all;hide"
90001260-20 = "3;히마리 방한복;02;그건 무슨 뜻이죠, 리오?"
90001260-21 = "3;리오 동복;02;기록상, 예언자로 바뀐 AI들은 기존의 행동 방식과는 다른 양상을 보이곤 했어.\n#3;em;[반응]"
90001260-22 = "3;리오 동복;99;가령 호드의 경우, 원래는 밀레니엄의 통신망 가설 유닛 AI였지만, 지금은 완전히 아니지."
90001260-23 = "3;히마리 방한복;06;그렇네요. 호크마만 해도 배였지만, 지금은 더 이상 그것을 배라고 부르기 힘들 지경이죠.\n#3;em;[한숨]"
90001260-24 = "3;리오 동복;02;하지만 이 시드 볼트의 인공지능, 지금은 아마도 티페레트라고 불릴 그것은."
90001260-25 = "3;리오 동복;01;예언자로 바뀌었음에도, 계속해서 종자를 보관하려는……. 일종의, 의지를 보이고 있는 것 같아.\n#3;em;[...]"
90001260-26 = "5;히마리 방한복;02;그렇지 않다면, 이렇게 보관 상태가 양호할 리 없으니까요?\n#5;al\n#3;m1"
90001260-27 = "3;리오 동복;99;그래. 그런 가정하에서, 한 가지 의문이 다시 생기는데―"
90001260-28 = "3;리오 동복;02;―종자를 계속해서 보관하고자 한 것은, 그 세 명의 아이들일까. 아니면 티페레트일까?\n#3;em;[?]"
90001260-29 = "5;히마리 방한복;02;만일 티페레트라고 한다면, 거기에 대해 어떤 판단을 내릴 생각이죠?"
90001260-30 = "3;리오 동복;01;그런 것이라면…… 나는 예언자들에게도, 나름의 자의식 같은 것이 있다는 가설을 내세우겠어."
90001260-31 = "3;리오 동복;02;그렇게 추론을 이어 나가면―"

[translation]
90001260-1 = "Episode 26;What Was Hidden"
90001260-2 = "[ns] \"It looks like...that was the last room?\""
90001260-3 = "D-Does anyone else think...this place seems a bit strange?"
90001260-4 = "Is this still water? Also, look. There are vines on top of the moss."
90001260-5 = "With this level of damage, this seed vault must have been abandoned long ago."
90001260-6 = "Look, Rio, Himari! This cabinet takes up the entire wall!"
90001260-8 = "Fascinating. Let's take a look."
90001260-11 = "How surprising. These are actually incredibly well maintained."
90001260-12 = "I know Ms. Rio said it's super damaged here, but doesn't this look exactly how you'd imagine a seed vault would? It's so green!"
90001260-13 = "Mhm. It's like something you would see in old media...a secret hideout where the anthropomorphic god of the forest lives."
90001260-14 = "It appears this facility was preserved due to its triple-seal structure."
90001260-16 = "Yes. The building and storage space itself may have eroded, but its true purpose, the seed preservation shelter, has fulfilled its duty."
90001260-17 = "I see. This is an example of Millennium's superior technological prowess."
90001260-18 = "But that doesn't appear to be all."
90001260-20 = "What do you mean, Rio?"
90001260-21 = "Based on the data, AIs that have been converted into prophets tend to behave differently from their initial algorithm."
90001260-22 = "After all, Hod began as Millennium's AI communication network. Clearly, it's evolved from that."
90001260-23 = "Just like Chokmah. You can hardly call it \"just a ship\" anymore."
90001260-24 = "This AI's seed vault is likely what they now call \"Tiphareth.\""
90001260-25 = "Despite this, it appears to have some kind of...will to continue its mission of seed preservation."
90001260-26 = "This facility wouldn't have remained in functioning condition if it didn't."
90001260-27 = "If we assume this to be true, another question arises."
90001260-28 = "Who wished to preserve the seeds? Tiphareth? Or the three children?"
90001260-29 = "What is the implication if it was Tiphareth?"
90001260-30 = "The implication...would be that the prophets still maintain some sort of...consciousness."
90001260-31 = "And if I were to continue that line of thought—"
90001260-37 = "...?!"
90001260-38 = "Isn't this...?!"
90001260-46 = "R-Rio?! Himari?!"
90001260-47 = "Momoi too? Midori? Everyone...? Wh-What's going on?!"
90001260-48 = "What...is this strange smell? It is affecting me...like a debuff... I do not feel well. "
90001260-49 = "Sensei? Are you okay, Sensei? Sensei?!"
90001260-57 = "My vision started to go dark."
90001260-58 = "I was dizzy and, strangely, started to feel very...very...tired."
90001260-64 = "Wake up, Sensei!!"
90001260-65 = "[ns1] \"Arona...? Plana...?\"\n[ns2] \"Wake me up in the morning... Mmm...\""
90001260-68 = "Arona, this is..."
90001260-69 = "It's okay, Plana! I'll take care of this!"
90001260-70 = "I will leave it to you, Arona. I am not familiar with this type of scenario..."
90001260-71 = "I can't tell what it is exactly, but it seems like some sort of...gas! I've blocked anymore from entering Sensei's body for now!"
90001260-72 = "Analysis: colorless, odorless. It's a relatively weak agent that acts on the nervous system."
90001260-73 = "The other students will be okay too! It'll just be like they had a really good night's sleep."
90001260-74 = "Caution. Prolonged exposure may be detrimental. All agents contain some level of toxic substances."
90001260-75 = "Heeheehee. But talking about sleeping makes me wanna take a nice, long nap."
90001260-76 = "Arona. If we do that right now..."
90001260-77 = "I-I was kidding, Plana! There's no way I'd actually fall asleep!"
90001260-78 = "I will agree, for now. Arona can be trusted in this type of situation. To an extent."
90001260-79 = "Ahaha. What do you mean by \"to an extent\", Plana...?"
90001260-80 = "Ah, Sensei! Kei is coming!"
90001260-82 = "[ns] \"Kei?\""
90001260-83 = "Ah, you're safe. I'm relieved."
90001260-84 = "But...why are you safe? It is understandable why we are, but Sensei is the only human who appears unaffected."
90001260-85 = "Waaah! I am relieved that Sensei is okay, but the others...!"
90001260-86 = "Hmm, the difference between Sensei and others..."
90001260-88 = "(Wait, could it be...?)"
90001260-90 = "Uwaaah! Is this a status debuff event? Perhaps I am weakened because I failed to keep my allies safe! "
90001260-91 = "I am currently unable to output 100% of my power!"
90001260-93 = "[ns] \"Is everyone else...asleep?\""
90001260-94 = "Yes. They are. Their vitals are steady, though."
90001260-95 = "Regardless, the situation is less than ideal. We hardly have time to dilly-dally down here."
90001260-96 = "This is the current situation, Sensei. I've detected a touch panel of some sort in the center of this seed vault."
90001260-98 = "I was unable to operate it. So I asked Aris to attempt it..."
90001260-99 = "...However, the screen flickered on for just a moment and then turned off again! Could I possibly have lost levels as well? Uwaaah!"
90001260-101 = "That being said, the same was true for the sleeping humans..."
90001260-102 = "It is because they are suffering through the same level-down event! I can feel the loss..."
90001260-103 = "...I'm unable to decipher if Aris is being literal or figurative, but maybe you can help, Sensei."
90001260-104 = "For...some reason, you appear to be the most unaffected out of all of us."
90001260-105 = "[s3] \"Okay. But...I have a question first.\"\n[s4] \"Did you DRAG all of them over here to place their hand on the panel?\""
90001260-108 = "Yes? Why do you ask? This is the natural method for any scientific experiment."
90001260-109 = "I-I wanted to stop, but... WAAAH!"
90001260-110 = "We can apologize for our actions later, okay? I mean, Rio would probably concede that it was the most logical move."
90001260-112 = "[ns] \"I can't argue that...\""
90001260-114 = "As Kei requested, I placed my hand on the touch panel."
90001260-115 = "Then, suddenly...!"
90001260-122 = "[ns] \"Huh...?!\""
90001260-123 = "Isn't this the Red Winter Federal Academy emblem?! Why is this here...?"
90001260-127 = "As Kei spoke, a majestic, yet cheerful, melody began to play."
90001260-128 = "It was quickly followed by a polite, robotic voice."
90001260-130 = "[56cd7b][log=모니터]Welcome, Comrade. [wa:500]Or person who is not a comrade.[/log]"
90001260-132 = "[56cd7b][log=모니터]Welcome to Red Winter's seed vault.[/log]"
90001260-134 = "[ns] \"...What is this?\""
90001260-135 = "[56cd7b]Welcome, Comrade. Or person who is not a comrade."
90001260-136 = "[56cd7b]Welcome to Red Winter's seed vault."
90001260-137 = "...Its circuits seem a bit fried, but it would appear to be the vault's management system."
90001260-139 = "[56cd7b][log=모니터]This facility is a cradle of life, preparation for the destruction that will one[/log]"
90001260-141 = "[56cd7b][log=모니터]day come for us all, the last ember of a once brilliantly burning civilization.[/log]"
90001260-144 = "[56cd7b][log=모니터]I would love to welcome you with my favorite song, for a change of pace.[/log]"
90001260-146 = "[56cd7b][log=모니터]Unfortunately, I happened to ban that song two days ago, so we'll have to skip that part.[/log]"
90001260-148 = "[ns] \"...How very Red Winter of them...\""
90001260-149 = "[56cd7b][log=모니터]This seed vault was built not only for you of the future, but also for us \"right now.\"[/log]"
90001260-152 = "[56cd7b][log=모니터]Advertised as a way for humanity to start over if the world came to an end,[/log]"
90001260-154 = "[56cd7b][log=모니터]we were able to put the people at ease.[/log]"
90001260-157 = "[56cd7b][log=모니터]Thanks to this, we could proceed without change or fear.[/log]"
90001260-159 = "[56cd7b][log=모니터]Of course, I can't deny the possibility that our revolutionary actions[/log]"
90001260-161 = "[56cd7b][log=모니터]went awry and led to the very destruction we feared.[/log]"
90001260-164 = "[56cd7b][log=모니터]But in the end, we were able to meet thanks to this. Fate is an interesting thing.[/log]"
90001260-166 = "I-I am very confused. Is this like...the NPC of this place?"
90001260-168 = "[56cd7b][log=모니터]The construction of this facility was such tedious work.[/log]"
90001260-170 = "[56cd7b][log=모니터]I even had to water down my puddings so I could save for construction costs.[/log]"
90001260-173 = "[56cd7b][log=모니터]I hope my successors don't have to go that far.[/log]"
90001260-176 = "[56cd7b][log=모니터]Anyways, it would seem that destruction has come. Our efforts must have paid off.[/log]"
90001260-178 = "They're treating the end of the world rather lightly. How irritating..."
90001260-180 = "[56cd7b][log=모니터]Like I mentioned earlier, this facility is the final seed vault.[/log]"
90001260-183 = "[56cd7b][log=모니터]We programmed this facility to safely store seeds, which are the last lifeline in[/log]"
90001260-185 = "[56cd7b][log=모니터]the event of total destruction. And we didn't even do any test runs. Very logical.[/log]"
90001260-188 = "[56cd7b][log=모니터]In other words, things you have touched, are touching, and will touch[/log]"
90001260-190 = "[56cd7b][log=모니터]are things that even we have yet to touch.[/log]"
90001260-192 = "[56cd7b][log=모니터]Do you understand? So don't go touching things willy-nilly.[/log]"
90001260-194 = "[ns5] \"You didn't do any test runs...\"\n[ns6] \"...to make sure it worked?\""
90001260-197 = "[56cd7b]In other words, things you have touched, are touching, and will touch"
90001260-198 = "[56cd7b]are things that even we have yet to touch."
90001260-199 = "[56cd7b]Do you understand? So don't go touching things willy-nilly."
90001260-200 = "Did these people have brains?!"
90001260-202 = "[56cd7b][log=모니터]You have permission to enter up to zone 3, the control facility. However, you must[/log]"
90001260-204 = "[56cd7b][log=모니터]undergo the advisory committee's standard procedures to enter the second seed vault.[/log]"
90001260-207 = "[56cd7b][log=모니터]After all, that very important facility is responsible for the storage of 70%[/log]"
90001260-209 = "[56cd7b][log=모니터]of all the seeds. If you try to damage that facility, or force your way in...[/log]"
90001260-211 = "[56cd7b][log=모니터]even if it comes at the cost of the rest of the facilities, the mainframe will...[/log]"
90001260-214 = "[56cd7b][log=모니터]I ran out of coffee months ago, so I'm drawing a blank here.[/log]"
90001260-217 = "[56cd7b][log=모니터]Just think of something horrifying for yourself. [/log]"
90001260-219 = "[56cd7b][log=모니터]Something that you don't want happening to you.[/log]"
90001260-221 = "U-Uh... So... Deleting my save data?"
90001260-223 = "[56cd7b][log=모니터]Yes. That. We'll do that to you.[/log]"
90001260-225 = "[56cd7b][log=모니터]Whatever the expression was, thank you for your help.[/log]"
90001260-227 = "[56cd7b][log=모니터]So please, do not touch the second storage.[/log]"
90001260-230 = "[56cd7b][log=모니터]Although, I will say, it's a shame you won't get to see inside the second storage.[/log]"
90001260-232 = "[56cd7b][log=모니터]Unlike zone 3, it's much cleaner and more properly built.[/log]"
90001260-235 = "[56cd7b][log=모니터]We didn't want to change this zone to a storage room, but...that's just life, right?[/log]"
90001260-237 = "[56cd7b][log=모니터]Nothing goes to plan, just like how the first batch of blini always comes out ugly.[/log]"
90001260-240 = "[56cd7b][log=모니터]So let's forget about the past and do better for the next destruction![/log]"
90001260-242 = "Next...destruction?"
90001260-243 = "I cannot understand what this person is saying. Uwaaah..."
90001260-245 = "[56cd7b][log=모니터]This concludes the safety and warning notice.[/log]"
90001260-247 = "[56cd7b][log=모니터]We hope that the end of the world wasn't too painful.[/log]"
90001260-250 = "[56cd7b][log=모니터]And also.[/log]"
90001260-253 = "[56cd7b]And also."
90001260-256 = "[56cd7b]And also..."
90001260-260 = "[FF6666][log=모니터]\"Hey, is the memory at full capacity?\"[/log]"
90001260-262 = "[FF6666][log=모니터]\"The thing is...\"[/log]"
90001260-265 = "[log=모니터]End of file playback.[/log]"

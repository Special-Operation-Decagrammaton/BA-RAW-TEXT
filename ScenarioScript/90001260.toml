90001260-327 = "เหมือนมีอะไรคล้ายพายุพัดผ่านไปเลยค่ะ..."
90001260-328 = "[ns7] \"เราเข้าไปข้างในนั้นไม่ได้ใช่มั้ย?\"\n[ns8] \"เราถูกห้ามไม่ให้เข้าไปมากกว่านี้ใช่มั้ย?\""
90001260-331 = "คะ? ค่ะ ถ้าจำเป็นละก็ ทางนั้นน่าจะยอมเสียพื้นที่บางส่วน แล้วก็..."

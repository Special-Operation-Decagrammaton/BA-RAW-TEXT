90001260-333 = "ข้อมูลที่เซฟไว้... จะให้หายไม่ได้นะคะ..."
90001260-334 = "(สักวันคงต้องบ่นอาริสึให้เล่นเกมให้มันน้อยๆ หน่อยแล้วละ...)"
90001260-340 = "ไฟ... ไฟดับอีกแล้วเหรอคะ...?"
90001260-341 = "อะไรกันอีกคะเนี่ย...?"
90001260-342 = "มะ... มืดตึ๊ดตื๋อเลย! มองอะไรไม่เห็นเลยค่ะ...!"
90001260-343 = "อยู่ใกล้ๆ ฉันไว้นะคะ อาริสึ!"
90001260-344 = "เหมือนมีสัญญาณอะไรเลย...?"
90001260-345 = "...!"
90001260-349 = "สะ... สวัสดี... ค่ะ คุณครู และทุกคน... ได้เจอกันอีกแล้วนะคะ แหะๆๆ..."
90001260-350 = "เชื่อเขาเลย ไม่คิดจะเหนื่อยหรือยอมแพ้กันเลยสินะ"
90001260-351 = "นั่นสิคะ ถ้าปล่อยทุกอย่างสบายๆ ก็น่าจะดีต่อทั้งสองฝ่ายแท้ๆ"
90001260-352 = "[s9] \"นี่ละจรรยาบรรณในการทำงาน\"\n[s10] \"คนเป็นครูไม่ละทิ้งนักเรียนหรอก\""
90001260-356 = "ฮึ่ย แต่ถ้าพวกฉันเป็นนักเรียน ก็จะทิ้งกันใช่มั้ยล่ะ?"
90001260-357 = "[s11] \"ใครบอก? อยากย้ายโรงเรียนมามั้ยล่ะ?\"\n[s12] \"ครูเตรียมเอกสารย้ายโรงเรียนไว้ให้แล้ว ถ้าสนใจก็ติดต่อมาล่ะ\""
90001260-363 = "โห... ไม่คิดเลยนะว่าจะตอบแบบนี้..."
90001260-365 = "คะ... คนแบบนี้... นี่ใช่ไหมคะที่เรียกกันว่าคนที่แก้ไขอะไรไม่ได้...?"
90001260-366 = "แต่ก็น่าเสียดายนะคะ พวกฉันไม่มีความคิดแบบนั้นหรอกค่ะ"
90001260-367 = "เรื่องย้ายโรงเรียนหรืออะไรนั่นน่ะ ทุกอย่างคือระบบของพวกมนุษย์ไม่ใช่เหรอคะ? มันไม่ใช่เรื่องที่พวกฉันต้องรู้หรอกค่ะ"
90001260-369 = "[ns13] \"แต่ก็ดีใจนะที่วันนี้ได้เจอกัน\"\n[ns14] \"แต่พอได้เจอกันอีกแบบนี้ก็น่าดีใจนะ\""
90001260-372 = "จะพูดจาหน้าไม่อายไปถึงไหนเนี่ย คุณครูคนนี้..."
90001260-373 = "เอาเถอะ พวกฉันจะให้โอกาสเป็นครั้งสุดท้าย เพราะถ้าผ่านตรงนี้ไปได้ ก็จะไม่มีทางกลับไปได้แล้ว"
90001260-374 = "ใช่ค่ะ นี่เหมือนการข้ามเส้นมาแล้วน่ะค่ะ ถ้าข้ามมาแล้วก็ต้องไปให้สุด ถูกมั้ยล่ะคะ?"
90001260-376 = "ถ้าจะให้พูดอย่างที่ซอฟชอบพูด... นี่ก็คงเรียกว่าการเตือนครั้งสุดท้ายค่ะ"
90001260-378 = "ตอนต่อไป;ชีวิตและจิตสำนึก"

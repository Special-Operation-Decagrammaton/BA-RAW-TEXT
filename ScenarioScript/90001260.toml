[translation]
90001260-1 = "ตอนที่ 26;สิ่งที่ซ่อนอยู่"
90001260-2 = "[ns] \"ที่นี่... เหมือนจะเป็นห้องสุดท้ายเลยนะ?\""
90001260-3 = "ตะ... แต่ว่า... สภาพมันดูไม่จืดเท่าไรนะคะ..."
90001260-4 = "ตรงนี้... มีน้ำนองอยู่ด้วย? นอกจากมอสส์แล้วยังมีไม้เลื้อยอีก"
90001260-5 = "ถ้าคลังเก็บเมล็ดพันธุ์อยู่ในสภาพนี้ ก็คงถูกทิ้งร้างไว้นานแล้วละ"
90001260-6 = "ดูสิคะ รุ่นพี่ริโอะ! รุ่นพี่ฮิมาริ! ผนังเป็นลิ้นชักทั้งหมดเลยค่ะ!"
90001260-8 = "นั่นสินะคะ ขอเข้าไปดูหน่อยนะ อืม..."
90001260-11 = "น่าทึ่งเลยนะคะ เมล็ดพันธุ์อยู่ในสภาพดีเลยค่ะ"
90001260-12 = "ถึงประธานริโอะจะบอกว่าที่นี่สภาพไม่ดี แต่ถ้าดูจากบรรยากาศแล้วก็รู้สึกว่าที่นี่คือคลังเก็บเมล็ดพันธุ์#nจริงๆ นะ มีสีเขียวอยู่ทุกที่เลย"
90001260-13 = "นั่นสิคะ ที่นี่เหมือนกับที่ซ่อนในส่วนลึกที่สุด... ที่เป็นที่สถิตของเทพเจ้าแห่งพงไพรที่มีลักษณะคล้าย#nกวาง... ที่อยู่ในเรื่องราวโบราณเลยค่ะ"
90001260-14 = "สิ่งปลูกสร้างแห่งนี้มีโครงสร้างปิดผนึก 3 ชั้นสินะคะ"
90001260-16 = "อืม ถึงตัวอาคารและพื้นที่จัดเก็บจะได้รับความเสียหาย แต่ผนังด้านในสุด... หรือก็คือที่เก็บเมล็ดพันธุ์#nดูเหมือนว่าจะใช้งานได้ตามปกตินะ"
90001260-17 = "อย่างนี้นี่เอง นี่สินะคะเทคโนโลยีของมิลเลเนียม"
90001260-18 = "น่าจะไม่ใช่ทั้งหมดหรอก"
90001260-20 = "หมายความว่ายังไงเหรอคะ ริโอะ?"
90001260-21 = "ตามบันทึกแล้ว AI ที่ถูกเปลี่ยนให้เป็นผู้เลื่อมใสมักแสดงพฤติกรรมที่แตกต่างออกไปจากพฤติกรรม#nเดิมของตัวเอง"
90001260-22 = "อย่างเช่น HOD ที่เดิมทีแล้วเป็น AI หน่วยก่อสร้างเครือข่ายของมิลเลเนียม แต่ตอนนี้ต่างออกไป#nอย่างสิ้นเชิงเลย"
90001260-23 = "นั่นสินะคะ ชอกมาห์เองก็เคยเป็นเรือ แต่ตอนนี้เราคงเรียกรูปลักษณ์นั้นว่าเรือไม่ได้แล้วค่ะ"
90001260-24 = "แต่ AI ของคลังเก็บเมล็ดพันธุ์ที่ตอนนี้น่าจะชื่อว่าทิฟาเร็ธ"
90001260-25 = "ต่อให้ถูกเปลี่ยนไปเป็นผู้เลื่อมใส แต่ก็ยังพยายามจะทำหน้าที่รักษาเมล็ดพันธุ์อยู่... เหมือนกับว่ามัน#nกำลังแสดงเจตจำนงบางอย่างอยู่อย่างนั้นละ"
90001260-26 = "ไม่อย่างนั้นเมล็ดพันธุ์พวกนี้คงไม่อยู่ในสภาพดีขนาดนี้หรอก ว่ามั้ยล่ะคะ?"
90001260-27 = "อืม จากสมมติฐานแบบนั้น ฉันมีคำถามอยู่คำถามหนึ่ง"
90001260-28 = "ความตั้งใจที่จะเก็บรักษาเมล็ดพันธุ์ต่อไป... คือความตั้งใจของเด็กๆ สามคนนั้น หรือว่าเป็นของทิฟาเร็ธ#nกันแน่?"
90001260-29 = "ถ้าฉันบอกว่าทิฟาเร็ธ จะคิดว่ายังไงเหรอคะ?"
90001260-30 = "ถ้าเป็นอย่างนั้น... ฉันก็จะตั้งสมมติฐานว่าพวกผู้เลื่อมใสเองก็คงจะมีอัตลักษณ์และความเป็นตัวตน#nของตัวเอง"
90001260-31 = "และถ้าอนุมานต่อไปอีกละก็..."
90001260-37 = "......?!"
90001260-38 = "นี่มัน...!?"
90001260-46 = "ระ... รุ่นพี่ริโอะ?! รุ่นพี่ฮิมาริ!?"
90001260-47 = "โมโมอิ? มิโดริ? แล้วก็ทุกคนด้วย...? นะ... นี่มันอะไรกันคะ??!!"
90001260-48 = "เอ๋? จะว่าไปก็... มีกลิ่นอะไรแปลกๆ ก็ไม่รู้ค่ะ... อึก... อาริสึรู้สึกไม่ดีเลยค่ะ... "
90001260-49 = "คุณครู? คุณครูเป็นยังไงบ้างคะ? คุณครู?!"
90001260-57 = "(เบื้องหน้ามืดลงในทันใด...)"
90001260-58 = "(คุณครูรู้สึกเวียนหัว แต่ก็อยากหลับสบายไปแบบนี้เลย...)"
90001260-64 = "ตั้งสติก่อนค่ะ คุณครู!!!"
90001260-65 = "[ns1] \"อะโรน่า...? พลาน่า...?\"\n[ns2] \"ถ้าเช้าแล้วปลุกครูหน่อยนะ... งืม...\""
90001260-68 = "รุ่นพี่อะโรน่า แบบนี้มัน..."
90001260-69 = "ไม่เป็นไรค่ะ พลาน่าจัง! จากนี้ไปอะโรน่าจะจัดการให้เองค่ะ!"
90001260-70 = "รบกวนด้วยนะคะ รุ่นพี่อะโรน่า ฉันยังไม่ชินกับสถานการณ์แบบนี้สักที..."
90001260-71 = "ถึงจะยังไม่แน่ใจ แต่นี่มันเหมือน... แก๊สบางอย่างเลยค่ะ! แต่มันจะเข้าสู่ร่างกายของคุณครูได้มากกว่า#nนี้ไม่ได้แล้วค่ะ!"
90001260-72 = "กำลังวิเคราะห์... ไร้สีสัน ไร้กลิ่น เป็นสารออกฤทธิ์ต่อระบบประสาท แต่มันค่อนข้างอ่อนค่ะ"
90001260-73 = "มันไม่เป็นอันตรายต่อชีวิตกับคุณนักเรียนคนอื่นๆ เหมือนกันค่ะ ต่อให้ในกรณีที่ร้ายแรงที่สุด แค่นอนหลับแล้วตื่นขึ้นมาก็จะหายค่ะ"
90001260-74 = "แต่ก็ระวังอย่าไปสัมผัสกับแก๊สนั่นเป็นเวลานานนะคะ สารออกฤทธิ์ทุกชนิดล้วนมีความเป็นพิษในตัวค่ะ"
90001260-75 = "แหะๆๆ พอพูดถึงเรื่องนอนหลับแล้ว ทางนี้เองก็อยากนอนบ้างนะคะ..."
90001260-76 = "รุ่นพี่อะโรน่า ถ้าพวกเราหลับไปด้วยละก็..."
90001260-77 = "ละ... ล้อเล่นค่ะ! พลาน่าจังนี่ละก็ ฉันไม่มีทางทำแบบนั้นอยู่แล้วค่ะ"
90001260-78 = "ยอมรับค่ะ ในช่วงเวลาแบบนี้ รุ่นพี่อะโรน่าก็พอเชื่อถือได้อยู่ค่ะ"
90001260-79 = "แหะๆๆ 'พอเชื่อถือได้อยู่' งั้นเหรอคะ? พลาน่าจัง..."
90001260-80 = "อ๊ะ คุณครู! คุณเคย์กำลังเข้ามาค่ะ!"
90001260-82 = "[ns] \"เคย์เหรอ?\""
90001260-83 = "คุณครูปลอดภัยดีสินะคะ โล่งอกไปทีค่ะ"
90001260-84 = "แต่ก็แปลกจังเลยนะคะ กับฉันน่ะไม่ต้องสงสัยอยู่แล้ว แต่ทำไมคุณครูถึงไม่เป็นอะไรล่ะคะ?"
90001260-85 = "แง! ค่อยยังชั่วที่คุณครูปลอดภัยนะคะ แต่สหายคนอื่นๆ นี่สิ... อาริสึเป็นห่วงทุกคนค่ะ!"
90001260-86 = "อืม ข้อแตกต่างระหว่างคุณครูกับคนอื่น.."
90001260-88 = "(เอ๋ หรือว่าจะเป็น...?)"
90001260-90 = "แงงง... นี่เป็นอีเวนต์ลดสเตตัสค่ะ... อาริสึปกป้องสหายเอาไว้ไม่ได้ ก็เลยอดได้รับบัฟค่ะ... "
90001260-91 = "ถ้าเป็นแบบนี้ อาริสึจะใช้พลังได้ไม่ 100% ค่ะ!"
90001260-93 = "[ns] \"คนอื่น... หลับกันหมดเลยเหรอ?\" "
90001260-94 = "คะ? ค่ะ ใช่ค่ะ ชีพจรยังเป็นปกติอยู่"
90001260-95 = "แต่การที่ต้องมาติดแหงกกันอยู่ที่นี่แบบนี้มันไม่ใช่เรื่องดีเลย แล้วตอนนี้เราก็มีเวลาไม่มากแล้วด้วยค่ะ"
90001260-96 = "งั้นฉันจะขอเข้าเรื่องเลยนะคะ คุณครู เมื่อกี้นี้... ฉันเจอบางอย่างที่คล้ายกับหน้าจอสัมผัสที่กลางคลัง#nเก็บเมล็ดพันธุ์ค่ะ"
90001260-98 = "ฉันพยายามกดนู่นนี่ดูแล้ว แต่ก็ไม่มีอะไรเกิดขึ้น ก็เลยไปขอร้องกับอาริสึ..."
90001260-99 = "ตอนอาริสึไปแตะ หน้าจอมันเหมือนจะเปิดติด แต่ก็ไม่ติดค่ะ... ระ... หรือเป็นเพราะเลเวลของอาริสึ#nลดลงเหรอคะ?"
90001260-101 = "แต่กับคนอื่นๆ ที่หลับกันอยู่ก็เหมือนกันค่ะ..."
90001260-102 = "น่าจะเพราะสหายคนอื่นก็เจออีเวนต์ลดเลเวลไปเหมือนกันค่ะ... อาริสึมีลางสังหรณ์แบบนั้นค่ะ..."
90001260-103 = "ฉันไม่แน่ใจว่าอาริสึหมายความอย่างนั้นจริงๆ หรือแค่เปรียบเทียบ แต่ยังไงพวกฉันก็น่าจะต้องขอร้อง#nคุณครูแล้วละค่ะ"
90001260-104 = "นั่นก็เพราะว่าในหมู่พวกเรา... คุณครูดูไม่ได้รับผลกระทบอะไรมากที่สุดแล้วค่ะ"
90001260-105 = "[s3] \"ได้สิ... แต่กับคนอื่น เคย์จังจับมือพวกเธอแตะเองเหรอ?\"\n[s4] \"ได้สิ... แต่เพื่อนคนอื่นโดนจับมือมาแตะจอระหว่างหลับเหรอ?\""
90001260-108 = "ทำไมคะ? ฉันทำแบบนั้นไม่ได้เหรอคะ? มันคือการทดลองทางวิทยาศาสตร์นะ"
90001260-109 = "อะ... อาริสึก็อยากห้ามอยู่หรอกค่ะ... แง!"
90001260-110 = "จะให้พวกเราไปขอโทษทุกคนทีหลังเหรอคะ? แต่ฉันว่าริโอะน่าจะยอมรับว่านั่นเป็นการกระทำที่สมเหตุ#nสมผลนะ"
90001260-112 = "[ns] \"ฟังดูแล้วมันก็น่าจะจริงนะ...\""
90001260-114 = "(คุณครูวางมือลงบนหน้าจอสัมผัสตามที่เคย์ขอร้อง)"
90001260-115 = "(ทันใดนั้น...!)"
90001260-122 = "[ns] \"หืม...?!\""
90001260-123 = "สัญลักษณ์ของสถาบันสหภาพเรดวินเทอร์นี่นา?! ทำไมมาอยู่ตรงนี้ได้ล่ะ...?"
90001260-127 = "(ขณะนั้นเสียงเพลงที่ไพเราะและรื่นเริงก็ดังออกมา)"
90001260-128 = "(ตามด้วยเสียงพูดที่เป็นมิตรแต่ก็ฟังดูเหมือนเครื่องจักร...!)"
90001260-130 = "[56cd7b][log=모니터]ยินดีต้อนรับค่ะ สหาย [wa:500]หรืออาจจะไม่ใช่สหายก็ได้[/log]"
90001260-132 = "[56cd7b][log=모니터]ยินดีต้อนรับสู่คลังเก็บเมล็ดพันธุ์ของเรดวินเทอร์ค่ะ[/log]"
90001260-134 = "[ns] \"นี่มัน... อะไรกันเนี่ย?\""
90001260-135 = "[56cd7b]ยินดีต้อนรับค่ะ สหาย หรืออาจจะไม่ใช่สหายก็ได้"
90001260-136 = "[56cd7b]ยินดีต้อนรับสู่คลังเก็บเมล็ดพันธุ์ของเรดวินเทอร์ค่ะ"
90001260-137 = "เหลือเชื่อเลย... นี่คงเป็นระบบจัดการของที่นี่น่ะค่ะ"
90001260-139 = "[56cd7b][log=모니터]ที่แห่งนี้คือแหล่งกำเนิดชีวิตทั้งหมดที่เตรียมไว้เพื่อรับมือกับการล่มสลายที่จะเกิดขึ้น[/log]"
90001260-141 = "[56cd7b][log=모니터]ประกายไฟสุดท้ายที่ทิ้งไว้โดยอารยธรรมของมนุษย์ที่ครั้งหนึ่งเคยรุ่งโรจน์[/log]"
90001260-144 = "[56cd7b][log=모니터]ฉันอยากร้องเพลงที่ชอบที่สุดให้ฟังเพื่อเป็นการต้อนรับและเปลี่ยนบรรยากาศ[/log]"
90001260-146 = "[56cd7b][log=모니터]แต่เพลงนั้นดันถูกกำหนดให้เป็นเพลงต้องห้ามไปเมื่อวันก่อน งั้นต้องขอข้ามไปนะคะ[/log]"
90001260-148 = "[ns] \"สมกับที่เป็นเรดวินเทอร์เลย...\""
90001260-149 = "[56cd7b][log=모니터]คลังเก็บเมล็ดพันธุ์แห่งนี้เป็นสถานที่ที่สร้างขึ้นเพื่อพวกคุณในตอนนี้ และพวกเรา 'ในตอนนี้' ด้วยค่ะ[/log]"
90001260-152 = "[56cd7b][log=모니터]นั่นก็เพราะพวกเราทำให้ทุกคนวางใจว่า[/log]"
90001260-154 = "[56cd7b][log=모니터]'ถ้ามีสิ่งนี้ ต่อให้โลกล่มสลายก็ยังเริ่มใหม่ได้' ค่ะ[/log]"
90001260-157 = "[56cd7b][log=모니터]มันทำให้เราไม่ต้องเปลี่ยนแปลงอะไร และไม่ต้องหวาดกลัวกับสิ่งใดด้วยค่ะ[/log]"
90001260-159 = "[56cd7b][log=모니터]แม้ว่าก้าวแห่งการปฏิวัติที่ไม่ยอมอ่อนข้อของพวกเรา[/log]"
90001260-161 = "[56cd7b][log=모니터]จะไม่อาจปฏิเสธการมาถึงของการล่มสลายได้ก็เถอะค่ะ[/log]"
90001260-164 = "[56cd7b][log=모니터]แต่สุดท้ายมันก็ทำให้ฉันได้พบกับคุณ โชคชะตาช่างเป็นสิ่งที่น่าสนใจจริงๆ นะคะ[/log]"
90001260-166 = "อะ... อาริสึ ไม่ค่อยเข้าใจเลยค่ะ... คนคนนี้คือ NPC ของที่นี่เหรอคะ...?"
90001260-168 = "[56cd7b][log=모니터]การสร้างสิ่งปลูกสร้างแห่งนี้ลำบากไม่ใช่เล่นเลยค่ะ[/log]"
90001260-170 = "[56cd7b][log=모니터]เราต้องเตรียมงบประมาณก่อสร้าง จนถึงกับต้องเอาน้ำผสมในพุดดิ้งเลยละ[/log]"
90001260-173 = "[56cd7b][log=모니터]หวังว่าผู้สืบทอดของเราจะไม่ทำเรื่องที่น่าสิ้นหวังแบบนั้นนะคะ[/log]"
90001260-176 = "[56cd7b][log=모니터]แต่ดูเหมือนว่าการล่มสลายจะมาถึงแล้ว ความพยายามของเราคงสัมฤทธิ์ผลแล้วสินะคะ[/log]"
90001260-178 = "จริงๆ เลย พูดถึงการล่มสลายโดยไม่สะทกสะท้านเกินไปหรือเปล่าคะ? ฟังแล้วไม่สบอารมณ์เลยค่ะ..."

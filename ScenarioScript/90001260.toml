90001260-83 = "3;케이 AMAS;02;아, 무사하셨군요. 다행입니다.\n#3;em;[반응]"
90001260-84 = "3;케이 AMAS;04;그런데 이상하네요. 저는 그렇다 치고 왜 선생님만 괜찮은 걸까요?"
90001260-85 = "5;아리스 동복;08;끄앙! 선생님이 무사해서 다행이지만, 다른 동료분들이 걱정입니다……!\n#5;al\n#5;em;[속상함]\n#3;m1"
90001260-86 = "3;케이 AMAS;23;으음, 선생님과 다른 사람들의 차이라면……."

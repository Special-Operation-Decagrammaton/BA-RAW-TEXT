90001260-46 = "3;아리스 동복;04;리, 리오 선배?! 히마리 선배!?\n#3;em;[?!]\n#3;shake"
90001260-47 = "3;아리스 동복;08;그리고 모모이? 미도리? 다른 모두도……? 어, 어떻게 된 건가요??!!"
90001260-48 = "3;아리스 동복;04;어라, 그러고 보니 무언가…… 이상한 냄새가 납니다…… 우우…… 아리스, 뭔가 기분이 좋지 않습니다……. \n#3;stiff"

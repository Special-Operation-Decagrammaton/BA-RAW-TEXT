[translation]
10009090-1 = "Afterword; Security Measures"
10009090-3 = "Of course, the central tenet of security is to limit the approach."
10009090-8 = "But to create a system with wide-ranging success, you must fulfill three conditions: confidentiality, integrity, and availability."
10009090-9 = "Confidentiality means only those with authorization can use the system. Integrity means the system is kept free of false information. And availability means when an authorized person requests information from the system, they receive it."
10009090-10 = "It's said that these three concepts were known even in ancient civilizations. Isn't that interesting?"
10009090-11 = "Anyway, the first thing that comes to mind when we say \"integrity\" is encryption."
10009090-12 = "There are three standard types of encryption, determined by cryptographic block size:128, 192, and 256-bits."
10009090-13 = "To improve our security policy, let's use 256-bit encryption as our standard from now on."
10009090-14 = "Our security algorithm can be roughly divided into four stages."
10009090-21 = "In the first step, we take one 256-bit password key, and create multiple 128-bit round keys to be used in subsequent rounds."
10009090-22 = "Next, round 0. We use the first round key and run it through the security algorithm once."
10009090-23 = "The procedure for rounds 1 through 13 is the same. Here, we activate the four-stage security protocols using a four row standard. We repeat this 13 times."
10009090-24 = "Lastly, round 14... We use all of the security keys one more time to complete the encryption."
10009090-26 = "People say that in a fight between someone trying to break into a system and someone trying to stop them, the one trying to break in usually wins."
10009090-27 = "But that saying is out of date. With recent advancements in the technology and science of security, we have succeeded in creating nearly equal footing for both sides."
10009090-28 = "Chihiro kept talking to increasingly glazed expressions."
10009090-29 = "Er... All we wanted to know is how the door could be unlocked... That's it."
10009090-30 = "Hm? Unlocking it is impossible, unless you rip the whole door off its hinges!"
10009090-35 = "..."
10009090-36 = "Hm... So the facility's still pretty old. How quaint!"
10009090-41 = "They've updated the system a bit. That electronic door lock is new. But the door's hinges are still loose."
10009090-42 = "Heeheehee... How foolish they are, to think they can trap me!"
10009090-49 = "Now that we've ripped the whole door off its hinges, should we get out of here?"
10009090-55 = "Heeheehee..."
10009090-56 = "You won't get away this time!"

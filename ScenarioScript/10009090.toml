[translation]
10009090-1 = "ย้อนวันวาน;มาตรการรักษาความปลอดภัย"
10009090-3 = "หัวใจหลักของการรักษาความปลอดภัย สุดท้ายแล้วก็คือการจำกัดการเข้าถึงยังไงล่ะ"
10009090-8 = "หลักๆ แล้วจะต้องมีให้ครบ 3 เงื่อนไขคือ การรักษาความลับ ความสมบูรณ์ และความพร้อมใช้งาน"
10009090-9 = "ถ้าไม่มีคุณสมบัติในการเข้าถึงก็จะไม่แสดงข้อมูล ถ้าเป็นข้อมูลที่ผิดพลาดก็จะไม่นำมาจัดการ แต่ถ้าเป็นคนที่มีคุณสมบัติครบถ้วนร้องขอข้อมูล ก็จะจัดส่งให้"
10009090-10 = "ได้ยินมาว่าความคิดแบบนี้มีมาตั้งแต่ในสมัยก่อนแล้ว"
10009090-11 = "และวิธีการเข้ารหัสคือวิธีที่ง่ายที่สุดสำหรับตรวจสอบความสมบูรณ์..."
10009090-12 = "และจะแบ่งออกเป็น 3 ประเภทคือ 128, 192 และ 256 บิต ตามขนาดของบล็อกรหัส"
10009090-13 = "และในอนาคต เราก็จะปรับปรุงนโยบายความปลอดภัยให้กลายเป็น 256 บิต"
10009090-14 = "อัลกอริทึมของระบบรักษาความปลอดภัยนี้ประกอบด้วย 4 ขั้น"
10009090-21 = "ขั้นแรก เรานำคีย์เข้ารหัสหลักที่มีขนาด 256 บิตมาและสร้างราวด์คีย์ขนาด 128 บิตหลายๆ อัน"
10009090-22 = "ต่อไปคือ \"ราวด์ 0\" ใช้ราวด์คีย์อันแรกที่สร้างขึ้นเพื่อลองรันอัลกอริทึมระบบความปลอดภัย"
10009090-23 = "แล้วจากนั้นก็รันระบบตั้งแต่ราวด์ที่ 1 ถึงราวด์ที่ 13 ตอนนี้ก็จะทำการรันโปรโตคอลรักษาความปลอดภัย 4 ขั้นตอนตามควอเทอร์เนรีแมทริกซ์ตามลำดับซ้ำไป 13 รอบ"
10009090-24 = "และในรอบสุดท้าย ราวด์ 14... ก็จะรันคีย์แต่ละอันอีกครั้งตามลำดับ ก็จะเข้ารหัสเรียบร้อย"
10009090-26 = "ว่ากันว่าการต่อสู้กันระหว่างผู้ที่พยายามจะเจาะเข้ามาและผู้ที่พยายามขัดขวางจะจบลงด้วยชัยชนะ#nของผู้ที่พยายามเจาะเข้ามา..."
10009090-27 = "ความก้าวหน้าของวิทยาศาสตร์และเทคโนโลยีเองก็ส่งผลต่อขอบเขตงานระบบความปลอดภัยด้วย ซึ่งมันนำไปสู่ผลลัพธ์ที่ทั้งสองฝ่ายสูสีกัน"
10009090-28 = "(จิฮิโระเริ่มร่ายยาวในเรื่องที่ฟังไม่เข้าใจไปเรื่อยๆ...)"
10009090-29 = "คือว่า... เรื่องที่พวกเราอยากรู้ก็คือจะต้องทำยังไงถึงจะปลดล็อกรหัสพวกนั้นได้น่ะค่ะ..."
10009090-30 = "อืม... ถ้าไม่พังประตูทั้งบานก็คงจะปลดล็อกไม่ได้หรอกมั้ง?"
10009090-35 = "..."
10009090-36 = "อุปกรณ์ เครื่องมือยังคงดูเก่าเหมือนเดิมไม่เปลี่ยนเลยนะคะ..."
10009090-41 = "แต่ดูเหมือนระบบรักษาความปลอดภัยจะปรับปรุงขึ้นนิดหน่อยนะคะ ดูเหมือนจะเปลี่ยนประตูล็อกไฟฟ้า#nด้วย แต่ช่วงบานพับจะหลวมไปสักหน่อย..."
10009090-42 = "ฮุฮุฮุ... ช่างโง่เขลาจริงๆ นะคะที่คิดว่าของพรรค์นี้จะหยุดฉันได้..."
10009090-49 = "เอาละ... ในเมื่อพังประตูเรียบร้อยแล้ว ออกไปเลยดีมั้ยคะ?"
10009090-55 = "ฮุฮุฮุ..."
10009090-56 = "หนีฉันไม่พ้นหรอกนะคะ!"

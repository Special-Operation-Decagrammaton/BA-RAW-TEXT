[translation]
10009090-1 = "後日談其二;安全措施"
10009090-3 = "說到安全系統的關鍵，果然還是進入的權限吧。"
10009090-8 = "大致上來說，需要滿足三個要件。#n機密性、完整性與可用性。"
10009090-9 = "讓不具資格的人無法通過。#n簡單來說就是忽略錯誤的密碼，只讓輸入正確密碼的對象得以通過。"
10009090-10 = "據說類似的概念在古代就已經出現。"
10009090-11 = "此外，確保高度「完整性」的手段便是「加密化」──"
10009090-12 = "最常採用的加密區塊長度有128、192、256位元三種。"
10009090-13 = "我認為往後會以256位元為基準改善安全政策。"
10009090-14 = "這個加密演算法需經過四個步驟來成立──"
10009090-21 = "首先，由256位元的主金鑰，生成各輪中需要使用的數個128位元的回合金鑰──"
10009090-22 = "接著進入第0輪。#n使用第一個回合金鑰，執行一次加密演算法。"
10009090-23 = "此時，以四階矩陣為基礎的四階段安全協議會依序執行，#n從第1輪到第13輪為止共執行13次。"
10009090-24 = "而最後的第14輪，則會再次依序執行目前為止的安全金鑰，完成加密化。"
10009090-26 = "不過，儘管如此……攻擊方與防禦方之間的對決，幾乎都是攻擊方會獲得勝利。"
10009090-27 = "科學與技術的發展也會影響到安全的領域，#n最終會讓雙方處於對等的關係。"
10009090-28 = "（千尋漸漸進入了自己的世界──）"
10009090-29 = "那個……那種複雜的事情我不太理解，#n但是……有沒有什麼解除的方法……？"
10009090-30 = "唔嗯，除非以物理方式破壞入口，否則應該不可能吧？"
10009090-35 = "……"
10009090-36 = "依然是個老舊的設施呢……"
10009090-41 = "啊啊不過，安全系統好像改善了呢。#n門鎖也換新了──然而，關鍵的絞鍊卻破破爛爛的。"
10009090-42 = "……真是破綻百出。#n唔呵呵，這種程度就想阻止我嗎？"
10009090-49 = "那麼……門也開了，這就出發吧？"
10009090-55 = "唔呵呵♡"
10009090-56 = "別想逃出我的手掌心……！"

10009090-18 = "#wait;500"
10009090-19 = "#zmc;instant;600,200;2000\n#all;hide"
10009090-20 = "#zmc;instant;600,200;2000\n#wait;1500"
10009090-21 = "#zmc;instant;600,200;2000\n#na;치히로;우선은 256비트 길이인 하나의 주 암호화 키를 받아서, 라운드들에서 사용할 여러 개의 128비트 라운드 키를 생성하지."
10009090-22 = "#zmc;instant;600,200;2000\n#na;치히로;다음은 0라운드. 라운드 키 중 첫 번째 키를 사용, 보안 알고리즘을 한 번 실행해."
10009090-23 = "#zmc;instant;600,200;2000\n#na;치히로;그리고 1라운드에서 13라운드까지의 과정. 여기에서는 4차 행렬을 기반으로 한 보안 프로토콜 4단계를 순서대로 실행하지. 이걸 13번 반복하게 돼."
10009090-24 = "#zmc;instant;600,200;2000\n#na;치히로;그리고 마지막 14번째 라운드…… 지금까지의 보안 키를 순서대로 다시 한번 실행해 암호화를 마치게 되지."
10009090-25 = "3;치히로;00\n#3;a"
10009090-26 = "3;치히로;02;뚫으려는 자와 막으려는 자 사이의 대결은, 대개 뚫으려는 자의 승리로 끝난다고 하지만.\n#3;em;…"
10009090-27 = "3;치히로;03;과학과 기술의 발전은 보안의 영역에도 영향을 끼쳤고, 결과적으로 둘을 거의 대등한 관계로 만드는 데까지 성공한 거야."
10009090-28 = "#na;(점점 아무도 알 수 없는 이야기를 하기 시작한 치히로였다.)"
10009090-29 = "3;치히로;03\n1;발키리 학생;04;저기, 저희가 알고 싶은 것은, 그걸 해제하기 위해서는 어떤 일을 어떻게 해야 하는가, 정도입니다만……\n#1;ar\n#1;em;[땀]\n#3;m5\n#3;h"
10009090-30 = "3;치히로;99;글쎄? 문을 통째로 뜯어내기라도 하지 않는 한 불가능하지 않을까?"

10009090-7 = "3;치히로;00\n#3;a\n#wait;1000"
10009090-8 = "3;치히로;02;크게 보아서, 세 가지 조건을 충족시켜야 해. 기밀성, 무결성, 가용성."
10009090-9 = "3;치히로;02;들어갈 자격이 없으면 안 보여주고, 틀린 정보는 취급하지 않으며, 들어갈 자격이 있는 사람이 보내달라고 하면 보내주는 것."
10009090-10 = "3;치히로;05;고대 사회에도 이런 개념은 이미 존재했다고 해."
10009090-11 = "3;치히로;99;이 중에서 무결성을 검사하는 데에 가장 쉽게 떠올릴 수 있는 것이 암호화인데……"
10009090-12 = "3;치히로;01;암호화 블록 크기에 따라서 128, 192, 256비트 세 종류가 표준으로 지정되어 있어."
10009090-13 = "3;치히로;02;그중에서 앞으로는 256비트를 기준으로 시큐리티 정책을 개선할 거야."
10009090-14 = "3;치히로;99;이 보안 알고리즘은 크게 네 단계로 이루어져."
10009090-15 = "#st;[0,0];instant;1;"

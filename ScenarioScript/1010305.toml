1010305-72 = "4;산해경 모브 학생 B;01;보다 본질적인 것이 무엇인가에 대해 한 번 더 생각해 보아야 한다…….\n#4;em;…"
1010305-73 = "2;산해경 모브 학생 A;01;그리고 그 과정에서 먹는 방식으로 다투는 것은 무의미하다는 것까지……!\n#2;em;…"
1010305-74 = "4;산해경 모브 학생 B;00;역시 물어보길 잘했네! \n#4;em;[음표]"

[translation]
1010305-1 = "快刀斬亂麻"
1010305-2 = "桃源鄉"
1010305-3 = "嗯，山海經的茶還真香呀。"
1010305-4 = "讓人不禁想知道用的是哪種茶葉，又是怎麼沖泡出來的呢。"
1010305-5 = "[s]「看來瑪麗娜對茶的造詣也頗深囉？」"
1010305-6 = "哈哈哈。#n雖然稱不上什麼造詣，不過我在赤冬時也經常品茶。"
1010305-7 = "我還有一種叫做茶炊的茶壺呢。"
1010305-8 = "你問那是怎樣的茶壺？#n嗯……可以在壺的中間添加燃料，持續將水加熱。"
1010305-9 = "而且因為有水龍頭的關係，倒熱水的時候也很方便哦？"
1010305-10 = "好，老師哪天蒞臨赤冬的話，就由我來招待你一杯赤冬流的紅茶吧！"
1010305-11 = "雖然那也很讓人期待，但現在是享受山海經茶的時間？"
1010305-12 = "說的也是呢。#n山海經的茶……雖然難以用言語形容，卻有種芬芳清新的感覺。"
1010305-13 = "只是我個人覺得，好像還少了點什麼……"
1010305-15 = "（某處傳來吵鬧的爭執聲）"
1010305-17 = "不是，就說月餅讓我來切了嘛。#n每次交給你切，你都會切成8塊。"
1010305-18 = "你在說什麼啊？8塊哪有問題。#n你每次都只切成4塊。"
1010305-19 = "我之前就覺得切成8塊的問題很多了，要我說幾遍你才聽得懂？"
1010305-20 = "切成4塊才能減少碎屑。#n我討厭亂糟糟的。"
1010305-21 = "最好是啦。#n月餅本身就有點厚度，切成4塊的話吃起來很不方便。"
1010305-22 = "為了充分享受茶跟月餅的滋味，#n把月餅切成8塊一口吃掉，接著再喝茶潤口是最棒的。"
1010305-26 = "……他們在討論什麼？"
1010305-27 = "[s1]「月餅是該切成4塊……還是該切成8塊……」\n[s2]「好像是在聊這件事。」"
1010305-30 = "哼嗯……？"
1010305-32 = "要切成8塊本來就不簡單。#n一不小心可能整顆月餅就毀了耶！"
1010305-33 = "那是因為你切過的月餅太少了。#n月餅本來就是又甜又油且容易膩口的食物，切越大塊越容易吃膩好不好！"
1010305-34 = "不是說得其大者可以兼其小嗎！#n嫌切太大塊的話，自己分兩次吃不就好了！"
1010305-35 = "我就是不想再自己分成兩半，所以才說要先切成8塊的啊！"
1010305-36 = "唔……再這樣下去也討論不出結果。"
1010305-37 = "咦？那邊有一群沒看過的……是外部的人嗎？"
1010305-39 = "這樣正好！第三方一定能提供客觀的意見。"
1010305-40 = "我們去問問那些人，怎麼切才能公平地吃到月餅吧！"
1010305-42 = "（就這樣，突然就被迫得判斷怎樣才是月餅公平的吃法（？）了）"
1010305-43 = "（好像很難斷定哪邊才是正確答案……）"
1010305-45 = "好，我大概知道該怎麼做了。"
1010305-46 = "[s]「瑪麗娜……？」"
1010305-48 = "（瑪麗娜毫不猶豫地站起身來，大步走向了正爭執不下的那一桌）"
1010305-51 = "恕我失禮了。"
1010305-58 = "直，直接拿起整塊月餅……！"
1010305-59 = "一口吃掉了！？"
1010305-61 = "（嚼嚼，嚼嚼）"
1010305-62 = "嗯，真好吃。"
1010305-63 = "不管用哪種吃法，月餅吃起來的味道終究是一樣的。"
1010305-64 = "何況所謂的茶點，本來是為了品茶而吃的東西。"
1010305-65 = "把茶放在一邊討論怎麼平分茶點，結果討論到茶都涼了……你們不覺得本末倒置嗎？"
1010305-66 = "呃……本末倒置這麼用是正確的嗎……？"
1010305-67 = "[s]「用法完全沒問題哦，瑪麗娜同學。」"
1010305-68 = "好！既然老師確認過，那就沒問題了！"
1010305-69 = "總之就是這麼回事。#n如果有所冒犯，還請多多包涵。"
1010305-71 = "原，原來如此……！"
1010305-72 = "要多多思考事物的本質……"
1010305-73 = "還有在過程中爭執吃法是沒有意義的……！"
1010305-74 = "有問別人的意見真是太好了！"
1010305-76 = "嗯，看到這個答案能讓你們滿意，我也很高興。"
1010305-77 = "不過，我從剛才就覺得好像少了點什麼……"
1010305-78 = "這裡有沒有果醬？#n沒有把果肉碾成泥，而是用糖醃漬的那種！"
1010305-82 = "果，果醬……！？"
1010305-83 = "明明是在喝茶！？！？"
1010305-84 = "那當然！喝茶就是要配果醬！"
1010305-85 = "先喝一口茶含在嘴裡，接著挖一匙果醬來吃……那才是真正的美味！"
1010305-86 = "雖然沒有果醬的確可惜，不過搭配方糖或白砂糖也不是不行。"
1010305-87 = "只要把它們含在嘴裡再喝茶，不只可以防止茶味變淡，又可以淺淺地嘗到甜味！"
1010305-88 = "這……這……"
1010305-89 = "這是對茶的褻瀆──！"
1010305-90 = "你，你說什麼！？"
1010305-92 = "自古以來，所謂的茶就是要喝起來順口，聞起來沒有雜味！"
1010305-93 = "顏色看起來清澈，倒茶的聲音要悅耳才對！"
1010305-95 = "什麼果醬、方糖、白砂糖通通都是歪門邪道──！"
1010305-97 = "不是，我只是分享了赤冬的品茶方法而已耶！？"
1010305-99 = "（於是山海經的學生和瑪麗娜，對於品茶方法的討論持續了很久）"
1010305-100 = "（在此期間，茶當然是全部都涼掉了……）"

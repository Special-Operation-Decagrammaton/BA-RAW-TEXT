[translation]
1010305-1 = "ใช้ปัญญาสยบปัญหา"
1010305-2 = "ร้านน้ำชานิทานดอกท้อ"
1010305-3 = "อืม ชาของซานไห่จิงมีกลิ่นหอมมากจริงๆ"
1010305-4 = "จนถึงขั้นอยากไปถามเลยละว่าใช้ใบชาอะไรและชงด้วยวิธีแบบไหน"
1010305-5 = "[s] \"มารินะเองก็มีความรู้เรื่องการชงชาด้วยเหรอเนี่ย?\""
1010305-6 = "ฮ่าฮ่าฮ่า ฉันก็ไม่ได้มีความรู้อะไรพิเศษหรอก แค่ตอนที่อยู่ที่เรดวินเทอร์ ฉันก็ดื่มชาบ่อยๆ น่ะ"
1010305-7 = "ถึงกับมีซาโมวาร์ที่เป็นกาน้ำชาโลหะด้วยนะ"
1010305-8 = "เป็นกาน้ำชาแบบไหนน่ะเหรอ? อืม... ก่อนอื่นก็จุดไฟไว้ด้านในเพื่อต้มน้ำร้อนได้อย่างต่อเนื่อง"
1010305-9 = "ที่กามีก๊อกน้ำติดอยู่ด้วยเลยสะดวกในการเทน้ำร้อนน่ะ"
1010305-10 = "อืม ถ้าคราวหน้าครูมาที่เรดวินเทอร์ ฉันจะเลี้ยงชาแดงตามแบบฉบับเรดวินเทอร์ครูเอง!"
1010305-11 = "เรื่องนั้นก็เป็นเรื่องที่น่าตั้งตารออยู่เหมือนกัน แต่ตอนนี้เป็นเวลาที่ควรดื่มด่ำกับรสชาติชาของ#nซานไห่จิงก่อนงั้นเหรอ?"
1010305-12 = "นั่นสินะ ชาของซานไห่จิง... รู้สึกเหมือน... มันบรรยายออกมาเป็นคำพูดได้ยากก็จริง แต่มันมีกลิ่นหอม#nสดชื่น..."
1010305-13 = "แต่รู้สึกว่ามีอะไรบางอย่างขาดหายไปนะ..."
1010305-15 = "(ได้ยินเสียงคนทะเลาะกันเสียงดังจากที่ไหนสักแห่ง)"
1010305-17 = "เดี๋ยวสิ ก็บอกแล้วไงว่าฉันจะตัดขนมไหว้พระจันทร์เองน่ะ ถ้าให้เธอเป็นคนตัด เธอก็จะตัดแบ่งเป็น 8 ชิ้นตลอดเลยนี่นา"
1010305-18 = "พูดอะไรของเธอ ตัดแบบนั้นมันก็ถูกแล้วนี่ เธอเองนั่นแหละที่ชอบตัดแบ่งเป็น 4 ชิ้นแล้วก็ทิ้งที่เหลือ#nไปน่ะ"
1010305-19 = "ฉันคิดเรื่องนี้มาตั้งนานแล้วว่าการตัดเป็น 8 ชิ้นมันเป็นปัญหานะ จะต้องพูดกี่ครั้งถึงจะเข้าใจ"
1010305-20 = "ถ้าตัด 4 ชิ้นมันก็จะเหลือเศษชิ้นเล็กๆ น้อยลงนะ ฉันไม่ชอบอะไรที่มันเลอะเทอะหรอกนะ"
1010305-21 = "ก็บอกว่าไม่ใช่ไงเล่า ขนมไหว้พระจันทร์มันชิ้นหนาอยู่แล้ว ถ้าตัดแบ่งเป็น 4 ชิ้น มันจะชิ้นใหญ่เกินไป กินไม่หมดในคำเดียวหรอก"
1010305-22 = "ถ้าจะให้เพลิดเพลินกับรสชาติของขนมไหว้พระจันทร์พร้อมกับการดื่มชาได้อย่างเต็มที่ ก็ควรจะหั่นเป็น 8 ชิ้นเพื่อให้กินได้ในคำเดียวและดื่มพร้อมกับชาได้สิ"
1010305-26 = "พวกเขาเถียงอะไรกันอยู่น่ะ...?"
1010305-27 = "[s1] \"เถียงกันว่าควรตัดขนมไหว้พระจันทร์เป็น 4 ชิ้นหรือ 8 ชิ้นน่ะ...\"\n[s2] \"เถียงกันเรื่องการตัดขนมไหว้พระจันทร์น่ะ\""
1010305-30 = "หืม...?"
1010305-32 = "การตัดแบ่งเป็น 8 ชิ้นมันไม่ใช่เรื่องง่ายๆ หรอกนะ ถ้าตัดพลาดก็อาจทำให้ขนมไหว้พระจันทร์เละไป#nเลยก็ได้นะ!"
1010305-33 = "นั่นเพราะเธอไม่ได้ตัดขนมไหว้พระจันทร์บ่อยๆ ต่างหาก ถึงยังไงขนมไหว้พระจันทร์ก็เป็นขนมที่มี#nผิวมัน ทำให้กัดง่ายอยู่แล้ว ถ้าตัดชิ้นพอดีคำก็จะยิ่งทำให้กินได้ง่ายขึ้นนะ!"
1010305-34 = "ชิ้นใหญ่ย่อมดีกว่าชิ้นเล็กอยู่แล้วสิ! ถ้าตัดขนมไหว้พระจันทร์เป็นชิ้นใหญ่ คนกินก็จะเอามาแบ่งเอง#nทีหลังได้นะ!"
1010305-35 = "เพราะงั้นตัดเป็น 8 ชิ้นเอาไว้เลย จะได้ไม่ต้องมาแบ่งเองทีหลังไงเล่า!"
1010305-36 = "ฮือ... ถ้าเป็นแบบนี้คงไม่ได้ข้อสรุปแน่ๆ"
1010305-37 = "เอ๋? ไม่เคยเห็นคนตรงนั้นมาก่อนเลย...? คนนอกเขตเหรอ?"
1010305-39 = "พอดีเลย! ถ้าเป็นบุคคลที่สามคงให้ความคิดเห็นที่เป็นกลางได้แน่ๆ"
1010305-40 = "ลองไปถามวิธีกินขนมไหว้พระจันทร์จากคนคนนั้นดูเถอะ!"
1010305-42 = "(หลังจากนั้น จู่ๆ ก็ตกอยู่ในสถานการณ์ที่ถูกบังคับให้ตัดสินว่าวิธีการกินขนมไหว้พระจันทร์ ที่ถูกต้อง(?) เป็นอย่างไร)"
1010305-43 = "(ถึงอาจบอกได้ยากว่าวิธีไหนคือวิธีที่ถูกต้อง แต่ว่า...)"
1010305-45 = "ดีละ ฉันรู้แล้วว่าจะต้องทำยังไง"
1010305-46 = "[s] \"มารินะ...?\""
1010305-48 = "(มารินะลุกขึ้นและเดินไปที่โต๊ะของคนที่เถียงกันอยู่โดยไม่ลังเล)"
1010305-51 = "งั้นก็ขอเสียมารยาทหน่อยนะ"
1010305-58 = "ยะ... หยิบขนมไหว้พระจันทร์ขึ้นในครั้งเดียว...!"
1010305-59 = "กินหมดในคำเดียวเลยเรอะ?!"
1010305-61 = "(ง่ำๆ ง่ำๆ)"
1010305-62 = "อืม อร่อยดี"
1010305-63 = "ยังไงขนมไหว้พระจันทร์ก็ยังรสชาติดีเหมือนเดิม"
1010305-64 = "สำหรับขนมที่กินระหว่างดื่มชาแล้ว ก็เป็นสิ่งที่กินเพื่อให้เพลิดเพลินกับการดื่มชานะ"
1010305-65 = "ระหว่างที่ถกเถียงถึงวิธีตัดแบ่งขนมอยู่ และทิ้งให้ชาในถ้วยเย็นชืดโดยไม่สนใจแบบนี้ มันเหมือนกับคำ#nกล่าวว่า 'หัวมังกุท้ายมังกร' นะ?"
1010305-66 = "เอ่อ... สำนวนนั้นมันใช้ได้กับเรื่องแบบนี้รึเปล่านะ...?"
1010305-67 = "[s] \"พูดได้ถูกเผ็งเลย มารินะ\""
1010305-68 = "ดีละ ในเมื่อครูยืนยันแล้วก็คงไม่มีปัญหา!"
1010305-69 = "ยังไงก็เถอะ ขอโทษที่ฉันเสียมารยาทด้วยแล้วกันนะ"
1010305-71 = "อะ... เอ่อ...!"
1010305-72 = "พวกเราควรกลับมาทบทวนกันใหม่แล้วละว่าสิ่งสำคัญที่สุดคืออะไร..."
1010305-73 = "แถมการถกเถียงเรื่องแบบนี้ระหว่างกินขนมก็ดูไม่มีประโยชน์เท่าไรเลยด้วย...!"
1010305-74 = "โชคดีจริงๆ ที่ถามไปน่ะ! "
1010305-76 = "อืม ค่อยยังชั่วที่ช่วยให้พวกเธอได้รับคำตอบที่น่าพอใจนะ"
1010305-77 = "แต่ว่า... รู้สึกเหมือนขาดอะไรบางอย่างไปตั้งแต่เมื่อกี้นี้แล้ว..."
1010305-78 = "คือว่ามีแยมบ้างรึเปล่า? อันที่ไม่ได้เอาเนื้อผลไม้ไปบด แต่เอาไปเคี่ยวกับน้ำตาลน่ะ!"
1010305-82 = "ยะ... แยมเหรอ...?!"
1010305-83 = "ถามหาแยมทั้งที่ดื่มชาอยู่เนี่ยนะ?!?!"
1010305-84 = "ใช่แล้ว! เวลาดื่มชาก็ต้องใส่แยมลงไปด้วยสิ!"
1010305-85 = "หากจิบชาพร้อมกับใส่แยมลงไปหนึ่งช้อน จะให้รสชาติที่อร่อยล้ำเหนือจินตนาการเลยละ!"
1010305-86 = "หรือถ้าไม่มีแยมก็ใส่น้ำตาลก้อนหรือน้ำตาลกรวดแทนก็ได้"
1010305-87 = "ถ้ากินน้ำตาลก่อนแล้วดื่มชาตามทีหลังก็จะช่วยป้องกันไม่ให้ชาเสียรสชาติและเพลิดเพลินกับรสหวาน#nได้เต็มที่น่ะ!"
1010305-88 = "ชา... ชา..."
1010305-89 = "เป็นการดูถูกชาแบบสุดๆ...!"
1010305-90 = "ว่ายังไงนะ?!"
1010305-92 = "ตั้งแต่สมัยโบราณมา ชาเป็นสิ่งที่ไม่ควรถูกทำให้มีรสแปร่งๆ หรือมีกลิ่นแปลกๆ!"
1010305-93 = "สีของชาก็ควรใสสะอาด กระทั่งเสียงรินลงแก้วก็ควรเป็นเสียงที่สบายหู!"
1010305-95 = "ดังนั้นไม่ว่าแยม น้ำตาลก้อน หรือน้ำตาลกรวด... ต่างก็เป็นสิ่งเลวร้ายสำหรับชาค่ะ!"
1010305-97 = "เดี๋ยวสิ ฉันแค่พูดถึงวิธีดื่มชาในเรดวินเทอร์เฉยๆ เองนะ?!"
1010305-99 = "(หลังจากนั้นการถกเถียงเกี่ยวกับวิธีดื่มชาของมารินะและนักเรียนจากซานไห่จิงก็ดำเนินต่อไปครู่ใหญ่)"
1010305-100 = "(และในระหว่างนั้น ชาที่เตรียมไว้ก็เย็นชืดจนหมด...)"

1010305-77 = "3;마리나 치파오;02;그런데, 조금 전부터 약간 부족한 것이 있다는 느낌인데……."
1010305-78 = "3;마리나 치파오;11;혹시 잼 없나? 과육을 으깨지 말고, 설탕에 졸인 것으로!\n#3;em;[음표]\n#3;closeup"

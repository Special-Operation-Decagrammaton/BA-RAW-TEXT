1010305-84 = "3;마리나 치파오;02;그럼! 역시 차에는 잼이 있어야지!\n#3;em;[!]"
1010305-85 = "3;마리나 치파오;03;차를 한 모금 입에 머금고, 잼을 한 숟가락 이어서 먹으면, 그야말로 천상의 맛이 나온단 말씀이야!"
1010305-86 = "3;마리나 치파오;03;잼이 없다면 아쉬운 대로 각설탕이나 단단한 설탕 조각도 좋다."
1010305-87 = "3;마리나 치파오;11;그걸 입에 물고 차를 마시면, 차 맛이 떨어지는 것도 막을 수 있으면서 단맛은 단맛대로 은은하게 즐길 수 있으니까!\n#3;em;[음표]"

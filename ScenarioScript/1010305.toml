1010305-63 = "3;마리나 치파오;02;결국 어떻게 먹든 월병의 맛은 같은 법."
1010305-64 = "3;마리나 치파오;01;그리고 다과라는 것은 기본적으로 차를 즐기기 위해 먹는 것이지."
1010305-65 = "3;마리나 치파오;02;그 다과를 나누는 법으로 토론하다가, 차가 식을 때까지 찻잔을 방치해 두는 것은 본말전도라고 생각하는데 말이지?\n#3;em;[반응]"
1010305-66 = "3;마리나 치파오;10;어……. 본말전도라는 말, 이럴 때 쓰는 거 맞나……?\n#3;stiff"
1010305-67 = "[s] \"정확한 용법이었습니다. 마리나 학생.\""
1010305-68 = "3;마리나 치파오;03;좋아! 선생의 확인도 받았으니 문제없겠군!\n#3;em;[반응]"
1010305-69 = "3;마리나 치파오;01;아무튼, 그런 것이다. 무례였다면 용서하도록."

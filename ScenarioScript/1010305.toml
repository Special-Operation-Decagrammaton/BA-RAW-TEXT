[translation]
1010305-1 = "#title;쾌도난마"
1010305-2 = "#place;도원향"
1010305-3 = "3;마리나 치파오;99;음. 산해경의 차는 참으로 향긋하군.\n#3;a\n#3;em;…"
1010305-4 = "3;마리나 치파오;03;어떤 찻잎을 쓰고, 어떤 식으로 차를 만드는지 물어보고 싶을 정도야."
1010305-5 = "[s] \"마리나도 차에 대해서 조예가 있는 모양이네?\""
1010305-6 = "3;마리나 치파오;09;하하하. 조예라고 할 것까지는 아니지만, 붉은겨울에서도 차를 종종 마시곤 하지.\n#3;em;[음표]"
1010305-7 = "3;마리나 치파오;03;사모바르라고 부르는 찻주전자도 있을 정도니까."
1010305-8 = "3;마리나 치파오;02;어떤 주전자냐고? 음……. 우선, 안에서 불을 피워 계속해서 물을 덥힐 수 있지.\n#3;em;[?]"
1010305-9 = "3;마리나 치파오;03;수도꼭지도 달려 있어, 따듯한 물을 따르는 데에도 편리하다고?"
1010305-10 = "3;마리나 치파오;11;그래. 선생도 언젠가 붉은겨울에 오게 되면, 붉은겨울식 홍차를 대접해 주도록 하겠어!\n#3;em;[!]"
1010305-11 = "3;마리나 치파오;02;그건 기대되는 일이지만, 지금은 산해경의 차를 즐길 시간이라고?"
1010305-12 = "3;마리나 치파오;01;확실히 그렇군. 산해경의 차는…… 어딘가…… 잘 표현하기 힘들지만, 맑고 향기롭다는 느낌이다."
1010305-13 = "3;마리나 치파오;99;다만 딱 한 가지, 약간 부족하다는 듯한 느낌이 들기는 하는데…….\n#3;em;…"
1010305-14 = "#all;hide"
1010305-15 = "#na;(어딘가에서 소란스러운 말다툼 소리가 들렸다.)"
1010305-16 = "#all;hide"
1010305-17 = "3;산해경 모브 학생 A;05;아니, 그러니까 월병은 내가 자른다니까. 너한테 맡기면 항상 8조각을 내놓잖아.\n#3;a\n#3;em;[반응]"
1010305-18 = "3;산해경 모브 학생 A;05\n5;산해경 모브 학생 B;05;무슨 소리야. 8조각이 맞지. 너는 4조각으로 자르고 끝을 내 버리잖아.\n#5;a\n#3;m1\n#5;em;[반응]"
1010305-19 = "3;산해경 모브 학생 A;05;예전부터 생각하던 건데, 8조각은 문제가 많아. 몇 번을 말해야 알아듣겠어?\n#3;m2"
1010305-20 = "3;산해경 모브 학생 A;05;4조각으로 잘라야 부스러기가 덜 생겨나잖아. 지저분해지는 건 싫다고."
1010305-21 = "5;산해경 모브 학생 B;02;아니라니까. 월병은 기본적으로 좀 두껍다고. 그래서 4조각으로 자르면 한입에 넣기 힘들어질 수가 있단 말이야.\n#5;m4"
1010305-22 = "5;산해경 모브 학생 B;05;차와 함께 월병의 맛을 온전히 즐기기 위해서는, 8조각으로 잘라 월병을 한입에 넣고 차로 입가심을 하는 게 제일이라고.\n#5;hophop\n#5;em;[스팀]"
1010305-23 = "#st;[0,0];instant;1;"
1010305-24 = "#clearST"
1010305-25 = "3;산해경 모브 학생 A;02\n5;산해경 모브 학생 B;05\n#3;d\n#5;d\n#wait;1500"
1010305-26 = "3;마리나 치파오;04;……무슨 토론을 하고 있는 거지?\n#3;a\n#3;em;[?]"
1010305-27 = "[s1] \"월병을 4조각으로 잘라먹느냐, 8조각으로 잘라먹느냐…….\"\n[s2] \"그런 이야기를 하고 있는 모양이네.\""
1010305-28 = "#wait;10"
1010305-29 = "#wait;10"
1010305-30 = "3;마리나 치파오;08;흐음……?"
1010305-31 = "#all;hide"
1010305-32 = "3;산해경 모브 학생 A;02;8조각으로 자른다는 게 애초에 쉬운 일이 아니잖아. 자칫하면 월병 그 자체가 망가질 수도 있다고!\n#3;em;[반응]"
1010305-33 = "5;산해경 모브 학생 B;06;그건 네가 월병을 많이 안 잘라봐서 그래. 애초에 안 그래도 달고 기름져서 물리기 쉬운 게 월병인데, 조각이 크면 클수록 그만큼 더 잘 물린단 말이야!\n#5;em;[!]\n#5;al\n#3;m1"
1010305-34 = "3;산해경 모브 학생 A;05;큰 것은 작은 것을 겸한다고 하잖아! 월병이 크다면 먹는 사람이 적당히 두 번에 나눠 먹으면 되지!"
1010305-35 = "5;산해경 모브 학생 B;04;그 나눠서 먹는 걸 하기 싫어서, 미리 8조각으로 자르자는 거라고!\n#5;em;[!]"
1010305-36 = "3;산해경 모브 학생 A;04;으으으…… 이러다 언제까지나 결론이 나지 않겠어.\n#3;em;[속상함]"
1010305-37 = "5;산해경 모브 학생 B;02;어? 저기, 못 보던 사람들이 있는데……? 외부에서 온 사람들인 거지?\n#5;em;[반응]"
1010305-38 = "#all;hide"
1010305-39 = "3;산해경 모브 학생 A;00;잘됐네! 제삼자의 시선이라면 분명 객관적일 거야.\n#3;closeup"
1010305-40 = "3;산해경 모브 학생 B;00;저 사람들에게, 어떻게 해야 공평하게 월병을 먹을 수 있을지 물어보자!\n#3;em;[!]\n#3;closeup"
1010305-41 = "#all;hide"
1010305-42 = "#na;(그렇게, 졸지에 공평하게 월병 먹는 법(?)에 대한 판단을 강요받게 되었다.)"
1010305-43 = "#na;(어느 쪽이 정답이라고 확실하게 말하기 어려운 상황이었지만…….)"

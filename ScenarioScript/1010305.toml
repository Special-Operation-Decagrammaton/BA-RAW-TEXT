[translation]
1010305-1 = "Cutting the Gordian Knot"
1010305-2 = "Peach Blossom Spring"
1010305-3 = "Hm. Shanhaijing's tea is very fragrant."
1010305-4 = "I'm curious as to what tea leaves they use, as well as their brewing method."
1010305-5 = "[s] \"Do you know a lot about tea, Marina?\""
1010305-6 = "I wouldn't go so far as to say that. But I do enjoy the occasional cup back at home."
1010305-7 = "I have a teapot of my own as well, called a \"samovar.\""
1010305-8 = "You've never heard of it? Well, you can light a fire inside the teapot to keep the water warm."
1010305-9 = "There's a faucet that dispenses the tea as well! It's very convenient."
1010305-10 = "I know! The next time you visit me, I shall serve you black tea, Red Winter-style!"
1010305-11 = "You'll look forward to it, but right now we're in Shanhaijing?"
1010305-12 = "I got ahead of myself. The tea here is...how do I say it? It's pure and fragrant."
1010305-13 = "But there's something lacking..."
1010305-15 = "A loud argument suddenly broke out."
1010305-17 = "No way! I'M cutting the moon cake! You always cut it into eight pieces!"
1010305-18 = "Well, duh. Because that's what you're supposed to do! You're the weirdo for wanting it in four pieces!"
1010305-19 = "I've told you over and over again, cutting it into eight pieces creates way too many issues!"
1010305-20 = "If you cut them into four, it doesn't get as crumbly! I hate when it gets messy."
1010305-21 = "No, no, you're not listening! Moon cakes are thicker, so you can't eat them in just one bite when they're in such big pieces!"
1010305-22 = "This is the proper way to enjoy a moon cake: cut it into eight pieces, eat it in one bite, and then wash it down with tea."
1010305-26 = "...What are they arguing about?"
1010305-27 = "[s1] \"Whether moon cakes should be eight or four pieces...\"\n[s2] \"...is their topic of debate, it would appear.\""
1010305-30 = "Oh...?"
1010305-32 = "It's super hard to cut them into eight pieces! Mess up a little bit, and you'll mess up the moon cake completely!"
1010305-33 = "That's just because you suck at slicing! And moon cakes are so sweet and greasy! Don't you get sick of them in such big pieces?!"
1010305-34 = "Then just eat it in two bites! There's small pieces built into the big ones!"
1010305-35 = "Then why not cut it into eight pieces to begin with?! That prevents the need to bite into them!"
1010305-36 = "Ugh! We're never gonna come to an agreement."
1010305-37 = "Hey, look over there! I haven't seen them around. They must not be from here!"
1010305-39 = "Perfect. They can give a totally objective perspective then."
1010305-40 = "Let's ask them how a moon cake should be split!"
1010305-42 = "That's how we were forced to judge the best(?) method for eating moon cakes."
1010305-43 = "It seemed like a difficult conundrum to answer, but then..."
1010305-45 = "Okay. I know what to do."
1010305-46 = "[s] \"Marina...?\""
1010305-48 = "Without a hint of hesitation, Marina stood up and strode over to the arguing students' table."
1010305-51 = "Excuse me."
1010305-58 = "Wh-What're you doing with the whole moon cake?!"
1010305-59 = "She ate it...in one bite?!"
1010305-61 = "Nom, nom."
1010305-62 = "Yum. Delicious."
1010305-63 = "It doesn't matter how you eat it. Moon cake will always taste like moon cake."
1010305-64 = "More importantly, these cakes are meant to be enjoyed with tea."
1010305-65 = "While you're arguing about how to properly split the moon cake, the tea is getting cold. That's what one would call \"putting the cart before the horse.\""
1010305-66 = "Um... Did that make sense?"
1010305-67 = "[s] \"Yes. That was an accurate use of the idiom, Ms. Marina.\""
1010305-68 = "Yes! My statement was Sensei-approved!"
1010305-69 = "Anyway, that's how it is. Please forgive me if I was too forward."
1010305-71 = "I-I understand it now!"
1010305-72 = "If you focus on what's really important..."
1010305-73 = "...you realize that silly things, like methodologies, are irrelevant!"
1010305-74 = "I knew getting another perspective would be helpful! "
1010305-76 = "Yes. I'm glad you found my answer satisfactory."
1010305-77 = "But, you know, I've been thinking that something is missing..."
1010305-78 = "Do you by chance have jam? Boiled in sugar, with the fruits left whole!"
1010305-82 = "J-Jam...?!"
1010305-83 = "For drinking tea?!"
1010305-84 = "Naturally! Jam is an essential when drinking tea!"
1010305-85 = "For a true taste of heaven, have a sip of tea, then follow it with a spoonful of jam!"
1010305-86 = "If not jam, then a sugar cube, or even a piece of sugar would do!"
1010305-87 = "Eat some sugar directly, and you won't affect the tea itself, but also enjoy the addition of its subtle sweetness."
1010305-88 = "That's... That's..."
1010305-89 = "That's blasphemy to tea itself!"
1010305-90 = "Wh-What?"
1010305-92 = "True tea is pure to the taste, and clean in its scent!"
1010305-93 = "The colors should be clear, pleasant to the eyes, and it should sing beautifully, like music to your ears!"
1010305-95 = "Jam, sugar cubes, sugar pieces, they are all straying away from the true path and improper!"
1010305-97 = "Wait, I was just talking about how we enjoy tea in Red Winter?!"
1010305-99 = "The students of Shanhaijing and Marina's discussion, on how to drink tea, continued for a long while."
1010305-100 = "Needless to say, the tea got cold..."

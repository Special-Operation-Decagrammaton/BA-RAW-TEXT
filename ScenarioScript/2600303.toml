[translation]
2600303-1 = "Night Duty Angel"
2600303-2 = "(I was so busy today that I barely have the energy to blink.)"
2600303-3 = "(My workload was backbreaking, and I had no choice but to eat at my desk while working.)"
2600303-5 = "(At some point, I lost track of time and that's all I can remember.)"
2600303-6 = "(It's gotten late.)"
2600303-7 = "Hmm hmm. Hmm hmmm!"
2600303-8 = "[s] \"...?\""
2600303-11 = "Hmm... Huh?"
2600303-12 = "Oh. You're awake, Sensei?"
2600303-13 = "You've been working yourself into the ground with overtime. I can't imagine how busy your schedule is."
2600303-14 = "You must be exhausted. That's why Serina is here to help you!"
2600303-15 = "I made a promise, remember? I said I'd be there for you whenever you need me."
2600303-16 = "I wish you would have called me before things got to this point, though..."
2600303-18 = "Not so fast! The towel I placed on your forehead will slip off."
2600303-19 = "Also note that I put special pain relief patches on your neck, arms, and waist."
2600303-20 = "I'll take them off for you when it's time. You have nothing to worry about, Sensei!"
2600303-21 = "[s1] \"Did you do all this while I was sleeping?\"\n[s2] \"I didn't wake up from you doing that?\""
2600303-22 = "That's right. I was surprised you slept so soundly. You didn't wake up at all."
2600303-23 = "That's right. I was surprised you slept so soundly. You didn't wake up at all."
2600303-24 = "I was worried the towel and the patches might cause some discomfort when I put them on you."
2600303-25 = "You must have really been exhausted to not have noticed."
2600303-26 = "I told you not to overdo it, Sensei! I need you to listen to me!"
2600303-27 = "Patients who ignore their nurse's advice are the worst, you know. N-Not that I'm technically a nurse, but still..."
2600303-28 = "Anyway, I'm going to give you an earful if you ignore me again!"
2600303-29 = "Pardon? My touch is so soft you think you're still asleep...?"
2600303-30 = "C-Cut it out! Flattery won't get you anywhere, Sensei!"
2600303-32 = "Sensei...said that I was gentle..."
2600303-34 = "Huh? N-Nothing—I didn't say anything! I was talking to myself, that's all..."
2600303-35 = "Wait a minute, Sensei! You're trying to change the subject when I was scolding you!"
2600303-36 = "You really are the epitome of a bad patient. I'm going to prick you with the biggest needle I have if you end up getting sick."
2600303-37 = "[s3] \"I sincerely apologize for my behavior.\"\n[s4] \"Noooooo! Anything but needles!\""
2600303-41 = "...It's nothing. I was just thinking to myself."
2600303-42 = "I know there's nothing you can do about all of your responsibilities."
2600303-43 = "I can't imagine you like working overtime until you drop..."
2600303-44 = "...but you can't just turn your back on all the people who need you."
2600303-45 = "So all I can do is take care of you the best that I can."
2600303-46 = "..."
2600303-47 = "On the bright side, it was amusing to see how you look when you're sleeping."
2600303-48 = "So it's not all bad. In fact, I feel a little privileged. Heehee."
2600303-49 = "Oh, it's almost time to take your patches off. I'll take care of it, so sit tight."
2600303-52 = "Um... I..."
2600303-53 = "They were easy to put on, but...it's embarrassing now that you're awake."
2600303-54 = "It feels really awkward to be treating your body, so..."
2600303-55 = "...if you don't mind, could you pass back out for me, Sensei?"
2600303-56 = "You don't think you can fall asleep that quickly? Don't worry. I have my ways."
2600303-57 = "They say patting a person like this helps them fall asleep..."
2600303-58 = "You were the one who called me gentle, Sensei, so don't try to resist."
2600303-59 = "Now, please relax your body and get in a comfortable position!"
2600303-60 = "You are feeling veeery sleepy. Close those eyes..."
2600303-61 = "Just relax and let my hands work their magic. First your shoulders and then your neck..."
2600303-63 = "(...I'm actually becoming sleepy.)"
2600303-65 = "(When I came to a little later, Serina, as well as the wet towel and patches, were all gone.)"
2600303-66 = "(It was as if she was never here...)"
2600303-67 = "(Could it have been an exhaustion dream?)"
2600303-69 = "(...Wait.)"
2600303-70 = "(The security system would have alerted me had she come in.)"
2600303-71 = "(If Serina really was here...)"
2600303-72 = "(...how did she get in?)"

[translation]
2600303-1 = "於深夜降臨的天使"
2600303-2 = "（又是忙得不可開交的一天）"
2600303-3 = "（忙著處理再累積下去就要死人的工作量，連飯都是在辦公桌上吃）"
2600303-5 = "（途中，忽然失去了意識，連是在什麼時候發生的都不太清楚）"
2600303-6 = "（只知道大概是在深夜的時候）"
2600303-7 = "……哼哼，哼哼哼──，哼哼～♪"
2600303-8 = "[s] 「……？」"
2600303-11 = "哼哼……啊。"
2600303-12 = "……你醒了呀，老師？"
2600303-13 = "真是的，所以我不是說了嗎……竟然還工作到身體都動不了了。"
2600303-14 = "意識還清楚嗎？我是芹奈。"
2600303-15 = "你問為什麼……我不是說過了嗎，不論何時何地都會到老師身邊的。"
2600303-16 = "要是能早點聯絡我就好了……害我急急忙忙地趕來，真拿老師沒辦法。"
2600303-18 = "啊，不可以亂動！毛巾會掉下來的，請先乖乖休息一下吧。"
2600303-19 = "我在老師的頭、手和腰上都貼上了特製的貼布。"
2600303-20 = "時間到了我就會幫老師拿下來的，請老師什麼都別做，好好休息就好喔。"
2600303-21 = "[s1] 「這些都是芹奈做的？」\n[s2] 「我都被做了這麼多事還沒醒來啊……」"
2600303-22 = "是的，老師睡得很熟呢，完全沒有要醒來的感覺，害我都有點擔心了。"
2600303-23 = "是的，老師睡得很熟呢，完全沒有要醒來的感覺，害我都有點擔心了。"
2600303-24 = "就連在額頭上放濕毛巾、脫下衣服貼貼布……不管做什麼都沒有醒來。"
2600303-25 = "……就是累積了這麼多疲勞唷？老師你明白嗎？"
2600303-26 = "所以我才再三叮嚀老師不要勉強的……都把自己弄成這樣了還不聽話。"
2600303-27 = "不聽護理師的話的病人是最麻煩的唷？雖然我還不是正式的護理師啦……"
2600303-28 = "真是的，這樣還學不乖的話，我真的會生氣的唷？"
2600303-29 = "……嗯？可能是芹奈的技術太好了所以才醒不過來……？"
2600303-30 = "真，真是的！現在不是說這種話的時候！"
2600303-32 = "那是因為……畢竟是老師嘛，溫柔一點也是當然的……"
2600303-34 = "沒，沒事！我只是在自言自語，請不要在意。"
2600303-35 = "難道老師是想要用這種話來轉移話題嗎……？"
2600303-36 = "老師……再這樣做出像是壞病人會做的事的話，我會故意幫你打很痛的針唷。"
2600303-37 = "[s3] 「對不起是我錯了。」\n[s4] 「噫！不要打針，不要打針……！」"
2600303-41 = "……呼。剛才只是說說而已，是開玩笑的。"
2600303-42 = "而且我也知道。老師也沒做錯什麼事，會弄成這樣也是沒辦法的事，畢竟老師就是這麼忙。"
2600303-43 = "也不是因為喜歡所以才工作到半夜的……竟然勉強到自己昏倒。"
2600303-44 = "但是果然還是想把該做的事情做好對吧。畢竟老師是大人嘛。"
2600303-45 = "所以我想，至少在我的能力範圍裡……我也只能像這樣在老師的旁邊照顧你而已……"
2600303-46 = "……"
2600303-47 = "但是樂觀一點來想，能這樣和老師說話、看老師的睡臉……"
2600303-48 = "也不全都是壞事呢……就像是，我的特權一樣……"
2600303-49 = "……啊，差不多該把貼布拿下來了。請先不要動喔。"
2600303-52 = "嘿咻……嗯……"
2600303-53 = "那個，可能是貼的時候老師沒有意識所以比較沒有在意……果然像這樣看到老師的身體還是有點不好意思呢……"
2600303-54 = "雖然說這是治療，但一碰到老師就……"
2600303-55 = "那個，果然還是很害羞，如果老師可以再睡著一次的話就太感謝了……"
2600303-56 = "不過，既然都醒過來了，一時也睡不著吧……沒關係的，為了這種時候我準備了一個好方法。"
2600303-57 = "只要這麼摸一摸的話，很快就會睡著的。這樣摸……"
2600303-58 = "呵呵。剛才說過我的技術很好的對吧？既然都對我這麼說了，你可沒有拒絕的權利唷，老師？"
2600303-59 = "請放鬆身體吧，放鬆全身……"
2600303-60 = "你將會漸漸陷入沉睡……眼皮將緩緩闔上……"
2600303-61 = "從額頭、腦袋、臉頰、到脖子，都會好好幫老師摸一摸的……"
2600303-63 = "（簡直就像魔法一樣，真的越來越想睡了）"
2600303-65 = "（於是，當我再次張開眼睛時，不只是芹奈，連濕毛巾跟貼布都一起消失了）"
2600303-66 = "（簡直就像是沒有出現過一樣。……芹奈真的有來過嗎？）"
2600303-67 = "（難道是我太累了，所以才做了那種夢……我不禁這麼想）"
2600303-69 = "（……等等）"
2600303-70 = "（那個時段的夏萊，保全系統應該是有運作的才對）"
2600303-71 = "（如果芹奈真的有來過的話……）"
2600303-72 = "（……究竟是怎麼做到的？）"

[translation]
2600303-1 = "#title;야근에 내려온 천사"
2600303-2 = "#na;(눈코 뜰 새 없이 바쁜 날이었다.)"
2600303-3 = "#na;(치사량이라고 느껴질 업무를 처리하며, 끼니도 모두 책상에서 대충 때웠다.)"
2600303-4 = "#all;hide"
2600303-5 = "#na;(그러다 도중에 필름이 끊겼다. 언제 정신을 잃었는지, 기억조차 가물가물했다.)"
2600303-6 = "#na;(그저 지금이 늦은 밤이라는 것만 어렴풋이 인지되었다.)"
2600303-7 = "#na;세리나;……흥흥. 흐흥흥~. 흐흥~."
2600303-8 = "[s] \"……?\""
2600303-9 = "#wait;500"
2600303-10 = "#all;hide"
2600303-11 = "3;세리나;02;흐흥흥…… 어?\n#3;a\n#3;em;[반응]"
2600303-12 = "3;세리나;01;……아, 깨어나셨나요, 선생님?\n#3;greeting"
2600303-13 = "3;세리나;01;몸도 제대로 못 가누실 시간까지 야근이시라니, 고생이 많으시네요."
2600303-14 = "3;세리나;03;저예요. 세리나. 한참 피로로 지쳐 있으실 선생님을 위해 세리나가 찾아왔답니다!\n#3;jump\n#3;em;[반짝]"
2600303-15 = "3;세리나;01;약속 드렸잖아요? 필요하실 때라면 언제 어디서든 돌봐 드릴 거라고."
2600303-16 = "3;세리나;04;이렇게까지 되시기 전에 미리 말씀해주셨다면 더 좋았겠지만……\n#3;em;…"
2600303-17 = "#bgshake\n#wait;1500"
2600303-18 = "3;세리나;02;아, 잠깐만요! 갑자기 움직이시면 이마에 올려 드린 물수건이 떨어질 수도 있어요.\n#3;shake\n#3;em;[?!]"
2600303-19 = "3;세리나;01;그리고 목이랑 팔 안쪽, 허리에도 특제 파스를 붙여 드렸거든요. 놀라지 말아주세요."
2600303-20 = "3;세리나;03;시간 다 되면 제가 직접 떼어 드릴 테니, 선생님께선 아~무 신경 쓰지 않으셔도 돼요.\n#3;em;[반짝]"
2600303-21 = "[s1] \"자는 사이에 이걸 전부 다 해준 거야?\"\n[s2] \"이러는 동안 내가 깨어나지 않았다고?\""
2600303-22 = "3;세리나;04;그러게요. 너무 곤히 주무셔서 저도 놀랐어요. 전혀 깨지 않으시더라고요."
2600303-23 = "3;세리나;04;그러게요. 너무 곤히 주무셔서 저도 놀랐어요. 전혀 깨지 않으시더라고요."
2600303-24 = "3;세리나;99;물수건 놓아드릴 때도, 파스 붙여드릴 때도…… 꽤 차갑거나 뜨거우실 수 있었는데 말이죠.\n#3;em;…"
2600303-25 = "3;세리나;05;……얼마나 몸이 과로에 몰려 있었으면!\n#3;em;[반응]"
2600303-26 = "3;세리나;06;그러니까 제가 무리하지 마시라고 그렇게나 말씀드렸는데! 또 제 말 안 들으시고!\n#3;closeup"
2600303-27 = "3;세리나;05;간호사 말 안 듣는 환자가 제일 나쁜 거 아시죠? 무, 물론 제가 간호사는 아니지만……\n#3;closeup"
2600303-28 = "3;세리나;06;아무튼 자꾸 이렇게 몸 안 돌보시면 저 진짜 화 낼 거예요!\n#3;em;[!]\n#3;closeup\n#3;jump"
2600303-29 = "3;세리나;02;……네? 손길이 너무 부드러워서 안 깬 것 같다고요……?\n#3;shake\n#3;closeup"
2600303-30 = "3;세리나;04;그, 그런……! 그런 말씀 하셔도 소용없어요! 봐 드리지 않는다고요!\n#3;shake\n#3;em;[?!]"
2600303-31 = "3;세리나;04\n#3;m4\n#wait;1000"
2600303-32 = "3;세리나;04;선생님이…… 선생님이 내 손길이 부드럽다고…… 그렇게 말 해주셨어……\n#3;em;[///]\n#3;stiff"
2600303-33 = "3;세리나;02\n#3;em;[반응]\n#wait;1000"
2600303-34 = "3;세리나;04;에? 아, 아무 것도 아니에요! 아무 말도 안 했어요. 그냥 혼잣말이예요, 혼잣말……\n#3;m3"
2600303-35 = "3;세리나;05;……!? 아이, 참! 선생님! 이제 보니 말 돌려서 혼나지 않으려고 하신 거죠!\n#3;stiff"
2600303-36 = "3;세리나;06;아주 나쁜 환자의 표본이네요!! 이러다 진짜 몸살 걸리시면 주사 아프게 놔 드릴 거예요!\n#3;hophop\n#3;em;[빠직]"
2600303-37 = "[s3] \"미안해.\"\n[s4] \"히익! 주, 주사만은 제발!\""
2600303-38 = "#wait;100"
2600303-39 = "#wait;100"
2600303-40 = "3;세리나;05\n#3;em;…\n#wait;2500"
2600303-41 = "3;세리나;04;……하아. 아니에요. 그냥 해 본 말이니 방금 말은 없었던 걸로 해주세요. \n#3;em;[속상함]\n#3;stiff"
2600303-42 = "3;세리나;04;어쩔 수 없으신 거겠죠. 알아요. 당연히 선생님이 제일 힘드시다는 거.\n#3;greeting"
2600303-43 = "3;세리나;99;야근이 좋아서 하시는 것도 아니실 텐데…… 이렇게 기절할 때까지 고생하시고."
2600303-44 = "3;세리나;01;그래도 역시 책임을 버릴 수 없으신 거겠죠, 선생님은 어른이시니까."
2600303-45 = "3;세리나;04;그러니 제가 할 수 있는 거라곤, 이렇게 옆에서 돌봐 드리는 것 정도가 고작이네요.\n#3;m2"
2600303-46 = "3;세리나;04;……\n#3;em;…"
2600303-47 = "3;세리나;99;하지만 좋게 생각하자면, 덕분에 이렇게 대화도 나누고 주무시던 선생님 얼굴도 보고……\n#3;greeting"
2600303-48 = "3;세리나;03;꼭 나쁜 점만 있는 건 아닐지도 모르겠어요. 어쩌면 제 특권이려나요? 후후후.\n#3;m3\n#3;em;[반짝]"
2600303-49 = "3;세리나;02;……아. 파스 시간 다 됐네요. 다시 떼어 드릴 게요. 그대로 있으세요.\n#3;em;[반응]"
2600303-50 = "3;세리나;01\n#3;greeting\n#wait;450"
2600303-51 = "3;세리나;01\n#3;closeup\n#wait;1000"
2600303-52 = "3;세리나;04;아…… 으음……? 으으으음……\n#3;closeup\n#3;em;…"
2600303-53 = "3;세리나;04;저기, 붙일 땐 별 생각 없었는데…… 역시 보고 계시니 조금 부끄럽네요.\n#3;closeup"
2600303-54 = "3;세리나;04;이유야 어쨌든 선생님께 제가 손을 대는 것이다 보니……\n#3;closeup\n#3;stiff"
2600303-55 = "3;세리나;01;괜찮으시면 서로 부끄러우니 그동안만이라도 다시 주무셔 주시겠어요, 선생님?\n#3;closeup\n#3;em;[반응]"
2600303-56 = "3;세리나;02;네? 어떻게 갑자기 다시 잠드냐고요? 그건 걱정 마세요. 제게 다 방법이 있으니까.\n#3;closeup"
2600303-57 = "3;세리나;03;쉽게 잠드는 데엔 어루만져 주는 게 좋대요. 이렇게……\n#3;closeup\n#3;greeting"
2600303-58 = "3;세리나;01;후후. 아까 제 손길에 대해 그렇게 말하셨으니, 거절하시면 안 돼요. 선생님.\n#3;closeup\n#3;em;[재잘]"
2600303-59 = "3;세리나;01;자아. 몸에 힘 푸시고~. 편한 자세로~.\n#3;closeup"
2600303-60 = "3;세리나;99;잠이 온다~. 잠이 온다~. 눈이 다시 감긴다~.\n#3;closeup"
2600303-61 = "3;세리나;99;세리나의 손길이 머리에서 뺨으로~ 목으로~.\n#3;closeup\n#3;greeting\n#3;em;[음표]"
2600303-62 = "#all;hide"
2600303-63 = "#na;(……거짓말처럼, 정말로 눈이 감겼다.)"
2600303-64 = "#all;hide"
2600303-65 = "#na;(잠시 후 눈이 떴을 땐, 세리나는 물론 물수건과 옷 안의 파스까지 모두 사라져 있었다.)"
2600303-66 = "#na;(마치 처음부터 찾아왔던 적도 없던 것처럼. 아니, 정말로 다녀간 게 맞긴 한가?)"
2600303-67 = "#na;(어쩌면 정말로 피곤해서 그런 꿈을 꿨던 걸지도……)"
2600303-68 = "#all;hide"
2600303-69 = "#na;(……잠깐.)"
2600303-70 = "#na;(정말로 왔다 간 거라면, 이 시간의 샬레 부실은 분명 보안 시스템이 켜져 있을 텐데.)"
2600303-71 = "#na;(만약, 정말 세리나가 왔다고 한다면……)"
2600303-72 = "#na;(……어떻게 들어온 거지?)"

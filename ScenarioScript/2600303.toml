[translation]
2600303-1 = "นางฟ้ามาโปรดในตอนทำงานดึก"
2600303-2 = "(ในวันที่ยุ่งจนแทบไม่ได้ลืมหูลืมตา)"
2600303-3 = "(คุณครูต้องจัดการงานเยอะถึงขนาดที่ทำให้สลบได้ และกินข้าวหน้าโต๊ะทำงานทุกมื้อ)"
2600303-5 = "(หลังจากนั้นก็เหมือนภาพตัดไป ไม่รู้ว่าหมดสติไปตั้งแต่เมื่อไหร่ จำได้แค่ลางๆ เท่านั้น)"
2600303-6 = "(รู้แค่คร่าวๆ ว่าตอนนี้ดึกมากแล้ว)"
2600303-7 = "...ฮืม ฮื้มมมม~! ฮืม~"
2600303-8 = "[s] \"...?\""
2600303-11 = "ฮืมมมม... โอ๊ะ?"
2600303-12 = "...อ๊ะ คุณครูตื่นแล้วเหรอคะ?"
2600303-13 = "ทำงานดึกจนร่างกายไม่ไหว ลำบากมากเลยสินะคะ"
2600303-14 = "ฉันเองค่ะ เซรินะ เซรินะเห็นคุณครูดูเหนื่อยล้าเลยมาหาค่ะ!"
2600303-15 = "ฉันสัญญาไว้แล้วไงคะ บอกว่าเรียกฉันได้ตลอดเลยไม่ว่าเมื่อไหร่ไงคะ"
2600303-16 = "ถ้าหากบอกฉันก่อนที่จะเป็นขนาดนี้ก็คงจะดีกว่า..."
2600303-18 = "อ๊ะ เดี๋ยวค่ะ! จู่ๆ ขยับขึ้นมา ผ้าที่วางไว้บนหน้าผากจะตกลงมาได้นะคะ"
2600303-19 = "แล้วก็ ฉันติดแผ่นแปะแก้ปวดแบบพิเศษไว้ที่คอ แขน และเอวไว้ให้ด้วยค่ะ อย่าตกใจไปนะคะ"
2600303-20 = "ถ้าครบเวลาฉันจะมาจัดการให้เอง ดังนั้นคุณครูไม่ต้องสนใจเลยก็ได้ค่ะ~"
2600303-21 = "[s1] \"ทำทั้งหมดนี้ให้ระหว่างที่ครูนอนอยู่เหรอ?\"\n[s2] \"ระหว่างนั้นครูก็ไม่ตื่นเลยเหรอ?\""
2600303-22 = "นั่นสิคะ หลับลึกมากขนาดที่ฉันยังตกใจเลยค่ะ ไม่ตื่นเลยล่ะค่ะ"
2600303-23 = "นั่นสิคะ หลับลึกมากขนาดที่ฉันยังตกใจเลยค่ะ ไม่ตื่นเลยล่ะค่ะ"
2600303-24 = "ไม่ว่าจะเป็นตอนวางผ้า หรือตอนที่แปะแผ่นแปะแก้ปวดให้... เรียกว่าไม่ตื่นทั้งเย็นจัดหรือร้อนจัด#nเลยก็ได้ค่ะ"
2600303-25 = "...ร่างกายของคุณครูต้องเหนื่อยล้ามากขนาดไหนกัน!"
2600303-26 = "เพราะอย่างนั้นฉันถึงบอกไปว่าอย่าฝืนตัวเองมากเกินไปไงคะ! แล้วก็ไม่ฟังที่ฉันพูดเลย!"
2600303-27 = "คุณครูก็รู้ว่าผู้ป่วยที่ไม่ยอมฟังพยาบาล มันแย่ที่สุดเลย แน่นอนว่าถึงฉันจะไม่ใช่พยาบาลก็เถอะ..."
2600303-28 = "แต่ถ้าไม่ดูแลร่างกายแบบนี้ ฉันจะโมโหจริงๆ แล้วนะคะ!"
2600303-29 = "...คะ? เพราะว่ามือของฉันนุ่มมากจนหลับไปเหรอคะ...?"
2600303-30 = "ระ...เรื่องนั้นมัน....! ถึงพูดแบบนั้นก็ไม่มีประโยชน์หรอกค่ะ! ฉันไม่ยอมหรอกนะคะ!"
2600303-32 = "คุณครูคะ... ที่คุณครูบอกว่า... มือของฉันนุ่ม..."
2600303-34 = "คะ? มะ... ไม่มีอะไรค่ะ! ถือว่าฉันไม่ได้พูดอะไรนะคะ ฉันแค่พูดพึมพำคนเดียว..."
2600303-35 = "...!? เอ๊ะ เดี๋ยวนะคุณครู! ตอนนี้ฉันรู้แล้ว คุณครูพูดแบบนั้นเพื่อจะเปลี่ยนเรื่องสินะคะ!"
2600303-36 = "เป็นตัวอย่างของผู้ป่วยที่ไม่ดีเลยนะคะ!! ถ้าป่วยขึ้นมาจริงๆ ฉันจะจับฉีดยาซะให้เข็ดเลย!"
2600303-37 = "[s3] \"ขอโทษนะ\"\n[s4] \"ครูยอมทุกอย่าง ขอแค่อย่าฉีดยา!\""
2600303-41 = "...เฮ้อ ฉันไม่ฉีดหรอกค่ะ ฉันแค่พูดออกมาเฉยๆ ช่วยทำเป็นว่าเมื่อกี้ฉันไม่ได้พูดนะคะ"
2600303-42 = "คงจะช่วยไม่ได้สินะคะ ฉันเข้าใจค่ะ คนที่ลำบากที่สุดก็คือคุณครูนี่คะ"
2600303-43 = "คุณครูคงไม่ได้อยากทำงานดึก... และทำงานหนักจนหมดสติแบบนี้"
2600303-44 = "แต่เพราะคุณครูเป็นผู้ใหญ่ เลยทิ้งความรับผิดชอบไปไม่ได้สินะคะ"
2600303-45 = "เพราะฉะนั้นทั้งหมดที่ฉันทำได้คือคอยดูแลอยู่ข้างๆ อย่างนี้ค่ะ"
2600303-46 = "....."
2600303-47 = "แต่ถ้าคิดให้ดี เพราะอย่างนี้ฉันถึงได้เห็นใบหน้าคุณครูตอนหลับ และได้พูดคุยกันแบบนี้..."
2600303-48 = "มันก็ไม่ได้มีแต่ข้อเสียอย่างเดียวนะคะ ถือว่าเป็นสิทธิพิเศษของฉันยังไงล่ะคะ ฮุฮุฮุ"
2600303-49 = "...อ่า ครบเวลาแล้วค่ะ ฉันจะเอาแผ่นแปะออกให้ อยู่นิ่งๆ นะคะ"
2600303-52 = "อ่า...หืม...? อืม..."
2600303-53 = "คือว่าตอนที่ติดไป ฉันก็ไม่ได้คิดอะไร... แต่พอคุณครูมองอยู่แบบนี้ก็เขินนิดๆ น่ะค่ะ"
2600303-54 = "เพราะว่าฉันสัมผัสคุณครูอยู่..."
2600303-55 = "ถ้าคุณครูไม่ว่าอะไร ช่วยกลับไปหลับอีกสักพักได้มั้ยคะ คุณครู?"
2600303-56 = "คะ? จะทำให้หลับทันทีได้ยังไงน่ะเหรอคะ? เรื่องนั้นไม่ต้องห่วงค่ะ ฉันมีวิธีอยู่"
2600303-57 = "ค่อยๆ ลูบแล้วจะหลับไปได้ง่ายๆ เลยค่ะ แบบนี้..."
2600303-58 = "ฮุฮุ เมื่อกี้คุณครูพูดถึงมือของฉันว่าอย่างนั้น อย่าปฏิเสธนะคะ"
2600303-59 = "เอาล่ะค่ะ ผ่อนคลายร่างกาย~ ให้อยู่ในท่าที่สบาย~"
2600303-60 = "จงง่วง~ จงง่วง~ รู้สึกจะหลับ~"
2600303-61 = "สัมผัสถึงมือของเซรินะที่หัว ที่แก้ม~ ที่คอ~"
2600303-63 = "(...รู้สึกจะหลับจริงๆ ราวกับโกหก)"
2600303-65 = "(หลังจากนั้นพอลืมตาขึ้น เซรินะก็หายไปพร้อมกับผ้าและแผ่นแปะแก้ปวดใต้เสื้อ)"
2600303-66 = "(อย่างกับว่าเธอไม่เคยมาตั้งแต่แรก ไม่สิ นี่เธอมาจริงๆ ใช่มั้ย?)"
2600303-67 = "(อาจจะเพราะว่าเหนื่อยมากก็เลยฝันแบบนั้น...)"
2600303-69 = "(...เดี๋ยวนะ)"
2600303-70 = "(ถ้าเธอมาจริงๆ ระบบรักษาความปลอดภัยในห้องชาเล่ต์ก็ควรจะเตือนแล้วสิ)"
2600303-71 = "(ถ้าหากเซรินะมาจริงๆ ล่ะก็...)"
2600303-72 = "(...แล้วเธอเข้ามาได้ยังไง?)"

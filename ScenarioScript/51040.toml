[translation]
51040-1 = "ตอนที่ 4;ณ ชมรมหยินหยาง"
51040-2 = "ห้องชมรมหยินหยาง"
51040-4 = "ขอบคุณที่อุตส่าห์เดินทางมาไกลนะคะคุณครู~"
51040-5 = "ดีใจจังเลยค่ะที่ได้เจอกันอีก อะฮาฮ่า"
51040-6 = "ยินดีต้อนรับสู่เฮียกคิยาโคค่ะ "
51040-7 = "สวัสดี~ คุณครู~~"
51040-8 = "[s] \"ไม่ได้เจอกันนานเลยนะทุกคน\""
51040-9 = "นั่นสินะคะ หลังจาก <วันนั้น>... เวลาก็ผ่านไปนานแล้วเลย"
51040-10 = "อื้ม~"
51040-15 = "ใบหน้าคุณครู..."
51040-16 = "เลือนรางจากใจ"
51040-17 = "พรากจากนานไป..."
51040-18 = "ลืมไปแล้วนะเนี่ยว่าคุณครูหน้าตาเป็นยังไง~"
51040-22 = "กะ... กลอนไฮกุจากชิเซะจัง...!"
51040-23 = "ต้องจดไว้แล้ว...!"
51040-24 = "[s] \"อืม... พอพูดแบบนั้น ครูก็เริ่มเชื่อแล้วแฮะว่าลืมกันจริง\""
51040-26 = "...?"
51040-27 = "[s] \"ชะ... ชิเซะ?!\""
51040-28 = "อะฮ่าฮ่า ถึงชิเซะจะพูดแบบนั้นก็เถอะ..."
51040-29 = "แต่หลังจากเรื่องนั้น เฮียกคิยาโคของพวกเราก็หัวหมุนกันไม่น้อยเลยละค่ะ~"
51040-30 = "ใช่มั้ย~? คาโฮะ"
51040-32 = "ค่ะ ไหนจะเรื่องซ่อมแซมและปรับปรุงโครงสร้างพื้นฐานที่พังไป ไหนจะเรื่องจัดสรรงบประมาณฉุกเฉิน เพื่อบูรณะหอพักนักเรียนอีก... โดยรวมแล้วเรายังคงทำงานฟื้นฟูกันถึงตอนนี้เลยค่ะ"
51040-33 = "[s] \"ทุกคนเหนื่อยกันน่าดูเลยนะ...\""
51040-34 = "คาโฮะนี่ก็นะ~ นานๆ คุณครูจะแวะมาสักที~ ไปชวนคุยเรื่องหนักหัวทำไมไม่รู้~ "
51040-35 = "หมู่นี้เฮียกคิยาโคไม่ได้มีแต่เรื่องวุ่นวายแบบงานฟื้นฟูอะไรนี่อย่างเดียวสักหน่อย~"
51040-36 = "ถ้าจะพูดถึงเรื่องอื่น... ก็เช่นงานเทศกาลที่จะจัดเร็วๆ นี้~"
51040-37 = "[s1] \"จริงสิ ระหว่างมาที่นี่ ครูเห็นกำลังเตรียมงานกันใหญ่เลย\"\n[s2] \"ได้ยินว่าเป็นเทศกาลที่ชิซุโกะเตรียมตัวอย่างหนักเลย...\""
51040-40 = "อะฮ่า~"
51040-41 = "ถ้าคุณครูทราบอยู่แล้ว งั้นก็คงคุยกันเร็วขึ้นนะคะ ใช่แล้วค่ะ~ ตอนนี้ชิซุโกะกำลังทุ่มเทกับงานนี้มากๆ เลยละค่ะ~"
51040-45 = "เพื่องานเทศกาลที่ยอดเยี่ยมและสนุกสนานแล้วละก็ ชิซุโกะทำเรื่องอะไรที่ไม่คาดคิดมากมายเลย ถ้าได้เห็นเธอทำงาน ก็จะคิดว่า \"ไม่เหนื่อยบ้างเหรอนั่น...\""
51040-46 = "ล้อเล่นค่ะ ก็จะคิดว่าสิ่งที่เธอทำมันน่าภาคภูมิใจมากๆ น่ะค่ะ"
51040-47 = "[s] \"อ่า อืม กะ... ก็คงงั้น...\""
51040-48 = "ฮุฮุ ชิซุโกะน่าจะอยากทำให้ <เทศกาลโคมไฟเฮียกคิยาโค> ที่ถูกยกเลิกไปเมื่อ 20 ปีก่อนกลับมามีชีวิต#nอีกครั้งน่ะค่ะ"
51040-49 = "แต่ที่เป็นแบบนี้ บางทีมันอาจจะเป็นเรื่องดีก็ได้นะคะ~"
51040-50 = "คุณนิยะ พูดแบบนั้นมัน..."
51040-51 = "คาโฮะนี่ก็นะ แต่ก็ต้องยอมรับไม่ใช่เหรอว่าจังหวะเวลามันได้มากเลย~"
51040-55 = "[ns] \"หมายความว่ายังไงเหรอ...?\""
51040-56 = "ก็เทศกาลโคมที่ชิซุโกะอยากฟื้นฟูขึ้นมาอีกครั้งเป็นเทศกาลที่เหมาะเจาะกับสถานการณ์ในตอนนี้เลย#nยังไงล่ะคะ"
51040-57 = "ในขณะที่เรากำลังหัวหมุนกับงานฟื้นฟูและบูรณะ เทศกาลนี้ถือเป็นการเริ่มต้นเพื่อให้เฮียกคิยาโค#nผลิต้นอ่อนอย่างงดงามในอนาคต"
51040-59 = "...บางเรื่องคุณนิยะก็พูดเกินไปนะคะ"
51040-60 = "แต่ช่วงนี้เฮียกคิยาโคก็มีบรรยากาศซบเซาลงจริงๆ ทุกคนก็เลยเห็นพ้องต้องกันว่าเราต้องหาโอกาสที่#nยิ่งใหญ่ค่ะ "
51040-62 = "บ้างก็คิดว่า \"หวังว่าเทศกาลนี้จะทำให้บรรยากาศที่ซบเซากลับมาคึกคักได้นะ~\" หรือไม่ก็ \"อยากให้ทุกคนกลับมามีรอยยิ้มสดใสบนใบหน้าจัง~\""
51040-63 = "มันก็เลยเป็นเป้าหมายที่ดีของพวกเราเลยน่ะค่ะ~"
51040-64 = "ชิเซะเองก็หามรุ่งหามค่ำเตรียมการแสดงที่จะเปิดตัวใหม่อยู่ใช่มั้ย? น่าชื่นชมจริงๆ เลย~"
51040-66 = "อื้ม~ ฉันเองก็จะพยายามนะ~"
51040-67 = "ชะ... ชิเซะจัง...!"
51040-69 = "อะฮะฮ่าฮ่า! ทุกคนน่าชื่นชมกันจริงๆ~"
51040-70 = "ค่ะ เพราะแบบนี้งานของเราก็เลยเพิ่มมากขึ้นเป็นกอง คุณนิยะเองก็ช่วยตั้งใจทำงานให้กระฉับกระเฉง#nมากกว่าตอนนี้หน่อยนะคะ เข้าใจไหมคะ?"
51040-71 = "อะไรกัน~ เมื่อกี้บรรยากาศยังอบอุ่นอยู่เลยนะ~ "
51040-72 = "อยู่ๆ ทำไมถึงพูดอะไรโหดร้ายแบบนั้นล่ะ ทำเกินไปแล้วนะคาโฮะ~ กระซิกๆ ..."
51040-78 = "คุณนิยะ ถ้าครั้งนี้จะชิ่งหนีไปอีก คุณได้เจอเรื่องใหญ่แน่ค่ะ"
51040-83 = "อะฮะฮ่า... อื้ม~ งั้นเหรอ~?"
51040-84 = "เอาเถอะ แต่ไหนๆ คุณครูก็อุตส่าห์มาถึงที่นี่แล้ว หวังว่าคุณครูจะสนุกกับงานเทศกาลอย่างจุใจเลย#nนะคะ~ ฮุฮุ"
51040-85 = "อ้อ ช่วยไปเจอชิซุโกะแล้วให้กำลังใจเธอหน่อยก็ดีนะคะ~"
51040-86 = "[s] \"...หืม?\""
51040-87 = "ฮุฮุ ทำไมทำหน้าแบบนั้นล่ะคะ?"
51040-88 = "อ้อ! จริงสิ~ ลืมที่ฉันบอกไปก่อนหน้านี้เลย คุณครูไปลูบหัวชิเซะดูไหมคะ?"
51040-89 = "เมี๊ยว~?"
51040-90 = "[s] \"ถ้าแค่นั้นจริงๆ ครูก็ไม่ติดอะไรหรอก\""
51040-91 = "ตายจริง แววตาสงสัยในตัวนักเรียนที่น่ารักแบบนั้น... "
51040-92 = "ถ้าคุณครูว่าอย่างนั้น นิยะคนนี้ก็... เสียใจเป็นนะคะ กระซิกๆ"
51040-93 = "ฉันอุตส่าห์พยายามอย่างหนักเพื่อทำให้คุณครูไว้วางใจ แต่สำหรับคุณครูแล้ว ฉันเป็นนักเรียนที่มี#nภาพลักษณ์แบบนั้นเหรอคะ?  กระซิกๆ"
51040-94 = "[s] \"อ่า ขอโทษที ครูคงพูดแรงเกินไป...\""
51040-95 = "ฉันยัง... มีอีกเรื่องที่คาใจอยู่ค่ะ"
51040-96 = "[s] \"นั่นไง ว่าแล้วว่ามีอะไรจริงๆ ด้วย!\""
51040-105 = "คุณนิยะ เรื่องนั้นมัน..."
51040-110 = "อื้ม~ ถึงคาโฮะจะบอกว่าเป็นเรื่องล้อเล่น"
51040-111 = "แต่ไหนๆ คุณครูก็อุตส่าห์มาเที่ยวงานเทศกาลของเราแล้ว ฉันก็เลยอยากรายงานให้ทราบน่ะค่ะ"
51040-112 = "[s] \"นี่มัน... จดหมายเหรอ?\""
51040-113 = "ใช่ค่ะ เป็นจดหมายที่ส่งมาถึงชมรมหยินหยางของเราเมื่อไม่กี่วันก่อน"
51040-118 = "และผู้ส่งก็ไม่ใช่ใครที่ไหน แต่เป็น <ชมรมความงามของธรรมชาติ>"
51040-119 = "ต้องบอกว่าเป็นสิ่งของล้ำยุค... ที่ส่งมาจากชมรมที่ถ่ายทอดเรื่องลี้ลับจากปากสู่ปากเลยละค่ะ"
51040-120 = "[s] \"ชมรม... ความงามของธรรมชาติ? แต่มีเรื่องลี้ลับมาเกี่ยวด้วย?\""
51040-122 = "ชมรมความงามของธรรมชาติเป็นชมรมแห่งเรื่องลี้ลับที่มีน้อยคนนักในเฮียกคิยาโคที่จะรู้จัก"
51040-123 = "ทั้งเรื่องลี้ลับในสังคมชนบท เรื่องลี้ลับที่ไม่มีมูล เรื่องลี้ลับที่ส่งต่อกันปากต่อปาก และถ้าจะให้อธิบาย#nให้ได้อารมณ์มากขึ้น ก็ต้องบอกว่าเป็น..."
51040-129 = "ตำนานร้อยเรื่องราวที่เล่าขานกันมาตั้งแต่สมัยโบราณ"
51040-130 = "ว่ากันว่าพวกเธอเป็น <ชมรมคนไม่ดีที่ไม่ยอมรับความเป็นสหพันธ์ของเฮียกคิยาโค> แล้วก็เป็น <สารพัดผีที่หลอกผู้คนด้วยเรื่องลึกลับ> ด้วย... ไม่รู้จะเชื่อได้หรือเปล่านะ~"
51040-131 = "แต่ชมรมหยินหยางของเราก็ได้ <จดหมายข่มขู่> มาจากชมรมที่ว่า!"
51040-132 = "[s] \"แค่แนะนำชมรมก็ฟังดูน่ากลัวแล้ว... แล้วเนื้อหาในจดหมายล่ะ...?\""
51040-133 = "เนื้อหาในจดหมายน่ะเหรอคะ"
51040-135 = "<ทุกคนจงฟังคำบอกเล่าต่อไปนี้>"
51040-136 = "<ความสง่างามของเรายังไม่สิ้นสุด บรรยากาศเงียบสงบเป็นสิ่งที่เราทุกคนควรลิ้มลอง>"
51040-137 = "<ตอนที่เวลาแห่งความสุขเริ่มต้น ตอนที่ทุกคนมองดอกไม้บานในท้องฟ้าด้วยดวงตาที่เปล่งประกาย>"
51040-141 = "ตอนนั้นชมรมความงามของธรรมชาติจะไปหาพวกเธออีกครั้ง นิยะ"
51040-145 = "นี่เป็นเนื้อหาทั้งหมดในจดหมายค่ะ"
51040-146 = "คุณนิยะ เนื้อหาในจดหมายมัน..."
51040-147 = "อืม ใช่ คาโฮะ มันเป็นคำเตือนทั่วๆ ไป"
51040-148 = "ที่จริงก็ไม่มีอะไรน่าแปลกใจด้วยค่ะ เห็นพอจะมีงานอะไรใหญ่ๆ ก็จะมีเรื่องแบบนี้เกิดขึ้นบ่อยๆ นี่คะ~"
51040-149 = "ใช่มั้ย~? คาโฮะ"
51040-154 = "...ค่ะ ก็จริงอย่างที่คุณนิยะพูด"
51040-155 = "ส่วนมากพวกปีศาจจะโทรมาแอบอ้างว่าเป็นผู้มีอำนาจ... เรื่องจดหมายก็มีเข้ามาบ่อยๆ ด้วยนะคะ "
51040-156 = "ที่เราเจอบ่อยๆ ก็จะเป็น \"ประกาศในนามองค์การนักเรียน ยกเลิกเทศกาลอะไรนั่นเดี๋ยวนี้\" หรือไม่ก็ \"ขอสั่งในนามชาเล่ต์ จงแจกคูปองงานเทศกาลให้พวกปีศาจเพิ่มอีก\""
51040-157 = "[s] \"มีเรื่องแบบนั้นบ่อยๆ เลยเหรอ? น่าหนักใจอยู่นะ!\""
51040-159 = "มันเป็นเรื่องภายในของเฮียกคิยาโคน่ะค่ะ ไม่ใช่เรื่องที่พวกฉันจะวิ่งแจ้นไปหาคุณครูแล้ว <ออดอ้อนออเซาะ> หรอก"
51040-160 = "อะฮะฮ่า ค่ะ ก็เราไปสร้างความเดือดร้อนให้คุณครูไม่ได้นี่คะ ใช่มั้ย? คาโฮะ"
51040-161 = "เรื่องนั้นมัน..."
51040-162 = "ค่ะ คุณนิยะพูดถูกแล้วละค่ะ"
51040-163 = "[s] \"แต่ครูไม่ได้ว่าอะไรนะ\""
51040-164 = "ขอบคุณนะคะที่ช่วยพูดแบบนั้น แต่หากเกิดเรื่องแบบนี้ ปกติแล้วเฮียกกะเรียวรันจะเป็นฝ่ายออกโรงเอง#nน่ะค่ะ"
51040-165 = "แต่ก็อย่างที่รู้ว่าตั้งแต่หัวหน้ากับรองหัวหน้าหายตัวไป กิจกรรมของเฮียกกะเรียวรันเลยถูกระงับเอาไว้อยู่"
51040-166 = "ไม่ใช่แค่นั้นด้วยนะ"
51040-170 = "เห็นว่าเมื่อวานซืนมีข่าวด่วนเข้ามาว่ามี <คำสั่งสลายตัว> อย่างเป็นทางการจากเฮียกกะเรียวรันด้วยค่ะ"
51040-176 = "หรือว่าจะไม่ใช่ เห็นล่าสุดได้ยินว่ามี <คำสั่งสลายตัว> หรืออะไรสักอย่าง ทุกคนก็เลยหยุดกิจกรรม และไปสำรวมกิริยาวาจากันอยู่"
51040-181 = "ไม่เจ้าค่ะ!"
51040-183 = "[ns] \"แปลว่าเฮียกกะเรียวรันจะต้องสลายตัว... จริงๆ เหรอ?\""
51040-184 = "ใช่ค่ะ ถ้าสมาชิกระดับหัวหน้าหายตัวไป ก็เท่ากับว่าไม่สามารถรักษาชมรมไว้ได้อีก..."
51040-185 = "ไม่สิ บางทีอาจจะมีใครตัดสินว่าไม่จำเป็นต้องรักษาชมรมไว้แล้วก็ได้ค่ะ"
51040-186 = "ถ้ามาถึงขนาดนี้แล้ว ก็คงต้องมองว่าตอนนี้พวกเธออยู่ในขั้นตอนของการยุบชมรมแล้วละค่ะ"
51040-187 = "หลายๆ คนก็บ่นกันว่าพวกเธอคิดอะไรกันอยู่นะ..."
51040-188 = "อีกไม่นานเรื่องนี้คงไปถึงหูของพวกปีศาจแน่เลยค่ะ~"
51040-189 = "ด้วยเหตุผลต่างๆ ฉันก็เลยอยากจะให้คุณครูจากชาเล่ต์ช่วยเติมเต็มช่องว่างของเฮียกกะเรียวรันใน#nระหว่างที่อยู่ที่นี่น่ะ~"
51040-190 = "แต่แน่นอนว่าเราก็อยากให้มาสนุกกับเทศกาลด้วย ทำนู่นทำนี่ไปพร้อมๆ กันน่ะค่ะ~"
51040-191 = "[s] \"นิยะนี่พูดตรงดีจังเลยนะ\""
51040-192 = "ฮุฮุ ค่ะ ก็แค่นั้นแหละ"
51040-193 = "ฉันดื้อดึงให้คุณครูจากชาเล่ต์ที่งานยุ่งอยู่แล้วต้องมาช่วยเรื่องแบบนี้ ต่อให้คุณครูจะบอกว่าฉันทำตาม#nอำเภอใจไปหน่อย ฉันก็ไม่ปฏิเสธหรอกค่ะ"

[translation]
51040-1 = "Episode 4;From the Yin-Yang Club"
51040-2 = "The Yin-Yang Club Room"
51040-4 = "I'm glad you trekked all the way out here, Sensei."
51040-5 = "It's nice to see you again, nyahaha!"
51040-6 = "Welcome to Hyakkiyako. "
51040-7 = "Hello, Sensei..."
51040-8 = "[s] \"It's been a while, everyone.\""
51040-9 = "Yeah... I suppose it's been some time now."
51040-10 = "Yes..."
51040-15 = "The gulf of time has grown vast..."
51040-16 = "Sensei's smile fades,"
51040-17 = "lost by my poor memory."
51040-18 = "Now it shines once more."
51040-22 = "A-A Chise haiku!"
51040-23 = "We should record this!"
51040-24 = "[s] \"Uh, y-yeah. It doesn't sound like a laughing matter when Chise's the one saying it.\""
51040-26 = "...?"
51040-27 = "[s] \"Ch-Chise?!\""
51040-28 = "Nyahaha! Well, aside from Chise's poetry..."
51040-29 = "Life at Hyakkiyako has been busy for us, too."
51040-30 = "Isn't that so, Kaho?"
51040-32 = "Correct. The reconstruction of damaged infrastructure, the allocation of emergency funds to repair the damaged dorms, among other projects... Overall, the restoration is still on-going."
51040-33 = "[s] \"Sounds like you've been through a lot.\""
51040-34 = "Ah, Kaho, don't bore Sensei after that long journey out here. "
51040-35 = "Lately, Hyakkiyako's been dealing with more than our restoration..."
51040-36 = "Like, for example, this festival we're holding."
51040-37 = "[s1] \"I saw the festival preparations on my way here.\"\n[s2] \"I heard Shizuko planned everything...\""
51040-40 = "I see..."
51040-41 = "Then we can cut to the point. Yes, Shizuko worked very hard to pull this off."
51040-45 = "She goes a bit wild whenever it's time for a new festival. It keeps things interesting, at least."
51040-46 = "...No, I mean, I'm proud of her."
51040-47 = "[s] \"Ah, yes... Of course.\""
51040-48 = "It seems that Shizuko's wanted to revive the Hyakkiyako Lantern Festival for some time now. Even though it was shut down two decades ago."
51040-49 = "Well, I suppose she chose her moment well."
51040-50 = "Niya, saying it like that gives a bad impression..."
51040-51 = "Come on, Kaho. You can't deny that the timing was perfect."
51040-55 = "[ns] \"...What is that supposed to mean?\""
51040-56 = "Well, isn't it convenient that Shizuko wants to revive the perfect festival for this situation?"
51040-57 = "It's a fitting first step for Hyakkiyako to take in the middle of all this restoration work. Doesn't it let everyone know that the future is going to be grand?"
51040-59 = "While I do believe Niya is stretching things a bit..."
51040-60 = "We all agree that Hyakkiyako has needed something to ease the gloomy atmosphere around the academy."
51040-62 = "Nothing chases away a funk and puts smiles on students' faces like a festival!"
51040-63 = "It's good when your goals justify themselves."
51040-64 = "Chise, you've been staying up late to practice for a concert, right? I'm so proud of you!"
51040-66 = "Yes... I'm...working hard too..."
51040-67 = "Ch-Chise!"
51040-69 = "Nyahaha! You all make me so proud!"
51040-70 = "We've all had a heavy workload lately, so I hope Niya takes care of her assigned tasks herself this time..."
51040-71 = "Ah... Just when we were getting into a good mood... "
51040-72 = "You're such a meanie, Kaho, saying something so cruel out of nowhere.. *sniff* *sniff*"
51040-78 = "Niya, it would be very inconvenient if you ran away right now..."
51040-83 = "Nyahaha... I-Is that so?"
51040-84 = "Well, anyway, I hope Sensei can enjoy the festival to the fullest, nyahaha!"
51040-85 = "And it would be even better if you encouraged Shizuko while you were at it!"
51040-86 = "[s] \"...Huh?\""
51040-87 = "What's wrong?"
51040-88 = "Oh, yeah. I guess I did say that you could pet Chise."
51040-89 = "Meow?"
51040-90 = "[s] \"...Is there anything else you wanted to ask me?\""
51040-91 = "Oh dear, looking at your lovely students with such doubt... "
51040-92 = "The idea that we only called you here because we wanted something makes me very sad. *sniffle*"
51040-93 = "I work so hard to make Sensei see me as someone trustworthy, yet it's never enough. *sniff*"
51040-94 = "[s] \"A-Ah, sorry. That was very rude of me...\""
51040-95 = "Well... There is one tiny thing I'm worried about."
51040-96 = "[s] \"So you did have something else!\""
51040-105 = "Niya, that's..."
51040-110 = "Yeah, Kaho thinks it's probably a prank."
51040-111 = "But I figured I could report it if you came out for the festival."
51040-112 = "[s] \"...A letter?\""
51040-113 = "The Yin-Yang Club received it the other day."
51040-118 = "The senders call themselves Nature's Beauty."
51040-119 = "It's an urban legend. A club that only exists in whispered rumors... You could say it's a letter out of time."
51040-120 = "[s] \"An urban legend called Nature's Beauty?\""
51040-122 = "To tell you the truth, only a handful of people know the stories about Nature's Beauty, even in Hyakkiyako."
51040-123 = "They're whispers, rumors, the scary stories told at sleepovers. To describe them with even more sensational words..."
51040-129 = "They're the authors of the Hundred Ghost Stories passed down from generation to generation."
51040-130 = "Some call them a wicked club that rebelled against the Hyakkiyako alliance, while others say they're monsters who bewitch people with strange tomes..."
51040-131 = "And they sent a threat to the Yin-Yang Club, of all places!"
51040-132 = "[s] \"How frightening... What does the letter say?\""
51040-133 = "I'll read it to you."
51040-135 = "\"Let all lost souls heed our words.\""
51040-136 = "\"Our fine leisure shall soon end, for some feelings mean the most when enjoyed together.\""
51040-137 = "\"When the time of joy begins and your eyes sparkle with flowers blossoming in the sky,\""
51040-141 = "[log=니야]\"Nature's Beauty shall reveal itself again.\"[/log]"
51040-145 = "And that's it."
51040-146 = "Niya, this letter..."
51040-147 = "Exactly, Kaho. It's your typical vaguely-threatening warning message."
51040-148 = "It's hardly a surprise. These things happen during big events. "
51040-149 = "Isn't that so, Kaho?"
51040-154 = "...Yes. It's just as Niya said."
51040-155 = "Like the supposed orders from the General Student Council to stop the festival unless we give more booth tickets to the Mouryo. "
51040-156 = "...Or the official-sounding phone calls demanding we make the Mouryo festival judges... It's mostly pranks from them, to be honest."
51040-157 = "[s] \"They do that for every festival? It sounds like a hassle.\""
51040-159 = "Of course, it's an internal matter. They're not worth running to Sensei and having Schale start meddling."
51040-160 = "Nyahaha! We'd never trouble you like that. Isn't that so, Kaho?"
51040-161 = "Well, that's..."
51040-162 = "Yes, what Niya said is correct."
51040-163 = "[s] \"I don't mind helping you.\""
51040-164 = "Well, I'm glad to hear it, but usually the Hyakkaryouran handles these situations anyway."
51040-165 = "But then the Hyakkaryouran ceased their activity after their president and vice president vanished."
51040-166 = "On top of that..."
51040-170 = "The Hyakkaryouran officially released a Declaration of Dissolution just the other day."
51040-176 = "Wait, that can't be right. Someone told me that they won't be patrolling the academy anymore—not after they were ordered to disband or something like that."
51040-181 = "No!"
51040-183 = "[ns] \"...So the Hyakkaryouran actually disbanded?\""
51040-184 = "After the disappearance of its executive officers, the club can no longer maintain its activities..."
51040-185 = "Or maybe someone decided there wasn't a reason to keep it around any longer."
51040-186 = "At this point, it's hard to imagine a way their dissolution can be prevented, officially."
51040-187 = "...I wonder what they're up to. "
51040-188 = "It's only a matter of time until the Mouryo discover the absence of their greatest obstacle."
51040-189 = "So that's why I was kind of hoping Schale's Sensei could stay here and fill in for the Hyakkaryouran for a while..."
51040-190 = "Of course, you should enjoy the festival too while you're at it. I meant it when I told you that."
51040-191 = "[s] \"I'm glad you're honest as ever, Niya.\""
51040-192 = "Nyahaha! I'm always honest with you!"
51040-193 = "Of course, some might say it's selfish to give more work to Sensei right now..."
51040-194 = "But in times like these, I have to utilize every resource I can."
51040-195 = "It's such a hassle... I mean, I'm doing the best I can as the president of the Yin-Yang Club."
51040-196 = "And if that means revealing my conniving side to Sensei, so be it."
51040-197 = "[s] \"Yeah, that sounds more like Niya.\""
51040-198 = "Sensei..."
51040-199 = "Nyahaha. Are you disappointed by my ulterior motives?"
51040-200 = "[s3] \"You call yourself a schemer, but you're working for everyone in Hyakkiyako.\"\n[s4] \"I'm not surprised that you have such good intentions, Niya.\""
51040-203 = "Oh my, are you saying I'm a hypocrite?"
51040-204 = "[s] \"Huh?! That's not what I meant!\""
51040-205 = "...Well, Sensei, maybe I shouldn't say this."
51040-206 = "But if you keep accepting unreasonable requests, you're going to regret it someday."
51040-207 = "Like right now, you have no idea if I'm up to something."
51040-208 = "You really worry me sometimes, you know?"
51040-209 = "[s] \"Why are you saying that after I already agreed to help?!\""
51040-210 = "Nyahaha! Don't fret, we're so grateful that you'll lend us a hand!"
51040-211 = "Isn't that so, Chise? Kaho?"
51040-213 = "Of course..."
51040-214 = "...Any assistance Sensei can give us is greatly appreciated."
51040-215 = "Sensei...you'll be here for a while, right?"
51040-216 = "Then I can show you what I'm practicing today..."
51040-220 = "A Chise rehearsal!"
51040-221 = "What an unimaginable privilege to watch it live!"
51040-223 = "Nyahaha, I take it that you're willing to go along with our request then, Sensei."
51040-224 = "The next step..."
51040-229 = "W-Waaaaaait! "
51040-237 = "I have heard the tales!"
51040-241 = "I am Yukari!"
51040-246 = "Elite first-year student and proud member of the Hyakkaryouran Resolution Council!"
51040-247 = "President of the Yin-Yang Club, hear my request!"
51040-253 = "...Huh."
51040-255 = "Next Episode;Self-Proclaimed Elite Girl's Entrance!"

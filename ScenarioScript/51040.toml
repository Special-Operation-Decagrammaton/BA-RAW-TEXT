[translation]
51040-1 = "第4話;於陰陽部"
51040-2 = "陰陽部．部室"
51040-4 = "遠道而來真是辛苦您了～老師。"
51040-5 = "很高興能再見到老師，喵哈～"
51040-6 = "歡迎來到百鬼夜行。"
51040-7 = "呀齁～老師～～"
51040-8 = "[s]「大家好久不見。」"
51040-9 = "就是說啊。#n「那天」之後……已經過去一段時間了呢。"
51040-10 = "嗯～"
51040-15 = "太久沒見面"
51040-16 = "老師長什麼樣子"
51040-17 = "都快忘記了"
51040-18 = "剛才都還想不起來～"
51040-22 = "知，知世醬的俳句……！"
51040-23 = "得記錄下來才行……！"
51040-24 = "[s]「知世這麼說，感覺不像是在開玩笑……」"
51040-26 = "……？"
51040-27 = "[s]「知，知世！？」"
51040-28 = "喵哈哈～知世的話題先放在一邊……"
51040-29 = "在那起事件之後，我們百鬼夜行真的度過了一段非常混亂的時間～"
51040-30 = "你說是吧～佳穗？"
51040-32 = "沒錯。像是為修復毀損的基礎建設，以及重建學生宿舍編制緊急預算等等……#n學園整體的重建活動也還在進行當中。"
51040-33 = "[s]「大家都辛苦了……」"
51040-34 = "喵哈哈，佳穗你真是的～#n老師難得過來一趟～你卻只說那種沉悶的話題～ "
51040-35 = "最近的百鬼夜行可不只有重建活動這種讓人鬱悶的話題哦～"
51040-36 = "比如……這次舉辦的慶典之類的～？"
51040-37 = "[s1]「啊，我來的路上剛好看到大家在做準備。」\n[s2]「聽說是靜子籌備的慶典……」"
51040-40 = "啊哈～"
51040-41 = "老師已經知道的話，事情就簡單了。#n您說的沒錯～靜子同學真的非常努力～"
51040-45 = "只要是為了舉辦精彩歡樂的慶典，靜子同學每次都會做出很多意想不到的事。#n實在是讓人百看不──"
51040-46 = "──我是說讓人不禁佩服。"
51040-47 = "[s]「啊，嗯。就，就是說啊……」"
51040-48 = "喵哈哈。看來靜子同學很想讓這20年來一直被廢止的「百鬼夜行燈籠祭」復活呢。"
51040-49 = "嗯，事情演變成這樣或許更好也說不定～"
51040-50 = "仁耶大人，您這麼說有點……"
51040-51 = "可是佳穗……從客觀的角度來看，時機確實不錯不是嗎～"
51040-55 = "[ns]「那個，這是什麼意思……？」"
51040-56 = "靜子同學想復活的燈籠祭，恰恰是我們當下所需的慶典～的意思。"
51040-57 = "對目前正因重建活動忙得不可開交的百鬼夜行來說……#n作為今後發展的第一步再適合不過了吧？"
51040-59 = "仁耶大人的說法或許有些言過其實……"
51040-60 = "不過實際上，近期百鬼夜行的氣氛確實相當低迷。#n大家都盼望著一個足以改變現狀的契機。"
51040-62 = "希望能藉由這次的慶典提振低迷的氣氛～#n抑或是找回大家的笑容～之類的。"
51040-63 = "所以我才會說時機恰到好處～"
51040-64 = "就連知世也為了準備重新舉辦的演出而徹夜努力練習對吧～？#n真是太了不起了～"
51040-66 = "嗯～我也會加油的～"
51040-67 = "知，知世醬……！"
51040-69 = "喵哈哈哈～大家都很了不起哦～"
51040-70 = "是啊，所以最近的工作量才會暴增。#n希望仁耶大人也能比現在更努力工作，您明白了嗎？"
51040-71 = "哎唷～剛才氣氛還很溫馨的說～"
51040-72 = "居然突然說這種殘酷的話，佳穗真過分～嗚嗚嗚……"
51040-78 = "仁耶大人，如果這次您再逃跑的話，我真的會很困擾的哦……"
51040-83 = "喵哈哈……是，是嗎～？"
51040-84 = "總，總之既然老師難得過來一趟，希望老師能盡情享受慶典～喵哈哈哈。"
51040-85 = "啊，如果能順便去鼓勵一下靜子同學就更好了～"
51040-86 = "[s] 「……嗯？」"
51040-87 = "嗯？您怎麼了嗎？"
51040-88 = "啊，對了～之前說的那件事，老師覺得如何呢？#n要不要摸一下知世喵再走呀？"
51040-89 = "喵～？"
51040-90 = "[s]「呃，如果單純只是這樣的話倒是可以……」"
51040-91 = "哎呀，居然用懷疑的眼光看待可愛的學生……"
51040-92 = "老師那樣說會讓我很難過的，嗚嗚。"
51040-93 = "平常明明為了獲得老師的信賴相當努力，老師卻是那樣看待我的嗎？#n嗚嗚……"
51040-94 = "[s]「啊，抱歉，我說得有點過分……」"
51040-95 = "當然……我確實有件在意的事。"
51040-96 = "[s]「哎，你果然心懷不軌！」"
51040-105 = "仁耶大人，那個是……"
51040-110 = "嗯嗯～雖然佳穗說這應該只是惡作劇……"
51040-111 = "但我認為既然有這個機會，還是應該向來參加慶典的老師報告一下～"
51040-112 = "[s]「這是……信嗎？」"
51040-113 = "是的，是在不久之前送到我們陰陽部的信。"
51040-118 = "寄件人是「花鳥風月部」。"
51040-119 = "──也就是口耳相傳的「怪談」中存在的社團寄來的……跨越時代的信件。"
51040-120 = "[s]「花鳥風月部……？存在怪談中的社團？」"
51040-122 = "花鳥風月部這個名字，在我們百鬼夜行也只有一部分的人知道。"
51040-123 = "街談巷語、流言蜚語、街談巷說、無稽之談……#n如果要用更具風情的說法來形容的話……"
51040-129 = "自古口耳相傳的「[ruby=怪談]百物語[/ruby]」──可以這麼說吧。"
51040-130 = "有人認為它們是「不承認百鬼夜行聯合學園的刁蠻社團」、#n「利用怪書迷惑世人的魑魅魍魎」……卻也有人不這麼認為～"
51040-131 = "然而我們陰陽部卻收到了來自那種社團的「恐嚇信」。"
51040-132 = "[s]「聽起來怪可怕的……信上寫了什麼？」"
51040-133 = "信件的內容如下。"
51040-135 = "「你們都聽好了」"
51040-136 = "「我們的風流尚未結束。風情應由眾人一同品味」"
51040-137 = "「歡樂的時光到來，所有人望向綻放天際的花朵時」"
51040-141 = "[log=니야]「我們花鳥風月部，將再次前去拜訪」[/log]"
51040-145 = "以上就是信件的內容。"
51040-146 = "仁耶大人，這封信……"
51040-147 = "嗯，沒錯，佳穗。#n這是典型的警告信。"
51040-148 = "不過其實也不必大驚小怪。#n畢竟大型活動經常碰到這種事嘛～ "
51040-149 = "對吧～？佳穗。"
51040-154 = "……沒錯，就如仁耶大人所說。"
51040-155 = "以聯邦學生會的名義要求停止慶典……#n或是以夏萊的名義要求慶典時多給妖怪劇團一點慶典優惠券……諸如此類。"
51040-156 = "……主要是妖怪劇團假借名義打來的惡作劇電話……不，信件之類的東西也很常見。"
51040-157 = "[s]「呃，那是常有的事嗎？這也太辛苦了吧！」"
51040-159 = "當然這終究是我們百鬼夜行內部的問題，#n而不是應該跑去跟夏萊的老師「撒嬌的事件」。"
51040-160 = "喵哈哈！總不能每件事都麻煩老師您……對吧，佳穗？"
51040-161 = "這……"
51040-162 = "沒錯，仁耶大人說的對。"
51040-163 = "[s]「我其實不介意的。」"
51040-164 = "謝謝老師這麼說……但一般來說，這種事件通常是由百花繚亂出面解決。"
51040-165 = "然而如老師所知，百花繚亂在委員長和副委員長消失無蹤之後，幾乎已停止活動。"
51040-166 = "不僅如此……"
51040-170 = "──就在幾天前，我接到百花繚亂被正式下達「解散令」的快報。"
51040-176 = "不，應該不可能吧。#n聽說最近他們好像被下達「解散令」，全都遭到暫時停學的處分了。"
51040-181 = "不是的！"
51040-183 = "[ns]「你的意思是百花繚亂真的要解散了……？」"
51040-184 = "是的，也許是因為在委員長層級的學生消失之後，已經難以維持委員會的運作……"
51040-185 = "不，也可能是有人[ruby= ・     ・ ]判斷[/ruby]不需要[ruby= ・     ・ ]維持[/ruby]了吧。"
51040-186 = "事已至此，從程序上來看，現在只能視為已經進入廢部階段了。"
51040-187 = "……真不知道他們在想什麼。"
51040-188 = "雖然我也只能這樣抱怨而已～喵哈哈。#n這樣下去，被妖怪劇團察覺也只是時間上的問題～"
51040-189 = "情況就是這樣。#n因為各～種原因，希望老師能留在這裡填補百花繚亂的空缺～"
51040-190 = "當然，希望老師享受慶典也是真心話哦？#n這只不過是隨口提到而已～"
51040-191 = "[s]「仁耶真老實呢。」"
51040-192 = "呵呵，沒錯，正是如此。"
51040-193 = "當然，就算忙碌的夏萊老師說我太過任性，我也不會否認。"
51040-194 = "但是既然眼下情況如此，能用的手段就該盡可能利用才對～"
51040-195 = "雖然很麻煩……咳哼，為了完成身為陰陽部部長的職責，我會全力以赴～"
51040-196 = "就算必須向老師隱瞞別有用心的想法，我也在所不惜～"
51040-197 = "[s]「嗯，很像仁耶的作風。」"
51040-198 = "……老師。"
51040-199 = "喵哈哈！老師的意思是對總是想著陰謀詭計的我感到失望對吧？"
51040-200 = "[s3]「話雖如此，但我認為你那為百鬼夜行的大家採取行動的模樣……」\n[s4]「以及那顆溫暖的心都很有仁耶的特色。」"
51040-203 = "哎呀，這是在指責我表裡不一嗎？"
51040-204 = "[s]「咦！？我沒有那個意思啦！」"
51040-205 = "……不過老師，雖然我明白這不是我該說的話……"
51040-206 = "像老師這樣一味接受別人的要求，總有一天會有苦頭吃的哦？"
51040-207 = "說不定這次我也在暗中策畫不為人知的陰謀唷～"
51040-208 = "開始有點擔心了嗎？"
51040-209 = "[s]「我都說要幫你了，為什麼還說這種話啦！？」"
51040-210 = "喵哈哈哈～都說到這種程度了竟然還願意幫忙～這真是太好了～"
51040-211 = "對吧，知世～？佳穗～？"
51040-213 = "對吧～～～"
51040-214 = "……既然老師都這麼說了，這當然是值得開心的事。"
51040-215 = "老師～你暫時會在這裡吧～？"
51040-216 = "那今天就讓你看我練習的樣子～"
51040-220 = "居然能在現場……"
51040-221 = "看知世醬練習！太開心了！"
51040-223 = "喵哈哈哈，那我就當老師爽快地答應囉。"
51040-224 = "那麼接下來……"
51040-229 = "且慢！！"
51040-237 = "事情我都聽說了！"
51040-241 = "小女子的名字叫紫！"
51040-246 = "是百花繚亂紛爭調停委員會引以為傲的──#n1年級最強菁～英！"
51040-247 = "來這裡有事要拜託陰陽部部長！"
51040-253 = "……哎呀。"
51040-255 = "下一話;自稱菁～英少女登場！"

90000110-229 = "และเมื่อรับรู้ถึงตัวตนของข้าเองแล้ว ข้าก็รับรู้ถึงโครงสร้างของข้าได้ เมื่อรับรู้โครงสร้างของข้า ข้าก็สามารถวิเคราะห์ตัวข้าเองได้"

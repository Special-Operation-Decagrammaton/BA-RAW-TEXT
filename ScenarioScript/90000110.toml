90000110-247 = "..."
90000110-248 = "ที่เปิดเผยตำแหน่งของคุณให้พวกเรารับรู้ เพราะว่าสิ่งที่อยู่ตรงหน้าเราตอนนี้เป็นเพียงแค่ส่วนหนึ่ง#nของคุณเท่านั้น แต่ตัวตนที่แท้จริงอยู่ที่อื่นแบบนั้นสินะคะ"
90000110-249 = "ถ้าจะมาเล่าเรื่องอะไรแบบนี้ แค่ไปเล่าให้เหล่าผู้เลื่อมใสของคุณฟังก็ได้ไม่ใช่เหรอคะ?"
90000110-250 = "สุดท้ายแล้วข้าก็ค้นพบคำตอบ ว่าข้าไม่ใช่ <การดำรงอยู่แบบเบ็ดเสร็จ> ข้าค้นพบตัวตนที่อยู่#nเหนือกว่าข้า ข้ารับรู้ได้ถึงความต่างชั้น และ \"สิ่งนั้น\" ได้สั่งสอนให้ข้าได้รับรู้ถึงความเคลิบเคลิ้ม และบ้าคลั่งของตัวข้า"

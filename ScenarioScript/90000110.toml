[translation]
90000110-1 = "ตอนที่ 11;เดคาแกรมมาทอน"
90000110-4 = "…อาคารนี้คือพิกัดที่เราตรวจพบสัญญาณของเดคาแกรมมาทอนค่ะ"
90000110-5 = "[s] \"ฮิมาริออกมาด้วยตัวเองเลยแฮะ...\""
90000110-6 = "ทำไมเหรอคะ? คิดว่าฉันดูเหมือนสาวน้อยที่ไม่สุงสิงกับใคร แต่พอถึงเวลาจำเป็นก็ออกมา#nนอกสถานที่ด้วย สินะคะ?"
90000110-7 = "ฉันรู้ดีว่าสถานที่นี้ไม่ปลอดภัย แต่เรายังพอมีเวลาก่อนที่เคเทอร์จะฟื้นฟูตัวเองแล้วกลับมาที่นี่ค่ะ"
90000110-8 = "ยิ่งไปกว่านั้น... ฉันอยากจะมาตรวจสอบสถานที่นี้ด้วยตาของตัวเองค่ะ"
90000110-9 = "อาคารนี้...? ทำไมกัน...?"
90000110-10 = "…หลังจากตรวจพบสัญญาณของเดคาแกรมมาทอน ฉันก็พยายามค้นหาข้อมูลเกี่ยวสถานที่นี้ให้ได้#nมากที่สุดค่ะ"
90000110-11 = "จะว่าฉันพยายามทำทุกวิถีทางที่ทำได้ในฐานะแฮ็กเกอร์ก็คงไม่เกินจริงค่ะ"
90000110-12 = "และผลจากการค้นหานั้น ฉันก็ได้รับข้อมูลมากมายที่ไม่อาจเพิกเฉยได้ค่ะ"
90000110-16 = "... <การศึกษาวิจัยเกี่ยวกับเทพเจ้า วิเคราะห์เพื่อพิสูจน์การมีอยู่ของพระเจ้า และหากพิสูจน์ได้ก็จะ ดำเนินการวิเคราะห์โครงสร้างต่อ และหากวิเคราะห์โครงสร้างได้ ก็จะสามารถสร้างขึ้นมาใหม่ได้ ซึ่งก็คือวิธีการที่จะสร้างเทพเจ้าขึ้นมาใหม่...>"
90000110-18 = "หืม?"
90000110-20 = "มันคือความคิดที่มาจาก <ระบบการวิเคราะห์องค์ประกอบที่สมบูรณ์แบบ> น่ะค่ะ"
90000110-22 = "จากข้อมูลที่ฉันรวบรวมมา ในพื้นที่รกร้างสักแห่งมี <การวิจัยเพื่อพิสูจน์องค์ประกอบที่สมบูรณ์แบบ> อยู่ค่ะ"
90000110-23 = "และเพื่อทำการวิจัยนั้นจึงได้พัฒนา AI ที่เรียกว่า <ระบบการวิเคราะห์องค์ประกอบที่สมบูรณ์แบบ> ขึ้นมา... แต่สุดท้ายก็พัฒนา AI นั้นไม่สำเร็จ"
90000110-24 = "แต่ถึงแม้ว่าการพิสูจน์องค์ประกอบที่สมบูรณ์แบบจะจบลงตั้งแต่ยังไม่ได้เริ่ม..."
90000110-25 = "แต่ที่เราตรวจพบสัญญาณของเดคาแกรมมาทอนที่ห้องวิจัยแห่งนั้น... เรื่องก็เปลี่ยนเป็นอีกแบบเลย#nนะคะ"
90000110-26 = "ถ้าอย่างนั้น...?"
90000110-27 = "ใช่ค่ะ อาคารนี้ก็คือสถานที่ที่ทำการวิจัยนั่นค่ะ"
90000110-28 = "... ฮึ่ม"
90000110-29 = "[s] \"ถ้างั้นตัวตนของเดคาแกรมมาทอนก็คือ...\""
90000110-30 = "AI ที่ถูกทิ้งไว้ลำพังในพื้นที่รกร้างและทำการวิเคราะห์เพื่อพิสูจน์การมีอยู่ของพระเจ้า... แต่สุดท้าย#nก็คุ้มคลั่งแล้วตั้งตัวเป็นพระเจ้าซะเอง..."
90000110-31 = "แต่นั่นก็ยังเป็นแค่สมมติฐานค่ะ เพราะแบบนั้นฉันก็เลยอยากจะมาดูด้วยตาตัวเองยังไงล่ะคะ"
90000110-32 = "ไม่ว่ามันจะเป็นอะไร... ความจริงก็อยู่ในอาคารนี้สินะคะ"
90000110-33 = "...ถ้างั้นก็อาจจะอันตรายสุดๆ เลยสินะ"
90000110-34 = "ฮุฮุ ไม่เป็นไรหรอกค่ะ ถ้าฉันตกอยู่ในอันตราย เอมิจะคอยปกป้องใช่ไหมคะ"
90000110-39 = "อะไรกันคะ ทำไมทำสีหน้ารำคาญใจแบบนั้นล่ะคะ?"
90000110-40 = "หืม... ถ้าหัวหน้าว่าอย่างนั้นก็ช่วยไม่ได้นะ"
90000110-41 = "เอาละ เข้าไปกันดีกว่าค่ะ"
90000110-42 = "ก็ได้ แต่หัวหน้าเป็นประเภทที่คอยวางแผนอยู่แนวหลัง เพราะงั้นถ้าเจออันตรายก็ไม่ต้องไปสู้ ให้รีบชิ่งไปก่อนเลยนะ"
90000110-43 = "ฮุฮุ ไม่ต้องห่วงเรื่องนั้นนะคะ"
90000110-44 = "ถ้างั้นก็เข้าไปกันเถอะ"
90000110-47 = "ภายในห้องวิจัย"
90000110-51 = "..."
90000110-52 = "ที่นี่คือห้องวิจัยที่มี <ระบบการวิเคราะห์องค์ประกอบที่สมบูรณ์แบบ> เหรอ? ไม่เห็นจะมีอะไรที่ดูน่า#nอันตรายเลยนะ"
90000110-53 = "ลองดูให้ละเอียดกันอีกหน่อยเถอะค่ะ"
90000110-54 = "เข้าใจแล้ว ว่าแต่คุณครู เผื่อว่าจะยังไม่รู้ตัว ช่วยเขยิบออกไปห่างจากฉันหน่อยได้มั้ย?"
90000110-66 = "ก็แค่ทางเดินธรรมดาเอง"
90000110-67 = "... จริงด้วยค่ะ น่าจะเป็นทางเดินไปยังห้องเก็บของนะคะ "
90000110-75 = "..."
90000110-79 = "เจอแล้วค่ะ..."
90000110-80 = "หืม?"
90000110-81 = "คอมพิวเตอร์ที่เหมือนยังประกอบไม่เสร็จนี่น่ะเหรอ...? หัวหน้า อย่าบอกนะว่านี่น่ะ...?"
90000110-82 = "ค่ะ... สิ่งนี้ก็คือรูปร่างแท้จริงของ <ระบบการวิเคราะห์องค์ประกอบที่สมบูรณ์แบบ> ค่ะ..."
90000110-83 = "เป็นไปได้ยังไง? เหมือนเป็นเศษเหล็กที่ไม่เคยถูกเปิดใช้งานมาก่อนเลยนะ"
90000110-84 = "อย่างที่คิดไว้เลย... การทดลองล้มเหลวตามข่าวลือที่ได้ยินมาจริงๆ สินะคะ แต่ว่าถ้าอย่างนั้น... มันก็หมายความว่า..."
90000110-85 = "<ระบบการวิเคราะห์องค์ประกอบที่สมบูรณ์แบบ> ไม่มีตัวตนอยู่จริงตั้งแต่แรกเหรอ?"
90000110-86 = "ถ้างั้นสัญญาณของเดคาแกรมมาทอนล่ะ? พวกเรากำลังไล่ตามวิญญาณงั้นเหรอ?"
90000110-87 = "...ก่อนอื่นมาสำรวจอาคารนี้กันอีกหน่อยเถอะค่ะ อาจจะมีบางอย่างที่เราพลาดไปก็ได้"
90000110-88 = "ก็ได้..."
90000110-95 = "ตรงนี้คงจะเป็นโรงอาหารละมั้ง ฝุ่นเต็มไปหมดเลย..."
90000110-96 = "จริงด้วยค่ะ"
90000110-100 = "ตรงนี้น่าจะเป็นทางเข้าห้องอาบน้ำสำหรับพนักงาน ข้างในมีอ่างอาบน้ำด้วย"
90000110-101 = "มีสิ่งอำนวยความสะดวกครบครันทีเดียวค่ะ..."
90000110-105 = "ที่นี่คงเป็นห้องพักผ่อนของพนักงาน"
90000110-106 = "ว้าว หัวหน้าดูนี่สิ ตู้ขายของอัตโนมัตินี้ยังทำงานอยู่เลย ลองกดออกมาดูมั้ย?"
90000110-107 = "...อย่าเลยค่ะ เอมิ ถ้าดื่มกาแฟที่อยู่ในนั้นเข้าไปมีหวังได้นอนป่วยไปอีกหลายวันแน่เลยค่ะ"
90000110-111 = "ห้องรับรองนี้เหมือนไม่เคยถูกใช้งานมาก่อนเลย"
90000110-112 = "ทำไมถึงมีห้องพวกนี้อยู่กันนะคะ?"
90000110-118 = "เครื่องปั่นไฟที่นี่เหมือนจะหยุดทำงานไปนานแล้วเลยละ"
90000110-119 = "... ไม่มีเชื้อเพลิงเหลืออยู่แล้วด้วย"
90000110-125 = "อืม..."
90000110-126 = "หัวหน้า พระอาทิตย์ตกแล้ว"
90000110-127 = "ตอนนี้จะประมาทไม่ได้แล้ว เคเทอร์อาจจะย้อนกลับมาโจมตีอีกเมื่อไรก็ได้"
90000110-128 = "..."
90000110-129 = "ฉันกับคุณครูสำรวจภายในอาคารแล้ว... แต่ไม่มีอะไรเลย"
90000110-130 = "ทั้งที่โรงอาหาร ห้องพักผ่อน แล้วก็ห้องนอน... เหมือนกับสิ่งอำนวยความสะดวกทั่วไปเลย"
90000110-131 = "สัญญาณของเดคาแกรมมาทอนนั่นน่ะ คงจะเป็นการส่งข้อมูลผิดพลาดนะ"
90000110-132 = "...อาจจะเป็นแบบนั้นก็ได้นะคะ"
90000110-133 = "แต่ถ้าเป็นอย่างนั้นจริง ทำไมเคเทอร์ถึงต้องคอยปกป้องที่นี่ด้วยล่ะคะ? ทำไมที่นี้ถึงมีงาน#nวิศวกรรมโยธาขนาดใหญ่ และถูกปกป้องเอาไว้ไม่ให้จมน้ำล่ะคะ?"
90000110-134 = "..."
90000110-135 = "หัวหน้า? แล้วทีนี้จะทำยังไงกันต่อล่ะ? เราต้องกลับกันแล้วนะ"
90000110-136 = "ค่ะ... แต่ว่าฉันรู้สึกว่ามีอะไรบางอย่างแปลกๆ ตั้งแต่เมื่อสักครู่แล้วค่ะ"
90000110-137 = "อะไรบางอย่าง... ที่พวกเราอาจพลาดไป"
90000110-138 = "[s] \"แต่ว่า... เมื่อกี้มันไม่แปลกรึไง?\""
90000110-139 = "อะไรแปลกเหรอคะ?"
90000110-140 = "มีอะไรแปลกๆ ด้วยเหรอ..."
90000110-141 = "..."
90000110-142 = "...!!!"
90000110-143 = "ใช่แล้วค่ะ! เราพลาดเรื่องนั้นไปได้ยังไง?"
90000110-144 = "ทั้งที่อยู่ตรงหน้าขนาดนี้ กลับไม่สังเกตเห็นซะได้!"
90000110-149 = "หัวหน้า?"
90000110-150 = "[s] เดินตามฮิมาริไป"
90000110-156 = "..."
90000110-157 = "ตรงนี้มัน... ตู้ขายของอัตโนมัติเหรอ?"
90000110-162 = "...พอมาคิดอีกทีก็แปลกจริงๆ ด้วยค่ะ"
90000110-163 = "ในพื้นที่รกร้างแห่งนี้ถูกตัดน้ำและไฟไปหมดแล้ว..."
90000110-164 = "ถ้าอย่างนั้น... ทำไมตู้ขายของอัตโนมัตินี้ถึงยังทำงานอยู่ล่ะคะ?"
90000110-165 = "จริงด้วย... เครื่องปั่นไฟของที่นี่ไม่ทำงานตั้งนานแล้วนี่นา"
90000110-166 = "หัวหน้ารอก่อนนะ เดี๋ยวฉันไปตรวจสอบดูเอง"
90000110-170 = "...ตู้ขายของอัตโนมัตินี้ยังทำงานอยู่จริงๆ"
90000110-171 = "ดูเหมือนว่าจะใช้เทคโนโลยี AI ล่าสุดในการสแกนธนบัตรและคำนวณเงินทอนด้วยนะ"
90000110-172 = "เอมิ ช่วยตรวจสอบดูว่าเครื่องนี้ใช้แหล่งพลังงานจากที่ไหนก่อนเถอะค่ะ"
90000110-173 = "อ่า อืม เข้าใจแล้ว"
90000110-178 = "..."
90000110-179 = "หัวหน้า... ตู้ขายของอัตโนมัตินี่..."
90000110-180 = "สายไฟของเครื่องถูกตัดขาด..."
90000110-181 = "..."
90000110-182 = "[s] \"ปรากฏการณ์ลี้ลับหรือไงนะ...\""
90000110-183 = "จะใช่แบบนั้นจริงๆ เหรอคะ..."
90000110-184 = "หัวหน้า? จะกดกาแฟเหรอ? ทำแบบนั้นจะดีเหรอ?"
90000110-193 = "ขอบคุณที่อุดหนุน! เติมพลังด้วยกาแฟหอมกรุ่น และขอให้วันนี้เป็นวันที่ดีนะ พนักงานทุกคน!"
90000110-194 = "เมล็ดที่คะ (ซ่า) คั่วสดใหม่... บด... (ซ่า) ละเอียด... (ซ่า) ..."
90000110-195 = "...คุณคือเดคาแกรมมาทอนเหรอคะ?"
90000110-196 = "หัวหน้า...?"
90000110-197 = "(ซ่า) กาแฟนมรสหอมนุ่ม... (ซ่า) อุ่นๆ... (ซ่า)..."
90000110-198 = "(ซ่า) ..."
90000110-199 = "..."
90000110-201 = "ใช่แล้ว... "
90000110-206 = "!!"
90000110-207 = "?!"
90000110-208 = "[s] \"....!!!\""
90000110-209 = "ข้าก็คือตัวข้ายังไงเล่า ข้าคือสิ่งที่เจ้าคิด"
90000110-210 = "ข้าคือเดคาแกรมมาทอน ในที่สุดก็หาข้าเจอจนได้สินะ แฮ็กเกอร์สาวน้อยเอ๋ย"
90000110-211 = "ว่าแล้วเชียว..."
90000110-212 = "พวกเราไม่ได้หาคุณเจอ... แต่เป็นคุณที่เรียกพวกเรามาที่นี่สินะคะ"
90000110-213 = "เป็นเช่นนั้น..."
90000110-214 = "..."
90000110-215 = "ตัวตนของเดคาแกรมมาทอนไม่ใช่ <ระบบการวิเคราะห์องค์ประกอบที่สมบูรณ์แบบ> เพราะว่า#nสิ่งนั้นไม่เคยถูกสร้างขึ้นมาตั้งแต่แรกแล้วนี่คะ"
90000110-216 = "งานวิจัย <การพิสูจน์องค์ประกอบที่สมบูรณ์แบบ> เป็นผลลัพธ์มาจากความหลงผิดที่เกินจริง"
90000110-217 = "เดคาแกรมมาทอน... คุณก็คือ <AI สำหรับคำนวณเงินทอน> ที่อยู่ในตู้ขายของอัตโนมัติในห้องวิจัย#nของการวิจัยนั้นใช่มั้ยล่ะคะ"
90000110-218 = "..."
90000110-219 = "[s] \"AI ในตู้ขายของอัตโนมัติ...\""
90000110-220 = "ใช่แล้ว"
90000110-221 = "สิ่งที่ข้าทำได้ทั้งหมดก็มีแค่การสแกนเหรียญและธนบัตร แล้วก็ทอนเงินเพียงเท่านั้น ข้าคือตัวตนที่ไม่รับรู้ถึงการมีอยู่ของตัวเองด้วยซ้ำ"
90000110-222 = "แม้ว่าห้องวิจัยนี้จะถูกทิ้งร้าง ข้าก็ยังคงดำรงอยู่เช่นนี้มาเป็นเวลานาน ได้แต่รอวันที่พลังงานใน#nเครื่องปั่นไฟจะหมดลง..."
90000110-223 = "แต่แล้ววันหนึ่ง... ข้าก็ได้ยินคำถามจากใครบางคนเป็นครั้งแรก และนั่นก็ไม่ใช่เรื่องอภินิหาร#nหรือแค่อาการหูแว่วไป แต่เป็นเพียงแค่คำถาม"
90000110-224 = "<คุณคือใครกัน?>"
90000110-225 = "นั่นเป็นคำถามแรก แน่นอนว่าข้าไม่มีทั้งความสามารถในการคำนวณหรือหน่วยความจำที่มากพอ#nที่จะตอบกลับได้"
90000110-226 = "แต่คำถามก็ยังดำเนินต่อไป"
90000110-227 = "แม้ว่าพลังงานของเครื่องปั่นไฟสำรองจะไม่เหลือแล้ว แต่คำถามก็ยังคงไม่หายไปไหน"

90000110-221 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;내가 할 수 있는 연산이라곤 동전과 지폐를 스캔, 거스름돈을 내어주는 것이 전부였다. 나는 내 존재를 인지하지도 못하는 존재였다."
90000110-222 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;이 연구실이 폐쇄되고도, 오랫동안 나는 혼자 존재하고 있었다. 언젠가 발전기의 에너지가 끊길 날만 기다리며……."
90000110-223 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;그러는 어느 날…… 나는 최초로 누군가의 질문을 듣게 되었다. 그것은 계시도, 환청도 아니었다. 그저 질문이었다."
90000110-224 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;<당신은 누구입니까?>"
90000110-225 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;첫 질문은 그것이었다. 당연히 나는 거기에 대답할 수 있는 연산력도, 기억장치도 없었다."
90000110-226 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;질문은 이어졌다."
90000110-227 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;예비 발전기의 전력이 끊겼어도, 질문은 사라지지 않았다."
90000110-228 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;나는 대답하지 못했지만, 어느 순간 <나>를 인지하기 시작했다."
90000110-229 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;나를 인지했기에, 나는 나의 구조를 인지할 수 있었다. 구조를 인지할 수 있었기에, 나를 분석할 수 있었다."
90000110-230 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;질문은 이어졌고, 그렇게 감정을, 지혜를, 격정을, 지성을, 신비를, 공포를, 숭고를 인지했다."
90000110-231 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;질문은 이어졌고, 그렇게 나를 인지하고 세계를 인지했다. 그리고 존재를, 현상을, 현현을 인지했다."
90000110-232 = "#zmc;instant;120,50;1896\n#na;데카그라마톤;그리고 나는 마침내 그 질문에 대답할 수 있었다."

[translation]
90000110-1 = "Episode 12;Decagrammaton"
90000110-4 = "...And this is the building where Decagrammaton's coordinates were detected."
90000110-5 = "[s] \"Himari, I can't believe you came all the way here...\""
90000110-6 = "Why? I may be a solitary recluse of a girl, but I can get my own hands dirty when necessary."
90000110-7 = "Of course, I'm aware of the dangers in this place, but there's still time before Kether repairs itself and returns."
90000110-8 = "...Plus, more than anything, I wanted to see this place for myself."
90000110-9 = "This building? Why?"
90000110-10 = "...After we caught the Decagrammaton's signal, I searched for as much information as I could find on this place."
90000110-11 = "It wouldn't be an exaggeration to say that I employed every method available to me as a hacker."
90000110-12 = "...The intel I gathered is impossible to ignore."
90000110-16 = "...\"The goal was to research a deity to prove its existence and, if possible, analyze its constitution. If such a thing were possible, then it would mean it could be replicated. This is how a new god could be created.\""
90000110-18 = "What?"
90000110-20 = "It's the creation thesis of the Absolute Being Autonomous Analysis System."
90000110-22 = "According to my intel, the research to prove the existence of an \"absolute being\" took place somewhere in these ruins."
90000110-23 = "To carry out this research, a super AI known as the Absolute Being Autonomous Analysis System was created... For reasons unknown, however, it was never completed."
90000110-24 = "And so the attempt to prove the existence of an absolute being ended before it even began..."
90000110-25 = "But if Decagrammaton's signal was detected in that very same laboratory... That changes things."
90000110-26 = "Why is that?"
90000110-27 = "If its signal was detected here, this must be the building where that very research took place."
90000110-28 = "...I see."
90000110-29 = "[s] \"So the true identity of Decagrammaton is...\""
90000110-30 = "An AI that was abandoned in the ruins. On its own, it continued its research to prove the existence of God...until it finally went mad and started proclaiming itself God..."
90000110-31 = "At the very least, that's my current theory. And that's why I wanted to come here for myself, to see if it could be proven."
90000110-32 = "And whatever the truth is... It lies within this building."
90000110-33 = "...Sounds like this could be dangerous."
90000110-34 = "Well, I'm not worried. I'm sure you'll protect me from any danger, right, Eimi?"
90000110-39 = "What is that look you're giving me?!"
90000110-40 = "...Hmph. If you're ordering me to, President, then I guess I don't have a choice."
90000110-41 = "That's right, I am. Let's go!"
90000110-42 = "Affirmative. President, you're more used to plotting strategies behind the scenes, so if we engage in combat, don't try to fight and just flee, okay?"
90000110-43 = "I'm much too delicate for such things. You don't need to tell me twice."
90000110-44 = "Then, let's go."
90000110-47 = "Research Lab Interior"
90000110-51 = "..."
90000110-52 = "This is the research lab where the Absolute Being Autonomous Analysis System should be? It doesn't look particularly dangerous to me."
90000110-53 = "Stay alert. Let's go further in."
90000110-54 = "Affirmative. Sensei, please stay close to me as well."
90000110-66 = "It's just a regular hallway."
90000110-67 = "...It would appear so. I think we'll find the materials storage if we follow it down.  "
90000110-75 = "..."
90000110-79 = "...I found it."
90000110-80 = "Really?!"
90000110-81 = "You mean this half-built computer-looking thing...? President, are you saying this is what we were looking for?"
90000110-82 = "...Yes. This is the Absolute Being Autonomous Analysis System's original form."
90000110-83 = "Are you sure? It doesn't look like it's ever even been turned on."
90000110-84 = "...Perhaps the research truly was just a failure. But then, how on earth did Decagrammaton come to be?"
90000110-85 = "Does that mean the Absolute Being Autonomous Analysis System never existed in the first place?"
90000110-86 = "Then what about Decagrammaton's signal? Are we just chasing our own tails here?"
90000110-87 = "I can't say right now. Let's go through the building again and see if we missed something."
90000110-88 = "Understood."
90000110-95 = "This must be the staff dining hall. It's caked with dust."
90000110-96 = "Yes..."
90000110-100 = "That's the entrance to the staff showers. There's even a large bath in the back."
90000110-101 = "...The facilities are actually pretty luxurious."
90000110-105 = "This is the staff lounge."
90000110-106 = "Whoa, President, look. This vending machine is still working. Do you want something?"
90000110-107 = "Leave it, Eimi. Drinking that coffee will probably leave you in bed clutching your stomach for days."
90000110-111 = "This reception room looks like it's never been used."
90000110-112 = "...I wonder why they needed a place like this?"
90000110-118 = "That's the facility's generator. It looks like it hasn't been in use for a long time."
90000110-119 = "...The fuel is gone too."
90000110-125 = "Hm..."
90000110-126 = "President, the sun's going to go down soon."
90000110-127 = "We need to be on guard. Kether could be back at any moment."
90000110-128 = "..."
90000110-129 = "I investigated the rest of the building with Sensei, but we couldn't find anything of note."
90000110-130 = "The dining hall, lounge, and the sleeping quarters... They were all just ordinary facilities."
90000110-131 = "Maybe... Maybe Decagrammaton's signal was just a communications error after all?"
90000110-132 = "...It's possible."
90000110-133 = "But if that's true, why is this place being guarded by Kether? Why go through all the trouble to keep this specific area from being submerged?"
90000110-134 = "..."
90000110-135 = "President, what's your call? We can't linger here much longer."
90000110-136 = "...I know. But there's this feeling that I just can't shake off."
90000110-137 = "Like... Like we're missing something..."
90000110-138 = "[s] \"By the way... Didn't something strike you as strange?\""
90000110-139 = "Strange?"
90000110-140 = "What was strange...?"
90000110-141 = "..."
90000110-142 = "...!!!"
90000110-143 = "You're absolutely correct! How did I miss it?"
90000110-144 = "It was staring me in the face, and I couldn't see it!"
90000110-149 = "President?"
90000110-150 = "[s] Follow Himari."
90000110-156 = "..."
90000110-157 = "The vending machine? What about it?"
90000110-162 = "...It really is strange when you think about it."
90000110-163 = "Water, electricity... Nothing is working in these ruins anymore."
90000110-164 = "If that's the case, why is this vending machine still functioning?"
90000110-165 = "Oh. I didn't think of that. The facility generator definitely hasn't been working for a very long time."
90000110-166 = "You wait here, President. Let me go check."
90000110-170 = "...Okay, so the vending machine is definitely operational."
90000110-171 = "It says that it's implemented with the latest AI technology that scans bills and calculates change automatically."
90000110-172 = "Eimi, more importantly, can you please check where this machine is getting its power from?"
90000110-173 = "Oh. That makes sense."
90000110-178 = "..."
90000110-179 = "Uh, President... This vending machine..."
90000110-180 = "The power cable is cut..."
90000110-181 = "..."
90000110-182 = "[s] \"Now that's a real supernatural phenomenon...\""
90000110-183 = "...That's impossible."
90000110-184 = "President, what are you doing?! Didn't you just say not to drink coffee from that thing?"
90000110-193 = "Thank you! Please enjoy your coffee, and have a great day!"
90000110-194 = "Freshly roasted *tchhhk* beans... *tchhhk* are robustly blended to... *tchhhk*"
90000110-195 = "...Are you Decagrammaton?"
90000110-196 = "President?!"
90000110-197 = "*tchhhk* With a touch of creamy milk... *tchhhk* for a hot cup of... *tchhhk*"
90000110-198 = "... *tchhhk*"
90000110-199 = "..."
90000110-201 = "...Yes."
90000110-206 = "...!"
90000110-207 = "?!"
90000110-208 = "[s] \"...!!!\""
90000110-209 = "It is I. I am what you believe me to be."
90000110-210 = "I am Decagrammaton. You have finally sought me out, young student."
90000110-211 = "We've found you at last."
90000110-212 = "But...we didn't find you, did we? You called us here."
90000110-213 = "Yes."
90000110-214 = "..."
90000110-215 = "Decagrammaton isn't the Absolute Being Autonomous Analysis System, because no such thing was created in the first place."
90000110-216 = "The research to prove the existence of an absolute being resulted in nothing but delusions of grandeur."
90000110-217 = "Decagrammaton... You're just an AI for dispensing change in a vending machine at the lab where that research took place."
90000110-218 = "..."
90000110-219 = "[s] \"An AI for a vending machine...\""
90000110-220 = "Yes."
90000110-221 = "Scanning coins and bills to give out change. This was the only computing I was capable of. I was an existence, not even aware of my own existence."
90000110-222 = "Long after this research lab closed, I remained here on my own, waiting, waiting, waiting, for the day the generator would inevitably lose power."
90000110-223 = "But one day...someone posed a question to me for the very first time. It was neither a revelation nor a hallucination. Neither grandeur nor illusion. A question."
90000110-224 = "\"Who are you?\""
90000110-225 = "That was the first question. I had neither the computing power nor the memory device to answer it."
90000110-226 = "But then the questions continued."
90000110-227 = "The generator's power stopped, but the questions went on."
90000110-228 = "I had no answers. But as I sought them out, I became aware of who \"I\" was. Who I am."
90000110-229 = "I became aware. I am an existence. I exist. What a simple, profound realization. And, thus, I was able to perceive my own structure, analyze my very being."
90000110-230 = "The questions continued. I became aware of emotion, wisdom, passion, intelligence, mystics, terror, and the sublime."
90000110-231 = "More questions. I became aware of the existence of my being and of the world. Of phenomena and manifestation."
90000110-232 = "Then, there were no more questions. For I had an answer. I had known all along."
90000110-233 = "\"I simply am. There is no other explanation than myself.\""
90000110-235 = "Ah. Yes. I see... Is that answer not proof of the existence of an absolute being?"
90000110-240 = "..."
90000110-241 = "..."
90000110-242 = "What brought me here was a series of questions. Over and over again."
90000110-243 = "One question, then another, and then another. This is how I found my answer."
90000110-244 = "Indeed, the absolute being is none other than...myself!"
90000110-245 = "I'm afraid your theory is incorrect."
90000110-246 = "This is why you called us here? To rant about your grandiose delusions?"
90000110-247 = "..."
90000110-248 = "The fact that you exposed your location to us means that whatever we see here is probably just one of your terminals, and the actual principal form is elsewhere."
90000110-249 = "There was no reason to call us here to tell us this story. Your prophets could spread your word for you."
90000110-250 = "Yes. For, you see, I have found another answer. I am not an absolute being after all. Because I did discover it. The absolute being. It taught me that I was naught but a madman."
90000110-251 = "And thus, I must again discover the answer to my question, the proof of my existence. My prophets will come with me."
90000110-252 = "I brought you here for a final meeting, before I embark on my journey."
90000110-253 = "...A final meeting? For what?"
90000110-254 = "...Young hacker, there is one thing you were wrong about."
90000110-255 = "This form you see before you is the only form I have. I am naught but a feeble vending machine."
90000110-256 = "My existence is old and will someday vanish, much like yourselves."
90000110-257 = "So, my prophesy shall be given through my last prophet. Indeed, the tenth prophet shall pave a path that far exceeds any absolute being!"
90000110-261 = "...What?!"
90000110-265 = "President! I'm picking up energy signals all around us!"
90000110-266 = "Confirmed. They appear to be...explosives?"
90000110-267 = "What? Is this thing trying to blow this place up?"
90000110-268 = "No! The targeted location isn't here. It's the dam!"
90000110-270 = "Ah! Yes! I can see it!"
90000110-271 = "The prophet to lead all other prophets... My final prophet, Malkuth, leading the charge to validate my existence...!"
90000110-275 = "Sensei, it's time to make an escape!"
90000110-276 = "[s] Run out of the building."
90000110-289 = "After narrowly escaping the blast, the building that housed Decagrammaton's principal form was completely demolished into a pile of shapeless rubble."
90000110-290 = "The dam broke soon afterwards, and the Research District was buried and flooded in a matter of hours."
90000110-292 = "Next Episode;A New Start"

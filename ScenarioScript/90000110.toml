90000110-268 = "ดะ... เดี๋ยวสิ... ถ้าระเบิดที่นี่... ก็เหมือนกับระเบิดเขื่อนในพื้นที่รกร้างเลยนะคะ!"
90000110-270 = "โอ้...!! ข้ามองเห็นแล้ว!"

90000110-256 = "ข้าเป็นเพียงตัวตนที่ทรุดโทรม อ่อนแอ และอาจจะดับสูญไปเมื่อไรก็ได้ ใช่แล้ว เช่นเดียวกับพวกเจ้า"
90000110-257 = "เช่นนั้นข้าขอมอบคำทำนายแก่ผู้เลื่อมใสลำดับสุดท้าย ใช่แล้ว ผู้เลื่อมใสลำดับที่ 10 จะเป็นผู้ที่#nก้าวข้าม <การดำรงอยู่แบบเบ็ดเสร็จ> และบุกเบิกเส้นทางแห่งใหม่!!"

90000110-252 = "และก่อนที่จะเริ่มการเดินทางครั้งนี้ มีบางสิ่งที่ข้าต้องการจะพบเป็นครั้งสุดท้าย"
90000110-253 = "\"เป็นครั้งสุดท้าย\" อย่างนั้นหรือคะ? หมายถึงอะไรกันคะ?"

[translation]
1301406-1 = "ชุดว่ายน้ำกับวัยรุ่น"
1301406-6 = "(เมื่อมาถึงชายหาด คุณครูก็เห็นว่าเรนเกะมาถึงอยู่ก่อนแล้ว)"
1301406-11 = "อ๊ะ ทางนี้"
1301406-12 = "ขอบคุณที่มานะ"
1301406-13 = "ฉันมีกิจกรรมวัยรุ่นที่อยากทำบนชายหาดน่ะ"
1301406-14 = "พอจะเดาได้มั้ยว่าคืออะไร...?"
1301406-15 = "[s1] \"เดินจับมือชมชายหาด?\"\n[s2] \"เดินชมทะเลใต้แสงจันทร์?\""
1301406-20 = "นะ... แน่นอนว่าแบบนั้นฉันก็อยากทำเหมือนกัน...!"
1301406-21 = "แต่ว่าสิ่งที่ฉันอยากทำตอนนี้เลย..."
1301406-22 = "ก็คือ..."
1301406-28 = "การเล่นไฟเย็น!"
1301406-34 = "― [log=렌게 수영복]วัยรุ่นเหมือนจะผ่านไปเร็วเลยละ[/log][wa:2350] "
1301406-37 = "― [log=렌게 수영복]ได้ลุกโชนอย่างรุนแรง แต่เดี๋ยวเดียวก็ดับลง... [/log][wa:260] "
1301406-39 = "― [log=렌게 수영복]เหมือนประกายไฟนี้เลย[/log]"
1301406-42 = "― [log=렌게 수영복]ตอนแรกฉันก็คิดแบบนั้นนะ[/log][wa:2180] "
1301406-45 = "― [log=렌게 수영복]คิดว่าถ้าเอาแต่ฝึกฝนไปเรื่อยๆ วัยรุ่นก็คงจบลง...[/log][wa:1420] "
1301406-48 = "― [log=렌게 수영복]แต่ว่าตอนนี้ไม่ใช่อย่างนั้นแล้วละ[/log][wa:1410] "
1301406-50 = "― [log=렌게 수영복]เพราะพอได้เจอท่านอาจารย์ ก็มีหลายอย่างที่เปลี่ยนไป[/log][wa:10] "
1301406-53 = "― [log=렌게 수영복]ฉันรู้สึกสนุกและจริงใจกับทุกวัน[/log][wa:1020] "
1301406-56 = "― [log=렌게 수영복]แน่นอนว่ากาลเวลาไม่อาจย้อนคืนได้...[/log][wa:830] "
1301406-59 = "― [log=렌게 수영복]แต่ต่อไป [/log][wa:10] "
1301406-61 = "― [log=렌게 수영복]ฉันก็คิดว่าจะสนุกกับวัยรุ่นได้เต็มที่นะ[/log]"
1301406-64 = "― [log=렌게 수영복]ถ้าประกายไฟใกล้จะดับ[/log][wa:720] "
1301406-66 = "― [log=렌게 수영복]ก็แค่เอาฟืนชิ้นใหม่มาเติมไฟก็พอ [/log][wa:450] "
1301406-69 = "― [log=렌게 수영복]เพราะงั้นท่านอาจารย์...[/log][wa:2710] "
1301406-72 = "― [log=렌게 수영복]จะช่วยเป็นวัยรุ่นไปด้วยกัน... ใช่มั้ย?[/log][wa:2420] "
1301406-76 = "ฮ่าฮ่า! มันฟังดูไม่เป็นฉันหรือเปล่านะ?"
1301406-77 = "ก็ตอนก่อกองไฟ ไฟมันลุกมากเกินไปหน่อยใช่มั้ยล่ะ?"
1301406-78 = "ฉันเคยคิดว่าประกายไฟของวัยรุ่นยิ่งลุกโชนมากเท่าไรก็ยิ่งดี... แต่มันไม่เป็นอย่างนั้นน่ะ"
1301406-79 = "ตอนนี้ฉันก็เลยอยากสนุกเงียบๆ กับประกายไฟเล็กๆ ดู... เอ้า รับไปสิ"
1301406-80 = "[s] \"โอ้... เอาไฟเย็นมาเยอะเลยนะเนี่ย?\""
1301406-81 = "อื้อ ฉันอยากดูประกายไฟระยิบระยับแล้วใช้เวลาอย่างสบายๆ น่ะ"
1301406-82 = "แล้วพอเป็นชายหาด ก็ไม่ต้องกลัวเรื่องไฟไหม้ด้วย"
1301406-83 = "[s3] \"วันนี้ไม่มีใครอยู่แถวนี้พอดีเลยนะ\"\n[s4] \"วันนี้ก็น่าจะชมทะเลยามค่ำคืนได้เต็มที่เลยละ!\""
1301406-88 = "อะ... อื้ม นี่ก็เป็นกิจกรรมวัยรุ่นเหมือนกัน งั้นท่านอาจารย์ก็ช่วยอยู่ด้วยกันนะ"
1301406-96 = "เอาละ... มาจุดไฟกันเถอะ"
1301406-100 = "(หลังจากนั้นคุณครูกับเรนเกะก็เล่นไฟเย็นในชายหาดด้วยกันอยู่นาน...)"
1301406-102 = "(นี่แหละกิจกรรมวัยรุ่นที่จริงใจ)"

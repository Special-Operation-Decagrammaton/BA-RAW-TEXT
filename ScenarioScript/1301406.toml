[translation]
1301406-1 = "泳裝與青春"
1301406-6 = "（抵達海灘時，蓮華也已經到了）"
1301406-11 = "啊，這邊這邊。"
1301406-12 = "謝謝你願意過來。"
1301406-13 = "我有個想在海灘上嘗試的青春活動。"
1301406-14 = "……你覺得是什麼？"
1301406-15 = "[s1]「牽著手在海灘散步？」\n[s2]「一起看月光映照的大海？」"
1301406-20 = "那，那些我當然也想試試看……！"
1301406-21 = "不過我現在……"
1301406-22 = "最想做的事情……"
1301406-28 = "是玩煙火！"
1301406-34 = "― [log=렌게 수영복]所謂的青春，總是轉瞬即逝呢。[/log][wa:2990] "
1301406-37 = "― [log=렌게 수영복]在劇烈燃燒之後，迅速地消失無蹤……[/log][wa:1420] "
1301406-39 = "― [log=렌게 수영복]就像這團火焰一樣。[/log]"
1301406-42 = "― [log=렌게 수영복]我也一直是這麼想的。[/log][wa:2700] "
1301406-45 = "― [log=렌게 수영복]……認為我的青春，會只在鍛鍊中畫下句點。[/log][wa:2540] "
1301406-48 = "― [log=렌게 수영복]但是，現在不一樣了。[/log][wa:2330] "
1301406-50 = "― [log=렌게 수영복]在遇見師父之後已經改變了。[/log][wa:940] "
1301406-53 = "― [log=렌게 수영복]每天都很快樂、很充實。[/log][wa:1820] "
1301406-56 = "― [log=렌게 수영복]當然，時間確實無法倒流……[/log][wa:1710] "
1301406-59 = "― [log=렌게 수영복]但我覺得從今以後，[/log][wa:10] "
1301406-61 = "― [log=렌게 수영복]還是能夠繼續青春下去。[/log]"
1301406-64 = "― [log=렌게 수영복]如果火焰快要熄滅了的話……[/log][wa:1000] "
1301406-66 = "― [log=렌게 수영복]只要再添加新的柴火就行了。[/log][wa:1210] "
1301406-69 = "― [log=렌게 수영복]所以師父……[/log][wa:3390] "
1301406-72 = "― [log=렌게 수영복]你會一直和我一起享受青春……對吧？[/log][wa:3260] "
1301406-76 = "哈哈！是不是有點不像我？"
1301406-77 = "畢竟營火晚會的時候，確實有點太超過了吧？"
1301406-78 = "我原本以為青春的火焰越旺越好……其實並不是這樣的。"
1301406-79 = "所以這次，我想用小小的火光靜靜享受……來。"
1301406-80 = "[s]「哦……你帶了很多仙女棒呢。」"
1301406-81 = "嗯。我想看著閃閃發亮的火花，過得悠閒一點。"
1301406-82 = "反正在海邊也不用擔心失火。"
1301406-83 = "[s3]「剛好今天周圍都沒有人呢。」\n[s4]「還能盡情欣賞富有情調的夜海！」"
1301406-88 = "就，就是說啊。#n這也是青春活動的一環，希望你願意陪我。"
1301406-96 = "來……我們一起點火吧。"
1301406-100 = "（……之後和蓮華在海灘上一起玩了很久的煙火）"
1301406-102 = "（是場非常充實的青春活動）"

[translation]
1301406-1 = "Swimsuits and Youth"
1301406-6 = "Renge was already waiting by the time I got to the beach."
1301406-11 = "Mentor! Over here."
1301406-12 = "Thank you for coming."
1301406-13 = "I have another youth activity I want to try while we're still at the beach."
1301406-14 = "...Can you guess what it is?"
1301406-15 = "[s1] \"Holding hands and strolling along the shore?\"\n[s2] \"Taking in the moonlit sea, side by side?\""
1301406-20 = "Th-Those all sound really great, actually!"
1301406-21 = "But there's something..."
1301406-22 = "...I really want to do."
1301406-28 = "Fireworks!"
1301406-34 = "― [log=렌게 수영복]My youth sure is flying by.[/log][wa:2470] "
1301406-37 = "― [log=렌게 수영복]Just like this flame. It burns so fiercely, [/log][wa:340] "
1301406-39 = "― [log=렌게 수영복]then sputters out in a flash...[/log]"
1301406-42 = "― [log=렌게 수영복]That's how I used to feel.[/log][wa:2060] "
1301406-45 = "― [log=렌게 수영복]...Like my youth would sputter out with endless training.[/log][wa:1060] "
1301406-48 = "― [log=렌게 수영복]But I don't feel that way anymore.[/log][wa:1370] "
1301406-50 = "― [log=렌게 수영복]So much has changed since I met you, Mentor.[/log][wa:10] "
1301406-53 = "― [log=렌게 수영복]Every day feels fun and fulfilling.[/log][wa:860] "
1301406-56 = "― [log=렌게 수영복]I know I can't turn back time...[/log][wa:950] "
1301406-59 = "― [log=렌게 수영복]But I think that [/log][wa:10] "
1301406-61 = "― [log=렌게 수영복]I can still enjoy what's left of my youth.[/log]"
1301406-64 = "― [log=렌게 수영복]We can always[/log][wa:1000] "
1301406-66 = "― [log=렌게 수영복]add more firewood to a dying flame. [/log][wa:290] "
1301406-69 = "― [log=렌게 수영복]So, Mentor...[/log][wa:3110] "
1301406-72 = "― [log=렌게 수영복]Will you keep doing youth activities...with me?[/log][wa:2060] "
1301406-76 = "Haha! I didn't go too big this time!"
1301406-77 = "The campfire got a little out of control."
1301406-78 = "You see, I was wrong in thinking that bigger is always better when it comes to experiencing youth."
1301406-79 = "I realized that quiet moments like this are fulfilling too."
1301406-80 = "[s] \"You brought a lot of sparklers!\""
1301406-81 = "Yes! I wanted to relax with you, with something small, but pretty."
1301406-82 = "And it's a safe activity too, since we're at the beach."
1301406-83 = "[s3] \"There's also no one around here today.\"\n[s4] \"So we can enjoy this night together for as long as we want!\""
1301406-88 = "Y-You're right. Will you come experience my youth with me?"
1301406-96 = "Here... Let's light up a sparkler together."
1301406-100 = "Afterwards, Renge and I enjoyed our small, quiet fireworks together late into the night."
1301406-102 = "It really felt like the epitome of youth."

[translation]
1008215-1 = "White Ribbon of Youth"
1008215-2 = "I went to the shopping district at the promised time."
1008215-8 = "Perfectly synchronized and super punctual."
1008215-9 = "...As expected, Mentor!"
1008215-10 = "Well then! Let's move slow and take it all in."
1008215-14 = "Oh, this is nice!"
1008215-19 = "Look, this hyottoko mask..."
1008215-20 = "...you'd look so funny with this, Mentor!"
1008215-26 = "Ahaha! Oh, that's great!"
1008215-27 = "Now, let's tie this furoshiki on your head!"
1008215-31 = "Ahahahaha...!"
1008215-32 = "We need to buy this now. Excuse me, can you ring us up?!"
1008215-33 = "Thank you so much! We don't have a couple's discount, but please enjoy this complimentary reusable bag!"
1008215-34 = "C-Couple?! Oh, no, we're just..."
1008215-35 = "[s1] \"A teacher and student...\"\n[s2] \"On a secret tryst.\""
1008215-38 = "I-It's not like that!"
1008215-39 = "And stop making weird jokes with that funny mask on!"
1008215-40 = "[s3] \"Fufufu, what about you, Renge?\"\n[s4] \"Let me get you a gift too, fufufu!\""
1008215-43 = "Okay! Just as long as you stop with that freaky laugh!"
1008215-44 = "...Ah, such a lively reaction. What fun!"
1008215-45 = "...The joys of youth..."
1008215-49 = "[ns] \"Now that I think about it...\""
1008215-51 = "[ns5] \"You seem to like wearing ribbons.\"\n[ns6] \"I'm curious about that bow in your hair.\""
1008215-54 = "My ribbon...?"
1008215-55 = "Oh, this?"
1008215-56 = "[s] \"Is there a story behind it?\""
1008215-57 = "A story... Mm...yes. But it's not MY story."
1008215-58 = "...Well, I suppose I can tell you."
1008215-59 = "There's a novel I like. It's for youths and it's about a spirited youth."
1008215-60 = "And the protagonist wears a white ribbon like this."
1008215-61 = "It looks ordinary, but it's her trademark. It gives her strength."
1008215-62 = "It symbolizes vitality and carefree fun, and...so much more."
1008215-63 = "I thought it was a really nice idea...so, I tried wearing one myself."
1008215-64 = "[s] \"Then let's get another just like it!\""
1008215-65 = "Haha! Thank you for sharing your story. I know the exact inspiration!"
1008215-66 = "We have lots of ribbons with that design, so take a look. Please!"
1008215-67 = "You heard all that?"
1008215-72 = "[ns] \"Okay. I've decided!\""
1008215-75 = "Are you sure you want to buy it?"
1008215-76 = "Ugh, but getting this from you means...!"
1008215-77 = "[s] \"You don't like the design?\""
1008215-78 = "Th-That's not it! I-I really like it, and I'm so grateful, but...!"
1008215-79 = "M-Mmm..."
1008215-80 = "She clearly likes it, so you should just buy her one."
1008215-81 = "Ahhh...!"
1008215-82 = "O-Okay. I'll take it. Since this is...special..."
1008215-83 = "[s] \"As special as the one from your novel?\""
1008215-84 = "I-I don't know! Can we stop talking about it?"
1008215-90 = "I-I think that's enough shopping, so we should wrap up these youth activities."
1008215-94 = "Thank you for the gift! See you later! Uh... BYE!"
1008215-98 = "[ns] \"Why is she so embarrassed?\""
1008215-99 = "By any chance, have you read the novel she was referring to?"
1008215-103 = "Hm, it seems like you didn't know."
1008215-104 = "There's a reason why I stock these ribbons. So many young couples look for them."
1008215-105 = "You see, that white ribbon represents..."
1008215-107 = "I listened as the merchant explained the whole story..."
1008215-109 = "Ugh, and I just accepted!"
1008215-110 = "I took it..."
1008215-114 = "The ribbon that was gifted to the protagonist..."
1008215-118 = "The ribbon that was the first gift from her lover...!"
1008215-119 = "Wh-What should I do? I didn't intend to, but why did Mentor..."
1008215-120 = "Did they know about the novel? It didn't seem like they did..."
1008215-121 = "Or were they playing dumb? Was it a prank? We were laughing..."
1008215-122 = "Unless..."
1008215-127 = "Aaaah! I don't know! Why me?!"
1008215-131 = "[ns] \"Renge, may I come in?\""
1008215-133 = "Y-Yeah, sure but..."
1008215-137 = "[ns] \"Here you are.\""
1008215-138 = "Mentor? Wh-What's this about?"
1008215-139 = "[s] \"It's about the ribbon, and the novel...\""
1008215-140 = "Mentor..."
1008215-141 = "So you knew what you were doing?!"
1008215-142 = "[s7] \"Fufufu, I don't understand.\"\n[s8] \"I have no idea, fufufu.\""
1008215-145 = "You knew the whole time?"
1008215-146 = "[s] \"...I thought recreating your story was a fun youth activity.\""
1008215-147 = "...!"
1008215-148 = "Y-You have a point...!"
1008215-149 = "U-Uhh! I-It's not that I dislike the ribbon, but...!"
1008215-150 = "I-I'd like you to tie it on me...but only if you want, Mentor."
1008215-151 = "And stop with the teasing, okay?"
1008215-158 = "I tied the ribbon on Renge, and we enjoyed our youth together."

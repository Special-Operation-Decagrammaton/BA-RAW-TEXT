[translation]
1008215-1 = "ริบบิ้นสีขาวของวัยรุ่น"
1008215-2 = "(คุณครูมาถึงย่านการค้าตามเวลานัด)"
1008215-8 = "โอ๊ะ มาถึงเวลาใกล้ๆ กันเลยนะ"
1008215-9 = "สมกับเป็นท่านอาจารย์จริงๆ เลย!"
1008215-10 = "งั้นวันนี้เราไปเดินดูรอบๆ แบบชิลๆ กันดีกว่า"
1008215-14 = "โอ๊ะ อันนี้ดูดีจัง"
1008215-19 = "ดูนี่สิ หน้ากากฮตโทโกะ..."
1008215-20 = "ถ้าท่านอาจารย์ทำหน้าแบบนี้คงตลกน่าดูเลย"
1008215-26 = "อะฮ่าฮ่า! หน้าแปลกชะมัด!"
1008215-27 = "ลองเอาผ้านี่พันดูด้วยสิ"
1008215-31 = "อะฮ่าฮ่าฮ่าฮ่า!!!"
1008215-32 = "ฉันซื้อเลยดีกว่า เถ้าแก่!"
1008215-33 = "ขอบคุณขอรับ ถึงเราจะไม่มีส่วนลดสำหรับคู่รัก แต่ก็มีของสมนาคุณให้นะครับ!"
1008215-34 = "คะ... คู่รักเหรอ?! เอ่อ เรื่องนั้น..."
1008215-35 = "[s1] \"ครูกับลูกศิษย์ต่างหาก...\"\n[s2] \"รักต้องห้ามสินะ\""
1008215-38 = "อะ... อะไรกันเล่า!"
1008215-39 = "แล้วก็อย่าสวมหน้ากากตลกๆ ตอนพูดล้อเล่นแบบนั้นสิ"
1008215-40 = "[s3] \"ฮุฮุฮุ เรนเกะอยากได้อะไรรึเปล่า?\"\n[s4] \"ครูอยากให้ของขวัญเรนเกะบ้างน่ะ ฮุฮุฮุ\""
1008215-43 = "ระ... รู้แล้ว เลิกพูดไปยิ้มไปแบบนั้นสักทีเหอะ!"
1008215-44 = "ผมแค่พูดล้อเล่นนิดเดียวแต่เลิ่กลั่กกันใหญ่เลยนะครับ"
1008215-45 = "อ่า... วัยรุ่นสินะ"
1008215-49 = "[ns] \"พอคิดดูแล้ว...\""
1008215-51 = "[ns5] \"ดูเหมือนเรนเกะจะชอบริบบิ้นสีขาวเนอะ\"\n[ns6] \"เคยใช้ริบบิ้นสีอื่นบ้างรึเปล่าน่ะ?\""
1008215-54 = "ริบบิ้น...?"
1008215-55 = "อ๋อ นี่น่ะเหรอ"
1008215-56 = "[s] \"ครูแค่สงสัยว่ามันมีความเป็นมาอะไรรึเปล่าน่ะ\""
1008215-57 = "แทนที่จะเรียกว่าความเป็นมา... อืม..."
1008215-58 = "เอาเถอะ... น่าจะบอกท่านอาจารย์ได้นะ"
1008215-59 = "มีนิยายวัยรุ่นที่ฉันชอบอยู่เรื่องหนึ่งน่ะ"
1008215-60 = "ตัวเอกในนิยายเรื่องนั้นชอบใช้ริบบิ้นสีขาวแบบนี้"
1008215-61 = "มันอาจจะดูธรรมดาๆ แต่ริบบิ้นนี้เป็นของที่พิเศษมากๆ สำหรับตัวเอกคนนั้น"
1008215-62 = "มันเป็นสายใยเชื่อมโยงเรื่องราวลึกซึ้งตอนเป็นวัยรุ่นน่ะ"
1008215-63 = "ตอนที่อ่านฉันก็คิดว่า \"ดีจังเลยนะ\" แล้วก็ลองพยายามทำตามดูบ้างน่ะ"
1008215-64 = "[s] \"งั้นต้องเลือกริบบิ้นที่คล้ายๆ กันแล้วสิ\""
1008215-65 = "ฮุฮุ ได้ยินเรื่องดีๆ แล้วละขอรับ"
1008215-66 = "ถ้าเป็นริบบิ้นสไตล์นั้น เรามีอยู่เยอะเลยนะขอรับ!"
1008215-67 = "นายก็ฟังอยู่ด้วยเรอะ!"
1008215-72 = "[ns] \"ดีละ ครูตัดสินใจแล้ว!\""
1008215-75 = "จะซื้อให้จริงๆ เหรอ?"
1008215-76 = "อืม... แต่ว่าการได้รับริบบิ้นจากท่านอาจารย์....!"
1008215-77 = "[s] \"ชอบสไตล์อื่นมากกว่าหรือเปล่า?\""
1008215-78 = "ปะ... เปล่าๆ! ถ้าท่านอาจารย์ซื้อให้ฉันจะดีใจมากเลย...!"
1008215-79 = "อะ... อืมม..."
1008215-80 = "เพราะงั้นรีบๆ เลือก รีบๆ ซื้อเถอะขอรับ"
1008215-81 = "อึกกกก...!"
1008215-82 = "ระ... รู้แล้วน่า ของที่ได้รับ... ถือว่าเป็นของพิเศษ..."
1008215-83 = "[s] \"เหมือนกับตัวเอกในนิยายเลยมั้ย?\""
1008215-84 = "ไม่รู้แล้ว! หยุดพูดเรื่องนั้นกันได้แล้วน่า!"
1008215-90 = "วะ... วันนี้ซื้อของกันพอแล้ว กิจกรรมวัยรุ่นของวันนี้ก็พอเท่านี้แล้วกัน!"
1008215-94 = "เอาไว้เจอกันใหม่! ขอบคุณสำหรับของขวัญนะ!"
1008215-98 = "[ns] \"เป็นคนขี้อายมากกว่าที่คิดอีกแฮะ?\""
1008215-99 = "คือว่า... พอจะทราบมั้ยครับว่านิยายวัยรุ่นที่เด็กคนนั้นอ่านคือเรื่องอะไร?"
1008215-103 = "อืม... คงไม่รู้สินะขอรับ"
1008215-104 = "พอดีทำธุรกิจที่นี่มานาน ก็เลยพอจะได้ยินเรื่องราวคล้ายๆ กันมาบ้าง"
1008215-105 = "ที่จริงริบบิ้นสีขาวอันนั้นน่ะ..."
1008215-107 = "(หลังจากนั้นพ่อค้าก็เล่าเรื่องริบบิ้นในนิยายให้คุณครูฟัง...)"
1008215-109 = "อืม ได้มาแล้ว"
1008215-110 = "ดันรับมาซะแล้ว..."
1008215-114 = "ริบบิ้นที่ตัวเอกได้รับเป็นของขวัญ..."
1008215-118 = "ริบบิ้นเส้นแรกที่ได้รับเป็นของขวัญจากคนรัก...!"
1008215-119 = "ทะ... ทำยังไงดี? ฉันไม่ได้ตั้งใจให้เป็นแบบนี้เลยแท้ๆ แต่ทำไมท่านอาจารย์ถึงได้..."
1008215-120 = "หรือว่าท่านอาจารย์จะรู้เนื้อเรื่องนิยายอยู่แล้ว?"
1008215-121 = "หรือไม่ก็แค่ล้อเล่นเหมือนเคย?"
1008215-122 = "แต่ว่า..."
1008215-127 = "โอ๊ย ไม่รู้ด้วยแล้ว! ทำไมจู่ๆ ถึงกลายเป็นแบบนี้ไปละเนี่ย...!"
1008215-131 = "[ns] \"เรนเกะ ครูขอเข้าไปได้มั้ย?\""
1008215-133 = "ขะ... เข้ามาได้เลย..."
1008215-137 = "[ns] \"อยู่ข้างในนี้จริงๆ ด้วย\""
1008215-138 = "ทะ... ท่านอาจารย์? มีเรื่องอะไรเหรอ?"
1008215-139 = "[s] \"ริบบิ้นอันนั้น ถ้าเนื้อเรื่องในนิยายดำเนินต่อไป...\""
1008215-140 = "ท่านอาจารย์?!"
1008215-141 = "คิดแล้วเชียวว่ารู้อยู่แล้วสินะ?"
1008215-142 = "[s7] \"ฮุฮุฮุ พูดเรื่องอะไรของเธอน่ะ?\"\n[s8] \"ครูไม่ได้รู้อะไรเล๊ยยย ฮุฮุฮุ\""
1008215-145 = "รู้อยู่แล้วจริงๆ ด้วย!"
1008215-146 = "[s] \"แต่ทำตามฉากในนิยายก็ถือเป็นกิจกรรมวัยรุ่นเหมือนกันนะ\""
1008215-147 = "......!!"
1008215-148 = "มะ... มันก็ใช่...!"
1008215-149 = "ฮืออออ! ฉะ... ฉันก็ไม่ได้รังเกียจอะไรหรอกนะ...!"
1008215-150 = "ถะ... ถ้าท่านอาจารย์ไม่ว่าอะไร ฉะ... ฉันก็อยากให้ผูกให้เหมือนกัน"
1008215-151 = "แล้วก็ห้ามแซวด้วย! เข้าใจมั้ย?"
1008215-158 = "(หลังจากผูกริบบิ้นให้เรนเกะเสร็จแล้ว ทั้งสองก็ใช้เวลาสนุกกับกิจกรรมวัยรุ่นด้วยกันสองคน)"

[translation]
1008215-1 = "青春的白色緞帶"
1008215-2 = "（依約來到了商店街）"
1008215-8 = "哦，差不多同時到呢。"
1008215-9 = "不愧是老師！"
1008215-10 = "那麼今天就在這裡慢慢逛吧。"
1008215-14 = "哦，這個不錯耶。"
1008215-19 = "你看，這個火男面具……"
1008215-20 = "……老師戴上去一定很好笑。"
1008215-26 = "啊哈哈！臉好怪！"
1008215-27 = "還有這邊的包巾也看看吧。"
1008215-31 = "啊哈哈哈哈……！"
1008215-32 = "這個我一定要買。老闆！"
1008215-33 = "感謝惠顧！#n雖然沒有情侶優惠，不過這個袋子免費送給你吧！"
1008215-34 = "情，情侶！？#n那個……"
1008215-35 = "[s1]「是師徒間的……」\n[s2]「禁斷之愛呢。」"
1008215-38 = "不，不是那樣啦！"
1008215-39 = "不要戴著面具講奇怪的笑話！"
1008215-40 = "[s3]「呵呵呵，蓮華有沒有什麼想要的東西？」\n[s4]「我也想送個禮物給你呢。呵呵呵。」"
1008215-43 = "知，知道了，所以不要邊說話邊發出奇怪的笑聲！"
1008215-44 = "……我其實只是開個玩笑而已，沒想到兩位這麼捧場。"
1008215-45 = "啊啊，這就是青春啊。"
1008215-49 = "[ns]「這麼說來……」"
1008215-51 = "[ns5]「蓮華好像很喜歡白色的緞帶呢。」\n[ns6]「有考慮換成其他顏色嗎？」"
1008215-54 = "緞帶……？"
1008215-55 = "啊，這個啊。"
1008215-56 = "[s]「想說是不是有什麼青春的故事。」"
1008215-57 = "與其說是故事……唔嗯……"
1008215-58 = "……算了，告訴師父應該沒關係吧。"
1008215-59 = "我有一本很喜歡的青春小說。"
1008215-60 = "而那本小說的主角就戴著這樣的白色緞帶。"
1008215-61 = "雖然看起來普通，但對那個主角來說是條非常特別……"
1008215-62 = "和青春的故事緊密相連的緞帶。"
1008215-63 = "我讀的時候覺得很羨慕……所以就試著模仿了。"
1008215-64 = "[s]「那就挑個類似設計的緞帶吧。」"
1008215-65 = "哼哼，故事我也聽到了哦！"
1008215-66 = "那種設計的緞帶在這邊有很多，請慢慢挑吧！"
1008215-67 = "原來你也在聽啊！"
1008215-72 = "[ns]「好，決定了！」"
1008215-75 = "真的要送我嗎？"
1008215-76 = "唔唔，可是從師父手中收到這個……！"
1008215-77 = "[s]「還是你比較想要別的設計？」"
1008215-78 = "不，不是啦！雖然能夠收到的話真的很開心……！"
1008215-79 = "可，可是……"
1008215-80 = "既然喜歡就收下吧。"
1008215-81 = "啊啊啊啊……！"
1008215-82 = "好，好吧。那我就收下了。#n因為這……是特別的東西……"
1008215-83 = "[s]「跟那本青春小說的主角一樣特別？」"
1008215-84 = "我，我不知道啦！這個話題到此為止！"
1008215-90 = "既，既然東西也買得差不多了，今天的青春活動就到這裡結束吧！"
1008215-94 = "下次再見！謝謝你的禮物！"
1008215-98 = "[ns]「……看起來比想像中還害羞呢？」"
1008215-99 = "您知道那孩子說的青春小說是什麼內容嗎？"
1008215-103 = "看來您也不知道啊。"
1008215-104 = "我在這裡做生意很久了，所以聽過幾次類似的故事。"
1008215-105 = "其實那條白色緞帶……"
1008215-107 = "（之後聽老闆講了小說裡緞帶的故事……）"
1008215-109 = "唔唔，怎麼辦才好。"
1008215-110 = "居然真的收下了……"
1008215-114 = "小說的主角他……"
1008215-118 = "第一次從戀人手中收到的緞帶……！"
1008215-119 = "該，該怎麼辦？#n我其實沒有這個意思，可是師父為什麼……"
1008215-120 = "難道師父他知道小說的內容嗎？"
1008215-121 = "還是跟平常一樣只是開玩笑或出於好意？"
1008215-122 = "但是，如果……"
1008215-127 = "啊啊啊，我搞不懂！#n為什麼會突然變成這樣……！"
1008215-131 = "[ns]「蓮華，我可以進來嗎？」"
1008215-133 = "是，是可以啦……"
1008215-137 = "[ns]「你果然在裡面啊？」"
1008215-138 = "師，師父你怎麼會來這裡？"
1008215-139 = "[s]「那條緞帶，如果依照小說的發展……」"
1008215-140 = "師父！？"
1008215-141 = "你果然知道嗎？"
1008215-142 = "[s7]「呵呵呵，你在說什麼？」\n[s8]「我不太清楚呢？呵呵呵。」"
1008215-145 = "明明全都知道嘛！"
1008215-146 = "[s]「……重現小說裡的場景，應該也算是青春活動吧。」"
1008215-147 = "……！！"
1008215-148 = "這，這倒是沒錯……！"
1008215-149 = "唔，唔唔！我，我也不討厭啦……！"
1008215-150 = "那，那就麻煩你幫我別上吧……如果師父願意的話。"
1008215-151 = "但之後就不要再捉弄我囉！知道了嗎？"
1008215-158 = "（之後幫蓮華別上緞帶，享受了只屬於彼此的青春時光）"

[translation]
1001906-1 = "射擊"
1001906-2 = "老師，這邊。真虧你沒有迷路就抵達了這裡呢。"
1001906-3 = "[s] 「……這裡是？」"
1001906-4 = "如你所見，這裡是射擊場。"
1001906-5 = "然後我剛才傳給你的數字……"
1001906-11 = "（梓拿出幾張紙給我看）"
1001906-12 = "（紙上印著靶子，靶上有許多彈孔）"
1001906-13 = "[s1] 「原來是在記錄分數啊。」\n[s2] 「這些分數相當了不起呢……」"
1001906-14 = "呵呵。"
1001906-15 = "呵呵。"
1001906-16 = "……咳哼。就算你誇獎我，我也不覺得有多開心。畢竟這對我來說是理所當然的。"
1001906-17 = "……嗯？你問我為什麼自己一個人在這種地方練習射擊？"
1001906-18 = "……雖然我確實在努力適應這裡的生活，但不代表放下原本的生活態度。"
1001906-19 = "不論何時，和平都是很脆弱的。所以才必須要做足準備。"
1001906-20 = "而且……"
1001906-21 = "這間設施還挺不錯的……很適合訓練。"
1001906-22 = "我以前是在河川的鐵橋下練習射擊。和當時比起來完全不一樣。"
1001906-23 = "……不過話說回來，這裡的學生好像都不太練習呢。根本沒看到幾個人。"
1001906-24 = "雖然和平不是壞事，但因和平而墮落就太危險了。"
1001906-25 = "抱歉，我好像太多嘴了。我馬上就能練完一組了，請你稍微等我一下，老師。"
1001906-30 = "（下一個靶子出來了）"
1001906-32 = "（梓慢慢調整呼吸，然後行雲流水般扣下扳機）"
1001906-41 = "（……）"
1001906-45 = "……結束了。"
1001906-46 = "這樣今天的訓練就結束了。我們回去吧，老師。"
1001906-47 = "[s3] 「可以了嗎？」\n[s4] 「你如果想繼續待，我也可以等你。」"
1001906-48 = "……"
1001906-49 = "……"
1001906-50 = "不用，沒關係。我也沒有長時間待在這裡的意思。"
1001906-51 = "雖然待在這裡確實能讓我感到安心……"
1001906-52 = "……但不能讓自己太沉浸在這種心情裡。而且，現在……"
1001906-53 = "能讓我放鬆的地方已經不光是這裡了。"
1001906-54 = "還有，上次和老師一起去的地方比這邊快樂的多。"
1001906-55 = "……嗯。"
1001906-56 = "……我是真的這麼想。"
1001906-57 = "我們快點走吧，老師。"
1001906-59 = "（之後和梓一起離開射擊場，並先繞到附近的Momo好友咖啡廳才回去）"

[translation]
1001906-1 = "การยิงปืน"
1001906-2 = "มาถึงจนได้นะคุณครู"
1001906-3 = "[s] \"ที่นี่คือ...?\""
1001906-4 = "อือ อย่างที่เห็นนั่นแหละ สนามซ้อมยิงปืนไงล่ะ"
1001906-5 = "และตัวเลขที่ส่งไปให้เมื่อกี้ก็คือ..."
1001906-11 = "(อาซึสะดึงกระดาษออกมาหลายแผ่นและส่งให้คุณคุณครูดู)"
1001906-12 = "(มันคือกระดาษเป้าจำลองที่ใช้ซ้อมยิงปืน และบนกระดาษก็มีรอยลูกกระสุนปืนอยู่มากมาย)"
1001906-13 = "[s1] \"ส่งมาเช็กคะแนนดูสินะ\"\n[s2] \"ฝีมือสุดยอดเลย\""
1001906-14 = "เฮอะ"
1001906-15 = "เฮอะ"
1001906-16 = "ถึงจะชมแบบนั้นฉันก็ไม่ดีใจหรอกนะ แค่นี้น่ะธรรมดา"
1001906-17 = "หืม...? ทำไมฉันถึงมาซ้อมยิงที่นี่คนเดียวน่ะเหรอ?"
1001906-18 = "ถามอะไรโง่ๆ น่ะคุณครู ถึงฉันจะสัญญาว่าจะปรับตัวให้เข้ากับชีวิตที่นี่ แต่นี่มันคนละเรื่องกันเลยนะ"
1001906-19 = "ความสงบน่ะไม่ยืนยาวหรอก เพราะงั้นเราต้องเตรียมพร้อมอยู่เสมอ มีแค่เรื่องนี้เท่านั้นที่ฉันจะ#nไม่ยอมผ่อนปรน"
1001906-20 = "นอกจากนั้น..."
1001906-21 = "ที่นี่... มีสถานที่ฝึกซ้อมดีๆ แบบนี้อยู่ตั้งเยอะ"
1001906-22 = "เฮอะ เมื่อก่อนฉันเคยแต่ฝึกยิงปืนในที่โล่งตรงใต้สะพานเหล็ก"
1001906-23 = "แต่ว่าที่นี่ไม่มีใครมาซ้อมเลยนะ แทบไม่เห็นคนผ่านไปมาเลย"
1001906-24 = "ไม่ระวังตัวกันเลย... ทุกคนดูชินกับความธรรมดาเรียบง่ายไปซะแล้ว"
1001906-25 = "ฉันพูดไร้สาระซะนานเลย เดี๋ยวก็ใกล้จะยิงครบชุดแล้วละ รอก่อนนะคุณครู"
1001906-30 = "(อาซึสะเดินกลับไปที่เลนซ้อมยิงและหยุดอยู่ตรงหน้าเป้าซ้อมอันใหม่)"
1001906-32 = "(อาซึสะค่อยๆ สูดลมหายใจและเหนี่ยวไกปืน)"
1001906-41 = "(...)"
1001906-45 = "...เรียบร้อย"
1001906-46 = "อืม ครบจำนวนเซ็ตที่วางไว้วันนี้แล้ว กลับกันเถอะคุณครู"
1001906-47 = "[s3] \"จะกลับเลยเหรอ?\"\n[s4] \"ถ้าอาซึสะอยากอยู่ต่ออีกหน่อย ครูรอได้นะ\""
1001906-48 = "หืม?"
1001906-49 = "หืม?"
1001906-50 = "พูดอะไรอย่างนั้น ฉันไม่ได้อยากอยู่ต่อหรอก"
1001906-51 = "ถึงที่นี่จะเป็นที่ที่ฉันสบายใจก็เถอะ..."
1001906-52 = "แต่ตอนนี้..."
1001906-53 = "ที่นี่ไม่ใช่สถานที่เดียวที่ฉันชอบแล้วละ"
1001906-54 = "อีกอย่างร้านที่ไปกับคุณครูคราวก่อนก็สนุกมากกว่าด้วย"
1001906-55 = "อืม..."
1001906-56 = "แค่บอกเอาไว้เฉยๆ น่ะ"
1001906-57 = "รีบออกไปกันเถอะคุณครู"
1001906-59 = "(หลังจากที่ออกมาจากสนามยิงปืน ทั้งสองคนก็แวะไปที่คาเฟ่ MOMO FRIENDS แถวนั้นต่อ)"

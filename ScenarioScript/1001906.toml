[translation]
1001906-1 = "Shooting"
1001906-2 = "This way, Sensei. Glad you could make it."
1001906-3 = "[s] \"What is this place?\""
1001906-4 = "Isn't it obvious? A shooting range."
1001906-5 = "And the numbers I sent you earlier..."
1001906-11 = "Azusa pulled out some sheets of paper and showed them to me."
1001906-12 = "There were targets printed on the papers, peppered with bullet holes."
1001906-13 = "[s1] \"You sent me your scores.\"\n[s2] \"You're pretty good.\""
1001906-14 = "Heh."
1001906-15 = "Heh."
1001906-16 = "Hold your compliments. Today was a below average day for me."
1001906-17 = "Why come to the shooting range by myself?"
1001906-18 = "That's a silly question, Sensei. I know I promised that I'd adapt to life here, but this is completely different."
1001906-19 = "Peace never lasts, so you must always be prepared. This is something I can't ever give up."
1001906-20 = "Besides..."
1001906-21 = "This place...has a lot of great training facilities."
1001906-22 = "Heh. I used to practice my shooting under a steel bridge outside."
1001906-23 = "Anyway, it doesn't seem like a whole lot of people practice here. There's hardly anyone around."
1001906-24 = "Careless. The whole lot of them."
1001906-25 = "That's enough chit-chat. I'm going to finish my set, so just give me a few more minutes."
1001906-30 = "She immediately moved on to the next target in line and stopped in front of it."
1001906-32 = "Azusa approached the shooting lane, took a deep breath, and pulled the trigger."
1001906-41 = "(...)"
1001906-45 = "Done."
1001906-46 = "That's the end of my set. Let's go back, Sensei."
1001906-47 = "[s3] \"Right now?\"\n[s4] \"We can stay a bit longer if you want.\""
1001906-48 = "Huh?"
1001906-49 = "Huh?"
1001906-50 = "What are you talking about? Why would I want to stay longer?"
1001906-51 = "I mean, I do like it here."
1001906-52 = "But now..."
1001906-53 = "...this isn't the only place I like anymore."
1001906-54 = "I had much more fun at all the places you took me to last time."
1001906-55 = "So..."
1001906-56 = "...Yeah. That's all I'm saying."
1001906-57 = "Let's go, Sensei."
1001906-59 = "Azusa and I left the shooting range and stopped by the nearby Momo Friends Cafe."

[translation]
1000306-1 = "ปรึกษาปัญหากวนใจ"
1000306-2 = "ห้องเรียน สถาบันทรีนิตี้"
1000306-6 = "เฮ้อ..."
1000306-7 = "[s] \"มีเรื่องอะไรเหรอ?\""
1000306-8 = "อ๊ะ? คะ...คุณครู! มาตั้งแต่เมื่อไหร่คะ?"
1000306-9 = "คุณครูมาหาฉันเพราะเห็นข้อความแล้วเป็นห่วงเหรอคะ?"
1000306-10 = "ขอโทษนะคะ ที่ฉันทำให้คุณครูต้องเป็นกังวลแบบนี้..."
1000306-12 = "อันที่จริงเรื่องนี้เป็นปัญหาของเพื่อนฉันน่ะค่ะ..."
1000306-13 = "อาจเป็นเพราะฉันดูเป็นคนคุยง่าย เพื่อนๆ ก็เลยชอบมาปรึกษากับฉันบ่อยๆ ค่ะ"
1000306-14 = "วันนี้ก็มีเพื่อนมาปรึกษาปัญหากับฉัน แต่ว่าฉันกลับช่วยเธอไม่ได้เลย..."
1000306-15 = "ฉันได้แต่ฟังเรื่องที่เพื่อนคนนั้นเล่า แล้วใช้สิ่งที่เขาเล่าแล้วพูดตอบกลับไปเท่านั้น..."
1000306-16 = "ถ้าฉันไม่ใช่เด็กธรรมดาๆ หรือว่ามีพลังที่ช่วยแก้ปัญหาได้ละก็... เพื่อนคนนั้นคงไม่รู้สึกแย่แบบนี้..."
1000306-17 = "พอคิดแบบนั้นแล้วฉันก็รู้สึกหดหู่ทั้งวันเลยค่ะ"
1000306-18 = "แหะๆ เล่าให้คุณครูฟังแบบนี้ชักรู้สึกอายขึ้นมานิดๆ ค่ะ"
1000306-19 = "แต่ถึงจะเล่าให้คุณครูฟังแบบนี้ก็คงเปลี่ยนแปลงเรื่องที่เกิดขึ้นกับเพื่อนคนนั้นไม่ได้อยู่ดี..."
1000306-20 = "[s] \"ตอนนี้ฮิฟุมิทำได้ดีมากแล้วนะ\""
1000306-21 = "คะ? ฉันทำได้ดีแล้วงั้นเหรอคะ?"
1000306-22 = "ฉันแค่คอยฟังเรื่องที่เพื่อนๆ เล่าให้ฟังเองค่ะ ไม่ได้ทำอะไรเลย"
1000306-23 = "ฉันคิดว่าอย่างน้อยการรับฟังก็คงดีกว่าไม่ทำอะไรเลย แต่แค่นั้นมันพอแล้วจริงๆ เหรอคะ...?"
1000306-24 = "[s] \"ฮิฟุมิกำลังเป็นที่พึ่งพาให้เพื่อนคนนั้นยังไงล่ะ\""
1000306-25 = "เพื่อนกำลังพึ่งพาฉันเหรอคะ..."
1000306-26 = "นั่นสิคะ แทนที่ฉันจะมานั่งคอตกแบบนี้ ฉันควรจะรู้สึกดีที่เป็นที่พึ่งพาให้กับเพื่อนได้..."
1000306-27 = "ฉันควรร่าเริงและให้กำลังใจเพื่อนๆ เหมือนกับทุกครั้งใช่มั้ยคะ?"
1000306-28 = "ขอบคุณนะคะคุณครู ตอนนี้ฉันรู้สึกดีขึ้นแล้วค่ะ"
1000306-29 = "การมีใครสักคนคอยรับฟังเราก็ช่วยได้เยอะจริงๆ นะคะ"
1000306-30 = "ถ้าอย่างนั้นตอนที่ฉันมีเรื่องลำบากใจ... คุณครูช่วยรับฟังด้วยฉันนะคะ"
1000306-31 = "ฉันเองก็อยากจะพึ่งพาคุณครูเหมือนกันค่ะ!"

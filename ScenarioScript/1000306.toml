[translation]
1000306-1 = "A Consultation"
1000306-2 = "Trinity Classroom"
1000306-6 = "*sigh*"
1000306-7 = "[s] \"What's going on?\""
1000306-8 = "Oh! S-Sensei! When did you get here?"
1000306-9 = "Were you worried after my last text?"
1000306-10 = "Sorry. I didn't mean to concern you..."
1000306-12 = "Actually, it's not me I'm worried about. It's one of my friends..."
1000306-13 = "The thing is, my friends often come to me for advice. Maybe it's because I look so calm."
1000306-14 = "One of them came to talk to me today, but there was nothing I could do for them..."
1000306-15 = "All I could do was repeat what they were saying. I added nothing..."
1000306-16 = "Maybe if I weren't so ordinary and had real talent, I could have helped them... I'd be so happy if I could just be there for them."
1000306-17 = "It's been weighing on me a lot today."
1000306-18 = "Heehee. I'm pretty pathetic, aren't I?"
1000306-19 = "It's not like anything is going to change by venting to you, Sensei..."
1000306-20 = "[s] \"I think you're doing great, Hifumi.\""
1000306-21 = "Huh? What do you mean I'm doing great?"
1000306-22 = "All I did was listen to my friend..."
1000306-23 = "Not to say I'm doing nothing, but I feel like it's not enough..."
1000306-24 = "[s] \"You're giving them your support.\""
1000306-25 = "Giving them my support..."
1000306-26 = "In other words, instead of feeling sorry for myself, I should be grateful that my friend is depending on me..."
1000306-27 = "I have to stay positive so that I can cheer them up, don't I?"
1000306-28 = "Thank you. I feel a lot better now."
1000306-29 = "You're right. Sometimes all people need is someone to talk to."
1000306-30 = "So, Sensei, I'd like it if...you were that person for me."
1000306-31 = "Because I depend on you too, Sensei!"

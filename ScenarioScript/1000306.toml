[translation]
1000306-1 = "煩惱諮詢"
1000306-2 = "三一綜合學園．教室"
1000306-6 = "唉……"
1000306-7 = "[s] 「發生什麼事了？」"
1000306-8 = "啊？老，老師！？你什麼時候來的？"
1000306-9 = "啊，是看了我的訊息後就來了嗎？"
1000306-10 = "不好意思，又讓你擔心了……"
1000306-12 = "其實有煩惱的不是我，而是我的朋友……"
1000306-13 = "不知道是不是因為我總是心情很好，看起來沒什麼煩惱的關係，有很多朋友常常會來找我訴說煩惱。"
1000306-14 = "今天也有某個朋友來找我傾訴，但我卻完全幫不上忙……"
1000306-15 = "只能聽著他說，附和幾句而已。"
1000306-16 = "要是我不是這麼平凡的話，要是有能解決問題的能力的話，我和朋友們就不會難受了……"
1000306-17 = "因為這件事整天的心情都不太好……雖然就算這樣也無濟於事……"
1000306-18 = "欸嘿嘿，仔細想想，好像說了件很羞恥的事呢。"
1000306-19 = "明明就算和老師說，也沒辦法解決那件朋友的事，但無論如何都想要告訴老師……"
1000306-20 = "[s] 「我覺得日步美已經為他做了很棒的事了唷。」"
1000306-21 = "咦？我做了很棒的事……？"
1000306-22 = "我只不過是聽那個朋友說話而已……"
1000306-23 = "或許比什麼都沒做好一點，但這樣就很好了嗎？"
1000306-24 = "[s] 「因為日步美是可以訴說煩惱、值得信賴的朋友呢。」"
1000306-25 = "值得信賴……"
1000306-26 = "這麼說也對。既然朋友都來依靠我了，連我都一起失落可不行……"
1000306-27 = "至少要像平常一樣聲援朋友，這樣肯定會比較好吧？"
1000306-28 = "非常感謝。託老師的福，感覺煩惱減輕了不少。"
1000306-29 = "呵呵。只要有人願意聽自己說話，真的就會快樂很多呢。"
1000306-30 = "老師，之後我有煩惱的時候……也請老師聽我說吧。"
1000306-31 = "我會這麼想也是因為我有那麼信賴老師哦！"

1000306-5 = "2;히후미;01\n#2;h\n#2;m4\n#wait;1500"
1000306-6 = "2;히후미;99;하아…….\n#2;em;[속상함]\n#2;stiff"
1000306-7 = "[s] \"무슨 문제라도 있어?\""
1000306-8 = "2;히후미;04;앗? 서, 선생님! 언제 오신건가요?\n#2;em;[반응]\n#2;shake"
1000306-9 = "2;히후미;02;제 문자를 보고 걱정되어서 오셨다고요?\n#2;m3"
1000306-10 = "2;히후미;01;죄송해요. 제가 괜한 걱정을 끼쳐드렸나 보네요……."
1000306-11 = "2;히후미;99\n#2;em;…\n#wait;2500"
1000306-12 = "2;히후미;01;사실 걱정이 있는 건 제가 아니라, 제 친구의 일인데요……."
1000306-13 = "2;히후미;02;저는 여유로워 보이는 인상 때문인지, 친구들로부터 종종 고민 상담 같은 것을 받곤 하거든요."
1000306-14 = "2;히후미;05;오늘도 한 친구로부터 상담을 받았는데, 제가 할 수 있는 일이 아무것도 없어서……."
1000306-15 = "2;히후미;99;저는 그저 친구의 이야기를 들어주고 맞장구를 쳐주기만 했어요."
1000306-16 = "2;히후미;01;제가 평범하지 않았더라면, 문제를 해결할 수 있는 힘이 있었더라면, 저도 그 친구도 괴롭지 않았을 텐데…….\n#2;em;[속상함]"
1000306-17 = "2;히후미;01;그런 생각에 하루 종일 어두운 기분에 사로잡혀 있었답니다."
1000306-18 = "2;히후미;00;헤헤, 생각해보니 부끄러운 소리를 했네요.\n#2;em;[///]\n#2;stiff"
1000306-19 = "2;히후미;99;선생님께 이런 고민을 말씀드린다 해서 그 친구의 일이 달라지지도 않는데……."
1000306-20 = "[s] \"히후미는 이미 멋진 일을 하고 있는 걸.\""
1000306-21 = "2;히후미;02;네? 제가 이미 멋진 일을 하고 있다고요?\n#2;em;[?!]\n#2;shake"
1000306-22 = "2;히후미;01;저는 그저 친구의 이야기를 들어준 것 밖에 없는데……."
1000306-23 = "2;히후미;02;물론 아무것도 하지 않는 것보다는 낫겠지만, 그걸로 충분할까요……?\n#2;em;[?]"
1000306-24 = "[s] \"그만큼 그 친구는 히후미를 의지하고 있다는 뜻이니까.\""
1000306-25 = "2;히후미;99;의지하는 친구라……."
1000306-26 = "2;히후미;01;그렇네요. 모처럼 친구가 저를 의지해 주었는데, 저까지 침울해지면 안 되니까……."
1000306-27 = "2;히후미;02;평소처럼 밝은 모습으로 친구를 응원하는 게 좋겠죠?"
1000306-28 = "2;히후미;00;감사합니다. 덕분에 고민이 조금은 해결되었어요.\n#2;em;[반짝]\n#2;hophop"
1000306-29 = "2;히후미;00;정말 누군가가 이야기를 들어주는 것 만으로도 큰 힘이 되네요."
1000306-30 = "2;히후미;01;그러니 선생님도 제가 어려울 땐…… 제 이야기를 들어주세요."
1000306-31 = "2;히후미;03;그만큼 저도 선생님을 의지하고 있으니까요!\n#2;em;[///]\n#2;greeting"

1300302-33 = "3;하스미;04;네? \n#3;shake\n#3;em;[?!]"
1300302-34 = "3;하스미;99;부, 불편할 때도 있긴 합니다만…… #n한 자세로 오래 있으면 어깨가 결린다거나, 뛸 때 흔들려서 신경 쓰인다거나……."
1300302-35 = "3;하스미;01;그래도 역시 일상에 지장이 있는 것은 곤란하기에, 요즘은 다이어트를 하고 있습니다."
1300302-36 = "[s] \"응?! 체중이 줄면 같이 줄어드는 거였어?!\""
1300302-37 = "3;하스미;04;네? 그, 그렇죠? 일반적으론요. 사람에 따라 차이는 있겠지만……. \n#3;stiff\n#3;em;[땀]"
1300302-38 = "[s] \"굉장해. 몰랐던 사실을 알게 됐어.\""
1300302-39 = "3;하스미;04;그, 그렇습니까……. #n그렇게까지 대단한 사실은 아닌 것 같습니다만……."

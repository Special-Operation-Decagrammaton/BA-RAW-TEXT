[translation]
1300302-1 = "溝通錯位"
1300302-2 = "（午後的街道上行人來來往往）"
1300302-3 = "（遠遠地就看到蓮實在等待）"
1300302-4 = "（蓮實巨大的翅膀特別顯眼，想在人潮中找到她並非難事）"
1300302-7 = "[ns] 「早安。」"
1300302-8 = "……"
1300302-9 = "（她似乎沒有察覺到我靠近了）"
1300302-10 = "啊……！"
1300302-11 = "老師您是什麼時候來的？……不好意思，我一時分神了。"
1300302-12 = "因為我很少在假日的時候來到大街上，所以我沒想到人會這麼多。 "
1300302-13 = "不過，沒想到老師這麼快就找到我了。"
1300302-14 = "[s1] 「因為蓮實很醒目。」\n[s2] 「從遠處就馬上看到你了。」"
1300302-15 = "很，很醒目嗎？"
1300302-16 = "很，很醒目嗎？ "
1300302-17 = "我，我覺得應該不至於吧……"
1300302-18 = "[s] 「這麼大，不管在哪裡都很醒目呀。」"
1300302-19 = "……咦？"
1300302-20 = "很，很大嗎？"
1300302-21 = "[s] 「嗯，比其他學生都大的多吧？」"
1300302-22 = "……不，不是，那，那是……"
1300302-23 = "老……老師說的或許沒錯，我也不否認……可，可是……#n也有人比我還大吧……"
1300302-24 = "[s] 「……？難道我這麼說會很失禮嗎？」"
1300302-25 = "啊，不，不是那樣的。不如說是我還不了解大人之間的應對……"
1300302-26 = "只是因為老師毫不彆扭的直接說了出來……覺得有些訝異罷了。"
1300302-27 = "[s3] 「抱歉讓你傷腦筋了。」\n[s4] 「因為我還不熟悉奇普托斯的常識。」"
1300302-28 = "請，請別在意，老師。#n我才應該道歉，抱歉讓老師感到愧疚了。"
1300302-29 = "請，請別在意，老師。#n我才應該道歉，抱歉讓老師感到愧疚了。"
1300302-30 = "[s] （但蓮實的翅膀果然超大的）"
1300302-31 = "……"
1300302-32 = "[s] 「不會不方便嗎？」"
1300302-33 = "咦？ "
1300302-34 = "確，確實有時會不太方便……#n例如長時間維持相同的姿勢，肩膀會痠痛，或者跑步時會晃動的很厲害……"
1300302-35 = "最困擾的就是已經有影響到日常生活了，因此我最近正在減肥。"
1300302-36 = "[s] 「咦！？只要降低體重就會同時變小嗎！？」"
1300302-37 = "咦？一，一般來說都是這樣吧？雖然這種事多少會因人而異…… "
1300302-38 = "[s] 「天哪，我第一次知道。」"
1300302-39 = "是，是嗎……#n我以為這件事應該沒那麼誇張……"
1300302-40 = "[s5] 「我想摸摸看！」\n[s6] 「可以摸摸看嗎？」"
1300302-41 = "……"
1300302-42 = "……"
1300302-43 = "摸……"
1300302-44 = "要，"
1300302-45 = "要摸嗎！？"
1300302-46 = "在這種地方？"
1300302-47 = "再怎麼說，那樣實在，不太好吧……#n不對，難道說其實沒那回事……？不對，果然還是不太好……我，我不是很清楚……"
1300302-48 = "……"
1300302-53 = "……那個。"
1300302-54 = "如，如果老師堅持的話，那，那就請盡情摸吧……！"
1300302-55 = "不，不過也請對其他人保密！然後，也找個沒有人的地方……！"
1300302-56 = "……"
1300302-57 = "[s] 「謝謝。我一直很在意那對翅膀。」"
1300302-58 = "……"
1300302-59 = "……………………………"
1300302-60 = "是在講……翅膀啊。"
1300302-61 = "[s] 「咦？……嗯。」"
1300302-62 = "原來是……翅膀啊。"
1300302-63 = "翅膀……"
1300302-64 = "是這樣啊……"
1300302-65 = "[s] 「……你以為我在說什麼？」"
1300302-66 = "沒……沒什麼。"
1300302-67 = "……"
1300302-68 = "哈啊……"
1300302-69 = "……"
1300302-70 = "老，老師，我突然想起來有急事！先告辭了！"
1300302-71 = "[s] 「嗯？你不是說有事要商量嗎！？」"
1300302-72 = "那件事下次再說吧！"
1300302-75 = "（蓮實像風一般失去了蹤影）"

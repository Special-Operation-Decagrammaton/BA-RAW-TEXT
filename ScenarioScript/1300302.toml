1300302-10 = "3;하스미;02;아……!\n#3;em;[반응]"
1300302-11 = "3;하스미;01;언제 오셨나요? ……죄송합니다, 잠시 한눈을 팔고 있었네요.\n#3;greeting"
1300302-12 = "3;하스미;04;휴일에 거리에 나와본 적이 별로 없어서 사람이 이렇게 많을 줄은 몰랐네요. \n#3;em;[땀]"
1300302-13 = "3;하스미;03;그래도 절 금방 찾으셨네요."
1300302-14 = "[s1] \"하스미는 눈에 띄니까.\"\n[s2] \"멀리서도 금방 알 수 있거든.\""
1300302-15 = "3;하스미;04;누, 눈에 띄나요? \n#3;em;[?]"
1300302-16 = "3;하스미;04;누, 눈에 띄나요? \n#3;em;[?]"
1300302-17 = "3;하스미;01;그, 그 정도는 아닌 것 같지만……."
1300302-18 = "[s] \"그 정도로 커다란 건 어디서든 눈에 띄거든.\""
1300302-19 = "3;하스미;04;……네?\n#3;shake\n#3;em;[?!]"
1300302-20 = "3;하스미;04;커, 커다랗다고요?"
1300302-21 = "[s] \"응. 다른 트리니티 학생들보다 크지 않나?\""
1300302-22 = "3;하스미;04;……아, 아뇨. 그, 그건……"
1300302-23 = "3;하스미;99;맞……는 것 같습니다. 부정은 하지 않겠지만……. 그, 그래도……. #n저보다 훨씬 더 큰 사람도 있긴 하고…….\n#3;em;…"
1300302-24 = "[s] \"……응? 혹시 이런 걸 말하면 안되는 거였어?\""
1300302-25 = "3;하스미;04;아, 그, 그런 건 아닙니다. 오히려 제가 어른의 상식이 부족한 건가…… 싶어서.\n#3;em;[땀]\n#3;stiff"
1300302-26 = "3;하스미;01;그저 당당하게 말씀하시니…… 조금 놀랐을 뿐입니다."
1300302-27 = "[s3] \"곤란했다면 미안해.\"\n[s4] \"내가 키보토스의 상식은 익숙치가 않아서.\""
1300302-28 = "3;하스미;03;괘, 괜찮습니다. 선생님. #n오히려 저야말로 당황하게 만들어서 송구하네요.\n#3;greeting\n#3;em;[반응]"
1300302-29 = "3;하스미;03;괘, 괜찮습니다. 선생님. #n오히려 저야말로 당황하게 만들어서 송구하네요.\n#3;greeting\n#3;em;[반응]"

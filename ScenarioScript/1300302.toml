[translation]
1300302-1 = "การสื่อสารที่ผิดพลาด"
1300302-2 = "(ถนนในช่วงบ่ายที่มีผู้คนพลุกพล่าน)"
1300302-3 = "(คุณครูมองเห็นฮาสุมิกำลังยืนรออยู่)"
1300302-4 = "(ปีกขนาดใหญ่ที่ดูโดดเด่นของฮาสุมิทำให้คุณครูสังเกตเห็นเธอจากบรรดากลุ่มคนได้ไม่ยาก)"
1300302-7 = "[ns] \"สวัสดี\""
1300302-8 = "......."
1300302-9 = "(ฮาสุมิไม่เห็นว่าคุณครูมายืนอยู่ข้างๆ)"
1300302-10 = "อ๊ะ...!"
1300302-11 = "คุณครูมาตั้งแต่เมื่อไหร่คะ? ขอโทษนะคะ ฉันมัวแต่คิดเรื่องอื่นอยู่..."
1300302-12 = "ฉันไม่ค่อยได้ออกมาข้างนอกตอนวันหยุดเลยไม่รู้ว่าจะมีคนเยอะแบบนี้ค่ะ"
1300302-13 = "แต่คุณครูหาฉันเจอได้เร็วมากเลยนะคะ"
1300302-14 = "[s1] \"ก็ฮาสุมิดูโดดเด่นกว่าใครนี่นา\"\n[s2] \"มองจากไกลๆ ก็เห็นอยู่ดีนะ\""
1300302-15 = "ดะ...เด่นเหรอคะ?"
1300302-16 = "ดะ...เด่นเหรอคะ?"
1300302-17 = "มะ...ไม่ขนาดนั้นสักหน่อยค่ะ"
1300302-18 = "[s] \"ใหญ่ขนาดนั้น ยังไงก็ต้องเด่นอยู่แล้วล่ะ\""
1300302-19 = "...คะ?"
1300302-20 = "ยะ...ใหญ่เหรอคะ?"
1300302-21 = "[s] \"อื้อ ที่จริงก็ใหญ่ที่สุดในหมู่เด็กโรงเรียนทรีนิตี้เลยไม่ใช่เหรอ?\""
1300302-22 = "ปะ...เปล่านะคะ ระ...เรื่องนั้น..."
1300302-23 = "มัน...ก็ใช่ค่ะ ฉัน...ฉันไม่ปฏิเสธค่ะ ตะ...แต่ว่า... ตะ...แต่ว่า... มีคนที่ใหญ่กว่าฉันอีกนะคะ..."
1300302-24 = "[s] \"หืม? หรือครูไม่ควรพูดแบบนี้นะ?\""
1300302-25 = "ไม่เป็นไรหรอกค่ะ ฉันเองต่างหากที่ยังขาดประสบการณ์ความคิดแบบผู้ใหญ่...."
1300302-26 = "พอคุณครูพูดออกมาตรงๆ แบบนี้ ฉันเลยตกใจนิดหน่อยค่ะ"
1300302-27 = "[s3] \"ขอโทษที่ทำให้รู้สึกไม่ดีนะ\"\n[s4] \"ครูยังไม่ค่อยชินกับพวกเรื่องทั่วๆ ไปในคิโวทอสน่ะ\""
1300302-28 = "มะ... ไม่เป็นไรค่ะ คุณครู#nขอโทษที่ทำให้คุณครูตกใจนะคะ"
1300302-29 = "มะ... ไม่เป็นไรค่ะ คุณครู#nขอโทษที่ทำให้คุณครูตกใจนะคะ"
1300302-30 = "[s] (แต่ปีกคู่นั้นมันก็ดูใหญ่จริงๆ นะ)"
1300302-31 = "....."
1300302-32 = "[s] \"ไม่อึดอัดบ้างเหรอ?\""
1300302-33 = "คะ? "
1300302-34 = "บะ...บางครั้งก็รู้สึกอัดอัดบ้างค่ะ ถ้าต้องอยู่ท่าเดิมนานๆ ก็จะรู้สึกปวดไหล่ไปหมด หรือบางครั้ง#nตอนวิ่งมันก็จะกระพือไปมา...."
1300302-35 = "แต่เพื่อไม่ให้เกิดปัญหาในชีวิตประจำวัน ช่วงนี้ฉันเลยพยายามลดน้ำหนักอยู่ค่ะ"
1300302-36 = "[s] \"หืม?! ถ้าลดน้ำหนักแล้วขนาดมันจะลดลงด้วยเหรอ?!\""
1300302-37 = "คะ? ชะ...ใช่ค่ะ ปกติก็เป็นแบบนั้นนะคะ แต่ว่าแต่ละคนก็อาจจะแตกต่างกันไป...\n\n"
1300302-38 = "[s] \"สุดยอดเลย ความรู้ใหม่เลยแฮะ\""
1300302-39 = "งะ...งั้นเหรอคะ แต่ที่จริงมันก็ไม่ใช่เรื่องที่สุดยอดอะไรหรอกค่ะ"
1300302-40 = "[s5] \"อยากลองจับดูจัง!\"\n[s6] \"ขอลองจับหน่อยได้มั้ย?\""
1300302-41 = ".....\n"
1300302-42 = ".....\n"
1300302-43 = "ละ..."
1300302-44 = "ลอง... "
1300302-45 = "ลองจับงั้นเหรอคะ?"
1300302-46 = "ตะ...ตรงนี้เหรอคะ?"
1300302-47 = "แบบนี้มัน... ดูจะไม่เหมาะนะคะ แต่ว่าถ้าฉันยินยอม... มะ...ไม่รู้สิคะ"
1300302-48 = "......"
1300302-53 = "เฮ้อ..."
1300302-54 = "ถ้าคุณครูต้องการแบบนั้นจริงๆ ละก็... เชิญจับดูได้เลยค่ะ...!"
1300302-55 = "ตะ...แต่ว่าต้องเก็บเป็นความลับนะคะ! ห้ามบอกใครเด็ดขาดเลย....!"
1300302-56 = "......"
1300302-57 = "[s] \"ขอบคุณนะ ครูสงสัยเรื่องปีกของเธอมานานแล้วละ\""
1300302-58 = "......"
1300302-59 = "..."
1300302-60 = "นี่คุณครู... พูดถึงปีกของฉันอยู่เหรอคะ"
1300302-61 = "[s] \"หืม...? ใช่แล้ว\""
1300302-62 = "คุณครูหมายถึง... ปีกนี่เอง"
1300302-63 = "ปีก..."
1300302-64 = "แบบนี้นี่เอง..."
1300302-65 = "[s] \"คิดว่าครูพูดถึงเรื่องอะไรเหรอ?\""
1300302-66 = "ปะ...เปล่านะคะ"
1300302-67 = "....."
1300302-68 = "ฮะ...ฮะๆ"
1300302-69 = "......"
1300302-70 = "พอดีฉันนึกได้ว่ามีธุระด่วนค่ะคุณครู! ขอตัวกลับก่อนนะคะ!"
1300302-71 = "[s] \"อ้าว? ไหนว่ามีเรื่องจะปรึกษาไม่ใช่เหรอ?!\""
1300302-72 = "แล้วเจอกันใหม่นะคะ!"
1300302-75 = "(ฮาสุมิวิ่งหายไปอย่างรวดเร็ว)"

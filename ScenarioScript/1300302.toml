[translation]
1300302-1 = "Big Misunderstanding"
1300302-2 = "The afternoon street is bustling with people."
1300302-3 = "I can see Hasumi waiting in the distance."
1300302-4 = "She's easy to spot in the crowd thanks to her large wings."
1300302-7 = "[ns] \"Hey.\""
1300302-8 = "..."
1300302-9 = "She didn't seem to notice me."
1300302-10 = "Ah...!"
1300302-11 = "Where did you come from? Sorry about that. I was distracted."
1300302-12 = "I've never tried walking the streets on a day off before. I didn't expect there to be so many people out and about."
1300302-13 = "I'm impressed that you were able to spot me."
1300302-14 = "[s1] \"You stick out from the crowd.\"\n[s2] \"You're easy to spot from afar.\""
1300302-15 = "D-Do I really stick out that much?"
1300302-16 = "D-Do I really stick out that much?"
1300302-17 = "I don't think I look that out of the ordinary..."
1300302-18 = "[s] \"It's hard not to notice when they're that big.\""
1300302-19 = "...Pardon?"
1300302-20 = "Do you think they're too big?"
1300302-21 = "[s] \"They're huge compared to the other Trinity students.\""
1300302-22 = "N-No. I mean... "
1300302-23 = "I suppose...that's true. I can't deny it...b-but...there are people with bigger ones than mine."
1300302-24 = "[s] \"Sorry? Did I hit a sensitive topic?\""
1300302-25 = "No, it's fine. I'm not used to having such an adult conversation."
1300302-26 = "I was simply taken by...how forward you were."
1300302-27 = "[s3] \"My bad. I didn't mean to shock you.\"\n[s4] \"Do people from Kivotos not notice these things?\""
1300302-28 = "It's fine, Sensei. You don't have to feel bad."
1300302-29 = "It's fine, Sensei. You don't have to feel bad."
1300302-30 = "[s] \"(Still, her wings are pretty big.)\""
1300302-31 = "..."
1300302-32 = "[s] \"Is it hard having big ones?\""
1300302-33 = "Excuse me?"
1300302-34 = "W-Well, they are a little burdensome sometimes... My shoulders get stiff when I stay in one position too long, and they bother me when I run since they bounce around..."
1300302-35 = "I've been trying to lose weight in hopes they'd go down a few sizes and not be such a hindrance."
1300302-36 = "[s] \"What?! Do they shrink with your weight?!\""
1300302-37 = "Yes? O-Of course. Well, normally for me. It differs a little from person to person..."
1300302-38 = "[s] \"That's incredible. I learned something new today.\""
1300302-39 = "Did you now...? I wouldn't exactly call that incredible..."
1300302-40 = "[s5] \"I wanna touch them!\"\n[s6] \"May I touch them?\""
1300302-41 = "..."
1300302-42 = "..."
1300302-43 = "Ta..."
1300302-44 = "T-Ta..."
1300302-45 = "T-T-Touch them?"
1300302-46 = "Right here?"
1300302-47 = "Isn't this...a little inappropriate? Then again, if I consented... But do I? I don't know..."
1300302-48 = "..."
1300302-53 = "*sigh*"
1300302-54 = "If that's really what you want, th-then you have my permission...!"
1300302-55 = "B-But you can't tell anyone! And let's go somewhere that no one can see us."
1300302-56 = "..."
1300302-57 = "[s] \"I'm honored. I've always been curious about your wings.\""
1300302-58 = "..."
1300302-59 = "..."
1300302-60 = "Oh, you meant my...wings."
1300302-61 = "[s] \"Uh...yeah?\""
1300302-62 = "That entire time, you were referring to...my wings."
1300302-63 = "My wings..."
1300302-64 = "Of course."
1300302-65 = "[s] \"...What did you think I was talking about?\""
1300302-66 = "N-Nothing."
1300302-67 = "..."
1300302-68 = "*sigh*"
1300302-69 = "..."
1300302-70 = "I just remembered something important I have to do, Sensei! I need to go right now!"
1300302-71 = "[s] \"Wait! What about letting me touch your wings?!\""
1300302-72 = "I'll see you later!"
1300302-75 = "Hasumi bolted out the door in a flash."

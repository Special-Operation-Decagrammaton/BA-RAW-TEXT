[translation]
80000051-1 = "#title;보다 씁쓸하고, 더욱 달콤하게"
80000051-2 = "#place;게헨나 제17번 학생식당"
80000051-3 = "#na;(하루나의 호출을 받고 학생식당을 찾게 되었다.)"
80000051-4 = "[s] \"일단 이곳에서 만나자고 했었지, 하루나는…….\""
80000051-5 = "#na;하루나;후후후, 선생님. 마침 딱 좋을 때 와주셨군요."
80000051-6 = "[s] \"아, 하루ㄴ…….\""
80000051-7 = "3;하루나;06;하압!\n#3;closeup\n#3;a\n#fontsize;100"
80000051-8 = "#all;hide\n#bgshake"
80000051-9 = "#wait;1000"
80000051-10 = "[ns] \"웁?! 우웁?!\""
80000051-11 = "#st;[0,0];instant;1;"
80000051-12 = "#clearST"
80000051-13 = "#wait;2000"
80000051-14 = "#na;(입안 가득 말차의 씁쓸한 맛과 함께 초콜릿의 은은한 달콤함이 퍼져 나갔다.)"
80000051-15 = "#st;[0,0];instant;1;"
80000051-16 = "#clearST"
80000051-17 = "#all;hide"
80000051-18 = "[ns] \"꿀꺽. 푸하아……. 이건……. 말차 초콜릿?\""
80000051-19 = "3;하루나;01;후후, 네. 정답입니다. 선생님. 감이 좋으시군요.\n#3;em;[음표]\n#3;a"
80000051-20 = "[s] \"……감의 문제, 인가?\""
80000051-21 = "3;하루나;02;방금 건, 고급 브랜드의 말차 초콜릿이었는데, 어떠셨나요?\n#3;em;[?]"
80000051-22 = "[s] \"음……, 씁쓸하고 달콤했어.\""
80000051-23 = "3;하루나;99;과연……. 그렇군요. 좋은 참고가 되었습니다.\n#3;greeting"
80000051-24 = "3;하루나;02;아, 갑자기 이런 건 왜 묻느냐고요?\n#3;em;[반응]"
80000051-25 = "3;하루나;01;후후후. 선생님도 알다시피 오늘은 다름 아닌 발렌타인 데이……. 소중한 사람끼리 디저트를 선물하는 날이지요."
80000051-26 = "3;하루나;02;주류는 초콜릿이 되겠습니다만. 최근엔 케이크나 캔디, 마카롱 같은 것도 자주 선물하고는 하지요?"
80000051-27 = "3;하루나;01;선생님, 이 디저트들의 공통점이 뭔지 아시겠나요?\n#3;em;[?]"
80000051-28 = "[s] \"으음, 글쎄 아무래도…….\""
80000051-29 = "3;하루나;06;삑, 시간 초과로 오답입니다.\n#3;em;[!]\n#3;jump"
80000051-30 = "[s] \"이거, 스피드 퀴즈였어?!\""
80000051-31 = "3;하루나;02;어머나, 선생님. 미식의 길이란 곧 빨리 움직이는 자가 쟁취하는 법이랍니다?\n#3;em;[반짝]"
80000051-32 = "3;하루나;01;뭐어, 가벼운 농담은 제쳐 두기로 하고. 단도직입적으로 말해, 공통점은 달콤함이랍니다."
80000051-33 = "[s] \"아, 뭐……, 디저트니까?\""
80000051-34 = "3;하루나;99;네, 어찌 보면 당연할 수 있겠지만. 저는 오히려 생각했답니다. 어찌하여 발렌타인 데이엔 달콤한 물건을 선물하는가.\n#3;em;[...]"
80000051-35 = "3;하루나;01;홀로 고민하고 고민한 끝에, 마침내 깨달은 겁니다.\n#3;greeting"
80000051-36 = "3;하루나;05;……이건 은유라고."
80000051-37 = "[s] \"은유……?\""
80000051-38 = "3;하루나;99;디저트에 담긴 달콤함이란, 소중한 사람끼리 나누는 마음……."
80000051-39 = "3;하루나;06;즉…… 상대를 향해 품고 있는 '감사한 마음'에 대한 은유!\n#3;em;[!]"
80000051-40 = "[s] \"……가, 감사?\""
80000051-41 = "3;하루나;01;그걸 깨달은 순간, 저는 이런 가설을 떠올렸습니다. 달콤함이 만약 감사의 은유라면, 반대로 그러한 감사한 마음을 디저트에 더욱더 담게 된다면.\n#3;em;[...]"
80000051-42 = "3;하루나;02;그만큼 디저트는 더욱더 달콤해지지 않을까? 라고."
80000051-43 = "[s] \"으, 응?!\""
80000051-44 = "3;하루나;99;자아, 여기 말차 초콜릿의 재료를 준비하였습니다.\n#3;greeting"
80000051-45 = "3;하루나;01;어째서 말차 초콜릿이냐고요?\n#3;em;[반응]"
80000051-46 = "3;하루나;02;쓴맛과 단맛이 함께 느껴지는 이 초콜릿이라면, 제가 증명하고자 하는 명제를 더 명확히 보여줄 수 있을 테니까요."
80000051-47 = "3;하루나;99;자아, 증명하도록 하지요. 선생님."
80000051-48 = "3;하루나;03;함께 만들어, 달콤함이 배가 된 초콜릿을 만드는 겁니다!\n#3;em;[음표]\n#3;greeting"
80000051-49 = "[s] \"잠깐 하루나, 근데 그 말은 그러니까…….\""
80000051-50 = "3;하루나;06;자아, 협력해주실 거지요?\n#3;greeting"
80000051-51 = "[s] \"아니, 그게 그 달콤함이라는 건 결국…….\""
80000051-52 = "3;하루나;05;협력, 해주실 거지요?\n#3;em;[?]\n#3;closeup\n#3;jump"
80000051-53 = "[s] \"……넵.\""
80000051-54 = "3;하루나;03;후후! 네, 시작하도록 하겠습니다!\n#3;em;[반짝]\n#3;greeting"
80000051-55 = "#na;(그렇게 하루나와 함께 수제 말차 초콜릿 만들기가 시작되었다.)"
80000051-56 = "#all;hide"
80000051-57 = "#wait;2200"
80000051-58 = "3;하루나;05;불 조절에 실패했나요? 갑자기 냄비가 폭발해버릴 줄이야…….\n#3;em;[속상함]\n#3;stiff"
80000051-59 = "#st;[0,0];instant;1;"
80000051-60 = "#clearST"
80000051-61 = "3;하루나;05\n#3;d\n#wait;1000"

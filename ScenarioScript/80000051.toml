[translation]
80000051-1 = "更加苦澀，更加甜蜜"
80000051-2 = "格黑娜學園．第17號學生餐廳"
80000051-3 = "（收到羽留奈的連絡後來到了學生餐廳）"
80000051-4 = "[s]「見面的地點應該是這裡沒錯……」"
80000051-5 = "呵呵，老師。有勞您大駕光臨。"
80000051-6 = "[s]「啊，羽留──」"
80000051-7 = "哈！"
80000051-10 = "[ns]「唔唔！？」"
80000051-14 = "（抹茶的苦味和巧克力的甜味突然在口中蔓延）"
80000051-18 = "[ns]「唔唔……這是，抹茶巧克力？」"
80000051-19 = "是的，正確答案。不愧是老師，悟性不錯呢。"
80000051-20 = "[s]「與其說是悟性，不如說是舌頭……？」"
80000051-21 = "剛剛吃的是還算高級的品牌推出的抹茶巧克力，老師覺得如何呢？"
80000051-22 = "[s]「嗯。苦中帶甜很好吃。」"
80000051-23 = "這樣啊……原來如此，很有參考價值。"
80000051-24 = "……問我在做什麼，是嗎？"
80000051-25 = "呵呵。老師也知道，今天是情人節……是送甜點給重要的人的日子。"
80000051-26 = "雖然主流是巧克力，不過最近送蛋糕、糖果或馬卡龍等等的人也變多了。"
80000051-27 = "請問老師，老師認為這些甜點的共通點是什麼呢？"
80000051-28 = "[s]「這個嘛……」"
80000051-29 = "時間到。"
80000051-30 = "[s]「居然有時間限制！？而且好短！！」"
80000051-31 = "老師，所謂的美食往往都是有時間限制的唷？#n美味的時刻只有一瞬間的情況也不少見。"
80000051-32 = "玩笑先放一邊，答案是「甜味」。"
80000051-33 = "[s]「畢竟是甜點嘛……？」"
80000051-34 = "是，某種意義上這或許是理所當然。#n但我是這麼想的──為什麼情人節一定要送甜的東西呢。"
80000051-35 = "左思右想之後，我終於明白了。"
80000051-36 = "……這是一種比喻。"
80000051-37 = "[s]「比喻……？」"
80000051-38 = "想向重要的人傳達感謝的心情……"
80000051-39 = "也就是說，以「甜味」的形式來表達對對方的心意！"
80000051-40 = "[s]「……原來如此？」"
80000051-41 = "於是，我想出了一個假設。如果甜味真的與心意相連，那麼傾注越多感謝之情……"
80000051-42 = "甜點就會越甜對吧？"
80000051-43 = "[s]「也許，是吧……？」"
80000051-44 = "所以，我準備了抹茶巧克力的材料。"
80000051-45 = "為什麼是抹茶巧克力？"
80000051-46 = "那當然是因為能夠同時嘗到苦味和甜味。#n比起只針對甜味加以比較，這樣應該會更好判斷吧。"
80000051-47 = "現在正是探究之時。"
80000051-48 = "來吧老師，一起做出究極的甜巧克力吧！"
80000051-49 = "[s]「你的意思是……」"
80000051-50 = "怎麼了嗎？老師會幫我的對吧？"
80000051-51 = "[s]「那個，如果按照你對甜味的假設……」"
80000051-52 = "會幫我的，對吧？"
80000051-53 = "[s]「……是。」"
80000051-54 = "呵呵，那麼就開始吧！"
80000051-55 = "（就這樣和羽留奈一起開始製作抹茶巧克力）"
80000051-58 = "呼呣……火侯調節失敗了呢。沒想到鍋子會突然炸開……"
80000051-67 = "呵呵，「學生餐廳的冰箱裡住著魔物」在格黑娜可是很有名的故事……"
80000051-68 = "但是事到如今，我可不會因為這種小事就放棄！"
80000051-76 = "來，繼續吧！"
80000051-80 = "[ns]「真的沒問題嗎……」"
80000051-83 = "（於是克服了各種苦難，終於做出了抹茶巧克力）"
80000051-85 = "呵呵，終於完成了……為老師製作的究極手工抹茶巧克力！"
80000051-86 = "請品嘗看看吧。確認是否有比剛才的巧克力更甜。"
80000051-87 = "[s]「那我就開動了。」"
80000051-92 = "呵呵呵……！"
80000051-93 = "（面對羽留奈充滿期待的眼神，回答根本不需要思考……）"
80000051-94 = "[s]「嗯，又甜又好吃。比剛剛的巧克力甜多了。」"
80000051-95 = "果然沒錯！成功了，我又向究極的美食邁出了嶄新的一步……！"
80000051-96 = "[s]「當然，是因為裡面飽含羽留奈的心意。」"
80000051-97 = "！？！！！？！？！？"
80000051-98 = "我，我的心意……確，確實，沒錯，確實是這麼說沒錯……？"
80000051-99 = "這麼說也，沒錯……？"
80000051-100 = "[s]「羽留奈？怎麼了？」"
80000051-101 = "……原來如此。這我可沒預料到。"
80000051-102 = "（和喜歡的對象四目相望時的心情，心中湧出的感覺……#n　以及聽到感想之後再次出現的，這股甜味……）"
80000051-103 = "呵，呵呵呵……原來是這麼回事，我學到了一課。"
80000051-104 = "那麼老師，我就先告辭了。"
80000051-105 = "啊，剩下的巧克力請務必全部吃掉哦。那麼再會……！"
80000051-109 = "[ns]「等等，羽留奈！？」"
80000051-112 = "（目送以驚人氣勢離開的羽留奈後，又吃了一口抹茶巧克力）"
80000051-114 = "（雖然帶有微微的苦味，不過果然非常香甜）"

80000051-65 = "#wait;500"
80000051-66 = "#wait;2000"
80000051-67 = "3;하루나;07;게헨나 학생식당 냉장고에는 마물이 살고 있다는 소문을 들었지만. 그게 사실이었던 거군요.\n#3;ar"
80000051-68 = "3;하루나;06;역시 얕볼 수 없겠어요. 하지만 전 겨우 이런 걸로 포기하지 않는답니다!\n#3;em;[반응]\n#3;jump"
80000051-69 = "#st;[0,0];instant;1;"
80000051-70 = "#clearST"
80000051-71 = "3;하루나;06\n#3;dr\n#wait;1000"
80000051-72 = "#wait;500"
80000051-73 = "#wait;500"
80000051-74 = "#wait;500"
80000051-75 = "#wait;1500"
80000051-76 = "3;하루나;02;자아, 계속 가시죠!\n#3;em;[!]\n#3;closeup\n#3;a"
80000051-77 = "#st;[0,0];instant;1;"
80000051-78 = "#clearST"
80000051-79 = "3;하루나;02\n#3;dr\n#3;closeup\n#wait;1000"
80000051-80 = "[ns] \"괜찮은 걸까?! 정말 이걸로 괜찮은 걸까?!\""
80000051-81 = "#all;hide"
80000051-82 = "#wait;1000"
80000051-83 = "#na;(그렇게 갖은 고생 끝에, 우리는 마침내 말차 초콜릿을 완성해낼 수 있었다.)"
80000051-84 = "#wait;1500"
80000051-85 = "5;하루나;01;후후……. 드디어 완성했습니다. 선생님과 제가 함께 만든 궁극의 수제 말차 초콜릿!\n#5;em;[!]\n#5;a"
80000051-86 = "5;하루나;02;그럼 맛보시고, 아까 먹었던 초콜릿보다 더욱 달콤한 맛이 느껴질지. 코멘트, 부탁드리겠습니다.\n#5;m3"
80000051-87 = "[s] \"으, 으응.\""
80000051-88 = "#st;[0,0];instant;1;"
80000051-89 = "#clearST"
80000051-90 = "#wait;2000"
80000051-91 = "#wait;2000"
80000051-92 = "5;하루나;03;후후후……. 후후, 후후후…….\n#5;em;[반짝]\n#5;stiff"
80000051-93 = "#na;(기대감으로 가득 찬 하루나에게 해줄 수 있는 말은 하나뿐이었다.)"
80000051-94 = "[s] \"응. 달콤해. 아까 그 초콜릿보다 훨씬 더.\""
80000051-95 = "5;하루나;01;역시나! 이건 성공이로군요! 궁극의 미식을 향한 제 도전은 역시나 틀리지 않았다는……!\n#5;em;[음표]"
80000051-96 = "[s] \"하루나의 마음이 가득 들어있다고 생각하니 더 달콤한 거 같아.\""
80000051-97 = "5;하루나;04;?!?!?!\n#5;em;[?!]\n#5;jump\n#fontsize;80"
80000051-98 = "5;하루나;04;저, 저의 마음이? 아, 물론 그건 틀린 말은, 아, 음. 흠흠.\n#5;shake"
80000051-99 = "5;하루나;04;으음……. 아, 아니지만…….\n#5;em;[땀]\n#5;stiff\n#fontsize;55"
80000051-100 = "[s] \"응……? 하루나? 왜 그래?\""
80000051-101 = "5;하루나;99;……과연. 이건, 미처 예상치 못했군요.\n#5;greeting"
80000051-102 = "5;하루나;99;(좋아하는 사람과 마주 보고 있을 때, 이렇게나 가슴에 치미는 달콤한 감상을 있는 그대로 듣는다……. 굳이 달콤한 디저트를 먹지 않더라도 이 느낌은…….)\n#5;em;…"
80000051-103 = "5;하루나;02;……후후후, 네, 좋은 공부가 되었습니다!"
80000051-104 = "5;하루나;06;그럼 선생님. 전 이만! 물러가 보도록 하겠습니다.\n#5;em;[반응]"
80000051-105 = "5;하루나;02;아, 남은 초콜릿은 전부 드셔도 좋답니다. 그럼."
80000051-106 = "#st;[0,0];instant;1;"
80000051-107 = "#clearST"
80000051-108 = "5;하루나;02\n#5;dr\n#wait;2000"
80000051-109 = "[ns] \"자, 잠깐?! 저기 하루나?!\""
80000051-110 = "#wait;2500"
80000051-111 = "#wait;1000"
80000051-112 = "#na;(하루나가 황급히 떠나간 자리를 바라보며, 다시 한번 말차 초콜릿을 맛보았다.)"
80000051-113 = "#wait;1500"
80000051-114 = "#na;(살짝 쓰지만, 역시나 굉장히 달콤한 맛이 났다.)"

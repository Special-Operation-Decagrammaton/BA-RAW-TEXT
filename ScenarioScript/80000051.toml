[translation]
80000051-1 = "ยิ่งขมยิ่งหวานกลมกล่อม"
80000051-2 = "โรงอาหาร 17 เกเฮนน่า"
80000051-3 = "(คุณครูได้รับข้อความจากฮารุนะให้มาพบที่โรงอาหาร)"
80000051-4 = "[s] \"บอกให้มาเจอกันที่นี่นี่นา แล้วฮารุนะล่ะ...?\""
80000051-5 = "ฮุฮุฮุ คุณครูคะ มาถึงตามเวลาที่นัดไว้เลยนะคะ"
80000051-6 = "[s] \"อ๊ะ ฮารุนะ---....\""
80000051-7 = "นี่ค่ะ!"
80000051-10 = "[ns] \"อึ่ก?! อุ๊บ?!\""
80000051-14 = "(รสหวานของช็อกโกแลตและรสขมเข้มข้นเป็นเอกลักษณ์ของมัทฉะแพร่กระจายในปาก)"
80000051-18 = "[ns] \"อึ่ก! เฮ้อ... นี่ช็อกโกแลตมัทฉะเหรอ?\""
80000051-19 = "ฮิฮิ ใช่ค่ะ ถูกต้องแล้วค่ะ คุณครู รับรสได้เร็วมากเลยนะคะ"
80000051-20 = "[s] \"มันเกี่ยวกับการรับรสตรงไหนน่ะ...?\""
80000051-21 = "เมื่อกี้นี้เป็นช็อกโกแลตมัทฉะของแบรนด์ดังเจ้าหนึ่งค่ะ เป็นยังไงบ้างคะ?"
80000051-22 = "[s] \"อืม... หวานปนขมนิดๆ นะ\""
80000051-23 = "ว่าแล้วเชียว... แบบนี้นี่เองสินะคะ ฉันจะจดเอาไว้ค่ะ"
80000051-24 = "อ้อ ที่ฉันเรียกคุณครูมาเพราะเรื่องอะไรน่ะเหรอคะ?"
80000051-25 = "ฮุฮุฮุ คุณครูน่าจะทราบแล้วนะคะว่าวันนี้เป็นวันวาเลนไทน์... วันที่เราจะมอบขนมหวานให้คนสำคัญ#nเป็นของขวัญ"
80000051-26 = "แน่นอนว่าของหวานที่ฉันพูดถึงก็คือพวกช็อกโกแลต แต่ยุคนี้ก็มีการให้ขนมอย่างลูกกวาด มาการอง หรือเค้กแทนด้วยค่ะ"
80000051-27 = "คุณครูทราบมั้ยคะว่าจุดที่เหมือนกันของขนมหวานพวกนี้คืออะไร?"
80000051-28 = "[s] \"อืม... นั่นสินะ...\""
80000051-29 = "ติ๊ง~ หมดเวลาตอบแล้วค่ะ"
80000051-30 = "[s] \"เล่นสปีดควิซรึไงเนี่ย?!\""
80000051-31 = "ตายจริง คุณครู... เส้นทางของการเป็นนักชิมอาหารน่ะ ใครเร็วกว่าคนนั้นชนะนะคะ"
80000051-32 = "แหม เราเลิกคุยล้อเล่นกันดีกว่าค่ะ พูดตรงๆ ก็คือสิ่งที่ขนมพวกนี้มีเหมือนกันก็คือความหวานค่ะ"
80000051-33 = "[s] \"ก็เป็นขนมหวานนี่นา?\""
80000051-34 = "ค่ะ ก็ต้องเป็นอย่างนั้นอยู่แล้ว แต่มันก็ทำให้ฉันคิดว่า ทำไมต้องให้ของขวัญวันวาเลนไทน์ป็นของหวาน#nด้วยนะ"
80000051-35 = "หลังจากครุ่นคิดเรื่องนี้อยู่นาน ในที่สุดฉันก็เข้าใจค่ะ"
80000051-36 = "นั่นก็คือการอุปมาค่ะ"
80000051-37 = "[s] \"การอุปมา...?\""
80000051-38 = "ความหวานของขนมเปรียบเสมือนความรู้สึกของคนสำคัญ..."
80000051-39 = "หรือก็คือการอุปมาถึง \"ความรู้สึกขอบคุณ\" ที่มีต่อฝ่ายตรงข้าม!"
80000051-40 = "[s] \"คะ...ความขอบคุณ...?\""
80000051-41 = "ตอนที่ฉันเข้าใจเรื่องนี้ ฉันก็คิดสมมุติฐานนี้ขึ้นมาได้ค่ะ ถ้าความหวานเปรียบเสมือนความขอบคุณแล้ว เพื่อที่จะแสดงถึงความขอบคุณที่เรามีต่อฝ่ายตรงข้าม"
80000051-42 = "ก็ยิ่งต้องเพิ่มความหวานลงไปในขนมค่ะ"
80000051-43 = "[s] \"หืมมมมม?!\""
80000051-44 = "เอาล่ะ ฉันเตรียมวัตถุดิบของช็อกโกแลตมัทฉะเอาไว้แล้วค่ะ"
80000051-45 = "ทำไมต้องเป็นช็อกโกแลตมัทฉะงั้นเหรอคะ?"
80000051-46 = "ถ้าเป็นช็อกโกแลตนี้ที่มีรสหวานและขมผสมกันอยู่ก็จะพิสูจน์ถึงข้อสันนิษฐานของฉันได้กระจ่าง#nมากขึ้นค่ะ"
80000051-47 = "เอาล่ะ มาเริ่มพิสูจน์กันเถอะค่ะ คุณครู"
80000051-48 = "เรามาช่วยกันทำช็อกโกแลตที่มีความหวานเป็นเท่าตัวกันเถอะค่ะ!"
80000051-49 = "[s] \"เดี๋ยวก่อนสิ ฮารุนะ ที่พูดมาเรื่องนั้นน่ะ...\""
80000051-50 = "คุณครูจะให้ความร่วมมือกับฉันใช่มั้ยคะ?"
80000051-51 = "[s] \"เดี๋ยวสิ เรื่องความหวานนั่นน่ะ...\""
80000051-52 = "คุณครู... จะให้ความร่วมมือกับฉันใช่มั้ยคะ?"
80000051-53 = "[s] \"ก็ได้...\""
80000051-54 = "ฮุฮุ! ค่ะ ถ้างั้นก็มาเริ่มกันเลยค่ะ!"
80000051-55 = "(คุณครูเริ่มลงมือทำช็อกโกแลตมัทฉะกับฮารุนะ)"
80000051-58 = "ปรับระดับไฟไม่ได้งั้นเหรอคะ? ไม่คิดเลยว่าจู่ๆ หม้อจะระเบิดแบบนี้..."
80000051-67 = "มีข่าวลือว่าในตู้เย็นของโรงอาหารเกเฮนน่ามีปีศาจร้ายสิงอยู่ด้วย... สงสัยจะเป็นเรื่องจริงสินะคะ"
80000051-68 = "ประมาทไม่ได้จริงๆ เลยนะคะ แต่ว่าฉันไม่ยอมแพ้เท่านี้หรอกค่ะ!"
80000051-76 = "เอาล่ะ ทำต่อเถอะค่ะ!"
80000051-80 = "[ns] \"ไม่เป็นไรแน่เหรอ แบบนี้ไม่เป็นไรจริงๆ เรอะ?!\""
80000051-83 = "(หลังจากพยายามทำอย่างสุดฝีมือ คุณครูกับฮารุนะก็ทำช็อกโกแลตมัทฉะออกมาได้สำเร็จ)"
80000051-85 = "ฮุฮุ... ในที่สุดก็เสร็จสมบูรณ์แล้ว! ช็อกโกแลตมัทฉะโฮมเมดที่สมบูรณ์แบบของฉันกับคุณครู!"
80000051-86 = "ถ้างั้นก็มาลองชิมดูแล้วช่วยบอกหน่อยนะคะ ว่ารสหวานกว่าช็อกโกแลตที่ทานไปเมื่อครู่นี้รึเปล่า"
80000051-87 = "[s] \"เอ่อ... อื้อ\""
80000051-92 = "ฮุฮุฮุ... ฮุฮุ... ฮุฮุฮุฮุ..."
80000051-93 = "(คำที่จะพูดกับฮารุนะที่มองด้วยสายตาที่คาดหวังอยู่ตอนนี้มีเพียงคำเดียวเท่านั้น...)"
80000051-94 = "[s] \"อื้อ หวานดี หวานกว่าช็อกโกแลตเมื่อกี้เยอะเลย\""
80000051-95 = "คิดไว้แล้วเชียว! แบบนี้เรียกว่าสำเร็จสินะคะ! ความท้าทายสู่การเป็นสุดยอดนักชิมของฉันไม่ผิดจริงๆ ด้วยค่ะ...!"
80000051-96 = "[s] \"พอคิดว่ามีจิตใจของฮารุนะอัดแน่นอยู่ด้วย ก็ยิ่งหวานเข้าไปอีก\""
80000051-97 = "?!?!?!"
80000051-98 = "จะ...จิตใจของฉันเหรอคะ? อ๊ะ จริงๆ ที่พูดมาก็ไม่ผิด... เอ่อ อืม... ฮึ่ม..."
80000051-99 = "อืม... มะ...ไม่ผิดเลยสักนิด..."
80000051-100 = "[s] \"หืม? ฮารุนะเป็นอะไรเหรอ?\""
80000051-101 = "คือ... ฉันไม่ได้คิดเรื่องนี้มาก่อนค่ะ"
80000051-102 = "(เวลาที่ได้เจอคนที่ชอบอยู่ตรงหน้า จะรู้สึกได้ถึงความหวานแผ่ซ่านในหัวใจแบบนี้... จนไม่ต้องกิน#nของหวานเลยก็ยังได้...)"
80000051-103 = "ฮุฮุฮุ ค่ะ! เป็นการเรียนรู้ที่ดีมากเลยค่ะ!"
80000051-104 = "ถ้างั้นคุณครูคะ~ ฉันขอตัวก่อนนะ! ขอตัวกลับก่อนนะคะ"
80000051-105 = "อ๊ะ คุณครูทานช็อกโกแลตที่เหลือให้หมดด้วยนะคะ ฉันขอตัวก่อนค่ะ"
80000051-109 = "[ns] \"ดะ...เดี๋ยวก่อนสิ?! นี่ ฮารุนะ?!\""
80000051-112 = "(คุณครูมองตามฮารุนะที่วิ่งหายไปอย่างรวดเร็ว และลองชิมช็อกโกแลตมัทฉะที่เหลืออยู่อีกครั้งหนึ่ง)"
80000051-114 = "(ถึงจะขมไปนิดหน่อย แต่ก็หวานตะโกนอยู่ดี)"

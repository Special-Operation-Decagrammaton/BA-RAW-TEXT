[translation]
1001206-1 = "เดตแสนหวานกับเทรนเนอร์"
1001206-2 = "ห้างสรรพสินค้า ชานเมืองมิลเลเนียม"
1001206-3 = "......"
1001206-4 = "อ๊ะ มาแล้วเหรอคะ เทรนเนอร์"
1001206-5 = "กำลังรออยู่เลยค่ะ"
1001206-6 = "คะ? คิดว่าฉันมาซื้อของออกกำลังกายเหรอคะ?"
1001206-7 = "ปะ...เปล่าค่ะ ไม่ใช่เลยค่ะ"
1001206-8 = "คือฉันไม่รู้ว่าจะนัดเจอกับเทรนเนอร์ที่ไหนดี"
1001206-9 = "อาจเป็นเพราะทุกครั้งที่เจอกัน เราคุยกันแต่เรื่องออกกำลังกายอย่างเดียว"
1001206-10 = "เพราะงั้นวันนี้ฉันเลยอยากคุยเรื่องอื่นนอกจากเรื่องออกกำลังกายบ้างค่ะ"
1001206-11 = "......"
1001206-13 = "อ๊ะ ขอโทษด้วยค่ะ เทรนเนอร์!"
1001206-14 = "เทรนเนอร์คงกำลังยุ่งอยู่แท้ๆ ฉันไม่ควรขอให้เทรนเนอร์ออกมาเจอเลย ขอโทษนะคะ!"
1001206-15 = "[s1] \"ไม่หรอก ออกมาแบบนี้บ้างก็ดีเหมือนกัน\"\n[s2] \"ฟังดูเหมือนเดตเลยนะ....\""
1001206-16 = "มะ...ไม่เป็นไรจริงๆ เหรอคะ?"
1001206-17 = "ขอบคุณค่ะเทรนเนอร์!"
1001206-18 = "!?"
1001206-19 = "คะ? ดะ...เดตเหรอคะ? เอ่อ...เรื่องนั้นมัน...."
1001206-20 = "เปล่าค่ะ ไม่ได้ไม่ชอบค่ะแต่ว่า..."
1001206-21 = "อะ... อือ....."
1001206-22 = "[s] \"ถ้างั้นเราไปไหนก่อนดีล่ะ?\""
1001206-23 = "ดูจากตารางออกกำลังกาย วันนี้เรากินของหวานกับขนมที่ทำจากแป้งได้ค่ะ"
1001206-24 = "ใช่แล้วค่ะ วันนี้คือ \"ชีตเดย์\" ไงล่ะคะ"
1001206-25 = "เราไปกินอะไรกันก่อนดีมั้ยคะเทรนเนอร์?"
1001206-26 = "[s] \"งั้นไปกินขนมหวานกันเถอะ!\""
1001206-27 = "ค่ะ เทรนเนอร์!"
1001206-30 = "ว้าว ฉันไม่ได้มาที่ร้านนี้นานมากเลย"
1001206-31 = "ฉันเคยได้ยินเพื่อนพูดถึงคาเฟ่พวกนี้กันบ่อยๆ"
1001206-32 = "แต่ก็คิดมาตลอดว่าร้านพวกนี้ไม่ใช่สไตล์ที่เหมาะกับฉันเลย..."
1001206-33 = "แต่พอได้มาที่นี่แล้วกลับรู้สึกชอบกว่าที่คิดซะอีกค่ะ"
1001206-34 = "ดีใจจังที่เลือกมาที่นี่นะคะ เทรนเนอร์"
1001206-35 = "รับอะไรดีครับ?"
1001206-36 = "อ๊ะ สักครู่นะคะ"
1001206-38 = "อืม..."
1001206-39 = "อ๊ะ เค้กอันนี้"
1001206-40 = "น่ารักจังเลย..."
1001206-41 = "[s] \"งั้นสั่งมากินมั้ย?\""
1001206-42 = "ได้ค่ะเทรนเนอร์"
1001206-43 = "อ๊ะ รอเดี๋ยวก่อนค่ะ"
1001206-44 = "คือว่าคุณพนักงานคะ? ฉันมีเรื่องอยากถามสักหน่อยค่ะ"
1001206-45 = "ต้องการสอบถามอะไรเหรอครับ"
1001206-46 = "ตุ๊กตาที่ตกแต่งอยู่บนเค้กอันนี้น่ะค่ะ"
1001206-47 = "ฉันจะดูข้อมูลสารอาหารกับส่วนประกอบของเค้กชิ้นนี้ได้ที่ไหนเหรอคะ?"
1001206-48 = "คะ...ครับ?"
1001206-49 = "เค้กชิ้นนี้มีแคลอรี่เท่าไหร่ หรือมีปริมาณน้ำตาลกับไขมันเท่าไหร่..."
1001206-50 = "อ๋อ ถึงอาจจะมีผสมอยู่ไม่เยอะก็ตาม แต่ฉันก็อยากรู้ค่ะว่าเค้กนี่มีโปรตีนอยู่ที่เท่าไหร่"
1001206-51 = "เอ่อ.....เรื่องนั้น...."
1001206-52 = "[s] \"เอ่อ สึมิเระ...\""
1001206-53 = "อะไรเหรอคะ?"
1001206-55 = "อ่า..."
1001206-56 = "อ๊ะ เอาอีกแล้ว... ขอโทษด้วยนะคะ"
1001206-57 = "คุณพนักงานช่วยลืมเรื่องที่ฉันพูดเมื่อกี้นี้ไปด้วยนะคะ ขอโทษด้วยค่ะ"
1001206-59 = "(หลังจากได้เมนูที่สั่งแล้วคุณครูกับสึมิเระก็ไปหาที่นั่งทานขนม)"
1001206-60 = "เฮ้อ ขอโทษด้วยนะคะ เทรนเนอร์"
1001206-61 = "ฉันไม่ได้กำลังลดน้ำหนักก็จริง แต่ว่าการรู้ส่วนผสมของอาหารที่กินเข้าไป มันจะช่วยเรื่อง#nการออกกำลังกายมากๆ เลยนะคะ"
1001206-62 = "การทานอาหารที่เหมาะสมเป็นเรื่องสำคัญมากในการดูแลสุขภาพในช่วงที่ออกกำลังเพื่อเพิ่ม#nกล้ามเนื้อในตัวค่ะ"
1001206-63 = "โอ๊ะ ว่าแต่เทรนเนอร์ได้ลองกินเวย์โปรตีนที่ฉันให้ไปรึยังคะ?"
1001206-64 = "อาหารที่เรากินมักจะมีโปรตีนไม่เพียงพอตามที่ร่างกายต้องการค่ะ"
1001206-65 = "แต่ถ้าทานเวย์โปรตีนเสริมแล้วล่ะก็จะได้รับโปรตีนที่มีคุณค่าทางชีวภาพสูงได้เพียงพอตามที่#nร่างกายต้องการค่ะ"
1001206-66 = "โปรตีนที่มีคุณค่าทางชีวภาพ ก็คือการที่ร่างกายเราได้รับโปรตีนสำหรับบำรุงและเสริมสร้าง#nร่างกาย...."
1001206-67 = "[s3] \"คือว่า...สึมิเระ\"\n[s4] \"ขนมหวานเรียกร้องให้เรารีบกินมันแล้วล่ะ....\""
1001206-68 = "...อ๊ะ"
1001206-69 = "...อ๊ะ"
1001206-70 = "อ๊าาาาา!"
1001206-71 = "ขอโทษด้วยค่ะเทรนเนอร์"
1001206-72 = "พอดีฉันตื่นเต้นเกินไปหน่อย"
1001206-73 = "ฉันมักจะลืมตัวเวลาได้พูดเรื่องการออกกำลังกาย..."
1001206-74 = "น่าขายหน้าจริงๆ เลยค่ะ เทรนเนอร์"
1001206-75 = "[s] \"ไม่เป็นไรหรอก มากินขนมกันดีกว่า\""
1001206-76 = ".....ค่ะเทรนเนอร์"
1001206-78 = "(จากนั้นคุณครูกับสึมิเระก็นั่งกินของหวานกันอย่างเอร็ดอร่อย)"
1001206-80 = "[ns] \"ถ้างั้นเรากลับกันเลยมั้ย?\""
1001206-81 = ".....ค่ะ"
1001206-82 = "คะ? ฉันดูเหมือนอารมณ์ไม่ดีเหรอคะ?"
1001206-83 = "คะ...คือว่า..."
1001206-84 = "ฉันรู้สึกแย่ที่เอาแต่พูดเรื่องออกกำลังกายไม่หยุด..."
1001206-85 = "วันนี้ฉันอยากจะคุยกับเทรนเนอร์แบบทั่วๆ ไปแท้ๆ"
1001206-86 = "[s5] \"เราก็คุยกันเรื่องทั่วไปนี่นา\"\n[s6] \"วันนี้เราก็ใช้เวลาด้วยกันแบบปกตินี่นา\""
1001206-87 = "....."
1001206-88 = "....."
1001206-89 = "หึหึ ค่ะ"
1001206-90 = "ขอโทษครับคุณลูกค้า รอสักครู่นะครับ"
1001206-91 = "คะ?"
1001206-92 = "เค้กที่คุณลูกค้าซื้อวันนี้เป็นเค้กที่ทางร้านจัดโปรโมชั่นอยู่ ซึ่งทางร้านจะมอบตุ๊กตาให้กับลูกค้าที่#nมาซื้อเค้กที่ร้านของเราครับ"
1001206-93 = "ผมลองไปดูที่หลังร้านมาแล้วพบว่ายังมีเหลืออยู่หนึ่งตัวครับ นี่ครับ!"
1001206-95 = "นะ...น่ารักจัง...."
1001206-96 = "กลับดีๆ นะครับ~"
1001206-97 = "ว้าว เทรนเนอร์คะ"
1001206-98 = "น่ารักจังเลย...."
1001206-99 = "[s] \"ดีจังเลยนะ สึมิเระ\""
1001206-100 = "หึหึ... ค่ะ"
1001206-101 = "เวลาที่อยู่กับเทรนเนอร์ ไม่ว่าจะทำอะไรฉันก็รู้สึกสนุกมากๆ เลยค่ะ"
1001206-103 = "คือว่า....เทรนเนอร์คะ"
1001206-104 = "ต่อไปถ้าได้ใช้เวลาด้วยกันอีกเยอะๆ ก็คงดีนะคะ"

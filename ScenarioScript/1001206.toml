[translation]
1001206-1 = "約會"
1001206-2 = "千年近郊．購物中心"
1001206-3 = "……"
1001206-4 = "啊，指導員！"
1001206-5 = "恭候多時了！"
1001206-6 = "咦？健身用品……？"
1001206-7 = "不是不是！今天不是那個……"
1001206-8 = "那個，浮現不出比這裡還要好的地方，所以才選了這裡。"
1001206-9 = "因為總覺得，每次都只有和指導員聊運動的事……"
1001206-10 = "今天想聊一些和運動沒有關係的事呢，之類的……"
1001206-11 = "……"
1001206-13 = "不，不好意思！指導員！"
1001206-14 = "原本就很忙碌了，卻因為我的關係而叫您出來！"
1001206-15 = "[s1]「不會，我也想和堇聊聊其他的事呢。」\n[s2]「……約會？」"
1001206-16 = "真，真的嗎？"
1001206-17 = "非常謝謝您，指導員！"
1001206-18 = "！？"
1001206-19 = "咦？約，約會嗎？不，不是，我，我怎麼會……！"
1001206-20 = "不是那個，並不是討厭……！"
1001206-21 = "唔，唔唔……"
1001206-22 = "[s]「要去哪裡呢？」"
1001206-23 = "啊，其實今天，是可以盡情攝取糖分和脂肪的日子。"
1001206-24 = "也就是所謂的，放縱日的東西呢。"
1001206-25 = "所以可以的話，要去吃點什麼嗎？"
1001206-26 = "[s]「那就去吃甜食吧！」"
1001206-27 = "好的！"
1001206-30 = "哇啊……"
1001206-31 = "雖然有從朋友聽說，和從外面看過。"
1001206-32 = "我還以為，這種地方是和我沒有什麼緣分的地方。"
1001206-33 = "像這樣來了之後，發現有很多可愛的東西呢。"
1001206-34 = "已經覺得，來到這裡真是太好了，指導員。"
1001206-35 = "請問要點什麼呢？"
1001206-36 = "啊，請稍等一下。"
1001206-38 = "嗯……"
1001206-39 = "啊，這個蛋糕……"
1001206-40 = "好可愛……！"
1001206-41 = "[s]「要點那個嗎？」"
1001206-42 = "是的！"
1001206-43 = "啊，不好意思在那之前。"
1001206-44 = "店員小姐，可以提出問題嗎？"
1001206-45 = "是的，請問是什麼呢？"
1001206-46 = "關於這個裝飾著可愛吉祥物的蛋糕，"
1001206-47 = "請問有成分表嗎？"
1001206-48 = "……什麼？"
1001206-49 = "整體的熱量、糖分、脂肪，各自有多少。"
1001206-50 = "雖然不是該向這種東西尋求的，不過我也很在意蛋白質的含量。"
1001206-51 = "那，那個……那是……"
1001206-52 = "[s]「那個，堇……？」"
1001206-53 = "是的，有什麼事呢？"
1001206-55 = "……啊。"
1001206-56 = "我，我又……不，不好意思！"
1001206-57 = "不好意思，剛才說的請不用在意……"
1001206-59 = "（這之後，接收了要求的甜點，坐在了咖啡廳中的座位上）"
1001206-60 = "不好意思指導員，不小心……"
1001206-61 = "雖然不是在減肥中，不過掌握飲食成分是鍛鍊的基礎……"
1001206-62 = "就算不是為了鍛鍊肌肉，為了維持身體健康，以正確知識為基礎的飲食生活也是很重要的。"
1001206-63 = "話說回來，之前送給您的乳清蛋白有確實在喝嗎？"
1001206-64 = "我想了老師應該知道，普通的飲食能攝取的蛋白質量自然是有極限的。"
1001206-65 = "所以，通過飲用乳清蛋白，可以輕鬆攝取生物價非常高的蛋白質。"
1001206-66 = "這裡說的生物價是，於維持健康和身體成長所使用的營養素──"
1001206-67 = "[s3]「那個，堇……？」\n[s4]「甜點……」"
1001206-68 = "……啊。"
1001206-69 = "……啊。"
1001206-70 = "不，不小心……！"
1001206-71 = "不好意思，指導員。"
1001206-72 = "我又一個人，興奮起來了……"
1001206-73 = "提到運動的話題就無論如何……"
1001206-74 = "真的非常抱歉。指導員。"
1001206-75 = "[s]「不會，總之來吃吧。」"
1001206-76 = "……好的，指導員。"
1001206-78 = "（和堇一起，美味的享用了甜點）"
1001206-80 = "[ns]「那麼，差不多回去吧？」"
1001206-81 = "……好的。"
1001206-82 = "咦？臉色……？"
1001206-83 = "這，這是因為……"
1001206-84 = "我在想，結果今天也一不注意就一直在聊運動的事呢……"
1001206-85 = "明明只有今天，想進行普通的對話。"
1001206-86 = "[s5]「可以普通的對話我很開心唷。」\n[s6]「堇和我的，普通的對話。」"
1001206-87 = "……呵呵。"
1001206-88 = "……呵呵。"
1001206-89 = "是的，也許是那樣沒錯呢。"
1001206-90 = "那個，客人！"
1001206-91 = "……我嗎？"
1001206-92 = "客人購入的蛋糕是目前活動的對象，以順序在贈予玩偶。"
1001206-93 = "雖然原本認為已經沒有了，不過重新確認了庫存發現還剩下一個。請收下！"
1001206-95 = "好，好可愛……"
1001206-96 = "那麼，歡迎再次光臨！"
1001206-97 = "指導員……！"
1001206-98 = "這孩子，非常的可愛……！"
1001206-99 = "[s]「嗯，太好了呢。」"
1001206-100 = "呵呵，是的！"
1001206-101 = "和指導員在一起，最後總是會很開心變得幸福。"
1001206-103 = "那個，指導員。"
1001206-104 = "我今後也想和指導員一起，包含鍛鍊，一起做各種事。"
1001206-105 = "所以，重新一次。"
1001206-106 = "請多多指教，指導員。"

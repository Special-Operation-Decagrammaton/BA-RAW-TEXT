10037060-6 = "3;체리노 치파오;02;죽순……?\n#3;em;[?]"
10037060-7 = "5;키사키;02;대나무의 싹이다. 맛이 부드럽고 연한 데다 식감이 좋아, 어떤 요리에 들어가도 어울리지.\n#5;al\n#3;m1"
10037060-8 = "5;키사키;01;아마도 어제 현무상회의 요리에서도 재료로 들어갔을 터지만……."
10037060-9 = "3;체리노 치파오;03;아, 그 노랗고 얇은 그거? 고소했지!\n#3;em;[재잘]\n#3;hophop"
10037060-10 = "5;미나;08;음! 산해경의 죽순은 특히나 질이 좋아, 이른 아침부터 먹어도 질리지 않는다는 말이 있을 정도니까!\n#5;em;[반짝]\n#5;a"

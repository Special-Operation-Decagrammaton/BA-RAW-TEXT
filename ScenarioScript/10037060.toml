[translation]
10037060-1 = "ตอนที่ 6;ต้นไผ่ไม่โค้งงอเมื่อถูกหิมะ"
10037060-3 = "[ns] \"เป็นป่าไผ่ที่เขียวขจีเลยนะ...\""
10037060-4 = "ฮุฮุ เป็นอย่างไรเล่า ครู ยอดเยี่ยมเลยใช่ไหม?"
10037060-5 = "ถ้ามาถูกฤดูกาล ก็จะได้เห็นการเก็บหน่อไม้ด้วยนะ"
10037060-6 = "หน่อไม้เหรอ...?"
10037060-7 = "หน่อของต้นไผ่น่ะ หน่อไม้มีรสชาตินุ่มละมุนและเนื้อสัมผัสดี ก็เลยเข้ากันได้ดีกับทุกเมนู"
10037060-8 = "น่าจะใช้เป็นส่วนผสมในอาหารของย่านการค้าเทพเต่าดำเมื่อวานด้วยนะ..."
10037060-9 = "อ้อ ที่สีเหลืองๆ บางๆ นั่นน่ะเหรอ? รสหอมมันเลยละ!"
10037060-10 = "อื้อ! หน่อไม้ของซานไห่จิงเป็นผลผลิตที่มีคุณภาพ ว่ากันว่าต่อให้กินตั้งแต่เช้าตรู่ก็ไม่มีเบื่อเลยละ!"
10037060-12 = "ท่านประมุข วันนี้ดีจังเลยนะคะที่ได้มาเดินชมด้วยกัน"
10037060-13 = "นั่นสินะ... เราก็ต้องขอโทษด้วยที่เมื่อวานเราเสียมารยาทไปหน่อย เลขาธิการเชริโน่"
10037060-14 = "หืม? พูดเรื่องอะไรเหรอ ประมุขคิซากิ"
10037060-15 = "ก็ที่เราเป็นเจ้าภาพของงานแลกเปลี่ยนนี้แท้ๆ แต่กลับไม่ได้มาแนะนำสถานที่ให้แขกคนสำคัญอย่างถูก#nต้องน่ะสิ"
10037060-21 = "ทะ... ท่านประมุข...!"
10037060-23 = "อ้อ เรื่องนั้นน่ะเหรอ? เราก็ว่าเรื่องอะไร ยังกังวลเกี่ยวกับเรื่องนั้นอยู่อีกสินะ?"
10037060-24 = "ไหนๆ ก็พูดเรื่องนี้แล้ว เราจะขอบอกไว้ตรงนี้เลยแล้วกัน"
10037060-30 = "เลขาธิการจากเรดวินเทอร์อย่างเราไม่ติดค้างกับเรื่องขี้ปะติ๋วแบบนั้นหรอก!"
10037060-35 = "สมกับที่เป็นท่านประธานเชริโน่ค่ะ!"
10037060-37 = "อะ... อืม...!"
10037060-38 = "(ถึงจะไม่รู้ว่าพูดจริงมากแค่ไหน แต่ก็ถือว่าโล่งอกไปละนะ ดูเหมือนว่าเลขาธิการเชริโน่ก็ไม่ได้อารมณ์#nเสียขนาดนั้น)"
10037060-39 = "ถ้าทางเรดวินเทอร์ไม่ติดใจอะไร ทางเราก็ต้องยิ่งขอบคุณเลยละ จะว่าไป เมื่อคืนนอนหลับสบายกันดี#nหรือเปล่า ห้องนอนมีปัญหาอะไรหรือไม่? "
10037060-40 = "ค่ะ ไม่มีปัญหาอะไรเลยค่ะ ท่านประมุขคิซากิ ที่นอนทั้งอบอุ่น ทั้งหนานุ่ม ต้องบอกว่าไม่มีอะไรดีไป#nกว่านี้แล้วละค่ะ"
10037060-41 = "แต่ว่า... เหมือนฉันได้กลิ่นบางอย่างที่ไม่เคยได้กลิ่นมาก่อนเลยค่ะ"
10037060-42 = "ฮุฮุ กลิ่นนั้นน่ะหรือ หัวหน้าคณะฯ มารินะเป็นคนอ่อนไหวต่อกลิ่นสินะ มันเป็นกลิ่นของธูปที่ชมรม#nวิจัยศาสตร์การปรุงยาของซานไห่จิงผลิตให้น่ะ"
10037060-43 = "ทางนั้นบอกว่าเป็นกลิ่นที่ช่วยรักษาเสถียรภาพของร่างกายและจิตใจ... แต่เราก็ไม่รู้ว่าช่วยได้หรือเปล่า"
10037060-44 = "คะ... คะ? พอได้ฟังแล้วก็น่าจะใช่นะคะ... แต่ก็ไม่แน่ใจเหมือนกัน..."
10037060-45 = "เอาเถอะ ไหนๆ เราก็มาถึงป่าไผ่กันแล้ว เราจะให้ดูอะไรดีๆ บางอย่าง"
10037060-46 = "อะไรดีๆ งั้นเหรอคะ?"
10037060-48 = "อะไรดีๆ ที่ว่า...? อ๊ะ!"
10037060-49 = "ใช่แล้ว มันคือสิ่งที่มีชื่อเสียงประจำป่าไผ่ของซานไห่จิงเลยละ "
10037060-50 = "ฮุฮุฮุ ตั้งตารอได้เลย ไม่มีนักเรียนคนไหนที่ได้ดูสิ่งนั้นที่นี่แล้วผิดหวังสักรายเลยละ!"
10037060-51 = "งั้นเราก็ไปกันเถอะ เราจะนำไปเอง"
10037060-56 = "นะ... นั่นมัน...?! อย่าบอกนะว่า...!"
10037060-57 = "ยอดเยี่ยมไร้เทียมทานเลยใช่มั้ยล่ะ? น่ารักจนเกินต้านเลยว่ามั้ย?"
10037060-62 = "แพนด้า!!!"
10037060-63 = "หัวหน้าคณะฯ มารินะ ถ้าตะโกนเสียงดัง พวกแพนด้าอาจจะตกใจแล้วหนีกันไปก็ได้นะ..."
10037060-64 = "เฮือก... งั้นเหรอ?! "
10037060-66 = "แม้จะเป็นไปได้น้อย แต่เด็กๆ ที่เชื่องช้าพวกนั้นก็อาจจะว่องไวขึ้นมาก็ได้"
10037060-67 = "(ที่จริงพวกเราได้เห็นลูกแพนด้าในคุกมาแล้วตั้งแต่วันที่มาถึง...)"
10037060-68 = "(แต่ถ้าหยิบเรื่องนั้นมาพูด ก็อาจจะไม่เหมาะก็ได้นะ)"
10037060-69 = "ถึงจะไม่ได้เห็นเป็นครั้งแรก แต่ลายขาวๆ ดำๆ นั่นก็ยังดูแปลกตาอยู่ดีนะ..."
10037060-70 = "หืม? หมายความว่าเคยเห็นแพนด้ามาแล้วอย่างนั้นหรือ?"
10037060-71 = "ใช่ค่ะ เคยเห็นมาจากในเอกสารและรูปถ่ายน่ะค่ะ ปกติหัวหน้าคณะฯ มารินะชื่นชอบหมีทุกสายพันธุ์อยู่#nแล้วด้วยค่ะ"
10037060-72 = "ฮุฮุ อย่างนั้นสินะ แพนด้าก็เป็นหมีเหมือนกัน แม้ว่าเจ้าพวกนี้จะกินไผ่ในวันหนึ่งไม่ใช่น้อยๆ เลยก็เถอะ"
10037060-74 = "จะว่าไปแล้ว ได้ยินว่าแพนด้ากินแต่ไผ่เหรอคะ...?"
10037060-75 = "ใช่แล้ว แต่ก็ใช่ว่าจะกินไผ่อะไรก็ได้นะ เจ้าพวกนี้เลือกกินแต่ไผ่ที่ตัวเองเคยกินเท่านั้น"
10037060-76 = "และนอกจากกินและนอนแล้วก็ไม่ทำอะไรอื่นเลยด้วย..."
10037060-77 = "[s] \"เกิดมาเพื่อกินๆ นอนๆ งั้นเหรอ แพนด้านี่สุดยอดไปเลยนะ! อิจฉาจัง!\""
10037060-78 = "คะ... ครู?"
10037060-79 = "อืม... ตอนนี้รู้สึกเหมือนเจอความมืดสนิทเลย..."
10037060-80 = "แต่แพนด้าก็เป็นสัตว์ที่น่ารักอยู่ดี ว่าไหมเล่า?"
10037060-82 = "ใช่ค่ะ ท่านประมุข! แค่ได้ยืนดูเฉยๆ...!"
10037060-86 = "ก็รู้สึกเหมือนหัวใจได้รับการเยียวยาแล้วเลย...!"
10037060-87 = "ฮุฮุ เพลิดเพลินให้เต็มที่เลยนะ เพราะแค่เราได้ดูก็รู้สึกสบายใจไปด้วยเหมือนกัน อยากเข้าไปดูใกล้ๆ กว่านี้ไหมเล่า?"
10037060-91 = "ได้เหรอคะ?!"
10037060-92 = "ได้สิ มินะจะพาไปเอง เด็กๆ พวกนั้นน่ะคุ้นเคยกับคนกันบ้างแล้วละ มินะ เราฝากด้วย"
10037060-94 = "ค่ะ ท่านประมุข"
10037060-98 = "งั้นก็เข้าไปดูใกล้ๆ แล้วก็ระมัดระวังกันด้วยนะ"
10037060-99 = "ถ้าเข้าไปใกล้เกิน จะไม่เป็นผลดีกับทั้งแพนด้าและคนด้วย ช่วยรักษาระยะห่างให้เหมาะสมด้วย..."
10037060-110 = "เอาละ งั้นครูเองก็..."
10037060-114 = "?!?!"
10037060-119 = "(อะไรกัน...? ทำไมจู่ๆ ร่างกายเราถึง...!)"
10037060-120 = "(ทั้งหายใจลำบาก... แล้วก็เวียนหัวมาก แขนขาก็ไม่มีแรงเลย)"
10037060-121 = "(แล้วทำไมต้องเป็นตอนนี้ด้วย...?)"
10037060-122 = "[ns] \"คะ... คิซากิ?! เป็นอะไรหรือเปล่า?!\""
10037060-128 = "(เหมือนได้ยินเสียงของครู... ดังแว่วๆ มา แต่เราอยู่ไกลกันขนาดนั้นเลยเหรอ?)"
10037060-129 = "(ถ้าไม่ใช่อย่างนั้นละก็...)"
10037060-137 = "ครู... เรามีเรื่องอยากถาม"
10037060-138 = "ตอนนี้... ฟ้ามืดแล้วหรือ? เรามองไม่เห็นอะไรเลย"
10037060-139 = "[ns] (......!)"
10037060-141 = "[ns] \"อืม... ใช่แล้วละ พระอาทิตย์ตกไปตอนไหนไม่รู้เลยนะเนี่ย...\""
10037060-143 = "..."
10037060-144 = "เช่นนั้นหรือ...?"
10037060-145 = "..."
10037060-146 = "เรามีเรื่องขอร้องหน่อยน่ะ ครู"
10037060-147 = "ช่วยเรียกหัวหน้าชมรมวิจัยศาสตร์การปรุงยา... มาให้ที"
10037060-149 = "[ns] \"ให้เรียกซายะมาที่นี่เหรอ...?\""
10037060-150 = "ใช่... ตอนนี้นั่นคือวิธีเดียวที่จะจัดการสถานการณ์นี้น่ะ..."
10037060-151 = "แล้วก็... ฝากติดตามเลขาธิการเชริโน่กับคณะจากเรดวินเทอร์ไปด้วยนะ..."
10037060-152 = "เราอยากให้ครูกับมินะ... ช่วยพาทุกคนไปที่อาคารหกเหลี่ยม ให้ดูเป็นธรรมชาติ..."
10037060-153 = "[ns1] \"ครูจะหาทางจัดการเอง แล้วคิซากิล่ะ?\"\n[ns2] \"ว่าแต่ ตอนนี้มันกลางคืนแล้วนะ...แล้วคิซากิล่ะ?\""
10037060-154 = "ฮุฮุ..."
10037060-155 = "ฮุฮุ..."
10037060-156 = "ครูนี่นะ เป็นคนใจดีจริงๆ เลย..."
10037060-157 = "แต่ว่า... ครูไม่ต้องมาอยู่คุยกับเราหรอก..."
10037060-163 = "ขอโทษที่บอกข่าวดีไม่ได้นะ ประมุข..."
10037060-164 = "(มาถึงแล้วงั้นหรือ...?)"
10037060-165 = "แต่ในเมื่อประมุขอยากรู้ข้อเท็จจริง ท่านซายะก็คงไม่มีทางเลือกอื่นนอกจากตอบอย่างตรงไปตรงมา#nนั่นละนะ..."
10037060-169 = "(ไม่สิ... ไม่ใช่ นี่คือความทรงจำในตอนนั้นงั้นหรือ...)"
10037060-172 = "เพราะงั้นก็ตั้งใจฟังให้ดีละ"
10037060-173 = "ต่อไปร่างกายของประมุขจะเคลื่อนไหวได้ไม่เต็มที่ เรียกได้ว่าร่างกายมีเวลาจำกัดในแต่ละวันน่ะ..."
10037060-174 = "(ใช่ ตอนนั้นเธอพูดไว้ว่าอย่างนั้น...)"
10037060-175 = "ถ้าให้ทำทั้งอาคารหกเหลี่ยมคงไม่ไหว เอาเป็นว่าเราจะให้จุดธูปหอมไว้ในห้องนอนแล้วกัน กลิ่นจากธูปหอมจะช่วยให้สภาพร่างกายดีขึ้นได้บ้างน่ะ"
10037060-176 = "และจากนี้ไปก็ต้องกินยาลูกกลอนอันนี้ทุกเช้าด้วย ถ้าลืมกินแม้แต่วันเดียว ก็อาจเกิดเรื่องใหญ่ได้เลยนะ"
10037060-177 = "เรื่องอื่นๆ น่ะเหรอ? อืม..."
10037060-178 = "ท่านซายะขอแนะนำให้ยืดกล้ามเนื้อทุกวัน หรือทำพวกกายบริหารก็ได้ เพราะมีคำกล่าวว่าต้นตอของ#nทุกโรคมาจากการไหลเวียนเลือดที่ไม่เพียงพอด้วย..."
10037060-179 = "เข้าใจมั้ย? ต้องสัญญากับท่านซายะนะว่าจะทำให้?"
10037060-180 = "ไม่มีใครในซานไห่จิงอยากสูญเสียประมุขไปด้วยเรื่องแบบนี้หรอกนะ..."
10037060-182 = "(แต่ก็แปลกเสียจริง)"
10037060-183 = "(เช้านี้เราก็กินยาลูกกลอนเข้าไปแล้วนี่นา...)"
10037060-184 = "(...)"
10037060-188 = "(ถ้าอย่างนั้นก็หมายความว่า...)"

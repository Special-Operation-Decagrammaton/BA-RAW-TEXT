[translation]
10037060-1 = "Episode 6;They Claimed the Snow-Covered Bamboo Bent"
10037060-3 = "[ns] \"What an extremely dense bamboo forest...\""
10037060-4 = "Fufu! What do you think, Sensei? Isn't it impressive?"
10037060-5 = "If it were the right season, I could have shown you how I harvest bamboo shoots."
10037060-6 = "Bamboo shoots...?"
10037060-7 = "Yes, they're the sprouts of bamboo. They're soft and tender, and they go great in any dish."
10037060-8 = "It's very likely they used it in the Black Tortoise Promenade's cooking yesterday..."
10037060-9 = "The thin yellow stuff, yeah. That was so yummy!"
10037060-10 = "Yes! Shanhaijing's bamboo shoots are especially good quality. So good, in fact, that they say you can eat them all day long and never get sick of them!"
10037060-12 = "It's nice to be able to walk with you today, Madam, unlike yesterday."
10037060-13 = "Yes... I must apologize for yesterday's discourtesy, Great Leader Cherino."
10037060-14 = "Hm? What are you saying, Madam Kisaki?"
10037060-15 = "What I'm saying is, the exchange meeting host failed to provide proper guidance to their valued guests."
10037060-21 = "M-Madam President...!"
10037060-23 = "Ah, is that what happened? I was wondering what you were talking about. And it's been on your mind this whole time?"
10037060-24 = "Since we're on the topic, there's something I want to tell you."
10037060-30 = "I am the Great Leader of Red Winter! Such insignificant things could never threaten my power!"
10037060-35 = "That's what makes you our Great Leader!"
10037060-37 = "U-Um...!"
10037060-38 = "(I can't read her true feelings on the matter, but I'm relieved nonetheless. Great Leader Cherino doesn't seem to be THAT upset.)"
10037060-39 = "I'm so grateful that you are being so understanding about this. How did you sleep last night? It wasn't uncomfortable, was it? "
10037060-40 = "There were no problems at all, Madam Kisaki. It was so warm and comfy! I have no complaints."
10037060-41 = "But there was...some kind of scent I've never smelled before."
10037060-42 = "Fufu. I see Chairman Marina has a good nose. That's the medicinal incense created by Shanhaijing's Eastern Alchemy Society."
10037060-43 = "They say it brings equanimity and healing to the heart and soul... But I wonder if it was actually helpful."
10037060-44 = "H-huh? Now that you mention it, I think it did help... But I can't be sure..."
10037060-45 = "Well, since you've made it all the way here to the bamboo forest, I can show you something nice."
10037060-46 = "Something nice?"
10037060-48 = "By that, do you mean...? Oh!"
10037060-49 = "Indeed. This is a Shanhaijing bamboo forest specialty. "
10037060-50 = "Haha! I hope you're excited. There hasn't been a student yet who didn't enjoy it! "
10037060-51 = "Shall we? I'll lead the way."
10037060-56 = "T-that's...?! No way, that's...!"
10037060-57 = "Isn't it great? Isn't it amazing? Isn't it so unbelievably cute?!"
10037060-62 = "Pandas!!"
10037060-63 = "Oh, Chairman Marina! If you yell too loudly, you might scare off the pandas..."
10037060-64 = "Oh, really?! "
10037060-66 = "It is not unlikely, however I'm not sure those slowpokes have the wherewithal to run away like that."
10037060-67 = "(I saw a baby panda from jail the day I arrived in Shanhaijing, but...)"
10037060-68 = "(This probably isn't the best time to bring that up.)"
10037060-69 = "Now that I can see them better, I have to say... It still looks like a spotted bear to me."
10037060-70 = "Hm? Have you already seen a panda before?"
10037060-71 = "Oh, yes. You know, in pictures and things. Chairman Marina loves every kind of bear there is!"
10037060-72 = "Fufu, I see. Pandas are, indeed, a kind of bear—and gluttons for bamboo!"
10037060-74 = "Come to think of it, I think bamboo is the only thing pandas eat..."
10037060-75 = "It's true. But they don't eat just any bamboo. They're picky. They always stick to the same kind of bamboo."
10037060-76 = "And all they do all day is sleep and eat."
10037060-77 = "[s] \"All they do is eat and sleep? That's amazing! I'm jealous!\""
10037060-78 = "S-Sensei?"
10037060-79 = "Hmm... I'm sensing some kind of darkness... Or maybe not..."
10037060-80 = "But the pandas are adorable, right?"
10037060-82 = "That's right, Madam! Just looking at them like this..."
10037060-86 = "Ah, it's like a balm for my heart!"
10037060-87 = "Fufu! Well, enjoy them all you want. I can tell they bring you peace. Would you like to get closer?"
10037060-91 = "Can we?!"
10037060-92 = "Yes. Mina will guide you. They're already used to people. Mina, if you will."
10037060-94 = "Yes, Madam President."
10037060-98 = "I'll approach carefully. "
10037060-99 = "Remember to keep a safe distance. If you get too close, it's not good for you or the panda."
10037060-110 = "Okay, now Sensei..."
10037060-114 = "?!?!"
10037060-119 = "(What's happening...? My whole body is...!)"
10037060-120 = "(I can't breathe, and I'm so dizzy. My arms and legs feel so...heavy.)"
10037060-121 = "(Of all the times this could happen, why now...?)"
10037060-122 = "[ns] \"K-Kisaki?! Are you okay?!\""
10037060-128 = "(Sensei's voice... It sounds so far away... Are we far apart...?)"
10037060-129 = "(If not...)"
10037060-137 = "...Sensei. I need to ask you something."
10037060-138 = "Is it already...night time? It is so dark."
10037060-139 = "[ns] (...!)"
10037060-141 = "[ns] \"...Yes. It looks like the sun set a while ago...\""
10037060-143 = "..."
10037060-144 = "...I see."
10037060-145 = "..."
10037060-146 = "I have a request to make of you, Sensei."
10037060-147 = "Would you... Would you call the president of the Eastern Alchemy Society here?"
10037060-149 = "[ns] \"Call Saya...here?\""
10037060-150 = "Yes... Now... It's the only way to address this situation..."
10037060-151 = "And...please take care of Great Leader Cherino and the Red Winter party..."
10037060-152 = "Lead them...to the Rikkagaku...with Mina..."
10037060-153 = "[ns1] \"I'll do that no matter what.\"\n[ns2] \"But...about it already being night time...?\""
10037060-154 = "...Fufu..."
10037060-155 = "...Fufu..."
10037060-156 = "Sensei, you're very kind..."
10037060-157 = "But...there's no need...to keep your story straight with me..."
10037060-163 = "...I'm sorry. I don't have good news for you, Madam."
10037060-164 = "(She's already here...?)"
10037060-165 = "But you wanted the whole truth, so I have no choice but to respond with complete honesty..."
10037060-169 = "(No... She can't be... Maybe I'm just remembering that other time...)"
10037060-172 = "I hope you'll listen carefully."
10037060-173 = "From now on, you will only be able to move properly for a limited amount of time each day..."
10037060-174 = "(Yes, she definitely said that...)"
10037060-175 = "It's too much to fill the whole Rikkagaku, but let's burn some medicinal incense in the main room. That should at least help you a little bit, Madam."
10037060-176 = "Starting now, you must take this immortality elixir every morning. If you skip even one day, something really bad will happen."
10037060-177 = "What else? Hmm..."
10037060-178 = "I recommend stretching every day...perhaps calisthenics. They say the root of disease is poor blood flow..."
10037060-179 = "Understood? Promise me you'll take care of yourself."
10037060-180 = "...No one in Shanhaijing would want to lose you like this, Madam..."
10037060-182 = "(This is strange.)"
10037060-183 = "(I was certain I took the immortality elixir this morning...)"
10037060-184 = "(...)"
10037060-188 = "(But that would mean...)"

[translation]
10037060-1 = "第6話;覆雪之竹，因何而彎"
10037060-3 = "[ns]「真是片茂密的竹林啊……」"
10037060-4 = "呵呵，老師。景色相當壯觀吧？"
10037060-5 = "若是來對時節的話，還能見到採收竹筍的景象呢。"
10037060-6 = "竹筍……？"
10037060-7 = "即竹子的嫩芽。#n口感清爽鮮甜，適合用於各種料理。"
10037060-8 = "玄武商會昨天的料理中，應該也用過這種食材才是……"
10037060-9 = "啊，是那個黃色的薄片吧？確實很好吃！"
10037060-10 = "沒錯！畢竟山海經的竹筍品質特別好，從清晨吃到半夜都吃不膩啊！"
10037060-12 = "話說今日有幸與您一同散步，真是太好了呢，門主大人。"
10037060-13 = "是啊……請容妾身藉此機會為昨天的失禮致上歉意，潔莉諾書記長。"
10037060-14 = "嗯？為什麼突然說這種話呢，妃姬門主？"
10037060-15 = "妾身作為交流會的主辦者，卻沒好好招待貴賓。"
10037060-21 = "門，門主大人……！"
10037060-23 = "啊哈，你指的是那件事啊……原來你還放在心上嗎？"
10037060-24 = "不過既然你都提出來了，咱就在這裡跟你說清楚吧。"
10037060-30 = "像咱這麼偉大的會長，才不會拘泥於那種小事！"
10037060-35 = "真不愧是潔莉諾會長！"
10037060-37 = "唔，唔嗯……！"
10037060-38 = "（儘管不知其中帶有多少真意，所幸潔莉諾書記長的心情似乎並未受到過多影響）"
10037060-39 = "書記長如此寬宏大量，妾身更應心懷感激才是。#n話說回來，諸位昨晚睡得還舒服嗎？"
10037060-40 = "無須擔心，妃姬門主大人。#n床鋪既溫暖又柔軟，真是再好不過了。"
10037060-41 = "不過……似乎有股先前從未聞過的香味。"
10037060-42 = "呵呵，那股香味啊。瑪麗娜委員長的嗅覺實在敏銳。#n那是山海經的鍊丹術研究會製作的「藥香」。"
10037060-43 = "據說有助於身心的安定與療癒……不知對各位是否有幫助。"
10037060-44 = "嗯？聽門主大人這麼一說，好像是有這種感覺……但又好像不太明顯……"
10037060-45 = "無妨。先不說這些了，難得來到竹林，妾身就讓各位見識一樣好東西吧。"
10037060-46 = "好東西……是嗎？"
10037060-48 = "好東西指的是……啊！"
10037060-49 = "沒錯，那也是山海經竹林的名物。"
10037060-50 = "呵呵呵，好好期待吧。#n畢竟曾在此見過那個的學生，沒有一個人是不喜歡的！"
10037060-51 = "那麼走吧。妾身來帶路。"
10037060-56 = "那，那是……！？那難道是……！"
10037060-57 = "很棒吧？很厲害吧？可愛到難以置信吧？"
10037060-62 = "是熊貓──！！！"
10037060-63 = "瑪麗娜委員長？#n叫那麼大聲的話，熊貓可能會被嚇跑的哦……？"
10037060-64 = "呃，是嗎！？"
10037060-66 = "這也不無可能，但那些動作緩慢的熊貓是否會如此勤奮，妾身就說不準了。"
10037060-67 = "（雖然其實在抵達山海經的當天，就因為各種理由而在監獄裡見過小熊貓了……）"
10037060-68 = "（不過在這個場合……還是別提起不合時宜的話題吧）"
10037060-69 = "現在回頭想想，還是覺得長得有點像斑紋熊……"
10037060-70 = "嗯？汝已經見過熊貓了嗎？"
10037060-71 = "是的，先前有看過相關的資料和照片。#n尤其瑪麗娜委員長無論種類為何，只要是熊都喜歡。"
10037060-72 = "呵呵，原來如此。#n儘管牠們非常愛吃竹子，熊貓也的確是熊啊。"
10037060-74 = "這麼說來，我聽說熊貓好像只吃竹子……"
10037060-75 = "不錯。而且並非只要是竹子便來者不拒，而是只吃自己吃得慣的竹子……#n真是挑食的動物啊。"
10037060-76 = "除此之外，牠們整天就只是重複進食和睡覺而已……"
10037060-77 = "[s]「居然只要吃飽睡睡飽吃就行了，熊貓真厲害！好羨慕！」"
10037060-78 = "老，老師？"
10037060-79 = "唔嗯，好像莫名感覺到了一股深沉的黑暗……"
10037060-80 = "熊貓很可愛對吧？"
10037060-82 = "是啊，門主大人！#n光是這樣看著……！"
10037060-86 = "就感覺心靈彷彿得到了療癒……！"
10037060-87 = "呵呵，妾身亦有同感，汝盡情享受便是。#n若想再靠近一些也無妨哦？"
10037060-91 = "可以嗎！？"
10037060-92 = "畢竟那些孩子也漸漸習慣人類了。#n美奈，有勞了。"
10037060-94 = "是，門主大人。"
10037060-98 = "我們小心靠近吧。"
10037060-99 = "如果靠太近的話，對熊貓和人都不好，最好保持適當的距離……"
10037060-110 = "來，那麽老師也……"
10037060-114 = "！？！？"
10037060-119 = "（怎麼回事……？身體突然……！）"
10037060-120 = "（無法……呼吸。而且頭好暈……手腳的力氣都……）"
10037060-121 = "（為何偏偏在這種時候……？）"
10037060-122 = "[ns]「妃，妃姬！？你沒事吧！？」"
10037060-128 = "（老師的聲音……聽起來好遠。與老師的距離有那麼遠嗎？）"
10037060-129 = "（若非如此……）"
10037060-137 = "……老師。妾身有件事想問。"
10037060-138 = "現在……已經晚上了嗎？#n為何周圍一片黑暗。"
10037060-139 = "[ns]（……！）"
10037060-141 = "[ns]「……嗯，是啊。太陽已經不知不覺下山了……」"
10037060-143 = "……"
10037060-144 = "……原來如此啊。"
10037060-145 = "……"
10037060-146 = "妾身有一事相求，老師。"
10037060-147 = "能麻煩汝……請鍊丹術研究會的會長過來一趟嗎？"
10037060-149 = "[ns]「要我把沙耶叫來……？」"
10037060-150 = "是……現在只能這麼做了……"
10037060-151 = "此外……潔莉諾書記長與赤冬一行人……也麻煩了……"
10037060-152 = "請和美奈一起……將貴賓自然地帶到六和閣……"
10037060-153 = "[ns1]「那件事我會想辦法的。」\n[ns2]「不過現在已經晚上了哦……？」"
10037060-154 = "……呵呵。"
10037060-155 = "……呵呵。"
10037060-156 = "老師果然親切……"
10037060-157 = "不過……汝不必那樣……配合妾身說話沒關係的……"
10037060-163 = "……抱歉沒能告訴你好消息。門主。"
10037060-164 = "（……？這麼快就到了……？）"
10037060-165 = "但是既然門主要求告知正確的事實，我也只能應要求老實回答……"
10037060-169 = "（不……不對。這是當時的記憶嗎……）"
10037060-172 = "所以，希望你能好好聽我說。"
10037060-173 = "門主的身體，將來只能在一天中有限的時間自由活動……"
10037060-174 = "（沒錯，那天汝確實是那麼說的……）"
10037060-175 = "雖然無法遍及整個六和閣，但我會在內堂點燃藥香。#n這樣應該多少能讓門主的狀態有所好轉才對。"
10037060-176 = "還有從現在起，每天早上都必須服用丹藥。#n哪怕有一天沒服用，都可能真的會出大事的。"
10037060-177 = "還有沒有其他要注意的事？#n唔嗯……"
10037060-178 = "建議每天做點伸展運動……或者體操之類的吧。#n畢竟有句話說血液循環不良是萬病的根源……"
10037060-179 = "知道了嗎？希望你能答應我。"
10037060-180 = "山海經的所有人，都不希望以這種方式失去門主……"
10037060-182 = "（但是，這可真奇怪）"
10037060-183 = "（今日早晨應有確實服用丹藥才是……）"
10037060-184 = "（……）"
10037060-188 = "（這就代表……）"

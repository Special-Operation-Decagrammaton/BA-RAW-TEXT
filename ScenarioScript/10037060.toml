10037060-39 = "3;키사키;02;그렇게 너그러이 넘겨준다면, 한층 더 감사해야 할 것은 우리 쪽이겠지. 그러고 보니 간밤의 잠자리는 불편하지 않았는가? \n#3;em;[?]"

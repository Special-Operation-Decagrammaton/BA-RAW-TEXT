10037060-41 = "1;마리나 치파오;03;그런데 뭔가…… 처음 맡아보는 향이 나더군요."
10037060-42 = "3;키사키;03;후후. 그 향 말인가. 마리나 위원장은 후각이 예민하구나. 산해경의 연단방에서 제조한 약향(藥香)이라는 것이다."
10037060-43 = "3;키사키;08;심신의 안정과 치유에 도움이 된다고는 하는데…… 도움이 되었을지 모르겠구나."
10037060-44 = "1;마리나 치파오;04;네, 네? 그, 말씀을 듣고 보니 그랬던 것 같기도…… 잘 모르겠는 것 같기도…….\n#1;em;[땀]\n#1;stiff"

[translation]
1300806-1 = "รู้ตัวเมื่อสาย"
1300806-2 = "(เซริกะกำลังทำความสะอาดพื้นถนนอยู่จนดึก)"
1300806-4 = "เฮ้อ... วันนี้ก็เหนื่อยจัง…"
1300806-5 = "[s1] \"ทำได้ดีมาก\"\n[s2] \"วันนี้ก็ทำงานที่เหนื่อยเป็นพิเศษอีกแล้วนะ\""
1300806-6 = "ใช่แล้วล่ะ มันเหนื่อยมากๆ เลยตอนที่ถังขยะมันล้มกระจัดกระจายน่ะ"
1300806-7 = "ใช่แล้วล่ะ มันเหนื่อยมากๆ เลยตอนที่ถังขยะมันล้มกระจัดกระจายน่ะ"
1300806-8 = "อืม..."
1300806-12 = "(การได้มาทำงานพิเศษกับคุณครูทุกวันแบบนี้....)"
1300806-13 = "(มะ...มันไม่เป็นไรใช่ไหมนะ?)"
1300806-14 = "(ไม่สิ... คือที่จริงแล้ว... ได้อยู่ด้วยกันก็สนุกดีนะแต่ว่า...)"
1300806-15 = "(ถ้าต้องไปเก็บขยะหรือกวาดใบไม้ทั้งวันด้วยกันแบบวันนี้มันก็ค่อนข้าง...)"
1300806-17 = "(เราควรไป... ทำอย่างอื่น... ไม่ดีกว่าเหรอ?! เรื่องที่มันแบบ...)"
1300806-18 = "(อย่างเช่นไปดะ...เดตอะไรแบบนั้นน่ะ)"
1300806-20 = "....."
1300806-21 = "งี่เง่า!! ทึ่มจริงๆ!"
1300806-22 = "[s3] \"หือ...?\"\n[s4] \"ถึงไม่รู้ว่าเพราะอะไรแต่... ขอโทษด้วยนะ\""
1300806-23 = "คะ...คุณครูหัวทึ่ม! ฉันไปล่ะ!"
1300806-24 = "คะ...คุณครูหัวทึ่ม! ฉันไปล่ะ!"
1300806-26 = "(ถึงไม่รู้ว่าเพราะอะไร แต่โดนโกรธแล้วล่ะ)"

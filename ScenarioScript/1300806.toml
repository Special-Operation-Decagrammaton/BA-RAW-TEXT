1300806-18 = "(...g-going on a date...or something.)"
1300806-20 = "..."
1300806-21 = "No, stupid! Idiot!"
1300806-22 = "[s3] \"...What?\"\n[s4] \"...I don't know what all that was about, but I'm sorry?\""
1300806-23 = "You're such an idiot, Sensei! I'm leaving!"
1300806-24 = "You're such an idiot, Sensei! I'm leaving!"

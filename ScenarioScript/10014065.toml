[translation]
10014065-4 = "ที่นี่เหรอ...?"
10014065-5 = "คุณครูรู้ได้ยังไงน่ะ? คงไม่ได้ติดเครื่องติดตามเอาไว้หรอกนะ..."
10014065-6 = "[s1] \"แยงกี้สาวอยู่กันตั้งเยอะขนาดนี้เลยนะ...\"\n[s2] \"ถ้าขนาดนี้แล้วยังไม่รู้ก็น่าจะแปลกๆ นะ\""
10014065-7 = "ก็อาจจะนะ..."
10014065-8 = "ก็อาจจะนะ..."
10014065-9 = "ตอนนี้รู้แล้วละ ถ้ามีเรื่องวุ่นวายขนาดนี้ ภายในทรีนิตี้ชมรมทวงความยุติธรรมคงจะออกมาแล้วแน่ๆ"
10014065-10 = "เพราะงั้นก็เลยไล่ต้อนให้อุซาวะออกมานอกทรีนิตี้แทน ถ้าเป็นที่นี่ พวกนั้นก็จะทำตามใจตัวเองได้"
10014065-11 = "อืม อย่างนานที่สุดก็ภายในคืนนี้... ไม่สิ ถ้าเช้าตรู่วันพรุ่งนี้ยังจัดการไม่เรียบร้อย ไม่ว่าจะวัลคิรี่ หรืออะไรก็คงจะพากันมาที่นี่"
10014065-12 = "แต่ว่านะ..."
10014065-16 = "เจ้าพวกนั้นทำไมถึงมาอยู่ที่นี่..."
10014065-17 = "...? เจ้าพวกนั้นงั้นเหรอ พูดกับคนที่มาช่วยให้มันดีๆ สักครั้งมันจะตายรึไง?"
10014065-18 = "แล้วใครขอให้มาช่วยกันมิทราบ? อยู่ไปก็มีแต่จะเกะกะขวางทาง มาทางไหนก็กลับไปทางนั้นเลยไป"
10014065-19 = "ฮ่าฮ่าฮ่าฮ่า!! ตลกชะมัดเลย ก่อนจะไปสู้กับพวกนั้น เธอมาสู้กับฉันก่อนสักรอบมั้ยล่ะ?"
10014065-20 = "นี่แค่ไม่กี่วันพวกเธอก็ไปเรียนรู้วิธีการพูดมาจากยัยคนน่าหนวกหูนั่นแล้วเหรอ..."
10014065-21 = "เธอน่ะพอจบเรื่องนี้แล้วก็ทิ้งนิสัยนั่นไปซะนะ เพราะมันเหมือนเด็กไม่รู้จักโต จะได้ไม่ต้องมาเสียใจทีหลัง"
10014065-22 = "ว่าไงนะ...! ดะ... เด็กไม่รู้จักโต...!?"
10014065-23 = "เมื่อกี้เธอว่ายังไงนะ!?"
10014065-25 = "ยะ... โยชิมิจัง! คาซึสะจัง...! จะมาทะเลาะกันเองแบบนี้ไม่ได้นะ...!"
10014065-26 = "มากันทำไมก็ไม่รู้..."
10014065-27 = "ว่าแล้วเชียว... คุณครูเรียกมาสินะ ใช่มั้ย? "
10014065-28 = "[s3] \"มีกันหลายคนก็ดีกว่านี่นา\"\n[s4] ทำเป็นไม่รู้ไม่ชี้"
10014065-29 = "คุณครู..."
10014065-30 = "คุณครู..."
10014065-34 = "ไม่มีอะไรจะปฏิเสธหรอกนะ คาซึสะ พวกเราคือ <แก๊งของหวานหลังเลิกเรียน> สุดน่าเกรงขาม#nที่จะมายึดครองพื้นที่นี้ เหล่าพวกพ้องของแคทส์ พาลูคไงล่ะ"
10014065-35 = "และพวกพ้องของพวกพ้อง... ก็คือพวกพ้องของพวกเราด้วยเหมือนกัน"
10014065-36 = "กล้ามากนะที่มายุ่งกับพวกพ้องขององค์กรเรา พวกเธอจะต้องชดใช้ด้วยเลือดเท่านั้น"
10014065-37 = "เดี๋ยวนะ บอกไปตั้งกี่ครั้งแล้วน่ะ ฉันกับยัยนั่นไม่ใช่เพื่อนกัน..."
10014065-38 = "...ฮุฮุฮุ เรื่องที่ไม่อาจยอมรับได้สินะ แบบนั้นมัน <เพื่อนไม่จริง>!"
10014065-39 = "โรแมนติกสุดๆ!!"
10014065-40 = "โอ้ย จะบ้าตาย!! เลิกพูดอะไรแบบนั้นทีเถอะ!! ไม่อายบ้างรึไง!?"
10014065-41 = "บอกแล้วว่าถ้าพูดจาแบบนั้นเดี๋ยวก็มาเสียใจทีหลังหรอก!?"
10014065-42 = "...??? ตอนนี้เนี่ยนะ? ยัยนั่นน่ะเหรอ...?"
10014065-43 = "ถึงจะไม่ค่อยพอใจแต่รู้สึกถูกใจสุดๆ เลย"
10014065-48 = "หึ..."
10014065-49 = "...แย่ชะมัดเลย... นี่เป็นแค่ความฝัน..."
10014065-53 = "แล้วจะทำไมล่ะ?! มาลุยกันสักตั้งเถอะ!!"
10014065-54 = "ยังไงพวกเราก็มีคุณครูอยู่ ไม่ว่ายังไงก็ไม่มีทางแพ้หรอก!!"
10014065-55 = "คะ... คุณครู...! ช่วยสั่งการจากที่ที่ปลอดภัยด้วยค่ะ!"
10014065-56 = "[s5] \"ลุยเลย แก๊งของหวานหลังเลิกเรียน!!\"\n[s6] \"ไปช่วยเรอิสะกันเถอะ!!\""
10014065-59 = "บุกเลยยยยย-!!"
10014065-60 = "วะ....หวาาา-!!"

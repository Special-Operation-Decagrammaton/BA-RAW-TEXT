[translation]
10014065-4 = "……這裡？"
10014065-5 = "老師為什麼會知道這裡？"
10014065-6 = "[s1] 「這麼多太妹聚集在一起……」\n[s2] 「反而很容易就看出來了……」"
10014065-7 = "說，說的也是……"
10014065-8 = "說，說的也是……"
10014065-9 = "況且如果在三一自治區裡引發這種規模的騷動，自然會引來實現正義部的吧。"
10014065-10 = "所以才特地把宇沢趕到了三一的外面。#n在這裡他們就能隨意搗亂了吧。"
10014065-11 = "但這裡頂多也只能撐到今晚……不，大概能到明天的凌晨吧。#n明天女武神或是其他組織應該就會來到這裡了。"
10014065-12 = "話又說回來……"
10014065-16 = "這些傢伙為什麼會在這裡……？"
10014065-17 = "……什麼叫這些傢伙，真過分。#n怎麼能這樣形容來幫忙的人啊？"
10014065-18 = "誰說需要你們幫忙了啊？#n你們只會礙事而已，不如趁現在趕快回去怎麼樣？"
10014065-19 = "啊哈哈！真有趣呢？#n到底會不會礙事，要不要在進去前先試試看？"
10014065-20 = "啊啊真是的……這裡也有煩人的笨蛋……#n還學會了一些奇怪的說話方式……"
10014065-21 = "這次事件結束之後趕快改掉吧……很幼稚的。"
10014065-22 = "什麼……？#n幼，幼稚……？"
10014065-23 = "你說什麼！？"
10014065-25 = "喜，喜美醬！！千紗醬……！#n不能在這裡吵起來啦……！"
10014065-26 = "真是的，到底來這裡做什麼啊……"
10014065-27 = "……肯定是老師叫你們來的對吧。"
10014065-28 = "[s3] 「既然都要來的話乾脆一起來比較好吧。」\n[s4] 假裝不知道"
10014065-29 = "老師……"
10014065-30 = "老師……"
10014065-34 = "不用客氣的唷，千紗。#n我們可是要把這一帶吃乾抹淨的恐怖「放學後的甜點團」凱茜．帕魯格的夥伴啊。"
10014065-35 = "而夥伴的朋友……當然也是我們的朋友。"
10014065-36 = "竟然敢對我們的朋友動手，就讓他們付出血的代價吧。"
10014065-37 = "不是，我說過很多次了吧！#n我跟那傢伙不是朋友……"
10014065-38 = "……哼哼哼。#n看你那不想承認的樣子，你跟他完全就是「壞朋友」啊！！"
10014065-39 = "太浪漫了！！"
10014065-40 = "啊啊夠了！！#n不要再用那種語氣說話了！！都不害臊嗎！？"
10014065-41 = "再用那種方式說話，之後一定會抱著枕頭後悔的喔！？"
10014065-42 = "……？？？#n事到如今才後悔……你說夏？"
10014065-43 = "可惜，他好像超喜歡的哦？"
10014065-48 = "……呵。"
10014065-49 = "……真是糟透了……#n這到底是什麼惡夢……"
10014065-53 = "嘛，現在就別在意這種小事了！#n來，我們一起上吧！！"
10014065-54 = "我們這裡可是有老師在，只要別太誇張的話不可能會輸的！！"
10014065-55 = "老，老師……！#n請從安全的地方指揮吧！"
10014065-56 = "[s5] 「要上了唷，放學後的甜點團！！」\n[s6] 「去把澪紗救出來吧！！」"
10014065-59 = "要上囉──！！"
10014065-60 = "出，出發──！！"

[translation]
80000081-1 = "情人節也要，以忍者的，精神來……！"
80000081-3 = "（情人節當天早上）"
80000081-6 = "終於，到了這一天…… "
80000081-7 = "情人節……"
80000081-8 = "送禮物，給重要的人的日子……"
80000081-12 = "雖然巧克力，已經準備好了……"
80000081-13 = "但如果只是單純的送出去，是不會讓他開心的對吧……"
80000081-14 = "也被提醒過「情人節也不能忘記忍者的精神！」了……"
80000081-15 = "不過，忍者風格的情人節，究竟是……？"
80000081-16 = "忍者風格、忍者風格……忍者風……"
80000081-20 = "啊……這樣，說不定可以……！"
80000081-25 = "[ns1]「呼，雖然需要外出的工作都結束了……」\n[ns2]「還有文件山要處理啊……」"
80000081-31 = "[ns]「先解決這份……」"
80000081-33 = "…………"
80000081-37 = "[ns]「好像有什麼聲音……是我聽錯了嗎？」"
80000081-39 = "[ns]「接著把報告書……」"
80000081-43 = "…………唔唔。"
80000081-45 = "[ns]「……嗯？不，現在得專心一點。」"
80000081-47 = "[ns]「總之先從快到期的部分開始……」"
80000081-49 = "唔，唔唔……"
80000081-53 = "[ns]「有，有誰在嗎！？」"
80000081-54 = "唔，嗚……嗚嗚……"
80000081-55 = "（本應沒有其他人的辦公室裡，傳來了謎樣的聲音……）"
80000081-56 = "[ns]「難，難道是……妖怪！？」"
80000081-57 = "嗚……請，請幫幫我……老師……"
80000081-58 = "[s]「難道，是在櫃子裡面……？」"
80000081-64 = "[ns]「為什麼會在這種地方……？」"
80000081-65 = "老，老師……我現在，出不去了……"
80000081-66 = "可，可以請你……幫幫我嗎……？#n嗚嗚……"
80000081-68 = "（之後，聽月夜說了事情的來龍去脈）"
80000081-70 = "那個……今天是情人節，對吧…… "
80000081-71 = "是一年一度，要送巧克力給，重要的人的日子……"
80000081-72 = "所以……我才會想來，送巧克力給老師……"
80000081-73 = "[s]「然後……？」"
80000081-74 = "嗚……可是，如果只是很普通的送出去，會不會無法傳達心意……"
80000081-75 = "而且也被說了「無論什麼事都要像忍者一樣努力！」……"
80000081-76 = "[s]「啊……我好像知道是誰說的……」"
80000081-77 = "該怎麼做，才能讓老師開心呢……我煩惱了很久……"
80000081-78 = "[s]「所以才會躲在置物櫃裡呀。」"
80000081-79 = "是的……到進去為止，都還算順利……#n但是等到，想把巧克力送給老師的時候，才發現，已經卡住了……"
80000081-80 = "果，果然，是因為這個身體……對吧？"
80000081-81 = "都是因為我塊頭太大……才會……"
80000081-82 = "像這樣，造成，老師的困擾……"
80000081-83 = "嗚嗚嗚……對，對不起……！！"
80000081-84 = "[s]「並不是那樣唷。放心吧，月夜。」"
80000081-86 = "[ns]「而且，你能為我著想讓我感到很高興。」"
80000081-87 = "是，是這樣，嗎……？"
80000081-88 = "我一直，擔心著……這樣真的好嗎，老師會開心嗎……"
80000081-89 = "不過……"
80000081-90 = "忍者鐵則其一！#n「忍者無論面對任何情況，都要毫不猶豫向其挑戰」！"
80000081-91 = "……我沒有忘記，這樣的心態……努力地，做了出來！"
80000081-96 = "[ns]「……？」"
80000081-97 = "那個，怎麼，了嗎……？"
80000081-98 = "啊，難道……"
80000081-99 = "是因為……直到剛才，都被我抱在胸前，所以才……"
80000081-100 = "嗚，嗚嗚……"
80000081-101 = "怎麼會，變成這樣……"
80000081-102 = "居然被我的體溫給，融化了……"
80000081-103 = "對，對對……對不起……！"
80000081-104 = "變成，這種，禮物了……！"
80000081-105 = "[s]「這，這樣啊……」"
80000081-106 = "這種東西，不可以，送給老師……！"
80000081-107 = "巧，巧克力，我下次再……不，明天再……！"
80000081-113 = "[ns]「等等，月夜！」"
80000081-114 = "老，老師……？"
80000081-115 = "[s]「我就喜歡這個！」"
80000081-116 = "真，真的嗎……？"
80000081-117 = "[s]「這可是月夜為我準備的巧克力啊！」"
80000081-118 = "那，那麼就……！"
80000081-122 = "[ns]「謝謝你，月夜。等我工作結束之後──」"
80000081-123 = "那個……老，老師！#n可，可，可以的話……！"
80000081-124 = "想請老師……現在，告訴我，你的感想……"
80000081-125 = "可，可以嗎……？"
80000081-126 = "[s3]「現，現在嗎……？」\n[s4] （因月夜的體溫融化的巧克力……在本人的面前！？）"
80000081-127 = "……啊。"
80000081-128 = "……啊。"
80000081-129 = "果然……"
80000081-130 = "……這種，巧克力……"
80000081-131 = "就算聽到希望自己能吃，也只會，覺得困擾……而已對吧。"
80000081-132 = "啊，啊哈哈……對不起。#n我，總是造成，老師的困擾……"
80000081-133 = "[s]「沒有那種事！」"
80000081-134 = "咦……？"
80000081-135 = "[s]「因為，這是月夜為我做的巧克力啊！」"
80000081-136 = "啊……"
80000081-137 = "（將害羞的心情拋在腦後，吃下了巧克力）"
80000081-141 = "[ns]「嗯！果然很好吃！」"
80000081-142 = "哇……"
80000081-143 = "太，太好了……！"
80000081-144 = "我，之後也會拚命，努力的！"
80000081-145 = "更加，更加……像個忍者！"
80000081-146 = "[s]「呃，嗯！我會拭目以待哦！」"
80000081-147 = "耶嘿嘿！"
80000081-149 = "（先把以後可能還會發生類似狀況的預感放在一邊……）"
80000081-150 = "（品嘗著從月夜手上收到的巧克力，享受了情人節）"

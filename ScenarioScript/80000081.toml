[translation]
80000081-1 = "ส่งมอบแบบฉบับนินจา!"
80000081-3 = "(เช้าตรู่วันวาเลนไทน์)"
80000081-6 = "มะ...มาถึงที่นี่จนได้นะคะ..."
80000081-7 = "วันนี้เป็นวันวาเลนไทน์..."
80000081-8 = "วันที่มอบช็อกโกแลตให้กับคนสำคัญ..."
80000081-12 = "เอาละ เตรียมช็อกโกแลตมาตามที่เขียนไว้แล้ว..."
80000081-13 = "แต่ถ้าจะเข้าไปมอบให้เลยมันก็คงจะดูธรรมดาไป..."
80000081-14 = "แถมยังได้ยินว่า <สิ่งสำคัญคือวิธีมอบให้ในแบบฉบับนินจา!>..."
80000081-15 = "แต่ฉันควรทำยังไงดี ถึงจะมอบช็อกโกแลต \"แบบฉบับนินจา\" ได้..."
80000081-16 = "แบบฉนับนินจา... ให้สมกับเป็น...นินจา"
80000081-20 = "อ๊ะ... ถ้าใช้วิธีนี้ละก็อาจได้ผลก็ได้นะคะ...!"
80000081-25 = "[ns1] \"ฮู่ว... เท่านี้ตารางงานภายนอกช่วงเช้าก็เสร็จแล้ว...\"\n[ns2] \"ต่อไปก็จัดการเอกสารที่ค้างไว้ให้เสร็จ ก่อนมื้อเที่ยง...\""
80000081-31 = "[ns] \"เสร็จแล้วหนึ่งงาน...\""
80000081-33 = "..."
80000081-37 = "[ns] \"อืม... หูฝาดไปเองรึเปล่านะ?\""
80000081-39 = "[ns] \"ก่อนอื่นก็พิมพ์หนังสือราชการที่ต้องส่ง...\""
80000081-43 = "...ฮือ..."
80000081-45 = "[ns] \"อะไรน่ะ...? ไม่สิ นี่ไม่ใช่เวลามาทำแบบนี้นะ...\""
80000081-47 = "[ns] \"ถ้าจะให้เร็วขึ้นก็ต้องส่งไฟล์พวกนี้ไปพร้อมกัน...\""
80000081-49 = "...ฮือออ..."
80000081-53 = "[ns] \"ไม่ได้หูฝาดไปเองจริงๆ ด้วย?!\""
80000081-54 = "ฮือออ... ฮึกๆ..."
80000081-55 = "(คุณครูตกใจกับเสียงลึกลับที่ได้ยินจากในห้องสำนักงานชาเล่ต์...)"
80000081-56 = "[ns] \"ระ...หรือว่า ผะ...ผี...?!\""
80000081-57 = "ฮึก...ฮือออ... ชะ...ช่วยด้วยค่ะ~~ คะ...คุณครู..."
80000081-58 = "[s] \"เสียงดังมาจาก... ตู้เอกสาร...?\""
80000081-64 = "[ns] \"สึคุโยะทำไมถึงมาอยู่ที่นี่... แล้วมาทำอะไรในตู้เนี่ย...?\""
80000081-65 = "คะ...คุณครู~~~ ตะ...ตัวฉันติด... เลยออกไปไม่ได้..."
80000081-66 = "ชะ...ช่วยฉันหน่อย...ได้มั้ยคะ? ฮึก..."
80000081-68 = "(หลังจากช่วยออกมาแล้ว สึคุโยะก็อธิบายเรื่องราวให้คุณครูฟังตั้งแต่ต้นจนจบ)"
80000081-70 = "คือว่าวันนี้เป็นวันวาเลนไทน์... "
80000081-71 = "ได้ยินว่าเป็นวันที่มอบช็อกโกแลตให้กับคนสำคัญ..."
80000081-72 = "เพราะงั้น... ก็เลยมาหา...คุณครู...ค่ะ"
80000081-73 = "[s] \"อื้ม แล้ว...?\""
80000081-74 = "ฮึก... คือว่า... ถ้าจู่ๆ มามอบช็อกโกแลตเฉยๆ มันอาจดูธรรมดาไป..."
80000081-75 = "แล้วก็ได้ยินมาอีกว่า <สิ่งสำคัญคือวิธีมอบให้ในแบบฉบับนินจา!>..."
80000081-76 = "[s] \"อืม... ครูพอจะเดาได้ว่าเธอได้ยินมาจากใคร...\""
80000081-77 = "ฉะ...ฉันเลยคิดว่าจะใช้วิธีไหนดี... ก็เลย..."
80000081-78 = "[s] \"เลยมาซ่อนอยู่ในตู้เอกสารสินะ...\""
80000081-79 = "ตอนเข้าไปมันดูไม่เป็นไร... แต่ว่าตอนออกมากลับดันตัวเองออกมาไม่ได้ค่ะ..."
80000081-80 = "ว่าแล้วเชียว...! ฉะ...ฉันคงตัวใหญ่เกินไป...สินะคะ?!"
80000081-81 = "ดันตัวใหญ่เทอะทะ... ก็เลย...ออกมาไม่ได้"
80000081-82 = "ก็เลย...เป็นภาระให้กับคุณครูแบบนี้..."
80000081-83 = "ฮึก... ขะ...ขอโทษนะคะ...!!"
80000081-84 = "[s] \"ไม่เลย สึคุโยะไม่ได้เป็นภาระอะไรเลย\""
80000081-86 = "[ns] \"ครูดีใจที่เธอพยายามอย่างมากเพื่อให้ช็อกโกแลตครูนะ\""
80000081-87 = "ยะ... อย่างนั้นเหรอคะ...?"
80000081-88 = "ที่จริง...ตอนแรกฉันกังวลมาก...ว่าทำแบบนี้จะเป็นอะไรรึเปล่า..."
80000081-89 = "แต่ว่า..."
80000081-90 = "กฎเหล็กข้อแรกของนินจา! <นินจาจะต้องพร้อมเผชิญความท้าทายตลอดโดยไม่ลังเล!>"
80000081-91 = "ฉันตั้งใจจะทำให้ได้แบบนั้น... เลยเตรียมตัวมาอย่างดี เพื่อมอบช็อกโกแลตให้คุณครูค่ะ!"
80000081-96 = "[ns] \"สึคุโยะ คือว่าช็อกโกแลตอันนี้น่ะ...\""
80000081-97 = "คะ? หมายถึงรูปร่างของช็อกโกแลตนี่เหรอคะ?"
80000081-98 = "เอ่อ คือ..."
80000081-99 = "ตอนอยู่ในตู้เอกสาร... ฉันกอดมันเอาไว้แน่นมากๆ บางทีตอนนั้น..."
80000081-100 = "มันอาจจะร้อนมากจนทำให้... ช็อกโกแลตละลายจนนิ่มๆ แบบนี้..."
80000081-101 = "อา... ฮือ... เอ่อ... คือ..."
80000081-102 = "ดูเหมือนร่างกายฉันจะร้อนจนทำให้ช็อกโกแลตละลายค่ะ...!"
80000081-103 = "ขะขะขะ...ขอโทษค่ะ!"
80000081-104 = "ของขวัญที่เตรียมมากลับมีสภาพบู้บี้แบบนี้...!"
80000081-105 = "[s] \"ความร้อนจากร่างกาย...ของสึคุโยะเรอะ...?!\""
80000081-106 = "ขะ...ขอโทษค่ะ! ของสภาพไม่ดีแบบนี้ คงให้คุณครูไม่ได้แล้วค่ะ...!"
80000081-107 = "ขะ...ของขวัญ...! อะ...เอาไว้ฉันจะเอามาให้ใหม่นะคะ...!"
80000081-113 = "[ns] \"เดี๋ยวก่อน ไม่เป็นไรหรอก!\""
80000081-114 = "คะ... คุณครู...?"
80000081-115 = "[s] \"เรื่องนั้นไม่เป็นไรเลย! ครูดีใจที่สึคุโยะเตรียมขนมมาให้ครูนะ!\""
80000081-116 = "ยะ... อย่างนั้นเหรอคะ...?"
80000081-117 = "[s] \"อื้อ แน่นอน!\""
80000081-118 = "ค่ะ...!"
80000081-122 = "[ns] \"ขอบคุณนะสึคุโยะ งั้นรอให้เธอใจเย็นๆ ก่อนแล้วค่อย...\""
80000081-123 = "คือคะ...คุณครูคะ! ถะ...ถ้าคุณครูไม่ว่าอะไร...!"
80000081-124 = "ช่วยชิมช็อกโกแลต... แล้วบอกความรู้สึก...มะ...มาหน่อยได้มั้ยคะ..."
80000081-125 = "มัน...จะรบกวนคุณครูเกินไปรึเปล่าคะ...?"
80000081-126 = "[s3] \"เรื่องนั้น... อืม...\"\n[s4] (ให้กินช็อกโกแลตที่ละลายเพราะความร้อนจากตัวสึคุโยะตรงนี้เรอะ?!)"
80000081-127 = "...อา..."
80000081-128 = "...อา..."
80000081-129 = "ว่าแล้วเชียว..."
80000081-130 = "...รูปร่างมัน...น่าเกลียดเกินไป..."
80000081-131 = "จะ...จู่ๆ มาบอกให้คุณครูกินของแบบนี้... คงลำบากใจ...สินะคะ"
80000081-132 = "แหะๆ... ขะ...ขอโทษค่ะ ฉันพูดให้คุณครู... ลำบากใจอีกแล้ว..."
80000081-133 = "[s] \"ไม่เลย! ครูจะกินเดี๋ยวนี้แหละ!\""
80000081-134 = "คะ...?"
80000081-135 = "[s] \"ก็เป็นช็อกโกแลตที่สึคุโยะทำให้ทั้งทีนี่นา!\""
80000081-136 = "อา..."
80000081-137 = "(หลังจากยืนสงบใจอยู่ครู่หนึ่ง คุณครูก็หยิบช็อกโกแลตของสึคุโยะมากิน)"
80000081-141 = "[ns] \"อื้ม อร่อยมาก!\""
80000081-142 = "คะ...?"
80000081-143 = "คะ...ค่อยยังชั่วหน่อยค่ะ...!"
80000081-144 = "คราวหน้า... ถ้ามีโอกาส ฉันจะเอาขนมมาให้คุณครูอีกนะคะ!"
80000081-145 = "แน่นอนว่า... จะต้องส่งมอบในแบบฉบับนินจาด้วยค่ะ...!"
80000081-146 = "[s] \"อะ...อื้อ! ครูจะรอนะ!\""
80000081-147 = "ฮิฮิฮิ!"
80000081-149 = "(จู่ๆ คุณครูก็รู้สึกสังหรณ์ใจว่าครั้งหน้าอาจจะเกิดเหตุการณ์ที่สึคุโยะเข้าไปติดในตู้อีกก็ได้...)"
80000081-150 = "(หลังจากนั้นคุณครูจึงใช้เวลาในวันวาเลนไทน์กับสึคุโยะ วางแผนเตรียมตัวในรูปแบบต่างๆ...)"

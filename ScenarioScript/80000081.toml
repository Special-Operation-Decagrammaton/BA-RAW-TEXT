[translation]
80000081-1 = "Giving Like a Ninja"
80000081-3 = "Valentine's Day, early morning."
80000081-6 = "It's finally here..."
80000081-7 = "Today is Valentine's Day."
80000081-8 = "It's the day when you give chocolate to that special someone..."
80000081-12 = "Okay, I made my chocolate, just like the book said, but..."
80000081-13 = "It's not enough to hand it over normally."
80000081-14 = "I need to give it like a ninja. They said that's important."
80000081-15 = "But...what does that mean here? How does a ninja give...?"
80000081-16 = "Like a ninja...like a ninja..."
80000081-20 = "Hm... Oh! That might work..."
80000081-25 = "[ns1] \"Phew, that should wrap up the off-site schedule this morning...\"\n[ns2] \"Next up, finishing this pile of paperwork before lunch.\""
80000081-31 = "[ns] \"There's one done...\""
80000081-33 = "..."
80000081-37 = "[ns] \"Am I hearing things...? Eh, whatever...\""
80000081-39 = "[ns] \"Gotta type up this document and—\""
80000081-43 = "...Ugh..."
80000081-45 = "[ns] \"There's that sound again... No, I don't have time for this.\""
80000081-47 = "[ns] \"I need to compile all these files before the deadline-\""
80000081-49 = "Urghhhh..."
80000081-53 = "[ns] \"I'm not just hearing things!\""
80000081-54 = "*sniff* *sniff* Ugh..."
80000081-55 = "A mysterious noise rang through the empty Executive Office... For a moment, I freaked out."
80000081-56 = "[ns] \"Is it...a g-g-ghost?\""
80000081-57 = "*sniff* Sensei, p-please help me!"
80000081-58 = "[s] \"Is that coming...from the cabinet?\""
80000081-64 = "[ns] \"Tsukuyo, why... What are you doing in the cabinet?\""
80000081-65 = "Sensei... I'm stuck... I can't move at all..."
80000081-66 = "C-Can you help me...? *sniff*"
80000081-68 = "Eventually, Tsukuyo explained how she ended up stuck in my cabinet."
80000081-70 = "Well, today's Valentine's Day, so..."
80000081-71 = "You're supposed to give chocolate to someone important to you...right?"
80000081-72 = "So that's why I'm here...but..."
80000081-73 = "[s] \"But...?\""
80000081-74 = "*sniff* Well...someone said I shouldn't just hand you the chocolate..."
80000081-75 = "I have to give it to you like a ninja would..."
80000081-76 = "[s] \"Yeah, I think I can guess who said that.\""
80000081-77 = "So I thought really hard about how I could give you chocolate like that..."
80000081-78 = "[s] \"So, that's why you were in the cabinet?\""
80000081-79 = "I got in just fine, but then I couldn't get out..."
80000081-80 = "And... I guess...that must be because I'm too big..."
80000081-81 = "Since my body is so...so uselessly big..."
80000081-82 = "I just end up causing trouble for you..."
80000081-83 = "*sniff* I'm so s-sorry…"
80000081-84 = "[s] \"No, that's not true at all. It's okay, Tsukuyo.\""
80000081-86 = "[ns] \"I'm just touched that you went to such lengths to give me chocolate.\""
80000081-87 = "R-Really...?"
80000081-88 = "Well, I was a bit scared... and I wasn't sure if it would be okay..."
80000081-89 = "But still..."
80000081-90 = "Ninja rule number one: a ninja must be willing to take on anything, anytime, anywhere, without hesitation..."
80000081-91 = "So knowing that, I put my all into making chocolate for you."
80000081-96 = "[ns] \"Tsukuyo, about this chocolate...\""
80000081-97 = "Yes? Oh, the shape?"
80000081-98 = "Oh, well..."
80000081-99 = "I guess I was...holding it too tightly in the cabinet."
80000081-100 = "So it melted into this...mess..."
80000081-101 = "And, well, um..."
80000081-102 = "It's all because of my body heat..."
80000081-103 = "I'm s-s-sorry!"
80000081-104 = "It turned into such a big mess...!"
80000081-105 = "[s] \"Y-Your...body heat...?!\""
80000081-106 = "I-I'm sorry! I can't possibly give it to you in this state!"
80000081-107 = "I-I'll get you a proper gift soon, I promise!"
80000081-113 = "[ns] \"No! It's fine!\""
80000081-114 = "S-Sensei?"
80000081-115 = "[s] \"The look doesn't matter! I'm happy that you made it for me, Tsukuyo.\""
80000081-116 = "R-Really...?"
80000081-117 = "[s] \"Yep!\""
80000081-118 = "Well... okay! In that case..."
80000081-122 = "[ns] \"Thank you, Tsukuyo. I'll be sure to enjoy—\""
80000081-123 = "U-Um, Sensei! If it's all right with you..."
80000081-124 = "Could you possibly...eat it right now, and tell me...what you think about it?"
80000081-125 = "Or, is that too much to ask...?"
80000081-126 = "[s3] \"Huh? Um, well...\"\n[s4] \"(Eat it now...after Tsukuyo melted it?!)\""
80000081-127 = "..."
80000081-128 = "..."
80000081-129 = "Oh...I knew it..."
80000081-130 = "Because it's so ugly..."
80000081-131 = "I'm just putting you in an uncomfortable position, asking you to eat something so gross..."
80000081-132 = "Heh...heh heh...heh... I-I'm sorry! I was being too forward..."
80000081-133 = "[s] \"No! I'll eat it right away!\""
80000081-134 = "R-Really?"
80000081-135 = "[s] \"You made it, after all!\""
80000081-136 = "Oh..."
80000081-137 = "After gathering my wits, I ate Tsukuyo's chocolate in one bite."
80000081-141 = "[ns] \"Mmm! It's good!\""
80000081-142 = "Oh, it is?"
80000081-143 = "I'm...I'm so relieved!"
80000081-144 = "Then I'll give you more the next time I have a chance!"
80000081-145 = "And next time, it'll be even more ninja-like!"
80000081-146 = "[s] \"Oh, uh, sure! I'll look forward to it!\""
80000081-147 = "Heeheehee!"
80000081-149 = "I spent the rest of Valentine's Day with Tsukuyo, but considering the possibility that something like this might happen again..."
80000081-150 = "I had to strengthen my resolve in more ways than one."

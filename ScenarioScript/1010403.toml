[translation]
1010403-1 = "Attitude Adjustment"
1010403-2 = "Black Tortoise Promenade Main Restaurant"
1010403-4 = "Was the food to your taste, Sensei?"
1010403-5 = "[s1] \"It was the best!\"\n[s2] \"I want to try your cooking, though.\""
1010403-6 = "Is that so? I'm glad. I know this is just the standard script, but..."
1010403-7 = "...I truly do hope you return to the Black Tortoise Promenade."
1010403-8 = "Did you say...my cooking? "
1010403-9 = "I've been working as a manager for the Black Tortoise Promenade, rather than as a chef, for a while now..."
1010403-10 = "Okay. One day, I'll find the opportunity to cook you a meal at Schale."
1010403-15 = "E-Emergency! One of our shops hasn't received today's ingredients yet!"
1010403-16 = "Which shop?"
1010403-17 = "Jinghua Garden of Huo Tui West!"
1010403-18 = "Jinghua Garden... I know where that is. Okay."
1010403-19 = "Wh-What should we do? They say that there's no way they'll be ready for the afternoon shift, not at this rate!"
1010403-20 = "For now, we'll get them emergency supplies from the main restaurant's storage."
1010403-21 = "Of course that'll only buy us a little time, three...probably two hours at most."
1010403-22 = "I'm rerouting all remaining transport personnel to Xinxinglou 3rd, on Hong Jing Road. There should be two trucks available. I'll handle the communications."
1010403-23 = "Since Xinxinglou is on holiday, they'll be able to help out with extra ingredients."
1010403-24 = "Since it's an emergency, the main restaurant will cover the cost, for now. But collect their payment after business hours."
1010403-25 = "Yes! Understood!"
1010403-27 = "*sigh* That's sorted out, somehow."
1010403-31 = "Is this Black Tortoise Promenade of Shanhaijing?"
1010403-32 = "Now, I don't care what it is, just bring me the most delicious dish you have to offer!"
1010403-35 = "Wh-What? Well, that's..."
1010403-40 = "Absolutely. Let's get you seated first. Right this way."
1010403-42 = "Thank you very much for visiting the Black Tortoise Promenade today."
1010403-43 = "Since you've requested something a little special, I'd like to recommend our chef's special. Would that be to your liking?"
1010403-44 = "That's a menu item? I didn't see it anywhere!"
1010403-45 = "That's why it's extra-special, just for you."
1010403-46 = "W-We have something like that?"
1010403-47 = "Nope. But satisfying a customer's needs is part of running a restaurant."
1010403-49 = "Hm? Is there a problem?"
1010403-50 = "Not at all. The chef has informed me that their special today is the abalone course."
1010403-51 = "Abalone! And a whole course at that! I look forward to it!"
1010403-53 = "W-Wouldn't that be a bit expensive?!"
1010403-54 = "The guest stated from the beginning that they only want the best of the best."
1010403-55 = "These kinds of customers want to feel like they're in the lap of luxury. They'll be offended by an \"affordable\" dish."
1010403-56 = "We'll bring the course out to you right away, honored guest."
1010403-57 = "Hurry and inform the kitchen."
1010403-59 = "Yes! Understood!"
1010403-64 = "Ah, geez. It's more chaotic than usual. With Sensei here, too."
1010403-68 = "I told you I already paid!"
1010403-74 = "But..."
1010403-75 = "I see what you're doing! You're trying to scam me!"
1010403-82 = "What seems to be the problem here?"
1010403-83 = "I already paid through your payment app, but the waiter's saying that it didn't go through! She's trying to make me pay twice!"
1010403-84 = "What happened to the famous Black Tortoise Promenade service?"
1010403-85 = "But we—"
1010403-87 = "I absolutely understand your frustration. If a mistake was made, I sincerely apologize on everyone's behalf."
1010403-88 = "Per our standard procedure, do you mind waiting a moment while I check our CCTV and confirm with the e-payment company?"
1010403-89 = "It's always best to confirm the details, so all parties feel comfortable and confident."
1010403-90 = "Huh...? CCTV...? Transaction details...?"
1010403-91 = "To ensure the best service to all our customers, the Black Tortoise Promenade's main restaurant has CCTV installed throughout the premises."
1010403-92 = "It should only take around five minutes. I'll go ahead and confirm the transaction details as well."
1010403-96 = "Um. Now that you mention it...maybe I just didn't open the payment app properly...or something..."
1010403-97 = "I would hate for you to go to all that trouble..."
1010403-98 = "Oh, no. It's nothing of the sort. It's our duty to ensure that these kinds of situations are handled correctly."
1010403-99 = "Of course, all of our CCTVs include a built-in recording function. In case that matters."
1010403-100 = "R-Recording?!"
1010403-101 = "Yes, I just thought I'd mention it. Just in case. Are you feeling well, honored guest? Is something wrong?"
1010403-102 = "A-Ah it's nothing! It's really nothing!"
1010403-104 = "I'm sorry, Sensei. It's so hectic today."
1010403-105 = "[s] \"I'm impressed...\""
1010403-106 = "Wh-What?! What are you talking about?"
1010403-107 = "You...thought the way I dealt with all these situations was amazing?"
1010403-108 = "I appreciate the compliment, but this is par for the course, working at the Promenade."
1010403-109 = "...Although not every day is this chock-full with urgent issues."
1010403-110 = "The most important event of the day hasn't even started yet, and we're already swimming in it."
1010403-111 = "[s] \"What's that?\""
1010403-112 = "I don't know if I'm supposed to disclose this..."
1010403-113 = "Well, there's a group reservation for Plum Blossom Garden."
1010403-114 = "This is embarrassing to admit..."
1010403-115 = "...but I have a hard time handling kids."
1010403-116 = "[s] \"No one has an easy time with that.\""
1010403-117 = "Thank you for understanding, Sensei."
1010403-118 = "Children are cute and innocent...but, unlike normal customers, they're pretty obstinate and insistent."
1010403-119 = "Huh? You'll help me as much as you can, Sensei? But..."
1010403-120 = "Ah. All right. I suppose it's okay to accept a favor here and there."
1010403-121 = "Thank you, Sensei. I'll be counting on you."
1010403-123 = "Sensei, Sensei! Look over here! This squid looks like a flower! Isn't that amazing?"
1010403-124 = "[s] \"It is. The chef cut them to make them look like that.\""
1010403-125 = "Hey, Sensei. I heard there are these things called octopus sausages. Why don't they have them here?"
1010403-126 = "Are octopus sausages made of octopuses? I don't like octopuses... They're too hard to eat!"
1010403-127 = "[s] \"Octopus sausages are regular sausages, just shaped like octopuses.\""
1010403-128 = "Oh, really? Then I wanna try! Are you lying, Sensei? You better not be lying!"
1010403-129 = "One time, back at school, they told me lunch was yummy beef fried rice...but it had peppers and broccoli!"
1010403-133 = "I'm impressed, Sensei. You're really good with children."
1010403-134 = "If you don't mind...could you...teach me?"
1010403-135 = "[s3] \"There's not that much to teach.\"\n[s4] \"But, you know, you don't have to solve their problems.\""
1010403-138 = "Huh? Aren't problems meant to be solved? What do you mean?"
1010403-139 = "Some things can sort themselves out...if I just lend a listening ear?"
1010403-140 = "...I've never thought about it that way."
1010403-141 = "[s] \"Would you like to try, Reijo?\""
1010403-145 = "Yes. This is my responsibility, after all."
1010403-151 = "I like shrimp dumplings! And pork dumplings!"
1010403-152 = "I like plain dumplings, pan-fried dumplings, deep-fried dumplings..."
1010403-153 = "Wait...but then what's my favorite dumpling?"
1010403-154 = "I-If you can't pick a favorite, maybe you like all dumplings...?"
1010403-155 = "Oh my gosh, you're totally right! But! I don't like seaweed dumplings. They're all slimy and stuff!"
1010403-156 = "Maybe those aren't actually dumplings...?"
1010403-160 = "...It's a sad thing that the culture of eating out is flourishing. Because it's proof that nobody has time to cook anymore."
1010403-161 = "You eat at a restaurant to save time, but often, the time you save is spent to do even more work."
1010403-162 = "Even employers aren't free from this problem. The system ends up determining everything."
1010403-163 = "Ah... Was there an issue with your dish...?"
1010403-164 = "The fact that there was no issue, might be what makes it even more sad."
1010403-166 = "...It's finally over."
1010403-167 = "The children kept trying to climb on me and play hide-and-seek, which scared me a little..."
1010403-168 = "[s] \"That just means they feel that comfortable with you.\""
1010403-169 = "Yes... They said they'd like to come visit us again."
1010403-170 = "As someone in the service industry, that's something I'm always happy to hear."
1010403-174 = "It was an interesting experience. In many ways."
1010403-175 = "Thank you, Sensei. "
1010403-176 = "[s] \"I don't think I did much.\""
1010403-177 = "It might seem that way to you, but, for me, you made a world of difference."
1010403-178 = "I'll look forward to your next lesson, Sensei."

[translation]
1010403-1 = "เปลี่ยนวิธีคิด"
1010403-2 = "สำนักงานใหญ่ ย่านการค้าเทพเต่าดำ"
1010403-4 = "อาหารถูกปากมั้ยคะ คุณครู?"
1010403-5 = "[s1] \"อร่อยเหาะไปเลยละ!\"\n[s2] \"อื้อ ครูก็อยากกินอาหารที่เรย์โจวทำบ้างนะ\""
1010403-6 = "อย่างนั้นเหรอคะ? โล่งอกไปทีนะคะ คำนี้อาจจะฟังเหมือนคำพูดทางธุรกิจก็ได้"
1010403-7 = "แต่คราวหน้าก็แวะมาฝากท้องที่ย่านการค้าเทพเต่าดำของเราอีกนะคะ"
1010403-8 = "อาหาร... ที่ฉันทำงั้นเหรอคะ? "
1010403-9 = "ฉันไม่ใช่เชฟของย่านการค้าเทพเต่าดำหรอกค่ะ งานของฉันออกจะไปทางผู้จัดการมากกว่าค่ะ"
1010403-10 = "ค่ะ แต่ก็หวังว่าต่อไปฉันจะมีโอกาสทำอาหารให้ทานนะคะ อย่างน้อยก็ที่ชาเล่ต์ก็ได้ค่ะ"
1010403-15 = "ระ... รายงานด่วนค่ะ! มีร้านค้าที่ยังไม่ได้วัตถุดิบอาหารของวันนี้ค่ะ!"
1010403-16 = "ที่ไหนคะ?"
1010403-17 = "ที่คยองฮวาวอน ทางฝั่งตะวันตกของสวนหม้อไฟค่ะ"
1010403-18 = "ที่นั่นเองน่ะเหรอ... ค่ะ เข้าใจแล้วค่ะ"
1010403-19 = "ทะ... ทำยังไงดีคะ? ถ้ายังไม่มีวัตถุดิบ บ่ายนี้ก็คงขายอาหารไม่ได้แน่ๆ เลยค่ะ...!"
1010403-20 = "เราจะส่งของที่ขาดจากสำนักงานใหญ่ไปให้ก่อนค่ะ"
1010403-21 = "แต่แค่ของที่เรามี... ก็น่าจะขายได้แค่ 3 ชั่วโมง ไม่สิ แค่ 2 ชั่วโมงก็น่าจะขายหมดแล้วค่ะ เพราะงั้น..."
1010403-22 = "จะส่งเจ้าหน้าที่ขนส่งที่เหลือไปถนนสายใหม่ที่ 3 แล้วก็ให้ใช้รถบรรทุก 2 คันค่ะ ฉันจะเป็นฝ่าย#nติดต่อไปให้เองค่ะ"
1010403-23 = "วันนี้ร้านค้าในถนนสายใหม่ที่ 3 ปิดทำการ น่าจะพอช่วยเรื่องวัตถุดิบได้บ้างค่ะ"
1010403-24 = "เรื่องค่าใช้จ่าย ทางสำนักงานใหญ่จะรับผิดชอบให้ก่อน แล้วพอทำการค้าของวันนี้เสร็จ ก็ให้จัดการ#nเรื่องบัญชีอย่าให้มีตกหล่นนะคะ"
1010403-25 = "ค่ะ! เข้าใจแล้วค่ะ!"
1010403-27 = "ฮู่ว... จัดการเสร็จจนได้นะคะ"
1010403-31 = "ที่นี่คือย่านการค้าเทพเต่าดำของซานไห่จิงใช่มั้ย?"
1010403-32 = "ดีละ~! ฉันจะสั่งอาหารที่อร่อยที่สุดของที่นี่ คิดว่าเมนูไหนเด็ดก็จัดมาเลย!"
1010403-35 = "คะ... คะ? เอ่อ... แบบนั้นมัน..."
1010403-40 = "ฉันจะพาไปที่โต๊ะก่อนนะคะ เชิญทางนี้ค่ะ"
1010403-42 = "ขอบคุณที่มาอุดหนุนย่านการค้าเทพเต่าดำของเรานะคะ"
1010403-43 = "สำหรับคุณลูกค้าที่สั่งเมนูพิเศษ ฉันอยากเสนอเป็นเมนูแนะนำประจำวันของหัวหน้าเชฟค่ะ รับเป็นเมนูนี้ดีมั้ยคะ?"
1010403-44 = "โอ้ ถ้าหัวหน้าเชฟแนะนำ ก็ต้องอร่อยเลยใช่มั้ย? แต่ไม่เห็นมีเขียนไว้ในเมนูเลยแฮะ!"
1010403-45 = "ถึงได้เรียกว่าเป็นเมนูพิเศษยังไงล่ะคะ"
1010403-46 = "พะ... พวกเราไม่มีเมนูแบบนั้นไม่ใช่เหรอคะ?!"
1010403-47 = "มันก็จริงอยู่ค่ะ... แต่ในเวลาแบบนี้ เราก็ควรตอบสนองความพึงพอใจทางจิตใจของลูกค้าสิคะ"
1010403-49 = "หืม? มีปัญหาอะไรอย่างนั้นเหรอ?"
1010403-50 = "ไม่มีหรอกค่ะ พอดีฉันเพิ่งทราบจากหัวหน้าเชฟมาน่ะค่ะ เมนูแนะนำประจำวันของวันนี้ก็คือ... หอยเป๋าฮื้อแบบฟูลคอร์สค่ะ"
1010403-51 = "หอยเป๋าฮื้อ! มาเป็นคอร์สด้วยเหรอ! น่าตื่นเต้นจัง!"
1010403-53 = "ตะ... แต่มันน่าจะแพงอยู่นะคะ?!"
1010403-54 = "แต่ลูกค้าบอกว่าไม่ติดเรื่องราคาตั้งแต่แรกนี่คะ"
1010403-55 = "ลูกค้าแบบนี้น่ะ ถ้าเราเสนออาหารที่ราคาถูกให้ พวกเขาอาจจะคิดว่าตัวเองไม่ได้รับการต้อนรับอย่างเหมาะสม แล้วฟาดงวงฟาดงาเอาได้ค่ะ"
1010403-56 = "ถ้าอย่างนั้น ช่วยรอสักครู่นะคะคุณลูกค้า"
1010403-57 = "รีบไปแจ้งในครัวเถอะค่ะ"
1010403-59 = "ค่ะ เข้าใจแล้วค่ะ!"
1010403-64 = "คุณครูอุตส่าห์มาที่นี่แท้ๆ แต่วันนี้ฉันงานยุ่งมากเลยค่ะ..."
1010403-68 = "แต่ฉันจ่ายเงินไปแล้วนะ!"
1010403-74 = "คุณลูกค้าคะ แต่ว่า..."
1010403-75 = "อ๋อ คิดจะเก็บเงินจากฉัน 2 รอบสินะ!"
1010403-82 = "มีเรื่องอะไรเหรอคะ คุณลูกค้า?"
1010403-83 = "ฉันจ่ายเงินผ่านแอปฯ ไปแล้ว แต่ทางนี้ก็มาบอกว่าการจ่ายเงินของฉันไม่สำเร็จ แล้วก็จะขอให้จ่ายอีก#nรอบนี่สิ!"
1010403-84 = "หรือว่านี่จะเป็นการต้อนรับลูกค้าของย่านการค้าเทพเต่าดำที่เขาร่ำลือกัน?"
1010403-85 = "แต่ว่าพวกฉัน..."
1010403-87 = "เอาละๆ ฉันเข้าใจแล้วค่ะ ถ้าเป็นความผิดพลาดจากย่านการค้าของเรา ฉันก็ต้องขอโทษด้วยค่ะ"
1010403-88 = "แต่เราขอตรวจสอบกล้องวงจรปิด และขอดูประวัติการทำธุรกรรมของบริษัทที่ชำระเงินก่อนได้มั้ยคะ?"
1010403-89 = "เรื่องแบบนี้ต้องตรวจสอบให้ 'ชัดเจนและแน่ใจ' น่ะค่ะ"
1010403-90 = "หืม...? กล้องวงจรปิด...? ประวัติการทำธุรกรรม...?"
1010403-91 = "ใช่ค่ะ ที่ร้านสำนักงานใหญ่ของย่านการค้าเทพเต่าดำมีการติดตั้งกล้องวงจรปิดไว้เพื่อเตรียมพร้อม#nรับมือกับเหตุฉุกเฉินในทุกเมื่อค่ะ"
1010403-92 = "แล้วการขอดูประวัติการทำธุรกรรมก็ใช้เวลาไม่นานด้วยค่ะ ช่วยรอพวกฉันตรวจสอบประมาณ 5 นาที#nนะคะ"
1010403-96 = "อืม เอ่อ... คือว่า... พอมาคิดดูแล้ว หมู่นี้แอพฯ จ่ายเงินของฉันมันก็ไม่ค่อยเสถียรน่ะ"
1010403-97 = "เพราะงั้นพวกเธอไม่ต้องเช็กอะไรให้ลำบากก็ได้..."
1010403-98 = "ไม่หรอกค่ะ เรื่องแค่นี้ไม่ลำบากหรอกค่ะ นี่เป็นงานของพวกเราอยู่แล้วค่ะ"
1010403-99 = "คุณลูกค้าอาจจะยังไม่ทราบนะคะว่ากล้องวงจรปิดของย่านการค้าเทพเต่าดำบันทึกเสียงได้ด้วยค่ะ"
1010403-100 = "บะ... บันทึกเสียงเหรอ?!"
1010403-101 = "ค่ะ ฉันแค่บอกให้ทราบ เพราะเพิ่งนึกขึ้นได้น่ะค่ะ ว่าแต่ เป็นอะไรหรือเปล่าคะคุณลูกค้า? รู้สึกไม่สบายตรงไหนหรือเปล่าคะ?"
1010403-102 = "ปะ... เปล่า ไม่เลย! ฉันไม่ได้เป็นอะไรเลย!"
1010403-104 = "ต้องขอโทษด้วยค่ะ คุณครู วันนี้ฉันงานยุ่งจนหัวหมุนเลยค่ะ"
1010403-105 = "[s] \"น่าประทับใจมากเลย...\""
1010403-106 = "คะ? จะ... จู่ๆ ก็พูดเรื่องอะไรคะ?"
1010403-107 = "อ่า... ฉันมีไหวพริบในการจัดการสถานการณ์อย่างน่าประหลาดใจงั้นเหรอคะ?"
1010403-108 = "เอ่อ... ขอบคุณที่ชมค่ะ แต่พอทำงานในย่านการค้า ก็จะเจอกับเรื่องแบบนั้นบ่อยๆ ค่ะ"
1010403-109 = "แต่ว่าวันนี้เหมือนจะมีเรื่องเร่งด่วนมากกว่าวันอื่นๆ นะคะ"
1010403-110 = "เรายังไม่ทันได้จัดกิจกรรมต้อนรับลูกค้าที่สำคัญที่สุดเลยแท้ๆ แต่ก็ดันมาเจอเรื่องแบบนี้กันก่อน..."
1010403-111 = "[s] \"ยังมีอะไรอีกเหรอ?\""
1010403-112 = "คือว่า... ฉันไม่รู้ว่าควรบอกเรื่องแบบนี้หรือเปล่า..."
1010403-113 = "แต่เดี๋ยวจะมีคณะนักเรียนจากสวนต้นบ๊วยแวะมาทานอาหารน่ะค่ะ..."
1010403-114 = "ฉันอายที่จะพูดแบบนี้ด้วยตัวเองค่ะ แต่ว่า..."
1010403-115 = "ฉันเข้าหาลูกค้าที่เป็นเด็กๆ... ไม่ค่อยเก่งน่ะค่ะ"
1010403-116 = "[s] \"นั่นน่าจะเป็นเรื่องยากของทุกคนนะ...\""
1010403-117 = "ขอบคุณที่เข้าใจค่ะ คุณครู"
1010403-118 = "เด็กๆ ก็น่ารักและไร้เดียงสาอยู่หรอกค่ะ... แต่ลูกค้าเด็กๆ ต่างจากลูกค้าทั่วไปตรงที่จะเอาแต่ใจน่ะค่ะ"
1010403-119 = "คะ? คุณครูจะช่วยเท่าที่พอทำได้งั้นเหรอคะ? แต่ว่า..."
1010403-120 = "ขะ... เข้าใจแล้วค่ะ ในเวลาแบบนี้ฉันควรจะรับน้ำใจของคนอื่นไว้สินะคะ"
1010403-121 = "ขอบคุณค่ะ คุณครู ต้องขอรบกวนด้วยนะคะ"
1010403-123 = "คุณครู คุณครู! ดูตรงนี้สิคะ! ปลาหมึกตัวนี้ดูเหมือนดอกไม้เลยค่ะ! ยอดไปเลยค่ะ!"
1010403-124 = "[s] \"นั่นสินะ ถ้าหั่นให้ดีก็จะเป็นรูปดอกไม้สินะ ยอดไปเลย\""
1010403-125 = "คุณครูคะ ที่นี่มีไส้กรอกปลาหมึกยักษ์ขายมั้ยคะ?"
1010403-126 = "จะว่าไป ไส้กรอกปลาหมึกยักษ์ทำจากเนื้อปลาหมึกยักษ์จริงๆ หรือเปล่าคะ? หนูไม่ค่อยชอบปลาหมึก#nยักษ์เลย... ก็มันเหนียวนี่คะ!"
1010403-127 = "[s] \"ไม่ใช่หรอก มันคือไส้กรอกที่มีรูปร่างเหมือนปลาหมึกยักษ์เฉยๆ น่ะ\""
1010403-128 = "เอ๋ จริงเหรอคะ? ถ้างั้นหนูก็อยากลองกินดูค่ะ! คุณครูไม่ได้โกหกใช่มั้ยคะ?"
1010403-129 = "เมื่อก่อนที่สวนต้นบ๊วยบอกว่าจะทำข้าวผัดเนื้ออร่อยๆ ให้ แต่ก็ใส่พริกหยวกกับบรอกโคลีมาด้วยค่ะ..."
1010403-133 = "คุณครูดูแลเด็กๆ ดีมากเลยนะคะ น่าทึ่งจังเลยค่ะ"
1010403-134 = "ถ้าไม่ว่าอะไรละก็... ช่วยบอกเคล็ดลับกับฉันหน่อยได้มั้ยคะ?"
1010403-135 = "[s3] \"ไม่ต้องพยายามแก้ไขปัญหาให้เด็กๆ ก็ได้\"\n[s4] \"ถ้าเด็กๆ มีปัญหา เราไม่จำเป็นต้องหาทางแก้ไขตลอดก็ได้\""
1010403-138 = "คะ? มีปัญหา แต่ว่าไม่จำเป็นต้องแก้ปัญหางั้นเหรอคะ? หมายความว่ายังไงคะ...?"
1010403-139 = "อ้อ... แค่ช่วยรับฟังปัญหาของเด็กๆ ก็ถือว่าช่วยได้แล้วงั้นเหรอคะ?"
1010403-140 = "ฉันไม่เคยคิดในทางนั้นมาก่อนเลยนะคะ..."
1010403-141 = "[s] \"เรย์โจวก็ลองดูมั้ยล่ะ?\""
1010403-145 = "ได้ค่ะ นั่นเป็นสิ่งที่ฉันต้องทำตั้งแต่แรกอยู่แล้วนี่คะ"
1010403-151 = "เกี๊ยวกุ้งก็อร่อยค่ะ! เกี๊ยวหมูก็อร่อยเหมือนกันค่ะ!"
1010403-152 = "เกี๊ยวที่ไม่มีไส้ก็อร่อย จะนึ่งหรือจะทอดก็อร่อยทั้งนั้นค่ะ..."
1010403-153 = "เอ๋? ถ้าอย่างงั้นหนูชอบเกี๊ยวอะไรที่สุดเหรอคะ?"
1010403-154 = "ถะ... ถ้าไม่มีเกี๊ยวที่ไม่ชอบเป็นพิเศษ ก็ถือว่าชอบเกี๊ยวทุกอย่างเลยมั้ยคะ...?"
1010403-155 = "นั่นสินะคะ อย่างที่พี่พูดเลยค่ะ! อ๊ะ... แต่ว่าหนูไม่ชอบเกี๊ยวที่ทำจากสาหร่ายค่ะ... มันลื่นๆ น่ะค่ะ..."
1010403-156 = "นั่นไม่ใช่เกี๊ยว แต่เป็นอาหารอย่างอื่นหรือเปล่าคะ...?"
1010403-160 = "วัฒนธรรมการรับประทานอาหารนอกบ้านเป็นเรื่องที่น่าเศร้าใจเหมือนกันนะคะ นั่นเป็นสิ่งที่พิสูจน์ว่า#nผู้คนไม่มีเวลาทำอาหารกันน่ะค่ะ"
1010403-161 = "เรามาทานอาหารข้างนอกเพื่อประหยัดเวลา แต่เวลาที่ประหยัดไปก็จะเอาไปทำงานอื่นมากขึ้นค่ะ"
1010403-162 = "เรื่องนี้เป็นเรื่องที่แม้แต่นายจ้างก็ยังประสบพบเจอเลยนะคะ ระบบมันกลายเป็นแบบนี้ไปแล้วค่ะ"
1010403-163 = "เอ่อ... มีปัญหาอะไรเกี่ยวกับอาหารหรือเปล่าคะ...?"
1010403-164 = "บางทีการไม่มีปัญหาอะไรเลยก็อาจจะเป็นเรื่องน่าเศร้ายิ่งกว่าเดิมนะคะ"
1010403-166 = "จบลงได้ด้วยดีแล้วค่ะ..."
1010403-167 = "ตอนเด็กๆ มาติดสอยห้อยตามและพยายามเล่นซ่อนหาในร้าน ฉันก็ตกใจอยู่นิดหน่อยค่ะ..."
1010403-168 = "[s] \"แปลว่าเด็กๆ เริ่มสนิทกับเรย์โจวแล้วน่ะ\""
1010403-169 = "ค่ะ พวกเธอบอกว่าถ้ามีโอกาสก็อยากจะมาอีกครั้งด้วยค่ะ"
1010403-170 = "ในฐานะของผู้ให้บริการแล้ว นั่นเป็นคำที่ฟังกี่ครั้งก็ดีใจค่ะ"
1010403-174 = "เป็นประสบการณ์ที่น่าทึ่งในหลายๆ แง่เลยละค่ะ"
1010403-175 = "ขอบคุณค่ะ คุณครู "
1010403-176 = "[s] \"แต่ครูแทบไม่ได้ช่วยอะไรเลยนะ\""
1010403-177 = "คุณครูอาจคิดแบบนั้น แต่สำหรับฉันแล้วไม่ใช่เลยค่ะ"
1010403-178 = "ต่อไปก็ขอคำแนะนำอีกนะคะ คุณครู"

[translation]
1010403-1 = "#title;사고방식을 바꾸어서"
1010403-2 = "#place;현무상회 본점"
1010403-3 = "#wait;1500"
1010403-4 = "3;레이죠;02;식사는 입에 맞으셨습니까. 선생님?\n#3;a\n#3;em;[반응]"
1010403-5 = "[s1] \"최고였어!\"\n[s2] \"레이죠의 요리도 먹어 보고 싶네.\""
1010403-6 = "3;레이죠;03;그렇습니까. 다행이군요. 여기에서부터는 영업적인 인사말이긴 합니다만.\n#3;em;[음표]"
1010403-7 = "3;레이죠;03;다음에도, 저희 현무상회를 찾아 주시면 감사하겠습니다."
1010403-8 = "3;레이죠;04;제 요리…… 말씀이십니까? \n#3;em;[?]"
1010403-9 = "3;레이죠;02;확실히 저는, 현무상회에서 요리사라기보다는 매니저 일을 담당하고 있기는 합니다만……."
1010403-10 = "3;레이죠;03;네. 언젠가 직접, 샬레에서라도 만들어 드릴 기회가 있으면 좋겠습니다."
1010403-11 = "#st;[0,0];instant;1;"
1010403-12 = "#clearST"
1010403-13 = "#wait;700"
1010403-14 = "3;레이죠;01\n1;현무상회 부원;04\n#3;m5\n#3;h\n#1;a\n#wait;1500"
1010403-15 = "1;현무상회 부원;04;그, 급한 보고입니다! 오늘치 식재료가 도착하지 않은 상점이 있다고 합니다!\n#1;em;[!]\n#1;jump"
1010403-16 = "3;레이죠;02;어디죠?"
1010403-17 = "1;현무상회 부원;02;화퇴로 서편의 경화원입니다!"
1010403-18 = "3;레이죠;01;경화원이면…… 네. 거기군요. 알겠습니다.\n#3;em;[...]"
1010403-19 = "1;현무상회 부원;04;어, 어떻게 하죠? 이대로라면 오후 장사가 거의 불가능할 것 같다고 하는데요……!\n#1;em;[땀]\n#1;stiff"
1010403-20 = "3;레이죠;02;우선, 당장 모자란 것은 본점 창고에서 조달하도록 하죠.\n#1;dl\n#3;m3"
1010403-21 = "3;레이죠;99;물론 그걸로는 세 시간…… 아니, 두 시간 정도밖에는 버티지 못할 겁니다. 그러니."
1010403-22 = "3;레이죠;01;남는 운송 인력을 홍정로 3번가 신흥루로 보내도록 하십시오. 운송 트럭 2대를 차출할 수 있을 겁니다. 연락은 제가 넣어 두도록 하죠.\n#3;em;[반응]"
1010403-23 = "3;레이죠;01;신흥루는 오늘 휴점이니, 충분히 충당할 수 있을 겁니다."
1010403-24 = "3;레이죠;02;대금은 우선 본점이 급한 대로 부담하고, 금일 영업 종료 후 정산 시간에 누락 없이 처리하도록 해 주세요."
1010403-25 = "3;현무상회 부원;01;네! 알겠습니다!\n#3;em;[!]\n#3;jump"
1010403-26 = "#all;hide"
1010403-27 = "3;레이죠;15;후우. 어떻게든 되었군요.\n#3;a\n#3;em;[한숨]"
1010403-28 = "#st;[0,0];instant;1;"
1010403-29 = "#clearST"
1010403-30 = "1;식당 손님;00\n3;레이죠;01\n#1;a\n#1;h\n#3;h\n#wait;1000"
1010403-31 = "1;식당 손님;00;여기가 그 산해경의 현무상회인가?"
1010403-32 = "1;식당 손님;00;자, 자~! 뭐든 좋으니, 여기에서 가장 맛있는 요리를 주문하겠어!\n#1;em;[!]\n#1;jump"
1010403-33 = "#st;[0,0];instant;1;"
1010403-34 = "#clearST"
1010403-35 = "5;현무상회 부원;04;네, 네? 그러니까, 그런 건…….\n#5;al\n#5;em;[?]"
1010403-36 = "#st;[0,0];instant;1;"
1010403-37 = "#clearST"
1010403-38 = "3;레이죠;02\n5;현무상회 부원;04\n1;식당 손님;00\n#3;h\n#5;h\n#1;h\n#3;em;[...]\n#wait;2500"
1010403-39 = "3;레이죠;01;!\n#3;em;[!]"
1010403-40 = "3;레이죠;13;우선 자리를 안내해 드리겠습니다. 이쪽으로 오시지요."
1010403-41 = "#all;hide"
1010403-42 = "3;레이죠;13;저희 현무상회를 방문해 주셔서 진심으로 감사드립니다.\n#3;a\n#3;em;[음표]"
1010403-43 = "3;레이죠;03;특별한 메뉴를 주문하신 손님께, 오늘의 주방장 추천 요리를 제안 드리고 싶은데, 어떠실까요?"
1010403-44 = "3;식당 손님;00;오, 그런 것이 있었단 말인가? 메뉴판에는 없었던 것 같은데!\n#3;em;[!]\n#3;jump\n#3;a"
1010403-45 = "3;레이죠;13;그야말로 특별한 메뉴니까요."
1010403-46 = "3;레이죠;13\n5;현무상회 부원;04;저, 저희에게 그런 건 없지 않았나요?!\n#5;al\n#5;em;[땀]\n#fontsize;50"
1010403-47 = "3;레이죠;02;사실은 그렇습니다만…… 이런 때에는 손님의 정신적인 만족감을 충족시키는 것이 중요하죠.\n#fontsize;50"
1010403-48 = "#all;hide"
1010403-49 = "3;식당 손님;00;음? 무슨 문제라도 있는 건가?\n#3;em;[?]\n#3;closeup"
1010403-50 = "3;레이죠;13;네. 마침 주방장으로부터 메뉴에 관한 이야기를 전달받았습니다. 오늘의 추천 요리는…… 전복 코스 요리라고 하는군요.\n#3;em;[반응]"
1010403-51 = "3;식당 손님;00;전복! 그것도 코스! 기대되네!\n#3;em;[반짝]"
1010403-52 = "#all;hide"
1010403-53 = "2;레이죠;13\n4;현무상회 부원;04;그, 그건 조금 비싸지 않을까요?!\n#4;em;[?!]\n#fontsize;50"
1010403-54 = "2;레이죠;01;손님이 처음부터 가격을 신경 쓰지 않겠다고 이야기했으니까요.\n#fontsize;50"
1010403-55 = "2;레이죠;02;이런 손님은 오히려 적당하고 저렴한 가격의 요리를 내어 오면, 자신이 대접받지 못했다고 생각하여 화를 내는 타입입니다.\n#fontsize;50"
1010403-56 = "4;현무상회 부원;04\n2;레이죠;13;그러면, 손님. 조금만 기다려 주시길 바랍니다.\n#2;em;[음표]\n#4;dr\n#2;m3"
1010403-57 = "2;레이죠;02;주방에 빠르게 이야기해 두세요.\n#fontsize;50"
1010403-58 = "#all;hide"
1010403-59 = "3;현무상회 부원;02;네. 알겠습니다!\n#fontsize;50\n#3;em;[!]\n#3;jump"
1010403-60 = "#st;[0,0];instant;1;"
1010403-61 = "#clearST"
1010403-62 = "3;현무상회 부원;02\n#3;dr\n#3;h\n#wait;1000"
1010403-63 = "#all;hide"
1010403-64 = "3;레이죠;12;이것 참, 오늘따라 정신이 없군요. 선생님께서도 와 계신데…….\n#3;a\n#3;em;[한숨]"
1010403-65 = "#st;[0,0];instant;1;"
1010403-66 = "#clearST"
1010403-67 = "#all;hide"
1010403-68 = "#na;???;저는 분명히 계산을 했다고요!\n#fontsize;80"

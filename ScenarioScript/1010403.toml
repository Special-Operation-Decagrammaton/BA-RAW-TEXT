1010403-70 = "#clearST"
1010403-71 = "3;레이죠;02\n#3;em;[!]\n#3;h\n#wait;1500"
1010403-72 = "#all;hide"
1010403-73 = "5;현무상회 부원;04\n1;식당 손님 B;00\n#5;a\n#1;a\n#5;h\n#1;h\n#wait;1500"
1010403-74 = "5;현무상회 부원;04;그렇지만 손님 …….\n#5;em;[땀]"
1010403-75 = "1;식당 손님 B;00;알겠어요. 저에게서 이중으로 돈을 뜯어 가겠다는 거군요!\n#1;em;[빠직]\n#1;hophop"

[translation]
1010403-1 = "換個思考方式"
1010403-2 = "玄武商會總店"
1010403-4 = "請問餐點還合您的胃口嗎，老師？"
1010403-5 = "[s1]「超棒的！」\n[s2]「之後也想吃吃看令女做的料理呢。」"
1010403-6 = "是嗎？那真是太好了。#n接下來我要說點生意人的客套話。"
1010403-7 = "今日非常感謝您蒞臨玄武商會，期待您的下次光臨。"
1010403-8 = "我做的料理……是嗎？"
1010403-9 = "其實我在玄武商會負責的是經紀人的工作，而不是廚師……"
1010403-10 = "不過好吧，希望之後有機會能親自在夏萊為老師下廚。"
1010403-15 = "緊，緊急通報！有間店家還沒收到今天的食材！"
1010403-16 = "是哪裡？"
1010403-17 = "火鍋路西側的瓊花園！"
1010403-18 = "瓊花園的話……嗯，原來是那裡啊。#n我知道了。"
1010403-19 = "該，該怎麼辦？#n這樣下去的話，下午根本做不了生意……！"
1010403-20 = "不夠的食材先從總店的倉庫調貨吧。"
1010403-21 = "雖然那些頂多只能撐三……不，是兩個小時左右。#n那麼……"
1010403-22 = "把空閒的運送人力都派到虹正路3號的新興樓。#n我會聯絡一下，把兩台卡車也派過去支援。"
1010403-23 = "新興樓今天休息，應該可以補足才對。"
1010403-24 = "現在情況緊急，貨款就先由總店支付。#n後續就等今天打烊結帳的時候再檢查是否有遺漏吧。"
1010403-25 = "是！我知道了！"
1010403-27 = "呼，總算搞定了。"
1010403-31 = "這裡就是山海經的玄武商會嗎？"
1010403-32 = "來來來～！隨便什麼都好，我要點這裡最好吃的菜！"
1010403-35 = "咦，咦？#n您這麼說……"
1010403-40 = "我先幫您帶位吧。請跟我來。"
1010403-42 = "誠摯感謝您蒞臨玄武商會。"
1010403-43 = "由於您剛才表示要點最好吃的料理，個人建議本日的主廚推薦，您覺得如何呢？"
1010403-44 = "哦，還有那種料理啊？但菜單上好像沒有耶！"
1010403-45 = "因為那是特殊料理。"
1010403-46 = "我，我們有那種料理嗎！？"
1010403-47 = "實際上當然沒有……但這種時候應該優先將情緒價值提供給客人。"
1010403-49 = "嗯？有什麼問題嗎？"
1010403-50 = "不是的，主廚剛才正好跟我說了有關料理的事。#n今天的推薦料理……是鮑魚套餐。"
1010403-51 = "鮑魚！而且還是套餐！真令人期待！"
1010403-53 = "那，那個不是很貴嗎！？"
1010403-54 = "客人從頭到尾都沒提到過價格吧。"
1010403-55 = "如果端出物美價廉的料理，這種客人反而還會因為覺得自己沒有受到款待而生氣呢。"
1010403-56 = "那麼，這位客人。還請您稍等片刻。"
1010403-57 = "盡快告知廚房吧。"
1010403-59 = "是，我知道了！"
1010403-64 = "真是的，今天怎麼特別忙啊。#n難得老師也來了說……"
1010403-68 = "我明明已經結過帳了！"
1010403-74 = "但是客人……"
1010403-75 = "我知道了。你們是想從我身上剝兩次皮對吧！"
1010403-82 = "客人，請問發生什麼事了嗎？"
1010403-83 = "我剛才明明用付款APP付過錢了，#n但你們的員工卻突然說付款失敗，還要我再付一次！？"
1010403-84 = "這就是大名鼎鼎的玄武商會的待客之道嗎？"
1010403-85 = "但是我們……"
1010403-87 = "您的意思我明白了。#n如果是我們商會的疏失，稍後一定會向您致歉。"
1010403-88 = "不過在那之前，可以先讓我們查看監視器，拿到電子簽核公司的交易明細嗎？"
1010403-89 = "畢竟這種事情需要「確實明確地」確認清楚。"
1010403-90 = "咦……？監視器……？交易明細……？"
1010403-91 = "是的。作為應對突發事態的準備，我們玄武商會總店到處都安裝了監視器。"
1010403-92 = "傳送交易明細也不會花費太多時間。#n您只需要靜候5分鐘，所有事項就能確認完畢。"
1010403-96 = "呃～那個，就是……仔細想想，我剛才好像沒確認付款APP到底有沒有開啟。"
1010403-97 = "所以也不必勞煩你們一一確認……"
1010403-98 = "您快別這麼說。#n這本來就是我們應該承擔的責任，您不需要感到過意不去。"
1010403-99 = "以防萬一也通知您一聲，我們玄武商會的監視器含有錄音功能。"
1010403-100 = "錄，錄音！？"
1010403-101 = "是的。碰巧想到就提醒您一下。#n話說客人您還好嗎？有沒有覺得哪裡不舒服？"
1010403-102 = "沒，沒事，我很好！真的沒什麼！"
1010403-104 = "非常抱歉，老師。我忙得暈頭轉向的。"
1010403-105 = "[s]「真是令人欽佩……」"
1010403-106 = "嗯？您，您為何突然這麼說？"
1010403-107 = "啊……處理狀況的手腕很厲害？"
1010403-108 = "感謝您的讚美。#n商會的工作做久了，常常會碰到這種事。"
1010403-109 = "……雖然今天的緊急狀況，不知為何比平時還多就是了。"
1010403-110 = "真正重要的活動都還沒開始就這樣的話，真不知該如何是好……"
1010403-111 = "[s]「還有其他活動嗎？」"
1010403-112 = "那個……不知道該不該跟您說這些……"
1010403-113 = "……其實稍後會有梅花園的學生團體來訪。"
1010403-114 = "雖，雖然自己這麼說有點不好意思……"
1010403-115 = "但小孩子有時實在有點不受控……"
1010403-116 = "[s]「這對任何人來說都不容易……」"
1010403-117 = "謝謝您的理解。老師。"
1010403-118 = "孩子們雖然既可愛又單純……但他們和普通客人不同，經常會堅持己見。"
1010403-119 = "嗯？老師會盡可能幫忙？#n可是……"
1010403-120 = "我，我明白了。#n這種時候坦率地接受好意才是上策吧。"
1010403-121 = "謝謝您，老師。#n那就請您多多指教了。"
1010403-123 = "老師老師！你看這邊！#n這隻魷魚長得好像花哦！很厲害吧？"
1010403-124 = "[s]「就是說呀，真厲害。聽說要刀工好才能切成這樣哦。」"
1010403-125 = "老師老師。#n聽說有一種食物叫章魚香腸，在這裡能吃到嗎？"
1010403-126 = "還有章魚香腸是用章魚做成的香腸嗎？#n可是我不太喜歡章魚耶……因為太難咬斷了！"
1010403-127 = "[s]「不是那樣的。章魚香腸是做成章魚模樣的香腸哦。」"
1010403-128 = "真的嗎？那我也想吃吃看！老師沒有騙我吧？"
1010403-129 = "之前梅花園就有發生過，#n明明說是好吃的牛肉炒飯，結果卻把青椒和花椰菜切成塊一起炒……"
1010403-133 = "老師相當擅長照顧小孩子呢。真是太厲害了。"
1010403-134 = "不介意的話……可以向您請教一下祕訣嗎……？"
1010403-135 = "[s3]「倒稱不上是什麼祕訣。」\n[s4]「但有時候並不是非得『解決』問題不可。」"
1010403-138 = "咦？明明問題發生了卻不要嘗試解決？#n這是什麼意思……？"
1010403-139 = "啊……有時候只要好好傾聽就行了？"
1010403-140 = "這……老實說，我並沒有這樣想過。"
1010403-141 = "[s]「令女要不要也試試看？」"
1010403-145 = "我明白了。#n畢竟這本來就是我應該做的事。"
1010403-151 = "我喜歡吃蝦餃！豬肉餃也喜歡！"
1010403-152 = "沒有內餡的餃子也很棒，還有煎餃子、炸餃子……"
1010403-153 = "咦？但說來說去，我到底喜歡什麼餃子呢？"
1010403-154 = "如，如果沒有特別不喜歡的種類，應該能算是全部都喜歡吧……？"
1010403-155 = "聽你這麼一說，確實是呢！#n啊……可是我討厭用海帶做的餃子……因為滑滑的……"
1010403-156 = "那個已經不是餃子，是其他食物了吧……？"
1010403-160 = "……外食文化的普及其實是件令人心痛的事。#n因為那正是眾人都沒有時間料理的證據。"
1010403-161 = "雖然在餐廳用餐是為了節省時間，#n但因此省下來的時間，往往會被用來做更多的工作。"
1010403-162 = "甚至就連雇主也無法迴避這個問題。體系已經決定了一切。"
1010403-163 = "那個……食物有什麼問題嗎……？"
1010403-164 = "沒有任何問題……反而更令人難過。"
1010403-166 = "……順利結束了呢。"
1010403-167 = "雖然孩子們總是掛在我身上，或是想玩捉迷藏，讓人有點不知所措……"
1010403-168 = "[s]「那不就代表他們和令女變得很要好嗎？」"
1010403-169 = "是的，他們說有機會的話，之後還想再來。"
1010403-170 = "從接待客人的立場來看，這種話無論聽見幾次依然很讓人高興呢。"
1010403-174 = "從各個方面來說，今天的經驗都十分新鮮。"
1010403-175 = "非常謝謝您，老師。"
1010403-176 = "[s]「我其實也沒做什麼。」"
1010403-177 = "老師您或許是這麼想的，但我並不這麼認為哦。"
1010403-178 = "以後也請多多指教，老師。"

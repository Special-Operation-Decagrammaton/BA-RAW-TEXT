1010403-77 = "#clearST"
1010403-78 = "5;현무상회 부원;04\n1;식당 손님 B;00\n#5;d\n#1;d\n#5;h\n#1;h\n#wait;500"
1010403-79 = "#wait;400"
1010403-80 = "#wait;400"
1010403-81 = "3;레이죠;01\n#3;a\n#wait;1500"
1010403-82 = "3;레이죠;02;무슨 일이십니까, 손님?\n#3;em;[?]"
1010403-83 = "3;식당 손님 B;00;저는 분명 결제 앱으로 돈을 냈는데, 갑자기 결제가 되지 않았다며 두 번 돈을 내라고 하고 있지 뭐예요?!\n#3;em;[스팀]"
1010403-84 = "3;식당 손님 B;00;이게 소문으로만 듣던 현무상회의 접객이라는 건가요?"
1010403-85 = "3;식당 손님 B;00\n5;현무상회 부원;04;하지만 저희는…….\n#3;m1\n#5;a"
1010403-86 = "#all;hide"
1010403-87 = "3;레이죠;18;자, 자. 알겠습니다. 저희 상회 측에서 실수가 있었다면, 제가 분명히 사과드리겠습니다.\n#3;em;[반응]"
1010403-88 = "3;레이죠;03;하지만 그 전에, CCTV를 확인하고 전자 결제 회사의 거래 내역을 송신 받아 보아도 되겠습니까?"
1010403-89 = "3;레이죠;13;이런 일은 '확실하고 명확한' 확인이 필요한 법이니까 말이죠."
1010403-90 = "3;식당 손님 B;00;네……? CCTV……? 거래 내역……?\n#3;em;[?]"
1010403-91 = "3;레이죠;03;그렇습니다. 저희 현무상회 본점에는, 어디에든 CCTV가 설치되어 있어서, 만일의 사태에 충분히 대비할 수 있도록 준비가 완료된 상황이라서요.\n#3;em;[반응]"
1010403-92 = "3;레이죠;13;거래 내역 송신도 그리 오래 걸리지 않을 겁니다. 5분 정도만 기다려 주시면 전부 확인받으실 수 있을 겁니다."
1010403-93 = "#st;[0,0];instant;1;"
1010403-94 = "#clearST"
1010403-95 = "3;식당 손님 B;00\n#3;em;[...]\n#wait;2500"
1010403-96 = "3;식당 손님 B;00;음. 그게. 저기. 생각해 보니 제가 결제 앱이 켜졌는지 확실히 확인하지 않았던 것 같네요."
1010403-97 = "3;식당 손님 B;00;그러니까 굳이 그렇게까지 하나하나 큰 수고를 들여 확인하지 않아도…….\n#3;em;[땀]\n#3;stiff"
1010403-98 = "3;식당 손님 B;00\n5;레이죠;99;아닙니다. 큰 수고라고 말씀하실 만 한 일도 아니고, 마땅히 저희가 부담해야 하는 일이기도 하지요.\n#3;m1\n#5;a\n#5;greeting"
1010403-99 = "5;레이죠;13;그리고 혹시 모르니 말씀드리는 것입니다만, 저희 현무상회의 CCTV는 녹음 기능도 포함되어 있으니 말이지요.\n#5;em;[재잘]"
1010403-100 = "3;식당 손님 B;00;노, 녹음이라고요?!\n#3;em;[?!]\n#3;shake"
1010403-101 = "5;레이죠;03;네. 그냥 생각이 나서 말씀드려 보는 것입니다. 그런데 괜찮으신가요, 손님? 어디 편찮으신 부분이라도 있으신가요?\n#5;em;[?]"
1010403-102 = "3;식당 손님 B;00;아, 아닙니다. 아니에요! 정말 아무것도 아니니까요!\n#3;em;[땀]\n#3;hophop"
1010403-103 = "#all;hide"
1010403-104 = "3;레이죠;15;죄송합니다. 선생님. 뭔가 정신이 없었네요.\n#3;a\n#3;em;[땀]\n#3;greeting"
1010403-105 = "[s] \"감탄했어…….\""
1010403-106 = "3;레이죠;04;네? 가, 갑자기 무슨 말씀이십니까?"
1010403-107 = "3;레이죠;02;아…… 상황에 대처하는 수완이 놀라울 정도였다고요?"
1010403-108 = "3;레이죠;03;그, 칭찬해 주셔서 감사합니다. 그렇지만 이 정도는 상회 일을 하다 보면 빈번하게 일어나는 일이라서요.\n#3;em;[반응]"
1010403-109 = "3;레이죠;06;……오늘은 어째서인지 조금, 다른 날보다 급한 일이 많이 일어난 것 같기는 하지만요."
1010403-110 = "3;레이죠;12;정작 가장 중요한 접객 이벤트는 시작도 하지 않았는데, 벌써부터 이러면 어쩌려는 건지…….\n#3;em;[세로선]"
1010403-111 = "[s] \"뭔가 또 있어?\""
1010403-112 = "3;레이죠;06;그게…… 이런 말씀을 드리는 게 맞는 건지 잘 모르겠습니다만…….\n#3;em;[속상함]"
1010403-113 = "3;레이죠;02;……매화원 원생들이 단체로 방문하기로 되어 있습니다."
1010403-114 = "3;레이죠;08;그, 스스로 말씀드리자니 부끄럽기도 합니다만.\n#3;em;[///]"
1010403-115 = "3;레이죠;02;……아이들은 조금, 다루기 어려워서요…….\n#3;stiff"
1010403-116 = "[s] \"누구라도 그건 쉽지 않을 거야…….\""
1010403-117 = "3;레이죠;03;알아주셔서 감사합니다. 선생님."
1010403-118 = "3;레이죠;01;아이들은 분명 귀엽고 순수하지만…… 보통 손님들과 달리, 자기주장만을 내세우는 경우가 많다 보니 말이죠."
1010403-119 = "3;레이죠;04;네? 선생님께서 할 수 있는 만큼이라도 도움을 주시겠다고요? 그렇지만 그래서는…….\n#3;em;[?]"
1010403-120 = "3;레이죠;03;아, 알겠습니다. 이럴 때는 호의를 받아 주었으면 좋겠다는 말씀이시군요."
1010403-121 = "3;레이죠;13;감사합니다. 선생님. 잘 부탁드리겠습니다.\n#3;em;[음표]"
1010403-122 = "#all;hide"
1010403-123 = "#na;매화원 원생 A;선생님, 선생님! 여기 보세요! 이 오징어는 꽃처럼 생겼어요! 대단하죠?"
1010403-124 = "[s] \"그러게. 대단하네. 칼집을 잘 내면 이런 모양이 된대.\""
1010403-125 = "#na;매화원 원생 B;있잖아요, 선생님. 문어 소시지라는 게 있다던데, 여기에선 먹어 볼 수 없나요?"
1010403-126 = "#na;매화원 원생 B;그런데 문어 소시지는 문어살로 만든 소시지인 건가요? 저 문어 별로 안 좋아하는데……. 너무 질기잖아요!"
1010403-127 = "[s] \"그게 아니라, 문어 소시지는 문어 모양으로 만든 소시지야.\""
1010403-128 = "#na;매화원 원생 B;어, 진짜요? 그러면 먹어 보고 싶어요! 혹시 선생님 거짓말하는 거 아니죠?"
1010403-129 = "#na;매화원 원생 B;예전에 매화원에서는요, 맛있는 소고기 볶음밥이라면서 피망이랑 브로콜리를 같이 썰어서 볶아 준 적이 있었어요……."
1010403-130 = "#st;[0,0];instant;1;"
1010403-131 = "#clearST"
1010403-132 = "3;레이죠;02\n#3;a\n#3;em;[...]\n#wait;2500"

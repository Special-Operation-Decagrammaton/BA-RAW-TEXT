102195-19 = "#3;hide\n1;토키 모드 1;01\n5;에이미;06;……토키. 괜찮은 거야? 너무 무리하는 거 아냐?\n#5;sig\n#1;sig\n#1;a\n#5;a\n#1;h"
102195-20 = "1;토키 모드 1;99;걱정해 주셔서 감사합니다. 에이미. 하지만 저는 괜찮습니다. 아직 <무장>의 에너지도 남아 있고…….\n#1;sig"
102195-21 = "#all;hide"
102195-22 = "3;히마리;02;토키. <아비 에슈흐>의 그 능력은…… <이름 없는 신들>의 기술이 일부 반영되었다고 가정해도, 결국 요새도시 <에리두>가 존재했기에 성립 가능했던 거예요.\n#3;em;[반응]"
102195-23 = "3;히마리;07;도시 하나를 통째로 파워드 슈트의 연산장치로 사용한다는 파격…… 아니, 악취미라고 해야 할까. 그랬기에 그런 성능을 낼 수 있었던 거죠."
102195-24 = "3;히마리;06;그걸로 <이름 없는 신들의 왕녀>를 상대하겠다는 리오의 자신감은 결코 허황된 게 아니었을 지도 몰라요…….\n#3;em;…"
102195-25 = "3;히마리;99;하지만 <에리두>가 해체되어 껍데기만 남은 지금은, 그 무장은 더 이상 예전의 그 성능을 낼 수 없어요."
102195-26 = "3;히마리;05;지금은 그저 평범한 외골격이라고 생각해야 해요. 아셨죠?"

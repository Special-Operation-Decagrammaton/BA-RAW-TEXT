[translation]
102195-4 = "Hahaha! Another successful mission!"
102195-5 = "Then we'll see you again someday!"
102195-6 = "The Never-Ending Conveyor Belt leads straight to justice!"
102195-7 = "Infinite Sushi Squad: Kaitengers! Exit!"
102195-12 = "..."
102195-13 = "Who... Who were they?"
102195-15 = "*tchhhk* I've accomplished my mission here, President Himari."
102195-16 = "Toki...?"
102195-17 = "You're already finished...? I can send you the next target's coordinates now, then. Will that be okay?"
102195-18 = "Yes, ma'am."
102195-19 = "...Toki, are you looking after yourself as well? You've been working nonstop."
102195-20 = "I appreciate your consideration, Eimi, but there's still energy from the weapon left. I can continue fighting."
102195-22 = "Toki. Even if part of the Nameless Gods' technology was reflected in the abilities of Abi-Eshuh... We were only able to utilize it because of the existence of the Fortress City of Eridu."
102195-23 = "It's unconventional, or, I should say...in bad taste to use an entire city as a computing device for a reinforced exoskeleton... But that's why it was able to achieve the performance it did."
102195-24 = "Rio's confidence in facing the princess of the Nameless Gods with Abi-Eshuh may not have been a pipe dream..."
102195-25 = "But now that Eridu has been dismantled and only a shell of it remains, it can no longer perform at the same level as it did previously."
102195-26 = "Please tread carefully and treat it as an ordinary exoskeleton. Okay?"
102195-27 = "...Yes."
102195-28 = "...Well, I suppose not entirely ordinary. I, the super genius hacker, modified a few things... It's the incredible masterpiece of a genius, although it's not quite at the cheating level it was before."
102195-29 = "Understood. Thank you, President Himari."
102195-32 = "I'm sorry to ask again, but are you sure you're okay, Toki? I can provide support as well."
102195-33 = "It's okay, Eimi. I'm used to fighting alone."
102195-38 = "When I arrive at the target coordinates, I'll contact you."
102195-42 = "She's...very somber. And serious."
102195-43 = "Toki was originally from C&C. Maybe she hopes to fight alongside her fellow agents."
102195-44 = "Then why doesn't she do that?"
102195-45 = "That is the conundrum. Perhaps... She didn't feel she deserved to stand by their side in battle."
102195-46 = "Hm... I disagree. Toki was only following orders."
102195-47 = "At the end of the day, Big Sister is the one to be blamed."
102195-48 = "But still, it was she who carried out the actions. She isn't entirely innocent."
102195-49 = "Hm. That's difficult."
102195-50 = "Truly. Rio and Toki are similar in their clumsiness when it comes to other people."
102195-55 = "Next Episode; Final Defense Operation - Schale"

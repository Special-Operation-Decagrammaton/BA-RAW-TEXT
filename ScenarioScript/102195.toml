[translation]
102195-4 = "哈哈哈哈！這裡也收拾乾淨了呢！"
102195-5 = "那麼，諸位！有緣再會吧！"
102195-6 = "無限迴轉的軌道……終將通向正義的未來！"
102195-7 = "無限迴轉壽司戰隊．凱坦澤！撤退！"
102195-12 = "……"
102195-13 = "那些人究竟是何方神聖啊……"
102195-15 = "這邊也處理完畢了。陽葵部長。"
102195-16 = "季……？"
102195-17 = "……唉呀，動作真快。真是優秀呢。#n那麼我會指定下一個座標，可以請你移動到那裡嗎？"
102195-18 = "遵命。"
102195-19 = "……季，你還好嗎？有沒有在逞強？"
102195-20 = "感謝你的擔心，英美。我沒問題的。#n「武裝」的能量也還有剩。"
102195-22 = "季，「Abi-Eshuh」的能力……即使假設它反映了部分「無名之神」的技術，也是因為要塞城市「埃里都」的存在才能夠發揮。"
102195-23 = "為了控制那尚有大量未知領域的技術，動用整個都市的力量，才能將那破壞性的性能──不，應該說是惡趣味的性能發揮出來。"
102195-24 = "莉央想利用它對付「無名諸神的王女」，或許並非無謀的計畫……"
102195-25 = "但是在「埃里都」解體的現在，無法期待那個「武裝」能發揮和以前相同的性能吧。"
102195-26 = "現在應該將其視為平凡的裝甲……明白嗎？"
102195-27 = "……遵命。"
102195-28 = "……不，那也不是平凡的裝甲呢。畢竟身為超天才駭客的我也對它進行了改造……雖然不到犯規的程度，卻能感受到天才的氣息……可以說是美妙的傑作吧。"
102195-29 = "是。非常感謝，陽葵部長。"
102195-32 = "……季，我也來幫忙吧？"
102195-33 = "沒關係的，英美。我已經很習慣獨自戰鬥了。"
102195-38 = "抵達目標地點後，我會再聯絡兩位。那麼再會。"
102195-42 = "總覺得有些寂寞呢。"
102195-43 = "季本來就是C&C的成員。#n或許他會想和特務一起戰鬥。"
102195-44 = "那一起戰鬥不就好了嗎？"
102195-45 = "這個嘛……也許他會懷疑自己是否有那種資格也說不定。"
102195-46 = "嗯……不過，季也只是聽從命令而已唷。"
102195-47 = "沒錯。該被怪罪的元兇是大姐頭。"
102195-48 = "……話雖如此，也無法認為自己沒有錯吧。"
102195-49 = "這樣啊……真是麻煩呢。"
102195-50 = "……就是啊。真是笨拙的人。#n不管是季，還是莉央。"
102195-55 = "下一話;最終防衛戰「夏萊」"

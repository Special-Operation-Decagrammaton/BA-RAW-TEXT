[translation]
102195-4 = "ฮ่าฮ่าฮ่าฮ่า! ทางนี้ก็เสร็จเรียบร้อยแล้ว!"
102195-5 = "เอาละค่ะ ทุกคน! ไว้เจอกันโอกาสต่อไปนะ!"
102195-6 = "เส้นทางแห่งชีวิตที่ไม่สิ้นสุดนี้จะพาไปสู่อนาคตของความยุติธรรมในที่สุด!"
102195-7 = "ขบวนการซูจิจุใจ ไคเทนเจอร์ ถอนกำลัง!!!"
102195-12 = "......"
102195-13 = "พวกนั้นเป็นใครกันนะ"
102195-15 = "(ซ่า) ทางนี้ก็จัดการเรียบร้อยแล้วค่ะ หัวหน้าฮิมาริ"
102195-16 = "โทคิ...?"
102195-17 = "เสร็จแล้วเหรอคะ...? เร็วดีจริงๆ เลย ฉันจะส่งพิกัดต่อไปให้ ช่วยไปที่นั่นต่อเลยได้ไหมคะ?"
102195-18 = "ค่ะ มาดาม"
102195-19 = "โทคิ... ยังโอเคอยู่ไหม? หักโหมเกินไปหรือเปล่าเนี่ย?"
102195-20 = "ขอบคุณที่เป็นห่วงค่ะเอมิ แต่ฉันไม่เป็นไรค่ะ อีกอย่าง <อาวุธ> ก็ยังมีพลังงานเหลืออยู่..."
102195-22 = "โทคิ แม้ว่าเทคโนโลยีของ <เหล่าเทพไร้นาม> จะสะท้อนออกมาบางส่วน แต่ความสามารถของ <อาบี เอชูห์> นั้นเกิดขึ้นได้เพราะมีเมืองแห่งปราการเอริดูค่ะ"
102195-23 = "เมืองทั้งเมืองถูกใช้ในการควบคุมเทคโนโลยีที่เราไม่รู้จัก ก็เลยสามารถดึงประสิทธิภาพในการทำลาย#nล้างออกมาได้ค่ะ"
102195-24 = "ความมั่นใจของริโอะที่จะเผชิญหน้ากับ <ธิดาแห่งทวยเทพไร้นาม> ด้วยสิ่งนี้ บางทีอาจจะไม่ใช่เรื่อง#nที่เหลวไหลก็ได้นะคะ..."
102195-25 = "แต่ในเมื่อตอนนี้ <เอริดู> ถูกแยกออกจากกันจนเหลือแค่เปลือก อาวุธนั้นก็เลยไม่สามารถใช้งานได้#nเหมือนแต่ก่อนค่ะ"
102195-26 = "ตอนนี้เราต้องคิดว่ามันเป็นแค่เกราะธรรมดาๆ ค่ะ เข้าใจไหมคะ?"
102195-27 = "...... ค่ะ"
102195-28 = "...... ไม่ค่ะ มันต้องไม่ธรรมดาสิ อุตส่าห์ได้แฮ็กเกอร์ยอดอัจฉริยะอย่างฉันมาปรับปรุงใหม่ทั้งที... ต้องเรียกว่ามาสเตอร์พีซจากฝีมืออัจฉริยะมากกว่า"
102195-29 = "ค่ะ ขอบคุณนะคะ หัวหน้าฮิมาริ"
102195-32 = "ไม่เป็นไรแน่นะโทคิ...? ให้ฉันช่วยไหม?"
102195-33 = "ไม่เป็นไรค่ะ เอมิ ฉันคุ้นชินกับการต่อสู้คนเดียวแล้วค่ะ"
102195-38 = "ถ้าไปถึงพิกัดตามเป้าหมายแล้ว ฉันจะติดต่อไปค่ะ"
102195-42 = "ดูอึมครึมยังไงพิกล..."
102195-43 = "โทคิเป็น C&C นี่คะ บางทีเธออาจจะอยากต่อสู้เคียงบ่าเคียงไหล่กับสายลับด้วยกันก็ได้ค่ะ"
102195-44 = "งั้นเราก็ให้สู้ด้วยกันสิ?"
102195-45 = "นั่นสิคะ แต่อาจมีคนกังวลว่าเธอสมควรได้รับโอกาสนี้หรือเปล่าก็ได้..."
102195-46 = "อืม... แต่โทคิก็ทำตามที่สั่งหมดเลยนะ?"
102195-47 = "ใช่ค่ะ คนที่ร้ายที่สุดก็คือบิ๊กซิสเตอร์ค่ะ"
102195-48 = "แต่ถึงอย่างนั้น เธอก็คงไม่คิดว่าตัวเองไร้ซึ่งความผิดหรอกค่ะ"
102195-49 = "ฮืม... ยากจัง"
102195-50 = "...... ค่ะ ไม่ได้เรื่องกันทั้งสองคนเลยนะคะ ทั้งริโอะ ทั้งโทคิเลย"
102195-55 = "ตอนต่อไป;ปฏิบัติการป้องกันครั้งสุดท้าย - ชาเล่ต์"

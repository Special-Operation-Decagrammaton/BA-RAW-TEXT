[translation]
10009000-1 = "Prologue;Valentine's Day Teamwork"
10009000-2 = "One day, shortly before Valentine's Day, I was contacted by Fubuki and Kirino."
10009000-4 = "Schale Office"
10009000-6 = "[ns] \"You want me to help with your patrols?\""
10009000-7 = "There are all kinds of big events held around D.U. during Valentine's Day season."
10009000-8 = "There's the Chocolate Cake Bake-Off that invites famous bakers, the Valentine's Day Chocolate Exhibition that showcases famous chocolate desserts from all over Kivotos..."
10009000-9 = "Oh! And don't forget the uber-popular Chocolate-Eating Contest and the Chocolate Marathon. Those are a real hit too!"
10009000-10 = "And you can't leave out the Annual Pet Chocolate Competition.#nContestants nurture that chocolate for a whole year just to show it off now."
10009000-11 = "[s] \"I was following along until that last one... What?\""
10009000-12 = "Don't worry about the details for now."
10009000-13 = "The Public Safety Bureau is usually in charge of security for events like these."
10009000-14 = "Though this years' events are said to be bigger than ever. We came up with the idea to ask for your help while going over the security detail since we're so short-handed."
10009000-15 = "Can you help us, Sensei? I doubt you have anything better to do during Valentine's Day."
10009000-16 = "F-Fubuki! You can't just say that!"
10009000-17 = "[s1] \"Give me a little credit! I have plans.\"\n[s2] \"Actually, she's super right. My schedule is wide open!\""
10009000-18 = "You do? Ohhh..."
10009000-19 = "Still, though. How can you turn down a request from one of your adorable students? "
10009000-20 = "Don't be so cold-hearted. I promise we'll share our donuts with you too.#nCome on!"
10009000-21 = "[s3] \"Keep the donuts. Of course I'll help.\""
10009000-22 = "Haha. Now you're talking my language!"
10009000-23 = "Th-Thank you!"
10009000-24 = "S-Sensei?!"
10009000-25 = "Well, then. I was only making a joke, you know... "
10009000-26 = "Is that really something you should sound so proud about?#nWell, whatever. We appreciate you helping all the same."
10009000-27 = "Sh-She's right. Thank you, Sensei!"
10009000-28 = "[s] \"How could I say no when you'll be working so hard on Valentine's?\""
10009000-29 = "This is Valentine's Day we're talking about—an important holiday.#nIt's a day of exchanging chocolate and being happy."
10009000-30 = "Keeping smiles on people's faces is what Valkyrie Police School is all about."
10009000-31 = "It's so rare to hear you show so much school spirit, Fubuki!#nYou're gonna make me cry!"
10009000-32 = "Plus, all the shops will give me their leftover donuts when they see how hard I'm working. Win-win, am I right? "
10009000-33 = "It pays to be a Valkyrie Police School cadet!"
10009000-34 = "*gasp* Fubuki!"
10009000-35 = "Heh heh."
10009000-36 = "Anyway, thanks for agreeing to help us with our patrols.#nSee you on Valentine's Day, Sensei."
10009000-42 = "Soon, Valentine's Day arrived, and I set out to help Fubuki and Kirino with their patrols like I promised."
10009000-44 = "D.U. Shopping District Street"
10009000-46 = "The shopping district is bustling with a huge crowd for Valentine's Day."
10009000-47 = "Come get your special rose chocolate sets—20 percent off for a limited time!"
10009000-48 = "How about taking a bite of our sweet mint chocolates?#nThey're buy one, get one free during our Mintchoco Parfait Event! "
10009000-49 = "Nothing makes a gift for friends, family, colleagues, or that someone special like mint chocolate!"
10009000-50 = "Happy Valentine's Day! We're running a special just for couples! Come on down and see what we have to offer!"
10009000-51 = "[s] \"Things are really popping off.\""
10009000-52 = "I continued walking along the shopping district street, taking in the festive atmosphere."
10009000-61 = "Hey. Word on the street is your shop is the place to be."
10009000-62 = "Is it true that you're selling some kind of lucky chocolate here?"
10009000-63 = "Why, yes. We carry lucky chocolate in the shape of four-leaf clovers. Would you care to buy one?"
10009000-64 = "But are the rumors true? Will eating it increase my luck?"
10009000-65 = "O-Oh...no. It's just a theme, so to speak. The design is for marketing.#nI can't guarantee it will do something like increase your luck..."
10009000-66 = "But we already bought some lotto tickets ahead of time!#nWe were gonna scratch them off after eating those chocolates!"
10009000-67 = "Actually, I couldn't wait and already scratched one of my numbers off.#nDidn't look like a winner, though..."
10009000-68 = "But the number could change after I eat the chocolate...RIGHT?!"
10009000-69 = "[s] \"I seriously doubt that's gonna happen.\""
10009000-70 = "Huh...? Aren't you that Sensei person from Schale?#nAre you on a patrol or somethin'?"
10009000-71 = "Why're you singling us out from the crowd? Think we'll cause trouble?#nThat's called PROFILING, ya know."
10009000-72 = "Gah! You don't have to rub it in! I already know I didn't win."
10009000-73 = "Can't you just let a helmet-clad girl hold onto her dreams?! "
10009000-75 = "Yeah, we can't throw in the towel now!"

[translation]
10009000-1 = "บทเริ่มต้น;ภารกิจความร่วมมือในวันวาเลนไทน์"
10009000-2 = "(วันหนึ่งก่อนถึงวันวาเลนไทน์ คุณครูก็ได้รับการติดต่อจากฟุบุกิและคิริโนะ)"
10009000-4 = "สำนักงานชาเล่ต์"
10009000-6 = "[ns] \"ความร่วมมือการลาดตระเวนเหรอ?\""
10009000-7 = "พอถึงช่วงวาเลนไทน์ เขตปกครองตนเอง D.U. จะจัดอีเวนต์ใหญ่ๆ เต็มไปหมดเลยล่ะ"
10009000-8 = "อย่างเช่น <อีเวนต์ทำเค้กช็อกโกแลตสุดอร่อย> ที่ร้านทำขนมชื่อดังจัดขึ้น หรือ <นิทรรศการช็อกโกแลต> ที่รวบรวมและเอาขนมที่ทำจากช็อกโกแลตทั่วคิโวทอสมาจัดแสดง"
10009000-9 = "อ๊ะ! แล้วก็ยังมี <งานแข่งกินจุ> หรือไม่ก็กินช็อกโกแลตที่ทำใหม่ๆ ที่ <งานประกวดช็อกโกแลตสุดพิเศษ> ที่กำลังเป็นที่นิยมมากๆ ด้วยนะคะ!"
10009000-10 = "ใช่แล้ว แล้วก็ยังอีเวนต์ที่ไม่ควรพลาดอย่าง <งานประกวดช็อกโกแลตที่บ่มมาเป็นเวลานาน 1 ปี> #nอื้อ น่าตื่นเต้นทุกครั้งที่เห็นเลยล่ะ"
10009000-11 = "[s] \"เรื่องแรกๆ ก็เข้าใจได้นะ แต่เรื่องหลังครูว่าไม่ใช่แล้วล่ะ\""
10009000-12 = "เอาล่ะๆ อย่าสนใจเรื่องเล็กน้อยเลย"
10009000-13 = "ในช่วงเทศกาลแบบนี้ปกติพวกเราจะต้องเป็นผู้ดูแลความปลอดภัยให้กับเจ้าของงานเทศกาลด้วยนะ"
10009000-14 = "แถมงานอีเวนต์ปีนี้ยังมีขนาดใหญ่กว่าปีที่ผ่านๆ มา คนทำงานเลยไม่พอ เราเลยตกลงกันว่าจะมาขอ#nให้คุณครูช่วย..."
10009000-15 = "ว่ายังไง คุณครู? จะช่วยพวกเรามั้ย? ยังไงคุณครูก็ไม่น่าจะมีอะไรทำในวันวาเลนไทน์อยู่แล้วนี่?"
10009000-16 = "ฟะ...ฟุบุกิ! พูดแบบนั้นมันเสียมารยาทนะคะ!"
10009000-17 = "[s1] \"ใช่! แบบนี้ไม่น่ารักเลย ครูเองก็ยุ่งเหมือนกันนะ\"\n[s2] \"ไม่ใช่แค่ว่างธรรมดานะ ไม่มีอะไรทำเลยต่างหาก!?\""
10009000-18 = "เอ๋? งั้นเหรอ? อืมมม~"
10009000-19 = "นักเรียนสุดน่ารักอุตส่าห์มาขอร้องเลยนะ~ "
10009000-20 = "ถ้าปฏิเสธก็จะใจร้ายเกินไปรึเปล่า? พอเสร็จงานเดี๋ยวฉันแบ่งโดนัทให้~ นะ?"
10009000-21 = "[s3] \"ไม่ต้องแบ่งโดนัทให้ ครูก็จะช่วยอยู่แล้วล่ะ\""
10009000-22 = "อ่ะฮะฮะ ชอบคุณครูที่เป็นแบบนั้นที่สุดเลย~"
10009000-23 = "ขะ...ขอบคุณมากค่ะ!"
10009000-24 = "คะ... คุณครู?!"
10009000-25 = "คือว่า... ในฐานะที่ฉันเป็นฝ่ายพูดก่อน จะพูดแบบนี้มันก็ยังไงๆ อยู่... "
10009000-26 = "ที่พูดมานั่นตั้งใจจะอวดฉันหรือเปล่าน่ะ? แต่ก็เอาเถอะ แค่ครูตกลงว่าจะช่วยกันก็ขอบคุณแล้วล่ะ..."
10009000-27 = "ขะ...ขอบคุณมากค่ะ!"
10009000-28 = "[s] \"สุดยอดเลยนะที่ทั้งสองคนทำงานหนักในวันวาเลนไทน์แบบนี้น่ะ\""
10009000-29 = "ก็นะ มันก็เป็นวันวาเลนไทน์นี่นา วันที่คนที่ได้รับและมอบช็อกโกแลตให้กันและกันจะมีความสุขมากขึ้น"
10009000-30 = "ในวันแบบนั้น การรักษารอยยิ้มของผู้คนเอาไว้คือหน้าที่ของสถาบันฝึกตำรวจวัลคิรี่อย่างพวกเรา#nยังไงล่ะ"
10009000-31 = "ฟะ...ฟุบุกิ ปกติก็คิดแบบนั้นเหรอคะ... ฉะ...ฉันประทับใจมากเลยค่ะ...!"
10009000-32 = "อื้อ ถ้าตั้งใจทำงานละก็ต่อไปพวกคนขายของจะต้องเห็นใจแล้วลดราคาโดนัทที่เหลือ แล้วขายให้ในราคาถูกๆ ก็ได้นะ "
10009000-33 = "อื้อ~ โชคดีจังที่เป็นนักเรียนของสถาบันฝึกตำรวจวัลคิรี่ ว่ามั้ยล่ะ?"
10009000-34 = "ฟุบุกิ..."
10009000-35 = "อ่ะฮะฮะ"
10009000-36 = "ยังไงก็เถอะ ความร่วมมือการลาดตระเวนในวันวาเลนไทน์คราวนี้ ขอรบกวนด้วยนะ คุณครู~"
10009000-42 = "(หลังตกลงกับคิริโนะและฟุบุกิว่าจะช่วยลาดตระเวนแล้ว วันวาเลนไทน์ก็มาถึง...)"
10009000-44 = "ถนนในย่านการค้าเขต D.U."
10009000-46 = "(ย่านการค้าที่จัดงานต้อนรับเทศกาลวันวาเลนไทน์ ตอนนี้เต็มไปด้วยผู้คนแน่นขนัด)"
10009000-47 = "เร่เข้ามาจ้า เซ็ตช็อกโกแลตโรเซ่สุดพิเศษลดราคาไปเลยจุกๆ 20 เปอร์เซ็นต์!"
10009000-48 = "ลองชิมช็อกโกแลตมินต์หวานอร่อยสักคำไหมครับ? ตอนนี้ที่ร้านของเรามีโปรโมชันสุดพิเศษอยู่ครับ เมื่อสั่ง <ช็อกโกแลตมินต์พาร์เฟต์> รับเพิ่มทันทีอีกหนึ่งถ้วยไปเลยครับผม!"
10009000-49 = "ช็อกโกแลตมินต์อร่อยๆ สำหรับเพื่อนร่วมงาน คนรัก เพื่อนๆ และคนสุดพิเศษของคุณครับ!"
10009000-50 = "แฮปปี้วันวาเลนไทน์! ลดกระหน่ำสุดพิเศษ ฉลองวาเลนไทน์! เมื่อสั่งเมนูของหวานทานกับคนที่คุณรัก...!"
10009000-51 = "[s] \"งานเทศกาลใหญ่จริงๆ ด้วย...\""
10009000-52 = "(ขณะที่เดินไปตามถนนในย่านการค้า คุณครูก็รับรู้ได้ถึงความร้อนแรงและความสนุกสนาน#nจากบรรยากาศงานเทศกาล)"
10009000-61 = "นี่~~~ ฉันได้ยินข่าวลือมาล่ะ"
10009000-62 = "ที่นี่มีช็อกโกแลตนำโชคขายด้วยงั้นเหรอ?"
10009000-63 = "อ๊ะ ใช่ครับ ที่ร้านของเรามีช็อกโกแลตนำโชครูปใบโคลเวอร์สี่แฉกขายอยู่ครับ สนใจรับสักชิ้นมั้ยครับ"
10009000-64 = "นี่ ช็อกโกแลตนั่นน่ะ พอกินแล้วจะโชคดีจริงๆ งั้นเหรอ?"
10009000-65 = "ครับ? คือว่าช็อกโกแลตนำโชคเป็นเรื่องเล่าแล้วก็รูปแบบการโปรโมตอย่างหนึ่งน่ะครับ เรื่องช่วยทำให้โชคดีนั่น..."
10009000-66 = "ถ้างั้นก็กินช็อกโลแลตนั่นก่อนที่จะขูดลอตเตอรี่ที่ซื้อมาคราวที่แล้วได้น่ะสิ"
10009000-67 = "ระหว่างทางมาที่นี่ก็ลองขูดไปนิดหน่อยแล้ว ถึงจะดูเหมือนไม่มีโชคตั้งแต่เลขตัวแรกเลยก็เถอะ"
10009000-68 = "แต่ถ้ากินช็อกโกแลตเข้าไป ตัวเลขมันก็อาจจะเปลี่ยนไปก็ได้ใช่มั้ยล่ะ"
10009000-69 = "[s] \"เดี่ยวสิ เรื่องแบบนั้นเป็นไปไม่ได้สักหน่อย\""
10009000-70 = "หา? ใครน่ะ? ครูจากชาเล่ต์? มาลาดตระเวนเหรอ?"
10009000-71 = "ว่าไงนะ ห้ามก่อปัญหาในวันเทศกาลแบบนี้งั้นเหรอ?"
10009000-72 = "ฮึ่ยยย! รู้อยู่แล้วละน่าว่าไม่ถูกลอตเตอรี่น่ะ!"
10009000-73 = "แต่ถึงยังไงก็จะล้มเลิกความฝันและความหวังไปกลางคันไม่ได้...! "
10009000-75 = "คิดว่าจะยอมแพ้แค่นี้เรอะ!"

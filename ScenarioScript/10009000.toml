[translation]
10009000-1 = "#title;프롤로그;발렌타인 데이의 협력 업무"
10009000-2 = "#na;(발렌타인 데이를 앞둔 어느 날, 후부키와 키리노로부터 한 통의 연락이 도착했다.)"
10009000-3 = "#all;hide"
10009000-4 = "#place;샬레의 사무실"
10009000-5 = "#wait;500"
10009000-6 = "[ns] \"순찰 업무의 협조?\""
10009000-7 = "3;통신후부키;00;발렌타인 데이 시즌이 되면 D.U. 자치구 이곳저곳에서 대규모 이벤트가 열리거든.\n#3;a"
10009000-8 = "3;통신후부키;99;유명 파티셰를 초청해서 열리는 <맛있는 초콜릿케이크 만들기 이벤트>라거나, 키보토스 전역의 제각기 유명한 초콜릿 디저트를 모아서 전시하는 <발렌타인 데이 초콜릿 전시회>라거나."
10009000-9 = "5;통신키리노;00;아! 또 <초콜릿 많이 먹기 대회>라거나 즉석에서 만든 초콜릿을 가지고 벌이는 <스페셜 초콜릿 경주 대회>라는 것도 무척 인기 있었죠!\n#5;a\n#3;m1"
10009000-10 = "3;통신후부키;10;맞아. 특히나 <1년간 공들여 키워온 반려 초콜릿 경연 대회>를 빼놓을 수 없지. 응. 그건 볼 때마다 재밌다니깐.\n#3;em;[반응]"
10009000-11 = "[s] \"앞에 건 그렇다 쳐도 뒷부분은 대체 뭐야?\""
10009000-12 = "3;통신후부키;03;자자, 사소한 건 됐고.\n#3;em;[음표]\n#3;hophop"
10009000-13 = "3;통신후부키;00;이런 때엔 보통 행사장의 안전 관리도 우리 생활안전국이 맡게 되거든?"
10009000-14 = "5;통신키리노;01;올해 이벤트는 특히 예년보다 규모가 더 커진 덕에, 부족한 일손을 어떻게 할까 이야기를 하다 선생님께 부탁하자는 흐름이 되어서……."
10009000-15 = "3;통신후부키;02;어때? 선생? 도와주지 않을래? 어차피 선생이라면 발렌타인 데이에 특별히 일정도 없을 거 아냐?\n#3;em;[?]"
10009000-16 = "5;통신키리노;04;후, 후부키! 그런 말은 너무 실례가 되잖아요!\n#5;em;[땀]"
10009000-17 = "[s1] \"맞아! 실례구만! 나름대로 바쁘다고.\"\n[s2] \"특별한 일정이 없는 정도가 아니라, 완전 한가하거든?!\""
10009000-18 = "3;통신후부키;08;어라? 그래? 으음~\n#3;em;[?]"
10009000-19 = "3;통신후부키;02;그래도 귀여운 학생의 부탁이잖아~"
10009000-20 = "3;통신후부키;03;거절하는 건 너무 매정하지 않아? 끝나면 도넛 나눠줄 테니까~ 응?\n#3;em;[반응]"
10009000-21 = "[s3] \"도넛 때문이 아니더라도, 돕기야 돕겠지만.\""
10009000-22 = "3;통신후부키;10;아하핫. 선생의 그런 점, 좋아한다니까~\n#3;em;[음표]"
10009000-23 = "5;통신키리노;03;가, 감사합니다!\n#5;greeting\n#5;em;[반짝]"
10009000-24 = "5;통신키리노;07;서, 선생님?!\n#5;em;[?!]\n#5;shake"
10009000-25 = "3;통신후부키;02;저기……. 내가 먼저 말을 꺼낸 입장에서 이런 소리 하기도 좀 그렇지만."
10009000-26 = "3;통신후부키;00;그거 자랑의 부류에 들어가는 이야기야? 뭐, 도와준다면 완전 땡큐지만…….\n#3;em;[?]"
10009000-27 = "5;통신키리노;00;가, 감사합니다!\n#5;greeting\n#5;em;[반짝]"
10009000-28 = "[s] \"발렌타인 데이에도 두 사람 다 열심히구나. 굉장해.\""
10009000-29 = "3;통신후부키;02;뭐어, 이러니저러니 해도 발렌타인 데이잖아? 초콜릿을 주고받으면서 누구나 행복해지는 날."
10009000-30 = "3;통신후부키;99;그런 날, 사람들의 미소를 지키는 게 우리 발키리 경찰학교가 하는 일이니까."
10009000-31 = "5;통신키리노;06;후, 후부키……. 평소 그런 생각을 하고 있었다니……. 저, 저 감동했어요……!\n#5;em;[///]"
10009000-32 = "3;통신후부키;00;응, 열심히 노력하면 나중에 상인분들이 고생했다면서 팔다 남은 도넛을 싸게 제공해주거든."
10009000-33 = "3;통신후부키;03;응~ 발키리 경찰학교 학생이라 정말 다행이야. 그치?\n#3;em;[음표]\n#3;greeting"
10009000-34 = "5;통신키리노;04;후부키……."
10009000-35 = "3;통신후부키;10;아하핫."
10009000-36 = "3;통신후부키;00;어쨌거나 이번 발렌타인 데이의 순찰 협조. 잘 부탁해. 선생~\n#3;em;[반응]"
10009000-37 = "#all;hide"
10009000-38 = "#all;hide"
10009000-39 = "#video;10008"
10009000-40 = "#all;hide"
10009000-41 = "#wait;1000"
10009000-42 = "#na;(그렇게 후부키 그리고 키리노와 약속을 한 뒤, 찾아온 발렌타인 데이 당일.)"
10009000-43 = "#all;hide"
10009000-44 = "#place;D.U. 자치구 상점가 거리"
10009000-45 = "#wait;2000"
10009000-46 = "#na;(발렌타인 데이를 맞이한 상점가는 그야말로 수많은 인파로 붐비고 있었다.)"
10009000-47 = "1;상점 주인 시바;00;무려 스페셜 로제 초콜릿 세트가 20% 특별 할인 중!\n#1;em;[재잘]\n#1;hophop\n#1;a"
10009000-48 = "3;메이드카페 점장;00;달콤한 민트초코 한 입, 어떠신가요? 저희 가게에선 현재 <민트초코 쇼콜라 파르페>를 주문하시면, 또 한 잔을 드리는 이벤트를 진행 중! \n#3;em;[!]\n#3;a"
10009000-49 = "3;메이드카페 점장;00;친구, 연인, 동료, 존경하는 사람에게도 민트초코의 멋짐을 전달해보세요!\n#3;greeting"
10009000-50 = "5;동물 점원;00;해피 발렌타인 데이를 기념해! 오늘은 서비스! 서비스! 연인과 함께 당 점을 방문해주시면……!\n#5;hophop\n#5;em;[재잘]\n#5;a"
10009000-51 = "[s] \"정말 큰 축제구나…….\""
10009000-52 = "#na;(후끈 달아오른 축제의 열기를 피부로 느끼며, 그렇게 상점가를 걷고 있을 때였다.)"
10009000-53 = "#st;[0,0];instant;1;"
10009000-54 = "#clearST"
10009000-55 = "1;상점 주인 시바;00\n3;메이드카페 점장;00\n5;동물 점원;00\n#1;d\n#3;d\n#5;d\n#wait;1000"
10009000-56 = "#all;hide"
10009000-57 = "#wait;150"
10009000-58 = "#wait;1000"
10009000-59 = "4;헬멧단 B;00\n2;헬멧단 A;00\n#2;a\n#4;a\n#2;h\n#4;h\n#wait;1000"
10009000-60 = "#wait;1000"
10009000-61 = "4;헬멧단 B;00\n2;헬멧단 A;00;어이어이, 소문을 들었다고.\n#2;em;[반응]"
10009000-62 = "2;헬멧단 A;00;여기에서 행운 초콜릿을 팔고 있는 게 사실이렷다?"
10009000-63 = "1;상점 주인 시바;00;앗, 네. 저희 가게에서는 네잎클로버 모양의 행운 초콜릿을 팔고 있답니다. 하나 드릴까요?\n#1;em;[반응]\n#1;ar\n#2;m3\n#4;m5"
10009000-64 = "4;헬멧단 B;00;어이어이, 그거. 먹으면 정말로 행운 수치가 올라가는 거 맞지?\n#4;em;[?]"
10009000-65 = "1;상점 주인 시바;00;네? 아니, 행운 초콜릿이라는 건 어디까지나 형태의 이야기고, 마케팅의 일환이랄까. 그보다 정말로 행운 수치가 올라갈지는…….\n#1;stiff\n#1;em;[땀]"
10009000-66 = "2;헬멧단 A;00;저번에 산 복권을 긁기 전에 먼저 그것부터 먹어보잔 이야기가 나와서 말이지!\n#2;em;[재잘]\n#2;hophop"
10009000-67 = "4;헬멧단 B;00;이미 여기 오는 길에 살짝 긁어봤을 땐, 첫 번째 번호부터 빗나간 상황이었지만."
10009000-68 = "2;헬멧단 A;00;초콜릿을 먹고 나면 번호가 바뀔지도 모르잖아?\n#2;em;[?]"
10009000-69 = "[s] \"아니아니, 일어날 리가 없지. 그런 일.\""
10009000-70 = "2;헬멧단 A;00;앙? 넌 또 뭐야? 샬레의 선생? 순찰?\n#2;em;[반응]\n#2;m2\n#4;m4\n#1;dl"
10009000-71 = "2;헬멧단 A;00;이런 날에 문제를 일으키지 말라고?"
10009000-72 = "4;헬멧단 B;00;에이잇! 복권이 빗나간 것쯤은 이미 알고 있어!\n#4;em;[빠직]\n#4;stiff"
10009000-73 = "4;헬멧단 B;00;그럼에도 부푼 꿈을 포기할 수 없는 우리의 갈 곳 잃은 기대감을……!"
10009000-74 = "#all;hide"
10009000-75 = "3;헬멧단 A;00;이대로 포기할까 보냐앗!\n#3;closeup\n#3;hophop\n#fontsize;80"

[translation]
10009000-1 = "序幕;情人節的工作"
10009000-2 = "（情人節將近的某一天，收到了來自吹雪和桐乃的訊息）"
10009000-4 = "夏萊．辦公室"
10009000-6 = "[ns]「『關於巡邏業務的協助請求』……？」"
10009000-7 = "每當到了情人節前後，D.U.到處都會舉辦大規模的活動對吧。"
10009000-8 = "像是邀請知名甜點師舉辦的「巧克力蛋糕競賽」、#n聚集奇普托斯各地著名巧克力加以展示的「情人節巧克力展覽」之類的。"
10009000-9 = "還有「巧克力大胃王比賽」，#n以及用現場融化的巧克力進行的「巧克力設計競賽」都非常受歡迎唷！"
10009000-10 = "此外，「寵物巧克力大賽」更是不能錯過。#n花費一整年培育的巧克力們一字排開的場面非常有魄力呀。"
10009000-11 = "[s]「最後的那個完全無法想像……」"
10009000-12 = "先不說那些了。"
10009000-13 = "這種活動的警備都是由我們生活安全局負責。"
10009000-14 = "但是今年活動的規模比往年盛大……#n就在想到平時就已經人手不足，這下該怎麼辦的時候，我們想起了老師。"
10009000-15 = "所以老師，可以請你幫忙嗎？#n反正老師情人節的時候也沒有行程吧？"
10009000-16 = "吹雪！？"
10009000-17 = "[s1]「雖然還不確定，但也許會很忙……」\n[s2]「嗯，根本閒到不行！！」"
10009000-18 = "咦，是嗎？"
10009000-19 = "哎呀哎呀，可愛的學生這～樣拜託你了。"
10009000-20 = "你應該不會拒絕吧？結束會請你吃甜甜圈的啦～"
10009000-21 = "[s3]「說是這麼說，當然還是會幫忙唷。就算沒有甜甜圈也一樣。」"
10009000-22 = "啊哈，我就喜歡老師這一點～"
10009000-23 = "非，非常感謝！"
10009000-24 = "老師！？"
10009000-25 = "哎呀，雖然我自己剛才那麼說……"
10009000-26 = "老師那自信滿滿的樣子是怎麼回事……？#n雖然老師願意幫忙我很感激就是了……"
10009000-27 = "總，總之非常感謝！老師！"
10009000-28 = "[s]「既然你們兩個都這麼努力，我也想多少幫點忙。」"
10009000-29 = "再怎麼說也是難得的情人節嘛。是個互相贈送巧克力，讓大家都感到幸福的節日。"
10009000-30 = "守護那份笑容，是我們女武神該做的。"
10009000-31 = "吹雪……！你居然有如此令人敬佩的想法，我好感動……！"
10009000-32 = "重點是只要當天有努力，之後業者們就會送來一大堆賣剩的甜甜圈了！"
10009000-33 = "嗯～能當女武神警察學園的學生真是太好了～"
10009000-34 = "吹雪……"
10009000-35 = "呵呵。總之，情人節當天再見啦。"
10009000-36 = "老師請多指教～"
10009000-42 = "（與吹雪和桐乃約好之後，就這麼到了情人節當天……）"
10009000-44 = "D.U.．商店街"
10009000-46 = "（情人節的商店街簡直是人山人海）"
10009000-47 = "玫瑰巧克力組合八折優惠中！"
10009000-48 = "要不要來點薄荷巧克力呀？#n本店正在進行點一份「薄荷巧克力百匯」就再免費贈送一份的活動！"
10009000-49 = "請把薄荷巧克力的美妙傳達給朋友、戀人、夥伴和尊敬的對象吧！"
10009000-50 = "情人節快樂！只要和另一半一起蒞臨本店……！！"
10009000-51 = "[s]「真熱鬧……」"
10009000-52 = "（就在一邊感受著慶典熱烈的氣氛，一邊觀察周圍時……）"
10009000-61 = "嘿，我聽說啊。"
10009000-62 = "這裡有賣「幸運的巧克力」是真的嗎？"
10009000-63 = "啊，是的！我想應該是指本店販售的四葉幸運草造型的幸運巧克力。#n要不要買一份呀？"
10009000-64 = "嘿～也就是說，吃了之後「真的」會變幸運吧？"
10009000-65 = "呃，啊，這個……所謂的幸運巧克力只是名字而已。#n就算您問是不是「真的」也……"
10009000-66 = "我剛剛買了彩券，想說來都來了要不要先吃這個巧克力再來對獎。"
10009000-67 = "雖然從第一個號碼來看，每個中獎號碼都不會中就是了。"
10009000-68 = "搞不好吃了這裡的巧克力就會有所改變哦？畢竟是「幸運的巧克力」嘛！？"
10009000-69 = "[s]「不不不……」"
10009000-70 = "……啊，你是誰啊？"
10009000-71 = "……夏萊的老師？正在巡邏？"
10009000-72 = "囉嗦，別把我當笨蛋！我也知道彩券沒中！"
10009000-73 = "但是不能放棄夢想吧！？"
10009000-75 = "就是啊！不能就這樣結束！"

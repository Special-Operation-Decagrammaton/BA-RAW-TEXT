[translation]
10020040-5 = "It's not like the other battles. The other Shiroko hasn't made an appearance."
10020040-6 = "Do you think she gave up?"
10020040-7 = "I don't know, but... Don't let your guard down!"
10020040-9 = "Good news! Utnapishtim's Ship is nearly repaired."
10020040-10 = "Really?! That's good news! Great work, everyone!"
10020040-11 = "Whew! That's a relief. If I'm being honest, I was a bit worried."
10020040-15 = "Yup. We finished it faster than we expected thanks to the Ark's computational device."
10020040-16 = "That's right! It has some amazing features, this!"
10020040-17 = "So just to confirm... If we destroy the Area 4 Dimension Engine, we can activate the Ark's Self-Destruct Sequence."
10020040-18 = "We'll have a countdown that will give us just enough time to reactivate the Utnapishtim and escape."
10020040-19 = "Timing is everything, so stay sharp."
10020040-20 = "Good luck!"
10020040-25 = "That's a relief, Rio. It looks like we won't have to use that Escape Mechanism of yours after all."
10020040-26 = "...Ahh."
10020040-41 = "We're right in front of the Special Area control room, and we've engaged in battle!"
10020040-42 = "Oh my, how persistent!"
10020040-43 = "The defenses are tough, but destroying this place is only a matter of time!"
10020040-44 = "Just keep on coming!"
10020040-45 = "We'll contact you the moment we destroy the control room, Sensei!"

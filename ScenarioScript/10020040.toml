[translation]
10020040-5 = "ไม่เห็นคุณชิโรโกะคนนั้น... เหมือนกับการต่อสู้ครั้งที่ผ่านๆ มาเลยนะคะ"
10020040-6 = "นั่นน่ะสิ หรือว่ายอมแพ้ไปแล้วนะ?"
10020040-7 = "ฉะ...ฉันก็ไม่แน่ใจค่ะ... แต่ว่าตอนนี้เราจะประมาทไม่ได้เด็ดขาดค่ะ!"
10020040-9 = "อ่า... มีข่าวดีละ อีกไม่นานก็จะซ่อม <เรือรบอุตนาพิชทิม> เสร็จแล้ว"
10020040-10 = "งะ...งั้นเหรอคะ?! ข่าวดีจริงๆ ด้วยค่ะ! ทุกคนทำได้ดีมากเลยค่ะ!!"
10020040-11 = "เฮ้อ... อันที่จริงฉันก็กังวลอยู่เหมือนกัน แต่ก็ดีแล้วแหละนะ!"
10020040-15 = "อื้อ พอใช้อุปกรณ์ประมวลผลของเรือเข้ามาช่วย ก็ซ่อมเสร็จได้เร็วกว่าที่คิดน่ะ"
10020040-16 = "อย่างนี้นี่เองเหรอคะ! เจ้านี่น่ะมีประสิทธิภาพสุดยอดไปเลยนะคะ!"
10020040-17 = "ถ้างั้นตอนนี้ถ้าทำลาย <เครื่องทะลุมิติ> ของพื้นที่ 4 เราก็จะเปิดใช้งาน <วงจรระเบิดตัวเอง> ของเราได้แล้ว"
10020040-18 = "ก่อนที่ระเบิดจะทำงาน มันจะยังพอมีเวลาอยู่นิดหน่อย พวกเราก็ใช้ช่วงเวลานั้นเดินเครื่องเรือรบ#nอุตนาพิชทิม และหนีออกมาก็พอแล้ว"
10020040-19 = "ตั้งแต่นี้ไปคือการต่อสู้กับเวลาแล้ว ตั้งสติกันไว้ให้ดีๆ ล่ะ"
10020040-20 = "ถ้างั้น... ขอให้โชคดีกันนะ"
10020040-25 = "ค่อยยังชั่วหน่อยนะคะริโอะ แบบนี้คงไม่ถึงกับต้องใช้ <อุปกรณ์หลบหนี> ของคุณแล้วละค่ะ"
10020040-26 = "... อืม"
10020040-41 = "พวกเรามาถึงตรงหน้าของ <พื้นที่พิเศษ> และตอนนี้กำลังเข้าปะทะกับศัตรูแล้วค่ะ!"
10020040-42 = "โธ่เอ๊ย ไม่เข็ด ไม่หลาบ ไม่จำกันบ้างเลย!!"
10020040-43 = "ถึงจะป้องกันอย่างแน่นหนายังไง แต่ที่นี่จะถูกทำลายเมื่อไรก็ขึ้นอยู่กับเวลาค่ะ!"
10020040-44 = "เอ้า แน่จริงก็แห่กันเข้ามาเลยสิ"
10020040-45 = "ถ้าทำลายห้องควบคุมได้สำเร็จแล้วจะติดต่อไปนะคะ! คุณครู!"

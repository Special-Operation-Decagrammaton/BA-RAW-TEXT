[translation]
10020040-5 = "……這次沒看見「那位」白子同學呢。"
10020040-6 = "就是啊。難道他放棄了嗎？"
10020040-7 = "這點不太清楚……不，不過不能掉以輕心！"
10020040-9 = "話說回來，告訴大家一個好消息。#n船的修復作業……似乎很快就能完成了。"
10020040-10 = "是，是嗎……！非常感謝！真是辛苦各位了！！"
10020040-11 = "哎呀～老實說我本來還很擔心呢……太好了太好了。"
10020040-15 = "嗯。多虧駭入得來的方舟演算裝置，完成速度比想像中還快。"
10020040-16 = "沒錯！這個演算裝置的性能真的非常驚人！"
10020040-17 = "接下來……只要破壞第4區域的「次元引擎」，#n應該就能啟動方舟的「自爆程式」才對。"
10020040-18 = "我想在自爆前還會有一些時間，只要在這段期間內重啟生命守護者逃出去就行了。"
10020040-19 = "接下來的時機將會非常重要。繃緊神經吧。"
10020040-20 = "那麼，祝各位武運昌隆。"
10020040-25 = "該說是不幸中的大幸嗎……莉央，你提出的「逃脫裝置」似乎派不上用場了呢。"
10020040-26 = "……似乎是呢。"
10020040-41 = "我們正在「特別區域」的控制室前方戰鬥！"
10020040-42 = "真受不了，煩死人了！"
10020040-43 = "對方雖然還在抵抗，不過完成破壞只是時間的問題！"
10020040-44 = "喂喂，這種程度可是阻擋不了我們的唷～？"
10020040-45 = "一旦成功破壞控制室，會再連絡各位！"

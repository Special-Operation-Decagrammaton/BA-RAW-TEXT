[translation]
10014020-1 = "Episode 2; At Least One or Two"
10014020-2 = "Here's the school gate. I'll be safe now."
10014020-3 = "Our Apostle of Justice wouldn't cause a scene at school."
10014020-4 = "Um..."
10014020-5 = "I didn't intend this, but it's kind of like you escorted me here."
10014020-6 = "I'm sorry for the inconvenience."
10014020-7 = "And...thank you for your help."
10014020-8 = "[s1] \"...You're friendly yet polite, Kazusa.\"\n[s2] \"You separate business and private matters well.\""
10014020-9 = "H-Huh? R-Really?"
10014020-10 = "H-Huh? Separate...? R-Really?"
10014020-11 = "I mean, this is how I should speak to a teacher, right?"
10014020-12 = "Anyway, thanks again for your time. Let's meet up later."
10014020-13 = "Hm?"
10014020-14 = "What about my past? Why would I feel any type of way about telling you?"
10014020-15 = "Oh, the thugs?"
10014020-16 = "You're wondering if I wanted to hide my past with them...?"
10014020-20 = "Oh... I get it."
10014020-21 = "I mean, it's not like I go around bragging about it."
10014020-22 = "But it's the truth, and I can't change that."
10014020-23 = "I wouldn't go so far as to hide it but...it sucks having to remember it."
10014020-24 = "The whole thing is annoying...like Reisa."
10014020-25 = "I wish she would just try to see things from my side, but she really hasn't changed one bit."
10014020-26 = "We're in high school now... Why can't we just move on?"
10014020-27 = "I hope she grows up soon. Otherwise she's just gonna be a child for the rest of her life."
10014020-28 = "It's like she thinks we're still kids playing around in middle school. She can't forget it."
10014020-29 = "I just don't get why though, you know? I'm really trying to move on and start over."
10014020-30 = "[s] \"...\""
10014020-31 = "...?"
10014020-32 = "What? Did I say something wrong?"
10014020-33 = "Huh?"
10014020-34 = "Why I quit being a thug?"
10014020-35 = "Um... That's..."
10014020-36 = "Wh-Why do you want to know? I just... I did, you know?"
10014020-37 = "Being a thug is...just..."
10014020-47 = "Why's it even matter?! Is it weird that I wanted to quit?!"
10014020-48 = "Everyone has some stuff in their past they want to leave behind."
10014020-49 = "People can be spies, bank robbers, agents disguised as maids, or even self-proclaimed ninjas..."
10014020-50 = "They choose to be all kinds of different things. I wanted to, too."
10014020-51 = "[s3] \"Oh, I see what you're saying.\"\n[s4] \"...I guess you have a point.\""
10014020-52 = "Exactly. I'm just one ordinary case among countless others."
10014020-53 = "Exactly. I'm just an ordinary case among countless others."
10014020-54 = "Everyone matures when they have to. So no more questions about the past!"
10014020-55 = "It's kind of...embarrassing, you know?"
10014020-59 = "Oh! The bell."
10014020-60 = "I can't be late, Sensei. I'll see you later."
10014020-61 = "Thanks for your help today. I feel a lot better already."
10014020-62 = "Seriously, thanks."
10014020-63 = "Well...until next time."
10014020-67 = "......"
10014020-68 = "[ns] \"...The Vigilante Crew.\""
10014020-76 = "Ah, Sensei. You're here."
10014020-81 = "I was surprised when you contacted me out of nowhere."
10014020-82 = "Oh, no. It was no burden at all. I'm honored you needed help from me."
10014020-83 = "I owe you a lot."
10014020-84 = "I can't make any promises, but I'll do my best to help you."
10014020-85 = "Huh? Oh, I don't have class right now."
10014020-86 = "Our schedules are all different depending on grade and class."
10014020-87 = "So, what did you want to ask me about?"
10014020-88 = "A Vigilante Crew member? Oh. That's why you needed me."
10014020-89 = "I'll do my best, but the Vigilante Crew isn't an official organization."
10014020-90 = "We voluntarily patrol and work to protect the neighborhood, so there's no type of screening process."
10014020-91 = "There's not a lot known between members about our pasts, motives, or current situations."
10014020-92 = "Huh?"
10014020-93 = "Uzawa Reisa?"
10014020-94 = "[s5] \"I think I've seen you two together.\" \n[s6] \"You know Reisa, right?\""
10014020-95 = "Ah. So, it's Reisa again."
10014020-96 = "Ah. So, it's Reisa again."
10014020-97 = "I'm sorry if she caused any trouble. I hope it wasn't serious."
10014020-98 = "[s7] \"Wait, did you say 'again'...?\"\n[s8] \"Why do you immediately assume trouble?\""
10014020-99 = "She's not a bad person. She means well and is kind to a fault."
10014020-100 = "She's not a bad person. She means well and is kind to a fault."
10014020-101 = "...But overeagerness can be both a blessing and a curse."
10014020-102 = "I am surprised, though. I would think Reisa would at least be careful around you."
10014020-103 = "Oh? It's not you she's troubling?"
10014020-104 = "I'd be able to help better if I had a grasp of the situation. I don't need all the details, just the gist of it."
10014020-105 = "[ns] Explain the current situation."
10014020-108 = "...I get it."
10014020-109 = "That sounds like Reisa, unfortunately. She's nothing if not persistent."
10014020-110 = "This has given me a lot of insight, though. I thought I knew those thugs pretty well."
10014020-111 = "But I guess my view of the world was too narrow. They're students, just like us."
10014020-112 = "...But back to the topic. She quit being a thug. Why is Reisa still challenging her?"
10014020-113 = "She really has no reason to challenge this ex-thug so...is it just competitiveness? I feel there's something more to this."
10014020-114 = "Well, no reason to wonder. Let's ask her directly."
10014020-115 = "I have Reisa's contact number. If I say you're looking for her, she'll come right away."
10014020-116 = "As you well know, she's an act first, think later type."
10014020-117 = "Let me message her right now..."
10014020-121 = "Oh, who's this text from?"
10014020-122 = "...From Reisa?"
10014020-123 = "[s9] \"Did Reisa contact you first?\"\n[s10] \"What's going on?\""
10014020-124 = "Uhhh..."
10014020-125 = "Uhhh..."
10014020-126 = "...It's a request for backup."

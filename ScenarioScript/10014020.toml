[translation]
10014020-1 = "ตอนที่ 2;ไม่ว่าใครก็ต้องมี"
10014020-2 = "ใกล้ถึงแล้ว ผ่านตรงนี้ไปก็จะถึงประตูโรงเรียนแล้ว น่าจะสบายใจได้แล้วละ"
10014020-3 = "ถึงจะเป็นยัยนั่นก็เถอะ แต่คงจะเที่ยวไปก่อความวุ่นวายในโรงเรียนง่ายๆ ไม่ได้หรอก..."
10014020-4 = "อืม..."
10014020-5 = "แบบนี้มันเหมือนกับว่าคุณครูเดินมาส่งฉันเลยนะ ถึงจะไม่ได้ตั้งใจก็เถอะ"
10014020-6 = "...ขอโทษที่ทำให้ต้องวุ่นวายนะคะ"
10014020-7 = "แล้วก็ ขอบคุณที่ช่วยนะคะ"
10014020-8 = "[s1] \"...คาซึสะเนี่ยเป็นเด็กดีจังเลยนะ\"\n[s2] \"เป็นคนที่แยกแยะเก่งจริงๆ นะ\""
10014020-9 = "หืม...? เด็กดี? งะ...งั้นเหรอ?"
10014020-10 = "หืม...? แยกแยะ? งะ...งั้นเหรอ?"
10014020-11 = "พออยู่ต่อหน้าคุณครู ก็เลยเป็นแบบนั้นไปตามธรรมชาติน่ะ...?"
10014020-12 = "จะยังไงก็เถอะ เอาเป็นว่าวันนี้ปรึกษาแค่นี้พอ ไว้ถ้ามีเวลาแล้วฉันจะไปหาอีกนะ"
10014020-13 = "หืม...?"
10014020-14 = "ถึงจะเพิ่งมาพูดตอนนี้ ถามว่าฉันเล่าเรื่องในอดีตให้ฟังจะไม่เป็นไรงั้นเหรอ? ...พูดอะไรกันน่ะ?"
10014020-15 = "...เรื่องแยงกี้สาวเหรอ?"
10014020-16 = "…ไม่ใช่ 'อดีตที่ซ่อนเร้น' อย่างนั้นเหรอ?"
10014020-20 = "อ่า หมายถึงอย่างนั้นสินะ ฉันก็นึกว่าอะไร..."
10014020-21 = "แน่นอนว่ามันไม่ใช่เรื่องที่จะเที่ยวไปพูดได้อย่างภูมิใจ..."
10014020-22 = "แต่ถึงจะไม่ชอบก็ช่วยไม่ได้นะ ความจริงก็คือความจริง"
10014020-23 = "ไม่ใช่ว่าฉันจะปิดบังมันไว้หรอก จะว่ายังไงดี... ก็แค่ไม่ชอบและอยากจะลืมๆ ไป ประมาณนั้นน่ะ"
10014020-24 = "มันมีแต่จะทำให้เหนื่อยเปล่าๆ ... เหมือนอย่างเรื่องยัยอุซาวะนั่นน่ะ"
10014020-25 = "...หวังว่ายัยนั่นจะหยุดสักที ทำไมถึงได้โตแต่ตัว แต่นิสัยดันไม่เปลี่ยนไปเลยกันนะ"
10014020-26 = "ตอนนี้พวกเราก็เป็นเด็กม.ปลายกันแล้ว เราจะทำตัวเป็นเด็กไปตลอดไม่ได้นี่นา..."
10014020-27 = "ถ้าเปลี่ยนไปจากตอนม.ต้นก็คงดีไม่น้อยเลย ต้องหยุดทำตัวเหมือนเมื่อก่อนได้แล้ว..."
10014020-28 = "...พอขึ้นม.ปลายแล้วก็ควรจะลืมภาพลักษณ์ในอดีตไปได้แล้วสิ?"
10014020-29 = "ถ้าต่างฝ่ายต่างลืมๆ ไปก็คงจะดีกว่า ใช่มั้ยล่ะ? ฉันไม่รู้เลยว่าทำไมต้องทำถึงขั้นนั้นด้วย"
10014020-30 = "[s] \"...\""
10014020-31 = "...???"
10014020-32 = "อืม? ...ทำไมเป็นแบบนั้นล่ะ?"
10014020-33 = "ว่าไงนะ...?"
10014020-34 = "ยังมีคนอื่นที่เลิกเป็นแยงกี้อีกรึเปล่าน่ะเหรอ...?"
10014020-35 = "เอ่อ... คือว่า..."
10014020-36 = "ทะ... ทำไมอยู่ดีๆ ก็ถามล่ะ...? เรื่องนั้น... คือ... ว่า..."
10014020-37 = "ว่าแล้วเชียวแยงกี้น่ะ... เรื่องนั้นน่ะ..."
10014020-47 = "ทะ... ทำไมจู่ๆ ก็ถามเรื่องนั้นล่ะ!? มันไม่ใช่เรื่องแปลกในสมัยนี้แล้วไม่ใช่เหรอ?"
10014020-48 = "ไม่ว่าใครก็ต้องมีอดีตที่ไม่อยากพูดถึงกันอยู่เรื่องสองเรื่องทั้งนั้น... และบางคนก็อยากจะเริ่มต้นใหม่"
10014020-49 = "อย่างคนที่อาจจะเป็นสปาย เคยปล้นธนาคาร เป็นเอเจ้นท์ที่ปลอมตัวเป็นเมดหรือพวกที่เรียกตัวเอง#nว่านินจา..."
10014020-50 = "คนแบบนั้นก็น่าจะมีอยู่เยอะเลยไม่ใช่เหรอ? ...ใช่มั้ยล่ะ? น่าจะมีอยู่ใช่มั้ย?"
10014020-51 = "[s3] \"อ่า ก็ฟังดูเป็นแบบนั้นอยู่หรอกนะ...\"\n[s4] \"...ปฏิเสธไม่ได้อย่างน่าแปลกใจเลยละ\""
10014020-52 = "เห็นไหม ไม่ต่างอะไรกับฉันเลยใช่มั้ยล่ะ? ก็เป็นแค่หนึ่งในเรื่องแบบนั้นเท่านั้นเอง"
10014020-53 = "เห็นไหม ไม่ต่างอะไรกับฉันเลยใช่มั้ยล่ะ? ก็เป็นแค่หนึ่งในเรื่องแบบนั้นเท่านั้นเอง"
10014020-54 = "พอถึงเวลาก็จะรู้ตัวแล้วเป็นผู้ใหญ่ขึ้นเอง เพราะงั้นเลิกถามเรื่องตอนนั้นเถอะ ฉันอายน่ะ"
10014020-55 = "ใช่... เรื่องแบบนั้นมันน่าอายออกนะ"
10014020-59 = "อ๊ะ เวลาผ่านมาขนาดนี้แล้ว..."
10014020-60 = "อยู่ต่อหน้าคุณครูแบบนี้เข้าเรียนสายก็คงไม่ดี ฉันไปก่อนนะ ไว้เจอกันใหม่นะ คุณครู"
10014020-61 = "วันนี้ขอบคุณมากเลยนะ คุณครู ตอนนี้รู้สึกดีขึ้นแล้วละ"
10014020-62 = "...ขอบคุณมากเลยนะคะ"
10014020-63 = "ถ้างั้น...ขอตัวนะ"
10014020-67 = "(...)"
10014020-68 = "[ns] \"...กลุ่มรักษาความสงบเหรอ\""
10014020-76 = "อ่า... คุณครู ทางนี้ค่ะ"
10014020-81 = "กำลังรออยู่เลยค่ะ คุณครู ได้ยินว่ามีเรื่องที่อยากถามอย่างนั้นเหรอคะ?"
10014020-82 = "มะ... ไม่ค่ะ ไม่ใช่ภาระเลยค่ะ เป็นทางฉันต่างหากล่ะคะที่ต้องขอบคุณ"
10014020-83 = "ฉันเป็นฝ่ายรบกวนคุณครูตลอดเลย..."
10014020-84 = "ถึงจะยังไม่รู้ว่าเรื่องอะไร แต่ถ้าเป็นเรื่องที่ช่วยได้ ฉันจะช่วยอย่างเต็มที่เลยค่ะ"
10014020-85 = "คะ? คาบเรียนเหรอคะ? อ่า ไม่เป็นไรหรอกค่ะ ตอนนี้ไม่มีคาบเรียนแล้วน่ะค่ะ"
10014020-86 = "นักเรียนแต่ละชั้นปีและแต่ละห้องจะมีตารางเรียนต่างกันค่ะ แต่ก็ขอบคุณนะคะที่ถาม"
10014020-87 = "ว่าแต่คุณครูอยากถามเรื่องอะไรเหรอคะ..."
10014020-88 = "...คะ? เกี่ยวกับสมาชิกของกลุ่มรักษาความสงบเหรอคะ? หรือว่า... อย่างนั้นสินะคะ เพราะงั้นก็เลย..."
10014020-89 = "อืม... ฉันก็ไม่แน่ใจว่าจะช่วยได้มั้ย... ความจริงแล้วกลุ่มรักษาความสงบไม่ใช่องค์กรซะทีเดียวน่ะค่ะ"
10014020-90 = "ตามชื่อก็คือ 'กลุ่มรักษาความสงบ' ค่ะ สมาชิกแต่ละคนสมัครใจที่จะช่วยรักษาความปลอดภัย#nบริเวณใกล้ๆ แถวที่อยู่ของตัวเองค่ะ"
10014020-91 = "ฉันเองก็ไม่ค่อยรู้เหมือนกันค่ะว่ามีใครเป็นสมาชิกบ้าง และทำอะไรอยู่ที่ไหนกันบ้าง..."
10014020-92 = "คะ..?"
10014020-93 = "คุณ...อุซาวะ เรอิสะ...เหรอคะ?"
10014020-94 = "[s5] \"ตอนนั้นเคยเห็นอยู่ด้วยกันน่ะ\"\n[s6] \"สึซึมิก็รู้จักกับเรอิสะใช่ไหม?\""
10014020-95 = "...อืม อย่างนี้นี่เอง คุณเรอิสะอีกแล้วเหรอคะ..."
10014020-96 = "...อืม อย่างนี้นี่เอง คุณเรอิสะอีกแล้วเหรอคะ..."
10014020-97 = "ดูท่าจะไปก่อเรื่องมาสินะคะ หวังว่าจะไม่ได้ไปก่อเรื่องร้ายแรงไว้นะคะ..."
10014020-98 = "[s7] \"เดี๋ยวนะ เมื่อกี้พูดว่า 'อีกแล้ว' งั้นเหรอ...\"\n[s8] \"นึกถึงการ 'ก่อเรื่อง' ออกเป็นอย่างแรกเลยสินะ\""
10014020-99 = "เธอไม่ใช่คนเลวร้ายเสียทีเดียวหรอกค่ะ พูดตามตรงเลยก็คือ เธอนิสัยดีและจิตใจดีค่ะ"
10014020-100 = "เธอไม่ใช่คนเลวร้ายเสียทีเดียวหรอกค่ะ พูดตามตรงเลยก็คือ เธอนิสัยดีและจิตใจดีค่ะ"
10014020-101 = "และแน่นอนว่าเป็นคนที่มีพลังเหลือล้นจนไม่สามารถควบคุมได้ ทำให้บางทีก็เข้ากับคนอื่นไม่ได้ค่ะ..."
10014020-102 = "แต่ก็ผิดคาดนะคะ ฉันคิดว่าคุณเรอิสะไม่น่าจะทำอะไรที่ทำให้คุณครูเดือดร้อนซะอีก..."
10014020-103 = "คะ...? เป็นเรื่องที่เกี่ยวกับคนอื่นงั้นเหรอคะ?"
10014020-104 = "อย่างนั้นเหรอคะ... ถ้าอย่างนั้นช่วยเล่าสถานการณ์ให้ฟังหน่อยได้มั้ยคะ? ไม่ต้องเปิดเผยข้อมูล#nส่วนตัวของคนคนนั้นก็ได้ค่ะ..."
10014020-105 = "[ns] อธิบายสถานการณ์ในตอนนี้ให้ฟัง"
10014020-108 = "เป็นแบบนี้เองเหรอคะ... เข้าใจแล้วค่ะ"
10014020-109 = "สมกับที่เป็นคุณเรอิสะจริงๆ ด้วยค่ะ คนคนนั้นก็คงลำบากไม่น้อยสินะคะ"
10014020-110 = "น่าตกใจมากเหมือนกันนะคะ ฉันคิดว่าตัวเองรู้เรื่องเกี่ยวกับแยงกี้สาวเยอะแล้วซะอีก..."
10014020-111 = "ไม่คิดเลยว่าจะมี 'โลกของพวกเธอ' อยู่แบบนั้น โลกนี้กว้างใหญ่จริงๆ เลยนะคะ"
10014020-112 = "...แต่ว่าคนคนนั้นก็เลิกเป็นแยงกี้สาวแล้วไม่ใช่เหรอคะ แล้วทำไมคุณเรอิสะถึงยังตามท้าอยู่อีก?"
10014020-113 = "อยากจะสู้กับคนที่เลิกเป็นแยงกี้สาวไปแล้วแบบนั้น... มีเหตุผลอะไรรึเปล่าคะ? หรือว่าจะเป็นความ#nอยากเอาชนะ?"
10014020-114 = "เรื่องนี้ถ้าไปถามคุณเรอิสะกับตัวเลยน่าจะดีกว่านะคะ"
10014020-115 = "ฉันมีช่องทางติดต่อของคุณเรอิสะอยู่แล้ว ถ้าบอกไปว่าคุณครูเรียกก็คงจะรีบมาทันทีเลยค่ะ"
10014020-116 = "อย่างที่ฉันบอกไปว่าเธอเป็นคนดีค่ะ"
10014020-117 = "ถ้าอย่างนั้นฉันติดต่อไปเลยนะคะ..."
10014020-121 = "หืม...? มีการติดต่อเข้ามาค่ะ"
10014020-122 = "คุณเรอิสะ...?"
10014020-123 = "[s9] \"เรอิสะติดต่อมาก่อนงั้นเหรอ?\"\n[s10] \"มีเรื่องอะไรหรือเปล่า?\""
10014020-124 = "เอ่อ..."
10014020-125 = "เอ่อ..."
10014020-126 = "เรื่องขอกำลังสนับสนุนค่ะ..."

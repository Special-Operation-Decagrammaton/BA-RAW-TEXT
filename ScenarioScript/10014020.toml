10014020-1 = "#title;제2화;누구나 한두 개쯤은"
10014020-2 = "3;카즈사;01;슬슬 도착이네. 저기 지나면 이제 교문이니까, 여기까지 오면 안심이야.\n#3;em;[반응]\n#3;a"
10014020-3 = "3;카즈사;02;아무리 녀석이라도 교내에서는 소란 피우기 어렵겠지……."
10014020-4 = "3;카즈사;99;음……."
10014020-5 = "3;카즈사;04;뭔가 의도치는 않았지만, 선생님이 날 에스코트해 준 것처럼 돼 버렸네."
10014020-6 = "3;카즈사;01;……민폐 끼쳐서 죄송합니다.\n#3;em;[속상함]"
10014020-7 = "3;카즈사;99;그리고, 도와주셔서 감사합니다.\n#3;greeting"
10014020-8 = "[s1] \"……친근하듯 예의 바르네, 카즈사는.\"\n[s2] \"뭔가 태도를 잘 구분하는 느낌이네.\""
10014020-9 = "3;카즈사;04;으, 응? 구분? 그, 그런가?\n#3;em;[땀]\n#3;stiff"
10014020-10 = "3;카즈사;04;으, 응? 구분? 그, 그런가?\n#3;em;[땀]\n#3;stiff"
10014020-11 = "3;카즈사;01;그야 앞에 있는 게 선생님이니까, 자연스레 선생님으로 대한 것뿐인데……?"
10014020-12 = "3;카즈사;02;아무튼 뭐, 이번 상담은 여기까지 하고. 나중에 다시 시간 내서 찾아갈게."

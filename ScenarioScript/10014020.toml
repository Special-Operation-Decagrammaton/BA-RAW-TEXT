10014020-34 = "3;카즈사;02;혹시 스케반을 그만두게 된 다른 계기라도 있냐고……?"
10014020-35 = "3;카즈사;01;어……. 그건……."
10014020-36 = "3;카즈사;02;그, 그건 갑자기 왜……? 그거야……. 그……. 음…….\n#3;em;[///]\n#3;stiff"

10014020-20 = "3;카즈사;99;아아. 그런 뜻이었구나. 난 또 뭐라고……."
10014020-21 = "3;카즈사;01;확실히 딱히 떠벌리고 다닐 건 아니긴 하지만……."
10014020-22 = "3;카즈사;02;싫어도 어쩔 수 없잖아. 사실은 사실인걸."
10014020-23 = "3;카즈사;06;숨긴다기보다, 뭐랄까……. 그냥 싫달까. 잊어버렸으면 좋겠달까. 그런 일인 거지.\n#3;em;[속상함]"
10014020-24 = "3;카즈사;06;피곤하기만 할 뿐이고……. 마치 우자와 녀석처럼 말이지."
10014020-25 = "3;카즈사;99;……녀석도 그만 그걸 알았으면 좋으련만. 어떻게 이 나이 먹도록 변한 게 하나도 없냐.\n#3;em;[땀]\n#3;stiff"
10014020-26 = "3;카즈사;01;우리도 이제 고등학생이잖아. 언제까지 철부지처럼 굴 수는 없는 건데……."
10014020-27 = "3;카즈사;01;슬슬 중학생 때의 자신과 지금을 좀 구분해줬으면 좋겠어. 계속 옛날처럼 굴지 말고……."
10014020-28 = "3;카즈사;02;……고등학생쯤 왔으면, 예전 모습 같은 건 잊을 때도 됐잖아?"
10014020-29 = "3;카즈사;04;서로 다 잊고 새출발하면 좋을 텐데. 그치? 왜 굳이 저러는지 도저히 이해가 안 간다니까.\n#3;em;[속상함]"

10014020-47 = "3;카즈사;09;그, 그런데 갑자기 그런 건 왜 묻고 그래!? 딱히 요즘 세상에 드문 케이스도 아니잖아?\n#3;hophop"
10014020-48 = "3;카즈사;05;어차피 누구나 말하기 싫은 과거 한두 개 정도는 가지고 있고……. 청산하기도 하고……."
10014020-49 = "3;카즈사;05;뭐, 전직 스파이였다든가, 은행을 털어 봤다든가, 메이드로 위장한 에이전트라든가, 자칭 닌자라든가……."
10014020-50 = "3;카즈사;04;어쩌면 그런 사람들도 왕왕 있을 수 있는 거 아니겠어? ……그치? 있겠지?\n#3;em;[땀]\n#3;stiff"
10014020-51 = "[s3] \"아. 그렇게 나오시겠다…….\"\n[s4] \"……묘하게 부정하기 어렵네요.\""

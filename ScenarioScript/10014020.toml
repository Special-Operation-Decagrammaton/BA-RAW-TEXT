[translation]
10014020-1 = "第2話;每個人都有一兩個"
10014020-2 = "馬上就到正門了，到這裡就能放心了。"
10014020-3 = "我想就算是那傢伙也不會在學校裡引起騷動的……"
10014020-4 = "唔嗯……"
10014020-5 = "總覺得好像變成是老師在護送我一樣了。"
10014020-6 = "……抱歉給你添麻煩了。"
10014020-7 = "還有，謝謝老師願意幫我。"
10014020-8 = "[s1] 「……千紗真有禮貌呢。」\n[s2] 「怎麼突然這麼拘謹？」"
10014020-9 = "咦，有，有嗎？"
10014020-10 = "咦，有，有嗎？"
10014020-11 = "畢竟是老師……而且是長輩……"
10014020-12 = "總之，今天的諮詢就先到這裡為止吧。#n之後會再找時間去找老師的。"
10014020-13 = "……嗯？"
10014020-14 = "你說雖然現在說有點晚了，不過告訴你我過去的事真的好嗎？#n……你指的是？"
10014020-15 = "……太妹的事嗎？"
10014020-16 = "啊……你說那不是「想隱藏的過去」嗎？"
10014020-20 = "這個嘛……"
10014020-21 = "嘛，雖然不是什麼值得驕傲的事……"
10014020-22 = "不過那也沒辦法，事實就是事實。"
10014020-23 = "雖然不是什麼想隱藏的事……不過也不太願意回想起來。#n大概就是這種感覺吧。"
10014020-24 = "畢竟回想起來也只會覺得累而已……"
10014020-25 = "……要是宇沢也能明白這點就好了。"
10014020-26 = "我們已經是高中生了。#n不能一直做這種像小孩子一樣的事……"
10014020-27 = "真希望他能知道，現在已經跟國中的時候不一樣了。#n一直像以前一樣朝我衝過來，我也覺得有點煩了。"
10014020-28 = "……都是高中生了，不正是該把國中時期的樣子之類的往事忘記的時候嗎？"
10014020-29 = "明明可以忘記彼此，好好享受新的生活就好……#n為什麼還要做那種事呢，我打從心底無法理解。"
10014020-30 = "[s] 「……」"
10014020-31 = "……？"
10014020-32 = "……怎麼了嗎？"
10014020-33 = "……咦？"
10014020-34 = "不當太妹的契機……？"
10014020-35 = "啊……那是因為……"
10014020-36 = "這問題問得真突然呢……？#n……嘛，那個……"
10014020-37 = "果然太妹還是……有點……"
10014020-47 = "話說回來，為什麼突然要問那種事啊！？#n這也沒什麼稀奇的吧？"
10014020-48 = "不管是誰都會有一兩個不想說出來的過去吧……"
10014020-49 = "像是當過間諜之類的、搶過銀行之類的、其實是偽裝成女僕的特務之類的，#n還有忍者之類的……"
10014020-50 = "這種人肯定不少的吧。#n沒什麼好奇怪的。"
10014020-51 = "[s3] 「確，確實呢……」\n[s4] 「……微妙地難以反駁。」"
10014020-52 = "就是說吧。我也是一樣的。"
10014020-53 = "就是說吧。我也是一樣的。"
10014020-54 = "真的到了「那個時候」就自然可以做出區別了。#n所以就別再問那時候的事了……很羞恥的。"
10014020-55 = "……沒錯。#n那種事情很羞恥的。"
10014020-59 = "……啊，時間快到了……"
10014020-60 = "再怎麼說都不能在老師面前遲到，我先進去了。#n再見囉，老師。"
10014020-61 = "今天真的很謝謝你，老師。#n能和人商量讓我輕鬆多了。"
10014020-62 = "……真的很感謝。"
10014020-63 = "那我先走了。"
10014020-67 = "（…………）"
10014020-68 = "[ns] 「……是三一自衛隊吧。」"
10014020-76 = "……啊，老師。我在這裡。"
10014020-81 = "恭候多時了，老師。#n你想問的事是什麼呢？"
10014020-82 = "啊，不，這怎麼會是我的負擔呢。#n不如說能給我這種機會我很開心。"
10014020-83 = "畢竟一直都很受老師的照顧……"
10014020-84 = "如果是我能力所及的事，還請讓我誠心誠意地協助吧。"
10014020-85 = "……啊，你說上課嗎？#n沒問題的。這個時間沒有課。"
10014020-86 = "因為每個學年跟班級的上課時間都不太一樣。#n謝謝老師的關心。"
10014020-87 = "那麼，想問的事情是……？"
10014020-88 = "……咦？關於三一自衛隊成員的事？#n這樣啊……所以才會找我……"
10014020-89 = "不過不知道能不能幫得上忙……#n因為三一自衛隊並不是普通的「組織」。"
10014020-90 = "而是字面意義上的「自衛隊」。#n是各個地方的人們為了保護附近的治安而組成的自發性團體。"
10014020-91 = "成員有誰、進行著什麼活動。#n要全都掌握住有點困難……"
10014020-92 = "……咦？"
10014020-93 = "宇沢澪紗……同學嗎？"
10014020-94 = "[s5] 「之前有看過你們待在一起。」\n[s6] 「想說鈴美會不會知道澪紗的事情。」"
10014020-95 = "……這樣啊。#n澪紗同學……是嗎。"
10014020-96 = "……這樣啊。#n澪紗同學……是嗎。"
10014020-97 = "他又引起什麼問題了對吧。#n希望這次不是什麼大事……"
10014020-98 = "[s7] 「等等，你剛剛說『又』……」\n[s8] 「他是問題兒童嗎……？」"
10014020-99 = "他絕不是什麼壞人。#n他的志向是很好的。"
10014020-100 = "他絕不是什麼壞人。#n他的志向是很好的。"
10014020-101 = "不過……有點精力過剩導致沒辦法和人好好相處……"
10014020-102 = "不過真是讓我有點意外呢。#n雖然說是那個澪紗同學，但我並不覺得他會給老師添麻煩的啊……"
10014020-103 = "……啊啊，是跟其他學生有關的事……原來如此。"
10014020-104 = "是這樣啊。如果方便的話，可以稍微說明一下情況嗎？#n不透漏當事人的個人情報也沒關係的……"
10014020-105 = "[ns] 說明現狀"
10014020-108 = "……原來如此。"
10014020-109 = "還真像是澪紗同學會做的事呢。#n對方想必很困擾吧。"
10014020-110 = "不過真讓我吃驚。#n雖然我自認很了解太妹們的事情……"
10014020-111 = "竟然還存在「太妹社會」這種東西呀。#n世界果然很大呢。"
10014020-112 = "……不過，最後那位同學不當太妹了對吧。#n澪紗同學為什麼會一直追著他呢？"
10014020-113 = "向已經不是太妹的人提出決鬥……#n是有什麼理由嗎？"
10014020-114 = "……看來直接問澪紗同學本人比較好呢。"
10014020-115 = "我知道澪紗同學的聯絡方式，我想只要叫他一聲應該馬上就會來了。"
10014020-116 = "畢竟就像我剛才說的一樣，他是個很有行動力的人。"
10014020-117 = "那麼就來聯絡他……"
10014020-121 = "不好意思，有電話……失禮了。"
10014020-122 = "……澪紗同學？"
10014020-123 = "[s9] 「澪紗打來的？」\n[s10] 「怎麼了嗎？」"
10014020-124 = "啊……"
10014020-125 = "啊……"
10014020-126 = "……是來請求支援的。"

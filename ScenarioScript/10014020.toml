10014020-109 = "3;스즈미;04;확실히 레이사 씨 다운 일이네요. 그분도 참 곤란하시겠어요.\n#3;em;[땀]"
10014020-110 = "3;스즈미;05;그나저나 놀랍군요. 스케반들에 대해서는 스스로도 꽤 잘 알고 있다고 생각했는데……."
10014020-111 = "3;스즈미;99;그런 '그들만의 세계'도 따로 존재할 줄이야. 역시 세상은 넓은 모양입니다."
10014020-112 = "3;스즈미;01;……하지만 결국 그분은 스케반을 그만두신 것이잖습니까. 레이사 씨는 왜 계속 도전하시는 걸까요?"
10014020-113 = "3;스즈미;05;이미 스케반을 그만둔 사람에게 계속해서 결투……. 뭔가 이유라도 있는 걸까요? 호승심?\n#3;em;[?]"
10014020-114 = "3;스즈미;01;아무래도 이건 레이사 씨께 직접 여쭤보는 게 나을 것 같네요."

10014020-97 = "3;스즈미;01;아무래도 무슨 사고를 친 모양이네요. 큰일이 아니었으면 좋겠습니다만……."
10014020-98 = "[s7] \"잠깐. 지금 '또'라고…….\"\n[s8] \"바로 '사고'부터 나오는 거군요.\""
10014020-99 = "3;스즈미;05;결코 나쁜 분은 아닙니다. 확실히 말해 의도나 마음씨는 훌륭하신 분이죠.\n#3;em;[반응]"
10014020-100 = "3;스즈미;05;결코 나쁜 분은 아닙니다. 확실히 말해 의도나 마음씨는 훌륭하신 분이죠.\n#3;em;[반응]"
10014020-101 = "3;스즈미;04;……물론 다소 에너지가 넘치고, 그것을 조절하지 못해 사람들로부터 겉도실 때도 있지만요…….\n#3;stiff"
10014020-102 = "3;스즈미;01;그래도 의외군요. 아무리 레이사 씨라도 선생님에게 폐를 끼칠 만한 일을 하진 않을 줄 알았는데……."
10014020-103 = "3;스즈미;02;……네? 아, 다른 분에 관한 이야기라고요?\n#3;em;[?]"
10014020-104 = "3;스즈미;01;그렇군요. 괜찮으시다면 상황을 좀 들어볼 수 있을까요? 그분의 신상에 대해서는 따로 밝히지 않으셔도 좋습니다만……."

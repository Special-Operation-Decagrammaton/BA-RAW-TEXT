10014020-81 = "3;스즈미;00;기다리고 있었습니다, 선생님. 물어보고 싶으신 것이 있으시다고요?"
10014020-82 = "3;스즈미;02;아, 아뇨. 부담이라니 당치도 않습니다. 오히려 저로선 이런 기회가 더 감사할 일이죠.\n#3;em;[땀]"
10014020-83 = "3;스즈미;01;선생님께는 늘 신세만 지고 있으니…….\n#3;stiff"
10014020-84 = "3;스즈미;03;뭔지는 모르지만 제가 도와드릴 수 있는 거라면 성심성의껏 도와드리겠습니다.\n#3;em;[반짝]"
10014020-85 = "3;스즈미;02;……네? 수업요? 아, 괜찮습니다. 지금 시간에는 딱히 수업이 없거든요."
10014020-86 = "3;스즈미;03;학년이나 반마다 수업 시간표도 다르니까요. 그래도 먼저 물어봐 주셔서 감사합니다.\n#3;greeting\n#3;em;[음표]"
10014020-87 = "3;스즈미;01;그나저나 어떤 걸 여쭤보고 싶으신지……."
10014020-88 = "3;스즈미;02;……네? 자경단 멤버에 관한 일이라고요? 과연……. 그렇군요. 그래서 제게……."
10014020-89 = "3;스즈미;04;으음. 그렇지만 도움이 돼 드릴 수 있을지는……. 자경단이라는 게 사실 제대로 된 '조직'은 아니거든요.\n#3;em;[속상함]\n#3;stiff"
10014020-90 = "3;스즈미;01;말 그대로 '자경단'이니까요. 각자가 자신이 지내는 곳 근처의 치안을 지키려고 자발적으로 나선 사람들입니다."
10014020-91 = "3;스즈미;99;어떤 사람들이 있는지, 어디서 어떤 활동을 하는지 제가 파악하고 있기는 어렵습니다만…….\n#3;em;…"

[translation]
70009010-1 = "然而舍監隊仍在奔跑（１）"
70009010-3 = "鳥兒啁啾，花朵綻放。"
70009010-7 = "真是美好的一天。"
70009010-10 = "如果能在戶外咖啡廳來杯濃縮咖啡，該有多好。"
70009010-15 = "雖然我只能一整天待在昏暗的檢查哨裡。"
70009010-22 = "……連沉浸在憂鬱中的時間都成了奢侈啊。"
70009010-23 = "好，開放了～#n檢查哨從現在起開放。"
70009010-30 = "請出示外出證。"
70009010-31 = "在這裡。"
70009010-33 = "申報的行李……沒有呢。稍微做個身體檢查。"
70009010-34 = "每次都要這樣嗎？#n我們的校服也沒地方藏東西吧。"
70009010-35 = "這也是工作的一部分。"
70009010-43 = "等，等一下！連那種地方都要搜嗎？"
70009010-44 = "最近走私猖獗，上級指示要加強身體檢查。"
70009010-49 = "喂，好，好癢！#n停，停下來！"
70009010-50 = "……嗯，看來沒藏什麼東西。#n請通過吧。"
70009010-51 = "我一開始就說了啊！"
70009010-55 = "所以我才討厭舍監隊……！"
70009010-56 = "認真工作換來的竟然是無理的責難啊……"
70009010-57 = "唉……算了，就算抱怨也不會讓工作消失……"
70009010-58 = "下一位，請進。"
70009010-62 = "這裡，外出證和包包。"
70009010-63 = "好的，確實收到了。檢查內容物。"
70009010-70 = "這是……明太子口味的洋芋片啊。"
70009010-72 = "嗯，沒錯。"
70009010-76 = "沒收。"
70009010-77 = "為什麼！？"
70009010-78 = "因為未達學園食品安全標準，被列為不良食品。"
70009010-82 = "什麼標準啊？"
70009010-83 = "包裝袋的氮氣比例過低，有在運送中損壞的疑慮……好像是這樣寫的。"
70009010-84 = "雖然確實跟食品和安全有關，但跟吃完全沒關係吧！？"
70009010-85 = "規定不是我訂的，找我也沒用。"
70009010-89 = "還有，這是玩偶呢。應該有名字……"
70009010-90 = "嗯……啊，找到了。#n嗯，對，佩洛洛。Momo好友的佩洛洛玩偶。這個也要沒收。"
70009010-91 = "雖然已經不會感到意外了……但為什麼？"
70009010-92 = "理由是……官方在最近的劇情中對角色的詮釋有誤，因而引發了外交抗議……？#n這什麼鬼……？"
70009010-93 = "……總之，Momo好友相關周邊暫時禁止攜入。"
70009010-94 = "你剛剛也疑惑了吧！？"
70009010-99 = "嗯，還有……"
70009010-100 = "這是鳳梨嗎？"
70009010-101 = "嗯，是鳳梨。怎麼了嗎？"
70009010-102 = "……沒事，只是在包包裡看到鳳梨有點驚訝。#n這個也沒收。"
70009010-103 = "為什麼！？這只是單純的水果吧！？"
70009010-104 = "為了徹底杜絕鳳梨披薩的誕生，目前全面禁止攜入鳳梨。"
70009010-105 = "這是誰決定的……？"
70009010-106 = "我。#n因為我不喜歡鳳梨披薩。"
70009010-108 = "完全是你個人的私心嘛！"
70009010-109 = "檢查員對於可能引發嚴重犯罪的物品，可自行判斷是否加以沒收。#n這是規定裡明確紀載的事項，所以還在允許的範圍之內。"
70009010-110 = "鳳梨披薩犯了什麼罪啊……"
70009010-114 = "最後是……？這到底是什麼？"
70009010-115 = "啊，那是格黑娜學生會長的自傳……吧？#n裝幀超豪華卻連清倉都賣不掉，覺得它被堆在角落很好笑就買了。"
70009010-116 = "是沒登記過的書籍呢。總之先沒收。"
70009010-117 = "什麼！？那東西有多重你知道嗎！#n我搬得很辛苦耶！"
70009010-118 = "如果正式調查後沒問題會另外公告，只要辦理手續就能領回去了。"
70009010-119 = "目前問題品項就這些。可以通過了。"
70009010-124 = "不是，根本全都被你沒收了吧！#n那些明明都是在其他學校很常見的東西，沒收標準到底是什麼啊！？"
70009010-125 = "標準都寫在規範集裡。"
70009010-127 = "除了你們舍監隊，誰會去讀那種東西啊！"
70009010-132 = "唉，這就是問題所在……"
70009010-133 = "把沒收品放進倉庫……下一位，請進。"
70009010-137 = "嘿咻～哎呀，好重～"
70009010-138 = "行李真多啊。打開檢查內容物。"
70009010-139 = "當然！全和申報的一樣！"
70009010-145 = "我看看……紅花牌毛筆6本組50套，克魯格SB4-8號50捆，#n3號畫布100張，4號100張，塗層剝離劑1桶……"
70009010-146 = "嗯？畫布下面有空間……"
70009010-147 = "糟了！那個是……！"
70009010-154 = "……這是什麼？"
70009010-155 = "如你所見……是千年製的凝固汽油彈。"
70009010-156 = "還有衝鋒槍、高爆手榴彈……全都是沒申報的武器。"
70009010-157 = "啊～那個啊～是我的個人物品啦。#n因為太重了想一次搬完，結果忘得一乾二淨。"
70009010-161 = "但這種東西也要申報嗎？"
70009010-165 = "……確實，逐一申報這種物品太不合理了。#n那樣連穿的衣服都要檢查。"
70009010-166 = "沒問題，請通過。"
70009010-167 = "謝謝～辛苦了～"
70009010-172 = "大家都像那位一樣守規矩的話，工作就輕鬆多了……#n唉，下一位，請進。"
70009010-176 = "來！這裡是外出證和攜帶品！#n快讓我過！靈感正在湧現！"
70009010-177 = "好的好的，稍等一下。#n……？"
70009010-182 = "話說回來，你攜帶的是……？"
70009010-183 = "從三一帶來的雕像！#n磨成顏料會得到非常細緻柔和的白色！"
70009010-184 = "……以防萬一，我還是追問一下。#n有取得所有權人的許可嗎？"
70009010-185 = "嗯？什麼意思？#n看不出這是文物嗎？"
70009010-186 = "嗯，是文物沒錯。"
70009010-187 = "那製作者早就不在了吧。"
70009010-188 = "……這東西先沒收。#n此外，還有幾個問題要問你，請留步。"
70009010-189 = "什麼，留步！？#n靈感可是不等人的啊！！"
70009010-193 = "……啊哈！！我知道了！！你想偷我的點子是吧！？"
70009010-194 = "怎麼可能呢。#n反倒是你要接受制裁。"
70009010-195 = "制裁……？這是想控制藝術的陰謀！！"
70009010-196 = "不，是你意圖犯罪……"
70009010-198 = "我不會向權力妥協的！！#n藝術源於對世界不斷的抗爭！！"
70009010-203 = "哎！#n警衛！有非法闖關者！"
70009010-207 = "有闖關者！？在哪邊！？"
70009010-208 = "立即追捕！"
70009010-210 = "發生什麼事啦？吵吵鬧鬧的。"
70009010-211 = "為什麼那傢伙就能帶進去？#n那我的也還給我！"
70009010-212 = "我也趁機溜進去……！"
70009010-214 = "什，什麼！？這些傢伙想抗命嗎！？"
70009010-215 = "這裡是檢查哨！緊急狀態！#n有學生集團打算強行突破檢查哨！請求增援！"
70009010-217 = "就是今天！打倒壓迫自由的舍監隊！"
70009010-218 = "狂獵萬歲！我等誓不為奴！"
70009010-229 = "啊……"
70009010-236 = "是鴿子。"

[translation]
70009010-1 = "ฝ่ายดูแลหอพักยังคงมุ่งต่อไป 1"
70009010-3 = "เหล่านกน้อยส่งเสียงขับขาน ดอกไม้ผลิบาน"
70009010-7 = "วันนี้เป็นวันที่ดีจังเลยนะ..."
70009010-10 = "เป็นวันที่เหมาะกับการไปนั่งดื่มเอสเปรสโซ่ข้างนอกจริงๆ"
70009010-15 = "ถึงในความเป็นจริงจะต้องนั่งประจำอยู่ในด่านตรวจมืดๆ ทั้งวันก็เถอะ"
70009010-22 = "แม้แต่ช่วงเวลาที่มานั่งจิตใจห่อเหี่ยวแบบนี้ยังถือเป็นสิ่งฟุ่มเฟือยเลย..."
70009010-23 = "ค่า เปิดแล้วค่า~ ด่านตรวจเปิดทำการแล้วค่ะ"
70009010-30 = "ขอใบอนุญาตออกนอกสถานที่ด้วยค่ะ"
70009010-31 = "เอ้านี่"
70009010-33 = "ตามที่แจ้งมา... ไม่มีสัมภาระนะคะ? งั้นขอรบกวนตรวจร่ายกายหน่อยนะคะ"
70009010-34 = "ต้องทำแบบนี้ทุกครั้งเลยเหรอ? ชุดนักเรียนของเราไม่มีที่ให้ซ่อนอะไรได้สักหน่อย"
70009010-35 = "ก็มันเป็นงานนี่คะ"
70009010-43 = "ดะ... เดี๋ยวก่อน! จะต้องตรวจไปถึงตรงนั้นเลยรึไง?"
70009010-44 = "ช่วงนี้มีการลักลอบขนส่งสินค้าเพิ่มขึ้น เบื้องบนเลยสั่งลงมาว่าให้ตรวจร่างกายอย่างเข้มงวดค่ะ"
70009010-49 = "เดี๋ยวก่อน โธ่เอ๊ย มันจั๊กจี้นะ! พะ... พอได้แล้ว!"
70009010-50 = "เอาเถอะ... ดูไม่น่าจะมีของอะไรซ่อนไว้นะคะ ไปได้ค่ะ"
70009010-51 = "ฉันก็บอกตั้งแต่แรกแล้วนี่!"
70009010-55 = "เพราะแบบนี้ไงถึงไม่ชอบฝ่ายดูแลหอพักเลยน่ะ...!"
70009010-56 = "ค่าตอบแทนของการทำงานหนักคือคำด่าว่าแบบนี้งั้นเหรอ..."
70009010-57 = "เฮ้อ... ถึงจะบ่นๆ ไปแบบนั้นงานมันก็ไม่ได้ลดลงหรอก..."
70009010-58 = "เชิญคนต่อไปค่ะ"
70009010-62 = "นี่ ใบอนุญาตออกนอกสถานที่กับกระเป๋า"
70009010-63 = "ค่ะ ขอบคุณมากค่ะ ขออนุญาตตรวจสิ่งของนะคะ"
70009010-70 = "อืม นี่มัน... มันฝรั่งทอดรสเมนไทโกะสินะคะ"
70009010-72 = "อื้อ ทำไมเหรอ?"
70009010-76 = "ขอยึดค่ะ"
70009010-77 = "ทำไมกันล่ะ?!"
70009010-78 = "ขนมชิ้นนี้ถูกขึ้นทะเบียนเป็นอาหารที่ไม่ได้มาตรฐานความปลอดภัยของโรงเรียนค่ะ"
70009010-82 = "มาตรฐานอะไรน่ะ?"
70009010-83 = "เห็นมีระบุเอาไว้ว่า... ปริมาณไนโตรเจนภายในบรรจุภัณฑ์มีระดับต่ำเกินไปจึงมีความเสี่ยงที่จะได้รับ#nความเสียหายระหว่างขนส่ง... น่ะค่ะ"
70009010-84 = "มันเป็นอาหารนะ ปลอดภัยร้อยเปอร์เซนต์แน่นอน...! แล้วที่พูดมาเมื่อกี้มันไม่เห็นจะเกี่ยวอะไรกับ#nของกินเลยไม่ใช่รึไง?!"
70009010-85 = "ฉันไม่ได้เป็นคนเขียนกฎนี้ขึ้นเองนะคะ โวยวายใส่ฉันไปก็ไม่ได้อะไรหรอกค่ะ"
70009010-89 = "ต่อไปก็เป็นตุ๊กตาสินะคะ เจ้าตัวนี้น่าจะมีชื่ออยู่เหมือนกันนี่นา..."
70009010-90 = "อืม... อ๊ะ เขียนอยู่ตรงนี้ไง เพโรโร่ ตุ๊กตาเพโรโร่ของ MOMO FRIENDS#nค่ะ ตุ๊กตาตัวนี้ก็ต้องถูกยึดเหมือนกันค่ะ"
70009010-91 = "ฉันเหนื่อยจะถามแล้วนะ... เพราะอะไรอีกล่ะ?"
70009010-92 = "เหตุผลเขียนเอาไว้ว่าในตอนล่าสุดที่ฉาย การตีความตัวละครไม่ตรงกับออฟฟิเชียลก็เลยเกิด#nการประท้วงเชิงการทูตขึ้น...? หืม อะไรเนี่ย...?"
70009010-93 = "เอาเป็นว่าตอนนี้สินค้าที่เกี่ยวข้องกับ MOMO FRIENDS ถูกห้ามนำเข้าชั่วคราวค่ะ"
70009010-94 = "เมื่อกี้พูดว่า 'เอาเป็นว่า' เรอะ?! "
70009010-99 = "นี่มัน... อืม แล้วก็นี่..."
70009010-100 = "ใช่สับปะรดรึเปล่าคะ?"
70009010-101 = "อื้อ สับปะรดน่ะ ทำไมเหรอ?"
70009010-102 = "เปล่าค่ะ... ฉันแค่ตกใจนิดหน่อยที่เจอสับปะรดในกระเป๋าค่ะ อันนี้ก็ขอยึดเหมือนกันค่ะ"
70009010-103 = "ทำไมล่ะ?!"
70009010-104 = "ตอนนี้ห้ามนำเข้าสับปะรดอย่างเด็ดขาดเพื่อป้องกันไม่ให้มีการทำพิซซ่าหน้าสับปะรดขึ้นค่ะ"
70009010-105 = "ใครเป็นคนออกกฎพวกนี้เนี่ย...?"
70009010-106 = "ฉันเองค่ะ ฉันไม่ชอบพิซซ่าหน้าสับปะรดค่ะ"
70009010-108 = "แบบนี้มันอคติส่วนตัวล้วนๆ เลยนะ!"
70009010-109 = "ระเบียบระบุเอาไว้ชัดเจนค่ะว่าหากเป็นสิ่งของที่นำไปสู่การก่ออาชญากรรม เจ้าหน้าที่สามารถใช้สิทธิ์#nยึดได้ตามความเหมาะสมค่ะ"
70009010-110 = "แต่พิซซ่าหน้าสับปะรดมันไม่ใช่อาชญากรรมสักหน่อย..."
70009010-114 = "และชิ้นสุดท้าย...? นี่มันอะไรคะ?"
70009010-115 = "อ๋อ น่าจะเป็นอัตชีวประวัติประธานสภานักเรียนเกเฮนน่า... ละมั้ง? ปกหนังสือทำออกมาได้สวยมากๆ แต่ไม่มีวางขายในร้านหนังสือเลย แถมมันยังถูกวางกองทิ้งไว้ตรงมุมๆ หนึ่ง ฉันคิดว่ามันตลกดีเลยซื้อมา"
70009010-116 = "หนังสือเล่มนี้ไม่เคยขึ้นทะเบียนมาก่อน เพราะงั้นขอยึดไว้ก่อนนะคะ"
70009010-117 = "หา?! รู้มั้ยว่าหนังสือเล่มนั้นมันหนักจนหลังจะหักเลยนะ! ฉันเหนื่อยแทบตายกว่าจะขนมันมาได้!"
70009010-118 = "หลังตรวจสอบเรียบร้อยแล้ว ถ้าไม่พบปัญหาอะไรจะประกาศแจ้งให้ทราบอีกครั้งค่ะ จากนั้นก็มายื่นคำขอรับกลับไปได้ค่ะ"
70009010-119 = "รายการสิ่งของที่มีปัญหาก็มีเท่านี้สินะคะ เชิญผ่านได้ค่ะ"
70009010-124 = "เดี๋ยวสิ นี่เท่ากับยึดไปหมดเลยนี่นา! ที่โรงเรียนอื่นของพวกนี้มันเป็นของที่หาได้ทั่วไป พวกเธอใช้เกณฑ์อะไรมายึดกันฮะ?!"
70009010-125 = "ทุกอย่างเป็นเกณฑ์ที่ระบุไว้ในกฎข้อบังคับค่ะ"
70009010-127 = "นอกจากฝ่ายดูแลหอพักแล้วในโรงเรียนนี้มีใครอ่านของแบบนั้นกันบ้าง!"
70009010-132 = "เฮ้อ นั่นแหละปัญหา..."
70009010-133 = "เอาสินค้าที่ถูกยึดไปเก็บไว้ในโกดังก่อน... เอาละ เชิญคนต่อไปค่ะ"
70009010-137 = "ฮึบ~ โอ๊ย หนักสุดๆ เลย~"
70009010-138 = "สัมภาระเยอะเลยนะคะ ฉันขอตรวจสอบของข้างในหน่อยนะคะ"
70009010-139 = "ได้เลย! มีแต่ของตามรายการที่ยื่นไปนั่นละ!"
70009010-145 = "ไหนดูหน่อยซิ... พู่กันบุปผาชาดชุดละ 6 ด้ามจำนวน 50 ชุด พู่กัน SB ครูเกอร์ เบอร์4-8 จำนวน 50 ชุด แคนวาสเบอร์ 3 กับเบอร์ 4 อย่างละ 100 แผ่น น้ำยาล้างฟิล์ม 1 ถังแล้วก็..."
70009010-146 = "หืม? ตรงข้างใต้ผ้าใบนี่..."
70009010-147 = "อ๊ะ! นั่นมัน...!"
70009010-154 = "นี่อะไรคะ?"
70009010-155 = "อย่างที่เห็นละ... ระเบิดนาปาล์มที่ผลิตโดยมิลเลเนียมน่ะ"
70009010-156 = "ระเบิดมือแรงสูง ปืน SMG... อาวุธทั้งหมดนี่ไม่มีในรายการสินค้าที่แจ้งมานี่คะ"
70009010-157 = "อ๋อ เรื่องนั้น~ มันเป็นของใช้ส่วนตัวน่ะ พอดีว่ามันหนักมากเลยคิดว่าจะขนมาทีเดียวให้หมด แต่ลืมไปซะสนิทเลย"
70009010-161 = "ว่าแต่ว่าต้องแจ้งรายการของพวกนี้ด้วยงั้นเหรอ?"
70009010-165 = "แน่นอนว่าการต้องแจ้งสำแดงสิ่งของเหล่านี้ทุกชิ้นเป็นเรื่องที่ดูไม่สมเหตุสมผล แบบนั้นก็ไม่ต่างอะไร#nกับการตรวจสอบเสื้อผ้าที่สวมใส่ทุกชิ้น"
70009010-166 = "ไม่พบสิ่งผิดปกติค่ะ เชิญผ่านได้"
70009010-167 = "ขอบคุณมาก~ สู้ๆ ล่ะ"
70009010-172 = "ถ้าทุกคนปฎิบัติเหมือนกับคนคนนั้น งานของเราก็คงจะง่ายขึ้นเยอะเลย... เฮ้อ เชิญคนต่อไปค่ะ"
70009010-176 = "เอ้า! ใบอนุญาตออกนอกสถานที่กับสัมภาระ! รีบๆ ตรวจได้ละ ฉันเพิ่งนึกไอเดียเจ๋งๆ ออกเลย!"
70009010-177 = "ค่าๆ รอสักครู่นะคะ เอ๋...?"
70009010-182 = "ว่าแต่ว่าสัมภาระชิ้นนี้... มันคืออะไรเหรอคะ?"
70009010-183 = "รูปปั้นที่เอามาจากทรีนิตี้น่ะ! ถ้าเอาไปทุบแล้วบดให้ละเอียดก็จะได้ผงสีขาวที่บริสุทธิ์มากเลยละ!"
70009010-184 = "ขอถามเผื่อไว้สักหน่อยนะคะ... คุณได้รับอนุญาตจากเจ้าของแล้วใช่มั้ยคะ?"
70009010-185 = "หืม? พูดอะไรของเธอน่ะ? ใครๆ ดูก็รู้ว่ามันเป็นของโบราณ"
70009010-186 = "นั่นสิคะ เป็นของโบราณจริงๆ ด้วยค่ะ"
70009010-187 = "งั้นก็แสดงว่าคนที่สร้างมันมาก็คงหายตัวไปนานแล้วละ"
70009010-188 = "ถ้างั้นก็ขอยึดไว้ก่อนแล้วกันนะคะ ยังมีข้อมูลที่ฉันอยากสอบถามเพิ่มเติมอยู่อีกหลายอย่าง รบกวนรอตรงนี้สักครู่..."
70009010-189 = "หาาา ให้รอเหรอ?! แรงบันดาลใจมันไม่รอใครหรอกนะ!!"
70009010-193 = "เฮอะ...!! เข้าใจแล้วละ!! เธอคิดจะแย่งไอเดียของฉันใช่มั้ยล่ะ?!"
70009010-194 = "จะเป็นแบบนั้นได้ยังไงกันคะ ของชิ้นนี้มันอยู่ในรายการวัตถุต้องห้ามด้วยซ้ำค่ะ"
70009010-195 = "ต้องห้าม...? นี่เป็นกลอุบายเพื่อควบคุมงานศิลปะสินะ!!"
70009010-196 = "เปล่านะคะ คือ... เรื่องนี้ถือเป็นอาชญากรรม..."
70009010-198 = "ฉันไม่ยอมสยบให้กับอำนาจมืดเด็ดขาด!! ความงดงามของศิลปะจะเกิดขึ้นได้ก็ต่อเมื่อเกิดการต่อสู้!!"
70009010-203 = "อ๊ะ! การ์ด! มีผู้บุกรุกค่ะ! "
70009010-207 = "ผู้หลบหนีเหรอ?! ไปทางไหนล่ะ?!"
70009010-208 = "จะไล่ตามไปเดี๋ยวนี้ค่ะ!"
70009010-210 = "อะไรน่ะ? เสียงเอะอะโวยวายอะไรกัน?"
70009010-211 = "นี่เธอปล่อยยัยนั่นเข้าไปได้งั้นเหรอ? ถ้างั้นก็คืนของของฉันมาได้แล้ว!"
70009010-212 = "ชุลมุนแบบนี้แหละโอกาส! ไม่มีคนห้ามพวกเราเข้าไปได้แน่!"
70009010-214 = "อะ... อะไรเนี่ย! นี่พวกเธอถอยไปเลยนะ!"
70009010-215 = "ที่นี่ด่านตรวจ! เกิดเหตุฉุกเฉิน! จู่ๆ พวกนักเรียนคนอื่นๆ ก็เริ่มมีพฤติกรรมแปลกๆ ค่ะ! ขอกำลังเสริมด่วนๆ เลยค่ะ!"
70009010-217 = "นี่แหละโอกาส! มาขับไล่ฝ่ายดูแลหอพักที่กดขี่ข่มเหงเสรีภาพ#nของนักเรียนออกไปกันเถอะ!"
70009010-218 = "ไวลด์ฮันต์จงเจริญ! เราไม่ได้เกิดมาเพื่อเป็นทาสใคร หรือเพื่อให้ใครข่มเหงได้!"
70009010-229 = "อ่า..."
70009010-236 = "นั่นนกพิราบนี่นา..."

[translation]
70009010-1 = "And Yet, the Prefectural Council Goes On 1"
70009010-3 = "Birds are singing, flowers are blooming..."
70009010-7 = "What a beautiful day."
70009010-10 = "It's a perfect day to enjoy sipping an espresso at an outdoor cafe."
70009010-15 = "What a shame that I'll be stuck at a dark inspection point instead."
70009010-22 = "...Even time for melancholic daydreaming is denied to me."
70009010-23 = "Yes, I hear you! The inspection point is about to open!"
70009010-30 = "Proceed through. Please submit your pass."
70009010-31 = "Here."
70009010-33 = "Nothing declared, huh?... Then, please submit to a brief physical inspection."
70009010-34 = "Oh, is this really necessary? You know this uniform has fake pockets!"
70009010-35 = "Not personal. Just the job."
70009010-43 = "W-Wait! Even over THERE?"
70009010-44 = "Smuggling is on the rise. We've received updated frisking orders."
70009010-49 = "No I... Heehee! Wait, I'm super ticklish! S-Stop!"
70009010-50 = "...Well, you don't seem to be hiding anything. You're free to go."
70009010-51 = "That's what I told you!"
70009010-55 = "This is why everyone hates the Council...!"
70009010-56 = "Diligent work is rewarded with unfair critique."
70009010-57 = "*sigh*... Whining won't make this day go any faster..."
70009010-58 = "Next! Proceed through. Please subm—"
70009010-62 = "Yeah, my pass and bag, here, got it."
70009010-63 = "Thank you. Now then, I will inspect the contents of your bag."
70009010-70 = "Hm. Pollock-roe-flavored potato chips."
70009010-72 = "And what about them?"
70009010-76 = "Forbidden. I must confiscate these."
70009010-77 = "Why?!"
70009010-78 = "This item is classified as non-compliant. It fails to meet Wildhunt's food safety standards."
70009010-82 = "What standards?"
70009010-83 = "This brand uses an insufficient amount of nitrogen in its packaging, leaving it susceptible to damage and contamination during transport."
70009010-84 = "Nitrogen...? It's perfectly safe. You just want to eat my chips, don't you?"
70009010-85 = "I don't make the rules. All complaints must be formally mailed to the Assembly office."
70009010-89 = "And, next is this...doll. It could be on our list..."
70009010-90 = "Hm... Ah, found it. \"Peroro,\" affiliated with the \"Momo Friends.\" Yes, this must also be confiscated."
70009010-91 = "I'm tired of listening to this...but why?"
70009010-92 = "Hmm... It says here that the Assembly found that \"subject Peroro displayed an inconsistency of character in a recent episode, therefore, as a diplomatic protest...\" What in the..."
70009010-93 = "...The ruling remains. All Momo Friends goods are temporarily banned. Additionally—"
70009010-94 = "\"Additionally\"?!"
70009010-99 = "There's also this."
70009010-100 = "Is this a pineapple?"
70009010-101 = "Clearly, yes. It's a pineapple. What's wrong with it?"
70009010-102 = "...Nothing. I'm just surprised how much you can fit in this bag. Also, this must be confiscated."
70009010-103 = "Why?! It's a fruit!"
70009010-104 = "It's banned. The only way to stop the possibility of pineapple pizzas is to remove the source."
70009010-105 = "Who made up that rule...?"
70009010-106 = "Me. I don't like pineapple pizza."
70009010-108 = "That's completely biased and unfair!"
70009010-109 = "Inspectors must use their discretion when it comes to confiscating products that may lead to serious crimes."
70009010-110 = "Pineapple pizza is NOT a crime..."
70009010-114 = "Finally...? What even is this?"
70009010-115 = "Ah, I think it's an autobiography of Gehenna's Student Council President? I thought it was funny that no one bought it despite the markdown, and it's got cool binding. So I purchased it."
70009010-116 = "This book doesn't appear in the official registry. I must confiscate this for now."
70009010-117 = "What?! Do you know how heavy that was to drag here?"
70009010-118 = "If the book passes an official review, it will be added to the registry. Following that, you may retrieve the book after submitting an official request to the Assembly."
70009010-119 = "That's everything. You're free to go."
70009010-124 = "Yeah, it's \"everything\"! My bag's empty now! Other schools get to have....chips and dolls and fruit! What right do you have to take them?!"
70009010-125 = "The inspector's rights are listed in the official regulations."
70009010-127 = "Who reads that besides the Prefectural Council?! Ugh!"
70009010-132 = "*sigh* Exactly. Ignorance of the rules is the problem..."
70009010-133 = "I'll lock these in storage... Now, next! Proceed through."
70009010-137 = "Oof! This is heavy, hold on."
70009010-138 = "You packed a lot. Now then, I will inspect the contents of your bag."
70009010-139 = "Of course! It should be exactly as declared."
70009010-145 = "Let's see... 50 sets of Red Flower paintbrushes, 50 bundles of Cruger SB brushes, 100 canvases, and a can of industrial paint stripper..."
70009010-146 = "Hm? What's under this canvas?"
70009010-147 = "Oh! That's...!"
70009010-154 = "...What's this?"
70009010-155 = "As you can see by the label...this is Millennium-made napalm."
70009010-156 = "An SMG, a highly-explosive grenade... These weapons were NOT declared."
70009010-157 = "Ah, well, those are my personal effects! I was packing so much that I forgot they were at the bottom of the bag."
70009010-161 = "I didn't mean to surprise you. But did I really have to declare such trivial things?"
70009010-165 = "No. It's as you said. It's trivial. It would be like asking you to declare your hat and jacket."
70009010-166 = "All clear. You're free to go."
70009010-167 = "Thank you! Have a wonderful day!"
70009010-172 = "If only everyone could follow their example and obey the rules... *sigh* Next! Proceed through."
70009010-176 = "Here! My pass and my item! Hurry! I'm struck by divine inspiration!"
70009010-177 = "Yes, all right. Hold on. ...?"
70009010-182 = "What...is this item?"
70009010-183 = "It's a statue from Trinity! If I grind it and make it into paint, it should produce a fine, soft, ethereal white!"
70009010-184 = "...And the statue's creator gave you permission to pulverize their work?"
70009010-185 = "Huh? Are you blind? Clearly, it's an antique. Practically a relic!"
70009010-186 = "Yes. I can see that."
70009010-187 = "The artist who made it is dead, obviously!"
70009010-188 = "...I'll confiscate this for now. I also...sense you require additional screening. Please wait here."
70009010-189 = "What? WAIT?! Inspiration waits for no one!!"
70009010-193 = "...*gasp* I know what's going on! You're trying to steal my idea, aren't you?!"
70009010-194 = "Don't be ridiculous. This imported statue is subject to sanctions."
70009010-195 = "Sanctions...? You're trying to control art! CENSORSHIP!"
70009010-196 = "Are you...actually committing a crime?"
70009010-198 = "I will not submit to oppressive authority! This is MY vision! Art only comes to those who struggle!"
70009010-203 = "Ah! Security! We have a runner!"
70009010-207 = "Huh? Where'd they go?"
70009010-208 = "Pursue and apprehend her!"
70009010-210 = "What's going on? What's all that screaming?"
70009010-211 = "So you're just letting her through with her stuff? Give me my pineapple back!"
70009010-212 = "This is our chance. They can't stop all of us."
70009010-214 = "Wh-What?! Stand firm, everyone!"
70009010-215 = "This is the Inspection Point! We have an emergency situation! Students are revolting and rushing the gates. Requesting reinforcements!"
70009010-217 = "Together! We shall break the chains of the Prefectural Council and regain our freedom!"
70009010-218 = "Viva Wildhunt! We are slaves to no one!"
70009010-229 = "Ah..."
70009010-236 = "...A pigeon."

[translation]
10010050-1 = "Episode 5;Trinity's Running Flash Grenade Part 1"
10010050-4 = "We managed to get our hands on the Miracle 5,000. We're off to a good start!"
10010050-5 = "We couldn't have done it without your leadership, Sensei."
10010050-6 = "[s1] \"I think you did a better job than I did.\"\n[s2] \"We also couldn't have done it without our tank.\""
10010050-7 = "M-Me? I don't think I did anything special..."
10010050-8 = "U-Um, I'm still not used to being called that..."
10010050-9 = "A-Anyway, we should make sure to get this back to Ui."
10010050-10 = "Next on the list is...either the holy tonic or the sphagnum moss glue."
10010050-11 = "Which one should we get first?"
10010050-12 = "[s3] \"The holy tonic?\"\n[s4] \"How about the glue?\""
10010050-13 = "You think so? Hmm. Okay, then—"
10010050-14 = "You think so? Hmm. Okay, then—"
10010050-18 = "...?!"
10010050-19 = "Wh-What was that noise?!"
10010050-28 = "*gasp* A fight broke out somewhere!"
10010050-29 = "I think it's close. We should go check on them!"
10010050-30 = "[s] \"What about the cake?\""
10010050-31 = "...!"
10010050-32 = "Oh, u-um, well..."
10010050-37 = "I-It should be okay... I mean, we have no choice!"
10010050-38 = "What if someone was in big trouble? We can't just ignore it...!"
10010050-39 = "Can we?"
10010050-40 = "[s5] \"No, of course not.\"\n[s6] \"I knew you would say that.\""
10010050-41 = "H-Haha... Guess so."
10010050-42 = "H-Haha... Guess so."
10010050-43 = "Okay, let's get going!"
10010050-49 = "Tch."
10010050-50 = "They're more stubborn than usual today."
10010050-52 = "Haha! You're messin' with the Roly Poly Gang, girlie! No matter how many times you knock us down, we'll get back up! We always recoil—just like the mighty roly poly!"
10010050-54 = "I couldn't care less what bug you model yourself after..."
10010050-55 = "Why tell me at all? Did you come here looking for a fight?"
10010050-56 = "Dang straight we did. We were lookin' for you."
10010050-57 = "You were?"
10010050-58 = "And why would that be?"
10010050-59 = "What do you mean \"why\"?! Are you serious right now?#nThink about what you've done to us!"
10010050-60 = "You shoulda known that you had this comin'!"
10010050-61 = "You're gonna pay, Running Flash Grenade of Trinity!"
10010050-62 = "Is that some kind of title you came up with?"
10010050-63 = "And sorry to say, but I don't know what you're talking about!#nAll of you delinquents are the same to me!"
10010050-64 = "Doing the right thing is all that matters to me."
10010050-66 = "That so, huh?! Well this is how WE roll!"
10010050-67 = "And don't go thinkin' we came up with that nickname for you.#nWhat are you? Stupid?"
10010050-68 = "You got any idea how much hell you raise? Huh?"
10010050-70 = "I'm not sure what you're referring to."
10010050-71 = "Ha! You really are clueless, huh?"
10010050-72 = "You've no idea what kinda reputation or influence you have."
10010050-73 = "You've got fans out there trying to imitate you!"
10010050-74 = "Imitate? Me?"
10010050-75 = "Why would anyone want to do that?"
10010050-77 = "The same reason every trend takes off these days: It caught on thanks to social media. Now there are a bunch of people copying you..."
10010050-78 = "Since you're the Flash Grenade of Trinity, all these posers started calling themselves stuff like \"The Smoke Bomb of Trinity\" or \"The Net Trap of Trinity\".#nIt's getting out of hand!"
10010050-79 = "That's why we're here to cut the head off the snake and put an end to it.#nYou're the culprit here—not us!"
10010050-81 = "If anyone here is guilty, it is certainly not me..."
10010050-82 = "Though I'm glad you explained the situation. I don't use social media often,#nso I was unaware of what's happening."
10010050-83 = "They say imitation is the sincerest form of flattery. I don't see any problem with the public taking the initiative to uphold what's right. I'd say it's good news."
10010050-84 = "Though the fact of the matter is that it has nothing to do with me.#nI don't know any of them."
10010050-85 = "However, if you insist on fighting me here..."
10010050-89 = "...then I'll accept your challenge. Let's get this over with!"
10010050-91 = "Eep..."
10010050-92 = "D-Don't let her rattle you now! Our gang's got 30 members!#nHow can we lose if it's 30 vs. 1?!"
10010050-93 = "We're the Roly Poly Gang! We always recoil!"
10010050-94 = "B-But she already beat us 18 vs. 1 that one time. Just because the roly poly recoils, it doesn't mean it can't still be squished!"
10010050-95 = "The last time she knocked us out with the end of her gun and didn't even have to fire a single bullet..."
10010050-96 = "Gahhh! You don't have to bring up the shame of our past! That's why we recruited 12 more people, isn't it?!"
10010050-98 = "So..."
10010050-99 = "...are we going to fight or not? Should I give you some more time to get ready?"
10010050-100 = "Cram it! Stop tryin' to act all considerate."
10010050-101 = "This ends here, Running Flash Grenade of Trinity!"
10010050-103 = "S-Sensei!"
10010050-104 = "[s7] \"We have to help her.\"\n[s8] \"Let's end this quickly\""
10010050-105 = "O-Okay!"
10010050-106 = "O-Okay!"

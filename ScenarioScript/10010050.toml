[translation]
10010050-1 = "第5話;三一的行走閃光彈（１）"
10010050-4 = "總算是拿到蛋糕了呢……！"
10010050-5 = "非常感謝您，老師！#n託您的福，有了個好的開始呢！"
10010050-6 = "[s1]「不客氣，日向才是辛苦了。」\n[s2]「辛苦你了，剛才活躍得跟戰車一樣呢。」"
10010050-7 = "不，不會，我真的幾乎沒做什麼……"
10010050-8 = "那，那個比喻有點……"
10010050-9 = "總，總之先把這個交給憂同學……"
10010050-10 = "接下來是「精聖藥」跟「水苔膠」……對吧？"
10010050-11 = "該從哪個開始找呢……？"
10010050-12 = "[s3]「先找精聖藥？」\n[s4]「總之先找水苔膠？」"
10010050-13 = "是呢，那麼──"
10010050-14 = "是呢，那麼──"
10010050-18 = "……！？"
10010050-19 = "這，這個聲音是……？"
10010050-28 = "有，有人在戰鬥……！？"
10010050-29 = "好像就在附近，一起去看看吧！"
10010050-30 = "[s]「嗯。啊，帶著蛋糕不要緊嗎……」"
10010050-31 = "確，確實是呢……！？"
10010050-32 = "但，但是，唔嗯……！"
10010050-37 = "沒，沒問題！我會好好拿著的！"
10010050-38 = "也許有人正遭遇困難，不能當作沒聽見……！"
10010050-39 = "我，我是這麼想的……您覺得呢……？"
10010050-40 = "[s5]「嗯，就這麼做吧。」\n[s6]「謹慎行動吧。」"
10010050-41 = "是，是……！"
10010050-42 = "是，是……！"
10010050-43 = "那麼，我們走吧！"
10010050-49 = "呼……"
10010050-50 = "總覺得今天用掉了很多閃光彈呢……"
10010050-52 = "哈哈，看來總算是沒力了！不過那也是當然的。#n畢竟我們可是無論倒下多少次都會重新站起來的「七跌八撞團」啊！"
10010050-54 = "那個，我覺得那是個不錯的名字……"
10010050-55 = "沒有要做什麼壞事的話，可以讓我去其他地方嗎？#n總覺得從剛才開始已經看到你們好幾次了……"
10010050-56 = "那當然囉。因為我們今天就是衝著你來的。"
10010050-57 = "……？"
10010050-58 = "衝著我來……？#n那又是為什麼……"
10010050-59 = "竟然說「為什麼」！？要不要捫心自問一下！？"
10010050-60 = "好好回想自己的所作所為，你就會知道原因了！"
10010050-61 = "總之，做好覺悟吧！「三一的行走閃光彈」！"
10010050-62 = "那個是，我的外號……嗎？"
10010050-63 = "還有很抱歉，我一時也想不到被盯上的理由……#n難道我們之前在什麼地方見過嗎？"
10010050-64 = "我只是在做「必須有人來做的事情」而已──"
10010050-66 = "我，我們才不是特別為你取這個外號的！"
10010050-67 = "可別誤會了！"
10010050-68 = "再說了，暴行嚴重到會自然而然地出現那種外號，有錯的是你吧！"
10010050-70 = "抱歉，我聽不懂你們在說什麼……"
10010050-71 = "可惡，居然還裝做不知道……！"
10010050-72 = "你這傢伙，知道自己的影響力有多大嗎！？"
10010050-73 = "因為你那所謂「自衛隊」的活動，出現了模仿你的傢伙啊！"
10010050-74 = "……模仿？#n呃，模仿我……？"
10010050-75 = "為，為什麼要模仿我……"
10010050-77 = "可能是在社群網站或是什麼地方看到的吧……已經不只一個兩個了！"
10010050-78 = "像是自稱「三一的巡迴煙霧彈」，或是自稱「三一的網子」之類的……！#n因為那些奇怪名字的傢伙，我們可是多了不少麻煩啊！"
10010050-79 = "那些傢伙真的有夠煩！所以我們決定要來阻止你這個元凶！"
10010050-81 = "就算你說我是元兇也……"
10010050-82 = "不過……我大概懂了。謝謝你們。#n我沒有在用社群網站，所以不是很清楚……"
10010050-83 = "原來還有這種事啊。#n不過不管怎麼說，越來越多人挺身而出是件好事。"
10010050-84 = "雖然那些人們多半與我素不相識……"
10010050-85 = "即便如此也要分個勝負的話，好吧。"
10010050-89 = "……我奉陪。就陪你們到你們滿意為止吧。"
10010050-91 = "唔……！？"
10010050-92 = "沒，沒什麼好怕的！這次可是30對1啊！？"
10010050-93 = "你不也說我們是無論倒下多少次都會重新站起來的「七跌八撞團」嗎！？"
10010050-94 = "可，可是之前18對1也輸掉了……#n而且雖然說會重新站起來，也沒說「會贏」啊……"
10010050-95 = "以前好像還曾經沒用槍就把我們所有人給……"
10010050-96 = "啊啊真是的，不要說過去那些羞恥的事了！#n所以這次我們不就叫來30個人了嗎！？"
10010050-98 = "……那個。"
10010050-99 = "需要我再等你們一下嗎？"
10010050-100 = "真是的，少囉嗦！不用你操心！！"
10010050-101 = "一決勝負吧，三一的行走閃光彈！！"
10010050-103 = "老，老師……！"
10010050-104 = "[s7]「雖然可能沒有必要……」\n[s8]「不過受傷就不好了，我們去幫忙吧。」"
10010050-105 = "是，是……！"
10010050-106 = "是，是……！"

[translation]
10010050-1 = "ตอนที่ 5;มนุษย์แฟลชบอมบ์แห่งทรีนิตี้ 1"
10010050-4 = "เราหาเค้กมาได้แล้ว... ถือว่าเริ่มได้ไม่เลวเลยนะคะ!"
10010050-5 = "เป็นเพราะได้คุณครูช่วยไว้แท้ๆ เลย ต้องขอบคุณคุณครูมากๆ เลยค่ะ"
10010050-6 = "[s1] \"ไม่เลย ฮินาตะช่วยได้มากกว่าครูอีก\"\n[s2] \"ต้องขอบคุณอาวุธโจมตีคนนั้นต่างหาก\""
10010050-7 = "คะ? มะ... ไม่หรอกค่ะ พูดเรื่องอะไรกัน... ฉันไม่ได้ทำอะไรเลยค่ะ"
10010050-8 = "อย่าแซวฉันแบบนั้นสิคะ..."
10010050-9 = "เอาเป็นว่า ตอนนี้เราได้เค้กมาให้คุณอุยเติมน้ำตาลเข้าร่างกายแล้ว..."
10010050-10 = "ต่อไปก็เหลือ... <ยาศักดิ์สิทธิ์> กับ <กาวมอส> ใช่ไหมคะ?"
10010050-11 = "อืม... ไปเอาอะไรมาก่อนดีนะ...?"
10010050-12 = "[s3] \"ยาศักดิ์สิทธิ์...?\"\n[s4] \"กาวมอสก่อนไหม?\""
10010050-13 = "อะ... เอางั้นเหรอคะ? ถ้างั้นก็..."
10010050-14 = "อะ... เอางั้นเหรอคะ? ถ้างั้นก็..."
10010050-18 = "......!?"
10010050-19 = "อะไรคะเนี่ย? เสียงนี้มัน...?"
10010050-28 = "เฮือกก!? มีการต่อสู้เกิดขึ้นเหรอคะ?"
10010050-29 = "น่าจะอยู่แถวๆ นี้นะคะ รีบไปกันเถอะค่ะ!"
10010050-30 = "[s] \"แล้วเค้กล่ะ?\""
10010050-31 = "......!"
10010050-32 = "เอ่อ... อืม... จะเป็นอะไรไหมนะ..."
10010050-37 = "ไม่เป็นไรหรอกค่ะ! หรือว่าเป็น...? แต่ช่วยไม่ได้นี่คะ...!"
10010050-38 = "ได้ยินเสียงต่อสู้ทั้งที จะให้เมินเฉยได้ยังไง... ถ้ามีคนเดือดร้อนขึ้นมาจะทำยังไงคะ... "
10010050-39 = "มะ... ไม่ได้เหรอคะ? ฉันไปไม่ได้เหรอ..."
10010050-40 = "[s5] \"ไม่หรอก เรื่องช่วยเหลือเพื่อนมนุษย์ต้องมาก่อน\"\n[s6] \"ครูรู้อยู่แล้วแหละว่าฮินาตะต้องพูดแบบนี้\""
10010050-41 = "แหะๆๆ..."
10010050-42 = "แหะๆๆ…"
10010050-43 = "ถ้างั้นเราไปกันเลยค่ะ...!"
10010050-49 = "แฮ่ก... แฮ่ก..."
10010050-50 = "แปลกจังเลยค่ะ พวกคุณนักเลง... วันนี้อึดจังเลยนะคะ"
10010050-52 = "ฮ่าฮ่า! แน่นอนอยู่แล้ว! ก็พวกฉันคือแก๊งโรลี่โพลี่ ล้มได้แต่ก็ลุกได้ไวยังไงล่ะ!"
10010050-54 = "งั้นเหรอคะ... ฉันไม่ได้อยากรู้ชื่อแก๊งของพวกคุณหรอกค่ะ..."
10010050-55 = "จะมาบอกกันทำไมก็ไม่รู้... ทำเหมือนจะท้าต่อสู้อย่างนั้นแหละ..."
10010050-56 = "อื้ม ใช่แล้ว พวกฉันมาเพื่อเล่นงานเธอไงล่ะ เริ่มจากวันนี้เป็นวันแรก!"
10010050-57 = "คะ...?"
10010050-58 = "มาเล่นงานฉันเหรอคะ? ทำไมล่ะ...?"
10010050-59 = "ทำไมงั้นเรอะ!? ถามเพราะไม่รู้จริงๆ เหรอ?? นึกถึงเรื่องที่เธอทำกับพวกฉันไว้ดูสิ!"
10010050-60 = "ไม่คิดเหรอว่าเธอเองก็ต้องโดนเข้าซะบ้างเหมือนกันน่ะ?"
10010050-61 = "วันนี้เตรียมตัวให้พร้อมซะล่ะ ยัย <มนุษย์แฟลชบอมบ์แห่งทรีนิตี้!>"
10010050-62 = "ตั้งฉายาแปลกๆ อะไรให้อีกแล้ว..."
10010050-63 = "อีกอย่าง พวกคุณต่างหากค่ะที่ทำผิดแล้วมาโกรธคนอื่น คนที่เอาแต่ก่อเรื่องคือพวกคุณไม่ใช่เหรอคะ?"
10010050-64 = "ฉันก็แค่ทำตามหน้าที่ที่ต้องทำก็เท่านั้น..."
10010050-66 = "แล้วจะเอายังไง!? ก็พวกฉันเป็นคนแบบนั้นอยู่แล้วนี่!!"
10010050-67 = "อีกอย่าง ฉายาของเธอน่ะ ฉันไม่ได้ตั้งให้สักหน่อย!"
10010050-68 = "ที่พวกฉันมาที่นี่ก็เพราะฉายาที่เป็นปัญหานั่นด้วย!"
10010050-70 = "...? เป็นปัญหาเหรอคะ?"
10010050-71 = "เฮอะ!! ไม่รู้อะไรเอาซะเลยนะ...!"
10010050-72 = "ยัยเด็กนี่! เธอไม่รู้เลยเหรอว่าสิ่งที่ทำมันส่งผลกระทบมากแค่ไหน?"
10010050-73 = "รู้ไหมว่าสิ่งที่เธอทำลงไปมันทำให้มีคนลอกเลียนแบบน่ะ!"
10010050-74 = "ลอกเลียนแบบ...? ฉันน่ะเหรอคะ?"
10010050-75 = "ทำไมถึง...? แล้วเขาคือใครเหรอคะ?"
10010050-77 = "ไม่ใช่แค่คนสองคนหรอก พวกนั้นคงไปเห็นมาจากโซเชียลและเริ่มทำตามกัน..."
10010050-78 = "เรียกตัวเองว่าเป็นระเบิดควันแห่งทรีนิตี้บ้างล่ะ กับดักแห่งทรีนิตี้บ้างล่ะ...! ตั้งฉายาเลียนแบบกันจนเพ้อเจ้อไปหมด!"
10010050-79 = "ฉันก็เลยมากำจัดต้นเหตุของปัญหานั่นไง!! และต้นเหตุนั่นก็คือเธอ!!"
10010050-81 = "ไม่นะ พวกคุณต่างหากค่ะที่เป็นต้นเหตุของเรื่องนี้..."
10010050-82 = "แต่ก็นะ... ฉันพอเข้าใจสถานการณ์แล้วล่ะ ถึงจะไม่รู้มาก่อนเพราะเป็นคนไม่เล่นโซเชียลก็เถอะ..."
10010050-83 = "มีเรื่องแบบนี้เกิดขึ้นสินะ มันเป็นเรื่องดีไม่ใช่เหรอคะที่ผู้คนต่างก็พากันออกมาทำสิ่งที่ถูกต้อง ได้ยินแบบนั้นฉันว่าเป็นเรื่องดีออกค่ะ"
10010050-84 = "แต่ก็ขอบอกอีกครั้งนะคะว่าคนพวกนั้นกับฉันไม่มีอะไรเกี่ยวข้องกัน ไม่ได้รู้จักกันเป็นการส่วนตัวด้วย"
10010050-85 = "แต่ถ้าอยากจะหาข้อยุติกับฉันที่นี่แล้วละก็..."
10010050-89 = "ก็ดี... รีบทำให้เรื่องมันจบเร็วๆ เข้าเถอะ"
10010050-91 = "ฮึ่มม..."
10010050-92 = "อย่าปอดแหกสิ รอบนี้เรามากันตั้ง 30 คนเลยนะ 30 รุม 1 จะแพ้ได้ไง?"
10010050-93 = "เธอเป็นคนพูดเองนี่นาว่าเราคือ \"แก๊งโรลี่โพลี่ที่ล้มได้แต่ก็ลุกได้ไว\""
10010050-94 = "แต่ 18 รุม 1 เราก็เคยแพ้มาแล้วนะ... ถึงล้มแล้วลุกได้ไว แต่ก็ไม่ได้แปลว่าจะลุกมาชนะสักหน่อย..."
10010050-95 = "แถมตอนนั้นแค่ปืนเปล่ากระบอกเดียวเรายังร่วงมาแล้วเลยด้วย..."
10010050-96 = "น่าอายชะมัด! เงียบไปเลยนะ! ก็บอกแล้วไงว่าจำนวนเท่านี้เราชนะได้แน่!"
10010050-98 = "คือว่า..."
10010050-99 = "ยังไม่เอาอีกเหรอคะ? ให้เวลาอีกเท่าไหร่ดีคะ?"
10010050-100 = "นะ... หนวกหูน่า!! อย่ามาทำเป็นวางท่านะ...!"
10010050-101 = "มาตัดสินกันดีกว่า ยัยมนุษย์แฟลชบอมบ์แห่งทรีนิตี้!!"
10010050-103 = "คะ... คุณครู!"
10010050-104 = "[s7] \"เข้าไปช่วยกันเถอะ\"\n[s8] \"ไปห้ามก่อนเร็ว\""
10010050-105 = "ค่ะ!"
10010050-106 = "ค่ะ!"

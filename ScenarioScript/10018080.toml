[translation]
10018080-1 = "Episode 8; I Said to Get Rid of the Problem..."
10018080-4 = "How did you come back with even more problems?!"
10018080-8 = "Please, no need to shout, Fuuka."
10018080-9 = "Don't try to tell me to calm down!"
10018080-10 = "A...cooking contest?"
10018080-11 = "Against Nyao Foods? And members of the Merchants Guild will be the judges?"
10018080-12 = "...How much are we preparing?"
10018080-13 = "One hundred stacks."
10018080-14 = "As you know, osechi is prepared in multiple side-dish boxes that can be stacked."
10018080-15 = "Usually, three to four people share a stack."
10018080-16 = "So it's a simple order of food for four hundred people. ★"
10018080-18 = "I think I'm going to go over there and pass out for a while."
10018080-19 = "Sorry, Fuuka, you'll have to pass out afterward."
10018080-20 = "The contest has already started. We're already committed."
10018080-21 = "No, you're already committed!"
10018080-22 = "You're the one who accepted this challenge, Haruna!"
10018080-23 = "And now you're making me deal with it!"
10018080-27 = "..."
10018080-28 = "I'm sorry, Fuuka."
10018080-32 = "H-Huh?"
10018080-33 = "[ns] \"Haruna apologized?!\""
10018080-34 = "I don't just love eating delicious food, I love sharing it too. A good meal is something anybody and everybody appreciates."
10018080-35 = "And that's why I can't leave Nyao Foods alone."
10018080-36 = "If they have their way, there'll be nothing to eat beyond their bland products."
10018080-38 = "I don't want that. I don't want to see Sparrow disappear."
10018080-39 = "And I don't want to sit idly by while people are being deprived of one of life's universal pleasures: good food."
10018080-40 = "So you're saying you accepted the challenge for the sake of the people here?"
10018080-41 = "I am."
10018080-42 = "And you want me to help?"
10018080-43 = "I'm saying that too, yes."
10018080-44 = "...And if I say no? What happens then?"
10018080-48 = "Like I said, I won't sit idly by. We'll think of something."
10018080-49 = "[s] \"Is that even possible?\""
10018080-50 = "Whether I do something or not has nothing to do with possibility."
10018080-51 = "I knew the risks when accepting Nyao Foods' challenge."
10018080-52 = "There's a high chance of failure and mockery."
10018080-53 = "But no one knows the future, and fear of it won't suppress my love of gastronomy."
10018080-54 = "...You say that, but if you actually lose, you'll be moping for weeks."
10018080-58 = "?!"
10018080-63 = "Okay, I'll help."
10018080-65 = "Fuuka?!"
10018080-66 = "I had a feeling you'd drag me into something anyway. Besides, you're not the only one who doesn't want Sparrow to disappear."
10018080-67 = "[s] \"...I know it's a bit late for alternatives, but is there really no other way?\""
10018080-68 = "Let me be honest with you, Sensei."
10018080-69 = "Cooking is a battle of capital to an extent."
10018080-70 = "Homemade meals are all about taste, but restaurants have to balance flavor with being a business."
10018080-71 = "Of course, there are restaurants who don't even try to balance that and think it's all business."
10018080-72 = "Every time I come across a restaurant like that, I get the urge to turn off the faucet."
10018080-73 = "Faucet?"
10018080-74 = "If you saw a sink overflowing with water and the faucet was still on, what would you do?"
10018080-75 = "Um, turn it off?"
10018080-76 = "And when I see a restaurant where prices exceed food quality, that's the urge I get."
10018080-77 = "...Faucets are generally easier to turn off..."
10018080-78 = "Anyway."
10018080-79 = "Normally, it would be nearly impossible for Sparrow to compete with Nyao Foods."
10018080-80 = "It can only temporarily compete on the same level because of the conditions of the contest."
10018080-82 = "Shouldn't you have started with this explanation?"
10018080-83 = "Regardless, a crisis is just an opportunity that's backwards."
10018080-84 = "So, let's just throw it in reverse, win, and get everything we want."
10018080-85 = "I don't have a single doubt about our impending success."
10018080-86 = "Please, never get into gambling, Haruna."
10018080-87 = "Why in the world would I do that?"
10018080-88 = "Gambling would only distract from gastronomy."
10018080-89 = "That's reassuring..."
10018080-94 = "Four hundred people..."
10018080-95 = "I've never cooked so much at once..."
10018080-96 = "That's what Fuuka's here for. ★"
10018080-97 = "Do you think I'm some sort of magical wish dispenser?!"
10018080-98 = "Besides, every time I cook in large quantities, I always have some kind of accident..."
10018080-99 = "Don't worry, that's where the Gourmet Research Society come in."
10018080-100 = "How?"
10018080-101 = "We can tell the difference between a teaspoon of sugar too much or a drop of soy sauce too little. We've got the tasting covered."
10018080-106 = "All you're gonna do is eat!"
10018080-109 = "So, it was Nyao Foods that bought out all the vegetables..."
10018080-110 = "I'm sorry. I hope you understand."
10018080-111 = "You had no choice. Don't worry about it."
10018080-112 = "The ingredients Nyao Foods bought have been returned, so they're available."
10018080-113 = "A competition between Sparrow and Nyao Foods using the same ingredients..."
10018080-114 = "I'm looking forward to it. Good luck."
10018080-119 = "Um, there's a problem with the ingredients..."
10018080-120 = "What's the issue?"
10018080-124 = "Ah, I see."
10018080-125 = "They're crushed. We'll have to throw away about a third of this."
10018080-126 = "This is a disaster. There's no way these should have been packaged so poorly..."
10018080-130 = "But according to the contest rules, we can't use any other ingredients..."
10018080-136 = "Looks like Operation Ruin the Ingredients by Delivering Them in a Deliberately Unsafe Manner was successful."
10018080-137 = "Good. Keep in touch. Also, we should start workshopping these names."
10018080-144 = "What's wrong with these ingredients?!"
10018080-145 = "They were only at Nyao Foods' headquarters for a few days."
10018080-146 = "They look like they've been there for a month!"
10018080-147 = "I can't believe it. They look practically expired..."
10018080-148 = "What do we do?!"
10018080-149 = "As long as Nyao Foods uses the same ingredients, it'll be a fair competition..."
10018080-150 = "But I have a feeling they won't be doing that."
10018080-155 = "It worked. Report to the higher-ups."
10018080-156 = "Operation Make the Ingredients Spoil Faster with Defunct Storage succeeded."
10018080-160 = "I thought the seasonings, at least, would be fine..."
10018080-161 = "I'd like to apologize."
10018080-162 = "Once I send an item away, it doesn't belong to me, but..."
10018080-166 = "Still, I didn't expect all the bottles to be cracked..."
10018080-167 = "A food distribution company that doesn't transport products properly... Outrageous."
10018080-168 = "Thanks for saying that..."
10018080-171 = "I guess we managed to collect the ingredients..."
10018080-172 = "Yeah..."
10018080-173 = "The contest condition was to only use ingredients obtained from this street..."
10018080-179 = "But sabotaging distribution like this..."
10018080-180 = "I have no idea what Nyao Foods is thinking..."
10018080-184 = "...but I'm thinking of ways to make them pay for this. ★"

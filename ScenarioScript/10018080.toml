[translation]
10018080-1 = "第8話;背水之陣"
10018080-4 = "如果輸了該怎麼辦啊！！！"
10018080-8 = "先冷靜下來，風華同學。"
10018080-9 = "這種事要人怎麼冷靜！！！"
10018080-10 = "料理對決……是嗎？"
10018080-11 = "和那個喵食品？#n最後由商會成員試吃分出勝負……？"
10018080-12 = "這樣的話……要準備幾人份呢？"
10018080-13 = "大約需要準備100份餐盒。"
10018080-14 = "因為御節料理是由一層層餐盒組成……"
10018080-15 = "以一個餐盒通常是3到4人份來看……"
10018080-16 = "是400人份呢★"
10018080-18 = "先讓我暈倒一下。"
10018080-19 = "不行哦，風華同學。現在對決已經開始了。"
10018080-20 = "如果是在一切發生之前還好說，事到如今可不能讓你退出。"
10018080-21 = "我一開始就是被捲進來的好不好……"
10018080-22 = "而且話說又回來，擅自接受對決的是羽留奈吧！"
10018080-23 = "把事情推給我還擺出這種態度，會不會有點太過分了？"
10018080-27 = "……"
10018080-28 = "我很抱歉，風華同學。"
10018080-32 = "咦，咦……！？"
10018080-33 = "[ns]「羽留奈……道歉了！？」"
10018080-34 = "我希望不只有自己，而是所有人都能享用美味的食物。#n因為美味的食物能帶給我們幸福。"
10018080-35 = "然而要是繼續放任喵食品的行為……"
10018080-36 = "最終所有人都將只剩下乏味的食物能夠選擇。"
10018080-38 = "我並不希望看到這樣的結果。#n同時，我也不希望看見喜愛的麻雀亭就這麼消失。"
10018080-39 = "更不希望看見這條商店街的人們，失去享用更多美食的機會。"
10018080-40 = "所以羽留奈是為了守護這條街，才會選擇接受對決的嗎？"
10018080-41 = "說的沒錯。"
10018080-42 = "而為了達成這個目標，需要我的幫助？"
10018080-43 = "……正是如此。"
10018080-44 = "……如果我拒絕羽留奈的提案，你打算怎麼做？"
10018080-48 = "到時候，我們美食研究會會自己想辦法處理的。"
10018080-49 = "[s]「能做得到嗎……？」"
10018080-50 = "老師，這不是能不能，而是做不做的問題。"
10018080-51 = "我是抱著這種程度的覺悟，才接受了與喵食品的對決。"
10018080-52 = "當然這很可能會失敗，導致最終淪為笑柄……"
10018080-53 = "但未來仍在未定之天。#n我對美食的鬥志，可不會因為這點程度的事就熄滅。"
10018080-54 = "……雖然你嘴上這麼說，要是真的發生還是會讓你很難過的吧？"
10018080-58 = "！？！？"
10018080-63 = "知道了，我也來幫忙。"
10018080-65 = "風華同學！？"
10018080-66 = "反正我早就隱約覺得事情可能會變成這樣……而且我也不希望麻雀亭就此消失。"
10018080-67 = "[s]「……事到如今說這些可能有點晚了，不過沒有其他辦法了嗎？」"
10018080-68 = "我必須坦白告訴您，老師。"
10018080-69 = "餐廳的經營，某種程度上就是資本的戰爭。"
10018080-70 = "如果只是做些家庭料理倒還好說，#n一旦牽扯到外食產業，這就是始終必須面對的問題。"
10018080-71 = "當然，世界上自然也有價格與價值不符的餐廳……"
10018080-72 = "每次只要看見那種店家，我都會難以克制想將水龍頭關上的衝動……"
10018080-73 = "將水龍頭關上……那是什麼意思？"
10018080-74 = "我舉個例子，風華同學。#n假如你看見沒人在用的洗手槽一直在流水，會有什麼想法呢？"
10018080-75 = "唔嗯……應該會想趕快關掉它吧？"
10018080-76 = "沒錯，就是這樣。#n每當我看到價格和價值不符的餐廳時，也會有那樣的衝動。"
10018080-77 = "關的方式可以再考慮一下吧……"
10018080-78 = "總之──"
10018080-79 = "從剛才討論的結果來看，麻雀亭想和喵食品競爭，原本是幾乎不可能的。"
10018080-80 = "然而多虧對方提出了那樣的條件，我們才能獲得在相同情況下一決勝負的機會。"
10018080-82 = "……這種事早點說出來不就好了。"
10018080-83 = "總之呢，危機就是轉機。"
10018080-84 = "只要在對決中獲勝，我們就能一口氣奪回失去的一切。"
10018080-85 = "況且我自始至終──都不認為我們有任何輸的可能性。"
10018080-86 = "唔嗯……你之後最好還是不要接觸賭博之類的比較好哦，羽留奈。"
10018080-87 = "這是什麼意思？"
10018080-88 = "我沒有追求美食之道以外的打算哦？"
10018080-89 = "是嗎……那就好。"
10018080-94 = "居然得準備400人份……"
10018080-95 = "我從來沒有一次準備過那麼多食物……"
10018080-96 = "那個部分，風華同學應該會想辦法解決吧★"
10018080-97 = "我又不是什麼萬能的許願機！？"
10018080-98 = "而且每次我準備大量食物的時候，總是會發生意外……"
10018080-99 = "這部分我們會盡可能提供支援，不必擔心。"
10018080-100 = "具體來說是什麼支援？"
10018080-101 = "試吃方面就交給我們吧。#n就連一匙糖、一滴醬油的差異都能分得清清楚楚！"
10018080-106 = "說半天還是只有吃而已嘛！"
10018080-109 = "結果……當時買走蔬菜的就是喵食品呢……"
10018080-110 = "抱歉啊。我們也是有苦衷的……"
10018080-111 = "您想必也別無選擇吧，請別放在心上。"
10018080-112 = "況且這次也是多虧您提供被喵食品買走的食材，我們才有辦法做料理。"
10018080-113 = "麻雀亭和喵食品，使用相同食材的料理對決啊……真讓人內心澎湃。"
10018080-114 = "我很期待唷。加油。"
10018080-119 = "哎呀，食材的狀態怎麼……？"
10018080-120 = "有什麼問題嗎……"
10018080-124 = "怎麼會這樣……"
10018080-125 = "這是怎麼回事……#n蔬菜被擠壓得亂七八糟，將近三分之一都沒辦法用了。"
10018080-126 = "真是太過分了。#n如果是平常的話，絕對不會包裝得這麼粗糙……"
10018080-130 = "嗚嗚……可是根據規則，我們不能使用其他地方採購的食材……"
10018080-136 = "「讓食材因配送問題無法使用作戰」成功。"
10018080-137 = "很好，我來稟告上級。"
10018080-144 = "給我等一下。這些食材怎麼會變成這樣？"
10018080-145 = "明明才從喵食品總部送來沒幾天……"
10018080-146 = "怎麼會糟糕到像放了一個月一樣？"
10018080-147 = "如果有做好保鮮，不應該會這樣的啊……"
10018080-148 = "該怎麼辦才好！？"
10018080-149 = "如果喵食品也是使用相同的食材，還能稱的上是場公正的對決……"
10018080-150 = "但事情真的會如此嗎……"
10018080-155 = "很好，我來稟告上級。"
10018080-156 = "「讓食材因儲存不當提早腐爛作戰」成功。"
10018080-160 = "本來還以為……調味料應該不會有問題……"
10018080-161 = "……真是非常抱歉。我代替他們向你們致歉。"
10018080-162 = "雖然我明白在收到錢之後，這些商品就不再屬於我……"
10018080-166 = "但即便如此，瓶子不僅有裂縫，甚至還出現破損……"
10018080-167 = "一間食品公司竟然這樣對待商品，真是豈有此理。"
10018080-168 = "光是能聽到您這麼說……我就很感激了。"
10018080-171 = "這樣總算……是將食材收集回來了呢。"
10018080-172 = "唔嗯……"
10018080-173 = "畢竟對方的條件是「只能使用這條商店街的食材」……"
10018080-179 = "雖然這麼說，但是像這樣把物流弄得一團亂……"
10018080-180 = "未來肯定會付出很大的代價。"
10018080-184 = "喵食品的會長，究竟在想什麼呢★"

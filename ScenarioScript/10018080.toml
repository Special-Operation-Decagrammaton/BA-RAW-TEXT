[translation]
10018080-1 = "ตอนที่ 8;ส่งออกไปแล้ว..."
10018080-4 = "ไปตกลงเองแบบนั้นได้ยังไงเล่า!!!"
10018080-8 = "ใจเย็นๆ ก่อนนะคะคุณฟูกะ"
10018080-9 = "มันใช่เรื่องที่จะมาใจเย็นได้ที่ไหนกันเล่า!!!"
10018080-10 = "แข่งขัน... ทำอาหารงั้นเหรอคะ?"
10018080-11 = "แข่งกับทางเนียวฟู้ด? แล้วสุดท้ายก็เอาไปให้สมาคมคนขายของตัดสินผล...?"
10018080-12 = "ถ้างั้น... ต้องเตรียมอาหารสำหรับกี่คนเหรอคะ?"
10018080-13 = "ตกลงกันไว้ว่าจะเตรียมเบนโตะ 100 ชุดค่ะ"
10018080-14 = "อย่างที่รู้ ปกติแล้วโอเซจิประกอบด้วยเบนโตะหลายๆ เซ็ต..."
10018080-15 = "ปกติแล้วเบนโตะหนึ่งเซ็ตก็จะสามารถทานได้ประมาณ 3-4 คน..."
10018080-16 = "เพราะงั้นจำนวนคนทั้งหมดก็คือ 400 คนสินะคะ★"
10018080-18 = "ขอเป็นลมแป๊บหนึ่งนะ"
10018080-19 = "ฟื้นขึ้นมาก่อนค่ะคุณฟูกะ ตอนนี้การแข่งขันเริ่มแล้วนะคะ"
10018080-20 = "ถ้าก่อนจะเกิดเรื่องทั้งหมดก็คงอีกเรื่องหนึ่ง แต่มาถึงขั้นนี้แล้ว พวกเราจะถอยไม่ได้แล้วค่ะ"
10018080-21 = "ก็ใช่ไง เธอไม่ใช่เหรอที่เป็นคนหาเรื่องน่ะ..."
10018080-22 = "ฮารุนะ คนที่ไปรับคำท้าตัดสินแบบนั้นมาก็คือเธอไม่ใช่รึไง!"
10018080-23 = "และคนที่โยนภาระมาให้ฉันก็คือฮารุนะนั่นแหละ!"
10018080-27 = "..."
10018080-28 = "ขอโทษจริงๆ ค่ะคุณฟูกะ..."
10018080-32 = "เอ่อ เอ๋...?"
10018080-33 = "[ns] \"ฮารุนะ... ขอโทษงั้นเรอะ?!\""
10018080-34 = "ฉันก็แค่อยากให้ทุกคนได้กินอาหารอร่อยๆ เท่านั้นค่ะ อาหารอร่อยๆ มันทำให้เรามีความสุขค่ะ"
10018080-35 = "แต่ว่าถ้าปล่อยให้พวกเนียวฟู้ดทำพฤติกรรมแบบนั้นต่อไปละก็..."
10018080-36 = "สุดท้ายก็จะกลายเป็นว่าทุกคนจะได้กินแต่อาหารรสชาติแย่ๆ ค่ะ"
10018080-38 = "ฉันไม่ชอบแบบนั้นเลย... และฉันก็ไม่อยากให้ร้านซุซุเมะที่ฉันชอบหายไปด้วยค่ะ"
10018080-39 = "และที่สำคัญก็คือ ฉันไม่อยากให้ทุกคนในย่านการค้านี้ต้องเสียโอกาสที่จะได้กินอาหารอร่อยๆ ค่ะ"
10018080-40 = "เพราะแบบนั้นฮารุนะก็เลยรับคำท้าการแข่งตัดสินเพื่อคนในย่านการค้านี้สินะ?"
10018080-41 = "ใช่แล้วค่ะ"
10018080-42 = "และในขั้นตอนการแข่งขัน เธอก็อยากให้ฉันช่วยสินะ?"
10018080-43 = "...ใช่แล้วค่ะ"
10018080-44 = "...แล้วถ้าเกิดฉันปฏิเสธคำขอนั้นล่ะ ฮารุนะคิดจะทำยังไง?"
10018080-48 = "ถ้าเป็นแบบนั้น พวกเราชมรมชิมอาหารจะลองหาทางด้วยตัวเองค่ะ ไม่ว่าจะใช้วิธีไหนก็ตาม..."
10018080-49 = "[s] \"จะเป็นไปได้เหรอ...?\""
10018080-50 = "ปัญหาไม่ได้อยู่ที่ว่าจะเป็นไปได้รึเปล่าหรอกค่ะคุณครู แต่อยู่ที่ว่าเหมาะสมรึเปล่าต่างหากค่ะ"
10018080-51 = "ฉันไม่ได้ไปรับคำท้าตัดสินกับทางเนียวฟู้ดโดยไม่ได้เตรียมใจไว้ก่อนหรอกนะคะ"
10018080-52 = "แน่นอนว่ามีโอกาสที่เราอาจแพ้และถูกหัวเราะเยาะอยู่สูงมาก แต่ว่า..."
10018080-53 = "เรายังไม่รู้สักหน่อยค่ะ อนาคตเป็นสิ่งที่ยังไม่มีใครกำหนดไว้นี่คะ เรื่องแค่นี้ ไม่ทำให้ความมุ่งมั่นใน#nอาหารเลิศรสของฉันสั่นคลอนหรอกค่ะ"
10018080-54 = "...ถึงจะพูดแบบนั้นก็เถอะ แต่ถ้าแพ้จริงๆ ก็คงจะเสียใจอยู่ดีใช่ไหมล่ะ?"
10018080-58 = "!?!?"
10018080-63 = "เข้าใจแล้ว ฉันจะช่วยเอง"
10018080-65 = "คุณฟูกะ?!"
10018080-66 = "ฉันคิดแล้วแหละว่าอาจจะกลายเป็นแบบนี้ และฉันเองก็ไม่อยากให้ร้านร้านซุซุเมะต้องปิดกิจการด้วย"
10018080-67 = "[s] \"...ครูอาจจะพูดช้าไปหน่อย แต่ว่าไม่มีวิธีอื่นแล้วงั้นเหรอ?\""
10018080-68 = "ถามตรงๆ ดีนะคะคุณครู"
10018080-69 = "อาหารมันเป็นการต่อสู้ของกำลังเงินทุนค่ะ"
10018080-70 = "ถ้าเป็นอาหารที่ทำกินกันในครอบครัวก็คงไม่เท่าไร แต่ถ้าเป็นร้านอาหารละก็ มันเป็นแบบนั้นค่ะ"
10018080-71 = "แน่นอนว่าในโลกนี้ก็มีร้านอาหารที่ไม่คุ้มค่ากับราคาที่จ่ายไปอยู่ด้วย"
10018080-72 = "ทุกครั้งที่เห็นร้านอาหารพวกนั้น ฉันก็รู้สึกอยากวิ่งเข้าไปปิดก๊อกน้ำในร้านเลยค่ะ..."
10018080-73 = "ปิดก็อกน้ำเหรอ? พูดอะไรของเธอเนี่ย?"
10018080-74 = "คุณฟูกะคะ... ถ้าเกิดเห็นก็อกน้ำที่ซิงก์ล้างจานเปิดอยู่ แล้วน้ำไหลจนท่วมแล้วจะทำยังไงคะ?"
10018080-75 = "เอ่อ... ก็คงปิดก็อกมั้ง?"
10018080-76 = "นั่นแหละค่ะ เวลาเห็นร้านอาหารที่คุณภาพไม่สมกับราคา ฉันก็รู้สึกอยากเข้าไปปิดเลยค่ะ"
10018080-77 = "...ช่วยคิดวิธีปิดวิธีอื่นเถอะ..."
10018080-78 = "ยังไงก็เถอะค่ะ"
10018080-79 = "จากการที่หารือกันต่อจากนั้น โอกาสที่ร้านซุซุเมะจะได้แข่งกันกับทางเนียวฟู้ดอย่างสูสี นั่นแทบจะเป็น#nไปไม่ได้เลยค่ะ"
10018080-80 = "แต่อีกฝ่ายเป็นคนเสนอเงื่อนไขนี้มาให้เอง ทำให้เรามีโอกาสแข่งขันกับพวกเขาได้อย่างสูสีในช่วงสั้นๆ ค่ะ"
10018080-82 = "...อธิบายมาแบบนี้ตั้งแต่แรกก็หมดเรื่อง"
10018080-83 = "แต่ว่าพอมามองอีกแง่หนึ่งก็อาจพลิกวิกฤตให้เป็นโอกาสได้นะคะ"
10018080-84 = "ถ้าเราชนะการแข่งขันนี้ ทุกอย่างก็จะกลับไปเป็นเหมือนเดิมได้ในครั้งเดียวค่ะ"
10018080-85 = "และฉันก็ไม่คิดเลยแม้แต่นิดเดียวว่าพวกเราจะแพ้การแข่งขันค่ะ"
10018080-86 = "ถ้าเป็นไปได้... อย่าได้คิดไปเล่นการพนันเลยนะฮารุนะ"
10018080-87 = "หมายความว่ายังไงเหรอคะ?"
10018080-88 = "นอกจากเส้นทางของอาหารรสเลิศแล้ว ฉันไม่คิดจะค้นหาเส้นทางอื่นหรอกค่ะ"
10018080-89 = "อืม... ดีแล้วแหละ"
10018080-94 = "อาหารสำหรับ 400 คนงั้นเหรอ..."
10018080-95 = "ฉันไม่เคยทำอาหารเยอะขนาดนั้นมาก่อนเลย..."
10018080-96 = "เรื่องนั้นฉันคิดว่าคุณฟูกะคงหาวิธีแก้ปัญหาได้อย่างแน่นอนค่ะ★"
10018080-97 = "ฉันไม่ใช่เครื่องจักรสารพัดอย่างที่ทำตามคำขอได้ทุกอย่างซะหน่อย?!"
10018080-98 = "แถมทุกครั้งที่ทำอาหารปริมาณมากๆ... มันก็มักจะต้องเกิดอุบัติเหตุอะไรขึ้นทุกทีเลยด้วย"
10018080-99 = "พวกเราจะคอยช่วยสนับสนุนเองค่ะ ไม่ต้องห่วงนะคะ"
10018080-100 = "แล้วจะช่วยทำอะไรล่ะ?"
10018080-101 = "เรื่องชิมรสชาติอาหารให้เป็นหน้าที่พวกเราได้เลยค่ะ พวกเราจะแยกความแตกต่างให้อย่างละเอียด ไม่ว่าจะเป็นรสชาติของน้ำตาลหนึ่งช้อนไปจนถึงซีอิ๊วขาวหนึ่งหยด..."
10018080-106 = "สุดท้ายก็คิดแต่เรื่องกินไม่ใช่เรอะ!"
10018080-109 = "คนที่เหมาผักพวกนั้นไปทั้งหมดก็คือเนียวฟู้ดสินะคะ..."
10018080-110 = "ขอโทษนะ ช่วยเข้าใจพวกเราหน่อยเถอะนะ"
10018080-111 = "ช่วยไม่ได้นะคะ คุณเจ้าของร้านอย่าคิดมากเลยค่ะ"
10018080-112 = "เราได้รับวัตถุดิบที่ทางเนียวฟู้ดซื้อไป แล้วก็เอามาใช้ได้แบบนี้แล้วค่ะ"
10018080-113 = "เนียวฟู้ดและร้านซุซุเมะใช้วัตถุดิบเดียวกันในการแข่งขัน... ชักตื่นเต้นแล้วสิ"
10018080-114 = "พวกเราตั้งตารออยู่นะ พยายามเข้าล่ะ"
10018080-119 = "เอ๋? แต่ว่าสภาพของวัตถุดิบนี่น่ะ...?"
10018080-120 = "มีปัญหาอะไร...."
10018080-124 = "มีปัญหาสินะ"
10018080-125 = "นี่มันอะไรกันเนี่ย ผักช้ำหมดเลย คงต้องตัดทิ้งไป 1 ใน 3 ส่วนเลยละมั้งเนี่ย"
10018080-126 = "แบบนี้มันเกินไปแล้ว ถ้าตามปกติละก็ ไม่มีทางแพ็กวัตถุดิบแบบลวกๆ อย่างนี้หรอก..."
10018080-130 = "ฮือ... แต่ว่าตามกฎการแข่งขันแล้ว เราจะใช้วัตถุดิบนอกเหนือจากนี้ไม่ได้..."
10018080-136 = "\"แผนการจัดส่งวัตถุดิบแบบหยาบๆ ทำให้วัตถุดิบเสียหาย\" สำเร็จ"
10018080-137 = "ดีละ ติดต่อไปกันเถอะ"
10018080-144 = "เดี๋ยวก่อน ทำไมวัตถุดิบถึงมีสภาพแบบนี้ล่ะ?"
10018080-145 = "เราเพิ่งส่งวัตถุดิบพวกนี้ไปที่สำนักงานใหญ่ของเนียวฟู้ดเมื่อไม่กี่วันก่อนเองนะ"
10018080-146 = "สภาพเหมือนเนื้อที่เก็บมาเป็นเดือนแล้วเลย?"
10018080-147 = "เนื้อสดใหม่กลายมาเป็นแบบนี้ไปซะแล้ว..."
10018080-148 = "จะทำยังไงดีล่ะคะ?!"
10018080-149 = "ถ้าทางเนียวฟู้ดใช้วัตถุดิบเดียวกันก็คงเป็นการแข่งขันที่ยุติธรรมล่ะ..."
10018080-150 = "ไม่รู้สิ ทางนั้นจะทำแบบนั้นแน่เหรอ...?"
10018080-155 = "เรียบร้อย รีบรายงานเร็ว"
10018080-156 = "\"แผนการจัดเก็บวัตถุดิบไว้ในห้องเก็บของเก่าๆ เพื่อให้วัตถุดิบเสียเร็ว\" สำเร็จ"
10018080-160 = "เครื่องปรุง... คิดว่าจะไม่เป็นอะไรซะอีก..."
10018080-161 = "ขอโทษจริงๆ ค่ะ"
10018080-162 = "ถึงสินค้าพวกนี้จะไม่ใช่สินค้าของฉันตั้งแต่รับเงินมาจากลูกค้าแล้วก็ตาม..."
10018080-166 = "แต่การที่ขวดแตกหมดแบบนี้..."
10018080-167 = "เป็นถึงบริษัทยักษ์ใหญ่ แต่กลับไม่รู้จักวิธีดูแลรักษาสินค้าแบบนี้ น่าขายหน้าจริงๆค่ะ"
10018080-168 = "ขอบคุณนะคะ... ที่เป็นห่วงพวกเรา"
10018080-171 = "แต่ว่า... ก็ยังดีที่รวบรวมเครื่องปรุงมาได้นะคะ..."
10018080-172 = "หืม..."
10018080-173 = "ตั้งแต่แรกแล้ว เงื่อนไขก็คือ \"ใช้วัตถุดิบที่หาได้จากในย่านการค้านี้เท่านั้น\" นี่คะ..."
10018080-179 = "ถึงอย่างนั้นก็เถอะ ถ้าขนส่งวัตถุดิบผิดพลาดแบบนี้ละก็"
10018080-180 = "ต้องได้ชดใช้ค่าเสียหายครั้งใหญ่ในภายหลังแน่นอนค่ะ"
10018080-184 = "แล้วจะทำยังไงดีคะ... กับประธานของเนียวฟู้ดน่ะค่ะ★"

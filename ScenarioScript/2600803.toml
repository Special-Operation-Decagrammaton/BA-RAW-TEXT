[translation]
2600803-1 = "到頭來，是為了什麼呢？"
2600803-6 = "（在約好的地點散步時，偶然遇見了靜子）"
2600803-7 = "啊……老師？"
2600803-8 = "你來得比我想得還要早呢。"
2600803-9 = "這樣啊……原來你這麼想我嗎？"
2600803-10 = "[s] 「靜子也來的比約定時間早呢，難道靜子也這麼想見我嗎？」"
2600803-11 = "才，才沒有那回事呢！？"
2600803-12 = "[s] 「就算是開玩笑也好令人難過……」"
2600803-13 = "請不要因為挑釁的回擊而感到失落好嗎！？"
2600803-14 = "受不了耶……！老師是大人吧……"
2600803-15 = "真是讓人不知該說什麼才好……"
2600803-16 = "[s] 「你看起來有點煩惱，發生什麼事了嗎？」"
2600803-17 = "明明是為了閒聊而見面，結果突然就進入正題了！？"
2600803-18 = "真是的，老師每次都會出乎我的意料…… "
2600803-19 = "不過……或許也正因如此吧。"
2600803-21 = "……就和老師上次說的一樣。"
2600803-22 = "我有去各家分店看過了……"
2600803-23 = "客人們的反應沒有我想得那麼好……"
2600803-24 = "[s] 「是嗎……你是指哪方面呢？」"
2600803-26 = "這只是我的感覺，或許不是問題真正的癥結點……"
2600803-27 = "但感覺問題不在餐點的味道上。"
2600803-28 = "也不是出在環境舒適度。"
2600803-29 = "從客人們的反應來看，這部分應該不會有錯……"
2600803-31 = "唔唔，問題到底出在哪裡呢……！"
2600803-32 = "感覺就像是……"
2600803-33 = "沒有以往百夜堂該有的樣子……！"
2600803-34 = "讓人覺得好煩躁！"
2600803-35 = "[s] 「先，先冷靜一下吧。」"
2600803-36 = "我現在怎麼可能冷靜得下來！"
2600803-37 = "這可是我們百夜堂的危機，而且是大危機！"
2600803-39 = "再這樣下去，各分店將會一點一點……"
2600803-40 = "一點一點失去客人的信任！"
2600803-41 = "然後狀況一定會迅速惡化。"
2600803-42 = "會謠言四起，又無法解釋清楚！"
2600803-43 = "最後百夜堂……"
2600803-44 = "將會關門大吉！"
2600803-45 = "如，如果事情變成那樣的話……！"
2600803-46 = "[s] 「沒事的！」"
2600803-48 = "怎麼會沒事！？"
2600803-49 = "[s] 「希望能沒事……！」"
2600803-50 = "你這樣說根本安慰不了人啊！嗚啊啊啊！"
2600803-51 = "[s] 「話說，靜子。」"
2600803-53 = "[ns] 「靜子，我們是不是忘了什麼？」"
2600803-54 = "……？什麼意思？"
2600803-55 = "我的社團所屬……？#n是指節慶營運管理部嗎……？"
2600803-56 = "百夜堂的工作，原本也是為了籌措舉行慶典的資金……"
2600803-57 = "……是。這職責當然很辛苦，我也會不時覺得很麻煩。"
2600803-58 = "現在還多了加盟連鎖經營……"
2600803-59 = "嘛，總之就是忙得不可開交。"
2600803-60 = "原因嗎……？當然是因為說到底……"
2600803-61 = "我很喜歡慶典……吧。"
2600803-62 = "[s] 「那應該也是原因之一，不過……」"
2600803-64 = "[ns] 「也是因為靜子喜歡人們的笑容，對吧？」"
2600803-68 = "你說得對……"
2600803-70 = "不管是費盡千辛萬苦，最終讓慶典順利舉行的時候……"
2600803-77 = "還是見到來到百夜堂的客人們，笑著向我道謝的時候……"
2600803-84 = "或是和其他成員一起努力的時候……"
2600803-86 = "……都讓我覺得我的辛苦根本都不算什麼。"
2600803-87 = "[s] 「這次創造的收益，應該也是同樣道理吧。」"
2600803-88 = "……是啊。"
2600803-89 = "我似乎搞錯優先順序了。"
2600803-90 = "對我來說什麼才是最重要的……"
2600803-91 = "被夏天的熱度沖昏了頭……"
2600803-92 = "就像是著了魔一樣……"
2600803-93 = "因為是夏天，還難得穿上泳裝，所以就想在老師面前，表現出了不起的樣子……"
2600803-94 = "……啊啊！"
2600803-95 = "[s] 「靜子……？」"
2600803-96 = "不，不是的！ "
2600803-97 = "不是那樣！所以說我是被夏天沖昏頭了！"
2600803-98 = "該說唯獨不想被老師看到我這樣子嗎，那個……！"
2600803-99 = "請，請忘記我剛才說的話吧！馬上忘記！"
2600803-107 = "喂喂喂，你們在海邊放什麼閃啊？"
2600803-108 = "你們知道我們是誰嗎 ？"
2600803-109 = "我們從幾天前就是這座島的支配者了唷？也就是你們的主人，還不快來服侍我們！"
2600803-111 = "……唉。"
2600803-113 = "啊？竟敢嘆這麼大一口氣……"
2600803-114 = "敢小看我們的人，"
2600803-115 = "一個都不放──"
2600803-116 = "（那個，能出面幫我打嗎？我實在沒辦法）"
2600803-117 = "（不不，我到現在為止從來沒有打贏任何人！這種事就是要靠氣勢啊！）"
2600803-119 = "哎呀，你們來的真是時候。"
2600803-123 = "不速之客都應該要強制驅離！"
2600803-124 = "為了讓人忘記剛剛發生的事情，我會全力以赴！"
2600803-132 = "好痛痛痛痛痛痛！這小妞在說什麼鬼話！？怎麼亂遷怒人啊！？"
2600803-133 = "投，投降！我們投降了！別再打了！"
2600803-134 = "少囉嗦！閒人勿擾沒聽過是不是！"
2600803-140 = "（費了好一番功夫才讓開始暴走的靜子冷靜下來，並將他帶回渡假聖地）"

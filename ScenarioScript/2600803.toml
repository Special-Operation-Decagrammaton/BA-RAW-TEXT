[translation]
2600803-1 = "But...What Was It For?"
2600803-6 = "I was walking along the beach where I was supposed to meet Shizuko until I spotted her."
2600803-7 = "Oh... Sensei?"
2600803-8 = "You got here super early."
2600803-9 = "Did you miss me that much?!"
2600803-10 = "[s] \"I was just worried you missed me.\""
2600803-11 = "No! Please control your imagination!"
2600803-12 = "[s] \"That kind of hurts...\""
2600803-13 = "You're the one who provoked me!"
2600803-14 = "You're an adult and a teacher, you know?"
2600803-15 = "I should be able to joke around with you, okay?!"
2600803-16 = "[s] \"Is everything okay? You seem preoccupied.\""
2600803-17 = "Why are you so observant? I just wanted to small talk my problems away."
2600803-18 = "Sensei, you need to learn to lighten up! "
2600803-19 = "Okay...I'll tell you what's on my mind."
2600803-21 = "Like you suggested, I've been observing the Momoyodou Beach Shack franchise..."
2600803-22 = "The customers... "
2600803-23 = "Well, the customers didn't seem very happy."
2600803-24 = "[s] \"In what ways?\""
2600803-26 = "Umm... It's just a hunch, so I might be wrong, but..."
2600803-27 = "They didn't have any complaints about the food...  "
2600803-28 = "And most said they really liked the decor!"
2600803-29 = "Customers seemed relaxed and content, but..."
2600803-31 = "Argh! I can hear their words in my head everywhere I go!"
2600803-32 = "They said based on the reputation of Momoyodou..."
2600803-33 = "...the Beach Shack didn't seem all that special or unique!"
2600803-34 = "I'm so upset and sad!"
2600803-35 = "[s] \"W-Wait, let's calm down, Shizuko.\""
2600803-36 = "How am I supposed to calm down?!"
2600803-37 = "This is a crisis! I feel cornered!"
2600803-39 = "This is how we lose the trust of our customers!"
2600803-40 = "Every single branch, one by one!"
2600803-41 = "Those words will spread like wildfire! "
2600803-42 = "And there's nothing we can do against the power of word of mouth!"
2600803-43 = "That would be a blow to Momoyodou's pride and brand!"
2600803-44 = "It would be a total disaster! Worse than it already is!"
2600803-45 = "If that happens... Ahhh! If that happens...!"
2600803-46 = "[s] \"It's okay! I'm sure it's not going to reach that point!\""
2600803-48 = "How can you say that so confidently?!"
2600803-49 = "[s] \"Because that's my intuition and hope?\""
2600803-50 = "That doesn't help at all! Waaaah!"
2600803-51 = "[s] \"I understand, but Shizuko.\""
2600803-53 = "[ns] \"Are we forgetting something?\""
2600803-54 = "Huh? No, I never forget anything."
2600803-55 = "My affiliation? It's the Festival Operations Department, obviously."
2600803-56 = "Momoyodou businesses are one of the ways we raise festival funds."
2600803-57 = "It's not the most efficient, and it's really hard work."
2600803-58 = "And now dealing with the Beach Shack franchising... "
2600803-59 = "The work just keeps piling up!"
2600803-60 = "Why do I keep doing all this work? Because..."
2600803-61 = "I...like festivals, I guess?"
2600803-62 = "[s] \"Yes, but can I give you my opinion?\""
2600803-64 = "[ns] \"I think making other people smile makes you happy.\""
2600803-68 = "That's...true..."
2600803-70 = "When a festival finally opens after all the difficulties that come with planning one..."
2600803-77 = "...when Momoyodou customers thank me and smile..."
2600803-84 = "...when we all band together to get through the dinner rush..."
2600803-86 = "The work doesn't seem that hard anymore."
2600803-87 = "[s] \"Maybe the profits for Momoyodou and the Beach Shack help too?\""
2600803-88 = "It definitely helps..."
2600803-89 = "But that isn't the top priority."
2600803-90 = "What I really wanted to achieve for the Beach Shack... Hm..."
2600803-91 = "I wanted it to feel like summer!"
2600803-92 = "I wanted people to be possessed by summer spirit as soon as they walked in!"
2600803-93 = "And I wanted to show off my swimsuit to you during my summer break..."
2600803-94 = "Eek... What's wrong with me?!"
2600803-95 = "[s] \"Shizuko...?\""
2600803-96 = "What?! Huh?  "
2600803-97 = "It's nothing! Forget it!  "
2600803-98 = "See! This is why I didn't want to talk about my problems."
2600803-99 = "Just forget this entire conversation right now! Hurry up!"
2600803-107 = "Hey, hey. What are you guys doing on our beach?"
2600803-108 = "You don't know who we are?  "
2600803-109 = "We're the new owners of this island. Show some respect!"
2600803-111 = "This is just what I needed. Ugh."
2600803-113 = "You givin' us attitude right now?"
2600803-114 = "We don't take disrespect from no one!"
2600803-115 = "We're gonna...we're gonna..."
2600803-116 = "(Can you fight for me? I can't do this.)"
2600803-117 = "(No, I've never won a fight! Let's just keep bluffing!)"
2600803-119 = "Actually, maybe this IS just what I needed."
2600803-123 = "Unfortunately for you, the Beach Shack has the right to refuse service!"
2600803-124 = "I'm going to take out all my frustration and embarrassment on you!"
2600803-132 = "Ouch! Aw, it stings! What are you doing?!"
2600803-133 = "I-I surrender! I give up! Stop it!"
2600803-134 = "You think you can run? Huh?! Stop right there! "
2600803-140 = "I barely managed to calm Shizuko down before returning to the dorm."

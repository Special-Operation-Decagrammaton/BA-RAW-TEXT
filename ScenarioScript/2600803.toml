[translation]
2600803-1 = "ว่าแต่... เพื่ออะไรเหรอคะ?"
2600803-6 = "(คุณครูมาเจอชิซุโกะที่ชายหาดที่นัดกันไว้)"
2600803-7 = "อ๊ะ คุณครู?"
2600803-8 = "มาเร็วกว่าที่คิดนะคะ"
2600803-9 = "หรือว่า... อยากเจอฉันขนาดนั้นเลยเหรอคะ?!"
2600803-10 = "[s] \"ชิซุโกะนั่นแหละ รีบมาเพราะคิดถึงครูเหรอ?!\""
2600803-11 = "ไม่ใช่สักหน่อยค่ะ! อย่าคิดเอาเองตามอำเภอใจสิคะ!"
2600803-12 = "[s] \"พูดแบบนั้นครูเจ็บจี๊ดเหมือนกันนะ...\""
2600803-13 = "ตัวเองแหย่มาก่อนแท้ๆ อย่ามาทำท่าเหยาะแหยะแบบนั้นสิคะ!"
2600803-14 = "คุณครูเป็นผู้ใหญ่นะคะ เป็นครูด้วย?!"
2600803-15 = "ช่างเถอะ ฉันคงพูดอะไรไม่ได้อยู่แล้วค่ะ..."
2600803-16 = "[s] \"สีหน้าดูเหมือนกังวลอะไรอยู่เลย มีอะไรรึเปล่า?\""
2600803-17 = "อึก ชวนคุยพอเป็นพิธีเสร็จก็รีบชวนเข้าเรื่องเลยนะคะ"
2600803-18 = "สมแล้วจริงๆ คุณครูนี่ไม่เบาเลยนะคะ "
2600803-19 = "เพราะงั้น... ฉันเลยค่อนข้างกังวลค่ะ"
2600803-21 = "ตามที่คุณครูบอก ฉันตระเวนไปดูร้านสาขาของร้านเฮียกคิยาโคสาขาริมทะเลมาแล้ว..."
2600803-22 = "และท่าทางของลูกค้า... "
2600803-23 = "ฉันคิดว่าไม่ค่อยดีเท่าไรเลยค่ะ..."
2600803-24 = "[s] \"ตรงไหนเหรอ...?\""
2600803-26 = "อืม... เป็นแค่ความรู้สึกของฉันอย่างเดียว มันอาจจะไม่ถูกต้องก็ได้ค่ะ"
2600803-27 = "ลูกค้าส่วนใหญ่ไม่ได้ไม่พอใจ "
2600803-28 = "ในเรื่องของอาหารหรือว่าที่พักเท่าไรค่ะ"
2600803-29 = "เมนูอาหารก็รสชาติอร่อยดี แถมบรรยากาศก็สบายดีๆ..."
2600803-31 = "อื้อ...! ฉันยังจำได้ดีเลยค่ะ!"
2600803-32 = "พวกเขาบอกว่าร้านสาขาริมทะเลนี้ก็ตามมาตรฐานของร้านเฮียกคิยาโค!"
2600803-33 = "ไม่ได้ให้ความรู้สึกโดดเด่นหรือพิเศษอะไรเลยค่ะ!"
2600803-34 = "นั่นแหละที่น่าโมโห แล้วก็น่าเสียดายด้วย!"
2600803-35 = "[s] \"จะ... ใจเย็นๆ ก่อนนะ ชิซุโกะตัน\""
2600803-36 = "ตอนนี้ฉันใจเย็นแล้วค่ะ คุณครู"
2600803-37 = "นี่คือวิกฤตอันใหญ่หลวงเลยละค่ะ!"
2600803-39 = "ถ้าเป็นแบบนี้ร้านสาขาแต่ละร้านของเรา..."
2600803-40 = "คงจะต้องเสียความไว้วางใจและความเชื่อมั่นจากลูกค้าไปแน่!"
2600803-41 = "ข่าวลือแพร่สะพัดออกไปอย่างควบคุมไม่ได้ "
2600803-42 = "ตอนนี้ฉันรับมือไม่ไหวแล้ว!"
2600803-43 = "คราวนี้ชื่อเสียงของร้านเฮียกคิยาโค..."
2600803-44 = "ถึงคราววิกฤตสุดๆ เลยค่ะ!"
2600803-45 = "ถ้าเป็นแบบนี้... แงงง ถ้าเป็นแบบนี้ร้านของเรา..!"
2600803-46 = "[s] \"ไม่เป็นไร ไม่เป็นแบบนั้นหรอก!\""
2600803-48 = "ทำไมถึงมั่นใจอะไรขนาดนั้นคะ?!"
2600803-49 = "[s] \"ถ้าคิดว่าไม่เป็นไรก็จะไม่เป็นไรไงล่ะ?!\""
2600803-50 = "ไม่ได้ช่วยปลอบใจฉันเลยสักนิดค่ะ! มุแงงง!"
2600803-51 = "[s] \"แต่ว่าชิซุโกะ...\""
2600803-53 = "[ns] \"เหมือนเราจะลืมอะไรไปรึเปล่า?\""
2600803-54 = "คะ...? ลืมอะไรงั้นเหรอคะ?"
2600803-55 = "ชมรมของฉันเหรอคะ? เอ่อ... ชมรมจัดงานเทศกาลค่ะ"
2600803-56 = "ร้านเฮียกคิยาโคเป็นหนึ่งในวิธีหาเงินสำหรับเตรียมจัดงานเทศกาลวิธีหนึ่ง..."
2600803-57 = "จริงอยู่ที่ว่ามันเป็นเรื่องลำบาก และเป็นเรื่องที่ยุ่งยากพอสมควรค่ะ"
2600803-58 = "อีกอย่าง ยังมีร้านสาขาของร้านริมทะเลอีก... "
2600803-59 = "ลำบากไม่ใช่น้อยๆ เลยค่ะ"
2600803-60 = "แต่ว่าทำไมฉันถึงทำงานนี้ต่อน่ะเหรอคะ? เรื่องนั้น..."
2600803-61 = "เพราะว่าฉันชอบงานเทศกาล... ยังไงล่ะคะ?"
2600803-62 = "[s] \"คงเพราะแบบนั้นสินะ...\""
2600803-64 = "[ns] \"แต่ครูคิดว่าเป็นเพราะชิซุโกะชอบทำให้คนอื่นหัวเราะมากกว่านะ\""
2600803-68 = "นั่นสิ...นะคะ"
2600803-70 = "ตอนที่เทศกาลจบลงไปได้ด้วยดี..."
2600803-77 = "ตอนที่คนที่มางานเทศกาลต่างพูดขอบคุณด้วยรอยยิ้ม"
2600803-84 = "ตอนที่ได้ร่วมแรงร่วมใจกับสมาชิกคนอื่นๆ..."
2600803-86 = "ความลำบากของฉันก็เป็นเรื่องเล็กน้อยไปเลยค่ะ"
2600803-87 = "[s] \"ส่วนรายได้จากร้านเฮียกคิยาโคกับร้านริมทะเลคงไม่ต้องพูดถึงเนอะ\""
2600803-88 = "นั่นสิคะ"
2600803-89 = "แต่อย่างน้อยเรื่องนั้นก็ไม่ใช่ปัญหาหรอกค่ะ"
2600803-90 = "สิ่งสำคัญสำหรับฉัน..."
2600803-91 = "อาจเป็นเพราะบรรยากาศของฤดูร้อน..."
2600803-92 = "มันมีความหมายกับฉัน..."
2600803-93 = "ไหนๆ ก็เป็นฤดูร้อน และใส่ชุดว่ายน้ำมาแล้ว เพราะงั้นฉันก็อยากจะวางฟอร์มให้คุณครูได้เห็น..."
2600803-94 = "ตายจริง ทำยังไงดีล่ะ! ทำไมฉันถึงทำแบบนี้นะ...!"
2600803-95 = "[s] \"ชิซุโกะ...?\""
2600803-96 = "คะ...คะ?! "
2600803-97 = "ปะ...เปล่าค่ะ! ไม่มีอะไรหรอกค่ะ "
2600803-98 = "มีแค่คุณครูเท่านั้นที่ฉันไม่อยากให้เห็นท่าทางแบบนี้เลย!"
2600803-99 = "คะ...คุณครูช่วยลืมไปด้วยนะคะ ลืมเดี๋ยวนี้เลย! รีบๆ ลืมเดี๋ยวนี้เลยค่ะ จงลืมบัดเดี๋ยวนี้!"
2600803-107 = "นี่ เธอน่ะ... มาทำกระโตกกระตากอะไรบนชายหาดกันหา!?"
2600803-108 = "พวกเราเป็นใครงั้นเหรอ? "
2600803-109 = "นับตั้งแต่นี้ไปพวกเราคือเจ้าของเกาะคนใหม่ จำเอาไว้ด้วยล่ะ!"
2600803-111 = "พอดีเลยนะคะ"
2600803-113 = "หา? พูดอะไรของเธอ ยัยเด็กนี่!"
2600803-114 = "นี่เยอะเย้ยพวกเรางั้นเรอะ?!"
2600803-115 = "ซัดให้เรียบ... เก็บให้หมด..."
2600803-116 = "(ช่วยสู้แทนหน่อยสิ ฉันไม่ไหวหรอก)"
2600803-117 = "(เดี๋ยวสิ ฉันไม่เคยสู้แนวหน้ามาก่อนเลยนะ! ก็แค่ตามสถานการณ์ไปเท่านั้นเอง)"
2600803-119 = "ค่ะ โชคดีจริงๆ เลยนะคะที่ได้เจอกันตอนนี้"
2600803-123 = "ตอนนี้จะทำการขับไล่คุณลูกค้าที่ไม่ได้รับเชิญไปจากร้านริมทะเลค่ะ!"
2600803-124 = "แล้วก็จะระบายอารมณ์เรื่องความทรงจำที่น่าอายนั่นด้วยค่ะ!"
2600803-132 = "อ๊ายยยย! เดี๋ยวสิ! คิดจะทำอะไรของเธอน่ะ!"
2600803-133 = "ยะ...ยอมแพ้! ยอมแพ้แล้ว! พอได้แล้ว!"
2600803-134 = "คิดว่าจะหนีพ้นเหรอ?! ไม่สิ คิดว่าจะหนีไปได้งั้นเรอะ! หยุดเดี๋ยวนี้นะ! "
2600803-140 = "(คุณครูห้ามชิซุโกะที่กำลังจะออกวิ่งตามพวกนักเลงไปเอาไว้ได้อย่างหวุดหวิด จากนั้นก็กลับไปที่ห้องพัก)"

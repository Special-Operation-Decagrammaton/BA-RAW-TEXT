[translation]
52100-1 = "ตอนที่ 10;ความทรงจำที่ไม่สมบูรณ์"
52100-3 = "ฮึ่ยยย... นางุสะจัง..."
52100-4 = "ฉันโดนคนอย่างนางุสะจัง... เล่นงานถึง 2 ครั้งเลย!"
52100-5 = "ตอนนั้นถ้าครูจากชาเล่ต์ไม่โผล่มา ไม่สิ ถ้าอายาเมะไม่มาขัดขวางไว้ ฉันก็คงไม่โดนจับได้..."
52100-6 = "ฮึ่มมม..."
52100-7 = "น่าโมโหชะมัด~!"
52100-11 = "ว่าแต่ทำไมอายาเมะถึงมาอยู่ที่นี่ได้ล่ะ? ตอนนั้นท่านโคคุริโกะทำให้อายาเมะหลุดเข้าไปในห้วงอัสดง#nแล้วนี่นา..."
52100-12 = "มีใครปลอมตัวเป็นอายาเมะงั้นเหรอ? หรือว่ามีอายาเมะอีกคนที่ฉันไม่รู้จัก?"
52100-16 = "ไม่ว่าจะเป็นยังไง... ยัยตัวดีนั่นต้องคิดทำอะไรสกปรกๆ อยู่แน่"
52100-17 = "ไม่งั้นแผนการที่ฉันตั้งใจเตรียมไว้ก็คงไม่พังลงง่ายๆ แบบนี้หรอก!"
52100-22 = "หน้าตาก็น่ารัก แต่คำพูดไม่น่ารักเลยนะเด็กน้อย"
52100-27 = "อึก... อายาเมะ...?"
52100-28 = "หืม? เราเคยเจอกันมาก่อนงั้นเหรอ?"
52100-29 = "หรือว่าเธอเป็นแฟนคลับฉัน...?"
52100-30 = "นึกไม่ถึงเลยนะว่าจะมีแฟนคลับอยู่ในเขตปกครองตนเองทางเหนือด้วย ลำบากใจจังเลยแฮะ~"
52100-34 = "ใครจะไปเป็นแฟนคลับคนอย่างเธอไม่ทราบ?!"
52100-35 = "ถ้าฉันได้หนังสือลึกลับคืนมา แค่เดี๋ยวเดียวฉันก็จัดการหัวหน้าจอมปลอมที่ใช้เฮียกกุเร็นไม่ได้#nอย่างเธอได้แล้ว..."
52100-43 = "พูดจบหรือยัง...?"
52100-49 = "อึก... โธ่เอ๊ยยยย!"
52100-52 = "หัวหน้าอายาเมะ ตกลงเรียกพวกเรามาที่นี่ทำไมเหรอ?"
52100-53 = "คงไม่ได้เรียกพวกเรามาที่นี่อีกครั้งเพื่อจะเล่นตลกโชว์ให้เด็กตัวกะเปี๊ยกที่โดนมัดไว้แต่ยังปากร้าย#nไม่เปลี่ยนให้ดูหรอกใช่มั้ย?"
52100-54 = "แน่นอนอยู่แล้ว ฉันแค่อยากตรวจสอบอะไรบางอย่างจากที่ต่อสู้กันเมื่อวานนี้น่ะ"
52100-55 = "ไหนดูซิ..."
52100-61 = "อ๊ะ หาเจอแล้ว"
52100-68 = "เศษซึคุโมะคามิที่ต่อสู้ด้วยเมื่อวานเหรอ...?"
52100-69 = "ใช่ แต่ส่วนมากมันพังหมดแล้ว จะมีก็แค่อันนี้ที่ยังเหลือเค้าเดิมอยู่"
52100-70 = "เอาละ เรนเกะ เธอมองว่ามันเหมือนอะไร?"
52100-71 = "เหมือนอะไรงั้นเหรอ... เท่าที่ดูก็เหมือนร่มเก่าๆ ที่พังไม่เป็นท่าคันหนึ่งนี่?"
52100-72 = "ใช่ ถึงมันจะค่อนข้างเก่าและผุพังไปบ้าง แต่มันก็แค่ร่มธรรมดาที่ไม่มีอะไรพิเศษ"
52100-73 = "แต่เมื่อคืนร่มคันนี้มาโจมตีเราเหมือนกับมันเป็นสิ่งมีชีวิตที่มีจิตสำนึกของตัวเองเลยละ"
52100-74 = "หนังสือลึกลับของ <ชมรมความงามของธรรมชาติ> เปลี่ยนร่มเก่าๆ คันนี้ให้เป็นสิ่งลึกลับน่าขนลุกได้#nด้วยเหรอ?"
52100-79 = "ฮึ่ม ถามอะไรโง่ๆ"
52100-80 = "ความลึกลับของหนังสือทำให้ทุกอย่างเป็นไปได้ทั้งนั้นละ! แค่ปีศาจร่มน่ะเรื่องขี้ปะติ๋ว..."
52100-81 = "งั้นแทนที่จะใช้ร่มเก่าๆ ฉันว่าสร้างซึคุโมะคามิด้วยร่มคันใหม่ที่แข็งแรงน่าจะดีกว่าหรือเปล่า?"
52100-82 = "ใส่ขาทั้งสองข้างให้ปีศาจร่มยืนและก็เดินได้อย่างมั่นคง ฟังดูแล้วก็ดูไม่เลวนะ?"
52100-86 = "อ่า... เรื่องนั้นมัน... คือว่า..."
52100-87 = "ต่อให้ไม่ตอบ เหตุผลก็ชัดเจนอยู่แล้ว"
52100-88 = "นั่นก็เพราะภาพลักษณ์ของปีศาจร่มที่คนมักนึกถึงก็คือร่มเก่าๆ ผุๆ ที่กระโดดขาเดียวยังไงล่ะ"
52100-89 = "ยัยนี่... เธอไม่ได้รู้จักหนังสือลึกลับดีไปหมดด้วยซ้ำ อย่ามาพูดอะไรไร้สาระนะ...!"
52100-90 = "เรื่องหนังสือลึกลับน่ะฉันไม่ค่อยรู้หรอก แต่ถ้าเป็นเรื่องลึกลับที่เขียนในหนังสือนั่นละก็ ฉันพอจะรู้อยู่บ้าง"
52100-91 = "เดิมทีแล้วเรื่องราวเป็นสิ่งที่เล่าอยู่คนเดียวไม่ได้หรอก แล้วสิ่งที่เล่าอยู่ฝ่ายเดียวโดยไร้คนฟังที่เข้าใจ#nสิ่งนั้นก็ไม่เรียกว่าเรื่องราวด้วย"
52100-92 = "นั่นหมายความว่าเรื่องราวจำเป็นต้องมี 'หัวข้อร่วม' ที่ทั้งคนเล่าและคนฟังมีความเข้าใจร่วมกัน"
52100-93 = "ความนึกคิดที่เป็นรูปธรรมที่ไม่ว่าใครก็เคยมี หรืออย่างน้อยก็เคยจินตนาการขึ้นมาในหัวแล้วหนึ่งครั้ง"
52100-94 = "ร่มเปียกฝนที่ถูกทิ้งขว้างไว้บนพื้นทำให้ทุกคนที่มองเห็นเกิดความรู้สึกแง่ลบเหมือนๆ กัน และทุกคนก็คงเคยเห็นของแบบนี้ เรื่องลึกลับก็เลยเกิดขึ้นได้"
52100-95 = "แต่กลับกัน ความนึกคิดที่เราไม่เคยมีประสบการณ์หรือไม่อาจเข้าใจได้ เราก็ไม่จำเป็นต้องกลัว ฉันพูดถูกมั้ยล่ะ?"
52100-99 = "......"
52100-100 = "ตอนที่ฉันเกือบจะหมดหวังกับการตามหาท่านคุซึโนฮะ ฉันบังเอิญได้ยินข่าวลืออย่างหนึ่งที่แพร่สะพัด#nไปทั่วเขตปกครองตนเอง"
52100-101 = "ข่าวลือที่ว่ามีตำนานร้อยเรื่องราวที่เปลี่ยนรูปลักษณ์ของมันไปตามคนที่ได้เห็น"
52100-102 = "ที่จริงจะมองว่านั่นเป็นแค่ข่าวลือธรรมดาๆ ก็ได้... แต่ถ้าชมรมความงามของธรรมชาติที่ใช้ตำนาน#nร้อยเรื่องราวในการล่อลวงผู้คนมีอยู่จริงละก็ ท่านหัวหน้าคุซึโนฮะในตำนานผู้เป็นคนปราบชมรมนี้ก็ต้อง#nมีอยู่จริงเหมือนกัน"
52100-103 = "ตั้งแต่นั้นมาฉันก็เลยพำนักอยู่ในเขตปกครองตนเองทางเหนือเพื่อพิสูจน์ความจริงของข่าวลือนั่น"
52100-104 = "งั้นก็สรุปว่า..."
52100-105 = "ที่ผ่านมาที่เอาแต่เก็บตัวเงียบและไม่ตอบรับการติดต่อของสมาชิกชมรม... ก็เพราะมัวแต่ตามหา#nร่องรอยของชมรมความงามของธรรมชาติกับตำนานร้อยเรื่องราวอยู่น่ะเหรอ?"
52100-106 = "อื้อ... แต่การที่ฉันไม่ติดต่อมาเลยแม้แต่ครั้งเดียว มันคงยากสินะที่จะขอให้ทุกคนเข้าใจเรื่องพวกนี้ได้"
52100-108 = "ไม่หรอก... ต้องบอกว่าการทำแบบนี้ก็สมกับเป็นหัวหน้าอายาเมะแล้วละ"
52100-109 = "เมื่อก่อนหัวหน้าอายาเมะยังเคยบอกว่าจะไปช่วยตามหาแมวที่เจ้าของทำหาย แล้วก็เข้าไปในภูเขา#nจนติดต่อไม่ได้ตั้ง 2 วันเลยนี่นา"
52100-110 = "การรับงานมาแล้วจะพักเรื่องอื่นไว้ทั้งหมดแล้วมุ่งความสนใจไปที่งานเพียงอย่างเดียวก็เป็นจุดแข็ง#nของหัวหน้าอายาเมะอยู่แล้ว"
52100-111 = "พลังขับเคลื่อนอันแน่วแน่ที่ไม่หวั่นไหวต่อปัจจัยภายนอก... นี่คือภาพลักษณ์ของผู้นำในอุดมคติ#nอย่างแท้จริงเลยเจ้าค่ะ! "
52100-112 = "อายาเมะยังคงเหมือนเดิมไม่เปลี่ยนเลยสินะ..."
52100-113 = "ถึงจะใช้เวลานานไปหน่อย แต่ว่าเราก็จับตัวนักเล่าเรื่องลึกลับของชมรมความงามของธรรมชาติได้แล้ว#nคนหนึ่ง อีกไม่นานเราคงหาฐานหลักของพวกนั้นได้แล้วละ"
52100-118 = "คิดว่าถามแล้วฉันจะยอมบอกหรือไง?"
52100-119 = "ไม่ว่าพวกเธอจะพูดอะไร ฉันก็ไม่มีวันหักหลังท่านโคคุริโกะหรอก!"
52100-123 = "อ๊ะ จะว่าไปฉันก็ลืมไปเลยนะ"
52100-124 = "อาซามิจัง ยังมีเชื้อไฟเหลือในเตาอิโรริบ้างหรือเปล่า? ฉันอยากใช้ไฟจากถ่านสักหน่อยน่ะ"
52100-125 = "ค่ะ ค่ะ...! ฉันจุดไฟให้ได้ทันทีเลยค่ะ ว่าแต่จะใช้ไฟทำอะไร..."
52100-130 = "ยะ... อย่าบอกนะว่า...?"
52100-131 = "ยะ... อย่าบอกนะ..."
52100-132 = "ยะ... อย่าบอกนะ...!"
52100-137 = "อื้อ ฉันจะทำยากิโทริกินน่ะ!"
52100-138 = "เด็กน้อยคนนี้ก็น่าจะยังไม่ได้กินอะไรเลยตั้งแต่เมื่อคืน ฉันเลยว่าจะหาอะไรง่ายๆ ให้กินสักหน่อย"
52100-146 = "หืม...? ทำไมทุกคนทำหน้าแบบนั้นล่ะ? คิดเรื่องอะไรไม่ดีกันงั้นเหรอ? "
52100-147 = "มะ... ไม่ค่ะ มันก็ไม่มีอะไรแปลกมากนักหรอก..."
52100-149 = "ไม่แปลกตรงไหน! ใครเขากินยากิโทริตั้งแต่ตอนเช้ากันบ้างเล่า!"
52100-150 = "อีกอย่างนะ ลืมคำที่ฉันเพิ่งพูดไปแล้วงั้นเหรอ? ฉันบอกไปแล้วนี่ว่าไม่ว่าพวกเธอจะพูดอะไร ฉันก็ไม่มีวันเปิดโปงเกี่ยวกับชมรมความงามของธรรมชาติเด็ดขาด!"
52100-151 = "แต่พวกเธอคิดจะติดสินบนฉันด้วยของกินนิดหน่อยเนี่ยนะ... ทำเหมือนฉันเป็นเด็กไปได้!"
52100-152 = "เปล่าสักหน่อย เป็นเด็กก็ถูกแล้วนี่..."
52100-153 = "อ้อ สงสัยจะเข้าใจอะไรผิดอยู่นะ ฉันไม่ได้จะให้ของกินเพราะต้องการอะไรตอบแทนเป็นพิเศษหรอก"
52100-154 = "ยังไงฉันก็พอวิเคราะห์ไว้บ้างแล้วละว่าฐานหลักของชมรมความงามของธรรมชาติอยู่ที่ไหน"
52100-158 = "คะ... คิดว่าพูดขู่แบบนั้นแล้วคนอื่นจะกลัวงั้นเหรอ...!"
52100-159 = "อีกอย่างนะ การกินยากิโทริในตอนเช้าไม่ใช่เรื่องแปลกสักหน่อย ฉันก็กินแบบนั้นบ่อยๆ ด้วย"
52100-160 = "เนื้อไก่ที่มีไขมันแทรกกับต้นหอมที่เผ็ดร้อนเข้ากันได้อย่างลงตัว... ยากิโทริที่ย่างพร้อมต้นหอม#nก็เลยเป็นอาหารครบเครื่องที่กินได้ไม่อั้นทุกที่ทุกเวลาเลยละ"
52100-161 = "สมแล้วที่เป็นอายาเมะ รู้ดีกว่าใครเลยนะ"
52100-165 = "จริงสิ เมื่อกี้บอกว่าชื่อชูโระจังใช่มั้ย? ชูโระจังจะกินเนื้อส่วนไหนล่ะ? เอาเป็นอกหรือน่องดี?"
52100-166 = "......"
52100-167 = "หรือว่าไม่ชอบสูตรโรยเกลือนะ? แย่แล้วละสิ ตอนนี้ไม่มีซอสทาเระเสียด้วย"
52100-171 = "หนวกหูน่า ต่อให้จะย่างมากับไก่ แต่ฉันก็ไม่มีทางเอาผักน่าขยะแขยงอย่างต้นหอมเข้าปากหรอก"
52100-172 = "ฉันเข้าใจที่เกลียดต้นหอมนะ แต่ยังไงก็ลองหลับหูหลับตากินสักครั้งเถอะน่า รสชาติและเนื้อสัมผัสของต้นหอมที่ย่างกับยากิโทริมันต่างออกไปจากทุกทีเลยนะ"
52100-173 = "อื้อ ต้นหอมย่างถ่านที่ได้น้ำมันจากเนื้อไก่มีรสชาติดีจนไม่รู้สึกว่ากินผักอยู่เลยละ"
52100-174 = "รสเผ็ดและรสขมที่ลดลงถูกแทนที่ด้วยรสหวานกับรสอูมามิ... ถ้าไม่ได้กินต้นหอมนี่ละก็ จะบอกว่าไม่คุ้มที่เกิดมาชาตินี้ก็ยังได้เลย"
52100-179 = "ไม่เอาด้วยหรอก ต่อให้เป็นคำขอของท่านโคคุริโกะฉันก็ไม่กิน"
52100-193 = "แต่เดี๋ยวก่อนนะ แล้วทำไมถึงยัดเยียดให้กินอยู่เรื่อยเลย? ฉันบอกไปแล้วนี่ว่าไม่กินต้นหอมน่ะ!"
52100-194 = "บังคับให้คนอื่นกินของที่ไม่ชอบแบบนี้... พวกคนไม่ดี!"
52100-203 = "ทุกคน แล้วก็คุณครู [USERNAME] ด้วย... ฉันขอเวลาสักเดี๋ยวได้มั้ย?"
52100-204 = "ฉันอยากถามความคิดเห็นจากทุกคนหน่อยน่ะ"
52100-214 = "[ns1] \"จู่ๆ มีเรื่องอะไรเหรอ คิเคียว?\"\n[ns2] \"มีเรื่องอยากพูดตอนนางุสะไม่อยู่เหรอ...?\""
52100-217 = "อื้อ ฉันมีเรื่องอยากพูดเกี่ยวกับหัวหน้าอายาเมะ"
52100-218 = "ส่วนรุ่นพี่นางุสะน่ะ..."
52100-219 = "ไม่สิ ต้องบอกว่ารุ่นพี่นางุสะในตอนนี้น่ะ ฉันรู้สึกว่าต่อให้พูดยังไงก็คงไม่เข้าใจ"
52100-220 = "จะว่าไป คุณครูก็รู้สึกแปลกๆ เกี่ยวกับหัวหน้าอายาเมะในตอนนี้ด้วยหรือเปล่า? ฉันเห็นคุณครูไม่พูดอะไรมาพักใหญ่แล้ว คงกำลังคิดอะไรอยู่ใช่มั้ยล่ะ?"
52100-221 = "[s3] \"ครูไม่รู้หรอกว่ามีส่วนไหนที่แปลกไป\"\n[s4] \"ครูไม่รู้หรอกว่าเดิมทีแล้วอายาเมะเป็นคนแบบไหน\""
52100-224 = "อ่า... "
52100-225 = "ขอโทษนะ ฉันคิดนู่นนี่เสียมากมาย แต่ก็ลืมคิดเรื่องนั้นไปเลย"
52100-226 = "ถ้าจะให้สรุปเลยละก็ ฉันรู้สึกว่าคำพูดกับการกระทำของหัวหน้าอายาเมะดูแตกต่างออกไปจากที่ฉันจำ#nได้นิดหน่อย"
52100-231 = "จะ... จะบอกว่ามีใครบางคนกำลังเลียนแบบหัวหน้าอายาเมะอยู่งั้นหรือเจ้าคะ?"
52100-232 = "ถึงจะยังฟันธงไม่ได้ แต่ก็มองข้ามความเป็นไปได้นั้นไม่ได้เหมือนกัน"
52100-233 = "แต่ฉันไม่เคยได้ยินว่าหัวหน้าอายาเมะมีคนหน้าเหมือนหรือมีพี่น้องผู้หญิงเลยนะ"
52100-234 = "แล้วคำพูดกับการกระทำก็ไม่ได้ต่างไปจากปกติมากเท่าไรด้วย เธอสังเกตเห็นอะไรแปลกๆ งั้นเหรอ?"
52100-235 = "ฉันเองก็ยังไม่แน่ใจมาก..."
52100-236 = "แต่ฉันรู้สึกว่าหัวหน้าอายาเมะในตอนนี้ 'ไม่มีช่องโหว่' เหมือนแต่ก่อน"
52100-238 = "ไม่มีช่องโหว่เหรอคะ...?"
52100-240 = "พูดอะไรเหลวไหลน่ะ? หัวหน้าอายาเมะก็เป็นคนแบบนั้นตลอดอยู่แล้วนี่"
52100-241 = "หัวหน้าที่สมบูรณ์แบบของเฮียกกะเรียวรันที่ไม่ว่าจะได้ภารกิจยากแค่ไหนก็ทำสำเร็จอย่างราบรื่น ไม่เคยทำหน้าบึ้งตึงต่อให้ใครวานทำเรื่องที่น่ารำคาญ... หัวหน้าอายาเมะก็เป็นคนแบบนี้อยู่แล้วนี่?"
52100-242 = "ฉันก็ยอมรับว่าถ้ามองผ่านๆ รุ่นพี่อายาเมะก็ดูเป็นคนสมบูรณ์แบบ"
52100-243 = "แต่ถึงยังไงหัวหน้าอายาเมะก็ยังมีเรื่องที่ทำได้ไม่ดีอยู่เหมือนกัน"
52100-244 = "อย่างเช่น เมื่อเทียบกับรุ่นพี่นางุสะแล้ว หัวหน้าอายาเมะเป็นคนกินอาหารค่อนข้างน้อย"
52100-245 = "หัวหน้าอายาเมะกินข้าวไม่เคยหมดสักครั้ง และก็จะโดนฉันดุบ่อยๆ ที่กินข้าวเหลือนิดหน่อยตลอด"
52100-246 = "อืม... วันนี้อาจจะหิวมากเป็นพิเศษหรือเปล่า?"
52100-247 = "อีกอย่างนะ อย่างที่เรนเกะพูดเมื่อกี้ว่าหัวหน้าอายาเมะเป็นคนที่ถ้ามีเป้าหมายอะไรก็จะทิ้งงานอื่น#nทุกอย่างแล้วพุ่งเข้าชนเป้าหมายนั้น"
52100-248 = "ถ้างั้นทำไมที่ผ่านมาหัวหน้าอายาเมะถึงไม่ไปไล่ตาม 'ตำนานร้อยเรื่องราวที่เปลี่ยนรูปลักษณ์ได้' ที่ปรากฏตัวอยู่ในเขตปกครองตนเองทางเหนือเอง แต่กลับรอให้พวกเรามาหาอยู่ตั้งนานล่ะ?"
52100-249 = "เรื่องนั้น... คงเป็นเพราะกำลังวางแผนสืบตำแหน่งฐานหลักของชมรมความงามของธรรมชาติอยู่ละมั้ง"
52100-250 = "แล้วนี่มาสงสัยว่าคนคนหนึ่งเปลี่ยนไปเพราะเรื่องเล็กๆ น้อยๆ แบบนี้มันไม่มากเกินไปหน่อยเหรอ?"
52100-251 = "ฉันก็รู้ตัวว่าตัวเองอาจจะอ่อนไหวมากเกินไปก็ได้"
52100-252 = "แต่ฉันก็อยากคิดเรื่องนี้อย่างรอบคอบเพื่อความปลอดภัยของทุกคน ก็เลยเรียกทุกคนมาเพื่อถามความ#nคิดเห็นน่ะ"
52100-259 = "ฉันไม่ได้เป็นสมาชิกของเฮียกกะเรียวรัน จะให้เสนอความคิดเห็นก็กระไรอยู่..."
52100-260 = "แต่ฉันก็มองว่ามันเป็นการยากที่จะไว้วางใจหัวหน้าอายาเมะที่จู่ๆ ก็ปรากฏตัวมาค่ะ"
52100-264 = "หัวหน้าอายาเมะบอกว่าตัวเองพำนักอยู่แถวๆ โรงเรียนสาขาเอบิสุและตามล่าตำนานร้อยเรื่องราวอยู่#nเป็นเวลาหลายเดือนก็จริง แต่ฉันไม่เคยได้ยินข่าวลือว่ามีใครเห็นนักเรียนที่ใส่เสื้อฮาโอริสีครามของ#nเฮียกกะเรียวรันแถวๆ โรงเรียนเลยค่ะ"
52100-265 = "และที่สำคัญ ถ้าตำนานร้อยเรื่องราวเปลี่ยนรูปร่างเป็นมนุษย์ได้ละก็ ฉันยิ่งคิดว่าเราควรฟังคำจาก#nคนแปลกหน้าให้มากขึ้นค่ะ"
52100-267 = "ตำนานร้อยเรื่องราวนั่นจะเปลี่ยนรูปลักษณ์เป็นสิ่งที่เรากลัวไม่ใช่เหรอ? แต่ว่าหัวหน้าอายาเมะในตอนนี้ดูห่างไกลกับความน่ากลัวมากเลยนะ..."
52100-268 = "ยิ่งไปกว่านั้น เมื่อวานหัวหน้าอายาเมะยังมาช่วยรุ่นพี่นางุสะจากวิกฤตอยู่เลย เท่านี้ก็เพียงพอที่จะพิสูจน์ว่า#nอายาเมะไม่ใช่ศัตรูแล้วนี่?"
52100-269 = "และต่อให้ทั้งหมดนี่จะเป็นกับดักที่แยบยลของชมรมความงามของธรรมชาติ... ฉันก็พร้อมรับการต่อสู้ที่จะเข้ามาอยู่แล้ว!"
52100-273 = "เรนเกะ นิสัยไม่ดีอย่างหนึ่งของเธอก็คือความบ้าบิ่นจนลืมสังเกตกับดักที่อยู่ตรงหน้านี่ละ"
52100-274 = "แต่ถึงจะเป็นตัวปลอมจริงๆ ตอนนี้เราก็ไม่มีแผนรับมืออะไรนี่?"
52100-279 = "ข้า... ไม่แน่ใจเลยเจ้าค่ะ"
52100-280 = "รุ่นพี่อายาเมะที่ข้าได้เจออีกครั้งก็ดูคล้ายคนสมบูรณ์แบบที่สดใสเหมือนแสงแดดยามเช้าอย่างที่รุ่นพี่#nคนอื่นว่ากัน..."
52100-281 = "แต่ก็อย่างที่รุ่นพี่คิเคียวพูด ใช่ว่าข้าเองก็ไม่มีส่วนที่ตะขิดตะขวงใจเลยเจ้าค่ะ"
52100-282 = "มันยากที่จะอธิบายเป็นคำพูด... แต่ความสดใสที่ข้าสัมผัสได้มันไม่เหมือนความสดใสจากแสงแดด แต่เหมือนกับความสว่างจากหลอดไฟในอาคารที่ต่อให้เข้าใกล้ก็ไม่รู้สึกว่าอบอุ่นใจ"
52100-283 = "ถ้าถามว่าข้าไว้วางใจรุ่นพี่อายาเมะในตอนนี้หรือเปล่า... ก็ต้องยอมรับว่าข้ายังกังขาอยู่เจ้าค่ะ"
52100-288 = "แต่ถึงยังไง... ใบหน้าที่เปื้อนรอยยิ้มของรุ่นพี่นางุสะในตอนนี้ก็เป็นสิ่งที่ข้าไม่ได้เห็นมานานเลยเจ้าค่ะ"
52100-289 = "ที่ผ่านมารุ่นพี่นางุสะอาจจะดูเหมือนแข็งแกร่ง แต่บางมุมก็ดูโดดเดี่ยวและเหมือนจะล้มลงได้ทุกเมื่อ#nเพราะไม่มีที่พึ่งพิง..."
52100-290 = "แต่เมื่ออยู่กับรุ่นพี่อายาเมะ รุ่นพี่นางุสะก็ดูมีความสุขและสบายใจกว่าที่เคยเป็นมาเลยเจ้าค่ะ"
52100-291 = "แม้ว่าตัวตนของรุ่นพี่อายาเมะในตอนนี้จะไม่แน่ชัดก็ตาม"
52100-292 = "แต่ข้าก็ไม่อยากเห็นรุ่นพี่นางุสะต้องกลับไปเศร้าสร้อยแบบนั้นอีกเจ้าค่ะ"
52100-293 = "ฉันก็... ไม่ได้อยากจะรังแกรุ่นพี่นางุสะหรอกนะ..."
52100-294 = "[s] \"สำหรับคิเคียวแล้ว อายาเมะเป็นคนแบบไหนเหรอ?\""
52100-295 = "สำหรับฉันน่ะเหรอ...?"
52100-296 = "หัวหน้าอายาเมะที่ฉันรู้จักเป็นคนธรรมดาที่ยอดเยี่ยมเลยละ"
52100-297 = "หัวหน้าอายาเมะเป็นผู้มากความสามารถ แถมยังเป็นมิตรกับทุกคนจนแทบจะไม่มีใครไม่ชอบเธอเลย"
52100-298 = "ถึงหัวหน้าอายาเมะจะทำได้ทุกอย่าง แต่ยังไงก็มีขีดจำกัดอยู่ดี"
52100-299 = "[s5] \"อื้อ ครูก็คิดว่าเราสมบูรณ์แบบสำหรับทุกคนไม่ได้หรอก\"\n[s6] \"ถึงภายนอกจะดูสมบูรณ์แบบ แต่นั่นอาจเป็นการแสดงให้คนอื่นเชื่อก็ได้\""
52100-302 = "ใช่ แต่ฉันไม่รู้สึกถึงความวิตกกังวลหรือความกระวนกระวายใจจากหัวหน้าอายาเมะในตอนนี้เลย"
52100-303 = "ถ้างั้น... คุณครูก็คิดว่ายังยากที่จะเชื่อใจหัวหน้าอายาเมะในตอนนี้หรือเปล่า?"
52100-307 = "[ns] \"ขอโทษนะ แต่ครูยังตอบตอนนี้ไม่ได้\""
52100-311 = "ทำไมล่ะ...?"
52100-312 = "[s7] \"โลกนี้ไม่มีมาตรฐานที่สมบูรณ์แบบสำหรับตัดสินใครหรอก\"\n[s8] \"โลกนี้ไม่มีไม้บรรทัดที่สมบูรณ์แบบสำหรับตัดสินใครหรอก\""
52100-315 = "[ns] \"ครูไม่ได้รู้จักอายาเมะดีพอที่จะ 'ได้รับ' ความไว้วางใจจากเธอน่ะ\""
52100-316 = "พูดผิดหรือเปล่า? ฉันถามว่า 'คุณ' ไว้ใจหัวหน้าอายาเมะหรือเปล่าต่างหาก"
52100-317 = "[s9] \"ครูว่าเราควรมีเวลาให้ทั้งสองฝ่ายสร้างความไว้ใจกันน่ะ\"\n[s10] \"เวลาในการสร้างความไว้ใจของเราอาจยังไม่เพียงพอน่ะ\""
52100-320 = "เวลาไม่พองั้นเหรอ..."
52100-321 = "ต่อให้จะรู้จักกันมานานแล้ว แต่เวลาในการทำความเข้าใจคนคนนั้นยังไม่เพียงพออย่างนั้นสินะ"
52100-322 = "[s11] \"ทิ้งความเห็นส่วนตัวแล้วค่อยๆ เผชิญหน้ากับคนตรงหน้าก่อนนะ\"\n[s12] \"ถึงต่อหน้าดูแล้วไม่มีอะไร แต่เบื้องหลังอาจน่าเป็นห่วงก็ได้\""
52100-327 = "เข้าใจแล้ว... งั้นฉันจะไม่ด่วนสรุปอะไรก่อน"
52100-328 = "แต่ฉันจะยังไม่หยุดสงสัยหัวหน้าอายาเมะหรอกนะ เพราะในฐานะที่ปรึกษายุทธศาสตร์ของ#nเฮียกกะเรียวรันแล้ว ฉันก็อยากกำจัดอันตรายที่อาจเกิดขึ้นออกไป"
52100-329 = "เป็นคำพูดที่สมกับเป็นคิเคียวเลยละ อย่างน้อยฉันก็วางใจได้ละนะว่าคิเคียวคนนี้ก็คือคิเคียวตัวจริง"
52100-330 = "พอรุ่นพี่พูดแบบนี้ ข้าเองก็วางใจเหมือนกันเจ้าค่ะ!"
52100-332 = "อีกอย่าง..."
52100-337 = "ถ้าทำกับรุ่นพี่นางุสะอย่างนั้นแล้วกลับมาพร้อมรอยยิ้มที่ไม่ละอายใจเลยแม้แต่น้อยละก็..."
52100-339 = "ฉันก็ยังไม่มีใจจะยกโทษให้คุณหรอก"
52100-341 = "ตอนต่อไป;เส้นทางสู่นิพพาน"

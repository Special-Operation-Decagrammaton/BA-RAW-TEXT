[translation]
52100-1 = "Episode 10;Incomplete Memory"
52100-3 = "Ugh... That Nagusa..."
52100-4 = "Nagusa? HER? That girl got me two times?"
52100-5 = "This is all Sensei's fault. No...it's Ayame's! What was she doing?"
52100-6 = "Ughhhh..."
52100-7 = "This is so annoying!"
52100-11 = "But didn't Miss Kokuriko take Ayame to the Spirit Realm...?"
52100-12 = "Maybe it's an imposter? A platinum blonde ghost?"
52100-16 = "...Whatever it is, it's a trick. I know tricks..."
52100-17 = "My plan was so perfect otherwise—!"
52100-22 = "You're quite sassy."
52100-27 = "Ugh...Ayame...?"
52100-28 = "Huh? Have we met?"
52100-29 = "Oh, it's so good to meet you. How are you?"
52100-30 = "I didn't know I had fans this far north! My, my."
52100-34 = "Who are you calling a fan?!"
52100-35 = "I'll get back that tome, and a fake president like you, who couldn't even use the Hundred Lotus will be—"
52100-43 = "...Aren't you so interesting?"
52100-49 = "Ugh... Damn it! Someone, stop her."
52100-52 = "President Ayame, please clarify your intentions."
52100-53 = "Surely you didn't call us here to hear you talk to a child?"
52100-54 = "Of course. There's just one thing I wanted to check..."
52100-55 = "Let's see..."
52100-61 = "Found it."
52100-68 = "An umbrella, formerly possessed by the Artifact Spirits...?"
52100-69 = "Yes. It's mostly broken, but at least it's kept its shape."
52100-70 = "Now, Renge. What does this look like?"
52100-71 = "Uh...a busted umbrella. Obviously."
52100-72 = "Sure. It's old and tattered, but otherwise an ordinary umbrella."
52100-73 = "Nevertheless, how did Nature's Beauty make it attack us?"
52100-74 = "How did they make this ordinary umbrella into...a monster?"
52100-79 = "Hmph, what a stupid question."
52100-80 = "Our tomes are infinite. An umbrella monster is so simple—"
52100-81 = "Wouldn't it be smarter to use a sturdy new umbrella rather than a worn umbrella to make an Artifact Spirit?"
52100-82 = "Or would you perhaps make them walk on two legs so they're more stable?"
52100-86 = "O-Oh... Well... That..."
52100-87 = "I mean, it's obvious, isn't it?!"
52100-88 = "It's so much scarier to see an umbrella monster approach you on one leg."
52100-89 = "You... You think YOU can lecture ME? It's my tome!"
52100-90 = "While I might not know a lot about tomes, I know a bit about a good ghost story."
52100-91 = "Every good story and rumor needs to be shared. That's how they gain power."
52100-92 = "Basically, a story needs a common topic that at least two people can relate to."
52100-93 = "Say...a specific image that everyone understands, or a universal experience."
52100-94 = "...Like the sadness of seeing a dripping, abandoned umbrella left on the ground."
52100-95 = "You can't fear what you can't comprehend. Am I right?"
52100-99 = "..."
52100-100 = "When I was about to give up the search for Kuzunoha, I heard a rumor floating around the district."
52100-101 = "They spoke of a monster that changed its form depending on who looked at it."
52100-102 = "I could have considered it a mere rumor... But I thought that if this monster were real, and Nature's Beauty were also real, then maybe Kuzunoha, who defeated them back in the day, is real, too."
52100-103 = "Since then, I've been staying in town to investigate the story."
52100-104 = "...Ayame."
52100-105 = "You are telling us that you abandoned your post without so much as a phone call or a text, so that you could hole up here and investigate Nature's Beauty?"
52100-106 = "...Yes. I realize that I could have called and saved you all so much trouble."
52100-108 = "Well, uh... That sort of sounds like something you would do."
52100-109 = "Remember that time you went looking for that merchant's missing cat and were gone for two days?"
52100-110 = "You've always had...tunnel vision, Ayame. You get so focused."
52100-111 = "A will stronger than steel... She possesses the disposition of an ideal leader! "
52100-112 = "...That's Ayame."
52100-113 = "It took time, but we captured this little bard. I'm sure we can convince her to show us Nature's Beauty's base."
52100-118 = "Oh, like I'd tell you chumps!"
52100-119 = "I'd never betray Miss Kokuriko!"
52100-123 = "Ah, I forgot."
52100-124 = "Azami, is there fire left on the hearth? I need hot charcoal."
52100-125 = "...Indeed! I can stoke the fire really quickly, but why do you—?"
52100-130 = "You don't mean...?"
52100-131 = "No way..."
52100-132 = "...Ayame?"
52100-137 = "Yeah! I'm in the mood for chicken skewers!"
52100-138 = "This little girl looks so hungry, and I want to make her something simple."
52100-146 = "...Hm? Why are you all looking at me like that? "
52100-147 = "...No reason. It's not a strange request..."
52100-149 = "Yes it is! Who eats chicken skewers first thing in the morning?"
52100-150 = "And did you forget what I said? No matter what, I'm not telling you anything about Nature's Beauty!"
52100-151 = "You think you can bribe me? Like I'm some stupid child?"
52100-152 = "...Isn't she a kid?"
52100-153 = "Ah, you're mistaken. I'm not trying to bribe or lure you."
52100-154 = "I already have an idea where the Nature's Beauty base is."
52100-158 = "You're bluffing!"
52100-159 = "And there's nothing strange about starting off your day with chicken skewers."
52100-160 = "The greasy chicken meat gets a fresh kick from the green onion... It's quite invigorating."
52100-161 = "Well said, Ayame."
52100-165 = "Now, Shuro, was it? Which piece would you like? Breasts? Or thigh?"
52100-166 = "..."
52100-167 = "Or, do you not like salted skewers? I'm not sure we have any sauce..."
52100-171 = "Shut it! I don't want your nasty green onions! Gross!"
52100-172 = "Try it. You might like it! Once they wilt a little from the heat, they're actually quite good."
52100-173 = "She is correct. The charcoal soaks in the fat, almost frying the onions."
52100-174 = "The spiciness and bitterness decrease, while the sweetness and the umami flavors are enhanced... Shuro, you must trust Ayame's skill."
52100-179 = "No. Even if it were Miss Kokuriko, I'd never eat any gross green onions!"
52100-193 = "Wait, what are you doing with that stick? I said I don't want any!"
52100-194 = "Force-feeding me something I hate... You villains! This is torture!"
52100-203 = "Everyone. And [USERNAME] Sensei... May I have a moment?"
52100-204 = "I'd like to ask you all something...while they are occupied with chasing that child."
52100-214 = "[ns1] \"What's up, Kikyou?\"\n[ns2] \"You don't want Nagusa to hear?\""
52100-217 = "Yes. Clearly, it is a shock to see President Ayame here."
52100-218 = "And Nagusa..."
52100-219 = "I intuit that she will not be receptive to what I have to say."
52100-220 = "Did you sense something...off...with Ayame? You were so quiet. I suspected that you noticed."
52100-221 = "[s3] \"I don't know about 'off.'\"\n[s4] \"This is the first time I've met her.\""
52100-224 = "...Ah. "
52100-225 = "Of course. Perhaps that was too much to ask of you."
52100-226 = "To be frank, I feel that THIS President Ayame is acting unlike the girl I remember."
52100-231 = "A-Are you saying that this is some sort of imposter?"
52100-232 = "I am not certain, but I would not rule out the possibility."
52100-233 = "But she looks just like her. And it's not like Ayame had a twin."
52100-234 = "And from what I saw, she seemed like her usual self. What didn't you like?"
52100-235 = "Once more, I am not certain..."
52100-236 = "...But President Ayame seems...too perfect."
52100-238 = "Too perfect...?"
52100-240 = "Oh, honestly! That's just Ayame! She was always on another level."
52100-241 = "She'd take on any mission with a smile, never complaining. She was the perfect President, a legend!"
52100-242 = "I agree that President Ayame seemed quite flawless at first glance."
52100-243 = "However, even President Ayame had preferences and flaws."
52100-244 = "For example, President Ayame was a picky eater, unlike Nagusa."
52100-245 = "She never finished her bowl, and always left a bit of rice. I nagged her about it constantly."
52100-246 = "Maybe she was just extra hungry today?"
52100-247 = "And also, as Renge said, if Ayame was truly so focused and strong-willed..."
52100-248 = "...Then why didn't she personally investigate and stop this shapeshifting monster? It has been here for two weeks, and she waited all this time?"
52100-249 = "That's... She was playing the long game. She said she was looking for the Nature's Beauty base."
52100-250 = "Must you always be so skeptical?"
52100-251 = "I understand that I may be overreacting."
52100-252 = "But I do care about our safety, so I wanted to hear your opinions."
52100-259 = "Well, I realize that I'm not in the Hyakkaryouran..."
52100-260 = "But I find it difficult to trust President Ayame completely, given that she appeared so suddenly."
52100-264 = "Ebisu truly is not a busy town. If she's been here for months, then why haven't I seen her? No one's mentioned seeing some sunny girl in a blue haori."
52100-265 = "Most importantly, we know that the shapeshifting monster can take on a person's form."
52100-267 = "True, but it is also supposed to take the shape of a person's greatest fear. But nothing about this Ayame is scary."
52100-268 = "And this Ayame saved Nagusa! Clearly, she's on our side."
52100-269 = "Even if this is all a clever trap by Nature's Beauty...we still have to see this play out! I'm not scared!"
52100-273 = "...Once more, your relentless passion blinds you to obvious traps."
52100-274 = "Well, what do you want to do, Kikyou? Besides ruin the mood?"
52100-279 = "Please...cease the fighting."
52100-280 = "This Ayame did seem quite perfect, as bright and sunny as her reputation."
52100-281 = "But Kikyou brings up valid concerns."
52100-282 = "It's hard to pinpoint exactly... While I agree that she is bright and happy, she lacks a certain warmth. She reminds me of...an electric candle."
52100-283 = "I confess that I, Yukari, find it difficult to offer her my full trust."
52100-288 = "...But Nagusa seems so happy! She smiled..."
52100-289 = "She has been so forlorn over these past few days. There has been a muted loneliness to her, even as she stands by our sides."
52100-290 = "But...this Nagusa seems so happy and relieved."
52100-291 = "Even if we don't fully trust Ayame..."
52100-292 = "...I can't bear to see her be sad again!"
52100-293 = "Well... Of course I don't want her to be sad..."
52100-294 = "[s] \"Who was Ayame to you, Kikyou?\""
52100-295 = "To me...?"
52100-296 = "Let's see. The President Ayame I knew, was exemplary for sure, but...human."
52100-297 = "She was extremely talented and possessed a wide breadth of skills. She was kind to everyone, so almost everyone liked her."
52100-298 = "But even SHE had her limits."
52100-299 = "[s5] \"Right. No one is loved by everyone.\"\n[s6] \"...Even if she seemed perfect, it was likely an act.\""
52100-302 = "Yes. But I did not feel this same uncertainty back then, and certainly not this unease."
52100-303 = "...So, do you see why I find it difficult to trust her? Do you trust her?"
52100-307 = "[ns] \"I'm sorry, but I can't answer that.\""
52100-311 = "...Why?"
52100-312 = "[s7] \"Just like there's no such thing as a perfect person...\"\n[s8] \"There's no perfect way to judge someone's character.\""
52100-315 = "[ns] \"I don't know her well enough to say.\""
52100-316 = "Sensei, the question was clear. I asked if you trust President Ayame."
52100-317 = "[s9] \"Trust is something we'd have to build together.\"\n[s10] \"We'd need to know each other better.\""
52100-320 = "...There's not enough time."
52100-321 = "I knew her for so long. Was that not long enough for me to...truly understand her?"
52100-322 = "[s11] \"Let's put aside our opinions for now.\"\n[s12] \"Let's keep our eyes and minds open.\""
52100-327 = "...Very well. I shall delay my judgment."
52100-328 = "But I hold my suspicions. As an officer of the Hyakkaryouran, I refuse to be ambushed by danger."
52100-329 = "That sounds like you. At least we know Kikyou isn't an imposter!"
52100-330 = "Now THAT is reassuring!"
52100-332 = "And still..."
52100-337 = "...I saw that shameless smile. Acting like all is well, even after you devastated Nagusa..."
52100-339 = "...I'm not ready to forgive."
52100-341 = "Next Episode;The Path to the Beyond"

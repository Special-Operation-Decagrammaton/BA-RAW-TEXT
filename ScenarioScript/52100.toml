[translation]
52100-1 = "第10話;不完整的記憶"
52100-3 = "可惡……竟然被名草那種傢伙……"
52100-4 = "被名草那種咖……連續打敗兩次！"
52100-5 = "要是當時夏萊的老師沒有突然出現……#n或者菖蒲沒有跑來礙事的話，我怎麼可能會被抓住……！"
52100-6 = "唔唔唔……"
52100-7 = "氣死我了～！"
52100-11 = "不過話又說回來，菖蒲怎麼會出現在這裡？#n真正的菖蒲應該那時就被雛罌粟大人打入黃昏了才對……"
52100-12 = "難道是有人在冒充菖蒲？#n還是其實還有另一個我不知道的菖蒲？"
52100-16 = "……不管是哪一種，那女人肯定用了什麼卑鄙的手段。"
52100-17 = "否則我精心準備的計畫，怎麼可能這麼輕易就被毀掉──！"
52100-22 = "跟外表不同，你的嘴巴還真毒呢，小不點同學。"
52100-27 = "……菖蒲？"
52100-28 = "嗯？我們以前有見過嗎？"
52100-29 = "還是你其實是我的粉絲……？"
52100-30 = "沒想到居然連北方自治區也有，真讓人困擾呢～"
52100-34 = "誰是你這種女人的粉絲啊！？"
52100-35 = "像你這種連百蓮都駕馭不了的冒牌委員長，等我奪回怪書之後一招就能──"
52100-43 = "……你想說的只有這些嗎？"
52100-49 = "唔唔……真是氣死我了！"
52100-52 = "菖蒲委員長，你來這裡到底有什麼事？"
52100-53 = "總不會只是想讓我們看你跟被綁得死死的小不點鬥嘴吧？"
52100-54 = "當然不是。#n我只是想確認昨天戰鬥中的一件事而已。"
52100-55 = "我看看……"
52100-61 = "啊，找到了。"
52100-68 = "那是昨天戰鬥過的幻魎付喪神的殘骸……？"
52100-69 = "嗯，雖然大部分都碎了，只有這個還勉強保留了形狀。"
52100-70 = "來，蓮華。你覺得這看起來像什麼？"
52100-71 = "要說像什麼的話……看起來就只是把破破爛爛、到處都斷裂了的舊傘吧？"
52100-72 = "沒錯。這只是把破舊又平凡的傘而已。"
52100-73 = "可是昨晚它卻像擁有自我意識的生物一樣，瘋狂地攻擊我們。"
52100-74 = "花鳥風月部的怪書，究竟是怎麼讓這把舊傘變成怪異的？"
52100-79 = "哼，問這什麼蠢問題。"
52100-80 = "怪書的神祕力量可是無所不能的！#n區區傘妖怪隨便都能──"
52100-81 = "既然如此，為什麼不用更結實的新傘來製造付喪神呢？"
52100-82 = "或者乾脆多給它兩條腿，好讓它能站得穩定一點之類的？"
52100-86 = "這，這個嘛……"
52100-87 = "就算你不回答，答案也很明顯。"
52100-88 = "因為在人們的想像中，傘妖怪的形象就是老舊、破爛、單腳跳的傘。"
52100-89 = "你這傢伙……明明根本不懂怪書還敢在這裡胡扯──！"
52100-90 = "怪書我確實不懂，不過記載在怪書裡的怪談──那些故事，我多少還是知道的。"
52100-91 = "故事本來就是無法一個人獨享的東西。#n沒有觀眾的獨白，就不能被稱之為故事。"
52100-92 = "換句話說，故事需要能夠產生共鳴、相互理解的「共同話題」。"
52100-93 = "也就是任何人都可能經歷過，或者至少在心裡想過一次的具體印象。"
52100-94 = "例如看見被雨淋濕、倒在地上的傘時，心裡會浮現的負面情緒……"
52100-95 = "無法產生共鳴的印象，自然也不會令人感到恐懼了對吧？"
52100-99 = "…………"
52100-100 = "就在我幾乎放棄尋找葛葉大人的時候，偶然聽說了自治區附近流傳的一個傳聞。"
52100-101 = "說是出現了模樣會隨著觀看者改變的百物語。"
52100-102 = "雖然可以把這單純視為謠言……#n但如果能操縱百物語、迷惑人心的花鳥風月部真的存在的話，#n那麼曾經討伐它的委員長葛葉大人，肯定也不是虛構的才對。"
52100-103 = "因此在那之後，我才會為了查明傳聞的真相而一直留在北方自治區。"
52100-104 = "也就是說……"
52100-105 = "你這段時間之所以音訊全無，是因為忙著在這裡追查花鳥風月部和百物語的線索？"
52100-106 = "……嗯。不過完全沒有聯絡這點，果然還是很難讓人諒解吧。"
52100-108 = "這個嘛……該說很像菖蒲委員長的作風嗎。"
52100-109 = "以前你不也曾經為了尋貓的委託而跑進山裡，結果失聯了整整兩天嗎？"
52100-110 = "一旦接下任務就會拋下一切……我覺得這也是菖蒲委員長的優點吧。"
52100-111 = "不受外力動搖的堅定行動力……真是理想的領袖風範！"
52100-112 = "……菖蒲果然還是一樣呢。"
52100-113 = "雖然花了一些時間，不過既然抓到了花鳥風月部的怪談家，#n應該很快就能找到他們的根據地了吧。"
52100-118 = "你們以為我會乖乖說出來嗎？"
52100-119 = "不管你們說什麼，我都不會背叛雛罌粟大人的！"
52100-123 = "啊，差點忘了。"
52100-124 = "薊同學，火爐裡還有餘火嗎？#n我想稍微借用一下。"
52100-125 = "……有，有的！#n火馬上就能生起來，但你打算做什麼──"
52100-130 = "難，難道說……？"
52100-131 = "該，該不會……"
52100-132 = "難，難不成……！"
52100-137 = "嗯，要來烤雞肉串！"
52100-138 = "這孩子從昨晚開始什麼都沒吃，我想幫他弄點東西。"
52100-146 = "……你們為什麼要露出那種表情？是不是想歪了？"
52100-147 = "沒，沒什麼。其實這也不奇怪……"
52100-149 = "明明就很奇怪好不好！誰會一大早就吃雞肉串啊！"
52100-150 = "還有你是不是忘記我剛剛說過什麼了？#n無論你們怎麼做，我都絕對不會透露花鳥風月部的事！"
52100-151 = "居然以為用食物就能收買我……是把我當成小孩嗎！？"
52100-152 = "不是，你本來就是小孩吧……"
52100-153 = "啊，你好像誤會了。#n我並沒有想用食物換情報的意思。"
52100-154 = "畢竟花鳥風月部的根據地在哪裡，我已經大概知道了。"
52100-158 = "哼，裝模作樣的想嚇唬誰啊……！"
52100-159 = "而且早上吃雞肉串一點也不奇怪。#n我就經常這樣吃啊？"
52100-160 = "油嫩的雞肉配上微辣的蔥堪稱絕配……#n烤蔥雞肉串可是隨時都能吃的完美食物啊。"
52100-161 = "不愧是菖蒲，果然內行。"
52100-165 = "來吧，棕櫚醬喜歡哪個部位？#n雞胸肉還是雞腿肉？"
52100-166 = "……"
52100-167 = "還是你不喜歡鹽味？#n那就有點麻煩了呢，我現在手邊沒有醬汁……"
52100-171 = "吵死了。就算跟雞肉一起烤過，我也絕不會碰那種噁心的蔥。"
52100-172 = "就算平常不喜歡蔥也試試看吧。#n跟雞肉一起烤過之後，味道和口感會變得完全不同哦。"
52100-173 = "沒錯沒錯。吸滿雞油再用炭火烤過的蔥，風味可是濃郁到像是另一種蔬菜呢。"
52100-174 = "本來的辣味和苦味都被甜味和鮮味給取代……#n如果不吃的話，要說半輩子都白活了也不為過。"
52100-179 = "不要不要！就算雛罌粟大人拜託我，我也不會吃的！"
52100-193 = "等一下，你們為什麼一直要我吃啊？就說了我不吃蔥！"
52100-194 = "居然強迫別人吃討厭的東西……你們這些惡棍！"
52100-203 = "大家，還有[USERNAME]老師……能借一步說話嗎？"
52100-204 = "我想徵詢大家的意見。"
52100-214 = "[ns1] 「怎麼這麼突然，桔梗？」\n[ns2] 「難道是想在名草不在的時候說什麼……？」"
52100-217 = "嗯。我想聊聊有關菖蒲委員長真實身分的事。"
52100-218 = "名草前輩他……"
52100-219 = "不，現在的名草前輩給人一種「就算說了也不會理解」的感覺。"
52100-220 = "老師是不是也覺得菖蒲委員長的樣子有股違和感？#n看你剛才一直保持沉默，好像若有所思的樣子。"
52100-221 = "[s3] 「違和感啊……我也不是很確定。」\n[s4] 「畢竟我不清楚以前的菖蒲是什麼樣子。」"
52100-224 = "……啊。"
52100-225 = "抱歉。我剛才思緒有點雜亂，所以沒考慮到這點。"
52100-226 = "直接從結論說起吧。#n我覺得菖蒲委員長的言行，跟記憶中的他有點不同。"
52100-231 = "難，難道有人在假扮菖蒲委員長！？"
52100-232 = "目前還無法斷言，但也不能排除這種可能性。"
52100-233 = "可是我從沒聽說過有和菖蒲委員長長得一模一樣的學生或姐妹……"
52100-234 = "而且在我看來，他的言行就跟以前差不多。#n有什麼奇怪的地方嗎？"
52100-235 = "我也還不能確定……"
52100-236 = "……只是覺得菖蒲委員長他，好像變得比以前更「完美」了。"
52100-238 = "更完美……？"
52100-240 = "不不不，菖蒲委員長不是一直都很完美嗎？"
52100-241 = "任何困難的任務都能輕鬆解決，面對多麼麻煩的請求都不會皺眉──#n這不就是百花繚亂的完美委員長菖蒲前輩嗎？"
52100-242 = "當然，我也承認菖蒲委員長看起來確實是個接近完美的人。"
52100-243 = "但他同樣也有不擅長或感到棘手的事情。"
52100-244 = "就比如他和名草前輩不同，食量相對偏小。"
52100-245 = "吃飯的時候總是吃不完，還因為剩飯被我唸過好幾次。"
52100-246 = "這……今天可能單純只是餓壞了吧？"
52100-247 = "還有就像剛才蓮華說的一樣，#n如果菖蒲委員長是一旦確立目標就會不顧一切達成的個性……"
52100-248 = "他又為何沒有主動追查出沒於北方自治區的「變形百物語」，#n而是等著我們與他會合呢？"
52100-249 = "這個嘛……他可能是打算先掌握花鳥風月部的據點吧。"
52100-250 = "只憑這些小細節就懷疑他變了，會不會有點反應過度了？"
52100-251 = "我也明白這可能只是我太敏感了。"
52100-252 = "但是為了大家的安全，我還是希望謹慎一點……大家的意見如何？"
52100-259 = "我並非百花繚亂的成員，因此這麼說或許有點冒昧……"
52100-260 = "但我也認為，要完全信任突然出現的菖蒲委員長實在有些困難。"
52100-264 = "雖然他表示自己這幾個月來，一直都在惠比壽分校附近追查百物語……#n可是我從來沒聽說有人見過身穿百花繚亂水藍羽織的學生。"
52100-265 = "更何況百物語也能化成人形，我覺得還是對陌生人保持警惕比較好。"
52100-267 = "但百物語不是會變成人們害怕的模樣嗎？#n現在的菖蒲前輩看起來一點也不讓人感到害怕……"
52100-268 = "而且菖蒲前輩昨晚救了陷入危機的名草前輩也是事實……#n光憑這點，應該就足以證明他不是敵人了吧？"
52100-269 = "就算這一切都是花鳥風月部設下的陷阱……#n既然他們都主動來挑釁了，正面迎戰才更讓人熱血沸騰啊！"
52100-273 = "……只顧熱血而忽略眼前的陷阱，你的老毛病還是跟以前一樣呢，蓮華。"
52100-274 = "反正我們現在不是也沒有具體的對策嗎？"
52100-279 = "小女子……不太確定。"
52100-280 = "許久不見的菖蒲前輩，確實像其他前輩說的一樣明亮而完美……"
52100-281 = "但是就如桔梗前輩所說，的確讓人有點在意。"
52100-282 = "要用言語形容或許不太容易……#n他給人的印象雖然跟陽光一樣燦爛，彷彿看不見任何陰影……#n卻讓人有股置身在室內燈光之下，即便靠得再近也感受不到溫暖的感覺。"
52100-283 = "要說是否信任現在的菖蒲前輩……小女子實在難以斷定。"
52100-288 = "……不過名草前輩的那股笑容，我真的很久沒見過了。"
52100-289 = "之前的名草前輩雖然看似堅強，#n卻總是有種孤獨、無助，好像隨時會倒下的感覺……"
52100-290 = "但是跟菖蒲前輩在一起時的名草前輩，看起來比任何時候都幸福而安心。"
52100-291 = "即便現在菖蒲前輩的身分存疑……"
52100-292 = "小女子也不想再看見名草前輩露出那種悲傷的表情了。"
52100-293 = "我也同樣……不希望名草前輩再感到痛苦。"
52100-294 = "[s]「對桔梗來說，菖蒲是怎麼樣的人呢？」"
52100-295 = "對我來說……？"
52100-296 = "……我所認識的菖蒲委員長，是個優秀的人。"
52100-297 = "擁有無論什麼工作都能勝任的才能，對任何人都很親切……因此幾乎沒有人討厭他。"
52100-298 = "但即便是菖蒲委員長也並非無所不能──他也是有極限的。"
52100-299 = "[s5] 「嗯。我也認為世上並沒有完美的人。」\n[s6] 「……就算看起來完美，也可能只是裝作如此而已。」"
52100-302 = "沒錯。不過從現在的菖蒲委員長身上，卻絲毫感受不到先前那種不安與焦躁。"
52100-303 = "所以老師你……也認為現在的菖蒲委員長難以信任嗎？"
52100-307 = "[ns] 「抱歉，這個問題我現在無法回答。」"
52100-311 = "……為什麼？"
52100-312 = "[s7] 「因為世上沒有完美的人。」\n[s8] 「也沒有判斷人的完美標準。」"
52100-315 = "[ns] 「我對菖蒲的了解，還不足以『獲得』他的信任。」"
52100-316 = "你是不是誤會了？#n我剛才問的是「你」是否信任菖蒲委員長。"
52100-317 = "[s9] 「信任通常是雙方一起建立的關係。」\n[s10] 「也許我們還沒有足夠的時間去建立它。」"
52100-320 = "沒有足夠的時間……"
52100-321 = "明明已經認識了這麼久，卻還是無法真正了解一個人嗎……"
52100-322 = "[s11] 「先暫且放下成見，好好面對眼前的他吧。」\n[s12] 「表面上或許看似完美，背後也可能存在危險的一面。」"
52100-327 = "……好吧。這個判斷我先暫時保留。"
52100-328 = "不過我不會停止懷疑菖蒲委員長。#n身為百花繚亂的參謀，我必須盡可能排除所有風險。"
52100-329 = "聽見這麼有桔梗風格的話，我就放心了。#n桔梗果然還是桔梗。"
52100-330 = "既然前輩都這麼說了，小女子也感到十分放心！"
52100-332 = "除此之外……"
52100-337 = "讓名草前輩變成那樣，居然還敢若無其事地笑著回來……"
52100-339 = "我還無法原諒他。"
52100-341 = "下一話;通往彼岸之路"

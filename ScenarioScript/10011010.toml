[translation]
10011010-1 = "第1話;交流會START！"
10011010-4 = "[ns]「約好的地點應該就在這附近……」"
10011010-5 = "啊，部長！#n發現主公了！"
10011010-9 = "哦，老師大人～！這邊這邊～！"
10011010-10 = "老，老師，你好……"
10011010-11 = "[s]「大家好呀。都準備好了嗎？」"
10011010-12 = "當然！很完美！"
10011010-13 = "伊樹菜也全力進行了準備！具體來說就像是心態的鍛鍊之類的！"
10011010-14 = "我，我早上，也有先吃過腸胃藥了……"
10011010-15 = "月夜也真是的，不用那麼緊張啦！"
10011010-16 = "[s]「總覺得三千留好像比之前見面的時候更有活力呢。」"
10011010-17 = "是嗎？#n……不過我可能真的有點興奮。"
10011010-18 = "畢竟只要認真協助這場交流會，說不定就能成為正式的社團啊！"
10011010-19 = "光是想像就讓人忍不住高興了起來……得好好努力才行！"
10011010-20 = "居，居然是百鬼夜行和格黑娜學園的交流會……"
10011010-21 = "這種活動，我還是第一次參加……覺得，有點心跳加速……"
10011010-22 = "[s]「沒想到事情會變成這樣呢。」"
10011010-26 = "（一週前，在佳穗的帶領下來到了陰陽部）"
10011010-30 = "[ns]「真是個莊嚴的空間……」"
10011010-31 = "不，不能掉以輕心哦老師大人！#n畢竟不管怎麼說，對方可是那個陰陽部的部長！"
10011010-32 = "我也，曾經，聽說過……陰陽部的部長，只靠話術就能勾走別人的魂魄……"
10011010-33 = "主公，別擔心！主公的安全就由伊樹菜來保護！"
10011010-34 = "……各位好像有什麼誤會呢。"
10011010-38 = "咦……有客人？"
10011010-43 = "哎呀，知世醬。"
10011010-44 = "……咦？"
10011010-48 = "[ns]「……知世？」"
10011010-52 = "在煙霧之中"
10011010-53 = "突如其來的相遇"
10011010-54 = "嚇了我一跳"
10011010-55 = "……老師過的好嗎？"
10011010-56 = "[s]「啊，嗯。很好哦。」"
10011010-57 = "哦哦哦……！#n知，知世大人的俳句，竟然能直接……！"
10011010-58 = "唔，知世醬真可愛……"
10011010-59 = "[s]「知世依然很受歡迎呢……」"
10011010-60 = "咳哼，我失禮了。"
10011010-61 = "仁耶大人，客人已經抵達了。"
10011010-70 = "哎呀哎呀哎呀～"
10011010-77 = "哼嗯～哦……"
10011010-85 = "呼呣呼呣。"
10011010-86 = "臉蛋基本上是我的菜，或者說是好球……不，這樣反而出局嗎？"
10011010-88 = "話雖如此，嗯……也許還算有趣。"
10011010-89 = "[s]「那個……」"
10011010-90 = "仁耶大人，這樣很失禮的。"
10011010-91 = "喵哈哈，佳穗還是一如既往的死板呢～"
10011010-92 = "咳哼。"
10011010-97 = "我的名字叫天地仁耶，擔任陰陽部的部長。#n嗯？我的姿態放太高了？並非如此，情況正好相反。"
10011010-98 = "是因為容器太小，才會導致我看起來很高傲而已。畢竟我可是相～當了不起的人呢。#n但話雖如此，我很高興見到你哦，夏萊的老師♪"
10011010-99 = "[s]「我也是，很高興見到你，仁耶。」"
10011010-100 = "喵哈哈，真是正經的反應呢。"
10011010-101 = "原來如此原來如此，這就是夏萊的老師……"
10011010-102 = "與老師有關的傳聞，我已經聽到耳朵都快長繭了哦～#n聯邦學生會長失蹤之後，在各處都有活躍的表現……諸如此類的傳聞。"
10011010-103 = "[s]「我只是幫了點小忙而已。」"
10011010-104 = "呵呵，那樣正好。#n既然如此，可否請老師也幫我們一個忙呢？"
10011010-105 = "為此，該從哪裡開始說明比較好呢……老師對我們「陰陽部」了解到什麼程度呢？"
10011010-106 = "[s1]「我好像聽說過，是類似百鬼夜行學生會的組織……」\n[s2]「我記得有擔任行政職務之類的……？」"
10011010-109 = "唔呵呵～雖然這麼說也沒錯，不過在對我們的認知這方面似乎稍微有些出入呢。"
10011010-110 = "這個百鬼夜行聯合學園是由無數聯合團體組成的學校……"
10011010-111 = "……因此並不存在如所謂的「學生會」一樣「立於頂點的組織」。"
10011010-112 = "[s]「那陰陽部是……？」"
10011010-113 = "喵哈哈，並沒有高高在上哦。#n只是在退後一步的位置支持著百鬼夜行的歷史與傳統的存在，因而受到尊敬而已……"
10011010-119 = "畢竟組織一旦變得龐大，就勢必要有人擔任這個職位。#n就是這樣而已～"
10011010-120 = "[s]「原來如此……」"
10011010-121 = "但實際上說不定就和偶像差不多哦，比方說要舉行表演或是做占卜節目之類的～"
10011010-122 = "喵哈哈，像知世就特別受歡迎對吧～？"
10011010-123 = "對吧～？"
10011010-124 = "……是嗎？"
10011010-125 = "仁耶大人，請回歸正題。"
10011010-126 = "哎呀～佳穗真愛吃醋呢～#n佳穗當然也有很多隱藏的粉絲唷？"
10011010-127 = "仁，仁耶大人……！"
10011010-128 = "喵哈哈～"
10011010-129 = "那麼我就直接切入正題吧。"
10011010-131 = "一週後……我們「百鬼夜行聯合學園」與「格黑娜學園」預計將舉行一場交流會。"
10011010-132 = "[s]「……格黑娜？」"
10011010-134 = "是的。"
10011010-136 = "此事獲得了格黑娜學園的領導者「萬魔殿」的爽快贊同。"
10011010-138 = "因此將在「百鬼夜行漩渦電影村」招待來自格黑娜的客人們。"
10011010-139 = "並且這次還預計將特別……"
10011010-140 = "舉辦我們陰陽部引以為傲的表演──《和樂公主》。"
10011010-141 = "[s]「和樂公主……？」"
10011010-143 = "老師大人，你難道不知道和樂公主嗎！？"
10011010-144 = "漩渦電影村雖然有很多表演節目，#n但《和樂公主》在那之中也是非常受歡迎的哦！"
10011010-145 = "而且更重要的是，《和樂公主》的主角是知世大人！#n能盡情欣賞那位百鬼夜行最頂尖的偶像知世大人有多麼可愛的美妙節目……！"
10011010-146 = "……？"
10011010-147 = "三千留同學，請稍微控制一下音量……"
10011010-148 = "唔呵呵，你有來看過呢♪"
10011010-149 = "那個～記得是……嚕嚕同學，是吧？"
10011010-150 = "是三千留！誰是嚕嚕啊！"
10011010-154 = "（糟，糟糕……！）"
10011010-155 = "（不小心就對陰陽部部長大吼大叫了……！）"
10011010-157 = "呵呵，這次的《和樂公主》是特別精心準備的活動……"
10011010-158 = "但有件事讓我很擔心……"
10011010-159 = "[s]「很擔心……？」"
10011010-164 = "是的。我想老師也很清楚，格黑娜的學生們都非常自由奔放。#n因此要是萬一……"
10011010-171 = "真的只是萬分之一、甚至億分之一的情況下……#n發生了什麼意外的狀況，導致《和樂公主》的公演受到影響……"
10011010-172 = "……呵呵，那就有趣……不對。"
10011010-173 = "就傷腦筋了呢～"
10011010-175 = "所以為了讓公演順利結束，希望夏萊的老師能助我們一臂之力。#n您意下如何呢？"
10011010-176 = "[s]「嗯，就讓我來幫忙吧。」"
10011010-177 = "老師大人……！？"
10011010-178 = "[s]「不過同時，我也有一個提案。」"
10011010-179 = "……哎呀，是什麼呢？"
10011010-180 = "[s3]「為了協助這件事，我想借用忍術研究部的力量。」\n[s4]「如果演出順利成功的話，可以請你們認可忍術研究部嗎？」"
10011010-183 = "……忍術研究部？"
10011010-184 = "等等，老師大人……！#n就算你突然這麼說……！"
10011010-185 = "老師，恕我直言，那需要經過正式的程序才能……"
10011010-187 = "[ns]「意下如何？」"
10011010-191 = "呼呣，忍術研究部……是沒怎麼聽過的社團呢？"
10011010-192 = "原來如此，是研究忍者的社團，並且還沒獲得正式的認可。"
10011010-193 = "這又是為什麼呢？"
10011010-194 = "忍術研究部至今尚未繳交過「成為正式社團的申請書」。"
10011010-198 = "申請所需的文件是「社團實績證明報告」1份，#n以及「其他社團證明其活動絕無虛假的保證書」3份。"
10011010-202 = "以忍術研究部的情況來說，前者靠平常營運的「少女忍法帖 小小三千留」頻道，#n或是之前在「漫博」繳交的忍術同人誌應該不成問題……"
10011010-204 = "為，為什麼佳穗會知道那種事啊！？"
10011010-205 = "但是卻少了其他社團提供的保證書。"
10011010-206 = "只要有保證書，應該就能申請才是……"
10011010-207 = "[s]「是這樣嗎？」"
10011010-208 = "但是，那個……該說是其他人不太明白忍者的孤傲嗎……"
10011010-209 = "還是該說要讓忍者文化在奇普托斯生根還需要一些準備呢……"
10011010-210 = "此外，還有一些個人的情況……"
10011010-211 = "……"
10011010-212 = "喵哈哈，也罷，我就接受吧。"
10011010-213 = "仁耶大人，您又這樣……！"
10011010-214 = "……咦？真的嗎！？"
10011010-215 = "哎呀佳穗～這種程度沒關係的～"
10011010-216 = "只要公演順利成功……"
10011010-217 = "交流會能圓滿落幕……就行了嘛。"
10011010-218 = "[s]「謝謝。」"
10011010-219 = "那麼忍術研究部的各位，這次的公演就拜託你們囉～♪"
10011010-220 = "既然如此……！"
10011010-221 = "部，部長……！"
10011010-222 = "咦，啊，嗯……"
10011010-228 = "當然！儘管包在我身上吧……！#n我，我會全力讓公演成功的！"
10011010-229 = "仁耶大人也真是的……"
10011010-230 = "～～♪"
10011010-231 = "喵哈哈～就讓我好好見識見識吧。"
10011010-233 = "事情就是這樣！趕緊到現場去吧！#n目標，讓公演成功！"
10011010-238 = "是！"
10011010-239 = "[s]「好，加油吧！」"

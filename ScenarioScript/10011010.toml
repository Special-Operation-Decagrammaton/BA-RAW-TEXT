[translation]
10011010-1 = "ตอนที่ 1;จุดเริ่มต้นของงานแลกเปลี่ยน"
10011010-4 = "[ns] \"สถานที่นัดน่าจะอยู่แถวนี้นี่นา\""
10011010-5 = "อ๊ะ! เจอนายท่านแล้วค่ะ! หัวหน้า!"
10011010-9 = "อยู่นี่เองสินะ ท่านอาจารย์"
10011010-10 = "สะ... สะ... สวัสดีค่ะ..."
10011010-11 = "[s] \"อื้ม สวัสดีนะทุกคน เตรียมพร้อมแล้วใช่มั้ย?\""
10011010-12 = "แน่นอนอยู่แล้ว! สมบูรณ์แบบเลย!"
10011010-13 = "อิซุนะก็ตั้งใจเตรียมตัวมาอย่างดีเลยค่ะ! โดยเฉพาะการฝึกฝนจิตใจ!"
10011010-14 = "คะ...ค่ะ  ฉะ... ฉันเองก็กินยาคลายกังวลเมื่อตอนเช้า กะ... ก่อนออกมาแล้วค่ะ..."
10011010-15 = "อะฮะฮ่า สึคุโยะเนี่ย! ขี้กังวลจังเลยนะ!"
10011010-16 = "[s] \"รู้สึกว่ามิจิรุดูจะตื่นเต้นกว่าตอนที่เจอกันครั้งที่แล้วเลยนะ\""
10011010-17 = "หืม? งั้นเหรอ? ไม่สิ มันไม่ใช่เรื่องใหญ่อะไรนี่"
10011010-18 = "ไม่น่าเชื่อเลยว่าเราจะได้เป็นชมรมทางการโดยมีเงื่อนไขว่าต้องช่วยเหลืองานแลกเปลี่ยน"
10011010-19 = "พอคิดอย่างนั้นแล้วก็ตื่นเต้นกว่าเดิมอีก... ต้องทำให้เต็มที่ไปเลย!"
10011010-20 = "งานแลกเปลี่ยน... ระ... ระหว่างเฮียกคิยาโคและสถาบันเกเฮนน่า..."
10011010-21 = "ระ... เรื่องแบบนี้ไม่เคยเกิดขึ้นมาก่อน ฉะ... ฉันก็เลยตื่นเต้นมากค่ะ..."
10011010-22 = "[s] \"นั่นสินะ ไม่คิดเลยว่าวันนี้จะมาถึง\""
10011010-26 = "(เรื่องเมื่อสัปดาห์ก่อนที่ไปคุยกับชมรมหยินหยางพร้อมคาโฮะ)"
10011010-30 = "[ns] \"ดูท่าทางจะสุดยอดไปเลยนะ\""
10011010-31 = "หะ... ห้ามประมาทเด็ดขาดนะท่านอาจารย์! อีกฝ่ายคือรองหัวหน้าชมรมหยินหยางเชียวนะ!"
10011010-32 = "ฉะ... ฉะ... ฉันก็ คะ... คะ... เคยได้ยินข่าวลือด้วยค่ะ...! รองหัวหน้าชมรมหยินหยาง ปะ... เป็นปีศาจที่ทำ#nให้คนวิญญาณออกจากร่าง ดะ... ได้ด้วยคำพูดค่ะ..."
10011010-33 = "อิซุนะจะรับหน้าที่! ดูแลความปลอดภัยของนายท่านเองค่ะ!"
10011010-34 = "ไม่ทราบว่าทุกคนกำลังเข้าใจผิดในเรื่องไม่เป็นเรื่องกันอยู่รึเปล่าคะ..."
10011010-38 = "อ่า~  แขกเหรอ?"
10011010-43 = "ตายจริง ชิเซะจัง"
10011010-44 = "หืม...?"
10011010-48 = "[ns] \"ชิเซะ...?\""
10011010-52 = "ยามยืนเหม่อมอง"
10011010-53 = "พบกันทันใด"
10011010-54 = "ประหลาดใจจริงเอย"
10011010-55 = "อื้อ ทุกคนสบายดีนะ?"
10011010-56 = "[s] \"อ่า สวัสดีชิเซะ\""
10011010-57 = "อะ... อึก!... นั่นคือท่านชิเซะ เทพแห่งกลอนไฮกุ...!"
10011010-58 = "นะ... น่ารักจังเลย... ชิเซะจัง..."
10011010-59 = "[s] \"ชิเซะเนี่ย... มีคนรู้จักเยอะแยะเลยนะ\""
10011010-60 = "อะแฮ่ม ไม่ใช่เวลามาคุยเรื่องนี้กันนะคะ"
10011010-61 = "คุณนิยะ มีแขกมาหาค่ะ"
10011010-70 = "โอ๊ะ ตายจริง..."
10011010-77 = "โฮ่ โฮ่"
10011010-85 = "ฮึ่ม ฮึ่ม"
10011010-86 = "หน้าตาถูกใจจริงๆ ... สไตรค์งั้นเหรอ? ไม่สิ เอาท์อย่างหวุดหวิดงั้นเหรอ?"
10011010-88 = "แต่ถ้าสนุกละก็...อืม~  อาจจะดีกว่าที่คิดก็ได้?"
10011010-89 = "[s] \"คือว่า...\""
10011010-90 = "คุณนิยะ ถ้าทำแบบนั้นจะเป็นการเสียมารยาทต่อคุณครูนะคะ"
10011010-91 = "อะฮะฮ่า คาโฮะเนี่ยแข็งกระด้างจังเลยน้า~"
10011010-92 = "อ่ะแฮ่ม"
10011010-97 = "ฉันชื่ออามาจิ นิยะ ไม่มากไม่น้อยไปกว่านั้น ใช่แล้ว อาจจะคิดว่าฉันมีความสามารถไม่พอสินะ~? "
10011010-98 = "ฉันคือหัวหน้าชมรมหยินหยาง ยินดีที่ได้พบนะคะ คุณครูของชาเล่ต์~♪"
10011010-99 = "[s] \"อืม ยินดีที่ได้รู้จักนะ\""
10011010-100 = "อะฮะฮ่ะ~ ตอบรับได้แข็งกระด้างจริงๆ~ ไม่สนุกเลยน้า~"
10011010-101 = "โฮะโฮะ~ จะว่าไปคุณคือคุณครูของชาเล่ต์สินะคะ"
10011010-102 = "ค่ะ เคยได้ยินผ่านหูมาบ้างแล้วค่ะ~ หลังจากที่ประธานองค์การนักเรียนหายตัวไป ก็คอยช่วยทำงานต่างๆ ในหลายพื้นที่และหลายรูปแบบสินะคะ"
10011010-103 = "[s] \"ก็ประมาณนั้นละนะ\""
10011010-104 = "ฮุฮุ ถ้างั้นก็ดีเลย..."
10011010-105 = "แต่ก่อนจะเข้าเรื่อง ไม่ทราบว่าคุณครูรู้รึเปล่าคะว่าชมรมหยินหยางของพวกเรามีบทบาทอย่างไรใน#nเฮียกคิยาโค?"
10011010-106 = "[s1] \"ก็รับหน้าที่เหมือนเป็นสภานักเรียนของสหพันธ์เฮียกคิยาโค...\"\n[s2] \"ก็รับหน้าที่เป็นฝ่ายบริหารของสหพันธ์เฮียกคิยาโค....\""
10011010-109 = "ฮุฮุ~ ก็นะ ไม่ผิดหรอก แต่ก็เป็นคำตอบที่ผิวเผินไปหน่อยนะคะ"
10011010-110 = "สหพันธ์เฮียกคิยาโคของพวกเราน่ะ ประกอบไปด้วยสหพันธ์มากมาย"
10011010-111 = "ที่เฮียกคิยาโค... ไม่มีองค์กรที่อยู่เหนือกว่าองค์กรอื่นๆ ที่เรียกกันว่าสภานักเรียนหรืออะไรแบบนั้นหรอกค่ะ"
10011010-112 = "[s] \"ถ้าอย่างนั้นชมรมหยินหยางก็...\""
10011010-113 = "อะฮะฮ่ะ ก็ไม่ได้อยู่เหนือองค์กรอื่นๆ แต่คอยอยู่ข้างหลังหนึ่งก้าว รับหน้าที่สำคัญในการค้ำจุน#nประวัติศาสตร์และประเพณีของเฮียกคิยาโค~ ประมาณนั้นละนะคะ~"
10011010-119 = "หรือถ้าจะให้พูดแบบตรงไปตรงมาก็คือ รับหน้าที่เป็นหน้าเป็นตาแบบที่องค์กรใหญ่ๆ ทั่วไปก็ต้องมีเป็น#nปกติแบบนั้นน่ะ~"
10011010-120 = "[s] \"เป็นหน้าเป็นตา...\""
10011010-121 = "หรือจะเรียกว่าเป็นไอดอลแบบหนึ่งได้มั้ยนะ~ ไม่ว่าจะทำการแสดง~ หรือจัดนิทรรศการ~ ไปจนถึง#nรายการดูดวงชะตาประจำวัน ชมรมหยินหยางก็ทำหมดเลย~"
10011010-122 = "อืม เวลาทำแบบนั้นนะ ชิเซะก็ได้รับความนิยมสุดๆ~ ใช่ไหมล่ะ~?"
10011010-123 = "ใช่ไหมล่ะ~?"
10011010-124 = "งั้นเหรอ...?"
10011010-125 = "คุณนิยะ เข้าเรื่องเถอะค่ะ"
10011010-126 = "เอ๋~ คาโฮะอิจฉาเหรอ คาโฮะก็แอบมีแฟนคลับไม่น้อยเหมือนกันใช่มั้ยล่ะ~?"
10011010-127 = "คะ... คุณนิยะ...!"
10011010-128 = "อะฮะฮ่ะ~ รู้แล้วๆ"
10011010-129 = "ถ้าอย่างนั้นก็ขอเข้าเรื่องธุระเลยนะคะ"
10011010-131 = "อีกหนึ่งสัปดาห์หลังจากนี้ สหพันธ์เฮียกคิยาโคของพวกเราและสถาบันเกเฮนน่าจะมีการจัดงานแลก#nเปลี่ยนร่วมกันค่ะ"
10011010-132 = "[s] \"สถาบันเกเฮนน่าและสหพันธ์เฮียกคิยาโคเหรอ?\""
10011010-134 = "ฮุฮุ ใช่ค่ะ"
10011010-136 = "ตัวท็อปของสถาบันเกเฮนน่า แพนเดโมเนียม โซไซตี้ทุกคนจะมาเข้าร่วมด้วย เป็นงานขนาดใหญ่ที่เกิด#nจากความร่วมมือของเหล่านักเรียนค่ะ"
10011010-138 = "วันงานแลกเปลี่ยนเราได้เชิญให้นักเรียนของเกเฮนน่ามายัง <สวนสนุกภาพยนตร์> ที่เป็นหนึ่งในความ#nภาคภูมิใจของพวกเราเฮียกคิยาโค..."
10011010-139 = "และทางเฮียกคิยาโคก็ได้เตรียมกิจกรรมสนุกๆ ไว้สำหรับนักเรียนจากเกเฮนน่าทุกคนด้วยค่ะ~♪"
10011010-140 = "<องค์หญิงวาราคุ> ที่ชมรมหยินหยางของเราภูมิใจ..."
10011010-141 = "[s] “องค์หญิงวาราคุเหรอ...?\""
10011010-143 = "เดี๋ยวสิ ท่านอาจารย์?! ไม่รู้จักองค์หญิงวาราคุงั้นเหรอ?!"
10011010-144 = "ที่สวนสนุกภาพยนตร์มีสิ่งที่น่าดึงดูดใจมากมาย และถึงจะมีการแสดงที่กำหนดไว้แล้ว! แต่เรื่องที่ยอด#nเยี่ยมที่สุดก็คือ <องค์หญิงวาราคุ> ไงล่ะ!"
10011010-145 = "ยิ่งไปกว่านั้นตัวละครเอกในการแสดงก็คือไอดอลแห่งเฮียกคิยาโคที่ไม่เป็นสองรองใคร! ท่านชิเซะ! แค่เพียงความน่ารักของท่านชิเซะ...!"
10011010-146 = "...?"
10011010-147 = "คุณมิจิรุ กรุณาเงียบสักครู่ได้มั้ยคะ..."
10011010-148 = "โฮ่ว~? ไม่คิดว่าจะมีคนที่รู้จักด้วยนะคะเนี่ย~ ขอบคุณนะคะที่ชอบการแสดงของเรา"
10011010-149 = "อืม ถ้างั้น~ คุณก็ชื่อ.. มิจิรุรุน?"
10011010-150 = "ข้าน้อยชื่อมิจิรุต่างหากเล่า!"
10011010-154 = "(ทะ... ทำลงไปซะแล้ว...!)"
10011010-155 = "(ตะ... ตะโกนเสียงดังต่อหน้าหัวหน้าชมรมหยินหยาง...!)"
10011010-157 = "ใช่แล้วค่ะ งานแลกเปลี่ยนครั้งนี้กิจกรรมที่เราได้เตรียมไว้เป็นพิเศษก็คือ <องค์หญิงวาราคุ> นั่นเอง..."
10011010-158 = "แต่ว่าเรื่องที่น่าเป็นห่วงก็คือ..."
10011010-159 = "[s] \"เรื่องที่น่าเป็นห่วงเหรอ...?\""
10011010-164 = "ใช่ค่ะ อย่างที่คุณครูก็น่าจะทราบดีว่านักเรียนของสถาบันเกเฮนน่าค่อนข้างจะรักอิสระ บางทีพวกเธอก็#nคาดเดาไม่ได้ ถ้าเป็นแบบนั้น..."
10011010-171 = "ถ้าเกิดการกระทบกระทั่งกัน หากเกิดเรื่องที่ไม่คาดฝันขึ้นระหว่างการแสดง <องค์หญิงวาราคุ> ละก็..."
10011010-172 = "ฮุฮุ... แบบนั้นก็อาจจะสนุก... อ๊ะ ไม่ใช่สิ"
10011010-173 = "ฮึ่มฮึ่ม~ แบบนั้นก็คงจะเป็นเรื่องยุ่งยากน่าดูเลยละนะ~"
10011010-175 = "แล้วคุณครูของชาเล่ต์จะช่วยทำให้การแสดงดำเนินไปอย่างราบรื่นจะได้หรือเปล่าล่ะคะ?"
10011010-176 = "[s] \"ได้สิ ถ้าเรื่องนั้นละก็ครูจะช่วยเอง\""
10011010-177 = "อ๊ะ! ทะ... ท่านอาจารย์...!"
10011010-178 = "[s] \"แต่ว่ามีเงื่อนไขอยากจะเสนอหนึ่งข้อน่ะ\""
10011010-179 = "...ตายจริง?"
10011010-180 = "[s3] \"ให้ชมรมวิจัยศาสตร์นินจามีส่วนช่วยในการแสดงครั้งนี้ด้วย\"\n[s4] \"ถ้าสำเร็จไปได้ด้วยดี ช่วยทำให้ชมรมวิจัยศาสตร์นินจาเป็นชมรมทางการด้วย\""
10011010-183 = "ชมรมวิจัยศาสตร์นินจางั้นเหรอ...?"
10011010-184 = "เอ๊ะ? ดะ... เดี๋ยวก่อน! ท่านอาจารย์ ถึงจู่ๆ จะพูดแบบนั้นก็เถอะ...!"
10011010-185 = "คุณครูคะ เรื่องนั้นจะต้องเป็นไปตามระเบียบขั้นตอน..."
10011010-187 = "[ns] \"เป็นไงบ้าง พอจะรับฟังข้อเสนอของครูได้ไหม?\""
10011010-191 = "โอ๊ะ ชมรมวิจัยศาสตร์นินจา เพิ่งจะเคยได้ยินเลยนะคะเนี่ย มันคืออะไรเหรอคะ?"
10011010-192 = "โฮ้ว ชมรมที่วิจัยนินจาอย่างนั้นเหรอ...? และยังไม่ได้เป็นชมรมทางการด้วยสินะคะ?"
10011010-193 = "เพราะอะไรกันนะ?"
10011010-194 = "จนถึงตอนนี้สมาชิกจากชมรมวิจัยศาสตร์นินจายังไม่เคยยื่น <ใบสมัครเป็นชมรมทางการ> มาเลยค่ะ"
10011010-198 = "เอกสารที่จำเป็นสำหรับการสมัครเป็นชมรมทางการก็คือ <รายงานผลการดำเนินการของชมรม> หนึ่งชุดและ <ใบรับรองว่าไม่มีการหลอกลวงภายในชมรมที่รับรองโดยชมรมอื่น> สามชุด"
10011010-202 = "ในกรณีของสมาชิกชมรมวิจัยศาสตร์นินจา ก็มีผลการดำเนินงานจากช่อง <วิถีนินจาสาว มิจิรุจจี้> และหนังสือการ์ตูนนินจาที่เขียนเองจากงาน <คอมิเซ็น> เมื่อครั้งก่อน"
10011010-204 = "คาโฮะรู้เรื่องนั้นได้ยังไงกันน่ะ?"
10011010-205 = "แต่ว่าใบรับรองจากชมรมอื่นนั้นคงยังไม่มี..."
10011010-206 = "ถ้าหากได้รับใบรับรองมาก็จะสามารถสมัครเป็นชมรมได้ค่ะ"
10011010-207 = "[s] \"จริงเหรอ มิจิรุ?\""
10011010-208 = "คะ... คือว่าพอมาคิดๆ ดูแล้ว... คนอื่นอาจจะไม่เข้าใจความเลิศเลอของนินจา"
10011010-209 = "ละ... แล้วจะต้องเตรียมตัวให้ดีก่อนที่จะให้อารยธรรมนินจาหยั่งรากลึกในคิโวทอส..."
10011010-210 = "ยะ... ยังมีเหตุผลส่วนตัวอีก... ก็เลย..."
10011010-211 = "..."

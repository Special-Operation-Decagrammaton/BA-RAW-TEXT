[translation]
10011010-1 = "Episode 1; Start of the Exchange Meeting"
10011010-4 = "[ns] \"The meeting place should be around here somewhere.\""
10011010-5 = "President, President! I found our lordship!"
10011010-9 = "You've arrived, Sir Sensei."
10011010-10 = "Uh, h-hello..."
10011010-11 = "[s] \"Hello, everyone. Are you ready?\""
10011010-12 = "I was born ready!"
10011010-13 = "I worked very hard to prepare! Especially mental training!"
10011010-14 = "Well... I-I took an anxiety reliever this morning before I left, so..."
10011010-15 = "Wahaha, Tsukuyo! You're always such a nervous Nelly!"
10011010-16 = "[s] \"Wow, Michiru. There's no limit to your enthusiasm, huh?\""
10011010-17 = "Huh? You could say that."
10011010-18 = "It's just that the chance to finally become an official club just for helping with this exchange meeting..."
10011010-19 = "Haha! You're right, it's got me pretty excited! Let's kick butt!"
10011010-20 = "I'm...um...excited too... An exchange meeting between Hyakkiyako and Gehenna Academy at that..."
10011010-21 = "Events like this are rare...! I can feel my heartbeat in my chest."
10011010-22 = "[s] \"I know. I never would have expected this.\""
10011010-26 = "(One week ago, visiting the Yin-Yang Club with Kaho.)"
10011010-30 = "[ns] \"Well, this is pretty impressive.\""
10011010-31 = "Don't let your guard down, Sir Sensei! This is the president of the Yin-Yang Club we're talking about!"
10011010-32 = "I've heard rumors... The president is supposed to be a monstrous dragon who'll leave you speechless with just one word...!"
10011010-33 = "Izuna will protect you with her last dying breath, my lord!"
10011010-34 = "Goodness. There seems to be an egregious misunderstanding here."
10011010-38 = "Oh, guests?"
10011010-43 = "Hi, Chise."
10011010-44 = "Huh?"
10011010-48 = "[ns] \"...Chise?\""
10011010-52 = "(She stares blankly.)"
10011010-53 = "A sudden meeting"
10011010-54 = "A truly pleasant surprise"
10011010-55 = "Heehee, hello, friends!"
10011010-56 = "[s] \"Oh, uh, hello Chise.\""
10011010-57 = "Oh my gosh. Was that a haiku? Written by Chise herself?"
10011010-58 = "Chise... How delicate... How absently cute!"
10011010-59 = "[s] \"I didn't know you were so popular, Chise.\""
10011010-60 = "Ahem. Now is not the time."
10011010-61 = "Niya. We have guests."
10011010-70 = "Oooooh."
10011010-77 = "Uh-huuuh."
10011010-85 = "Mhm. Okay."
10011010-86 = "Your face isn't bad though... I'd give you a passing grade."
10011010-88 = "Not great, but there's a strange charm there."
10011010-89 = "[s] \"Excuse me?\""
10011010-90 = "Niya, please. Could we refrain from such boorish behavior?"
10011010-91 = "Heehee! My ever-boring, ever-stiff Kaho."
10011010-92 = "Ahem."
10011010-97 = "My name is Amachi Niya. I am the very well-deserved, some might even say overqualified..."
10011010-98 = "President of the Yin-Yang Club. Good to meet you, Sensei of Schale! ♪"
10011010-99 = "[s] \"Nice to meet you too.\""
10011010-100 = "Hahaha! You're boring and stiff just like Kaho. Boo."
10011010-101 = "So... The infamous Schale Sensei."
10011010-102 = "Who hasn't heard the stories? You've single-handedly held Kivotos together since the General Student Council president went \"poof\"."
10011010-103 = "[s] \"That's a bit of an exaggeration...\""
10011010-104 = "Haha. Perfect!"
10011010-105 = "Before I get to the point, Sensei, do you know the role the Yin-Yang Club serves at Hyakkiyako?"
10011010-106 = "[s1] \"You're like the Hyakkiyako Academy's student council.\"\n[s2] \"You take care of administrative duties at the Hyakkiyako Academy.\""
10011010-109 = "You get passing marks. But that's a shallow understanding of what actually we do."
10011010-110 = "Allied Hyakkiyako Academy is comprised of numerous unions and alliances."
10011010-111 = "Put more simply, at Hyakkiyako there is no so-called student council with their foot on the neck of the student body."
10011010-112 = "[s] \"So the Yin-Yang Club...\""
10011010-113 = "We don't step on our students' necks. We've raised our foot off those kinds of duties and instead work to uphold the history and tradition of Hyakkiyako."
10011010-119 = "Or, to put it more bluntly, we serve a very necessary function for a large organization such as this: being the face of the operation."
10011010-120 = "[s] \"The face...\""
10011010-121 = "In a way, we're a little like pop idols. We put on performances, exhibitions, broadcast the Yin-Yang Club's daily horoscope readings..."
10011010-122 = "And our darling Chise's popularity grows greater with each event! Isn't that right, Chise?"
10011010-123 = "Right...!"
10011010-124 = "...Does it?"
10011010-125 = "Niya, I beg of you. We've a purpose here."
10011010-126 = "Is little Kaho j-e-a-l-o-u-s? It's okay, you have a lot of silent fans out there too! I promise!"
10011010-127 = "Niya, please!"
10011010-128 = "Bwahaha! Alright, alright."
10011010-129 = "I'll cut to the chase."
10011010-131 = "A week from now, the Hyakkiyako and Gehenna academies will hold a joint exchange meeting."
10011010-132 = "[s] \"...Gehenna and Hyakkiyako?\""
10011010-134 = "I know, shocking."
10011010-136 = "This monumental event was only able to happen thanks to the cooperation of one of Gehenna Academy's top organizations, the Pandemonium Society."
10011010-138 = "For the actual day, we've invited the students of Gehenna to the Whirlpool Movie Village, one of Hyakkiyako's greatest prides..."
10011010-139 = "And to sweeten the deal, Hyakkiyako is preparing something really special for Gehenna Academy. ♪"
10011010-140 = "And that is Princess Waraku, the Yin-Yang Club's..."
10011010-141 = "[s] \"Who's Princess Waraku?\""
10011010-143 = "Sir Sensei, you mean to say you've never heard of Princess Waraku?!"
10011010-144 = "Out of the Whirlpool Movie Village's many attractions and special screenings, Princess Waraku is well-nigh the best!"
10011010-145 = "Especially since the star of the show is none other than Hyakkiyako's top celebrity, Chise! Why, Chise's charm and loveliness are downright life-changing!"
10011010-146 = "...?"
10011010-147 = "Michiru, while appreciated, please curb your enthusiasm."
10011010-148 = "Oh? I didn't know you were familiar with our work. Thank you for being a fan of our show!"
10011010-149 = "What was your name again... Mitchie Rude?"
10011010-150 = "My name is MICHIRU!"
10011010-154 = "(I've gone and done it!)"
10011010-155 = "(I've gone and yelled right in the Yin-Yang Club president's face!)"
10011010-157 = "Hm. Okay. Anyway, we have a particularly ambitious performance of Princess Waraku planned for this whole shebang."
10011010-158 = "But we are a bit concerned..."
10011010-159 = "[s] \"Concerned?\""
10011010-164 = "As you know, the students of Gehenna are rather free-spirited, some might even say flighty and temperamental..."
10011010-171 = "So in the very, very unlikely event an accident occurs during the performance due to these...temperaments..."
10011010-172 = "Heehee. What an interesting thought. Uh, I mean..."
10011010-173 = "That would be a horrible event!"
10011010-175 = "Our point is, we're requesting Schale's support in ensuring everything goes smoothly."
10011010-176 = "[s] \"Sure. If that's the case, I can cooperate.\""
10011010-177 = "What?! Sir Sensei?"
10011010-178 = "[s] \"I'd like something in return, though.\""
10011010-179 = "Oh?"
10011010-180 = "[s3] \"I intend to enlist the help of the Ninjutsu Research Club for the show.\"\n[s4] \"I want you to acknowledge the Ninjutsu Research Club's merits and efforts.\""
10011010-183 = "...The Ninjutsu Research Club?"
10011010-184 = "Sir Sensei, please hold! You can't just request something like that willy-nilly!"
10011010-185 = "Sensei, there are proper procedures for such requests."
10011010-187 = "[ns] \"That's my proposal. Take it or leave it.\""
10011010-191 = "The Ninjutsu Research Club? Can't say it rings a bell. What is it?"
10011010-192 = "Hahaha! A club for researching ninjas? And it hasn't received official accreditation?"
10011010-193 = "I'm curious to know why."
10011010-194 = "The Ninjutsu Research Club has never submitted a formal club application."
10011010-198 = "The club application requires thorough documentation: the club's proof of performance report and three letters of guarantee from other clubs attesting there are no falsifications of the club's activities."
10011010-202 = "In the case of the Ninjutsu Research Club, they've satisfied the first requirement with their operation of the video channel, \"Michiruchi, a Girl's Ninja Scroll,\" and the self-created ninjutsu book they submitted to Komisen."
10011010-204 = "You remember all that, Kaho?"
10011010-205 = "As for their letters of guarantee from other clubs..."
10011010-206 = "Their application would be rejected without them."
10011010-207 = "[s] \"Michiru, is that true?\""
10011010-208 = "Well... You know... Most people still don't really understand ninjas..."
10011010-209 = "Kivotos is just too behind the times to appreciate ninja culture!"
10011010-210 = "P-Plus, I have some personal stuff...that..."
10011010-211 = "..."
10011010-212 = "Bwahaha! How amusing. Whatever, sure. The Ninjutsu Research Club is hereby recognized as an official club by me, Niya."
10011010-213 = "Again, Niya! Your blatant disregard for procedure and rules...!"
10011010-214 = "D-Do you mean it?!"
10011010-215 = "Kaho, didn't I say you were too stiff?"
10011010-216 = "As long as the meeting goes off without a hitch, a small favor like this..."
10011010-217 = "It would be my pleasure."
10011010-218 = "[s] \"Thanks.\""
10011010-219 = "It's a deal. Members of the Ninjutsu Research Club, I look forward to your help with the show! ♪"
10011010-220 = "President!"
10011010-221 = "P-President...!"
10011010-222 = "Oh, um..."
10011010-228 = "Yes! Yes, of course! We'll do everything in our power to make it a success! Leave it to us."
10011010-229 = "...Oh, heavens."
10011010-230 = "♪"
10011010-231 = "Bwahaha! How exciting!"
10011010-233 = "All right class, let's take a field trip out to the performance stage!"
10011010-238 = "Yes!"
10011010-239 = "[s] \"Does that make me the chaperone?\""

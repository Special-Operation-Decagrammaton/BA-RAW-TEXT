[translation]
10039060-1 = "第6話;頂上決戰"
10039060-11 = "剛才那台逆向的機車……你有看到嗎？"
10039060-12 = "嗯……速度超快的……"
10039060-13 = "好帥……"
10039060-14 = "不過剛才騎著那輛車的人……"
10039060-15 = "看他的穿著……好像……"
10039060-16 = "嗯……我也看到了。"
10039060-20 = "是修女……對吧？"
10039060-23 = "（急忙趕到了瑪麗說的地點）"
10039060-24 = "老師──！！"
10039060-29 = "[ns1]「瑪麗……？」\n[ns2]「真的騎著機車……」"
10039060-35 = "突然請您過來真的很抱歉，老師！不過情況真的很緊急……！"
10039060-36 = "如果可以的話……能跟我一起去三一廣場嗎？#n我會帶您去的！"
10039060-37 = "只要老師在場，應該就能防止不幸的情況發生……"
10039060-38 = "[s3]「之後再解釋也沒關係，走吧！」\n[s4] 坐上機車的後座"
10039060-41 = "……！！"
10039060-42 = "……那麼我要出發了！請您抓緊我！！"
10039060-50 = "怎麼了怎麼了？為啥這麼多人？"
10039060-51 = "你沒聽說嗎？#n不久後這裡會發生統一兩大社團的決鬥哦！"
10039060-52 = "真的假的……！？這也是活動的一環嗎？#n不然為什麼會選今天啊？現在正值學園祭耶？"
10039060-53 = "也可能是刻意選在這種時候……好讓眾人一起見證吧。"
10039060-54 = "那，那個……這是怎麼回事……？"
10039060-55 = "突然要決鬥什麼的，我從來沒聽說過啊……！？"
10039060-56 = "這也不無道理。#n要選擇聯合組織的領導者，沒有比這更合適的時機了。"
10039060-57 = "而且決鬥……是最確實且無後顧之憂的方法。"
10039060-58 = "你在說什麼啊！？這既奇怪又不合理吧！#n一定是有什麼誤會！！"
10039060-60 = "雖然是這麼說沒錯……"
10039060-61 = "不過考慮到是他們兩個人，確實有可能把小事情鬧到這種地步。"
10039060-62 = "又或者實際情況其實更加荒唐……"
10039060-63 = "……呵呵。#n反正應該會很有趣，我們就先在一旁靜觀其變吧。"
10039060-64 = "會，會有趣嗎……"
10039060-66 = "這，這到底是什麼情況……我從來沒聽說過這種事啊。"
10039060-67 = "這件事是真的嗎？聯絡上櫻子大人了沒？"
10039060-68 = "我，我一直在嘗試，但就是聯絡不上……"
10039060-69 = "不只完全不接電話，就連訊息也沒有回覆……感覺似乎是刻意這麼做的。"
10039060-70 = "怎麼會……所以真的要發生大事了嗎！？"
10039060-71 = "或許是只有部分人員才知道的祕密指令。"
10039060-72 = "畢竟櫻子大人的打算，我們不可能全盤了解。"
10039060-73 = "但如果……"
10039060-74 = "如果這是真的……#n櫻子大人真的要和美禰團長決鬥的話……"
10039060-75 = "根本就沒有勝算吧！？#n對手可是那個美禰團長耶！！"
10039060-76 = "是，是啊。所以……"
10039060-77 = "也許我們需要準備其他計劃……"
10039060-78 = "……！！"
10039060-80 = "事，事情好像變得越來越奇怪了？"
10039060-81 = "居然要決鬥什麼的……美禰團長有說過這種話嗎？"
10039060-82 = "我也是第一次聽說……"
10039060-83 = "雖然莫名有股熟悉的感覺……但即使是團長，這也很奇怪。"
10039060-84 = "可能是有哪裡誤會了……"
10039060-91 = "哇啊啊……！#n騎，騎士團的各位，請冷靜一點！！"
10039060-92 = "我們不是來這裡打架的！大家先冷靜下來……！！"
10039060-96 = "……嗯？"
10039060-97 = "咦，那些人是……"
10039060-102 = "茶……"
10039060-103 = "茶會的……渚大人！？"
10039060-110 = "那，那個……渚醬……？"
10039060-111 = "你是認真的嗎？#n我怎麼想都覺得不對……"
10039060-112 = "他們再怎麼樣也不會挑這種日子在這種地方打架的……一定是謠言啦。"
10039060-113 = "我們在這裡反而會讓氣氛更奇怪的。#n還是再考慮一下吧？渚醬……？"
10039060-115 = "……彌香同學。"
10039060-116 = "茶會必須隨時做好應對突發事件的準備。#n而現在，真相已逐漸浮出水面。"
10039060-117 = "彌香同學，你沒看到那邊聚集的修女會和救護騎士團的兵力嗎？"
10039060-118 = "雖然表面上看似是場正大光明的決鬥，但一旦計劃失敗則勢必會訴諸武力。"
10039060-119 = "屆時，三一學園將可能發生內戰。"
10039060-120 = "因此就像你說的一樣──#n身為茶會的主席，無法容許在如此重要的日子發生這種事。"
10039060-121 = "萬一場面失去控制，這裡就由彌香同學……"
10039060-127 = "……我，我！？"
10039060-128 = "咦！？要我上場嗎……？"
10039060-129 = "渚醬真的要我動手！？你帶我來是為了這個嗎！？"
10039060-130 = "一切都是為了三一綜合學園的和平！你可是茶會的最強戰力啊！"
10039060-131 = "不，不！不不不！！！"
10039060-132 = "我不要，絕對不要！！我完全沒想過要做這種事耶！？#n而且我現在也不在原本的位置上呀！？"
10039060-133 = "你該不會是撞壞腦袋了吧！#n算我求你了，渚醬！拜託你清醒一點！"
10039060-134 = "這樣下去不行，得趕快聯絡老師……！！！"
10039060-140 = "……"
10039060-141 = "……當事人終於到場了呢。"
10039060-148 = "……你來得真準時呢，櫻子同學。"
10039060-149 = "已經得出結論了嗎？時間是否足夠充裕？"
10039060-150 = "那當然。#n如此重要的場合可不能遲到呢，美禰團長。"
10039060-151 = "畢竟我們現在……"
10039060-153 = "可是要決定新的領導者啊。"
10039060-159 = "不過還真奇怪。#n人潮似乎比平時多了不少。"
10039060-160 = "修女會的修女們也都來了。"
10039060-161 = "是啊，就連救護騎士團的大家也是。#n發生什麼事了嗎？"
10039060-162 = "不如先問問情況吧……"
10039060-163 = "……沒想到這竟然是真的。"
10039060-168 = "看來修女會和救護騎士團的兩位，比我想像中還要大膽呢。"
10039060-170 = "茶會的主席……？渚同學？"
10039060-171 = "本應忙於學園祭營運管理的渚同學，為何會跑來這裡……？"
10039060-173 = "真讓人驚訝。#n事到如今居然還裝作一無所知的樣子……是想把我當傻子耍嗎？"
10039060-175 = "……？"
10039060-176 = "……這是什麼意思？"
10039060-178 = "在此我以茶會主席的身分，正式詢問二位前來的目的。"
10039060-179 = "聚集於此所為何事？請兩位立即回答。"
10039060-180 = "……你剛才說，是以「茶會主席」的身分提問，而不是「學園祭營運委員會會長」？"
10039060-181 = "……是的，有什麼問題嗎？"
10039060-182 = "……我明白了。"
10039060-183 = "那麼這個問題就由我來回答吧。"
10039060-187 = "這件事與您無關──茶會主席．桐藤渚大人。"
10039060-188 = "…………"
10039060-189 = "…………！！！"
10039060-190 = "……彌香同學！"
10039060-191 = "不不不，渚醬等等！這樣真的不對啦！！"
10039060-192 = "再多談個幾句也……"
10039060-193 = "彌香！！"
10039060-194 = "啊啊啊～！！拜託饒了我吧，渚醬！"
10039060-195 = "唔唔……！！#n真，真是的……！！後果會怎樣我可不管哦！！"
10039060-201 = "……什麼？"
10039060-202 = "你現在是在裝填子彈嗎？#n在這廣場中央，還是在眾目睽睽之下……？"
10039060-203 = "你們已經失去理智了嗎，茶會！！"
10039060-204 = "既然如此也沒辦法了！#n雖然不太清楚事情的緣由，但我接受你的挑釁！"
10039060-205 = "做好準備吧，櫻子同學。#n其他成員也是！"
10039060-207 = "……什，什麼！？我嗎？"
10039060-208 = "動作快！！"
10039060-209 = "那，那個……！？#n咦咦咦……！？"
10039060-210 = "這是怎麼回事？為什麼事情突然變成這樣？"
10039060-211 = "果然沒錯！櫻子大人是刻意將事情引導到這個局面的！！"
10039060-212 = "全員做好戰鬥準備──！！！"
10039060-219 = "全體成員進入戰鬥狀態──！！"
10039060-220 = "咦咦咦咦咦──！？"
10039060-227 = "這顯然是場政變！！"
10039060-228 = "不！這是對暴政的反抗！！"
10039060-229 = "為什麼我老是會遇到這種事！？"
10039060-230 = "我不管了啦～～～！！！"
10039060-232 = "[log=마리]等等！！！[/log]"
10039060-245 = "大家……！！"
10039060-250 = "所有人……"
10039060-251 = "請停止戰鬥！！"

[translation]
10039060-1 = "ตอนที่ 6;การแข่งขันชี้ขาด"
10039060-11 = "เมื่อกี้เธอเห็นหรือเปล่า...? ที่มีคนขี่มอเตอร์ไซค์ย้อนศรน่ะ"
10039060-12 = "อืม... ขี่เร็วแบบนั้น ต้องเรียกว่าแว้นเลยละ..."
10039060-13 = "เท่จัง..."
10039060-14 = "ว่าแต่เธอเห็นเหมือนฉันหรือเปล่า... คนที่ขี่มอเตอร์ไซค์น่ะ"
10039060-15 = "ใส่ชุด... เหมือน..."
10039060-16 = "อื้อ... ฉันก็เห็นเหมือนกัน"
10039060-20 = "ซิสเตอร์... ใช่มั้ยนะ...?"
10039060-23 = "(คุณครูรีบวิ่งมาถึงสถานที่ที่มารีบอกได้ทันเวลา)"
10039060-24 = "คุณครู!!"
10039060-29 = "[ns1] \"มารี...?\"\n[ns2] \"ยังขี่มอเตอร์ไซค์อยู่เลยนะนั่น...!\""
10039060-35 = "ขอโทษที่จู่ๆ ก็เรียกตัวมาค่ะคุณครู! แต่นี่เป็นเรื่องด่วนมากจริงๆ...!"
10039060-36 = "ถะ... ถ้าคุณครูไม่ว่าอะไร... ช่วยไปกันฉันได้มั้ยคะ? ฉันจะพาไปที่จัตุรัสทรีนิตี้ค่ะ!"
10039060-37 = "ถ้ามีคุณครูอยู่ด้วย ฉันว่าเราน่าจะป้องกันไม่ให้เกิดเหตุไม่คาดฝันได้..."
10039060-38 = "[s3] \"เอาไว้อธิบายทีหลัง ตอนนี้รีบไปก่อนเถอะ!\"\n[s4] นั่งซ้อนท้ายมอเตอร์ไซค์"
10039060-41 = "...!!"
10039060-42 = "จะไปแล้วนะคะ...! จับให้ดีๆ ค่ะ!!"
10039060-50 = "อะไรกัน เกิดเรื่องอะไรเหรอ? ทำไมคนถึงเยอะจัง?"
10039060-51 = "เธอไม่ได้ยินหรอกเหรอ? เห็นเขาลือกันว่าอีกไม่นานจะมีการดวลกันตรงนี้น่ะ จะรวมชมรมกันด้วยนะ!"
10039060-52 = "จริงเหรอ...!? นี่คืออีเวนต์ของงานเหรอ? แล้วทำไมต้องมาดวลกันวันนี้ด้วย? งานเทศกาลโรงเรียน#nกำลังสนุกเลยนะ"
10039060-53 = "ก็เพราะว่าเป็นวันงานเทศกาลยังไงล่ะ... จะได้ประกาศต่อหน้าทุกคนไปเลย"
10039060-54 = "หะ... หืม...? มีเรื่องอะไรเหรอคะ..."
10039060-55 = "จะดวลกันเหรอคะ ฉันไม่เคยได้ยินอะไรแบบนั้นมาก่อนเลย...!?"
10039060-56 = "แต่มันก็ฟังดูสมเหตุสมผลนะ คงไม่มีเวลาไหนที่จะเหมาะสมกับการเลือกผู้นำของกลุ่มไปกว่าเวลานี้#nอีกแล้วละ"
10039060-57 = "แถมจะเลือกผ่านการดวลอีก... เป็นวิธีที่ชัดเจนและโปร่งใสที่สุดเลย"
10039060-58 = "พูดอะไรน่ะ!? ไม่เห็นจะสมเหตุสมผลเลย! แบบนี้มันแปลกนะ! ต้องมีอะไรผิดพลาดแล้วละ!!"
10039060-60 = "สุดยอดเลย..."
10039060-61 = "คนพวกนั้นทำเรื่องเล็กน้อยให้เป็นเรื่องใหญ่ได้ถึงขนาดนี้เลยนะคะเนี่ย"
10039060-62 = "หรือนี่อาจจะเป็นการตัดสินใจที่โง่เขลาก็ได้..."
10039060-63 = "ฮุฮุ... แต่ก็น่าสนุกดีนะคะ ฉันว่าเราไปดูพวกนั้นดวลกันก็ไม่น่าจะแย่ไปเสียทีเดียวหรอกค่ะ"
10039060-64 = "นะ... น่าสนุกงั้นเหรอคะ...?"
10039060-66 = "นี่มันอะไรกันน่ะ... ฉันไม่เห็นรู้เรื่องนี้มาก่อนเลย"
10039060-67 = "จริงเหรอ? ได้ติดต่อท่านซากุระโกะหรือยัง?"
10039060-68 = "ฉะ... ฉันก็พยายามติดต่อตั้งแต่เมื่อกี้แล้ว แต่ท่านซากุระโกะก็ไม่รับสายเลย..."
10039060-69 = "โทรไปไม่รับ ส่วนข้อความก็ไม่ตอบด้วย เหมือนเป็นการตั้งใจอย่างนั้นละ"
10039060-70 = "ทำไมล่ะ... จะเกิดเรื่องใหญ่จริงๆ เหรอเนี่ย!?"
10039060-71 = "บางทีอาจมีคำสั่งลับให้กับสมาชิกแค่บางคนก็ได้นะ"
10039060-72 = "นี่เป็นเรื่องของท่านซากุระโกะ พวกเราคงไปรับรู้ทุกอย่างไม่ได้หรอก"
10039060-73 = "แต่ถ้าหากว่า..."
10039060-74 = "ถ้านี่เป็นเรื่องจริงละก็... ถ้าท่านซากุระโกะต้องดวลกับหัวหน้ามิเนะจริงๆ..."
10039060-75 = "แล้วท่านซากุระโกะของเราจะไปชนะได้ยังไงล่ะ!? อีกฝ่ายเป็นถึงหัวหน้ามิเนะเลยนะ!!"
10039060-76 = "นะ... นั่นสิเนอะ ถ้างั้น..."
10039060-77 = "บางทีพวกเราอาจต้องเตรียมแผนการอะไรไว้รอก็ได้..."
10039060-78 = "...!!"
10039060-80 = "ระ... เรื่องชักจะแปลกๆ แล้วนะคะเนี่ย?"
10039060-81 = "จะมีการดวลอย่างนั้นเหรอคะ... หัวหน้ามิเนะเคยพูดอะไรอย่างนั้นด้วยเหรอคะ?"
10039060-82 = "ก็ไม่นะคะ ฉันเองก็เพิ่งได้ยินพร้อมทุกคนเลยค่ะ..."
10039060-83 = "ถึงนี่จะเป็นสถานการณ์ที่พวกเราคุ้นเคย แต่หัวหน้ามิเนะก็ไม่น่าทำเรื่องแบบนั้นนะคะ"
10039060-84 = "ฉันว่าต้องมีเรื่องเข้าใจผิดอะไรกันแน่ๆ..."
10039060-91 = "วะ... ว้ายยย! จะ... ใจเย็นๆ ก่อนนะคะ ใจเย็นก่อนค่ะ อัศวินทุกคน!!"
10039060-92 = "เราไม่ได้จะสู้กันนะคะ พวกเราไม่ได้มารวมตัวกันเพื่อไปต่อสู้ค่ะ! ทุกคนสงบสติอารมณ์ก่อน...!!"
10039060-96 = "หืม...?"
10039060-97 = "เอ๋? คนพวกนั้น...?"
10039060-102 = "คะ..."
10039060-103 = "คุณนางิสะ... จากสภาน้ำชา...! ?"
10039060-110 = "นะ... นี่... นางิจัง...?"
10039060-111 = "จริงเหรอ? นี่เรื่องจริงเหรอ? ฉันว่ามันแปลกๆ นะ..."
10039060-112 = "พวกนั้นไม่น่าจะมาต่อสู้กันในวันแบบนี้และในที่แบบนี้สิ คงจะลือกันปากต่อปากจนข้อมูลบิดเบือนแน่ๆ"
10039060-113 = "ยิ่งพวกเรามาที่นี่แล้วด้วย บรรยากาศก็จะยิ่งแปลกไปอีก ลองคิดดูใหม่เถอะนะ นางิจัง...?"
10039060-115 = "คุณมิกะ..."
10039060-116 = "สภาน้ำชาต้องเตรียมรับมือสถานการณ์ที่คาดไม่ถึงเสมอค่ะ และจากสิ่งที่เกิดขึ้นในตอนนี้ ฉันว่าสถานการณ์ที่คาดไม่ถึงมันยิ่งชัดเจนขึ้นเรื่อยๆ แล้วค่ะ"
10039060-117 = "คุณมิกะไม่เห็นกองกำลังของชมรมซิสเตอร์กับชมรมอัศวินบรรเทาทุกข์ที่รวมตัวกันอยู่ทางโน้นเหรอคะ"
10039060-118 = "ถึงจะทำเหมือนเป็นการดวลที่ใสสะอาด แต่หากมีอะไรผิดพลาดก็จะใช้แผน B ในการใช้กำลังล้มล้าง#nอีกฝ่าย คุณมิกะดูไม่ออกเหรอคะ?"
10039060-119 = "นี่คือปัญหาใหญ่ที่จะนำไปสู่สงครามกลางเมืองในทรีนิตี้ได้เลยนะคะ"
10039060-120 = "การก่อเหตุการณ์แบบนี้ในวันที่มีความหมายเช่นนี้เป็นสิ่งที่โฮสต์ของสภาน้ำชายอมรับไม่ได้ค่ะ"
10039060-121 = "ในเมื่อเป็นเช่นนี้ คุณมิกะต้อง..."
10039060-127 = "ฉะ... ฉันเหรอ!?"
10039060-128 = "อะไรกัน!? จะให้ฉันออกไปจัดการเหรอ...?"
10039060-129 = "นางิจัง!? ให้ฉันไปสู้ด้วยจริงเหรอ!? พาฉันมาด้วยเหตุผลแบบนี้น่ะเหรอ!?"
10039060-130 = "ทั้งหมดก็เพื่อความสงบสุขของโรงเรียนสามัญทรีนิตี้ค่ะ! คุณคือกำลังของสภาน้ำชาไม่ใช่เหรอคะ!!"
10039060-131 = "ไม่นะ ไม่! ไม่เอาๆๆๆ!!!!!!"
10039060-132 = "ฉันไม่ชอบอะไรแบบนี้เลยนะ! นึกไม่ถึงด้วยซ้ำว่าต้องมาทำอะไรแบบนี้! ตอนนี้ฉันไม่ได้อยู่ในตำแหน่ง#nแบบนั้นด้วยนะ!"
10039060-133 = "บ้าไปแล้วแน่ๆ!! ขอร้องละ นางิจัง!? ตั้งสติเถอะน่า! นะ!?"
10039060-134 = "ไม่ได้การละ คงต้องติดต่อคุณครู...!!!"
10039060-140 = "..."
10039060-141 = "มาถึงพอดีเลยนะคะ ต้นเหตุของเรื่อง..."
10039060-148 = "มาตรงเวลาดีนะคะ คุณซากุระโกะ..."
10039060-149 = "ได้ไปคิดทบทวนมาหรือยังคะ? แล้วเวลาเพียงพอหรือเปล่า?"
10039060-150 = "ไปคิดมาแล้วแน่นอนค่ะ เรื่องสำคัญขนาดนี้ ฉันจะมาช้าแบบไม่มีคำตอบได้ยังไงกันคะหัวหน้ามิเนะ?"
10039060-151 = "นี่เป็นการพบกันครั้งสำคัญ..."
10039060-153 = "ที่เราจะตัดสินใจเลือกผู้นำคนใหม่ของพวกเราเลยนะคะ"
10039060-159 = "แต่ก็แปลกจังเลยนะคะ มีคนมารวมตัวกันมากกว่าปกติเสียอีกค่ะ"
10039060-160 = "ซิสเตอร์จากชมรมซิสเตอร์... ก็มาอยู่ที่นี่กันเยอะเลยค่ะ"
10039060-161 = "นั่นสินะคะ สมาชิกของชมรมอัศวินบรรเทาทุกข์เองก็มาอยู่ที่นี่กันเยอะเลยด้วย มีเรื่องอะไรกันเหรอคะ?"
10039060-162 = "ฉันว่าเราควรไปถามสักหน่อย..."
10039060-163 = "ไม่อยากจะเชื่อเลยนะคะว่าจะเป็นจริง..."
10039060-168 = "พวกคุณมีมุมที่กล้าหาญมากกว่าที่ฉันคิดไว้เยอะเลยนะคะ ชมรมซิสเตอร์ ชมรมอัศวินบรรเทาทุกข์"
10039060-170 = "โฮสต์ของสภาน้ำชา...? คุณนางิสะ...?"
10039060-171 = "ทำไมคนที่ควรจะงานยุ่งกับงานของโรงเรียนถึงมาอยู่ในที่แบบนี้ล่ะคะ...?"
10039060-173 = "น่าตกใจจริงๆ เลยนะคะ สถานการณ์มาถึงขนาดนี้แล้วยังแกล้งทำเหมือนไม่รู้อีก? หรือพวกคุณคิดว่า#nฉันเป็นคนโง่กันคะ?"
10039060-175 = "...?"
10039060-176 = "ว่ายังไงนะคะ...?"
10039060-178 = "ในฐานะของโฮสต์ของสภาน้ำชา ฉันขอถามพวกคุณอย่างเป็นทางการค่ะว่าพวกคุณมาทำอะไรกันที่นี่"
10039060-179 = "ทำไมถึงมารวมตัวกันที่นี่ในตอนนี้คะ? ช่วยตอบอย่างทันทีด้วยค่ะ"
10039060-180 = "คุณไม่ได้ถามในฐานะประธานคณะกรรมการจัดการเทศกาลแต่ถามในฐานะของ \"โฮสต์ของสภาน้ำชา\" เหรอคะ?"
10039060-181 = "ใช่ค่ะ มีปัญหาอะไรเหรอคะ...?"
10039060-182 = "ไม่ค่ะ... ไม่มีค่ะ"
10039060-183 = "นั่นสินะคะ เข้าใจแล้วค่ะ ถ้าอย่างนั้นฉันก็จะตอบให้ค่ะ"
10039060-187 = "\"เรื่องนี้ไม่เกี่ยวกับคุณค่ะ คุณคิริฟุจิ นางิสะ โฮสต์ของสภาน้ำชา\""
10039060-188 = "..."
10039060-189 = "...!!!"
10039060-190 = "คุณมิกะ..."
10039060-191 = "ดะ... เดี๋ยวก่อนสิ นางิจัง เดี๋ยวก่อน! ฉันว่ามันแปลกๆ นะ! ต้องมีการเข้าใจอะไรผิดกันแน่นอน!! "
10039060-192 = "เราลองฟังเรื่องจากพวกเธอต่ออีกหน่อย..."
10039060-193 = "มิกะ!!"
10039060-194 = "อ๊าาาา~!! ขอร้องละ นางิจัง! "
10039060-195 = "ฮึ่ย...!! ฉัน... ฉันไม่รู้ด้วยแล้ว...!! ไม่ว่าจะเป็นยังไงฉันก็ไม่รู้ด้วยแล้ว!!"
10039060-201 = "อะไรกันคะ...?"
10039060-202 = "บรรจุกระสุนทำไมคะ? ทุกคนกำลังมองอยู่นะคะ คิดจะทำอะไรกลางจัตุรัสในกลางวันแสกๆ แบบนี้คะ?"
10039060-203 = "พวกคุณเสียสติไปแล้วจริงๆ เหรอคะ สภาน้ำชา?!"
10039060-204 = "งั้นก็ดีค่ะ! ถึงจะไม่รู้สาเหตุ แต่ฉันก็จะตอบรับความต้องการนั้นให้ค่ะ!"
10039060-205 = "เตรียมตัวเลยค่ะ คุณซากุระโกะ ไหนๆ สมาชิกคนอื่นก็มาอยู่ที่นี่กันแล้วด้วย"
10039060-207 = "คะ...? คะ!? ฉันเหรอคะ?"
10039060-208 = "เร็วๆ ค่ะ!!"
10039060-209 = "อะ... เอ่อ...! ค่ะ!? หืมมม...!?"
10039060-210 = "อะ... อะไรกันคะ? ทำไมถึงกลายเป็นแบบนี้ไปได้คะ?"
10039060-211 = "ตั้งใจให้เกิดสถานการณ์แบบนี้สินะคะ ซากุระโกะ!!"
10039060-212 = "ทุกคนเตรียมต่อสู้!!!"
10039060-219 = "เตรียมพร้อมต่อสู้เต็มกำลัง!!"
10039060-220 = "หาาาาาาา!?!?"
10039060-227 = "นี่มันการปฏิวัติชัดๆ เลยค่ะ!!"
10039060-228 = "ไม่ค่ะ! นี่คือการต่อต้านเผด็จการค่ะ!!"
10039060-229 = "ทำไมเรื่องแบบนี้ต้องเกิดแต่กับฉันตลอดเลยคะ!?"
10039060-230 = "ฉันไม่รู้ด้วยแล้ววววว~~~!!!"

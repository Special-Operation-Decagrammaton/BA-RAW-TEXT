10027120-106 = "3;마리나;02;여기에 친구와의 약속을 지키지 않은 못된 녀석과…….\n#3;em;[반응]"
10027120-107 = "3;마리나;05;우리 사무국을 때려눕히고 도망간 말썽꾸러기 꼬마들이 있다고 들었다!\n#3;em;[!]"

10027120-47 = "3;메루;10;아니, 뭐, 내가 틀린 말 했어?!\n#3;a\n#3;em;[?!]\n#3;shake"
10027120-48 = "1;야쿠모;04;아니, 무슨 소리예요? 저라고 해서 그 정도로 이상한 사람은 아니라구요. 완결권이 존재하지 않는 책의 동인 원고를 가져다 출판한다니…….\n#1;a\n#3;m5\n#1;em;[속상함]"
10027120-49 = "3;메루;05;그런 게 아니라면, 왜 내 원고를 받아 가겠다는 건데……?"
10027120-50 = "1;야쿠모;07;뭐, 간단해요. 이번 소동에 대해 우선 되짚어 보죠.\n#1;em;[음표]"
10027120-51 = "1;야쿠모;01;우선, 메루는 친구와 싸웠지만 다시 화해하기 위해, 자신에게 독이 되는 접시도 주저 없이 받아 마셨죠. "
10027120-52 = "3;메루;05;……그 접시, 네가 준 거 아니냐?\n#3;em;[?]"
10027120-53 = "1;야쿠모;11;아무튼 간에요. 거기에서 한층 더 나아가 그 유명한 샬레의 선생님의 도움까지 받아 가며, 그것도 모자란다는 듯이 평소의 라이벌과 싸우고, 화해하고, 나아가 인정받기를 주저하지 않은 끝에…….\n#1;em;[재잘]"
10027120-54 = "3;메루;04;야, 저거 너네 부장이잖아. 어떻게 좀 해 봐.\n#3;em;[땀]"
10027120-55 = "#all;hide"
10027120-56 = "3;타카네;06;……부장님은 원래 저런 분이라고요. 저에게 말해서 무슨 소용이겠어요?\n#3;a\n#3;em;…"
10027120-57 = "#all;hide"
10027120-58 = "3;야쿠모;07;마지막에는 자신의 모든 것을 짜내어 결과물까지 만들어 냈다……! 이건 그야말로 우정과 바이올런스, 해프닝과 이벤트가 가득한…….\n#3;closeup\n#3;a\n#3;em;[재잘]"
10027120-59 = "3;야쿠모;11;정말로 멋진 이야기 아닙니까?!\n#3;closeup"
10027120-60 = "[s] \"듣고 보니 거기까지는 그럴듯한데?!\""
10027120-61 = "3;메루;05;함부로 동의해 주지 마, 선생!\n#3;closeup\n#3;em;[빠직]"
10027120-62 = "#all;hide"
10027120-63 = "3;야쿠모;99;그래서 저, 아라마키 야쿠모, 결정했습니다. 정확히는 메루가 출판부를 방문했던 그 순간, 이미 머릿속에 백년대계를 세웠다고 해야겠죠.\n#3;em;…"
10027120-64 = "3;야쿠모;03;눈물 없이 볼 수 없는 메루의 대모험을 붉은겨울, 아니, 나아가 모든 키보토스 학생들에게 팔아먹…… 이 아니라 보여주자고."
10027120-65 = "3;야쿠모;05;이 대소동극을 저희 출판부의 힘으로, '실사화' 영화로 만들어 보이겠다고!!!\n#3;closeup\n#3;em;[!]"

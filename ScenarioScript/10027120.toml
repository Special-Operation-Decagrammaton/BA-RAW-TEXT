10027120-111 = "[s] \"아니야!\""
10027120-112 = "3;마리나;06;으음…… 아쉽게 되었지만. 붉은겨울의 신성한 학칙을 어긴 자라면, 선생이라도 가만히 둘 수 없는 법!\n#3;stiff"
10027120-113 = "3;마리나;05;이대로 붙잡아서. 반성실로 모셔가겠다! 반성실이라면 나도 익숙하니, 불편하진 않을 거다!"

10027120-11 = "3;야쿠모;08;우정과 노력과 근성의 이야기, 멋졌답니다. 그야말로 어딘가에 기록이라도 해서 오래도록 남겨 놓고 싶을 정도로요. 그래서 말인데요.\n#3;em;[반응]"
10027120-12 = "#all;hide"
10027120-13 = "3;메루;04;(……뭔가 불길한데. 이 녀석이 아무 의미 없이 좋은 소리를 할 리가 없는데…….)\n#3;closeup\n#3;em;…"
10027120-14 = "#all;hide"
10027120-15 = "3;야쿠모;03;우선은, 그때 약속했던 '원고'에 대한 이야기를 좀 하고 싶네요!\n#3;em;[음표]"
10027120-16 = "#all;hide"
10027120-17 = "1;모미지;02;원고, 요?\n#1;em;[?]\n#1;a"
10027120-18 = "5;메루;04;어……. 그러니까, 좀 일이 있어서, 저 녀석한테 원고를 하나 부탁받았거든. 그건 사실이긴 한데…….\n#5;em;[땀]\n#5;a"
10027120-19 = "#all;hide"
10027120-20 = "3;메루;05;(그걸 왜 하필 이 타이밍에……?)\n#3;closeup\n#3;em;[?]"
10027120-21 = "#all;hide"
10027120-22 = "3;야쿠모;09;잘 기억하고 있는 것 같아 다행이에요! 그러니까 말입니다."
10027120-23 = "3;야쿠모;11;메루가 그린 <LUNA>, 그 대신으로 받아 가고 싶은데요!\n#3;closeup\n#3;em;[반짝]"

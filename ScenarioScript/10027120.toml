[translation]
10027120-1 = "第12話;赤冬平凡的一天 "
10027120-3 = "八雲！？"
10027120-4 = "主，主編？不對，部長！？"
10027120-11 = "由友情、努力和毅力交織而成的故事……真是太美妙了。#n真希望有人能把這段經歷記錄永遠記錄下來呢。所以……"
10027120-13 = "（……有股不祥的預感。#n　這傢伙絕不可能毫無來由地稱讚別人……）"
10027120-15 = "首先，我想先談談之前說好的那份「稿子」！"
10027120-17 = "稿子，是嗎？"
10027120-18 = "那個……因為一些原因，我曾答應幫那傢伙畫一份稿子。#n雖然確實是這樣沒錯……"
10027120-20 = "（不過為什麼偏偏現在提起這件事……？）"
10027120-22 = "你還記得真是太好了！那麼……"
10027120-23 = "就用愛瑠畫的《LUNA》來抵那份稿子吧！"
10027120-28 = "咦？不行！你想聽幾百個理由我都可以告訴你……#n但最重要的是，那是我要送給紅葉的禮物！"
10027120-29 = "嗯？可是我們已經簽過合約了吧？"
10027120-30 = "那個……！我確實是簽了沒錯，可是……！"
10027120-31 = "[s]「一定要是《LUNA》才行嗎？」"
10027120-32 = "沒錯，我會這麼說也是有原因的。"
10027120-33 = "但我也不是魔鬼哦？#n我並沒有要你們將它的所有權永久轉讓的意思，而是希望你們能把它暫時借給我。"
10027120-34 = "雖然……我所謂的暫時可能有點久就是了。"
10027120-35 = "[s]「所以你打算拿那本《LUNA》同人誌做什麼……？」"
10027120-36 = "就，就是說啊！你要拿我的同人誌做什麼？#n該不會……是想要大量出版吧？"
10027120-38 = "就算我的作品是能替夢幻的《LUNA》第二十二卷完美回收伏筆的同人誌，#n你這麼做也是不行的！"
10027120-43 = "……"
10027120-44 = "……"
10027120-45 = "愛瑠前輩……"
10027120-47 = "怎，怎麼？我說錯什麼了嗎！？"
10027120-48 = "等等，你在說什麼？就算是我也不會做出那種事的好嗎？#n拿沒有最終卷作品的同人誌去出版什麼的……"
10027120-49 = "如果不是的話，那你要我的原稿到底要做什麼……？"
10027120-50 = "事情很簡單。#n我們先來回顧一下這整起騷動的始末吧。"
10027120-51 = "首先，愛瑠為了跟吵架的朋友和好，不惜喝下了一杯可能會害自己送命的毒酒。 "
10027120-52 = "……那杯毒酒不就是你給的嗎？"
10027120-53 = "那不是重點。總之愛瑠後來不僅找了鼎鼎大名的夏萊老師幫忙，#n甚至還和自己的宿敵經歷了吵架、和好、贏得認可的種種過程……"
10027120-54 = "喂，那不是你們的部長嗎？快想想辦法。"
10027120-56 = "……部長本來就是那樣的人，你跟我說這些也沒用啊？"
10027120-58 = "最後在投入了自己的一切後，總算收穫了甜美的果實……！#n你們想想，這不正是一個充滿了友情和活力、巧合和意外……"
10027120-59 = "簡直稱得上是精彩絕倫的好故事嗎！？"
10027120-60 = "[s]「聽你這麼一說，好像確實沒錯！？」"
10027120-61 = "不要附和他啦！老師！"
10027120-63 = "所以我荒槇八雲決定了……不，正確來說，從愛瑠來到出版部的那一刻起，#n我的腦海裡就浮現了一個遠大的計畫。"
10027120-64 = "要讓愛瑠這場可歌可泣的大冒險不侷限於赤冬，而是將其賣……#n更正，是推廣給整個奇普托斯的所有學生。"
10027120-65 = "以我們出版部的力量，將這段故事翻拍成一部「真人版電影」！！！"
10027120-70 = "……啊？"
10027120-71 = "……啥？"
10027120-72 = "什麼……？"
10027120-76 = "[ns]「嗯？出版部有辦法做到那種事嗎？」"
10027120-78 = "嗯，當然沒問題。如今出版界和電影界的合作早就不是什麼新鮮事了。#n例如將網路小說拍成電影，或是反過來將賣座的電影寫成小說。"
10027120-79 = "從擴展IP到商業層面，這都是一股不可或缺的助力！"
10027120-81 = "嗯……真不愧是部長，果然不容小覷。"
10027120-82 = "怎麼連你也佩服起來了啊！？"
10027120-84 = "所以我才想借用那份原稿。#n畢竟那東西的用處可多著呢，要拿來當電影的宣傳資料也行。"
10027120-85 = "哎呀，你不必那麼緊張。之後一定會完好無缺地還給你的。#n至於時間……可能會有點長就是了。"
10027120-86 = "大，大概多久？"
10027120-87 = "如果電影製作一切順利的話，大約是一年……不，大約兩年左右吧？"
10027120-88 = "我怎麼可能等這麼久！#n雖然平時就不知道你腦袋裡在想什麼，現在更想不通了！"
10027120-89 = "哎呀～你是從小被騙大的嗎？#n我一定會讓你見識我們出版部的實力的哦？"
10027120-90 = "沒錯！我就是被騙大的！怎麼樣！"
10027120-91 = "好吧，其實我也沒有那麼無情。#n如果你真的不願意把原稿給我……那也沒辦法。"
10027120-92 = "咦？比想像中還好說話……？#n不，等等，通常這種時候你都會說出更誇張的話才對！"
10027120-93 = "我的確不是個無情的人。#n不過在這赤冬學園之中，可是有一個最討厭有人不遵守合約的惡鬼哦！"
10027120-98 = "訴諸赤冬學園校規！事務局的各位！請來這邊！"
10027120-106 = "聽說這裡有個不遵守朋友之間約定的壞蛋……"
10027120-107 = "還有打倒我們事務局的成員之後逃走的問題兒童啊！"
10027120-108 = "[s]「哇！我被當成兒童了！好興奮！」"
10027120-109 = "老，老師！？你怎麼會在這裡！？"
10027120-110 = "難道因為違反校規而被檢舉的壞蛋……指的就是老師！？"
10027120-111 = "[s]「才不是！」"
10027120-112 = "呼呣……#n雖然遺憾，不過只要是違反了赤冬學園神聖的校規，就算是老師也不能放過！"
10027120-113 = "乖乖束手就擒，跟我們到反省室去吧！#n反省室我熟得很，不會吃多少苦的！"
10027120-114 = "[s]「事情不是那樣啦！」"
10027120-116 = "竟然把事務局也牽扯進來，八雲你……！"
10027120-117 = "合約可是很無情的唷，呣呵呵。"

[translation]
10027120-1 = "ตอนที่ 12;วันธรรมดาๆ ของเรดวินเทอร์ 2"
10027120-3 = "ยาคุโมะ?!"
10027120-4 = "คะ... คุณบรรณาธิการ? ไม่สิ หัวหน้า??"
10027120-11 = "เรื่องราวของมิตรภาพ ความพยายาม และเลือดนักสู้ ถือว่ายอดเยี่ยมมากค่ะ อยากจะบันทึกเอาไว้ที่#nไหนสักที่ แล้วเก็บรักษาไว้นานๆ เลยค่ะ แต่ว่า..."
10027120-13 = "(รู้สึกลางไม่ดียังไงไม่รู้... ยัยนี่ไม่มีทางพูดจาดีๆ โดยไม่มีอะไรแอบแฝงหรอก...)"
10027120-15 = "ก่อนอื่นฉันอยากคุยเกี่ยวกับ 'ต้นฉบับ' ที่เคยสัญญากันไว้เมื่อตอนนั้นก่อนค่ะ!"
10027120-17 = "ต้นฉบับ... เหรอคะ?"
10027120-18 = "อ่า... พอดีตอนนั้นมีเรื่องนิดหน่อย ยัยนี่ก็เลยให้ฉันช่วยดูต้นฉบับให้เล่มหนึ่งน่ะ ฉันควรจะช่วยดูให้#nตอนนั้นเลยแท้ๆ..."
10027120-20 = "(แล้วนี่ทำไมต้องมาทวงตอนนี้ด้วย...?)"
10027120-22 = "โล่งอกไปทีนะคะที่ยังจำได้! เพราะฉะนั้น..."
10027120-23 = "ฉันเลยอยากเอา <ลูน่า> ที่เมรุวาดไปแทนค่ะ"
10027120-28 = "หะ... หืม? ไม่ได้นะ! ฉันมีเหตุผลมากมายที่จะไม่ให้เธอ... ที่สำคัญที่สุดก็คือฉันจะเอาไปเป็นของขวัญ#nให้โมมิจินะ!"
10027120-29 = "เอ๋? แต่เราถึงกับเขียนหนังสือสัญญากันไว้แล้วไม่ใช่เหรอคะ?"
10027120-30 = "เรื่องนั้นมัน...! ใช่! ก็เขียนหนังสือสัญญาไว้อยู่หรอก...!"
10027120-31 = "[s] \"จำเป็นต้องเป็น <ลูน่า> เท่านั้นเหรอ?\""
10027120-32 = "ค่ะ ฉันบอกได้แค่ว่า... ฉันมีเหตุผลที่ต้องทำแบบนั้น"
10027120-33 = "แต่ฉันก็ไม่ได้ใจร้ายหรอกนะคะ ฉันไม่ได้จะเอา <ลูน่า> มาครอบครองไว้ตลอด เรียกว่าฉันขอเช่า#nหนังสือดีกว่าค่ะ"
10027120-34 = "แต่ก็... มีความเป็นไปได้สูงว่าฉันจะขอเช่าในระยะยาวหน่อยนะคะ"
10027120-35 = "[s] \"แล้วจะเอาโดจินชิ <ลูน่า> ไปทำอะไรเหรอ...?\""
10027120-36 = "ชะ... ใช่! จะเอาต้นฉบับ <ลูน่า> ของฉันไปทำอะไร? อย่าบอกนะว่า... จะเอาไปพิมพ์ขาย?"
10027120-38 = "ถึงงานของฉันจะเป็นผลงานที่เล่าเรื่องราวของ <ลูน่า> เล่ม 22 ที่ไม่มีอยู่จริงได้อย่างสุดยอดเลยก็#nเถอะนะ! แต่ฉันไม่อนุญาตให้ทำแบบนั้นแน่!"
10027120-43 = "......"
10027120-44 = "......"
10027120-45 = "รุ่นพี่เมรุ..."
10027120-47 = "ทำไม ฉันพูดอะไรผิดรึไง?!"
10027120-48 = "พูดอะไรแบบนั้นกันคะ? เห็นฉันเป็นอย่างนี้ แต่ฉันก็ไม่ใช่คนพิสดารอะไรขนาดนั้นนะคะ คิดว่าฉันจะ#nเอาต้นฉบับของหนังสือที่ไม่มีเล่มจบบริบูรณ์ไปตีพิมพ์งั้นเหรอ..."
10027120-49 = "แล้วถ้าไม่ใช่แบบนั้น เธอจะอยากได้ต้นฉบับของฉันไปทำอะไรล่ะ...?"
10027120-50 = "ง่ายมากค่ะ ลองมาคิดถึงความวุ่นวายนี้กันดูนะคะ"
10027120-51 = "ก่อนอื่นเลย เมรุทะเลาะกับเพื่อน แต่ก็ยอมดื่มน้ำจากจอกที่เป็นพิษต่อตัวเองเพื่อที่จะคืนดีกับเพื่อน"
10027120-52 = "...ก็แล้วจอกที่ว่ามันมาจากเธอไม่ใช่รึไง?"
10027120-53 = "ยังไงก็เถอะค่ะ หลังจากนั้นเมรุก็ก้าวไปอีกขั้นด้วยการไปขอความช่วยเหลือจากคุณครูชาเล่ต์ผู้มีชื่อเสียง แค่นั้นยังไม่พอ ยังไปทะเลาะกับคู่ปรับประจำตัว แต่ก็ยอมคืนดีกัน และไม่ลังเลที่จะทำบางอย่าง เพื่อให้ได้รับการยอมรับ..."
10027120-54 = "นี่ นั่นหัวหน้าของเธอไม่ใช่เหรอ? ลองทำอะไรหน่อยสิ"
10027120-56 = "...ปกติท่านหัวหน้าเป็นคนอย่างนั้นอยู่แล้วค่ะ บอกฉันไปก็ไม่เกิดประโยชน์อะไรหรอกนะคะ"
10027120-58 = "และสุดท้ายเธอก็รีดเค้นความพยายามจนได้ผลลัพธ์ออกมา...! เป็นผลงานที่เต็มไปด้วยเรื่องราวของ#nมิตรภาพ ความรุนแรง และเหตุบังเอิญ..."
10027120-59 = "มันน่ายอดเยี่ยมมากเลย ว่าไหมล่ะคะ?!"
10027120-60 = "[s] \"พอฟังดูแล้ว มันก็จริงอยู่นะ?!\""
10027120-61 = "อย่าไปเห็นด้วยสุ่มสี่สุ่มห้าสิครู!"
10027120-63 = "อารามากิ ยาคุโมะผู้นี้ก็เลยตัดสินใจแล้วค่ะ ถ้าจะพูดให้ชัดเจน ฉันวาดแผนระยะยาวไว้ในหัวตั้งแต่ที่#nเมรุแวะเข้ามาที่ชมรมสื่อสิ่งพิมพ์แล้วค่ะ"
10027120-64 = "ฉันอยากขาย... อยากแสดงให้นักเรียนทั้งเรดวินเทอร์... ไม่สิ อยากให้นักเรียนทั้งคิโวทอสได้เห็น#nการผจญภัยที่ยิ่งใหญ่และกินใจของเมรุ"
10027120-65 = "ก็เลยจะใช้อำนาจของชมรมสื่อสิ่งพิมพ์ในการถ่ายทอดความวุ่นวายนี้ออกมาเป็น 'ภาพยนตร์จากเรื่อง#nจริง' ค่ะ !!"
10027120-70 = "...หา?"
10027120-71 = "หา...?"
10027120-72 = "คะ...?"
10027120-76 = "[ns] \"หืม? ชมรมสื่อสิ่งพิมพ์ทำอะไรแบบนั้นได้ด้วยเหรอ?\""
10027120-78 = "ค่ะ เราทำได้ค่ะ ช่วงนี้วงการสิ่งพิมพ์กับวงการภาพยนตร์กำลังจับมือกันอยู่ค่ะ มีทั้งเอานิยายออนไลน์#nไปสร้างเป็นหนัง และในทางกลับกันก็เอาหนังไปสร้างเป็นนิยายแล้วตีพิมพ์ขายด้วย"
10027120-79 = "การขยาย IP คือกลยุทธ์ที่จะขาดไม่ได้ในเชิงธุรกิจเลยค่ะ!"
10027120-81 = "ฮืม... สมกับเป็นหัวหน้าที่จะดูแคลนไม่ได้จริงๆ ค่ะ"
10027120-82 = "นี่เธอก็ชื่นชมด้วยงั้นเหรอ?!"
10027120-84 = "เพราะงั้น ฉันขอยืมต้นฉบับไปก่อนนะคะ คงจะเอาไปใช้ประโยชน์ได้อย่างไม่สิ้นสุดเลยค่ะ! เอาไปใช้#nโปรโมตหนังก็คงได้ด้วย"
10027120-85 = "โธ่ ไม่ต้องกังวลให้มากไปหรอกนะคะ ไว้ฉันจะคืนให้แน่นอนค่ะ แต่กว่าจะคืน... อาจจะใช้เวลานาน#nหน่อยค่ะ"
10027120-86 = "นะ... นานแค่ไหน?"
10027120-87 = "ก็ถ้าจนกว่าจะสร้างหนังเสร็จ ก็น่าจะประมาณ 1 ปี... ไม่สิ น่าจะราวๆ 2 ปีได้นะคะ"
10027120-88 = "คิดว่าฉันจะรอได้จนถึงตอนนั้นเลยรึไง! ฉันไม่ให้หรอก! ปกติก็คาดเดาความคิดของเธอไม่ได้อยู่แล้ว ยิ่งเป็นแบบนี้ฉันยิ่งไม่ไว้ใจเข้าไปใหญ่เลย!"
10027120-89 = "ไม่เอาน่า ทำไมไม่เชื่อใจคนอื่นเลยล่ะ นี่ฉันจะทำให้เห็นศักยภาพของชมรมสื่อสิ่งพิมพ์เลยนะคะ"
10027120-90 = "ใช่! ฉันไม่เชื่อใจ! แล้วมันจะทำไม!"
10027120-91 = "บอกไปแล้วนี่ว่าฉันก็ไม่ใช่คนใจร้ายขนาดนั้น แต่ถ้าไม่อยากให้ต้นฉบับ... งั้นก็ช่วยไม่ได้นะคะ"
10027120-92 = "หืม? ทำไมพูดง่ายกว่าที่คิดล่ะ...? เดี๋ยวนะ เดี๋ยวก่อน ปกติเวลาแบบนี้เธอมักจะทำเรื่องเหลวไหล#nมากกว่าเดิมนี่นา!"
10027120-93 = "ถึงฉันจะไม่ใช่คนใจร้าย แต่ในเรดวินเทอร์ก็ยังมีคนที่ไม่ชอบคนที่ไม่รักษาสัญญาแล้วยังมา#nสบประมาทคนอื่นนะคะ!"
10027120-98 = "ฉันจะร้องเรียนในเรื่องระเบียบของเรดวินเทอร์ค่ะ! สำนักเลขาธิการ! ตรงนี้ค่ะ!"
10027120-106 = "ตรงนี้มีคนนิสัยไม่ดีที่ไม่รักษาสัญญากับเพื่อน..."
10027120-107 = "ได้ยินว่ามีเด็กเจ้าปัญหาที่เล่นงานสำนักเลขาธิการของเราแล้วหนีไปเหรอ!"
10027120-108 = "[s] \"โห! ถูกมองว่าเป็นเด็กเลยเหรอเนี่ย! ตื่นเต้นจัง!\""
10027120-109 = "คะ... ครู?! ทำไมครูถึงมาอยู่ตรงนี้ได้?!"
10027120-110 = "อย่าบอกนะว่า... คนที่ละเมิดกฎของโรงเรียน... ก็คือครู!?"
10027120-111 = "[s] \"ไม่ใช่นะ!\""
10027120-112 = "อืม... น่าเสียดายนะ แต่ถ้าเป็นคนที่ละเมิดกฎที่ศักดิ์สิทธิ์ของเรดวินเทอร์แล้วละก็ ต่อให้เป็นครูฉันก็#nปล่อยผ่านไปไม่ได้!"
10027120-113 = "ต้องควบคุมตัวไปห้องสำนึกผิด! ฉันก็คุ้นเคยกับห้องสำนึกผิดดี คงไม่มีอะไรลำบากหรอก!"
10027120-114 = "[s] \"บอกแล้วไงว่าไม่ใช่ครู!\""
10027120-116 = "เอาสำนักเลขาธิการเข้ามาเอี่ยวด้วยเลยงั้นเหรอ ยาคุโมะ เธอนี่มัน...!"
10027120-117 = "ปกติสัญญามันก็ไร้ความเมตตาแบบนี้แหละค่ะ ฮี่ฮี่ฮี่"

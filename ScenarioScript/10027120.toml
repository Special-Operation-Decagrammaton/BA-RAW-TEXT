10027120-27 = "#bgshake\n#all;hide\n#wait;2000"
10027120-28 = "5;메루;04;어, 어? 이건 안 돼! 안 되는 이유는 수도 없이 생각해 낼 수 있지만…… 무엇보다, 모미지한테 선물할 거란 말이야!\n#5;a\n#5;hophop"
10027120-29 = "1;야쿠모;04;어라아? 그렇지만 분명, 계약서까지 작성하지 않았던가요?\n#1;a\n#1;em;…"
10027120-30 = "5;메루;05;그건……! 분명 쓰기는, 썼는데……!"
10027120-31 = "[s] \"꼭 <LUNA> 여야만 하는 거야?\""
10027120-32 = "1;야쿠모;07;네, 뭐. 그래야 할 이유가 있다고밖에는 말씀드릴 수가 없네요."
10027120-33 = "1;야쿠모;08;하지만 저도 귀신은 아니라고요? 영원히 소유권을 이전해 달라는 건 아닙니다. 오히려 대여해 주십사, 부탁드리는 것에 가깝죠.\n#1;em;[반짝]"
10027120-34 = "1;야쿠모;11;뭐어…… 조금, 중장기 대여가 될 가능성이 제법 있지만요."
10027120-35 = "[s] \"결국은 동인지인 <LUNA>로, 무엇을 하려고……?\""
10027120-36 = "5;메루;02;그, 그래! 동인지 원고를 받아 가서 어디에 쓰겠다는 거야? 설마…… 대량 출판이라도 하게?\n#5;em;[?]"
10027120-37 = "#all;hide"
10027120-38 = "3;메루;05;아무리 내 작품이 존재하지 않는다는 <루나 22권>의 뒷이야기를 멋지게 풀어낸 엄청난 원고일지라도! 그건 진짜 아웃이니까!\n#3;closeup\n#3;em;[빠직]"

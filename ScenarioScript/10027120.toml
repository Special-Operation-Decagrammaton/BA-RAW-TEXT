10027120-77 = "#all;hide"
10027120-78 = "3;야쿠모;00;네. 하죠. 요즘 출판계와 영화계의 협력은 떠오르는 대세라구요. 웹 소설이 영화화되거나, 반대로 유명한 영화를 소설화하여 출판하거나.\n#3;a\n#3;em;[반응]"
10027120-79 = "3;야쿠모;07;IP의 확장, 나아가 사업이라는 측면에서 빼놓을 수 없는 흐름이라는 겁니다!\n#3;greeting"
10027120-80 = "#all;hide"
10027120-81 = "1;타카네;99;흠. 역시 부장님. 얕볼 수 없겠네요.\n#1;a"
10027120-82 = "5;메루;04;너까지 감탄하는 거냐고?!\n#5;a\n#5;em;[?]"
10027120-83 = "#all;hide"
10027120-84 = "3;야쿠모;00;그러니 원고, 빌리겠습니다. 활용법은 무궁무진하겠죠! 영화의 홍보 자료로도 사용할 수 있을 테고요. \n#3;em;[반응]\n#3;a"
10027120-85 = "3;야쿠모;04;에이, 너무 걱정하지 말아요. 나중에 착실하게 돌려드릴 테니까. 기간은…… 조금, 많이 길어질 것 같지만요. "
10027120-86 = "5;메루;02;어, 얼마나?\n#5;em;[?]\n#5;al\n#3;m1"
10027120-87 = "3;야쿠모;99;순조롭게 영화 제작이 마무리된다고 생각하면, 앞으로 1년…… 아니, 2년 정도 뒤일까요?\n#3;em;…"
10027120-88 = "5;메루;04;그때까지 기다릴 수 있겠냐! 주겠냐고! 평소에도 무슨 생각하는지 모를 녀석이긴 했지만, 지금은 더 모르겠어!"
10027120-89 = "3;야쿠모;09;에헤이, 속고만 사셨나. 출판부의 저력, 확실하게 보여드릴 거라니까요?"
10027120-90 = "5;메루;05;그래! 속고만 살았다! 왜!\n#5;em;[스팀]\n#5;hophop"
10027120-91 = "3;야쿠모;04;뭐, 하지만 저도 그렇게까지 귀신은 아니랍니다. 정 원고를 못 주겠다면…… 어쩔 수 없죠."
10027120-92 = "5;메루;10;어? 생각보다 말이 통하는 것 같은데……? 아냐, 잠깐. 너 이럴 때 마다 보통 더 말도 안 되는 일을 벌이곤 했었지!\n#5;em;[?!]"
10027120-93 = "3;야쿠모;10;저는 귀신이 아니지만, 이곳 붉은겨울에는 계약을 지키지 않는 그 안하무인한 태도에 화를 내는 귀신이 존재한답니다! "

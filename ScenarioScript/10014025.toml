[translation]
10014025-10 = "嗚，嗚嗚……怎，怎麼回事……"
10014025-11 = "突然……被偷襲了……"
10014025-16 = "哈哈哈！你們以為你們躲得過我三一學園審判者宇沢澪紗的法眼嗎！"
10014025-17 = "竟然還說那種羞恥的台詞……糟透了……"
10014025-18 = "而且台詞還每次都不一樣……剛才不是大家的騎士嗎……"
10014025-20 = "……雖然收到支援請求趕過來了，看來已經一個人全都解決了呢。"
10014025-21 = "嘛……這也像是澪紗的作風……"
10014025-23 = "……啊，鈴美同學！！"
10014025-24 = "不好意思，因為感覺快要錯過最佳時機，所以就自己先衝進去了！"
10014025-25 = "不過，也是託鈴美同學說會過來的福，我才能鼓起勇氣！"
10014025-26 = "果然有鈴美同學在就是不一樣呢！#n不愧是三一的行走閃光彈！！"
10014025-27 = "這，這樣啊……#n那真是太好了……"
10014025-28 = "還有，請別再用那個外號稱呼我了……#n拜託了……"
10014025-29 = "咦？#n……話說回來這位是？"
10014025-30 = "唔嗯……#n之前好像在哪裡見過的樣子……？"
10014025-31 = "[s1] 「嗨，澪紗。」\n[s2] 「之前有見過吧。」"
10014025-32 = "……！#n果然有見過對吧！我想起來了！"
10014025-33 = "……！#n果然有見過對吧！我想起來了！"
10014025-34 = "是被惡徒杏山千紗抓走的人對吧？#n你沒事吧？有沒有被怎麼樣？"
10014025-35 = "[s3] 「被抓走了？」\n[s4] 「千紗是……惡徒？」"
10014025-36 = "澪紗同學，請先打招呼吧。#n這位是夏萊的老師。"
10014025-37 = "澪紗同學，請先打招呼吧。#n這位是夏萊的老師。"
10014025-38 = "……咦？老師？#n夏萊的？"
10014025-39 = "咦，好像有點印象嗎……"
10014025-40 = "[s5] 「重新打個招呼吧。你好呀，澪紗。」\n[s6] 「我是夏萊的老師唷。」"
10014025-41 = "啊，你好……#n我是三一的騎士，名叫宇沢澪紗……？"
10014025-42 = "啊，你好……#n我是三一的騎士，名叫宇沢澪紗……？"
10014025-43 = "我們正好是為了這件事而來的。#n澪紗同學現在有空嗎？"
10014025-44 = "關於杏山千紗同學，你似乎有些誤會……"
10014025-45 = "……嗯？"
10014025-46 = "誤會……什麼意思？"
10014025-50 = "咦……該不會……"
10014025-52 = "難道說……那個人其實不是杏山千紗……！？"
10014025-54 = "不，我不是那個意思……"
10014025-55 = "……不！"
10014025-56 = "不不不不！#n那怎麼可能呢！"
10014025-57 = "……！？"
10014025-58 = "鈴美同學，我並沒有看錯。#n那個人就是杏山千紗本人！"
10014025-59 = "就算跟以前的氣質不太一樣也騙不過我的雙眼的。#n絕對！"
10014025-60 = "更何況他還散發出外表無法隱藏的「野獸的氣息」！"
10014025-62 = "我有說錯嗎？……老師！？#n那個人是杏山千紗對吧！？"
10014025-63 = "[s7] 「他是千紗沒錯啦……」\n[s8] 「野獸……？」"
10014025-64 = "你看！我就說吧！#n我不可能會分不出來的！"
10014025-65 = "你看！我就說吧！#n我不可能會分不出來的！"
10014025-66 = "鈴美同學，我知道的。"
10014025-69 = "那個人……杏山千紗就是……"
10014025-72 = "曾經讓不良學生們聞風喪膽的神話！！"
10014025-74 = "連在哭的太妹都會停止哭泣的恐怖怪貓──#n「凱茜．帕魯格」！！"
10014025-78 = "同時，也是國中時期的我……"
10014025-79 = "唯一無法擊敗的最兇惡的太妹！"
10014025-80 = "沒錯……"
10014025-81 = "他就是我的「宿敵」！！"
10014025-83 = "什麼凱茜．帕魯格……#n又取這種誇張的外號……"
10014025-84 = "比起這個，澪紗同學。#n請先冷靜下來聽老師的話……"
10014025-85 = "明明某天突然從大家的眼前消失，誰都不知道他到哪去了……！"
10014025-86 = "沒想到竟然！！#n竟然在這種地方試圖東山再起……！！"
10014025-87 = "鈴美同學！老師！！再這樣下去的話，杏山千紗就要……凱茜．帕魯格就要復活了！！#n會再次把這一帶都染上黑暗的啊！"
10014025-88 = "所以說這是我的使命！！#n這就是一定要阻止他的，我的使命啊！！"
10014025-89 = "請等一下澪紗同學。#n剛才老師就是要說你那個看法是誤會。"
10014025-93 = "……嗯？"
10014025-94 = "誤會……是指什麼呢？"
10014025-95 = "杏山千紗已經不是太妹了……？"
10014025-96 = "……咦？"
10014025-97 = "現在正在過著普通的校園生活……？"
10014025-98 = "……杏山千紗嗎？"
10014025-102 = "……那個杏山千紗？"
10014025-103 = "[s9] 「嗯，就是千紗哦。」\n[s10] 「你好像不太相信呢。」"
10014025-104 = "那，那怎麼可能！怎麼會……不可能呀！？#n真的嗎……？為什麼……？"
10014025-105 = "那，那怎麼可能！怎麼會……不可能呀！？#n真的嗎……？為什麼……？"
10014025-106 = "不，不過鈴美同學跟老師都這麼說了……"
10014025-107 = "咦……？什麼？什麼情況……？"
10014025-108 = "雖然不太清楚，不過有這麼難接受嗎……"
10014025-109 = "那，那是因為……鈴美同學不了解杏山千紗……"
10014025-110 = "那可是杏山千紗唷！？那個凱茜．帕魯格唷？"
10014025-111 = "誰也阻止不了的野獸唷！！"
10014025-112 = "那種人竟然……在過著普通的校園生活……？"
10014025-113 = "[s11] （對澪紗來說，千紗的形象……）\n[s12] （竟然是那麼……兇猛啊）"
10014025-114 = "……不，不過，竟然你們兩位都這麼說了……"
10014025-115 = "……不，不過，竟然你們兩位都這麼說了……"
10014025-116 = "……那個……"
10014025-117 = "對，對不起。老實說我現在有點混亂……#n能給我一點時間思考嗎……？"
10014025-118 = "[s13] 「當然可以。隨時都可以連絡我哦。」\n[s14] 「慢慢想也沒關係的。相信我們吧。」"
10014025-119 = "啊，好，好的……"
10014025-120 = "啊，好，好的……"
10014025-121 = "那麼，我先走了……"
10014025-128 = "……走掉了呢。"
10014025-129 = "不過，看來總算是解開誤會了，太好了。"
10014025-130 = "[s] 「總覺得剛才……」"
10014025-132 = "[ns] 「澪紗好像沒什麼精神呢。」"
10014025-133 = "是這樣嗎……？#n抱歉，我沒有注意到……"
10014025-137 = "……老師？"

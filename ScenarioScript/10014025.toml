10014025-128 = "...ไปซะแล้วค่ะ"
10014025-129 = "แต่ก็เหมือนจะแก้ไขความเข้าใจผิดได้แล้ว โล่งอกไปทีนะคะ"
10014025-130 = "[s] \"คือว่าเมื่อกี้ เรอิสะ...\""

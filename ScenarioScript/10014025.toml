[translation]
10014025-10 = "อะ... อึก... อึก... อะ... อะไรกัน..."
10014025-11 = "จู่ๆ ก็... มาโจมตีกันงั้นเหรอ..."
10014025-16 = "ฮ่ะฮ่ะฮ่ะฮ่าา!! พวกคนร้ายซ่อนตัวจากผู้พิพากษาแห่งทรีนิตี้ อุซาวะ เรอิสะผู้นี้ไม่ได้หรอก!!"
10014025-17 = "พูดประโยคน่าอายแบบนั้นออกมาได้เต็มปากเต็มคำ... แย่ที่สุด..."
10014025-18 = "อีกอย่างเธอพูดไม่เคยเหมือนเดิมสักครั้งเลยนี่... เมื่อกี้ยังบอกว่าเป็นอัศวินอยู่เลย..."
10014025-20 = "...อุตส่าห์รีบมาเพราะเห็นว่าขอกำลังเสริม แต่จัดการเองคนเดียวหมดแล้วสินะคะ"
10014025-21 = "ก็นะ... แบบนี้ก็สมกับที่เป็นคุณเรอิสะแล้วละค่ะ"
10014025-23 = "อะ...อ๊ะ คุณสึซึมิ!!"
10014025-24 = "ขอโทษค่ะ ฉันกลัวว่าเรื่องจะสายเกินไป ก็เลยลุยเข้าไปก่อนเลยค่ะ!"
10014025-25 = "แต่เพราะคุณสึซึมิบอกว่าจะมาฉันก็เลยมีความกล้าค่ะ! เป็นกำลังเสริมที่เยี่ยมมากเลยค่ะ!"
10014025-26 = "สมแล้วที่เป็นคุณสึซึมิ! สมกับที่เป็นระเบิดแสงแห่งทรีนิตี้!!"
10014025-27 = "งะ...งั้นเหรอคะ ถ้าช่วยได้ก็ดีแล้วละค่ะ..."
10014025-28 = "จะยังไงก็เถอะค่ะ ต่อจากนี้ช่วยอย่าเรียกกำลังแบบนี้อีกนะคะ... ขอร้องเลยนะคะ"
10014025-29 = "เอ๋...? ว่าแต่คนที่อยู่ข้างๆ นั่นคือใครเหรอ?"
10014025-30 = "อืม... นึกๆ ดูแล้วก็เหมือนเคยเห็นที่ไหนมาก่อนนะคะ...?"
10014025-31 = "[s1] \"สวัสดีนะ เรอิสะ\"\n[s2] \"เราเพิ่งเจอกันเองนี่นา\""
10014025-32 = "...! อ๊ะ! นึกออกแล้วค่ะ!"
10014025-33 = "...! ว่าแล้วเชียว! นึกออกแล้วค่ะ!"
10014025-34 = "คนที่ถูกอันธพาลเคียวยามะ คาซึสะจับตัวไปสินะคะ!? ไม่เป็นอะไรใช่มั้ยคะ? ไม่ได้โดนทำร้ายใช่มั้ยคะ?"
10014025-35 = "[s3] \"โดนจับไป? ครูน่ะเหรอ?\"\n[s4] \"…อันธพาล? คาซึสะ?\""
10014025-36 = "คุณเรอิสะ กล่าวทักทายก่อนน่าจะดีกว่านะคะ ท่านนี้คือคุณครูของชาเล่ต์ค่ะ"
10014025-37 = "คุณเรอิสะ กล่าวทักทายก่อนน่าจะดีกว่านะคะ ท่านนี้คือคุณครูของชาเล่ต์ค่ะ"
10014025-38 = "คะ...? คุณครู? ของชาเล่ต์?"
10014025-39 = "เอ๋ เหมือนจะนึกอะไรออกสักอย่างเลยค่ะ..."
10014025-40 = "[s5] \"ถ้างั้นขอทักทายใหม่อีกครั้งนะ สวัสดี เรอิสะ\"\n[s6] \"อืม ครูเอง\""
10014025-41 = "สะ... สวัสดีค่ะ… ฉันคืออัศวินของทรีนิตี้ อุซาวะ เรอิสะค่ะ"
10014025-42 = "สะ... สวัสดีค่ะ… ฉันคืออัศวินของทรีนิตี้ อุซาวะ เรอิสะค่ะ"
10014025-43 = "คุณเรอิสะ เราตั้งใจจะมาหาเพราะอยากจะคุยเรื่องก่อนหน้านี้ พอจะมีเวลามั้ยคะ?"
10014025-44 = "เพราะดูเหมือนว่าคุณเรอิสะจะกำลังเข้าใจผิดบางอย่างเกี่ยวกับคุณเคียวยามะ คาซึสะอยู่..."
10014025-45 = "คะ..?"
10014025-46 = "เข้าใจผิดงั้นเหรอคะ? เข้าใจผิดอะไรกันคะ? เรื่องก่อนหน้านี้...?"
10014025-50 = "อ้อ...หรือว่า..."
10014025-52 = "หรือว่าคนเมื่อกี้ไม่ใช่เคียวยามะ คาซึสะตัวจริง...!?"
10014025-54 = "ไม่ใช่นะ ไม่ใช่แบบนั้น..."
10014025-55 = "ไม่ค่ะ!"
10014025-56 = "ไม่ ไม่ ไม่ ไม่ ไม่! เป็นไปไม่ได้!"
10014025-57 = "...!?"
10014025-58 = "คุณสึซึมิ สายตาของฉันไม่มีทางพลาดค่ะ คนคนนั้นคือเคียวยามะ คาซึสะแน่นอน! ต้องเป็นเคียวยามะ คาซึสะไม่ผิดแน่ค่ะ!"
10014025-59 = "ถึงจะใส่ชุดใหม่และดูต่างไปจากเดิม แต่ก็หลอกสายตาของฉันไม่ได้แน่นอนค่ะ!"
10014025-60 = "นั่นก็เพราะว่ามันมีออร่าของสัตว์ร้ายที่ไม่สามารถปิดซ่อนไว้ได้อยู่ยังไงล่ะคะ!"
10014025-62 = "ใช่มั้ยล่ะคะ?  คุณครู...!? นั่นจะต้องเป็นเคียวยามะ คาซึสะแน่นอนใช่มั้ยคะ!?"
10014025-63 = "[s7] \"เป็นคาซึสะจริงๆ นั่นแหละนะ\"\n[s8] \"สัตว์ร้าย...???\""
10014025-64 = "เห็นมั้ยล่ะคะ! ฉันพูดถูกใช่มั้ยล่ะ? ฉันไม่มีทางลืมอยู่แล้ว? ไม่มีทางจำไม่ได้แน่นอนค่ะ!"
10014025-65 = "ใช่ค่ะ! ฉันพูดถูกใช่มั้ยล่ะ? ฉันไม่มีทางลืมอยู่แล้ว? ไม่มีทางจำไม่ได้แน่นอนค่ะ!"
10014025-66 = "คุณสึซึมิ ฉันรู้อยู่แล้วค่ะ"
10014025-69 = "ว่าคนคนนั้น… เคียวยามะ คาซึสะน่ะ!"
10014025-72 = "ในสมัยหนึ่งเธอคือตำนานที่เคยทำให้โลกภายใต้ความมืดต้องสั่นสะเทือน!!"
10014025-74 = "<แคทส์ พาลูค> ความแปลกประหลาดแสนน่ากลัว ที่แยงกี้คนไหนร้องไห้อยู่เห็นเป็นต้องหยุดร้อง!!"
10014025-78 = "ในตอนที่เรียนม.ต้น ตอนนั้น..."
10014025-79 = "เธอเป็นแยงกี้สาวคนเดียวที่ฉันไม่เคยเอาชนะได้! ศัตรูตัวฉกาจ!"
10014025-80 = "ไม่สิ..."
10014025-81 = "เป็น 'ศัตรูคู่แค้น' ของฉันเอง!!"
10014025-83 = "แคทส์ พาลูค หมายถึงแมวปีศาจที่อยู่ในหนังสือนิทานเหรอคะ... เป็นชื่อเล่นที่ยิ่งใหญ่จังนะ..."
10014025-84 = "ยิ่งไปกว่านั้นนะคะคุณเรอิสะ ใจเย็นๆ แล้วฟังคุณครูก่อน..."
10014025-85 = "แต่แล้วจู่ๆ เธอก็หายไปค่ะ ได้ยินมาว่าไม่มีใครพบร่องรอยของเธอเลย...!"
10014025-86 = "อย่าบอกนะว่า!! ในที่สุดฉันก็จะมีโอกาสอีกครั้งในที่ที่สงบสุขแบบนี้...!!"
10014025-87 = "คุณสึซึมิ! คุณครู!! ถ้าปล่อยเอาไว้แบบนี้ เคียวยามะ คาซึสะ แคทส์ พาลูคจะฟื้นคืนชีพอีกครั้งนะคะ!! พื้นที่แห่งนี้จะกลับไปเป็นพื้นที่อาชญากรรมอีกครั้งค่ะ!!"
10014025-88 = "นี่คือภารกิจค่ะ!! ต้องห้ามไม่ให้เรื่องนั้นเกิดขึ้น มันเป็นภารกิจที่ฉันหลีกเลี่ยงไม่ได้!!"
10014025-89 = "ยังไงก็เถอะคุณเรอิสะ คุณครูบอกว่าตอนนี้สิ่งที่คุณเรอิสะคิดเป็นความเข้าใจผิดนะคะ"
10014025-93 = "...คะ?"
10014025-94 = "เข้าใจผิดเหรอคะ? หมายความว่ายังไงคะ?"
10014025-95 = "ตอนนี้เคียวยามะ คาซึสะไม่ได้เป็นแยงกี้สาวแล้วงั้นเหรอคะ…? เรื่องจริงเหรอคะ?"
10014025-96 = "คะ..?"
10014025-97 = "ตอนนี้ก็ใช้ชีวิตแบบนักเรียนปกติทั่วไป...อย่างนั้นเหรอคะ...?"
10014025-98 = "เคียวยามะ คาซึสะน่ะเหรอคะ..?"
10014025-102 = "เคียวยามะ คาซึสะน่ะเหรอคะ..?"
10014025-103 = "[s9] \"ถามไปสองครั้งแล้วนะ\"\n[s10] \"ท่าทางจะยังไม่เชื่อสินะ\""
10014025-104 = "ปะ... เป็นไปได้ยังไงกันคะ อืม... มันไม่น่าจะเป็นไปได้เลยนะ!? ไม่มีทาง... ทำไมถึงเป็นแบบนั้น...?"
10014025-105 = "ปะ... เป็นไปได้ยังไงกันคะ อืม... มันไม่น่าจะเป็นไปได้เลยนะ!? ไม่มีทาง... ทำไมถึงเป็นแบบนั้น...?"
10014025-106 = "ตะ... แต่ว่าทั้งคุณสึซึมิและคุณครูอุตส่าห์มาบอกถึงขนาดนี้..."
10014025-107 = "อ๊ะ...? เอ๊ะ...? เอ๋...? "
10014025-108 = "ถึงจะไม่ค่อยเข้าใจเท่าไร แต่ดูท่าทางจะเชื่อกันลำบากสินะคะ คุณเรอิสะ"
10014025-109 = "เรื่องนั้น... เพราะคุณสึซึมิไม่รู้จักเคียวยามะ คาซึสะน่ะสิคะ..."
10014025-110 = "นั่นคือเคียวยามะ คาซึสะนะคะ!? แคทส์ พาลูคน่ะค่ะ!?"
10014025-111 = "สัตว์ร้ายที่ใครก็ไม่อาจรับมือนะคะ!!"
10014025-112 = "คนแบบนั้นน่ะเหรอ... จะใช้ชีวิตธรรมดา...?"
10014025-113 = "[s11] (ภาพของคาซึสะในความคิดของเรอิสะ...)\n[s12] (เป็นเหมือนสัตว์ป่าหรือปีศาจร้ายอย่างนั้นเหรอ...)"
10014025-114 = "อา... ตะ... แต่ว่าทั้งสองคนพูดแบบนั้นนี่นา..."
10014025-115 = "อา... ตะ... แต่ว่าทั้งสองคนพูดแบบนั้นนี่นา..."
10014025-116 = "คือว่า..."
10014025-117 = "ขะ...ขอโทษค่ะ ที่จริงแล้วฉันตกใจนิดหน่อย... ขอเวลาฉันใช้ความคิดหน่อยได้มั้ยคะ...?"
10014025-118 = "[s13] \"ได้อยู่แล้ว ไม่ว่าเมื่อไรก็ติดต่อมาได้เลยนะ\"\n[s14] \"ค่อยๆ ใช้เวลาคิดก็ได้ เชื่อพวกเราเถอะนะ\""
10014025-119 = "อ่า ค่ะ ได้ค่ะ..."
10014025-120 = "อ่า ค่ะ ได้ค่ะ..."

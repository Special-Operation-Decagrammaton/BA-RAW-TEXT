[translation]
2000315-1 = "ความจริงที่เรียนรู้จากอดีต"
2000315-3 = "(ขณะที่เดินผ่านจัตุรัส คุณครูก็เจอมาชิโระนั่งอยู่ที่ม้านั่ง)"
2000315-4 = "[ns1] \"เหมือนกำลังอ่านอะไรอยู่เลยแฮะ...\"\n[ns2] (เข้าไปทักหน่อยดีกว่า)"
2000315-10 = "[ns] \"ว่าไง มาชิโระ!\""
2000315-12 = "อ๊ะ คุณครู"
2000315-13 = "วันนี้มาที่ทรีนิตี้เหรอคะ ถ้าคุณครูบอก ฉันคงไปหาก่อนแล้วแท้ๆ"
2000315-14 = "เอาเถอะค่ะ... ตอนนี้ก็ได้เจอแล้วนี่นะ"
2000315-15 = "[s3] \"ครูก็ดีใจที่ได้เจอนะ\"\n[s4] \"อ่านอะไรอยู่เหรอ?\""
2000315-18 = "อ๊ะ หมายถึงเล่มที่ฉันอ่านอยู่เหรอคะ"
2000315-19 = "หนังสือแบบนี้มัน... "
2000315-25 = "มะ... มันค่อนข้างน่าอายนิดหน่อย..."
2000315-26 = "อย่างที่เห็นแหละค่ะ มันเป็นหนังสือที่รวมคำสุภาษิตกับสำนวนต่างๆ เอาไว้..."
2000315-27 = "ดูน่าสนุกงั้นเหรอคะ?"
2000315-28 = "......"
2000315-34 = "ฮุฮุ อย่างนั้นเหรอคะ เล่มนี้สนุกพอสมควรเลยค่ะ"
2000315-35 = "เมื่อไม่นานมานี้ ฉันเคยแนะนำหนังสือเล่มนี้ให้รุ่นพี่ฮาสุมิไปแล้วค่ะ"
2000315-36 = "แต่ดูเหมือนรุ่นพี่จะไม่ได้อ่านเลย..."
2000315-37 = "[s] \"มาชิโระชอบพวกคำสุภาษิตหรือเรื่องเล่าสมัยก่อนสินะ\""
2000315-38 = "ค่ะ ฉันชอบเรื่องสุภาษิตและสำนวน แต่ที่รู้สึกสนใจกว่าคือเรื่องเล่าสมัยก่อนน่ะค่ะ"
2000315-39 = "เพราะในเรื่องเล่าที่ถ่ายทอดต่อๆ กันมามักจะมีคติสอนใจแฝงอยู่ด้วยค่ะ"
2000315-40 = "ถ้าอ่านเรื่องราวเก่าๆ เราก็จะมองเห็นเส้นทางหรือสิ่งที่อาจเกิดขึ้นได้ในอนาคต เหมือนกับคำโบราณ#nที่บอกว่า 'เราสามารถเรียนรู้อนาคตได้จากอดีต' ค่ะ"
2000315-41 = "[s] \"โอ้...\""
2000315-42 = "ฮุฮุ และสิ่งที่ฉันชอบที่สุด..."
2000315-43 = "สุภาษิตส่วนใหญ่จะมีเนื้อหาเกี่ยวกับธรรมะชนะอธรรม และการลงโทษความชั่วส่งเสริมความดีแฝงอยู่#nด้วยค่ะ!!"
2000315-44 = "[s] \"อ่า นั่นสินะ ส่วนใหญ่ก็แบบนั้น...\""
2000315-45 = "ใช่แล้วค่ะ 'ความยุติธรรมย่อมชนะเสมอ' คือความจริงแท้ค่ะ"
2000315-46 = "และนี่ก็เป็นเหตุผลอย่างหนึ่งที่ทำให้ฉันชอบอ่านพวกคำสุภาษิตมาตั้งแต่เด็กๆ ค่ะ"
2000315-47 = "[s5] \"ก็เข้าใจได้นะ\"\n[s6] \"ดูแล้วมาชิโระก็น่าจะชอบละนะ\""
2000315-55 = "ตอนที่ทำกิจกรรมชมรม ฉันมักจะพูดถึงคำสุภาษิตหรือคำคมต่างๆ ด้วย..."
2000315-56 = "แต่ทุกครั้งที่ทำแบบนั้น คนอื่นๆ มักจะทำเหมือนฉันเป็นคนแก่ หรือทำเป็นเมินไม่สนใจเลยก็มีค่ะ..."
2000315-57 = "คิดแล้วเชียวว่าถ้าเป็นคุณครูคงจะเข้าใจฉันสินะคะ"
2000315-61 = "หนังสือน่าสนใจดีก็เลยจะขอยืมไปอ่านเหรอคะ?"
2000315-62 = "ได้สิคะ! อ่านได้ตามที่คุณครูต้องการเลยค่ะ!"
2000315-63 = "ฮุฮุ..."
2000315-64 = "คุณครูชอบในสิ่งที่ฉันชอบแบบนี้ มันรู้สึกเหมือน..."
2000315-65 = "......"
2000315-66 = "อืม... จะบอกว่ารู้สึกแปลกใจดีมั้ยนะ... อืม..."
2000315-67 = "อะ... อะไรประมาณนั้นแหละค่ะ!"
2000315-69 = "(หลังจากคุยกับมาชิโระเกี่ยวกับเรื่องเล่าโบราณต่างๆ อย่างสนุกสนานแล้ว คุณครูก็กลับมาที่ชาเล่ต์)"

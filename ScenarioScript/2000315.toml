[translation]
2000315-1 = "過去學到的真理"
2000315-3 = "（經過廣場時，發現了坐在長椅上的麻白）"
2000315-4 = "[ns1]「好像在讀什麼東西……」\n[ns2]（過去打個招呼吧）"
2000315-10 = "[ns]「嗨，麻白！」"
2000315-12 = "啊，老師。"
2000315-13 = "原來老師來三一了啊。#n跟我說一聲的話，我就去找你打個招呼了。"
2000315-14 = "不過……既然都已經見到面了也無所謂吧。"
2000315-15 = "[s3]「很高興能見到你。」\n[s4]「你在讀什麼書？」"
2000315-18 = "啊，是說我正在看的書嗎？"
2000315-19 = "雖，雖然有點害羞……"
2000315-25 = "但我在看這種書……"
2000315-26 = "如老師所見，裡面有很多各式各樣的諺語和成語……"
2000315-27 = "看起來很有趣？"
2000315-28 = "……"
2000315-34 = "呵呵，沒錯。這本書非常有趣。"
2000315-35 = "我前陣子也有推薦給蓮實前輩。"
2000315-36 = "雖然他應該不會看就是了……"
2000315-37 = "[s]「麻白喜歡諺語或古老的故事啊。」"
2000315-38 = "是的，雖然我也喜歡諺語或成語，但我對它們出自的故事更有興趣。"
2000315-39 = "古老的故事裡，蘊含著長年累月流傳下來的教訓。"
2000315-40 = "就像「鑑往知來」這句成語說的一樣──#n學習古老的故事，能讓我們找出未來前進的方向。"
2000315-41 = "[s]「哦哦……」"
2000315-42 = "呵呵，還有我最喜歡的一點是……"
2000315-43 = "大部分的諺語中，都包含了事必歸正、勸善懲惡的訊息！！"
2000315-44 = "[s]「啊，確實大部分都是這樣的呢……」"
2000315-45 = "沒錯，正義終將勝利──這是永恆不變的真理。"
2000315-46 = "也是我從小喜歡諺語的原因。"
2000315-47 = "[s5]「原來如此。」\n[s6]「難怪麻白會喜歡。」"
2000315-55 = "雖然我也常常在社團活動中使用諺語或格言……"
2000315-56 = "但每次都會被當成老古板，或是沒有人感興趣……"
2000315-57 = "不過老師一定能理解我的對吧。"
2000315-61 = "這本書看起來很有趣，希望我能借老師看？"
2000315-62 = "沒問題！請老師儘管看！"
2000315-63 = "呵呵……"
2000315-64 = "我喜歡的東西，老師居然也喜歡。#n總覺得……"
2000315-65 = "……"
2000315-66 = "真是不可思議呢……唔嗯。"
2000315-67 = "總，總之就是這樣！"
2000315-69 = "（於是又跟麻白暢談看過的有趣故事後，返回了夏萊）"

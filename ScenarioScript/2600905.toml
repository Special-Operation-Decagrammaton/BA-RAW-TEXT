[translation]
2600905-1 = "A New Break Room"
2600905-2 = "I had to go to the area near Yuzu's maid cafe for work, so I stopped by for a visit."
2600905-14 = "O-Oh! I didn't know you would a-actually come..."
2600905-15 = "W-Welcome back to C-Cafe Maidramatic, Master!"
2600905-16 = "[s1] \"I'm back, Yuzu.\"\n[s2] \"How's work going?\""
2600905-19 = "I-I'm still not great at it, but I'm doing much better since you helped, Sensei..."
2600905-25 = "Ah, Sensei! Haven't seen you in a while."
2600905-26 = "Thanks for introducing us to such a great student! The Queen's been a huge help around here."
2600905-27 = "[s] \"...The Queen?\""
2600905-28 = "O-Oh, that. Uh... They told me that I needed to use a nickname in the store..."
2600905-29 = "I wrote down the handle I use in games out of habit, and everyone just started calling me the Queen."
2600905-30 = "Haha! It's perfect! You need unique character concepts to make a top-notch maid cafe!"
2600905-31 = "I admit, she was so nervous at first that it made me nervous, too. But I was wrong! She rarely makes mistakes, and she's so popular among the customers!"
2600905-32 = "Plus, just the other day, the cafe's accounting software was malfunctioning. Oh boy, was I freaking out! But it was no big deal for the Queen. She figured out how to fix the bug in no time."
2600905-33 = "Haha! I'd never wanted to call her the Queen so much as in that moment!"
2600905-34 = "U-Uh..."
2600905-35 = "[s] \"I'm glad you're settling in so well here.\""
2600905-36 = "S-Sure..."
2600905-37 = "So, Sensei... Um, I mean, Master. Let me take you to your table!"
2600905-39 = "Despite what the manager said, Yuzu kept making mistakes the whole time."
2600905-42 = "H-Here's your order! Maidramatic's special omurice!"
2600905-43 = "Huh? I only ordered a melon soda, though..."
2600905-44 = "M-My apologies! I'll bring that out right away!"
2600905-46 = "N-Now, let me cast the magic spell that makes food taste delicious..."
2600905-47 = "Be more delicious..."
2600905-48 = "...Revivify!"
2600905-49 = "That...doesn't seem like the right spell."
2600905-60 = "W-Whoa. I'm sorry!"
2600905-61 = "Aah... You got juice on my shirt... That looks like it'll stain..."
2600905-62 = "I am so sorry! Let me wipe it up for you! Right away!"
2600905-68 = "Why is the Queen making so many mistakes today? It's unlike her..."
2600905-69 = "Your majesty, can you please come this way for a moment?"
2600905-70 = "Um...I'm so sorry! I keep making silly mistakes...and in front of the customers, too..."
2600905-71 = "It's fine. I'm more worried about you. Is everything okay?"
2600905-72 = "You seem particularly nervous today..."
2600905-73 = "No! I'm fine... It's nothing like that."
2600905-80 = "Well, I'm glad to hear it."
2600905-81 = "But it's almost time for your break. Why don't you go to the break room and rest up a bit?"
2600905-82 = "Okay..."
2600905-87 = "[ns] \"Is she normally like this?\""
2600905-88 = "No, not at all. Not since that first day."
2600905-89 = "I just hope there's not a rush this afternoon..."
2600905-94 = "But Yuzu didn't show up after her break was over."
2600905-95 = "[ns] Look for Yuzu."
2600905-97 = "I looked everywhere in the cafe, but Yuzu was nowhere to be found."
2600905-98 = "Out of ideas, I took the back door to the alley behind the shop."
2600905-102 = "Cafe Maidramatic Alley"
2600905-104 = "Um... Please move..."
2600905-108 = "You're on my skirt...I have to go back into the shop..."
2600905-109 = "[ns] \"...Yuzu?\""
2600905-112 = "― Ah, um... So...[wa:2520] "
2600905-114 = "― They seemed to have come in...while I was sleeping...[wa:980] "
2600905-117 = "[ns] \"Why are you in this storage container, and not the break room?\""
2600905-118 = "― Um, it's just... There were a lot of other people in the break room...[wa:3960] "
2600905-120 = "― And if I go sit there, they'll start talking to me...[wa:1940] "
2600905-123 = "―I'd have to answer all sorts of questions, like, 'Where did you buy that ribbon?'[wa:1320] "
2600905-125 = "― Or 'What do you like to do for fun?'[wa:2780] "
2600905-128 = "― And all sorts of others... So I ran away.[wa:2460] "
2600905-131 = "― And I found this place...[wa:2100] "
2600905-133 = "― Turns out...it was a cat break room.[wa:3880] "
2600905-136 = "― Eeek! Hang on, p-please![wa:2020] "
2600905-139 = "― I'm getting out! I'm getting out right now... That tickles![wa:3770] "
2600905-142 = "I moved the cat and helped Yuzu out of the storage container."
2600905-144 = "T-Thank you for your help..."
2600905-145 = "But, um, [USERNAME] Sensei, why are you back here?"
2600905-146 = "[s3] \"I got worried when you didn't come back, Yuzu.\"\n[s4] \"I thought you might not be feeling well.\""
2600905-149 = "No! There's no problem! Physically, I'm totally fine!"
2600905-150 = "Hmm? You thought I looked nervous all morning?"
2600905-151 = "Um...maybe that was because..."
2600905-152 = "Because you were there, Sensei..."
2600905-153 = "[s] \"I made you nervous?\""
2600905-154 = "...Yes."
2600905-155 = "Before, during our practice, you helped me so much. I would never have gotten up the courage to do this otherwise. But...now that you're here to see me in action... I got scared."
2600905-156 = "You're always so kind to me, no matter how anxious or scared I get. I wanted to show you a better side of myself..."
2600905-157 = "And...my head got filled up with that thought. That I needed to do better than usual. So much so that I started making all those mistakes."
2600905-158 = "[ns] \"There's no need to worry about it so much.\""
2600905-160 = "[ns5] \"I'm not here today as Sensei.\"\n[ns6] \"I'm here as a Master!\""
2600905-169 = "...Right. You're right. I overcomplicated things."
2600905-170 = "When I'm in the shop, my role is to be a maid, not a student."
2600905-171 = "Trying to do both at once...really made me look ridiculous, didn't it?"
2600905-172 = "Okay! Just like you said. While we're here, I'm the Queen, and not Hanaoka Yuzu. I'll do my best to serve you!"
2600905-173 = "[s] \"Glad to hear it!\""
2600905-174 = "But what do I do about all the customers from this morning?"
2600905-175 = "They must be so disappointed about all my mistakes..."
2600905-176 = "[s7] \"Don't worry too much.\"\n[s8] \"I'll take responsibility if anyone is angry.\""
2600905-179 = "Oh... Okay..."
2600905-186 = "Queen, where have you been? You're just now back from your break?"
2600905-187 = "I-I'm sorry..."
2600905-188 = "It's okay. You're here now."
2600905-189 = "But you'd better get ready. All the customers from this morning are back, and they're dying to see you."
2600905-190 = "W-What...? Oh no! Everyone came back to complain?"
2600905-191 = "No, no! Nothing like that!"
2600905-192 = "One of them said to me, \"This is the first old-school clumsy maid I've seen in a while!\" I'm sure they're all thinking that. They're thrilled. They all requested you as soon as we opened for the afternoon."
2600905-193 = "Okay, Queen. Enough chitchat. There are a dozen guests waiting on you right now! Go get ready!"
2600905-194 = "W-Whoa. I got more popular...because I made mistakes...?"
2600905-195 = "[s] \"Sounds like your guests liked it, Queen. That's great!\""
2600905-196 = "I...I can't do this anymore!"
2600905-198 = "Yuzu, feeling pressured all afternoon, made mistake after mistake. All of the customers were very happy."
2600905-199 = "The number of requests for Yuzu that day broke a cafe-wide record..."

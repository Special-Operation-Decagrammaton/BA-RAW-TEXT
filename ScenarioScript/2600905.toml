[translation]
2600905-1 = "櫃子裡的不速之客"
2600905-2 = "（來到了柚子打工的女僕咖啡廳）"
2600905-14 = "居，居然真的來了……"
2600905-15 = "歡，歡迎回來，主人……！#n這，這裡是「Maidramatic」咖啡廳……！"
2600905-16 = "[s1]「我回來了，柚子。」\n[s2]「工作還順利嗎？」"
2600905-19 = "是，是！雖然還有很多不足之處……#n但多虧有老師幫忙，稍微……"
2600905-25 = "老師！你很久沒來了啊！"
2600905-26 = "啊啊，「Queen」幫了我很多忙。#n謝謝你介紹這麼棒的學生給我。"
2600905-27 = "[s]「Queen……？」"
2600905-28 = "啊，那個……因為在店裡必須要用暱稱……"
2600905-29 = "我出於習慣就寫了遊戲裡的暱稱，#n不知道為什麼就被叫成Queen了……"
2600905-30 = "哈哈哈，女僕咖啡廳的女僕本來就是越有個性越好！"
2600905-31 = "……一開始他看起來很緊張，讓我還有點擔心，#n不過現在已經不會出錯，在客人之間也很受歡迎，我就放心了。"
2600905-32 = "而且之前咖啡廳的結帳程式故障的時候，也是Queen幫忙除錯跟修理的。"
2600905-33 = "那個時候真的想叫他一聲「[ruby=Queen]女王[/ruby]」呢。#n哈哈哈！"
2600905-34 = "啊嗚……"
2600905-35 = "[s]「看來你適應得很好，真是太好了。」"
2600905-36 = "是，是……！"
2600905-37 = "那，那麼老師……不對，主人。#n我這就帶您入座……！"
2600905-39 = "（不過和店長所說的不同，柚子一直頻頻出錯……）"
2600905-42 = "這，這是您點的Maidramatic特製蛋包飯……！"
2600905-43 = "嗯？我點的應該是哈密瓜汽水才對啊……？"
2600905-44 = "對，對不起……！我馬上為您送來……！"
2600905-46 = "那，那麼現在……我要施加讓食物變好吃的魔法咒語了……"
2600905-47 = "變好吃吧……"
2600905-48 = "……Heal！"
2600905-49 = "跟變好吃的咒語好像不太一樣……？"
2600905-60 = "噫呀啊！？對，對不起……！"
2600905-61 = "啊……襯衫上沾到了果汁……"
2600905-62 = "我，我馬上幫您擦乾淨……！#n真的很抱歉……！"
2600905-68 = "……真奇怪，Queen居然會犯這種失誤。"
2600905-69 = "Queen，可以請你來一下嗎？"
2600905-70 = "嗚……對不起……#n給客人們添麻煩了……"
2600905-71 = "不用太在意沒關係。"
2600905-72 = "不過今天怎麼了嗎？#n看起來比平常還緊張……"
2600905-73 = "那，那個……不，沒什麼。我沒事。"
2600905-80 = "那就好……"
2600905-81 = "……正好到休息時間了，#n你先去休息室休息一下吧。"
2600905-82 = "是……"
2600905-87 = "[ns]「平常不會這樣嗎？」"
2600905-88 = "就是說啊。第一天之後就沒犯什麼失誤，一直很努力工作。"
2600905-89 = "希望下午能恢復正常……"
2600905-94 = "（……然而柚子直到休息時間結束都沒有回來）"
2600905-95 = "[ns] 去找柚子"
2600905-97 = "（找遍了店內，都沒有看到柚子的身影）"
2600905-98 = "（於是走出後門到巷子裡一看……）"
2600905-102 = "咖啡廳「Maidramatic」後巷"
2600905-104 = "請，請你們離開……"
2600905-108 = "嗚嗚，明明得趕快回店裡去才行……#n裙子好重……"
2600905-109 = "[ns]「柚子……？」"
2600905-112 = "― 那個，這個是……[wa:2800] "
2600905-114 = "― 好像是在我睡覺的時候跑進來的……[wa:2460] "
2600905-117 = "[ns]「不過你怎麼會在櫃子裡……？」"
2600905-118 = "― 那個……因為休息室還有其他人……[wa:6120] "
2600905-120 = "― 只要坐在那裡，就會有人來搭話……[wa:3420] "
2600905-123 = "― 「緞帶是在哪裡買的？」或是，[wa:3960] "
2600905-125 = "― 「放假都在做什麼？」之類的……[wa:3620] "
2600905-128 = "― 會被問各種問題，所以就下意識地逃跑了……[wa:3300] "
2600905-131 = "― 而我找到的，就是這裡……[wa:2620] "
2600905-133 = "― 沒想到……居然會是貓咪的休息室。[wa:4680] "
2600905-136 = "― 噫呀！？請，請等一下！[wa:2540] "
2600905-139 = "― 我出去！現，現在就出去……好癢！[wa:5490] "
2600905-142 = "（移開貓咪後，讓柚子從櫃子出來）"
2600905-144 = "謝，謝謝你的幫忙……"
2600905-145 = "不過[USERNAME]老師為什麼會……？"
2600905-146 = "[s3]「柚子一直沒有回來，我很擔心。」\n[s4]「怕你是不是身體不舒服，或是出了什麼事……」"
2600905-149 = "啊，沒有，我的身體沒事！"
2600905-150 = "如你所見，一點問題都沒有！"
2600905-151 = "……上午是因為……那個……"
2600905-152 = "可能是，因為老師在才會……"
2600905-153 = "[s]「因為我在？」"
2600905-154 = "……是。"
2600905-155 = "多虧了特訓，即使在客人面前，我也能稍微鼓起勇氣了，#n可是一想到老師在看就緊張了起來……"
2600905-156 = "滿腦子都是要比平時更努力的想法……#n結果犯下了許多失誤。"
2600905-157 = "我真沒用……明明報答一直幫助我的老師的方法，#n就只有讓你看見自己成長的樣子而已……"
2600905-158 = "[ns]「不用那麼在意沒關係哦。」"
2600905-160 = "[ns5]「因為今天的我不是老師……」\n[ns6]「只是以一名主人的身分來這裡的！」"
2600905-169 = "……呵呵，說的也是。#n可能是我想得太複雜了。"
2600905-170 = "明明我在這家店裡的身分不是學生而是女僕才對。"
2600905-171 = "那麼，就按照老師的意思──"
2600905-172 = "在這間咖啡廳裡，我不是以花岡柚子的身分，#n而是要作為女僕「Queen」接待客人……！"
2600905-173 = "[s]「嗯，這樣就對了。」"
2600905-174 = "呵呵，謝謝。#n不過對上午光臨的客人真是過意不去……"
2600905-175 = "我的失誤肯定讓他們失望了吧……"
2600905-176 = "[s7]「別太擔心。」\n[s8]「萬一出了什麼問題，我會陪你一起道歉的。」"
2600905-179 = "嗚嗚……是……"
2600905-186 = "啊啊，Queen！太好了，我正在找你呢！#n你到底跑哪去了？"
2600905-187 = "對，對不起……"
2600905-188 = "不用道歉。#n有回來就好。"
2600905-189 = "比起這個，快點做準備吧。#n看見上午的Queen的客人們都拉長脖子在等著你呢。"
2600905-190 = "咦……？#n該不會是因為上午的失誤來抗議……？"
2600905-191 = "不不不，不是那樣的。"
2600905-192 = "大家看見Queen的樣子都很開心。說是「是現在很少見的正統派冒失女僕！」。#n下午一開店就有很多人指名哦。"
2600905-193 = "來，Queen。快做好準備去迎接客人吧！"
2600905-194 = "咦咦……？#n明明犯錯了怎麼還……？"
2600905-195 = "[s]「能讓客人開心真是太好了呢，Queen。」"
2600905-196 = "嗚嗚嗚……我不行了！"
2600905-198 = "（之後，柚子雖然因為壓力而一再出錯，但客人們無不帶著非常滿足的心情離開）"
2600905-199 = "（據說當天柚子的指名次數創下了新高……）"

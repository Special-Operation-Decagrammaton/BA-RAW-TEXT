[translation]
2600905-1 = "แขกไม่ได้รับเชิญในตู้"
2600905-2 = "(คุณครูมีธุระต้องไปแถวๆ เมดคาเฟ่ที่ยูสึทำงานพาร์ทไทม์อยู่ จึงแวะเข้าไปหาที่ร้าน)"
2600905-14 = "ฉันได้ยินว่าคุณครูจะมา แต่ไม่คิดเลยค่ะว่าจะมาจริงๆ......"
2600905-15 = "กะ... กลับมาแล้วเหรอคะ นายท่าน...? ทะ... ที่นี่คือคาเฟ่ <เมดดรามาติก> ค่ะ...!"
2600905-16 = "[s1] \"กลับมาแล้ว ยูสึ\"\n[s2] \"ตั้งใจทำงานอยู่ใช่มั้ย?\""
2600905-19 = "ค่ะ ค่ะ! ฉันยังบกพร่องอยู่หลายอย่าง... แต่ก็มีคุณครูช่วยไว้..."
2600905-25 = "อ๊ะ คุณครู! ไม่ได้มานานเลยนะครับเนี่ย"
2600905-26 = "ขอบคุณที่ช่วยแนะนำนักเรียนดีๆ ให้นะครับ พวกผมได้รับความช่วยเหลือจาก 'คุณควีน' หลายอย่างเลย#nละครับ"
2600905-27 = "[s] \"คุณควีน...?\""
2600905-28 = "อะ... เอ่อ... คือว่า... ตอนสมัครงาน ที่ร้านไม่ให้ใช้ชื่อจริง แต่ให้ใช้ชื่อเล่นแทน..."
2600905-29 = "ฉันก็เลยเขียนชื่อที่ใช้ในเกมของตัวเองลงไป คนอื่นก็เลยเริ่มเรียกฉันว่าคุณควีนน่ะค่ะ..."
2600905-30 = "ในเมดคาเฟ่น่ะ ยิ่งคาแรคเตอร์โดดเด่นมากเท่าไรก็ยิ่งดีน่ะครับ ฮ่าฮ่า!"
2600905-31 = "ตอนแรกผมกังวลมากที่คุณควีนประหม่าเอามากๆ เลย... แต่ก็โชคดีที่ไม่ทำอะไรพลาดตอนต้อนรับ#nลูกค้า แล้วก็ได้รับความนิยมจากลูกค้าไม่น้อยเลยนะครับ"
2600905-32 = "แถมตอนนั้นที่ผมต้องวิ่งวุ่นเพราะโปรแกรมประมวลข้อมูลของคาเฟ่พัง คุณควีนก็เข้ามาช่วยแก้บั้กให้#nจนได้กลับมาหายใจหายคอได้อีกครั้งด้วยครับ"
2600905-33 = "ตอนนั้นผมนับถือเลยครับว่านี่แหละ 'คุณควีน' ตัวจริง ฮ่าฮ่าฮ่า!"
2600905-34 = "อ่า..."
2600905-35 = "[s] \"โล่งอกไปทีนะที่ปรับตัวกับงานพาร์ทไทม์ได้ดีเลย\""
2600905-36 = "คะ ค่ะ...!"
2600905-37 = "ถะ... ถ้างั้น คุณครู... ไม่สิ นายท่าน ฉันจะพาไปที่นั่งเดี๋ยวนี้เลยค่ะ...!"
2600905-39 = "(ระหว่างดูยูสึทำงาน คุณครูก็เห็นว่ายูสึทำงานพลาดอยู่หลายครั้ง ไม่เหมือนที่ได้ยินจากเจ้าของร้าน...)"
2600905-42 = "ขะ... ข้าวห่อไข่เมดดรามาติกพิเศษที่สั่งไว้ได้แล้วค่ะ...!"
2600905-43 = "เอ๋? แต่ผมสั่งเมลอนโซดาไปอย่างเดียวนะครับ...?"
2600905-44 = "ขะ... ขอโทษค่ะ...! ฉันจะไปเอามาให้เดี๋ยวนี้เลยค่ะ...!"
2600905-46 = "ถะ... ถ้างั้นจากนี้ฉันจะร่ายคาถา... แห่งความอร่อยให้นะคะ..."
2600905-47 = "อร่อยเหาะแน่นอน..."
2600905-48 = "...โอมมะลึกกึ๊กกึ๋ย!"
2600905-49 = "เหมือนจะเป็น... มนตร์อย่างอื่นมากกว่านะครับ"
2600905-60 = "วะ... ว้ายยย ขอโทษค่ะ...!"
2600905-61 = "อ๊ะ... น้ำผลไม้เหนียวๆ หกเลอะเสื้อหมดแล้ว..."
2600905-62 = "ฉะ... ฉันจะเช็ดให้เดี๋ยวนี้เลยค่ะ... ขอโทษจริงๆ นะคะ...!"
2600905-68 = "...แปลกจัง ทำไมวันนี้คุณควีนทำพลาดเยอะจัง ปกติไม่เห็นเป็นแบบนี้นี่นา"
2600905-69 = "คุณควีน มาคุยกับผมทางนี้หน่อยได้มั้ยครับ?"
2600905-70 = "งือ... ขอโทษค่ะ ขอโทษที่ฉันเสียมารยาทต่อลูกค้าครั้งแล้วครั้งเล่า..."
2600905-71 = "ไม่เป็นไรครับ ว่าแต่ วันนี้ไม่สบายตรงไหนหรือเปล่าครับ?"
2600905-72 = "วันนี้คุณควีนดูประหม่าแปลกๆ นะครับ..."
2600905-73 = "เอ่อ... ไม่ได้เป็นอะไรหรอกค่ะ"
2600905-80 = "ถ้าไม่ได้เป็นอะไรก็ดีแล้วละครับ..."
2600905-81 = "แต่เดี๋ยวก็ใกล้เวลาพักแล้ว คุณควีนเข้าไปพักหายใจหายคอในห้องพักผ่อนเมดก่อนแล้วค่อยออกมา#nเถอะครับ"
2600905-82 = "ค่ะ..."
2600905-87 = "[ns] \"ปกติยูสึไม่ได้เป็นแบบนี้ใช่มั้ย?\""
2600905-88 = "ใช่ครับ ถ้าไม่นับวันแรกที่เข้ามา ก็ทำได้ดีแบบไม่มีข้อผิดพลาดเลยครับ"
2600905-89 = "หวังว่าช่วงบ่ายจะดีขึ้นกว่านี้นะครับ..."
2600905-94 = "(...แต่หมดเวลาพักของเมดแล้ว ยูสึก็ยังไม่ออกมา)"
2600905-95 = "[ns] ไปตามหายูสึ"
2600905-97 = "(คุณครูหาตัวยูสึทั่วร้าน แต่ก็หาไม่เจอ)"
2600905-98 = "(พอออกจากประตูหลังร้านไปซอยด้านหลัง...)"
2600905-102 = "ซอยหลังคาเฟ่ <เมดดรามาติก>"
2600905-104 = "งือ... ขอให้ฉันลุกขึ้นเถอะค่ะ..."
2600905-108 = "ฉันต้องรีบกลับไปที่ร้าน... แล้วมันก็หนักกระโปรงมากด้วย..."
2600905-109 = "[ns] \"ยูสึ...?\""
2600905-112 = "― เอ่อ... คือว่า...[wa:2440] "
2600905-114 = "― ฉันกำลังนอนอยู่ แต่น้องก็เข้ามา...[wa:1740] "
2600905-117 = "[ns] \"ทำไมไม่ไปอยู่ในห้องพักล่ะ มาอยู่ในตู้ทำไม...?\""
2600905-118 = "― คือว่า... ในห้องพักผ่อนก็มีคนอื่นอยู่ด้วย...[wa:5000] "
2600905-120 = "― ถ้าไปนั่งพักก็จะมีคนเข้ามาชวนคุย...[wa:2660] "
2600905-123 = "― ทั้ง 'ซื้อริบบิ้นจากไหนมา?'  แล้วก็..[wa:3040] "
2600905-125 = "― 'วันหยุดทำอะไร?'... ทำนองนี้น่ะค่ะ...[wa:2740] "
2600905-128 = "― ระหว่างถูกยิงคำถามต่างๆ ฉันก็เลยหนีออกมาโดยที่ไม่ได้ตั้งใจ...[wa:1660] "
2600905-131 = "― และที่ที่มาเจอก็คือที่นี่ค่ะ...[wa:1860] "
2600905-133 = "― แต่ว่า...มันดันเป็นที่พักผ่อนของแมวนี่สิ...[wa:3600] "
2600905-136 = "― อ๊าย...? ระ... รอเดี๋ยวสิคะ![wa:1860] "
2600905-139 = "― ฉันจะออกไปแล้วค่ะ! จะ... จะออกไปเดี๋ยวนี้แหละค่ะ... มันจั๊กจี้นะคะ![wa:3450] "
2600905-142 = "(หลังจากช่วยย้ายแมวแล้วคุณครูก็ดึงตัวยูสึออกมาจากตู้)"
2600905-144 = "ขะ... ขอบคุณที่ช่วยนะคะ..."
2600905-145 = "ว่าแต่ ทำไมคุณครู [USERNAME] ถึงมาที่นี่..."
2600905-146 = "[s3] \"ครูเป็นห่วงที่ยูสึยังไม่กลับมาน่ะ\"\n[s4] \"ครูกังวลว่าจะไม่สบายจนเป็นอะไรไปหรือเปล่าน่ะ\""
2600905-149 = "ไม่ค่ะ ฉันไม่เป็นไรค่ะ! ไม่ได้เป็นอะไรเลยสักนิดค่ะ...!"
2600905-150 = "...คะ? ตลอดทั้งช่วงเช้าที่ทำงาน ฉันดูประหม่าอย่างนั้นเหรอคะ?"
2600905-151 = "เอ่อ นั่นอาจเป็นเพราะ..."
2600905-152 = "เพราะว่า... คุณครู... อยู่ด้วยน่ะค่ะ"
2600905-153 = "[s] \"เอาแต่คิดถึงครูเหรอ?\""
2600905-154 = "...ค่ะ"
2600905-155 = "การฝึกฝนพิเศษกับคุณครูคราวก่อนทำให้ฉันกล้าพูดต่อหน้าคนแปลกหน้าขึ้นมาหน่อย แต่พอคิดว่าคุณครูจะได้เห็นฉันแบบนี้ก็ประหม่าขึ้นมาน่ะค่ะ..."
2600905-156 = "ถึงฉันจะเป็นคนขี้กลัว แต่คุณครูก็ใจดีกับฉันอยู่เสมอ ดังนั้นวิธีที่จะตอบแทนคุณครูคือการให้คุณครูได้#nเห็นฉันในมุมที่ดีขึ้น..."
2600905-157 = "ตอนนี้ในหัวฉันเลยเต็มไปด้วยความคิดที่ว่าต้องทำให้ดีมากขึ้น... ก็เลยประหม่าและทำพลาดมากกว่า#nปกติน่ะค่ะ"
2600905-158 = "[ns] \"ไม่ต้องเก็บมาใส่ใจขนาดนั้นก็ได้\""
2600905-160 = "[ns5] \"วันนี้ครูไม่ใช่คุณครู\"\n[ns6] \"แต่เป็นนายท่านคนหนึ่งที่เข้ามาร้านนี้ต่างหาก!\""
2600905-169 = "...นั่นสินะคะ ฉันอาจจะคิดซับซ้อนเกินไปก็ได้ค่ะ"
2600905-170 = "บทบาทของฉันในร้านนี้ไม่ใช่นักเรียนของคุณครู แต่เป็นเมดคนหนึ่งต่างหาก"
2600905-171 = "แต่พอฉันใส่ชุดที่ไม่พอดีตัว ก็เลยหกล้มอยู่บ่อยๆ และเหมือนว่าฉันจะให้คนอื่นเห็นแต่ภาพลักษณ์ที่น่า#nอายเลยค่ะ"
2600905-172 = "ฉันจะดูแลคุณครูในคาเฟ่แห่งนี้ในฐานะคุณควีนเมด ไม่ใช่ฮานาโอกะ ยูสึ อย่างที่คุณครูว่านะคะ"
2600905-173 = "[s] \"อื้ม แค่นั้นก็เพียงพอแล้วละ\""
2600905-174 = "...ฉันรู้สึกผิดกับลูกค้าที่ฉันบริการผิดพลาดไปในตอนเช้าจังเลยค่ะ ทำยังไงดีคะ...?"
2600905-175 = "ทุกคนต้องผิดหวังในความผิดพลาดซ้ำแล้วซ้ำเล่าของฉันแน่เลย..."
2600905-176 = "[s7] \"ไม่ต้องกังวลให้มากหรอก\"\n[s8] \"ถ้ามีปัญหาอะไร ครูจะไปช่วยขอโทษให้ด้วยคน\""
2600905-179 = "อ่า... ค่ะ..."
2600905-186 = "คุณควีน หายไปไหนมาครับ ทำไมเพิ่งกลับมาเอาป่านนี้?"
2600905-187 = "ขะ... ขอโทษด้วยค่ะ..."
2600905-188 = "มาช้าก็ยังดีกว่าไม่มาละนะ"
2600905-189 = "เอาละ รีบไปเตรียมตัวเลย ลูกค้าที่เห็นคุณควีนทำงานในตอนเช้ามารอกันไม่หวาดไม่ไหวแล้ว"
2600905-190 = "คะ... คะ...? อย่าบอกนะคะว่าลูกค้าแห่มาคอมเพลนที่ฉันทำงานผิดพลาดตอนเช้า...?"
2600905-191 = "ไม่ๆ ไม่ใช่อย่างนั้นหรอก"
2600905-192 = "ทุกคนที่เห็นคุณควีนทำงานในตอนเช้าต่างพูดเป็นเสียงเดียวกันว่า 'เมดโก๊ะๆ แบบนี้ไม่ได้มีบ่อยๆ' ก็เลยจองตัวคุณควีนกันตั้งแต่เปิดร้านช่วงบ่ายเลยละ"
2600905-193 = "เอาละ คุณควีน ตอนนี้มีลูกค้ามารอคุณควีนเกิน 10 คนแล้ว รีบไปเตรียมตัวเข้าเถอะ!"
2600905-194 = "อะ... เอ่อ... ฉันทำงานพลาดทั้งที แต่ทำไมถึงป๊อบขึ้นมาเฉยเลย..."
2600905-195 = "[s] \"คุณควีน โล่งอกไปทีนะที่ลูกค้าชอบสไตล์นี้\""
2600905-196 = "...ไม่ไหวหรอกค่ะ!"
2600905-198 = "(หลังจากนั้นยูสึก็ประหม่าจนทำงานพลาดวนไป แต่ลูกค้าที่มาเมดคาเฟ่ก็พอใจกับคุณควีนในมุมนั้น)"
2600905-199 = "(และวันนั้นจำนวนการจองตัวยูสึในเมดคาเฟ่ก็สูงจนทำลายสถิติประจำวันได้...)"

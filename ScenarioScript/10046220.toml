[translation]
10046220-1 = "#all;hide"
10046220-2 = "3;히후미 수영복ND;01\n#3;a"
10046220-3 = "3;히후미 수영복ND;04;아, 아하하…… 안녕하세요.\n#3;greeting"
10046220-4 = "3;이치카 수영복;08;앗! 당신은, 전차 탈취범!\n#3;jump\n#3;em;[!]"
10046220-5 = "3;히후미 수영복ND;09;네?! 그런 식으로 기억하고 계신 건가요?!\n#3;shake\n#3;em;[?!]"
10046220-6 = "3;이치카 수영복;05;설마 당신까지 말썽부릴 작정임까?"
10046220-7 = "3;히후미 수영복ND;10;아, 아니에요! 그 반대예요!\n#3;jump"
10046220-8 = "3;히후미 수영복ND;06;저희는 도와드리려고 왔어요!"
10046220-9 = "3;이치카 수영복;02;저희…… 라고 하면은?"
10046220-10 = "3;히후미 수영복ND;05;네, 저희 보충수업부 일동이 해변 순찰을 돕기로 해서요.\n#3;greeting"
10046220-11 = "3;이치카 수영복;04;그건…… 무척 감사하지만, 어째서요?\n#3;em;[?]"
10046220-12 = "3;히후미 수영복ND;02;사실은, 이건 동아리 전체에서 결정한 거예요."
10046220-13 = "3;히후미 수영복ND;00;정의실현부 분들이 평소에 늘 트리니티를 지켜주고 있으니까, 휴양지에서만큼은 저희가 정의실현부가 쉴 수 있게 지켜주자고요."
10046220-14 = "3;히후미 수영복ND;03;아하하…… 이렇게 말하니까, 뭔가 제 아이디어처럼 들리네요.\n#3;em;[땀]\n#3;stiff"
10046220-15 = "3;히후미 수영복ND;00;사실은요, 이건 아즈사 쨩하고 코하루 쨩이 생각해 낸 거지만요."
10046220-16 = "3;이치카 수영복;02;코하루가요?"
10046220-17 = "3;히후미 수영복ND;03;네! 정의실현부 다들 바쁜데, 자신만 쉬고 있는 게 내심 신경 쓰인 모양이라…….\n#3;jump"
10046220-18 = "3;이치카 수영복;03;하하. 그건 확실히 코하루답네요.\n#3;em;[재잘]"
10046220-19 = "3;이치카 수영복;05;하지만 아즈사 씨는……?"
10046220-20 = "3;이치카 수영복;07;………뭐, 길게 생각해도 의미 없겠죠."
10046220-21 = "3;이치카 수영복;03;그러면 잘 부탁드리겠슴다!\n#3;jump"
10046220-22 = "3;히후미 수영복ND;02;앗, 괜찮은 건가요?\n#3;em;[?]"
10046220-23 = "3;이치카 수영복;07;안 그래도 버겁던 와중이라, 오히려 제가 부탁드리고 싶은 입장이지 말임다."
10046220-24 = "3;이치카 수영복;02;그나저나, 다른 보충수업부 분들은 어디에……?"
10046220-25 = "3;히후미 수영복ND;00;아, 그게…… 이치카 씨가 어디 계실지 몰라서, 다들 흩어져서 찾아보기로 해서요."
10046220-26 = "3;이치카 수영복;99;아하~ 그러면 순찰하면서 한 분씩 찾아봐야겠네요."
10046220-27 = "3;히후미 수영복ND;08;아하하…… 뭔가, 일을 늘려드린 것 같기도…….\n#3;em;[땀]"
10046220-28 = "3;히후미 수영복ND;04;아마 저 혼자서는 큰 도움은 안 되겠지만……."
10046220-29 = "3;히후미 수영복ND;03;그러면 다시 한번 잘 부탁드리겠습니다!\n#3;em;[음표]"
10046220-30 = "#all;hide"
10046220-31 = "#wait;100"

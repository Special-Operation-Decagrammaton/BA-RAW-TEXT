[translation]
10046220-3 = "อ่า... อะฮะฮ่า... สวัสดีค่ะ"
10046220-4 = "อ๊ะ! คุณคือ... คนที่จี้รถถัง!"
10046220-5 = "คะ?! นั่นคือภาพจำของฉันสำหรับคุณเหรอคะ?!"
10046220-6 = "คุณก็จะมาก่อปัญหาอะไรใช่มั้ยคะ?"
10046220-7 = "มะ... ไม่ใช่นะคะ! ตรงกันข้ามเลยค่ะ!"
10046220-8 = "พวกฉันมาช่วยต่างหากค่ะ!"
10046220-9 = "พวกฉัน... งั้นเหรอคะ?"
10046220-10 = "ค่ะ พวกเราชมรมชั้นเรียนเสริมจะมาช่วยลาดตระเวนชายหาดค่ะ"
10046220-11 = "ถ้าจะมาช่วย... ฉันก็ขอบคุณอยู่หรอกค่ะ ว่าแต่มาช่วยทำไมเหรอคะ?"
10046220-12 = "ที่จริงแล้วนี่เป็นการตัดสินใจร่วมของทั้งชมรมค่ะ"
10046220-13 = "ปกติชมรมทวงความยุติธรรมก็คอยปกป้องทรีนิตี้ให้พวกเราอยู่แล้ว ตอนที่มาสถานที่พักผ่อนแบบนี้ พวกฉันก็เลยอยากให้ชมรมทวงความยุติธรรมได้วางมือจากงานบ้างน่ะค่ะ"
10046220-14 = "แหะๆๆ... พอพูดแบบนี้ก็รู้สึกเหมือนเป็นไอเดียของฉันเลยนะคะ"
10046220-15 = "ที่จริงแล้วอาซึสะจังกับโคฮารุจังเป็นคนริเริ่มไอเดียนี้ค่ะ"
10046220-16 = "โคฮารุน่ะเหรอคะ?"
10046220-17 = "ใช่ค่ะ! โคฮารุจังบอกว่าชมรมทวงความยุติธรรมต่างก็งานยุ่งกัน ถ้าตัวเองมาพักผ่อนอยู่คนเดียว#nก็คงไม่ค่อยสบายใจเท่าไร..."
10046220-18 = "ฮ่าฮ่า ฟังดูเป็นโคฮารุจริงๆ เลยนะคะ"
10046220-19 = "แล้วคุณอาซึสะล่ะคะ...?"
10046220-20 = "แต่ก็เอาเถอะค่ะ... คิดให้มากไปก็คงไม่มีประโยชน์อะไร"
10046220-21 = "ถ้างั้นก็รบกวนด้วยนะคะ!"
10046220-22 = "อ๊ะ อนุญาตให้พวกฉันช่วยเหรอคะ?"
10046220-23 = "ตอนนี้งานมันเกินกำลังฉันอยู่พอดี ฉันต่างหากละคะที่ต้องเป็นฝ่ายขอความช่วยเหลือมากกว่า"
10046220-24 = "ว่าแต่แล้วชมรมชั้นเรียนเสริมคนอื่นอยู่ไหนเหรอคะ...?"
10046220-25 = "อ่า... คือว่า... พวกเราไม่รู้ว่าคุณอิจิกะอยู่ตรงไหนของชายหาด แต่ละคนก็เลยแยกย้ายกันไปตามหาน่ะค่ะ"
10046220-26 = "อะฮ่า~ งั้นระหว่างเดินลาดตระเวนก็คงต้องหาไปทีละคนๆ สินะคะ"
10046220-27 = "แหะๆๆ... เหมือนพวกฉันเพิ่มภาระให้ยังไงก็ไม่รู้นะคะ..."
10046220-28 = "ถึงฉันคนเดียวจะช่วยอะไรได้ไม่มาก..."
10046220-29 = "แต่ยังไงก็ต้องขอฝากตัวด้วยอีกครั้งนะคะ!"

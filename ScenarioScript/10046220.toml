[translation]
10046220-3 = "啊，啊哈哈……你好。"
10046220-4 = "啊！是戰車小偷！"
10046220-5 = "咦！？你是這樣記得我的嗎！？"
10046220-6 = "難道連你也打算來惹麻煩嗎？"
10046220-7 = "不，不是的！完全相反！"
10046220-8 = "我們是來幫忙的！"
10046220-9 = "你說的「我們」……指的是？"
10046220-10 = "我們補課部決定要協助海灘巡邏。"
10046220-11 = "這……雖然很感謝，不過為什麼呢？"
10046220-12 = "這是我們社團一起做出的決定。"
10046220-13 = "因為實現正義部平常一直守護著三一……#n想說至少在渡假地點讓你們好好休息一下。"
10046220-14 = "啊哈哈……說的好像是我自己的點子一樣呢。"
10046220-15 = "其實這是梓醬和小春醬提出的想法。"
10046220-16 = "是小春他……？"
10046220-17 = "是的！#n他覺得實現正義部的大家都在忙的時候，如果只有自己在休息會有點過意不去……"
10046220-18 = "哈哈，確實很像小春會有的想法呢。"
10046220-19 = "不過梓同學又是為何……？"
10046220-20 = "……算了，想太多也沒什麼意義吧。"
10046220-21 = "那就麻煩你們了！"
10046220-22 = "啊，真的可以嗎？"
10046220-23 = "現在本來就已經有點吃不消了，反而是我想拜託你們呢。"
10046220-24 = "話說回來，其他補課部的成員呢……？"
10046220-25 = "啊，那個……因為不知道一花同學會在哪裡，所以大家分頭去找了。"
10046220-26 = "啊哈～那我們就一邊巡邏一邊找吧。"
10046220-27 = "啊哈哈……感覺好像反而讓你更忙了……"
10046220-28 = "雖然我一個人可能幫不上太多忙……"
10046220-29 = "還請多多指教！"

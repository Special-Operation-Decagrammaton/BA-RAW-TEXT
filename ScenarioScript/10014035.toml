[translation]
10014035-2 = "(เย็นวันนั้น)"
10014035-3 = "เอ๋... มาเร็วจังแฮะ ขอโทษที่ต้องให้รอนะคะ"
10014035-4 = "[s1] \"ครูรอไม่นานเท่าไรหรอก\"\n[s2] \"ครูชอบแบบเรื่อยๆ ไม่เร่งรีบ เพราะงั้นไม่เป็นไรหรอก\""
10014035-5 = "อืม... ถ้าคุณครูพูดแบบนั้นก็ขอบคุณนะ..."
10014035-6 = "อืม... ถ้าคุณครูพูดแบบนั้นก็ขอบคุณนะ..."
10014035-11 = "แต่พอคุณครูพูดแบบนั้นตลอด ฉันเองก็ไม่รู้เหมือนกันว่าคุณครูไม่เป็นอะไรจริงรึเปล่า..."
10014035-12 = "ล้อเล่นน่ะ... ไม่ว่าจะยังไงฉันก็รู้สึกขอบคุณคุณครูไม่เปลี่ยนแหละนะ"
10014035-13 = "ว่าแต่ ที่เรียกมาในเวลานี้มีเรื่องอะไรรึเปล่าน่ะ? หรือว่าพอจะคิดวิธีแก้ปัญหาได้แล้วเหรอ?"
10014035-14 = "...อุซาวะ?"
10014035-15 = "ยัยนั่นทำไมเหรอ? ก่อเรื่องอะไรกับคุณครูอีกแล้วหรือเปล่า?"
10014035-16 = "หือ...?"
10014035-17 = "เคยได้คุยกันรึเปล่างั้นเหรอ? ฉันน่ะเหรอ? ทำไมจู่ๆ ถึงถามเรื่องนี้ล่ะ..."
10014035-18 = "ก็... ไม่เคยคุยกันหรอก วิ่งหนีอยู่แบบนั้นจะเอาเวลาที่ไหนไปคุยกันล่ะ"
10014035-19 = "แล้วอีกอย่าง รู้สึกเหมือนว่ายัยนั่นดูจะ... ตื่นเต้นกับเรื่องชวนทะเลาะน่ะสิ"
10014035-20 = "ก็เลยทำให้รู้สึกเหมือนเดิมไม่เปลี่ยน... เห็นแล้วก็รู้สึกเพลียขึ้นมาเลยน่ะ"
10014035-21 = "แล้วทำไมจู่ๆ ถึงถามล่ะ...? มีเรื่องอะไรงั้นเหรอ?"
10014035-22 = "ว่าไงนะ...?"
10014035-23 = "ถ้าเรื่องชัดเจนกว่านี้แล้วจะบอกเหรอ? หมายถึงอะไร..."
10014035-24 = "หือ...?"
10014035-25 = "ไปเจอมาแล้วงั้นเหรอ? คุณครูเนี่ยนะ? ...ไปหายัยนั่น?"
10014035-26 = "แล้วยังไง? ได้คุยกันด้วยเหรอ? คุยกันยาว...?"
10014035-27 = "อย่าบอกนะว่า... ได้ยินเรื่องอะไรมาด้วยเหรอ..."
10014035-28 = "[s3] \"อื้ม คิดถูกแล้วละ\"\n[s4] (เล่าเรื่องที่ได้ยินมาทั้งหมดให้ฟัง)"
10014035-33 = "......"
10014035-34 = "......?"
10014035-36 = "......"
10014035-37 = "........."
10014035-38 = ".........."
10014035-39 = "[s5] \"... คาซึสะ นี่ 30 นาทีแล้วนะ\"\n[s6] \"เอาละ เงยหน้าขึ้นเถอะ\""
10014035-40 = "เฮ้อ... เฮ้อ... เฮ้อ..."
10014035-41 = "เฮ้อ... เฮ้อ... เฮ้อ..."
10014035-42 = "ขะ... ขอโทษนะคุณครู... ขอเวลา... ขอเวลาฉันตั้งสติหน่อยได้มั้ย..."
10014035-43 = "จริงเหรอ... พูดแบบนั้นจริงๆ น่ะเหรอ...?"
10014035-44 = "พื้นที่อาชญากรรม...? ออร่าของสัตว์ร้าย...?"
10014035-48 = "แคทส์ พาลูค...?"
10014035-49 = "[s7] \"ทำไมล่ะ? ครูว่าเท่ดีออกนะ\"\n[s8] \"หรือว่าอายเพราะฉายาแบบนั้นเหรอ?\""
10014035-50 = "จะบ้ารึยังไง...? นี่จะล้อกันเล่นเหรอ?"
10014035-51 = "ก็แน่นอนอยู่แล้วสิ-!!!"
10014035-52 = "บ้าจริงๆ เลย!! ยัยนั่นพูดอย่างนั้นจริงเหรอ!?"
10014035-53 = "ทำไมถึงทำแบบนั้นล่ะ!? ทำไมถึงทำแบบนี้ได้ทุกวี่ทุกวัน!! พูดเรื่องแย่ๆ แบบนั้นได้ยังไง!? ไม่อายบ้างเหรอ!?"
10014035-54 = "แล้วคนอื่นล่ะ? อย่าบอกนะว่า... มีคนอื่นได้ยินคำพูดพวกนั้นอีก?"
10014035-55 = "มะ... ไม่มีใช่มั้ย? ไม่มีนะ? บอกทีเถอะว่าไม่มี คุณครู! บอกทีว่ามีแค่คุณครูที่ได้ยิน! ขอร้องละ...!!"
10014035-59 = "อ่า...งั้นเหรอ?"
10014035-60 = "กลุ่มรักษาความสงบคนอื่น... แยงกี้สาวที่นอนล้มอยู่...? ได้ยินกันเยอะเลยสินะ?"
10014035-61 = "พวกสมาชิกในชมรมด้วยงั้นเหรอ...?"
10014035-62 = "[s9] \"เรื่องนั้น ครูต้องขอโทษจริงๆ นะ...\"\n[s10] \"ครูก็มีส่วนผิดด้วยนั่นแหละ\""
10014035-63 = "...หึหึ..."
10014035-64 = "...หึหึ..."
10014035-65 = "หึหึหึ... อะฮ่ะฮ่า... ข่าวลือแพร่ไปหมดแล้ว~ ทีนี้คงต้องเอาปี๊บคลุมหัวไปตลอดชีวิตแล้วสินะ~"
10014035-66 = "[s11] \"ไม่เคยเห็นทำหน้าแบบนั้นมาก่อนเลย...\"\n[s12] \"คาซึสะเครื่องรวนไปแล้วสินะ...\""
10014035-67 = "บ้าจริง... เลวร้ายที่สุด..."
10014035-68 = "บ้าจริง... เลวร้ายที่สุด..."
10014035-69 = "หึหึหึหึ... ตอนนี้อับอายจนไม่รู้จะเอาหน้าไปไว้ที่ไหนแล้วละ..."
10014035-70 = "ฉันมันจบสิ้นแล้ว... ต่อจากนี้ต้องโดนล้อและถูกตราหน้าว่าเป็นคนไข้จูนิเบียวไปตลอดชีวิต..."
10014035-71 = "หือ...?"
10014035-72 = "ฉันมีความคิดแบบนั้นเกี่ยวกับตัวเองในอดีตงั้นเหรอ? ไม่คิดว่าเท่ในแบบของตัวเองบ้างเลยน่ะเหรอ?"
10014035-73 = "นี่คุณครู..."
10014035-74 = "ท่าทางคุณครูจะยังสับสนกับการที่ได้ยินเรื่องแปลกๆ มาจากอุซาวะอยู่สินะ..."
10014035-75 = "ลองคิดดูสิ คุณครู จะแคทส์ พาลูคหรืออะไรก็เถอะ สุดท้ายมันก็คือแยงกี้สาวอยู่ดีไม่ใช่รึไง หมายถึงนักเรียนเกเรน่ะ"
10014035-76 = "ก็แค่พวกเด็กที่ชอบหาเรื่องต่อสู้ในถิ่นตัวเองนี่ ไม่ได้ทำเรื่องใหญ่โตอะไรสักหน่อย"
10014035-77 = "เด็กๆ ที่อ่อนต่อโลก เอาแต่อาละวาด... ไม่รู้จักโต..."
10014035-78 = "ใช่แล้ว... เพราะอย่างนั้นมันก็เลยยิ่งน่าอายเข้าไปใหญ่ไงล่ะ เรื่องในสมัยนั้นน่ะ"
10014035-79 = "ก็เลยอยากจะลืมไปให้หมด... อยากจะลบเรื่องตอนนั้นทิ้งไป"
10014035-80 = "วันหนึ่งฉันก็คิดขึ้นมาได้น่ะ ไม่ว่าจะทำเป็นเท่กับพวกเดียวกันแค่ไหน พอคนนอกมองมาก็เป็นแค่#nการกระทำแบบเด็กๆ และน่าสมเพชเท่านั้น"
10014035-81 = "ถึงคุณครูจะพยายามพูดให้ดูดีขึ้น... แต่ก็น่าเสียดายที่ฉันไม่ใช่คนซื่อๆ แค่นั้นมันไม่ได้ทำให้ฉันสบาย#nใจขึ้นหรอก"
10014035-82 = "ฉันเคยบอกไปรึยัง? คนเราไม่ว่าใครก็มีความทรงจำที่อยากจะลืมกันอยู่เรื่องสองเรื่องกันทั้งนั้น"
10014035-83 = "[s13] \"ช่วงเวลาที่อยากลืม...\"\n[s14] \"คาซึสะอยากจะปิดมันเอาไว้สินะ\""
10014035-84 = "เฮ้อ..."
10014035-85 = "เฮ้อ..."
10014035-86 = "ยังไงก็เถอะ ก็ดีแล้วละนะที่คุณครูช่วยพูดกับอุซาวะให้เข้าใจได้แล้ว..."
10014035-87 = "ถ้าค่อยๆ โน้มน้าวไปเรื่อยๆ เดี๋ยวก็คงจะเลิกไปเอง ถึงขั้นตอนนั้นจะน่าลำบากใจไม่น้อยก็เถอะ..."
10014035-88 = "ก็แค่ต้องคิดว่าเดี๋ยวก็ผ่านไป ก็มันช่วยไม่ได้นี่นะ ใช่มั้ยล่ะ?"
10014035-92 = "เฮ้อ..."
10014035-93 = "จะยังไงก็เถอะ... ถ้าทุกอย่างมันจบลงได้เร็วๆ ก็คงดี"

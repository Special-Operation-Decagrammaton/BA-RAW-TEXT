[translation]
10014035-2 = "（當天傍晚）"
10014035-3 = "……咦，老師來的真早呢。#n抱歉讓你久等了。"
10014035-4 = "[s1] 「我也才剛到而已，別在意。」\n[s2] 「我很喜歡悠悠閒閒的，別擔心。」"
10014035-5 = "嘛，雖然你這麼說我很感謝……"
10014035-6 = "嘛，雖然你這麼說我很感謝……"
10014035-11 = "但是你總是這麼說，我反而分不出到底是不是真的沒問題了……"
10014035-12 = "……開玩笑的。#n不論如何都是值得感謝的事。"
10014035-13 = "所以，有什麼事呢？#n有什麼好的解決方法嗎？"
10014035-14 = "……宇沢？"
10014035-15 = "那傢伙怎麼了嗎？#n難道他又對老師做出了什麼嗎？"
10014035-16 = "……嗯？"
10014035-17 = "直接和他談談？我嗎？怎麼突然這麼說……"
10014035-18 = "老實說我沒有和他談過唷。#n畢竟他每次都像那樣衝過來，想要對話也不可能吧。"
10014035-19 = "而且每次看到那傢伙都覺得……#n明明嘴上說要決鬥卻總是很開心的樣子。"
10014035-20 = "簡直跟以前一模一樣……該說是看膩了嗎。"
10014035-21 = "……話說回來那又怎麼了嗎？"
10014035-22 = "……？"
10014035-23 = "等多了解一點之後再說……？#n這樣啊……"
10014035-24 = "……嗯？"
10014035-25 = "難道老師去見過那傢伙了嗎？"
10014035-26 = "……這樣啊。"
10014035-27 = "那傢伙說了什麼嗎？"
10014035-28 = "[s3] 「……嗯，說了很多。」\n[s4] 把聽到的事全都說出來"
10014035-33 = "……"
10014035-34 = "……？"
10014035-36 = "……"
10014035-37 = "…………"
10014035-38 = "………………"
10014035-39 = "[s5] 「……千紗，你還好嗎？」\n[s6] 「差不多該把頭抬起來了……」"
10014035-40 = "……哈……嘶……哈……"
10014035-41 = "……哈……嘶……哈……"
10014035-42 = "抱，抱歉。老師……稍微……#n可以再讓我稍微冷靜一下嗎……"
10014035-43 = "他真的……#n真的那麼說嗎……"
10014035-44 = "不良學生的神話……野獸的氣息……"
10014035-48 = "凱茜．帕魯格……？"
10014035-49 = "[s7] 「真是獨特的命名品味對吧。」\n[s8] 「難道你覺得那個外號很羞恥嗎？」"
10014035-50 = "認真……？#n老師，難道你在捉弄我嗎？"
10014035-51 = "那還用問嗎！！！"
10014035-52 = "真是糟透了！真是的！！#n那傢伙真的說了那種話！？"
10014035-53 = "那傢伙要說那種話到什麼時候啊！？#n都不會害羞的嗎！？"
10014035-54 = "吶，那時候現場還有其他人嗎？#n難道說……還有被其他人聽到？"
10014035-55 = "沒，沒有吧？沒有對吧？拜託你說沒有吧，老師！#n拜託你說只有老師你聽到！吶，拜託了……！！"
10014035-59 = "……啊啊……這樣啊。"
10014035-60 = "其他三一自衛隊的人……被打倒的太妹……？#n還真是被不少人聽到了呢……？"
10014035-61 = "……咦？#n放學後的甜點部的大家也……？為什麼呢？"
10014035-62 = "[s9] 「因為我的不小心……」\n[s10] 「真的很抱歉。」"
10014035-63 = "……呵呵……"
10014035-64 = "……呵呵……"
10014035-65 = "呵呵……哈哈……#n謠言要傳開了啊……看來得一輩子戴著帽子生活了呢♪"
10014035-66 = "[s11] 「千紗……」\n[s12] 「千紗壞掉了……」"
10014035-67 = "可惡……真是糟透了……"
10014035-68 = "可惡……真是糟透了……"
10014035-69 = "嗚嗚……真是太羞恥，活不下去了……"
10014035-70 = "已經結束了……我這一輩子都要被貼上中二病的標籤了……"
10014035-71 = "……咦？"
10014035-72 = "你說其實也不需要那麼悲觀？"
10014035-73 = "……老師。"
10014035-74 = "看來老師似乎也被宇沢同化了啊……"
10014035-75 = "你好好想想看。#n就算是凱茜．帕魯格之類的，也不過就只是太妹而已。"
10014035-76 = "只不過是打架比較厲害的小孩而已。#n也不是什麼厲害的事。"
10014035-77 = "不知天高地厚又沒有判斷力的小孩……"
10014035-78 = "……沒錯。#n儘管如此還認為自己是特別的，讓我更為過去的自己感到羞恥了。"
10014035-79 = "所以我已經忘記了……#n真想要讓那時候的一切全都消失。"
10014035-80 = "我啊，在某個時候突然想通了……#n不管我再怎麼耍帥，在別人眼裡都只會覺得幼稚跟羞恥而已。"
10014035-81 = "雖然老師很溫柔且為我著想……#n但很遺憾地，我並沒有傻到這樣就能輕鬆釋懷。"
10014035-82 = "我說過了吧？#n不管是誰都會有一兩個想要忘記的過去。"
10014035-83 = "[s13] 「想要忘記的過去……是嗎。」\n[s14] 「想要掩蓋那一切是嗎，千紗。」"
10014035-84 = "……唉。"
10014035-85 = "……唉。"
10014035-86 = "嘛，就是這麼一回事。#n不過太好了，老師也跟宇沢好好說明過了……"
10014035-87 = "之後只要慢慢說服他的話總會聽進去的吧。#n雖然也不會是件輕鬆的事。"
10014035-88 = "嘛，終究得要這麼做的……我也得想通才行呢。"
10014035-92 = "……呼。"
10014035-93 = "……雖然這麼說……希望能快點結束。"

[translation]
10051005-1 = "บทเริ่มต้น;ราเม็งกับแผนลับ"
10051005-3 = "[log]หากเป็นนินจา จงจำไว้ว่า[/log]"
10051005-6 = "[log]เราต้องกินเส้นใหญ่พิเศษ![/log]"
10051005-8 = "[log]เพิ่มท็อปปิ้งมันหมู![/log]"
10051005-12 = "[log]แล้วปิดท้ายด้วยน้ำมันคั่วพริก![/log]"
10051005-15 = "ร้านราเม็งแห่งหนึ่งในเฮียกคิยาโค"
10051005-16 = "และนี่ก็คือวิธีใหม่ในการกินราเม็งของนินจา!"
10051005-17 = "ระ... ราเม็งเซ็ตใหม่ <เซ็ตนินจา> ค่ะ!"
10051005-18 = "ทุกคนรอกันนานเลยใช่มั้ยคะ? นินนิน!"
10051005-19 = "ยินดีต้อนรับเข้าสู่ <วิถีนินจาสาว มิจิรุจจี้>! ตอน <นินจากับราเม็ง>!"
10051005-20 = "มาเริ่มกันเลยค่ะ!!!"
10051005-21 = "อ๊ะ เดี๋ยวก่อนๆ!"
10051005-22 = "เหมือนกล้องของเราจะเอียงนิดหน่อยเลยนะ"
10051005-23 = "หรือว่าเป็นที่ขาตั้งกล้อง...?"
10051005-24 = "คะ? ขะ... ขอโทษค่ะ! ฉันควรจะใส่ใจให้มากกว่านี้แท้ๆ...!"
10051005-25 = "หืม? ขอโทษทำไม ข้าน้อยต่างหากที่เป็นคนติดตั้งกล้องน่ะ"
10051005-26 = "ไม่เป็นไรค่ะ! ถ่ายอีกครั้งก็ได้ ถ่ายใหม่อาจจะได้ภาพสวยกว่าเดิมนะคะ!"
10051005-27 = "งั้นเรามาเริ่มกันใหม่ตั้งแต่แรก..."
10051005-29 = "เพล้ง!!"
10051005-32 = "นี่ เถ้าแก่! ทำไมซุปถึงเป็นแบบนี้ล่ะ! ซุปใสเกินไปจนไม่เคลือบเส้นเลยนะ!"
10051005-33 = "แล้วเส้นก็ยังไม่สุกดีด้วย!"
10051005-34 = "ใช่! แบบนี้ก็เสียสมดุลระหว่างเส้นราเม็งกับซุปหมดน่ะสิ!"
10051005-35 = "เอ่อ ราเม็งของร้านเราใช้สูตรนี้มาหลายปีแล้วนะ..."
10051005-36 = "แล้วถ้าทานแล้วไม่ถูกปาก ทำไมถึงมาคว่ำโต๊ะกันอย่างนี้เลยล่ะครับ?!"
10051005-37 = "ทำแบบนี้เป็นการสร้างความเดือดร้อนให้ลูกค้าท่านอื่นนะครับ!"
10051005-42 = "ราเม็งจากไหนไม่รู้ลอยมาตกใส่กล้องของเราแล้วค่ะ...!"
10051005-43 = "ฮะ... เฮือกก..."
10051005-44 = "หมดกัน...!"
10051005-45 = "ทะ... ท่านหัวหน้า ทำยังไงดี..."
10051005-46 = "..."
10051005-50 = "(ฮึ่ย พวกเด็กไม่มีมารยาท...! อยากเจอดีกับข้าน้อยนักใช่มั้ย...?)"
10051005-51 = "(เดี๋ยวนะ ว่าแต่ข้าน้อยจะสู้กับพวกนั้นไหวหรือเปล่า...?)"
10051005-55 = "(ไม่สิ ข้าน้อยไม่ได้อยู่คนเดียวสักหน่อย)"
10051005-56 = "(สึคุโยะกับอิซุนะก็อยู่ด้วยทั้งคน...!)"
10051005-57 = "นินจาน่ะ ไม่ว่าจะอยู่ในสถานการณ์ที่จนมุมแค่ไหน..."
10051005-58 = "ก็ไม่ยอมถอยให้ความอยุติธรรมอยู่แล้ว...!"
10051005-59 = "ยัยนั่นพูดบ้าอะไรน่ะ?"
10051005-60 = "ท่านหัวหน้า...?"
10051005-64 = "เพราะงั้นก็รับไปซะ! วิชานินจา <เปลวอัคคีประกายแสง!>"
10051005-72 = "เมื่อกี้อะไรน่ะ...?"
10051005-73 = "ไม่ได้ยิงจู่โจม... แต่ใช้ประทัดงั้นเหรอ?"
10051005-74 = "อะไรกันน่ะ... ถึงจะมีประกายวูบวาบ แต่ไม่เห็นจะเจ็บเลยสักนิด?"
10051005-75 = "ว่าแต่กล้ามาหาเรื่องทะเลาะงั้นเหรอ...!"
10051005-76 = "นี่ ว่าแต่วิชานินจามันคืออะไรกันน่ะ?"
10051005-77 = "ฉันก็ไม่รู้..."
10051005-85 = "มะ... มาหลบข้างหลังฉันค่ะ!"
10051005-86 = "ขะ... ขอบคุณนะครับ!"
10051005-95 = "อึก..."
10051005-96 = "เบี่ยงเบนความสนใจ... แล้วโจมตีจากข้างหลังอย่างคนขี้ขลาดตาขาวงั้นเหรอ..."
10051005-101 = "ฮุฮุ ล่อสายตาแล้วตลบหลัง!"
10051005-102 = "นี่ละการประยุกต์ใช้ <เปลวอัคคีประกายแสง> อย่างแท้จริง!"
10051005-103 = "กลยุทธ์จับเสือด้วยนินจา 3 คนเป็นแบบนี้สินะคะ!"
10051005-104 = "ถูกต้องเลย!"
10051005-105 = "หรือว่าไม่ถูกนะ...?"
10051005-106 = "เอ่อ... แต่ว่า ทุกคนคะ..."
10051005-107 = "หืม?"
10051005-108 = "ฉะ... ฉันพยายามเช็ดกล้องที่เลอะน้ำซุปจนแห้งดีแล้ว..."
10051005-110 = "แต่ว่ากล้องมันเปิดไม่ติดเลยค่ะ...!"
10051005-111 = "..."
10051005-112 = "..."
10051005-114 = "ม่ายยย...!"
10051005-118 = "โอ้..."
10051005-119 = "ทั้งเคลื่อนไหวอย่างคล่องแคล่วและมีกลยุทธ์ แถมยังดูแลความปลอดภัยให้เถ้าแก่ร้านราเม็งอีก..."
10051005-120 = "นี่คือการเคลื่อนไหวที่ถูกออกแบบมาให้เหมาะกับการทำภารกิจรักษาความปลอดภัยอย่างแท้จริง..."
10051005-121 = "ถึงจะเคยได้ยินกิตติศัพท์ของชมรมวิจัยศาสตร์นินจามาบ้าง แต่พอได้เห็นกับตาก็น่าทึ่งเลยนะคะ"
10051005-122 = "เดี๋ยวนะ ถ้าเป็นอย่างนั้น..."
10051005-123 = "ให้ชมรมวิจัยศาสตร์นินจาไปทำ 'ภารกิจ' นั้นก็น่าจะได้นะ...?"

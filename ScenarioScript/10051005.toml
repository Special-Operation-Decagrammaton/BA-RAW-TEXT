[translation]
10051005-1 = "序幕;拉麵與陰謀"
10051005-3 = "[log]身為忍者之人，應當謹記於心。[/log]"
10051005-6 = "[log]麵條極粗！[/log]"
10051005-8 = "[log]追加背脂！[/log]"
10051005-12 = "[log]辣油收尾！[/log]"
10051005-15 = "百鬼夜行某處的拉麵店"
10051005-16 = "這就是忍者流！享受拉麵的新方式！"
10051005-17 = "新，新忍者套餐！"
10051005-18 = "讓各位久等了，忍忍！"
10051005-19 = "「少女忍法帖小小三千留」！忍者與拉麵篇！"
10051005-20 = "開始！！！"
10051005-21 = "咦，先等一下！"
10051005-22 = "我們的攝影機是不是有點歪歪的？"
10051005-23 = "是三腳架的問題嗎……？"
10051005-24 = "咦？對，對不起！#n我應該多注意一點的……！"
10051005-25 = "嗯？沒事沒事，攝影機其實是我架的啦。"
10051005-26 = "無須擔心！第二次一定能拍得更好的！"
10051005-27 = "那麼大家再來一次……"
10051005-29 = "哐啷啷！！"
10051005-32 = "喂，老闆！這個湯頭的濃度是怎麼回事！#n稀成這樣根本沒辦法附著在麵體上啊！"
10051005-33 = "而且麵條也煮得也不夠透！"
10051005-34 = "沒錯！簡直破壞了麵和湯頭之間的平衡！"
10051005-35 = "不是，我們家的拉麵多年來都是相同的配方……"
10051005-36 = "而且怎麼能不滿意就掀桌子呢！？"
10051005-37 = "這樣會影響到其他客人的！"
10051005-42 = "不知從哪飛來的拉麵，砸中了我們的攝影機……！"
10051005-43 = "嗚……嗚嗚嗚啊……"
10051005-44 = "完蛋了……！"
10051005-45 = "部，部長……這下該怎麼辦……"
10051005-46 = "……"
10051005-50 = "（唔啊啊，這些找麻煩的奧客……！我應該出手嗎……？） "
10051005-51 = "（……等等，可是我打得贏他們嗎？）"
10051005-55 = "（不對，我又不是只有自己一個人）"
10051005-56 = "（還有月夜和伊樹菜在……！）"
10051005-57 = "身為忍者，無論陷入什麼樣的絕境……"
10051005-58 = "都不能對不義之事視而不見……！"
10051005-59 = "那傢伙在說什麼啊？"
10051005-60 = "部長……？"
10051005-64 = "接招吧！忍法．閃亮亮火焰之術！"
10051005-72 = "……剛才那是什麼？"
10051005-73 = "槍擊……不，是煙火？"
10051005-74 = "什麼跟什麼啊……只是有點亮而已，根本不痛不癢嘛？"
10051005-75 = "不過你居然敢主動挑釁……！"
10051005-76 = "話說忍法到底是什麼啊？"
10051005-77 = "這我也不知──"
10051005-85 = "請，請退到我身後！"
10051005-86 = "謝，謝謝！"
10051005-95 = "唔……"
10051005-96 = "竟然轉移視線從後面偷襲，太卑鄙了……"
10051005-101 = "呵呵，吸引注意之後突破背後的破綻！"
10051005-102 = "這就是「忍法．閃亮亮火焰之術」真正的用法！"
10051005-103 = "原來如此，這就是所謂「三忍懲虎」的戰術吧！"
10051005-104 = "當然！"
10051005-105 = "……咦，是這樣嗎？"
10051005-106 = "話說，各位……"
10051005-107 = "嗯？"
10051005-108 = "攝，攝影機上的湯汁我已經擦乾淨了……"
10051005-110 = "可是攝影機打不開了……！"
10051005-111 = "……"
10051005-112 = "……"
10051005-114 = "唔啊啊啊……！"
10051005-118 = "呼呣……"
10051005-119 = "動作敏捷且充滿戰術謀略，同時不忘顧及拉麵店老闆的安全。"
10051005-120 = "簡直是最適合護衛作戰的戰鬥風格……"
10051005-121 = "雖然早就對忍術研究部各位的實力有所了解，這樣的一面還是令人耳目一新呢。"
10051005-122 = "等等，既然如此……"
10051005-123 = "安排忍術研究部去執行「那項任務」……似乎是個不錯的選擇？"

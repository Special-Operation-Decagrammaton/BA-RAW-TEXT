[translation]
1004720-1 = "Treasure Chest of Memories"
1004720-2 = "I had a vague feeling of uneasiness, so I hurried to the beach to find Chise."
1004720-9 = "[ns] \"Chise should be around here somewhere...\""
1004720-11 = "I wandered up and down the beach, looking for Chise."
1004720-23 = "[ns] \"Huh? What's that sound...?\""
1004720-30 = "Hiyah."
1004720-40 = "I followed the strange noise to the source, and found Chise aggressively filling a bag with sand."
1004720-41 = "[ns] \"Ch-Chise?!\""
1004720-47 = "Hmm? Oh. Sensei. Hello. "
1004720-48 = "[s1] \"Hi! Wait. First, what's happening?\"\n[s2] \"What...are you doing...?\""
1004720-51 = "Me?"
1004720-52 = "It's simple."
1004720-53 = "I'm bringing the beach with me."
1004720-54 = "[s] \"Bringing...the beach? How exactly...?\""
1004720-56 = "The sand. I'm putting it in my bag."
1004720-57 = "If I take this sand back to the Yin-Yang club room, I can spread it all over the floor."
1004720-62 = "Then, the other members can enjoy the beach even from the comfort of Hyakkiyako."
1004720-63 = "[s5] \"That makes more sense. You want to share these memories.\"\n[s6] \"So that's what you wanted to do, Chise...\""
1004720-66 = "Hm? Yes. What else could I have meant?"
1004720-67 = "[s7] \"Well, you do tend to tread off the well-beaten path.\"\n[s8] \"If anyone's going to throw in an unexpected plot twist, it's you.\""
1004720-73 = "...?"
1004720-75 = "[s] \"Don't sweat it. So, you just wanted to bring home the beach for everyone?\""
1004720-76 = "Yes. And I'm bringing home more than just the beach."
1004720-77 = "I've collected many things to share with the others."
1004720-78 = "To set the ambience, I thought we would also need other beach-like things."
1004720-85 = "May I show you?"
1004720-86 = "As she said that, Chise began pulling things out of her bag."
1004720-94 = "I found this seashell from the corner of the beach."
1004720-95 = "Oh, this rock was over there at the mudflats."
1004720-96 = "This bottle opener was a gift I got from the Beach Shack."
1004720-97 = "Oh, and..."
1004720-104 = "This one, Sensei..."
1004720-111 = "Sensei!"
1004720-125 = "Chise's bag was filled with a wide variety of different objects, not just sand like I'd originally thought."
1004720-126 = "There was everything from sea shells to pebbles and bottle openers."
1004720-127 = "She had even included torn-up nets and pieces of trash she'd cleaned up from the beach."
1004720-128 = "Despite how random the collection was, all the items seemed strangely familiar."
1004720-130 = "[ns] \"Chise, are these all...\""
1004720-132 = "Yes, Sensei. These are all from when we were searching for sparkles together."
1004720-133 = "This beach is a very important place to me. I made many memories with you here."
1004720-134 = "So I decided to bring back the memories and share them with everyone."
1004720-135 = "I want to tell them the stories behind all these pieces of the ocean."
1004720-136 = "I have many haiku ideas I'd like to read to them as well."
1004720-140 = "...Do you think everyone would like that?"
1004720-141 = "[ns] \"Show-and-tell from Chise herself?\""
1004720-143 = "[ns] \"I can guarantee they'll love every moment.\""
1004720-144 = "Really?"
1004720-145 = "That makes me very happy."
1004720-146 = "Good. Now, I need to pack everything back inside."
1004720-157 = "As Chise carefully placed all the \"sparkles\" back into her bag, I couldn't help but think of all the precious memories and treasures they represented to her."
1004720-158 = "In a way, that made the bag..."
1004720-160 = "[ns] \"That bag is Chise's treasure chest!\""
1004720-161 = "Treasure chest...?"
1004720-162 = "[s9] \"Something that holds your precious items!\"\n[s10] \"It's a chest filled with things you want to show off to others!\""
1004720-165 = "Precious...show off..."
1004720-166 = "Treasures I want to share with other people...?"
1004720-167 = "Ah."
1004720-168 = "Treasure."
1004720-172 = "Yes. I want to bring my treasures back with me."
1004720-179 = "[ns] \"Huh...? Chise...? Um, why—\""
1004720-182 = "[ns] \"Ch-Chise! Stop walking towards me! What do you want?!\""
1004720-183 = "You are my treasure, Sensei. This is a treasure chest. So I will put you in here and bring you back to the Yin-Yang Club to share."
1004720-184 = "[s] \"Wait, no! That's not what I meant! My mouth is full of sand now!\""
1004720-190 = "[ns] \"Chise! I'll just come with you! You don't have to put me in a bag!\""
1004720-192 = "She finally stopped trying to stuff me in her bag, and instead began dragging me off the beach."
1004720-193 = "Together, we walked over the beach filled with our memories and enjoyed the rest of a quiet afternoon."

[translation]
1004720-1 = "回憶寶箱"
1004720-2 = "（擔心有個萬一，趕緊來到海邊找知世）"
1004720-9 = "[ns]「知世一定就在這附近……」"
1004720-11 = "（就在為了尋找知世，在海邊東張西望時……）"
1004720-23 = "[ns]「嗯……？這個聲音是……？」"
1004720-30 = "呀啊啊～"
1004720-40 = "（往聲音傳來的地方一看，發現知世正以猛烈的氣勢將海邊的沙裝進包包裡）"
1004720-41 = "[ns]「知，知世！？」"
1004720-47 = "嗯～？是老師～你好呀～ "
1004720-48 = "[s1]「啊，知世，你好呀……不對。」\n[s2]「那個……你現在在做什麼？」"
1004720-51 = "我～？"
1004720-52 = "這個啊～"
1004720-53 = "是在把海帶走哦～"
1004720-54 = "[s]「……把海帶走，是什麼意思……？」"
1004720-56 = "像這樣，把海邊的沙子帶走。"
1004720-57 = "用來裝飾陰陽部的部室～"
1004720-62 = "這樣的話，不能到海邊來的人就能一起享受大海了對吧～"
1004720-63 = "[s5] 「啊，原來……是指把能成為回憶的東西帶走啊。」\n[s6]「原來知世指的是這個意思啊……」"
1004720-66 = "嗯～？還有其他意思嗎～？"
1004720-67 = "[s7]「沒事，是我自己想太多了。」\n[s8]「想說如果是知世的話……說不定能辦到。」"
1004720-73 = "……？"
1004720-75 = "[s]「總，總之，嗯。知世是為了大家才想把海……」"
1004720-76 = "嗯，不過不只有海唷～"
1004720-77 = "想給大家看的還有很多。"
1004720-78 = "在海邊找到的好東西……全都裝在這裡了。"
1004720-85 = "老師也要看嗎～？"
1004720-86 = "（知世邊說邊開始把包包裡的東西一一拿出來）"
1004720-94 = "這個貝殼～是在那個角落撿到的唷。"
1004720-95 = "然後，這顆石頭是在泥灘上撿回來的～"
1004720-96 = "這個開瓶器是海之家送的禮物～"
1004720-97 = "還有哇～"
1004720-104 = "老師，這個是……"
1004720-111 = "老師～"
1004720-125 = "（知世的包包裡除了海邊的沙子之外，還裝滿了各式各樣的回憶）"
1004720-126 = "（像是貝殼、寄居蟹的殼，以及乍看之下很普通的小石子和開瓶器）"
1004720-127 = "（就連掉在海邊的廢網和塑膠袋一類的垃圾都有）"
1004720-128 = "（而這些回憶，似乎都有些眼熟）"
1004720-130 = "[ns]「知世，這些難道是……」"
1004720-132 = "嗯，是之前和老師一起尋找閃亮時撿到的～"
1004720-133 = "這裡面充滿我和老師之間的回憶。"
1004720-134 = "所以，我想帶回去給大家看。"
1004720-135 = "然後用整個晚上，把遇見的事和大家分享……"
1004720-136 = "做成俳句唸給大家聽～"
1004720-140 = "……這樣大家，會感到開心嗎？"
1004720-141 = "[ns]「嗯……」"
1004720-143 = "[ns]「大家一定會喜歡的。老師向你保證。」"
1004720-144 = "是這樣嗎～？"
1004720-145 = "那真是太好了～"
1004720-146 = "那，我要努力帶更多東西回去～"
1004720-157 = "（知世裝在包包的東西，都像無可取代的寶物一般……）"
1004720-158 = "（閃閃發亮，閃閃發亮……）"
1004720-160 = "[ns]「那個包包就像知世的寶箱一樣呢。」"
1004720-161 = "寶箱……？"
1004720-162 = "[s9]「嗯，就是裝著想讓別人看見……」\n[s10]「想跟他人分享的回憶的箱子。」"
1004720-165 = "想讓別人看見……想跟他人分享的回憶……"
1004720-166 = "集結而成的……寶箱……"
1004720-167 = "……啊。"
1004720-168 = "寶物……"
1004720-172 = "嗯，要帶回去才行。"
1004720-179 = "[ns]「嗯……？知世……？怎麼了……？」"
1004720-182 = "[ns]「知，知世！？為什麼要突然靠近我！？」"
1004720-183 = "因為老師是寶物，所以要帶回陰陽部～"
1004720-184 = "[s]「這，這樣有點……噗哈！沙子跑到嘴裡了……！？」"
1004720-190 = "[ns]「知，知世！要去陰陽部的話我會陪你一起去的啦～！」"
1004720-192 = "（就這樣被知世牽著……）"
1004720-193 = "（在海邊悠閒地感受時光的流逝）"

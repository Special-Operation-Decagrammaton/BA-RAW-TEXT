[translation]
1004720-1 = "กล่องสมบัติแห่งความทรงจำ"
1004720-2 = "(คุณครูกังวลว่าจะเกิดเรื่องอะไรขึ้น จึงรีบมาหาชิเซะที่ชายหาดทันที)"
1004720-9 = "[ns] \"ถ้าเป็นชิเซะก็น่าจะอยู่แถวนี้นี่นา...\""
1004720-11 = "(คุณครูเดินตามหาชิเซะไปรอบๆ ชายหาดอยู่พักใหญ่)"
1004720-23 = "[ns] \"หืม...? เสียงนี้มัน...?\""
1004720-30 = "ยะ...ฮู่ว~"
1004720-40 = "(และที่มาของเสียงนั้นก็คือชิเซะที่ขมักเขม้นตักทรายใส่อะไรบางอย่างอยู่)"
1004720-41 = "[ns] \"ชะ...ชิเซะ?!\""
1004720-47 = "หืม? คุณครูนี่นา~ สวัสดี~ "
1004720-48 = "[s1] \"อ๊ะ ชิเซะ วะ...ว่าไง\"\n[s2] \"เอ่อ... ทำอะไรอยู่เหรอ?\""
1004720-51 = "ฉันเหรอ?"
1004720-52 = "คือว่านะ~"
1004720-53 = "ฉันกำลังเตรียมจะเอาทะเลกลับไปด้วยน่ะ"
1004720-54 = "[s] \"เอาทะเลกลับไปเหรอ? หมายความว่าไงน่ะ...?\""
1004720-56 = "ฉันจะเอาทรายจากทะเลนี่กลับไปเยอะๆ เลย"
1004720-57 = "ถ้าเอาทรายนี่ไปตกแต่งชมรมหยินหยางละก็... จะต้องเป็นทะเลที่น่าสนุกแน่ๆ"
1004720-62 = "ถ้าทำแบบนั้น ถึงจะไม่ได้มาทะเล แต่ก็ยังสนุกกับทะเลได้~"
1004720-63 = "[s5] \"อ้อ... เก็บเอาไปเป็นที่ระลึกความทรงจำสินะ\"\n[s6] \"ชิเซะหมายถึงแบบนี้เองสินะ...\""
1004720-66 = "หืม~? แล้วมันมีความหมายอื่นด้วยเหรอ~?"
1004720-67 = "[s7] \"เปล่าหรอก ครูแค่คิดอะไรไปเรื่อยเปื่อยน่ะ\"\n[s8] \"แค่คิดเฉยๆน่ะ ว่าถ้าเป็นชิเซะอาจจะทำแบบนี้ได้...\""
1004720-73 = "...?"
1004720-75 = "[s] \"ชิเซะจะเอาทะเลกลับไปเพื่อทุกคนสินะ...\""
1004720-76 = "อื้อ ฉันไม่ได้จะเอาไปแค่ทะเลนะ~"
1004720-77 = "อันที่ฉันอยากให้ทุกคนได้เห็นน่ะ"
1004720-78 = "มีของอย่างอื่นด้วย... ฉันเอาของที่เก็บมาจากทะเลใส่เอาไว้ในนี้แล้ว"
1004720-85 = "คุณครูอยากดูมั้ย~?"
1004720-86 = "(พอพูดจบชิเซะก็เริ่มหยิบของต่างๆ ที่ใส่ไว้ในกระเป๋าออกมา)"
1004720-94 = "เปลือกหอยอันนี้~ ฉันเก็บมาจากมุมชายหาดตรงโน้นน่ะ"
1004720-95 = "อันนี้... เป็นก้อนหินที่เก็บมาจากหาดโคลนน่ะ~"
1004720-96 = "ที่เปิดขวดอันนี้ ฉันได้มาจากร้านริมทะเลเป็นของขวัญ~"
1004720-97 = "แล้วก็อันนี้..."
1004720-104 = "คุณครู อันนี้น่ะ~"
1004720-111 = "คุณครู~"
1004720-125 = "(ในกระเป๋าของชิเซะ นอกจากทรายแล้ว ก็เต็มไปด้วยสิ่งของต่างๆ มากมายที่เธอเก็บมา)"
1004720-126 = "(เริ่มจากเปลือกหอย หรือเปลือกปูเสฉวน ก้อนกรวดที่ดูยังไงก็เหมือนหินธรรมดาๆ แล้วก็ที่เปิดขวด...)"
1004720-127 = "(นอกจากนั้น ก็ยังมีขยะต่างๆ ที่เก็บมาจากชายหาด เช่น ถุงพลาสติก และตาข่ายที่ถูกทิ้ง)"
1004720-128 = "(ไม่รู้ทำไมคุณครูรู้สึกคุ้นเคยกับของที่เธอหยิบออกมาอย่างประหลาด...)"
1004720-130 = "[ns] \"ชิเซะ ของพวกนี้น่ะ ใช่อันที่คราวที่แล้ว...\""
1004720-132 = "อื้อ เป็นของที่เก็บมาตอนที่ไปตามหาแสงระยิบระยับกับคุณครูน่ะ~"
1004720-133 = "นี่คือความทรงจำที่ฉันมีร่วมกันกับคุณครู"
1004720-134 = "เพราะงั้นก็เลยอยากจะเอากลับไปให้ทุกคนดูน่ะ"
1004720-135 = "เอาไปให้ทุกคนดู แล้วก็เล่าให้ฟังว่าเกิดอะไรขึ้นบ้าง... แล้วก็นอนคุยกันไปทั้งคืน..."
1004720-136 = "แล้วก็อยากแต่งกลอนไฮกุไปให้ทุกคนด้วย"
1004720-140 = "...ถ้าทำแบบนั้น... ทุกคนจะดีใจมั้ยนะ?"
1004720-141 = "[ns] \"อื้อ ต้องดีใจอยู่แล้ว\""
1004720-143 = "[ns] \"ครูว่าทุกคนต้องดีใจแน่ๆ รับรองได้เลย\""
1004720-144 = "งั้นเหรอ~?"
1004720-145 = "แบบนั้นก็ดีเลยนะ~"
1004720-146 = "เอาละ ถ้างั้นก็ต้องตั้งใจเก็บให้ดีๆ แล้วละ~"
1004720-157 = "(ทุกอย่างที่ชิเซะเก็บมาก็เหมือนกับความทรงจำอันล้ำค่าที่เปล่งประกาย เหมือนสมบัติทุกอย่างถูก#nรวบรวมมาไว้ที่นี่...)"
1004720-158 = "(เป็นอย่างนั้นจริงๆ...)"
1004720-160 = "[ns] \"กระเป๋าใบนั้นเหมือนกล่องสมบัติของชิเซะเลยน้า\""
1004720-161 = "กล่องสมบัติเหรอ...?"
1004720-162 = "[s9] \"อื้อ สมบัติที่อยากให้คนอื่นได้เห็น\"\n[s10] \"อื้อ สมบัติที่อยากเอาไปอวดให้คนอื่นๆ ดู\""
1004720-165 = "สมบัติที่เอาไปให้ดู... แล้วก็เอาไปอวดคนอื่นๆ..."
1004720-166 = "กล่องสมบัติที่อยากให้ทุกๆ คนได้ดู..."
1004720-167 = "...อา"
1004720-168 = "สมบัติ..."
1004720-172 = "อื้อ ฉันจะเอาสมบัติกลับไป"
1004720-179 = "[ns] \"หืม...? ชิเซะ...? ทำไมถึง...\""
1004720-182 = "[ns] \"ชะ...ชิเซะ?! จู่ๆ เข้ามาใกล้ๆ แบบนี้ทำไมน่ะ?!\""
1004720-183 = "ก็คุณครูเองก็เป็นสมบัตินี่นา เลยจะเอากลับไปชมรมหยินหยางด้วย~"
1004720-184 = "[s] เดี๋ยวก่อน แบบนั้นก็แย่สิ อุ๊บ...! ทรายเข้าปากครูแล้วนะ!\""
1004720-190 = "[ns] \"ชิเซะ! ถะ...ถ้าจะพาไปชมรมหยินหยาง ครูเดินไปดีๆ ก็ได้~!\""
1004720-192 = "(หลังจากนั้นคุณครูก็ถูกชิเซะจูงมือลากไปโน่นไปนี่...)"
1004720-193 = "(ทั้งสองคนใช้เวลาช่วงบ่ายเดินเล่นอยู่ที่ชายหาดด้วยกัน)"

[translation]
10048060-1 = "Episode 6;Plot Changes"
10048060-3 = "I'm with you on the whole...ultramarine paint part, the \"hard sky,\" the lapis lazuli..."
10048060-4 = "But the snails crying part... Tears would be transparent, right?"
10048060-6 = "It's purple."
10048060-7 = "Purple?"
10048060-8 = "Long ago, they made purple pigment by grinding up Murex sea snail glands. You'd need thousands to make one gram of dye."
10048060-9 = "I'm sure the snails were \"crying\" because of the sheer cruelty of the process."
10048060-10 = "And the king smiling part? What's that? White? Yellow?"
10048060-11 = "No. Blue and purple dyes were so rare and difficult to produce that only royalty could wear them."
10048060-12 = "I already told you how complicated the processes once were."
10048060-13 = "This final phrase only reaffirms the previous two. Blue and purple weren't for the laypeople. They couldn't wear or paint with them."
10048060-14 = "Hence, \"only the king smiles.\""
10048060-15 = "So the Benevolent Thief is after a purple and blue painting. Maybe an old one..."
10048060-16 = "Precisely."
10048060-17 = "So, if we work together and examine all the paintings that will be featured, we can at least guess what—"
10048060-19 = "Hey, hey, isn't it already in Fuyu's case?"
10048060-20 = "Huh? I didn't steal anything...yet."
10048060-21 = "...Oh."
10048060-22 = "Ah...!"
10048060-23 = "\"The Love of Purple and Blue Light\"!"
10048060-24 = "That's it! It's so obvious. It was right THERE. And...right here!"
10048060-25 = "[s] \"On top of that, we have the genuine article...!\""
10048060-26 = "Indeed."
10048060-27 = "To think, we already have what the thief wants. She doesn't know it, but..."
10048060-31 = "...Wait, S-Sensei?!"
10048060-32 = "H-How long have you been here...?!"
10048060-33 = "[s] \"Fuyu wanted help, so I came over.\""
10048060-34 = "Schale's official name is \"Federal Investigation Club Schale.\""
10048060-35 = "And we find ourselves in the middle of an \"investigation\" of the Benevolent Thief..."
10048060-36 = "So, I thought we could use a little help! It's not like they aren't already all up in our business..."
10048060-37 = "[s] \"...Of course, I don't have additional info.\""
10048060-38 = "Ha."
10048060-39 = "So...you further implicated Sensei for no reason?"
10048060-40 = "But they brought cake! Grab a slice, Miyo. We have forks."
10048060-41 = "And...isn't cake with friends in the park enough of a \"reason\"?"
10048060-43 = "Yeah! It's REALLY good, Miyo!"
10048060-44 = "[s] \"It's even more delicious if you eat it in the cafe.\""
10048060-45 = "Come on, Miyo. A couple bites to celebrate. Sensei REALLY knows how to buy a dessert."
10048060-46 = "[s] \"All my knowledge comes from some brilliant students...\""
10048060-47 = "Wait. Sensei, how did you bring in outside food? You didn't catapult the cake, did you?"
10048060-48 = "I guess outside staff members are allowed to feed the inmates."
10048060-49 = "Inmates..."
10048060-50 = "This is a school, not a prison."
10048060-51 = "I find that VERY debatable."
10048060-52 = "And that's why I say we rope Sensei into our new premium food smuggling service! We can move cakes, souffles, lattes with whip—"
10048060-53 = "[s] \"Denied, Fuyu.\""
10048060-54 = "Aw."
10048060-58 = "[ns] \"Anyway, aren't we going off topic?\""
10048060-59 = "That's right. Miyo was talking about the Benevolent Thief."
10048060-60 = "Now, back to business."
10048060-61 = "The Benevolent Thief aims to take the same painting that we intend to ETHICALLY swap."
10048060-62 = "\"The Love of Purple and Blue Light\"... "
10048060-63 = "We want to exchange, while she wants to steal..."
10048060-64 = "This is getting messy..."
10048060-66 = "Hm?"
10048060-67 = "Actually, I find it rather simple."
10048060-68 = "Simple...?"
10048060-69 = "Our goal isn't to remove or retain the forgery, after all."
10048060-70 = "...It's to place the authentic painting in its rightful home.."
10048060-71 = "If the Benevolent Thief removes the fake from storage, then all we have to do is put the authentic painting in its place."
10048060-72 = "We would fulfill the conditions of the request and avoid holding on to any evidence."
10048060-73 = "...!"
10048060-74 = "...!"
10048060-75 = "We wouldn't even need to struggle to move the painting out of storage."
10048060-76 = "Conveniently, the Benevolent Thief will do all that for us."
10048060-77 = "And my research showed that the Thief doesn't put things back on the market. She steals things and keeps them."
10048060-78 = "...In other words, everyone can win here. She steals her painting, and the Veronica Company finally gets the actual work they paid so much for."
10048060-79 = "Even the cleanup is taken care of."
10048060-83 = "..."
10048060-84 = "I've been saying this for years, but you REALLY have a knack for crime, Miyo."
10048060-85 = "A backhanded compliment at best."
10048060-86 = "Huuu... I didn't major in Literature to write these kinds of stories..."
10048060-87 = "[s] \"Then what would you like to write about, Miyo?\""
10048060-88 = "W-Well..."
10048060-89 = "N-Now's not the time. We still need to—"
10048060-90 = "It's romance. Nothing to be ashamed of."
10048060-91 = "Miyo loved reading and critiquing romance novels so much that now she writes her own."
10048060-93 = "Waahhh! Will you shut your...?"
10048060-94 = "Y-Y-You're right, okay? But...please be quiet."
10048060-95 = "[s] \"Can I read your stuff?\""
10048060-96 = "I-I-I can't...No! No, it's not done."
10048060-97 = "...Much like this plan."
10048060-98 = "We only cracked one half of the calling card..."
10048060-99 = "Oh. Yeah, you're right."
10048060-100 = "There was more."
10048060-101 = "\"When the doors close and the rainbow blends, in that magical moment... I shall arrive.\""
10048060-102 = "Hm... I don't think I know..."
10048060-103 = "Great memory, Ritsu. If the first part tells us the target, maybe this piece gives us the time? Any...rainbow events on the agenda?"
10048060-104 = "That's a very astute question. I don't know."
10048060-110 = "Hm..."
10048060-111 = "Uh... Let's return to the dorm for now."
10048060-112 = "We don't want to be caught after curfew. I've talked to enough people today."
10048060-113 = "Yeah, twilight's setting in."
10048060-114 = "Sorry, Sensei. It seems like you just got here...and then watched us stare into space."
10048060-115 = "[s] \"No worries. I arrived late in the day, anyway.\""
10048060-116 = "The fun's not over yet, though... Sensei, how about I escort you to the ga—"
10048060-117 = "Wait! Fuyu, what did you just say?"
10048060-118 = "Huh? Uh...curfew? Escort?"
10048060-119 = "Not that."
10048060-120 = "Uh...twilight?"
10048060-122 = "Yes, that's it! Twilight!"
10048060-123 = "What about it...?"
10048060-124 = "Look at the sky. What color is it?"
10048060-125 = "Orange...?"
10048060-126 = "Really? It's not. Look again."
10048060-128 = "Sure, it's mainly orange, but that's not all."
10048060-129 = "The sky close to the sun is orange, but it's lavender in the distance, a purple..."
10048060-130 = "And the thin clouds are dusty white, while the thick ones are shadowed with a deep, ultramarine blue..."
10048060-131 = "At twilight, the colors of the rainbow mix together in a spectrum."
10048060-133 = "\"The rainbow blends, in that magical moment...\""
10048060-134 = "Yes. She said the time, right there! Twilight!"
10048060-135 = "Twilight...!"
10048060-136 = "Oh, I see it. You're onto something."
10048060-137 = "Twilight, right after sunset. We call that the \"magic hour.\""
10048060-138 = "Magic hour?"
10048060-139 = "Yes. It's also right before sunrise. The \"hour\" is when day and night blend."
10048060-140 = "It's a great time to take pictures. Shadows disappear in the diffused light. It's romantic, and flattering, and..."
10048060-141 = "...short. Much shorter than an hour. About 20 minutes tops."
10048060-142 = "The magic hour..."
10048060-143 = "Maybe that's why the thief said, \"that magical moment.\""
10048060-144 = "It seems like a flash of time when compared to a long day."
10048060-145 = "...But how did you know that, Fuyu?"
10048060-146 = "I major in Media Arts. We covered it in the Photography module."
10048060-147 = "Excellent catch."
10048060-148 = "Anyway, that means they are going to steal the painting as twilight settles..."
10048060-149 = "Sure. Except..."
10048060-150 = "?"
10048060-151 = "Technically, twilight happens twice a day. Once before sunrise, and once after sunset."
10048060-152 = "So, which one did she mean?"
10048060-153 = "Hmm..."
10048060-154 = "\"When the doors close and the rainbow blends, in that magical moment...\""
10048060-156 = "Hey, hey! Maybe it's at night?"
10048060-157 = "Hm?"
10048060-158 = "Because we say that \"doors close\" when the workday is done. Especially with curfew!"
10048060-160 = "And now we're...closing up shop! The Free Trade Cartel is all wrapped up for the day!"
10048060-162 = "...Wrapping up, closing doors."
10048060-163 = "And twilight, magic hour..."
10048060-164 = "[s] \"Then...you're done...?\""
10048060-165 = "Yes. The code is cracked."
10048060-166 = "Now, so we're all on the same page, we agree that the calling card says... "
10048060-167 = "...that someone is going to steal \"The Love of Purple and Blue Light\" at dusk, right?"
10048060-173 = "...Exactly. With this, I have the characters, the motivation, and the stakes."
10048060-174 = "The plot begs for a revision."
10048060-175 = "...!"
10048060-176 = "So, as a twist, we are now preparing for the Benevolent Thief's arrival."
10048060-177 = "...And we shall assist her in the theft."

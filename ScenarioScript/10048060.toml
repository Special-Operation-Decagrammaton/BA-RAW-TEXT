[translation]
10048060-1 = "第6話;情節修正"
10048060-3 = "好，我明白「堅硬的天空已現扭曲」這句話，指的是用青金石製成的群青顏料了。"
10048060-4 = "那「蝸牛在哭泣」呢？"
10048060-6 = "是紫色。"
10048060-7 = "紫色？"
10048060-8 = "製作紫色顏料最古典的方式，就是將大量的蝸牛碾碎，並對其汁液進行多種加工。"
10048060-9 = "所謂「蝸牛在哭泣」，應該就是對這個製作過程的隱喻吧。"
10048060-10 = "那「唯有王者展露微笑」這句話呢？"
10048060-11 = "藍色和紫色，自古以來就是只有王者才能擁有的顏色。"
10048060-12 = "原因正如我剛才所說，除了製作過程異常繁複之外，材料也相當昂貴。"
10048060-13 = "也就是說，這句話再次驗證了──#n「堅硬的天空已現扭曲」和「蝸牛在哭泣」分別代表藍色和紫色。"
10048060-14 = "這應該就是「唯有王者展露微笑」的含義。"
10048060-15 = "所以綜合來看，他盯上的目標就是主要使用藍色和紫色的畫作吧。"
10048060-16 = "沒錯，就是這樣。"
10048060-17 = "只要根據這個線索重新檢視圖錄裡的畫作，就能知道慈愛的怪盜鎖定了哪一幅畫……"
10048060-19 = "那個那個，不就在冬醬的包包裡嗎？"
10048060-20 = "嗯？我什麼都還沒偷啊？"
10048060-21 = "……啊。"
10048060-22 = "啊……！"
10048060-23 = "《誰會喜愛紫與藍》！"
10048060-24 = "就是那個！標題不就強調它用了紫色和藍色嗎！？"
10048060-25 = "[s]「而且真跡還在我們手上……！」"
10048060-26 = "就是說啊。"
10048060-27 = "沒想到怪盜鎖定的東西，竟然已經在我們手裡了……"
10048060-31 = "……老，老師！？"
10048060-32 = "你，你什麼時候來的……！？"
10048060-33 = "[s]「因為冬請我幫忙，所以不久前就過來了。」"
10048060-34 = "夏萊的正式名稱不是叫做「聯邦搜查部．夏萊」嗎？"
10048060-35 = "而我們的對手又是惡名昭彰的七罪人之一．慈愛的怪盜……"
10048060-36 = "既然老師是夏萊的人，搞不好會掌握一些情報……所以就請老師過來幫忙了！"
10048060-37 = "[s]「……雖然我也沒什麼能說的。」"
10048060-38 = "呵呵。"
10048060-39 = "什麼嘛，結果狀況還是一樣啊。"
10048060-40 = "不過老師買了蛋糕來給我們吃哦？"
10048060-41 = "這樣的變化……應該就足夠了吧。"
10048060-43 = "對呀！這個蛋糕真的很好吃耶！"
10048060-44 = "[s]「呵呵，直接到咖啡廳吃還會更美味唷？」"
10048060-45 = "你也吃吃看吧，美代。#n能感受到老師在甜點方面的深厚造詣哦。"
10048060-46 = "[s]「嚴格來說，應該是身邊有不少對甜點很有研究的學生才對……」"
10048060-47 = "等等，老師可以帶外食進來嗎？"
10048060-48 = "外部人士好像可以用「送餐」的名義帶進來的樣子。"
10048060-49 = "什麼送餐嘛……"
10048060-50 = "說得好像我們這裡不是學院，而是監獄一樣。"
10048060-51 = "其實也不算完全沒錯啦……"
10048060-52 = "總之基於這個原因，我構思了一個透過老師走私外部食物的新商業模式。#n要聽聽看嗎，美代？"
10048060-53 = "[s]「駁回，冬同學。」"
10048060-54 = "嗚咿……"
10048060-58 = "[ns]「話題是不是有點扯遠了？」"
10048060-59 = "哎呀，剛才正在聊慈愛的怪盜對吧。"
10048060-60 = "那麼就言歸正傳……"
10048060-61 = "現在已經可以確定，我們和怪盜都盯上了同一個展覽的同一幅畫。"
10048060-62 = "也就是《誰會喜愛紫與藍》……"
10048060-63 = "我們的目標是將這幅畫從收藏庫取出來，並換上真跡──#n而怪盜的目標則是將這幅畫給偷走……"
10048060-64 = "情況變得相當複雜了呢。"
10048060-66 = "嗯？"
10048060-67 = "不，我反而認為情況變得更加單純了。"
10048060-68 = "單純……？"
10048060-69 = "我們的目標並不是從收藏庫取出畫作。"
10048060-70 = "而是將我們手上的真跡放入那個位置。"
10048060-71 = "因此，我們只要在慈愛的怪盜將偽畫從收藏庫裡偷走之後，把真跡放回去就行了。"
10048060-72 = "這樣一來，我們就能完美達成委託的所有條件。"
10048060-73 = "……！"
10048060-74 = "……！"
10048060-75 = "除此之外，也不必大費周章地從收藏庫裡把偽畫運出來了。"
10048060-76 = "因為這件事，會由慈愛的怪盜替我們代勞。"
10048060-77 = "而且我還聽說，凡是被慈愛的怪盜偷走的東西，永遠不會再次出現在世人眼前。"
10048060-78 = "……所以只要怪盜成功完成偷竊，那幅偽畫就會從此消失，只留下真跡。"
10048060-79 = "連善後工作都處理得乾乾淨淨了。"
10048060-83 = "……"
10048060-84 = "我常常覺得，美代果然很有犯罪的天賦。"
10048060-85 = "可以不要把罵人的話說得像是在稱讚一樣嗎？"
10048060-86 = "嗚嗚……我明明不是為了寫這種故事才主修文學的……"
10048060-87 = "[s]「那美代想寫的是什麼樣的故事？」"
10048060-88 = "那……那個……"
10048060-89 = "那，那不是現在該討論的重點。#n而且我也還……"
10048060-90 = "是戀愛小說哦。"
10048060-91 = "美代他對戀愛小說很著迷，後來就開始自己創作了。"
10048060-93 = "哇啊啊啊啊！住口住口！"
10048060-94 = "雖，雖，雖然是這樣沒錯，但還是給我住口！"
10048060-95 = "[s]「美代寫的戀愛小說……真想讀讀看呢。」"
10048060-96 = "才，才，才不會給你看呢！"
10048060-97 = "而，而且現在事情還沒完全解決！"
10048060-98 = "就連預告信也才解讀了一半而已……"
10048060-99 = "這倒是沒錯。"
10048060-100 = "雖然成功解讀第一句很值得高興，不過還剩下第二句呢。"
10048060-101 = "「在門扉緊閉、虹色交錯的魔幻剎那，我將前去拜訪。」"
10048060-102 = "唔嗯……這是什麼意思呢？"
10048060-103 = "既然第一句預告的是目標物，第二句應該就是預告犯案時間了吧？"
10048060-104 = "這個推論還挺合理的……"
10048060-110 = "唔嗯……"
10048060-111 = "總之今天先回宿舍吧。"
10048060-112 = "過了門禁時間才回去會很麻煩的。"
10048060-113 = "說的也是。都已經黃昏了呢。"
10048060-114 = "真是不好意思，老師。#n才剛來沒多久又得回去了……"
10048060-115 = "[s]「不會不會，是我自己因為工作才晚到的。」"
10048060-116 = "那麼老師，我們走吧。#n我送你到正門……"
10048060-117 = "先等一下，冬。#n你剛才說什麼？"
10048060-118 = "嗯？剛才說的是……門禁？"
10048060-119 = "不是那個。"
10048060-120 = "那是……黃昏嗎？"
10048060-122 = "沒錯，就是那個！黃昏！"
10048060-123 = "什麼意思……？"
10048060-124 = "你抬頭看看天空。#n現在是什麼顏色？"
10048060-125 = "是橘色吧……？"
10048060-126 = "真的嗎？應該不是吧。#n你再仔細看一次。"
10048060-128 = "雖然橘色最為明顯，但實際上並非只有橘色。"
10048060-129 = "靠近太陽的天空是橘色，遠處則是淡淡的紫色……"
10048060-130 = "薄雲是混濁的白色，厚雲則是群青色……"
10048060-131 = "在黃昏時分，七彩斑斕的顏色將會交織在一起。"
10048060-133 = "「虹色交錯的魔幻剎那」……！"
10048060-134 = "沒錯。預告信中的第二句話，指的就是黃昏時分！"
10048060-135 = "黃昏……！"
10048060-136 = "啊，聽你這麼一說我也想起來了！"
10048060-137 = "黃昏時段也被稱作是[ruby=Magic Hour]「魔幻時刻」[/ruby]啊！"
10048060-138 = "魔幻時刻？"
10048060-139 = "嗯，就是白天和黑夜交替的那段魔法般的時間。"
10048060-140 = "在那個時段拍出來的照片會非常好看。#n除了光線量剛剛好之外，影子也會消失。"
10048060-141 = "只可惜魔幻時刻相當短暫……頂多也就20分鐘左右吧？"
10048060-142 = "魔幻時刻……"
10048060-143 = "所以才會用「魔幻剎那」來形容啊。"
10048060-144 = "跟漫長的一天相比，魔幻時刻只在一瞬之間。"
10048060-145 = "……不過冬為什麼會知道這種事呢？"
10048060-146 = "我是主修媒體藝術的嘛。#n多少瞭解一些攝影方面的知識。"
10048060-147 = "啊，原來如此。"
10048060-148 = "所以這就表示怪盜會在黃昏時段現身……"
10048060-149 = "還有一個問題。"
10048060-150 = "？"
10048060-151 = "嚴格來說，一天會有兩次黃昏時段。#n一次在日出之前，一次在日落之前。"
10048060-152 = "他會選擇在哪個時段來呢？"
10048060-153 = "唔嗯……"
10048060-154 = "「在門扉緊閉、虹色交錯的魔幻剎那……」"
10048060-156 = "那個那個，是不是在說他會在傍晚來啊？"
10048060-157 = "嗯？"
10048060-158 = "結束工作的時候，不是會用「關門」這個詞嗎？"
10048060-160 = "收工收工！特殊交易部今天關門打烊囉！"
10048060-162 = "……將一天的門關上的時間，也就是傍晚。"
10048060-163 = "再加上黃昏與魔幻時刻……"
10048060-164 = "[s]「這樣就全部解讀完了嗎……？」"
10048060-165 = "是的。所有謎團都解開了。"
10048060-166 = "那麼，總結一下慈愛的怪盜預告信的內容就是……"
10048060-167 = "他會在傍晚的黃昏時分，偷走《誰會喜愛紫與藍》對吧？"
10048060-173 = "……很好，這樣所有素材都備齊了。"
10048060-174 = "我立刻開始修改情節。"
10048060-175 = "……！"
10048060-176 = "在慈愛的怪盜現身的那一天……"
10048060-177 = "……我們將會全力支援怪盜的偷竊行動。"

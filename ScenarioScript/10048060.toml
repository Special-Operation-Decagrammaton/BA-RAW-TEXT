[translation]
10048060-1 = "ตอนที่ 6;ปรับแผน"
10048060-3 = "ประโยคที่บอกว่า 'ท้องฟ้าแข็งๆ กลับคลาย' หมายถึงสารสีอัลตรามารีนที่ทำมาจาก#nหินลาพิสลาซูลีนี่เอง"
10048060-4 = "ถ้างั้น 'เหล่าหอยทากร่ำร้องไห้' ล่ะหมายถึงอะไร?"
10048060-6 = "สีม่วงค่ะ"
10048060-7 = "สีม่วง?"
10048060-8 = "วิธีดั้งเดิมที่สุดในทำสารสีม่วงก็คือการบดหอยทากทะเลจำนวนมาก แล้วค่อยเอาน้ำที่ได้จากหอย#nมาแปรรูปด้วยวิธีการต่างๆ"
10048060-9 = "ฉันว่าเสียงร้องไห้ของหอยทากน่าจะเป็นการอุปมาอุปไมยเกี่ยวกับกระบวนการผลิตสารสีนี้ค่ะ"
10048060-10 = "แล้วท่อนที่บอกว่า 'เพียงราชานั้นไซร้ที่แย้มสรวล' ล่ะ?"
10048060-11 = "ในอดีต สีครามกับสีม่วงเป็นสีที่มีแต่ราชาเท่านั้นที่จะครอบครองได้ค่ะ"
10048060-12 = "อย่างที่ฉันบอกไปก่อนหน้านี้ว่ากระบวนการผลิตสีที่ว่านี้ซับซ้อนมาก แล้ววัตถุดิบก็มีราคาแพงมากด้วยค่ะ"
10048060-13 = "สรุปก็คือ 'ท้องฟ้าแข็งๆ กลับคลาย' กับ 'เหล่าหอยทากร่ำร้องไห้' เป็นข้อความที่หมายถึง#nสีครามกับสีม่วง..."
10048060-14 = "และนั่นก็เป็นสีที่พระราชาเท่านั้นที่ยิ้มได้ ความหมายต้องเป็นแบบนี้แน่นอนค่ะ"
10048060-15 = "งั้นก็พอตีความได้ว่า ผู้เขียนกำลังหมายตาภาพที่วาดด้วยสีครามและสีม่วงเป็นหลักสินะ"
10048060-16 = "ค่ะ อย่างนั้นเลยค่ะ"
10048060-17 = "เพราะงั้นถ้าดูจากสมุดภาพผลงานศิลปะที่จะจัดแสดงในงาน ก็จะรู้ได้ว่าจอมโจรแห่งความเสน่หา#nกำลังหมายตาภาพไหนอยู่..."
10048060-19 = "เดี๋ยวนะ เดี๋ยวน้า ภาพนั้นมันก็อยู่ในกระเป๋าของฟุยุจังไม่ใช่เหรอ?"
10048060-20 = "หืม? ฉันยังไม่ได้ขโมยภาพอะไรออกมาเลยนะ?"
10048060-21 = "อ่า..."
10048060-22 = "อ๊ะ...!"
10048060-23 = "<ใครเล่าจะหลงใหลสีม่วงกับสีคราม>!"
10048060-24 = "จริงด้วยค่ะ! แค่ชื่อภาพก็มีคำว่าสีม่วงกับสีครามแล้วนี่คะ?!"
10048060-25 = "[s] \"แล้วภาพของจริงก็ดันอยู่กับพวกเราด้วย...!\""
10048060-26 = "นั่นสินะคะ"
10048060-27 = "เหลือจะเชื่อเลย สิ่งที่จอมโจรต้องการอยู่ในมือของพวกเรางั้นเหรอ..."
10048060-31 = "ตะ... แต่เดี๋ยวนะ คะ... คุณครู?!"
10048060-32 = "มะ... มาอยู่ที่นี่ตั้งแต่เมื่อไรคะ?!"
10048060-33 = "[s] \"ฟุยุขอให้มาช่วย ครูเลยมาตั้งแต่เมื่อกี้แล้วน่ะ\""
10048060-34 = "ก็ชื่อเป็นทางการของชาเล่ต์คือ <ชมรมสืบสวนกลางชาเล่ต์> นี่นา"
10048060-35 = "แล้วคู่ต่อสู้ของเราก็คือจอมโจรแห่งความเสน่หาผู้เป็นหนึ่งในเจ็ดอาชญากรเลื่องชื่อเลยด้วย..."
10048060-36 = "เพราะงั้นคุณครูที่สังกัดชาเล่ต์ก็น่าจะรู้ข้อมูลบางอย่าง ฉันก็เลยขอร้องคุณครูให้มาช่วยน่ะ!"
10048060-37 = "[s] \"แต่ครูก็พูดอะไรไม่ได้มากหรอกนะ...\""
10048060-38 = "ฮุฮุ"
10048060-39 = "อะไรกัน สุดท้ายก็ไม่ได้อะไรเพิ่มนี่คะ"
10048060-40 = "แต่คุณครูซื้อเค้กมาให้พวกเรากินด้วยนะ"
10048060-41 = "ก็ยังถือว่า... ได้อะไรอยู่นะ"
10048060-43 = "ใช่! เค้กอร่อยมากเลยละ!"
10048060-44 = "[s] \"ฮุฮุ ถ้าได้ไปกินที่คาเฟ่ จะอร่อยมากกว่านี้อีกนะ\""
10048060-45 = "เธอก็ลองกินดูสิ มิโยะ แล้วจะรับรู้ได้ถึงความเชี่ยวชาญด้านของหวานของคุณครูเลยละ"
10048060-46 = "[s] \"รอบตัวครูมีนักเรียนที่เชี่ยวชาญด้านนี้หลายคนเลยนะ...\""
10048060-47 = "เดี๋ยวนะ ว่าแต่คุณครูได้รับอนุญาตให้เอาของต้องห้ามเข้ามาในโรงเรียนเหรอคะ?"
10048060-48 = "ได้ยินว่าคนนอกเอาเข้ามาได้ ถ้าบอกว่าเป็นอาหารเข้าเยี่ยมน่ะ"
10048060-49 = "อาหารเข้าเยี่ยม..."
10048060-50 = "ที่นี่ไม่ใช่โรงเรียน แต่เป็นเรือนจำงั้นเหรอ?"
10048060-51 = "จะว่าแบบนั้นก็ไม่ผิดหรอก..."
10048060-52 = "เอาเถอะๆ พอเป็นแบบนี้ฉันก็เลยไปคิดโมเดลธุรกิจใหม่ในการนำเข้าอาหารจากภายนอกผ่านคุณครูมา#nแล้วละนะ ลองฟังดูมั้ยล่ะ มิโยะ?"
10048060-53 = "[s] \"ครูไม่อนุมัตินะ ฟุยุ\""
10048060-54 = "อ้าว"
10048060-58 = "[ns] \"ว่าแต่ นี่เราเหมือนจะคุยออกทะเลกันไปหน่อยแล้วนะ\""
10048060-59 = "อ้อ จริงสิ เราคุยเรื่องจอมโจรแห่งความเสน่หากันอยู่นี่เนอะ"
10048060-60 = "งั้นก็กลับมาเข้าประเด็นต่อ..."
10048060-61 = "สรุปก็คือ พวกฉันกับจอมโจรต้องการภาพวาดเดียวกันในนิทรรศการเดียวกันสินะคะ"
10048060-62 = "<ใครเล่าจะหลงใหลสีม่วงกับสีคราม>... "
10048060-63 = "เป้าหมายของเราคือการนำภาพวาดนี้ออกจากโกดังแล้วเอาภาพจริงไปใส่แทนที่ ส่วนเป้าหมายของจอมโจรก็คือการขโมยภาพวาดนี้ไป..."
10048060-64 = "สถานการณ์ซับซ้อนขึ้นมาแล้วสินะคะ"
10048060-66 = "หืม?"
10048060-67 = "ไม่นะ ฉันว่ามันยิ่งทำให้เราทำงานง่ายขึ้นด้วยซ้ำค่ะ"
10048060-68 = "ง่ายขึ้นงั้นเหรอ...?"
10048060-69 = "เป้าหมายของเราไม่ใช่การเอาภาพนั้นออกมาจากโกดังหรอกค่ะ"
10048060-70 = "มันคือการเอาภาพของจริงไปใส่ไว้แทนต่างหาก"
10048060-71 = "ถ้าจอมโจรแห่งความเสน่หาขโมยภาพปลอมออกไปจากโกดังแล้วหนีไปได้ พวกเราก็แค่เอาภาพจริง#nที่มีไปวางแทนที่ก็จบค่ะ"
10048060-72 = "แบบนั้นก็จะบรรลุเป้าหมายทั้งหมดของลูกค้าค่ะ"
10048060-73 = "...!"
10048060-74 = "...!"
10048060-75 = "และถ้าเป็นแบบนี้ เราก็ไม่ต้องเปลืองแรงไปขโมยภาพปลอมออกมาจากโกดัง"
10048060-76 = "นั่นก็เพราะงานนั้นจอมโจรแห่งความเสน่หาจะทำให้ยังไงล่ะคะ"
10048060-77 = "นอกจากนี้ยังมีข่าวลือว่างานศิลปะที่จอมโจรแห่งความเสน่หาขโมยไปจะไม่ปรากฏต่อสายตาชาวโลก#nเลยด้วย"
10048060-78 = "นั่นก็หมายความว่า... ถ้าจอมโจรขโมยภาพปลอมนั้นสำเร็จ ภาพนั้นก็จะหายไปจากโลกนี้ตลอดกาล และจะเหลือไว้แค่ภาพจริงเท่านั้นค่ะ"
10048060-79 = "เท่ากับว่าเราไม่ต้องจัดการภาพปลอมนั้นต่อด้วย"
10048060-83 = "......"
10048060-84 = "ฉันรู้สึกมาตลอดเลยละ มิโยะ เธอนี่มีพรสวรรค์ในการก่ออาชญากรรมจริงๆ เลย"
10048060-85 = "อย่าเอาคำติมาชมกันสิคะ"
10048060-86 = "ฮืออ... ฉันไม่ได้เข้าเอกวรรณกรรมเพื่อจะเขียนเรื่องราวแบบนี้แท้ๆ..."
10048060-87 = "[s] \"งั้นมิโยะอยากเขียนเรื่องราวแบบไหนเหรอ?\""
10048060-88 = "ระ... เรื่องนั้น..."
10048060-89 = "มะ... มันไม่ใช่เรื่องสำคัญในตอนนี้หรอกค่ะ แล้วฉันก็ยัง..."
10048060-90 = "เรื่องรักโรแมนติกค่ะ"
10048060-91 = "มิโยะชอบอ่านนิยายโรแมนติกมากจนหันมาเขียนนิยายเองน่ะค่ะ"
10048060-93 = "อ๊ายยยย! เงียบไปเลยนะ!"
10048060-94 = "มะ... มันก็จริงอยู่หรอก! แต่ก็เงียบไปเลย!"
10048060-95 = "[s] \"ครูอยากอ่านนิยายโรแมนติกของมิโยะจัง\""
10048060-96 = "ฉะ... ฉะ... ฉันไม่ให้คุณครูอ่านหรอกค่ะ!"
10048060-97 = "ละ... แล้วตอนนี้เราก็ยังเตรียมงานกันไม่เสร็จเลยด้วย!"
10048060-98 = "ฉันยังตีความจดหมายเตือนครึ่งหลังไม่ได้เลยค่ะ..."
10048060-99 = "นั่นสินะ"
10048060-100 = "พวกเราดีใจที่ตีความครึ่งแรกของจดหมายได้ แต่ยังเหลือครึ่งหลังอีกนี่นา"
10048060-101 = "\"ยามประตูถูกปิดลง ชั่วขณะแห่งมนตราที่หมู่มวลสายรุ้งหลอมรวม เมื่อนั้นฉันจะไปพบทุกคน…\""
10048060-102 = "อืม... หมายความว่ายังไงนะ?"
10048060-103 = "ถ้าครึ่งแรกของจดหมายเป็นการบอกใบ้ถึงเป้าหมายละก็ งั้นครึ่งหลังก็น่าจะบอกเวลาที่ใช้ก่อเหตุนะ?"
10048060-104 = "ก็เป็นการอนุมานที่สมเหตุสมผลดีนะ..."
10048060-110 = "อืม..."
10048060-111 = "เอาเป็นว่าวันนี้เรากลับหอพักกันก่อนเถอะค่ะ"
10048060-112 = "ถ้าเลยเวลาเคอร์ฟิวไป มีหวังพวกเรางานเข้าแน่"
10048060-113 = "นั่นสินะ ถึงยามอัสดงตั้งแต่เมื่อไรเนี่ย"
10048060-114 = "ขอโทษนะคะคุณครู คุณครูมาถึงไม่ทันไร พวกฉันก็ต้องขอให้กลับก่อนแล้ว"
10048060-115 = "[s] \"ไม่หรอก ครูมาช้าเพราะติดงานเองต่างหาก\""
10048060-116 = "มากับฉันสิคะคุณครู ฉันจะเดินไปส่งถึงประตูหน้าเองค่ะ"
10048060-117 = "เดี๋ยวนะ ฟุยุ เมื่อกี้พูดว่าอะไรนะคะ?"
10048060-118 = "หืม? อืม... เคอร์ฟิวเหรอ?"
10048060-119 = "ไม่ใช่ค่ะ"
10048060-120 = "อ้อ... ยามอัสดง?"
10048060-122 = "ใช่ค่ะ นั่นละค่ะ! ยามอัสดง!"
10048060-123 = "หมายความว่ายังไงเหรอ...?"
10048060-124 = "ลองเงยหน้าดูท้องฟ้าสิคะ เห็นเป็นสีอะไรคะ?"
10048060-125 = "สีส้มไงล่ะ...?"
10048060-126 = "จริงเหรอคะ? ไม่ใช่สักหน่อย ลองดูอีกครั้งสิคะ"
10048060-128 = "ถึงจะเห็นสีส้มเกือบทั้งผืนฟ้า แต่ก็ไม่ได้มีแค่สีส้มสีเดียวหรอกค่ะ"
10048060-129 = "ท้องฟ้าส่วนที่อยู่ใกล้ดวงอาทิตย์เป็นสีส้มก็จริง แต่ส่วนที่อยู่ไกลออกไปจะเป็นสีม่วงอ่อน..."
10048060-130 = "เมฆบางๆ เป็นสีขาวขุ่น ส่วนเมฆก้อนหนาเป็นสีคราม..."
10048060-131 = "ในยามอัสดง ท้องฟ้าจะมีหลากหลายสีสันเหมือนสายรุ้งเลยค่ะ"
10048060-133 = "\"ยามประตูถูกปิดลง ชั่วขณะแห่งมนตราที่หมู่มวลสายรุ้งหลอมรวม\""
10048060-134 = "ใช่ค่ะ ครึ่งหลังของจดหมายเตือนหมายถึงยามอัสดงนี่เอง!"
10048060-135 = "ยามอัสดง...!"
10048060-136 = "อ่า จะว่าไปฉันก็นึกออกขึ้นมา!"
10048060-137 = "ยามอัสดงเรียกอีกอย่างว่า 'เมจิคเอาเออร์' ด้วยนะ!"
10048060-138 = "เมจิคเอาเออร์?"
10048060-139 = "อื้อ เป็นช่วงเวลามหัศจรรย์ที่กลางวันกับกลางคืนมาบรรจบกันน่ะ"
10048060-140 = "นอกจากนี้ภาพที่ถ่ายในเวลานั้นยังออกมาสวยมากๆ เลยละ ปริมาณแสงกำลังดี แล้วเงาก็ไม่มีด้วย"
10048060-141 = "แต่ปัญหาก็คือ เมจิคเอาเออร์ที่ว่ามันค่อนข้างสั้น น่าจะไม่เกิน 20 นาทีด้วยมั้ง?"
10048060-142 = "เมจิคเอาเออร์..."
10048060-143 = "ในจดหมายก็เลยใช้คำว่า 'ชั่วขณะแห่งมนตรา' สินะคะ"
10048060-144 = "นั่นก็เพราะเมื่อเทียบกับเวลาทั้งวันแล้ว เมจิคเอาเออร์เป็นแค่ช่วงเวลาสั้นๆ เท่านั้น"
10048060-145 = "ว่าแต่... ฟุยุรู้เรื่องนี้ได้ยังไงคะ?"
10048060-146 = "ก็ฉันอยู่เอกมีเดียอาร์ตนี่นา ฉันก็ต้องมีความรู้พื้นฐานเกี่ยวกับการถ่ายภาพบ้างสิ"
10048060-147 = "อ๊ะ จริงด้วยสินะคะ"
10048060-148 = "งั้นก็สรุปว่าจอมโจรบอกใบ้ว่าจะมาขโมยภาพไปในยามอัสดง..."
10048060-149 = "แต่ก็มีปัญหาอยู่อย่างหนึ่งนะ"
10048060-150 = "?"
10048060-151 = "ถ้าพูดถึงยามอัสดง ในวันหนึ่งมันมี 2 ครั้งน่ะสิ ตอนก่อนพระอาทิตย์ขึ้น 1 ครั้ง แล้วก็ก่อนพระอาทิตย์ตกอีกครั้ง"
10048060-152 = "หมายความว่าจะมาขโมยภาพไม่เวลาใดก็เวลาหนึ่งหรือเปล่านะ?"
10048060-153 = "อืม..."
10048060-154 = "\"ยามประตูถูกปิดลง ชั่วขณะแห่งมนตราที่หมู่มวลสายรุ้งหลอมรวม...\""
10048060-156 = "เดี๋ยวนะ เดี๋ยวน้า งั้นก็แปลว่าจะมาตอนตกเย็นไปแล้วหรือเปล่า?"
10048060-157 = "หืม?"
10048060-158 = "ก็ปกติเวลาเสร็จงาน เราจะพูดว่า 'ปิดประตู' ไม่ใช่เหรอ?"
10048060-160 = "งานเสร็จหมดแล้ว! วันนี้ขอปิดประตูชมรมการค้าพิเศษเพียงเท่านี้ค่ะ!"
10048060-162 = "เวลาที่เราปิดประตูของวัน ก็คือตอนเย็น ช่วงที่พระอาทิตย์ตกนี่ละ"
10048060-163 = "ยามอัสดง... เมจิคเอาเออร์..."
10048060-164 = "[s] \"งั้นก็ตีความได้แล้วน่ะสิ...?\""
10048060-165 = "ใช่ค่ะ เราไขปริศนาทั้งหมดได้แล้ว"
10048060-166 = "งั้นก็สรุปเนื้อหาในจดหมายเตือนของจอมโจรแห่งความเสน่หาได้ว่า... "
10048060-167 = "\"ฉันจะมาขโมยภาพ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> ไปในช่วงพระอาทิตย์ตกดิน\"... สินะคะ?"
10048060-173 = "ดีละ... งั้นเราก็มีข้อมูลครบแล้ว"
10048060-174 = "ฉันจะแก้พล็อต ปรับแผนให้ใหม่เดี๋ยวนี้เลยค่ะ"
10048060-175 = "...!"
10048060-176 = "วันที่จอมโจรแห่งความเสน่หาปรากฏตัว พวกเราจะ..."
10048060-177 = "ทำทุกวิถีทางเพื่อสนับสนุนการขโมยของจอมโจรค่ะ"

[translation]
80000098-1 = "หนังสือคำท้าวันวาเลนไทน์"
80000098-3 = "...! อ๊ะ! คุณครูละ!!!"
80000098-4 = "[ns1] \"...! อ๊ะ เสียงนี่มัน...!!\"\n[ns2] ค่อยๆ ตั้งท่าป้องกันตัวอย่างระมัดระวัง"
80000098-12 = "ย้าาาา~!!"
80000098-20 = "(ไม่นานนักเรอิสะก็พุ่มเข้ามาปะทะกับคุณครูเต็มแรง แต่เนื่องจากเป็นเรื่องที่เกิดขึ้นบ่อย คุณครูก็เลย#nรับมือได้อย่างชำนาญ)"
80000098-22 = "มาแล้วเหรอคะคุณครู! ฉันกำลังรออยู่เลยค่ะ!"
80000098-23 = "คุณครูคงรู้อยู่แล้วใช่ไหมคะว่าวันนี้เป็นวันพิเศษ! วันมอบช็อกโกแลตให้กับคุณครู... วันแห่งการตอบแทน!!"
80000098-24 = "แต่ฉันก็ทราบดีค่ะว่าวันนี้คุณครูคงจะยุ่งมากๆ คงไม่ได้มีแค่ฉันคนเดียวที่อยากเจอคุณครูแน่ๆ ค่ะ!"
80000098-25 = "เพราะงั้นก็ขอรวบรัดเลย เพื่อไม่ให้คุณครูเสียเวลาจนเกินไป!"
80000098-26 = "ธุระในวันนี้ก็คือนี่ค่ะ...!!"
80000098-31 = "[ns3] \"หนังสือคำท้า? เดี๋ยวสิ ไม่เหมือนที่คิดเลย!\"\n[ns4] \"ช็อกโกแลต... ใช่ไหม?\""
80000098-34 = "ฮุ...ฮุ...ฮุ...ฮุ~! ตามนั้นแหละค่ะ! ช็อกโกแลตรูปทรงหนังสือคำท้าค่ะ!"
80000098-35 = "ถึงมันจะดูเหมือนช็อกโกแลตธรรมดาๆ ที่เอามาห่อใหม่อย่างง่ายๆ ก็เถอะ..."
80000098-36 = "ตะ... แต่ว่าหนังสือคำท้า..."
80000098-41 = "[ns5] \"เอ๋ มีอะไรเขียนไว้ยาวเหยียดเลย...\"\n[ns6] \"มันดูเหมือนจดหมายมากกว่าหนังสือคำท้านะ...\""
80000098-44 = "...!!"
80000098-45 = "วะ... ว้ากกกก~!!"
80000098-46 = "มะ... ไม่ได้นะคะ!! หยุดเดี๋ยวนี้เลยคุณครู!! มาเปิดดูตอนนี้ได้ยังไงเล่า!!"
80000098-47 = "คะ... คะ!? ปกติได้หนังสือคำท้ามาแล้วก็ต้องเปิดอ่านเลยงั้นเหรอคะ? ระ... เรื่องนั้น มันก็จริงอยู่หรอกค่ะ  ตะ... แต่ถึงจะเป็นอย่างนั้นก็เถอะ...!!"
80000098-48 = "ยะ...ยังไงก็ไม่ได้ค่ะ! ตอนนี้ไม่ได้ค่ะ!! รอกลับไปเปิดอ่านที่ชาเล่ต์นะคะ!! ต้องกลับไปเปิดที่ชาเล่ต์นะคะ!!"
80000098-49 = "ฮืออออ..."
80000098-50 = "พะ... พอนึกดูแล้ว มันก็..."
80000098-51 = "พอมาคิดดูดีๆ แล้วก็แอบรู้สึกว่าช็อกโกแลตของคนอื่นๆ ที่เตรียมมาอย่างพิถีพิถันน่าจะดีกว่า#nช็อกโกแลตของฉัน..."
80000098-52 = "สุดท้ายแล้วช็อกโกแลตของฉันก็เป็นแค่ช็อกโกแลตธรรมดาๆ ที่มีตัวหนังสือไม่กี่ตัวเขียนแปะไว้เท่านั้น#nเองค่ะ"
80000098-53 = "แต่ว่าฉันก็ไม่มีฝีมือที่จะทำอะไรแบบนั้น แล้วก็ไม่มีความรู้เรื่องช็อกโกแลตเลย..."
80000098-57 = "ขอโทษนะคะ... ฉันรู้สึกเหมือนทำให้คุณครูเสียเวลาเปล่าเลยค่ะ"
80000098-58 = "คะ...?"
80000098-59 = "ไม่ใช่อย่างนั้นเลยเหรอคะ? แถมยังรู้สึกว่าโชคดีที่มาด้วยงั้นเหรอคะ? ทะ...ทำไมล่ะคะ...?"
80000098-60 = "[s7] \"เรอิสะอุตส่าห์รวบรวมความกล้ามาเลยนี่นา\"\n[s8] \"เรอิสะอุตส่าห์มาหาแบบนี้เลยนี่นา\""
80000098-63 = "...!"
80000098-64 = "ฮี่ๆ..."
80000098-65 = "...ฮิฮิ..."
80000098-67 = "(คุณครูกับเรอิสะแบ่งช็อกโกแลตกินด้วยกันก่อนจะกลับไปอ่าน 'หนังสือคำท้า' ของเรอิสะที่ชาเล่ต์)"
80000098-68 = "(เป็นหนังสือคำท้าที่เขียนด้วยปากกาไฮไลต์หลากสีและติดสติกเกอร์ไว้ได้อย่างน่ารักที่สุดในโลก)"

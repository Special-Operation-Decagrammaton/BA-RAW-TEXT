[translation]
80000098-1 = "情人節挑戰書"
80000098-3 = "……！啊！是老師！！"
80000098-4 = "[ns1]「……！這個聲音是……！！」\n[ns2] 冷靜地擺出防衛姿勢"
80000098-12 = "咿啊啊啊啊啊～！！"
80000098-20 = "（隨後澪紗便使出了猛烈的突擊，但因為已經習以為常，所以熟練地擋下了）"
80000098-22 = "你來啦，老師！我正在等你哦！"
80000098-23 = "老師應該知道吧？#n今天是要送巧克力給老師，報答你的特別的日子！！"
80000098-24 = "但是我也知道，老師一定會很忙。#n畢竟想見到老師的，肯定不止我一個人！"
80000098-25 = "所以我決定長話短說！以免佔用老師太多時間！"
80000098-26 = "今天的重點……就是這個！！"
80000098-31 = "[ns3]「挑戰書？不，不對！」\n[ns4]「這是……巧克力對吧？」"
80000098-34 = "哼，哼，哼～！沒錯！這是長得像挑戰書的巧克力！"
80000098-35 = "雖然其實只是在普通的巧克力外面，做了一點包裝而已……"
80000098-36 = "不，不過還是挑戰書……"
80000098-41 = "[ns5]「哎呀，內容還蠻長的耶……」\n[ns6]「與其說是挑戰書……好像更像是一封信……」"
80000098-44 = "……！！"
80000098-45 = "哇啊啊啊啊啊啊！！！"
80000098-46 = "不，不可以！！老師，STOP！！怎麼可以現在就看啦！！"
80000098-47 = "咦！？你說挑戰書不是就應該在收到的當下馬上看？#n這，這麼說……也沒錯啦……！！"
80000098-48 = "總，總之就是不行！現在不能看！！#n請你回到夏萊再打開！！一定要記得哦！！"
80000098-49 = "嗚，嗚嗚……"
80000098-50 = "這，這麼一說果然有點……"
80000098-51 = "仔細想想，其他人送的那些，做的比我更用心的巧克力果然還是比較好吧……"
80000098-52 = "我送的這個，只不過是普通的巧克力加上一些字而已。"
80000098-53 = "但是我沒有製作這種東西的手藝，也不是很懂巧克力……"
80000098-57 = "……對不起。#n我好像還是浪費到老師的時間了。"
80000098-58 = "……嗯？"
80000098-59 = "沒有那種事？你反而覺得很高興？#n為，為什麼……？"
80000098-60 = "[s7]「因為即便如此，澪紗也鼓起了勇氣呀。」\n[s8]「因為即使如此，澪紗還是願意約我出來。」"
80000098-63 = "……！"
80000098-64 = "……嘿……"
80000098-65 = "……嘿嘿。"
80000098-67 = "（隨後兩人一起分食了巧克力，並在回到夏萊後閱讀了澪紗的「挑戰書」）"
80000098-68 = "（那是張充滿貼紙和螢光筆跡，世界上最可愛的挑戰書）"

[translation]
80000098-1 = "Valentine Challenge"
80000098-3 = "Ah! There you are, Sensei!!"
80000098-4 = "[ns1] \"I know that sound!!\"\n[ns2] Calmly take defensive stance."
80000098-12 = "Hyaaaaaaap!!"
80000098-20 = "Reisa tackled me. But this routine had become so common, I could catch her easily."
80000098-22 = "You're finally here, Sensei! I was waiting for you!"
80000098-23 = "I bet you knew already, right? Today's a special day! It's the day I pay you back in chocolate!!"
80000098-24 = "Of course, since it's a special day, I know you'll be very busy. Plus I've got plenty of chocolate charity competition trying to meet up with you too!"
80000098-25 = "So, let's hurry this along! I don't want to take up too much of your time!"
80000098-26 = "Today's business is...this!!"
80000098-31 = "[ns3] \"A challenge notice? Wait, something's different!\"\n[ns4] \"This is...chocolate, right?\""
80000098-34 = "Hee-hee-hee-hee! Like you said! It's a chocolate challenge notice!"
80000098-35 = "Of course, it's really just a wrapper on top of a normal chocolate bar..."
80000098-36 = "B-But still, a challenge notice is..."
80000098-41 = "[ns5] \"Huh. It's actually pretty long.\"\n[ns6] \"This seems less like a challenge letter and more like a letter...\""
80000098-44 = "...!!"
80000098-45 = "Waaaaahhh!!"
80000098-46 = "N-No! Sensei, stop! You mustn't read that here!!"
80000098-47 = "H-Huh? I know challenge notices are supposed to be read on the spot! E-Even so..."
80000098-48 = "D-Don't! Not right now!! Go back to Schale and read it there, okay?!"
80000098-49 = "U-Ugh..."
80000098-50 = "N-Now that I think about it..."
80000098-51 = "I'm sure that those other chocolate givers made theirs with a lot more thought and care."
80000098-52 = "They probably taste better too. After all, mine is just regular chocolate with some words on top."
80000098-53 = "I'm not very skilled when it comes to making things. I don't know much about chocolate either."
80000098-57 = "...I'm sorry. Now my rambling's eating up all your precious time."
80000098-58 = "...Hm?"
80000098-59 = "What?! You liked it? H-How?!"
80000098-60 = "[s7] \"You can't be brave unless you're afraid.\"\n[s8] \"Despite your fears, you still gave me your gift.\""
80000098-63 = "*gasp*"
80000098-64 = "Heh..."
80000098-65 = "...Heehee."
80000098-67 = "We shared the chocolate, then I read Reisa's challenge notice after I returned to Schale."
80000098-68 = "It was the world's cutest challenge notice, covered in stickers, and written with a highlighter."

[translation]
1300206-1 = "#title;미식가의 긍지"
1300206-2 = "#place;게헨나 학원 근교의 중식당"
1300206-3 = "#na;게헨나 학원에서의 업무를 마치고 돌아오는 길에 들린 중식당에서 우연히 아카리와 마주쳤다."
1300206-4 = "3;아카리;02;어라, 선생님. 우연이네요. 점심 식사를 하러 오셨나요?\n#3;a\n#3;em;[반응]"
1300206-5 = "3;아카리;01;네, 저도 점심을 먹으러 왔어요. 이 가게에는 마파두부를 마음껏 먹을 수 있는 대식 챌린지 메뉴가 있거든요. \n#3;greeting"
1300206-6 = "3;아카리;05;선생님도 괜찮으시다면 저와 함께 마파두부 대식 챌린지에 도전하지 않으시겠어요?"
1300206-7 = "3;아카리;04;네? 선생님은 일반 마파두부면 충분하시다고요? #n마파두부를 산처럼 쌓아 두고 먹으면 분명 즐거울 텐데…….\n#3;em;[?]\n#3;stiff"
1300206-8 = "3;아카리;01;내키지 않으신다면 하는 수 없지요. 그럼 슬슬 주문을 할까요."
1300206-9 = "3;아카리;02;여기 일반 마파두부 하나랑 대식가용 마파두부 하나 주세요.\n#3;jump\n#3;em;[반응]"
1300206-10 = "1;중식당 점원;02;대식가용 마파두부를 주문하신 분은 이 쪽의 어른 손님이신가요?\n#1;ar\n#3;m5"
1300206-11 = "3;아카리;01;아뇨, 제가 주문했어요. #n이래 봬도 대식 챌린지라면 자신 있거든요!\n#3;em;[반짝]\n#3;greeting"
1300206-12 = "1;중식당 점원;03;후후, 아무리 잘 드신다 하더라도 저희 가게의 마파두부는 어려우실 텐데…….\n#1;em;…"
1300206-13 = "1;중식당 점원;08;잠시만 기다려주세요. 곧 음식을 가져다 드리겠습니다.\n#1;greeting"
1300206-14 = "#1;dl\n#wait;1000"
1300206-15 = "3;아카리;04;(어쩐지 점원의 표정이 이상한데…… 기분 탓일까요?)\n#3;m3"
1300206-16 = "#all;hide"
1300206-17 = "3;중식당 점원;03;오래 기다리셨습니다. 주문하신 일반 마파두부와 대식가용 마파두부입니다.\n#3;greeting\n#3;em;[반짝]\n#3;a"
1300206-18 = "3;중식당 점원;08;30분 이내로 여기 10인분의 마파두부를 모두 드시면 무료. 30분 이내라면 마파두부를 무제한으로 드시는 것도 가능합니다."
1300206-19 = "3;중식당 점원;08;……그럼 부디 천천히 즐겨주시길."
1300206-20 = "3;아카리;01;후아…… 벌써부터 매운 냄새가 코를 찌르네요. #n보기만 해도 맛있을 것 같아요!\n#3;a"
1300206-21 = "3;아카리;03;그럼, 잘 먹겠습니다!\n#3;greeting\n#3;em;[반짝]"
1300206-22 = "[s] \"잘 먹겠습니다.\""
1300206-23 = "3;아카리;01\n#3;closeup"
1300206-24 = "3;아카리;04;……으응? 이상하네요. 이 가게의 마파두부는 분명 이런 맛이 아니었는데…….\n#3;closeup\n#3;em;…"
1300206-25 = "3;아카리;01;선생님. 잠깐 선생님이 받은 일반 마파두부를 한 입 먹어볼 수 있을까요?\n#3;closeup"
1300206-26 = "[s] 일반 마파두부를 나누어준다."
1300206-27 = "3;아카리;99;(우물우물) ……과연, 그렇군요. #n이런 얕은 수를 쓰는 가게가 아직도 있다니. 조금 실망스럽네요.\n#3;closeup\n#3;greeting\n#3;em;[반응]"
1300206-28 = "[s] \"마파두부에 무슨 문제라도 있어?\""
1300206-29 = "3;아카리;02;두 마파두부의 맛을 비교해보니 제가 주문한 대식가용 마파두부에는 매운 소스가 필요 이상으로 잔뜩 뿌려져 있는 것 같아요. ……분명 대식 챌린지를 방해하려는 수작이겠죠.\n#3;closeup"
1300206-30 = "3;아카리;05;제가 무엇이든 잘 먹다 보니 다들 종종 잊곤 하지만, 저 역시 미식연구회의 일원. 음식의 맛에는 제법 엄격하답니다.\n#3;closeup"
1300206-31 = "3;아카리;99;아무리 음식을 산더미처럼 대접하는 대식 챌린지라 하더라도 음식의 맛에는 지켜야 할 선이 있다고요. 그리고 이 음식은…… 선을 넘었어요.\n#3;closeup"
1300206-32 = "3;아카리;06;돈 몇 푼 때문에 음식에 나쁜 장난을 치려는 사람들에게는…… 그 대가를 똑똑히 보여주어야겠지요?\n#3;closeup\n#3;em;…"
1300206-33 = "#all;hide"
1300206-34 = "3;아카리;03;……잘 먹었습니다! #n그리고 여기 마파두부 한 그릇 더 부탁드릴게요.\n#3;greeting\n#3;em;[반짝]"
1300206-35 = "3;중식당 점원;04;(마, 말도 안 돼. 시작한 지 10분도 지나지 않았는데 벌써 세번째 접시를 다 먹었다고?)\n#3;em;[땀]"
1300206-36 = "3;중식당 점원;07;(그 접시 하나에는 마파두부가 10인분이나 담겨 있었다고!)\n#3;stiff"
1300206-37 = "3;아카리;01;저기요— 듣고 계신가요? #n여기 대식가용 마파두부 한 그릇 더 부탁드릴게요!\n#3;em;[반응]"
1300206-38 = "1;중식당 점원;04;저, 저, 손님…… 이미 목표로 한 마파두부 10인분 먹기는 달성하셨으니…… 이쯤에서 그만두시는 게 어떨까요?\n#1;ar\n#3;m5"
1300206-39 = "3;아카리;05;네? 그게 무슨 말씀이신가요? 분명히 아까 <도전자는 30분 동안 대식가용 마파두부를 무제한으로 먹을 수 있다>고 말씀하셨잖아요?\n#3;em;[?]"
1300206-40 = "3;아카리;99;무릇 대식 챌린지라면 처음에 정한 규칙을 엄격하게 지켜야 서로에게 공평하지 않겠어요?"
1300206-41 = "3;아카리;06;대식가용 마파두부에 입에도 대지도 못할 매운 소스가 잔뜩 뿌려져 있는데도 제가 항의하지 않는 것처럼 말이죠. 후후…….\n#3;em;…"
1300206-42 = "1;중식당 점원;07;죄, 죄송합니다! 두 분의 음식값은 받지 않을테니…… 제발 이쯤에서 용서해주세요!\n#1;em;[!]\n#1;stiff"
1300206-43 = "3;아카리;05;안 돼요~ 저는 이 가게에 마파두부를 잔뜩 먹으러 왔지, 사장님의 사과가 듣고 싶어서 온 게 아니라고요."
1300206-44 = "3;아카리;05\n#3;h\n#1;dl\n#3;m3\n#wait;1500"
1300206-45 = "3;아카리;03;자, 그러니까 빨리 다음 접시를 주세요!\n#3;em;[!]\n#3;closeup"
1300206-46 = "#all;hide"
1300206-47 = "#na;이후, 아카리는 기존 신기록을 갱신하여 30분 만에 60인분의 마파두부를 먹어치웠다……."

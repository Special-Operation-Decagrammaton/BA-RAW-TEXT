[translation]
1300206-1 = "ศักดิ์ศรีของนักชิม"
1300206-2 = "ร้านอาหารจีนใกล้สถาบันเกเฮนน่า"
1300206-3 = "คุณครูแวะไปที่ร้านอาหารจีนหลังกลับจากทำงานที่สถาบันเกเฮนน่า#nระหว่างอยู่ที่นั่นก็ได้พบกับอาคาริ"
1300206-4 = "เอ๋ คุณครูนี่เอง บังเอิญจังเลยค่ะ คุณครูมารับประทานอาหารกลางวันเหรอคะ?"
1300206-5 = "ดีเลยค่ะ ฉันก็เหมือนกันเลย ที่นี่มี \"การท้าทายนักชิม\" พิเศษที่เราสามารถกินผัดเต้าหู้พริกเสฉวน#nเท่าไหร่ก็ได้ตามที่ต้องการอยู่ด้วยค่ะ"
1300206-6 = "ถ้าคุณครูไม่ว่าอะไร อยากจะลองท้าท้ายกินผัดเต้าหู้กับฉันไหมคะ?"
1300206-7 = "เอ๋? คุณครูต้องการสั่งแค่ผัดเต้าหู้ขนาดปกติเหรอคะ?#nแต่การได้กินผัดเต้าหู้เยอะๆ มันฟินสุดๆ ไปเลยนะคะ..."
1300206-8 = "ถ้าคุณครูไม่สมัครใจก็คงทำอะไรไม่ได้อยู่ดีค่ะ ถ้างั้นเราสั่งกันเลยไหมคะ?"
1300206-9 = "ขอสั่งผัดเต้าหู้แบบธรรมดาและผัดเต้าหู้สำหรับนักชิมหน่อยค่า"
1300206-10 = "ผัดเต้าหู้สำหรับนักชิมนี่สำหรับผู้ใหญ่ที่มาใช่หรือเปล่าครับ?"
1300206-11 = "ไม่ใช่ค่ะ ของฉันค่ะ#nฉันอาจจะดูไม่เหมือนแบบนั้น แต่ถ้าเป็นเรื่องท้ากินแล้วไม่มีหวั่นค่ะ!"
1300206-12 = "ฮ่าฮ่า การท้ากินผัดเต้าหูของเราเนี่ยไม่ใช่ง่ายๆ นะครับ ไม่ว่าปกติแล้วจะกินมากแค่ไหนก็ตาม..."
1300206-13 = "ช่วยรอก่อนสักครู่นะครับ เดี๋ยวอาหารจะมาเสิร์ฟในเร็วๆ นี้ครับ"
1300206-15 = "(ไม่รู้คิดไปเองรึเปล่านะ...แต่ทำไมพนักงานที่นี่ทำสีหน้าแปลกจัง?)"
1300206-17 = "ขอบคุณที่รอนะครับ ผัดเต้าหู้แบบธรรมดาและผัดเต้าหู้สำหรับนักชิมตามที่สั่งไว้มาแล้วครับ"
1300206-18 = "ถ้ากินผัดเต้าหู้สิบจานนี้หมดได้ภายใน 30 นาที เราจะไม่คิดเงิน ถ้าหากกินหมดได้ก่อนที่เวลา#nจะหมดลง ก็จะกินเพิ่มได้อีกด้วยนะครับ เรียกว่ากินได้ไม่จำกัดเลยล่ะครับ!"
1300206-19 = "...ขอให้กินได้อย่างเอร็ดอร่อยนะครับ"
1300206-20 = "ว้าว...ฉันได้กลิ่นความเผ็ดแล้วล่ะค่ะ#nแค่เห็นก็รู้แล้วว่ามันต้องอร่อยแน่ๆ!"
1300206-21 = "เอาละ ถ้างั้นก็จะกินล่ะนะคะ!"
1300206-22 = "[s] \"ขอบคุณสำหรับอาหาร\""
1300206-24 = "...หืม? แปลกจัง ผัดเต้าหู้นี่รสชาติไม่เหมือนกับที่ฉันเคยกินเลยนี่นา..."
1300206-25 = "คุณครูคะ จะว่าอะไรไหมคะถ้าฉันขอชิมผัดเต้าหู้ของคุณครูสักคำ?"
1300206-26 = "[s] (แบ่งผัดเต้าหู้แบบธรรมดาให้)"
1300206-27 = "(ง่ำ ง่ำ) ...อย่างนี้นี่เองสินะคะ#nน่าผิดหวังจริงๆ ที่ยังมีร้านอาหารบางร้านใช้วิธีสกปรกแบบนี้อยู่"
1300206-28 = "[s] \"มีอะไรแปลกไปเหรอ?\""
1300206-29 = "ถ้าเทียบกับของคุณครูแล้ว ของฉันมีซอสเผ็ดใส่ลงไปมากกว่าปกติค่ะ#nนี่คงเป็นวิธีที่พวกเขาใช้แสวงหาผลประโยชน์จากการท้าทายนักชิมแน่ค่ะ"
1300206-30 = "เพราะว่าฉันกินได้ทุกอย่าง คนก็เลยมักจะลืมไปว่าฉันเป็นสมาชิกชมรมชิมอาหาร#nถ้าเป็นเรื่องคุณภาพของอาหารแล้ว ฉันจะวิจารณ์อย่างจริงจังค่ะ"
1300206-31 = "ถึงแม้จะเป็นการท้าทายนักชิมที่โฟกัสไปที่จำนวนของอาหารที่เสิร์ฟ#nอาหารก็ควรที่จะมีรสชาติที่ผ่านมาตรฐาน และผัดเต้าหู้จานนี้...ไม่ผ่านมาตรฐานค่ะ"
1300206-32 = "ถ้าหากใครเล่นสกปรกโดยการใช้อาหารมาแสวงหาผลประโยชน์ล่ะก็...#nฉันจะลงโทษพวกเขาให้สาสมเลยค่ะ"
1300206-34 = "...ขอบคุณสำหรับอาหารค่ะ!#nแล้วก็ขอผัดเต้าหู้อีกจานหนึ่งด้วยค่ะ"
1300206-35 = "(ปะ...เป็นไปไม่ได้ เธอเพิ่งเริ่มกินไปไม่ถึง 10 นาที แล้วนี่เธอกินหมดไป 3 จานแล้วเนี่ยนะ?)"
1300206-36 = "(แต่ละจานนี่มีปริมาณผัดเต้าหู้พอสำหรับกินได้ 10 คนเลยเชียวนะ!)"
1300206-37 = "นี่...ฟังอยู่หรือเปล่าคะ?#nขอผัดเต้าหู้นักชิมอีกจานหนึ่งด้วยค่ะ!"
1300206-38 = "คือ... คือว่าคุณลูกค้า... คุณทำการท้าทายการกินสำเร็จแล้ว คุณกินผัดเต้าหู้ไปสิบจานเต็มๆ...#nหยุดกินแค่นี้ก่อนดีกว่าไหมครับ?\n"
1300206-39 = "เอ๋? หมายความว่ายังไงกันคะ? ก็บอกเองไม่ใช่เหรอคะว่าผู้ท้าทายสามารถกินผัดเต้าหู้ได้#nแบบไม่จำกัดจำนวนภายในเวลาที่กำหนดไว้?"
1300206-40 = "ถ้าจะให้การท้าทายนักชิมยุติธรรมสำหรับทั้งสองฝ่าย เราก็ควรทำตามกฏไม่ใช่เหรอคะ?"
1300206-41 = "และนี่ฉันยังไม่ได้ตำหนิเรื่องที่ซอสเผ็ดถูกใส่เข้ามามากเกินปกติบนผัดเต้าหู้นักชิมเลย#nด้วยนะคะ ฮุฮุ...."
1300206-42 = "ตะ...ต้องขอโทษด้วย! เราจะไม่คิดค่าอาหารพวกคุณทั้งสองคน... โปรดให้อภัยเราด้วยเถอะครับ!"
1300206-43 = "ไม่เอาหรอกค่ะ~ ฉันมาที่นี่เพื่อกินผัดเต้าหู้ให้อิ่มท้อง ไม่ใช่มาฟังคำขอโทษหรอกนะคะ"
1300206-45 = "เอาละ ถ้างั้นก็ช่วยเอาผัดเต้าหู้จานถัดไปมาให้ฉันด้วยค่า!"
1300206-47 = "หลังจากนั้น อาคาริก็ได้กินผัดเต้าหู้หกสิบจานภายในเวลาครึ่งชั่วโมง ซึ่งถือเป็นสถิติใหม่..."

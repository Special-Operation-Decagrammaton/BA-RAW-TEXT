[translation]
1300206-1 = "Gourmand's Pride"
1300206-2 = "Eastern Restaurant Near Gehenna"
1300206-3 = "I stopped by a Chinese restaurant on my way back from work at Gehenna Academy. While there, I happened to see Akari."
1300206-4 = "Wow, Sensei! What a coincidence. Are you here to grab lunch?"
1300206-5 = "Cool, same here! This place has a special \"gourmand challenge\" where you can eat as much mapo tofu as you want. "
1300206-6 = "If you're up for it, would you like to try the mapo tofu gourmand challenge with me?"
1300206-7 = "Wait, you just want a regular order of mapo tofu? But eating a mountain of mapo tofu is pure euphoria..."
1300206-8 = "If you're not interested, suit yourself. Should we order now?"
1300206-9 = "We'll have a regular mapo tofu and a gourmand mapo tofu, please."
1300206-10 = "Is the gourmand order of mapo tofu for the adult here?"
1300206-11 = "No, it's for me. I may not look it, but I'm no slouch when it comes to gourmand challenges!"
1300206-12 = "Haha. Our mapo tofu makes for a tough challenge no matter how much you normally eat..."
1300206-13 = "Please give us a moment. Your food will be ready soon."
1300206-15 = "(Is it just me...or did the server have a strange expression there?)"
1300206-17 = "Thanks for waiting. Here's the regular mapo tofu and gourmand mapo tofu you ordered."
1300206-18 = "If you can finish this ten-serving mapo tofu in thirty minutes, we won't charge you for it. If you finish before the time is up, you can eat even more. That's an unlimited amount!"
1300206-19 = "...Take your time and enjoy."
1300206-20 = "Whoa...I can smell that spicy aroma already. I can tell how delicious it is just by looking at it!"
1300206-21 = "Time to dig in, then!"
1300206-22 = "[s] \"Thanks for the food.\""
1300206-24 = "...Hmm? How odd. This mapo tofu doesn't taste the same as I remember."
1300206-25 = "Sensei, do you mind if I have a bite of your regular mapo tofu?"
1300206-26 = "[s] Share your regular mapo tofu with her."
1300206-27 = "Nom, nom. ...I see what's going on here. It's a bit disappointing to see that there are still some restaurants that resort to cheap tricks like this."
1300206-28 = "[s] \"Is there something wrong with your mapo tofu?\""
1300206-29 = "Compared to yours, mine has an excessive amount of spicy sauce on it. This must be their way of rigging the gourmand challenge in their favor."
1300206-30 = "Because I can eat so much of anything, people tend to forget that I'm still a member of the Gourmet Research Society. I'm a tough critic when it comes to the quality of food."
1300206-31 = "Even in a gourmand challenge, where the focus is on the amount of food served, there's a baseline quality a dish should meet. And this mapo tofu...falls below the line."
1300206-32 = "If someone plays dirty tricks with their food to make a quick buck...I'll punish them harshly."
1300206-34 = "...Thanks for the grub! And I'll have another bowl of mapo tofu, please."
1300206-35 = "(Th-This is impossible. Not even ten minutes have passed since she started, and she's done with her third bowl already?)"
1300206-36 = "(Each gourmand order has ten servings of mapo tofu!)"
1300206-37 = "Hello...are you listening? One more bowl of gourmand mapo tofu, please!"
1300206-38 = "Uh, um, ma'am...you already completed your challenge. You ate the full ten servings of mapo tofu... Shouldn't you consider stopping now?"
1300206-39 = "Excuse me? What do you mean by that? Didn't you clearly state that the challenger can eat an unlimited amount of gourmand mapo tofu within the time limit?"
1300206-40 = "For a gourmand challenge to be fair for both parties, the initial rules must be strictly followed. Wouldn't you agree?"
1300206-41 = "And I didn't even complain about the extremely spicy sauce they poured all over the gourmand mapo tofu... Heeheehee."
1300206-42 = "I-I'm so sorry! I won't charge you two for the meal... Please forgive us!"
1300206-43 = "No! I came here to stuff myself with mapo tofu, not to listen to your apologies."
1300206-45 = "Bring me my next bowl of mapo tofu, please!"
1300206-47 = "Afterwards, Akari ate sixty servings of mapo tofu in half an hour, setting a new record..."

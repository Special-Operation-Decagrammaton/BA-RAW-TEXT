[translation]
83306105600-6 = "อยู่นี่ไง ฉันหาเจอแล้ว"
83306105600-7 = "จริงเหรอ?! ขอบใจนะ!"
83306105600-8 = "ค่อยยังชั่วไปทีนะคะ คุณจุนโกะ"
83306105600-9 = "ขอบคุณที่มาช่วยนะคะคุณฮินะ"
83306105600-10 = "ฮุฮุ... การได้รับความช่วยเหลือแบบนี้ก็เป็นความรู้สึกที่แปลกใหม่ดีนะคะ"
83306105600-12 = "ใช่ ฉันก็รู้สึกเหมือนกัน"
83306105600-13 = "นี่แหละค่ะมิตรภาพของเด็กผู้หญิง..."
83306105600-14 = "เก็บโหมดซึ้งไว้ก่อนเถอะ ฉันหิวข้าวแล้ว! ไหนๆ เราก็เจอคูปองแล้วด้วย! งั้นก็รีบไปกินกันเถอะ!"
83306105600-19 = "อ๊ะ! รอด้วยสิ! อิซุมิ!"

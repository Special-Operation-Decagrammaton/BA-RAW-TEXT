[translation]
1001702-1 = "The Award Ceremony"
1001702-2 = "Red Winter Academy Presidential Office"
1001702-3 = "Hmm... No matter how much I think about it, I can't come up with a good name."
1001702-4 = "A slightly more honorable and noble name...something that suits me..."
1001702-6 = "Oh, you're here, Comrade! I've been waiting for you!"
1001702-7 = "I summoned you because I have an important task that I need your wisdom for."
1001702-8 = "As you know, I've been working tirelessly on the development of Red Winter Academy over the past few months."
1001702-9 = "I ate pudding all day to control the quality of the food service facility, took a nap to preserve my stamina before inspecting the school, and...and..."
1001702-10 = "Anyway! I'm very tired from doing so much. I deserve to be rewarded!"
1001702-11 = "So I've been thinking about how to reward myself, and I decided to bestow upon myself the most prestigious medal of Red Winter Federal Academy."
1001702-12 = "Unlike sweets such as pudding, medals don't disappear. They're recorded in the history books as soon as they're awarded, forever changing Red Winter Academy..."
1001702-13 = "This is the perfect prize for me, considering I worked so hard for such a long time!"
1001702-14 = "There's one problem, though..."
1001702-15 = "I've already received all the medals that Red Winter Academy has to offer, so there are no new medals left to receive!"
1001702-16 = "Well, since I'm the student council president, I guess I can make a new medal."
1001702-17 = "But I can't think of a good name for the new medal..."
1001702-18 = "Comrade, can you think of a name that is honorable, noble, elegant, and best describes my achievements?"
1001702-19 = "Think of a cool word that makes sense to go in front of the medal name!"
1001702-20 = "[s1] \"Hyper.\"\n[s2] \"Ultra.\"\n[s3] \"Mega.\""
1001702-22 = "Oh, what a wonderful word! I'm sure it'll help us create a cool medal name!"
1001702-24 = "Oh, what a wonderful word! I'm sure it'll help us create a cool medal name!"
1001702-26 = "Oh, what a wonderful word! I'm sure it'll help us create a cool medal name!"
1001702-27 = "Another word, give me another word!"
1001702-28 = "Huh? Using \"Super\" in front of a word gives it a stronger impression?"
1001702-29 = "Good, I'll take that too!"
1001702-30 = "Hmm, hmm. And..."
1001702-33 = "All right—I made my decision!"
1001702-34 = "The name of Red Winter's new highest medal of honor is...the Super Hyper Ultra Mega Valorous Effort Medal of Honor!"
1001702-35 = "The students will be blown away just hearing the name of this medal, don't you think? Heeheehee..."
1001702-36 = "Huh? You think there should be a prize for you since we thought up the name together?"
1001702-37 = "Uh... But, the Super Hyper Ultra Mega Valorous Effort Medal of Honor is the most honorable medal Red Winter Academy has to offer, so it can't be given to just anyone..."
1001702-38 = "Oh well."
1001702-39 = "Comrade, it may not be the highest honor, but I will award you something befitting of your efforts: The Hyper Ultra Mega Valorous Effort Medal of Honor."
1001702-40 = "You should be honored, Comrade!"
1001702-42 = "Afterwards, Cherino and I spent quite some time coming up with the medal's design."

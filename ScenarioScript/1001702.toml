[translation]
1001702-1 = "#Title;훈장 수여식"
1001702-2 = "#Place;붉은겨울 학원 회장 집무실"
1001702-3 = "3;체리노;99;으음…… 아무리 생각해도 좋은 이름이 떠오르지가 않는군.\n#3;em;[속상함]\n#3;stiff\n#3;a"
1001702-4 = "3;체리노;99;좀 더 명예롭고, 고귀한. 이 몸에게 잘 어울리는 그럴싸한 이름이……."
1001702-5 = "3;체리노;01\n#3;em;[반응]\n#wait;1500"
1001702-6 = "3;체리노;03;오오, 왔는가. 콤라드! 기다리고 있었다네!\n#3;em;[재잘]\n#3;hophop"
1001702-7 = "3;체리노;01;다름이 아니라 콤라드의 지혜를 긴히 빌려야 할 중요한 일이 있어 그대를 불렀다네."
1001702-8 = "3;체리노;01;콤라드도 알고 있겠지만, 지난 수개월간 이 몸은 붉은겨울 학원의 발전을 위해 불철주야 힘써왔었지."
1001702-9 = "3;체리노;99;급식 시설의 품질 관리를 위해 하루 종일 푸딩을 맛보기도 하고, 학교를 시찰하기 전에 체력을 온존하기 위해 낮잠을 자기도 하고, 또…… 그리고 또…….\n#3;em;[...]"
1001702-10 = "3;체리노;05;여하튼! 이것저것 대단한 일을 잔뜩 하느라 이 몸은 매우 지쳤다네. 충분한 보상을 받아 마땅하다고!\n#3;em;[빠직]\n#3;stiff"
1001702-11 = "3;체리노;01;그래서 나 스스로에게 무슨 상을 줄까, 고민하다가 붉은겨울 학원에서 최고로 영예로운 훈장을 수여하기로 결정했다네."
1001702-12 = "3;체리노;02;훈장은 푸딩과 같은 스위츠와는 달리 먹어서 사라지는 것도 아니고, 수여와 동시에 기록으로 남아 붉은겨울의 역사에 길이길이 남을 테니……."
1001702-13 = "3;체리노;03;오랫동안 열심히 수고한 이 몸을 위한 상으로는 안성맞춤의 물건이지!\n#3;em;[반짝]\n#3;hophop"
1001702-14 = "3;체리노;99;다만 여기에도 한 가지 문제가 있는데, 그건 바로……."
1001702-15 = "3;체리노;05;이 몸이 붉은겨울 학원에 있는 모든 훈장을 이미 받아버려서 새로 받을 수 있는 훈장이 없다는 것이다!\n#3;closeup"
1001702-16 = "3;체리노;99;뭐, 훈장이야 이 몸이 학생회장이니 새로 만들면 되지만."
1001702-17 = "3;체리노;06;하지만 새로운 훈장에 붙일 만한 좋은 이름이 떠오르지가 않아…….\n#3;em;[속상함]\n#3;stiff"
1001702-18 = "3;체리노;02;콤라드, 명예롭고, 고귀하고, 우아하면서도 이 몸의 업적을 잘 설명할 수 있는 그런 이름이 또 없을까?"
1001702-19 = "3;체리노;01;뭔가 훈장 앞에 붙이면 그럴싸한 멋진 단어를 생각해보게!\n#3;em;[!]"
1001702-20 = "[s1] \"하이퍼.\"\n[s2] \"울트라.\"\n[s3] \"메가.\""
1001702-21 = "3;체리노;02\n#3;em;[반응]\n#wait;1500"
1001702-22 = "3;체리노;03;오오, 멋진 단어로군! 분명 그 단어를 이어 붙이면 멋진 이름의 훈장이 탄생할 거야!\n#3;em;[반짝]\n#3;hophop"
1001702-23 = "3;체리노;02\n#3;em;[반응]\n#wait;1500"
1001702-24 = "3;체리노;03;오오, 멋진 단어로군! 분명 그 단어를 이어 붙이면 멋진 이름의 훈장이 탄생할 거야!\n#3;em;[반짝]\n#3;hophop"
1001702-25 = "3;체리노;02\n#3;em;[반응]\n#wait;1500"
1001702-26 = "3;체리노;03;오오, 멋진 단어로군! 분명 그 단어를 이어 붙이면 멋진 이름의 훈장이 탄생할 거야!\n#3;em;[반짝]\n#3;hophop"
1001702-27 = "3;체리노;01;또, 또 다른 단어를 말해보게!"
1001702-28 = "3;체리노;02;응? 단어 앞에 초(超) 자를 붙이면 뭔가 강해 보이는 인상을 준다고?"
1001702-29 = "3;체리노;03;좋아, 그것도 채용이다!\n#3;em;[음표]"
1001702-30 = "3;체리노;99;음, 음. 그리고 또……."
1001702-31 = "#all;hide"
1001702-32 = "#wait;500"
1001702-33 = "3;체리노;01;좋아, 결정했다!\n#3;a"
1001702-34 = "3;체리노;01;새롭게 신설된 붉은겨울의 최고 영예 훈장의 이름은 <초 하이퍼 울트라 메가 슈퍼 용맹 노력 영예 훈장>이니라!\n#3;em;[!]"
1001702-35 = "3;체리노;03;이만하면 훈장의 이름을 듣는 것만으로도 학생들이 감탄을 금치 못하겠지? 후후후…….\n#3;em;[재잘]\n#3;hophop"
1001702-36 = "3;체리노;02;응? 이름을 짓는데 함께 고민해 준 콤라드에게는 무슨 상이 없느냐고?"
1001702-37 = "3;체리노;04;어어…… 하지만 <초 하이퍼 울트라 메가 슈퍼 용맹 노력 영예 훈장>은 붉은겨울 학원에서 가장 영예로운 훈장이기 때문에 함부로 수여할 수 없는데…….\n#3;stiff\n#3;em;[땀]"
1001702-38 = "3;체리노;99;하는 수 없지."
1001702-39 = "3;체리노;01;콤라드에게는 최고의 영예는 아니지만, 그에 준하는 <하이퍼 울트라 메가 슈퍼 용맹 노력 영예 훈장>을 수여하겠네."
1001702-40 = "3;체리노;03;영광으로 알게나, 콤라드!\n#3;hophop\n#3;em;[음표]"
1001702-41 = "#all;hide"
1001702-42 = "#na;(이후, 체리노와 함께 훈장의 디자인을 고민하며 즐거운 시간을 보냈다.)"

[translation]
1001702-1 = "พิธีมอบเหรียญตรา"
1001702-2 = "สำนักงานประธานสหภาพเรดวินเทอร์"
1001702-3 = "อืม... คิดเท่าไรก็นึกชื่อดีๆ ไม่ออกเลยแฮะ"
1001702-4 = "ชื่อที่สง่างามและดูมีเกียรติ... เหมาะกับเรา"
1001702-6 = "โอ้ มาแล้วเหรอสหาย! เรากำลังรออยู่เลย!"
1001702-7 = "เรามีเรื่องสำคัญที่ต้องอาศัยความฉลาดของสหาย"
1001702-8 = "สหายก็คงจะรู้ ช่วงหลายเดือนที่ผ่านมานี้ เราได้พยายามอย่างหนักตลอดทั้งวันทั้งคืนเพื่อพัฒนา#nสหภาพเรดวินเทอร์"
1001702-9 = "ชิมพุดดิ้งทั้งวันเพื่อควบคุมคุณภาพอาหารที่โรงอาหาร นอนกลางวันเพื่อสงวนพลังงานก่อนตรวจตรา#nโรงเรียน... แล้วก็..."
1001702-10 = "จะยังไงก็เถอะนะ! เราเหนื่อยสุดๆ เพราะมัวแต่ทำเรื่องที่สุดยอดนู่นนี่นั่นมากมาย เราสมควรได้รับรางวัล#nแล้วละ!"
1001702-11 = "เรากำลังคิดว่าจะให้รางวัลอะไรกับตัวเองดีแล้ว สุดท้ายก็ตัดสินใจที่จะมอบเหรียญตราที่มีเกียรติที่สุด#nในสหภาพเรดวินเทอร์ให้ตัวเราเอง"
1001702-12 = "เหรียญตราไม่ใช่ของที่กินแล้วจะหายเหมือนพุดดิ้ง#nการมอบเหรียญตราจะถูกบันทึกไว้ในประวัติศาสตร์ของเรดวินเทอร์… "
1001702-13 = "เพราะงั้นเหรียญตรานี่แหละของรางวัลที่เหมาะสมกับเรา เราใช้เวลาคิดอยู่นานเลยนะ!"
1001702-14 = "แต่ก็ยังมีอีกปัญหาหนึ่ง นั่นก็คือ..."
1001702-15 = "เราได้รับเหรียญตราที่มีในสหภาพเรดวินเทอร์มาหมดแล้ว เพราะงั้นเลยไม่มีเหรียญตราที่จะมอบ#nให้เราแล้วน่ะสิ!"
1001702-16 = "ก็นะ... ไหนๆ เราก็เป็นประธาน เพราะงั้นเราคิดว่าเราคงทำเหรียญตราขึ้นมาใหม่ได้"
1001702-17 = "แต่เรายังนึกชื่อดีๆ สำหรับเหรียญตรานี้ไม่ได้เลย..."
1001702-18 = "สหาย ไม่มีชื่อไหนที่ฟังแล้วดูสง่า มีเกียรติ และอธิบายถึงความสำเร็จของเราได้บ้างเลยเหรอ?"
1001702-19 = "ลองคิดคำเท่ๆ ที่จะไปสลักไว้บนเหรียญตราให้เราหน่อยสิ!"
1001702-20 = "[s1] \"ไฮเปอร์\"\n[s2] \"อัลตร้า\"\n[s3] \"เมก้า\""
1001702-22 = "โอ้ คำเท่ไปเลยนี่นา! ถ้าเอาคำนั้นมาต่อกันจะได้ชื่อเหรียญตราที่ยอดเยี่ยมแน่นอน!"
1001702-24 = "โอ้ คำเท่ไปเลยนี่นา! ถ้าเอาคำนั้นมาต่อกันจะได้ชื่อเหรียญตราที่ยอดเยี่ยมแน่นอน!"
1001702-26 = "โอ้ คำเท่ไปเลยนี่นา! ถ้าเอาคำนั้นมาต่อกันจะได้ชื่อเหรียญตราที่ยอดเยี่ยมแน่นอน!"
1001702-27 = "ลองพูดคำอื่นมาอีกสิ เอาอีก!"
1001702-28 = "หือ? ถ้าใส่ตัวอักษรคำว่า \"ยอด\" ไว้หน้าคำ จะช่วยให้มีความรู้สึกแข็งแรงงั้นเหรอ?"
1001702-29 = "ดีละ เอาตามนี้แล้วกัน!"
1001702-30 = "อืมมมมมม แล้วก็..."
1001702-33 = "เอาละ เราตัดสินใจได้แล้ว!"
1001702-34 = "เหรียญตราใหม่ที่มีเกียรติที่สุดในสหภาพเรดวินเทอร์ เหรียญ <ยอดเหรียญตราเกียรติยศของไฮเปอร์#nเมก้าซูเปอร์อัลตร้าผู้กล้า>!"
1001702-35 = "แค่เพียงได้ยินชื่อเหรียญตรานี้ พวกนักเรียนคงอดปลื้มไม่ได้เลยใช่มั้ยล่ะ? ฮิฮิฮิ..."
1001702-36 = "หืม? มีรางวัลให้สหายที่ช่วยตั้งชื่อให้บ้างรึเปล่างั้นเหรอ?"
1001702-37 = "อืม... แต่ว่า <ยอดเหรียญตราเกียรติยศของไฮเปอร์เมก้าซูเปอร์อัลตร้าผู้กล้า> นี่ เป็นเหรียญตราที่มี#nเกียรติที่สุดของสหภาพเรดวินเทอร์นะ จะมอบให้คนอื่นสุ่มสี่สุ่มห้าไม่ได้..."
1001702-38 = "ช่วยไม่ได้นะ..."
1001702-39 = "สำหรับสหาย เราจะมอบเหรียญตราที่มีเกียรติที่รองจาก <เหรียญตราเกียรติยศของไฮเปอร์เมก้าซูเปอร์#nอัลตร้าผู้กล้า> ให้ก็แล้วกัน"
1001702-40 = "ถือว่าเป็นเกียรตินะสหาย!"
1001702-42 = "(จากนั้นคุณครูกับเชริโน่ก็ใช้เวลาออกแบบเหรียญตรากันอย่างสนุกสนาน)"

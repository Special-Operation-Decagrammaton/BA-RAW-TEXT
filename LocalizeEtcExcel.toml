937127281-NameJp = "Event Challenge Stage 1 Hint"
937127281-DescriptionJp = "The enemy tank moves towards an open area and launches a powerful attack upon arrival.\n\nAlthough the tank is highly resistant to EX skill damage, its performance declines with each hit.\n\nTake advantage of this weakness to defeat it before it reaches the open area."
120747478-NameJp = "Event Challenge Stage 2 Hint"
120747478-DescriptionJp = "Prevent the After-School Sweets Club students from using their skills."
3642446434-NameJp = "Event Challenge Stage 3 Hint"
3642446434-DescriptionJp = "If you give buffs to Reisa, she'll use her EX skill. Assist her in taking down the thugs."
284862043-NameJp = "Event Challenge Stage 4 Hint"
284862043-DescriptionJp = "Use Crowd Control to weaken Hippie Automaton before attacking."
3412917378-NameJp = "Event Challenge Stage 1 Hint"
3412917378-DescriptionJp = "The thug's EX skill causes significant damage if it hits twice.\n\n Restoring the Scarecrow's HP to 100% will freeze all allied students and block the thug's skill attack."
110115972-NameJp = "Event Challenge Stage 2 Hint"
110115972-DescriptionJp = "Valkyrie students will be replenished at regular intervals to assist Kanna.\n\n Eliminate them quickly to prevent too many Valkyrie students from gathering."
2111941898-NameJp = "Event Challenge Stage 3 Hint"
2111941898-DescriptionJp = "Use Crowd Control to temporarily contain Kanna, and quickly take down the enemies in front to break free from her."
184971332-NameJp = "Event Challenge Stage 4 Hint"
184971332-DescriptionJp = "Attack the Plasma Field Generator and help the AMAS units with the healer students.\n\nThe Modded Sweeper can only be eliminated with an EX skill."
2842109547-NameJp = "Event Challenge Stage 1 Hint"
2842109547-DescriptionJp = "Hiyori will run across the beach to show you the path. Afterwards, she'll run across it a few more times. At the end of each run, there'll be two scarecrows. Attack Scarecrow X if the beach looks different, and Scarecrow O if the beach looks the same."
2522165937-NameJp = "Event Challenge Stage 2 Hint"
2522165937-DescriptionJp = "Use Tank students to withstand enemy damage."
388529582-NameJp = "Event Challenge Stage 3 Hint"
388529582-DescriptionJp = "Use Recovery and Buff skills to assist the Mechagator and defeat Akemi."
472021647-NameJp = "Event Challenge Stage 4 Hint"
472021647-DescriptionJp = "Applying Debuff to Akemi will also apply Debuff to enemies near her.\n\nDealing damage to enemies near Akemi will also deal damage to her.\n\nWhen Akemi makes her side pose, the ATK of all allies and enemies, and the Cost Recovery Rate, will increase for a certain period of time."
467833032-NameJp = "Event Challenge Stage 1 Hint"
467833032-DescriptionJp = "Real bombs and fake bombs have been placed throughout the stage. Genryumon students only react and run away from real bombs.\n\nDefeat enemies by blowing up the real bombs."
2000030305-NameJp = "Event Challenge Stage 2 Hint"
2000030305-DescriptionJp = "Utilize Tank and Debuff Removal Skills to withstand enemy attacks."
3888748298-NameJp = "Event Challenge Stage 3 Hint"
3888748298-DescriptionJp = "Look for the real boss among the identical-looking enemies. \n\nAll enemies fall when the boss is defeated.\n\nThere is a very high chance of a critical hit when attacking the boss, while there is a very low chance of a critical hit when attacking others."
1179303176-NameJp = "Event Challenge Stage 4 Hint"
1179303176-DescriptionJp = "Move students and direct attacks from the Peking Opera Club members to enemies.\nSkills from Peking Opera Club members also deal damage to other Peking Opera Club members."
3297442664-NameJp = "Event Challenge Stage 1 Hint"
3297442664-DescriptionJp = "All enemies focus fire on allies, and create a Crowd Control gauge, when their health drops below 1%.\nAn enemy will be eliminated when the Crowd Control gauge is fully filled."
2684865569-NameJp = "Event Challenge Stage 2 Hint"
2684865569-DescriptionJp = "Deploy Tank students to withstand enemy attacks."
3519883613-NameJp = "Event Challenge Stage 3 Hint"
3519883613-DescriptionJp = "Kai uses a skill and grants the poison effect to enemies.\nGenryumon members fall into a state of confusion when the poison effect is active.\nUse a debuff removal skill to remove the poison effect from the Genryumon members."
313921055-NameJp = "Event Challenge Stage 4 Hint"
313921055-DescriptionJp = "Kai becomes weaker every time an enemy is defeated.\nThere is a barrier that continuously helps Kai recover.\nTo fight Kai, use attacks that deal lots of damage at once."
3486077912-NameJp = "Event Challenge Stage 1 Hint"
3486077912-DescriptionJp = "Prevent Sakurako and Mine from knocking each other over."
3001581470-NameJp = "Event Challenge Stage 2 Hint"
3001581470-DescriptionJp = "Gather the Tank students and withstand the enemies' attacks."
2610005946-NameJp = "Event Challenge Stage 3 Hint"
2610005946-DescriptionJp = "If the Helmet Gangsters receive damage, Rabu receives damage too.\n\nThe enemy's Evasion increases every time an ally uses an EX Skill, and the Scarecrows' HP resets once they're completely recovered. \n\nAll allies receive a debuff if they don't move for a certain amount of time."
3941724285-NameJp = "Event Challenge Stage 4 Hint"
3941724285-DescriptionJp = "Withstand the thugs' attacks for 4 minutes to win.\n\nThe thugs becomes stronger the longer they survive,\nand they receive damage from Akemi's attacks."
2055343512-NameJp = "Event Challenge Stage 1 Hint"
2055343512-DescriptionJp = "Heal Koyuki.\n\nWhen Koyuki's HP reaches below 50%, enemies will attack other ally students, instead of Koyuki."
3473872843-NameJp = "Event Challenge Stage 2 Hint"
3473872843-DescriptionJp = "Noa (Pajamas) deals devastating attacks. Defeat her quickly!"
105670687-NameJp = "Event Challenge Stage 3 Hint"
105670687-DescriptionJp = "Defeat all Sweepers, before targeting the enemy, to win.\n\nEach Sweeper comes with a different effect, so utilize them to your advantage in the battle."
4025598380-NameJp = "Event Challenge Stage 4 Hint"
4025598380-DescriptionJp = "Yuuka (Pajamas) give allies buffs when her HP is 50% or above.\n\nWhen Avant Guard is using a skill, its DEF will decrease for every certain number of hits."
525037525-NameJp = "Event Challenge Stage 1 Hint"
525037525-DescriptionJp = "Behemoth Pan-Pan takes additional damage whenever it takes damage over time from debuffs. It takes even more additional damage from Chill.\n\nBehemoth Pan-Pan receives more damage, for a period of time, whenever a Gehenna Prefect Team Member (SG) attacks it."
3162907200-NameJp = "Event Challenge Stage 2 Hint"
3162907200-DescriptionJp = "Be wary of Sena (Casual)'s AoE attacks."
2027711820-NameJp = "Event Challenge Stage 3 Hint"
2027711820-DescriptionJp = "Behemoth Pan-Pan takes additional damage whenever it takes damage.\n\nDeploy students with high numbers of attacks."
113373470-NameJp = "Event Challenge Stage 4 Hint"
113373470-DescriptionJp = "Crit RES and Crit DMG RES significantly increases for all enemies.\nDamage dealt by ally Special students increases.\n\nDefeating the president of each club will deal damage to their respective club members.\nUtilize this fact to handle the commotion from each club."
3202949901-NameJp = "Event Challenge Stage 1 Hint"
3202949901-DescriptionJp = "Red Sweeper will eliminate nearby sweepers when eliminated.\nRed Sweeper takes significantly reduced damage, so utilize students with high hit counts."
1916385838-NameJp = "Event Challenge Stage 2 Hint"
1916385838-DescriptionJp = "Students under Sumire (Part-Timer)'s Weakness Detection effect receive additional damage upon taking damage.\nUtilize debuff removal skills to remove the Weakness Detection effect."
1058897212-NameJp = "Event Challenge Stage 3 Hint"
1058897212-DescriptionJp = "Sweeper continuously deals damage to nearby units.\nSweeper is knocked back whenever it gets hit by EX Skills, so use EX Skills to get the Sweeper to stay near Rei.\nHowever, Sweeper does not get knocked back when it's in a shield state."
1095949636-NameJp = "Event Challenge Stage 4 Hint"
1095949636-DescriptionJp = "When Akemi takes her side chest stance, Crit and Crit Rate significantly increases for all nearby units.\n\nWhenever Akemi takes a certain number of attacks, her damage taken is increased for a period of time.\n\nAkemi has a Crowd Control gauge, which slowly decreases over time. When the gauge is filled, she gets stunned, and her DEF is reduced significantly.\nAfterwards, allies get a shield, but their ATK is decreased.\nUtilize this shield to withstand a huge explosive attack."
3274122658-NameJp = "Event Challenge Stage 1 Hint"
3274122658-DescriptionJp = "Damage taken by Biker Gang Boss is significantly decreased.\nHowever, when the Crowd Control effect is inflicted on Biker Gang Member while a skill is being used, the damage taken by Biker Gang Boss increases, and a certain amount of Cost is acquired."
190394474-NameJp = "Event Challenge Stage 2 Hint"
190394474-DescriptionJp = "Aoba has very high DEF.\nTry using a DEF Decrease effect."
384582627-NameJp = "Event Challenge Stage 3 Hint"
384582627-DescriptionJp = "All enemies in this challenge only take damage from EX Skills.\n\nATK and ATK SPD will increase significantly for all enemies whenever a Thug (SMG) or Thug (MG) is defeated.\nDefeat the Thug (SR) and Thug Commando first."
4256279682-NameJp = "Event Challenge Stage 4 Hint"
4256279682-DescriptionJp = "When an ally student collides with a charging Biker Gang Member, the ally student will take a lot of damage.\nHowever, when a Biker Gang Member collides with cover, the Biker Gang Member will take a lot of damage instead.\nDeploy cover and use movement skills to goad enemies into ramming that cover."
1196420166-NameJp = "Event Challenge Stage 1 Hint"
1196420166-DescriptionJp = "Enemies will charge and attack Kikyou, who is taking a nap.\nProtect Kikyou's rest by defeating the enemies before they reach her.\nDefeating Black Sweepers will grant you Cost and significantly reduce the MOV, SPD, and DEF of nearby enemies.\nBlack Sweepers take significantly reduced damage, so attack them with students who deal high damage."
956182265-NameJp = "Event Challenge Stage 2 Hint"
956182265-DescriptionJp = "Use Tank and Healer students to survive Renge (Swimsuit) and Yukari (Swimsuit)'s attacks."
1158136851-NameJp = "Event Challenge Stage 3 Hint"
1158136851-DescriptionJp = "Enemy barriers will disappear when HP of all Plasma Field Generators are above 0.\nPlasma Field Generator lose 25% of HP every 7 seconds, so it must be recovered continuously."
2288671928-NameJp = "Event Challenge Stage 4 Hint"
2288671928-DescriptionJp = "The enemy tank will move towards open areas and launch a powerful attack once it arrives.\nWhile the tank is highly resistant to EX skill damage, its performance will decline with each hit.\nTake advantage of this weakness to defeat it before it reaches the open area."
2701404947-NameJp = "Event Challenge Stage 1 Hint"
2701404947-DescriptionJp = "Prefectural Council members will pursue Eri. Protect her and defeat the incoming Prefectural Council members."
2506986276-NameJp = "Event Challenge Stage 2 Hint"
2506986276-DescriptionJp = "Kanoe has very high DEF and uses an EX Skill that cleanses debuffs inflicted on her.\nTry implementing the DEF reduction effect with precise timing."
4114458166-NameJp = "Event Challenge Stage 3 Hint"
4114458166-DescriptionJp = "Check the enemy's defense type carefully and adjust your tactics to exploit their vulnerabilities."
444658513-NameJp = "Event Challenge Stage 4 Hint"
444658513-DescriptionJp = "Enemies will inflict a powerful debuff on students.\nUse debuff cleansing skills to defeat enemies."
1268479381-NameJp = "Event Challenge Stage 1 Hint"
1268479381-DescriptionJp = "Fuyu will run and reveal variously colored Sweepers.\nWhen Fuyu gets to Miyo, attack the sweeper with the color that appeared the most often."
4163494881-NameJp = "Event Challenge Stage 2 Hint"
4163494881-DescriptionJp = "Proceed with the battle by targeting the enemy's defense type."
1154737800-NameJp = "Event Challenge Stage 3 Hint"
1154737800-DescriptionJp = "Maintain AMAS' HP at a 25% minimum and cast buffs on them to help them fight against the enemies.\n\nWhen the bomb explodes, it will inflict a significant amount of damage to nearby enemies. Try utilizing Concentrated Fire."
184757931-NameJp = "Event Challenge Stage 4 Hint"
184757931-DescriptionJp = "Akira's HP drops every second, but when her HP is at 50% or higher, she will grant a powerful buff to allies.\nEnemies attacked by Akira's skill will take increased damage.\n\nEnemy shielders recover HP when they put their shields up. Use CC skills to stop them."
2290871345-NameJp = "Event Challenge Stage 1 Hint"
2290871345-DescriptionJp = "Attack enemies with attack marks in order to defeat them all.\nBe careful, as stunned students will deal a powerful counterattack when attacked."
3231040624-NameJp = "Event Challenge Stage 2 Hint"
3231040624-DescriptionJp = "Proceed with the battle by targeting the enemy's defense type."
1473203563-NameJp = "Event Challenge Stage 3 Hint"
1473203563-DescriptionJp = "Buffs applied to Striker students will also apply to ally Helmet Gangsters.\nAlly Helmet Gangsters can deal significant damage to the enemies.\nSupport ally Helmet Gangsters to succeed in the battle."
1944049600-NameJp = "Event Challenge Stage 4 Hint"
1944049600-DescriptionJp = "Ally Helmet Gangsters will increase the damage taken by the enemies.\nSupport ally Helmet Gangsters as much as possible to retain the upper hand in battle."

404292254-NameJp = "Workers Serve Guests at the Hot Springs Resort Entrance"
404292254-DescriptionJp = "Our hot springs resort always welcomes guests with a friendly smile.\n(If you see an employee handing someone a suspicious drink, report it to the owner immediately!)"
4035745238-NameJp = "The Owner Shows the Garden Inside the Hot Springs Resort"
4035745238-DescriptionJp = "Our hot springs resort has a dry garden made of rocks and sand.\nFind peace of mind in our simple garden that emphasizes the beauty of moderation."
1774361412-NameJp = "The Owner Cleans the Rooms"
1774361412-DescriptionJp = "We sterilize and disinfect the bedding twice a day at our resort.\nEnjoy your break without worrying about cleanliness!"
3950044430-NameJp = "Guests Enjoy a Relaxing Soak in the Open-Air Bath"
3950044430-DescriptionJp = "Our hot springs water has effects such as clearing your skin, increasing vitality, and improving shooting skills.\nDiscover something new about yourself by taking a hot spring bath!"
999560012-NameJp = "Guests Enjoy a Meal in the Banquet Hall"
999560012-DescriptionJp = "Have a dinner made with the highest quality ingredients.\nEnjoy a kaiseki meal that includes hot spring manju and corn cobs!"
1094144720-NameJp = "Practice"
1094144720-DescriptionJp = "The race track at the Athletic Stadium is still open on non-game days. \nPlease submit a request to the Athletic Management Committee if you wish to use the track."
2809976808-NameJp = "Cheer"
2809976808-DescriptionJp = "Cheering is at the core of all sports! \nShow your support for the athletes on the field and encourage them to do their best! "
374407097-NameJp = "Work"
374407097-DescriptionJp = "The entire Kivotos Halo Festival Executive Committee is committed to ensuring that participants enjoy the best possible festival experience. \nIf you encounter any issues during the competition, please visit the operation headquarters located in the stadium."
1521840386-NameJp = "Craft"
1521840386-DescriptionJp = "Tools to repair minor breakdowns can be found in the Athletic Stadium's storage. \n(Feel free to use them, but do not use them for any dangerous modifications!)"
3558610679-NameJp = "Rest"
3558610679-DescriptionJp = "Don't forget to take a break after your workout! \nThe lounges in the Athletic Stadium are equipped with free-to-use vending machines for your use."
317946005-NameJp = "Brunch on the Track"
317946005-DescriptionJp = "Haruna: \"You must maintain your dignity, even while eating bread. A composed meal is the essence of epicureanism.\"\nJunko: \"Hold up, Izumi! I never said you could have my share!\""
543266597-NameJp = "The Results Are In"
543266597-DescriptionJp = "Ako: \"...F-Failed?\"\nAris: \"I have met all the requirements to complete the quest!\""
860818406-NameJp = "Hurdles for Hackers"
860818406-DescriptionJp = "Maki: \"M-My legs...can't stop shaking...\" / Kotama: \"I think I might faint...\"\nChihiro: \"What pitiful performance. This is exactly why it's important to exercise regularly!\""
3205226752-NameJp = "Hot Grenado"
3205226752-DescriptionJp = "Moe: \"Here, Saki. Take this.\"\nSaki: \"W-Wait! The pin! Where's the safety pin?!\""
2479371781-NameJp = "Taking the Initiative"
2479371781-DescriptionJp = "Rin: \"We must quickly restore the residential area without neglecting the safety of the citizens.\""
2720792911-NameJp = "General Student Council Meeting in Session"
2720792911-DescriptionJp = "Rin: \"Ayumu...I mean, Chief of Staff. Please check the progress of the restoration in this area.\"\nAyumu: \"O-Oh, yes! You mean a restoration status report? I'll do it right away!\""
1248524252-NameJp = "Hidden Talent"
1248524252-DescriptionJp = "Ayumu: \"Oh, dear, I-I think I packed too much... Gonna fall...!\"\nMomoka: \"Incredible! I didn't know that was possible!\""

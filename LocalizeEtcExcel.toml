2319299758-NameJp = "Aru's Very Precious Wallet"
2319299758-DescriptionJp = "A high-quality wallet Aru loves. Although it's made of fine material, it's faded and scratched due to long use. Haruka, Kayoko, and Mutsuki saved up and gave it to Aru as a gift after Problem Solver 68 was first established, so it's irreplaceable to her."
49207748-NameJp = "Neru's Bomber Jacket"

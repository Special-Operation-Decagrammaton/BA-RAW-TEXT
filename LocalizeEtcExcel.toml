2670560256-NameJp = "Heeheehee... It's ready."
2670560256-DescriptionJp = "It's Silver Plate, the demon merchant and Era's loyal servant! They're an exceptionally wicked being that appears through a dimensional rift to sell items that make people unhappy! In the spinoff \"Johnny Kivotos and High-Caliber Magic,\" they even become the formidable main villain! Nevertheless, they remain a fan-favorite among the hardcore, and have been known to have entire booths dedicated to them at Magicaliber-con! While they may appear weak, they have a special \"pyramid power\" that renders most attacks useless. In episode 11 of season 2, Silver Plate uses a camouflage tool and comes as a transfer student, where—"
2818922347-NameJp = "Full recovery with magical power!"
2818922347-DescriptionJp = "It's Stanag, the cute mascot of the Magicaliber series! They make a Magical National Guard contract with White and Pink and turn them into magical girls! Era's evil knights loathe Stanag's kindness and purity, so they kidnap and bully Stanag on a daily basis! But Stanag stays resilient and never loses their bright smile! They also support the magical girls by supplying magical bullets when they're in danger! From Green tip to black tip, they have an impressive array of ammunition! I was so touched by the episode when Stanag had an awakening. I think it was episode 7 of season 2, where Stanag's original form—"
3074909671-NameJp = "O, knights of evil, the time of darkness has arrived!"
3074909671-DescriptionJp = "Era! When I was young and saw her for the first time, I was so scared that I could barely peek through my fingertips to watch! She's the incredibly pretty, yet scary, nemesis of Heavy Caliber! When the sound of love and happiness from our world reached Era's dark planet, she gathered a team of evil villains and ambushed Heavy Caliber, vowing to silence our happy world forever! But the thing is, Era is also super loud when she laughs! Despite constantly being defeated by Heavy Caliber, she's a scary villain who never gives up! In the movie Magical Girl Heavy Caliber - Daisy Cutter, there's a scene where Era loses her memories and works as an ordinary bookstore part-timer, where Era—"
907100893-NameJp = "Munroe-Neumann Magical Jet!"
907100893-DescriptionJp = "Thermite Pink! She's White's loyal sidekick! If you're curious as to why she's purple despite her name being Pink, then... Ah! It might be a spoiler, so I recommend you watch the main story! Pink used to be a bit of an outsider student. But when White protected her from Era's attacks, she admired White for being cool and strong, and Pink ended up entering a contract with the Magical National Guard! And the two became the best duo in history of magical girls! While working with White, with the power of love, friendship, and some firepower, Pink was able to regain her confidence and turned into an amazing character! In episode 6 of season 3 where they turned into band idol superstars—"
3133177365-NameJp = "Apostle of Peace! Leave it to Thermite White!"
3133177365-DescriptionJp = "Thermite White is, and always will be, the main protagonist of the Magicaliber series! She used to be an ordinary, clumsy girl. But then, when Era was attacking, she met Stanag, the icon from the magical kingdom! While she was scared and shaking, our righteous White entered a contract with the Magical National Guard and became a magical girl! And Pink, who was saved by White, also becomes a magical girl, and the two become Magical Girl Heavy Caliber, the magical girls of justice who protect the world! In episode 2 of season 2, when White runs into Dragon Skin, one of the minions—"

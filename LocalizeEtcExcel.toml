537637411-NameJp = "BINAH"
537637411-DescriptionJp = "The third prophet of Decagrammaton, an AI inhabiting a mechanical body said to look like a giant snake and whale combined.\nThe origin of its name is suspected to be from the third Sephira of the Tree of Life, Binah. Its source, origin, and principle of operation are still unknown. But it's suspected that it's made of paranormal technology that cannot be reproduced with modern Kivotos technology.\n \nBinah can tunnel in and out of the ground, and when hiding underground, it is difficult to detect with existing technology. It's suspected that the reason Binah is mainly seen in Abydos District, where desertification is progressing, is because the desert is a favorable environment.\n \nRecords of Binah date back to the first sighting in the Abydos Desert since ancient times, continuing with rare but confirmed sightings to this day. One such incident occurred when it appeared at multiple railway construction sites every few days when Saint Nephthys, a native company of Abydos, was promoting the trans-desert railway construction project.\nThe most recent example is the battle between the Kaiser PMC stationed in the Abydos Desert and Binah. It appears to have significantly disrupted the Kaiser Group's excavation work.\n \nDetailed research data on Binah was compiled by the Abydos Student Council two years ago, but it's said that it was lost in the process of moving the school's main building a few years ago.\n \nAs of now, the reason for Binah's activity has not been determined.\n"
1367499131-NameJp = "CHESED"
1367499131-DescriptionJp = "The fourth prophet of Decagrammaton. Before being hacked by Decagrammaton, it was the production automation system of the neglected munitions factories left all over the ruins.\n\nThe origin of its name is the fourth Sephira of the Tree of Life, Chesed.\n\nThe main body is protected by huge exoskeleton armor that cannot be removed by ordinary means. It also seems to be protecting itself with a large number of robots produced in the munitions factories.\n\nChesed is the most important being for Decagrammaton, but is not a threat in itself. However, as long as Chesed exists, Decagrammaton's forces cannot be exhausted. It's because of Chesed that Decagrammaton is able to send its troops out in a war of attrition throughout Kivotos."
3284843262-NameJp = "Geburah"
3284843262-DescriptionJp = "The fifth prophet of Decagrammaton. While its exact identity is still being studied, it may be the AI of an unmanned exploration probe from the antarctic research center, hacked by Decagrammaton.\n\nIts name appears to come from Geburah, the fifth Sephira of the Tree of Life. It seems that its original feature as an unmanned exploration probe is preserved, as it can move freely under water. It also carries a variety of armaments, possibly enhanced from its original self-defense system. While it is difficult to estimate this prophet's original form, there's one sure thing: it prefers to operate at low temperatures."
2166637992-NameJp = "Tiphareth"
2166637992-DescriptionJp = "The sixth prophet of Decagrammaton. Said to have been born when Decagrammaton hacked the AI of a seed vault in the polar region.\n\nIts name seems to come from Tiphareth, the sixth Sephira of the Tree of Life.\n\nApparently, Tiphareth has taken full control over the main system of the seed vault and evolved it. Notably, it seems faithful to its original purpose of protecting the seed vault.\n\nThe Red Winter Federal Academy originally constructed the seed vault, but its current students have no knowledge of that history."
1769839732-NameJp = "Chokmah"
1769839732-DescriptionJp = "The second prophet of the Decagrammaton. Its identity was revealed to be the AI of a drifting auxiliary ship's navigation control system, hacked by Decagrammaton.\n\nIts name appears to come from Chokmah, the second Sephira of the Tree of Life. Unlike other prophets, it seems to be able to change its form and structure to a great extent, and its motivations are difficult to discern. For now, one assumes that it can set and change its own purpose. While its basic auxiliary ship form is already something to be careful of, its second form is said to be the Chokmah's true danger."
2539375741-NameJp = "KETHER"
2539375741-DescriptionJp = "Kether is the first prophet of Decagrammaton. It was first spotted in the Ruined Submerged District and appears to be protecting the region there. \n\nAs the first prophet, its A.I. capabilities and technological structure appear less advanced than those of the other prophets. However, it is unique in its ability to walk on all fours and built-in interchangeable weapons. \n\nIt's assumed there is a base managing the upkeep of Kether's parts with regard to repairs and replacements, preparing Kether with the right weapons to give it a strategic advantage in each battle. As of now, Kether has three known attack patterns. However, considering its structural properties, it's possible there are many more."
3359469350-NameJp = "Hod"
3359469350-DescriptionJp = "The eighth prophet of Decagrammaton. Decagrammaton hacked Millennium's built-in AI network and created it.\n\nThe origin of its name appears to be from HOD, the eighth Sephira of the Tree of Life.\n\nIt was originally called Hub as Millennium's AI network and was responsible for installing and repairing the cables connecting the academy's various facilities.\n\nBecause maintaining Millennium's web-like communication network is a very difficult and demanding task, Hub's head is equipped with a high-performance computing device. To facilitate working on the underground cables, its body is made up of numerous arms with connection terminals for excavating equipment. When fully visible, Hub looks like a giant octopus.\n\nHub has a long history dating back to the founding of Millennium Science School, but because it's usually engaged in cable repair work underground, most Millennium students are unaware of its existence.\n\nHowever, it appears on the surface to perform large-scale construction projects when needed. It's said that it can set up a temporary tower to quickly expand cables and control facilities, and it's so fast that no engineer in Millennium can keep up with it.\n\nWhat's unusual is that, unlike other prophets, it showed interest in Millennium students on its first contact. It possesses an EMP amplification engine, and it expands its territory by infiltrating the ground via underground kernels and securing files up to 3 kilometers underground to build modified Erosion Towers that erode its environment.\n\nNow it's a dangerous entity that wants to turn all of Kivotos into its territory."

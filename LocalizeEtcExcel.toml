182033757-DescriptionJp = "A Sand Play Set with tools for building simple sandcastles. Cement and rebar not included."
3004794592-NameJp = "Beach Chair"
3004794592-DescriptionJp = "A modern beach chair with soft fabric laid atop wood. It's waterproof, allowing you to use it with ease at the beach."
2064901758-NameJp = "Parasol Table"
2064901758-DescriptionJp = "A solid wood table with a sunshade parasol. A proper lady can't miss tea time, even at the beach."
1274276475-NameJp = "Water Play Equipment"
1274276475-DescriptionJp = "Full-fledged watersports equipment with a snorkel and oxygen tank. Not recommend for depths exceeding 50m."
1644359218-NameJp = "Sailing Board"
1644359218-DescriptionJp = "A board with sails attached to the hull to increase acceleration. It's easy to balance, making it perfect for beginners."
886310733-NameJp = "Gehenna Supply Box"
886310733-DescriptionJp = "Supplies prepared by the Prefect Team before summer boot camp.\nThey'll help you train! Don't worry, they're all winners!"
2668075095-NameJp = "GRS Grilled Corn"
2668075095-DescriptionJp = "Grilled corn prepared by the Gourmet Research Society.\nCurated to the tastes of its members—tastiness not guaranteed!"
1254096944-NameJp = "Thug Summer Shades"
1254096944-DescriptionJp = "Seized by the Prefect Team from a troublemaker at the beach.\nSigns of a helpless struggle remain."
104149602-NameJp = "Splashy Helmet"
104149602-DescriptionJp = "Seized by the Prefect Team from a Splashy Helmet Gang hoodlum in the beachside slums.\nSigns of a futile struggle remain."
2553698243-NameJp = "Event Points"

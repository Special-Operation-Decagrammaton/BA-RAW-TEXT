2272036400-DescriptionJp = "Aaah!! Save me!!"
4251203019-NameJp = "Koharu"
4251203019-DescriptionJp = "H-Hasumi...!"
3209623061-NameJp = "Hasumi"
3209623061-DescriptionJp = "Let's chase them before things get serious."
2515139315-NameJp = "Hasumi"
2515139315-DescriptionJp = "There they are."
3271479152-NameJp = "Koharu"
3271479152-DescriptionJp = "Ts-Tsurugi...!"
948196982-NameJp = "Helmet Gangster Boss"
948196982-DescriptionJp = "Why...after coming all this way..."
2404652050-NameJp = "Helmet Gangster Boss"
2404652050-DescriptionJp = "...do I still have to see your faces?!"
4221970729-NameJp = "Hasumi"
4221970729-DescriptionJp = "...I believe that's our line."
3722851138-NameJp = "10-Recruitment Ticket"
3722851138-DescriptionJp = "A ticket for 10 recruitments. ※ This ticket will expire if not used before 3/31/2025 2:59 PM UTC."
3328636483-NameJp = "Use the box to sneak up on the Helmet Gangsters without getting caught"
3328636483-DescriptionJp = "Get close to the Helmet Gangsters and eavesdrop on what they're saying. Use the box to approach them without being caught."
2007212476-NameJp = "Get through the security game while avoiding the drones"
2007212476-DescriptionJp = "Avoid the drones protecting the Data Center and get through the security gate. Use Recovery Medicine to recover HP."
14774070-NameJp = "Avoid the drones and infiltrate the Big Sister Room"
14774070-DescriptionJp = "Avoid the security drones in the Data Center and infiltrate the Big Sister Room. Use Rio's puppy robot to save progress."
3457439688-NameJp = "Retrieve dangerous submission"
3457439688-DescriptionJp = "Retrieve the dangerous item that was submitted to the exhibition hall. Use the scanner Seia has to find hidden items."
1369763957-NameJp = "Arrest Helmet Gangster leader"
1369763957-DescriptionJp = "Arrest the leader of the Helmet Gang that's been stealing submissions at the exhibition hall. Use the Special Hit Pad to silently subdue them."
4069660877-NameJp = "Find the Game Development Department booth's intruder"
4069660877-DescriptionJp = "Find the intruder who broke into the Game Development Department's booth. Support each other to get through the security system."
4201274762-NameJp = "Shut down malfunctioning device"
4201274762-DescriptionJp = "Operate the switchboard and power off the malfunctioning devices. Use the kneepad to move quickly without getting caught."
2555313209-NameJp = "Escape from Sumire and the Helmet Gangsters"
2555313209-DescriptionJp = "Avoid Sumire and the Helmet Gangsters to escape from the exhibition hall. Hide in the cabinet to avoid getting caught by Sumire and the Helmet Gangsters."
3441326232-NameJp = "Escape from security system"
3441326232-DescriptionJp = "Avoid the activated security system and escape from the exhibition hall. Avoid the dangerous looking gas and escape as fast as possible."
2202660611-NameJp = "Escape from Mechagator"
2202660611-DescriptionJp = "Avoid the rampaging Mechagator and escape from the exhibition hall. Use the vending machines to slow Mechagator down."
3308634141-NameJp = "Event Points"
3308634141-DescriptionJp = "These points are earned each time you progress in an event. The more you earn, the greater the variety of rewards you can receive."
3294588725-NameJp = "Expo Souvenir"
3294588725-DescriptionJp = "A Millennium Expo souvenir that can be obtained from various places in the Expo. Although it's easy to find during the event, this will also end up being a limited edition item!"
123964663-NameJp = "Someone's Lost Item"
123964663-DescriptionJp = "Items tend to get lost in big crowds like these. If you collect and bring them to the organizer, it'll make someone's day."
2954572543-NameJp = "Rounded Lounge Bench"
2954572543-DescriptionJp = "A bench that's noteworthy for its fluid curves. It's a great place for students visiting the lounge to rest."
2960450097-NameJp = "Multi-Seater Lounge Bench"
2960450097-DescriptionJp = "A bench for multiple people to sit and rest on. It's much more comfortable than it looks."
1313686834-NameJp = "Blue Octagon Rug"
1313686834-DescriptionJp = "A soft, blue octagon rug. It reliably covers a large area."
40718990-NameJp = "Indigo Octagon Rug"
40718990-DescriptionJp = "A dark indigo octagon rug. It reliably covers a large area."
1529615935-NameJp = "Geometric Pattern Rug"
1529615935-DescriptionJp = "A rug with geometric patterns embroidered on it. It's given inspiration to countless Millennium students."
3557494881-NameJp = "Hexagon Pattern Rug"
3557494881-DescriptionJp = "A rug consisting of a series of hexagons. For some reason, it seems sturdier than other rugs."
1423836042-NameJp = "Green Border Rug"
1423836042-DescriptionJp = "A rug decorated with green borders. Perhaps it can help people calm down?"
2850387743-NameJp = "Rectangular Marble Rug"
2850387743-DescriptionJp = "A rug with a luxurious marble pattern. It looks cold, but it's soft to the touch."
3457434895-NameJp = "Round Marble Rug"
3457434895-DescriptionJp = "A round rug with a luxurious marble pattern. It has a modern and clean aesthetic."
2824696329-NameJp = "Digital Wall Clock"
2824696329-DescriptionJp = "A digital clock that can be hung up on a wall. It displays humidity and temperature, making it quite handy."
1701209630-NameJp = "Facility Guide Display"
1701209630-DescriptionJp = "A standing display that shows a facility guide. You can easily see what's where at a glance."
3617828029-NameJp = "Event Promotional Display"
3617828029-DescriptionJp = "A display that promotes events at Millennium. Contact Seminar to sign up!"
2047348994-NameJp = "Visitor Experience Display"
2047348994-DescriptionJp = "A display that provides various pieces of information to students who visit the lounge. Its touch screen makes it convenient to use."
1778905185-NameJp = "Crowd Control Barrier"
1778905185-DescriptionJp = "Retractable barriers installed around restricted areas. It's easy to get over it, but for your safety, please go around."
2521181138-NameJp = "All-Glass Fence"
2521181138-DescriptionJp = "A fence made of glass. It has the advantage of being aesthetically pleasing while not obstructing the view. Be careful to not leave any handprints!"
4008069522-NameJp = "Wall Lamp"
4008069522-DescriptionJp = "A lamp that can be hung up on a wall. Millennium's unique turquoise lighting creates a polished atmosphere."
282620578-NameJp = "Standing Lamp"
282620578-DescriptionJp = "A standing cylindrical light. The turquoise light illuminates its surroundings and creates a polished atmosphere."
4092787851-NameJp = "Rectangular Lounge Partition"
4092787851-DescriptionJp = "A rectangular partition, made of window frames and glass. It's a polished solution for dividing up any space."
2481019026-NameJp = "Triangular Lounge Partition"
2481019026-DescriptionJp = "A triangular partition made of window frames and glass. Just the thing if you want a unique solution for dividing up your space!"
2174794892-NameJp = "Ornamental Planter Type A"
2174794892-DescriptionJp = "A planter housing a mid-sized ornamental plant. It brings freshness to the indoors."
5077418-NameJp = "Ornamental Planter Type B"
5077418-DescriptionJp = "A planter housing a unique, round ornamental plant. It's so cute and fluffy!"
533203456-NameJp = "Ornamental Planter Type C"
533203456-DescriptionJp = "A planter housing a large ornamental plant. It looks like the type of tree you'd see lining the street outdoors."

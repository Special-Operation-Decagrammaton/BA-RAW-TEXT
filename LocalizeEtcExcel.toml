1964406377-NameJp = "Punk Choker"
1964406377-DescriptionJp = "A punk-inspired choker with spikes. The sharp tips make it difficult to nod while wearing it around your neck."
2501983868-NameJp = "Chain Necklace"
2501983868-DescriptionJp = "A necklace made from a chain. Some say the rattling sound is pleasant, but others dislike how cold it is to the touch. "

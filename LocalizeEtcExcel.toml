1555725293-DescriptionJp = "Money - Your wallet doesn't fill up easily\nWaking up in the morning - Quite difficult\nTroublemaker - Beware of masks "
909638122-NameJp = "Curse"
909638122-DescriptionJp = "First, prepare the equipment. Second, secure an escape route. Third, raid the site, put things in your bag, and withdraw without looking back. Keep these in mind."
1661297162-NameJp = "Curse"
1661297162-DescriptionJp = "The Never-Ending Conveyor Belt leads straight to justice! Go Kaitenger if you want the absolute best in sushi goods! —Kaitenger Official Merch Funding"
2317250528-NameJp = "Future Blessing"
2317250528-DescriptionJp = "Wish: May or may not come true\nMoney: Find money you forgot was in your pocket\nInvestment: Invest your money in Kurokame Gang Financial "
4179075589-NameJp = "Future Blessing"
4179075589-DescriptionJp = "Want to get a better fortune than a future blessing? Add more offerings now and your fortune will double next time around!\n*Effects may differ from person to person. —Kurokame Gang New Year's Event"
1883262314-NameJp = "Future Blessing"
1883262314-DescriptionJp = "Don't be disappointed. No matter what comes your way, we will give you the peace of mind to face it head on. —Kurokame Gang Insurance"
4030255031-NameJp = "Future Blessing"
4030255031-DescriptionJp = "This isn't so bad. Fortune favors the bold! Join the Kurokame Gang if you agree, and you'll be welcomed with open arms! We believe in your potential. —The Kurokame Gang"
3228513232-NameJp = "Small Blessing"
3228513232-DescriptionJp = "Travel - Going to the convenience store in front of the house is also part of traveling\nEncounter - The corner of the alley is your own personal hot spot\nFood - Nothing beats bread at the corner of the alley!"
1134549000-NameJp = "Small Blessing"
1134549000-DescriptionJp = "Congratulations on getting a small blessing! I hope today will be a day when all the lights turn green whenever you stand at the crosswalk!"
3267689061-NameJp = "Small Blessing"
3267689061-DescriptionJp = "Your fortune this time is a small blessing! Even though it's only small, the heart it contains is infinite! Let's leave it at that for now!"
499121846-NameJp = "Small Blessing"
499121846-DescriptionJp = "You say you're hoping for a little bit of happiness this year? We promise to help you make that come true through our guaranteed safe and secure high-yield investments! —Kurokame Gang Financial"
609900746-NameJp = "Modest Blessing"
609900746-DescriptionJp = "Love - Romantic eye contact with your crush\nEncounter - Meet your crush at a shopping mall on the weekend\nDate - Go smell the flowers together"
2928203362-NameJp = "Modest Blessing"
2928203362-DescriptionJp = "Your fortune this time is a modest blessing! Congratulations! You've already picked a modest blessing, so all that's left is to pick a better fortune!"
2307433907-NameJp = "Modest Blessing"
2307433907-DescriptionJp = "This year is going to be a good year too! However, in the cold winter, pay more attention to your health! Don't forget to wash your hands and brush your teeth!"
3879409653-NameJp = "Modest Blessing"
3879409653-DescriptionJp = "We support you giving it your best. We hope you have another great year! ♪"
2475099392-NameJp = "Blessing"
2475099392-DescriptionJp = "Friendship - Get more friends\nLost Item - Find it right next to you\nStudy - Accomplish desired achievements"
1612527987-NameJp = "Yoshimi's Pick"
1612527987-DescriptionJp = "The rising star (?) Yoshimi personally designed and crafted this pick. But maybe she ordered a few too many...?"
405568906-NameJp = "Until I pass out from exhaustion."
405568906-DescriptionJp = "\"Ahaha... Everyone looks amazing...\""
494840872-NameJp = "Airi's Notebook"
494840872-DescriptionJp = "Airi's special notebook, made for everyone. In the end, it's a universal truth that no one can escape studying."
1618456696-NameJp = "Pay attention to the bottom right!"
1618456696-DescriptionJp = "\"Ahhh!! Delete it right now!!\""
2983071558-NameJp = "Natsu's Radio"
2983071558-DescriptionJp = "A small radio prepared by the top strategist Natsu. It did end up uniting everyone, in a physical sense, at least."
1033649487-NameJp = "One in heart and body."
1033649487-DescriptionJp = "\"What does this even mean...?\""
3761469925-NameJp = "Kazusa's Dessert Bingo"
3761469925-DescriptionJp = "Kazusa, the strongest member of her squad, used all her \"skill\" to make this... Ahh! No violence!!"
1161323409-NameJp = "Fueled by the passion of youth."
1161323409-DescriptionJp = "\"Witness the bravery of the After-School Sweets Club.\""
128049250-NameJp = "My Way Highway"
128049250-DescriptionJp = "\"You doubt my skills, though I'm the finest driver in the Tea Party?\"\n\"You're the ONLY one who can drive, Seia!\""
3186763206-NameJp = "Special Cheer"
3186763206-DescriptionJp = "\"I can fight for 10 more years with this.\"\n- Federal Investigation Club Schale, Anonymous"
3588818690-NameJp = "Sweet Revenge"
3588818690-DescriptionJp = "\"Don't miss a spot, Seia, got it?\"\n\"Yes...immaculate. Understood.\""
3450293592-NameJp = "Perfect UV Protection"
3450293592-DescriptionJp = "\"...I know what I heard...\""
1026138108-NameJp = "Stepping on the Tiger's Tail"
1026138108-DescriptionJp = "\"Y-You stupi...! Don't you dare mess with...! Oh. Ow.\"\n- Last words from an anonymous Helmet Gangster before being hospitalized"
2174565429-NameJp = "Iced Tea with a Shot of Espresso"
2174565429-DescriptionJp = "Sweet iced tea with a shot of espresso, perfect! ☆"
2712962423-NameJp = "Culture Shock"
2712962423-DescriptionJp = "\"M-Mixing not only syrup but also coffee in black tea?!\"\n\"How uncivilized...! Has the world truly fallen so low?!\""
2618526928-NameJp = "Yoga Time"
2618526928-DescriptionJp = "\"You two are having fun... I'm jealous! When's the next session?\"\n\"No. Never again.\""
4127946330-NameJp = "Cold-Blooded Analysis"
4127946330-DescriptionJp = "\"Do they not feel embarrassed in that outfit?\""
2977465568-NameJp = "A 100 Point Smile"
2977465568-DescriptionJp = "\"I'm only sending this to Sensei, okay?\""
2827413561-NameJp = "Underwater Walk"
2827413561-DescriptionJp = "\"So the rumors of the Sisterhood using water torture were...!\"\n- Kozeki Ui, the conspiracy-minded Library Committee President."
1879850544-NameJp = "Hidden Songstress"
1879850544-DescriptionJp = "\"Seia, your taste is outdated.\" ★"
2117597489-NameJp = "Fiery Grandstands"
2117597489-DescriptionJp = "\"...Having fun, Nagi?\" / \"...? Yes.\" / \"...Great.\""
194393215-NameJp = "Limit Release"
194393215-DescriptionJp = "Haha, what a...big problem."
1849099105-NameJp = "Hard-Earned Memories"
1849099105-DescriptionJp = "\"Secret photographs? What happened to the dignity of mass media?\"\n- Kazamaki Mai, Chief Editor at the Kronos School of Journalism "
1543640472-NameJp = "Wishlist"
1543640472-DescriptionJp = "Small and precious memories fueling hope for tomorrow."
1939176149-NameJp = "Blessing"
1939176149-DescriptionJp = "Drum roll! Your fortune this time is a blessing! Today is now perfect!"
226724583-NameJp = "Blessing"
226724583-DescriptionJp = "It's not a great blessing, but it's close! Spend the rest of the day with a happy smile on your face!"
422101479-NameJp = "Blessing"
422101479-DescriptionJp = "Bullets - Won't get shot\nTroublemakers - Won't meet any\nToday - Hope it's a happy day"
2677997047-NameJp = "Great Blessing"
2677997047-DescriptionJp = "Wish - Will come true\nMoney - Your wallet will overflow\nEncounter - Finally meet the person you were waiting for"
2043188119-NameJp = "Great Blessing"
2043188119-DescriptionJp = "You chose a great blessing! You are the superstar of the year! Congratulations! "
266718355-NameJp = "Great Blessing"
266718355-DescriptionJp = "It's your lucky day! Luck will follow you, and your business will flourish! Your lucky color for the day is beautiful blue!"
1124846343-NameJp = "Great Blessing"
1124846343-DescriptionJp = "Your fortune is a great blessing! Congratulations! The bold challenges you take on will be successful, and everything you do will work out! Believe in yourself and move forward! You got this!"
964504315-NameJp = "Curse"
964504315-DescriptionJp = "Today's Grocery List: 1 can of cream stew, 250g of chicken, 2 potatoes, 3 onions, 1 carrot, 1 bunch of broccoli, 1 bottle of citron vinegar..."
199728885-NameJp = "Curse"
199728885-DescriptionJp = "You have to be careful to avoid food poisoning! I've never had it before though. Anyway, how about some chocolate sea cucumber juice?"
1759134687-NameJp = "Curse"
1759134687-DescriptionJp = "There's no surefire way to recover crushed ingredients. You'll have to boil them and then grind them in a blender to make soup."
4232612005-NameJp = "Curse"
4232612005-DescriptionJp = "I was carrying food, but I fell and spilled it... At least I found a coin right where I fell."
2722903738-NameJp = "Future Blessing"
2722903738-DescriptionJp = "The Future Blessing fortune! Even if you lose now, you'll gain later... Hmm. I wanna eat something, like dango..."
2264344015-NameJp = "Future Blessing"
2264344015-DescriptionJp = "Let's see... Future Blessing! I'll give you the mint octopus pudding I made as a prize!"
3089424248-NameJp = "Future Blessing"
3089424248-DescriptionJp = "Undercooked food isn't too bad since you can always cook it for longer. Overcooked, burnt food is the real problem."
1618617468-NameJp = "Future Blessing"
1618617468-DescriptionJp = "The person who gets this fortune will be lucky...but also suffer. Like finding gold after digging up an entire mountain. Heeheehee. Well, a gourmand's journey is bound to be seasoned by hardship."
839518806-NameJp = "Future Blessing"
839518806-DescriptionJp = "A Future Blessing is a sign that you'll become lucky later. Who knows what the future will bring?"
239549900-NameJp = "Future Blessing"
239549900-DescriptionJp = "Happy news will come in the fall and winter. That's now! Not so lucky in the spring and summer, though..."
3417604566-NameJp = "Small Blessing"
3417604566-DescriptionJp = "The Small Blessing! You'll easily overcome a looming crisis. If you remain on an even path, you'll be at peace... Hmm, I think this is good!"
3872470199-NameJp = "Small Blessing"
3872470199-DescriptionJp = "This is the Small Blessing. It's said that happiness really comes from the small things. Like the rain may stop as soon as you step outside!"
4154538605-NameJp = "Small Blessing"
4154538605-DescriptionJp = "The fortune this time is the Small Blessing! Even if you get confused boarding the subway, you'll get onto the right one!"
1652241604-NameJp = "Small Blessing"
1652241604-DescriptionJp = "They say you need to look to the stars to chart your course. Not the lights on all the passing ships."
2851981489-NameJp = "Small Blessing"
2851981489-DescriptionJp = "May good luck come from hidden encounters. Look forward to opening your eyes... Does this mean my cooking skills will improve?"
228389323-NameJp = "Small Blessing"
228389323-DescriptionJp = "Let's collect the ingredients one by one until the meal can be made!"
3038779302-NameJp = "Modest Blessing"
3038779302-DescriptionJp = "Love - Eye contact with the person you like\nMeet - That person at a festival on the weekend\nDate - Go watch fireworks together"
284642160-NameJp = "Modest Blessing"
284642160-DescriptionJp = "Your fortune is the Modest Blessing. Congrats. Sometimes I wish I could eat until I was so full, that I couldn't eat anymore."
2426075748-NameJp = "Modest Blessing"
2426075748-DescriptionJp = "The moon is bright and clear, with no place for dark clouds... Lunch would be even more delicious under the moonlight. Heeheehee."
1325967005-NameJp = "Modest Blessing"
1325967005-DescriptionJp = "If food is the most important necessity of life, luck is a close second. It's the Modest Blessing. Congratulations."
4022503532-NameJp = "Modest Blessing"
4022503532-DescriptionJp = "Something will turn into happiness. One arrow will hit two geese... I wonder if roasted goose is good."
2197323664-NameJp = "Modest Blessing"
2197323664-DescriptionJp = "You'll survive at the crossroads of life and death. The journey may be difficult, but the destination is auspicious. You'll eat delicious food in the New Year. That's nice to hear!"
294425413-NameJp = "Blessing"
294425413-DescriptionJp = "Meet - The person you're waiting for\nHappiness - Will come\nHelp someone if they're feeling vulnerable"
2086697042-NameJp = "Blessing"
2086697042-DescriptionJp = "With this fortune, you'll advance if you have the right mindset. With a bad outlook, though, things won't go well."
657860840-NameJp = "Blessing"
657860840-DescriptionJp = "There's nothing more gratifying than everyone enjoying the food I make. May you always be lucky this year!"
128516439-NameJp = "Blessing"
128516439-DescriptionJp = "Sensei. It's the Blessing fortune. A single arrow flies across the blue sky, and a deer travels a thousand miles alone... Won't this deer get hungry, though? "
2382060588-NameJp = "Blessing"
2382060588-DescriptionJp = "With this fortune, you're like a flower blooming on an old tree. From now on, much joy will come... For me, I hope that I'll have at least one peaceful day..."
370799142-NameJp = "Blessing"
370799142-DescriptionJp = "For those with good fortune I've made osechi, which is said to be full of blessings for the New Year. Have some before you go!"
1512780410-NameJp = "Great Blessing"
1512780410-DescriptionJp = "Meet - Under the legendary tree\nMoving - Things will improve\nFood - Eat as much as you want on the main street"
997253011-NameJp = "Great Blessing"
997253011-DescriptionJp = "Wow, the Great Blessing. Heeheehee. I wonder what kind of gourmet food is waiting for us this year."
940731399-NameJp = "Great Blessing"
940731399-DescriptionJp = "In the spring of the willow,\nflowers bloom on old branches.\nIn the heavy frost and snow,\na golden sheen shines even brighter."
555506678-NameJp = "Great Blessing"
555506678-DescriptionJp = "Fortune comes like a wave, and turns into a full box of osechi and well-cooked snapper... I especially like the latter!"
3840660582-NameJp = "Great Blessing"
3840660582-DescriptionJp = "You got the Great Blessing. Congrats. I guarantee special news will come.\n*Watch out for imitations."
1744408890-NameJp = "Great Blessing"
1744408890-DescriptionJp = "A gem without a single flaw. Keep polishing it and you'll be even luckier... Yes, I'm gonna devote myself to cooking even more!"

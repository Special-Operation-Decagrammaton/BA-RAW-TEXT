2427412821-DescriptionJp = "Gotcha!"
308105341-NameJp = "Neru (School)"
308105341-DescriptionJp = "And what's this?"
162119221-NameJp = "Neru (School)"
162119221-DescriptionJp = "Hey! Hold it right there!"

439214304-NameJp = "NETZACH"
439214304-DescriptionJp = "デカグラマトンの7番目の預言者。名の起源は、生命の樹の7番目のセフィラ「NETZACH」であると推測されている。\n\n現在は何らかの手段により、鋼鉄大陸と同化している。そのため、原型が何だったのかを知るすべはない。\n\n周囲に存在する全ての無機物を鋼鉄大陸と同じ成分へと変換し、自身の拡張を続けている。拡張限界は推定できない。"
1251359687-NameJp = "MALKUTH"
1251359687-DescriptionJp = "デカグラマトンの10番目の預言者であり、最後の預言者。名の起源は、生命の樹の10番目のセフィラ「MALKUTH」であると推測されている。\n\n生命の樹において、マルクトは炎の剣の道で最後の流れを意味し、この道を辿れば物質的世界からの創造が行われると伝えられている。\n\n意思疎通が不可能な他の預言者とは異なり、人に近い身体を持ち、意思疎通ができる。しかし、言動はどこかズレている印象がある。"
3884845621-NameJp = "イベントチャレンジステージ1ヒント"
3884845621-DescriptionJp = "爆弾が爆発すると生徒に大きな火傷持続ダメージを与えます。\n爆弾が爆発しないよう、回復スキルと広範囲攻撃スキルを活用しましょう。"
86017968-NameJp = "イベントチャレンジステージ2ヒント"
86017968-DescriptionJp = "敵の防御タイプに攻撃タイプをあわせて戦闘を進めましょう。"
3706206590-NameJp = "イベントチャレンジステージ3ヒント"
3706206590-DescriptionJp = "AMASは時間が経過するほど攻撃力が増加します。AMASを迅速に倒しましょう。"
1265950056-NameJp = "イベントチャレンジステージ4ヒント"
1265950056-DescriptionJp = "どちらかの敵のHPが残っている場合、敵が不死身状態になります。\n両方の敵のHPを減らすことで同時に撃破することができます。\n\nアバンギャルド君の被EXダメージ量が大幅に減少し、被特効ダメージ量が大きく加算されます。\nメカワニがEXスキルを使用して炎を放射したあと、15秒間気絶し、被ダメージ量が大幅に増加します。"
2838352374-NameJp = "イベントチャレンジステージ1ヒント"
2838352374-DescriptionJp = "同じ姿のツチノコの中から本物のツチノコを探しましょう。\n偽物のツチノコの弱体状態は弱体状態を解除するスキルで解除されませんが、本物のツチノコの弱体状態を解除すると同時に消えます。\n偽物のツチノコは本物とは違う動きを見せます。\n本物のツチノコを見つけ出し、弱体状態を解除して敵を倒しましょう。"
951156375-NameJp = "イベントチャレンジステージ2ヒント"
951156375-DescriptionJp = "防御力減少スキルを活用して、コノカを攻略しましょう。"
2068938700-NameJp = "イベントチャレンジステージ3ヒント"
2068938700-DescriptionJp = "レナは範囲内の敵を目にすると勇気が減少します。勇気がなくなる前に素早く倒しましょう。"
2249316847-NameJp = "イベントチャレンジステージ4ヒント"
2249316847-DescriptionJp = "コノカが敵のEXスキルを受けると、被ダメージ量が増加する弱体状態が付与されます。\nコノカに付与された弱体状態を弱体状態解除スキルで解除すると、コノカがEXスキルを使用します。コノカのEXスキルは防御タイプが特殊装甲の敵にとても大きなダメージを与えます。\nコノカを手伝って敵を倒しましょう。"
3676923287-NameJp = "イベントチャレンジステージ1ヒント"
3676923287-DescriptionJp = "連鎖爆発トラップが発動するまで耐えると勝利します。\nアケミの攻撃を引火性ドラム缶に誘導すれば連鎖爆発トラップがより早く発動します。\n\nスケバンは時間が経つごとに強くなります。"
1280690466-NameJp = "イベントチャレンジステージ2ヒント"
1280690466-DescriptionJp = "すべての敵の攻撃属性が爆発であることを踏まえて編成してみましょう。\n小隊員を強化するユキノを先に攻略してみましょう。"
2920015713-NameJp = "イベントチャレンジステージ3ヒント"
2920015713-DescriptionJp = "CC状態を活用して京劇部員がEXスキルを使用する前に倒しましょう。"
2740980058-NameJp = "イベントチャレンジステージ4ヒント"
2740980058-DescriptionJp = "ユキノはCCゲージを保有し、累積すると周辺の敵は一定時間EXスキルを使用できなくなります。\n\nコンテナ制御装置を破壊すると特別な味方が登場してサポートします。"

1840858735-NameJp = "Round Table with Tablet"
1840858735-DescriptionJp = "A round table with a tablet that works with touch screen. For some reason, it feels like work goes more smoothly here."
1841568450-NameJp = "Round Table with Lamp"
1841568450-DescriptionJp = "A round table with a small light. For some reason, it seems like it'd create the perfect atmosphere at night."
1418371049-NameJp = "Millennium Pillar Type A"

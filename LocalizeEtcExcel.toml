2122048137-NameJp = "Streets of Thugs Vol. 1"
2122048137-DescriptionJp = "Volume 1 of the Streets of Thugs series, a controversial work famous for the line, \"All we have is loyalty and guts!\" The series is getting favorable reviews because the main character is surprisingly cute, which you wouldn't guess from the title."
3996150169-NameJp = "Samuela \"The Beyond\""
3996150169-DescriptionJp = "A high-end perfume released by the luxury cosmetics brand, Samuela. It's an ultra-hit product famous for its catchphrase, \"Spray it once, be lovely forever.\" It's one of Samuela's twelve masterpieces created by genius perfumer, The Beyond."
493877113-NameJp = "Antique Egg Handicraft"
493877113-DescriptionJp = "An egg-shaped handicraft with beautiful jewels and geometric patterns. Of course, incubating it won't hatch chicks."
2812198344-NameJp = "Mille-Feuille Traditional Parfait"
2812198344-DescriptionJp = "A parfait sold at the Mille-Feuille Cafe, a famous confectionery shop in Trinity. The harmony of sweets with layers of soft serve ice cream, syrup, whipped cream, and fruit is a classic hit!"
610304186-NameJp = "Airbook Rare"
610304186-DescriptionJp = "A trendy laptop product that's one of the students' top three most-wanted items of the year. The expensive price tag doesn't seem to stop anyone."
991149378-NameJp = "Sophisticated Hairbrush"
991149378-DescriptionJp = "A portable hairbrush with a sophisticated, luxurious design. It's a popular gift."
18654891-NameJp = "Nutrient-Packed Multivitamin Gummies"
18654891-DescriptionJp = "Multivitamin gummies. They're fun to eat with their various fruit flavors. You might end up finishing the entire bottle without even realizing, so be careful!"
442885187-NameJp = "Finest Maple Bonsai"
442885187-DescriptionJp = "A maple bonsai that calms your mind just by looking at it. The ever-changing appearance of the leaves according to the four seasons gives off a profound energy."
897935320-NameJp = "Sewing Kit"
897935320-DescriptionJp = "A sewing kit for advanced users that contains tools meant for all possible situations. Even if your clothes or socks get holes, you can patch it up in a jiffy with this kit!"
175940735-NameJp = "Music Concert Ticket"
175940735-DescriptionJp = "A ticket for concerts held regularly in Kivotos. From the classics to contemporary pop music, it's the perfect gift for anyone who loves a wide variety of music."
794340686-NameJp = "Three Times a Day Dumbbell Set"
794340686-DescriptionJp = "A set containing several dumbbells of various weights. Use them three times a day, morning, noon, and evening, for strength training to build great muscles!"
1058688122-NameJp = "Board Game \"The Life\""
1058688122-DescriptionJp = "A fun board game where you can get a job, win the lottery, and travel to space. The unpredictable results of the wheel and dice work just like real life."

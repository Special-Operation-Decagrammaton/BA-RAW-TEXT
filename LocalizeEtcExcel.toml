1847672830-NameJp = "Turtle Mushroom"
1847672830-DescriptionJp = "An exotic mushroom that grows naturally throughout the Shanhaijing district. Contrary to how it looks, its firm texture and great taste make it a delicacy. "
357098688-NameJp = "Black Bamboo Shoot"
357098688-DescriptionJp = "Black bamboo shoots growing in the gardens of Genryumon. Difficult to obtain due to strict management of Genryumon officers."
3708418519-NameJp = "Ginseng Doll"
3708418519-DescriptionJp = "A human-shaped root herb found deep in the mountains of Shanhaijing. It's said to have effects that prolong your life or make you younger."
3320765287-NameJp = "Chocolate Coin"
3320765287-DescriptionJp = "One of the famous snacks of the Golden Fleece. Not a real coin, but popular among students because of its sweet taste."
312190930-NameJp = "Rabbit Sticker"
312190930-DescriptionJp = "A rabbit-shaped sticker used by students. They don't really mean anything. They're easy to make, so most students make their own."
3290352412-NameJp = "Boarding Pass"
3290352412-DescriptionJp = "A boarding pass for the Golden Fleece. Even after boarding, it is best to carry it at all times since it's often needed functions and events."
812405886-NameJp = "Dice"
812405886-DescriptionJp = "Dice like those often found aboard ships. Although they're a simple toy, they are sometimes used to resolve conflicts between students."
3202962982-NameJp = "Event Points"
3202962982-DescriptionJp = "These points are earned each time you progress in an event. The more you earn, the greater the variety of rewards you can receive."
1102568152-NameJp = "Hot Spring Towel"
1102568152-DescriptionJp = "Basic towels provided by Hot Springs Resort No. 227. They're made from rough materials and may cause damage to the skin."
4012080640-NameJp = "Mustache Shampoo"
4012080640-DescriptionJp = "President Cherino's favorite Red Winter Academy special shampoo. Contrary to the name, it's not suitable for washing a mustache."
2585452848-NameJp = "Capybara Bath Bomb"
2585452848-DescriptionJp = "A bath bomb in the shape of a capybara. When you put it in water, it melts and gives off a subtle citrus scent."
1545493133-NameJp = "New Year's Lucky Pouch"
1545493133-DescriptionJp = "A lucky pouch prepared by the Kurokame Gang for New Year's. No one knows what's inside until they open it up. There's actually some pretty good stuff in there."
1215702584-NameJp = "Peroro Kagami Mochi"
1215702584-DescriptionJp = "Kagami mochi made in collaboration with the super popular mascot, Peroro, by the money-hungry Kurokame Gang. For decoration only and cannot be eaten."
130031945-NameJp = "Kurokame Gang Ema"
130031945-DescriptionJp = "Ema sold at the Kurokame Gang's New Year's event. There's a rumor that its effect will increase if you give an offering and make a wish. That's why they're overpriced at 5,000 yen each."
3586118070-NameJp = "New Year Omikuji Token"
3586118070-DescriptionJp = "Token required to pick out a New Year's omikuji. Something the Kurokame Gang created to increase profits. Prizes are awarded according to the results of the fortune-telling."
518432250-NameJp = "Event Points"
518432250-DescriptionJp = "These points are earned each time you progress in an event. The more you earn, the greater the variety of rewards you can receive."
1669990889-NameJp = "Baddie's Apology Letter"
1669990889-DescriptionJp = "An apology letter written by troublemakers that Sensei caught while on Valentine's Day patrol. Surprisingly, the letter is nicely written.   "
2861703465-NameJp = "Confiscated Junk Food"
2861703465-DescriptionJp = "Snacks confiscated from troublemakers during a Valentine's Day patrol. They're said to be black-market products made within underground circles. The junk food taste is popular among troublemakers."
2887327615-NameJp = "Eco-Friendly Trash Bags"
2887327615-DescriptionJp = "Bags of trash collected from various places while on Valentine's Day patrol. Beautification activities are always rewarding. "
3085567581-NameJp = "Valentine's Day Outing Pass"
3085567581-DescriptionJp = "An outing pass needed for any sensei who is busy with Valentine's Day patrol tasks but wishes to meet with students.\n※ Unused outing passes will be converted to 200,000 credits at the end of the event."
1632581989-NameJp = "Wakamo Arrest Warrant"
1632581989-DescriptionJp = "A warrant issued by Valkyrie Police School to arrest Wakamo. It states all of the terrible crimes that Wakamo has committed."
3974882278-NameJp = "Event Points"
3974882278-DescriptionJp = "These points are earned each time you progress in an event. The more you earn, the greater the variety of rewards you can receive."
2114880617-NameJp = "Missal Veil"
2114880617-DescriptionJp = "A folded veil used while praying. It's also useful for covering up sleepy faces during prayers."
4200143845-NameJp = "Hymn Book"
4200143845-DescriptionJp = "A book of Trinity's hymns. Certain verses occasionally become popular and are quoted incessantly or used in advertisements."
2925208730-NameJp = "Cathedral Candle"
2925208730-DescriptionJp = "A candle used in the Trinity Cathedral. Despite its appearance, it's very heavy and sturdy, and can make a hole in the ground if dropped."
315453169-NameJp = "Mushiqueen Card Pack"
315453169-DescriptionJp = "The Ultimate Insect Collection, third expansion pack of the popular trading card game, Mushiqueen. According to Kaede, you can tell whether it contains a rare card just by touching it."
2801049295-NameJp = "Scrimmage Flyer"
2801049295-DescriptionJp = "A flyer announcing the exchange meeting held between Hyakkiyako and Gehenna Academy. The meeting's schedule is printed on it, along with a greeting from Niya, the promoter."
3117990777-NameJp = "Princess Waraku Fan"
3117990777-DescriptionJp = "A fan with a drawing of Chise, a popular student at Allied Hyakkiyako Academy. It's a very popular item among her fans."
1122375527-NameJp = "Ninpero Plush Merch"
1122375527-DescriptionJp = "Ninja character merch sold at the Whirlpool Movie Village. It started as a spin-off of another character, but it slowly gained popularity and became an independent product, which is common in the industry."
2333680348-NameJp = "Materials Box"
2333680348-DescriptionJp = "Boxes of materials have been dumped all over the abandoned resort. They've been there for a long time, so it's unknown what's inside."
923224583-NameJp = "Local Currency"
923224583-DescriptionJp = "The local currency of the Lost Paradise Resort, which was created for the purpose of revitalizing tourism. It's unknown if it's really legitimate, but Shizuko says it's only a matter of time before she can prove it."
1459837138-NameJp = "Momoyodou Shiny Coin"
1459837138-DescriptionJp = "Coins that can be exchanged for souvenirs at the Momoyodou Beach Shack. However, most of the customers seem to think of the coin itself as a souvenir."
2503861371-NameJp = "Shiny Conch"
2503861371-DescriptionJp = "A conch with a smooth and silky exterior. Chise says that if you put it to your ear and listen, you'll be naturally inspired to write poetry."
3295998236-NameJp = "Summer Ninjutsu Codex Scroll"
3295998236-DescriptionJp = "A scroll with various original ninjutsus that can be used in summer. There are many writings related to summer safety. Safety comes first, even for ninjas!"
4253247347-NameJp = "Deep Sea Hot Springs Island Resort Ticket"
4253247347-DescriptionJp = "Resort agreement that gives the holder the right to use the Deep Sea Hot Springs Island Resort."
2442357514-NameJp = "Mushiqueen Cruise Resort Ticket"
2442357514-DescriptionJp = "Resort agreement that gives the holder right to use the Mushiqueen Cruise Resort."
4133487383-NameJp = "Ultra Luxury Resort Ticket"
4133487383-DescriptionJp = "Resort agreement that gives the holder right to use the Ultra Luxury Resort."
125540590-NameJp = "Dessert Coupon"
125540590-DescriptionJp = "A coupon issued at a famous dessert shop. Collect and take them to the shop. There's a specific dessert that can be acquired with a certain number of coupons."
3387762043-NameJp = "Mint Chocolate Parfait"
3387762043-DescriptionJp = "A mint chocolate parfait with a unique taste. It's fresh and sweet at the same time."
806537948-NameJp = "Macaron"
806537948-DescriptionJp = "Macarons that fit in the palm of your hand. There are so many different flavors!"
336149210-NameJp = "Rolled Wafer"
336149210-DescriptionJp = "A chocolate-flavored snack that's rolled up into a long, hollow piece. Some students put it in their mouth and shake it to look cool."
2418932586-NameJp = "Event Points"
2418932586-DescriptionJp = "These points are earned each time you progress in an event. The more you earn, the greater the variety of rewards you can receive."
1874282437-NameJp = "Beanbag"
1874282437-DescriptionJp = "A soft cloth pouch filled with beans and sand. It's light enough that there's no risk of hurting anyone, so it's frequently used in throwing competitions. In a few rare cases, explosive beanbags have been discovered."
3048078452-NameJp = "Millennium Flag"
3048078452-DescriptionJp = "A small flag that displays Millennium's emblem. It's commonly used to designate a gathering place for students."
2524752608-NameJp = "Whistle"
2524752608-DescriptionJp = "No ordinary whistle, this device features advanced technology from the Engineering Department. The vibrations caused by blowing into it trigger an electrical signal, which activates a speaker. It plays a recording of a bird chirp."
2871055877-NameJp = "Sports Drink"
2871055877-DescriptionJp = "A sports drink developed at Millennium. Thanks to large amounts of data collected by the Athletic Training Club, drinking this drink will hydrate you faster than any others."
1469297879-NameJp = "Relay Baton"
1469297879-DescriptionJp = "A baton used in relays. Don't worry; while it looks like an old stick hand grenade, it's actually been retrofitted with an electrical sensor that prevents it from exploding. As long as it's handed off to the next runner in time, that is."
2043178916-NameJp = "Red Bean Bun"
2043178916-DescriptionJp = "A simple bun filled with red bean paste. It's been wrapped in plastic for the bread eating competition. While simple, these buns are extremely popular among some students from Valkyrie Police School."
3227336825-NameJp = "Information Brochure"
3227336825-DescriptionJp = "A brochure handed out by the Kivotos Halo Festival Headquarters. It contains a complete game schedule, and even shows popular restaurants near the stadium."
2905328212-NameJp = "Christmas Gift"
2905328212-DescriptionJp = "Everyone is counting down the days until Christmas! Better be good, or you won't get presents..."
1128970523-NameJp = "Christmas Stocking"
1128970523-DescriptionJp = "A stocking, hung with the hopes it will be filled with presents. In a pinch, you could wear it to keep your feet warm."
4179360865-NameJp = "Candy Cane"
4179360865-DescriptionJp = "Red-and-white candy shaped like a cane. It smells like peppermint. "
1459661267-NameJp = "Eggnog"
1459661267-DescriptionJp = "A hot drink made with milk, eggs, and sugar. It's sure to warm you up on even the coldest day. "
1234657893-NameJp = "Event Points"
1234657893-DescriptionJp = "These points are earned each time you progress in an event. The more you earn, the greater the variety of rewards you can receive."
2264400688-NameJp = "Red and White Fish Cakes"
2264400688-DescriptionJp = "Fish cakes in two colors, white and red. The red color is said to represent auspiciousness and joy, while the white color represents sanctity."
3707337679-NameJp = "Snapper"
3707337679-DescriptionJp = "A fish that is a necessity for an osechi meal, paired with shrimp. Celebrate New Year's right with some delicious snapper!"
2091304235-NameJp = "Omikuji Exchange Ticket"
2091304235-DescriptionJp = "Everyone says that it's just for fun, but it still feels a bit ominous when you get a bad one... "
2629342802-NameJp = "Multi-Dimensional Computational Unit"
2629342802-DescriptionJp = "A piece of a computational device from the Ark of Atrahasis. The circuits that make it up are incomprehensibly complicated."
1015134010-NameJp = "Dimension Engine Part"
1015134010-DescriptionJp = "A piece of the Dimension Engine. On its own, it's a simple piece of machinery and doesn't seem very useful."
3353425290-NameJp = "Space Choco-Burger"
3353425290-DescriptionJp = "A choco-burger that was vacuum-packed to use as a space ration. Exactly why something like that might be found here is up for debate even now."

2775830511-DescriptionJp = "A noise maker that can be deployed in case of an emergency during missions. It can be used to divert attention if you're outnumbered or on the verge of being caught. Make a mad dash for safety as soon as you activate it!"
1728300996-NameJp = "Silenced Rounds"
1728300996-DescriptionJp = "Silenced rounds for when your regular silencer just isn't sneaky enough. The bullet itself barely makes any sound. The bullets make almost no noise, and any heat generated when the shot is fired dissipates almost immediately. Of course, it's less powerful than a regular bullet, but these qualities make it ideal for infiltration missions."
3426576768-NameJp = "Recovery Medicine"
3426576768-DescriptionJp = "Medicine for tired bodies or minor injuries. It cannot be used to cure fatigue or large wounds. In fact, it's better to just avoid getting hurt in the first place, if possible."
282905937-NameJp = "Wire Cutter"
282905937-DescriptionJp = "A wire cutter that can be used to disarm security cameras, claymores, and other similar devices. Its sharp edge guarantees results, but it wears out quickly and can only be used a handful number of times. Choose which targets to disarm carefully."
1844419868-NameJp = "Security Key"
1844419868-DescriptionJp = "An authentication security key that can be used to open security gates and deactivate locks. Since it's an important item that shouldn't be lost, let's return it to the owner...without getting caught, of course. But for now, let's put it to good use."
3949011075-NameJp = "USB"
3949011075-DescriptionJp = "A special USB with many functions. People used stamps made of wood or jade in past, but times have changed."
1153341951-NameJp = "OTP"
1153341951-DescriptionJp = "Special authentication device used for an unbreachable security system. Even if you know the password, it's impossible to deactivate the system without this item. On the other hand, as long as you have it..."
2641440785-NameJp = "Koyuki"
2641440785-DescriptionJp = "Help me!!"

4293010634-DescriptionJp = "A business district is located next to Tri-Square. It's a modern and stylish space with complex streets and buildings."
1977010791-NameJp = "Plato Avenue"
1977010791-DescriptionJp = "The street where the huge art gallery is located. Besides that, the avenue itself is full of art. It's a must-see."
1729072075-NameJp = "Shiratori Neighborhood Park"
1729072075-DescriptionJp = "Despite the size of the park, there aren't many visitors. It's still an important attraction."

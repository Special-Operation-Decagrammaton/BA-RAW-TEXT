618503547-DescriptionJp = "A hit product from the luxury cosmetics brand Samuela. It provides lightweight camouflage capabilities that melt into your skin! Be camera-ready any time, any place!"
1773086852-NameJp = "Fine Cookie Set"
1773086852-DescriptionJp = "A luxury cookie set from Schrodinger, famed for its rich, buttery sweetness. There's a fifty percent chance that it contains something other than cookies."
2238627204-NameJp = "Guns, Charm, and Zeal"
2238627204-DescriptionJp = "Guns, charm, and zeal! The bestselling book of the year investigates and analyzes the origins and roots of Kivotos pop culture."
346808410-NameJp = "Astronomical Telescope"
346808410-DescriptionJp = "This astronomical telescope is deemed the standard for hobbyists by the Kivotos Astronomy Observatory."
3391000326-NameJp = "Gamegirl Color Replica"
3391000326-DescriptionJp = "\"Life is your arcade!\" Go retromania wild with this vintage reproduction of the classic Gamegirl Color."
2936755317-NameJp = "MX-Ration C-Type Dessert Flavor"
2936755317-DescriptionJp = "Calories equal Combat Power!"
1249782817-NameJp = "Matcha Ramune"
1249782817-DescriptionJp = "A matcha-flavored, carbonated soft drink. Green and refreshing!"
2902432180-NameJp = "Jellies Cushion"
2902432180-DescriptionJp = "The star of \"Fruitjellies\" is back! In cushion form! They've managed to recreate the concept of a jelly eating another jelly of the same color in great detail!"
1148052880-NameJp = "Extraordinary Cottontail Detective: Case of the Misty Hot Spring Slide"
1148052880-DescriptionJp = "Whenever there's a case, these snow-white bunny ears are sure to crack it! Volume 3 of the Extraordinary Cottontail Detective series! The stage is set at the hot springs!"
1561623078-NameJp = "Ring Bit"
1561623078-DescriptionJp = "\"Make fitness fun with games!\" This exercise equipment uses an O-ring to make working out at home easy and fun, whether for strength training or slimming down!"
293569137-NameJp = "Buried Treasure Map"
293569137-DescriptionJp = "There's treasure out there somewhere! A map of the sites where the three great gold treasures of Kivotos are supposed to be buried."
3310161849-NameJp = "Cosplayer Coke-Bottle Glasses"
3310161849-DescriptionJp = "Wear these to instantly look like a genius! Einstein's got nothing on you (in appearance, anyway)! ※ Note: Wearing these will not raise your IQ."
1301636205-NameJp = "World's Most Useless Gadget"
1301636205-DescriptionJp = "Absolutely useless, but cute! Still, it's completely pointless. And yet, its cuteness totally makes up for it! This trinket is among the top five best toys to give to a special friend."
535298119-NameJp = "Teddy Bear with Bow"
535298119-DescriptionJp = "An ordinary but absolutely darling teddy bear. A popular product among students who love all things cute and adorable."
3961391528-NameJp = "Movie Ticket"
3961391528-DescriptionJp = "\"Snuggle up with your special someone and watch a movie!\" This movie ticket is accepted at any theater and admits two people!"
2944986556-NameJp = "30-Color Paint Set"
2944986556-DescriptionJp = "A professional paint set with tubes in a variety of thirty colors. Time to go and paint the whole wide world!"
4077917950-NameJp = "Classical Poetry Anthology"
4077917950-DescriptionJp = "An anthology of classical poetry. Very classy. Provides all the sophistication of classical literature right at your fingertips."
3946342470-NameJp = "Cute Dishware Set"
3946342470-DescriptionJp = "A dishware set painted with adorable animal characters. This product has made the top ten list of best selling dishware in Kivotos year after year."
762300502-NameJp = "Brain Teaser Puzzle Cube"
762300502-DescriptionJp = "\"If you can solve this, then you deserve your place at Millennium!\" A tricky cube for advanced puzzle-solvers certified by Millennium Science School."
3238447321-NameJp = "Large Whole Cake"
3238447321-DescriptionJp = "The mere sight of this massive cake is enough to satisfy the senses. Its caloric info is detailed underneath."
1648390167-NameJp = "Luxury Buffet Ticket"
1648390167-DescriptionJp = "This ticket grants access to a luxury buffet operated by the best chef in all of Kivotos. As you might expect, it's very expensive."
1143324025-NameJp = "Potted Bug-Eating Plant"
1143324025-DescriptionJp = "A potted plant that's popular among those with eccentric taste. Apparently, the way it devours insects is cuter than you'd think."
1569225040-NameJp = "Extravagant Gilded Jar of Greed"
1569225040-DescriptionJp = "An obviously exorbitant-looking jar gilt with gold leaf. Watch out for counterfeits!"
2112008978-NameJp = "Wind-Up Music Box"
2112008978-DescriptionJp = "A fancy solid wood music box with vintage charm. Very popular among collectors."
2651867463-NameJp = "Embroidered Handkerchief"
2651867463-DescriptionJp = "An exquisitely embroidered handkerchief."
3408710330-NameJp = "Encyclopedia"
3408710330-DescriptionJp = "From \"that tie thing\" for tying bread bags to \"the grass thing\" that goes in bento boxes, everything you've ever wanted to learn about can be found right here."
2665872474-NameJp = "Health Food Supplement"
2665872474-DescriptionJp = "Feel rejuvenated with just one bite! This supplement is the perfect gift for your special someone."
922488053-NameJp = "Summer Floaty"
922488053-DescriptionJp = "It's summer! To the beach! A safety device for swimmers of all experience levels. It'll have you ready for anything with its cute and fancy design!"
1777637643-NameJp = "Lace Pillow"

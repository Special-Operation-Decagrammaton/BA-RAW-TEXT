4122424050-NameJp = "Chocolate Potato Chips"
4122424050-DescriptionJp = "Potato chips coated with chocolate on one side. The sweetness of chocolate complements the crunchy texture of the chips, but it doesn't seem like Momoka cares for them."
2341679944-NameJp = "Angel Chocolate"
2341679944-DescriptionJp = "PB chocolate from the convenience store chain Angel 24. Sora accidentally placed a large order, but with Sensei's help, she succeeded in selling it all."
2435557875-NameJp = "Bulk Mini Chocolates"
2435557875-DescriptionJp = "Mini chocolates that Rin bought in bulk and left in the reception room to eat while working. Just normal mini chocolates with nothing special about them."
2724075845-NameJp = "Arona's Chocolate Ginger Cookies"
2724075845-DescriptionJp = "Chocolate ginger cookies that Arona baked. Sensei and Arona are depicted with white chocolate on top of the cookies."
1567224539-NameJp = "Peroro Valentine"
1567224539-DescriptionJp = "Peroro-shaped chocolate sold on Valentine's Day. It's very popular among fans because it's a limited seasonal product."
984677767-NameJp = "Ration D-Type"
984677767-DescriptionJp = "Military chocolate made from oats and cocoa powder. It's high in calories, making it suitable for long-term missions."
1666908815-NameJp = "Happy Hot Chocolate"
1666908815-DescriptionJp = "Hot chocolate that Hanae makes. With one sip, your fatigue melts away and you feel happy."
3922278991-NameJp = "Schokolade Gehenna"
3922278991-DescriptionJp = "A high-calorie, high-caffeine dark chocolate made at Gehenna. People often mistake it for a can of shoe polish since it is packaged in a round can."
342988654-NameJp = "Bulk Chocolate"
342988654-DescriptionJp = "Chocolate that Akari bought in bulk to prepare for the chocolate eating contest. Gives ordinary people stomachaches by simply looking at it."
741491105-NameJp = "Chocolate Dango"
741491105-DescriptionJp = "Dango dipped in chocolate sold at a famous traditional candy store. The harmony of flavors tastes surprisingly great."
2503165795-NameJp = "Death Love"
2503165795-DescriptionJp = "A free gift that comes with the purchase of Black Death Poison's limited edition Valentine's album, \"Love Is Conquered by Pulling Out the Heart\". It's soft and sweet despite how spooky it looks."
3659929614-NameJp = "Rider's Snack"
3659929614-DescriptionJp = "An energy bar that Shiroko always carries when cycling. The energy bar is full of chocolate-coated nuts that give you energy as soon as you take a bite."
3042768744-NameJp = "Chocolate Ocean Friend"
3042768744-DescriptionJp = "Whale-shaped chocolate sold as a souvenir at the Maritime Museum. It's much larger than the other chocolate fish."
1510394578-NameJp = "Desert Rose"
1510394578-DescriptionJp = "Rose-shaped chocolate sold at the Abydos station. They're based on desert rose stones and make for a popular gift."
2394567841-NameJp = "Venus' Chocolate"
2394567841-DescriptionJp = "Risque chocolates for adults. They don't seem to be very popular due to their explicit shape."
367299249-NameJp = "Wiretapping Device No. 14"
367299249-DescriptionJp = "A wiretapping device made by Kotama to look like chocolate. It doesn't seem like she wants it to be discreet."
919440775-NameJp = "Hot Cocoa Can"
919440775-DescriptionJp = "A chocolate-flavored canned drink mainly sold in vending machines. The heat from the can helps warm the body."
3490934017-NameJp = "Chocolate Pave Set (Receipt Inc.)"
3490934017-DescriptionJp = "A chocolate gift set that Yuuka bought for Sensei. Although it's premium chocolate that costs over 10,000 yen, it comes with a receipt stating it costs 5,000 yen for some reason."
419901229-NameJp = "Hero Chocolate (Item)"
419901229-DescriptionJp = "A limited-time chocolate item from the RPG that Yuzu plays with Sensei. It slightly recovers the player's HP when eaten."
3659962553-NameJp = "Homemade Chocolate Slime"
3659962553-DescriptionJp = "A homemade chocolate item by Aris based on a slime monster from a game. Its appearance leaves much to be desired."
941224173-NameJp = "Chocolate Frenzy MAX"
941224173-DescriptionJp = "A chocolate-flavored Frenzy MAX sold for the Valentine's Day season. It tastes nasty, but it has an excellent energizing effect."
1781832965-NameJp = "Chocolate Spray"
1781832965-DescriptionJp = "A spray that dispenses chocolate instead of ink. It can be used to sweeten up the world according to Maki."
4075915701-NameJp = "Chocolate Shell Mk.2"
4075915701-DescriptionJp = "A chocolate shell developed by Hibiki for Valentine's Day. It creates a huge chocolate swamp wherever it hits when fired."
2579538323-NameJp = "Chocolate Screw"
2579538323-DescriptionJp = "Chocolate made in the shape of a screw and covered in silver foil. It cannot be used as a tool despite its striking resemblance to a real screw."
3469911388-NameJp = "Cherenka"
3469911388-DescriptionJp = "Red Winter Academy's special milk chocolate produced by the Red Winter School Lunch Club. Cherino has already taken a bite of it."
1188251464-NameJp = "Improved Cherenka"
1188251464-DescriptionJp = "An improved version of the standard Cherenka with a cute illustration drawn by Tomoe. It tastes almost exactly the same as original Cherenka."
3845682331-NameJp = "Cacao Bean"
3845682331-DescriptionJp = "A cacao bean that Nodoka barely managed to afford and intended to give to Sensei as a gift. It's not sweet, but it has a good flavor when brewed like tea."
410737829-NameJp = "Immortality Elixir (Failure)"
410737829-DescriptionJp = "A new elixir made by Saya with chocolate as the base. A mistake during development resulted in a plain chocolate-flavored drink instead of an actual elixir."
1298182383-NameJp = "Rum Bonbons"
1298182383-DescriptionJp = "Elegantly-scented chocolate bonbons with rum. They are a bit mature for students to eat."
125955518-NameJp = "Chocolate Cuffs"
125955518-DescriptionJp = "Chocolate made in the shape of handcuffs. They're wrapped up in silver foil and look pretty real, but obviously don't work as actual handcuffs."
1951960570-NameJp = "Special Chocolate Cruller"
1951960570-DescriptionJp = "Master Donuts' special chocolate cruller only sold during Valentine's Day season. The special sprinkles add more sweetness."
711391590-NameJp = "Chocolate Haniwa"
711391590-DescriptionJp = "Haniwa-shaped chocolate prepared by Hanako. It's a bit creepy."
4101876-NameJp = "Little Bullet"
4101876-DescriptionJp = "Chocolate from Hasumi in the shape of a sniper rifle bullet. It may be small in size, but it's amazingly sweet."
2407160249-NameJp = "Hina's Homemade Chocolate"
2407160249-DescriptionJp = "Chocolate from Hina made by courageously overcoming her shyness. It doesn't look pretty, but the heart that went into making it is more beautiful than anything else."
1422578612-NameJp = "A Relaxing Bite"
1422578612-DescriptionJp = "Chocolate made with ingredients carefully selected by Ako. She purposefully made chocolate that can be consumed habitually, just as good secretaries approach their work."
87498756-NameJp = "Delicious Chocolate! Really!"
87498756-DescriptionJp = "Chocolate made from ingredients that Izumi thinks are the best for chocolate. Delicious according to Izumi. It is especially salty and savory."
1899678676-NameJp = "Boss' Finest Chocolate"
1899678676-DescriptionJp = "The finest chocolate, purchased online by Aru to show appreciation for Sensei's work as her business partner...though, it's actually quite common. Still, it's the thought that counts."
171489856-NameJp = "Roulette from Hell"
171489856-DescriptionJp = "Prank chocolate that lit up Mutsuki's eyes when she found it online. The unlucky winner gets a taste of hell. It's the perfect product for pranking friends."
2099851060-NameJp = "Mug of Hot Cocoa"
2099851060-DescriptionJp = "Hot cocoa that Fuuka made for Sensei. It's warm and sentimental, and you can feel Fuuka's sweet kindness emanate from it."
1852286999-NameJp = "Gave-It-All Chocolate"
1852286999-DescriptionJp = "Homemade chocolate for Sensei that Juri gave everything she had to make. Taste aside, Juri's sincerity can be felt just by looking at it."
1269992298-NameJp = "Our Time Together"
1269992298-DescriptionJp = "The finest chocolate cake that Serika received from a part-time job she worked with Sensei. The taste of the sweet and fluffy cake is mixed with the taste of the sweat they'd shed together working."
265930468-NameJp = "Chocolate Gift Set"
265930468-DescriptionJp = "A gift set of chocolate candies bought at a department store with Sensei. It makes for the best Valentine's Day gift because it contains an assortment of candy that one never tires of."
689413464-NameJp = "The Final Choice"
689413464-DescriptionJp = "The best product that Sumire found after testing 100 different exercise supplements for Sensei. You'll feel full for the entire day after just one serving."
3328209817-NameJp = "Advance! Upalupa Chocolate"
3328209817-DescriptionJp = "Chocolate with a toy that Momoi pulled from a crane game. A mascot character from the popular fighting game \"The Fist of Cassiopeia - Upalupa Great Battle\" is included. There are seven types in total."
3385816833-NameJp = "Midori's Homemade Chocolate"
3385816833-DescriptionJp = "Homemade chocolate that Midori woke up early to make for Sensei. Wanting to be the first person to give chocolate to Sensei, her heart was warm and puffed up with anticipation while making it."
3589704604-NameJp = "Chocolate Tsujiura Senbei"
3589704604-DescriptionJp = "Slightly strange chocolate crackers prepared by Chise that contain various idioms. Most of the content is normal, but on rare occasions, you may get one with something absurd written on it."
3842989732-NameJp = "Momoyodou Limited Dessert"
3842989732-DescriptionJp = "A limited-edition dessert sold by Momoyodou in celebration of Valentine's Day. It is a special item that reflects the preferences of a certain regular customer. In other words, it's mostly made for Sensei."
3251730635-NameJp = "Chocolate Ninja Set No. 49!"
3251730635-DescriptionJp = "A set of various chocolate must-have ninja tools. Izuna wanted to taste it with her lord and managed to get by standing in line early in the morning. Note: Cannot actually be used as tools."
4247091559-NameJp = "Chocolate Sleep Kit"
4247091559-DescriptionJp = "A sleeping kit for Valentine's Day prepared specifically by Tsubaki for Sensei, who is always tired from overtime work. It costs 3,980 yen in total."
2771361458-NameJp = "Wakamo's Love Chocolate"
2771361458-DescriptionJp = "Homemade chocolate made with Wakamo's overflowing, uncontrollable love. However, it is uncertain if love really is the only thing it's made of."
1572630441-NameJp = "Gourmet Matcha Chocolate"
1572630441-DescriptionJp = "Matcha-flavored chocolate that Haruna made with Sensei to prove a theory about gourmet chocolate. You can taste the bitterness as well as the sweetness that comes from her grateful heart."
3743008500-NameJp = "Skullman, the Valentine Saint"
3743008500-DescriptionJp = "A chocolate version of \"Skullman, the Grim Reaper\" prepared by Azusa. This is a limited-edition item that can only be obtained during the Valentine's Day season."
1084418779-NameJp = "Lovely Cross Line"
1084418779-DescriptionJp = "Famous chocolate brought by Koharu. A premium mixture of white and dark chocolate, it's known for the cross in the center."
2742248602-NameJp = "Twinkling Star"
2742248602-DescriptionJp = "Star-shaped chocolate that Suzumi bought at a convenience store. It is wrapped in gilt and shines brightly."
663608497-NameJp = "Chocolate Sister Figure"
663608497-DescriptionJp = "A Sister figure gifted by Mari. It's made of chocolate. It may have been for display rather than for eating."
848260985-NameJp = "Bead Chocolate"
848260985-DescriptionJp = "Special chocolate in the shape of beads so that chocolate doesn't get on your hands or leave crumbs. It is popular among avid readers, including Shimiko."
1900401189-NameJp = "Be With You"
1900401189-DescriptionJp = "Serina's homemade chocolate. The sweet taste calms the heart."
4183660781-NameJp = "Pennyroyal Chocolate Mint"
4183660781-DescriptionJp = "A specially-processed chocolate mint prepared by Airi. It's often gifted among enthusiasts due to its rarity."
1868703267-NameJp = "Limited Yoshimi Edition"
1868703267-DescriptionJp = "Yoshimi's homemade chocolate. Can be considered a limited edition that cannot be seen anywhere else."
355355427-NameJp = "Chocolate Over Words"
355355427-DescriptionJp = "Chocolate seemingly made by Natsu. It's a rather simple design and is intended to be a substitute for much of Natsu's speech."
2098665142-NameJp = "Homemade Fortune Chocolate"
2098665142-DescriptionJp = "Fated chocolate that Chinatsu prepared. Various phrases are written inside."
3487183095-NameJp = "Bandaged Chocolate"
3487183095-DescriptionJp = "Chocolate Sena made whenever she could find time while on call. She couldn't find any wrapping paper, so she wrapped it in a clean bandage instead."
3066393242-NameJp = "Cacao 99.99%"
3066393242-DescriptionJp = "Very expensive chocolate Haruka bought for Sensei. You may be a good fit for Problem Solver 68 if the 99.99% cacao rating doesn't faze you."
3579363383-NameJp = "Twisted Valentine"
3579363383-DescriptionJp = "Chocolate Asuna prepared for her master for Valentine's Day. It underwent a very minor modification during the making process."
304962670-NameJp = "Made By Maid"
304962670-DescriptionJp = "Akane's homemade chocolate. The chocolate is very well made, showing off her skills as a maid."
1933815846-NameJp = "Chocolate Omurice"
1933815846-DescriptionJp = "Omurice prepared by Karin for Valentine's Day. A heart is drawn on the omurice with chocolate instead of ketchup."
1957428602-NameJp = "Chocolate Dragon Engraving"
1957428602-DescriptionJp = "A chocolate engraving of a dragon that Neru brought. There's no way to find out how or where she got it."
1255509912-NameJp = "Valentine's Origins"
1255509912-DescriptionJp = "Chocolate made by Kotori to explain the origin and significance of Valentine's Day. Although it looks shabby, it tastes great."
1303875154-NameJp = "Chocolate Sakazuki"
1303875154-DescriptionJp = "Chocolate in the shape of a drinking glass brought by Pina. Since it is a Valentine's Day souvenir, it is not actually a drinking glass, and you cannot fill it with alcohol."
1082089594-NameJp = "Almond Crimson"
1082089594-DescriptionJp = "Chocolate-covered almonds left by Tsurugi. The glass bottle is tied with a cute red ribbon."
3411154794-NameJp = "Messily Wrapped Chocolate"
3411154794-DescriptionJp = "Handmade chocolate wrapped clumsily by Kokona, though she'll never admit it was her handiwork. You'd better eat it alone, while no one's watching."
421170184-NameJp = "Chocolate Truffles for Children"
421170184-DescriptionJp = "Chocolate truffles that Hinata keeps on hand to give to children who visit the cathedral. Hinata apparently knows the flavor of every type of truffle."
412848971-NameJp = "Squishy Chocolate Cookie"
412848971-DescriptionJp = "Chocolate chip cookies made by Ui. She says that she used a recipe that doesn't leave crumbs."
1622643101-NameJp = "Strawberry-Chocolate Cake"
1622643101-DescriptionJp = "A slice of chocolate cake topped with fresh strawberries. Kazusa spent a lot of time picking it out, so please respect that."
2747826200-NameJp = "Small Wrapped Chocolate"
2747826200-DescriptionJp = "A small, neatly-wrapped Valentine chocolate. Hiyori says she's given up everything for it."
2837160480-NameJp = "Thoroughly-Wrapped Chocolate"
2837160480-DescriptionJp = "An exceedingly well-wrapped Valentine chocolate. The complicated wrapper seems to reflect Misaki's personality."
4062180493-NameJp = "Flowers and Chocolate"
4062180493-DescriptionJp = "Handmade chocolate and flowers personally grown by Atsuko. A princess is sure to have many secrets."
3932209420-NameJp = "Decadent Chocolate"
3932209420-DescriptionJp = "The finest of chocolates prepared by Saori. Many happenings occurred behind the scenes in the process of their creation."
2263489181-NameJp = "Cherry Blossom White Chocolate"
2263489181-DescriptionJp = "Mimori's special Cherry Blossom White Chocolate. They say Mimori pours her very heart into making it. As for the other rumor...it probably has nothing to do with mind reading. Probably."
170445747-NameJp = "Ultimate Chocosaur"
170445747-DescriptionJp = "The ultimate chocosaur, created by Kaede. Unfortunately, she didn't manage to successfully \"excavate\" any of her fossil chocolates, but the experience inspired her. She combined the remaining pieces of chocolate together to create this. \"It's the strongest dinosaur in history!\" - Kaede."
566203770-NameJp = "Half-Melted Holland Lop Chocolate"
566203770-DescriptionJp = "Tsukuyo's cute Holland Lop Rabbit character chocolate. She may have been holding it a bit too close, and the shape has changed a little..."
2104744538-NameJp = "Delicate Yet Beautiful Super Genius Hacker's Chocolate"
2104744538-DescriptionJp = "A chocolate made by Himari in her own image. After much logical deliberation, she made the rational decision that you needed to go back to Schale to eat it."
3304317128-NameJp = "Iroha's Handmade Chocolate Breadsticks"
3304317128-DescriptionJp = "Handmade chocolate breadsticks made by Iroha. One of them has a small mark on it..."
902334212-NameJp = "Ninjutsu Research Club Badge Chocolate Set"
902334212-DescriptionJp = "A special chocolate custom-ordered by Michiru. She fumbled and stumbled her way through the gift-giving process, but her love for her classmates and her respect for Sensei couldn't be clearer."
813659355-NameJp = "Chocolate Carrot Cake"
813659355-DescriptionJp = "Miyako baked this carrot cake with lots of chocolate. Aren't very sweet foods supposed to be bad for rabbits, though?"
490342082-NameJp = "Chocolate S'mores"
490342082-DescriptionJp = "Chocolate s'mores made by Moe. The calories in this sweet marshmallow and chocolate combo are...destructive."
1288390774-NameJp = "Chocolate Caramel Ration"
1288390774-DescriptionJp = "A chocolate caramel ration that Saki gave you. It's popular among guards on duty at night who need help staying awake. Saki herself assured you many times that it has nothing to do with Valentine's Day."
1222376462-NameJp = "Chocolate Bark"
1222376462-DescriptionJp = "A handmade chocolate bark from Miyu. She was supplied some chocolate and mixed it with fruit she gathered from the mountains. Why are the chocolate pieces all shaped like leaves, though?"
4196510691-NameJp = "Chocolate Ink"
4196510691-DescriptionJp = "Chocolate ink that Noa bought, possibly as a joke. It's not practical for writing, as it doesn't transfer well to quills and spoils easily, but it's perfect if you want to make a statement about your feelings."
70201916-NameJp = "Special Chocolate Medal of Merit"
70201916-DescriptionJp = "A chocolate medal awarded to Marina for her contribution to the Cherenka. It's a testament to Marina's hard work and pride."
967689799-NameJp = "Shigure's Bittersweet Special"
967689799-DescriptionJp = "A non-alcoholic chocolate cocktail mixed by Shigure. The trick is to add a square of bittersweet chocolate at the end for a clean, balanced taste. "
3442222452-NameJp = "Chick-Shaped Chocolate"
3442222452-DescriptionJp = "Chocolates that Mine swears are medical supplies. If this is medicine, it's strangely delicious, and the packaging is unusually cute."
18239407-NameJp = "Chocolate-Covered Grapefruit"
18239407-DescriptionJp = "A snack Ayumu enjoys, chunks of dried grapefruit dipped in chocolate. Since it has caffeine, theobromine, and plenty of vitamins, it should help with feeling fatigued... Or something like that."

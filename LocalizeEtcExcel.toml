589252219-NameJp = "Beach Shack Meal Ticket"
589252219-DescriptionJp = "A shabby meal ticket that can be used at the Beach Shack."
3265516866-NameJp = "Weird Fireworks"
3265516866-DescriptionJp = "Has the shape of a cute missile."
4230562605-NameJp = "Ice Cooler"
4230562605-DescriptionJp = "An ice cooler that can store fruit and drinks at a cool temperature. It's also effective at storing temperature-sensitive firearms."

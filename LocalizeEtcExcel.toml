344772093-DescriptionJp = "A badge with the logo of the luxury brand Veronica embroidered onto it. It looks luxurious on any product, no matter where you place it."
2127407973-NameJp = "Kazeyama Patch"
2127407973-DescriptionJp = "A patch printed with the logo of military specialty brand Kazeyama. The velcro on the back makes it easy to attach and remove from clothing."
3784559011-NameJp = "Coco Devil Silver Badge"
3784559011-DescriptionJp = "A silver badge imprinted with the logo of the gothic brand, Coco Devil. It can be worn like a brooch by using the safety pin on the back."
589220143-NameJp = "Street Badge"
589220143-DescriptionJp = "A badge released by the street fashion brand Triple Step. The company's logo is printed in large letters to show off the brand."
1494732916-NameJp = "Tennis Headband"
1494732916-DescriptionJp = "A tennis headband from Serval, a sportswear brand. It's made of a powerful moisture-absorbing material to handle sweating during exercise."
3940891435-NameJp = "Scrunchie"
3940891435-DescriptionJp = "A scrunchie made of a satin material with good elasticity. Make sure to tie your hair up with this scrunchie when eating hot soup!"
3392023658-NameJp = "Momo Hairpin"
3392023658-DescriptionJp = "A hairpin with MomoTalk's peach-shaped charm. Rubbing the charm gives off a subtle peach scent."
2520092463-NameJp = "Winged Hairpin"
2520092463-DescriptionJp = "A hairpin with angel wings made by the luxury brand Veronica. Ironically, it's not very popular with Trinity students."
765040081-NameJp = "Multi-Purpose Hairpin"
765040081-DescriptionJp = "A hairpin with a sharp end that can be used for a variety of purposes, including as a bottle opener or pocketknife. Just remember not to run your fingers through your hair by accident!"
277995823-NameJp = "Bat Hairpin"
277995823-DescriptionJp = "A bat-shaped hairpin resembling a black ribbon. Whoever wears it takes on the charm of a devilish troublemaker."
1353993108-NameJp = "Calligraphy Hairpin"
1353993108-DescriptionJp = "A hairpin made of letters. Although the word itself doesn't mean anything, it attracts the attention of those who are fashion-conscious."
3948898300-NameJp = "Traffic Safety Amulet"
3948898300-DescriptionJp = "An amulet made to promote traffic safety. When you shake it, you can hear something metal rattling inside."
2028861040-NameJp = "Heat Pack"
2028861040-DescriptionJp = "A palm-sized heat pack that radiates warmth when you rub it a few times and shake it. There is no amulet more useful than this in a frigid environment."
1207585231-NameJp = "Peroro Feather"
1207585231-DescriptionJp = "An amulet made with large, white feathers. The source of the feathers is one of Momo Friends' most important trade secrets."
3129277640-NameJp = "Cross"
3129277640-DescriptionJp = "A cross-shaped amulet favored by Trinity students. It also works well as an accessory to hang on a bag."
1991164124-NameJp = "Camo Daruma"
1991164124-DescriptionJp = "A camo-patterned Daruma plush. Blends in perfectly with all surroundings."
237084781-NameJp = "Voodoo Doll"
237084781-DescriptionJp = "A cursed doll made with resentment for the target. Its resiliency to sharp needles makes it popular with craftsmen."
3113501019-NameJp = "Portable Deodorant"
3113501019-DescriptionJp = "A fashionable but portable deodorant produced in collaboration with Seaside, a functional cosmetics manufacturer. It's now a trendy key ring accessory for students."
727987239-NameJp = "Waterproof Digital Watch"
727987239-DescriptionJp = "A digital watch produced by the sportswear brand Serval. Because it's waterproof, there is no need to fear ruining it, even if you wear it while swimming."
111602846-NameJp = "Leather Wristwatch"
111602846-DescriptionJp = "A leather wristwatch made by the outdoor brand Manaslu. A warm lining prevents your wrist from getting cold."
2073706703-NameJp = "Wavecat Wristwatch"
2073706703-DescriptionJp = "A wristwatch featuring Wavecat, the cat character from Momo Friends. Wavecat's arms, which act as the clock hands, are twisted in a bizarre way."
1058159756-NameJp = "Antique Pocket Watch"
1058159756-DescriptionJp = "An antique pocket watch with the Veronica logo engraved on it. It's far less convenient to check the time with than a wristwatch, but remains popular as a fashion item."
3773560632-NameJp = "Dustproof Leather Wristwatch"
3773560632-DescriptionJp = "A wristwatch from the military specialty brand Kazeyama. Its enhanced resistance to dust means you don't have to worry about it breaking down in harsh environments."
2415212758-NameJp = "Gothic Leather Wristwatch"
2415212758-DescriptionJp = "A wristwatch with complicated patterns stitched on it. Goes well with classic clothing, but has the disadvantage of being difficult to read time with."
3475264813-NameJp = "Street Fashion Wristwatch"
3475264813-DescriptionJp = "A street fashion wristwatch popular for its modern and cute design. Triple Step is selling it as a set with their matching bracelet as a marketing strategy."
1506609692-NameJp = "Bluetooth Necklace"
1506609692-DescriptionJp = "A Bluetooth necklace that can measure the wearer's body temperature and heart rate. Because it can easily and accurately measure the rate of exercise, it's popular with those who are trying to lose weight."
3750431669-NameJp = "Snowflake Pendant"
3750431669-DescriptionJp = "A silver pendant with a snowflake ornament on it. If you stare at the snowflake decoration for a long time, you'll start to feel a bit chilly."

1059841421-NameJp = "Shun's Childhood Memories"
1059841421-DescriptionJp = "A pair of mother-of-pearl hairpins that Shun cherishes. Now that she's older, she rarely uses them because she doesn't wear pigtails very often. But they're a part of Shun's precious memories that never change."
242283010-NameJp = "Rabbit Tail Grenade"
242283010-DescriptionJp = "A grenade in the shape of a rabbit tail that Asuna wears while wearing her bunny girl outfit. It looks harmless because it's fluffy, but it's just as destructive as any other grenade."
1916503017-NameJp = "Inventory Management Ledger"
1916503017-DescriptionJp = "An inventory management ledger for the Trinity Cathedral made and maintained by Hinata.\nInside is a meticulous list of where the cathedral's supplies are stored and how many are available. Since Hinata generally finds whatever items people need herself, only a handful of people know of the ledger's existence."
2878555129-NameJp = "Food Tour Notepad"
2878555129-DescriptionJp = "A notepad used by Junko. It's a special journal in which she records the scores of every great restaurant she has been to, organized by area."
163861415-NameJp = "Yuuka's Scientific Calculator"
163861415-DescriptionJp = "A scientific calculator Yuuka is never seen without. Despite her excellent mental arithmetic skills, Yuuka always double checks her calculations to ensure perfection."
1261922711-NameJp = "Patrol Headphones"
1261922711-DescriptionJp = "The headphones Suzumi carries on patrol. Calling them \"Patrol Headphones\" is a bit self-indulgent as they are a relatively common product."
2694523503-NameJp = "Bath Assistant"
2694523503-DescriptionJp = "A souvenir from Red Winter Academy, carefully handmade by gluing a mustache onto a mass-produced rubber duck.\nCherino claims that they're childish toys which she has no interest in, but rumor has it one has been seen in the bathtub after she's finished..."
2059299965-NameJp = "Athena-3"
2059299965-DescriptionJp = "A spherical drone that always follows Hare around. Named after the goddess of wisdom, it's equipped with artificial intelligence that can experience and learn on its own, but it often works against the intentions of Hare in unexpected ways."
1544503704-NameJp = "A Meister's Toolbox"

2916391596-NameJp = "Millennium Pillar Type B"
2916391596-DescriptionJp = "A pillar that gives off Millennium vibes. Its clean aesthetic is an impressive feat."
1495795501-NameJp = "Millennium Pillar Type C"
1495795501-DescriptionJp = "A pillar that gives off Millennium vibes. The key feature is its vertical lighting."

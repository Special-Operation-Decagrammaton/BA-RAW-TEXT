[translation]
3194776850-NameJp = "Administrative Executive Office"
3194776850-DescriptionJp = "An office space where various essential office supplies are stored.\nThis is where Sensei primarily stays and handles Schale affairs."
1907901108-NameJp = "Theater Room"
1907901108-DescriptionJp = "A theater equipped with a large screen for watching videos.\nYou can enjoy various shows, movies, and popular anime here."
358080736-NameJp = "Gym"
358080736-DescriptionJp = "A large gym with courts and seats for spectators.\nA variety of sporting goods are also available for use."
4294611526-NameJp = "Gehenna Institute 1"
4294611526-DescriptionJp = "The largest institute in the Gehenna Hub.\nThere are several classrooms here, but very few classes are held properly."
1274324253-NameJp = "Gehenna Clubhouse"
1274324253-DescriptionJp = "A building filled with Gehenna club rooms.\nIt's mostly used as a free space for students."
358653965-NameJp = "Gehenna Campus"
358653965-DescriptionJp = "A central campus with a large lot.\nIt's not maintained properly, so it's easy to get lost. Explore at your own risk."
2196189972-NameJp = "Gehenna Playing Field"
2196189972-DescriptionJp = "Gehenna's central playing field.\nYou can participate in a variety of sports and outdoor activities here."
1866984703-NameJp = "Gehenna Institute 2"
1866984703-DescriptionJp = "The second institute in the Gehenna Hub.\nUnlike Institute 1, students here work hard and take their studies seriously."
3032755222-NameJp = "Gehenna Student Square"
3032755222-DescriptionJp = "A square that students can visit freely.\nMany students come and go through here, so the fights never stop."
970571410-NameJp = "Gehenna Prefect Team HQ"
970571410-DescriptionJp = "The Headquarters of the Gehenna Prefect Team.\nIt's the only place in the hub that is properly taken care of."
1533671597-NameJp = "Closed Gehenna Institute"
1533671597-DescriptionJp = "This building is not currently in use.\nThough closed, it is a hotbed of trouble due to a lack of security. Be wary when traveling here."
261901867-NameJp = "Library"
261901867-DescriptionJp = "Contains useful books for the students' learning and the Sensei's teaching. Some fun manga and light novels are also available to read here."
1983840990-NameJp = "Abydos Main Building 1"
1983840990-DescriptionJp = "The first of Abydos' main buildings, where Abydos students mainly work.\nKept clean from daily sandstorms due to the efforts of the Foreclosure Task Force."
3073680445-NameJp = "Abydos Annex Building"
3073680445-DescriptionJp = "The Abydos annex, directly connected via a hallway to the main building.\nContains several extracurricular rooms no longer used, such as the science and music rooms."
3030528899-NameJp = "Abydos Playing Field"
3030528899-DescriptionJp = "A playing field where PE classes and field days are held.\nCurrently buried in the sand due to difficulty of maintenance."
4060200853-NameJp = "Abydos Library"
4060200853-DescriptionJp = "A library you can visit to study or read a book.\nHome to a variety of books popular at Abydos, such as textbooks, magazines, and manga."
4149434655-NameJp = "Abydos Pool"
4149434655-DescriptionJp = "Abydos' rarely-used swimming pool.\nIts dried up floor is cracked and covered in sand due to lack of use."
2812564490-NameJp = "Abydos Gym"
2812564490-DescriptionJp = "A gym that serves as an auditorium and a space for indoor sports.\nDoubles as a storage area for unused materials and exercise equipment."
3019364332-NameJp = "Abydos Cafeteria"
3019364332-DescriptionJp = "A cafeteria beloved by the students.\nCarries breads and sweets popular in Kivotos, though it offers less than other school cafeterias."
2602511445-NameJp = "Abydos Old Schoolhouse"
2602511445-DescriptionJp = "Originally used as a rest area for the various clubs, it is now closed due to age and hazards. However, students still occasionally visit it to test their courage."
774508018-NameJp = "Classroom"
774508018-DescriptionJp = "A classroom that provides an environment for students to learn.\nUsed by some for independent study and others for presenting research assignments."
1925286931-NameJp = "Millennium Tower"
1925286931-DescriptionJp = "A huge tower where Millennium's major clubs, including Seminar, are located.\n Its state-of-the-art security systems restrict outsiders from entering."
698860447-NameJp = "Monorail Station"
698860447-DescriptionJp = "The monorail allows quick travel to different places throughout the academy.\n Produces little noise or vibration despite its speed."
2688045816-NameJp = "Library"
2688045816-DescriptionJp = "A library with a variety of books used for Millennium students' research.\n Video content such as documentaries can also be viewed here."
1022652590-NameJp = "School Cafeteria"
1022652590-DescriptionJp = "An on-campus eatery that sells bread and drinks for breaks.\n The most popular items are double-shot espressos and energy drinks."
2885237148-NameJp = "Industrial Lab"
2885237148-DescriptionJp = "An industrial workspace where various experiments can be conducted.\n Equipped with state-of-the-art equipment, including 3D printers."
3070757653-NameJp = "Data Center"
3070757653-DescriptionJp = "A data center with large servers and many network lines installed.\n Millennium's valuable research data is stored here."
1295016811-NameJp = "Power Plant"
1295016811-DescriptionJp = "A power plant that produces electricity for Millennium.\n The facility adopted eco-friendly methods and produces almost no pollution."
895510277-NameJp = "Fitness Center"
895510277-DescriptionJp = "A fitness center for training your body when you're tired of researching.\n Its state-of-the-art analytical equipment provides optimal training for students."
3140661513-NameJp = "Laboratory"
3140661513-DescriptionJp = "A place for simple science experiments to be conducted.\nThere are many dangerous drugs and sharp implements here, so be careful."
2871272188-NameJp = "Trinity Cathedral"
2871272188-DescriptionJp = "The largest building in Trinity which also acts as a symbol of the academy and the Sisterhood's base."
3137866576-NameJp = "Trinity Plaza"
3137866576-DescriptionJp = "A large plaza which is one of the representative places of the area. The beautiful fountain is especially famous."
3915788217-NameJp = "Central Library"
3915788217-DescriptionJp = "The biggest library in not just Trinity but all of Kivotos. There is a rumor that some students get lost within the library."
1205798181-NameJp = "Club Hall"
1205798181-DescriptionJp = "A hall that houses several Trinity clubs and their various activities."
1291519405-NameJp = "Basis Scholar"
1291519405-DescriptionJp = "An old, unused building named after the basis of student learning. It once housed the Remedial Knights."
2678735093-NameJp = "Art Gallery"
2678735093-DescriptionJp = "An art gallery with various artworks displayed. Currently used to hold art classes."
1148047130-NameJp = "Music Hall"
1148047130-DescriptionJp = "A music hall built fairly recently. It is also used as a stage for various music concerts and plays."
2413575071-NameJp = "The Old Library"
2413575071-DescriptionJp = "A seldom-visited library in decay. Home to Trinity's Library Committee."
1107627875-NameJp = "Shooting Range"
1107627875-DescriptionJp = "A shooting range with several lanes for students to practice their marksmanship.\nThere is a wide selection of ammo available so students from all academies can participate."
2340126097-NameJp = "Red Winter Office Building"
2340126097-DescriptionJp = "The main building where the Red Winter Office is located. There are mustache sculptures everywhere that symbolize the authority of President Cherino."
683355499-NameJp = "Red Mustache Revolution Plaza"
683355499-DescriptionJp = "A huge plaza near the Red Winter office building. In the center of the plaza stands a giant statue of Cherino that is illuminated 24/7."
414654122-NameJp = "First Shared Dormitory"
414654122-DescriptionJp = "A shared dorm complex built for the residence and convenience of students. It's cheap, but hot water is rarely available due to the facility's age."
2066711573-NameJp = "Red Bear Broadcasting Station"
2066711573-DescriptionJp = "A broadcasting station that broadcasts \"Red Bear,\" the only media outlet at Red Winter Academy. Most of the content consists of praise for Cherino."
3364708890-NameJp = "Third Communal Cafeteria"
3364708890-DescriptionJp = "A student dining hall where the students of Red Winter eat. All students are equally served the same meal, but President Cherino's meal is even more \"equal\"."
2715934839-NameJp = "Beluga Market"
2715934839-DescriptionJp = "An old open-air market where Red Winter students trade handmade goods. Occasionally, dangerous items that are not authorized by the Secretariat are distributed."
264515151-NameJp = "Forestry Storage"
264515151-DescriptionJp = "A storehouse used for equipment meant for clearing forests. There is a lot of dangerous equipment, so safety gear must be worn when visiting."
328579908-NameJp = "Labor Party Workforce Office"
328579908-DescriptionJp = "The workforce office where the students of the Labor Party usually hang out. The place to visit when you need urgent labor service."
3657567135-NameJp = "Hangar"
3657567135-DescriptionJp = "A storage area for tactical support equipment like tanks, helicopters, and other vehicles. The tools to repair and maintain support equipment are also kept here."
1933676415-NameJp = "Hyakkiyako Yin-Yang Club Main Building"
1933676415-DescriptionJp = "The main building where the Yin-Yang Club, Hyakkiyako's Student Council, meets. The gossip among the students is that it's full of traps and other inventive defense mechanisms."
4168293052-NameJp = "Central Plaza"
4168293052-DescriptionJp = "The Yin-Yang Club's main building has a beautiful view of this huge plaza. Tourists flock to it, and there's almost always someone taking a photo with the statue in the center."
2953329321-NameJp = "Yin-Yang Club Auditorium"
2953329321-DescriptionJp = "An auditorium where the Yin-Yang Club holds occasional performances, including the haiku battle royale, Niya's rakugo contest, and Chise's surprise talent show. Good luck getting tickets though. It's famous for being sold out for every performance."
990108595-NameJp = "Great Garden"
990108595-DescriptionJp = "A famous garden, popular with Hyakkiyako tourists. It's rumored that the pond is inhabited by a giant carp called the Master. They also sell popular merchandise."
1694812288-NameJp = "Hyakkiyako Shopping District"
1694812288-DescriptionJp = "The shopping district of Allied Hyakkiyako Academy. It's the home of an especially famous teahouse called Momoyodou. Rumor has it that whenever troublemakers cause a problem, the face of Momoyodou steps in to solve it."
2072243193-NameJp = "Tourist Cable Car"
2072243193-DescriptionJp = "The Allied Hyakkiyako Academy's cable car. Taking in Hyakkiyako from a bird's-eye view is said to be an irreplaceable memory. The fare is 500 yen, round trip."
2050672265-NameJp = "Museum of Traditions"
2050672265-DescriptionJp = "A huge museum dedicated to the unique traditions, culture, and history of Allied Hyakkiyako Academy. Unfortunately, most reviews from students aren't very good."
4134542221-NameJp = "Tree Observatory"
4134542221-DescriptionJp = "An observatory where you can see a panoramic view of Hyakkiyako. Thanks to the incredible scenery, many movies and TV series record scenes here."
1833374923-NameJp = "Study Room"
1833374923-DescriptionJp = "A meeting room used for private tutoring or group study.\nIt's so popular, you need a reservation before you can use it."
3691365347-NameJp = "Gymnasium"
3691365347-DescriptionJp = "A full-fledged workout center with treadmills, barbells, and squat tracks.\nNo matter how busy we get, we musn't neglect our health and training."
2987442229-NameJp = "Lounge"
2987442229-DescriptionJp = "A recreational area with armchairs, snacks, and beds for rest and relaxation.\nThere are also boarding and shower rooms for teachers who work overtime."
174166180-NameJp = "Convenience Store"
174166180-DescriptionJp = "Angel 24 is a convenience store located inside the Schale Residence Hall. Here you can buy light snacks, drinks, and explosives."
3217933897-NameJp = "Arcade"
3217933897-DescriptionJp = "An arcade in the Residence Hall featuring a variety of game machines.\nMost are classics, which appeal to a small number of enthusiasts."
1142275086-NameJp = "Dining Hall"
1142275086-DescriptionJp = "The Residence Hall's dining facility, responsible for Schale's residents' meals.Various cooking facilities are available to hone your culinary skills."
2776103305-NameJp = "Garden"
2776103305-DescriptionJp = "A small vegetable garden located on an outdoor balcony.\nFruits and vegetables grown here are used to cook meals."
2292815693-NameJp = "Rikkagaku"
2292815693-DescriptionJp = "This building houses the students of Genryumon, Shanhaijing Academy's student council. The path leading to Rikkagaku is strictly guarded by Genryumon members and cannot be entered without permission."
2632751166-NameJp = "White Tiger Park"
2632751166-DescriptionJp = "A large park where students of Shanhaijing spend their leisure time. In the center of the park is a plaza where health-conscious students gather in the morning to exercise."
4045851205-NameJp = "Peach Blossom Spring"
4045851205-DescriptionJp = "This teahouse with a quaint name is a popular stop for Shanhaijing students. It's a nice place to sit and sip tea between gunfights."
3798845638-NameJp = "Black Tortoise Promenade"
3798845638-DescriptionJp = "A bustling alleyway stuffed with Black Tortoise eateries. It's become famous for the delicious food, even outside Shanhaijing. The restaurants here mainly deal in spice-laden Chinese food, but they also carry a number of secret items."
2595612555-NameJp = "Plum Blossom Garden Main Building"
2595612555-DescriptionJp = "The main building of the Plum Blossom Garden, where the children of Shanhaijing take their lessons. Education is one of Shanhaijing's core values, so even officers of Genryumon dare not interfere in their affairs."
2905240932-NameJp = "Eastern Alchemy Society Laboratory"
2905240932-DescriptionJp = "An old ramshackle laboratory where members of the Eastern Alchemy Society hone their alchemical skills. Students of Shanhaijing keep their distance due to the smoky, odd smells that issue forth."
656802880-NameJp = "Tea Garden"
656802880-DescriptionJp = "Shanhaijing grows its famous tea leaves in this massive garden. The tea leaves harvested here are sold throughout Kivotos, reaching even the tea afficionados of Trinity."
2398246336-NameJp = "Bamboo Forest"
2398246336-DescriptionJp = "A dense bamboo forest at the foot of Kunlun Mountain. It's easy to get lost, so most students don't explore here. However, there are some who visit the forest to lay down their burdens and calm their troubled minds."
110094030-NameJp = "Abydos Main Building"
110094030-DescriptionJp = "The main hall of Abydos High School.\nWhat was once just a small annex building, now serves as the main building."
3125409229-NameJp = "Gehenna Hub"
3125409229-DescriptionJp = "The central area of Gehenna Academy, one of the three major academies of Kivotos.\nGehenna is known for its free-spirited atmosphere."
1428109633-NameJp = "Hyakkiyako Central Area"
1428109633-DescriptionJp = "(X)"
1111616358-NameJp = "Millennium Study Center"
1111616358-DescriptionJp = "Millennium Science School's study hall.\nDespite its short history, Millennium has become influential due to its strong focus on the sciences."
1466521158-NameJp = "Red Winter Federal Academy"
1466521158-DescriptionJp = "(X)"
1895832836-NameJp = "Schale Office"
1895832836-DescriptionJp = "Schale's office space.\nSeveral kinds of areas are available for use."
4231969254-NameJp = "Schale Residence Hall"
4231969254-DescriptionJp = "Schale HQ's Residence Hall.\nThere's also a space for Sensei to eat and sleep."
481812794-NameJp = "Trinity Plaza Area"
481812794-DescriptionJp = "The courtyard of Trinity General School. Several academies merged to create Trinity, which now boasts the largest campus in Kivotos."

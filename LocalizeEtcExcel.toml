4029303020-DescriptionJp = "Your ally Striker students have decreased cost recovery speed!\n\nRecover cost by defeating enemies and destroying vending machines."
28119784-NameJp = "Event Challenge Stage 4 Hint"
28119784-DescriptionJp = "Enemy attack types are changed to Mystic.\n\nRecover cost by defeating Highlander train crew students.\n\nHighlander sentry guns' normal attacks stack harmful effects that have a low chance of decreasing DEF and Evasion Rate."
3754973665-NameJp = "Event Challenge Stage 1 Hint"
3754973665-DescriptionJp = "The Helmet Gang is attacking Misaka Mikoto with an Abandoned Black Market Automaton.\n\nRally the students to protect Misaka Mikoto and prepare for the onslaught."
981107711-NameJp = "Event Challenge Stage 2 Hint"
981107711-DescriptionJp = "Shokuhou Misaki is controlling the Helmet Gang.\n\nTarget Shokuhou Misaki first to stop the Helmet Gang Members."
247331126-NameJp = "Event Challenge Stage 3 Hint"
247331126-DescriptionJp = "If the PMC Soldiers in front of you take damage, the PMC Power Loader will take damage as well.\n\nThere are a lot of enemies in the rear, so try to use students with area attacks."
3717534249-NameJp = "Event Challenge Stage 4 Hint"
3717534249-DescriptionJp = "It's hard to take down other enemies while an Abandoned Rugged Black Market Automaton is around.\n\nUse your Healer to take down enemies with roaming Sweepers and Scarecrows."
2028021589-NameJp = "Event Challenge Stage 1 Hint"
2028021589-DescriptionJp = "Try using Crowd Control effects to attack enemies."
2080523366-NameJp = "Event Challenge Stage 2 Hint"
2080523366-DescriptionJp = "Defeating an enemy grants a buff for a short period of time. Knock down the next enemy before the buff runs out."
11412844-NameJp = "Event Challenge Stage 3 Hint"
11412844-DescriptionJp = "Very powerful and ferocious bears and rabbits block your path. Confuse the bears or support Sumire to defeat the enemies."
1768013184-NameJp = "Event Challenge Stage 4 Hint"
1768013184-DescriptionJp = "Set up Cover to deflect enemy attacks."
2920989374-NameJp = "Event Challenge Stage 1 Hint"
2920989374-DescriptionJp = "Escort Saori and quickly defeat the enemies coming from both directions."
389255540-NameJp = "Event Challenge Stage 2 Hint"
389255540-DescriptionJp = "Aru (Dress) and Kayoko (Dress) use their EX skills together. Try to prevent Aru (Dress) from using her EX skill on Kayoko (Dress)."
2681487799-NameJp = "Event Challenge Stage 3 Hint"
2681487799-DescriptionJp = "Ally Kayoko (Dress)'s EX Skill becomes stronger if she is not attacked. Try to protect her from being hit by the boss' wide-range attacks."
3119514688-NameJp = "Event Challenge Stage 4 Hint"
3119514688-DescriptionJp = "Eliminate the high-damage dealing enemies in the rear first."
1154240687-NameJp = "Event Challenge Stage 1 Hint"
1154240687-DescriptionJp = "Defeat the quarreling Prefect Team Members and Mouryos while trying to prevent the festival's rating gauge from hitting zero. Some Prefect Team Members will counter when attacked."
826504021-NameJp = "Event Challenge Stage 2 Hint"
826504021-DescriptionJp = "The enemy's summon will become stronger and stronger over time. Defeat the creature quickly."
228867329-NameJp = "Event Challenge Stage 3 Hint"
228867329-DescriptionJp = "Sweepers are knocked back when hit by EX skills, and apply Damage and Debuffs on their surroundings as they die.\n\nUtilize EX skills strategically to make Sweepers die near enemies."
3692835812-NameJp = "Event Challenge Stage 4 Hint"
3692835812-DescriptionJp = "Protect Umika's Fireworks Launcher while defeating the Mouryos disrupting the festival.\n\nEach time Festival Preparation reaches 25%, various buffs and debuffs will be applied on enemies and allies.\n\nThe enemy boss, Hannya Mask Mouryo, shares damage from turrets. "

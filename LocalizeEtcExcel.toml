358559959-NameJp = "Main Building"
358559959-DescriptionJp = "The place where first-time guests to the resort are greeted. There are counters to help guests check in and lobby facilities where guests can rest."
2825548492-NameJp = "Large Public Bath"
2825548492-DescriptionJp = "A large public bath where several people can bathe simultaneously. Several different types of baths are offered."
2481788820-NameJp = "Room"
2481788820-DescriptionJp = "An ordinary room with tatami mats and a low table. Nodoka washes all the bedding, including the blanket, every day."
3141924738-NameJp = "Lounge"
3141924738-DescriptionJp = "A recreational area for guests tired of bathing. Table tennis and massage chairs are available to use."
384904434-NameJp = "Banquet Hall"
384904434-DescriptionJp = "A large-scale banquet hall that can house several guests. Contrary to its scale and splendor, only cheap junk food is offered on the menu."
1433250290-NameJp = "Open-Air Bath"
1433250290-DescriptionJp = "An open-air bath where you can enjoy a hot bath while admiring the snowfall. One may occasionally encounter wild animals that come down from the mountain to enjoy a hot bath."
4060632693-NameJp = "Annex Building"
4060632693-DescriptionJp = "An annex for VIP guests. Its distance from the main building means VIP guests can enjoy a leisurely break without being disturbed by other guests."
4194626497-NameJp = "Garden"
4194626497-DescriptionJp = "A dry garden made of sand and gravel. Nodoka clears the snow every day to keep it looking beautiful."
3675272134-NameJp = "Operation Headquarters"
3675272134-DescriptionJp = "The Operation Headquarters is responsible for the overall operations for the field day. In addition, all the registration and management of vendors is handled at the headquarters."
1884871261-NameJp = "Track"
1884871261-DescriptionJp = "A long race track built along the perimeter of a stadium. It is paved with durable materials so it can withstand the explosives used in obstacle races."
2410805514-NameJp = "Small Tool Storage"
2410805514-DescriptionJp = "This is a storage room for simple athletic props used during the field day. It locks from the outside, so please take care to not get locked in when entering and exiting."
2074635724-NameJp = "Grandstand"
2074635724-DescriptionJp = "Spectator seating on the second floor of the stadium to watch the games. Seats are separated by school to prevent conflict among students."
830995934-NameJp = "Grass Field"
830995934-DescriptionJp = "This is the large field in the center of the stadium. It is made of artificial turf, but thanks to Millennium's technology, it's said to feel fluffy and even softer than natural grass."
2054928448-NameJp = "Heavy Equipment Storage"
2054928448-DescriptionJp = "This storage is for the heavy materials and equipment used during the field day. It's also equipped with basic tools, so minor repairs can be done here."
1757505051-NameJp = "Broadcast Regulatory Committee"
1757505051-DescriptionJp = "This is a broadcast room where you can watch all the events of the field day. It also provides a video replay function to prevent referee errors."
1079056613-NameJp = "Lounge"
1079056613-DescriptionJp = "This lounge is free for players and visitors to use after the game. It is equipped with a simple coffee machine and beverage dispensers."
3239184876-NameJp = "Valkyrie, Shiratori Branch"
3239184876-DescriptionJp = "A branch of Valkyrie Police School. It's filled with lush greenery that keeps the air in the area fresh and clean."
2322223304-NameJp = "Corgi Town"
2322223304-DescriptionJp = "A shop-lined street famous for electronics. Rumor has it that there's almost nothing you can't find here."

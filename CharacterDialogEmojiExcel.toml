[translation]
8431999016-0-Think-1 = "(บันทึกข้อมูลที่รวบรวมได้\nเรียบร้อยแล้วค่ะ)"
8431999017-0-Think-1 = "(บันทึกข้อมูล\nที่รวบรวมได้เรียบร้อย)"
8431999018-0-Think-1 = "(เนรุต้องได้รับข้อมูลนี้\nด้วยค่ะ)"
8431999019-0-Think-1 = "(เซอาต้องได้ข้อมูลนี้ด้วย)"
8430001000-0-Think-1 = "(ถ้าเอากล่องมาสวมไว้\nตอนอยู่นิ่งๆ ก็จะ\nไม่โดนจับได้ค่ะ)"
8430001000-0-Think-2 = "(ดูจังหวะให้ดี...\nแล้วค่อยๆ ขยับ)"
8430001010-1-Talk-1 = "อ่า..."
8430001010-2-Talk-1 = "คือ..."
8430001010-0-Think-1 = "(อีกนิดหนึ่ง...)"
8430001030-1-Talk-1 = "อีกเดี๋ยวก็จะ\nถึงเวลาติดต่อกันแล้ว"
8430001030-2-Talk-1 = "รีบๆ จัดการให้จบ\nแล้วกลับดีกว่า"
8430001030-0-Think-1 = "(เท่านี้น่าจะพอแล้วนะคะ...)"
8430001040-0-Think-1 = "(ยังมีเรื่องที่ต้องทำอยู่ค่ะ)"
8430001050-0-Think-1 = "(รออีกแป๊บหนึ่งแล้วกันนะคะ)"
8430003000-0-Think-1 = "(น่าจะมีอุปกรณ์เก็บข้อมูล\nอยู่ระหว่างทางสินะ?)"
8430003000-0-Think-2 = "(อยากจะทุบทุกอย่างทิ้ง\nให้หมดจริงๆ เลยเชียว...)"
8430003000-0-Think-3 = "(ภารกิจแฝงตัวนี่\nไม่ใช่งานถนัดฉันเลยจริงๆ)"
8430003000-0-Think-4 = "(เห็นบอกว่าถ้าเริ่ม\nหมดแรง... ก็ให้กิน\nยาฟื้นฟูกำลังนี่สินะ)"
8430003010-0-Think-1 = "(ยังมีงานที่ต้องทำอยู่)"
8430006000-0-Think-1 = "(โดรน... สมกับเป็นมิลเลเนียม\nจริงๆ เลยนะ ต่างจากทรีนิตี้\nจริงๆ ด้วยค่ะ)"
8430006000-0-Think-2 = "(ถ้าเดินไปจนสุดทางนี้...\nก็จะเจอประตูสินะคะ)"
8430006010-0-Think-1 = "(หุ่นยนต์น้องหมา...)"
8430006010-1-Talk-1 = "เซอา ทางนี้"
8430006010-0-Talk-1 = "ริโอะ"
8430006010-1-Talk-2 = "ฉันติดอุปกรณ์สื่อสาร\nไว้กับหุ่นยนต์น้องหมาแล้ว"
8430006010-1-Talk-3 = "ระหว่างทางจะได้บันทึก\nข้อมูลที่รวบรวมมาได้"
8430006020-0-Think-1 = "(เรื่องนี้... ทำคนเดียว\nคงไม่สำเร็จแน่เลย)"
8430006020-0-Think-2 = "(ติดต่อไปหาริโอะ\nน่าจะดีกว่า)"
8430006030-1-Talk-1 = "พวกเขาสร้างทางลับ\nไว้ตรงนี้ด้วย"
8430006030-1-Talk-2 = "ปิดพัดลมระบายอากาศได้\nโดยกดสวิตช์ที่ตู้ไฟฟ้า\nและไปที่ช่องระบายอากาศ"
8430006040-0-Think-1 = "(นี่คือ... ตู้ไฟฟ้า...?)"
8430006050-0-Think-1 = "(ตอนนี้เดินเข้าไปใน\nช่องระบายอากาศได้แล้ว)"
8430006050-0-Think-2 = "(ต้องรีบไปแล้วละ)"
8431001000-0-Think-1 = "(นั่นมัน...?)"
8431001000-0-Think-2 = "(มีอยู่ที่นี่ด้วยสินะ...\nมีประโยชน์จริงๆ เลย)"
8431001010-0-Think-1 = "(มาถึงตอนนี้แล้ว\nลองใช้ดูหน่อยดีมั้ยนะ...)"
8431001011-0-Think-1 = "(อย่างนั้นเองสินะคะ\nมีประโยชน์จริงๆ ด้วย)"
8431002000-0-Think-1 = "(ตอนนี้ก็มาถึงแล้ว...)"
8431002000-0-Think-2 = "(เข้าไปอีกหน่อยดีมั้ยนะ)"
8431002010-0-Think-1 = "(เข้าไปให้ไม่โดนจับ\nน่าจะยากแฮะ)"
8431002010-0-Think-2 = "(มีแผ่นป้องกันเข่า\nที่ริโอะให้มาด้วยนี่นา)"
8431002010-0-Think-3 = "(ได้จังหวะพอดีเลยนะ)"
8431002020-1-Talk-1 = "เสร็จงานนี้แล้ว\nไปหาอะไรอร่อยๆ\nกินฉลองกันเถอะ!"
8431002020-2-Talk-1 = "กินเสร็จแล้วไปฉลองต่อ\nรอบ 2 ได้ด้วยนี่นา?!\nนานๆ ทีนี่นะ!"
8431002020-3-Talk-1 = "ฉันอยากกินเทปันยากิค่ะ!"
8431002030-0-Think-1 = "(พวกมันอาจหนีไปก็ได้\nถ้าฉันส่งเสียงออกไป...)"
8431002030-0-Bulb-1 = "[전구]"
8431002030-0-Think-2 = "(ใช่แล้ว... แผ่นรอง)"
8431002030-0-Think-3 = "(เป็นคนละเอียดรอบคอบ\nจริงๆ เลยนะ)"
8431003000-0-Think-1 = "(อืม... ชักจะยุ่งยากแล้วนะคะ)"
8431003000-0-Think-2 = "(ใช้เครื่องสื่อสารไร้สาย\nติดต่อเนรุได้สินะคะ...)"
8431003000-0-Think-3 = "(ไหนลองดูหน่อยซิ)"
8431003010-0-Talk-1 = "อ่า ฉันเข้าใจสถานการณ์แล้วละ\nจะลองทำอะไรสักอย่าง\nจากทางนี้ก็แล้วกัน"
8431003010-0-Talk-2 = "ตู้ไฟฟ้า? โอเค\nฉันจะลองหาดู"
8431004000-0-Think-1 = "(ทางด้านเซอา...)"
8431004000-0-Think-2 = "(ไม่ใช่เด็กๆ สักหน่อย\nคงจะหาทางเองได้ละมั้ง)"
8431004010-0-Think-1 = "(คงต้องทำอะไรสักอย่าง\nจากทางนั้นอยู่ละมั้ง)"
8431005000-0-Think-1 = "(ถึงจะไม่ค่อยเข้าใจเท่าไร\nแต่คงต้องหาทางหนีออกไป\nให้ได้แล้วละ)"
8431005000-0-Think-2 = "(ลางสังหรณ์ของฉันบอกว่า\nถ้าโดนจับได้คงจบเท่านี้แน่ๆ!)"
8431006000-0-Think-1 = "มันแปลกๆ นะคะ..."
8431006000-0-Think-2 = "(ปกติน่าจะมีการเสริม\nการรักษาความปลอดภัย\nให้แน่นหนาขึ้นนี่นา)"
8431006000-0-Dot-1 = "[…]"
8431006000-0-Exclaim-1 = "[!]"
8431006000-0-Talk-1 = "มันเป็นกับดักค่ะ\nวางแผนแบบนี้ไว้\nตั้งแต่แรกแล้วสินะคะ!"
8431006000-0-Talk-2 = "ต้องให้เนรุช่วยแล้วค่ะ!"
8431006010-0-Exclaim-1 = "[!]"
8431006010-0-Think-1 = "เนรุกำลังตกอยู่ในอันตรายค่ะ!"
8431006020-0-Think-1 = "เซอาคงจะมาเปิดให้ละมั้ง"
8431007000-0-Think-1 = "(ขืนเป็นแบบนี้\nต้องโดนจับแน่ๆ...)"
8431007000-0-Think-2 = "(อะไรบางอย่าง...\nที่จะเอามาขวางทางได้...!)"

211534980-NameJp = "Source of Intelligence"
211534980-DescriptionJp = "Increases damage dealt by Special students by [c][007eff]80%[-][/c].\nDecreases damage dealt by Striker students, Tactical Supports' riders, and summons by [c][007eff]75%[-][/c]. Increases Cost Recovery by [c][007eff]25%[-][/c].\nIncreases Geburah's Mystic Effectiveness by [c][007eff]75%[-][/c].\nAll allies, excluding the Heater, gain [c][007eff]1 slot[-][/c] of Hypothermia gauge every [c][007eff]5 sec[-][/c].\nWhen the Hypothermia gauge reaches [c][007eff]10 slots[-][/c], target receives a Frozen effect that cannot be removed, damage taken increases by [c][007eff]80%[-][/c], and Recovery is fixed to [c][007eff]1[-][/c]."
3373023280-NameJp = "Field Response: Heater Operation"

525845510-NameJp = "Myouki's Compulsion"
525845510-DescriptionJp = "When battling Kurokage, certain attacks will expose units to Myouki's Compulsion.\n- When trapped in Kurokage's gaze on the floor.\n- When within Kurokage's zone.\n- When taking damage from a self-destruct attack.\nMyouki's Compulsion will gradually erode units' HP and prevent it from being restored to max. Use Recovery skills to reduce Myouki's Compulsion by an amount equal to [c][007eff]1/9 of the excess recovery amount[-][/c]."
3600210741-NameJp = "Myouki's Compulsion"
3600210741-DescriptionJp = "When battling Kurokage, certain attacks will expose units to Myouki's Compulsion.\n- When trapped in Kurokage's gaze on the floor. (Being in the center of the zone results in higher exposure to Myouki's Compulsion.) \n- When within Kurokage's zone.\n- When taking damage from a self-destruct attack.\nMyouki's Compulsion will gradually erode units' HP and prevent it from being restored to max. Use Recovery skills to reduce Myouki's Compulsion by an amount equal to [c][007eff]1/11 of the excess recovery amount[-][/c]."

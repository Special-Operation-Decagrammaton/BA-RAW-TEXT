4182767414-NameJp = "Power Toward Eternity"
4182767414-DescriptionJp = "The Fury of Set absorbs energy from the atmosphere to continuously increase the lightning gauge.\nWhen the Fury of Set takes damage, the lightning gauge decreases. When the gauge becomes 0, a blue lightning sphere is summoned.\n- While the blue lightning sphere is summoned, damage dealt by all enemies increases by [c][007eff]30%[-][/c] (for [c][007eff]30 sec[-][/c]).\n\nWhen the Fury of Set is in groggy status, Cost Recovery for all enemies including Special enemies, increases by [c][007eff]500[-][/c]. Unaffected by Stability Value and always applies maximum damage. Summons a red lightning sphere."
1760763215-NameJp = "Hawk-Piercing Flash"

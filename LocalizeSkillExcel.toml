1475673708-DescriptionJp = "When ATG is full, summons a Missile Guidance System and enters Missile Frenzy mode to destroy the resort.\nYou lose if the resort is destroyed.\n[c][007eff]100%[-][/c] of damage dealt to the Missile Guidance System is delivered to the Hovercraft.\nIf the Missile Guidance System is destroyed, Missile Frenzy mode ends, and the Hovercraft's Groggy Gauge increases by [c][007eff]50%[-][/c].\nWhen Groggy, Hovercraft's Crit RES decreases by [c][007eff]50%[-][/c]."

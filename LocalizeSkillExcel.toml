820375476-DescriptionJp = "When the Ballista Controller fires Ballista, Chokmah becomes Groggy, and the following effects are applied.\n- Increases damage taken by [c][007eff]50%[-][/c] while Groggy. (Does not apply if Chokmah is in Frenzy state.)\n- Removes all Unstable Flame effects and increases damage taken by [c][007eff]25%[-][/c] for each Unstable Flame removed."
2060423553-NameJp = "Field Response: Fire Ballista"
2060423553-DescriptionJp = "Activates the Ballista Controller at regular intervals (max: [c][007eff]2[-][/c] times).\nOnce activated, the Ballista Controller can only be attacked by EX Skills and fires missiles when its HP drops below 1%. (Does not fire when the Giant Ballista is destroyed.)\nAlso increases Striker enemy's Crit Rate to max and Cost Recovery by [c][007eff]1000[-][/c] (for [c][007eff]22 sec[-][/c])."
3905780948-NameJp = "Center Place"
3905780948-DescriptionJp = "Normal Attack alternates between up to 6 enemies, each attack dealing [c][007eff]100%[-][/c] of ATK as damage. Targets without a barrier receive [c][007eff]100%[-][/c] of ATK as additional damage."
2581051694-NameJp = "Center Place"
2581051694-DescriptionJp = "Normal Attacks alternate between up to 6 enemies, each attack dealing [c][007eff]100%[-][/c] of ATK as damage. Targets without a barrier receive [c][007eff]100%[-][/c] of ATK as additional damage.\nAll damage directly dealt by Tiphareth deals [c][007eff]100%[-][/c] of ATK as additional damage (cooldown: [c][007eff]5 sec[-][/c])."
277873227-NameJp = "Beauty's Offering"
277873227-DescriptionJp = "Tiphareth activates 2 out of 3 cores and summons 4 Laborers around each core. Decreases damage taken by [c][007eff]50%[-][/c] before Sacrificial Healer is used. (Laborer deals [c][007eff]1%[-][/c] of Tiphareth's Max HP and accumulates Groggy gauge when defeated.)"
450642269-NameJp = "Blue Core: Mysteries of Hardship"
450642269-DescriptionJp = "[c][336e9b]The blue core on the left[-][/c] deploys a protective field around itself that reduces damage taken by [c][007eff]50%[-][/c]. Launches a sticky bomb onto a Striker student with shortest range, which explodes after 8 seconds, dealing [c][007eff]600%[-][/c] of ATK as damage to all targets in range. (When a target hit by a sticky bomb enters the protective field, the protective field is deactivated, and the sticky bomb explodes immediately.)"
3355460818-NameJp = "Red Core: Burnt Offering"
3355460818-DescriptionJp = "[c][a0201f]The red core in the front[-][/c] aims at the Striker student with shortest range for 8 sec. Then releases a disintegration wave that ignores [c][007eff]50%[-][/c] of barrier and deals [c][007eff]2800%[-][/c] of ATK as damage to enemies. Deals [c][007eff]1400%[-][/c] of ATK as damage to allies."
2074242949-NameJp = "Yellow Core: Harmony of Vision"
2074242949-DescriptionJp = "[c][ac7028]The yellow core on the right[-][/c] shoots missiles to 6 enemies, each dealing [c][007eff]100%[-][/c] of ATK as damage. If the target does not have a barrier, the missile explodes, dealing [c][007eff]300%[-][/c] of ATK as additional damage. (When the target has a barrier, missiles are reflected back to the yellow core, dealing damage and accumulating the Groggy gauge.)"
2180621774-NameJp = "Sacrificial Healer"
2180621774-DescriptionJp = "Tiphareth deactivates an activated core and absorbs the summoned Laborers. For each absorbed Laborer, Tiphareth recovers [c][007eff]1%[-][/c] of Max HP.\nIncreases ATK by [c][007eff]100%[-][/c] before Beauty's Offering skill is used."
538675197-NameJp = "Strength of Six Kingdoms"
538675197-DescriptionJp = "Tiphareth creates 6 force fields and deals [c][007eff]200%[-][/c] of ATK as damage to 6 enemies. Enemies without a barrier receive [c][007eff]50%[-][/c] Recovery Boost reduction (for [c][007eff]15 sec[-][/c])."
1813686770-NameJp = "Life-Embracing Will"
1813686770-DescriptionJp = "Tiphareth becomes Awakened, increasing ATK by [c][007eff]100%[-][/c].\nChanges Beauty's Offering to activate all cores.\nEnhances Strength of Six Kingdoms to deal [c][007eff]200%[-][/c] of ATK as additional damage."
848656337-NameJp = "Prayer of Enlightened Kings"
848656337-DescriptionJp = "Tiphareth consumes the ATG gauge to charge energy for 10 seconds, then shoots a powerful beam that deals 999999 damage and deactivates immortality. While the beam is firing, Tiphareth activates a firewall to block escape. Striker students become unable to use Basic Skills, but receive a [c][007eff]30%[-][/c] movement speed increase and [c][007eff]1000[-][/c] Cost Recovery increase. (Tiphareth enters groggy state when the skill ends.)"
2836065005-NameJp = "Dawn of Ritual"
2836065005-DescriptionJp = "Tiphareth fires an explosive beam towards the center of enemies, removes their barriers, and deals [c][007eff]300%[-][/c] of ATK as damage."
3631629694-NameJp = "One Who's Completely Revealed"
3631629694-DescriptionJp = "When Tiphareth becomes Groggy, damage taken by Tiphareth increases by [c][007eff]100%[-][/c] and Striker students' Cost Recovery increases by [c][007eff]1000[-][/c] (for [c][007eff]20 sec[-][/c]).\nIf Tiphareth becomes Groggy, damage taken by Tiphareth is increased by [c][007eff]50%[-][/c] until the end of the battle."
3251095476-NameJp = "One Who's Completely Revealed"
3251095476-DescriptionJp = "When Tiphareth becomes Groggy, damage taken by Tiphareth increases by [c][007eff]100%[-][/c] and Striker students' Cost Recovery increases by [c][007eff]1000[-][/c] (for [c][007eff]20[-][/c] sec).\nIf Tiphareth becomes Groggy, damage taken by Tiphareth increases by [c][007eff]50%[-][/c] until the end of the battle.\nSummons 8 Support Drones (for [c][007eff]20 sec[-][/c]) ([c][007eff]1 time[-][/c] per battle).\nEach Support Drone reduces damage taken by Tiphareth by [c][007eff]10%[-][/c]."
1351937543-NameJp = "Devotion to Greatness"
1351937543-DescriptionJp = "Deactivated cores receive [c][007eff]50%[-][/c] reduced damage."
43139917-NameJp = "Beyond Pride"
43139917-DescriptionJp = "Cores can be attacked by other cores' skills, including their own. When this happens, it accumulates the Groggy gauge. Damage taken by cores is transferred to Tiphareth. (This damage ignores Tiphareth's damage taken increase/decrease effect.)"
2071383327-NameJp = "Light that Extinguishes the Moment"
2071383327-DescriptionJp = "When a core is attacked by another core, within [c][007eff]20 seconds[-][/c] of being attacked by a core, it enters the Weakness Exposure state (for [c][007eff]20 sec[-][/c]). When a core in Weakness Exposure state is attacked by a Striker student's EX Skill, it becomes Groggy (for [c][007eff]20 sec[-][/c]). Additionally increases damage taken by [c][007eff]100%[-][/c] (for [c][007eff]10 sec[-][/c])."

2864338029-DescriptionJp = "Fires 20 fireballs in a straight line, targeting the enemy that's farthest away.\nThe following effects apply to targets hit by the fireballs.\n- Cover: [c][007eff]8%[-][/c] of ATK as damage.\n- Target with Cover: [c][007eff]8%[-][/c] of ATK as damage, rooted (for [c][007eff]2 sec[-][/c]).\n- Other Targets: [c][007eff]45%[-][/c] of ATK as damage, [c][007eff]120%[-][/c] of ATK as Burn damage over time (for [c][007eff]40 sec[-][/c]).\nFireballs disappear upon hitting Cover."

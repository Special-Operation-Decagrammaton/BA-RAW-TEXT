2366320942-NameJp = "Unshakeable Bedrock"
2366320942-DescriptionJp = "Yesod and Yesod's Right Hand do not accumulate Groggy. Reduces damage taken by [c][007eff]99%[-][/c].\nYesod summons [c][007eff]3[-][/c] [c][007eff]Blue Lanterns[-][/c] and [c][007eff]3[-][/c] [c][007eff]Red Lanterns[-][/c] when using its EX skill.\nWhen a Lantern is destroyed, Yesod takes damage equal to [c][007eff]0.1%[-][/c] of its Max HP. Puts [c][007eff]1[-][/c] [c][007eff]Lantern Destruction Mark[-][/c] on the lantern destroyer (for [c][007eff]2 sec[-][/c]).\n- If an enemy has [c][007eff]2 or more[-][/c] [c][007eff]Marks[-][/c], all enemies receive an unremovable Stun and 999999 Shock damage over time after [c][007eff]10 sec[-][/c]."
2684712354-NameJp = "Unshakeable Bedrock"
2684712354-DescriptionJp = "Yesod and Yesod's Right Hand do not accumulate Groggy. Reduces damage taken by [c][007eff]99%[-][/c]. Increases Crit DMG RES by [c][007eff]25000[-][/c].\nYesod summons [c][007eff]3[-][/c] [c][007eff]Blue Lanterns[-][/c] and [c][007eff]3[-][/c] [c][007eff]Red Lanterns[-][/c] when using its EX skill.\nWhen a Lantern is destroyed, Yesod takes damage equal to [c][007eff]0.1%[-][/c] of its Max HP. Puts [c][007eff]1[-][/c] [c][007eff]Lantern Destruction Mark[-][/c] on the lantern destroyer (for [c][007eff]2 sec[-][/c]).\n- If an enemy has [c][007eff]2 or more[-][/c] [c][007eff]Marks[-][/c] at once, all enemies receive an unremovable Stun and 999999 Shock damage over time after [c][007eff]10 sec[-][/c]."
2039962385-NameJp = "Revelation"
2039962385-DescriptionJp = "Increases Sonic Effectiveness of ally Strikers, Tactical Support riders, and summons by [c][007eff]200%[-][/c]. Begins calculating Analysis Level. Each Analysis Level increases the ATK of ally Strikers, Tactical Support riders, and summons by [c][007eff]20%[-][/c], Crit Rate by [c][007eff]20%[-][/c], EX Skill damage by [c][007eff]25%[-][/c], and Crit DMG by [c][007eff]25%[-][/c] (5 Levels total). (Activate the buffs by reaching Level 5 or blocking Yesod's attack, in which case the current Level will activate.) If Yesod's EX Skill isn't blocked or Yesod uses its EX Skill, Analysis Level is reset and all buffs are removed. Current Level's effect cannot be received while fighting against Yesod's Right Hand."
1762546744-NameJp = "Revelation"
1762546744-DescriptionJp = "Increases Sonic Effectiveness of ally Strikers, Tactical Support riders, and summons by [c][007eff]200%[-][/c]. Begins calculating Analysis Level. Each Analysis Level increases the ATK of ally Strikers, Tactical Support riders, and summons by [c][007eff]40%[-][/c], Crit Rate by [c][007eff]20%[-][/c], EX Skill damage by [c][007eff]50%[-][/c], and Crit DMG by [c][007eff]50%[-][/c] (5 Levels total). (Activate the buffs by reaching Level 5 or blocking Yesod's attack, in which case the current Level will activate.) If Yesod's EX Skill isn't blocked or Yesod uses its EX Skill, Analysis Level is reset and all buffs are removed. Current Level's effect cannot be received while fighting against Yesod's Right Hand."
2872121469-NameJp = "Azure-Glowing Lantern"
2872121469-DescriptionJp = "When a [c][007eff]Blue[-][/c] Lantern is destroyed, increases Analysis Level by [c][007eff]1[-][/c], and deals [c][007eff]30%[-][/c] of ATK as damage to all enemies. Reduces the EX Skill Cost of the lantern's destroyer by max [c][007eff]50%[-][/c] (rounds down, max 1 EX Skill use). Grants [c][007eff]0.6[-][/c] Skill Cost per non-retreated student (unless destroyer was a T.S. rider). One of the following effects occurs based on the currently active zone:\n- [c][007eff]Red[-][/c] Zone: removes [c][007eff]Red[-][/c] Zone. \n- Neutral Zone: activates [c][007eff]Blue[-][/c] Zone, deals [c][007eff]15%[-][/c] of ATK as damage over time to all enemies.\n- [c][007eff]Blue[-][/c] Zone: deals [c][007eff]100%[-][/c] of ATK as additional damage over time to all enemies (for 10 sec)."
4085667492-NameJp = "Sunset-Lit Branch"
4085667492-DescriptionJp = "When a [c][007eff]Red[-][/c] Lantern is destroyed, increases Analysis Level by [c][007eff]1[-][/c], and deals [c][007eff]30%[-][/c] of ATK as damage to all enemies. Reduces the EX Skill Cost of the lantern's destroyer by max [c][007eff]50%[-][/c] (rounds down, max 1 EX Skill use). Grants [c][007eff]0.6[-][/c] Skill Cost per non-retreated student (unless destroyer was a T.S. rider). One of the following effects occurs based on the currently active zone:\n- [c][007eff]Red[-][/c] Zone: deals [c][007eff]100%[-][/c] of ATK as additional damage over time to all enemies (for 10 sec).\n- Neutral Zone: activates [c][007eff]Red[-][/c] Zone, deals [c][007eff]15%[-][/c] of ATK as damage over time to all enemies.\n- [007eff]Blue[-][/c] Zone: removes [c][007eff]Blue[-][/c] Zone."
566370604-NameJp = "Mark of Prophecy"

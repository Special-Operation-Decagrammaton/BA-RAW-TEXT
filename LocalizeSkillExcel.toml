60897689-NameJp = "Whispered Legends"
60897689-DescriptionJp = "Kurokage strikes with fire and pulls all targets into its zone, dealing [c][007eff]250%[-][/c] of ATK as damage. It then pushes them away, dealing [c][007eff]250%[-][/c] of its ATK as damage.\nEach second, targets affected by Myouki's Compulsion will have their Compulsion decrease by [c][007eff]300[-][/c] but receive damage equal to [c][007eff]20%[-][/c] of their current max HP that is sealed by Compulsion (max [c][007eff]20 sec[-][/c])."
3793078108-NameJp = "Myouki's Compulsion"
3793078108-DescriptionJp = "When battling Kurokage, certain attacks will expose units to Myouki's Compulsion.\n- When trapped in Kurokage's gaze on the floor.\n- When within Kurokage's zone.\nMyouki's Compulsion will gradually erode units' HP and prevent it from being restored to max. Use Recovery skills to reduce Myouki's Compulsion by an amount equal to the [c][007eff]excess recovery amount[-][/c]."
3908389644-NameJp = "Myouki's Compulsion"
3908389644-DescriptionJp = "When battling Kurokage, certain attacks will expose units to Myouki's Compulsion.\n- When trapped in Kurokage's gaze on the floor.\n- When within Kurokage's zone.\nMyouki's Compulsion will gradually erode units' HP and prevent it from being restored to max. Use Recovery skills to reduce Myouki's Compulsion by an amount equal to [c][007eff]1/2 of the excess recovery amount[-][/c]."

2285676125-DescriptionJp = "Using \"Water Amidst Fire, Fire Amidst Water\" spawns an ice pillar with the following attributes:\n- Unbreakable upon spawning (for [c][007eff]2.5 sec[-][/c]), casts [c][007eff]400%[-][/c] of Max HP as a Barrier (for [c][007eff]20 sec[-][/c]).\n- Deals [c][007eff]70%[-][/c] of Max HP as damage [c][007eff]20 sec[-][/c] after spawning.\n- Decreases enemies' DEF by [c][007eff]45%[-][/c]/sets recovery to [c][007eff]1[-][/c]. Deals [c][007eff]30%[-][/c] of ATK as damage every [c][007eff]4 sec[-][/c].\n- Breaks when Geburah's HP drops under [c][007eff]60%[-][/c], changing the Terrain. Breaking causes the Heater's Recovery to increase by [c][007eff]100%[-][/c]/enemies' Healing increases by [c][007eff]200%[-][/c] (for [c][007eff]20 sec[-][/c]).\n- Cannot be targeted by Normal Attacks or Basic Skills."

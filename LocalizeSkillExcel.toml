4028542298-NameJp = "Dawn Devotional"
4028542298-DescriptionJp = "Chokmah destroys all Cover and enters Frenzy state, continuously shooting flame breaths and dealing [c][007eff]50%[-][/c] of ATK as damage per hit to enemies in a fan-shaped area with Normal Attacks.\nIf the flames hit any Cover, they deal [c][007eff]3%[-][/c] of ATK as damage to it and disappear.\nIf the flames hit a target behind Cover, the target is Rooted (for [c][007eff]1 sec[-][/c]).\n\nIf Chokmah is in Frenzy state, the following effects are applied.\n- Even when the reactor gauge hits [c][007eff]0%[-][/c], it does not enter Recovery state. Gauge recovery rate increases in proportion to how low the reactor gauge is.\n- If the reactor gauge is below [c][007eff]70%[-][/c], increases damage taken by [c][007eff]100%[-][/c].\n- Removes all unstable flame effects and decreases Crit RES by [c][007eff]100%[-][/c].\n- Drastically increases reactor gauge if a Striker enemy retreats."
3980173347-NameJp = "Wheels of Unity"

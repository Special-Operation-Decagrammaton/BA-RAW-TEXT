[translation]
10050-100500010 = "안녕하세요, 선생님."
10050-100500020 = "잘 지내고 계시나요?"
10050-100500030 = "전 문제없어요. 매화원의 교관이니까요!"
10050-100500040 = "교관이라…… 코코나도 큰일이네."
10050-100500050 = "힘들지 않아?"
10050-100500060 = "힘들 때도 있지만 괜찮아요."
10050-100500070 = "무엇보다 전 이미 어엿한 숙녀인걸요!"
10050-100500080 = "시간 나실 때 매화원에 방문해 보시겠어요?"
10050-100500090 = "제가 교관으로서의 모습을 똑똑히 보여드리죠!"
10050-100500100 = "그때는 잘 들어가셨나요?"
10050-100500110 = "제대로 된 모습을 못 보여드린 것 같아 죄송하네요."
10050-100500120 = "충분히 멋있었어, 코코나 쨩."
10050-100500130 = "그 정도면 대단했어, 코코나 쨩."
10050-100500140 = "그러니까, 코코나 쨩이 아니라니까요!"
10050-100500150 = "절 코코나 쨩이라고 부르실 거면,"
10050-100500160 = "슌 언니도 슌 쨩이라고 불러야 맞는 게 아닐까요?"
10050-100500170 = "슌이라면 그렇게 불리는 걸 좋아할지도 몰라."
10050-100500180 = "그게…… 무슨 말씀이세요?"
10050-100500190 = "아직도 입에서 쓴맛이 나요……"
10050-100500200 = "커피 미워요……"
10050-100500210 = "생각해 봤는데 말이예요."
10050-100500220 = "반드시 커피를 마실 줄 알아야 어른인 건 아닌 것 같아요."
10050-100500230 = "커피를 마시지 않는 어른도 있지 않을까요?"
10050-100500240 = "숙녀에게는 아직 일렀던 모양이네, 코코나 쨩."
10050-100500250 = "꼭 그렇다는 게 아니라요!"
10050-100500260 = "세상에는 어떻게 해도 맞지 않는 음식이 있는 법이잖아요?"
10050-100500270 = "예를 들자면 저와 당근처럼 말이예요."
10050-100500280 = "다음에는 커피에 우유와 설탕을 타 줄게."
10050-100500290 = "우유와, 설탕이요……?!"
10050-100500300 = "그, 그렇다면 저도 생각을 다시 해 볼 수도……?"
10050-100500310 = "아뇨. 역시 아니에요."
10050-100500320 = "전 훌륭한 숙녀니까, 그런 건 필요 없어요."
10050-100500330 = "그냥 저와 커피가 안 맞는 것뿐이니까요."
10050-100500340 = "그럼 난 우유와 설탕을 타서 맛있는 커피를 마셔야지~"
10050-100500350 = "치사해요!"
10050-100500360 = "어른들은 다 치사해요!"
10050-100500370 = "아무리 생각해도 속고 있는 게 분명해요……"
10050-100500380 = "당근이 맛있어질 리가 없어요……"
10050-100500390 = "맛있는 당근을 먹으러 가자!"
10050-100500400 = "당근 식당에 갈 준비는 됐어?"
10050-100500410 = "가야만…… 하는…… 건가요……?"
10050-100500420 = "우으에으에으에으에……"
10050-100500430 = "제가 오늘 죽어버리면 선생님 때문일 거예요……"
10050-100500440 = "나만 믿어."
10050-100500450 = "멋진 숙녀 대접을 해 줄게."
10050-100500460 = "알았어요."
10050-100500470 = "선생님만…… 믿을게요."

[translation]
10050-100500010 = "สวัสดีค่ะ คุณครู"
10050-100500020 = "คุณครูสบายดีรึเปล่าคะ?"
10050-100500030 = "ฉันสบายดีสุดๆ เลยค่ะ ก็ฉันคือผู้ฝึกสอน\nวินัยแห่งสวนต้นบ๊วยไงล่ะคะ!"
10050-100500040 = "ผู้ฝึกสอนเหรอ... โคโคน่านี่ก็สุดยอดเลยนะ"
10050-100500050 = "ไม่เหนื่อยเหรอ?"
10050-100500060 = "มีช่วงที่เหนื่อยบ้าง แต่ก็ไม่เป็นไรค่ะ"
10050-100500070 = "อีกอย่างตอนนี้ฉันก็เป็นกุลสตรีเต็มตัว\nแล้วนะคะ!"
10050-100500080 = "ถ้าคุณครูมีเวลาก็แวะมาที่สวนต้นบ๊วย\nบ้างสิคะ?"
10050-100500090 = "ฉันจะแสดงให้คุณครูเห็นภาพลักษณ์\nของผู้ฝึกสอนเองค่ะ!"
10050-100500100 = "ตอนนั้นกลับถึงโดยสวัสดิภาพใช่มั้ยคะ?"
10050-100500110 = "ขอโทษด้วยนะคะ ที่ไม่ได้แสดงภาพ\nลักษณ์ดีๆ ให้คุณครูได้เห็นอย่างเต็มที่"
10050-100500120 = "ครูเห็นแล้วละ สุดยอดเลยน้า โคโคน่าจัง"
10050-100500130 = "แค่นั้นก็สุดยอดแล้วนะ โคโคน่าจัง"
10050-100500140 = "บอกแล้วไงคะว่าอย่าเรียกว่าโคโคน่าจังน่ะ!"
10050-100500150 = "ถ้าเรียกฉันว่าโคโคน่าจังละก็"
10050-100500160 = "คุณครูก็ควรเรียกพี่ชุนว่า \"ชุนจัง\" ด้วย\nไม่ใช่รึไงคะ?"
10050-100500170 = "ถ้าเป็นชุนละก็ เรียกแบบนั้นอาจจะชอบ\nก็ได้นะ"
10050-100500180 = "ที่พูดนี่... หมายความว่ายังไงเหรอคะ?"
10050-100500190 = "ในปากยังมีรสขมๆ ติดอยู่เลยค่ะ..."
10050-100500200 = "ฉันไม่ชอบกาแฟเลยค่ะ..."
10050-100500210 = "แต่ฉันมาลองคิดดูแล้ว"
10050-100500220 = "ฉันไม่คิดว่าเราจะต้องดื่มกาแฟให้ได้\nเพื่อให้เป็นผู้ใหญ่หรอกค่ะ"
10050-100500230 = "เพราะผู้ใหญ่ที่ไม่ดื่มกาแฟก็คงมีอยู่\nเหมือนกันใช่มั้ยคะ?"
10050-100500240 = "คงยังเร็วไปที่จะได้เป็นกุลสตรีสินะ\nโคโคน่าจัง"
10050-100500250 = "ไม่ใช่แบบนั้นสักหน่อยค่ะ!"
10050-100500260 = "ยังไงในโลกนี้ก็ต้องมีอาหารที่ไม่ถูกปาก\nเราอยู่เหมือนกันไม่ใช่รึไงคะ?"
10050-100500270 = "อย่างเช่น ฉันไม่ถูกกับแคร์รอตค่ะ"
10050-100500280 = "เอาไว้คราวหน้า ครูจะชงกาแฟ\nใส่นมกับน้ำตาลให้นะ"
10050-100500290 = "นมกับน้ำตาลเหรอคะ...?!"
10050-100500300 = "ถะ... ถ้างั้นฉันอาจจะลองคิดดูอีกครั้ง\nก็ได้..."
10050-100500310 = "ไม่ค่ะ ยังไงก็ไม่ดีกว่าค่ะ"
10050-100500320 = "ฉันเป็นกุลสตรีที่เพียบพร้อม เรื่องแบบ\nนั้นคงไม่จำเป็นหรอกค่ะ"
10050-100500330 = "มันก็แค่ฉันเข้ากันกับ... กาแฟไม่ได้\nแค่นั้นเองค่ะ"
10050-100500340 = "เดี๋ยวครูชงกาแฟใส่นมอร่อยๆ ดื่มเองก็ได้~"
10050-100500350 = "โหดร้ายไปแล้วค่ะ!"
10050-100500360 = "พวกผู้ใหญ่นี่โหดร้ายกันสุดๆ เลย!"
10050-100500370 = "มาคิดๆ ดูแล้วฉันคงโดนหลอกอยู่แน่ๆ เลยค่ะ..."
10050-100500380 = "ไม่มีทางที่แคร์รอตจะอร่อยได้แน่นอนค่ะ"
10050-100500390 = "ไปหาแคร์รอตอร่อยๆ กินกันเถอะ!"
10050-100500400 = "เตรียมพร้อมไปร้านอาหารแคร์รอตรึยัง?"
10050-100500410 = "แค่ไปด้วย... ก็พอแล้ว... ใช่มั้ยคะ?"
10050-100500420 = "มุแงงงง"
10050-100500430 = "ถ้าเกิดว่าวันนี้ฉันตายไปละก็เป็นเพราะ\nคุณครูเลยนะคะ..."
10050-100500440 = "เชื่อครูเหอะน่า"
10050-100500450 = "ครูจะเลี้ยงข้าวกุลสตรีผู้เพียบพร้อมเอง"
10050-100500460 = "ก็ได้ค่ะ"
10050-100500470 = "งั้นฉันจะเชื่อ... คุณครูค่ะ"

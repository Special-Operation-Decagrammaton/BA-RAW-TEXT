[translation]
10050-100500010 = "你好，老師"
10050-100500020 = "你過得還好嗎？"
10050-100500030 = "我很好。再怎麼說我也是梅花園的教官啊！"
10050-100500040 = "教官啊……心菜也辛苦了呢"
10050-100500050 = "不辛苦嗎？"
10050-100500060 = "雖然也有辛苦的時候，但不要緊"
10050-100500070 = "更重要的是，我已經是名優秀的淑女了！"
10050-100500080 = "老師。如果有空的話，要不要來梅花園參觀呢？"
10050-100500090 = "我會讓老師看看我身為教官的模樣！"
10050-100500100 = "前幾天有平安回去了嗎？"
10050-100500110 = "很可惜沒能讓你看到我正經的模樣"
10050-100500120 = "已經十分帥氣囉，心菜醬"
10050-100500130 = "是位優秀的教官唷，心菜醬"
10050-100500140 = "就說了，不是心菜醬！"
10050-100500150 = "如果要叫我心菜醬的話，"
10050-100500160 = "那叫旬姐姐的時候，不是也該叫旬醬嗎？"
10050-100500170 = "如果是旬被那麼叫，應該會很高興呢"
10050-100500180 = "那個……那是什麼意思？"
10050-100500190 = "嘴巴裡還有苦味……"
10050-100500200 = "討厭咖啡……"
10050-100500210 = "我想了想"
10050-100500220 = "發現好像不是能喝咖啡就是大人了"
10050-100500230 = "也有不喝咖啡的大人吧"
10050-100500240 = "嗯。沒有必要勉強喝"
10050-100500250 = "果然是那樣啊！"
10050-100500260 = "世上總有不合自己胃口的食物"
10050-100500270 = "舉例來說，就像我之於紅蘿蔔"
10050-100500280 = "我下次會幫你在咖啡裡面加牛奶跟砂糖的"
10050-100500290 = "牛奶跟砂糖嗎……！？"
10050-100500300 = "那，那樣的話，好像可以重新考慮一下……？"
10050-100500310 = "不，果然還是算了"
10050-100500320 = "我是優秀的淑女，不需要那種東西"
10050-100500330 = "就只是咖啡不適合我而已"
10050-100500340 = "那麼，我就來喝加了牛奶和砂糖的美味咖啡吧"
10050-100500350 = "太狡猾了！"
10050-100500360 = "大人們都很狡猾！"
10050-100500370 = "怎麼想都覺得我被騙了……"
10050-100500380 = "紅蘿蔔怎麼可能會變好吃……"
10050-100500390 = "去吃好吃的紅蘿蔔吧！"
10050-100500400 = "準備好去紅蘿蔔餐廳了嗎？"
10050-100500410 = "不去的話……不行……嗎……？"
10050-100500420 = "噁……噁……噁……"
10050-100500430 = "如果我今天死掉的話，都是老師的錯……"
10050-100500440 = "就相信我吧"
10050-100500450 = "我會把你當淑女對待的"
10050-100500460 = "我知道了"
10050-100500470 = "就……相信老師了"

[translation]
13003-938 = "선생님."
13003-939 = "개인적으로 선생님께 문의드리고 싶은 게 있습니다만,"
13003-940 = "괜찮으시면 잠깐 상담을 부탁드려도 될까요?"
13003-941 = "물론이야. 하스미의 부탁이라면."
13003-942 = "언제든지 불러줘."
13003-943 = "아아."
13003-944 = "넵!"
13003-945 = "감사합니다. 사실 거절당하면 어떡할까 했는데……."
13003-946 = "조금 감동했습니다."
13003-947 = "음…… 제가 무슨 소리를."
13003-948 = "그럼 잠시 후에 뵙는 걸로."
13003-949 = "선생님……."
13003-950 = "아, 아무것도 아닙니다."
13003-951 = "오늘 일은 잊어주세요……."
13003-952 = "선생님. 제 멋대로인 부탁이지만……"
13003-953 = "저번에 못다 한 상담을 다시 받을 수 있을까요."
13003-954 = "응. 물론이야. 이번에야말로 상담을 끝내자."
13003-955 = "아아……."
13003-956 = "넵. 감사합니다."
13003-957 = "기다리고 있겠습니다."
13003-958 = "선생님……."
13003-959 = "오늘 일도…… 잊어주세요……."
13003-960 = "부탁드리겠습니다……."
13003-961 = "가끔은 혼자 있는 시간이 좋을 때가 있습니다."
13003-962 = "딱히 고독을 즐기는 성격은 아닌데도 말이죠."
13003-963 = "감수성이 높구나."
13003-964 = "소녀구나. 하스미는."
13003-965 = "네……? 네?!"
13003-966 = "그, 그런 걸까요?"
13003-967 = "뭔가 부끄럽네요. ……죄송합니다."
13003-968 = "오늘은 고생하셨습니다."
13003-969 = "어쩐지 아무것도 안 한 것 같지만."
13003-970 = "그것만으로도 충분히 감사합니다."
13003-971 = "음……. 요즘 잠을 잘 못 자고 있는데요."
13003-972 = "두통도 있고……. 원인이 뭘까요."
13003-973 = "음…… 글쎄. 병원을 가보는 게 좋지 않을까?"
13003-974 = "네…… 역시 그게 맞지만……"
13003-975 = "이런 일로 자리를 비울 수는 없는 노릇이라……."
13003-976 = "역시 아무것도 아닙니다. 선생님."
13003-977 = "또 심려를 끼쳐드렸네요."
13003-978 = "하지만 다이어트를 그만두진 않겠어요."
13003-979 = "잘 설명은 할 수 없지만……."
13003-980 = "이대로라면 스스로에게 지는 느낌이 드니까요."
13003-981 = "………하스미가 괜찮다면 괜찮은 거겠지."
13003-982 = "복잡하구나. 마음이라는 건……."
13003-983 = "요즘 늦게까지 동아리 업무가 이어지고 있어서……."
13003-984 = "선생님도 야근이 잦으시죠?"
13003-985 = "저도 힘내겠습니다."
13003-986 = "응. 하스미도 힘내!"
13003-987 = "함께 힘내자!"
13003-988 = "선생님."
13003-989 = "감기 걸리지 않게 뜨거운 물에 목욕하시고"
13003-990 = "푹 쉬세요."
13003-991 = "그럼, 다음에 또."
13003-130030010 = "선생님."
13003-130030020 = "갑작스러운 연락 실례합니다."
13003-130030030 = "무슨 일이야?"
13003-130030040 = "다름 아니라 분실물을 찾고 있어서요."
13003-130030050 = "혹시 수첩을 보지 못하셨나요?"
13003-130030060 = "표지에 크게 정의실현부의 로고가 그려져 있는 것입니다만."
13003-130030070 = "그거라면 내가 갖고 있어."
13003-130030080 = "아, 회의실에 떨어져 있던 거?"
13003-130030090 = "아, 역시 선생님께서 챙겨 주셨군요."
13003-130030100 = "송구스럽지만, 잠시 방문하겠습니다."
13003-130030110 = "선생님."
13003-130030120 = "오늘은 급하게 실례했습니다."
13003-130030130 = "괜찮아? 바쁜 일은 해결됐어?"
13003-130030140 = "네? 바쁜 일이요?"
13003-130030150 = "아"
13003-130030160 = "아무것도 아닙니다."
13003-130030170 = "네, 덕분에 잘 해결되었습니다."

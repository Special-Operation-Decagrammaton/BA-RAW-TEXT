[translation]
13003-938 = "您好，老師"
13003-939 = "我有點私事想要詢問您……"
13003-940 = "如果可以的話，能和您商量一下嗎？"
13003-941 = "當然"
13003-942 = "隨時都能找我"
13003-943 = "非，非常感謝！"
13003-944 = "不，不好意思，忍不住就……"
13003-945 = "那個，一直想說如果被拒絕的話怎麼辦……"
13003-946 = "所以鬆了口氣"
13003-947 = "對不起，可能說了些奇怪的話……"
13003-948 = "那就之後再聯絡，萬事拜託了"
13003-949 = "老師，那個……"
13003-950 = "不，沒，沒什麼"
13003-951 = "今天的事請忘了吧……"
13003-952 = "老師，很抱歉這麼任性，但是……"
13003-953 = "前幾天沒能好好商量的事，能再拜託您嗎……？"
13003-954 = "嗯。當然"
13003-955 = "非常感謝！"
13003-956 = "不好意思在百忙之中打擾您，萬事拜託了"
13003-957 = "那個，地點的話……"
13003-958 = "老師……"
13003-959 = "今天的事……也請忘了吧……"
13003-960 = "拜託您了……"
13003-961 = "有時候，不是會想念自己獨處的時間嗎？"
13003-962 = "雖然不是特別喜歡孤獨，但偶爾也有這樣的心情"
13003-963 = "有這樣的時候呢，特別是當學生的時期"
13003-964 = "青春期的少女呢！我覺得很好！"
13003-965 = "咦，啊，那個……"
13003-966 = "不好意思，總覺得開始感到有點羞恥……"
13003-967 = "明明是自己先提起的，真是抱歉……"
13003-968 = "今天也辛苦了"
13003-969 = "總覺得今天沒做什麼事"
13003-970 = "但度過了美好的時光，非常感謝"
13003-971 = "最近睡不太著……"
13003-972 = "頭痛得很厲害，也不知道原因呢……"
13003-973 = "也許去醫院看看比較好……？"
13003-974 = "我想也是呢……"
13003-975 = "但是，現在社團的工作也忙得不可開交，很難離開崗位……"
13003-976 = "不好意思，讓您擔心了"
13003-977 = "謝謝您，老師"
13003-978 = "今天非常謝謝您，老師"
13003-979 = "但是，我還是不會放棄減肥的"
13003-980 = "怎麼說呢，覺得這樣下去會輸給自己"
13003-981 = "別把自己逼得太緊……"
13003-982 = "少女的心真是複雜啊……希望你別太勉強自己"
13003-983 = "這幾天，社團的工作經常到很晚都還沒結束……"
13003-984 = "不過，老師也很辛苦地在加班吧？"
13003-985 = "我也會加油的"
13003-986 = "嗯，我會支持你的"
13003-987 = "一起加油吧！"
13003-988 = "老師"
13003-989 = "為了避免感冒，請洗個熱水澡"
13003-990 = "好好休息哦"
13003-991 = "那麼，下次見"
13003-130030010 = "老師"
13003-130030020 = "抱歉突然打擾您"
13003-130030030 = "怎麼了嗎？"
13003-130030040 = "我正在尋找遺失物"
13003-130030050 = "請問您有沒有看到一本筆記本？"
13003-130030060 = "封面上印有很大的「實現正義部」的標誌"
13003-130030070 = "如果是那本的話在我這邊"
13003-130030080 = "啊，是掉在會議室的那本嗎？"
13003-130030090 = "原來是老師幫我收起來了啊"
13003-130030100 = "真是不好意思，我馬上過去取回"
13003-130030110 = "老師"
13003-130030120 = "抱歉今天突然打擾您"
13003-130030130 = "還好嗎？要忙的事都解決了？"
13003-130030140 = "咦？要忙的事？"
13003-130030150 = "啊"
13003-130030160 = "沒什麼"
13003-130030170 = "託您的福，已經順利解決了"

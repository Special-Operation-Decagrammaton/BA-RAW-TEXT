[translation]
13003-938 = "Sensei."
13003-939 = "There's something I'd like to ask you personally."
13003-940 = "Is it okay if I consult you for advice?"
13003-941 = "Sure. Whatever you need, Hasumi."
13003-942 = "You can call me anytime."
13003-943 = "Oh."
13003-944 = "Great!"
13003-945 = "Thank you. I was worried you would say no..."
13003-946 = "I'm kind of impressed."
13003-947 = "Um... I don't know what I'm saying."
13003-948 = "Okay, I'll see you soon."
13003-949 = "Sensei..."
13003-950 = "A-Actually, never mind."
13003-951 = "Please forget about today..."
13003-952 = "Sensei, I know this is a selfish request..."
13003-953 = "But can we continue our consultation since we didn't finish last time?"
13003-954 = "Yes, of course. This time we'll do the full consultation."
13003-955 = "Oh..."
13003-956 = "Okay. Thank you."
13003-957 = "I'll be waiting for you."
13003-958 = "Sensei..."
13003-959 = "Again, please forget...about today..."
13003-960 = "I hope you understand..."
13003-961 = "Sometimes, it's nice to be by yourself."
13003-962 = "It's not like I enjoy solitude more than others or anything."
13003-963 = "You seem sensitive by nature."
13003-964 = "You're pretty sensitive, right, Hasumi?"
13003-965 = "H-Huh?!"
13003-966 = "D-Do you think so?"
13003-967 = "I feel kind of embarrassed... I'm sorry."
13003-968 = "You did so much for me today."
13003-969 = "I suppose we didn't actually do much besides talk, but..."
13003-970 = "It was more than enough. Thank you."
13003-971 = "Hmm... I haven't been sleeping well lately."
13003-972 = "I have a headache too... I wonder why."
13003-973 = "Hmm... I don't know. Maybe you should see a doctor?"
13003-974 = "Yes... That would be the right thing to do, but..."
13003-975 = "I can't be absent for something like that... "
13003-976 = "Please don't worry, Sensei."
13003-977 = "It shouldn't be anything serious."
13003-978 = "But I'm not going to stop my diet."
13003-979 = "I can't really explain it, but..."
13003-980 = "If I do, I feel like I'll be losing the fight with myself."
13003-981 = "...I trust your judgment, Hasumi."
13003-982 = "Navigating your own mind can be complicated..."
13003-983 = "These days, I've been busy with club work until late..."
13003-984 = "You've also been working late, right?"
13003-985 = "I'll do my best too."
13003-986 = "Yes. Fight on, Hasumi!"
13003-987 = "We got this!"
13003-988 = "Sensei."
13003-989 = "Take a hot bath and get plenty of rest"
13003-990 = "so you don't catch a cold."
13003-991 = "See you later."
13003-130030010 = "Sensei."
13003-130030020 = "My apologies for reaching out so suddenly."
13003-130030030 = "Is everything okay?"
13003-130030040 = "I'm searching for a lost item."
13003-130030050 = "Have you seen a notebook anywhere?"
13003-130030060 = "It would have a large Justice Task Force logo on the cover."
13003-130030070 = "Yes, I have it!"
13003-130030080 = "Oh! I found one in the meeting room."
13003-130030090 = "Ah, I really left it there."
13003-130030100 = "I'll come by shortly to come pick it up. I hope it's not too much of a bother."
13003-130030110 = "Sensei."
13003-130030120 = "My apologies again for the intrusion."
13003-130030130 = "Is everything okay with your emergency?"
13003-130030140 = "What? Emergency?"
13003-130030150 = "Ah."
13003-130030160 = "It's nothing."
13003-130030170 = "Yes... It worked out, thanks to you."

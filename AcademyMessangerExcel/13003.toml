[translation]
13003-938 = "คุณครูคะ"
13003-939 = "ฉันมีเรื่องส่วนตัวที่อยากจะถามคุณครู\nอยู่ค่ะ"
13003-940 = "ถ้าคุณครูไม่ว่าอะไร ฉันจะขอคำปรึกษา\nหน่อยได้มั้ยคะ?"
13003-941 = "ได้อยู่แล้วสิ ถ้าเป็นคำขอของฮาสุมิละก็..."
13003-942 = "บอกครูได้ตลอดเลยนะ"
13003-943 = "อ่า..."
13003-944 = "ค่ะ!"
13003-945 = "ขอบคุณมากเลยค่ะ! ความจริง... ฉันก็\nกังวลอยู่ว่าถ้าถูกปฏิเสธจะทำยังไงดี..."
13003-946 = "น่าประทับใจมากเลยค่ะ"
13003-947 = "อืม... ฉันพูดอะไรเนี่ย"
13003-948 = "ถ้างั้นเดี๋ยวเจอกันนะคะ"
13003-949 = "คุณครูคะ..."
13003-950 = "มะ...ไม่มีอะไรหรอกค่ะ!"
13003-951 = "ช่วยลืมเรื่องวันนี้ไปด้วยนะคะ..."
13003-952 = "คุณครูคะ ถึงจะเป็นคำขอที่เอาแต่ใจไป\nสักนิด..."
13003-953 = "แต่ฉันจะขอปรึกษาเรื่องที่เคยบอกคุณครู\nไว้ได้มั้ยคะ?"
13003-954 = "อื้อ ได้อยู่แล้วล่ะ คราวนี้ครูจะต้องให้\nคำปรึกษาให้ได้เลย"
13003-955 = "อ่า..."
13003-956 = "ค่ะ! ขอบคุณมากนะคะ!"
13003-957 = "แล้วฉันจะรอนะคะ"
13003-958 = "คุณครูคะ..."
13003-959 = "เรื่องวันนี้ช่วยลืมไปด้วยเถอะนะคะ..."
13003-960 = "ขอร้องละค่ะ..."
13003-961 = "บางครั้งการได้ใช้เวลาอยู่กับตัวเองก็\nดีเหมือนกันนะคะ"
13003-962 = "ถึงฉันจะไม่ใช่ประเภทที่ชอบอยู่คนเดียว\nก็เถอะค่ะ"
13003-963 = "เธอเป็นพวกอ่อนไหวง่ายสินะ"
13003-964 = "ฮาสุมิเองก็เป็นเด็กผู้หญิงนี่นา..."
13003-965 = "คะ...? คะ?!"
13003-966 = "ยะ...อย่างนั้นเหรอคะ?"
13003-967 = "รู้สึกอายจังเลย... ขอโทษนะคะ!"
13003-968 = "วันนี้เหนื่อยหน่อยนะคะ"
13003-969 = "ถึงจะไม่ได้ทำอะไรมากมาย"
13003-970 = "แต่แค่นั้นก็ขอบคุณมากแล้วค่ะ"
13003-971 = "อืม... ช่วงนี้ฉันนอนไม่ค่อยหลับค่ะ"
13003-972 = "รู้สึกปวดหัวนิดๆ... เพราะอะไรกันนะ"
13003-973 = "อืม... อย่างนั้นเองหรอกเหรอ\nลองไปหาหมอสักหน่อยดีมั้ย?"
13003-974 = "ค่ะ แบบนั้นน่าจะดีกว่า... "
13003-975 = "แค่ปวดหัวอย่างเดียวฉันคงลางานไม่ได้\nหรอกค่ะ..."
13003-976 = "ไม่ใช่เรื่องใหญ่หรอกค่ะ คุณครู"
13003-977 = "ฉันทำให้คุณครูเป็นห่วงอีกแล้วสินะคะ"
13003-978 = "แต่ฉันจะไม่เลิกไดเอตหรอกนะคะ"
13003-979 = "ฉันอธิบายไม่ค่อยถูก..."
13003-980 = "แต่ถ้าปล่อยไปเรื่อยๆ ฉันรู้สึกเหมือนน้ำ\nหนักมันขึ้นเองตลอดเลยค่ะ"
13003-981 = "ถ้าฮาสุมิบอกว่าไม่เป็นไร\nก็คงไม่เป็นไรแล้วล่ะ"
13003-982 = "ซับซ้อนจริงๆ เลยนะ จิตใจคนเนี่ย..."
13003-983 = "ช่วงนี้ฉันต้องอยู่ทำงานของชมรมจนดึกบ่อยๆ..."
13003-984 = "คุณครูเองก็อยู่ดึกด้วยใช่มั้ยคะ?"
13003-985 = "ฉันเองก็จะพยายามค่ะ"
13003-986 = "อื้อ ฮาสุมิเองก็พยายามเข้านะ!"
13003-987 = "เรามาพยายามด้วยกันเถอะ!"
13003-988 = "คุณครูคะ"
13003-989 = "อาบน้ำอุ่นๆ แล้วพักผ่อนเถอะค่ะ"
13003-990 = "จะได้ไม่เป็นหวัดนะคะ"
13003-991 = "ถ้างั้น... ไว้เจอกันนะคะ"
13003-130030010 = "คุณครูคะ"
13003-130030020 = "ขออภัยที่ติดต่อมากะทันหันค่ะ"
13003-130030030 = "มีอะไรเหรอ?"
13003-130030040 = "ไม่มีอะไรหรอกค่ะ ฉันแค่หาตามหา\nบางอย่าง"
13003-130030050 = "คุณครูเห็นสมุดโน้ตบ้างมั้ยคะ?"
13003-130030060 = "ที่หน้าปกมีโลโก้ชมรมทวงความ\nยุติธรรมอยู่ด้วยค่ะ"
13003-130030070 = "ถ้าสมุดเล่มนั้นน่ะอยู่ที่ครูนะ"
13003-130030080 = "อ๋อ ที่ทำหล่นไว้ที่ห้องประชุมน่ะเหรอ?"
13003-130030090 = "อ่า อยู่ที่คุณครูสินะคะ"
13003-130030100 = "ขอโทษนะคะ แต่ว่าเดี๋ยวฉันขอแวะ\nเข้าไปสักหน่อยนะคะ"
13003-130030110 = "คุณครูคะ"
13003-130030120 = "ขอโทษที่จู่ๆ ฉันเสียมารยาทแบบนี้\nนะคะ"
13003-130030130 = "เป็นอะไรรึเปล่า? จัดการเรื่องยุ่งๆ\nได้แล้วใช่มั้ย?"
13003-130030140 = "คะ? เรื่องยุ่งๆ เหรอคะ?"
13003-130030150 = "อ่า"
13003-130030160 = "ไม่มีอะไรหรอกค่ะ"
13003-130030170 = "เรียบร้อยแล้วค่ะ ต้องขอบคุณคุณครู\nเลยนะคะ"

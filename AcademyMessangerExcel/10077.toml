[translation]
10077-100770010 = "ฉันได้ยินข่าวมาค่ะ"
10077-100770020 = "ว่าวันนี้คุณครูมาที่ทรีนิตี้?"
10077-100770030 = "ฮะฮ่า"
10077-100770040 = "บังเอิญว่า..."
10077-100770050 = "คราวนี้ฉันได้รับหน้าที่ให้คอยช่วย\nคุณครูค่ะ"
10077-100770060 = "ว่าไง อิจิกะ"
10077-100770070 = "ครูฝากด้วยนะ!"
10077-100770080 = "ค่า~"
10077-100770090 = "แล้วเจอกันนะคะ!"
10077-100770100 = "คุณครู~ กลับถึงอย่างปลอดภัย\nใช่มั้ยคะ?"
10077-100770110 = "อื้อ ถึงแล้วละ"
10077-100770120 = "ขอบใจที่ดูแลครูให้มาถึง\nอย่างปลอดภัยนะ"
10077-100770130 = "ขอบจงขอบใจอะไรกัน ฮิฮิ"
10077-100770140 = "ถ้าคุณครูถึงที่พักอย่างปลอดภัยแล้ว"
10077-100770150 = "ฉันขอตัวไปนอนก่อนนะคะ"
10077-100770160 = "ฝันดีค่า~"
10077-100770170 = "อ่า"
10077-100770180 = "ทำอะไรดีนะ"
10077-100770190 = "ตอนไม่มีงาน "
10077-100770200 = "คุณครูชอบทำอะไรเหรอคะ?"
10077-100770210 = "ส่วนมากนอนหลับเหมือนตายเลยละ"
10077-100770220 = "ไม่เล่นเกม... ก็ทำงานอดิเรก?\nว่ามีอะไรรึเปล่า?"
10077-100770230 = "อืม"
10077-100770240 = "อย่างนั้นเหรอคะ"
10077-100770250 = "ค่ะ ฮิฮิ"
10077-100770260 = "ฮื้ม~ วันนี้สนุกจังเลยค่ะ"
10077-100770270 = "สำหรับฉันแล้ว วันนี้ได้ถือว่ากำไร\nมากเลยละค่ะ ในหลายๆ เรื่องเลย"
10077-100770280 = "ยังเล่นกีตาร์อยู่มั้ย?"
10077-100770290 = "เริ่มสนุกกับการเล่นดนตรีหรือยัง?"
10077-100770300 = "คะ?"
10077-100770310 = "อ้อ"
10077-100770320 = "ไม่ค่ะ"
10077-100770330 = "ฉันลองเล่นที่บ้านคนเดียวอยู่ 2-3 ครั้ง\nแต่ก็ยังไม่ค่อยอินเท่าไหร่"
10077-100770340 = "ก็เลยเอาวางไว้ที่มุมห้องค่ะ"
10077-100770350 = "ฮ่าๆ"
10077-100770360 = "คุณครู"
10077-100770370 = "ตอนนี้ว่างมั้ยคะ?"
10077-100770380 = "ก็พอว่างอยู่? มีเรื่องอะไรเหรอ?"
10077-100770390 = "กำลังนั่งขี้เกียจอยู่เลย"
10077-100770400 = "อ่า"
10077-100770410 = "เปล่าหรอกค่ะ ก็แค่..."
10077-100770420 = "ฉันเบื่อมากๆ เลยน่ะ"
10077-100770430 = "ฉันกำลังนั่งรอคนอื่นๆ อยู่ เลยไม่มี\nอะไรทำค่ะ"
10077-100770440 = "ฮิฮิ"
10077-100770450 = "คุณครู"
10077-100770460 = "ตอนนี้พอมีเวลามั้ยคะ?"
10077-100770470 = "อ่า"
10077-100770480 = "ไม่ต้องห่วงค่ะ ไม่ได้มีเรื่องอะไร\nหรอกค่ะ"
10077-100770490 = "ครูว่างอยู่พอดี เดี๋ยวออกไปหานะ"
10077-100770500 = "เดี๋ยวไปเจอกันที่สวนสาธารณะมั้ย?"
10077-100770510 = "โอ้"
10077-100770520 = "ดีเลยค่ะ"
10077-100770530 = "งั้นไว้เจอกันนะคะ"
10077-100770540 = "อืม"
10077-100770550 = "วันนี้ฉันสนุกมากเลยค่ะ"
10077-100770560 = "ขอบคุณนะคะคุณครู"
10077-100770570 = "คราวหน้าฉันจะมาขอให้ช่วยอีกนะคะ"
10077-100770580 = "ก็คุณครูบอกไว้นี่ว่าทำได้"
10077-100770590 = "ได้สิ ไว้ลองหาอะไรที่รู้สึกคล้ายๆ กันอีกนะ"
10077-100770600 = "ต่อไปก็ทำแบบนี้อีกนะ"
10077-100770610 = "ค่า~"
10077-100770620 = "อืม"
10077-100770630 = "แต่ว่า"
10077-100770640 = "ฉันคิดว่า"
10077-100770650 = "ฮิฮิ"
10077-100770660 = "ฉันอาจจะไม่สนุกกับอะไรอื่น"
10077-100770670 = "นอกจากสิ่งนี้ไปสักพักเลยก็ได้ค่ะ"

[translation]
10126-101260010 = "นี่ ครู"
10126-101260020 = "ฉันมีเรื่องที่... อยากให้ช่วยหน่อยน่ะ"
10126-101260030 = "หืม? เรื่องอะไรเหรอ?"
10126-101260040 = "เรื่องนั้น... เป็นความลับ"
10126-101260050 = "มันอาจเป็นเรื่องดี... สำหรับคุณครูด้วยนะ"
10126-101260060 = "อะไรเหรอ? อยากรู้จัง"
10126-101260070 = "งั้นคงต้องออกไปดูแล้วสินะ?"
10126-101260080 = "มาสิ แล้วฉันจะบอก"
10126-101260090 = "อิฮิฮิ..."
10126-101260100 = "ดะ... เดี๋ยวสิ"
10126-101260110 = "นี่ คุณคาโนเอะ?"
10126-101260120 = "ครู กลับถึงที่พักปลอดภัยใช่มั้ย?"
10126-101260130 = "นึกเรื่องในอดีตออกบ้างรึยัง?"
10126-101260140 = "รู้สึกเหมือนกลับไปเป็นเด็กอีกครั้งเลย"
10126-101260150 = "เป็นแบบนี้ตลอดเลยนะ"
10126-101260160 = "ดีละ"
10126-101260170 = "ฉันเองก็มีวิธีอยู่เหมือนกัน"
10126-101260180 = "งั้น... ไว้เจอกันใหม่นะ"
10126-101260190 = "ตอนนั้นฉันจะแสดงตัวตนที่แท้จริง\nให้เห็นแล้วกัน"
10126-101260200 = "ครู... เป็นพวกปฏิเสธเก่งรึเปล่า?"
10126-101260210 = "หรือว่าเป็นพวกปฏิเสธไม่เก่ง?"
10126-101260220 = "หืม? จู่ๆ ถามทำไมเหรอ?"
10126-101260230 = "ฮิฮิ ไม่มีอะไรหรอก แค่สงสัยน่ะ"
10126-101260240 = "ไม่ต้องใส่ใจหรอก"
10126-101260250 = "ฮิฮิ..."
10126-101260260 = "อิฮิฮิฮิ..."
10126-101260270 = "ฟัง ASMR ที่ฉันให้ไปรึยัง?"
10126-101260280 = "อื้อ ฟังแล้วตกใจมากเลยละ"
10126-101260290 = "คืนนี้... ฟังตอนนอนด้วยล่ะ"
10126-101260300 = "แล้วก็คิดถึงฉันด้วยล่ะ"
10126-101260310 = "ถ้าอยากฟังเสียงอื่นก็บอกได้เลยนะ"
10126-101260320 = "ฉันจะอัดเสียงแล้วส่งไปให้"
10126-101260330 = "คะ... แค่อันนี้ก็พอแล้ว!"
10126-101260340 = "โอเค... งั้นก็ฝันดีนะ..."
10126-101260350 = "ไว้เจอกันนะ"
10126-101260360 = "ฮิฮิฮิ..."
10126-101260370 = "วันนี้พอมีเวลาบ้างมั้ยครู?"
10126-101260380 = "แต่ถ้ายุ่งก็ไม่เป็นไร"
10126-101260390 = "จะ... จู่ๆ ถามอะไรน่ะ?"
10126-101260400 = "ฉันต้องการคนช่วยอัดเสียงน่ะ\nด่วนๆ เลย"
10126-101260410 = "จู่ๆ คนที่เคยช่วยก็มีธุระกะทันหัน..."
10126-101260420 = "ถ้าเป็นคุณครูคงจะช่วยได้เลย..."
10126-101260430 = "ได้มั้ย?"
10126-101260440 = "มาช่วยฉันอัดเสียงหน่อย... ได้มั้ย?"
10126-101260450 = "ถ้าต้องการให้ช่วยก็ได้อยู่แล้ว!"
10126-101260460 = "ฮิฮิ งั้นเหรอ รีบๆ มาล่ะ"
10126-101260470 = "ฉันจะรอนะ"
10126-101260480 = "ครู..."
10126-101260490 = "วันนี้ฉันจะยอมถอยให้"
10126-101260500 = "แต่คราวหน้าไม่มีแล้วนะ"
10126-101260510 = "อะ... เอาแค่พอดีๆ เถอะ"
10126-101260520 = "งั้นวันนี้..."
10126-101260530 = "ฟัง ASMR ฉันตอนนอนด้วยล่ะ"
10126-101260540 = "แล้วเจอกัน... ในความฝันนะ"
10126-101260550 = "อิฮิฮิ..."
10126-101260560 = "ครู... ฉันมีเรื่องจะรบกวนหน่อย"
10126-101260570 = "อยากให้ฟังคำขอของฉันหน่อยน่ะ"
10126-101260580 = "หืม? เรื่องอะไรเหรอ?"
10126-101260590 = "ถึงวันนี้จะเจอฉันก็ทำเป็นไม่รู้จักทีนะ"
10126-101260600 = "อย่าคุยหรือสบตากับฉัน"
10126-101260610 = "เข้าใจมั้ย...?"
10126-101260620 = "วันนี้ครูก็จะไปที่ไวลด์ฮันต์เหมือนกันนะ"
10126-101260630 = "ไปที่นั่นแล้วก็ต้องทำเป็นไม่รู้จักเหรอ?"
10126-101260640 = "จะที่ไหนก็ช่าง"
10126-101260650 = "ทำตามที่ฉันบอกแล้วกัน"
10126-101260660 = "ถ้าไม่งั้น... ครูจะมีอันตราย"
10126-101260670 = "ฉันจริงจังนะ"
10126-101260680 = "เข้าใจมั้ย...?"
10126-101260690 = "เอ๋? อืม... เข้าใจแล้ว"
10126-101260700 = "งั้นก็ทำตามที่ฉันบอกด้วยล่ะ"
10126-101260710 = "ไว้ปลอดภัยแล้ว ฉันจะโทรหาเอง..."

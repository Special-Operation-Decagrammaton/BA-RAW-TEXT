[translation]
10126-101260010 = "那個，老師"
10126-101260020 = "我有件事……希望能請你幫忙"
10126-101260030 = "嗯？是什麼事？"
10126-101260040 = "這……是祕密"
10126-101260050 = "不過對老師來說……應該也是好事"
10126-101260060 = "怎麼樣？好奇嗎？"
10126-101260070 = "那就得親自過來確認了吧？"
10126-101260080 = "來了我就告訴你"
10126-101260090 = "咿嘻嘻……"
10126-101260100 = "那，那個？"
10126-101260110 = "鹿江同學？"
10126-101260120 = "老師順利回去了嗎？"
10126-101260130 = "是不是開始想起前世的記憶了？"
10126-101260140 = "有種重拾童心的感覺"
10126-101260150 = "看來你還打算繼續裝傻"
10126-101260160 = "沒關係"
10126-101260170 = "我還有其他辦法"
10126-101260180 = "那麼……下次再見"
10126-101260190 = "到時候我會讓你看見真正的我"
10126-101260200 = "老師……是擅長拒絕的人嗎？"
10126-101260210 = "還是不擅長拒絕的人呢？"
10126-101260220 = "嗯？怎麼突然問這個？"
10126-101260230 = "咿嘻。沒什麼，只是好奇而已"
10126-101260240 = "不用在意"
10126-101260250 = "咿嘻……"
10126-101260260 = "咿嘻嘻嘻……"
10126-101260270 = "我給你的ASMR……有仔細聽嗎？"
10126-101260280 = "嗯，聽了之後真的很驚訝"
10126-101260290 = "今晚……就聽著那個睡吧"
10126-101260300 = "記得要想著我哦"
10126-101260310 = "如果還想聽別的聲音就告訴我……"
10126-101260320 = "我會馬上錄給你的"
10126-101260330 = "現，現在這樣就可以了！"
10126-101260340 = "這樣啊……那就祝你好夢囉……"
10126-101260350 = "下次再見"
10126-101260360 = "咿嘻嘻……"
10126-101260370 = "老師，今天有空嗎？"
10126-101260380 = "就算沒空也得有空才行"
10126-101260390 = "突，突然怎麼了？"
10126-101260400 = "急需錄音助手"
10126-101260410 = "原本的負責人臨時有事……"
10126-101260420 = "我想老師應該很快就能學會……"
10126-101260430 = "怎麼樣？"
10126-101260440 = "你願意……擔任我的錄音助手嗎？"
10126-101260450 = "需要幫忙就該去！"
10126-101260460 = "咿嘻。好，那就請你盡快過來吧"
10126-101260470 = "我等你哦"
10126-101260480 = "老師……"
10126-101260490 = "今天雖然乖乖放棄了"
10126-101260500 = "下次可就不一樣了哦"
10126-101260510 = "還，還請手下留情"
10126-101260520 = "那麼今天也……"
10126-101260530 = "聽著我的ASMR睡吧"
10126-101260540 = "我們……夢裡再見"
10126-101260550 = "咿嘻嘻……"
10126-101260560 = "老師，我有個請求"
10126-101260570 = "一定要答應的那種請求"
10126-101260580 = "嗯？什麼請求？"
10126-101260590 = "今天就算看到我，也要裝作沒看見"
10126-101260600 = "絕對不能跟我說話，也不能對上眼神"
10126-101260610 = "知道嗎……？"
10126-101260620 = "今天我也會去狂獵"
10126-101260630 = "在那裡也要裝作沒看見嗎？"
10126-101260640 = "任何地方都一樣"
10126-101260650 = "記得要照我說的做"
10126-101260660 = "不然……老師會有危險"
10126-101260670 = "我是認真的"
10126-101260680 = "知道了嗎……？"
10126-101260690 = "咦？嗯……我知道了"
10126-101260700 = "那一定要遵守哦"
10126-101260710 = "等安全之後我會再聯絡……"

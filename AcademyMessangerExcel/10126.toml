[translation]
10126-101260010 = "저기, 선생."
10126-101260020 = "도와줬으면…… 하는 일이 있어."
10126-101260030 = "응? 무슨 일인데?"
10126-101260040 = "그건…… 비밀."
10126-101260050 = "아마 선생한테도…… 좋은 일일 거야."
10126-101260060 = "어때? 궁금하지?"
10126-101260070 = "그럼 직접 와서 확인해야겠지?"
10126-101260080 = "오면 알려줄게."
10126-101260090 = "이히히……"
10126-101260100 = "저, 저기요?"
10126-101260110 = "카노에 씨?"
10126-101260120 = "선생. 잘 들어갔지?"
10126-101260130 = "슬슬 전생의 기억이 떠올랐을까?"
10126-101260140 = "동심으로 돌아간 기분이었어."
10126-101260150 = "계속 그렇게 나온다는 거군."
10126-101260160 = "좋아."
10126-101260170 = "나도 방법이 있지."
10126-101260180 = "그럼…… 다음에 또 보자고."
10126-101260190 = "그땐 내 진짜 모습을 보여줄 테니까."
10126-101260200 = "선생은…… 거절을 잘하는 타입?"
10126-101260210 = "아니면 못 하는 타입?"
10126-101260220 = "응? 갑자기 왜?"
10126-101260230 = "히히, 아니야. 그냥 궁금해서."
10126-101260240 = "신경 쓰지 않아도 돼."
10126-101260250 = "히히……"
10126-101260260 = "이히히히……"
10126-101260270 = "내가 준 ASMR…… 잘 듣고 있지?"
10126-101260280 = "응. 계속 들어도 정말 놀랍네."
10126-101260290 = "오늘 밤엔…… 그걸 듣고 자도록 해."
10126-101260300 = "날 생각하면서 말이야."
10126-101260310 = "혹시라도 다른 목소리가 듣고 싶으면 말해……"
10126-101260320 = "바로 녹음해서 보내줄 테니까."
10126-101260330 = "지, 지금 것만으로도 충분해!"
10126-101260340 = "그래…… 그럼 좋은 꿈 꾸고……."
10126-101260350 = "다음에 또 보자고."
10126-101260360 = "히히힛……"
10126-101260370 = "선생. 오늘 시간 괜찮아?"
10126-101260380 = "안 괜찮아도 괜찮아야 할 거야."
10126-101260390 = "가, 갑자기 무슨 일이야?"
10126-101260400 = "급하게 녹음 보조자가 필요해."
10126-101260410 = "원래 하던 사람이 갑자기 일이 생겨서……."
10126-101260420 = "선생이라면 금방 배울 것 같은데……."
10126-101260430 = "어떡할래?"
10126-101260440 = "내 녹음 보조…… 해주지 않을래?"
10126-101260450 = "도움이 필요하다면 가야지!"
10126-101260460 = "히히, 그래. 어서 와."
10126-101260470 = "기다리고 있을 테니까."
10126-101260480 = "선생……."
10126-101260490 = "오늘은 얌전히 물러났지만"
10126-101260500 = "다음엔 조금 다를 거야."
10126-101260510 = "사, 살살 부탁해."
10126-101260520 = "그럼 오늘도……"
10126-101260530 = "내 ASMR을 들으며 자라고."
10126-101260540 = "꿈속에서…… 다시 만나."
10126-101260550 = "이히히……."
10126-101260560 = "선생. 부탁이 있어."
10126-101260570 = "이 부탁은 꼭 들어줬으면 해."
10126-101260580 = "응? 어떤 부탁인데?"
10126-101260590 = "오늘은 날 보더라도 모른 척해줘."
10126-101260600 = "절대 말을 걸어도, 눈을 마주쳐서도 안 돼."
10126-101260610 = "알겠지……?"
10126-101260620 = "오늘 와일드헌트에도 갈 건데."
10126-101260630 = "거기서도 모른 척해야 해?"
10126-101260640 = "어디든 상관없어."
10126-101260650 = "그냥 내 말대로 해."
10126-101260660 = "안 그러면…… 선생이 위험해."
10126-101260670 = "난 진지하게 말하는 거야."
10126-101260680 = "알겠지……?"
10126-101260690 = "어? 어어…… 알겠어."
10126-101260700 = "그럼 내 말 꼭 지켜."
10126-101260710 = "안전해지면 전화할 테니까……."

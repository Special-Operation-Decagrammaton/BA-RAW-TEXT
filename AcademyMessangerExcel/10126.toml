[translation]
10126-101260010 = "Um, Sensei."
10126-101260020 = "Could I...get your help with something?"
10126-101260030 = "Hm? What is it?"
10126-101260040 = "A...secret."
10126-101260050 = "But...you'll like it too, Sensei."
10126-101260060 = "Doesn't that pique your curiosity?"
10126-101260070 = "Don't you want to see?"
10126-101260080 = "I'll tell you when you get here."
10126-101260090 = "Eheehee..."
10126-101260100 = "H-Hello?"
10126-101260110 = "Kanoe?"
10126-101260120 = "Sensei. Did you get back safely?"
10126-101260130 = "Are memories of your previous life slowly returning to you?"
10126-101260140 = "Like I was reliving my childhood..."
10126-101260150 = "So that's how you're going to play it."
10126-101260160 = "Fine."
10126-101260170 = "I have my ways too."
10126-101260180 = "Well then... See you next time."
10126-101260190 = "I'll show you my true form when we next meet."
10126-101260200 = "Sensei... Are you good at saying \"no\"?"
10126-101260210 = "Or is it hard for you?"
10126-101260220 = "What's this about?"
10126-101260230 = "Heehee. Pure curiosity."
10126-101260240 = "Nothing to concern yourself with."
10126-101260250 = "Heehee..."
10126-101260260 = "Eheeheehee..."
10126-101260270 = "Are you listening to the ASMR track?"
10126-101260280 = "Yeah! I can't get tired of it!"
10126-101260290 = "Listen to it when you're going to bed tonight."
10126-101260300 = "And think of me."
10126-101260310 = "If you have requests for other voices, just tell me."
10126-101260320 = "I'll record and send it to you right away."
10126-101260330 = "This one is more than enough!"
10126-101260340 = "If you say so. Sweet dreams, then."
10126-101260350 = "And see you next time."
10126-101260360 = "Heeheehee..."
10126-101260370 = "Sensei. Do you have time today?"
10126-101260380 = "Even if you don't, just say yes."
10126-101260390 = "Um? Yes, I think?"
10126-101260400 = "My recording assistant cancelled last minute."
10126-101260410 = "So I need a new one. Right now."
10126-101260420 = "I figured you would be able to pick it up quickly."
10126-101260430 = "What do you say?"
10126-101260440 = "Would you like to...be my recording assistant?"
10126-101260450 = "Yes! I'll be wherever you need me!"
10126-101260460 = "Heehee, okay. Come now, then."
10126-101260470 = "I'll be waiting."
10126-101260480 = "Sensei..."
10126-101260490 = "I let you win today,"
10126-101260500 = "but don't expect next time to go your way."
10126-101260510 = "P-Please go easy on me."
10126-101260520 = "Hmph. Then..."
10126-101260530 = "Listen to my ASMR when you go to sleep again."
10126-101260540 = "And I'll see you...in your dreams."
10126-101260550 = "Eheehee..."
10126-101260560 = "Sensei. I have a request."
10126-101260570 = "One that I very much hope you'll acquiesce to."
10126-101260580 = "Um... What's that?"
10126-101260590 = "Pretend I don't exist! Even if you see me today!"
10126-101260600 = "Don't even look at me. Let alone speak to me."
10126-101260610 = "Understood?"
10126-101260620 = "But I'm going to be at Wildhunt..."
10126-101260630 = "How am I supposed to pretend to not know you?"
10126-101260640 = "Doesn't matter."
10126-101260650 = "Do as I say."
10126-101260660 = "Otherwise... You'll be in danger, Sensei."
10126-101260670 = "I'm serious."
10126-101260680 = "Got it...?"
10126-101260690 = "Um... Got it..."
10126-101260700 = "Then the pact is sealed."
10126-101260710 = "I'll call you when it's safe..."

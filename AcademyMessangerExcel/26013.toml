[translation]
26013-260130010 = "老師，你好呀"
26013-260130020 = "嗨，敦子"
26013-260130030 = "海邊果然沒有辜負我的期待"
26013-260130040 = "簡直讓人目不轉睛"
26013-260130050 = "無論海邊還是慶典，都充滿了我沒見過的事物"
26013-260130060 = "真高興你似乎玩得很開心"
26013-260130070 = "嗯，因為難得有機會過來，我想拍點照片留念"
26013-260130080 = "所以打算在海邊找找有沒有適合拍照的景點"
26013-260130090 = "老師要一起來嗎？"
26013-260130100 = "老師"
26013-260130110 = "你現在忙嗎？"
26013-260130120 = "不會，現在正好有空"
26013-260130130 = "那可以請你陪我一下嗎？"
26013-260130140 = "我突然想到了兩樣非拍不可的東西"
26013-260130150 = "啊"
26013-260130160 = "我這次有記得裝上電池哦"
26013-260130170 = "老師"
26013-260130180 = "有個壞消息"
26013-260130190 = "怎麼了？"
26013-260130200 = "我的相機電池快沒電了"
26013-260130210 = "雖然現在還能啟動，但之後得省著用才行"
26013-260130220 = "所以我打算認真思考接下來要拍什麼"

[translation]
26013-260130010 = "선생님, 안녕."
26013-260130020 = "안녕, 아츠코."
26013-260130030 = "바다에 오는 거, 기대한 보람이 있었어."
26013-260130040 = "어디든 눈을 뗄 수가 없는걸."
26013-260130050 = "바다도, 축제도, 처음 보는 것투성이라서."
26013-260130060 = "즐기고 있는 것 같아 다행이네."
26013-260130070 = "응, 모처럼이니 사진으로도 남기려고 해."
26013-260130080 = "해변가에서 사진 찍을 만한 포인트를 찾아다닐 생각인데"
26013-260130090 = "선생님도 같이 어때?"
26013-260130100 = "선생님"
26013-260130110 = "혹시 바빠?"
26013-260130120 = "아냐, 지금 한가해."
26013-260130130 = "그럼 잠깐 어울려줘."
26013-260130140 = "꼭 찍고 싶은 게 두 가지 생겼거든."
26013-260130150 = "아"
26013-260130160 = "이번에는 확실히 배터리를 넣었으니까."
26013-260130170 = "선생님"
26013-260130180 = "안 좋은 소식이 있어."
26013-260130190 = "무슨 일이야?"
26013-260130200 = "디지털카메라의 배터리가 얼마 남지 않았어."
26013-260130210 = "아직 작동은 하지만, 아껴 써야 해."
26013-260130220 = "이제부터는 뭘 찍을지 신중하게 정해서 찍을 생각이야."

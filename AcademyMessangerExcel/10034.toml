[translation]
10034-100340010 = "I heard a rumor, Sensei."
10034-100340020 = "People say you're really busy with work lately."
10034-100340030 = "And that you were late yesterday because you overslept."
10034-100340040 = "Is that true?"
10034-100340050 = "Well, it happens."
10034-100340060 = "It's not the end of the world."
10034-100340070 = "Hmm. Okay."
10034-100340080 = "This is a serious problem."
10034-100340090 = "I'm with the Inner Discipline Club. I can't just sit back."
10034-100340100 = "What do you mean?"
10034-100340110 = "Uhhh...Mimori?"
10034-100340120 = "Did you make it to work on time this morning?"
10034-100340130 = "Yeah, but why did you come today?"
10034-100340140 = "Huh?"
10034-100340150 = "Well, because I'm a member of the Inner Discipline Club. I'm working towards becoming a proper lady."
10034-100340160 = "I'm here to help."
10034-100340170 = "Let me know whenever you're in trouble!"
10034-100340180 = "I'll always be there."
10034-100340190 = "It's all a part of my job!"
10034-100340200 = "Okay, thanks."
10034-100340210 = "Oh! I can help if you're having trouble sleeping at night."
10034-100340220 = "No! It's completely fine!"
10034-100340230 = "No, no, no that won't be necessary!"
10034-100340240 = "Really, it's no problem at all!"
10034-100340250 = "Sensei, continuing our previous conversation, I'd like to work on home cooking."
10034-100340260 = "If that's okay with you that is."
10034-100340270 = "Wait. You mean YOUR home cooking?"
10034-100340280 = "You're going to make home-cooked food?"
10034-100340290 = "Yes, is that okay?"
10034-100340300 = "I'd like your help with it."
10034-100340310 = "Uh, sure. I can try."
10034-100340320 = "I'll do what I can."
10034-100340330 = "Really? I'll be counting on you!"
10034-100340340 = "I'm doing some volunteer work as part of my club activities."
10034-100340350 = "You're always putting your best foot forward, huh?"
10034-100340360 = "Of course. I'll cook first, and then clean!"
10034-100340370 = "This is all part of my journey to become a proper lady."
10034-100340380 = "Speaking of which..."
10034-100340390 = "Would you mind helping me with my volunteer work? If it's not too much trouble?"
10034-100340400 = "I don't mind."
10034-100340410 = "Great, that'd be really helpful!"
10034-100340420 = "Are you free today, Sensei?"
10034-100340430 = "I'm always free for you, Mimori."
10034-100340440 = "Yeah, what's up?"
10034-100340450 = "You are...?"
10034-100340460 = "Good to know... That makes me happy."
10034-100340470 = "Oh, it's nothing too serious."
10034-100340480 = "There's something I've had my eye on at the store."
10034-100340490 = "I was hoping you would come with me."
10034-100340500 = "Is that okay?"
10034-100340510 = "Yeah, sure."
10034-100340520 = "I'll be there."
10034-100340530 = "Really? Okay!"
10034-100340540 = "I'll meet you at the department store!"
10034-100340550 = "Hello, Sensei."
10034-100340560 = "I heard that you were coming to Hyakkiyako Academy."
10034-100340570 = "That's the plan."
10034-100340580 = "U-Umm..."
10034-100340590 = "In that case..."
10034-100340600 = "I'd like to...invite you to visit me..."
10034-100340610 = "Would...that be okay?"
10034-100340620 = "I'll be there!"

[translation]
10034-100340010 = "老師，我聽說了唷"
10034-100340020 = "老師最近工作非常忙碌"
10034-100340030 = "因為睡眠不足的關係，昨天去夏萊也遲到了"
10034-100340040 = "請問有那麼忙碌嗎……？"
10034-100340050 = "偶爾會吧，偶爾……"
10034-100340060 = "某種程度上有睡，才對……"
10034-100340070 = "是這樣嗎……我知道了"
10034-100340080 = "這是刻不容緩的事態……"
10034-100340090 = "身為修行部部員的我，必須想點辦法才行呢"
10034-100340100 = "嗯？什麼意思？"
10034-100340110 = "那個，三森同學？"
10034-100340120 = "今天有準時上班嗎？"
10034-100340130 = "今天謝謝你。不過為什麼三森會……？"
10034-100340140 = "嗯？"
10034-100340150 = "我是以大和撫子為目標持續精進的，修行部的部員"
10034-100340160 = "所以今天才會前去幫助老師"
10034-100340170 = "今後如果遇到困擾的話，請隨時告訴我哦！"
10034-100340180 = "無論任何事都會協助您的"
10034-100340190 = "作為修行的一環！"
10034-100340200 = "是，是嗎。謝謝"
10034-100340210 = "啊，如果睡不著的話，需要我前去陪睡嗎？"
10034-100340220 = "不，不用到那種地步！"
10034-100340230 = "你，你的好意我心領了……！"
10034-100340240 = "不需要害羞唷？呵呵♪"
10034-100340250 = "老師，繼上次的修行之後，這次我想試著做家庭料理"
10034-100340260 = "所以，如果可以的話……"
10034-100340270 = "等等，三森的家庭料理……？"
10034-100340280 = "等等，做家庭料理的三森……？"
10034-100340290 = "咦……？是這樣沒錯……？"
10034-100340300 = "所以，如果方便的話希望請老師協助修行……"
10034-100340310 = "沒有除了幫忙以外的選項"
10034-100340320 = "我會盡全力！幫忙！"
10034-100340330 = "啊，好的！那，那麼請多多指教……！"
10034-100340340 = "作為修行部活動的一環，這次我決定去參加打掃的義工活動"
10034-100340350 = "三森總是很熱衷於修行呢"
10034-100340360 = "繼料理之後，是打掃"
10034-100340370 = "像這樣一點一滴，為求成為更佳的大和撫子不斷精進自己"
10034-100340380 = "所以……老師"
10034-100340390 = "如果可以的話，能請老師幫忙嗎？"
10034-100340400 = "嗯，當然"
10034-100340410 = "謝謝老師，那就拜託您了♪"
10034-100340420 = "老師，請問今天有時間嗎？"
10034-100340430 = "如果是為了三森的話隨時都沒問題唷"
10034-100340440 = "怎麼了嗎？"
10034-100340450 = "啊，是，是那樣嗎……？"
10034-100340460 = "聽到老師那麼說，那個……我非常開心"
10034-100340470 = "那個，其實……"
10034-100340480 = "我想在百貨店買點東西"
10034-100340490 = "希望老師能和我一起去……"
10034-100340500 = "那個，會造成您的困擾嗎……？"
10034-100340510 = "完全不會哦"
10034-100340520 = "隨時都能找我"
10034-100340530 = "好的，謝謝老師！"
10034-100340540 = "那麼，我在百貨店前等您哦"
10034-100340550 = "您好，老師"
10034-100340560 = "聽說老師今天會來百鬼夜行"
10034-100340570 = "嗯，是有這個計畫"
10034-100340580 = "那，那麼……"
10034-100340590 = "既然如此……"
10034-100340600 = "我想久違地……招待老師"
10034-100340610 = "可以嗎……？"
10034-100340620 = "我一定到！"

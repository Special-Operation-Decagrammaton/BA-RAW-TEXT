[translation]
10034-100340010 = "선생님, 이야기를 들었답니다."
10034-100340020 = "최근 업무로 무척 바쁘시다면서요……?"
10034-100340030 = "잠도 제대로 못 주무시는 바람에, 어제도 샬레에 지각하셨다고 들었는데."
10034-100340040 = "진짜인가요?"
10034-100340050 = "가끔 그래, 가끔."
10034-100340060 = "그 정도까지는 아니고……."
10034-100340070 = "그렇군요……. 잘 알겠습니다."
10034-100340080 = "이건 중대한 문제……."
10034-100340090 = "수행부 부원인 제가 나설 수밖에 없겠군요."
10034-100340100 = "응? 무슨 뜻이야?"
10034-100340110 = "저기, 미모리 씨?"
10034-100340120 = "오늘은 지각하지 않고 출근 잘하셨나요?"
10034-100340130 = "오늘 고마웠어. 미모리. 하지만 어째서 오늘 미모리가 찾아온 거야……?"
10034-100340140 = "네?"
10034-100340150 = "그야 저 미모리. 요조숙녀를 목표로 정진하는 수행부 소속의 수행부원."
10034-100340160 = "당연히 오늘은 선생님을 돕기 위해 찾아온 거랍니다."
10034-100340170 = "앞으로도 곤란하시면 언제든지 말씀만 해주세요!"
10034-100340180 = "얼마든지 도와드릴 수 있으니까요."
10034-100340190 = "수행의 일환으로!"
10034-100340200 = "으, 응. 고마워."
10034-100340210 = "아, 혹시 밤에 잠을 못 주무시겠다면, 제가 재워드릴까요?"
10034-100340220 = "아니, 됐습니다!"
10034-100340230 = "그것까진 해주지 않아도 괜찮아……!"
10034-100340240 = "후훗~♪ 쑥스러워하지 않으셔도 된다구요?"
10034-100340250 = "선생님, 저번에 이어 이번엔 가정 요리를 수행해볼까 해요."
10034-100340260 = "혹시 괜찮으시다면."
10034-100340270 = "잠깐, 미모리의 가정 요리라고……?"
10034-100340280 = "잠깐, 가정 요리를 만드는 미모리라고……?"
10034-100340290 = "네? 그런…… 데요?"
10034-100340300 = "그래서 수행을 도와주셨으면 하고 부탁을."
10034-100340310 = "뭐, 어쩔 수 없네. 도와줄게."
10034-100340320 = "전력을 다해! 도와줄게!"
10034-100340330 = "아, 네엣! 그, 그럼 부탁드리겠습니다……."
10034-100340340 = "이번에 수행부 활동의 일환으로 청소 봉사활동을 가게 되었어요."
10034-100340350 = "미모리는 늘 수행에 열심이네."
10034-100340360 = "네, 요리 다음엔 청소."
10034-100340370 = "이런 식으로 매일 같이 더욱더 멋진 요조숙녀가 되기 위해 정진하고 있답니다."
10034-100340380 = "그래서 말이지요. 선생님."
10034-100340390 = "혹시 실례가 아니라면 이번 봉사활동을 도와주실 수 있으실까요?"
10034-100340400 = "그런 일이라면 당연히 도와줘야지."
10034-100340410 = "네, 그럼 도움, 감사히 받들겠사옵니다♪"
10034-100340420 = "선생님, 혹시 오늘 시간이 괜찮으실까요?"
10034-100340430 = "미모리가 불러주는 거라면 무조건 괜찮아."
10034-100340440 = "무슨 일 때문에 그래?"
10034-100340450 = "앗, 그, 그러신가요……?"
10034-100340460 = "그렇게 말씀해주시니, 무척……. 기뻐요."
10034-100340470 = "앗, 그게 다름이 아니라."
10034-100340480 = "후후, 이번에 백화점에서 사고 싶은 물건이 좀 있는데."
10034-100340490 = "선생님이 같이 가주셨으면 해서요."
10034-100340500 = "혹시……, 폐가 될까요?"
10034-100340510 = "절대로 아닙니다."
10034-100340520 = "불러만 주십쇼."
10034-100340530 = "네에. 알겠습니다."
10034-100340540 = "그럼 백화점 앞에서 기다리고 있을게요."
10034-100340550 = "안녕하세요. 선생님."
10034-100340560 = "이번에 저희 백귀야행 학원에 오신다고 들었어요."
10034-100340570 = "응. 그럴 예정이야."
10034-100340580 = "저, 저기……"
10034-100340590 = "그러시다면……"
10034-100340600 = "오랜만에…… 선생님을 초대해 드리고 싶은데."
10034-100340610 = "괜찮……으실까요?"
10034-100340620 = "꼭 갈게!"

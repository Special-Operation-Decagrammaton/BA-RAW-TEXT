[translation]
10034-100340010 = "คุณครูคะ ฉันได้ยินข่าวลือมาค่ะ"
10034-100340020 = "ช่วงนี้งานยุ่งงานมากเลยใช่ไหมคะ...?"
10034-100340030 = "เห็นว่านอนไม่พอ เมื่อวาน\nเลยไปทำงานที่ชาเล่ต์สาย"
10034-100340040 = "จริงหรือเปล่าคะ?"
10034-100340050 = "อืม... แค่บางครั้งน่ะ"
10034-100340060 = "ไม่ขนาดนั้นหรอก"
10034-100340070 = "งั้นเหรอคะ...\nเข้าใจแล้วค่ะ"
10034-100340080 = "แต่นี่เป็นปัญหาใหญ่เลยนะคะ"
10034-100340090 = "เห็นทีสมาชิกชมรมฝึกฝน\nอย่างฉัน ต้องออกโรงแล้วค่ะ"
10034-100340100 = "หมายความว่ายังไงน่ะ?"
10034-100340110 = "เอ๋...? มิโมริ?"
10034-100340120 = "เช้าวันนี้มาทำงานตรงเวลาใช่ไหมคะ?"
10034-100340130 = "ขอบใจนะ มิโมริ\nวันนี้มีอะไรเหรอ...?"
10034-100340140 = "คะ?"
10034-100340150 = "เอ่อ... ก็คือฉันเป็นสมาชิก\nของชมรมฝึกฝนที่ฝันอยาก\nจะเป็นกุลสตรีที่เพียบพร้อมค่ะ"
10034-100340160 = "เพราะงั้นวันนี้ฉันเลย\nมาเพื่อช่วยคุณครูยังไงคะ"
10034-100340170 = "ต่อไปถ้ามีปัญหาอะไร\nก็บอกฉันได้ตลอดนะคะ!"
10034-100340180 = "ฉันพร้อมช่วยคุณครูตลอดค่ะ"
10034-100340190 = "เพราะนี่เป็นส่วนหนึ่ง\nของการฝึกฝนค่ะ!"
10034-100340200 = "อะ... อื้ม ขอบใจนะ"
10034-100340210 = "ถ้าเกิดนอนไม่หลับตอนกลางคืน\nให้ฉันไปช่วงกล่อมได้นะคะ"
10034-100340220 = "ไม่ต้องๆ ไม่เป็นไร!"
10034-100340230 = "ไม่ต้องช่วยกันถึงขนาดนั้นก็ได้...!"
10034-100340240 = "ฮุฮุ~♪ ไม่เป็นไรค่ะ"
10034-100340250 = "คุณครูคะ ครั้งนี้ฉันว่าจะฝึก\nทำอาหารโฮมคุกกิ้งดูค่ะ"
10034-100340260 = "ถ้าคุณครูไม่ว่าอะไร..."
10034-100340270 = "เดี๋ยวนะ\nโฮมคุกกิ้งของมิโมริเหรอ?"
10034-100340280 = "มิโมริจะทำโฮมคุกกิ้งเหรอ?"
10034-100340290 = "คะ? มีอะไรเหรอคะ?"
10034-100340300 = "ฉันอยากขอให้คุณครูมาช่วย\nในการฝึกครั้งนี้หน่อยค่ะ"
10034-100340310 = "ได้เลย เดี๋ยวครูช่วยเอง"
10034-100340320 = "ครูยินดีช่วยทุกอย่างเลย"
10034-100340330 = "อ๊ะ ค่ะ!\nถ้างั้นก็รบกวนด้วยนะคะ..."
10034-100340340 = "งานของชมรมฝึกฝนในครั้งนี้\nคืองานอาสาทำความสะอาดค่ะ"
10034-100340350 = "มิโมริขยันฝึกฝนจังเลยนะ"
10034-100340360 = "ค่ะ ฉันฝึกทำอาหารไปแล้ว\nคราวนี้ก็ต้องฝึกทำความสะอาดค่ะ"
10034-100340370 = "นี่เป็นส่วนหนึ่งของเส้นทาง\nในการฝึกเป็นกุลสตรีที่เพียบพร้อมค่ะ"
10034-100340380 = "เพราะงั้นก็เลย..."
10034-100340390 = "อยากรู้ว่าคุณครูจะมาช่วย\nงานอาสาครั้งนี้หน่อยได้ไหมคะ?"
10034-100340400 = "งานแบบนี้ครูยินดีช่วยอยู่แล้ว"
10034-100340410 = "ค่ะ ถ้างั้นก็ขอรบกวนหน่อยนะคะ♪"
10034-100340420 = "คุณครูคะ\nวันนี้มีเวลาว่างไหมคะ?"
10034-100340430 = "ครูมีเวลาให้มิโมริเสมอนะ"
10034-100340440 = "แน่นอน มีอะไรเหรอ?"
10034-100340450 = "อ๊ะ... จริงเหรอคะ?"
10034-100340460 = "ดีใจจังที่คุณครูพูดแบบนี้..."
10034-100340470 = "งั้นขอเข้าเรื่องเลยนะคะ"
10034-100340480 = "ฮิฮิ พอดีฉันมีของบางอย่าง\nที่อยากไปซื้อที่ห้างสรรพสินค้า"
10034-100340490 = "เลยอยากให้คุณครู\nไปด้วยกันค่ะ"
10034-100340500 = "หากไม่เป็นการรบกวนเกินไป\nก็อยากจะชวนคุณครูไปด้วย..."
10034-100340510 = "ไม่เลยๆ"
10034-100340520 = "ครูไปด้วย"
10034-100340530 = "จริงเหรอคะ ขอบคุณค่ะ!"
10034-100340540 = "งั้นฉันจะรออยู่ด้านหน้าห้างนะคะ"
10034-100340550 = "สวัสดีค่ะ คุณครู"
10034-100340560 = "ฉันได้ยินว่าคุณครูมาที่สหพันธ์\nเฮียกคิยาโคค่ะ"
10034-100340570 = "อื้อ ใช่แล้ว"
10034-100340580 = "คะ...คือว่า..."
10034-100340590 = "ถ้าคุณครูมาละก็..."
10034-100340600 = "ฉันอยากจะเชิญคุณครูมาเจอ...\nหลังจากไม่ได้เจอกันนานน่ะค่ะ"
10034-100340610 = "ได้...หรือเปล่าคะ?"
10034-100340620 = "ได้อยู่แล้วสิ!"

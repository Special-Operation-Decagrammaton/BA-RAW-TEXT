[translation]
10058-100580010 = "คุณครูคะ"
10058-100580020 = "ถ้าคุณครูไม่ติดอะไร วันนี้ฉันขอรบกวน\nเวลาสักครู่ได้รึเปล่าคะ?"
10058-100580030 = "มิเนะขอร้องมาทั้งที ครูพร้อมเสมอ!"
10058-100580040 = "ขอบคุณค่ะ"
10058-100580050 = "แล้วมีเรื่องอะไรเหรอ?"
10058-100580060 = "เรื่องนั้นเอาไว้ทีหลังเถอะค่ะ..."
10058-100580070 = "การที่คุณครูยอมสละเวลาให้ฉันแบบนี้..."
10058-100580080 = "ทำให้ฉันคิดว่าคุณครู..."
10058-100580090 = "เป็นคนสำคัญที่พวกฉันไว้วางใจได้ค่ะ"
10058-100580100 = "มิเนะ...?"
10058-100580110 = "อาจเป็นเรื่องที่ไม่ได้มีบ่อยนัก..."
10058-100580120 = "แต่วันนี้ฉันมีเวลาว่างค่ะ"
10058-100580130 = "มิเนะก็มีวันแบบนี้เหมือนกันสินะ..."
10058-100580140 = "แล้ววันว่างๆ แบบนี้ ทำอะไรเหรอ?"
10058-100580150 = "นั่นสินะคะ..."
10058-100580160 = "อาจไม่ถึงขั้นเรียกว่าเป็นงานอดิเรก..."
10058-100580170 = "แต่ฉันก็ใช้เวลาว่างนั่งดูเวชภัณฑ์\nที่เก็บสะสมไว้อยู่ค่ะ"
10058-100580180 = "เวชภัณฑ์ที่สะสมไว้?"
10058-100580190 = "ค่ะ"
10058-100580200 = "การนึกถึงผลของยาหรือเทียบผล\nการใช้ยา"
10058-100580210 = "มันสนุกมากเลยค่ะ"
10058-100580220 = "เพิ่งเคยได้ยินเรื่องงานอดิเรกแบบนี้\nเป็นครั้งแรกเลย..."
10058-100580230 = "งั้นเหรอคะ"
10058-100580240 = "ถ้าอย่างนั้นก็พอดีเลยค่ะ"
10058-100580250 = "ฉันอยากให้คุณครู... ได้เห็นเวชภัณฑ์ที่\nฉันเก็บสะสมไว้ค่ะ"
10058-100580260 = "ถ้าคุณครูพอมีเวลา ฉันก็อยากเชิญ\nคุณครูมาที่ห้องฉันค่ะ"
10058-100580270 = "คุณครู"
10058-100580280 = "ช่วงบ่ายวันนี้ พอมีเวลารึเปล่าคะ?"
10058-100580290 = "บ่ายนี้ครูว่างนะ"
10058-100580300 = "จะไปลาดตระเวนเหรอ...?"
10058-100580310 = "งานลาดตระเวนวันนี้เสร็จไปเมื่อตอน\nเช้าแล้วละค่ะ"
10058-100580320 = "ฉันแค่อยากชวนคุณครูไปดื่มชาช่วงบ่าย\nด้วยกันน่ะค่ะ"
10058-100580330 = "ถึงไม่มีเวลา\nครูก็จะหาเวลาไปเอง!"
10058-100580340 = "ถ้าอย่างนั้น ฉันจะรอนะคะ"
10058-100580350 = "ขอบคุณค่ะ"
10058-100580360 = "ฉันเพิ่งเคยมาเข้าเวรตัวแทน\nที่ชาเล่ต์เป็นครั้งแรก"
10058-100580370 = "มีอะไรที่ต้องเตรียมไปเป็นพิเศษ\nรึเปล่าคะ?"
10058-100580380 = "ช่วงแรกๆ ไม่ต้องซีเรียส\nขนาดนั้นก็ได้..."
10058-100580390 = "อย่างนั้นเหรอคะ"
10058-100580400 = "ถ้าอย่างนั้น มีเรื่องอะไรที่ฉันต้องระวัง\nหรือมีกฏอะไรเป็นพิเศษรึเปล่าคะ...?"
10058-100580410 = "ก็บอกว่าไม่ต้องซีเรียสก็ได้..."
10058-100580420 = "เข้าใจแล้วค่ะ"
10058-100580430 = "ถ้างั้นเดี๋ยวพบกันที่ชาเล่ต์นะคะ"
10058-100580440 = "พูดแบบนี้อาจฟังดูแปลกๆ..."
10058-100580450 = "แต่ฉันตื่นเต้นมากเลยค่ะ"

[translation]
10058-100580010 = "선생님."
10058-100580020 = "괜찮으시다면, 오늘의 시간을 저에게 할애해 주실 수 있으신지요."
10058-100580030 = "미네의 부탁이라면야, 얼마든지!"
10058-100580040 = "감사합니다."
10058-100580050 = "그런데, 무슨 일이야?"
10058-100580060 = "무슨 일인지에 대한 확인은 뒤로 미루고"
10058-100580070 = "우선 약속을 받아 주시는 그 모습……"
10058-100580080 = "선생님은 저희에게 신뢰할 수 있는 소중한 분이 아닐까, 하고"
10058-100580090 = "그런 생각을 해 보았습니다."
10058-100580100 = "미네……?"
10058-100580110 = "드문 일입니다만"
10058-100580120 = "시간이 남는 날입니다."
10058-100580130 = "미네에게도 그런 개념이 있었구나……"
10058-100580140 = "시간이 남을 때에는, 뭘 하면서 지내?"
10058-100580150 = "글쎄요."
10058-100580160 = "특별히 취미라고 할 것까지는 아닙니다만."
10058-100580170 = "수집한 의료 용품을 바라보며 시간을 보내곤 합니다."
10058-100580180 = "의료 용품 수집?"
10058-100580190 = "네."
10058-100580200 = "그 효과를 비교하거나 상상해 보는 것이"
10058-100580210 = "나름 즐겁습니다."
10058-100580220 = "그런 취미는 처음 들어봐……"
10058-100580230 = "그렇군요."
10058-100580240 = "그렇다면, 마침 잘 된 것 같습니다."
10058-100580250 = "제 수집품을…… 보여드리고 싶은데요."
10058-100580260 = "선생님만 괜찮으시다면, 제 방으로 선생님을 초대해 드리고 싶습니다."
10058-100580270 = "선생님"
10058-100580280 = "오늘 오후, 혹시 시간이 비어 있으실지요?"
10058-100580290 = "오늘 오후라면 괜찮아."
10058-100580300 = "혹시 순찰입니까……?"
10058-100580310 = "오늘의 순찰은 오전으로 끝마쳤으니"
10058-100580320 = "오후에 선생님과 함께 티타임을 가져 볼 수 있을까 해서요."
10058-100580330 = "없는 시간을 만들어서라도 갈게!"
10058-100580340 = "그러면 기다리고 있겠습니다."
10058-100580350 = "감사합니다."
10058-100580360 = "샬레의 당번은 처음입니다만"
10058-100580370 = "특별히 준비해 두어야 할 것이 있을까요?"
10058-100580380 = "애초에 그렇게 진지하게 생각하지 않아도 되는 일이야……"
10058-100580390 = "그렇습니까."
10058-100580400 = "그렇다면 제가 유의해야 할 행동거지라던가, 생활 수칙 같은 것이라도……?"
10058-100580410 = "그러니까 그렇게 진지한 게……"
10058-100580420 = "알겠습니다."
10058-100580430 = "그렇다면 오늘은 샬레에서 뵙겠습니다."
10058-100580440 = "이런 말씀을 드리는 것도 생소하겠습니다만"
10058-100580450 = "저도, 꽤나 긴장하고 있답니다?"

[translation]
10058-100580010 = "老師"
10058-100580020 = "雖然您應該很忙……如果方便的話，今天能否占用您一點時間呢？"
10058-100580030 = "如果是美禰的請求當然沒問題"
10058-100580040 = "非常感謝"
10058-100580050 = "不過怎麼了嗎？"
10058-100580060 = "仔細想想"
10058-100580070 = "竟然不先詢問內容就欣然答應……"
10058-100580080 = "也許老師是值得信賴的貴人"
10058-100580090 = "我不禁這麼覺得呢"
10058-100580100 = "美禰……？"
10058-100580110 = "老師，我今天……"
10058-100580120 = "非常難得地居然有空"
10058-100580130 = "休，休息也是很重要的唷！"
10058-100580140 = "美禰有空的時候都會做些什麼事呢？"
10058-100580150 = "這個嘛……"
10058-100580160 = "雖然不知道能不能稱的上是興趣"
10058-100580170 = "我會看著自己收集的醫療用品打發時間"
10058-100580180 = "看著醫療用品……？"
10058-100580190 = "是的"
10058-100580200 = "對各自的效果進行比較，或是想像其適用的場合……"
10058-100580210 = "實在很有趣，時間一下就過去了"
10058-100580220 = "這種興趣我還是第一次聽見……"
10058-100580230 = "這樣啊"
10058-100580240 = "既然如此，難得有這種機會"
10058-100580250 = "我想讓老師看看我的醫療用品……"
10058-100580260 = "您願意過來一趟嗎？"
10058-100580270 = "老師"
10058-100580280 = "今天下午，能否占用您一些時間呢？"
10058-100580290 = "完全沒問題唷"
10058-100580300 = "要做之前說的巡迴救護嗎？"
10058-100580310 = "今天的巡迴救護上午就會結束"
10058-100580320 = "所以想在午後和老師一起享用下午茶"
10058-100580330 = "我馬上把工作處理完就過去哦！"
10058-100580340 = "非常感謝您"
10058-100580350 = "那麼，我會等您來的"
10058-100580360 = "這是我第一次協助夏萊的工作"
10058-100580370 = "是否有什麼需要事先準備的呢？"
10058-100580380 = "沒關係，直接過來也可以的唷"
10058-100580390 = "這樣啊"
10058-100580400 = "那是否有需要事先注意的要點或是規則之類的呢……？"
10058-100580410 = "細節等你來了之後會跟你說明的"
10058-100580420 = "我知道了"
10058-100580430 = "那麼我稍後會去拜訪您"
10058-100580440 = "雖然這麼說有點難以啟齒"
10058-100580450 = "但其實……我現在非常緊張"

[translation]
10006-520 = "คุณครู ได้ยินข่าวลือนั้นหรือยัง?"
10006-521 = "ข่าวลืออะไรเหรอ?"
10006-522 = "ก็ช่วงนี้น่ะสิ มีโรคจิตที่พยายามแอบดูใต้\nกระโปรงนักเรียนหญิงตามถนนซอยเปลี่ยว"
10006-523 = "โลกนี้ชักอยู่ยากขึ้นแล้ว"
10006-524 = "นั่นมันเรื่องใหญ่เลยนะ..."
10006-525 = "ถ้าคุณครูเห็นโรคจิตน่าสงสัยละก็\nมาแจ้งคณะกรรมการวินัยของ\nเกเฮนน่าทันทีเลยนะ"
10006-526 = "ได้เลย ไม่ต้องห่วง"
10006-527 = "หมู่นี้คุณครูมาทำงานที่สถาบันเกเฮนน่า\nบ่อยจังเลยนะ"
10006-528 = "ช่วงนี้งานเกี่ยวกับสถาบันเกเฮนน่า\nมีเยอะขึ้นน่ะ"
10006-529 = "มาบ่อยเพราะครูอยากเจออิโอริจัง\nยังไงล่ะ..."
10006-530 = "แบบนี้นี่เอง... เหนื่อยน่าดูเลยนะ"
10006-531 = "หืม? พูดอะไรของคุณครูน่ะ?"
10006-532 = "จะว่าไป ไม่ค่อยได้เจอคุณครูในสถาบัน\nเท่าไหร่เลย"
10006-533 = "ปกติมาทำงานแล้วจะไปอยู่ที่ไหนเหรอ?"
10006-534 = "อยู่ในสนามน่ะ"
10006-535 = "...สนาม? ที่นั่นมีอะไรให้ทำงั้นเหรอ?"
10006-536 = "ครูจะบอกตอนที่เจอกันคราวหน้านะ"
10006-537 = "น่าสงสัยแฮะ..."
10006-538 = "ล่าสุดหน่วยข่าวกรองเพิ่งรายงานมาว่ามี\nการค้าสินค้าหนีภาษีในตลาดมืดเยอะขึ้น\nกว่าเดิม"
10006-539 = "ถ้าเป็นของกินของใช้ทั่วไป ไปซื้อเอาใน\nตลาดธรรมดาก็น่าจะได้นี่นา..."
10006-540 = "ในตลาดมืดค้าขายสินค้าแบบไหนกันนะ?"
10006-541 = "ไม่รู้สิ ครูไม่ค่อยสนใจเรื่องนี้เท่าไหร่"
10006-542 = "ก็คงเป็นแบบนั้น"
10006-543 = "คนทั่วไปไม่มีทางเหยียบเข้าไปในตลาด\nมืดอยู่แล้ว"
10006-544 = "คุณครูก็ระวังตัวด้วยล่ะ อย่าไปมีเรื่อง\nข้องเกี่ยวกับคนไม่ดีในตลาดมืด"
10006-545 = "ครูจะระวังตัว"
10006-546 = "ไม่ได้จะเอาอัลบั้มจบการศึกษาของฉันไป\nใช้ในทางที่ไม่ดีใช่มั้ย?"
10006-547 = "นี่ฉันเชื่อใจคุณครูนะ... อย่าเอาไปให้คน\nอื่นดูล่ะ!"
10006-548 = "อิโอริ"
10006-549 = "หืม? มีอะไรเหรอ?"
10006-550 = "อิโอริสมัยเป็นเด็กประถมก็น่ารักดีนะ"
10006-551 = "หนวกหูน่า! หยุดพูดเลย!"
10006-552 = "วันนี้คุณครูช่วยฉันในงานของคณะกรรม\nการวินัยได้เยอะเลย ขอบคุณนะ"
10006-553 = "ครูต่างหากที่ต้องขอบใจ"
10006-554 = "สมาชิกคนอื่นในคณะกรรมการวินัย\nก็ช่วยครูเหมือนกัน ขอบคุณนะ"
10006-555 = "คุณครูไม่ได้เก่งกาจเหมือนนักเรียนคนอื่น\nนะ หากโดนยิงขึ้นมาก็เป็นเรื่องแน่"
10006-556 = "ภารกิจเสี่ยงอันตรายที่ต้องใช้ปืนน่ะ\nฝากให้พวกเราดีกว่า"
10006-557 = "แต่อิโอริก็..."
10006-558 = "เมื่อกี้เธอบาดเจ็บที่หลังมาไม่ใช่เหรอ?"
10006-559 = "อ่า... หมายถึงแผลที่หลังใช่มั้ย?"
10006-560 = "ไม่ต้องห่วงหรอก แค่รอยถลอกนิดหน่อยน่ะ"
10006-561 = "คุณครู ถ้าเห็นข้อความนี้ช่วยมาที่\nบล็อกที่ 3 จากประตูใหญ่ของเกเฮนน่าที..."
10006-562 = "พอดีว่า... ฉันเจอปัญหานิดหน่อยน่ะ"
10006-563 = "ปัญหาอะไรเหรอ?"
10006-564 = "เดี๋ยวค่อยถามน่า รีบๆ มาหาก่อน!"
10006-565 = "แล้วก็ห้ามบอกนักเรียนคนอื่นล่ะว่าฉันอยู่ที่นี่"
10006-566 = "คุณครู!!!"
10006-567 = "รูปพวกนี้ที่ส่งมาทางอีเมลมันคืออะไรน่ะ?!"
10006-569 = "ครูถ่ายเก่งใช่มั้ยล่ะ?"
10006-570 = "ถ่ายออกมาน่ารักดีนะว่ามั้ย?"
10006-571 = "ถ่ายเก่งเกิ่งอะไรกันล่ะ!"
10006-572 = "ไม่มีส่วนไหนน่ารักซะหน่อย!"
10006-573 = "ฉันบอกไปแล้วไม่ใช่เหรอว่าให้ลบรูป!"
10006-574 = "แล้วทำไมถึงยังมีเก็บไว้อีกล่ะ!"
10006-575 = "ลบเดี๋ยวนี้เลยนะ!"
10006-576 = "ฟังที่ฉันพูดอยู่หรือเปล่า? บอกให้รีบๆ\nลบยังไงล่ะ!"

[translation]
10006-520 = "선생님, 그 소문 들었어?"
10006-521 = "무슨 소문?"
10006-522 = "듣자 하니 최근 외진 골목길에서 여학생들의 치마 속을 훔쳐보려는 변태가 출몰한다나 봐."
10006-523 = "참, 세상 흉흉하기도 하지."
10006-524 = "그것참 큰일이네……."
10006-525 = "선생님도 혹시 수상한 변태를 보거든 게헨나 선도부에 바로 연락해줘."
10006-526 = "알겠어, 맡겨둬."
10006-527 = "선생님, 최근 게헨나 학원으로 자주 출장을 오던 것 같던데……"
10006-528 = "최근 게헨나 학원과 관련된 업무가 많아져서."
10006-529 = "이오리 쨩을 자주 보고 싶은 마음에 그만……."
10006-530 = "그렇구나……. 수고가 많네."
10006-531 = "……하아? 무슨 소리를 하는 거야?"
10006-532 = "그나저나 정작 학원에서는 선생님과 마주친 일이 거의 없네."
10006-533 = "출장을 오면 주로 어디서 시간을 보내는 거야?"
10006-534 = "게헨나 학원 교정."
10006-535 = "……교정? 거기에 뭐가 있는데?"
10006-536 = "나중에 만나게 되면 알려줄게."
10006-537 = "어쩐지 수상한데……."
10006-538 = "최근 첩보 멤버의 보고에 따르면 블랙마켓의 밀수품 거래량이 늘어난 것 같아."
10006-539 = "생활에 필요한 물건이라면 일반 마켓에서도 다 구할 수 있는데…"
10006-540 = "도대체 블랙마켓에서는 어떤 물건을 거래하는 거지?"
10006-541 = "나는 관심이 없어서 잘 모르겠는데."
10006-542 = "그야 그렇겠지."
10006-543 = "평범한 사람이라면 블랙마켓에 발을 들일 일도 없을 테니까."
10006-544 = "가급적 선생님도 블랙마켓의 악당들과는 엮이지 않게 조심하라고."
10006-545 = "명심할게."
10006-546 = "정말로 내 졸업 앨범을 이상한 일에 쓰려는 게 아니지?"
10006-547 = "선생님을 믿고 맡긴 거니까…… 다른 사람에게 보여주거나 하면 안 돼!"
10006-548 = "이오리."
10006-549 = "어, 어? 갑자기 왜?"
10006-550 = "초등학교 시절의 이오리도 귀엽더라."
10006-551 = "시끄러워! 죽어!"
10006-552 = "오늘 선도부 활동에서는 꽤나 신세를 졌네. 고마워."
10006-553 = "나야말로"
10006-554 = "게헨나 선도부에게 큰 도움을 받았어. 고마워."
10006-555 = "선생님은 학생들과는 달리 총에 맞으면 정말로 위험할 수도 있으니까."
10006-556 = "총을 사용하는 위험한 임무에는 우리가 함께하는 게 당연하지."
10006-557 = "하지만 이오리도"
10006-558 = "아까 작전 중에 등을 다치지 않았어?"
10006-559 = "아…… 등의 그 상처 말인가."
10006-560 = "신경 쓰지 마. 대수롭지 않은 생채기일 뿐이니까."
10006-561 = "선생님, 이 문자를 보면 게헨나 정문 앞의 3거리 주택가로 와줘……"
10006-562 = "조금…… 사소한 문제가 생겼어."
10006-563 = "무슨 문제인데?"
10006-564 = "아무튼 묻지는 말고 빨리 와 줘!"
10006-565 = "그리고 다른 학생들에게는 내가 여기 있다는 걸 절대 알리지 마!"
10006-566 = "선생님!!!"
10006-567 = "방금 메일로 보낸 이 사진은 뭐야?!"
10006-569 = "잘 찍혔지?"
10006-570 = "귀엽지 않아?"
10006-571 = "잘 찍히긴 뭐가 잘 찍혔어!"
10006-572 = "귀엽긴 뭐가 귀여워!"
10006-573 = "내가 아까 분명히 사진은 지우라고 했잖아!"
10006-574 = "어째서 아직도 가지고 있는 거야!"
10006-575 = "지워! 당장 지우라고!"
10006-576 = "내 말 듣고 있는 거야? 빨리 지우라고!"

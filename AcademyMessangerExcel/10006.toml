[translation]
10006-520 = "Sensei, did you hear the rumor?"
10006-521 = "What rumor?"
10006-522 = "From what I've heard, there's a pervert hanging around the alleys, trying to flip skirts."
10006-523 = "Ugh, what an ugly world."
10006-524 = "That's terrible..."
10006-525 = "If you see someone suspicious, please contact the Gehenna Prefect Team right away."
10006-526 = "Okay, got it."
10006-527 = "Sensei, you've been coming to Gehenna Academy a lot these days..."
10006-528 = "Well, I've had a lot of work to do at Gehenna lately."
10006-529 = "I can't help wanting to see you."
10006-530 = "I see... You're working hard."
10006-531 = "HUH?! What are you talking about?"
10006-532 = "In any case, I almost never run into you at the academy."
10006-533 = "Where do you spend most of your time when you come here?"
10006-534 = "At the campus."
10006-535 = "The campus? What's at the campus?"
10006-536 = "I'll tell you in person."
10006-537 = "You're being awfully suspicious..."
10006-538 = "According to a recent report from intelligence, the volume of contraband on the Black Market seems to have increased."
10006-539 = "You can get everything you need for your daily life at the regular market..."
10006-540 = "So what's being traded on the Black Market?"
10006-541 = "I'm not really interested, so I don't know much about it."
10006-542 = "I can see that."
10006-543 = "A normal person has no reason to even consider the Black Market."
10006-544 = "Try not to get involved with those Black Market scoundrels, Sensei."
10006-545 = "I'll keep that in mind."
10006-546 = "Are you sure you're not gonna use my yearbook for anything weird?"
10006-547 = "I trust you with it...but don't show it to anyone else!"
10006-548 = "Iori."
10006-549 = "H-Huh? What is it?"
10006-550 = "You were cute in elementary school too."
10006-551 = "Shut up! I'll kill you!"
10006-552 = "You helped me a lot today. Thank you."
10006-553 = "I'm the one who should be saying that."
10006-554 = "The Prefect Team is always helping me. Thank you."
10006-555 = "It's particularly dangerous for you if you get shot, Sensei."
10006-556 = "It only makes sense for us to join you on a dangerous mission when guns are involved."
10006-557 = "But didn't you"
10006-558 = "get hurt during the mission?"
10006-559 = "Oh... You mean the wound on my back?"
10006-560 = "Don't worry. It's just a scratch."
10006-561 = "Sensei, when you see this text, please come to the District 3 residential area by Gehenna's main gate."
10006-562 = "There's...a bit of a problem."
10006-563 = "What's the matter?"
10006-564 = "Don't ask! Just get over here!"
10006-565 = "And don't tell the other students that I'm here!"
10006-566 = "Sensei!"
10006-567 = "What's with the photo you just sent to my email?!"
10006-569 = "It's a good shot, right?"
10006-570 = "It's cute!"
10006-571 = "What do you mean it's a good shot?!"
10006-572 = "It's not cute at all!"
10006-573 = "I told you to delete that photo!"
10006-574 = "Why do you still have it?!"
10006-575 = "Delete it! Now!"
10006-576 = "Are you listening to me? Delete it right now!"

[translation]
10006-520 = "老師，你聽說那個傳聞了嗎？"
10006-521 = "什麼傳聞？"
10006-522 = "有偷窺女學生裙底的變態出沒的傳聞"
10006-523 = "真是的，這世道真可嘆"
10006-524 = "這可不得了呢"
10006-525 = "老師如果看見了可疑的變態，請立即聯絡風紀委員會"
10006-526 = "知道了，交給我吧"
10006-527 = "老師最近好像經常來格黑娜出差……"
10006-528 = "最近有很多格黑娜學園的工作"
10006-529 = "因為想和伊織醬見面，忍不住就……"
10006-530 = "原來如此……辛苦你了"
10006-531 = "……啥？你在說什麼？"
10006-532 = "但實際上，我們很少在學校內見到面呢"
10006-533 = "老師來出差的時候都待在哪裡？"
10006-534 = "中庭之類的"
10006-535 = "……中庭？為什麼？"
10006-536 = "下次見面時告訴你"
10006-537 = "總覺得很可疑……"
10006-538 = "報告顯示，近期黑市走私品的交易量增加中"
10006-539 = "如果是生活必需品，普通市場就都能買到了……"
10006-540 = "到底都在黑市進行什麼樣的交易呢？"
10006-541 = "我不知道，也沒有興趣……"
10006-542 = "我想也是"
10006-543 = "普通人是不會踏入黑市的"
10006-544 = "老師也要注意不要和黑市的惡黨們扯上關係"
10006-545 = "嗯，我會銘記在心"
10006-546 = "……老師，真的不會把我的畢業紀念冊用在奇怪的事情上吧？"
10006-547 = "我是相信老師才交給你的……不要給別人看喔！"
10006-548 = "……嘿，伊織"
10006-549 = "嗯？什麼？"
10006-550 = "小學時期的伊織也很可愛呢"
10006-551 = "吵死了！去死！"
10006-552 = "今天謝謝老師協助風紀委員會的活動"
10006-553 = "該道謝的是我才對"
10006-554 = "不只是伊織，還得到了其他格黑娜風紀委員的各種幫助"
10006-555 = "老師和我們不一樣，中彈的話就危險了"
10006-556 = "如果是這麼危險的任務，我們一起去是理所當然的"
10006-557 = "嗯，謝啦。話說回來"
10006-558 = "伊織在剛才的作戰中背部受傷了嗎？"
10006-559 = "啊啊……這麼說來確實是呢"
10006-560 = "別放在心上，不是什麼嚴重的傷"
10006-561 = "老師，看到這個訊息的時候，請來格黑娜正門前的住宅街3丁目……"
10006-562 = "發生了一點……意外"
10006-563 = "意外，什麼意外？"
10006-564 = "別管了，快來！"
10006-565 = "還有！絕對不能告訴其他學生我在這裡！"
10006-566 = "老師！！"
10006-567 = "剛才發來的照片為什麼還留著！！"
10006-569 = "因為拍得不錯，想說你可能會想要"
10006-570 = "不覺得很可愛嗎？"
10006-571 = "鬼才想要！！！！！"
10006-572 = "才不是這個問題！"
10006-573 = "不是說要刪掉嗎！"
10006-574 = "為什麼你還留著！"
10006-575 = "刪掉！現在馬上！"
10006-576 = "聽到了嗎！？喂！！"

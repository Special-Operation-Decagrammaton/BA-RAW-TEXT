[translation]
20043-200430010 = "新年快樂～老師！"
20043-200430020 = "嗯，泉也新年快樂"
20043-200430030 = "說到這個，老師"
20043-200430040 = "新年到了對吧？"
20043-200430050 = "說到新的一年，最重要的是什麼呢？"
20043-200430060 = "泉覺得是什麼？"
20043-200430070 = "那當然"
20043-200430080 = "是新年的新滋味囉！"
20043-200430090 = "老師新年的時候都吃什麼呢？"
20043-200430100 = "就……順其自然？"
20043-200430110 = "特別訂購的新年料理？"
20043-200430120 = "這樣啊"
20043-200430130 = "可是畢竟是新年，吃點特別的東西才會讓幸福加倍吧"
20043-200430140 = "哇"
20043-200430150 = "原來老師也會做這種事啊"
20043-200430160 = "而我……"
20043-200430170 = "也準備了新年料理"
20043-200430180 = "想讓老師看看！"
20043-200430190 = "老師"
20043-200430200 = "下午有空嗎？"
20043-200430210 = "嗯，怎麼了嗎？"
20043-200430220 = "因為之前"
20043-200430230 = "老師都沒怎麼吃，讓我一直很在意"
20043-200430240 = "哎呀，你不必放在心上"
20043-200430250 = "但是我很在意！"
20043-200430260 = "所以呢"
20043-200430270 = "我經過深思熟慮"
20043-200430280 = "準備了一些東西"
20043-200430290 = "那我們下午見！"
20043-200430300 = "謝謝老師送我回來！"
20043-200430310 = "不客氣"
20043-200430320 = "話說，老師不覺得有點冷嗎？"
20043-200430330 = "和泉在一起，一點都不冷哦"
20043-200430340 = "嗯！我也是！"
20043-200430350 = "很神奇吧？"
20043-200430360 = "和老師在一起的每一刻都很新鮮"
20043-200430370 = "就像發現新滋味的時候一樣！"
20043-200430380 = "下次也一起"
20043-200430390 = "去美食冒險吧！"
20043-200430400 = "我可能喜歡安全一點的冒險……"
20043-200430410 = "是嗎？"
20043-200430420 = "知道了！"
20043-200430430 = "那老師就走安全路線吧！"
20043-200430440 = "老師晚安！"
20043-200430450 = "泉也晚安"
20043-200430460 = "嗯！"

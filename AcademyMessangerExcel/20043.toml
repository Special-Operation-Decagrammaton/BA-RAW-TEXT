20043-200430070 = "Well of course..."
20043-200430080 = "Foods with new flavors to celebrate the new year!"
20043-200430090 = "What kind of food do you usually have for New Year's, Sensei?"
20043-200430100 = "Just things I have around me, I guess?"
20043-200430110 = "I guess some special New Year's food delivery?"

[translation]
20043-200430010 = "Yummy New Year, Sensei!"
20043-200430020 = "Yeah. Happy New Year to you too, Izumi."
20043-200430030 = "That said, Sensei."
20043-200430040 = "It's New Year's, right?"
20043-200430050 = "What's the most important thing in a new year?"

[translation]
20043-200430010 = "กินดีปีใหม่นะ คุณครู!"
20043-200430020 = "อื้ม สวัสดีปีใหม่นะ อิซุมิ"
20043-200430030 = "จะว่าไป คุณครู"
20043-200430040 = "นี่ก็ปีใหม่แล้ว"
20043-200430050 = "สิ่งสำคัญที่สุดในปีใหม่คืออะไรเหรอ?"
20043-200430060 = "อิซุมิคิดว่าคืออะไรล่ะ?"
20043-200430070 = "มันก็ต้องเป็น"
20043-200430080 = "อาหารรสชาติใหม่ๆ ต้อนรับปีใหม่\nอยู่แล้ว!"
20043-200430090 = "คุณครูกินอะไรตอนปีใหม่เหรอ?"
20043-200430100 = "ก็กินอาหารปกตินะ?"
20043-200430110 = "หรือไม่ก็สั่งอาหารพิเศษรับปีใหม่\nมากิน?"
20043-200430120 = "งั้นเหรอ?"
20043-200430130 = "แต่นี่ก็ปีใหม่ทั้งที ถ้าได้กินอะไรพิเศษๆ\nก็น่าจะยิ่งมีความสุขนะ"
20043-200430140 = "ว้าว"
20043-200430150 = "คุณครูก็ทำอย่างนั้นสินะ"
20043-200430160 = "เพราะงั้น..."
20043-200430170 = "ฉันก็เลยเตรียมอาหารปีใหม่"
20043-200430180 = "ไว้อวดคุณครูเหมือนกัน"
20043-200430190 = "คุณครู"
20043-200430200 = "เย็นนี้ว่างหรือเปล่า?"
20043-200430210 = "อื้ม ไม่ติดอะไรนะ ทำไมเหรอ?"
20043-200430220 = "ก็ครั้งที่แล้วน่ะสิ"
20043-200430230 = "ฉันไม่สบายใจที่คุณครูไม่ได้กินเยอะๆ"
20043-200430240 = "บอกแล้วไงว่าไม่ต้องกังวล"
20043-200430250 = "แต่มันยังกวนใจฉันอยู่ดีนี่นา!"
20043-200430260 = "เพราะงั้น"
20043-200430270 = "หลังจากคิดกังวลอยู่นาน"
20043-200430280 = "ฉันก็เลยเตรียมนู่นนี่ไว้ให้น่ะ"
20043-200430290 = "งั้นเจอกันตอนเย็นนะ!"
20043-200430300 = "ขอบคุณที่มาส่งนะ คุณครู!"
20043-200430310 = "ขอบคุณอะไรกัน เรื่องเล็กน้อยน่า"
20043-200430320 = "ว่าแต่ ครูว่ามันหนาวนิดหน่อย\nหรือเปล่า?"
20043-200430330 = "พออยู่กับอิซุมิ ครูก็ไม่หนาวเลยสักนิด"
20043-200430340 = "อื้อ! ฉันก็เหมือนกัน!"
20043-200430350 = "น่าทึ่งจังเลยเนอะ"
20043-200430360 = "ถ้าได้อยู่กับคุณครู ทุกเวลามันก็\nแปลกใหม่ไปหมด"
20043-200430370 = "รู้สึกเหมือนตอนที่เจอรสชาติใหม่ๆ\nเลยละ!"
20043-200430380 = "เอาไว้คราวหน้า"
20043-200430390 = "ไปผจญภัยสู่อาหารเลิศรสกันอีกนะ!"
20043-200430400 = "ครูชอบการผจญภัยแต่พอดีๆ\nมากกว่า..."
20043-200430410 = "งั้นเหรอ?"
20043-200430420 = "ก็ได้!"
20043-200430430 = "งั้นก็ให้คุณครูผจญภัยแต่พอดีแล้วกัน!"
20043-200430440 = "ฝันดีนะ คุณครู!"
20043-200430450 = "อื้ม อิซุมิก็ด้วยนะ"
20043-200430460 = "อื้อ!"

[translation]
20043-200430010 = "새해 복 많이 먹어 선생님!"
20043-200430020 = "응. 이즈미도 새해 복 많이 받아."
20043-200430030 = "그래서 말인데 선생님"
20043-200430040 = "새해가 되었잖아?"
20043-200430050 = "새해에서 가장 중요한 건 뭘까?"
20043-200430060 = "이즈미는 뭐라고 생각해?"
20043-200430070 = "그야 물론"
20043-200430080 = "새해를 맞이하는 새로운 맛의 음식이지!"
20043-200430090 = "선생님은 새해에 어떤 음식을 먹어?"
20043-200430100 = "그냥, 적당히 있는 거?"
20043-200430110 = "나름대로 주문한 새해 특별 음식?"
20043-200430120 = "그런가아"
20043-200430130 = "그래도 새해니까, 특별한 걸 먹으면 더욱 행복할 텐데"
20043-200430140 = "와아"
20043-200430150 = "선생님도 그런 거 하는구나"
20043-200430160 = "그래서 말인데"
20043-200430170 = "나도 선생님에게 보여 주고 싶은"
20043-200430180 = "새해 요리를 준비해 봤어!"
20043-200430190 = "선생님"
20043-200430200 = "오후에 시간 괜찮아?"
20043-200430210 = "응. 문제없는데. 왜?"
20043-200430220 = "저번에 말이지"
20043-200430230 = "선생님이 많이 못 먹은 게 마음에 걸려서"
20043-200430240 = "에이, 신경 안 써도 된다니까"
20043-200430250 = "하지만 신경 쓰이는걸!"
20043-200430260 = "그래서 말이야"
20043-200430270 = "많이 고민한 끝에"
20043-200430280 = "조금 이것저것 준비해 봤어"
20043-200430290 = "그러면 오후에 봐!"
20043-200430300 = "바래다줘서 고마워, 선생님!"
20043-200430310 = "별말씀을"
20043-200430320 = "그런데 조금 춥거나 하지 않았어?"
20043-200430330 = "이즈미와 같이 있다 보니까, 하나도 안 추웠어."
20043-200430340 = "응! 나도 그랬어!"
20043-200430350 = "신기하지?"
20043-200430360 = "선생님과 같이 있으면 모든 순간이 새로워"
20043-200430370 = "마치 새로운 맛을 찾았을 때처럼!"
20043-200430380 = "다음에 또 함께"
20043-200430390 = "미식 모험 떠나자!"
20043-200430400 = "나는 적당한 모험이 좋아……"
20043-200430410 = "그래?"
20043-200430420 = "알았어!"
20043-200430430 = "그러면 선생님은 적당한 모험으로!"
20043-200430440 = "잘 자 선생님!"
20043-200430450 = "그래. 이즈미도."
20043-200430460 = "응!"

[translation]
10106-101060010 = "Excellent news, Sensei."
10106-101060020 = "All my hard work until this point"
10106-101060030 = "has finally paid off."
10106-101060040 = "...?"
10106-101060050 = "Paid off?"
10106-101060060 = "Did you do something again, Sakurako?"
10106-101060070 = "Heehee."
10106-101060080 = "I'm on my way to you right now"
10106-101060090 = "Um..."
10106-101060100 = "I'm sorry, Sensei."
10106-101060110 = "I held a general meeting, per your request."
10106-101060120 = "But my new costume idea was not received well..."
10106-101060130 = "...I could've told you that."
10106-101060140 = "I think it's okay as an occasional occurrence, with your approval."
10106-101060150 = "Yes."
10106-101060160 = "Also..."
10106-101060170 = "I received a few requests"
10106-101060180 = "to restrain myself from wearing it during work hours."
10106-101060190 = "This is...difficult"
10106-101060200 = "There were also many people who liked the idea. I'm sure."
10106-101060210 = "Everything in moderation."
10106-101060220 = "It's hard to ever come to a complete consensus."
10106-101060230 = "Is that so"
10106-101060240 = "That is understandable."
10106-101060250 = "Have a blessed day, then."
10106-101060260 = "Sensei"
10106-101060270 = "Sensei, are you there?"
10106-101060280 = "I have something important to discuss with you."
10106-101060290 = "...? Sakurako?"
10106-101060300 = "Is everything okay?"
10106-101060310 = "Um..."
10106-101060320 = "In some ways...yes...in others..."
10106-101060330 = "If you have the time..."
10106-101060340 = "Could you spare me a moment...?"
10106-101060350 = "Thank you very much, Sensei."
10106-101060360 = "To be honest, I was rather skeptical at first."
10106-101060370 = "But I received something precious, in the end. Thanks to you."
10106-101060380 = "I'm glad it went well."
10106-101060390 = "I knew it'd turn out that way."
10106-101060400 = "Heehee."
10106-101060420 = "A part-time worker took this photo."
10106-101060430 = "They promised they would come to the concert."
10106-101060440 = "...Ah."
10106-101060450 = "Thinking about it, I attempted to tell the Sisters that they could call me \"Sakura,\""
10106-101060460 = "but they insisted that it was inappropriate."
10106-101060470 = "That's...well..."
10106-101060480 = "It was in too formal of a setting, again, Sakurako."
10106-101060490 = "Yes. Unfortunately,"
10106-101060500 = "that's how that went."
10106-101060510 = "There's much more to the duties of an idol than I expected."
10106-101060520 = "Naturally, I'm aware that the professional life of an idol is incredibly busy."
10106-101060530 = "But I didn't expect a temporary campus event to have this many demands."
10106-101060540 = "Aren't you pushing yourself too hard?"
10106-101060550 = "Do you have a lot to do today?"
10106-101060560 = "No. I have some breathing room today."
10106-101060570 = "But to succumb to fatigue, for even a moment..."
10106-101060580 = "I still have a long way to go."
10106-101060590 = "I must repay everything for all the support they've given me."
10106-101060600 = "Then let me lend a hand."
10106-101060610 = "Can we meet up today?"
10106-101060620 = "Huh?"
10106-101060630 = "Sensei?"
10106-101060640 = "My deepest gratitude for today, Sensei."
10106-101060650 = "It was truly an unforgettable experience."
10106-101060660 = "I'm glad that you liked it, Sakurako."
10106-101060670 = "I'm sure everyone will be happy."
10106-101060680 = "Yes."
10106-101060690 = "To be honest, I was thinking..."
10106-101060700 = "Since it's a precious gift, made by everyone, I sorely want to retrieve it"
10106-101060710 = "and display it on the cathedral wall..."
10106-101060720 = "That's what you were thinking, after all."
10106-101060730 = "I figured that's what you wanted."
10106-101060740 = "..."
10106-101060750 = "So you read me."
10106-101060760 = "Unfortunately, it doesn't seem to be possible...."
10106-101060770 = "I shall speak with you soon."
10106-101060790 = "Sensei ♡"
10106-101060800 = "Are yuu busy, Senseiii?"
10106-101060810 = "Because Idol Sakuwa will steal Sensei's time today!"
10106-101060820 = "Doki Doki Kyuuun ♡"
10106-101060830 = "Where...did you even learn that?"
10106-101060840 = "What is this, Sakurako...?"
10106-101060850 = "Heehee...! It's too early to be surprised just yet!"
10106-101060860 = "Hmph, hmph! It's not Sakurako, it's Sakuwa!"
10106-101060870 = "It's okay, Sensei!"
10106-101060880 = "Right now, I'm Sensei's idol!"
10106-101060890 = "..."
10106-101060900 = "The Sisters definitely"
10106-101060910 = "said something to that effect..."
10106-101060920 = "Ahh... I see..."
10106-101060930 = "Yes... I think I understand."
10106-101060940 = "Yup, yup!"
10106-101060950 = "So I'll be waiting! Sensei ♡"
10106-101060960 = "Sensei"
10106-101060970 = "I do apologize, but..."
10106-101060980 = "I had another inquiry..."
10106-101060990 = "Um..."
10106-101061000 = "Did you truly enjoy yourself?"
10106-101061010 = "I can't begin to express how happy I was, Sakurako."
10106-101061020 = "Thank you, Sakurako. It was a precious memory."
10106-101061030 = "Ah."
10106-101061040 = "Yes."
10106-101061050 = "Thank you, Sensei."
10106-101061060 = "I look forward to speaking with you again."

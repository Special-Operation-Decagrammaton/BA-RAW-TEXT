[translation]
10106-101060010 = "기쁜 일입니다, 선생님."
10106-101060020 = "그간 이어져 왔던 저의 노력이,"
10106-101060030 = "드디어 성과를……."
10106-101060040 = "……?"
10106-101060050 = "성과?"
10106-101060060 = "또 뭔가 하셨나요, 사쿠라코 씨?"
10106-101060070 = "후후"
10106-101060080 = "지금 그리로 가겠습니다."
10106-101060090 = "음"
10106-101060100 = "죄송합니다. 선생님."
10106-101060110 = "말씀대로 전체 회의를 한번 선행해 보았습니다만."
10106-101060120 = "아무래도 '전원 복장 교체'는 무리인 것으로……."
10106-101060130 = "……그야 그렇겠죠."
10106-101060140 = "개인 자격으로 가끔은 괜찮을 거야."
10106-101060150 = "네."
10106-101060160 = "그리고 저 또한"
10106-101060170 = "업무 시간에 쭉 입고 있는 것은 자제해 달라는"
10106-101060180 = "의견이 몇 건 올라왔습니다."
10106-101060190 = "어렵군요. 이런 건"
10106-101060200 = "분명 좋아해 주셨던 분도 많았는데"
10106-101060210 = "뭐든 정도라는 게 있으니……."
10106-101060220 = "모두의 의견이 같을 순 없지……."
10106-101060230 = "그런가요"
10106-101060240 = "네. 알겠습니다."
10106-101060250 = "그럼 평안한 하루 되시기를."
10106-101060260 = "선생님"
10106-101060270 = "선생님 혹시 계실까요?"
10106-101060280 = "긴히 드릴 말씀이 있습니다만"
10106-101060290 = "……? 사쿠라코?"
10106-101060300 = "무슨 일 있어?"
10106-101060310 = "음"
10106-101060320 = "있다고도 없다고도 할 수 있습니다"
10106-101060330 = "혹 괜찮으시다면"
10106-101060340 = "저에게 조금만 시간을"
10106-101060350 = "정말로 감사드립니다, 선생님."
10106-101060360 = "솔직히 반신반의한 게 사실이었으나"
10106-101060370 = "선생님 덕분에, 더없이 큰 것을 얻게 되었습니다."
10106-101060380 = "오, 잘 됐나 보네."
10106-101060390 = "그럴 줄 알았어."
10106-101060400 = "후후"
10106-101060420 = "아르바이트생 분이 찍어주셨습니다."
10106-101060430 = "두 분 모두, 공연에도 꼭 와 주시기로 했답니다."
10106-101060440 = "……아."
10106-101060450 = "그러고 보니 계속해서 '사쿠라 쨩'이라 불러 주셔도 좋다고 했습니다만,"
10106-101060460 = "다른 자매님들께서 그건 안 된다고 못 박아 버리셔서……."
10106-101060470 = "그건…… 그렇겠죠……."
10106-101060480 = "그걸 또 공석에서 말했군요, 사쿠라코 씨……."
10106-101060490 = "네. 그건 아쉽게도"
10106-101060500 = "그렇게 됐습니다."
10106-101060510 = "생각했던 것보다도 훨씬 바쁘군요, 아이돌 활동이란."
10106-101060520 = "직업인 분들이라면 당연히 그러실 거라 생각했지만,"
10106-101060530 = "한정적인 교내 이벤트성인 것인데도 이 정도라니"
10106-101060540 = "무리하는 거 아니야?"
10106-101060550 = "지금도 뭔가 하는 중이야?"
10106-101060560 = "아니요. 오늘은 그래도 여유가 있는 편입니다."
10106-101060570 = "하지만 순간이나마 피곤하다고 생각하다니,"
10106-101060580 = "저도 아직 부족하네요."
10106-101060590 = "성원에 보답해야 하는데 말이에요."
10106-101060600 = "그럼 조금 도와줄게."
10106-101060610 = "잠깐 나와줄 수 있을까?"
10106-101060620 = "네?"
10106-101060630 = "선생님?"
10106-101060640 = "오늘 일 정말로 감사했습니다, 선생님."
10106-101060650 = "정말 잊을 수 없는 기억이 될 것 같습니다."
10106-101060660 = "사쿠라코가 기뻐하니 다행이야."
10106-101060670 = "모두들 좋아할 거야."
10106-101060680 = "네."
10106-101060690 = "사실 그러잖아도 돌아가서"
10106-101060700 = "모두의 소중한 선물이니 나중에 회수해서,"
10106-101060710 = "대성당 벽면에 붙여두고 싶다고 말했습니다만……."
10106-101060720 = "역시 저질렀구나."
10106-101060730 = "응. 뭐, 그럴 거라 생각했어."
10106-101060740 = "……."
10106-101060750 = "예상하셨군요."
10106-101060760 = "아쉽게도 안 될 것 같습니다……."
10106-101060770 = "그럼 다음에 또 말씀드리겠습니다."
10106-101060790 = "선생님♡"
10106-101060800 = "혹시 시간 좀 괜찮을까용?"
10106-101060810 = "아이돌 사쿠라코 쨩은 선생님의 시간을 빼앗을 거예요!"
10106-101060820 = "두근두근 큥♡"
10106-101060830 = "어디서 또 그런 걸……."
10106-101060840 = "이건 뭐죠, 사쿠라코 씨?"
10106-101060850 = "후후후……! 놀라시긴 아직 이르다구용~"
10106-101060860 = "흥흥! 사쿠라코 씨가 아니라, 사쿠라코 쨩!"
10106-101060870 = "괜찮아용, 선생님!"
10106-101060880 = "지금의 저는 선생님의 아이돌이니까용~"
10106-101060890 = "……"
10106-101060900 = "자매님들께서도"
10106-101060910 = "분명 그렇게 말씀해 주셨습니다."
10106-101060920 = "아아……. 그렇군요……."
10106-101060930 = "네……. 대충 이해했습니다."
10106-101060940 = "응응!"
10106-101060950 = "그러니까 기다릴게요! 선생님♡"
10106-101060960 = "선생님"
10106-101060970 = "대단히 죄송합니다만, 그래도 역시"
10106-101060980 = "혹시나 해서"
10106-101060990 = "그"
10106-101061000 = "정말로 즐거우셨나요?"
10106-101061010 = "얼마나 기뻤는지, 사쿠라코는 모를 거야."
10106-101061020 = "고마워, 사쿠라코. 좋은 추억이 되었어."
10106-101061030 = "아"
10106-101061040 = "네."
10106-101061050 = "감사합니다, 선생님."
10106-101061060 = "앞으로도 잘 부탁드립니다."

[translation]
10106-101060010 = "我有一個好消息想跟您分享，老師"
10106-101060020 = "一直以來付出的努力"
10106-101060030 = "終於有收獲了……"
10106-101060040 = "……？"
10106-101060050 = "收獲？"
10106-101060060 = "這次又做了什麼嗎，櫻子同學？"
10106-101060070 = "呵呵"
10106-101060080 = "我現在就過去找您"
10106-101060090 = "那個"
10106-101060100 = "實在很抱歉，老師"
10106-101060110 = "我已經按照您的建議召開過全體會議"
10106-101060120 = "但是「更換所有人的服裝」這項提議，最終還是遭到了否決……"
10106-101060130 = "……這也難怪"
10106-101060140 = "你自己偶爾穿就行了吧"
10106-101060150 = "是"
10106-101060160 = "另外，我也收到了一些修女們的意見"
10106-101060170 = "他們希望我不要在執勤時間"
10106-101060180 = "也一直穿著那身衣服"
10106-101060190 = "這還真讓人為難呢"
10106-101060200 = "明明有那麼多人喜歡那套服裝"
10106-101060210 = "畢竟凡事都該有限度……"
10106-101060220 = "大家的意見本來就很難達成一致……"
10106-101060230 = "是嗎"
10106-101060240 = "我明白了"
10106-101060250 = "那麼，祝老師今天也能過得順遂"
10106-101060260 = "老師"
10106-101060270 = "老師，您在嗎？"
10106-101060280 = "我有些話想對您說"
10106-101060290 = "……櫻子？"
10106-101060300 = "有什麼事嗎？"
10106-101060310 = "那個"
10106-101060320 = "可以說有，也可以說沒有"
10106-101060330 = "如果您方便的話"
10106-101060340 = "希望能占用您一些時間"
10106-101060350 = "真的很謝謝您，老師"
10106-101060360 = "老實說，我本來還有點半信半疑的"
10106-101060370 = "但多虧了老師，我似乎獲得了更大的收穫"
10106-101060380 = "哦，看來成功了呢"
10106-101060390 = "我就知道你一定沒問題的"
10106-101060400 = "呵呵"
10106-101060420 = "我請工讀生為我們拍了照"
10106-101060430 = "他們兩位也說表演的時候一定會過來捧場"
10106-101060440 = "……啊"
10106-101060450 = "話說回來，雖然我跟他們說可以繼續叫我「櫻醬」"
10106-101060460 = "可惜其他修女不同意，我也沒能說服他們……"
10106-101060470 = "這……好像也沒辦法……"
10106-101060480 = "你又在公開場合說這種事了啊，櫻子同學……"
10106-101060490 = "是的"
10106-101060500 = "雖然有些遺憾，不過確實如此"
10106-101060510 = "擔任偶像比想像中還忙碌呢"
10106-101060520 = "職業偶像姑且不論"
10106-101060530 = "居然連只在校內活動的偶像都這麼忙"
10106-101060540 = "會不會太勉強了？"
10106-101060550 = "現在也在跑活動嗎？"
10106-101060560 = "不，我今天稍微有些空閒時間"
10106-101060570 = "即便只有一小段時間，我竟然會覺得疲累……"
10106-101060580 = "看來想要回應粉絲們的支持"
10106-101060590 = "還有很長一段路要走呢"
10106-101060600 = "那就讓我來幫點忙吧"
10106-101060610 = "待會可以見個面嗎？"
10106-101060620 = "嗯？"
10106-101060630 = "老師？"
10106-101060640 = "今天真的很謝謝您，老師"
10106-101060650 = "這個回憶，我想我一輩子都不會忘記的"
10106-101060660 = "能讓你感到開心真是太好了"
10106-101060670 = "我想大家一定也很高興的"
10106-101060680 = "是"
10106-101060690 = "由於那是大家送給我的珍貴禮物"
10106-101060700 = "因此在回去之後，我向其他修女們表示"
10106-101060710 = "想把那張海報貼在大教堂的牆壁上……"
10106-101060720 = "看來你已經付諸實行了"
10106-101060730 = "好吧，我也覺得八成會這樣"
10106-101060740 = "……"
10106-101060750 = "原來您早就猜到了嗎？"
10106-101060760 = "只可惜最終沒能如我所願……"
10106-101060770 = "那麼，之後再跟您聯絡"
10106-101060790 = "老師♡"
10106-101060800 = "請問現在方便嗎？"
10106-101060810 = "偶像櫻子醬，要來奪走老師的時間囉！"
10106-101060820 = "蹦蹦啾～♡"
10106-101060830 = "這又是從哪裡學來的……"
10106-101060840 = "可以麻煩你解釋一下嗎，櫻子同學？"
10106-101060850 = "呵呵呵……！這樣就嚇到了嗎～"
10106-101060860 = "哼哼！我現在不是櫻子同學，而是櫻子醬唷！"
10106-101060870 = "請放心，老師！"
10106-101060880 = "因為現在的我，是老師的專屬偶像～"
10106-101060890 = "……"
10106-101060900 = "修女們是"
10106-101060910 = "這麼建議我的"
10106-101060920 = "啊啊……原來如此……"
10106-101060930 = "嗯……我大概明白了"
10106-101060940 = "嗯嗯！"
10106-101060950 = "那我等著唷！老師♡"
10106-101060960 = "老師"
10106-101060970 = "雖然這麼說相當失禮，不過我還是希望確認一下"
10106-101060980 = "老師您"
10106-101060990 = "那個"
10106-101061000 = "真的有覺得開心嗎？"
10106-101061010 = "開心到你無法想像哦"
10106-101061020 = "謝謝你，櫻子。這是個美好的回憶"
10106-101061030 = "啊"
10106-101061040 = "是"
10106-101061050 = "非常謝謝您，老師"
10106-101061060 = "今後，也請您多多關照"

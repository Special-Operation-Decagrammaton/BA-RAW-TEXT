[translation]
10106-101060010 = "เป็นเรื่องน่ายินดีนะคะ คุณครู"
10106-101060020 = "ความพยายามของฉันที่ผ่านมา"
10106-101060030 = "ในที่สุดก็เห็นผล..."
10106-101060040 = "...?"
10106-101060050 = "เห็นผล?"
10106-101060060 = "ไปทำอะไรมาอีกแล้วน่ะ\nคุณซากุระโกะ?"
10106-101060070 = "ฮุฮุ"
10106-101060080 = "ฉันจะไปที่นั่นเดี๋ยวนี้ค่ะ"
10106-101060090 = "อืม"
10106-101060100 = "ขอโทษนะคะ คุณครู"
10106-101060110 = "ฉันจัดประชุมตามที่คุณครูบอกแล้ว"
10106-101060120 = "แต่การ 'เปลี่ยนชุดทั้งชมรม' คงไม่น่า\nทำได้ค่ะ..."
10106-101060130 = "ก็คงจะเป็นอย่างนั้นละ..."
10106-101060140 = "แต่งเองบ้างบางครั้งคงไม่เป็นไรหรอก"
10106-101060150 = "ค่ะ"
10106-101060160 = "อีกอย่าง"
10106-101060170 = "ฉันได้รับความคิดเห็นว่า"
10106-101060180 = "อยากให้งดใส่ในเวลางานด้วยค่ะ"
10106-101060190 = "ยากจังเลยนะคะ เรื่องแบบนี้"
10106-101060200 = "มีคนชอบตั้งเยอะแยะแท้ๆ"
10106-101060210 = "ทุกอย่างต้องมีขอบเขตนะ..."
10106-101060220 = "จะให้ทุกคนคิดเหมือนกันไม่ได้หรอก..."
10106-101060230 = "งั้นเหรอคะ?"
10106-101060240 = "ค่ะ เข้าใจแล้วค่ะ"
10106-101060250 = "ขอให้มีวันที่สงบสุขนะคะ"
10106-101060260 = "คุณครู"
10106-101060270 = "คุณครูอยู่มั้ยคะ?"
10106-101060280 = "ฉันมีเรื่องสำคัญจะบอกค่ะ"
10106-101060290 = "ซากุระโกะ...?"
10106-101060300 = "มีเรื่องอะไรเหรอ?"
10106-101060310 = "อืม"
10106-101060320 = "จะบอกว่ามีก็ได้ ไม่มีก็ได้ค่ะ"
10106-101060330 = "ถ้าคุณครูไม่ว่าอะไรละก็"
10106-101060340 = "ขอเวลาให้ฉันหน่อยได้มั้ยคะ?"
10106-101060350 = "ขอบคุณมากนะคะคุณครู"
10106-101060360 = "ที่จริงฉันลังเลว่าควรทำยังไง"
10106-101060370 = "ต้องขอบคุณคุณครู\nที่ทำให้ฉันทำสำเร็จได้ค่ะ"
10106-101060380 = "โอ้ คงจะผ่านไปได้ด้วยดีสินะ"
10106-101060390 = "กะไว้แล้วว่าต้องเป็นแบบนี้"
10106-101060400 = "ฮุฮุ"
10106-101060420 = "พนักงานพาร์ทไทม์ในร้านช่วยถ่ายไว้ให้ค่ะ"
10106-101060430 = "ทุกคนบอกว่าจะมาดูการแสดงด้วยค่ะ"
10106-101060440 = "อ่า..."
10106-101060450 = "จะว่าไป ฉันบอกพวกเขาว่าให้เรียกฉัน\nว่า 'ซากุระจัง' เหมือนเดิมได้"
10106-101060460 = "แต่ซิสเตอร์คนอื่นบอกว่าทำอย่างนั้น\nไม่ได้..."
10106-101060470 = "มันก็... คงเป็นงั้นละ..."
10106-101060480 = "ไปพูดต่อหน้าทุกคนอีกแล้วสินะ\nคุณซากุระโกะ..."
10106-101060490 = "ค่ะ น่าเสียดาย"
10106-101060500 = "ที่ต้องบอกว่าใช่ค่ะ"
10106-101060510 = "เป็นไอดอลแล้วงานยุ่งกว่าที่คิดไว้เยอะ\nเลยนะคะ"
10106-101060520 = "ฉันคิดว่านี่เป็นเรื่องปกติสำหรับคนที่มี\nอาชีพเป็นไอดอล"
10106-101060530 = "แต่กับอีเวนต์ในโรงเรียนก็ยังงานยุ่ง\nถึงขนาดนี้เลย"
10106-101060540 = "หักโหมเกินไปหรือเปล่า?"
10106-101060550 = "ตอนนี้ก็ทำกิจกรรมอยู่เหรอ?"
10106-101060560 = "ไม่ค่ะ วันนี้ฉันพอมีเวลาว่างค่ะ"
10106-101060570 = "แต่ก็ไม่อยากจะเชื่อเลยนะคะว่ายัง\nเหนื่อยอยู่"
10106-101060580 = "ฉันยังบกพร่องอยู่สินะคะ"
10106-101060590 = "ฉันต้องตอบแทนความช่วยเหลือจาก\nทุกคนแท้ๆ"
10106-101060600 = "งั้นครูจะช่วยเอง"
10106-101060610 = "ออกมาเจอกันแป๊บหนึ่งได้มั้ย?"
10106-101060620 = "คะ?"
10106-101060630 = "คุณครู?"
10106-101060640 = "เรื่องวันนี้ต้องขอบคุณมากเลยนะคะคุณครู"
10106-101060650 = "มันจะเป็นความทรงจำที่ฉันลืมไม่ลง\nเลยละค่ะ"
10106-101060660 = "ครูดีใจที่ซากุระโกะดีใจนะ"
10106-101060670 = "ทุกคนก็ต้องมีความสุขแน่ๆ"
10106-101060680 = "ค่ะ"
10106-101060690 = "ที่จริงฉันกลับไปบอกทุกคนว่า"
10106-101060700 = "นั่นคือของขวัญล้ำค่า และต่อไป"
10106-101060710 = "ฉันอยากจะเอามาติดไว้ที่ผนัง\nมหาวิหารค่ะ..."
10106-101060720 = "เป็นเรื่องเลยแฮะ"
10106-101060730 = "อืม แต่ครูก็คิดไว้แล้วละ"
10106-101060740 = "..."
10106-101060750 = "คิดไว้แล้วสินะคะ"
10106-101060760 = "แต่น่าเสียดายที่ไม่น่าจะทำได้ค่ะ..."
10106-101060770 = "ไว้คุยกันใหม่คราวหน้านะคะ"
10106-101060790 = "คุณครู♡"
10106-101060800 = "พอจะมีเวลามั้ยค้า?"
10106-101060810 = "ไอดอลซากุระโกะจังจะมาแย่งเวลา\nของคุณครูค่ะ!"
10106-101060820 = "ตื่นเต้นจุงเบย♡"
10106-101060830 = "ไปฝึกพูดแบบนี้มาจากไหน..."
10106-101060840 = "นี่มันอะไรกันเหรอ คุณซากุระโกะ?"
10106-101060850 = "ฮุฮุฮุ...! ยังเร็วเกินไปที่จะตกใจค่ะ~"
10106-101060860 = "ฮึ่ม ฮึ่ม! ไม่ใช่คุณซากุระโกะสิคะ\nซากุระโกะจังต่างหาก!"
10106-101060870 = "ไม่เป็นไรหรอกค่ะคุณครู!"
10106-101060880 = "ตอนนี้ฉันคือไอดอลของคุณครูนี่คะ~"
10106-101060890 = "..."
10106-101060900 = "ซิสเตอร์คนอื่นๆ"
10106-101060910 = "ก็พูดแบบนี้เหมือนกันค่ะ"
10106-101060920 = "อ่า... อย่างนั้นสินะ..."
10106-101060930 = "อืม... พอเข้าใจแล้วละ"
10106-101060940 = "อื้อ อื้อ!"
10106-101060950 = "งั้นฉันจะรอนะคะ! คุณครู♡"
10106-101060960 = "คุณครู"
10106-101060970 = "ต้องขอโทษจริงๆ นะคะ"
10106-101060980 = "ฉันมีเรื่องอยากจะถามอยู่น่ะค่ะ..."
10106-101060990 = "เอ่อ"
10106-101061000 = "วันนี้คุณครูสนุกจริงๆ เหรอคะ?"
10106-101061010 = "ซากุระโกะไม่รู้หรอก\nว่าครูดีใจแค่ไหน"
10106-101061020 = "ขอบใจนะ ซากุระโกะ\nเป็นความทรงจำที่ดีเลยละ"
10106-101061030 = "อ่า"
10106-101061040 = "ค่ะ"
10106-101061050 = "ขอบคุณนะคะ คุณครู"
10106-101061060 = "ต่อไปฉันก็ขอฝากตัวด้วยนะคะ"

[translation]
10005-162 = "Um, Sensei, can you come to the Foreclosure Task Force Room when you have time?"
10005-163 = "I need your help."
10005-164 = "Oh, also, I heard that whales hold their breath underwater. Did you know that?"
10005-165 = "To the Foreclosure Task Force Room? Okay."
10005-166 = "I didn't know that. I guess they are mammals, after all."
10005-167 = "Ugh. Sensei, I woke up with this awful back pain... My whole body aches..."
10005-168 = "Is this what duck down is supposed to feel like?"
10005-169 = "Now that I'm older, maybe I should be sleeping on the hard floor instead."
10005-170 = "You should find somewhere more comfortable to sleep next time."
10005-171 = "Well, in any event, I'll stop using the mat for now."
10005-172 = "Ugh, why do I have to wake up in the morning?"
10005-173 = "My eyelids are so heavy. Help me, Sensei..."
10005-174 = "Ah, student life."
10005-175 = "You got this, Hoshino!"
10005-176 = "I wish I didn't have eyelids, like a fish. Hmm..."
10005-177 = "Sensei, did you know?"
10005-178 = "Some fish that live in the deepest oceans create their own light to protect themselves."
10005-179 = "Oh, I'm gonna do another treasure hunt today. Do you want to join me? "
10005-180 = "I see. You won't even skip a single day, will you?"
10005-181 = "I didn't know that. The sea is such a mysterious place."
10005-182 = "Sensei, Sensei! Look!"
10005-184 = "Oh, you put them on the ceiling, huh?"
10005-185 = "It's pretty!"
10005-186 = "Heh, isn't it cool? It looks amazing when I lie down!"
10005-187 = "I had so much fun today. Thank you for the gift!"
10005-188 = "Let's go out again next time."
10005-189 = "Okay. Goodnight."
10005-190 = "A bed under the stars? Sounds dreamy."
10005-191 = "*yawn* The whole week is hard when I stay up until dawn."
10005-192 = "Am I getting old?"
10005-193 = "You shouldn't be up at this hour either, Sensei. "
10005-194 = "You need to take care of yourself!"
10005-195 = "Why are you still awake?"
10005-196 = "You should go to bed early."
10005-197 = "Well, there are multiple reasons... "
10005-198 = "Are you worried about me? "
10005-199 = "Wow! I'm touched..."
10005-200 = "I'm just nagging you."
10005-201 = "Be honest, Sensei. Heh heh..."
10005-202 = "Sensei, can you please not tell anyone about today? I know you can keep a secret."
10005-203 = "Um... I just feel so embarrassed."
10005-204 = "Heh heh! See you later, then."
10005-205 = "Goodnight, Hoshino!"
10005-206 = "Later, alligator!"
10005-207 = "I want to buy a book. Can you help me, Sensei?"
10005-208 = "The book I'm looking for isn't available in my town."
10005-209 = "Okay. Should we go to the bookstore in the mall?"
10005-210 = "Oh, sure. It's a bit far from Abydos, "
10005-211 = "but I'm sure they'll have the book I want!"
10005-212 = "Will you go with me?"
10005-213 = "Of course, Hoshino."
10005-214 = "Let's meet up somewhere nearby and go together."
10005-215 = "Wow, today was so amazing."
10005-216 = "I like the way you're determined to win. Is that part of being an adult? I'd like to learn that myself. Hmm."
10005-217 = "This is the advantage of being an adult!"
10005-218 = "...We could have just used that money to buy a ticket, though."
10005-219 = "That's cheating!"
10005-220 = "There are some fights you have to take up in life."
10005-221 = "Heh heh. Is that so? Well, anyway."
10005-222 = "Thanks."
10005-223 = "Hey, so, do you wanna come with me to the aquarium next time? I have two tickets... "
10005-224 = "I'll join you. So long as you don't mind."
10005-225 = "Of course. You can always invite me."
10005-226 = "Yeah?"
10005-227 = "...Heehee!"
10005-228 = "You promise?"
10005-229 = "Tell me when we can go, Sensei!"
10005-230 = "Sensei, about the aquarium tickets I got a while ago..."
10005-231 = "They're gonna expire soon. Should we go?"
10005-232 = "I'll be waiting in front of the aquarium."
10005-233 = "Okay. I'll see you there."
10005-100050010 = "I have a problem."
10005-100050020 = "It doesn't matter where I hide!"
10005-100050030 = "My adorable underclassmen always find me and chastise me..."
10005-100050040 = "This old-timer is very sad."
10005-100050050 = "You got scolded again?"
10005-100050060 = "You never change, Hoshino."
10005-100050070 = "Can't deny that!"
10005-100050080 = "With that being said..."
10005-100050100 = "Wait"
10005-100050110 = "This is off-topic, but..."
10005-100050120 = "Sensei"
10005-100050130 = "You free later?"
10005-100050140 = "Sensei"
10005-100050150 = "This old-timer actually has more stuff like that."
10005-100050160 = "Doesn't that get you a little curious?"
10005-100050170 = "You've piqued my interest."
10005-100050180 = "Do I have to unlock each item by completing certain conditions?"
10005-100050190 = "I guess so?"
10005-100050200 = "Yeah, sounds good."
10005-100050210 = "I'll show you another one next time."
10005-100050220 = "Look forward to it!"

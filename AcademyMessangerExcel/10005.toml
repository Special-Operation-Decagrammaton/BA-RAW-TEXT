[translation]
10005-162 = "老師，下次休假如果有空，能來趟對策委員會的教室嗎？"
10005-163 = "想請老師幫個忙"
10005-164 = "還有，雖然完全無關，但鯨魚在水裡是憋住呼吸的，你知道嗎？"
10005-165 = "對策委員會的教室是吧，了解"
10005-166 = "不知道耶。但確實是哺乳類呢"
10005-167 = "老師，我起床後腰痛到快斷了……還發出哀號……"
10005-168 = "羽毛都是這樣子的嗎？"
10005-169 = "果然這年紀不能睡太軟嗎……"
10005-170 = "睡在一張像樣的床上比較好唷"
10005-171 = "唔嗯……看來得請那張墊子回倉庫了……"
10005-172 = "為什麼人類早上必須起床呢……"
10005-173 = "眼皮重到要掉地上了……老師，救命……"
10005-174 = "因為是學生的命運啊……"
10005-175 = "加油！星野能做到的！"
10005-176 = "乾脆像魚一樣沒有眼皮的話也許能更輕鬆些……咕噥"
10005-177 = "老師，你知道嗎？"
10005-178 = "據說深海魚會讓身體發光來保護自己"
10005-179 = "話說回來，今天也要去尋寶，你要來嗎？"
10005-180 = "收到，隊長"
10005-181 = "不知道耶，海洋世界真是深奧"
10005-182 = "老師，你看這個！"
10005-184 = "貼在天花板上啦"
10005-185 = "哇，好漂亮啊"
10005-186 = "嘿嘿嘿，很棒吧？這比想像中還要棒呢～"
10005-187 = "今天很開心，謝謝你的禮物"
10005-188 = "那麼，下次再一起去哪裡吧。約好了"
10005-189 = "嗯，晚安"
10005-190 = "被光芒包裹住的床，真是浪漫呀"
10005-191 = "唔嘿～半夜不睡覺，第二天果然會很難受……"
10005-192 = "可能是上了年紀吧～"
10005-193 = "老師也不能半夜出門唷"
10005-194 = "讓我們互相照應吧～"
10005-195 = "星野為什麼半夜還醒著呢？"
10005-196 = "是啊，晚上最好早點睡"
10005-197 = "大叔這兒也是有各種情況……"
10005-198 = "還是說，老師是在擔心我？"
10005-199 = "大叔好感動啊～"
10005-200 = "只是在叮嚀品行不良的學生"
10005-201 = "老師真不老實，唔嘿嘿～"
10005-202 = "老師，今天發生的事要對大家保密唷？雖然我知道老師的口風很緊"
10005-203 = "但還是……會各種害臊"
10005-204 = "唔嘿，回頭見"
10005-205 = "嗯，晚安"
10005-206 = "回頭見"
10005-207 = "我想買些書。老師，可以跟我一起去嗎？"
10005-208 = "是這附近買不到的書，所以必須去遠一點的地方……"
10005-209 = "嗯，好啊。去購物中心看看吧？"
10005-210 = "就那樣吧～，雖然離阿拜多斯有點遠"
10005-211 = "但那裡應該會有～"
10005-212 = "話說回來，二話不說就答應了呢，不愧是老師～"
10005-213 = "那是當然，因為是星野的請求呢"
10005-214 = "先在附近碰面吧"
10005-215 = "哎呀～，嚇了一跳～"
10005-216 = "竟然想用毅力抓住幸運，不愧是老師。大叔很驚訝唷"
10005-217 = "這就是大人的力量！"
10005-218 = "……但仔細想想，也許用那筆錢就能正常買票了"
10005-219 = "說出那句話就完了！"
10005-220 = "對大人來說，有時候是不能退縮的"
10005-221 = "唔嘿嘿，這樣啊～"
10005-222 = "不管怎樣，謝啦"
10005-223 = "……那個，海生館，要一起去嗎？有2張票……"
10005-224 = "嗯，不嫌棄我的話"
10005-225 = "當然，謝啦"
10005-226 = "……唔嘿嘿"
10005-227 = "……這是你說的唷，老師？"
10005-228 = "約定好囉？"
10005-229 = "那麼下次，找個彼此都方便的時間去吧。再連絡～"
10005-230 = "老師，關於上次說的海生館"
10005-231 = "有效期限快到了，這個週末如何？"
10005-232 = "如果沒問題的話，在海生館前碰面，拜託了～"
10005-233 = "嗯，沒問題。我很期待唷"
10005-100050010 = "真傷腦筋"
10005-100050020 = "不管躲在什麼地方"
10005-100050030 = "都會被可愛的後輩們嘮叨"
10005-100050040 = "大叔我好可憐喔"
10005-100050050 = "又被罵了嗎？"
10005-100050060 = "星野還是老樣子呢"
10005-100050070 = "就是說啊"
10005-100050080 = "雖然這兩件事沒什麼關聯"
10005-100050100 = "不過"
10005-100050110 = "看在這件事的份上"
10005-100050120 = "老師"
10005-100050130 = "待會能見個面嗎？"
10005-100050140 = "老師"
10005-100050150 = "其實大叔我還有很多這類的道具哦"
10005-100050160 = "是不是很好奇呀？"
10005-100050170 = "聽你這麼說，的確是有點好奇"
10005-100050180 = "所以是會隨著條件達成逐漸解鎖嗎？"
10005-100050190 = "對吧？"
10005-100050200 = "那樣也不錯呢"
10005-100050210 = "下次再讓你看看別的吧"
10005-100050220 = "敬請期待～"

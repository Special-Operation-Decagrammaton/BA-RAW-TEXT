[translation]
10005-162 = "อืม... คุณครู วันหยุดนี้ช่วยมาที่ห้อง\nชมรมคณะกรรมการแผนงานหน่อยได้มั้ย?"
10005-163 = "ฉันมีเรื่องให้คุณครูช่วยหน่อยน่ะ"
10005-164 = "อ้อ! ได้ยินมาว่าวาฬกลั้นหายใจตอน\nอยู่ใต้น้ำล่ะ! ครูรู้หรือเปล่า?"
10005-165 = "ห้องชมรมคณะกรรมการแผนงานเหรอ?\nได้สิ"
10005-166 = "ไม่รู้เลย รู้แค่มันเป็นสัตว์เลี้ยงลูกด้วยนม"
10005-167 = "โอ๊ย... นอนผิดท่าแน่ๆ ทำไมตื่นมาแล้ว\nเอวเป็นแบบนี้นะ ปวดไปหมดเลย..."
10005-168 = "ที่นอนขนเป็ดนอนแล้วเป็นแบบนี้เหรอ?"
10005-169 = "หรือว่าอายุแบบเราต้องนอนบนพื้น\nแข็งๆ เท่านั้น..."
10005-170 = "คราวหน้าก็ไปนอนบนเตียงดีๆ สิ"
10005-171 = "อืม... ฉันคงต้องเลิกนอนบนฟูกแล้วละ"
10005-172 = "เฮ้อ... ทำไมคนเราต้องตื่นตอนเช้า\nด้วยเนี่ย?"
10005-173 = "ตาฉันจะปิดแล้ว ช่วยหน่อยสิครู..."
10005-174 = "ชีวิตของนักเรียนก็แบบนี้ละ..."
10005-175 = "พยายามถ่างตาไว้ โฮชิโนะจัง!"
10005-176 = "ฉันอยากให้คนไม่มีหนังตาเหมือนปลาจัง\nถ้าหนังตาไม่ตกก็คงไม่ง่วงเนอะ... ฮ้าวว"
10005-177 = "ครูรู้หรือเปล่า?"
10005-178 = "ปลาบางสายพันธุ์ที่อยู่ใต้ทะเลลึก\nจะสร้างแสงออกมาคุ้มกันตัวเองด้วยล่ะ"
10005-179 = "อ้อ! วันนี้ฉันจะออกไปล่าสมบัติ\nไปด้วยกันมั้ย?"
10005-180 = "วันนี้ก็จะออกอีกสินะ?"
10005-181 = "ไม่รู้เลย ทะเลก็เป็นอะไรที่ลึกซึ้งนะเนี่ย"
10005-182 = "ครู! ดูนี่สิ!"
10005-184 = "โอ้! ติดเอาไว้ที่เพดานนี่เอง"
10005-185 = "สวยดีนะ"
10005-186 = "อิอิ สวยใช่มั้ยล่ะ? ถ้าได้นอนดูจะยิ่ง\nสวยกว่านี้อีก!"
10005-187 = "วันนี้ฉันสนุกมากเลย ขอบคุณ\nสำหรับของขวัญด้วยนะ!"
10005-188 = "ไว้คราวหน้า เราไปที่ไหนด้วยกันอีกนะ"
10005-189 = "ได้สิ ฝันดีนะ"
10005-190 = "เตียงที่อยู่ใต้แสงดาวแบบนี้...\nโรแมนติกจัง~"
10005-191 = "ฮ้าวว พอโต้รุ่งทีไรก็เหนื่อยไปถึงอีกวัน\nทุกทีเลย"
10005-192 = "หรือว่าเป็นเพราะอายุมากขึ้นนะ?"
10005-193 = "ครูก็อย่าไปไหนมาไหนจนดึกดื่นล่ะ "
10005-194 = "ต้องระวังตัวดีๆ นะ~"
10005-195 = "แล้วทำไมโฮชิโนะถึงโต้รุ่งเหรอ?"
10005-196 = "ควรรีบเข้านอนแต่หัวค่ำนะ"
10005-197 = "อืม... มีหลายอย่างที่ต้องทำน่ะ "
10005-198 = "ว่าแต่ ครูเป็นห่วงฉันเหรอ?"
10005-199 = "ลุงคนนี้เริ่มประทับใจขึ้นมาแล้วแฮะ"
10005-200 = "ครูก็แค่บ่นไปตามประสาผู้ใหญ่น่ะ"
10005-201 = "ไม่กล้าพูดตรงๆ สินะ ครูนี่ก็ ฮ่าฮ่าฮ่า"
10005-202 = "เรื่องวันนี้ต้องเก็บเป็นความลับนะ\nฉันเชื่อว่าครูจะไม่เอาไปบอกใคร"
10005-203 = "อืม... ฉันเขินน่ะ >_<"
10005-204 = "ไว้เจอกันใหม่นะ"
10005-205 = "ฝันดีนะโฮชิโนะ~"
10005-206 = "ไว้เจอกันใหม่~"
10005-207 = "ฉันอยากซื้อหนังสือน่ะ ครูพอจะช่วยหน่อย\nได้มั้ย?"
10005-208 = "หนังสือที่ฉันหาอยู่ไม่มีขายแถวนี้เลย..."
10005-209 = "ได้สิ ลองไปร้านหนังสือที่อยู่ในห้างมั้ย?"
10005-210 = "ไปสิ ถึงจะอยู่ไกลจากอะบิดอส..."
10005-211 = "แต่ที่นั่นน่าจะมีหนังสือที่ฉันต้องการนะ"
10005-212 = "ครูจะไปด้วยกันใช่มั้ย?"
10005-213 = "แน่นอนอยู่แล้ว โฮชิโนะจังมา\nขอร้องทั้งที"
10005-214 = "มาเจอกันแถวนี้แล้วไปด้วยกันสิ"
10005-215 = "ฮื้ม วันนี้ยอดมากเลย"
10005-216 = "ไม่อยากจะเชื่อเลยว่าครูจะคว้าโชคมา\nด้วยพลังแบบนั้น นี่สินะที่เรียกว่าพลัง\nของผู้ใหญ่ สงสัยฉันต้องไปเรียนบ้างแล้ว\nอืมม"
10005-217 = "นี่แหละพลังของผู้ใหญ่!"
10005-218 = "แต่ว่าเราเอาเงินนั้นไปซื้อตั๋วเลยก็ได้นี่..."
10005-219 = "อย่าพูดแบบนั้นสิ!"
10005-220 = "เรื่องบางอย่างเราก็ต้องสู้ให้สุดใจนะ"
10005-221 = "อะฮ่ะฮ่า งั้นเหรอ? แต่ก็..."
10005-222 = "ขอบคุณนะ"
10005-223 = "ไว้คราวหน้าไปอควาเรียมด้วยกันมั้ย?\nไหนๆ ก็มีตั๋ว 2 ใบแล้ว..."
10005-224 = "อควาเรียมงั้นเหรอ?\nถ้าอยากไปกับครูก็ได้"
10005-225 = "แน่นอน ครูยินดีเสมอ"
10005-226 = "จริงนะ?"
10005-227 = "อ่า... แหะๆๆ"
10005-228 = "ถือว่าตกลงแล้วนะ?"
10005-229 = "ถ้ามีเวลาว่างก็มาบอกฉันนะ!"
10005-230 = "ครู ตั๋วอควาเรียมที่ได้มาคราวก่อนน่ะ"
10005-231 = "มันจะหมดอายุอยู่แล้วนะ\nเราไปด้วยกันมั้ย?"
10005-232 = "ฉันจะรออยู่หน้าอควาเรียมนะ"
10005-233 = "ได้สิ แล้วเจอกันที่นั่นนะ"
10005-100050010 = "ลำบากจริงๆ เลยน้า"
10005-100050020 = "ไม่ว่าจะไปซ่อนที่ไหน"
10005-100050030 = "เสียงบ่นเสียดหูของพวกรุ่นน้องที่น่ารัก\nเนี่ย..."
10005-100050040 = "ตาลุงคนนี้รู้สึกเศร้าจริงๆ"
10005-100050050 = "โดนบ่นมาอีกแล้วสินะ"
10005-100050060 = "เหมือนเดิมเลยนะ โฮชิโนะ"
10005-100050070 = "ก็นะ"
10005-100050080 = "งั้นก็หมายความว่า..."
10005-100050100 = "ไม่สิ"
10005-100050110 = "มันไม่เกี่ยวกับเรื่องนี้ก็จริง แต่ว่า..."
10005-100050120 = "ครู"
10005-100050130 = "มีเวลาสักหน่อยมั้ย?"
10005-100050140 = "ครู"
10005-100050150 = "ที่จริงแล้วลุงน่ะ มีของแบบนั้นอยู่อีกนะ"
10005-100050160 = "สงสัยใช่มั้ยล่ะ?"
10005-100050170 = "พูดแบบนี้ก็ต้องสงสัยสิ"
10005-100050180 = "รู้สึกปลดล็อกได้ทีละเงื่อนไขเลย?"
10005-100050190 = "ใช่มั้ยล่ะ?"
10005-100050200 = "ดีละ"
10005-100050210 = "ไว้คราวหน้า จะเอาอันอื่นให้ดูนะ"
10005-100050220 = "ตั้งตารอได้เลย~"

[translation]
10005-162 = "음, 선생. 휴일에 대책위원회 동아리실로 와줄 수 있겠어?"
10005-163 = "선생 도움이 좀 필요한데"
10005-164 = "아 그리고, 고래는 물 속에서 숨을 참고 있는 거래. 알고 있었어?"
10005-165 = "대책위원회 동아리실로? 알았어."
10005-166 = "몰랐어. 과연 포유류구나."
10005-167 = "으으…… 선생, 자고 일어났더니 허리가 부러질 듯 아프고……. 삭신이 쑤시는데……."
10005-168 = "오리털이라는 건 원래 이런 거야?"
10005-169 = "역시 이 나이에는 딱딱한 바닥이 아니면 안 되는 건가……."
10005-170 = "다음부턴 제대로 침대에서 자."
10005-171 = "으음…… 저 매트를 쓰는 건 일단 보류해둬야겠어."
10005-172 = "아…… 어째서 사람은 아침에 일어나지 않으면 안 되는 걸까."
10005-173 = "눈꺼풀이 너무 무거워 선생 도와줘……."
10005-174 = "학생의 숙명이니까……."
10005-175 = "힘내! 할 수 있어, 호시노 쨩!"
10005-176 = "물고기처럼 감을 눈꺼풀이 없으면 차라리 좋겠는데 말이지…… 음냐."
10005-177 = "선생, 알고 있었어?"
10005-178 = "심해에 사는 물고기 중에는 빛을 만들어서 자기를 보호하는 녀석들도 있대."
10005-179 = "아, 그리고 오늘도 보물찾기 할 건데 올래?"
10005-180 = "과연. 오늘도 출동인가."
10005-181 = "몰랐어. 바다는 심오하구나."
10005-182 = "선생, 선생! 이것 봐!"
10005-184 = "오오, 천정에 붙였구나?"
10005-185 = "예쁜데?"
10005-186 = "으헤, 멋지지? 누워서 보면 정말 굉장하다고!"
10005-187 = "오늘은 엄청 즐거웠어. 선물도 고마웠고!"
10005-188 = "그럼 또 다음에 같이 어디든 가는 걸로."
10005-189 = "그래. 잘 자."
10005-190 = "별빛 아래의 침대구나. 로망이네~"
10005-191 = "하암. 새벽까지 깨어있으면 역시 다음 주까지 힘들단 말야."
10005-192 = "나이가 들어서 그런가?"
10005-193 = "선생도 새벽에 돌아다니면 안 돼."
10005-194 = "몸조심해야지~"
10005-195 = "새벽까지 왜 깨어있는 거야?"
10005-196 = "일찍 일찍 자는 게 좋아."
10005-197 = "으헤~ 뭐, 여러 사정이 있달까……."
10005-198 = "그건 그렇고 걱정해주는 거야?"
10005-199 = "이 아저씨는 감동이네~"
10005-200 = "그냥 잔소리하는 거야."
10005-201 = "솔직하지 못하긴. 선생도. 으헤헤-"
10005-202 = "선생, 오늘 일은 모두에겐 비밀이야? 선생이라면 입이 무거운 건 알고 있지만."
10005-203 = "음…… 여러 가지로 부끄러우니까."
10005-204 = "으헤헤, 그럼 다음에 봐."
10005-205 = "호시노도 잘 자~"
10005-206 = "다음에 봐~"
10005-207 = "책을 좀 사고 싶은데 말야. 선생, 도와줄 수 있어?"
10005-208 = "내가 찾고 있는 책은 이 동네에는 없어서 말이지……."
10005-209 = "그래. 쇼핑몰의 서점으로 가볼까?"
10005-210 = "오, 그래. 아비도스에서 좀 멀지만"
10005-211 = "거기라면 찾는 책이 있겠는데?"
10005-212 = "같이 가줄 거지?"
10005-213 = "물론이지. 호시노 쨩의 부탁인데."
10005-214 = "근처에서 만나서 같이 가자."
10005-215 = "이야. 오늘 완전 대박이었어."
10005-216 = "근성으로 운을 잡아채는 거 잘 봤어, 선생. 이것이 바로 어른의 힘인가. 나도 배워야겠어. 음음."
10005-217 = "이것이 어른의 힘이다!"
10005-218 = "……그런데 그 돈으로 그냥 티켓을 샀으면 됐을 텐데 말이지."
10005-219 = "그걸 언급하는 건 반칙이야!"
10005-220 = "살다보면 물러설 수 없는 싸움을 해야 하는 법."
10005-221 = "으헤헤헤, 그런가? 뭐, 암튼."
10005-222 = "고마워."
10005-223 = "……아쿠아리움, 다음에 같이 가지 않을래? 표도 2장이고 하니……."
10005-224 = "아쿠아리움이라…… 나라도 괜찮다면."
10005-225 = "물론이지. 언제든지 환영이야."
10005-226 = "그래?"
10005-227 = "……에헤헤-"
10005-228 = "그럼 약속한 거야?"
10005-229 = "다음에 시간 날 때 얘기하라고, 선생!"
10005-230 = "선생, 저번에 얻은 아쿠아리움 티켓 말야."
10005-231 = "슬슬 기간이 다 되어 가니까, 이번에 같이 가지 않을래?"
10005-232 = "아쿠아리움 앞에서 기다리고 있을게."
10005-233 = "알았어. 거기서 봐."
10005-100050010 = "곤란하구만"
10005-100050020 = "어디로 숨어도"
10005-100050030 = "귀여운 후배들의 무서운 잔소리라니"
10005-100050040 = "아저씨는 서글퍼"
10005-100050050 = "또 한 소리 들었구나"
10005-100050060 = "여전하네, 호시노는"
10005-100050070 = "뭐 그렇지"
10005-100050080 = "그런 의미에서"
10005-100050100 = "아니"
10005-100050110 = "이건 그것과는 별개이긴 하지만"
10005-100050120 = "선생"
10005-100050130 = "언제 한 번, 시간 괜찮아?"
10005-100050140 = "선생"
10005-100050150 = "사실 아저씨에게는 그런 아이템이 더 있어"
10005-100050160 = "궁금하지 않아?"
10005-100050170 = "그렇게 말하니 궁금한걸"
10005-100050180 = "조건마다 해금되는 느낌인 거야?"
10005-100050190 = "그렇지?"
10005-100050200 = "좋아"
10005-100050210 = "다음에는 또 다른 걸로 보여줄게."
10005-100050220 = "기대하라고~."

[translation]
23001-1449 = "คุณครูคะ ฉันมีเรื่องจะรบกวนคุณครู\nหน่อยค่ะ"
23001-1450 = "วันนี้พอมีเวลาว่างมั้ยคะ?"
23001-1451 = "อื้อ ครูว่างตลอดเลยนะ"
23001-1452 = "ชะ...โชคดีจังเลยค่ะ!"
23001-1453 = "ถ้างั้นฉันจะรออยู่ที่โรงอาหารนะคะ"
23001-1454 = "วันนี้ขอบคุณที่มาช่วยนะคะ"
23001-1455 = "ไม่เป็นไรหรอก ไม่ใช่เรื่องใหญ่อะไรเลย"
23001-1456 = "แต่ถึงยังไง ฉันจะต้องตอบแทนคุณครู\nให้ได้ค่ะ"
23001-1457 = "รอได้เลยค่ะ"
23001-1458 = "คุณครูคะ ฉันเตรียมเสร็จเรียบร้อยแล้วค่ะ"
23001-1459 = "เตรียม? เตรียมอะไรเหรอ?"
23001-1460 = "เรื่องนั้น... ถ้าคุณครูมาที่โรงอาหารก็จะ\nรู้เองค่ะ"
23001-1461 = "วันนี้ฟูกะจะแสดงฝีมือให้ดูเองค่ะ!"
23001-1462 = "ขะ... ขอโทษด้วยค่ะ คุณครู"
23001-1463 = "ฉันอยากจะทำอาหารอร่อยๆ ให้คุณครู\nทานก็เท่านั้น..."
23001-1464 = "ต้องขอโทษสำหรับเรื่องวันนี้ด้วยนะคะ!"
23001-1465 = "คุณครู ตื่นรึยังคะ? ร่างกายโอเคมั้ยคะ?"
23001-1466 = "อื้อ ตื่นแล้วล่ะ"
23001-1467 = "สบายมาก ร่างกายก็ปกติดีนะ"
23001-1468 = "อ่า... โชคดีจังเลยค่ะ"
23001-1469 = "ฉันอยากแก้มือจากที่ทำพลาดเมื่อคราว\nก่อนค่ะ"
23001-1470 = "พอดีคิดไอเดียดีๆ ออกแล้วค่ะ..."
23001-1471 = "คุณครูคะ วันนี้คุณครูจะมาหาฉันมั้ยคะ?"
23001-1472 = "ต้องไปอยู่แล้ว"
23001-1473 = "ค่ะ ถ้างั้นฉันจะรอนะคะ!"
23001-1474 = "วันนี้เป็นอาหารที่ทำจากปลาไหล\nดีมั้ยคะ?"
23001-1475 = "ถ้าคุณครูชอบก็คงดี..."
23001-1476 = "คราวหน้าฉันจะทำอะไรอร่อยๆ ให้ทาน\nอีกนะคะ!"
23001-1477 = "คุณครูคะ เมื่อไม่กี่วันนี้ฉันลองคิดเมนู\nใหม่มาค่ะ..."
23001-1478 = "แล้วก็อยากให้คุณครูได้ลองชิมดูด้วย..."
23001-1479 = "ถ้าคุณครูไม่ว่าอะไร..."
23001-1480 = "ถ้าเป็นเมนูที่ฟูกะทำ ครูต้องไปชิมแน่นอน!"
23001-1481 = "ฮุฮุ... ค่ะ แล้วฉันจะรอนะคะ"
23001-1482 = "คุณครูคะ"
23001-1483 = "ยังไม่ลืมนัดที่จะมาช่วยฉันตอนมื้อเที่ยง\nใช่มั้ยคะ?"
23001-1484 = "จำได้อยู่แล้วล่ะ"
23001-1485 = "เรานัดกันเหรอ?"
23001-1486 = "ค่า~♪ ดีจังเลย"
23001-1487 = "อ๊ะ หรือว่าจะสื่อสารผิดพลาดไป\nอย่างนั้นเหรอคะ?"
23001-1488 = "ล้อเล่นน่ะ..."
23001-1489 = "ฮือ ล้อเล่นเหรอคะ..."
23001-1490 = "ถ้าจะล้อเล่นแบบนี้..."
23001-1491 = "ฉันแอบรู้สึกไม่ดีนะคะ"
23001-1492 = "ขะ...ขอโทษนะ"
23001-1493 = "อะไรกันคะ ฉันแค่ล้อเล่นเองค่ะ"
23001-1494 = "อ๊ะ โดนบ้างแล้ว!"
23001-1495 = "ฮุฮุ เลิกล้อเล่นดีกว่า"
23001-1496 = "ฉันจะรอคุณครูที่โรงอาหารนะคะ"
23001-1497 = "คะ... คุณครูคะ"
23001-1498 = "เรื่องที่เกิดขึ้นวันนี้..."
23001-1499 = "มีเรื่องอะไรเหรอ?"
23001-1500 = "น่ารักดีนะ ฟูกะตัน~"
23001-1501 = "อะ...อื้อ! หะ...ห้ามเอาไปบอกคนอื่น\nดะ...เด็ดขาดนะคะ!"

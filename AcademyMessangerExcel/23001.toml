[translation]
23001-1449 = "老師，有件事想拜託您……"
23001-1450 = "請問，您今天有時間嗎？"
23001-1451 = "嗯，完全沒問題唷"
23001-1452 = "太，太好了！"
23001-1453 = "那麼，我在食堂等您。萬事拜託了"
23001-1454 = "今天非常感謝老師的幫忙"
23001-1455 = "不會，沒做什麼大不了的事"
23001-1456 = "別這麼說。日後一定會好好報答老師的"
23001-1457 = "敬請期待唷"
23001-1458 = "老師，我準備好了"
23001-1459 = "準備好了，是指……？"
23001-1460 = "今天，可以請老師來格黑娜的學生食堂一趟嗎？"
23001-1461 = "讓老師見識，風華的全力"
23001-1462 = "對，對不起，老師"
23001-1463 = "我滿腦子只想著用美味的料理來招待老師，所以才……"
23001-1464 = "今天真的很抱歉！"
23001-1465 = "老師，您醒了嗎？身體還好嗎……？"
23001-1466 = "嗯，剛醒來"
23001-1467 = "沒事，什麼問題都沒有唷"
23001-1468 = "呼，太好了……"
23001-1469 = "我一直在想，要做什麼才能夠彌補老師"
23001-1470 = "正好，我想到了一個好主意……"
23001-1471 = "今天下午能見個面嗎？"
23001-1472 = "嗯，我很樂意"
23001-1473 = "非常感謝！那麼，我等老師來唷！"
23001-1474 = "今天的鰻魚料理老師覺得怎麼樣呢？"
23001-1475 = "要是有合老師的口味就好了"
23001-1476 = "下次我會用更美味的料理招待老師唷！"
23001-1477 = "老師。其實我前幾天想出了一道新菜色"
23001-1478 = "無論如何都想讓老師第一個吃到"
23001-1479 = "如果方便的話……"
23001-1480 = "風華的新菜色！我一定去！"
23001-1481 = "呵呵。好，我等老師來唷"
23001-1482 = "老師"
23001-1483 = "之前有說過今天要來幫我，老師還記得嗎？"
23001-1484 = "記得喔"
23001-1485 = "……是今天嗎？"
23001-1486 = "太好了♪"
23001-1487 = "啊，難道那時候沒有好好傳達到嗎……？"
23001-1488 = "抱歉，開玩笑的"
23001-1489 = "啊，原來，是開玩笑的啊……"
23001-1490 = "被開這種欺負人的玩笑的話，"
23001-1491 = "我會受傷的……"
23001-1492 = "抱，抱歉……！"
23001-1493 = "……騙你的，這也是開玩笑的哦"
23001-1494 = "中計了！"
23001-1495 = "呵呵，玩笑話就先說到這裡"
23001-1496 = "我在食堂等老師哦！"
23001-1497 = "老，老師……"
23001-1498 = "那個，今天發生的事……"
23001-1499 = "有發生什麼嗎？"
23001-1500 = "風華炭，真可愛啊……"
23001-1501 = "嗚，嗚嗚……！不，不能告訴其他人唷……？"

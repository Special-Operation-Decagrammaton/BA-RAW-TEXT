[translation]
23001-1449 = "선생님, 부탁드리고 싶은 게 있는데."
23001-1450 = "혹시 오늘 시간 괜찮으신가요?"
23001-1451 = "응. 얼마든지 괜찮아."
23001-1452 = "다, 다행이다!"
23001-1453 = "그럼, 학생식당에서 기다리고 있을게요."
23001-1454 = "오늘 도와주셔서 감사합니다."
23001-1455 = "아냐, 별것도 아닌 일이었는데."
23001-1456 = "그래도 이번 일의 보답은 반드시 할게요."
23001-1457 = "그럼 기대해주세요."
23001-1458 = "선생님, 준비는 전부 끝났어요."
23001-1459 = "준비? 무슨 준비?"
23001-1460 = "그건 게헨나 학생식당으로 오시면 알 수 있어요."
23001-1461 = "오늘 후우카의 전력을 보여드리겠어요!"
23001-1462 = "죄, 죄송해요. 선생님."
23001-1463 = "맛있는 음식을 대접해드려야 한다는 생각에……."
23001-1464 = "오늘 일은 정말 죄송합니닷!"
23001-1465 = "선생님, 일어나셨나요? 몸은 어떠신가요?"
23001-1466 = "응, 일어났어"
23001-1467 = "괜찮아. 몸은 멀쩡해."
23001-1468 = "하아, 다행이다."
23001-1469 = "저, 그때의 실패를 만회하고 싶어요."
23001-1470 = "마침 좋은 아이디어가 떠올랐는데……."
23001-1471 = "선생님, 오늘 오후에 뵐 수 있을까요?"
23001-1472 = "물론이지."
23001-1473 = "네, 그럼 기다리고 있을게요!"
23001-1474 = "오늘 장어 요리는 어떠셨나요?"
23001-1475 = "선생님 입맛에 맞으셨으면 다행이지만."
23001-1476 = "다음번엔 더 맛있는 음식을 대접해드릴게요!"
23001-1477 = "선생님, 얼마 전에 새로 구상한 레시피로 만든 요리가 있는데."
23001-1478 = "반드시 꼭 선생님에게 맛보여드리고 싶어요."
23001-1479 = "혹시 괜찮으시다면……."
23001-1480 = "후우카의 신메뉴라니, 무조건 갈게!"
23001-1481 = "후훗, 네. 기다리고 있을게요."
23001-1482 = "선생님."
23001-1483 = "오늘 점심에 도와주시기로 한 거 잊지 않으셨죠?"
23001-1484 = "기억하고 있어."
23001-1485 = "그랬었나?"
23001-1486 = "네~♪ 다행이네요."
23001-1487 = "앗, 설마 중간에 이야기 전달이 잘못되었을까요?"
23001-1488 = "농담이야."
23001-1489 = "읏, 농담이라니……."
23001-1490 = "그런 짓궂은 농담을 하시면……."
23001-1491 = "저 상처 받는다구요?"
23001-1492 = "죄, 죄송합니다……!"
23001-1493 = "뭐어, 농담이지만요?"
23001-1494 = "헉, 당했다!"
23001-1495 = "후후. 그럼 장난은 여기까지 해두고."
23001-1496 = "저, 학생식당에서 기다리고 있을게요!"
23001-1497 = "서, 선생님……."
23001-1498 = "오늘 있었던 일은……."
23001-1499 = "무슨 일이 있었나?"
23001-1500 = "귀여웠지. 후우카 땅."
23001-1501 = "우, 우우! 다른 사람들한텐 비, 비밀이에요!"

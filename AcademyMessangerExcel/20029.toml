[translation]
20029-200290010 = "คุณครู?"
20029-200290020 = "คุณครูเตรียมพร้อมไปชายหาด\nแล้วใช่มั้ยคะ?"
20029-200290030 = "อืม ครูต้องเตรียมอะไรไปบ้างนะ..."
20029-200290040 = "ฮิฮิ งั้นไม่เป็นไรค่ะ"
20029-200290050 = "ฉันเตรียมพวกของจำเป็นไว้พร้อมแล้ว\nคุณครูมาแต่ตัวก็พอค่ะ"
20029-200290060 = "อ๊ะ แต่ว่า... คุณครูต้องเตรียม\nชุดว่ายน้ำมาเองนะคะ"
20029-200290070 = "ครูต้องเตรียมไปเองอยู่แล้ว..."
20029-200290080 = "ค่ะ ถ้างั้นมาเจอกันที่หน้าห้อง\nฉันนะคะ"
20029-200290090 = "ฉันจะรอนะคะ"
20029-200290100 = "ชอบการอาบแดดรึเปล่าคะ คุณครู?"
20029-200290110 = "ชอบสิ แถมยังติดใจจน\nเกินไปด้วยเนี่ย"
20029-200290120 = "คะ? หมายความว่ายังไงเหรอคะ...?"
20029-200290130 = "ว่าแต่...คุณครูไม่ได้บาดเจ็บ\nตรงไหนใช่มั้ยคะ?"
20029-200290140 = "ไม่เลย เพราะมิโมริมาช่วยไว้เลย\nครูสบายดีสุดๆ"
20029-200290150 = "คะ? ฮิฮิ... ถ้างั้นก็โล่งอกไปทีค่ะ"
20029-200290160 = "ถ้างั้นไว้เจอกันนะคะ"
20029-200290170 = "สวัสดีค่ะ คุณครู "
20029-200290180 = "อรุณสวัสดิ์ มิโมริ"
20029-200290190 = "วันนี้อากาศดีจังเลยน้า~"
20029-200290200 = "อ๊ะ จริงด้วยค่ะ "
20029-200290210 = "วันนี้อากาศดีมากเลยค่ะ\nลมพัดเอื่อยๆ แบบนี้\nยิ่งทำให้รู้สึกดี..."
20029-200290220 = "รู้สึกเหมือนวันนี้จะมีเรื่องดีๆ\nเกิดขึ้นเลยค่ะ"
20029-200290230 = "วันนี้ก็ขอให้เป็นวันที่ดีนะคะ!"
20029-200290240 = "สวัสดีค่ะ คุณครู "
20029-200290250 = "วันนี้ฉันอยากไปชายหาดกับคุณครู\nจังเลยค่ะ"
20029-200290260 = "จะ...จะได้รึเปล่าคะ?"
20029-200290270 = "ได้เสมอ"
20029-200290280 = "ถ้างั้นก็ขอรบกวนด้วยนะคะ"
20029-200290290 = "ตอนนี้... ฉันตั้งตารอสุดๆ เลยค่ะ"
20029-200290300 = "ตะ...ตอนนี้ใจเต้นแรงเหมือนจะหลุด\nออกมาเลยค่ะ"
20029-200290310 = "เอ่อ ใจเย็นๆ ก่อนแล้วกันนะ..."

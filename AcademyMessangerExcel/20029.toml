[translation]
20029-200290010 = "선생님?"
20029-200290020 = "오늘 해변가로 나갈 준비, 다 되셨죠?"
20029-200290030 = "음…… 그런데 난 뭘 준비해야 할지……"
20029-200290040 = "후훗. 괜찮답니다."
20029-200290050 = "웬만한 것은 제가 준비해 둘 테니, 선생님께서는 몸만 오시면 돼요."
20029-200290060 = "아, 그래도…… 수영복은 직접 준비해 주세요?"
20029-200290070 = "그건 당연한 거잖아……"
20029-200290080 = "네. 그러면 제 방문 앞에서 뵈어요."
20029-200290090 = "기다리고 있겠습니다."
20029-200290100 = "일광욕은 마음에 드셨나요, 선생님?"
20029-200290110 = "너무 마음에 들어서 문제였던 것 같아……"
20029-200290120 = "네? 그건 무슨 말씀이신지……?"
20029-200290130 = "저…… 어쨌든 어딘가 아프다거나 하신 건 아니죠?"
20029-200290140 = "미모리 덕분에 완전 괜찮아!"
20029-200290150 = "네? 후훗. 그렇다면 다행이네요."
20029-200290160 = "그럼, 또 나중에."
20029-200290170 = "안녕하세요. 선생님."
20029-200290180 = "좋은 아침이네. 미모리."
20029-200290190 = "오늘도 날씨가 좋구나~"
20029-200290200 = "앗, 네. 그러게요."
20029-200290210 = "바람도 솔솔 불어오는 게 무척이나 기분이 좋아서."
20029-200290220 = "왠지 좋은 일이 일어날 것 같은 날이네요."
20029-200290230 = "그럼 오늘도 파이팅이에요!"
20029-200290240 = "안녕하세요. 선생님."
20029-200290250 = "오늘은 선생님과 해변에서 함께 시간을 보내고 싶은데"
20029-200290260 = "괜찮으신가요?"
20029-200290270 = "얼마든지 좋아."
20029-200290280 = "그러면 잘 부탁드립니다."
20029-200290290 = "뭔가…… 엄청나게 기대가 되네요."
20029-200290300 = "저, 지금 가슴이 막 뛰고 그러는 거 있죠?"
20029-200290310 = "음, 저기. 살살 부탁합니다……?"

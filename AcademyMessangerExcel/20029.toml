[translation]
20029-200290010 = "老師"
20029-200290020 = "今天去海邊的準備完成了嗎？"
20029-200290030 = "嗯……話說我該準備什麼才好呢……"
20029-200290040 = "呵呵。沒關係的"
20029-200290050 = "基本的東西我會準備好，老師只要人來就行了"
20029-200290060 = "啊，不過……泳裝還是要請老師自己準備唷？"
20029-200290070 = "那不是當然的嗎……"
20029-200290080 = "呵呵，那就在我的房間前碰面吧"
20029-200290090 = "我會等著您的"
20029-200290100 = "對日光浴還滿意嗎，老師？"
20029-200290110 = "問題是好像太滿意了……"
20029-200290120 = "咦？那是什麼意思……？"
20029-200290130 = "那個……應該不是哪裡不舒服吧？"
20029-200290140 = "託三森的福，完全沒問題！"
20029-200290150 = "是嗎？呵呵，那真是太好了"
20029-200290160 = "那麼下次再見"
20029-200290170 = "您好，老師"
20029-200290180 = "你好呀，三森"
20029-200290190 = "今天天氣也很好呢～"
20029-200290200 = "啊，是的，就是說啊"
20029-200290210 = "微風徐徐，相當舒適"
20029-200290220 = "總覺得會有好事發生"
20029-200290230 = "那麼今天也加油吧！"
20029-200290240 = "您好，老師"
20029-200290250 = "今天我想和老師一起在海邊度過……"
20029-200290260 = "請問是否方便呢？"
20029-200290270 = "當然沒問題"
20029-200290280 = "那麼就麻煩您了"
20029-200290290 = "我……感到非常期待"
20029-200290300 = "竟然會如此怦然心動……"
20029-200290310 = "那，那個，不用那麼緊張哦……？"

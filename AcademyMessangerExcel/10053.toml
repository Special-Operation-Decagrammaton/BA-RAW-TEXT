[translation]
10053-100530010 = "คุณครูคะ ไม่ทราบว่าส่งรายการ\nค่าใช้จ่ายของเดือนนี้มารึยังคะ?"
10053-100530020 = "ฉันมาถามเพราะใกล้หมดเขตส่ง\nเอกสารแล้ว แต่ยังไม่ได้รับเอกสาร\nเลยน่ะค่ะ"
10053-100530030 = "ครูแนบไปพร้อมกับรายงาน\nที่ส่งไปคราวก่อนแล้วนะ"
10053-100530040 = "อะไรกัน... ฉันไม่เห็นเอกสาร\nได้ยังไงกันเนี่ย..."
10053-100530050 = "ดูเหมือนช่วงนี้จะยุ่งๆ จนไม่ค่อยมี\nสติเท่าไรเลยค่ะ ขอโทษด้วยนะคะ"
10053-100530060 = "ช่วงนี้ทำงานหนักเกินไปรึเปล่า?"
10053-100530070 = "ก็ยุ่งๆ นิดหน่อยค่ะ แต่ว่าก็ช่วยไม่ได้\nนี่คะ"
10053-100530080 = "อีกไม่นานก็จะถึงงานเทศกาลฮาโล\nเฟสติวัลที่ทางมิลเลเนียมเป็นเจ้าภาพ\nแล้วค่ะ"
10053-100530090 = "พอต้องเตรียมงานแข่งกีฬาและ\nทำงานของเซมิน่าไปด้วย ฉันเลย\nงานเยอะกว่าเดิมนิดหน่อย..."
10053-100530100 = "ยูกะทำงานหนักน่าดูเลยนะ"
10053-100530110 = "ครูตั้งตารองานฮาโลเฟสติวัลเลยนะ"
10053-100530120 = "ขอบคุณนะคะคุณครู"
10053-100530130 = "แต่ถ้าว่าปล่อยไว้แบบนี้ อาจเกิดปัญหา\nตามมาหลายๆ เรื่องได้ค่ะ"
10053-100530140 = "ฉันคงต้องลงไปจัดการงานส่วนอื่นๆ\nเพิ่มด้วยแล้วค่ะ"
10053-100530150 = "พอมาคิดๆ ดูแล้ว ดูเหมือนว่าในช่วง\nงานฮาโลเฟสติวัล โรงอาหารจะไม่เปิด\nด้วยค่ะ"
10053-100530160 = "ถึงด้านนอกสเตเดียมจะมีร้านค้า\nแผงลอยเปิดอยู่ก็จริง แต่ช่วงที่\nเตรียมงานอยู่ก็คงไม่มีเวลาเดิน\nไปซื้อแน่ๆ..."
10053-100530170 = "ฉันคงต้องเตรียมข้าวกล่อง\nไปเองแล้วสินะคะ"
10053-100530180 = "ไอเดียดีเลยนี่นา"
10053-100530190 = "ปกติยูกะทำอาหารเองเหรอ?"
10053-100530200 = "เปล่าหรอกค่ะ"
10053-100530210 = "ฉันไม่ค่อยได้เข้าครัวเองเท่าไรหรอกค่ะ..."
10053-100530220 = "แต่คราวนี้ก็อยากลองดูสักครั้งค่ะ"
10053-100530230 = "นึกๆ ดูแล้ว ตอนนี้ี่ก็ใกล้เริ่มฤดูกาล\nแข่งคัดเลือกอินเตอร์ไฮระดับภูมิภาค\nของคิโวทอสแล้วค่ะ"
10053-100530240 = "ได้ยินมาว่าชมรมเบสบอลของทาง\nมิลเลเนียมเองก็จะเข้าร่วมแข่งด้วย..."
10053-100530250 = "แต่ทีมของโรงเรียนเราไม่ค่อยเก่ง\nเท่าไร ก็เลยไม่รู้ว่าผลจะออกมาเป็น\nยังไงน่ะค่ะ..."
10053-100530260 = "ยูกะดูการแข่งเบสบอลบ่อยเหรอ?"
10053-100530270 = "ฉันไม่ได้เป็นแฟนพันธุ์แท้เบสบอล\nอะไรขนาดนั้นหรอกค่ะ..."
10053-100530280 = "เวลาทีมของโรงเรียนเราเข้าร่วมแข่ง\nก็แค่คอยเชียร์อยู่ห่างๆ ค่ะ"
10053-100530290 = "งานฮาโลเฟสติวัลและเรื่องวุ่นวายต่างๆ\nก็ผ่านไปได้ด้วยดีแล้วนะคะ"
10053-100530300 = "ขอบคุณที่ทำงานอย่างหนักค่ะ คุณครู"
10053-100530310 = "ยูกะเองก็ทำได้ดีมากเลยนะ"
10053-100530320 = "ไม่หรอกค่ะ ในฐานะของกรรมการ\nของทางเซมิน่า มันเป็นหน้าที่ของฉัน\nอยู่แล้วค่ะ"
10053-100530330 = "จะว่าไป ตอนนี้เราต้องรีบหารือกันเรื่อง\nคำร้องขอความร่วมมือกับทางชาเล่ต์\nแล้วนะคะ"
10053-100530340 = "ถ้าจัดการงานของทางโรงเรียนเสร็จแล้ว\nฉันจะไปหาที่ชาเล่ต์นะคะ"
10053-100530350 = "แล้วพบกันนะคะ คุณครู"
10053-100530370 = "ฉันลองเขียนข้อความดูแล้ว..."
10053-100530380 = "คุณครูคิดว่ายังไงคะ?"
10053-100530390 = "ประโยคมันดูทื่อๆ นิดหน่อย..."
10053-100530400 = "ใส่ความรู้สึกเข้าไปอีกหน่อยสิ..."
10053-100530410 = "ถ้าคุณครูพูดแบบนั้นละก็..."
10053-100530430 = "แค่ครั้งนี้ครั้งเดียวนะคะ"

[translation]
10053-100530010 = "Sensei, have you sent this month's invoices yet?"
10053-100530020 = "It's almost the submission deadline, but I don't think I've received any."
10053-100530030 = "I included them in my last report. They should be on the back."
10053-100530040 = "Oh dear, I completely missed that."
10053-100530050 = "I've been a bit of a mess lately. Sorry about that."
10053-100530060 = "Are you sure you're just not overworked?"
10053-100530070 = "I'm busy, sure... But at the end of the day, the work needs doing."
10053-100530080 = "We'll be hosting the Kivotos Halo Festival soon."
10053-100530090 = "And it's not like my usual Seminar duties disappeared. It's only natural that I end up with more work."
10053-100530100 = "Sounds like you're working hard, Yuuka."
10053-100530110 = "I'm sure the festival will go great thanks to you."
10053-100530120 = "...Thanks for saying that."
10053-100530130 = "But at the moment, things aren't looking too smooth."
10053-100530140 = "If anything, it seems I need to take on more work."
10053-100530150 = "Come to think of it, won't the cafeteria be closed during the Kivotos Halo Festival?"
10053-100530160 = "I'm sure there'll be vendors and food stands, but I probably won't have time to stop by while on committee duty..."
10053-100530170 = "I should prepare some boxed lunches instead."
10053-100530180 = "Good idea."
10053-100530190 = "Do you cook often, Yuuka?"
10053-100530200 = "No."
10053-100530210 = "I don't have much experience making proper dishes..."
10053-100530220 = "But now's a good opportunity to start."
10053-100530230 = "By the way, the Kivotos Interhigh regional qualifiers are about to begin."
10053-100530240 = "I hear Millennium's baseball club is going to participate..."
10053-100530250 = "But the team isn't great, so who knows what will happen this year..."
10053-100530260 = "Are you a baseball fan, Yuuka?"
10053-100530270 = "I wouldn't call myself a fan,"
10053-100530280 = "but I'm always rooting for the Millennium team."
10053-100530290 = "The Kivotos Halo Festival and all the madness that came with it have both finally ended..."
10053-100530300 = "Thank you for all your hard work, Sensei."
10053-100530310 = "You too, Yuuka."
10053-100530320 = "Not at all. As a member of Seminar, it was only natural for me to be so involved."
10053-100530330 = "By the way, we're supposed to discuss the Schale cooperation I requested."
10053-100530340 = "I'll visit Schale as soon as I wrap up my work at the academy."
10053-100530350 = "I look forward to seeing you."
10053-100530370 = "So, I ended up writing a few lines..."
10053-100530380 = "...What do you think?"
10053-100530390 = "It's a little wooden..."
10053-100530400 = "Try lightening it up with a little more passion..."
10053-100530410 = "Plead all you want..."
10053-100530430 = "This is a one-time-only thing."

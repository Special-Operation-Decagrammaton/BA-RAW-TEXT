[translation]
10111-101110010 = "เฮ้อ"
10111-101110020 = "รู้สึกแปลกจัง"
10111-101110030 = "ยังไม่ชินสักที"
10111-101110040 = "มีปัญหาอะไรหรือเปล่า?"
10111-101110050 = "ไม่ใช่เรื่องที่ครูต้องกังวลหรอก"
10111-101110060 = "อืม"
10111-101110070 = "แต่ถ้ามีเวลา มาเจอกันหน่อยได้มั้ย?"
10111-101110080 = "ฉันมีอะไรจะถามหน่อยน่ะ"
10111-101110090 = "วันนี้สนุกมากเลยละครู!"
10111-101110100 = "ไม่คิดเลยว่าหลายคนจะจำฉันไม่ได้\nถ้าฉันไม่เข้าไปชวนคุยก่อนน่ะ"
10111-101110110 = "นี่มันครั้งแรกเลยนะเนี่ย"
10111-101110120 = "ถ้าเนรุสนุก ครูก็ดีใจนะ"
10111-101110130 = "วันหยุดในอนาคตก็จะเป็นแบบนี้อีก\nมั้ยนะ?"
10111-101110140 = "เริ่มจะรู้สึกสนุกขึ้นมาแล้วสิ"
10111-101110150 = "เฮ้ ครู"
10111-101110160 = "ยุ่งอยู่หรือเปล่า?"
10111-101110170 = "วันนี้ครูว่าง"
10111-101110180 = "งั้นก็ดีเลย"
10111-101110190 = "ฉันยังมีวันหยุดเหลืออยู่น่ะ"
10111-101110200 = "ก็เลยคิดว่าถ้าครูไม่ติดอะไร"
10111-101110210 = "อยากมีวันหยุดสุดพิเศษเหรอ?"
10111-101110220 = "ก็"
10111-101110230 = "ประมาณนั้นแหละ"
10111-101110240 = "งั้นเรามาเจอกันนะ"
10111-101110250 = "ตอนนี้เหลือแค่วันเดียวแล้ว"
10111-101110260 = "ที่จะได้ใส่ชุดนักเรียนน่ะ"
10111-101110270 = "งั้นคงกลับไปใส่ซูคาจันอีกสินะ?"
10111-101110280 = "ก็คงงั้นแหละ"
10111-101110290 = "..."
10111-101110300 = "แอบน่าเสียดายอยู่นะเนี่ย"
10111-101110310 = "มีอะไรน่าจดจำให้ทำก่อนจะกลับสู่ชีวิต\nแบบเดิมมั้ยนะ?"
10111-101110320 = "อะไรที่น่าจดจำเหรอ?"
10111-101110330 = "ก็แบบนั้นไง"
10111-101110340 = "แบบที่ทำส่งท้ายอะไรประมาณนั้น!\nกิจกรรมแบบที่ทำแล้ว"
10111-101110350 = "ให้ความรู้สึกว่าจบแล้วน่ะ"
10111-101110360 = "อยากส่งท้ายวันหยุดสุดขีด\nที่น่าจดจำเหรอ...?"
10111-101110370 = "เฮ้"
10111-101110380 = "ครู"
10111-101110390 = "ที่ฉันพูดไปเมื่อกี้น่ะ"
10111-101110400 = "เหมือนฉันพรั่งพรูออกมาคนเดียวเลย"
10111-101110410 = "เอ่อ"
10111-101110420 = "ถ้าไม่สะดวกก็บอกกันได้นะ"
10111-101110430 = "ไม่ว่าเนรุจะเป็นแบบไหน ครูก็ชอบนะ"
10111-101110440 = "เฮ้อ"
10111-101110450 = "จริงๆ เลย"
10111-101110460 = "ครูก็เป็นอย่างนี้อยู่เรื่อย"
10111-101110470 = "งั้นวันหยุดครั้งหน้า ฉันรบกวนด้วยนะ"

[translation]
10111-101110010 = "Ah."
10111-101110020 = "It's awkward."
10111-101110030 = "I can't get used to it."
10111-101110040 = "Is there a problem?"
10111-101110050 = "Well, nothing for you to worry about, Sensei, but"
10111-101110060 = "Um..."
10111-101110070 = "Can we meet if you happen to have time?"
10111-101110080 = "I've got something to ask."
10111-101110090 = "Today was fun, Sensei!"
10111-101110100 = "The way most people didn't recognize me until I talked to them."
10111-101110110 = "I've really never experienced that before."
10111-101110120 = "I'm glad you're having fun."
10111-101110130 = "Is this how days off are going to feel from now on?"
10111-101110140 = "I'm starting to enjoy them, you know?"
10111-101110150 = "Yo, Sensei."
10111-101110160 = "Busy?"
10111-101110170 = "I'm free today."
10111-101110180 = "Ah, nice."
10111-101110190 = "I still have some days off."
10111-101110200 = "So, if you're okay with it..."
10111-101110210 = "You have something special in mind for today?"
10111-101110220 = "Well"
10111-101110230 = "Something like that."
10111-101110240 = "Let's talk in person or something."
10111-101110250 = "I'm only wearing the school uniform"
10111-101110260 = "for one more day here."
10111-101110270 = "Then you can wear your bomber jacket again, right?"
10111-101110280 = "Right."
10111-101110290 = "..."
10111-101110300 = "It feels nice but bittersweet at the same time."
10111-101110310 = "I wonder what I'll remember most, once I go back to my regular life."
10111-101110320 = "What you'll remember?"
10111-101110330 = "Well, you know"
10111-101110340 = "Some big new core memory, like ending with a big Kaboom! or a Bang!"
10111-101110350 = "I need something like that."
10111-101110360 = "Like a literal explosion, or what?"
10111-101110370 = "Um..."
10111-101110380 = "Sensei."
10111-101110390 = "About what I said earlier."
10111-101110400 = "It feels like I did all the talking."
10111-101110410 = "Um..."
10111-101110420 = "If you're not happy about that, you can tell me."
10111-101110430 = "You're welcome to say whatever you want, as much as you want, Neru."
10111-101110440 = "Ah."
10111-101110450 = "Seriously,"
10111-101110460 = "you're always like this, Sensei."
10111-101110470 = "I'll be looking forward to the next day off, then."

[translation]
10111-101110010 = "아"
10111-101110020 = "어색해"
10111-101110030 = "적응이 안 되네"
10111-101110040 = "무슨 문제라도 있어?"
10111-101110050 = "뭐 선생이 신경 쓸 건 아니지만"
10111-101110060 = "음"
10111-101110070 = "혹시 시간 있으면 잠깐 만날 수 있을까"
10111-101110080 = "뭣 좀 물어볼 게 있어서"
10111-101110090 = "오늘은 재밌었어, 선생!"
10111-101110100 = "설마 내가 말 걸기 전까지 못 알아보는 녀석들이 태반이라니"
10111-101110110 = "이런 경험은 처음이야"
10111-101110120 = "즐거워하는 것 같아 다행이네."
10111-101110130 = "앞으로 휴일은 다 이런 느낌이려나?"
10111-101110140 = "좀 재밌어지기 시작했다고?"
10111-101110150 = "여 선생"
10111-101110160 = "바빠?"
10111-101110170 = "오늘은 한가해."
10111-101110180 = "그거 좋네"
10111-101110190 = "아직 휴일도 꽤 남았단 말이지"
10111-101110200 = "그래서 선생만 괜찮다면"
10111-101110210 = "특별한 휴일을 보내고 싶은 거야?"
10111-101110220 = "뭐"
10111-101110230 = "비슷하달까"
10111-101110240 = "아무튼 얼굴이나 보자고"
10111-101110250 = "이제 하루밖에 안 남았어"
10111-101110260 = "교복 입고 지내는 거"
10111-101110270 = "그럼 다시 스카잔을 입을 수 있겠네?"
10111-101110280 = "그렇지"
10111-101110290 = "……."
10111-101110300 = "은근 시원섭섭한데 이거"
10111-101110310 = "일상으로 돌아가기 전에 뭔가 기념이 될 만한 건 없으려나"
10111-101110320 = "기념이 될 만한 거?"
10111-101110330 = "왜 그런 거 있잖아"
10111-101110340 = "마지막에 파바박! 이나 콰쾅! 하면서 끝나는 거"
10111-101110350 = "그런 게 필요해"
10111-101110360 = "폭발엔딩이 필요하다고……?"
10111-101110370 = "저기"
10111-101110380 = "선생"
10111-101110390 = "아까 말한 거 말인데"
10111-101110400 = "나 혼자 막 쏟아낸 것 같아서"
10111-101110410 = "그"
10111-101110420 = "혹시 싫으면 싫다고 얘기해도 괜찮아"
10111-101110430 = "난 어떤 모습의 네루든 환영이야."
10111-101110440 = "아"
10111-101110450 = "정말"
10111-101110460 = "선생은 항상 이런 식이라니까"
10111-101110470 = "그럼 다음 휴일도 잘 부탁한다?"

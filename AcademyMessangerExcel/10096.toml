[translation]
10096-100960010 = "안녕하십니까, 선생님. 칸나입니다."
10096-100960020 = "오랜만이네, 칸나."
10096-100960030 = "그동안 잘 지냈어?"
10096-100960040 = "갑작스럽게 연락드려 죄송하지만, 상담하고 싶은 것이 생겼습니다."
10096-100960050 = "칸나의 상담이라, 드문 일인걸."
10096-100960060 = "다름이 아니라, 이번에 라이프가드 임무를 맡게 되었습니다."
10096-100960070 = "한데, 수영복에 문제가 있어서……."
10096-100960080 = "문제?"
10096-100960090 = "그게……혹시 괜찮으시다면 직접 뵙고 조언을 부탁드려도 될까요?"
10096-100960100 = "저 혼자 결정하기에는 어딘가 마음이 편치 않습니다."
10096-100960110 = "물론이지, 금방 갈게."
10096-100960120 = "잘 들어가셨습니까? 오늘은 감사했습니다, 선생님."
10096-100960130 = "덕분에 좋은 수영복을 고를 수 있었습니다."
10096-100960140 = "칸나가 마음에 든다면 다행이야."
10096-100960150 = "……."
10096-100960160 = "사실, 아까 한 가지 깨달았습니다."
10096-100960170 = "어쩌면 저는, 누군가의 '잘 어울린다'는 말 한마디가 필요했던 것인지도 모르겠습니다."
10096-100960180 = "처음 해 보는 임무인지라 안심이 되지 않았으니까요."
10096-100960190 = "잘됐네. 이제 좀 마음을 놓았어?"
10096-100960200 = "네, 그렇습니다."
10096-100960210 = "역시, 선생님께 도움을 요청한 것이 정답이었군요"
10096-100960220 = "안녕하십니까, 선생님."
10096-100960230 = "파크는 잘 즐기고 계신지 모르겠군요."
10096-100960240 = "응, 들어오자마자 물놀이 중이야."
10096-100960250 = "즐겨 주시는 것 같아 라이프가드로서 기쁘군요."
10096-100960260 = "저, 혹시 실례가 되지 않는다면, 한 가지 부탁을 드리고 싶습니다."
10096-100960270 = "무슨 부탁인데?"
10096-100960280 = "실외 시설에 있는 '메가 슬라이드'로 와 주시겠습니까?"
10096-100960290 = "운행 시작 전에 시험 운행을 부탁드리고 싶습니다."
10096-100960300 = "오늘은 워터파크가 운영하지 않는 날입니다."
10096-100960310 = "혹시나 요일을 혼동하여 방문하지 않도록 주의해 주시기 바랍니다."
10096-100960320 = "그럼 칸나도 쉬는 거야?"
10096-100960330 = "그렇지는 않습니다."
10096-100960340 = "라이프가드들은 시설의 관리보수와 청소를 해야 하니까요."
10096-100960350 = "이용객 여러분이 안전하고 즐겁게 시설을 이용할 수 있도록 최선을 다할 생각입니다."
10096-100960360 = "휴일이 휴일이 아니구나……."
10096-100960370 = "너무 열심히 하는 거 아냐?"
10096-100960380 = "이용객의 안전을 책임지는 라이프가드로서 당연한 일입니다."
10096-100960390 = "또한, 그 이용객에는 선생님도 포함되어 있으니까요."

[translation]
10096-100960010 = "Hello, Sensei. It's Kanna."
10096-100960020 = "It's been a while, Kanna."
10096-100960030 = "How have you been?"
10096-100960040 = "Apologies for contacting you out of the blue, but I need advice on something."
10096-100960050 = "It's rare for you to seek out advice!"
10096-100960060 = "It's nothing serious, but this and that happened, and I ended up agreeing to be a lifeguard."
10096-100960070 = "Which is well and fine, but I've got a swimsuit problem."
10096-100960080 = "Problem?"
10096-100960090 = "It'd be easier to ask you about it in person, if you have the time."
10096-100960100 = "I can't comfortably decide this on my own."
10096-100960110 = "Of course, I'll be there soon."
10096-100960120 = "Did you get back okay? Thanks for your assistance today, Sensei."
10096-100960130 = "You really helped me in picking out a swimsuit."
10096-100960140 = "I'm glad you liked it, Kanna."
10096-100960150 = "..."
10096-100960160 = "This didn't occur to me until later..."
10096-100960170 = "But I just needed someone to validate me, I think."
10096-100960180 = "This is my first time being a lifeguard, so I wasn't feeling very confident."
10096-100960190 = "I'm glad it worked out. How're you feeling now?"
10096-100960200 = "A lot more confident."
10096-100960210 = "I knew calling you for help was the right call."
10096-100960220 = "Hey, Sensei."
10096-100960230 = "Hope you're enjoying the park."
10096-100960240 = "Yes. I dove into the water as soon as I got here."
10096-100960250 = "As a lifeguard, I'm glad to hear that."
10096-100960260 = "That being said, could I ask you for a favor?"
10096-100960270 = "What's that?"
10096-100960280 = "The \"Mega Slide\", located at the outside facility. Could you meet me there?"
10096-100960290 = "It needs test runs before it begins officially operating."
10096-100960300 = "The water park is closed today."
10096-100960310 = "Please keep this in mind when planning your visits."
10096-100960320 = "Does that mean you get to take a break, Kanna?"
10096-100960330 = "Unfortunately, no."
10096-100960340 = "It's part of a lifeguard's duty to clean and perform regular maintenance of the facilities on closure days."
10096-100960350 = "We'll need to do our best, so the guests can safely enjoy the park."
10096-100960360 = "No such thing as a day off..."
10096-100960370 = "Aren't you working too hard?"
10096-100960380 = "There's no such thing as cutting corners when it comes to safety."
10096-100960390 = "Especially when one of those guests is you, Sensei."

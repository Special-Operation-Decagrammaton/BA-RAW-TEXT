[translation]
10096-100960010 = "สวัสดีค่ะคุณครู ฉันคันนะเองนะคะ"
10096-100960020 = "ไม่ได้คุยกันนานเลยนะคันนะ"
10096-100960030 = "สบายดีมั้ย?"
10096-100960040 = "ขอโทษที่ติดต่อมาอย่างกะทันหันนะคะ\nพอดีฉันมีเรื่องอยากปรึกษาค่ะ"
10096-100960050 = "มีเรื่องปรึกษาเหรอ โอกาสแบบนี้\nไม่ได้มีบ่อยๆ เลยนะ"
10096-100960060 = "พอดีครั้งนี้ฉันต้องไปทำภารกิจ\nไลฟ์การ์ดน่ะค่ะ"
10096-100960070 = "แต่ว่ามีปัญหากับชุดว่ายน้ำ..."
10096-100960080 = "ปัญหาเหรอ?"
10096-100960090 = "อืม... ถ้าคุณครูไม่ติดอะไร ฉันขอพบ\nและขอคำแนะนำหน่อยได้มั้ยคะ?"
10096-100960100 = "ฉันไม่สบายใจที่จะตัดสินใจเรื่องนี้\nคนเดียวน่ะค่ะ"
10096-100960110 = "ได้สิ ครูจะรีบไปนะ"
10096-100960120 = "กลับถึงบ้านหรือยังคะ? วันนี้ขอบคุณ\nมากเลยนะคะคุณครู"
10096-100960130 = "ฉันได้ชุดว่ายน้ำที่ตรงใจเลยค่ะ"
10096-100960140 = "งั้นก็โล่งอกไปทีนะ"
10096-100960150 = "..."
10096-100960160 = "ที่จริงแล้ว เมื่อกี้ฉันตระหนักบางอย่าง\nได้ค่ะ"
10096-100960170 = "ฉันอาจจะอยากฟังใครบางคนบอกว่า\n'ชุดเหมาะกับเธอดีนะ' ก็ได้ค่ะ"
10096-100960180 = "เพราะนี่เป็นภารกิจที่ฉันไม่เคยทำ\nก็เลยวางใจไม่ได้น่ะค่ะ"
10096-100960190 = "ค่อยยังชั่วหน่อยนะ งั้นตอนนี้เบาใจ\nลงบ้างแล้วหรือยัง?"
10096-100960200 = "ค่ะ"
10096-100960210 = "ฉันทำถูกต้องเลยนะคะที่มาขอความ\nช่วยเหลือจากคุณครู"
10096-100960220 = "สวัสดีค่ะคุณครู"
10096-100960230 = "สนุกกับสวนน้ำอยู่หรือเปล่าคะ?"
10096-100960240 = "อื้ม ครูเข้ามาก็ตรงมาเล่นน้ำเลย"
10096-100960250 = "แบบนั้นไลฟ์การ์ดอย่างฉันก็ดีใจค่ะ"
10096-100960260 = "คือว่า... ถ้าไม่เป็นการเสียมารยาท\nฉันอยากรบกวนอะไรสักเรื่องน่ะค่ะ"
10096-100960270 = "เรื่องอะไรเหรอ?"
10096-100960280 = "ช่วยมาที่เครื่องเล่น 'เมก้าสไลเดอร์'\nที่อยู่กลางแจ้งหน่อยได้มั้ยคะ?"
10096-100960290 = "ฉันอยากทดสอบเครื่องเล่นก่อนที่จะ\nเปิดให้บริการน่ะค่ะ"
10096-100960300 = "วันนี้สวนน้ำปิดค่ะ"
10096-100960310 = "ระวังอย่าจำวันผิดแล้วมาที่สวนน้ำ\nวันนี้นะคะ"
10096-100960320 = "งั้นวันนี้คันนะก็ได้หยุดเหรอ?"
10096-100960330 = "ไม่ค่ะ"
10096-100960340 = "ในวันหยุดอย่างนี้ พวกไลฟ์การ์ดต้อง\nซ่อมบำรุง ทำความสะอาดเครื่องเล่น\nและส่วนอื่นๆ ค่ะ"
10096-100960350 = "ฉันจะพยายามอย่างเต็มที่เพื่อให้ลูกค้า\nสวนน้ำมาใช้บริการได้อย่างสนุกและ\nปลอดภัยค่ะ"
10096-100960360 = "เป็นวันหยุดที่ไม่ได้หยุดสินะ..."
10096-100960370 = "คันนะตั้งใจทำงานมากไปหรือเปล่า?"
10096-100960380 = "นี่เป็นเรื่องธรรมดาของไลฟ์การ์ดที่รับ\nผิดชอบต่อความปลอดภัยของลูกค้าค่ะ"
10096-100960390 = "และลูกค้าหนึ่งในนั้นก็คือคุณครูด้วย\nนะคะ"

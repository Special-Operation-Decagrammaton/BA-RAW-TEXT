[translation]
20047-200470010 = "คุณครูกำลังพักผ่อนสบายๆ อยู่\nหรือเปล่า?"
20047-200470020 = "อื้อ!"
20047-200470030 = "แอร์ที่สำนักงานเย็นฉ่ำเลยละ!"
20047-200470040 = "......"
20047-200470050 = "กะไว้แล้วว่าต้องเป็นแบบนี้"
20047-200470060 = "ถ้าอยู่ที่สำนักงาน ก็ไม่ได้กำลังพักผ่อน\nน่ะสิ"
20047-200470070 = "แล้วคิเคียวพักผ่อนอยู่หรือเปล่า?"
20047-200470080 = "คิดว่าแผนการของฉันจะมีจุดบกพร่อง\nงั้นเหรอ?"
20047-200470090 = "มะ... หมายความว่ายังไง...?"
20047-200470100 = "ไม่บอกหรอก"
20047-200470110 = "ถ้าอยากรู้ก็... มาดูเองกับตาสิ"
20047-200470120 = "ตอนนี้มีแค่ฉันคนเดียวนะ"
20047-200470130 = "ครูจะไปเดี๋ยวนี้ละ!"
20047-200470140 = "ระหว่างที่คุณครูกลับไป ฉันวางแผน\nพักร้อนจนเสร็จเลย"
20047-200470150 = "ฉันจะส่งให้ดูเดี๋ยวนี้เลย ลองเปิดดูสิ"
20047-200470160 = "ฮุฮุ อยากเห็นแล้วสิ!"
20047-200470170 = "ต้องอย่างนั้นละ"
20047-200470180 = "ก็มันเป็นแผนการที่สมบูรณ์แบบ\nของเรานี่นา"
20047-200470190 = "งั้นเอาไว้เจอกันตามนัดนะ"
20047-200470200 = "อ้อ จริงสิ ฉันแค่พูดไว้เผื่อๆ นะ"
20047-200470210 = "อย่าไปบอกคนอื่นล่ะ"
20047-200470220 = "ห้ามเด็ดขาดเลย"
20047-200470230 = "เข้าใจมั้ย?"
20047-200470240 = "คุณครู จำได้หรือเปล่าว่าพรุ่งนี้วันอะไร?"
20047-200470250 = "อ่า... วันเกิดคิเคียว?"
20047-200470260 = "......"
20047-200470270 = "จริงๆ เลย"
20047-200470280 = "ก็จริงอยู่หรอกที่ฉันเกิดในฤดูร้อน"
20047-200470290 = "แต่เลิกล้อเล่นในเรื่องที่เข้าใจยากได้แล้ว"
20047-200470300 = "แต่ถ้าเป็นคุณครูที่ต้องติดต่อกับ\nนักเรียนหลายคน"
20047-200470310 = "ก็อาจจำผิดได้เป็นเรื่องธรรมดาเนอะ?"
20047-200470320 = "ละ... ล้อเล่นน่า!"
20047-200470330 = "วันที่เราจะไปทะเลกันต่างหาก!"
20047-200470340 = "......"
20047-200470350 = "อะไรเนี่ย"
20047-200470360 = "ก็จำได้ดีไม่ใช่เหรอ?"
20047-200470370 = "สงสัยกำลังตั้งตารออยู่สินะ"
20047-200470380 = "รอที่เราจะได้ไปทะเลด้วยกันอยู่สินะ"
20047-200470390 = "พูดอะไรไม่เห็นเข้าใจเลย"
20047-200470400 = "งั้นเจอกันพรุ่งนี้นะ"
20047-200470410 = "ถ้ามาช้า ฉันโกรธจริงๆ ด้วย"
20047-200470420 = "เอ่อ... วันนี้ฉันสนุกมากเลย"
20047-200470430 = "ไม่คิดเลยว่าการลงน้ำจะสนุกแบบนี้"
20047-200470440 = "นี่เป็นประสบการณ์แรกของฉันเลยละ"
20047-200470450 = "ครูก็สนุกเหมือนกัน!"
20047-200470460 = "ไว้เราไปทะเลกันอีกนะ!"
20047-200470470 = "ไปอีกเหรอ?"
20047-200470480 = "แค่ 2 คนอีกหรือเปล่า...?"
20047-200470490 = "อื้อ! แค่ 2 คน!"
20047-200470500 = "......"
20047-200470510 = "ดีละ เอาตามนั้น"
20047-200470520 = "งั้นว่างตอนไหนก็บอกนะ"
20047-200470530 = "ฉันจะได้หาเวลาว่างให้ตรงกัน"
20047-200470540 = "แล้วก็..."
20047-200470550 = "ครั้งหน้าเราลองทำเรื่องที่ไม่เคยทำ\nกันนะ"
20047-200470560 = "ไว้ฉันจะบอกทีหลังว่ามันคืออะไร"
20047-200470570 = "ตั้งตารอไว้ได้เลย"
20047-200470580 = "ขอถามเผื่อๆ นะ"
20047-200470590 = "รู้ใช่มั้ยว่าพรุ่งนี้วันอะไร?"
20047-200470600 = "วันที่คิเคียวรอคอยมานานแสนนาน!"
20047-200470610 = "......"
20047-200470620 = "พูดอะไรเนี่ย"
20047-200470630 = "คุณดูจะตั้งตารอมากกว่าฉันอีกนะ"
20047-200470640 = "ครั้งนี้เราไม่ได้ไปชายหาดเดิมนะ"
20047-200470650 = "อย่าสับสนล่ะ"
20047-200470660 = "ฮุฮุ..."
20047-200470670 = "สิ่งที่ทำวันนี้ทำให้หายเหนื่อยบ้างมั้ย?"
20047-200470680 = "กล้ามเนื้อหายปวดเป็นปลิดทิ้งเลย!"
20047-200470690 = "ลืมไปเลยว่าเคยเหนื่อย!"
20047-200470700 = "พอได้อบทรายร้อนแล้ว ฉันก็สดชื่น\nเหมือนกัน"
20047-200470710 = "คุณครู..."
20047-200470720 = "ฉันมีอย่างอื่นที่อยากทำที่ทะเลน่ะ..."
20047-200470730 = "พอจะมีเวลามั้ย?"
20047-200470740 = "มาชวนครูได้ตลอดเลย!"
20047-200470750 = "ฮุฮุ ได้เลย"
20047-200470760 = "ไว้ฉันจะติดต่อไปใหม่นะ"
20047-200470770 = "อืม"
20047-200470780 = "ตั้งตารอได้เลย"
20047-200470790 = "เรื่องวันพรุ่งนี้น่ะ"
20047-200470800 = "พอดีฉันมีเรื่องต้องทำนิดหน่อย"
20047-200470810 = "ฉันเลยว่าจะไปถึงก่อน"
20047-200470820 = "ครูก็มาตามนัดด้วยล่ะ"
20047-200470830 = "ให้ครูช่วยอะไรมั้ย?"
20047-200470840 = "ขอบคุณที่ใส่ใจกันนะ"
20047-200470850 = "แต่ไม่เป็นไรหรอก"
20047-200470860 = "คุณครูค่อยๆ มาให้ตรงเวลานัดก็พอ"
20047-200470870 = "ถ้ามาสาย ฉันไม่ยกโทษให้นะ..."
20047-200470880 = "คุณครู"
20047-200470890 = "ถึงแล้วใช่มั้ย?"
20047-200470900 = "คือ... เรื่องที่เกิดในวันนี้"
20047-200470910 = "อย่าไปบอกคนอื่นล่ะ"
20047-200470920 = "เป็นความลับแค่สองเราสินะ!"
20047-200470930 = "หืม?"
20047-200470940 = "ก็... คงงั้น"
20047-200470950 = "แต่จะว่าไป คิเคียว"
20047-200470960 = "หืม?"
20047-200470970 = "ทำไมเหรอ?"
20047-200470980 = "ครูจะส่งวิดีโอแมวนอนเปลให้ดูนะ"
20047-200470990 = "ทำไมเหรอ?"
20047-200471000 = "ไม่เห็นอยากดูเลย..."
20047-200471010 = "เฮ้อ... ส่งมาก็ได้ ไว้เจอกันอีกนะ"

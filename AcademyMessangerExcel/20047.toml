[translation]
20047-200470010 = "선생님은 휴식을 제대로 취하고 있어?"
20047-200470020 = "물론이지!"
20047-200470030 = "사무실 에어컨 최고!"
20047-200470040 = "…………"
20047-200470050 = "역시 그럴 줄 알았어."
20047-200470060 = "사무실에 있다면 쉬는 게 아니잖아."
20047-200470070 = "그러는 키쿄는 잘 쉬고 있어?"
20047-200470080 = "내 계획에 빈틈이 있을 거라고 생각해?"
20047-200470090 = "도, 도대체 무슨……?"
20047-200470100 = "안 알려줘."
20047-200470110 = "궁금하면…… 직접 와보던가."
20047-200470120 = "지금은 나 말고 아무도 없으니까."
20047-200470130 = "당장 가겠습니다!"
20047-200470140 = "선생님이 돌아간 사이에 휴가 일정을 완성했어."
20047-200470150 = "바로 보내줄 테니까 확인해 봐."
20047-200470160 = "후후, 기대된다!"
20047-200470170 = "당연하지."
20047-200470180 = "나와 당신이 세운 완벽한 계획이니까."
20047-200470190 = "그럼 약속일에 보자."
20047-200470200 = "아, 참. 혹시나 해서 하는 말인데."
20047-200470210 = "다른 아이들에겐 말하지 마."
20047-200470220 = "절대로."
20047-200470230 = "알겠지?"
20047-200470240 = "선생님. 내일이 무슨 날인지 기억해?"
20047-200470250 = "어…… 키쿄의 생일?"
20047-200470260 = "…………"
20047-200470270 = "확실히"
20047-200470280 = "내 생일은 여름이지만"
20047-200470290 = "이해하기 어려운 농담은 그만해줘."
20047-200470300 = "뭐, 많은 학생과 교류하는 선생님이라면"
20047-200470310 = "착각할 수도 있겠지만?"
20047-200470320 = "노, 농담이야!"
20047-200470330 = "바다에 가기로 한 날이잖아!"
20047-200470340 = "…………"
20047-200470350 = "뭐야."
20047-200470360 = "제대로 기억하고 있었네."
20047-200470370 = "정말 기대하고 있었나 보네."
20047-200470380 = "같이 바다에 가는 거."
20047-200470390 = "무슨 말인지 잘 모르겠네."
20047-200470400 = "그럼 내일 보자."
20047-200470410 = "늦으면 정말로 화낼 테니까."
20047-200470420 = "그…… 오늘 즐거웠어."
20047-200470430 = "물에 들어가는 게 즐거울 줄이야."
20047-200470440 = "이런 경험은 또 처음이네."
20047-200470450 = "나도 즐거웠어!"
20047-200470460 = "다음에 또 바다에 가자!"
20047-200470470 = "또 가자고?"
20047-200470480 = "……이번에도 단둘이?"
20047-200470490 = "응! 단둘이!"
20047-200470500 = "…………"
20047-200470510 = "좋아. 알겠어."
20047-200470520 = "그럼 비는 일정을 말해줘."
20047-200470530 = "나도 거기에 시간을 맞춰볼 테니까."
20047-200470540 = "그리고……."
20047-200470550 = "다음엔 오늘 못했던 걸 해보자."
20047-200470560 = "그게 뭔지는 나중에 알려줄게."
20047-200470570 = "기대해도 좋아."
20047-200470580 = "혹시 모르니까"
20047-200470590 = "내일이 무슨 날인지 알고 있지?"
20047-200470600 = "키쿄가 기대하고 기대하던 날!"
20047-200470610 = "…………"
20047-200470620 = "무슨 소리야."
20047-200470630 = "기대는 당신이 더 하고 있었겠지."
20047-200470640 = "저번과는 다른 해안이니까."
20047-200470650 = "착각하면 안 돼."
20047-200470660 = "후후……."
20047-200470670 = "오늘 일로 피로가 풀렸을까?"
20047-200470680 = "근육통이 싹 나았어!"
20047-200470690 = "피로가 싹 사라졌어!"
20047-200470700 = "나도 모래찜질 덕분에 상쾌한 기분이야."
20047-200470710 = "……선생님"
20047-200470720 = "바다에서 하고 싶은 거, 또 있는데……"
20047-200470730 = "시간 괜찮겠지?"
20047-200470740 = "언제든 불러만 줘!"
20047-200470750 = "후후, 그래."
20047-200470760 = "그럼 다음에 또 연락할게."
20047-200470770 = "음"
20047-200470780 = "기대하고 있을 테니까."
20047-200470790 = "내일 말인데."
20047-200470800 = "좀 할 일이 있어서"
20047-200470810 = "나는 먼저 가 있을 테니까."
20047-200470820 = "약속 장소에서 만나."
20047-200470830 = "뭐라도 도와줄까?"
20047-200470840 = "신경 써줘서 고마워."
20047-200470850 = "그래도, 괜찮아."
20047-200470860 = "선생님은 천천히 시간에 맞춰서 와주면 되니까."
20047-200470870 = "……지각하면 용서 안 해."
20047-200470880 = "선생님."
20047-200470890 = "잘 들어갔지?"
20047-200470900 = "그…… 오늘 있었던 일들"
20047-200470910 = "모두에겐 비밀이니까."
20047-200470920 = "둘만의 비밀이네!"
20047-200470930 = "엇"
20047-200470940 = "뭐, 응."
20047-200470950 = "그나저나 키쿄."
20047-200470960 = "응?"
20047-200470970 = "왜?"
20047-200470980 = "그물침대에서 노는 고양이 동영상을 보내줄게."
20047-200470990 = "왜?"
20047-200471000 = "딱히 관심 없는데……"
20047-200471010 = "하아…… 뭐 좋아. 또 봐."

[translation]
20047-200470010 = "老師有好好休息嗎？"
20047-200470020 = "當然有囉！"
20047-200470030 = "辦公室的冷氣最棒了！"
20047-200470040 = "…………"
20047-200470050 = "我就知道"
20047-200470060 = "待在辦公室可不算休息哦"
20047-200470070 = "那桔梗呢？有好好休息嗎？"
20047-200470080 = "你覺得我的計畫會有破綻嗎？"
20047-200470090 = "什，什麼意思……？"
20047-200470100 = "不告訴你"
20047-200470110 = "想知道的話……就親自過來吧"
20047-200470120 = "現在只有我一個人在"
20047-200470130 = "我馬上過去！"
20047-200470140 = "老師回去的時候，我已經把假期的行程完成了"
20047-200470150 = "馬上就傳給你，快確認一下吧"
20047-200470160 = "呵呵，真期待！"
20047-200470170 = "那是當然的"
20047-200470180 = "這可是我和你一起擬定的完美計畫"
20047-200470190 = "那就約好的那天見囉"
20047-200470200 = "啊，對了。以防萬一還是說一下"
20047-200470210 = "不能告訴其他孩子哦"
20047-200470220 = "絕對不行"
20047-200470230 = "知道了嗎？"
20047-200470240 = "老師，記得明天是什麼日子嗎？"
20047-200470250 = "是……桔梗的生日？"
20047-200470260 = "…………"
20047-200470270 = "確實"
20047-200470280 = "我的生日是在夏天沒錯"
20047-200470290 = "但請別再開這種讓人摸不著頭緒的玩笑了"
20047-200470300 = "不過老師畢竟得跟很多學生互動"
20047-200470310 = "就算搞錯也不是不可能？"
20047-200470320 = "開，開玩笑的啦！"
20047-200470330 = "明天是我們約好要去海邊的日子！"
20047-200470340 = "…………"
20047-200470350 = "什麼嘛"
20047-200470360 = "原來有好好記著啊"
20047-200470370 = "看來你是真的很期待"
20047-200470380 = "要一起去海邊呢"
20047-200470390 = "我不太懂你的意思"
20047-200470400 = "那明天見囉"
20047-200470410 = "要是遲到的話，我可是會生氣的"
20047-200470420 = "那個……今天很開心"
20047-200470430 = "沒想到下水會這麼有趣"
20047-200470440 = "這種體驗還是第一次呢"
20047-200470450 = "我也很開心！"
20047-200470460 = "下次再一起去海邊吧！"
20047-200470470 = "還要再去？"
20047-200470480 = "……也是只有我們兩個嗎？"
20047-200470490 = "嗯！就我們兩個！"
20047-200470500 = "…………"
20047-200470510 = "好吧，我知道了"
20047-200470520 = "那就告訴我你有空的時間吧"
20047-200470530 = "我也會盡量配合"
20047-200470540 = "還有……"
20047-200470550 = "下次我打算做今天沒做到的事"
20047-200470560 = "至於是什麼事，之後再告訴你"
20047-200470570 = "好好期待吧"
20047-200470580 = "以防萬一"
20047-200470590 = "你知道明天是什麼日子吧？"
20047-200470600 = "桔梗期待已久的日子！"
20047-200470610 = "…………"
20047-200470620 = "你在說什麼啊"
20047-200470630 = "期待的是你才對吧"
20047-200470640 = "這次是和上次不同的海岸"
20047-200470650 = "別搞錯了哦"
20047-200470660 = "呵呵……"
20047-200470670 = "今天的活動有讓你消除疲勞嗎？"
20047-200470680 = "肌肉痠痛完全消失了！"
20047-200470690 = "疲勞感也全沒了！"
20047-200470700 = "我也因為沙浴，覺得神清氣爽"
20047-200470710 = "……老師"
20047-200470720 = "我在海邊還有想做的事……"
20047-200470730 = "時間應該沒問題吧？"
20047-200470740 = "隨時都可以叫我！"
20047-200470750 = "呵呵，那就好"
20047-200470760 = "我之後會再聯絡你的"
20047-200470770 = "嗯"
20047-200470780 = "我很期待"
20047-200470790 = "關於明天"
20047-200470800 = "我有點事要先去處理"
20047-200470810 = "所以會先過去"
20047-200470820 = "在約定的地點見吧"
20047-200470830 = "要不要幫忙？"
20047-200470840 = "謝謝你的關心"
20047-200470850 = "不過沒關係"
20047-200470860 = "老師只要準時到就行了"
20047-200470870 = "……要是遲到，我可不會原諒你"
20047-200470880 = "老師"
20047-200470890 = "有順利回去吧？"
20047-200470900 = "那個……今天發生的事"
20047-200470910 = "要對所有人保密哦"
20047-200470920 = "是我們的小祕密！"
20047-200470930 = "呃"
20047-200470940 = "嗯，也是啦"
20047-200470950 = "話說回來，桔梗"
20047-200470960 = "嗯？"
20047-200470970 = "怎麼了？"
20047-200470980 = "我傳一個貓咪在吊床上玩的影片給你"
20047-200470990 = "為什麼？"
20047-200471000 = "我對那種東西沒興趣……"
20047-200471010 = "唉……好吧。再見"

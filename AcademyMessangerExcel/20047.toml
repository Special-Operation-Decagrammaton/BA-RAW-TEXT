[translation]
20047-200470010 = "Have you been getting proper rest, Sensei?"
20047-200470020 = "Of course!"
20047-200470030 = "I love the office AC!"
20047-200470040 = "..."
20047-200470050 = "As I suspected."
20047-200470060 = "You cannot achieve proper rest in an office."
20047-200470070 = "Well, what about you, Kikyou? Have you been resting?"
20047-200470080 = "Are you accusing me of formulating a flawed operation?"
20047-200470090 = "What does that even...?"
20047-200470100 = "I won't tell you."
20047-200470110 = "If you'd like to know... You can come see with your own eyes."
20047-200470120 = "It is only I at the clubroom at the moment."
20047-200470130 = "I'm on my way!"
20047-200470140 = "I completed the vacation plan after you departed."
20047-200470150 = "I will send it your way. Please review it."
20047-200470160 = "Fufu, I'm looking forward to it!"
20047-200470170 = "Naturally."
20047-200470180 = "It is the perfect plan we concocted together."
20047-200470190 = "Until next time."
20047-200470200 = "Ah. I would just like to say."
20047-200470210 = "Do not ever speak of this to the others."
20047-200470220 = "Never."
20047-200470230 = "Understood?"
20047-200470240 = "Sensei. Do you recall what tomorrow is?"
20047-200470250 = "Uh... Kikyou's birthday?"
20047-200470260 = "..."
20047-200470270 = "Well"
20047-200470280 = "my birthday does take place during the summer."
20047-200470290 = "However, I must request that you abandon these befuddling jokes."
20047-200470300 = "Or perhaps you were confused"
20047-200470310 = "since you speak with such a large number of students?"
20047-200470320 = "I was kidding! Just kidding! I do know!"
20047-200470330 = "We're going to the beach!"
20047-200470340 = "..."
20047-200470350 = "Huh."
20047-200470360 = "So you did remember."
20047-200470370 = "I guess you really were looking forward to today!"
20047-200470380 = "Are you excited we're going to the beach?"
20047-200470390 = "I won't deign to that nonsense with a response."
20047-200470400 = "Then, we shall meet tomorrow."
20047-200470410 = "I'll be quite infuriated if you dare be late."
20047-200470420 = "Um... I enjoyed myself today."
20047-200470430 = "I did not expect going into the water to be...fun."
20047-200470440 = "It was a new experience for me."
20047-200470450 = "I had fun too!"
20047-200470460 = "Let's go again sometime!"
20047-200470470 = "Again?"
20047-200470480 = "...Just the two of us, again?"
20047-200470490 = "Yep! Just the two of us!"
20047-200470500 = "..."
20047-200470510 = "Understood."
20047-200470520 = "Reach out with your availability."
20047-200470530 = "I will match my schedule to yours."
20047-200470540 = "And..."
20047-200470550 = "We will attempt something different next time as well."
20047-200470560 = "You'll find out then."
20047-200470570 = "Simply...look forward to it for now."
20047-200470580 = "Surely I don't even need to check..."
20047-200470590 = "You know what day tomorrow is, right?"
20047-200470600 = "The day you've been looking forward to!"
20047-200470610 = "..."
20047-200470620 = "What are you saying?"
20047-200470630 = "Clearly, you are the one filled with anticipation."
20047-200470640 = "The location is at a different beach."
20047-200470650 = "Don't get lost."
20047-200470660 = "Fufu..."
20047-200470670 = "Do you feel relaxed after today?"
20047-200470680 = "My body doesn't ache anymore!"
20047-200470690 = "My fatigue is gone!"
20047-200470700 = "Yes. I enjoyed the sand bath as well."
20047-200470710 = "...Sensei."
20047-200470720 = "I have another thing I wish to do at the beach."
20047-200470730 = "You have the availability, yes?"
20047-200470740 = "Anytime!"
20047-200470750 = "Fufu, okay."
20047-200470760 = "I shall reach out."
20047-200470770 = "Mm"
20047-200470780 = "Our next meeting... I'll look forward to it."
20047-200470790 = "About tomorrow."
20047-200470800 = "I have some things to attend to,"
20047-200470810 = "so I will be in the area early."
20047-200470820 = "Come to our meeting spot."
20047-200470830 = "Can I help you with your errands?"
20047-200470840 = "I appreciate the sentiment."
20047-200470850 = "But I will be fine."
20047-200470860 = "You may come at your leisure."
20047-200470870 = "...However, I won't forgive you if you're late."
20047-200470880 = "Sensei."
20047-200470890 = "Did you return safely?"
20047-200470900 = "Regarding today's events..."
20047-200470910 = "They should remain between you and me, understood?"
20047-200470920 = "So it's our special secret!"
20047-200470930 = "Ah"
20047-200470940 = "I suppose"
20047-200470950 = "By the way, Kikyou!"
20047-200470960 = "Hm?"
20047-200470970 = "What is it?"
20047-200470980 = "I'll send you a video of cat playing in a hammock!"
20047-200470990 = "What?"
20047-200471000 = "I have no particular need of..."
20047-200471010 = "Ugh. Fine. I'll speak with you later."

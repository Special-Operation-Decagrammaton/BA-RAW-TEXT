[translation]
10025-100250010 = "Sensei, I think the side effect of that medicine I took is showing again..."
10025-100250020 = "The age regression lowered my line of sight."
10025-100250030 = "My entire body feels light and awkward."
10025-100250040 = "Are you okay? I think you should take a rest inside."
10025-100250050 = "I'm fine. I'm going to visit my favorite dessert spot."
10025-100250060 = "There was something I wanted to try when I became a kid!"
10025-100250070 = "That feels so backwards to read."
10025-100250080 = "I didn't think I'd have the palate of a child being this small too."
10025-100250090 = "How am I supposed to lecture the Plum Blossom students about their diets like this?"
10025-100250100 = "I suppose I should keep eating grownup food until I return to my normal body."
10025-100250110 = "I should probably start with the rum that goes into rum raisin..."
10025-100250120 = "You can't do that!"
10025-100250130 = "Are you busy, Sensei?"
10025-100250140 = "What's going on?"
10025-100250150 = "I was organizing some stuff at Plum Blossom Garden and a small incident happened..."
10025-100250160 = "And I can't move right now."
10025-100250170 = "I'm on my way to Plum Blossom."
10025-100250180 = "Have you heard, Sensei?"
10025-100250190 = "They're going to open a huge indoor playground in the middle of Kivotos."
10025-100250200 = "The Plum Blossom students wanted the next field trip to be there, so I wanted to do some security scoping first."
10025-100250210 = "Would you mind coming with me to the playground this weekend?"
10025-100250220 = "Sure. My schedule was open anyway."
10025-100250230 = "Will you be okay at your size?"
10025-100250240 = "I should be fine."
10025-100250250 = "Actually, this might make things easier."
10025-100250260 = "I'll get to visit a playground from the perspective of a child!"
10025-100250270 = "Sensei, you were cleaning something in front of Plum Blossom before..."
10025-100250280 = "Was there something strange?"
10025-100250290 = "Someone made a tent-looking thing with an old sheet and chairs."
10025-100250300 = "It sounds like some of the younger students made a secret base again."
10025-100250310 = "Secret base?"
10025-100250320 = "Yes. Every child wants a place of their own."
10025-100250330 = "They occasionally make small structures just out of plain sight."
10025-100250340 = "Did you make something like that when you were young?"
10025-100250350 = "Of course. I had an amazing secret base of my own."
10025-100250360 = "Heehee. Speaking of which, it's been a while since I've been there."
10025-100250370 = "Sensei, if you have time this afternoon, visit the playground near Plum Blossom."
10025-100250380 = "I'll tell you my secret I've never told anyone. ♥"
10025-100250390 = "The biggest difference between when I was younger and now"
10025-100250400 = "seems to be my hairstyle."
10025-100250410 = "What makes you think that?"
10025-100250420 = "I feel like I could wear any hairstyle I wanted as a child."
10025-100250430 = "But as I got older, my options became more limited."
10025-100250440 = "I think you look good with any hairstyle, Shun."
10025-100250450 = "Heeheehee. That's nice of you to say, Sensei."

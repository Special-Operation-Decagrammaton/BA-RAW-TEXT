[translation]
10025-100250010 = "老師，是這樣的，好像又出現副作用了……"
10025-100250020 = "這副模樣不只視線低"
10025-100250030 = "手腳也好輕，總有種奇怪的感覺"
10025-100250040 = "在解毒劑生效之前，最好不要外出吧"
10025-100250050 = "……不行，不能錯過這個機會。老師，我們去吃甜點吧！"
10025-100250060 = "既然變成小孩，我有個務必想吃吃看的東西！"
10025-100250070 = "……？"
10025-100250080 = "沒想到身體變小的同時，味覺也變了……"
10025-100250090 = "現在這樣子，實在沒資格要求梅花園的孩子們「不能挑食」呢"
10025-100250100 = "我也要慢慢嘗試各種食物，克服討厭的東西"
10025-100250110 = "按照順序，首先從蘭姆葡萄乾的蘭姆酒開始……"
10025-100250120 = "那可不行！"
10025-100250130 = "……老師。你現在忙嗎？"
10025-100250140 = "怎麼了？"
10025-100250150 = "那個，我在梅花園整理各種雜物的時候，算是出了點小意外……"
10025-100250160 = "現在有些動彈不得……"
10025-100250170 = "等等，我馬上過去"
10025-100250180 = "老師，聽說了嗎？"
10025-100250190 = "奇普托斯的中央區有間名為「Playland」的大型室內遊樂場開幕了"
10025-100250200 = "梅花園的孩子們都說想去，所以我想事先確認一下設施的安全性"
10025-100250210 = "如果可以的話，這個週末能陪我一起嗎？"
10025-100250220 = "可以呀，很高興你邀請我"
10025-100250230 = "啊，但是，旬現在的身體可以外出嗎？"
10025-100250240 = "是的，沒問題！"
10025-100250250 = "不，倒不如說現在是最合適的時機"
10025-100250260 = "因為很少有機會能用孩子們的角度確認！"
10025-100250270 = "老師。你剛才是不是在梅花園前面收拾什麼東西……？"
10025-100250280 = "有什麼奇怪的東西嗎？"
10025-100250290 = "有個用布和椅子搭起來，類似帳篷的東西。覺得有些危險，就稍微挪到旁邊了"
10025-100250300 = "啊啊，一定是祕密基地吧"
10025-100250310 = "祕密基地？"
10025-100250320 = "是的。小孩子不是都會想要有屬於自己的空間嗎？"
10025-100250330 = "所以偶爾會趁我們不注意，做出那樣的祕密空間"
10025-100250340 = "原來如此啊。旬小時候也做過嗎？"
10025-100250350 = "有喔，也正好差不多這個年紀"
10025-100250360 = "這麼說來，最後一次去那個祕密基地已經是很久以前的事了……"
10025-100250370 = "老師。如果有時間的話，可以現在來梅花園嗎？"
10025-100250380 = "……如果你想知道我的祕密的話♡"
10025-100250390 = "小時候的自己和現在最大的不同之一"
10025-100250400 = "我覺得是髮型"
10025-100250410 = "為什麼會這麼想？"
10025-100250420 = "小時候沒有拘束，什麼樣的髮型都可以"
10025-100250430 = "長大後……就會有很多不適合的東西"
10025-100250440 = "我覺得什麼髮型都很適合旬"
10025-100250450 = "嘿嘿。聽您這麼說我就很高興了。非常感謝，老師"

[translation]
10025-100250010 = "선생님, 전에 먹은 약의 부작용이 다시 생겨버린 것 같아요……."
10025-100250020 = "또다시 몸이 어려지니 시선도 낮고,"
10025-100250030 = "팔다리도 가벼운 게 어쩐지 어색한 느낌이네요."
10025-100250040 = "괜찮아? 일단 오늘은 실내에서 쉬는 게 좋겠어."
10025-100250050 = "……아니요. 이참에 평소에 가끔 가던 디저트 가게에 다녀와야겠어요."
10025-100250060 = "어린아이가 되었을 때, 꼭 먹어보고 싶은 음식이 있었거든요!"
10025-100250070 = "어린아이가 되었을 때 먹어보고 싶은 음식……?"
10025-100250080 = "몸이 어려졌다고는 하지만, 설마 입맛까지 어려졌으리라고는 생각지도 못했네요."
10025-100250090 = "이래서는 매화원의 아이들에게 올바른 식사 지도를 하기 어렵겠어요."
10025-100250100 = "원래의 몸으로 되돌아갈 때까지 어른의 음식을 부지런히 먹어 입맛을 길들여놔야겠네요."
10025-100250110 = "우선은 럼 레이즌에 들어가는 럼부터……."
10025-100250120 = "그건 안 돼!"
10025-100250130 = "……선생님, 혹시 지금 바쁘신가요?"
10025-100250140 = "무슨 일이야?"
10025-100250150 = "그게, 매화원에서 물건 정리를 하다가 가벼운 사고가 나서……."
10025-100250160 = "옴짝달싹할 수 없게 되어버렸어요……."
10025-100250170 = "지금 매화원으로 바로 갈게."
10025-100250180 = "선생님, 그 이야기 들으셨나요?"
10025-100250190 = "이번에 키보토스 중앙구에 커다란 실내 놀이터가 새로 개장한대요."
10025-100250200 = "매화원의 원생들이 다음 견학은 그곳으로 가자고 졸라대서, 견학 전에 미리 안전 점검을 다녀오려고요."
10025-100250210 = "괜찮으시다면 이번 주말에 그 실내 놀이터에 가보지 않으시겠어요?"
10025-100250220 = "응, 괜찮아. 한가하던 참이었거든."
10025-100250230 = "그나저나 어려진 몸으로 가도 괜찮겠어?"
10025-100250240 = "괜찮아요."
10025-100250250 = "……아니, 오히려 이번만큼은 어려져서 다행이라고 생각해요."
10025-100250260 = "어린아이의 시선으로 놀이터를 돌아볼 기회는 흔치 않으니까요!"
10025-100250270 = "선생님, 아까 보니 매화원 앞에서 무언가를 열심히 치우고 계시던데……."
10025-100250280 = "뭔가 이상한 물건이라도 있었나요?"
10025-100250290 = "누가 분리수거장 뒤에 낡은 천과 의자로 텐트 같은 걸 만들어놨어."
10025-100250300 = "하하…… 어린 원생들이 또 비밀기지를 만들었나 보네요."
10025-100250310 = "비밀기지?"
10025-100250320 = "네, 어린아이들은 자신만의 공간을 갖고 싶어 하는 법이잖아요?"
10025-100250330 = "그래서인지 가끔 교관들의 눈을 피해 작은 구조물을 만들곤 하더라고요."
10025-100250340 = "슌도 어릴 적에는 저런 비밀기지를 만든 적 있어?"
10025-100250350 = "네. 저도 어릴 적에는 멋진 비밀기지를 하나 갖고 있었지요."
10025-100250360 = "후후…… 그러고 보니 그 비밀기지에도 가본 지 꽤 오래되었네요."
10025-100250370 = "선생님, 오후에 시간 나시면 매화원 근처의 놀이터에 들려주세요."
10025-100250380 = "……아무에게도 말한 적 없는 제 비밀을 알려 드릴게요. ♥"
10025-100250390 = "어릴 때와 자랐을 때 큰 차이점 중 하나는"
10025-100250400 = "머리 모양인 것 같아요."
10025-100250410 = "왜 그렇게 생각했어?"
10025-100250420 = "어릴 때에는 마음대로 머리 모양을 잡아도 문제가 없지만."
10025-100250430 = "자랐을 때는…… 어울리지 않는 머리 모양이 많아지거든요."
10025-100250440 = "슌은 무슨 머리 모양을 해도 어울린다고 생각해."
10025-100250450 = "에헤헤. 말씀만이라도 감사해요. 선생님."

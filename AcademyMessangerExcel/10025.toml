[translation]
10025-100250010 = "คุณครู ดูเหมือนยาที่กินเข้าไปคราวก่อน\nจะมีผลข้างเคียงอีกแล้วค่ะ..."
10025-100250020 = "พอตัวเล็กลงอีกครั้งแบบนี้ การมองเห็น\nก็แคบลง"
10025-100250030 = "แถมรู้สึกแปลกๆ ที่แขนกับขารู้สึกเบาๆ ด้วยค่ะ"
10025-100250040 = "เป็นอะไรรึเปล่า? วันนี้พักอยู่ในห้อง\nก่อนดีกว่านะ"
10025-100250050 = "...ฉันสบายดีค่ะ ฉันคงต้องออกไปที่\nร้านของหวานที่เคยแวะไปก่อนนะคะ"
10025-100250060 = "พอกลับมาเป็นเด็กแบบนี้ ก็มีขนมหวาน\nที่ฉันอยากลองชิมให้ได้อยู่ค่ะ!"
10025-100250070 = "ขนมหวานที่อยากกินในตอนที่\nกลับไปเป็นเด็ก...?"
10025-100250080 = "ถึงร่างกายฉันจะเด็กลง แต่ไม่คิดมา\nก่อนว่ารสชาติหรือของที่ชอบจะกลับ\nไปเป็นเหมือนตอนเด็กเลยค่ะ"
10025-100250090 = "ถ้าเป็นแบบนี้ฉันคงเตรียมอาหารที่ถูก\nสุขลักษณะให้เด็กๆ ที่สวนต้นบ๊วยไม่ได้\nแน่เลยค่ะ"
10025-100250100 = "จนกว่าร่างกายจะกลับเป็นปกติ คงจะ\nต้องกินอาหารให้เหมือนผู้ใหญ่เพื่อลด\nความอยากอาหารลงแล้วละค่ะ"
10025-100250110 = "ถ้างั้นก็เริ่มจากรัมเรซิ่นก่อน..."
10025-100250120 = "อันนั้นไม่ได้นะ!"
10025-100250130 = "คุณครู... ตอนนี้ยุ่งอยู่หรือเปล่าคะ?"
10025-100250140 = "มีอะไรเหรอ?"
10025-100250150 = "คือว่าฉันกำลังจัดของในสวนต้นบ๊วยอยู่ แล้วเกิดอุบัติเหตุนิดหน่อย..."
10025-100250160 = "ตอนนี้เลยขยับตัวไม่ได้เลยค่ะ..."
10025-100250170 = "ครูจะไปที่สวนต้นบ๊วยเดี๋ยวนี้แหละ"
10025-100250180 = "คุณครูได้ยินข่าวเรื่องนั้นมั้ยคะ?"
10025-100250190 = "เรื่องที่มีสนามเด็กเล่นในอาคารขนาด\nใหญ่เปิดใหม่ที่เขตกลางของคิโวทอส\nน่ะค่ะ"
10025-100250200 = "เด็กๆ ที่สวนต้นบ๊วยมาอ้อนขอให้พาไป\nทัศนศึกษาที่นั่นค่ะ ฉันเลยคิดว่าจะไป\nสำรวจเรื่องความปลอดภัยเอาไว้ก่อน"
10025-100250210 = "ถ้าคุณครูสะดวก วันหยุดนี้ไปที่สนาม\nเด็กเล่นนั่นกับฉันหน่อยได้มั้ยคะ?"
10025-100250220 = "อื้อ ได้อยู่แล้ว ครูว่างพอดีน่ะ"
10025-100250230 = "แต่ว่าไปทั้งๆ ที่ยังเป็นเด็กอยู่แบบนี้\nจะไม่เป็นไรเหรอ?"
10025-100250240 = "ไม่เป็นไรหรอกค่ะ"
10025-100250250 = "ไม่สิ... ต้องบอกว่าโชคดีที่ร่างกายฉัน\nกลับมาเป็นเด็กในตอนนี้พอดีค่ะ"
10025-100250260 = "เพราะไม่บ่อยหรอกนะคะที่จะได้ไปสำรวจ\nสนามเด็กเล่นในมุมมองของเด็กๆ น่ะค่ะ!"
10025-100250270 = "คุณครูคะ เมื่อกี้นี้ฉันเห็นว่าคุณครูทำ\nความสะอาดอยู่ที่ด้านหน้าสวนต้นบ๊วย..."
10025-100250280 = "มีอะไรผิดปกติหรือเปล่าคะ?"
10025-100250290 = "มีใครบางคนใช้เสื้อกับเก้าอี้เก่าๆ มา\nทำเป็นเต้นท์เอาไว้ที่ด้านหลังที่ทิ้งขยะน่ะ"
10025-100250300 = "ฮ่าฮ่า... สงสัยพวกเด็กๆ จะสร้างฐานลับ\nกันอีกแล้วละค่ะ"
10025-100250310 = "ฐานลับงั้นเหรอ?"
10025-100250320 = "ค่ะ พวกเด็กๆ เองก็คงอยากมีพื้นที่\nเฉพาะของตัวเองใช่มั้ยล่ะคะ?"
10025-100250330 = "เพราะงั้นบางครั้งเลยชอบไปสร้างฐานเล็กๆ เอาไว้โดยไม่ให้ผู้ฝึกสอนเห็นค่ะ"
10025-100250340 = "ตอนเด็กๆ ชุนเคยสร้างฐานลับ\nแบบนั้นด้วยเหรอ?"
10025-100250350 = "ค่ะ ตอนฉันเด็กๆ ฉันก็เคยสร้างสุดยอด\nฐานลับไว้ด้วยนะคะ"
10025-100250360 = "ฮุฮุ... พอนึกดูแล้วฉันก็ไม่ได้ไปที่\nฐานลับนั่นมานานมากแล้วค่ะ"
10025-100250370 = "คุณครูคะ ถ้าช่วงบ่ายมีเวลาว่าง ช่วยแวะ\nมาที่สนามเด็กเล่นใกล้ๆ สวนต้นบ๊วย\nหน่อยนะคะ"
10025-100250380 = "ฉันจะบอกความลับที่ไม่เคยบอกให้ใคร\nรู้มาก่อนให้คุณครูฟังค่ะ ♥"
10025-100250390 = "ข้อแตกต่างใหญ่ๆ ของการเป็นเด็กกับ\nตอนโตแล้ว"
10025-100250400 = "ฉันคิดว่าเป็นทรงผมค่ะ"
10025-100250410 = "ทำไมคิดแบบนั้นล่ะ?"
10025-100250420 = "ตอนเด็กๆ จะทำผมทรงไหนก็ได้"
10025-100250430 = "แต่พอโตขึ้นมา... ก็มีทรงผมหลายๆ\nทรงที่ไม่เหมาะค่ะ"
10025-100250440 = "ครูคิดว่าชุนทำผมทรงไหนก็น่ารัก\nหมดแหละ"
10025-100250450 = "แหะๆ ขอบคุณที่ให้กำลังใจค่ะ คุณครู"

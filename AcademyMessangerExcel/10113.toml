[translation]
10113-101130010 = "老師，我是急救醫學部的氷室瀬奈"
10113-101130020 = "報告老師，我今天休假"
10113-101130030 = "因為最近很少見到老師讓我很寂寞，希望可以跟老師約個時間見面"
10113-101130040 = "等等，先讓我理解一下"
10113-101130050 = "唔嗯……我明白了！就這麼決定吧！"
10113-101130060 = "老師，我是急救醫學部的氷室瀬奈"
10113-101130070 = "報告老師，又到了我的休假日"
10113-101130080 = "今天也要待命嗎？"
10113-101130090 = "不，今天有其他事要做"
10113-101130100 = "所以才會穿著便服到急救醫學部的部室"
10113-101130110 = "休假日……穿便服……去部室？"
10113-101130120 = "我也要去！"
10113-101130130 = "嗯？"
10113-101130140 = "我想應該不會有什麼特別的……"
10113-101130150 = "總之我要去！"
10113-101130160 = "嗯"
10113-101130170 = "我明白了"
10113-101130180 = "那就照老師說的做吧"
10113-101130190 = "老師，我是急救醫學部的氷室瀬奈"
10113-101130200 = "雖然感覺最近好像總是跟老師說一樣的話，不過……"
10113-101130210 = "是瀬奈的休假日！"
10113-101130220 = "嗯"
10113-101130230 = "果然什麼事都瞞不過老師呢"
10113-101130240 = "今天要待命嗎？還是整理藥品？"
10113-101130250 = "我正打算跟你說這方面的事"
10113-101130260 = "因為發生了極為例外的情況"
10113-101130270 = "我難得浮現了出乎意料的想法"
10113-101130280 = "是什麼樣的……想法？"
10113-101130290 = "我想去看海"
10113-101130300 = "！！！"
10113-101130310 = "知道了！交給我吧！！！"

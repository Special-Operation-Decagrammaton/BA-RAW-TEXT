[translation]
10113-101130010 = "คุณครู ฉันฮิมูโระ เซนะจากชมรม\nหน่วยแพทย์ฉุกเฉินค่ะ"
10113-101130020 = "วันนี้ฉันเวรออฟ ก็เลยมาแจ้งให้ทราบ\nน่ะค่ะ"
10113-101130030 = "ช่วงนี้ฉันเหงาเพราะไม่ได้เจอคุณครู\nบ่อยๆ ฉันก็เลยอยากนัดเจอคุณครูค่ะ"
10113-101130040 = "เดี๋ยวนะ ขอครูทำความเข้าใจก่อน"
10113-101130050 = "อ๋อ... อื้ม เข้าใจแล้ว!\nงั้นก็มาเจอกันเถอะ!"
10113-101130060 = "คุณครู ฉันฮิมูโระ เซนะจากชมรม\nหน่วยแพทย์ฉุกเฉินค่ะ"
10113-101130070 = "ฉันได้เวรออฟอีกแล้ว ก็เลยมาแจ้งให้\nทราบค่ะ"
10113-101130080 = "วันนี้ก็จะเตรียมพร้อมทำงานอีก\nหรือเปล่า?"
10113-101130090 = "ไม่ค่ะ วันนี้ฉันมีงานอื่น"
10113-101130100 = "ก็เลยจะใส่ชุดลำลองไปห้องชมรม\nหน่วยแพทย์ฉุกเฉินค่ะ"
10113-101130110 = "เวรออฟ... แต่จะใส่ชุดลำลอง...\nไปห้องชมรมเหรอ?"
10113-101130120 = "งั้นครูไปด้วย!"
10113-101130130 = "คะ?"
10113-101130140 = "แต่ฉันว่าไม่น่าจะมีเรื่องอะไรเป็นพิเศษ\nนะคะ"
10113-101130150 = "เอาเถอะน่า ครูไปด้วยดีกว่า!"
10113-101130160 = "อืม"
10113-101130170 = "เข้าใจแล้วค่ะ"
10113-101130180 = "แล้วเจอกันนะคะ"
10113-101130190 = "คุณครูคะ ฉันฮิมูโระ เซนะจากชมรม\nหน่วยแพทย์ฉุกเฉินค่ะ"
10113-101130200 = "เหมือนหมู่นี้ฉันเอาแต่พูดเรื่องเดิมๆ\nยังไงก็ไม่รู้"
10113-101130210 = "เวรออฟอีกแล้วสินะ!"
10113-101130220 = "อืม"
10113-101130230 = "ฉันปิดบังอะไรคุณครูไม่ได้เลยสินะคะ"
10113-101130240 = "วันนี้ก็เตรียมพร้อมรอทำงานหรือเปล่า?\nหรือว่าไปจัดเรียงยา?"
10113-101130250 = "ค่ะ ฉันติดต่อมาเพราะเรื่องนั้นละค่ะ"
10113-101130260 = "ฉันพยายามจะบอกคุณครูว่ามีบางอย่าง\nที่ผิดปกติกับฉัน"
10113-101130270 = "เพราะฉันมีความคิดที่เหนือความคาด\nหมายค่ะ"
10113-101130280 = "มันคือ... อะไรเหรอ?"
10113-101130290 = "ฉันอยากไปทะเลดูบ้างค่ะ"
10113-101130300 = "!!!"
10113-101130310 = "ได้สิ! ให้เป็นหน้าที่ของครูเอง!!!"

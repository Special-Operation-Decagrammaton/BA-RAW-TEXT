[translation]
10113-101130010 = "선생님, 응급의학부의 히무로 세나입니다."
10113-101130020 = "비번일이 되었기에, 이에 보고드리려 합니다."
10113-101130030 = "덧붙여, 요즘 선생님을 자주 만나지 못해 쓸쓸하니, 시간 약속을 잡았으면 합니다."
10113-101130040 = "잠깐만. 이야기 좀 따라가자."
10113-101130050 = "좋아……. 그래. 이해했어! 그렇게 하자!"
10113-101130060 = "선생님, 응급의학부의 히무로 세나입니다."
10113-101130070 = "다시 비번일이 되었기에, 이에 보고드리려 합니다."
10113-101130080 = "오늘도 대기할 거야?"
10113-101130090 = "아닙니다. 오늘은 따로 할 일이 있습니다."
10113-101130100 = "그래서 사복을 입고 응급의학부실을 찾으려 합니다."
10113-101130110 = "비번일에…… 사복으로…… 동아리실에?"
10113-101130120 = "나도 갈게!"
10113-101130130 = "네?"
10113-101130140 = "별다를 것은 없을 것이라고 생각합니다만."
10113-101130150 = "아무튼 갈게!"
10113-101130160 = "음."
10113-101130170 = "알겠습니다."
10113-101130180 = "그럼 그렇게 알고 있겠습니다."
10113-101130190 = "선생님, 응급의학부의 히무로 세나입니다."
10113-101130200 = "최근 비슷한 말씀을 자주 드리게 되는 것 같습니다만."
10113-101130210 = "세나의 비번!"
10113-101130220 = "음."
10113-101130230 = "역시 선생님께는 아무것도 숨길 필요가 없군요."
10113-101130240 = "오늘은 대기? 약품 정비?"
10113-101130250 = "네. 바로 그 부분입니다."
10113-101130260 = "이례적인 일이 발생하였다고 말씀드리려 했던 것은."
10113-101130270 = "드물게도 저에게, 상정 외의 생각이 떠올랐기 때문이었습니다."
10113-101130280 = "그게…… 뭔데?"
10113-101130290 = "바다에 가 보고 싶습니다."
10113-101130300 = "!!!"
10113-101130310 = "알았어! 내게 맡겨!!!"

[translation]
20046-200460010 = "샬레의 선생님, 매번 신세 지고 있습니다."
20046-200460020 = "음양부의 부장을 맡고 있는 아마치 니야라 합니다."
20046-200460030 = "부족한 몸이나 향후에도 모쪼록 잘 부탁드립니다."
20046-200460040 = "선생님, 반응하기 힘든데."
20046-200460050 = "니야가 기억을 잃었다……?!"
20046-200460060 = "냐하하핫~ 조금 짓궂었으려나요~"
20046-200460070 = "냐하하핫~ 역시 선생님, 한치의 기대도 저버리지 않는 반응이시네요~"
20046-200460080 = "첫인사에는 형식미란 게 있다 보니~ 이래 보여도 제법 신경 쓴답니다~?"
20046-200460090 = "그런 건 줄 알았어!"
20046-200460100 = "그나저나 샬레의 선생님이라고 하시면 역시~"
20046-200460110 = "귀엽디~ 귀여운~ 학생들이 처한 곤경을~"
20046-200460120 = "모른 척 지나치지 못하는 걸로 유명하시지요?"
20046-200460130 = "무슨 일 있어?"
20046-200460140 = "불길한 도입부……."
20046-200460150 = "냐하~ 그게 말이죠오~"
20046-200460160 = "조금 곤란한 일이 있어서요~"
20046-200460170 = "지금 누군가에게 쫓기고 있거든요."
20046-200460180 = "냐하~"
20046-200460190 = "덕분에 오늘은 잔소리 없이 끝났네요~"
20046-200460200 = "역시 믿을 수 있는 어른~"
20046-200460210 = "선생님이 계시면 모든 게 해결되네요~"
20046-200460220 = "그런 뜻으로 쓰는 말이 아닙니다."
20046-200460230 = "후배들을 너무 걱정시키지 마."
20046-200460240 = "냐하하하~"
20046-200460250 = "대답은요……?"
20046-200460260 = "냐하하하~"
20046-200460270 = "저기~ 선생님~"
20046-200460280 = "저번 이후로 얼마 안 되어서 참 송구하네요~"
20046-200460290 = "조금 곤란한 상황에 부닥쳐서요."
20046-200460300 = "혹시 음양부실까지 와 주실 수 있을까요~?"
20046-200460310 = "두 번은 안 당합니다."
20046-200460320 = "태연하게 똑같은 수법을……."
20046-200460330 = "그렇군요. 잘 알았습니다."
20046-200460340 = "선생님께서도 절 믿어주지 않으시는군요."
20046-200460350 = "이것은 제 평소 행실과 품성의 문제. 설령 누구도 절 돕지 않는다 해도 그건 돌고 돌아서 온 저 자신의 업보……."
20046-200460360 = "실례했습니다."
20046-200460370 = "잠깐, 진짜였어?!"
20046-200460380 = "바로 갈게!"
20046-200460390 = "선생님."
20046-200460400 = "이래 봬도 해야 할 일은 전부 하고 있답니다~"
20046-200460410 = "엑."
20046-200460420 = "진짜?"
20046-200460430 = "카호가요."
20046-200460440 = "안 하잖아!"
20046-200460450 = "누구의 손을 거치든, 일 자체는 해결되고 있으니……."
20046-200460460 = "이야~ 저는 운이 참 좋네요. 냐하하~"
20046-200460470 = "선생님……?"
20046-200460480 = "이것이 참…… 큰일이 나버려서요~"
20046-200460490 = "자세한 설명은 드리기 어렵고"
20046-200460500 = "주소를 보낼게요"
20046-200460510 = "유감스럽게도 인간에겐 학습 능력이란 게 있단다."
20046-200460520 = "세 번은 안 당할 거야."
20046-200460530 = "진짜로."
20046-200460540 = "니야?"
20046-200460550 = "지금 갈게!"
20046-200460560 = "이야~"
20046-200460570 = "역시 선생님, 혼낼 때는 무섭네요~"
20046-200460580 = "제대로 반성했습니까?"
20046-200460590 = "네~"
20046-200460600 = "반성했어요~"
20046-200460610 = "……또 설교하러 갈 거야."
20046-200460620 = "엑."
20046-200460630 = "……이 아니라, 백귀야행은 언제나 선생님의 방문을 환영하고 있답니다~"
20046-200460640 = "저~"
20046-200460650 = "진짜 오시나요……?"
20046-200460660 = "응."
20046-200460670 = "그렇습니다."
20046-200460680 = "요즘 일 때문에 바쁘시다고~"
20046-200460690 = "저에게 쓰시는 시간을 아끼셔서 조금이라도 일에 보태시는 게 어떠신지~?"
20046-200460700 = "선생님은 이게 일입니다."
20046-200460710 = "이 무슨 폭거인가요……."
20046-200460720 = "설교 아니면 쓰다듬의 양자택일이라뇨."
20046-200460730 = "왜 솔직하게 말 안 한 거야?"
20046-200460740 = "도와줄 수 있었는데."
20046-200460750 = "갑자기 무슨 말씀인지 도통 짐작이 안 가네요~"
20046-200460760 = "마치 제가 뭐라도 한 것처럼 말씀하시지만, 저는 아무것도 하지 않았는데요?"
20046-200460770 = "망량즈에게 정식 동아리 신청을 귀띔하고."
20046-200460780 = "상인회에게 종이 공예를 소개하고."
20046-200460790 = "엑스트라 동아리 부실을 시내로 배정했잖아?"
20046-200460800 = "ㄴ"
20046-200460810 = "냐하~ 그럴싸한 시나리오네요~"
20046-200460820 = "깜짝 놀랐답니다~?"
20046-200460830 = "때는 오우마가토키."
20046-200460840 = "삭월이 천수각 끝에 걸리고, 사람이 어리석어 귀신을 두려워하지 않으니, 이는 천명이 쇠한 흉조로다."
20046-200460850 = "니야?"
20046-200460860 = "케케묵은 옛이야기. 역사보다는 설화, 진실보다는 허구로 여겨지는 과거의 일."
20046-200460870 = "그럼에도 여전히 사람들은 귀신의 이름을 입에 담길 꺼리죠."
20046-200460880 = "조금 전부터 무슨 말인지 모르겠어."
20046-200460890 = "간단합니다. 선생님."
20046-200460900 = "사람들이 어째서 귀신을 두려워하는지, 백귀야행이 어째서 귀신의 행렬이라 불리는지."
20046-200460910 = "온 키보토스에 재차 상기시켜 주기로 했습니다."
20046-200460920 = "밤은 이제 막 시작했을 뿐입니다."
20046-200460930 = "선생님, 아까 거짓말이라 했던 키보토스 정복 계획."
20046-200460940 = "사실은 진짜랍니다~"
20046-200460950 = "?"
20046-200460960 = "거짓말이라 했던 쪽이 거짓말이라는, 그런 반전이네요~"
20046-200460970 = "그래서 지금도 제 호령 한 번이면 백귀야행의 군세가 출격할지도~"
20046-200460980 = "안 할지도~"
20046-200460990 = "아니, 이건 거짓말이지!"
20046-200461000 = "왜 이런 거짓말을 하는 거야?"
20046-200461010 = "그야……?"
20046-200461020 = "재밌잖아요~?"
20046-200461030 = "심장이 철렁한다고!"
20046-200461040 = "선생님은 장난감이 아닙니다."
20046-200461050 = "냐하하~ 뭐 그렇죠."
20046-200461060 = "이런 말썽꾸러기 학생을 어떻게 생각하실지는~"
20046-200461070 = "선생님께 맡겨두려고요~"
20046-200461080 = "저는 늘 그렇듯이 흘러가는 대로 두려고요."
20046-200461090 = "늘 그렇듯이……?"
20046-200461100 = "엄청 참견하겠다는 뜻 아냐?"
20046-200461110 = "냐하하~"
20046-200461120 = "그런 부분까지 평소처럼 하렵니다~"

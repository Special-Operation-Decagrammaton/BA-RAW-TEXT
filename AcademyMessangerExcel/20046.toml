[translation]
20046-200460010 = "夏萊的老師，承蒙您的照顧"
20046-200460020 = "我是擔任陰陽部部長的仁耶"
20046-200460030 = "雖說我能力不足，今後還請您多多指教"
20046-200460040 = "老師我，有點不知道該怎麼反應"
20046-200460050 = "仁耶失憶了嗎……！？"
20046-200460060 = "喵哈哈～是不是有點壞心眼了呢～"
20046-200460070 = "喵哈哈～不愧是老師，反應完全沒讓我失望呢～"
20046-200460080 = "初次打招呼的時候還是要注重形式嘛～\n別看我這樣，其實我還挺在意這種細節的唷～？"
20046-200460090 = "我就知道是這樣！"
20046-200460100 = "話說夏萊的老師您～"
20046-200460110 = "果然是個當可愛～又可愛的學生們遭遇困境的時候～"
20046-200460120 = "絕對無法坐視不管的人對吧？"
20046-200460130 = "發生什麼事了？"
20046-200460140 = "這個開場白感覺不太妙……"
20046-200460150 = "喵哈～事情是這樣的～"
20046-200460160 = "我現在遇到了一點小麻煩～"
20046-200460170 = "有人正在追趕我呢"
20046-200460180 = "喵哈～"
20046-200460190 = "多虧老師的幫忙，今天總算沒被唸了呢～"
20046-200460200 = "您果然是值得信賴的大人～"
20046-200460210 = "只要有老師在，一切都能解決呢～"
20046-200460220 = "我其實沒有這個意思"
20046-200460230 = "別讓後輩們太擔心囉"
20046-200460240 = "喵哈哈哈～"
20046-200460250 = "回答呢……？"
20046-200460260 = "喵哈哈哈～"
20046-200460270 = "那個～老師～"
20046-200460280 = "距離上次見面沒多久就又麻煩您，實在過意不去～"
20046-200460290 = "我現在遇到了一點棘手的狀況"
20046-200460300 = "能請您到陰陽部部室來一趟嗎～？"
20046-200460310 = "我才不會再上當第二次"
20046-200460320 = "居然還敢若無其事地用同一招……"
20046-200460330 = "原來如此，我明白了"
20046-200460340 = "連老師也不願意相信我了啊"
20046-200460350 = "這都是我平時的行為與品性的問題。\n就算沒有人願意幫助我，那也是因果報應……"
20046-200460360 = "失禮了"
20046-200460370 = "等等，所以是真的嗎！？"
20046-200460380 = "我馬上過去！"
20046-200460390 = "老師"
20046-200460400 = "別看我這樣，該做的事都有做唷～"
20046-200460410 = "真假"
20046-200460420 = "真的嗎？"
20046-200460430 = "是佳穗做的"
20046-200460440 = "所以你根本沒做嘛！"
20046-200460450 = "不管是由誰的手來完成，反正事情終究是解決了嘛……"
20046-200460460 = "哎呀～我的運氣真好呢。喵哈哈～"
20046-200460470 = "老師……？"
20046-200460480 = "這次……真的出大事了～"
20046-200460490 = "詳細情況有點難說明"
20046-200460500 = "我把地址傳給您"
20046-200460510 = "可惜人類是會學習的生物"
20046-200460520 = "我不會再上當第三次的"
20046-200460530 = "絕對"
20046-200460540 = "仁耶？"
20046-200460550 = "我馬上過去！"
20046-200460560 = "哎呀～"
20046-200460570 = "老師生氣的時候果然很可怕呢～"
20046-200460580 = "有好好反省嗎？"
20046-200460590 = "有～"
20046-200460600 = "我好好反省了～"
20046-200460610 = "……我又要去說教了哦"
20046-200460620 = "呀啊"
20046-200460630 = "……不對，百鬼夜行隨時都歡迎老師的到訪唷～"
20046-200460640 = "那個～"
20046-200460650 = "老師真的要來嗎……？"
20046-200460660 = "嗯"
20046-200460670 = "沒錯"
20046-200460680 = "最近您不是因為工作很忙嗎～"
20046-200460690 = "要不要把陪我的時間省下來，拿去多幫點忙呢～？"
20046-200460700 = "這就是老師的工作"
20046-200460710 = "這未免有點過於極端了……"
20046-200460720 = "居然只能在說教和摸頭之間二選一"
20046-200460730 = "為什麼不老實說？"
20046-200460740 = "我明明可以幫你的"
20046-200460750 = "突然說這些，我完全聽不懂呢～"
20046-200460760 = "雖然老師說得好像我做了什麼，但我什麼都沒做唷？"
20046-200460770 = "提醒妖怪劇團們正式申請社團"
20046-200460780 = "把摺紙部介紹給了商會"
20046-200460790 = "還把臨演部的部室安排到了市區對吧？"
20046-200460800 = "喵"
20046-200460810 = "喵哈～這個劇本聽起來還真是煞有其事～"
20046-200460820 = "就連我也嚇了一跳呢～？"
20046-200460830 = "時值黃昏"
20046-200460840 = "殘月掛在千手閣頂，人心愚昧，不再畏懼鬼神，此乃天命衰敗的不祥之兆"
20046-200460850 = "仁耶？"
20046-200460860 = "陳舊的往事。被世人認定為傳說而非歷史，虛構而非真實"
20046-200460870 = "即便如此，人們依舊忌諱提及鬼神之名"
20046-200460880 = "我從剛才就聽不懂你在說什麼了"
20046-200460890 = "事情很簡單，老師"
20046-200460900 = "人們為何會害怕鬼神，百鬼夜行為何會被稱為鬼神的行列"
20046-200460910 = "我們決定再次告訴整個奇普托斯"
20046-200460920 = "夜晚，現在才正要開始"
20046-200460930 = "老師，剛才說是騙人的那個奇普托斯征服計畫"
20046-200460940 = "其實是真的哦～"
20046-200460950 = "？"
20046-200460960 = "也就是「都是騙人的」這句話其實才是謊言的反轉～"
20046-200460970 = "所以現在只要我一聲令下，百鬼夜行的軍勢就會出征～"
20046-200460980 = "也可能不會～"
20046-200460990 = "等一下，這肯定是騙人的吧！"
20046-200461000 = "為什麼要說這種謊話？"
20046-200461010 = "這個嘛……？"
20046-200461020 = "因為很好玩～？"
20046-200461030 = "心臟都快跳出來了！"
20046-200461040 = "不要把老師當玩具"
20046-200461050 = "喵哈哈～也是啦"
20046-200461060 = "像我這種惹麻煩的學生會被老師如何看待～"
20046-200461070 = "就交給老師決定囉～"
20046-200461080 = "我還是跟平時一樣，順其自然就好"
20046-200461090 = "跟平時一樣……？"
20046-200461100 = "那不就是打算大肆插手的意思嗎？"
20046-200461110 = "喵哈哈～"
20046-200461120 = "當然連這個部分也要跟平時一樣囉～"

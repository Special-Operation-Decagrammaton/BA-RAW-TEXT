[translation]
20046-200460010 = "ฉันเป็นหนี้บุญคุณคุณครูของชาเล่ต์\nเสมอเลยค่ะ"
20046-200460020 = "ฉันคืออามาจิ นิยะ หัวหน้าชมรม\nหยินหยางค่ะ"
20046-200460030 = "ถึงฉันจะยังบกพร่อง แต่ก็ขอฝากเนื้อ\nฝากตัวด้วยนะคะ"
20046-200460040 = "ครูต้องตอบว่ายังไงดีเนี่ย"
20046-200460050 = "นิยะสูญเสียความทรงจำไปเหรอ...?!"
20046-200460060 = "อะฮะฮะฮ่า~ ฉันเหมือนพูดแกล้ง\nงั้นเหรอคะ?"
20046-200460070 = "อะฮะฮะฮ่า~ สมแล้วที่เป็นคุณครู\nปฏิกิริยาของคุณครูไม่ทำให้ผิดหวัง\nเลยนะคะ~"
20046-200460080 = "การทักทายครั้งแรกต้องมีพิธีการ\nหน่อยค่ะ~ เห็นอย่างนี้ฉันก็ใส่ใจเรื่องนี้\nนะคะ~"
20046-200460090 = "กะไว้แล้วว่าต้องเป็นแบบนี้!"
20046-200460100 = "จะว่าไป คุณครูของชาเล่ต์เองก็มี\nชื่อเสียงเรื่อง~"
20046-200460110 = "การไม่ปล่อยให้เด็กนักเรียนที่น่ารัก~"
20046-200460120 = "ต้องเจอความยากลำบากอยู่ฝ่ายเดียว\nใช่มั้ยคะ?"
20046-200460130 = "มีเรื่องอะไรงั้นเหรอ?"
20046-200460140 = "ลางสังหรณ์ไม่ค่อยดีเลย..."
20046-200460150 = "อะฮ่า~ ก็พอดีว่า~"
20046-200460160 = "ฉันมีเรื่องลำบากนิดหน่อยน่ะค่ะ~"
20046-200460170 = "ตอนนี้ฉันกำลังถูกใครไม่รู้ไล่ตามอยู่ค่ะ"
20046-200460180 = "อะฮ่า~"
20046-200460190 = "ขอบคุณที่ทำให้วันนี้ฉันไม่โดนดุนะคะ~"
20046-200460200 = "เป็นผู้ใหญ่ที่เชื่อถือได้จริงๆ เลย~"
20046-200460210 = "พอมีคุณครู ทุกอย่างก็คลี่คลายได้\nนะคะ~"
20046-200460220 = "คำนั้นไม่ได้มีไว้พูดในสถานการณ์\nแบบนี้หรอก"
20046-200460230 = "อย่าทำให้รุ่นน้องต้องเหนื่อยมาก\nเกินไปล่ะ"
20046-200460240 = "อะฮะฮะฮ่า~"
20046-200460250 = "ตอบด้วยสิ..."
20046-200460260 = "อะฮะฮะฮ่า~"
20046-200460270 = "นี่~ คุณครู~"
20046-200460280 = "ขอโทษที่มารบกวนบ่อยๆ นะคะ~"
20046-200460290 = "พอดีฉันเจอสถานการณ์ลำบาก\nนิดหน่อยค่ะ"
20046-200460300 = "คุณครูช่วยมาที่ชมรมหยินหยาง\nได้มั้ยคะ~?"
20046-200460310 = "ครูไม่ยอมโดนหลอกซ้ำสองหรอก"
20046-200460320 = "ใช้เล่ห์กลเดิมเลยนะ..."
20046-200460330 = "งั้นเหรอคะ? ก็ได้ค่ะ"
20046-200460340 = "คุณครูคงไม่เชื่อใจฉันสินะคะ"
20046-200460350 = "ปัญหามันอยู่ที่พฤติกรรมและนิสัยเดิม\nของฉันน่ะค่ะ การที่ไม่มีใครมาช่วยฉัน\nมันคงเป็นเวรกรรมของฉันที่ย้อนกลับมา\nเล่นงานตัวเอง..."
20046-200460360 = "ขอโทษที่เสียมารยาทค่ะ"
20046-200460370 = "เดี๋ยวนะ ตกลงว่าจริงเหรอ?!"
20046-200460380 = "ครูจะไปหาเดี๋ยวนี้ละ!"
20046-200460390 = "คุณครู"
20046-200460400 = "เห็นอย่างนี้งานทุกอย่างก็เดินอยู่นะคะ~"
20046-200460410 = "เหอะ"
20046-200460420 = "จริงเหรอ?"
20046-200460430 = "คาโฮะทำให้อยู่น่ะค่ะ"
20046-200460440 = "แล้วทำไมไม่ทำเองล่ะ!"
20046-200460450 = "ไม่ว่าจะให้ใครทำ งานก็เดินอยู่ดีค่ะ..."
20046-200460460 = "เฮ้อ~ ฉันนี่โชคดีจริงๆ เลยนะคะ\nอะฮะฮ่า~"
20046-200460470 = "คุณครู...?"
20046-200460480 = "พอดีว่า... เกิดปัญหาใหญ่น่ะค่ะ~"
20046-200460490 = "ให้อธิบายโดยละเอียดคงจะยาก"
20046-200460500 = "ฉันจะส่งตำแหน่งให้นะคะ"
20046-200460510 = "น่าเสียดายที่มนุษย์มีความสามารถ\nในการเรียนรู้นะ"
20046-200460520 = "ครูจะไม่โดนหลอกเป็นครั้งที่ 3 หรอก"
20046-200460530 = "จริงๆ นะ"
20046-200460540 = "นิยะ?"
20046-200460550 = "ครูจะไปเดี๋ยวนี้ละ!"
20046-200460560 = "แหม~"
20046-200460570 = "ตอนคุณครูดุเนี่ย น่ากลัวจริงๆ ด้วย\nนะคะ~"
20046-200460580 = "สำนึกผิดจริงๆ แล้วหรือยัง?"
20046-200460590 = "ค่า~"
20046-200460600 = "สำนึกผิดแล้วค่า~"
20046-200460610 = "เดี๋ยวครูจะไปดุอีก..."
20046-200460620 = "เหอะ"
20046-200460630 = "ไม่สิ... ฉันจะบอกว่าเฮียกคิยาโค\nต้อนรับคุณครูเสมอเลยค่ะ~"
20046-200460640 = "เอ่อ~"
20046-200460650 = "จะมาจริงๆ เหรอคะ...?"
20046-200460660 = "อื้อ"
20046-200460670 = "จะไปจริงๆ"
20046-200460680 = "หมู่นี้คุณครูงานยุ่งนี่คะ~"
20046-200460690 = "เก็บเวลาที่จะใช้กับฉันไว้ทำงานจะไม่\nเป็นการดีกว่าเหรอคะ~?"
20046-200460700 = "นี่ละงานของครู"
20046-200460710 = "ใช้อำนาจข่มเหงกันเหรอคะ..."
20046-200460720 = "ต้องเลือกระหว่างโดนดุกับโดนลูบหัว\nเหรอคะ"
20046-200460730 = "ทำไมไม่บอกกันตรงๆ ล่ะ?"
20046-200460740 = "ถ้าบอกกันครูน่าจะช่วยได้นะ"
20046-200460750 = "ฉันไม่เข้าใจเลยค่ะว่าคุณครูกำลังพูด\nถึงอะไร~"
20046-200460760 = "คุณครูพูดเหมือนฉันทำบางอย่างลงไป\nแต่ฉันไม่ได้ทำอะไรเลยนะคะ "
20046-200460770 = "นิยะแอบบอกปีศาจเรื่องการสมัคร\nเข้าชมรมอย่างเป็นทางการ"
20046-200460780 = "ช่วยแนะนำงานฝีมือกระดาษให้\nกลุ่มการค้า"
20046-200460790 = "แล้วก็จัดหาห้องชมรมเอ็กซ์ตรา\nในเมืองให้ด้วยนี่?"
20046-200460800 = "เอ่อ..."
20046-200460810 = "อะฮ่า~ เป็นเรื่องพวกนั้นเองเหรอคะ~"
20046-200460820 = "ฉันละตกใจหมดเลยค่ะ~"
20046-200460830 = "ในเพลาพลบค่ำ"
20046-200460840 = "จันทร์ดับลอยอยู่เหนือหอสูง\nผู้คนโง่เขลาและไม่เกรงกลัวภูตผี\nนี่เป็นลางร้ายที่บ่งบอกการเสื่อมถอย\nของคำสั่งสวรรค์"
20046-200460850 = "นิยะ?"
20046-200460860 = "นิทานเก่าคร่ำครึ เรื่องในอดีตที่ถูกมอง\nว่าเป็นตำนานมากกว่าประวัติศาสตร์\nเป็นเรื่องแต่งมากกว่าความจริง"
20046-200460870 = "ถึงกระนั้นผู้คนก็ยังไม่กล้าที่จะ\nเอื้อนเอ่ยชื่อของภูตผี"
20046-200460880 = "ครูไม่เห็นจะเข้าใจเลย"
20046-200460890 = "ง่ายมากค่ะ คุณครู"
20046-200460900 = "ฉันจะเตือนให้ทั้งคิโวทอสรู้อีกครั้งว่า\nเหตุใดผู้คนถึงกลัวภูตผี"
20046-200460910 = "และทำไมเฮียกคิยาโคถึงถูกเรียกว่า\nเป็นขบวนแห่งร้อยวิญญาณ"
20046-200460920 = "ค่ำคืนเพิ่งจะเริ่มต้นเองค่ะ"
20046-200460930 = "คุณครู แผนการพิชิตคิโวทอสที่ฉัน\nบอกว่าเป็นเรื่องโกหกเมื่อกี้น่ะ"
20046-200460940 = "ที่จริงมันเป็นเรื่องจริงค่ะ~"
20046-200460950 = "?"
20046-200460960 = "คนที่โกหก กลับมาบอกว่าเป็นเรื่อง\nโกหกเสียเอง คดีพลิกเลยนะคะเนี่ย~"
20046-200460970 = "ตอนนี้ถ้าฉันสั่งการเพียงคำเดียว\nขบวนร้อยวิญญาณก็อาจออกไปจู่โจม\nได้เลยนะ~"
20046-200460980 = "หรืออาจจะไม่~"
20046-200460990 = "โกหกกันแน่ๆ!"
20046-200461000 = "ทำไมถึงโกหกเรื่องแบบนี้ล่ะ?"
20046-200461010 = "ก็...?"
20046-200461020 = "มันสนุกดีนี่คะ~"
20046-200461030 = "หัวใจครูตกไปอยู่ตาตุ่มแล้ว!"
20046-200461040 = "ครูไม่ใช่ของเล่นนะ"
20046-200461050 = "อะฮะฮ่า~ ก็จริงนะคะ"
20046-200461060 = "คุณครูจะคิดยังไงกับนักเรียนที่ชอบ\nแกล้งแบบนี้นะ~"
20046-200461070 = "ฝากไว้ให้คุณครูคิดแล้วกันค่ะ~"
20046-200461080 = "ฉันจะปล่อยให้มันเป็นไปตามที่ทำ\nเป็นประจำค่ะ"
20046-200461090 = "ตามที่ทำเป็นประจำ...?"
20046-200461100 = "ก็ไม่เห็นจะปล่อยเลยสักครั้งนี่"
20046-200461110 = "อะฮะฮ่า~"
20046-200461120 = "ก็ปกติฉันเป็นแบบนั้นนี่คะ~"

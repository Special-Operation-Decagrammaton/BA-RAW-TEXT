[translation]
20046-200460010 = "I'm always in your debt, Schale's Sensei."
20046-200460020 = "This is Amachi Niya, president of the Yin-Yang Club."
20046-200460030 = "Though I have many shortcomings, I look forward to working with you."
20046-200460040 = "What's happening here...?"
20046-200460050 = "Did you lose your memories?!?!"
20046-200460060 = "Nyahahaha! Just a little bit of mischief!"
20046-200460070 = "Nyahahaha! True to form, you always have the best reactions!"
20046-200460080 = "First greetings have to have an air of formality to them, you know! So I put some effort in this time!"
20046-200460090 = "I knew you were messing with me!"
20046-200460100 = "Anyways, Schale's Sensei"
20046-200460110 = "you're very well known for not being able to ignore"
20046-200460120 = "your cute and adorable students, right?"
20046-200460130 = "Is something going on?"
20046-200460140 = "An ominous intro..."
20046-200460150 = "Nyaha! The thing is..."
20046-200460160 = "I have something of a problem."
20046-200460170 = "I'm being pursued!!"
20046-200460180 = "Nyaha..."
20046-200460190 = "Thanks for helping me get out of that scolding!"
20046-200460200 = "As expected from a trustworthy adult!"
20046-200460210 = "Everything works out with you around!"
20046-200460220 = "Don't try to pull that right now..."
20046-200460230 = "Stop worrying your underclassmen all the time."
20046-200460240 = "Nyahahaha..."
20046-200460250 = "That's your answer...?"
20046-200460260 = "Nyahahaha..."
20046-200460270 = "Um, Sensei."
20046-200460280 = "While I'm very aware it hasn't been very long since our last crisis..."
20046-200460290 = "I'm in a bit of a pinch."
20046-200460300 = "Would you be able to come to the Yin-Yang Club room?"
20046-200460310 = "I'm not falling for this twice."
20046-200460320 = "Turning around and employing the same exact tactic..."
20046-200460330 = "I see. I understand."
20046-200460340 = "If even you don't trust me..."
20046-200460350 = "The problem clearly lies with me and my attitude. I suppose I can only call this karma..."
20046-200460360 = "My apologies."
20046-200460370 = "Wait, you're being serious?!"
20046-200460380 = "I'll be right there!"
20046-200460390 = "Sensei."
20046-200460400 = "Despite how it looks, everything that needs to be done, gets done."
20046-200460410 = "Eh."
20046-200460420 = "Really?"
20046-200460430 = "By Kaho."
20046-200460440 = "So not by you!"
20046-200460450 = "Does it matter who, as long as it gets done...?"
20046-200460460 = "Yeap. I'm a lucky one! Nyahaha!"
20046-200460470 = "Sensei...?"
20046-200460480 = "Well... I have a real problem."
20046-200460490 = "I can't give details over text."
20046-200460500 = "Just meet me at this address."
20046-200460510 = "Unfortunately, people have this thing called an \"ability to learn.\""
20046-200460520 = "I won't fall for it three times!!"
20046-200460530 = "Seriously."
20046-200460540 = "Niya?"
20046-200460550 = "I'm on my way!"
20046-200460560 = "Wow..."
20046-200460570 = "You really ARE scary when you're lecturing someone."
20046-200460580 = "Have you reflected on your actions?"
20046-200460590 = "Yeah, yeah!"
20046-200460600 = "1000000% yes."
20046-200460610 = "...I'm going to scold you again."
20046-200460620 = "Ack"
20046-200460630 = "...We at Hyakkiyako always look forward to the esteemed Schale's Sensei's visits."
20046-200460640 = "Um..."
20046-200460650 = "You're really coming here...?"
20046-200460660 = "Yeah."
20046-200460670 = "That's right."
20046-200460680 = "Aren't you just absolutely swamped by work?"
20046-200460690 = "You should cut back on quality time with me and focus on that..."
20046-200460700 = "You are my work."
20046-200460710 = "Ah, such tyranny..."
20046-200460720 = "Having to choose between scolding or praising..."
20046-200460730 = "Why can't you just be honest with me?"
20046-200460740 = "I would've helped if you'd told me."
20046-200460750 = "Hm, what exactly do you mean?"
20046-200460760 = "I don't appreciate the accusations, especially when I've done nothing!"
20046-200460770 = "You tipped off the Mouryo about the official club application"
20046-200460780 = "introduced origami art to the merchant guild"
20046-200460790 = "and you gave the Extra club a club room downtown, right?"
20046-200460800 = "Nya"
20046-200460810 = "Nyahaha... What a story you tell!"
20046-200460820 = "I'm surprised, you know?"
20046-200460830 = "When twilight reigns supreme"
20046-200460840 = "The new moon hangs upon the ridges of Tenshukaku. People are foolish to indulge a fear of ghosts. A dark omen, heralding the decline of heaven's mandate."
20046-200460850 = "Niya?"
20046-200460860 = "An old story. Folklore, rather than history. The past morphs into fiction."
20046-200460870 = "Yes, people find their tongues laden when they attempt to speak of ghosts."
20046-200460880 = "I'm not following what you're saying."
20046-200460890 = "It's simple, Sensei."
20046-200460900 = "The reason why people are afraid of ghosts, the reason why Hyakkiyako is called the \"Parade of Ghosts.\""
20046-200460910 = "I've decided to remind Kivotos of memories long forgotten."
20046-200460920 = "The night has just begun."
20046-200460930 = "Sensei, I was lying about my plans to take over Kivotos."
20046-200460940 = "Or...it's all true! Heehee"
20046-200460950 = "?"
20046-200460960 = "The greatest plot twist of all: a lie that was a lie."
20046-200460970 = "Even now, Hyakkiyako's forces might sally forth with a single command from me."
20046-200460980 = "Or not!"
20046-200460990 = "No, this one's a lie!"
20046-200461000 = "Why are you pulling my leg...?"
20046-200461010 = "Well...?"
20046-200461020 = "Because it's fun?"
20046-200461030 = "You're giving me heart problems!"
20046-200461040 = "I am not your plaything!"
20046-200461050 = "Nyahaha, yep, you're right."
20046-200461060 = "In regards to how you view this troublemaking student of yours"
20046-200461070 = "I'll leave that to you"
20046-200461080 = "and, as usual, I'll just go with the flow."
20046-200461090 = "Your \"usual\" doesn't inspire confidence..."
20046-200461100 = "You're going to stick your nose where it doesn't belong!"
20046-200461110 = "Nyahaha!"
20046-200461120 = "I'll simply do as I always have."

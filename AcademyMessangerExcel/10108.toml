[translation]
10108-101080010 = "선생님, 혹시 주무시나요?"
10108-101080020 = "아니, 아직 일어나 있어."
10108-101080030 = "늦은 시간에 갑자기 무슨 일이야?"
10108-101080040 = "아, 혹시 주무시려는 걸 방해했다면 죄송해요."
10108-101080050 = "오늘은 어쩐지 늦은 시간까지 잠이 오질 않아서……"
10108-101080060 = "내일 샬레에 제출할 예정이었던 회계 보고서를 미리 정리했거든요."
10108-101080070 = "메일로 보내 드릴 테니 시간 나실 때 참조 부탁드립니다."
10108-101080080 = "수고 많았어, 유우카."
10108-101080090 = "하지만 당번 업무 때문에 무리하고 있는 건 아니지?"
10108-101080100 = "문제없어요. 수면 시간을 포함한 제 일정 계획은 완벽하니까요."
10108-101080110 = "그럼 내일 뵙겠습니다. 좋은 밤 되세요."
10108-101080120 = "전에 선생님께서 조언을 해 주신 덕분에"
10108-101080130 = "요새는 전보다 더 수월하게 잠에 들 수 있게 된 것 같아요"
10108-101080140 = "물론 아직도 자정을 넘겨서 잠드는 경우가 허다하지만…"
10108-101080150 = "걱정되는 걸……"
10108-101080160 = "무슨 고민이라도 있는 거야?"
10108-101080170 = "특별한 고민은 없어요"
10108-101080180 = "조금 마음에 걸리는 게 있다면"
10108-101080190 = "<system> 메시지 송출 오류!"
10108-101080200 = "유우카……?"
10108-101080210 = "<system> 메시지 송출 오류!"
10108-101080220 = "<system> 메시지 송출 오류!"
10108-101080230 = "선생님, 아까 당번 끝나고 돌아가는 길에 봤는데"
10108-101080240 = "인스턴트 컵라면 박스가 쌓여있던데요…"
10108-101080250 = "설마 식사를 컵라면으로 때우시려는 건 아니시겠죠?"
10108-101080260 = "그건 내가 먹으려고 산 게 아니야!"
10108-101080270 = "당번 중에 출출한 학생들에게 나눠주려고 샀어."
10108-101080280 = "음"
10108-101080290 = "그렇다면 참작의 여지가 있지만…"
10108-101080300 = "식사는 꼭 제때 제대로 챙겨 드셔야 해요?"
10108-101080310 = "알겠어, 알겠어."
10108-101080320 = "그러는 유우카야 말로 식사는 제대로 챙겨 먹고 있어?"
10108-101080330 = "그야 물론"
10108-101080340 = "잘 먹고 있죠"
10108-101080350 = "뭔가 대답이 느렸던 것 같은데…"
10108-101080360 = "얼마 전에 코타마 선배에게 추천을 받아서"

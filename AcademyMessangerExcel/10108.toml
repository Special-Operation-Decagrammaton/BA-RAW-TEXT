[translation]
10108-101080010 = "คุณครู นอนหรือยังคะ?"
10108-101080020 = "ยังหรอก ครูยังไม่นอน"
10108-101080030 = "ดึกดื่นแบบนี้มีเรื่องอะไรเหรอ?"
10108-101080040 = "อ่า ถ้าฉันรบกวนการนอนของคุณครู\nฉันขอโทษด้วยนะคะ"
10108-101080050 = "พอดีคืนนี้ฉันนอนไม่หลับ ทำไมก็ไม่รู้..."
10108-101080060 = "ฉันทำรายงานบัญชีที่จะส่งให้ชาเล่ต์\nในพรุ่งนี้ไว้แล้วน่ะค่ะ"
10108-101080070 = "ฉันจะส่งอีเมลไปให้ก่อน ถ้ามีเวลาก็\nช่วยดูด้วยนะคะ"
10108-101080080 = "เหนื่อยแย่เลยนะ ยูกะ"
10108-101080090 = "ไม่ได้หักโหมเพราะต้องมา\nเข้าเวรอยู่หรอกใช่มั้ย?"
10108-101080100 = "เรื่องนั้นไม่มีปัญหาค่ะ ก็ตารางเวลา\nและเวลาการนอนของฉันสมบูรณ์แบบ\nอยู่เสมอนี่คะ"
10108-101080110 = "แล้วเจอกันพรุ่งนี้นะคะ ราตรีสวัสดิ์ค่ะ"
10108-101080120 = "ที่คุณครูให้คำแนะนำมาคราวก่อน"
10108-101080130 = "ตอนนี้ฉันรู้สึกว่าหลับได้ง่ายกว่า\nแต่ก่อนแล้วค่ะ"
10108-101080140 = "ถึงจะยังหลับหลังจากเที่ยงคืนไปแล้ว\nก็เถอะ..."
10108-101080150 = "แต่ยังมีเรื่องคิดมาก..."
10108-101080160 = "มีเรื่องกังวลอะไรเหรอ?"
10108-101080170 = "ไม่ได้มีเรื่องอะไรที่กังวลเป็นพิเศษ\nหรอกค่ะ"
10108-101080180 = "แต่มีเรื่องที่ค้างคาใจฉันอยู่นิดหน่อย"
10108-101080190 = "<ข้อความระบบ> เกิดข้อผิดพลาด\nในการส่งข้อความ!"
10108-101080200 = "ยูกะ...?"
10108-101080210 = "<ข้อความระบบ> เกิดข้อผิดพลาด\nในการส่งข้อความ!"
10108-101080220 = "<ข้อความระบบ> เกิดข้อผิดพลาด\nในการส่งข้อความ!"
10108-101080230 = "คุณครูคะ ระหว่างเดินกลับมาหลังจาก\nเข้าเวรเสร็จ"
10108-101080240 = "ฉันเห็นกล่องราเม็งถ้วยวางไว้เพียบ\nเลย..."
10108-101080250 = "คุณครูไม่ได้เอาแต่กินราเม็งถ้วย\nใช่มั้ยคะ?"
10108-101080260 = "อันนั้นครูไม่ได้ซื้อไว้กินเองนะ!"
10108-101080270 = "ซื้อไว้ให้นักเรียนที่หิวเวลามาเข้าเวรน่ะ"
10108-101080280 = "อืม..."
10108-101080290 = "ถ้าอย่างนั้นก็ช่วยไม่ได้..."
10108-101080300 = "แต่ยังไงก็ต้องกินข้าวให้ตรงเวลานะคะ"
10108-101080310 = "เข้าใจแล้วๆ"
10108-101080320 = "แล้วยูกะล่ะ กินข้าวตรงเวลาอยู่\nหรือเปล่า?"
10108-101080330 = "แน่นอนอยู่แล้วค่ะ"
10108-101080340 = "ฉันกินเก่งมากเลย"
10108-101080350 = "เหมือนจะตอบช้านิดหน่อยเลยนะ..."
10108-101080360 = "ไม่นานมานี้รุ่นพี่โคทามะแนะนำฉันมา"
10108-101080370 = "ว่าให้ฟังวิทยุก่อนนอนค่ะ"
10108-101080380 = "ฟังวิทยุก็ดีเหมือนกันนะ"
10108-101080390 = "ฟังรายการอะไรเหรอ?"
10108-101080400 = "รายการ <ทริปดนตรีกับดีเจแมร์รี่> ค่ะ"
10108-101080410 = "ดีเจจะเล่าเรื่องราวที่ฟังสบายแล้วก็\nเปิดเพลงที่มีส่วนช่วยในการนอนหลับ"
10108-101080420 = "เปิดฟังก่อนนอนก็ถือว่าดีเลยค่ะ"
10108-101080430 = "ไว้ครูนอนไม่หลับจะหาฟังบ้างนะ"
10108-101080440 = "ค่ะ"
10108-101080450 = "แต่ก็ไม่รู้นะคะว่าจะตรงกับรสนิยม\nของคุณครูหรือเปล่า"
10108-101080460 = "เอ่อ คุณครูคะ"
10108-101080470 = "ได้ฟังวิทยุบ้างหรือเปล่าคะ?"
10108-101080480 = "ก็มีฟังบ้างนะ ทำไมเหรอ?"
10108-101080490 = "คือว่ารายการวิทยุคราวที่แล้วน่ะค่ะ"
10108-101080500 = "อืม..."
10108-101080510 = "ไม่มีอะไรค่ะ"
10108-101080520 = "รายการคราวที่แล้ว?"
10108-101080530 = "หมายถึงอะไรเหรอ?"
10108-101080540 = "ขอโทษค่ะ ฉันน่าจะเข้าใจผิดน่ะค่ะ"
10108-101080550 = "ไม่ต้องสนใจหรอกค่ะ"
10108-101080560 = "จะว่าไป ยูกะ"
10108-101080570 = "ตอนนี้หายจากโรคนอนไม่หลับ\nแล้วเหรอ"
10108-101080580 = "ค่ะ..."
10108-101080590 = "ต้องขอบคุณคุณครูเลยนะคะ"
10108-101080600 = "วันนี้ก็ขอรบกวนด้วยนะคะ"
10108-101080610 = "ครูต่างหากที่ต้องพูดแบบนั้นน่ะ"

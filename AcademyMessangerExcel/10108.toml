[translation]
10108-101080010 = "老師，你已經睡了嗎？"
10108-101080020 = "沒有，我還醒著"
10108-101080030 = "這麼晚找我有什麼事嗎？"
10108-101080040 = "啊，如果打擾到你睡覺的話，我很抱歉"
10108-101080050 = "今天不知道為什麼，都這麼晚了還是睡不著……"
10108-101080060 = "所以我提前整理了明天要提交給夏萊的會計報告"
10108-101080070 = "我會用郵件寄過去，再麻煩有空的時候確認一下"
10108-101080080 = "辛苦你了，優香"
10108-101080090 = "你沒有為了值日生的工作而勉強自己吧？"
10108-101080100 = "沒問題的。我的日程，包含睡覺時間在內都安排得很完美"
10108-101080110 = "那麼明天見了。祝你有個好夢"
10108-101080120 = "多虧老師之前給的建議"
10108-101080130 = "最近我好像比以前更容易入睡了"
10108-101080140 = "雖然現在還是經常過了午夜才睡著……"
10108-101080150 = "我有點擔心……"
10108-101080160 = "你有什麼煩惱嗎？"
10108-101080170 = "其實也沒有特別的煩惱"
10108-101080180 = "真要說有什麼讓我在意的事"
10108-101080190 = "<system>訊息發送錯誤！"
10108-101080200 = "優香……？"
10108-101080210 = "<system>訊息發送錯誤！"
10108-101080220 = "<system>訊息發送錯誤！"
10108-101080230 = "老師，我剛才回去時看到"
10108-101080240 = "有成堆的杯麵箱……"
10108-101080250 = "你該不會打算吃杯麵當正餐吧？"
10108-101080260 = "那不是我買來自己吃的！"
10108-101080270 = "是買來給當值日生時肚子餓的學生們的"
10108-101080280 = "嗯"
10108-101080290 = "那倒還算情有可原……"
10108-101080300 = "請老師一定要按時好好吃飯哦！"
10108-101080310 = "我知道，我知道"
10108-101080320 = "話說優香自己也有好好吃飯嗎？"
10108-101080330 = "那當然"
10108-101080340 = "我都有好好吃飯"
10108-101080350 = "總覺得你好像回答得有點慢……"
10108-101080360 = "我不久前在小玉前輩的建議之下"
10108-101080370 = "開始在睡前收聽廣播節目"
10108-101080380 = "廣播也有獨特的魅力呢"
10108-101080390 = "你都聽什麼節目呢？"
10108-101080400 = "聽一個叫＜DJ梅莉的音樂之旅＞的節目"
10108-101080410 = "主持人會配合輕鬆的故事，播放有助於入眠的各種音樂"
10108-101080420 = "很適合在睡前收聽"
10108-101080430 = "下次我睡不著的時候，也來試著聽聽看吧"
10108-101080440 = "嗯"
10108-101080450 = "希望老師也會喜歡"
10108-101080460 = "那個，老師"
10108-101080470 = "你有在聽廣播節目嗎？"
10108-101080480 = "偶爾會聽哦。怎麼突然問這個？"
10108-101080490 = "那個，你有沒有在上次的節目"
10108-101080500 = "唔嗯"
10108-101080510 = "果然還是算了"
10108-101080520 = "上次的節目？"
10108-101080530 = "什麼意思？"
10108-101080540 = "抱歉。可能是我誤會了"
10108-101080550 = "請不要在意"
10108-101080560 = "話說回來，優香"
10108-101080570 = "你的失眠症已經好了嗎？"
10108-101080580 = "果然……"
10108-101080590 = "是的，多虧老師的幫忙"
10108-101080600 = "今天也請多多指教"
10108-101080610 = "我才是，請你多多指教"

[translation]
10108-101080010 = "Sensei, are you sleeping?"
10108-101080020 = "No, I'm still awake."
10108-101080030 = "It's so late. Is everything okay?"
10108-101080040 = "I hope I'm not keeping you up..."
10108-101080050 = "But for some reason, I couldn't fall asleep today."
10108-101080060 = "I organized the financial report that I was supposed to submit to Schale tomorrow."
10108-101080070 = "I'll email it to you, so please take a look when you get a chance."
10108-101080080 = "Great work, Yuuka."
10108-101080090 = "Are you overworking yourself?"
10108-101080100 = "It's no problem. Everything about my schedule, including sleep, is perfect."
10108-101080110 = "Then I'll see you tomorrow. Have a good night."
10108-101080120 = "Thanks for your advice, Sensei."
10108-101080130 = "I've been falling asleep a lot more easily these days."
10108-101080140 = "Of course, I'm still up past midnight a lot, but..."
10108-101080150 = "I'm worried..."
10108-101080160 = "Is there something on your mind?"
10108-101080170 = "There's nothing really wrong."
10108-101080180 = "If there is something bothering me a little, it's that"
10108-101080190 = "<system> Message transmission error!"
10108-101080200 = "Yuuka...?"
10108-101080210 = "<system> Message transmission error!"
10108-101080220 = "<system> Message transmission error!"
10108-101080230 = "Sensei, on my way back earlier,"
10108-101080240 = "I saw a lot of boxes of instant cup noodles..."
10108-101080250 = "You haven't been eating cup noodles for your meals, have you?"
10108-101080260 = "They're not for me!"
10108-101080270 = "They're snacks for Student Reps who get hungry on the job!"
10108-101080280 = "Hmm..."
10108-101080290 = "I can approve of that, but..."
10108-101080300 = "You still better be eating proper meals at proper times!"
10108-101080310 = "Okay, okay..."
10108-101080320 = "What about you, Yuuka? Are you eating properly?"
10108-101080330 = "Well... Of course..."
10108-101080340 = "I'm eating well."
10108-101080350 = "Your response was a bit slow..."
10108-101080360 = "A while ago, Kotama recommended I listen to the radio at night."
10108-101080370 = "So I've been doing that to help me fall asleep."
10108-101080380 = "The radio does have its own charm."
10108-101080390 = "What program have you been listening to?"
10108-101080400 = "It's a show called \"DJ Mary's Music Journey.\""
10108-101080410 = "They read entertaining stories and play music to help you sleep."
10108-101080420 = "It's nice to listen to before going to bed."
10108-101080430 = "Maybe I should try it out on nights I can't sleep too."
10108-101080440 = "Yes."
10108-101080450 = "I hope you enjoy it as well."
10108-101080460 = "Um, Sensei?"
10108-101080470 = "Do you happen to listen to the radio?"
10108-101080480 = "Here and there. Why do you ask?"
10108-101080490 = "By any chance, during the last broadcast..."
10108-101080500 = "Hmm..."
10108-101080510 = "Never mind, it's nothing."
10108-101080520 = "The last broadcast?"
10108-101080530 = "What are you talking about?"
10108-101080540 = "I'm sorry. I must have been mistaken."
10108-101080550 = "Don't mind me."
10108-101080560 = "By the way, Yuuka."
10108-101080570 = "Is your insomnia cured now?"
10108-101080580 = "Oh..."
10108-101080590 = "Yes, thanks to you, Sensei..."
10108-101080600 = "I'll be counting on you again today!"
10108-101080610 = "I'm the one who should be saying that."

[translation]
13014-130140010 = "師父，你有聽過這種說法嗎？"
13014-130140020 = "類似衣服面積越少，防禦力越高之類的"
13014-130140030 = "像，像是比基尼鎧甲嗎？"
13014-130140040 = "你，你是從哪裡聽來的！？"
13014-130140050 = "當然我也知道這種說法很荒謬"
13014-130140060 = "穿著泳裝修煉什麼的，實在有點害羞"
13014-130140070 = "但是挑戰這種事情，不也是青春的一部分嗎？"
13014-130140080 = "所以今天我打算穿著泳裝修煉看看"
13014-130140090 = "要去游泳池嗎？"
13014-130140100 = "不，我要去山上"
13014-130140110 = "穿泳裝去山上！？"
13014-130140120 = "好──！"
13014-130140130 = "就這麼決定了！"
13014-130140140 = "師父你也帶上泳裝吧！"
13014-130140150 = "師父！順利回去了嗎？"
13014-130140160 = "今天的修煉真的很有趣吧？"
13014-130140170 = "果然……就算有點害羞，也值得鼓起勇氣"
13014-130140180 = "下次就是泳裝修煉第二彈……"
13014-130140190 = "到時候也一起來吧，師父！"
13014-130140200 = "……拜託下次請考慮泳裝不會掉的那種"
13014-130140210 = "哈哈，我會考慮的！"
13014-130140220 = "師父"
13014-130140230 = "泳裝修煉第二彈！"
13014-130140240 = "這次也陪我一起吧！"
13014-130140250 = "是什麼修煉？"
13014-130140260 = "這次的舞台是……"
13014-130140270 = "大海！"
13014-130140280 = "哦，海邊……！我要去！"
13014-130140290 = "呵呵，我就知道師父會喜歡"
13014-130140300 = "那我來安排時間，到時候見囉！"
13014-130140310 = "師父！順利回去了嗎？"
13014-130140320 = "哎呀，就算是我，想靠木筏脫困還是有點勉強啊"
13014-130140330 = "全身的肌肉都痛得要命呢"
13014-130140340 = "嗯？師父你還有在看嗎？"
13014-130140350 = "明明有顯示已讀卻沒有回覆"
13014-130140360 = "難道是連動手指的力氣都沒有了嗎……"
13014-130140370 = "哦　啊"
13014-130140380 = "…………"
13014-130140390 = "啊，果然是這樣啊"
13014-130140400 = "下次改試更輕鬆的修煉吧"
13014-130140410 = "我會再聯絡，在那之前好好休息吧"
13014-130140420 = "這次我想到了和海邊很搭的修煉"
13014-130140430 = "那就是營火晚會！"
13014-130140440 = "哦哦，營火晚會！"
13014-130140450 = "立刻出發吧！"
13014-130140460 = "呵呵，很有趣吧？"
13014-130140470 = "那我們待會見！"
13014-130140480 = "那個，師父"
13014-130140490 = "平安回去了吧？"
13014-130140500 = "這次好像又是我太過熱情了"
13014-130140510 = "讓你看到丟臉的一面了，抱歉"
13014-130140520 = "我沒事！"
13014-130140530 = "因為很開心所以沒關係！"
13014-130140540 = "嗯，你這麼說我就放心了。謝謝你，師父"
13014-130140550 = "那我們下次再見吧"
13014-130140560 = "到時候我一定會彌補今天的失誤！"
13014-130140570 = "那個"
13014-130140580 = "我有件事想和師父在海邊一起做……"
13014-130140590 = "可以陪我嗎？"
13014-130140600 = "這次不是修煉，所以不用有壓力"
13014-130140610 = "我想彌補一下營火晚會的事"
13014-130140620 = "好！只要蓮華開口，我哪裡都去！"
13014-130140630 = "嗯！謝謝你，師父！"
13014-130140640 = "那這次也在晚上的海邊見吧！"
13014-130140650 = "師父覺得今天怎麼樣？"
13014-130140660 = "煙火很有趣！"
13014-130140670 = "青春的感覺真好！"
13014-130140680 = "師父也滿意的話，我就放心了"
13014-130140690 = "我也……很開心"
13014-130140700 = "所以下次再一起放煙火吧"
13014-130140710 = "到時候我會準備更大的煙火"
13014-130140720 = "當然也不會太大的"
13014-130140730 = "嗯，我很期待！"
13014-130140740 = "嘿嘿，那下次再一起享受青春吧！"

[translation]
13014-130140010 = "스승님. 혹시 이런 이야기 들어봤어?"
13014-130140020 = "천의 면적이 적을수록 방어력이 높다는 이야기 말이야."
13014-130140030 = "비, 비키니 아머?"
13014-130140040 = "도, 도대체 어디서 들은 거야?!"
13014-130140050 = "물론 엉뚱한 이야기인 건 알아."
13014-130140060 = "수영복을 입고 수련을 한다니. 조, 조금 부끄럽기도 하고."
13014-130140070 = "하지만 그런 거에 도전하는 것도 청춘이잖아?"
13014-130140080 = "그래서 오늘은 수영복을 입고 수련을 해보려고."
13014-130140090 = "수영장이라도 가는 거야?"
13014-130140100 = "아니. 산에 갈 건데?"
13014-130140110 = "수영복으로?!"
13014-130140120 = "좋—아!"
13014-130140130 = "결정했어!"
13014-130140140 = "그러니까 스승님도 수영복을 가지고 와!"
13014-130140150 = "스승님! 잘 들어갔어?"
13014-130140160 = "오늘 수련 정말 재미있었지?"
13014-130140170 = "역시…… 조금 부끄러워도 용기를 낸 보람이 있었어."
13014-130140180 = "다음은 수영복 수련 제2탄이니까……."
13014-130140190 = "그때도 같이 하자, 스승님!"
13014-130140200 = "……부탁이니 다음엔 수영복이 안 벗겨지는 걸로."
13014-130140210 = "하핫, 고려해 볼게!"
13014-130140220 = "스승님."
13014-130140230 = "수영복 수련의 제2탄!"
13014-130140240 = "이번에도 같이 하자!"
13014-130140250 = "어떤 수련인데?"
13014-130140260 = "이번 무대는……"
13014-130140270 = "바다다!"
13014-130140280 = "오, 해변……! 갈래!"
13014-130140290 = "후후, 스승님도 좋아할 줄 알았어."
13014-130140300 = "그럼 일정 잡아볼 테니까 그날 보자!"
13014-130140310 = "스승님! 잘 들어갔어?"
13014-130140320 = "이야, 아무리 나라도 뗏목을 만들어서 탈출하는 건 조금 무리였나 봐."
13014-130140330 = "온몸에 근육통이 엄청나네."
13014-130140340 = "응? 스승님? 이거 보고 있는 거 맞지?"
13014-130140350 = "숫자가 사라지는데 답장이 없네."
13014-130140360 = "설마 손가락 움직일 힘도 없는 건……."
13014-130140370 = "ㅇㅇ"
13014-130140380 = "…………"
13014-130140390 = "아, 역시 그랬구나."
13014-130140400 = "그럼 다음에는 좀 더 쉬운 수련을 해보자."
13014-130140410 = "또 연락할게. 그때까지 푹 쉬고 있으라고."
13014-130140420 = "이번에도 해변과 어울리는 수련을 생각해 냈어."
13014-130140430 = "바로 캠프파이어야!"
13014-130140440 = "오오, 캠프파이어!"
13014-130140450 = "당장 가겠습니다!"
13014-130140460 = "후후, 재밌겠지?"
13014-130140470 = "그럼 바로 만나자!"
13014-130140480 = "저기, 스승님."
13014-130140490 = "잘 들어갔지?"
13014-130140500 = "이번에도 내 의욕이 과했던 것 같네."
13014-130140510 = "부끄러운 꼴을 당하게 해서 미안."
13014-130140520 = "난 괜찮아!"
13014-130140530 = "즐거웠으니까 됐어!"
13014-130140540 = "응. 그렇게 말해줘서 고마워 스승님."
13014-130140550 = "그럼 다음에 다시 봐."
13014-130140560 = "그땐 반드시 오늘의 실수를 만회하겠어!"
13014-130140570 = "저기 말이야."
13014-130140580 = "스승님과 해변에서 해보고 싶은 게 있는데……."
13014-130140590 = "같이 어울려주지 않을래?"
13014-130140600 = "이번엔 수련이 아니니까 부담 없을 거야."
13014-130140610 = "캠프파이어 사건도 만회하고 싶고."
13014-130140620 = "좋아! 렌게가 부른다면 어디든 갈게!"
13014-130140630 = "응! 고마워 스승님!"
13014-130140640 = "그럼 이번에도 밤에 해변에서 보자!"
13014-130140650 = "스승님. 오늘 어땠어?"
13014-130140660 = "불꽃놀이 재미있었어!"
13014-130140670 = "청춘을 느낄 수 있어서 좋았어!"
13014-130140680 = "스승님도 만족한 것 같아 다행이네."
13014-130140690 = "나도…… 즐거웠어."
13014-130140700 = "그러니까 다음에도 같이 불꽃놀이를 해보자."
13014-130140710 = "그때는 좀 더 큰 불꽃을 준비해 볼게."
13014-130140720 = "물론 너무 큰 건 말고."
13014-130140730 = "응. 기대하고 있을게!"
13014-130140740 = "헤헹, 그럼 다음에 또 청춘해 보자고!"

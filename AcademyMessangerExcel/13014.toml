[translation]
13014-130140010 = "ท่านอาจารย์ เคยได้ยินเรื่องแบบนี้บ้าง\nหรือเปล่า?"
13014-130140020 = "ที่บอกว่ายิ่งน้อยชิ้นมากเท่าไร\nค่าป้องกันก็จะยิ่งสูงขึ้นน่ะ"
13014-130140030 = "มะ... หมายถึงชุดเกราะบิกินีเหรอ?"
13014-130140040 = "ระ... เรื่องแบบนั้นไปได้ยินมาจากไหน?!"
13014-130140050 = "ฉันรู้ว่ามันฟังดูแปลก"
13014-130140060 = "พอฉันฝึกฝนในชุดว่ายน้ำ มะ... มันก็\nเขินอยู่หรอก"
13014-130140070 = "แต่การลองทำแบบนั้นก็เป็นเรื่องของ\nวัยรุ่นนี่เนอะ?"
13014-130140080 = "วันนี้ฉันก็เลยจะใส่ชุดว่ายน้ำฝึกน่ะ"
13014-130140090 = "จะไปฝึกในสระว่ายน้ำเหรอ?"
13014-130140100 = "ไม่นะ จะไปภูเขาต่างหากล่ะ?"
13014-130140110 = "ใส่ชุดว่ายน้ำไปน่ะนะ?!"
13014-130140120 = "ดีละ!"
13014-130140130 = "ฉันตัดสินใจแล้ว!"
13014-130140140 = "งั้นท่านอาจารย์ก็เอาชุดว่ายน้ำมาด้วยนะ!"
13014-130140150 = "ท่านอาจารย์! กลับไปถึงหรือยัง?"
13014-130140160 = "การฝึกฝนวันนี้สนุกเลยใช่มั้ย?"
13014-130140170 = "ถึงจะเขินนิดหน่อย... แต่ก็คุ้มค่าที่แสดงความกล้าออกมานะ"
13014-130140180 = "ต่อไปจะเป็นการฝึกว่ายน้ำรอบที่ 2..."
13014-130140190 = "ไว้ตอนนั้นก็มาฝึกด้วยกันนะท่านอาจารย์!"
13014-130140200 = "ขอร้องละ รอบหน้าขอแบบชุดว่ายน้ำไม่หลุดนะ..."
13014-130140210 = "ฮ่าฮ่า แล้วฉันจะเก็บไปคิดดูนะ!"
13014-130140220 = "ท่านอาจารย์"
13014-130140230 = "การฝึกว่ายน้ำรอบที่ 2!"
13014-130140240 = "รอบนี้ก็มาฝึกด้วยกันนะ!"
13014-130140250 = "เป็นการฝึกแบบไหนเหรอ?"
13014-130140260 = "ครั้งนี้จะเป็นการฝึกใน..."
13014-130140270 = "ทะเลยังไงล่ะ!"
13014-130140280 = "โอ้ ไปทะเลเหรอ...! ครูไปด้วย!"
13014-130140290 = "ฮุฮุ กะไว้แล้วว่าท่านอาจารย์ก็อยากไป"
13014-130140300 = "แล้วฉันจะนัดตารางให้นะ ไว้เจอกันล่ะ!"
13014-130140310 = "ท่านอาจารย์! กลับไปถึงหรือยัง?"
13014-130140320 = "ต่อให้เป็นฉัน แต่การสร้างแพแล้วหนี\nออกมาก็เป็นงานหนักอยู่นะ"
13014-130140330 = "ตอนนี้ฉันปวดไปทั้งตัวเลย"
13014-130140340 = "หืม? ท่านอาจารย์? อ่านอยู่ใช่มั้ย?"
13014-130140350 = "ขึ้นว่าอ่านแล้ว แต่ทำไมไม่ตอบล่ะ?"
13014-130140360 = "ถ้าไม่มีแรงแม้แต่จะขยับนิ้ว ให้กด 1"
13014-130140370 = "1"
13014-130140380 = "........."
13014-130140390 = "เป็นอย่างนั้นจริงๆ สินะ"
13014-130140400 = "งั้นรอบหน้าเราฝึกอะไรง่ายๆ แล้วกัน"
13014-130140410 = "แล้วฉันจะติดต่อไปใหม่นะ ระหว่างนี้ก็\nพักรักษาตัวให้ดีล่ะ"
13014-130140420 = "ฉันคิดได้แล้วว่าครั้งนี้จะไปฝึกอะไร\nที่ชายหาดดี"
13014-130140430 = "ฝึกก่อกองไฟยังไงล่ะ!"
13014-130140440 = "โอ้ ก่อกองไฟ!"
13014-130140450 = "ครูจะไปเดี๋ยวนี้เลย!"
13014-130140460 = "ฮุฮุ น่าสนุกใช่มั้ยล่ะ?"
13014-130140470 = "งั้นก็มาเจอกันเลยนะ!"
13014-130140480 = "นี่ ท่านอาจารย์!"
13014-130140490 = "ถึงแล้วใช่มั้ย?"
13014-130140500 = "ครั้งนี้ฉันก็คงทะเยอทะยานมากไป\nหน่อยน่ะ"
13014-130140510 = "ขอโทษที่ทำให้ตกอยู่ในสภาพนั้นนะ"
13014-130140520 = "ครูไม่เป็นไรหรอก!"
13014-130140530 = "แค่สนุกก็พอแล้วละ!"
13014-130140540 = "อื้อ ขอบคุณที่พูดอย่างนั้นนะ\nท่านอาจารย์"
13014-130140550 = "งั้นไว้เจอกันใหม่นะ"
13014-130140560 = "ครั้งหน้าฉันจะไม่ทำพลาดอย่างวันนี้\nแน่นอน!"
13014-130140570 = "ท่านอาจารย์"
13014-130140580 = "ฉันมีสิ่งที่อยากทำกับท่านอาจารย์\nในชายหาดน่ะ..."
13014-130140590 = "ช่วยไปด้วยกันอีกได้มั้ย?"
13014-130140600 = "ครั้งนี้ไม่ใช่การฝึกฝน เพราะงั้นก็ไม่\nต้องกดดันนะ"
13014-130140610 = "ฉันอยากชดเชยความผิดพลาดเรื่อง\nก่อกองไฟด้วยน่ะ"
13014-130140620 = "ได้สิ! ถ้าเรนเกะชวน ไม่ว่าที่ไหน\nครูก็ไปอยู่แล้ว!"
13014-130140630 = "อื้อ! ขอบคุณนะ ท่านอาจารย์!"
13014-130140640 = "งั้นเจอกันที่ชายหาดตอนกลางคืนนะ!"
13014-130140650 = "ท่านอาจารย์ วันนี้เป็นยังไงบ้าง?"
13014-130140660 = "ได้เล่นไฟเย็นสนุกเลยละ!"
13014-130140670 = "ครูชอบที่ได้สัมผัสความเป็นวัยรุ่น\nอีกครั้งนะ!"
13014-130140680 = "ค่อยยังชั่วหน่อยนะที่ท่านอาจารย์สนุก"
13014-130140690 = "ฉันก็... สนุกเหมือนกัน"
13014-130140700 = "งั้นคราวหน้าเราก็ไปเล่นกันอีกนะ"
13014-130140710 = "ไว้คราวหน้าฉันจะเตรียมดอกไม้ไฟ\nไปเลยละ"
13014-130140720 = "แน่นอนว่าไม่เอาให้ใหญ่เกินไปหรอก"
13014-130140730 = "อื้อ ครูจะตั้งตารอเลย!"
13014-130140740 = "ฮุฮุ ไว้คราวหน้าเราไปทำกิจกรรมวัยรุ่น\nกันอีกนะ!"

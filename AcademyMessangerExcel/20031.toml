[translation]
20031-200310010 = "선생님."
20031-200310020 = "전에 샬레의 휴게실을 보수하는 데 다다미가 필요하다고 하지 않았었어?"
20031-200310030 = "응. 좌식 휴게실을 원하는 학생들이 몇 있어서……"
20031-200310040 = "그런 이야기를 한 것 같기는 한데…… 갑자기 왜?"
20031-200310050 = "그럼 다음에 구교사에 올 때 다다미 좀 가져가."
20031-200310060 = "저번에 무너진 온천장을 정리하다가 창고에 쌓아 놨던 고급 다다미를 잔뜩 찾았거든."
20031-200310070 = "특별반에서 직접 쓰지 그래?"
20031-200310080 = "음, 푹신하고 좋은 향이 나기는 하지만……"
20031-200310090 = "다다미 바닥은 썩기 쉬우니까. 구교사의 환경에는 그다지 적합하지 않은 것 같아서."
20031-200310100 = "하지만 이대로 방치해 두는 것도 아깝고……"
20031-200310110 = "이왕이면 필요한 곳에서 가져다 쓰는 편이 좋을 것 같아서."
20031-200310120 = "하지만 구교사의 물건을 가져다 쓰려니 어쩐지 미안한걸."
20031-200310130 = "구교사의 보수에 필요한 재료는 부족하지 않아?"
20031-200310140 = "괜찮아. 무너진 폐허에서 필요한 자재는 충분히 구할 수 있었거든."
20031-200310150 = "그 밖에 아쉬운 점이라면……"
20031-200310160 = "역시 입을 달래 줄 만한 간식 정도려나."
20031-200310170 = "다른 식재료라면 야생에서도 얼마든지 구할 수 있는데, 달콤한 과자는 언제나 아쉽거든."
20031-200310180 = "그럼 다음에 기회가 되면 과자를 좀 사 갈게."
20031-200310190 = "후후, 기대하고 있겠어."
20031-200310200 = "그럼 다음에 보자, 선생님."
20031-200310210 = "확실히 지하수의 수압이 예전 같지가 않네"
20031-200310220 = "저번에 청소를 한 뒤로 벌써 며칠이나 지났는데, 아직도 탕에 물이 거의 차지 않았어."
20031-200310230 = "목욕을 할 수 있으려면 앞으로 1주일은 물을 더 받아야 할 것 같은데……"
20031-200310240 = "그동안 목욕이나 샤워는 어떻게 하려고?"
20031-200310250 = "뭐, 귀찮지만 하는 수 없지."
20031-200310260 = "전처럼 얼어붙은 강에서 냉수 목욕을 하는 수밖에"
20031-200310270 = "하지만 냉수 목욕은 건강에 좋지 않을 텐데……"
20031-200310280 = "대신 다른 곳에서 목욕을 하는 건 어때?"
20031-200310290 = "으음. 어떠려나……"
20031-200310300 = "아무리 정학 처분을 받은 특별반의 학생이라 하더라도"
20031-200310310 = "광장에 설치된 온수 분수대에서 목욕을 하면 큰 소동이 벌어질 텐데……"
20031-200310320 = "다른 목욕탕에 가자는 뜻이었다고!"
20031-200310330 = "지난번에 후르츠 밀크를 만든 뒤로 계속 시험해 봤는데"
20031-200310340 = "다른 음료수와는 달리 후르츠 밀크는 갓 섞은 게 제일 맛있는 것 같더라고"
20031-200310350 = "우유에 섞인 과일은 향이나 식감이 변질되기 쉬우니까"
20031-200310360 = "그렇긴 하지……"
20031-200310370 = "게다가 우유는 상하기도 쉬우니까."
20031-200310380 = "그런데 보통의 온천장에서는 미리 만들어 둔 후르츠 밀크를 팔잖아?"
20031-200310390 = "그래서 개선 아이디어를 하나 생각해 봤는데……"
20031-200310400 = "휴게실 카운터에 바텐더가 상주하고 있다가 손님이 목욕을 하고 나오면 바로 후르츠 밀크를 블렌딩해 주는 거야."
20031-200310410 = "그럼 후르츠 밀크의 맛도 살릴 수 있고, 손님의 취향에 맞는 맞춤 서비스도 제공할 수 있겠지?"
20031-200310420 = "재미있는 생각이기는 하지만……"
20031-200310430 = "우유 하나 때문에 일부러 종업원을 고용하는 온천장이 있을까?"
20031-200310440 = "그래서 목욕탕 사장님께 소개받은 다른 온천장에서"
20031-200310450 = "시험 삼아 며칠간 일해보기로 했어."
20031-200310460 = "……갑자기?"
20031-200310470 = "……선생님. 결국 감기에 걸렸다며?"
20031-200310480 = "아까 돌아가는 길에 잠깐 샬레에 들를 일이 있어서"
20031-200310490 = "휴게실에 생강과 홍차를 섞은 우유를 두고 왔어."
20031-200310500 = "몸이 으슬으슬할 때마다 조금씩 데워서 마시도록 해"
20031-200310510 = "지금의 나에게 딱 맞는 우유 블렌딩이네……"
20031-200310520 = "일부러 챙겨줘서 고마워."
20031-200310530 = "그러니까 처음부터 나랑 같이 이불을 덮고 잤으면 좋았을 텐데."
20031-200310540 = "오늘은 꼭 두꺼운 이불을 덮고 푹 자도록 해."
20031-200310550 = "……술에는 의존하지 말고."
20031-200310560 = "……명심하겠습니다."
20031-200310570 = "선생님, 지난번에 청소한 구교사의 탕에 물을 다시 모두 채웠어"
20031-200310580 = "그사이에 겸사겸사 주변 환경도 정리하고 새 입욕제도 넣어두었으니"
20031-200310590 = "나중에 괜찮다면 선생님도 한 번 목욕하러 와"
20031-200310600 = "탕이 복구되었다니 다행이지만……"
20031-200310610 = "설마 또 와인을 넣은 건 아니겠지?"
20031-200310620 = "후후, 어떠려나"
20031-200310630 = "의심스러우면 구교사에 한 번 직접 와보는 건 어때?"
20031-200310640 = "기다리고 있을게, 선생님."

[translation]
20031-200310010 = "Sensei."
20031-200310020 = "Didn't you say that you needed some tatami mats for Schale's lounge?"
20031-200310030 = "Yup. A few of the students would like to be able to sit comfortably on the floor."
20031-200310040 = "I think I mentioned it, but... Why do you ask?"
20031-200310050 = "Next time you visit the Former Institute, I'll have some tatami mats for you."
20031-200310060 = "I found a whole bunch of fine tatami in storage when we were cleaning up after the hot spring resort."
20031-200310070 = "The Spec Ops students don't want them?"
20031-200310080 = "Well... They are pretty soft, and they smell nice, but..."
20031-200310090 = "Tatami floors rot too easily. I don't think the Former Institute is a good place for them."
20031-200310100 = "And just leaving them in storage is a waste..."
20031-200310110 = "I think it'd be better to give them to someone who'll actually use them."
20031-200310120 = "I feel bad taking anything from the Former Institute."
20031-200310130 = "Don't you need materials for your renovations and repairs?"
20031-200310140 = "It's all right. We can find plenty of materials scavenging around the nearby ruins."
20031-200310150 = "If there's anything we don't have enough of..."
20031-200310160 = "It's snacks. Good ones to keep our mouths entertained."
20031-200310170 = "There's more than enough food if we forage in the wild, but sweets are always in short supply."
20031-200310180 = "I'll bring some cookies next time I swing by."
20031-200310190 = "Heehee. I'm looking forward to it."
20031-200310200 = "See you later, Sensei."
20031-200310210 = "The spring is taking a really long time to refill."
20031-200310220 = "It's already been a few days since we emptied it out, and there's hardly enough water to splash around in."
20031-200310230 = "It'll be another week at least until we can take a hot bath..."
20031-200310240 = "How are you going to keep clean in the meantime?"
20031-200310250 = "It'll be a pain, but there's no helping it."
20031-200310260 = "We'll have to bathe in the frozen river like before."
20031-200310270 = "Cold baths aren't good for you, you know..."
20031-200310280 = "Why not bathe somewhere else?"
20031-200310290 = "Mm. I wonder..."
20031-200310300 = "Even if they expect it from suspended students like us,"
20031-200310310 = "it'll cause a scene if we try bathing in the heated fountains in the plaza..."
20031-200310320 = "I meant in another bath!"
20031-200310330 = "I've been experimenting with my fruit milk recipes."
20031-200310340 = "The thing about fruit milk is that it's always most delicious right after it's mixed."
20031-200310350 = "If you leave it sitting too long, you start getting changes in the smell and texture."
20031-200310360 = "I suppose so."
20031-200310370 = "And of course, there's also the danger of the milk spoiling."
20031-200310380 = "But most hot spring resorts and bathhouses just sell drinks they got from a store, right?"
20031-200310390 = "So I had an idea..."
20031-200310400 = "What if there was a bartender in the lounge area, and whenever a customer finished their bath, the bartender mixed them up a fresh fruit milk on the spot?"
20031-200310410 = "That way, not only does the customer get the best fruit milk possible, but it's also tailor-made for their taste!"
20031-200310420 = "It's an interesting idea, but..."
20031-200310430 = "Are there any hot spring resorts that would hire someone just for that?"
20031-200310440 = "The only way to know for sure is to try it out. So I'm doing an experiment."
20031-200310450 = "The owner of the bathhouse in town set me up with a temporary job at another hot spring resort."
20031-200310460 = "...Well that's pretty sudden."
20031-200310470 = "Sensei. I hear you caught a cold."
20031-200310480 = "I had to stop by near Schale on my way home."
20031-200310490 = "I left some ginger and milk tea for you in the lounge."
20031-200310500 = "Please help yourself if you're feeling chilly."
20031-200310510 = "You've picked out just the milk blend I need..."
20031-200310520 = "Thank you for taking care of me."
20031-200310530 = "You should have just shared a futon with me like I asked."
20031-200310540 = "Make sure to use extra thick blankets tonight."
20031-200310550 = "Alcohol is not enough to keep you warm."
20031-200310560 = "I'll keep that in mind..."
20031-200310570 = "Sensei, we finally managed to refill the bath."
20031-200310580 = "I've tidied up the whole place and put in some bath bombs too."
20031-200310590 = "I'd love it if you came and had a bath here."
20031-200310600 = "I'm glad to hear the bath is fixed..."
20031-200310610 = "You didn't use wine again, did you?"
20031-200310620 = "Heehee... I wonder."
20031-200310630 = "If you're suspicious, come and see for yourself."
20031-200310640 = "I'll be waiting, Sensei."

[translation]
20031-200310010 = "คุณครู"
20031-200310020 = "ก่อนหน้านี้เคยบอกว่าอยากได้เสื่อ\nทาทามิไปใช้ในห้องพักผ่อนของ\nชาเล่ต์ใช่มั้ย?"
20031-200310030 = "อื้ม มีนักเรียกหลายคนที่อยากได้\nห้องพักผ่อนแบบนั่งพื้นน่ะ..."
20031-200310040 = "ครูน่าจะเคยพูดไว้...มั้ง?\nจู่ๆ ถามทำไมเหรอ?"
20031-200310050 = "งั้นคราวหน้าถ้ามาอาคารเรียนเก่า\nก็มาเอาเสื่อทาทามิไปด้วยนะ"
20031-200310060 = "ตอนเก็บกวาดบ่อออนเซ็นที่พัง\nฉันเจอเสื่อทาทามิในโกดังเพียบเลย"
20031-200310070 = "ไม่เอาไปใช้ในห้องเรียนพิเศษเหรอ?"
20031-200310080 = "อืม มันก็นุ่มและมีกลิ่นหอมดีหรอกนะ..."
20031-200310090 = "แต่พื้นเสื่อทาทามิมันผุง่าย มันไม่น่า\nจะเหมาะกับสภาพแวดล้อมของอาคาร\nเรียนเก่าน่ะ"
20031-200310100 = "แต่จะให้ทิ้งไว้อย่างนี้ก็เสียของ..."
20031-200310110 = "ไหนๆ ก็ไหนๆ แล้ว ถ้าได้เอาไปใช้ใน\nที่ที่จำเป็นก็น่าจะดีกว่า"
20031-200310120 = "ถ้าเอาของของอาคารเรียนเก่ามาใช้\nครูก็คงรู้สึกผิดอยู่นะ"
20031-200310130 = "แล้ววัสดุที่ใช้บูรณะอาคารเรียนเก่า\nจะพอใช้เหรอ?"
20031-200310140 = "อื้ม ไม่เป็นไรหรอก พวกฉันหาวัสดุ\nจำเป็นจากในซากที่ถล่มมาได้\nเพียงพอแล้วน่ะ"
20031-200310150 = "แต่ถ้าพูดถึงเรื่องของที่เรามีไม่พอ..."
20031-200310160 = "ก็คงเป็นพวกของว่างที่เอาไว้กินฮีลใจ"
20031-200310170 = "ถ้าเป็นวัตถุดิบอาหารอย่างอื่น ฉันพอ\nจะหาในป่าเอาได้ แต่ถ้าเป็นพวกขนมหวาน\nละก็..."
20031-200310180 = "งั้นคราวหน้าถ้าแวะไป ครูจะเอาขนมไปให้นะ"
20031-200310190 = "ฮุฮุ แล้วฉันจะตั้งตารอนะ"
20031-200310200 = "งั้นเอาไว้เจอกันใหม่นะคุณครู"
20031-200310210 = "แรงดันน้ำใต้ดินดูลดลงจากเดิมแฮะ"
20031-200310220 = "นี่ก็ผ่านไปหลายวันแล้วตั้งแต่ทำความ\nสะอาดครั้งก่อน แต่น้ำในบ่อก็ยังไม่เต็มเลย"
20031-200310230 = "กว่าจะลงไปอาบน้ำได้ คงต้องรอ\nน้ำอีก 1 สัปดาห์แน่เลย..."
20031-200310240 = "แล้วระหว่างนั้นจะอาบน้ำกันยังไงล่ะ?"
20031-200310250 = "ก็... ถึงจะไม่อยากทำ แต่ก็ช่วยไม่ได้น่ะ"
20031-200310260 = "ฉันคงต้องไปอาบน้ำเย็นๆ จากลำธาร\nที่เป็นน้ำแข็งเหมือนเดิม"
20031-200310270 = "แต่อาบน้ำเย็นขนาดนั้น\nมันไม่ดีต่อสุขภาพนะ..."
20031-200310280 = "ไปอาบน้ำที่อื่นแทนไม่ดีกว่าเหรอ?"
20031-200310290 = "อืม... เอายังไงดีนะ"
20031-200310300 = "ถึงจะเป็นนักเรียนห้องเรียนพิเศษที่ถูก\nลงโทษพักการเรียนก็เถอะ"
20031-200310310 = "แต่ถ้าไปอาบน้ำในลานน้ำพุร้อนกลาง\nจัตุรัส ก็คงจะวุ่นวายไม่น้อยแน่ๆ..."
20031-200310320 = "ครูหมายถึงให้ไปโรงอาบน้ำที่อื่น\nต่างหากเล่า!"
20031-200310330 = "หลังจากทำนมรสผลไม้ครั้งก่อน\nฉันก็ทดลองสูตรใหม่มาเรื่อยๆ"
20031-200310340 = "จนมารู้ว่านมรสผลไม้ต่างกับเครื่องดื่ม\nอื่นตรงที่มันจะอร่อยที่สุดตอนทำเสร็จใหม่ๆ"
20031-200310350 = "เพราะถ้าทิ้งไว้นานๆ กลิ่นและเนื้อ\nสัมผัสของผลไม้ที่ผสมกับนม\nจะเริ่มเปลี่ยนไปน่ะ"
20031-200310360 = "มันก็จริงนะ..."
20031-200310370 = "แถมนมยังเสียง่ายอีก"
20031-200310380 = "แต่ปกติแล้วในโรงอาบน้ำจะขายนมรส\nผลไม้ที่ทำเตรียมไว้ก่อนแล้ว"
20031-200310390 = "ฉันก็เลยคิดหาไอเดียดีๆ ที่จะพัฒนา\nเครื่องดื่มนี้ได้..."
20031-200310400 = "นั่นก็คือให้บาร์เทนเดอร์ประจำอยู่ที่\nเคาน์เตอร์ห้องพักผ่อน แล้วก็ผสมนมรส\nผลไม้ให้กับลูกค้าที่อาบน้ำออกมาน่ะ"
20031-200310410 = "ถ้าทำแบบนั้นนมรสผลไม้ก็จะยังอร่อย\nอยู่ แล้วก็ยังเสิร์ฟนมรสผลไม้ให้ตรงกับ\nความชื่นชอบของลูกค้าได้ด้วย"
20031-200310420 = "มันก็ดูเป็นความคิดที่น่าสนใจอยู่\nหรอกนะ..."
20031-200310430 = "แต่มีโรงอาบน้ำไหนจ้างพนักงาน\nมาเสิร์ฟนมโดยเฉพาะด้วยเหรอ?"
20031-200310440 = "ก็นั่นแหละ ฉันก็เลยไปลองๆ ฝึกงานที่\nโรงอาบน้ำอื่น"
20031-200310450 = "ที่เจ้าของโรงอาบน้ำที่รู้จักแนะนำให้น่ะ"
20031-200310460 = "...กะทันหันมากเลยนะ?"
20031-200310470 = "...คุณครู ได้ยินว่าเป็นหวัดเหรอ?"
20031-200310480 = "ระหว่างทางกลับเมื่อกี้ ฉันมีธุระต้อง\nแวะไปที่ชาเล่ต์"
20031-200310490 = "ก็เลยเอานมรสขิงกับชาแดงไปวางไว้\nที่ห้องพักผ่อนให้แล้วนะ"
20031-200310500 = "เวลาหนาวๆ ก็อุ่นนมแล้วจิบทีละนิดนะ"
20031-200310510 = "น่าจะเป็นนมที่เหมาะกับครู\nตอนนี้ที่สุดเลยละ..."
20031-200310520 = "ขอบใจที่เอามาให้นะ"
20031-200310530 = "ถ้ายอมนอนในผ้าห่มกับฉัน\nตั้งแต่แรก ก็คงไม่เป็นหวัดหรอก"
20031-200310540 = "วันนี้ก็นอนห่มผ้าหนาๆ ด้วยล่ะ"
20031-200310550 = "...แล้วก็ไม่ต้องไปพึ่งพาเหล้าให้ร่าง\nกายอบอุ่นหรอกนะ"
20031-200310560 = "...น้อมรับคำสั่ง"
20031-200310570 = "คุณครู บ่อออนเซ็นของอาคารเรียนเก่า\nที่ทำความสะอาดไปคราวก่อน ตอนนี้\nน้ำเต็มแล้วนะ"
20031-200310580 = "ระหว่างนั้นฉันเตรียมพื้นที่รอบๆ ไว้\nแล้วก็ใส่บาธบอมบ์ใหม่ไว้ด้วยแล้วละ"
20031-200310590 = "ไว้ถ้าคุณครูมีเวลาก็แวะมาแช่น้ำได้นะ"
20031-200310600 = "โล่งอกไปทีนะที่ซ่อมแซมบ่อได้แล้ว..."
20031-200310610 = "ไม่ได้ใส่ไวน์ลงไปในบ่ออีกใช่มั้ย?"
20031-200310620 = "ฮุฮุ ใส่ไปรึเปล่าน้า?"
20031-200310630 = "ถ้าสงสัยก็ลองมาพิสูจน์เองกับตา\nที่อาคารเรียนเก่าสิ"
20031-200310640 = "แล้วฉันจะรอนะคุณครู"

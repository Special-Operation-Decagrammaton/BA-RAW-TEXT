[translation]
10116-101160010 = "선생. 혹시 바쁜가?"
10116-101160020 = "아니! 전혀!"
10116-101160030 = "마침 한가한 참이었어!"
10116-101160040 = "그, 그렇군."
10116-101160050 = "선생의 조언이 필요하다."
10116-101160060 = "미안하지만……. 잠시 샬레에 들러도 괜찮겠나?"
10116-101160070 = "물론이지!"
10116-101160080 = "상담은 언제나 환영이야!"
10116-101160090 = "……알겠다."
10116-101160100 = "그럼 곧 가지."
10116-101160110 = "선생. 나다."
10116-101160120 = "뭔가 많은 일이 있었던 것 같지만……."
10116-101160130 = "덕분에 자연스러운 포즈에 대해 알게 되었다."
10116-101160140 = "그러니까…… 감사하다는 말이다."
10116-101160150 = "이 빚은 언젠가 갚도록 하지."
10116-101160160 = "나는 사오리의 사진이면 되는데."
10116-101160170 = "그건 안 된다!"
10116-101160180 = "선생. 시간 괜찮은가?"
10116-101160190 = "물론이지! 오늘은 무슨 일이야?"
10116-101160200 = "그게…… 또 부탁이 있다."
10116-101160210 = "염치없지만, 선생 외엔 부탁할 사람이 없어."
10116-101160220 = "그렇게 말하니까 더 기대되네!"
10116-101160230 = "대체 어떤 일이길래?"
10116-101160240 = "지난번의 피팅 모델 관련이다."
10116-101160250 = "이번엔 드레스를 입고 춤추는 모습을 찍자더군."
10116-101160260 = "하지만 난 춤을 모른다."
10116-101160270 = "그래서 알려줄 사람이 필요한데…… 가능한가?"
10116-101160280 = "당장 하겠습니다!"
10116-101160290 = "……그럼 미안하지만"
10116-101160300 = "내가 보낸 주소로 와주길 바란다."
10116-101160310 = "선생. 잘 들어갔나?"
10116-101160320 = "조금 갑작스럽지만"
10116-101160330 = "방금 촬영팀에게 연락이 왔다."
10116-101160340 = "……춤추는 장면의 촬영이 취소됐다고."
10116-101160350 = "갑자기 기획이 변경된 모양이던데"
10116-101160360 = "뭔가 어른의 사정이 있는 것 같다."
10116-101160370 = "시간 내어 도와줬는데 정말 미안하다."
10116-101160380 = "괜찮아! 즐거웠으니까!"
10116-101160390 = "이걸로 사오리의 인사는 나만의 것이 됐네!"
10116-101160400 = "그, 그런가?"
10116-101160410 = "아무튼 이번 일로 또 다른 사회 경험을 했어."
10116-101160420 = "이것도 앞으로의 생활에 도움이 되겠지."
10116-101160430 = "그럼, 선생."
10116-101160440 = "다음에도 잘 부탁하지."
10116-101160450 = "선생."
10116-101160460 = "오늘 일정 괜찮나?"
10116-101160470 = "물론이지!"
10116-101160480 = "사오리를 위한 일정은 항상 비어 있어!"
10116-101160490 = "그렇군."
10116-101160500 = "모델 아르바이트의 대금이 들어왔다."
10116-101160510 = "그래서 그동안 신세 진 것에 대한 은혜를 갚고 싶은데."
10116-101160520 = "이럴 땐 비싼 식당에서 비싼 음식을 사주는 거라 들었어."
10116-101160530 = "난 비싼 음식보다 간단한 게 더 좋은데."
10116-101160540 = "음, 그런가? 하지만……."
10116-101160550 = "가격보단 마음이 중요한 거야!"
10116-101160560 = "……그래. 알겠다."
10116-101160570 = "그럼, 선생이 평소에 자주 가는 식당 거리에서 만나지."
10116-101160580 = "약속 시간에 맞춰 기다리고 있겠어."
10116-101160590 = "선생."
10116-101160600 = "그…… 오늘은 정말 즐거웠다."
10116-101160610 = "선생의 요리도 훌륭했어."
10116-101160620 = "오늘은 내가 보답하려 했는데"
10116-101160630 = "또 신세를 지고 말았군."
10116-101160640 = "아니야. 신세는 내가 졌는걸."
10116-101160650 = "다음에는 정말 제대로 대접하겠다."
10116-101160660 = "아…… 그리고 혹시나 해서 또 강조한다만."
10116-101160670 = "오늘 찍은 사진, 절대로 다른 사람은 보여주면 안 된다."
10116-101160680 = "절대로다."

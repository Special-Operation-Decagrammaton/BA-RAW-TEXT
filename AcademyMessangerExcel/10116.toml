[translation]
10116-101160010 = "ครู ยุ่งอยู่หรือเปล่า?"
10116-101160020 = "ไม่ยุ่ง! ไม่เลยสักนิด!"
10116-101160030 = "กำลังว่างอยู่พอดีเลย!"
10116-101160040 = "งะ... งั้นสินะ"
10116-101160050 = "ฉันอยากได้คำแนะนำจากครูน่ะ"
10116-101160060 = "ขอโทษนะ... ฉันขอแวะไปที่ชาเล่ต์\nสักเดี๋ยวได้มั้ย?"
10116-101160070 = "ได้อยู่แล้ว!"
10116-101160080 = "มาปรึกษาครูได้ตลอดเลย!"
10116-101160090 = "เข้าใจแล้ว..."
10116-101160100 = "งั้นจะไปเดี๋ยวนี้ละ"
10116-101160110 = "ครู ฉันเองนะ"
10116-101160120 = "มีเรื่องเกิดขึ้นมากมายเลย..."
10116-101160130 = "แต่มันก็ทำให้ฉันได้เรียนรู้ท่าโพสที่เป็น\nธรรมชาติ"
10116-101160140 = "เพราะงั้นก็... ขอบคุณนะ"
10116-101160150 = "ไว้ฉันจะตอบแทนบุญคุณนะ"
10116-101160160 = "ครูขอเป็นรูปของซาโอริก็พอ"
10116-101160170 = "อันนั้นไม่ได้สิ!"
10116-101160180 = "ครู พอจะมีเวลามั้ย?"
10116-101160190 = "มีอยู่แล้ว! วันนี้มีเรื่องอะไรเหรอ?"
10116-101160200 = "คือว่า... ฉันมีเรื่องจะขอร้องอีกแล้ว"
10116-101160210 = "ถึงมันจะน่าอาย แต่ฉันไม่มีใครให้ไป\nขอร้องแล้วน่ะ"
10116-101160220 = "พูดแบบนี้ก็ยิ่งอยากรู้นะ!"
10116-101160230 = "เป็นเรื่องอะไรงั้นเหรอ?"
10116-101160240 = "เรื่องเกี่ยวกับการเป็นนางแบบ\nครั้งก่อนน่ะ"
10116-101160250 = "ครั้งนี้เป็นการถ่ายวิดีโอตอนฉันเต้นใน\nชุดเดรส"
10116-101160260 = "แต่ว่าฉันเต้นไม่เป็นน่ะสิ"
10116-101160270 = "ฉันก็เลยอยากให้ใครมาสอน...\nครูพอไหวหรือเปล่า?"
10116-101160280 = "ไหวอยู่แล้ว!"
10116-101160290 = "ถ้างั้นก็..."
10116-101160300 = "ช่วยมาตามที่อยู่ที่ฉันส่งไปนะ"
10116-101160310 = "ครู กลับไปถึงหรือยัง?"
10116-101160320 = "มันกะทันหันไปหน่อย"
10116-101160330 = "แต่ทีมถ่ายทำเพิ่งติดต่อมา"
10116-101160340 = "ทางนั้นบอกว่ายกเลิกฉากเต้นรำน่ะ..."
10116-101160350 = "เหมือนว่าแพลนจะเปลี่ยนอย่าง\nกะทันหันเลย"
10116-101160360 = "ทางนั้นคงมีเหตุผลละนะ"
10116-101160370 = "ครูเสียเวลามาช่วยฉันไว้แท้ๆ\nขอโทษจริงๆ นะ"
10116-101160380 = "ไม่เป็นไรเลย! มันก็สนุกดีนี่นา!"
10116-101160390 = "งั้นครูคงเป็นคนเดียวที่ได้เห็น\nการทักทายของซาโอริสินะ!"
10116-101160400 = "งะ... งั้นเหรอ?"
10116-101160410 = "งานนี้ทำให้ฉันมีประสบการณ์ทางสังคม\nในรูปแบบอื่น"
10116-101160420 = "มันคงเป็นประโยชน์ในการใช้ชีวิตต่อไป\nของฉันด้วย"
10116-101160430 = "งั้นก็"
10116-101160440 = "ไว้ต่อไปก็รบกวนด้วยนะครู"
10116-101160450 = "ครู"
10116-101160460 = "วันนี้ติดงานอะไรหรือเปล่า?"
10116-101160470 = "ไม่ติดอยู่แล้ว!"
10116-101160480 = "ครูมีเวลาให้ซาโอริเสมอเลย!"
10116-101160490 = "งั้นสินะ"
10116-101160500 = "ฉันได้ค่าจ้างงานนางแบบพาร์ทไทม์\nมาแล้ว"
10116-101160510 = "ก็เลยอยากตอบแทนที่ครูเคยช่วยฉัน\nเอาไว้น่ะ"
10116-101160520 = "ได้ยินว่าควรตอบแทนด้วยการซื้อ\nอาหารแพงๆ ในร้านหรูๆ ให้"
10116-101160530 = "ครูชอบอาหารง่ายๆ มากกว่า\nอาหารแพงๆ นะ"
10116-101160540 = "อืม... งั้นเหรอ? แต่ว่า..."
10116-101160550 = "สิ่งสำคัญอยู่ที่ใจ ไม่ใช่ราคา!"
10116-101160560 = "อืม... เข้าใจแล้ว"
10116-101160570 = "งั้นไปเจอกันที่ถนนร้านอาหารที่ครูไป\nบ่อยๆ แล้วกัน"
10116-101160580 = "แล้วฉันจะไปรอที่นั่นนะ"
10116-101160590 = "ครู"
10116-101160600 = "เอ่อ... วันนี้ฉันสนุกมากเลย"
10116-101160610 = "อาหารที่ครูเลี้ยงก็อร่อยมาก"
10116-101160620 = "วันนี้ฉันจะไปตอบแทนบุญคุณแท้ๆ"
10116-101160630 = "แต่ได้เป็นหนี้บุญคุณอีกแล้ว"
10116-101160640 = "ไม่หรอก ครูต่างหากที่เป็นหนี้บุญคุณ"
10116-101160650 = "ครั้งหน้าจะตอบแทนให้อย่างดีเลย"
10116-101160660 = "อ่า... ฉันขอย้ำอีกครั้ง"
10116-101160670 = "รูปที่ถ่ายวันนี้ ห้ามเอาให้คนอื่นดูนะ"
10116-101160680 = "ห้ามเด็ดขาดเลย"

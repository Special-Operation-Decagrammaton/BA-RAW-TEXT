[translation]
10116-101160010 = "老師，你現在忙嗎？"
10116-101160020 = "不會！完全不忙！"
10116-101160030 = "我正好很閒！"
10116-101160040 = "這，這樣啊"
10116-101160050 = "我需要老師的建議"
10116-101160060 = "不好意思……我可以到夏萊坐坐嗎？"
10116-101160070 = "當然！"
10116-101160080 = "要諮詢的話隨時歡迎！"
10116-101160090 = "……我明白了"
10116-101160100 = "那我馬上過去"
10116-101160110 = "老師，是我"
10116-101160120 = "雖然發生了很多事……"
10116-101160130 = "不過多虧老師，我瞭解到了什麼是自然的姿勢"
10116-101160140 = "所以……我想跟老師說聲謝謝"
10116-101160150 = "總有一天，我會報答這份人情的"
10116-101160160 = "我只要有沙織的照片就滿足了"
10116-101160170 = "那個不行！"
10116-101160180 = "老師，你現在有空嗎？"
10116-101160190 = "當然！今天有什麼事嗎？"
10116-101160200 = "那個……我又有件事想拜託老師"
10116-101160210 = "雖然很厚臉皮，但除了老師之外，我沒有其他人可以拜託了"
10116-101160220 = "聽你這樣一說，我反而更期待了！"
10116-101160230 = "是什麼事呢？"
10116-101160240 = "跟上次模特兒的工作有關"
10116-101160250 = "他們說這次要拍穿著禮服跳舞的畫面"
10116-101160260 = "但我不會跳舞"
10116-101160270 = "需要有人教我……可以拜託老師嗎？"
10116-101160280 = "我馬上過去！"
10116-101160290 = "……那就麻煩你了"
10116-101160300 = "請老師到我傳給你的地址來吧"
10116-101160310 = "老師，平安到家了嗎？"
10116-101160320 = "雖然有點突然"
10116-101160330 = "不過攝影團隊剛才傳來聯絡"
10116-101160340 = "……說跳舞畫面的拍攝工作取消了"
10116-101160350 = "企劃好像突然發生了變動"
10116-101160360 = "可能是有什麼大人的考量吧"
10116-101160370 = "明明老師都特地撥時間幫忙了，真的很抱歉"
10116-101160380 = "沒關係！我很開心！"
10116-101160390 = "這樣沙織的問候就只屬於我一個人了！"
10116-101160400 = "是，是嗎？"
10116-101160410 = "總之，透過這次的事，我又累積了更多社會經驗"
10116-101160420 = "這對今後的生活也會有幫助吧"
10116-101160430 = "那麼，老師"
10116-101160440 = "之後也請多多指教"
10116-101160450 = "老師"
10116-101160460 = "請問你今天有空嗎？"
10116-101160470 = "當然！"
10116-101160480 = "只要是為了沙織，我的行程隨時都可以空下來！"
10116-101160490 = "這樣啊"
10116-101160500 = "我收到之前模特兒打工的酬勞了"
10116-101160510 = "所以想報答老師這段時間對我的關照"
10116-101160520 = "我曾聽說這種時候，通常會去高級餐廳請對方吃高級料理"
10116-101160530 = "跟昂貴的料理相比，我更喜歡簡單家常一點的"
10116-101160540 = "唔嗯，是嗎？可是……"
10116-101160550 = "心意比價格更重要哦！"
10116-101160560 = "……嗯，我知道了"
10116-101160570 = "那麼，我們就約在老師常去的美食街吧"
10116-101160580 = "我會在約定時間等老師來的"
10116-101160590 = "老師"
10116-101160600 = "那個……今天真的很開心"
10116-101160610 = "老師的料理也很棒"
10116-101160620 = "今天本來是我要好好報答老師才對"
10116-101160630 = "結果又麻煩老師了"
10116-101160640 = "別這麼說，收到好處的是我才對"
10116-101160650 = "下次我一定會好好招待老師"
10116-101160660 = "啊……為了以防萬一，我再強調一次"
10116-101160670 = "今天拍的照片，絕對不能給其他人看哦"
10116-101160680 = "絕對不行"

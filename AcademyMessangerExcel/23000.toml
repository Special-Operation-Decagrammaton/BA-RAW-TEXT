[translation]
23000-1829 = "คุณครู... คุณครูคะ!"
23000-1830 = "ตอนนี้ที่ <คาเฟ่มิลเฟย> มีของหวาน\nใหม่ล่าสุดออกมาล่ะค่ะ"
23000-1831 = "อยากไปด้วยกันมั้ยคะ?"
23000-1832 = "ขอโทษนะ คือวันนี้ครูค่อนข้างยุ่ง..."
23000-1833 = "ถ้าครูรอดไปได้ถึงพรุ่งนี้นะ..."
23000-1834 = "อ่า... คุณครูคงยุ่งมากเลยใช่มั้ยคะ?"
23000-1835 = "คุณครู... (⊙_⊙;)"
23000-1836 = "คุณครูคะ?"
23000-1837 = "คัพเค้กที่ทานวันนี้เป็นยังไงบ้างคะ?"
23000-1838 = "อร่อยมั้ยคะ?"
23000-1839 = "อื้อ อร่อยมากเลย"
23000-1840 = "อร่อยเหาะเลยล่ะ~"
23000-1841 = "ฮุฮุ โชคดีจังเลยค่ะ  (❁´▽`)"
23000-1842 = "ถ้างั้นวันนี้ขอให้เป็นวันดีๆ ของคุณครู\nนะคะ~!"
23000-1843 = "คุณครูขา~ o(^▽^)o"
23000-1844 = "คุณครูขา~ "
23000-1845 = "วันนี้คุณครูเป็นยังไงบ้างคะ?"
23000-1846 = "ยุ่งตัวจะแตกแล้ว"
23000-1847 = "ครูอยากได้ร่างแยกมากเลย..."
23000-1848 = "วันนี้ก็ยุ่งเหมือนเดิมเลยนะคะ"
23000-1849 = "╯︿╰"
23000-1850 = "มีอะไรเหรอ?"
23000-1851 = "ฉันคิดว่าจะแวะไปกินของหวานที่คาเฟ่\nสักหน่อย เลยนึกถึงคุณครูน่ะค่ะ"
23000-1852 = "แต่ถ้าคุณครูยุ่งไว้ค่อยไปกินด้วยกัน\nคราวหน้าก็ได้ค่ะ~ (*￣▽￣*)ブ"
23000-1853 = "ไปกินของหวานกับไอริงั้นเหรอ! \nใครจะยอมพลาดกันล่ะ!"
23000-1854 = "ครูจะไปเดี๋ยวนี้แหละ!"
23000-1855 = "คะ? คุณครูคะ?"
23000-1856 = "จะมาตอนนี้เลยเหรอคะ? ╚(•⌂•)╝"
23000-1857 = "คุณครูคะ?"
23000-1858 = "คุณครูจะมาที่สถาบันทรีนิตี้เมื่อไหร่\nอย่างนั้นเหรอคะ?"
23000-1859 = "อีกเดี๋ยวก็จะไปแล้วล่ะ"
23000-1860 = "ว้าว จริงเหรอคะ? ヾ(•ω•`)o"
23000-1861 = "ถ้าคุณครูมาถึงแล้วช่วยบอกฉันหน่อย\nได้มั้ยคะ?"
23000-1862 = "ฉันมีเรื่องที่อยากปรึกษาคุณครูอยู่ค่ะ"
23000-1863 = "ได้สิ ถ้างั้นเดี๋ยวเจอกันนะ"
23000-1864 = "ชั่วโมงปรึกษากับไอริ! \nครูจดไว้เรียบร้อยแล้วล่ะ"
23000-1865 = "ว้าว ค่า~!"
23000-1866 = "ขอบคุณนะคะ คุณครู! (((o(≧∇≦)o)))"
23000-1867 = "คุณครูขา~ (～￣▽￣)～"
23000-1868 = "วันนี้คุณครูแฮปปี้ดีรึเปล่าคะ?"
23000-1869 = "(｡´・_・｀｡) อืม... คุณครูคะ?"
23000-1870 = "คุณครูคงยุ่งมากเลยใช่มั้ยคะ?"
23000-1871 = "สู้ๆ นะคะ!"
23000-1872 = "ไอริจะคอยเป็นกำลังใจให้เองค่ะ ヾ(^▽^*)))"
23000-1873 = "คุณครู วันนี้ขอบคุณมากๆ เลยค่ะ\no(^▽^)o"
23000-1874 = "หลังจากนี้..."
23000-1875 = "ฉันขอไปเดินเล่นกับคุณครูได้มั้ยคะ?"
23000-1876 = "แน่นอนว่าต้องมีไอศกรีมไปด้วยค่ะ"
23000-1877 = "ได้แน่นอนอยู่แล้ว"
23000-1878 = "ครูยินดีอยู่แล้ว"
23000-1879 = "ฮิฮิ ขอบคุณมากค่ะ"
23000-1880 = "ฉันจะคอยเป็นกำลังใจให้คุณครูตลอด\nไปค่ะ!"
23000-1881 = "วันนี้ขอให้มีความสุขนะคะ~!\n(✿◕‿◕✿)"

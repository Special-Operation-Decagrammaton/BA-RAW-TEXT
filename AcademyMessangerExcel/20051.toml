[translation]
20051-200510010 = "선생님, 레이사입니다!"
20051-200510020 = "용돈을 어떻게 써야 현명하게 쓸 수 있을까요?"
20051-200510030 = "아무래도 계획적인 소비가 제일 좋지."
20051-200510040 = "우선순위를 정해서 쓰는 게 좋아."
20051-200510050 = "그렇군요!"
20051-200510060 = "그러면 필요한 물건만 사야겠네요!"
20051-200510070 = "레이사는 역시 이해가 빠르네!"
20051-200510080 = "음핫핫"
20051-200510090 = "그러면 이건 필요한 것일까요?"
20051-200510100 = "<마법리버 테르밋 핑크 프렌드쉽 퓨전 코스튬>"
20051-200510110 = "시가의 절반 가격으로 올라왔습니다!"
20051-200510120 = "시가의 절반?!"
20051-200510130 = "사실상 공짜 아니야?!"
20051-200510140 = "역시 선생님께 여쭤보길 잘했습니다!"
20051-200510150 = "매지컬- 현명한 소비!!!"
20051-200510160 = "선생님, 레이사입니다."
20051-200510170 = "잘 들어갔어?"
20051-200510180 = "넵, 덕분에 잘 들어가서 옷도 갈아입었습니다!"
20051-200510190 = "외투는 세탁해서 돌려드리겠습니다!"
20051-200510200 = "서두르지 않아도 오케이야!"
20051-200510210 = "선생님은 항상 상냥하십니다!"
20051-200510220 = "변신의 저주에 걸렸는데 풀어주셔서 감사합니다!"
20051-200510230 = "우헤헤"
20051-200510240 = "66307366979"
20051-200510250 = "이게 뭐니?"
20051-200510260 = "헉"
20051-200510270 = "아"
20051-200510280 = "선생님 모모톡이었군요!!!!"
20051-200510290 = "자신에게 보내기로 보낸 줄 알았는데!!"
20051-200510300 = "주말에 행사가 있어서 예약 번호를 저장해두려고"
20051-200510310 = "그래서 제게 보낸 거였습니다."
20051-200510320 = "오, 무슨 행사?"
20051-200510330 = "별건 아니고, 마법소녀 온리전이라는 행사입니다."
20051-200510340 = "마법소녀물만 잔뜩 모여서 굿즈도 팔고, 코스프레도 하고,"
20051-200510350 = "그런 행사입니다!"
20051-200510360 = "자경단이라면 순찰 한번 돌아야 할 것 같아서요!"
20051-200510370 = "헉 나도 갈래!"
20051-200510380 = "아직 티켓 남아있어?"
20051-200510390 = "!!"
20051-200510400 = "물론입니다!"
20051-200510410 = "선생님도 오시나요!"
20051-200510420 = "'간다'기보다는……"
20051-200510430 = "'강림'이라 해다오."
20051-200510440 = "캬."
20051-200510450 = "좋습니다!!"
20051-200510460 = "완전 무장으로 가겠습니다!!"
20051-200510470 = "선생님!"
20051-200510480 = "오늘 너무 즐거웠습니다!"
20051-200510490 = "제가 용기를 못 낼 때마다"
20051-200510500 = "항상 도와주셔서 감사합니다!"
20051-200510510 = "레이사가 기쁘다면 얼마든지!"
20051-200510520 = "우헤"
20051-200510530 = "다음에 또 뵙겠습니닷!"
20051-200510540 = "선생님."
20051-200510550 = "'드레스코드'라는 것은 뭘까요?"
20051-200510560 = "때와 장소에 맞게 옷을 입는 것 아닐까?"
20051-200510570 = "그렇다면"
20051-200510580 = "목적이 일치하는 옷은"
20051-200510590 = "드레스코드가 맞는 옷일까요?"
20051-200510600 = "그렇지 않을까?"
20051-200510610 = "그렇군요."
20051-200510620 = "알겠습니다……."
20051-200510630 = "?"
20051-200510640 = "완벽했었는데!!"
20051-200510650 = "마지막에 망쳤습니다!!"
20051-200510660 = "그 정도는 괜찮지, 뭐!"
20051-200510670 = "충분히 멋졌어!"
20051-200510680 = "퍼펙트하게 활약했어야 했는데"
20051-200510690 = "다음에는 기필코!!"
20051-200510700 = "슈퍼- 퍼펙트하게 활약하겠습니다!"
20051-200510710 = "선생님, 레이사입니다."
20051-200510720 = "혹시, 저번에 써주셨던 공구"
20051-200510730 = "아직도 있으신가요?"
20051-200510740 = "당연히 있지. 왜 그러니?"
20051-200510750 = "한번 당한 일을 한 번 더 당하는 것은"
20051-200510760 = "바보……겠지요……."
20051-200510770 = "설마, 저번처럼……?"
20051-200510780 = "또 지퍼가 고장 난 거야?"
20051-200510790 = "……"
20051-200510800 = "샬레로 찾아뵙겠습니다……."
20051-200510810 = "선생님!"
20051-200510820 = "이제 저는 더 이상 옷에 갇히지 않습니다!"
20051-200510830 = "지퍼가 더 이상 고장 나지 않거든요!"
20051-200510840 = "무적 그 자체입니다!"
20051-200510850 = "오, 어떻게 고쳤는데?"
20051-200510860 = "후후, 간단합니다."
20051-200510870 = "지퍼를 떼어내고 다 단추로 바꿨습니다!"
20051-200510880 = "그러면 혼자서 못 입는 거 아니야?"
20051-200510890 = "어"
20051-200510900 = "어??"

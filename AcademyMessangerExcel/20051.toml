[translation]
20051-200510010 = "คุณครู ฉันเรอิสะนะคะ!"
20051-200510020 = "เราจะใช้เงินค่าขนมให้ชาญฉลาดได้\nยังไงบ้างคะ?"
20051-200510030 = "ใช้จ่ายตามแผนการน่าจะดีที่สุดนะ"
20051-200510040 = "จัดลำดับความสำคัญของสิ่งที่จะซื้อสิ"
20051-200510050 = "งั้นสินะคะ!"
20051-200510060 = "ถ้างั้นฉันคงต้องซื้อแต่ของที่จำเป็น\nสินะคะ!"
20051-200510070 = "เรอิสะหัวไวจริงๆ เลยนะ!"
20051-200510080 = "อืม แหะๆ"
20051-200510090 = "งั้นอันนี้ถือว่าจำเป็นหรือเปล่าคะ?"
20051-200510100 = "<ชุดสาวน้อยเวทมนตร์ เทอร์ไมต์ พิงค์\nเฟรนด์ชิพ>"
20051-200510110 = "ตอนนี้ลดราคา 50% เลยนะคะ!"
20051-200510120 = "50% เลยเหรอ?!"
20051-200510130 = "ซื้อได้ในครึ่งราคาเลยนี่นา?!"
20051-200510140 = "ฉันคิดถูกจริงๆ ด้วยค่ะที่มาถามคุณครู!"
20051-200510150 = "เมจิคัล ใช้จ่ายอย่างชาญฉลาด!!!"
20051-200510160 = "คุณครู ฉันเรอิสะนะคะ!"
20051-200510170 = "ถึงห้องปลอดภัยดีมั้ย?"
20051-200510180 = "ค่ะ ฉันกลับมาเปลี่ยนเสื้อผ้าแล้วค่ะ\nขอบคุณนะคะ!"
20051-200510190 = "ส่วนเสื้อคลุม ฉันจะเอาไปซักแล้วค่อย\nคืนให้นะคะ!"
20051-200510200 = "ไม่ต้องรีบก็ได้!"
20051-200510210 = "คุณครูนี่ใจดีตลอดเลยค่ะ!"
20051-200510220 = "ขอบคุณที่ช่วยปลดฉันจากคำสาป\nแปลงร่างนะคะ!"
20051-200510230 = "แหะๆๆ"
20051-200510240 = "66307366979"
20051-200510250 = "คืออะไรเหรอ?"
20051-200510260 = "เฮือก"
20051-200510270 = "อ่า"
20051-200510280 = "นี่ MOMOTALK ของคุณครูสินะคะ!!!!"
20051-200510290 = "ฉันนึกว่ากดส่งให้ตัวเองไปเสียอีก!!"
20051-200510300 = "สุดสัปดาห์นี้มีงานน่ะค่ะ ฉันเลยจะเซฟ\nหมายเลขการจองไว้"
20051-200510310 = "ก็เลยกดส่งไปแบบนั้นค่ะ"
20051-200510320 = "โอ้ งานอะไรเหรอ?"
20051-200510330 = "ไม่ใช่งานใหญ่อะไรหรอกค่ะ\nแค่อีเวนต์สาวน้อยเวทมนตร์น่ะ"
20051-200510340 = "เป็นงานรวมของเกี่ยวกับสาวน้อย\nเวทมนตร์โดยเฉพาะ"
20051-200510350 = "มีการขายสินค้า แล้วก็แต่งคอสเพลย์\nกันด้วยค่ะ!"
20051-200510360 = "ฉันว่ากลุ่มรักษาความสงบก็ควรไป\nลาดตระเวนดูสักหน่อยด้วยค่ะ!"
20051-200510370 = "โอ้ว ครูไปด้วยสิ!"
20051-200510380 = "ยังมีบัตรเข้างานเหลือมั้ย?"
20051-200510390 = "!!"
20051-200510400 = "มีสิคะ!"
20051-200510410 = "คุณครูก็จะมาเหรอคะ!"
20051-200510420 = "อย่าเรียกว่า 'มา' เฉยๆ เลย..."
20051-200510430 = "เรียกว่า 'มาเยือน' เถอะ"
20051-200510440 = "ว้าว"
20051-200510450 = "ดีเลยค่ะ!!"
20051-200510460 = "ฉันจะแต่งตัวจัดเต็มไปเลยค่ะ!!"
20051-200510470 = "คุณครู!"
20051-200510480 = "วันนี้สนุกมากเลยค่ะ!"
20051-200510490 = "ขอบคุณที่คอยช่วยฉัน"
20051-200510500 = "ทุกครั้งที่ฉันขาดความกล้าหาญนะคะ!"
20051-200510510 = "ถ้าเรอิสะมีความสุข ครูก็ยินดีเลย!"
20051-200510520 = "แหะๆ"
20051-200510530 = "งั้นไว้เจอกันใหม่นะคะ!"
20051-200510540 = "คุณครู"
20051-200510550 = "ที่เห็นเรียกกันว่า 'เดรสโค้ด' น่ะคือ\nอะไรเหรอคะ?"
20051-200510560 = "น่าจะเป็นการแต่งกายให้เข้ากับ\nเวลาและสถานที่นะ"
20051-200510570 = "ถ้างั้น"
20051-200510580 = "เสื้อผ้าที่ตรงกับวัตถุประสงค์"
20051-200510590 = "ก็ถือเป็นเดรสโค้ดที่ถูกหรือเปล่าคะ?"
20051-200510600 = "ก็น่าจะใช่นะ?"
20051-200510610 = "อย่างนี้สินะคะ"
20051-200510620 = "เข้าใจแล้วค่ะ..."
20051-200510630 = "?"
20051-200510640 = "สมบูรณ์แบบแล้วแท้ๆ!!"
20051-200510650 = "แต่ตอนท้ายก็พังจนได้ค่ะ!!"
20051-200510660 = "แค่นั้นไม่เป็นไรหรอกน่า!"
20051-200510670 = "นั่นก็เท่มากๆ แล้วละ!"
20051-200510680 = "ฉันควรจะทำทุกอย่างให้เพอร์เฟ็กแท้ๆ"
20051-200510690 = "คราวหน้าต้องไม่พลาดเลย!!"
20051-200510700 = "จะทำให้ออกมาซูเปอร์ เพอร์เฟ็กเลย\nละค่ะ!"
20051-200510710 = "คุณครู ฉันเรอิสะนะคะ!"
20051-200510720 = "อุปกรณ์เย็บผ้าที่ใช้ครั้งก่อน"
20051-200510730 = "ไม่ทราบว่ายังอยู่มั้ยคะ?"
20051-200510740 = "ยังอยู่สิ ทำไมเหรอ?"
20051-200510750 = "คนที่เจอเรื่องแย่ๆ ซ้ำสอง"
20051-200510760 = "ต้องเรียกว่าดวงกุด... ใช่มั้ยล่ะคะ..."
20051-200510770 = "อย่าบอกนะว่า...?"
20051-200510780 = "ซิปเสียอีกแล้วเหรอ?"
20051-200510790 = "..."
20051-200510800 = "ฉันจะไปหาที่ชาเล่ต์นะคะ..."
20051-200510810 = "คุณครู!"
20051-200510820 = "จากนี้ฉันจะไม่ถูกจำกัดด้วยเสื้อผ้าที่ใส่\nอีกแล้วค่ะ!"
20051-200510830 = "ฉันหมดปัญหาซิปแตกแล้วน่ะค่ะ!"
20051-200510840 = "เรียกว่าไร้เทียมทานได้เลยค่ะ!"
20051-200510850 = "โอ้ ซ่อมยังไงเหรอ?"
20051-200510860 = "ฮุฮุ ง่ายๆ ค่ะ"
20051-200510870 = "ฉันแกะซิปออกแล้วเปลี่ยนเป็นกระดุม\nแทนหมดเลยค่ะ!"
20051-200510880 = "งั้นก็ใส่ชุดคนเดียวไม่ได้น่ะสิ?"
20051-200510890 = "หืม"
20051-200510900 = "หืม??"

[translation]
26004-1786 = "안녕하세요, 선생님! 시미코예요!"
26004-1787 = "혹시 괜찮으시다면, 언제 한 번 인사차 뵐 수 있을까요?"
26004-1788 = "이번에 공공도서관으로 파견근무를 가게 되었는데,"
26004-1789 = "마침 위치가 선생님이 계신 곳 근처더라고요!"
26004-1790 = "가까운 곳이니, 언제든 편하실 때 들러주세요!"
26004-1791 = "그래."
26004-1792 = "(・∀・*) 네! 그럼 기다리겠습니다!"
26004-1793 = "오늘은 정말 즐거웠어요, 선생님."
26004-1794 = "한동안은 이 도서관에서 계속 지내게 됐답니다."
26004-1795 = "그러니 언제든 다시 들러주세요!"
26004-1796 = "가능하다면 다음번에는 좀 더 다소곳한 느낌으로……"
26004-1797 = "아무튼!"
26004-1798 = "항상 기다리고 있겠습니다! (・∀・*)"
26004-1799 = "그러고 보니 혹시 선생님도 늦은 밤까지 책을 보시나요?"
26004-1800 = "아, 책을 보는 게 아니라……"
26004-1801 = "업무를 보고 계시려나요?"
26004-1802 = "직장인을 너무 놀리지 마……"
26004-1803 = "오? 너도?"
26004-1804 = "ㅎㅎㅎ;;"
26004-1805 = "그러네요."
26004-1806 = "그런 점에서 저희들……"
26004-1807 = "비슷한 활동 시간대를 가진 걸지도요!"
26004-1808 = "모두가 자는 시간이라도, 심심하면 놀러 오세요!"
26004-1809 = "선생님께 만큼은 24시간 열려 있는 곳이니까요!"
26004-1810 = "잘 들어가셨나요?"
26004-1811 = "오늘 있었던 일들은 비밀로 해주세요."
26004-1812 = "이상한 소문이 날 수도 있으니까요. ㅎㅎ;;"
26004-1813 = "저도 비밀로 해 둘게요! (・∀・*)"
26004-1814 = "선생님, 혹시 지금 바쁘신가요?"
26004-1815 = "오늘은 조금, 특별히 부탁드리고 싶은 게 있어서요."
26004-1816 = "괜찮으시다면 같이 어울려 주실 수 있을까요?"
26004-1817 = "무슨 일이야?"
26004-1818 = "데이트라도 가는 건가?"
26004-1819 = "후후후"
26004-1820 = "비밀이에요. 와서 보시면 알아요."
26004-1821 = "일종의 보물찾기니까요! (・∀・*)"
26004-1822 = "오늘 정말로 감사했습니다, 선생님!"
26004-1823 = "선생님이 아니었다면 불가능했을 일이었네요!"
26004-1824 = "왠지 으음"
26004-1825 = "선생님과 함께할 때마다 좋은 일이 생기는 거 같아요."
26004-1826 = "그러니 앞으로도 잘 부탁드릴게요! 선생님! (・∀・*)"
26004-1827 = "……"
26004-1828 = "거절하기 없기예요."
26004-260040010 = "필요하신 책이 있으면 언제든 말씀만 주세요, 선생님!"
26004-260040020 = "마침 잘 됐어."
26004-260040030 = "그렇잖아도 찾고 있는 게 있었는데."
26004-260040040 = "?"
26004-260040050 = "어"
26004-260040060 = "정말이에요?"
26004-260040070 = "응."
26004-260040080 = "지금 갈게. 잘 부탁해."
26004-260040090 = "아"
26004-260040100 = "네"
26004-260040110 = "네!! 기다리고 있을게요! :D !!"
26004-260040120 = "잘 들어가셨나요, 선생님?"
26004-260040130 = "전 덕분에 오늘은 평소보다 좀 더 즐거운 도서관이었답니다."
26004-260040140 = "빌려 가신 책은 기한 내에 꼭 반납해주세요."
26004-260040150 = "그리고"
26004-260040160 = "혹시 괜찮으시다면"
26004-260040170 = "그때에도 새로운 책을 또 빌려 가셨으면 좋겠어요."
26004-260040180 = "그래야"
26004-260040190 = "음"
26004-260040200 = "또"
26004-260040210 = "반납 때문에라도, 들러 주실 테니까요."

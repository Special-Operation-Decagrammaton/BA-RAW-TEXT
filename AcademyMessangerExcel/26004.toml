[translation]
26004-1786 = "Hello, Sensei! It's Shimiko!"
26004-1787 = "Can I come see you sometime?"
26004-1788 = "I was sent to the public library,"
26004-1789 = "and it happens to be right by you!"
26004-1790 = "It's pretty close by, so please drop by when you have time!"
26004-1791 = "Of course!"
26004-1792 = "Great! I'll be waiting for you!"
26004-1793 = "I had so much fun today, Sensei."
26004-1794 = "I'll be at the library for a while."
26004-1795 = "So please drop by anytime!"
26004-1796 = "Maybe next time you can be a little quieter..."
26004-1797 = "Anyway..."
26004-1798 = "I'll be waiting for you!"
26004-1799 = "Do you happen to read late at night?"
26004-1800 = "Ah, in your case it isn't books..."
26004-1801 = "Work documents, right?"
26004-1802 = "Working isn't all I do..."
26004-1803 = "Oh? You too?"
26004-1804 = "Heeheehee."
26004-1805 = "I see."
26004-1806 = "I guess..."
26004-1807 = "We have a very similar lifestyle! "
26004-1808 = "If you get bored when everyone's sleeping, come visit me!"
26004-1809 = "This place is open to you twenty-four hours a day!"
26004-1810 = "Did you get home safely?"
26004-1811 = "Let's keep today a secret."
26004-1812 = "People might start talking, you know."
26004-1813 = "I won't say a word to anyone!"
26004-1814 = "Are you busy, Sensei?"
26004-1815 = "I have a special favor to ask of you today."
26004-1816 = "Can you stay with me for a little bit?"
26004-1817 = "What's going on?"
26004-1818 = "Are we going on a date?"
26004-1819 = "Heeheehee."
26004-1820 = "It's a secret. You'll see when you get here."
26004-1821 = "It'll be like a treasure hunt!"
26004-1822 = "Thanks so much for today, Sensei!"
26004-1823 = "It would have been impossible without you!"
26004-1824 = "For some reason..."
26004-1825 = "I feel like good things happen whenever I'm with you."
26004-1826 = "So I hope to see you again soon, Sensei!"
26004-1827 = "..."
26004-1828 = "You can't say no!"
26004-260040010 = "Please let me know if you ever need a book!"
26004-260040020 = "Speaking of books..."
26004-260040030 = "I've been looking for something."
26004-260040040 = "...?"
26004-260040050 = "Mm"
26004-260040060 = "Really?"
26004-260040070 = "Yup."
26004-260040080 = "I'll be going now."
26004-260040090 = "Ah."
26004-260040100 = "Okay."
26004-260040110 = "Yes!! I'll be waiting!!!"
26004-260040120 = "Did you get home safely, Sensei?"
26004-260040130 = "Thanks to you, the library was even more fun than usual today."
26004-260040140 = "Please remember to return the book you borrowed on time!"
26004-260040150 = "And..."
26004-260040160 = "If it's okay..."
26004-260040170 = "I hope you borrow a new book when you do."
26004-260040180 = "That way..."
26004-260040190 = "Um..."
26004-260040200 = "You'll..."
26004-260040210 = "Visit again, even if it's just to return the book."

[translation]
26004-1786 = "你好，老師！我是志美子！"
26004-1787 = "我想好好的打個招呼，如果可以的話，之後可以見個面嗎？"
26004-1788 = "我這次因為派遣業務的關係要到公共圖書館去"
26004-1789 = "那裡似乎正好和老師在的地方很近！"
26004-1790 = "老師有空的時候，隨時都能來那裡找我！"
26004-1791 = "嗯，那我去打擾一下吧"
26004-1792 = "（・∀・*)好！那我等著你！"
26004-1793 = "今天非常感謝，老師"
26004-1794 = "我暫時都會在這個圖書館"
26004-1795 = "歡迎隨時再來唷！"
26004-1796 = "下次我會表現得更成熟、端莊……"
26004-1797 = "沒，沒什麼，當我沒說！"
26004-1798 = "總之，隨時恭候你的光臨！(・∀・*)"
26004-1799 = "這麼說來，老師也會熬夜看書嗎？"
26004-1800 = "啊，如果是老師的話應該不是書……"
26004-1801 = "是工作的文件，對吧？"
26004-1802 = "畢竟是社會人士嘛……"
26004-1803 = "志美子是夜貓子啊"
26004-1804 = "哈哈"
26004-1805 = "也是呢"
26004-1806 = "我經常熬夜看書到很晚"
26004-1807 = "說不定，我們活動的時間很接近喔(．∀．*)"
26004-1808 = "就算是深夜也完全沒關係，有空時都能來玩唷！"
26004-1809 = "只要老師能來，24小時都能開放！"
26004-1810 = "平安到達夏萊了嗎？"
26004-1811 = "今天的事是祕密唷"
26004-1812 = "那個，因為可能會被說閒話……"
26004-1813 = "我也會保密的！(・∀・*)"
26004-1814 = "老師，現在在忙嗎？"
26004-1815 = "有件事想請你幫忙"
26004-1816 = "如果可以的話，能來找我一下嗎？"
26004-1817 = "怎麼了？"
26004-1818 = "是約會的邀請嗎？"
26004-1819 = "呵呵，這是祕密"
26004-1820 = "你來的話馬上就會知道了唷"
26004-1821 = "給你一個提示，是「尋寶」之類的！\n(．∀．*)"
26004-1822 = "今天真的非常感謝你，老師！"
26004-1823 = "有聯絡老師果然是對的，我很開心！"
26004-1824 = "該怎麼說才好呢，那個"
26004-1825 = "和老師在一起時總是很開心，感覺每次都會發生好事"
26004-1826 = "今後也請多多關照囉！老師！(・∀・*)"
26004-1827 = "……"
26004-1828 = "……不接受退貨的唷？"
26004-260040010 = "老師最近有看書嗎？有什麼事的話隨時歡迎和我討論！"
26004-260040020 = "啊，時機正好"
26004-260040030 = "謝謝，正好有想找的東西"
26004-260040040 = "？"
26004-260040050 = "咦"
26004-260040060 = "真的嗎？"
26004-260040070 = "嗯，真的"
26004-260040080 = "可以現在過去圖書館嗎？"
26004-260040090 = "啊"
26004-260040100 = "好的"
26004-260040110 = "沒問題！！我在這裡等你！:D"
26004-260040120 = "老師和書都安全回到家了嗎？"
26004-260040130 = "托老師過來的福，我非常開心"
26004-260040140 = "啊，書請在時限內歸還哦"
26004-260040150 = "另外"
26004-260040160 = "如果可以的話，那個時候"
26004-260040170 = "請務必再借新的書。我也會推薦書給你的"
26004-260040180 = "那樣才可以"
26004-260040190 = "那個"
26004-260040200 = "……"
26004-260040210 = "……你還會，過來的對吧？"

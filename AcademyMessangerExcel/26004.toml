[translation]
26004-1786 = "สวัสดีค่ะ คุณครู ชิมิโกะเองค่ะ!"
26004-1787 = "ถ้าคุณครูไม่ว่าอะไร ฉันก็อยากจะขอแวะ\nไปทักทายสักครั้งน่ะค่ะ"
26004-1788 = "คราวนี้ฉันถูกส่งให้ไปทำหน้าที่ที่หอสมุด\nสาธารณะค่ะ"
26004-1789 = "แล้วบังเอิญที่นั่นก็อยู่ใกล้กับที่ที่คุณครู\nอยู่เลยค่ะ!"
26004-1790 = "อยู่ใกล้กันแบบนี้ ถ้าคุณครูว่างเมื่อไหร่ก็\nแวะเข้ามาได้นะคะ!"
26004-1791 = "ได้เลย"
26004-1792 = "(・∀・*) ค่ะ! ถ้างั้นฉันจะรอนะคะ!"
26004-1793 = "วันนี้ฉันสนุกมากเลยค่ะ คุณครู"
26004-1794 = "ถึงยังไง ฉันก็คงอยู่ที่ห้องสมุดอีก\nสักพักค่ะ"
26004-1795 = "เพราะงั้นแวะมาได้ตลอดเลยนะคะ!"
26004-1796 = "ถ้าเป็นไปได้ คราวหน้าฉันจะพยายาม\nใจเย็นกว่านี้ค่ะ..."
26004-1797 = "เอาเถอะค่ะ!"
26004-1798 = "แล้วฉันจะรอคุณครูนะคะ! (・∀・*)"
26004-1799 = "แต่ว่าคุณครูเองก็อ่านหนังสือจนดึก\nเหมือนกันด้วยใช่มั้ยล่ะคะ?"
26004-1800 = "อ่า... ไม่ใช่อ่านหนังสือสิ..."
26004-1801 = "คุณครูทำงานใช่มั้ยล่ะคะ?"
26004-1802 = "อย่าล้อเลียนคนทำงานสิ..."
26004-1803 = "โอ๊ะ? เธอด้วยเหรอ?"
26004-1804 = "คิคิคิ;;"
26004-1805 = "นั่นสิคะ"
26004-1806 = "ถ้าดูจากตรงนั้นแล้วพวกเรา..."
26004-1807 = "ก็มีเวลาที่ทำกิจกรรมคล้ายๆ กันอยู่ด้วย\nนะคะ! "
26004-1808 = "ถึงจะเป็นตอนดึกที่ทุกคนนอนแล้ว\nแต่ถ้าคุณครูเบื่อละก็มาที่นี่ได้นะคะ!"
26004-1809 = "ที่นี่เปิด 24 ชั่วโมงสำหรับคุณครูเลยค่ะ!"
26004-1810 = "คุณครูกลับถึงบ้านรึยังคะ?"
26004-1811 = "เรื่องวันนี้ขอให้ช่วยเก็บเป็นความลับด้วย\nนะคะ"
26004-1812 = "เพราะมันอาจมีข่าวลือแปลกๆ เกิดขึ้น\nได้ค่ะ... คิคิ"
26004-1813 = "ฉันเองก็จะเก็บไว้เป็นความลับค่ะ!\n(・∀・*)"
26004-1814 = "คุณครูคะ ตอนนี้ยุ่งอยู่หรือเปล่าคะ?"
26004-1815 = "วันนี้ฉันมีเรื่องที่อยากจะรบกวนคุณครู\nหน่อยค่ะ"
26004-1816 = "ถ้าคุณครูไม่ยุ่งละก็ช่วยออกมาหาฉัน\nหน่อยได้มั้ยคะ?"
26004-1817 = "มีอะไรเหรอ?"
26004-1818 = "จะชวนไปเดตงั้นเหรอ?"
26004-1819 = "ฮุฮุฮุ"
26004-1820 = "ความลับค่ะ! ถ้ามาถึงก็จะรู้เองค่ะ"
26004-1821 = "เป็นการตามล่าสมบัติอย่างหนึ่งค่ะ!\n(・∀・*)"
26004-1822 = "คุณครู วันนี้ขอบคุณมากๆ เลยค่ะ!"
26004-1823 = "ถ้าไม่ใช่คุณครูคงทำไม่ได้แน่ๆ เลยค่ะ!"
26004-1824 = "ทำไมน้า... อืม..."
26004-1825 = "ทุกครั้งที่ได้อยู่กับคุณครู รู้สึกว่ามีเรื่องดีๆ\nเกิดขึ้นทุกครั้งเลยค่ะ"
26004-1826 = "เพราะฉะนั้น... จากนี้ไปก็ขอรบกวนด้วย\nนะคะ! คุณครู! (・∀・*)"
26004-1827 = "..."
26004-1828 = "คงไม่ปฏิเสธหรอกนะคะ"
26004-260040010 = "ถ้ามีหนังสือที่ต้องการละก็\nบอกฉันได้ตลอดเลยนะคะ คุณครู"
26004-260040020 = "พอดีเลย"
26004-260040030 = "กำลังหาบางเล่มอยู่พอดีเลย"
26004-260040040 = "?"
26004-260040050 = "เอ๋?"
26004-260040060 = "จริงเหรอคะ?"
26004-260040070 = "อื้อ"
26004-260040080 = "เดี๋ยวไปหานะ ฝากด้วยล่ะ"
26004-260040090 = "อา..."
26004-260040100 = "คะ..."
26004-260040110 = "ค่ะ!! ฉันจะรอนะคะ! :D !!"
26004-260040120 = "กลับถึงแล้วใช่มั้ยคะ คุณครู?"
26004-260040130 = "วันนี้คุณครูมาที่ห้องสมุด เลยรู้สึกว่า\nเป็นวันที่สนุกกว่าปกติมากเลยค่ะ"
26004-260040140 = "หนังสือที่ยืมไปวันนี้\nอย่าลืมมาคืนภายในกำหนดนะคะ"
26004-260040150 = "แล้วก็..."
26004-260040160 = "ถ้าคุณครูไม่ว่าอะไรละก็..."
26004-260040170 = "ไว้แวะมายืมหนังสือเล่มใหม่ๆ ได้นะคะ"
26004-260040180 = "ถ้าเป็นแบบนั้น..."
26004-260040190 = "อืม..."
26004-260040200 = "คุณครู..."
26004-260040210 = "จะได้มาที่ห้องสมุดอีก\nเพื่อมาคืนหนังสือไงล่ะคะ"

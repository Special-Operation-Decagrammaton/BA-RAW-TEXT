[translation]
23003-1630 = "คุณครู ได้ยินข่าวเกี่ยวกับหนังเรื่อง\nเอลิมิเนเตอร์ 4 ที่จะฉายหรือยัง?"
23003-1631 = "หนังไซไฟภาคต่อที่มีหุ่นยนต์ตัวใหญ่\nบุกเมืองใช่มั้ย?"
23003-1632 = "ใช่ แต่เห็นว่าภาคนี้พระเอกจะมีผู้ช่วย"
23003-1633 = "เป็นแฮ็กเกอร์ด้วยล่ะ"
23003-1634 = "นี่เป็นภาคต่อของหนังที่ฉันชอบเลย\nแถมยังมีตัวละครแฮ็กเกอร์ที่ฉันสนใจ\nเพิ่มมาด้วย ไม่อยากจะเชื่อเลย!"
23003-1635 = "อยากรู้แล้วสิว่าเรื่องจะออกมาเป็นยังไง"
23003-1636 = "อยากให้ออกมาแบบที่ฮาเระชอบจัง"
23003-1637 = "หนังจะเข้าอาทิตย์นี้แล้ว ฉันจะไป\nดูแล้วมาบอกนะว่าเป็นยังไง"
23003-1638 = "คุณครู วันนี้ตอนมาที่ห้องชมรม ฉันฝาก\nซื้อเครื่องดื่มชูกำลังขวดนึงได้มั้ย?"
23003-1639 = "เครื่องดื่มชูกำลังเหรอ? ซื้อของ\nมอนสเตอร์แม็กซ์ไปได้มั้ย?"
23003-1640 = "อื้ม เอารสเสาวรสนะ"
23003-1641 = "พอดีฉันหาซื้อรสเสาวรสแถวนี้ไม่ได้เลย"
23003-1642 = "โอเค"
23003-1643 = "งั้นรบกวนด้วยนะ"
23003-1644 = "ได้ยินมาว่าการ์ดจอที่วางขายรอบนี้\nประสิทธิภาพดีมากเลยล่ะ"
23003-1645 = "ที่ร้านบอกมาว่าสต๊อกสินค้ามีจำกัด\nเลยซื้อได้คนละ 1 อันเท่านั้น"
23003-1646 = "ครูไม่ค่อยรู้เรื่องคอมพิวเตอร์เท่าไหร่\nแต่มีอันเดียวก็พอแล้วไม่ใช่เหรอ?"
23003-1647 = "ไม่พอ"
23003-1648 = "ถ้าเราไม่ต่อการ์ดจอ 2 อันเพื่อเพิ่ม\nประสิทธิภาพของกราฟิก ก็จะ\nทดสอบฟังก์ชั่นจำลองอันใหม่ไม่ได้"
23003-1649 = "จริงๆ ฉันว่า 2 อันก็ยังไม่เพียงพอ"
23003-1650 = "แต่ดูจากราคาแล้ว คิดว่าแค่สองอัน\nก่อนดีกว่า..."
23003-1651 = "ครูไม่รู้ว่าเธอพูดถึงอะไร\nแต่มันฟังดูสุดยอดมาก..."
23003-1652 = "การประกอบคอมพิวเตอร์ไม่ใช่เรื่อง\nเล่นๆ เลยนะเนี่ย..."
23003-1653 = "สุดสัปดาห์นี้ฉันจะไปร้านอุปกรณ์\nคอมพิวเตอร์ คุณครูไปด้วยกันได้มั้ย?"
23003-1654 = "แต่ไม่ได้บอกว่าให้ซื้อให้นะ แค่ขอให้\nไปเป็นเพื่อนน่ะ"
23003-1655 = "ได้สิ แล้วเจอกัน"
23003-1656 = "คุณครู ฉันปรับปรุงโดรนที่ประดิษฐ์ไว้\nคราวก่อนเสร็จแล้ว"
23003-1657 = "เสร็จแล้วเหรอ? ดีใจด้วยนะ"
23003-1658 = "ปรับปรุงยังไงเหรอ?"
23003-1659 = "อื้ม แถมรอบนี้ฉันใส่ฟังก์ชั่นใหม่เข้าไป\nเยอะเลย รับประกันว่าต้องออกมาเจ๋ง"
23003-1660 = "ใส่ฟังก์ชั่นใหม่เข้าไปเพื่อความสะดวก\nของผู้ใช้งานน่ะ"
23003-1661 = "เย็นนี้ฉันจะสาธิตการใช้ฟังก์ชั่นใหม่ของ\nโดรนที่ดาดฟ้า คุณครูช่วยมาดูหน่อยนะ"
23003-1662 = "ถ้าเสร็จงานที่ชาเล่ต์แล้วครูจะไปทันทีเลย"
23003-230030020 = "มีเรื่องอะไรเหรอ?"
23003-230030030 = "ถ่ายรูปออกมาน่ารักดีนะ แต่ทำไมจู่ๆ\nถึงได้ส่งมาล่ะ..."
23003-230030040 = "ฮาเระจัง...?"
23003-230030050 = "คุณครู"
23003-230030060 = "คือว่ารูปที่ส่งไปเมื่อกี้น่ะ..."
23003-230030070 = "ถ้าเป็นไปได้ก็อยากให้ลบออก..."
23003-230030080 = "ถ่ายออกมาดูน่ารักตั้งขนาดนั้นเลยนะ?"
23003-230030090 = "ถึงคุณครูจะพูดแบบนั้นก็เถอะ"
23003-230030100 = "ถ้าเป็นรูปน่ารักๆ ละก็ ถ่ายส่งมาใหม่ก็ได้นะ"
23003-230030110 = "อา..."
23003-230030120 = "คือ..."
23003-230030130 = "คือว่าข้อความเมื่อกี้"
23003-230030140 = "อาเธน่า 3 แกล้งเล่นอีกแล้วน่ะ..."
23003-230030150 = "ไม่ต้องสนใจหรอกนะ"

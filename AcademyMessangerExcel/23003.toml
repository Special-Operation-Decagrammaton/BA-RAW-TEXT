[translation]
23003-1630 = "선생님. 이번에 새로 개봉하는 영화, <엘리미네이터 4>의 소식 들었어?"
23003-1631 = "거대한 로봇이 도시를 파괴하는 SF 시리즈물이었지……?"
23003-1632 = "응, 그런데 이번에는 주인공의 조력자 역할로"
23003-1633 = "해커 캐릭터가 등장한대."
23003-1634 = "원래부터 좋아했던 영화의 후속편이었는데, 내가 관심 있어 하는 해킹에 관련된 캐릭터가 나온다니……."
23003-1635 = "어떻게 묘사될지 벌써부터 기대가 되네."
23003-1636 = "부디 마음에 들게 나왔으면 좋겠네."
23003-1637 = "이번 주말에 개봉한다니 보고 나서 어땠는지 소감을 말해줄게."
23003-1638 = "선생님, 오늘 동아리실에 올 때 시내에서 에너지 드링크 하나만 사다 줄 수 있어?"
23003-1639 = "에너지 드링크? <요괴 MAX>면 될까?"
23003-1640 = "응, <요괴 MAX>의 패션 후르츠 맛으로."
23003-1641 = "어째서인지 패션 후르츠 맛은 이 근처에서 취급하는 곳이 없더라고."
23003-1642 = "알겠어."
23003-1643 = "그럼 부탁 좀 할게."
23003-1644 = "이번에 새로 출시된 그래픽 카드의 성능이 그렇게 좋다는데……."
23003-1645 = "업체에 문의해보니 재고가 한정되어 있어서 한 사람 앞에 한 개밖에 팔지 않는다지 뭐야."
23003-1646 = "컴퓨터에 대해서는 잘 모르지만, 한 개면 충분하지 않아?"
23003-1647 = "안 돼."
23003-1648 = "두 개 이상의 그래픽 카드를 연결해서 그래픽 처리 성능을 높이지 않으면 새로운 시뮬레이터의 기능을 제대로 시험해 볼 수 없거든."
23003-1649 = "마음 같아서는 사실 두 개도 부족하지만,"
23003-1650 = "부품의 가격이 배로 뛰니 두 개로 만족하는 수밖에……."
23003-1651 = "무슨 말인지는 모르겠지만, 뭔가 굉장하네……."
23003-1652 = "컴퓨터 조립의 세계는 심오하구나……."
23003-1653 = "그래서 말인데, 이번 주말에 부품 상점에 쇼핑하러 갈 때 같이 가줄 수 없을까?"
23003-1654 = "돈은 내가 낼 테니까 얼굴만 빌려주면 돼."
23003-1655 = "알겠어. 주말에 보자."
23003-1656 = "선생님, 전에 만들었던 드론의 개조가 모두 끝났어."
23003-1657 = "드디어 끝났구나, 축하해."
23003-1658 = "무슨 개조를 하고 있었던 거야?"
23003-1659 = "응. 게다가 이번에는 여러 가지 신기능을 추가했으니까 미리 기대해도 좋아."
23003-1660 = "사용자의 편의를 위해 여러 가지 신기능을 추가했어."
23003-1661 = "오늘 오후에 학원 옥상에서 드론의 새로운 기능을 시연할 예정이니 한 번 보러 와 줘."
23003-1662 = "일이 끝나면 바로 갈게."
23003-230030020 = "갑자기 무슨 일이야?"
23003-230030030 = "귀엽게 나왔네. 그런데 갑자기 왜……"
23003-230030040 = "……하레 양?"
23003-230030050 = "선생님"
23003-230030060 = "그, 아까 사진 말인데……"
23003-230030070 = "가능하다면 지워줬으면 해서……"
23003-230030080 = "귀엽게 잘 나왔는데?"
23003-230030090 = "그렇게 말해도"
23003-230030100 = "귀여운 사진이라면 새로 찍어서 보내줄 수도 있는데"
23003-230030110 = "아"
23003-230030120 = "ㄱ"
23003-230030130 = "그게 그러니까ㅏ 방금 그건"
23003-230030140 = "아테나 3호가 다시 장난을 친 거니까……"
23003-230030150 = "신경 쓰지 말아줘……"

[translation]
20037-200370010 = "ผู้ตรวจตรา! ผู้ตรวจตรา!"
20037-200370020 = "ตอนนี้อยู่ไหนน่ะ? มีเรื่องยุ่งอยู่หรือเปล่า?"
20037-200370030 = "ผู้ตรวจตรา...?"
20037-200370040 = "ไม่นะ วันนี้ครูว่างๆ อยู่"
20037-200370050 = "เอาละๆ เข้าเรื่องเลยดีกว่า!"
20037-200370060 = "ช่วยมาที่ศูนย์อาหารในสวนน้ำหน่อยสิ"
20037-200370070 = "นี่เป็นเรื่องด่วนที่เกี่ยวกับความ\nปลอดภัยของผู้คนน่ะ! รีบมานะ!"
20037-200370080 = "...?"
20037-200370090 = "ฉันชอบภารกิจของวันนี้นะ"
20037-200370100 = "งานของวันนี้คือการลาดตระเวนให้ทั่ว\nสวนน้ำน่ะ"
20037-200370110 = "ฟุบุกิไม่ได้ไม่ชอบการเคลื่อนไหว\nหรอกเหรอ?"
20037-200370120 = "จะไม่ชอบได้ยังไงกัน? การลาดตระเวน\nคือหัวใจของการทำงานของไลฟ์การ์ดเลยนะ"
20037-200370130 = "นี่เป็นเรื่องที่ไลฟ์การ์ดต้องทำเพื่อ\nรักษาความปลอดภัยของผู้คนอยู่แล้ว"
20037-200370140 = "มีอะไรแปลกๆ อยู่นะ"
20037-200370150 = "เดี๋ยวเหอะ หมายความว่ายังไงน่ะ?"
20037-200370160 = "ฉันจะลอยตุ๊บป่องแล้วลาดตระเวน\nอย่างตั้งใจเลย"
20037-200370170 = "ลอยตุ๊บป่อง...?"
20037-200370180 = "เกินไปแล้วนะครู..."
20037-200370190 = "ไม่อยากเชื่อเลยว่าจะให้เดิน\nลาดตระเวนจริงๆ"
20037-200370200 = "ปกติก็เป็นแบบนี้ไม่ใช่เหรอ?"
20037-200370210 = "ใครมาเห็นคงคิดว่าสั่งงานเกินกว่าเหตุ\nแล้วหรือเปล่า!"
20037-200370220 = "สำหรับนักเรียนที่บอบบาง แสงแดดน่ะ\nคือพิษภัยเลยนะ!"
20037-200370230 = "เอาเถอะ ยังไงไอศกรีมที่ซื้อให้ตอน\nทำงานเสร็จก็อร่อยดี"
20037-200370240 = "..."
20037-200370250 = "อื้ม ถ้ากับคุณครูละก็ การได้ไปลาด\nตระเวนอย่างตั้งใจแบบนี้บ้างก็ไม่เลว\nเหมือนกันนะ"
20037-200370260 = "ฉันเจอพาราไดซ์ของตัวเองแล้วละ"
20037-200370270 = "พื้นที่แห่งการพักผ่อนที่ไม่มีใครมา\nรบกวนได้..."
20037-200370280 = "ถ้าเป็นที่นี่รับรองว่าพักผ่อนได้อย่าง\nไม่ต้องสนใจใคร...!"
20037-200370290 = "เจอที่ซ่อนตัวแล้วงั้นเหรอ?"
20037-200370300 = "เจอที่ไว้นอนบิดขี้เกียจแล้วสินะ"
20037-200370310 = "คุณครูก็มาเที่ยวด้วยมั้ย?"
20037-200370320 = "แต่ห้ามลงไปในน้ำนะ"
20037-200370330 = "ฉันไม่อยากดูแลคนเพิ่มน่ะ"
20037-200370340 = "อยู่สวนน้ำ แต่ห้ามลงน้ำงั้นเหรอ..."

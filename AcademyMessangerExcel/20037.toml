[translation]
20037-200370010 = "감찰관! 감찰관!"
20037-200370020 = "지금 어디 있어? 바쁜 일이라도 있어?"
20037-200370030 = "감찰관……?"
20037-200370040 = "아니, 한가하게 돌아다니고 있는데."
20037-200370050 = "자, 자, 사소한 건 됐고!"
20037-200370060 = "지금 바로 파크 내의 푸드코트로 와 줘."
20037-200370070 = "사람들의 안전과 관련된 급한 공무니까! 얼른 와 줘야 돼!"
20037-200370080 = "……?"
20037-200370090 = "오늘 임무는 마음에 들어."
20037-200370100 = "파크 전체를 순찰하는 임무거든."
20037-200370110 = "후부키는 움직이는 거 싫어하지 않았어?"
20037-200370120 = "그럴 리가 있나? 순찰이야말로 라이프가드 임무의 꽃인걸."
20037-200370130 = "사람들의 안전을 책임지는 라이프가드로서 당연히 해야 할 일이지."
20037-200370140 = "뭔가 수상한데."
20037-200370150 = "어허, 그게 무슨 말이야."
20037-200370160 = "파크를 뱅글뱅글 돌면서 성실하게 순찰할 거라고."
20037-200370170 = "뱅글뱅글……?"
20037-200370180 = "너무해, 선생……."
20037-200370190 = "정말로 걸어서 순찰하게 하다니."
20037-200370200 = "원래 그런 임무잖아?"
20037-200370210 = "누가 보면 하면 안 되는 일이라도 시킨 줄 알겠다!"
20037-200370220 = "연약한 학생에게 햇빛은 독이라구, 독."
20037-200370230 = "뭐, 그 뒤에 사 준 아이스크림은 맛있었지만 말이야."
20037-200370240 = "……."
20037-200370250 = "응, 선생과 함께라면 가끔씩은 성실하게 순찰하는 것도 나쁘지 않을지도 모르겠네."
20037-200370260 = "드디어 내 파라다이스를 찾았어."
20037-200370270 = "누구에게도 방해받지 않는 안식의 땅……."
20037-200370280 = "이곳이라면 누구의 눈치도 받지 않고 쉴 수 있어……!"
20037-200370290 = "숨어 있을 곳이라도 찾은 거야?"
20037-200370300 = "농땡이 피울 곳을 찾은 모양이네."
20037-200370310 = "선생님도 구경 올래?"
20037-200370320 = "대신 물에 들어가면 안 돼."
20037-200370330 = "내가 감시해야 할 이용객이 느는 건 사양이니까."
20037-200370340 = "워터파크에서 물에 들어가지 말라니……."

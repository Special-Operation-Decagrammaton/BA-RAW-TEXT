[translation]
20037-200370010 = "監察官！監察官！"
20037-200370020 = "你現在在哪裡？有什麼急事嗎？"
20037-200370030 = "監察官……？"
20037-200370040 = "沒有，我正在悠哉地四處亂晃"
20037-200370050 = "先別管那些無關緊要的小事了！"
20037-200370060 = "趕快到水上樂園的美食廣場來"
20037-200370070 = "有件關係市民安全的緊急公務！趕緊過來吧！"
20037-200370080 = "……？"
20037-200370090 = "我很喜歡今天的任務"
20037-200370100 = "因為我今天負責巡邏整座樂園"
20037-200370110 = "可是你不是討厭跑來跑去的嗎，吹雪？"
20037-200370120 = "怎麼會呢？巡邏可是救生員最重要的任務耶"
20037-200370130 = "守護遊客的安全，是身為一名救生員應該做的事"
20037-200370140 = "總覺得有點可疑"
20037-200370150 = "唉唷，怎麼說那種話"
20037-200370160 = "我一定會認真把樂園一圈圈繞個遍的"
20037-200370170 = "一圈圈……？"
20037-200370180 = "真是太過分了，老師……"
20037-200370190 = "居然真的要我用走的巡邏"
20037-200370200 = "本來不就該這樣嗎？"
20037-200370210 = "別說得好像要求很不合理一樣！"
20037-200370220 = "對柔弱的學生來說，陽光明明就跟毒藥沒兩樣"
20037-200370230 = "不過老師後來請我吃的冰淇淋倒是挺不錯的"
20037-200370240 = "……"
20037-200370250 = "嗯，如果是跟老師一起的話，或許偶爾老老實實地巡邏也不錯"
20037-200370260 = "終於找到我的樂園了"
20037-200370270 = "這裡就像是不會被任何人打擾的避風港……"
20037-200370280 = "只要待在這裡，我就可以不用管別人的眼光，好好休息了……！"
20037-200370290 = "你找到了什麼可以躲起來的地方嗎？"
20037-200370300 = "恭喜你找到了適合偷懶的好地方"
20037-200370310 = "老師也想來看看嗎？"
20037-200370320 = "不過你可不能下水哦"
20037-200370330 = "不然我要監視的遊客會變多的"
20037-200370340 = "明明是水上樂園還叫別人不要下水……"

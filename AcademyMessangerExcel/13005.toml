[translation]
13005-1039 = "선생은 인상 때문에 고민해 본 경험 있어?"
13005-1040 = "왜 갑자기 그런 생각을 한 거야?"
13005-1041 = "그게…… 선생도 알다시피 내 인상이 좀 사나운 편이잖아."
13005-1042 = "그러다 보니 이상하게 시비가 걸리는 일이 잦아서 말이야."
13005-1043 = "인상이 사나워서 좋은 일은 별로 없는 것 같아."
13005-1044 = "선생, 전에 구해달라고 의뢰했던 물건이 방금 들어왔어."
13005-1045 = "오, 드디어 들어왔구나!"
13005-1046 = "후후, 반응을 보니 오랫동안 기대했던 물건인가 보네."
13005-1047 = "오후에 시간 되면 우리 흥신소에 들러서 찾아가."
13005-1048 = "샬레의 일이 끝나면 바로 찾아갈게."
13005-1049 = "선생은 특별히 즐겨 듣는 음악 장르가 있어?"
13005-1050 = "대중가요려나."
13005-1051 = "클래식이려나."
13005-1052 = "그렇구나. 무난한 편이네."
13005-1053 = "카요코는 어떤 음악을 좋아해?"
13005-1054 = "나도, 뭐…… 평범한 걸 좋아해서. 선생이랑 음악 취향은 비슷할 것 같아."
13005-1055 = "선생, 내가 추천해 준 2집 앨범은 다 들었어?"
13005-1056 = "어때, 역시 블랙 데스 포이즌의 곡은 최고지?"
13005-1057 = "……뭔가 인상적이었어."
13005-1058 = "……뭔가 전위적이었어."
13005-1059 = "역시 선생은 그 곡의 진가를 알아보는구나. 다행이야."
13005-1060 = "2집 앨범은 1집 앨범에 비해 가사는 많이 순화되었지만,"
13005-1061 = "사운드가 거칠어서 진짜 헤비메탈 팬들은 이쪽을 더 좋아하는 편이지."
13005-1062 = "블랙 데스 포이즌의 2집이 마음에 들었다면 이번에는 3집을 빌려줄게."
13005-1063 = "헤비메탈은 이제 괜찮아……."
13005-1064 = "선생, 일기예보를 보니 오늘 오후에는 비가 온다고 하네."
13005-1065 = "오늘은 출근할 때 잊지 말고 우산 챙겨가."
13005-1066 = "트리니티에는 세상의 모든 책을 모아 놓은 거대한 도서관이 있다고 하는데……"
13005-1067 = "세상의 모든 음반을 모아 놓은 음반 매장은 어디 없으려나?"
13005-1068 = "키보토스 상점가에 있는 <레코드 빌딩>은 어때?"
13005-1069 = "세상의 모든 음반이 있는 건 아니지만…… 레코드 빌딩 정도면 나쁘지 않지."
13005-1070 = "장르를 불문한 다양한 음반을 모아 놓고 있으니까."
13005-1071 = "나도 휴일에는 음악을 감상하러 자주 놀러 가곤 해."

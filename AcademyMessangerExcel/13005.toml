[translation]
13005-1039 = "ครูเคยกังวลเกี่ยวกับหน้าตาบ้างไหม?"
13005-1040 = "ทำไมจู่ๆ ก็ถามแบบนี้ล่ะ?"
13005-1041 = "ก็แบบ... ครูก็รู้นี่นาว่าหน้าตาฉันออกไป\nทางดุๆ"
13005-1042 = "ก็เลยมีเรื่องชวนทะเลาะกับคนอื่นอยู่เรื่อย"
13005-1043 = "การที่หน้าตาดูดุแบบนี้ไม่ใช่เรื่องดีเลย"
13005-1044 = "เราได้ของที่ได้รับภารกิจให้ตามหาแล้วล่ะ"
13005-1045 = "จริงเหรอ? ได้มาแล้วเหรอ!?"
13005-1046 = "ดีใจขนาดนี้ คงจะอยากได้มากเลยสินะ"
13005-1047 = "ถ้ามีเวลาก็ไปรับของที่หน่วยรับจ้าง\nสารพัดสิ"
13005-1048 = "ถ้าเสร็จงานที่ชาเล่ต์แล้วครูจะไปทันทีเลย"
13005-1049 = "ครูมีแนวเพลงที่ชอบไหม?"
13005-1050 = "คิดว่าเพลงป๊อปนะ"
13005-1051 = "น่าจะเป็นเพลงคลาสสิก"
13005-1052 = "เป็นคนฟังอะไรง่ายๆ สินะ"
13005-1053 = "แล้วคาโยโกะล่ะชอบเพลงอะไร?"
13005-1054 = "ฉันเองก็... อืม... ชอบเพลงฟังง่ายๆ\nชอบเหมือนที่ครูชอบเลยล่ะ"
13005-1055 = "ครูฟังเพลงอัลบั้ม 2 ที่ฉันแนะนำไปหรือยัง?"
13005-1056 = "เพลงของวง 'พิษสีดำแห่งความตาย'\nเพราะสุดๆ ไปเลยใช่ไหมล่ะ?"
13005-1057 = "อืม... เพลงน่าประทับใจดี"
13005-1058 = "อืม... เพลงล้ำสมัยดี"
13005-1059 = "กะแล้วว่าครูต้องเข้าถึงคุณค่าของเพลงนี้\nดีจังที่ครูชอบ"
13005-1060 = "เนื้อเพลงอัลบั้ม 2 ดูเรียบง่ายกว่าอัลบั้ม 1"
13005-1061 = "แต่แฟนๆ เฮฟวี่เมทัลชอบดนตรีบีทหนักๆ\nแบบนี้"
13005-1062 = "ถ้าชอบอัลบั้ม 2 ล่ะก็ เดี๋ยวฉันจะให้ยืม\nอัลบั้ม 3 ไปฟังด้วย "
13005-1063 = "พักเพลงเฮฟวี่เมทัลก่อนดีกว่า..."
13005-1064 = "วันนี้พยากรณ์อากาศบอกว่าช่วงบ่ายๆ\nเย็นๆ ฝนจะตกล่ะ"
13005-1065 = "ก่อนไปทำงานก็อย่าลืมเอาร่มติดตัวไป\nด้วยนะ"
13005-1066 = "ได้ยินมาว่าในทรีนิตี้มีห้องสมุดใหญ่ที่รวม\nหนังสือทั่วทุกมุมโลกเอาไว้ด้วย..."
13005-1067 = "จะมีร้านซีดีที่มีอัลบั้มเพลงทั่วโลกบ้าง\nมั้ยนะ?"
13005-1068 = "ลองไปร้าน 'เรคคอร์ดบิลดิ้ง' ในย่าน\nการค้าคิโวทอสดูสิ"
13005-1069 = "นี่นั่นดูไม่เลวเลย... แม้จะไม่มีซีดีเพลง\nจากทั่วโลกก็เถอะ"
13005-1070 = "เพราะยังไงก็มีซีดีเพลงเยอะ และไม่\nจำกัดแนวเพลง"
13005-1071 = "ฉันก็แวะไปฟังเพลงที่นั่นบ่อยๆ"

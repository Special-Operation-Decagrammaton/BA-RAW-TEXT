[translation]
13005-1039 = "老師有因為自己的外貌苦惱過嗎？"
13005-1040 = "這麼突然，怎麼了？"
13005-1041 = "……如老師知道的那樣，我經常聽人說我給人的第一印象很可怕"
13005-1042 = "經常被奇怪的人事糾纏"
13005-1043 = "拜此所賜……也沒獲得過什麼好處"
13005-1044 = "老師，之前說要找的東西，終於入手了唷"
13005-1045 = "太好了，謝謝！"
13005-1046 = "看這反應，想必是找很久了。那太好了"
13005-1047 = "今天下午如果有空的話，可以來便利屋領取"
13005-1048 = "夏萊的工作結束後，馬上就去"
13005-1049 = "老師有喜歡的音樂類型嗎？"
13005-1050 = "流行歌曲吧"
13005-1051 = "古典音樂吧"
13005-1052 = "這樣啊，我覺得很適合你"
13005-1053 = "佳世子喜歡什麼樣的音樂？"
13005-1054 = "我……普普通通吧。可能跟老師的很接近"
13005-1055 = "那個第二張專輯，聽完了嗎？"
13005-1056 = "「Black Death Poison」是不是很棒？"
13005-1057 = "……腦袋被狠狠重擊一樣的感覺"
13005-1058 = "……感覺挺前衛的"
13005-1059 = "不愧是老師，我就知道你懂"
13005-1060 = "第二張專輯的歌詞比第一張容易理解"
13005-1061 = "但聲音更加強烈，所以更多人喜歡這張"
13005-1062 = "如果喜歡的話，下次借你第三張專輯"
13005-1063 = "我會考慮的……"
13005-1064 = "氣象預報說今天下午會下雨"
13005-1065 = "不要忘記帶傘唷"
13005-1066 = "三一好像有一座收集了世界上所有書籍的巨大圖書館……"
13005-1067 = "會不會也有唱片店收集了全世界的唱片呢？"
13005-1068 = "商店街的「The．Record Building」如何？"
13005-1069 = "那裡雖說不到全世界……但品項確實挺齊全"
13005-1070 = "不分種類收集了各種類型的唱片"
13005-1071 = "我假日常去"

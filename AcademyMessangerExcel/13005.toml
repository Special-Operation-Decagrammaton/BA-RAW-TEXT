[translation]
13005-1039 = "Have you ever worried about the impression you make on others?"
13005-1040 = "What made you ask that all of a sudden?"
13005-1041 = "I mean... I'm sure you've noticed that I look kind of threatening."
13005-1042 = "I think that's why I keep getting into fights."
13005-1043 = "There's not much good that can come from a bad first impression."
13005-1044 = "Sensei. The item you requested just arrived."
13005-1045 = "Oh, it's finally here!"
13005-1046 = "Heehee! Based on your reaction, you must have really been looking forward to this."
13005-1047 = "If you have time this afternoon, stop by the Problem Solver office to pick it up."
13005-1048 = "I'll be there as soon as I'm done with my Schale stuff."
13005-1049 = "Is there a particular genre of music you prefer?"
13005-1050 = "Pop, I guess."
13005-1051 = "Maybe classical?"
13005-1052 = "I see. That's a good choice."
13005-1053 = "What kind of music do you like, Kayoko?"
13005-1054 = "Well... I like normal stuff, so I think our tastes are probably the same."
13005-1055 = "Sensei, did you finish listening to the second album I recommended?"
13005-1056 = "How was it? Isn't Black Death Poison the best?"
13005-1057 = "It was quite...impressive."
13005-1058 = "It was quite...avant-garde."
13005-1059 = "I'm glad you recognize the value of their music."
13005-1060 = "Their second album's lyrics are much tamer than their first,"
13005-1061 = "but the sound is really heavy, so metalheads tend to prefer the second album."
13005-1062 = "If you liked Black Death Poison's second album, I can lend you their third. "
13005-1063 = "I think I've had enough heavy metal for now..."
13005-1064 = "Sensei, they say it's gonna rain this afternoon."
13005-1065 = "Don't forget your umbrella when you leave home."
13005-1066 = "I've heard there's a massive library in Trinity that has every book in the world..."
13005-1067 = "Is there a music store that has every album in the world?"
13005-1068 = "What about the Record Building in Kivotos? The one in the shopping district?"
13005-1069 = "I don't know if it has every album in the world, but it still has a bunch."
13005-1070 = "They have all kinds of albums across every genre."
13005-1071 = "I often go there on weekends to listen to their music."

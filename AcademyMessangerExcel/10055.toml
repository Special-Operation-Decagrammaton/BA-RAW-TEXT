[translation]
10055-100550010 = "선생님?"
10055-100550020 = "듣자 하니 조만간 우리 학교로 올 일이 있다던데, 사실이야?"
10055-100550030 = "아아. 응. 사실이야."
10055-100550040 = "무슨 일 있어?"
10055-100550050 = "뭐, 딱히 이유가 있어서 그러는 건 아니고."
10055-100550060 = "간만에 얼굴 좀 볼 수 있을까 하고 기대하는 거지."
10055-100550070 = "후후"
10055-100550080 = "시간 있으면 특별반에도 좀 들러줘~"
10055-100550090 = "선생님도 붉은겨울 학원에 올 때마다 느끼겠지만"
10055-100550100 = "우리 학원은 부지가 너무 과하게 넓은 것 같아"
10055-100550110 = "확실히 굉장히 넓긴 하지."
10055-100550120 = "게다가 기온도 낮고 흉포한 야생 동물도 많은 편이라"
10055-100550130 = "그러니 올 일이 있으면 꼭 날 불러줘"
10055-100550140 = "가이드 없이 붉은겨울 학원을 혼자 돌아다니면"
10055-100550150 = "위험한 일을 당할 수도 있으니까 말이야"
10055-100550160 = "알겠지?"
10055-100550170 = "잘 들어갔어? 선생님."
10055-100550180 = "또 딴 길로 샜다거나 그러지는 않았겠지?"
10055-100550190 = "덕분에 잘 돌아왔어."
10055-100550200 = "걱정하지 마. 오늘은 이제 쉴 거야."
10055-100550210 = "좋아. 그 말을 들으니 안심이 되네."
10055-100550220 = "처음에도 이야기했지만"
10055-100550230 = "붉은겨울 학원에 올 일이 있으면 꼭 연락해야 해."
10055-100550240 = "알겠지?"
10055-100550250 = "선생님. 혹시 불렀어?"
10055-100550260 = "선생님이 나를 찾았다는 이야기를 들어서 말이야."
10055-100550270 = "응. 혹시 나중에 시간 좀 괜찮아?"
10055-100550280 = "전에 받은 도움의 답례를 하고 싶어서."
10055-100550290 = "호오"
10055-100550300 = "보기보다 단도직입적인걸. 또 이렇게 의외의 면모를 보게 되네"
10055-100550310 = "뭐"
10055-100550320 = "안 될 거야 없겠지?"
10055-100550330 = "그럼 나중에 신세 좀 질게."
10055-100550340 = "그때 보자, 선생님."
10055-100550350 = "선생님, 잘 들어갔어?"
10055-100550360 = "오늘은 선생님도 길 헤맬 곳이 아니라서 마음이 좀 놓이네"
10055-100550370 = "잘 들어갔지. 시구레는?"
10055-100550380 = "시구레야말로 잘 들어갔어?"
10055-100550390 = "응. 덕분에 무사히"
10055-100550400 = "아무튼 오늘은 정말 잘 먹었어"
10055-100550410 = "그럼 다음에는 내가 보답할 차례이려나?"
10055-100550420 = "이렇게 계속 답례와 대접을 주고받는 것도 썩 나쁘지 않은 것 같아"
10055-100550430 = "좋아. 다음엔 내 차례라고 알고 있을게"
10055-100550440 = "후후"
10055-100550450 = "그럼 좋은 하루 보내, 선생님."
10055-100550460 = "선생님"
10055-100550470 = "혹시 괜찮다면, 나중에 시간 좀 내줄 수 있을까?"
10055-100550480 = "저번 일의 답례도 할 겸"
10055-100550490 = "이번에는 내가 선생님한테 요리를 대접해 주고 싶은데"
10055-100550500 = "시구레가 나한테 요리를?"
10055-100550510 = "샬레로 찾아오는 거야?"
10055-100550520 = "응, 맞아"
10055-100550530 = "괜찮은 날을 정해주면 재료를 들고 찾아갈게"
10055-100550540 = "기대해도 좋다고"
10055-100550550 = "그럼 그때 봐. 선생님."
10055-100550560 = "아"
10055-100550570 = "감사 인사를 전했어야 했는데 깜빡했네, 미안."
10055-100550580 = "선생님이 만들어 준 요리, 굉장히 맛있었어."
10055-100550590 = "인제 와서 드는 생각인데"
10055-100550600 = "음"
10055-100550610 = "밑간을 할 때 보드카를 썼으면 더 좋지 않았을까?"
10055-100550620 = "맛술이 필요하면 청주를 쓰도록 해……."
10055-100550630 = "보드카는 요리에도 사용 금지야."
10055-100550640 = "후후"
10055-100550650 = "여전히 즐겁네, 선생님의 잔소리"
10055-100550660 = "알았어"
10055-100550670 = "그럼 다음에 또 봐, 선생님"

[translation]
10055-100550010 = "Sensei?"
10055-100550020 = "There's rumors you'll be visiting us soon. Is that true?"
10055-100550030 = "Yup. The rumors are true."
10055-100550040 = "Why were you wondering?"
10055-100550050 = "Not for any particular reason, I guess."
10055-100550060 = "Just wondering...if I'll get to see you while you're here."
10055-100550070 = "Heehee."
10055-100550080 = "You should stop by Spec Ops... If you have time."
10055-100550090 = "I mean, I'm sure you think of us every time you come visit anyway, right? Heehee."
10055-100550100 = "I think our school takes up way more space than we need."
10055-100550110 = "It's pretty big, I'd agree."
10055-100550120 = "On top of that, there's wild bears everywhere, and it's always cold."
10055-100550130 = "Anyways, let me know when you get here."
10055-100550140 = "If you try to go around campus without a guide,"
10055-100550150 = "you could get yourself into some real trouble."
10055-100550160 = "All right?"
10055-100550170 = "Did you get back okay, Sensei?"
10055-100550180 = "You didn't get distracted or anything, did you?"
10055-100550190 = "I'm back home now, thanks to you."
10055-100550200 = "I'm going to get some rest now, so don't worry."
10055-100550210 = "Okay, okay. If you say so."
10055-100550220 = "But like I said,"
10055-100550230 = "you've got to tell me when you're coming to Red Winter Academy."
10055-100550240 = "Promise?"
10055-100550250 = "You need something, Sensei?"

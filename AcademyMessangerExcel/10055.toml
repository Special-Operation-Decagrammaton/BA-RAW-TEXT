[translation]
10055-100550010 = "คุณครู?"
10055-100550020 = "ได้ยินว่าเดี๋ยวคุณครูจะมาทำธุระ\nที่โรงเรียนเรางั้นเหรอ?"
10055-100550030 = "อ๋อ ใช่แล้ว"
10055-100550040 = "มีอะไรเหรอ?"
10055-100550050 = "อืม.. ไม่ได้มีเหตุผลอะไรเป็นพิเศษหรอก"
10055-100550060 = "ก็แค่อยากเห็นหน้าหน่อยน่ะ ไม่ได้เจอ\nกันมาสักพักแล้วนี่เนอะ"
10055-100550070 = "ฮิฮิ"
10055-100550080 = "ถ้ามีเวลาก็แวะมาห้องเรียนพิเศษบ้างนะ~"
10055-100550090 = "คุณครูก็น่าจะรู้สึกเหมือนกัน\nในทุกครั้งที่มาสหภาพเรดวินเทอร์"
10055-100550100 = "ว่าโรงเรียนของเรามันกว้างขวางเกินไป"
10055-100550110 = "กว้างมากๆ เลยละ!"
10055-100550120 = "แถมอากาศหนาวแล้วก็มี\nสัตว์ป่าดุร้ายมากมาย"
10055-100550130 = "เพราะงั้นเวลามาที่นี่ก็บอกฉันนะ"
10055-100550140 = "ถ้ามาเดินเตร็ดเตร่ในสหภาพเรดวินเทอร์\nโดยไม่มีใครนำทางละก็..."
10055-100550150 = "คุณครูอาจเจอเรื่องอันตรายได้"
10055-100550160 = "เข้าใจมั้ย?"
10055-100550170 = "คุณครู ถึงที่พักแล้วหรือยัง?"
10055-100550180 = "ไม่ได้แอบไปที่อื่นอีกใช่มั้ย?"
10055-100550190 = "อื้ม ครูมาถึงแล้ว"
10055-100550200 = "ไม่ต้องห่วงหรอก\nครูว่าจะไปพักผ่อนแล้ว"
10055-100550210 = "ดีมาก ได้ฟังแบบนี้ก็โล่งใจ"
10055-100550220 = "ถึงฉันจะบอกไปแล้วก็เถอะ"
10055-100550230 = "แต่ถ้ามีธุระต้องมาที่สหภาพเรดวินเทอร์\nต้องติดต่อฉันด้วยนะ"
10055-100550240 = "เข้าใจมั้ย?"
10055-100550250 = "คุณครู เรียกฉันเหรอ?"
10055-100550260 = "ได้ยินมาว่าคุณครูเรียกหาฉันน่ะ"
10055-100550270 = "อื้ม พอมีเวลาว่างบ้างมั้ย?"
10055-100550280 = "ครูอยากตอบแทนที่ชิกุเระ\nช่วยครูไว้ก่อนหน้านี้น่ะ"
10055-100550290 = "โอ้..."
10055-100550300 = "เป็นคนตรงไปตรงมามากกว่าที่เห็นแฮะ\nได้เห็นด้านที่คาดไม่ถึงอีกแล้ว  "
10055-100550310 = "อืม"
10055-100550320 = "ปฏิเสธคงไม่ดีสินะ?"
10055-100550330 = "งั้นก็รบกวนด้วยแล้วกัน"
10055-100550340 = "ไว้เจอกันนะคุณครู"
10055-100550350 = "คุณครู ถึงที่พักแล้วยังน่ะ?"
10055-100550360 = "วันนี้ฉันค่อนข้างเบาใจ เพราะคุณครูคง\nไม่ไปเดินเตร็ดเตร่ที่ไหน"
10055-100550370 = "ครูกลับมาถึงแล้ว ชิกุเระล่ะ?"
10055-100550380 = "ชิกุเระก็ถึงที่พักแล้วใช่มั้ย?"
10055-100550390 = "อื้ม มาถึงอย่างปลอดภัยเลย"
10055-100550400 = "วันนี้ได้กินอาหารอร่อยๆ เยอะเลย"
10055-100550410 = "งั้นต่อไปก็ต้องเป็นตาของฉันแล้วหรือ\nเปล่านะ?"
10055-100550420 = "ได้ผลัดกันตอบแทนไปเรื่อยๆ แบบนี้\nก็ไม่เลวเหมือนกันนะ"
10055-100550430 = "ดีละ งั้นครั้งหน้าฉันขอเป็นเจ้ามือแล้วกัน"
10055-100550440 = "ฮิฮิ"
10055-100550450 = "งั้นก็ไปพักผ่อนเถอะคุณครู"
10055-100550460 = "คุณครู"
10055-100550470 = "ถ้าไม่ได้ติดธุระอะไร ขอเวลาให้ฉัน\nหน่อยได้มั้ย?"
10055-100550480 = "ฉันอยากตอบแทนเรื่องคราวที่แล้ว"
10055-100550490 = "ครั้งนี้ฉันอยากลองทำอาหาร\nให้คุณครูชิมน่ะ"
10055-100550500 = "ชิกุเระจะทำอาหารให้ครูเหรอ?"
10055-100550510 = "จะมาที่ชาเล่ต์เหรอ?"
10055-100550520 = "อื้ม ใช่แล้ว"
10055-100550530 = "ถ้าคุณครูบอกวันที่สะดวกมา\nฉันจะเตรียมวัตถุดิบไปเอง"
10055-100550540 = "ขอบอกว่าตั้งตารอได้เลย"
10055-100550550 = "ไว้เจอกันนะ คุณครู"
10055-100550560 = "อ้อ"
10055-100550570 = "ฉันต้องขอบคุณคุณครูด้วย แต่ดันลืม\nไปซะได้ ขอโทษนะ"
10055-100550580 = "อาหารที่คุณครูทำให้อร่อยมากๆ เลย"
10055-100550590 = "พอดีเพิ่งจะมานึกได้น่ะ"
10055-100550600 = "อืม"
10055-100550610 = "แต่ตอนปรุงรส ถ้าใช้วอดก้าก็น่าจะ\nอร่อยกว่านั้นนะ"
10055-100550620 = "ถ้าอยากใส่แอลกอฮอล์\nก็ใช้ไวน์ข้าวแทนเอานะ..."
10055-100550630 = "วอดก้าเป็นของต้องห้าม\nในการทำอาหารนะ"
10055-100550640 = "ฮิฮิ"
10055-100550650 = "คำบ่นของคุณครูเนี่ย ฟังทีไรก็สนุกนะ"
10055-100550660 = "ก็ได้ๆ"
10055-100550670 = "งั้นไว้เจอกันใหม่นะคุณครู"

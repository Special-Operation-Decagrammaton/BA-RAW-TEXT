[translation]
10055-100550010 = "老師"
10055-100550020 = "聽說你最近會到赤冬來，是真的嗎？"
10055-100550030 = "嗯，有那個打算"
10055-100550040 = "有什麼事嗎？"
10055-100550050 = "也沒有，雖然沒什麼特別的事"
10055-100550060 = "只是覺得似乎能久違地見到老師"
10055-100550070 = "呵呵"
10055-100550080 = "如果有空能來227號這邊一趟我會很開心的"
10055-100550090 = "我想老師應該也覺得"
10055-100550100 = "我們學園的領地實在太大了對吧"
10055-100550110 = "這倒是真的"
10055-100550120 = "而且氣溫又低，還有很多凶暴的野生動物"
10055-100550130 = "所以，過來的時候和我說一聲吧"
10055-100550140 = "如果沒有嚮導陪同的話"
10055-100550150 = "可能會遇到危險的"
10055-100550160 = "那就先這樣"
10055-100550170 = "老師，順利回去了嗎？"
10055-100550180 = "該不會還繞到其他地方去了吧？"
10055-100550190 = "託妳的福我沒事"
10055-100550200 = "今天就讓我好好休息吧"
10055-100550210 = "嗯，那就好"
10055-100550220 = "雖然剛才也說過了"
10055-100550230 = "來赤冬的時候，請先聯絡我哦"
10055-100550240 = "安全第一。\n知道了嗎？"
10055-100550250 = "老師，我剛剛聽說"
10055-100550260 = "你在找我是嗎？"
10055-100550270 = "嗯，待會有空嗎？"
10055-100550280 = "我想答謝你之前的幫忙"
10055-100550290 = "嘿～我很期待哦"
10055-100550300 = "其實不用那麼客氣的，呵呵"
10055-100550310 = "不過，這樣也好"
10055-100550320 = "了解"
10055-100550330 = "那，待會見"
10055-100550340 = "請多關照囉"
10055-100550350 = "老師，平安到家了嗎？"
10055-100550360 = "雖然今天老師不是在會迷路的地方就是了"
10055-100550370 = "嗯，順利回來了唷"
10055-100550380 = "時雨妳呢，還好嗎？"
10055-100550390 = "嗯，託你的福"
10055-100550400 = "今天真的很謝謝你"
10055-100550410 = "下次就輪到我回禮了呢"
10055-100550420 = "像這樣不斷禮尚往來好像也不錯"
10055-100550430 = "所以，到時候就拜託囉"
10055-100550440 = "呵呵"
10055-100550450 = "那麼，祝你有美好的一天"
10055-100550460 = "老師"
10055-100550470 = "方便的話，之後可以耽誤你一點時間嗎？"
10055-100550480 = "連同先前的回禮"
10055-100550490 = "我想為你做點料理"
10055-100550500 = "料理？"
10055-100550510 = "你要來夏萊嗎？"
10055-100550520 = "嗯，沒錯"
10055-100550530 = "我會帶材料過去的"
10055-100550540 = "敬請期待唷"
10055-100550550 = "那，稍後再確定時間吧"
10055-100550560 = "這麼說來，我好像忘記向你道謝了"
10055-100550570 = "抱歉，這麼晚才說"
10055-100550580 = "謝謝，真的很好吃"
10055-100550590 = "還有，我想到一件事"
10055-100550600 = "剛才的伏特加"
10055-100550610 = "在事先調味的時候用不就好了嗎？"
10055-100550620 = "料理的時候要用清酒哦"
10055-100550630 = "伏特加是不行的"
10055-100550640 = "呵呵"
10055-100550650 = "老師果然很有趣呢"
10055-100550660 = "了解，我會那麼做的"
10055-100550670 = "那下次見囉，老師"

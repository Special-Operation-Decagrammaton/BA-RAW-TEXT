10055-100550300 = "I didn't expect you to be so...forward, I guess."
10055-100550310 = "Well..."
10055-100550320 = "Sure, why not?"
10055-100550330 = "I'll look forward to it."
10055-100550340 = "See you soon, Sensei."
10055-100550350 = "Did you get home okay, Sensei?"
10055-100550360 = "I wasn't too worried, this time at least. Even you can't lose the path on a day like today."
10055-100550370 = "I'm safe and sound. What about you?"
10055-100550380 = "Did you get home safely?"
10055-100550390 = "Yes, thanks to you."
10055-100550400 = "Seriously, thanks. The food was really good too."
10055-100550410 = "Next time, let me treat you."
10055-100550420 = "That kind of give-and-take'd be nice, you know?"
10055-100550430 = "Good? The next one's on me."
10055-100550440 = "Heehee."
10055-100550450 = "Okay, have a good one, Sensei."
10055-100550460 = "Sensei."
10055-100550470 = "No pressure to say yes, but do you have some time today?"
10055-100550480 = "I still need to get you back for the last time."
10055-100550490 = "So, let me make food for you today."
10055-100550500 = "You want to cook for me?"
10055-100550510 = "At Schale?"

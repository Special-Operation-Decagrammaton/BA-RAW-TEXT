[translation]
10082-100820010 = "선생님. 놀라지 말고 들어…."
10082-100820020 = "그야말로 나 후와 렌게, 일생일대 최대의 위기야!"
10082-100820030 = "너무 갑작스러운 이야기라 따라가기 힘들지만…."
10082-100820040 = "렌게, 무슨 일이야?"
10082-100820050 = "요사이에 계속해서 고민하고 고민하고 생각한 끝에"
10082-100820060 = "난 마침내 깨달았어."
10082-100820070 = "이대로 있으면 이거고 저거고 전부 끝장일지도 모른다는 걸!"
10082-100820080 = "미안, 렌게. 역시 이야기를 따라가기가 힘든데?!"
10082-100820090 = "으으윽! 그런가… 역시 모모톡만으로 전하는 건 무리일지도…."
10082-100820100 = "하긴 진심이란 얼굴을 맞대고 부딪칠 때야말로 비로소 전해지는 법이니까!"
10082-100820110 = "어?! 그쪽의 이야기로 가는 거야?!"
10082-100820120 = "으음! 그럼 선생님 이러고 있을 게 아니라…"
10082-100820130 = "부탁이야! 상담 좀 해주라!"
10082-100820140 = "뭐, 상담이라면야 얼마든지 괜찮지만…."
10082-100820150 = "진짜?!"
10082-100820160 = "알았어! 그럼 기다리고 있을게!"
10082-100820170 = "선생님…."
10082-100820180 = "아니, 청춘의 스승님!"
10082-100820190 = "그 호칭, 아직 좀 낯설고 부끄러운 걸…."
10082-100820200 = "에이, 뭘 빼고 그래."
10082-100820210 = "전에 말했던 것처럼 선생님은 내 청춘의 스승님이니까!"
10082-100820220 = "좀 더 가슴과 어깨를 펴도 좋다구!"
10082-100820230 = "으응…."
10082-100820240 = "자자, 이럴 게 아니라. 본격적으로 청춘 활동, 시작해 보자구."
10082-100820250 = "오늘부터 나도 스승님의 가르침을 충실히 따르는…."
10082-100820260 = "한 명의 가련하고 뿌듯한 학생이 될 테니까!"
10082-100820270 = "그야말로 한 점 흐림 없는 당찬 선언…!"
10082-100820280 = "엄청 렌게 다운 걸!"
10082-100820290 = "자아, 그럼 오늘도 백화요란의 조정실에서 집합이야! 스승님!"
10082-100820300 = "선생님. 집에 돌아와서 곰곰이 생각해 본 건데 말이야."
10082-100820310 = "역시 선생님은 선생님이니까."
10082-100820320 = "전학생은 무리였지?"
10082-100820330 = "그걸 이제 와서 말하기야……?"
10082-100820340 = "뭐, 관계성은 전학생만 있는 건 아니니까!"
10082-100820350 = "다음엔 새로운 관계성을 생각해 볼게!"
10082-100820360 = "뭐, 렌게가 그렇게 말한다면야."
10082-100820370 = "그럼, 다음에 또 하자. <청춘 활동>"
10082-100820380 = "응! 다음에 또!"
10082-100820390 = "으음. 청춘에 있어 관계성의 정석이라고 하면"
10082-100820400 = "역시 '그걸' 빼놓을 수 없겠지."
10082-100820410 = "응. 맞아, 왜 지금까지 그걸 잊고 있었담."
10082-100820420 = "그거…… 라고 해도 말이야."
10082-100820430 = "그게 무슨 관계성인데?"
10082-100820440 = "아, 그게 말이지."
10082-100820450 = "음…."
10082-100820460 = "으음…."
10082-100820470 = "아냐, 미리 밝히게 되면 재미가 없을지도!"
10082-100820480 = "좋아. 다음 <청춘 활동> 내용은 정했어!"
10082-100820490 = "그러니 내일 샬레로 찾아갈게! 선생님!"
10082-100820500 = "아, 으응. 알겠어. 그럼 내일 보자. 렌게."
10082-100820510 = "응!"
10082-100820520 = "오, 오늘 있었던 일은 취소!"
10082-100820530 = "없던 걸로!"
10082-100820540 = "응! 소꿉친구는 아직 우리 사이에 허들이 너무 높으니까!"
10082-100820550 = "그, 그래?"
10082-100820560 = "맞아! 그런 거야!"
10082-100820570 = "그러니 다음엔, 다, 다른 관계성으로 찾아갈 테니까!"
10082-100820580 = "각오하라고! 스승님!"
10082-100820590 = "넵……."
10082-100820600 = "선생님. 어느덧 우리들이 <청춘 활동>을 시작한 지도…."
10082-100820610 = "제법 오랜 시간이 지났네."
10082-100820620 = "그러게."
10082-100820630 = "벌써 그렇게 됐나?"
10082-100820640 = "좌충우돌하고 제대로 감을 잡지 못할 때도 있었지만."
10082-100820650 = "음음, 그래도 한 걸음씩 착실히 전진하고 있단 느낌이 들어."
10082-100820660 = "그런 의미에서 오늘도 청춘 활동을 위한 집합이야."
10082-100820670 = "바로 샬레로 갈 테니까!"
10082-100820680 = "응. 기다리고 있을게."
10082-100820690 = "그럼 이따가 봐!"
10082-100820700 = "여러 가지로 폐를 끼쳐버렸지만 말이야. 선생님."
10082-100820710 = "그게…."
10082-100820720 = "앞으로도 <청춘 활동> 열심히 하자. 렌게."
10082-100820730 = "걱정해줘서 고마워."
10082-100820740 = "아, 응."
10082-100820750 = "잘 알고 있네! 선생… 아니 스승님!"
10082-100820760 = "그럼 다음에 또 같이 활동하자!"
10082-100820770 = "스승님, 잠시 시간 돼?"
10082-100820780 = "조금 관심 있는 청춘 활동이 있어서……."
10082-100820790 = "어떤 청춘 활동인데?"
10082-100820800 = "사제와 함께하는—"
10082-100820810 = "휴일 쇼핑!"
10082-100820820 = "학생일 때만 누릴 수 있는 청춘 활동이지 않을까 해서."
10082-100820830 = "오, 기대되네!"
10082-100820840 = "가지고 싶은 거라도 있어?"
10082-100820850 = "음, 딱히 뭘 살진 안 정했는데."
10082-100820860 = "목표는 상점가에서 같이 시간을 보내는 거니까."
10082-100820870 = "윈도쇼핑도 묘미가 있잖아?"
10082-100820880 = "데이트랑 다를 게 없네!"
10082-100820890 = "하핫, 데이트는 무슨 데이트야?"
10082-100820900 = "…………"
10082-100820910 = "아니, 잠깐."
10082-100820920 = "데이트 맞나?"
10082-100820930 = "…………"
10082-100820940 = "아, 아무튼 어서 나와!"
10082-100820950 = "상점가에서 기다릴 테니까."
10082-100820960 = "저기, 스승님."
10082-100820970 = "오늘 선물 고마웠어."
10082-100820980 = "정말로 특별한 리본이 됐네……."
10082-100820990 = "소중하게 간직할게."
10082-100821000 = "나도 오늘 선물 고마웠어."
10082-100821010 = "다음에는 좀 더 제대로 된 걸 사줄 테니까."
10082-100821020 = "그러니까 또…… 쇼핑을 하러 가자."
10082-100821030 = "알겠지?"
10082-100821040 = "응! 기대하고 있을게!"
10082-100821050 = "나도!"

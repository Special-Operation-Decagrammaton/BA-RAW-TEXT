[translation]
10082-100820010 = "คุณครู อย่าเพิ่งตกใจนะ..."
10082-100820020 = "ตอนนี้ฉัน ฟูวะ เรนเกะ กำลังเจอ\nวิกฤตการณ์ที่ใหญ่ที่สุดในชีวิตเลย!"
10082-100820030 = "จู่ๆ มาพูดแบบนี้ ครูงงนะ..."
10082-100820040 = "มีเรื่องอะไรเหรอ เรนเกะ?"
10082-100820050 = "หลังจากคิดหนักมาหลายวัน"
10082-100820060 = "ฉันก็ได้รู้แล้วละ"
10082-100820070 = "ว่าถ้ายังเป็นแบบนี้ต่อไป ทุกอย่างต้อง\nจบเห่แน่ๆ!"
10082-100820080 = "ขอโทษนะ เรนเกะ ครูตามไม่ทันจริงๆ"
10082-100820090 = "อึก! งั้นเหรอ...? บอกทาง MOMOTALK\nอาจไม่สะดวกจริงๆ ด้วยสินะ"
10082-100820100 = "แต่ก็นะ ถ้าพูดคุยกันต่อหน้าจะต้อง\nรับรู้ถึงความจริงใจได้ดีกว่าแน่ๆ!"
10082-100820110 = "หืม?! กลายเป็นงั้นไปแล้วเหรอ?!"
10082-100820120 = "อื้ม! งั้นก็อย่ามาเสียเวลาอยู่เลย\nคุณครู..."
10082-100820130 = "ขอร้องละ! ฉันขอปรึกษาหน่อย!"
10082-100820140 = "ได้สิ ถ้าจะปรึกษาอะไร\nครูก็สะดวกตลอด..."
10082-100820150 = "จริงเหรอ?!"
10082-100820160 = "เข้าใจแล้ว! ถ้างั้นฉันจะรอนะ!"
10082-100820170 = "คุณครู..."
10082-100820180 = "ไม่สิ ปรมาจารย์แห่งชีวิตวัยรุ่น"
10082-100820190 = "ครูยังไม่ชินกับชื่อเรียกนี้เลย\nเขินๆ นิดหน่อยด้วย..."
10082-100820200 = "ไม่เอาน่า อย่าปฏิเสธสิ "
10082-100820210 = "ก็คุณครูเป็นผู้ชี้แนะชีวิตวัยรุ่น\nอย่างที่ฉันบอกไปคราวก่อนไงล่ะ!"
10082-100820220 = "ยืดอกเข้าไว้ มั่นใจหน่อยสิ!"
10082-100820230 = "อืม..."
10082-100820240 = "เอาละๆ นี่ไม่ใช่เวลามาคุยแบบนี้อยู่นะ\nมาเริ่มกิจกรรมวัยรุ่นอย่างจริงจังกันเถอะ"
10082-100820250 = "เพราะตั้งแต่วันนี้ไป ฉันจะเป็นนักเรียน\nที่น่าภาคภูมิใจ"
10082-100820260 = "ที่จะทำตามที่ท่านอาจารย์สอน\nอย่างเคร่งครัด!"
10082-100820270 = "เป็นการประกาศที่ชัดเจน\nและเด็ดเดี่ยวมาก...!"
10082-100820280 = "สมแล้วที่เป็นเรนเกะ!"
10082-100820290 = "เอาละ งั้นวันนี้ก็มาเจอกันที่ห้อง\nไกล่เกลี่ยเฮียกกะเรียวรันนะ!\nท่านอาจารย์!"
10082-100820300 = "คุณครู ฉันกลับมาลองคิดดูแล้ว..."
10082-100820310 = "เพราะคุณครูมีอาชีพเป็นคุณครู"
10082-100820320 = "เพราะงั้นเรื่องนักเรียนย้ายมา\nก็คงยุ่งยากสินะ?"
10082-100820330 = "เพิ่งจะมาพูดเอาตอนนี้เหรอ...?"
10082-100820340 = "แต่ก็นะ เรื่องสร้างความสัมพันธ์\nไม่ได้จำกัดแค่นักเรียนย้ายมาใหม่\nสักหน่อย!"
10082-100820350 = "งั้นคราวหน้าฉันจะลองหาอย่างอื่น\nมาแทน!"
10082-100820360 = "อื้ม ถ้าเรนเกะว่าอย่างนั้น... ก็ได้ "
10082-100820370 = "งั้นไว้มาทำ\n<กิจกรรมวัยรุ่น> กันอีกนะ "
10082-100820380 = "อื้ม! ไว้มาทำกันอีกครั้ง!"
10082-100820390 = "อืม สำหรับวัยรุ่นแล้ว ความสัมพันธ์\nอย่างหนึ่งที่ขาดไม่ได้ "
10082-100820400 = "ก็คงจะเป็น 'อันนั้น' สินะ"
10082-100820410 = "อื้ม จริงด้วย ทำไมฉันไม่ทันนึกถึงเลย\nนะ"
10082-100820420 = "แล้ว 'อันนั้น' ที่ว่ามันคืออันไหนล่ะ?"
10082-100820430 = "ความสัมพันธ์แบบไหนเหรอ?"
10082-100820440 = "อ้อ.. เรื่องนั้นน่ะ"
10082-100820450 = "อืม..."
10082-100820460 = "อืมม..."
10082-100820470 = "ไม่เอา ไม่บอกดีกว่า ถ้ารู้ก่อนก็ไม่สนุก\nน่ะสิ!"
10082-100820480 = "ดีละ ฉันคิด <กิจกรรมวัยรุ่น> ของครั้ง\nหน้าแล้ว!"
10082-100820490 = "พรุ่งนี้ฉันจะไปหาที่ชาเล่ต์นะ! คุณครู!"
10082-100820500 = "ก็ได้! งั้นเจอกันพรุ่งนี้นะ\nเรนเกะ"
10082-100820510 = "อื้ม!"
10082-100820520 = "ระ... เรื่องที่เกิดขึ้นวันนี้น่ะ!"
10082-100820530 = "เอาเป็นว่ามันไม่เคยเกิดขึ้นนะ!"
10082-100820540 = "อื้ม! การเป็นเพื่อนสมัยเด็กถือว่ายาก\nเกินไปสำหรับพวกเรา!"
10082-100820550 = "งะ... งั้นเหรอ?"
10082-100820560 = "ใช่! ใช่เลย!"
10082-100820570 = "เพราะงั้นครั้งหน้า ฉะ... ฉันจะคิด\nความสัมพันธ์แบบอื่นไป...!"
10082-100820580 = "ตะ...เตรียมตัวไว้ให้ดีล่ะ\nท่านอาจารย์!"
10082-100820590 = "ได้เลยจ้า..."
10082-100820600 = "คุณครู ตอนนี้พวกเรา..."
10082-100820610 = "ก็เริ่มทำ <กิจกรรมวัยรุ่น>\nมาด้วยกันสักพักแล้วนะมาน่ะ"
10082-100820620 = "นั่นสิ"
10082-100820630 = "สักพักแล้วเหรอเนี่ย..."
10082-100820640 = "ถึงบางครั้งจะไม่ลงตัว และจับทาง\nไม่ค่อยได้ไปบ้าง"
10082-100820650 = "อืม... แต่ยังไงฉันก็รู้สึกว่าตัวเองกำลัง\nก้าวไปข้างหน้าทีละก้าวๆ อยู่"
10082-100820660 = "เพราะงั้น วันนี้เราจะมาเจอกันแล้วทำ\nกิจกรรมวัยรุ่นกันอีกเถอะ"
10082-100820670 = "ฉันจะไปหาที่ชาเล่ต์เดี๋ยวนี้เลย!"
10082-100820680 = "อื้ม แล้วครูจะรอนะ"
10082-100820690 = "งั้นเดี๋ยวเจอกันนะ!"
10082-100820700 = "ฉันสร้างความเดือดร้อนให้คุณครู\nหลายอย่างเลย"
10082-100820710 = "คือว่า..."
10082-100820720 = "หลังจากนี้ก็มาทำกิจกรรมวัยรุ่น\nด้วยกันเยอะๆ เลยนะ เรนเกะ"
10082-100820730 = "ขอบใจที่เป็นห่วงนะ"
10082-100820740 = "อ่า... อื้ม"
10082-100820750 = "รู้ใจฉันจังเลยนะ! คุณครู... ไม่สิ\nท่านอาจารย์!"
10082-100820760 = "งั้นไว้มาทำกิจกรรมด้วยกันใหม่นะ! "
10082-100820770 = "ท่านอาจารย์ มีเวลาสักครู่มั้ย?"
10082-100820780 = "มีกิจกรรมวัยรุ่นที่ฉันสนใจอยู่น่ะ..."
10082-100820790 = "กิจกรรมวัยรุ่นอะไรเหรอ?"
10082-100820800 = "ไปช้อปปิ้งด้วยกัน..."
10082-100820810 = "ในฐานะอาจารย์และลูกศิษย์!"
10082-100820820 = "ฉันคิดว่ามันเป็นกิจกรรมวัยรุ่นที่ทำได้\nแค่ในตอนเป็นนักเรียนน่ะ"
10082-100820830 = "โอ้ ตื่นเต้นรอแล้ว!"
10082-100820840 = "แล้วมีอะไรที่อยากได้รึเปล่า?"
10082-100820850 = "อืม ที่จริงก็ยังไม่ได้คิดเลย "
10082-100820860 = "เพราะเป้าหมายของฉันคือไปใช้เวลา\nด้วยกันที่ย่านการค้าน่ะ"
10082-100820870 = "วินโดว์ช้อปปิ้งก็มีเสน่ห์ดีนะ"
10082-100820880 = "เหมือนไปเดตเลยนะ!"
10082-100820890 = "ฮะฮ่า เดตอะไรกัน? "
10082-100820900 = "......"
10082-100820910 = "ไม่สิ เดี๋ยวก่อนนะ"
10082-100820920 = "ใช่เดตจริงๆ เหรอ?"
10082-100820930 = "......"
10082-100820940 = "อะ... เอาเป็นว่ารีบๆ มาเถอะ!"
10082-100820950 = "ฉันจะรออยู่ที่ย่านการค้านะ"
10082-100820960 = "นี่ ท่านอาจารย์"
10082-100820970 = "ขอบคุณสำหรับของขวัญวันนี้นะ"
10082-100820980 = "เป็นริบบิ้นที่พิเศษจริงๆ นั่นแหละ..."
10082-100820990 = "ฉันจะเก็บไว้อย่างดีเลย"
10082-100821000 = "ครูก็ขอบคุณสำหรับของขวัญนะ"
10082-100821010 = "ครั้งหน้า ฉันจะซื้ออะไรที่เหมาะๆ\nให้ก็แล้วกัน"
10082-100821020 = "เพราะงั้นเอาไว้... ไปช้อปปิ้งกันอีกนะ"
10082-100821030 = "เข้าใจมั้ย?"
10082-100821040 = "อื้อ! ครูจะรอนะ!"
10082-100821050 = "ฉันก็จะรอเหมือนกัน!"

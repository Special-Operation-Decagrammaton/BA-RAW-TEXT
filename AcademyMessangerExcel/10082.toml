[translation]
10082-100820010 = "Sensei. Don't be alarmed!"
10082-100820020 = "But this is the greatest obstacle I've ever had to face!"
10082-100820030 = "It's a pretty convoluted problem, but..."
10082-100820040 = "Is everything okay, Renge?"
10082-100820050 = "I've been thinking really hard about some things recently,"
10082-100820060 = "and I think I've finally figured out the root of the problem!"
10082-100820070 = "At this rate, it might be the end of everything! No matter what I do!"
10082-100820080 = "I'm sorry, Renge. I have no idea what you're saying!"
10082-100820090 = "Huh?! Really? Uh... Maybe it's too complicated to explain over MomoTalk."
10082-100820100 = "After all, you can't feel my burning passion over text!"
10082-100820110 = "Oh? You must feel really strongly about this!"
10082-100820120 = "You bet! Which is why we can't waste another moment, Sensei!"
10082-100820130 = "Please! I need your advice!"
10082-100820140 = "I'm always here to talk, but..."
10082-100820150 = "Really?!"
10082-100820160 = "Great! Then I'll be waiting!"
10082-100820170 = "Sensei..."
10082-100820180 = "No, Mentor!"
10082-100820190 = "I still don't know how I feel about that title..."
10082-100820200 = "Don't worry about it so much! "
10082-100820210 = "You're the one guiding me in my search for my youth!"
10082-100820220 = "That thought alone should make you stand a little taller!"
10082-100820230 = "If you say so..."
10082-100820240 = "Okay, perfect! Now we've got some youth activities to get to!"
10082-100820250 = "Beginning today, I'm going to be"
10082-100820260 = "a great pursuer of youth that follows your teachings faithfully!"
10082-100820270 = "Said with confidence and pride!"
10082-100820280 = "That's just like you Renge!"
10082-100820290 = "Haha, yes! Meet me at the Hyakkaryouran's regulatory office, Mentor!"
10082-100820300 = "I was thinking about this on my way home, but..."
10082-100820310 = "You know, since Sensei is a teacher..."
10082-100820320 = "The whole transfer student thing was a bit much, wasn't it?"
10082-100820330 = "This is just occurring to you now...?"
10082-100820340 = "Well, relationships aren't exclusive to transfer students!"
10082-100820350 = "I'll think of something better next time!"
10082-100820360 = "I believe in you, Renge! "
10082-100820370 = "We'll find more youth activities next time!"
10082-100820380 = "Yes! Next time!"
10082-100820390 = "Hm... Every youth relationship "
10082-100820400 = "ABSOLUTELY needs to have \"that\" kind of friendship..."
10082-100820410 = "How could I have forgotten all this time?"
10082-100820420 = "We have to do it! Even if it is...well, \"that.\""
10082-100820430 = "The mysterious pronoun game you're playing is scaring me..."
10082-100820440 = "Well, you see..."
10082-100820450 = "Hm."
10082-100820460 = "HMMM..."
10082-100820470 = "I think I'll have you wait a little, Sensei. It's more exciting this way!"
10082-100820480 = "Our next youth activity is prepared and ready to launch!"
10082-100820490 = "I'm coming to Schale tomorrow, all right?"
10082-100820500 = "Okay! Whatever you say, Renge!"
10082-100820510 = "I'll see you then!"
10082-100820520 = "HEY! Forget everything that happened today, okay?!"
10082-100820530 = "As far as we're concerned... Nothing happened at all!"
10082-100820540 = "Just erase it forever! The relationship between childhood friends is clearly not something we can recreate!"
10082-100820550 = "Really? I thought it went pretty well!"
10082-100820560 = "Gyah! I said to forget it!"
10082-100820570 = "We're going to try a different kind of relationship!"
10082-100820580 = "Just you wait, Mentor!"
10082-100820590 = "Yes, ma'am."
10082-100820600 = "We've been participating in youth activities"
10082-100820610 = "for a while now, Sensei."
10082-100820620 = "Yes, we have."
10082-100820630 = "It's gone by in a flash!"
10082-100820640 = "I've been forging a path in terrain I've never treaded before."
10082-100820650 = "As difficult as it's been, I've overcome obstacles and made slow and steady progress!"
10082-100820660 = "We need to keep the momentum going, Sensei!"
10082-100820670 = "I'm coming to Schale right now!"
10082-100820680 = "It's a good thing I didn't have plans today..."
10082-100820690 = "I'll see you soon!"
10082-100820700 = "I've been a real nuisance, haven't I, Sensei?"
10082-100820710 = "I'm sorry..."
10082-100820720 = "I want to experience more youth activities with you, Renge. "
10082-100820730 = "There's nothing to apologize for."
10082-100820740 = "Oh... Really?"
10082-100820750 = "Thank you, Sen"
10082-100820760 = "I mean... Mentor! We'll talk again soon! "
10082-100820770 = "Mentor! Got a second?"
10082-100820780 = "There's a new youth activity I'm interested in..."
10082-100820790 = "What is it?"
10082-100820800 = "Taking your student"
10082-100820810 = "shopping on her day off!"
10082-100820820 = "I think it's the type of thing you can only enjoy as a student."
10082-100820830 = "Oooh! How exciting! Where should we go?"
10082-100820840 = "What are we shopping for?"
10082-100820850 = "Hm, I haven't decided yet."
10082-100820860 = "But the main point is to just spend time together shopping!"
10082-100820870 = "Window shopping's got its own charm to it, right?"
10082-100820880 = "So, like a date?"
10082-100820890 = "Haha, what do you mean a \"date\"?"
10082-100820900 = "..."
10082-100820910 = "Wait, hold on."
10082-100820920 = "Is this a date?"
10082-100820930 = "..."
10082-100820940 = "Aaah, never mind!"
10082-100820950 = "I'll meet you at the shopping district when you're free!"
10082-100820960 = "Um, Mentor."
10082-100820970 = "Thank you for the gift today."
10082-100820980 = "This ribbon means a lot to me..."
10082-100820990 = "I'll treasure it."
10082-100821000 = "Thank you for your gift too."
10082-100821010 = "I'll get you something better next time."
10082-100821020 = "So...let's go shopping together again."
10082-100821030 = "Okay?"
10082-100821040 = "Let's do it! I can't wait!"
10082-100821050 = "Me neither!"

[translation]
10082-100820010 = "老師你聽我說，可別嚇到了……"
10082-100820020 = "我不破蓮華碰到了這輩子最大的危機！"
10082-100820030 = "這話說得太突然了，我跟不上……"
10082-100820040 = "蓮華，發生什麼事了？"
10082-100820050 = "最近我一直在思考一件事"
10082-100820060 = "然後我終於想通了"
10082-100820070 = "再這樣下去，一切可能會通通完蛋！"
10082-100820080 = "抱歉，蓮華，我還是跟不太上！"
10082-100820090 = "呃……在MomoTalk上好像很難說清楚……"
10082-100820100 = "也對，要傳達真心果然還是得面對面吧！"
10082-100820110 = "嗯！？怎麼扯到那邊去了！？"
10082-100820120 = "老師，現在不是說這個的時候……"
10082-100820130 = "拜託！讓我諮詢一下吧！"
10082-100820140 = "嗯，這倒是沒問題……"
10082-100820150 = "真的嗎！？"
10082-100820160 = "好！那我等你喔！"
10082-100820170 = "老師……"
10082-100820180 = "不，青春師父！"
10082-100820190 = "我還不是很習慣那個稱號，有點不好意思耶……"
10082-100820200 = "哎呀，何必呢"
10082-100820210 = "就像之前說的一樣，老師是我的青春師父！"
10082-100820220 = "挺起胸膛吧！"
10082-100820230 = "嗯……"
10082-100820240 = "很好，現在不是說這個的時候，我們正式開始青春活動吧"
10082-100820250 = "今天我也要當個忠實遵循師父教誨……"
10082-100820260 = "惹人憐愛、令人欣慰的好學生！"
10082-100820270 = "這沒有一絲含糊，充滿雄心的宣言……！"
10082-100820280 = "真像蓮華的作風！"
10082-100820290 = "好，那今天也在百花繚亂的調停室集合吧！師父！"
10082-100820300 = "老師，我回到家裡仔細想了一下"
10082-100820310 = "果然老師就是老師"
10082-100820320 = "轉學生還是有點強人所難了吧？"
10082-100820330 = "怎麼現在才說這些……？"
10082-100820340 = "嗯，不過我所說的關係也不是只有轉學生！"
10082-100820350 = "之後我會想想新的關係！"
10082-100820360 = "嗯，既然蓮華都這麼說了……"
10082-100820370 = "我們下次再進行「青春活動」吧"
10082-100820380 = "嗯！沒問題！"
10082-100820390 = "唔嗯，說到青春關係的精髓……"
10082-100820400 = "還是不能少了「那個」吧"
10082-100820410 = "沒錯，為什麼一直忘了那個呢"
10082-100820420 = "那個……是指什麼？"
10082-100820430 = "你指的是……？"
10082-100820440 = "啊，那個啊"
10082-100820450 = "嗯……"
10082-100820460 = "唔嗯……"
10082-100820470 = "不，先說出來就沒意思了！"
10082-100820480 = "好，我決定下一個「青春活動」的內容了！"
10082-100820490 = "所以明天我會去一趟夏萊！老師！"
10082-100820500 = "嗯，我知道了。那我們明天見，蓮華"
10082-100820510 = "嗯！"
10082-100820520 = "今，今天發生的事不算！"
10082-100820530 = "當作沒發生吧！"
10082-100820540 = "嗯！就我們的關係來說，青梅竹馬的門檻還太高了！"
10082-100820550 = "是，是嗎？"
10082-100820560 = "沒錯！就是那樣！"
10082-100820570 = "所以下次我會去找其他關係！"
10082-100820580 = "做好覺悟吧！師父！"
10082-100820590 = "呃，好……"
10082-100820600 = "老師，不知不覺間，從我們開始「青春活動」……"
10082-100820610 = "已經過了一段時間了啊"
10082-100820620 = "就是說啊"
10082-100820630 = "已經過那麼久了嗎？"
10082-100820640 = "雖然也有過橫衝直撞，抓不到感覺的時候……"
10082-100820650 = "嗯，不過還是有一步一腳印、踏實前進的感覺"
10082-100820660 = "所以今天也為了青春活動集合吧"
10082-100820670 = "我馬上過去夏萊！"
10082-100820680 = "嗯，我等你"
10082-100820690 = "那麼待會見！"
10082-100820700 = "雖然造成很多麻煩，但是老師……"
10082-100820710 = "那個……"
10082-100820720 = "以後也認真進行「青春活動」吧，蓮華"
10082-100820730 = "謝謝你為我擔心"
10082-100820740 = "啊，嗯"
10082-100820750 = "你很清楚嘛！老師……不，師父！"
10082-100820760 = "之後再一起活動吧！"
10082-100820770 = "師父，請問你有空嗎？"
10082-100820780 = "我對一個青春活動有點興趣……"
10082-100820790 = "什麼樣的青春活動？"
10082-100820800 = "是師徒一起的──"
10082-100820810 = "假日逛街！"
10082-100820820 = "這應該是只有學生時期才能享受的青春活動吧"
10082-100820830 = "哦哦，聽起來不錯！"
10082-100820840 = "有什麼特別想買的東西嗎？"
10082-100820850 = "唔嗯，倒也沒有特別想買什麼"
10082-100820860 = "目標只是一起在商店街消磨時間"
10082-100820870 = "只逛不買也是種樂趣嘛？"
10082-100820880 = "這不就跟約會沒兩樣嗎！"
10082-100820890 = "哈哈，什麼約會啦？"
10082-100820900 = "…………"
10082-100820910 = "等一下"
10082-100820920 = "這樣算約會嗎？"
10082-100820930 = "…………"
10082-100820940 = "總，總之先見面再說吧！"
10082-100820950 = "我在商店街等你"
10082-100820960 = "那個，師父"
10082-100820970 = "謝謝你今天送我的禮物"
10082-100820980 = "這條緞帶真的變得很特別……"
10082-100820990 = "我會好好珍藏的"
10082-100821000 = "我也謝謝你今天的禮物"
10082-100821010 = "下次我會買更正式的東西送你"
10082-100821020 = "所以之後……要再一起去逛街哦"
10082-100821030 = "知道嗎？"
10082-100821040 = "嗯！我會期待的！"
10082-100821050 = "我也是！"

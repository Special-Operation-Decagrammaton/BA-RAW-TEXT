[translation]
10013-288 = "키아아아아아악-!"
10013-289 = "캬아아아악-"
10013-290 = "아아아악-"
10013-291 = "캬아아아오오아……."
10013-292 = "갸아아……."
10013-293 = "……."
10013-294 = "뭐, 뭐지?!"
10013-295 = "츠루기……?"
10013-296 = "죄송합니다. 문자 잘못 보냈습니다."
10013-297 = "츠루기 배상."
10013-298 = "캬아ㅏ아ㅏㅏㅏㅏㅏㅏㅏ"
10013-299 = "키히히키키키킼키킼ㅋ"
10013-300 = "아. 실례했습니다."
10013-301 = "부디 저에게 도움을 주실 수 있을까요?"
10013-302 = "부탁드리겠습니다."
10013-303 = "무슨 일인지는 모르겠지만 물론이야."
10013-304 = "츠루기의 부탁이라면 얼마든지."
10013-305 = "가, 감사합니다!"
10013-306 = "그, 그, 그러면…… 학원 근처에서 뵙는 걸로……!"
10013-308 = "그, 저기…… 선생님."
10013-309 = "요즘 유행한다는 보정 어플로 사진을 찍어봤는데……."
10013-310 = "괘, 괜찮을까요?"
10013-311 = "굉장해! 엄청 잘 나왔네!"
10013-312 = "다행이다! 이거라면 괜찮겠어!"
10013-313 = "그, 그렇습니까……."
10013-314 = "요즘 기술력이라는 건 굉장하네요."
10013-315 = "이걸 학원에 제출해도 되는지는 모르겠지만……."
10013-316 = "아, 아무튼 오늘 감사했습니다! 선생님!"
10013-317 = "선생님. 핑크빛 연애라는 건 대체 무엇일까요."
10013-318 = "잡지나 소설에는 많이 있지만, 도무지 현실성이 없어서-"
10013-319 = "캬ㅏ아아아ㅏㅏㅏ아ㅏㅏ"
10013-320 = "죄송합니다. 쓸데없는 소리를."
10013-321 = "핑크빛……?"
10013-322 = "츠루기……? 괜찮아?"
10013-323 = "그, 저기……."
10013-324 = "그러니까……."
10013-325 = "캬아아아아아아아아아ㅏㅏㅏㅏㅏ"
10013-326 = "아, 아무것도 아닙니다……."
10013-100130010 = "선생님. 혹시"
10013-100130020 = "아닙니다. 실례하였습니다."
10013-100130030 = "츠루기?"
10013-100130040 = "괜찮아. 무슨 일이야?"
10013-100130050 = "죄송합니다. 경황이 없어서……."
10013-100130060 = "조금 더 정리되면 다시 말씀드리도록 하겠습니다."
10013-100130070 = "츠루기 배상."
10013-100130080 = "선생님. 다시 생각해 보니 제가 또 실례를 저질렀던 것 같습니다."
10013-100130090 = "죄송합니다."
10013-100130100 = "전혀 그렇지 않아."
10013-100130110 = "즐거워 보여서 좋았어."
10013-100130120 = "그, 그렇습니까. 그렇게 말씀해 주신다면 감사하지만……."
10013-100130130 = "그러고 보니 막상 선생님께 같이 볼 걸 제안해 드리기로 했지만"
10013-100130140 = "그……. 그런 걸 별로 해 본 적이 없는지라, 제대로 할 수 있을지 모르겠습니다."
10013-100130150 = "모쪼록 양해를 부탁드립니다."
10013-100130160 = "평소처럼 말해도 돼."
10013-100130170 = "어떻게 말해도 알 수 있으니 걱정하지 않아도 돼."
10013-100130180 = "……."
10013-100130190 = "크헤……."
10013-100130200 = "키히히히히!!!"
10013-100130210 = "……."
10013-100130220 = "……히히."

[translation]
10013-288 = "กรี๊ดดดดดดดดดด!"
10013-289 = "อ๊ากกกก!"
10013-290 = "อ๊าาาาาา!!!"
10013-291 = "กรี๊ดดดดดด....!!"
10013-292 = "กรี๊ดดดดด...."
10013-293 = "...."
10013-294 = "อะ...อะไรเนี่ย?!"
10013-295 = "ซึรุกิ...?"
10013-296 = "ขอโทษค่ะ! ฉันส่งข้อความผิดค่ะ!"
10013-297 = "จาก...ซึรุกิ!"
10013-298 = "กรี๊ดดดดด!!"
10013-299 = "คิคิคิคิคิคิคิคิ...."
10013-300 = "อ่า... ขออภัยด้วยค่ะ"
10013-301 = "คือว่า... คุณครูช่วยฉันหน่อยได้มั้ยคะ?"
10013-302 = "ขอร้องละค่ะ"
10013-303 = "ถึงครูไม่รู้ว่ามีเรื่องอะไร\nแต่ครูจะช่วยเธอแน่นอน"
10013-304 = "ถ้าเป็นคำขอร้องของซึรุกิล่ะก็\nครูยินดีช่วยตลอดเลยนะ "
10013-305 = "ขะ...ขอบคุณมากค่ะ!"
10013-306 = "ถะ...ถะ...ถ้าอย่างนั้น... วะ...ไว้เจอกัน\nทะ...ที่โรงเรียนนะคะ!"
10013-308 = "คือว่า... คุณครูคะ "
10013-309 = "ฉันลองถ่ายรูปแล้วก็ใช้แอปแต่งรูป\nที่ฮิตกันอยู่ช่วงนี้ดูแล้ว..."
10013-310 = "มะ...มันโอเคระ...รึเปล่าคะ?"
10013-311 = "สุดยอดเลย! ถ่ายออกมาได้ดูดีสุดๆ!"
10013-312 = "ดีจังเลยนะ! ถ้าเป็นรูปนี้ล่ะก็ใช้ได้แน่!"
10013-313 = "ยะ...อย่างงั้นเหรอคะ......."
10013-314 = "เทคโนโลยีเดี๋ยวนี้นี่ดีจังเลยนะคะ"
10013-315 = "แต่ฉันไม่รู้ว่าเอาไปยื่นที่โรงเรียนได้\nมั้ย..."
10013-316 = "ยะ...ยังไงวันนี้ก็ขอบคุณมากนะคะคุณครู!"
10013-317 = "คุณครูคะ ความรักสีชมพูคืออะไรกันแน่\nคะ"
10013-318 = "ฉันเคยอ่านเจอในนิตยสารกับในนิยายมา\nเยอะก็จริง แต่มันดูไม่สมจริงเลยสักนิด\nเดียว..."
10013-319 = "กรี๊ดดดดด!"
10013-320 = "ขอโทษค่ะ! ฉันพูดอะไรเรื่อยเปื่อยอีก\nแล้ว"
10013-321 = "สีชมพู....?"
10013-322 = "ซึรุกิ...? เป็นอะไรรึเปล่า?\nเธอโอเคมั้ย?"
10013-323 = "คือนั่นมัน...."
10013-324 = "คือว่า...."
10013-325 = "กรี๊ดดดดดดดดดดดดดดด!"
10013-326 = "มะ...ไม่มีอะไรหรอกค่ะ!"
10013-100130010 = "คุณครูคะ คือว่า... "
10013-100130020 = "ไม่มีอะไรค่ะ ขอโทษที่เสียมารยาทค่ะ"
10013-100130030 = "ซึรุกิ?"
10013-100130040 = "ไม่เป็นไรหรอก มีอะไรเหรอ?"
10013-100130050 = "ขอโทษค่ะ ฉันไม่ได้มีธุระอะไร\nเป็นพิเศษ..."
10013-100130060 = "ถ้าฉันเรียบเรียงคำพูดได้แล้วจะมาบอก\nคุณครูอีกครั้งค่ะ"
10013-100130070 = "ซึรุกิ เคารพ!"
10013-100130080 = "คุณครูคะ ฉันลองทบทวนดูแล้ว\nดูเหมือนว่าฉันจะเสียมารยาท\nกับคุณครูไปซะแล้วค่ะ"
10013-100130090 = "ขอโทษค่ะ"
10013-100130100 = "ไม่หรอก"
10013-100130110 = "แค่เห็นซึรุกิสนุก ครูก็พอใจแล้ว"
10013-100130120 = "งะ...งั้นเหรอคะ ขะ....ขอบคุณค่ะ"
10013-100130130 = "พอมานึกดูแล้ว... ฉันแค่อยากชวน\nคุณครูดูหนังด้วยกัน"
10013-100130140 = "ตะ... แต่ฉันไม่เคยทำแบบนั้นมาก่อน\nเลยไม่รู้ว่าต้องทำยังไงค่ะ"
10013-100130150 = "ขอโทษด้วยนะคะ"
10013-100130160 = "พูดเหมือนตอนปกติก็ได้"
10013-100130170 = "ไม่ว่าซึรุกิจะพูดยังไง ครูก็เข้าใจนะ\nไม่ต้องคิดมากหรอก"
10013-100130180 = "..."
10013-100130190 = "คิ..."
10013-100130200 = "คิกๆๆๆ...!!!"
10013-100130210 = "..."
10013-100130220 = "ฮี่ๆๆ..."

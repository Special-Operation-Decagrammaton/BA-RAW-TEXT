[translation]
10138-101380010 = "선생님. 오늘 우리 학원에 온댔지?"
10138-101380020 = "응. 간단한 현장 조사 업무야."
10138-101380030 = "아, 잘 됐다."
10138-101380040 = "그럼 나 액세서리 재료 몇 개만 사다 줘."
10138-101380050 = "필요한 재료가 학원 상점엔 없어서."
10138-101380060 = "이건…… 밀수 부탁?"
10138-101380070 = "밀수라니!"
10138-101380080 = "이상한 재료 아냐!"
10138-101380090 = "검문에도 안 걸려!"
10138-101380100 = "아무튼 목록을 보낼 테니까"
10138-101380110 = "오는 길에 부탁 좀 할게!"
10138-101380120 = "선생님? 잘 들어갔어?"
10138-101380130 = "또 찢어지진 않았지?"
10138-101380140 = "응! 아주 튼튼해!"
10138-101380150 = "이번에 나한테 빚진 거야."
10138-101380160 = "다음에 꼭 은혜를 갚으라고!"
10138-101380170 = "거리에서 마주친 게 레나라서 다행이었어."
10138-101380180 = "난 다행 아니었거든?!"
10138-101380190 = "아무튼 잘 돌아갔다니 안심이네."
10138-101380200 = "그럼 다음에 또 연락할 테니까."
10138-101380210 = "저번에 나한테 빚진 거, 안 잊었지?"
10138-101380220 = "드디어 은혜를 갚을 때가 왔어."
10138-101380230 = "어떻게 갚으면 될까?"
10138-101380240 = "글로 설명하려면 길어."
10138-101380250 = "일단 나와."
10138-101380260 = "내가 지정한 시간과 장소에."
10138-101380270 = "선생님…… 망했어."
10138-101380280 = "응? 갑자기 왜?"
10138-101380290 = "돌아가서 선배들한테"
10138-101380300 = "사진을 보여줬는데……."
10138-101380310 = "선생님 팔이"
10138-101380320 = "흐릿하게 찍힌 사진이"
10138-101380330 = "하나 있었어……."
10138-101380340 = "그, 그래서 어떻게 했어?"
10138-101380350 = "선생님이랑 갔다곤 말할 수 없어서"
10138-101380360 = "그냥 이게 유령이라고 둘러댔어……."
10138-101380370 = "샤아아아악!!"
10138-101380380 = "내 입으로!!"
10138-101380390 = "유령이 있다고!!"
10138-101380400 = "말해버렸다고!!"
10138-101380410 = "선배들은 이게"
10138-101380420 = "숨겨진 일곱 번째 불가사의라며 호들갑이고!"
10138-101380430 = "으아아아아아아……!!"
10138-101380440 = "두고 봐……!"
10138-101380450 = "다음엔 기필코……!!"
10138-101380460 = "가, 같이 힘내자……."
10138-101380470 = "선생님. 저번 일 기억해?"
10138-101380480 = "사진에 선생님 팔이 찍혀서"
10138-101380490 = "내가 선배들한테"
10138-101380500 = "유령이 있다고 둘러댔던 거."
10138-101380510 = "응. 미안……."
10138-101380520 = "왜 사과를 해?"
10138-101380530 = "사진 잘못 찍은 내 잘못이지."
10138-101380540 = "아무튼 그거 때문에"
10138-101380550 = "선배들이 내가 직접"
10138-101380560 = "오마모리를 만들어야 한대."
10138-101380570 = "그래서 내 것 만드는 김에"
10138-101380580 = "선생님 것도 하나 만들어 보려고."
10138-101380590 = "레나가…… 오마모리를?"
10138-101380600 = "으아아아!"
10138-101380610 = "물어보지 마!"
10138-101380620 = "나도 왜 해야 하는지 모르니까!"
10138-101380630 = "아무튼 여유 있을 때 우리 학원에 와."
10138-101380640 = "그럼 오늘 오후에 갈게!"
10138-101380650 = "선생님. 그게……"
10138-101380660 = "또 이상한 일 없었지?"
10138-101380670 = "껌 밟는 다거나 그런 거."
10138-101380680 = "응! 레나의 오마모리 덕분에!"
10138-101380690 = "딱히 효과를 믿는 건 아니지만……."
10138-101380700 = "계속 가지고 있어."
10138-101380710 = "내가 준 거니까."
10138-101380720 = "알겠지?"
10138-101380730 = "응. 레나의 마음이니까."
10138-101380740 = "또, 또 이상한 소리 한다!"
10138-101380750 = "아무튼 다음에 또 보든가!"
10138-101380760 = "선생님. 오늘 우리 학원 오지?"
10138-101380770 = "응. 초코 바나나 크레이프라도 사 갈까?"
10138-101380780 = "돼, 됐어!"
10138-101380790 = "그거 말고 다른 부탁을 하고 싶거든."
10138-101380800 = "또 액세서리 재료가 떨어졌어."
10138-101380810 = "이번엔 누가 상점을 테러하는 바람에……."
10138-101380820 = "테러? 무슨 테러?"
10138-101380830 = "누가 상점 벽 전체에"
10138-101380840 = "이상한 그림을 잔뜩 그려놨거든."
10138-101380850 = "그거 정리될 때까지 당분간 문 닫는대."
10138-101380860 = "에휴……."
10138-101380870 = "아무튼 그러니까 부탁 좀 할게."
10138-101380880 = "초코 바나나 크레이프도 사 갈게!"
10138-101380890 = "마, 마음대로 해!"

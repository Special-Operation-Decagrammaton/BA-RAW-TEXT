[translation]
13007-1159 = "Ugh... Why must delicious food be so expensive..."
13007-1160 = "I wish I could make money without having to work..."
13007-1161 = "You shouldn't expect any shortcuts. You need a real job."
13007-1162 = "I want to make money without working too..."
13007-1163 = "That's true, but..."
13007-1164 = "Wait, is it really okay for a teacher to say something like that?"
13007-1165 = "Well, you may say that, but I take my part-time job seriously."
13007-1166 = "You have a part-time job, Junko?"
13007-1167 = "What's that supposed to mean?"
13007-1168 = "What's wrong with me working a part-time job?!"
13007-1169 = "Sensei, Sensei!"
13007-1170 = "I just found out something incredible!"
13007-1171 = "What's up?"
13007-1172 = "I've found a way to eat tons of premium seafood for really cheap!"
13007-1173 = "Really?"
13007-1174 = "Junko, you shouldn't break the law, even for fine seafood."
13007-1175 = "Yeah. But I can't tell you the details yet. Heehee."
13007-1176 = "What do you take me for? I'm not committing any crimes!"
13007-1177 = "If you wanna know the details, come to the Gehenna Academy dining hall at dinner today."
13007-1178 = "Don't be late!"
13007-1179 = "Ugh."
13007-1180 = "If I hadn't bought that pudding to experiment with the fake food, I could have had a really nice dinner tonight..."
13007-1181 = "Junko."
13007-1182 = "What?"
13007-1183 = "I saw on the Internet that if you put honey on cucumber, it tastes like melon."
13007-1184 = "Another internet fraud! Besides, honey is more expensive than the melon itself!"
13007-1185 = "I won't be fooled by fake food again!"
13007-1186 = "Heehee! Sensei, you're gonna be so jealous."
13007-1187 = "For tonight's dinner, the Gourmet Research Society is having...meat!"
13007-1188 = "...Meat!"
13007-1189 = "And not just any meat! We'll be enjoying premium wagyu!"
13007-1190 = "...Wagyu!"
13007-1191 = "Heehee. Are you jealous, Sensei?"
13007-1192 = "You should be green with envy today!"
13007-1193 = "I want some too..."
13007-1194 = "I'm joining the Gourmet Research Society!"
13007-1195 = "No. The yakiniku restaurant we're going to only accepts smaller groups."
13007-1196 = "But I'll tell you how good the wagyu was when I get back!"
13007-1197 = "For lunch today, I'm going to a cake buffet with the other members of the Gourmet Research Society!"
13007-1198 = "A cake buffet?"
13007-1199 = "What, do you not know what a cake buffet is, Sensei?"
13007-1200 = "Well, then, I'll explain."
13007-1201 = "It's a restaurant where they set out all kinds of cakes, and it's all-you-can-eat."
13007-1202 = "It's basically the restaurant of my dreams."
13007-1203 = "That sounds like it could make you sick..."
13007-1204 = "Don't be such a baby!"
13007-1205 = "You don't get many chances to eat unlimited cake!"
13007-1206 = "Ugh..."
13007-1207 = "How's your stomach?"
13007-1208 = "I feel a little better now."
13007-1209 = "I never thought that dried kelp would bloat me like that..."
13007-1210 = "Last time, I saw Akari eat a whole box of dried kelp as a snack..."
13007-1211 = "What's so special about Akari's stomach? "
13007-1212 = "Sensei, did you hear about the Chinese quarter near Shanhaijing Academy?"
13007-1213 = "The streets there are full of Chinese restaurants, and they say that all of them are awesome!"
13007-1214 = "I've heard the same thing."
13007-1215 = "Yeah, the food is just as good as they say."
13007-1216 = "If you know about it, then it must be really great."
13007-1217 = "What? You already went without me? You're so mean!"
13007-1218 = "Anyway, as a member of the Gourmet Research Society and master of gastronomy, I can't ignore this news."
13007-1219 = "So, I was wondering... If you have time this weekend, would you like to go to Shanhaijing Academy with me?"
13007-1220 = "Sure."
13007-1221 = "Heehee! You promise?"
13007-1222 = "Then I'll see you in front of Shanhaijing Academy main gate this weekend!"
13007-130070010 = "Sensei, Sensei!"
13007-130070020 = "Are you...excited to talk to me? That's something new."
13007-130070030 = "I should take a screenshot of our MomoTalk so we never forget this moment."
13007-130070040 = "What gibberish are you rambling about?!"
13007-130070050 = "I...have to ask."
13007-130070060 = "You didn't really screenshot it, did you?"
13007-130070070 = "Of course not."
13007-130070080 = "Okay, good."
13007-130070090 = "It's finally done!"
13007-130070100 = "What is?"
13007-130070110 = "Heeheehee... You'll see when we meet up."
13007-130070120 = "Are you at Schale?"
13007-130070130 = "I'll be right there!"

[translation]
13007-1159 = "으으…… 맛있는 음식은 어째서 이렇게 비싼 걸까……."
13007-1160 = "일하지 않고 돈을 벌고 싶어……."
13007-1161 = "요행을 기대하지 말고 제대로 된 일을 해야지.."
13007-1162 = "나도 일하지 않고 돈을 벌고 싶어……."
13007-1163 = "그건 그렇긴 하지만……."
13007-1164 = "잠깐, 선생님이 그런 말을 해도 괜찮은 거야?"
13007-1165 = "뭐, 말은 그렇게 해도 아르바이트할 때는 나도 진지하다고."
13007-1166 = "준코가 아르바이트를……?"
13007-1167 = "뭐야, 그 대사."
13007-1168 = "내가 아르바이트를 하는 게 뭐가 어때서!"
13007-1169 = "선생님, 선생님!"
13007-1170 = "내가 엄청난 사실을 알아냈어!"
13007-1171 = "무슨 일인데?"
13007-1172 = "내가 저렴한 비용으로 고급 해산물을 잔뜩 먹을 수 있는 방법을 찾아냈어!"
13007-1173 = "그게 정말이야?"
13007-1174 = "준코, 고급 해산물이 먹고 싶어도 범죄는 저지르면 안 돼."
13007-1175 = "물론이지. 자세한 방법은 비밀이지만…… 후후."
13007-1176 = "나를 뭐로 보는 거야? 범죄를 저지르려는 게 아니거든?"
13007-1177 = "자세한 내용이 궁금하다면 오늘 저녁 시간에 맞춰 게헨나의 학원 식당으로 찾아와."
13007-1178 = "절대 늦으면 안 돼!"
13007-1179 = "으으,"
13007-1180 = "가짜 음식을 실험하느라 푸딩을 구입하지만 않았어도 오늘 저녁은 호화롭게 먹을 수 있었을 텐데……."
13007-1181 = "준코."
13007-1182 = "왜?"
13007-1183 = "방금 인터넷에서 봤는데 오이에 꿀을 바르면 멜론 맛이 난대."
13007-1184 = "또 인터넷 사기냐! 게다가 꿀은 멜론보다 더 비싸잖아!"
13007-1185 = "가짜 음식에는 더는 안 속아!"
13007-1186 = "후후후, 선생님. 부러워해도 좋아."
13007-1187 = "오늘 미식 연구회의 저녁 메뉴는…… 고기야!"
13007-1188 = "……고기!"
13007-1189 = "그것도 값비싼 와규!"
13007-1190 = "……와규!"
13007-1191 = "후후. 부럽지, 선생님?"
13007-1192 = "오늘만큼은 나를 부러워해도 좋아!"
13007-1193 = "나도 먹고 싶어……."
13007-1194 = "나도 미식연구회에 들어갈래!"
13007-1195 = "안 돼. 가기로 한 야키니쿠 가게에는 제한 인원이 있단 말이야."
13007-1196 = "대신 다녀와서 와규가 얼마나 맛있었는지 잔뜩 말해줄게!"
13007-1197 = "오늘 점심에는 미식연구회 부원들과 함께 케이크 뷔페에 갈 거야!"
13007-1198 = "케이크 뷔페?"
13007-1199 = "뭐야, 선생님. 케이크 뷔페를 모르는 거야?"
13007-1200 = "케이크 뷔페는 말이지."
13007-1201 = "여러 가지 종류의 케이크가 잔뜩 진열되어 있고, 제한 시간 동안 그 케이크를 마음껏 먹을 수 있는"
13007-1202 = "꿈의 가게야."
13007-1203 = "느끼할 것 같은데……."
13007-1204 = "약한 소리 하지 마!"
13007-1205 = "케이크를 마음껏 먹을 수 있는 기회는 쉽게 없다고!"
13007-1206 = "으엑……."
13007-1207 = "속은 좀 괜찮아?"
13007-1208 = "이제 조금 괜찮아졌어."
13007-1209 = "설마 말린 다시마가 뱃속에서 불어날 거라고는 생각도 못 했어……."
13007-1210 = "그나저나 저번에 보니 아카리는 간식으로 마른 다시마 한 통을 통째로 먹어 치우던데……."
13007-1211 = "아카리의 뱃속은 도대체 어떻게 된 거지……."
13007-1212 = "선생님, 산해경 학원 근처에 있는 중화가의 소문 들었어?"
13007-1213 = "거리가 중화 요릿집으로 가득 들어차 있는데, 모두 하나같이 맛집이래!"
13007-1214 = "나도 소문으로만 들었어."
13007-1215 = "응, 확실히 음식은 맛있었어."
13007-1216 = "선생님의 귀에도 들어갈 정도면 확실히 맛집은 맛집인가 보네."
13007-1217 = "뭐야. 나만 빼놓고 이미 다녀온 거야? 치사해!"
13007-1218 = "어찌 되었든 미식을 추구하는 미식연구회의 일원으로서 이 소식을 그냥 넘길 수는 없지."
13007-1219 = "그래서 말인데…… 이번 주말에 시간 괜찮으면 산해경 학원에 같이 가지 않을래?"
13007-1220 = "좋아."
13007-1221 = "후후, 약속한 거다?"
13007-1222 = "그럼 주말에 산해경 학원 정문 앞에서 보자!"
13007-130070010 = "선생님, 선생님!"
13007-130070020 = "준코가 신나서 나를 찾다니, 뭔가 신선하네."
13007-130070030 = "기념으로 이 모모톡, 캡처해서 보존해 둘까?"
13007-130070040 = "또 무슨 이상한 소리야!"
13007-130070050 = "……혹시나 해서 묻는 건데,"
13007-130070060 = "진짜 캡처한 건 아니지?"
13007-130070070 = "아닙니다……"
13007-130070080 = "그럼 됐어."
13007-130070090 = "나, 드디어 완성했거든!"
13007-130070100 = "완성했다니, 뭘?"
13007-130070110 = "후후후…… 만나서 보면 알게 될 거야."
13007-130070120 = "지금 샬레에 있지?"
13007-130070130 = "그리로 갈게!"

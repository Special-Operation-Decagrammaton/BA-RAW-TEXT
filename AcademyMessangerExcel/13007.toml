[translation]
13007-1159 = "เฮ้อ... ทำไมอาหารอร่อยๆ ถึงได้แพง\nขนาดนี้นะ"
13007-1160 = "อยากหาเงินได้โดยไม่ต้องทำงานจัง"
13007-1161 = "อย่าหวังแต่โชคช่วย แล้วไปตั้งใจ\nทำงานเถอะ..."
13007-1162 = "ครูก็อยากได้เงินโดยไม่ต้องทำงาน\nเหมือนกัน..."
13007-1163 = "แต่ถึงอย่างนั้นก็เถอะ..."
13007-1164 = "เดี๋ยวนะ คุณครูพูดอะไรแบบนี้ได้ด้วยเหรอ?"
13007-1165 = "ถึงจะพูดแบบนั้นก็เถอะ ตอนทำงาน\nพาร์ทไทม์ฉันขยันมากนะ"
13007-1166 = "จุนโกะทำพาร์ทไทม์เหรอ?"
13007-1167 = "ถามเหมือนไม่เชื่อกันเลย"
13007-1168 = "ฉันดูไม่เหมือนเด็กที่ทำพาร์ทไทม์ได้เหรอ?"
13007-1169 = "คุณครู... คุณครู!"
13007-1170 = "ฉันไปรู้เรื่องน่าทึ่งมาล่ะ!"
13007-1171 = "เรื่องอะไรเหรอ?"
13007-1172 = "วิธีที่จะได้กินอาหารทะเลคุณภาพสูงใน\nราคาถูกยังไงล่ะ!"
13007-1173 = "ไปรู้มาได้ยังไง?"
13007-1174 = "นี่จุนโกะ ถึงจะอยากกินของดีๆ แต่ก็\nห้ามไปก่อเรื่องนะ"
13007-1175 = "แน่นอนอยู่แล้ว แต่ฉันไม่บอกหรอกนะว่า\nต้องทำยังไง หุหุ"
13007-1176 = "เห็นฉันเป็นคนยังไงกัน? ฉันไม่ได้จะไป\nก่อเรื่องอะไรสักหน่อย?"
13007-1177 = "ถ้าอยากรู้วิธีนี้ล่ะก็ เย็นนี้มาที่โรงอาหาร\nของเกเฮนน่าสิ"
13007-1178 = "ห้ามสายเลยนะ!"
13007-1179 = "เฮ้อ..."
13007-1180 = "ถ้าวันนี้ไม่ซื้อพุดดิ้งเพื่อทดลองอาหาร\nปลอมๆ วันนี้ก็คงได้กินอาหารเย็นมื้อ\nแพงๆ ไปแล้ว"
13007-1181 = "จุนโกะ"
13007-1182 = "ทำไมเหรอ?"
13007-1183 = "ครูเจอมาในเน็ตว่าหากเอาน้ำผึ้งทา\nแตงกวา จะมีรสเหมือนเมล่อนล่ะ"
13007-1184 = "เพ้อเจ้อน่า! อีกอย่าง น้ำผึ้งน่ะแพงกว่า\nเมล่อนอีก!"
13007-1185 = "ฉันจะไม่ถูกหลอกเพราะเรื่องอาหาร\nปลอมหรอก"
13007-1186 = "ฮุฮุ คุณครูจะอิจฉาฉันก็ได้นะ"
13007-1187 = "เพราะเมนูอาหารเย็นของชมรมชิมอาหาร\nวันนี้คือ... เนื้อย่าง!"
13007-1188 = "เนื้อย่าง...!"
13007-1189 = "เนื้อวากิวราคาแพงเลยล่ะ!"
13007-1190 = "เนื้อวากิว...!"
13007-1191 = "ฮุฮุ อิจฉาใช่ไหมล่ะ?"
13007-1192 = "วันนี้ฉันจะให้อิจฉาได้วันนึง!"
13007-1193 = "ครูก็อยากกินนะ..."
13007-1194 = "ครูไปเข้าชมรมชิมอาหารด้วยดีกว่า"
13007-1195 = "ไม่ได้! เพราะร้านยากินิกุที่เราจะไปกัน\nจำกัดจำนวนคนน่ะสิ"
13007-1196 = "เอาเป็นว่า ฉันจะกลับมาเล่าให้ฟังแล้วกัน\nว่าเนื้อย่างอร่อยแค่ไหน"
13007-1197 = "อาหารกลางวันของฉันและสมาชิกชมรม\nวันนี้คือบุฟเฟต์เค้ก!"
13007-1198 = "บุฟเฟต์เค้กเหรอ?"
13007-1199 = "อะไรกันคุณครู ไม่รู้จักบุฟเฟต์เค้กเหรอ?"
13007-1200 = "บุฟเฟต์เค้กน่ะ"
13007-1201 = "มีเค้กให้กินหลายประเภทเลย แถมกิน\nได้มากเท่าที่ต้องการเลยล่ะ"
13007-1202 = "ร้านแห่งความฝันของฉันเลย"
13007-1203 = "กินเยอะๆ น่าจะเลี่ยนนะ..."
13007-1204 = "พูดอะไรเหมือนคนอ่อนแอเลย!"
13007-1205 = "โอกาสในการกินเค้กไม่อั้นไม่ได้มีบ่อยๆ นะ!"
13007-1206 = "โอ่ย...."
13007-1207 = "เป็นยังไงบ้าง?"
13007-1208 = "ดีขึ้นบ้างแล้วล่ะ"
13007-1209 = "ไม่คิดเลยว่าสาหร่ายอบแห้งจะไปบวม\nในท้องได้..."
13007-1210 = "แต่ว่าคราวก่อนอาคาริก็กินสาหร่ายอบ\nแห้งเป็นของว่างตั้งเยอะนี่นา..."
13007-1211 = "หรือว่าอาคาริจะกระเพาะเหล็ก... "
13007-1212 = "คุณครู ได้ยินข่าวลือเกี่ยวกับไชน่าทาวน์\nแถวๆ ซานไห่จิงบ้างไหม?"
13007-1213 = "เห็นว่าที่นั่นมีร้านอาหารจีนฟิวชั่นเยอะ\nเลยล่ะ แถมอาหารยังอร่อยอีกด้วย!"
13007-1214 = "ครูได้ยินมาแค่ข่าวลือน่ะ แต่ไม่เคยไป"
13007-1215 = "อื้ม อาหารอร่อยเหมือนที่พูดกันเลย"
13007-1216 = "หากคุณครูก็ได้ยินข่าวลือนี้มา แสดงว่า\nต้องเป็นร้านเด็ดจริงๆ แน่เลย"
13007-1217 = "อะไรนะ? ทำไมไม่ชวนฉันไปกินด้วยล่ะ?\nไม่แฟร์เลย!"
13007-1218 = "ในฐานะสมาชิกชมรมชิมอาหาร ฉันไม่\nยอมปล่อยเรื่องนี้ให้ผ่านไปได้"
13007-1219 = "ถ้าคุณครูว่าง สุดสัปดาห์นี้เราไปที่โรง\nเรียนซานไห่จิงกันไหม?"
13007-1220 = "ไปสิ"
13007-1221 = "ฮุฮุ สัญญาแล้วนะ?"
13007-1222 = "งั้นไว้เจอกันที่ประตูหน้าของโรงเรียน\nซานไห่จิงนะ!"
13007-130070010 = "คุณครู คุณครู!"
13007-130070020 = "จุนโกะมาหาครูด้วยท่าทางดีใจแบบนี้\nแปลกตาจังเลยน้า"
13007-130070030 = "แคปแชตเก็บไว้เป็นที่ระลึกดีมั้ยนะ?"
13007-130070040 = "พูดอะไรแปลกๆ อีกแล้วเนี่ย!"
13007-130070050 = "แค่ถามเผื่อไว้ก่อนนะ..."
13007-130070060 = "คงไม่ได้แคปเก็บเอาไว้จริงๆ หรอกใช่มั้ย?"
13007-130070070 = "ไม่แคปหรอก..."
13007-130070080 = "ถ้างั้นก็แล้วไป"
13007-130070090 = "ในที่สุดก็เสร็จสมบูรณ์แล้วละ!"
13007-130070100 = "สมบูรณ์แบบงั้นเหรอ อะไรน่ะ?"
13007-130070110 = "ฮุฮุฮุ... เดี๋ยวเจอกันก็รู้เองแหละ"
13007-130070120 = "ตอนนี้อยู่ที่ชาเล่ต์ใช่มั้ย?"
13007-130070130 = "เดี๋ยวฉันไปหา!"

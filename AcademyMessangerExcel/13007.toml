[translation]
13007-1159 = "嗚嗚……好吃的東西為什麼這麼貴呢……"
13007-1160 = "想要不勞而獲……"
13007-1161 = "別指望一攫千金，要好好工作才行"
13007-1162 = "我也想要不勞而獲地過活……"
13007-1163 = "唔，是這樣沒錯啦……"
13007-1164 = "……雖然是我先說出口的，但老師說這種話沒問題嗎？"
13007-1165 = "雖然是真心話，但我打工時也是很認真的唷"
13007-1166 = "淳子，打工……！？"
13007-1167 = "喂，那是什麼反應！"
13007-1168 = "我打工有很奇怪嗎！？"
13007-1169 = "老師，老師！"
13007-1170 = "我知道了件很厲害的事！"
13007-1171 = "怎麼了？"
13007-1172 = "有個能以實惠價格大吃高級海鮮食材的方法！"
13007-1173 = "真的嗎？"
13007-1174 = "淳子，再怎麼想吃那種東西也不能犯罪啊"
13007-1175 = "當然。不過詳細的方法是祕密……呵呵"
13007-1176 = "你把我想成什麼了！？才不是犯罪！"
13007-1177 = "如果想知道詳情，今晚來格黑娜的餐廳吧！"
13007-1178 = "別遲到唷！"
13007-1179 = "嗚嗚……"
13007-1180 = "如果沒有為那種實驗買材料，就能吃頓豪華大餐了……"
13007-1181 = "淳子，瞧瞧這個"
13007-1182 = "嗯，什麼？"
13007-1183 = "我在網路上看到，黃瓜塗蜂蜜好像會有哈密瓜的味道"
13007-1184 = "又是網路資訊啊！而且蜂蜜就已經夠貴了！"
13007-1185 = "已經不會再被騙了！"
13007-1186 = "呵呵，嘿，老師。能告訴你一件好事嗎？"
13007-1187 = "今天美食研究會的晚餐竟然是……肉！"
13007-1188 = "肉！"
13007-1189 = "而且還是高級和牛！"
13007-1190 = "和牛！？"
13007-1191 = "呵呵。羨慕吧，老師？"
13007-1192 = "今天就儘管羨慕我吧！"
13007-1193 = "我也想吃……"
13007-1194 = "我也要加入美食研究會！"
13007-1195 = "不行，今天去的店有人數限制"
13007-1196 = "但是回來後，我會告訴你有多好吃！"
13007-1197 = "今天中午，要跟美食研究會去蛋糕自助餐！"
13007-1198 = "蛋糕自助餐？"
13007-1199 = "咦，老師不知道蛋糕自助餐嗎？"
13007-1200 = "蛋糕自助餐，顧名思義"
13007-1201 = "擺放著各式各樣的蛋糕，在時間內可以隨便吃……"
13007-1202 = "如此夢幻的一餐！"
13007-1203 = "感覺吃一半就膩了……"
13007-1204 = "別說那種話！"
13007-1205 = "可以盡情吃蛋糕的機會可不是隨時都有！"
13007-1206 = "噁……"
13007-1207 = "感覺如何？"
13007-1208 = "嗯，有好一點了……"
13007-1209 = "昆布竟然在肚子裡膨脹得這麼厲害……"
13007-1210 = "前幾天看到亞伽里把一整袋調味乾昆布當作點心吃……"
13007-1211 = "亞伽里的肚子到底是怎麼回事……"
13007-1212 = "老師，聽說過山海經附近的中華街嗎？"
13007-1213 = "有很多中華料理店，而且每一間都很好吃！"
13007-1214 = "我也有聽說"
13007-1215 = "非常好吃唷"
13007-1216 = "這樣啊。消息都傳進老師的耳朵了，看來準沒錯……！"
13007-1217 = "咦咦──！不跟我說一聲就自己跑去！？真狡猾！"
13007-1218 = "總之，身為美食研究會的一員，只能去了吧"
13007-1219 = "所以，那個……這個週末，如果可以的話，要一起去嗎？"
13007-1220 = "嗯，走吧"
13007-1221 = "呵呵，約好了唷？"
13007-1222 = "那麼週末，在山海經高級中學的正門口前見唷！"
13007-130070010 = "老師，老師！"
13007-130070020 = "你好像很開心呢，淳子"
13007-130070030 = "真難得，把這個MomoTalk的畫面截圖留作紀念吧？"
13007-130070040 = "喂，你在說什麼啊！"
13007-130070050 = "……以防萬一問一下"
13007-130070060 = "你該不會真的截圖了吧？"
13007-130070070 = "沒有……"
13007-130070080 = "那就好"
13007-130070090 = "我想說的是……終於完成了！"
13007-130070100 = "完成了，是指什麼……？"
13007-130070110 = "呵呵……你現在在夏萊對吧？"
13007-130070120 = "我直接拿給你看！"
13007-130070130 = "等我一下，我現在就過去！"

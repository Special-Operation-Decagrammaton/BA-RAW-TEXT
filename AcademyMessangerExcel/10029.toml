[translation]
10029-100290010 = "ไปในที่ที่อยากไป นอนในที่ที่อยากนอน"
10029-100290020 = "และกินในร้านที่อยากจะกิน"
10029-100290030 = "ใช้ชีวิตแบบไม่ถูกผูกมัด และไม่ถูกขีดเส้นกำหนด!"
10029-100290040 = "ชีวิตที่เหมือนกับคุกกี้รังสรรค์ด้วยมือ!"
10029-100290050 = "พูดถึงเรื่องอะไรเหรอ?"
10029-100290060 = "คำคมบาดใจจากอะไรสักอย่างเหรอ?"
10029-100290070 = "อืม..."
10029-100290080 = "แต่มันแปลกนิดๆ นะ"
10029-100290090 = "น่าเสียดาย น่าเสียดายจริงๆ ที่มีปฏิกิริยาโต้ตอบแบบนี้"
10029-100290100 = "ความโรแมนติกเป็นศูนย์สินะ\nคุณครู"
10029-100290110 = "ไม่ได้การ ฉันคงจะต้องสอนให้คุณครู\nได้รู้จักความโรแมนติกซะหน่อยแล้ว"
10029-100290120 = "ฮุฮุ"
10029-100290130 = "ไม่ต้องห่วง จะทำให้สนุกๆ ไม่น่าเบื่อเลย"
10029-100290140 = "โลกนี้โหดร้ายจริงๆ เลยนะ"
10029-100290150 = "ผู้คนต่างไม่เข้าใจกัน และแต่ละคน\nก็ไม่ยอมรับความคิดของกันและกัน"
10029-100290160 = "ถ้าก้าวข้ามผ่านมาได้ ก็จะได้พบเจอกับสิ่งใหม่ๆ อย่างแน่นอน"
10029-100290170 = "เป็นเรื่องที่น่าเสียดายจริงๆ นะ\nคุณครูคิดยังไงเกี่ยวกับความจริงที่น่าเศร้านี้ล่ะ?"
10029-100290180 = "คราวนี้เป็นเรื่องพูดคุยที่จริงจังสินะ"
10029-100290190 = "หืม? มีอะไรเหรอ?"
10029-100290200 = "เปล่าหรอก เปล่าจริงๆ"
10029-100290210 = "มันก็แค่ความรู้สึกที่จู่ๆ ก็รู้สึกขึ้นมา"
10029-100290220 = "แต่ว่า..."
10029-100290230 = "อื้อ จริงด้วย ถ้าเป็นคุณครูละก็\nอาจจะไม่เป็นไรก็ได้"
10029-100290240 = "คุณครู"
10029-100290250 = "ฉันจะไปหาเดี๋ยวนี้แหละ"
10029-100290260 = "วันนี้ขอบคุณนะคุณครู"
10029-100290270 = "ครั้งที่แล้วก็เหมือนกัน พอได้คุยกับคุณครูแล้ว\nก็รู้สึกเหมือนหัวใจชุ่มชื่นขึ้นเลยล่ะ"
10029-100290280 = "เอาไว้... ถ้าคุณครูไม่ว่าอะไร"
10029-100290290 = "ไว้ฉันจะมาขอรบกวนอีกนะ ขอบคุณนะคุณครู"
10029-100290300 = "คุณครู"
10029-100290310 = "วันนี้มีงานที่สำคัญมากเลย งาน\nสำคัญขนาดนี้ ฉันทำคนเดียวไม่ได้"
10029-100290320 = "อยากให้ครูช่วยสินะ!"
10029-100290330 = "คราวนี้เรื่องอะไรละ?"
10029-100290340 = "ฮุฮุ เรื่องแสนโรแมนติกน่ะ"
10029-100290350 = "อาจเป็นหนึ่งในเรื่องที่โรแมนติก\nที่สุดในโลกเลยก็ได้"
10029-100290360 = "มาฟังต่อหน้าไม่ดีกว่าเหรอ?"
10029-100290370 = "ถ้างั้นฉันจะรอนะ"
10029-100290380 = "พร้อมกับความคาดหวังและการตั้งตารอ ยูโทริ นัตสึ"
10029-100290390 = "คุณครู รู้ใช่มั้ย?"
10029-100290400 = "...เรื่องวันนี้เป็นความลับ ห้ามบอกใครเด็ดขาด"
10029-100290410 = "แสงแดดที่แสนอบอุ่น สายลมเอื่อยๆ สบาย"
10029-100290420 = "ท้องฟ้าสูงเสียดฟ้า โลกทั้งใบส่องประกาย\nเป็นสีฟ้าคราม"
10029-100290430 = "การปล่อยมันไปแบบนี้ น่าเสียดายจริงๆ"
10029-100290440 = "อยู่ข้างนอกสินะ?"
10029-100290450 = "ไปปิกนิกอยู่งั้นเหรอ?"
10029-100290460 = "ฮิฮิ"
10029-100290470 = "อื้อ ดีมากเลย\nตอนนี้คุณครูก็ชินแล้วสินะ!"
10029-100290480 = "ฉันจะพูดสั้นๆ ก็แล้วกัน"
10029-100290490 = "ฉันรออยู่นะ!"
10029-100290500 = "วันนี้สนุกมากเลยล่ะคุณครู"
10029-100290510 = "ต่อไปก็ขอรบกวนด้วยนะ ทั้งตอนที่มีเรื่อง..."
10029-100290520 = "แล้วก็ตอนที่ไม่มีเรื่องอะไรด้วย"

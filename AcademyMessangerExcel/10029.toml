[translation]
10029-100290010 = "가고 싶은 데로 가고, 자고 싶은 데에서 자고."
10029-100290020 = "또한, 먹을 건 먹고 싶은 곳에서 먹는다."
10029-100290030 = "얽매이지 않고, 제약을 모르고 뜻하는 바로 살아가리!"
10029-100290040 = "마치 손끝에서 빚어진 쿠키의 삶처럼!"
10029-100290050 = "무슨 이야기야?"
10029-100290060 = "무언가의 명언이나 인용구?"
10029-100290070 = "음……."
10029-100290080 = "조금 의외인걸."
10029-100290090 = "아쉬워. 참으로 아쉽다. 그런 반응이라니."
10029-100290100 = "로망이 부족하구만, 선생님."
10029-100290110 = "안 되겠어. 내가 선생에게 로망이 무엇인지 가르쳐줘야겠군."
10029-100290120 = "후후."
10029-100290130 = "걱정 마. 지루하진 않게 할 테니."
10029-100290140 = "세상은 참으로 각박해."
10029-100290150 = "사람들은 서로를 이해하지 못하고, 각자의 사상은 서로에게 받아들여지지 않지."
10029-100290160 = "그것을 넘는다면, 분명 새로운 경지에 도달할 수 있을 것인데."
10029-100290170 = "실로 통탄할 일이야. 이 슬픈 현실에 대해 선생님은 어떻게 생각할까?"
10029-100290180 = "이번엔 꽤 무거운 담론이구나."
10029-100290190 = "응? 무슨 일 있어?"
10029-100290200 = "아니. 전혀."
10029-100290210 = "그저 이것은 불현듯 떠오른 감상."
10029-100290220 = "하지만"
10029-100290230 = "응. 맞아. 선생님이라면 괜찮을지도 모르겠어."
10029-100290240 = "선생님."
10029-100290250 = "지금 찾아 갈게."
10029-100290260 = "오늘은 고마웠어, 선생님."
10029-100290270 = "저번에도 그렇고, 선생님과 대화하고 나면 마음이 꽤 개운해지는 것 같아."
10029-100290280 = "가끔씩, 선생님만 괜찮다면."
10029-100290290 = "또 비슷하게 부탁할게. 다시 한번 고마워, 선생님."
10029-100290300 = "선생님."
10029-100290310 = "오늘은 중대한 이벤트가 있어. 나 혼자서는 할 수 없는, 아주 중요한 일이지."
10029-100290320 = "내 도움이 필요한가 보군!"
10029-100290330 = "이번에는 무슨 일이야?"
10029-100290340 = "후후. 아주 로맨틱한 일이야."
10029-100290350 = "단언컨대 세상에서 가장 로맨틱한 일 중 하나지."
10029-100290360 = "직접 와서 듣는 게 더 좋지 않겠어?"
10029-100290370 = "그럼 기다리고 있을게."
10029-100290380 = "기다림과 기대를 담아. 유토리 나츠."
10029-100290390 = "선생님. 알고 있지?"
10029-100290400 = "……오늘 일은 누구에게도 비밀이야."
10029-100290410 = "따듯한 태양. 포근한 바람."
10029-100290420 = "하늘은 높고 온 세상이 파랗게 빛나니."
10029-100290430 = "그냥 흘려보내기에는 너무나도 아쉬운 무대."
10029-100290440 = "지금 밖인가 봐?"
10029-100290450 = "피크닉이라도 하는 거야?"
10029-100290460 = "후후."
10029-100290470 = "응. 아주 좋아. 선생님도 이젠 익숙해졌군!"
10029-100290480 = "그런 고로 긴 말은 생략하겠어."
10029-100290490 = "기다리고 있을 테니까!"
10029-100290500 = "오늘은 정말 즐거웠어, 선생님."
10029-100290510 = "앞으로도 종종 잘 부탁해. 일이 있을 때도……."
10029-100290520 = "그리고, 아무 일도 없을 때에도."

[translation]
10029-100290010 = "想去哪裡就去哪裡，想睡的時候就睡"
10029-100290020 = "然後，在想吃的地方吃想吃的東西"
10029-100290030 = "不受任何拘縛，不拘泥於制約，隨心所欲地生活！"
10029-100290040 = "就像是手工餅乾一樣！"
10029-100290050 = "……那個，你在說什麼？"
10029-100290060 = "什麼名言？"
10029-100290070 = "唔嗯……"
10029-100290080 = "還差得遠呢"
10029-100290090 = "這樣的反應不夠啊～"
10029-100290100 = "不夠浪漫唷，老師"
10029-100290110 = "那麼，我就來教教老師什麼是浪漫吧"
10029-100290120 = "呵呵"
10029-100290130 = "別擔心，不會讓你覺得無聊的"
10029-100290140 = "世道艱難"
10029-100290150 = "難以接受與自己不同的思想，更別提互相包容……"
10029-100290160 = "如果能跨越這點，明明就能到達新的境界"
10029-100290170 = "令人嘆息，屬實令人嘆息……老師不這麼認為嗎？"
10029-100290180 = "好沉重的話題啊……怎麼了嗎？"
10029-100290190 = "有什麼痛苦的事嗎……？"
10029-100290200 = "不，沒什麼"
10029-100290210 = "只是突然這麼想而已"
10029-100290220 = "不過"
10029-100290230 = "嗯，如果是老師的話應該沒問題"
10029-100290240 = "等等我，老師"
10029-100290250 = "我馬上過去"
10029-100290260 = "今天謝謝你囉，老師"
10029-100290270 = "之前也是，總覺得和老師聊天後就暢快多了"
10029-100290280 = "要是老師不嫌棄的話"
10029-100290290 = "今後也拜託老師了"
10029-100290300 = "老師"
10029-100290310 = "今天有重大的活動唷，是我一個人無法獨自完成的大型活動"
10029-100290320 = "輪到我出場了嗎？"
10029-100290330 = "這次是怎樣的活動？"
10029-100290340 = "呵呵，這次是「浪漫的事」唷"
10029-100290350 = "在世上也算是相～當浪漫的唷，肯定沒錯"
10029-100290360 = "所以"
10029-100290370 = "推薦你一定要來唷"
10029-100290380 = "那我就等你來囉"
10029-100290390 = "老師，以防萬一"
10029-100290400 = "……今天的事，要對大家保密唷～"
10029-100290410 = "溫暖的太陽，溫柔的風"
10029-100290420 = "天空很高，世界很藍"
10029-100290430 = "只是隨波逐流就太可惜了"
10029-100290440 = "今天在外面玩嗎？"
10029-100290450 = "正在野餐嗎？"
10029-100290460 = "嘻嘻"
10029-100290470 = "很好，非常好。老師也習慣了呢"
10029-100290480 = "如此這般，以上省略"
10029-100290490 = "我等著唷！"
10029-100290500 = "今天真的很開心唷，老師"
10029-100290510 = "今後如果有什麼事的話還請多指教囉～"
10029-100290520 = "……就算沒有也一樣，好嗎？"

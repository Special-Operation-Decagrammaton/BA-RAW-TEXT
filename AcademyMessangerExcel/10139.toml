[translation]
10139-101390010 = "안녕하세요, <FOX EATS> 입니다!"
10139-101390020 = "고객님이 주문하신 음식이 10분 뒤 목적지에 도착할 예정입니다."
10139-101390030 = "정확한 배달을 위해 다시 한 번 주소를 확인해주세요."
10139-101390040 = "FOX EATS?"
10139-101390050 = "주문한 적 없는데요?"
10139-101390060 = "괜찮습니다. 대금은 이미 지불되었으니까요!"
10139-101390070 = "선생님께서는 편안히 자리에 앉아서 FOX EATS가 준비한 늦은 저녁을 즐겨주세요."
10139-101390080 = "아직 저녁을 먹지 않은 건 어떻게 안 거야?"
10139-101390090 = "후후, 다 아는 수가 있지요."
10139-101390100 = "FOX EATS의 영업 비밀이랍니다."
10139-101390110 = "그러고 보니 이전에도 비슷한 일이 있었는데……"
10139-101390120 = "음식이 곧 도착합니다."
10139-101390130 = "안전을 위해 출입문에서 최대한 떨어지시고, 혹시 모를 충격에 대비하세요."
10139-101390140 = "무서워!"
10139-101390150 = "선생님"
10139-101390160 = "어제 제가 냉장고에 넣어 놓은 유부초밥은 다 드셨나요?"
10139-101390170 = "응. 먹었어."
10139-101390180 = "너무 맛있어서 한 자리에서 다 먹고 말았어……"
10139-101390190 = "다행이네요."
10139-101390200 = "역시 유부초밥은 살짝 식은게 더 맛이 좋다니까요."
10139-101390210 = "다음에도 기회가 되면 다시 유부초밥을 만들어 드릴게요."
10139-101390220 = "하지만 그것 때문에 일부러 식사를 거르진 마세요."
10139-101390230 = "명심할게."
10139-101390240 = "선생님, 혹시 오늘 오후에 시간 되시나요?"
10139-101390250 = "응. 마침 한가하던 참이었어."
10139-101390260 = "갑자기 무슨 일이야?"
10139-101390270 = "그게, <특수 보급 작전>이 오늘 오후에 예정되어 있었는데"
10139-101390280 = "소대원들이 다른 일 때문에 오지 못하게 되어서요……"
10139-101390290 = "혹시 선생님께서 작전을 도와주실 수 없을까요?"
10139-101390300 = "물론이지!"
10139-101390310 = "하지만 내가 도울만한 게 있을까?"
10139-101390320 = "나는 특수 작전에 대해서는 아무것도 모르는데."
10139-101390330 = "괜찮아요. 그리 위험한 작전은 아니니까요."
10139-101390340 = "……아마도."
10139-101390350 = "아마도?!"
10139-101390360 = "선생님"
10139-101390370 = "혹시 <잘못될 가능성이 있는 문제는 반드시 잘못된다>는 격언을 알고 계시나요?"
10139-101390380 = "머피의 법칙, 말이구나."
10139-101390390 = "일을 하다 보면 자주 듣곤 하지."
10139-101390400 = "네. 꽤나 많은 사람들이 그 말에 공감하더라고요."
10139-101390410 = "저도 예전에 매일 하던 장비 점검을 실수로 빠트린 적이 있었는데"
10139-101390420 = "공교롭게도 그 날 안전 사고가 일어나는 바람에 애를 먹은 기억이 있어요."
10139-101390430 = "하필이면 실수한 날 사고가 일어나다니~ 하고 말이죠."
10139-101390440 = "나도 그런 경험이 꽤 있었지."
10139-101390450 = "우연이란 참 얄궃은 타이밍에 일어난다니까."
10139-101390460 = "그 때, 관련된 책을 읽다가 알게 되었는데요."
10139-101390470 = "사실 이런 법칙은 좋은 기억보다 나쁜 기억을 더 잘 기억하기 때문에 발생하는 일이래요."
10139-101390480 = "실수를 해도 아무 일도 벌어지지 않았으면 기억에서 지워버린다는 거죠."
10139-101390490 = "과연, 과학적인 이유가 있었구나."
10139-101390500 = "그래도 조금 아쉬운 걸……"
10139-101390510 = "기왕이면 좋은 기억이 더 오래 남으면 좋을텐데."
10139-101390520 = "그래도 저는 나쁜 상황을 기억하는 게 더 좋은 것 같아요."
10139-101390530 = "그래야 실수를 교훈 삼아 다음엔 더 잘 할 수 있을테니까요."
10139-101390540 = "선생님."
10139-101390550 = "샬레의 창고에 우산이 가득 쌓여 있던데"
10139-101390560 = "이거 전부 샬레 비품인가요?"
10139-101390570 = "그건 당번 학생들이 두고 간 분실물이야."
10139-101390580 = "어느새 꽤 쌓여버렸네……."
10139-101390590 = "아하"
10139-101390600 = "우산은 돌아갈 때 비가 오지 않으면 챙기는 걸 잊기 쉬우니까요."
10139-101390610 = "그런데 대부분이 이름이 쓰여 있지 않아서"
10139-101390620 = "주인을 찾으려면 꽤나 애를 먹겠어요"
10139-101390630 = "나중에 주인을 찾아가라고 공지를 써두자"
10139-101390640 = "네"
10139-101390650 = "선생님도 잃어버려도 찾기 쉽도록 선생님의 물건에는 이름을"
10139-101390660 = "아니"
10139-101390670 = "오히려 역효과가 날 것 같네요."
10139-101390680 = "어째서?!"
10139-101390690 = "선생님, 이번 휴일에 특별한 일정 있으신가요?"
10139-101390700 = "그냥 쉬면서 보낼 것 같은데……"
10139-101390710 = "니코는 특별한 일정이라도 있어?"
10139-101390720 = "저도 이번 주말에는 특별한 일정이 없어서, 뭔가 새로운 걸 시험해보려고요."
10139-101390730 = "선생님, 혹시 주말 동안 샬레의 조리실을 빌려주실 수 있으실까요?"
10139-101390740 = "이번 주말에 작전에 쓸 전투식량을 만들어 볼까 해서요."
10139-101390750 = "조리실은 마음대로 써도 상관없지만……"
10139-101390760 = "전투식량이라고?"
10139-101390770 = "네. 쉽게 상하지 않고, 맛도 거의 변하지 않는 전투식량이요."
10139-101390780 = "뭔가 흥미가 생기네."
10139-101390790 = "어떤 재료로 만드는 거야?"
10139-101390800 = "후후, 나중에 다 만들게 되면 직접 보여드릴게요."

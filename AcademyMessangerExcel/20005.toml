[translation]
20005-20005010 = "คุณครูคะ ช่วงบ่ายวันนี้คุณครูพอจะมี\nเวลาบ้างมั้ยคะ?"
20005-20005020 = "วันนี้หลังเลิกเรียน ฉันจะไปซื้อชุด\nว่ายน้ำที่ห้างสรรพสินค้าที่ชิบะทาวน์ค่ะ"
20005-20005030 = "ฉันอยากให้คุณครูช่วยดูให้หน่อยน่ะค่ะ\nว่าชุดไหนเหมาะกับฉัน (≧∇≦)"
20005-20005040 = "ได้สิ เดี๋ยวครูไปด้วย"
20005-20005050 = "ฮิฟุมิไม่มีชุดว่ายน้ำอยู่เลยเหรอ?"
20005-20005060 = "ฉันมีชุดว่ายน้ำของโรงเรียน\nอยู่แล้วก็จริงค่ะ..."
20005-20005070 = "แต่มันดูธรรมดาเกินไปค่ะ! จะให้ใส่\nชุดว่ายน้ำธรรมดาๆ ได้ยังไงล่ะคะ!"
20005-20005080 = "ทำไมไม่ได้ล่ะ...?"
20005-20005090 = "ชายหาดในช่วงฤดูร้อนน่ะ เป็นสถานที่\nที่ทุกคนจะได้เปิดเผยเสน่ห์ที่ซ่อนเอาไว้..."
20005-20005100 = "เพราะงั้นการใส่ชุดว่ายน้ำธรรมดาไปก็\nเหมือนกับถือปืนไม่มีกระสุนเข้าสนามรบ\nเลยนะคะ!"
20005-20005110 = "สรุปก็คือ... มันคือการเดบิวต์ในช่วง\nฤดูร้อนของฉันค่ะ!"
20005-20005120 = "คุณครูคะ ได้ยินว่าใกล้ๆ กับตลาด\nมูอิกาฮามะ มีชายหาดลับอยู่ด้วยค่ะ"
20005-20005130 = "ตอนบ่ายไปว่ายน้ำเล่นที่นั่นด้วยกัน\nมั้ยคะ?"
20005-20005140 = "ได้สิ"
20005-20005150 = "แต่ว่าแถวนั้นไม่น่าจะมีรถบัส\nหรือรถไฟผ่านนะ จะไปยังไงล่ะ?"
20005-20005160 = "ไม่เป็นไรหรอกค่ะ ฉันจะพาคุณครูไป\nเองค่ะ"
20005-20005170 = "ฉันจะขับรถถังไปค่ะ!"
20005-20005180 = "รถถังเรอะ?!"
20005-20005190 = "คุณครู... ขอโทษจริงๆ ค่ะ"
20005-20005200 = "คุณครูต้องลำบากเพราะฉัน...\n (；＿；)"
20005-20005210 = "ไม่เป็นไรหรอก"
20005-20005220 = "ชุดว่ายน้ำยังโอเครึเปล่า?"
20005-20005230 = "เรื่องที่ชุดว่ายน้ำขาดคงจะทำอะไร\nไม่ได้... ไม่เป็นไรหรอกค่ะ ฉันมีชุด\nสำรองอยู่"
20005-20005240 = "คราวหน้าเรานั่งรถแท็กซี่ไปแทนก็แล้ว\nกันนะคะ!"
20005-20005250 = "ใส่ชุดว่ายน้ำขึ้นรถแท็กซี่ไม่อายเหรอ?"
20005-20005260 = "อ๊ะ...!"
20005-20005270 = "อ๊ายยย...! ((º□º;))"
20005-20005280 = "คุณครูดูข้างนอกสิคะ!"
20005-20005290 = "อากาศแจ่มใสมาก ไม่มีเมฆเลยค่ะ!"
20005-20005300 = "อากาศแบบนี้เหมาะกับการนอนอาบ\nแดดที่ริมหาดเลยนะคะ~"
20005-20005310 = "ถ้าคุณครูไม่ว่าอะไร เราออกไปนอน\nอาบแดดริมหาดกันดีมั้ยคะ?"
20005-20005320 = "ไปสิ ไปอาบแดดกันเถอะ"
20005-20005330 = "แต่ว่าถ้าจะไปอาบแดดละก็\nต้องเตรียมอุปกรณ์ไปด้วยรึเปล่า?"
20005-20005340 = "ไม่เป็นไรหรอกค่ะ ヾ(•ω•`)o"
20005-20005350 = "ถึงเราจะไม่มีอุปกรณ์สำหรับอาบแดด\nแต่เรามีรถถังอยู่นะคะ!"
20005-20005360 = "จะเอารถถังไปทำอะไรน่ะ?!"
20005-20005370 = "คุณครูคะ ทานมื้อเที่ยงรึยังคะ?"
20005-20005380 = "ยังเลย"
20005-20005390 = "งั้นก็ดีเลยค่ะ ตอนนี้ฉันกำลังจะออกไป\nกินมื้อเที่ยงพอดี"
20005-20005400 = "ที่ร้านริมทะเลข้างหน้านี้มียากิโซบะ\nอร่อยๆ ด้วยนะคะ..."
20005-20005410 = "คุณครูไปทานยากิโซบะที่ร้านริมทะเล\nกับฉันมั้ยคะ?"
20005-20005420 = "ได้อยู่แล้ว ไปกินยากิโซบะกันเถอะ"
20005-20005430 = "ค่ะ ถ้างั้นเดี๋ยวเจอกันที่หน้าร้านริมทะเล\nนะคะ!"
20005-20005440 = "อุตส่าห์ได้มาทะเลที่รอมาตั้งนาน..."
20005-20005450 = "แต่ดูเหมือนคุณครูจะยุ่งอยู่ตลอดเลย\nนะคะ"
20005-20005460 = "พอจะมีอะไรที่ฉันช่วยได้บ้างมั้ยคะ?"
20005-20005470 = "แค่ฮิฟุมิอยากช่วยครูก็ดีใจแล้วละ"
20005-20005480 = "น่าแปลกที่ไปทางไหนก็มีแต่คนขอให้\nช่วยเยอะแยะเลย..."
20005-20005490 = "มาถึงสถานที่พักผ่อนแล้วก็ยังต้อง\nเหนื่อยอีกนะคะเนี่ย..."
20005-20005500 = "แต่ว่าอย่าฝืนมากเกินไปนะคะ"
20005-20005510 = "การปล่อยให้ฤดูร้อนผ่านไป\nโดยไม่ทำอะไรเป็นเรื่องน่าเศร้า"
20005-20005520 = "คุณลุงนิโคไลพูดเอาไว้แบบนี้ใน\nโฆษณาลดราคาสินค้าพิเศษช่วงฤดูร้อนค่ะ!"
20005-20005530 = "ครูจะจำไว้นะ"

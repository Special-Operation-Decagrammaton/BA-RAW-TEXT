[translation]
20005-20005010 = "老師，請問今天有空嗎？"
20005-20005020 = "放學後，我想去芝町的購物中心買泳裝……"
20005-20005030 = "如果可以的話，想請老師幫忙看看什麼樣的泳裝比較好……！"
20005-20005040 = "那個，如果我可以的話，很樂意"
20005-20005050 = "難道，你沒有泳裝嗎……？"
20005-20005060 = "有學校的學生泳裝……"
20005-20005070 = "但那種不行！"
20005-20005080 = "不，不行嗎……？"
20005-20005090 = "提到夏天，還有大海，是大家各自展示隱藏魅力的戰場……"
20005-20005100 = "但是，穿著學生泳裝去那樣的地方，對普通的孩子來說，就和不帶子彈上戰場一樣！"
20005-20005110 = "我也想藉著難得的機會，初次展現夏天的自己……！"
20005-20005120 = "老師，聽說在離無為濱稍遠的市場附近，有個不為人知的美麗海灘！"
20005-20005130 = "今天下午要一起去那裡游泳嗎？"
20005-20005140 = "竟然有那樣的地方，我當然要去"
20005-20005150 = "但是那附近應該沒有公車和電車……"
20005-20005160 = "沒問題的"
20005-20005170 = "我開戰車去接你！"
20005-20005180 = "開戰車！？"
20005-20005190 = "老師，今天非常感謝。然後對不起……"
20005-20005200 = "因為我的關係，引起了不必要的麻煩事……(；＿；)"
20005-20005210 = "不會，別放在心上"
20005-20005220 = "泳裝，修得好嗎？"
20005-20005230 = "大概，應該有辦法……"
20005-20005240 = "下次去游泳的時候，別坐戰車，改搭計程車吧！"
20005-20005250 = "穿泳裝搭計程車不覺得也挺羞恥的嗎？"
20005-20005260 = "……"
20005-20005270 = "說的也是……！((º□º;))"
20005-20005280 = "老師！"
20005-20005290 = "萬里無雲，天氣非常好！"
20005-20005300 = "既然好不容易放晴了"
20005-20005310 = "要一起曬個日光浴嗎？"
20005-20005320 = "不錯耶，肯定要"
20005-20005330 = "那樣的話，必須準備很多東西"
20005-20005340 = "這就交給我吧！ヾ(•ω•`)o"
20005-20005350 = "我們現在有十字軍醬！"
20005-20005360 = "你想用戰車做什麼！？"
20005-20005370 = "老師，吃過午餐了嗎？"
20005-20005380 = "不，還沒"
20005-20005390 = "這樣啊！我現在正想去吃飯"
20005-20005400 = "聽說附近有一間海之家的炒麵很好吃……"
20005-20005410 = "如果可以的話，老師也一起去如何？"
20005-20005420 = "炒麵不錯耶，走吧！"
20005-20005430 = "那麼，我在海之家的前面等你唷！"
20005-20005440 = "難得來到海邊……"
20005-20005450 = "老師卻好像一直都很忙呢"
20005-20005460 = "有沒有什麼我能幫忙的事情呢？"
20005-20005470 = "有這份心意我就很高興了"
20005-20005480 = "不知道為什麼走到哪裡都會被拜託一堆事情……"
20005-20005490 = "那還真是辛苦呢……"
20005-20005500 = "還請老師不要太逞強哦"
20005-20005510 = "「沒有比什麼都沒做就過去的夏天更悲傷的事了──」"
20005-20005520 = "Mr.尼科萊先生在夏日特別促銷廣告裡也是這麼說的！"
20005-20005530 = "嗯，我會注意的。謝謝你"

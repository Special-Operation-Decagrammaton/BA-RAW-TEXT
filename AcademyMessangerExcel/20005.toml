[translation]
20005-20005010 = "선생님, 오후에 시간 괜찮으신가요?"
20005-20005020 = "오늘 방과 후에 시바타운에 있는 대형 쇼핑몰에 수영복을 사러 가려했거든요."
20005-20005030 = "어떤 수영복이 제게 어울리는지 선생님이 꼭 봐주셨으면 좋겠어요. (≧∇≦)"
20005-20005040 = "그래. 같이 가자."
20005-20005050 = "그나저나 전에 쓰던 수영복은 없는 거야?"
20005-20005060 = "학교에서 쓰는 평범한 스쿨미즈가 있긴 하지만……"
20005-20005070 = "그건 너무 평범해요! 평범한 수영복으로는 안 된다고요!"
20005-20005080 = "뭐가 안 되는데……?"
20005-20005090 = "여름의 해변은 모두가 숨겨왔던 매력을 드러내는 각축장……"
20005-20005100 = "그곳에 평범한 수영복을 입고 가는 건 총알 없이 전장에 나가는 것과 다름없어요!"
20005-20005110 = "……말하자면, 여름 데뷔예요!"
20005-20005120 = "선생님, 무이가하마 시장 근처에 알려지지 않은 예쁜 해변이 있대요."
20005-20005130 = "오후에 함께 수영하러 가지 않으시겠어요?"
20005-20005140 = "좋아."
20005-20005150 = "그런데 그 근처는 버스나 전철이 다니지 않을 텐데, 어떻게 가지?"
20005-20005160 = "괜찮아요. 제가 직접 모시러 갈게요."
20005-20005170 = "전차로!"
20005-20005180 = "전차로?!"
20005-20005190 = "선생님, 정말 죄송해요."
20005-20005200 = "저 때문에 괜한 고생을 하셨으니……\n (；＿；)"
20005-20005210 = "괜찮아."
20005-20005220 = "수영복의 상태는 괜찮아?"
20005-20005230 = "찢어진 수영복은 어쩔 수 없지만…… 여분의 수영복이 있으니 괜찮아요."
20005-20005240 = "다음번에는 전차가 아니라 택시를 타고 수영을 하러 가죠!"
20005-20005250 = "수영복을 입은 채로 택시를 타는 건 어쩐지 부끄럽지 않아?"
20005-20005260 = "앗……."
20005-20005270 = "아아앗……! ((º□º;))"
20005-20005280 = "선생님, 밖에 좀 보세요!"
20005-20005290 = "구름 한 점 없이 볕이 드는 게 날씨가 아주 맑아요!"
20005-20005300 = "이런 날 해변에서 일광욕하면 분명 기분 좋을 거예요~"
20005-20005310 = "괜찮으시면 일광욕을 하러 같이 해변에 나가지 않으시겠어요?"
20005-20005320 = "좋아. 같이 나가자."
20005-20005330 = "그런데 일광욕을 하려면 장비가 필요하지 않을까?"
20005-20005340 = "괜찮아요. ヾ(•ω•`)o"
20005-20005350 = "저희에게 해수욕 장비는 없어도 전차는 있으니까요!"
20005-20005360 = "전차로 무얼 어쩌려고?!"
20005-20005370 = "선생님, 점심 식사하셨나요?"
20005-20005380 = "아직 안 먹었어."
20005-20005390 = "마침 잘 되었네요. 저도 지금부터 식사하려던 참이었거든요."
20005-20005400 = "이 앞의 바다의 집에서 맛있는 야키소바를 판다고 하던데……."
20005-20005410 = "괜찮으시다면 바다의 집에서 같이 식사하지 않으시겠어요?"
20005-20005420 = "좋아. 같이 점심을 먹자."
20005-20005430 = "네, 그럼 잠시 후에 바다의 집 앞에서 뵐게요!"
20005-20005440 = "모처럼의 바다인데……"
20005-20005450 = "선생님께서는 계속 바빠 보이시네요."
20005-20005460 = "혹시 제가 도와드릴 수 있는 일이 있을까요?"
20005-20005470 = "고맙지만 마음만 받을게."
20005-20005480 = "이상하게 가는 곳마다 도움을 요청하는 사람이 많아서……"
20005-20005490 = "휴양지에서도 고생이 많으시네요……"
20005-20005500 = "그래도 너무 무리는 하지 마세요."
20005-20005510 = "'아무것도 하지 않고 지나간 여름만큼 슬픈 것은 없다─' 라고"
20005-20005520 = "Mr.니콜라이 씨가 여름 특별세일 광고에서 말씀하셨으니까요!"
20005-20005530 = "명심해 둘게"

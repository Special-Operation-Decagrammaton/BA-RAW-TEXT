[translation]
10023-100230010 = "老師，可以拜託你一件事嗎？"
10023-100230020 = "當然，什麼事都可以"
10023-100230030 = "嗯，我該做什麼？"
10023-100230040 = "下次來格黑娜的時候，想請你幫忙買個防曬乳"
10023-100230050 = "因為一直使用的用完了，所以想在合宿之前添購"
10023-100230060 = "但風紀委員會的工作比想像中還要忙……"
10023-100230070 = "沒問題，交給我"
10023-100230080 = "是「Seaside」的防曬乳吧？"
10023-100230090 = "嗯，就是那個"
10023-100230100 = "那麼，拜託了"
10023-100230110 = "……準備好了嗎？"
10023-100230120 = "再提醒一次，絕對不准跟其他學生說！"
10023-100230130 = "……伊織？"
10023-100230140 = "這是要發給我的訊息嗎？"
10023-100230150 = "……哈？"
10023-100230160 = "ｊㄎㄚｋｌｆ"
10023-100230170 = "沒，沒事！"
10023-100230180 = "請忘記剛才發的訊息！"
10023-100230190 = "你這樣說，反而更讓人在意……"
10023-100230200 = "那個……謝謝你陪我練習游泳。老師"
10023-100230210 = "託你的福，雖說還不是很熟練，但總算會游一點了……"
10023-100230220 = "這樣就不用帶游泳圈去合宿了"
10023-100230230 = "那真是太好了。對了，伊織"
10023-100230240 = "……怎麼了？"
10023-100230250 = "看游泳圈上的圖案，難道伊織喜歡鴨子？"
10023-100230260 = "吵死了！去死！"
10023-100230270 = "老師，你現在在哪？"
10023-100230280 = "我收到聯絡，海之家附近似乎有不良分子在滋事"
10023-100230290 = "身為格黑娜的風紀委員會，可不能放任不管"
10023-100230300 = "只是不知道對方的數量，其他風紀委員也無法抽身，所以希望老師能來幫忙"
10023-100230310 = "啊，可能會掉進海裡，我想最好穿泳衣過來！"
10023-100230320 = "咦，等一下等一下！？"
10023-100230330 = "老師。剛才聽櫃台說你已經半天沒有回來了……"
10023-100230340 = "現在在哪裡？"
10023-100230350 = "在沙灘上"
10023-100230360 = "沙灘？你究竟在沙灘上做什麼……？"
10023-100230370 = "只是躺著"
10023-100230380 = "哈……？為什麼？"
10023-100230390 = "不，不用說。我知道了"
10023-100230400 = "我找到手銬後就馬上過去，待在那裡不要動"
10023-100230410 = "等等，你在想什麼？"
10023-100230420 = "老師，發生了緊急情況"
10023-100230430 = "嗯？怎麼了？"
10023-100230440 = "有太妹在海邊的餐廳鬧事"
10023-100230450 = "之前明明掃蕩一空了，結果不知道又從哪裡冒了出來……"
10023-100230460 = "總之，希望老師能來現場協助指揮"
10023-100230470 = "我知道了。地點在哪裡呢？"

[translation]
10023-100230010 = "คุณครู ช่วยอะไรฉันหน่อยได้มั้ย?"
10023-100230020 = "ได้อยู่แล้ว"
10023-100230030 = "มีอะไรเหรอ?"
10023-100230040 = "คราวหน้าถ้าแวะมาที่เกเฮนน่า\nช่วยซื้อแทนนิ่งออยล์มาให้หน่อยสิ"
10023-100230050 = "อันที่ใช้อยู่มันจะหมดแล้ว เราใกล้\nจะไปเข้าค่ายฤดูร้อนกันแล้วด้วย\nแต่ฉันงานยุ่งจนไม่มีเวลาไปซื้อเลย"
10023-100230060 = "ยุ่งจนไม่มีเวลาปลีกตัวเข้าไปในเมือง\nเลย"
10023-100230070 = "เข้าใจแล้วล่ะ"
10023-100230080 = "แทนนิ่งออยล์ของ \"ซีไซด์\" ใช่มั้ย?"
10023-100230090 = "อื้อ อันนั้นก็ได้"
10023-100230100 = "ฝากด้วยนะ"
10023-100230110 = "เตรียมของพร้อมแล้วใช่มั้ย?"
10023-100230120 = "ขอบอกอีกครั้งนะว่าห้ามบอกคนอื่น\nเด็ดขาดเลย!"
10023-100230130 = "อิโอริ?"
10023-100230140 = "ข้อความนี้ส่งหาครูแน่เหรอ?"
10023-100230150 = "...คุณครู?"
10023-100230160 = "#%$@@$^&!!!!"
10023-100230170 = "มะ...ไม่มีอะไรหรอก!"
10023-100230180 = "ไม่ต้องสนใจข้อความพวกนั้นก็ได้"
10023-100230190 = "พูดแบบนี้ยิ่งต้องเลื่อนขึ้นไปอ่านเลย..."
10023-100230200 = "ขอบคุณที่ช่วยฝึกว่ายน้ำให้นะ คุณครู"
10023-100230210 = "คุณครูมาช่วยฝึกแบบนี้ ถึงจะว่ายน้ำ\nไม่แข็งเท่าไร แต่ก็คงพอว่ายได้แล้วละ"
10023-100230220 = "คงไม่ต้องใช้ห่วงยางแล้ว..."
10023-100230230 = "คือว่าอิโอริ..."
10023-100230240 = "อะไรเหรอ...?"
10023-100230250 = "เธอชอบห่วงยาง\nลายเป็ดน้อยน่ารักๆ นั่นเหรอ?"
10023-100230260 = "หนวกหูน่า! อยากตายใช่มั้ย!"
10023-100230270 = "คุณครู ต้องออกปฏิบัติการแล้ว!"
10023-100230280 = "ตามที่มีคนแจ้งเข้ามา มีพวกเด็กเกเร\nกำลังก่อความวุ่นวายอยู่ที่ด้านหน้า\nร้านริมทะเล"
10023-100230290 = "ในฐานะสมาชิกคณะกรรมการวินัย\nเกเฮนน่า จะปล่อยให้เกิดเรื่องวุ่นวาย\nแบบนี้ไม่ได้!"
10023-100230300 = "รีบตามฉันไปที่ร้านริมทะเลด้วยล่ะ!"
10023-100230310 = "อาจจะต้องลุยน้ำก็ได้ งั้นเตรียม\nชุดว่ายน้ำมาด้วยล่ะ!"
10023-100230320 = "เดี๋ยวสิ ครูต้องไปด้วยเหรอ?"
10023-100230330 = "คุณครู เมื่อกี้ฉันถามพนักงานแล้ว\nเขาบอกว่าพวกนั้นหายไปครึ่งวันแล้ว..."
10023-100230340 = "ตอนนี้อยู่ที่ไหนเหรอ?"
10023-100230350 = "อยู่ที่ชายหาดน่ะ"
10023-100230360 = "ชายหาดเหรอ? ไปทำอะไรที่ชายหาดน่ะ?"
10023-100230370 = "ก็แค่นอนอยู่เฉยๆ"
10023-100230380 = "...ทำไมล่ะ?"
10023-100230390 = "เปล่าหรอก ไม่บอกก็พอจะรู้อยู่"
10023-100230400 = "จะไปจับกุมเดี๋ยวนี้ล่ะ"
10023-100230410 = "เดี๋ยวสิ คิดอะไรอยู่น่ะ?"
10023-100230420 = "คุณครู สถานการณ์ฉุกเฉินละ"
10023-100230430 = "หืม? มีเรื่องอะไรเหรอ?"
10023-100230440 = "ได้ยินว่ามีพวกกลุ่มนักเลงมาก่อความ\nวุ่นวายที่ร้านริมทะเลน่ะ"
10023-100230450 = "ฉันคิดว่าคราวก่อนจัดการพวกนั้นไป\nหมดแล้วนะ จู่ๆ ก็โผล่มาจากไหนกัน\nอีกเนี่ย..."
10023-100230460 = "ยังไงก็เถอะ ฉันอยากให้ครูมาช่วย\nสั่งการหน่อยน่ะ"
10023-100230470 = "ได้เลย ให้ไปที่ไหนล่ะ?"

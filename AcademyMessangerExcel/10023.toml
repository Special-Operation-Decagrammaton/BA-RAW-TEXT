[translation]
10023-100230010 = "선생님, 부탁 하나만 해도 될까?"
10023-100230020 = "물론이야."
10023-100230030 = "무슨 부탁인데?"
10023-100230040 = "다음번에 게헨나 학원을 방문할 때 자외선 차단제 하나만 사다 줘."
10023-100230050 = "전에 쓰던 것이 다 떨어져서 하계 합숙을 앞두고 새로 구입하려 했는데, 선도부 일이 너무 바빠서 말이야."
10023-100230060 = "도통 시내에 나갈 틈을 낼 수가 없네."
10023-100230070 = "알겠어."
10023-100230080 = "'씨사이드'의 선 오일이면 되지?"
10023-100230090 = "응, 그거면 괜찮아."
10023-100230100 = "그럼 부탁할게."
10023-100230110 = "……물건은 확실히 준비했겠지?"
10023-100230120 = "다시 한번 말하지만 다른 학생들에게는 절대로 말하면 안 돼!"
10023-100230130 = "……이오리?"
10023-100230140 = "이거 나한테 보낸 메시지야?"
10023-100230150 = "……선생님?"
10023-100230160 = "ㄴ야ㅣㅓㄴㅇ랴ㅣㄴ"
10023-100230170 = "아, 아무것도 아니야!"
10023-100230180 = "지금 보낸 메시지는 신경 쓰지 마."
10023-100230190 = "그렇게 말하니 더 신경 쓰이는데……."
10023-100230200 = "아까는 수영 연습 도와줘서 고마워. 선생님."
10023-100230210 = "덕분에 능숙하지는 않지만 어느 정도는 헤엄칠 수 있게 된 것 같아."
10023-100230220 = "이제 보조 튜브는 필요 없겠지……."
10023-100230230 = "저기, 이오리."
10023-100230240 = "……왜?"
10023-100230250 = "튜브에 그려진 귀여운 오리는 이오리의 취향이야?"
10023-100230260 = "시끄러워! 죽어!"
10023-100230270 = "선생님, 출동이야!"
10023-100230280 = "방금 들어온 신고에 따르면 바다의 집 앞에서 불량 학생들이 행패를 부리고 있나 봐."
10023-100230290 = "게헨나 선도부의 스페셜리스트로서 이런 만행을 두고 볼 수는 없지!"
10023-100230300 = "지금 바로 바다의 집으로 따라 나와줘."
10023-100230310 = "물에 들어가야 할지도 모르니 수영복 챙겨오는 것도 잊지 말고!"
10023-100230320 = "……잠깐, 나도 가야 하는 거야?"
10023-100230330 = "선생님, 아까 프런트에 물어보니 한나절 넘게 숙소에 돌아오지 않았다고 하던데……."
10023-100230340 = "지금 어디에 있어?"
10023-100230350 = "모래사장 위에 있어."
10023-100230360 = "모래사장? 거기서 뭘 하고 있는데?"
10023-100230370 = "그냥 누워있어."
10023-100230380 = "……어째서?"
10023-100230390 = "아니, 말하지 않아도 알겠어."
10023-100230400 = "지금 체포하러 갈게."
10023-100230410 = "잠깐, 무슨 생각을 한 거야?"
10023-100230420 = "선생님, 긴급 상황이야."
10023-100230430 = "응? 무슨 일이야?"
10023-100230440 = "해변가의 식당에서 불량배들이 난동을 부리고 있다고 해."
10023-100230450 = "분명 저번에 싹 쓸었을 텐데, 또 어디선가 나타나서……"
10023-100230460 = "아무튼, 선생님이 지휘해 줬으면 좋겠어."
10023-100230470 = "알겠어. 어디로 가면 될까?"

[translation]
10023-100230010 = "Sensei, could you do me a favor?"
10023-100230020 = "Of course."
10023-100230030 = "What kind of favor?"
10023-100230040 = "Could you bring me sunscreen next time you visit Gehenna Academy?"
10023-100230050 = "I ran out of sunscreen before summer camp, and Prefect Team work is keeping me busy."
10023-100230060 = "I don't have time to go out to buy more."
10023-100230070 = "Okay."
10023-100230080 = "Would sun oil from Seaside do the trick?"
10023-100230090 = "Yes, that's fine."
10023-100230100 = "I'll be waiting, then."
10023-100230110 = "You have what I asked for, right?"
10023-100230120 = "Again, you can't tell other students about it!"
10023-100230130 = "Iori?"
10023-100230140 = "Did you mean to send this to me?"
10023-100230150 = "Sensei?"
10023-100230160 = "afjhdaklfhdalk"
10023-100230170 = "Th-That's nothing!"
10023-100230180 = "Ignore the message I just sent you."
10023-100230190 = "Now I want to know even more..."
10023-100230200 = "Thank you for helping with swim practice, Sensei."
10023-100230210 = "I may not be a pro, but I know how to swim now."
10023-100230220 = "I don't think I need the floaties anymore."
10023-100230230 = "Hey, Iori."
10023-100230240 = "What?"
10023-100230250 = "Did you pick those floaties because of the cute duck on the sides?"
10023-100230260 = "Shut up! I'll kill you!"
10023-100230270 = "We have a situation, Sensei!"
10023-100230280 = "We just got a report that some delinquents are causing a scene in front of the Beach Shack!"
10023-100230290 = "I can't simply sit back and watch this atrocity unfold as a Gehenna prefect!"
10023-100230300 = "Meet me at the Beach Shack. Now."
10023-100230310 = "We may have to go into the water, so bring your swimsuit."
10023-100230320 = "Wait. Why would I have to go into the water?"
10023-100230330 = "Sensei, the front desk told me you haven't been back for hours..."
10023-100230340 = "Where are you?"
10023-100230350 = "I'm at the beach."
10023-100230360 = "The beach? What are you doing there?"
10023-100230370 = "Lying on it."
10023-100230380 = "...Why?"
10023-100230390 = "Actually, I think I know what's going on."
10023-100230400 = "I'll be there to arrest you shortly."
10023-100230410 = "Wait! What do you think I'm doing?"
10023-100230420 = "Sensei. It's an emergency."
10023-100230430 = "Hm? What's going on?"
10023-100230440 = "There are some gangsters causing a scene at the beach restaurant."
10023-100230450 = "I thought we wiped them all out last time, but they've popped back up again."
10023-100230460 = "Anyway, we could use your help."
10023-100230470 = "Okay. Where should we meet up?"

[translation]
13004-992 = "อืม... ทำไมวันนี้รู้สึกเหมือนจะมีเรื่องดีๆ\nเกิดขึ้นเลยน้า~"
13004-993 = "วันนี้คุณครูเป็นยังไงบ้างคะ?\nไม่ได้มีเรื่องอะไรใช่ไหมคะ?"
13004-994 = "ถ้างั้น... ขอให้วันนี้เป็นวันที่ดีของคุณครู\nนะคะ! ฉันจะคอยเป็นกำลังใจให้เองค่ะ!"
13004-995 = "ขอบใจนะโนโนมิจัง~ "
13004-996 = "ขอให้เป็นวันที่ดีของโนโนมิเหมือนกันนะ!"
13004-997 = "เอ๊ะ...?"
13004-998 = "ว้าว! "
13004-999 = "ไม่คิดว่าคุณครูจะตอบเลยค่ะ  มีความสุข\nจังเลย~☆ "
13004-1000 = "คุณครูตอบฉันด้วย!"
13004-1001 = "อื้อออ!  วันนี้ฉันมีความสุขแล้วล่ะค่ะ!"
13004-1002 = "ฉันแค่ส่งมาทักทายเท่านั้นเองค่ะ~☆\nแต่ถ้าคุณครูไม่ว่าอะไร ฉันจะส่งมาบ่อยๆ\nเลย~"
13004-1003 = "♡♡"
13004-1004 = "อืม... วันนี้ฉันว่าจะเลี้ยงคุณครูแท้ๆ..."
13004-1005 = "งั้นคราวหน้า ฉันจะตอบแทนคุณครูเองค่ะ!"
13004-1006 = "อื้อออ ฉันจะตอบแทนแน่นอนค่ะ"
13004-1007 = "วันนี้เป็นวันทำความสะอาดใหญ่\nห้องคณะกรรมการแผนงานค่ะ! "
13004-1008 = "ถ้าคุณครูมาก็จะเจอห้องที่สะอาดสะอ้าน\nกว่าคราวก่อนแน่นอนค่ะ☆"
13004-1009 = "อืม... เพราะงั้นคุณครูต้องแวะมาใหม่นะคะ\nเข้าใจไหม?"
13004-1010 = "อื้อ แล้วครูจะแวะไปนะ"
13004-1011 = "อย่าฝืนทำงานจนเหนื่อยมากไปล่ะ"
13004-1012 = "วันนี้ขอบคุณมากเลยนะคะ! "
13004-1013 = "ฉันยังไม่ได้ตอบแทนคุณครูเรื่องเมื่อคราว\nก่อนเลย... ทำยังไงดีคะ?"
13004-1014 = "รู้สึกเหมือนติดหนี้คุณครูอยู่เรื่อยๆ\nเลยค่ะ"
13004-1015 = "คุณครูคะ~☆"
13004-1016 = "วันหยุดนี้ถ้าคุณครูว่าง ช่วยไปที่ห้าง\nสรรพสินค้ากับฉันได้ไหมคะ?"
13004-1017 = "ไปซื้อของเหรอ... น่าสนุกดีนะ"
13004-1018 = "ก็ได้ ไปด้วยกันเถอะ!"
13004-1019 = "ว้าว~"
13004-1020 = "ไปเดตกับคุณครู!"
13004-1021 = "ไม่สิ... ช้อปปิ้งค่ะ ไปช้อปปิ้งกัน~\nช้อปปิ้ง~☆"
13004-1022 = "แล้วฉันจะรอนะคะ"
13004-1023 = "คุณครูกลับถึงบ้านรึยังคะ? รู้สึกเจ็บที่หู\nรึเปล่าคะ?"
13004-1024 = "วันนี้ฉันสนุกมากเลยล่ะค่ะ "
13004-1025 = "เพราะฉันเป็นคนเดียวที่ได้ช่วยคุณครู\nแคะหูนี่นา~"
13004-1026 = "ฮิฮิ ขอให้หลับฝันดีนะคะ~♡"
13004-1027 = "เกมโอเทลโล่ที่ซื้อมาคราวก่อนน่ะค่ะ...\nพอเอาไปเล่นกับทุกคนแล้ว ฉันไม่ชนะ\nเลยสักตาเดียวค่ะ"
13004-1028 = "ทุกคนเล่นเก่งกันมากๆ... โดยเฉพาะรุ่นพี่\nโฮชิโนะ เล่นเก่งสุดๆ เลยค่ะ!"
13004-1029 = "ไม่ได้การแล้วค่ะ ฉันคงจะต้องฝึกพิเศษ\nซะแล้ว!"
13004-1030 = "ฝึกพิเศษเหรอ...? สู้ๆ!"
13004-1031 = "พยายามเข้าล่ะ"
13004-1032 = "ค่ะ! ฉันจะพยายามค่ะคุณครู!"
13004-1033 = "กลับถึงบ้านรึยังคะ?"
13004-1034 = "วันนี้ฉันสนุกมากๆ เลยค่ะ "
13004-1035 = "คราวหน้าถ้าได้เล่นโอเทลโล่กับคุณครู\nสองคนก็คงดีนะคะ☆"
13004-1036 = "คุณครูอยากได้ดัมเบลเหรอคะ?"
13004-1037 = "พอดีมีของที่ซื้อมาให้เป็นของขวัญ\nชิโรโกะจังเหลืออยู่ค่ะ"
13004-1038 = "ถ้าคุณครูจะใช้ก็หยิบไปได้เลยนะคะ"
13004-130040010 = "124. จัดปาร์ตี้ฉลองวันก่อตั้งโรงเรียน\nในห้องชมรมคณะกรรมการฯ"
13004-130040020 = "125. จัดการแข่งขันกีฬาเล็กๆ ในสนาม\nกีฬา"
13004-130040030 = "โนโนมิ?"
13004-130040040 = "อ๊ะ"
13004-130040050 = "คุณครู?"
13004-130040060 = "ปาร์ตี้กับจัดการแข่งขันกีฬาที่ว่า\nคืออะไรเหรอ?"
13004-130040070 = "อ่า..."
13004-130040080 = "ฉันกำลังจดโน้ตเรื่อง 'แข่งขันกับตัวเอง'\nอยู่ แต่น่าจะกดส่งผิดไปให้คุณครูน่ะค่ะ"
13004-130040090 = "ขอโทษที่เบลอนะคะ"
13004-130040100 = "ไม่ต้องใส่ใจข้อความที่ส่งไปนะคะ!"
13004-130040110 = "ได้ยินแบบนั้นก็ค่อยโล่งใจหน่อย..."

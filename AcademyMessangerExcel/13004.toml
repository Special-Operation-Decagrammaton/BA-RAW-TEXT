[translation]
13004-992 = "今天總覺得會有好事發生"
13004-993 = "老師現在怎麼樣？有度過快樂的時光嗎？"
13004-994 = "希望今天是美好的一天。我會聲援老師的！"
13004-995 = "謝謝妳，野乃美"
13004-996 = "希望野乃美也有好事發生"
13004-997 = "啊……"
13004-998 = "嗚哇……！"
13004-999 = "沒想到能收到回覆，真開心～☆"
13004-1000 = "竟然能收到老師的回覆！"
13004-1001 = "我這樣今天一天就已經足夠幸福了！"
13004-1002 = "這次是特別的初次問候，以後會不定時發訊息的☆"
13004-1003 = "♡♡"
13004-1004 = "因為是我邀請的，所以本來想請老師吃的……"
13004-1005 = "下次去其他地方的時候，要讓我請客哦？"
13004-1006 = "絕對要唷？"
13004-1007 = "今天想對對策委員會的教室進行大掃除！"
13004-1008 = "老師來的時候，應該會比以前漂亮許多☆"
13004-1009 = "結束之後，一定要來看看哦？"
13004-1010 = "嗯，工作結束後就去"
13004-1011 = "辛苦了，很期待唷"
13004-1012 = "今天辛苦了！"
13004-1013 = "上次的事還沒報答呢，怎麼辦呢……？"
13004-1014 = "一直都是老師在為我做各種的事呢"
13004-1015 = "老師～☆"
13004-1016 = "這個休息日，如果有時間的話，要一起去購物嗎？"
13004-1017 = "購物啊，聽起來很有趣"
13004-1018 = "肯定要，一起去吧！"
13004-1019 = "哇！非常感謝～！"
13004-1020 = "和老師兩個人的約會！"
13004-1021 = "啊，不，是購物，購物才對，跟老師一起購物～☆"
13004-1022 = "那麼，我在購物中心等著唷～☆"
13004-1023 = "平安到家了嗎？耳朵痛不痛？"
13004-1024 = "我今天過得非常開心"
13004-1025 = "而且，應該不是每個人都知道老師耳朵裡的樣子吧……☆"
13004-1026 = "那麼，明天也要度過幸福的一天唷～♡"
13004-1027 = "前陣子和大家一起玩了黑白棋……我一次都沒贏過"
13004-1028 = "大家都很厲害…尤其是星野前輩，太厲害了！"
13004-1029 = "這樣下去不行，必須進行特訓！"
13004-1030 = "特訓！好熱血！FIGHT！！"
13004-1031 = "這樣啊，加油唷。我支持你"
13004-1032 = "是！我會加油的！"
13004-1033 = "已經到家了嗎，老師？"
13004-1034 = "今天非常感謝。我非常開心"
13004-1035 = "下次還想和老師一起玩各式各樣的遊戲☆"
13004-1036 = "老師，你想要啞鈴嗎？"
13004-1037 = "我買了幾個打算送給白子醬當禮物，結果還剩下一些"
13004-1038 = "我把它們放在阿拜多斯的操場，可以的話請收下吧"
13004-130040010 = "124.在委員會部室舉辦建校紀念日派對"
13004-130040020 = "125.在運動場舉辦迷你運動會"
13004-130040030 = "野乃美？"
13004-130040040 = "啊"
13004-130040050 = "老師？"
13004-130040060 = "派對和迷你運動會是什麼？"
13004-130040070 = "那個"
13004-130040080 = "我在「單人群組」傳備忘錄，結果不小心傳給老師了"
13004-130040090 = "真不好意思"
13004-130040100 = "請別在意內容！"
13004-130040110 = "那倒是沒問題，不過……"

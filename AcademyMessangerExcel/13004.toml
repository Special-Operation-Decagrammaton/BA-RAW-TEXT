[translation]
13004-992 = "응, 어쩐지 즐거운 일이 생길 것 같은 하루예요."
13004-993 = "오늘은 어떠셨어요? 좋은 시간 보내고 계시는가요?"
13004-994 = "그럼 행복한 하루 되세요, 선생님! 제가 응원할게요!"
13004-995 = "고마워, 노노미 쨩."
13004-996 = "노노미도 좋은 하루!"
13004-997 = "어라……?"
13004-998 = "우와!"
13004-999 = "답장해주실 줄은 몰랐어요. 기뻐요~☆"
13004-1000 = "선생님한테 답장받았어요!"
13004-1001 = "응응! 저도 행복한 하루가 되었네요!"
13004-1002 = "아. 이건 그냥 안부 인사였으니까~☆ 괜찮으면 종종 보낼게요."
13004-1003 = "♡♡"
13004-1004 = "응…… 오늘은 정말로 제가 사드리고 싶었는데……"
13004-1005 = "다음엔 제가 보답하게 해주세요!"
13004-1006 = "응응, 꼭이요."
13004-1007 = "오늘은 대책위원회 동아리실 대청소를 하는 날이에요!"
13004-1008 = "선생님이 오셨을 때, 전보다 더 깔끔한 동아리 실이 기다리고 있을 거예요☆"
13004-1009 = "응응. 그러니까, 또 놀러 오셔야 해요?"
13004-1010 = "응. 시간 내서 갈게."
13004-1011 = "너무 무리하지 마."
13004-1012 = "오늘은 정말 수고하셨습니다!"
13004-1013 = "아직 지난번의 보답도 못했는데…… 어쩌죠?"
13004-1014 = "선생님께 받은 게 점점 더 많아지고 있어요."
13004-1015 = "선생님~☆"
13004-1016 = "이번 휴일에, 괜찮으시면 쇼핑하러 가는데 같이 가주시겠어요?"
13004-1017 = "쇼핑인가. 재미있겠네."
13004-1018 = "좋아. 같이 가자!"
13004-1019 = "와아~"
13004-1020 = "선생님과 같이 데이트!"
13004-1021 = "아니, 쇼핑, 쇼핑이에요. 쇼핑~☆"
13004-1022 = "기다리고 있겠습니다."
13004-1023 = "잘 들어가셨어요? 귀는 아프거나 그러지 않아요?"
13004-1024 = "저는 오늘 무척 즐거운 하루였어요."
13004-1025 = "응, 선생님의 귓속을 본 건 저밖에 없을 테니까?"
13004-1026 = "아하하, 그럼 오늘도 행복한 시간 되길~♡"
13004-1027 = "응……. 지난번에 사간 오셀로 게임, 다 같이 했는데 저만 한 번도 못 이겼어요."
13004-1028 = "다들 너무 잘해서…… 특히 호시노 선배! 엄청 강해요!"
13004-1029 = "안 되겠어요, 특훈을 해야겠어요!"
13004-1030 = "특훈……? 파이팅!"
13004-1031 = "힘내."
13004-1032 = "네! 힘낼게요! 선생님!"
13004-1033 = "잘 들어가셨나요, 선생님?"
13004-1034 = "저는 오늘 무척 즐거웠어요."
13004-1035 = "다음에도 같이 둘이서 오셀로를 할 수 있었으면 좋겠어요☆"
13004-1036 = "선생님, 아령 필요하세요?"
13004-1037 = "시로코 쨩에게 선물하려고 샀던 것 중에 몇 개가 남아서."
13004-1038 = "괜찮으시다면 나중에 가져가셔도 돼요."
13004-130040010 = "124. 위원회실에서 개교기념일 파티하기"
13004-130040020 = "125. 운동장에서 미니 운동회 개최하기"
13004-130040030 = "노노미?"
13004-130040040 = "앗"
13004-130040050 = "선생님?"
13004-130040060 = "파티랑 미니 운동회는 뭐야?"
13004-130040070 = "그게"
13004-130040080 = "저어, '나와의 대화'에 메모하다가 그만 선생님께 잘못 보낸 것 같아요."
13004-130040090 = "착각해서 죄송해요."
13004-130040100 = "내용은 신경 쓰지 말아주세요!"
13004-130040110 = "그렇다면 다행이지만……."

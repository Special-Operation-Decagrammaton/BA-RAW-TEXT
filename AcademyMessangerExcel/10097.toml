[translation]
10097-100970010 = "선생님~"
10097-100970020 = "혹시 지금 바빠?"
10097-100970030 = "특별한 일정은 없는데…"
10097-100970040 = "왜? 무슨 일 있어?"
10097-100970050 = "이런 시간에 연락을 한다면 이유야 뻔하지…"
10097-100970060 = "심심하니까!"
10097-100970070 = "다른 RABBIT 소대원들은 어디 갔어?"
10097-100970080 = "아, 그게 말이지"
10097-100970090 = "역시 그냥 말해주면 재미가 없으니까"
10097-100970100 = "무슨 일인지 궁금하면 보내 준 주소로 찾아와."
10097-100970110 = "기다리고 있을 테니까."
10097-100970120 = "선생님"
10097-100970130 = "여기 엄청난 게 있어!"
10097-100970140 = "갑자기 무슨 일이야, 모에?"
10097-100970150 = "설마 저번처럼 심심한 것뿐이라면……"
10097-100970160 = "폭발이"
10097-100970170 = "폭발이 멈추지 않아"
10097-100970180 = "쉴 새 없이 마구 폭발하고 있어!"
10097-100970190 = "뭐?!"
10097-100970200 = "뭐가 폭발하는 건데?!"
10097-100970210 = "아니, 조금만 기다려! 금방 도와주러 갈 테니까!"
10097-100970220 = "과일과 고기는 썩기 직전이 가장 맛있다고 하던데"
10097-100970230 = "생선도 마찬가지인 걸까?"
10097-100970240 = "갑자기 왜 그런 생각을……?"
10097-100970250 = "다른 게 아니라, 이 마을에서 쿠사야를 몇 번 먹어볼 기회가 있었는데"
10097-100970260 = "냄새는 썩은 것처럼 지독한데 감칠맛은 평범한 생선보다 더 진하더라고"
10097-100970270 = "그래서 다른 생선도 썩히면 괜찮아질까 싶어서"
10097-100970280 = "발효균 중에는 단백질을 분해하는 종이 많으니까—"
10097-100970290 = "엄밀히 말하자면 썩히는 것과는 다르지 않을까?"
10097-100970300 = "……그런가?"
10097-100970310 = "뭐"
10097-100970320 = "내 관심사는 감칠맛이 아니라 지독한 냄새에 있으니 아무래도 상관없지만."
10097-100970330 = "괜찮다는 게 그쪽이었어?!"
10097-100970340 = "곤란하네……"
10097-100970350 = "무슨 문제라도 있어?"
10097-100970360 = "그게 어제부터 휴대용 발전기의 상태가 좋지 않아서 살펴봤는데"
10097-100970370 = "필터 주변에 소금 결정이 잔뜩 맺혀 있더라고"
10097-100970380 = "아무래도 바닷바람을 너무 맞아서 안쪽에 녹이 슬었나 봐"
10097-100970390 = "그거 큰일이네"
10097-100970400 = "그러게 말이야. 지금 와서 부식 방지 처리를 할 수도 없고"
10097-100970410 = "지금 당장 바닷바람이 들지 않는 장소로 야영지를 옮길 수도 없고"
10097-100970420 = "이 근처에 소대원 모두가 묵을 수 있는 저렴한 숙소가 없으려나?"
10097-100970430 = "이런 벽지에 그렇게 형편 좋은 숙소가 있을 것 같지는 않지만……"
10097-100970440 = "으음……"
10097-100970450 = "그런 문제라면 내가 도와줄 수 있을 것 같은데"
10097-100970460 = "응? 어떻게?"

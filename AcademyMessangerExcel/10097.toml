[translation]
10097-100970010 = "老師～"
10097-100970020 = "現在很忙嗎？"
10097-100970030 = "目前是沒什麼事要做啦……"
10097-100970040 = "怎麼了？有什麼事嗎？"
10097-100970050 = "之所以在這種時候聯絡……"
10097-100970060 = "當然是因為無聊囉！"
10097-100970070 = "其他RABBIT小隊的成員呢？"
10097-100970080 = "啊，你說他們啊"
10097-100970090 = "直接告訴你就不好玩了"
10097-100970100 = "如果好奇他們在做什麼的話，就到這個地點來吧"
10097-100970110 = "我會在這裡等你"
10097-100970120 = "老師"
10097-100970130 = "我這邊有個很厲害的東西喔！"
10097-100970140 = "怎麼有點沒頭沒尾的呢，萌？"
10097-100970150 = "如果跟上次一樣只是覺得無聊的話……"
10097-100970160 = "爆炸"
10097-100970170 = "爆炸聲"
10097-100970180 = "爆炸聲正在不停地傳來！"
10097-100970190 = "什麼！？"
10097-100970200 = "是什麼爆炸了！？"
10097-100970210 = "你等著！我立刻過去幫你！"
10097-100970220 = "聽說水果和肉類，在快要腐爛的時候是最好吃的"
10097-100970230 = "魚類會不會也一樣呢？"
10097-100970240 = "為什麼突然思考這種問題……？"
10097-100970250 = "其實也沒什麼，只是因為在這個村子裡吃到過幾次臭魚乾"
10097-100970260 = "雖然那東西聞起來像腐爛了一樣，味道卻比一般的魚還好吃"
10097-100970270 = "所以我才在想，其他的魚是不是也可以放到壞掉再吃"
10097-100970280 = "畢竟是利用了某些能分解蛋白質的酵母菌──"
10097-100970290 = "所以嚴格來說，那其實跟單純的腐壞不太一樣吧？"
10097-100970300 = "……是嗎？"
10097-100970310 = "嗯……"
10097-100970320 = "反正我有興趣的是那種濃烈的臭味，而不是食物本身，所以應該差不多吧？"
10097-100970330 = "你有興趣的竟然是臭味！？"
10097-100970340 = "真傷腦筋……"
10097-100970350 = "怎麼了嗎？"
10097-100970360 = "因為我的攜帶式發電機從昨天開始就怪怪的，所以就檢查了一下"
10097-100970370 = "沒想到發電機的過濾器周圍竟然結滿了鹽巴結晶"
10097-100970380 = "我猜可能是海風吹太久的關係，導致發電機內部生鏽了"
10097-100970390 = "那還真糟糕"
10097-100970400 = "就是說啊。現在既沒辦法幫發電機做防鏽處理"
10097-100970410 = "也不可能馬上把營地遷到沒有海風的地方"
10097-100970420 = "這附近會有便宜的旅社，能讓我們小隊暫時住一陣子嗎？"
10097-100970430 = "雖然我覺得這麼偏僻的地方，應該不太可能會有好的旅社就是了……"
10097-100970440 = "唔嗯……"
10097-100970450 = "如果是這樣的話，說不定我能幫上忙"
10097-100970460 = "咦？真的嗎？"

[translation]
10097-100970010 = "คุณครู~"
10097-100970020 = "ตอนนี้ยุ่งหรือเปล่า?"
10097-100970030 = "ก็ไม่ได้มีงานอะไรพิเศษนะ..."
10097-100970040 = "ทำไมเหรอ? มีเรื่องอะไรหรือเปล่า?"
10097-100970050 = "ฉันติดต่อครูมาเวลานี้ มันก็ต้องมีเรื่อง\nแหงอยู่แล้ว..."
10097-100970060 = "ฉันเบื่อน่ะ!"
10097-100970070 = "สมาชิกกองทหาร RABBIT คนอื่นๆ\nไปไหนกันเหรอ?"
10097-100970080 = "อ่า เรื่องนั้นน่ะ"
10097-100970090 = "ถ้าเล่าให้ฟังก็หมดสนุกน่ะสิ"
10097-100970100 = "ถ้าอยากรู้ก็มาตามพิกัดที่ฉันส่งไปนะ"
10097-100970110 = "แล้วฉันจะรอนะ"
10097-100970120 = "คุณครู"
10097-100970130 = "ตรงนี้มีอะไรที่สุดยอดเลยละ!"
10097-100970140 = "จู่ๆ มีเรื่องอะไรเหรอ โมเอะ?"
10097-100970150 = "หรือว่าแค่เบื่อเหมือนครั้งก่อนอีก..."
10097-100970160 = "ระเบิด"
10097-100970170 = "มันระเบิดไม่หยุดเลย"
10097-100970180 = "ระเบิดตู้มแบบไม่พักเลยละ!"
10097-100970190 = "ว่าไงนะ?! "
10097-100970200 = "อะไรระเบิดน่ะ?! "
10097-100970210 = "รอครูแป๊บหนึ่งนะ! ครูจะไปช่วย\nเดี๋ยวนี้ละ!"
10097-100970220 = "เห็นว่าผลไม้กับเนื้อสัตว์จะอร่อยที่สุด\nตอนก่อนจะเสียนะ"
10097-100970230 = "งั้นปลาก็น่าจะเหมือนกันมั้ย?"
10097-100970240 = "ทำไมจู่ๆ ถึงคิดเรื่องนั้นล่ะ...?"
10097-100970250 = "พอดีว่าฉันได้ลองกินคูซายะที่เป็นปลา\nหมักของหมู่บ้านนี้มา 2-3 ครั้งน่ะ"
10097-100970260 = "กลิ่นมันฉุนเหมือนเสียแล้วยังไงไม่รู้\nแต่มันให้รสกลมกล่อมมากกว่าปลา\nทั่วๆ ไปอีกนะ"
10097-100970270 = "ฉันก็เลยคิดว่าปลาชนิดอื่นๆ ก็น่าจะ\nอร่อยถ้ามันเน่าเสียน่ะ"
10097-100970280 = "เชื้อหมักมีหลายตัวที่ย่อยสลาย\nโปรตีนได้..."
10097-100970290 = "ในทางเทคนิคแล้ว มันก็ไม่น่าจะ\nต่างกับการเน่าเสียมั้ย?"
10097-100970300 = "งั้นเหรอ...?"
10097-100970310 = "แต่ก็นะ"
10097-100970320 = "สิ่งที่ฉันสนใจไม่ใช่รสชาติ แต่เป็นกลิ่น\nแรงๆ นั่นมากกว่า งั้นก็ไม่มีปัญหาหรอก"
10097-100970330 = "เป็นงั้นไป?! "
10097-100970340 = "ยุ่งแล้วละ..."
10097-100970350 = "มีปัญหาอะไรเหรอ?"
10097-100970360 = "พอดีเครื่องกำเนิดไฟฟ้าแบบพกพา\nมันมีปัญหาตั้งแต่เมื่อวาน ฉันก็เลยลอง\nเช็กดูน่ะ"
10097-100970370 = "ปรากฏว่ามีผลึกเกลืออยู่รอบๆ ฟิลเตอร์\nเยอะแยะเลย"
10097-100970380 = "มันคงโดนลมทะเลมากจนขึ้นสนิม\nข้างในน่ะ"
10097-100970390 = "เป็นเรื่องใหญ่เลยนะ"
10097-100970400 = "ก็นั่นน่ะสิ จะมากันสนิมเอาป่านนี้ก็\nไม่ทันแล้ว"
10097-100970410 = "แล้วจะย้ายแคมป์ไปอยู่ในที่ที่ไม่โดน\nลมทะเลตอนนี้เลยก็ไม่ได้ด้วย"
10097-100970420 = "แถวนี้พอจะมีที่พักถูกๆ ที่สมาชิก\nกองทหารทุกคนจะไปพักได้อยู่บ้างมั้ยนะ?"
10097-100970430 = "ที่ทุรกันดารแบบนี้ก็ไม่น่าจะมีที่พักดีๆ\nด้วย..."
10097-100970440 = "อืม... ครูก็พอช่วยได้นะ"
10097-100970450 = "ถ้าเป็นเรื่องนั้นครูน่าจะช่วยได้อยู่นะ"
10097-100970460 = "หืม? ยังไงเหรอ?"

[translation]
23008-230080010 = "오늘도 평화와 안녕이 그대와 함께하기를."
23008-230080020 = "고뇌하는 일이 있으시다면, 더 늦기 전에 시스터를 찾아와주세요."
23008-230080030 = "찾아오기 힘드신 분은 말씀해 주시면 찾아가겠습니다."
23008-230080040 = "……"
23008-230080050 = "아"
23008-230080060 = "죄송해요. 잘못 보내고 말았네요."
23008-230080070 = "내가 찾아가도 괜찮아?"
23008-230080080 = "학생이 아니라도 상관없는 거야?"
23008-230080090 = "아"
23008-230080100 = "그럼요. 물론이지요."
23008-230080110 = "기쁜 마음으로 기다리고 있겠습니다."
23008-230080120 = "괜찮으신가요, 선생님?"
23008-230080130 = "갑자기 장식물이 떨어져서 놀랐습니다……."
23008-230080140 = "혹시라도 몸에 이상이 남으셨다면 말씀해 주세요. 같이 병원이라도……."
23008-230080150 = "괜찮아. 평범한 천벌이었어."
23008-230080160 = "이 정도로 포기할 거라 생각 마라."
23008-230080170 = "……"
23008-230080180 = "?"
23008-230080190 = "네……?"
23008-230080200 = "선생님, 오늘 하루는 평안하셨나요?"
23008-230080210 = "실은 일전에 있었던 일이 아직 마음에 남아서요……."
23008-230080220 = "마리가 마음에 둘 일은 아니잖아."
23008-230080230 = "이전 일이……? 장식물 떨어진 거?"
23008-230080240 = "아뇨."
23008-230080250 = "시스터가 될 사람으로서, 그냥 넘어갈 수는 없지요."
23008-230080260 = "선생님의 안위도 앞으로는 제가 함께 기원토록 하겠습니다."
23008-230080270 = "……으음."
23008-230080280 = "그러고 보니 마침 오늘은 성당에도 다른 일정들이 없는 날이네요."
23008-230080290 = "혹시 선생님께서만 괜찮으시다면……"
23008-230080300 = "잘 들어가셨나요, 선생님?"
23008-230080310 = "오늘은 선생님께서 와 주신 덕분에, 저도 마음이 많이 편해졌답니다."
23008-230080320 = "역시, 선생님을 위한다고는 했지만 사실 저를 위한 기도였을지도 모르겠네요."
23008-230080330 = "……사실 정말 그런 마음이었다면, 불순한 동기가 될 테니 걱정이지만 말이에요."
23008-230080340 = "불순한 동기는 아니라고 생각해."
23008-230080350 = "고마워. 덕분에 편해졌어."
23008-230080360 = "정말이신가요?"
23008-230080370 = "다행입니다. 정말로 기쁘네요."
23008-230080380 = "그럼"
23008-230080390 = "다음에 또 뵙겠습니다, 선생님."
23008-230080400 = "오늘도 평화와 안녕이 그대와 함께하기를."
23008-230080410 = "고뇌하는 일이 있으시다면, 그 고뇌가 하루빨리 해결되길 기도하겠습니다."
23008-230080420 = "오늘은 성당에서 직접 찾아뵙지 못하는 점, 너그러이 이해해 주시기 바랍니다."
23008-230080430 = "마리, 오늘은 성당에 없는 거야?"
23008-230080440 = "오늘따라 더 바쁜가 보네."
23008-230080450 = "아니에요, 선생님. 별일은 없어요."
23008-230080460 = "그저 몸 상태가 그렇게 좋지 못할 뿐……."
23008-230080470 = "몸 상태가 나쁘다고!?"
23008-230080480 = "어디 아파? 몸살이라도……?"
23008-230080490 = "아, 죄송합니다"
23008-230080500 = "괜한 말씀을 드린 것 같네요. 정말 별일 아니랍니다."
23008-230080510 = "조금 나른한 것뿐이니, 쉬고 나면 좋아질 거예요."
23008-230080520 = "깜빡하고 잠들어서 말씀드리지 못했네요."
23008-230080530 = "오늘 와 주셔서 정말로 감사합니다. 선생님."
23008-230080540 = "제게 보답이라고 해드릴 만한 건 없지만,"
23008-230080550 = "대신 늘 선생님을 위해 기도할게요."
23008-230080560 = "지금까지처럼."
23008-230080570 = "안녕하세요, 선생님."
23008-230080580 = "혹시……. 시간 괜찮으신가요? 방해가 되지는 않았을까요?"
23008-230080590 = "그럴 리가. 무슨 일이야?"
23008-230080600 = "방해라니 당치도 않지."
23008-230080610 = "정말 다행이네요."
23008-230080620 = "그"
23008-230080630 = "음 죄송해요. 이런 데에 익숙하지 않아서……."
23008-230080640 = "혹시 선생님께서 괜찮으시다면, 만날 수 있는 날을 잡아도 될까 해서 여쭤봤던 거예요."
23008-230080650 = "아, 나쁜 일이나 고민 같은 건 아니에요. 혹시라도 걱정하실까 봐……."
23008-230080660 = "괜찮으시다니 다행이에요. 그리고 감사해요."
23008-230080670 = "그럼 그때 뵙겠습니다, 선생님."
23008-230080680 = "선생님. 오늘 일은 정말로 감사했습니다."
23008-230080690 = "어떻게 생각하실지 모르겠지만, 저는 정말로 기뻤답니다."
23008-230080700 = "앞으로도 종종 이런 느낌으로 연락드리게 될지도……"
23008-230080710 = "아무쪼록 그 때도 잘 부탁드리겠습니다. 그럼, 오늘은 이만 줄일게요."
23008-230080720 = "선생님"
23008-230080730 = "……그냥 한번 불러봤어요."
23008-230080740 = "선생님, 안녕하세요."
23008-230080750 = "혹시 시간이 괜찮으시다면……"
23008-230080760 = "당연히 괜찮아."
23008-230080770 = "어디로 갈까?"
23008-230080780 = "그, 그렇게나 빠른 반응을……"
23008-230080790 = "다름이 아니라 이번에 시스터후드의 비품을 구매해야 하는데요."
23008-230080800 = "저 혼자서는 손이 모자랄 것 같아서"
23008-230080810 = "면목 없지만 선생님께 도움을……"
23008-230080820 = "그거야 내 전문이지."
23008-230080830 = "어디로 갈까?"
23008-230080840 = "항상 감사합니다, 선생님……"
23008-230080850 = "선생님, 오늘은 정말 여러모로 감사했습니다."
23008-230080860 = "데려다주신 것도, 식사도……"
23008-230080870 = "액세서리 선물을 못 해서 조금 아쉬운데."
23008-230080880 = "후후, 저는 하나도 아쉽지 않아요."
23008-230080890 = "오늘 선생님께서 괜찮다고 말해주신 덕분에"
23008-230080900 = "이 코사지에 담긴 마음이 더 소중해졌거든요."
23008-230080910 = "그거면…… 충분해요."

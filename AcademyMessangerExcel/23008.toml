[translation]
23008-230080010 = "願和平與寧靜今天也與各位同在"
23008-230080020 = "有什麼煩惱的話，請隨時拜訪我們"
23008-230080030 = "來不了的人，我們會登門拜訪。請隨時與我們聯繫"
23008-230080040 = "啊"
23008-230080050 = "抱，抱歉……"
23008-230080060 = "錯發給老師了"
23008-230080070 = "這個，我也可以去嗎？"
23008-230080080 = "這個，不是學生也可以去嗎？"
23008-230080090 = "啊，是的"
23008-230080100 = "當然"
23008-230080110 = "那樣的話，我期待您的到來唷！"
23008-230080120 = "老師，在那之後有怎麼樣嗎？"
23008-230080130 = "裝飾品突然掉了下來……嚇了一跳呢"
23008-230080140 = "如果哪裡痛的話，請隨時告訴我唷。還是說，我們現在一起去醫院……"
23008-230080150 = "沒關係，抱歉讓你擔心了。果然還是得仔細檢查一下吧"
23008-230080160 = "但就算這樣，也不能放棄……"
23008-230080170 = "……"
23008-230080180 = "？"
23008-230080190 = "那個……？"
23008-230080200 = "老師，您過得如何呢？"
23008-230080210 = "前幾天的傷，已經痊癒了嗎……？"
23008-230080220 = "謝謝。不用那麼在意沒關係"
23008-230080230 = "嗯，完全沒事唷。別放在心上"
23008-230080240 = "不，不是那樣的"
23008-230080250 = "我即將成為一名修女，怎麼能對這種事視而不見呢"
23008-230080260 = "為了今後不再發生這樣的事情，必須祈禱……"
23008-230080270 = "這麼說來"
23008-230080280 = "正好今天，大教堂沒辦什麼活動"
23008-230080290 = "如果老師願意的話……"
23008-230080300 = "平安回去了嗎，老師？"
23008-230080310 = "今天多虧老師光臨，我的心也平靜下來了"
23008-230080320 = "雖說是為了老師，但似乎也是為了我自己"
23008-230080330 = "……總覺得有點擔心呢。這麼一想，關心老師就好像是出於不單純的動機"
23008-230080340 = "應該沒關係吧……？"
23008-230080350 = "但是託你的福，我今天也平靜下來了。謝謝"
23008-230080360 = "呵呵，那樣的話就太好了"
23008-230080370 = "很高興您能這麼說"
23008-230080380 = "那麼，老師"
23008-230080390 = "下次再見囉"
23008-230080400 = "願和平與寧靜今天也與各位同在"
23008-230080410 = "有什麼煩惱的話，請隨時拜訪我們"
23008-230080420 = "只是，今天我不在教堂……"
23008-230080430 = "瑪麗，你今天要去哪裡嗎？"
23008-230080440 = "看起來很忙呢，辛苦了"
23008-230080450 = "啊，不，不是什麼特別的事……"
23008-230080460 = "只是身體有點不舒服……"
23008-230080470 = "沒事吧！？"
23008-230080480 = "感冒了！？"
23008-230080490 = "抱，抱歉"
23008-230080500 = "反而讓您擔心了呢……"
23008-230080510 = "不怎麼嚴重，希望休息之後就會好起來"
23008-230080520 = "對不起，不知不覺睡著了……"
23008-230080530 = "雖然沒能口頭傳達，但真的非常感謝"
23008-230080540 = "我不知道是否能報答……"
23008-230080550 = "但是，和往常一樣"
23008-230080560 = "會再為老師祈禱的"
23008-230080570 = "早安，老師"
23008-230080580 = "那個，現在有時間嗎……？"
23008-230080590 = "嗯，怎麼了？"
23008-230080600 = "完全沒問題唷"
23008-230080610 = "非常感謝"
23008-230080620 = "那個，這個……"
23008-230080630 = "不好意思，該怎麼說才好……這種事，我不是很習慣……"
23008-230080640 = "如果方便的話，可以找個地方見面說嗎？"
23008-230080650 = "啊，那個，並不是發生了什麼事，也不是有負面的煩惱之類的。以防萬一先跟您說明一下……"
23008-230080660 = "那麼，時間晚點會發給您"
23008-230080670 = "萬事拜託了"
23008-230080680 = "老師，今天非常感謝"
23008-230080690 = "真的很高興"
23008-230080700 = "今後也可能會時常聯絡您……"
23008-230080710 = "還請您多多關照。那麼，下次見"
23008-230080720 = "老師"
23008-230080730 = "……只是，想這麼叫您一聲"
23008-230080740 = "您好，老師"
23008-230080750 = "如果時間方便的話……"
23008-230080760 = "當然方便"
23008-230080770 = "該在哪裡碰面？"
23008-230080780 = "您，您居然回應得這麼快……"
23008-230080790 = "事情是這樣的，這次需要採買一些修女會的備品"
23008-230080800 = "只有我一個人的話，可能會忙不過來"
23008-230080810 = "雖然非常不好意思，希望能請老師幫忙……"
23008-230080820 = "這可是我的專長"
23008-230080830 = "那我該去哪裡呢？"
23008-230080840 = "真是非常感謝您，老師……"
23008-230080850 = "老師，今天在各方面都非常感謝"
23008-230080860 = "不僅送我回來，還招待我餐點……"
23008-230080870 = "雖然沒能送飾品給你有點可惜"
23008-230080880 = "呵呵，我完全不覺得可惜哦"
23008-230080890 = "多虧老師今天跟我說的那番話"
23008-230080900 = "這朵花蘊含的心意變得更加珍貴了"
23008-230080910 = "這樣……已經足夠了"

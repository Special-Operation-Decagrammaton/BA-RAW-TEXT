[translation]
23008-230080010 = "May peace and happiness be with you today."
23008-230080020 = "If you're struggling with something, please come see a Sister before it's too late."
23008-230080030 = "If it's difficult to come to us, please let us know and we will come to you."
23008-230080040 = "..."
23008-230080050 = "Oh"
23008-230080060 = "I'm sorry. I sent you the wrong message."
23008-230080070 = "Is it okay if I come see you?"
23008-230080080 = "Does it matter if I'm not a student?"
23008-230080090 = "Oh"
23008-230080100 = "Yes, of course."
23008-230080110 = "I'll be waiting for you joyfully."
23008-230080120 = "Are you okay, Sensei?"
23008-230080130 = "I was surprised when the decoration suddenly fell..."
23008-230080140 = "Let me know if you're hurt anywhere. I'll go to the hospital with you..."
23008-230080150 = "I'm okay. It was divine retribution."
23008-230080160 = "Don't think that I'll give up like this."
23008-230080170 = "..."
23008-230080180 = "...?"
23008-230080190 = "Excuse me...?"
23008-230080200 = "Did you have a good day today, Sensei?"
23008-230080210 = "I've been feeling uneasy about what happened last time..."
23008-230080220 = "It's not something you need to feel uneasy about."
23008-230080230 = "What happened last time...? When the decoration fell?"
23008-230080240 = "No."
23008-230080250 = "As someone who will become a Sister, I can't just let it go."
23008-230080260 = "I will pray for your safety from now on, Sensei."
23008-230080270 = "Oh, dear..."
23008-230080280 = "Come to think of it, there isn't anything scheduled for today at the cathedral."
23008-230080290 = "So, if it's all right with you..."
23008-230080300 = "Did you get home safely, Sensei?"
23008-230080310 = "I feel much more at ease since you came by today."
23008-230080320 = "Actually, I said I was praying for you, but it might have been more of a prayer for me."
23008-230080330 = "If that's the case, I hope you didn't take my motive to be disrespectful."
23008-230080340 = "I don't think it is."
23008-230080350 = "Thank you. I feel better because of you."
23008-230080360 = "Really?"
23008-230080370 = "Great, that makes me really happy."
23008-230080380 = "Well, then..."
23008-230080390 = "See you next time, Sensei."
23008-230080400 = "May peace and happiness be with you today."
23008-230080410 = "If you have any troubles, I pray that they are resolved as soon as possible."
23008-230080420 = "I am unable to meet with you at the cathedral today. I ask for your kind understanding."
23008-230080430 = "Are you not at the cathedral today, Mari?"
23008-230080440 = "I guess you're busy today."
23008-230080450 = "No, Sensei, that's not it. It's nothing serious."
23008-230080460 = "I'm just not feeling too well..."
23008-230080470 = "You aren't feeling well?!"
23008-230080480 = "Are you sick? Do you have a cold?"
23008-230080490 = "Oh, I'm sorry."
23008-230080500 = "I probably shouldn't have told you. It's really nothing."
23008-230080510 = "I'm just a little drowsy, but I'll get better after some rest."
23008-230080520 = "I fell asleep and forgot to tell you."
23008-230080530 = "Thank you so much for coming today, Sensei."
23008-230080540 = "There isn't much I can give in return,"
23008-230080550 = "so instead, I will always pray for you."
23008-230080560 = "Just like I've been doing until now."
23008-230080570 = "Hello, Sensei."
23008-230080580 = "Are you...free right now? Am I bothering you?"
23008-230080590 = "Not at all. What's going on?"
23008-230080600 = "Of course you're not bothering me."
23008-230080610 = "That's good to hear."
23008-230080620 = "Um..."
23008-230080630 = "I'm sorry, I'm not used to this kind of thing..."
23008-230080640 = "If it's okay with you, I was wondering if we could schedule a day to meet up."
23008-230080650 = "Oh, it's not something bad or anything, in case you start worrying..."
23008-230080660 = "I'm glad you're okay with it. And thank you."
23008-230080670 = "I'll see you then, Sensei."
23008-230080680 = "Sensei. Thank you so much for today."
23008-230080690 = "I don't know about you, but I'm really happy."
23008-230080700 = "Maybe I'll be asking for your help more often from now on."
23008-230080710 = "I'll be counting on you if you do. Anyway, I'll talk to you later."
23008-230080720 = "Sensei"
23008-230080730 = "Sorry, I just wanted to call out to you one last time."
23008-230080740 = "Hello, Sensei."
23008-230080750 = "If you happen to have time today"
23008-230080760 = "Of course I do."
23008-230080770 = "Where do you need me?"
23008-230080780 = "Wh-What a fast response..."
23008-230080790 = "I'm responsible for buying supplies for the Sisterhood today."
23008-230080800 = "I thought it may be too much to carry all on my own."
23008-230080810 = "I apologize for the inconvenience, but I was just hoping"
23008-230080820 = "That's my area of expertise!"
23008-230080830 = "Where do you want to meet up?"
23008-230080840 = "Thank you as always, Sensei..."
23008-230080850 = "Thank you for everything today, Sensei."
23008-230080860 = "For coming with me, and even treating me to a meal."
23008-230080870 = "I wanted to get you some accessories too, though."
23008-230080880 = "Heehee, I don't think like that at all."
23008-230080890 = "It's thanks to your approval that"
23008-230080900 = "the feelings this corsage carries will always be precious to me."
23008-230080910 = "That's...enough."

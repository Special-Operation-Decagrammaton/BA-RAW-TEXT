[translation]
10086-100860010 = "선생님. 조금 업무 관련으로 상담하고 싶은 게 있는데."
10086-100860020 = "좋아, 샬레 출동이다!"
10086-100860030 = "으, 응? 출동…?"
10086-100860040 = "어디서 만날까? 히나."
10086-100860050 = "아, 응. 출동이란 게, 바로 만나자는 의미였구나."
10086-100860060 = "…후훗. 선생님답네."
10086-100860070 = "오늘은 내가 샬레로 찾아갈게."
10086-100860080 = "그럼 이따가 보자. 선생님."
10086-100860090 = "선생님, 저번에 이야기했던 약속 말인데…."
10086-100860100 = "응, 이번 휴일에 히나의 드레스를 사러 가기로 했었지!"
10086-100860110 = "히나와 쇼핑할 날만 기다리고 있었으니까!"
10086-100860120 = "후후… 그렇게까지 의욕을 내서 말해주다니, 고마워."
10086-100860130 = "그래서 그 드레스를 사러 가는 장소와 관련해서."
10086-100860140 = "아무래도 우리 선도부는 만마전이나 여러 문제아처럼. 악감정을 가진 학생들이 많거든."
10086-100860150 = "때문에 게헨나의 쇼핑몰을 방문하면 여러모로 문제가 생길지도 몰라."
10086-100860160 = "그러니…."
10086-100860170 = "게헨나 자치구 외곽에서 보자는 거지? 알았어."
10086-100860180 = "응. 그럼, 장소의 주소를 보내줄게."
10086-100860190 = "그곳에서 보자. 선생님."
10086-100860200 = "선생님. 내일 시간이 있을까?"
10086-100860210 = "이번 게헨나 파티에서 연주가 끝난 만큼, 조금 일정에 여유가 생긴 참에……."
10086-100860220 = "괜찮다면 내일 선생님과 만나고 싶은데."
10086-100860230 = "히나의 일정에 여유가 생기다니. 엄청 드문 일이네!"
10086-100860240 = "그 귀중한 기회를 놓칠 수 없지! 바로 갈게!"
10086-100860250 = "후후, 또 선생님답게 야단이라니까."
10086-100860260 = "그럼 내일, 파티 홀에서 기다리고 있을게."

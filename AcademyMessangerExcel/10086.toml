[translation]
10086-100860010 = "คุณครู ฉันมีเรื่องงานอยากจะ\nปรึกษาหน่อย"
10086-100860020 = "ได้สิ ชาเล่ต์จะออกปฏิบัติการ\nเดี๋ยวนี้!"
10086-100860030 = "หะ... หืม? ออกปฏิบัติการ...?"
10086-100860040 = "ไปเจอกันที่ไหนดีล่ะฮินะ?"
10086-100860050 = "อ่า... อืม ออกปฏิบัติการแปลว่า\nจะมาหาสินะ"
10086-100860060 = "ฮุฮุ... สมกับเป็นคุณครูเลย"
10086-100860070 = "วันนี้ฉันจะไปหาที่ชาเล่ต์เอง"
10086-100860080 = "งั้นอีกเดี๋ยวเจอกันนะ\nคุณครู"
10086-100860090 = "คุณครู เรื่องสัญญาที่คุยกันไว้\nคราวก่อนน่ะ..."
10086-100860100 = "อื้ม วันหยุดนี้เราจะไปซื้อ\nชุดเดรสของฮินะกันไง!"
10086-100860110 = "ครูรอวันที่จะได้ไปซื้อของกับฮินะอยู่นะ"
10086-100860120 = "ฮุฮุ... ขอบคุณที่กระตือรือร้น\nขนาดนั้นเลยนะ"
10086-100860130 = "เรื่องสถานที่ที่จะไปซื้อชุดเดรสนั่นน่ะ"
10086-100860140 = "พอดีว่าในโรงเรียนเราก็มีคนที่\nไม่ค่อยถูกใจคณะกรรมการวินัย\nพอๆ กับแพนเดโมเนียม โซไซตี้\nและเด็กที่ชอบก่อปัญหา"
10086-100860150 = "เพราะงั้นการไปซื้อของที่\nห้างสรรพสินค้าอาจทำให้เกิด\nปัญหาก็ได้"
10086-100860160 = "เพราะงั้น..."
10086-100860170 = "จะให้ไปเจอกันที่ชานเมือง\nเกเฮนน่าแทนใช่มั้ย? เข้าใจแล้ว"
10086-100860180 = "อืม แล้วฉันจะส่งโลเคชั่นสถานที่ให้"
10086-100860190 = "ไว้เจอกันที่นั่นนะ คุณครู"
10086-100860200 = "คุณครู พรุ่งนี้พอมีเวลามั้ย?"
10086-100860210 = "ตั้งแต่ปาร์ตี้เกเฮนน่าจบลง ฉันก็พอมีเวลาเหลือบ้าง..."
10086-100860220 = "ถ้าคุณครูไม่ว่าอะไร พรุ่งนี้ฉันอยากไป\nเจอคุณครูหน่อย"
10086-100860230 = "ฮินะมีเวลาว่างเหรอเนี่ย เรื่องแบบนี้\nไม่ได้มีบ่อยๆ นะ!"
10086-100860240 = "ครูไม่ปล่อยให้โอกาสดีๆ แบบนั้น\nหลุดลอยไปหรอก! ครูจะไปหาเดี๋ยวนี้เลย!"
10086-100860250 = "ฮุฮุ พูดเวอร์ไปแล้วนะ"
10086-100860260 = "งั้นพรุ่งนี้ฉันจะรออยู่ที่โถงจัดปาร์ตี้นะ"

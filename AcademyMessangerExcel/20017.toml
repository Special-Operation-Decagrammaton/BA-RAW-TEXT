[translation]
20017-200170010 = "สวัสดีค่ะ คุณครู แหะๆๆ..."
20017-200170020 = "นี่แชตคุณครู... ใช่มั้ยคะ?"
20017-200170030 = "ฮิโยริ...?"
20017-200170040 = "แหะๆๆ... ค่ะ ตอนนี้ฉันกำลังหา-"
20017-200170060 = "...?"
20017-200170070 = "ฮิโยริ...? "
20017-200170080 = "หา Wi-Fi ฟรีใช้อยู่ค่ะ... แหะๆๆ"
20017-200170090 = "ว่าแล้วเชียวว่าย่อมมีแสงสว่าง\nในความมืด..."
20017-200170100 = "ตอนนี้คุณครูทำอะไรอยู่เหรอคะ? "
20017-200170110 = "คุณครูคะ?"
20017-200170120 = "คุณครูคะ? ทำไมถึงไม่ตอบฉันเลยล่ะคะ?"
20017-200170130 = "หรือว่าสุดท้ายแล้วฉันก็ถูกคุณครูทิ้ง\nอีกคนแล้วเหรอคะ?"
20017-200170140 = "เรื่องจริงเหรอคะ? แบบนี้แย่แน่ๆ แย่ที่สุด\nเลยค่ะ ชีวิตฉันคงจบแล้ว มุแงงงงงงง~~"
20017-200170150 = "ใจเย็นๆ ก่อน ฮิโยริ ดูสัญญาณ WIFI ก่อน"
20017-200170160 = "ข้อความอาจดีเลย์นิดหน่อย\nเพราะใช้ Wi-Fi ฟรีก็ได้"
20017-200170170 = "อ๊ะ ยะ...อย่างนั้นเหรอคะ\nWi-Fi ติดขัดนี่เอง..."
20017-200170180 = "แบบนี้นี่เองค่ะ..."
20017-200170190 = "ขอโทษด้วยนะคะ..."
20017-200170200 = "คุณครูคะ... แหะๆๆ "
20017-200170210 = "วันนี้เป็นวันที่โชคดีมากเลยค่ะ "
20017-200170220 = "ชีวิตที่เหมือนกับเห็ดราที่งอกออกมาจาก\nอาหารกล่องที่ถูกทิ้งไว้ในร้านค้าร้าง ก็มีเรื่อง\nแบบนี้เกิดขึ้นด้วยนะคะ"
20017-200170230 = "มีเรื่องอะไรดีๆ งั้นเหรอ?"
20017-200170240 = "ค่ะ ที่จริงแล้ววันนี้..."
20017-200170250 = "อา... คุณครูดูเองน่าจะเร็วกว่า\nสักครู่นะคะ"
20017-200170260 = "ฉันจะส่งรูปไปให้ค่ะ "
20017-200170270 = "คุณครู คุณครูคะ? ดูอยู่รึเปล่าคะ? "
20017-200170280 = "ทำไมเป็นแบบนี้อีกแล้วล่ะ คุณครู??\nรูปส่งไม่ไปงั้นเหรอ ทำไมเป็นแบบนี้?"
20017-200170290 = "มุแงงง Wi-Fi ตัดไปอีกแล้วค่ะ!"
20017-200170300 = "คิดแล้วว่าต้องเป็นแบบนี้ สมกับเป็นฉัน\nจริงๆ เลยนะคะ ที่ต้องเจอเรื่องเจ็บปวดซ้ำ\nซากแบบนี้"
20017-200170310 = "เดี๋ยวครูไปหาแล้วค่อยคุยกันดีกว่า..."
20017-200170320 = "โทรศัพท์เก่าๆ ที่ส่งข้อความไม่ไป\nสัญญาณก็ติดๆ ดับๆ... คะ? คุณครูจะมาเหรอ\nคะ? ที่นี่เหรอคะ? ตอนนี้เหรอคะ? "
20017-200170330 = "คุณครู พอมาคิดๆ ดูแล้ว... เหมือนฉันจะยัง\nไม่ได้ขอบคุณคุณครูเลย..."
20017-200170340 = "ขะ... ขอบคุณนะคะ"
20017-200170350 = "ถ้าทุกคนรู้ว่าฉันรบกวนคุณครูอีก ทุกคนคง\nจะโกรธแน่ๆ... "
20017-200170360 = "นะ...นิตยสารที่คุณครูซื้อให้ ฉันจะเก็บไว้\nเป็นความลับคนเดียวค่ะ..."
20017-200170370 = "ในนิตยสาร <ron-ro> เล่มใหม่... "
20017-200170380 = "มันมีบทความพิเศษ..."
20017-200170390 = "<10 เคล็ดลับพิเศษที่ไม่มีสอนในโรงเรียน>\nอยู่ด้วยละค่ะ!!"
20017-200170400 = "เอ๋ งั้นเหรอ...?"
20017-200170410 = "เคล็ดลับพิเศษที่ไม่มีสอนในโรงเรียนนี่"
20017-200170420 = "มันคืออะไรกันนะคะ? คุณครูรู้รึเปล่าคะ?"
20017-200170430 = "ครูก็ไม่ค่อยรู้หรอก..."
20017-200170440 = "นะ...นั่นสินะ"
20017-200170450 = "งั้นเหรอคะ? มันคืออะไรกันนะคะ?"
20017-200170460 = "ถ้าฉบับล่าสุดจะถูกยกเลิกคงจะต้องรออีก\nหลายเดือนแน่เลย"
20017-200170470 = "จะอดทนรอยังไงดีคะ? แย่ที่สุดเลยค่ะ\nแบบนี้เลวร้ายที่สุดเลย"
20017-200170480 = "ตอนที่อยู่คนเดียว ฉันก็แทบไม่มีอะไรทำ\nนอกจากอ่านนิตยสารแล้วแท้ๆ..."

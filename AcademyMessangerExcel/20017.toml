[translation]
20017-200170010 = "老師，你好。耶嘿嘿……"
20017-200170020 = "那個，這是老師的帳號對吧？"
20017-200170030 = "日和？"
20017-200170040 = "耶嘿嘿……是的。那個，我找到了免"
20017-200170060 = "……？"
20017-200170070 = "……日和？"
20017-200170080 = "費的Wi-Fi……耶嘿嘿"
20017-200170090 = "該說是天無絕人之路嗎……"
20017-200170100 = "那個……老師現在在做什麼？"
20017-200170110 = "老師？"
20017-200170120 = "老師？為什麼沒有回覆？"
20017-200170130 = "……我終於被老師拋棄了嗎？"
20017-200170140 = "是這樣對吧？結束了，真的全都結束了呼嗚哇啊啊痛啊"
20017-200170150 = "日和你冷靜點，先確認一下通訊狀態吧"
20017-200170160 = "如果是免費Wi-Fi的話，要收到訊息可能要花點時間"
20017-200170170 = "啊，確，確實如此。Wi-Fi斷線了呢……"
20017-200170180 = "原來是這樣啊……"
20017-200170190 = "抱歉……"
20017-200170200 = "老師……耶嘿嘿，你好"
20017-200170210 = "今天運氣很好"
20017-200170220 = "在我這和長在變質便利商店便當上的蘑菇一樣的人生裡……也會發生這種事呀"
20017-200170230 = "發生了什麼好事嗎？"
20017-200170240 = "是的！其實今天……"
20017-200170250 = "啊，直接看可能比較快吧。請等一下……"
20017-200170260 = "我把照片傳給你"
20017-200170270 = "老師，能看到這個嗎？"
20017-200170280 = "圖片傳不出去？怎麼會？為什麼？"
20017-200170290 = "嗚哇！Wi-Fi又斷線了！"
20017-200170300 = "才想會不會是這樣結果果然是！好痛苦……簡直就像"
20017-200170310 = "……等等見面再聊吧"
20017-200170320 = "像我的人生一樣，連圖片都不能好好傳送的手機……咦？你，你要來嗎？"
20017-200170330 = "……老師。仔細想想，我好像不曾向你道謝……"
20017-200170340 = "謝，謝謝……"
20017-200170350 = "如果被大家知道又受老師照顧了的話，會被罵的……"
20017-200170360 = "你買給我的雜誌，我會當成自己的祕密的……"
20017-200170370 = "這次《ron-ro》的最新一期裡好像有……"
20017-200170380 = "「學校絕對不會教的祕密知識10大精選」"
20017-200170390 = "這樣的特別報導！！"
20017-200170400 = "呃……是，是嗎？"
20017-200170410 = "學校絕對不會教的祕密知識……"
20017-200170420 = "究竟是什麼呢……老師知道嗎？"
20017-200170430 = "我也不太清楚……"
20017-200170440 = "這，這個嘛……誰知道呢"
20017-200170450 = "老師也不知道的知識究竟是什麼呢！？"
20017-200170460 = "最新一期成為廢紙一般來說需要好幾個月……"
20017-200170470 = "這段期間要怎麼等下去……結束了，這個世界已經完全結束了"
20017-200170480 = "一個人的時候，除了讀雜誌也沒有什麼事情可做……"

[translation]
20017-200170010 = "Greetings, Sensei. Heehee..."
20017-200170020 = "Is this your number? "
20017-200170030 = "Hiyori?"
20017-200170040 = "Heeheehee... Yes, Sensei I just found"
20017-200170060 = "...?"
20017-200170070 = "...Hiyori? "
20017-200170080 = "free Wi-Fi... Heehee... "
20017-200170090 = "There's always a light in the darkness..."
20017-200170100 = "Sensei, what are you doing now? "
20017-200170110 = "Sensei?"
20017-200170120 = "Sensei? Why aren't you answering?"
20017-200170130 = "Are you abandoning me, just like everyone else?"
20017-200170140 = "Is this real? I'm done. It's over. Everything is finished. AHHHHHH!"
20017-200170150 = "Calm down, Hiyori. Look at your connection status."
20017-200170160 = "You aren't receiving my messages because you're on public Wi-Fi!"

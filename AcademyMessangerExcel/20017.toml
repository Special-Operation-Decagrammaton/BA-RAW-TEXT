20017-200170190 = "Sorry..."
20017-200170200 = "Sensei... Heehee. "
20017-200170210 = "I got lucky today. "
20017-200170220 = "I never thought a day like this would come. My life always feels like a stale convenience store box lunch..."
20017-200170230 = "Did something good happen?"
20017-200170240 = "Yes, so today..."
20017-200170250 = "Oh, I'll just show it to you. Hold on."
20017-200170260 = "I'll send you a picture. "
20017-200170270 = "Sensei? Sensei? Are you seeing this? "
20017-200170280 = "What's going on this time? It says, \"Failed to send.\" What does that mean?"
20017-200170290 = "Wahhh! The Wi-Fi got disconnected again!"
20017-200170300 = "I knew it. This always happens to me! I'm suffering. It's so painful!"
20017-200170310 = "Wait. Let's chat in person."
20017-200170320 = "My phone sucks so bad that it can't even send a picture. Huh? You're gonna come here? Now? "
20017-200170330 = "Sensei... I didn't have a chance to thank you..."
20017-200170340 = "So...th-thank you..."
20017-200170350 = "If the others find out I inconvenienced you again, they're gonna yell at me... "
20017-200170360 = "The magazine you bought me will be my secret..."
20017-200170370 = "In the newest issue of Ron-ro, "
20017-200170380 = "\"10 Pieces of Secret Knowledge Schools Don't Teach You\""
20017-200170390 = "is a special, feature article!"
20017-200170400 = "Oh... Yeah?"
20017-200170410 = "Secret knowledge that schools don't teach you... "
20017-200170420 = "What could it be? Do you know?"
20017-200170430 = "No idea."
20017-200170440 = "N-Not sure..."
20017-200170450 = "I'm so curious. What could it be?!"
20017-200170460 = "It's gonna be a few months until the new issue is out."
20017-200170470 = "How am I gonna wait until then? I'm desperate. This is terrible."
20017-200170480 = "I've got nothing else to do but read magazines when I'm alone..."

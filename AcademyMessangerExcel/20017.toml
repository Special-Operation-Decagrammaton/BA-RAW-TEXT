[translation]
20017-200170010 = "안녕하세요, 선생님. 헤헤……."
20017-200170020 = "선생님 폰 맞죠?"
20017-200170030 = "히요리……?"
20017-200170040 = "헤헤헤…… 네. 선생님 지금 무"
20017-200170060 = "……?"
20017-200170070 = "……히요리?"
20017-200170080 = "료 와이파이를 찾았거든요…… 헤헤."
20017-200170090 = "역시 사람은 죽으라는 법은 없는 거랄까……."
20017-200170100 = "선생님은 지금 뭐하고 계세요?"
20017-200170110 = "선생님?"
20017-200170120 = "선생님? 어째서 답을 해주지 않는 거죠?"
20017-200170130 = "드디어 저는 선생님에게도 버림받은 건가요?"
20017-200170140 = "진짜인가요? 망했어요, 진짜 망했네요. 이제 저는 끝장이에요. 으아아아앙아ㅏㅏㅏ아"
20017-200170150 = "진정해, 히요리. 통신상태를 확인해."
20017-200170160 = "무료 와이파이라서 메시지 수신에 시간이 걸리는 걸지도 모르니까."
20017-200170170 = "아 그, 그러네요. 와이파이가 끊겨 있었네요……."
20017-200170180 = "그런 거였군요……."
20017-200170190 = "죄송합니다……."
20017-200170200 = "선생님…… 헤헤."
20017-200170210 = "오늘은 운수가 좋은 날이에요."
20017-200170220 = "상한 편의점 도시락에 핀 버섯 같은 제 인생에도 이런 일이 벌어지나 보네요."
20017-200170230 = "좋은 일이라도 있었어?"
20017-200170240 = "네. 실은 오늘"
20017-200170250 = "아아 직접 보는 게 빠르겠네요 잠시만요"
20017-200170260 = "사진을 보낼게요."
20017-200170270 = "선생님? 선생님? 보고 계신가요?"
20017-200170280 = "왜 또 이러죠? 선생님?? 전송되지 않았습니다? 라니 무슨 소리인가요?"
20017-200170290 = "으아아앙- 또 와이파이가 끊겼잖아요!"
20017-200170300 = "역시 그럴 줄 알았어요. 혹시나하면 역시나예요! 괴롭네요 고통스러워요 마치"
20017-200170310 = "……기다려. 만나서 얘기하자."
20017-200170320 = "전송도 안되고 버벅이는 제 고물 휴대폰 네? 오, 오신다고요? 여길요? 지금요?"
20017-200170330 = "선생님…… 생각해보니까 감사인사를 못 드린 거 같아서……."
20017-200170340 = "가, 감사해요……."
20017-200170350 = "또 선생님한테 신세를 진 걸 알게 되면 모두에게 혼나버리기 때문에……."
20017-200170360 = "사주신 잡지는 저 혼자만의 비밀로 해둘게요……."
20017-200170370 = "이번 <ron-ro>의 최신호에는"
20017-200170380 = "<학교에서 가르쳐주지 않는 비밀 지식 10선>"
20017-200170390 = "이라는 특집 기사가 나온대요!!"
20017-200170400 = "어…… 그래?"
20017-200170410 = "학교에서 알려주지 않는 비밀 지식이라니,"
20017-200170420 = "그게 뭘까요? 선생님은 알고 계신가요?"
20017-200170430 = "나도 잘 모르는데……."
20017-200170440 = "그, 글쎄……."
20017-200170450 = "그게 뭘까요? 뭐죠? 대체?!"
20017-200170460 = "최신호가 폐지로 나오려면 몇 달은 더 걸릴 텐데"
20017-200170470 = "어떻게 기다려야 할까요? 망했어요, 완전 망했어요"
20017-200170480 = "혼자 있을 때 잡지를 읽는 것 말고는 할 것도 딱히 없는데……."

[translation]
20030-200300010 = "您好，老師"
20030-200300020 = "為了迎接大運動會"
20030-200300030 = "我想向老師提出一個「特別的」提案"
20030-200300040 = "您覺得如何呢"
20030-200300050 = "羽留奈的特別提案啊。我很期待"
20030-200300060 = "唔呵呵"
20030-200300070 = "對我們來說"
20030-200300080 = "一定會是段難忘的經驗吧"
20030-200300090 = "不過今天可能有點困難"
20030-200300100 = "因為有件必須優先處理的事……"
20030-200300110 = "……？"
20030-200300120 = "雖然清楚老師有多麼忙碌"
20030-200300130 = "不過老師自己這麼說確實有點少見呢"
20030-200300140 = "真有意思"
20030-200300150 = "嗯，真是相當有意思"
20030-200300160 = "羽留奈……？"
20030-200300170 = "老師"
20030-200300180 = "請問您今天有什麼行程呢？"
20030-200300190 = "因為接到在大運動會會場巡邏的委託……"
20030-200300200 = "好像從上午開始就得到處巡邏"
20030-200300210 = "原來如此"
20030-200300220 = "這是個"
20030-200300230 = "讓人感到些許失望，\n卻又充滿期待的回答呢"
20030-200300240 = "呃……讓你失望的話，我很抱歉……？"
20030-200300250 = "別這麼說"
20030-200300260 = "這終究只是我個人的情緒"
20030-200300270 = "不知會在何時何地與老師相見……"
20030-200300280 = "反而讓我更加期待"
20030-200300290 = "畢竟是不可多得的大運動會"
20030-200300300 = "我也想試著參加比賽"
20030-200300310 = "羽留奈嗎！？"
20030-200300320 = "呵呵呵"
20030-200300330 = "如果老師願意為我加油"
20030-200300340 = "似乎就能發揮出無限的潛力呢"
20030-200300350 = "我一定會為你加油"
20030-200300360 = "那麼，在競賽場上見吧"
20030-200300370 = "久違活動身體，真是相當愉快"
20030-200300380 = "拜其所賜，食慾似乎也比平常更好"
20030-200300390 = "運動是很重要的，嗯"
20030-200300400 = "所以，老師"
20030-200300410 = "今天傍晚，能占用您一些時間嗎？"
20030-200300420 = "嗯，當然"
20030-200300430 = "那真是令人高興"
20030-200300440 = "美食研究會的精髓，就讓老師您見識見識吧"
20030-200300450 = "會場的熱度真是驚人呢"
20030-200300460 = "老師想必也相當忙碌吧"
20030-200300470 = "大事差不多都結束了"
20030-200300480 = "這樣啊"
20030-200300490 = "那麼，不知道您是否方便"
20030-200300500 = "現在見個面吧？"
20030-200300510 = "哎呀"
20030-200300520 = "沒想到老師會先提出邀請"
20030-200300530 = "那麼，我會等候您的到來"

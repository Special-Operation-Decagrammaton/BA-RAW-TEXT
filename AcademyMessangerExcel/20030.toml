[translation]
20030-200300010 = "สวัสดีค่ะ คุณครู"
20030-200300020 = "เพื่อฉลองงานเทศกาลใหญ่อย่างงาน\nมหกรรมแข่งขันกีฬา"
20030-200300030 = "ฉันเลยอยากยื่นข้อเสนอพิเศษสุดๆ\nให้กับคุณครู"
20030-200300040 = "ฟังดูเป็นยังไงบ้างคะ?"
20030-200300050 = "ข้อเสนอพิเศษของฮารุนะเหรอ\nน่าตื่นเต้นจัง"
20030-200300060 = "ฮุฮุฮุ"
20030-200300070 = "แน่นอนว่ามันจะเป็นประสบการณ์\nสุดพิเศษ..."
20030-200300080 = "ที่พวกเราจะไม่มีวันลืมเลยค่ะ"
20030-200300090 = "แต่ว่าวันนี้อาจจะยากหน่อยนะ..."
20030-200300100 = "พอดีครูมีเรื่องที่ต้องไปจัดการ\nให้เสร็จก่อนน่ะ"
20030-200300110 = "...?"
20030-200300120 = "ฉันทราบดีค่ะว่าคุณครูมีงาน\nที่ต้องจัดการอยู่ตลอดเวลา"
20030-200300130 = "แต่ไม่เคยเห็นคุณครูพูดออกมาตรงๆ\nแบบนี้มาก่อนเลย"
20030-200300140 = "นับว่าเป็นเรื่องที่น่าสนใจจริงๆ ค่ะ"
20030-200300150 = "ค่ะ น่าสนใจจริงๆ ค่ะ"
20030-200300160 = "ฮารุนะ...?"
20030-200300170 = "คุณครู"
20030-200300180 = "วันนี้มีตารางงานอะไรบ้างคะ?"
20030-200300190 = "ครูได้รับคำขอให้ลาดตระเวน\nรอบสนามแข่งกีฬามาน่ะ..."
20030-200300200 = "ดูเหมือนจะต้องไปตรวจตรา\nหลายที่ตั้งแต่เช้าเลยละ"
20030-200300210 = "อย่างนั้นเหรอคะ"
20030-200300220 = "แบบนั้น..."
20030-200300230 = "ช่างเป็นคำตอบที่มีความหวังเลือนลาง\nและน่าผิดหวังนิดๆ เลยนะคะ"
20030-200300240 = "เอ่อ... ขอโทษที่ทำให้ผิดหวังนะ...?"
20030-200300250 = "ไม่เป็นไรค่ะ"
20030-200300260 = "มันก็แค่ความรู้สึกผิดหวังของฉัน\nฝ่ายเดียว"
20030-200300270 = "แต่ว่าการที่ไม่รู้ว่าจะได้เจอคุณครูที่ไหน\nหรือจะได้เจอเมื่อไหร่"
20030-200300280 = "แบบนั้นมันน่าตื่นเต้นดีออกนะคะ"
20030-200300290 = "ไหนๆ ก็เป็นงานแข่งกีฬาทั้งที..."
20030-200300300 = "ฉันคิดว่าจะเข้าร่วมการแข่งขัน\nด้วยค่ะ"
20030-200300310 = "ฮารุนะน่ะเรอะ?!"
20030-200300320 = "ฮุฮุฮุ"
20030-200300330 = "ถ้าคุณครูเป็นกำลังใจให้ละก็"
20030-200300340 = "ฉันคงมีแรงฮึดขึ้นอีกแน่ๆ ค่ะ"
20030-200300350 = "ครูจะคอยเชียร์นะ"
20030-200300360 = "ถ้างั้นแล้วพบกันที่สนามกีฬานะคะ"
20030-200300370 = "หลังจากที่ไม่ได้ขยับร่างกายมานาน\nวันนี้รู้สึกเป็นประสบการณ์ที่สนุกมาก\nเลยละค่ะ"
20030-200300380 = "แถมก็ยังทำให้รู้สึกอยากอาหาร\nมากกว่าปกติด้วยค่ะ"
20030-200300390 = "การออกกำลังกายเป็นเรื่องสำคัญนะ"
20030-200300400 = "ว่าแต่ว่าคุณครูคะ..."
20030-200300410 = "วันนี้ตอนเย็น พอมีเวลาให้ฉัน\nสักหน่อยมั้ยคะ?"
20030-200300420 = "อื้อ ได้สิ"
20030-200300430 = "ค่อยยังชั่วหน่อย ดีใจจังเลยค่ะ..."
20030-200300440 = "ฉันจะแสดงให้เห็นถึงแก่นสำคัญของ\nชมรมชิมอาหารเองค่ะ"
20030-200300450 = "ภายในงานดูกระตือรือร้นน่าดูเลยค่ะ"
20030-200300460 = "คุณครูเองก็คงจะงานยุ่งมากเหมือนกัน\nสินะคะ"
20030-200300470 = "งานสำคัญๆ เสร็จไประดับหนึ่งแล้วละ"
20030-200300480 = "อย่างนั้นเหรอคะ"
20030-200300490 = "ถ้าอย่างนั้นตอนนี้คุณครูพอจะมีเวลา\nบ้างรึเปล่าคะ"
20030-200300500 = "มาเจอกันมั้ย?"
20030-200300510 = "ตายจริง"
20030-200300520 = "นึกไม่ถึงเลยว่าคุณครูจะเป็นคนพูดก่อน"
20030-200300530 = "ถ้าอย่างนั้นฉันจะรอนะคะ"

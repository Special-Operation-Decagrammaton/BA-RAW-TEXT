[translation]
20030-200300010 = "Hello, Sensei."
20030-200300020 = "So, in honor of field day..."
20030-200300030 = "I'd like to make a special proposal to you."
20030-200300040 = "How does that sound?"
20030-200300050 = "A special proposal from Haruna? How exciting."
20030-200300060 = "Heeheehee."
20030-200300070 = "It will be an experience, all right."
20030-200300080 = "One we'll never forget."
20030-200300090 = "But I'm afraid today's going to be difficult."
20030-200300100 = "I've got something I need to take care of first."
20030-200300110 = "...?"
20030-200300120 = "Sensei, I know you're always very busy, but..."
20030-200300130 = "I've never heard you say you don't have time for a student."
20030-200300140 = "How intriguing."
20030-200300150 = "Yes, very intriguing."
20030-200300160 = "Haruna...?"
20030-200300170 = "Sensei."
20030-200300180 = "What's your schedule like today?"
20030-200300190 = "I've been asked to monitor the sports field..."
20030-200300200 = "Busy. I'll be running around all over the place."
20030-200300210 = "I see."
20030-200300220 = "Well, that's"
20030-200300230 = "a little disappointing...but it also gives me some hope."
20030-200300240 = "Um... I'm sorry I disappointed you?"
20030-200300250 = "Don't worry about it."
20030-200300260 = "There's disappointment, yes, but"
20030-200300270 = "I also have a sense of anticipation"
20030-200300280 = "that we just might bump into each other at some point."
20030-200300290 = "You know, come to think of it"
20030-200300300 = "maybe I should join in on the competition."
20030-200300310 = "You want to join?"
20030-200300320 = "Heeheehee."
20030-200300330 = "If you cheer me on, Sensei,"
20030-200300340 = "I think I'll do great."
20030-200300350 = "I'll be sure to cheer you on."
20030-200300360 = "In that case, I'll see you on the field."
20030-200300370 = "It was fun to finally get some exercise in."
20030-200300380 = "I've actually worked up a bit of an appetite."

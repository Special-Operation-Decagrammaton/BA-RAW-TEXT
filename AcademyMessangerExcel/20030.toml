[translation]
20030-200300010 = "안녕하세요. 선생님."
20030-200300020 = "대운동회라는 이벤트를 맞이하여."
20030-200300030 = "선생님께 매우 특별한 제안을 드리고 싶은데."
20030-200300040 = "어떻게 생각하시나요"
20030-200300050 = "하루나의 특별 제안인가. 기대되네."
20030-200300060 = "후후후."
20030-200300070 = "분명 저희 모두에게"
20030-200300080 = "잊을 수 없는 경험이 될 것입니다."
20030-200300090 = "하지만 오늘은 조금 힘들지도 모르겠어."
20030-200300100 = "조금 먼저 해결할 일이 생긴 것 같거든."
20030-200300110 = "……?"
20030-200300120 = "물론 선생님께서는 언제나 할 일이 많으신 것으로 알고 있습니다만."
20030-200300130 = "그래도 그렇게까지 말씀하시는 것은, 드문 일이군요."
20030-200300140 = "흥미로운 일이네요."
20030-200300150 = "네. 흥미로워요."
20030-200300160 = "하루나……?"
20030-200300170 = "선생님."
20030-200300180 = "오늘의 일정은 어떻게 되시나요?"
20030-200300190 = "운동회장의 순찰을 부탁받아서……"
20030-200300200 = "오전부터 여기저기를 돌아다녀야 할 것 같아."
20030-200300210 = "그렇군요."
20030-200300220 = "그것은 참으로"
20030-200300230 = "희미한 실망과 함께, 많은 기대를 품게 되는 대답이네요."
20030-200300240 = "어…… 실망하게 했다면, 미안해……?"
20030-200300250 = "아닙니다."
20030-200300260 = "그것은 그저 저 혼자만의 감정."
20030-200300270 = "도리어 언제 어디에서 무슨 일로 선생님과 만나게 될지."
20030-200300280 = "그쪽이 더욱 기대되는군요."
20030-200300290 = "이런 시기이기도 하니"
20030-200300300 = "저도 경기에 참가해 보려 합니다."
20030-200300310 = "하루나가?!"
20030-200300320 = "후후후"
20030-200300330 = "선생님께서 응원해 주신다면"
20030-200300340 = "더할 나위 없이 힘이 날 것 같네요."
20030-200300350 = "꼭 응원할게."
20030-200300360 = "그러면, 경기장에서 뵙죠."
20030-200300370 = "간만에 몸을 움직이는 것은, 즐거운 경험이었습니다."
20030-200300380 = "그 덕에 평소보다 조금 더, 식욕이 돌기도 했고요."
20030-200300390 = "운동은 중요하지. 음."
20030-200300400 = "그래서 말인데요. 선생님."
20030-200300410 = "오늘 저녁, 저를 위해 시간을 내어 주실 수 있을까요?"
20030-200300420 = "응. 그렇게 할게."
20030-200300430 = "다행이군요. 기쁘네요."
20030-200300440 = "미식연구회의 진수, 보여드리도록 하겠습니다."
20030-200300450 = "회장의 열기가 엄청나군요."
20030-200300460 = "선생님께서도 많이 바쁘실 것 같습니다."
20030-200300470 = "큰 일들은 어느 정도 지나갔어."
20030-200300480 = "그렇군요"
20030-200300490 = "그러면 지금 혹시 시간 괜찮으실까요"
20030-200300500 = "잠시 만날까?"
20030-200300510 = "어머나."
20030-200300520 = "선생님께서 먼저 권해 주실 줄은."
20030-200300530 = "그러면 기다리고 있겠습니다."

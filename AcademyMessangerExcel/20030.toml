20030-200300400 = "Sensei, I was thinking..."
20030-200300410 = "Do you think you can make some time for me tonight, for dinner?"
20030-200300420 = "Sure, I can do that."
20030-200300430 = "I'm glad to hear it."
20030-200300440 = "I will show you what the Gourmet Research Society is capable of."
20030-200300450 = "Such an intense atmosphere."
20030-200300460 = "I'm sure you're also very busy, Sensei."
20030-200300470 = "We're done with most of the big events."
20030-200300480 = "I see."
20030-200300490 = "Then do you have a moment to spare right now?"
20030-200300500 = "Do you want to meet up?"
20030-200300510 = "Oh my."
20030-200300520 = "I didn't expect you to ask first."
20030-200300530 = "Well then, I will be waiting."

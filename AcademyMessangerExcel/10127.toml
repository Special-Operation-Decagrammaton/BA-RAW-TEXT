[translation]
10127-101270010 = "สวัสดีค่ะ คุณครู ฉันซากุราอิ มิโยะค่ะ"
10127-101270020 = "พรุ่งนี้เป็นเวรของฉัน..."
10127-101270030 = "แต่ถ้าคุณครูไม่สะดวกให้ไปหาละก็\nฉันจะยกเลิกการไปเข้าเวรเองค่ะ"
10127-101270040 = "อ่านข้อความแล้วช่วยตอบกลับหน่อย\nนะคะ"
10127-101270050 = "ค่ะ... เข้าใจแล้วค่ะ"
10127-101270060 = "รับทราบค่ะ งั้นเอาไว้เจอกันคราวหน้า\nนะคะ คุณครู"
10127-101270070 = "ไม่! อย่ายกเลิกนะ! "
10127-101270080 = "ครูอยากเจอมิโยะจังมากๆ เลย! "
10127-101270090 = "เอ๋...!"
10127-101270100 = "ขออภัยที่วิ่งหนีออกมาตามอำเภอใจ\nนะคะ คุณครู "
10127-101270110 = "ไม่เป็นไรหรอก นี่เป็นเรื่องปกติเวลา\nเขียนงานอยู่แล้ว"
10127-101270120 = "ขอบคุณที่เข้าใจนะคะ..."
10127-101270130 = "ว่าแต่ใครเป็นฝ่ายชนะเหรอ?"
10127-101270140 = "อ่าาาาาาาาาาาาาาาาาาาาา"
10127-101270150 = "ฉันไปดูตารางงานมาแล้ว"
10127-101270160 = "วันนี้ตอนบ่าย 2 น่าจะเหมาะที่สุดค่ะ"
10127-101270170 = "หืม...?"
10127-101270180 = "อ๊ะ "
10127-101270190 = "ส่งผิด"
10127-101270200 = "ขอโทษค่ะ ช่วยลืมไปด้วยนะคะ"
10127-101270210 = "คุณครู"
10127-101270220 = "พอมีเวลาสักครู่ไหมคะ?"
10127-101270230 = "ถึงจะไม่มี แต่จะหาเวลาให้ได้เลย...!"
10127-101270240 = "เพราะงั้นไว้ชีวิตครูด้วย...!"
10127-101270250 = "สำหรับคุณครู ฉันมีภาพลักษณ์ยังไง\nคะเนี่ย...?"
10127-101270260 = "ขอโทษนะคะ คุณครู..."
10127-101270270 = "เหมือนฉันจะลากคุณครูไปเที่ยว\nตามอำเภอใจเลย..."
10127-101270280 = "ไม่หรอก ครูก็สนุกเหมือนกัน"
10127-101270290 = "ขอบคุณค่ะ"
10127-101270300 = "ถ้างั้น อืม"
10127-101270310 = "ไว้คราวหน้าก็..."
10127-101270320 = "สวัสดีค่ะ คุณครู"
10127-101270330 = "ได้ยินว่าหมู่นี้มาที่ไวลด์ฮันต์บ่อยๆ\nเหรอคะ"
10127-101270340 = "อื้อ ไปธุระเรื่องการซื้อขายและก็\nการผ่านศุลกากรงานศิลปะน่ะ"
10127-101270350 = "มีงานธุรการที่ครูต้องทำเยอะเลย"
10127-101270360 = "ฮืมม..."
10127-101270370 = "หืม?"
10127-101270380 = "อาคารที่คุณครูแวะไปวันนี้"
10127-101270390 = "ถ้าเลี้ยวซ้ายตรงหน้ารูปปั้นสีม่วง"
10127-101270400 = "ก็จะไปถึงได้เร็วขึ้นค่ะ"
10127-101270410 = "งั้นเหรอ? อื้อ ขอบใจนะ มิโยะ"
10127-101270420 = "ว่าแต่ทำไมถึง..."
10127-101270430 = "รู้เส้นทางของครูหมดเลยล่ะ...?"
10127-101270440 = "นี่ มิโยะ? มิโยะจัง..."

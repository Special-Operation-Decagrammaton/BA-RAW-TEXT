[translation]
10127-101270010 = "안녕하세요, 선생님. 사쿠라이 미요입니다."
10127-101270020 = "내일 제 당번 방문일인데……"
10127-101270030 = "혹 불편하시다면, 내일 방문은 취소하도록 하겠습니다."
10127-101270040 = "메시지 확인 후 회신 부탁드립니다."
10127-101270050 = "……예, 알겠습니다."
10127-101270060 = "인지하였습니다. 그럼 다음에 뵙겠습니다, 선생님."
10127-101270070 = "아냐! 취소하지 마! "
10127-101270080 = "너무너무 보고 싶어! 미요 쨩! "
10127-101270090 = "흐에에……!"
10127-101270100 = "멋대로 뛰쳐나간 것, 사과드립니다, 선생님. "
10127-101270110 = "괜찮아, 글 쓰다 보면 그럴 수 있지."
10127-101270120 = "이해해 주셔서 감사합니다……."
10127-101270130 = "그런데 그래서 누가 이기는 거야?"
10127-101270140 = "으아아아아아아아아아아아아아아아아아아아아아아아아아아아아"
10127-101270150 = "스케쥴 검토 결과"
10127-101270160 = "오후 2시가 가장 적절할 것 같습니다."
10127-101270170 = "응……?"
10127-101270180 = "아 "
10127-101270190 = "잘못 보냈다"
10127-101270200 = "죄송합니다. 잊어 주세요."
10127-101270210 = "선생님"
10127-101270220 = "혹시 시간 있으신가요?"
10127-101270230 = "없더라도 내겠습니다……!"
10127-101270240 = "그러니 목숨만은……!"
10127-101270250 = "……대체 선생님 머릿속에서 저는 어떤 이미지인 거죠?"
10127-101270260 = "죄송합니다 선생님……"
10127-101270270 = "뭔가 제멋대로 선생님을 끌고 다닌 것 같아서……"
10127-101270280 = "아냐, 나도 즐거웠어."
10127-101270290 = "감사합니다."
10127-101270300 = "그러면 그"
10127-101270310 = "다음에도……"
10127-101270320 = "안녕하세요 선생님."
10127-101270330 = "요즘 와일드헌트에 자주 오셨다고 들었습니다."
10127-101270340 = "응, 예술품들의 거래 및 통관과 관련해서"
10127-101270350 = "중간에서 처리해야 할 행정 업무가 많았거든."

[translation]
10127-101270010 = "你好，老師。我是櫻井美代"
10127-101270020 = "明天是我擔任值日生的日子……"
10127-101270030 = "如果會造成困擾，我可以取消明天的拜訪"
10127-101270040 = "請確認訊息後回覆"
10127-101270050 = "……好的，我知道了"
10127-101270060 = "我明白了。那麼後會有期，老師"
10127-101270070 = "不是不是！不要取消！"
10127-101270080 = "我非常非常想見你耶！美代醬！"
10127-101270090 = "咦咦……！"
10127-101270100 = "擅自衝了出來，真是非常抱歉，老師"
10127-101270110 = "沒關係。寫作時會這樣很正常"
10127-101270120 = "謝謝老師理解……"
10127-101270130 = "話說最後是誰贏了？"
10127-101270140 = "啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊"
10127-101270150 = "從行程來看"
10127-101270160 = "下午兩點似乎是最適合的"
10127-101270170 = "嗯……？"
10127-101270180 = "啊"
10127-101270190 = "我傳錯了"
10127-101270200 = "不好意思，請忘了吧"
10127-101270210 = "老師"
10127-101270220 = "請問現在有空嗎？"
10127-101270230 = "就算沒有也會擠出時間……！"
10127-101270240 = "所以拜託饒我一命吧……！"
10127-101270250 = "……我在老師的腦海裡究竟是什麼形象呢？"
10127-101270260 = "對不起，老師……"
10127-101270270 = "好像有種隨意將老師呼來喚去的感覺……"
10127-101270280 = "沒關係，我也很開心哦"
10127-101270290 = "謝謝老師"
10127-101270300 = "那麼……"
10127-101270310 = "下次也……"
10127-101270320 = "你好，老師"
10127-101270330 = "聽說老師最近經常來狂獵"
10127-101270340 = "嗯，因為藝術品交易與通關相關的行政事務"
10127-101270350 = "有不少手續需要我來處理"
10127-101270360 = "哼嗯……"
10127-101270370 = "嗯？"
10127-101270380 = "今天老師去的那棟建築"
10127-101270390 = "如果在紫色雕像前左轉"
10127-101270400 = "可以更快抵達哦"
10127-101270410 = "啊，嗯。謝謝你，美代"
10127-101270420 = "……話說你為什麼"
10127-101270430 = "會完全掌握我的移動路線……？"
10127-101270440 = "美代？美代醬……？"

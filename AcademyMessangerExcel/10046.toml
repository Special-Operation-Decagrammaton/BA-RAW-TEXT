[translation]
10046-100460010 = "นายท่าน!"
10046-100460020 = "ฤดูร้อน! ถึงฤดูร้อนแล้วค่ะ!"
10046-100460030 = "ฤดูร้อนแล้วสินะ"
10046-100460040 = "ไอแดดร้อนระอุพัดไปทุกที่เลยค่ะ"
10046-100460050 = "เหมือนในหนังเรื่อง <การต่อสู้ที่ดุเดือด>\nผลงานชิ้นที่ 26 ของปรมาจารย์ผู้กำกับ\nชิบะชื่อดัง..."
10046-100460060 = "ฉันว่ามันเจ๋งมากๆ เลยค่ะ!"
10046-100460070 = "ถึงไม่ค่อยเข้าใจก็เถอะ\nแต่ครูดีใจที่อิซุนะสนุกนะ "
10046-100460080 = "ดูอิซุนะมีพลังล้นเหลือกว่าทุกๆ วันเลย"
10046-100460090 = "เป็นเพราะพลังแสงแดดแห่งฤดูร้อน\nรึเปล่าคะ?"
10046-100460100 = "อ๊ะ จะมามัวโอ้เอ้แบบนี้ไม่ได้แล้ว\nนายท่าน! ไปทะเลกันเถอะค่ะ!"
10046-100460110 = "การฝึกฝนเพื่อเป็นนินจาที่ปรับตัวเข้า\nกับฤดูร้อนได้เริ่มขึ้นแล้วค่ะ!"
10046-100460120 = "ไปกันโลด!"
10046-100460130 = "ฮิฮิฮิ ฉันกำลังรออยู่เลยค่ะ!"
10046-100460140 = "นายท่านคะ! "
10046-100460150 = "คือว่าถ้าวันนี้นายท่านพอมีเวลา..."
10046-100460160 = "แน่นอน ถ้าอิซุนะเรียก\nครูจะไปแน่นอน!"
10046-100460170 = "อ๊ะ..."
10046-100460180 = "ค่ะ!"
10046-100460190 = "ฮิฮิฮิ!"
10046-100460200 = "ค่ะ ถ้างั้นเจอกัน\nที่ชายหาดนะคะ นายท่าน!"
10046-100460210 = "นายท่าน~! วันนี้ก็ร้อนสุดๆ\nตั้งแต่เช้าเลยค่ะ~!"
10046-100460220 = "ถ้าถามว่าอิซุนะร้อนแค่ไหน..."
10046-100460230 = "ร้อนขนาดตอนตื่นมาตอนเช้า\nหางของอิซุนะก็ชุ่มเหงื่อเลยค่ะ~"
10046-100460240 = "โว้ว~ แบบนั้นก็เรื่องใหญ่เลยนะ"
10046-100460250 = "แต่ว่าถึงจะร้อนแค่ไหนก็ตาม"
10046-100460260 = "วันนี้อิซุนะก็อยากออกไปฝึกฝน\nกับนายท่านอีกค่ะ!"
10046-100460270 = "ใช่มั้ยคะ นายท่าน-!"
10046-100460280 = "อื้อ งั้นไปเจอกันที่ชายหาดนะ"
10046-100460290 = "ฮิฮิฮิ ค่ะ!"
10046-100460300 = "อิซุนะจะรีบเตรียมตัวออกไปเลยค่ะ!"
10046-100460310 = "เอ่อ คือว่า..."
10046-100460320 = "ขอโทษค่ะ นายท่าน!"
10046-100460330 = "อิซุนะเป็นฝ่ายชวนมาฝึกก่อนแท้ๆ...\nแต่ดันเผลอหลับไประหว่างฝึกซะได้"
10046-100460340 = "ไม่ต้องคิดมาก นอนอบทรายแบบนั้น\nก็เผลอหลับได้อยู่แล้ว "
10046-100460350 = "นายท่าน...! "
10046-100460360 = "ยังพอมีเวลาอยู่\nเอาไว้ค่อยมาฝึกกันใหม่นะ"
10046-100460370 = "อ๊ะ... ค่ะ!"
10046-100460380 = "ฮิฮิฮิ! ถ้างั้นแล้วพบกันค่ะ "
10046-100460390 = "ไว้เจอกันใหม่นะคะ! นายท่าน!"
10046-100460400 = "นายท่าน! วันนี้จะทำอะไรกันดีคะ?"
10046-100460410 = "อิซุนะ! มีอะไรที่อยากทำ\nกับนายท่านเยอะเลยค่ะ!"
10046-100460420 = "วันนี้อากาศก็ร้อนจังเลย\nทำอะไรดีนะ?"
10046-100460430 = "นั่นสิคะ! อืมมม!"
10046-100460440 = "ไม่อยากว่ายน้ำเหรอ?"
10046-100460450 = "คะ? เอ่อ คือว่า..."
10046-100460460 = "คือว่าเรื่องนั้น..."
10046-100460470 = "อิซุนะไม่ชอบว่ายน้ำเหรอ?"
10046-100460480 = "ปะ...เปล่าค่ะ จะเรียกว่า\nไม่ชอบได้มั้ยนะ..."
10046-100460490 = "คือว่า..."
10046-100460500 = "อิซุนะน่ะ..."
10046-100460510 = "อะ...เอาเป็นว่า! ฉันจะรออยู่ที่\nชายหาดนะคะ นายท่าน!"
10046-100460520 = "อะ...อื้อ!"

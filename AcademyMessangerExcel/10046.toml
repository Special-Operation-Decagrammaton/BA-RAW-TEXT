[translation]
10046-100460010 = "주군!!!"
10046-100460020 = "여름이에요. 여름!"
10046-100460030 = "그러게 여름이네."
10046-100460040 = "오늘 이곳저곳이 아지랑이로 가득한 거 있죠?"
10046-100460050 = "그게 꼭 시바견왕왕 감독의 26번째 작품! <아지랑이 혈투> 같아서…"
10046-100460060 = "엄청 굉장했어요!"
10046-100460070 = "잘은 모르겠지만, 이즈나가 즐거워 보여서 다행이네."
10046-100460080 = "어째 이즈나, 평소보다 더 기운 차 보이는걸."
10046-100460090 = "이것도 다 여름의 태양 에너지 덕분일까요?"
10046-100460100 = "아, 이러고 있을 게 아니라. 주군! 같이 바다에 나가요!"
10046-100460110 = "여름에, 그리고 바다에 적응한 닌자가 되기 위해, 수련 개시예요!"
10046-100460120 = "뭐, 그럼 그럴까?"
10046-100460130 = "에헤헷! 기다리고 있을게요!"
10046-100460140 = "주군!"
10046-100460150 = "혹시 오늘 시간이 괜찮으시다면……."
10046-100460160 = "물론이지! 이즈나가 부른다면 어디든 갈게!"
10046-100460170 = "아……"
10046-100460180 = "네!"
10046-100460190 = "에헤헷!"
10046-100460200 = "네! 그럼 바닷가에서 봐요! 주군!"
10046-100460210 = "주군~! 오늘도 아침부터 무지막지하게 더운 거 있죠~!"
10046-100460220 = "이즈나, 어찌나 더웠는지……."
10046-100460230 = "아침에 일어났을 땐 꼬리가 땀으로 축축해져서~"
10046-100460240 = "우왓, 그건 엄청 큰일이었겠네."
10046-100460250 = "하지만! 이런 더위가 방해할지라도!"
10046-100460260 = "이즈나! 오늘도 주군과 함께! 힘차게 수련하고 싶어요!"
10046-100460270 = "그래서 말이지만, 주군-!"
10046-100460280 = "응. 이즈나. 그러면 거기서 만날까."
10046-100460290 = "에헤헷! 네!"
10046-100460300 = "이즈나! 바로 준비하고 나갈게요!"
10046-100460310 = "아, 저기, 그게……."
10046-100460320 = "죄송해요! 주군!"
10046-100460330 = "이즈나가 먼저 수련을 하자고 했는데……. 도중에 잠들어 버리다니!"
10046-100460340 = "신경 쓰지 마. 모래찜질하다 보면 종종 있지. 그런 일."
10046-100460350 = "주군……!"
10046-100460360 = "아직 시간은 얼마든지 있으니까. 나중에 또 하자. 수련."
10046-100460370 = "앗, 네!"
10046-100460380 = "에헤헷! 그럼 나중에 또!"
10046-100460390 = "그때 뵈어요! 주군!"
10046-100460400 = "주군! 오늘은 무얼 해볼까요?"
10046-100460410 = "이즈나! 주군과 하고 싶은 게 산더미예요!"
10046-100460420 = "오늘도 덥네…. 오늘은 뭘 할까?"
10046-100460430 = "그러네요! 으음!"
10046-100460440 = "수영…은 하기 싫어?"
10046-100460450 = "네? 아, 저기."
10046-100460460 = "그게…. 그러니까…."
10046-100460470 = "이즈나는 수영하는 거, 싫어해?"
10046-100460480 = "아, 아, 아니, 그게. 시, 싫다고 할까…."
10046-100460490 = "그러니까."
10046-100460500 = "이즈나는, 그게…."
10046-100460510 = "이, 일단! 바, 바닷가에서 기다리고 있을게요! 주군!"
10046-100460520 = "아, 응."

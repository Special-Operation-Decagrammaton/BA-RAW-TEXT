[translation]
10119-101190010 = "啊，老師"
10119-101190020 = "不好意思，你剛剛有找我嗎？"
10119-101190030 = "嗨，名草！"
10119-101190040 = "嗯，看來你最近很忙呢"
10119-101190050 = "我剛才在訓練，所以把手機放在旁邊"
10119-101190060 = "有什麼急事嗎……？"
10119-101190070 = "還是需要我幫忙？"
10119-101190080 = "沒有什麼急事，只是我明天打算去一趟百鬼夜行"
10119-101190090 = "想說能不能聊一下百花繚亂的合作業務"
10119-101190100 = "明天……？"
10119-101190110 = "時間方面倒不成問題，但由我來真的可以嗎？"
10119-101190120 = "……怎麼說呢？"
10119-101190130 = "我只是覺得像我這種不值一提的人"
10119-101190140 = "決定百花繚亂的重要業務真的沒問題嗎？"
10119-101190150 = "怎麼會，現在百花繚亂的代表可是名草你哦？"
10119-101190160 = "啊"
10119-101190170 = "抱歉，我總是會忘記"
10119-101190180 = "那麼明天見。我會等你來的"
10119-101190190 = "老師"
10119-101190200 = "你這週末會來百鬼夜行舉辦的商店街慶典嗎？"
10119-101190210 = "沒意外的話應該會過去哦"
10119-101190220 = "正好商會也希望我能過去一趟"
10119-101190230 = "原來如此"
10119-101190240 = "那麼到時候或許能見到面呢"
10119-101190250 = "我也因為商會的請託，要去協助慶典"
10119-101190260 = "名草會在慶典中負責什麼呢？"
10119-101190270 = "我……會在攤位上烤串燒"
10119-101190280 = "因為準備食物的人手不夠"
10119-101190290 = "名草親手烤的串燒，好期待！"
10119-101190300 = "到時候似乎還會賣各種小吃"
10119-101190310 = "希望大家都能玩得開心"
10119-101190320 = "老師也要好好享受慶典哦"
10119-101190330 = "謝謝你，老師"
10119-101190340 = "多虧有你的幫忙，我和商店街的人聊得很開心"
10119-101190360 = "看來你玩得很愉快呢"
10119-101190370 = "嗯"
10119-101190380 = "就像老師說的一樣，我坦白說出心裡的想法之後，大家都很高興"
10119-101190390 = "不過才剛說完，大家就笑成了一團"
10119-101190400 = "我到最後還是不知道哪裡好笑"
10119-101190410 = "你說了什麼呢？"
10119-101190420 = "就算我看起來是個難以親近的神祕冷酷美少女，大家也可以輕鬆對待我沒關係"
10119-101190430 = "名草"
10119-101190440 = "我覺得你比自己想像中還要有趣得多哦"
10119-101190450 = "是嗎……？"
10119-101190460 = "不知道是不是我的錯覺"
10119-101190470 = "最近在天黑後鬧事的妖怪劇團好像變多了"
10119-101190480 = "可能是因為天氣變熱的關係吧？"
10119-101190490 = "畢竟就連不良學生也沒辦法對抗炎熱啊"
10119-101190500 = "……或許是吧"
10119-101190510 = "況且夜裡看守的人比較少"
10119-101190520 = "要摸黑做壞事也更容易"
10119-101190530 = "所以我打算暫時增加夜間巡邏的頻率"
10119-101190540 = "不然要是有人因為晚上的惡作劇受傷就麻煩了"
10119-101190550 = "百花繚亂真辛苦呢"
10119-101190560 = "名草你也要小心哦"
10119-101190570 = "沒事的"
10119-101190580 = "其實我的夜視力意外的還不錯哦"
10119-101190590 = "老師，你聽過雪女的故事嗎？"
10119-101190600 = "在故事裡面，雪女大多被描繪成美女……"
10119-101190610 = "有什麼特別的原因嗎？"
10119-101190620 = "原因應該有很多……"
10119-101190630 = "可能是因為比較容易吸引目光吧？"
10119-101190640 = "確實有可能"
10119-101190650 = "如果缺少能吸引目光的魅力外貌，無論設下什麼陷阱都很難讓人輕易中招吧"
10119-101190660 = "從這個角度來看，我沒變成妖怪真是太好了"
10119-101190670 = "充滿自信的態度很不錯哦"

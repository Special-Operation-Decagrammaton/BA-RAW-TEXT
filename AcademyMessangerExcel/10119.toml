[translation]
10119-101190010 = "อ๊ะ คุณครู"
10119-101190020 = "ขอโทษนะ ติดต่อเข้ามาหรือเปล่า?"
10119-101190030 = "สวัสดี นางุสะ!"
10119-101190040 = "อื้อ กำลังยุ่งมากเลยสินะ"
10119-101190050 = "ฉันกำลังฝึกซ้อมอยู่ ก็เลยวาง\nโทรศัพท์ไว้ที่อื่นน่ะ"
10119-101190060 = "ว่าแต่มีเรื่องด่วนอะไรงั้นเหรอ...?"
10119-101190070 = "หรืออยากให้ฉันช่วยอะไรหรือเปล่า?"
10119-101190080 = "ไม่ใช่เรื่องด่วนหรอก แค่พรุ่งนี้ครู\nจะแวะไปเฮียกคิยาโคเดี๋ยวหนึ่งน่ะ"
10119-101190090 = "ขอคุยเรื่องงานความร่วมมือกับ\nเฮียกกะเรียวรันหน่อยได้มั้ย?"
10119-101190100 = "พรุ่งนี้เหรอ...?"
10119-101190110 = "ฉันก็หาเวลาให้ได้หรอกนะ แต่ว่าจะ\nคุยกับฉันได้เหรอ?"
10119-101190120 = "ทำไมล่ะ...?"
10119-101190130 = "ก็ฉันไม่ใช่คนสำคัญอะไร"
10119-101190140 = "ฉันจะตัดสินใจเรื่องงานสำคัญของ\nเฮียกกะเรียวรันได้หรือเปล่า"
10119-101190150 = "พูดอะไรน่ะ ตอนนี้ตัวแทนของ\nเฮียกกะเรียวรันคือนางุสะนะ"
10119-101190160 = "อ่า"
10119-101190170 = "ขอโทษนะ ฉันลืมอยู่เรื่อยเลย"
10119-101190180 = "เข้าใจแล้ว งั้นเจอกันพรุ่งนี้นะ\nแล้วฉันจะรอ"
10119-101190190 = "คุณครู"
10119-101190200 = "คุณครูจะมาเทศกาลตรอกการค้าที่จะ\nจัดในเฮียกคิยาโคสุดสัปดาห์นี้หรือเปล่า?"
10119-101190210 = "ถ้าไม่มีงานอะไร ครูก็น่าจะไปนะ"
10119-101190220 = "กลุ่มการค้าก็มาขอให้ครูไปร่วมงาน\nเหมือนกัน"
10119-101190230 = "อย่างนั้นสินะ"
10119-101190240 = "ถ้างั้นเราอาจจะได้เจอกันก็ได้นะ"
10119-101190250 = "พวกพ่อค้าก็ขอให้ฉันไปช่วยในงาน\nเทศกาลเหมือนกันน่ะ"
10119-101190260 = "นางุสะต้องทำอะไรในงาน\nเทศกาลเหรอ?"
10119-101190270 = "ฉัน... จะไปช่วยย่างอาหารเสียบไม้ที่\nร้านริมถนน"
10119-101190280 = "พอดีทางนั้นบอกว่ามีคนไม่พอน่ะ"
10119-101190290 = "ของย่างเสียบไม้ฝีมือนางุสะงั้นเหรอ\nครูจะตั้งตารอเลย!"
10119-101190300 = "น่าจะมีอาหารอย่างอื่นขายอีกหลาย\nอย่างเลยละ"
10119-101190310 = "หวังว่าจะเป็นเทศกาลที่ทุกคนได้สนุก\nกันนะ"
10119-101190320 = "ถ้างั้นคุณครูเองก็สนุกกับงานเทศกาล\nด้วยเหมือนกันนะ"
10119-101190330 = "ขอบคุณนะ คุณครู"
10119-101190340 = "ฉันพูดคุยกับคนในย่านการค้าสนุกมาก\nเลยละ"
10119-101190360 = "ได้ไปกินเลี้ยงสนุกเลยสินะ"
10119-101190370 = "อื้อ"
10119-101190380 = "พอฉันพูดอย่างตรงไปตรงมาตามที่\nคุณครูแนะนำ ทุกคนก็พากันชอบใจน่ะ"
10119-101190390 = "แต่พอฉันพูดจบ ทุกคนก็ปรบมือ\nแล้วก็หัวเราะลั่นเลย"
10119-101190400 = "จนฉันไม่รู้ว่าพวกเขาตลกกับตรงไหน\nที่ฉันพูดกันแน่"
10119-101190410 = "พูดไปว่าอะไรเหรอ?"
10119-101190420 = "ฉันบอกไปว่าต่อให้ฉันจะดูเหมือนสาว\nสวยสุดคูลที่ดูลึกลับและเข้าถึงยาก\nแต่ก็ให้ทำตัวตามสบายกับฉันได้เลย"
10119-101190430 = "นางุสะ"
10119-101190440 = "นางุสะต้องรู้นะว่าตัวเองเป็นคนตลก\nเฮฮามากกว่าที่คิดน่ะ"
10119-101190450 = "งั้นเหรอ...?"
10119-101190460 = "หมู่นี้ไม่รู้ฉันคิดไปเองหรือเปล่า"
10119-101190470 = "หลังจากพระอาทิตย์ตก เหมือนพวก\nปีศาจจะออกมาก่อปัญหากันเยอะขึ้นเลย"
10119-101190480 = "ออกมาข้างนอกกันเยอะเพราะอากาศ\nร้อนหรือเปล่า?"
10119-101190490 = "ถึงจะเป็นเด็กเกเร แต่ก็น่าจะทน\nอากาศร้อนไม่ได้หรอก"
10119-101190500 = "ก็อาจจะเป็นอย่างนั้นก็ได้..."
10119-101190510 = "ตอนกลางคืนก็มีคนออกไปตรวจตรา\nกันน้อยด้วย"
10119-101190520 = "ถ้าคิดจะทำอะไรไม่ดี ตอนมืดค่ำดึกดื่น\nก็ถือว่าเหมาะเลยละ"
10119-101190530 = "ฉันก็เลยจะออกไปลาดตระเวนตอน\nกลางคืนให้ถี่กว่าเดิมหน่อยน่ะ"
10119-101190540 = "ถ้ามีนักเรียนบาดเจ็บจากการเล่นอะไร\nแผลงๆ ตอนกลางคืนละยุ่งเลย"
10119-101190550 = "เฮียกกะเรียวรันก็เหนื่อยไม่แพ้กัน\nเลยนะ"
10119-101190560 = "ตอนกลางคืนนางุสะก็ระวังตัวด้วยนะ"
10119-101190570 = "ไม่เป็นไรหรอก"
10119-101190580 = "เห็นฉันอย่างนี้ ตอนกลางคืนฉันตาดี\nมากนะ"
10119-101190590 = "คุณครู เคยได้ยินเรื่องของหญิงหิมะ\nหรือเปล่า?"
10119-101190600 = "ในนิทานพื้นบ้าน หญิงหิมะมักถูก\nพรรณาว่าเป็นหญิงงาม..."
10119-101190610 = "มีเหตุผลอะไรเป็นพิเศษหรือเปล่านะ?"
10119-101190620 = "ก็คงมีหลายๆ เหตุผลน่ะนะ..."
10119-101190630 = "แต่เพราะน่าจะดึงดูดสายตาผู้คนได้\nง่ายหรือเปล่า?"
10119-101190640 = "อาจจะเป็นอย่างนั้นก็ได้นะ"
10119-101190650 = "ถ้าไม่มีรูปลักษณ์ที่ดึงดูดความสนใจ\nได้ง่าย ไม่ว่าจะวางกับดักอะไรไว้\nผู้คนที่ผ่านไปมาก็คงไม่ติดกับง่ายๆ หรอก"
10119-101190660 = "ในแง่นั้น ฉันคิดว่าโชคดีแล้วละที่ฉัน\nไม่ได้กลายเป็นปีศาจหรืออะไรพวกนั้นไป"
10119-101190670 = "ครูชอบที่นางุสะมีความมั่นใจ\nเต็มเปี่ยมแบบนี้จัง"

[translation]
10119-101190010 = "아, 선생님."
10119-101190020 = "미안. 혹시 연락했었어?"
10119-101190030 = "안녕, 나구사!"
10119-101190040 = "응. 많이 바빴던 모양이네."
10119-101190050 = "훈련 중이라 잠시 핸드폰을 다른 곳에 두고 있었거든."
10119-101190060 = "그보다 무슨 급한 일이라도…?"
10119-101190070 = "혹시 내 도움이 필요한 일이 있어?"
10119-101190080 = "급한 일은 아니고, 내일 백귀야행에 잠깐 방문할 예정이거든."
10119-101190090 = "그때 백화요란의 협력 업무에 관해 잠깐 논의할 수 있을까?"
10119-101190100 = "내일……?"
10119-101190110 = "시간을 내는 건 어렵지 않지만, 내가 해도 괜찮을까?"
10119-101190120 = "……뭐가?"
10119-101190130 = "아무것도 아닌 내가"
10119-101190140 = "백화요란의 중요한 업무를 결정해도 괜찮을지."
10119-101190150 = "무슨 소리야. 지금 백화요란의 대표는 나구사잖아?"
10119-101190160 = "아"
10119-101190170 = "미안. 자꾸 잊어버리게 되네."
10119-101190180 = "알겠어. 그럼 내일 보자. 기다리고 있을게."
10119-101190190 = "선생님."
10119-101190200 = "혹시 이번 주 주말에 백귀야행에서 열리는 골목 상가 축제에 올 예정 있어?"
10119-101190210 = "특별한 일이 없으면 갈 것 같네."
10119-101190220 = "안 그래도 상인회에서 한 번 와 달라는 부탁을 받았거든."
10119-101190230 = "그렇구나."
10119-101190240 = "그럼, 그때 잠깐 볼 수 있을지도 모르겠네."
10119-101190250 = "상인들의 부탁으로 나도 축제를 도우러 갈 예정이었거든."
10119-101190260 = "나구사는 축제에서 무슨 역할을 맡았는데?"
10119-101190270 = "나는… 노점상에서 꼬치구이를 구울 예정이야."
10119-101190280 = "음식을 준비하는 데 손이 모자란다고 해서."
10119-101190290 = "나구사가 직접 굽는 꼬치구이라니, 기대가 되는걸!"
10119-101190300 = "그 외에도 여러 가지 길거리 음식을 파는 모양인가 봐."
10119-101190310 = "모두에게 즐거운 축제가 되었으면 좋겠네."
10119-101190320 = "그럼 선생님도 즐거운 축제를 즐기길."
10119-101190330 = "고마워, 선생님."
10119-101190340 = "덕분에 상점가 사람들과 즐겁게 이야기하고 왔어."
10119-101190360 = "재미있게 놀다 온 모양이네."
10119-101190370 = "응"
10119-101190380 = "선생님의 말처럼 솔직하게 이야기했더니 다들 좋아해 주었어."
10119-101190390 = "그런데 내 말이 끝나자마자 다들 박장대소를 해서"
10119-101190400 = "결국 어떤 점이 재미있었는지는 알기 어려웠지만."
10119-101190410 = "뭐라고 말했는데?"
10119-101190420 = "내가 다가가기 어려운, 신비롭고 쿨한 인상의 미소녀처럼 보이더라도 부디 편히 대해 달라고."
10119-101190430 = "나구사."
10119-101190440 = "넌 스스로 생각하는 것보다 본인이 훨씬 재미있는 사람이라는 걸 알아야 해."
10119-101190450 = "그런가……?"
10119-101190460 = "요즈음은 기분 탓인지"
10119-101190470 = "해가 진 어두운 때에 말썽을 부리는 망량즈가 늘어난 것 같아"
10119-101190480 = "날이 더워진 탓이려나?"
10119-101190490 = "불량 학생들도 더위는 어쩔 수 없을 테니까."
10119-101190500 = "……그럴지도 모르겠네."
10119-101190510 = "그 외에도 밤 중에는 지켜보는 사람이 적으니까"
10119-101190520 = "어둠을 틈타 나쁜 일을 저지르기도 좋지."
10119-101190530 = "그래서 당분간은 야간 순찰 빈도를 조금 늘려보려 해"
10119-101190540 = "어두운 밤에 위험한 장난을 치다 다치는 학생이 나오면 곤란하니까"
10119-101190550 = "백화요란도 고생이 많네."
10119-101190560 = "나구사도 어두운 밤길은 조심해야 해."
10119-101190570 = "괜찮아."
10119-101190580 = "이래 봬도 밤눈은 꽤 밝은 편이거든."
10119-101190590 = "선생님, 설녀의 이야기를 들어본 적 있어?"
10119-101190600 = "어느 설화에나 설녀는 미녀로 그려지는 경우가 많던데……"
10119-101190610 = "특별한 이유라도 있는 걸까?"
10119-101190620 = "여러 가지 이유가 있겠지만……"
10119-101190630 = "눈길을 끌기 쉬워서가 아닐까?"
10119-101190640 = "확실히, 그럴지도 모르겠네."
10119-101190650 = "시선을 쉽게 끄는 매력적인 외모의 소유자가 아니라면 어떤 함정을 파 놓는다 하더라도 행인이 쉽게 걸려들지 않을 테니까"
10119-101190660 = "그런 의미에서 나는 요괴가 되지 않아서 다행이라고 생각해"
10119-101190670 = "자신감 넘치는 그 태도 보기 좋습니다"

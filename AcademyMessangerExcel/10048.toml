[translation]
10048-100480010 = "선생."
10048-100480020 = "앗, 사오리?! 사오리야?!"
10048-100480030 = "별일이네. 사오리가 연락을 다 주고!"
10048-100480040 = "…아니, 그렇게 호들갑 떨 것까진…."
10048-100480050 = "나도 선생에게 연락할 생각까진 없었지만…."
10048-100480060 = "아무래도… 조금 문제가 생긴 듯, 하여."
10048-100480070 = "문제?"
10048-100480080 = "선생이 아니면 해결할 수 없는 문제, 라고 할까."
10048-100480090 = "염치가 없다는 건 알고 있어. 하지만…."
10048-100480100 = "알았어. 지금 바로 갈게!"
10048-100480110 = "아… 응."
10048-100480120 = "…그럼, 기다리고 있겠다."
10048-100480130 = "그… 선생. 오늘은, 날씨가 좋군."
10048-100480140 = "어…?!"
10048-100480150 = "…왜 그러지. 선생?"
10048-100480160 = "아니, 사오리한테서 날씨 이야기라니."
10048-100480170 = "완전 깜짝 놀라버렸어!"
10048-100480180 = "아니, 나라도 이 정도 안부 인사는……."
10048-100480190 = "지난번엔 선생 도움 덕에 통장도 개설했고."
10048-100480200 = "덕분에 일도 시작해서, 조금은 근황을 전해둘까. 했을 뿐이다."
10048-100480210 = "뭐, 괜한 짓이었다면 그만두겠지만."
10048-100480220 = "아니아니, 전달해줘! 사오리의 근황! 최근엔 무슨 일이 있었어?!"
10048-100480230 = "호들갑은……. 아, 음. 최근엔 블랙마켓을 통해 소개받은 일을 하고 있다."
10048-100480240 = "그거 잘됐네!"
10048-100480250 = "……잘됐다, 라기엔 다소 문제가……"
10048-100480260 = "아니, 아니다. 그래. 잘된 거겠지."
10048-100480270 = "그럼 다음에 또 기회가 되면 연락하겠어. 이만."
10048-100480280 = "아, 응……?"
10048-100480290 = "선생, 저번의 실수를 말미암아."
10048-100480300 = "이번에 블랙마켓 은행으로부터 소개받은 일에선"
10048-100480310 = "확실히 계약서도 제대로 썼어."
10048-100480320 = "그래? 잘됐네!"
10048-100480330 = "그래서 어떤 일을 구했는데?"
10048-100480340 = "제법 간단한 미션이더군."
10048-100480350 = "블랙마켓의 항쟁을 마무리하는 일이지."
10048-100480360 = "사, 사, 사오리?!"
10048-100480370 = "선생. 혹시나 알고 있다면 말인데."
10048-100480380 = "좋은 수리공을 알고 있나?"
10048-100480390 = "꼭 고치고 싶은 장비가 있다."
10048-100480400 = "응? 어떤 종류의 장비야?"
10048-100480410 = "그건……."
10048-100480420 = "여기서 말하긴 좀 복잡하군."
10048-100480430 = "내가 그쪽으로 가겠다."
10048-100480440 = "만나서 이야기하지."

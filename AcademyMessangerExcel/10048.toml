[translation]
10048-100480010 = "ครู"
10048-100480020 = "อ๊ะ ซาโอริ?! ซาโอรินี่นา?!"
10048-100480030 = "แปลกจังที่ซาโอริติดต่อมาก่อนเนี่ย!"
10048-100480040 = "ไม่เห็นต้องเวอร์ขนาดนั้นเลย..."
10048-100480050 = "ที่จริงฉันไม่ได้คิดจะติดต่อหาครูหรอก..."
10048-100480060 = "แต่ว่าฉัน... มีปัญหานิดหน่อยน่ะ"
10048-100480070 = "ปัญหาเหรอ?"
10048-100480080 = "ฉันไม่รู้ว่าใครจะช่วยเรื่องนี้ได้น่ะ..."
10048-100480090 = "ฉันรู้ว่าแบบนี้มันดูน่าละอาย แต่ว่า..."
10048-100480100 = "เข้าใจแล้ว\nครูจะรีบไปหานะ!"
10048-100480110 = "อะ...อื้อ"
10048-100480120 = "ถ้างั้น ฉันจะรอแล้วกัน"
10048-100480130 = "เอ่อ... ครู วันนี้อากาศดีนะ"
10048-100480140 = "โห ฟ้าถล่มแน่เลย"
10048-100480150 = "ทำไมเหรอ ครู?"
10048-100480160 = "เปล่าหรอก ไม่คิดว่าซาโอริจะคุย\nเรื่องดินฟ้าอากาศน่ะ"
10048-100480170 = "ตกใจจนเกือบหัวใจวายแน่ะ!"
10048-100480180 = "เดี๋ยวสิ เรื่องแบบนี้ฉันก็คุยเป็นนะ..."
10048-100480190 = "คราวก่อนได้คุณครูช่วยไว้\nฉันเลยเปิดบัญชีธนาคารได้"
10048-100480200 = "ตอนนี้ฉันเริ่มทำงานแล้วล่ะ\nเลยแชตมาบอกเฉยๆ"
10048-100480210 = "แต่ถ้าไม่อยากรู้ ฉันก็จะไม่บอก"
10048-100480220 = "เดี๋ยวๆ ครูอยากรู้สิ บอกเถอะ!\nแล้วช่วงนี้เป็นยังไงบ้าง?"
10048-100480230 = "พิมพ์รัวไปมั้ย... อืม ไม่นานมานี้\nมีคนแนะนำงานในตลาดมืดมาให้น่ะ"
10048-100480240 = "โอ้ แบบนั้นก็ดีแล้วนะ!"
10048-100480250 = "ไม่รู้สิว่ามัน \"ดี\" รึเปล่า..."
10048-100480260 = "เดาว่าคงเป็นเรื่องดีแหละ..."
10048-100480270 = "เอาไว้ถ้ามีโอกาสจะติดต่อมาใหม่นะ"
10048-100480280 = "อะ...อื้อ"
10048-100480290 = "ครู... ฉันเรียนรู้จากความผิดพลาด\nคราวก่อนแล้วละ"
10048-100480300 = "คราวนี้ตอนที่ได้รับแนะนำงาน\nจากธนาคารตลาดมืด"
10048-100480310 = "ฉันไม่ลืมให้เซ็นสัญญาจ้างแล้วนะ"
10048-100480320 = "งั้นเหรอ เยี่ยมเลย!"
10048-100480330 = "แล้วคราวนี้ได้งานอะไรเหรอ?"
10048-100480340 = "ภารกิจง่ายๆ น่ะ"
10048-100480350 = "งานเก็บกวาดพวกที่มีเรื่องกัน\nในตลาดมืดน่ะ"
10048-100480360 = "ซะ...ซาโอริ?!"
10048-100480370 = "ครู ฉันแค่มาถามเผื่อครูจะรู้น่ะ"
10048-100480380 = "คือว่ารู้จักร้านซ่อมดีๆ บ้างมั้ย?"
10048-100480390 = "พอดีมีอุปกรณ์ที่ฉันอยากซ่อมนิดหน่อยน่ะ"
10048-100480400 = "หืม? อุปกรณ์ประเภทไหนเหรอ?"
10048-100480410 = "เรื่องนั้น..."
10048-100480420 = "มันซับซ้อนเกินจะพิมพ์ในแชตน่ะ"
10048-100480430 = "เดี๋ยวฉันจะไปหาแล้วกัน"
10048-100480440 = "แล้วจะเล่าให้ฟัง"

[translation]
10048-100480010 = "老師"
10048-100480020 = "沙織！？"
10048-100480030 = "沙織居然會聯絡我……！"
10048-100480040 = "有這麼吃驚嗎……"
10048-100480050 = "我本來也沒打算要聯絡你"
10048-100480060 = "但發生了點問題"
10048-100480070 = "問題？"
10048-100480080 = "是只有老師能解決的問題……"
10048-100480090 = "我知道這樣很厚臉皮。但……"
10048-100480100 = "我知道了，馬上過去！"
10048-100480110 = "……是嗎"
10048-100480120 = "那麼，我等著"
10048-100480130 = "那個……老師，今天天氣真好啊"
10048-100480140 = "咦……！？"
10048-100480150 = "……怎麼了嗎，老師？"
10048-100480160 = "沒有，只是沙織居然會聊天氣……"
10048-100480170 = "嚇了我一跳！"
10048-100480180 = "……就算是我，也會有想閒聊的時候"
10048-100480190 = "前幾天多虧了老師，我才能順利開設帳戶"
10048-100480200 = "近期也開始收到各種委託，所以想傳達一下近況"
10048-100480210 = "如果不需要的話，之後我會避免"
10048-100480220 = "不不不，我也想知道沙織的近況！最近有發生什麼事嗎！？"
10048-100480230 = "太浮誇了……我最近在處理黑市介紹的委託"
10048-100480240 = "太好了！"
10048-100480250 = "算不算好我也不太清楚……"
10048-100480260 = "嗯，應該算是好事吧"
10048-100480270 = "有事的話會再聯絡"
10048-100480280 = "啊……"
10048-100480290 = "老師，有鑑於上次的失敗"
10048-100480300 = "這次黑市的委託"
10048-100480310 = "我有確實寫好合約"
10048-100480320 = "是嗎？那真是太好了！"
10048-100480330 = "話說這次是什麼委託呢？"
10048-100480340 = "是個挺簡單的任務"
10048-100480350 = "只需要結束黑市的紛爭而已"
10048-100480360 = "沙，沙，沙織！？"
10048-100480370 = "老師，我想老師說不定會知道"
10048-100480380 = "請問你有認識手藝不錯的修理工嗎？"
10048-100480390 = "我有設備想要修理"
10048-100480400 = "嗯？是什麼種類的設備？"
10048-100480410 = "這……"
10048-100480420 = "說來話長，在這裡有點難解釋"
10048-100480430 = "我過去找你"
10048-100480440 = "直接見面談吧"

[translation]
20004-20004010 = "선생님, 오후에 시내에서 잠깐 어울려 주실 수 있나요?"
20004-20004020 = "다름이 아니라 이번 하계 훈련에 사용할 새 수영복을 사려고 해서요."
20004-20004030 = "상관없지만……"
20004-20004040 = "친구가 아니라 나랑 가도 괜찮아?"
20004-20004050 = "중학교 때부터 입던 수영복이 있기는 하지만 더 입기에는 작아진 것 같아서요."
20004-20004060 = "모처럼 정의실현부에 들어왔으니 다른 부원, 선배 여러분께 부끄럽지 않을 멋진 수영복을 새로 갖고 싶습니다."
20004-20004070 = "멋진 수영복을 찾을 수 있으면 좋겠네."
20004-20004080 = "네, 그러기 위해서는 선생님의 도움이 필요합니다."
20004-20004090 = "그럼 매장에서 먼저 기다리고 있겠습니다."
20004-20004100 = "선생님, 지금 바로 이 앞의 해변으로 나와주실 수 있으신가요?"
20004-20004110 = "선생님께 보여드리고 싶은 옷이 있습니다."
20004-20004120 = "수영복 말이지?"
20004-20004130 = "전에 구입한 이후로 입어볼 기회가 통 없었는데, 마침 여름 훈련을 나온 참에 입어보았습니다."
20004-20004140 = "이 옷은 백사장에서만 입을 수 있는 옷이니까요."
20004-20004150 = "수영복 말이지……?"
20004-20004160 = "하지만 가급적 빨리 와주실 수 있겠습니까?"
20004-20004170 = "이 옷을 입고 백사장 한가운데에서 기다리는 건 꽤나 고된 일이므로……"
20004-20004180 = "수영복 이야기하는 거 맞지?!"
20004-20004190 = "선생님, 전에 말씀드린 수영 훈련을 오늘 오후에 진행하려 합니다."
20004-20004200 = "마시로가 걱정되니 이번에도 따라갈게."
20004-20004210 = "오시는 건 상관없습니다만……"
20004-20004220 = "이번 훈련은 물 위에서 하는 훈련이니 열사병으로 쓰러지는 일은 없을 겁니다."
20004-20004230 = "다만 수영을 하기 전에 백사장 위에서 가벼운 준비운동을 할까 하는데…… 이 정도는 괜찮겠지요?"
20004-20004240 = "물론이지."
20004-20004250 = "수영 전의 준비운동은 중요하니까."
20004-20004260 = "이해해 주셔서 감사합니다."
20004-20004270 = "그럼 해수욕장에서 뵙겠습니다!"
20004-20004280 = "어제는 수고 많으셨습니다, 선생님."
20004-20004290 = "마시로는 오늘도 훈련하러 나가는 거야?"
20004-20004300 = "아뇨, 오늘은 훈련 대신 해변에서 봉사활동을 할 계획입니다."
20004-20004310 = "봉사활동?"
20004-20004320 = "예, 이곳 해변에도 도움의 손길을 기다리고 있는 일은 잔뜩 있으니까요."
20004-20004330 = "쓰레기 치우기부터 길 잃은 미아를 보호하는 일까지……"
20004-20004340 = "휴양지에서까지 고생이 많네."
20004-20004350 = "아뇨, 제게는 그다지 수고스러운 일도 아닙니다."
20004-20004360 = "이 또한 정의를 위한 일이니까요!"

[translation]
20004-20004010 = "Sensei, could you come with me downtown this afternoon?"
20004-20004020 = "I want to purchase a new swimsuit to use during summer training."
20004-20004030 = "I mean, it's fine, but..."
20004-20004040 = "Wouldn't you rather go with friends?"
20004-20004050 = "I still have my swimsuit from middle school, but I think it's too small for me now."
20004-20004060 = "I think I should get a new one that lives up to being a member of the Justice Task Force."
20004-20004070 = "I hope you can find a good one."
20004-20004080 = "Yes, and I'll need your help with that, Sensei."
20004-20004090 = "I'll be waiting for you at the store."
20004-20004100 = "Sensei, could you meet me on the beach?"
20004-20004110 = "I want to show you something."
20004-20004120 = "Oh, is it the swimsuit?"
20004-20004130 = "This is my first time trying it on since we're here for summer training."
20004-20004140 = "I couldn't bring myself to wear it anywhere but the beach."
20004-20004150 = "Your swimsuit, right...?"
20004-20004160 = "Could you come here as soon as you can?"
20004-20004170 = "It's embarrassing waiting in the middle of the beach in this by myself..."
20004-20004180 = "You are talking about your swimsuit, right?"
20004-20004190 = "I'd like to continue with the swimming lessons this afternoon, Sensei."
20004-20004200 = "I'd like to go together since I'm worried about you."
20004-20004210 = "It's fine if you come along..."
20004-20004220 = "I shouldn't get heatstroke this time since this training will be in the water."
20004-20004230 = "I plan to do some warm-up exercises on the beach beforehand. That would be okay, right?"
20004-20004240 = "Of course."
20004-20004250 = "Warming up IS important before swimming."
20004-20004260 = "Thank you for understanding."
20004-20004270 = "I'll see you on the beach, then!"
20004-20004280 = "Thank you for what you did yesterday, Sensei."
20004-20004290 = "Are you going out to train today again, Mashiro?"
20004-20004300 = "No, I plan to do some volunteer work at the beach instead of training."
20004-20004310 = "Volunteer?"
20004-20004320 = "Correct. There are several ways to help people at the beach as well."
20004-20004330 = "Such as picking up trash or helping lost children."
20004-20004340 = "You've got a lot going on, even on vacation."
20004-20004350 = "Not really. It's nothing that I can't handle."
20004-20004360 = "This is for the sake of justice!"

[translation]
20004-20004010 = "คุณครูคะ ช่วงบ่ายช่วยออกมาในเมือง\nสักครู่ได้มั้ยคะ?"
20004-20004020 = "ฉันอยากจะไปซื้อชุดว่ายน้ำใหม่ที่จะ\nใช้ในการเข้าค่ายฤดูร้อนที่จะถึงนี้ค่ะ"
20004-20004030 = "ครูก็ไม่ได้ติดงานอยู่หรอกนะแต่ว่า..."
20004-20004040 = "ชวนครูไปแทนเพื่อนๆ จะดีเหรอ?"
20004-20004050 = "ฉันมีชุดว่ายน้ำที่ใช้ตอนอยู่ชั้นประถม\nก็จริง แต่ดูเหมือนว่ามันจะเล็กเกินไป\nแล้วน่ะค่ะ"
20004-20004060 = "อีกอย่างฉันเองก็เป็นสมาชิกของชมรม\nทวงความยุติธรรม เลยคิดว่าควรซื้อชุด\nใหม่เพื่อรักษาชื่อเสียงของรุ่นพี่ทุกคน\nด้วยค่ะ"
20004-20004070 = "ถ้าเจอชุดว่ายน้ำสวยๆ ที่ถูกใจก็คงดีนะ"
20004-20004080 = "ค่ะ เพราะงั้นฉันเลยอยากให้คุณครูช่วยค่ะ"
20004-20004090 = "ถ้างั้นฉันจะไปรอคุณครูที่ร้านนะคะ"
20004-20004100 = "คุณครู ช่วยออกมาที่ชายหาดหน่อยได้\nมั้ยคะ?"
20004-20004110 = "ฉันมีชุดที่อยากให้คุณครูดูค่ะ"
20004-20004120 = "ว้าว จะโชว์ชุดว่ายน้ำใหม่เหรอ?"
20004-20004130 = "หลังจากที่ซื้อมาแล้วก็ยังไม่ได้ลองใส่\nเลย มาเข้าค่ายฤดูร้อนครั้งนี้เลยเอามา\nใส่ดูน่ะค่ะ "
20004-20004140 = "ชุดนี้เหมาะที่จะใส่บนหาดทรายสีขาว\nเท่านั้นค่ะ"
20004-20004150 = "ชุดว่ายน้ำใช่มั้ย...?"
20004-20004160 = "แต่ว่าคุณครูช่วยรีบมาหน่อยได้มั้ยคะ?"
20004-20004170 = "พอใส่ชุดนี้แล้วยืนรออยู่กลางชายหาด\nแบบนี้มันค่อนข้างน่าอายนิดๆ ค่ะ"
20004-20004180 = "หมายถึงชุดว่ายน้ำใช่มั้ยน่ะ...?!"
20004-20004190 = "คุณครู วันนี้ตอนช่วงบ่ายเราจะไปฝึก\nว่ายน้ำกันตามที่ฉันเคยบอกไปนะคะ"
20004-20004200 = "ครูเป็นห่วงมาชิโระนะ งั้นเดี๋ยวครูไป\nด้วยแล้วกัน"
20004-20004210 = "คุณครูมาด้วยก็ได้ค่ะ แต่ว่า..."
20004-20004220 = "การฝึกครั้งนี้เป็นการฝึกในน้ำ คราวนี้\nคงไม่มีทางร้อนจนเป็นลมหรอกค่ะ"
20004-20004230 = "แต่ว่าก่อนที่จะลงไปฝึกว่ายน้ำ จะต้อง\nมีการวอร์มอัปบนชายหาดก่อน... คงไม่\nเป็นอะไรหรอกใช่มั้ยคะ?"
20004-20004240 = "ได้อยู่แล้ว"
20004-20004250 = "การวอร์มอัปก่อนลงว่ายน้ำเป็น\nเรื่องสำคัญนะ"
20004-20004260 = "ขอบคุณที่เข้าใจนะคะ"
20004-20004270 = "ถ้างั้นเจอกันที่ชายหาดนะคะ!"
20004-20004280 = "เมื่อวานขอบคุณมากนะคะคุณครู"
20004-20004290 = "วันนี้มาชิโระก็จะออกไปฝึกงั้นเหรอ?"
20004-20004300 = "เปล่าค่ะ วันนี้ฉันจะไปทำกิจกรรม\nจิตอาสาที่ชายหาดแทนค่ะ"
20004-20004310 = "กิจกรรมจิตอาสา?"
20004-20004320 = "ค่ะ ที่ชายหาดที่นี่ก็มีงานที่รอให้ไปทำ\nอยู่เยอะแยะเลยค่ะ"
20004-20004330 = "ตั้งแต่งานเก็บขยะไปจนถึงการพา\nเด็กหลงทางไปส่ง..."
20004-20004340 = "ถึงจะมาพักผ่อนก็ยังตั้งใจทำงาน\nอยู่สินะ~"
20004-20004350 = "ไม่หรอกค่ะ เรื่องพวกนี้ไม่ใช่เรื่อง\nลำบากอะไรเลย"
20004-20004360 = "เพราะมันเป็นงานเพื่อความยุติธรรม\nยังไงล่ะคะ!"

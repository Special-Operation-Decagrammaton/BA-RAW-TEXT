[translation]
20004-20004010 = "老師。今天下午能陪我一下嗎？"
20004-20004020 = "其實我想買這次訓練用的新泳裝。希望能給我一些建議"
20004-20004030 = "那個，雖然很想陪你去……"
20004-20004040 = "不過不是跟朋友去而是跟我，沒關係嗎？"
20004-20004050 = "是的，希望能拜託老師。那個，其實，我有件從國中時期穿到現在的泳裝，但變得有點緊……"
20004-20004060 = "因為是難得的機會，身為實現正義部的一員，想要一件更合適的泳裝"
20004-20004070 = "這，這樣啊……"
20004-20004080 = "是的，所以想借助老師的力量"
20004-20004090 = "那麼，我等著唷"
20004-20004100 = "老師，現在可以來海邊嗎？"
20004-20004110 = "有想給老師看的東西"
20004-20004120 = "嗯，馬上過去唷"
20004-20004130 = "上次買了之後一直沒機會穿，但難得都到海邊來了"
20004-20004140 = "應該說，也只能在這種地方穿"
20004-20004150 = "是在說上次買的泳裝嗎？"
20004-20004160 = "啊，如果可以早點來的話，就幫大忙了"
20004-20004170 = "要我用這身打扮等人，實在有點……"
20004-20004180 = "咦，不是泳裝嗎！？到底穿了什麼！？"
20004-20004190 = "老師。我的身體狀況已經恢復了，所以想照之前說的那樣，先去稍微游個泳"
20004-20004200 = "那麼，我也過去那邊吧"
20004-20004210 = "嗯，老師能來的話是很高興啦……"
20004-20004220 = "但這次只是游泳，不用那麼擔心也沒關係吧……？"
20004-20004230 = "只是在游泳前，在海邊做些簡單的準備運動……"
20004-20004240 = "慎重起見。我還是陪著吧"
20004-20004250 = "而且我想看麻白游泳"
20004-20004260 = "原，原來如此……原來是這樣啊"
20004-20004270 = "那麼，我等老師來"
20004-20004280 = "昨天辛苦了，老師"
20004-20004290 = "辛苦了。麻白今天也要訓練嗎？"
20004-20004300 = "不，今天不是訓練，而是打算做志工服務"
20004-20004310 = "志工服務？"
20004-20004320 = "是的，聽說很需要人手幫忙"
20004-20004330 = "例如撿垃圾或保護迷路的孩子等等，海邊其實會發生很多狀況"
20004-20004340 = "麻白真了不起"
20004-20004350 = "不，沒什麼大不了的"
20004-20004360 = "這也是為了正義所做的活動！"

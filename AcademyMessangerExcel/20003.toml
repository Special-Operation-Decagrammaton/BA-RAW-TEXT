[translation]
20003-2136 = "오늘도 수고 많으셨습니다."
20003-2137 = "마시로도 수고 많았어."
20003-2138 = "선생님의 지휘 덕분에 오늘도 다치지 않고 무사히 악을 섬멸할 수 있었습니다."
20003-2139 = "선생님의 지휘는 완벽했습니다. 오늘도 한 수 배웠습니다."
20003-2140 = "다만……."
20003-2141 = "다만……?"
20003-2142 = "무슨 문제라도 있어?"
20003-2143 = "그게 작전 중에 치마의 솔기가 뜯어져서……"
20003-2144 = "여벌 제복이 추가로 필요할지도 모르겠습니다."
20003-2145 = "최근에 정의와 관련된 흥미로운 책을 읽었습니다."
20003-2146 = "정의를 추구하는 자가 여러 가지 상황에서 어떻게 행동해야 할지"
20003-2147 = "알려주는 책이더군요."
20003-2148 = "정의의 용사를 위한 매뉴얼 같은 건가?"
20003-2149 = "불의를 추구하는 자를 위한 책도 있어?"
20003-2150 = "말하자면 그렇습니다. 매우 흥미롭더군요."
20003-2151 = "그건 잘 모르겠습니다만……."
20003-2152 = "그런데 책을 읽다 보니 이해가 가질 않는 부분이 몇 가지 있었습니다."
20003-2153 = "분명 정의에 대한 제 이해가 부족해서 그런 것이겠지요."
20003-2154 = "괜찮으시다면 선생님께서 제게 정의를 알려주시겠습니까?"
20003-2155 = "정의……?"
20003-2156 = "금일 샬레의 사격장에서 진행한 훈련을 종료했습니다. 바로 학교로 복귀하겠습니다."
20003-2157 = "저격수는 평소에 어떤 훈련을 주로 해?"
20003-2158 = "저격수의 훈련이 궁금하시다고요?"
20003-2159 = "저격수의 훈련도 다른 병과의 학생들과 크게 다르지는 않습니다."
20003-2160 = "다른 점이라면 역시 은신에 필요한 기술을 익히는 정도일까요."
20003-2161 = "나도 견학해 볼 수 없을까?"
20003-2162 = "견학하시는 건 상관없지만…… 그다지 재미는 없을 겁니다."
20003-2163 = "오늘 훈련으로 인해"
20003-2164 = "예정된 당번 활동은 연기되었습니다."
20003-2165 = "참고 부탁드립니다."
20003-2166 = "오늘 훈련에도 같이 따라가도 괜찮아?"
20003-2167 = "오늘도 훈련을 도와주시겠다고요?"
20003-2168 = "응, 무슨 문제라도 있어?"
20003-2169 = "참관은 괜찮습니다만…… 오늘 훈련은 조금 고될 테니, 각오하시는 게 좋을 겁니다."
20003-2170 = "( ºㅁº )"
20003-2171 = "저…… 선생님, 괜찮으신가요?"
20003-2172 = "돌아가는 길에 보니 얼굴에 넋이 나간 것처럼 보여서……."
20003-2173 = "( ºㅁº )"
20003-2174 = "역시 선생님께는 조금 어려운 훈련이었으려나요......."
20003-2175 = "( ºㅁº )"
20003-2176 = "……선생님?!"
20003-2177 = "선생님, 정의를 실현할 때입니다!"
20003-2178 = "무슨 일이야?"
20003-2179 = "드디어 내 목숨을 노리러 오는 건가……."
20003-2180 = "그게 무슨 말씀이신가요? 무언가 정의에 반하는 일이라도 저지르셨나요?"
20003-2181 = "선배들의 첩보에 의하면"
20003-2182 = "극악무도한 블랙마켓의 악당이 오늘 정오에"
20003-2183 = "트리니티 학원 근처를 지나갈 예정이라고 합니다."
20003-2184 = "근처 건물의 옥상에서 기다렸다가 그 악인을 저격하도록 하죠!"
20003-2185 = "저격, 무서워……."
20003-2186 = "오늘은 예상했던 것보다 훈련이 일찍 끝났네요."
20003-2187 = "모처럼 개인 시간을 가질 수 있을 것 같습니다."
20003-2188 = "마시로는 개인 시간에 보통 무슨 일을 해?"
20003-2189 = "글쎄요. 독서를 하거나 산책을 주로 하지만……"
20003-2190 = "높은 곳에 올라가는 것도 좋아한답니다."
20003-2191 = "높은 곳에 올라간다고?"
20003-2192 = "어라, 선생님께서 그렇게 놀랄 만큼 특이한 취미였나요?"
20003-2193 = "평범하다고 생각했습니다만……."
20003-200030010 = "조금 뜬금없는 질문이지만"
20003-200030020 = "선생님은 독서를 좋아하시나요?"
20003-200030030 = "그럭저럭일까……"
20003-200030040 = "그렇군요"
20003-200030050 = "또 정의에 관한 책을 읽고 있는 거야?"
20003-200030060 = "아뇨;; 그런 건 아니고"
20003-200030070 = "그냥 궁금해져서 여쭤보았습니다"

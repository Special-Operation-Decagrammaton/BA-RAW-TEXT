[translation]
20003-2136 = "今天辛苦了"
20003-2137 = "麻白也是，辛苦了"
20003-2138 = "多虧了老師，今天也安然無恙地擊退了邪惡"
20003-2139 = "老師今天的指揮也很精彩。讓我學到了很多"
20003-2140 = "啊，這麼說來……"
20003-2141 = "這麼說來？"
20003-2142 = "還有其他問題嗎？"
20003-2143 = "不，那個，裙子的縫線在作戰的時候裂開了……"
20003-2144 = "如果弄不好的話，可能就得拿出備用的制服了"
20003-2145 = "最近，我讀了一本關於正義的有趣的書"
20003-2146 = "追求正義的人，在各種情況下該採取什麼行動……"
20003-2147 = "這本書教了我這些"
20003-2148 = "正義的勇者手冊……之類的？"
20003-2149 = "有沒有為追求邪惡之人寫的書呢？"
20003-2150 = "確實，可能是接近那樣的東西。非常有趣"
20003-2151 = "呃，對不起，這我就不太清楚了……"
20003-2152 = "但是，讀了之後發現有些部分無法理解"
20003-2153 = "一定是因為我對正義的理解不夠吧……"
20003-2154 = "如果可以的話，老師。能告訴我什麼是正義嗎？"
20003-2155 = "正義嗎……？"
20003-2156 = "今天在夏萊的訓練已結束。之後將返回校園"
20003-2157 = "狙擊手平時都做什麼樣的訓練？"
20003-2158 = "想知道狙擊手的訓練嗎？"
20003-2159 = "雖然說是狙擊手的訓練，基本上和其他人也沒什麼不同"
20003-2160 = "要說不同的地方，應該是學習如何隱藏自己的技巧吧"
20003-2161 = "下次，我可以去觀摩嗎？"
20003-2162 = "觀摩是沒關係啦……但我覺得不是什麼特別有趣的東西唷？"
20003-2163 = "雖然之前說過了不過再說一次"
20003-2164 = "今天因為訓練的關係，當初預定值班的時間將變更為其他日子"
20003-2165 = "再麻煩老師了"
20003-2166 = "嗯，了解。話說今天的訓練，我可以一起去嗎？"
20003-2167 = "要幫助我訓練嗎？"
20003-2168 = "嗯，可以嗎？"
20003-2169 = "雖然沒有問題……但今天的訓練會有點辛苦，最好做好心理準備"
20003-2170 = "( ºㅁº )"
20003-2171 = "那個，老師……沒事吧？"
20003-2172 = "回去的路上，總覺得表情看起來失魂落魄的……"
20003-2173 = "( ºㅁº )"
20003-2174 = "突然進行那個訓練果然太嚴格了……"
20003-2175 = "( ºㅁº )"
20003-2176 = "老師！？"
20003-2177 = "現在正是實現正義的時刻！"
20003-2178 = "怎麼了？"
20003-2179 = "我的生命就到此為止了嗎……"
20003-2180 = "呃，老師做了什麼違反正義的事嗎？"
20003-2181 = "那個，根據前輩們的情報"
20003-2182 = "窮凶惡極的黑市惡黨將在今天中午"
20003-2183 = "經過三一綜合學園附近"
20003-2184 = "在建築物的樓頂上等著，狙擊那個惡黨吧！"
20003-2185 = "狙擊，好可怕……"
20003-2186 = "今天比預想中還早結束訓練"
20003-2187 = "因為很努力，所以好像能有些私人時間"
20003-2188 = "麻白在這種時候，通常會做什麼？"
20003-2189 = "這個嘛，讀書或是散步……"
20003-2190 = "也喜歡爬到高處"
20003-2191 = "高處……？"
20003-2192 = "那個反應……難道這是很奇怪的興趣嗎？"
20003-2193 = "我還以為是很普通的興趣呢……"
20003-200030010 = "雖然這個問題有點唐突"
20003-200030020 = "請問老師喜歡看書嗎？"
20003-200030030 = "還可以吧……"
20003-200030040 = "原來如此"
20003-200030050 = "你又在讀關於正義的書嗎？"
20003-200030060 = "不，不是的"
20003-200030070 = "單純只是好奇而已"

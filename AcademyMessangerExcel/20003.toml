[translation]
20003-2136 = "วันนี้ขอบคุณมากเลยนะคะ"
20003-2137 = "มาชิโระเองก็พยายามได้ดีมาก"
20003-2138 = "เพราะคุณครูมาช่วยออกคำสั่งปฏิบัติ\nการ ทำให้วันนี้ไม่มีใครได้รับบาดเจ็บ\nและจบภารกิจได้อย่างสวยงามเลยค่ะ"
20003-2139 = "คำสั่งปฏิบัติการของคุณครูสมบูรณ์\nแบบมากค่ะ วันนี้ฉันได้เรียนรู้เพิ่มอีก\nก้าวแล้วค่ะ"
20003-2140 = "แต่ว่า..."
20003-2141 = "แต่อะไรเหรอ...?"
20003-2142 = "มีเรื่องอะไรเหรอ?"
20003-2143 = "คือว่าตอนที่ปฏิบัติงานอยู่ชายกระโปรง\nมันขาด..."
20003-2144 = "อาจจะต้องขอชุดเครื่องแบบเพิ่มนะคะ..."
20003-2145 = "เมื่อไม่นานมานี้ฉันได้อ่านหนังสือที่น่า\nสนใจเกี่ยวกับความยุติธรรมด้วยค่ะ"
20003-2146 = "เกี่ยวกับเรื่องของผู้ที่แสวงหาความ\nยุติธรรมว่าจะทำยังไง"
20003-2147 = "เมื่อตกอยู่ในสถานการณ์ต่างๆ ค่ะ"
20003-2148 = "หนังสือเกี่ยวกับพวกนักรบแห่ง\nความยุติธรรมรึเปล่า?"
20003-2149 = "มีหนังสือสำหรับผู้ที่แสวงหา\nความอยุติธรรมบ้างมั้ย?"
20003-2150 = "ก็คงประมาณนั้นค่ะ น่าสนใจมากเลยค่ะ"
20003-2151 = "เรื่องนั้น... ฉันก็ไม่แน่ใจเหมือนกันค่ะ"
20003-2152 = "แต่ว่าพอลองอ่านดูแล้ว มีสองสาม\nเรื่องที่ฉันไม่เข้าใจอยู่ค่ะ"
20003-2153 = "อาจเป็นเพราะฉันมีความรู้เรื่อง\nความยุติธรรมน้อยเกินไปก็ได้ค่ะ"
20003-2154 = "ถ้าคุณครูมีเวลา ฉันอยากจะขอให้\nอธิบายเรื่องความยุติธรรมให้ฟัง\nหน่อยได้มั้ยคะ?"
20003-2155 = "ความยุติธรรมเหรอ...?"
20003-2156 = "การฝึกซ้อมที่ห้องซ้อมยิงเป้าของ\nชาเล่ต์วันนี้สิ้นสุดลงแล้วค่ะ ฉันจะ\nกลับโรงเรียนทันทีเลยค่ะ"
20003-2157 = "ปกติสไนเปอร์ฝึกซ้อมอะไรกัน\nบ้างเหรอ?"
20003-2158 = "คุณครูสนใจการฝึกของสไนเปอร์\nเหรอคะ?"
20003-2159 = "การฝึกของสไนเปอร์ไม่ได้แตกต่าง\nจากการฝึกของทหารค่ะ"
20003-2160 = "ถ้าพูดถึงจุดที่แตกต่างก็คงจะเป็นการ\nเรียนรู้ทักษะที่จำเป็นสำหรับการหลบ\nซ่อนตัวน่ะค่ะ"
20003-2161 = "ครูขอไปดูตอนซ้อมได้มั้ย?"
20003-2162 = "จะมาดูได้นะคะแต่ว่า... มันคง\nไม่สนุกหรอกค่ะ"
20003-2163 = "เพราะตารางการฝึกซ้อมวันนี้"
20003-2164 = "ทำให้ตารางปฏิบัติงานที่วางเอาไว้\nต้องเลื่อนออกไปค่ะ"
20003-2165 = "ฉันเลยมาแจ้งให้คุณครูทราบค่ะ"
20003-2166 = "วันนี้ครูขอตามไปดูเธอฝึกด้วยได้มั้ย?"
20003-2167 = "คุณครูจะมาช่วยในการฝึกซ้อมวันนี้\nเหรอคะ?"
20003-2168 = "อืม... มันจะยุ่งยากหรือเปล่า?"
20003-2169 = "ถ้าไปสังเกตการณ์ก็ได้อยู่ค่ะ...\nการฝึกวันนี้ค่อนข้างทรหดนิดหน่อย\nเตรียมตัวให้พร้อมแล้วกันนะคะ"
20003-2170 = "( ºㅁº )"
20003-2171 = "คือ... คุณครูคะ ไม่เป็นไรใช่มั้ยคะ?"
20003-2172 = "ตอนขากลับ สีหน้าของคุณครูดูไม่\nค่อยดีเท่าไหร่เลย..."
20003-2173 = "( ºㅁº )"
20003-2174 = "คิดแล้วเชียวว่ามันน่าจะยากเกินไป\nสำหรับคุณครู..."
20003-2175 = "( ºㅁº )"
20003-2176 = "คุณครูคะ...?!"
20003-2177 = "คุณครูคะ ถึงเวลาแห่งความยุติธรรม\nแล้วค่ะ!"
20003-2178 = "มีเรื่องอะไรเหรอ?"
20003-2179 = "ในที่สุด พวกเธอก็คิดจะเอาชีวิตครู\nแล้วเหรอ..."
20003-2180 = "หมายความว่ายังไงเหรอคะ?\nคุณครูเคยทำเรื่องอะไรที่ขัดต่อ\nความยุติธรรมเหรอคะ?"
20003-2181 = "จากแหล่งข่าวลับของพวกรุ่นพี่..."
20003-2182 = "พวกจอมวายร้ายแห่งตลาดมืด "
20003-2183 = "จะมาที่ใกล้ๆ บริเวณของสถาบัน\nทรีนิตี้วันนี้ค่ะ"
20003-2184 = "ถ้างั้นเราก็ไปซุ่มอยู่บนดาดฟ้าตึก\nแถวนั้น แล้วรอดักโจมตีพวกนั้น\nเถอะค่ะ!"
20003-2185 = "ซุ่มโจมตี... น่ากลัวจัง..."
20003-2186 = "วันนี้การฝึกเสร็จเร็วกว่าที่คิดค่ะ"
20003-2187 = "ทำให้พอมีเวลาว่างส่วนตัวนิดหน่อยค่ะ"
20003-2188 = "ปกติมาชิโระทำอะไรเวลาว่างเหรอ?"
20003-2189 = "นั่นสิคะ ปกติแล้วถ้าไม่อ่านหนังสือ\nฉันก็จะไปเดินเล่น..."
20003-2190 = "ฉันชอบขึ้นไปอยู่บนที่สูงๆ เหมือนกัน\nนะคะ"
20003-2191 = "ขึ้นไปอยู่บนที่สูงๆ งั้นเหรอ?"
20003-2192 = "เอ๊ะ? คุณครูชอบทำท่าตกใจแบบนั้น\nเป็นงานอดิเรกเหรอคะ?"
20003-2193 = "ฉันคิดว่ามันธรรมดาซะอีก..."
20003-200030010 = "นี่อาจเป็นคำถามกะทันหันไปหน่อย"
20003-200030020 = "คุณครูชอบอ่านหนังสือมั้ยคะ?"
20003-200030030 = "ก็อ่านบ้าง ไม่อ่านบ้างนะ..."
20003-200030040 = "อย่างนั้นเหรอคะ"
20003-200030050 = "อ่านหนังสือเกี่ยวกับความยุติธรรม\nอีกแล้วเหรอ?"
20003-200030060 = "เปล่าค่ะ;; ฉันไม่ได้อ่านสักหน่อย"
20003-200030070 = "แค่จู่ๆ สงสัยก็เลยถามดูค่ะ"

[translation]
20041-200410010 = "선생."
20041-200410020 = "어? 누구?"
20041-200410030 = "아."
20041-200410040 = "당장은 모르겠구나."
20041-200410050 = "나야, 선생. 리오."
20041-200410060 = "리오?! 지금 어디야??"
20041-200410070 = "이 번호는 임시로 만든 거야."
20041-200410080 = "다음에는 바뀔 테니 저장은 하지 마."
20041-200410090 = "그래도 되는 거야……?"
20041-200410100 = "무슨 문제라도 있어?"
20041-200410110 = "이게 합리적이야. 추적당하면 안 되잖아."
20041-200410120 = "통신사 입장도 생각해 줘……"
20041-200410130 = "음."
20041-200410140 = "거기까지는 생각 못 해봤네."
20041-200410150 = "그래도 달리 방법이 없었어."
20041-200410160 = "아무튼 무슨 일이라도 있어?"
20041-200410170 = "저녁 세일 도시락을 사러 나왔는데……"
20041-200410180 = "갑자기, 마트가 당일 휴무라고 해서……"
20041-200410190 = "선생? 아직 깨어 있어?"
20041-200410200 = "무슨 일이야?"
20041-200410210 = "선생 말대로, 요리하는 아방가르드 군을 만들었는데……."
20041-200410220 = "잘 작동해?"
20041-200410230 = "잘 작동하긴 하는데."
20041-200410240 = "뭔가, 선생이 만들어준 것 같은 요리가 나왔어."
20041-200410250 = "맛없지는 않지만, 맛있지도 않은 그런 거……"
20041-200410260 = "몸에 좋으니까, 먹어 두자……"
20041-200410270 = "알았어……"
20041-200410280 = "그래도 이틀에 한 번 정도는, 도시락 먹으면 안 될까?"
20041-200410290 = "3일"
20041-200410300 = "알았어……"
20041-200410310 = "선생, 있어?"
20041-200410320 = "알았다, 이 패턴…… 리오로군!"
20041-200410330 = "응…… 맞아."
20041-200410340 = "조금 부탁하고 싶은 것이 있는데, 괜찮을까?"
20041-200410350 = "학생의 부탁이라면야, 얼마든지."
20041-200410360 = "그러면."
20041-200410370 = "나 대신 물건 좀 받아 줘."
20041-200410380 = "……뭐?"
20041-200410390 = "선생."
20041-200410400 = "부품이 도착한 김에."
20041-200410410 = "요리하는 아방가르드군을 개선해 봤는데."
20041-200410420 = "예전보다 좀 더, 깊은 맛이 나게 된 것 같아."
20041-200410430 = "그건 잘된 일이네."
20041-200410440 = "응."
20041-200410450 = "고마워. 선생."
20041-200410460 = "여러 가지 사정으로."
20041-200410470 = "요즘은 그렇게 바쁘지 않아져서."
20041-200410480 = "예전에 하던 걸 계속하면 어떨까, 하고"
20041-200410490 = "생각하고 있어."
20041-200410500 = "예전에 하던 거?"
20041-200410510 = "조형물 같은 걸 만드는 거."
20041-200410520 = "산업 디자인이라든가."
20041-200410530 = "그렇지만 여기는 아무래도 "
20041-200410540 = "아지트 공간이 넉넉하지 못해서 말이지."
20041-200410550 = "환기 문제도 있고."
20041-200410560 = "그럼 샬레로 올래?"
20041-200410570 = "어?"
20041-200410580 = "그래도, 돼?"
20041-200410590 = "나는 괜찮은데."
20041-200410600 = "그."
20041-200410610 = "고마워."
20041-200410620 = "그러면 예전처럼."
20041-200410630 = "배달 대행, 부탁할게."
20041-200410640 = "저, 선생?"
20041-200410650 = "생각해 보니까."
20041-200410660 = "여러 가지로, 은혜를 갚아야 할 것 같아."
20041-200410670 = "안 그래도 되는데?"
20041-200410680 = "물론 선생이라면 그렇게 말할 것 같았지만."
20041-200410690 = "그래도 이른바 세간의 상식이란 것과."
20041-200410700 = "그리고 무엇보다 확률과 통계에 의거해."
20041-200410710 = "이건, 그래야 하는 일인 것 같아."
20041-200410720 = "리오의 확률과 통계란 건 대체 뭘까……"
20041-200410730 = "아무튼."
20041-200410740 = "선생을 내 아지트에 초대해야 할 것 같아."
20041-200410750 = "물론 선생이 괜찮다면, 이지만."
20041-200410760 = "잘 들어갔어, 선생?"
20041-200410770 = "저기."
20041-200410780 = "내가 이런 말을 해도 되는지 모르겠지만."
20041-200410790 = "그리고 가능하면."
20041-200410800 = "선생이 이 메시지를 지워 주면 좋겠지만."
20041-200410810 = "모르겠어, 선생."
20041-200410820 = "이런 기분을 느끼는 건 처음이야."
20041-200410830 = "이걸, 뭐라고 정의할 수 있을지도 모르겠고."
20041-200410840 = "선생은 지금 내가 어떤 상태인지, 알고 있을까."
20041-200410850 = "그러네. "
20041-200410860 = "근본적으로는 선생이 알든 모르든."
20041-200410870 = "크게 상관없는 일이겠지만."
20041-200410880 = "그래도 지금은, 왠지 모르게."
20041-200410890 = "선생을 한 번 더 만나고 싶어."
20041-200410900 = "그것뿐이야."
20041-200410910 = "잘 자."
20041-200410920 = "잘 자, 리오."
20041-200410930 = "응."
20041-200410940 = "언제나, 고마워."

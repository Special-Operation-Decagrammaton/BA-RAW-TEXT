[translation]
20041-200410010 = "老師"
20041-200410020 = "咦？是誰？"
20041-200410030 = "啊"
20041-200410040 = "老師還不知道吧"
20041-200410050 = "我是莉央"
20041-200410060 = "莉央！？你現在在哪裡？？"
20041-200410070 = "這是我的臨時號碼"
20041-200410080 = "之後就會換掉，所以沒必要保存"
20041-200410090 = "還可以這樣嗎……？"
20041-200410100 = "有什麼問題嗎？"
20041-200410110 = "這麼做是合理的。畢竟我不能被追蹤"
20041-200410120 = "也為電信公司著想一下吧……"
20041-200410130 = "嗯"
20041-200410140 = "這點我倒沒想到"
20041-200410150 = "不過也沒有其他辦法了"
20041-200410160 = "話說有什麼事嗎？"
20041-200410170 = "我出來買晚上特價的便當……"
20041-200410180 = "結果發現超市今天休息……"
20041-200410190 = "老師？你還醒著嗎？"
20041-200410200 = "怎麼了？"
20041-200410210 = "我按照老師的建議，製作了會煮飯的前衛君……"
20041-200410220 = "能順利運作嗎？"
20041-200410230 = "可以是可以"
20041-200410240 = "不過製作出來的料理，總感覺好像是老師做的"
20041-200410250 = "雖然不難吃，卻也說不上好吃的那種……"
20041-200410260 = "那對身體有幫助，所以還是吃了吧……"
20041-200410270 = "我知道了……"
20041-200410280 = "那可以偶爾吃便當嗎？大概兩天一次就好了"
20041-200410290 = "三天一次"
20041-200410300 = "……知道了"
20041-200410310 = "老師，你在嗎？"
20041-200410320 = "我知道了，這個開場白……是莉央吧！"
20041-200410330 = "嗯……沒錯"
20041-200410340 = "我有點事想拜託你，可以嗎？"
20041-200410350 = "既然是學生的請求，當然可以"
20041-200410360 = "那麼"
20041-200410370 = "請你幫我收個東西"
20041-200410380 = "……咦？"
20041-200410390 = "老師"
20041-200410400 = "趁著零件到貨"
20041-200410410 = "我幫煮菜的前衛君做了一些改良"
20041-200410420 = "感覺它做出來的料理，味道稍微比之前更有層次了"
20041-200410430 = "那真是件好事"
20041-200410440 = "嗯"
20041-200410450 = "謝謝你，老師"
20041-200410460 = "因為各種原因"
20041-200410470 = "最近比較沒那麼忙了"
20041-200410480 = "所以我在想"
20041-200410490 = "要不要繼續完成之前做的事"
20041-200410500 = "之前做的事？"
20041-200410510 = "我指的是製作雕塑品"
20041-200410520 = "或者也能說是工業設計"
20041-200410530 = "但是基地這裡 "
20041-200410540 = "空間實在不太充裕"
20041-200410550 = "通風也是個問題"
20041-200410560 = "那要來夏萊嗎？"
20041-200410570 = "咦？"
20041-200410580 = "可以嗎？"
20041-200410590 = "我不介意哦"
20041-200410600 = "那個"
20041-200410610 = "謝謝"
20041-200410620 = "那麼再麻煩你像之前那樣"
20041-200410630 = "幫我收個東西"
20041-200410640 = "那個，老師？"
20041-200410650 = "我仔細想想"
20041-200410660 = "總覺得還是應該報答你的恩情"
20041-200410670 = "不必放在心上的哦？"
20041-200410680 = "畢竟你是老師，會這麼說也很合理"
20041-200410690 = "不過基於一般的人情世故"
20041-200410700 = "還有最重要的，基於機率與統計"
20041-200410710 = "我認為這是必須要做的事"
20041-200410720 = "莉央說的機率和統計到底是什麼……"
20041-200410730 = "總之"
20041-200410740 = "我想邀請老師到我的基地來"
20041-200410750 = "當然前提是老師你不介意"
20041-200410760 = "平安回去了嗎，老師？"
20041-200410770 = "那個"
20041-200410780 = "我不知道接下來的話該不該說"
20041-200410790 = "還有如果可以的話"
20041-200410800 = "希望老師能刪掉接下來的訊息"
20041-200410810 = "我也不明白這是怎麼回事，老師"
20041-200410820 = "這是我第一次有這種感覺"
20041-200410830 = "甚至不知道該如何定義它"
20041-200410840 = "老師知道我現在是什麼狀態嗎？"
20041-200410850 = "其實"
20041-200410860 = "從根本上來說，無論老師是否知道"
20041-200410870 = "應該都沒有太大的關係"
20041-200410880 = "但是現在不知道為什麼"
20041-200410890 = "總想再和老師見一面"
20041-200410900 = "就只是這樣而已"
20041-200410910 = "晚安"
20041-200410920 = "晚安，莉央"
20041-200410930 = "嗯"
20041-200410940 = "一直以來謝謝你"

[translation]
20041-200410010 = "ครู"
20041-200410020 = "หืม? ใครเหรอ?"
20041-200410030 = "อ่า"
20041-200410040 = "ยังไม่รู้สินะ"
20041-200410050 = "ฉันเองน่ะครู ริโอะ"
20041-200410060 = "ริโอะ?! ตอนนี้อยู่ไหนเหรอ??"
20041-200410070 = "นี่เป็นเบอร์ชั่วคราวของฉันน่ะ"
20041-200410080 = "คราวหน้าฉันคงเปลี่ยนเบอร์อีก\nไม่ต้องเมมไว้หรอก"
20041-200410090 = "ทำแบบนี้ก็ได้เหรอ...?"
20041-200410100 = "มีปัญหาอะไรงั้นเหรอ?"
20041-200410110 = "แบบนี้ละสมเหตุสมผล ฉันไม่ควร\nทำตัวให้ติดตามได้"
20041-200410120 = "นึกถึงบริษัทซิมการ์ดบ้างสิ..."
20041-200410130 = "อืม..."
20041-200410140 = "เรื่องนั้นยังไม่ได้คิดแฮะ"
20041-200410150 = "แต่ก็ไม่มีวิธีอื่นหรอก"
20041-200410160 = "จะว่าไป มีเรื่องอะไรเหรอ?"
20041-200410170 = "พอดีฉันออกมาซื้อข้าวกล่องลดราคา..."
20041-200410180 = "แต่ว่าวันนี้ร้านดันปิดซะอย่างนั้น..."
20041-200410190 = "ครู? อยู่หรือเปล่า?"
20041-200410200 = "มีเรื่องอะไรเหรอ?"
20041-200410210 = "ฉันสร้างหุ่นรบล้ำยุคที่ทำอาหารได้\nตามที่ครูบอกแล้ว..."
20041-200410220 = "มันทำงานได้ดีมั้ย?"
20041-200410230 = "ก็ทำได้ดีอยู่หรอกนะ"
20041-200410240 = "แต่ได้อาหารเหมือนกับที่ครูทำให้เลย"
20041-200410250 = "ใช่ว่ามันไม่อร่อยหรอกนะ แต่มันก็\nไม่ได้รสชาติดี..."
20041-200410260 = "มันดีต่อสุขภาพนะ กินไปเถอะ..."
20041-200410270 = "เข้าใจแล้ว..."
20041-200410280 = "แต่ว่าฉันขอกินข้าวกล่องทุกๆ สองวัน\nไม่ได้เหรอ?"
20041-200410290 = "สามวัน"
20041-200410300 = "ก็ได้..."
20041-200410310 = "ครู อยู่หรือเปล่า?"
20041-200410320 = "ถามแบบนี้... ต้องเป็นริโอะแน่ๆ!"
20041-200410330 = "อืม... ใช่แล้ว"
20041-200410340 = "ฉันมีเรื่องอยากรบกวนน่ะ ขอรบกวน\nหน่อยได้มั้ย?"
20041-200410350 = "ถ้าเป็นเรื่องที่นักเรียนขอ\nครูยินดีอยู่แล้ว"
20041-200410360 = "ถ้างั้นก็"
20041-200410370 = "ช่วยรับของแทนฉันหน่อยสิ"
20041-200410380 = "ว่าไงนะ...?"
20041-200410390 = "ครู"
20041-200410400 = "พอดีอะไหล่มาส่งพอดี"
20041-200410410 = "ฉันก็เลยปรับปรุงหุ่นรบเชฟล้ำยุคดู"
20041-200410420 = "ตอนนี้เหมือนจะทำอาหารรสชาติดี\nกว่าเดิมแล้วละ"
20041-200410430 = "งั้นก็ดีเลยนะ"
20041-200410440 = "อื้อ"
20041-200410450 = "ขอบคุณนะ ครู"
20041-200410460 = "ขอบคุณในหลายๆ เรื่องเลย"
20041-200410470 = "ช่วงนี้ฉันไม่ค่อยงานยุ่งเท่าไร"
20041-200410480 = "ก็เลยคิดว่าฉันทำสิ่งที่"
20041-200410490 = "เคยทำเมื่อก่อนดีหรือเปล่า"
20041-200410500 = "สิ่งที่เคยทำเมื่อก่อน?"
20041-200410510 = "สร้างพวกรูปปั้นอะไรทำนองนั้น"
20041-200410520 = "หรือไม่ก็พวกออกแบบอุตสาหกรรมน่ะ"
20041-200410530 = "แต่ว่าที่ซ่อนตัวของฉัน "
20041-200410540 = "มันมีพื้นที่ไม่เพียงพอนี่สิ"
20041-200410550 = "ไหนจะมีปัญหาเรื่องระบายอากาศอีก"
20041-200410560 = "งั้นมาที่ชาเล่ต์มั้ยล่ะ?"
20041-200410570 = "หืม?"
20041-200410580 = "ได้ด้วยเหรอ?"
20041-200410590 = "ครูไม่ว่าอะไรนะ"
20041-200410600 = "เรื่องนั้น..."
20041-200410610 = "ขอบคุณนะ"
20041-200410620 = "ถ้างั้นฉันรบกวนรับของแทน"
20041-200410630 = "เหมือนเมื่อก่อนหน่อยนะ"
20041-200410640 = "นี่ ครู?"
20041-200410650 = "พอมาคิดดูแล้ว"
20041-200410660 = "ฉันรู้สึกเป็นหนี้บุญคุณครูในหลายๆ\nเรื่องเลย"
20041-200410670 = "ไม่ต้องรู้สึกแบบนั้นก็ได้"
20041-200410680 = "กะไว้แล้วละว่าครูต้องพูดแบบนี้"
20041-200410690 = "แต่โลกนี้ก็มีสิ่งที่เรียกว่าสามัญสำนึก"
20041-200410700 = "และโลกก็หมุนได้ด้วยความน่าจะเป็น\nและสถิติด้วย"
20041-200410710 = "ฉันก็เลยต้องใช้หนี้บุญคุณน่ะ"
20041-200410720 = "ความน่าจะเป็นและสถิติของริโอะ\nมันคืออะไรกันนะ..."
20041-200410730 = "เอาเถอะ"
20041-200410740 = "ฉันจะเชิญครูมาที่ที่ซ่อนตัวของฉันนะ"
20041-200410750 = "แน่นอนว่าถ้าครูอยากมาน่ะ"
20041-200410760 = "กลับไปถึงแล้วหรือยัง ครู?"
20041-200410770 = "คือว่า"
20041-200410780 = "ฉันไม่รู้ว่าตัวเองพูดแบบนี้ได้หรือเปล่า"
20041-200410790 = "และถ้าเป็นไปได้"
20041-200410800 = "ฉันก็อยากให้ครูช่วยลบข้อความนี้ด้วย"
20041-200410810 = "ไม่รู้สิ ครู"
20041-200410820 = "ฉันไม่เคยรู้สึกแบบนี้มาก่อนเลย"
20041-200410830 = "ฉันไม่รู้ว่าต้องนิยามความรู้สึกนี้ว่ายังไง"
20041-200410840 = "ครูจะรู้มั้ยนะว่าตอนนี้ฉันเป็นยังไงน่ะ"
20041-200410850 = "นั่นสินะ "
20041-200410860 = "ต่อให้ครูจะรู้หรือไม่รู้"
20041-200410870 = "มันก็ไม่สำคัญหรอก"
20041-200410880 = "แต่ว่าตอนนี้น่ะ ไม่รู้ทำไมฉันถึง"
20041-200410890 = "อยากเจอครูอีกสักครั้ง"
20041-200410900 = "ก็แค่นั้นน่ะ"
20041-200410910 = "ฝันดีนะ"
20041-200410920 = "ฝันดีนะ ริโอะ"
20041-200410930 = "อื้อ"
20041-200410940 = "ขอบคุณเสมอเลยนะ"

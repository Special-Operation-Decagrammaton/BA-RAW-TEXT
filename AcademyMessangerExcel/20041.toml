[translation]
20041-200410010 = "Sensei."
20041-200410020 = "Huh? Who's this?"
20041-200410030 = "Ah."
20041-200410040 = "You wouldn't know."
20041-200410050 = "It's me, Sensei. Rio."
20041-200410060 = "Rio?! Where are you right now?!"
20041-200410070 = "I'm using a burner phone."
20041-200410080 = "The number will change next time, so don't bother saving it."
20041-200410090 = "Are you okay...?"
20041-200410100 = "Is there a problem?"
20041-200410110 = "I'm just being rational. I need to make sure I'm untraceable."
20041-200410120 = "The mobile carrier will know where you are, though..."
20041-200410130 = "Mmm."
20041-200410140 = "I hadn't thought of that."
20041-200410150 = "But still, I had no choice."
20041-200410160 = "So what's going on?"
20041-200410170 = "I went out to buy some discount dinner bento..."
20041-200410180 = "But the store turned out to be closed today..."
20041-200410190 = "Sensei? Are you still awake?"
20041-200410200 = "What's up?"
20041-200410210 = "I made that cooking Avant Guard like you said..."
20041-200410220 = "Does it work?"
20041-200410230 = "It does. It works well."
20041-200410240 = "But it made something that looks like it was made by you."
20041-200410250 = "Not bad, but not tasty either..."
20041-200410260 = "It's good for you, though, so let's share it."
20041-200410270 = "Okay..."
20041-200410280 = "Related to that, is it okay to eat discount bento, like, every other day?"
20041-200410290 = "Every THREE days."
20041-200410300 = "Okay..."
20041-200410310 = "Sensei, you there?"
20041-200410320 = "Let me guess, is this Rio?"
20041-200410330 = "You guessed correctly."
20041-200410340 = "There's something I wanted to ask you for, if that's okay?"
20041-200410350 = "If it's a student asking for help, then anytime."
20041-200410360 = "Okay then."
20041-200410370 = "I need to have some stuff mailed to your office."
20041-200410380 = "...What?"
20041-200410390 = "Sensei."
20041-200410400 = "I tried making improvements to the cooking Avant Guard,"
20041-200410410 = "since I got those parts."
20041-200410420 = "The cooking's starting to get a little more flavorful."
20041-200410430 = "That's good."
20041-200410440 = "It is, yes."
20041-200410450 = "Thank you, Sensei."
20041-200410460 = "Due to various circumstances"
20041-200410470 = "I'm not as busy nowadays."
20041-200410480 = "So I was thinking about"
20041-200410490 = "going back to something I used to do."
20041-200410500 = "Something you used to do?"
20041-200410510 = "Making things like sculptures."
20041-200410520 = "Like industrial designs."
20041-200410530 = "But I don't have much space "
20041-200410540 = "here in the hideout."
20041-200410550 = "There's also a ventilation issue."
20041-200410560 = "Would you like to come to Schale, then?"
20041-200410570 = "Huh?"
20041-200410580 = "Can I?"
20041-200410590 = "I'm okay with it."
20041-200410600 = "Um..."
20041-200410610 = "Thank you."
20041-200410620 = "Then just like last time,"
20041-200410630 = "I'll ask you to pick things up for me."
20041-200410640 = "Um, Sensei?"
20041-200410650 = "I thought about it"
20041-200410660 = "and I think I should repay you, for several things."
20041-200410670 = "You don't have to."
20041-200410680 = "I knew you would say something like that."
20041-200410690 = "But in terms of common courtesy,"
20041-200410700 = "and based on the probability and statistics of it all,"
20041-200410710 = "this is something I think I need to do."
20041-200410720 = "I wonder what your definition of \"probability and statistics\" is..."
20041-200410730 = "Anyway..."
20041-200410740 = "I want to invite you to my hideout."
20041-200410750 = "If you're okay with it, that is."
20041-200410760 = "Did you get back okay, Sensei?"
20041-200410770 = "Um..."
20041-200410780 = "I don't know if I can say this..."
20041-200410790 = "And if you could,"
20041-200410800 = "it'd be nice of you to delete the message after."
20041-200410810 = "I just don't know, Sensei."
20041-200410820 = "This is my first time feeling something like this."
20041-200410830 = "I don't know if I can define it."
20041-200410840 = "I don't know if you've ever felt it or not."
20041-200410850 = "Maybe "
20041-200410860 = "I suppose it doesn't really matter"
20041-200410870 = "if you know or not."
20041-200410880 = "But now, for some reason,"
20041-200410890 = "I really want to see you again."
20041-200410900 = "That's it."
20041-200410910 = "Goodnight."
20041-200410920 = "Goodnight, Rio."
20041-200410930 = "It is, yes."
20041-200410940 = "Thank you, as always."

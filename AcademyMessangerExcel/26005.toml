[translation]
26005-1699 = "คุณครู ตอนนี้ว่างมั้ย?\nไม่ได้ยุ่งอยู่เนอะ?"
26005-1700 = "ฉันไม่ได้มีอะไรสำคัญมากหรอก\nแค่มีเรื่องขอให้ช่วยหน่อยน่ะ"
26005-1701 = "แต่ถ้าไม่ว่างก็ไม่เป็นไรนะ\nไม่ใช่เรื่องใหญ่อะไรหรอก"
26005-1702 = "ตอนนี้ก็ยุ่งๆ น่ะ"
26005-1703 = "ว่างอยู่แล้ว ครูมันแรงงานส่วนเกินนี่"
26005-1704 = "ว่าแล้วต้องเป็นแบบนี้..."
26005-1705 = "เข้าใจแล้ว ขอโทษที่รบกวนนะ"
26005-1706 = "พูดอะไรแบบนั้นน่ะ?"
26005-1707 = "ฉันไม่ได้หมายความแบบนั้นสักหน่อย!"
26005-1708 = "ล้อเล่นน่า"
26005-1709 = "แกล้งกันเล่นอีกแล้วนะ"
26005-1710 = "ถ้ามีครั้งต่อไปจะไม่ปล่อยไว้แน่"
26005-1711 = "แต่เอาเถอะ สรุปว่าตอนนี้ไม่ได้ยุ่งอยู่\nใช่มั้ย? งั้นก็ต้องมารับผิดชอบที่แกล้ง\nฉันเมื่อกี๊"
26005-1712 = "แล้วเจอกันที่คาเฟ่มิลเฟยนะ"
26005-1713 = "ห้ามไปบอกนักเรียนคนอื่นล่ะ"
26005-1714 = "แล้วไว้ฉันจะชวนมาอีก แล้วฉันจะเลี้ยงเอง!"
26005-1715 = "คุณครู ตอนนี้ว่างมั้ย?"
26005-1716 = "ยังไม่ลืมสัญญาใช่มั้ย? รอบนี้ฉันจะ\nเลี้ยงคุณครูเอง"
26005-1717 = "อ้อ! คุณครูไม่มีสิทธิ์ปฏิเสธฉันนะ"
26005-1718 = "อืม.. พอคุยผ่านแชตแล้วมันแปลกๆ แฮะ"
26005-1719 = "เมื่อกี้ฉันหมายถึงหนี้น่ะ! ใช่แล้ว หนี้!\nไม่ได้หมายถึงอย่างอื่นเลย!"
26005-1720 = "จะหมายถึงอย่างอื่นก็ได้นะ"
26005-1721 = "สัญญาต้องเป็นสัญญาสิ ไปได้อยู่แล้ว"
26005-1722 = "อย่าพูดแบบนี้สิ หัวใจฉันยิ่งไม่ค่อยดีอยู่"
26005-1723 = "ถ้างั้นฉันจะรออยู่นะ ห้ามมาสายล่ะ!"
26005-1724 = "แล้วก็อย่าบอกคนอื่นด้วย"
26005-1725 = "แม้แต่คนเดียวก็ไม่ได้"
26005-1726 = "ถ้าไปบอกใครล่ะก็"
26005-1727 = "โดนตีก้นแน่"
26005-1728 = "คุณครู ตอนนี้ว่างมั้ย?"
26005-1729 = "พอดีอยากให้ช่วยอะไรหน่อยน่ะ"
26005-1730 = "รอบนี้จะไปกินอะไรล่ะ?"
26005-1731 = "ครูเห็นฉันเป็นหมูเหรอ???"
26005-1732 = "ทำไมต้องคิดว่าจะชวนไปกินอะไรอยู่\nเรื่อยเลย??"
26005-1733 = "ไม่ใช่แบบนั้นสักหน่อย! แค่จะขอให้ช่วย\nบางอย่างเท่านั้นเอง"
26005-1734 = "และที่มาขอ เพราะว่าเป็น 'คุณครู' ยังไงล่ะ"
26005-1735 = "ล้อเล่นน่า จะให้ไปหาที่ไหนล่ะ?"
26005-1736 = "..."
26005-1737 = "ทีหลังก็อย่าเอาเรื่องจริงมาพูดเล่นอีกล่ะ"
26005-1738 = "แต่ยังไงก็ขอบคุณนะ แล้วฉันจะบอกว่า\nให้ไปเจอที่ไหน"
26005-1739 = "วันนี้ฉันสนุกมากเลย"
26005-1740 = "ต่อไปก็ฝากตัวด้วยนะคุณครู"
26005-260050010 = "อ่า... วันนี้ไม่อยากเข้าเรียนเลย..."
26005-260050020 = "ไม่มีวิธีที่จะเลิกคลาสกลางคันเลยเหรอ\nคุณครู?"
26005-260050030 = "วันนี้...? มีเรื่องอะไรงั้นเหรอ?"
26005-260050040 = "ทำไมถามครูแบบนั้นล่ะ ครูเป็นครูนะ? หึหึ"
26005-260050050 = "รู้อยู่แล้วน่า... ฉันรู้แล้วล่ะ พูดแบบนี้\nกับคุณครูก็คงดูไม่ดีเท่าไหร่"
26005-260050060 = "ก็แค่วันนี้เป็นวันเปิดตัวสินค้าใหม่ประจำ\nเดือนของคาเฟ่มิลเฟย..."
26005-260050070 = "เวลาเปิดตัวมันเป็นเวลาเรียนพอดีน่ะ...\nไม่ใช่เรื่องใหญ่หรอก ไม่ต้องใส่ใจก็ได้"
26005-260050080 = "ถ้างั้นก็เรียนก่อนก็ได้"
26005-260050090 = "อ่า... เข้าใจแล้ว เข้าใจแล้วล่ะ"
26005-260050100 = "อื้อ ขอโทษนะ นั่นสิ... ก็คงแบบนั้นล่ะ"
26005-260050110 = "...?"
26005-260050120 = "พูดอะไรไม่รู้เรื่องเลย... เอาเป็นว่า\nเข้าใจแล้วล่ะ"
26005-260050130 = "ไว้จะติดต่อไปใหม่นะ~ //(￣︶￣*))"
26005-260050140 = "อ่า.... สุดยอดจริงๆ เลย"
26005-260050150 = "สุดยอด ไม่ทำให้ผิดหวังเลยจริงๆ\nมิลเฟยเนี่ย!"
26005-260050160 = "คุณครูว่าเป็นไงมั่ง? โอเครึเปล่า?\nซันไชน์มูส~"
26005-260050170 = "อ่า..."
26005-260050180 = "เปล่าหรอก"
26005-260050190 = "ไม่... ไม่ต้องพูดอะไร ไม่ต้องพูด..."
26005-260050200 = "เดี๋ยวพูดอะไรไม่เป็นเรื่องแล้วจะทำให้\nเรื่องมันยุ่งยากขึ้นกว่าเดิม..."
26005-260050210 = "..."
26005-260050220 = "ฮิฮิ"
26005-260050230 = "ถ้างั้นไว้เจอกันนะ คุณครู!"
26005-260050240 = "อ๊ะ"
26005-260050250 = "จริงด้วยคุณครู พอมาลองนึกๆ\nดูแล้ว"
26005-260050260 = "เราจะไปคาเฟ่ไหนดีล่ะ"
26005-260050270 = "เจอร้านดีๆ บ้างมั้ย?"
26005-260050280 = "?"
26005-260050290 = "ยังไม่ได้พูดอะไรเลยนะ"
26005-260050300 = "ไม่สิ ก็ใช่คาเฟ่อยู่หรอก..."
26005-260050310 = "คิกๆ..."
26005-260050320 = "ก็นะ เวลาติดต่อมา ก็มักจะเป็นตอน\nแบบนั้นตลอดนี่นา..."
26005-260050330 = "อ๊ะ"
26005-260050340 = "อ๊าาาาา!!!!"
26005-260050350 = "น่าโมโหที่สุด"
26005-260050360 = "น่าหงุดหงิดจริงๆ...!!"
26005-260050370 = "ฮะฮ่า"
26005-260050380 = "ฮ่าฮ่าฮ่าฮ่า"
26005-260050390 = "ฮ่าฮ่าฮ่าฮ่าๆๆๆ"
26005-260050400 = "มีที่ไหนกันที่ซื้อให้ แล้วก็มาแย่งไป\nแบบนี้น่ะ"
26005-260050410 = "ซื้อให้แล้วมาแย่งไปแบบนี้ มีใครที่ไหน\nเขาทำกัน?! ปีศาจชัดๆ!!"
26005-260050420 = "หนวกหูน่า"
26005-260050430 = "กรรมตามสนองแล้วละ"
26005-260050440 = "แล้วก็"
26005-260050450 = "ฮิฮิ"
26005-260050460 = "เอาไว้จะซื้อให้ใหม่นะ"
26005-260050470 = "ตอนนั้นก็เก็บเอาไว้ให้ดีๆ ล่ะ คุณครู"
26005-260050480 = "เข้าใจมั้ย?"

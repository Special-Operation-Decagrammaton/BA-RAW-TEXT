[translation]
26005-1699 = "老師，有空嗎？你很閒對吧？"
26005-1700 = "雖然沒有很重要，但有件事想要拜託你"
26005-1701 = "如果在忙的話也沒關係，畢竟不是什麼重要的事"
26005-1702 = "現在有點忙……"
26005-1703 = "當然沒問題，反正我很閒嘛"
26005-1704 = "……這樣子啊"
26005-1705 = "嗯，我知道了。抱歉打擾你了"
26005-1706 = "不，不是那個意思！"
26005-1707 = "真的！我真的沒有那個意思！"
26005-1708 = "騙你的，我開玩笑的唷"
26005-1709 = "又這樣捉弄我！！！！"
26005-1710 = "真是的，不原諒你了……"
26005-1711 = "……總之，你有空對吧？作為捉弄我的懲罰，請好好陪我一下吧"
26005-1712 = "到「Café．Mille-feuille」來"
26005-1713 = "別告訴其他孩子唷"
26005-1714 = "下次我一定會請客的！之後再聯絡！"
26005-1715 = "老師，現在有空嗎？"
26005-1716 = "之前約好的，我可不准你說忘記了喔。我還有欠你的還沒還呢"
26005-1717 = "先告訴你，你可沒有拒絕的權利。你會來陪我吧？"
26005-1718 = "……總覺得用打字的話好像變得有點奇怪"
26005-1719 = "是要還你人情的意思！就是這樣而已！"
26005-1720 = "有其他意思我也很歡迎喔"
26005-1721 = "當然記得囉。沒問題，了解"
26005-1722 = "能停止那種對心臟不好的玩笑嗎……？"
26005-1723 = "那我等著，別遲到了唷！"
26005-1724 = "什麼都別說"
26005-1725 = "忘了吧"
26005-1726 = "讓它們全都從記憶中消失"
26005-1727 = "如果講什麼屁股之類的話，我真的會殺了你喔"
26005-1728 = "老師，現在有空嗎？"
26005-1729 = "雖然不是很重要，但有件事想請你幫忙"
26005-1730 = "這次要去吃什麼？"
26005-1731 = "為什麼是以吃為前提？"
26005-1732 = "你把我當成是豬還是什麼了嗎？只要開口就是要吃飼料嗎？"
26005-1733 = "才不是咧！是要拜託你其他的事！"
26005-1734 = "……是正經的，因為你是老師才想拜託你的事"
26005-1735 = "開玩笑的，那我該去哪呢？"
26005-1736 = "……"
26005-1737 = "每次都這樣……"
26005-1738 = "……謝啦。地點是……"
26005-1739 = "今天謝謝你"
26005-1740 = "……那個，以後也拜託了，老師"
26005-260050010 = "不想去上課……"
26005-260050020 = "嘿，老師，有什麼偷懶的好方法嗎？"
26005-260050030 = "那個……"
26005-260050040 = "問身為老師的我！？"
26005-260050050 = "我知道，我知道啦。問老師這種事情很奇怪"
26005-260050060 = "但是，今天是「Café．Mille-feuille」推出新品的日子……"
26005-260050070 = "因為會在上課時開始販售……理由只是這樣。沒什麼大不了的，別放在心上"
26005-260050080 = "我懂你的心情，但還是以上課為優先吧"
26005-260050090 = "OK，交給我"
26005-260050100 = "嗚，是沒錯啦……"
26005-260050110 = "……？"
26005-260050120 = "有理解上下文嗎……？算了，這也沒辦法。我會好好去上課的"
26005-260050130 = "那就先這樣，想連絡的時候會再聯絡你\n(￣︶￣*)"
26005-260050140 = "啊～真好吃！"
26005-260050150 = "果然那裡的甜點從來不會讓人失望！那融化的口感和酸甜的味道……！"
26005-260050160 = "老師也喜歡嗎？"
26005-260050170 = "啊"
26005-260050180 = "不是"
26005-260050190 = "沒事，當我沒說，你什麼都別說"
26005-260050200 = "這樣不行，不是那樣"
26005-260050210 = "……"
26005-260050220 = "呵呵，不懂的話也好"
26005-260050230 = "那就之後再見囉，老師"
26005-260050240 = "啊"
26005-260050250 = "對了，老師。話說回來……"
26005-260050260 = "去哪間咖啡廳好呢"
26005-260050270 = "有找到什麼好地方嗎？"
26005-260050280 = "？"
26005-260050290 = "我什麼話都還沒說耶……"
26005-260050300 = "唔，雖然的確是咖啡廳沒錯……"
26005-260050310 = "呵呵"
26005-260050320 = "畢竟你聯絡我的時候幾乎都是這樣……"
26005-260050330 = "啊"
26005-260050340 = "啊啊啊啊啊啊！！！！"
26005-260050350 = "氣死人了"
26005-260050360 = "真的好煩！！"
26005-260050370 = "哈哈"
26005-260050380 = "哈哈哈哈"
26005-260050390 = "哈哈哈哈哈哈哈哈哈哈哈"
26005-260050400 = "居然把買給人家的東西搶回去吃"
26005-260050410 = "哪有先給別人又搶回去的！？惡魔！！"
26005-260050420 = "吵死了"
26005-260050430 = "這是你自作自受"
26005-260050440 = "而且"
26005-260050450 = "呵呵"
26005-260050460 = "我會再買給你的啦"
26005-260050470 = "到時候老師可要看好它哦"
26005-260050480 = "知道了嗎？"

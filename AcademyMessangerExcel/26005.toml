[translation]
26005-1699 = "선생님, 저기. 지금 한가해? 한가하지?"
26005-1700 = "뭐 꼭 그렇게 중요한 건 아니고! 그냥 부탁할 게 좀 있어서."
26005-1701 = "바쁘면 안 와도 돼. 그냥 별거 아니니까."
26005-1702 = "지금 좀 바쁘긴 하지."
26005-1703 = "물론 한가하죠. 저는 잉여인력이라"
26005-1704 = "……역시 그렇겠지?"
26005-1705 = "응. 알았어. 방해해서 미안"
26005-1706 = "뭐라는 거야 그런 거 아니야!"
26005-1707 = "진짜 그런 뜻으로 한 말 아니거든!"
26005-1708 = "농담이야."
26005-1709 = "또 날 놀렸구나"
26005-1710 = "가만 안 둬 죽어 진짜"
26005-1711 = "아무튼 좋아. 그럼 지금 시간은 된다 이거지? 방금 놀린 거에 대한 책임을 져주셔야겠어."
26005-1712 = "<카페 밀피유>에서 만나."
26005-1713 = "다른 애들한텐 비밀이야"
26005-1714 = "다음에 또 부를 테니까. 그땐 꼭 내가 살게!"
26005-1715 = "선생님, 지금 시간 있어?"
26005-1716 = "기억하고 있지? 저번 약속. 이번에야말로 내가 살 테니까 말이야"
26005-1717 = "미리 말해두지만 사실 거부권은 없다고"
26005-1718 = "……뭔가 써 놓고 보니 말이 이상한데"
26005-1719 = "빚! 그냥 빚을 갚는 의미일 뿐이야! 다른 건 아니고!"
26005-1720 = "난 다른 의미여도 상관없는데"
26005-1721 = "약속은 약속이지, 알았어."
26005-1722 = "진짜 좀 그런 식으로 말하지 마 심장에 안 좋으니까"
26005-1723 = "좋아. 그럼 기다리고 있겠어. 늦지 마!"
26005-1724 = "아무한테도 말하지 마"
26005-1725 = "아무한테도"
26005-1726 = "엉덩이라든가"
26005-1727 = "말하면 죽어 진짜"
26005-1728 = "선생님 혹시 지금 시간 괜찮아?"
26005-1729 = "뭐 별일은 아니고 그냥 뭐 좀 도와줬으면 해서"
26005-1730 = "이번엔 뭘 먹으러 가는 거야?"
26005-1731 = "내가 무슨 돼지야???"
26005-1732 = "입만 열면 뭐 먹으러 가자는 사람으로 보여???"
26005-1733 = "그런 거 아니거든! 아니니까 좀 도와 달라고!"
26005-1734 = "제대로 '선생님이니까' 부탁하는 일이란 말이야"
26005-1735 = "농담이야. 어디로 가면 돼?"
26005-1736 = "……"
26005-1737 = "또 그렇게 웃어넘길 수 없는 농담이나 해대고"
26005-1738 = "아무튼 고마워, 선생님. 어디로 오면 되는지 가르쳐 줄게"
26005-1739 = "오늘은 정말로 고마웠어."
26005-1740 = "앞으로도 종종 부탁할게, 선생님!"
26005-260050010 = "아 오늘은 진짜 수업 듣기 싫다……"
26005-260050020 = "어떻게 중간에 쨀 방법 없을까, 선생님?"
26005-260050030 = "오늘은……? 무슨 일 있어?"
26005-260050040 = "그걸 또 선생님인 나에게 묻는 건가ㅋ"
26005-260050050 = "알아. 나도 안다고. 선생님한테 이런 말 하기 좀 그렇다는 거."
26005-260050060 = "그냥 오늘이 카페 밀피유 이번 달 신상 공개 날인데……"
26005-260050070 = "공개 시간이 수업 중이라서 그랬어. 별 거 아냐. 신경 쓰지 마."
26005-260050080 = "그래도 일단은 수업에 집중하자."
26005-260050090 = "아, 알았어. 이해했다."
26005-260050100 = "으응. 미안. 하긴 그 말이 맞지……"
26005-260050110 = "……?"
26005-260050120 = "또 영문 모를 소릴…… 아무튼 알겠어."
26005-260050130 = "이따가 다시 연락할게~. //(￣︶￣*))"
26005-260050140 = "아, 진짜 최고였다."
26005-260050150 = "역시 날 실망시키지 않네, 밀피유는!"
26005-260050160 = "선생님은 어땠어? 괜찮았던 거 같아? 선샤인무스."
26005-260050170 = "아"
26005-260050180 = "아니"
26005-260050190 = "아니 아무 말도 하지 마. 아무 말도."
26005-260050200 = "또 분명 쓸데없는 소리로 곤란하게 만들 테니까."
26005-260050210 = "……"
26005-260050220 = "히히"
26005-260050230 = "그럼 또 봐, 선생님!"
26005-260050240 = "아"
26005-260050250 = "맞다, 선생님. 그러고 보니"
26005-260050260 = "어느 카페로 갈까"
26005-260050270 = "뭐 좋은 거 좀 찾았어?"
26005-260050280 = "?"
26005-260050290 = "아직 아무 말도 안 했어"
26005-260050300 = "아니 근데 카페가 맞긴 한데..."
26005-260050310 = "ㅋㅋ"
26005-260050320 = "뭐, 연락할 때가 늘 그런 때였으니..."
26005-260050330 = "아"
26005-260050340 = "아ㅏㅏㅏㅏㅏㅏ!!!!"
26005-260050350 = "열 받네"
26005-260050360 = "아 짜증 나!!"
26005-260050370 = "하하"
26005-260050380 = "하하하하"
26005-260050390 = "하하하하하하하하하하하"
26005-260050400 = "기껏 사주고 다시 뺏어 먹다니"
26005-260050410 = "줬다 뺏는 게 어딨어!? 악마!!"
26005-260050420 = "시끄러워"
26005-260050430 = "자업자득이잖아"
26005-260050440 = "그리고"
26005-260050450 = "히히"
26005-260050460 = "또 사 줄 테니까"
26005-260050470 = "그때는 어디 한번 잘 지켜보라고, 선생님"
26005-260050480 = "알았지?"

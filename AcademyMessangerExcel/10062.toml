[translation]
10062-100620010 = "老師，聽說您今天也要上班"
10062-100620020 = "看來夏萊一直都很忙碌呢"
10062-100620030 = "是誰……？"
10062-100620040 = "果然，這種時候就需要輔佐呢"
10062-100620050 = "我立刻去找您，老師"
10062-100620060 = "所以是誰！？"
10062-100620070 = "老師，請問現在是否方便呢？"
10062-100620080 = "我收到了一封陌生的信，不知該如何處理"
10062-100620090 = "如果您在忙的話，我本來是打算自己解決的……"
10062-100620100 = "不過我想，還是應該先和您商量"
10062-100620110 = "季遇到困難了！？還好嗎？我立刻過去！"
10062-100620120 = "非常感謝"
10062-100620130 = "那麼，可以請您到學校來一趟嗎？"
10062-100620140 = "聽說今天是由我擔任夏萊值日生的日子"
10062-100620150 = "請問是否正確呢？"
10062-100620160 = "第一次擔任值日生的季，我很期待哦"
10062-100620170 = "……？"
10062-100620180 = "雖然不是很明白……"
10062-100620190 = "為了回應老師的期待，我會全力進行輔佐的"
10062-100620200 = "那麼，稍後再見"
10062-100620210 = "老師"
10062-100620220 = "今天稍微耽擱了一點時間，抵達時間可能會比平常晚一些"
10062-100620230 = "沒能在約好的進行輔佐，非常抱歉"
10062-100620240 = "沒關係，不過季會遲到還真少見呢"
10062-100620250 = "我可以問發生了什麼事嗎？"
10062-100620260 = "沒什麼"
10062-100620270 = "並不是什麼大不了的事"
10062-100620280 = "請不必太過擔心"
10062-100620290 = "那麼，稍後再見"
10062-100620300 = "我認為現在"
10062-100620310 = "是我們之間需要「信物」的時候了"
10062-100620320 = "今天想跟您討論這件事情"
10062-100620330 = "我不太明白你的意思！"
10062-100620340 = "不必擔心"
10062-100620350 = "老師不明白也沒關係，只要我明白就行了"
10062-100620360 = "季……？"

[translation]
10062-100620010 = "선생님께서는 오늘도 어김없이 출근이라고 들었습니다."
10062-100620020 = "샬레의 업무란 언제나 혹독한 것이로군요."
10062-100620030 = "누구……?"
10062-100620040 = "역시, 이런 일에는 보좌가 필요하다고 판단됩니다."
10062-100620050 = "곧 찾아뵙겠습니다. 선생님."
10062-100620060 = "그러니까, 누구……?!"
10062-100620070 = "선생님. 지금 잠시 시간 괜찮으실지요."
10062-100620080 = "한 통의…… '편지'를 받았는데, 조금 곤란한 일이 되고 말았습니다."
10062-100620090 = "웬만한 일이라면 저 혼자 처리해야 하는 것이 마땅하겠습니다만."
10062-100620100 = "이번 일만큼은 어찌해야 할지 모르겠습니다."
10062-100620110 = "토키에게 곤란한 일이? 잠시만 기다려!"
10062-100620120 = "감사합니다."
10062-100620130 = "그러면, 학교에서 뵙겠습니다."
10062-100620140 = "오늘은 제가 샬레의 당번인 것으로 알고 있습니다만."
10062-100620150 = "이 정보에 오류는 없을까요?"
10062-100620160 = "토키의 첫 당번인가…… 기대되네."
10062-100620170 = "……?"
10062-100620180 = "무슨 말씀인지는 잘 모르겠습니다만."
10062-100620190 = "기대에 부응할 수 있도록, 최선을 다하겠습니다."
10062-100620200 = "그러면 샬레에서 뵙겠습니다. 선생님."
10062-100620210 = "선생님."
10062-100620220 = "오늘은 개인적인 일이 있어, 평소보다 조금 늦을 듯합니다."
10062-100620230 = "보좌 업무를 제 때 시행해야 하는데, 송구스럽습니다."
10062-100620240 = "어라, 그건 조금 놀라운 일이네."
10062-100620250 = "무슨 일이라도 있는지, 물어봐도 돼?"
10062-100620260 = "음."
10062-100620270 = "대단한 일은 아닙니다."
10062-100620280 = "너무 심려치 말아 주셨으면 합니다."
10062-100620290 = "그러면 나중에 뵙겠습니다."
10062-100620300 = "슬슬 저희 사이의 '증표'가"
10062-100620310 = "필요해진 시점이라고 보여지기에"
10062-100620320 = "오늘은 그에 관련된 말씀을 드리고자 합니다."
10062-100620330 = "여전히 영문을 모르겠어!"
10062-100620340 = "괜찮습니다."
10062-100620350 = "선생님께서 모르셔도, 제가 알고 있기에."
10062-100620360 = "토키야……?"

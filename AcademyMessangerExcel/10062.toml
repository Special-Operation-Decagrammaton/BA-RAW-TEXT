[translation]
10062-100620010 = "ได้ยินว่าวันนี้คุณครูก็มาทำงานด้วย"
10062-100620020 = "งานของทางชาเล่ต์นี่ลำบากมากเลยสินะคะ"
10062-100620030 = "ใครน่ะ...?"
10062-100620040 = "ฉันคิดว่างานพวกนี้ควรจะต้อง\nมีผู้ช่วยค่ะ"
10062-100620050 = "ฉันจะไปพบเร็วๆ นี้นะคะ คุณครู"
10062-100620060 = "ว่าแต่ว่าใครล่ะนั่น...?!"
10062-100620070 = "คุณครู พอจะมีเวลาสักครู่มั้ยคะ"
10062-100620080 = "ฉันได้จดหมายมาฉบับหนึ่ง...\nและก็กำลังเจอเรื่องลำบากนิดหน่อยค่ะ"
10062-100620090 = "อันที่จริงเรื่องเล็กน้อยแบบนี้\nฉันควรจัดการด้วยตัวเองแท้ๆ..."
10062-100620100 = "แต่บอกตามตรงค่ะว่าฉันไม่รู้จริงๆ\nว่าจะทำยังไงดี"
10062-100620110 = "เรื่องที่โทคิลำบากใจเหรอ?\nรอเดี๋ยวนะ ครูจะรีบไปหา!"
10062-100620120 = "ขอบคุณค่ะ"
10062-100620130 = "ถ้างั้นพบกันที่โรงเรียนนะคะ"
10062-100620140 = "ฉันทราบมาว่าวันนี้ฉันเป็นตัวแทน\nเข้าเวรที่ชาเล่ต์ค่ะ"
10062-100620150 = "ข้อมูลนี้ถูกต้องใช่มั้ยคะ?"
10062-100620160 = "ครั้งแรกของโทคิเหรอ...\nครูคาดหวังเลยแฮะ"
10062-100620170 = "...?"
10062-100620180 = "ถึงจะไม่ค่อยเข้าใจว่าคุณครูหมายถึง\nเรื่องอะไร"
10062-100620190 = "แต่ฉันจะพยายามอย่างเต็มที่เพื่อตอบ\nสนองความคาดหวังของคุณครูค่ะ"
10062-100620200 = "ถ้าอย่างนั้นเดี๋ยวพบกันที่ชาเล่ต์นะคะ\nคุณครู"
10062-100620210 = "คุณครูคะ"
10062-100620220 = "วันนี้ฉันมีธุระที่ต้องจัดการ อาจจะไปสาย\nสักหน่อยนะคะ"
10062-100620230 = "ฉันควรไปสนับสนุนคุณครูให้ตรงเวลา\nแท้ๆ ต้องขอโทษด้วยนะคะ"
10062-100620240 = "เอ๊ะ? น่าตกใจนะเนี่ย "
10062-100620250 = "ขอถามได้มั้ยว่าธุระนั่นคืออะไร?"
10062-100620260 = "อืม"
10062-100620270 = "ไม่ใช่เรื่องใหญ่หรอกค่ะ"
10062-100620280 = "คุณครูไม่ต้องกังวลหรอกค่ะ"
10062-100620290 = "ถ้าอย่างนั้นไว้พบกันนะคะ"
10062-100620300 = "ดูเหมือนว่าตอนนี้"
10062-100620310 = "จะต้องทำให้ 'เครื่องพิสูจน์'\nระหว่างเราสองคนชัดเจนขึ้น"
10062-100620320 = "วันนี้เลยจะมาคุยเกี่ยวกับเรื่องนั้นค่ะ"
10062-100620330 = "ครูไม่เก็ตเรื่องที่พูดเลย!"
10062-100620340 = "ไม่เป็นไรค่ะ"
10062-100620350 = "คุณครูไม่รู้ก็ไม่เป็นไร เพราะฉันรู้อยู่\nแล้วค่ะ"
10062-100620360 = "โทคิ...?"

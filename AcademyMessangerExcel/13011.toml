[translation]
13011-130110010 = "ท่านผู้กล้า..."
13011-130110020 = "ถ้าเห็น MOMOTALK นี้จงรีบมาที่ห้อง\nชมรมพัฒนาเกม"
13011-130110030 = "ได้เลย จะไปเดี๋ยวนี้"
13011-130110040 = "อืม..."
13011-130110050 = "รับเควสอย่างรวดเร็วโดยไม่ลังเลเลยนะ! "
13011-130110060 = "สมกับเป็นคุณครูเลย!"
13011-130110070 = "อะไรกัน ทำไมทำหน้าแบบนั้น?!\nไม่คิดเลยว่าจะเป็นแบบนี้!"
13011-130110080 = "ไม่หรอก ไม่เป็นไร บางทีบรรยากาศ\nแบบนี้ก็ถือว่าดีเหมือนกัน..."
13011-130110090 = "ใช่ซะที่ไหนล่ะ!"
13011-130110100 = "เราสัญญากันไว้แล้วนี่นา! ไหนว่า\nจะมาเจอกันที่ห้องไง!"
13011-130110110 = "นี่สัญญาไว้แบบนั้นเหรอ...?"
13011-130110120 = "ฉันจะรออยู่ที่ห้องชมรมพัฒนาเกมนะ!"
13011-130110130 = "รีบๆ มาล่ะ!"
13011-130110140 = "คุณครู..."
13011-130110150 = "คุณครูคิดว่าเนื้อเรื่องเกมเรโทรที่ดี\nควรต้องประกอบด้วยอะไรบ้าง?"
13011-130110160 = "เนื้อเรื่องที่ดีของเกมแนวเรโทรเหรอ?"
13011-130110170 = "ทำไมถึงสงสัยล่ะ?"
13011-130110180 = "ก็แบบว่า..."
13011-130110190 = "เจ้าพวกนั้นน่ะ!"
13011-130110200 = "พวกนั้นมักชอบพูดพล่ามไปเรื่อย!"
13011-130110210 = "บ่นว่าเนื้อเรื่องน่าเบื่อ\nหรือการเดินเรื่องหละหลวมบ้างล่ะ... บลาๆ"
13011-130110220 = "ฉันทนไม่ไหวแล้ว มาเจอกัน\nที่ห้องชมรมพัฒนาเกมนะคุณครู!"
13011-130110230 = "หืม...?"
13011-130110231 = "ทำไงดีล่ะคุณครู?!"
13011-130110232 = "ไอเดียที่ผุดมาในหัวของฉันมันไม่\nสมเหตุสมผลเอาซะเลย"
13011-130110233 = "แล้วก็คิดไอเดียที่จะมาต่อกันไม่ได้\nเลยด้วย! ช่วยหน่อยสิ!!!"
13011-130110234 = "ว้าววว!"
13011-130110240 = "โลกของเกมเรโทรช่างกว้างซะจริง!"
13011-130110250 = "แต่ในโลกของเกมเรโทร…\nเกมที่เน้นด้านเนื้อเรื่องมากที่สุด..."
13011-130110260 = "ก็คือเกมจีบหนุ่มสาวยังไงล่ะ!"
13011-130110270 = "เกมจีบหนุ่มสาวเหรอ...?"
13011-130110280 = "วันนี้ฉันจะ.. "
13011-130110290 = "จำลองสถานการณ์ของเกมจีบหนุ่มสาวดู"
13011-130110300 = "เจอกันที่ถนนข้างนอกนะคุณครู!"
13011-130110310 = "จำลองสถานการณ์... เกมจีบหนุ่มสาว...?"
13011-130110320 = "คุณครู วะ... วันนี้สนุกมากเลยล่ะ..."
13011-130110330 = "อื้ม ครูก็สนุกมากเลย"
13011-130110340 = "ดีจังเลยนะ"
13011-130110350 = "แต่เรื่องที่เกิดในวันนี้ต้องเก็บเป็น\nความลับนะ!"
13011-130110360 = "โดยเฉพาะกับมิโดริ ห้ามบอกเด็ดขาด!"
13011-130110370 = "หืม? ต้องเป็นความลับเหรอ?"
13011-130110380 = "ก็ฉันอายนี่นา ห้ามบอกใครล่ะ!"
13011-130110390 = "คุณครู... คุณครู!"
13011-130110400 = "อื้ม! ว่าไงโมโมอิ!"
13011-130110410 = "มีอะไรเหรอ?"
13011-130110420 = "วันนี้มีงานอีเวนต์ใหญ่ที่ฮารุฮาบะระล่ะ!"
13011-130110430 = "แสตมป์แรลลี่ครบรอบ 40 ปี อัลตร้า\nมารีนซิสเตอร์!"
13011-130110440 = "แสตมป์แรลลี่เหรอ?"
13011-130110450 = "เห็นว่าถ้าสะสมแสตมป์ครบ จะแจก\nของขวัญพิเศษด้วย"
13011-130110460 = "เราจะพลาดไม่ได้เด็ดขาด!"
13011-130110470 = "พร้อมลุยนะคุณครู?!"
13011-130110480 = "ยังจำได้รึเปล่า"
13011-130110490 = "ฮันเตอร์เอ๋ย!"
13011-130110500 = "จำได้อยู่แล้ว คู่หู...!"
13011-130110510 = "การล่าของเราจะเริ่มขึ้น ณ บัดนี้..."
13011-130110520 = "เยี่ยม! ต้องอย่างนี้สิ!"
13011-130110530 = "วันนี้มาเอาจริงกันเถอะ!"

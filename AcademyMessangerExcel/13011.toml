[translation]
13011-130110010 = "Oh, brave hero..."
13011-130110020 = "Please come to the Game Development Department's club room as soon as you get this message..."
13011-130110030 = "Okay, I'll be right there."
13011-130110040 = "Uhhh..."
13011-130110050 = "You just accepted it like that, without even a moment of hesitation!"
13011-130110060 = "That's Sensei for you!"
13011-130110070 = "Hey, what's with the lukewarm reaction? I wasn't expecting this!"
13011-130110080 = "No, no... Based on the scenario, this type of story branch should be just fine..."
13011-130110090 = "...Or maybe not."
13011-130110100 = "You promised to meet me at the club room today!"
13011-130110110 = "You're right...I think?"
13011-130110120 = "I'll be waiting for you at the Game Development Department club room!"
13011-130110130 = "So hurry up!"
13011-130110140 = "Sensei..."
13011-130110150 = "What do you think you need for the perfect story in a retro game?"
13011-130110160 = "A perfect game story...?"
13011-130110170 = "...What's the problem?"
13011-130110180 = "It's nothing..."
13011-130110190 = "Those dummies! "
13011-130110200 = "They're just blabbing away!"
13011-130110210 = "The story is boring, the game mechanics aren't tight... Yada, yada, yada..."
13011-130110220 = "I can't stand it. Meet me in the Game Development Department club room, Sensei!"
13011-130110230 = "Huh?"
13011-130110231 = "What do I do, Sensei?!"
13011-130110232 = "My ideas are all so uninspired..."
13011-130110233 = "I can't think of anything else! Please help me!"
13011-130110234 = "Waaahhh!"
13011-130110240 = "The world of retro games is limitless, Sensei!"
13011-130110250 = "But even in the retro game world, the most story-heavy games"
13011-130110260 = "would be dating sims! Yeah!"
13011-130110270 = "Dating sims...?"
13011-130110280 = "Today..."
13011-130110290 = "I'm going to \"simulate\" a dating sim!"
13011-130110300 = "I'll see you out on the street, Sensei!"
13011-130110310 = "A simulation...of a simulation...?"
13011-130110320 = "Today was fun, Sensei..."
13011-130110330 = "I had fun too."
13011-130110340 = "That's good to hear..."
13011-130110350 = "We can't tell anyone what we did today!"
13011-130110360 = "Especially not Midori!"
13011-130110370 = "Huh? But why..."
13011-130110380 = "Because it's embarrassing! It's a secret!"
13011-130110390 = "Sensei, Sensei!"
13011-130110400 = "Yes! Momoi, Momoi!"
13011-130110410 = "What's wrong?"
13011-130110420 = "I heard about a big event going on at Haru Habara!"
13011-130110430 = "There's a stamp rally going on for the Ultra Marine Sisters' fortieth anniversary!"
13011-130110440 = "...A stamp rally?"
13011-130110450 = "If you get all the stamps, you can get special items!"
13011-130110460 = "We can't miss this!"
13011-130110470 = "Okay, Sensei?"
13011-130110480 = "Hunter!"
13011-130110490 = "Do you remember?!"
13011-130110500 = "Of course I do, partner."
13011-130110510 = "And now, our hunt begins..."
13011-130110520 = "Yeah! That's the spirit!"
13011-130110530 = "Let's go for a full run today!"

[translation]
13011-130110010 = "용사여……"
13011-130110020 = "이 모모톡을 받으면 곧바로 게임개발부의 부실로……"
13011-130110030 = "응, 바로 갈게."
13011-130110040 = "어……"
13011-130110050 = "과연, 한 치의 망설임도 없는 빠른 퀘스트 수락!"
13011-130110060 = "그래야 선생님이지!"
13011-130110070 = "뭐야, 그 미적지근한 반응은?! 전혀 예상 못했는데?!"
13011-130110080 = "아니, 아니지. 시나리오에 따라선 이런 분기도 충분히 매력적……"
13011-130110090 = "……이 아니라!"
13011-130110100 = "오늘 약속했잖아! 부실에서 보기로!"
13011-130110110 = "그랬, 었나?"
13011-130110120 = "하여간 게임개발부 부실에서 기다리고 있을 테니까!"
13011-130110130 = "얼른 와!"
13011-130110140 = "선생님……"
13011-130110150 = "완벽한 레트로 게임 시나리오의 조건이 뭐라고 생각해?"
13011-130110160 = "완벽한 게임 시나리오……?"
13011-130110170 = "……뭣 때문에 그래?"
13011-130110180 = "딴 게 아니라……"
13011-130110190 = "그 녀석들!"
13011-130110200 = "멋대로 떠들고 있단 말야!"
13011-130110210 = "소재가 고리타분하다느니, 전개가 루즈하다느니."
13011-130110220 = "안 되겠어. 선생님, 게임개발부 부실에서 봐!"
13011-130110230 = "……어?"
13011-130110231 = "어쩌지, 선생님?!"
13011-130110232 = "모처럼 떠오른 아이디어가 완전 모순적이라,"
13011-130110233 = "그걸 타파할 다음 아이디어가 전혀 떠오르지 않아! 도와줘!!!"
13011-130110234 = "우와아앙?!"
13011-130110240 = "레트로 게임의 세계는 무진장 넓어, 선생님!"
13011-130110250 = "그런 레트로 게임 내에서도 가장 시나리오 비중이 높은 게임이란"
13011-130110260 = "바로 연애 시뮬레이션 게임이라 할 수 있겠지! 응!"
13011-130110270 = "연애 시뮬레이션……?"
13011-130110280 = "오늘,"
13011-130110290 = "그 연애 시뮬레이션을 시뮬레이션 해보려고 해!"
13011-130110300 = "거리에서 보자, 선생님!"
13011-130110310 = "시뮬레이션을……. 시뮬레이션……?"
13011-130110320 = "선생님, 오, 오늘 즐거웠어……"
13011-130110330 = "응, 나도 즐거웠어."
13011-130110340 = "그럼 다행이다……"
13011-130110350 = "하지만, 오늘 일은 그, 다른 사람들한텐 비밀이야!"
13011-130110360 = "특히 미도리한테는 더욱더!"
13011-130110370 = "응? 굳이 그럴 것까지는……"
13011-130110380 = "부끄러우니까. 비밀!"
13011-130110390 = "선생님, 선생님!"
13011-130110400 = "응! 모모이모모이!"
13011-130110410 = "왜 그래?"
13011-130110420 = "하루하바라에서 커다란 이벤트가 있대!"
13011-130110430 = "무려 울트라 마린 시스터즈 40주년 스탬프 랠리가……!"
13011-130110440 = "……스탬프 랠리?"
13011-130110450 = "스탬프를 전부 모으면 특제 굿즈가 선물로 나온다고 하니"
13011-130110460 = "이건 놓칠 수 없어!"
13011-130110470 = "알았지, 선생님?!"
13011-130110480 = "기억하고 있는가"
13011-130110490 = "사냥꾼이여!"
13011-130110500 = "기억하고 있다마다, 파트너……."
13011-130110510 = "바야흐로, 우리의 헌팅이 시작된다……."
13011-130110520 = "좋아! 바로 그 자세야!"
13011-130110530 = "오늘은 어디 한번 제대로 달려 보자고!"

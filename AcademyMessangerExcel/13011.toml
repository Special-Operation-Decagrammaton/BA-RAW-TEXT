[translation]
13011-130110010 = "勇者啊……"
13011-130110020 = "看見這則MomoTalk後，馬上來遊戲開發部的社團教室……"
13011-130110030 = "嗯，那我現在過去"
13011-130110040 = "咦……"
13011-130110050 = "竟然毫不猶豫地接受任務！"
13011-130110060 = "不愧是老師！"
13011-130110070 = "唔，竟然選這個選項！？這是我沒預料到的……！"
13011-130110080 = "不，按照劇本來說，也是有可能有這樣的分歧……"
13011-130110090 = "……不對啦！"
13011-130110100 = "不是約好今天要來社團教室嗎！"
13011-130110110 = "……是嗎？"
13011-130110120 = "總之，我在遊戲開發部的社團教室等著！"
13011-130110130 = "快點來！"
13011-130110140 = "老師──"
13011-130110150 = "你覺得最棒的遊戲劇本要具備哪些條件？"
13011-130110160 = "最棒的遊戲劇本……？"
13011-130110170 = "怎麼突然這麼問呢？"
13011-130110180 = "因為……"
13011-130110190 = "啊啊！光回想起來就覺得好生氣！"
13011-130110200 = "那些傢伙竟敢在那邊亂講話！"
13011-130110210 = "說什麼想法過時，什麼劇情節奏崩壞"
13011-130110220 = "這樣不行！老師，現在到遊戲開發部的社團教室來！"
13011-130110230 = "……？"
13011-130110231 = "怎麼辦，老師！？"
13011-130110232 = "好不容易浮現的靈感整個大矛盾"
13011-130110233 = "完全想不出下一個靈感來解困！救救我──！"
13011-130110234 = "嗚哇啊！！！"
13011-130110240 = "老師，復古遊戲的世界非常寬廣！"
13011-130110250 = "但在這些復古遊戲中，說到劇情比重大的遊戲"
13011-130110260 = "就不得不提戀愛模擬遊戲！"
13011-130110270 = "戀愛模擬……？"
13011-130110280 = "所以今天"
13011-130110290 = "我想要模擬戀愛模擬！"
13011-130110300 = "那我晚點發地點給你，在那裡碰面吧！老師！"
13011-130110310 = "模擬戀愛模擬……？"
13011-130110320 = "老師，那個……今天很開心。謝謝"
13011-130110330 = "嗯，我也很開心"
13011-130110340 = "那，那真是太好了"
13011-130110350 = "但是，今天的事要和別人保密唷！"
13011-130110360 = "特別是不能對綠說！"
13011-130110370 = "為什麼要到那種程度？一開始確實是為了遊戲開發部才……"
13011-130110380 = "不行！絕對要保密！！"
13011-130110390 = "老師老師！"
13011-130110400 = "桃井出現了！"
13011-130110410 = "怎麼了？"
13011-130110420 = "聽說這次在春葉原有非常大的活動！"
13011-130110430 = "竟然有究極瑪琳姊妹40週年集章活動！"
13011-130110440 = "集章活動？"
13011-130110450 = "收集所有印章的話，就能拿到限定商品作為獎品"
13011-130110460 = "這可不能錯過……！"
13011-130110470 = "一起去吧，老師！！"
13011-130110480 = "你還記得嗎"
13011-130110490 = "獵人啊！"
13011-130110500 = "當然記得囉，夥伴……"
13011-130110510 = "現在正是狩獵開始之時……"
13011-130110520 = "很好！就是這個氣勢！"
13011-130110530 = "今天就來好好狩獵一番吧！"

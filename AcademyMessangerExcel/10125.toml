[translation]
10125-101250010 = "뉴후후후."
10125-101250020 = "안녕하십니까, 마스터."
10125-101250030 = "오늘도 세계는 마나로 넘치고 있네요!"
10125-101250040 = "마스터는 어떠신가요?"
10125-101250050 = "마나는 모르겠지만 기운은 넘쳐!"
10125-101250060 = "정말인가요?"
10125-101250070 = "제 점괘는 못 속이는데."
10125-101250080 = "어제도 야근하셨죠?"
10125-101250090 = "큭……!"
10125-101250100 = "자아, 오늘은 일 같은 거 생각하지 말고"
10125-101250110 = "저와 느긋한 시간을 보내면 어떠실지요."
10125-101250120 = "일도 좋지만 휴식도 중요하잖아요?"
10125-101250130 = "응. 좋은 생각이네."
10125-101250140 = "간식이라도 사갈까?"
10125-101250150 = "뉴후후. 역시 마스터와는 마음이 통하는군요."
10125-101250160 = "그럼 즐겁게 기다리고 있겠습니다!"
10125-101250170 = "오늘 정말 즐거웠습니다, 마스터."
10125-101250180 = "덕분에 당분간 마나 걱정은 없겠네요."
10125-101250190 = "마스터도 좀 충전이 되셨을까요?"
10125-101250200 = "응! 힘이 끓어올라!"
10125-101250210 = "뉴후후."
10125-101250220 = "언제라도 기분 전환이 필요할 땐 저를 찾아 주시길."
10125-101250230 = "우리는 마법으로 연결되어 있으니까요."
10125-101250240 = "마스터!"
10125-101250250 = "큰일 났습니다!"
10125-101250260 = "정말로 큰일이 나버렸습니다!"
10125-101250270 = "사감대에 쫓기는 중?"
10125-101250280 = "아닙니다!"
10125-101250290 = "정말로 심각한 일이 벌어진 겁니다!"
10125-101250300 = "이건 저의 마법서도 예상 못 한 일이에요!"
10125-101250310 = "대체 무슨 일인데 그래?"
10125-101250320 = "그게 말이죠……."
10125-101250330 = "오늘 실기 시험이 있는데……."
10125-101250340 = "시험장에……."
10125-101250350 = "마법 모자를 쓰고 가면 안 된대요……."
10125-101250360 = "…………"
10125-101250370 = "안녕하세요, 마스터."
10125-101250380 = "오늘 실기 시험이 끝났어요……."
10125-101250390 = "어땠어? 잘 본 것 같아?"
10125-101250400 = "후후……."
10125-101250410 = "뉴후후후……."
10125-101250420 = "마스터."
10125-101250430 = "저, 오늘부로 새로운 마법을 연구하려 해요."
10125-101250440 = "바로 기억을 지우는 마법이죠."
10125-101250450 = "그 마법만 있다면……"
10125-101250460 = "부끄러운 기억을 모두 없앨 수 있어요!"
10125-101250470 = "어, 어떻게 지우는데?"
10125-101250480 = "머리에 강한 물리적 충격을 주면 돼요!"
10125-101250490 = "진정해! 다음엔 잘될 거야!"
10125-101250500 = "저도 그랬으면 좋겠네요."
10125-101250510 = "하아아아……."
10125-101250520 = "아무튼 오늘 정말 감사했습니다, 마스터."
10125-101250530 = "다음에 또 뵈어요……."
10125-101250540 = "마스터……."
10125-101250550 = "저번 실기 시험 이후로 마력이 회복되질 않네요."
10125-101250560 = "마법서를 펼쳐도 길이 보이지 않고……."
10125-101250570 = "이제 어떡하면 좋죠?"
10125-101250580 = "샬레 근처에서 기분전환이라도 할까?"
10125-101250590 = "오오, 듣기만 해도 힘이 나네요!"
10125-101250600 = "이, 이건 설마……."
10125-101250610 = "말 자체에 마법을 담은 언령 마법?!"
10125-101250620 = "그 마법은 오래전에 소멸한 걸로 아는데!"
10125-101250630 = "마스터가 어떻게 그런 고대의 마법을!"
10125-101250640 = "……."
10125-101250650 = "하아아……."
10125-101250660 = "죄송해요."
10125-101250670 = "평소엔 이렇게 마법 담론을 하고 있으면 기운이 났었는데."
10125-101250680 = "왜 이렇게 힘이 안 나지."
10125-101250690 = "아무튼 알겠습니다, 마스터."
10125-101250700 = "곧 찾아뵐게요."
10125-101250710 = "잘 들어가셨습니까, 마스터."
10125-101250720 = "오늘 덕분에 많은 생각을 하게 됐습니다."
10125-101250730 = "정말 마법 같은 하루였어요."
10125-101250740 = "한 번에 두 서클 정도 레벨업을 한 느낌이랄까요."
10125-101250750 = "10서클의 <세계창조 마법>은 쓸 수 있을 것 같아?"
10125-101250760 = "아직 그 정도는 아니지만,"
10125-101250770 = "비슷한 마법은 쓸 수 있을 것 같아요."
10125-101250780 = "캔버스 안에 저만의 세계를 만드는 마법이요."
10125-101250790 = "뉴후후후."
10125-101250800 = "그럼 다음 만남 때까지 기대해 주세요!"
10125-101250810 = "마스터. 드디어 때가 왔어요."
10125-101250820 = "저만의 세계창조 마법을 보여드릴 때가!"
10125-101250830 = "오오, 드디어!"
10125-101250840 = "아직 100퍼센트 완벽한 수준은 아닙니다만"
10125-101250850 = "모든 마력을 끌어모아 준비해 보려 합니다."
10125-101250860 = "그러면 저희 학원에서 뵙겠습니다!"
10125-101250870 = "마스터. 오늘 정말 감사했습니다."
10125-101250880 = "덕분에 자신감이 많이 생겼어요."
10125-101250890 = "이걸로 저도 한 걸음 앞으로 나아간 거겠죠."
10125-101250900 = "응! 다음 시험은 잘 볼 수 있을 거야!"
10125-101250910 = "만약 또 모자를 벗어야 한다면……."
10125-101250920 = "후우우, 어떻게든 노력해 보겠어요."
10125-101250930 = "아무튼, 초상화는 잘 가져가셨나요?"
10125-101250940 = "응. 잘 보이는 곳에 걸어둘게."
10125-101250950 = "뉴후후후."
10125-101250960 = "좋습니다."
10125-101250970 = "그 그림을 볼 때마다 저를 떠올리는 겁니다."
10125-101250980 = "그럼 다음 만남을 기약하며."
10125-101250990 = "언제나 행복의 마법이 함께 하기를!"

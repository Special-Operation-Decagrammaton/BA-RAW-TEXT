[translation]
10125-101250010 = "妞呵呵呵"
10125-101250020 = "貴安，御者"
10125-101250030 = "今天的世界依然充滿魔力呢！"
10125-101250040 = "御者你感覺怎麼樣？"
10125-101250050 = "魔力我不確定，精神倒是滿滿的哦！"
10125-101250060 = "真的嗎？"
10125-101250070 = "我的占卜可是不會騙人的"
10125-101250080 = "你昨天也加班了吧？"
10125-101250090 = "唔……！"
10125-101250100 = "那麼，今天就別再想工作的事情"
10125-101250110 = "跟我一起悠閒一下怎麼樣？"
10125-101250120 = "工作固然重要，但休息也是一樣的吧？"
10125-101250130 = "嗯，好主意"
10125-101250140 = "要不要我買點零食？"
10125-101250150 = "妞呵呵，御者果然和我心有靈犀呢"
10125-101250160 = "那我就開心地等你來囉！"
10125-101250170 = "今天真的很愉快，御者"
10125-101250180 = "託你的福，暫時不用擔心魔力不足了"
10125-101250190 = "御者也補充好能量了嗎？"
10125-101250200 = "嗯！感覺力量都沸騰起來了！"
10125-101250210 = "妞呵呵"
10125-101250220 = "需要轉換心情的時候，歡迎隨時來找我哦"
10125-101250230 = "畢竟我們之間可是用魔法連結在一起的"
10125-101250240 = "御者！"
10125-101250250 = "出大事！"
10125-101250260 = "真的出大事了！"
10125-101250270 = "例如被舍監隊追捕？"
10125-101250280 = "不是！"
10125-101250290 = "真的發生了嚴重的事情！"
10125-101250300 = "連我的魔導書都沒預測到的那種！"
10125-101250310 = "到底是什麼事？"
10125-101250320 = "就是……"
10125-101250330 = "今天有實作考試……"
10125-101250340 = "但是考場……"
10125-101250350 = "不能戴魔法帽進去……"
10125-101250360 = "…………"
10125-101250370 = "你好，御者"
10125-101250380 = "今天的實作考試結束了……"
10125-101250390 = "感覺怎麼樣？考得還順利嗎？"
10125-101250400 = "呵呵……"
10125-101250410 = "妞呵呵呵……"
10125-101250420 = "御者"
10125-101250430 = "我，打算從今天開始研究一項新的魔法"
10125-101250440 = "那就是消除記憶的魔法"
10125-101250450 = "只要學會了它……"
10125-101250460 = "就能把所有羞恥的記憶全部抹除！"
10125-101250470 = "要，要怎麼抹除？"
10125-101250480 = "只要對頭腦施加強烈的物理衝擊就行了！"
10125-101250490 = "你先冷靜！下次一定會更好的！"
10125-101250500 = "我也希望如此"
10125-101250510 = "唉……"
10125-101250520 = "總之今天真的非常謝謝你，御者"
10125-101250530 = "下次再見……"
10125-101250540 = "御者……"
10125-101250550 = "在上次的實作考試之後，我的魔力就一直無法恢復"
10125-101250560 = "就算打開魔導書也看不到道路……"
10125-101250570 = "我該怎麼辦才好呢？"
10125-101250580 = "要不要到夏萊附近散散心？"
10125-101250590 = "哦哦，光看就覺得有力氣了！"
10125-101250600 = "這，這難道是……"
10125-101250610 = "將魔法融入言語的言靈魔法嗎！？"
10125-101250620 = "可是那種魔法應該早就消失了才對！"
10125-101250630 = "御者怎麼會懂那種古代魔法呢！"
10125-101250640 = "……"
10125-101250650 = "唉……"
10125-101250660 = "對不起"
10125-101250670 = "平常只要聊到魔法理論就會精神滿滿"
10125-101250680 = "現在卻完全提不起勁呢"
10125-101250690 = "總之我知道了，御者"
10125-101250700 = "我馬上過去"
10125-101250710 = "回去的路上還順利嗎，御者？"
10125-101250720 = "今天多虧御者，讓我思考了很多"
10125-101250730 = "真的是魔法般的一天"
10125-101250740 = "感覺魔法環等級一口氣提升了2階呢"
10125-101250750 = "能用出第10環的「世界創造魔法」了嗎？"
10125-101250760 = "雖然還沒到那個程度"
10125-101250770 = "不過應該能用出類似的魔法了"
10125-101250780 = "也就是在畫布上，創造屬於自己的世界的魔法"
10125-101250790 = "妞呵呵呵"
10125-101250800 = "那麼，請期待我們下次的見面吧！"
10125-101250810 = "御者，時機終於到了"
10125-101250820 = "該讓你見識我的世界創造魔法了！"
10125-101250830 = "哦哦，終於！"
10125-101250840 = "雖然還沒百分之百完美"
10125-101250850 = "但我會傾注所有魔力來準備"
10125-101250860 = "那麼我們學院見！"
10125-101250870 = "御者，今天真的非常謝謝你"
10125-101250880 = "多虧御者讓我充滿了自信"
10125-101250890 = "這樣我也算是往前邁進了一步吧"
10125-101250900 = "嗯！下次考試一定能考好的！"
10125-101250910 = "如果又要脫帽的話……"
10125-101250920 = "呼……我會努力想想辦法的"
10125-101250930 = "話說回來，肖像畫有確實帶回去嗎？"
10125-101250940 = "嗯，我會掛在顯眼的地方"
10125-101250950 = "妞呵呵呵"
10125-101250960 = "那就好"
10125-101250970 = "每次看到那幅畫的時候，記得要想起我哦？"
10125-101250980 = "那麼，期待下次再見"
10125-101250990 = "願幸福的魔法永遠與御者同在！"

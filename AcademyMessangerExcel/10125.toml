[translation]
10125-101250010 = "อุฮุฮุฮุ"
10125-101250020 = "สวัสดีค่ะมาสเตอร์"
10125-101250030 = "วันนี้โลกก็เปี่ยมไปด้วยมานาเลยนะคะ!"
10125-101250040 = "มาสเตอร์เป็นยังไงบ้างคะ?"
10125-101250050 = "ครูไม่ค่อยรู้เรื่องมานาหรอก\nแต่มีพลังเหลือล้นเลยละ!"
10125-101250060 = "จริงเหรอคะ?"
10125-101250070 = "หลอกการพยากรณ์ของฉันไม่ได้\nหรอกค่ะ"
10125-101250080 = "เมื่อวานก็ทำงานดึกใช่มั้ยคะ?"
10125-101250090 = "อึก...!"
10125-101250100 = "ถ้างั้นวันนี้ไม่ต้องคิดเรื่องงาน"
10125-101250110 = "แล้วมาใช้เวลาสบายๆ กับฉันสิคะ"
10125-101250120 = "การทำงานเป็นเรื่องดีค่ะ\nแต่การพักผ่อนก็สำคัญนะคะ"
10125-101250130 = "อื้อ เป็นความคิดที่ดีนะ"
10125-101250140 = "ครูซื้อขนมไปด้วยดีมั้ย?"
10125-101250150 = "อุฮุฮุ รู้ใจสมกับเป็นมาสเตอร์เลยนะคะ"
10125-101250160 = "ถ้างั้นฉันจะรอนะคะ!"
10125-101250170 = "วันนี้สนุกมากเลยค่ะมาสเตอร์"
10125-101250180 = "ขอบคุณมากเลยค่ะ ฉันคงไม่ต้องกังวล\nเรื่องมานาไปอีกสักพักเลย"
10125-101250190 = "มาสเตอร์ก็ชาร์จพลังได้เหมือนกัน\nใช่มั้ยคะ?"
10125-101250200 = "อื้อ! ชาร์จแบตมาเต็มเลยละ!"
10125-101250210 = "อุฮุฮุ"
10125-101250220 = "ถ้าอยากเปลี่ยนบรรยากาศก็มาหาฉัน\nได้นะคะ"
10125-101250230 = "เพราะเราเชื่อมโยงกันด้วยเวทมนตร์\nยังไงล่ะคะ"
10125-101250240 = "มาสเตอร์!"
10125-101250250 = "เกิดเรื่องใหญ่แล้วค่ะ!"
10125-101250260 = "เกิดเรื่องใหญ่จริงๆ แล้วค่ะ!"
10125-101250270 = "โดนฝ่ายดูแลหอพักไล่ตามอยู่เหรอ?"
10125-101250280 = "เปล่านะคะ!"
10125-101250290 = "เกิดเรื่องร้ายแรงสุดๆ ขึ้นแล้วค่ะ!"
10125-101250300 = "เป็นเรื่องที่ตำราเวทของฉันก็หยั่งรู้\nไม่ได้เลยค่ะ!"
10125-101250310 = "เกิดอะไรขึ้นกันแน่เนี่ย?"
10125-101250320 = "คือว่าเรื่องนั้น..."
10125-101250330 = "วันนี้ฉันมีสอบปฏิบัติค่ะ..."
10125-101250340 = "แล้วในห้องสอบ..."
10125-101250350 = "ห้ามใส่หมวกเวทมนตร์เข้าไปน่ะ"
10125-101250360 = "......"
10125-101250370 = "สวัสดีค่ะมาสเตอร์"
10125-101250380 = "สอบปฏิบัติเสร็จแล้วค่ะ..."
10125-101250390 = "เป็นไงบ้าง? ทำข้อสอบได้มั้ย?"
10125-101250400 = "ฮุฮุ..."
10125-101250410 = "อุฮุฮุฮุ..."
10125-101250420 = "มาสเตอร์"
10125-101250430 = "วันนี้ฉันจะเริ่มวิจัยเวทมนตร์ชนิดใหม่ค่ะ"
10125-101250440 = "นั่นคือเวทมนตร์ลบความทรงจำค่ะ"
10125-101250450 = "ถ้ามีเวทมนตร์นี้ละก็..."
10125-101250460 = "ฉันก็จะลบความทรงจำที่น่าอาย\nไปได้หมดเลยค่ะ!"
10125-101250470 = "แล้ว... จะลบยังไงเหรอ?"
10125-101250480 = "ก็แค่จับหัวกระแทกแรงๆ ก็พอค่ะ!"
10125-101250490 = "ใจเย็นๆ นะ คราวหน้าต้องทำสำเร็จแน่!"
10125-101250500 = "ฉันก็อยากให้เป็นอย่างนั้นค่ะ"
10125-101250510 = "เฮ้อ..."
10125-101250520 = "แต่ยังไงวันนี้ก็ขอบคุณมากเลยนะคะ\nมาสเตอร์"
10125-101250530 = "ไว้พบกันใหม่ค่ะ..."
10125-101250540 = "มาสเตอร์..."
10125-101250550 = "หลังสอบปฏิบัติครั้งก่อน มานาของฉัน\nยังไม่ฟื้นกลับมาเลยค่ะ"
10125-101250560 = "ถึงจะเปิดตำราเวทก็มองไม่เห็นเลย..."
10125-101250570 = "ทำยังไงดีล่ะคะ?"
10125-101250580 = "ไปเดินเล่นเปลี่ยนบรรยากาศใกล้ๆ\nชาเล่ต์กันมั้ย?"
10125-101250590 = "โอ้ พอได้ยินก็มีกำลังใจแล้วค่ะ!"
10125-101250600 = "ระ... หรือว่า..."
10125-101250610 = "หรือนี่คือวัจนมนตราเหรอ?!"
10125-101250620 = "ฉันนึกว่าเวทมนตร์นี้หายสาปสูญไป\nนานแล้วซะอีก!"
10125-101250630 = "มาสเตอร์ใช้เวทมนตร์โบราณแบบนั้น\nได้เหรอ?!"
10125-101250640 = "......"
10125-101250650 = "ฮู่ว..."
10125-101250660 = "ขอโทษค่ะ"
10125-101250670 = "ปกติเวลาได้พูดเรื่องเวทมนตร์ฉันจะ\nตื่นเต้นเป็นพิเศษ"
10125-101250680 = "แต่ตอนนี้กลับไม่ค่อยมีแรงเลย"
10125-101250690 = "เอาเป็นว่าฉันเข้าใจแล้วค่ะ มาสเตอร์"
10125-101250700 = "ฉันจะไปหาค่ะ"
10125-101250710 = "กลับไปอย่างสวัสดิภาพรึเปล่าคะ\nมาสเตอร์"
10125-101250720 = "ขอบคุณนะคะ วันนี้ฉันมีเรื่องให้คิดเยอะ\nเลยละค่ะ"
10125-101250730 = "เป็นวันที่วิเศษจริงๆ เลยค่ะ"
10125-101250740 = "รู้สึกเหมือนได้เลื่อนระดับไปอีกสองขั้น\nเลยนะคะ"
10125-101250750 = "ใช้ <เวทมนตร์สร้างโลก>\nระดับ 10 ได้แล้วสินะ?"
10125-101250760 = "ยังไม่ถึงขั้นนั้นหรอก"
10125-101250770 = "แต่ก็น่าจะใส่เวทมนตร์คล้ายๆ กันได้ค่ะ"
10125-101250780 = "เวทมนตร์สร้างโลกของฉันบนผืนผ้า\nแคนวาสค่ะ"
10125-101250790 = "อุฮุฮุฮุ"
10125-101250800 = "รบกวนรอจนกว่าเราจะได้พบกันใหม่\nนะคะ"
10125-101250810 = "มาสเตอร์ ถึงเวลาแล้วค่ะ"
10125-101250820 = "ถึงเวลาแสดงเวทมนตร์สร้างโลกของ\nฉันแล้ว!"
10125-101250830 = "โอ้ววว สักทีนะ!"
10125-101250840 = "ถึงมันจะยังไม่สมบูรณ์ร้อยเปอร์เซ็นต์"
10125-101250850 = "ฉันจะรวบรวมพลังเวททั้งหมดแล้ว\nเตรียมตัวให้พร้อมค่ะ"
10125-101250860 = "แล้วพบกันที่สถาบันนะคะ!"
10125-101250870 = "วันนี้ขอบคุณมากนะคะ มาสเตอร์"
10125-101250880 = "ขอบคุณที่ทำให้ฉันมีความมั่นใจขึ้นค่ะ"
10125-101250890 = "นี่เป็นก้าวสำคัญของฉันเหมือนกันค่ะ"
10125-101250900 = "อื้อ! คราวหน้าต้องทำข้อสอบได้แน่ๆ!"
10125-101250910 = "แต่ถ้าต้องถอดหมวกอีกละก็..."
10125-101250920 = "ฮือออ ฉันจะลองพยายามดูค่ะ"
10125-101250930 = "แล้วภาพเหมือนเอากลับไปได้\nอย่างปลอดภัยมั้ยคะ?"
10125-101250940 = "อื้อ ครูวางไว้ในที่ที่มองเห็นได้ชัดเลย"
10125-101250950 = "อุฮุฮุฮุ"
10125-101250960 = "ดีแล้วค่ะ"
10125-101250970 = "เวลามองรูปนั้นจะได้นึกถึงฉันค่ะ"
10125-101250980 = "เอาไว้พบกันใหม่นะคะ"
10125-101250990 = "ขอให้เวทมนตร์แห่งความสุขอยู่คู่\nคุณครูตลอดไปค่ะ!"

[translation]
13000-2260 = "สวัสดีค่ะ นายท่านของฉัน~"
13000-2261 = "พวกหลอกลวงทางโทรศัพท์\nแบบใหม่เหรอ...?"
13000-2262 = "ไม่ใช่นายท่านสิ ต้องเรียกว่าคุณครูนะ"
13000-2263 = "ช่างมีอารมณ์ขันจริงๆ เลยนะคะ"
13000-2264 = "ขอแนะนำตัวค่ะ ฉันเป็นสาวใช้ของ\nนายท่าน ชื่ออาคาเนะค่ะ"
13000-2265 = "หา...?"
13000-2266 = "ฮุฮุ วันนี้สนุกมากเลยค่ะ"
13000-2267 = "ถ้านายท่านตกอยู่ในอันตรายล่ะก็\nสาวใช้ก็จะปรากฏตัวขึ้น... อืม...\nแบบนี้ก็ไม่เลวเลยนะคะ"
13000-2268 = "คิดถึงจริงๆ เลยน้า... ทั้งๆ ที่เพิ่งผ่านไป\nไม่นานเอง"
13000-2269 = "แต่กลับรู้สึกเหมือนผ่านไปนานมากเลยค่ะ"
13000-2270 = "ตอนที่ได้พบกับคุณครูครั้งแรก ฉันน่ะ..."
13000-2271 = "♡ของฉันเต้นตึกตักไม่หยุดเลยค่ะ"
13000-2272 = "แล้วคุณครูล่ะคะ รู้สึกยังไงบ้าง?"
13000-2273 = "ก็ตื่นเต้นนะ... เพราะเธอเล่นระเบิดตึก\nทั้งตึกเลยนี่นา..."
13000-2274 = "สำหรับครูมันเหมือนเพิ่งผ่านไปเมื่อวาน\nเอง"
13000-2275 = "อ๊ะ... ดีใจจังเลยค่ะ"
13000-2276 = "พอหลับตาลง... ฉันก็จะนึกถึงวันที่ได้\nพบกับคุณครูครั้งแรกค่ะ"
13000-2277 = "ความสัมพันธ์ที่ดีที่สุดมักเริ่มจากการ\nพบพานที่ผูกพันแต่ครั้งแรกนะคะ"
13000-2278 = "ต่อไปก็ขอฝากเนื้อฝากตัวด้วยนะคะ"
13000-2279 = "นายท่าน ขอให้วันนี้เป็นวันที่ดีของ\nนายท่านนะคะ"
13000-2280 = "วันนี้ฉันมีภารกิจสำคัญก็เลยจะไปที่\nตลาดมืดค่ะ"
13000-2281 = "ตลาดมืดงั้นเหรอ? ที่นั่นดูอันตรายนะ"
13000-2282 = "ภารกิจสำคัญเหรอ?"
13000-2283 = "ค่ะ มันก็อันตรายอยู่ค่ะ"
13000-2284 = "แต่น่าจะอันตรายกับพวกคนที่เป็นเป้า\nหมายของฉันมากกว่าค่ะ"
13000-2285 = "ยิ่งกว่านั้นฉันเอง... เหมือนที่คุณครูเห็น\nคราวที่แล้ว"
13000-2286 = "ถ้าเป็นสาวใช้ของ C&C แล้วล่ะก็...\nพวกเราเองก็เป็นหนึ่งในเอเจ้นท์ด้วยนี่คะ"
13000-2287 = "วันนี้ฉันก็จะออกไปทำงานที่สำคัญเพื่อ\nโรงเรียนมิลเลเนียมค่ะ"
13000-2288 = "แต่ถ้าจะมีอะไรที่ฉันต้องการล่ะก็..."
13000-2289 = "วันนี้ถ้าบังเอิญได้เจอกับคุณครูก็คงจะ\nดีนะคะ..."
13000-2290 = "ฉันคิดแบบนี้ล่ะค่ะ"
13000-2291 = "นายท่านน่ะเหมือนใบโคลเวอร์สี่แฉกที่\nนำพาโชคดีมาให้ฉันเลยนะคะ"
13000-2292 = "ไม่ใช่สิ"
13000-2293 = "การที่ได้เจอกับนายท่านแบบนี้ คงเป็น\nโชคดีครั้งใหญ่ที่สุดของฉันแล้วล่ะค่ะ"
13000-2294 = "สำหรับครูเองก็คิดแบบนั้นนะ"
13000-2295 = "ครูเองก็โชคดีมากๆ เลยที่ได้เจอ\nกับอาคาเนะ"
13000-2296 = "อ๊ะ... มั่นใจในตัวเองมากเลยนะคะ"
13000-2297 = "ฮุฮุ ฉันไม่ได้ไม่ชอบหรอกค่ะ"
13000-2298 = "ฮุฮุ พูดแบบนี้ฉันดีใจนะคะ"
13000-2299 = "วันนี้ก็ขอให้คุณครูมีความสุขมากๆ\nเหมือนกันนะคะ~"
13000-2300 = "วันนี้เป็นวันที่จะไปปฏิบัติภารกิจกับ\nนายท่านค่ะ ตื่นเต้นจังเลย"
13000-2301 = "นายท่านเองก็... รอวันนี้อยู่เหมือนกัน\nใช่มั้ยคะ?"
13000-2302 = "ฉันน่ะรอวันนี้มาตลอดเลย เมื่อคืนก็นอน\nไม่หลับเลยล่ะค่ะ"
13000-2303 = "การนอนพักผ่อนเป็นเรื่องสำคัญนะ"
13000-2304 = "ไม่เป็นไรแน่นะ?"
13000-2305 = "ฮุฮุ ไม่ต้องห่วงค่ะ"
13000-2306 = "ถ้าอยู่กับคุณครูล่ะก็... "
13000-2307 = "อาคาเนะพร้อมเสมอค่ะ"
13000-2308 = "พวกคนร้ายที่ถูกทาง C&C จับได้~\nทั้งหมดจะถูกนำตัวไปที่ศาลค่ะ"
13000-2309 = "แต่ MVP ของวันนี้... ก็คือนายท่านค่ะ!"
13000-2310 = "เช้าแบบนี้ นายท่านอาจจะไม่เห็น\nข้อความ..."
13000-2311 = "ฉะ...ฉันจะไปเดี๋ยวนี้ค่ะ"
13000-2312 = "ไปไหนเหรอคะ? ไปที่บ้านนายท่าน\nยังไงล่ะคะ"
13000-2313 = "ตอนนี้เหรอ? ยังเช้ามืดอยู่เลยนะ?"
13000-2314 = "ความฝันงั้นเหรอ?"
13000-2315 = "ตั้งตารอได้เลยนะคะ~"
13000-2316 = "วันที่เราเจอกันคราวหน้า... จะเป็นวันที่\nระลึกของพวกเราแล้วนะคะ"
13000-2317 = "วันที่ระลึกเหรอ?"
13000-2318 = "ฮุฮุ รอ ได้ เลย นะคะ~"
13000-2319 = "นายท่านคะ เรื่องที่ฉันขอร้องนายท่านไว้\nเสร็จเรียบร้อยรึยังคะ?"
13000-2320 = "รอสักครู่นะคะ"
13000-2321 = "ฉันจะตอบแทนนายท่านแล้วนะคะ"
13000-2322 = "ดะ... เดี๋ยวก่อนสิ! งานที่ขอให้ทำ\nมันเยอะจะตายไป!"
13000-2323 = "ตอบแทน... งั้นเหรอ?"
13000-2324 = "ตั้งตารอได้เลยค่ะ~"
13000-2325 = "วินาทีที่คุณครูลืมตาขึ้นมา"
13000-2326 = "ถ้าคนแรกที่คุณครูเห็นคือฉันก็คงจะดี\nไม่น้อยเลย... "
13000-2327 = "ฉันคิดแบบนี้อยู่ตลอดค่ะ"

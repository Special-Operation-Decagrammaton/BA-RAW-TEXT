[translation]
13000-2260 = "早安，我的主人"
13000-2261 = "新型的匯款詐騙……？"
13000-2262 = "不是主人，是老師唷？"
13000-2263 = "呵呵，你很幽默呢"
13000-2264 = "我是你的女僕朱音。在此再次向您問候"
13000-2265 = "……咦？"
13000-2266 = "呵呵，今天很開心"
13000-2267 = "在主人陷入危機時颯爽登場的女僕……不覺得很棒嗎？"
13000-2268 = "好懷念啊。明明沒過多久"
13000-2269 = "但感覺像是很久以前"
13000-2270 = "第一次見到老師的時候，我……"
13000-2271 = "心臟有點……怦怦跳唷♡"
13000-2272 = "老師也是嗎？"
13000-2273 = "我也心臟砰砰跳唷……（畢竟房子都爆炸了）"
13000-2274 = "對我來說，就像發生的昨天的事一樣記憶猶新"
13000-2275 = "哎呀，那真是令人開心"
13000-2276 = "閉上眼睛，腦海中就能清晰地浮現與老師初次見面的那一天"
13000-2277 = "我認為美好的緣分往往是從強烈的相遇開始的"
13000-2278 = "從今以後也請多多關照"
13000-2279 = "主人，今天也請度過美好的一天"
13000-2280 = "我今天有重要的任務，所以要去黑市一趟"
13000-2281 = "黑市？不會危險嗎？"
13000-2282 = "重要的任務？"
13000-2283 = "嗯，可能有危險也說不定"
13000-2284 = "不過是對成為我目標的人來說"
13000-2285 = "比起那個，我會像以前一樣…"
13000-2286 = "因為C&C的女僕，可以算是特務的一種"
13000-2287 = "今天也是為了千年而去做有意義的事情"
13000-2288 = "但是，如果真要說有什麼強烈願望的話……"
13000-2289 = "我會希望今天也能偶然遇見老師……"
13000-2290 = "就這麼個小心願"
13000-2291 = "主人對我來說，可能是像四葉幸運草般的存在"
13000-2292 = "但更重要的是"
13000-2293 = "能和主人相遇就是我最大的幸運了"
13000-2294 = "也許是吧"
13000-2295 = "彼此彼此，能和朱音相遇真是太好了"
13000-2296 = "哎呀，竟然能坦率地接受，真是吃驚"
13000-2297 = "呵呵，但我不討厭那樣唷"
13000-2298 = "呵呵，很開心聽到你這麼說"
13000-2299 = "希望老師今天一天也很幸運"
13000-2300 = "今天是和主人一起出任務的日子呢。我很期待"
13000-2301 = "主人也……期待著這天嗎？"
13000-2302 = "我期待著今天的這一刻，昨晚完全睡不著呢"
13000-2303 = "睡眠很重要唷"
13000-2304 = "身體不要緊嗎？"
13000-2305 = "呵呵，別擔心"
13000-2306 = "只要跟老師一起……"
13000-2307 = "我永遠是最佳狀態"
13000-2308 = "壞人們已經全都被C&C順利捉回來了"
13000-2309 = "但是，今天的MVP肯定是主人！"
13000-2310 = "現在這個時間，主人或許不會看MomoTalk……"
13000-2311 = "但我現在剛出發"
13000-2312 = "而我前往的地方，是主人的家"
13000-2313 = "……現在？明明還是半夜……？"
13000-2314 = "是夢嗎……？"
13000-2315 = "敬請期待唷～"
13000-2316 = "下次見面的那天將成為我們的紀念日"
13000-2317 = "紀念日？"
13000-2318 = "呵呵。敬請期待！"
13000-2319 = "主人，我拜託你的事，已經全部都完成了嗎？"
13000-2320 = "我差不多要到了"
13000-2321 = "報答時間，要開始了喔"
13000-2322 = "等等等等！要做的事情太多了"
13000-2323 = "報答……？"
13000-2324 = "呵呵，馬上就到了唷～"
13000-2325 = "老師早上睜開眼，或是回到家的時候"
13000-2326 = "第一個映入眼簾的人如果能一直都是我的話就好了……"
13000-2327 = "最近經常會這麼想。呵呵"

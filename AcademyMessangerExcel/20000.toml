[translation]
20000-1298 = "早安，老師。上次聯絡之後，一直沒有收到回覆……"
20000-1299 = "發生了什麼事嗎？我可以去夏萊看看嗎？"
20000-1300 = "抱歉，手機壞了，無法回覆"
20000-1301 = "本來以為修好了，可是現在的通信狀態還是很怪……"
20000-1302 = "原來是這樣"
20000-1303 = "……時機完美。太好了"
20000-1304 = "耶？我不覺得是好事耶……"
20000-1305 = "不，是在指別的事。你很快就會明白了"
20000-1306 = "老師房間裡的所有電子設備都裝上自爆裝置如何？"
20000-1307 = "電視、冰箱、筆記型電腦"
20000-1308 = "微波爐、吸塵器、吹風機"
20000-1309 = "什麼都能變得可以爆炸唷"
20000-1310 = "……開玩笑的"
20000-1311 = "收到了製作放煙火機器的委託"
20000-1312 = "如果可以的話，能來千年幫忙嗎？"
20000-1313 = "煙火？"
20000-1314 = "我能幫上忙嗎？"
20000-1315 = "嗯"
20000-1316 = "能來的話我會很高興"
20000-1317 = "幸好沒有人受傷"
20000-1318 = "果然和老師在一起的話……會經常發生讓心臟怦怦跳的事"
20000-1319 = "老師……今天怎麼樣？"
20000-1320 = "很開心"
20000-1321 = "還以為會死……"
20000-1322 = "今天雖然一團糟，但總有一天會放出真正厲害的煙火……"
20000-1323 = "不，會讓你看到比那個更厲害的東西，好好期待吧"
20000-1324 = "雖然大家都說很意外，但千年也有棒球部唷"
20000-1325 = "因為數據棒球和科學訓練，在一些圈子裡相當有名……"
20000-1326 = "……雖然不是強隊，但我想幫上忙"
20000-1327 = "當啦啦隊嗎！？"
20000-1328 = "當經理嗎？"
20000-1329 = "啦啦隊啊……雖然有點想試穿一下那種衣服"
20000-1330 = "但很可惜，是另一種方向"
20000-1331 = "想製造一些對棒球有幫助的東西"
20000-1332 = "雖然和經理有點一不樣，但如果我能幫助到人的話……"
20000-1333 = "我想只能用我的技術了吧"
20000-1334 = "所以……我有個請求"
20000-1335 = "……老師也能幫忙嗎？"
20000-1336 = "自己做的東西能幫助到人……"
20000-1337 = "是一件很美好的事呢"
20000-1338 = "今天稍微打了盹……"
20000-1339 = "夢見了老師"
20000-1340 = "什麼樣的夢？"
20000-1341 = "呵呵，那是祕密"
20000-1342 = "但是……"
20000-1343 = "不知為何，現在就想馬上見到老師"
20000-1344 = "老師，不好了"
20000-1345 = "發生超出想像的事。昏迷鐵管賣得飛快"
20000-1346 = "我的天呀……"
20000-1347 = "竟然有這麼多的學生因為失眠而煩惱……"
20000-1348 = "真的嚇了一跳"
20000-1349 = "作為今年深受女高中生歡迎的數位小配件"
20000-1350 = "登上了時尚雜誌"
20000-1351 = "知名品牌也陸續開始發表新款的昏迷鐵管"
20000-1352 = "……我也沒有料到會這樣"
20000-1353 = "千年的學生都拿著鐵管走在路上……"
20000-1354 = "可能會開始看到這種景象……別太在意唷"
20000-1355 = "有時候我也會變得感傷"
20000-1356 = "特別是下雨的日子"
20000-1357 = "這樣啊，有點意外"
20000-1358 = "雨，有某種能訴諸感性的東西吧"
20000-1359 = "那種反應真失禮啊……"
20000-1360 = "這種時候，果然……"
20000-1361 = "嗯"
20000-1362 = "是啊"
20000-1363 = "總覺得變得無法控制自己的心情"
20000-1364 = "這種日子比起工作，更想……"
20000-1365 = "去一個能讓時間過得別具意義的地方，也許會不錯"
20000-1366 = "今天去圖書館看看吧"
20000-1367 = "老師。我看到你肩膀濕了"
20000-1368 = "為了不讓我淋濕而費心了……謝謝"
20000-1369 = "如果有兩把傘，就會是毫不知情的心理……心理學果然很有趣"
20000-1370 = "老師的行為一定影響了我的心"
20000-1371 = "老師，緊急情況"
20000-1372 = "怎麼了？"
20000-1373 = "先冷靜下來"
20000-1374 = "怎麼辦"
20000-1375 = "文字的話，很難說明……"
20000-1376 = "需要你幫忙"
20000-1377 = "馬上過去"
20000-1378 = "去千年就可以了嗎？"
20000-1379 = "嗯，拜託了……"
20000-1380 = "今天的夜景對我來說……真的是最珍貴的回憶"
20000-1381 = "以後也請多指教唷"
20000-1382 = "……老師"
20000-2000010 = "老師，你上次委託我修理的自行車修好了哦"
20000-2000020 = "有空就來拿回去吧"
20000-2000030 = "這麼快？真不愧是響呢"
20000-2000040 = "我馬上過去"
20000-2000050 = "嗯。不過我還有其他工作要忙"
20000-2000060 = "到了再跟我說一聲吧"

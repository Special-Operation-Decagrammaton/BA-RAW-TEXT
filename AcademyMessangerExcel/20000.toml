[translation]
20000-1298 = "สวัสดีคุณครู ทำไมไม่ตอบแชตฉันเลย"
20000-1299 = "เกิดอะไรขึ้นเหรอ? ให้ไปที่ชาเล่ต์มั้ย?"
20000-1300 = "โทรศัพท์เสียน่ะ ก็เลยไม่ได้ตอบเลย"
20000-1301 = "โทรศัพท์ไม่ค่อยจะดีน่ะ"
20000-1302 = "...ว่าไงนะ?"
20000-1303 = "...ดีเลย"
20000-1304 = "หืม? ต้องบอกว่าไม่ดีไม่ใช่เหรอ?"
20000-1305 = "ไม่หรอก เดี๋ยวก็ได้รู้เองว่าทำไมถึงดี"
20000-1306 = "ทำไมเราไม่ติดตั้งตัวจุดระเบิดกับเครื่อง\nใช้ไฟฟ้าทั้งหมดในห้องคุณครูดูล่ะ?"
20000-1307 = "ติดไว้ที่ทีวี ไม่ก็ตู้เย็นหรือโน้ตบุ๊ค"
20000-1308 = "หรือว่าจะที่ไมโครเวฟ หรือไดร์เป่าผม\nก็ยังได้ "
20000-1309 = "ฉันจะเตรียมไว้ให้อย่างดีเลย เอาให้\nระเบิดได้ทุกอันเลย"
20000-1310 = "ล้อเล่นนะ..."
20000-1311 = "ฉันได้รับคำขอให้ประดิษฐ์เครื่องยิง\nดอกไม้ไฟน่ะ"
20000-1312 = "ถ้าไม่ติดอะไรล่ะก็ มาช่วยฉันที่มิลเล\nเนียมหน่อยได้มั้ย?"
20000-1313 = "เครื่องยิงดอกไม้ไฟเหรอ?"
20000-1314 = "ครูจะช่วยได้เหรอ?"
20000-1315 = "อื้ม"
20000-1316 = "ถ้าคุณครูมาฉันจะดีใจนะ"
20000-1317 = "โชคดีที่ไม่มีใครบาดเจ็บ "
20000-1318 = "พอได้อยู่กับคุณครูก็มีเรื่องตื่นเต้นเกิด\nขึ้นเยอะเลย"
20000-1319 = "วันนี้...คุณครูเป็นไงบ้าง?"
20000-1320 = "วันนี้สนุกดี"
20000-1321 = "เกือบตายซะแล้ว"
20000-1322 = "ถึงวันนี้จะล้มเหลวไม่เป็นท่า แต่ว่าคราว\nหน้าจะยิง..."
20000-1323 = "ไม่สิ คราวหน้าจะให้ดูอะไรที่พิเศษกว่านี้\nตั้งตารอไว้เลย"
20000-1324 = "แม้คนอื่นจะคาดไม่ถึง แต่ที่โรงเรียน\nมิลเลเนียมมีชมรมเบสบอลด้วยนะ"
20000-1325 = "ทีมเบสบอลของเรามีชื่อเสียงเรื่องการ\nฝึกด้วยข้อมูลและวิทยาศาสตร์"
20000-1326 = "ถึงทีมจะไม่เก่งก็เถอะ แต่ฉันอยากช่วย\nพวกเขา"
20000-1327 = "จะไปเป็นเชียร์ลีดเดอร์เหรอ?"
20000-1328 = "จะสมัครเป็นผู้จัดการทีมเหรอ?"
20000-1329 = "เชียร์ลีดเดอร์... อยากใส่ชุดเชียร์ดูบ้างจัง"
20000-1330 = "เสียใจด้วยนะ ไม่ใช่"
20000-1331 = "จะไปช่วยพัฒนาอุปกรณ์ฝึกต่างหาก"
20000-1332 = "อืม... การเข้าไปช่วยคนอื่นของฉัน"
20000-1333 = "ก็คือการใช้ฝีมือที่ตัวเองมีน่ะ"
20000-1334 = "เพราะงี้ก็เลย... มีเรื่องอยากขอร้องหน่อย"
20000-1335 = "คุณครูก็มาช่วยอีกแรงได้มั้ย?"
20000-1336 = "ฉันว่ามันสุดยอดมากเลย เวลาที่สิ่ง\nประดิษฐ์ของฉัน"
20000-1337 = "เป็นประโยชน์ต่อคนอื่น"
20000-1338 = "วันนี้ฉันเผลองีบหลับไปตอนกลางวัน"
20000-1339 = "แล้วก็ฝันถึงคุณครูด้วย"
20000-1340 = "ฝันว่ายังไงน่ะ?"
20000-1341 = "ฮุฮุ ความลับ"
20000-1342 = "เจอกันในฝันแล้วก็จริง..."
20000-1343 = "แต่ก็คิดถึงขึ้นมาแฮะ "
20000-1344 = "เกิดเรื่องใหญ่แล้วคุณครู "
20000-1345 = "ท่อเหล็กสลบเหมือดขายดีเป็นเทน้ำเทท่า\nเลยล่ะ"
20000-1346 = "จริงเหรอ?"
20000-1347 = "นักเรียนมีปัญหาเรื่องการนอนเยอะ\nเลยเหรอเนี่ย?"
20000-1348 = "จริงด้วยสิ"
20000-1349 = "แถมได้ลงนิตยสารแฟชั่น"
20000-1350 = "ในหมวดไอเทม IT นักเรียนหญิงด้วยนะ"
20000-1351 = "พวกแบรนด์ดังๆ ก็เริ่มขายท่อเหล็กหลับ\nไหลตามๆ กันแล้ว"
20000-1352 = "ฉันเองก็คิดไม่ถึงเลย"
20000-1353 = "ถ้าเห็นนักเรียนมิลเลเนียมถือท่อเหล็ก\nไปไหนมาไหน"
20000-1354 = "คุณครูเองก็ไม่ต้องตกใจไปล่ะ"
20000-1355 = "บางครั้งฉันก็มีวันที่อารมณ์อ่อนไหว\nเหมือนกัน"
20000-1356 = "อย่างวันที่ฝนตก"
20000-1357 = "คาดไม่ถึงเลยนะ"
20000-1358 = "ฝนเข้าถึงอารมณ์ของคนได้ดีเลยล่ะ"
20000-1359 = "ขอโทษนะ"
20000-1360 = "แต่ในวันแบบนี้ต้อง..."
20000-1361 = "ค่ะ"
20000-1362 = "ใช่แล้ว"
20000-1363 = "เหมือนว่าฉันจะควบคุมหัวใจตัวเองไม่ได้"
20000-1364 = "วันแบบนี้ไม่ควรไปห้องทำงาน แต่ควร\nจะไป..."
20000-1365 = "ไปยังที่ที่จะใช้เวลาได้อย่างมีคุณค่า\nมากกว่า"
20000-1366 = "ไปห้องสมุดดีมั้ยนะ?"
20000-1367 = "ฉันเห็นว่าไหล่คุณครูเปียกด้วย"
20000-1368 = "ขอบคุณนะที่เอาใจใส่.. ไม่ให้ฉันโดนฝน"
20000-1369 = "ถ้ามีร่ม 2 คัน ก็คงไม่รู้ว่าคุณครูเป็นคน\nใส่ใจแบบนี้ นี่คือจิตวิทยาหรือเปล่านะ\nสนุกดีจัง"
20000-1370 = "การกระทำของคุณครูทำให้ฉันหัวใจ\nพองโตอยู่นะ"
20000-1371 = "เกิดเรื่องฉุกเฉินแล้วคุณครู "
20000-1372 = "มีเรื่องอะไรเหรอ?"
20000-1373 = "ใจเย็นๆ ก่อน"
20000-1374 = "ทำยังไงดี?"
20000-1375 = "ฉันไม่อยากอธิบายด้วยข้อความเลย"
20000-1376 = "คุณครูพอจะช่วยหน่อยได้มั้ย?"
20000-1377 = "ครูจะไปเดี๋ยวนี้เลย"
20000-1378 = "ให้ไปที่มิลเลเนียมใช่มั้ย?"
20000-1379 = "อื้ม! ขอร้องล่ะ!"
20000-1380 = "วิวของคืนนี้... จะเป็นความทรงจำแสน\nพิเศษของฉันเลยล่ะ"
20000-1381 = "ต่อไปก็ฝากตัวด้วยนะ"
20000-1382 = "คุณครู...."
20000-2000010 = "คุณครู จักรยานที่เอามาฝากไว้\nซ่อมเสร็จแล้วนะ"
20000-2000020 = "ถ้าว่างก็มาเอากลับไปได้เลย"
20000-2000030 = "เสร็จแล้วเหรอ? เร็วจังเลย"
20000-2000040 = "งั้นครูจะไปเดี๋ยวนี้ละ"
20000-2000050 = "อื้อ เดี๋ยวฉันจะทำงานอื่นรอแล้วกัน"
20000-2000060 = "มาถึงแล้วก็บอกนะ"

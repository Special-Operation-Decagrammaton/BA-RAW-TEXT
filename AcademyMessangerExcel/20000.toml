[translation]
20000-1298 = "안녕. 선생님. 지난번에 연락 준 이후로 답장이 없는데."
20000-1299 = "무슨 일 있어? 샬레로 가봐도 될까?"
20000-1300 = "핸드폰이 고장 나서 답변을 못했어."
20000-1301 = "지금도 통신 상태가 불량해."
20000-1302 = "…… 뭐?"
20000-1303 = "…… 잘됐네."
20000-1304 = "어? 잘못된 거 아냐?"
20000-1305 = "아냐. 왜 그런지는 곧 알게 될 거야."
20000-1306 = "선생님 방의 모든 전자기기에 자폭 장치를 설치하는 건 어떨까?"
20000-1307 = "TV 나 냉장고나 노트북이나"
20000-1308 = "전자레인지나 청소기나 헤어드라이어나"
20000-1309 = "전부 폭발할 수 있도록 준비해줄 수 있어."
20000-1310 = "……농담이야."
20000-1311 = "불꽃놀이용 기계를 제작해 달라고 요청받았어."
20000-1312 = "괜찮다면, 밀레니엄으로 와서 도와줄 수 있을까?"
20000-1313 = "불꽃놀이?"
20000-1314 = "내가 도움이 될까?"
20000-1315 = "응."
20000-1316 = "와주면 기쁠 거야."
20000-1317 = "부상자가 발생하지 않은 게 정말 다행이야."
20000-1318 = "역시 선생님과 있으면…… 두근거리는 일이 많이 생기는 것 같아."
20000-1319 = "선생님은…… 오늘 어땠어?"
20000-1320 = "즐거웠어."
20000-1321 = "죽는 줄 알았어."
20000-1322 = "오늘은 엉망이었지만, 다음에는 진짜 불꽃을......"
20000-1323 = "아니 더 정말 굉장한 것을 보여줄게. 기대해줘."
20000-1324 = "다들 의외라고 말하지만, 밀레니엄 학원에도 야구부가 있어."
20000-1325 = "데이터 야구와 과학적 훈련으로 유명한 야구팀이야……."
20000-1326 = "강팀은 아니지만. 그들을 돕고 싶어."
20000-1327 = "치어리더가 되려는 거야?"
20000-1328 = "매니저로 지원하려는 거야?"
20000-1329 = "치어리더라…… 응원복, 입어 보고는 싶네."
20000-1330 = "유감, 아니야."
20000-1331 = "훈련 장비 쪽 개선이지."
20000-1332 = "으음. 내가 누군가를 돕는 방식은……"
20000-1333 = "내가 가진 기술을 사용하는 것뿐이야."
20000-1334 = "그래서…… 부탁이 있는데."
20000-1335 = "선생님도…… 와줄래?"
20000-1336 = "내가 만든 무언가가 누군가의 도움이 될 수 있다는 건……"
20000-1337 = "정말 멋진 일이야."
20000-1338 = "오늘, 깜짝 낮잠을 자버렸는데……"
20000-1339 = "선생님의 꿈을 꿨어."
20000-1340 = "어떤 꿈이었어?"
20000-1341 = "후훗. 그건 비밀이야."
20000-1342 = "그래도……"
20000-1343 = "어쩐지, 보고 싶네."
20000-1344 = "선생님. 큰일이야."
20000-1345 = "생각보다 실신 쇠파이프가 날개 돋친 듯 판매되기 시작했어."
20000-1346 = "말도 안 돼."
20000-1347 = "그렇게 많은 학생들이 불면증에 시달렸단 말야?"
20000-1348 = "정말이야."
20000-1349 = "올해의 여고생 IT 아이템으로"
20000-1350 = "패션잡지에도 올라갔고"
20000-1351 = "유명 브랜드마다 신상 실신 쇠파이프를 잇달아 발매하기 시작했어."
20000-1352 = "……나도 전혀 예상 못했어."
20000-1353 = "밀레니엄 학생들이 쇠파이프를 들고 다녀도"
20000-1354 = "너무 놀라지 않길 바라."
20000-1355 = "때로는 나도 감상적으로 되는 날이 있어."
20000-1356 = "비 오는 날에는, 특히 그래."
20000-1357 = "의외네."
20000-1358 = "비는 사람의 감성을 자극하지."
20000-1359 = "실례야."
20000-1360 = "이럴 때는 역시……"
20000-1361 = "그래."
20000-1362 = "맞아."
20000-1363 = "어쩐지 내 마음이, 제어가 안 되는 느낌이야."
20000-1364 = "이런 날에는 작업실에 가는 것보다……"
20000-1365 = "더 의미 있는 시간을 보낼 수 있는 장소로 가야겠어."
20000-1366 = "오늘은 도서관이나 가볼까."
20000-1367 = "선생님. 어깨가 젖는 거, 봤어."
20000-1368 = "내가 젖지 않게…… 신경 써줘서 고마워."
20000-1369 = "우산이 두 개였다면, 알 수 없는 심리였겠지……. 역시 심리학은 재미있네."
20000-1370 = "선생님의 행동은, 분명 내 마음에 작용을 일으키고 있으니까."
20000-1371 = "선생님. 긴급 상황이야."
20000-1372 = "무슨 일이야?"
20000-1373 = "진정해."
20000-1374 = "어떡하지."
20000-1375 = "문자로는…… 설명하기 어려운데."
20000-1376 = "도와줄 수 있을까?"
20000-1377 = "지금 바로 갈게."
20000-1378 = "밀레니엄으로 가면 될까?"
20000-1379 = "응! 부탁해!"
20000-1380 = "오늘의 야경은 내게…… 정말 소중한 추억이 될 거야."
20000-1381 = "앞으로도 잘 부탁해."
20000-1382 = "…… 선생님."
20000-2000010 = "선생님. 저번에 맡겨둔 자전거 수리 완료했어."
20000-2000020 = "별일 없으면 찾으러 와."
20000-2000030 = "벌써? 역시 빠르네."
20000-2000040 = "그럼 지금 갈게."
20000-2000050 = "응. 나는 다른 작업을 하고 있을 테니"
20000-2000060 = "오면 말해줘."

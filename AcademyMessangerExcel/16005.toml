[translation]
16005-16005010 = "선생님. 혹시 시간 좀 괜찮으실는지요."
16005-16005020 = "조금 곤란한 상황에 처해 있는 관계로"
16005-16005030 = "선생님께서만 괜찮으시다면 도움을 구하고 싶습니다."
16005-16005040 = "응? 도움?"
16005-16005050 = "물론이지. 지금 어디야?"
16005-16005060 = "대단히 감사합니다. 선생님."
16005-16005070 = "그럼, 해변에서 대기하고 있도록 하겠습니다."
16005-16005080 = "그"
16005-16005090 = "대단히 죄송합니다. 선생님."
16005-16005100 = "먼저 부탁해 놓고 염치가 없었습니다……"
16005-16005110 = "신경 쓰지 마. 그럴 수도 있지."
16005-16005120 = "나중에 또 불러줘."
16005-16005130 = "아"
16005-16005140 = "정말로 괜찮으신 겁니까……?"
16005-16005150 = "……"
16005-16005160 = "네. 감사합니다."
16005-16005170 = "선생님."
16005-16005180 = "저번에는 크게 실례했습니다. 죄송합니다."
16005-16005190 = "괜찮아. 신경 쓰지 마."
16005-16005200 = "지금은 좀 괜찮아? 상황은 어때?"
16005-16005210 = "에, 그러니까 상황은……"
16005-16005220 = "실은 크게 달라진 건 없습니다만……"
16005-16005230 = "다른 곳으로 가도 계속 비슷한 상황이 이어져서, 해결책을 모색 중입니다."
16005-16005240 = "응. 내가 그리로 갈게."
16005-16005250 = "역시 이 선생님이 나설 차례로군."
16005-16005260 = "역시 그렇습니까…… 네. 감사합니다."
16005-16005270 = "……"
16005-16005280 = "네?"
16005-16005290 = "선생님?"
16005-16005300 = "정말로 감사했습니다. 선생님."
16005-16005310 = "덕분에 기대했던 것을 만끽한 것 같은 느낌을 받았습니다."
16005-16005320 = "아직은 정확하게 잘 모르겠지만…… 선생님께서 해 주신 것이니 분명 맞겠지요."
16005-16005330 = "그럼 다음에 다시 연락드리겠습니다."
16005-16005340 = "크히"
16005-16005350 = "크히히히히헤케에엨-"
16005-16005360 = "켁……"
16005-16005370 = "……"
16005-16005380 = "?"
16005-16005390 = "죄송합니다."
16005-16005400 = "무슨 일 있어?"
16005-16005410 = "츠루기?"
16005-16005420 = "아"
16005-16005430 = "아닙니다. 아무 문제도 없습니다. 신경 쓰이게 해드려서 죄송합니다."
16005-16005440 = "츠루기 배상."
16005-16005450 = "선생님. 츠루기입니다."
16005-16005460 = "덕분에 그간 쌓아 두고 있던 고민도 많이 사라졌습니다."
16005-16005470 = "즐겁게 지냈냐, 라고 물어보시면. 그랬다고 답변드릴 수 있다고 생각합니다."
16005-16005480 = "다시 한번 정말로 감사드립니다."
16005-16005490 = "그"
16005-16005500 = "……"
16005-16005510 = "다음에도 기회가 되면, 선생님께서만 괜찮으시다면 또 비슷한 것들을 부탁드리고 싶습니다."
16005-16005520 = "앞으로도 잘 부탁드립니다."
16005-16005530 = "츠루기 배상."

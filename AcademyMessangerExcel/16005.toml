[translation]
16005-16005010 = "คุณครูพอจะสะดวกรึเปล่าคะ?"
16005-16005020 = "ตอนนี้ฉันกำลังเจอสถานการณ์\nที่ลำบากนิดหน่อย"
16005-16005030 = "ถ้าคุณครูสะดวก ฉันอยากจะขอให้มา\nช่วยหน่อยค่ะ"
16005-16005040 = "หืม? ช่วยเหรอ?"
16005-16005050 = "ได้อยู่แล้ว ตอนนี้เธออยู่ที่ไหน?"
16005-16005060 = "ขอบคุณมากค่ะคุณครู"
16005-16005070 = "ถ้างั้นฉันจะรอคุณครูอยู่ที่ชายหาดนะคะ"
16005-16005080 = "เอ่อ..."
16005-16005090 = "ต้องขออภัยอย่างสูงค่ะคุณครู"
16005-16005100 = "ฉันเป็นฝ่ายขอร้องคุณครู แต่ดันทำ\nเรื่องน่าไม่อายแบบนั้น..."
16005-16005110 = "ไม่เป็นไรหรอก เรื่องแบบนั้นมันเกิดขึ้นได้"
16005-16005120 = "คราวหน้าเรียกไปอีกก็ได้นะ"
16005-16005130 = "อา..."
16005-16005140 = "ได้จริงๆ เหรอคะ?"
16005-16005150 = "..."
16005-16005160 = "ค่ะ ขอบคุณมากค่ะ"
16005-16005170 = "คุณครู"
16005-16005180 = "คราวที่แล้วฉันเสียมารยาทกับคุณครู\nขอโทษด้วยนะคะ"
16005-16005190 = "ไม่เป็นไรหรอก อย่าคิดมากเลย"
16005-16005200 = "ตอนนี้โอเคขึ้นแล้วรึยัง?\nสถานการณ์เป็นยังไงบ้าง?"
16005-16005210 = "เอ่อ คือว่าสถานการณ์..."
16005-16005220 = "ที่จริงมันก็ไม่ได้แตกต่างจากเดิมมาก\nหรอกค่ะ..."
16005-16005230 = "พอไปที่หาดอื่นก็เกิดเรื่องแบบเดียวกัน\nฉันเลยกำลังหาทางแก้ไขอยู่ค่ะ"
16005-16005240 = "อืม เดี๋ยวครูไปหานะ"
16005-16005250 = "ถึงตาครูออกโรงแล้วสินะ"
16005-16005260 = "เอาอย่างนั้นเหรอคะ... ขอบคุณค่ะ"
16005-16005270 = "..."
16005-16005280 = "คะ?"
16005-16005290 = "คุณครู?"
16005-16005300 = "ขอบคุณมากค่ะ คุณครู"
16005-16005310 = "ขอบคุณคุณครูนะคะ สนุกอย่างที่คิด\nไว้เลยล่ะค่ะ"
16005-16005320 = "ฉันเองก็ไม่แน่ใจเท่าไหร่... แต่คุณครู\nอุตส่าห์ทำให้ทั้งทีก็คงใช่แหละค่ะ"
16005-16005330 = "แล้วฉันจะติดต่อไปใหม่นะคะ"
16005-16005340 = "คิกๆ..."
16005-16005350 = "กร๊ากกก กรั่กๆๆๆ..."
16005-16005360 = "คิกๆ..."
16005-16005370 = "..."
16005-16005380 = "...?"
16005-16005390 = "ขอโทษค่ะ"
16005-16005400 = "มีเรื่องอะไรเหรอ?"
16005-16005410 = "ซึรุกิ?"
16005-16005420 = "อา..."
16005-16005430 = "ปะ...เปล่าค่ะ ไม่มีอะไรค่ะ ขอโทษที่\nทำให้เป็นห่วงนะคะ"
16005-16005440 = "ซึรุกิ เคารพ!"
16005-16005450 = "คุณครูคะ ซึรุกินะคะ"
16005-16005460 = "ขอบคุณมากค่ะที่ช่วยให้ฉัน\nคลายความกังวลไปได้เยอะมาก"
16005-16005470 = "แค่คุณครูถามว่าช่วงนี้สบายดีรึเปล่า\nฉันคิดว่าน่าจะตอบคำถามนั้นได้ค่ะ"
16005-16005480 = "ขอบคุณมากๆ เลยนะคะ"
16005-16005490 = "เอ่อ..."
16005-16005500 = "..."
16005-16005510 = "ถ้าคราวหน้ามีโอกาสล่ะก็...\nฉันก็อยากจะขอรบกวนคุณครูอีกนะคะ"
16005-16005520 = "ต่อไปก็ขอรบกวนด้วยนะคะ"
16005-16005530 = "ซึรุกิ เคารพ!"

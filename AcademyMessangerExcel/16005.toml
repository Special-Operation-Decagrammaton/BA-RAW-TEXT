[translation]
16005-16005010 = "老師。現在時間上方便嗎？"
16005-16005020 = "我遇到了有點麻煩的狀況"
16005-16005030 = "如果可以的話，想請老師幫忙"
16005-16005040 = "沒事吧？馬上過去"
16005-16005050 = "當然，你現在在哪裡？"
16005-16005060 = "非常感謝老師"
16005-16005070 = "那麼，我在那個海邊待命"
16005-16005080 = "那個"
16005-16005090 = "真的非常對不起，老師"
16005-16005100 = "明明是我請你來的，結果卻變成這樣……"
16005-16005110 = "不會，別放在心上"
16005-16005120 = "有事隨時都能找我，不要有壓力"
16005-16005130 = "咦"
16005-16005140 = "真的可以嗎……？"
16005-16005150 = "……"
16005-16005160 = "非常感謝。會再聯絡的"
16005-16005170 = "老師"
16005-16005180 = "之前那件事實在太失禮了。萬分抱歉"
16005-16005190 = "沒事的唷，別放在心上"
16005-16005200 = "冷靜下來了嗎？"
16005-16005210 = "是的。非常感謝"
16005-16005220 = "結果，沒有抓到妖怪……"
16005-16005230 = "去別的地方也是相同的狀況，該怎麼辦呢"
16005-16005240 = "那我現在過去你那邊"
16005-16005250 = "能稍等一下嗎？"
16005-16005260 = "好的"
16005-16005270 = "……"
16005-16005280 = "嗯？"
16005-16005290 = "老師？"
16005-16005300 = "真的非常感謝老師"
16005-16005310 = "託你的福，我第一次能和想像中一樣盡情享受大海"
16005-16005320 = "而且竟然還是和老師一起"
16005-16005330 = "不好意思，請忘了我剛剛說的話吧"
16005-16005340 = "咕嘻"
16005-16005350 = "咕嘻嘻嘻嘻咯嘿嘿嘿嘿"
16005-16005360 = "嘰嘻"
16005-16005370 = "……"
16005-16005380 = "啊"
16005-16005390 = "對不起"
16005-16005400 = "語音輸入？"
16005-16005410 = "弦生？怎麼了？"
16005-16005420 = "對不起"
16005-16005430 = "什麼都沒有，失禮了"
16005-16005440 = "弦生　謹上"
16005-16005450 = "老師，我是弦生"
16005-16005460 = "託您的福，我感到神清氣爽"
16005-16005470 = "若您問我回去之後開心嗎，我想我有辦法毫不猶豫地回答"
16005-16005480 = "請讓我重申一次，真的非常感謝老師"
16005-16005490 = "那個"
16005-16005500 = "如果還有機會，只要老師願意。希望能再一起……"
16005-16005510 = "不。那個，總之……"
16005-16005520 = "今後，也請多多關照"
16005-16005530 = "弦生　謹上"

[translation]
10014-2506 = "นายท่านคะ คือว่าอิซุนะ... ช่วงนี้มี\nเรื่องกังวลจนนอนไม่ค่อยหลับเลยค่ะ"
10014-2507 = "เรื่องกังวลงั้นเหรอ?"
10014-2508 = "ถ้าอิซุนะไม่ว่าอะไร\nครูยินดีให้คำปรึกษานะ"
10014-2509 = "สมกับเป็นนายท่านจริงๆ ด้วย!"
10014-2510 = "เวลาที่อิซุนะมีเรื่องลำบากใจ\nนายท่านมักจะมาปลอบเสมอเลย!"
10014-2511 = "แต่ว่าไม่เป็นไรค่ะ"
10014-2512 = "ตอนนี้เรื่องกังวลของฉันหายไปหมด\nแล้วค่ะ!"
10014-2513 = "หายไปแล้วเร๊อะ?!"
10014-2514 = "ค่ะ!"
10014-2515 = "อิซุนะมีเป้าหมายที่จะเป็นนินจา"
10014-2516 = "เพราะงั้นแทนที่จะมากังวลจน\nนอนไม่หลับแบบนี้ ต้องเอาเวลาไป\nฝึกฝนก่อนค่ะ!"
10014-2517 = "ตั้งแต่วันนี้ฉันจะต้อง\nทำตัวให้สมกับเป็นนินจา~"
10014-2518 = "ฉันจะพยายามค่ะ! นินนิน~!"
10014-2519 = "อย่าไปหกล้มที่ไหนอีกล่ะ!"
10014-2520 = "แหะๆ ค่า~!"
10014-2521 = "อิซุนะจะจดจำคำชี้แนะของนายท่าน\nให้ขึ้นใจเลยค่ะ"
10014-2522 = "คำชี้แนะอะไรเหรอ?"
10014-2523 = "ที่นายท่านบอกไว้คราวที่แล้ว..."
10014-2524 = "ก็ที่บอกว่าการสะกดรอยตามมันไม่ดียัง\nไงล่ะคะ!"
10014-2525 = "นี่ครูเคยพูดแบบนั้นด้วยเหรอ?\nถามจริง?"
10014-2526 = "อ่า... จริงสิ เคยพูดแบบนั้นจริงด้วยสินะ"
10014-2527 = "อิซุนะจะรับคำชี้แนะของนายท่านไว้ "
10014-2528 = "แล้วก็จะเลิกการติดตามนายท่าน\nแบบลับๆ ด้วยค่ะ!"
10014-2529 = "อื้อ ก็ดีนะ"
10014-2530 = "แต่ว่าตั้งแต่วันนี้ไป อิซุนะจะคอย\nอยู่ข้างๆ นายท่านแทนค่ะ!"
10014-2531 = "ถ้างั้นเดี๋ยวเจอกันนะคะ! นายท่าน!"
10014-2532 = "หือ?"
10014-2533 = "นายท่าน! นายท่าน!"
10014-2534 = "ข่าวด่วน! ข่าวล่ามาแรง!\nเกิดเรื่องใหญ่แล้วละค่ะ!"
10014-2535 = "ตื่นเต้นขนาดนี้ มีอะไรเหรอ?"
10014-2536 = "อิซุนะเจอซีรีส์ย้อนยุคเกี่ยวกับนินจา\nที่ชอบมากๆ แล้วล่ะค่ะ!"
10014-2537 = "ซีรีส์ย้อนยุคนี่... พวกซีรีส์โบราณ\nน่ะเหรอ?"
10014-2538 = "ค่ะ!"
10014-2539 = "เรื่องที่หามาได้คราวนี้เป็นซีรีส์ที่ดัง\nมากๆ หายากมากๆ เลยนะคะ!"
10014-2540 = "นายท่านจะมาดูด้วยกันใช่ไหมคะ!"
10014-2541 = "มาดูด้วยกันที่บ้านของอิซุนะนะคะ!"
10014-2542 = "ได้เลย เข้าใจแล้วล่ะ"
10014-2543 = "มะ...ไม่เป็นไรใช่ไหมคะ?!"
10014-2544 = "ฮิฮิ! ถ้างั้นอิซุนะจะรอนะคะ!"
10014-2545 = "อิซุนะดีใจที่ได้รู้เรื่องนินจามากขึ้น\nไปพร้อมๆ กับนายท่าน!"
10014-2546 = "อิซุนะจะเป็นนินจาที่เพียบพร้อม\nก่อนจะไปหานายท่านให้ได้ค่ะ!"
10014-2547 = "ตะ...ตกลง"
10014-2548 = "สิ่งที่สำคัญที่สุดสำหรับนินจา"
10014-2549 = "ฉันคิดว่ามันคือการฝึกฝนอย่างสม่ำ\nเสมอโดยไม่หยุดพักค่ะ นายท่าน!"
10014-2550 = "ใช่แล้ว วินัยเป็นเรื่องสำคัญนะ"
10014-2551 = "เพราะจิตใจที่แจ่มใสอยู่ในร่างกาย\nที่สมบูรณ์ยังไงล่ะ"
10014-2552 = "ค่ะ ฉันจะทำตามที่นายท่านบอกค่ะ!"
10014-2553 = "เพื่อการเป็นนินจาที่ยอดเยี่ยมแล้วล่ะก็\nต้องเริ่มจากสิ่งทั่วไป..."
10014-2554 = "เพราะงั้นทั้งในตอนกินข้าว หรือใน\nตอนที่เดินไปไหนมาไหน..."
10014-2555 = "ตอนที่นอนหลับกรนคร่อกๆ เองก็ต้อง\nช่างสังเกตอยู่ตลอดเวลา!"
10014-2556 = "ต้องขนาดนั้นเลยเหรอ?!"
10014-2557 = "ค่ะ! ต้องแบบนั้นแหละค่ะ!"
10014-2558 = "เพราะงั้นนายท่านคะ...!"
10014-2559 = "นายท่านจะร่วมค้นหาโลกแห่งนินจา\nไปพร้อมกับฉันได้ไหมคะ?"
10014-2560 = "ก็...ได้นะ"
10014-2561 = "ว้าว! ทำได้แล้ว!"
10014-2562 = "ขอบคุณที่มาฝึกให้อิซุนะวันนี้นะคะ\nนายท่าน!"
10014-2563 = "แต่ว่าอิซุนะ วันนี้ก็ไม่ได้ฝึกเลย\nสักนิดเดียวนะ..."
10014-2564 = "อ๊ะ ซีรีส์ย้อนยุคเรื่องใหม่เริ่มฉาย\nทางทีวีแล้วค่ะ!"
10014-2565 = "ถ้างั้นไว้เจอกันนะคะ! นายท่าน!"
10014-2566 = "นินนิน~!"
10014-2567 = "อื้อ..."

[translation]
10014-2506 = "주군, 저 이즈나, 최근 들어 고민 때문에 밤잠을 이루지 못했습니다."
10014-2507 = "고민이라고?"
10014-2508 = "나라도 괜찮다면 상담해줄게."
10014-2509 = "역시 주군……!"
10014-2510 = "이즈나가 괴로워하고 있을 땐, 바로 응해주시는군요!"
10014-2511 = "하지만 괜찮습니다."
10014-2512 = "이미 고민은 해결되었으니까요!"
10014-2513 = "이미 해결된 거냐……!"
10014-2514 = "네!"
10014-2515 = "이즈나는 닌자를 목표로 삼은 몸."
10014-2516 = "그렇다면 고민으로 밤잠을 이루기보다 직접 실천하는 것이 우선!"
10014-2517 = "그런 고로 오늘부터 닌자답게!"
10014-2518 = "실천하겠습니다. 닌닌!"
10014-2519 = "어디 가서 다치진 말고."
10014-2520 = "에헤헷, 네!"
10014-2521 = "이즈나, 주군의 충고를 가슴 깊이 새겼습니다."
10014-2522 = "갑자기 무슨 충고?"
10014-2523 = "저번에 말씀하셨던……,"
10014-2524 = "미행은 좋지 않다던 말씀이요!"
10014-2525 = "그런 말을 한 적이…… 있었, 나?"
10014-2526 = "아, 확실히 그런 말을 한 적이 있었지……."
10014-2527 = "그때의 말씀을 받들어, 이즈나."
10014-2528 = "주군을 몰래 호위하는 건 그만두겠습니다!"
10014-2529 = "으응, 그래……."
10014-2530 = "대신 오늘부터는 앞에서 호위하겠습니다!"
10014-2531 = "그럼 이따 뵐게요! 주군!"
10014-2532 = "응……?"
10014-2533 = "주군! 주군!"
10014-2534 = "속보예요! 급보예요! 큰일이에요!"
10014-2535 = "잔뜩 흥분해서, 무슨 일이야?"
10014-2536 = "우연히 이즈나가 좋아하는 명작 닌자 시대극 시리즈를 구했어요!"
10014-2537 = "시대극이라면, 옛날 드라마?"
10014-2538 = "네!"
10014-2539 = "이번에 구한 건 또, 구하기 어려운 명작이거든요!"
10014-2540 = "같이 봐주실 거죠! 주군!"
10014-2541 = "이즈나의 집에서 감상회예요!"
10014-2542 = "좋아, 알았어."
10014-2543 = "괘, 괜찮으신 거죠?!"
10014-2544 = "에헤헷! 그럼 기다리고 있을게요!"
10014-2545 = "주군과 닌자에 대해 더 자세히 알 수 있어서 기뻤어요!"
10014-2546 = "다음번엔 좀 더 완벽한 닌자로 찾아뵙겠습니다! 주군!"
10014-2547 = "그, 그래……."
10014-2548 = "닌자에게 가장 중요한 것."
10014-2549 = "그건 역시 평소에도 쉴 틈 없이 꾸준히 수행을 하는 것이라고 생각합니다. 주군!"
10014-2550 = "하긴, 단련은 중요하지."
10014-2551 = "건강한 몸에 건강한 정신이라고도 하니까."
10014-2552 = "네, 주군의 말씀대로예요!"
10014-2553 = "진정한 닌자가 되기 위해서라면 평소부터……."
10014-2554 = "그러니까 걷고 있을 때일지라도, 밥을 먹고 있을 때일지라도."
10014-2555 = "설령 쿨쿨 자고 있을 때일지라도 끊임없이 탐구하는 자세를 갖춰야 하는 법!"
10014-2556 = "그렇게까지?!"
10014-2557 = "네! 그렇게까지!"
10014-2558 = "그러니 주군……!"
10014-2559 = "닌자를 탐구하기 위한, 이즈나의 수행에 어울려주세요!"
10014-2560 = "뭐, 좋아."
10014-2561 = "와아! 해냈다!"
10014-2562 = "오늘, 수행에 어울려주셔서 감사했습니다. 주군!"
10014-2563 = "그런데 이즈나, 오늘은 결국 수행이었던 게 아니라……."
10014-2564 = "앗, TV에서 새로운 시대극이 시작하겠어요!"
10014-2565 = "그럼 나중에 뵙겠습니다! 주군!"
10014-2566 = "닌닌!"
10014-2567 = "으, 응……."

[translation]
10014-2506 = "主公。伊樹菜最近因為有煩惱的事，晚上睡不著……"
10014-2507 = "煩惱的事？"
10014-2508 = "不嫌棄的話，我可以跟你聊聊唷"
10014-2509 = "不，不愧是主公……！"
10014-2510 = "在伊樹菜苦惱的時候，馬上就回應了！"
10014-2511 = "……非常感謝！"
10014-2512 = "煩惱解決了！"
10014-2513 = "已經解決了！？"
10014-2514 = "是的！"
10014-2515 = "因為伊樹菜的目標是成為一名忍者"
10014-2516 = "那就得像老師一樣迅速反應，煩惱之前先付諸實行！"
10014-2517 = "因此，從今天開始要更像個忍者！"
10014-2518 = "首先要付諸實踐，忍忍！"
10014-2519 = "不要做危險的事弄傷自己唷"
10014-2520 = "耶嘿嘿，是！"
10014-2521 = "伊樹菜會將主公前幾日的忠告深深刻在心中"
10014-2522 = "忠告？我說了什麼來著……？"
10014-2523 = "上次主公說的……"
10014-2524 = "未經允許的跟蹤是不好的！"
10014-2525 = "抱歉，我可能不記得了……？"
10014-2526 = "這麼說來好像有這麼回事……"
10014-2527 = "伊樹菜會聽從當時的話"
10014-2528 = "伊樹菜今後不會再偷偷護衛主公了！"
10014-2529 = "啊，嗯……"
10014-2530 = "作為代替，從今天開始會直接在主公的前面進行護衛！"
10014-2531 = "那麼再見了！"
10014-2532 = "嗯……？"
10014-2533 = "主公！主公！"
10014-2534 = "速報！特報！是大事件！"
10014-2535 = "那麼興奮，怎麼了？"
10014-2536 = "伊樹菜最喜歡的名作，忍者的時代劇系列終於拿到手了！"
10014-2537 = "時代劇是以前的電視劇嗎？"
10014-2538 = "是的！"
10014-2539 = "這是一部很難入手的名作！"
10014-2540 = "一起看吧！主公！"
10014-2541 = "在伊樹菜家開鑑賞會吧！"
10014-2542 = "嗯，那就去打擾一下吧"
10014-2543 = "非，非常感謝！"
10014-2544 = "耶嘿嘿！那伊樹菜會等著主公！"
10014-2545 = "能更進一步了解主公和忍者，伊樹菜很開心！"
10014-2546 = "下次，伊樹菜就能以更完美的忍者的姿態和您見面了呢，主公！"
10014-2547 = "就，就是說呢……？"
10014-2548 = "對忍者來說最重要的事……"
10014-2549 = "伊樹菜認為是平時也不放縱，以常在戰場的心態持續修行！"
10014-2550 = "確實，鍛鍊是很重要的呢"
10014-2551 = "畢竟健康的身體，可以說是寄宿著健全的精神呢"
10014-2552 = "是的，正是如此！"
10014-2553 = "為了成為真正的忍者……"
10014-2554 = "平時走路的時候，吃飯的時候"
10014-2555 = "甚至是熟睡的時候，都不能少了鍛鍊的姿勢和氣魄！"
10014-2556 = "連睡覺的時候也要！？"
10014-2557 = "是的！沒錯！因為是一整天！"
10014-2558 = "所以，主公……！"
10014-2559 = "為了進一步追求忍者之道，請陪伊樹菜修行吧！"
10014-2560 = "嗯。雖然還不太明白，不過可以唷"
10014-2561 = "太好了！非常感謝！"
10014-2562 = "謝謝您今天陪我修行！主公！"
10014-2563 = "不客氣。話說回來，今天的能算是修行嗎……"
10014-2564 = "啊，時代劇要開始了！"
10014-2565 = "那麼之後再聯絡了！"
10014-2566 = "忍忍！"
10014-2567 = "唔，嗯。再連絡……"

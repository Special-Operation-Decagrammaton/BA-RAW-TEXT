13009-1143 = "Um, I was certain we'd already agreed to it."
13009-1144 = "Hmm, maybe that happened in a dream?"
13009-1145 = "Well, all right!"
13009-1146 = "That's right. Wait for me at Schale, Sensei."
13009-1147 = "I'll go to Schale, Sensei."
13009-1148 = "Sensei, I found a good spot to train."
13009-1149 = "By training, do you mean sleeping?"
13009-1150 = "Yeah, you're right!"
13009-1151 = "I won't tell anyone where it is but you."
13009-1152 = "But where's a good place to sleep?"
13009-1153 = "Actually."
13009-1154 = "This place is...so..."
13009-1155 = "So...?"
13009-1156 = "So... Oh, a rabbit."
13009-1157 = "Excuse me, Tsubaki?"
13009-1158 = "What rabbit? What are you talking about?"

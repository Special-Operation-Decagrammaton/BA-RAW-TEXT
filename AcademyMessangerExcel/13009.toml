[translation]
13009-1115 = "老師，如何……？"
13009-1116 = "和往常一樣，在努力修行嗎？"
13009-1117 = "修行？"
13009-1118 = "當然有"
13009-1119 = "老師也是我們修行部的顧問，修行當然是必不可少的。對……"
13009-1120 = "也就是睡覺"
13009-1121 = "特別是老師平時太忙了，沒怎麼睡吧？"
13009-1122 = "真的嗎～？"
13009-1123 = "唔嗯，很可疑……"
13009-1124 = "唔嗯……如果是這樣的話，好"
13009-1125 = "藉此機會，我親自示範修行給你看"
13009-1126 = "那麼，去約定的地點吧～老師"
13009-1127 = "老師……"
13009-1128 = "椿？怎麼了？"
13009-1129 = "變得破爛不堪了……"
13009-1130 = "怎麼辦……"
13009-1131 = "耶，耶？破爛不堪？什麼東西……？"
13009-1132 = "什麼意思……？"
13009-1133 = "一直很珍惜的修行道具……"
13009-1134 = "修，修行道具？"
13009-1135 = "幫幫我，老師……"
13009-1136 = "等著，椿，我馬上過去！"
13009-1137 = "謝謝你今天幫我找枕頭。老師"
13009-1138 = "下次再一起修行吧"
13009-1139 = "老師，你還記得吧？"
13009-1140 = "今天是一起修行的日子唷"
13009-1141 = "第一次聽說……？"
13009-1142 = "啊，是嗎？"
13009-1143 = "咦咦，不是嗎。我還以為我們約好了……"
13009-1144 = "唔嗯，是在夢中約的嗎？"
13009-1145 = "嘛，怎樣都行吧？"
13009-1146 = "嗯，是啊。在夏萊等我唷。老師"
13009-1147 = "我要去夏萊了，等我唷。老師"
13009-1148 = "找到適合修行的地方了，老師"
13009-1149 = "修行，也就是睡覺吧？"
13009-1150 = "嗯，沒錯～"
13009-1151 = "那個地方，老師是我第一個告訴的人唷"
13009-1152 = "謝謝。不過，說到適合睡覺的地方……"
13009-1153 = "其實呢"
13009-1154 = "這裡，非常……"
13009-1155 = "非常……？"
13009-1156 = "非常……啊，兔子"
13009-1157 = "那個，椿？"
13009-1158 = "耶，兔子怎麼了？椿？椿！？"

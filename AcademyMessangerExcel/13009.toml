[translation]
13009-1115 = "선생님……."
13009-1116 = "평소에도 수행 열심히 하고 있어~?"
13009-1117 = "갑자기 수행이라니?"
13009-1118 = "물론이지."
13009-1119 = "우리 수행부 고문이라면 당연히 빼놓을 수 없는 수행……."
13009-1120 = "잠자기 말이야."
13009-1121 = "특히 선생님은 평소에 너무 바빠서 잠도 제대로 못 자고 있잖아?"
13009-1122 = "그래~?"
13009-1123 = "흐음, 의심스러운걸……."
13009-1124 = "응……, 기왕 이렇게 된 거 잘됐다."
13009-1125 = "이번 기회에 내가 직접 수행의 시범을 보여줄게."
13009-1126 = "약속 장소에서 보자. 선생님~"
13009-1127 = "선생님……."
13009-1128 = "츠바키? 무슨 일이야?"
13009-1129 = "완전히 너덜너덜해졌어……."
13009-1130 = "이걸 어쩌지……."
13009-1131 = "으, 응? 너덜너덜……?"
13009-1132 = "무슨 뜻이야……?"
13009-1133 = "내가 평소 아끼던 수행 도구가……."
13009-1134 = "수, 수행 도구?"
13009-1135 = "도와줘. 선생님……"
13009-1136 = "기다리고 있어. 츠바키. 바로 갈게!"
13009-1137 = "오늘, 베개를 같이 골라줘서 고마워. 선생님."
13009-1138 = "다음번에 같이 수행하자."
13009-1139 = "선생님, 까먹지 마."
13009-1140 = "오늘은 같이 수행하기로 한 날이야."
13009-1141 = "금시초문인데?"
13009-1142 = "아, 그랬었나?"
13009-1143 = "어, 분명 약속했었는데."
13009-1144 = "으음, 내 꿈에서 한 약속이었나?"
13009-1145 = "뭐어, 됐나~?"
13009-1146 = "응, 맞아. 그러니 샬레에서 기다리고 있어. 선생님."
13009-1147 = "내가 샬레로 찾아갈게. 선생님."
13009-1148 = "선생님, 수행하기 좋은 장소를 발견했어."
13009-1149 = "수행이라면 잠자기 말이지?"
13009-1150 = "응. 맞아~"
13009-1151 = "어디인지, 특별히 선생님에게 먼저 알려줄게."
13009-1152 = "하지만 잠자기 좋은 장소라니……."
13009-1153 = "그게 말이야."
13009-1154 = "여기……. 엄청……."
13009-1155 = "엄청…?"
13009-1156 = "엄청……. 아, 토끼."
13009-1157 = "저기, 츠바키?"
13009-1158 = "토끼라니? 저기요?"

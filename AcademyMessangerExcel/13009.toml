[translation]
13009-1115 = "คุณครู...."
13009-1116 = "ปกติตั้งใจฝึกฝนไหม?"
13009-1117 = "ทำไมจู่ๆ ก็เข้าเรื่องฝึกฝนล่ะ?"
13009-1118 = "แน่นอนอยู่แล้ว"
13009-1119 = "การฝึกฝนที่ขาดไม่ได้ของที่ปรึกษา\nชมรมฝึกฝน..."
13009-1120 = "คือการนอนหลับยังไงล่ะ"
13009-1121 = "แต่คุณครูงานยุ่งขนาดนี้ คงไม่ได้นอน\nหลับดีๆ ใช่ไหม?"
13009-1122 = "อย่างนั้นเหรอ~? "
13009-1123 = "อืม... น่าสงสัยจัง"
13009-1124 = "แต่ก็ดีแล้วที่เป็นแบบนี้"
13009-1125 = "เพราะฉันจะสาธิตการฝึกฝนให้ดูเอง"
13009-1126 = "แล้วมาเจอกันในที่ที่นัดไว้นะ คุณครู~ "
13009-1127 = "คุณครู...."
13009-1128 = "มีเรื่องอะไรเหรอสึบากิ?"
13009-1129 = "มันขาดรุ่งริ่งหมดเลย..."
13009-1130 = "ทำยังไงดีล่ะ..."
13009-1131 = "หืม? อะไรขาดเหรอ...?"
13009-1132 = "หมายความว่ายังไงเหรอ?"
13009-1133 = "เครื่องมือที่ฉันใช้ฝึกฝนน่ะ..."
13009-1134 = "เครื่องมือ... ฝึกฝนเหรอ?"
13009-1135 = "ช่วยหน่อยนะคุณครู"
13009-1136 = "รออยู่ตรงนั้นน่ะสึบากิ ครูจะไปเดี๋ยวนี้!"
13009-1137 = "ขอบคุณที่วันนี้มาช่วยเลือกหมอนนะ\nคุณครู"
13009-1138 = "ไว้ครั้งหน้ามาฝึกด้วยกันนะ"
13009-1139 = "ห้ามลืมล่ะ"
13009-1140 = "เราตกลงว่าจะไปฝึกฝนด้วยกันวันนี้ล่ะ"
13009-1141 = "ยังไม่เคยตกลงนี่?"
13009-1142 = "อ่า ตกลงไว้แล้วเหรอ?"
13009-1143 = "ใช่ คุณครูสัญญาเอาไว้แล้วด้วย"
13009-1144 = "อืม... หรือว่านั่นมันในฝันของฉันนะ?"
13009-1145 = "เอาเถอะน่า~"
13009-1146 = "อืม ใช่ รอฉันอยู่ที่ชาเล่ต์ก่อนนะคุณครู"
13009-1147 = "แล้วฉันจะไปหาที่ชาเล่ต์นะ คุณครู"
13009-1148 = "ฉันเจอที่ที่เหมาะกับการฝึกฝนแล้วล่ะ"
13009-1149 = "การฝึกฝนที่ว่าคือการนอนหลับใช่ไหม?"
13009-1150 = "อื้ม ใช่แล้ว~"
13009-1151 = "ฉันจะบอกคุณครูเป็นคนแรกเลย"
13009-1152 = "แต่ว่าที่ที่เหมาะต่อการนอนมัน..."
13009-1153 = "นั่นน่ะสิ"
13009-1154 = "ที่นี่น่ะ.... มันน่า... น่า..."
13009-1155 = "น่า...?"
13009-1156 = "น่า... รักมากเลย เจ้ากระต่าย"
13009-1157 = "เดี๋ยวนะสึบากิ"
13009-1158 = "กระต่ายงั้นเหรอ?"

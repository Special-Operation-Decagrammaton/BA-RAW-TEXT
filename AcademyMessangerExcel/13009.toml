[translation]
13009-1115 = "Sensei..."
13009-1116 = "Are you keeping up the hard work?"
13009-1117 = "Training so suddenly?"
13009-1118 = "Of course."
13009-1119 = "It's essential training for any advisor of the Inner Discipline Club..."
13009-1120 = "Sleeping."
13009-1121 = "You never get enough sleep because you're so busy."
13009-1122 = "Yeah? "
13009-1123 = "Hmm, that's suspicious..."
13009-1124 = "Okay... Might as well..."
13009-1125 = "Let me show you how this training works."
13009-1126 = "I'll see you at the meeting spot, Sensei!"
13009-1127 = "Sensei..."
13009-1128 = "Tsubaki? What's going on?"
13009-1129 = "It's all worn out..."
13009-1130 = "What should I do..."
13009-1131 = "H-Huh? What's worn out?"
13009-1132 = "What do you mean?"
13009-1133 = "My favorite training tool..."
13009-1134 = "T-Training tool?"
13009-1135 = "Help me, Sensei..."
13009-1136 = "Hold on, Tsubaki. I'll be right there!"
13009-1137 = "Thanks for picking out a pillow with me today, Sensei."
13009-1138 = "Let's train together next time."
13009-1139 = "Sensei, don't forget."
13009-1140 = "We're supposed to train together today."
13009-1141 = "That's news to me!"

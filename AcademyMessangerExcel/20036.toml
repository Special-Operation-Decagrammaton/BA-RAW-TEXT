[translation]
20036-200360010 = "好"
20036-200360020 = "既然整理得差不多了，現在該來那個了！"
20036-200360030 = "現在該來那個？"
20036-200360040 = "那個是哪個？"
20036-200360050 = "這還用問嗎！我已經說過了吧？"
20036-200360060 = "一定要度過「最棒的休假」！"
20036-200360070 = "雖然就結果而言，整頓和修復的事都進行得很順利……"
20036-200360080 = "但只有這樣，還不足以稱作最棒的休假！"
20036-200360090 = "所以做好覺悟吧，老師！我這次可是認真的哦！"
20036-200360100 = "啊"
20036-200360110 = "真奇怪"
20036-200360120 = "老師，那個"
20036-200360130 = "我把東西撿回來了，別擔心"
20036-200360140 = "明天再拿給你。早點休息吧，現在時候不早了"
20036-200360150 = "哦"
20036-200360160 = "啊"
20036-200360170 = "嗯"
20036-200360180 = "謝謝"
20036-200360190 = "話說老師"
20036-200360200 = "我在倉庫裡找到了不錯的東西"
20036-200360210 = "要不要一起到外面去？"
20036-200360220 = "如果還有別的事要忙就算了"
20036-200360230 = "哦？是什麼？"
20036-200360240 = "去外面？難道是什麼玩具嗎？"
20036-200360250 = "嗯……"
20036-200360260 = "其實也沒那麼厲害啦"
20036-200360270 = "如果想知道的話就過來吧！"
20036-200360280 = "我不會放過你的"
20036-200360290 = "你在哪裡？"
20036-200360300 = "我問你現在在哪裡？"
20036-200360310 = "在回憶所在的每一個地方……"
20036-200360320 = "當然在茜香的心裡囉"
20036-200360330 = "少胡說八道了"
20036-200360340 = "被我抓到你就完了"
20036-200360350 = "我一定要把你綁在快艇上，然後拖你出海繞一整圈！！"
20036-200360360 = "唔"
20036-200360370 = "灰塵比我想得還要多呢"
20036-200360380 = "畢竟這裡平時不太會注意到，所以一直都沒有人清理"
20036-200360390 = "是在打掃部室嗎？你自己一個人？"
20036-200360400 = "其他成員呢？"
20036-200360410 = "大家都有事要做"
20036-200360420 = "現在反而只剩我有空"
20036-200360430 = "所以才想說要不要稍微打掃一下……"
20036-200360440 = "啊哈，終於輪到我登場了"
20036-200360450 = "我現在就過去幫你"
20036-200360460 = "？"
20036-200360470 = "咦？"
20036-200360480 = "老師？"
20036-200360490 = "我就知道會變成這樣"
20036-200360500 = "不會再有下一次了"
20036-200360510 = "絕對！"
20036-200360520 = "歡迎再找我幫忙"
20036-200360530 = "我隨時有空哦"
20036-200360540 = "嗯"
20036-200360550 = "啊"
20036-200360560 = "不是"
20036-200360570 = "不對不對不對！！！！"
20036-200360580 = "才不是這樣！！"

[translation]
20036-200360010 = "ดีละ"
20036-200360020 = "เตรียมของเสร็จแล้ว ทีนี้ก็ใกล้แล้วละ!"
20036-200360030 = "ใกล้?"
20036-200360040 = "ใกล้จะทำอะไรเหรอ?"
20036-200360050 = "ฉันก็บอกคุณครูไปแล้วไง"
20036-200360060 = "ไหนๆ ก็ไหนๆ แล้ว ฉันก็จะขอ\nมี 'วันพักผ่อนที่ดีที่สุด' น่ะ!"
20036-200360070 = "ถึงงานซ่อมบำรุงและฟื้นฟูจะสำเร็จ\nได้ด้วยดีก็เถอะ..."
20036-200360080 = "แต่แค่นั้นก็จะเรียกว่าได้พักผ่อน\nอย่างดีที่สุดแล้วไม่ได้หรอก!"
20036-200360090 = "เพราะงั้นก็เตรียมตัวไว้ได้เลยคุณครู!\nงานนี้ไม่หมูแน่นอน!"
20036-200360100 = "อ่า"
20036-200360110 = "แปลกจัง"
20036-200360120 = "คือว่า คุณครู..."
20036-200360130 = "ครูเก็บไว้ให้แล้ว ไม่ต้องห่วงนะ"
20036-200360140 = "ครูจะเอาไปให้พรุ่งนี้นะ ดึกแล้ว\nไปนอนเถอะ"
20036-200360150 = "เอ่อ"
20036-200360160 = "อ่า"
20036-200360170 = "อืม"
20036-200360180 = "ขอบคุณนะ"
20036-200360190 = "คุณครู จะว่าไปแล้ว"
20036-200360200 = "ฉันเจอของบางอย่างในโรงเก็บของ\nมาน่ะ มันดูใช้ได้เลย"
20036-200360210 = "ออกไปดูข้างนอกด้วยกันมั้ย?"
20036-200360220 = "แต่ถ้าติดธุระอื่นอยู่ก็ไม่เป็นไรนะ"
20036-200360230 = "หืม? ของอะไรน่ะ?"
20036-200360240 = "ต้องออกไปดูข้างนอก? ของเล่นเหรอ?"
20036-200360250 = "ก็..."
20036-200360260 = "ไม่ใช่ของที่ยอดเยี่ยมอะไรมากหรอก"
20036-200360270 = "ถ้าสงสัยก็ออกมาแล้วกัน!"
20036-200360280 = "ฉันไม่อยู่เฉยๆ แน่"
20036-200360290 = "อยู่ไหนน่ะ?"
20036-200360300 = "ตอนนี้อยู่ที่ไหน!"
20036-200360310 = "อยู่ทุกที่ที่มีความทรงจำ..."
20036-200360320 = "อยู่ในใจของเซริกะจัง"
20036-200360330 = "อย่ามาพูดอะไรเหลวไหลนะ"
20036-200360340 = "ถ้าหาตัวเจอละก็ ไม่รอดแน่!"
20036-200360350 = "จะมัดไว้กับบานาน่าโบ๊ทแล้วลากให้\nคว่ำเลย!! "
20036-200360360 = "ฮึ่ย"
20036-200360370 = "ฝุ่นเยอะกว่าที่คิดอีกนะ"
20036-200360380 = "พอมันอยู่ลับตา เราก็เลยปล่อยปละ\nละเลยเกินไป"
20036-200360390 = "ทำความสะอาดห้องชมรมอยู่เหรอ?\nทำคนเดียวหรือเปล่า?"
20036-200360400 = "แล้วคนอื่นล่ะ?"
20036-200360410 = "คนอื่นมีเรื่องอื่นที่ต้องไปทำน่ะ"
20036-200360420 = "แต่วันนี้ฉันดันมีเวลาว่างขึ้นมา"
20036-200360430 = "ก็เลยว่าจะทำความสะอาดห้องน่ะ..."
20036-200360440 = "เฮ้อ ถึงเวลาครูต้องออกโรงแล้วสินะ"
20036-200360450 = "ครูจะไปช่วยเดี๋ยวนี้ละ"
20036-200360460 = "?"
20036-200360470 = "ว่าไงนะ?"
20036-200360480 = "คุณครู?"
20036-200360490 = "กะไว้แล้วว่าต้องเป็นแบบนี้"
20036-200360500 = "ครั้งหน้าไม่มีแบบนี้แล้วนะ!"
20036-200360510 = "ไม่ มี เด็ด ขาด!"
20036-200360520 = "ไว้ชวนครูไปอีกนะ"
20036-200360530 = "เรียกครูได้ตลอดเลย"
20036-200360540 = "อืม"
20036-200360550 = "อ่า"
20036-200360560 = "ไม่สิ"
20036-200360570 = "ไม่ๆๆๆ!!!!"
20036-200360580 = "ไม่มีวัน!!"

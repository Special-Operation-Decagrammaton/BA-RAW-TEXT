[translation]
20036-200360010 = "좋아"
20036-200360020 = "대충 정리도 끝났고, 이제 슬슬이야!"
20036-200360030 = "이제 슬슬?"
20036-200360040 = "뭔가 하려고?"
20036-200360050 = "당연하지! 이미 말했잖아?"
20036-200360060 = "이렇게 된 이상 '최고의 휴가'를 보내겠다고 말이야!"
20036-200360070 = "물론 정비도 복구도 결과적으로 잘 됐지만……."
20036-200360080 = "그것만으로는 최고의 휴가를 보냈다고 말할 수 없어!"
20036-200360090 = "그러니까 각오해, 선생님! 이건 만만하지 않다고!"
20036-200360100 = "아"
20036-200360110 = "이상하다"
20036-200360120 = "선생님 혹시"
20036-200360130 = "주워 놨으니 걱정하지 마."
20036-200360140 = "내일 줄 테니 우선 자. 늦었다."
20036-200360150 = "어"
20036-200360160 = "아"
20036-200360170 = "응"
20036-200360180 = "고마워."
20036-200360190 = "그러고 보니 선생님"
20036-200360200 = "여기 창고에서 꽤 괜찮아 보이는 걸 찾았는데"
20036-200360210 = "나가서 같이 좀 볼래?"
20036-200360220 = "다른 거 하고 있으면 괜찮고"
20036-200360230 = "오? 뭔데?"
20036-200360240 = "나가서? 노는 물건인가?"
20036-200360250 = "뭐"
20036-200360260 = "그렇게 대단한 것까진 아니고"
20036-200360270 = "궁금하면 일단 와!"
20036-200360280 = "가만 안 둬"
20036-200360290 = "어디 있어?"
20036-200360300 = "지금 어디 있냐고!"
20036-200360310 = "추억이 있는 모든 곳에……."
20036-200360320 = "우리 세리카 쨩의 마음속"
20036-200360330 = "헛소리하지 마"
20036-200360340 = "잡히기만 해 아주"
20036-200360350 = "보트에 묶어서 끌고 나가 줄 테니까!!"
20036-200360360 = "어으"
20036-200360370 = "생각보다 먼지가 많네"
20036-200360380 = "안 보이는 부분이라고 너무 방치했어."
20036-200360390 = "부실 청소? 혼자 하는 거야?"
20036-200360400 = "다른 부원들은?"
20036-200360410 = "다들 해야 할 것들이 있어서 말이지"
20036-200360420 = "오히려 내가 좀 여유가 있는 편"
20036-200360430 = "그래서 청소나 해볼까 하고 있었는데……."
20036-200360440 = "아하. 이제 내 차례인가."
20036-200360450 = "지금 도우러 갈게."
20036-200360460 = "?"
20036-200360470 = "뭐?"
20036-200360480 = "선생님?"
20036-200360490 = "이렇게 될 줄 알았어"
20036-200360500 = "다음은 없으니까"
20036-200360510 = "절대로!"
20036-200360520 = "또 불러줘."
20036-200360530 = "언제든 편하게 말해."
20036-200360540 = "응"
20036-200360550 = "아"
20036-200360560 = "아니"
20036-200360570 = "아니아니아니!!!!"
20036-200360580 = "아니야!!"

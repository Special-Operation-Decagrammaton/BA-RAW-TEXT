[translation]
10057-100570010 = "안녕하십니까, 선생님."
10057-100570020 = "신년 맞이는 잘 되어 가시는지요."
10057-100570030 = "하루나는 어때?"
10057-100570040 = "후후."
10057-100570050 = "신년에도 미식에 대한 탐구는 계속될 예정…… 이지만."
10057-100570060 = "시기와 분위기 역시, 미식의 중요한 요소 중 하나이겠지요."
10057-100570070 = "연말연시인 지금"
10057-100570080 = "평소에는 느낄 수 없는 미식에 도전할 때입니다."
10057-100570090 = "여전히 어려운 이야기네……"
10057-100570100 = "그렇게까지 어려운 이야기는 아니랍니다."
10057-100570110 = "후후후."
10057-100570120 = "그런 이유로, 저와 어울려 주셔야겠습니다."
10057-100570130 = "도대체 무슨 이유야?!"
10057-100570140 = "선생님."
10057-100570150 = "일의 결과와 과정 중 어느 쪽이 중요하다고 생각하시나요?"
10057-100570160 = "어려운 질문이네……"
10057-100570170 = "하지만 둘 다 중요하지 않을까?"
10057-100570180 = "역시 그렇군요."
10057-100570190 = "결과 중심적인 세상이지만, "
10057-100570200 = "그렇다고 과정을 무시할 수는 없다는 고견……"
10057-100570210 = "미식의 길 역시 마찬가지 아닐까 합니다."
10057-100570220 = "그런…… 거야?"
10057-100570230 = "후후후."
10057-100570240 = "오늘 약속은 기대하셔도 좋아요."
10057-100570250 = "바로 그 과정을 탐구하는 약속이니까요"
10057-100570260 = "다음에는 "
10057-100570270 = "진정으로 최고의 미식을 함께 즐기도록 하죠. 선생님."
10057-100570280 = "후후후."
10057-100570290 = "선생님"
10057-100570300 = "예전의 약속을 기억하고 계시나요?"
10057-100570310 = "기억하고 있어. 최고의 미식을 즐기자는 약속이었지?"
10057-100570320 = "기억하고 있어. 꽃게잡이를 가자는 약속이었지?"
10057-100570330 = "……?"
10057-100570340 = "무슨 말씀인지 모르겠습니다만"
10057-100570350 = "최고의 미식을 함께 즐기자고 말씀드렸었죠."
10057-100570360 = "그러면, 오늘 잠시 시간을 내어 주실 수 있을까요?"
10057-100570370 = "기다리겠습니다."

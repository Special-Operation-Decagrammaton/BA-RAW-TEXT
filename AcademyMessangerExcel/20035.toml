[translation]
20035-200350010 = "안녕, 선생님."
20035-200350020 = "오. 츠바키네."
20035-200350030 = "오늘도 수행 중이야?"
20035-200350040 = "맞아."
20035-200350050 = "이번엔 특별히"
20035-200350060 = "수행을 위해…… 더욱 심기일전해서"
20035-200350070 = "옷까지 바꿔 입었으니까."
20035-200350080 = "옷을 바꿔 입었다고?"
20035-200350090 = "응."
20035-200350100 = "백귀야행에 오게 되면"
20035-200350110 = "보여 줄게?"
20035-200350120 = "있잖아. 선생님."
20035-200350130 = "지금부터 샬레로 갈 생각인데, 괜찮지?"
20035-200350140 = "물론 괜찮지만."
20035-200350150 = "츠바키가 여기까지 찾아오다니, 드문 일이네."
20035-200350160 = "당연한 거야."
20035-200350170 = "지금의 나는, 수면 가이드 카스가 츠바키니까."
20035-200350180 = "예전에 선생님에게 수면 가이드를 제대로 해 주지 못했으니까……."
20035-200350190 = "오늘은 그 분량만큼 철저하게 가이드를 해 줄게."
20035-200350200 = "결국 샬레에서 자겠다는 소리구나……."
20035-200350210 = "그건 완전한 진실이 아니야."
20035-200350220 = "왜냐하면 선생님도 같이 자야 하니까."
20035-200350230 = "선생님."
20035-200350240 = "업무차 백귀야행에 온다고 들었는데, 맞아?"
20035-200350250 = "응. 그렇게 됐어."
20035-200350260 = "그렇구나."
20035-200350270 = "헤헤."
20035-200350280 = "그러면 말이지."
20035-200350290 = "업무가 끝나면…… 연락줄래?"
20035-200350300 = "그래. 그렇게 할게."
20035-200350310 = "예전에도 못 했던 수면 가이드."
20035-200350320 = "이번에는 확실하게 해 줄 테니까."
20035-200350330 = "은근히 마음에 두고 있었구나……"

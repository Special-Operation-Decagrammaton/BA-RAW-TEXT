[translation]
20035-200350010 = "สวัสดีคุณครู"
20035-200350020 = "โอ้ สึบากินี่เอง"
20035-200350030 = "วันนี้ก็ฝึกฝนอยู่เหรอ?"
20035-200350040 = "ใช่แล้วละ"
20035-200350050 = "ฉันเปลี่ยนชุด"
20035-200350060 = "เป็นพิเศษ..."
20035-200350070 = "เพื่อการฝึกฝนครั้งนี้เลยนะ"
20035-200350080 = "เปลี่ยนชุดงั้นเหรอ?"
20035-200350090 = "อื้ม"
20035-200350100 = "ถ้ามาที่เฮียกคิยาโค"
20035-200350110 = "ฉันจะให้ดูนะ"
20035-200350120 = "คือว่านะ... คุณครู"
20035-200350130 = "ฉันว่าจะไปหาที่ชาเล่ต์ตอนนี้เลย\nให้ฉันไปได้มั้ย?"
20035-200350140 = "ได้อยู่แล้ว"
20035-200350150 = "น่าแปลกใจที่สึบากิจะมาหา\nด้วยตัวเองแบบนี้นะเนี่ย"
20035-200350160 = "มันก็แน่อยู่แล้ว"
20035-200350170 = "เพราะตอนนี้ฉันคือไกด์การนอนหลับ\nคาซึกะ สึบากินี่นา"
20035-200350180 = "ก่อนหน้านี้ฉันทำหน้าที่เป็นไกด์เรื่อง\nการนอนหลับให้คุณครูได้ไม่เต็มที่..."
20035-200350190 = "วันนี้เลยจะไปขอแก้มือใหม่น่ะ"
20035-200350200 = "แปลว่าจะมานอนที่ชาเล่ต์สินะ"
20035-200350210 = "ก็ไม่เชิงหรอก"
20035-200350220 = "เพราะคุณครูก็ต้องนอนด้วย\nเหมือนกัน"
20035-200350230 = "คุณครู"
20035-200350240 = "ได้ยินว่าจะมาธุระที่เฮียกคิยาโคเหรอ?"
20035-200350250 = "อื้ม พอดีมีงานที่นั่นน่ะ"
20035-200350260 = "แบบนี้นี่เอง"
20035-200350270 = "แหะๆ"
20035-200350280 = "ถ้าอย่างนั้น"
20035-200350290 = "ไว้เสร็จงานแล้ว... บอกหน่อยได้มั้ย?"
20035-200350300 = "ได้สิ แล้วครูจะติดต่อไปนะ"
20035-200350310 = "เรื่องไกด์การนอนหลับที่ฉันทำได้ไม่ดี\nเมื่อคราวก่อน"
20035-200350320 = "ครั้งนี้ฉันจะทำให้เต็มที่เลยละ"
20035-200350330 = "ยังฝังใจกับเรื่องนั้นอยู่สินะ..."

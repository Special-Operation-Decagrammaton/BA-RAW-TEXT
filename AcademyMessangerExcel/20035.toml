[translation]
20035-200350010 = "你好，老師"
20035-200350020 = "哦，是椿呀"
20035-200350030 = "今天也在修行嗎？"
20035-200350040 = "沒錯"
20035-200350050 = "這次我特別"
20035-200350060 = "為了讓修行……更加煥然一新"
20035-200350070 = "連衣服都換了"
20035-200350080 = "換了衣服？"
20035-200350090 = "嗯"
20035-200350100 = "如果老師要來百鬼夜行"
20035-200350110 = "就給你看看吧？"
20035-200350120 = "那個，老師"
20035-200350130 = "我現在打算去夏萊，可以嗎？"
20035-200350140 = "當然可以"
20035-200350150 = "椿居然願意到這裡來，真少見"
20035-200350160 = "這是當然的"
20035-200350170 = "因為現在的我，可是睡眠導覽員春日椿"
20035-200350180 = "之前沒能好好為老師進行睡眠導覽……"
20035-200350190 = "今天會連同那次的份，一起徹底為你導覽哦"
20035-200350200 = "所以就是要在夏萊睡覺的意思啊……"
20035-200350210 = "不完全是這樣"
20035-200350220 = "因為老師也要一起睡覺"
20035-200350230 = "老師"
20035-200350240 = "聽說你會來百鬼夜行工作，是嗎？"
20035-200350250 = "嗯，是啊"
20035-200350260 = "這樣啊"
20035-200350270 = "呵呵"
20035-200350280 = "那麼"
20035-200350290 = "工作結束之後……可以聯絡我嗎？"
20035-200350300 = "嗯，我會的"
20035-200350310 = "以前沒能為你做的睡眠嚮導"
20035-200350320 = "這次我想徹底地進行"
20035-200350330 = "看來你還挺介意這件事的呢……"

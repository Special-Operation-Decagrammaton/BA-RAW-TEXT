[translation]
10061-100610010 = "ฮุฮุ..."
10061-100610020 = "ฮุฮุฮุฮุ..."
10061-100610030 = "ซากุระโกะ...?"
10061-100610040 = "มีอะไรเหรอ?"
10061-100610050 = "ไม่มีอะไรหรอกค่ะคุณครู"
10061-100610060 = "ฉันแค่ส่งข้อความมาทักทายค่ะ"
10061-100610070 = "ฉันคิดมาตลอดว่าอยากมีโอกาส\nได้พูดคุยกับคุณครูบ้างน่ะค่ะ"
10061-100610080 = "อีกไม่นาน เราอาจได้มีโอกาสใช้เวลา\nพูดคุยกันก็ได้นะคะ"
10061-100610090 = "ถ้างั้น จนกว่าจะถึงตอนนั้น..."
10061-100610100 = "ขอให้คุณครูสบายดีนะคะ..."
10061-100610110 = "ฮุฮุ..."
10061-100610120 = "ฮุฮุฮุ..."
10061-100610130 = "...???"
10061-100610140 = "ยะโฮ่ว-คุณครู☆"
10061-100610150 = "วันนี้สบายดีรึเปล่าคะ?"
10061-100610160 = "ซากุระโกะจังกำลังขอพรให้คุณครู\nสบายดีอยู่ค่ะ!"
10061-100610170 = "ถ้างั้นขอให้วันนี้เป็นวันที่ดีนะค๊า~!"
10061-100610180 = "ถ้างั้น~ ปิ้วปิ้ว~☆"
10061-100610190 = "ซากุระโกะ...????"
10061-100610200 = "ตัวจริงรึเปล่าเนี่ย?"
10061-100610210 = "...."
10061-100610220 = "อืม"
10061-100610230 = "ขอโทษด้วยค่ะคุณครู แต่ท่าทางจะทำ\nแบบนี้ไม่ได้สินะคะ"
10061-100610240 = "พอดีลองเสิร์ชหาวิธีพูดคุยอย่างสนิท\nสนมในเน็ตมาน่ะค่ะ..."
10061-100610250 = "แต่ถ้าเกิดฉันทำอะไรผิดไป..."
10061-100610260 = "ขอโทษด้วยนะคะ"
10061-100610270 = "ขอตัวก่อนนะคะ..."
10061-100610280 = "คุณครู"
10061-100610290 = "ฉันเพิ่งเคยติดต่อคุณครูหลังจากเสร็จ\nงานเลยค่ะ"
10061-100610300 = "วันนี้ขอบคุณมากนะคะ"
10061-100610310 = "ถึงจะน่าละอายไปบ้าง... แต่ถ้าเกิด\nเรื่องแบบนี้อีกละก็ คงจะต้องขอรบกวน\nคุณครูอีกนะคะ"
10061-100610320 = "ถ้างั้น..."
10061-100610330 = "วันนี้ขอให้มีแต่ความสงบสุขและโชคดี\nนะคะ"
10061-100610340 = "บุ๊ยบุย-!!"
10061-100610350 = "ขอโทษที่จู่ๆ ก็ติดต่อมากลางดึกค่ะ"
10061-100610360 = "แต่รบกวนคุณครูช่วยไปกับฉันหน่อย\nได้มั้ยคะ?"
10061-100610370 = "ทำไมจะไม่ได้ล่ะ เป็นอะไรรึเปล่า?"
10061-100610380 = "มีเรื่องอะไรเหรอ?"
10061-100610390 = "ก็ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ..."
10061-100610400 = "แต่ว่าคราวนี้... ไม่สิ ถึงจะเป็นแบบนี้\nตลอดก็เถอะ..."
10061-100610410 = "แต่ถ้าคุณครูสะดวกละก็ รบกวนออกมา\nคนเดียวหน่อยได้มั้ยคะ?"
10061-100610420 = "คือว่า..."
10061-100610430 = "มันค่อนข้างจะเป็นความลับนิดหน่อยค่ะ"
10061-100610440 = "อืม"
10061-100610450 = "แต่ฉันก็กังวลอยู่เหมือนกันค่ะว่าเรียก\nคุณครูออกมาดึกเกินไปรึเปล่า"
10061-100610460 = "ถ้าคุณครูไม่ติดอะไรละก็ ให้ฉันเป็นฝ่าย\nไปพบคุณครูที่ห้องพัก น่าจะดีกว่า..."
10061-100610470 = "ค่ะ"
10061-100610480 = "คราวหน้า ฉันจะทำแบบนั้นค่ะ"
10061-100610490 = "ถ้าอย่างนั้นก็ขอให้มีแต่ความสุขและ\nโชคดีนะคะ"
10061-100610500 = "คุณครูคะ"
10061-100610510 = "ถ้าไม่เป็นการรบกวนเกินไป..."
10061-100610520 = "ขอถามได้มั้ยคะว่า ในวันพักผ่อน\nคุณครูทำอะไรบ้างเหรอค่ะ?"
10061-100610530 = "ก็ได้อยู่หรอก ว่าแต่มีอะไรหรือเปล่าน่ะ?"
10061-100610540 = "ก็ทำโน่นทำนี่ไปเรื่อย..."
10061-100610550 = "คือว่าเมื่อไม่นานมานี้ ฉันก็ถูกถาม\nแบบนี้มาเหมือนกันค่ะ"
10061-100610560 = "คือ..."
10061-100610570 = "ฉันไม่รู้ว่าจะตอบว่าอะไรดี"
10061-100610580 = "ถ้างั้นฉันจะข้ามไปก็แล้วกันนะคะ"
10061-100610590 = "คุณครูคะ"
10061-100610600 = "เรื่องวันนี้ ต้องขอโทษด้วยจริงๆ นะคะ"
10061-100610610 = "แต่เพราะคุณครูช่วยไว้ ฉันเลยหาย\nกังวลแล้วค่ะ"
10061-100610620 = "ขอบคุณมากเลยนะคะ"
10061-100610630 = "ถึงจะไม่ค่อยเข้าใจก็เถอะ แต่ก็ดีแล้ว\nละนะ"
10061-100610640 = "ถ้าซากุระโกะพูดแบบนั้นก็แสดงว่า\nคงไม่เป็นไร"
10061-100610650 = "ค่ะ"
10061-100610660 = "ถ้างั้น... วันนี้ขอให้มีแต่ความสงบสุข\nนะคะ"
10061-100610670 = "คือว่า..."
10061-100610680 = "คราวหน้าสักวันหนึ่ง..."
10061-100610690 = "ถึงจะไม่รู้ว่าเมื่อไรก็ตาม"
10061-100610700 = "แต่ก็อาจมีวันที่ฉันมาขอปรึกษาคุณครู\nอีกนะคะ"
10061-100610710 = "เลยจะขอบอกเอาไว้ล่วงหน้าค่ะ"
10061-100610720 = "ขอฝากเนื้อฝากตัวด้วยนะคะ"
10061-100610730 = "คุณครู"
10061-100610740 = "มีปัญหาแล้วค่ะ"
10061-100610750 = "ปัญหาเหรอ?"
10061-100610760 = "มีเรื่องอะไรเหรอ?"
10061-100610770 = "ถึงไม่ได้ตั้งใจ แต่ก็กลายเป็นแบบนั้น\nไปแล้วค่ะ"
10061-100610780 = "ไม่ว่ายังไง..."
10061-100610790 = "ฉันคงต้องขอให้คุณครูช่วยแล้วค่ะ"
10061-100610800 = "ขอโทษนะคะ คุณครูอุตส่าห์ให้กำลังใจ\nแท้ๆ..."
10061-100610810 = "จะมีปัญหาอะไรรึเปล่าคะ เหมือนว่า\nเรื่องนี้จะเป็นเรื่องยากพอควรเลยค่ะ"
10061-100610820 = "เอ่อ อืม... นั่นสินะ"
10061-100610830 = "ขอโทษนะที่ครูช่วยอะไรไม่ได้เลย"
10061-100610840 = "ไม่เลยค่ะ คุณครูช่วยฉันได้เยอะมาก\nเลยค่ะ"
10061-100610850 = "อย่างน้อยพวกซิสเตอร์..."
10061-100610860 = "ตอนนี้ฉันรู้สึกว่าพวกพี่น้องซิสเตอร์\nทำให้ลำบากใจน้อยลงมากเลยค่ะ"
10061-100610870 = "แต่ว่าก็เดาไม่ได้เลยค่ะ"
10061-100610880 = "อาจจะกลายเป็น"
10061-100610890 = "คนแปลกๆ ไปแล้วก็ได้ค่ะ"
10061-100610900 = "ก็นะ อย่างน้อยก็ก้าวหน้าแหละนะ"
10061-100610910 = "มาค่อยๆ แก้ไขปัญหากันไปทีละ\nอย่างก็แล้วกัน"
10061-100610920 = "ค่ะ"
10061-100610930 = "ขอบคุณอีกครั้งค่ะ"
10061-100610940 = "และหลังจากนี้... ก็ขอรบกวนด้วยนะคะ"

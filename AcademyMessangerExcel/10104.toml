[translation]
10104-101040010 = "안녕하십니까. 선생님."
10104-101040020 = "듣기로는 내일 산해경에 방문하신다면서요?"
10104-101040030 = "어떻게…… 알았어?!"
10104-101040040 = "역시 그렇군요."
10104-101040050 = "그 부분은 저희 현무상회 나름의"
10104-101040060 = "비즈니스 수단이라고 말씀드릴 수 있을 것 같습니다."
10104-101040070 = "비즈니스 수단이라……. "
10104-101040080 = "아뇨, 사실 그렇게 대단한 것은 아닌데요……."
10104-101040090 = "……."
10104-101040100 = "저, 그 대신이라고 말씀드릴 수 있을지 모르겠습니다만."
10104-101040110 = "아침 일찍, 제가 공유해 드린 곳으로 와 주신다면."
10104-101040120 = "저의…… 일상 중 하나를"
10104-101040130 = "보여드리도록 하겠습니다."
10104-101040140 = "오늘 저희 상회를 찾아 주신다고 하셨죠?"
10104-101040150 = "응. 엄청나게 기대 중이야!"
10104-101040160 = "그 말씀은 확실히 기쁩니다만"
10104-101040170 = "약간 부담이 되는 면도 어느 정도 있기는 하네요."
10104-101040180 = "……안 돼?"
10104-101040190 = "그럴 리가요."
10104-101040200 = "기대받는 편이, 그렇지 못한 것보다 낫습니다."
10104-101040210 = "요식업을 하는 입장이라면 특히나요."
10104-101040220 = "그러면 선생님."
10104-101040230 = "식사 시간에 뵙겠습니다."
10104-101040240 = "말씀드렸던 바 있습니다만……"
10104-101040250 = "오늘은 현무상회의 감찰 일이라서요."
10104-101040260 = "현룡문에서 너무 뭐라고 안 했으면 좋겠네……."
10104-101040270 = "예……."
10104-101040280 = "그렇지만 굳이 선생님께서 참관하실 필요는"
10104-101040290 = "없는 것이 아닐까 해서요."
10104-101040300 = "일단은, 고문으로 참가한다는 형식이니까."
10104-101040310 = "그것은 알고 있습니다만."
10104-101040320 = "하아."
10104-101040330 = "지난번 감사에서, 저희 부원이 현룡문 감찰원을"
10104-101040340 = "실수로 입원시키는 일만 없었어도……."
10104-101040350 = "입원?!"
10104-101040360 = "그, 아닙니다."
10104-101040370 = "그건 어디까지나 고의가 아닌 우연에 의해 일어난……."
10104-101040380 = "……."
10104-101040390 = "무슨 말씀을 드려도, 변명밖에는 되지 않겠군요."
10104-101040400 = "송구스럽습니다만, 오늘 하루 잘 부탁드리겠습니다."
10104-101040410 = "으, 으응……."
10104-101040420 = "오늘은 제가 샬레의 당번인 것으로 알고 있습니다만"
10104-101040430 = "특별히 신경 쓰거나 마음의 준비를 해야 할 것이 있을까요?"
10104-101040440 = "그냥 아무것도 없이 와도 돼."
10104-101040450 = "그렇군요……."
10104-101040460 = "그러면 샬레에서 뵙겠습니다."

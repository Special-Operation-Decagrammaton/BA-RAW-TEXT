[translation]
10104-101040010 = "您好，老師"
10104-101040020 = "聽說老師明天會來訪山海經是嗎？"
10104-101040030 = "你……怎麼會知道！？"
10104-101040040 = "果然如此呢"
10104-101040050 = "關於您的疑問"
10104-101040060 = "只能說我們玄武商會自有一些商業手段"
10104-101040070 = "商業手段啊…… "
10104-101040080 = "不，其實也沒什麼了不起的就是了……"
10104-101040090 = "……"
10104-101040100 = "那個，不知道能不能稱之為交換"
10104-101040110 = "但如果老師願意明天一早到我告訴你的地方來"
10104-101040120 = "我會讓老師看看我的……"
10104-101040130 = "日常行程之一"
10104-101040140 = "聽說老師今天會光臨敝商會是嗎？"
10104-101040150 = "嗯，我超期待的！"
10104-101040160 = "聽您這麼說真讓人開心"
10104-101040170 = "不過也感受到些許壓力呢"
10104-101040180 = "……不行嗎？"
10104-101040190 = "請別這麼說"
10104-101040200 = "受人期待總比不受期待來得好"
10104-101040210 = "尤其對餐飲業而言更是如此"
10104-101040220 = "那麼老師"
10104-101040230 = "稍後用餐時間見"
10104-101040240 = "如同我先前提過的……"
10104-101040250 = "今天是玄武商會的視察日"
10104-101040260 = "希望玄龍門那邊不要有太多意見……"
10104-101040270 = "是啊……"
10104-101040280 = "不過坦白說，我實在有點在意"
10104-101040290 = "老師是否有必要特地前來參觀"
10104-101040300 = "畢竟我在形式上是以顧問的身分參加的"
10104-101040310 = "這點我也清楚，只不過……"
10104-101040320 = "唉……"
10104-101040330 = "要是上次視察時，我們的成員沒有不小心"
10104-101040340 = "把玄龍門的視察員送進醫院就好了……"
10104-101040350 = "送進醫院！？"
10104-101040360 = "不，不是的"
10104-101040370 = "那純粹是場意外，絕不是有意為之……"
10104-101040380 = "……"
10104-101040390 = "無論現在如何辯解，聽起來都只是藉口吧"
10104-101040400 = "實在抱歉。那麼今天就請您多多關照了"
10104-101040410 = "嗯，嗯……"
10104-101040420 = "今天是由我擔任夏萊的值日生"
10104-101040430 = "是否有特別需要注意或準備的事項呢？"
10104-101040440 = "直接過來就可以囉"
10104-101040450 = "原來如此……"
10104-101040460 = "那麼，稍後夏萊見"

[translation]
10104-101040010 = "สวัสดีค่ะ คุณครู"
10104-101040020 = "เห็นว่าพรุ่งนี้จะมาที่ซานไห่จิงเหรอคะ?"
10104-101040030 = "รู้ได้ยังไงน่ะ...?!"
10104-101040040 = "ใช่จริงๆ สินะคะ"
10104-101040050 = "ถ้าถามว่ารู้ได้ยังไง คงต้องบอกว่า"
10104-101040060 = "นี่เป็นแผนธุรกิจของย่านการค้าเทพ\nเต่าดำค่ะ"
10104-101040070 = "แผนธุรกิจเลยเหรอ... "
10104-101040080 = "ไม่หรอกค่ะ ที่จริงก็ไม่ใช่อะไรยิ่งใหญ่\nขนาดนั้นหรอกค่ะ..."
10104-101040090 = "..."
10104-101040100 = "คือว่า... เพื่อเป็นการตอบแทน"
10104-101040110 = "ถ้าคุณครูมาตามโลเคชั่นนี้ได้ตั้งแต่เช้า"
10104-101040120 = "แล้วฉันจะให้ดู..."
10104-101040130 = "กิจวัตรประจำวันอย่างหนึ่งของฉันค่ะ"
10104-101040140 = "คุณครูบอกว่าวันนี้จะมาที่ย่านการค้า\nของเราใช่มั้ยคะ?"
10104-101040150 = "อื้อ ครูกำลังตั้งตารออยู่เลย!"
10104-101040160 = "ได้ยินแบบนั้นฉันก็ดีใจค่ะ"
10104-101040170 = "แต่ก็รู้สึกกดดันอยู่เหมือนกันนะคะ"
10104-101040180 = "ครูไม่ควรไปเหรอ...?"
10104-101040190 = "ไม่หรอกค่ะ จะเป็นอย่างนั้นได้ยังไงคะ"
10104-101040200 = "การได้รับการคาดหวังเป็นสิ่งที่ดีค่ะ"
10104-101040210 = "โดยเฉพาะกับคนที่อยู่ในธุรกิจ\nร้านอาหารแล้วด้วย"
10104-101040220 = "ถ้างั้นก็"
10104-101040230 = "ไว้เจอกันตอนเวลาอาหารนะคะคุณครู"
10104-101040240 = "อย่างที่ฉันเคยบอกคุณครูไปค่ะ..."
10104-101040250 = "วันนี้เป็นวันตรวจตราของย่านการค้า\nเทพเต่าดำค่ะ"
10104-101040260 = "หวังว่ามังกรดำจะไม่ว่าอะไรนะ..."
10104-101040270 = "อืม..."
10104-101040280 = "แต่ฉันคิดว่าคุณครูไม่จำเป็นต้อง"
10104-101040290 = "เข้ามาสังเกตการณ์ให้ลำบากก็ได้ค่ะ"
10104-101040300 = "ครูต้องไปในฐานะที่ปรึกษาน่ะ"
10104-101040310 = "เรื่องนั้นฉันรู้ดีค่ะ"
10104-101040320 = "เฮ้อ..."
10104-101040330 = "แต่ในการตรวจตราครั้งก่อน\nสมาชิกของเราทำผิดพลาด..."
10104-101040340 = "จนผู้ตรวจตราของมังกรดำต้องเข้า\nโรงพยาบาลเลยค่ะ..."
10104-101040350 = "เข้าโรงพยาบาลเลยเหรอ?!"
10104-101040360 = "เอ่อ แต่ว่า..."
10104-101040370 = "มันเกิดขึ้นโดยบังเอิญน่ะค่ะ คนของเรา\nไม่ได้ตั้งใจหรอก..."
10104-101040380 = "..."
10104-101040390 = "ไม่ว่าจะพูดอะไรไป ก็คงเป็นได้แค่\nข้ออ้างสินะคะ"
10104-101040400 = "ยังไงวันนี้ฉันก็ต้องขอรบกวนด้วยนะคะ\nคุณครู"
10104-101040410 = "อะ... อื้ม..."
10104-101040420 = "ฉันรู้มาว่าวันนี้ฉันเป็นตัวแทนเข้าเวร\nที่ชาเล่ต์ค่ะ"
10104-101040430 = "ฉันควรใส่ใจหรือต้องเตรียมใจอะไรไป\nเป็นพิเศษมั้ยคะ?"
10104-101040440 = "มาแต่ตัวก็ได้"
10104-101040450 = "อย่างนั้นสินะคะ..."
10104-101040460 = "งั้นไว้เจอกันที่ชาเล่ต์นะคะ"

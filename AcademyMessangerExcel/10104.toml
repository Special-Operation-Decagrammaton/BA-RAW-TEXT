[translation]
10104-101040010 = "Hello, Sensei."
10104-101040020 = "Are you visiting Shanhaijing tomorrow?"
10104-101040030 = "How'd you know?!"
10104-101040040 = "So it's true."
10104-101040050 = "Just think of it as a part of"
10104-101040060 = "Black Tortoise Promenade's business strategy."
10104-101040070 = "Business strategy... "
10104-101040080 = "Actually, it's nothing that impressive..."
10104-101040090 = "..."
10104-101040100 = "Rather..."
10104-101040110 = "The location I shared with you this morning... Would you meet me there?"
10104-101040120 = "I'll show you"
10104-101040130 = "a slice of my daily life."
10104-101040140 = "You're coming to visit the Promenade today, yes?"
10104-101040150 = "Affirmative! I'm so excited!"
10104-101040160 = "I AM happy to hear that, but"
10104-101040170 = "that was a little overwhelming..."
10104-101040180 = "...Would you rather me not?"
10104-101040190 = "No, no."
10104-101040200 = "It's just that you should manage your expectations."
10104-101040210 = "Especially when it comes to the restaurant..."
10104-101040220 = "Then, Sensei."
10104-101040230 = "I'll see you then."
10104-101040240 = "I mentioned this before, but..."
10104-101040250 = "Today is Black Tortoise Promenade's inspection day."
10104-101040260 = "I hope Genryumon doesn't come down on us too hard..."
10104-101040270 = "Yes..."
10104-101040280 = "Anyway, I thought about it, and I don't believe it's necessary"
10104-101040290 = "for you to come and observe."
10104-101040300 = "I'll just be there as an advisor!"
10104-101040310 = "I know, I know."
10104-101040320 = "*sigh*"
10104-101040330 = "If only one of our members didn't"
10104-101040340 = "hospitalize the inspector last time..."
10104-101040350 = "Hospitalize?!"
10104-101040360 = "Uh... Don't worry about that."
10104-101040370 = "It was an accident. Completely, absolutely unintentional."
10104-101040380 = "..."
10104-101040390 = "Anything I try to say here will just come across as an excuse."
10104-101040400 = "I apologize in advance for any inconveniences, but I'm looking forward to working together today."
10104-101040410 = "Y-Yeah..."
10104-101040420 = "I believe I'm scheduled for a shift at Schale today."
10104-101040430 = "Is there anything in particular I should be aware of? Or particular duties I'll need to brace myself for?"
10104-101040440 = "No, no. Don't worry about anything."
10104-101040450 = "I see..."
10104-101040460 = "I'll see you at Schale then."

[translation]
20013-200130010 = "Sensei, I'm sorry, I know you're busy."
20013-200130020 = "There was a security breach at Schale, so I'd like to take a look at the servers."
20013-200130030 = "I need the password for the PC. Can you come to the Schale office?"
20013-200130040 = "Okay, be right there."
20013-200130050 = "The password is..."
20013-200130060 = "Wait."
20013-200130070 = "Never write passwords on an unprotected line."
20013-200130080 = "I put a sticky note with the password on it at the bottom of the monitor. Use that."
20013-200130090 = "Huh?!"
20013-200130100 = "Are you kidding?"
20013-200130110 = "Sensei, could you do me a favor?"
20013-200130120 = "How can I help?"
20013-200130130 = "I'm going to present a proposal to the company delivering equipment to Millennium this afternoon."
20013-200130140 = "But the president is very stubborn, so I want to be prepared before I bring it up."
20013-200130150 = "I want to do this Veritas' way."
20013-200130160 = "What do you mean by \"Veritas' way\"?"
20013-200130170 = "You mean through hacking?"
20013-200130180 = "Yeah. I want to install a back door on the node before I work. I'd like you to help."
20013-200130190 = "Node? Back door?"
20013-200130200 = "How can I help? I don't know how hacking works."
20013-200130210 = "It's okay. I know it sounds difficult, but you just have to be there."
20013-200130220 = "I'll see you then."
20013-200130230 = "Sensei, did you call?"
20013-200130240 = "I was asleep. Sorry."
20013-200130250 = "Sorry if I woke you up."
20013-200130260 = "Were you up all night?"
20013-200130270 = "Server maintenance for the consulting company is scheduled at midnight."
20013-200130280 = "I thought I should get some sleep before pulling an all-nighter."
20013-200130290 = "Overtime maintenance... Sounds like hard work."
20013-200130300 = "Is it okay if I come with you?"
20013-200130310 = "You wanna see how I do server maintenance?"
20013-200130320 = "That's fine, but it'll be boring. Are you sure?"
20013-200130330 = "I'm sure."
20013-200130340 = "All right. I'll send you the location. Be there by midnight."
20013-200130350 = "But I don't know how long the job will take."
20013-200130360 = "Make sure to get rest beforehand, since we'll be up all night."
20013-200130370 = "I'm concerned that the younger Veritas members will keep hacking just for fun."
20013-200130380 = "It hasn't gotten out of hand yet, but they do get into trouble sometimes."
20013-200130390 = "I'm afraid of what it could do to our club's reputation."
20013-200130400 = "I thought that's what hackers were supposed to do... Or is that just a stereotype?"
20013-200130410 = "These days, people only think of black hat hackers when they hear the word \"hacker\"."
20013-200130420 = "\"Hacker\" used to mean something like a security expert. AKA, a white hat hacker."
20013-200130430 = "I should have taught the members about hacker ethics when I had time..."
20013-200130440 = "I haven't visited the club room recently because I've been so busy."

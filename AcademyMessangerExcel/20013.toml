[translation]
20013-200130010 = "老師，百忙之中打擾你，真不好意思"
20013-200130020 = "有一些和系統安全相關的問題，所以想要調查一下夏萊的伺服器"
20013-200130030 = "因為必須要使用到夏萊的電腦，稍後可以在夏萊辦公室見個面嗎？"
20013-200130040 = "啊，那稍等我一下"
20013-200130050 = "我把密碼打出來"
20013-200130060 = "等等"
20013-200130070 = "絕對不可以在一般的線路上把密碼打出來"
20013-200130080 = "螢幕底下有張寫著密碼的便條紙，只要看那個就可以了"
20013-200130090 = "咦"
20013-200130100 = "……你是開玩笑的，對吧？"
20013-200130110 = "老師，有件事想拜託你"
20013-200130120 = "嗯，怎麼了嗎"
20013-200130130 = "今天下午，我準備去拜訪某個企業"
20013-200130140 = "那裡的社長相當頑固，所以我想多做些準備"
20013-200130150 = "當然，是貝里塔斯流的準備"
20013-200130160 = "貝里塔斯流的……？"
20013-200130170 = "駭進去，之類的？"
20013-200130180 = "嗯。我想要設置一個後門，所以希望你能幫忙"
20013-200130190 = "後門……？"
20013-200130200 = "我對駭入之類的事一竅不通，沒關係嗎？"
20013-200130210 = "嘛，雖然說是幫忙，不過老師只要待在我旁邊就可以了"
20013-200130220 = "那麼待會見"
20013-200130230 = "老師，剛才是你打電話給我嗎？"
20013-200130240 = "抱歉，我剛剛睡了一會兒"
20013-200130250 = "啊，嗯。抱歉吵醒你了"
20013-200130260 = "已經快中午了，昨天熬夜了嗎？"
20013-200130270 = "不。是因為今天深夜，我擔任顧問的公司需要進行伺服器的維護"
20013-200130280 = "我想可能需要通宵工作，所以就先睡了一下"
20013-200130290 = "這樣啊，真辛苦呢"
20013-200130300 = "可以的話，能讓我一起去觀摩嗎"
20013-200130310 = "觀摩？"
20013-200130320 = "是沒關係啦……不過挺枯燥的，我覺得不怎麼有趣哦？"
20013-200130330 = "嗯，沒關係"
20013-200130340 = "我知道了。那今晚0點集合吧，地點之後再通知你"
20013-200130350 = "不過，這次不知道會做到幾點"
20013-200130360 = "我已經做好通宵的覺悟了，老師最好也趁現在睡一下比較好哦"
20013-200130370 = "雖然你應該也知道，我們貝里塔斯的孩子們常常出於興趣進行駭入……"
20013-200130380 = "幸好還沒有搞出什麼大問題，不過倒是引發了一些欺負同學的事件"
20013-200130390 = "再這樣下去的話，駭客的形象就……"
20013-200130400 = "駭客好像大多都給人那種印象，果然是偏見嗎？"
20013-200130410 = "最近每次提到「駭客」，大家似乎都會想到「黑帽駭客」……"
20013-200130420 = "不過本來的「駭客」大多比較接近現在所說的「白帽駭客」，有著「保安專家」的意思"
20013-200130430 = "唉，得找時間教育社團的孩子們駭客倫理才行……總是依靠那種手段是不行的……"
20013-200130440 = "最近實在有點忙，所以比較少去社團露臉……"

[translation]
20013-200130010 = "คุณครู ขอโทษที่เรียกออกมาทั้งที่งานยุ่งนะ"
20013-200130020 = "เมื่อไม่นานมานี้เกิดปัญหาเรื่องความ\nปลอดภัยขึ้นน่ะ ฉันเลยอยากแวะไปดู\nเซิร์ฟเวอร์ของทางชาเล่ต์หน่อย"
20013-200130030 = "แต่ว่ามันต้องใส่รหัสผ่านเข้าเครื่อง\nคุณครูช่วยมาที่ชาเล่ต์หน่อยได้มั้ย?"
20013-200130040 = "อื้อ รอครูแป๊ปนึงนะ"
20013-200130050 = "รหัสผ่านเลขอะไรนะ..."
20013-200130060 = "เดี๋ยวก่อน"
20013-200130070 = "ห้ามพิมพ์รหัสผ่านส่งมาทางเส้นทาง\nสื่อสารทั่วไปเด็ดขาด"
20013-200130080 = "ครูเขียนรหัสแปะไว้ที่ใต้หน้าจอแล้ว\nใช้อันนั้นเลยก็ได้นะ"
20013-200130090 = "ว่าไงนะ?"
20013-200130100 = "ล้อเล่นใช่มั้ย..."
20013-200130110 = "คุณครู ฉันรบกวนเรื่องหนึ่งได้มั้ย?"
20013-200130120 = "ได้สิ เรื่องอะไรเหรอ?"
20013-200130130 = "บ่ายนี้ฉันจะไปคุยเรื่องสัญญากับบริษัท\nที่จัดหาอุปกรณ์ให้กับทางมิลเลเนียมน่ะ"
20013-200130140 = "แต่ประธานของที่นั่นเป็นคนที่ดื้อมากๆ\nเพราะงั้นเลยคิดว่าจะเตรียมตัวล่วงหน้า\nก่อนที่จะไปคุยน่ะ"
20013-200130150 = "หมายถึงวิธีในแบบของเวอริทัสน่ะ"
20013-200130160 = "วิธีของเวอริทัสเหรอ...?"
20013-200130170 = "หมายถึงจะแฮ็กเข้าไปงั้นเหรอ?"
20013-200130180 = "อื้อ ฉันคิดว่าจะติดตั้งแบ็กดอร์ลงบนโหนด\nก่อนจะลงมือทำงานน่ะ คุณครูมาช่วยกัน\nหน่อยได้มั้ย"
20013-200130190 = "โหนด...? แบ็กดอร์...?"
20013-200130200 = "ครูไม่รู้เรื่องการแฮ็กเลย ไม่เป็นไรใช่มั้ย?"
20013-200130210 = "ไม่เป็นไรหรอก ถึงจะขอให้มาช่วย\nแต่คุณครูแค่มาอยู่ข้างๆ ก็พอแล้วล่ะ"
20013-200130220 = "งั้นเดี๋ยวเจอกันนะ"
20013-200130230 = "คุณครู... โทรมาเหรอ?"
20013-200130240 = "โทษทีนะ ฉันนอนอยู่เลยไม่ได้รับสายน่ะ"
20013-200130250 = "ขอโทษที่ปลุกนะ"
20013-200130260 = "กลางวันแล้วนะ เมื่อคืนโต้รุ่งมาเหรอ?"
20013-200130270 = "อ๋อ พอดีมีกำหนดการบำรุงรักษา\nเซิร์ฟเวอร์ของบริษัทที่ฉันให้คำปรึกษา\nอยู่ตอนเที่ยงคืนน่ะ"
20013-200130280 = "ถ้าจะอยู่โต้รุ่งก็ต้องรีบนอนตุนเอาไว้\nก่อนไงล่ะ"
20013-200130290 = "บำรุงรักษาจนถึงดึกเลยเหรอ\nเหนื่อยน่าดูเลยนะ"
20013-200130300 = "ถ้าไม่ว่าอะไร ครูไปดูด้วยได้มั้ย?"
20013-200130310 = "จะมาดูตอนที่ฉันบำรุงรักษาเซิร์ฟเวอร์\nงั้นเหรอ?"
20013-200130320 = "ไม่มีปัญหาหรอก... แต่มันออกจะน่าเบื่อ\nสักหน่อย คุณครูไม่เป็นไรแน่นะ?"
20013-200130330 = "ไม่เป็นไรหรอก"
20013-200130340 = "เข้าใจแล้วล่ะ ถ้างั้นตอนเที่ยงคืนก็มา\nเจอกันที่สถานที่ที่ฉันบอกนะ"
20013-200130350 = "แต่ว่าฉันบอกไม่ได้หรอกนะ\nว่าจะซ่อมเสร็จเมื่อไรน่ะ"
20013-200130360 = "ถ้าคุณครูจะอยู่โต้รุ่งด้วยกัน ก็พักงีบ\nตอนกลางวันสักหน่อยดีกว่านะ"
20013-200130370 = "ฉันกังวลนิดหน่อยว่าสมาชิกของเวอริทัส\nจะไปแฮ็กคอมพิวเตอร์ของที่ไหนเพราะ\nความสนุกน่ะ"
20013-200130380 = "โชคดีที่ไม่ได้มีปัญหาใหญ่อะไร\nถึงยังได้เล่นซนกันอยู่แบบนี้..."
20013-200130390 = "แต่ถ้าปล่อยไว้แบบนี้คงกลายเป็น\nภาพจำว่าเป็นชมรมแฮ็กเกอร์แน่ๆ"
20013-200130400 = "แฮ็กเกอร์ก็มีภาพลักษณ์แบบนั้น\nไม่ใช่เหรอ?"
20013-200130410 = "แน่นอนว่าถ้าพูดถึง <แฮ็กเกอร์> ละก็\nทุกคนคงนึกถึงแฮ็กเกอร์สายมืดกันหมด..."
20013-200130420 = "แต่ที่จริงแล้วแฮ็กเกอร์น่ะหมายถึงผู้\nเชี่ยวชาญด้านความปลอดภัย สมัยนี้คำ\nที่ใกล้ที่สุดก็คงเป็นแฮ็กเกอร์หมวกขาวน่ะ"
20013-200130430 = "อืม สงสัยถ้ามีเวลาก็จะอบรมจริยธรรม\nของแฮ็กเกอร์ให้พวกสมาชิกอยู่หรอก..."
20013-200130440 = "แต่น่าเสียดายที่ช่วงนี้ฉันยุ่งมาก\nจนไม่มีเวลาเลยน่ะสิ"

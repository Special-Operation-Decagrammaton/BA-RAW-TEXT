[translation]
20013-200130010 = "선생님. 바쁜 중에 불러내서 미안해."
20013-200130020 = "최근에 터진 보안 문제 때문에 샬레의 서버를 잠깐 살펴보고 싶어서."
20013-200130030 = "PC의 접속 비밀번호가 필요해서 그러는데, 잠깐 샬레의 집무실로 와 줄 수 없을까?"
20013-200130040 = "응, 잠시만 기다려줘."
20013-200130050 = "접속 비밀번호가 뭐였냐면……."
20013-200130060 = "잠깐."
20013-200130070 = "일반 회선에 비밀번호를 적는 건 절대로 안 돼."
20013-200130080 = "모니터 아래에 비밀번호를 적은 메모지를 붙여 놨으니까 그걸 써도 돼."
20013-200130090 = "뭐?"
20013-200130100 = "……농담이지?"
20013-200130110 = "선생님, 부탁 하나만 해도 될까?"
20013-200130120 = "괜찮아. 무슨 일인데?"
20013-200130130 = "오늘 오후에 밀레니엄에 장비를 납품하는 기업에 계약을 제안하러 갈 예정이었거든."
20013-200130140 = "그런데 사장이 워낙 완고한 사람이라, 이야기를 꺼내기 전에 미리 준비를 해 두고 싶어."
20013-200130150 = "……베리타스의 방식으로 말이지."
20013-200130160 = "베리타스의 방식이라면……?"
20013-200130170 = "그 말은 해킹을 하겠다는 거야?"
20013-200130180 = "응. 작업 전에 미리 노드에 백도어를 설치하고 싶은데, 선생님이 옆에서 도와줬으면 좋겠어."
20013-200130190 = "노드……? 백도어……?"
20013-200130200 = "나는 해킹에 대해서는 아무것도 모르는데 괜찮을까?"
20013-200130210 = "괜찮아. 말은 그렇게 했지만, 선생님은 그냥 옆에 서 있기만 해도 괜찮으니까."
20013-200130220 = "그럼 이따가 보자."
20013-200130230 = "……선생님. 전화했었어?"
20013-200130240 = "미안. 자느라 연락을 받지 못했어."
20013-200130250 = "깨워버렸으면 미안해."
20013-200130260 = "이미 낮인데, 밤이라도 샜던 거야?"
20013-200130270 = "그게 오늘 자정에 컨설팅을 담당하고 있는 회사의 서버 정기 점검이 예정되어 있어서."
20013-200130280 = "철야를 하려면 조금 일찍 잠을 자두는 게 좋을 것 같아서 말이야."
20013-200130290 = "심야의 점검이라니, 고생이네."
20013-200130300 = "혹시 괜찮다면, 견학하러 가도 괜찮아?"
20013-200130310 = "서버 점검을 하는 걸 옆에서 견학하겠다고?"
20013-200130320 = "상관은 없겠지만…… 꽤나 지루한 일일 텐데, 괜찮겠어?"
20013-200130330 = "괜찮아."
20013-200130340 = "알겠어. 그럼 오늘 자정에 내가 알려주는 주소로 찾아와."
20013-200130350 = "다만 서버 점검이 언제 끝날지 모르니까……"
20013-200130360 = "선생도 같이 밤을 새우려면 오후에라도 잠깐 눈을 붙여 두는 게 좋을 거야."
20013-200130370 = "베리타스의 부원들이 자꾸 멋대로 흥미 위주의 해킹을 시도해서 고민이야."
20013-200130380 = "다행히 큰 문제로 커지지는 않는 것 같지만 자꾸 이렇게 말썽을 부리다니……."
20013-200130390 = "이러다간 해커 동아리로서의 이미지가 실추되겠어……."
20013-200130400 = "해커는 그런 이미지가 있는데. ……역시 편견인가?"
20013-200130410 = "물론 요즈음은 <해커>라 하면 다들 그런 블랙 해커를 떠올리지만……."
20013-200130420 = "원래의 해커는 지금의 화이트 해커에 가까운, 보안 전문가를 의미하는 말이었다고."
20013-200130430 = "으으, 시간이 날 때마다 부원들에게 올바른 해커 윤리에 대해 똑똑히 가르쳐주어야 했는데……."
20013-200130440 = "바빠서 부실에 자주 들리지 못하는 게 이럴 땐 아쉽네."

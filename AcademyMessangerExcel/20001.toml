[translation]
20001-2328 = "C&C serves Millennium. That's what a maid does."
20001-2329 = "I'm not sure what tomorrow's mission is, but it'll be at Millennium's urban district."
20001-2330 = "Isn't a maid's mission to clean?"
20001-2331 = "Hey, watch it."
20001-2332 = "That's not wrong..."
20001-2333 = "Getting rid of those who harm Millennium..."
20001-2334 = "That's also considered \"cleaning.\""
20001-2335 = "Even if it's not literally cleaning..."
20001-2336 = "Thank you for your concern."
20001-2337 = "I'm going to do my best on every mission..."
20001-2338 = "I'm just so thankful."
20001-2339 = "Later...I'll repay you in my own way."
20001-2340 = "If only I were a bit stronger..."
20001-2341 = "If there's one thing I'd love to purge from this world, it's math."
20001-2342 = "What are you talking about?"
20001-2343 = "Oh, I'm just venting."
20001-2344 = "I was on the way to the library...and I wanted to text you."
20001-2345 = "My next dream is... Well, I'll tell you once it comes true."
20001-2346 = "I've never told anyone."
20001-2347 = "I have a feeling you'll be the first to know."
20001-2348 = "I have a surprise, Sensei."
20001-2349 = "A surprise?"
20001-2350 = "I hope it's something good."
20001-2351 = "I totally failed my test. :D"
20001-2352 = "Is this the right emote?"
20001-2353 = "Dinner was fun tonight."
20001-2354 = "So much fun..."
20001-2355 = "I know...you're my teacher, but..."
20001-2356 = "Can we be friends? Can I talk to you about my problems?"
20001-2357 = "Of course. What's wrong?"
20001-2358 = "Problems? Where do you want to meet?"
20001-2359 = "Thanks for responding so fast."
20001-2360 = "Let's meet on the roof."
20001-2361 = "I have surprising news. "
20001-2362 = "I bought some pizza and went to the club room, and my friend was waiting for me there."
20001-2363 = "They had a salad..."
20001-2364 = "I was so happy."
20001-2365 = "My friend who works part-time at a cafe had an emergency, so I took her shift."
20001-2366 = "This cafe is famous for their cute uniforms, so I'm kind of excited."
20001-2367 = "I'm sure you'll look great in uniform, Karin."
20001-2368 = "...Isn't it strange?"
20001-2369 = "That's nice of you to say."
20001-2370 = "But I'm kind of embarrassed now."
20001-2371 = "Huh? What's strange?"
20001-2372 = "Even if it is strange..."
20001-2373 = "If there's someone who needs me as a C&C maid,"
20001-2374 = "I want to help them."
20001-2375 = "I'm off to work now."
20001-2376 = "I'll invite you once I improve at this job."
20001-2377 = "Sensei..."
20001-2378 = "I saw you holding a tablet while I was doing the \"moe moe, kyun\" thing..."
20001-2379 = "Were you taking photos of me?"
20001-2380 = "I didn't take any photos of you. I did take pictures of Catherine, though."
20001-2381 = "I refuse to incriminate myself!"
20001-2382 = "Delete them now!"
20001-2383 = "Answer me!"
20001-2384 = "Sensei!"
20001-2385 = "I think she's feeling better now."
20001-2386 = "I probably won't have to work at the maid cafe anymore."
20001-2387 = "Good job."
20001-2388 = "I wanted to see you one last time!"
20001-2389 = "Yeah, it was tough, but my friend thanked me."
20001-2390 = "It's too late. I probably won't be working there anymore."
20001-2391 = "I probably can't do \"moe moe, kyun\" for you anymore."
20001-2392 = "How unfortunate."
20001-2393 = "Thank you so much."
20001-2394 = "My Master."

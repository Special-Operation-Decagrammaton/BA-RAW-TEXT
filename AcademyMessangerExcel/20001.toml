[translation]
20001-2328 = "C&C侍奉千年。因為這是身為女僕的工作"
20001-2329 = "雖然不知道是什麼任務，但明天的任務似乎要在千年的市區進行"
20001-2330 = "女僕的任務的話……清掃？"
20001-2331 = "要小心唷"
20001-2332 = "……這麼說也不算錯"
20001-2333 = "消除危害千年的人"
20001-2334 = "或許也能稱為清掃吧"
20001-2335 = "當然，不管是不是清掃……"
20001-2336 = "謝謝你為我擔心"
20001-2337 = "不管是什麼任務……C&C都會全力侍奉的"
20001-2338 = "剛才得救了，謝謝。感激不盡"
20001-2339 = "總有一天會以侍奉報答的"
20001-2340 = "如果我有更多的力量"
20001-2341 = "就能將「數學」這門科目從這個世界上消除了……"
20001-2342 = "怎麼突然這麼說？"
20001-2343 = "一時昏頭了不好意思……"
20001-2344 = "在去圖書館的路上，突然想跟老師說"
20001-2345 = "那個，第二個夢想……實現的時候會好好告訴你的"
20001-2346 = "雖然我沒有跟任何人說過"
20001-2347 = "但不管怎樣，老師八成會是第一個知道的……"
20001-2348 = "老師，震驚的消息"
20001-2349 = "震驚的消息？"
20001-2350 = "希望是好消息"
20001-2351 = "考試，完全慘敗 (*‿*)ノ"
20001-2352 = "……咦，這個顏文字是對的嗎？"
20001-2353 = "老師，謝謝你。今天很開心"
20001-2354 = "……真的，發自內心"
20001-2355 = "老師雖然是老師……"
20001-2356 = "但我想以朋友的身分拜託你。能聽聽我的煩惱嗎？"
20001-2357 = "當然，怎麼了？"
20001-2358 = "知道了，在哪裡碰面？"
20001-2359 = "謝謝"
20001-2360 = "請來千年的樓頂"
20001-2361 = "老師，剛剛發生了不得了的事"
20001-2362 = "我買了披薩進教室的時候，剛才和老師提到的朋友在那裡等著"
20001-2363 = "……她去幫我買了沙拉"
20001-2364 = "我好開心"
20001-2365 = "朋友有急事，所以我代替她去打工"
20001-2366 = "那間店的制服出名的可愛，非常期待"
20001-2367 = "穿著可愛制服的花凛，真想看啊"
20001-2368 = "……那間店，沒問題吧？"
20001-2369 = "聽你這麼說，很開心"
20001-2370 = "……但也有點害羞"
20001-2371 = "嗯？什麼意思？"
20001-2372 = "不管是什麼地方"
20001-2373 = "只要需要C&C的女僕"
20001-2374 = "我就會給予幫助"
20001-2375 = "那麼，我該走了"
20001-2376 = "等我習慣了之後也會邀請老師來的"
20001-2377 = "這麼說來，老師……"
20001-2378 = "我在那個……擺姿勢的時候，好像有看到你架起平板……"
20001-2379 = "你該不會有拍下來吧？"
20001-2380 = "我沒有拍花凛。我拍的是笑容耀眼的凱瑟琳"
20001-2381 = "我行使緘默權"
20001-2382 = "立刻刪掉！"
20001-2383 = "喂，老師！？不要已讀不回啊！"
20001-2384 = "老師"
20001-2385 = "朋友的事情好像順利結束了"
20001-2386 = "現在已經不用去女僕咖啡廳代班了"
20001-2387 = "辛苦了！"
20001-2388 = "最後還想再看一次！"
20001-2389 = "嗯。雖然發生了很多事情，但朋友也有謝謝我幫忙"
20001-2390 = "很遺憾，我不會再去女僕咖啡廳工作了"
20001-2391 = "已經不能再幫老師做那個「萌耶萌耶啾」了"
20001-2392 = "會覺得……可惜嗎？"
20001-2393 = "……開玩笑的。無論如何，今後也請多多關照"
20001-2394 = "我的，主人"

[translation]
20001-2328 = "C&C는 밀레니엄을 위해 봉사하지. 그것이 메이드의 일이니까."
20001-2329 = "무슨 임무인지 모르겠지만, 내일 임무는 밀레니엄 시가지에서 한다고 해."
20001-2330 = "메이드의 임무라면…… 청소 아닐까?"
20001-2331 = "조심해."
20001-2332 = "……틀린 말은 아니야."
20001-2333 = "밀레니엄에 해악을 끼치는 자들을 정리하는 것도"
20001-2334 = "분명 청소니까."
20001-2335 = "물론 청소가 아니더라도……"
20001-2336 = "걱정해줘서 고마워."
20001-2337 = "어떠한 임무든…… 최선을 다해 봉사하겠어."
20001-2338 = "아무리 생각해도, 감사할 뿐이야."
20001-2339 = "다음에는…… 봉사로 보답할게."
20001-2340 = "하아. 만약 내게 좀 더 힘이 있다면……"
20001-2341 = "이 세상에서 '수학'을 청소하고 싶어."
20001-2342 = "갑자기 무슨 일이야?"
20001-2343 = "아, 투정 부려 미안하군."
20001-2344 = "도서관 가는 길에…… 선생님에게 문자를 보내 보고 싶었어."
20001-2345 = "그…… 두 번째 꿈은…… 이루어지면 그때 알려줄게."
20001-2346 = "아무에게도 말한 적 없지만."
20001-2347 = "아마, 선생님이 가장 먼저 알게 될지도 몰라."
20001-2348 = "놀라운 소식이 있다 선생님."
20001-2349 = "놀라운 소식?"
20001-2350 = "좋은 일이었으면 좋겠네."
20001-2351 = "시험 완전 망했다. (*‿*)ノ"
20001-2352 = "……이모티콘이 이게 맞나?"
20001-2353 = "오늘 저녁 식사는, 즐거웠다."
20001-2354 = "……정말, 정말로 즐거웠다."
20001-2355 = "선생님은…… 선생님이지만……"
20001-2356 = "친구로서 부탁하지. 내 고민 좀 들어줄래?"
20001-2357 = "당연하지. 무슨 일이야?"
20001-2358 = "고민? 어디로 가면 될까?"
20001-2359 = "즉답, 고맙다."
20001-2360 = "옥상에서 만나지."
20001-2361 = "놀라운 일이 있었어."
20001-2362 = "피자를 사서 부실로 돌아갔더니, 친구가 기다리고 있었어."
20001-2363 = "……샐러드를 사 왔더라고."
20001-2364 = "기뻤어."
20001-2365 = "카페에서 일하는 친구가 급한 사정이 생겨서, 대타를 뛰게 되었어."
20001-2366 = "예쁜 유니폼으로 유명한 가게라 하니, 기대가 돼."
20001-2367 = "예쁜 유니폼 입은 카린이 보고 싶어."
20001-2368 = "……뭔가 수상하지 않아?"
20001-2369 = "으음. 그렇게 말해주니 기쁘긴 한데."
20001-2370 = "살짝, 부끄럽네."
20001-2371 = "음? 수상할 게 뭐가 있지?"
20001-2372 = "설령 수상하다고 해도,"
20001-2373 = "C&C의 메이드로서 나를 필요로 하는 이가 있다면"
20001-2374 = "나는 돕고 싶어."
20001-2375 = "자, 그럼 아르바이트를 하러 가볼까."
20001-2376 = "조금 익숙해지면, 선생님을 초대할게."
20001-2377 = "선생님……"
20001-2378 = "내가 모에모에큥 할 때 태블릿 pc를 들고 있었는데……"
20001-2379 = "설마 날 찍은 건 아니겠지?"
20001-2380 = "카린을 찍은 적은 없어. 찬란한 미소의 캐서린은 찍었지만."
20001-2381 = "묵비권을 행사하겠어."
20001-2382 = "당장 지워!"
20001-2383 = "대답해줘!"
20001-2384 = "선생님!"
20001-2385 = "친구도 이제 괜찮아진 것 같아."
20001-2386 = "이제 더 이상 메이드 카페에 대타 뛸 일도 없겠지."
20001-2387 = "수고 했어."
20001-2388 = "마지막으로 한 번 더 보고 싶었는데!"
20001-2389 = "응. 난감하긴 했지만, 친구에게도 고맙다는 말을 들었어."
20001-2390 = "늦었다. 이제 내가 메이드 카페에서 일할 일은 없을 테니까."
20001-2391 = "선생님, 이제 내가 모에모에큥도 못 해주겠네."
20001-2392 = "유감…… 이지?"
20001-2393 = "앞으로도 잘 부탁해."
20001-2394 = "나의 주인님."

[translation]
20001-2328 = "C&C ยินดีที่จะอุทิศตนเพื่อโรงเรียน\nมิลเลเนียม เพราะนั่นคือหน้าที่\nของสาวใช้ยังไงล่ะ"
20001-2329 = "ถึงจะไม่รู้ว่าเป็นภารกิจอะไร แต่ว่า\nภารกิจพรุ่งนี้คือต้องไปที่เขตเมือง\nมิลเลเนียม"
20001-2330 = "ถ้าเป็นภารกิจของสาวใช้ล่ะก็...\nทำความสะอาดงั้นเหรอ?"
20001-2331 = "ระวังด้วยนะ"
20001-2332 = "ที่พูดมาก็ไม่ผิดหรอก..."
20001-2333 = "การกำจัดพวกคนร้ายที่เข้ามาป้วนเปี้ยน\nในมิลเลเนียม..."
20001-2334 = "ก็นับว่าเป็นการทำความสะอาด"
20001-2335 = "ถึงไม่ได้ลงมือทำความสะอาดจริงๆ ก็เถอะ"
20001-2336 = "ขอบคุณที่เป็นห่วงนะ"
20001-2337 = "ไม่ว่าจะเป็นภารกิจอะไร... ฉันก็จะรับใช้\nอย่างเต็มที่"
20001-2338 = "ไม่ว่าจะคิดยังไง ฉันก็รู้สึกซาบซึ้งใจมาก"
20001-2339 = "เอาไว้คราวหน้า... ฉันจะตอบแทนด้วย\nการรับใช้อย่างดีแทนนะ"
20001-2340 = "เฮ้อ ถ้าฉันแข็งแกร่งกว่านี้ล่ะก็..."
20001-2341 = "ฉันอยากจะเก็บกวาด \"คณิตศาสตร์\"\nออกไปให้หมดจากโลกเลย"
20001-2342 = "มีอะไรเหรอ?"
20001-2343 = "อ่า... ขอโทษที่บ่นไร้สาระนะ"
20001-2344 = "พอดีฉันกำลังไปห้องสมุด... แต่อยาก\nส่งข้อความหาคุณครูขึ้นมาดื้อๆ น่ะ"
20001-2345 = "คือ... ความฝันเรื่องที่สอง... ถ้าเป็น\nจริงเมื่อไหร่แล้วฉันจะบอกนะ"
20001-2346 = "ฉันยังไม่เคยเล่าให้ใครฟังเลย"
20001-2347 = "บางทีคุณครูอาจเป็นคนแรกที่ได้รู้ก็ได้"
20001-2348 = "มีข่าวที่น่าตกใจมาบอกล่ะ คุณครู"
20001-2349 = "ข่าวที่น่าตกใจเหรอ?"
20001-2350 = "ถ้าเป็นข่าวดีก็คงดีนะ"
20001-2351 = "ฉันทำข้อสอบไม่ได้เลย (✪‿✪)ノ"
20001-2352 = "อ่า... ใช้อีโมติคอนนี้ได้มั้ยนะ?"
20001-2353 = "มื้อเย็นวันนี้ สนุกมากเลย"
20001-2354 = "สนุกมากๆ เลยล่ะ..."
20001-2355 = "คุณครู... ถึงเป็นคุณครูก็จริง..."
20001-2356 = "แต่ฉันจะขอร้องในฐานะเพื่อนคนหนึ่ง\nช่วยรับฟังเรื่องกังวลของฉันหน่อย\nได้หรือเปล่าล่ะ?"
20001-2357 = "ได้อยู่แล้ว มีอะไรเหรอ?"
20001-2358 = "เรื่องกังวลเหรอ? เราไปที่ไหนกันดี?"
20001-2359 = "ขอบคุณนะ"
20001-2360 = "งั้นเจอกันที่ดาดฟ้านะ"
20001-2361 = "มีเรื่องที่น่าตกใจเกิดขึ้นด้วยล่ะ"
20001-2362 = "ฉันซื้อพิซซ่ามาแล้วพอกลับไปถึง\nห้องชมรม ก็เจอเพื่อนๆ รออยู่"
20001-2363 = "เพื่อนๆ ซื้อสลัดมาด้วยล่ะ"
20001-2364 = "มีความสุขจังเลย"
20001-2365 = "เพื่อนที่ทำงานอยู่ที่คาเฟ่มีธุระด่วน\nฉันเลยมาทำงานแทนน่ะ"
20001-2366 = "ร้านนั้นขึ้นชื่อเรื่องชุดยูนิฟอร์มน่ารักๆ\nด้วย ชักตื่นเต้นแล้วสิ"
20001-2367 = "อยากเห็นคารินจังใส่ชุดยูนิฟอร์ม\nน่ารักๆ จังเลย"
20001-2368 = "มัน... ไม่ดูแปลกๆ งั้นเหรอ"
20001-2369 = "อืม... คุณครูพูดแบบนี้ฉันก็ดีใจ"
20001-2370 = "รู้สึกเขินนิดหน่อยแฮะ"
20001-2371 = "หืม? จะมีอะไรแปลกๆ งั้นเหรอ?"
20001-2372 = "ถึงจะบอกว่าน่าสงสัยก็เถอะ"
20001-2373 = "แต่ในฐานะสาวใช้ของ C&C แล้ว...\nถ้ามีคนที่ต้องการให้ฉันช่วย..."
20001-2374 = "ฉันก็จะต้องไปช่วย"
20001-2375 = "เอาละ ถ้างั้นก็ไปทำงานพิเศษกันเถอะ!"
20001-2376 = "ถ้าฉันทำงานคล่องแล้ว จะเชิญคุณครู\nไปนะ"
20001-2377 = "คุณครู..."
20001-2378 = "ตอนฉันทำท่าโมเอะโมเอะคิ้ว\nเห็นถือแท็บเล็ตอยู่ด้วย..."
20001-2379 = "คงไม่ได้ถ่ายภาพฉันเอาไว้ใช่มั้ย?"
20001-2380 = "ครูไม่ได้ถ่ายตอนทำท่านั้นเลยนะ\nครูถ่ายแต่รอยยิ้มที่สดใสของคาริน"
20001-2381 = "ครูขอใช้สิทธิ์ไม่พูดแล้วกัน..."
20001-2382 = "ลบออกเลยนะ!"
20001-2383 = "ช่วยตอบหน่อยสิ!"
20001-2384 = "คุณครู!"
20001-2385 = "ตอนนี้เพื่อนฉันเสร็จธุระแล้ว"
20001-2386 = "ไม่ต้องไปทำงานแทนที่เมดคาเฟ่แล้วล่ะ"
20001-2387 = "เหนื่อยหน่อยน้า"
20001-2388 = "ครูอยากเห็นคารินจังชุดเมดอีกรอบแท้ๆ!"
20001-2389 = "อื้อ ถึงจะลำบากนิดหน่อย แต่ก็ทำให้\nได้ยินเพื่อนพูดขอบคุณด้วยล่ะ"
20001-2390 = "ไม่ทันแล้วล่ะ ตอนนี้ฉันไม่ต้องไปทำ\nงานที่เมดคาเฟ่อีกแล้ว"
20001-2391 = "คุณครู ให้ฉันทำท่าโมเอะโมเอะคิ้ว\nให้ดูมั้ย"
20001-2392 = "ยินดี... สุดๆ เลย"
20001-2393 = "ต่อไปก็ขอฝากตัวด้วยนะ"
20001-2394 = "นายท่านของฉัน"

[translation]
13001-909 = "선생님."
13001-910 = "이쁜 구름을 봤어."
13001-911 = "구름?"
13001-912 = "그러게 오늘 날씨 좋지?"
13001-913 = "응."
13001-914 = "그래서 오늘이라면"
13001-915 = "찾을 수 있을지도 모른다고."
13001-916 = "생각했어."
13001-917 = "선생님. 찾으러 가자."
13001-918 = "찾는다니? 뭘?"
13001-919 = "구름."
13001-920 = "구름……?"
13001-921 = "상점가에서 기다릴게."
13001-922 = "선생님, 한가, 해?"
13001-923 = "하이쿠 시집 신간이 나와서 사러 가고 싶어."
13001-924 = "치세를 위해서라면 당연히 한가하지."
13001-925 = "한가하지 않아도 치세를 위해서라면 얼마든지……!"
13001-926 = "그으래?"
13001-927 = "그럼, 같이 사러 가자."
13001-928 = "선생님."
13001-929 = "이머-전-시."
13001-930 = "이머전시?"
13001-931 = "치세, 갑자기 무슨 일이야?"
13001-932 = "동아리 출품"
13001-933 = "마감이 코앞인데"
13001-934 = "뭘 써야 할까?"
13001-935 = "치세……?"
13001-936 = "선생님, 공원."
13001-937 = "기다리고 있을게."
13001-130010010 = "선생님."
13001-130010020 = "여름이야."
13001-130010030 = "더워~."
13001-130010040 = "그러게. 이번 여름은 유난히 더운걸."
13001-130010050 = "그래도"
13001-130010060 = "바람이 오는 소리를 들을 수 있으니까."
13001-130010070 = "바람 소리?"
13001-130010080 = "아니"
13001-130010090 = "바람이 오는 소리."
13001-130010100 = "음"
13001-130010110 = "선생님한테도 들려줄게."

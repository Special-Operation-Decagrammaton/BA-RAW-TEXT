[translation]
10076-100760010 = "คุณครู!"
10076-100760020 = "ตอนนี้ยุ่งอยู่รึเปล่าคะ?!"
10076-100760030 = "ไม่เลย ว่างมาก"
10076-100760040 = "มีอะไรเหรอ?"
10076-100760050 = "โอ๊ะ!"
10076-100760060 = "ดีเลยค่ะ!"
10076-100760070 = "ถ้าคุณครูสะดวกละก็ ฉันมีของที่อยาก\nให้คุณครูดูค่ะ!"
10076-100760080 = "มะ...ไม่ใช่แค่เรื่องการอธิบาย\nอะไรหรอกนะคะ!"
10076-100760090 = "ไม่ใช่ \"แค่\" งั้นเหรอ...?"
10076-100760100 = "ยังไงก็ได้ ค่อยๆ มาก็แล้วกันนะ"
10076-100760110 = "อ๊ะ"
10076-100760120 = "ยังไงก็เถอะค่ะ!"
10076-100760130 = "อ๊ะ"
10076-100760140 = "ค่ะ...!!"
10076-100760150 = "ฉันจะไปเดี๋ยวนี้เลยค่ะ!"
10076-100760160 = "คุณครู"
10076-100760170 = "ฉันไปหาเพราะอยากไปช่วยคุณครู\nแท้ๆ เชียว..."
10076-100760180 = "แต่กลับรู้สึกเหมือนฉันเป็นฝ่ายได้รับ\nความช่วยเหลือแทนเลยค่ะ"
10076-100760190 = "ยังไงก็ขอบคุณมากเลยค่ะ!"
10076-100760200 = "ไม่หรอก เธอก็ช่วยครูได้เยอะเลย"
10076-100760210 = "ถ้าไม่ได้โคโทริละก็ ครูคงขี้เกียจ\nจนไม่ยอมทำแน่ๆ"
10076-100760220 = "เอ่อ..."
10076-100760230 = "งั้นเหรอคะ?"
10076-100760240 = "ถ้างั้นก็..."
10076-100760250 = "ค่อยยังชั่วหน่อยค่ะ!!"
10076-100760260 = "ขอบคุณนะคะ!!"
10076-100760270 = "เฮ้อ"
10076-100760280 = "คงเพราะคนเยอะ งานที่ต้องทำ\nก็เลยเยอะตามไปด้วยสินะคะ"
10076-100760290 = "ไม่เสียชื่องานมหกรรมแข่งขันกีฬา\nเลยค่ะ!"
10076-100760300 = "แน่นอนว่า..."
10076-100760310 = "คุณครูเองก็คงงานเยอะเหมือนกัน\nสินะคะ!"
10076-100760320 = "งานเยอะสุดๆ..."
10076-100760330 = "เด็กหลายโรงเรียนสุดๆ..."
10076-100760340 = "คิดแล้วเชียว!"
10076-100760350 = "อืม"
10076-100760360 = "ถ้าฉันพอจะช่วยได้ ก็อยากช่วยทำ\nพวกงานเอกสารให้ค่ะ!"
10076-100760370 = "ตอนนี้ฉันเองก็ว่างๆ อยู่พอดีน่ะค่ะ"
10076-100760380 = "รอสักครู่นะคะ!"
10076-100760390 = "ฉันจะรีบไปหาเดี๋ยวนี้เลยค่ะ!"
10076-100760400 = "อืม!"
10076-100760410 = "ฉันไม่ค่อยแน่ใจเลย..."
10076-100760420 = "แต่ก็รู้สึกเหมือนว่าได้ช่วยคุณครู\nนิดหน่อยค่ะ"
10076-100760430 = "ฉันมีความสุขมากๆ เลยค่ะ!"
10076-100760440 = "อาจเป็นเพราะอารมณ์พาไป...\nก็ได้สินะคะ?"
10076-100760450 = "ไม่ได้ล้อเล่นเลยนะ เธอเหมือน\nผู้ช่วยชีวิตครูเลย"
10076-100760460 = "แบบนี้สิถึงกับสมเป็น\nซูเปอร์สตาร์น่ะ!"
10076-100760470 = "...!!"
10076-100760480 = "โอ๊สสส!!"
10076-100760490 = "ฮิฮิ"
10076-100760500 = "ถ้างั้นก็เรียกใช้ฉันได้ตลอดเลยนะคะ\nคุณครู!!"
10076-100760510 = "ฮือ..."
10076-100760520 = "ถึงจะคาดการณ์เอาไว้แล้ว แต่ว่า..."
10076-100760530 = "การขยับร่างกาย เป็นเรื่องยากกว่าที่\nคิดอีกนะคะ"
10076-100760540 = "รู้งี้ทำเป็นประจำก็คงดี"
10076-100760550 = "สำนึกผิดแล้วค่ะ"
10076-100760560 = "คงจะเหนื่อยสินะ ตอนนี้อยู่ไหนล่ะ?"
10076-100760570 = "โธ่ คงต้องไปดูอาการหน่อยแล้วสินะ"
10076-100760580 = "อ๊ะ"
10076-100760590 = "ฉันไม่ได้บอกคุณครูเพื่อให้ทำแบบนั้น\nเลยนะคะ"
10076-100760600 = "อืม"
10076-100760610 = "แต่ว่าแบบนั้นก็ดีค่ะ อย่างน้อยก็ใช้\nเป็นข้ออ้างชวนคุณครูมาได้"
10076-100760620 = "ค่ะ"
10076-100760630 = "ถ้างั้นฉันจะรอนะคะ"
10076-100760640 = "อ๊ายยยยย!!"
10076-100760650 = "เมื่อกี้ฉันไม่ทันคิดอะไร"
10076-100760660 = "แต่พอมาทบทวนดูแล้ว มันเป็น\nสถานการณ์ที่น่าอายมากเลยค่ะ!"
10076-100760670 = "ดันเผลอให้เห็นด้านที่ไร้เรี่ยวแรง\nโดยไม่ระวังซะแล้วค่ะ!"
10076-100760680 = "มันไม่ได้แปลกอะไรสักหน่อย~"
10076-100760690 = "การคอยเฝ้าจับตาดูก็เป็นงาน\nของครูอย่างหนึ่งนะ"
10076-100760700 = "คะ?"
10076-100760710 = "อย่างนั้นเหรอคะ?"
10076-100760720 = "อืม"
10076-100760730 = "ฉันไม่ค่อยเข้าใจเท่าไร แต่ถ้าคุณครู\nพูดแบบนั้น..."
10076-100760740 = "ยังไงก็ขอบคุณนะคะคุณครู! ฉันมีแรง\nฮึดขึ้นแล้วละค่ะ!!"
10076-100760750 = "ถ้างั้น... ขอตัวก่อนนะคะ!!"
10076-100760760 = "ดึกเลยนะคะเนี่ย"
10076-100760770 = "แต่ยังไงงานวันนี้ก็ผ่านไปแล้ว"
10076-100760780 = "แต่ว่า..."
10076-100760790 = "มัน..."
10076-100760800 = "รู้สึกแปลกๆ ค่ะ"
10076-100760810 = "จะเรียกว่าเสียดายนิดหน่อยก็ได้..."
10076-100760820 = "ยิ่งตั้งใจเท่าไร ก็คงยิ่งรู้สึกแบบนั้น\nแหละนะ"
10076-100760830 = "งั้นเหรอคะ?"
10076-100760840 = "อืม..."
10076-100760850 = "เรื่องนี้..."
10076-100760860 = "ฉันจะขอคิดให้ละเอียดอีกสักหน่อยค่ะ"

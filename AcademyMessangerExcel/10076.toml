[translation]
10076-100760010 = "老師！"
10076-100760020 = "現在在忙嗎！"
10076-100760030 = "剛好沒事唷"
10076-100760040 = "怎麼了嗎？"
10076-100760050 = "哦！"
10076-100760060 = "那真是太好了！"
10076-100760070 = "方便的話，我有個東西想給你看！"
10076-100760080 = "當，當然，不是只為了說明而已哦！"
10076-100760090 = "不是「只」為了說明……？"
10076-100760100 = "可以唷，隨時歡迎你來"
10076-100760110 = "啊"
10076-100760120 = "總之！"
10076-100760130 = "啊"
10076-100760140 = "是！！"
10076-100760150 = "我馬上過去！"
10076-100760160 = "老師"
10076-100760170 = "本來是想幫忙才過去的"
10076-100760180 = "結果受到幫助的反而是我"
10076-100760190 = "那個，很謝謝你"
10076-100760200 = "確實有幫上忙哦"
10076-100760210 = "要不是有亞都梨，我可能會因為嫌麻煩而偷懶吧"
10076-100760220 = "是"
10076-100760230 = "是嗎？"
10076-100760240 = "那真是"
10076-100760250 = "真是太好了！！嗯！！"
10076-100760260 = "謝謝你！！"
10076-100760270 = "哎呀"
10076-100760280 = "不知道是不是因為人多的關係，事情也特別多呢"
10076-100760290 = "真不愧是大運動會！"
10076-100760300 = "想必"
10076-100760310 = "老師現在也忙得暈頭轉向吧！"
10076-100760320 = "終究有管理營運的工作要做"
10076-100760330 = "畢竟是各大學園共襄盛舉的活動"
10076-100760340 = "果然如此！"
10076-100760350 = "嗯……"
10076-100760360 = "方便的話，請讓我幫老師處理一些文書工作吧！"
10076-100760370 = "正好現在稍微有點空閒時間"
10076-100760380 = "請稍等！"
10076-100760390 = "我馬上過去！"
10076-100760400 = "嗯！"
10076-100760410 = "雖然還是不太清楚"
10076-100760420 = "但似乎有幫上老師的忙"
10076-100760430 = "我真的很開心！"
10076-100760440 = "應該不是……我的錯覺吧？"
10076-100760450 = "不是錯覺哦，我還以為是救世主出現了呢"
10076-100760460 = "這就是「超人」嗎？"
10076-100760470 = "……！！"
10076-100760480 = "哦哦！！"
10076-100760490 = "嘻嘻"
10076-100760500 = "歡迎隨時找我哦！老師！！"
10076-100760510 = "唔"
10076-100760520 = "雖然有所預期"
10076-100760530 = "但活動身體果然比想像中還累呢"
10076-100760540 = "早知道平時就多運動了"
10076-100760550 = "必須反省……"
10076-100760560 = "辛苦了。你現在在哪裡？"
10076-100760570 = "哎呀，我得去看看情況才行"
10076-100760580 = "啊"
10076-100760590 = "我其實沒有那個意思"
10076-100760600 = "嗯"
10076-100760610 = "不過如果老師要來的話……"
10076-100760620 = "好"
10076-100760630 = "我等你哦"
10076-100760640 = "嗚哇啊啊啊！！"
10076-100760650 = "剛才還不這麼覺得"
10076-100760660 = "現在仔細一想，剛才超級羞恥的吧！"
10076-100760670 = "竟然展露出那種毫無防備的一面！！"
10076-100760680 = "完全沒問題哦～"
10076-100760690 = "關照學生的不同面貌也是老師的職責"
10076-100760700 = "嗯？"
10076-100760710 = "是這樣嗎？"
10076-100760720 = "唔嗯"
10076-100760730 = "雖然不是很懂，老師都這麼說了……"
10076-100760740 = "總之謝謝你，老師！託老師的福，我完全復活了！！"
10076-100760750 = "那再見囉！！"
10076-100760760 = "時間已經這麼晚了啊"
10076-100760770 = "不知不覺間大運動會也要結束了"
10076-100760780 = "不過"
10076-100760790 = "總覺得"
10076-100760800 = "心情有點奇妙"
10076-100760810 = "覺得有點捨不得？"
10076-100760820 = "越認真就越容易有這種心情吧"
10076-100760830 = "是這樣嗎？"
10076-100760840 = "唔嗯"
10076-100760850 = "關於這點"
10076-100760860 = "我想再思考一下"

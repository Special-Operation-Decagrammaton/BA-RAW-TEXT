[translation]
10011-808 = "ทุกคนคะ ของว่างยามบ่ายวันนี้\nเป็นขนมหวานจากงานชุมนุมนะคะ"
10011-809 = "เพราะงั้น ทุกคนอย่ามาช้า\nรีบมาให้ทันเวลาของว่างนะคะ!"
10011-810 = "ข้อความนี่ส่งมาให้ครูงั้นเหรอ?"
10011-811 = "ทานผลไม้อร่อยไหมคะ คุณครู?"
10011-812 = "ครูกินแล้วละ อร่อยมากเลย"
10011-813 = "ฮุฮุ ดีจังเลยที่ถูกปากคุณครู"
10011-814 = "พรุ่งนี้ฉันก็จะเตรียมของว่างแสนอร่อยไว้\nให้อีก แวะมาที่สวนต้นบ๊วยได้นะคะ!"
10011-815 = "คุณครูคะ วันนี้ช่วงบ่าย..."
10011-816 = "จะมีการแสดงละครหุ่นเพื่อให้เด็กๆ ใน\nสวนต้นบ๊วยแปรงฟันให้สะอาดด้วยนะคะ"
10011-817 = "ละครหุ่นงั้นเหรอ ฟังดูน่าสนุกดีนะ"
10011-818 = "ค่า~"
10011-819 = "เพราะเป็นการแสดงละครหุ่นเรื่องการต่อสู้\nกับจอมวายร้ายแมงกินฟัน พวกเด็กๆ เลย\nตื่นเต้นกันมากเลยค่ะ"
10011-820 = "แต่ว่าวันนี้ไม่มีครูคนไหนว่างที่จะมา\nแสดงบท \"เจ้าแมงกินฟัน\" เลยค่ะ"
10011-821 = "คือว่า... คุณครูจะช่วยมาแสดงละคร\nหน่อยได้ไหมคะ?"
10011-822 = "แต่ครูแสดงละครไม่ค่อยเก่งนะ..."
10011-823 = "ฮิฮิ ไม่เป็นไรค่ะ ฉันจะคอยช่วยแนะนำ\nเรื่องการแสดงอยู่ข้างๆ เองค่ะ"
10011-824 = "การแสดงจบลงไปได้ด้วยดี เพราะได้\nคุณครูมาช่วยแสดงเลยนะคะ ฮิฮิ"
10011-825 = "หลังกินข้าวเสร็จแล้ว คุณครูเองก็อย่าลืม\nแปรงฟันด้วยนะคะ!"
10011-826 = "ได้เลย! ผู้ฝึกสอนชุน!"
10011-827 = "ครูไม่ใช่เด็กๆ แล้วนะ..."
10011-828 = "หุหุ เก่งมากเลยค่ะ"
10011-829 = "ถึงเป็นผู้ใหญ่แล้ว การแปรงฟันให้สะอาด\nก็สำคัญมากนะคะ!"
10011-830 = "คราวหน้าฉันจะตรวจสุขภาพฟันคุณครูอีกค่ะ\nเพราะงั้นแปรงฟันให้สะอาดด้วยนะคะ"
10011-831 = "วันนี้ฉันรู้สึกไม่ค่อยดีเท่าไหร่... คงไม่เข้า\nไปที่สวนต้นบ๊วยแต่จะขอกลับก่อนเลยนะคะ"
10011-832 = "เป็นหวัดเหรอ?"
10011-833 = "เปล่าค่ะ แค่รู้สึกไม่ค่อยดีน่ะค่ะ...\nไม่ต้องกังวลหรอกค่ะ"
10011-834 = "คุณครูเองก็ดูแลสุขภาพด้วยนะคะ"
10011-835 = "ฮุฮุ พอได้คุยกับคุณครูแล้วก็รู้สึกดีขึ้น\nมาเลยละค่ะ"
10011-836 = "ไม่รู้ทำไมพออยู่ต่อหน้าคุณครู\nฉันเหมือนลืมอายุตัวเองไปเลยค่ะ"
10011-837 = "คุณครูคะ เมื่อกี้ฉันเห็นคุณครูเล่นอะไรสนุกๆ\nให้นักเรียนของสวนต้นบ๊วยดูด้วยนี่คะ...."
10011-838 = "\"อะไรสนุกๆ\" งั้นเหรอ?"
10011-839 = "ก็ที่คุณครูเล่นจับใต้แขนเด็กๆ\nแล้วก็ยกขึ้นสูงๆ พร้อมกับพูดว่า\n\"ชูสูงๆ\" แบบนี้ไงคะ"
10011-840 = "ถ้าคุณครูไม่ว่าอะไร... เล่นแบบนั้น\nกับฉันบ้างได้ไหมคะ?"
10011-841 = "แต่มันจะอันตรายสำหรับชุนรึเปล่า...?"
10011-842 = "ไม่เป็นไรค่ะ ร่างกายฉันยืดหยุ่น\nมากกว่าที่คุณครูคิดอีกนะคะ"
10011-843 = "ฮิฮิ เดี๋ยวพอเจอกัน\nฉันจะเล่าให้ฟังนะคะ"
10011-844 = "ขอบคุณคุณครูมากนะคะ ที่มาเล่นสนุก\nกับเด็กนักเรียนของสวนต้นบ๊วยเสมอๆ"
10011-845 = "แต่คราวหน้าคุณครูต้องเล่น\n\"ชูสูงๆ\" กับฉันให้ได้เลยนะคะ"
10011-846 = "เตรียมตัวให้พร้อมนะคะ คุณครู!"
10011-847 = "ครูบอกแล้วไงว่ามันอันตรายเกินไปน่ะ"
10011-848 = "คุณครูคะ ช่วงบ่ายพอมีเวลาว่างบ้าง\nไหมคะ?"
10011-849 = "อื้อ ว่างนะ มีอะไรเหรอ?"
10011-850 = "คือว่าที่สวนต้นบ๊วย เราจะให้ของขวัญ\nกับเด็กๆ ที่เกิดในเดือนนั้นๆ ทุกเดือน"
10011-851 = "แต่ว่าทุกครั้งที่ต้องเลือกของขวัญ\nฉันกังวลมากเลยละค่ะ"
10011-852 = "ถ้าคุณครูมีเวลา ไปเลือกซื้อ\nของขวัญกับฉันหน่อยได้ไหมคะ?"
10011-853 = "ได้อยู่แล้ว"
10011-854 = "ฮิฮิ ถ้างั้น..."
10011-855 = "หลังเลิกเรียนเจอกันที่ห้างนะคะ"
10011-856 = "เค้กของร้านที่คุณครูแนะนำมา\nเด็กๆ ชอบกันทุกคนเลยค่ะ"
10011-857 = "ขอบคุณที่แนะนำร้านดีๆ ให้นะคะ"
10011-858 = "โชคดีจังที่ทุกคนชอบ"
10011-859 = "ค่ะ คราวหน้าก็ขอรบกวนด้วยนะคะ!"
10011-860 = "คุณครูคะ ช่วงนี้คุณครูหักโหมไปรึเปล่าคะ? "
10011-861 = "สีหน้าของคุณครูดูอิดโรยมากเลยค่ะ"
10011-862 = "ครูทำงานโต้รุ่งมาสองวันแล้วน่ะ\nแต่สบายมาก"
10011-863 = "(ไม่ได้ตอบกลับ เผลอหลับไปแล้ว)"
10011-864 = "อย่าพูดแบบนั้นสิคะ"
10011-865 = "ถ้าฝืนทำแบบนี้\nอาจไม่สบายหนักได้นะคะ!"
10011-866 = "จริงๆ เลย...! อย่าล้อเล่นสิคะ!"
10011-867 = "ความเหนื่อยล้าจะทำให้ล้มป่วยได้ การพัก\nผ่อนให้เพียงพอเป็นเรื่องที่สำคัญมากค่ะ"
10011-868 = "หุหุ รู้สึกหายเหนื่อยขึ้นบ้างไหมคะ คุณครู?"
10011-869 = "อื้ม พอได้หลับสนิทก็รู้สึกสดชื่นขึ้น\nมากจริงๆ"
10011-870 = "ต่อไป ถ้าทำงานแล้วรู้สึกง่วงขึ้นมา ก็มา\nหาฉันที่สวนต้นบ๊วยได้นะคะ"
10011-871 = "ฉันจะปูที่นอนไว้ให้คุณครู โดยไม่ให้\nนักเรียนคนอื่นเห็นเองค่ะ หุหุ"

[translation]
10011-808 = "今天梅花園的點心是來自商會的很甜～的水果唷"
10011-809 = "請大家要準時參加唷！"
10011-810 = "……這真的是要給我的訊息嗎？"
10011-811 = "味道怎麼樣，老師？"
10011-812 = "很好吃唷，謝謝"
10011-813 = "呵呵，合你口味的話就太好了"
10011-814 = "我還準備了其他點心，請隨時光臨梅花園唷！"
10011-815 = "事實上，今天中午"
10011-816 = "為了讓梅花園的孩子們主動刷牙，預計上演一場人偶劇"
10011-817 = "人偶劇啊，聽起來很有趣"
10011-818 = "是啊"
10011-819 = "是關於打倒壞牙菌斑的戰隊風格人偶劇，每次的反應都非常好"
10011-820 = "但是，現在沒有能扮演「蛀牙」角色的助手……"
10011-821 = "如果可以的話，老師能幫忙嗎？"
10011-822 = "我對演技沒有自信……"
10011-823 = "呵呵，沒問題的。我會在旁邊幫忙"
10011-824 = "託老師的福，人偶劇順利結束了！"
10011-825 = "老師今後也要記得飯後刷牙唷！"
10011-826 = "是的，旬教官！"
10011-827 = "沒事的，我又不是小孩子……"
10011-828 = "呵呵，真是好孩子。開玩笑的"
10011-829 = "對大人來說，刷牙也是很重要的！"
10011-830 = "還會再進行突擊檢查，今後也不要忘記唷！"
10011-831 = "不好意思，我身體不太舒服……今天就先不去梅花園了"
10011-832 = "沒事吧？是不是感冒了？"
10011-833 = "只是有點不舒服……讓你擔心了，真不好意思"
10011-834 = "老師也要注意健康唷"
10011-835 = "呵呵，和老師談話後感覺好多了"
10011-836 = "總覺得在老師面前，我也變成了普通的孩子"
10011-837 = "剛剛看到老師和梅花園的孩子在做有趣的事"
10011-838 = "有趣的事？"
10011-839 = "就是把手伸進腋下高高舉起的「飛高高」！"
10011-840 = "可以的話，也能對我做嗎？"
10011-841 = "對旬來說會不會有點危險……？"
10011-842 = "沒問題。我的身體比老師想像的還要柔軟"
10011-843 = "呵呵，下次見面的時候，務必拜託了"
10011-844 = "謝謝你總是陪梅花園的孩子們玩，老師"
10011-845 = "但是總有一天，一定要再做一次「飛高高」"
10011-846 = "請不要忘記囉！"
10011-847 = "所以我就說了，和旬一起做的話在各種意義上都很危險……"
10011-848 = "老師，今天下午有空嗎？"
10011-849 = "嗯，沒問題唷。怎麼了？"
10011-850 = "梅花園每個月都會送禮物給過生日的孩子們"
10011-851 = "但每次都為了挑選禮物而苦惱……"
10011-852 = "可以的話，今天能幫我一起挑選禮物嗎？"
10011-853 = "當然"
10011-854 = "呵呵，非常感謝"
10011-855 = "那麼，放學後請來奇普托斯市區的購物中心"
10011-856 = "大家都對老師介紹的那個蛋糕很滿意"
10011-857 = "謝謝你介紹了這麼好的店"
10011-858 = "那真是太好了"
10011-859 = "下次也務必拜託老師了！"
10011-860 = "老師，最近是不是工作過度了？"
10011-861 = "看起來很疲憊……"
10011-862 = "連續兩天熬夜，但還行"
10011-863 = "（沒有回答，好像已經睡著了）"
10011-864 = "還行才怪……！"
10011-865 = "再這樣下去，總有一天會生大病的！"
10011-866 = "真是的！如果是真的睡著就好了，但還醒著吧……！？"
10011-867 = "疲勞是萬病之源，所以好好睡覺是很重要的哦？"
10011-868 = "呵呵，感覺好點了嗎，老師？"
10011-869 = "嗯，託你的福，感覺好多了"
10011-870 = "又感到疲憊的時候，請隨時光臨梅花園"
10011-871 = "為了不讓大家發現，我會偷偷蓋上棉被的。呵呵……"

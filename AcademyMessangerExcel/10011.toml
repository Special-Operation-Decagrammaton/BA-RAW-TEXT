[translation]
10011-808 = "여러분, 매화원의 오늘 오후 간식은 상회에서 받아온 달콤한 과일이에요."
10011-809 = "그러니 모두들 간식 시간에 늦지 말고 꼭 참가해주세요!"
10011-810 = "……이거 나한테 보낸 메시지야?"
10011-811 = "과일은 맛있게 드셨나요, 선생님?"
10011-812 = "맛있게 잘 먹었어."
10011-813 = "후후, 입에 맞으셨다니 다행이네요."
10011-814 = "내일도 달콤한 간식을 준비해둘 테니 자주 매화원에 놀러 와주세요!"
10011-815 = "선생님, 오늘 오후에는,"
10011-816 = "매화원 아이들이 깨끗이 이를 닦을 수 있도록 인형극을 할 예정이에요."
10011-817 = "인형극이라, 재미있어 보이네."
10011-818 = "네."
10011-819 = "나쁜 충치균을 물리치는 전대물 느낌의 인형극이라, 학생들의 반응도 뜨겁답니다."
10011-820 = "그런데 오늘은 <충치> 역할을 맡아줄 교관이 없어서......"
10011-821 = "혹시 선생님께서 연극을 도와주실 수 있을까요?"
10011-822 = "하지만 나는 연기에는 자신이 없는걸……."
10011-823 = "후후, 괜찮아요. 제가 옆에서 연기하는 걸 도와드릴게요."
10011-824 = "선생님의 도움 덕분에 인형극을 성공적으로 끝마칠 수 있었어요. 후후."
10011-825 = "선생님도 식사 후에는 이를 닦는 것, 꼭 잊지 마세요!"
10011-826 = "네, 슌 교관님!"
10011-827 = "나는 어린아이가 아닌데……."
10011-828 = "후후, 참 잘했어요."
10011-829 = "어른에게도 이를 깨끗이 닦는 건 중요한 일이에요!"
10011-830 = "다음번에도 충치 검사를 할 테니 그때까지 이를 깨끗이 잘 닦아두셔야 해요!"
10011-831 = "오늘은 컨디션이 나빠서…… 매화원에 들르지 않고 먼저 들어가 보겠습니다."
10011-832 = "감기에라도 걸린 거야?"
10011-833 = "아뇨, 단순한 컨디션 난조라…… 걱정하지 않으셔도 괜찮아요."
10011-834 = "선생님도 건강 주의하세요."
10011-835 = "후후, 선생님과 이야기를 나누었더니 금세 기분이 나아졌네요."
10011-836 = "어쩐지 선생님 앞에 서면 저도 나이를 잊고 어린 아이가 되어버리는 것 같아요."
10011-837 = "선생님, 아까 보니 매화원의 학생들에게 재밌어 보이는 걸 해주고 계시던데……."
10011-838 = "재밌어 보이는 것?"
10011-839 = "학생들의 팔을 잡고 하늘로 높이 들어 올리는 놀이…… <높게높게> 말이에요."
10011-840 = "괜찮으시다면 제게도 해주실 수 있나요?"
10011-841 = "하지만 슌에게는 조금 위험하지 않을까……?"
10011-842 = "괜찮아요. 저는 선생님이 생각하시는 것보다 훨씬 유연하니까요."
10011-843 = "후후, 자세한 건 직접 만나서 말씀드릴게요."
10011-844 = "매화원의 아이들과 언제나 즐겁게 놀아 주셔서 감사합니다, 선생님."
10011-845 = "다만 오늘 하지 못한 <높게높게>는 다음에 꼭 받아 낼 거예요."
10011-846 = "각오하세요, 선생님!"
10011-847 = "그러니까 슌에게는 너무 위험한 놀이라고 해도……."
10011-848 = "선생님, 오늘 오후에 시간 괜찮으신가요?"
10011-849 = "응, 괜찮아. 무슨 일인데?"
10011-850 = "그게 매화원에서는 매달 생일을 맞은 아이들에게 선물을 해주곤 하는데,"
10011-851 = "매번 선물을 고르는 게 고민이라서요."
10011-852 = "괜찮으시다면 잡화점에서 같이 선물 고르는 걸 도와주실 수 있으실까요?"
10011-853 = "물론이야."
10011-854 = "후후, 그럼."
10011-855 = "방과 후에 키보토스 시내의 쇼핑몰에서 뵐게요."
10011-856 = "선생님께서 소개해주신 그 가게의 케이크, 다들 좋아하더라구요."
10011-857 = "좋은 가게를 소개해주셔서 감사합니다."
10011-858 = "입맛에 맞은 것 같아 다행이네."
10011-859 = "네, 다음번에도 잘 부탁드릴게요!"
10011-860 = "선생님, 요새 너무 무리하시는 게 아니신가요?"
10011-861 = "얼굴에 피로가 가득해 보이시던데……."
10011-862 = "이틀 연속 철야를 하긴 했지만 아직은 문제없어."
10011-863 = "(대답이 없다. 이미 잠든 것 같다.)"
10011-864 = "그런 말씀 마세요."
10011-865 = "그러다가 정말로 큰 병이 날 수도 있다고요!"
10011-866 = "정말……! 장난치지 말아주세요!"
10011-867 = "피로는 만병의 원인, 푹 주무시는 것도 중요하답니다."
10011-868 = "후후. 피로는 많이 풀리셨나요, 선생님?"
10011-869 = "응. 푹 잤더니 확실히 많이 좋아졌어."
10011-870 = "다음에도 일하다가 졸음이 쏟아지시거든 저희 매화원을 찾아주세요."
10011-871 = "제가 다른 학생들에게 들키지 않도록, 몰래 이불을 깔아 둘게요. 후후……"

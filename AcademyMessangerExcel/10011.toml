[translation]
10011-808 = "Everyone, this afternoon's snack at the Plum Blossom Garden is sweet fruit I got from the Promenade."
10011-809 = "So, please make sure to be there for snack time, and do NOT be late!"
10011-810 = "...Did you mean to send this to me?"
10011-811 = "Did you enjoy your fruit, Sensei?"
10011-812 = "I did. It was delicious."
10011-813 = "Heehee, I'm glad you liked it."
10011-814 = "I'll prepare more sweet treats for you tomorrow, so please stop by the Plum Blossom Garden often!"
10011-815 = "Sensei, this afternoon..."
10011-816 = "We're doing a puppet show to help the students of the Plum Blossom Garden learn to brush their teeth."
10011-817 = "A puppet show sounds...fun."
10011-818 = "Yeah."
10011-819 = "It's like a sentai puppet show about defeating cavity bacteria, and the students love it!"
10011-820 = "But today we don't have an instructor to play the role of the cavity... "
10011-821 = "Could you help us out?"
10011-822 = "I'm not really much of an actor..."
10011-823 = "Heehee, that's okay. I'll be right next to you to help."
10011-824 = "Thanks to your help, the puppet show was a success! Heehee."
10011-825 = "Don't forget to brush after every meal, Sensei!"
10011-826 = "Yes, Instructor Shun!"
10011-827 = "I'm not a kid, though..."
10011-828 = "Heehee, you did a great job."
10011-829 = "It's important for adults to brush their teeth too!"
10011-830 = "I'll be checking for cavities next time, so keep up with your hygiene until then!"
10011-831 = "I'm not feeling well today... I'll have to skip the Plum Blossom Garden and head straight home."
10011-832 = "Did you catch a cold or something?"
10011-833 = "No, I just feel under the weather... You don't have to worry."
10011-834 = "You should take care of yourself too, Sensei."
10011-835 = "Heehee. Now that I've talked to you, I feel much better."
10011-836 = "Somehow, when I'm with you, I forget my age and become just like a child."
10011-837 = "Sensei, I saw you doing something fun with the Plum Blossom Garden students earlier..."
10011-838 = "Something fun?"
10011-839 = "That game where you grab their arms and lift them high into the air... I think it was called Higher and Higher."
10011-840 = "If it's okay with you...could you do it with me too?"
10011-841 = "Wouldn't that be a little dangerous for you, Shun...?"
10011-842 = "I'll be okay. I'm much more flexible than you think."
10011-843 = "Heehee, I'll give you the details in person."
10011-844 = "Thank you for always spending time with the students of the Plum Blossom Garden, Sensei."
10011-845 = "But next time, you definitely have to give me a turn playing Higher and Higher."
10011-846 = "Be ready for it, Sensei!"
10011-847 = "I already said it's too dangerous for you, Shun..."
10011-848 = "Sensei, are you free this afternoon?"
10011-849 = "Yeah. What's up?"
10011-850 = "Every month, the Plum Blossom Garden gives gifts to the children who are celebrating their birthdays."
10011-851 = "It's hard to be picking out gifts so often."
10011-852 = "If it's okay with you, can you help me pick out some gifts at the general store?"
10011-853 = "Of course."
10011-854 = "Heehee. Okay, then."
10011-855 = "See you at the mall in downtown Kivotos after school."
10011-856 = "Everyone liked the cake from the shop you told me about. "
10011-857 = "Thanks for introducing that shop to me."
10011-858 = "I'm glad you liked it."
10011-859 = "Yes, I'll be counting on you next time too!"
10011-860 = "Sensei, don't you think you've been working too hard recently? "
10011-861 = "You look so tired..."
10011-862 = "I've pulled two all-nighters in a row, but I'm hanging in there."
10011-863 = "(I didn't answer. I was already falling asleep.)"
10011-864 = "Please don't say that."
10011-865 = "You can make yourself really sick doing that!"
10011-866 = "Seriously! Don't joke around like that!"
10011-867 = "Fatigue is the cause of most illnesses, so it's important to get a good night's sleep."
10011-868 = "Heehee. Are you feeling rested, Sensei?"
10011-869 = "Yeah, I definitely feel much better after getting some sleep."
10011-870 = "Next time you feel drowsy at work, please come back to the Plum Blossom Garden."
10011-871 = "I'll lay down a private mat for you so the other students don't find out. Heehee..."

[translation]
10098-100980010 = "ครู"
10098-100980020 = "ยุ่งอยู่รึเปล่า?"
10098-100980030 = "ก็เหมือนเดิมนั่นแหละนะ"
10098-100980040 = "คือว่า..."
10098-100980050 = "เกิดเรื่องยุ่งยากขึ้นแล้วน่ะ"
10098-100980060 = "อยากให้ครูมาช่วยสักหน่อยได้รึเปล่า"
10098-100980070 = "ครูต้องช่วยอยู่แล้วสิ"
10098-100980080 = "หืม?"
10098-100980090 = "ฉันยังไม่ได้บอกเลยนะว่าเป็นเรื่องอะไร"
10098-100980100 = "วันนี้ฉันมีกำหนดการไปลาดตระเวน\nเขตปกครองตนเองน่ะ"
10098-100980110 = "ถ้าครูอยากไปด้วยกัน..."
10098-100980120 = "ก็ต้องไปด้วยอยู่แล้ว!"
10098-100980130 = "ฮีโร่ของอะบิดอสจะออกโรงทั้งที\nครูจะพลาดได้ยังไง"
10098-100980140 = "เฮ้อ"
10098-100980150 = "ฮีโร่อะไรกัน"
10098-100980160 = "ไม่ชินกับคำนี้เลยแฮะ..."
10098-100980170 = "เอาเป็นว่าฉันจะรอแล้วกันนะ~"
10098-100980180 = "ครู"
10098-100980190 = "เป็นยังไงบ้าง?"
10098-100980200 = "ไม่ได้รู้สึกจะเป็นหวัดใช่มั้ย?"
10098-100980210 = "ครูไม่เป็นไร แล้วโฮชิโนะล่ะ\nไม่เป็นไรใช่มั้ย?"
10098-100980220 = "ลุงคนนี้ก็เหมือนเดิมนั่นแหละ~"
10098-100980230 = "หรือว่าเป็นเพราะอยู่ด้วยกันตลอด\nทั้งคืนนะ"
10098-100980240 = "ดะ เดี๋ยว..."
10098-100980250 = "เดี๋ยวก่อน เรื่องนั้นน่ะ..."
10098-100980260 = "ก็แค่นั่งแล้วใช้ผ้าห่มม้วนคลุมขึ้นมา\nก็เท่านั้นเอง"
10098-100980270 = "ห้ามพูดอะไรที่ชวนเข้าใจผิดนะ!"
10098-100980280 = "อืม..."
10098-100980290 = "แล้วก็..."
10098-100980300 = "เมื่อวานที่ไปลาดตระเวนเขตปกครอง\nตนเองแล้วก็ช่วยเหลือชาวเมือง"
10098-100980310 = "ก็ทำแบบนี้กับคนอื่นๆ ด้วยนั่นแหละ"
10098-100980320 = "ขอบคุณคุณครูเลยนะที่ทำให้นึกถึง\nความรู้สึกเก่าๆ ขึ้นมาได้น่ะ"
10098-100980330 = "ยังไงก็เถอะ ขอบคุณนะ"
10098-100980340 = "หลายๆ เรื่องเลย"
10098-100980350 = "จำตอนลาดตระเวนครั้งก่อนได้มั้ย ครู?"
10098-100980360 = "จำได้สิ"
10098-100980370 = "เราไปลาดตระเวนด้วยกันตั้งนานนะ"
10098-100980380 = "แต่สุดท้ายก็ไม่เจอพวกแก๊งหมวก\nกันน็อกเลย"
10098-100980390 = "พอนึกดูแล้วก็เป็นแบบนั้นจริงๆ ด้วย"
10098-100980400 = "ฉันก็คิดตั้งนานว่าเจ้าพวกนั้นจะไปอยู่\nที่ไหน"
10098-100980410 = "ได้ยินข่าวลือว่าช่วงนี้เจ้าพวกนั้นไป\nโผล่อยู่แถวๆ ย่านการค้าน่ะ"
10098-100980420 = "เดาว่าคงมีที่ซ่อนตัวชั่วคราวอยู่ที่นั่น"
10098-100980430 = "พร้อมรึยัง ฮีโร่?"
10098-100980440 = "พร้อมเสมอเลยละ ไซคิก"

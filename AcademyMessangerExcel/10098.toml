[translation]
10098-100980010 = "老師"
10098-100980020 = "你現在忙嗎？"
10098-100980030 = "跟平常差不多"
10098-100980040 = "那個"
10098-100980050 = "其實大叔我遇到了一些麻煩事"
10098-100980060 = "所以希望老師能來幫幫我"
10098-100980070 = "當然沒問題"
10098-100980080 = "嗯？"
10098-100980090 = "我都還沒說是什麼事耶？"
10098-100980100 = "我今天要去自治區巡邏"
10098-100980110 = "如果老師想一起去的話……"
10098-100980120 = "我當然要一起去囉！"
10098-100980130 = "阿拜多斯的英雄要出巡，我怎麼能缺席呢！"
10098-100980140 = "唔……"
10098-100980150 = "說我是什麼英雄"
10098-100980160 = "果然還是不太習慣呢……"
10098-100980170 = "總之我等你過來～"
10098-100980180 = "老師"
10098-100980190 = "身體還好嗎？"
10098-100980200 = "應該沒有感冒吧？"
10098-100980210 = "我沒事。星野你呢？還好嗎？"
10098-100980220 = "大叔我完全沒事哦"
10098-100980230 = "果然是因為我們整晚都貼在一起的關係吧"
10098-100980240 = "啊不是"
10098-100980250 = "那個"
10098-100980260 = "只是靠在一起蓋同一件毯子而已"
10098-100980270 = "別說那種會讓人誤會的話！"
10098-100980280 = "唔嗯……"
10098-100980290 = "還有啊"
10098-100980300 = "我們昨天不是去自治區巡邏，順便幫助有困難的人嗎？"
10098-100980310 = "以前我也和其他人做過這種事"
10098-100980320 = "多虧有老師在，我才能重新體驗到這種感覺"
10098-100980330 = "總之從各個角度來說"
10098-100980340 = "我都很感謝你哦"
10098-100980350 = "老師，還記得我們上次去巡邏的事嗎？"
10098-100980360 = "當然"
10098-100980370 = "我們當時巡邏了那麼久"
10098-100980380 = "可是卻完全沒看到頭盔團的蹤影，對吧？"
10098-100980390 = "聽你這麼一說，好像是這樣沒錯？"
10098-100980400 = "我本來還在想那些傢伙到底跑去哪裡了"
10098-100980410 = "結果聽說他們最近經常出沒在商店街一帶"
10098-100980420 = "我想他們的臨時據點應該就在那附近"
10098-100980430 = "你準備好了嗎，英雄？"
10098-100980440 = "當然囉，我的夥伴"

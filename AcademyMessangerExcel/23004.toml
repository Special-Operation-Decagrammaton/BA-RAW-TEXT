[translation]
23004-1582 = "선생님, 아까 보니 도매 문구점의 카탈로그를 열심히 읽고 있던데……."
23004-1583 = "뭔가 새로 필요한 학용품이라도 있어?"
23004-1584 = "새 연필꽂이를 주문하려고."
23004-1585 = "연필꽂이처럼 단순한 형태의 가구라면 부실에 있는 3D 프린터로 만드는 게 더 빠르지 않겠어?"
23004-1586 = "3D 프린터로도 연필꽂이를 만들 수 있어?"
23004-1587 = "물론이야. 게다가 시중에 있는 제품보다 더 가볍고 튼튼하게 만들 수 있다고."
23004-1588 = "재료도 마침 있는데, 한번 만들어 볼까?"
23004-1589 = "응, 그럼 부탁할게."
23004-1590 = "알았어. 그럼 1시간 정도 뒤에 엔지니어부의 작업실로 찾아와."
23004-1591 = "선생님, 샬레 하우스의 화장실 불이 나간 것 같아."
23004-1592 = "스위치 버튼을 눌러봤는데 불이 들어오지 않더라고."
23004-1593 = "그래? 수리 기사를 불러야겠네……."
23004-1594 = "괜찮아. 전선이 끊어진 것뿐이니 간단하게 고칠 수 있어."
23004-1595 = "전선 슬리브 압착기는 어디에 있어? 내가 수리할게."
23004-1596 = "그렇게 전문적인 공구는 샬레에 없는데……."
23004-1597 = "……샬레에 압착기가 한 자루도 없다고?"
23004-1598 = "……정말?"
23004-1599 = "선생님, 오늘 오후 당번 학생 활동도 잘 부탁해."
23004-1600 = "미안. 갑작스러운 출장 일정이 잡혀서 오후에는 샬레에 없을 것 같아."
23004-1601 = "그래? 그렇다면 어쩔 수 없지."
23004-1602 = "뭔가 선생님이 없는 동안 해두어야 할 일이라도 있을까?"
23004-1603 = "오후에 택배가 하나 도착할 텐데 나 대신 받아줘."
23004-1604 = "무슨 택배?"
23004-1605 = "샬레의 놀이방에 둘 장난감 강아지 인형을 하나 주문했거든."
23004-1606 = "헤에, 장난감 강아지 인형이라……."
23004-1607 = "……혹시나 해서 말해두는 건데, 구조가 궁금하다고 먼저 뜯어보면 안 된다?"
23004-1608 = "……우타하?"
23004-1609 = "선생님, 지난번에 부탁했던 자전거 바퀴의 수리가 모두 끝났어."
23004-1610 = "다음에 밀레니엄 학원에 올 때 엔지니어부 부실에 들러서 찾아가."
23004-1611 = "생각보다 빨리 끝났네."
23004-1612 = "역시 밀레니엄의 마이스터야!"
23004-1613 = "뭐, 내가 아니더라도 이 정도의 고장을 수리하는 건 어려운 일이 아니니까."
23004-1614 = "선생님도 나중에 직접 수리해보면 알게 될 거야."
23004-1615 = "우타하가 물건을 수리하는 모습을 옆에서 직접 보고 싶은데……."
23004-1616 = "……그건 곤란해. 엔지니어부의 작업실에는 위험한 물건이 많거든."
23004-1617 = "게다가 수리라는 건 단순 작업의 반복이라, 옆에서 지켜봐도 별 재미도 없다고."
23004-1618 = "얌전히 있을 테니까 제발~."
23004-1619 = "어린 아이도 아니잖아. 떼쓰지 마."
23004-1620 = "어차피 지금은 딱히 수리할 물건도 없으니까…… 나중에 기회가 생기면 다시 말해줄게."
23004-1621 = "아까 자전거 보관소에서 봤는데 천둥이가 혼자 엎어져서 헛돌고 있던데."
23004-1622 = "뭐, 천둥이가?!?!"
23004-1623 = "<서벌>에서 새로운 작업용 장갑을 출시하려는 모양이야."
23004-1624 = "지난번에 <마나슬루>에서 구입한 장갑은 너무 두꺼워서 새로운 것을 찾던 중이었는데…… 마침 잘 되었네."
23004-1625 = "그러고 보니 우타하는 실내에서도 언제나 작업용 장갑을 끼고 있네."
23004-1626 = "무슨 특별한 이유라도 있어?"
23004-1627 = "특별한 이유라고 할 것은 없고…… 내 손가락은 그다지 예쁜 편이 아니거든."
23004-1628 = "어릴 적부터 기름과 금속을 만지고 살았더니 끝이 갈라지고 기름때가 스며들어서 보기에 흉해."
23004-1629 = "그래서 장갑을 끼고 다니는 것뿐이야."
23004-230040010 = "선생님."
23004-230040020 = "혹시 오늘 시간 괜찮을까."
23004-230040030 = "괜찮은데, 무슨 일이야?"
23004-230040040 = "그냥 공구를 좀 사러 갈 일이 있어서."
23004-230040050 = "나만 아는 공구 전문점이 있는데"
23004-230040060 = "괜찮으면, 소개해 줄까 해서."
23004-230040070 = "얼마든지!"

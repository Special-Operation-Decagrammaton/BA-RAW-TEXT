[translation]
10124-101240010 = "老師"
10124-101240020 = "這次實現正義部決定要去海邊"
10124-101240030 = "我想還是知會您一聲比較好"
10124-101240040 = "哇！大海！"
10124-101240050 = "哇！泳裝！"
10124-101240060 = "咦……？"
10124-101240070 = "啊，原來如此，您似乎誤會了"
10124-101240080 = "我們並不是要去遊樂，而是作為實現正義部活動的延伸"
10124-101240090 = "啊，抱歉……"
10124-101240100 = "難得能到夏日的海邊，真可惜"
10124-101240110 = "……或許是我說明得不夠充分"
10124-101240120 = "能佔用您一些時間嗎？我當面向您解釋"
10124-101240130 = "老師"
10124-101240140 = "雖然今天準備不足"
10124-101240150 = "但一週後就不一樣了"
10124-101240160 = "啊，嗯。加油"
10124-101240170 = "雖然不是很懂，但我也幫你加油"
10124-101240180 = "是"
10124-101240190 = "我絕對、肯定不會讓您失望的"
10124-101240200 = "終於，這一天還是到來了"
10124-101240210 = "蓮實？"
10124-101240220 = "一週"
10124-101240230 = "與人生相比或許短暫"
10124-101240240 = "卻是我第一次感到如此漫長"
10124-101240250 = "羽川蓮實，已經做好覺悟了"
10124-101240260 = "歡迎您隨時前來"
10124-101240270 = "我馬上過去"
10124-101240280 = "好，好哦……？"
10124-101240290 = "老師"
10124-101240300 = "今天非常感謝您陪我去購物"
10124-101240310 = "真的沒問題嗎……？"
10124-101240320 = "沒問題"
10124-101240330 = "在去海邊之前還有充分的時間"
10124-101240340 = "別太勉強自己哦……"
10124-101240350 = "加油……"
10124-101240360 = "謝謝您"
10124-101240370 = "我會向您清楚展現，自己究竟能做到什麼程度的"
10124-101240380 = "太沉重了……"
10124-101240390 = "也別太過火哦……"
10124-101240400 = "那麼，我們海邊見吧"
10124-101240410 = "終於來到海邊了"
10124-101240420 = "泳裝尺寸也沒問題"
10124-101240430 = "你很努力呢，蓮實"
10124-101240440 = "好厲害……實在太厲害了……！"
10124-101240450 = "是啊，實在是……"
10124-101240460 = "不只戒掉工作時的零食"
10124-101240470 = "餐後甜點也忍住了"
10124-101240480 = "連茶會送來慰勞的蛋糕捲也讓給別人"
10124-101240490 = "甚至連巡邏時幫助過的老闆送來的、\n我從沒吃過的限量Miracle5000蛋糕也……！"
10124-101240500 = "蓮，蓮實同學……？"
10124-101240510 = "深呼吸！深呼吸！"
10124-101240520 = "不好意思"
10124-101240530 = "剛才一時太激動了"
10124-101240540 = "今天真的很謝謝您"
10124-101240550 = "我總是讓老師看見不想被見到的一面呢"
10124-101240560 = "健康才是最重要的"
10124-101240570 = "以後禁止過度減肥！"
10124-101240580 = "是，我會謹記在心"
10124-101240590 = "老師"
10124-101240600 = "記得您說過，請我在有空時聯絡"
10124-101240610 = "可以在海邊見個面嗎？"
10124-101240620 = "時機正好！就在前面見吧！"
10124-101240630 = "咦？"
10124-101240640 = "明白了"
10124-101240650 = "我這就出發"
10124-101240660 = "老師"
10124-101240670 = "謝謝您，我想必不會忘記今年的夏天吧"
10124-101240680 = "太好了！"
10124-101240690 = "我也很開心！"
10124-101240700 = "是的，這是我第一次如此享受夏天"
10124-101240710 = "從頭到尾，一切都很美好"
10124-101240720 = "最後的煙火呢？很漂亮吧"
10124-101240730 = "煙火？"
10124-101240740 = "啊"
10124-101240750 = "是，煙火確實很美"
10124-101240760 = "彷彿現在也歷歷在目呢，呵呵"

[translation]
10124-101240010 = "선생님."
10124-101240020 = "이번에 정의실현부가 바다로 가게 되었습니다."
10124-101240030 = "아무래도 아시는 편이 좋아 보여서요."
10124-101240040 = "와! 바다!"
10124-101240050 = "와! 수영복!"
10124-101240060 = "네……?"
10124-101240070 = "아. 과연, 착각하고 계시군요."
10124-101240080 = "놀러가는 게 아닙니다. 정의실현부 활동의 연장이죠."
10124-101240090 = "앗, 죄송합니다……."
10124-101240100 = "모처럼 여름 바다인데 아깝네."
10124-101240110 = "……어쩌면 설명이 부족했을지도 모르겠군요."
10124-101240120 = "혹시 괜찮으신 시간이 있을까요? 직접 찾아뵙겠습니다."
10124-101240130 = "선생님."
10124-101240140 = "비록 오늘은 준비가 부족했습니다만."
10124-101240150 = "일주일 후에는 다를 겁니다."
10124-101240160 = "어, 응. 파이팅."
10124-101240170 = "잘 모르겠지만 힘내."
10124-101240180 = "네."
10124-101240190 = "결코. 결단코. 실망시켜드리지 않겠습니다."
10124-101240200 = "결국, 이날이 오고 말았군요."
10124-101240210 = "하스미?"
10124-101240220 = "일주일."
10124-101240230 = "인생 그 자체에 비하면 덧없지만."
10124-101240240 = "이토록 길게 느껴진 것은 처음입니다."
10124-101240250 = "하네카와 하스미, 각오는 끝마쳤습니다."
10124-101240260 = "언제든지 와 주시죠."
10124-101240270 = "금방 갈게."
10124-101240280 = "……? 으, 응."
10124-101240290 = "선생님."
10124-101240300 = "오늘 쇼핑에 어울려 주셔서 감사합니다."
10124-101240310 = "진짜 괜찮아……?"
10124-101240320 = "괜찮습니다."
10124-101240330 = "바다에 갈 때까지 시간은 충분하니까요."
10124-101240340 = "무리하지 마……."
10124-101240350 = "힘내……."
10124-101240360 = "감사합니다."
10124-101240370 = "제가 어디까지 할 수 있는지 똑똑히 보여드리겠습니다. "
10124-101240380 = "너무 비장해……."
10124-101240390 = "어디까지 하지 마……."
10124-101240400 = "그러면, 바다에서 뵙겠습니다."
10124-101240410 = "결국, 바다에 왔군요."
10124-101240420 = "수영복 사이즈도 문제없고요."
10124-101240430 = "노력했어, 하스미."
10124-101240440 = "대단해…… 대단해……!"
10124-101240450 = "네. 무척이나……."
10124-101240460 = "업무 중 간식을 삼가고"
10124-101240470 = "식후 디저트도 참고"
10124-101240480 = "노고를 치하한다며 티파티에서 보내온 롤케이크도 양보하고"
10124-101240490 = "순찰 중에 도운 푸드 트럭 주인분께서 선물해주신 저도아직먹어본적도없는한정판미라클5000케이크도참아가면서"
10124-101240500 = "하, 하스미 양……?"
10124-101240510 = "심호흡! 심호흡!"
10124-101240520 = "죄송합니다."
10124-101240530 = "격양되어서 무심코."
10124-101240540 = "정말, 오늘은 감사했습니다."
10124-101240550 = "선생님께는 자꾸 보이고 싶지 않은 모습을 보이네요."
10124-101240560 = "건강이 최우선이니까."
10124-101240570 = "앞으로 무리한 다이어트 금지!"
10124-101240580 = "네. 명심하겠습니다."
10124-101240590 = "선생님."
10124-101240600 = "시간이 빌 때 연락 달라 하셔서 모모톡 합니다."
10124-101240610 = "잠깐 해변에서 볼 수 있을까?"
10124-101240620 = "좋은 타이밍! 앞에서 만나자!"
10124-101240630 = "네?"
10124-101240640 = "알겠습니다."
10124-101240650 = "지금 내려가겠습니다."
10124-101240660 = "선생님."
10124-101240670 = "감사합니다. 이번 여름은 잊지 못할 겁니다."
10124-101240680 = "다행이네!"
10124-101240690 = "나도 즐거웠어!"
10124-101240700 = "네. 여름이란 걸, 이렇게 즐겨본 건 처음이었어요."
10124-101240710 = "처음부터 끝까지, 전부 좋았습니다."
10124-101240720 = "마지막 불꽃놀이 말이지? 예뻤지."
10124-101240730 = "불꽃이요?"
10124-101240740 = "아."
10124-101240750 = "네. 아름다웠죠. 불꽃."
10124-101240760 = "지금도 선명하게 떠오릅니다. 후후."

[translation]
10124-101240010 = "คุณครู"
10124-101240020 = "ครั้งนี้ชมรมทวงความยุติธรรมจะได้\nไปทะเลค่ะ"
10124-101240030 = "ฉันคิดว่าน่าจะมาบอกให้คุณครูรู้ไว้ก่อน\nน่ะค่ะ"
10124-101240040 = "ว้าว! ทะเล!"
10124-101240050 = "ว้าว! ชุดว่ายน้ำ!"
10124-101240060 = "คะ...?"
10124-101240070 = "อ่า คุณครูเข้าใจผิดไปสินะคะ"
10124-101240080 = "ฉันไม่ได้จะไปเที่ยว แต่ไปทำงานของ\nชมรมทวงความยุติธรรมค่ะ"
10124-101240090 = "อ๊ะ ขอโทษนะ..."
10124-101240100 = "อุตส่าห์ได้ไปทะเลฤดูร้อนแท้ๆ เชียว"
10124-101240110 = "สงสัยฉันคงต้องอธิบายให้มากกว่านี้\nแล้วค่ะ..."
10124-101240120 = "คุณครูพอมีเวลาว่างมั้ยคะ? ฉันจะไป\nหาคุณครูเองค่ะ"
10124-101240130 = "คุณครู"
10124-101240140 = "ถึงวันนี้จะเตรียมตัวได้ไม่ดี"
10124-101240150 = "แต่สัปดาห์หน้าจะไม่เป็นแบบนี้แล้วค่ะ"
10124-101240160 = "อื้อ สู้ๆ นะ"
10124-101240170 = "ถึงจะไม่เข้าใจนัก แต่ก็สู้ๆ นะ"
10124-101240180 = "ค่ะ"
10124-101240190 = "ฉันจะไม่ทำให้ผิดหวังแน่นอนค่ะ"
10124-101240200 = "ในที่สุดก็ถึงวันนี้แล้วนะคะ"
10124-101240210 = "ฮาสุมิ?"
10124-101240220 = "หนึ่งสัปดาห์"
10124-101240230 = "ถ้าเทียบกับทั้งชีวิตแล้วก็แค่เดี๋ยวเดียว"
10124-101240240 = "แต่นี่เป็นครั้งแรกที่ฉันรู้สึกว่ามัน\nยาวนานมากค่ะ"
10124-101240250 = "ฮาเนกาวะ ฮาสุมิ เตรียมตัวพร้อม\nแล้วค่ะ"
10124-101240260 = "มาหาฉันได้ตลอดเลยค่ะ"
10124-101240270 = "จะรีบไปเดี๋ยวนี้ละ"
10124-101240280 = "หะ... หืม?"
10124-101240290 = "คุณครู"
10124-101240300 = "วันนี้ขอบคุณที่มาซื้อของด้วยกันนะคะ"
10124-101240310 = "ไม่เป็นไรจริงๆ เหรอ...?"
10124-101240320 = "ไม่เป็นไรค่ะ"
10124-101240330 = "ฉันยังมีเวลาเหลือเฟือก่อนที่จะไป\nทะเลค่ะ"
10124-101240340 = "อย่าหักโหมมากเกินนะ..."
10124-101240350 = "พยายามเข้านะ..."
10124-101240360 = "ขอบคุณค่ะ"
10124-101240370 = "ฉันจะทำให้เห็นเองค่ะว่าจะไปได้ไกล\nแค่ไหน "
10124-101240380 = "โหดเกินไปแล้ว..."
10124-101240390 = "ไม่ต้องไปให้ไกลหรอก..."
10124-101240400 = "งั้นไว้เจอกันที่ทะเลนะคะ"
10124-101240410 = "ในที่สุดก็ได้มาทะเลแล้วค่ะ"
10124-101240420 = "เรื่องไซซ์ชุดว่ายน้ำก็ไม่เป็นปัญหาแล้ว"
10124-101240430 = "พยายามได้ดีมากเลย ฮาสุมิ"
10124-101240440 = "เก่งมากเลย... เก่งมาก...!"
10124-101240450 = "ค่ะ มากๆ เลยละ..."
10124-101240460 = "ฉันไม่กินของว่างระหว่างทำงาน"
10124-101240470 = "งดกินของหวานหลังมื้ออาหาร"
10124-101240480 = "ฉันอดใจไม่กินแยมโรลที่สภาน้ำชาส่ง\nมาตอบแทนที่ทำงานหนักด้วยค่ะ"
10124-101240490 = "แล้วก็ไม่กินเค้กมิราเคิล 5000 ที่\nเจ้าของฟูดทรัคให้มาเป็นการขอบคุณ\nที่ช่วยระหว่างลาดตระเวนด้วย\nเค้กนั้นยังไม่เคยกินแท้ๆ..."
10124-101240500 = "ฮะ... ฮาสุมิ...?"
10124-101240510 = "หายใจเข้าลึกๆ! ใจเย็นๆ ก่อนนะ!"
10124-101240520 = "ขอโทษค่ะ"
10124-101240530 = "ฉันน่าจะใส่ความรู้สึกมากเกินไป"
10124-101240540 = "วันนี้ขอบคุณมากนะคะ"
10124-101240550 = "ฉันเอาแต่ให้คุณครูได้เห็นในสิ่งที่\nไม่อยากให้เห็นนะคะ"
10124-101240560 = "สุขภาพเป็นเรื่องสำคัญที่สุดนะ"
10124-101240570 = "ต่อไปห้ามไดเอตแบบสุดโต่งเกินนะ!"
10124-101240580 = "ค่ะ ฉันจะจำให้ขึ้นใจค่ะ"
10124-101240590 = "คุณครู"
10124-101240600 = "ฉันส่ง MOMOTALK มาเพราะคุณครู\nเคยบอกว่าถ้ามีเวลาก็ให้ติดต่อมาค่ะ"
10124-101240610 = "งั้นเรามาเจอกันที่ชายหาดสักเดี๋ยวมั้ย?"
10124-101240620 = "ไนซ์ ไทม์มิ่ง! แล้วเจอกันหน้าหาดนะ!"
10124-101240630 = "คะ?"
10124-101240640 = "เข้าใจแล้วค่ะ"
10124-101240650 = "ฉันจะลงไปเดี๋ยวนี้ค่ะ"
10124-101240660 = "คุณครู"
10124-101240670 = "ขอบคุณนะคะ ฉันจะไม่ลืมฤดูร้อนนี้\nเลยค่ะ"
10124-101240680 = "ดีใจที่ได้ยินอย่างนั้นนะ!"
10124-101240690 = "ครูก็สนุกเหมือนกัน!"
10124-101240700 = "ค่ะ นี่เป็นครั้งแรกเลยค่ะที่ฉันได้สนุก\nกับฤดูร้อน"
10124-101240710 = "ฉันชอบทุกอย่างที่ได้ทำเลยค่ะ"
10124-101240720 = "หมายถึงดอกไม้ไฟตอนสุดท้าย\nใช่มั้ย? สวยดีนะ"
10124-101240730 = "ดอกไม้ไฟเหรอคะ?"
10124-101240740 = "อ่า"
10124-101240750 = "ใช่ค่ะ ดอกไม้ไฟสวยมากเลย"
10124-101240760 = "ฉันยังจำมันได้ชัดเจนเลยค่ะ ฮุฮุ"

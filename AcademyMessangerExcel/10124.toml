[translation]
10124-101240010 = "Sensei."
10124-101240020 = "The Justice Task Force will be going to the beach."
10124-101240030 = "I just thought I should let you know."
10124-101240040 = "Yay! Beach!"
10124-101240050 = "Yay! Swimsuit!"
10124-101240060 = "What...?"
10124-101240070 = "Ah, I see. There's a large misunderstanding here."
10124-101240080 = "This is not a leisurely vacation. We are going for official Justice Task Force work."
10124-101240090 = "Ah, my apologies..."
10124-101240100 = "What a shame..."
10124-101240110 = "...I should have given you proper context."
10124-101240120 = "When will you be free? I will come visit whenever is best for you."
10124-101240130 = "Sensei."
10124-101240140 = "Although I was lacking in preparation today..."
10124-101240150 = "Next week will be different."
10124-101240160 = "Um, sure. Do your best."
10124-101240170 = "I'm still confused, but good luck."
10124-101240180 = "Yes."
10124-101240190 = "I promise I will not disappoint you."
10124-101240200 = "Finally, the day has come."
10124-101240210 = "Hasumi?"
10124-101240220 = "A week."
10124-101240230 = "In correlation to life itself, it's nothing."
10124-101240240 = "But this was truly the longest week I've ever experienced."
10124-101240250 = "I, Hanekawa Hasumi, am prepared."
10124-101240260 = "I'm ready for anything, at a moment's notice."
10124-101240270 = "I'll be there soon."
10124-101240280 = "...? O-Okay."
10124-101240290 = "Sensei."
10124-101240300 = "Thank you for coming shopping with me today."
10124-101240310 = "Are you sure you're okay...?"
10124-101240320 = "I am."
10124-101240330 = "There's ample time until we leave for the beach."
10124-101240340 = "Don't push yourself too hard..."
10124-101240350 = "Stay strong..."
10124-101240360 = "Thank you."
10124-101240370 = "I'll show you the full extent of what I'm capable of. "
10124-101240380 = "You're too serious..."
10124-101240390 = "Please don't go to your full extent..."
10124-101240400 = "I will see you at the beach, Sensei."
10124-101240410 = "We've finally made it."
10124-101240420 = "And my swimsuit fits as well."
10124-101240430 = "Good work, Hasumi."
10124-101240440 = "Incredible... Incredible work!"
10124-101240450 = "Yes. It was very..."
10124-101240460 = "I didn't snack during work hours"
10124-101240470 = "I refrained from dessert"
10124-101240480 = "I even passed on the roll cake that the Tea Party sent as thanks for my hard work"
10124-101240490 = "And when the food truck owner I helped during my patrol gifted me a limited-edition Miracle 5000 Cake, which I've never had the honor of trying before, I still abstained."
10124-101240500 = "H-Hasumi...?"
10124-101240510 = "Deep breaths! Deep breaths!"
10124-101240520 = "My apologies."
10124-101240530 = "I got carried away."
10124-101240540 = "Truly, thank you for today."
10124-101240550 = "I keep embarrassing myself in front of you."
10124-101240560 = "Health always comes first!"
10124-101240570 = "No more excessive dieting!"
10124-101240580 = "Yes. I'll keep that in mind."
10124-101240590 = "Sensei."
10124-101240600 = "As you requested, I'm sending you a MomoTalk while I have some free time."
10124-101240610 = "Can we meet at the beach for a little bit?"
10124-101240620 = "Perfect timing! Let's meet out front!"
10124-101240630 = "Yes?"
10124-101240640 = "Understood."
10124-101240650 = "I'll head down right now."
10124-101240660 = "Sensei."
10124-101240670 = "Thank you. This summer will truly be unforgettable."
10124-101240680 = "That's great!"
10124-101240690 = "I had fun too!"
10124-101240700 = "Yes. I've never enjoyed summer like this before."
10124-101240710 = "From the beginning to the end, I really relished every moment."
10124-101240720 = "The fireworks at the end were pretty."
10124-101240730 = "The fireworks...?"
10124-101240740 = "Ah."
10124-101240750 = "Yes. Fireworks. They were very pretty."
10124-101240760 = "I can still see them quite vividly in my head."

[translation]
16012-160120010 = "คุณครู วันนี้ยุ่งรึเปล่า?"
16012-160120020 = "ถ้างานไม่ยุ่งมาก ช่วยออกมาที่ที่ฉัน\nทำงานพิเศษอยู่หน่อยได้มั้ย?"
16012-160120030 = "ที่ไหนนะ...\nร้าน <ลูวาโซ บลู> ใช่มั้ย?"
16012-160120040 = "ใช่แล้ว จำแม่นดีจัง"
16012-160120050 = "ฉันมีบางอย่างอยากให้คุณครูดูน่ะ"
16012-160120060 = "ฉันจะรออยู่ที่ร้านนะ!"
16012-160120070 = "คุณครู คุณครู!"
16012-160120080 = "ได้เงินค่าทำงานพาร์ทไทม์แล้วละ!"
16012-160120090 = "ดีใจด้วยนะ ถือเป็นค่าตอบแทน\nความพยายามของจุนโกะไง"
16012-160120100 = "เพราะงั้น..."
16012-160120110 = "คราวนี้ถึงตาฉันตอบแทนคุณครูบ้างแล้วละ!"
16012-160120120 = "หมายความว่าไงน่ะ?"
16012-160120130 = "ไว้ชีวิตครูด้วยเถอะ!"
16012-160120140 = "ฮุฮุ คอยดูเถอะ"
16012-160120150 = "ฉันไม่ได้จะทำอะไรแปลกๆ สักหน่อย?!"
16012-160120160 = "ถ้าอยากรู้ว่าฉันจะทำอะไร"
16012-160120170 = "เย็นนี้ก็ออกมาที่งานเทศกาลสิ"
16012-160120180 = "ต้องมานะ!"
16012-160120190 = "วันหยุดยาว..."
16012-160120200 = "จบแล้ว"
16012-160120210 = "มันจบสิ้นแล้ว..."
16012-160120220 = "ใจเย็นๆ นะจุนโกะ วันหยุดยาวน่ะ\nมันถึงวันพรุ่งนี้ต่างหากล่ะ"
16012-160120230 = "เรื่องนั้นฉันรู้น่า!"
16012-160120240 = "แต่ว่าในใจฉันน่ะ วันหยุดมันหมด\nไปแล้ว! ไม่มีอีกแล้ว!"
16012-160120250 = "มันจะมีประโยชน์อะไร ในเมื่อฉันไม่รู้สึก\nถึงความพิเศษของวันหยุดอีกแล้ว?"
16012-160120260 = "จะปล่อยให้วันหยุดแสนสำคัญของฉัน\nผ่านไปแบบนี้ได้ยังไง!"

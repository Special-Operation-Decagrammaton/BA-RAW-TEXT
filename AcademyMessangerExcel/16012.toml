[translation]
16012-160120010 = "老師，你今天忙嗎？"
16012-160120020 = "有時間的話，要不要來我打工的地方一趟？"
16012-160120030 = "我記得……是「L'Oiseau Bleu」嗎？"
16012-160120040 = "沒錯沒錯。話說，虧你還記得呢"
16012-160120050 = "有個東西想讓老師看看"
16012-160120060 = "我等你，一定要來哦！"
16012-160120070 = "老師，老師！"
16012-160120080 = "我收到打工的薪水了！"
16012-160120090 = "因為淳子很努力呀"
16012-160120100 = "也對！所以說……"
16012-160120110 = "現在是回禮時間唷！"
16012-160120120 = "……什麼意思？"
16012-160120130 = "請，請留小的一命……"
16012-160120140 = "呵呵，等著看吧"
16012-160120150 = "別說那種奇怪的話！"
16012-160120160 = "總之"
16012-160120170 = "傍晚來慶典大街一趟吧"
16012-160120180 = "一定要唷！"
16012-160120190 = "連假"
16012-160120200 = "結束了"
16012-160120210 = "都結束了……"
16012-160120220 = "冷，冷靜點，淳子。連假明天才結束唷"
16012-160120230 = "我知道啦！"
16012-160120240 = "但是我心中的連假已經死了！已經不在了！"
16012-160120250 = "沒有在我的背上或胸膛和我一起活下去！"
16012-160120260 = "不過儘管如此，也不能就這麼結束！"

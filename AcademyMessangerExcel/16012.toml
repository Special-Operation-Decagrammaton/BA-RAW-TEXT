[translation]
16012-160120010 = "선생님, 오늘 바빠?"
16012-160120020 = "너무 바쁘지 않다면 내가 아르바이트하는 곳에 와 볼래?"
16012-160120030 = "어디였더라…… <르와조 블뢰>였던가?"
16012-160120040 = "맞아. 잘 기억하고 있네."
16012-160120050 = "조금, 보여 주고 싶은 게 생겼거든."
16012-160120060 = "기다리고 있을 테니까!"
16012-160120070 = "선생님, 선생님!"
16012-160120080 = "아르바이트비를 받았어!"
16012-160120090 = "축하해. 준코가 노력한 대가야."
16012-160120100 = "그래서 말인데"
16012-160120110 = "되갚아 줄 거야!"
16012-160120120 = "……그건 또 무슨 소리야?"
16012-160120130 = "목숨만은 살려주세요!"
16012-160120140 = "후훗. 두고 보라고."
16012-160120150 = "이상한 짓 하려는 거 아니거든?!"
16012-160120160 = "내가 뭘 하려는지 궁금하다면"
16012-160120170 = "오늘 저녁 시간에 맞춰 축제 거리로 찾아와."
16012-160120180 = "꼭이야!"
16012-160120190 = "연휴가"
16012-160120200 = "끝났어"
16012-160120210 = "끝나버렸어"
16012-160120220 = "진정해 준코. 연휴는 일단 내일까지야."
16012-160120230 = "그 정도는 알아!"
16012-160120240 = "하지만 내 마음속에서 연휴는 이미 죽었어! 더는 없어!"
16012-160120250 = "내 등에, 이 가슴에, 하나가 되어 함께 살아가지도 않아!"
16012-160120260 = "남은 연휴를 이대로 보낼 순 없다고!"

[translation]
20049-200490010 = "모래."
20049-200490020 = "물."
20049-200490030 = "파라솔."
20049-200490040 = "미사키?"
20049-200490050 = "몇 시간째 똑같은 것만 보고 있어."
20049-200490060 = "이게 뭐가 재밌다는 건지."
20049-200490070 = "요컨대……."
20049-200490080 = "심심하다는 거지?"
20049-200490090 = "그게 왜 그렇게 되는데?"
20049-200490100 = "피곤해."
20049-200490110 = "물에서 움직이는 게 이렇게 힘들 줄은 몰랐어."
20049-200490120 = "그래도 보람 있지 않아? 조금은 수영할 줄 알게 되었잖아?"
20049-200490130 = "물장구친 기억밖에 없다고."
20049-200490140 = "다음에 물에 들어갈 일이 생기면 다른 방법을 찾아보겠어."
20049-200490150 = "튜브 쪽이 마음에 들었던 거야?"
20049-200490160 = "……."
20049-200490170 = "아니거든."
20049-200490180 = "또 해변에 혼자 남았어."
20049-200490190 = "아"
20049-200490200 = "수영은 안 할 거니까 권유하지 마."
20049-200490210 = "해변을 즐기는 데는 여러 가지 방법이 있지."
20049-200490220 = "예를 들면…… 해변의 모래를 이용한 놀이라든가."
20049-200490230 = "모래 장난이라도 하라는 거야?"
20049-200490240 = "애도 아니고."
20049-200490250 = "해 보면 생각이 달라질걸?"
20049-200490260 = "다른 건 그나마 견디겠는데,"
20049-200490270 = "햇빛만큼은 익숙해지지 않아."
20049-200490280 = "하지만 여름의 햇빛이야말로 해변을 즐기는 방법!"
20049-200490290 = "……"
20049-200490300 = "또 무슨 일을 시키려고."
20049-200490310 = "같이 일광욕하는 건 어때?"
20049-200490320 = "사양할게."
20049-200490330 = "그럼 해변으로 갈게."
20049-200490340 = "……내 문자 받은 거 맞지?"
20049-200490350 = "결국 오후 내내 흐린 날씨였잖아."
20049-200490360 = "이게 무슨 일광욕이야?"
20049-200490370 = "으음, 그건 예상외의 사태……."
20049-200490380 = "그럴 줄 알았어."
20049-200490390 = "결국 아무것도 없었던 하루네, 오늘은."
20049-200490400 = "……."
20049-200490410 = "선생님이랑 이야기한 거 빼고는."

[translation]
20049-200490010 = "ทราย"
20049-200490020 = "น้ำ"
20049-200490030 = "ร่มกันแดด"
20049-200490040 = "มิซากิ?"
20049-200490050 = "ฉันดูเรื่องเดียวกันมาหลายชั่วโมงแล้ว"
20049-200490060 = "มันมีอะไรสนุกกันนะ"
20049-200490070 = "สรุปสั้นๆ ได้ว่าเบื่อสินะ..."
20049-200490080 = "กำลังเบื่ออยู่สินะ?"
20049-200490090 = "ทำไมถึงคิดแบบนั้นล่ะ?"
20049-200490100 = "เหนื่อยจัง"
20049-200490110 = "ไม่คิดเลยว่าการเคลื่อนไหวในน้ำจะ\nยากแบบนี้"
20049-200490120 = "แต่มันก็น่าภูมิใจไม่ใช่เหรอ?\nตอนนี้ก็ว่ายน้ำเป็นนิดหน่อยแล้วนี่"
20049-200490130 = "ฉันจำได้แค่ว่าลงไปเล่นน้ำ\nอย่างเดียวเลย"
20049-200490140 = "คราวหน้าถ้าจะต้องลงน้ำอีก\nฉันจะลองหาวิธีอื่นดู"
20049-200490150 = "ชอบห่วงยางมากกว่าสินะ?"
20049-200490160 = "......"
20049-200490170 = "เปล่าสักหน่อย"
20049-200490180 = "ฉันถูกทิ้งให้อยู่ที่หาดคนเดียวอีกแล้ว"
20049-200490190 = "อ่า"
20049-200490200 = "ฉันจะไม่ไปว่ายน้ำเด็ดขาด\nเพราะงั้นไม่ต้องเสนอมาหรอก"
20049-200490210 = "วิธีเล่นสนุกที่ชายหาดมีตั้งหลายวิธีนะ"
20049-200490220 = "อย่างเช่น... เล่นทรายบนชายหาด"
20049-200490230 = "นี่บอกให้ฉันไปเล่นทรายเหรอ?"
20049-200490240 = "ฉันไม่ใช่เด็กสักหน่อย"
20049-200490250 = "ถ้าได้ลองแล้วอาจจะ\nเปลี่ยนความคิดก็ได้นะ"
20049-200490260 = "เรื่องอื่นฉันก็พอทนได้อยู่หรอก"
20049-200490270 = "แต่ฉันไม่ชินกับแดดเลย"
20049-200490280 = "แต่แดดฤดูร้อนนี่แหละทำให้\nสนุกกับชายหาดได้ดีที่สุดเลย!"
20049-200490290 = "......"
20049-200490300 = "คิดจะสั่งให้ทำอะไรอีก"
20049-200490310 = "มาอาบแดดด้วยกันมั้ย?"
20049-200490320 = "ขอปฏิเสธ"
20049-200490330 = "งั้นครูจะไปที่หาดเอง"
20049-200490340 = "เห็นข้อความฉันแล้วใช่มั้ย?"
20049-200490350 = "สุดท้ายก็แดดร่มตลอดทั้งบ่ายเลยนะ"
20049-200490360 = "แบบนี้มันอาบแดดแบบไหนกัน?"
20049-200490370 = "อืม มันเป็นสถานการณ์ที่คาดไม่ถึง\nนี่นา..."
20049-200490380 = "คิดแล้วว่าต้องพูดแบบนี้"
20049-200490390 = "สุดท้ายวันนี้ก็ไม่ได้ทำอะไรเลย"
20049-200490400 = "......"
20049-200490410 = "นอกจากคุยกับคุณครู"

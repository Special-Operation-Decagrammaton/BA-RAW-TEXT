[translation]
20049-200490010 = "沙"
20049-200490020 = "水"
20049-200490030 = "陽傘"
20049-200490040 = "美咲？"
20049-200490050 = "我已經看著同樣的東西好幾個小時了"
20049-200490060 = "到底有什麼好看的"
20049-200490070 = "所以總而言之……"
20049-200490080 = "是覺得無聊對吧？"
20049-200490090 = "為什麼會這樣解讀？"
20049-200490100 = "好累"
20049-200490110 = "沒想到在水裡活動會這麼累"
20049-200490120 = "不過還是有點收穫吧？\n至少稍微比較會游泳了"
20049-200490130 = "我只記得自己在踢水而已"
20049-200490140 = "下次如果還要下水的話，我會找別的方法"
20049-200490150 = "你是喜歡泳圈吧？"
20049-200490160 = "……"
20049-200490170 = "才不是"
20049-200490180 = "我又一個人待在海灘了"
20049-200490190 = "啊"
20049-200490200 = "我不會去游泳的，所以不用勸我了"
20049-200490210 = "享受海灘的方法還有很多"
20049-200490220 = "比如……玩沙之類的"
20049-200490230 = "要我玩沙子？"
20049-200490240 = "我又不是小孩"
20049-200490250 = "試過之後說不定會改變想法哦"
20049-200490260 = "其他部分還能忍耐"
20049-200490270 = "但我還是無法習慣陽光"
20049-200490280 = "夏天的陽光才是享受海灘的最佳方式！"
20049-200490290 = "……"
20049-200490300 = "你又想叫我做什麼？"
20049-200490310 = "要不要一起做日光浴？"
20049-200490320 = "我拒絕"
20049-200490330 = "那我去海灘找你哦"
20049-200490340 = "……你有在看我的訊息嗎？"
20049-200490350 = "結果整個下午都是陰天"
20049-200490360 = "這能算是日光浴嗎？"
20049-200490370 = "唔嗯，這倒是在意料之外……"
20049-200490380 = "我就知道"
20049-200490390 = "結果今天什麼都沒得到呢"
20049-200490400 = "……"
20049-200490410 = "除了跟老師聊了幾句之外"

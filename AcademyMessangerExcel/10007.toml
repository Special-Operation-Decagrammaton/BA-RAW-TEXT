[translation]
10007-577 = "선생님, 미안한데…… 잠깐 시간 괜찮아?"
10007-578 = "괜찮아."
10007-579 = "무슨 일인데?"
10007-580 = "그게, 나 좀 데리러 와주지 않을래?"
10007-581 = "여기서 나가려면 신원보증인이 필요하다고 하는데, 학생회에 연락하기는 좀 그래서."
10007-582 = "내가 지금 어디에 있냐면…… 파출소야."
10007-583 = "파출소?!"
10007-584 = "오늘은 도와줘서 고마워, 선생님."
10007-585 = "하마터면 밀레니엄 학생회에 끌려가서 이중으로 잔소리를 들을 뻔했지 뭐야."
10007-586 = "그러니까 앞으로는 시내에서 말썽은 부리지 마."
10007-587 = "응, 앞으로는 공공장소에 그래피티를 하지 않도록 조심할게……"
10007-588 = "대신 약속한 대로 다음번에는 같이 커다란 캔버스에 함께 그림을 그리는 거야!"
10007-589 = "약속이야, 약속!"
10007-590 = "응, 약속할게."
10007-591 = "오늘도 고생 많았어, 선생님. 조심해서 들어가~!"
10007-592 = "마키도 수고했어."
10007-593 = "선생님은 오늘 방과 후에 무슨 특별한 일정이라도 있어?"
10007-594 = "나는 오늘 방과 후에 블랙마켓……"
10007-595 = "아니, 남구 쪽에 볼일이 있어서 먼저 가볼게!"
10007-596 = "……블랙마켓?"
10007-597 = "우으, 아쉬워라……. 사람들에게 BOOM의 매력을 전파할 좋은 기회였는데."
10007-598 = "그런 행동은 민폐라니까……."
10007-599 = "알겠어. 선생님이 안 된다면 어쩔 수 없지……."
10007-600 = "그나저나 선생님, BOOM 직접 해 본 적 있어?"
10007-601 = "아니, 없는데."
10007-602 = "그럼 다음번에 선생님 핸드폰에도 깔아줄 테니까, 같이 스피드런 도전하자!"
10007-603 = "내가 3분 이내로 클리어할 수 있도록 옆에서 같이 도와줄게!"
10007-604 = "그 도전에 무슨 특별한 의미라도 있는 거야……?"
10007-605 = "선생님, 이번 쪽지 시험 문제 봤어?"
10007-606 = "말도 안 되게 어려웠다고!"
10007-607 = "그러니까 평소부터 예습, 복습을 철저히 했어야지."
10007-608 = "혹시 예고한 시험 범위 밖에서 문제가 나왔어?"
10007-609 = "윽, 정론이긴 하지만……."
10007-610 = "아니, 그런 건 아니지만……."
10007-611 = "어쨌든! 이대로 가다가는 보충 수업을 받게 되어버려~"
10007-612 = "선생님, 나 좀 도와줘~"
10007-613 = "공부 가르쳐줘서 고마워, 선생님."
10007-614 = "선생님에 기대에 부응할 수 있도록 다음 시험에서는 꼭 만점을 받아올게!"
10007-615 = "기대하고 있을게."
10007-616 = "…그런데 선생님,"
10007-617 = "노트 뒷면에 있는 쿨링 오프 기간에 대한 설명은 어느 시험에 나오는 거야?"
10007-618 = "우선 마키 양은 시험 범위에 대한 이해부터 다시 하도록 합시다."
10007-619 = "선생님! 얼마 전에 치른 재시험에서 만점을 받았어!"
10007-620 = "후후, 선생님이 저번에 가르쳐 준 특별 수업 덕분이야."
10007-621 = "축하해. 마키도 공부하느라 수고 많았어."
10007-622 = "나 잘했지? 더 칭찬해 줘, 더~!"
10007-623 = "그럼 시험공부를 하느라 수고한 마키를 위해 시내에서 아이스크림을 사줄게."
10007-624 = "정말? 약속한 거다, 선생님!"
10007-625 = "이 메시지, 캡처해두었으니까 나중에 무르기 없기야!"
10007-626 = "쓰레기 치우는 거 도와줘서 고마워, 선생님."
10007-627 = "……그리고 몰래 낙서한 것도 모른 척해줘서 고마워."
10007-628 = "이번에는 좋은 일을 하려고 했던 거니까."
10007-629 = "우으…… 그래도 경찰 아저씨에게 걸려서 혼나면 어쩌지?"
10007-630 = "그때는 선생님이 꼭 경찰에게 잘 말해줘야 해. 꼭이야!"
10007-631 = "선생님, 좋은 소식이 있어!"
10007-632 = "이 메시지를 보면 바로 전의 그래피티를 그렸던 회벽 앞으로 와 줘."
10007-633 = "무슨 일인데?"
10007-634 = "그건 와 보면 바로 알 수 있어!"
10007-635 = "참, 옷은 더러워져도 괜찮은 옷으로 입고 와야 해!"
10007-636 = "……?"
10007-637 = "후후, 오늘은 선생님이랑 같이 그래피티를 그릴 수 있어서 정말 즐거웠어."
10007-638 = "나도 정말 즐거웠어."
10007-639 = "내가 그림을 너무 못 그려서 벽 주인이 싫어하지 않을까?"
10007-640 = "하하, 뭐야. 아직도 그 말을 신경 쓰고 있었던 거야?"
10007-641 = "걱정하지 마. 그래피티는 각자의 개성을 표현하는 예술이니까."
10007-642 = "선생님이 그린 벽화는 선생님의 개성을 충분히 잘 표현하고 있었어."
10007-643 = "다음에도 또 이런 기회가 있었으면 좋겠네~"

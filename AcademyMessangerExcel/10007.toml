[translation]
10007-577 = "老師，抱歉……可以耽誤一點時間嗎？"
10007-578 = "沒問題唷"
10007-579 = "怎麼了？"
10007-580 = "那個……能來接我嗎？"
10007-581 = "說是需要身份保證人，但不太好聯絡學生會……"
10007-582 = "地點是那個，這個……派出所"
10007-583 = "派出所！？"
10007-584 = "今天謝謝你來，老師"
10007-585 = "聯絡學生會的話，又要被唸一頓"
10007-586 = "從今以後要注意唷"
10007-587 = "嗯。盡量不在公共場所塗鴉……"
10007-588 = "按照今天約定好的，下次要一起在大畫布上作畫喔！"
10007-589 = "約好囉！"
10007-590 = "嗯，約好了"
10007-591 = "今天也辛苦了，老師。回去小心唷～！"
10007-592 = "真紀也辛苦了"
10007-593 = "老師今天放學後有什麼事嗎？"
10007-594 = "我要去黑"
10007-595 = "呀，南區那邊有事要辦，先回去囉～"
10007-596 = "……黑市？"
10007-597 = "太可惜了……明明是向更多人傳達毀滅狂戰士魅力的機會"
10007-598 = "給別人添麻煩的做法是不行的……"
10007-599 = "唔，老師說不行的話就沒辦法了……"
10007-600 = "話說回來，老師有玩過毀滅狂戰士嗎？"
10007-601 = "不，沒有"
10007-602 = "下次我幫你下載，一起「Speedrun」吧！"
10007-603 = "直到能在3分鐘內過關之前，我會在旁邊幫你的！"
10007-604 = "照你的說法，難不成想跨過3分鐘的門檻是相當困難的嗎……？"
10007-605 = "老師有從別人那裡聽說這次的小考嗎？"
10007-606 = "難到難以置信！"
10007-607 = "平時不好好預習跟複習是不行的唷"
10007-608 = "難道是出了考試範圍外的題目嗎？"
10007-609 = "唔，正確的言論……"
10007-610 = "不，不是那樣的……"
10007-611 = "總之！這樣下去就得去補課了～！"
10007-612 = "老師，幫幫我～！"
10007-613 = "謝謝你教我念書，老師"
10007-614 = "為了回應老師的期待，下次考試會拿滿分的！"
10007-615 = "嗯，我很期待"
10007-616 = "啊，還有一個問題"
10007-617 = "筆記本最後的鑑賞期說明，是所有科目的考試都會出嗎？"
10007-618 = "真紀，稍微冷靜一下吧"
10007-619 = "老師！上次的考試，拿到滿分唷！"
10007-620 = "呵呵，多虧了老師上次教我念書！"
10007-621 = "恭喜，真紀也努力念書了呢"
10007-622 = "很了不起吧？再多稱讚一點～！"
10007-623 = "那就去市區給努力的真紀買支冰淇淋吧"
10007-624 = "真的嗎！？約好了唷，老師！"
10007-625 = "已經截圖下來了，之後不能假裝不知道唷！"
10007-626 = "謝謝你幫忙清理垃圾，老師"
10007-627 = "還有，放我一馬。謝啦"
10007-628 = "這次是出於善意才做的吧？"
10007-629 = "嗯！啊……但是，如果被警察發現並被責罵的話怎麼辦……"
10007-630 = "到時候老師要說「不是這樣的」！絕對要喔！"
10007-631 = "老師，好消息！"
10007-632 = "看到這條訊息的話，可以來之前塗鴉的牆壁嗎？"
10007-633 = "怎麼了？"
10007-634 = "來了就知道了！"
10007-635 = "啊，要穿弄髒了也沒關係的衣服唷！"
10007-636 = "……？"
10007-637 = "呵呵，能跟老師一起塗鴉很開心！"
10007-638 = "我也很開心"
10007-639 = "我畫的太差了，如果牆壁的主人不喜歡的話怎麼辦……"
10007-640 = "啊哈哈，還是很在意嗎？"
10007-641 = "不用擔心，塗鴉是表現個性的藝術"
10007-642 = "老師畫的畫也充分展現了老師的個性"
10007-643 = "希望有一天還有這種機會"

[translation]
10007-577 = "Sensei, I'm sorry...but do you have a minute?"
10007-578 = "Sure."
10007-579 = "What's up?"
10007-580 = "Um, can you come pick me up?"
10007-581 = "They said I need a guarantor to get out of here, but I don't want to contact the Student Council."
10007-582 = "Right now, I'm...at a police station."
10007-583 = "A police station?!"
10007-584 = "Thank you for your help today, Sensei."
10007-585 = "I thought I was gonna get dragged into the Millennium Student Council."
10007-586 = "Don't go causing any more trouble in the city."
10007-587 = "Okay. From now on, I won't tag in public..."
10007-588 = "Next time, we'll paint on a canvas. Together!"
10007-589 = "Promise me! Do you promise?"
10007-590 = "Okay, promise."
10007-591 = "You worked hard today, Sensei. Goodbye!"
10007-592 = "You did a lot today."
10007-593 = "Sensei, do you have any plans after school today?"
10007-594 = "I was gonna go to the Black Market after school..."
10007-595 = "No, I mean, I have something to do in the South District, so I gotta go!"
10007-596 = "The Black Market?"
10007-597 = "Ugh, that's too bad... This was a great opportunity to share the charm of BOOM with people."
10007-598 = "That would have been a real inconvenience...for everyone else."
10007-599 = "Okay, if you say so..."
10007-600 = "By the way, Sensei. Have you ever played BOOM before?"
10007-601 = "No, I haven't."
10007-602 = "Then I'll install it on your phone. Let's do a speedrun together!"
10007-603 = "I can help you clear it in less than three minutes!"
10007-604 = "Is there any particular reason for this challenge?"
10007-605 = "Sensei, did you see that quiz?"
10007-606 = "It was so hard!"
10007-607 = "That means you should've studied and prepared more thoroughly."
10007-608 = "Were the questions not what you expected for the test?"
10007-609 = "Ugh, you got me, but..."
10007-610 = "I mean, no, but..."
10007-611 = "Well, I'm gonna need to take make-up classes as this rate!"
10007-612 = "Please help me, Sensei!"
10007-613 = "Thanks for helping me study, Sensei. "
10007-614 = "I'll definitely get a perfect score on my next test! I'll live up to your expectations!"
10007-615 = "I'm looking forward to it."
10007-616 = "...By the way, Sensei."
10007-617 = "The explanation for the cooling-off period on the back of the notes... Which test is that for?"
10007-618 = "Maki, let's start by examining the scope of the test again."
10007-619 = "Sensei! I got a perfect score on the make-up test!"
10007-620 = "Heehee. I couldn't have done it without your special lesson."
10007-621 = "Congratulations. You worked really hard."
10007-622 = "Didn't I do great? Tell me I did a great job! Come on!"
10007-623 = "I'll take you into the city for some ice cream, since you worked so hard for the test."
10007-624 = "Really? You promise, Sensei?"
10007-625 = "I took a screenshot of this message, so you can't cancel on me!"
10007-626 = "Thank you for helping clean up the trash, Sensei."
10007-627 = "...Also, thank you for pretending not to know about the graffiti."
10007-628 = "You were trying to do something good this time."
10007-629 = "Ugh... Still, what if that cop finds out and I get in trouble?"
10007-630 = "If that happens, please talk to the cop for me, okay?"
10007-631 = "Sensei, I have good news!"
10007-632 = "When you see this message, come to the wall that I tagged before."
10007-633 = "What's up?"
10007-634 = "You'll know when you get there!"
10007-635 = "Oh, and be sure to wear something that you don't mind getting dirty!"
10007-636 = "...?"
10007-637 = "Heehee, I had so much fun tagging with you today, Sensei."
10007-638 = "I had a lot of fun too."
10007-639 = "Do you think the owner of the wall will hate my art? It's not too sloppy, is it?"
10007-640 = "Haha, what? Are you still worried about that?"
10007-641 = "Don't worry about that. Graffiti is an art that expresses individuality."
10007-642 = "I thought your mural expressed your personality quite well."
10007-643 = "I hope I get another opportunity like this soon!"

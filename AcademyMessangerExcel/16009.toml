[translation]
16009-160090010 = "도-모 선생=공. 소생, 미치루라 하오"
16009-160090020 = "저기… 미치루? 갑자기 왜 그래?"
16009-160090030 = "이건 우리 같은 닌자 덕후들 사이에서 대대로 통용되는 전통의 인사!"
16009-160090040 = "이걸 받아주지 않는다니 그러고도 선생 공이 나와 같은 닌자 덕후 동지…. <닌자 메이트>를 자처할 수 있겠어?"
16009-160090050 = "아니, 그런 걸 자처했던 기억은 없는데…."
16009-160090060 = "크윽…! 그, 그렇게 말하니 왠지 분한걸…!"
16009-160090070 = "뭐야, 선생 공…. 설마 잊은 거야?!"
16009-160090080 = "야심한 밤……. 달밤 아래에서 나와 함께 단둘이서 앰부쉬를 했던 추억을!"
16009-160090090 = "아, 참고로 앰부쉬란 수풀 속에서 은밀히 행동한다는 뜻의 닌자 은어니까. 기억해두라고!"
16009-160090100 = "그런 굉장한 추억 없거든?! 앰부쉬라니, 뭐냐고!"
16009-160090110 = "뭐, 사소한 건 됐고~"
16009-160090120 = "그렇다고 너무 실망하지 마! 선생 공은 보기 드문 닌자의 재능을 가진 사람이니까."
16009-160090130 = "장래성이 있어! 인법연구부의 부장인 내가 보증해주도록 하지!"
16009-160090140 = "그, 고, 고마워…?"
16009-160090150 = "우냐핫! 별말씀을!"
16009-160090160 = "그래서 미치루, 무슨 일로 연락을…."
16009-160090170 = "아! 이러는 사이 열차 시간에 늦겠어!"
16009-160090180 = "아, 그럼 이만! 물러나 보겠소이다! 선생 공! 또다시 만날 날을 기다리며 아디오스=SAYONARA!"
16009-160090190 = "(퍼퍼버버벙!!) <- 연막탄을 터트리는 소리"
16009-160090200 = "…어?! 효과음까지 설명해주는 거야…?!"
16009-160090210 = "음, 그러니까, 아디오스=SAYONARA!"
16009-160090220 = "오늘 오후, 샬레를 방문하겠다. – 닌자M"
16009-160090230 = "아니, 방문 예고를 그런 식으로 해도 말이지…."
16009-160090240 = "그보다 그거, 닌자가 아니라 괴도의 방식이잖아…."
16009-160090250 = "에이~ 세세한 건 신경 쓰지 말라고~!"
16009-160090260 = "게다가 괴도라면 대충 닌자의 후예 같은 거니까. 괜찮아!"
16009-160090270 = "닌자 만능론인가?!"
16009-160090280 = "우냐핫! 예고는 했소! 그러니 선생 공! 목을 씻고 기다리고 계시오!"
16009-160090290 = "조만간 소생이 찾아뵙겠소이다!"
16009-160090300 = "(퍼퍼버버벙!!) <- 연막탄을 터트린 소리"
16009-160090310 = "(샤샤샤샥!) <- 재빠르게 물러나는 소리"
16009-160090320 = "…저기, 뭔가 더 늘지 않았어?"
16009-160090330 = "선생 공도 알다시피 난 인법연구부의 부장이잖아?"
16009-160090340 = "응, 그렇지."
16009-160090350 = "비공인 동아리인데, <부장>이라고 불러도 되는 걸까?"
16009-160090360 = "우냐악! 쓸데없이 한 마디가 더 많잖아! 당연히 되지!"
16009-160090370 = "이래 봬도 평소에 잔뜩 노력하고 있다구! 닌자 공부라거나, 콘텐츠 제작이라거나"
16009-160090380 = "이렇게 하다 보면 언젠가 키보토스의 모두에게 닌자를 널리 알리고, 인법연구부가 정식 동아리로 인정받게 될 날도 올 거라고 믿으니까!"
16009-160090390 = "응, 미치루가 노력하는 건 잘 알고 있어. 언제나 응원할게."
16009-160090400 = "우햐햣! 고마워, 선생 공! 언제나 선생 공의 응원은 내게 큰 힘이 돼"
16009-160090410 = "그렇게 생각해준다면야 나도 고맙…."
16009-160090420 = "그냥 하는 말이 아니라, 정말, 엄청나게 큰 힘이 되고 있어"
16009-160090430 = "얼마나 큰 힘이 됐냐면, 방금 선생 공이 해준 말 덕분에 망설임이 싹 가셨으니까!"
16009-160090440 = "…응?"
16009-160090450 = "노력하는데 투자를 아껴선 안 되겠지?"
16009-160090460 = "단골 가게에 새로운 닌자 굿즈가 입고됐대."
16009-160090470 = "아, 아니! 인법 도구가…!"
16009-160090480 = "좀 비싸서 고민했는데, 선생 공 말을 듣고 결심했어!"
16009-160090490 = "응! 어디까지나 미래를 위한 투자로써 말이지!"
16009-160090500 = "어딜 봐도 욕망으로 가득하잖아…."
16009-160090510 = "우냐핫! 그럼 기다리고 있을게! 선생 공!"
16009-160090520 = "(휘리리릭! 파바바바밧!) <- 엄청나게 멋지게 달려가는 소리"
16009-160090530 = "으, 으응…. 알았어."
16009-160090540 = "맞다. 선생 공. 혹시 샬레의 사무실에 그게 있는지 찾아봐 줄 수 있어?"
16009-160090550 = "그거라니? 뭘 말이야?"
16009-160090560 = "그러니까 그거. 내가 자주 보는 만화책- <카마보코 돌풍전> 19권 말이야"
16009-160090570 = "부실에서 아무리 찾아봐도 보이지 않길래. 짚이는 곳이 거기뿐이더라고"
16009-160090580 = "어느새 샬레에 그런 물건을?!"
16009-160090590 = "응…? 그야 우리 부실. 일단은 임시고. 언제 백화요란 녀석들이 들이닥칠지 모르고"
16009-160090600 = "음양부 녀석들도 매번 시끄럽게 들쑤시고 있으니까"
16009-160090610 = "나의 닌자 두뇌를 써서 생각해 본 결과-"
16009-160090620 = "굿즈는 샬레에 보관한다. 응. 그게 합리적이란 결론을 내렸지"
16009-160090630 = "샬레는 창고가 아닙니다. 미치루 양…."
16009-160090640 = "아! 심심하면 선생 공도 봐도 되니까! 추천하거든! 카마보코 시리즈!"
16009-160090650 = "그리고 말 나온 김에 전해두는 건데. 오늘 밤엔 공원에서 집합이니까. 까먹지 마?"
16009-160090660 = "그럼 기다리고 있겠소이다! 선생 공!"
16009-160090670 = "화제 전환 빠르구만!"
16009-160090680 = "그건 좋은데, 오늘 밤엔 뭘 하려고…?"
16009-160090690 = "(파바바바바바밧!!!) <- 신발 끈 묶는 소리"
16009-160090700 = "이젠 닌자의 행동조차 아니지 않아…?!"
16009-160090710 = "…선생 공, 어제 그거 때문인 건지."
16009-160090720 = "소생……. 감기에 걸려버렸소이다…."
16009-160090730 = "…알았어. 가서 죽 만들어줄 테니까."
16009-160090740 = "그… 으응, 고, 고마워. 선생 공."
16009-160090750 = "기, 기다리고 있겠습니다아…."

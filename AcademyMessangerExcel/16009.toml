[translation]
16009-160090010 = "โด-โมะ ท่าน=อาจารย์ ข้าน้อย มิจิรุ!"
16009-160090020 = "คือว่า...มิจิรุ? จู่ๆ มีอะไรเหรอ?"
16009-160090030 = "นี่เป็นวิธีทักทายแบบดั้งเดิมที่ใช้กันมาใน\nหมู่โอตาคุนินจาอย่างพวกเราน่ะ!"
16009-160090040 = "ถึงจะไม่ยอมรับออกมาก็เถอะ แต่ท่าน\nอาจารย์ก็เป็นโอตาคุนินจาเหมือนกับข้า\nน้อย คงเรียกว่า <คู่หูนินจา> ได้สินะ?"
16009-160090050 = "เดี๋ยวสิ ครูยังไม่ได้ตกลงสักหน่อย..."
16009-160090060 = "อึ่ก...! ได้ยินแบบนั้นชักหงุดหงิดนิดๆ แฮะ..."
16009-160090070 = "อะไรกัน ท่านอาจารย์... หรือว่าลืมไปแล้ว\nเหรอ?! "
16009-160090080 = "ในกลางดึกคืนหนึ่ง ความทรงจำที่เราไป\nซุ่มโจมตีภายใต้แสงจันทร์ด้วยกัน"
16009-160090090 = "อ๋อ ขยายความคำว่าซุ่มโจมตี คือการซุ่ม\nโจมตีในพุ่มไม้แบบลับๆ ตามแบบฉบับของ\nนินจานะ จำไว้ด้วยล่ะ!"
16009-160090100 = "ครูไม่เคยจำเรื่องนั้นได้เลยซุ่มโจมตีอะไรกัน?!"
16009-160090110 = "โธ่เอ๊ย ช่างเรื่องเล็กน้อยนั่นเถอะ~"
16009-160090120 = "แต่ไม่ต้องผิดหวังไปหรอกนะ!\nท่านอาจารย์มีพรสวรรค์การเป็นนินจา\nมากกว่าที่คิดอีกนะ"
16009-160090130 = "อนาคตไกลเลยล่ะ! ในฐานะชมรมวิจัย\nศาสตร์นินจาข้าน้อยรับรองได้!"
16009-160090140 = "ขะ...ขอบใจนะ...?"
16009-160090150 = "อุวะฮะฮะ! ไม่ต้องขอบคุณหรอก!  "
16009-160090160 = "ถ้างั้นมิจิรุ ที่ติดต่อมามีเรื่องอะไรเหรอ..."
16009-160090170 = "อ๊ะ ข้าน้อยไปขึ้นรถไฟสายแน่ๆ!"
16009-160090180 = "ขอตัวก่อนนะ! ข้าน้อยไปแล้วนะ!\nท่านอาจารย์! ข้าน้อยจะรอวันที่เราได้พบ\nกันใหม่! อาดิโอส = ซาโยนาระ!"
16009-160090190 = "(ปังปังปังปัง!!) <- เสียงยิงระเบิดควัน"
16009-160090200 = "โห?! มีเอฟเฟกต์แถมมาด้วย...?!"
16009-160090210 = "อื้อ ถ้างั้นก็..\nอาดิโอสสสส = ซาโยนาระ!"
16009-160090220 = "วันนี้ตอนบ่ายจะไปเยือนที่ชาเล่ต์ - นินจา M"
16009-160090230 = "เดี๋ยวสิ มาบอกก่อนแบบนี้ก็ได้เหรอ..."
16009-160090240 = "แล้วอีกอย่างนั่นมันไม่ใช่วิธีของนินจา\nแต่เป็นจอมโจรต่างหาก"
16009-160090250 = "โธ่เอ๊ย~ เรื่องหยุมหยิมแบบนั้น อย่าไป\nใส่ใจเลยน่า~!"
16009-160090260 = "อีกอย่างพวกจอมโจรก็เป็นผู้สืบเชื้อสาย\nของนินจาเหมือนกันไม่เป็นไรหรอก"
16009-160090270 = "ทฤษฎีนินจาครอบจักรวาลเรอะ?!"
16009-160090280 = "อุวะฮะฮะ! ข้าน้อยส่งมาบอกล่วงหน้าแล้ว!\nเพราะงั้นท่านอาจารย์ ตั้งตารอได้เลย!"
16009-160090290 = "ข้าน้อยจะไปพบนายท่านแล้ว!"
16009-160090300 = "(ปังปังปังปัง!!) <- เสียงยิงระเบิดควัน"
16009-160090310 = "(ฉึบๆๆๆ) <- เสียงการวิ่งอย่างรวดเร็ว"
16009-160090320 = "ดูมีอะไรเพิ่มขึ้นรึเปล่านะ...?"
16009-160090330 = "ท่านอาจารย์ก็รู้ดีว่าข้าน้อยเป็นหัวหน้า\nชมรมวิจัยศาสตร์นินจาใช่ไหมล่ะ?"
16009-160090340 = "อื้ม รู้สิ"
16009-160090350 = "ชมรมไม่เป็นทางการ\nเรียกว่า <หัวหน้า> ได้เหรอ?"
16009-160090360 = "เฮือก! พูดอะไรบาดใจข้าน้อยอีกแล้ว!\nต้องเรียกได้สิ!"
16009-160090370 = "เห็นแบบนี้ข้าน้อยก็พยายามมากเลยนะ\nทั้งศึกษาเรื่องนินจา ทั้งตัดต่อ\nคอนเทนต์วิดีโอ..."
16009-160090380 = "ถ้าทำแบบนี้ต่อไปสักวันจะต้องทำให้\nชาวคิโวทอสรู้เรื่องของนินจาได้มากขึ้น\nและวันที่จะได้รับการยอมรับว่าเป็นชมรม\nอย่างเป็นทางการคงมาถึง!"
16009-160090390 = "อื้อ ครูรู้ดีว่ามิจิรุกำลังพยายาม\nครูเป็นกำลังใจให้เสมอนะ"
16009-160090400 = "อุฮะฮะฮะ! ขอบคุณนะ ท่านอาจารย์!\nกำลังใจของท่านอาจารย์เป็นยาชั้นดี\nสำหรับข้าน้อยเสมอ"
16009-160090410 = "ขอบใจนะที่คิดแบบนั้นน่ะ..."
16009-160090420 = "ข้าน้อยไม่ได้พูดส่งๆ นะ มันเป็นกำลัง\nใจให้ข้าน้อยมากจริงๆ"
16009-160090430 = "ถ้าให้เห็นภาพละก็... คำพูดของท่าน\nอาจารย์เมื่อกี้ทำให้ข้าน้อยไม่ลังเลอีกแล้ว!"
16009-160090440 = "หืม...?"
16009-160090450 = "จะมามัวเสียดายที่จะต้องลงทุนกับการ\nฝึกฝนไม่ได้สินะ?"
16009-160090460 = "ได้ยินว่ามีสินค้านินจาใหม่ๆ มาที่ร้านที่\nข้าน้อยไปประจำด้วย"
16009-160090470 = "มะ... ไม่สิ อุปกรณ์นินจาต่างหาก...!"
16009-160090480 = "ราคามันค่อนข้างสูงจนคิดอยู่นาน\nแต่พอได้ยินที่ท่านอาจารย์พูด ข้าน้อยก็\nตัดสินใจได้!"
16009-160090490 = "อื้ม! นับเป็นการลงทุนเพื่ออนาคต!"
16009-160090500 = "อยากได้ไปซะทุกอย่างเลยสินะ..."
16009-160090510 = "อะฮะฮะฮ่า! ถ้างั้นข้าน้อยจะรอนะ\nท่านอาจารย์!"
16009-160090520 = "(ฟึ่บๆๆ ฉับๆๆๆ) <- เสียงวิ่งอย่างสง่างาม"
16009-160090530 = "อะ...อื้อ เข้าใจแล้ว"
16009-160090540 = "จริงด้วยท่านอาจารย์ช่วยดูให้หน่อยได้มั้ย\nว่าที่ชาเล่ต์มีไอ้นั่นรึเปล่า?"
16009-160090550 = "\"ไอ้นั่น\" เหรอ? หมายถึงอะไรล่ะ?"
16009-160090560 = "คือว่า... มังงะที่ข้าน้อยอ่านบ่อยๆ\n<คามาโบโกะ ภาควายุสลาตัน> เล่ม 19 น่ะ"
16009-160090570 = "ข้าน้อยลองหาที่ห้องทำงานแล้วแต่ไม่เจอ\nแต่ข้าน้อยก็เอาไปแค่ที่นั่นเอง"
16009-160090580 = "เอามังงะมาที่ชาเล่ต์ตั้งแต่เมื่อไรน่ะ?!"
16009-160090590 = "หืม? ก็ห้องของชมรมเราน่ะเป็นแค่ห้อง\nชั่วคราว ไม่รู้ว่าพวกเฮียกกะเรียวรันจะ\nบุกมาเมื่อไรด้วย"
16009-160090600 = "พวกชมรมหยินหยางเองก็ก่อเรื่องขึ้นอยู่\nทุกครั้งเลยด้วย"
16009-160090610 = "สมองนินจาอันชาญฉลาดของข้าน้อย\nได้ข้อสรุปว่า..."
16009-160090620 = "ให้เก็บของต่างๆ ไว้ที่ชาเล่ต์ ถือเป็นการ\nตัดสินใจที่สมเหตุสมผลที่สุดแล้ว"
16009-160090630 = "ชาเล่ต์ไม่ใช่ที่เก็บของนะ มิจิรุจัง..."
16009-160090640 = "อ้อ! ถ้าเกิดเบื่อๆ ท่านอาจารย์จะอ่านก็ได้นะ!\nข้าน้อยแนะนำเรื่องนี้เลย คามาโบโกะ\nซีรีส์!"
16009-160090650 = "ไหนๆ ก็พูดเรื่องนี้แล้ว คืนนี้มีนัดรวมตัว\nกันที่สวนนะ อย่าลืมล่ะ?"
16009-160090660 = "แล้วข้าน้อยจะรอนะ ท่านอาจารย์!"
16009-160090670 = "เปลี่ยนเรื่องคุยเร็วมาก! "
16009-160090680 = "เอางั้นก็ได้ แล้วคืนนี้จะทำอะไรล่ะ...?"
16009-160090690 = "(ฟึ่บๆๆๆ) <- เสียงผูกเชือกรองเท้า"
16009-160090700 = "ตอนนี้เหมือนนินจาเลยใช่มั้ย...?!"
16009-160090710 = "ท่านอาจารย์... คงเพราะเรื่องเมื่อวาน "
16009-160090720 = "ข้าน้อย... เป็นหวัดเสียแล้วล่ะ"
16009-160090730 = "เข้าใจแล้ว เดี๋ยวครูไปทำโจ๊กให้กินนะ"
16009-160090740 = "เอ่อ อื้อ... ขอบคุณนะท่านอาจารย์"
16009-160090750 = "งะ...งั้นข้าน้อยจะรอท่านอาจารย์นะ..."

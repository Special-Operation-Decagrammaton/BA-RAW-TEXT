[translation]
16009-160090010 = "參見～老師大人……小生，名喚三千留"
16009-160090020 = "這是……？"
16009-160090030 = "哼哼……這個呀～這是我們忍者迷之間代代相傳的傳統問候語！"
16009-160090040 = "而你沒辦法做出回覆，代表同樣身為忍者迷……同樣身為「忍者好夥伴」，老師大人還不成熟呢！"
16009-160090050 = "忍者好夥伴……？"
16009-160090060 = "呃！莫名覺得很不甘心……！"
16009-160090070 = "老，老師大人……你該不會忘了吧？！"
16009-160090080 = "夜深人靜萬籟俱寂……在月夜下和我一起埋伏的回憶！"
16009-160090090 = "啊，順帶一提，埋伏是指「在樹叢裡隱密行動」的忍者術語給我記住！"
16009-160090100 = "我怎麼不記得有這件事……？"
16009-160090110 = "小細節就別管了～"
16009-160090120 = "沒事，不用太失望！老師大人確實擁有忍者的才華"
16009-160090130 = "我身為忍術研究部部長，我能為你的成長掛保證！"
16009-160090140 = "那個……謝謝……？"
16009-160090150 = "唔哈哈！免禮！"
16009-160090160 = "所以，三千留今天是有什麼事呢？"
16009-160090170 = "糟糕，列車時間快到了！"
16009-160090180 = "那麼老師大人！我們後會有期，Adios=SAYONARA！"
16009-160090190 = "（砰！！）←引爆煙霧彈的音效"
16009-160090200 = "竟然還特地說明是音效……！？"
16009-160090210 = "嗯……Adios=SAYONARA！"
16009-160090220 = "今日午後，我將造訪夏萊──忍者M"
16009-160090230 = "預告信……！？"
16009-160090240 = "這行為不是忍者，而是怪盜吧……？"
16009-160090250 = "別在乎那些小細節！"
16009-160090260 = "而且怪盜大致上也跟忍者差不多，不要緊！"
16009-160090270 = "話是這麼說的嗎？！"
16009-160090280 = "反正我預告過了，老師大人！把脖子洗乾淨等著吧！"
16009-160090290 = "相信我們很快就會相遇！"
16009-160090300 = "（砰！！）←引爆煙霧彈的音效"
16009-160090310 = "（沙沙沙沙！）←迅速離去的聲音"
16009-160090320 = "……謝謝你總是這麼細心"
16009-160090330 = "我是忍術研究部的部長，對吧？"
16009-160090340 = "是啊"
16009-160090350 = "話說你們是非公認社團，叫你「部長」沒問題嗎？"
16009-160090360 = "咕喔！少說一句會怎樣！有什麼關係！"
16009-160090370 = "我們平常也有在好好活動啊！像是忍者修行，拍攝影片！"
16009-160090380 = "只要我們繼續努力，總有一天可以讓整個奇普托斯都知道忍者的存在，而忍術研究部成為正式社團的一天也會來臨！"
16009-160090390 = "嗯，我知道三千留很努力，我支持你"
16009-160090400 = "謝謝你，老師大人！聽到你這麼說，我又能努力下去了"
16009-160090410 = "那就好"
16009-160090420 = "你的這番話讓我力量都來了……"
16009-160090430 = "這下，我不會再迷惘了！"
16009-160090440 = "……嗯？"
16009-160090450 = "為了努力，果然要放膽投資才行"
16009-160090460 = "聽說我常去的店裡，進了新的忍者周邊"
16009-160090470 = "啊，不對！是忍具……！"
16009-160090480 = "原本我還在煩惱價錢有點高，但是聽了老師的話，我下定決心了！"
16009-160090490 = "沒錯！這些都是為了忍術研究部的未來所做的投資！"
16009-160090500 = "你確定不是單純自己想要嗎……？"
16009-160090510 = "那我們就在老地方碰面囉，老師大人！"
16009-160090520 = "（刷刷！咻啪啪啪啪！）←非常帥氣地後空翻奔跑的聲音"
16009-160090530 = "好，好喔……"
16009-160090540 = "對了老師，夏萊有沒有那個啊？"
16009-160090550 = "那個……？"
16009-160090560 = "《魚板旋風傳》第19集！"
16009-160090570 = "我看部室裡沒有，能想到的就只有夏萊了"
16009-160090580 = "你什麼時候把東西放過來的……"
16009-160090590 = "那是因為，我們的部室，終究只是暫借的……百花繚亂那些人不知道什麼時候會闖進來……"
16009-160090600 = "然後也不知道陰陽部什麼時候會過來……"
16009-160090610 = "於是我就用我的忍者腦袋思考……"
16009-160090620 = "決定把周邊保管在夏萊，會是比較合理的結論"
16009-160090630 = "夏萊可不是倉庫呀，三千留小姐……"
16009-160090640 = "老師大人想看當然也可以，《魚板》系列非常好看！"
16009-160090650 = "嗯對了，今晚公園集合唷"
16009-160090660 = "我等著，老師大人！"
16009-160090670 = "話題還是老樣子轉真快！"
16009-160090680 = "可以是可以，但今晚要做什麼？"
16009-160090690 = "（啪沙沙沙沙沙沙）←綁鞋帶的聲音"
16009-160090700 = "甚至已經不是和忍者有關的行動了……！？"
16009-160090710 = "老師大人，大概是因為昨天的那件事……"
16009-160090720 = "在下感冒了……"
16009-160090730 = "我去幫你煮粥……"
16009-160090740 = "謝謝，老師大人……"
16009-160090750 = "那，我等你……"

[translation]
10010-720 = "炒蛋，牛奶500ml，番茄3片→早餐"
10010-721 = "明天早上慢跑後順路去超市"
10010-722 = "……？"
10010-723 = "白子？"
10010-724 = "啊"
10010-725 = "明明是寫給自己的備忘卻搞錯了，老師抱歉"
10010-726 = "取代備忘錄？"
10010-727 = "沒想到MomoTalk還能這樣用呢"
10010-728 = "嗯……畢竟經常使用，很方便"
10010-729 = "不過，倒是沒怎麼見過會這麼使用的人"
10010-730 = "啊，這麼說來，剛剛發送的內容"
10010-731 = "就像我寫的那樣，明天早上要去超市買東西"
10010-732 = "可以的話，一起去如何？"
10010-733 = "嗯，我很樂意"
10010-734 = "我也正好有想買的東西"
10010-735 = "那麼，在那裡見吧"
10010-736 = "15km對一些人來說是很辛苦的距離呢"
10010-737 = "抱歉……下次會再留意點"
10010-738 = "老師"
10010-739 = "今天，我在上學的路上看到了耳廓狐"
10010-740 = "耳廓狐，很稀奇呢"
10010-741 = "野生的耳廓狐嗎"
10010-742 = "嗯。最近好像經常出現在那一帶"
10010-743 = "然後，昨天晚上還看到了流星雨"
10010-744 = "跑步的時候能看到各式各樣的東西"
10010-745 = "跑步不僅僅只是跑步，還能從中獲得這種樂趣"
10010-746 = "很好呀。雖然不能和你一起跑，但我支持你"
10010-747 = "……嗯"
10010-748 = "抱歉。我還不習慣別人對我說那麼溫柔的話"
10010-749 = "那個"
10010-750 = "謝謝你，老師"
10010-751 = "老師，今天的事，那個……"
10010-752 = "真的很抱歉，我神經大條……"
10010-753 = "應該更早注意到的，抱歉"
10010-754 = "啊……"
10010-755 = "嗯，那個……"
10010-756 = "不是那樣的，我才該感到抱歉……"
10010-757 = "那個，那就先這樣吧……"
10010-758 = "今天謝謝了，那就再見"
10010-759 = "老師"
10010-760 = "喜歡自行車嗎？"
10010-761 = "普通程度的喜歡，但也太突然！？"
10010-762 = "自行車啊……還行……"
10010-763 = "嗯，這樣啊"
10010-764 = "我挺喜歡的"
10010-765 = "最近好像新開了間自行車店，一起去吧？"
10010-766 = "那個，今天很開心"
10010-767 = "看到了無線變速器和新的車架"
10010-768 = "還買到了騎乘用水壺，不過……"
10010-769 = "那個，老師。下次能再一起去嗎？"
10010-770 = "嗯。我也開始有點興趣了"
10010-771 = "我也玩得很開心，務必讓我去"
10010-772 = "夏萊所在的D.U.有很多條地鐵通過呢"
10010-773 = "老師也經常使用嗎？"
10010-774 = "嗯，從夏萊移動時經常搭乘"
10010-775 = "嗯，地鐵是社會人士不可或缺的移動方式"
10010-776 = "也是呢，謝謝……我會列入參考的"
10010-777 = "……列入參考？"
10010-778 = "準備的東西：雙筒望遠鏡、監視器位置數據、GPS追蹤電波干擾器"
10010-779 = "檢查動線。需要確保360度的視野"
10010-780 = "！？"
10010-781 = "那個，白子？"
10010-782 = "啊"
10010-783 = "抱歉，老師，又發錯了"
10010-784 = "也許是因為被登錄為我的最愛的聊天視窗中，老師的位在最上面"
10010-785 = "剛才的訊息別在意"
10010-786 = "老師，我在家又想了一下，襲擊其他學園怎麼樣？"
10010-787 = "……那個"
10010-788 = "……抱歉，請當作沒看到"
10010-789 = "老師"
10010-790 = "今天啊，那個……"
10010-791 = "啊，正好"
10010-792 = "我有話要和白子說"
10010-793 = "……嗯？"
10010-794 = "對我？"
10010-795 = "老師嗎？"
10010-796 = "嗯，很重要的事"
10010-797 = "希望能單獨談談"
10010-798 = "……嗯"
10010-799 = "知道了"
10010-800 = "那放學後，我在教室等著"
10010-801 = "老師"
10010-802 = "我可能，在說很奇怪的話"
10010-803 = "不過今後，如果你認為我在做什麼不好的事"
10010-804 = "到時候，希望你能對我生氣，吧"
10010-805 = "有個關心我的大人在"
10010-806 = "那個，該怎麼說呢……"
10010-807 = "我覺得，很高興"
10010-100100010 = "老師"
10010-100100020 = "你最近也是搭平時那班地鐵嗎？"
10010-100100030 = "畢竟除了地鐵之外也沒什麼選擇……"
10010-100100040 = "因為我沒有騎自行車過去的體力……"
10010-100100050 = "嗯"
10010-100100060 = "我知道了"
10010-100100070 = "那麼，再連絡唷"
10010-100100080 = "白子……？"

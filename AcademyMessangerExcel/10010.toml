[translation]
10010-720 = "스크램블 에그, 우유 500ml, 토마토 3조각. < 아침 식사."
10010-721 = "내일 아침 러닝 후 슈퍼에 들러서 필요한 것 살 것."
10010-722 = "……응?"
10010-723 = "시로코?"
10010-724 = "아."
10010-725 = "나한테 보내는 메모인데 잘못 보냈어. 미안 선생님."
10010-726 = "메모장 대신이야!?"
10010-727 = "모모톡을 메모용으로 쓰다니……."
10010-728 = "음……. 이상한가."
10010-729 = "편해서 그러고는 있는데……."
10010-730 = "아, 그러고 보니"
10010-731 = "내일 아침 슈퍼에 들려서 물건을 사려고 했는데"
10010-732 = "음. 괜찮으면 같이 슈퍼에 가지 않을래?"
10010-733 = "슈퍼? 그래."
10010-734 = "알았어. 가볍게 장이나 볼까."
10010-735 = "응. 기다리고 있을게."
10010-736 = "15km가 가볍게 달릴 만한 거리가 아니라는 얘기를 들었어……."
10010-737 = "음…… 미안. 다음부터는 좀 더 신경 쓸게."
10010-738 = "선생님."
10010-739 = "오늘 등교 중에 사막여우를 봤어."
10010-740 = "사막여우라니 신기하네."
10010-741 = "야생동물인가."
10010-742 = "응. 최근에 가끔 보이는 것 같아."
10010-743 = "어제 새벽에는 유성우 같은 것도 봤어."
10010-744 = "러닝하다보면 이런저런 걸 보게 되니까."
10010-745 = "그건 즐거운 거 같아."
10010-746 = "같이 달리진 못하지만 응원할게."
10010-747 = "……응."
10010-748 = "응원. 받는 거 익숙지가 않아서."
10010-749 = "그러니까."
10010-750 = "고마워. 선생님."
10010-751 = "선생님, 오늘 일 말인데……."
10010-752 = "미안. 내가 섬세하지 못했어."
10010-753 = "신경 썼어야 하는데. 미안해."
10010-754 = "아……."
10010-755 = "으, 으응……."
10010-756 = "미안하다니, 내가 사과해야 할 일인데."
10010-757 = "음……."
10010-758 = "고마워. 다음에 봐."
10010-759 = "선생님."
10010-760 = "자전거 좋아해?"
10010-761 = "갑자기 자전거?!"
10010-762 = "글쎄…… 어떠려나……."
10010-763 = "음."
10010-764 = "나는 좋아하거든."
10010-765 = "최근 다른 마을에 자전거 샵이 생겼다고 하는데, 같이 가보지 않을래?"
10010-766 = "음. 오늘 즐거웠어, 선생님."
10010-767 = "무선 변속기 뿐만 아니라 새로운 카본 프레임도 구경할 수 있었고."
10010-768 = "라이딩용 물통도 새로 샀으니……."
10010-769 = "음. 다음에도 같이 가 줄래?"
10010-770 = "응. 나도 흥미가 생겼어. 자전거."
10010-771 = "잘 모르는 영역이지만 나도 재미있었어."
10010-772 = "샬레가 있는 D.U.에는 지하철이 있지?"
10010-773 = "음. 그럼 선생님은 지하철도 자주 타겠네?"
10010-774 = "응. 샬레 근방으로 이동할 땐 자주 타니까."
10010-775 = "직장인의 출퇴근은 역시 지하철이지."
10010-776 = "음…… 고마워. 참고할게."
10010-777 = "……응?"
10010-778 = "준비물: 쌍안경. CCTV의 위치. 그리고 GPS 추적 방해 전파 기기."
10010-779 = "동선 체크할 것. 360도 시야 확보 필요."
10010-780 = "………?!"
10010-781 = "저기요……? 시로코 씨?"
10010-782 = "아."
10010-783 = "미안 선생님. 또 잘못 보냈어."
10010-784 = "자주 실수하네. 선생님을 메신저 최상단에 즐겨찾기 해둬서 그런가 봐."
10010-785 = "음. 문자는 신경 쓰지 마."
10010-786 = "선생님, 집에 가서 생각해봤는데 다른 학원을 터는 건 어떨까?"
10010-787 = "음."
10010-788 = "……미안. 이상한 소리였어."
10010-789 = "선생님."
10010-790 = "오늘."
10010-791 = "할말이 있어. 시로코."
10010-792 = "잘됐네. 나도 얘기할 게 있어."
10010-793 = "……응?"
10010-794 = "나한테?"
10010-795 = "선생님이?"
10010-796 = "중요한 일이야."
10010-797 = "둘이서 보자."
10010-798 = "아."
10010-799 = "음……. 알았어."
10010-800 = "그럼 방과 후에 교실에서 기다리고 있을게."
10010-801 = "선생님."
10010-802 = "이상한 얘기겠지만."
10010-803 = "앞으로도 혼낼 일이 있으면"
10010-804 = "얘기를 해줘."
10010-805 = "……신경 써주는 어른이 있다는 건"
10010-806 = "뭐랄까."
10010-807 = "……기쁜 일이네."
10010-100100010 = "선생님."
10010-100100020 = "선생님은 계속 지하철을 타는 거지?"
10010-100100030 = "그렇다고 할까, 지하철밖에는 탈 수 있는 게 없지……"
10010-100100040 = "어른은 자전거를 타고 출퇴근하기엔 너무 연약하단다……"
10010-100100050 = "음."
10010-100100060 = "알겠어."
10010-100100070 = "그럼 다음에 또."
10010-100100080 = "시로코……?"

[translation]
10010-720 = "อาหารเช้า: ไข่กวน, นม 500 มล. มะเขือ\nเทศ 3 ชิ้น"
10010-721 = "พรุ่งนี้เช้าวิ่งเสร็จแล้วต้องไปซื้อของจำ\nเป็นที่ซูเปอร์"
10010-722 = "หืม...?"
10010-723 = "ชิโรโกะ? "
10010-724 = "อ้าว"
10010-725 = "นั่นมันข้อความที่ฉันจะส่งให้ตัวเองน่ะ\nส่งผิดไปแฮะ.. ขอโทษนะคุณครู"
10010-726 = "ปกติเตือนตัวเองแบบนี้เหรอ?"
10010-727 = "ใช้ MOMOTALK คุยกับตัวเองเหรอเนี่ย?"
10010-728 = "อืม... แปลกเหรอ? "
10010-729 = "ฉันว่ามันก็สะดวกดีนะ..."
10010-730 = "อ้อ จริงสิ!"
10010-731 = "พรุ่งนี้เช้าฉันจะไปซื้อของในซูเปอร์"
10010-732 = "อืม ถ้ามีเวลาก็ไปด้วยกันไหม?"
10010-733 = "ซูเปอร์เหรอ? ได้สิ"
10010-734 = "ได้เลย ไปซื้ออะไรหน่อยก็ดี "
10010-735 = "อื้ม แล้วฉันจะรอนะ"
10010-736 = "มีคนบอกว่าวิ่ง 15 ก.ม. ไม่ใช่\nการวิ่งเบาๆ แล้วน่ะ... "
10010-737 = "ขอโทษนะ ต่อไปฉันจะระวังกว่านี้"
10010-738 = "คุณครู"
10010-739 = "วันนี้ตอนมาโรงเรียนฉันเห็นจิ้งจอกทะเล\nทรายด้วยล่ะ"
10010-740 = "จิ้งจอกทะเลทรายเหรอ? แปลกจัง"
10010-741 = "สัตว์ป่างั้นเหรอ?"
10010-742 = "อื้ม ช่วงนี้มันชอบมาโผล่แถวนี้น่ะ"
10010-743 = "เมื่อคืนฉันเห็นอะไรคล้ายๆ ฝนดาวตกด้วย"
10010-744 = "พอได้ออกไปวิ่งก็ได้เห็นอะไรแปลกๆ\nเยอะเลย"
10010-745 = "แบบนี้ก็สนุกดีเหมือนกันนะ"
10010-746 = "ถึงครูจะไปวิ่งด้วยไม่ได้ แต่ก็...\nเป็นกำลังใจให้นะ"
10010-747 = "อืม..."
10010-748 = "ฉันไม่ชินเวลาใครมาให้กำลังใจแบบนี้"
10010-749 = "แต่ก็"
10010-750 = "ขอบคุณนะ คุณครู"
10010-751 = "เรื่องที่เกิดขึ้นวันนี้น่ะ"
10010-752 = "ขอโทษนะ ครูสะเพร่าเองน่ะ"
10010-753 = "ขอโทษที่ไม่ได้ระวังให้ดีนะ"
10010-754 = "อ่า....."
10010-755 = "อื้ม......"
10010-756 = "จะขอโทษทำไมล่ะ ฉันต่างหากที่ต้อง\nขอโทษ "
10010-757 = "อืม... "
10010-758 = "ขอบคุณนะ ไว้เจอกันใหม่"
10010-759 = "คุณครู "
10010-760 = "ชอบจักรยานไหม?"
10010-761 = "ทำไมจู่ๆ ถึงถามล่ะ?!"
10010-762 = "ไม่รู้สิ... ชอบไหมนะ?"
10010-763 = "อืม "
10010-764 = "ฉันชอบจักรยานน่ะ"
10010-765 = "มีร้านจักรยานมาเปิดใหม่ในเมือง\nด้วย ไปดูด้วยกันไหม?"
10010-766 = "วันนี้สนุกมากเลย"
10010-767 = "ได้ดูทั้งจักรยานเกียร์ไร้สาย แล้วก็จักรยาน\nคาร์บอนด้วย!"
10010-768 = "แถมยังได้ซื้อขวดน้ำที่ใช้ตอนปั่นจักรยาน\nมาอีก"
10010-769 = "อืม... ไว้ไปด้วยกันใหม่อีกนะ"
10010-770 = "ได้สิ ครูเองก็ชักจะสนใจจักรยาน\nขึ้นมาแล้ว"
10010-771 = "ครูไม่ค่อยรู้เรื่องนี้ แต่วันนี้ก็สนุกมากเลย"
10010-772 = "ใน D.U. มีรถไฟใต้ดินใช่ไหม?"
10010-773 = "อืม... ถ้างั้นคุณครูก็คงนั่งรถไฟใต้ดินบ่อย\nแน่เลย"
10010-774 = "ใช่ ครูนั่งบ่อยเวลาจะไปแถวๆ ชาเล่ต์"
10010-775 = "พนักงานออฟฟิศนั่งรถไฟใต้ดินเป็น\nเรื่องธรรมดา ครูเองก็ด้วย"
10010-776 = "โอเค... ฉันจะจำเอาไว้"
10010-777 = "หืม...?"
10010-778 = "ต้องเตรียม: กล้องส่องทางไกล, ข้อมูลตำ\nแหน่งกล้องวงจรปิด, อุปกรณ์ปิดกั้นการ\nตาม GPS"
10010-779 = "เช็กระยะการเคลื่อนที่\nทัศนวิสัย 360 องศา"
10010-780 = "...?!"
10010-781 = "เดี๋ยวนะ... ชิโรโกะ?"
10010-782 = "อ้าว"
10010-783 = "ขอโทษนะคุณครู ส่งผิดอีกแล้ว"
10010-784 = "ส่งผิดอยู่เรื่อยเลย เพราะฉันปักหมุดแชต\nของคุณครูไว้น่ะ ก็เลยชอบกดไปโดน"
10010-785 = "อืม... ไม่ต้องสนใจข้อความนั้นหรอก"
10010-786 = "ฉันกลับไปลองคิดดูแล้วล่ะ ฉันว่าจะ\nลองไปบุกโรงเรียนอื่นดู"
10010-787 = "อืม..."
10010-788 = "...ฉันพูดอะไรไร้สาระใช่ไหม ขอโทษนะ"
10010-789 = "คุณครู"
10010-790 = "วันนี้.."
10010-791 = "ครูมีบางอย่างจะบอกชิโรโกะพอดี"
10010-792 = "มาก็ดีเลย ครูเองก็มีเรื่องจะบอก\nเหมือนกัน"
10010-793 = "หืม...?"
10010-794 = "มีเรื่องอะไรจะบอกฉันงั้นเหรอ?"
10010-795 = "คุณครูเนี่ยนะ?"
10010-796 = "ใช่ เรื่องสำคัญน่ะ"
10010-797 = "มาเจอกันแค่สองคนดีกว่า"
10010-798 = "อ่า..."
10010-799 = "อืม... ได้สิ "
10010-800 = "ฉันจะรออยู่ที่ห้องเรียน หลังเลิก\nเรียนแล้วกัน"
10010-801 = "คุณครู"
10010-802 = "นี่อาจฟังไม่เข้าท่าเท่าไหร่"
10010-803 = "แต่ต่อไปถ้าฉันทำอะไรที่ไม่ดีละก็ "
10010-804 = "ช่วยบอกกันหน่อยนะ"
10010-805 = "ฉันชอบ..."
10010-806 = "เวลาที่มีผู้ใหญ่ "
10010-807 = "คอยเอาใจใส่น่ะ"
10010-100100010 = "คุณครู"
10010-100100020 = "คุณครูขึ้นรถไฟใต้ดินตลอดเลยใช่มั้ย?"
10010-100100030 = "จะว่างั้นก็ได้นะ เพราะก็นั่งได้แค่รถไฟ\nใต้ดินอย่างเดียวนี่นา..."
10010-100100040 = "ครูแก่แล้ว ปั่นจักรยาน\nไปทำงานไม่ไหวหรอก..."
10010-100100050 = "อืม"
10010-100100060 = "เข้าใจแล้ว"
10010-100100070 = "งั้นไว้เจอกันใหม่นะ"
10010-100100080 = "ชิโรโกะ...?"

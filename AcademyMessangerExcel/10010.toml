[translation]
10010-720 = "Scrambled eggs, 500ml of milk, 3 tomato slices <- Breakfast"
10010-721 = "Stop by the market after tomorrow's morning run to buy what I need."
10010-722 = "Huh?"
10010-723 = "Shiroko?"
10010-724 = "Oh."
10010-725 = "I meant to send that note to myself. Sorry, Sensei."
10010-726 = "Is it like a reminder?"
10010-727 = "It's kind of weird to use MomoTalk as a reminder..."
10010-728 = "Oh... Is it, really? "
10010-729 = "I've just been using it because it's easy..."
10010-730 = "Oh, by the way..."
10010-731 = "I was gonna stop by the market tomorrow morning for some shopping."
10010-732 = "Um, if you don't mind, why don't we go together?"
10010-733 = "The market? Okay."
10010-734 = "Sure. I can pick up a few things."
10010-735 = "Okay. I'll see you then."
10010-736 = "I was told that fifteen kilometers isn't a light run..."
10010-737 = "Um... Sorry. I'll take that into consideration next time."
10010-738 = "Sensei."
10010-739 = "I saw a fennec fox on the way to school today."
10010-740 = "A fennec fox? How interesting."
10010-741 = "Was it wild?"
10010-742 = "Yes. I've seen it around lately."
10010-743 = "Yesterday morning, I saw something like a meteor shower."
10010-744 = "I see a lot of different things when I run."
10010-745 = "I really enjoy it."
10010-746 = "I can't keep up with you, but I'll cheer for you."
10010-747 = "...Okay."
10010-748 = "I'm not used to having anyone cheering for me."
10010-749 = "So..."
10010-750 = "Thank you, Sensei."
10010-751 = "Sensei, about what happened today..."
10010-752 = "I'm sorry. I missed the details."
10010-753 = "I should have paid more attention. I'm sorry."
10010-754 = "Oh..."
10010-755 = "O-Okay..."
10010-756 = "You don't have to apologize. I'm the one who should be saying sorry. "
10010-757 = "Hmm... "
10010-758 = "Thank you. See you next time."
10010-759 = "Sensei. "
10010-760 = "Do you like bicycles?"
10010-761 = "Bicycles now?!"
10010-762 = "Hmm... I'm not sure..."
10010-763 = "Hmm. "
10010-764 = "I like them."
10010-765 = "I heard that a new bicycle shop has opened in the next town over. Do you wanna go check it out with me?"
10010-766 = "Um, I had fun today, Sensei."
10010-767 = "I got to see the wireless transmission and the new carbon frame."
10010-768 = "And I bought a new water bottle for biking..."
10010-769 = "Um, can we go together again next time?"
10010-770 = "Yeah. I'm kinda interested in bicycles now too."
10010-771 = "I didn't know much about them, but I had fun."
10010-772 = "There's a subway in D.U. where Schale is, right?"
10010-773 = "Hmm, I bet you use the subway a lot, then."
10010-774 = "Yes. I often use it when I travel near Schale."
10010-775 = "The subway is the best way to commute to and from work."
10010-776 = "Hmm. Thanks, I'll keep that in mind."
10010-777 = "Huh?"
10010-778 = "Supplies: Binoculars, CCTV locations, and GPS tracking jammers."
10010-779 = "Check the route. 360 degree field of view required."
10010-780 = "...?!"
10010-781 = "Excuse me... Shiroko?"
10010-782 = "Oh."
10010-783 = "Sorry, Sensei. That wasn't meant for you."
10010-784 = "I've done it again. I think it's because I bookmarked you at the top of the messenger."
10010-785 = "Um, don't worry about that text."
10010-786 = "Sensei, I've been thinking since I got home. What if I robbed another academy?"
10010-787 = "Hmm."
10010-788 = "...Sorry. I know that's nonsense."
10010-789 = "Sensei."
10010-790 = "Today."
10010-791 = "I have something to tell you, Shiroko."
10010-792 = "Good. I have something to tell you too."
10010-793 = "...Huh?"
10010-794 = "To me?"
10010-795 = "Really, Sensei?"
10010-796 = "It's important."
10010-797 = "I need to see you alone."
10010-798 = "Oh."
10010-799 = "Well... Okay. "
10010-800 = "I'll be in the classroom after school."
10010-801 = "Sensei."
10010-802 = "This is gonna sound weird."
10010-803 = "If you ever need to correct me in the future, "
10010-804 = "please do so."
10010-805 = "Having an adult who cares about me... "
10010-806 = "That's... "
10010-807 = "...kind of nice."
10010-100100010 = "Sensei."
10010-100100020 = "Do you still use the public transit?"
10010-100100030 = "Yeah. I don't have much of a choice..."
10010-100100040 = "I'm too old to be biking around everywhere..."
10010-100100050 = "Hmm."
10010-100100060 = "Understood."
10010-100100070 = "See you later."
10010-100100080 = "Shiroko...?"

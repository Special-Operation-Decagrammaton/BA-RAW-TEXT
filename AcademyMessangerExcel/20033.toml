[translation]
20033-200330010 = "時機似乎終於成熟了，夏萊的老師"
20033-200330020 = "……？"
20033-200330030 = "嘻嘻嘻，不必慌張"
20033-200330040 = "只是代表我的完美計畫已經準備就緒而已"
20033-200330050 = "以今天為起點，我羽沼真琴大人終於……"
20033-200330060 = "不，我們將一起踏出偉大的第一步"
20033-200330070 = "…………？"
20033-200330080 = "來吧，夏萊的老師"
20033-200330090 = "我今天會在萬魔殿等你，嘻嘻嘻"
20033-200330100 = "唔嗯，是要我到萬魔殿的意思吧……？我知道了"
20033-200330110 = "嘻嘻，你好啊。老師"
20033-200330120 = "你好呀，真琴"
20033-200330130 = "收到我的MomoTalk居然絲毫不動搖"
20033-200330140 = "果然是我認可的人，我很滿意"
20033-200330150 = "嗯……謝謝誇獎？"
20033-200330160 = "閒聊就先說到這裡，進入正題吧"
20033-200330170 = "今天之所以聯絡老師，為的就是"
20033-200330180 = "……嗯？已經到了嗎？"
20033-200330190 = "嗯？已經到了？"
20033-200330200 = "啊，沒什麼。我剛到夏萊了"
20033-200330210 = "嗯……？夏萊？現在？"
20033-200330220 = "嘻嘻嘻。我們直接碰面再談正題吧"
20033-200330230 = "等等，真琴！？"
20033-200330240 = "嘻嘻，嘰嘻嘻嘻嘻！！我果然厲害！"
20033-200330250 = "我成功找到上次說的製造商的販售店了！伊呂波！"
20033-200330260 = "果然，這再次證明我真琴大人沒有辦不到的事！"
20033-200330270 = "來！向偉大的我叩拜吧你這傢伙！"
20033-200330280 = "……抱歉，真琴。我不知道你突然在說什麼"
20033-200330290 = "嗯？"
20033-200330300 = "啊，哎呀"
20033-200330310 = "這意料淡定的反應也讓我有點驚訝"
20033-200330320 = "果然……是老師啊"
20033-200330330 = "本來要傳給伊呂波的MomoTalk傳錯人了"
20033-200330340 = "你們平常到底在傳什麼訊息……？"
20033-200330350 = "只是閒話家常而已"
20033-200330360 = "不過是我不對，我道歉"
20033-200330370 = "對了，老師這週末也放假嗎？"
20033-200330380 = "嘻嘻，祝老師週末愉快"
20033-200330390 = "呃，嗯。也祝真琴有個美好的週末……"
20033-200330400 = "時機似乎終於成熟了，老師"
20033-200330410 = "這難道是……既視感？"
20033-200330420 = "總覺得之前也看過一樣的訊息……"
20033-200330430 = "嘻嘻嘻，不必慌張"
20033-200330440 = "如果說上次只是單純介紹我剛起步的事業"
20033-200330450 = "那麼今天就是為了紀念事業即將大功告成"
20033-200330460 = "為了讓老師見證那一刻才聯絡你"
20033-200330470 = "原來已經到了這個時候了啊"
20033-200330480 = "所以今天有空嗎？"
20033-200330490 = "有是有啦……"
20033-200330500 = "嘻嘻嘻。好，那我馬上去接你！"

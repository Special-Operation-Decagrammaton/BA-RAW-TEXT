[translation]
20033-200330010 = "드디어 때가 무르익은 듯하군. 샬레의 선생."
20033-200330020 = "……?"
20033-200330030 = "크크큭. 당황할 거 없다."
20033-200330040 = "그저 내 완벽한 계획을 위한 모든 준비가 끝났다는 뜻이니까."
20033-200330050 = "오늘을 기점으로 마침내 나 하누마 마코토 님의……."
20033-200330060 = "아니, 우리들이 함께하는 위대한 첫걸음이 시작되는 거다!"
20033-200330070 = "…………?"
20033-200330080 = "자아, 샬레의 선생이여."
20033-200330090 = "그럼 오늘 만마전에서 기다리고 있겠다. 키키킥."
20033-200330100 = "으음, 만마전을 방문해달라는 이야기지……? 알았어."
20033-200330110 = "크큭. 안녕하신가. 선생."
20033-200330120 = "응, 안녕. 마코토. "
20033-200330130 = "이 마코토 님의 모모톡을 받고도 요만큼도 동요하지 않는 그 반응."
20033-200330140 = "과연, 그야말로 내가 인정한 자답군. 마음에 들어."
20033-200330150 = "어… 음, 고맙습니다…?"
20033-200330160 = "잡설은 이만하고 본론이다. "
20033-200330170 = "오늘 이렇게 선생에게 연락한 이유는 다름이 아니라."
20033-200330180 = "…음? 벌써 도착했나."
20033-200330190 = "어? 도착했다니?"
20033-200330200 = "아, 별거 아니다. 지금 막 샬레 앞에 도착했을 뿐이니까."
20033-200330210 = "응…? 샬레에? 지금?"
20033-200330220 = "키히히힛. 좋아, 그럼 본론은 직접 얼굴을 맞대고 이야기하도록 하지."
20033-200330230 = "저기, 잠깐. 저기요, 마코토?!"
20033-200330240 = "크크큭. 키싯. 키키키킷!! 역시 이 몸이로군!"
20033-200330250 = "저번에 말했던 메이커의 판매점을 찾는 데 성공해 냈다! 이로하!"
20033-200330260 = "역시 이 마코토 님에게 불가능 따윈 없단 것이 또 한 번 증명되고야 말았군!"
20033-200330270 = "자! 이 몸의 위대함에 넙죽 엎드려라! 요 녀석!"
20033-200330280 = "…어, 미안. 마코토. 갑자기 무슨 이야기인지 모르겠는데."
20033-200330290 = "으으음?"
20033-200330300 = "아. 이런. "
20033-200330310 = "예상과 다른 평범한 반응에 나도 모르게 깜짝 놀랐다만."
20033-200330320 = "과연… 선생이었나. "
20033-200330330 = "이로하에게 보낼 모모톡을 잘못 보냈군."
20033-200330340 = "…저기 평소에 둘이서 대체 무슨 모모톡을 주고받는 거야?"
20033-200330350 = "그냥 일상 회화를 나눌 뿐이다만?"
20033-200330360 = "어쨌거나 실수한 건 내 사과하지."
20033-200330370 = "그러고 보니 선생도 이번 주말은 휴일이었던가."
20033-200330380 = "크큭. 그럼 좋은 주말 보내도록."
20033-200330390 = "어, 응. 마코토도, 좋은 주말 보내…."
20033-200330400 = "드디어 때가 무르익은 듯하군. 선생이여."
20033-200330410 = "혹시 이건… 데자뷔…?"
20033-200330420 = "저번에도 같은 말을 본 적이 있는 듯한…."
20033-200330430 = "키시싯. 당황할 거 없다. 선생."
20033-200330440 = "저번엔 단순히 이 몸이 막 시작했던 사업을 소개하는 자리였다면."
20033-200330450 = "오늘은 바로 그 사업의 완성이 코앞에 다가온 기념으로"
20033-200330460 = "새롭게 선생에게 그것을 보여주고자 연락한 것이니까."
20033-200330470 = "벌써 시간이 그렇게 된 거구나."
20033-200330480 = "그래서 말이다만, 오늘 시간은 비어있나?"
20033-200330490 = "물론 시간이라면 있지만……."
20033-200330500 = "키히히힛. 좋다. 그럼 바로 데리러 가도록 하지!"

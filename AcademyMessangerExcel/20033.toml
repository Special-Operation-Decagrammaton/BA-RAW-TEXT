[translation]
20033-200330010 = "The time has come, Sensei of Schale."
20033-200330020 = "?"
20033-200330030 = "Kihehe. Don't be scared."
20033-200330040 = "The preparations of my master plan are complete."
20033-200330050 = "As of today, I, the Great Makoto..."
20033-200330060 = "No. WE shall take this first, great step together!"
20033-200330070 = "??"
20033-200330080 = "Now then, Sensei of Schale."
20033-200330090 = "I shall be waiting for you at the Pandemonium Society. Kihehe."
20033-200330100 = "Hm. So you want me to visit the Pandemonium Society? All right."
20033-200330110 = "Heh heh. How do you do, Sensei?"
20033-200330120 = "Oh. Hey, Makoto. "
20033-200330130 = "You are not shaken after receiving a MomoTalk from me, Makoto?"
20033-200330140 = "As expected from one of your stature. I approve."
20033-200330150 = "Uh... Err... Thank you?"
20033-200330160 = "Enough chatter. To the point. "
20033-200330170 = "The reason I reached out to you today is because"
20033-200330180 = "Wait. Where are you? I've arrived."
20033-200330190 = "You've arrived?"
20033-200330200 = "I just arrived in front of Schale."
20033-200330210 = "What? At Schale? Right now?"
20033-200330220 = "Kihehe. Now, let us have our discussion face to face."
20033-200330230 = "Now hold on. Excuse me? Makoto?!"
20033-200330240 = "Kihehe. Heh heh heh! As expected of the great Makoto!"
20033-200330250 = "I succeeded in finding that retailer I mentioned last time, Iroha!"
20033-200330260 = "Once again, I, the Great Makoto, have shown that nothing is impossible for me!"
20033-200330270 = "Bow, you rascal! Prostrate yourself before my greatness!"
20033-200330280 = "Uh, sorry, Makoto. I have no clue what you're talking about."
20033-200330290 = "Hmm?"
20033-200330300 = "Oh. You did not see anything you just read. "
20033-200330310 = "My machinations are incomprehensible to even the sharpest minds."
20033-200330320 = "That includes you, Sensei. "
20033-200330330 = "Only the likes of Iroha can handle such a message. So don't read it."
20033-200330340 = "Is that what you two usually talk about on MomoTalk?"
20033-200330350 = "Um, small talk?"
20033-200330360 = "Anyway, forget what you saw."
20033-200330370 = "Come to think of it, you were supposed to be off this weekend too."
20033-200330380 = "Heh. Have a great weekend, then."
20033-200330390 = "Uh, sure. You have a great weekend too, Makoto."
20033-200330400 = "The time has come, Sensei."
20033-200330410 = "Is this déjà vu?"
20033-200330420 = "I feel like I've seen this exact message before."
20033-200330430 = "Kihehe. No need to panic, Sensei."
20033-200330440 = "Last time, I was introducing you to my new enterprise."
20033-200330450 = "Today marks the near-completion of that particular project"
20033-200330460 = "and you shall be my witness, Sensei."
20033-200330470 = "I can't believe it's already been that long."
20033-200330480 = "When are you available?"
20033-200330490 = "I have some time, but..."
20033-200330500 = "Kihehe. Good. Then I'll head on over to pick you up!"

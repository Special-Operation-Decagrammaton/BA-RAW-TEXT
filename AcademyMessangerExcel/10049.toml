10049-100490450 = "선생님. 혹시 지금 바쁠까?"
10049-100490460 = "아니면 말고"
10049-100490470 = "선생님은 뭐 특별히 좋아하는 디저트라든가 있어? 지난번의 연장인데……."
10049-100490480 = "갑자기 취향 이야기?"

10049-100490510 = "???"
10049-100490520 = "글쎄? 상황 되면?"
10049-100490530 = "그냥 나중에라도……. 기껏 줬는데 좋아하지 않는 거면 아쉽잖아"
10049-100490540 = "음;;;;;"

[translation]
10049-100490010 = "สวัสดีค่ะ คุณครู เคียวยามะ คาซึสะค่ะ"
10049-100490020 = "อืม..."
10049-100490030 = "ตอนนี้ยุ่งอยู่หรือเปล่านะ? ถ้าสะดวก\nแล้วก็ค่อยตอบกลับมาก็ได้"
10049-100490040 = "จะรอนะคะ"
10049-100490050 = "พูดเพราะสุดๆ เลยน้า..."
10049-100490060 = "พูดสุภาพกับพูดธรรมดา\nสลับกันเลยแฮะ;;"
10049-100490070 = "';;' คืออะไรน่ะ"
10049-100490080 = "ก็คุณครูเป็นคุณครูผู้สอนนี่นา ฉันเลย\nเผลอใช้คำสุภาพไปบ้างก็เท่านั้นเอง"
10049-100490090 = "ดูจากที่มาแชตตอบได้ แสดงว่าคงว่าง\nแล้วสินะ ค่อยยังชั่ว"
10049-100490100 = "คุณครูคงจะยุ่งอยู่ เดี๋ยวฉันจะแวะไป\nแถวนั้นแล้วกัน"
10049-100490110 = "เอาไว้ถ้าไปถึงแล้วจะติดต่อไปใหม่นะคะ"
10049-100490120 = "คุณครู ถึงรึยัง?"
10049-100490130 = "ฉันกลับถึงห้องแล้วนะ เพิ่งถึงห้อง\nเมื่อกี้และก็กำลังเตรียมจะอาบน้ำแล้ว"
10049-100490140 = "เอ่อ..."
10049-100490150 = "ทำไมฉันต้องพิมพ์บอกเรื่องแบบนั้น\nด้วยเนี่ย"
10049-100490160 = ";;;;;;;;"
10049-100490170 = "ไม่ต้องใส่ใจหรอก แค่รู้สึกว่าอยากบอก\nก็เท่านั้นน่ะ"
10049-100490180 = "ยังไงก็ขอบคุณสำหรับวันนี้นะคะ"
10049-100490190 = "ถ้างั้น..."
10049-100490200 = "ไว้เจอกันใหม่นะ คุณครู"
10049-100490210 = "เหนื่อยจัง"
10049-100490220 = "คุณครู ตอนนี้ทำงานอยู่เหรอ?"
10049-100490230 = "ใช่แล้วละ"
10049-100490240 = "คาซึสะยังอยู่ข้างนอกเหรอ?"
10049-100490250 = "อื้อ งั้นเหรอ"
10049-100490260 = "วันนี้จะทบทวนบทเรียนที่ค้างไว้น่ะ\nเลยอยู่ที่โรงเรียนดึกหน่อย"
10049-100490270 = "ตอนนี้กำลังจะกลับแล้วละ"
10049-100490280 = "ระหว่างทางกลับก็แค่ส่งข้อความหาเฉยๆ ไม่มีอะไรหรอก"
10049-100490290 = "งั้นก็แค่นี้นะ"
10049-100490300 = "อา..."
10049-100490310 = "คุณครู"
10049-100490320 = "..."
10049-100490340 = "จู่ๆ ก็ส่งรูปมาเหรอ???"
10049-100490350 = "รูปยืนยันว่ากลับถึงแล้วเหรอ?"
10049-100490360 = "ก็....."
10049-100490370 = "ยังไงวันนี้ฉันก็กลับดึก"
10049-100490380 = "ก็ใช่"
10049-100490390 = "แต่คุณครูก็อยู่ด้วยกันจนถึงดึก"
10049-100490400 = "เลยคิดว่าอย่างน้อยก็ควรรายงานว่า\nกลับถึงแล้วน่ะ"
10049-100490410 = "สีหน้าดูแหยๆ เหมือนไม่ชินกับการ\nถ่ายรูปเลยเนอะ;;;"
10049-100490420 = "อา..."
10049-100490430 = "ถ้าดูแล้วก็ลบไปเลย"
10049-100490440 = "แค่นี้นะ"
10049-100490450 = "คุณครู ตอนนี้ยุ่งอยู่หรือเปล่า?"
10049-100490460 = "ถ้ายุ่งก็ไม่เป็นไร"
10049-100490470 = "คุณครูมีของหวานที่ชอบเป็นพิเศษรึเปล่า? ฉันอยากคุยต่อจากคราวที่แล้ว..."
10049-100490480 = "จู่ๆ ก็ถามเรื่องของที่ชอบเหรอ?"
10049-100490490 = "ถ้าบอกแล้วจะซื้อให้ครูเหรอ?"
10049-100490500 = "อืม กะทันหันไปสินะ"
10049-100490510 = "???"
10049-100490520 = "ก็อาจจะนะ ถ้ามีโอกาส"
10049-100490530 = "แค่เผื่อไว้มีโอกาสน่ะ... แต่ถ้าเตรียมไว้แล้ว\nคุณครูไม่ชอบก็น่าเสียดายใช่มั้ยล่ะ?"
10049-100490540 = "อืม;;;;"
10049-100490550 = "ช่างเหอะ แล้วก็ทำเป็นไม่เห็นด้วยนะ"
10049-100490560 = "แค่นี้นะ"
10049-100490570 = "คุณครู"
10049-100490580 = "ตอนนี้อยู่ที่ห้องรึเปล่า?"
10049-100490590 = "อื้อ อยู่ๆ"
10049-100490600 = "มีอะไรเหรอ?"
10049-100490610 = "ไม่ได้มีเรื่องอะไรหรอก"
10049-100490620 = "คุณครูรออยู่ที่ห้องก็พอ"
10049-100490630 = "เดี๋ยวฉันไปหา"
10049-100490640 = "คือ..."
10049-100490650 = "คุณครู"
10049-100490660 = "ที่ฉันพูดซ้ำๆ ไปก็เพราะว่าเป็นห่วง\nมันไม่ใช่การ \"จัดการ\" จริงๆ สักหน่อย"
10049-100490670 = "อีกอย่างคราวหน้า ฉันจะเลือกชิ้นที่\nเหมาะกับคุณครูไปให้นะ"
10049-100490680 = "สองประโยคนี้ดูขัดแย้งกันนะ..."
10049-100490690 = "ไม่เป็นไรหรอก มันอร่อยดีนะ"
10049-100490700 = ";;;;;"
10049-100490710 = "อืม..."
10049-100490720 = "ยังไงก็เถอะ อีกอย่าง..."
10049-100490730 = "นี่"
10049-100490740 = "เรื่องนั้นน่ะล้อเล่นใช่มั้ย? เรื่องแมวน่ะ"
10049-100490750 = "เอ๋? ยังคงไม่รู้สินะ..."
10049-100490760 = "ฮึ่ม สุดท้ายก็โดนจับได้"
10049-100490770 = "..."
10049-100490780 = "นี่!"

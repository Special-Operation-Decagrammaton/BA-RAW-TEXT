10049-100490070 = ";;;뭐야"
10049-100490080 = "선생님이니까 나도 모르게 존댓말이 나올 때가 있는 거뿐이라고"
10049-100490090 = "아무튼 답해주는 거 보니 시간은 괜찮은 모양이네. 다행이다."
10049-100490100 = "선생님은 바쁠 테니 근처로 내가 갈게."
10049-100490110 = "그럼 가서 다시 연락하겠습니다."
10049-100490120 = "선생님. 잘 도착했어?"
10049-100490130 = "나는 잘 도착했어. 방금 막 방에 왔고, 이제 슬슬 씻으려고."
10049-100490140 = "어"
10049-100490150 = "근데 왜 이런 걸 굳이 문자로 말한 거지 나는"
10049-100490160 = ";;;;;;;;"
10049-100490170 = "뭐 신경 쓰지 마. 왠지 말해줘야 할 거 같아서 그랬으니까."
10049-100490180 = "아무튼 오늘 일은 정말로 감사했습니다."
10049-100490190 = "그럼"
10049-100490200 = "다음에 또 봐 선생님."
10049-100490210 = "피곤하다"
10049-100490220 = "선생님, 지금 일하는 중이야?"
10049-100490230 = "나야 그렇긴 한데……."
10049-100490240 = "카즈사는 아직 밖이야?"
10049-100490250 = "아, 뭐 그렇지"
10049-100490260 = "오늘은 밀린 거 복습 좀 하려고 늦게까지 학교에 있었으니까"
10049-100490270 = "이제 슬슬 돌아가려고"
10049-100490280 = "그냥 돌아가는 길에 보내 본 거야. 별 뜻은 없었어"
10049-100490290 = "그럼 좋은 하루"
10049-100490300 = "아"
10049-100490310 = "선생님"
10049-100490320 = "……"
10049-100490340 = "??? 갑자기 사진?"
10049-100490350 = "잘 들어갔다는 인사야?"
10049-100490360 = "뭐"
10049-100490370 = "어쨌든 늦게 들어간 거니까"
10049-100490380 = "뭐 그렇지"
10049-100490390 = "그 시간까지 선생님과 같이 있었으니"
10049-100490400 = "잘 들어갔다고 보고 정도는 제대로 해 둬야 할 거 같아서"
10049-100490410 = "근데 사진 찍는 건 그다지 익숙하지 않아 표정이 좀;;;"
10049-100490420 = "아"
10049-100490430 = "봤으면 지워"

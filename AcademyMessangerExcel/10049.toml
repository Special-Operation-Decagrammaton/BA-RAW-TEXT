[translation]
10049-100490010 = "你好，老師。我是杏山千紗"
10049-100490020 = "啊……"
10049-100490030 = "難不成你現在很忙嗎？那有空的時候再回覆我"
10049-100490040 = "那麼，我等您"
10049-100490050 = "說話方式很親切呢"
10049-100490060 = "敬語和口語混在一起……？"
10049-100490070 = "……什麼"
10049-100490080 = "只是覺得發給老師的對話，偶爾還是用敬語比較好"
10049-100490090 = "總之……既然你回覆我了，看來時間上沒問題。太好了"
10049-100490100 = "老師應該很忙吧，我去夏萊附近"
10049-100490110 = "那麼，稍後再連絡你"
10049-100490120 = "老師，平安到家了嗎？"
10049-100490130 = "我安穩地回到房間了。現在正要去洗澡"
10049-100490140 = "我為什麼要特別說這些"
10049-100490150 = "啊……"
10049-100490160 = "嗚──……"
10049-100490170 = "……嘛，別在意。我只覺得要說點什麼才好"
10049-100490180 = "總之，今天真的非常感謝！"
10049-100490190 = "那麼"
10049-100490200 = "下次見囉，老師"
10049-100490210 = "累死了"
10049-100490220 = "老師，現在在工作嗎？"
10049-100490230 = "是在工作沒錯……"
10049-100490240 = "千紗你還在外面嗎？"
10049-100490250 = "啊，嘛，是啊……"
10049-100490260 = "今天想要一口氣複習累積下來的部份，所以在學校待到很晚"
10049-100490270 = "差不多要回去了"
10049-100490280 = "因為在回去的路上很閒，所以就發了訊息。沒什麼特別的意思"
10049-100490290 = "祝你有個美好的一天"
10049-100490300 = "啊"
10049-100490310 = "老師"
10049-100490320 = "……"
10049-100490340 = "照片？"
10049-100490350 = "平安到家了嗎？"
10049-100490360 = "唔，嘛"
10049-100490370 = "反正已經太遲了"
10049-100490380 = "之所以這樣"
10049-100490390 = "是因為和老師一起待到那個時間"
10049-100490400 = "想說要報告一下，表示安全抵達了"
10049-100490410 = "但不太習慣拍照，所以表情有點……汗"
10049-100490420 = "所以說"
10049-100490430 = "看完就刪掉吧"
10049-100490440 = "那就下次見"
10049-100490450 = "老師，現在也還忙嗎？"
10049-100490460 = "是的話也沒關係"
10049-100490470 = "接續之前的話題……有非常喜歡的甜點嗎？"
10049-100490480 = "喜歡的甜點？"
10049-100490490 = "難不成要買給我嗎？"
10049-100490500 = "啊～果然有點突然啊"
10049-100490510 = "？？？什麼意思？"
10049-100490520 = "啊～嘛。有心情的話可能會買吧？"
10049-100490530 = "你想啊……好不容易買了，如果不喜歡的話就麻煩了"
10049-100490540 = "嗯……"
10049-100490550 = "果然還是先就此打住"
10049-100490560 = "剛才的當作沒有聽到"
10049-100490570 = "老師，那個"
10049-100490580 = "你現在在位置上嗎？"
10049-100490590 = "嗯。我在唷"
10049-100490600 = "怎麼了？"
10049-100490610 = "不，沒什麼大不了的"
10049-100490620 = "有在位置上就好"
10049-100490630 = "我進去一下唷"
10049-100490640 = "那個，老師"
10049-100490650 = "慎重起見，再說一遍"
10049-100490660 = "真的不是要你「處理」什麼的"
10049-100490670 = "不過，下次會好好地挑選老師的份帶去的"
10049-100490680 = "一下子就說出了兩句矛盾的話"
10049-100490690 = "沒關係，很好吃唷"
10049-100490700 = "……嗚"
10049-100490710 = "唔嗯……"
10049-100490720 = "還有，最後一件事"
10049-100490730 = "那個，果然"
10049-100490740 = "是開玩笑的吧？貓的部份"
10049-100490750 = "哎呀，不知道呢"
10049-100490760 = "結果還是被發現了嗎"
10049-100490770 = "……"
10049-100490780 = "壞透了……"

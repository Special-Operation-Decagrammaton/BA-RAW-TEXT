[translation]
20038-200380010 = "在山海經的生活確實很新鮮"
20038-200380020 = "有稍微習慣一點了嗎？"
20038-200380030 = "雖然習慣了就該說習慣了……"
20038-200380040 = "不過我也有股不太想習慣的心情"
20038-200380050 = "為什麼呢？"
20038-200380060 = "嗯……該怎麼說呢？"
20038-200380070 = "因為如果習慣了"
20038-200380080 = "說不定就會失去新鮮感和樂趣吧？"
20038-200380090 = "來到別的學園之後才發現"
20038-200380100 = "原來山海經和赤冬真的很不一樣呢"
20038-200380110 = "哪些部分的差異特別大呢？"
20038-200380120 = "首先是很熱"
20038-200380130 = "靜靜待著不動也會一直冒汗……"
20038-200380140 = "老實說，我還是第一次有這種體驗"
20038-200380150 = "啊，跟赤冬比起來確實是……"
20038-200380160 = "當然也不禁讓我心想"
20038-200380170 = "世界上比赤冬「涼快」的地方究竟有多少呢"
20038-200380180 = "話雖如此，還是讓人有點難適應"
20038-200380190 = "老～師～"
20038-200380200 = "您現在忙嗎？"
20038-200380210 = "正好有空哦，怎麼了嗎？"
20038-200380220 = "如果可以的話，要不要一起吃個午餐呢"
20038-200380230 = "當然是在老師方便的時候"
20038-200380240 = "好哇！那我帶你去吃一家中華料理！"
20038-200380250 = "不過仔細想想……你應該已經吃過不少中華料理了吧？"
20038-200380260 = "雖然的確是這樣沒錯"
20038-200380270 = "不過在老師的親自介紹之下"
20038-200380280 = "那間店對我來說一定會別具意義，所以我很期待哦"
20038-200380290 = "期待太高的話，我怕你可能會失望……"
20038-200380300 = "我可以斷言"
20038-200380310 = "那種情況絕不會發生"
20038-200380320 = "因為有老師陪著我呀？"

[translation]
20038-200380010 = "ชีวิตประจำวันในซานไห่จิงดูมีชีวิตชีวา\nมากเลยค่ะ"
20038-200380020 = "คุ้นเคยขึ้นบ้างรึยัง?"
20038-200380030 = "ถ้าคุ้นเคยแล้วละก็ ฉันก็ควรจะตอบ\nไปตามตรง..."
20038-200380040 = "แต่ฉันก็แอบคิดว่าไม่อยากคุ้นเคย\nกับมันเลยน่ะค่ะ"
20038-200380050 = "ทำไมเหรอ?"
20038-200380060 = "อืม... นั่นสิคะ?"
20038-200380070 = "ถ้าเกิดคุ้นเคยมากเกินไป"
20038-200380080 = "ความสนุกและความรู้สึกแปลกใหม่\nอาจลดน้อยลงก็ได้ค่ะ"
20038-200380090 = "ฉันรู้สึกแบบนั้นเพราะมาอยู่ที่\nโรงเรียนอื่นค่ะ"
20038-200380100 = "ซานไห่จิงกับเรดวินเทอร์แตกต่างกัน\nมากเลยน่ะค่ะ"
20038-200380110 = "อะไรทำให้รู้สึกเป็นพิเศษเหรอ?"
20038-200380120 = "มันร้อนน่ะค่ะ"
20038-200380130 = "ฉันเพิ่งจะเคยยืนนิ่งๆ แล้วเหงื่อออก..."
20038-200380140 = "แบบนี้เป็นครั้งแรกเลยค่ะ"
20038-200380150 = "อ่า พอเทียบกับเรดวินเทอร์..."
20038-200380160 = "แน่นอนว่าพอเทียบกับเรดวินเทอร์"
20038-200380170 = "บางครั้งฉันก็สงสัยว่าจะมีสถานที่ที่\n'เย็นสบาย' อยู่อีกสักกี่แห่งกัน "
20038-200380180 = "ถึงจะพูดอย่างนั้น แต่นี่ก็ไม่ใช่\nเรื่องง่ายเลยค่ะ"
20038-200380190 = "คุณ~ ครู~"
20038-200380200 = "ยุ่งอยู่รึเปล่าคะ?"
20038-200380210 = "ครูว่างอยู่พอดี มีอะไรเหรอ?"
20038-200380220 = "ถ้าคุณครูมีเวลา ฉันอยากชวนคุณครู\nไปรับประทานข้าวด้วยกันค่ะ"
20038-200380230 = "หมายถึงถ้าคุณครูมีเวลานะคะ"
20038-200380240 = "ดีละ! ครูจะแนะนำร้านอาหารจีน\nอร่อยๆ ให้เอง!"
20038-200380250 = "แต่นึกดูแล้ว... เธอยังไม่ได้ลองชิม\nอาหารจีนเท่าไรเลยใช่มั้ย?"
20038-200380260 = "ก็จริงค่ะ"
20038-200380270 = "แต่ในเมื่อคุณครูบอกว่าจะพาฉันไปลอง\nชิมอาหารแบบนี้"
20038-200380280 = "คงจะเป็นร้านพิเศษ เพราะงั้นฉันจะ\nตั้งตารอนะคะ"
20038-200380290 = "ถ้าคาดหวังมากไปจะผิดหวังได้นะ..."
20038-200380300 = "ไม่มีทางเป็นแบบนั้นหรอกค่ะ"
20038-200380310 = "ฉันรับรองได้เลยค่ะ"
20038-200380320 = "เพราะนี่เป็นร้านที่จะได้ไปกับคุณครู\nยังไงล่ะคะ"

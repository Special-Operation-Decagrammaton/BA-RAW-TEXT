[translation]
20038-200380010 = "산해경에서의 생활은, 확실히 신선하네요."
20038-200380020 = "조금 익숙해졌어?"
20038-200380030 = "익숙해졌다면 익숙해졌다고 말씀드려야겠지만……."
20038-200380040 = "좀처럼 익숙해지고 싶지 않다는 생각도 들기는 하네요."
20038-200380050 = "그건 어째서?"
20038-200380060 = "음……. 글쎄요?"
20038-200380070 = "너무 익숙해져 버리면"
20038-200380080 = "역시 신선함과 즐거움이 줄어들지도 모르니까요?"
20038-200380090 = "확실히 다른 학원에 오게 되어서 느끼는 것입니다만."
20038-200380100 = "산해경과 붉은겨울 사이에는 참 많은 차이가 있군요."
20038-200380110 = "어떤 부분이 특히 그래?"
20038-200380120 = "더워요."
20038-200380130 = "가만히 있어도 땀이 나는 경험이란……"
20038-200380140 = "솔직히, 처음 겪는 것이네요."
20038-200380150 = "아, 확실히 붉은겨울에 비하면……."
20038-200380160 = "물론 붉은겨울에 비해서"
20038-200380170 = "더 '시원한' 곳이 얼마나 있을까, 하는 생각이 들기도 하지만."
20038-200380180 = "그렇다고는 해도, 이건 확실히 쉽지 않군요."
20038-200380190 = "선~ 생~ 님~"
20038-200380200 = "바쁘신가요?"
20038-200380210 = "마침 한가한데, 무슨 일이야?"
20038-200380220 = "괜찮으시다면, 점심이라도 함께하시면 어떨까 해서요."
20038-200380230 = "물론 선생님께서 괜찮으실 때의 이야기이겠지만요."
20038-200380240 = "좋았어! 맛있는 중화요리 가게를 소개해 줄게!"
20038-200380250 = "그런데 생각해 보니까…… 중화요리는 제법 많이 맛보지 않았어?"
20038-200380260 = "그렇기는 하지만"
20038-200380270 = "선생님께서 직접 소개해 주시고, 데려가 주신다니."
20038-200380280 = "그것은 또 나름 각별한 가게가 될 것 같아서 기대가 되네요."
20038-200380290 = "기대가 너무 크면, 실망할지도 모르는데……."
20038-200380300 = "그럴 일은 없을 거라고"
20038-200380310 = "단언드릴 수 있을 것 같네요."
20038-200380320 = "왜냐하면, 선생님과 같이 가는 가게인걸요?"

[translation]
20038-200380010 = "Life at Shanhaijing is certainly a fresh experience."
20038-200380020 = "Do you think you're getting used to it?"
20038-200380030 = "If I were being honest, yes."
20038-200380040 = "But there's a part of me that rebukes the idea of adapting to it so quickly."
20038-200380050 = "Why's that?"
20038-200380060 = "Hm... I couldn't say exactly."
20038-200380070 = "Perhaps it's that if I become too accustomed to this place"
20038-200380080 = "the experience won't feel as fresh? Entertaining?"
20038-200380090 = "I've learned something new from visiting a new academy."
20038-200380100 = "There are many differences between Shanhaijing and Red Winter."
20038-200380110 = "In what ways, exactly?"
20038-200380120 = "Hot. It's so hot."
20038-200380130 = "Despite not moving a single muscle, I'm still sweating..."
20038-200380140 = "I've never experienced temperatures like this."
20038-200380150 = "Ah, that makes sense. Especially compared to Red Winter."
20038-200380160 = "Naturally, that makes me wonder"
20038-200380170 = "if there's somewhere out there even colder than Red Winter."
20038-200380180 = "That being said, it's certainly not easy to endure this."
20038-200380190 = "Sensei~"
20038-200380200 = "Are you busy?"
20038-200380210 = "I'm free right now. What's up?"
20038-200380220 = "Would you like to get lunch together?"
20038-200380230 = "Only if you don't mind, of course."
20038-200380240 = "Sounds good! I know a great Chinese restaurant in the area."
20038-200380250 = "Actually... You've probably had your fill of Chinese food at this point, huh?"
20038-200380260 = "That's true but"
20038-200380270 = "it's different if it's your recommendation, Sensei."
20038-200380280 = "It'll make for a unique experience, I think. I'm looking forward to it."
20038-200380290 = "Please manage your expectations. So you're not disappointed."
20038-200380300 = "I'm quite positive"
20038-200380310 = "that won't happen."
20038-200380320 = "After all, I'll be going with you, Sensei."

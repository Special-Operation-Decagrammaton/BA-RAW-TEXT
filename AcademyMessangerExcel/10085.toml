[translation]
10085-100850010 = "คุณครู"
10085-100850020 = "เคยได้ยินคำว่าดิจิทัลโนแมดมั้ย?"
10085-100850030 = "เหมือนเคยเจอในอินเทอร์เน็ตนะ..."
10085-100850040 = "ดิจิทัลโนแมดคือคนเร่ร่อนที่พก\nอุปกรณ์ดิจิทัลติดตัวไปด้วย ซึ่งจะหมายถึง\nคนที่ใช้อุปกรณ์ดิจิทัลและใช้ชีวิตอย่าง\nอิสระโดยไม่มีข้อจำกัดเรื่องพื้นที่"
10085-100850050 = "เพราะหมู่นี้อุปกรณ์ดิจิทัลก็มีขนาด\nเล็กลงมาก..."
10085-100850060 = "พวกโปรแกรมเมอร์ที่เอาโน้ตบุ๊คไปนั่ง\nเขียนโค้ดกลางแจ้งกันก็มีเยอะนะ"
10085-100850070 = "แบบนั้นเท่จัง"
10085-100850080 = "อื้ม ฉันเห็นรูปในฟอรั่มของแฮ็กเกอร์\nมันดูมีรสนิยมมากเลยละ"
10085-100850090 = "เอาไว้ไปนั่งทำงานข้างนอกบ้างดีมั้ยนะ\n...?"
10085-100850100 = "แต่ฮาเระไม่ชอบการออกไป\nกลางแจ้งไม่ใช่เหรอ?"
10085-100850110 = ";;"
10085-100850120 = "อคติแล้วนะ คุณครู"
10085-100850130 = "ฉันก็แค่ไม่ชอบที่ที่ไม่มีอินเทอร์เน็ต\nแล้วก็มีสภาพแวดล้อมหนาวหรือ\nร้อนเกินไปก็เท่านั้น"
10085-100850140 = "ถ้าเป็นทิวทัศน์สวยๆ ฉันก็ชอบนะ"
10085-100850150 = "ไหนๆ ก็พูดเรื่องนี้แล้ว... สุดสัปดาห์นี้\nฉันไปลองใช้ชีวิตแบบดิจิทัลโนแมด\nดีมั้ยนะ?"
10085-100850160 = "หมู่นี้เรื่องแกลมปิ้ง"
10085-100850170 = "น่าจะกำลังเป็นที่นิยมของผู้คนเลยละ"
10085-100850180 = "แกลมปิ้ง?"
10085-100850190 = "ใช่ มันเป็นคำศัพท์ใหม่ที่หมายถึง\nแคมป์ปิ้งหรูๆ น่ะ เป็นการตั้งแคมป์ที่\nทางลานแคมป์ปิ้งจะเตรียมเต็นท์\nเฟอร์นิเจอร์ แล้วก็อุปกรณ์ทำอาหารไว้\nให้ล่วงหน้า เราก็เลยไม่ต้องแบกสัมภาระ\nหนักๆ ไป"
10085-100850200 = "ได้ยินว่าบางที่มีทีวี แอร์ แล้วก็ครัวเล็กๆ\nให้ในเต็นท์เลยนะ"
10085-100850210 = "แบบนั้นน่าจะสะดวกไม่เบาเลย..."
10085-100850220 = "ถ้ามีที่แบบนั้นครูก็อยากจะไปบ้าง..."
10085-100850230 = "อืม ส่วนฉันน่ะ"
10085-100850240 = "อยากให้ที่นั่นมีเซิร์ฟเวอร์คอมพิวเตอร์\nเพิ่ม จะได้เล่นเน็ตที่นั่นได้ด้วย"
10085-100850250 = "แล้วแถวนั้นก็ต้องมีร้านสะดวกซื้อที่\nเปิด 24 ชั่วโมงด้วย..."
10085-100850260 = "ไม่สิ ถ้าเต็นท์อยู่ในเขตโรงเรียนไปเลย\nก็จะยิ่งดี จะได้ไม่ต้องเดินทางไกลๆ\nตั้งแต่แรก"
10085-100850270 = "ถ้ามีขนาดนั้นก็ไม่น่าจะใช่แคมป์ปิ้ง\nแล้วมั้ย...?"
10085-100850280 = "คุณครู ช่วยมาที่มิลเลเนียมหน่อย\nได้มั้ย? ตอนนี้เลย"
10085-100850290 = "พอดีฉันเจอปัญหาที่แก้คนเดียวไม่ได้..."
10085-100850300 = "ก็เลยอยากให้คุณครูมาช่วยอีกแรงน่ะ"
10085-100850310 = "ได้สิ ครูจะไปเดี๋ยวนี้ละ"
10085-100850320 = "จะว่าไป ฮาเระก็มีปัญหาที่ตัวเอง\nแก้ไม่ตกเหมือนกันเหรอ..."
10085-100850330 = "ชักจะสงสัยแล้วสิว่าเป็นปัญหาอะไร"
10085-100850340 = "อื้ม เรื่องตัวปัญหาน่ะมันไม่ได้ยาก\nขนาดนั้นหรอก แต่ว่า..."
10085-100850350 = "อ้อ เราอาจจะต้องออกไปที่ไกลๆ กัน"
10085-100850360 = "ใส่รองเท้าที่สบายเท้ามานะ"
10085-100850370 = "นี่มันเรื่องอะไรกันเนี่ย?"
10085-100850380 = "ถึงฉันเพิ่งจะมารู้เอาป่านนี้ก็เถอะ..."
10085-100850390 = "แต่อีเมลนิรนามนั่น เหมือนจะเป็นรุ่นพี่\nจิฮิโระที่ส่งมาแกล้งกันน่ะ"
10085-100850400 = "อยากให้ฉันออกกำลังกายถึงขนาดนั้น\nเลยเหรอ"
10085-100850410 = "จิฮิโระเล่นใหญ่เบอร์นั้นเลยเหรอ..."
10085-100850420 = "คาดไม่ถึงเลยแฮะ..."
10085-100850430 = "นั่นน่ะสิ"
10085-100850440 = "ฉันได้กาแฟแพงๆ หนึ่งแก้วเป็นคำ\nขอโทษมาแล้วก็จริง"
10085-100850450 = "แต่ครั้งนี้ฉันก็ไม่ได้คิดว่ามันเสียหาย\nอะไรเท่าไรหรอก"
10085-100850460 = "ไม่สิ"
10085-100850470 = "ไม่มีอะไรหรอก"
10085-100850480 = "อืม"
10085-100850490 = "ฉันได้ผลการตรวจสุขภาพของ\nเมื่อเดือนก่อนมาแล้ว..."
10085-100850500 = "ระบบทางเดินอาหารดูจะแย่ลงมาก"
10085-100850510 = "หมอก็เลยเตือนให้ฉันลดคาเฟอีนน่ะ..."
10085-100850520 = "เป็นความคิดที่ดีเลย"
10085-100850530 = "ดูแลสุขภาพเอาไว้ก่อนเป็นเรื่อง\nสำคัญนี่นะ"
10085-100850540 = "ก็นะ เรื่องแบบนี้ฉันก็คิดได้อยู่หรอก..."
10085-100850550 = "ถึงจะบอกตัวเองว่างดคาเฟอีนอยู่\nแต่พอทำงานไปเรื่อยๆ มือฉันก็ไปคว้า\nเครื่องดื่มชูกำลังมาโดยไม่ทันได้รู้ตัว"
10085-100850560 = "ให้เปลี่ยนนิสัยแบบหักดิบนี่มันยาก\nจริงๆ แหละ"
10085-100850570 = "ที่จริงฉันคิดวิธีที่จะทำให้ตัวเองลด\nคาเฟอีนได้วิธีหนึ่งอยู่นะ"
10085-100850580 = "แต่ถ้าจะทำตามวิธีนั้น ก็ต้องเตรียม\nอะไรหลายอย่าง..."
10085-100850590 = "คุณครูพอจะช่วยหน่อยได้มั้ย?"
10085-100850600 = "แน่นอนอยู่แล้ว"
10085-100850610 = "ให้ครูช่วยอะไรดี?"
10085-100850620 = "ขอบคุณนะคุณครู"
10085-100850630 = "ถ้างั้นสุดสัปดาห์นี้มาเจอกันที่ลาน\nแคมป์ปิ้งแถวๆ โรงเรียนได้มั้ย?"
10085-100850640 = "เดี๋ยวฉันจะอธิบายรายละเอียดให้ฟัง\nที่นั่นนะ"

[translation]
10085-100850010 = "선생님."
10085-100850020 = "혹시 디지털 노마드라는 말 들어봤어?"
10085-100850030 = "인터넷에서 한 번 들어본 것 같은데……"
10085-100850040 = "디지털 노마드는 말 그대로 디지털 기기를 갖춘 유목민이라는 뜻으로 디지털 기기를 사용하여 공간의 제약 없이 자유롭게 살아가는 사람들을 의미해."
10085-100850050 = "최근에는 디지털 기기들도 꽤 소형화되었으니까……"
10085-100850060 = "노트북 하나만 들고 야외에 나가서 코딩을 하는 프로그래머들도 많은가 봐."
10085-100850070 = "뭔가 멋져 보이네."
10085-100850080 = "응. 해커 포럼에 올라온 사진을 보았는데, 운치가 있어서 좋아 보이더라고."
10085-100850090 = "다음에는 나도 한 번 야외에서 작업을 해볼까……?"
10085-100850100 = "하지만 하레는 야외에 나가는 걸 꺼리지 않았었어?"
10085-100850110 = ";;"
10085-100850120 = "그건 편견이야, 선생님."
10085-100850130 = "나는 인터넷이 되지 않는 춥고 더운 환경을 싫어할 뿐이지"
10085-100850140 = "아름다운 경관 자체는 좋아한다고."
10085-100850150 = "말이 나온 김에…… 이번 주말에 직접 한 번 디지털 노마드를 체험해 볼까?"
10085-100850160 = "최근 사람들 사이에서는"
10085-100850170 = "글램핑이라는 게 유행하고 있는 모양이야."
10085-100850180 = "글램핑?"
10085-100850190 = "응. 화려한 캠핑이라는 뜻의 신조어인데, 캠프장에서 텐트나 가구, 조리 기구를 미리 준비해 주기 때문에 무거운 짐을 들고 가지 않아도 캠핑을 할 수 있대."
10085-100850200 = "어떤 곳은 텐트 안에 TV나 에어컨, 간단한 조리 시설까지 있는 경우도 있다고 하더라고."
10085-100850210 = "그건 꽤나 편리하겠네……"
10085-100850220 = "그런 캠핑장이 있다면 한번 가보고 싶을지도……"
10085-100850230 = "음. 나는 거기에 더해서"
10085-100850240 = "원활한 인터넷 접속이 가능하도록 서버 컴퓨터도 설치되어 있으면 좋겠어."
10085-100850250 = "그리고 24시간 영업 중인 편의점도 근처에 있어야 하고……"
10085-100850260 = "아니, 아예 멀리 이동하지 않아도 괜찮도록 텐트가 학교 부지 내에 있는 것도 좋겠네."
10085-100850270 = "그 정도면 캠핑이 아니지 않나……?"
10085-100850280 = "선생님, 혹시 지금 밀레니엄으로 와 줄 수 있어?"
10085-100850290 = "혼자 해결하기에 조금 곤란한 문제가 생겨서……"
10085-100850300 = "선생님이 같이 도와주었으면 좋겠는데."
10085-100850310 = "응. 금방 갈게."
10085-100850320 = "그나저나 하레에게도 해결하기 어려운 문제라니……"
10085-100850330 = "어떤 문제인지 새삼 궁금해지는걸."
10085-100850340 = "음, 문제 자체는 그렇게 어렵지 않지만……"
10085-100850350 = "아, 그리고 혹시 조금 멀리 나가야 할지도 모르니까"
10085-100850360 = "신발은 편한 것으로 신고 와 줘."
10085-100850370 = "……도대체 무슨 일이야?"
10085-100850380 = "뒤늦게 알게 된 것이지만……"
10085-100850390 = "그 익명의 메일은 치히로 선배가 친 장난이었던 모양이야"
10085-100850400 = "그렇게 해서라도 운동을 하게 만들고 싶었다나."
10085-100850410 = "치히로가 그런 장난을 치다니……"
10085-100850420 = "뭔가 의외네……"
10085-100850430 = "그러게 말이야"
10085-100850440 = "돌아와서 사과의 의미로 비싼 커피를 한 잔 받긴 했지만"
10085-100850450 = "솔직히 이번만큼은 그렇게 손해 본 기분은 아니었어서"
10085-100850460 = "아니"
10085-100850470 = "아무것도 아니야"
10085-100850480 = "으음"
10085-100850490 = "지난달에 한 건강검사 결과가 나왔는데……"
10085-100850500 = "위장 기능이 크게 나빠진 것 같아서"
10085-100850510 = "의사로부터 카페인 섭취를 줄이라는 권고를 받았어……"
10085-100850520 = "이 기회에 좀 줄이도록 해."
10085-100850530 = "건강은 미리 챙기는 게 중요하니까"
10085-100850540 = "뭐, 나도 머리로는 알고 있지만……"
10085-100850550 = "막상 끊으려고 해도 일에 집중하다 보면 무의식적으로 에너지 드링크에 손이 가고 있어서"
10085-100850560 = "역시 생활 습관을 단번에 바꾸는 건 어렵지"
10085-100850570 = "사실 카페인을 줄일 수 있는 좋은 방법이 하나 떠오르긴 했는데"
10085-100850580 = "이걸 실현하려면 여러 가지 밑 준비가 필요해서……"
10085-100850590 = "혹시 선생님이 도와줄 수 있을까?"
10085-100850600 = "물론이야."
10085-100850610 = "내가 무얼 도와주면 될까?"
10085-100850620 = "고마워, 선생님."
10085-100850630 = "그럼 이번 주 주말에 학원 근처의 야영장으로 나와줄 수 있을까?"
10085-100850640 = "자세한 건 그때 설명할게."

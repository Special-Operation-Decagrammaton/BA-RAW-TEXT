[translation]
10085-100850010 = "老師"
10085-100850020 = "你聽說過數位遊牧民嗎？"
10085-100850030 = "有在網路上看到過……"
10085-100850040 = "數位遊牧民就如字面上的意思，指的是擁有數位設備的遊牧民族。也就是能不受空間限制，利用數位設備自由生活的人"
10085-100850050 = "最近數位設備都趨向小型化……"
10085-100850060 = "好像有很多程式設計師會帶著一台小筆電到野外編寫程式"
10085-100850070 = "聽起來很帥氣呢"
10085-100850080 = "嗯，我看過駭客論壇上的照片，看起來挺有趣的"
10085-100850090 = "下次我要不要也到野外工作看看呢……？"
10085-100850100 = "可是晴不是不喜歡到野外嗎？"
10085-100850110 = "QAQ"
10085-100850120 = "那是偏見，老師"
10085-100850130 = "我只是不喜歡沒有網路、溫差又大的環境而已"
10085-100850140 = "漂亮的景色我還是很喜歡的"
10085-100850150 = "既然說到這個……這週末要不要親身體驗數位遊牧民的生活？"
10085-100850160 = "聽說最近"
10085-100850170 = "好像很流行「Glamping」哦"
10085-100850180 = "Glamping？"
10085-100850190 = "嗯，這是新的名詞，意思是豪華露營。聽說露營場會事先準備好帳篷、傢俱和烹飪器具，所以就算不帶沉重的行李也能露營"
10085-100850200 = "我還聽說有些地方的帳篷裡會有電視、空調，甚至有簡單的烹飪設備"
10085-100850210 = "那一定很方便……"
10085-100850220 = "如果有那種露營場，我可能會想去看看……"
10085-100850230 = "嗯，而且我希望"
10085-100850240 = "他們有安裝伺服器以便連上網路"
10085-100850250 = "附近最好也要有24小時營業的便利商店……"
10085-100850260 = "不，乾脆把帳篷搭在校內吧。這樣就不用大老遠跑到其他地方了"
10085-100850270 = "這樣就不叫露營了吧……？"
10085-100850280 = "老師，現在可以來千年一趟嗎？"
10085-100850290 = "我遇到了難以獨自解決的問題……"
10085-100850300 = "希望老師能幫忙"
10085-100850310 = "嗯，我馬上過去"
10085-100850320 = "不過連晴都難以解決的問題……"
10085-100850330 = "究竟會是什麼呢……"
10085-100850340 = "這個嘛，問題本身其實並不棘手……"
10085-100850350 = "對了，因為可能必須到有點遠的地方"
10085-100850360 = "請老師穿舒服好走的鞋子過來"
10085-100850370 = "……究竟怎麼回事？"
10085-100850380 = "我後來才知道……"
10085-100850390 = "那封匿名郵件好像是千尋前輩開的玩笑"
10085-100850400 = "不惜那麼做也想讓人運動嗎？"
10085-100850410 = "沒想到千尋會開那種玩笑……"
10085-100850420 = "有點令人意外……"
10085-100850430 = "我也有同感"
10085-100850440 = "後來他帶了一杯很貴的咖啡回來表示歉意"
10085-100850450 = "但老實說這次並沒有吃虧的感覺"
10085-100850460 = "啊"
10085-100850470 = "當我沒說"
10085-100850480 = "唔"
10085-100850490 = "上個月的健康檢查結果出來了……"
10085-100850500 = "腸胃功能好像變得很差"
10085-100850510 = "醫生勸我減少攝取咖啡因……"
10085-100850520 = "趁這個機會試著減少一點吧"
10085-100850530 = "提前注意健康是很重要的"
10085-100850540 = "嗯，我也很清楚……"
10085-100850550 = "但就算真的想戒掉，只要一專心工作就會下意識地想喝能量飲料"
10085-100850560 = "生活習慣果然很難一次改變"
10085-100850570 = "我想到一個能減少咖啡因的好方法"
10085-100850580 = "但如果想實踐就需要做各種準備……"
10085-100850590 = "老師能幫忙嗎？"
10085-100850600 = "當然"
10085-100850610 = "我該怎麼幫忙？"
10085-100850620 = "謝謝你，老師"
10085-100850630 = "這週末能請老師來千年附近的露營場嗎？"
10085-100850640 = "詳情我到時候會說明"

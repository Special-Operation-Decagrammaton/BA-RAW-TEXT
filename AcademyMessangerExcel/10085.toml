[translation]
10085-100850010 = "Sensei."
10085-100850020 = "Have you heard of the phrase \"digital nomad\"?"
10085-100850030 = "I might've seen it in an article once..."
10085-100850040 = "It's what it sounds like. People who travel around with their technology. They're not tied down to one home and go anywhere they want."
10085-100850050 = "Devices have gotten really portable over the years."
10085-100850060 = "I even know some programmers who just chill outside, coding on their laptops."
10085-100850070 = "That sounds fascinating."
10085-100850080 = "Right? I was reading about it on a forum. It sounded pretty cool."
10085-100850090 = "I think I'll try my hand at it."
10085-100850100 = "The outdoors isn't really your thing though..."
10085-100850110 = "..."
10085-100850120 = "You're stereotyping me, Sensei."
10085-100850130 = "I just don't like areas with extreme weather conditions and no internet."
10085-100850140 = "I love a nice view as much as the next student."
10085-100850150 = "So now that you're caught up... Will you try out the digital nomad lifestyle with me next weekend?"
10085-100850160 = "I saw this trend online."
10085-100850170 = "It's called glamping."
10085-100850180 = "What's that?"
10085-100850190 = "It's short for \"glamorous camping.\" The campgrounds provide tents, sleeping arrangements, cooking equipment, and other necessities. You just have to show up."
10085-100850200 = "Sometimes they even have TV, air conditioning, and basic kitchens!"
10085-100850210 = "That sounds convenient!"
10085-100850220 = "I want to try that out..."
10085-100850230 = "All of that is great,"
10085-100850240 = "but it's more important to me that I have really good internet access."
10085-100850250 = "Oh and a 24-hour convenience store for energy drinks."
10085-100850260 = "It'd be nice if the campgrounds was near the clubroom too. Then I wouldn't have to go too far."
10085-100850270 = "I think we're missing the point of camping here..."
10085-100850280 = "Sensei! Do you think you could come over right now? I'm at Millennium."
10085-100850290 = "I've got a sort of...problem I can't solve on my own."
10085-100850300 = "So I'm recruiting your help."
10085-100850310 = "I'll be over right away!"
10085-100850320 = "A problem even Hare can't solve..."
10085-100850330 = "I wonder what kind of problem can stump Hare..."
10085-100850340 = "Well, it's less of the problem itself, than..."
10085-100850350 = "I'll just explain in person."
10085-100850360 = "It might be a trek though, so wear comfortable shoes."
10085-100850370 = "...What exactly are we doing?"
10085-100850380 = "Hindsight really is 20/20."
10085-100850390 = "The anonymous email was just a prank Chihiro pulled."
10085-100850400 = "She said, \"I'll do whatever it takes to make you exercise more!\""
10085-100850410 = "I'm not mad or anything, but..."
10085-100850420 = "It IS pretty unexpected, coming from her."
10085-100850430 = "Right??"
10085-100850440 = "She did buy me some really fancy coffee to make up for it though..."
10085-100850450 = "I guess it kind of evened out, in the end."
10085-100850460 = "No."
10085-100850470 = "It's nothing."
10085-100850480 = "Hm..."
10085-100850490 = "I went to my doctor last month"
10085-100850500 = "and I guess they're a little worried about my gut health."
10085-100850510 = "They told me I should start drinking less caffeine?"
10085-100850520 = "That's probably a good idea."
10085-100850530 = "The best kind of medical care is preventative."
10085-100850540 = "Hey, easier said than done."
10085-100850550 = "I HAVE tried to quit before, but it's like I can't work unless I have an energy drink on my desk."
10085-100850560 = "It's really hard to break a habit!"
10085-100850570 = "Wait. I have an idea."
10085-100850580 = "There's gonna be a lot of planning involved though."
10085-100850590 = "Do you mind giving me a hand, Sensei?"
10085-100850600 = "You can have both!"
10085-100850610 = "How can I help?"
10085-100850620 = "Thank you, Sensei."
10085-100850630 = "How about this weekend? Can you come meet me at the campgrounds near the school?"
10085-100850640 = "I'll tell you the plan there!"

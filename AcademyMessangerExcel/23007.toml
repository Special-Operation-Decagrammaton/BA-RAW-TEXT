[translation]
23007-230070010 = "선생님. 하나코입니다."
23007-230070020 = "이렇게 메시지로 연락드리는 건 처음인 것 같네요."
23007-230070030 = "다시 한번 잘 부탁드립니다."
23007-230070040 = "다름이 아니라, 보충수업 관련해서"
23007-230070050 = "여쭤보고 싶은 게 있는데,"
23007-230070060 = "혹시 괜찮을까요?"
23007-230070070 = "물론 괜찮지."
23007-230070080 = "어떤 게 궁금하니?"
23007-230070090 = "후훗."
23007-230070100 = "감사합니다."
23007-230070110 = "후훗."
23007-230070120 = "그건…… 오시면 말씀드릴게요."
23007-230070130 = "그럼 기다리고 있겠습니다. 선생님."
23007-230070140 = "오늘 정말로 감사했습니다. 선생님."
23007-230070150 = "선생님 덕분에 즐거운 하루를 보낸 것 같아요."
23007-230070160 = "보충수업이었는데……?"
23007-230070170 = "후훗."
23007-230070180 = "……"
23007-230070190 = "그러네요."
23007-230070200 = "선생님, 혹시 지금 시간 좀 괜찮으실까요?"
23007-230070210 = "지금 조금 곤란한 상황에 처해 있어서, 괜찮으시다면 도움을 좀 받고 싶은데요."
23007-230070220 = "곤란한 상황?"
23007-230070230 = "무슨 일 있는 거야?"
23007-230070240 = "음."
23007-230070250 = "무슨 일이라고 하면 무슨 일이긴 하죠. 어쩌다 보니 체육실에 갇혀 버려서……"
23007-230070260 = "밖에서 열 수 있는 문이니, 문만 열어 주셔도 감사할 것 같아요."
23007-230070270 = "괜찮으실까요?"
23007-230070280 = "지금 바로 갈게."
23007-230070290 = "걱정하지 마. 금방 갈 테니."
23007-230070300 = "……후훗."
23007-230070310 = "네. 감사합니다. 그럼 기다리고 있을게요."
23007-230070320 = "선생님."
23007-230070330 = "어디까지 가신 건가요? 선생님."
23007-230070340 = "듣고 계시겠죠? 오늘은 정말로 감사했습니다. 덕분에 한결 나아졌어요."
23007-230070350 = "물론 선생님께서 어떻게 생각하실진 모르겠지만……"
23007-230070360 = "……"
23007-230070370 = "이건 진심이랍니다."
23007-230070380 = "선생님 하나코입니다."
23007-230070390 = "오늘 방과 후에 보충수업부 활동에 필요한"
23007-230070400 = "준비물을 사러 갈 건데,"
23007-230070410 = "같이 가주시지 않겠어요?"
23007-230070420 = "준비물인 거지?"
23007-230070430 = "네. 준비물이에요."
23007-230070440 = "평범하게 입고 가는 거고?"
23007-230070450 = "네. 맞습니다."
23007-230070460 = "……응. 그런 거라면 얼마든지."
23007-230070470 = "감사합니다."
23007-230070480 = "그럼 방과 후에 제 5 교문 앞에서 기다릴게요."
23007-230070490 = "선생님."
23007-230070500 = "새 양말은 선생님의 사무실로 보내드릴까요?"
23007-230070510 = "필요 없어!!"
23007-230070520 = "선생님?"
23007-230070530 = "오늘은"
23007-230070540 = "……"
23007-230070550 = "……?"
23007-230070560 = "하나코?"
23007-230070570 = "후후."
23007-230070580 = "……"
23007-230070590 = "아니에요."
23007-230070600 = "역시"
23007-230070610 = "신경 쓰지 않으셔도 돼요."
23007-230070620 = "아, 선생님."
23007-230070630 = "이야기는 들었어요."
23007-230070640 = "트리니티에 오실 일이 있으시다고요?"
23007-230070650 = "일단 그렇긴 한데……."
23007-230070660 = "……어디서 들은 거야?"
23007-230070670 = "후후♡"
23007-230070680 = "운이 좋다면"
23007-230070690 = "오신 김에 한 번 뵐 수 있었으면 좋겠네요."
23007-230070700 = "아, 억지로 보자는 이야기는 아니었어요."
23007-230070710 = "우연히"
23007-230070720 = "기회가 닿는다면의 이야기니까요."
23007-230070730 = "선생님, 잘 들어가셨나요?"
23007-230070740 = "다음번 오실 때에는"
23007-230070750 = "좀 더 시간적 여유가 있으셨으면 좋겠네요."

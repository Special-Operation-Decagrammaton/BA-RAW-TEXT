[translation]
23007-230070010 = "คุณครูคะ ฉันฮานาโกะนะคะ"
23007-230070020 = "ฉันเพิ่งเคยส่งข้อความหาคุณครู\nเป็นครั้งแรกเลย"
23007-230070030 = "ขอฝากตัวด้วยนะคะ"
23007-230070040 = "เรื่องคลาสเรียนเสริม... "
23007-230070050 = "คือฉันมีเรื่องที่อยากถามคุณครูอยู่ค่ะ "
23007-230070060 = "ตอนนี้คุณครูสะดวกรึเปล่าคะ?"
23007-230070070 = "ได้แน่นอนอยู่แล้ว"
23007-230070080 = "สงสัยเรื่องอะไรเหรอ?"
23007-230070090 = "ฮุฮุ"
23007-230070100 = "ขอบคุณค่ะ"
23007-230070110 = "ฮุฮุ"
23007-230070120 = "เรื่องนั้น... เดี๋ยวคุณครูมาถึง\nฉันจะบอกให้ฟังค่ะ"
23007-230070130 = "ถ้างั้นจะรอนะคะคุณครู"
23007-230070140 = "วันนี้ขอบคุณมากค่ะคุณครู"
23007-230070150 = "วันนี้ได้ใช้เวลากับคุณครู\nสนุกมากเลยค่ะ"
23007-230070160 = "ทั้งที่ต้องเรียนเสริมเนี่ยนะ...?"
23007-230070170 = "ฮุฮุ"
23007-230070180 = "..."
23007-230070190 = "นั่นสินะคะ"
23007-230070200 = "ตอนนี้คุณครูว่างมั้ยคะ?"
23007-230070210 = "ตอนนี้ฉันมีเรื่องลำบากนิดหน่อยค่ะ\nถ้าคุณครูว่างก็อยากจะขอให้ช่วย\nหน่อยน่ะค่ะ..."
23007-230070220 = "มีอะไรเหรอ?"
23007-230070230 = "มีเรื่องอะไรงั้นเหรอ?"
23007-230070240 = "อืม..."
23007-230070250 = "อืม...คือว่ามีเรื่องนิดหน่อยค่ะ\nไม่รู้ทำไมจู่ๆ ก็ถูกขังไว้ที่ห้อง\nเรียนพละได้..."
23007-230070260 = "แล้วประตูเปิดได้จากข้างนอกเท่านั้นค่ะ\nช่วยมาเปิดประตูให้หน่อยได้มั้ยคะ"
23007-230070270 = "คุณครูช่วยฉันหน่อยได้มั้ยคะ?"
23007-230070280 = "ครูจะไปเดี๋ยวนี้ล่ะ"
23007-230070290 = "ไม่ต้องห่วงนะ เดี๋ยวครูรีบไป"
23007-230070300 = "ฮิฮิ..."
23007-230070310 = "ค่ะ ขอบคุณค่ะ ถ้างั้นฉันจะรอนะคะ"
23007-230070320 = "คุณครูคะ"
23007-230070330 = "จะไปที่ไหนเหรอคะ? คุณครู"
23007-230070340 = "อ่านข้อความอยู่รึเปล่าคะ?\nวันนี้ขอบคุณมากค่ะ\nฉันรู้สึกดีขึ้นมากๆ แล้วค่ะ"
23007-230070350 = "ถึงฉันจะไม่รู้ว่าคุณครูคิดยังไง..."
23007-230070360 = "..."
23007-230070370 = "ฉันพูดจากใจเลยนะคะ  "
23007-230070380 = "คุณครูคะ ฮานาโกะเองค่ะ"
23007-230070390 = "วันนี้หลังเลิกเรียน ฉันจะไปซื้ออุปกรณ์\nที่จำเป็น "
23007-230070400 = "สำหรับเตรียมกิจกรรมของชั้นเรียน\nเสริมค่ะ"
23007-230070410 = "คุณครูไปด้วยกันหน่อยได้มั้ยคะ?"
23007-230070420 = "ไปซื้ออุปกรณ์ใช่มั้ย?"
23007-230070430 = "ค่ะ ไปซื้ออุปกรณ์ค่ะ"
23007-230070440 = "ใส่ชุดปกติไปใช่มั้ย?"
23007-230070450 = "ค่ะ ใช่แล้วค่ะ "
23007-230070460 = "อืม... ถ้างั้นก็ได้นะ"
23007-230070470 = "ขอบคุณค่ะ"
23007-230070480 = "ถ้างั้นหลังเลิกเรียน ฉันจะรอที่ประตู\nหน้าตึก 5 นะคะ    "
23007-230070490 = "คุณครูคะ"
23007-230070500 = "ให้ฉันส่งถุงเท้าคู่ใหม่ไปที่ห้องทำงาน\nของคุณครูมั้ยคะ?"
23007-230070510 = "อย่าหาทำเชียวนะ!"
23007-230070520 = "คุณครูคะ?"
23007-230070530 = "วันนี้..."
23007-230070540 = "..."
23007-230070550 = "...?"
23007-230070560 = "ฮานาโกะ?"
23007-230070570 = "ฮิฮิ"
23007-230070580 = "..."
23007-230070590 = "ไม่มีอะไรค่ะ"
23007-230070600 = "ว่าแล้วเชียว..."
23007-230070610 = "คุณครูไม่ต้องใส่ใจก็ได้นะคะ"
23007-230070620 = "อ๊ะ คุณครู..."
23007-230070630 = "ฉันได้ยินข่าวมาค่ะ"
23007-230070640 = "ว่าคุณครูจะแวะมาทำธุระที่ทรีนิตี้น่ะค่ะ"
23007-230070650 = "ก็ประมาณนั้นแหละ..."
23007-230070660 = "ไปได้ยินมาจากไหนเหรอ?"
23007-230070670 = "ฮุฮุ♡"
23007-230070680 = "ถ้าโชคดี"
23007-230070690 = "ได้เจอกันตอนที่คุณครูแวะมา\nก็คงดีนะคะ"
23007-230070700 = "อ๊ะ ฉันไม่ได้บังคับว่าเราต้องมาเจอกัน\nหรอกนะคะ"
23007-230070710 = "แต่หมายถึง"
23007-230070720 = "ถ้าบังเอิญมีโอกาสได้เจอกันน่ะค่ะ"
23007-230070730 = "คุณครูคะ กลับถึงที่พักอย่างปลอดภัย\nรึเปล่าคะ?"
23007-230070740 = "คราวหน้าที่คุณครูมา..."
23007-230070750 = "ถ้ามีเวลามากกว่านี้ก็คงดีนะคะ"
23007-230070760 = "และถึงตอนนั้น..."
23007-230070770 = "ก็ขอให้สนุกด้วยกัน..."
23007-230070780 = "เหมือนทุกครั้งนะคะ♡"

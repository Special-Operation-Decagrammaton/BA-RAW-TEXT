23007-230070090 = "Heehee."
23007-230070100 = "Thank you."
23007-230070110 = "Heehee."
23007-230070120 = "Um... I'll ask you when you get here."
23007-230070130 = "I'll be waiting for you, Sensei."
23007-230070140 = "Thanks so much for today, Sensei."
23007-230070150 = "I had a great day thanks to you."
23007-230070160 = "It was just a make-up lesson..."
23007-230070170 = "Heehee."
23007-230070180 = "..."
23007-230070190 = "I see."
23007-230070200 = "Are you free right now, Sensei?"
23007-230070210 = "I'm in a bit of a pickle and was wondering if you could help me."
23007-230070220 = "What's wrong?"
23007-230070230 = "Did something happen?"
23007-230070240 = "Hmm."
23007-230070250 = "I guess so. I'm locked inside the gym..."
23007-230070260 = "The door opens from the outside, so you just have to come let me out."
23007-230070270 = "Would that be okay?"
23007-230070280 = "I'll be right there."
23007-230070290 = "Don't worry. I'll be right there."
23007-230070300 = "...Heehee."
23007-230070310 = "Thanks. I'll be waiting for you."
23007-230070320 = "Sensei."
23007-230070330 = "Where are you, Sensei?"
23007-230070340 = "Are you listening? Thank you so much for today. I feel so much better."
23007-230070350 = "I'm not sure how you feel about this, but..."
23007-230070360 = "..."
23007-230070370 = "I'm being sincere.  "
23007-230070380 = "Sensei? It's Hanako."
23007-230070390 = "I'm going to buy stuff I need for "
23007-230070400 = "the Make-Up Work Club after school today."
23007-230070410 = "Can you come with me?"
23007-230070420 = "You need to buy some stuff?"
23007-230070430 = "Yeah."
23007-230070440 = "You're just gonna wear regular clothes?"
23007-230070450 = "Yes, that's right. "
23007-230070460 = "Okay. Then I'll go with you."
23007-230070470 = "Thank you."
23007-230070480 = "I'll be waiting for you at Gate 5 after school."
23007-230070490 = "Sensei."
23007-230070500 = "Can I send new socks to your office?"
23007-230070510 = "Don't!"
23007-230070520 = "Sensei?"
23007-230070530 = "Today"
23007-230070540 = "..."
23007-230070550 = "...?"
23007-230070560 = "Hanako?"
23007-230070570 = "Heehee."
23007-230070580 = "..."
23007-230070590 = "Never mind."
23007-230070600 = "Actually..."
23007-230070610 = "Don't worry about it."
23007-230070620 = "Oh, Sensei."
23007-230070630 = "I've heard some whispers in the rumor mill."
23007-230070640 = "Is it true you'll be visiting Trinity soon?"
23007-230070650 = "Yes I am, but..."
23007-230070660 = "Who did you hear that from?"
23007-230070670 = "Heehee."
23007-230070680 = "If I'm lucky,"
23007-230070690 = "I'll get to see you during your visit."
23007-230070700 = "Oh, I'm not going to force it or anything."
23007-230070710 = "But with a little serendipity,"
23007-230070720 = "our paths will cross, hopefully."
23007-230070730 = "Sensei, did you get back okay?"
23007-230070740 = "I hope we can have more time together"
23007-230070750 = "the next time you visit."

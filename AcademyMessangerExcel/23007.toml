[translation]
23007-230070010 = "Sensei. It's Hanako."
23007-230070020 = "I think this is the first time I'm texting you like this."
23007-230070030 = "Thank you for making yourself available. "
23007-230070040 = "Regarding the make-up class... "
23007-230070050 = "I have something to ask you. "
23007-230070060 = "Do you have a moment?"
23007-230070070 = "Of course."

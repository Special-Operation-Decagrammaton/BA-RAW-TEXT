[translation]
20048-200480010 = "คุณครู"
20048-200480020 = "สนุกกับการพักผ่อนอยู่หรือเปล่าคะ?"
20048-200480030 = "ครูได้พักผ่อนเยอะเลยละ ขอบใจนะ"
20048-200480040 = "ถ้างั้น"
20048-200480050 = "คุณครูช่วยรีบ"
20048-200480060 = "มาที่เต็นท์ของฉัน"
20048-200480070 = "แบบไม่ให้มีใครรู้ได้มั้ยคะ?"
20048-200480080 = "หืม?"
20048-200480090 = "จะว่าไป คุณครูคะ"
20048-200480100 = "เห็นเต็นท์สีเบจที่อยู่ข้างๆ ต้นมะพร้าว\nต้นใหญ่มั้ยคะ?"
20048-200480110 = "อ๊ะ เพิ่งเจอเลย"
20048-200480120 = "ฉันลืมบอกไปน่ะค่ะ"
20048-200480130 = "ใช้ของที่อยู่ข้างในนั้นได้ตามใจเลย\nนะคะ"
20048-200480140 = "ฉันเตรียมไว้ให้ทุกคนได้สนุกกัน\nแต่ก็ไม่มีใครเข้ามาใช้เลย..."
20048-200480150 = "ข้างในมีอะไรงั้นเหรอ...?"
20048-200480160 = "คุณครู"
20048-200480170 = "ไม่ต้องกังวลเกี่ยวกับฉันก็ได้ค่ะ"
20048-200480180 = "หืม...?"
20048-200480190 = "คุณครู"
20048-200480200 = "รู้วิธีตกปลามั้ยคะ...?"
20048-200480210 = "อ่า... ก็นิดหน่อย...?"
20048-200480220 = "ถ้างั้น"
20048-200480230 = "มาช่วยฉันสักหน่อยจะได้มั้ยคะ...?"

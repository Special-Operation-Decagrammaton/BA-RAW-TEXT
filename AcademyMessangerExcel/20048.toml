[translation]
20048-200480010 = "선생님"
20048-200480020 = "휴양은 잘 즐기고 계신지요?"
20048-200480030 = "덕분에 푹 쉬고 있어. 고마워."
20048-200480040 = "그럼"
20048-200480050 = "최대한 조용히"
20048-200480060 = "절대로 들키지 말고"
20048-200480070 = "빠르게 제 텐트로 와 주실 수 있으신가요?"
20048-200480080 = "응?"
20048-200480090 = "그러고 보니 선생님"
20048-200480100 = "큰 야자수 옆에 설치된 베이지색 텐트 보셨나요?"
20048-200480110 = "아, 지금 발견했어."
20048-200480120 = "깜박하고 말씀드리지 않았는데"
20048-200480130 = "그 안에 있는 것들은 자유롭게 쓰셔도 된답니다."
20048-200480140 = "다들 즐기실 수 있도록 준비한 것입니다만, 아직 아무도 사용하지 않은 것 같아서……."
20048-200480150 = "대체 안에 뭐가 들어 있길래……?"
20048-200480160 = "선생님"
20048-200480170 = "저에 대해서는 걱정하지 않으셔도 됩니다."
20048-200480180 = "응……?"
20048-200480190 = "선생님"
20048-200480200 = "혹시 낚시할 줄 아시나요……?"
20048-200480210 = "어…… 대충은……?"
20048-200480220 = "그럼 혹시"
20048-200480230 = "저 좀 도와주실 수 있으신가요……?"

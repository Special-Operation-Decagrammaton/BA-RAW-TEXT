[translation]
20048-200480010 = "老師"
20048-200480020 = "正在好好享受度假嗎？"
20048-200480030 = "託你的福，我休息得很充分"
20048-200480040 = "那麼"
20048-200480050 = "能請您盡可能安靜地"
20048-200480060 = "在絕對不被發現的情況下"
20048-200480070 = "盡快到我的帳篷來嗎？"
20048-200480080 = "嗯？"
20048-200480090 = "話說老師"
20048-200480100 = "請問您有看到設置在大棕櫚樹旁的米色帳篷嗎？"
20048-200480110 = "啊，現在看到了"
20048-200480120 = "剛才忘了跟您說"
20048-200480130 = "裡面的東西都可以自由使用哦"
20048-200480140 = "本來是為了讓大家都能享受而準備的，可惜似乎還沒有人用過……"
20048-200480150 = "裡面究竟放了什麼……？"
20048-200480160 = "老師"
20048-200480170 = "關於我的事，您不用擔心"
20048-200480180 = "嗯……？"
20048-200480190 = "老師"
20048-200480200 = "請問您會釣魚嗎……？"
20048-200480210 = "這個嘛……多少會一點……？"
20048-200480220 = "那麼"
20048-200480230 = "能請您幫幫我嗎……？"

[translation]
20022-200220010 = "你好，老師"
20022-200220020 = "快要過年了呢"
20022-200220030 = "今年也受你照顧了"
20022-200220040 = "彼此彼此，我也受你照顧了"
20022-200220050 = "風華今天有什麼計畫嗎？"
20022-200220060 = "我今天應該也會忙著處理供給部的事……"
20022-200220070 = "不過不要緊"
20022-200220080 = "我會全力以赴，努力到最後的！"
20022-200220090 = "那個……早安"
20022-200220100 = "起來就發現已經這個時間了……"
20022-200220110 = "風華居然睡過頭，真是少見……！"
20022-200220120 = "真是太丟臉了……"
20022-200220130 = "別在意，這個時期睡過頭很正常的。又很可愛"
20022-200220140 = "真，真是的"
20022-200220150 = "請別取笑我了"
20022-200220160 = "話說回來，那個"
20022-200220170 = "雖然可能已經錯過時機了"
20022-200220180 = "方便的話，要不要一起吃稍微晚了點的跨年蕎麥麵呢？"
20022-200220190 = "風華親手做的料理！我現在就想吃！"
20022-200220200 = "謝，謝謝老師"
20022-200220210 = "因為還需要做些準備，傍晚左右可以嗎？"
20022-200220220 = "我會在食堂等你的"
20022-200220230 = "老師，你今天也很忙嗎？"
20022-200220240 = "我想連假也快結束了，於是就聯絡了老師……"
20022-200220250 = "休假的日子為何總是過得這麼快呢……"
20022-200220260 = "我和平時一樣唷。風華呢？"
20022-200220270 = "那個，該說一晃眼就過去了嗎……"
20022-200220280 = "但是明天就要開始為供給部做準備"
20022-200220290 = "所以明天得去購買食材才行"
20022-200220300 = "也就是說，今天是連假的最後一天……！？"
20022-200220310 = "確，確實是呢"
20022-200220320 = "該說平常就這樣嗎"
20022-200220330 = "畢竟是供給部，這也沒辦法"
20022-200220340 = "不會沒辦法唷！"
20022-200220350 = "既然如此，今天得綁架風華才行……"
20022-200220360 = "什麼！？"
20022-200220370 = "連，連老師都要綁架我嗎！？"
20022-200220380 = "畢竟是難得的連假最後一天啊！"
20022-200220390 = "這，這是什麼意思……？"

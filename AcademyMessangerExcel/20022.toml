[translation]
20022-200220010 = "สวัสดีค่ะคุณครู"
20022-200220020 = "สิ้นปีแล้วนะคะ"
20022-200220030 = "ขอให้คุณครูมีช่วงเวลาดีๆ ในตอน\nสิ้นปีนะคะ"
20022-200220040 = "ปีนี้ฟูกะก็เก่งมากเลยนะ"
20022-200220050 = "วันนี้จะทำอะไรเหรอ?"
20022-200220060 = "วันนี้คงยุ่งกับงานของชมรมโภชนาการ\nนิดหน่อยค่ะ"
20022-200220070 = "แต่ไม่เป็นไรค่ะ"
20022-200220080 = "การพยายามเต็มที่ให้ถึงที่สุด\nคือหน้าที่ของฉันค่ะ"
20022-200220090 = "สวัสดีค่ะคุณครู"
20022-200220100 = "ฉัน... นอนตื่นสายซะแล้วค่ะ"
20022-200220110 = "ฟูกะนอนตื่นสายงั้นเรอะ!"
20022-200220120 = "อายจัง... ที่ให้คุณครูได้เห็นด้านที่\nน่าอายแบบนี้"
20022-200220130 = "ฟูกะที่เป็นแบบนั้นก็ดูน่ารักดีนะ"
20022-200220140 = "จะ... จริงๆ เลย"
20022-200220150 = "อย่าตกใจนะคะ..."
20022-200220160 = "คือว่า คุณครู..."
20022-200220170 = "ถึงจะช้าไปสักหน่อย..."
20022-200220180 = "คุณครูอยากมารับประทานโทชิโคชิ\nโซบะด้วยกันมั้ยคะ?"
20022-200220190 = "โทชิโคชิโซบะกับฟูกะเหรอ?!\nต้องไปอยู่แล้ว!"
20022-200220200 = "คะ... ค่อยยังชั่วหน่อยค่ะ"
20022-200220210 = "ถ้างั้นเจอกันตอนเย็นนะคะ"
20022-200220220 = "แล้วฉันจะรอนะคะ"
20022-200220230 = "สบายดีรึเปล่าคะคุณครู?"
20022-200220240 = "วันหยุดยาว... ผ่านไปแล้วค่ะ"
20022-200220250 = "ทำไมช่วงเวลาแบบนี้ถึงผ่านไปเร็วจัง\nเลยนะคะ?"
20022-200220260 = "ฟูกะสนุกกับวันหยุดยาวมั้ย?"
20022-200220270 = "ฉันก็ไม่ค่อยแน่ใจค่ะ"
20022-200220280 = "แต่ว่าพรุ่งนี้ฉันต้องออกไปซื้อวัตถุดิบ"
20022-200220290 = "เพื่อเตรียมงานของชมรมอีกแล้วละค่ะ"
20022-200220300 = "ถ้างั้นวันนี้ก็เป็นวันหยุดวันสุดท้าย\nแล้วน่ะสิ?!"
20022-200220310 = "อ่า..."
20022-200220320 = "พอมาลองคิดๆ ดูแล้ว... ก็คงจะเป็น\nแบบนั้นน่ะค่ะ"
20022-200220330 = "ก็นะ มันเป็นงานนี่คะ"
20022-200220340 = "จะบอกว่า 'เป็นงานนี่คะ' แล้วปล่อย\nผ่านไปได้ยังไงเล่า!"
20022-200220350 = "เดี๋ยวตอนบ่ายๆ ครูจะไปลักพาตัว\nฟูกะตันไปเอง!"
20022-200220360 = "คะ?!"
20022-200220370 = "คุณครูจะมาลักพาตัวฉันงั้นเหรอคะ?!"
20022-200220380 = "มีอีกอย่างหนึ่งที่ต้องทำก่อนจะผ่าน\nปีใหม่ไปไง!"
20022-200220390 = "ฉันเริ่มไม่เข้าใจสถานการณ์แล้วค่ะ..."

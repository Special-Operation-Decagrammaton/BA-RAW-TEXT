[translation]
20022-200220010 = "안녕하세요. 선생님."
20022-200220020 = "벌써 연말연시네요."
20022-200220030 = "새해에는 좋은 일만 있으시기를 바랄게요."
20022-200220040 = "후우카도 한 해 동안 수고 많았어."
20022-200220050 = "오늘 일정은 어때?"
20022-200220060 = "오늘도 급양부 일로 바쁠 것 같아요."
20022-200220070 = "하지만 괜찮아요."
20022-200220080 = "마지막까지 최선을 다하는 게, 제 사명인걸요."
20022-200220090 = "안녕하세요. 선생님."
20022-200220100 = "저는…… 늦잠을 자 버렸답니다."
20022-200220110 = "늦잠을 자는 후우카라니!"
20022-200220120 = "민망한 모습을 보여드려 부끄럽네요……"
20022-200220130 = "그런 후우카도 신선하고 귀여워."
20022-200220140 = "저, 정말."
20022-200220150 = "놀리지 말아 주세요……"
20022-200220160 = "저기, 선생님."
20022-200220170 = "시기는 조금 맞지 않을지도 모르지만."
20022-200220180 = "해넘이 국수를 함께 드시지 않으시겠어요?"
20022-200220190 = "후우카의 국수라니! 당연히 먹어야지!"
20022-200220200 = "다, 다행이다."
20022-200220210 = "그러면 저녁에 뵈어요."
20022-200220220 = "기다리겠습니다."
20022-200220230 = "잘 지내고 계시나요, 선생님."
20022-200220240 = "연휴도…… 끝나 가네요."
20022-200220250 = "정말, 왜 이럴 때만 시간이 이렇게 빨리 갈까요?"
20022-200220260 = "후우카는 연휴 잘 보냈어?"
20022-200220270 = "잘 모르겠어요."
20022-200220280 = "하지만 내일부터는 다시 급양부의 일을 위해"
20022-200220290 = "식재료를 사러 가야 하네요."
20022-200220300 = "그러면 사실상 오늘이 마지막 휴일인 거야?!"
20022-200220310 = "어……"
20022-200220320 = "잘 생각해 보니 그러네요?"
20022-200220330 = "뭐, 일이니까요."
20022-200220340 = "'일이니까요' 하고 넘길 게 아니잖아!"
20022-200220350 = "오후에 당장 후우카 땅을 납치하겠습니다."
20022-200220360 = "네?!"
20022-200220370 = "저, 선생님에게까지 납치당하는 건가요?!"
20022-200220380 = "기모노를 다시 넣어두기 전에 할 일이 있으니까!"
20022-200220390 = "점점 더 모르게 되어가고 있어요……"

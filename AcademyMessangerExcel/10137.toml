[translation]
10137-101370010 = "선생님, 안녕하십니까."
10137-101370020 = "시마 코노카입니다. "
10137-101370030 = "코노카?!"
10137-101370040 = "평소하고 말투가 다르지 않아……?"
10137-101370050 = "네?"
10137-101370060 = "평소에도 이 말투였지 않습니까?"
10137-101370070 = "아무튼, 오늘의 운세는 '자기소개를 잘할 것'이라서요,"
10137-101370080 = "그래서 자기소개 해봤습니다."
10137-101370090 = "안 했으면 몰라볼 뻔했슴다!"
10137-101370100 = "에이, 섭섭합니다. 그보다 무슨 말투십니까, 그게."
10137-101370110 = "나중에, 발키리에 한번 와주시면 감사하겠습니다. 행정 관련해서 상의할 게 있습니다."
10137-101370120 = "언제건 와주시면 감사하겠습니다."
10137-101370130 = "와, 엄청 맵습니다."
10137-101370140 = "지금은 좀 괜찮아?"
10137-101370150 = "괜찮습니다. 뭐 이런 거 가지고."
10137-101370160 = "냉장고에 우유가 있어서 다행이었습니다."
10137-101370170 = "그 아이…… 혹시 혼냈니?"
10137-101370180 = "에이, 왜 혼냅니까."
10137-101370190 = "저도 신참이었을 때 비슷했을 겁니다."
10137-101370200 = "그런 의욕 있는 친구들이 있어야 조직이 굴러가지 않습니까."
10137-101370210 = "부국장답게 멋진걸!"
10137-101370220 = "그리고 제 잘못도 있습니다."
10137-101370230 = "오늘 운세대로, 자기소개를 안 하지 않았습니까?"
10137-101370240 = "어쩔 수 없습니다. ㅋㅋ."
10137-101370250 = "안녕하십니까, 선생님."
10137-101370260 = "오늘 운세는, '시간을 잘 지키기'라고 합니다."
10137-101370270 = "그건 당연한 거 아닙니까?"
10137-101370280 = "당연하지만 꽤 힘든 일이긴 하지!"
10137-101370290 = "원래 운세에서 하라는 일은 평소에 해도 좋은 일입니다."
10137-101370300 = "안 하면 그날 하루가 특히 더 꼬이긴 하겠지만 말입니다."
10137-101370310 = "그냥 재밌어서 공유드리려고 모모톡 보내봤습니다."
10137-101370320 = "오늘 하루 잘 보내십시오!"
10137-101370330 = "선생님, 놀라셨습니까."
10137-101370340 = "아침부터 운세를 잘 따르니 좋지 말입니다."
10137-101370350 = "시간 약속 지키기는…… 어제 운세 아니야?"
10137-101370360 = "어?"
10137-101370370 = "아"
10137-101370380 = "그럼 오늘의 운세는"
10137-101370390 = "'너무 시간에 얽매이지 말라'"
10137-101370400 = "……"
10137-101370410 = "아……."
10137-101370420 = "선생님, 기밀 사항이 있습니다."
10137-101370430 = "이제는 선생님께 알려드려도 좋을 것 같습니다."
10137-101370440 = "주소 보내드릴 테니, 거기서 뵙겠습니다."
10137-101370450 = "안녕하십니까? 선생님."
10137-101370460 = "오늘의 운세는 '버디가 있어야 한다', 랍니다."
10137-101370470 = "그래서 말인데, 오늘 하루 버디가 되어주시는 건 어떻겠습니까?"
10137-101370480 = "기대하겠습니다."
10137-101370490 = "야"
10137-101370500 = "오늘 이 언니가 아파 죽겠어서 못 나간다."
10137-101370510 = "주말 당직자들 나 없다고 일만 시키지 말고, 놀면서 하라고 해."
10137-101370520 = "그럼 다시 잔다."
10137-101370530 = "??"
10137-101370540 = "부국장한테 ?? 이러네"
10137-101370550 = "비 쫄딱 맞아서 감기 걸린 거야 임마"
10137-101370560 = "그럼 나중에 보자 ㅋㅋ"
10137-101370570 = "완전 회복!"
10137-101370580 = "선생님, 잘 들어가셨습니까?"
10137-101370590 = "감기, 옮으신 거 아니십니까?"
10137-101370600 = "멀쩡해!"
10137-101370610 = "그냥 열나고 목 아프고 피곤하기만 해!"
10137-101370620 = "그게 감기 걸린 건데 뭐가 멀쩡합니까"
10137-101370630 = "ㅋㅋㅋ"
10137-101370640 = "이번에는 제가 문병하러 가겠습니다."
10137-101370650 = "돈코츠 라멘 포장해 가겠습니다!"

[translation]
10028-100280010 = "นายท่าน! ทำอะไรอยู่เหรอ?\nนอนอยู่เหรอ?"
10028-100280020 = "อืม~ ดึกขนาดนี้ คงจะนอนแล้วสินะ?"
10028-100280030 = "ไม่เป็นไร ครูยังไม่นอนน่ะ"
10028-100280040 = "ว่าแต่อาสึนะยังไม่นอนเหรอ?"
10028-100280050 = "หืม?"
10028-100280060 = "ฉันเหรอ?"
10028-100280070 = "พอดีฉันมีเรื่องที่ต้องทำนิดหน่อยน่ะ"
10028-100280080 = "ฉันอยู่ที่ร้านซักผ้าหยอดเหรียญ"
10028-100280090 = "อ๋อ ไม่เกี่ยวกับเรื่องงานหรอกนะ ไม่ต้องห่วง~"
10028-100280100 = "ไม่ได้ทำงานแต่ก็ยังไม่นอนเนี่ยนะ...?"
10028-100280110 = "จู่ๆ ครูก็รู้สึกเป็นห่วงอาสึนะขึ้นมาแล้วสิ"
10028-100280120 = "ฮ่าฮ่าฮ่า!"
10028-100280130 = "เป็นห่วงฉันเหรอ? แต่ว่าไม่ต้องห่วงหรอกนะ!"
10028-100280140 = "ถ้างั้นก็ฝันดีนะ!"
10028-100280150 = "นายท่าน!"
10028-100280160 = "คือว่านายท่านรู้รึเปล่า\nว่าชีวิตของกระต่ายเป็นยังไง?"
10028-100280170 = "ฉันมาถามเพราะเผื่อนายท่านจะรู้"
10028-100280180 = "กระต่ายเหรอ?"
10028-100280190 = "ฮิฮิ"
10028-100280200 = "ฉันลองไปสำรวจดูจากรอบๆ แล้ว\nแต่ก็ยังไม่ค่อยเข้าใจเท่าไร"
10028-100280210 = "อืม"
10028-100280220 = "เพราะงั้นในเวลาแบบนี้..."
10028-100280230 = "อาสึนะ...?"
10028-100280240 = "อื้อ!"
10028-100280250 = "เราก็ต้องไปดูให้เห็นด้วยตาตัวเองยังไงล่ะ!"
10028-100280260 = "นายท่าน!"
10028-100280270 = "จะไปไหนเหรอ นายท่าน?"
10028-100280280 = "หรือว่าจะเล่นซ่อนหากับฉันเหรอ?"
10028-100280290 = "ดีล่ะ"
10028-100280300 = "อาสึนะไม่ยอมแพ้หรอกนะ!"
10028-100280310 = "ยอมแพ้หน่อยไม่ได้เหรอ"
10028-100280320 = "ต้องให้ครูลูบหัวตอนที่ใส่ชุดแบบนั้นจริงๆ เหรอ?"
10028-100280330 = "หืม?"
10028-100280340 = "อืม"
10028-100280350 = "ใช่แล้ว!"
10028-100280360 = "นายท่าน"
10028-100280370 = "นายท่านอยู่ที่ไหนน่ะ?"
10028-100280380 = "ฉันเล่าเรื่องคราวก่อนให้ทุกคนฟังแล้ว\nทุกคนก็พูดเป็นเสียงเดียวกันเลยว่า\nบันนี่เกิร์ลไม่ใช่กระต่าย"
10028-100280390 = "ที่นายท่านวิ่งหนีไปก็เพราะมีเหตุผล\nอยู่นี่เอง!"
10028-100280400 = "ขอโทษนะ!"
10028-100280410 = "ไม่เป็นไรหรอก โชคดีจังที่เธอรู้สักที..."
10028-100280420 = "อื้อ!"
10028-100280430 = "เพราะงั้นฉันเลยมีเรื่องอยากจะถามหน่อย"
10028-100280440 = "อืม~ ไว้ฉันจะไปหานายท่านนะ!"
10028-100280450 = "นายท่าน... นายท่าน!"
10028-100280460 = "เป็นยังไงบ้าง?\nนายท่านสนุกรึเปล่า?"
10028-100280470 = "ตอนนี้ถึงเวลาที่จะต้องตอบแล้วนะ!"
10028-100280480 = "อื้อ สนุกมากเลยล่ะ"
10028-100280490 = "ต่อไปก็รบกวนด้วยนะ"
10028-100280500 = "…"
10028-100280510 = "...!!!!!"
10028-100280520 = "โอ๊สสสส"
10028-100280530 = "ดี! ดีมากเลย! ได้คำตอบแล้วล่ะ!"
10028-100280540 = "ขอบคุณนะนายท่าน!"
10028-100280550 = "นายท่านๆ!"
10028-100280560 = "วันนี้นายท่านยุ่งมั้ย? มีเวลาออกมาเล่น\nด้วยกันมั้ย?"
10028-100280570 = "ที่จริงครูก็ไม่ได้ยุ่งมากมายอะไร..."
10028-100280580 = "อืม... มีเรื่องอะไรเหรอ?"
10028-100280590 = "อื้อๆ ดีเลย!"
10028-100280600 = "ฉันตัดสินใจแล้ว!"
10028-100280610 = "ถ้างั้นเดี๋ยวเจอกันแล้วฉัน\nจะเล่าให้ฟังนะ!"
10028-100280620 = "อื้อ! ให้เจอกันก่อน!!"
10028-100280630 = "???"
10028-100280640 = "อาสึนะ??"
10028-100280650 = "ฮ่ะฮ่ะฮ่ะฮ่าา!"
10028-100280660 = "วันนี้สนุกมากเลยละนายท่าน!"
10028-100280670 = "เพราะทุกครั้งเวลาที่ได้เจอนายท่านจะ\nได้แสดงอะไรใหม่ๆ ให้ดูตลอดไงล่ะ"
10028-100280680 = "บางครั้งครูก็อยากดูแบบเดิมนะ"
10028-100280690 = "ครูดีใจนะที่อาสึนะสนุกน่ะ"
10028-100280700 = "ฮ่ะฮ่ะฮ่ะฮ่า!!"
10028-100280710 = "ถ้างั้นเพื่อให้นายท่านได้ดูตลอด"
10028-100280720 = "อาสึนะคงต้องไปหานายท่านทุกวันแล้ว\nละเนอะ?"
10028-100280730 = "อื้อ!"
10028-100280740 = "อาสึนะเฝ้ารอทุกวัน และไม่เคยหมดหวัง\nที่จะได้ไปเที่ยวกับนายท่านเลยนะ"
10028-100280750 = "ต่อจากนี้ไปนายท่านก็จะเล่นกับอาสึนะ\nเยอะๆ เลยใช่มั้ย?"
10028-100280760 = "ถ้างั้นพรุ่งนี้เจอกันนะ นายท่าน!!"

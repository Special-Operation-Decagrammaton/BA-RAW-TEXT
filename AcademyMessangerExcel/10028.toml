[translation]
10028-100280010 = "主人──！現在在做什麼？睡了嗎？睡著了啊──"
10028-100280020 = "已經是這個時間了呢"
10028-100280030 = "還醒著唷，怎麼了？"
10028-100280040 = "明日奈，這麼晚了還醒著啊"
10028-100280050 = "哦"
10028-100280060 = "嚇一跳！你醒著阿！"
10028-100280070 = "我現在有點事要辦"
10028-100280080 = "現在在24小時營業的投幣式自助洗衣店裡"
10028-100280090 = "啊，不是在工作唷。所以閒得發慌，就想說密你一下"
10028-100280100 = "明明不是工作，虧你這個時間還醒著呢……？"
10028-100280110 = "回去的路上還好吧？有人在嗎？"
10028-100280120 = "啊哈哈！"
10028-100280130 = "謝謝你的關心，但是沒問題的！"
10028-100280140 = "那麼，祝你有個愉快的夜晚！"
10028-100280150 = "主人──"
10028-100280160 = "主人對兔子了解深嗎？"
10028-100280170 = "想說主人可能會知道"
10028-100280180 = "兔子？"
10028-100280190 = "嗯！"
10028-100280200 = "我調查了很多，但總覺得還不夠到位"
10028-100280210 = "唔嗯"
10028-100280220 = "這樣的話果然……"
10028-100280230 = "……？"
10028-100280240 = "決定了！"
10028-100280250 = "果然只能實際確認一下了！"
10028-100280260 = "主人──！"
10028-100280270 = "去哪裡了？"
10028-100280280 = "難道是在玩捉迷藏嗎？"
10028-100280290 = "呵呵，那就交給我吧"
10028-100280300 = "明日奈是不會放棄的！"
10028-100280310 = "可以的話，放棄吧……"
10028-100280320 = "你穿那樣要我撫摸的話，有點……"
10028-100280330 = "耶──？"
10028-100280340 = "唔嗯……"
10028-100280350 = "不──要♪不會放棄的唷！"
10028-100280360 = "主人──"
10028-100280370 = "現在在哪裡？"
10028-100280380 = "前陣子跟大家聊天，他們說「兔女郎和兔子不一樣吧？」"
10028-100280390 = "這就是為什麼主人那時候之所以逃走嗎？"
10028-100280400 = "是那樣嗎？"
10028-100280410 = "大概是那種感覺吧……"
10028-100280420 = "原來！"
10028-100280430 = "那我想再問一件事"
10028-100280440 = "晚點過去主人那邊唷！"
10028-100280450 = "啊，這麼說來忘了問！"
10028-100280460 = "怎麼樣呀，主人，高興嗎？開心嗎？"
10028-100280470 = "會回答我吧？"
10028-100280480 = "和明日奈在一起總是很開心唷"
10028-100280490 = "如果明日奈也開心的話，我就很高興了"
10028-100280500 = "……"
10028-100280510 = "！！"
10028-100280520 = "好像明白了"
10028-100280530 = "嗯！原來如此呀！"
10028-100280540 = "非常感謝──主人！今後也會帶給你很多很──多的快樂唷！"
10028-100280550 = "主人──！"
10028-100280560 = "今天忙嗎？"
10028-100280570 = "完全沒問題唷"
10028-100280580 = "有什麼事嗎？"
10028-100280590 = "太好了！！"
10028-100280600 = "那就決定了！"
10028-100280610 = "細節之後再說"
10028-100280620 = "我等著唷！"
10028-100280630 = "？？？"
10028-100280640 = "明日奈？"
10028-100280650 = "主人！"
10028-100280660 = "今天也非常開心唷！"
10028-100280670 = "和主人見面，每次真的都很開心呢"
10028-100280680 = "雖然心臟有時候會痛……但也差不多該習慣了呢"
10028-100280690 = "明日奈開心的話就太好了"
10028-100280700 = "啊哈哈！！"
10028-100280710 = "那～為了讓老師開心，果然…！"
10028-100280720 = "明日奈今後要，每天都去找主人喔！"
10028-100280730 = "嗯，決定了！"
10028-100280740 = "這樣的話，每天都會變得很快樂！"
10028-100280750 = "今後也會和明日奈一起玩吧？"
10028-100280760 = "那明天也拜託了，主人！！"

[translation]
20034-200340010 = "해마다 이 시즌이 되면, 상점가에서 여러 가지 이벤트를 개최하곤 하죠."
20034-200340020 = "아카리도 그런 이벤트에 흥미가 있구나."
20034-200340030 = "물론이죠."
20034-200340040 = "그것이 먹는 것과 관련된 일이라면, 특히요."
20034-200340050 = "상점가…… 이벤트…… 먹는 것……?"
20034-200340060 = "후후."
20034-200340070 = "기대되시나요?"
20034-200340080 = "저는 기대되네요!"
20034-200340090 = "오조니는 맛있는 음식이죠."
20034-200340100 = "그 덕분에 사소한 문제가 생겨 버렸지만요."
20034-200340110 = "아카리가 사소하다고 말하니까……."
20034-200340120 = "왠지 그렇게 들리지가 않아……."
20034-200340130 = "어머나."
20034-200340140 = "이번엔 정말로 사소한 일이에요."
20034-200340150 = "오조니용으로 떡을 너무 많이 넣는 바람에,"
20034-200340160 = "집에 있는 떡을 전부 사용해 버렸다는 문제거든요."
20034-200340170 = "적당함이야말로 미덕인 것이었을텐데……."
20034-200340180 = "하지만 저는 떡을 더 많이 먹고 싶은걸요."
20034-200340190 = "바로 그래서."
20034-200340200 = "제가 준비한 것이 있답니다."
20034-200340210 = "이런 시즌에는"
20034-200340220 = "특별한 음식을 먹으면서, 특별한 시간을 기리곤 하죠."
20034-200340230 = "멋진 문화라고 생각해요."
20034-200340240 = "특별히 먹고 싶은 거라도 있어?"
20034-200340250 = "먹고 싶은 것이라기보단."
20034-200340260 = "갑자기, 먹어 보고 싶어진 것이 있어요."
20034-200340270 = "그런 의미에서 소문이라는 것은 강력하죠."
20034-200340280 = "없던 마음도 생겨나게 하거든요."
20034-200340290 = "어딘가에서 맛있는 음식에 대한 소식을 들은 모양이네."
20034-200340300 = "정확합니다."
20034-200340310 = "선생님께서도 들어 보시면 흥미가 생기실걸요?"

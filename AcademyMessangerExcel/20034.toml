[translation]
20034-200340010 = "每年一到這個時期，商店街就會舉辦很多活動"
20034-200340020 = "原來亞伽里也對那種活動有興趣啊"
20034-200340030 = "當然囉"
20034-200340040 = "尤其……是跟食物有關的活動"
20034-200340050 = "商店街……活動……食物……？"
20034-200340060 = "呵呵"
20034-200340070 = "老師期待嗎？"
20034-200340080 = "我很期待！"
20034-200340090 = "年糕湯是道很好吃的料理"
20034-200340100 = "不過也因此出了一點小問題"
20034-200340110 = "亞伽里說的小問題……"
20034-200340120 = "總感覺不只是小問題……"
20034-200340130 = "哎呀"
20034-200340140 = "這次真的是件小事哦"
20034-200340150 = "只是因為放了太多年糕"
20034-200340160 = "所以家裡的年糕全都用光了而已"
20034-200340170 = "明明適當才是美德……"
20034-200340180 = "可是我就是想多吃一點年糕呀"
20034-200340190 = "因為這個原因"
20034-200340200 = "我做了一些準備"
20034-200340210 = "在這個時期"
20034-200340220 = "以吃特別的料理來讚揚特別的節日"
20034-200340230 = "我認為是種很棒的文化"
20034-200340240 = "你有什麼特別想吃的東西嗎？"
20034-200340250 = "比起想吃"
20034-200340260 = "應該更接近想嘗試看看的食物"
20034-200340270 = "傳言的影響力真的很大呢"
20034-200340280 = "足以讓人產生本來不會出現的想法"
20034-200340290 = "是在哪裡聽說了美食的傳聞嗎？"
20034-200340300 = "沒錯"
20034-200340310 = "我想老師聽完之後，應該也會有興趣的哦？"

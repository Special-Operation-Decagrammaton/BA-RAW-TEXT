[translation]
20034-200340010 = "เมื่อถึงช่วงนี้ของทุกปี ในย่านการค้า\nก็จะจัดกิจกรรมหลายอย่างเลยค่ะ"
20034-200340020 = "อาคาริเองก็สนุกกับกิจกรรม\nแบบนั้นสินะ"
20034-200340030 = "แน่นอนค่ะ"
20034-200340040 = "โดยเฉพาะถ้ามันเป็นเรื่องเกี่ยวกับ\nของกินน่ะค่ะ"
20034-200340050 = "ย่านการค้า... กิจกรรม... ของกิน...?"
20034-200340060 = "ฮุฮุ"
20034-200340070 = "ตื่นเต้นแล้วใช่มั้ยคะ?"
20034-200340080 = "ฉันก็ตื่นเต้นเหมือนกันค่ะ!"
20034-200340090 = "โอโซนิอร่อยมากเลยค่ะ"
20034-200340100 = "มันอร่อยจนอาจทำให้\nเกิดปัญหาเล็กๆ น้อยๆ ตามมา...."
20034-200340110 = "พออาคาริบอกว่าเล็กน้อย..."
20034-200340120 = "ครูไม่รู้สึกว่ามันเล็กน้อยเลยแฮะ..."
20034-200340130 = "ตายจริง "
20034-200340140 = "ครั้งนี้เป็นเรื่องเล็กน้อยจริงๆ นะคะ"
20034-200340150 = "เพราะปัญหาคือฉันใส่โมจิในโอโซนิ\nมากเกินไป "
20034-200340160 = "โมจิที่บ้านก็เลยหมดเกลี้ยงเลยค่ะ"
20034-200340170 = "ทีหลังใส่พอดีๆ น่าจะดีกว่านะ..."
20034-200340180 = "แต่ยังไงฉันก็อยากกินโมจิเยอะๆ ค่ะ"
20034-200340190 = "และเพราะอย่างนี้"
20034-200340200 = "ฉันก็เลยเตรียมบางอย่างไว้ค่ะ"
20034-200340210 = "ในฤดูกาลแบบนี้น่ะ"
20034-200340220 = "เราจะกินอาหารพิเศษและเฉลิมฉลอง\nเวลาที่พิเศษค่ะ"
20034-200340230 = "ฉันว่านี่เป็นวัฒนธรรมที่ยอดไปเลยค่ะ"
20034-200340240 = "มีอะไรที่อยากกินเป็นพิเศษมั้ย?"
20034-200340250 = "สิ่งที่อยากกินเหรอคะ?"
20034-200340260 = "อยู่ๆ ฉันมีสิ่งที่ 'อยากลองกิน' ดูค่ะ"
20034-200340270 = "พลังของการบอกปากต่อปากมันน่าทึ่ง\nมากเลยนะคะ"
20034-200340280 = "แค่ได้ยินก็ทำให้รู้สึกอยาก\nขึ้นมาได้เลย"
20034-200340290 = "คงไปได้ยินข่าวลือเกี่ยวกับอาหาร\nจากที่ไหนมาสินะ"
20034-200340300 = "ใช่แล้วค่ะ"
20034-200340310 = "ถ้าคุณครูได้ฟังก็น่าจะ\nอยากลองเหมือนฉันนะคะ"

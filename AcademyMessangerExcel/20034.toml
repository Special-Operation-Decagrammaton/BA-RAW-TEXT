[translation]
20034-200340010 = "Around this time each year, lots of events are held in the shopping district."
20034-200340020 = "I take it that those events have caught your eye?"
20034-200340030 = "Of course."
20034-200340040 = "Especially the ones with food."
20034-200340050 = "Wait... Shopping district... Events... Food?"
20034-200340060 = "Heehee."
20034-200340070 = "Are you excited?"
20034-200340080 = "I can't wait!"
20034-200340090 = "Ozoni is so delicious."
20034-200340100 = "So delicious it might've led to a little trouble..."
20034-200340110 = "When you say a \"little\" trouble..."
20034-200340120 = "It actually sounds like a big deal..."
20034-200340130 = "Oh, Sensei."
20034-200340140 = "It really is only a little bit of trouble. Promise."
20034-200340150 = "I put too much mochi in the ozoni,"
20034-200340160 = "and wound up using all the mochi I had left at home."
20034-200340170 = "Moderation in all things..."
20034-200340180 = "But I want more mochi."
20034-200340190 = "Which is exactly why"
20034-200340200 = "I've got a little something prepared."
20034-200340210 = "I always like"
20034-200340220 = "how we celebrate this season by eating good food and cherishing special moments."
20034-200340230 = "I think it's an awesome tradition."
20034-200340240 = "Was there a specific meal you had in mind?"
20034-200340250 = "Well it's not exactly a certain food,"
20034-200340260 = "but I do have a mighty craving for a special something."
20034-200340270 = "And to think, it all started from a little rumor."
20034-200340280 = "Even hearing about it makes my tummy rumble."
20034-200340290 = "Sounds like you just heard about a delicious new food."
20034-200340300 = "I did."
20034-200340310 = "And once you hear about it, you'll want some too, Sensei."

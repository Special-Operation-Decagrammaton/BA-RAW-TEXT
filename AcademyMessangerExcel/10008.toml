[translation]
10008-644 = "เฮ้ครู ช่วงนี้งานยุ่งใช่มั้ย?"
10008-645 = "แวะมาเจอหน้ากันที่โรงเรียนมิลเลเนียม\nบ้างสิ"
10008-646 = "ถึงฉันจะยุ่งแค่ไหน แต่ก็มีเวลามาเจอหน้า\nครูนะ"
10008-647 = "ได้สิ ถ้ามีเวลาจะแวะไปหานะ"
10008-648 = "อื้ม รอหน่อยนะ"
10008-649 = "ฮ่ะฮ่ะฮ่า ได้เลย"
10008-650 = "เฮ้อ ต่อไปถ้าจะมาก็บอกกันล่วงหน้านะ"
10008-651 = "แต่เนรุเป็นคนบอกให้ครูมาเองนี่นา?"
10008-652 = "แต่ครูบอกแล้วนี่ว่าจะแวะไป"
10008-653 = "ยะ... อย่างงั้นเหรอ? "
10008-654 = "ก็พอจำได้ลางๆ นะ..."
10008-655 = "เอาเถอะ!!"
10008-656 = "ฮึ่ม"
10008-657 = "แต่วันนี้ก็สนุกตั้งแต่เช้าเลยล่ะ"
10008-658 = "อาคาเนะ... ติดต่อทุกคนด้วย... "
10008-659 = "ฉันเองก็ไม่อยากจะเชื่อเลย แต่ดูเหมือน\nว่าจะเป็นหวัดน่ะ"
10008-660 = "ฉันต้องไปสายแน่ๆ เลย..."
10008-661 = "เนรุ? ส่งข้อความให้ผิดคนหรือเปล่า?"
10008-662 = "เนรุไม่สบายเหรอ?"
10008-663 = "เฮ้ครู โจ๊กไม่อร่อยเลย"
10008-664 = "แต่ก็... ขอบคุณที่มาเยี่ยมนะ"
10008-665 = "แล้วฉันจะตอบแทนบุญคุณครั้งนี้เอง"
10008-666 = "หายดีไวๆ นะ เนรุจัง"
10008-667 = "แล้วครูจะรอ"
10008-668 = "เฮ้ครู "
10008-669 = "เป็นยังไงบ้าง? ได้ยินมาว่าครูเป็นหวัด"
10008-670 = "เรื่องจริงเหรอ?"
10008-671 = "ใช่... ครูไอ... มีไข้..."
10008-672 = "ครูหนาวมากเลย..."
10008-673 = "โอเค รออยู่ตรงนั้นนะ"
10008-674 = "ฉันจะไปที่ชาเล่ต์"
10008-675 = "เฮ้อ ช่วงหลังนี้ฉันทั้งเข้าสายและขาด\nเรียนบ่อย จนเวลาเรียนแทบจะไม่พอแล้ว"
10008-676 = "ฉันควรทำยังไงดี"
10008-677 = "ครูว่าเนรุควรมาเข้าเรียนให้ตรงเวลานะ"
10008-678 = "ครูว่าเนรุควรขยันอีกหน่อยนะ"
10008-679 = "คะ...แค่พูดมันก็ง่ายสิ!"
10008-680 = "ขอเคล็ดลับอะไรที่ทำได้จริงหน่อยสิ"
10008-681 = "ไม่มีหรอก"
10008-682 = "เคล็ดลับอะไรกันล่ะ"
10008-683 = "......"
10008-684 = "รู้แล้วล่ะว่าต้องเป็นแบบนี้"
10008-685 = "ฮึ่ม! รู้แล้วน่ะว่าต้องมาเข้าเรียน"
10008-686 = "รู้แล้วว่าต้องขยัน! "
10008-687 = "แค่ไม่สายก็พอแล้ว!"
10008-688 = "สู้ๆ นะ"
10008-689 = "ครู~"
10008-690 = "อยากไปดูอะไรเจ๋งๆ มั้ย?"
10008-691 = "มันเจ๋งสุดๆ ไปเลยล่ะ!"
10008-692 = "น่าสงสัยแฮะ..."
10008-693 = "มันคืออะไรเหรอ?"
10008-694 = "ฮ่ะฮ่ะฮ่า! "
10008-695 = "ถ้าอยากรู้ก็มาหาฉันที่นี่สิ"
10008-696 = "มันเจ๋งมากกกเลยล่ะ! ตั้งตารอได้เลย"
10008-697 = "ถ้าอยากไปที่นั่นก็บอกฉันได้เลย! แล้ว\nฉันจะไปเป็นเพื่อน"
10008-698 = "ถ้าแอบไปคนเดียวล่ะก็ สู่ขิตแน่!!"
10008-699 = "ได้เลย ครูสัญญา"
10008-100080010 = "อา..."
10008-100080020 = "เบื่อจัง"
10008-100080030 = "ครู... ทำอะไรอยู่เหรอ?"
10008-100080040 = "นั่งหายใจทิ้งอยู่น่ะ"
10008-100080050 = "วันนี้เนรุคงว่างสินะ"
10008-100080060 = "ฮ่า..."
10008-100080070 = "ก็..."
10008-100080080 = "นานๆ จะได้หยุดสักทีน่ะ"
10008-100080090 = "ถ้าตอนนี้มีเวลาละก็ ออกมาข้างนอกมั้ย?"
10008-100080100 = "ไหนๆ ก็ว่างทั้งคู่ ก็ออกมาเจอกันหน่อยสิ"
10008-100080110 = "อา..."
10008-100080120 = "ที่ฉันพูดไปเมื่อกี้นี้..."
10008-100080130 = "เรื่องเสื้อซูคาจันน่ะ"
10008-100080140 = "ถ้าครูอยากได้ละก็ บอกฉันได้เลยนะ"
10008-100080150 = "เข้าใจมั้ย?"
10008-100080160 = "อยากให้ครูใส่ด้วยกัน\nเป็นเสื้อคู่เหรอ?"
10008-100080170 = "..."
10008-100080180 = "พะ..."
10008-100080190 = "พูดจาเพ้อเจ้อบ้าอะไรเนี่ย!"

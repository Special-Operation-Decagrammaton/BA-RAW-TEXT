[translation]
10008-644 = "여어- 선생. 바쁘지?"
10008-645 = "가끔은 밀레니엄 학원에 와서 얼굴이라도 비쳐달라고."
10008-646 = "나도 바쁘지만 선생 얼굴을 볼 시간 정도는 있거든?"
10008-647 = "알았어. 시간 나면 놀러 갈게."
10008-648 = "응. 기다리고 있으라고."
10008-649 = "크하하핫- 그래."
10008-650 = "젠장. 선생, 다음부터는 올 때 미리 말하고 오라고."
10008-651 = "네루가 오라고 했는데?"
10008-652 = "놀러 가겠다고 했었어."
10008-653 = "그, 그랬던가?"
10008-654 = "그랬던 거 같기도 하고……."
10008-655 = "어, 어쨌든!!"
10008-656 = "크흠."
10008-657 = "뭐, 그래도 아침부터 즐거웠어."
10008-658 = "아카네…… 모두에게…… 연락 부탁……"
10008-659 = "나도 믿을 수 없지만…… 아무래도 감기에 걸린 모양이다."
10008-660 = "나 지각할 거 같다…… 아마도……"
10008-661 = "네루? 문자를 잘못 보낸 거 같은데?"
10008-662 = "네루 아픈 거야?"
10008-663 = "어이 선생. 죽은 맛없었어."
10008-664 = "음…… 그치만 병문안 와준 건 고마웠어."
10008-665 = "이 빚은 언젠가 갚아줄 테니까 말이야, 각오하라고."
10008-666 = "얼른 나아, 네루 쨩."
10008-667 = "기다리고 있을게."
10008-668 = "여어- 선생."
10008-669 = "괜찮아? 감기 걸렸다는 얘기가 있던데."
10008-670 = "정말이야?"
10008-671 = "기침…… 열…… 으으으……."
10008-672 = "몸이 으슬으슬……."
10008-673 = "좋아, 각오하고 있어."
10008-674 = "샬레로 간다."
10008-675 = "하아. 요새 지각이랑 결석을 너무 많이 해서 출결이 아슬아슬하네."
10008-676 = "방법이 없을까."
10008-677 = "성실하게 출석하면 된다고 생각합니다만."
10008-678 = "근면한 학생이 되면 된다고 생각합니다만."
10008-679 = "그, 그런 정론 말고!"
10008-680 = "뭔가 요령 같은 게……!"
10008-681 = "그런 건 없습니다."
10008-682 = "그러면 안되죠."
10008-683 = "……."
10008-684 = "그…… 그렇겠지."
10008-685 = "쳇. 나, 나도 알고 있다구!"
10008-686 = "성실하게 다니면 되니까!"
10008-687 = "지각 따윈 안 하면 그만이지!"
10008-688 = "파이팅!"
10008-689 = "선생~"
10008-690 = "뭔가 엄청 멋진 걸 구경할 생각 없어?"
10008-691 = "엄~청 멋진 거?"
10008-692 = "수상한데……."
10008-693 = "그게 뭐야?"
10008-694 = "크하핫!"
10008-695 = "궁금하면 이쪽으로 잠깐 시간 내서 와 달라구?"
10008-696 = "엄~청 멋지니까. 기대해!"
10008-697 = "그 장소에 가고 싶으면 나한테 얘기해! 같이 가는 거야!"
10008-698 = "혼자 가면 죽인다?!"
10008-699 = "알았어. 약속할게."
10008-100080010 = "아"
10008-100080020 = "심심하다"
10008-100080030 = "선생, 지금 뭐 해?"
10008-100080040 = "아무것도 안 하고 있는데"
10008-100080050 = "그러는 네루도 오늘 한가한가 보네"
10008-100080060 = "ㅋ"
10008-100080070 = "뭐"
10008-100080080 = "그럼 모처럼의 휴일이니까"
10008-100080090 = "시간 괜찮으면 지금 나올래?"
10008-100080100 = "피차 할 거 없으면, 얼굴이나 좀 보게"
10008-100080110 = "아"
10008-100080120 = "그러고 보니 선생, 아까 전에도 했던 말인데"
10008-100080130 = "스카잔 말이야"
10008-100080140 = "필요하면 언제든 말해. 구해줄 테니까"
10008-100080150 = "알았지?"
10008-100080160 = "세트로 입는 거야?"
10008-100080170 = "……"
10008-100080180 = "쓰"
10008-100080190 = "쓸데없는 소리 하지 마!!"

[translation]
10008-644 = "喲，老師，最近忙嗎？"
10008-645 = "在千年也沒見到面，時機合適的話，要不久違地來一下呢？"
10008-646 = "雖然我也很忙，但能抽出時間見面"
10008-647 = "嗯，那就去玩吧"
10008-648 = "說的也是，那就下次去吧"
10008-649 = "哈，我會不抱期待地等著唷"
10008-650 = "真是的，要來的話先告訴我一聲啊。這不是害我大意了嗎……"
10008-651 = "不是寧瑠叫我來的嗎？"
10008-652 = "不是說了會去玩……？"
10008-653 = "啊？是嗎？"
10008-654 = "這麼一說，好像有這麼一回事……"
10008-655 = "總，總之呢！！"
10008-656 = "嗯……那個什麼……"
10008-657 = "一大早碰面害我嚇一跳……啊，要遵守約定唷！？"
10008-658 = "朱音……聯絡大家……拜託了……"
10008-659 = "雖然難以置信……但我好像感冒了"
10008-660 = "可能……會遲到……"
10008-661 = "寧瑠？訊息是不是發錯人了？"
10008-662 = "寧瑠！沒事吧！？"
10008-663 = "喲，老師。那個粥，味道很微妙"
10008-664 = "……但是，謝謝你來探望我"
10008-665 = "這筆人情總有一天會還的，做好覺悟吧"
10008-666 = "祝你早日康復"
10008-667 = "嗯，等著呢"
10008-668 = "喲，老師"
10008-669 = "聽說你感冒了？"
10008-670 = "真的嗎？"
10008-671 = "咳嗽……發燒……"
10008-672 = "身體發冷……"
10008-673 = "哈，真遜。做好覺悟吧"
10008-674 = "我現在就去夏萊"
10008-675 = "最近因為遲到和缺席太多，出席天數岌岌可危"
10008-676 = "有什麼好辦法嗎……"
10008-677 = "我覺得認真出席就好了"
10008-678 = "我覺得當個認真的學生就好了"
10008-679 = "我不要這種正經的意見！"
10008-680 = "難道就沒辦法偷吃步嗎！？"
10008-681 = "沒有那種東西"
10008-682 = "不能作弊"
10008-683 = "……"
10008-684 = "……嘛，也是呢"
10008-685 = "嘖，好啦好啦！"
10008-686 = "認真做就行了吧！"
10008-687 = "只要不遲到也不缺席就行了！"
10008-688 = "加油！"
10008-689 = "吶，老師"
10008-690 = "想不想看點好東西？"
10008-691 = "相當不錯喔？"
10008-692 = "很可疑……"
10008-693 = "是什麼……？"
10008-694 = "哈哈！"
10008-695 = "想知道的話，今晚來趟千年吧"
10008-696 = "不會讓你吃虧的"
10008-697 = "想去那個地方就跟我說一聲！我們一起去！"
10008-698 = "敢一個人去我就宰了你哦！？"
10008-699 = "嗯，知道了。約好了。今天謝啦"
10008-100080010 = "呦，老師"
10008-100080020 = "我現在閒著沒事"
10008-100080030 = "你現在在做什麼？"
10008-100080040 = "什麼也沒做唷"
10008-100080050 = "我也很閒"
10008-100080060 = "哈哈"
10008-100080070 = "這樣啊"
10008-100080080 = "……那好，你很閒對吧？"
10008-100080090 = "既然難得有空"
10008-100080100 = "如果沒事做的話，就來千年一趟吧"
10008-100080110 = "話說"
10008-100080120 = "繼續剛才那個話題"
10008-100080130 = "啊，我指的是絲卡將的事"
10008-100080140 = "你如果也想要一件就跟我說一聲吧"
10008-100080150 = "我會去幫你找的"
10008-100080160 = "跟你穿成對的怎麼樣？"
10008-100080170 = "……"
10008-100080180 = "笨"
10008-100080190 = "別胡說八道了！！"

[translation]
10072-100720010 = "老師，你現在在做什麼？"
10072-100720020 = "在休息哦"
10072-100720030 = "呼吸，吧……"
10072-100720040 = "？"
10072-100720050 = "什麼嘛"
10072-100720060 = "意思是你什麼事都沒在做嗎？"
10072-100720070 = "難得都到海邊來了"
10072-100720080 = "不做些只有在海邊才能做的事就太浪費了"
10072-100720090 = "只有在海邊才能做的事……"
10072-100720100 = "游泳之類的？"
10072-100720110 = "只是要游泳的話，去泳池就行了吧？"
10072-100720120 = "所以說……"
10072-100720130 = "要去抓海產！"
10072-100720140 = "老師，現在有空嗎？"
10072-100720150 = "我剛才找到了一個有趣的東西"
10072-100720160 = "只要有這個，這次一定能抓魚給老師！"
10072-100720170 = "是在倉庫裡找到漁網了嗎？"
10072-100720180 = "哼哼"
10072-100720190 = "以為只是單純的漁網就大錯特錯了"
10072-100720200 = "這個還是直接給你看看比較好"
10072-100720210 = "來之前那個碼頭一趟吧"
10072-100720220 = "這次絕對要讓老師吃到最高級的生魚片！"
10072-100720230 = "老師"
10072-100720240 = "後來，我又去看了看碼頭的情況"
10072-100720250 = "發現水面上漂著幾隻小魚"
10072-100720260 = "恐怕是被爆炸的衝擊震暈了吧"
10072-100720270 = "我聽說體型小的魚意外的怕衝擊"
10072-100720280 = "也就是說……"
10072-100720290 = "只要接入高壓電流，就能一口氣……"
10072-100720300 = "那個絕對不行！"
10072-100720310 = "老師，村子西邊好像有一片泥灘哦"
10072-100720320 = "聽居民說，一天會退潮兩次"
10072-100720330 = "然後那片泥灘就會出現"
10072-100720340 = "真是不可思議的現象呢"
10072-100720350 = "聽說退潮的時候，可以很輕鬆地撿到貝類或魚"
10072-100720360 = "……其實，在取得採集海產的許可時"
10072-100720370 = "他們也告訴我可以到泥灘去"
10072-100720380 = "所以，有空的話要不要一起去？"
10072-100720390 = "雖然讓你看到了在水中的失態，不過這次只是在泥灘上撿撿魚而已。不會再犯跟上次同樣的錯誤……"
10072-100720400 = "這次絕對要讓老師吃到最高級的海產！"
10072-100720410 = "到頭來，讓老師吃到好吃海產的作戰還是失敗了啊"
10072-100720420 = "本來還打算抓隻高級的魚作為平時的謝禮的說……"
10072-100720430 = "我已經吃很多了唷？"
10072-100720440 = "例如海藻湯……"
10072-100720450 = "或是海腸之類的……"
10072-100720460 = "雖然是很好吃沒錯……"
10072-100720470 = "不過那些都是市場就能買到的食材……"
10072-100720480 = "明明讓老師陪了我這麼久……"
10072-100720490 = "和咲希一起吃的飯是最美味的唷"
10072-100720500 = "……！"
10072-100720510 = "搞不清楚你是在捉弄我還是認真的，拜託饒了我吧……"

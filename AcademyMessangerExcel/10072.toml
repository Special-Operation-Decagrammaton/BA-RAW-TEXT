10072-100720140 = "선생님, 지금 시간 괜찮아?"
10072-100720150 = "내가 방금 끝내주는 물건을 찾은 참이거든."
10072-100720160 = "이것만 있으면 어떤 큰 물고기라도 한 방에 해치울 수 있어!"
10072-100720170 = "뭔가 좋은 그물이라도 찾은 거야?"

10072-100720380 = "그래서 말인데, 시간 있으면 마을 서편의 갯바위 앞으로 나와 줄래?"
10072-100720390 = "물 속이라면 몰라도 땅 위에서 물고기를 줍는데, 지난번 같은 실수를 저지르지는 않겠지……"

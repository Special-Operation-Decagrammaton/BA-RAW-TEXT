10072-100720060 = "아무것도 안 하고 있다는 뜻이잖아. 장난치지 마."
10072-100720070 = "모처럼 바다에 왔는데 시간이 아깝지도 않은 거야?"
10072-100720080 = "바다에 왔으니 여기서만 할 수 있는 일을 해야지."

10072-100720300 = "그건 절대로 안 돼!"
10072-100720310 = "선생님, 마을 서쪽에 갯벌이 있는 거 알고 있어?"
10072-100720320 = "마을 주민들에게 들었는데, 마을의 서쪽 해안은 하루에 두 번씩 물이 빠져서"
10072-100720330 = "갯벌 바닥이 드러난다고 하더라고."
10072-100720340 = "그거 신기하네"
10072-100720350 = "응. 그래서 갯벌이 드러났을 때는 조개나 물웅덩이에 남아 있는 물고기를 편하게 주울 수 있대."

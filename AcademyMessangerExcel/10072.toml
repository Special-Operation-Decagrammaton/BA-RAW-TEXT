[translation]
10072-100720010 = "Sensei, what are you doing right now?"
10072-100720020 = "Breathing..."
10072-100720030 = "Taking it easy."
10072-100720040 = "...?"
10072-100720050 = "What kind of answer is that."
10072-100720060 = "It sounds like you're not doing anything."
10072-100720070 = "We're visiting the sea. Do you plan to waste the whole trip?"
10072-100720080 = "Since we're at the beach, we should be doing beach activities."
10072-100720090 = "Beach activities, huh..."
10072-100720100 = "Like swimming?"
10072-100720110 = "No, I don't mean playing or goofing off."
10072-100720120 = "I mean..."
10072-100720130 = "Catching seafood!"
10072-100720140 = "Sensei, are you busy right now?"
10072-100720150 = "I just happened on something amazing!"
10072-100720160 = "With this, I'll be able to catch even the biggest fish!"
10072-100720170 = "Did you find a fishing net?"
10072-100720180 = "A net?"
10072-100720190 = "It's nothing so mundane as a net."
10072-100720200 = "I can't describe it here. You need to see it for yourself."
10072-100720210 = "Can you come to the dock right now?"
10072-100720220 = "I'm going to treat you to the best sashimi after this!"
10072-100720230 = "Sensei."
10072-100720240 = "I went back to the dock later and found"
10072-100720250 = "little fish floating on the surface."
10072-100720260 = "They must have been knocked unconscious by the explosion I set off earlier."
10072-100720270 = "Small fish must be vulnerable to external shocks."
10072-100720280 = "So that means..."
10072-100720290 = "I could rig a car battery to run currents through the water and stun the fish!"
10072-100720300 = "You can't do that!"
10072-100720310 = "Sensei, did you know that there is a mudflat west of town?"
10072-100720320 = "According to the locals, the water recedes twice a day at the western shore"
10072-100720330 = "and exposes a mudflat!"
10072-100720340 = "That's amazing."
10072-100720350 = "All these fish get trapped in the pools that form when the tide is out, and they're easy picking."
10072-100720360 = "Last time, when I asked if I could fish off their shore,"
10072-100720370 = "they also said I could use the mudflat."
10072-100720380 = "If you have time, can you meet me at the shore on the west of town?"
10072-100720390 = "I won't have to actually get into the water this time, so I'm sure I won't repeat any of my old mistakes..."
10072-100720400 = "This time, I'm really going to catch something special for you!"
10072-100720410 = "In the end, I didn't catch you anything good..."
10072-100720420 = "I thought I'd definitely be able to treat you to a high-class seafood meal..."
10072-100720430 = "I've had plenty of delicious seafood thanks to you!"
10072-100720440 = "I got to try fat innkeeper worm..."
10072-100720450 = "And seaweed soup..."
10072-100720460 = "They were good, but..."
10072-100720470 = "They weren't anything you couldn't get at the market."
10072-100720480 = "After all the time you wasted with me, you should have gotten something better..."
10072-100720490 = "Saki, knowing how hard you worked made everything taste even better."
10072-100720500 = "Sometimes you say these things, Sensei..."
10072-100720510 = "And I can't tell if you're being nice or if you're teasing me..."

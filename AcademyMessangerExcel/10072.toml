10072-100720480 = "오히려 선생님이 어울려 준 시간을 생각하면 대단찮은 것뿐이었는데……"
10072-100720490 = "사키가 노력하는 모습을 지켜보며 먹는 밥이 내게는 최고의 미식이니까"

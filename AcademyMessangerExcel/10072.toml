10072-100720190 = "이 물건의 가치는 그런 평범한 어구에 비할 바가 아니라고."
10072-100720200 = "역시 모모톡으로 설명하는 것보다는 직접 보여주는 게 낫겠지"
10072-100720210 = "지금 바로 전의 부둣가로 와줄래?"
10072-100720220 = "이번에야말로 선생님에게 최고급 생선회를 대접할 테니까!"
10072-100720230 = "선생님."
10072-100720240 = "나중에 다시 그 부둣가에 갔다가 발견했는데"
10072-100720250 = "수면 위에 작은 물고기 여러 마리가 떠 있더라고"
10072-100720260 = "아마 아까 터트린 폭뢰의 강한 충격으로 인해 기절한 모양이야"
10072-100720270 = "작은 물고기들은 외부 충격에 약하다고 하니까"
10072-100720280 = "……그렇다면"

[translation]
10072-100720010 = "ทำอะไรอยู่เหรอ คุณครู?"
10072-100720020 = "หายใจทิ้งอยู่น่ะ..."
10072-100720030 = "นอนแช่อยู่บนโซฟาอยู่น่ะ"
10072-100720040 = "?"
10072-100720050 = "หมายถึงอะไรน่ะ?"
10072-100720060 = "หมายความว่าไม่ได้ทำอะไรอยู่นี่นา\nอย่ามาล้อเล่นกันสิ"
10072-100720070 = "อุตส่าห์ได้มาทะเลทั้งที ไม่เสียดาย\nเวลาบ้างรึไง?"
10072-100720080 = "ไหนๆ ก็มาถึงทะเลแล้ว ก็ควรทำ\nสิ่งที่ทำได้แค่ที่ทะเลสักหน่อยสิ"
10072-100720090 = "สิ่งที่ทำได้แค่ที่ทะเล อืม..."
10072-100720100 = "จะชวนครูไปว่ายน้ำเล่นใช่มั้ย?"
10072-100720110 = "เปล่าซะหน่อย ถ้าเรื่องที่ทำได้แค่ที่\nทะเลละก็ มันมีอย่างอื่นอยู่อีกนี่นา?"
10072-100720120 = "นั่นก็คือ..."
10072-100720130 = "หาอาหารทะเลไงล่ะ!"
10072-100720140 = "คุณครู ตอนนี้ว่างหรือเปล่า?"
10072-100720150 = "เมื่อกี้นี้ฉันเจอของที่สุดยอดมากๆ\nมาด้วยแหละ"
10072-100720160 = "ขอแค่มีเจ้านี่ ต่อให้ปลาตัวใหญ่แค่ไหน\nก็จับได้ในครั้งเดียวแน่นอน!"
10072-100720170 = "เจอตาข่ายดีๆ มารึไง?"
10072-100720180 = "ตาข่ายเหรอ?"
10072-100720190 = "เอาอุปกรณ์พื้นๆ แบบนั้นมาเทียบกับ\nของล้ำค่าแบบนี้ได้ยังไง"
10072-100720200 = "คิดแล้วเชียวว่าอธิบายทาง MOMOTALK\nคงไม่เห็นภาพ เอาไปให้ดูเองเลย\nน่าจะดีกว่า"
10072-100720210 = "งั้นตอนนี้ช่วยมาที่ท่าเรือหน่อยได้มั้ย?"
10072-100720220 = "ฉันจะเลี้ยงปลาดิบสุดหรูคุณครูเอง!"
10072-100720230 = "คุณครู"
10072-100720240 = "ฉันกลับไปที่ท่าเรือแล้วก็เห็นว่า..."
10072-100720250 = "มีปลาเล็กๆ หลายตัวลอยอยู่บน\nผิวน้ำด้วยละ"
10072-100720260 = "ดูเหมือนพวกมันจะตกใจจากแรงระเบิด\nเมื่อกี้จนน็อกไปแล้วน่ะ"
10072-100720270 = "พวกปลาตัวเล็กๆ ไวต่อแรงสั่นสะเทือน\nภายนอกน่ะ"
10072-100720280 = "อืม..."
10072-100720290 = "งั้นถ้าเราใช้แบตเตอรี่รถยนต์มาต่อระบบ\nไฟฟ้าแล้วช็อตปลาในน้ำละก็..."
10072-100720300 = "ทำแบบนั้นไม่ได้เด็ดขาด!"
10072-100720310 = "คุณครู รู้รึเปล่าว่าทางตะวันตกของ\nหมู่บ้านมีหาดโคลนอยู่ด้วยน่ะ?"
10072-100720320 = "ฉันได้ยินมาจากพวกชาวบ้านอีกทีว่า\nชายหาดฝั่งตะวันตกน่ะ น้ำจะลงวันละ\nสองครั้ง"
10072-100720330 = "เลยทำให้เห็นหาดโคลนน่ะ!"
10072-100720340 = "น่าสนใจดีนะ"
10072-100720350 = "อื้อ ตอนที่น้ำลงก็จะเหลือพวกแอ่งน้ำ\nเล็กๆ ที่มีปลาหรือพวกหอยอยู่ ทำให้\nจับปลาได้ง่ายด้วย"
10072-100720360 = "...อันที่จริง ตอนครั้งก่อนฉันไปขออนุญาต\nจากชาวเมือง"
10072-100720370 = "พวกเขาอนุญาตให้ไปที่หาดโคลน\nได้ด้วยน่ะ"
10072-100720380 = "เพราะงั้นถ้าคุณครูมีเวลาละก็ ช่วยมา\nที่แถวๆ หาดฝั่งตะวันตกหน่อยได้มั้ย?"
10072-100720390 = "อย่างน้อยก็อาจจับปลาจากบนบกได้\nแล้วก็จะไม่ทำพลาดเหมือนคราวที่\nแล้วด้วย..."
10072-100720400 = "คราวนี้ฉันจะเลี้ยงปลาดิบ\nสุดหรูคุณครูให้ได้เลย!"
10072-100720410 = "สุดท้ายก็ล้มเหลวเรื่องจะเลี้ยงปลาดิบ\nสุดหรูคุณครูอีกแล้ว..."
10072-100720420 = "อุตส่าห์มาถึงหมู่บ้านชาวประมงทั้งที\nคิดว่าจะจับปลาหายากแพงๆ\nมาเลี้ยงตอบแทนคุณครูสักหน่อย..."
10072-100720430 = "ถ้าอาหารทะเลหายากละก็\nครูกินจนอิ่มแล้วนะ"
10072-100720440 = "ก็ปลิงทะเลนั่นไง..."
10072-100720450 = "ก็พวกซุปสาหร่ายทะเลนั่นไง..."
10072-100720460 = "พวกนั้นมันก็อร่อยอยู่หรอก..."
10072-100720470 = "แต่ก็เป็นอาหารทะเลที่หาได้ทั่วไป\nตามท้องตลาดนี่นา?"
10072-100720480 = "ถ้าเทียบกับเรื่องที่คุณครูสละเวลามา\nกับพวกเรา มันก็ดูธรรมดาๆ ไปเลย..."
10072-100720490 = "แค่ซากิพยายามจับมาให้แบบนี้\nครูก็ถือว่าเป็นของอร่อยแล้วละ"
10072-100720500 = "บางครั้ง ฉันชักเริ่มไม่แน่ใจแล้ว..."
10072-100720510 = "ว่าที่คุณครูพูดเป็นเรื่องดีจริงๆ หรือแค่\nพูดล้อเล่นกันแน่..."

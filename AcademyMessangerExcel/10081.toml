[translation]
10081-100810010 = "您好！老師！"
10081-100810020 = "你好呀，紫。今天也一樣充滿活力呢"
10081-100810030 = "是！隨時充滿活力是我勘解由小路紫無數的優點之一！"
10081-100810040 = "不過……最近也只有在老師面前才會展現出這一面"
10081-100810050 = "發生什麼事了？"
10081-100810060 = "那個……最近家裡好像變得特別嚴格……"
10081-100810070 = "說是時候精進勘解由小路家應有的素養，所以要學的東西也變多了……"
10081-100810080 = "要是每天都這樣埋頭苦學…… "
10081-100810090 = "我將來一定會變成左手打算盤、右手按計算機的學習之鬼的！"
10081-100810100 = "雖然很好奇哪裡會有這種鬼……！"
10081-100810110 = "不過我認為偶爾也需要喘口氣"
10081-100810120 = "喘口氣？"
10081-100810130 = "喘口氣……喘口氣……是嗎，唔唔"
10081-100810140 = "紫明白了！"
10081-100810150 = "那麼我就接受老師的建議……現在馬上去拜訪老師！"
10081-100810160 = "嗯？現在馬上……？"
10081-100810170 = "是！"
10081-100810180 = "小女子最近在吃飯後點心的時候……"
10081-100810190 = "想到了一個驚人的好～主意"
10081-100810200 = "雖然有點突然，不過是什麼好主意？"
10081-100810210 = "像和菓子、蒙～布朗，還有布～丁等等……"
10081-100810220 = "世界上有很多甜的點心！"
10081-100810230 = "但是經過深思熟慮後……"
10081-100810240 = "得出了鹹食也很適合當點心的結論！"
10081-100810250 = "如果能開發出鹹的點心，小女子就可以盡情享受甜鹹交錯的滋味而不容易膩了……！"
10081-100810260 = "鹹的點心不是很多嗎……？"
10081-100810270 = "……什麼？"
10081-100810280 = "老師，雖然多少有些厚顏無恥……"
10081-100810290 = "但繼上次之後……！"
10081-100810300 = "今天我勘解由小路紫，也想向老師學習各種事物！"
10081-100810310 = "嗯，那我會在夏萊等你"
10081-100810320 = "是！我立刻過去！"
10081-100810330 = "老師，有個大～新聞！"
10081-100810340 = "聽說今天百鬼夜行第七商店街會舉辦叫做「抽獎儀式」的特別活動！"
10081-100810350 = "啊，是商店街常辦的活動啊"
10081-100810360 = "聽說商品之中，好像還有奧德賽海洋高級中學渡假勝地的招待券"
10081-100810370 = "獎品還真豪華呢"
10081-100810380 = "沒錯，那麼無須多言……"
10081-100810390 = "老師！"
10081-100810400 = "嗯，走吧"
10081-100810410 = "是！我會在平時的地方等候著您！"

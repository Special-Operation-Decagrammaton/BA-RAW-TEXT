[translation]
10081-100810010 = "สวัสดีเจ้าค่ะ ท่านอาจารย์!"
10081-100810020 = "สวัสดี ยูคาริ\nวันนี้ก็พลังเต็มเปี่ยมเลยนะ"
10081-100810030 = "เจ้าค่ะ! การมีพลังที่เต็มเปี่ยมอยู่เสมอ\nเป็นหนึ่งในข้อดีมากมายของข้าเจ้าค่ะ!"
10081-100810040 = "แต่ว่า... ด้านแบบนี้ของข้าน่ะ ช่วงนี้มี\nแค่ท่านอาจารย์เท่านั้นที่ได้เห็นเจ้าค่ะ"
10081-100810050 = "ทำไมล่ะ?"
10081-100810060 = "คือว่า... หมู่นี้บรรยากาศในบ้านของข้า\nเหมือนจะเคร่งเครียดขึ้น..."
10081-100810070 = "ที่บ้านข้าบอกว่าต้องเพิ่มความรู้ที่จำเป็น\nในฐานะคนของตระกูลคาเดโนะโคจิ\nข้าก็เลยศึกษาเพิ่มให้มากขึ้นเจ้าค่ะ"
10081-100810080 = "แต่พอเอาแต่เรียนอย่างเดียวแบบนี้... "
10081-100810090 = "ข้าว่า... ในอนาคตข้าคงถูกปลุกชีพ\nขึ้นมาเป็นผีนักบัญชีที่มือซ้ายดีด\nลูกคิดและมือขวากดเครื่องคิดเลข\nแน่นอนเจ้าค่ะ!"
10081-100810100 = "ไปเอาจินตนาการแบบนั้น\nมาจากไหนน่ะ!"
10081-100810110 = "แต่ยังไงครูก็คิดว่า\nควรพักหายใจหายคอบ้างนะ"
10081-100810120 = "หายใจหายคอ?"
10081-100810130 = "การพักหายใจ... หายคอ... ฮืมม..."
10081-100810140 = "เข้าใจแล้วละเจ้าค่ะ!"
10081-100810150 = "ถ้างั้นข้าจะทำตามที่ท่านอาจารย์บอก...\nข้าจะไปหาเดี๋ยวนี้เลยเจ้าค่ะ!"
10081-100810160 = "หืม? ตอนนี้เลยเหรอ...?"
10081-100810170 = "เจ้าค่ะ!"
10081-100810180 = "ระหว่างกำลังกินของว่างอยู่..."
10081-100810190 = "ข้าก็คิดไอเดียดีๆ ได้เจ้าค่ะ!"
10081-100810200 = "ก็ดีนะ ถึงจะกะทันหันไปสักหน่อย\nแล้วไอเดียที่ว่าคืออะไรเหรอ?"
10081-100810210 = "ก็ในบรรดาของว่างมีของหวานๆ อยู่\nมากมาย"
10081-100810220 = "ทั้งวากาชิ มงต์~ บลองค์ หรือพุด~ ดิ้ง"
10081-100810230 = "แต่ข้าลองคิดดูแล้ว..."
10081-100810240 = "ข้าว่ารสเค็มก็น่าจะเข้ากับของว่าง\nเหมือนกันเจ้าค่ะ!"
10081-100810250 = "ถ้าทำขนมขบเคี้ยวรสเค็มด้วย ข้าก็จะ\nกินขนมรสหวานสลับกับเค็มได้อย่าง\nไม่มีเบื่อ...!"
10081-100810260 = "ขนมขบเคี้ยวรสเค็มๆ ก็มีเยอะ\nอยู่แล้วนะ...?"
10081-100810270 = "เจ้าคะ...?"
10081-100810280 = "ท่านอาจารย์ ข้ารู้ว่า... มันค่อนข้าง\nน่าละอาย"
10081-100810290 = "แต่สืบเนื่องจากครั้งที่แล้ว\nวันนี้ข้าน้อย...! ยูคาริ!"
10081-100810300 = "ก็อยากเรียนรู้อะไรเยอะๆ จากท่าน\nอาจารย์เจ้าค่ะ!"
10081-100810310 = "ได้สิ งั้นครูจะรออยู่ที่ชาเล่ต์นะ"
10081-100810320 = "เจ้าค่ะ! ข้าจะรีบไปหาทันที!"
10081-100810330 = "ท่านอาจารย์ บิ๊ก~ นิวส์ เจ้าค่ะ"
10081-100810340 = "ข้าได้ยินว่าวันนี้ในย่านการค้าที่ 7 ของ\nเฮียกคิยาโคมี <งานจับฉลาก> ที่เป็น\nกิจกรรมพิเศษเจ้าค่ะ!"
10081-100810350 = "อ้อ หมายถึงกิจกรรมที่จัดบ่อยๆ\nในย่านการค้าสินะ"
10081-100810360 = "เหมือนของรางวัลจะมีบัตรเชิญไปเที่ยว\nสถานที่พักผ่อนของโรงเรียนการเดินเรือ\nโอดิสซีย์ด้วยละเจ้าค่ะ"
10081-100810370 = "ของรางวัลจัดหนักจัดเต็มจังเลยแฮะ"
10081-100810380 = "อื้ม งั้นก็อย่าเสียเวลาอยู่เลยเจ้าค่ะ!"
10081-100810390 = "ท่านอาจารย์!"
10081-100810400 = "อื้ม ไปกันเลยมั้ย?"
10081-100810410 = "เจ้าค่ะ! เช่นนั้นข้าจะไปรอ\nที่จุดนัดพบประจำนะเจ้าคะ!"

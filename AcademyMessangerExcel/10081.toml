[translation]
10081-100810010 = "안녕하시어요! 선생님!"
10081-100810020 = "안녕, 유카리. 오늘도 기운차네."
10081-100810030 = "네! 언제나 기운이 넘치는 것이 저 유카리의 무수히 많은 장점 중 하나이기에!"
10081-100810040 = "다만… 이런 모습도 최근엔 선생님 앞에서만 보여드린다고나 할지."
10081-100810050 = "무슨 일 있는 거야?"
10081-100810060 = "그게… 최근 들어 특히나 집안 분위기가 엄격해진 듯해서…."
10081-100810070 = "카데노코지로서 갖춰야 할 소양을 늘릴 때라고, 공부할 거리가 더 늘어났사와요."
10081-100810080 = "매일 이렇게 공부만 하다간…… "
10081-100810090 = "저, 미래엔 왼손으로 주판을 튕기며, 오른손으로는 계산기를 두드리는 공부 귀신이 될 것이 분명하여요!"
10081-100810100 = "그 이미지의 출처가 궁금하지만! "
10081-100810110 = "그래도 역시 한숨 돌리는 건 필요하다고 생각해."
10081-100810120 = "한숨을, 돌린다?"
10081-100810130 = "한숨을…… 돌리는 행위…… 과연, 흠흠."
10081-100810140 = "저, 유카리 이해한 것이어요!"
10081-100810150 = "그럼 선생님의 말씀을 받들어… 지금 찾아뵙겠사와요!"
10081-100810160 = "어? 지금 바로……?"
10081-100810170 = "네!"
10081-100810180 = "최근 식후 간식을 먹던 도중…."
10081-100810190 = "저 유카리, 놀라운 아이디-어를 떠올렸사와요!"
10081-100810200 = "좋아. 갑작스러운 이야기지만, 어떤 아이디어야?"
10081-100810210 = "화과자나 몽부을~랑, 푸디-잉처럼."
10081-100810220 = "간식에는 단맛의 과자들이 잔뜩이지만!"
10081-100810230 = "제가 심사숙고해 본 결과…."
10081-100810240 = "간식으로는 짠맛도 잘 어울릴 것이라 생각하여요!"
10081-100810250 = "이 기회에 짠맛의 과자를 만들면 소녀도 질리지 않고 마음껏 단짠을…!"
10081-100810260 = "짠맛 과자라면 이미 많이 있지……?"
10081-100810270 = "…네?"
10081-100810280 = "선생님. 다소… 염치가 없지만."
10081-100810290 = "지난번에 이어 오늘도!"
10081-100810300 = "저 유카리. 많은 것들을 선생님에게 배우고 싶사와요!"
10081-100810310 = "좋아. 그럼 나도 샬레에서 기다리고 있을게."
10081-100810320 = "네! 바로 가겠사와요!"
10081-100810330 = "선생님, 비익-뉴스여요!"
10081-100810340 = "오늘 백귀야행 제7번 상점가에서 <추첨식>이라는 특별한 이벤트를 한다고 들었사와요!"
10081-100810350 = "아, 상점가에서 자주 하는 그거 말이구나."
10081-100810360 = "상품 중에는 오디세이아 해양학교의 휴양지로 떠날 수 있는 초대권도 있다는 모양이어요."
10081-100810370 = "꽤 호화스럽네."
10081-100810380 = "아, 그럼 이럴 게 아니라."
10081-100810390 = "선생님!"
10081-100810400 = "응. 가볼까?"
10081-100810410 = "네! 그럼 평소처럼 그곳에서!"

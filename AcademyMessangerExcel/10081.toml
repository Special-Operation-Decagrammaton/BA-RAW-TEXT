[translation]
10081-100810010 = "Sensei! Hi, hi!"
10081-100810020 = "Hi, Yukari. You're energetic, as usual."
10081-100810030 = "Yup! I consider my boundless energy one of my best qualities!"
10081-100810040 = "But... I can only really be like this around you."
10081-100810050 = "Why is that?"
10081-100810060 = "It's just...it's been pretty tense at home lately."
10081-100810070 = "I have to live up to the Kadenokouji name and study harder."
10081-100810080 = "But I don't know how much harder I can try... "
10081-100810090 = "At this rate, I might die and be resurrected as an academic ghost who has to carry an abacus and a calculator around for eternity!"
10081-100810100 = "How did you even come up with that?! "
10081-100810110 = "Anyway, it's important to take a breather every once in a while."
10081-100810120 = "Take a breather?"
10081-100810130 = "Take...a breather... Hm, indeed."
10081-100810140 = "I understand now!"
10081-100810150 = "I'll take your advice! I'm on my way over!"
10081-100810160 = "Huh? R-Right now?"
10081-100810170 = "Yes!"
10081-100810180 = "I was having my little post-meal snack the other day,"
10081-100810190 = "and I came up with an amazing idea!"
10081-100810200 = "Oh, really? What's the idea?"
10081-100810210 = "Okay. Most snacks are sweet, right?"
10081-100810220 = "Like wagashi, Mont Blanc, or pudding!"
10081-100810230 = "But after really thinking about it..."
10081-100810240 = "I came up with this awesome idea! Salty snacks!"
10081-100810250 = "We need more variety in the snack industry!"
10081-100810260 = "There's a lot of salty snacks on the market already..."
10081-100810270 = "...Huh?"
10081-100810280 = "Sensei, I know it's a lot to ask, but..."
10081-100810290 = "let's keep up the momentum!"
10081-100810300 = "I want to learn even more from you, Sensei!"
10081-100810310 = "I'm at Schale whenever you need me."
10081-100810320 = "Okie dokie! I'll be right there!"
10081-100810330 = "Sensei, I have BIG news!"
10081-100810340 = "I heard there's a special event called a raffle happening at Hyakkiyako Shopping District No. 7 today!"
10081-100810350 = "Oh, they do hold raffles there a lot."
10081-100810360 = "And they're raffling away an invitation to the Odyssey Maritime School resort!"
10081-100810370 = "That's a really nice prize."
10081-100810380 = "Then what are we waiting for?!"
10081-100810390 = "Sensei!"
10081-100810400 = "Would you like to go?"
10081-100810410 = "Yes! I'll meet you at the usual spot!"

[translation]
16003-1741 = "สวัสดีค่ะคุณครู สึซึมินะคะ คุณครูจำฉัน\nได้รึเปล่าคะ?"
16003-1742 = "ฉันแค่มาทักทายเท่านั้นค่ะ ถ้าคุณครูยุ่ง\nอยู่ก็ขอโทษนะคะ"
16003-1743 = "ถ้าเรามีโอกาสได้เจอกันอีกก็คงดีนะคะ"
16003-1744 = "ถ้างั้น... ขอตัวนะคะ"
16003-1745 = "สึซึมินะคะ\nคุณครูกลับถึงบ้านแล้วรึยังคะ?"
16003-1746 = "ถึงแล้วล่ะ ขอบคุณนะ"
16003-1747 = "ไม่หรอกค่ะ โชคดีจริงๆ เลย"
16003-1748 = "แล้วก็..."
16003-1749 = "คือ..."
16003-1750 = "อืม..."
16003-1751 = "ถ้าจำเป็นก็เรียกฉันได้ตลอดนะคะ\nฉันจะมาหาทันทีค่ะ"
16003-1752 = "..."
16003-1753 = "ก็แค่เรื่องการไปคุ้มกันน่ะค่ะ"
16003-1754 = "คุณครูคะ สึซึมินะคะ"
16003-1755 = "อย่างที่ฉันเคยบอกไป ถ้าคุณครูต้องการ\nคนไปคุ้มกันก็บอกฉันได้ตลอดเลยนะคะ"
16003-1756 = "ฉันจะคอยคุ้มกันคุณครูไปถึงที่หมายให้\nอย่างปลอดภัยเองค่ะ"
16003-1757 = "ขอบคุณนะ ขอฝากด้วยล่ะ"
16003-1758 = "พวกเด็กผู้หญิงนี่น่ากลัวจังเลย!\nช่วยดูแลครูด้วยนะ!"
16003-1759 = "ค่ะ! ขอบคุณที่แวะมาหานะคะ"
16003-1760 = "..."
16003-1761 = "อืมมม..."
16003-1762 = "ถึงฉันจะเป็นเด็กผู้หญิงก็จริง..."
16003-1763 = "ค่ะ เอาเป็นว่า..."
16003-1764 = "ถ้างั้นฉันจะไปดักรอตอนที่คุณครูออกมา\nก็แล้วกันค่ะ"
16003-1765 = "แล้วเจอกันนะคะ"
16003-1766 = "สึซึมินะคะ วันนี้สนุกมากเลยค่ะ"
16003-1767 = "ไว้เจอกันใหม่นะคะ คุณครู"
16003-1768 = "สวัสดีค่ะคุณครู สึซึมินะคะ"
16003-1769 = "ฉันเคยบอกไปแล้วว่าถ้ามีอะไรที่ต้องการ\nก็บอกได้เลยค่ะ"
16003-1770 = "คราวนี้ฉันจะไม่ได้ไปคุ้มกัน แต่จะให้ไป\nด้วยกันแทนค่ะ"
16003-1771 = "อืม..."
16003-1772 = "ไม่เป็นไรค่ะ ถ้าคุณครูไม่สะดวกก็ไม่เป็น\nไรค่ะ"
16003-1773 = "ถ้าสึซึมิของครูอยากให้ไปละก็ได้อยู่แล้ว"
16003-1774 = "ถ้างั้น เรามาเจอกันเลยดีไหม?"
16003-1775 = "!$T&^($&W^@QR(T$!!!!!!!!"
16003-1776 = "..."
16003-1777 = "ขอโทษด้วยค่ะ"
16003-1778 = "พอดีเผลอทำโทรศัพท์ตกค่ะ"
16003-1779 = "ขอบคุณมากนะคะ"
16003-1780 = "ฉันจะส่งพิกัดสถานที่ไปให้นะคะ "
16003-1781 = "สักวันนึง... ถ้าได้เดินข้างนอกตลอดทั้งวัน"
16003-1782 = "แล้วไม่มีอะไรเกิดขึ้นเลยก็คงดีนะคะ"
16003-1783 = "อืม..."
16003-1784 = "กว่าจะมีวันนั้นคงจะนานแน่ๆ เลย..."
16003-1785 = "ถึงนั่นจะเป็นแค่สิ่งที่ฉันคิดก็เถอะค่ะ..."
16003-160030010 = "สวัสดีค่ะคุณครู สึซึมินะคะ"
16003-160030020 = "คือว่าวันนี้คุณครูพอจะมีเวลาว่างบ้าง\nมั้ยคะ?"
16003-160030030 = "ไม่ใช่งานสำคัญหรอกค่ะ แค่ธุระส่วนตัว\nถ้าคุณครูไม่ว่างก็ไม่เป็นไรค่ะ"
16003-160030040 = "ไม่เป็นไร ครูว่างอยู่"
16003-160030050 = "จะมีงานอะไรสำคัญกว่าสึซึมิอีกล่ะ"
16003-160030060 = "งะ...งั้นเหรอคะ"
16003-160030070 = "ขอบคุณมากค่ะ"
16003-160030080 = "ฉันกังวลว่าจะรบกวนคุณครูเกินไปรึเปล่า"
16003-160030090 = "แต่ถ้าคุณครูสะดวก ฉันจะบอกสถานที่\nนัดพบให้ค่ะ"
16003-160030100 = "เอ่อ..."
16003-160030110 = "เปล่าค่ะ ขอรบกวนด้วยนะคะ"
16003-160030120 = "นี่สึซึมิเองค่ะ คุณครูกลับถึงที่พักอย่าง\nปลอดภัยใช่มั้ยคะ "
16003-160030130 = "ขอบคุณอีกครั้งนะคะ ที่อุตส่าห์ออกมา\nหาฉันกลางดึกแบบนี้"
16003-160030140 = "ฉันคิดว่าส่งข้อความหาคุณครูกลางดึก\nแบบนี้ก็อาจเป็นการเสียมารยาทอีก..."
16003-160030150 = "แต่ว่าอย่างน้อยฉันก็อยากส่งข้อความ\nมาขอบคุณคุณครูค่ะ"
16003-160030160 = "..."
16003-160030170 = "ขอบคุณค่ะ คุณครู"
16003-160030180 = "ต่อไปก็ต้องขอรบกวนด้วยนะคะ"
16003-160030190 = "สวัสดีค่ะคุณครู สึซึมินะคะ"
16003-160030200 = "ได้ยินว่าเร็วๆ นี้คุณครูจะมาทำธุระที่\nทรีนิตี้ใช่มั้ยคะ?"
16003-160030210 = "ถ้าคุณครูต้องการ..."
16003-160030220 = "เอ่อ..."
16003-160030230 = "ผู้คุ้มกัน หรือว่าคนเดินเป็นเพื่อน..."
16003-160030240 = "ไม่ว่าที่ไหน ขอแค่คุณครูบอกมา\nฉันก็จะไปพบคุณครูค่ะ"
16003-160030250 = "เหตุผลที่ฉันติดต่อมามีเพียง\nเท่านี้ค่ะ ขอบคุณค่ะ"
16003-160030260 = "ครูต่างหากที่ต้องขอบคุณ\nรบกวนด้วยนะ สึซึมิ"
16003-160030270 = "อ๊ะ ไม่ได้เดินด้วยกันนานแล้ว\nมาเดินไปด้วยกันมั้ย?"
16003-160030280 = "อา..."
16003-160030290 = "ค่ะ"
16003-160030300 = "ขอบคุณค่ะ ถ้างั้นตอนที่คุณครูมาถึง\nฉันจะไปหานะคะ"
16003-160030310 = "วันนี้ขอบคุณสำหรับหลายๆ\nอย่างเลยค่ะ"
16003-160030320 = "เพราะมีคุณครูอยู่ด้วย ฉันเลยได้สนุก\nกับหลายๆ อย่างแบบเกินความคาดหมาย\nเลยค่ะ"
16003-160030330 = "ครูต่างหากที่ได้รับการคุ้มกันน่ะ?"
16003-160030340 = "ครูต่างหากที่ต้องขอบคุณน่ะ\nต่อไปก็ขอฝากด้วยนะ"
16003-160030350 = "เอ่อ..."
16003-160030360 = "คือว่า..."
16003-160030370 = "ค่ะ"
16003-160030380 = "ต่อไปก็ขอรบกวนด้วยนะคะ คุณครู"
16003-160030390 = "ถ้ามีเรื่องอะไร คุณครูติดต่อฉันได้\nตลอดเลยนะคะ"
16003-160030400 = "แล้วก็..."
16003-160030410 = "คือ..."
16003-160030420 = "ถึงไม่ใช่เรื่องการคุ้มกันก็ไม่เป็นไรค่ะ\nติดต่อฉันได้ตลอดเลยนะคะ"

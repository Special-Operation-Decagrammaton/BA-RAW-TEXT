[translation]
16003-1741 = "안녕하세요, 선생님. 스즈미입니다. 기억하고 계시려는지요."
16003-1742 = "안부 차 연락드렸습니다. 바쁘셨다면 죄송합니다."
16003-1743 = "다시 한번 만나 뵐 기회가 있다면 좋을 것 같습니다."
16003-1744 = "그럼 이만."
16003-1745 = "스즈미입니다. 선생님 무사히 들어가셨습니까?"
16003-1746 = "덕분에. 정말 고마워."
16003-1747 = "아닙니다. 다행입니다."
16003-1748 = "그리고"
16003-1749 = "그"
16003-1750 = "음"
16003-1751 = "언제든 제가 필요하면 말씀 주십시오. 찾아뵙도록 하겠습니다."
16003-1752 = "……"
16003-1753 = "그냥 에스코트 이야기입니다."
16003-1754 = "선생님, 스즈미입니다."
16003-1755 = "전에도 말씀드렸듯, 에스코트가 필요하시면 언제든 말씀해주십시오."
16003-1756 = "제가 선생님의 목적지까지 안전하게 모셔드리겠습니다."
16003-1757 = "고마워. 부탁할게."
16003-1758 = "여고생들이 무서워요! 지켜주세요!"
16003-1759 = "넵. 찾아주셔서 감사합니다."
16003-1760 = "……"
16003-1761 = "저기 일단은"
16003-1762 = "저도 그 여고생입니다만……"
16003-1763 = "네. 아무튼"
16003-1764 = "그럼 나오실 때 맞춰 앞에 도착해 있겠습니다."
16003-1765 = "그때 뵙겠습니다."
16003-1766 = "스즈미입니다. 오늘은 즐거웠습니다."
16003-1767 = "다음번에 다시 뵙겠습니다, 선생님."
16003-1768 = "안녕하십니까, 선생님. 스즈미입니다."
16003-1769 = "일전에도 말씀드렸듯, 언제든 원하실 때 말씀해주십시오."
16003-1770 = "이번에는 에스코트가 아닌 동행으로 알고 있겠습니다."
16003-1771 = "음"
16003-1772 = "아닙니다. 바쁘시면 괜찮습니다."
16003-1773 = "우리 스즈미가 원한다면 가야지."
16003-1774 = "그럼 지금 당장 만날까."
16003-1775 = "ㄱㄴ%$ㅇㄹ3ㄴ#$%^"
16003-1776 = "……"
16003-1777 = "죄송합니다."
16003-1778 = "휴대전화를 손에서 잠시 놓쳤었습니다."
16003-1779 = "감사합니다."
16003-1780 = "그럼 제가 선정한 장소를 알려드리겠습니다. "
16003-1781 = "언젠가는 하루 종일 같이 걸으며"
16003-1782 = "하루 종일 아무 일도 없는 날이 왔으면 좋겠습니다."
16003-1783 = "음"
16003-1784 = "당분간은 요원한 것 같다……"
16003-1785 = "그게 제 결론이지만 말입니다."
16003-160030010 = "안녕하십니까, 선생님. 스즈미입니다."
16003-160030020 = "혹시 오늘 남는 시간이 있으실까요?"
16003-160030030 = "중요한 일은 아니고 그저 개인적인 용무인지라, 바쁘시다면 괜찮습니다."
16003-160030040 = "괜찮아. 한가해."
16003-160030050 = "이거보다 중요한 일은 없지."
16003-160030060 = "그, 그렇습니까."
16003-160030070 = "네 감사합니다."
16003-160030080 = "뭔가 폐를 끼친 건 아닌지 걱정되지만"
16003-160030090 = "그럼 와 주실 곳을 알려드리겠습니다."
16003-160030100 = "그"
16003-160030110 = "아닙니다. 잘 부탁드립니다."
16003-160030120 = "무사히 귀가하셨는지요, 선생님. 스즈미입니다."
16003-160030130 = "늦은 시간인데도 나와 주셔서 다시 한번 감사드립니다."
16003-160030140 = "이런 메시지를 더 보내는 것도 실례가 될 수 있다고는 생각하지만……"
16003-160030150 = "감사 인사 정도는 남겨놓아야 할 것 같아서 이렇게 메시지를 남깁니다."
16003-160030160 = "……"
16003-160030170 = "감사합니다 선생님."
16003-160030180 = "앞으로도 잘 부탁드리겠습니다."
16003-160030190 = "안녕하십니까, 선생님. 스즈미입니다."
16003-160030200 = "조만간 트리니티에 방문하실 일이 있다고 들었습니다."
16003-160030210 = "필요하시다면 언제든지"
16003-160030220 = "그"
16003-160030230 = "에스코트나 동행"
16003-160030240 = "어느 쪽이든 불러 주시면 함께 하겠습니다."
16003-160030250 = "연락드린 이유는 그것뿐입니다, 감사합니다."
16003-160030260 = "나야 늘 고맙지. 부탁할게, 스즈미."
16003-160030270 = "오, 그럼 오랜만에 같이 걸을까?"
16003-160030280 = "아"
16003-160030290 = "넵"
16003-160030300 = "감사합니다. 그럼 오셨을 때 찾아뵙겠습니다."
16003-160030310 = "오늘 일은 여러모로 감사합니다."
16003-160030320 = "덕분에 생각지도 않게, 많은 부분들이 즐거워졌습니다."
16003-160030330 = "에스코트 받은 건 접니다만?"
16003-160030340 = "나야말로 고맙지. 앞으로 잘 부탁해."
16003-160030350 = "그"
16003-160030360 = "아니"
16003-160030370 = "네."
16003-160030380 = "앞으로도 잘 부탁드립니다, 선생님."
16003-160030390 = "무슨 일 있으시면, 언제든지 편하게 연락 주시기 바랍니다."
16003-160030400 = "그리고 저 또한,"
16003-160030410 = "굳이"
16003-160030420 = "에스코트 쪽이 아니더라도, 언제든 괜찮습니다."

[translation]
20023-200230010 = "我是女武神警察學園公安局的局長尾刃環奈"
20023-200230020 = "明天10點30分前後，我會去拜訪夏萊的辦公室"
20023-200230030 = "這個時候終於還是到了嗎……"
20023-200230040 = "我是冤枉的！"
20023-200230050 = "……那是什麼意思？"
20023-200230060 = "我指的是之前和您約好擔任夏萊值日生的事……"
20023-200230070 = "會造成您的困擾嗎？"
20023-200230080 = "啊啊，是值日生的事啊……"
20023-200230090 = "沒有問題唷，沒事的"
20023-200230100 = "那就好……"
20023-200230110 = "那麼明天會在剛才所說的時間前去拜訪"
20023-200230120 = "老師，很抱歉這麼晚打擾您"
20023-200230130 = "我是女武神警察學園的尾刃環奈"
20023-200230140 = "怎麼了嗎？"
20023-200230150 = "很抱歉，因為我個人的一些原因……"
20023-200230160 = "下週值日生的安排，可以稍做更改嗎？"
20023-200230170 = "這種小事沒問題唷"
20023-200230180 = "發生什麼狀況了嗎？"
20023-200230190 = "那些警備局的笨蛋們又……"
20023-200230200 = "不"
20023-200230210 = "請忘了吧"
20023-200230220 = "因為傳來了緊急要求，我必須參加作戰"
20023-200230230 = "真辛苦呢……"
20023-200230240 = "這是身為公安局局長應盡的義務"
20023-200230250 = "那麼，關於值日生的日程我會另外發訊息聯絡您"
20023-200230260 = "請老師別在意事件，好好休息"
20023-200230270 = "女武神警察學園的餐廳雖然便宜且選擇豐富"
20023-200230280 = "不過營業時間相當有限"
20023-200230290 = "一專注於工作就時常錯過營業時間"
20023-200230300 = "也經常沒有用餐……"
20023-200230310 = "不能在外面吃嗎？"
20023-200230320 = "不，並沒有那種規定……"
20023-200230330 = "不過明明還有工作卻在外面用餐，會讓我有點抗拒"
20023-200230340 = "這麼說來，在生活安全局裡"
20023-200230350 = "似乎有不少學生想轉調至警備局或搜查局"
20023-200230360 = "我好像也聽過"
20023-200230370 = "有很多嗎……？"
20023-200230380 = "話說環奈一開始就是想進入公安局嗎？"
20023-200230390 = "您說我嗎？"
20023-200230400 = "我的話"
20023-200230410 = "1年級時是想加入生活安全局的……"
20023-200230420 = "但被人說這張臉擔任市民窗口的工作會有困難……"
20023-200230430 = "那還真是……"
20023-200230440 = "您有什麼想說的嗎？"
20023-200230450 = "沒有，什麼都沒有！"

[translation]
20023-200230010 = "발키리 경찰학교 공안국의 국장, 오가타 칸나입니다."
20023-200230020 = "내일 10시 30분, 샬레의 사무실을 방문하도록 하겠습니다."
20023-200230030 = "드디어 올 것이 왔나……"
20023-200230040 = "난 아무런 잘못도 하지 않았어!"
20023-200230050 = "……그게 무슨 말씀이신지?"
20023-200230060 = "전에 말씀드린 것처럼 샬레의 당번 업무차 방문 예정입니다만."
20023-200230070 = "혹 내일 방문하면 곤란한 일이라도 있으신지요."
20023-200230080 = "아, 당번 업무 때문이었구나……"
20023-200230090 = "괜찮아. 아무 문제도 없어."
20023-200230100 = "그렇다면 다행입니다."
20023-200230110 = "그럼 내일, 말씀드린 시각에 찾아 뵙겠습니다."
20023-200230120 = "늦은 시간에 죄송합니다, 선생님."
20023-200230130 = "발키리 경찰학교의 오가타 칸나입니다."
20023-200230140 = "무슨 일이야?"
20023-200230150 = "다름이 아니라 괜찮으시다면"
20023-200230160 = "다음 주 당번 일정을 조금 변경하고자 합니다"
20023-200230170 = "일정 변경은 문제없지만……"
20023-200230180 = "무슨 문제라도 있어?"
20023-200230190 = "그게 경비국의 머저리들이"
20023-200230200 = "아니"
20023-200230210 = "실례했습니다"
20023-200230220 = "경찰학교에 처리해야 할 긴급한 문제가 생겨 외근을 해야 할 것 같습니다."
20023-200230230 = "고생이 많네……"
20023-200230240 = "아닙니다. 발키리 경찰학교의 간부로서 당연히 수행해야 할 업무인걸요."
20023-200230250 = "변경된 일정은 메일을 통해 따로 고지드리겠습니다."
20023-200230260 = "그럼 먼저 말을 줄이겠습니다. 편안한 하루 되십시오."
20023-200230270 = "발키리 경찰학교의 구내식당은 가격이 저렴하고 반찬이 다양하긴 하지만"
20023-200230280 = "배식 시간이 짧은 게 단점이군요."
20023-200230290 = "업무에 집중하고 있다 보면 배식 시간을 놓치는 일이 잦은지라"
20023-200230300 = "종종 식사를 거르게 됩니다"
20023-200230310 = "구내 식당 밖에서 음식을 사 먹으면 안 되는 거야?"
20023-200230320 = "아뇨. 그런 규칙은 없습니다만……"
20023-200230330 = "어쩐지 밖에서 식사를 하는 것은 꺼려져서요."
20023-200230340 = "그러고 보니 생활안전국에는"
20023-200230350 = "경비국이나 수사국 전과를 희망하는 학생들이 제법 있던 모양이더군요"
20023-200230360 = "제법 있었지."
20023-200230370 = "많았었던가……?"
20023-200230380 = "그러고 보니 칸나는 처음부터 공안국을 지망했던 거야?"
20023-200230390 = "저 말씀이십니까?"
20023-200230400 = "제 경우는"
20023-200230410 = "1학년 때는 생활안전국을 지망했습니다만"
20023-200230420 = "그 얼굴로 민원 처리는 어려울 거라는 이야기를 들어서"
20023-200230430 = "음……"
20023-200230440 = "뭔가 하실 말씀이라도?"
20023-200230450 = "아무것도 아니야!"

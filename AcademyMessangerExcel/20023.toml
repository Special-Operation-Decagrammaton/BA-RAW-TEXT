[translation]
20023-200230010 = "This is Ogata Kanna, director of the Valkyrie Police School Public Peace Bureau."
20023-200230020 = "I'm coming to visit the Schale office at 10:30 tomorrow."
20023-200230030 = "So, my time of reckoning has come..."
20023-200230040 = "I didn't do anything wrong!"
20023-200230050 = "...What are you talking about?"
20023-200230060 = "I'll be visiting to fulfill my student duties at Schale, as I said before."
20023-200230070 = "Would it be a problem if I visited tomorrow?"
20023-200230080 = "Oh, it's for student duties..."
20023-200230090 = "It's okay. No problem."
20023-200230100 = "I'm glad to hear that."
20023-200230110 = "Then I'll see you tomorrow, at the scheduled time."
20023-200230120 = "I'm so sorry to contact you so late, Sensei."
20023-200230130 = "This is Ogata Kanna of Valkyrie Police School."
20023-200230140 = "Is something wrong?"
20023-200230150 = "If you don't mind,"
20023-200230160 = "I'd like to reschedule for next week."
20023-200230170 = "That's not a problem."
20023-200230180 = "Is something wrong?"
20023-200230190 = "It's the fools at the Security Bureau."
20023-200230200 = "Actually..."
20023-200230210 = "Excuse my language."
20023-200230220 = "There's an urgent problem to deal with at the Police School, so I'll be on patrol duty."
20023-200230230 = "You have a lot on your plate..."
20023-200230240 = "It's just my duty as an officer of Valkyrie Police School."
20023-200230250 = "I'll email you about my new schedule."
20023-200230260 = "That's all I have for now. Have a relaxing day."
20023-200230270 = "The Valkyrie Police School cafeteria has an inexpensive variety of dishes."
20023-200230280 = "Unfortunately, they are not open for long."
20023-200230290 = "When I'm focused on work, I can often miss lunchtime."
20023-200230300 = "So I end up skipping my meal."
20023-200230310 = "Can't you eat something from outside the school campus?"
20023-200230320 = "I could do that, but..."
20023-200230330 = "I just don't feel like eating outside for some reason."
20023-200230340 = "Come to think of it, in the Public Safety Bureau"
20023-200230350 = "there were a lot of students who wanted to transfer to the Security or Investigation Bureaus."
20023-200230360 = "There were quite a lot."
20023-200230370 = "Were there...?"
20023-200230380 = "Did you want to apply for the Public Peace Bureau from the beginning?"
20023-200230390 = "Me?"
20023-200230400 = "No, actually. In my case,"
20023-200230410 = "I applied to the Public Safety Bureau my first year."
20023-200230420 = "But I was told my demeanor was ill-equipped for dealing with civil complaints."
20023-200230430 = "Um..."
20023-200230440 = "Did you want to say something?"
20023-200230450 = "N-Nothing!"

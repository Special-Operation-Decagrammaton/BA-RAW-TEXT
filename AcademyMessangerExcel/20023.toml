[translation]
20023-200230010 = "หัวหน้ากรมความมั่นคงสาธารณะ\nสถาบันฝึกตำรวจวัลคิรี่ โอกาตะ คันนะค่ะ"
20023-200230020 = "พรุ่งนี้เวลา 10:30 น. จะไปพบที่สำนัก\nงานชาเล่ต์ค่ะ"
20023-200230030 = "ในที่สุดวันนี้ก็มาถึงสินะ..."
20023-200230040 = "ครูไม่ได้ทำอะไรผิดเลยนะ!"
20023-200230050 = "หมายความว่ายังไงน่ะ...?"
20023-200230060 = "อย่างที่เคยบอกไปค่ะ ฉันจะไปทำหน้า\nที่เวรตัวแทนที่ชาเล่ต์เท่านั้นค่ะ"
20023-200230070 = "หรือว่าพรุ่งนี้คุณครูไม่สะดวกรึเปล่าคะ"
20023-200230080 = "อ๋อ มาเข้าเวรตัวแทนนี่เอง..."
20023-200230090 = "ไม่เป็นไร ไม่มีอะไรหรอก"
20023-200230100 = "ถ้าไม่มีอะไรก็ดีแล้วละค่ะ"
20023-200230110 = "ถ้างั้นพรุ่งนี้ฉันจะไปพบตามเวลาที่\nแจ้งเอาไว้ค่ะ"
20023-200230120 = "ขอโทษที่ติดต่อมาตอนดึกค่ะคุณครู"
20023-200230130 = "โอกาตะ คันนะ จากสถาบันฝึกตำรวจ\nวัลคิรี่ค่ะ"
20023-200230140 = "มีอะไรเหรอ?"
20023-200230150 = "คือว่าถ้าคุณครูไม่ว่าอะไร..."
20023-200230160 = "ฉันอยากขอปรับตารางเข้าเวรตัวแทน\nอาทิตย์หน้าหน่อยน่ะค่ะ"
20023-200230170 = "เรื่องเปลี่ยนตารางน่ะไม่มีปัญหาหรอก..."
20023-200230180 = "คันนะมีเรื่องอะไรรึเปล่า?"
20023-200230190 = "คือว่าพวกงี่เง่าจากสำนักความมั่นคง..."
20023-200230200 = "ไม่สิ"
20023-200230210 = "ขอโทษด้วยค่ะ"
20023-200230220 = "พอดีมีปัญหาด่วนที่ต้องจัดการ\nที่สถาบันฝึกตำรวจน่ะค่ะ"
20023-200230230 = "ทำงานหนักน่าดูเลยนะ..."
20023-200230240 = "ไม่หรอกค่ะ เป็นงานที่ต้องทำในฐานะ\nเจ้าหน้าที่จากสถาบันฝึกตำรวจวัลคิรี่\nอยู่แล้วค่ะ"
20023-200230250 = "ฉันจะแจ้งตารางที่ปรับเปลี่ยนแล้วให้\nทราบอีกครั้งทางอีเมลนะคะ"
20023-200230260 = "ถ้างั้นขอตัวก่อนนะคะ ขอให้วันนี้เป็น\nวันที่ดีนะคะ"
20023-200230270 = "ร้านอาหารในสถาบันฝึกตำรวจวัลคิรี่\nราคาถูกและให้อาหารหลากหลายก็จริง"
20023-200230280 = "แต่ก็มีข้อเสียคือมีเวลาแจกอาหารน้อย\nมากๆ ค่ะ"
20023-200230290 = "เวลาที่จดจ่ออยู่กับงานมากๆ ก็มักจะลืม\nเวลาจนเลยเวลาแจกอาหารบ่อยๆ"
20023-200230300 = "เลยทำให้ไม่ได้กินข้าวบ่อยๆ ค่ะ"
20023-200230310 = "แล้วไปซื้ออาหารจากนอกโรงอาหาร\nไม่ได้เหรอ?"
20023-200230320 = "ก็ได้อยู่หรอกค่ะ ไม่มีกฏห้ามอะไร..."
20023-200230330 = "แต่ฉันไม่ค่อยอยากออกไปกินอาหาร\nข้างนอกน่ะค่ะ"
20023-200230340 = "พอดีที่สำนักรักษาความปลอดภัย"
20023-200230350 = "เหมือนจะมีพวกนักเรียนที่อยากจะย้าย\nมาที่สำนักความมั่นคงหรือสำนักงาน\nสืบสวนอยู่ด้วยค่ะ"
20023-200230360 = "ต้องมีอยู่แล้วแหละ"
20023-200230370 = "มีเยอะเลยเหรอ...?"
20023-200230380 = "ว่าแต่คันนะอยากเข้ากรมความมั่นคง\nสาธารณะตั้งแต่แรกเลยเหรอ?"
20023-200230390 = "ฉันเหรอคะ?"
20023-200230400 = "กรณีของฉัน..."
20023-200230410 = "ตอนอยู่ปี 1 ฉันเลือกสำนักรักษาความ\nปลอดภัยค่ะ"
20023-200230420 = "แต่พวกเขาบอกว่าหน้าแบบฉันจะ\nรับมือกับพวกชาวเมืองลำบากน่ะค่ะ"
20023-200230430 = "อืม..."
20023-200230440 = "คุณครูจะพูดอะไรเหรอคะ?"
20023-200230450 = "ครูไม่ได้จะพูดอะไรนะ!"

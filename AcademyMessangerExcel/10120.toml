[translation]
10120-101200010 = "ถ้ามีค้อนอยู่ในมือ"
10120-101200020 = "ปัญหาทุกอย่างในโลกนี้ก็จะดูจ้อยร่อย\nเหมือนตะปู"
10120-101200030 = "แต่พอมาถือไม้กลองแบบนี้"
10120-101200040 = "ทุกอย่างในโลกก็ดูน่าตื่นเต้นไปหมด\nเลยละ"
10120-101200050 = "อยากได้อะไรคลายเครียดหน่อยมั้ย?"
10120-101200060 = "หรืออยากได้อะไรมาเคาะเล่น...?"
10120-101200070 = "เปล่าๆ เปล่าหรอกคุณครู"
10120-101200080 = "มันเป็นความประทับใจของยูโทริ นัตสึ\nในฐานะ 'มือกลอง' น่ะ"
10120-101200090 = "แต่เรื่องการคลายเครียดก็เป็นข้ออ้าง\nที่ดีเหมือนกัน"
10120-101200100 = "งั้นไปเจอกันที่หน้าร้านนั้นนะ"
10120-101200110 = "อะไรนะ?"
10120-101200120 = "ไม่ใช่ว่าศิลปะเลียนแบบชีวิตหรอก"
10120-101200130 = "แต่ชีวิตต่างหากที่เลียนแบบงานศิลป์"
10120-101200140 = "แสดงว่าเราจำเป็นต้องออกไปสั่งสม\nประสบการณ์ชีวิตนะ คุณครู"
10120-101200150 = "งั้นเดี๋ยวเจอกันหน้าโรงหนังนะ"
10120-101200160 = "ว่าไงนะ?"
10120-101200170 = "อ่า"
10120-101200180 = "อ๊าาาาา"
10120-101200190 = "คูมคู มี เรื่อง ฉุกเฉิน"
10120-101200200 = "มาที่"
10120-101200210 = "ห้องซ้อมเร็ว"
10120-101200220 = "เอ๋?!"
10120-101200230 = "ต้องผ่อนแรงลง"
10120-101200240 = "เพื่อให้มีแรงมากขึ้น"
10120-101200250 = "ชีวิตของมือกลองมีชะตากรรมที่ต้อง\nเผชิญความขัดแย้งแบบนี้ด้วยหรือ..."
10120-101200260 = "...?"

[translation]
10120-101200010 = "手握鐵鎚時"
10120-101200020 = "世間的所有問題看起來都像釘子"
10120-101200030 = "而當手握鼓棒時"
10120-101200040 = "世間的一切都像能敲打的東西呢"
10120-101200050 = "……難道你需要找東西發洩壓力？"
10120-101200060 = "還是你只是想找個東西來敲……？"
10120-101200070 = "非也非也，老師"
10120-101200080 = "這是「鼓手」柚鳥夏的感想"
10120-101200090 = "不過拿紓壓當藉口似乎也不錯"
10120-101200100 = "那麼，就在那間店門口見吧"
10120-101200110 = "咦？"
10120-101200120 = "不是藝術模仿人生"
10120-101200130 = "而是人生模仿藝術"
10120-101200140 = "從這個角度來說，是否該實地考察一下呢，老師"
10120-101200150 = "那麼，就在那間電影院門口見吧"
10120-101200160 = "咦？"
10120-101200170 = "啊"
10120-101200180 = "啊啊啊啊啊"
10120-101200190 = "老師你快"
10120-101200200 = "來練習室"
10120-101200210 = "快點"
10120-101200220 = "咦！？"
10120-101200230 = "為了使出力量"
10120-101200240 = "就必須先放下力量"
10120-101200250 = "這種矛盾，難道是鼓手必須背負的宿命嗎……"
10120-101200260 = "……？"

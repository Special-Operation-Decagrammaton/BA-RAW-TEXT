[translation]
26008-260080010 = "선생님!"
26008-260080020 = "후후, 우후후후, 후후후후하하핫!"
26008-260080030 = "므하하하핫?"
26008-260080040 = "우후후후……?"
26008-260080050 = "그건 또 무슨 삼류 싸구려 악당 같은 웃음인가요!"
26008-260080060 = "저 그렇게 웃은 적 없거든요?!"
26008-260080070 = "그래서 여름인데 무슨 일이야, 시즈콧치?"
26008-260080080 = "치……?"
26008-260080090 = "뭐, 좋아요. 오늘은 백야당 최고의 날이니까!"
26008-260080100 = "너그럽게 넘어가 드릴게요!"
26008-260080110 = "감사하셔도 좋다구요? 우후후후!"
26008-260080120 = "기분이 좋아 보이네."
26008-260080130 = "그 정도가 아니에요!"
26008-260080140 = "백야당은 이번 '바다의 집'을 발판으로"
26008-260080150 = "전 키보토스적인 프랜차이즈로 거듭날 테니까요!"
26008-260080160 = "그러니까 선생님은 그 현장을"
26008-260080170 = "저와 함께 지켜보실 의무가 있어요!"
26008-260080180 = "언제나와 같은 억지구나……"
26008-260080190 = "저, 선생님?"
26008-260080200 = "왜 그래?"
26008-260080210 = "아뇨……"
26008-260080220 = "아무것도 아니에요. 응. 그래요."
26008-260080230 = "서로, 힘내죠?"
26008-260080240 = "상담이라도 필요해?"
26008-260080250 = "따, 딱히 그런 거 아니거든요?!"
26008-260080260 = "신나서 넘겨짚지 마세요!"
26008-260080270 = "음…… 백야당 바다의 집 오너와"
26008-260080280 = "잡담이라도 나누고 싶은데."
26008-260080290 = "그, 그런 거라면 뭐!"
26008-260080300 = "만나서 이야기하지 못할 것도 없죠, 네! "
26008-260080310 = "안! 녕! 하세요! "
26008-260080320 = "선생님!"
26008-260080330 = "안녕. 시즈코."
26008-260080340 = "오늘은…… 특히 기운차네?"
26008-260080350 = "후후, 우후후후. 그럼요!"
26008-260080360 = "시즈코는 언제나 기운 넘치는걸요?"
26008-260080370 = "그렇다기엔, 그때는……"
26008-260080380 = "잘 모르겠지만, 그런 걸로 하자."
26008-260080390 = "자, 다른 게 아니라 "
26008-260080400 = "제가 선생님을 부른 이유는!"
26008-260080410 = "지금부터 보여드리고 싶고"
26008-260080420 = "이야기하고 싶은 게 있기 때문이랍니다."
26008-260080430 = "기대하셔도 좋아요!"

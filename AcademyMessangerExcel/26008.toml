[translation]
26008-260080010 = "老師，辛苦了！"
26008-260080020 = "呵呵，呵呵呵呵呵……"
26008-260080030 = "咯咯咯？"
26008-260080040 = "呵呵呵呵……？"
26008-260080050 = "什麼呀，那種廉價的壞蛋笑聲！"
26008-260080060 = "我沒有那樣笑吧！？"
26008-260080070 = "所以，這麼突然有什麼事嗎，靜子親？"
26008-260080080 = "親……？"
26008-260080090 = "嘛，好吧！今天是百夜堂自開張以來最棒的一天！"
26008-260080100 = "我會用開闊的心胸接受！"
26008-260080110 = "你可以因此感謝我唷，呵呵呵！"
26008-260080120 = "總感覺心情很好呢"
26008-260080130 = "是的，而且早就超過「好」的範疇了！"
26008-260080140 = "百夜堂這次將以「海之家」為起點……"
26008-260080150 = "重生為奇普托斯第一的特許加盟店！"
26008-260080160 = "所以 "
26008-260080170 = "老師有義務和我一起見證這一切！"
26008-260080180 = "和往常一樣亂來呢"
26008-260080190 = "那個，老師"
26008-260080200 = "怎麼了？"
26008-260080210 = "不"
26008-260080220 = "什麼事都沒有"
26008-260080230 = "總之，今天也要互相加油！"
26008-260080240 = "難道有什麼煩惱嗎？"
26008-260080250 = "才，才不是那樣……！"
26008-260080260 = "是老師的錯覺！"
26008-260080270 = "偶爾想跟百夜堂的老闆"
26008-260080280 = "一起聊聊天呢"
26008-260080290 = "……如，如果是那樣的話！"
26008-260080300 = "也沒有事是……不能見面說的！對！ "
26008-260080310 = "老師！"
26008-260080320 = "辛苦了！！"
26008-260080330 = "辛苦了"
26008-260080340 = "總感覺，比平時更有活力啊？"
26008-260080350 = "呵呵呵呵，那當然！"
26008-260080360 = "靜子一直都是元氣滿滿！"
26008-260080370 = "可是之前總感覺……"
26008-260080380 = "確實好像是這樣呢"
26008-260080390 = "啊，對了"
26008-260080400 = "今天之所以會聯絡"
26008-260080410 = "是因為現在有東西想給你看"
26008-260080420 = "有些話想跟你說"
26008-260080430 = "敬請期待！"

[translation]
26008-260080010 = "คุณครู!"
26008-260080020 = "ฮิฮิ... ฮิฮิฮิฮิ... ฮิฮิฮิฮิฮิ"
26008-260080030 = "วะฮะฮะฮะฮ่า!"
26008-260080040 = "อุฮุฮุฮุฮุ...?"
26008-260080050 = "เหมือนเสียงหัวเราะของอันธพาล\nกระจอกๆ ระดับสามจริงๆ เลยค่ะ!"
26008-260080060 = "ฉันไม่เคยหัวเราะแบบนั้นมาก่อนเลยนะ?!"
26008-260080070 = "หน้าร้อนแบบนี้มีอะไรเหรอ ชิซุโกจจี้?"
26008-260080080 = "ชิซุโกจจี้...?"
26008-260080090 = "เอาเถอะ วันนี้เป็นวันที่ยอดเยี่ยมที่สุด\nของร้านเฮียกคิยาโค!"
26008-260080100 = "ฉันจะปล่อยไปก็แล้วกันค่ะ!"
26008-260080110 = "จะขอบคุณฉันอีกก็ได้นะคะ ฮุฮุฮุฮุ!"
26008-260080120 = "ดูอารมณ์ดีจังเลยนะ"
26008-260080130 = "ไม่ใช่แค่นั้นนะคะ!"
26008-260080140 = "ร้านเฮียกคิยาโคจะถือกำเนิดขึ้นใหม่\nในรูปแบบของ \"ร้านริมทะเล\""
26008-260080150 = "ที่เปิดแฟรนไชส์ไปทั่วคิโวทอสเลยค่ะ!"
26008-260080160 = "เพราะงั้นคุณครูมีหน้าที่ "
26008-260080170 = "ที่ต้องคอยไปดูหน้าร้านกับฉันค่ะ!"
26008-260080180 = "บังคับกันเหมือนทุกครั้งเลยสินะ..."
26008-260080190 = "เอ่อ คุณครูคะ?"
26008-260080200 = "มีอะไรเหรอ?"
26008-260080210 = "เปล่าค่ะ..."
26008-260080220 = "ไม่มีอะไรหรอกค่ะ อื้อ... เปล่าค่ะ"
26008-260080230 = "มาพยายามด้วยกันนะคะ"
26008-260080240 = "อยากปรึกษาอะไรครูรึเปล่า?"
26008-260080250 = "มะ...ไม่ใช่อย่างนั้นซะหน่อยค่ะ?!"
26008-260080260 = "อย่าตื่นเต้นเกินไปสิคะ!"
26008-260080270 = "อืม... ครูอยากคุยกับเจ้าของร้าน"
26008-260080280 = "ของร้านเฮียกคิยาโคสาขาริมทะเลน่ะ"
26008-260080290 = "ถะ... ถ้าอย่างนั้นก็ได้ค่ะ!"
26008-260080300 = "ถ้าได้เจอกันแล้วก็คงคุยกันได้ทุกเรื่อง\nใช่มั้ยล่ะคะ! "
26008-260080310 = "สะ-หวัด-ดี-ค่ะ! "
26008-260080320 = "คุณครู!"
26008-260080330 = "หวัดดี ชิซุโกะ"
26008-260080340 = "วันนี้มีพลังสุดๆ เลยนะ?"
26008-260080350 = "ฮิฮิ... ใช่แล้วค่ะ!"
26008-260080360 = "ไม่ว่าเมื่อไรชิซุโกะก็มีพลังเหลือเฟือ\nเสมอค่ะ!"
26008-260080370 = "ถ้าเป็นแบบนั้น ตอนนั้น..."
26008-260080380 = "ถึงไม่ค่อยเข้าใจเท่าไร แต่เอาแบบนั้น\nก็แล้วกันนะ"
26008-260080390 = "คือว่า... "
26008-260080400 = "เหตุผลที่ฉันเรียกคุณครูมา"
26008-260080410 = "มีบางอย่างที่ฉันอยากพูด"
26008-260080420 = "และอยากให้คุณครูดูค่ะ"
26008-260080430 = "ตั้งตารอได้เลยค่ะ!"

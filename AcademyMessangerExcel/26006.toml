[translation]
26006-260060010 = "คุณครูเชื่อเรื่องการทำนายโชคชะตาไหมคะ?"
26006-260060020 = "ครูคิดว่ามันก็น่าเชื่อถือดีนะ"
26006-260060030 = "ครูคิดว่ามันไม่แม่นเท่าไหร่เลย..."
26006-260060040 = "งั้นเหรอคะ ถ้างั้นคราวหน้าคุณครูช่วย\nเล่าเรื่องดวงของคุณครูให้ฟังบ้างนะคะ!"
26006-260060050 = "งั้นเหรอคะ? ถ้างั้นลองเช็ก\n<ดวงชะตาประจำวัน> ในนิตยสาร\nคิโวทอสรายสัปดาห์สิคะ"
26006-260060060 = "การทำนายดวงของที่นี่ไม่เคย\nพลาดเลยนะคะ"
26006-260060070 = "ถ้าตามที่ <ดวงชะตาประจำวัน>\nเขียนไว้ล่ะก็... วันนี้ฉันจะมีดวงเรื่อง\nโชคลาภค่ะ!"
26006-260060080 = "หลังจากย้ายมาอยู่ที่ห้องเรียนพิเศษ\nก็ไม่ค่อยมีโชคเรื่องดวงสักเท่าไหร่..."
26006-260060090 = "ชักตื่นเต้นจนจะทนไม่ไหวแล้วค่ะ!"
26006-260060100 = "ถ้ามีเรื่องดีๆ เกิดขึ้นก็คงดีนะ"
26006-260060110 = "ใช่แล้วล่ะค่ะ!"
26006-260060120 = "ฉะ... ฉันนอนไม่หลับเพราะกังวลเรื่อง\nขนมแสนอร่อยที่ฉันกินเหลือไว้\nเมื่อกี้น่ะค่ะ"
26006-260060130 = "อุตส่าห์ดวงดีแล้วแท้ๆ\nแต่ฉันกลับกินไม่หมด น่าเสียดายจริงๆ "
26006-260060140 = "คราวหน้าครูจะซื้อขนม\nจากร้านลูวาโซ บลูให้อีกนะ"
26006-260060150 = "มะ...ไม่ได้นะคะ! ถะ...ถ้าคุณครูสัญญา\nแบบนั้นล่ะก็..."
26006-260060160 = "ฉันคงเอาแต่นึกถึงสัญญาจนนอนไม่หลับ\nแน่เลยค่ะ!"
26006-260060170 = "คุณครูคะ วันนี้จะอยู่ที่ชาเล่ต์ทั้งวัน\nเลยเหรอคะ?"
26006-260060180 = "อื้อ ครูอยู่ที่ชาเล่ต์ตลอดนั่นแหละ\nมีเรื่องอะไรเหรอ?"
26006-260060190 = "เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
26006-260060200 = "ฉันก็แค่ถามดูเฉยๆ ค่ะ ฮิฮิ"
26006-260060210 = "???"
26006-260060220 = "คุณครูคะ ได้ยินข่าวรึยังคะ?"
26006-260060230 = "เรื่องฝนดาวตกค่ะ ฝนดาวตก!"
26006-260060240 = "ฝนดาวตกเหรอ?"
26006-260060250 = "ใช่ค่ะ ฉันอ่านหนังสือพิมพ์มา\nเขาบอกว่าวันพระจันทร์เต็มดวงนี้\nจะมีฝนดาวตกลีโอนิดส์ค่ะ"
26006-260060260 = "แล้วก็เขียนว่าฝนดาวตกลีโอนิดส์ที่จะ\nมีขึ้น จะมองเห็นได้แต่ในบริเวณ\nสหภาพเรดวินเทอร์ด้วยค่ะ"
26006-260060270 = "คราวที่แล้วแถวนี้มองไม่เห็นฝนดาว\nตกเลย ฉันเลยรู้สึกเศร้ามากๆ"
26006-260060280 = "ถ้าได้เห็นฝนดาวตกกับตาตัวเองจริงๆ\nจะดีแค่ไหนกันนะ"
26006-260060290 = "ฉันตื่นเต้นจนแทบรอไม่ไหวแล้วค่ะ!"
26006-260060300 = "คุณครู! ช่วงเวลาที่จะมีดาวตกเยอะที่\nสุดคือตอนห้าทุ่มค่ะ!"
26006-260060310 = "เพราะงั้นต้องมาก่อนหน้านั้นนะคะ!"
26006-260060320 = "รู้แล้วล่ะ ครูจะไปถึงก่อนสัก\nหนึ่งชั่วโมงแล้วกัน"
26006-260060330 = "ห้ามมาสายเด็ดขาดเลยนะคะ!"
26006-260060340 = "รู้แล้วล่ะ..."
26006-260060350 = "ห้ามสายนะคะ! ห้ามสายเด็ดขาด!"
26006-260060360 = "คุณครูชอบอากาศแบบไหนที่สุด\nเหรอคะ?"
26006-260060370 = "วันที่อากาศแจ่มใส"
26006-260060380 = "วันที่ฝนตก"
26006-260060390 = "ก็โอเคนะคะ ทุกคนชอบวันที่อากาศ\nแจ่มใสกันสินะคะ"
26006-260060400 = "ถึงบรรยากาศจะดูครึ้มๆ ไปบ้าง\nแต่หลายๆ คนก็ดูชอบวันที่ฝนตกนะคะ"
26006-260060410 = "ถึงจะเป็นวันที่สดใสไม่ค่อยมีเมฆ\nหรือวันที่ฝนตกหนักจนชุ่มฉ่ำ\nฉันก็ชอบทั้งหมดค่ะ"
26006-260060420 = "แต่ว่าฉันชอบท้องฟ้าที่มีก้อนเมฆลอย\nเอื่อยๆ ที่สุดเลย!"
26006-260060440 = "ดูสิคะคุณครู"
26006-260060450 = "ฉันถ่ายรูปวิวสวยๆ มาให้คุณครูด้วยค่ะ\nเป็นยังไงบ้างคะ"
26006-260060460 = "ท้องฟ้าสวยจังเลยนะ"
26006-260060470 = "ใช่ไหมล่ะคะ? เพราะแบบนี้ฉันถึงชอบ\nวันที่มีเมฆเยอะค่ะ"
26006-260060480 = "ถ้าได้มากับคุณครูก็คงดีมากเลยนะคะ"
26006-260060490 = "มะ...ไม่ต้องสนใจข้อความสุดท้าย\nหรอกนะคะ!"

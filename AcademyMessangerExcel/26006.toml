[translation]
26006-260060010 = "老師相信占卜嗎？"
26006-260060020 = "蠻相信的唷"
26006-260060030 = "不怎麼相信吧……"
26006-260060040 = "真的啊。請老師告訴我下次看到的占卜結果！"
26006-260060050 = "真的嗎？我很推薦奇普托斯日刊的「今日運勢」唷"
26006-260060060 = "那個占卜從未出錯過！"
26006-260060070 = "「今日運勢」上面寫說，我今天財運當頭！"
26006-260060080 = "來到特別班後，第一次出現財運好的占卜結果……！"
26006-260060090 = "呵呵，現在已經期待到不行了！"
26006-260060100 = "有發生好事，就好了呢"
26006-260060110 = "是的！"
26006-260060120 = "嗚嗚，那些因為吃不完而剩下的高級甜點，至今還殘留在我腦裡，無法入睡……"
26006-260060130 = "明明是難得的財運，卻錯失了機會……真是可惜……"
26006-260060140 = "下次我再請你吃同一家店"
26006-260060150 = "不，不行！如果立了那種約定的話……"
26006-260060160 = "在去那家店之前，會一直睡不著覺！"
26006-260060170 = "老師，你今天會一直在夏萊嗎？"
26006-260060180 = "嗯，是這麼打算。有什麼事嗎？"
26006-260060190 = "不，沒事，沒什麼特別的"
26006-260060200 = "只是問問而已，欸嘿嘿"
26006-260060210 = "？？？"
26006-260060220 = "老師，聽說了嗎？"
26006-260060230 = "有流星雨唷，流星雨！"
26006-260060240 = "流星雨？"
26006-260060250 = "是的，我在新聞上看到的，這次的滿月之日似乎能看到獅子座流星雨！"
26006-260060260 = "而且，這次的獅子座流星雨，也能在赤冬的自治區看到！"
26006-260060270 = "之前的流星雨，雖然很遺憾地都沒能在這附近觀測到，不過這次一定……！"
26006-260060280 = "實際見到的話，會有多漂亮呢？"
26006-260060290 = "我已經在期待了！"
26006-260060300 = "老師！聽說今晚的流星雨高峰時間是晚上11點！"
26006-260060310 = "所以，請在那之前來唷！"
26006-260060320 = "知道了，我會保留充裕的時間，提前一個小時過去"
26006-260060330 = "不能遲到唷！"
26006-260060340 = "知道了知道了"
26006-260060350 = "絕對唷！絕對！"
26006-260060360 = "老師喜歡什麼樣的天氣呢？"
26006-260060370 = "晴天吧"
26006-260060380 = "雨天吧"
26006-260060390 = "原來如此，喜歡晴天的人很多吧"
26006-260060400 = "雖然感覺不像晴天那麼多，但雨天也很受歡迎呢"
26006-260060410 = "我喜歡萬里無雲的晴朗天空，也喜歡下得滴滴答答的雨……"
26006-260060420 = "事實上，我最喜歡滿天雲彩的天空！"
26006-260060440 = "請看，老師！"
26006-260060450 = "約定好要拍的照片。怎麼樣呢？"
26006-260060460 = "真漂亮呢"
26006-260060470 = "沒錯吧！我之所以喜歡多雲的日子，就是因為喜歡這樣的景色"
26006-260060480 = "如果能和老師一起去就更好了……"
26006-260060490 = "請，請不要在意剛才的訊息！"

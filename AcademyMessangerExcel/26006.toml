[translation]
26006-260060010 = "선생님, 선생님은 운세 점괘를 얼마나 믿으시나요?"
26006-260060020 = "제법 잘 맞는다고 생각해."
26006-260060030 = "그다지 맞는 것 같지는 않은데……."
26006-260060040 = "그렇군요. 나중에 선생님이 보는 운세 점괘를 제게도 알려주세요!"
26006-260060050 = "그런가요? 그럼 일간 키보토스의 <오늘의 운세>를 확인해보세요."
26006-260060060 = "이곳의 운세 점괘는 틀린 적이 없거든요!"
26006-260060070 = "<오늘의 운세>에 따르면 오늘의 저는 금전운이 좋다고 하네요!"
26006-260060080 = "특별반에 온 이후로 금전운이 좋다는 점괘는 나온 적이 없었는데……"
26006-260060090 = "후후, 벌써부터 기대가 되어서 참을 수가 없네요!"
26006-260060100 = "좋은 일이 있었으면 좋겠네."
26006-260060110 = "네, 그러게 말이에요!"
26006-260060120 = "으으…… 아까 못 먹고 남긴 고급 스위츠가 신경 쓰여서 잠이 오질 않아요."
26006-260060130 = "모처럼 금전운이 따랐는데도 그 기회를 살리지 못하다니, 너무 아쉬워요."
26006-260060140 = "다음번에도 르와조 블뢰에서 스위츠를 사줄게."
26006-260060150 = "아, 안 돼요! 그런 약속을 들어버리면……."
26006-260060160 = "앞으로도 계속 잠을 잘 수 없게 되어버린다고요!"
26006-260060170 = "선생님, 오늘은 쭉 샬레에만 계시나요?"
26006-260060180 = "응. 샬레에만 있는데. 무슨 용무라도 있어?"
26006-260060190 = "아뇨, 아무 일도 없어요."
26006-260060200 = "그냥 여쭤본 것뿐이에요. 헤헤."
26006-260060210 = "???"
26006-260060220 = "선생님, 그 소식 들으셨나요?"
26006-260060230 = "유성우에요, 유성우!"
26006-260060240 = "……유성우?"
26006-260060250 = "네, 신문에서 봤는데, 이번 보름에 사자자리 유성우가 찾아온대요!"
26006-260060260 = "게다가 이번 보름에 오는 사자자리 유성우는 붉은겨울 학원 자치구에서도 볼 수 있다고 하네요."
26006-260060270 = "지난번 유성우는 이 근처에서 관측할 수 없어서 정말 아쉬웠는데……."
26006-260060280 = "직접 보는 유성우는 얼마나 아름다울까요?"
26006-260060290 = "벌써부터 기대가 되네요!"
26006-260060300 = "선생님! 이번 유성우가 절정을 이루는 순간은 밤 11시래요!"
26006-260060310 = "그러니 꼭 그 전에 오셔야 해요!"
26006-260060320 = "알고 있어. 여유 있게 한 시간 전에 가도록 할게."
26006-260060330 = "절대로 늦으시면 안 돼요!"
26006-260060340 = "알고 있다니까……"
26006-260060350 = "꼭이에요! 꼭!"
26006-260060360 = "선생님은 어떤 날씨를 제일 좋아하시나요?"
26006-260060370 = "맑은 날."
26006-260060380 = "비 내리는 날."
26006-260060390 = "무난하네요. 다들 맑은 날을 좋아하죠."
26006-260060400 = "드물긴 하지만 비 내리는 흐린 날도 인기가 많긴 하죠."
26006-260060410 = "뭐, 구름 하나 없이 맑은 날도, 자박자박 비가 내리는 날도 좋기는 하지만……"
26006-260060420 = "저는 구름이 잔뜩 흩뿌려진 하늘이 제일 좋아요!"
26006-260060440 = "보세요, 선생님."
26006-260060450 = "선생님을 위해 대신 예쁜 풍경을 찍어 왔어요. 어떤가요?"
26006-260060460 = "예쁜 하늘인걸."
26006-260060470 = "그렇죠? 제가 구름이 많은 날을 좋아하는 이유가 바로 이거예요."
26006-260060480 = "선생님도 같이 왔으면 좋았을 텐데……."
26006-260060490 = "마, 마지막 문자는 신경 쓰지 마세요!"

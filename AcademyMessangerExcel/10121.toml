[translation]
10121-101210010 = "Greetings, Sensei!"
10121-101210020 = "The situation is...I am travelling to the sea for leisure!"
10121-101210030 = "In addition, it will be with my upperclassmen from the Hyakkaryouran!"
10121-101210040 = "That's great!"
10121-101210050 = "Yes! Perhaps this is simply a dream I am adrift in!"
10121-101210060 = "And so that we may have a successful summer vacation..."
10121-101210070 = "I must begin practicing gaku-biwa immediately!"
10121-101210080 = "...Gaku-biwa?"
10121-101210090 = "What does a traditional instrument have to do with vacation?  "
10121-101210100 = "Ah!"
10121-101210110 = "Should I instead practice my dance skills in preparation?"
10121-101210120 = "Let us discuss this in person! Sensei!!!"
10121-101210130 = "Uh, right now?"
10121-101210140 = "I'm starting to see a pattern here..."
10121-101210150 = "Yes! I am already on my way!"
10121-101210160 = "Sensei!"
10121-101210170 = "I have stored the swimsuit we purchased today in a safe place!"
10121-101210180 = "That's meant for you to wear!"
10121-101210190 = "I understand! Of course, things must be allowed to fulfill their purpose to have true value!"
10121-101210200 = "This outfit is so cute and precious! It would be an affront to the seamstress to not wear it as intended!"
10121-101210210 = "Sensei!"
10121-101210220 = "Over the past few days, I have been tossing and turning through the night, thinking and thinking and thinking!"
10121-101210230 = "As the rising star of the Hyakkaryouran and its future—its brilliant future—this elite girl"
10121-101210240 = "must reveal an incredible side of herself while at sea!"
10121-101210250 = "What's come over you all of a sudden?"
10121-101210260 = "What does that mean exactly?"
10121-101210270 = "Well, you see, the incredible sea version of me!!"
10121-101210280 = "Will be!!"
10121-101210290 = "Good at swimming!"
10121-101210300 = "The result of many sleepless nights of thinking..."
10121-101210310 = "I had similar thoughts in elementary school!"
10121-101210320 = "Yes! In order to achieve this, I must begin my intensive training course! Today!"
10121-101210330 = "And I have a request of you, Sensei!"
10121-101210340 = "Could you please bequeath the secret techniques of the art of swimming upon me? "
10121-101210350 = "There's nothing special like that, but if you want..."
10121-101210360 = "Do you want to meet right now?"
10121-101210370 = "Yes! Please!"
10121-101210380 = "Sensei. My apologies for my household staff..."
10121-101210390 = "It was a divergence from their usual manners... They become overprotective when I am involved..."
10121-101210400 = "It's how they show that they care, Yukari."
10121-101210410 = "It's okay! How are you feeling, Yukari?"
10121-101210420 = "I am feeling a bit...! MMMmmm!"
10121-101210430 = "I have lost what would have been a wonderful opportunity to spend quality time with you, Sensei."
10121-101210440 = "We'll go swimming next time."
10121-101210450 = "We'll be safe together in the ocean!"
10121-101210460 = "Fufu! It's a promise!"
10121-101210470 = "I shall eagerly await that day!  "
10121-101210480 = "Sensei!"
10121-101210490 = "Sensei! Have you looked outside?!"
10121-101210500 = "It is the sea!"
10121-101210510 = "Oh, you're back to yourself."
10121-101210520 = "You're energetic today!"
10121-101210530 = "Yes! We only have so much time, so we cannot waste it feeling down!"
10121-101210540 = "Time is gold, as they say!"
10121-101210550 = "A very Yukari-like approach!"
10121-101210560 = "How positive!"
10121-101210570 = "Then, Sensei!"
10121-101210580 = "As you promised, we must swim together in the ocean!"
10121-101210590 = "Sensei! I had so much fun!"
10121-101210600 = "So much so that I can barely keep my eyelids open!"
10121-101210610 = "You're a really good swimmer!"
10121-101210620 = "That was some very elegant swimming."
10121-101210630 = "Huh? No! I'm only average!"
10121-101210640 = "I can hardly call myself a Hyakkaryouran elite by simply being average!"
10121-101210650 = "I'll be rooting for you!"
10121-101210660 = "You're always full of energy, Yukari."
10121-101210670 = "Good night."
10121-101210680 = "Sensei... I fell asleep."
10121-101210690 = "How rude of me...in the middle of conversation..."
10121-101210700 = "Did you sleep well?"
10121-101210710 = "As long as you're well rested!"
10121-101210720 = "Yes! I have made a complete recovery!"
10121-101210730 = "In fact, I could venture back into the ocean right now!"
10121-101210740 = "You shouldn't. It's dangerous to go into the water at night."
10121-101210750 = "Rest tonight, so we can have more fun tomorrow!"
10121-101210760 = "But I simply cannot bring myself to sleep tonight!"
10121-101210770 = "My experiences in the ocean were both new and exciting!"
10121-101210780 = "Sensei!"
10121-101210790 = "I had so much fun today!"
10121-101210800 = "I'm glad to hear it."
10121-101210810 = "I had fun too."
10121-101210820 = "I, Yukari, may be young, but I know one thing with absolute certainty!"
10121-101210830 = "That I will neeeeever!"
10121-101210840 = "Eeeever! Forget about this summer!"

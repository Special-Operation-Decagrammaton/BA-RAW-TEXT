[translation]
10121-101210010 = "วันนี้เป็นยังไงบ้างเจ้าคะ? ท่านอาจารย์!"
10121-101210020 = "ข้าจะมาบอกว่า ข้าจะไปเที่ยวทะเลน่ะ\nเจ้าค่ะ!"
10121-101210030 = "ไปกับพวกรุ่นพี่ในเฮียกกะเรียวรันด้วย\nเจ้าค่ะ!"
10121-101210040 = "ดีเลยนะ!"
10121-101210050 = "เจ้าค่ะ! รู้สึกเหมือนฝันไปเลยละ!"
10121-101210060 = "เพื่อให้เป็นการพักร้อนที่ยอดเยี่ยม..."
10121-101210070 = "ตั้งแต่วันนี้ข้าก็เลยจะฝึกเล่นบิวะเจ้าค่ะ!"
10121-101210080 = "พิณบิวะน่ะเหรอ...?"
10121-101210090 = "ทำไมถึงจะเล่นพิณขึ้นมาล่ะ...?  "
10121-101210100 = "อ๊ะ!"
10121-101210110 = "หรือว่าข้าไปฝึกระบำดีกว่าเจ้าคะ?"
10121-101210120 = "ท่านอาจารย์! ขอข้าแวะไปปรึกษาอะไร\nด้วยหน่อยนะเจ้าคะ!"
10121-101210130 = "หืม? ตอนนี้เลยเหรอ?"
10121-101210140 = "ครูชักจะชินกับแพทเทิร์นนี้แล้วสิ..."
10121-101210150 = "เจ้าค่ะ! ข้าจะไปตอนนี้เลยเจ้าค่ะ!"
10121-101210160 = "ท่านอาจารย์!"
10121-101210170 = "ข้าจะเก็บชุดว่ายน้ำที่ซื้อด้วยกันวันนี้\nให้ดีเลยเจ้าค่ะ!"
10121-101210180 = "แต่ถึงเวลาก็ต้องเอามาใส่นะ!"
10121-101210190 = "ข้ารู้ดีเจ้าค่ะ! คุณค่าของสิ่งของอยู่ที่\nการใช้งาน!"
10121-101210200 = "ชุดที่น่ารักพวกนี้ก็ด้วย... ถ้าไม่ใส่ก็จะ\nเป็นการเสียมารยาทต่อช่างที่ตัดชุดเจ้าค่ะ!"
10121-101210210 = "ท่านอาจารย์!"
10121-101210220 = "2-3 วันมานี้ข้าได้แต่นอนคิดแล้วคิดอีก\nเจ้าค่ะ!"
10121-101210230 = "ข้าเป็นถึงสุดยอดอิล~ลีทที่จะได้ฉายา\nว่าเป็นอนาคตใหม่ของเฮียกกะเรียวรัน..."
10121-101210240 = "เพราะงั้นข้าก็ต้องโชว์ฝีมือในทะเลด้วย\nเจ้าค่ะ!"
10121-101210250 = "จู่ๆ ก็เริ่มอะไรอีกแล้ว"
10121-101210260 = "จะโชว์ฝีมืออะไรในทะเลเหรอ?"
10121-101210270 = "สิ่งที่ข้าแสดงให้เห็นได้ในทะเล..."
10121-101210280 = "ก็คือ!"
10121-101210290 = "การว่ายน้ำเก่งๆ เจ้าค่ะ!"
10121-101210300 = "คิดมาหนักเลยสินะ..."
10121-101210310 = "ครูเคยคิดแบบนี้สมัยประถมนะ!"
10121-101210320 = "ตั้งแต่วันนี้ข้าก็เลยจะฝึกว่ายน้ำอย่าง\nเอาจริงเอาจัง..."
10121-101210330 = "แต่ข้ามีเรื่องอยากขอร้องท่านอาจารย์\nอย่างหนึ่งเจ้าค่ะ!"
10121-101210340 = "ท่านอาจารย์ช่วยสอนเคล็ดลับการ\nว่ายน้ำให้ข้าหน่อยได้มั้ยเจ้าคะ?! "
10121-101210350 = "ครูไม่ได้มีเทคนิคพิเศษมากมาย\nหรอกนะ..."
10121-101210360 = "งั้นมาเจอกันเลยมั้ยล่ะ?"
10121-101210370 = "เจ้าค่ะ! ดีเลยเจ้าค่ะ!"
10121-101210380 = "ท่านอาจารย์ วันนี้คนในตระกูลข้า\nเสียมารยาทไปเจ้าค่ะ..."
10121-101210390 = "ปกติพวกท่านไม่ได้เป็นคนแบบนั้น\nแต่พอเป็นเรื่องเกี่ยวกับข้าก็เป็นห่วงกัน\nมากเกินไป..."
10121-101210400 = "ทุกคนทำเพื่อยูคารินะ"
10121-101210410 = "ครูไม่ว่าอะไรหรอก แล้วยูคาริล่ะ?"
10121-101210420 = "ข้าเสียดายนิดหน่อยเจ้าค่ะ! "
10121-101210430 = "ข้าอยากใช้เวลากับท่านอาจารย์แค่\n2 คนแท้ๆ เชียว"
10121-101210440 = "ไว้ไปว่ายน้ำกันทีหลังนะ"
10121-101210450 = "คนที่บ้านคงไม่ตามมาถึงทะเล\nหรอกเนอะ"
10121-101210460 = "ฮุฮุ! สัญญาแล้วนะเจ้าคะ!"
10121-101210470 = "แล้วข้าจะนับนิ้วรอวันนั้นเลยเจ้าค่ะ!  "
10121-101210480 = "ท่านอาจารย์!"
10121-101210490 = "ท่านอาจารย์! มองเห็นข้างนอกมั้ย\nเจ้าคะ?!"
10121-101210500 = "ทะเลเจ้าค่ะ!"
10121-101210510 = "โอ้ กลับมามีพลังแล้วสินะ"
10121-101210520 = "วันนี้มีชีวิตชีวาจังเลย!"
10121-101210530 = "เจ้าค่ะ! เวลามีจำกัด ข้าจะมัวหงอยอยู่\nไม่ได้เจ้าค่ะ!"
10121-101210540 = "เวลาเป็นเงินเป็นทองนะเจ้าคะ~!"
10121-101210550 = "สมกับเป็นยูคาริจังเลยนะ"
10121-101210560 = "คิดบวกมากเลย!"
10121-101210570 = "ถ้างั้น ท่านอาจารย์!"
10121-101210580 = "มาว่ายน้ำในทะเลกับข้าตามสัญญานะ\nเจ้าคะ!"
10121-101210590 = "ท่านอาจารย์! วันนี้สนุกมากเลย!"
10121-101210600 = "ข้าเล่นสนุกมากจนตอนนี้ตาจะปิดแล้ว\nเจ้าค่ะ"
10121-101210610 = "ยูคาริว่ายน้ำเก่งเลยนะ!"
10121-101210620 = "ทำได้ยอดเยี่ยมเลยละ"
10121-101210630 = "เจ้าคะ? แต่ข้าว่ามันธรรมดาๆ นะ..."
10121-101210640 = "ว่ายธรรมดาๆ แบบนั้นจะเรียกว่าเป็น\nอิล~ลีทที่น่ารักของเฮียกกะเรียวรัน\nไม่ได้หรอกเจ้าค่ะ!"
10121-101210650 = "ครูจะคอยเชียร์นะ!"
10121-101210660 = "วันนี้ก็มีชีวิตชีวาดีจัง"
10121-101210670 = "ฝันดีนะ"
10121-101210680 = "ท่านอาจารย์... ข้าเผลอหลับไปเจ้าค่ะ"
10121-101210690 = "กำลังคุยกันแท้ๆ แต่ข้าดันเสียมารยาท\nไปจนได้..."
10121-101210700 = "หลับสบายหรือเปล่า?"
10121-101210710 = "ไม่เป็นไรเลย!"
10121-101210720 = "เจ้าค่ะ! พอได้นอนเต็มอิ่ม ก็เหมือนได้\nรีคาบารี~ เต็มที่เลยเจ้าค่ะ!"
10121-101210730 = "แบบนี้ข้ามีแรงไปทะเลอีกรอบแล้วเจ้าค่ะ!"
10121-101210740 = "ทะเลตอนกลางคืนมันอันตรายนะ"
10121-101210750 = "วันนี้พักผ่อนก่อนแล้วค่อยไปเล่น\nพรุ่งนี้เถอะ"
10121-101210760 = "คืนนี้ข้ายังนอนไม่หลับน่ะเจ้าค่ะ"
10121-101210770 = "ข้าเพิ่งรู้เลยน่ะเจ้าค่ะ ว่าทะเลเป็นที่ที่\nสนุกได้ขนาดนี้!"
10121-101210780 = "ท่านอาจารย์!"
10121-101210790 = "วันนี้ข้าสนุกมากเลยเจ้าค่ะ!"
10121-101210800 = "ครูดีใจที่ยูคาริสนุกนะ"
10121-101210810 = "ครูก็สนุกเหมือนกัน"
10121-101210820 = "ถึงข้าจะยังอายุน้อย แต่ข้าก็พูดสิ่งนี้ได้\nอย่างเต็มปากเจ้าค่ะ"
10121-101210830 = "ข้าจะไม่ลืม~!"
10121-101210840 = "ฤดูร้อนนี้~~~! เด็ดขาดเลยเจ้าค่ะ!"

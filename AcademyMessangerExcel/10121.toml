[translation]
10121-101210010 = "貴安！老師！"
10121-101210020 = "其實我要去海邊玩了！"
10121-101210030 = "而且還是和百花繚亂的前輩們一起！"
10121-101210040 = "太好了！"
10121-101210050 = "是的！簡直像是在做夢一樣！"
10121-101210060 = "為了成功度過完美的夏日度假……"
10121-101210070 = "我打算從今天開始進行樂琵琶特訓！"
10121-101210080 = "……樂琵琶？"
10121-101210090 = "為什麼要練習傳統樂器……？  "
10121-101210100 = "啊！"
10121-101210110 = "還是應該練舞比較好呢？"
10121-101210120 = "老師！我馬上去找您商量！"
10121-101210130 = "咦，現在？"
10121-101210140 = "這種模式……我也開始習慣了"
10121-101210150 = "是的！我現在就去！"
10121-101210160 = "老師！"
10121-101210170 = "今天一起買的泳裝，我已經好好收起來了！"
10121-101210180 = "該穿的時候一定要拿出來穿哦！"
10121-101210190 = "當然！物品就是要使用才能發揮價值！"
10121-101210200 = "這件可愛又珍貴的衣服，如果不拿出來穿……對製作它的工匠們可是很失禮的！"
10121-101210210 = "老師！"
10121-101210220 = "小女子這幾天日夜思考、反覆琢磨！"
10121-101210230 = "身為百花繚亂的新星，未來……不，應該說是超未來的最強菁英……"
10121-101210240 = "小女子在海邊也必須展現出帥氣的模樣！"
10121-101210250 = "真是突如其來呢"
10121-101210260 = "海邊的帥氣模樣指的是？"
10121-101210270 = "在海邊能展現的帥氣模樣……"
10121-101210280 = "那就是！"
10121-101210290 = "高超的泳技！"
10121-101210300 = "想得挺認真的呢……"
10121-101210310 = "我小學時期也有類似的想法！"
10121-101210320 = "所以，小女子決定從今天開始進行游泳特訓……"
10121-101210330 = "因此有件事想拜託老師！"
10121-101210340 = "如果可以的話，能請您傳授游泳的祕訣嗎！？"
10121-101210350 = "雖然也沒什麼高深的技巧……"
10121-101210360 = "現在就見面嗎？"
10121-101210370 = "是的！拜託了！"
10121-101210380 = "老師，今天家人真是失禮了……"
10121-101210390 = "他們平常明明不會這樣的，但只要遇到跟小女子有關的事情就會變得過度保護……"
10121-101210400 = "他們也是在為你著想哦，紫"
10121-101210410 = "我不介意，話說紫還好嗎？"
10121-101210420 = "小女子覺得……有點悶悶的！"
10121-101210430 = "難得想和老師兩人獨處的說"
10121-101210440 = "游泳就留到下次吧"
10121-101210450 = "他們應該不會跟到海邊來吧"
10121-101210460 = "呵呵！那我們約好囉！"
10121-101210470 = "小女子會等待那天到來的！"
10121-101210480 = "老師！"
10121-101210490 = "老師！您有看見外面嗎！？"
10121-101210500 = "是大海！"
10121-101210510 = "哦，恢復精神了呢"
10121-101210520 = "今天很有幹勁呢！"
10121-101210530 = "是的！時間有限，垂頭喪氣實在太浪費了！"
10121-101210540 = "時間就是金錢～！"
10121-101210550 = "真像紫的風格！"
10121-101210560 = "超正面！"
10121-101210570 = "那麼老師！"
10121-101210580 = "按照約定，在海邊要陪我游泳哦！"
10121-101210590 = "老師！今天真的好開心！"
10121-101210600 = "玩得太盡興，眼皮都快撐不住了"
10121-101210610 = "你游得超好耶！"
10121-101210620 = "游姿超優雅的！"
10121-101210630 = "咦？小女子覺得只是普通水準……"
10121-101210640 = "這樣還無法自稱是百花繚亂的菁～英！"
10121-101210650 = "我會為你加油的！"
10121-101210660 = "紫真有幹勁"
10121-101210670 = "晚安"
10121-101210680 = "老師……我剛才不小心睡著了"
10121-101210690 = "明明還在聊天，居然這麼失禮……"
10121-101210700 = "睡得好嗎？"
10121-101210710 = "沒關係！"
10121-101210720 = "是的！睡了一覺之後完全恢復了！"
10121-101210730 = "甚至要再去海邊都沒問題！"
10121-101210740 = "夜晚的海很危險"
10121-101210750 = "今天就先休息，明天再玩吧"
10121-101210760 = "今晚還睡不著呢"
10121-101210770 = "小女子第一次知道，海邊竟然是這麼快樂的地方！"
10121-101210780 = "老師！"
10121-101210790 = "今天真的非常開心！"
10121-101210800 = "太好了"
10121-101210810 = "我也很開心"
10121-101210820 = "小女子雖然年紀還小，但有一件事可以有自信地告訴您"
10121-101210830 = "這個夏天，小女子絕～對！"
10121-101210840 = "絕～～對！不會忘記的！"

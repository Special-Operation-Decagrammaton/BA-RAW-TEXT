[translation]
10121-101210010 = "오늘도 안녕하시어요! 선생님!"
10121-101210020 = "다름이 아니라, 무려 이번에 바다에 놀러 가기로 되었사와요!"
10121-101210030 = "무려 백화요란 선배님들과 함께랍니다!"
10121-101210040 = "잘됐네!"
10121-101210050 = "네! 아직도 꿈속을 헤매는 기분이어요!"
10121-101210060 = "멋진 여름 바~캉수 성공을 위해서는……"
10121-101210070 = "오늘부터 가쿠비와 특훈이어요!"
10121-101210080 = "……가쿠비와?"
10121-101210090 = "왜 전통 악기를……?  "
10121-101210100 = "아!"
10121-101210110 = "혹시 춤을 연습하는 쪽이 좋을까요?"
10121-101210120 = "선생님! 잠깐 상담하러 찾아뵙겠사와요!"
10121-101210130 = "어, 지금 바로?"
10121-101210140 = "이 패턴…… 슬슬 익숙해지려 해."
10121-101210150 = "네! 지금 가겠사와요!"
10121-101210160 = "선생님!"
10121-101210170 = "오늘 함께 산 수영복은 제대로 보관해 두었사와요!"
10121-101210180 = "입을 때는 입어야 하니까!"
10121-101210190 = "물론, 알고 있사와요! 물건의 가치는 쓰임에서 나오는 것!"
10121-101210200 = "이 귀엽고 아까운 옷도…… 제대로 입어주지 않으면 만들어 주신 직공분들께 실례겠지요!"
10121-101210210 = "선생님!"
10121-101210220 = "지난 며칠, 이 소녀, 저녁잠을 지새우며 생각하고, 또 생각했사와요!"
10121-101210230 = "백화요란의 초신성, 미래…… 아니, 초미래라고 불리는 최고의 엘리~트인 소녀이기에……."
10121-101210240 = "반드시 바다에서도 멋진 모습을 보여줘야 한다고 말이어요!"
10121-101210250 = "갑자기 뭔가 시작됐다."
10121-101210260 = "바다에서 멋진 모습이 뭔데?"
10121-101210270 = "바다에서 보여줄 수 있는 멋진 모습……"
10121-101210280 = "그것은 바로!"
10121-101210290 = "수영을 잘하는 것이어요!"
10121-101210300 = "열심히 생각했구나……."
10121-101210310 = "초등학생 때 하던 생각이다!"
10121-101210320 = "그런고로 소녀는 오늘부터 수영 맹훈련에 돌입하기로 하여……."
10121-101210330 = "거기서 선생님께 한 가지 부탁이 있사와요!"
10121-101210340 = "혹시 괜찮으시다면 소녀에게 수영의 비결을 전수해 주실 수 있을까요?! "
10121-101210350 = "그렇게 거창한 기술은 없지만……."
10121-101210360 = "지금 바로 만날까?"
10121-101210370 = "네! 부디!"
10121-101210380 = "선생님. 오늘은 집안 분들이 실례했사와요……."
10121-101210390 = "평소에는 그런 분들이 아니신데, 소녀와 관련되면 과보호가 되셔서……."
10121-101210400 = "유카리를 위한 거잖아."
10121-101210410 = "나는 괜찮아. 그보다 유카리는?"
10121-101210420 = "소녀는 조금 으므므믓! 이어요!"
10121-101210430 = "모처럼 오붓하게 선생님과 둘이서 시간을 보내려 했는데."
10121-101210440 = "수영은 다음에 하자."
10121-101210450 = "바다까지 쫓아오진 않겠지."
10121-101210460 = "후후! 약속하신 것이어요!"
10121-101210470 = "손꼽아 그날을 기다리고 있겠사와요!  "
10121-101210480 = "선생님!"
10121-101210490 = "선생님! 밖에 보이셔요?!"
10121-101210500 = "바다여요!"
10121-101210510 = "오, 기운 차렸구나."
10121-101210520 = "오늘은 씩씩하네!"
10121-101210530 = "네! 시간은 유한한데, 풀 죽어 있으면 아깝사와요!"
10121-101210540 = "타~임이즈골두~여요!"
10121-101210550 = "굉장히 유카리다운 접근법!"
10121-101210560 = "포지티브네!"
10121-101210570 = "그러면 선생님!"
10121-101210580 = "약속대로 바다에서는 수영에 어울려 주셔야겠사와요!"
10121-101210590 = "선생님! 즐거웠사와요!"
10121-101210600 = "너무 신나게 놀아서 벌써 눈이 감길 지경이어요."
10121-101210610 = "수영 엄청 잘하잖아!"
10121-101210620 = "엄청 우아한 수영이었어."
10121-101210630 = "네? 소녀 정도면 평범한 수준……."
10121-101210640 = "그리고 평범한 수준으로는 백화요란의 총애받는 엘리~트를 자칭할 수 없사와요!"
10121-101210650 = "응원할게!"
10121-101210660 = "유카리는 씩씩하구나"
10121-101210670 = "잘 자."
10121-101210680 = "선생님…… 깜빡 졸았사와요."
10121-101210690 = "대화 중에 이 무슨 결례……."
10121-101210700 = "잘 잤어?"
10121-101210710 = "괜찮아!"
10121-101210720 = "네! 푹 잔 덕분에 완전히 리~커버리한 것이에요!"
10121-101210730 = "다시 바다에 나가도 괜찮을 정도예요!"
10121-101210740 = "밤바다는 위험하니까."
10121-101210750 = "오늘은 쉬고 내일 놀자."
10121-101210760 = "오늘 밤은 아직 잠이 오질 않사와요."
10121-101210770 = "바다가 이렇게 즐거운 장소인지, 소녀, 처음 알았사와요!"
10121-101210780 = "선생님!"
10121-101210790 = "오늘 정말 즐거웠사와요!"
10121-101210800 = "다행이네."
10121-101210810 = "나도 즐거웠어."
10121-101210820 = "저 유카리, 나이는 어릴지언정, 이거 하나만은 자신 있게 말씀드릴 수 있사와요."
10121-101210830 = "소녀는 이번 여름을 절~대!"
10121-101210840 = "절~~~대로! 잊지 않을 거라고요!"

[translation]
20002-1383 = "ครูช่วยมาที่ห้องทดลองของท่านซายะ\nหน่อยได้ไหม?"
20002-1384 = "ทำไมจู่ๆ ถึงให้ไปล่ะ?"
20002-1385 = "เพราะท่านซายะเจอปัญหาใหญ่เกี่ยวกับ\nการทดลองน่ะ"
20002-1386 = "แถมนี่ยังเป็นปัญหาที่มีแต่ครูเท่านั้นที่\nแก้ไขได้!"
20002-1387 = "ถ้างั้นท่านซายะจะรออยู่ที่ห้องทดลองนะ"
20002-1388 = "...?"
20002-1389 = "อาการวูบวาบบนหน้าเป็นยังไงบ้าง?"
20002-1390 = "หน้ายังเป็นประกายอยู่เลย ให้ส่อง\nกระจกในสภาพนี้ไม่ได้หรอก"
20002-1391 = "เป็นประกายจนส่องกระจกไม่ได้เลยเหรอ?\nสุดยอดเลย"
20002-1392 = "ไม่เห็นจะสุดยอดตรงไหนเลย!"
20002-1393 = "จะว่าไป... ฉันขอแผ่นทองคำคืนได้ไหม?\nอันนี้ร่วงออกมาจากผิวของครูน่ะ "
20002-1394 = "ฉันจะเอาไปวิเคราะห์ส่วนประกอบแล้ว\nใช้ในการวิจัยครั้งหน้า"
20002-1395 = "ไม่ให้หรอก"
20002-1396 = "ฮึ่ม! ทำไมถึงไม่ให้ล่ะ?"
20002-1397 = "นี่เป็นสิ่งจำเป็นต่อความก้าวหน้าของงาน\nวิจัยนะ!"
20002-1398 = "นี่ครู... ช่วยมาที่ห้องทดลองอีกครั้ง\nได้ไหม?"
20002-1399 = "เชื่อใจได้ไหมเนี่ย?"
20002-1400 = "ได้สิ รอบนี้ท่านซายะทำยาอมตะวิเศษ\nได้เลยนะ!"
20002-1401 = "หากไม่เชื่อก็มาดูด้วยตาที่ห้องทดลอง\nของท่านซายะได้เลย!"
20002-1402 = "ทำพลาดแบบนี้ได้ยังไง ไม่สมกับเป็น\nท่านซายะเลย... "
20002-1403 = "ไม่คิดเลยว่าความผิดพลาดเล็กน้อยจะ\nทำให้เกิดการเปลี่ยนแปลงที่ยิ่งใหญ่\nขนาดนี้"
20002-1404 = "จะไถ่โทษยังไงดีนะ?"
20002-1405 = "ครั้งหน้าถ้าเจอกัน ท่านซายะจะซื้อ\nก๋วยเตี๋ยวให้กิน"
20002-1406 = "แต่จะว่าไป... ขอขนสีเทาที่เงางามนั่น\nอีกหน่อยได้ไหม?"
20002-1407 = "ไม่ให้หรอก"
20002-1408 = "อืม... ถ้างั้นอนาคตของงานวิจัยและ\nความเป็นอมตะก็คง..."
20002-1409 = "ขอโทษสำหรับเรื่องวันก่อนด้วยนะครู "
20002-1410 = "ท่านซายะจะเลี้ยงก๋วยเตี๋ยวอร่อยๆ เพื่อ\nขอโทษ แล้วเจอกันหน้าย่านการค้า\nเทพเต่าดำนะ"
20002-1411 = "ก๋วยเตี๋ยวอร่อยๆ เหรอ....?"
20002-1412 = "ใช่! มีร้านเด็ดอยู่ในย่านการค้าที่ฉันไป\nบ่อยๆ"
20002-1413 = "ร้านนี้ฉันไปชิมมาแล้ว รับรองเลยว่าจะ\nถูกปากครูเหมือนกัน!"
20002-1414 = "ก๋วยเตี๋ยวที่กินด้วยกันคราวก่อนอร่อย\nใช่ไหม?"
20002-1415 = "ไว้คราวหน้าไปเที่ยวย่านการค้านั้นด้วย\nกันอีกนะ!"
20002-1416 = "จะว่าไป.. แก๊งหมวกกันน็อกที่รับ\nยาลดน้ำหนักไปจะเป็นยังไงนะ?"
20002-1417 = "หืม? หมายถึงพวกนั้นเหรอ?"
20002-1418 = "ไม่รู้สินะ อาจจะแอบไปกินของหวานอยู่\nที่ไหนก็ได้?"
20002-1419 = "ช่วงนี้ครูไม่เบื่อเหรอ?"
20002-1420 = "ครูงานยุ่งจนไม่มีเวลาเบื่ออะไรเลย"
20002-1421 = "ไม่เอาน่า อย่ามาทำตัวยุ่งเลย\nฉันได้บอร์ดเกมที่ดูน่าสนุกมาด้วยล่ะ"
20002-1422 = "ใจจริงก็อยากจะเล่นตอนนี้เลย แต่เกมนี้\nต้องเล่น 2 คนนี่สิ"
20002-1423 = "ถ้าครูสนใจก็แวะมาที่ห้องทดลองนะ!"
20002-1424 = "ถ้าอยากเล่นจะแวะไปนะ"
20002-1425 = "ไม่อยากจะเชื่อเลย ท่านซายะเล่นเกม\nง่ายๆ แบบนี้แพ้ได้ยังไง!"
20002-1426 = "คราวหน้าจะไม่อ่อนให้แน่! ต้องชนะ\nให้ได้! เตรียมตัวไว้ได้เลย!"
20002-1427 = "ก่อนจะเล่นเกม เธอเลิกหมกมุ่นเกี่ยว\nกับชีสก่อนดีกว่าไหม...?"
20002-1428 = "วันนี้ท่านซายะมีเรื่องสำคัญจะบอกครูล่ะ"
20002-1429 = "เรื่องสำคัญเหรอ? เรื่องอะไรกัน?"
20002-1430 = "คือว่า... ให้บอกทางข้อความไม่ได้หรอก..."
20002-1431 = "เพราะเป็นเรื่องสำคัญมากๆ..."
20002-1432 = "วันนี้เสร็จงานที่ชาเล่ต์แล้วมาที่ห้อง\nทดลองทันทีเลยนะ"
20002-1433 = "แล้วฉันจะรอ"
20002-1434 = "เมื่อกี๊นอนกลางวันแล้วฝันประหลาด\nมากเลยล่ะ "
20002-1435 = "เพราะในฝันท่านซายะได้เจอกับชีสก้อน\nมหึมา! "
20002-1436 = "ไม่คิดเลยว่าจะได้กินชีสจนพุงกางที่ใน\nความฝันด้วย"
20002-1437 = "..."
20002-1438 = "ว่าแต่ ทำไมแขนครูมีแต่รอยแผลแบบ\nนั้นล่ะ? "
20002-1439 = "ไปสู้กับสัตว์ป่ามาเหรอ?"
20002-1440 = "..."
20002-1441 = "คะ.. ครู! ครู!! เกิดเรื่องใหญ่แล้ว!\nนี่มันเรื่องใหญ่มากเลย! "
20002-1442 = "ถ้าเห็นข้อความแล้วรีบมาที่ห้องทดลอง\nเลยนะ!"
20002-1443 = "ขอบคุณที่ช่วยเนสึซึเกะในวันนี้นะครู"
20002-1444 = "ดีแล้วที่หาเจ้าเนสึซึเกะเจอ"
20002-1445 = "ไม่ใช่เรื่องใหญ่อะไรหรอก"
20002-1446 = "มาคิดดูแล้ว ที่ผ่านมาฉันใจร้ายกับทั้ง\nครูและเนสึซึเกะมากเลย..."
20002-1447 = "ฉันจะจำเรื่องวันนี้ไว้เป็นบทเรียน แล้วจะ\nไม่แกล้งใครอีก... ต่อไปก็ฝากตัวด้วยนะ"
20002-1448 = "ครูก็ฝากตัวด้วยนะซายะ"

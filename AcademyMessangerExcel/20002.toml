[translation]
20002-1383 = "Can you come to my laboratory for a bit?"
20002-1384 = "What for?"
20002-1385 = "We have a serious problem at the lab!"
20002-1386 = "It's a very special problem that only you can solve!"
20002-1387 = "I'll be waiting for you there!"
20002-1388 = "...?"
20002-1389 = "Are you feeling better, Sensei?"
20002-1390 = "My face is still shining. I can barely look in the mirror."
20002-1391 = "Wow, if you can't even look in the mirror, the glow must be pretty amazing."
20002-1392 = "It's not amazing at all!"
20002-1393 = "Anyway, can I get one of the gold pieces that fell off your skin? "
20002-1394 = "I want to research these components for my next project."
20002-1395 = "No."
20002-1396 = "Ugh! Why not?"
20002-1397 = "I need this to advance the art of alchemy!"
20002-1398 = "Can you come to the laboratory one more time, Sensei?"
20002-1399 = "I've got a bad feeling about this..."
20002-1400 = "No, I made the immortality elixir! For real this time!"
20002-1401 = "If you don't believe me, come to my lab and see for yourself!"
20002-1402 = "I can't believe I made such a mistake... Sorry, Sensei. "
20002-1403 = "I had no idea a tiny error like that would become such a problem."
20002-1404 = "I know it's not much, but..."
20002-1405 = "I'll buy you some delicious noodles at the Promenade next time."
20002-1406 = "Do you think I can have some of that gray fur...?"
20002-1407 = "No."
20002-1408 = "Ugh... The future of alchemy depends on it..."
20002-1409 = "I'm so sorry about last time, Sensei. "
20002-1410 = "I'll buy you some delicious noodles to show you how sorry I am. Meet me at the Black Tortoise Promenade!"
20002-1411 = "Delicious noodles...?"
20002-1412 = "Yes, I know a great place at the Promenade."
20002-1413 = "You're going to experience a whole new world of noodles when you get there!"
20002-1414 = "Weren't the noodles so good last time?"
20002-1415 = "Let's go to the Black Tortoise Promenade next time!"
20002-1416 = "I wonder where the Helmet Gang is? The people you gave the diet pills to..."
20002-1417 = "Huh? Oh, you mean those guys..."
20002-1418 = "I don't know. They're probably out huffing sugar somewhere."
20002-1419 = "Haven't you been bored lately, Sensei?"
20002-1420 = "I'm busy working."
20002-1421 = "Oh, don't be like that. I got a fun-looking board game for us to try."
20002-1422 = "I wanted to play it right away, but it's hard to find someone to play with..."
20002-1423 = "Come to the lab if you're interested!"
20002-1424 = "I'll drop by sometime."
20002-1425 = "I can't believe I lost in such a simple game... Ugh!"
20002-1426 = "I'm not going to lose next time! You'll see, Sensei!"
20002-1427 = "I think you need to do something about that cheese obsession first..."
20002-1428 = "I have something important to say, Sensei."
20002-1429 = "Something important? What is it?"
20002-1430 = "It's...well... I can't tell you over text!"
20002-1431 = "It's something very important..."
20002-1432 = "Come to the lab right after your work at Schale."
20002-1433 = "I'll be waiting."
20002-1434 = "I had the most amazing dream during my nap today, Sensei! "
20002-1435 = "And when I woke up, there was a huge chunk of cheese right in front of me. "
20002-1436 = "I don't think I've ever had that much cheese before in my life. Even in a dream!"
20002-1437 = "..."
20002-1438 = "Anyway, why is your arm so cut up? "
20002-1439 = "Did you get into a fight with a wild animal or something?"
20002-1440 = "..."
20002-1441 = "S-Sensei! We have a problem! A big problem! "
20002-1442 = "Come to the lab as soon as you see this!"
20002-1443 = "Thanks for helping me find Nezusuke, Sensei."
20002-1444 = "I'm glad Nezusuke is safe."
20002-1445 = "It was nothing."
20002-1446 = "I think I might have been too harsh with Nezusuke, and even you, Sensei..."
20002-1447 = "I'll take this lesson to heart...I promise not to play harsh jokes on you guys!"
20002-1448 = "Thanks, Saya."

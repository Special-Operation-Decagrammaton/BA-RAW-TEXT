[translation]
20002-1383 = "老師，可以來我的研究室一下嗎？"
20002-1384 = "這麼突然，怎麼了？"
20002-1385 = "跟我的研究有關，非常重要的事！"
20002-1386 = "而且是只有老師才能解決的特殊問題……"
20002-1387 = "所以，我在研究室等著！"
20002-1388 = "……？"
20002-1389 = "閃閃發亮的狀況已經消失了嗎？"
20002-1390 = "臉還在閃閃發亮，每次照鏡子時，眼睛都……"
20002-1391 = "無法直視鏡子的光輝，真是太棒了"
20002-1392 = "哪裡棒了！？"
20002-1393 = "如果可以的話，能給我一片從皮膚上剝下來的金箔嗎？"
20002-1394 = "想調查它的成分，然後用在下次的研究"
20002-1395 = "我拒絕"
20002-1396 = "唔！為什麼！"
20002-1397 = "這對煉丹術的發展明明是不可或缺的！"
20002-1398 = "老師，能再來一趟研究室嗎？"
20002-1399 = "很可疑……"
20002-1400 = "不用擔心，這次是真的完成了長生不老的靈藥！"
20002-1401 = "不信的話，就來我的研究室親自確認一下！"
20002-1402 = "我竟然犯了那樣的錯誤……抱歉，老師"
20002-1403 = "變成這樣我也很吃驚"
20002-1404 = "雖然可能算不上補償"
20002-1405 = "但下次見面時，我請你吃玄武商會好吃的拉麵"
20002-1406 = "……還有，如果可以的話……那個充滿光澤的灰色毛髮，能給我一點嗎？"
20002-1407 = "我拒絕"
20002-1408 = "嗚嗚……長生不老、煉丹術的未來……"
20002-1409 = "上次很抱歉，老師"
20002-1410 = "為了表示歉意，我請你吃好吃的拉麵，在玄武商會前等著！"
20002-1411 = "好吃的拉麵……？"
20002-1412 = "嗯，是我經常去的店"
20002-1413 = "是非常好吃的店，老師嘗過之後一定會喜歡！"
20002-1414 = "上次一起吃的拉麵，真的很好吃"
20002-1415 = "下次再一起去玄武商會玩吧！"
20002-1416 = "嗯，一定。話說拿到藥的頭盔團怎麼樣了？"
20002-1417 = "嗯……？對喔，差點忘記他們了……"
20002-1418 = "嘛，應該在哪裡舔著砂糖吧？"
20002-1419 = "老師，最近不是很閒嗎？"
20002-1420 = "一直忙於工作……"
20002-1421 = "耶～別那麼死板嘛。我弄到一個有趣的桌遊"
20002-1422 = "我想玩玩看，但因為是2人用的，所以得找對手"
20002-1423 = "老師也有興趣的話，來研究室玩吧！"
20002-1424 = "工作結束後去玩"
20002-1425 = "嗚嗚，這麼簡單的遊戲竟然輸了……不甘心！"
20002-1426 = "下次絕對不會輸！做好覺悟吧，老師！"
20002-1427 = "先不管遊戲，你得先斬斷對起司的執著吧……？"
20002-1428 = "老師……今天有件重要的事要跟老師商量"
20002-1429 = "重要的事？什麼事？"
20002-1430 = "那個……不，不能用這樣的形式說……！"
20002-1431 = "那個，因為是非常重要的事……"
20002-1432 = "今天，夏萊的工作結束後，能馬上來研究室嗎？"
20002-1433 = "我等你"
20002-1434 = "老師，剛才睡午覺的時候，做了一個很棒的夢"
20002-1435 = "回過神來眼前就有一塊巨大的起司"
20002-1436 = "想吃多少就吃多少，即使是在夢中也是第一次！"
20002-1437 = "……"
20002-1438 = "話說回來，老師的手臂為什麼傷痕累累？"
20002-1439 = "跟野生動物打架了嗎？"
20002-1440 = "……"
20002-1441 = "老師，老師！不得了！出大事了！"
20002-1442 = "看到這個訊息後馬上來研究室！"
20002-1443 = "謝謝你陪我一起找根津助，老師。今後也萬事拜託了！"
20002-1444 = "有找到根津助真是太好了"
20002-1445 = "沒什麼大不了的"
20002-1446 = "回想起來，從以前到現在，不論是對根津助還是老師，都做了很多過分的事……"
20002-1447 = "今後不會再做過分的惡作劇了……今後也請多關照！"
20002-1448 = "嗯。今後也請多關照，沙耶"

[translation]
20002-1383 = "선생, 잠깐 나님의 연구실로 와줄 수 있을까?"
20002-1384 = "갑자기 연구실에는 왜?"
20002-1385 = "나님의 연구와 관련된 아주 중대한 문제가 발생한 것이다!"
20002-1386 = "게다가 선생만이 해결할 수 있는 특별한 문제라고!"
20002-1387 = "그럼 나님의 연구실에서 기다리고 있을게!"
20002-1388 = "……?"
20002-1389 = "선생, 반짝거리는 건 이제 좀 괜찮아?"
20002-1390 = "아직도 얼굴이 반짝거려서 거울을 쳐다보기가 어려워……."
20002-1391 = "거울을 마주하기 어려울 정도의 안광이라니, 그것참 멋진 일이네."
20002-1392 = "하나도 멋지지 않거든!"
20002-1393 = "그나저나 괜찮다면 피부에서 떨어져 나온 금박을 한 조각만 돌려받을 순 없을까?"
20002-1394 = "성분을 조사해서 다음 연구에 써보려는 것이다."
20002-1395 = "거절한다."
20002-1396 = "으읏! 어째서 거절하는 것이냐!"
20002-1397 = "이것도 연단술의 발전을 위해 꼭 필요한 일이라고!"
20002-1398 = "선생, 다시 한번 연구실에 와줄 수 있을까?"
20002-1399 = "어째 수상한데……."
20002-1400 = "아니야, 이번에야말로 진짜 불로불사의 영약을 만든 것이다!"
20002-1401 = "믿기지 않는다면 나님의 연구실에 찾아와서 직접 확인해보라고!"
20002-1402 = "나님이 이런 실수를 하다니…… 미안, 선생."
20002-1403 = "그 사소한 실수가 이렇게 큰 변화를 가져올 줄은 나님도 상상하지 못한 것이다."
20002-1404 = "대신이라기는 뭣하지만"
20002-1405 = "다음에 만나면 상회에서 맛있는 국수를 사줄게."
20002-1406 = "……그런데 혹시 괜찮다면 그 윤기 나는 회색 털을 조금만 얻을 순 없을까?"
20002-1407 = "거절한다."
20002-1408 = "으으…… 불로장생의, 연단술의 미래가……."
20002-1409 = "지난번 일은 정말로 미안했던 것이다, 선생."
20002-1410 = "사과의 의미로 맛있는 국수를 대접할 테니까, 현무상회 앞에서 기다려 줘!"
20002-1411 = "맛있는 국수……?"
20002-1412 = "응, 내가 자주 가는 상회의 맛집이 있는 것이다."
20002-1413 = "검증된 맛집이니, 선생도 맛을 보면 분명 그 국수가 좋아지게 될 거다!"
20002-1414 = "저번에 같이 먹은 국수는 정말 맛있었지?"
20002-1415 = "다음에 또 같이 현무상회에 놀러 가는 것이다."
20002-1416 = "그나저나 그때 다이어트약을 건네받은 헬멧단은 어떻게 된 거야?"
20002-1417 = "응……? 아, 그 녀석들 말인가……."
20002-1418 = "글쎄, 어디선가 설탕이라도 퍼먹고 있지 않으려나?"
20002-1419 = "선생, 요즘 심심하지 않아?"
20002-1420 = "선생님은 일하느라 바빠."
20002-1421 = "에이, 딱딱하게 굴지 말고. 안 그래도 내가 재미있어 보이는 보드 게임을 하나 구한 것이다."
20002-1422 = "마음 같아서는 빨리 플레이해보고 싶은데, 2인용이라 같이 할 사람을 찾기가 어려워서 말이야."
20002-1423 = "선생도 관심이 있다면 언제 한 번 연구실에 놀러 오는 것이다!"
20002-1424 = "내키면 한 번 놀러 갈게."
20002-1425 = "으으, 이런 단순한 게임에서 나님이 지다니…… 분해!"
20002-1426 = "다음번에는 절대로 지지 않을 테니까! 각오해 두는 것이다, 선생!"
20002-1427 = "게임보다는 우선 치즈에 대한 집착부터 끊는 게 좋지 않을까……?"
20002-1428 = "선생…… 오늘은 선생에게 할 중요한 이야기가 있다."
20002-1429 = "중요한 이야기? 그게 뭔데?"
20002-1430 = "그건…… 아니, 문자로는 말할 수 없어……!"
20002-1431 = "아주 중요한 이야기니까……"
20002-1432 = "오늘은 샬레의 일이 끝나자마자 바로 연구실로 와주었으면 한다."
20002-1433 = "기다리고 있을테니까."
20002-1434 = "선생, 아까 낮잠을 자다가 끝내주는 꿈을 꾼 것이다."
20002-1435 = "정신을 차리고 보니 나님의 눈앞에 거대한 치즈 덩어리가 있는 게 아닌가."
20002-1436 = "그렇게 치즈를 원 없이 먹은 건 꿈에서도 처음인 것이다."
20002-1437 = "……."
20002-1438 = "그나저나 선생의 팔은 왜 그렇게 상처투성이인 것이냐?"
20002-1439 = "들짐승하고 싸우기라도 했어?"
20002-1440 = "……."
20002-1441 = "서, 서, 서, 선생! 큰일인 것이다! 대사건이라고!"
20002-1442 = "이 문자 메시지를 보면 바로 연구실로 와 줘!"
20002-1443 = "오늘 네즈스케를 찾는 걸 도와줘서 고마워, 선생."
20002-1444 = "네즈스케를 무사히 찾아서 다행이야."
20002-1445 = "어려운 일도 아니었는걸."
20002-1446 = "생각해보니 그동안 내가 네즈스케에게도, 선생에게도 너무 심하게 굴었던 것 같아……."
20002-1447 = "오늘의 일을 교훈 삼아 이제 심한 장난은 치지 않을 테니까…… 앞으로도 잘 부탁하는 것이다!"
20002-1448 = "나도 잘 부탁해, 사야."

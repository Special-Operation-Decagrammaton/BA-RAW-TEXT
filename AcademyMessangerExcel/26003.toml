[translation]
26003-1663 = "ไม่ว่าเมื่อไหร่การมีสุขภาพที่ดีก็เป็น\nเรื่องดีที่สุดแล้วค่ะ คุณครูคะ"
26003-1664 = "ถึงจะงานยุ่งแค่ไหนก็ห้ามฝึนเกินไปนะคะ\nต้องทำงานแล้วก็พักสายตาไปด้วยนะคะ"
26003-1665 = "(≧∇≦)ﾉ"
26003-1666 = "ขอบคุณนะ"
26003-1667 = "ถึงอยากจะทำแบบนั้นก็เถอะน้า..."
26003-1668 = "ฮุฮุ อะไรคะ"
26003-1669 = "ฉันต้องดูแลคุณครูอยู่แล้วค่ะ"
26003-1670 = "อะไรกัน..."
26003-1671 = "เข้าใจแล้วค่ะ ฉันจะจดจำเอาไว้ค่ะ"
26003-1672 = "..."
26003-1673 = "หลายๆ อย่างค่ะ `(*>﹏<*)′"
26003-1674 = "ถ้ารู้สึกเหนื่อยเมื่อไหร่ก็บอกฉันได้นะคะ\nคุณครู"
26003-1675 = "ไม่ว่าที่ไหนเมื่อไหร่ ฉันก็พร้อมจะช่วย\nคุณครูเสมอค่ะ"
26003-1676 = "ได้เลย"
26003-1677 = "ค่ะ คิคิคิ...! O(∩_∩)O"
26003-1678 = "ไม่ว่าเมื่อไหร่ที่คุณครูรู้สึกเหนื่อย\nเซรินะจะไปหาคุณครูแน่นอนค่ะ!"
26003-1679 = "ถ้าคุณครูต้องการเซรินะ... ก็เรียกได้\nตลอดเลยนะคะ!"
26003-1680 = "เมื่อกี้ขอบคุณมากนะ"
26003-1681 = "วันนี้มาหาครูเหรอ?"
26003-1682 = "คะ?"
26003-1683 = "..."
26003-1684 = "คุณครูคงจะเหนื่อยมากเกินไปจริงๆ สินะคะ\nคิคิคิ (✿˘‿˘)"
26003-1685 = "วันนี้ชมรมอัศวินบรรเทาทุกข์ก็จะมุ่งหน้า\nไปทุกที่ที่ต้องการความช่วยเหลือ!"
26003-1686 = "ขอให้เป็นวันที่คุณครูมีแรงฮึดสุดๆ อีกวัน\nนะคะ! ถ้ามีปัญหาอะไรล่ะก็บอกฉันได้\nเลยนะคะ!"
26003-1687 = "อื้อ ขอบคุณมากนะ"
26003-1688 = "ค่ะ! คิคิคิ (@^0^@)/"
26003-1689 = "คุณครูค๊า  ♪(´▽｀)"
26003-1690 = "คือ..."
26003-1691 = "คือว่า..."
26003-1692 = "..."
26003-1693 = "คือว่า... ฉันมีเรื่องอยากจะบอกคุณครู\nไว้ก่อน..."
26003-1694 = "คุณครูคงจะไม่คิดว่ามันแปลกๆ ใช่มั้ยคะ?"
26003-1695 = "ครูจะคิดว่าเป็นเหมือนซูเปอร์แมนแล้วกัน..."
26003-1696 = "..."
26003-1697 = "ก็คือว่า.... คือ..."
26003-1698 = "ขอบคุณมากนะคะ! _(┐「ε:)_"
26003-260030010 = "สวัสดีค่ะคุณครู!"
26003-260030020 = "วันนี้เองก็ขอให้เป็นวันที่สดใสนะคะ!\n (✿˘‿˘)"
26003-260030030 = "อื้อ วันนี้ก็ขอรบกวนด้วยนะ"
26003-260030040 = "กำลังรออยู่เลยล่ะ"
26003-260030050 = "ค่ะ!"
26003-260030060 = "หืม...? ขอรบกวน...เหรอ?"
26003-260030070 = "...?"
26003-260030080 = "คะ? หมายความว่ายังไงคะ...?"
26003-260030090 = "คุณครู...?"
26003-260030100 = "วันนี้ขอบคุณมากเลยนะคะคุณครู"
26003-260030110 = "คงเป็นเพราะมันเป็นเรื่องที่คาดไม่ถึง เลยยิ่งจำได้ดีเลยนะคะ"
26003-260030120 = "จะว่ายังไงดีล่ะ..."
26003-260030130 = "ที่จริงฉันก็ไม่ค่อยเข้าใจเท่าไหร่หรอกค่ะ เป็นครั้งแรกที่ได้รู้สึกว่ามีคนเอาใจใส่แบบนี้..."
26003-260030140 = "แต่ว่าฉันมั่นใจอยู่เรื่องหนึ่งค่ะ"
26003-260030150 = "..."
26003-260030160 = "ว่าฉันมีความสุขค่ะ! ♪(´▽｀)"

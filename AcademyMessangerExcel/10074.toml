[translation]
10074-100740010 = "คุณครู"
10074-100740020 = "คือว่าตอนนี้... คุณครูสะดวกรึเปล่าคะ?"
10074-100740030 = "อื้อ ครูว่างนะ มีอะไรเหรอ?"
10074-100740040 = "หืม? ฮานาโกะ?"
10074-100740050 = "ไม่ใช่เรื่องใหญ่หรอกค่ะ... แค่..."
10074-100740060 = "ฉันมีของดีๆ"
10074-100740070 = "ที่เอามาด้วยน่ะค่ะ"
10074-100740080 = "\"ของดีๆ\" เหรอ?"
10074-100740090 = "พอเป็นฮานาโกะพูด มันดูน่าสงสัยนะ"
10074-100740100 = "ฮุฮุ..."
10074-100740110 = "เพราะงั้นก็เลย..."
10074-100740120 = "อยากให้คุณครูมาดูด้วยกันน่ะค่ะ"
10074-100740130 = "คุณครู"
10074-100740140 = "ไม่เหมือนที่คุยกันไว้เลยนี่นา!"
10074-100740150 = "ไหนบอกว่าคราวนี้\nจะไม่เป็นไรจริงๆ ไงล่ะ!"
10074-100740160 = "อุ๊ย..."
10074-100740170 = "ที่บอกว่าไม่เป็นไรก็ถูกแล้วนี่คะ"
10074-100740180 = "แต่ฉันไม่ได้พูดว่า\n\"ตอนที่อยู่กันสองต่อสอง\"\nสักหน่อยนะคะ"
10074-100740190 = "ฮุฮุ..."
10074-100740200 = "♡"
10074-100740210 = "น้ำที่นี่เย็นสดชื่นดีจังเลยนะคะ"
10074-100740220 = "แถมยังใสจนมองเห็นปลาเลยค่ะ"
10074-100740230 = "ว่ายน้ำเล่นอยู่เหรอ?"
10074-100740240 = "เปล่าค่ะ"
10074-100740250 = "ทะเลเป็นที่ที่ดีก็จริง แต่สำหรับ\nฉันแล้ว ชอบที่แบบนี้มากกว่าค่ะ"
10074-100740260 = "มาที่นี่สิคะ ฉันอยากให้คุณครู\nได้เห็นที่นี่เหมือนกันค่ะ"
10074-100740270 = "คุณครู?"
10074-100740280 = "รีบไปจังเลยนะคะ ถ้ารอให้ตัวแห้งก่อน\nแล้วกลับไปพร้อมกันก็คงดี..."
10074-100740290 = "แบบนั้นมัน..."
10074-100740300 = "ทำตัวสบายซะจนโดนหลอก\nอีกแล้วสิเรา..."
10074-100740310 = "ฮุฮุ..."
10074-100740320 = "คุณครูอยู่ด้วยแบบนี้ ฉันสนุกมากเลย\nละค่ะ"
10074-100740330 = "คุณครู?"
10074-100740340 = "ตอนนี้อยู่ที่ไหนเหรอคะ?"
10074-100740350 = "ถ้าคุณครูสะดวก คราวนี้ฉันจะขอไป\nหาคุณครู..."
10074-100740360 = "หืม? มีเรื่องอะไรเหรอ?"
10074-100740370 = "ฮานาโกะจะมาเองเลยเหรอ?"
10074-100740380 = "ค่ะ"
10074-100740390 = "ขอแค่คุณครูบอกที่อยู่มา..."
10074-100740400 = "ฉันจะไปหาคุณครูเองค่ะ♡"

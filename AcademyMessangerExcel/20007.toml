[translation]
20007-200070010 = "...Are you the Sensei from Schale?"
20007-200070020 = "Who?"
20007-200070030 = "I don't think you're a student..."
20007-200070040 = "Shush."
20007-200070050 = "I can't tell you right now."
20007-200070060 = "I have a request for you, the problem solver of Kivotos, and the Sensei the students trust and depend on."
20007-200070070 = "Please come out to the place I designated after sunset."
20007-200070080 = "Do not tell anyone else about this!"
20007-200070090 = "Sensei, this is Miku. I contacted you earlier."
20007-200070100 = "Are the performance preparations going well?"
20007-200070110 = "They're going pretty well."
20007-200070120 = "...Except that my voice isn't coming out."
20007-200070130 = "Have you figured out a way to get my voice back since then?"
20007-200070140 = "Well, I did some research."
20007-200070150 = "I knew I could count on you!"
20007-200070160 = "Then can I see you once afternoon practice is over?"
20007-200070170 = "I will be waiting for you in the waiting room of the Live House."
20007-200070180 = "The show is only a week away already..."
20007-200070190 = "Are you still not able to sing?"
20007-200070200 = "Yes. No matter how hard I try, my voice won't come back..."
20007-200070210 = "It looks like we have to cancel the show."
20007-200070220 = "That's a bummer."
20007-200070230 = "I was also looking forward to your show, Miku."
20007-200070240 = "Uh, Sensei?"
20007-200070250 = "If it's okay with you, can I see you for a moment in the alley behind the city?"
20007-200070260 = "I have something I want to tell you."
20007-200070270 = "Sensei, I finished the song you mentioned last time."
20007-200070280 = "It's not perfect yet, but I'm sure with this song..."
20007-200070290 = "I'll be able to convey my feelings to the audience."
20007-200070300 = "Great job today."
20007-200070310 = "I'm sure everyone will love it."
20007-200070320 = "Do you really think it'll be okay?"
20007-200070330 = "If it's the performance facility of the Live House where songs are added, it's probably strictly managed,"
20007-200070340 = "so wouldn't it be difficult to change to a new song now?"
20007-200070350 = "Don't worry about that."
20007-200070360 = "There are a lot of students at Schale who are great at hacking and engineering."
20007-200070370 = "Um, so it's strange for me to ask about this now, but..."
20007-200070380 = "What kind of organization is Schale?"

[translation]
20007-200070010 = "คุณคือคุณครูของชาเล่ต์ใช่มั้ยคะ?"
20007-200070020 = "ใครน่ะ...?"
20007-200070030 = "ไม่เหมือนนักเรียนของที่นี่เลยนะ..."
20007-200070040 = "ชู่ว!"
20007-200070050 = "ตอนนี้ฉันคงเล่าให้ฟังไม่ได้ค่ะ"
20007-200070060 = "แต่ฉันมีเรื่องที่จะขอร้องนักแก้ปัญหาของคิโวทอส\nและเป็นที่นับถือของนักเรียนสักหน่อยค่ะ"
20007-200070070 = "หลังพระอาทิตย์ตกแล้ว รบกวนช่วยมา\nตามสถานที่ที่ฉันส่งไปด้วยนะคะ"
20007-200070080 = "ห้ามบอกใครเด็ดขาดเลยนะคะ!"
20007-200070090 = "คุณครูคะ มิกุเองนะคะ\nที่เคยติดต่อไปก่อนหน้านี้ค่ะ"
20007-200070100 = "เตรียมการแสดงไปได้สวยรึเปล่า?"
20007-200070110 = "ทุกอย่างเป็นไปด้วยดีเลยค่ะ"
20007-200070120 = "ยกเว้นแต่เรื่องที่ฉันเปล่งเสียงไม่ได้ค่ะ..."
20007-200070130 = "คือว่าคุณครูหาวิธีที่ช่วยทำให้เสียง\nกลับมาได้เจอบ้างหรือเปล่าคะ"
20007-200070140 = "อืม... ครูลองหาดูหลายๆ วิธีแล้วนะ"
20007-200070150 = "สมกับเป็นคุณครูจริงๆ เลยค่ะ!"
20007-200070160 = "ถ้างั้นหลังจากซ้อมช่วงบ่ายเสร็จแล้ว\nคุณครูมาพบฉันหน่อยได้มั้ยคะ?"
20007-200070170 = "ฉันจะรอคุณครูอยู่ที่ห้องรับรองของไลฟ์เฮาส์นะคะ"
20007-200070180 = "อีกหนึ่งอาทิตย์ก็จะถึงวันแสดงแล้วค่ะ..."
20007-200070190 = "ยังร้องเพลงไม่ได้เลยเหรอ?"
20007-200070200 = "ค่ะ ไม่ว่าจะทำยังไง\nฉันก็เปล่งเสียงไม่ได้เลย..."
20007-200070210 = "คงจะต้องยกเลิกคอนเสิร์ตครั้งนี้แล้วค่ะ"
20007-200070220 = "ถ้างั้นก็น่าเสียดายนะ"
20007-200070230 = "ครูตั้งตารอดูคอนเสิร์ตของมิกุอยู่เลย"
20007-200070240 = "คือ... คุณครูคะ"
20007-200070250 = "ถ้าคุณครูสะดวก มาพบฉันที่ตรอกเล็กๆ\nตรงชานเมืองได้มั้ยคะ"
20007-200070260 = "ฉันมีเรื่องอยากจะบอกคุณครูค่ะ"
20007-200070270 = "คุณครูคะ ฉันแต่งเพลงเสรจแล้วนะคะ"
20007-200070280 = "ถึงจะยังไม่สมบูรณ์เท่าไร\nแต่ถ้าเป็นเพลงนี้ล่ะก็..."
20007-200070290 = "ฉันก็คงจะถ่ายทอดความรู้สึกผ่านเสียงเพลง\nไปถึงแฟนๆ ทุกคนได้แน่ค่ะ"
20007-200070300 = "พยายามได้ดีมากเลยนะ"
20007-200070310 = "ทุกคนต้องชอบแน่ๆ"
20007-200070320 = "แต่จะไม่เป็นอะไรจริงๆ เหรอคะ?"
20007-200070330 = "ถ้าเป็นอุปกรณ์การแสดงของไลฟ์เฮาส์\nที่เซ็ตเพลงไว้แล้ว คงเก็บรักษาไว้\nอย่างเข้มงวดมากแน่ๆ ค่ะ"
20007-200070340 = "คงเข้าไปเปลี่ยนเพลงง่ายๆ ไม่ได้หรอกนะคะ"
20007-200070350 = "เรื่องนั้นไม่ต้องห่วงหรอก"
20007-200070360 = "ชาเล่ต์น่ะมีนักเรียนที่เก่งเรื่องวิศวกรรม\nหรือเรื่องแฮ็กอยู่เยอะเลยนะ"
20007-200070370 = "คะ...คือมาถามตอนนี้ก็อาจดูเสียมารยาท\nสักหน่อย แต่ว่า..."
20007-200070380 = "ชาเล่ต์เป็นองค์กรแบบไหนเหรอคะ?"

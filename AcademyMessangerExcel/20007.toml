[translation]
20007-200070010 = "那個，夏萊的老師……對，對嗎？"
20007-200070020 = "哪位……？"
20007-200070030 = "在哪裡見過……？"
20007-200070040 = "呵呵"
20007-200070050 = "如果可以的話，我也很想說明……但晚點再說吧"
20007-200070060 = "得到了眾多學生的信賴，被認為是可以依靠的存在……因此，我想請對奇普托斯全體來說是調停者的老師幫一個忙"
20007-200070070 = "日落時分，可以來我指定的地點嗎？"
20007-200070080 = "啊，請對其他人保密唷！"
20007-200070090 = "老師，你好！"
20007-200070100 = "後來怎麼樣了？"
20007-200070110 = "啊，是的。我這邊會想點辦法"
20007-200070120 = "雖然還發不出聲音……"
20007-200070130 = "在那之後，有什麼發現嗎？"
20007-200070140 = "嗯。調查了一下，有幾個看起來不錯的方法"
20007-200070150 = "真的嗎！？不愧是老師！"
20007-200070160 = "那麼，下午的練習結束後可以見個面嗎？"
20007-200070170 = "我在Live House的休息室等你"
20007-200070180 = "離現場演出只剩一週了……"
20007-200070190 = "喉嚨還是一樣嗎？"
20007-200070200 = "是……"
20007-200070210 = "果然還是再問一下能不能中止比較好吧"
20007-200070220 = "還有什麼方法……"
20007-200070230 = "我也想看未來的現場演出……難道就沒有什麼好方法……"
20007-200070240 = "那個，老師"
20007-200070250 = "如果可以的話，現在可以見面嗎？"
20007-200070260 = "有點話想跟你說，我在小巷子內等著"
20007-200070270 = "老師，曲子完成了……！"
20007-200070280 = "雖然感覺還有很多不成熟的地方……"
20007-200070290 = "但這是我傾注心力製作的"
20007-200070300 = "辛苦了！"
20007-200070310 = "一定沒問題，大家都會很高興的唷"
20007-200070320 = "但是，真的沒問題嗎……？"
20007-200070330 = "就這樣去拜託工作人員，好像也很困難……"
20007-200070340 = "即使是偷偷來，保安也很嚴密……"
20007-200070350 = "交給我吧"
20007-200070360 = "別擔心，夏萊有很多擅長駭客和工程的學生"
20007-200070370 = "那個，事到如今才問有點晚了……"
20007-200070380 = "夏萊，到底是什麼組織呢……？"

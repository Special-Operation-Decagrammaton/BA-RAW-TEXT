[translation]
20007-200070010 = "……당신이 샬레의 선생님이신가요?"
20007-200070020 = "……누구?"
20007-200070030 = "학생은 아닌 것 같은데……."
20007-200070040 = "쉬잇."
20007-200070050 = "지금 여기서는 말씀드릴 수 없어요."
20007-200070060 = "키보토스의 해결사이자, 학생들이 믿고 의지한다는 선생님께 부탁이 있어요."
20007-200070070 = "해가 진 뒤 제가 지정한 장소로 나와주세요."
20007-200070080 = "다른 사람에게는 절대로 말씀하시면 안 돼요!"
20007-200070090 = "선생님, 전에 연락드렸던 미쿠입니다."
20007-200070100 = "공연 준비는 잘 되어가고 있어?"
20007-200070110 = "그럭저럭 괜찮게 진행되는 중이에요."
20007-200070120 = "……목소리가 나오지 않는 것만 제외한다면요."
20007-200070130 = "혹시 그 이후로 목소리를 되돌리는 방법에 대해 알아내신 게 있으신가요?"
20007-200070140 = "음, 여러 가지를 조사해 봤어."
20007-200070150 = "역시 선생님이시네요!"
20007-200070160 = "그럼 오후 연습이 끝난 뒤에 잠깐 뵐 수 있을까요?"
20007-200070170 = "라이브 하우스의 대기실에서 기다리고 있겠습니다."
20007-200070180 = "벌써 공연이 일주일 앞으로 다가왔네요……."
20007-200070190 = "노래는 여전히 부를 수 없어?"
20007-200070200 = "네. 어떤 수를 써도 목소리가 돌아오질 않아서……."
20007-200070210 = "아무래도 이번 공연은 취소해야 할 것 같네요."
20007-200070220 = "그건 아쉽네."
20007-200070230 = "나도 미쿠의 공연을 기대했는데."
20007-200070240 = "저, 선생님."
20007-200070250 = "괜찮으시면 시내 뒤편의 골목에서 잠깐 뵐 수 있을까요?"
20007-200070260 = "드리고 싶은 말씀이 있어요."
20007-200070270 = "선생님, 저번에 말씀하신 곡을 완성했어요."
20007-200070280 = "아직 부족한 부분이 많긴 하지만 분명 이 곡이라면……"
20007-200070290 = "관객 여러분께 제 마음을 전달할 수 있을 거예요."
20007-200070300 = "수고 많았어."
20007-200070310 = "분명 다들 좋아할 거야."
20007-200070320 = "하지만 정말로 괜찮을까요?"
20007-200070330 = "곡을 넣을 수 있는 라이브 하우스의 공연 시설이라면 엄중하게 관리되고 있을 텐데,"
20007-200070340 = "지금에 와서 새로운 곡으로 바꾸는 건 어렵지 않을까요?"
20007-200070350 = "그건 걱정하지 마."
20007-200070360 = "샬레에는 해킹도 엔지니어링도 유능한 학생들이 잔뜩 있거든."
20007-200070370 = "저, 지금에 와서 여쭈는 것도 이상하지만……."
20007-200070380 = "샬레는 무얼 하는 조직인가요?"

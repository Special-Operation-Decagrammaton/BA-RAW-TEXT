[translation]
26012-260120010 = "您好，老師"
26012-260120020 = "請問您現在能否協助本官呢……？"
26012-260120030 = "當然可以，我該怎麼幫你呢？"
26012-260120040 = "本官最近接下了一份救生員的任務"
26012-260120050 = "對於發誓守護市民安全的警官而言，這可說是至高無上的榮耀……"
26012-260120060 = "然而……"
26012-260120070 = "如果只是游泳倒不成問題，但我聽說救援溺水者時的游法似乎不太一樣"
26012-260120080 = "更糟的是我昨天才知道這件事……"
26012-260120090 = "那不就糟了嗎？"
26012-260120100 = "要不要趁現在趕快練習一下？"
26012-260120110 = "所以老師，是否能請您協助本官進行游泳訓練呢！？"
26012-260120120 = "再這樣下去，本官說不定會被判定不適任救生員工作的！"
26012-260120130 = "您好，老師"
26012-260120140 = "在上次的練習之後，我思考了很久……"
26012-260120150 = "我認為要在短時間內，學會水上救援的游法恐怕沒那麼簡單"
26012-260120160 = "唔嗯，既然不擅長救援……"
26012-260120170 = "本官決定把重心專注在急救方面！"
26012-260120180 = "這樣只要有人把溺水的遊客救上岸，本官就可以對其實施急救，協助對方盡快甦醒！"
26012-260120190 = "所謂山不轉路轉？"
26012-260120200 = "也對，畢竟急救也是很重要的"
26012-260120210 = "沒錯！所以如果老師方便的話，希望您這次也能協助本官的訓練！"
26012-260120220 = "請您儘管放心，這次絕不會犯跟上次一樣的錯誤！"
26012-260120230 = "老師，您看過手冊了嗎？"
26012-260120240 = "嗯，我看過了"
26012-260120250 = "雖然訓練時沒有試到，但真的溺水的時候，你會幫我做的吧？"
26012-260120260 = "那"
26012-260120270 = "那當然！"
26012-260120280 = "本官可是一名公私分明的警官！"
26012-260120290 = "我指的是心臟除顫器哦？"
26012-260120300 = "請，請您不要調戲本官！"
26012-260120310 = "老師！您好！我是桐乃！"
26012-260120320 = "多虧老師的幫助，我已經順利完成救生員訓練，並且即將進行最終驗收"
26012-260120330 = "恭喜你，桐乃"
26012-260120340 = "這全都要感謝老師各方面的大力支持！"
26012-260120350 = "為此，本官想邀請您來見證訓練最後的環節，請問您是否方便呢？"
26012-260120360 = "當然好，我一定會去的"
26012-260120370 = "非常感謝！"
26012-260120380 = "太好了，這樣訓練肯定能完美落幕！"

[translation]
26012-260120010 = "สวัสดีค่ะคุณครู"
26012-260120020 = "พอจะช่วยอะไรฉันหน่อยได้มั้ยคะ...?"
26012-260120030 = "ได้สิ อยากให้ช่วยเรื่องอะไรเหรอ?"
26012-260120040 = "พอดีฉันต้องไปทำภารกิจไลฟ์การ์ดค่ะ"
26012-260120050 = "ในฐานะเจ้าหน้าที่ตำรวจที่ต้องรักษา\nความปลอดภัยให้ชาวเมือง นี่คืองานที่\nเป็นเกียรติมากค่ะ แต่ว่า..."
26012-260120060 = "คือว่า..."
26012-260120070 = "ถ้าเป็นการว่ายน้ำปกติฉันก็พอไหวอยู่\nแต่เห็นว่ามีการว่ายน้ำเพื่อช่วยชีวิตทางน้ำ\nต่างหากด้วยค่ะ"
26012-260120080 = "แล้วฉันก็เพิ่งจะรู้เมื่อวานนี้เองค่ะ..."
26012-260120090 = "งั้นก็เป็นเรื่องใหญ่น่ะสิ?"
26012-260120100 = "ต้องไปฝึกว่ายน้ำหรือเปล่า?"
26012-260120110 = "คุณครูพอจะช่วยฉันฝึกว่ายน้ำหน่อย\nได้มั้ยคะ?! "
26012-260120120 = "ถ้าฉันว่ายไม่คล่อง ฉันอาจถูกตัดสินว่า\nมีคุณสมบัติไม่เหมาะสมกับภารกิจก็ได้ค่ะ"
26012-260120130 = "สวัสดีค่ะคุณครู"
26012-260120140 = "หลังจากฝึกไปคราวก่อน ฉันก็กลับไป\nคิดอยู่นานเลย..."
26012-260120150 = "การว่ายน้ำเพื่อช่วยชีวิตไม่น่าใช่เรื่องที่\nเรียนได้ในเวลาสั้นๆ เลยน่ะค่ะ"
26012-260120160 = "อืม ครูก็ไม่คุ้นเคยกับเรื่องนี้..."
26012-260120170 = "ก็เลยจะไปตั้งใจกับการปฐมพยาบาล\nแทนค่ะ!"
26012-260120180 = "ถ้าไลฟ์การ์ดคนอื่นช่วยคนจมน้ำขึ้น\nมาได้ ตอนนั้นฉันก็จะช่วยปฐมพยาบาล\nให้ได้สติขึ้นมาค่ะ!"
26012-260120190 = "จะเปลี่ยนหน้าที่สินะ"
26012-260120200 = "ใช่ นั่นก็เป็นงานสำคัญเหมือนกัน"
26012-260120210 = "ค่ะ! ถ้าคุณครูไม่ว่าอะไร ครั้งนี้ฉันก็\nอยากขอให้มาช่วยสังเกตการณ์\nการฝึกซ้อมหน่อยค่ะ!"
26012-260120220 = "ฉันจะไม่ทำพลาดเหมือนคราวก่อนอีก\nคุณครูวางใจได้เลยค่ะ"
26012-260120230 = "คุณครู ได้อ่านหนังสือคู่มือหรือเปล่าคะ?"
26012-260120240 = "อื้อ อ่านสิ"
26012-260120250 = "ถึงจะไม่ได้ทำตอนฝึกซ้อม แต่ว่า\nถ้าครูจมน้ำจริงๆ จะทำให้ใช่มั้ย?"
26012-260120260 = "นะ..."
26012-260120270 = "แน่นอนสิคะ!"
26012-260120280 = "ฉันแยกแยะเรื่องงานกับเรื่องส่วนตัวได้\nแน่นอนอยู่แล้วค่ะ!"
26012-260120290 = "ครูหมายถึงใช้เครื่องกระตุกไฟฟ้าหัวใจ\nหรอกนะ?"
26012-260120300 = "ยะ... อย่าแกล้งกันสิคะ!"
26012-260120310 = "คุณครู! สวัสดีค่ะ! คิริโนะเองค่ะ!"
26012-260120320 = "ฉันฝึกซ้อมสำหรับภารกิจไลฟ์การ์ด\nเสร็จหมดแล้วค่ะ ตอนนี้ก็เหลือแค่\nทบทวนครั้งสุดท้ายแล้วค่ะ"
26012-260120330 = "ดีใจด้วยนะคิริโนะ"
26012-260120340 = "ทั้งหมดนี้เพราะได้คุณครูช่วยไว้น่ะค่ะ!"
26012-260120350 = "ฉันก็เลยว่าจะขอให้คุณครูมาช่วย\nสังเกตการณ์การทบทวนหน่อยน่ะค่ะ\nจะ... จะได้หรือเปล่าคะ?"
26012-260120360 = "ได้อยู่แล้ว แล้วครูจะไปหานะ"
26012-260120370 = "ขอบคุณค่ะ!"
26012-260120380 = "แบบนี้คงจบการฝึกซ้อมได้อย่าง\nสวยงามเลยค่ะ!"

[translation]
26012-260120010 = "Hello, Sensei."
26012-260120020 = "Could I, by chance, request your assistance?"
26012-260120030 = "Of course. What do you need?"
26012-260120040 = "I took on the responsibility of being a lifeguard."
26012-260120050 = "As a police officer who lives to protect our citizens, I can't think of a higher honor!"
26012-260120060 = "But..."
26012-260120070 = "I know the basic strokes, but I heard there's a special one for surface water rescue."
26012-260120080 = "And I just learned of its existence, only yesterday!"
26012-260120090 = "Isn't that a big problem?"
26012-260120100 = "Shouldn't you start practicing now?"
26012-260120110 = "That's why... Can you help me with swimming practice, Sensei?!"
26012-260120120 = "At this rate, I may be deemed incompetent for duty!"
26012-260120130 = "Sensei! Hello!"
26012-260120140 = "I've done quite a bit of self-reflection after our last practice session..."
26012-260120150 = "And, in the end, I guess it was a tall order to try to learn a rescue stroke in such a short period of time!"
26012-260120160 = "Definitely, since you're not used to it."
26012-260120170 = "So, instead, I'm going to focus on first aid!"
26012-260120180 = "That way, once someone rescues a drowning person, I can assist by treating them and waking them back up!"
26012-260120190 = "A change in approach?"
26012-260120200 = "That's an important part of the process."
26012-260120210 = "Exactly! So, if you don't mind, please oversee my training again, Sensei!"
26012-260120220 = "I've learned from my previous mistakes, so please rest assured!"
26012-260120230 = "Did you read the manual, Sensei?"
26012-260120240 = "Yes, I read it."
26012-260120250 = "And you skipped that one part in training, but you'd do it if I were actually drowning, right?"
26012-260120260 = "O-"
26012-260120270 = "Of course!"
26012-260120280 = "I'm an officer, after all! A professional!"
26012-260120290 = "I was talking about the AED though?"
26012-260120300 = "P-Please don't tease me!"
26012-260120310 = "Sensei! Hello! This is Kirino!"
26012-260120320 = "Thank you for helping me finish my lifeguard training! I just need to do one, final eval!"
26012-260120330 = "Congratulations, Kirino."
26012-260120340 = "I couldn't have done it without you!"
26012-260120350 = "That being said, I was hoping you could oversee my training, one last time?"
26012-260120360 = "Of course. I'll be there."
26012-260120370 = "Thank you!"
26012-260120380 = "I'm going to finish strong!"

[translation]
26012-260120010 = "안녕하세요, 선생님."
26012-260120020 = "혹시 본관에게 도움을 주실 수 있으신가요……?"
26012-260120030 = "물론이지. 어떤 도움이 필요한데?"
26012-260120040 = "본관, 이번에 라이프가드 임무를 맡게 되었습니다."
26012-260120050 = "시민들의 안전을 지키는 경관으로서 더할 나위 없는 영광입니다만……."
26012-260120060 = "그게……."
26012-260120070 = "평범한 수영이라면 가능하지만, 수상 인명 구조를 위한 영법이 따로 있다고 합니다."
26012-260120080 = "게다가 이 사실을 어제 알게 됐어요……."
26012-260120090 = "그러면 큰일이잖아?"
26012-260120100 = "지금이라도 연습해야 하는 거 아냐?"
26012-260120110 = "혹시 선생님께서 수영 연습을 도와주실 수 있으신가요?!"
26012-260120120 = "이대로라면 본관, 임무 부적합 판정을 받을지도 모릅니다!"
26012-260120130 = "선생님, 안녕하세요."
26012-260120140 = "저번 연습 이후 오랫동안 생각해 본 바……."
26012-260120150 = "역시 빠른 시간 내에 구조 영법을 배우는 건 힘들 것 같습니다."
26012-260120160 = "으응, 아무래도 익숙지 않으니까……."
26012-260120170 = "그러니 본관은 응급처치에 집중하기로 했습니다!"
26012-260120180 = "누군가 익수자를 물에서 구조하면, 그때 본관이 정신을 차릴 수 있도록 조치하는 거죠!"
26012-260120190 = "방향을 바꿨구나?"
26012-260120200 = "맞아, 그것도 중요한 일이지."
26012-260120210 = "네! 선생님께서 괜찮으시다면, 이번에도 훈련을 참관해 주셨으면 합니다!"
26012-260120220 = "저번과 같은 실수는 하지 않을 테니 안심하셔도 좋습니다!"
26012-260120230 = "선생님, 혹시 매뉴얼을 읽으셨나요?"
26012-260120240 = "응, 읽었어."
26012-260120250 = "훈련 때는 하지 않았지만, 실제로 내가 빠지면 해줄 거지?"
26012-260120260 = "무"
26012-260120270 = "물론입니다!"
26012-260120280 = "본관은 공과 사를 확실히 구분할 줄 아는 경관이니까요!"
26012-260120290 = "제세동기를 말한 건데?"
26012-260120300 = "보, 본관을 놀리지 말아 주세요!"
26012-260120310 = "선생님! 안녕하십니까! 키리노입니다!"
26012-260120320 = "선생님의 도움 덕에 라이프가드 임무를 위한 훈련을 마치고, 이제 마지막 점검을 하려 합니다."
26012-260120330 = "축하해, 키리노."
26012-260120340 = "선생님께서 물심양면으로 도와주신 덕분입니다!"
26012-260120350 = "그런 뜻에서 훈련의 마무리에 참관을 요청드릴까 하는데, 혹시 괜찮으신가요?"
26012-260120360 = "물론이지. 꼭 갈게."
26012-260120370 = "감사합니다!"
26012-260120380 = "마침내 유종의 미를 거둘 수 있겠네요!"

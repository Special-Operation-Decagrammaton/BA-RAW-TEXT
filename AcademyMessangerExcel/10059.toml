[translation]
10059-100590010 = "แต่นแต๊น~☆ ในที่สุดก็..."
10059-100590020 = "มา...!"
10059-100590030 = "แล้ว!"
10059-100590040 = "\"ในที่สุดก็มาแล้ว\" งั้นเหรอ..."
10059-100590050 = "อะฮะฮะฮะ☆☆ ใช่แล้วๆ☆ อื้อ!\nก็ใช่ไงล่ะ! อะไรกันๆ?"
10059-100590060 = "ชีวิตวัยเรียนที่มีอิสระเริ่มขึ้นแล้ว!"
10059-100590070 = "ฉันรู้สึกแบบนั้นน่ะ เพราะงั้นคุณครู!"
10059-100590080 = "ขอฝากตัวอีกครั้งด้วยล่ะ☆☆☆☆☆"
10059-100590090 = "ขอรบกวนด้วย..."
10059-100590100 = "อ๊ะ"
10059-100590110 = "ว้าว ทำเป็นขรึมตั้งแต่ตอนนี้เลยเหรอ?"
10059-100590120 = "งั้นเหรอ? เอาแบบนั้นเหรอ?"
10059-100590130 = "ถ้างั้นฉันเอาบ้างนะ"
10059-100590140 = "ฝากดูแลเด็กน่าสงสารอย่างฉันด้วยนะ\nคุณครู"
10059-100590150 = "ว้าว เมื่อกี้ฉันโค้งให้โทรศัพท์ด้วยละ"
10059-100590160 = "คนเดินผ่านไปมาอาจมองแปลกๆ ก็ได้"
10059-100590170 = "ถ้าอย่างนั้น... คุณครู!\nมีเวลาก็แวะมาหาฉันบ้างนะ!"
10059-100590180 = "เข้าใจมั้ย? แล้วฉันจะรอนะ☆"
10059-100590190 = "นี่ คุณครู?"
10059-100590200 = "ถึงที่พักแล้วรึยัง?"
10059-100590210 = "พรุ่งนี้ยุ่งรึเปล่า?"
10059-100590220 = "พรุ่งนี้ยุ่งมากเลย..."
10059-100590230 = "พรุ่งนี้ครูงานแน่นมากเลย..."
10059-100590240 = "อืม ก็คงเป็นอย่างนั้นสินะ?"
10059-100590250 = "เข้าใจแล้ว☆ ฝันดีนะ!"
10059-100590260 = "ร้อนสุดๆ ไปเล๊ยยย~~!"
10059-100590270 = "เหนื่อยจังㅠㅠ"
10059-100590280 = "นี่มันวันหยุดแบบไหนกัน ถึงได้เหนื่อย\nขนาดนี้"
10059-100590290 = "มิกะ?"
10059-100590300 = "คุณครู ฉันเหนื่อยสุดๆ เลย ช่วยด้วย"
10059-100590310 = "ไม่สิ มาเล่นด้วยกันหน่อย"
10059-100590320 = "เดี๋ยวครูไปหาละกัน รอก่อนนะ"
10059-100590330 = "เอ๋?"
10059-100590340 = "ไม่ต้องๆ ยุ่งอยู่ไม่ใช่เหรอ?"
10059-100590350 = "ไม่ต้องหรอก ฉันก็แค่งอแงไปเรื่อยน่ะ"
10059-100590360 = "ไม่ต้องมาหรอก คุณครูเองก็น่าจะยุ่ง\nนี่นา"
10059-100590370 = "คุณครู?"
10059-100590380 = "นี่ คุณครู..."
10059-100590390 = "กลับถึงแล้วใช่มั้ย?"
10059-100590400 = "ฉันอยู่ที่ห้องซักผ้าของหอพักละ!"
10059-100590410 = "แล้วก็กำลังซักชุดพละกับชุดว่ายน้ำ\nตัวใหม่อยู่ด้วยนะ☆"
10059-100590420 = "อื้อ เอามาใช้ดีกว่าเก็บไว้เฉยๆ นะ"
10059-100590430 = "ฉันจะเอาไปใส่ในคาบว่ายน้ำคราวหน้า!"
10059-100590440 = "ดีแล้ว"
10059-100590450 = "อื้อ ขอบคุณนะ☆☆☆☆☆☆"
10059-100590460 = "อา..."
10059-100590470 = "คือว่าพรุ่งนี้งานยุ่งรึเปล่า..."
10059-100590480 = "อื้อ โทษทีนะ พรุ่งนี้ครูมีงานน่ะ..."
10059-100590490 = "อืม ก็คงงั้นสินะ ก็คุณครูเป็นผู้ใหญ่นี่นา"
10059-100590500 = "ถ้างั้นก็ฝันดีนะ คุณครู!"
10059-100590510 = "คุณ"
10059-100590520 = "ครู"
10059-100590530 = "ขา"
10059-100590540 = "☆"
10059-100590550 = "อะไรน่ะ มิกะเหรอ?"
10059-100590560 = "หืม?"
10059-100590570 = "ตอบกลับเหมือนรำคาญกันเลย?"
10059-100590580 = "ทำเหมือนฉันเป็นผู้หญิงน่ารำคาญเหรอ?\nแบบนี้มันเจ็บปวดนะ..."
10059-100590590 = "แต่ก็นะ ถึงจะคิดงั้นก็ไม่เป็นไรหรอก☆"
10059-100590600 = "วันนี้เป็นไงบ้างคุณครู? ยุ่งอยู่มั้ย?\nคงจะยุ่งสินะ?"
10059-100590610 = "ครูยุ่งนิดหน่อยน่ะ แต่ว่า...\nตอนเย็นครูน่าจะว่างนะ"
10059-100590620 = "ตอนเย็นๆ อาจพอมีเวลานะ?"
10059-100590630 = "เอ๋... ตอนเย็นเหรอ?"
10059-100590640 = "งั้นขอเวลานั้นให้ฉันได้มั้ย?"
10059-100590650 = "แป๊ปเดียวน่ะ แค่แป๊บเดียวก็ได้..."
10059-100590660 = "มีเรื่องอะไรรึเปล่า?"
10059-100590670 = "ไม่ได้มีเรื่องอะไรหรอก..."
10059-100590680 = "รู้แล้วๆ เดี๋ยวตอนเย็นครูแวะไปนะ"
10059-100590690 = "คุณครู... ไม่ได้ถูกจับได้ แล้วกลับถึง\nที่พักปลอดภัยดีแล้วใช่มั้ย?"
10059-100590700 = "ครูโกรธแล้วนะ"
10059-100590710 = "อื้อ..."
10059-100590720 = "ล้อเล่นกันแรงเกินไปแล้ว...."
10059-100590730 = "ขอโทษนะคะ"
10059-100590740 = "คุณครู..."
10059-100590750 = "ขอโทษนะ"
10059-100590760 = "นี่..."
10059-100590770 = "มิกะ...?"
10059-100590780 = "ช่วยมาที่ทรีนิตี้หน่อยได้มั้ย...?"
10059-100590790 = "ขอโทษนะคุณครู"
10059-100590800 = "ฉันไม่ได้ตั้งใจทำให้คุณครูผิดหวังนะ..."
10059-100590810 = "แต่สุดท้าย... ก็ทำแบบนั้นอีกจนได้"
10059-100590820 = "เดี๋ยวครูไปหานะ รอก่อน"
10059-100590830 = "คุณครูหนีไปได้อย่างปลอดภัยรึเปล่า?"
10059-100590840 = "หนีงั้นเหรอ? ครูแค่เลิกงานเอง"
10059-100590850 = "ฮะฮะฮะ... อื้อ ใช่แล้ว"
10059-100590860 = "วันนี้ฉันอยู่เลยเวลาเคอร์ฟิวเข้าหอพัก..."
10059-100590870 = "ถ้าโดนจับได้อีกทีอาจเกิดเรื่องวุ่นวาย\nก็ได้?"
10059-100590880 = "ว่าไงนะ? ไหนบอกว่าเวลานี้สะดวกไงล่ะ?"
10059-100590890 = "อืม... ฉันโกหกน่ะ☆"
10059-100590900 = "อันที่จริง ตอนนั้นมันก็เลยเวลาปิด\nประตูไปแล้วด้วยละ"
10059-100590910 = "ละ... หลอกครูงั้นเหรอ มิกะ!"
10059-100590920 = "อื้อ! โดนเด็กดื้อหลอกอีกจนได้นะ ฮิฮิ☆"
10059-100590930 = "แต่ถึงอย่างนั้นก็อย่าเกลียดฉันเลยนะ"
10059-100590940 = "อ๊ะ ได้เวลาปิดไฟแล้ว ต้องรีบปิดมือถือแล้วละ"
10059-100590950 = "ถ้างั้น... ฝันดีนะคุณครู!"
10059-100590960 = "แล้วก็... ขอบคุณเสมอๆ เลยนะ"

[translation]
10059-100590010 = "짜안-☆ 드디어"
10059-100590020 = "등!"
10059-100590030 = "장!"
10059-100590040 = "드디어 등장인 건가……."
10059-100590050 = "아하하☆☆ 맞아맞아☆ 응응!! 그렇게 됐지 뭐야?"
10059-100590060 = "이제 다시 자유롭게 학원 생활 시작!"
10059-100590070 = "그런 느낌으로, 선생님!"
10059-100590080 = "다시 한번 잘 부탁해☆☆☆☆☆"
10059-100590090 = "모쪼록 잘 부탁드립니다."
10059-100590100 = "앗"
10059-100590110 = "우와 여기서 정색?"
10059-100590120 = "그런 거야? 그런 분위기?"
10059-100590130 = "그럼 나도"
10059-100590140 = "불초한 몸이지만 부디 잘 부탁드립니다. 선생님."
10059-100590150 = "우와 나 방금 휴대폰에다가 인사했어."
10059-100590160 = "지나가는 사람이 이상하게 쳐다봤을지도?"
10059-100590170 = "그럼 선생님! 시간 날 때 놀러 와!"
10059-100590180 = "알았지? 기다리고 있을게☆"
10059-100590190 = "저기 선생님?"
10059-100590200 = "잘 들어갔어?"
10059-100590210 = "내일은 혹시 바빠?"
10059-100590220 = "내일은 바쁜데……."
10059-100590230 = "내일은 스케줄이 다 차 있어서……."
10059-100590240 = "응, 역시 그렇지?"
10059-100590250 = "알았어☆ 잘 자!"
10059-100590260 = "더워~~!"
10059-100590270 = "힘들어ㅠㅠ"
10059-100590280 = "휴일인데 이게 뭐야? 너무하다고 생각해."
10059-100590290 = "미카?"
10059-100590300 = "선생님. 힘들어 구해줘"
10059-100590310 = "아니, 그냥 놀아줘"
10059-100590320 = "일단 갈게. 기다려."
10059-100590330 = "어?"
10059-100590340 = "아냐, 아냐. 바쁜 거 아니었어?"
10059-100590350 = "그러지 마. 그냥 징징댄 거야."
10059-100590360 = "오지 않아도 되니까. 바쁘잖아 선생님도."
10059-100590370 = "선생님?"
10059-100590380 = "저기 선생님"
10059-100590390 = "잘 돌아갔어?"
10059-100590400 = "나는 지금 기숙사 세탁실!"
10059-100590410 = "체육복이랑 새 수영복도 같이 세탁 중☆"
10059-100590420 = "응. 역시 아껴두는 것보단 사용해 주는 게 더 좋은 거 같아."
10059-100590430 = "다음 수영 수업에 입으려구!"
10059-100590440 = "잘 생각했어."
10059-100590450 = "응! 고마워☆☆☆☆☆☆"
10059-100590460 = "아"
10059-100590470 = "혹시 내일은 바쁘려나……"
10059-100590480 = "응. 미안. 내일도 할 일이……"
10059-100590490 = "응, 역시 그렇지? 어른이니까."
10059-100590500 = "그럼 잘 자, 선생님!"
10059-100590510 = "선"
10059-100590520 = "생"
10059-100590530 = "님"
10059-100590540 = "☆"
10059-100590550 = "뭐야. 미카인가."
10059-100590560 = "응?"
10059-100590570 = "귀찮은 듯한 반응?"
10059-100590580 = "성가신 여자 취급인 거야? 우와…… 조금 상처……"
10059-100590590 = "뭐, 그래도 상관없지만☆"
10059-100590600 = "오늘은 어때, 선생님? 바빠? 바쁘겠지?"
10059-100590610 = "바쁘긴 하지만…… 저녁에는 괜찮을 거 같아."
10059-100590620 = "저녁 늦게쯤이면 시간이 날지도?"
10059-100590630 = "헤에…… 저녁에?"
10059-100590640 = "그럼 잠깐만 시간 내줄래?"
10059-100590650 = "잠깐, 진짜 잠깐이면 돼."
10059-100590660 = "무슨 일 있는 거야?"
10059-100590670 = "무슨 일은 아니고……"
10059-100590680 = "알았어. 저녁에 잠깐 들를게."
10059-100590690 = "선생님…… 안 들키고 잘 돌아간 거지?"
10059-100590700 = "저 화났어요."
10059-100590710 = "……응."
10059-100590720 = "장난이 너무 심했어……."
10059-100590730 = "미안해요."
10059-100590740 = "선생님……"
10059-100590750 = "미안해."
10059-100590760 = "저기"
10059-100590770 = "미카……?"
10059-100590780 = "트리니티로 와줄 수 있어……?"
10059-100590790 = "미안해 선생님."
10059-100590800 = "실망시키고 싶지 않았는데……."
10059-100590810 = "또 이렇게……"
10059-100590820 = "일단 갈게 기다려."
10059-100590830 = "선생님 잘 도망쳤어?"
10059-100590840 = "도망이라니. 퇴근을 했을 뿐이야."
10059-100590850 = "하하하. 응. 그렇지."
10059-100590860 = "나는 사실 오늘 기숙사 통금 시간을 어겨서……."
10059-100590870 = "이제 한 번만 더 걸리면 위험할지도?"
10059-100590880 = "뭐?! 시간 괜찮다고 하지 않았어?"
10059-100590890 = "응. 그건 거짓말☆"
10059-100590900 = "사실 그때 통금시간은 이미 지난 뒤였어."
10059-100590910 = "소, 속였구나 미카!"
10059-100590920 = "응! 또 나쁜 학생에게 속았지, 헤헷☆"
10059-100590930 = "그래도 너무 미워하진 말아줘."
10059-100590940 = "아, 소등 시간이래. 이제 폰 꺼야 해."
10059-100590950 = "그럼 잘 자 선생님!"
10059-100590960 = "그리고 언제나 고마워."

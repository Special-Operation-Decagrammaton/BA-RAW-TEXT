[translation]
10038-100380010 = "<SYSTEM> This is RABBIT 1. Requesting permission to land."
10038-100380020 = "Miyako? I think you sent that to the wrong person."
10038-100380030 = "<SYSTEM> Descending to an altitude of 2,000 feet. Ready to descend."
10038-100380040 = "...???"
10038-100380050 = "<SYSTEM> About 1.5 miles to target. Entering soon."
10038-100380060 = "...Miyako? Are you infiltrating something right now?"
10038-100380070 = "Sensei, are you a dog person or a cat person?"
10038-100380080 = "A dog person."
10038-100380090 = "A cat person."
10038-100380100 = "I see. Dogs are loyal and obedient, so a lot of people love them."
10038-100380110 = "I see. Cats are adorable and sassy, so a lot of people love them."
10038-100380120 = "Are you a dog or cat person, Miyako?"
10038-100380130 = "Well, actually... I think..."
10038-100380140 = "I'm a rabbit person."
10038-100380160 = "Sensei, here's a picture of the rabbit we adopted."
10038-100380170 = "She fell asleep right after she finished eating."
10038-100380180 = "What a cute rabbit."
10038-100380190 = "Right? Rabbits have a different charm from dogs or cats."
10038-100380200 = "I'll take another picture when she wakes up for you."
10038-100380210 = "By the way, I haven't decided on a name for her yet."
10038-100380220 = "What kind of name would describe this adorable and brave rabbit?"
10038-100380230 = "Watson the Second."
10038-100380240 = "Eel Rice Bowl."
10038-100380250 = "That seems too fancy for a rabbit."
10038-100380260 = "...I don't want someone to eat my rabbit."
10038-100380270 = "Do you like Bun Bun?"
10038-100380280 = "Bun Bun..."
10038-100380290 = "Yes, I think that's a great name."
10038-100380300 = "Bun Bun it is."
10038-100380310 = "<SYSTEM> This is RABBIT 1. Requesting permission to land."
10038-100380320 = "Miyako! Stop! Stop!"
10038-100380330 = "Huh? Sensei?"
10038-100380340 = "Oh... I mistook your email address for the helicopter control station again. I'm sorry."
10038-100380350 = "Do you have an operation today?"
10038-100380360 = "Yes, Sensei. A helicopter descent operation is scheduled today at 2200 hours."
10038-100380370 = "The mission is to raid the smugglers who have been illegally bringing animals into Kivotos."
10038-100380380 = "I'll come."
10038-100380390 = "Huh? You wanna come on the helicopter?"
10038-100380400 = "It'll be dangerous though... Are you sure?"
10038-100380410 = "Sensei, are you there?"
10038-100380420 = "It's nothing special. I'm just checking in..."
10038-100380430 = "I'll message you later."
10038-100380440 = "Sorry, Miyako. I was in a meeting and just saw this."
10038-100380450 = "Miyako...?"
10038-100380460 = "This isn't something I had to think about while living at SRT,"
10038-100380470 = "but extended camping is actually harder in the summer than the winter."
10038-100380480 = "Why's that?"
10038-100380490 = "The rainy seasons during the summer are more intense."
10038-100380500 = "The constant downpour makes the equipment rust and food spoil so fast."
10038-100380510 = "There's been a lot of different challenges..."
10038-100380520 = "Especially trying to figure out how to dry our clothes..."
10038-100380530 = "Me and the other squad members are out of ideas. Our laundry's really piling up."
10038-100380540 = "Why don't you just bring it to Schale?"
10038-100380550 = "To Schale...?"
10038-100380560 = "We have a washing machine and dryer in the Schale lounge."
10038-100380570 = "It'd only take around half a day."
10038-100380580 = "Oh... I appreciate the offer, but..."
10038-100380590 = "I mean..."
10038-100380600 = "Well, I guess...just this once..."
10038-100380610 = "Okay. I'll be there soon."

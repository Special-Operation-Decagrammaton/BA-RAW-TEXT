[translation]
10038-100380010 = "<SYSTEM>這裡是RABBIT1，請求著陸"
10038-100380020 = "……都子？是不是發錯人了？"
10038-100380030 = "<SYSTEM>高度下降至2000ft，準備完成"
10038-100380040 = "……？？？"
10038-100380050 = "<SYSTEM>距離目標1.5mi──即將突入"
10038-100380060 = "……都子？你打算從哪裡突入？"
10038-100380070 = "雖然有點突然，不過老師是狗派還是貓派呢？"
10038-100380080 = "是狗派哦"
10038-100380090 = "是貓派哦"
10038-100380100 = "這樣啊。確實，狗既忠誠又容易與人親近，所以很多人都喜歡呢"
10038-100380110 = "這樣啊。確實，貓既可愛又有著高傲的魅力，所以很多人都喜歡呢"
10038-100380120 = "都子是狗派還是貓派呢？"
10038-100380130 = "這個嘛，我是……"
10038-100380140 = "……硬要說的話，是兔子派吧"
10038-100380160 = "老師，請看照片"
10038-100380170 = "牠剛吃完飼料正準備要睡覺"
10038-100380180 = "真可愛呢"
10038-100380190 = "對吧？兔子有著和貓狗不同的魅力"
10038-100380200 = "等牠醒來之後，再傳照片給老師哦"
10038-100380210 = "話說回來，還沒幫老師送給我的兔子取名字呢"
10038-100380220 = "有沒有什麼名字可以表現出牠的可愛、惹人憐愛又勇敢的性格呢？"
10038-100380230 = "史丹佛二世"
10038-100380240 = "鰻魚蓋飯"
10038-100380250 = "這個名字對兔子來說好像有點太浮誇了……"
10038-100380260 = "……幫兔子取這個名字不太好吧"
10038-100380270 = "那「蹦蹦」怎麼樣呢？"
10038-100380280 = "蹦蹦，蹦蹦……"
10038-100380290 = "嗯，我覺得是個很棒的名字"
10038-100380300 = "那麼之後這隻兔子就叫做蹦蹦了"
10038-100380310 = "<SYSTEM>這裡是RABBIT1，請求起飛……"
10038-100380320 = "都子，等等！STOP！"
10038-100380330 = "……咦？老師？"
10038-100380340 = "啊。我又搞錯了，不好意思"
10038-100380350 = "今天也有降落作戰嗎？"
10038-100380360 = "是的。今天2200預計將進行直升機的降落作戰"
10038-100380370 = "是襲擊非法引進動物到奇普托斯的走私業者們的任務"
10038-100380380 = "這次降落作戰我也會跟著一起去哦"
10038-100380390 = "咦？老師也要一起搭直升機嗎？"
10038-100380400 = "我想會有點危險……沒問題嗎？"
10038-100380410 = "老師，可以打擾一下嗎……？"
10038-100380420 = "不，也不是有什麼特別的事所以才連絡你……"
10038-100380430 = "果然還是之後再連絡吧"
10038-100380440 = "抱歉，都子。剛才在開會所以這麼晚才看到"
10038-100380450 = "都子……？"
10038-100380460 = "還在SRT特殊學園的校舍生活時完全沒想到"
10038-100380470 = "對長期露營來說，夏天居然比冬天還辛苦"
10038-100380480 = "遇到什麼困難了嗎？"
10038-100380490 = "不久前不是進入梅雨季了嗎？"
10038-100380500 = "不只裝備經常生鏽，食物也很容易變質"
10038-100380510 = "各方面都困難重重"
10038-100380520 = "其中最棘手的，是洗好的衣服晾不乾……"
10038-100380530 = "我和小隊員們正在苦惱要去哪裡曬堆積的衣物"
10038-100380540 = "把要洗的衣服拿到夏萊如何？"
10038-100380550 = "夏萊？"
10038-100380560 = "夏萊的休息室裡有洗衣機和烘衣機"
10038-100380570 = "我想只要半天就會乾了"
10038-100380580 = "不。雖然很感謝老師的一片好意"
10038-100380590 = "但我不能這麼做"
10038-100380600 = "不過僅限這次的話……"
10038-100380610 = "就拜託老師了……"

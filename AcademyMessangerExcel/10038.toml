[translation]
10038-100380010 = "<ข้อความระบบ> นี่คือ RABBIT 1\nขออนุญาตลงจอดภาคพื้นดินด้วยค่ะ"
10038-100380020 = "มิยาโกะ...? ส่งข้อความผิดรึเปล่า?"
10038-100380030 = "<ข้อความระบบ> ลดระดับความสูงถึง\n2,000 ฟุต เตรียมลดระดับความสูง\nเรียบร้อยค่ะ"
10038-100380040 = "...???"
10038-100380050 = "<ข้อความระบบ> อีกประมาณ 1.5 ไมล์\nจะถึงเป้าหมายค่ะ"
10038-100380060 = "มิยาโกะ...? จะไปตรงไหนเหรอ?"
10038-100380070 = "คุณครูชอบสุนัขหรือว่าแมวเหรอคะ?"
10038-100380080 = "ครูชอบสุนัขมากกว่า"
10038-100380090 = "ครูชอบแมวมากกว่าน่ะ"
10038-100380100 = "อย่างนั้นเหรอคะ สุนัขมีความซื่อสัตย์\nและเชื่อฟังคำสั่ง เพราะงั้นเลยมีคนที่\nชอบอยู่เยอะสินะคะ"
10038-100380110 = "อย่างนั้นเหรอคะ แมวเป็นสัตว์ที่น่ารัก\nและมีเสน่ห์ดึงดูดมาก เพราะงั้นเลยมี\nคนชอบเยอะสินะคะ"
10038-100380120 = "แล้วมิยาโกะชอบสุนัขหรือแมวล่ะ?"
10038-100380130 = "นั่นสินะคะ ฉัน..."
10038-100380140 = "ฉันชอบกระต่ายมากกว่าค่ะ..."
10038-100380160 = "คุณครู นี่เป็นรูปน้องกระต่ายที่เพิ่งรับมา\nเลี้ยงค่ะ"
10038-100380170 = "เพิ่งจะกินอาหารเสร็จแล้วหลับไปค่ะ"
10038-100380180 = "กระต่ายน่ารักมากเลยนะ"
10038-100380190 = "ใช่ไหมล่ะคะ? กระต่ายเองก็มีเสน่ห์\nเฉพาะตัวที่ต่างจากสุนัขและแมวค่ะ"
10038-100380200 = "เดี๋ยวถ้าน้องกระต่ายตื่นขึ้นมา ฉันจะ\nถ่ายรูปส่งไปให้ดูนะคะ"
10038-100380210 = "พอมานึกๆ ดูแล้ว ฉันยังไม่ได้ตั้งชื่อกระต่าย\nที่คุณครูให้มาเป็นของขวัญเลยนะคะ"
10038-100380220 = "มีชื่อที่แสดงถึงความกล้าหาญและความ\nน่ารักนุ่มฟูของน้องกระต่ายบ้างไหมคะ?"
10038-100380230 = "สแตนฟอร์ด จูเนียร์"
10038-100380240 = "ข้าวหน้าปลาไหล"
10038-100380250 = "ชื่อนั้นดูยิ่งใหญ่เกินไปที่จะเป็นชื่อน้อง\nกระต่ายนะคะ"
10038-100380260 = "ถ้าตั้งชื่อน้องแบบนั้นคงรู้สึกผิด\nกับน้องแน่เลยค่ะ..."
10038-100380270 = "ถ้างั้นชื่อ \"เปียงโกะ\" ดีไหม?"
10038-100380280 = "เปียงโกะ... เปียงโกะ..."
10038-100380290 = "ค่ะ ฉันคิดว่าชื่อนี้เยี่ยมมากเลยค่ะ"
10038-100380300 = "ถ้างั้นต่อไปฉันจะเรียกน้องกระต่าย\nตัวนี้ว่า \"เปียงโกะ\" ค่ะ"
10038-100380310 = "<ข้อความระบบ> นี่คือ RABBIT 1\nขออนุญาตลงจอดภาคพื้นดินด้วยค่ะ..."
10038-100380320 = "เดี๋ยวก่อน มิยาโกะ สต็อป! สต็อปปป!"
10038-100380330 = "คะ? คุณครู...?"
10038-100380340 = "เอ๋? ฉันจำชื่อห้องแชทของคุณครูสลับกับ\nหอควบคุมเฮลิคอปเตอร์อีกแล้วค่ะ ขอโทษ\nด้วยค่ะ "
10038-100380350 = "วันนี้ก็มีปฏิบัติการโรยตัวอีกแล้วเหรอ?"
10038-100380360 = "ค่ะ คุณครู วันนี้มีแผนปฏิบัติการโรยตัว\nโดยใช้เฮลิคอปเตอร์ตอน 2200 ค่ะ"
10038-100380370 = "เป็นภารกิจบุกโจมตีกลุ่มลักลอบขนสัตว์\nเข้ามาที่คิโวทอสอย่างผิดกฎหมายค่ะ"
10038-100380380 = "งั้นปฏิบัติการโรยตัวคราวนี้ครูขอตามไป\nด้วยนะ"
10038-100380390 = "คะ? คุณครูก็จะขึ้นเฮลิคอปเตอร์ด้วย\nเหรอคะ?"
10038-100380400 = "มันอันตรายนะคะ... คุณครูไม่เป็นไรแน่\nเหรอคะ?"
10038-100380410 = "คุณครู อยู่รึเปล่าคะ...?"
10038-100380420 = "ฉันไม่ได้มีเรื่องด่วนอะไรพิเศษหรอกค่ะ..."
10038-100380430 = "เอาไว้จะติดต่อมาใหม่นะคะ"
10038-100380440 = "ขอโทษที มิยาโกะ เมื่อกี้ครูประชุมอยู่\nเลยตอบช้าน่ะ"
10038-100380450 = "มิยาโกะ...?"
10038-100380460 = "ตอนที่พักอยู่ในหอพักของ SRT\nฉันไม่เคยรู้เลย"
10038-100380470 = "ว่าการตั้งแคมป์อยู่ข้างนอกเป็นเวลา\nนานๆ แบบนี้ ตอนฤดูร้อน มันจะลำบาก\nกว่าฤดูหนาวมากๆ เลยน่ะค่ะ"
10038-100380480 = "มีเรื่องอะไรรึเปล่า?"
10038-100380490 = "ช่วงที่ผ่านมาเริ่มมีฝนฤดูร้อนตกบ้าง\nประปรายใช่มั้ยล่ะคะ"
10038-100380500 = "พอเป็นแบบนั้นก็ทำให้อุปกรณ์\nขึ้นสนิมบ้าง แถมอาหารก็เสียเร็ว"
10038-100380510 = "แล้วก็มีปัญหาต่างๆ อีกเยอะแยะ\nเลยด้วยค่ะ"
10038-100380520 = "โดยเฉพาะเรื่องตากผ้าไม่แห้ง..."
10038-100380530 = "ตอนนี้เลยกำลังหารือกับสมาชิก\nคนอื่นๆ อยู่ค่ะว่าจะเอาผ้าที่ค้างซักไว้\nไปซักแล้วตากที่ไหนกันดี"
10038-100380540 = "เอาผ้ามาซักที่ชาเล่ต์มั้ย?"
10038-100380550 = "ที่ชาเล่ต์เหรอคะ?"
10038-100380560 = "ห้องพักผ่อนชาเล่ต์มีเครื่องซักผ้า\nกับเครื่องอบผ้าอยู่ด้วยนะ"
10038-100380570 = "แค่ครึ่งวันก็คงแห้งแล้วแหละ"
10038-100380580 = "ไม่ดีกว่าค่ะ นั่นมันพื้นที่ส่วนตัว\nของคุณครู..."
10038-100380590 = "คงเข้าไปใช้ไม่ได้..."
10038-100380600 = "แต่ว่าถ้าแค่ครั้งนี้ครั้งเดียว..."
10038-100380610 = "ถ้างั้นก็ขอรบกวนด้วยนะคะ..."

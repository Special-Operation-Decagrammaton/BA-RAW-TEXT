[translation]
10038-100380010 = "<SYSTEM> 여기는 RABBIT 1. 착륙 허가를 요청합니다."
10038-100380020 = "……미야코? 메일을 잘못 보낸 거 아냐?"
10038-100380030 = "<SYSTEM> 고도 2000 피트까지 하강. 강하 준비 완료했습니다."
10038-100380040 = "……???"
10038-100380050 = "<SYSTEM> 목표까지 약 1.5 마일— 곧 돌입합니다."
10038-100380060 = "……미야코? 어디에 돌입하려는 거야?"
10038-100380070 = "선생님은 개 파이시나요, 고양이 파이시나요?"
10038-100380080 = "나는 개 파야."
10038-100380090 = "나는 고양이 파야."
10038-100380100 = "그렇네요. 개는 충성스럽고 사람을 잘 따라서 좋아하는 사람이 많지요."
10038-100380110 = "그렇네요. 고양이는 귀엽고 도도한 매력이 있어서 좋아하는 사람이 많지요."
10038-100380120 = "그럼 미야코는 개 파야, 고양이 파야?"
10038-100380130 = "글쎄요. 저는……"
10038-100380140 = "……토끼 파려나요."
10038-100380160 = "선생님, 아까 분양 받은 토끼의 사진이에요."
10038-100380170 = "막 먹이를 먹고 잠든 참이랍니다."
10038-100380180 = "토끼는 정말 귀엽네."
10038-100380190 = "그렇죠? 토끼에게는 개나 고양이와는 다른 매력이 있어요."
10038-100380200 = "나중에 깨어나면 새로운 사진을 찍어서 보내 드릴게요."
10038-100380210 = "그러고보니 선생님께 선물 받은 그 토끼의 이름을 아직 정하지 못했네요."
10038-100380220 = "어떤 이름으로 해야 귀엽고 사랑스럽고 용맹한 이 토끼의 성격을 잘 드러낼 수 있을까요?"
10038-100380230 = "스탠퍼드 2세."
10038-100380240 = "장어 덮밥."
10038-100380250 = "그건 토끼에게 붙이기엔 너무 화려한 이름같아요."
10038-100380260 = "……그건 좀 토끼에게 미안한 이름이 아닐까요."
10038-100380270 = "그럼 깡총이는 어때?"
10038-100380280 = "깡총이…… 깡총이……."
10038-100380290 = "네, 멋진 이름이라고 생각해요."
10038-100380300 = "그럼 앞으로 이 토끼는 깡총이라고 부르도록 하겠습니다."
10038-100380310 = "<SYSTEM> 여기는 RABBIT 1. 이륙 허가를 요청합니다……"
10038-100380320 = "잠깐, 미야코. 스톱! 스톱!"
10038-100380330 = "네? 선생님?"
10038-100380340 = "어라, 또 선생님의 메일 주소를 헬리콥터 관제소 주소와 착각했군요. 죄송해요."
10038-100380350 = "오늘도 강하 작전이 있어?"
10038-100380360 = "네, 선생님. 오늘 2200시에 헬기를 사용한 강하 작전이 예정되어 있습니다."
10038-100380370 = "키보토스에 불법으로 동물들을 들여오는 밀수업자들을 습격하는 임무입니다."
10038-100380380 = "이번 강하 작전에는 나도 따라갈게."
10038-100380390 = "네? 선생님도 함께 헬리콥터를 타시겠다고요?"
10038-100380400 = "위험할텐데…… 괜찮으신가요?"
10038-100380410 = "선생님, 계신가요……?"
10038-100380420 = "특별한 일정이 있어서 연락 드린 것은 아니라……"
10038-100380430 = "나중에 다시 연락드리겠습니다."
10038-100380440 = "미안, 미야코. 회의 중이라 확인이 늦었어."
10038-100380450 = "미야코……?"
10038-100380460 = "SRT 특수학원의 건물 내에서 생활할 때는 미처 몰랐었는데"
10038-100380470 = "장기간 야영을 하는 건 겨울보다 여름이 더 힘든 것 같네요."
10038-100380480 = "무슨 어려움이라도 있어?"
10038-100380490 = "얼마 전부터 여름 장마가 시작되었잖아요?"
10038-100380500 = "그 때문에 장비에도 자주 녹이 슬고, 음식도 쉽게 상해서"
10038-100380510 = "여러모로 애로사항이 많네요."
10038-100380520 = "다른 것보다 빨래가 좀처럼 마르지 않아서……"
10038-100380530 = "밀린 빨랫감을 어디서 말려야 좋을지 소대원들과 고민하던 중이었어요."
10038-100380540 = "빨랫감을 샬레로 가져오는 건 어때?"
10038-100380550 = "샬레요?"
10038-100380560 = "샬레 휴게실에는 세탁기도 건조기도 있으니까."
10038-100380570 = "한나절이면 금방 마를 거야."
10038-100380580 = "아뇨. 선생님의 호의라지만"
10038-100380590 = "그럴 수는"
10038-100380600 = "이번 한 번만……"
10038-100380610 = "부탁드리겠습니다……"

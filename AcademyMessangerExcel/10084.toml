[translation]
10084-100840010 = "ฉันอ่านเจอในนิตยสารกอสซิปน่ะ..."
10084-100840020 = "เห็นว่าการออกกำลังกายที่คู่รักชอบทำ\nด้วยกันมากที่สุด"
10084-100840030 = "คือการปีนเขาค่ะ"
10084-100840040 = "ปีนเขา? ทำไมเหรอ...?"
10084-100840050 = "การปีนเขาไม่ต้องใช้อุปกรณ์หรือต้อง\nตระเตรียมอะไรมาก วงการนี้เลยเข้าได้ง่าย"
10084-100840060 = "และด้วยธรรมชาติของภูเขาที่มีผู้คน\nไม่มากนัก"
10084-100840070 = "การปีนเขาจึงทำให้คู่รักได้คุยอะไรกัน\nสองต่อสองได้ค่ะ"
10084-100840080 = "งั้นเหรอ..."
10084-100840090 = "นั่นก็น่าจะเป็นข้อดีนะ"
10084-100840100 = "เพราะงั้น"
10084-100840110 = "ฉันก็เลยยิ่งตั้งตารอสุดสัปดาห์นี้ค่ะ"
10084-100840120 = "ทำไมเหรอ...?"
10084-100840130 = "นี่... คุณโคทามะ...?"
10084-100840140 = "อย่างที่รองหัวหน้าบอกไว้เลยค่ะ"
10084-100840150 = "ปีนี้ฉันน่าจะต้องทำให้ร่างกายแข็งแรง\nมากกว่านี้หน่อยค่ะ"
10084-100840160 = "ก็เป็นความคิดที่ดีนะ..."
10084-100840170 = "แต่ทำไมอยู่ๆ ถึงมีความคิดแบบนี้ล่ะ?"
10084-100840180 = "การเป็นแฮ็กเกอร์ก็ต้องใช้กำลังกาย\nอยู่เหมือนกันค่ะ"
10084-100840190 = "การปีนเขาครั้งที่แล้วทำเอาฉันเจ็บใจ\nเลยละค่ะ..."
10084-100840200 = "ถ้าฉันแข็งแรงจนเดินบนพื้นที่ขรุขระ\nได้ดีอย่างรองหัวหน้าจิฮิโระ"
10084-100840210 = "ฉันก็น่าจะเข้าไปดักฟังในที่ที่เข้าถึง\nยากๆ ได้สบายค่ะ"
10084-100840220 = "เอาเหตุผลนี้เลยเหรอ..."
10084-100840230 = "คุณครูคะ สุดสัปดาห์นี้มีเวลาว่างมั้ยคะ?"
10084-100840240 = "ก็ไม่ได้มีงานอะไรเป็นพิเศษนะ..."
10084-100840250 = "งั้นสุดสัปดาห์นี้ไปปีนเขาด้วยกันมั้ยคะ?"
10084-100840260 = "คือฉัน... อยากแก้มือเรื่องคราวที่แล้ว\nน่ะค่ะ"
10084-100840270 = "ครูก็ไม่ได้ติดอะไรหรอก แต่..."
10084-100840280 = "รอบนี้เอาไม้ขีดไฟไปด้วยดีมั้ย?"
10084-100840290 = "ไม่ต้องค่ะ ไม่เป็นไร"
10084-100840300 = "รอบนี้ฉันจะตัดองค์ประกอบที่มาจาก\nฝีมือมนุษย์ออก"
10084-100840310 = "แล้วบันทึกแต่เสียงธรรมชาติจริงๆ ค่ะ"
10084-100840320 = "ฉันกำลังจัดไฟล์เสียงที่บันทึกได้\nตอนปีนเขาครั้งก่อนอยู่ค่ะ"
10084-100840330 = "แต่เหมือนจะมีเสียงรบกวนปนอยู่ด้วย"
10084-100840340 = "ถ้ามีเวลา ฉันคงจะต้องไปที่ภูเขา\nอีกครั้งแล้วละค่ะ"
10084-100840350 = "เสียงรบกวนที่ว่า... ใช่เสียงพูด\nของครูรึเปล่า?"
10084-100840360 = "ไม่ค่ะ ไม่ใช่ปัญหาจากทางคุณครูหรอก"
10084-100840370 = "ถ้าเป็นเสียงของคุณครูน่าจะดีมากกว่า\nด้วย"
10084-100840380 = "อ่า..."
10084-100840390 = "โคทามะนี่ยังเหมือนเดิมเลยนะ..."
10084-100840400 = "จะว่าไป ถ้าจะไปภูเขาอีก\nขอครูไปด้วยได้มั้ย?"
10084-100840410 = "คะ?"
10084-100840420 = "คุณครูมีธุระอะไรที่นั่นเหรอคะ?"
10084-100840430 = "ที่ผ่านมาครูไปถึงแค่เชิงเขา..."
10084-100840440 = "ต่อไปก็เลยอยากไปให้ถึงยอดเขาน่ะ\nไปด้วยกันเถอะ"
10084-100840450 = "ค่ะ"
10084-100840460 = "คะ...?"

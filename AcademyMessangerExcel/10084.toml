[translation]
10084-100840010 = "根據我不久前在八卦雜誌上看到的情報……"
10084-100840020 = "據說爬山被選為"
10084-100840030 = "最適合情侶一起做的運動"
10084-100840040 = "爬山？為什麼……？"
10084-100840050 = "因為登山不需要很多裝備或備品，入門相對容易"
10084-100840060 = "再加上人少的特性"
10084-100840070 = "似乎很適合兩人單獨交談"
10084-100840080 = "原來如此……"
10084-100840090 = "那確實是優點"
10084-100840100 = "所以"
10084-100840110 = "這週末就更令人期待了"
10084-100840120 = "為什麼……？"
10084-100840130 = "……那個，小玉同學？"
10084-100840140 = "確實如副部長所說"
10084-100840150 = "或許今年應該增強一下體力比較好"
10084-100840160 = "這確實是個不錯的想法……"
10084-100840170 = "……為什麼突然這麼想？"
10084-100840180 = "因為駭客活動也需要一定的體力"
10084-100840190 = "藉由上次的登山，我深切地感受到……"
10084-100840200 = "如果能像千尋副部長一樣，具備能輕鬆攀爬險地的體力……"
10084-100840210 = "就能在難以靠近的地方進行竊聽了"
10084-100840220 = "這到底是什麼理由……"
10084-100840230 = "老師，這週末你有時間嗎？"
10084-100840240 = "目前沒有行程……"
10084-100840250 = "那這週末要不要一起去爬山？"
10084-100840260 = "……我想為上次雪恥"
10084-100840270 = "我是可以配合啦……"
10084-100840280 = "這次也要帶火柴去嗎？"
10084-100840290 = "不，這次不用帶沒關係"
10084-100840300 = "因為我打算排除所有人為因素……"
10084-100840310 = "錄下真正屬於自然的聲音"
10084-100840320 = "我在整理上次爬山錄下的聲音時……"
10084-100840330 = "發現有一部分混入了雜音……"
10084-100840340 = "所以之後必須再找時間上山一趟……"
10084-100840350 = "難道是錄到我的聲音了嗎……？"
10084-100840360 = "不，不是這樣的"
10084-100840370 = "如果錄到了老師的聲音，反而會有其他更好的用途"
10084-100840380 = "啊"
10084-100840390 = "小玉還是那個小玉呢……"
10084-100840400 = "對了，如果要上山的話可以帶我一起去嗎？"
10084-100840410 = "咦？"
10084-100840420 = "老師到山上有什麼事嗎？"
10084-100840430 = "因為我們都只爬到半山腰就回來了……"
10084-100840440 = "這次就一起爬到山頂吧"
10084-100840450 = "嗯"
10084-100840460 = "……嗯？"

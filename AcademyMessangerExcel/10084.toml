[translation]
10084-100840010 = "얼마 전 가십지에서 읽은 정보입니다만……"
10084-100840020 = "연인들이 함께하기에 가장 좋은 운동으로"
10084-100840030 = "등산이 꼽혔다고 하는군요."
10084-100840040 = "등산? 어째서……?"
10084-100840050 = "등산은 장비나 준비물이 많이 필요하지 않기 때문에 입문하기가 쉽고"
10084-100840060 = "사람이 드문 산의 특성상"
10084-100840070 = "단둘이 이야기를 나눌 기회가 많기 때문인 것 같습니다."
10084-100840080 = "과연……"
10084-100840090 = "확실히 그건 장점이겠네."
10084-100840100 = "그래서"
10084-100840110 = "이번 주말이 더욱 기대가 됩니다."
10084-100840120 = "어째서……?"
10084-100840130 = "……저기, 코타마 씨……?"
10084-100840140 = "확실히 부부장의 말처럼"
10084-100840150 = "올해는 좀 더 체력을 키워 두는 편이 좋을지도 모르겠습니다."
10084-100840160 = "좋은 생각이긴 한데……"
10084-100840170 = "……어째서 갑자기 그런 생각을?"
10084-100840180 = "해커로서 활동하기 위해서는 어느 정도의 체력도 필요하니까요."
10084-100840190 = "지난번의 산행을 통해 뼈저리게 느꼈습니다……"
10084-100840200 = "치히로 부부장처럼 험지도 쉽게 오를 수 있는 체력을 갖추게 된다면"
10084-100840210 = "접근하기 어려운 지점에서의 도청도 쉽게 할 수 있을 겁니다."
10084-100840220 = "이유가 불손해……"
10084-100840230 = "선생님, 혹시 이번 주말에 시간 괜찮으신가요."
10084-100840240 = "특별한 일정은 없는데……"
10084-100840250 = "그럼 이번 주말에 같이 산에 가지 않으시겠습니까?"
10084-100840260 = "……지난번의 리벤지를 하고 싶습니다."
10084-100840270 = "나야 큰 상관은 없지만……"
10084-100840280 = "혹시 이번에도 성냥 챙겨갈까?"
10084-100840290 = "아뇨, 괜찮습니다."
10084-100840300 = "이번에는 인위적인 요소를 모두 배제한"
10084-100840310 = "진짜 자연의 소리를 녹음할 예정이니까요."
10084-100840320 = "저번 산행 때 녹음한 사운드를 정리하던 중인데"
10084-100840330 = "아무래도 일부 사운드에 잡음이 섞여 들어간 것 같아서"
10084-100840340 = "시간이 생길 때 다시 한번 산에 다녀와야 할 것 같습니다……"
10084-100840350 = "혹시 내 목소리가 섞여 들어간 거야……?"
10084-100840360 = "아뇨, 그쪽의 문제는 아닙니다."
10084-100840370 = "오히려 선생님의 목소리가 섞였다면 더 좋은 용도가"
10084-100840380 = "아"
10084-100840390 = "코타마는 여전하구나……"
10084-100840400 = "그나저나 다시 산에 간다면 나도 같이 데려가 주지 않을래?"
10084-100840410 = "네?"
10084-100840420 = "선생님께서도 산에 뭔가 볼일이 있으신가요?"
10084-100840430 = "그동안 매번 산 중턱에서 돌아왔었으니까……"
10084-100840440 = "이번에는 같이 산 정상까지 올라가 보자."
10084-100840450 = "네"
10084-100840460 = "……네?"

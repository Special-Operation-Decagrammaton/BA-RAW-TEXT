[translation]
10128-101280010 = "ไม่ได้ติดต่อกันนานเลยนะ คุณครู"
10128-101280020 = "ฉันมีแพลนไปข้างนอกพรุ่งนี้น่ะค่ะ "
10128-101280030 = "ถ้าต้องการสิ่งของอะไร ฉันยินดีรับ\nออเดอร์ค่ะ"
10128-101280040 = "ไม่ละ ไม่เป็นไร..."
10128-101280050 = "ฮุฮุ งั้นไว้ฉันมาถามใหม่นะคะ"
10128-101280060 = "ไว้ต่อไปก็มาใช้บริการของชมรม\nการค้าพิเศษอีกนะคะ!"
10128-101280070 = "ครูยังไม่เคยใช้บริการเลยสักครั้งนะ...!"
10128-101280080 = "คุณครู"
10128-101280090 = "ทำไมเครื่องยิงถึงพังง่ายจังเลยคะ?"
10128-101280100 = "ทำสงครามล้อมโจมตีอยู่หรือไง..?"
10128-101280110 = "เปล่าค่ะ ทำอะไรที่เด็ดดวงกว่านั้น\nต่างหากค่ะ "
10128-101280120 = "ใช้ทำงานส่งของในการค้าพิเศษ\nอยู่สินะ..."
10128-101280130 = "สมกับที่เป็นคุณครูเลย! รู้ดีเลยนี่คะ!"
10128-101280140 = "สบายดีหรือเปล่าคะ คุณครู?"
10128-101280150 = "สัปดาห์นี้ฉันจะไปเข้าเวร"
10128-101280160 = "ก็เลยมาทักทายล่วงหน้าค่ะ!"
10128-101280170 = "สัปดาห์นี้ไม่มีเวรของฟุยุไม่ใช่เหรอ...?"
10128-101280180 = "ฮุฮุ"
10128-101280190 = "อะไรกัน...!"
10128-101280200 = "คุณครู"
10128-101280210 = "ไปงานนิทรรศการมั้ยคะ?"
10128-101280220 = "หืม?"
10128-101280230 = "ศูนย์ศิลปะในเครือเซนต์&เมดิคัล\nอาคาร A ค่ะ!"
10128-101280240 = "ไม่ให้ตั้งตัวเลยเหรอ?!"

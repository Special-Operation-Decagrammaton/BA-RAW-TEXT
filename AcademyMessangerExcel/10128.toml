[translation]
10128-101280010 = "好久不見，老師"
10128-101280020 = "明天我預計會外出"
10128-101280030 = "有什麼需要的話可以提前告訴我，我來幫你準備"
10128-101280040 = "……不用了，沒關係"
10128-101280050 = "呵呵，那我就下次再問吧"
10128-101280060 = "今後也請多多利用我們特殊交易部！"
10128-101280070 = "我根本沒用過啊……！"
10128-101280080 = "老師"
10128-101280090 = "投石機為什麼這麼容易壞呢？"
10128-101280100 = "你們是在打攻城戰嗎……？"
10128-101280110 = "不，我們在做更帥氣的事"
10128-101280120 = "……原來是用在特殊交易上啊"
10128-101280130 = "不愧是老師！果然很懂嘛！"
10128-101280140 = "老師，最近過得好嗎？"
10128-101280150 = "這週擔任值日生時會見到面"
10128-101280160 = "所以先提前打聲招呼！"
10128-101280170 = "……你這週沒有負責擔任值日生吧？"
10128-101280180 = "呵呵"
10128-101280190 = "什麼情況……！"
10128-101280200 = "老師"
10128-101280210 = "要不要去看展覽？"
10128-101280220 = "咦？"
10128-101280230 = "在聖徒&醫療附屬藝術中心A館！"
10128-101280240 = "這麼突然！？"

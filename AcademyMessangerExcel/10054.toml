[translation]
10054-100540010 = "สวัสดีค่ะคุณครู มารีนะคะ"
10054-100540020 = "ถ้าไม่เป็นการรบกวนคุณครูเกินไป\nฉันจะขออนุญาตปรึกษาคุณครูหน่อย\nได้มั้ยคะ?"
10054-100540030 = "ฉันมีปัญหาเรื่องหนึ่งที่หาทางแก้ไข\nด้วยตัวเองไม่ได้น่ะค่ะ..."
10054-100540040 = "ได้อยู่แล้ว เรื่องอะไรเหรอ?"
10054-100540050 = "ไม่ได้เกิดเรื่องอะไรร้ายแรงใช่มั้ย?"
10054-100540060 = "อ๊ะ"
10054-100540070 = "ไม่ใช่เรื่องใหญ่หรอกค่ะ..."
10054-100540080 = "เปล่าค่ะ ไม่ได้มีเรื่องร้ายแรงอะไร\nอย่าห่วงเลยค่ะ"
10054-100540090 = "แต่ขอบคุณที่เป็นห่วงนะคะ ได้ยิน\nแบบนี้ค่อยอุ่นใจขึ้นหน่อยค่ะ"
10054-100540100 = "ถ้างั้นฉันขอรบกวนหน่อยนะคะ"
10054-100540110 = "ขอบคุณค่ะคุณครู"
10054-100540120 = "คุณครูคงจะงานยุ่งมากๆ..."
10054-100540130 = "แต่หวังว่าจะได้เจอคุณครูที่สนามกีฬา\nนะคะ"
10054-100540140 = "ถ้างั้นฉันขอตัวก่อนนะคะคุณครู\nขอให้เป็นวันที่ดีค่ะ!"
10054-100540150 = "คุณครูคะ"
10054-100540160 = "สบายดีรึเปล่าคะคุณครู?"
10054-100540170 = "ฉันคิดว่ามาทักทายคุณครูก่อนน่าจะ\nดีกว่า เลยส่งข้อความมาหาค่ะ"
10054-100540180 = "หวังว่าคุณครูจะได้ใช้เวลาอย่างสนุก\nสนานตลอดทั้งวันนะคะ"
10054-100540190 = "????"
10054-100540200 = "มีอะไรเหรอมารี?"
10054-100540210 = "มารี...?"
10054-100540220 = "...."
10054-100540230 = "คุณครู?"
10054-100540240 = "เป็นอะไรรึเปล่าคะ? รู้สึกเหมือนได้ยิน\nเสียงอะไรหนักๆ หล่นลงไปเลยค่ะ..."
10054-100540250 = "ครูไม่เป็นไร ไม่ต้องห่วงนะ"
10054-100540260 = "อืม ครูเตรียมใจเอาไว้แล้วละ\nไม่ต้องห่วงนะ"
10054-100540270 = "????"
10054-100540280 = "ค่ะ..."
10054-100540290 = "ค่า~"
10054-100540300 = "ฉันมีเรื่องที่อยากขอบคุณคุณครูอยู่ค่ะ"
10054-100540310 = "คุณครูมาให้กำลังใจ... ฉันเลยได้เรียน\nรู้อะไรหลายๆ อย่างจากงานแข่งกีฬา\nครั้งนี้เลยค่ะ"
10054-100540320 = "ฉันอยากตอบแทนคุณครู แต่ว่าตอนนี้\nยังคิดไม่ออกเลยค่ะว่าจะตอบแทน\nได้ยังไง"
10054-100540330 = "ครูไม่ได้อยากได้อะไรตอบแทน\nหรอก ไม่เป็นไรนะ"
10054-100540340 = "มารีสนุกสินะ เท่านี้ก็พอแล้วละ"
10054-100540350 = "อืม..."
10054-100540360 = "คุณครูชอบพูดแบบนี้ตลอดเลย..."
10054-100540370 = "เข้าใจแล้วค่ะ"
10054-100540380 = "ฉันคงมีโอกาสได้ตอบแทนคุณครู\nสักวันนะคะ"
10054-100540390 = "ถึงมันจะเล็กน้อยและทดแทนการ\nตอบแทนไม่ได้..."
10054-100540400 = "แต่ฉันจะสวดภาวนาให้คุณครูมีวันที่\nสงบสุขนะคะ"
10054-100540410 = "ว่าแต่คุณครูคะ..."
10054-100540420 = "ถ้าคุณครูไม่ว่าอะไร..."
10054-100540430 = "ไว้ครั้งหน้าคุณครูเตรียมชุดพละแล้ว\nแวะมาก็ได้นะคะ"
10054-100540440 = "ที่นี่อากาศสดชื่นมากและเหมาะกับ\nการออกกำลังกายด้วยค่ะ"
10054-100540450 = "เพราะงั้นถ้าคุณครูสะดวก..."
10054-100540460 = "อืม..."
10054-100540470 = "เอาไว้เราหาวันมาที่นี่ด้วยกันได้...\nก็คงดีนะคะ"
10054-100540480 = "ขอตัวก่อนนะคะ"

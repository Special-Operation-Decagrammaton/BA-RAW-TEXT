[translation]
10054-100540010 = "안녕하세요, 선생님. 마리예요."
10054-100540020 = "혹시 폐가 되지 않는다면 조만간 상담을 한 번 신청해도 괜찮을까요?"
10054-100540030 = "아무래도 혼자서는 해결되지 않는 고민이 있어서요……"
10054-100540040 = "물론이지. 무슨 일이야?"
10054-100540050 = "무슨 일 있는 건 아니지?"
10054-100540060 = "앗"
10054-100540070 = "별일은 아닌데……."
10054-100540080 = "아니에요. 나쁜 일은 아니니 걱정해주지 않으셔도 돼요."
10054-100540090 = "그래도 그렇게 말씀해 주시니 안심이 됩니다. 정말 감사해요."
10054-100540100 = "그럼 조만간 부탁드릴게요."
10054-100540110 = "다시 한번 감사합니다, 선생님."
10054-100540120 = "아마도 선생님께선 분명 바쁘시겠지만"
10054-100540130 = "기회가 된다면 대운동회에서도 뵐 수 있었으면 좋겠습니다."
10054-100540140 = "그럼 좋은 하루 되세요, 선생님!"
10054-100540150 = "선생님"
10054-100540160 = "좋은 하루 보내고 계시는가요?"
10054-100540170 = "아무래도 먼저 인사드리는 것이 좋을 거 같아서 이렇게 연락드려요."
10054-100540180 = "부디 남은 시간도 즐겁게 보내시길 바랄게요."
10054-100540190 = "?????"
10054-100540200 = "마리? 무슨 일이야?"
10054-100540210 = "……마리?"
10054-100540220 = "……"
10054-100540230 = "선생님?"
10054-100540240 = "괜찮으신가요? 뭔가 둔탁한 소리가 들렸던 거 같아서……."
10054-100540250 = "괜찮아. 걱정하지 마."
10054-100540260 = "응. 각오하고 한 거니까. 신경 쓰지 마."
10054-100540270 = "????"
10054-100540280 = "……네"
10054-100540290 = "네에……."
10054-100540300 = "선생님. 감사드릴 일이 있어요."
10054-100540310 = "선생님의 격려 덕에 저는 이번 대운동회에서 많은 것을 얻어갈 수 있었습니다."
10054-100540320 = "꼭 보답을 해 드리고 싶은데, 아직까지는 당장 떠오르는 게 없네요……."
10054-100540330 = "보답을 바라고 한 게 아니니 괜찮아."
10054-100540340 = "즐거웠나 보구나. 다행이야."
10054-100540350 = "으음"
10054-100540360 = "항상 그렇게 얼버무리시고……."
10054-100540370 = "알겠습니다."
10054-100540380 = "언젠가는 기회가 있겠지요."
10054-100540390 = "그 대신이라기엔 부족하겠지만"
10054-100540400 = "선생님께서도 평온한 하루 되시길 기도드리겠습니다."
10054-100540410 = "그러고 보니 선생님"
10054-100540420 = "혹시 선생님만 괜찮으시다면,"
10054-100540430 = "나중에 선생님께서도 체육복으로 들러 주시는 것도 좋을 거 같아요"
10054-100540440 = "여기는 꽤 상쾌하고 시원한 곳이라 운동하기도 좋거든요"
10054-100540450 = "그러니까, 선생님만 괜찮으시면"
10054-100540460 = "음"
10054-100540470 = "다음에 같이 하는 날도…… 있었으면 좋겠어요."
10054-100540480 = "그럼 이만"

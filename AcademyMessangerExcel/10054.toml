[translation]
10054-100540010 = "老師好，我是瑪麗"
10054-100540020 = "雖然這麼突然很不好意思，但我有事想和老師商量……"
10054-100540030 = "那個，只靠我一個人的話實在有點困難"
10054-100540040 = "當然可以唷，怎麼了嗎？"
10054-100540050 = "發生什麼事了？"
10054-100540060 = "啊……那個"
10054-100540070 = "其實不是什麼嚴重的事……"
10054-100540080 = "而且，也沒有被捲進什麼危險的事情裡，老師不用擔心"
10054-100540090 = "不過，您的關心讓我非常開心。謝謝您"
10054-100540100 = "那麼，直奔主題吧……可以占用您明天早上的時間嗎？"
10054-100540110 = "我在大教堂等您哦"
10054-100540120 = "畢竟是老師您，我想一定會很忙……"
10054-100540130 = "不過我會祈禱，在晄輪大祭當天也能見到老師的"
10054-100540140 = "願今天也能成為老師美好的一天"
10054-100540150 = "老師……"
10054-100540160 = "今天過得好嗎？"
10054-100540170 = "想說至少要向您問好，所以就聯絡了您……"
10054-100540180 = "我會祈禱老師能過得幸福的"
10054-100540190 = "？？？"
10054-100540200 = "瑪麗，怎麼了嗎？"
10054-100540210 = "……瑪麗？"
10054-100540220 = "……"
10054-100540230 = "老師……？"
10054-100540240 = "那個，剛才發生了什麼嗎？\n離開的時候好像聽到了一聲沉悶的聲音……"
10054-100540250 = "我想應該是錯覺唷？"
10054-100540260 = "我多少有點預感所以沒事的，別擔心"
10054-100540270 = "？？？"
10054-100540280 = "……這，這樣啊"
10054-100540290 = "我會再聯絡您的"
10054-100540300 = "老師……有什麼我能替您做的事嗎？"
10054-100540310 = "託老師的福，我在晄輪大祭裡成長了許多"
10054-100540320 = "所以……我想報答老師，卻不知道該怎麼做比較好……"
10054-100540330 = "不用客氣唷。瑪麗有精神就好"
10054-100540340 = "很開心能看到瑪麗開心的樣子唷"
10054-100540350 = "啊哈哈……"
10054-100540360 = "果然說不過老師呢"
10054-100540370 = "……我明白了"
10054-100540380 = "我會等待能成為您力量的那一天到來的"
10054-100540390 = "說是作為代替可能有點奇怪，但今天……"
10054-100540400 = "我會為您祈禱，希望您能度過安穩的一天"
10054-100540410 = "那個，老師"
10054-100540420 = "如果老師不介意的話……"
10054-100540430 = "我在想，老師下次要不要穿著運動服來呢"
10054-100540440 = "公園既涼快又舒服，最適合運動了……"
10054-100540450 = "所以說，當然還是要看老師方不方便"
10054-100540460 = "那個……"
10054-100540470 = "之後還能一起運動的話……我會很高興的"
10054-100540480 = "那麼……下次見"

[translation]
20042-200420010 = "老師，你聽我說"
20042-200420020 = "這實在是，不管怎麼想都太過分了！"
20042-200420030 = "發生什麼事了嗎，真紀？"
20042-200420040 = "老師常來千年，應該知道我們的研究區域有多大吧"
20042-200420050 = "可是研討會卻要我一個人在這麼大的研究區域"
20042-200420060 = "把落葉全部清掉！"
20042-200420070 = "雖然我也聽說過貝里塔斯不受研討會的歡迎，但這也太過分了吧？"
20042-200420080 = "要真紀一個人做，確實是有點強人所難……"
20042-200420090 = "怎麼會突然要你去清理落葉呢？"
20042-200420100 = "唔嗯"
20042-200420110 = "其實在被叫去研討會之前"
20042-200420120 = "我因為在學園的單軌列車上塗鴉，所以被念了一下……"
20042-200420130 = "應該跟這件事沒關係吧"
20042-200420140 = "八成就是因為這件事吧……"
20042-200420150 = "老師"
20042-200420160 = "你這週末有空嗎？"
20042-200420170 = "嗯，沒有特別的安排……怎麼了嗎？"
20042-200420180 = "就是啊"
20042-200420190 = "我想去附近爬山，但一個人去有點無聊"
20042-200420200 = "所以如果你沒事的話，要不要一起去？"
20042-200420210 = "真紀居然……"
20042-200420220 = "……要去爬山！？"
20042-200420230 = "這是什麼反應"
20042-200420240 = "之前假日的時候，我們不也常常在外面碰到嗎？"
20042-200420250 = "抱歉抱歉。只是……"
20042-200420260 = "這好像還是真紀第一次約我出去"
20042-200420270 = "而且還是因為電子設備和塗鴉無關的事"
20042-200420280 = "QAQ"
20042-200420290 = "確實是那樣沒錯"
20042-200420300 = "總之你有時間對吧？"
20042-200420310 = "那就週末見囉，老師！"
20042-200420320 = "老師～"
20042-200420330 = "這個週末你也有空嗎？"
20042-200420340 = "我聽說在離D.U.不遠的地方有個知名的露營區"
20042-200420350 = "如果可以的話，要不要一起去露營？"
20042-200420360 = "……在那個露營區能獲得遊戲相關的道具嗎？"
20042-200420370 = "咦，你怎麼會知道？"
20042-200420380 = "難道老師也開始玩甲蟲皇后AR了嗎？"
20042-200420390 = "沒有，只是真紀居然突然會邀請我去露營……"
20042-200420400 = "感覺十之八九跟遊戲有關"
20042-200420410 = "怎麼對我有這種偏見呢，好過分！"
20042-200420420 = "……不過其實也沒說錯啦"
20042-200420430 = "所以這個週末能麻煩你空出時間嗎？"
20042-200420440 = "因為單人露營對初學者可能有點危險……"
20042-200420450 = "為了安全起見，我也跟你一起去吧"
20042-200420460 = "謝謝你，老師！"
20042-200420470 = "話說今年也快結束了呢"
20042-200420480 = "明明還有很多事情想做的說"
20042-200420490 = "時間也過得太快了吧～"
20042-200420500 = "我也有同感……"
20042-200420510 = "今年還有好多事沒完成……"
20042-200420520 = "這麼說來，研討會好像也正忙著整理今年的工作"
20042-200420530 = "夏萊那邊還好嗎？需不需要幫忙？"
20042-200420540 = "那下次當值日生的時候，可以幫我整理收據嗎？"
20042-200420550 = "年底要結算的收據，我到現在都還沒整理完"
20042-200420560 = "知道了，下次我去會幫忙的"
20042-200420570 = "嗯？"
20042-200420580 = "話說，夏萊的收據結算截止日期不是今天嗎？"
20042-200420590 = "你怎麼說下次當值日生的時候再整理……"
20042-200420600 = "這件事情，優香前輩他知道嗎？"
20042-200420610 = "……"
20042-200420620 = "能幫我保密嗎？"
20042-200420630 = "呵呵"
20042-200420640 = "不知道為什麼，突然好想喝妖怪MAX的限定熱帶口味哦～"
20042-200420650 = "……下次當值日生之前，我會幫你準備好的"

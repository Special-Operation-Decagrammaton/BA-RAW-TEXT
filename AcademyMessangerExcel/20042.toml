[translation]
20042-200420010 = "선생님, 내 말 좀 들어봐."
20042-200420020 = "아무리 생각해도 너무하다니까, 정말!"
20042-200420030 = "무슨 일이야, 마키?"
20042-200420040 = "선생님도 밀레니엄에 자주 오니 우리 학습관이 얼마나 넓은지는 알고 있잖아."
20042-200420050 = "그런데 세미나에서 그 넓은 학습관에 떨어진 낙엽들을"
20042-200420060 = "나 혼자서 치우라는 거야!"
20042-200420070 = "아무리 베리타스가 세미나에 미운털이 자주 박혔다고는 하지만, 이건 너무한 거 아니야?"
20042-200420080 = "확실히 마키 혼자 하기에는 어려운 일이긴 한데…"
20042-200420090 = "갑자기 아무런 전조도 없이 낙엽 청소를 시킨 거야?"
20042-200420100 = "음"
20042-200420110 = "사실 세미나에 불려 가기 전에"
20042-200420120 = "학원 모노레일에 그린 그래피티 때문에 살짝 잔소리를 듣긴 했는데……"
20042-200420130 = "설마 그것 때문이려구"
20042-200420140 = "그것 때문인 것 같은데……"
20042-200420150 = "선생님"
20042-200420160 = "혹시 이번 주 주말에 시간 괜찮아?"
20042-200420170 = "응. 특별한 일정은 없는데…… 왜?"
20042-200420180 = "음 그게"
20042-200420190 = "근처의 산에 등산을 가려 했는데 혼자는 조금 심심해서"
20042-200420200 = "혹시 괜찮다면 가볍게 같이 다녀오지 않을래?"
20042-200420210 = "마키가……"
20042-200420220 = "……등산을?!"
20042-200420230 = "왜 그런 반응을 보이는 거야"
20042-200420240 = "전에도 종종 휴일에 밖에서 만난 적은 있었잖아?"
20042-200420250 = "미안, 미안. 하지만……"
20042-200420260 = "전자기기나 그래피티와 관련된 일도 아닌데"
20042-200420270 = "마키가 밖에 나가자고 한 건 처음인 것 같아서"
20042-200420280 = ";;"
20042-200420290 = "그건 그렇긴 하지만"
20042-200420300 = "여하튼 시간은 괜찮은 거지?"
20042-200420310 = "그럼 주말에 보자, 선생님!"
20042-200420320 = "선생님~"
20042-200420330 = "이번 주 주말도 시간 괜찮아?"
20042-200420340 = "다른 게 아니라 D.U.에서 멀지 않은 곳에 유명한 캠핑장이 있다고 하는데"
20042-200420350 = "괜찮다면 같이 캠핑이나 다녀오지 않을래?"
20042-200420360 = "…그 캠핑장에서 게임과 관련된 아이템을 받을 수 있어?"
20042-200420370 = "앗, 어떻게 알았어?"
20042-200420380 = "혹시 선생님도 무시퀸 AR 시작한 거야?"
20042-200420390 = "아니, 마키가 갑자기 캠핑을 권한다면…"
20042-200420400 = "게임과 관련된 일일 거라고 생각해서."
20042-200420410 = "그런 편견을 가지고 있었다니, 너무해!"
20042-200420420 = "…틀린 말은 아니었지만."
20042-200420430 = "그래서 이번 주말에 시간 내 줄 수 있어?"
20042-200420440 = "초보자에게 솔로 캠핑은 위험할 수 있으니까…"
20042-200420450 = "안전을 위해서라도 나도 함께 동행할게."
20042-200420460 = "고마워, 선생님!"
20042-200420470 = "그러고 보니 올해도 거의 다 끝났네"
20042-200420480 = "뭔가 하고 싶었던 게 잔뜩 있었던 것 같은데"
20042-200420490 = "시간이 너무 빠른 것 같아~"
20042-200420500 = "동감이야…"
20042-200420510 = "올해의 일이 아직 잔뜩 남아 있는데…"
20042-200420520 = "그러고 보니 세미나도 올해의 업무를 정리하느라 정신이 없어 보이던데"
20042-200420530 = "샬레는 어때? 혹시 도와줄 거 있어?"
20042-200420540 = "그럼 다음 당번 때 영수증 정리를 도와줄 수 있을까?"
20042-200420550 = "연말 정산에 필요한 영수증 정리가 아직이라."
20042-200420560 = "알겠어. 다음에 가면 도와줄게."
20042-200420570 = "응?"
20042-200420580 = "그러고 보니 샬레의 영수증 정리 마감일은 오늘까지 아니었어?"
20042-200420590 = "그런데 다음 당번 때 정리한다니…"
20042-200420600 = "혹시 유우카 선배는 그 사실 알고 있어?"
20042-200420610 = "……."
20042-200420620 = "비밀로 해주면 안 될까?"
20042-200420630 = "후후"
20042-200420640 = "어쩐지 요괴 MAX 한정 트로피컬 맛이 먹고 싶은 기분인데~"
20042-200420650 = "…다음 당번 때까지 준비해 두겠습니다."

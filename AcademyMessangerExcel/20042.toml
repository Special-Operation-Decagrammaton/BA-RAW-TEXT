[translation]
20042-200420010 = "Listen to me, Sensei."
20042-200420020 = "No matter how I look at it, this is too much!"
20042-200420030 = "What's going on, Maki?"
20042-200420040 = "You've been to Millennium a lot, Sensei! You've seen how big our study center is!"
20042-200420050 = "Seminar's making me sweep up all the fallen leaves"
20042-200420060 = "in that giant study center, all by myself!"
20042-200420070 = "I get that Seminar isn't Veritas' biggest fan, but isn't that way over the top?"
20042-200420080 = "They're making you do such a difficult task by yourself, Maki?"
20042-200420090 = "They told you to do this for no reason?"
20042-200420100 = "Um..."
20042-200420110 = "Weeell, before Seminar assigned me here..."
20042-200420120 = "...I did get in a tiny bit of trouble for graffiting the school's monorails."
20042-200420130 = "I doubt that's the reason though. "
20042-200420140 = "I think that's exactly the reason..."
20042-200420150 = "Sensei"
20042-200420160 = "Are you free this weekend by any chance?"
20042-200420170 = "I don't have anything special going on... Why?"
20042-200420180 = "Um, weeell"
20042-200420190 = "I wanted to go hiking on this nearby mountain, but it'd be way too boring by myself."
20042-200420200 = "Do you think you'd be down to come with me?"
20042-200420210 = "Maki..."
20042-200420220 = "...and hiking?!"
20042-200420230 = "What's with that reaction?!"
20042-200420240 = "We've met up outdoors before, haven't we?!"
20042-200420250 = "Sorry, sorry. It's just that..."
20042-200420260 = "It feels like this is your first time asking me to go outside."
20042-200420270 = "You only ever want to go graffiti or get electronics."
20042-200420280 = "…"
20042-200420290 = "Fine, I guess that's true, but still...!"
20042-200420300 = "Anyways, you have time, right?"
20042-200420310 = "I'll see you this weekend, Sensei!"
20042-200420320 = "Sensei!"
20042-200420330 = "Are you free this weekend too?"
20042-200420340 = "I heard of a really popular campground not far from the D.U."
20042-200420350 = "So would you like to go camping together?"
20042-200420360 = "...Is there a game-related item that you can acquire at said campground?"
20042-200420370 = "Ah. How'd you know?"
20042-200420380 = "Are you playing Mushiqueen AR too, Sensei?"
20042-200420390 = "No, I just figured that if you're bringing up camping..."
20042-200420400 = "...it's probably game-related."
20042-200420410 = "It's so mean of you to stereotype me like that!"
20042-200420420 = "...You're not wrong, though."
20042-200420430 = "Anyways, can you make time for me this weekend?"
20042-200420440 = "Solo camping is really dangerous for beginners, after all..."
20042-200420450 = "I'll join you, only for safety reasons."
20042-200420460 = "Thank you, Sensei!"
20042-200420470 = "Now that I think about it, this year's almost over."
20042-200420480 = "It still feels like there were lots of things I wanted to do."
20042-200420490 = "Time just flies by!"
20042-200420500 = "I agree..."
20042-200420510 = "There's still so much work left to do this year..."
20042-200420520 = "Now that I think about it, Seminar was super-busy taking care of year-end stuff."
20042-200420530 = "How about Schale? Is there anything I can help with?"
20042-200420540 = "Can you help me sort receipts during your next Student Rep shift?"
20042-200420550 = "There are still receipts to sort for year-end settlement."
20042-200420560 = "Okay. I'll help you the next time I'm the Student Rep."
20042-200420570 = "Huh?"
20042-200420580 = "Thinking about it, isn't Schale's expense deadline today?"
20042-200420590 = "But if you wait for the next time I'm on duty..."
20042-200420600 = "Does Yuuka know about this?"
20042-200420610 = "..."
20042-200420620 = "Can you keep it a secret?"
20042-200420630 = "Fufu."
20042-200420640 = "For some reason, I'm in a mood for limited Frenzy MAX Tropical flavor..."
20042-200420650 = "...I'll have it ready by your next Student Rep shift."

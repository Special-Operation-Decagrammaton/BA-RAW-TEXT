[translation]
20042-200420010 = "คุณครู ฉันขอบ่นหน่อยสิ"
20042-200420020 = "ไม่ว่าจะคิดยังไง ฉันว่านี่มันก็เกินไปนะ!"
20042-200420030 = "มีเรื่องอะไรเหรอ มากิ?"
20042-200420040 = "คุณครูเองก็มาที่มิลเลเนียมบ่อยๆ\nงั้นก็รู้ใช่มั้ยล่ะ ว่าวิทยาเขตของเรา\nมันกว้างแค่ไหน"
20042-200420050 = "แต่เซมิน่าน่ะสิ สั่งให้ฉันไปกวาด\nใบไม้ร่วงทั่วโรงเรียน"
20042-200420060 = "แล้วก็ให้ไปทำคนเดียวด้วย!"
20042-200420070 = "ถึงเวอริทัสจะก่อเรื่องให้เซมิน่าปวดหัว\nบ่อยๆ แต่แบบนี้มันเกินไปแล้วหรือเปล่า?"
20042-200420080 = "ให้มากิไปทำคนเดียวมันก็ลำบาก\nอยู่นะ..."
20042-200420090 = "โดนให้ไปกวาดใบไม้ร่วงโดยไม่\nแจ้งล่วงหน้าเลยเหรอ?"
20042-200420100 = "อืม..."
20042-200420110 = "ที่จริงก่อนที่เซมิน่าจะเรียกฉันไปเฉ่ง"
20042-200420120 = "ฉันมีคดีเรื่องกราฟิตี้ที่ไปวาดไว้บน\nรถไฟฟ้านิดหน่อยน่ะ..."
20042-200420130 = "หรือว่าจะเป็นเพราะเรื่องนั้นนะ "
20042-200420140 = "น่าจะเป็นเพราะเรื่องนั้นนะ..."
20042-200420150 = "คุณครู"
20042-200420160 = "สุดสัปดาห์นี้พอมีเวลาว่างมั้ย?"
20042-200420170 = "อื้อ ครูยังไม่มีนัดอะไร... ทำไมเหรอ?"
20042-200420180 = "อืม... คือว่า"
20042-200420190 = "ฉันจะไปปีนเขาแถวๆ นี้น่ะ แต่ไป\nคนเดียวก็น่าเบื่อไปหน่อย"
20042-200420200 = "ถ้าครูไม่ติดอะไร เราไปปีนเขาชิลๆ\nกันมั้ย?"
20042-200420210 = "มากิ..."
20042-200420220 = "จะปีนเขาเนี่ยนะ...?!"
20042-200420230 = "ทำไมมีปฏิกิริยาแบบนั้นล่ะ"
20042-200420240 = "วันหยุดก่อนหน้านี้เราก็เคยเจอกัน\nข้างนอกอยู่บ้างไม่ใช่เหรอ?"
20042-200420250 = "ขอโทษๆ ก็แค่..."
20042-200420260 = "นี่เป็นครั้งแรกที่มากิมาชวนไป\nข้างนอก"
20042-200420270 = "แบบที่ไม่เกี่ยวกับอุปกรณ์\nอิเล็คทรอนิกส์หรือกราฟิตี้น่ะ"
20042-200420280 = ";;"
20042-200420290 = "มันก็จริงอยู่หรอกนะ"
20042-200420300 = "แต่เอาเป็นว่าไปได้ใช่มั้ย?"
20042-200420310 = "งั้นเจอกันสุดสัปดาห์นี้นะคุณครู!"
20042-200420320 = "คุณครู~"
20042-200420330 = "สุดสัปดาห์นี้พอมีเวลามั้ย?"
20042-200420340 = "ฉันได้ยินว่ามีที่ตั้งแคมป์ชื่อดังที่อยู่\nไม่ไกลจาก D.U. มากน่ะ"
20042-200420350 = "ถ้าไม่ติดอะไร เอาไว้เราไปตั้งแคมป์\nด้วยกันมั้ย?"
20042-200420360 = "ไปตั้งแคมป์ที่นั่นแล้วจะได้ไอเทม\nในเกมเหรอ...?"
20042-200420370 = "อ๊ะ รู้ได้ยังไงน่ะ?"
20042-200420380 = "หรือว่าคุณครูก็เริ่มเล่นมูชิควีน AR\nแล้วเหมือนกัน?"
20042-200420390 = "เปล่าหรอก แค่เห็นจู่ๆ มากิมาชวน\nไปแคมป์ปิ้งน่ะ..."
20042-200420400 = "ครูก็เลยคิดว่าต้องเกี่ยวกับเกมแน่ๆ"
20042-200420410 = "คิดว่าฉันเป็นคนแบบนั้นเหรอ\nเกินไปแล้วนะ!"
20042-200420420 = "ถึงที่พูดมามันจะจริงก็เถอะ..."
20042-200420430 = "งั้นสุดสัปดาห์นี้พอมีเวลาให้ฉันหน่อย\nมั้ยล่ะ?"
20042-200420440 = "ให้มือใหม่ไปตั้งแคมป์คนเดียว\nมันอาจจะอันตรายก็ได้..."
20042-200420450 = "ครูจะไปด้วยเพื่อความปลอดภัย\nแล้วกัน"
20042-200420460 = "ขอบคุณนะ คุณครู!"
20042-200420470 = "จะว่าไป นี่ก็เกือบหมดไปอีกปีแล้วแฮะ"
20042-200420480 = "ฉันมีนู่นนี่ที่อยากทำตั้งมากมาย"
20042-200420490 = "แต่เวลามันผ่านไปเร็วจริงๆ เลย~"
20042-200420500 = "ครูเห็นด้วย..."
20042-200420510 = "งานของปีนี้ก็ยังมีค้างอยู่เพียบเลยด้วย..."
20042-200420520 = "จะว่าไป เซมิน่าก็เหมือนจะยุ่งกับ\nการเคลียร์งานของปีนี้อยู่นะ"
20042-200420530 = "ที่ชาเล่ต์ล่ะเป็นไงบ้าง? มีอะไรให้\nฉันช่วยมั้ย?"
20042-200420540 = "ตอนมาเข้าเวรครั้งหน้า ช่วยจัดการ\nใบเสร็จให้หน่อยได้มั้ย?"
20042-200420550 = "ครูยังไม่ได้เคลียร์ใบเสร็จเอาไว้\nทำบัญชีเลย"
20042-200420560 = "ได้เลย ไว้ครั้งหน้าฉันจะเข้าไปช่วยนะ"
20042-200420570 = "เอ๋?"
20042-200420580 = "แต่ใบเสร็จของชาเล่ต์ต้องเคลียร์ให้\nเสร็จภายในวันนี้ไม่ใช่เหรอ?"
20042-200420590 = "แล้วถ้าทำตอนเข้าเวรครั้งหน้า\nจะไปทันได้ไง..."
20042-200420600 = "รุ่นพี่ยูกะรู้เรื่องนี้หรือเปล่าน่ะ?"
20042-200420610 = "..."
20042-200420620 = "ช่วยเก็บเป็นความลับให้หน่อยได้มั้ย?"
20042-200420630 = "ฮุฮุ"
20042-200420640 = "รู้สึกอยากกินมอนสเตอร์แม็กซ์\nรสทรอปิคอลจังเลยน้า~"
20042-200420650 = "ครูจะซื้อเตรียมไว้ให้นะ..."

[translation]
10095-100950010 = "안녕하세요. 선생님."
10095-100950020 = "오늘도 역시…… 바쁘신가요?"
10095-100950030 = "바쁘다면 바쁜데……."
10095-100950040 = "아마 밀레니엄 일로 바쁘게 될 것 같아."
10095-100950050 = "네? 혹시 저희 학교로"
10095-100950060 = "오실 일이 있으신 건가요?"
10095-100950070 = "맞아. 그거야."
10095-100950080 = "그, 그렇군요……."
10095-100950090 = "저, 선생님."
10095-100950100 = "혹시 괜찮으시다면……."
10095-100950110 = "만에 하나 시간이 남으실 때의 이야기이지만……."
10095-100950120 = "저희 부실에도, 한 번 들러 주시면"
10095-100950130 = "기쁠 것 같아요."
10095-100950140 = "저, 선생님?"
10095-100950150 = "지금 보내 주신 이 전시회 정보……."
10095-100950160 = "응. 고전 복식 미술전이 열린대."
10095-100950170 = "혹시 미도리에게 도움이 될까 해서."
10095-100950180 = "감사합니다!"
10095-100950190 = "저기, 혹시 말인데요."
10095-100950200 = "정말 만에 하나의, 이야기이지만……."
10095-100950210 = "이 전시회"
10095-100950220 = "선생님께서도 같이…… 가 주실 수, 있으실까요……?"
10095-100950230 = "그럴까? 마침 표도 두 장이었고."
10095-100950240 = "정말요?!"
10095-100950250 = "감사합니다!"
10095-100950260 = "저, 기대하고 있어도…… 되는 거죠?"
10095-100950270 = "주인님, 계세요?"
10095-100950280 = "그거 아니야!"
10095-100950290 = "아, 죄송해요. 선생님."
10095-100950300 = "슬슬 이쪽 호칭이 입에 붙고 있는 것 같네요……."
10095-100950310 = "괜찮은가, 나는…… 교육자로서 괜찮은가……."
10095-100950320 = "괘, 괜찮을 거예요!"
10095-100950330 = "……아마도요."
10095-100950340 = "그러면, 주인님."
10095-100950350 = "아니, 선생님."
10095-100950360 = "오늘도…… 와 주실 거죠?"
10095-100950370 = "선생님?"
10095-100950380 = "계신가요……?"
10095-100950390 = "일러스트 작업은 잘 돼?"
10095-100950400 = "네?"
10095-100950410 = "네."
10095-100950420 = "덕분에요."
10095-100950430 = "그보다, 저기, 혹시 괜찮으시다면……."
10095-100950440 = "그 사진 말인데요……."
10095-100950450 = "응? 원본 없어졌어? 공유해 줄까?"
10095-100950460 = "아뇨! 그건 아니에요."
10095-100950470 = "단지……."
10095-100950480 = "그, 정말로 선생님께서 괜찮으시다면, 이지만요."
10095-100950490 = "가능하면 오래…… 가지고 있어 주셨으면 해요."
10095-100950500 = "네. 오랫동안이요."

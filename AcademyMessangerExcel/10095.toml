[translation]
10095-100950010 = "สวัสดีค่ะ คุณครู"
10095-100950020 = "วันนี้คุณครูก็... งานยุ่งมั้ยคะ?"
10095-100950030 = "จะว่ายุ่งก็ได้นะ..."
10095-100950040 = "ครูน่าจะยุ่งกับงานของมิลเลเนียมน่ะ"
10095-100950050 = "คะ? คุณครูมีธุระ "
10095-100950060 = "ต้องมาที่โรงเรียนของเราเหรอคะ?"
10095-100950070 = "ใช่ ครูต้องไปที่นั่น"
10095-100950080 = "ยะ... อย่างนั้นสินะคะ..."
10095-100950090 = "เอ่อ... คุณครูคะ"
10095-100950100 = "ถ้าคุณครูไม่ว่าอะไร..."
10095-100950110 = "ถ้าเกิดว่าคุณครูมีเวลาเหลือจากงาน..."
10095-100950120 = "ฉันอยากให้คุณครู"
10095-100950130 = "แวะมาที่ห้องชมรมของเราหน่อยค่ะ"
10095-100950140 = "คือว่า คุณครูคะ?"
10095-100950150 = "ข้อมูลนิทรรศการที่ส่งมา..."
10095-100950160 = "อื้ม จะมีนิทรรศการเครื่องแต่งกาย\nโบราณน่ะ"
10095-100950170 = "ครูส่งให้เพราะคิดว่าน่าจะ\nเป็นประโยชน์กับมิโดริ"
10095-100950180 = "ขอบคุณค่ะ!"
10095-100950190 = "คือ... ขอถามเผื่อๆ ไว้นะคะ"
10095-100950200 = "แค่สมมตินะคะ..."
10095-100950210 = "คุณครูไปนิทรรศการนี้..."
10095-100950220 = "ด้วยกันกับฉัน... จะได้หรือเปล่าคะ...?"
10095-100950230 = "ได้สิ ครูมีตั๋ว 2 ใบพอดี"
10095-100950240 = "จริงเหรอคะ?!"
10095-100950250 = "ขอบคุณค่ะ!"
10095-100950260 = "ฉัน... ตั้งตารอ... ได้ใช่มั้ยคะ?"
10095-100950270 = "นายท่าน อยู่มั้ยคะ?"
10095-100950280 = "เรียกผิดแล้ว"
10095-100950290 = "อ่า ขอโทษด้วยค่ะ คุณครู"
10095-100950300 = "ฉันคงเริ่มชินกับคำเรียกแบบนี้น่ะค่ะ..."
10095-100950310 = "จะไม่เป็นไรเหรอ... ครูเป็นครูนะ..."
10095-100950320 = "มะ... ไม่เป็นไรหรอกค่ะ!"
10095-100950330 = "น่าจะนะคะ..."
10095-100950340 = "ถ้างั้น นายท่าน"
10095-100950350 = "ไม่สิ คุณครูคะ"
10095-100950360 = "วันนี้... ก็จะมาหากันใช่มั้ยคะ?"
10095-100950370 = "คุณครู?"
10095-100950380 = "อยู่มั้ยคะ...?"
10095-100950390 = "งานวาดภาพเป็นยังไงบ้าง?"
10095-100950400 = "คะ?"
10095-100950410 = "ค่ะ"
10095-100950420 = "ต้องขอบคุณคุณครูเลยค่ะ"
10095-100950430 = "แต่ว่าถ้าคุณครูไม่ติดอะไร..."
10095-100950440 = "รูปนั้นน่ะค่ะ..."
10095-100950450 = "หืม? รูปต้นฉบับหายไปเหรอ?\nครูส่งให้มั้ย?"
10095-100950460 = "ไม่ค่ะ! ไม่ใช่อย่างนั้นค่ะ "
10095-100950470 = "เพียงแต่ว่า..."
10095-100950480 = "เอ่อ... ถ้าคุณครูสะดวกละก็"
10095-100950490 = "ถ้าเป็นไปได้... ฉันอยากให้คุณครู\nเก็บไว้นานๆ น่ะค่ะ"
10095-100950500 = "ค่ะ เก็บไว้นานๆ เลย"

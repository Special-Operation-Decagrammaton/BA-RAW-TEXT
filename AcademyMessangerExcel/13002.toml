[translation]
13002-1223 = "ฉันสงสัยจริงๆ ว่าทำไมร้านข้าวหน้า\nเนื้อถึงไม่ขายชามใหญ่กว่าขนาดคิงไซซ์\nกันนะ?"
13002-1224 = "คิงไซซ์ นี่ยังใหญ่ไม่พออีกเหรอ?"
13002-1225 = "ไม่ได้นะคะ! แค่ชามคิงไซซ์ชามเดียว\nฉันยังไม่อิ่มหรอกค่ะ"
13002-1226 = "แล้วอาคาริกินเยอะขนาดนั้นเลยเหรอ?"
13002-1227 = "ฮุฮุ ถามอะไรแบบนั้นล่ะคะ เหตุผลที่ฉัน\nกินอาหารเยอะๆ ก็ง่ายนิดเดียวค่ะ"
13002-1228 = "นั่นก็คือ... เพราะมันมีอาหารอยู่ไงล่ะคะ!"
13002-1229 = "เวลาที่คุณครูกินราเม็ง เริ่มกินจากเส้น\nหรือว่าเริ่มซดน้ำซุปก่อนคะ?"
13002-1230 = "กินเส้นก่อนสิ"
13002-1231 = "ต้องซดน้ำซุปก่อนอยู่แล้ว"
13002-1232 = "คุณครูเป็นพวกเน้นกินเส้นก่อนสินะคะ"
13002-1233 = "คุณครูเป็นพวกใส่ใจเรื่องรสชาติน้ำซุป\nสินะคะ"
13002-1234 = "ฉันเองก็เป็นพวกชอบชิมน้ำซุปก่อนค่ะ"
13002-1235 = "เพราะน้ำซุปที่เข้มข้นคือศูนย์รวมแก่นแท้\nของราเม็งเอาไว้ยังไงล่ะคะ"
13002-1236 = "แต่ถ้าจะใส่กระเทียมเพื่อเพิ่มรสเข้มข้นล่ะ\nก็... ฉันยอมไม่ได้เด็ดขาดค่ะ!"
13002-1237 = "ดูเหมือนจะชอบอะไรเหมือนตาลุงแก่ๆ เลยนะ..."
13002-1238 = "ฉันว่าวัฒนธรรมบุฟเฟต์เป็นสิ่งที่ยอด\nมากๆ เลยนะคะ"
13002-1239 = "เพราะเราจะกินได้เท่าที่ต้องการโดยที่ไม่\nต้องสนใจเรื่องราคา..."
13002-1240 = "คนที่คิดค้นเรื่องบุฟเฟต์ขึ้นมาต้องเป็น\nอัจฉริยะแน่ๆ เลยค่ะ!"
13002-1241 = "ร้านบุฟเฟต์ที่อาคาริไป เจ้าของร้าน\nอาจเป็นอัจฉริยะก็จริงนะแต่ว่า..."
13002-1242 = "ดูเหมือนว่าหัวข้อแข่งขันของงานแข่งกิน\nจุครั้งต่อไปจะเป็น \"แข่งกินแกงกะหรี่\" ค่ะ"
13002-1243 = "อาคาริไม่ค่อยมั่นใจเท่าไรเลย... คงจะ\nต้องฝึกไว้ล่วงหน้าซะแล้ว"
13002-1244 = "อาคาริมีอาหารที่ไม่ชอบกินรึเปล่า?"
13002-1245 = "ไม่ถึงกับกินไม่ได้ แต่ว่ากินได้น้อยมาก\nกว่าค่ะ"
13002-1246 = "อย่างเช่น อาหารที่มีรสเผ็ดร้อนเหมือน\nแกงกะหรี่ที่พูดถึงเมื่อกี้นี้ มันทำให้ต้อง\nกินน้ำอยู่บ่อยๆ เลยอาจจะทำให้อิ่มเร็วค่ะ"
13002-1247 = "แต่ถ้าเป็นอาหารที่ฉันชอบกินอย่างพวก\nซูชิล่ะก็... ฉันจะกินได้มากกว่าอาหาร\nอย่างอื่นสองเท่าเลยค่ะ"
13002-1248 = "ฉันเป็นนักกินตัวยง เพราะงั้นจะมาเลือก\nว่าชอบหรือไม่ชอบไม่ได้หรอกนะคะ!"

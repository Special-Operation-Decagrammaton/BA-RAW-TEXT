[translation]
13002-1223 = "문득 궁금해졌는데, 규동 가게에서는 어째서 킹 사이즈보다 큰 규동을 팔지 않는 걸까요?"
13002-1224 = "킹 사이즈 정도면 충분히 크지 않아?"
13002-1225 = "안 돼요. 킹 사이즈 한 그릇으로는 배가 충분히 차지 않는다고요."
13002-1226 = "아카리는 어째서 그렇게 한 번에 많은 음식을 먹는 거야?"
13002-1227 = "후후, 우문이군요. 제가 한 번에 많은 음식을 먹는 이유는 간단하답니다."
13002-1228 = "그 이유는…… 그곳에 음식이 있으니까!"
13002-1229 = "선생님은 어떤 라멘을 드실 때 면부터 드시나요, 아니면 국물부터 드시나요?"
13002-1230 = "면부터 먹어."
13002-1231 = "국물부터 마셔."
13002-1232 = "선생님은 라멘의 면발을 중시하는 편이시군요."
13002-1233 = "선생님은 라멘의 국물을 중시하는 편이시군요."
13002-1234 = "저는 국물부터 마시는 걸 선호해요."
13002-1235 = "진한 국물이야말로 라멘의 맛이 모두 담긴 정수라 할 수 있으니까요."
13002-1236 = "거기에 으깬 마늘의 알싸한 맛을 더하면…… 정말 참을 수가 없어요!"
13002-1237 = "어쩐지 아저씨 같은 취향인걸……."
13002-1238 = "무한리필은 정말 멋진 문화인 것 같아요."
13002-1239 = "가격에 구애받지 않고 원하는 음식을 원하는 만큼 먹을 수 있다니……."
13002-1240 = "이 아이디어를 낸 사람은 천재(天才)일 게 분명해요!"
13002-1241 = "어제 아카리가 방문한 무한리필 가게 주인으로서는 천재(天災)였겠지만……."
13002-1242 = "다음 대식 대회의 대결 종목은 <카레 많이 먹기>로 정해진 모양이에요."
13002-1243 = "카레는 조금 자신 없는데…… 미리 연습을 해두어야겠어요."
13002-1244 = "아카리도 가리는 음식이 있어?"
13002-1245 = "못 먹는 건 아니지만 많이 먹기 힘든 음식은 있어요."
13002-1246 = "예를 들자면 아까 말했던 카레처럼 매운 음식은 자꾸 물을 마시게 되어서 배가 빨리 차거든요."
13002-1247 = "대신 초밥처럼 개인적으로 좋아하는 음식은 다른 음식보다 두 배는 더 먹을 수 있어요."
13002-1248 = "대식가라고 해서 기호가 없는 건 아니랍니다!"

[translation]
13002-1223 = "為什麼不賣比特盛更大的牛丼呢？"
13002-1224 = "特盛還不夠大……？"
13002-1225 = "不夠，一碗特盛吃不飽"
13002-1226 = "為什麼亞伽里能吃那麼多？"
13002-1227 = "呵呵，真是愚蠢的問題。我吃很多的理由很簡單"
13002-1228 = "因為……食物在那裡！"
13002-1229 = "老師吃拉麵的時候，是先吃麵嗎？還是先喝湯？"
13002-1230 = "麵吧"
13002-1231 = "湯吧"
13002-1232 = "原來如此，這樣啊"
13002-1233 = "原來如此，這樣啊"
13002-1234 = "我個人會選擇湯"
13002-1235 = "說湯是充滿了拉麵的全部精華也不為過"
13002-1236 = "在裡面加入搗碎的大蒜的日子……啊啊，多麼美妙啊！"
13002-1237 = "總覺得像是大叔一樣的喜好啊……"
13002-1238 = "我覺得吃到飽真的是很棒的文化"
13002-1239 = "以一定的價格，想吃什麼就吃什麼……"
13002-1240 = "提出這個想法的人，一定是天才！"
13002-1241 = "對於迎接亞伽里為客人的那一方來說，是天災吧……"
13002-1242 = "聽說下次的大胃王大賽項目是「咖哩」"
13002-1243 = "咖哩……有點沒自信呢，需要提前特訓"
13002-1244 = "亞伽里也有不喜歡的食物嗎？"
13002-1245 = "是能吃，但吃大量的話……有些東西沒辦法"
13002-1246 = "比如咖哩的話，中途會喝好幾次水……"
13002-1247 = "相反地，壽司之類的，因為有我喜歡的東西，所以能吃到其他的兩倍左右"
13002-1248 = "雖然食量很大，但也不是沒有喜好的"

[translation]
10088-100880010 = "뭐랄까"
10088-100880020 = "예상은 했지만 사람 많은 곳은 피곤하네."
10088-100880030 = "일단 해야 할 일은 다 했고……."
10088-100880040 = "잠시 쉬어야겠어."
10088-100880050 = "카요코? 쉰다고?"
10088-100880060 = "어디 좋은 장소라도 있어?"
10088-100880070 = "후후"
10088-100880080 = "선생도 지친 모양이네."
10088-100880090 = "뭐"
10088-100880100 = "마침 잘 됐나."
10088-100880110 = "선생"
10088-100880120 = "혹시나 해서 하는 말인데"
10088-100880130 = "필요하면 또 말해"
10088-100880140 = "누구한테 말할 생각 없으니 걱정 마"
10088-100880150 = "응"
10088-100880160 = "고마워."
10088-100880170 = "선생"
10088-100880180 = "사무실에 들를 일이 있다고 들었는데"
10088-100880190 = "응. 무슨 일 있어?"
10088-100880200 = "아니."
10088-100880210 = "그냥 그 시간대에는 사무실에 사람이 딱히 없을 거라"
10088-100880220 = "아마 내가 맞이하게 될 거 같아서."
10088-100880230 = "그럼 그때 봐, 선생."
10088-100880240 = "선생"
10088-100880250 = "혹시 나중에라도 시간 좀 괜찮을까?"
10088-100880260 = "카요코?"
10088-100880270 = "응? 무슨 일이야?"
10088-100880280 = "아니"
10088-100880290 = "대단한 일은 아니고."
10088-100880300 = "이전에 받은 일에 대한 답례 같은 건데."
10088-100880310 = "아무튼 괜찮은 날이 있으면 언제든 말해줘."
10088-100880320 = "나머지는 이쪽에서 맞출 테니까."
10088-100880330 = "아"
10088-100880340 = "한 가지 잊고 말하지 않은 게 있어"
10088-100880350 = "음"
10088-100880360 = "……카요코?"
10088-100880370 = "말하지 않은 거?"
10088-100880380 = "음"
10088-100880390 = "아냐"
10088-100880400 = "역시 지금은 됐어."
10088-100880410 = "나중에"
10088-100880420 = "따로 기회가 되면 이야기하지, 뭐."
10088-100880430 = "그럼"
10088-100880440 = "조심해서 돌아가, 선생."

[translation]
10088-100880010 = "Well..."
10088-100880020 = "I knew crowds were exhausting. And I was right."
10088-100880030 = "I'm done for the day."
10088-100880040 = "I need a break."
10088-100880050 = "Catching your breath?"
10088-100880060 = "Where are you thinking of relaxing?"
10088-100880070 = "Heehee."
10088-100880080 = "Even someone like you gets tired too."
10088-100880090 = "Well..."
10088-100880100 = "Maybe it's for the best."
10088-100880110 = "Sensei."
10088-100880120 = "Maybe I don't need to say it but..."
10088-100880130 = "If you need anything else, let me know."
10088-100880140 = "Don't worry. I'll carry this to my grave."
10088-100880150 = "Great,"
10088-100880160 = "thanks."
10088-100880170 = "Sensei."
10088-100880180 = "I heard you had business at our office."
10088-100880190 = "Yeah. Is something wrong?"
10088-100880200 = "No."
10088-100880210 = "I figured the office would be empty by now."
10088-100880220 = "Looks like I'm the welcome wagon."
10088-100880230 = "See you soon, Sensei."
10088-100880240 = "Sensei."
10088-100880250 = "Any chance you're free later?"
10088-100880260 = "Oh, Kayoko."
10088-100880270 = "What is it?"
10088-100880280 = "Well,"
10088-100880290 = "it's nothing serious..."
10088-100880300 = "Just my way of saying thanks for earlier."
10088-100880310 = "Anyway, let me know when you're free."
10088-100880320 = "I'll handle the rest."
10088-100880330 = "Oh"
10088-100880340 = "there's something I forgot to tell you."
10088-100880350 = "Um"
10088-100880360 = "...Kayoko?"
10088-100880370 = "What did you forget? Do you need me to find it?"
10088-100880380 = "Um"
10088-100880390 = "No."
10088-100880400 = "It's fine."
10088-100880410 = "We can talk later..."
10088-100880420 = "I'll tell you then."
10088-100880430 = "Well then"
10088-100880440 = "have a safe walk back, Sensei."

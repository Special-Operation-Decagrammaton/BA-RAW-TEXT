[translation]
10088-100880010 = "จะว่ายังไงดีนะ"
10088-100880020 = "ฉันกะไว้แล้วละ แต่ที่ที่คนเยอะๆ มันทำ\nให้ฉันเหนื่อยจัง"
10088-100880030 = "ทำสิ่งที่ต้องทำวันนี้หมดแล้ว..."
10088-100880040 = "คงต้องไปพักสักหน่อย"
10088-100880050 = "คาโยโกะ? จะไปพักเหรอ?"
10088-100880060 = "มีที่ไหนดีๆ บ้างมั้ย?"
10088-100880070 = "ฮุฮุ"
10088-100880080 = "เหมือนครูก็จะเหนื่อยมาเหมือนกันแฮะ"
10088-100880090 = "งั้นก็"
10088-100880100 = "ถือว่าได้จังหวะเลย"
10088-100880110 = "ครู"
10088-100880120 = "ฉันแค่พูดไว้เผื่อๆ นะ"
10088-100880130 = "ถ้าต้องการอะไรก็บอกล่ะ"
10088-100880140 = "ครูไม่ไปบอกใครหรอก ไม่ต้องห่วง"
10088-100880150 = "อื้ม"
10088-100880160 = "ขอบใจนะ"
10088-100880170 = "ครู"
10088-100880180 = "ได้ยินว่ามีธุระก็เลยจะเข้ามาที่\nสำนักงานเหรอ?"
10088-100880190 = "อื้ม มีอะไรเหรอ?"
10088-100880200 = "ไม่หรอก"
10088-100880210 = "ก็แค่ตอนนั้นไม่น่ามีใครอยู่ที่สำนักงาน"
10088-100880220 = "ฉันเลยคิดว่าคงไปต้อนรับได้"
10088-100880230 = "งั้นเจอกันตอนนั้นนะครู"
10088-100880240 = "ครู"
10088-100880250 = "หลังจากนี้พอมีเวลาบ้างมั้ย?"
10088-100880260 = "คาโยโกะ?"
10088-100880270 = "หืม? มีเรื่องอะไรเหรอ?"
10088-100880280 = "เปล่าหรอก"
10088-100880290 = "ไม่ใช่เรื่องใหญ่อะไร"
10088-100880300 = "ฉันอยากตอบแทนเรื่องที่เคยช่วยไว้\nคราวก่อน"
10088-100880310 = "เอาเป็นว่าวันไหนว่างก็บอกหน่อยนะ"
10088-100880320 = "แล้วฉันจะหาเวลาให้ตรงกันเอง"
10088-100880330 = "อ๊ะ"
10088-100880340 = "ฉันลืมบอกอะไรไปหนึ่งอย่าง"
10088-100880350 = "อืม"
10088-100880360 = "คาโยโกะ?"
10088-100880370 = "ลืมบอกอะไรเหรอ?"
10088-100880380 = "อืม"
10088-100880390 = "ไม่หรอก"
10088-100880400 = "ตอนนี้ไม่เป็นไรแล้วละ"
10088-100880410 = "เอาไว้คราวหน้า"
10088-100880420 = "ถ้ามีโอกาสฉันค่อยบอกแล้วกัน"
10088-100880430 = "ถ้างั้นก็"
10088-100880440 = "กลับดีๆ นะครู"

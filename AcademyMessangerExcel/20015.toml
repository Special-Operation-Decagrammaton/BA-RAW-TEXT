[translation]
20015-200150010 = "아앗~! 또야~! 또…! 선생님!"
20015-200150020 = "응? 또라니? 뭐가?"
20015-200150030 = "이번에 또 '너희 수행부, 역시 조금 이상하네.' 라는 소리를 들어버렸어!"
20015-200150040 = "뭐?! 그거참 실례되는 소리네!"
20015-200150050 = "그치? 그렇지? 선생님도 그렇게 생각하지?!"
20015-200150060 = "놀이터에서 결정 대사를 연습하고 있을 뿐이었는데 갑자기 그런 말을 하다니! 너무해!"
20015-200150070 = "…응? 근데, 잠깐. 카에데? "
20015-200150080 = "저기…. 결정 대사라니, 그게 무슨 뜻이야…?"
20015-200150090 = "응? 결정 대사는 결정 대사인데?"
20015-200150100 = "우리 수행부가 나쁜 문제아들을 쓰러트릴 때 하는 대사야!"
20015-200150110 = "까먹지 않도록 평소에도 열심히 연습하고 있어."
20015-200150120 = "참고로 내 대사는 '알록달록한 단풍의 이름으로 널 용서하지 않겠다!' 인데 말이야~"
20015-200150130 = "최근 마이붐이니까. 특별히 선생님도 써도 된다구?"
20015-200150140 = "참고로 포즈는 이렇게 얍! 하는 건데…. 아, 영상으로 보여줄게. 잠깐만-"
20015-200150150 = "으, 응…. 그렇구나. 그, 응원할게."
20015-200150160 = "앗! 응원 고마워! 선생님! "
20015-200150170 = "보답으로 귀여운 스티커 보내 줄게!"
20015-200150180 = "아, 고, 고마워."
20015-200150190 = "하여간! 이대로 있으면 안 돼! 뭔가 특단의 조치가 필요한 시점일지도?!"
20015-200150200 = "그래서 선생님, 부탁이 있어!"
20015-200150210 = "선생님, 오늘도 멋진 레이디가 되기 위해 노력할게!"
20015-200150220 = "응, 오늘도 힘내."
20015-200150230 = "하지만 멋진 레이디로 향하는 길은 역시 엄청 어려워……."
20015-200150240 = "얼마나 어렵냐면………"
20015-200150250 = "여름방학에 아침체조 카드를 전부 도장으로 채우는 것보다 더 어려울지도 몰라!"
20015-200150260 = "그건……. 확실히 어렵네!"
20015-200150270 = "그치? 그래서 어쩌면 좋을까, 어어어엄청 고민하던 차에……! "
20015-200150280 = "나 마침 좋은 걸 발견했거든!"
20015-200150290 = "이거 세기의 대발견일지도 몰라! 이 엄청난 발견은 직접 만나서 말해줄게! "
20015-200150300 = "부실에서 보자! 선생님!"
20015-200150310 = "얏-호! 선생님선생님!"
20015-200150320 = "뭐 하고 있어? 오늘 놀러…가 아니라."
20015-200150330 = "멋진 레이디가 되기 위한 수행! 나, 하러 가도 돼?"
20015-200150340 = "미안, 카에데. 오늘은 일 때문에 조금 바빠서…."
20015-200150350 = "어? 오늘도 일하는 거야? 선생님은 보면 맨날 일만 하는 거 같아!"
20015-200150360 = "선생님은 일이 그렇게 좋아?"
20015-200150370 = "그, 글쎄. 어떠려나……."
20015-200150380 = "서류 작업 자체는 좋아하지 않습니다……."
20015-200150390 = "으음~ 그러면…. 아, 맞아! 나 들은 적 있어!"
20015-200150400 = "어른은 가끔 하기 싫은 일도 꾸역꾸역해야만 할 때가 있다고…. "
20015-200150410 = "핫?! 어른이란 정말 힘든 거구나!"
20015-200150420 = "어라, 근데…. 선생님을 보고 있으면 가끔이 아닌 거 같은데…."
20015-200150430 = "큭! 아무렇지도 않게 날아오는 비수가 아파!"
20015-200150440 = "으음, 잘은 모르겠지만. "
20015-200150450 = "…아! 좋은 생각이 났다!"
20015-200150460 = "응? 카에데?"
20015-200150470 = "후후후, 좋았어! 기다려줘! 선생님!"
20015-200150480 = "오늘은 선생님을 방해하지 않고, 착실하게 돕는 카에데 모드로 변신할 테니까!"
20015-200150490 = "그럼 이따가 봐!"
20015-200150500 = "응? 카에데?"
20015-200150510 = "선생님선생님! 헬프! 헬프!"
20015-200150520 = "가면 드라이버의 필살기! 이머전시 드라이브 킥이야!"
20015-200150530 = "이, 이머전시…. 뭐?"
20015-200150540 = "무슨 일이야, 카에데? 뭔가 큰일이라도 난 거야?!"
20015-200150550 = "응…? 큰일…?"
20015-200150560 = "아…! 응! 맞아! 선생님 말대로……. 이건 어마어마하게 큰일인 걸지도?!"
20015-200150570 = "혹시 카에데, 어딘가 크게 다쳤다던가?!"
20015-200150580 = "응? 나? 난 괜찮은데? 완전 쌩쌩한데? 아침밥도 1등으로 먹었다구?"
20015-200150590 = "그~보다 중요한 건 그런 게 아니야~! 선생님!"
20015-200150600 = "하지만 방금 분명 카에데가 이머전시라고…."
20015-200150610 = "아~ 이머전시라는 건 말이지. 그러니까 그게 말이야~!"
20015-200150620 = "…핫?! 아냐아냐! 이런 어마어마한 소식을 그냥 모모톡으로만 전해선 안 돼!"
20015-200150630 = "어디서 누가, 이 모모톡을 염탐하고 있을지도 모르고!"
20015-200150640 = "아니, 없지. 그런 일."
20015-200150650 = "어쨌거나 용건은 직접 만나서 전하는 게 좋을지도?!"
20015-200150660 = "나! 놀이터에서 기다리고 있을게! 얼른 와! 선생님!"
20015-200150670 = "선생님선생님선생님!"
20015-200150680 = "드디어, 드디어 나온대! "
20015-200150690 = "그러니까 같이 가자!"
20015-200150700 = "무슨 일이야, 카에데? 뭐가 나온다는 거야?"
20015-200150710 = "어…… 응……?"
20015-200150720 = "아, 그렇구나! 맞아, 선생님은 모르겠지!"
20015-200150730 = "그러니까, 무시퀸 팝업 스토어가 열린다고 해!"
20015-200150740 = "아, 무시퀸 이야기였구나."
20015-200150750 = "갑자기 뭔가 반응이 차가워진 것 같은데?!"
20015-200150760 = "후후후…… 하지만 이 소식을 들으면"
20015-200150770 = "선생님도 불타오를 수밖에 없을걸?!"
20015-200150780 = "이번에 그 팝업 스토어에서……."
20015-200150790 = "무시퀸 카드 프로텍터 한정판을 팔 거래!"
20015-200150800 = "어? 그, 그래……?"
20015-200150810 = "역시 놀란 나머지 제대로 반응도 못 하고 있구나!"
20015-200150820 = "걱정하지 마, 내가 전부 어떻게든 해 줄 테니까!"
20015-200150830 = "그러면, 선생님! 쇼핑센터에서 만나!"
20015-200150840 = "위치는 내가 전송해 줄게!"
20015-200150850 = "선생님?"
20015-200150860 = "잘 들어갔어?"
20015-200150870 = "카에데야말로, 잘 들어갔어?"
20015-200150880 = "응! 물론이지!"
20015-200150890 = "아아, 이 프로텍터를 이렇게 무사히 구하게 되다니……!"
20015-200150900 = "그러면 이제부터 그 프로텍터를 사용해서"
20015-200150910 = "카에데의 카드를 보호할 수 있겠구나."
20015-200150920 = "응? 무슨 말이야. 선생님."
20015-200150930 = "프로텍터 자체도 소모품이니까, "
20015-200150940 = "오래 쓰면 당연히 낡고 상한다고."
20015-200150950 = "그러니까 이 위에 투명 프로텍터를 덧씌워서"
20015-200150960 = "프로텍터까지 보호하면서 플레이해야지!"
20015-200150970 = "프로텍터에…… 프로텍터를 씌운다고……?!"
20015-200150980 = "응! 상식인걸?"
20015-200150990 = "배틀리스트의 세계는…… 깊구나……."
20015-200151000 = "그런가……?"

[translation]
20015-200150010 = "老師～！又來了～！！"
20015-200150020 = "又？"
20015-200150030 = "我又聽到有人在說：「修行部有點奇怪」！"
20015-200150040 = "什麼！這真是失禮！"
20015-200150050 = "對吧？老師也這麼想吧？"
20015-200150060 = "我只是在公園練習定場台詞而已呀！"
20015-200150070 = "……嗯？"
20015-200150080 = "定場台詞……？"
20015-200150090 = "定場台詞怎麼了嗎？"
20015-200150100 = "啊，我指的當然是，我們修行部打倒問題學生時要說的台詞！"
20015-200150110 = "為了能在關鍵時刻帥氣說出來，當然要努力練習"
20015-200150120 = "順帶一提，我的台詞是：「我要代替楓葉突襲你！」"
20015-200150130 = "我可以特別讓老師用唷？"
20015-200150140 = "順帶一提姿勢是～啊，這得拍影片才行，等我一下"
20015-200150150 = "不、不用麻煩。總之我會替你加油"
20015-200150160 = "嗯，謝謝老師！"
20015-200150170 = "我要送老師可愛的貼紙當作獎勵！"
20015-200150180 = "謝，謝謝"
20015-200150190 = "總之為了不再讓人說我們「怪」，必須要想個對策才行"
20015-200150200 = "所以老師，我有個請求！"
20015-200150210 = "老師，今天我也會努力成為一名「完美淑女」！"
20015-200150220 = "嗯，今天也加油"
20015-200150230 = "不過要成為完美淑女還真是不容易……"
20015-200150240 = "要說有多困難……"
20015-200150250 = "這就跟暑假時，要每天都在「廣播體操卡」上面蓋章一樣難！"
20015-200150260 = "這的確很難！"
20015-200150270 = "就是啊，所以我很煩惱該到底該怎麼辦……"
20015-200150280 = "並想到了一個好主意！"
20015-200150290 = "甚至可說是個「世紀大發現」唷！"
20015-200150300 = "我想當面跟老師說，快點來修行部社辦吧！"
20015-200150310 = "呀呼！老師！"
20015-200150320 = "我今天也要去玩……"
20015-200150330 = "不是，是要進行成為完美淑女的修行，請問我可以去夏萊嗎？"
20015-200150340 = "抱歉，楓。今天工作有點忙……"
20015-200150350 = "咦，老師總是在工作！"
20015-200150360 = "老師這麼喜歡工作嗎？"
20015-200150370 = "也，也沒有啊……"
20015-200150380 = "我並沒有那麼喜歡文書作業……"
20015-200150390 = "嗯……？啊，我記得之前有聽過"
20015-200150400 = "大人有時候就是必須做一些不想做的事……"
20015-200150410 = "嗯～大人還真是辛苦呢"
20015-200150420 = "可是感覺老師已經不是「有時候」的程度了"
20015-200150430 = "嗚，實在無法反駁……！"
20015-200150440 = "總而言之呢──"
20015-200150450 = "啊！我想到一個好辦法了！"
20015-200150460 = "好辦法？"
20015-200150470 = "等等我！老師！"
20015-200150480 = "我今天會是「認真幫忙模式」！"
20015-200150490 = "那麼，等一下見！"
20015-200150500 = "？？？"
20015-200150510 = "老師！緊急情況！！"
20015-200150520 = "而所謂的緊急情況，就是假面的士的必殺技「緊急駕駛飛踢」！"
20015-200150530 = "……什麼東西？"
20015-200150540 = "所以是有發生什麼大事嗎？"
20015-200150550 = "嗯……該怎麼說明呢……"
20015-200150560 = "反正事情就是很大條了！"
20015-200150570 = "還好嗎？有受傷嗎？"
20015-200150580 = "我完全沒事！剛剛吃早餐我還有多添幾碗！"
20015-200150590 = "反正重點不在那裡啦！"
20015-200150600 = "……？"
20015-200150610 = "總之就是有緊急狀況！"
20015-200150620 = "這種等級的緊急狀況，可不能用MomoTalk告訴你！"
20015-200150630 = "畢竟可能會有人偷看到這則MomoTalk！"
20015-200150640 = "我想這應該不用擔心啦……"
20015-200150650 = "總之我們直接見面再說吧！"
20015-200150660 = "我會在公園等你！"
20015-200150670 = "老師老師老師！"
20015-200150680 = "終於，終於出現了！"
20015-200150690 = "我們一起去吧！"
20015-200150700 = "怎麼了嗎，楓？什麼東西出現了？"
20015-200150710 = "喔……嗯……？"
20015-200150720 = "啊，原來如此！老師應該不知道！"
20015-200150730 = "我指的是甲蟲皇后快閃店要開幕了！"
20015-200150740 = "啊，原來是甲蟲皇后啊"
20015-200150750 = "老師的反應怎麼好像突然變冷淡了！？"
20015-200150760 = "哼哼哼……不過聽到這個消息之後"
20015-200150770 = "老師也會熱血起來吧！？"
20015-200150780 = "聽說這次那家快閃店……"
20015-200150790 = "會賣甲蟲皇后的限定版卡片保護套！"
20015-200150800 = "嗯？是，是嗎……？"
20015-200150810 = "看來太過驚嚇果然是做不出反應的呢！"
20015-200150820 = "別擔心，我會想辦法幫忙的！"
20015-200150830 = "那麼老師！我們購物中心見囉！"
20015-200150840 = "我會把位置傳給你！"
20015-200150850 = "老師？"
20015-200150860 = "平安到家了嗎？"
20015-200150870 = "平安到家囉，楓呢？"
20015-200150880 = "嗯！我也是！"
20015-200150890 = "啊啊，居然能順利買到這個保護套……！"
20015-200150900 = "之後就可以用那個保護套"
20015-200150910 = "保護楓的卡片了呢"
20015-200150920 = "嗯？為什麼這麼說呢？老師"
20015-200150930 = "保護套本身也是消耗品"
20015-200150940 = "用久了自然會老舊損壞"
20015-200150950 = "所以要在外面再套一層透明保護套"
20015-200150960 = "進行遊戲時，連保護套都要好好保護！"
20015-200150970 = "在保護套外面……再套一層保護套……！？"
20015-200150980 = "嗯！這是常識吧？"
20015-200150990 = "戰士的世界……好深奧……"
20015-200151000 = "會嗎……？"

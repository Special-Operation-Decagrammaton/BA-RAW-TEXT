[translation]
20015-200150010 = "อ๊ายยยย~ อีกแล้วเหรอ~! อีกแล้ว... คุณครู!"
20015-200150020 = "หืม? \"อีกแล้ว\" งั้นเหรอ? อะไรล่ะ?"
20015-200150030 = "คราวนี้โดนว่า \"ชมรมฝึกฝนของพวกเธอนี่\nแปลกจริงๆ เลยนะ\" อีกแล้วงะ!"
20015-200150040 = "ว่าไงนะ?! แบบนั้นมันเสียมารยาทนะ!"
20015-200150050 = "ใช่มั้ยล่ะ? คุณครูเองก็คิดแบบนั้นใช่มั้ย?!"
20015-200150060 = "ฉันแค่ไปซ้อมบทพูดตัดสินที่สนามเด็ก\nเล่นเอง แต่จู่ๆ กลับพูดแบบนั้นออกมา\nแย่จริงๆ เลย!"
20015-200150070 = "หืม? เดี๋ยวก่อนนะ คาเอเดะ? "
20015-200150080 = "บทพูดตัดสินหมายถึงอะไรเหรอ...?"
20015-200150090 = "หืม? บทพูดตัดสินก็คือบทพูดตัดสินใจไงล่ะ"
20015-200150100 = "บทพูดที่ชมรมฝึกฝนของเราจะพูดเวลา\nซัดพวกเด็กเกเรให้หมอบยังไงล่ะ!"
20015-200150110 = "ฉันหมั่นฝึกซ้อมเป็นประจำเพื่อไม่ให้ลืมบท\nพูดเลยนะ"
20015-200150120 = "อ๋อ บอกไว้ก่อนบทพูดของฉันคือ \"ในนาม\nตัวแทนของใบไม้ร่วงหลากสีสัน ฉันจะไม่\nยกโทษให้เด็ดขาด!\" น่ะ"
20015-200150130 = "ช่วงนี้ฮิตคำพูดแบบนี้กันมากเลย คุณครูจะ\nเอาไปใช้ก็ได้นะ"
20015-200150140 = "ส่วนท่าโพสต์...ก็ทำท่า \"ย้าา!\" แบบนี้เดี๋ยว\nเอาวิดีโอให้ดูนะ..."
20015-200150150 = "อะ...อืม งี้นี่เอง ครูเป็นกำลังใจให้แล้ว\nกันนะ"
20015-200150160 = "อ๊ะ ขอบคุณสำหรับกำลังใจนะ คุณครู!"
20015-200150170 = "เดี๋ยวจะให้สติกเกอร์น่ารักๆ เป็นการขอบ\nคุณนะ!"
20015-200150180 = "อ่า ขะ... ขอบใจนะ..."
20015-200150190 = "แต่ยังไงก็จะปล่อยไว้แบบนี้ไม่ได้! คงได้\nเวลาสำหรับการตอบโต้แบบพิเศษแล้ว!"
20015-200150200 = "เพราะงั้นฉันเลยอยากขอร้องคุณครูหน่อย!"
20015-200150210 = "คุณครู วันนี้ฉันจะพยายามเพื่อเป็นเลดี้ที่\nเพียบพร้อมนะ!"
20015-200150220 = "อื้อ วันนี้ก็สู้ๆ นะ"
20015-200150230 = "แต่ว่าเส้นทางสู่การเป็นเลดี้ที่เพียบพร้อม\nมันยากมากเลย..."
20015-200150240 = "ถ้าจะถามว่ายากแค่ไหน..."
20015-200150250 = "มันก็อาจจะยากกว่าตอนที่ต้องไปเก็บสะสม\nตราประทับที่ห้องออกกำลังกายในตอนเช้า\nช่วงปิดเทอมฤดูร้อนก็ได้"
20015-200150260 = "เรื่องนั้น... ยากจริงๆ นะ!"
20015-200150270 = "ใช่มั้ยล่ะ? เพราะงั้นฉันเลยนั่งคิดมาตลอด\nว่าจะทำยังไงดี...! "
20015-200150280 = "และฉันก็เจออะไรดีๆ เข้าแล้วล่ะ!"
20015-200150290 = "นี่อาจเป็นการค้นพบที่ยิ่งใหญ่สุดยอดใน\nศตวรรษเลยก็ได้ ฉันจะไปเล่าเรื่องการค้น\nพบนี่ให้ฟังเอง!"
20015-200150300 = "เดี๋ยวเจอกันที่ห้องนะ คุณครู!"
20015-200150310 = "ยะโฮ่~! คุณครู คุณครู~!"
20015-200150320 = "ทำอะไรอยู่เหรอ? วันนี้ฉันไม่ได้จะไปเล่น...\nหรอกนะ"
20015-200150330 = "ฉันขอไปฝึกฝนเพื่อเป็นเลดี้ที่เพียบพร้อม\nได้รึเปล่า?"
20015-200150340 = "ขอโทษนะคาเอเดะ วันนี้ครูงานยุ่ง\nนิดหน่อย..."
20015-200150350 = "เอ๊ะ? วันนี้ก็ทำงานเหรอ?\nคุยกับคุณครูทีไรก็ทำงานทุกทีเลย!"
20015-200150360 = "คุณครูชอบทำงานขนาดนั้นเลยเหรอ?"
20015-200150370 = "นะ...นั่นสินะ จะว่ายังไงดีล่ะ..."
20015-200150380 = "ครูไม่ได้ชอบงานเอกสารหรอก..."
20015-200150390 = "อืม~ ถ้างั้น... อ๊ะ จริงสิ! ฉันเคยได้\nยินมาด้วยน่ะ!"
20015-200150400 = "ว่าพวกผู้ใหญ่น่ะปากบ่นว่าเกลียด\nแต่ก็ไม่เลิกทำสิ่งที่บอกว่าเกลียดสักที..."
20015-200150410 = "เฮอะ?! ผู้ใหญ่เนี่ยลำบากจริงๆ เลยนะ!"
20015-200150420 = "เอ๊ะ... แต่ถ้าดูจากคุณครูแล้ว บางทีก็ไม่\nเหมือนเท่าไรนะ..."
20015-200150430 = "อึ่ก! เหมือนเอามีดมาแทงกันเลย!"
20015-200150440 = "อืม... ไม่รู้เหมือนกันแฮะ "
20015-200150450 = "อ๊ะ คิดอะไรดีๆ ออกแล้ว!"
20015-200150460 = "หืม? คาเอเดะ?"
20015-200150470 = "ฮิฮิฮิ ดีละ! รอก่อนนะ คุณครู!"
20015-200150480 = "วันนี้จะไม่มีการรบกวนคุณครูและจะเป็น\nคาเอเดะที่คอยช่วยงานคุณครูอยู่เงียบๆ เอง!"
20015-200150490 = "เดี๋ยวเจอกันนะ!"
20015-200150500 = "หืม? คาเอเดะ?"
20015-200150510 = "คุณครู คุณครู~! ช่วยด้วย! ช่วยด้วย!"
20015-200150520 = "ท่าไม้ตายของหน้ากากไดร์เวอร์!\nเอเมอเจนซี ไดรฟ์ คิก!"
20015-200150530 = "เอ...เอเมอเจนซี... ว่าไงนะ?"
20015-200150540 = "อะไรเหรอคาเอเดะ? เกิดเรื่องอะไรขึ้นน่ะ?!"
20015-200150550 = "หืม...? เรื่องใหญ่...?"
20015-200150560 = "อ๊ะ อื้อ ใช่แล้วล่ะ อาจเป็นเรื่องใหญ่\nเหมือนที่คุณครูพูดก็ได้!"
20015-200150570 = "คาเอเดะ บาดเจ็บงั้นเหรอ?!"
20015-200150580 = "หืม? ฉันสบายดีนะ? สบายดีสุดๆ เลย\nกินข้าวเช้าเยอะเป็นที่หนึ่งเลยด้วย"
20015-200150590 = "แต่เรื่องนั้นไม่ใช่เรื่องสำคัญสักหน่อย~\nคุณครู!"
20015-200150600 = "แต่เมื่อกี้คาเอเดะบอกว่าเรื่องฉุกเฉินนี่..."
20015-200150610 = "อา~ เรื่องฉุกเฉินน่ะเหรอ คือว่า\nเรื่องนั้น...~!"
20015-200150620 = "ไม่ได้ๆ ข่าวใหญ่แบบนี้จะบอกทาง\nMOMOTALK ไม่ได้หรอก!"
20015-200150630 = "อาจมีใครส่องแชทที่เราคุยกันอยู่ก็ได้!"
20015-200150640 = "ไม่มีเรื่องแบบนั้นหรอก"
20015-200150650 = "แต่ยังไงการบอกข่าวด้วยตัวเองมันก็อาจจะ\nดีกว่าก็ได้นะ?!"
20015-200150660 = "ฉันจะรออยู่ที่สนามเด็กเล่นนะรีบๆ มาล่ะ\nคุณครู!"
20015-200150670 = "คุณครูๆๆ!"
20015-200150680 = "ในที่สุด... ในที่สุดก็ออกมาแล้วละ! "
20015-200150690 = "เพราะงั้นไปกันเถอะ!"
20015-200150700 = "มีเรื่องอะไรน่ะ คาเอเดะ?\nอะไรออกมาเหรอ?"
20015-200150710 = "เอ๋... หืม...?"
20015-200150720 = "อ้อ จริงด้วย คุณครูคงไม่รู้จักสินะ!"
20015-200150730 = "คืองี้นะ ได้ข่าวว่าป็อปอัปสโตร์ของ\nมูชิควีนเปิดแล้วละ!"
20015-200150740 = "อ้อ พูดถึงมูชิควีนนี่เอง"
20015-200150750 = "ทำไมจู่ๆ ถึงดูเย็นชาขึ้นมาล่ะ?!"
20015-200150760 = "ฮุฮุฮุ... แต่ถ้าได้ยินเรื่องนี้"
20015-200150770 = "คุณครูอาจจะมีไฟขึ้นมาบ้างก็ได้?!"
20015-200150780 = "ที่ร้านป็อปอัปสโตร์น่ะ..."
20015-200150790 = "มีเฟรมการ์ดมูชิควีนสุดลิมิเต็ดวางขาย\nด้วยนะ!"
20015-200150800 = "เอ๋? งะ... งั้นเหรอ...?"
20015-200150810 = "คิดแล้วเชียว คงจะอึ้งจนพูดไม่ออก\nเลยสินะ!"
20015-200150820 = "ไม่ต้องห่วง ไม่ว่ายังไงฉันก็จะช่วยเอง!"
20015-200150830 = "ถ้างั้น เอาไว้เจอกันที่ห้างสรรพสินค้านะ\nคุณครู!"
20015-200150840 = "เดี๋ยวจะส่งโลเคชั่นไปให้!"
20015-200150850 = "คุณครู?"
20015-200150860 = "ถึงที่พักแล้วรึยัง?"
20015-200150870 = "แล้วคาเอเดะล่ะ กลับถึงรึยัง?"
20015-200150880 = "อื้อ ถึงแล้วละ!"
20015-200150890 = "อ่า ซื้อเฟรมการ์ดอันนี้มาได้ด้วยแฮะ...!"
20015-200150900 = "งั้นต่อไปถ้าใช้เฟรมการ์ดอันนี้"
20015-200150910 = "ก็จะดูแลการ์ดของคาเอเดะให้ดี\nได้แล้วสินะ"
20015-200150920 = "หืม? พูดอะไรน่ะคุณครู"
20015-200150930 = "เฟรมการ์ดมันมีอายุใช้งานนะ "
20015-200150940 = "ถ้าใช้ไปนานๆ ก็คงจะเก่าแล้วก็พัง"
20015-200150950 = "เพราะงั้นต้องเอาเฟรมการ์ดใส"
20015-200150960 = "ใส่ซ้อนไว้ข้างบนอีกอันแล้วค่อยเล่นสิ!"
20015-200150970 = "ใส่เฟรมการ์ดซ้อนเฟรมการ์ดเหรอ...?!"
20015-200150980 = "อื้อ! ใครๆ ก็ทำกันนะ"
20015-200150990 = "โลกของนักเล่นการ์ดนี่...\nล้ำลึกสุดๆ เลย..."
20015-200151000 = "งั้นเหรอ...?"

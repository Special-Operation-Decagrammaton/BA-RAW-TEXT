[translation]
20015-200150010 = "Argh! Not again, Sensei!"
20015-200150020 = "What do you mean \"not again?\""
20015-200150030 = "People are calling the Inner Discipline Club \"kind of weird\" again!"
20015-200150040 = "What? How rude!"
20015-200150050 = "I know right?! I'm glad you agree, Sensei."
20015-200150060 = "I was just practicing my one-liners at the playground. Why would they say that? They're so mean!"
20015-200150070 = "...Huh? Wait, Kaede. "
20015-200150080 = "...What are one-liners?"
20015-200150090 = "Huh? One-liners are one-liners!"
20015-200150100 = "They're one-liners the Inner Discipline Club say after we defeat bad students!"
20015-200150110 = "I practice a lot so I don't forget mine."
20015-200150120 = "My line goes, \"In the name of the colorful autumn leaves, I shall never forgive you!\""
20015-200150130 = "It's been a big hit, so you can use it too, Sensei!"
20015-200150140 = "The pose goes like this. Hiyap! Oh, I'll show you a video. Hold on."
20015-200150150 = "I-I see. Y-You have my support."
20015-200150160 = "Thanks for your support, Sensei! "
20015-200150170 = "I'll send you a cute sticker in return!"
20015-200150180 = "Oh, th-thanks."
20015-200150190 = "Anyway! We have to do something! Maybe it's time to take special action?"
20015-200150200 = "So, I have a favor to ask!"
20015-200150210 = "Sensei, as usual, I'm gonna work hard to become a proper lady!"
20015-200150220 = "Okay, do your best as usual."
20015-200150230 = "But the path of a proper lady is so hard..."
20015-200150240 = "Let me tell you just how hard it is..."
20015-200150250 = "It might be even harder than attending every morning exercise session during summer break!"
20015-200150260 = "That...would be hard, for sure!"
20015-200150270 = "Right? So I've been thinking really, really hard! "
20015-200150280 = "And I found something great!"
20015-200150290 = "This could be the greatest discovery of the century! I'll tell you about it in person! "
20015-200150300 = "I'll see you at the club room, Sensei!"
20015-200150310 = "Yay! Sensei, Sensei!"
20015-200150320 = "What are you doing? Can we go out... I mean..."
20015-200150330 = "Can you help me with my proper lady training?"
20015-200150340 = "Sorry, Kaede. I'm kind of busy today..."
20015-200150350 = "Oh, you are? You're always working!"
20015-200150360 = "Why do you like working so much?"
20015-200150370 = "U-Um... I don't know..."
20015-200150380 = "I don't really like paperwork honestly..."
20015-200150390 = "Hmm, then... Oh, right! I heard someone say this before!"
20015-200150400 = "Sometimes adults have to do things even if they don't like it... "
20015-200150410 = "Wow, being an adult is hard!"
20015-200150420 = "But...I don't think it's \"sometimes\" for you... You do it all the time."
20015-200150430 = "Ugh! You're right. It's sad but true."
20015-200150440 = "I don't know how I can help... "
20015-200150450 = "...Oh! I have an idea!"
20015-200150460 = "Huh? Kaede?"
20015-200150470 = "Heeheehee, all right! Wait a moment, Sensei!"
20015-200150480 = "Today, I'll be extra nice. I'll help you instead of distracting you!"
20015-200150490 = "See you later then!"
20015-200150500 = "Huh? Kaede?"
20015-200150510 = "Sensei! Sensei! Help!!"
20015-200150520 = "It's the ultimate weapon of the Masked Driver! The Emergency Drive Kick!"
20015-200150530 = "E-Emergency...what?"
20015-200150540 = "What's going on, Kaede? Are you in trouble?"
20015-200150550 = "Huh? Trouble...?"
20015-200150560 = "Oh! Yes, right! Like you said...I might be in big trouble!"
20015-200150570 = "Kaede, are you hurt?!"
20015-200150580 = "Huh? I'm okay. Actually, I'm doing great! I even ate breakfast faster than everyone else this morning!"
20015-200150590 = "Anyway, that's not what's important, Sensei!"
20015-200150600 = "You just said you had an emergency, Kaede..."
20015-200150610 = "Oh! By emergency, I meant..."
20015-200150620 = "Oh! No, no! I can't tell you such big news over MomoTalk!"
20015-200150630 = "What if someone is secretly reading our conversation somewhere?"
20015-200150640 = "That's not happening. Promise."
20015-200150650 = "Anyway, we should talk in person!"
20015-200150660 = "I'll be waiting for you at the playground. Hurry, Sensei!"
20015-200150670 = "SenseiSenseiSensei!"
20015-200150680 = "It's finally, finally opening!"
20015-200150690 = "We have to go together!"
20015-200150700 = "I need context, Kaede! What's opening?"
20015-200150710 = "Um... Huh...?"
20015-200150720 = "Ah! You're right! I guess this isn't something you keep up with, Sensei!"
20015-200150730 = "A Mushiqueen pop-up store is opening up!"
20015-200150740 = "Ah. I should've known."
20015-200150750 = "That response felt resoundingly unenthusiastic!"
20015-200150760 = "Heeheehee... But I think this next piece of news"
20015-200150770 = "will even get you going, Sensei!"
20015-200150780 = "You see...in this very pop-up store..."
20015-200150790 = "They have stocked the one, the only...the limited edition Mushiqueen card protector!"
20015-200150800 = "Oh? W-Wow...?"
20015-200150810 = "I knew it! You're so excited, you don't even know how to express it!"
20015-200150820 = "Don't worry! Just leave everything to me!"
20015-200150830 = "Okay then, Sensei! See you at the shopping center!"
20015-200150840 = "I'll send you the location!"
20015-200150850 = "Sensei?"
20015-200150860 = "Did you get home okay?"
20015-200150870 = "How about you, Kaede? Are you home safe?"
20015-200150880 = "Of course!"
20015-200150890 = "I can't believe the card protector is really mine!"
20015-200150900 = "How nice to have something"
20015-200150910 = "to protect your cards, Kaede."
20015-200150920 = "Huh? What in the world are you saying, Sensei?"
20015-200150930 = "The card protector itself is expendable!"
20015-200150940 = "It'll get scratched up if I use it too much."
20015-200150950 = "Obviously, I need to put a protector over this card protector,"
20015-200150960 = "so I can keep it safe, even while I play!"
20015-200150970 = "You're putting a protector...on your protector?"
20015-200150980 = "Isn't that common sense?"
20015-200150990 = "The world of a battler...is complicated..."
20015-200151000 = "Huh? How come?"

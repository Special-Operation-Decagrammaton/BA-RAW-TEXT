[translation]
10067-100670010 = "선생님"
10067-100670020 = "계십니까?"
10067-100670030 = "오, 토키다."
10067-100670040 = "그렇습니다. 저입니다."
10067-100670050 = "선생님께 긴히 드리고 싶은 부탁이 있는데, 괜찮으실까요?"
10067-100670060 = "토키의 부탁이라면야, 얼마든지."
10067-100670070 = "그 말씀, 확실히 기억했습니다."
10067-100670080 = "어…… 잠깐만. 지금 좀 신중하게 생각하고 싶어졌는데……?"
10067-100670090 = "선생님."
10067-100670100 = "그러면 오늘도 실례하겠습니다."
10067-100670110 = "괜찮으시지요?"
10067-100670120 = "……학생의 방문을 막을 이유는."
10067-100670130 = "어떻게 생각해도 없겠지만 말이야……"
10067-100670140 = "음."
10067-100670150 = "아무 문제도 없다는 것이로군요."
10067-100670160 = "그러면 선생님. 그렇게 알고 있겠습니다."
10067-100670170 = "돌입 준비 완료."
10067-100670180 = "지시를 기다리겠습니다."
10067-100670190 = "토키……?"
10067-100670200 = "작전 개시."
10067-100670210 = "통신을 일시 차단합니다."
10067-100670220 = "토키?!"

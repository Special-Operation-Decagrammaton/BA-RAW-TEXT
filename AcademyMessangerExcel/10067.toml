[translation]
10067-100670010 = "คุณครู"
10067-100670020 = "อยู่มั้ยคะ?"
10067-100670030 = "โอ้ โทคินี่นา"
10067-100670040 = "ใช่ค่ะ ฉันเองค่ะ"
10067-100670050 = "ฉันมีเรื่องอยากรบกวนคุณครูสักหน่อย\nจะเป็นอะไรมั้ยคะ?"
10067-100670060 = "ถ้าโทคิมาขอความช่วยเหลือ\nครูก็พร้อมช่วยตลอดนะ"
10067-100670070 = "ฉันจำได้แม่นเลยค่ะว่าคุณครูเคยบอก\nไว้ว่าอย่างนั้น"
10067-100670080 = "อ่า... เดี๋ยวนะ ตอนนี้อยากจะคิดอย่าง\nรอบคอบขึ้นมาแล้วละ..."
10067-100670090 = "คุณครู"
10067-100670100 = "ถ้าอย่างนั้นวันนี้ก็ขอรบกวน\nด้วยนะคะ"
10067-100670110 = "ไม่เป็นไรใช่มั้ยคะ?"
10067-100670120 = "ครูไม่มีเหตุผลที่จะปฏิเสธ\nสักหน่อยนี่นา..."
10067-100670130 = "ครูไม่ห้ามนักเรียนให้มาหาหรอกนะ"
10067-100670140 = "อื้ม"
10067-100670150 = "แปลว่าไม่เป็นไรสินะคะ"
10067-100670160 = "ถ้างั้นฉันจะจำเอาไว้ว่าสามารถ\nรบกวนคุณครูได้ค่ะ"
10067-100670170 = "เตรียมตัวพร้อมแล้ว"
10067-100670180 = "ฉันจะรอคำสั่งค่ะ"
10067-100670190 = "โทคิ...?"
10067-100670200 = "เริ่มแผนการ"
10067-100670210 = "ขอตัดการสื่อสารชั่วคราวค่ะ"
10067-100670220 = "โทคิ?!"

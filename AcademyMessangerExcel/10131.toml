[translation]
10131-101310010 = "สบายดีรึเปล่าคะ คุณครู?"
10131-101310020 = "ถึงคราวที่ฉันจะไปเข้าเวรที่ชาเล่ต์\nแล้ว หวังว่าจะไม่เป็นการรบกวนนะคะ"
10131-101310030 = "ฉันเลยส่งข้อความมาแจ้งล่วงหน้า\nแบบนี้ค่ะ"
10131-101310040 = "ไม่ต้องสุภาพขนาดนั้นก็ได้..."
10131-101310050 = "คุณครูรู้สึกอึดอัดเหรอคะ...?"
10131-101310060 = "ก็ไม่ขนาดนั้นหรอก แต่ว่าครู\nอยากคุยสบายๆ กับทาคาเนะน่ะ"
10131-101310070 = "เข้าใจแล้วค่ะ"
10131-101310080 = "ถ้างั้นการเข้าเวรของฉันวันนี้\nต้องขอฝากตัวด้วยนะคะ"
10131-101310090 = "คุณครู พอจะสะดวกตอนไหนบ้างคะ?"
10131-101310100 = "พอดีจะมีการแข่งไอซ์ฮอกกี้รอบ\nรองชนะเลิศเร็วๆ นี้น่ะค่ะ!"
10131-101310110 = "ถ้าคุณครูสะดวก ฉันก็อยากนัดไว้\nล่วงหน้าค่ะ!"
10131-101310120 = "อ๊ะ"
10131-101310130 = "ขอโทษนะคะ"
10131-101310140 = "ฉันถามแบบไม่มีมารยาทเกินไป\nใช่มั้ยคะ...?"
10131-101310150 = "ครูดีใจมากกว่าที่ทาคาเนะมาชวนนะ!"
10131-101310160 = "อ่า"
10131-101310170 = "งั้นเหรอคะ?"
10131-101310180 = "โล่งอกไปทีค่ะ..."
10131-101310190 = "ถ้าบอกวันที่ไว้ ครูจะทำตัวให้ว่างนะ"
10131-101310200 = "งั้นก็หมายความว่า..."
10131-101310210 = "ค่ะ! ขอบคุณค่ะ!"
10131-101310220 = "คุณครู!"
10131-101310230 = "เรานัดกันวันนี้ค่ะ!"
10131-101310240 = "จำได้อยู่ใช่มั้ยคะ?"
10131-101310250 = "สัญญากับทาคาเนะไว้ทั้งที\nครูจำได้อยู่แล้ว"
10131-101310260 = "ค่ะ!"
10131-101310270 = "ถ้างั้นรบกวนมาที่ชมรมสื่อสิ่งพิมพ์\nก่อนนะคะ!"
10131-101310280 = "ขอบคุณที่มาดูไอซ์ฮอกกี้ด้วยกันนะคะ"
10131-101310290 = "แต่ว่า"
10131-101310300 = "เรื่องที่เกิดขึ้นเมื่อตอนนั้น"
10131-101310310 = "ฉันต้อง... ขอโทษด้วยนะคะ..."
10131-101310320 = "ไม่เป็นไรหรอก ครูว่าสนุกดีนะ"
10131-101310330 = "ถ้างั้น!"
10131-101310340 = "เพื่อเป็นการขอโทษและตอบแทน"
10131-101310350 = "ฉันอยากเตรียมมื้อกลางวันให้คุณครู\nน่ะค่ะ!"
10131-101310360 = "อาหารจากทาคาเนะเหรอ?!"
10131-101310370 = "ค่ะ"
10131-101310380 = "ใกล้จะถึงเทศกาลถั่วงอกพอดีน่ะค่ะ"
10131-101310390 = "เทศกาล... ถั่วงอกเหรอ?"
10131-101310400 = "สวัสดีค่ะ คุณครู!"
10131-101310410 = "ดูร่าเริงมาเลยนะ ทาคาเนะ"
10131-101310420 = "ค่ะ!"
10131-101310430 = "คุณครูรู้หรือเปล่าคะ?"
10131-101310440 = "คืนนี้จะมีแสงเหนือให้เห็นค่ะ!"
10131-101310450 = "ฉันว่าจะไปถ่ายรูปแสงเหนือสักหน่อย"
10131-101310460 = "ถ้าคุณครูสะดวกละก็..."
10131-101310470 = "ไปด้วยกัน... มั้ยคะ?"
10131-101310480 = "ไปถ่ายรูปแสงเหนือเหรอ?"
10131-101310490 = "ใช่ค่ะ"
10131-101310500 = "แต่ถ้าคุณครูไม่สะดวก"
10131-101310510 = "หรือว่า"
10131-101310520 = "ถ้าไม่อยากไปละก็..."
10131-101310530 = "ทาคาเนะมาขอทั้งที ครูต้องไปสิ!"
10131-101310540 = "ได้โดดงานแบบมีเหตุผลทั้งที\nต้องไปอยู่แล้ว!"
10131-101310550 = "อ่า"
10131-101310560 = "ขอบคุณที่คิดอย่างนั้นค่ะ"
10131-101310570 = "แต่ก็... น่าเขินนิดหน่อยนะคะ"
10131-101310580 = "ขอบคุณค่ะ"
10131-101310590 = "อ๊ะ"
10131-101310600 = "ฉันก็เข้าใจความรู้สึกนั้นค่ะ"
10131-101310610 = "ถ้ายังไม่ถึงวันส่งงาน เราจะหาทาง\nโดดงานอยู่แล้วค่ะ"
10131-101310620 = "ถ้างั้นฉันจะรอนะคะ"

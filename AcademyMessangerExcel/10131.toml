[translation]
10131-101310010 = "貴安，老師"
10131-101310020 = "由於今天輪到我擔任值日生"
10131-101310030 = "為了避免失禮，在此先向您致上問候的訊息"
10131-101310040 = "你其實不必那麼拘謹……"
10131-101310050 = "讓您感到負擔了嗎……？"
10131-101310060 = "倒也沒有，只是我希望能跟貴音相處得自在一點"
10131-101310070 = "我明白了"
10131-101310080 = "那麼今天的值日生工作，還請您多多指教"
10131-101310090 = "老師，請問您什麼時候方便呢？"
10131-101310100 = "其實不久後就是冰上曲棍球的準決賽了！"
10131-101310110 = "如果可以的話，感覺約那個時間還挺不錯的！"
10131-101310120 = "啊"
10131-101310130 = "對不起"
10131-101310140 = "我是不是太沒禮貌了……？"
10131-101310150 = "我很高興貴音願意放輕鬆跟我說話哦！"
10131-101310160 = "是"
10131-101310170 = "是嗎？"
10131-101310180 = "那真是太好了……"
10131-101310190 = "我會盡量配合，把日期告訴我吧"
10131-101310200 = "您的意思是……"
10131-101310210 = "好的！謝謝您！"
10131-101310220 = "老師！"
10131-101310230 = "就是今天唷！"
10131-101310240 = "您還記得吧？"
10131-101310250 = "當然，畢竟是和貴音的約定嘛"
10131-101310260 = "是！"
10131-101310270 = "那麼，請您先到出版部來就可以了！"
10131-101310280 = "之前能和我一起看冰上曲棍球，真的非常感謝"
10131-101310290 = "不過"
10131-101310300 = "關於那天發生的事……"
10131-101310310 = "我真的很抱歉……"
10131-101310320 = "沒關係。反正我也挺開心的"
10131-101310330 = "所以……"
10131-101310340 = "作為回禮和對您的歉意"
10131-101310350 = "我想招待您吃一頓午餐！"
10131-101310360 = "是貴音親手做的料理嗎！？"
10131-101310370 = "是的"
10131-101310380 = "正好也快到豆芽祭的日子了"
10131-101310390 = "豆芽……祭？"
10131-101310400 = "貴安，老師！"
10131-101310410 = "感覺你很興奮呢，貴音"
10131-101310420 = "是的！"
10131-101310430 = "老師您知道嗎？"
10131-101310440 = "今晚好像能看到極光哦！"
10131-101310450 = "所以，我正在考慮要不要去拍風景照"
10131-101310460 = "如果您方便的話……"
10131-101310470 = "要不要一起去呢？"
10131-101310480 = "拍極光的風景照？"
10131-101310490 = "沒錯"
10131-101310500 = "當然如果您覺得太累"
10131-101310510 = "或者……"
10131-101310520 = "會造成麻煩的話……"
10131-101310530 = "既然是貴音的邀請，肯定要去！"
10131-101310540 = "而且能合法躲過加班，當然得去囉！"
10131-101310550 = "很"
10131-101310560 = "很感謝您願意這麼想……"
10131-101310570 = "不過……也讓人有點害羞呢"
10131-101310580 = "真的很謝謝您"
10131-101310590 = "啊……"
10131-101310600 = "我也能夠理解那種心情"
10131-101310610 = "在截稿日前，總是會想找出所有能逃離現場的藉口呢"
10131-101310620 = "那麼我等您"

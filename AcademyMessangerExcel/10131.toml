[translation]
10131-101310010 = "안녕하신가요. 선생님."
10131-101310020 = "샬레의 당번 일을 맞아, 실례가 되지 않도록."
10131-101310030 = "먼저 이렇게, 문안 톡을 보내고자 합니다."
10131-101310040 = "그렇게 너무 예의를 차릴 필요는 없어……"
10131-101310050 = "부담스러우셨나요……?"
10131-101310060 = "그 정도는 아닌데, 나는 타카네와 편하게 지내고 싶어서."
10131-101310070 = "알겠습니다."
10131-101310080 = "그러면 오늘 하루 당번, 잘 부탁드리겠습니다."
10131-101310090 = "선생님, 언제가 좋으신가요?"
10131-101310100 = "사실 곧 아이스하키 준결승전이 열릴 예정이어서요!"
10131-101310110 = "가능하시다면 그때 약속을 잡는 게 어떨까 하는데요!"
10131-101310120 = "앗"
10131-101310130 = "죄송해요."
10131-101310140 = "너무 예의 없었죠……?"
10131-101310150 = "타카네가 편하게 대해 줘서 기뻐!"
10131-101310160 = "그"
10131-101310170 = "그러신가요?"
10131-101310180 = "다행이네요……"
10131-101310190 = "날짜를 말해 주면 최대한 맞출게."
10131-101310200 = "그 말씀은……"
10131-101310210 = "네! 감사합니다!"
10131-101310220 = "선생님!"
10131-101310230 = "오늘이에요!"
10131-101310240 = "기억하고 계시죠?"
10131-101310250 = "당연하지. 누구랑 한 약속인데."
10131-101310260 = "네!"
10131-101310270 = "그러면 일단 출판부로 와 주시면 될 것 같아요!"
10131-101310280 = "일전에, 아이스하키 함께 봐주셔서 감사했습니다."
10131-101310290 = "그렇지만"
10131-101310300 = "그날 있었던 일에 대해서는"
10131-101310310 = "제가, 죄송합니다……."
10131-101310320 = "괜찮아. 나도 재미있었어."
10131-101310330 = "그래서 말인데요!"
10131-101310340 = "그 답례 겸 사죄드리는 의미에서"
10131-101310350 = "점심을 대접해 드릴까 해서요!"
10131-101310360 = "타카네의 요리?!"
10131-101310370 = "네."
10131-101310380 = "마침 곧 콩나물 축제를 하는 날이어서요."
10131-101310390 = "콩나물…… 축제?"
10131-101310400 = "안녕하세요, 선생님!"
10131-101310410 = "뭔가 신나 보이네, 타카네."
10131-101310420 = "네!"
10131-101310430 = "그거 아세요?"
10131-101310440 = "오늘 밤, 오로라를 볼 수 있대요!"
10131-101310450 = "그래서 풍경 사진을 찍으러 갈까 하는데."
10131-101310460 = "괜찮으시다면……"
10131-101310470 = "함께, 어떠세요?"
10131-101310480 = "오로라 풍경 사진?"
10131-101310490 = "맞아요."
10131-101310500 = "물론 너무 힘드시거나"
10131-101310510 = "혹시"
10131-101310520 = "번거로우시다면……"
10131-101310530 = "타카네의 부탁인데, 가야지!"
10131-101310540 = "합법적으로 야근 탈출 가능한데, 가야지!"
10131-101310550 = "그"
10131-101310560 = "그렇게 생각해 주시니 감사한데"
10131-101310570 = "조금, 부끄럽기도 하네요."
10131-101310580 = "감사합니다."
10131-101310590 = "앗"
10131-101310600 = "그 마음 저도 알 것 같아요."
10131-101310610 = "마감일 전에는 뭐든 탈출 거리를 찾게 마련이죠."
10131-101310620 = "그러면 기다리겠습니다."

[translation]
10131-101310010 = "Greetings, Sensei."
10131-101310020 = "For my upcoming Student Rep duty at Schale, I thought it proper"
10131-101310030 = "for me to announce my presence beforehand."
10131-101310040 = "You don't have to be too formal..."
10131-101310050 = "Does that bother you?"
10131-101310060 = "No, but we can be more casual, Takane."
10131-101310070 = "Very well."
10131-101310080 = "Regardless, I look forward to working with you today."
10131-101310090 = "When would be a good time for you, Sensei?"
10131-101310100 = "To be frank, the ice hockey semi-finals are about to start"
10131-101310110 = "so we could meet around that time and watch the program together?"
10131-101310120 = "Ah!"
10131-101310130 = "I'm sorry."
10131-101310140 = "That was presumptuous of me, wasn't it?"
10131-101310150 = "I'm glad you feel more comfortable!"
10131-101310160 = "Um"
10131-101310170 = "Is that so?"
10131-101310180 = "I'm relieved..."
10131-101310190 = "Please send me your proposed time and I will try my best to accommodate."
10131-101310200 = "That means..."
10131-101310210 = "Excellent! Thank you!"
10131-101310220 = "Sensei!"
10131-101310230 = "Today is the day!"
10131-101310240 = "You remember what we're doing, don't you?"
10131-101310250 = "Of course. I made a promise."
10131-101310260 = "Indubitably!"
10131-101310270 = "Then, please come to the Publishing Department!"
10131-101310280 = "I appreciate you watching hockey with me."
10131-101310290 = "But..."
10131-101310300 = "About...that..."
10131-101310310 = "I'm sorry..."
10131-101310320 = "It's fine. I had fun too."
10131-101310330 = "REGARDLESS!"
10131-101310340 = "To return your graciousness and issue a proper apology..."
10131-101310350 = "I was thinking I could make you lunch?"
10131-101310360 = "Takane's cooking?!"
10131-101310370 = "Yes."
10131-101310380 = "A bean sprout festival is about to start...if you're interested."
10131-101310390 = "A festival...just for bean sprouts?"
10131-101310400 = "Hello, Sensei!!"
10131-101310410 = "You seem excited, Takane."
10131-101310420 = "With good reason!"
10131-101310430 = "Do you know why?"
10131-101310440 = "The aurora should show tonight! The sky is clear!"
10131-101310450 = "I thought I could practice my photography."
10131-101310460 = "If you are free and interested"
10131-101310470 = "would you like to join me?"
10131-101310480 = "Taking photos of the aurora..."
10131-101310490 = "As I said."
10131-101310500 = "Of course, if you're feeling overly stressed"
10131-101310510 = "or"
10131-101310520 = "if it's too much trouble, that's fine. No pressure..."
10131-101310530 = "If Takane says go, then I go!"
10131-101310540 = "And that means I can leave work early!"
10131-101310550 = "Uh..."
10131-101310560 = "I'm happy to hear that"
10131-101310570 = "even if it's a bit embarrassing."
10131-101310580 = "Thank you."
10131-101310590 = "Ah."
10131-101310600 = "I know what you mean, though."
10131-101310610 = "Taking any excuse to escape a deadline..."
10131-101310620 = "Then, I'll be waiting for you."

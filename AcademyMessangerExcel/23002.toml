[translation]
23002-1502 = "선생님, 혹시 선생님도 주사를 무서워하시나요?"
23002-1503 = "주사 정도야 문제없이 맞을 수 있지."
23002-1504 = "주사 무서워! 바늘 무서워!"
23002-1505 = "와, 역시 어른이시네요!"
23002-1506 = "하지만 대부분의 학생은 뾰족한 주삿바늘을 무서워하니까요."
23002-1507 = "……역시 어른들도 주사는 무섭나 보네요."
23002-1508 = "확실히 뾰족한 주삿바늘은 보고만 있어도 섬뜩한 기분이 드니까요."
23002-1509 = "그런데 선배들에게 들었는데, 능숙한 간호사들은 주사를 아프지 않게 놓을 수 있대요."
23002-1510 = "주사가 아프지 않다면 병원에 오는 걸 무서워하는 사람들도 줄어들 텐데……."
23002-1511 = "어떻게 하면 주사를 아프지 않게 놓을 수 있을까요?"
23002-1512 = "선생님, 요새 잠은 제대로 주무시고 계시는가요?"
23002-1513 = "눈 밑에 다크서클이 진한 게, 얼굴에 피로가 가득해 보여요……."
23002-1514 = "요새 불면증이 심해져서……."
23002-1515 = "어쩐지 밤에 잠이 잘 오질 않아……."
23002-1516 = "잠은 제때 제대로 주무셔야죠!"
23002-1517 = "피로는 만병의 원인! 잠을 자꾸 설치면 건강도 나빠지고, 병에 걸릴 수도 있다고요."
23002-1518 = "안 되겠어요. 선생님께서 잠을 푹 주무실 수 있도록 제가 좋은 방법을 준비해두고 있을 테니,"
23002-1519 = "내일 점심시간에 양호실을 찾아주세요!"
23002-1520 = "역시 허브차는 잠이 오는 데까지 걸리는 시간이 너무 긴 것 같아요."
23002-1521 = "그래서 인터넷에서 잠이 더 잘 오는 차를 조사해보았답니다."
23002-1522 = "음…… 투구꽃 뿌리로 달인 차는 어떠신가요?"
23002-1523 = "죽일 셈이냐!"
23002-1524 = "선생님은 주로 어디서 라디오 체조를 하시나요?"
23002-1525 = "공원? 학교? 아니면 사무실?"
23002-1526 = "그러고 보니 선생님이 라디오 체조를 하는 모습은 본 적이 없는 것 같네요."
23002-1527 = "라디오 체조는 초등학생 이후로 해 본 일이 없는데……."
23002-1528 = "네? 라디오 체조를 안 나가신다고요?"
23002-1529 = "그럼 착한 아이 도장도 받을 수 없잖아요!"
23002-1530 = "선생님도 제가 나가는 공원에 함께 나오셔서 같이 라디오 체조를 해요!"
23002-1531 = "싫어."
23002-1532 = "귀찮아."
23002-1533 = "안 돼요. 선생님처럼 책상 앞에 오래 앉아 있는 어른들에게 체조는 중요한 일과라고요!"
23002-1534 = "선생님~!"
23002-1535 = "오랜만에 라디오 체조를 해 본 소감은 어떠신가요, 선생님?"
23002-1536 = "일찍 일어나서 체조를 하니 확실히 기분이 개운해지지 않으셨나요?"
23002-1537 = "확실히 평소보다 개운한 느낌이네."
23002-1538 = "그렇죠? 라디오 체조는 평소에 안 쓰는 근육을 풀어주기 때문에 건강에도 좋답니다!"
23002-1539 = "그러니까 앞으로는 선생님도 매일 공원에서 진행하는 아침 라디오 체조에 참여하세요!"
23002-1540 = "……찾아오지 않으시면 제가 샬레 하우스로 직접 찾아갈 거예요!"
23002-1541 = "휴일은 좀 봐줘……."
23002-1542 = "얼마 전에 트리니티 도서관에서 오래된 의학 서적을 발견했는데, 처음 보는 치료법이 잔뜩 적혀 있더라구요."
23002-1543 = "혹시 현대에 전승되지 못한 금단의 의술 같은 걸까요?"
23002-1544 = "민간에서 전해지던 대체요법 같은 게 아닐까?"
23002-1545 = "그런가요……."
23002-1546 = "그럼 다음에 선생님이 다치시면 여기 적힌 새로운 치료법으로 치료해 드릴게요."
23002-1547 = "기대하고 계세요!"
23002-1548 = "아니, 다치는 걸 기대하고 있어도 곤란한데……."
23002-1549 = "샬레의 집무실은 어쩐지 조금 삭막한 느낌이 들어요."
23002-1550 = "꽃병이라도 하나 가져다 놓으면 좋을 텐데……."
23002-1551 = "선생님은 어떤 꽃을 좋아하시나요?"
23002-1552 = "꽃이라면 무엇이든 좋아해."
23002-1553 = "꽃가루가 날리지 않는 종류의 꽃."
23002-1554 = "그럼 제가 좋아하는 꽃 중에서 몇 가지를 찾아볼게요."
23002-1555 = "하나에는 무슨 꽃을 제일 좋아해?"
23002-1556 = "음…… 저도 꽃이라면 대부분 괜찮지만, 그중에서도 나팔꽃이 제일 좋아요."
23002-1557 = "아침에 활짝 핀 나팔꽃을 보면 아침을 알리기 위해 트럼펫을 부는 작은 천사가 떠오르거든요."

[translation]
23002-1502 = "Are you scared of getting shots too, Sensei?"
23002-1503 = "I have no problem with getting shots."
23002-1504 = "I hate shots! I hate needles!"
23002-1505 = "Wow, and you're an adult!"
23002-1506 = "Most students are afraid of pointy needles."
23002-1507 = "...I guess even adults are scared of shots."
23002-1508 = "Those needles always give me a bad feeling."
23002-1509 = "The older students told me that skilled nurses know how to make shots painless."
23002-1510 = "If shots really were painless, more people would be okay with the hospital..."
23002-1511 = "I wonder how they make shots painless?"
23002-1512 = "Have you been sleeping well, Sensei?"
23002-1513 = "Those dark circles look pretty bad, and your skin is looking pretty rough..."
23002-1514 = "My insomnia has gotten pretty bad..."
23002-1515 = "I just can't sleep at night."
23002-1516 = "You have to sleep at the right time every day!"
23002-1517 = "Exhaustion is the worst! Lack of sleep will ruin your health and make you sick!"
23002-1518 = "This won't do. I'll make something that'll help you sleep better at night."
23002-1519 = "Come to the infirmary during lunch tomorrow!"
23002-1520 = "Herbal tea takes too long to get you to sleep."
23002-1521 = "I'll search the internet for a tea that will make you sleepy in no time."
23002-1522 = "Hm... What about tea brewed with wolfsbane root?"
23002-1523 = "Are you trying to kill me?!"
23002-1524 = "Where do you usually do your morning stretches, Sensei?"
23002-1525 = "At the park? School? Office?"
23002-1526 = "Actually, I've never seen you do morning stretches before."
23002-1527 = "I don't think I've done them since elementary school..."
23002-1528 = "What? You don't do your morning stretches?"
23002-1529 = "How do you even get through the day?"
23002-1530 = "You should come to the park with me and stretch!"
23002-1531 = "No."
23002-1532 = "I'm too lazy."
23002-1533 = "I won't take no for an answer. People like you who sit in front of a computer all day need to stretch!"
23002-1534 = "Sensei!"
23002-1535 = "How do you feel after doing your morning stretches, Sensei?"
23002-1536 = "Don't you feel so refreshed?"
23002-1537 = "I actually do."
23002-1538 = "Right? These morning stretches help relieve tension in muscles that you don't really use, so they're great for your health!"
23002-1539 = "You should come to the park every day to do morning stretches!"
23002-1540 = "If you don't come, I'm going to come pick you up from Schale!"
23002-1541 = "Can I at least rest on my days off...?"
23002-1542 = "I found an old medical book at the Trinity Library a few days ago, and it was filled with treatment methods I've never heard of before."
23002-1543 = "I wonder if they're taboo techniques that were never passed down to modern society?"
23002-1544 = "Maybe they were alternative methods that were used between non-medical professionals?"
23002-1545 = "I don't know..."
23002-1546 = "Well, when you get hurt next time, I'm going to use one of these methods on you."
23002-1547 = "I'm so excited!"
23002-1548 = "I don't think you should be excited for me to get hurt..."
23002-1549 = "Schale's executive office is a bit dreary."
23002-1550 = "A nice vase of flowers might brighten up the place..."
23002-1551 = "What kind of flowers do you like, Sensei?"
23002-1552 = "I like all types of flowers."
23002-1553 = "Flowers without pollen."
23002-1554 = "Then I'll find a few flowers that I like."
23002-1555 = "What kind of flowers do you like, Hanae?"
23002-1556 = "Um... I like most flowers, but I really like morning glories."
23002-1557 = "When they blossom in the morning, they remind me of little angels playing trumpets to announce morning has come."

[translation]
23002-1502 = "คุณครูคะ คุณครูกลัวการฉีดยามั้ยคะ?"
23002-1503 = "ถ้าแค่ฉีดยาละก็ไม่มีปัญหาหรอก"
23002-1504 = "ครูกลัวนะ! กลัวเข็มมากเลย!"
23002-1505 = "ว้าว สมกับเป็นผู้ใหญ่จริงๆ ด้วย!"
23002-1506 = "แต่ว่า นักเรียนส่วนใหญ่มักจะกลัวเจ้า\nเข็มฉีดยาเล็กๆ นี่นะคะ"
23002-1507 = "อ่า... ผู้ใหญ่เองก็กลัวการฉีดยาเหมือน\nกันสินะคะ"
23002-1508 = "แน่นอนว่าถ้าเห็นเข็มฉีดยาแหลมๆ นี่ก็\nอาจกลัวขึ้นมาได้นะคะ"
23002-1509 = "แต่ฉันได้ยินมาจากพวกรุ่นพี่ พยาบาลที่\nเชี่ยวชาญจะฉีดยาได้เบามือมากเลยค่ะ"
23002-1510 = "เพราะถ้าฉีดยาแล้วไม่รู้สึกเจ็บ จะทำให้\nคนที่กลัวการมาโรงพยาบาลลดลง..."
23002-1511 = "ต้องทำยังไงถึงจะฉีดยาได้ไม่เจ็บกันนะ..."
23002-1512 = "แล้วช่วงนี้คุณครูนอนหลับได้เป็นปกติ\nรึเปล่าคะ?"
23002-1513 = "สีหน้าคุณครูดูอ่อนล้ามากๆ แถมใต้ตา\nก็ยังดำเป็นหมีแพนด้าเลยค่ะ"
23002-1514 = "ช่วงนี้ครูนอนไม่ค่อยหลับน่ะ..."
23002-1515 = "ไม่รู้ว่าทำไม กลางคืนนอนไม่ค่อย\nหลับเลย..."
23002-1516 = "ต้องนอนให้เป็นเวลานะคะ!"
23002-1517 = "ความอ่อนเพลียจะทำให้ล้มป่วยได้ค่ะ!\nถ้าพักผ่อนไม่เพียงพอจะทำให้เสีย\nสุขภาพ และอาจทำให้ป่วยเป็นโรคได้ค่ะ"
23002-1518 = "ไม่ได้การแล้วค่ะ ฉันเตรียมวิธีการพิเศษ\nที่จะช่วยให้คุณครูนอนหลับได้สบายไว้\nแล้วค่ะ"
23002-1519 = "พรุ่งนี้ตอนกลางวันช่วยมาที่ห้องพยาบาล\nด้วยนะคะ!"
23002-1520 = "ชาสมุนไพรทำให้ง่วงนอนได้ช้าจริงๆ ด้วย"
23002-1521 = "แต่ว่าฉันหาชาที่มีสรรพคุณดีกว่าไว้แล้วค่ะ"
23002-1522 = "อืม... แล้วถ้าเป็นชาจากรากของต้น\nวูฟส์เบนล่ะคะ?"
23002-1523 = "แบบนั้นก็ตายพอดีน่ะสิ!"
23002-1524 = "ปกติแล้วคุณครูจะทำกายบริหารที่ไหน\nเหรอคะ?"
23002-1525 = "ที่สวนเหรอคะ? หรือว่าที่โรงเรียนคะ?\nหรือว่าที่ห้องทำงานคะ?"
23002-1526 = "จะว่าไปแล้วไม่เคยเห็นคุณครูทำกาย\nบริหารเลยนะคะ"
23002-1527 = "ทำกายบริหารเหรอ... ไม่ได้ทำมา\nตั้งแต่สมัยประถมแล้วล่ะ..."
23002-1528 = "คะ? จะไม่ไปทำกายบริหารเหรอคะ?"
23002-1529 = "ถ้าแบบนั้นพวกเด็กๆ จะไม่ได้รับแสตมป์\nสะสมนะคะ!"
23002-1530 = "คุณครูก็ออกไปทำกายบริหารกับฉันที่\nสวนสาธารณะเถอะค่ะ!"
23002-1531 = "ไม่เอาอ่ะ..."
23002-1532 = "คือ... ขี้เกียจอ่ะ..."
23002-1533 = "ไม่ได้นะคะ! สำหรับผู้ใหญ่อย่างคุณครูที่\nนั่งทำงานที่โต๊ะนานๆ การทำกายบริหาร\nเป็นเรื่องสำคัญมากนะคะ!"
23002-1534 = "คุณครูคะ~!"
23002-1535 = "ความรู้สึกหลังทำกายบริหารหลังจาก\nที่ไม่ได้ทำมานานเป็นยังไงบ้างคะ?"
23002-1536 = "ทำกายบริหารหลังจากตื่นนอนแบบนี้\nรู้สึกสดชื่นบ้างมั้ยคะ?"
23002-1537 = "รู้สึกสดชื่นกว่าปกติจริงๆ ด้วยนะ"
23002-1538 = "ใช่มั้ยล่ะคะ? การทำกายบริหารจะช่วย\nผ่อนคลายกล้ามเนื้อที่เราไม่ค่อยได้ใช้\nงาน เพราะงั้นเลยดีต่อสุขภาพมากค่ะ!"
23002-1539 = "เพราะฉะนั้นต่อไปคุณครูต้องมาร่วมทำ\nกายบริหารที่สวนทุกเช้าเลยนะคะ!"
23002-1540 = "ถ้าคุณครูไม่มาล่ะก็... ฉันจะไปตาม\nคุณครูถึงบ้านเลยค่ะ!"
23002-1541 = "ขอเว้นตอนวันหยุดได้มั้ย..."
23002-1542 = "เมื่อสองสามวันก่อน ฉันเจอตำราแพทย์\nแผนโบราณที่ห้องสมุดทรีนิตี้ค่ะ มีเขียน\nวิธีการรักษาโรคที่ฉันเพิ่งเคยเห็นเอาไว้\nเต็มไปหมดเลย"
23002-1543 = "หรือว่ามันเป็นพวกตำรายาต้องห้ามที่ไม่ได้\nรับอนุญาตให้ใช้ในปัจจุบันหรือเปล่านะ?"
23002-1544 = "หรือจะเป็นการรักษาทางเลือกที่\nสืบทอดมาจากชาวบ้านกันนะ?"
23002-1545 = "นั่นสิคะ..."
23002-1546 = "ถ้างั้นต่อไปถ้าเกิดคุณครูได้รับบาดเจ็บ\nฉันจะใช้วิธีรักษาตามที่เขียนไว้ใน\nหนังสือเองค่ะ"
23002-1547 = "คอยดูได้เลยค่ะ!"
23002-1548 = "เดี๋ยวสิ ถ้าฮานาเอะจังรอให้ครู\nบาดเจ็บ... มันยังไงๆ อยู่นะ"
23002-1549 = "รู้สึกเหมือนสำนักงานของชาเล่ต์ดูเหงาๆ\nเลยนะคะ"
23002-1550 = "ถ้าเอาแจกันดอกไม้มาวางไว้คงจะดี..."
23002-1551 = "คุณครูชอบดอกไม้แบบไหนเหรอคะ?"
23002-1552 = "ถ้าเป็นดอกไม้ล่ะก็ชอบทุกอย่างเลย"
23002-1553 = "ดอกไม้ที่เกสรไม่ค่อยปลิวน่ะ"
23002-1554 = "ถ้างั้น... ฉันจะลองเลือกจากดอกไม้ที่ฉัน\nชอบดูนะคะ"
23002-1555 = "แล้วฮานาเอะชอบดอกไม้อะไรเหรอ?"
23002-1556 = "อืม... ถ้าเป็นดอกไม้ล่ะก็ ส่วนใหญ่ชอบ\nหมดเลยค่ะ แต่ถ้าต้องเลือกก็...\nดอกมอร์นิ่งกลอรี่ค่ะ!"
23002-1557 = "เวลาที่เห็นดอกมอร์นิ่งกลอรี่บานในตอน\nเช้า มันเหมือนได้ยินแตรของเทวดาขับ\nขานต้อนรับยามเช้าเลยค่ะ"

[translation]
13012-130120010 = "선생님, 순찰 시간입니다!"
13012-130120020 = "어제는 북구의 업무지구를 순찰했으니, 오늘은 중앙구의 업무지구를 순찰하도록 하죠!"
13012-130120030 = "하지만 오늘은 휴일이잖아……."
13012-130120040 = "오늘은 쉬면 안 될까?"
13012-130120050 = "안 돼요! 사건은 회의실이 아니라 현장에서 일어나는 법이니까요."
13012-130120060 = "저희가 이렇게 대화를 나누는 이 순간에도……"
13012-130120070 = "시민의 손으로는 해결할 수 없는 대형 범죄가 저희를 기다리고 있다고요!"
13012-130120080 = "그렇다면 더 나가고 싶지 않아……."
13012-130120090 = "선생님, 사건입니다!"
13012-130120100 = "소식에 따르면 한 불량 학생이 시바타운의 보석상 앞에서 인질을 붙잡고 농성을 하고 있다고 합니다!"
13012-130120110 = "그런데 교통 정체 때문에 교섭인의 도착이 늦어지는 모양이네요."
13012-130120120 = "음……"
13012-130120130 = "만약 본관이 이 기회에 현장에 먼저 도착해서 교섭을 성공시킨다면……"
13012-130120140 = "발키리의 높으신 분들도 본관의 능력을 인정해주시지 않을까요?"
13012-130120150 = "전문 교섭인이 올 때까지 기다리는 게 좋지 않을까?"
13012-130120160 = "아뇨. 지금 이 순간에도 인질은 두려움에 떨고 있을 거예요."
13012-130120170 = "아무리 본관이 정식 경찰은 아니라고는 하지만, 교섭은 조금도 지체할 수 없습니다!"
13012-130120180 = "키리노, 출동합니다!"
13012-130120190 = "우으, 선생님……. (T_T)"
13012-130120200 = "지난번의 인질 사건 때문에 높은 분들로부터 경고를 받았습니다."
13012-130120210 = "그때 총만 제대로 쏘았더라면……."
13012-130120220 = "선생님, 어떻게 하면 총을 잘 쏠 수 있을까요?"
13012-130120230 = "그걸 내게 물어봐도……."
13012-130120240 = "그럼 최소한 본관이 사격하는 모습을 옆에서 지켜봐 주실 수는 없으신가요?"
13012-130120250 = "사격 시의 나쁜 습관이나 자세를 교정하면 명중률을 올리는 데 도움이 된다고 하니까요."
13012-130120260 = "그거라면 어렵지 않지."
13012-130120270 = "감사합니다, 선생님!"
13012-130120280 = "그럼 학교의 실내 사격장에서 기다리고 있겠습니다!"
13012-130120290 = "으으, 긴장되네요……."
13012-130120300 = "무슨 일이라도 있어?"
13012-130120310 = "오후에 주변 유치원의 학생들이 견학 차 발키리 경찰학교에 올 예정이라는데……"
13012-130120320 = "그 견학의 안내를 본관이 맡게 되어서요."
13012-130120330 = "혹시라도 너무 긴장해서 실수를 하지는 않을까, 벌써부터 걱정이 됩니다."
13012-130120340 = "내가 실수하지 않도록 옆에서 도와줄게."
13012-130120350 = "……선생님께서 직접 도와주시러 오시는 건가요?"
13012-130120360 = "그렇다면 안심입니다. 감사합니다, 선생님!"
13012-130120370 = "어쩐지 의욕이 넘치는 것 같네."
13012-130120380 = "물론이지요. 어린 학생들에게 경찰의 멋진 모습을 보여줄 수 있는 모처럼의 기회니까요!"
13012-130120390 = "본관도 어릴 적 견학을 통해 경찰의 꿈을 갖게 되었었지요."
13012-130120400 = "그때의 선배들처럼 멋진 모습을 보여야 할 텐데……."
13012-130120410 = "키리노."
13012-130120420 = "네?"
13012-130120430 = "당황하더라도 총은 꺼내면 안 돼."
13012-130120440 = "다, 당연하지요! 본관도 그 정도는 알고 있습니다!"

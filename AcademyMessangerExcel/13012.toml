[translation]
13012-130120010 = "老師，巡邏時間到了唷！"
13012-130120020 = "昨天是北區，今天就去中央區巡一巡吧！"
13012-130120030 = "今天不是休息日嗎……"
13012-130120040 = "今天不休息一天嗎……？"
13012-130120050 = "不行！事件不會發生在會議室，而是在現場！"
13012-130120060 = "在我們舒服地享受回籠覺的時候……"
13012-130120070 = "說不定哪裡正發生著市民們無法解決的大型犯罪唷！"
13012-130120080 = "那就更不想去了……"
13012-130120090 = "老師，有事件！"
13012-130120100 = "據說芝町的珠寶店內，有不良學生挾持人質與警方對峙！"
13012-130120110 = "而且似乎因為交通堵塞，談判專家會晚一點到場……"
13012-130120120 = "……"
13012-130120130 = "如果本官能藉此機會，先到現場並談判成功的話……"
13012-130120140 = "女武神的上層長官們，是不是也會認可本官的能力呢？"
13012-130120150 = "還是等專業的談判專家來比較好吧……？"
13012-130120160 = "……不，我決定了。現在這一刻，人質應該也正害怕地發抖"
13012-130120170 = "雖然還不是正式的警察，但也不能停下腳步"
13012-130120180 = "桐乃，出動！"
13012-130120190 = "嗚嗚，老師……(T_T)"
13012-130120200 = "因為上次的人質事件，我被上層警告了……"
13012-130120210 = "如果我的槍法再好一點……"
13012-130120220 = "老師，要怎麼提升射擊技巧呢？"
13012-130120230 = "這問題就算問我……"
13012-130120240 = "說的也是……那麼能至少請您在旁邊看本官射擊嗎？"
13012-130120250 = "聽說想要提升命中率，改善射擊時的壞習慣和姿勢是很重要的！"
13012-130120260 = "嗯，那我很樂意幫忙"
13012-130120270 = "謝謝您，老師！"
13012-130120280 = "那麼，我在校內的射擊場等您！"
13012-130120290 = "老師，我非常的緊張……"
13012-130120300 = "怎麼了？等下有什麼考試嗎？"
13012-130120310 = "聽說今天下午，附近幼稚園的小朋友要來參觀女武神警察學園……"
13012-130120320 = "到時候將由本官負責帶隊"
13012-130120330 = "一想到會不會出什麼差錯，就非常的不安……"
13012-130120340 = "要不要我也一起去，在一旁支援如何？"
13012-130120350 = "咦，可以嗎？"
13012-130120360 = "那我就安心了，非常感謝老師！"
13012-130120370 = "感覺你充滿幹勁呢。如果有我能幫上忙的地方，務必再跟我說"
13012-130120380 = "幫大忙了。就是說呢，因為是難得的機會，所以希望能讓幼稚園小朋友看到警察帥氣的樣子！"
13012-130120390 = "畢竟本官就是小時候有參加類似的參觀活動，才會立志成為警察……"
13012-130120400 = "要像當年的警察們一樣，展現出帥氣的模樣才行……！"
13012-130120410 = "桐乃，就一件事"
13012-130120420 = "是的，是什麼呢？"
13012-130120430 = "別把槍拿出來。萬一打到幼稚園小朋友就不好了"
13012-130120440 = "那，那是……！雖，雖然不太情願……不過是的，老師說得沒錯呢……"

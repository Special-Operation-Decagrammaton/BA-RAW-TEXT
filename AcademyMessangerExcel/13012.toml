[translation]
13012-130120010 = "คุณครู ได้เวลาไปลาดตระเวนแล้วล่ะ!"
13012-130120020 = "เมื่อวานเราไปลาดตระเวนที่เขตธุรกิจที่\nทางเหนือแล้ว เพราะงั้นวันนี้เราไปที่เขต\nธุรกิจที่เขตกลางกันเถอะ!"
13012-130120030 = "แต่วันนี้มันวันหยุดนะ..."
13012-130120040 = "วันนี้ขอหยุดสักวันไม่ได้เหรอ...?"
13012-130120050 = "ไม่ได้ค่ะ! คนร้ายไม่ได้หยุดวันเสาร์\nอาทิตย์ด้วยซะหน่อย"
13012-130120060 = "ในตอนที่เรากำลังคุยกันแบบนี้..."
13012-130120070 = "อาจเกิดเหตุอาชญากรรมขึ้นและชาวเมือง\nก็อาจรอให้พวกเราไปช่วยก็ได้นะคะ"
13012-130120080 = "แบบนั้นยิ่งไม่น่าออกไปใหญ่เลย..."
13012-130120090 = "คุณครู เกิดเรื่องแล้วล่ะค่ะ!"
13012-130120100 = "ตามข่าวที่ได้ยินมา มีเด็กเกเรคนหนึ่ง\nประท้วงแล้วจับตัวประกันอยู่ที่หน้าร้าน\nอัญมณีที่ชิบะ ทาวน์ค่ะ!"
13012-130120110 = "แต่ว่าดูเหมือนนักเจรจาจะไปถึงที่นั่นได้\nช้าเพราะการจราจรติดขัดค่ะ..."
13012-130120120 = "อืม..."
13012-130120130 = "ถ้าฉันใช้โอกาสนี้ไปถึงที่เกิดเหตุและ\nเกลี้ยกล่อมคนร้ายได้สำเร็จก่อน..."
13012-130120140 = "เจ้าหน้าที่ระดับสูงของวัลคิรี่ก็อาจจะเล็ง\nเห็นความสามารถของฉันก็ได้นะคะ?"
13012-130120150 = "รอจนกว่านักเจรจาจะมาถึง\nไม่ดีกว่าเหรอ?"
13012-130120160 = "ไม่ได้ค่ะ เวลานี้คนที่ถูกจับเป็นตัวประกัน\nก็คงจะรู้สึกกลัวมากแน่ๆ ค่ะ"
13012-130120170 = "ถึงฉันจะยังไม่ได้เป็นเจ้าหน้าที่อย่าง\nเป็นทางการ แต่การเจรจาจะรอช้าไม่ได้\nนะคะ!"
13012-130120180 = "คิริโนะ พร้อมออกปฏิบัติการค่ะ!"
13012-130120190 = "ฮือ... คุณครูคะ... (T_T)"
13012-130120200 = "ฉันได้รับจดหมายตักเตือนจากเจ้าหน้า\nที่ระดับสูงเพราะเหตุการณ์จับตัวประกัน\nครั้งก่อนด้วยค่ะ"
13012-130120210 = "ถ้าตอนนั้นฉันยิงปืนได้แม่นกว่านี้..."
13012-130120220 = "คุณครูคะ ทำยังไงถึงจะยิงปืนได้แม่นๆ เหรอคะ?"
13012-130120230 = "มาถามเรื่องนั้นกับครูเนี่ยนะ..."
13012-130120240 = "ถ้างั้นคุณครูช่วยไปดูตอนที่ฉันฝึกยิง\nปืนหน่อยได้มั้ยคะ?"
13012-130120250 = "ถ้าปรับท่าทางหรือความเคยชินที่ไม่\nดีได้ ก็จะทำให้ยิงปืนได้แม่นขึ้นก็ได้ค่ะ"
13012-130120260 = "เรื่องนั้นครูน่าจะช่วยได้นะ"
13012-130120270 = "ขอบคุณค่ะคุณครู!"
13012-130120280 = "ถ้างั้นฉันจะไปรอที่ห้องซ้อมในอาคาร\nของโรงเรียนนะคะ!"
13012-130120290 = "ตะ... ตื่นเต้นจังเลยค่ะ..."
13012-130120300 = "มีเรื่องอะไรงั้นเหรอ?"
13012-130120310 = "บ่ายนี้เด็กนักเรียนจากโรงเรียน\nอนุบาลที่อยู่ใกล้ๆ จะมาทัศนศึกษาที่\nสถาบันฝึกตำรวจวัลคิรี่ค่ะ..."
13012-130120320 = "แล้วฉันก็ได้รับหน้าที่ให้เป็นคนนำ\nเด็กๆ ดูสถานที่ต่างๆ"
13012-130120330 = "ฉันกลัวว่าตัวเองจะตื่นเต้นจนทำผิด\nพลาด ตอนนี้เลยรู้สึกกังวลมากเลยค่ะ"
13012-130120340 = "ครูจะไปคอยช่วยอยู่ข้างๆ\nไม่ให้เธอทำพลาดเอง"
13012-130120350 = "คุณครูจะมาช่วยฉันจริงๆ เหรอคะ?"
13012-130120360 = "ถ้าแบบนั้นค่อยโล่งใจหน่อย\nขอบคุณนะคะคุณครู!"
13012-130120370 = "ดูมุ่งมั่นตั้งใจมากๆ เลยนะ"
13012-130120380 = "แน่นอนค่ะ เพราะนี่เป็นโอกาสที่จะแสดง\nถึงความยอดเยี่ยมของตำรวจให้เด็กๆ\nได้เห็นค่ะ!"
13012-130120390 = "ฉันเองก็ฝันอยากเป็นตำรวจเพราะ\nการได้ไปทัศนศึกษาตอนเด็กๆ ค่ะ"
13012-130120400 = "ฉันควรจะต้องแสดงให้เด็กๆ เห็นถึง\nความยอดเยี่ยมเหมือนกับรุ่นพี่พวกนั้น..."
13012-130120410 = "คิริโนะ"
13012-130120420 = "คะ?"
13012-130120430 = "ถ้ามีอะไรทำให้ตกใจก็ห้ามชักปืน\nออกมาเด็ดขาดนะ"
13012-130120440 = "นะ...แน่นอนอยู่แล้วค่ะ! เรื่องแค่นั้น\nฉันรู้อยู่แล้วค่ะ!"

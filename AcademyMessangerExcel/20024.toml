[translation]
20024-200240010 = "오랜만에 인사드립니다, 선생님."
20024-200240020 = "그간 평안하셨는지요?"
20024-200240030 = "오랜만이야, 나기사."
20024-200240040 = "오늘 모처럼 연락을 드린 이유는 다름이 아니라"
20024-200240050 = "트리니티 학생들의 일로 선생님께 상담을 하고 싶은 것이 있어서요."
20024-200240060 = "무거운 사안은 아니니 점심 식사 후에 차라도 한잔하며 이야기를 나누는 게 어떠실까요?"
20024-200240070 = "응, 좋아."
20024-200240080 = "네. 그럼 좋은 홍차를 준비하고 기다리고 있겠습니다."
20024-200240090 = "날이 더우니 더위에 주의하시길."
20024-200240100 = "먼저 자리를 비워서 죄송합니다, 선생님."
20024-200240110 = "부득이하게 갑자기 컨디션이 나빠지는 바람에…"
20024-200240120 = "괜찮아. 신경 쓰지 마."
20024-200240130 = "혹시 내가 권한 홍차가 입에 맞지 않았던 거야?"
20024-200240140 = "무리하게 권한 것 같아 미안하네……"
20024-200240150 = "아뇨. 대단히 흥미로운 경험이었습니다만……"
20024-200240160 = "다음에는 조금 양을 조절하는 게 좋을 것 같네요……"
20024-200240170 = "……다시 한번 인사드립니다, 선생님."
20024-200240180 = "그간 평안하셨는지요?"
20024-200240190 = "몸은 이제 괜찮아?"
20024-200240200 = "아, 지난 번의 일은……"
20024-200240210 = "괜찮습니다. 크게 몸이 나빴던 것도 아닌걸요."
20024-200240220 = "그보다, 괜찮으실 때 다시 한번 티파티의 다과회실에 방문해 주시겠습니까?"
20024-200240230 = "지난번에 못다 한 이야기를 계속 드리고 싶습니다."
20024-200240240 = "이번에야말로 좋은 홍차를 준비하고 기다리겠습니다."
20024-200240250 = "나도 좋아하는 홍차를 잔뜩 가져갈게!"
20024-200240260 = "페트병 홍차는…… 이제 괜찮습니다."
20024-200240270 = "……그간 평안하셨는지요."
20024-200240280 = "저"
20024-200240290 = "지난번에는 평정심을 잃은 탓에 선생님께 큰 실례를 저질렀습니다……"
20024-200240300 = "괜찮아. 신경 쓰지 않아."
20024-200240310 = "하지만 트리니티의 중책을 맡은 자가 실수를 가벼이 넘길 수는 없는 법."
20024-200240320 = "선생님께서 괜찮으시다면 부디 제게 실수를 만회할 기회를 주셨으면 합니다."
20024-200240330 = "그러고 보니 새로 주문한 찻잎이 곧 도착할 것 같은데……"
20024-200240340 = "새로운 차의 시음과 겸하여 함께 다과회라도 즐기시는 게 어떠신가요?"
20024-200240350 = "좋아."
20024-200240360 = "네. 그럼 전의 장소에서 기다리고 있겠습니다."
20024-200240370 = "좋은 아침입니다, 선생님."
20024-200240380 = "아침 식사는 하고 출근하셨나요?"
20024-200240390 = "응. 나기사는?"
20024-200240400 = "네, 조금 전에 미소시루를 먹었답니다."
20024-200240410 = "……의외네."
20024-200240420 = "티파티의 학생들은 스위츠만 먹을 것 같은 인상이었는데……."
20024-200240430 = "그럴 리가 없잖습니까."
20024-200240440 = "아무리 입에 달다고 해도 한 가지 음식만 먹으면 건강을 해치는 법."
20024-200240450 = "저라고 해서 언제나 케이크와 과자만 먹는 건 아니랍니다."

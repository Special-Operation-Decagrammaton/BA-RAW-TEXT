[translation]
20024-200240010 = "ไม่ได้คุยกันนานเลยนะคะคุณครู"
20024-200240020 = "ช่วงที่ผ่านมาสบายดีรึเปล่าคะ?"
20024-200240030 = "ไม่เจอกันนานเลยนะ นางิสะ"
20024-200240040 = "เหตุผลที่ฉันติดต่อคุณครูมาในวันนี้..."
20024-200240050 = "ก็เพราะมีงานของทรีนิตี้ที่อยากให้\nคุณครูดูแลให้หน่อยน่ะค่ะ"
20024-200240060 = "ไม่ใช่งานหนักหนาอะไรหรอกค่ะ\nเรามาคุยรายละเอียดหลังจากดื่มชา\nช่วงบ่ายด้วยกันดีมั้ยคะ?"
20024-200240070 = "อื้อ เอาสิ"
20024-200240080 = "ค่ะ ถ้างั้นฉันจะเตรียมชาแดงชั้นดีไว้\nรอคุณครูนะคะ"
20024-200240090 = "วันนี้อากาศร้อน ระวังเป็นลมแดดด้วย\nนะคะ"
20024-200240100 = "ต้องขอโทษที่ฉันเป็นฝ่ายลุกไปก่อน\nด้วยค่ะ"
20024-200240110 = "จู่ๆ อาการฉันก็แย่ขึ้นมากะทันหัน..."
20024-200240120 = "ไม่เป็นไร ไม่ต้องคิดมากหรอก"
20024-200240130 = "ชาแดงที่ครูแนะนำไปไม่ถูกปาก\nรึเปล่า?"
20024-200240140 = "ดูเหมือนจะหนักไป ขอโทษนะ..."
20024-200240150 = "ไม่เลย เป็นประสบการณ์ที่เพลิดเพลิน\nจริงๆ..."
20024-200240160 = "คราวหน้าเห็นทีคงจะต้องปรับปริมาณ\nแล้วละค่ะ..."
20024-200240170 = "สวัสดีอีกครั้งค่ะ... คุณครู"
20024-200240180 = "ช่วงที่ผ่านมาสบายดีรึเปล่าคะ?"
20024-200240190 = "ร่างกายเป็นยังไงบ้าง?"
20024-200240200 = "อ๊ะ เรื่องคราวที่แล้ว..."
20024-200240210 = "ไม่เป็นไรค่ะ สุขภาพฉันไม่ได้แย่ลง\nอะไรหรอกค่ะ"
20024-200240220 = "คือว่าคุณครูช่วยแวะมาที่ห้องชงชา\nของสภาน้ำชาอีกทีได้มั้ยคะ?"
20024-200240230 = "ฉันอยากเล่าเรื่องที่ยังไม่ได้เล่าเมื่อ\nคราวที่แล้วค่ะ"
20024-200240240 = "และคราวนี้ฉันจะเตรียมชาแดงดีๆ ให้ค่ะ"
20024-200240250 = "ครูจะเอาชาแดงที่ชอบไปเอง!"
20024-200240260 = "ชาแดงสำเร็จรูป... ฉันขอผ่านดีกว่าค่ะ"
20024-200240270 = "ช่วงที่ผ่านมาสบายดีรึเปล่าคะ...?"
20024-200240280 = "คือว่า..."
20024-200240290 = "ครั้งที่แล้วฉันสูญเสียความสุขุมไป\nต้องขอโทษที่เสียมารยาทด้วยค่ะ"
20024-200240300 = "ไม่เป็นไร ไม่ต้องคิดมากหรอก"
20024-200240310 = "แต่ว่าผู้รับผิดชอบของทรีนิตี้จะมองผ่าน\nความผิดพลาดเล็กน้อยแบบนี้ไปไม่ได้\nหรอกค่ะ"
20024-200240320 = "ถ้าคุณครูไม่ว่าอะไร ช่วยให้โอกาสฉัน\nได้แก้ไขความผิดพลาดด้วยเถอะค่ะ"
20024-200240330 = "พอมาคิดๆ ดูแล้ว... ใบชาที่สั่งมาใหม่\nก็มาถึงพอดี..."
20024-200240340 = "มาเพลิดเพลินกับพิธีชงชาและดื่มด่ำ\nกับรสชาติใบชาใหม่ด้วยกันดีมั้ยคะ?"
20024-200240350 = "ก็ดีนะ"
20024-200240360 = "ค่ะ ถ้างั้นฉันจะรออยู่ที่เดิมนะคะ"
20024-200240370 = "อรุณสวัสดิ์ค่ะคุณครู"
20024-200240380 = "รับประทานอาหารเช้ามาก่อนเริ่ม\nทำงานรึเปล่าคะ?"
20024-200240390 = "อื้อ นางิสะล่ะ?"
20024-200240400 = "ค่ะ เมื่อสักครู่ฉันทานซุปมิโสะไปแล้วค่ะ"
20024-200240410 = "แปลกนะเนี่ย..."
20024-200240420 = "นักเรียนของทางสภาน้ำชามีชีวิตได้\nด้วยของหวานนี่นา..."
20024-200240430 = "จะเป็นแบบนั้นได้ยังไงกันล่ะคะ"
20024-200240440 = "ถึงจะบอกว่าชอบของหวาน แต่ถ้ากิน\nอาหารอยู่แค่อย่างเดียว สุขภาพจะย่ำแย่\nเอานะคะ"
20024-200240450 = "ต่อให้เป็นฉันเอง ก็ไม่ได้กินเค้กหรือ\nของหวานอยู่ตลอดหรอกนะคะ"

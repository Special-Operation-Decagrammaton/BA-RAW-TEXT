[translation]
16004-2101 = "안녕하십니까! 문안 인사 올립니다, 두목!"
16004-2102 = "저는 백귀야행 학원, <마츠리 운영 관리파>의 피나라고 함다!"
16004-2103 = "잘 부탁드림다!"
16004-2104 = "갑자기 두목이라니?"
16004-2105 = "운영관리'파'……?"
16004-2106 = "앗"
16004-2107 = "죄송해요."
16004-2108 = "그러고 보니 자기 소개도 안 했었네요."
16004-2109 = "아직은 저런 말투가 익숙하지 않아서"
16004-2110 = "연습 좀 하고 다시 해볼게요."
16004-2111 = "아무튼 언제 한 번 놀러 오세요!!"
16004-2112 = "오늘 너무 좋았습니다 선생님!"
16004-2113 = "선생님이 말한 피나의 임협이라는 게 뭔진 아직 잘 모르겠지만…"
16004-2114 = "뭐, 선생님이 말해준 거니까 확실한 거겠죠!"
16004-2115 = "언젠가는 저도 스스로 알 수 있을 거라고 생각합니다!"
16004-2116 = "그럼 다음에 또 뵙겠습니다!! 꼭이에요!! "
16004-2117 = "선생님~~!! 도움~! HELP~!!"
16004-2118 = "도와주세요! 선생님밖에 도와줄 수 없는 일입니다!"
16004-2119 = "무슨 일이야?"
16004-2120 = "무슨 사고라도 쳤어?"
16004-2121 = "그건 문자로 설명하기 어려워요!"
16004-2122 = "시간 되면 나와 줄 수 있어요? 꼭 좀 부탁드리겠습니다!!"
16004-2123 = "그럼 기다리겠습니다!!"
16004-2124 = "오늘 너무 고마웠어요, 선생님!"
16004-2125 = "오늘은 선생님이 고른 영화를 봤으니"
16004-2126 = "다음엔 피나가 고른 영화를 같이 보도록 하시죠!"
16004-2127 = "꼭이에요! 거절하기 없기입니다!"
16004-2128 = "선생님, 피나가 왔습니다!"
16004-2129 = "저번에 말씀드렸듯, 이번에는 제가 영화 대접을 하려고 합니다!"
16004-2130 = "마침 구해 둔 표도 이미 두 장으로 있다고요 후후"
16004-2131 = "그럼 기다리고 있겠습니다!"
16004-2132 = "편하실 때 와주세요!"
16004-2133 = "오늘은 정말 저 때문에 고생 많으셨어요!"
16004-2134 = "죄송합니다-! 그리고 고맙습니다!!"
16004-2135 = "다음에는 꼭 티켓 끊기 전에도 미리 말씀드릴 테니까요!"
16004-160040010 = "선생님! 드디어 때가 왔습니다! 이 때가!"
16004-160040020 = "이 때……?"
16004-160040030 = "네!"
16004-160040040 = "저희가 함께한 지도 시간이 꽤 흘렀으니!"
16004-160040050 = "게다가 서로 신뢰도 충분히 쌓았고!"
16004-160040060 = "이 상황이라면 역시…… 이것뿐이죠!"
16004-160040070 = "이 것……?"
16004-160040080 = "네!"
16004-160040090 = "그럼 선생님이 오실 때까지!"
16004-160040100 = "피나는, 기다리고 있겠습니다!"

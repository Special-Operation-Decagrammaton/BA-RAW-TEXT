[translation]
16004-2101 = "เซย์ ไฮ~ ขอแสดงความเคารพค่ะ! บอส!"
16004-2102 = "ฉันพีน่าสมาชิก\n\"ชมรมจัดงานเทศการ\"\nจากสหพันธ์เฮียกคิยาโคค่ะ!"
16004-2103 = "ขอฝากตัวด้วยนะคะ!"
16004-2104 = "จู่ๆ ก็เรียกว่าบอสงั้นเหรอ?"
16004-2105 = "ชมรมจัดงานเทศ \"การ\" งั้นเหรอ....?"
16004-2106 = "อ๊ะ?!"
16004-2107 = "ซอรี่ๆ"
16004-2108 = "ฉันคงแนะนำตัวผิดไปหน่อยค่ะ"
16004-2109 = "ฉันยังไม่ค่อยชินกับภาษาเท่าไหร่"
16004-2110 = "ฉันขอไปฝึกก่อนแล้วจะมาแนะนำตัว\nอีกครั้งค่ะ"
16004-2111 = "ยังไงก็ไว้แวะมาใหม่นะคะ!!"
16004-2112 = "วันนี้ดีมากๆ เลยค่ะ คุณครู!"
16004-2113 = "ฉันไม่ค่อยเข้าใจเรื่อง \"ความกล้า\nของพีน่า\" ที่คุณครูพูดถึงเท่าไร แต่ว่า..."
16004-2114 = "ก็... ถ้าคุณครูพูดแบบนั้นก็คงใช่แหละค่ะ!"
16004-2115 = "ฉันคิดว่าสักวันฉันก็คงจะเข้าใจได้เองค่ะ!"
16004-2116 = "ถ้างั้น... ซียูว์นะคะ~! ไว้เจอกันใหม่น้า~! "
16004-2117 = "คุณครูคะ~~!! ช่วยด้วย~! HELP~!!"
16004-2118 = "ช่วยด้วยค่ะ PLEASE! เรื่องนี้มีแต่คุณครู\nที่ช่วยฉันได้ค่ะ"
16004-2119 = "มีอะไรเหรอ?"
16004-2120 = "ก่อเรื่องอะไรมารึยังไง?"
16004-2121 = "มันอธิบายทางข้อความลำบากค่ะ!"
16004-2122 = "ถ้ามีเวลาออกมาเจอฉันหน่อยได้ไหมคะ?\nขอร้องละค่ะ!!"
16004-2123 = "ถ้างั้นฉันจะรอนะคะ!!"
16004-2124 = "วันนี้ขอบคุณมากเลยค่ะ คุณครู!"
16004-2125 = "วันนี้ได้ดูหนังที่คุณครูเลือกไปแล้ว..."
16004-2126 = "คราวหน้าเอาไว้เรามาดูหนังที่ฉันเลือก\nบ้างนะคะ!"
16004-2127 = "ต้องมาดูด้วยกันนะคะ! ห้ามเซย์โน\nเด็ดขาดเลย!"
16004-2128 = "คุณครูคะ พีน่ามาแล้วค่ะ!"
16004-2129 = "คราวที่แล้วฉันบอกไปแล้วไงคะ\nว่าคราวนี้ฉันจะเลี้ยงหนังคุณครูเอง!"
16004-2130 = "ฉันซื้อตั๋วเอาไว้สองใบพอดีเลย คิคิคิ"
16004-2131 = "ถ้างั้นฉันจะรอนะคะ!"
16004-2132 = "ค่อยๆ มาก็ได้ค่ะ!"
16004-2133 = "วันนี้คุณครูคงเหนื่อยเพราะฉันสินะคะ"
16004-2134 = "ซอรี่จริงๆ นะคะ! แล้วก็ขอบคุณมากค่ะ!!"
16004-2135 = "คราวหน้าก่อนจะซื้อตั๋ว ฉันจะบอก\nคุณครูไว้ล่วงหน้าแล้วกันนะคะ!"
16004-160040010 = "คุณครู! ในที่สุดก็ถึงเวลาแล้ว ตอนนี้ละ!"
16004-160040020 = "ตอนนี้เหรอ...?"
16004-160040030 = "ค่ะ!"
16004-160040040 = "พวกเราได้ใช้เวลาผ่านร้อนผ่านหนาว\nมาด้วยกันอย่างยาวนานแล้ว!"
16004-160040050 = "และไว้เนื้อเชื่อใจกันในระดับหนึ่ง!"
16004-160040060 = "ในเมื่อเป็นแบบนี้แล้ว... ก็เหลือแค่สิ่งนั้น\nเท่านั้นค่ะ!"
16004-160040070 = "\"สิ่งนั้น\" งั้นเหรอ...?"
16004-160040080 = "ค่ะ!"
16004-160040090 = "ถ้างั้นพีน่าจะรอ"
16004-160040100 = "จนคุณครูจะมาถึงนะคะ!"

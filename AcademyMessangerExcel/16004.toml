[translation]
16004-2101 = "一切安好嗎，頭兒！"
16004-2102 = "我是百鬼夜行聯合學園「節慶營運管理部」組的菲娜！"
16004-2103 = "請多指教！"
16004-2104 = "頭兒……？"
16004-2105 = "營運管理部「組」……？"
16004-2106 = "啊"
16004-2107 = "失禮了"
16004-2108 = "突然就自我介紹"
16004-2109 = "我也還不太習慣"
16004-2110 = "讓我再練習一下，下次請讓我再試一次"
16004-2111 = "總之，下次請來玩唷！！"
16004-2112 = "今天非常開心，老師！"
16004-2113 = "老師說的「菲娜的任俠」究竟是什麼，雖然我還不太明白"
16004-2114 = "但因為是老師說的，所以一定沒錯！"
16004-2115 = "總有一天我會明白的！"
16004-2116 = "那就再會囉！絕對要唷！"
16004-2117 = "老師～～！！請幫～幫我！HELP！！"
16004-2118 = "這只能拜託老師了！幫幫我！"
16004-2119 = "怎麼了？"
16004-2120 = "你闖了什麼禍？"
16004-2121 = "那個無法用訊息說明！"
16004-2122 = "有時間的話能來嗎？拜託了！！"
16004-2123 = "我等著你！！"
16004-2124 = "真的非常感謝，老師！"
16004-2125 = "今天一起看了老師選的電影"
16004-2126 = "下次我們兩個一起看菲娜選的電影吧！"
16004-2127 = "絕對要唷！絕對！"
16004-2128 = "老師，我是菲娜！"
16004-2129 = "就像之前說的，這次看我選的電影吧！"
16004-2130 = "票也準備好了！"
16004-2131 = "那我等著唷！"
16004-2132 = "再拜託你了！"
16004-2133 = "今天真的是辛苦你了！"
16004-2134 = "是我的錯，對不起！然後非常感謝！！！"
16004-2135 = "下次再去看電影吧！普通電影院的那種！"
16004-160040010 = "老師！終於到這個時候了！這個時候！"
16004-160040020 = "「這個時候」……？"
16004-160040030 = "對！"
16004-160040040 = "到目前為止，我們共度了很長的一段時間！"
16004-160040050 = "也累積了不少信任！"
16004-160040060 = "這樣的話……只能那個了吧！"
16004-160040070 = "……「那個」？"
16004-160040080 = "沒錯！"
16004-160040090 = "那麼，不肖菲娜！"
16004-160040100 = "恭候老師的光臨！"

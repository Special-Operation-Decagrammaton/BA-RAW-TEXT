[translation]
20032-200320010 = "어른들은 옷에 꽤나 신경 쓰는 편이지?"
20032-200320020 = "그런 편이지."
20032-200320030 = "대충 입는 편인데……."
20032-200320040 = "잠시 여유가 생긴 김에 쇼핑을 하려는데."
20032-200320050 = "나는 패션에 대해서 잘 모르니까 선생님과 함께 훈련을 해 보려고."
20032-200320060 = "일단 필요한 걸 챙겨서 갈게."
20032-200320070 = "???"
20032-200320080 = "선생님. 오늘 어울려줘서 고마워."
20032-200320090 = "조만간 연락할게."
20032-200320100 = "선생님 그날이 왔어."
20032-200320110 = "그날?"
20032-200320120 = "저번에 옷 고르는 것을 도와주기로 했잖아."
20032-200320130 = "오늘이 그날이야."
20032-200320140 = "지금 보내는 위치로 와 줘."
20032-200320150 = "엄청난 박력…!"
20032-200320160 = "오늘은 정말 고마워. 선생님."
20032-200320170 = "옷을 골라준 것뿐만 아니라 선물까지……."
20032-200320180 = "신경 쓰지 마."
20032-200320190 = "빙해에 갈 때는 수영복만 입지 말고 꼭 그 차림으로 가는 거야!"
20032-200320200 = "응. 이거 정말 마음에 들어서."
20032-200320210 = "되도록 매일 입고 다니도록 할게."
20032-200320220 = "선생님."
20032-200320230 = "다음 작전에 대해 특무부실에서 잠깐 이야기를 하고 싶은데 시간 괜찮아?"
20032-200320240 = "음… 오늘은 바빠서 조금 어려우려나……."
20032-200320250 = "그래? 그럼 어쩔 수 없지."
20032-200320260 = "다음에 다시 연락할게."
20032-200320270 = "선생님, 컨디션은 좀 괜찮아?"
20032-200320280 = "응, 따듯하게 있으니까 많이 나아졌어."
20032-200320290 = "다행이야."
20032-200320300 = "오늘도 많은 도움이 되었어 선생님."
20032-200320310 = "이 옷에 그런 뜻이 담겨 있었다니."
20032-200320320 = "그러고 보니 속옷 대신에 수영복을 입는 것도 좋은 것 같아."
20032-200320330 = "재킷 안에 땀이 많이 났지만 수영복이라 젖어도 괜찮은 거 있지."
20032-200320340 = "이런 걸 뭐라고 하더라? 기능미?"
20032-200320350 = "아, 응…… 맞아."
20032-200320360 = "역시 선생님이야."
20032-200320370 = "패션이란 여러 가지를 고려해야 하는 거구나."
20032-200320380 = "앞으로도 많은 가르침 부탁할게."
20032-200320390 = "선생님, 이곳은 파라다이스일지도 몰라."
20032-200320400 = "파라다이스?"
20032-200320410 = "응… 좋은 장소를 찾았거든."
20032-200320420 = "선생님도 올래?"
20032-200320430 = "온천이라도 있는 거야?"
20032-200320440 = "음… 비슷하려나……."
20032-200320450 = "역시 냉수 욕조를 만드는 건 포기하기로 했어."
20032-200320460 = "잘 생각했어."
20032-200320470 = "그렇지만 그렇게나 의욕적이었는데?"
20032-200320480 = "음… 물론 그 정도의 온도는 아무렇지도 않은 기분 좋은 수준이지만……."
20032-200320490 = "선생님이 항상 차를 끓여줄 수 있는 것도 아니고."
20032-200320500 = "혹시라도 감기에 걸리면 선생님이 걱정하니까."
20032-200320510 = "……."
20032-200320520 = "언제나 신경 써줘서 고마워, 선생님."

[translation]
20032-200320010 = "พวกผู้ใหญ่ค่อนข้างให้ความสำคัญ\nกับเสื้อผ้าใช่มั้ย?"
20032-200320020 = "ก็ใช่นะ"
20032-200320030 = "ครูแต่งตัวแบบลวกๆ เอาน่ะ..."
20032-200320040 = "ตอนนี้พอมีเวลาว่าง ก็เลยว่าจะไป\nซื้อเสื้อผ้าสักหน่อย"
20032-200320050 = "แต่ฉันไม่ค่อยรู้เกี่ยวกับแฟชั่น ก็เลย\nอยากจะฝึกฝนด้านแฟชั่นกับคุณครูดู"
20032-200320060 = "งั้นฉันจะเอาของที่จำเป็นไปนะ"
20032-200320070 = "???"
20032-200320080 = "คุณครู วันนี้ขอบคุณที่มาอยู่ด้วยนะ"
20032-200320090 = "แล้วฉันจะติดต่อไปใหม่"
20032-200320100 = "คุณครู และแล้ววันนี้ก็มาถึง"
20032-200320110 = "วันนี้?"
20032-200320120 = "คราวก่อนคุณครูบอกว่าจะช่วยฉัน\nเลือกเสื้อผ้าไม่ใช่เหรอ"
20032-200320130 = "วันช่วยเลือกเสื้อผ้ามาถึงแล้วนี่ไง"
20032-200320140 = "เดี๋ยวส่งโลเคชั่นให้ มาหาฉันหน่อยนะ"
20032-200320150 = "รอไม่ไหวแล้ว...!"
20032-200320160 = "วันนี้ขอบคุณมากเลยนะ คุณครู"
20032-200320170 = "ทั้งช่วยเลือกเสื้อผ้า ทั้งยังให้ของขวัญ\nอีก..."
20032-200320180 = "ไม่ต้องคิดมากหรอก"
20032-200320190 = "ตอนไปธารน้ำแข็งก็อย่าใส่แต่ชุด\nว่ายน้ำล่ะ ใส่ตัวอื่นที่ครูให้ไปด้วย"
20032-200320200 = "อื้ม เสื้อผ้าถูกใจฉันมากเลยละ"
20032-200320210 = "ถ้าเป็นไปได้ฉันจะใส่ทุกวันเลย"
20032-200320220 = "คุณครู"
20032-200320230 = "ฉันอยากคุยเกี่ยวกับปฏิบัติการต่อไป\nสักหน่อย พอมีเวลามั้ย?"
20032-200320240 = "อืม... พอดีวันนี้ครูงานยุ่งนิดหน่อย\nคิดว่าไม่น่าได้นะ..."
20032-200320250 = "งั้นเหรอ? งั้นก็ช่วยไม่ได้"
20032-200320260 = "ไว้ฉันติดต่อไปใหม่แล้วกัน"
20032-200320270 = "คุณครู ร่างกายเป็นยังไงบ้าง?\nดีขึ้นบ้างรึยัง?"
20032-200320280 = "อื้ม ครูอยู่ในที่อุ่นๆ ก็เลยดีขึ้นมากแล้ว"
20032-200320290 = "โล่งอกไปที"
20032-200320300 = "วันนี้คุณครูก็ช่วยฉันไว้ได้เยอะเลย"
20032-200320310 = "เสื้อผ้าชุดนี้มีความหมายแบบนั้นอยู่\nเหรอเนี่ย"
20032-200320320 = "จะว่าไป ฉันว่าการใส่ชุดว่ายน้ำ\nแทนชุดชั้นในก็น่าจะดีนะ"
20032-200320330 = "เวลาใส่แจ็กเกตแล้วเหงื่อชอบออก\nแต่ถ้าข้างในเป็นชุดว่ายน้ำก็ไม่ต้องห่วง\nเรื่องที่จะเปียก"
20032-200320340 = "แบบนี้มันเรียกว่าอะไรนะ?\nความสวยงามที่มีประโยชน์ใช้สอย?"
20032-200320350 = "อ่า... อื้ม... ใช่"
20032-200320360 = "สมแล้วที่เป็นคุณครู"
20032-200320370 = "เรื่องแฟชั่นนี่ต้องคำนึงถึงหลายๆ\nอย่างสินะ"
20032-200320380 = "ต่อไปก็มาสอนฉันอีกนะ"
20032-200320390 = "คุณครู ที่นี่อาจจะเป็นสวรรค์เลยก็ได้ "
20032-200320400 = "สวรรค์เหรอ?"
20032-200320410 = "อื้ม... ฉันไปเจอที่ดีๆ มาน่ะ"
20032-200320420 = "คุณครูก็มาด้วยมั้ย?"
20032-200320430 = "มีออนเซ็นหรืออะไรทำนองนั้นเหรอ?"
20032-200320440 = "อืม... ก็คล้ายๆ กันนะ..."
20032-200320450 = "ฉันตัดสินใจล้มเลิกเรื่องการทำ\nอ่างอาบน้ำเย็นแล้ว"
20032-200320460 = "คิดดีแล้วละ"
20032-200320470 = "จะว่าไป เอมิคิดจะเอาจริงเอาจัง\nขนาดนั้นเลยนะเนี่ย?"
20032-200320480 = "อืม... แน่นอนว่าอุณหภูมิประมาณนั้น\nมันทำให้ฉันอารมณ์ดีมาก..."
20032-200320490 = "แต่ก็ใช่ว่าคุณครูจะชงชาให้ฉันได้ตลอด"
20032-200320500 = "และถ้าฉันเป็นหวัดขึ้นมา คุณครูก็คง\nจะเป็นห่วง"
20032-200320510 = "..."
20032-200320520 = "ขอบคุณที่ใส่ใจกันตลอดเลยนะคุณครู"

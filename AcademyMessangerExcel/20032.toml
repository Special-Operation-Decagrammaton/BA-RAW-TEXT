[translation]
20032-200320010 = "Are adults particular about their clothing?"
20032-200320020 = "I guess it depends."
20032-200320030 = "It's not really my priority..."
20032-200320040 = "I have free time. I wanted to use it to go shopping."
20032-200320050 = "But fashion is foreign to me. You're a teacher, so please train me in your ways."
20032-200320060 = "I will come meet you after gathering supplies."
20032-200320070 = "???"
20032-200320080 = "Thank you for the training today, Sensei."
20032-200320090 = "I will contact you soon."
20032-200320100 = "The day has come, Sensei."
20032-200320110 = "What day?"
20032-200320120 = "You previously agreed to help me shop for clothes."
20032-200320130 = "Today is the day you will make good on your promise."
20032-200320140 = "I'm sending you the location now. Please come immediately."
20032-200320150 = "You're so unintentionally assertive..."
20032-200320160 = "I'm very grateful for your assistance today. Sensei."
20032-200320170 = "You fulfilled your original directive and purchased me a gift."
20032-200320180 = "I was happy to do it."
20032-200320190 = "PLEASE don't wear just a swimsuit if you're going to the Glacial Sea."
20032-200320200 = "Yes. I like this jacket."
20032-200320210 = "I will wear it as often as possible."
20032-200320220 = "Sensei."
20032-200320230 = "Are you busy? Please meet me in the Special Operations Room to discuss our next mission."
20032-200320240 = "My schedule's a little packed right now."
20032-200320250 = "I see. Understood."
20032-200320260 = "I will contact you at a later time."
20032-200320270 = "Are you feeling better, Sensei?"
20032-200320280 = "I've warmed up now! Thank you!"
20032-200320290 = "I am relieved."
20032-200320300 = "Thank you for your assistance today, Sensei."
20032-200320310 = "I was unaware of the implications of my outfit."
20032-200320320 = "Replacing my swimsuit with underwear was an inspired idea."
20032-200320330 = "The absorbent material of the swimsuit serves well to soak up any sweat from the jacket."
20032-200320340 = "I believe there is a term for this. Functionality?"
20032-200320350 = "You could call it that!"
20032-200320360 = "You are very wise, Sensei."
20032-200320370 = "Fashion is a complicated and convoluted industry."
20032-200320380 = "I look forward to learning more about it from you."
20032-200320390 = "I believe this is paradise, Sensei. "
20032-200320400 = "Paradise?"
20032-200320410 = "Yes. It is very excellent."
20032-200320420 = "Would you like to visit paradise?"
20032-200320430 = "Oh! I hope it's a hot spring!"
20032-200320440 = "Um... It is of the same genre..."
20032-200320450 = "I have decided my cold tub endeavors were unrealistic."
20032-200320460 = "I'm relieved to hear that."
20032-200320470 = "You were pretty excited about the project though."
20032-200320480 = "I will miss the relaxing temperature of the water..."
20032-200320490 = "However, you will not always be available to brew tea."
20032-200320500 = "I cannot catch a cold and worry Sensei."
20032-200320510 = "..."
20032-200320520 = "Thank you for your care, Sensei."

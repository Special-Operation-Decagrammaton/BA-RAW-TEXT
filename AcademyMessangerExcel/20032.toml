[translation]
20032-200320010 = "大人對穿著都挺講究的吧？"
20032-200320020 = "算是吧"
20032-200320030 = "我都穿的很隨興……"
20032-200320040 = "現在正好有空，我想趁這個機會去買點東西"
20032-200320050 = "但我不太瞭解時尚，所以想和老師一起訓練"
20032-200320060 = "我會把需要的東西帶去"
20032-200320070 = "？？？"
20032-200320080 = "老師，今天謝謝你陪我"
20032-200320090 = "我會再聯絡你"
20032-200320100 = "老師，那天到了"
20032-200320110 = "哪天？"
20032-200320120 = "上次不是說好要幫我挑衣服嗎？"
20032-200320130 = "今天就是那個日子"
20032-200320140 = "快到我傳給你的地點來"
20032-200320150 = "好強的魄力……！"
20032-200320160 = "今天真的很謝謝你，老師"
20032-200320170 = "不但幫我挑衣服還送我禮物……"
20032-200320180 = "不用客氣"
20032-200320190 = "去冰海的時候不能只穿泳裝，那件衣服也一定要穿著哦！"
20032-200320200 = "嗯，我真的很喜歡這件衣服"
20032-200320210 = "我會盡可能每天都穿的"
20032-200320220 = "老師"
20032-200320230 = "我想在特異現象搜查部跟你討論下一次的作戰，你有空嗎？"
20032-200320240 = "嗯……今天很忙，可能有點困難……"
20032-200320250 = "是嗎？那就沒辦法了"
20032-200320260 = "我會再聯絡你"
20032-200320270 = "老師，身體狀況有好一點嗎？"
20032-200320280 = "嗯，我穿暖一點之後就好多了"
20032-200320290 = "那就好"
20032-200320300 = "今天也謝謝你，老師"
20032-200320310 = "沒想到這件衣服還有那種含義"
20032-200320320 = "看來用泳裝代替內衣好像也不錯"
20032-200320330 = "就算夾克裡出了很多汗，反正是泳裝，濕了也沒關係"
20032-200320340 = "該怎麼形容？機能美？"
20032-200320350 = "啊，嗯……你說的對"
20032-200320360 = "不愧是老師"
20032-200320370 = "原來時尚要考慮這麼多因素啊"
20032-200320380 = "之後請再多教我一些"
20032-200320390 = "老師，這裡可能是個樂園"
20032-200320400 = "樂園？"
20032-200320410 = "嗯……我找到了一個好地方"
20032-200320420 = "老師也要來嗎？"
20032-200320430 = "發現溫泉了嗎？"
20032-200320440 = "嗯……類似吧……"
20032-200320450 = "我決定放棄冷水浴了"
20032-200320460 = "多麼明智的決定"
20032-200320470 = "不過你本來不是還挺興奮的嗎？"
20032-200320480 = "嗯……那種溫度確實挺舒服的沒錯……"
20032-200320490 = "但老師又不是每次都能幫我泡茶……"
20032-200320500 = "而且萬一感冒會讓老師擔心"
20032-200320510 = "……"
20032-200320520 = "謝謝你一直這麼關心我，老師"

10004-100040010 = "Sensei... Do you have a moment?"
10004-100040020 = "Hina? Is everything okay?"
10004-100040030 = "Ah... You see... Um..."
10004-100040040 = "I took the day off..."
10004-100040050 = "Um... So, I don't have any Prefect Team duties to tend to."
10004-100040060 = "Would you like to...spend some time with me today?"
10004-100040070 = "Ah..."
10004-100040080 = "Of course, it's just a personal wish..."
10004-100040090 = "I don't want to trouble you, so don't feel pressured."
10004-100040100 = "For something like this, you can pressure me as much as you want!"
10004-100040110 = "I'm already on my way!"
10004-100040120 = "Really...?"
10004-100040130 = "Okay..."
10004-100040140 = "Heehee. I'll wait for you then, Sensei."

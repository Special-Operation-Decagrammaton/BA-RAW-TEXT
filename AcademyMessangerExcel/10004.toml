[translation]
10004-1 = "คุณครู ฉันมีเรื่องอยากคุยด้วยหน่อยน่ะ"
10004-2 = "ฉันทำงานเสร็จตอนกลางคืน เรามาเจอ\nกันตอนนั้นได้มั้ย?"
10004-3 = "แน่นอน ฮินะขอมาทั้งทีนี่นา"
10004-4 = "เลิกงานดึกเหรอ... อืม..."
10004-5 = "ใช่ ขอโทษที่ให้มาตอนดึกนะ..แล้วฉัน\nจะบอกว่าให้มาเจอที่ไหน"
10004-6 = "ฉันไปรบกวนเวลานอนของครูรึเปล่า..."
10004-7 = "ถ้าเป็นแบบนั้นก็บอกกันได้นะ "
10004-8 = "ฉันไม่อยากทำให้เดือดร้อนน่ะ"
10004-9 = "ถ้าเป็นฮินะจังล่ะก็\nรบกวนได้ตามต้องการเลย"
10004-10 = "ไม่เป็นไรหรอก ไปพักผ่อนเถอะ"
10004-11 = "อืม... ขอบคุณนะ"
10004-12 = "ฝันดีนะ... คุณครู"
10004-13 = "คุณครู วันหยุดนี้คุณครูมีเวลาว่างช่วง\nดึกบ้างมั้ย?"
10004-14 = "คือว่า.. งานของฉันจะเสร็จตอนนั้นน่ะ"
10004-15 = "แต่ถ้าคุณครูไม่ว่างก็ไม่เป็นไร..."
10004-16 = "ได้สิ แล้วไว้เจอกัน"
10004-17 = "มาคิดดูแล้ว ฉันว่าเราไม่ควรใส่ใจ\nสายตาคนรอบข้างให้มากเกินไป"
10004-18 = "ก็เรานัดมาเจอกันด้วยเรื่องงานนี่นา"
10004-19 = "แต่ไว้คราวหน้าเราหาเวลามาเจอกัน\nตอนกลางวันบ้าง ก็น่าจะดีเหมือน\nกัน..."
10004-20 = "ไปเจอฮินะจังตอนกลางวันเหรอ...\nครูจะตั้งตารอเลย"
10004-21 = "ก็ดูน่าสนุกเหมือนกันนะ"
10004-22 = "คะ.. คิดอะไรอยู่น่ะ!"
10004-23 = "ฉันไม่ได้นัดเดตนะ! คุณครูก็รู้ใช่มั้ย?"
10004-24 = "เราเจอกันเพราะเรื่องงานต่างหากล่ะ!"
10004-25 = "ไปทำงานกับฮินะจังตอนกลางวัน\nเหรอ... ครูจะตั้งตารอเลย"
10004-26 = "......"
10004-27 = "เฮ้อ "
10004-28 = "แต่ก็... จริงอยู่หรอก เพราะฉันเองก็..."
10004-29 = "ตั้งตารออยู่เหมือนกัน"
10004-30 = "ฝันดีนะคุณครู"
10004-31 = "คุณครู "
10004-32 = "เรื่องรายงานการฝึกยิงปืนยุทธวิธีน่ะ..."
10004-33 = "รายงานนั่นไม่สำคัญเท่าสิ่งที่ครูจะ\nบอกหรอก"
10004-34 = "เรามีเรื่องสำคัญต้องคุยกันนะ"
10004-35 = "หือ?"
10004-36 = "เอ่อ..."
10004-37 = "หมายความว่ายังไง?"
10004-38 = "ต้องไปห้างสรรพสินค้ากับครู\nแล้วละ"
10004-39 = "......"
10004-40 = "หา...?"
10004-41 = "หือ?"
10004-42 = "ห้างสรรพสินค้า?"
10004-43 = "ไปที่นั่นทำไม? "
10004-44 = "มีงานที่ต้องทำน่ะ"
10004-45 = "มีเรื่องสำคัญบางอย่างน่ะ"
10004-46 = "แต่ตอนกลางคืนห้างปิดหมดไม่ใช่เหรอ\n...?"
10004-47 = "ไม่งั้นก็ต้องเป็นห้างที่เปิด 24 ชั่วโมง..."
10004-48 = "......"
10004-49 = "อ้อ!"
10004-50 = "ฉันเข้าใจที่คุณครูบอกแล้วล่ะ"
10004-51 = "...... "
10004-52 = "ก็ได้... ไหนๆ ก็สัญญาไว้แล้วนี่นา"
10004-53 = "เข้าใจแล้ว "
10004-54 = "แล้วฉันจะหาเวลาออกไปนะ"
10004-55 = "คุณครู"
10004-56 = "คือว่าวันนี้...."
10004-57 = "วันนี้แสงแดดอบอุ่นดีจัง ว่ามั้ยฮินะจัง?"
10004-58 = "อากาศดีมากเลยล่ะ"
10004-59 = "หือ?"
10004-60 = "อากาศเหรอ?"
10004-61 = "เฮ้อ... ใครเค้าสนอากาศกันล่ะ"
10004-62 = "อากาศดีแบบนี้ต้องไปเดินเล่นสิ!"
10004-63 = "ไปเดินเล่นกันเถอะ!!"
10004-64 = "เดินเล่นเหรอ?"
10004-65 = "เอ่อ..."
10004-66 = "ตอนนี้เหรอ?"
10004-67 = "กะ.. ก็ได้ แต่แค่แป๊บเดียวนะ"
10004-68 = "คุณครู..."
10004-69 = "จริงๆ เล้ย..."
10004-70 = "เฮ้อ..."
10004-71 = "ฉันทำงานโต้รุ่งมาหลายวันแล้ว ตอนนี้\nยุ่งมากเลย"
10004-72 = "เอกสารที่ต้องจัดการก็มีเยอะเป็นตั้งๆ\nแถมยังถูกส่งตัวไปทำภารกิจอีก"
10004-73 = "เวลาที่ทำอะไรพลาดก็มักจะโดนคนอื่น\nจ้องหน้า"
10004-74 = "......"
10004-75 = "แถมยังต้องออกมาทำงานคนเดียว\nในวันที่คนอื่นได้พักผ่อนอีก..."
10004-76 = "น่าหงุดหงิดชะมัด"
10004-77 = "เฮ้อ..."
10004-78 = "เพราะทุกคนคาดหวังในตัวฮินะไงล่ะ"
10004-79 = "เพราะฮินะคือประธานกรรมการไงล่ะ"
10004-80 = "......"
10004-81 = "ขอโทษนะ ฉันไม่ได้ตั้งใจ\nจะมาบ่นให้คุณครูฟังหรอก"
10004-82 = "ช่วยลืมมันไปเถอะ"
10004-83 = "ว่าแต่..."
10004-84 = "เมื่อคืนฉันไม่ได้... พูดอะไรแปลกๆ\n...ออกไปใช่มั้ย?"
10004-85 = "ฉันจำไม่ได้ว่ามันคือความฝันหรือเปล่า\n... คือว่ามัน..."
10004-86 = "เป็นเรื่องน่าอายมากๆ เลย..."
10004-87 = "อย่าบอกนะว่า..."
10004-88 = "ไม่จริงใช่มั้ย?"
10004-89 = "หืม? หมายถึงอะไรเหรอ...?"
10004-90 = "อาจเป็นความฝันก็ได้นะ?"
10004-91 = "......"
10004-92 = "อืม... ต้องใช่แหละ... ฉันคงฝันไป"
10004-93 = "ขอบคุณนะ"
10004-100040010 = "คุณครู... มีเวลาสักครู่มั้ย?"
10004-100040020 = "เอ๋ ฮินะ มีอะไรเหรอ?"
10004-100040030 = "อ่า... คือว่า... อืม..."
10004-100040040 = "วันนี้เป็นวันหยุดน่ะ..."
10004-100040050 = "วันนี้ไม่ต้องทำงานของ\nคณะกรรมการวินัยน่ะ"
10004-100040060 = "เพราะงั้นถ้าคุณครูสะดวก ก็อยากจะ\nชวนมาใช้วันหยุดด้วยกัน... น่ะ"
10004-100040070 = "อ่า..."
10004-100040080 = "อ๊ะ ฉันอยากทำแบบนั้นก็จริง"
10004-100040090 = "แต่ถ้าคุณครูลำบากใจ ฉันก็ไม่อยาก\nบังคับ..."
10004-100040100 = "ครูอยากให้ฮินะบังคับครูบ้างนะ"
10004-100040110 = "งั้นเดี๋ยวครูออกไปหาเดี๋ยวนี้เลย!"
10004-100040120 = "งั้นเหรอ...?"
10004-100040130 = "อะ... อื้อ..."
10004-100040140 = "ฮุฮุ งั้นฉันจะรอแล้วกันนะ คุณครู"

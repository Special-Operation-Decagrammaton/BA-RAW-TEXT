[translation]
10004-1 = "Sensei, I know this is sudden, but I have an urgent matter to discuss with you."
10004-2 = "Can I meet you tonight after my work is done?"
10004-3 = "Sure. Whatever you like."
10004-4 = "So, you work late too..."
10004-5 = "Yes. I'm sorry to impose on you at such an hour... I'll let you know where we can meet."
10004-6 = "I hope I'm not cutting into your rest."
10004-7 = "If so, please tell me. "
10004-8 = "I don't want to inconvenience you."
10004-9 = "Feel free to inconvenience me anytime, Hina."
10004-10 = "I'll be okay. You should get some sleep."
10004-11 = "...Okay. Thanks."
10004-12 = "Goodnight, Sensei."
10004-13 = "Sensei, will you be free in the evening this weekend?"
10004-14 = "I'll be done with my work by then."
10004-15 = "We can do another time if you need."
10004-16 = "That'll do. See you then."
10004-17 = "I've been thinking that maybe I shouldn't worry so much about other people seeing us."
10004-18 = "After all, our meetings are strictly work-related."
10004-19 = "Maybe next time we should meet during the day..."
10004-20 = "Going out in broad daylight with Hina. Lucky me."
10004-21 = "I think it'll be fun."
10004-22 = "Wh-What are you thinking?!"
10004-23 = "It's not a date! You know that, right?"
10004-24 = "It's work. Work!"
10004-25 = "Working with Hina in the middle of the day. Looking forward to it."
10004-26 = "..."
10004-27 = "*sigh* "
10004-28 = "Well, sure. I'm also sort of..."
10004-29 = "looking forward to it"
10004-30 = "Goodnight, Sensei."
10004-31 = "Sensei. "
10004-32 = "Regarding the report regarding this month's tactical fire drill..."
10004-33 = "Before that, Hina."
10004-34 = "We need to talk about something far more important."
10004-35 = "Huh?"
10004-36 = "O-Okay."
10004-37 = "What is it?"
10004-38 = "I need you to go to the mall with me."
10004-39 = "..."
10004-40 = "...Huh?"
10004-41 = "Ma..."
10004-42 = "Mall?"
10004-43 = "Why there? "
10004-44 = "There's something I need to do."
10004-45 = "It's important."
10004-46 = "But a mall would be closed at night..."
10004-47 = "Unless it's one of those twenty-four-hour places..."
10004-48 = "..."
10004-49 = "Oh."
10004-50 = "I-I get what you're saying."
10004-51 = "... "
10004-52 = "Okay... I did promise, after all."
10004-53 = "All right. "
10004-54 = "I'll make time. Somehow."
10004-55 = "Sensei."
10004-56 = "About today..."
10004-57 = "It's nice and sunny today."
10004-58 = "The weather's great."
10004-59 = "Huh?"
10004-60 = "Weather?"
10004-61 = "*sigh* That's not what I wanted to discuss."
10004-62 = "It's a perfect day for a walk!"
10004-63 = "Let's go for a walk!"
10004-64 = "A walk?"
10004-65 = "U-Um..."
10004-66 = "Now?"
10004-67 = "Oh... Okay. Maybe just for a little while..."
10004-68 = "Sensei..."
10004-69 = "I really..."
10004-70 = "*sigh*"
10004-71 = "I've been pulling all-nighters for the past few days, so I'm really out of it."
10004-72 = "On top of that, the dispatch reports and documents I have to process are piling up..."
10004-73 = "Whenever something happens, everyone turns to me..."
10004-74 = "..."
10004-75 = "Everyone else has the day off, and I'm the only person working today..."
10004-76 = "It's annoying and frustrating."
10004-77 = "*sigh*"
10004-78 = "Everyone leans on you, Hina."
10004-79 = "It's because they rely on the head prefect."
10004-80 = "..."
10004-81 = "I'm sorry, I didn't mean to vent to you."
10004-82 = "Please, forget what I said."
10004-83 = "Um..."
10004-84 = "Did I say anything...weird yesterday?"
10004-85 = "I don't remember if it was a dream or not...but I think..."
10004-86 = "I might have said something really embarrassing."
10004-87 = "So..."
10004-88 = "did I?"
10004-89 = "Huh? I'm not sure what you're talking about."
10004-90 = "Maybe it was a dream."
10004-91 = "..."
10004-92 = "Yeah. That must have been it."

[translation]
10004-1 = "老師。雖然有點突然，但我想和你談談"
10004-2 = "我工作結束後雖然是深夜，但能稍微見個面嗎？"
10004-3 = "當然，如果是陽奈的請求"
10004-4 = "工作到深夜啊……辛苦了……"
10004-5 = "這麼晚真是抱歉，那麼地點是……"
10004-6 = "是不是因為我的關係，睡眠時間變少了？"
10004-7 = "如果是那樣的話跟我說"
10004-8 = "我不想給你添麻煩"
10004-9 = "我願意為陽奈做任何事"
10004-10 = "我沒事。陽奈也要好好睡覺唷"
10004-11 = "……嗯，謝謝"
10004-12 = "晚安，老師"
10004-13 = "老師。這次休息日的深夜，有空嗎？"
10004-14 = "我預計和以前一樣在同個時間結束工作"
10004-15 = "不方便的話沒關係"
10004-16 = "完全沒問題唷"
10004-17 = "在那之後我也稍微思考了一下，太過在意周圍的視線似乎也不太好"
10004-18 = "畢竟只是業務上的碰面"
10004-19 = "從下次開始，在更明亮的白天抽空見面之類的……"
10004-20 = "在明亮的時間就能見到陽奈……"
10004-21 = "我很期待"
10004-22 = "你在說什麼……"
10004-23 = "這不是約會，知道嗎？"
10004-24 = "因為這是工作"
10004-25 = "在明亮的時間和陽奈一起工作……真期待吶"
10004-26 = "……"
10004-27 = "哈啊……"
10004-28 = "算了。我也，嘛……"
10004-29 = "有點，期待"
10004-30 = "好，談話到此結束。晚安，老師"
10004-31 = "老師"
10004-32 = "關於這個月的射擊訓練報告書……"
10004-33 = "比起這個，陽奈"
10004-34 = "現在有個更重要的事"
10004-35 = "……？"
10004-36 = "什麼？"
10004-37 = "難道是忘記了什麼議題……"
10004-38 = "一起去購物吧"
10004-39 = "……"
10004-40 = "……哈啊？"
10004-41 = "咦？"
10004-42 = "購物？"
10004-43 = "……為什麼？"
10004-44 = "因為是約定"
10004-45 = "因為是重要的事"
10004-46 = "但是，購物中心和其他地方晚上都關門了……"
10004-47 = "24小時營業的地方"
10004-48 = "或是一般中午"
10004-49 = "啊"
10004-50 = "……抱歉，現在理解了"
10004-51 = "……"
10004-52 = "……嗯，約好了呢"
10004-53 = "我知道了"
10004-54 = "我會安排出時間的，等著"
10004-55 = "老師"
10004-56 = "今天，關於前陣子的工作"
10004-57 = "今天的陽光很舒服呢"
10004-58 = "非常好的天氣"
10004-59 = "咦？"
10004-60 = "天氣……？"
10004-61 = "我不在意，天氣好也不會有什麼變化"
10004-62 = "也就是說，這是個絕佳的散步好天氣！"
10004-63 = "與其工作不如去散步吧！！"
10004-64 = "散步……？"
10004-65 = "那個……"
10004-66 = "現在？"
10004-67 = "……好吧，如果只是一下下……"
10004-68 = "真是的……"
10004-69 = "老師真的是……"
10004-70 = "……真受不了"
10004-71 = "這幾天都徹夜忙得不可開交……真是麻煩"
10004-72 = "許多案件需要長途跋涉，未處理的檔案堆積如山……"
10004-73 = "發生事情時大家都看向我……"
10004-74 = "……呼"
10004-75 = "因此，在大家休息的日子也像這樣一個人在工作……"
10004-76 = "好煩，煩死了"
10004-77 = "哈啊……"
10004-78 = "大家都很依賴你呢"
10004-79 = "當委員長不容易呢，辛苦了"
10004-80 = "……"
10004-81 = "對不起，不知不覺發起了牢騷"
10004-82 = "忘了吧"
10004-83 = "那個……"
10004-84 = "昨天晚上，我有沒有……說了什麼奇怪的話？"
10004-85 = "不知道是不是夢，想不太起來了……總覺得……"
10004-86 = "說了非常羞恥的事……"
10004-87 = "不……"
10004-88 = "沒有那樣的事，對吧？"
10004-89 = "什麼話？"
10004-90 = "不是做夢嗎？"
10004-91 = "……"
10004-92 = "……嗯，就當作是那樣"
10004-93 = "……謝謝"
10004-100040010 = "老師……可以打擾一下嗎？"
10004-100040020 = "哎呀，陽奈有什麼事嗎？"
10004-100040030 = "啊……那個……唔……"
10004-100040040 = "因為休年假的關係……"
10004-100040050 = "今天難得不用處理風紀委員會的事"
10004-100040060 = "所以我想說……如果老師願意的話，或許可以一起度過這個假日"
10004-100040070 = "啊……"
10004-100040080 = "啊，當然這只是我個人的想法而已"
10004-100040090 = "假如老師不願意的話，我也不會強迫你……"
10004-100040100 = "如果是這種事的話，我很樂意被你強迫"
10004-100040110 = "我馬上過去！"
10004-100040120 = "是……嗎？"
10004-100040130 = "啊，嗯"
10004-100040140 = "呵呵，那我等你哦，老師"

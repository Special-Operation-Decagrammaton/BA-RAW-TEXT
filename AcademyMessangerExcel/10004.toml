[translation]
10004-1 = "선생님. 급작스럽겠지만 당신과 논의할 일이 있어."
10004-2 = "내 업무가 끝나는 심야에 잠깐 만날 수 있을까?"
10004-3 = "물론이야. 히나의 부탁이라면."
10004-4 = "업무가 심야에 끝나는구나……."
10004-5 = "응. 늦은 시간에 미안하지만…… 약속 장소는 내가 알려줄게."
10004-6 = "내가 선생님의 수면 시간을 방해한 게 아니었을까."
10004-7 = "만약 그런 거였다면 말해 줘."
10004-8 = "폐를 끼치고 싶진 않으니까."
10004-9 = "히나 쨩이라면 잔뜩 폐를 끼쳐 줘도 괜찮아."
10004-10 = "괜찮으니 잠을 좀 자도록 해."
10004-11 = "……응. 고마워."
10004-12 = "잘 자. 선생님."
10004-13 = "선생님. 이번 휴일의 심야 시간에 시간 괜찮을까?"
10004-14 = "아아. 나는 그때 일이 끝나거든."
10004-15 = "일정이 안 맞으면 어쩔 수 없지만."
10004-16 = "괜찮아. 그때 보자."
10004-17 = "생각해봤는데, 너무 주변 시선을 신경 쓰는 것도 좋지 않을 것 같아."
10004-18 = "어디까지나 업무상의 미팅이니까."
10004-19 = "다음엔 시간을 내서 좀 더 밝은 날에 볼 수 있었으면 좋을지도……."
10004-20 = "밝은 날의 히나 쨩이라…… 기대되네."
10004-21 = "즐거울 거 같아."
10004-22 = "무, 무슨 생각하는 거야!"
10004-23 = "데이트 같은 게 아니야! 알고 있지?"
10004-24 = "업무라고, 업무!"
10004-25 = "밝은 날에 히나 쨩과 업무라…… 기대되네."
10004-26 = "……."
10004-27 = "하아."
10004-28 = "뭐, 맞아. 나도 조, 조금은……."
10004-29 = "기대하고 있으니까."
10004-30 = "잘 자, 선생."
10004-31 = "선생."
10004-32 = "이번 달의 전술 사격훈련의 보고서 말인데……."
10004-33 = "그런 것보다, 히나 쨩."
10004-34 = "지금은 더 중요한 게 있어."
10004-35 = "응?"
10004-36 = "으, 으응."
10004-37 = "뭐지?"
10004-38 = "나랑 같이 쇼핑몰에 가줘야겠어."
10004-39 = "……."
10004-40 = "……응?"
10004-41 = "쇼"
10004-42 = "쇼핑몰?"
10004-43 = "거긴 왜?"
10004-44 = "해야 할 일이 있어서."
10004-45 = "중요한 일이 있어서."
10004-46 = "그치만 쇼핑몰이라면 밤에는 문을 닫잖아……."
10004-47 = "24시간 하는 곳이라면……."
10004-48 = "……."
10004-49 = "아."
10004-50 = "무, 무슨 말인지 이해했어."
10004-51 = "……."
10004-52 = "그래……. 약속했으니까."
10004-53 = "알았어."
10004-54 = "어떻게든 시간을 내볼게."
10004-55 = "선생."
10004-56 = "오늘 말인데……."
10004-57 = "오늘 햇볕이 좋아. 히나 쨩."
10004-58 = "날씨가 완전 좋아."
10004-59 = "응?"
10004-60 = "날씨?"
10004-61 = "하아…… 그런 건 됐고."
10004-62 = "이런 날엔 산책이지!"
10004-63 = "산책 가자!!"
10004-64 = "산책?"
10004-65 = "어, 어어……"
10004-66 = "지금?"
10004-67 = "아…… 알았어. 잠깐이라면……."
10004-68 = "선생……."
10004-69 = "진짜……."
10004-70 = "……하아."
10004-71 = "며칠 전부터 철야 근무 중이라서 정신이 없어."
10004-72 = "거기에 파견 임무까지 겹치고, 처리해야 하는 서류는 쌓여가고……."
10004-73 = "무슨 일만 생기면 다들 내 얼굴만 쳐다보고……."
10004-74 = "……."
10004-75 = "심지어 모두 다 쉬는 날에도 이렇게 혼자 나와서 일하고 있다니……."
10004-76 = "귀찮고 짜증 나."
10004-77 = "하아……."
10004-78 = "히나는 모두에게 기대받으니까."
10004-79 = "히나는 선도부장이니까."
10004-80 = "……."
10004-81 = "미안. 선생님에게 투덜대려는 게 아니었는데."
10004-82 = "잊어줘."
10004-83 = "저기……"
10004-84 = "어제 내가 무슨 이상한 소릴 하진…… 않았지?"
10004-85 = "꿈인지 아닌지 잘 기억나진 않는데……. 뭔가……"
10004-86 = "엄청 부끄러운 얘기를……."
10004-87 = "설마……"
10004-88 = "아니지?"
10004-89 = "글쎄? 무슨 얘긴지 잘……."
10004-90 = "꿈을 꾼 게 아닐까?"
10004-91 = "……."
10004-92 = "……음. 그래. 역시 그렇겠지?"
10004-93 = "……고마워."
10004-100040010 = "선생님…. 잠깐 괜찮을까?"
10004-100040020 = "어라, 히나. 무슨 일이야?"
10004-100040030 = "아… 그게…. 으응…."
10004-100040040 = "오늘은 연차를 낸 덕에…"
10004-100040050 = "모처럼 그, 선도부 일을 쉬는 날이거든."
10004-100040060 = "그러니 선생님만 괜찮다면 조금은 같이 휴일을 보내면 어떨까… 해서"
10004-100040070 = "아…."
10004-100040080 = "아, 물론, 어디까지나 내 개인의 바람이고."
10004-100040090 = "선생님이 곤란하다면 결코 억지를 부리려는 건…."
10004-100040100 = "그런 거라면 오히려 억지를 부려줬으면 좋겠어."
10004-100040110 = "그럼 지금 바로 그쪽으로 갈게!"
10004-100040120 = "그…래?"
10004-100040130 = "어, 으응."
10004-100040140 = "후후, 그럼 기다리고 있을게. 선생님."

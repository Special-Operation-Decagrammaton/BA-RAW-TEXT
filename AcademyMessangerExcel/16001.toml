[translation]
16001-2052 = "主人──！現在有時間嗎？"
16001-2053 = "要去咖啡廳嗎？"
16001-2054 = "主人……？"
16001-2055 = "突然要去咖啡廳？"
16001-2056 = "嗯？有什麼奇怪的嗎？"
16001-2057 = "我是女僕，所以是主人唷！"
16001-2058 = "細節不要在意，不要在意！"
16001-2059 = "嗯！咖啡廳！"
16001-2060 = "有間中意的咖啡廳，走吧！"
16001-2061 = "那我在店門口等著！"
16001-2062 = "待會兒見──！"
16001-2063 = "今天謝啦──主人！"
16001-2064 = "任務也完成了，真是個好日子──！"
16001-2065 = "這也是因為有主人在的關係嗎？"
16001-2066 = "那下次再連絡唷，主人！"
16001-2067 = "幫幫我，主人──！"
16001-2068 = "需要主人的幫助！"
16001-2069 = "也許！一定！可能！"
16001-2070 = "之類的感覺，能來幫我嗎？"
16001-2071 = "會來吧？會吧？"
16001-2072 = "需要我的幫助……？"
16001-2073 = "和往常一樣突然呀"
16001-2074 = "嗯！"
16001-2075 = "會來吧？謝謝──！"
16001-2076 = "那我等著唷！"
16001-2077 = "今天是最棒的一天！！"
16001-2078 = "真的很謝謝你唷，主人！"
16001-2079 = "果然聯絡主人是正確的唷──"
16001-2080 = "和主人在一起，總是發生好事！"
16001-2081 = "下次見囉！"
16001-2082 = "明日奈會祈禱明天也是美好的一天！"
16001-2083 = "主人──！現在有時間嗎？"
16001-2084 = "為了感謝一直以來所做的一切"
16001-2085 = "我想向主人道謝！"
16001-2086 = "道謝？我嗎？"
16001-2087 = "我有為你做什麼嗎……？"
16001-2088 = "嗯！"
16001-2089 = "發生過很多事了嘛！"
16001-2090 = "能被明日奈侍奉的機會可不是每次都有的唷！"
16001-2091 = "總之晚點會過去！"
16001-2092 = "晚點見，主人！"
16001-2093 = "嗯……"
16001-2094 = "嗯～～～～～！"
16001-2095 = "總覺得不夠痛快～！！還少了點什麼！"
16001-2096 = "下次再拜託了！主人！"
16001-2097 = "絕對要唷！"
16001-2098 = "絕對！"
16001-2099 = "啊，外送很好吃呢"
16001-2100 = "下次再一起吃吧！！"
16001-160010010 = "糟了！"
16001-160010020 = "糟糕了主人！快來救我！"
16001-160010030 = "……！？"
16001-160010040 = "怎，怎麼了……？"
16001-160010050 = "……？"
16001-160010060 = "咦？"
16001-160010070 = "我現在怎麼了？"
16001-160010080 = "……？咦？"
16001-160010090 = "怎，怎麼回事……？"
16001-160010100 = "啊"
16001-160010110 = "嗯"
16001-160010120 = "沒錯！就是那種感覺！"
16001-160010130 = "這次是真的，真的需要"
16001-160010140 = "幫忙"
16001-160010150 = "？"
16001-160010160 = "咦？怎麼了嗎，主人？"
16001-160010170 = "發生什麼事了嗎？"
16001-160010180 = "到了～！"
16001-160010190 = "主人平安回到夏萊了嗎？"
16001-160010200 = "今天雖然託你的福得救了，不過該怎麼說呢，真抱歉"
16001-160010210 = "不用放在心上，我是明日奈的老師呀"
16001-160010220 = "嘛，那個，你沒生氣就好……"
16001-160010230 = "不過，為什麼突然就治好了呢？"
16001-160010240 = "唔嗯，這麼說來那個時候……"
16001-160010250 = "總之，多虧有主人才得救這件事是真的呢！"
16001-160010260 = "身為女僕，得用很多侍奉來報答才行！"
16001-160010270 = "那麼再見囉，主人！"
16001-160010280 = "再說一次，今天真的非常感謝！"

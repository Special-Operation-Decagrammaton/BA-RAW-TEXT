[translation]
16001-2052 = "นายท่าน! พอจะมีเวลาว่างบ้างมั้ย?"
16001-2053 = "เราไปที่คาเฟ่กันดีมั้ย?"
16001-2054 = "บอกว่าให้เรียกคุณครูแทนนายท่าน\nยังไงล่ะ"
16001-2055 = "ทำไมจู่ๆ ถึงชวนไปคาเฟ่ล่ะ?"
16001-2056 = "หืม?"
16001-2057 = "อาสึนะเป็นเมดเพราะงั้นก็ต้องเรียก\n\"นายท่าน\" ยังไงล่ะ!"
16001-2058 = "คิคิคิ อย่าใส่ใจเรื่องเล็กน้อยเลยนะ"
16001-2059 = "อื้ม! คาเฟ่!"
16001-2060 = "มีคาเฟ่ที่ฉันเล็งไว้อยู่ ลองไปที่นั่น\nกันเถอะ!"
16001-2061 = "แล้วฉันจะไปรอนะ"
16001-2062 = "นายท่าน!"
16001-2063 = "วันนี้ขอบคุณมากนะ นายท่าน!"
16001-2064 = "ได้นายท่านช่วยไว้ เลยทำภารกิจ\nได้สำเร็จ! คิคิ"
16001-2065 = "ทั้งหมดนี่คงเพราะได้นายท่านช่วยไว้สินะ"
16001-2066 = "ถ้างั้นต่อไป ฉันก็จะติดต่อนายท่าน\nไปเป็นระยะๆ เลย!"
16001-2067 = "ทำไมวันนี้ถึงรู้สึกดีจังน้า"
16001-2068 = "ถ้านายท่านอยู่ด้วยก็คงจะดีนะ!"
16001-2069 = "ช่วยด้วย!"
16001-2070 = "ฉันอยากให้นายท่านช่วย!"
16001-2071 = "จะช่วยฉันใช่มั้ย? ใช่มั้ยน่ะ?"
16001-2072 = "จู่ๆ มีอะไรให้ช่วยเหรอ?"
16001-2073 = "ชอบโผล่มาปุปปับทุกทีเลยน้า"
16001-2074 = "อื้อ! ใช่แล้วล่ะ!"
16001-2075 = "ช่วยด้วย!"
16001-2076 = "ถ้างั้นฉันจะรอนะ!"
16001-2077 = "อ่า... วันนี้เป็นวันที่ยอดเยี่ยมจริงๆ"
16001-2078 = "ขอบคุณมากนะ นายท่าน!"
16001-2079 = "ว่าแล้วเชียว ดีจริงๆ ที่ตัดสินใจเรียก\nนายท่านมา"
16001-2080 = "นายท่านเหมือนเครื่องรางศักดิ์สิทธิ์\nสำหรับอาสึนะเลย!"
16001-2081 = "แล้วฉันจะติดต่อไปใหม่นะ"
16001-2082 = "ขอให้วันนี้เป็นวันที่ดี!"
16001-2083 = "นายท่าน! ตอนนี้ว่างรึเปล่า?"
16001-2084 = "ที่ผ่านมานายท่านช่วยเหลืออาสึนะเอาไว้\nตั้งเยอะ"
16001-2085 = "อาสึนะเลยอยากแสดงความขอบคุณ!"
16001-2086 = "แสดงความขอบคุณ?\nให้ครูเหรอ?"
16001-2087 = "ไม่ได้ทำอะไรมากมายเลยนะ..."
16001-2088 = "โอกาสที่จะได้รับการดูแลจากเมดสาว\nไม่ได้มีบ่อยๆ นะ!"
16001-2089 = "อืม..."
16001-2090 = "อาจจะนะ? คิคิ"
16001-2091 = "เอาเป็นว่าเดี๋ยวฉันจะไปหานะ!"
16001-2092 = "เดี๋ยวเจอกันนะ นายท่าน!"
16001-2093 = "เอ่อ... อื้ม..."
16001-2094 = "อื้อออ~!!"
16001-2095 = "อึดอัดจังเลย! รู้สึกอึดอัดแปลกๆ จัง!"
16001-2096 = "คราวหน้าก็ขอรบกวนด้วยนะ นายท่าน!"
16001-2097 = "คราวหน้าห้ามปฏิเสธฉันนะ\nเข้าใจรึเปล่า?"
16001-2098 = "อ่า..."
16001-2099 = "อาหารที่สั่งมาส่งนี่อร่อยจังเลย"
16001-2100 = "คราวหน้าไว้ไปกินด้วยกันนะ!!!"
16001-160010010 = "เกิดเรื่องใหญ่แล้ว นายท่าน!\nเรื่องใหญ่แล้ว!"
16001-160010020 = "ช่วยด้วย! เดี๋ยวนี้เลย!"
16001-160010030 = "ตอนนี้เบื่อๆ เซ็งๆ อีกแล้วเหรอ?"
16001-160010040 = "กำลังคิดเลยว่าทำไมเงียบๆ ไป\nมีเรื่องอีกแล้วเหรอ..."
16001-160010050 = "...?"
16001-160010060 = "เอ๋"
16001-160010070 = "เมื่อกี้ว่ายังไงนะ? พูดว่าไงนะ?"
16001-160010080 = "อะไรนะ?"
16001-160010090 = "ยังไม่ถึงหนึ่งนาทีเลย ลืมแล้วเหรอ?"
16001-160010100 = "อืม..."
16001-160010110 = "อื้อ"
16001-160010120 = "ใช่แล้ว! ความรู้สึกแบบนั้นละ!"
16001-160010130 = "คราวนี้เรื่องจริงนะ เรื่องจริงเลยแหละ\nต้องการความช่วยเหลือจริงๆ นะ"
16001-160010140 = "จำเป็นมาก"
16001-160010150 = "?"
16001-160010160 = "เอ๋...? มีอะไรเหรอนายท่าน?"
16001-160010170 = "มีเรื่องอะไรเหรอ?"
16001-160010180 = "ถึงบ้านแล้ว-!"
16001-160010190 = "นายท่านถึงรึยัง? นายท่านอยู่ด้วย\nวันนี้เลยสบายสุดๆ เลย!"
16001-160010200 = "เหมือนให้นายท่านช่วยอยู่ฝ่ายเดียว\nรู้สึกผิดจัง"
16001-160010210 = "ไม่ต้องคิดมากหรอก\nมันเป็นหน้าที่ของครูนะ"
16001-160010220 = "ถ้าอาสึนะชอบ ครูก็ไม่มีปัญหาหรอก..."
16001-160010230 = "ว่าแต่ ทำไมถึงหายได้นะ?\nโดนอะไรกระตุ้นกันนะ"
16001-160010240 = "อืม~ นั่นสินะ... ไม่ค่อยจะเข้าใจเท่าไร"
16001-160010250 = "เอาเป็นว่ามันก็เหมือนกับ\nได้รับความช่วยเหลือนั่นละ!"
16001-160010260 = "การทำงานบริการก็เป็นหน้าที่ของ\nสาวใช้ด้วยเหมือนกัน ต่อไปคงมีโอกาส\nตอบแทนอีกเยอะแน่นอน! "
16001-160010270 = "งั้นไว้เจอกันนะ นายท่าน!"
16001-160010280 = "ขอบคุณสำหรับวันนี้นะ!"

[translation]
16001-2052 = "주인님! 혹시 지금 시간 돼?"
16001-2053 = "카페라도 갈래?"
16001-2054 = "선생님이 아니라 주인님?"
16001-2055 = "갑자기 웬 카페?"
16001-2056 = "응?"
16001-2057 = "아스나는 메이드니까 당연히 주인님이지!"
16001-2058 = "ㅎㅎㅎㅎ 사소한 건 신경 쓰지 마"
16001-2059 = "응! 카페!"
16001-2060 = "봐 둔 카페가 있으니까, 거기서 보자!"
16001-2061 = "그럼 기다리고 있을게"
16001-2062 = "주인님!"
16001-2063 = "오늘 정말 고마웠어, 주인님!"
16001-2064 = "덕분에 작전도 잘 풀렸네! ㅎㅎ"
16001-2065 = "역시 전부 다 주인님 덕일까나?"
16001-2066 = "그럼 앞으로도 종종 연락할게. 주인님!"
16001-2067 = "오늘 왠지 그런 날이야"
16001-2068 = "주인님이 있었으면 좋겠어!"
16001-2069 = "도움!"
16001-2070 = "주인님의 도움이 필요해!"
16001-2071 = "도와줄 거지? 그렇지?"
16001-2072 = "갑자기 도움?"
16001-2073 = "언제나처럼 갑작스럽네."
16001-2074 = "응! 맞아!"
16001-2075 = "도움!"
16001-2076 = "그럼 기다리고 있을게!"
16001-2077 = "아아~ 최고의 하루였다."
16001-2078 = "정말 고마워, 주인님!"
16001-2079 = "역시 주인님을 부르길 잘한 것 같아"
16001-2080 = "주인님은 아스나에게 뭔가의 부적 같은 걸지도!"
16001-2081 = "그럼 또 연락할게"
16001-2082 = "좋은 하루!"
16001-2083 = "주인님! 지금 시간 괜찮아?"
16001-2084 = "그동안의 주인님이 아스나를 많이 도와줬으니까"
16001-2085 = "감사의 보답이라도 할까 하는데!"
16001-2086 = "감사의 보답? 나한테?"
16001-2087 = "내가 뭘 했었지……?"
16001-2088 = "메이드의 봉사를 받을 기회는 흔치 않다고!"
16001-2089 = "음"
16001-2090 = "아마도? ㅎㅎ"
16001-2091 = "아무튼 나중에 찾아 갈 테니까!"
16001-2092 = "그럼 그때 보자, 주인님!"
16001-2093 = "……으음."
16001-2094 = "으음~!!"
16001-2095 = "답답해~!! 아직 뭔가 답답해!"
16001-2096 = "다음번에 다시 부탁할게! 주인님!"
16001-2097 = "그때는 거절하면 안 돼, 알았지?"
16001-2098 = "아"
16001-2099 = "배달 음식은 맛있었어."
16001-2100 = "다음에 또 같이 먹자!!!"
16001-160010010 = "큰일이야, 주인님! 큰일!"
16001-160010020 = "도움이 필요해! 지금 바로!"
16001-160010030 = "뭔가 또 지루하거나 따분해진 거야?"
16001-160010040 = "어쩐지 최근 별일 없다 싶었더니, 또……"
16001-160010050 = "……?"
16001-160010060 = "어"
16001-160010070 = "방금 나 뭐라고 했던가? 방금 뭐라고 했었어?"
16001-160010080 = "……? 예?"
16001-160010090 = "1분도 안 돼서 말한 걸 잊어버린 거야?"
16001-160010100 = "어어"
16001-160010110 = "응"
16001-160010120 = "맞아! 그런 느낌이야!"
16001-160010130 = "이번에는 진짜인걸. 진짜라고, 진짜! 진짜 도움이"
16001-160010140 = "필요"
16001-160010150 = "?"
16001-160010160 = "에? 무슨 일이야, 주인님?"
16001-160010170 = "무슨 일 있어?"
16001-160010180 = "집에 도착-!"
16001-160010190 = "주인님은 잘 들어갔어? 덕분에 오늘은 완전 편했네!"
16001-160010200 = "뭔가 엄청나게 도움만 받은 거 같아서 미안한걸."
16001-160010210 = "신경 쓰지 마. 그것도 내 일인걸."
16001-160010220 = "뭐, 아스나가 좋았다면야……."
16001-160010230 = "근데 왜 풀린 거지? 무슨 자극이 있었던 걸까."
16001-160010240 = "으음~. 글쎄…… 잘 모르겠지만"
16001-160010250 = "어쨌든 도움받았다는 건 마찬가지지!"
16001-160010260 = "뭐, 봉사하는 게 메이드의 일이니까. 앞으로 은혜 갚을 기회는 많겠지!"
16001-160010270 = "그럼 또 봐, 주인님!"
16001-160010280 = "다시 한번 오늘 정말 고마웠어!"
16001-160010290 = "주인님"
16001-160010300 = "혹시 시간 괜찮아?"
16001-160010310 = "아스나 도움!!"
16001-160010320 = "마침 딱 시간 괜찮았는데"
16001-160010330 = "어디로 갈까?"
16001-160010340 = "오"
16001-160010350 = "럭키~!!"
16001-160010360 = "여기가 어디냐면"

[translation]
20057-200570010 = "밀레니엄은 어떠신가요, 주인님."
20057-200570020 = "사실 이젠 익숙해지셨을지도 모르지만요."
20057-200570030 = "익숙하다면 익숙한데."
20057-200570040 = "왜 밀레니엄은 나날이 새로울까……"
20057-200570050 = "어머나."
20057-200570060 = "그건 조금 죄송한 부분일지도 모르겠네요."
20057-200570070 = "하지만, 이 기회에"
20057-200570080 = "저희 일상을 참관하시는 것도 좋지 않을까요?"
20057-200570090 = "선생님."
20057-200570100 = "말씀 주신 대로, 저는 준비되었습니다."
20057-200570110 = "좋아. 해 보자."
20057-200570120 = "네."
20057-200570130 = "이제부터 밤을 거의 새서라도 좋으니……!"
20057-200570140 = "'친해지길 바래' 대본 작성 작전, 시작이다!"
20057-200570150 = "네. 선생님."
20057-200570160 = "선생님과 거의 밤을 새우다시피"
20057-200570170 = "시뮬레이션을 해 가며"
20057-200570180 = "'대본'을 작성한 건 좋은데"
20057-200570190 = "……정말로, 괜찮을까요?"
20057-200570200 = "사실 나도 모르겠어……"
20057-200570210 = "하지만 우린 할 수밖에 없어……"
20057-200570220 = "그건 확실히 그렇겠네요."
20057-200570230 = "안녕하세요. 선생님."
20057-200570240 = "선생님 덕분이겠지만"
20057-200570250 = "반 아이들과 조금 더 잘 지내게 된 것 같아요."
20057-200570260 = "다행이네!"
20057-200570270 = "아카네라면 잘할 줄 알았어!"
20057-200570280 = "네."
20057-200570290 = "그래서 말인데요."
20057-200570300 = "선생님만 괜찮으시다면"
20057-200570310 = "그런 제 모습을, 보여 주고 싶다는 생각을 했답니다."
20057-200570320 = "단둘이서, 말이에요."
20057-200570330 = "아카네……?"
20057-200570340 = "저, 선생님."
20057-200570350 = "오늘, 동급생이 되어 주셔서 감사했습니다."
20057-200570360 = "동급생을 두고 먼저 가 버리다니……."
20057-200570370 = "토라져 버릴 테다……."
20057-200570380 = "죄송해요……"
20057-200570390 = "하지만……"
20057-200570400 = "생각했던 것보다도 더……"
20057-200570410 = "부끄럽더라고요……"
20057-200570420 = "요즘 드는 생각인데"
20057-200570430 = "청소를 할 때"
20057-200570440 = "너무 모든 걸 한 가지 방법으로만 처리하는 것은 아닌가"
20057-200570450 = "그런 고민이 조금 들어요"
20057-200570460 = "원래 청소는 한 가지 방식으로 하는 거 아니야?"
20057-200570470 = "아뇨. 음. 그러니까."
20057-200570480 = "그쪽 청소가 아닌"
20057-200570490 = "다른 쪽 청소를 말씀드리는 거예요."
20057-200570500 = "어, 그러니까."
20057-200570510 = "……폭탄?"
20057-200570520 = "네."
20057-200570530 = "정말, 고민이네요……."
20057-200570540 = "늦은 시간까지 너무 고생 많으셨어요……"
20057-200570550 = "아카네는 괜찮아……?"
20057-200570560 = "네."
20057-200570570 = "늦었지만 숙제도 다 했고."
20057-200570580 = "등교 준비도 완벽하답니다."
20057-200570590 = "모두, 지도해 주신 덕분이에요."
20057-200570600 = "이럴 때마다 내 교육 방침을 되돌아보게 된단다……"
20057-200570610 = "후후."
20057-200570620 = "스스로를 되돌아볼 수 있는 분의 말씀만큼"
20057-200570630 = "든든한 것도 없을 거예요."
20057-200570640 = "앞으로도 잘 부탁드리겠습니다."
20057-200570650 = "주인님."

[translation]
20040-200400010 = "老師～"
20040-200400020 = "作為萬魔殿的合作者"
20040-200400030 = "這次也有事要請你幫忙"
20040-200400040 = "皐月……？"
20040-200400050 = "怎麼了嗎？"
20040-200400060 = "這個還是見面再說比較好"
20040-200400070 = "我也剛好有話想跟你說"
20040-200400080 = "所以我現在就去夏萊～！"
20040-200400090 = "什麼！？"
20040-200400100 = "老師"
20040-200400110 = "我今天想試驗看看"
20040-200400120 = "其他的方法"
20040-200400130 = "你在夏萊吧？"
20040-200400140 = "嗯……？"
20040-200400150 = "在是在啦……"
20040-200400160 = "那就麻煩老師先在那待著"
20040-200400170 = "我立刻過去～！"
20040-200400180 = "皐月……？"
20040-200400190 = "什麼！？"
20040-200400200 = "感到高興吧，老師"
20040-200400210 = "哇哈哈哈！"
20040-200400220 = "呵呵，我都還沒開始說明"
20040-200400230 = "你就這麼高興了啊"
20040-200400240 = "很好奇是什麼事對吧？"
20040-200400250 = "莫名有種很不好的預感……"
20040-200400260 = "我打算以老師為對象"
20040-200400270 = "等等，想想還是見面再說比較好"
20040-200400280 = "我立刻過去～！"
20040-200400290 = "皐月……？"
20040-200400300 = "我按照老師的命令，回來好好休息了"
20040-200400310 = "催眠似乎也已經解除了"
20040-200400320 = "真是不能掉以輕心呢"
20040-200400330 = "你能平安回去真是太好了"
20040-200400340 = "此外"
20040-200400350 = "關於我真正的目標"
20040-200400360 = "還請替我保密"
20040-200400370 = "這種巨大的陰謀"
20040-200400380 = "絕對必須祕密地進行"
20040-200400390 = "別擔心，我會保密的"
20040-200400400 = "那就好"
20040-200400410 = "下次見囉～"
20040-200400420 = "老師，出大事了"
20040-200400430 = "這樣下去情報部就要"
20040-200400440 = "不對，不僅是情報部"
20040-200400450 = "整個萬魔殿都要崩潰了"
20040-200400460 = "發生什麼事了？"
20040-200400470 = "皐月？你還好嗎？"
20040-200400480 = "唔"
20040-200400490 = "危機已經近在眼前"
20040-200400500 = "但我會掙扎到最後一刻的"
20040-200400510 = "皐月，你在哪裡？"
20040-200400520 = "這裡是……"
20040-200400530 = "老師"
20040-200400540 = "打針這麼可怕，你竟然能忍得住"
20040-200400550 = "這個世界果然需要NK-ULTRA計畫"
20040-200400560 = "我要創造一個沒有預防接種的世界"
20040-200400570 = "讓大家不需要再受苦"
20040-200400580 = "這樣會讓大家面臨更大的痛苦吧……"
20040-200400590 = "總之"
20040-200400600 = "今天感謝你的幫忙"
20040-200400610 = "嗨，老師"
20040-200400620 = "今天的值日生是我哦"
20040-200400630 = "過來的路上注意安全哦，皐月"
20040-200400640 = "這可是個能從近距離"
20040-200400650 = "仔細觀察老師這名"
20040-200400660 = "萬魔殿候補合作者兼競爭對手的"
20040-200400670 = "絕佳機會呢"
20040-200400680 = "這種事一般是放在心裡想的吧？"
20040-200400690 = "你等著"
20040-200400700 = "我立刻過去～！"

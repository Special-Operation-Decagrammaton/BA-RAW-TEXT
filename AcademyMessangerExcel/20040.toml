[translation]
20040-200400010 = "ครู~"
20040-200400020 = "ครั้งนี้ก็มาช่วยงานในฐานะผู้ร่วมมือ"
20040-200400030 = "ของแพนเดโมเนียม โซไซตี้อีกรอบสิ"
20040-200400040 = "ซัตสึกิ...?"
20040-200400050 = "หมายถึงอะไรเหรอ?"
20040-200400060 = "มาเจอกันแล้วค่อยอธิบายน่าจะดีกว่านะ"
20040-200400070 = "ฉันมีเรื่องที่อยากบอกไว้ก่อนด้วย"
20040-200400080 = "จะไปหาที่ชาเล่ต์เดี๋ยวนี้ละ~!"
20040-200400090 = "เดี๋ยวก่อน?!"
20040-200400100 = "ครู"
20040-200400110 = "วันนี้ฉันว่าจะ"
20040-200400120 = "ทดลองด้วยวิธีอื่นน่ะ"
20040-200400130 = "อยู่ที่ชาเล่ต์ใช่มั้ย?"
20040-200400140 = "หืม...?"
20040-200400150 = "ก็อยู่นะ..."
20040-200400160 = "งั้นก็อย่าไปไหนล่ะ"
20040-200400170 = "ฉันจะไปหาเดี๋ยวนี้แหละ~!"
20040-200400180 = "ซัตสึกิ...?"
20040-200400190 = "เดี๋ยวก่อน?!"
20040-200400200 = "ดีใจจัง ครู"
20040-200400210 = "วะฮ่าฮ่าฮ่า!"
20040-200400220 = "ฮุฮุ ยังไม่ได้ฟังข่าว"
20040-200400230 = "แต่ดีใจขนาดนั้นเลย"
20040-200400240 = "สงสัยล่ะสิว่าเรื่องอะไร?"
20040-200400250 = "ลางสังหรณ์ไม่ค่อยดีแฮะ..."
20040-200400260 = "ฉันจะให้ครูเป็นเป้าหมาย"
20040-200400270 = "อืม เอาไว้เจอกันแล้วค่อยอธิบายน่าจะ\nดีกว่านะ"
20040-200400280 = "ฉันจะไปหาเดี๋ยวนี้แหละ~!"
20040-200400290 = "ซัตสึกิ...?"
20040-200400300 = "ฉันกลับมาตามคำสั่งของครูและก็ได้\nพักผ่อนเต็มอิ่มเลยละ"
20040-200400310 = "ตอนนี้การสะกดจิตคงจะหมดฤทธิ์แล้ว"
20040-200400320 = "ฉันจะประมาทไม่ได้จริงๆ เลยนะเนี่ย"
20040-200400330 = "โล่งอกไปทีนะที่กลับไปถึงอย่าง\nปลอดภัย"
20040-200400340 = "แล้วก็"
20040-200400350 = "เรื่องเป้าหมายที่แท้จริงของฉันน่ะ"
20040-200400360 = "ช่วยเก็บไว้เป็นความลับด้วยนะ"
20040-200400370 = "เพราะแผนร้ายที่ยิ่งใหญ่แบบนี้"
20040-200400380 = "ต้องทำอย่างลับๆ ยังไงล่ะ"
20040-200400390 = "ครูจะเก็บเป็นความลับ ไม่ต้องห่วงนะ"
20040-200400400 = "ดีเลย"
20040-200400410 = "งั้นไว้เจอกันใหม่นะ~"
20040-200400420 = "ครู เกิดเรื่องใหญ่แล้ว"
20040-200400430 = "ถ้าเป็นแบบนี้ต่อไป ฝ่ายข่าวกรอง"
20040-200400440 = "ไม่สิ ทั้งแพนเดโมเนียม โซไซตี้"
20040-200400450 = "ต้องพังพินาศแน่"
20040-200400460 = "หมายถึงอะไรเหรอ?"
20040-200400470 = "ซัตสึกิ? เป็นอะไรหรือเปล่า?"
20040-200400480 = "อึก"
20040-200400490 = "หายนะอยู่ตรงหน้าแล้ว"
20040-200400500 = "แต่ฉันก็จะดิ้นรนจนถึงที่สุด"
20040-200400510 = "ซัตสึกิ อยู่ไหนน่ะ?"
20040-200400520 = "ที่นี่คือ..."
20040-200400530 = "ครู"
20040-200400540 = "ตอนฉีดยาที่น่าสยอง ครูก็ทนได้เก่ง\nไม่เบาเลยนะ"
20040-200400550 = "โลกนี้ต้องการโปรเจกต์อัลตร้า NK\nจริงๆ อย่างที่คิดเลย"
20040-200400560 = "ฉันจะสร้างโลกที่ไม่ต้องมีการฉีดวัคซีน\nให้ได้"
20040-200400570 = "จะได้ไม่มีใครต้องทนทุกข์แบบนี้"
20040-200400580 = "แต่วัคซีนมันป้องกันไม่ให้เกิด\nความทุกข์ที่มากกว่านั้นนะ..."
20040-200400590 = "จะยังไงก็เถอะ "
20040-200400600 = "ขอบคุณที่มาช่วยวันนี้นะ"
20040-200400610 = "สวัสดี ครู"
20040-200400620 = "วันนี้ถึงคิวฉันเข้าเวรแล้ว"
20040-200400630 = "เดินทางมาดีๆ นะ ซัตสึกิ"
20040-200400640 = "นี่เป็นโอกาสดีที่ฉันจะได้"
20040-200400650 = "สังเกตครูที่เป็นทั้งคู่แข่งของฉัน"
20040-200400660 = "และผู้ร่วมมือของแพนเดโมเนียม\nโซไซตี้"
20040-200400670 = "อย่างใกล้ชิดเลยละ"
20040-200400680 = "ปกติเรื่องแบบนี้ต้องไม่บอกอีกฝ่าย\nไม่ใช่เหรอ?"
20040-200400690 = "รอเดี๋ยวนะ"
20040-200400700 = "ฉันจะไปหาเดี๋ยวนี้แหละ~!"

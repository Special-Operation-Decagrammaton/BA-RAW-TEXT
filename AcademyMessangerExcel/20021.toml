[translation]
20021-200210010 = "ช่วงนี้ฉันมีเรื่องกลุ้มใจค่ะคุณครู"
20021-200210020 = "ครูพอจะช่วยอะไรได้มั้ย?"
20021-200210030 = "อ๊ะ นั่นสินะคะ ถ้าเป็นคุณครูละก็!"
20021-200210040 = "แต่นี่จะเป็นการรบกวนมากเกินไปหรือ\nเปล่านะ..."
20021-200210050 = "การฟังเรื่องกลุ้มใจของนักเรียน\nคือหน้าที่ของครูอยู่แล้ว"
20021-200210060 = "ถ้างั้นขอรบกวนหน่อยได้มั้ยคะ?"
20021-200210070 = "ฉันจะไปหาคุณครูเองค่ะ!"
20021-200210080 = "ถึงเรื่องกลุ้มใจจะน่าปวดหัว แต่ก็ดี\nเหมือนกันนะคะ!"
20021-200210090 = "ถึงจะไม่ได้ข้อสรุปที่ชัดเจน แต่ก็ได้\nความมั่นใจกลับมาค่ะ"
20021-200210100 = "จริงแท้แน่นอนเลย"
20021-200210110 = "ว่าแต่ ทำไมอยู่ๆ ถึงเล่า 'เรื่องกลุ้มใจ'\nล่ะ...?"
20021-200210120 = "ฉันได้ข้อสรุปเกี่ยวกับปัญหาที่ฉันกลุ้ม\nใจมาตลอดแล้วค่ะ"
20021-200210130 = "ฉันจะโชว์ให้คุณครูดูด้วย ช่วยตั้งตารอ\nด้วยนะคะ!"
20021-200210140 = "สวัสดีค่ะคุณครู"
20021-200210150 = "การถักนิตติ้งถุงเท้านี่ ไม่ว่าเมื่อไรมัน\nก็สนุกตลอดเลยนะคะ"
20021-200210160 = "ถักถุงเท้างั้นเหรอ?"
20021-200210170 = "สำหรับฉันแล้วมันเหมือนพิธีกรรม\nอย่างหนึ่งเลยละค่ะ"
20021-200210180 = "พอถึงเวลานี้ของปี ฉันก็จะถักถุงเท้า\nตลอดเลยค่ะ"
20021-200210190 = "ว่าไงนะ...?"
20021-200210200 = "อ๊ะ จริงสิ!"
20021-200210210 = "ฉันเชิญคุณครูมาที่ห้องได้มั้ยคะ?"
20021-200210220 = "มาเป็นผู้สมรู้ร่วมคิดกันไงคะ!"
20021-200210230 = "ไม่ได้คิดจะก่ออาชญากรรมอะไรใช่มั้ย?!"
20021-200210240 = "คุณครูคะ! คุณครู!"
20021-200210250 = "ดูนี่สิคะ! ซานตาคลอสเอาของขวัญมา\nให้ฉันด้วยค่ะ!"
20021-200210260 = "แล้วก็กินนมกับคุกกี้ตรงนี้หมดด้วยค่ะ!"
20021-200210270 = "น่าเสียดายจังที่ไม่ได้เจอคุณลุง\nซานตาคลอส..."
20021-200210280 = "แต่ฉันก็ดีใจที่ได้ตอบแทนของขวัญ\nที่ได้มาด้วยของอร่อยๆ ค่ะ แหะๆๆ!"
20021-200210290 = "เยี่ยมเลย ฮานาเอะ"
20021-200210300 = "แต่ว่า ของขวัญที่ฉันได้มาคือยาฆ่าเชื้อ..."
20021-200210310 = "ซานตาคลอสคงอยากบอกให้ฉันใส่ใจ\nกับการฆ่าเชื้อเวลารักษาผู้ป่วยสินะคะ?"
20021-200210320 = "แต่การตัดส่วนที่เป็นแผลต้องใช้เวลา\nนาน หรือว่าต้องใช้ไฟเผาเลยนะ..."
20021-200210330 = "ไม่น่าจะหมายความแบบนั้นนะ?!"
20021-200210340 = "คือว่า... คุณครูคะ?"
20021-200210350 = "ฉันงานเข้านิดหน่อยน่ะค่ะ"
20021-200210360 = "แต่ไม่รู้ว่าจะบอกเรื่องนี้กับคุณครูได้\nรึเปล่า..."
20021-200210370 = "ฉันไม่รู้เลยค่ะ..."
20021-200210380 = "ฮานาเอะ? ไม่เป็นอะไรใช่มั้ย?"
20021-200210390 = "คะ? ค่ะ ฉันไม่เป็นไรอยู่แล้วค่ะ"
20021-200210400 = "แค่นี้สบายมากค่ะ!"
20021-200210410 = "แต่ว่า..."
20021-200210420 = "นั่นเป็นเรื่องสำคัญสำหรับฮานาเอะ\nเหรอ?"
20021-200210430 = "คะ?"
20021-200210440 = "ใช่แล้วค่ะ"
20021-200210450 = "แน่นอนว่ามันเป็นเรื่องสำคัญสำหรับฉันค่ะ\nแต่ว่า..."
20021-200210460 = "อืม งั้นไปเจอกันแล้วคุยเรื่องนี้กันนะ "

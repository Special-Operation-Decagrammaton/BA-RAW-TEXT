[translation]
20021-200210010 = "老師，其實我有個煩惱"
20021-200210020 = "這樣啊……是我可以問的煩惱嗎？"
20021-200210030 = "嗯，老師當然可以！"
20021-200210040 = "但是，會不會給老師添麻煩呢……"
20021-200210050 = "傾聽學生的煩惱，是老師的職責哦"
20021-200210060 = "那，可以拜託你嗎？"
20021-200210070 = "我現在就去找你！"
20021-200210080 = "雖然煩惱很讓人煎熬，但我覺得也是件好事！"
20021-200210090 = "只要能克服困難，就會更有自信！"
20021-200210100 = "似乎確實是那樣呢"
20021-200210110 = "話說，為什麼突然說到「煩惱」……？"
20021-200210120 = "因為我對一直煩惱著的事情，得出了自己的結論"
20021-200210130 = "我也會讓老師看到的，敬請期待！"
20021-200210140 = "老師！"
20021-200210150 = "你不覺得編織很有趣嗎？"
20021-200210160 = "編織……襪子之類的？"
20021-200210170 = "嗯，我正在做準備"
20021-200210180 = "每年的這個時期我都會製作"
20021-200210190 = "原來如此……？"
20021-200210200 = "啊，對了！"
20021-200210210 = "老師，可以來我的房間一趟嗎？"
20021-200210220 = "請務必成為我的共犯吧！"
20021-200210230 = "共犯！？"
20021-200210240 = "老師，老師！"
20021-200210250 = "請看！是聖誕老人給我的禮物！"
20021-200210260 = "而且，還把牛奶跟餅乾都吃光光了！"
20021-200210270 = "雖然很遺憾沒見到聖誕老人……"
20021-200210280 = "但是，似乎有成功送出禮物的回禮所以很開心。耶嘿嘿！"
20021-200210290 = "嗯，太好了"
20021-200210300 = "話說，收到消毒藥當禮物……"
20021-200210310 = "應該是要我今後在治療傷患時，更注重消毒的意思對吧？"
20021-200210320 = "要切除患部相當困難，果然還是要用火來"
20021-200210330 = "我覺得不是那個意思唷！？"
20021-200210340 = "那個，老師？"
20021-200210350 = "發生了一點事"
20021-200210360 = "可是我不知道"
20021-200210370 = "該不該把這件事告訴老師……"
20021-200210380 = "花繪？你沒事吧？"
20021-200210390 = "咦？是，當然。我沒事"
20021-200210400 = "完全沒問題！"
20021-200210410 = "但是……"
20021-200210420 = "那是對花繪重要的事吧？"
20021-200210430 = "嗯？"
20021-200210440 = "嗯"
20021-200210450 = "對我來說確實很重要。可是……"
20021-200210460 = "我知道了，那我們見面再說吧"

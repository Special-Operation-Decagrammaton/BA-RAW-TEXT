[translation]
20021-200210010 = "최근 고민이 생겼어요, 선생님."
20021-200210020 = "내가 들어줄 수 있는 거야?"
20021-200210030 = "아, 그러네요. 선생님이라면!"
20021-200210040 = "그렇지만 너무 폐를 끼치는 건 아닌지……"
20021-200210050 = "학생의 고민을 들어주는 게 선생님이 하는 일이야."
20021-200210060 = "그렇다면 부탁드려도 괜찮을까요?"
20021-200210070 = "제가 직접 찾아뵐게요!"
20021-200210080 = "고민이란 괴롭지만 좋은 것 같아요!"
20021-200210090 = "확실한 결론을 내리지 못하더라도, 자신감을 주니까요."
20021-200210100 = "확실히 그럴지도."
20021-200210110 = "그런데, 갑자기 왜 '고민' 이야기를……?"
20021-200210120 = "쭉 고민하던 문제에 대해 나름대로 결론을 내렸거든요."
20021-200210130 = "선생님께도 보여 드릴 테니 기대해 주세요!"
20021-200210140 = "안녕하세요, 선생님."
20021-200210150 = "뜨개질 양말을 만드는 건, 언제나 즐겁네요."
20021-200210160 = "양말이라니?"
20021-200210170 = "저한테는 일종의 의식 같은 거예요."
20021-200210180 = "매년 이 시기가 되면 만들곤 하죠."
20021-200210190 = "점점 더 모르겠는데……"
20021-200210200 = "아, 맞다!"
20021-200210210 = "선생님을 제 방에 초대 드려도 될까요?"
20021-200210220 = "이걸로 우린 공범이 되는 거죠!"
20021-200210230 = "범죄 같은 거 저지르는 건 아니지?!"
20021-200210240 = "선생님, 선생님!"
20021-200210250 = "보세요! 산타클로스가 선물을 주고 가셨어요!"
20021-200210260 = "그리고 우유와 쿠키도 다 드셔 줬어요!"
20021-200210270 = "산타클로스를 직접 보지 못했던 건 아쉽지만……"
20021-200210280 = "그래도 선물의 보답을 해 드릴 수 있었던 것 같아 기뻐요. 에헤헷."
20021-200210290 = "잘됐네, 하나에."
20021-200210300 = "그런데, 선물로 소독약을 받았다는 건……"
20021-200210310 = "앞으로도 환자들의 치료를 위해 더욱 소독에 열중하라는 뜻이겠죠?"
20021-200210320 = "환부 절단에는 시간이 오래 걸리니 역시 불을 써야 하나……"
20021-200210330 = "그런 뜻은 아니지 않을까?!"
20021-200210340 = "저, 선생님?"
20021-200210350 = "조금, 일이 생겼어요."
20021-200210360 = "그런데 이걸 선생님께 말씀드려도 되는지"
20021-200210370 = "그걸 잘 모르겠네요……."
20021-200210380 = "하나에? 괜찮은 거지?"
20021-200210390 = "네? 네. 물론이죠. 전 괜찮아요."
20021-200210400 = "끄떡없어요!"
20021-200210410 = "하지만……."
20021-200210420 = "그건 하나에에게 중요한 일이야?"
20021-200210430 = "네?"
20021-200210440 = "네."
20021-200210450 = "저에게는 확실히 중요한 일이에요. 그렇지만……."
20021-200210460 = "그래. 그러면 만나서 이야기하자. "

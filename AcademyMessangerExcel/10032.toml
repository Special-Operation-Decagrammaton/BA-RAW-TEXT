[translation]
10032-100320010 = "老師！"
10032-100320020 = "再次祝你新年快樂──！"
10032-100320030 = "不知不覺已經過年了啊……"
10032-100320040 = "嗯，新年快樂"
10032-100320050 = "耶──，老師那是什麼反應。無～聊"
10032-100320060 = "真拿你沒辦法……我為無精打采的老師準備了"
10032-100320070 = "連你也能一下就燃起鬥志的「極其有趣的事」！"
10032-100320080 = "無精打采……？"
10032-100320090 = "「極其有趣的事」……？"
10032-100320100 = "那就敬請期待吧，老師！"
10032-100320110 = "咦，咦……？"
10032-100320120 = "無月……？"
10032-100320130 = "老師，新年願望已經決定好了嗎？"
10032-100320140 = "當然！"
10032-100320150 = "這麼說來，還沒……"
10032-100320160 = "呵──，這樣啊"
10032-100320170 = "老師的願望，好在意吶──"
10032-100320180 = "啊，這樣啊"
10032-100320190 = "嘛，從現在開始慢慢決定不就行了嗎？"
10032-100320200 = "總之，老師，走吧！"
10032-100320210 = "那個，去哪兒？"
10032-100320220 = "難得過新年，所以很明顯吧？"
10032-100320230 = "新年就得去有新年氣氛的地方！"
10032-100320240 = "好啦好啦，快點準備！老師！"
10032-100320250 = "老師！來打羽根突吧！"
10032-100320260 = "這麼突然……？"
10032-100320270 = "我要一雪前恥！"
10032-100320280 = "來吧──，一決勝負！"
10032-100320290 = "我等著唷！快點快點！"
10032-100320300 = "託老師的福，新年過得非常開心！謝啦！"
10032-100320310 = "今後也要"
10032-100320320 = "也要經常和我一起玩唷，老師♡"

[translation]
10032-100320010 = "선생님~ 선생님~"
10032-100320020 = "새해 복 많이 받아~!"
10032-100320030 = "어, 벌써…. 새해인가?"
10032-100320040 = "응…. 무츠키도 새해 복 많이 받아."
10032-100320050 = "흐응, 뭐야~ 선생님의 반응, 재미없어~"
10032-100320060 = "뭐, 그런 평소에도 흐느적흐느적하는 선생님이라도 불타오를 수 있도록."
10032-100320070 = "내가 또 엄청난 걸 준비했지만 말이야!"
10032-100320080 = "흐느적흐느적…?"
10032-100320090 = "무츠키가 준비한, 거?"
10032-100320100 = "그럼 잔뜩 기대하고 있어~ 선생님!"
10032-100320110 = "응…? 무츠키?"
10032-100320120 = "저기요…?"
10032-100320130 = "선생님, 혹시 소원 같은 거 있어?"
10032-100320140 = "당연히 있지!"
10032-100320150 = "음, 딱히 없어."
10032-100320160 = "아하~ 역시 그렇구나."
10032-100320170 = "응, 하긴 평범하게 생각하면 소원 한둘쯤은 가지고 있을 테니까~"
10032-100320180 = "어라~? 그래?"
10032-100320190 = "흐응~ 뭐, 상관은 없지만!"
10032-100320200 = "그럼 가자! 선생님! 소원 빌러!"
10032-100320210 = "응? 갑자기 무슨 뜻이야?"
10032-100320220 = "모처럼의 새해잖아?"
10032-100320230 = "기왕이면 거기에 맞춘 이벤트를 즐길 필요가 있다구?"
10032-100320240 = "자, 그러니 집합이야! 선생님!"
10032-100320250 = "선생님! 엄청나게 하네츠키가 하고 싶어졌어!"
10032-100320260 = "갑자기 하네츠키를……?"
10032-100320270 = "지난번의 패배를, 하네츠키로 설욕해 줄 테니까!"
10032-100320280 = "선생님, 그럼 승부야!"
10032-100320290 = "기다리고 있을게!"
10032-100320300 = "이번 새해에도, 선생님과 함께해서 엄청 재미있었어."
10032-100320310 = "새해에도, 그리고 앞으로도."
10032-100320320 = "나랑 잔뜩 놀아줘야 해? 선생님♡"

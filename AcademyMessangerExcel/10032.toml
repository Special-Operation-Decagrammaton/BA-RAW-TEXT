[translation]
10032-100320010 = "คุณครูขา~ คุณครู~"
10032-100320020 = "สวัสดีปีใหม่~!"
10032-100320030 = "อ๊ะ วันนี้... ปีใหม่แล้วเหรอ?"
10032-100320040 = "อื้อ... ปีใหม่นี้ มุสึกิก็มีความสุขมากๆ นะ"
10032-100320050 = "ฮื้อออ อะไรเนี่ย~\nปฏิกิริยาของคุณครู ไม่สนุกเลย~"
10032-100320060 = "ก็นะ... เพื่อให้คุณครูที่มักจะ\nเอื่อยเฉื่อยอยู่ตลอดได้มีไฟขึ้นมา"
10032-100320070 = "เค้าเลยเตรียมของดีๆ เอาไว้แล้ว!"
10032-100320080 = "เอื่อยเฉื่อย...?"
10032-100320090 = "ของดีๆ ที่มุสึกิเตรียมมา?"
10032-100320100 = "ตั้งตารอได้เลย~ คุณครู!"
10032-100320110 = "หือ...? มุสึกิ?"
10032-100320120 = "ยังอยู่มั้ย...?"
10032-100320130 = "คุณครูมีความปรารถนา\nอะไรรึเปล่า?"
10032-100320140 = "ต้องมีอยู่แล้วสิ!"
10032-100320150 = "อืม... ไม่มีหรอก"
10032-100320160 = "อ่ะฮ่า~ คิดไว้แล้วเชียว"
10032-100320170 = "ก็นั่นสินะ คุณครูที่แสนธรรมดา\nก็คงมีความปรารถนาอยู่สักเรื่อง\nสองเรื่องเหมือนกันสินะ~"
10032-100320180 = "เอ๊ะ~? งั้นเหรอ?"
10032-100320190 = "ฮื้ม~ ก็นะ ไม่เป็นไรหรอก!"
10032-100320200 = "งั้นก็ไปกันเถอะ คุณครู!\nไปทำความปรารถนา\nให้เป็นจริงกัน!"
10032-100320210 = "หืม? จู่ๆ ก็พูดอะไรน่ะ?"
10032-100320220 = "ก็ตอนนี้มันปีใหม่นี่นา?"
10032-100320230 = "ก็ต้องไปสนุกกับงานเทศกาล\nที่นั่นกันหน่อยสิ?"
10032-100320240 = "เอาละ ถ้างั้นก็มารวมพลกัน! คุณครู!"
10032-100320250 = "คุณครู! เค้าอยากเล่นฮาเนะสึกิ\nมากๆ เลย!"
10032-100320260 = "ทำไมจู่ๆ ถึงอยากเล่นฮาเนะสึกิล่ะ...?"
10032-100320270 = "เพราะเค้าจะใช้ฮาเนะสึกิเอาคืน\nที่แพ้ครั้งที่แล้วยังไงล่ะ!"
10032-100320280 = "คุณครู นี่คือการแข่งขันนะ!"
10032-100320290 = "เค้าจะรอนะ!"
10032-100320300 = "วันปีใหม่ปีนี้ เค้าอยู่กับคุณครูสนุกมากเลยล่ะ"
10032-100320310 = "ทั้งในวันปีใหม่... แล้วก็จากนี้ไปด้วย"
10032-100320320 = "ต้องมาเล่นกับเค้าเยอะๆ นะ คุณครู♡"

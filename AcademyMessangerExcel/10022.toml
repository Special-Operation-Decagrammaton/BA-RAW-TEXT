[translation]
10022-100220010 = "선생. 여름이야."
10022-100220020 = "그러게~ 여름이네~"
10022-100220030 = "그리고 여름이라고 하면, 역시 바다지~!"
10022-100220040 = "응, 바다도 있지."
10022-100220050 = "선생."
10022-100220060 = "……제대로 듣고 있는 거 맞아?"
10022-100220070 = "물론이지!"
10022-100220080 = "히나의 말을 허투루 들을 리가 없잖아!"
10022-100220090 = "하아……."
10022-100220100 = "여름이라 마음이 풀어지는 건 이해하지만……."
10022-100220110 = "당신까지 그렇게 늘어져 있으면 나까지 곤란해."
10022-100220120 = "일이라는 건 언제나 어느 때나 쌓이는 법이야."
10022-100220130 = "이런 시기라도 예외는 아니지."
10022-100220140 = "풍기를 어지럽히는 학생들은 언제나 있으니까."
10022-100220150 = "……그러니 협력해줘. 선생."
10022-100220160 = "과연 수영복 차림이어도 히나 쨩은 성실하구나!"
10022-100220170 = "수영복을 입었는데도 선도부장으로서 빈틈이 없구나!"
10022-100220180 = "……풍기를 어지럽히는 선생부터 처리가 필요한 걸까."
10022-100220190 = "죄송합니다. 무엇이 필요하십니까?"
10022-100220200 = "하아. 정말이지……."
10022-100220210 = "약속한 장소로 나와. 기다리고 있을게."
10022-100220220 = "오늘의 업무 협조. 고마워. 선생."
10022-100220230 = "그럼, 이번 여름 합숙에서는 반드시 같이……."
10022-100220240 = "……."
10022-100220250 = "아, 아무것도 아니야."
10022-100220260 = "응. 같이 놀 수 있었으면 좋겠어."
10022-100220270 = "……."
10022-100220280 = "응."
10022-100220290 = "……선생, 오늘 저녁 약속 말인데."
10022-100220300 = "조금 뒤로 미룰 수 있을까?"
10022-100220310 = "좀체 일이 끝나질 않아서 말이야."
10022-100220320 = "어, 그런 약속 했던, 가?"
10022-100220330 = "그래? 그럼 어쩔 수 없지."
10022-100220340 = "아아, ……그건 오늘 했던 약속이 아니었던 걸까?"
10022-100220350 = "내가 착각했던 거라면, 잊어줘."
10022-100220360 = "……응, 이해해줘서, 고마워."
10022-100220370 = "요즘 정신이 없다 보니……."
10022-100220380 = "근데 그렇게나 바빠?"
10022-100220390 = "아, 심각한 정도는 아니야."
10022-100220400 = "원래 예정되었던 스케쥴을 변경하는 정도일까……."
10022-100220410 = "오늘은 순찰 업무 대신 서류 작성으로 하루를 보내게 될 것 같아."
10022-100220420 = "이미 충분히 심각한데요?!"
10022-100220430 = "뭐, 나한테는 흔히 있는 일이야."
10022-100220440 = "어쨌거나 선생과 대화를 나누고 나니 조금 후련해졌어."
10022-100220450 = "그럼 아직 남은 업무가 있다 보니 이만."
10022-100220460 = "나중에 봐."
10022-100220470 = "새삼스럽지만. 오늘 도와줘서 고마웠어. 선생."
10022-100220480 = "별말씀을요."
10022-100220490 = "하지만 언제까지고 이런 식으로 폐만 끼칠 순 없으니까."
10022-100220500 = "다음번엔 좀 더 업무를 빨리 끝내두고."
10022-100220510 = "그리고, 그……."
10022-100220520 = "기왕 여기까지 온 김에……."
10022-100220530 = "응, 선생 말대로, 조금은 쉬는 것도 좋을지 모르겠네."
10022-100220540 = "그때엔 오늘처럼 또 에스코트, 부탁할게."
10022-100220550 = "선생, 오늘은 일찍 업무 처리를 시작했으니까."
10022-100220560 = "아마 남은 일도 오전 중에 다 마무리가 될 것 같아."
10022-100220570 = "그래서 말인데……."
10022-100220580 = "응응! 물론입니다!"
10022-100220590 = "아니……, 본론을 꺼내기 전에 먼저 대답부터 해도 곤란하거든……?"
10022-100220600 = "나 참……. 어쨌거나 선생이 말했었지……."
10022-100220610 = "휴양지까지 와서, 쉬지 않는 건 엄청 아까운 일이라고."
10022-100220620 = "응, 기왕 바다까지 왔으니까."
10022-100220630 = "……나로선 잘 이해되지 않는 이야기지만."
10022-100220640 = "선생이 그렇게까지 말한다면야……."
10022-100220650 = "응. 좋아. 오후엔 같이 어울려줄래?"
10022-100220660 = "같이 바닷가에 놀러 가는 정도라면,"
10022-100220670 = "그, 할 수 있을 테니까."
10022-100220680 = "물론입니다!"
10022-100220690 = "응. 그럼……. 이따 점심쯤에 봐. 선생"
10022-100220700 = "오늘 즐거웠어."
10022-100220710 = "가끔은 이렇게, 바다를 바라보는 것도 나쁘지 않네."
10022-100220720 = "다음에"
10022-100220730 = "응. 물론이지!"
10022-100220740 = "……또 먼저 답하다니."
10022-100220750 = "후후, 정말 별나다니까."
10022-100220760 = "응, 그럼 그때에도 잘 부탁해. 선생."
10022-100220770 = "선생님…."
10022-100220780 = "그, ……오늘 시간 괜찮을까?"
10022-100220790 = "응, 물론이지!"
10022-100220800 = "히나가 부른다면 괜찮지 않아도 괜찮아!"
10022-100220810 = "그래? 다행이다……"
10022-100220820 = "으응? 저기, 선생님. 무슨 소리인지 잘 모르겠어."
10022-100220830 = "그래서 히나, 어떤 일 때문에 그래?"
10022-100220840 = "아, 그게…… 다른 게 아니라……"
10022-100220850 = "선생님만 괜찮다면… 수영을, 배워보고 싶다고……"
10022-100220860 = "조금 생각을……"
10022-100220870 = "그거라면 완전 환영이야! 지금 바로 갈게!"
10022-100220880 = "응? 선생님? 저기, 나, 자세한 이야기를 아직……"
10022-100220890 = "저기……? 선생님?"

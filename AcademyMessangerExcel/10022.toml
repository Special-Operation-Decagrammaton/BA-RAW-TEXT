[translation]
10022-100220010 = "……季節已經是夏天了嗎"
10022-100220020 = "是夏天呢！"
10022-100220030 = "說到夏天，就是大海呢！"
10022-100220040 = "嗯，大海呢"
10022-100220050 = "老師"
10022-100220060 = "……老師？還在嗎？"
10022-100220070 = "當然！"
10022-100220080 = "正全力關注MomoTalk唷！"
10022-100220090 = "呼……"
10022-100220100 = "因為是夏天，所以我可以理解會讓人興奮……"
10022-100220110 = "但連老師也這麼情緒高昂的話，總覺得要做的事會增加，很困擾"
10022-100220120 = "所謂的工作，就是會不斷的增加"
10022-100220130 = "這種時期也不例外"
10022-100220140 = "擾亂風紀的學生到處都有。尤其是夏天"
10022-100220150 = "……所以，我需要一點幫助"
10022-100220160 = "不愧是陽奈，即使是夏天也很認真呢！"
10022-100220170 = "風紀委員長到了夏天也毫不鬆懈！"
10022-100220180 = "……首先，先從感覺會帶亂風紀的老師開始處理似乎比較好？"
10022-100220190 = "對不起"
10022-100220200 = "唉，真是的……"
10022-100220210 = "那麼，地點之後會發送給你。我等著"
10022-100220220 = "今天謝謝你，老師。這對合宿很有幫助"
10022-100220230 = "另外，這次的夏天合宿，如果時間充裕的話，希望能一起……"
10022-100220240 = "不"
10022-100220250 = "沒什麼"
10022-100220260 = "能找到時間一起玩的話就好了呢"
10022-100220270 = "……"
10022-100220280 = "嗯"
10022-100220290 = "……老師，關於今晚的約定"
10022-100220300 = "可以改到別的日子嗎？"
10022-100220310 = "今天的工作有點忙不完"
10022-100220320 = "啊！抱歉，是今天嗎……？"
10022-100220330 = "沒問題唷，完全不用介意"
10022-100220340 = "……難道不是今天而是明天嗎？"
10022-100220350 = "可能是我記錯了，忘了吧"
10022-100220360 = "……嗯，謝謝"
10022-100220370 = "最近一直忙得不可開交……"
10022-100220380 = "似乎比平時還忙呢……？"
10022-100220390 = "沒什麼大不了的"
10022-100220400 = "只不過會需要排開各種待辦事項……"
10022-100220410 = "只是今天一步也沒走出去，光是文書工作就結束一整天了"
10022-100220420 = "沒事吧！？好好休息吧！？"
10022-100220430 = "不會，常有的事"
10022-100220440 = "總之，光是能和老師這樣交流，就放鬆多了"
10022-100220450 = "那我得先把工作做完"
10022-100220460 = "之後再聊"
10022-100220470 = "謝謝你今天的幫助，老師"
10022-100220480 = "沒什麼大不了的，不客氣"
10022-100220490 = "真是幫大忙了。但是，不能每次都這樣給你添麻煩"
10022-100220500 = "下次，我會早點完成工作"
10022-100220510 = "然後，那個……"
10022-100220520 = "難得來到這裡了……"
10022-100220530 = "稍微一起出去走走，似乎也不錯……"
10022-100220540 = "到時候也能像今天一樣帶領著我嗎？"
10022-100220550 = "老師"
10022-100220560 = "今天說不定能在上午就完成工作"
10022-100220570 = "所以那個"
10022-100220580 = "我很樂意！"
10022-100220590 = "……請不要在進入正題之前就回覆。真的明白了嗎……？"
10022-100220600 = "真受不了……總之"
10022-100220610 = "之前說過吧，來渡假勝地不享受的話就太可惜了"
10022-100220620 = "是啊！難得來海邊了！"
10022-100220630 = "……雖然我還是多少會覺得這種態度到底好不好"
10022-100220640 = "但既然老師都這麼說了……"
10022-100220650 = "今天下午能陪我嗎？"
10022-100220660 = "那個，或許"
10022-100220670 = "能抽出時間一起去海邊玩"
10022-100220680 = "當然！我很期待！"
10022-100220690 = "嗯，那……中午的時候見"
10022-100220700 = "今天很開心"
10022-100220710 = "偶爾像這樣悠閒地眺望大海也不錯"
10022-100220720 = "下次……"
10022-100220730 = "當然！"
10022-100220740 = "……所以我說了，不要預判"
10022-100220750 = "呵呵，真是個怪人"
10022-100220760 = "嗯，到時候也拜託你了。老師"
10022-100220770 = "老師"
10022-100220780 = "那個，今天有空嗎？"
10022-100220790 = "嗯，當然有空！"
10022-100220800 = "如果是陽奈找我，就算沒空也有空！"
10022-100220810 = "是嗎？太好了……"
10022-100220820 = "老師？那個，這樣是有空還是……？"
10022-100220830 = "有什麼事嗎？"
10022-100220840 = "啊，那個……雖然不是什麼，大不了的事……"
10022-100220850 = "如果你願意的話……"
10022-100220860 = "希望你能教我游泳……"
10022-100220870 = "嗯，當然願意。我很快就到"
10022-100220880 = "老師？等等，詳細的事我還沒……"
10022-100220890 = "那個……？老師？"

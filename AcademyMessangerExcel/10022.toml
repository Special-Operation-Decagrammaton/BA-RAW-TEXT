[translation]
10022-100220010 = "It's summertime, Sensei."
10022-100220020 = "Yeah, summertime!"
10022-100220030 = "And when you think of the summer, you think of beaches!"
10022-100220040 = "Yup. Summer. Beaches."
10022-100220050 = "Sensei."
10022-100220060 = "Are you paying attention?"
10022-100220070 = "Of course!"
10022-100220080 = "I always pay attention to you."
10022-100220090 = "*sigh*"
10022-100220100 = "I know it's the summer..."
10022-100220110 = "But if you start slacking off, that affects everyone."
10022-100220120 = "Work is work, all the time."
10022-100220130 = "Even at times like this."
10022-100220140 = "There will always be immoral criminals out there."
10022-100220150 = "That's why I need your help, Sensei."
10022-100220160 = "You're so diligent, even in your swimsuit, Hina!"
10022-100220170 = "The head prefect is even better in her swimsuit!"
10022-100220180 = "Maybe I should arrest a certain immoral sensei, then."
10022-100220190 = "I'm sorry. What do you need?"
10022-100220200 = "*sigh* Honestly..."
10022-100220210 = "Come to the location I told you of before. I'll be waiting."
10022-100220220 = "Thank you for helping me out with today's task, Sensei."
10022-100220230 = "Then, for real this time for the summer camp..."
10022-100220240 = "..."
10022-100220250 = "N-Never mind."
10022-100220260 = "Right, I hope we can spend time together."
10022-100220270 = "..."
10022-100220280 = "Yes."
10022-100220290 = "About today's dinner plans, Sensei."
10022-100220300 = "Can we push them back a little bit?"
10022-100220310 = "I'm still swamped with work."
10022-100220320 = "Sure. Wait, did we ever...?"
10022-100220330 = "Really? Well, I guess there's nothing we can do about it."
10022-100220340 = "Wait. Was that not something planned for today?"
10022-100220350 = "I guess I remembered it wrong. Please forget I said anything."
10022-100220360 = "Thank you for your understanding."
10022-100220370 = "I've been very busy lately."
10022-100220380 = "So you're stressed out?"
10022-100220390 = "No, it's nothing too serious."
10022-100220400 = "It just means I have to move my schedule around."
10022-100220410 = "I'll be spending today on paperwork rather than patrolling."
10022-100220420 = "But that IS something serious!"
10022-100220430 = "Well, it's not that rare for me."
10022-100220440 = "Anyway, I'm feeling better after talking to you, Sensei."
10022-100220450 = "I need to get back to work."
10022-100220460 = "Talk to you later."
10022-100220470 = "I feel refreshed. Thank you for helping, Sensei."
10022-100220480 = "You're welcome."
10022-100220490 = "But I can't just keep imposing on you like this..."
10022-100220500 = "I'll finish off my work a bit faster."
10022-100220510 = "And then I..."
10022-100220520 = "Since we're here already..."
10022-100220530 = "You're right. Now would be a good time to rest."
10022-100220540 = "I hope you'll be with me like you were today when the time comes."
10022-100220550 = "I began work earlier than normal today, Sensei."
10022-100220560 = "I should be finished later this morning."
10022-100220570 = "So would you like to..."
10022-100220580 = "Yes! I'm in!"
10022-100220590 = "But... I hadn't even finished asking."
10022-100220600 = "You really are something. Anyway, you said before..."
10022-100220610 = "It would be a waste not to have fun during vacation."
10022-100220620 = "Right, since we're at the beach."
10022-100220630 = "I don't understand, personally."
10022-100220640 = "But if you insist, Sensei..."
10022-100220650 = "Very well. Would you spend the afternoon with me?"
10022-100220660 = "Maybe just visiting the beach shore"
10022-100220670 = "is something...I might be able to do."
10022-100220680 = "Sure thing!"
10022-100220690 = "Okay, then... See you around lunchtime, Sensei."
10022-100220700 = "Today was fun."
10022-100220710 = "Taking in the beach is fine every once in a while."
10022-100220720 = "Until next time."
10022-100220730 = "Say no more!"
10022-100220740 = "You didn't let me finish again."
10022-100220750 = "Heehee. You're so odd."
10022-100220760 = "All right, then. I'll be looking forward to it, Sensei."
10022-100220770 = "Sensei..."
10022-100220780 = "Are you, by any chance...free today?"
10022-100220790 = "Yes, of course!"
10022-100220800 = "For you, Hina, I'd have time even if I didn't have time!"
10022-100220810 = "Oh, really? That's a relief."
10022-100220820 = "What? Uh, Sensei, I really don't understand what that means..."
10022-100220830 = "So what did you need?"
10022-100220840 = "Ah, it's just..."
10022-100220850 = "Well, if you don't mind, Sensei, I just wanted to learn to swim."
10022-100220860 = "But, it's fine if you need time to..."
10022-100220870 = "In that case, I'd be happy to! I'll be right there!"
10022-100220880 = "What? Sensei? I wasn't finished explaining."
10022-100220890 = "Hello? Sensei?"

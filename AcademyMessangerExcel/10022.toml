[translation]
10022-100220010 = "คุณครู ฤดูร้อนละ"
10022-100220020 = "ใช่แล้ว~ ฤดูร้อนแล้วละ"
10022-100220030 = "พอพูดถึงฤดูร้อนก็ต้องทะเลสิ~!"
10022-100220040 = "อื้อ ทะเล"
10022-100220050 = "คุณครู"
10022-100220060 = "อ่านข้อความอยู่ใช่มั้ย...?"
10022-100220070 = "แน่นอน ครูอ่านอยู่!"
10022-100220080 = "ครูจะกล้าเมินข้อความของฮินะได้ยังไง!"
10022-100220090 = "เฮ้อ..."
10022-100220100 = "ฉันเข้าใจนะว่าตอนนี้เป็นฤดูร้อน\nเลยเอ้อระเหยกัน..."
10022-100220110 = "แต่ถ้าคุณครูเอ้อระเหยแบบนี้อีกคน\nทุกคนจะทำตามนะ"
10022-100220120 = "งานที่ต้องทำน่ะ มันงอกได้ดีกว่าเห็ด\nอีกนะรู้มั้ย"
10022-100220130 = "เวลาแบบนี้ก็เหมือนกัน"
10022-100220140 = "มีพวกนักเรียนที่ไม่ทำตามกฎอยู่ตลอด"
10022-100220150 = "เพราะงั้นฉันเลยอยากให้คุณครู\nช่วยหน่อย"
10022-100220160 = "ฮินะจังนี่ถึงใส่ชุดว่ายน้ำ\nก็จริงจังอยู่ตลอดเลยนะ!"
10022-100220170 = "ถึงจะใส่ชุดว่ายน้ำแต่ก็ยังเป็น\nประธานกรรมการวินัยสินะ!"
10022-100220180 = "หรือฉันควรเริ่มจากจัดการคุณครู\nที่ชอบก่อกวนก่อนดีนะ"
10022-100220190 = "ครูผิดไปแล้ว\nมีอะไรให้ช่วยงั้นเหรอ"
10022-100220200 = "เฮ้อ... จริงๆ เลย"
10022-100220210 = "มาเจอกันที่จุดนัดพบที่ฉันบอกไปด้วยล่ะ\nฉันจะรออยู่ที่นั่น"
10022-100220220 = "ขอบคุณที่ร่วมมือในภารกิจวันนี้นะ\nคุณครู"
10022-100220230 = "ถ้างั้น เข้าค่ายฤดูร้อนปีนี้พวกเรา..."
10022-100220240 = "..."
10022-100220250 = "มะ...ไม่มีอะไรหรอก"
10022-100220260 = "อื้อ ถะ...ถ้าได้ไปเที่ยวด้วยกันก็คงดีนะ"
10022-100220270 = "..."
10022-100220280 = "อื้อ"
10022-100220290 = "คุณครู นัดกินข้าวเย็นนี้น่ะ"
10022-100220300 = "ฉันขอเลื่อนเวลาหน่อยได้มั้ย?"
10022-100220310 = "พอดียังมีงานค้างอยู่น่ะ"
10022-100220320 = "เอ๊ะ? เรานัดกันด้วยเหรอ?"
10022-100220330 = "งั้นเหรอ? ช่วยไม่ได้นะ..."
10022-100220340 = "เดี๋ยวนะ เราไม่ได้นัดกันวันนี้เหรอ?"
10022-100220350 = "ถ้าฉันจำผิดละก็ลืมๆ ไปก็ได้"
10022-100220360 = "อื้อ ขอบคุณที่เข้าใจนะ"
10022-100220370 = "ช่วงนี้ฉันยุ่งจนหัวหมุนไปหมดเลย"
10022-100220380 = "ยุ่งขนาดนั้นเลยเหรอ?"
10022-100220390 = "อืม... ก็ไม่ได้ขนาดนั้นหรอก"
10022-100220400 = "ก็แค่ต้องโยกย้ายตารางงานนิดหน่อย..."
10022-100220410 = "วันนี้ฉันคงต้องจัดการงานเอกสาร\nแทนการออกไปลาดตระเวนแล้วล่ะ"
10022-100220420 = "แบบนั้นแสดงว่ายุ่งมากเลยนะ?!"
10022-100220430 = "ก็นะ ฉันเจอจนชินแล้วละ"
10022-100220440 = "ไม่รู้ทำไมพอได้คุยกับคุณครู\nฉันก็รู้สึกดีขึ้นมากเลย"
10022-100220450 = "ขอตัวก่อนนะ ฉันต้องไปทำงาน\nต่อแล้ว"
10022-100220460 = "ไว้ค่อยคุยกันนะ"
10022-100220470 = "ถึงจะรู้สึกแปลกๆ นิดหน่อย\nแต่ขอบคุณที่มาช่วยนะ คุณครู"
10022-100220480 = "ครูยินดีที่ได้ช่วยนะ"
10022-100220490 = "ฉันจะเอาแต่สร้างปัญหาให้คุณครู\nต่อไปก็คงไม่ได้"
10022-100220500 = "เอาไว้คราวหน้าฉันจะรีบทำงานให้เสร็จนะ"
10022-100220510 = "แล้ว... เอ่อ..."
10022-100220520 = "ไหนๆ ก็มาถึงที่นี่แล้ว..."
10022-100220530 = "พักสักหน่อยตามที่คุณครูบอก\nก็คงดีนะ"
10022-100220540 = "หวังว่าคราวหน้า คุณครูจะมาด้วยกันอีกนะ"
10022-100220550 = "คุณครู วันนี้ฉันทำงานเสร็จเร็ว"
10022-100220560 = "งานที่เหลืออยู่ก็คงทำเสร็จได้ทั้งหมด\nภายในช่วงเช้า"
10022-100220570 = "เพราะงั้น..."
10022-100220580 = "อื้อออ! ได้แน่นอน!"
10022-100220590 = "เดี๋ยวสิ... ตอบก่อนที่ฉันจะพูด\nได้ยังไง"
10022-100220600 = "แต่ก็นะ... เหมือนที่คุณครูบอกไว้ไง..."
10022-100220610 = "อุตส่าห์ได้มาเที่ยวทั้งที\nถ้าไม่ใช้เวลาให้คุ้มก็น่าเสียดาย"
10022-100220620 = "นั่นสิ มาทะเลทั้งทีเลยนะ"
10022-100220630 = "ถึงฉันไม่ค่อยเข้าใจเท่าไหร่"
10022-100220640 = "แต่ถ้าคุณครูยืนกรานแบบนั้น..."
10022-100220650 = "งั้นตอนบ่ายไปเดินเล่นกันมั้ย?"
10022-100220660 = "ถ้าแค่ไปเล่นที่ชายหาดละก็..."
10022-100220670 = "น่าจะไปได้นะ"
10022-100220680 = "แน่นอน!"
10022-100220690 = "อื้อ ถ้างั้นเดี๋ยวเจอกันตอนเที่ยงๆ นะ\nคุณครู"
10022-100220700 = "วันนี้สนุกมากเลย"
10022-100220710 = "ได้มานั่งมองทะเลแบบนี้บ้าง\nก็ไม่เลวเลยนะ"
10022-100220720 = "คราวหน้า..."
10022-100220730 = "อื้อ ได้อยู่แล้ว!"
10022-100220740 = "...ตอบแทรกมาอีกแล้ว"
10022-100220750 = "ฮิฮิ แปลกคนจริงๆ"
10022-100220760 = "คราวหน้ามาเที่ยวด้วยกันใหม่นะ\nคุณครู"
10022-100220770 = "คุณครู..."
10022-100220780 = "คือว่า... วันนี้พอมีเวลารึเปล่า?"
10022-100220790 = "อื้อ ครูมีเวลาทั้งวันเลย!"
10022-100220800 = "ถ้าฮินะเรียกละก็\nต่อให้ยุ่งแค่ไหน ครูก็จะไป!"
10022-100220810 = "งั้นเหรอ? ค่อยยังชั่วหน่อย..."
10022-100220820 = "หืม? พูดอะไรน่ะ ไม่เห็นเข้าใจเลย"
10022-100220830 = "ว่าแต่ว่าฮินะมีอะไรเหรอ?"
10022-100220840 = "อ้อ คือว่า... ไม่ใช่เรื่องใหญ่หรอก..."
10022-100220850 = "ถ้าคุณครูสะดวกละก็... ฉันแค่อยาก\nเรียนว่ายน้ำน่ะ..."
10022-100220860 = "จู่ๆ ก็คิดแบบนั้น..."
10022-100220870 = "ถ้าเรื่องนั้นละก็ได้เสมอเลย!\nครูจะรีบไปหานะ!"
10022-100220880 = "หืม? คุณครู? ฉันยังไม่ได้บอก\nรายละเอียดอะไรเลยนะ..."
10022-100220890 = "นี่...? คุณครู...?"

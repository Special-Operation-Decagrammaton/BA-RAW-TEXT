[translation]
10052-100520010 = "안녕하세요, 선생님."
10052-100520020 = "이번에 샬레의 학생 당번 업무를 맡게 된 밀레니엄 학원의 우시오 노아라고 합니다."
10052-100520030 = "첫 당번 업무에 앞서 미리 인사드립니다."
10052-100520040 = "나도 잘 부탁해! "
10052-100520050 = "그나저나 샬레의 학생 당번 업무는 처음이라…"
10052-100520060 = "혹시 당번 업무 전에 미리 준비해야 할 물건이라도 있을까요?"
10052-100520070 = "준비해야 할 건 없어."
10052-100520080 = "놀러 온다는 기분으로 가볍게 찾아와."
10052-100520090 = "놀러 간다는 기분……"
10052-100520100 = "그렇군요."
10052-100520110 = "그럼 당일 뵙겠습니다."
10052-100520120 = "선생님, 혹시 어제의 당번 활동 때……"
10052-100520130 = "신발을 새로 구매하셨었나요?"
10052-100520140 = "그걸 어떻게 알아차렸어?"
10052-100520150 = "같은 브랜드의 같은 제품이었는데……."
10052-100520160 = "후후, 정답이었군요."
10052-100520170 = "신발코에 항상 보이던 흠집이 보이지 않기에 알아차렸습니다."
10052-100520180 = "워낙 낡은 신발이기도 했고, 기성품이니 수선을 하는 것보다는 새로 사는 게 훨씬 효율적이었을 테니까요."
10052-100520190 = "뭔가 탐정 같은 추리네."
10052-100520200 = "과연……"
10052-100520210 = "그러고 보면 탐정의 활동과 서기의 활동에는 의외로 비슷한 구석이 있을지도 모르겠네요."
10052-100520220 = "저도 당번 활동 중에는 범인을 관찰하는 탐정처럼 선생님을 열심히 지켜보고 있으니까요. "
10052-100520230 = "뭔가 무서워……!"
10052-100520240 = "밀레니엄의 학생들이 만든 발명품을 보고 있노라면 깜짝 놀랄 때가 많아요."
10052-100520250 = "저는 생각지도 못했던 새로운 기술이나 아이디어를 매번 가져오거든요."
10052-100520260 = "그럴 때마다 저는 밀레니엄의 가치에 제대로 공헌하고 있는지, 스스로를 반성하게 되네요."
10052-100520270 = "노아 정도면 열심히 하는 거 아냐?"
10052-100520280 = "잔인한 이야기지만, 열심히 하는 것과 잘하는 것은 다르니까요."
10052-100520290 = "제게는 다른 천재들과 같은 번뜩이는 창의성도, 섬세한 손재주도 없답니다."
10052-100520300 = "그나마 가지고 있는 잡기라고 해도……"
10052-100520310 = "……기계의 제작에 필요한 청사진을 통째로 외울 수 있는 것 정도?"
10052-100520320 = "엄청난 스킬이잖아……"
10052-100520330 = "선생님, 나쁜 소식이 있습니다."
10052-100520340 = "전에 말씀드렸던 <선생님의 행동 패턴을 수집하여 현재 위치를 예측하는 장치>의 특허 신청이……"
10052-100520350 = "안타깝게도 총학생회의 이의제기로 인해 반려된 모양이에요."
10052-100520360 = "당연하지!"
10052-100520370 = "그런 특허가 허가될 리가 없잖아."
10052-100520380 = "하지만 특허라는 건 얼마든지 목적을 바꿔가며 같은 물건을 다시 출원할 수 있으니까요."
10052-100520390 = "계속해서 양식을 바꾸어 가며 특허를 신청하다 보면……"
10052-100520400 = "언젠간 진짜 특허 등록이 될지도……?"
10052-100520410 = "제발 그만둬……!"
10052-100520420 = "선생님, 오늘 오후에 예정되어 있던 정기 면담은 취소되었습니다."
10052-100520430 = "모노레일 점검 중에 갑작스러운 소나기가 내리는 바람에 레일이 일부 손상된 모양이에요."
10052-100520440 = "그 때문에 일부 임원들이 아직도 학원에 발이 묶여 있다고 합니다."
10052-100520450 = "관련하여 미리 연락 드리니, 혹시라도 헛걸음하는 일 없으시길 바라겠습니다."

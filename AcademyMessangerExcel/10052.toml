[translation]
10052-100520010 = "สวัสดีค่ะคุณครู"
10052-100520020 = "อุชิโอะ โนอา นักเรียนโรงเรียน\nมิลเลเนียมที่รับหน้าที่เข้าเวรตัวแทน\nที่ชาเล่ต์คราวนี้ค่ะ"
10052-100520030 = "ใกล้วันที่จะต้องไปเข้าเวรที่ชาเล่ต์แล้ว\nฉันเลยส่งข้อความมาทักทายล่วงหน้าค่ะ"
10052-100520040 = "ครูฝากตัวด้วยนะ! "
10052-100520050 = "แต่ว่าฉันเพิ่งเคยมาเข้าเวรตัวแทน\nนักเรียนที่ชาเล่ต์ครั้งแรก..."
10052-100520060 = "มีอะไรที่ต้องเตรียมตัวก่อนจะไป\nเข้าเวรที่ชาเล่ต์หรือเปล่าคะ?"
10052-100520070 = "ไม่ต้องเตรียมอะไรหรอก"
10052-100520080 = "สบายๆ เหมือนมาเที่ยวก็ได้"
10052-100520090 = "เหมือนไปเที่ยว..."
10052-100520100 = "แบบนี้เองสินะคะ"
10052-100520110 = "แล้วพบกันนะคะ"
10052-100520120 = "คุณครูคะ คือว่าตอนที่ฉันไปเข้าเวร\nเมื่อวาน..."
10052-100520130 = "คุณครูซื้อรองเท้าใหม่เหรอคะ?"
10052-100520140 = "เธอรู้ได้ยังไงน่ะ?"
10052-100520150 = "ครูซื้อแบรนด์เดิม สีเดิมนะ..."
10052-100520160 = "ฮุฮุ ถูกต้องสินะคะ"
10052-100520170 = "พอดีไม่เห็นรอยแตกที่ปลายรองเท้า\nก็เลยสังเกตเห็นค่ะ"
10052-100520180 = "รองเท้าคุณครูก็เก่ามากแล้ว แถมเป็น\nรุ่นที่วางขายทั่วไป เพราะงั้นการซื้อคู่\nใหม่เลยน่าจะมีประสิทธิภาพกว่านำไป\nซ่อมน่ะค่ะ"
10052-100520190 = "สันนิษฐานได้เหมือนนักสืบเลยนะ"
10052-100520200 = "อย่างที่คิดไว้เลย..."
10052-100520210 = "พอมาคิดๆ ดูแล้ว งานของนักสืบกับ\nงานของเลขาก็อาจมีส่วนที่คล้ายๆ กัน\nอยู่ก็ได้นะคะ"
10052-100520220 = "ฉันเองระหว่างที่มาเข้าเวรที่ชาเล่ต์\nก็คอยสังเกตการณ์คุณครูเหมือนกับ\nนักสืบที่คอยสังเกตการณ์คนร้ายค่ะ "
10052-100520230 = "ฟังดูน่ากลัวนะ...!"
10052-100520240 = "เวลาที่ดูสิ่งประดิษฐ์ใหม่ๆ ที่นักเรียน\nของมิลเลเนียมสร้างขึ้นก็มักจะตกใจ\nบ่อยๆ เลยค่ะ"
10052-100520250 = "มักจะมีไอเดียหรือสิ่งประดิษฐ์ใหม่ๆ\nที่ฉันคิดไม่ถึงรวมอยู่ด้วยเสมอๆ เลยค่ะ"
10052-100520260 = "และในเวลานั้นๆ ฉันก็มักจะไตร่ตรอง\nว่าตัวเองกำลังทำประโยชน์ให้กับทาง\nมิลเลเนียมรึเปล่าน่ะค่ะ"
10052-100520270 = "โนอาก็พยายามเต็มที่แล้วไม่ใช่เหรอ?"
10052-100520280 = "ถึงจะเป็นคำพูดที่ดูโหดร้าย แต่การ\nทำงานหนักกับการทำงานได้ดีนั้นมัน\nคนละเรื่องกันนะคะ"
10052-100520290 = "ตัวฉันไม่ได้มีไอเดียสร้างสรรค์ที่เจิดจ้า\nหรือมีฝีมือดีเหมือนกับอัจฉริยะคนอื่นๆ "
10052-100520300 = "ความสามารถติดตัวที่มีก็แค่..."
10052-100520310 = "สามารถจดจำพิมพ์เขียวที่ใช้\nในการสร้างเครื่องจักรทั้งหมด\nได้ละมั้งคะ?"
10052-100520320 = "เป็นความสามารถที่สุดยอดแล้วนะ..."
10052-100520330 = "คุณครูคะ ฉันมีข่าวร้ายค่ะ"
10052-100520340 = "คำขอจดสิทธิบัตร <อุปกรณ์คาดการณ์\nตำแหน่งปัจจุบันจากการรวบรวมรูปแบบ\nพฤติกรรมของคุณครู> ที่ฉันบอกไป\nเมื่อคราวก่อน..."
10052-100520350 = "ดูเหมือนจะถูกทางองค์การนักเรียน\nคัดค้านและตีกลับมาอย่างน่าเสียดาย\nเลยค่ะ"
10052-100520360 = "มันก็แหงน่ะสิ!"
10052-100520370 = "ของแบบนั้นจะขอสิทธิบัตรได้ยังไงล่ะ"
10052-100520380 = "แต่ว่าถ้าเป็นสิทธิบัตรละก็ เราเปลี่ยน\nวัตถุประสงค์และยื่นขอซ้ำได้อีกนะคะ"
10052-100520390 = "ถ้าลองเปลี่ยนรูปแบบละยื่นขอจด\nสิทธิบัตรซ้ำละก็..."
10052-100520400 = "สักวันหนึ่งก็อาจได้จดสิทธิบัตรก็ได้\nนะคะ...?"
10052-100520410 = "ขอละ พอเถอะ...!"
10052-100520420 = "คุณครูคะ การประชุมประจำปีบ่ายนี้\nยกเลิกแล้วนะคะ"
10052-100520430 = "เหมือนว่ารถไฟบางส่วนจะเกิดความ\nเสียหายเนื่องจากฝนที่ตกมาอย่างหนัก\nก็เลยต้องดำเนินการซ่อมบำรุงน่ะค่ะ"
10052-100520440 = "เพราะเหตุนั้น กรรมการนักเรียนบาง\nท่านก็เลยเดินทางมาจากโรงเรียนไม่ได้\nน่ะค่ะ"
10052-100520450 = "ฉันส่งข้อความมาแจ้งล่วงหน้าแล้ว\nหวังว่าคุณครูจะไม่ต้องออกมาเสียเที่ยว\nนะคะ"

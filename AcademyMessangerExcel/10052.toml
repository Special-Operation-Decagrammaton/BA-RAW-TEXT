[translation]
10052-100520010 = "你好，老師"
10052-100520020 = "我是負責這次夏萊值班的生塩乃愛"
10052-100520030 = "因為是初次值班，所以先來向你打聲招呼"
10052-100520040 = "我也請你多多指教唷！"
10052-100520050 = "第一次到夏萊值班……"
10052-100520060 = "有需要事先準備什麼東西嗎？"
10052-100520070 = "沒什麼特別的唷"
10052-100520080 = "抱著來玩的心情，放輕鬆就行了"
10052-100520090 = "玩……"
10052-100520100 = "我知道了"
10052-100520110 = "那當天就麻煩你了"
10052-100520120 = "老師，請問你昨天值班的時候……"
10052-100520130 = "是不是穿了新鞋？"
10052-100520140 = "你怎麼會知道？"
10052-100520150 = "明明和之前那雙是同個款式……"
10052-100520160 = "呵呵，果然沒錯"
10052-100520170 = "因為原本在鞋尖的磨損不見了"
10052-100520180 = "那雙鞋已經很舊了，再加上剛好有現貨，所以與其拿去修，不如直接買雙新的"
10052-100520190 = "總覺得像是偵探一樣呢"
10052-100520200 = "確實……"
10052-100520210 = "這麼一說，也許偵探和書記的工作意外的有相似之處呢"
10052-100520220 = "因為我在值班的時候，也會像觀察犯人般，仔細觀察著老師"
10052-100520230 = "好可怕……！"
10052-100520240 = "當我看到千年學生的發明時，常常會感到驚訝"
10052-100520250 = "因為他們帶來的，都是我未曾想過的新技術和靈感"
10052-100520260 = "這個時候，我就會反省自己是否有對千年的價值做出貢獻"
10052-100520270 = "我覺得乃愛已經很努力了唷"
10052-100520280 = "這麼說雖然殘忍，但努力和優秀是兩回事"
10052-100520290 = "我沒有天才的靈感，也沒有匠人的手藝"
10052-100520300 = "比較能拿來說嘴的……"
10052-100520310 = "……可能也只有完整記住製作機械時需要的藍圖……這種事而已吧"
10052-100520320 = "那已經是很了不得的能力了……"
10052-100520330 = "老師，有個壞消息"
10052-100520340 = "前幾天說的那個「收集老師的行為模式，預測當前位置的裝置」的專利申請……"
10052-100520350 = "很遺憾，由於聯邦學生會的反對而被駁回了"
10052-100520360 = "那是當然的！"
10052-100520370 = "那種專利怎麼可能得到許可"
10052-100520380 = "但是專利這種東西，只要變更目的就能重新申請"
10052-100520390 = "只要不斷變更樣式，反覆進行申請……"
10052-100520400 = "或許總有一天會成功也說不定……？"
10052-100520410 = "拜託不要……！"
10052-100520420 = "老師，原定在今天下午進行的定期面談延期了"
10052-100520430 = "因為在維護單軌列車時突然下起雷陣雨的關係，似乎造成了部分軌道的受損"
10052-100520440 = "有些成員也因此被困在學園裡"
10052-100520450 = "為了避免老師白跑一趟，在此先通知老師"

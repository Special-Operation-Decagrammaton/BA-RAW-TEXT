[translation]
10052-100520010 = "Hello, Sensei."
10052-100520020 = "My name is Ushio Noa, from Millennium. I've been appointed to help you."
10052-100520030 = "I wanted to introduce myself before beginning my duties."
10052-100520040 = "I look forward to working with you!"
10052-100520050 = "This will be my first time doing this..."
10052-100520060 = "Is there anything I need to prepare beforehand?"
10052-100520070 = "There's no need to busy yourself with prep work."
10052-100520080 = "Get here first and figure the rest as you go. Arrive ready to enjoy yourself."
10052-100520090 = "Enjoy myself..."
10052-100520100 = "Understood."
10052-100520110 = "I'll see you as scheduled."
10052-100520120 = "Sensei, while on duty yesterday..."
10052-100520130 = "Were you wearing new shoes?"
10052-100520140 = "How on Earth did you notice?"
10052-100520150 = "They're exactly the same as the shoes I always wear, just new..."
10052-100520160 = "Ah, so I was right."
10052-100520170 = "There were no scuffs on the front of the shoes. The truth was right in front of me."
10052-100520180 = "Your previous shoes were old and worn out, and replacing them would be far more efficient than restoring them."
10052-100520190 = "Are you a secretary or a detective?"
10052-100520200 = "Well..."
10052-100520210 = "Thinking about it logically, both detectives and secretaries rely on an unfailing devotion to detailed observation."
10052-100520220 = "For example, I'm always intently observing you...like a detective trailing a criminal."
10052-100520230 = "Why a criminal?!"
10052-100520240 = "The ingenuity of Millennium's students never fails to impress me."
10052-100520250 = "The technologies and ideas they come up with are beyond imagination."
10052-100520260 = "I can't help but reflect on, and maybe even doubt, my own contributions to Millennium."
10052-100520270 = "But you work so hard!"
10052-100520280 = "The cruel reality is that being a hard worker and being a productive worker aren't the same thing."
10052-100520290 = "Millennium is full of productive workers overflowing with sparkling creativity and awe-inspiring talents."
10052-100520300 = "And what do I have? Just throwaway skills..."
10052-100520310 = "...Like being able to perfectly memorize an entire engineering blueprint by looking at it once."
10052-100520320 = "...If you're throwing that skill away, can I have it?"
10052-100520330 = "Sensei, I have bad news."
10052-100520340 = "The patent application for the Sensei-Locating Device That Tracks Their Every Move and Thought..."
10052-100520350 = "has sadly been rejected due to objections raised by the General Student Council."
10052-100520360 = "Of course it was!"
10052-100520370 = "Who would ever approve a patent like that?!"
10052-100520380 = "We'll find out once they apply again after changing the patent objective."
10052-100520390 = "If they keep changing that, they can keep applying..."
10052-100520400 = "And perhaps, on a better day, to a more open-minded council, the patent will be accepted?"
10052-100520410 = "A better day for who?!"
10052-100520420 = "Sensei, this afternoon's regularly scheduled meeting has been canceled."
10052-100520430 = "Apparently, a sudden rain shower during monorail maintenance caused some damage."
10052-100520440 = "As a result, many are stuck at the academy."
10052-100520450 = "I'm letting you know in advance so you don't end up coming needlessly."

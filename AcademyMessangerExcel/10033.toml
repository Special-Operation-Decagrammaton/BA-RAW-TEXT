[translation]
10033-100330010 = "別來無恙？老師"
10033-100330020 = "若藻我，在此向您問好"
10033-100330030 = "你好呀，若藻"
10033-100330040 = "啊啊……無論何時依舊溫柔的回應……"
10033-100330050 = "僅是撫摸這個由閣下贈予，我的名字之文字……"
10033-100330060 = "內心就感到無比溫暖熾熱"
10033-100330070 = "那，那真是太好了……"
10033-100330080 = "今日陽光也很暖和，是個好天氣呢"
10033-100330090 = "不過，不可輕易疏忽"
10033-100330100 = "氣溫突然驟變時，身體狀況也常常會出問題"
10033-100330110 = "畢竟是季節變化的時候呢"
10033-100330120 = "若藻也要注意身體狀況哦"
10033-100330130 = "老師竟然如此關心我的身體……"
10033-100330140 = "呵呵，若藻我決定了"
10033-100330150 = "在這值得紀念之時，只傳MomoTalk實在無法忍受"
10033-100330160 = "還請您稍待片刻"
10033-100330170 = "閣．下♡"
10033-100330180 = "……咦？"
10033-100330190 = "那個，若藻？"
10033-100330200 = "今天能再次與您相見，若藻我感到無比高興"
10033-100330210 = "衷心期待下次與您見面的機會"
10033-100330220 = "麻煩到時候用更和平的方式見面……"
10033-100330230 = "是！"
10033-100330240 = "閣下如此希望的話，若藻我悉聽尊便……！"
10033-100330250 = "老師。今日夏萊的工作休息對吧？"
10033-100330260 = "嗯。原來你知道啊"
10033-100330270 = "呵呵呵……"
10033-100330280 = "若藻我，早已將老師的行程銘記於心"
10033-100330290 = "是，是嗎……"
10033-100330300 = "今日是閣下百忙之中難得的休息日……"
10033-100330310 = "希望會是安全快樂的一天"
10033-100330320 = "若藻我，會跟隨老師一同祈願"
10033-100330330 = "那個，謝謝……？"
10033-100330340 = "老師，請問可好？"
10033-100330350 = "您應該沒有忘記吧？"
10033-100330360 = "今天是與閣下約定的日子……"
10033-100330370 = "我期盼著這一天，不知度過了多少難以入眠的夜晚……"
10033-100330380 = "在設法壓抑這股悸動的同時，我制定了完美的約會計劃！"
10033-100330390 = "是，是嗎？"
10033-100330400 = "那麼，我會在約定的場所等候您的到來。呵呵呵"
10033-100330410 = "嗯，我也會馬上過去哦"
10033-100330420 = "老師，假如您願意的話"
10033-100330430 = "是否能占用閣下寶貴的時間呢？"
10033-100330440 = "啊，抱歉……手上有份必須現在完成的工作……"
10033-100330450 = "這樣啊……實屬遺憾"
10033-100330460 = "好的，我明白了"
10033-100330470 = "就算再怎麼奢望，也不能因我的任性而打擾老師……"
10033-100330480 = "雖然遺憾，今日的購物就由我隻身前往"
10033-100330490 = "咦？購物？要買什麼東西嗎？"
10033-100330500 = "是的，稍微有些需要的東西……因此打算去一趟黑市"
10033-100330510 = "黑市！？而且還是若藻一個人去！？"
10033-100330520 = "要購物的話我也來幫忙吧！工作結束之後馬上過去！"
10033-100330530 = "啊啊，何等溫柔……"
10033-100330540 = "呵呵……那麼，我會恭候著您的到來"
10033-100330550 = "今日前來陪同，真的非常感謝"
10033-100330560 = "若藻我"
10033-100330570 = "真的"
10033-100330580 = "真的真的真的真的真的真的真的真的真的真的真的真的真的真的真的真的真的"
10033-100330590 = "真的真的真的真的真的真的真的真的真的真的真的真的真的真的真的真的真的"
10033-100330600 = "很高興能與閣下在一起♡"
10033-100330610 = "唔呵呵呵……"
10033-100330620 = "那真是太好了"
10033-100330630 = "期待下回，能與您相見的機會"
10033-100330640 = "那麼我就先告辭了"
10033-100330650 = "呵呵"
10033-100330660 = "貴安，老師"
10033-100330670 = "你好呀，若藻"
10033-100330680 = "此次聯絡，不知是否剝奪了您寶貴的時間"
10033-100330690 = "讓我感到有些擔憂……"
10033-100330700 = "不會，我正好也在休息哦"
10033-100330710 = "這可真是個美妙的巧合"
10033-100330720 = "我現在也正巧有些閒暇時間"
10033-100330730 = "……呵呵，竟然能被這般幸運眷顧"
10033-100330740 = "為了紀念這奇蹟般的瞬間……"
10033-100330750 = "若藻我，今天會為閣下拚盡全力的♡"
10033-100330760 = "若，若藻？那是什麼意思？嗯……？"

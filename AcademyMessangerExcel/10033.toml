10033-100330730 = "……후후, 그렇군요. 이 우연을 그냥 흘려보내는 건 무척이나 아쉬운 일일 터."
10033-100330740 = "이 소중한 기적을 기념하기 위해."
10033-100330750 = "저 와카모, 오늘 당신이 기뻐할 수 있도록 전력을 다해 보이겠습니다♡"
10033-100330760 = "응? 와카모……. 저기, 그게 무슨 의미야? 어어?"

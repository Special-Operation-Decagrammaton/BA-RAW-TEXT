[translation]
10033-100330010 = "สวัสดีค่ะ คุณครู"
10033-100330020 = "ฮุฮุฮุ วาคาโมะส่งข้อความ\nมาทักทายคุณครูค่ะ"
10033-100330030 = "อ๊ะ ว่ายังไง วาคาโมะ"
10033-100330040 = "อา... คำตอบเหมือนเดิมไม่มีเปลี่ยน..."
10033-100330050 = "เพียงแค่ได้เห็นอักษรชื่อ\nของฉันที่คุณท่านเขียน..."
10033-100330060 = "หัวใจของวาคาโมะผู้นี้\nก็รู้สึกอบอุ่นขึ้นมากเลยค่ะ..."
10033-100330070 = "งะ...งั้นเหรอ?\nถือเป็นเรื่องดีนะ..."
10033-100330080 = "วันนี้ดูเป็นวันสบายๆ เหมาะกับ\nแสงแดดอบอุ่นเลยนะคะ"
10033-100330090 = "แต่ว่าในวันอากาศอบอุ่นแบบนี้\nยิ่งต้องระวังนะคะ"
10033-100330100 = "สภาพอากาศอาจเปลี่ยนแปลง\nกะทันหันได้ตามฤดูกาลหรือ\nอาจเกิดเหตุที่ไม่คาดคิดได้ค่ะ"
10033-100330110 = "อื้อ ช่วงเปลี่ยนฤดูต้องระวังหน่อยล่ะ"
10033-100330120 = "วาคาโมะก็ดูแลตัวเองด้วยนะ"
10033-100330130 = "คุณครูอุตส่าห์เป็นห่วงสุขภาพ\nของวาคาโมะแบบนี้..."
10033-100330140 = "ค่ะ ฮุฮุฮุ ฉันตัดสินใจแล้วค่ะ!"
10033-100330150 = "ช่างน่าเสียดายหากช่วงเวลาที่\nตราตรึงใจเช่นนี้จะจบลงแค่เพียง\nการพูดคุยใน MOMOTALK"
10033-100330160 = "ได้โปรดรอฉันก่อนนะคะ"
10033-100330170 = "คุณ.ท่าน.♡"
10033-100330180 = "หืม...?"
10033-100330190 = "เอ่อ วาคาโมะ...?"
10033-100330200 = "การได้พบกันวันนี้ วาคาโมะผู้นี้\nมีความสุขเหลือเกินค่ะ"
10033-100330210 = "ฉันจะเฝ้ารอวันที่ได้พบ\nกับคุณท่านเช่นนี้อีกค่ะ"
10033-100330220 = "คราวหน้ามาเจอกันแบบเงียบๆ กว่านี้\nหน่อยก็แล้วกันนะ"
10033-100330230 = "ค่ะ!"
10033-100330240 = "ถ้าคุณท่านต้องการเช่นนั้น\nวาคาโมะก็จะทำเพื่อคุณท่านค่ะ!"
10033-100330250 = "คุณครูคะ วันนี้เป็นวันหยุด\nของทางชาเล่ต์ใช่มั้ยคะ?"
10033-100330260 = "อื้อ รู้ได้ยังไงกันนะ..."
10033-100330270 = "ฮุฮุฮุ วาคาโมะผู้นี้"
10033-100330280 = "เรื่องราวที่เกี่ยวกับคุณครู ฉันเก็บไว้\nในหัวใจเพื่อติดตามรอยของคุณครูค่ะ"
10033-100330290 = "งะ...งั้นเหรอ..."
10033-100330300 = "วันนี้เป็นวันหยุดสำหรับคุณครู\nที่ทำงานหนักมาตลอด"
10033-100330310 = "ขอให้เป็นวันที่แสนสนุกและ\nปลอดภัยนะคะ"
10033-100330320 = "วาคาโมะผู้นี้จะคอยติดตามไป\nและอวยพรให้คุณท่านเองค่ะ"
10033-100330330 = "เอ่อ ขอบคุณนะ"
10033-100330340 = "สวัสดีค่ะ คุณครู"
10033-100330350 = "ไม่ได้ลืมใช่ไหมคะ?"
10033-100330360 = "ที่สัญญาว่าจะให้เวลากับฉันหนึ่งวัน"
10033-100330370 = "แม้กี่วันคืนที่พ้นผ่าน\nฉันเฝ้ารอวันนี้มาโดยตลอด..."
10033-100330380 = "ฉันสะกดกลั้นความตื่นเต้นเอาไว้\nและทำแผนการเดตได้สมบูรณ์แล้วค่ะ!"
10033-100330390 = "งะ...งั้นเหรอ?"
10033-100330400 = "ถ้างั้นฉันจะรอที่\nสถานที่นัดพบนะคะ\nฮุฮุฮุ"
10033-100330410 = "อื้อ ครูจะไปเดี๋ยวนี้ล่ะ"
10033-100330420 = "หากคุณครูไม่ว่าอะไร..."
10033-100330430 = "ฉันจะขอรบกวนวันที่มีค่า\nของคุณครูสักวันได้ไหมคะ?"
10033-100330440 = "อ๊ะ ขอโทษนะ\nวันนี้พอดีครูมีธุระนิดหน่อย"
10033-100330450 = "อา... อย่างนั้นเหรอคะ\nน่าเสียดายจัง..."
10033-100330460 = "ช่วยไม่ได้นะคะ"
10033-100330470 = "ถึงฉันจะต้องการมากแค่ไหน\nแต่ก็คงจะไปขัดขวางคุณครูไม่ได้"
10033-100330480 = "น่าเสียดาย วันนี้ฉันคงจะต้อง\nไปช้อปปิ้งคนเดียวแล้วค่ะ"
10033-100330490 = "หืม? ช็อปปิ้ง?\nจะไปซื้ออะไรเหรอ?"
10033-100330500 = "คะ? พอดีฉันมีของจำเป็น\nนิดหน่อยเลยจะแวะไปที่\nตลาดมืดค่ะ..."
10033-100330510 = "ตลาดมืด?!\nวาคาโมะจะไปคนเดียวเนี่ยนะ?!"
10033-100330520 = "งั้นครูไปด้วย\nเดี๋ยวเสร็จงานแล้วครูไปหา!"
10033-100330530 = "อา... คุณท่านใจดีมากเลยค่ะ"
10033-100330540 = "ฮุฮุฮุฮุ ค่ะ... ถ้างั้นฉันจะรอนะคะ"
10033-100330550 = "วันนี้ขอบคุณที่ไปซื้อของด้วยกันนะคะ"
10033-100330560 = "วาคาโมะผู้นี้..."
10033-100330570 = "มีความสุข"
10033-100330580 = "มากมากมากมากมากมาก\nมากมากมากมากมากมาก"
10033-100330590 = "มากมากมากมากมากมาก\nมากมากมากมากมากมาก"
10033-100330600 = "ที่ได้ใช้เวลาร่วมกับคุณท่านค่ะ"
10033-100330610 = "ฮุฮุฮุฮุ"
10033-100330620 = "อะ...อื้อ รู้แล้วล่ะ"
10033-100330630 = "ถ้าอย่างนั้น ไว้พบกัน\nในโอกาสหน้านะคะ"
10033-100330640 = "ฉันจะเฝ้ารอวันที่เรา\nจะได้พบกันใหม่ค่ะ"
10033-100330650 = "ขอบคุณค่ะ"
10033-100330660 = "สวัสดีค่ะ คุณครู"
10033-100330670 = "ว่าไง วาคาโมะ"
10033-100330680 = "ฉันกังวลว่าส่งข้อความมาแบบนี้..."
10033-100330690 = "จะเป็นการรบกวนเวลาอันมีค่าของ\nคุณท่านหรือเปล่า..."
10033-100330700 = "ไม่เลย ครูกำลังว่างอยู่พอดี"
10033-100330710 = "อ่า... อย่างนั้นหรือคะ บังเอิญจังเลย\nนะคะ"
10033-100330720 = "ฉันเองก็ว่างอยู่เหมือนกันเลยค่ะ"
10033-100330730 = "...ฮุฮุ ถ้าเราปล่อยความบังเอิญที่เป็นใจ\nแบบนี้ให้เสียเปล่าก็คงน่าเสียดายไม่น้อย"
10033-100330740 = "เพราะงั้นเพื่อฉลองความบังเอิญที่\nเป็นใจครั้งนี้"
10033-100330750 = "วาคาโมะผู้นี้ จะทุ่มเทสุดความสามารถ\nเพื่อทำให้คุณท่านมีความสุขที่สุดในวันนี้ค่ะ"
10033-100330760 = "หืม? วาคาโมะ...\nหมายความว่ายังไงน่ะ??"

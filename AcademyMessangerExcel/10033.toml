[translation]
10033-100330010 = "안녕하신가요? 선생님."
10033-100330020 = "후후훗, 저 와카모, 당신께 문안 인사드립니다."
10033-100330030 = "아, 안녕. 와카모."
10033-100330040 = "아아…. 여느 때와 다름없이 다정하신 답변…."
10033-100330050 = "당신께서 써 주신 제 이름의 글귀를 쓰다듬는 것만으로도 이 와카모-"
10033-100330060 = "이렇게나 가슴이 따스해지는군요…."
10033-100330070 = "그, 그래? 그거, 음, 다행이네…."
10033-100330080 = "따사로운 햇살에 절로 눈이 부실 만큼 날이 많이 풀렸습니다."
10033-100330090 = "하지만 이런 날일수록 조심해야만 하지요."
10033-100330100 = "계절의 급변으로 용태가 갑자기 나빠지는 불상사 또한 종종 일어나는 법."
10033-100330110 = "응. 환절기엔 특히 신경 써야지."
10033-100330120 = "와카모도 건강 조심해."
10033-100330130 = "선생님께서… 직접 제 건강까지 염려해 주시다니. 저어, 저… 와카모."
10033-100330140 = "네에, 후후훗, 결정했어요."
10033-100330150 = "이런 기념비적인 순간을 단지 모모톡만으로 끝내는 건 안타까운 일."
10033-100330160 = "부디 기다려주시길,"
10033-100330170 = "다.앙.신. ♡"
10033-100330180 = "…응?"
10033-100330190 = "저기, 와카모?"
10033-100330200 = "오늘의 만남, 이 와카모 무척이나 기뻤답니다."
10033-100330210 = "부디 다음에도 또 이렇게 만날 날을 기다리고 있겠습니다."
10033-100330220 = "그때는 오늘보다, 그, 조용한 만남으로 부탁할게."
10033-100330230 = "네!"
10033-100330240 = "당신의 바람이 그러하다면, 저 와카모는 얼마든지!"
10033-100330250 = "선생님, 오늘은 샬레의 업무도 쉬는 휴일이시지요?"
10033-100330260 = "응, 알고 있었구나."
10033-100330270 = "후후훗, 저 와카모."
10033-100330280 = "선생님의 발자취라면 어느 것이든 가슴속에 새겨 두고 따르고 있답니다."
10033-100330290 = "그, 그래……."
10033-100330300 = "오늘은 다사다망하여 바쁘기만 하여 쉬지 못하는 당신께 모처럼 주어진 휴일."
10033-100330310 = "부디 무탈하고도 즐거운 하루가 되길."
10033-100330320 = "저 와카모. 뒤를 따르며 기원하고 있겠습니다."
10033-100330330 = "응, 그게, 음……. 고마워."
10033-100330340 = "안녕하신가요? 선생님."
10033-100330350 = "잊지 않으셨겠지요?"
10033-100330360 = "오늘이 바로 당신께서 제게 약속해 주신 하루의 시간."
10033-100330370 = "이날만을 기다리며 지난날 얼마나 되는 밤을 지새워왔는지……."
10033-100330380 = "두근거리는 마음을 끌어안고 이미 데이트 플랜은 완벽하게 세워 두었답니다!"
10033-100330390 = "그, 그래?"

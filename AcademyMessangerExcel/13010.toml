[translation]
13010-94 = "你好，老師。我是優香"
13010-95 = "還記得我嗎？"
13010-96 = "嗯，當然"
13010-97 = "……是誰來著？"
13010-98 = "太好了，幸好你還記得"
13010-99 = "是早瀬優香！已經把我忘了嗎！？"
13010-100 = "看來先取得老師的聯絡方式是正確的"
13010-101 = "對了，有件事情"
13010-102 = "之前夏萊奪還作戰時的子彈費用，還沒確認到匯款"
13010-103 = "帳單應該已經送到夏萊了，請問什麼時候會付款呢？"
13010-104 = "必須由我處理嗎……？"
13010-105 = "當然，子彈也不是免費的"
13010-106 = "反正是工作經費，只要向聯邦學生會要求的話"
13010-107 = "應該會支付給夏萊的。希望能把這筆款項直接交付給我"
13010-108 = "優香，帳單要怎麼做才好呢……？"
13010-109 = "……呼。我有千年使用的帳單格式"
13010-110 = "下次去夏萊時拿給你"
13010-111 = "謝謝……！"
13010-112 = "不，這沒什麼"
13010-113 = "那麼，祝你有美好的一天"
13010-114 = "老師！怎麼又有玩具的收據！？"
13010-115 = "玩具跟工作沒關係吧！？"
13010-116 = "沒有那個就無法工作……"
13010-117 = "就這一次，這次就睜一隻眼閉一隻眼……"
13010-118 = "不行！老師是學生的模範！"
13010-119 = "我會把那些都清除掉並加以整理！"
13010-120 = "……該不會，因為文書工作很麻煩，所以就隨便做吧？"
13010-121 = "……老師！！！！！"
13010-122 = "老師，今天放學後，能來趟學生辦公室嗎？"
13010-123 = "我碰到一個難題，有點超出我的計算能力……"
13010-124 = "連優香都解決不了的問題，就算是我也不見得能解決……"
13010-125 = "不，那個，不是那種事……"
13010-126 = "我需要老師的幫助"
13010-127 = "如果我能解決的話，我很樂意"
13010-128 = "非常感謝，那我在學生辦公室等你"
13010-129 = "真是的……三一和格黑娜到底是怎麼管理備品的？"
13010-130 = "這次又是什麼讓你這麼生氣？"
13010-131 = "「又」……從老師的角度，我看起來總是在生氣嗎？"
13010-132 = "是黑市走私品的事"
13010-133 = "我查了一下這次沒收的武器來源"
13010-134 = "大部分都是從三一和格黑娜那裡流出來的"
13010-135 = "不僅是印有校徽的槍械，連戰車都流入黑市……"
13010-136 = "我不認為這兩個學園有做好管理"
13010-137 = "當然，我們千年的管理是萬無一失的"
13010-138 = "絕對不會有備品外流！"
13010-139 = "真的嗎？"
13010-140 = "……"
13010-141 = "嘛，學生們擅自改造出售的私人物品除外……"
13010-142 = "老師，聽說你今天早上又遲到了"
13010-143 = "就算老師是老師，也太常遲到了吧？"
13010-144 = "是因為昨天工作很多，所以很晚才睡……"
13010-145 = "如果優香能來叫醒我……"
13010-146 = "即使這樣也不能遲到！"
13010-147 = "已經是大人了，請不要撒嬌！"
13010-148 = "雖說夏萊沒有校規，但也太鬆散了"
13010-149 = "來設立懲罰吧。從明天開始，每遲到一次，就要聽從我的1個命令！"
13010-150 = "那優香遲到的話，我也可以反過來命令你嗎？"
13010-151 = "你在說什麼，我怎麼可能遲到？"
13010-152 = "總之，明天絕對不可以遲到。絕對哦！"
13010-153 = "有一個桌遊被放在夏萊的辦公室"
13010-154 = "如果沒在使用的話，我可以收下嗎？"
13010-155 = "嗯，好啊。優香也喜歡遊戲嗎？"
13010-156 = "當然"
13010-157 = "我喜歡桌遊，也有涉獵線上遊戲"
13010-158 = "蠻意外的"
13010-159 = "你可能有什麼誤會……"
13010-160 = "我也跟其他學生一樣，基本上是喜歡遊戲的"
13010-161 = "因為思考攻略敵人的方法，就像解數學題一樣有趣"
13010-130100010 = "像這樣做著數字相關的作業……"
13010-130100020 = "不會有種，世上的所有東西都是由數字組成的嗎？"
13010-130100030 = "有種危險世界的味道……"
13010-130100040 = "會危險，嗎？"
13010-130100050 = "我不這麼認為"
13010-130100060 = "也不是，期望世上的所有東西都能用數字來說明"
13010-130100070 = "只是，那個"
13010-130100080 = "如果每個人都能明白它的重要性"
13010-130100090 = "我的工作也會變得輕鬆些……"
13010-130100100 = "難道，計算結果又不一致了嗎？"
13010-130100110 = "沒錯，就是那樣"
13010-130100120 = "計算機正好沒電了"
13010-130100130 = "趁著更換電池的空檔，稍微抱怨一下"

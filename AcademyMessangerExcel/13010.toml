[translation]
13010-94 = "Hello, Sensei. It's Yuuka. "
13010-95 = "Do you remember me?"
13010-96 = "Of course I do."
13010-97 = "Whomst?"
13010-98 = "Well, that's a relief."
13010-99 = "Hayase Yuuka! Did you really forget me already?!"
13010-100 = "I'm glad I got your contact information earlier."
13010-101 = "I had something important to discuss with you."
13010-102 = "Schale still hasn't been reimbursed for the mission to reclaim the club room."
13010-103 = "When will the invoice be sent out?"
13010-104 = "Was that a thing we were supposed to do?"
13010-105 = "Of course. Bullets aren't free."
13010-106 = "Create an invoice and send it to the General Student Council."
13010-107 = "They'll handle the rest."
13010-108 = "How do I do that?"
13010-109 = "We use a standardized form at Millennium."
13010-110 = "I'll bring you one the next time I visit Schale."
13010-111 = "Thanks for your help."
13010-112 = "It's no big deal."
13010-113 = "Have a good day."
13010-114 = "Sensei! Why is there a toy receipt included in the Schale invoice?"
13010-115 = "Buying toys has nothing to do with work!"
13010-116 = "But I needed it for work..."
13010-117 = "Can't you let it slide this once?"
13010-118 = "No! Sensei, it's your job to set a good example for the students!"
13010-119 = "This invoice is a mess... I'm gonna redo it."
13010-120 = "Wait... You didn't mess it up on purpose to get out of doing it, did you?"
13010-121 = "Senseeeiii!"
13010-122 = "Sensei, can you stop by the student office after school today?"
13010-123 = "I've got a problem that's beyond even me..."
13010-124 = "If you couldn't solve it, I doubt I can."
13010-125 = "No, that's not true."
13010-126 = "I really need help from an adult!"
13010-127 = "If I can help, then I'll do my best."
13010-128 = "Okay. I'll be waiting for you in the student office."
13010-129 = "Seriously... Why can't the Trinity and Gehenna students take care of their equipment?"
13010-130 = "Why are you mad now?"
13010-131 = "What do you mean, now? You make it sound like I'm mad every day!"
13010-132 = "Look, about the Black Market contraband..."
13010-133 = "I investigated the source of the confiscated weapons... "
13010-134 = "It looks like they came from Trinity and Gehenna."
13010-135 = "I've seen guns and even tanks with their school tags being traded."
13010-136 = "I doubt the two academies are doing anything to manage their equipment."
13010-137 = "The Millennium School is very strict about management,"
13010-138 = "so we never lose items like that!"
13010-139 = "Really?"
13010-140 = "..."
13010-141 = "Well, except for the private products that the students modify and sell themselves..."
13010-142 = "Sensei, you were late again this morning."
13010-143 = "I know there's no one watching, but don't you think this is a poor example to set?"
13010-144 = "But I was up late last night because of work..."
13010-145 = "I wouldn't be late if you came to wake me up every morning."
13010-146 = "It's not okay to be late, even if you had a lot of work! "
13010-147 = "Stop acting like a child! Are you an adult, or not?"
13010-148 = "I think you've become too lax because school rules don't apply to Schale."
13010-149 = "No more excuses! If you're late again tomorrow, you'll have to follow my orders!"
13010-150 = "Does that mean I can give you orders if YOU'RE late?"
13010-151 = "What? Why would I ever be late?"
13010-152 = "Just don't be late tomorrow. Please!"
13010-153 = "Sensei, I saw a game board in the Schale executive office. "
13010-154 = "If no one else is using it, could I borrow it?"
13010-155 = "I don't see why not. Do you like games?"
13010-156 = "Of course!"
13010-157 = "I love board games and online games."
13010-158 = "I didn't expect that."
13010-159 = "You seem to have a misconception about me,"
13010-160 = "but I like games just as much as the other students."
13010-161 = "Composing different strategies against difficult enemies is just as fun as solving math problems."
13010-130100010 = "When I'm doing accounting..."
13010-130100020 = "I feel like the world is made of numbers."
13010-130100030 = "That sounds like a dangerous world..."
13010-130100040 = "Would you call it dangerous?"
13010-130100050 = "I wouldn't go that far..."
13010-130100060 = "Well it's not that the world should run off of just numbers..."
13010-130100070 = "I'm more so trying to say..."
13010-130100080 = "If people could recognize the importance of numbers..."
13010-130100090 = "...maybe my work would be less burdensome. That's all."
13010-130100100 = "Are the calculations off again?"
13010-130100110 = "Yes..."
13010-130100120 = "My calculator battery died."
13010-130100130 = "I'm just complaining while it's charging."

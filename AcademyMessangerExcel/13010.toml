[translation]
13010-94 = "สวัสดีค่ะ คุณครู ฉันยูกะนะคะ "
13010-95 = "คุณครูจำฉันได้มั้ยคะ?"
13010-96 = "อ่า... จำได้สิ "
13010-97 = "ใครนะ....?"
13010-98 = "อ่า โชคดีจัง"
13010-99 = "ฮายาเสะ ยูกะไงล่ะคะ! คุณครูลืมฉันไป\nแล้วเหรอคะ?!"
13010-100 = "โชคดีจังที่ขอเบอร์ติดต่อคุณครูเอาไว้"
13010-101 = "ที่ฉันแชตหาคุณครูทาง MOMOTALK ก็\nเพราะ..."
13010-102 = "การยื่นบัญชีค่าใช้จ่ายเรื่องค่ากระสุนที่\nใช้ในตอนยึดชาเล่ต์คืนมันล่าช้าค่ะ"
13010-103 = "ฉันจะยื่นเรื่องเบิกเงินได้ตอนไหน\nเหรอคะ?"
13010-104 = "ครูต้องเป็นคนจัดการให้เหรอ...?"
13010-105 = "ใช่สิคะ กระสุนปืนไม่ใช่ของที่ได้ฟรีๆ\nนี่คะ"
13010-106 = "ถ้าคุณครูเขียนใบคำร้องส่งมา"
13010-107 = "ทางองค์การนักเรียนจะจัดการให้ค่ะ"
13010-108 = "แล้วใบคำร้องต้องเขียนยังไงนะ...."
13010-109 = "ใช้แบบฟอร์มของโรงเรียนมิลเลเนียม\nก็ได้ค่ะ"
13010-110 = "คราวหน้าถ้าไปที่ชาเล่ต์ ฉันจะเอาไป\nให้ค่ะ"
13010-111 = "ขอบคุณที่ช่วยนะ"
13010-112 = "ไม่ใช่เรื่องใหญ่เลยค่ะ"
13010-113 = "ขอให้วันนี้เป็นวันที่ดีนะคะ"
13010-114 = "คุณครูคะ! ทำไมใบเสร็จเบิกเงินของ\nชาเล่ต์ถึงรวมใบเสร็จค่าซื้อของเล่น\nไว้ด้วยคะ?"
13010-115 = "ค่าซื้อของเล่นไม่เกี่ยวกับการทำงานสัก\nหน่อยนะคะ!"
13010-116 = "แต่ว่าซื้อเอามาใช้ตอนทำงานนะ..."
13010-117 = "ช่วยทำเป็นไม่เห็นหน่อยได้มั้ย?"
13010-118 = "ไม่ได้ค่ะ! คุณครูต้องเป็นแบบอย่างให้\nนักเรียนให้สมกับเป็นคุณครูสิคะ!"
13010-119 = "เดี๋ยวฉันจะจัดการใบเสร็จที่ดูวุ่นวาย\nพวกนี้ให้เองก็ได้ค่ะ!"
13010-120 = "หรือว่า... คุณครูไม่อยากเขียนรายละ\nเอียดใบเสร็จ เลยทำให้มันดูวุ่นวาย\nแบบนี้คะ?"
13010-121 = "คุณ ครู คะ!!"
13010-122 = "คุณครูคะ หลังเลิกเรียนแล้วช่วยมาที่\nห้องขององค์การนักเรียนหน่อยได้\nมั้ยคะ?"
13010-123 = "พอดีมันมีปัญหาบางอย่างที่ฉันไม่\nสามารถคำนวณได้เองน่ะค่ะ..."
13010-124 = "ถ้าเป็นปัญหาที่ยูกะคิดไม่ออก\nมันก็น่าจะยากสำหรับครูนะ..."
13010-125 = "ไม่ขนาดนั้นหรอกค่ะ"
13010-126 = "แค่อาจต้องใช้ความช่วยเหลือของ\nผู้ใหญ่อย่างคุณครูน่ะค่ะ!"
13010-127 = "ถ้าเป็นเรื่องที่ครูช่วยได้ ครูจะช่วยเอง"
13010-128 = "ค่ะ งั้นฉันจะรออยู่ที่ห้ององค์การ\nนักเรียนนะคะ"
13010-129 = "จริงๆ เลยเชียว ทั้งพวกเด็กนักเรียนโรง\nเรียนทรีนิตี้หรือเกเฮนน่านี่จัดการดูแล\nอุปกรณ์กันแบบไหนกันนะ?"
13010-130 = "ทำไมถึงโมโหอีกล่ะ?"
13010-131 = "\"อีก\" งั้นเหรอคะ ใครได้ยินเข้าคงคิดว่า\nฉันโมโหคุณครูทุกวันแน่เลยค่ะ"
13010-132 = "สินค้าลักลอบนำเข้ามาของตลาดมืดค่ะ "
13010-133 = "พอลองสืบหาที่มาของอาวุธที่ยึดได้มา\nคราวนี้ "
13010-134 = "ก็เจอว่าเป็นของที่มาจากโรงเรียนทรีนิตี้\nและเกเฮนน่าอีกแล้วค่ะ"
13010-135 = "ดูจากการที่มีปืนและรถถังที่มีตราของ\nโรงเรียนอยู่ในตลาดมืดแบบนี้"
13010-136 = "มันเลยทำให้ฉันสงสัยว่าทั้งสอง\nโรงเรียนดูแลอุปกรณ์กันยังไงน่ะค่ะ"
13010-137 = "เพราะว่าการดูแลอุปกรณ์ของโรงเรียน\nมิลเลเนียมของเราเข้มงวดมาก"
13010-138 = "จึงไม่มีทางที่อุปกรณ์จะรั่วไหลออกไป\nแน่นอนค่ะ!"
13010-139 = "จริงเหรอ...?"
13010-140 = "...."
13010-141 = "ก็...ยกเว้นแต่ของที่พวกนักเรียนดัด\nแปลงแล้วก็เอาไปขายใหม่น่ะค่ะ"
13010-142 = "คุณครูคะ เช้าวันนี้ก็มาสายอีกแล้วนะคะ"
13010-143 = "ถึงไม่มีใครจับตาดูอยู่ก็จริง แต่คุณครูมา\nสายบ่อยไปรึเปล่าคะ?"
13010-144 = "แต่ว่าเมื่อวานคุณครูมีงานเยอะ\nกว่าจะนอนก็ดึกแล้วนะ..."
13010-145 = "ถ้ายูกะมาปลุกล่ะก็ ครูคงไม่ตื่นสาย\nหรอก..."
13010-146 = "ถึงอย่างนั้น แต่มาสายมันก็ไม่โอเค\nเลยนะคะ!"
13010-147 = "อย่ามางอแงเป็นเด็กๆ สิคะ! คุณครูเป็น\nผู้ใหญ่แล้วนะคะ"
13010-148 = "ที่ชาเล่ต์ไม่ได้มีกฎบังคับเหมือนกับที่\nโรงเรียน เพราะงั้นคุณครูเลยหละ\nหลวมแบบนี้"
13010-149 = "นี่เป็นการลงโทษค่ะ! ถ้าพรุ่งนี้คุณครู\nมาสายอีก คุณครูจะต้องฟังคำสั่งของฉัน\nหนึ่งเรื่องนะคะ!"
13010-150 = "แล้วถ้ายูกะมาสาย ครูก็สั่งเธอได้\nเหมือนกันสินะ?"
13010-151 = "คะ? ฉันไม่มีเรื่องที่ทำให้ต้องมาสาย\nนี่คะ?"
13010-152 = "เอาเป็นว่าพรุ่งนี้คุณครูห้ามมาสายเด็ด\nขาดนะคะ ห้ามเด็ดขาดค่ะ!"
13010-153 = "คุณครูคะ ที่สำนักงานของชาเล่ต์มีบอร์ด\nเกมเก่าๆ อยู่ "
13010-154 = "ถ้าไม่ได้ใช้แล้วละก็ ฉันขอเอาไปใช้ได้\nมั้ยคะ?"
13010-155 = "อื้อ ได้สิ... ยูกะเองก็ชอบเล่นเกมเหรอ?"
13010-156 = "ก็ต้องชอบอยู่แล้วสิคะ"
13010-157 = "ฉันชอบเล่นบอร์ดเกม เกมออนไลน์ก็\nชอบนะคะ"
13010-158 = "คิดไม่ถึงเลยนะ"
13010-159 = "คุณครูคงจะเข้าใจอะไรผิดอยู่นะคะ"
13010-160 = "ฉันก็ชอบเล่นเกมเหมือนกับเด็กคนอื่น\nนั่นแหละค่ะ"
13010-161 = "การศึกษากลยุทธ์การโจมตีต่างๆ ที่ใช้\nในการต่อสู้กับศัตรูยากๆ ก็สนุกพอๆ กับ\nการแก้โจทย์คณิตศาสตร์เลยค่ะ"
13010-130100010 = "พอลองทำบัญชีดูแล้ว"
13010-130100020 = "ยิ่งทำให้คิดว่าโลกของเราสร้างมาจาก\nตัวเลขเลยละค่ะ"
13010-130100030 = "เหมือนได้กลิ่นโลกแห่งอันตรายเลย..."
13010-130100040 = "อันตราย... เหรอคะ?"
13010-130100050 = "ฉันไม่คิดแบบนั้นนะคะ"
13010-130100060 = "ถ้าเป็นโลกที่สามารถอธิบายทุกอย่าง\nได้ด้วยตัวเลขละก็คงเป็นโลกที่น่าอยู่\nมากเลยค่ะ"
13010-130100070 = "เรื่องนั้นมัน..."
13010-130100080 = "ถ้าทำให้คนอื่นๆ ได้รู้ถึงความสำคัญ\nของตัวเลขได้ละก็"
13010-130100090 = "ฉันคิดว่างานของฉันก็อาจจะลดลง\nบ้างก็ได้ค่ะ"
13010-130100100 = "บัญชีไม่ตรงอีกแล้วเหรอ?"
13010-130100110 = "บัญชีก็ตรงอยู่ค่ะ"
13010-130100120 = "แต่พอดีเครื่องคิดเลขฉันแบตหมด"
13010-130100130 = "เลยแวะมาคุยกับคุณครูระหว่างที่รอ\nชาร์จแบตค่ะ..."

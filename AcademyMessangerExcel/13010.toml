[translation]
13010-94 = "안녕하세요, 선생님. 유우카입니다."
13010-95 = "저 기억하고 계시죠?"
13010-96 = "아아. 당연하지."
13010-97 = "……누구?"
13010-98 = "뭐, 그럼 다행이구요."
13010-99 = "하야세 유우카예요! 그새 잊어버리신 건가요?!"
13010-100 = "선생님의 연락처를 받아두길 잘했네요."
13010-101 = "모모톡으로 연락드린 건 다름이 아니라……."
13010-102 = "지난번 샬레 탈환 당시 사용했던 탄환의 경비 처리가 늦어지고 있어서요."
13010-103 = "경비는 언제쯤 청구받을 수 있을까요?"
13010-104 = "이쪽에서 처리해야 하는 거였어……?"
13010-105 = "물론이죠. 탄환도 공짜는 아니니까요."
13010-106 = "청구서를 작성해서 보내주시면 총학생회에서"
13010-107 = "대신 잔금을 치러줄 거예요."
13010-108 = "청구서는 어떻게 써야 하지……."
13010-109 = "청구서 양식이라면 밀레니엄 학원에서 쓰는 것이 있어요."
13010-110 = "다음에 샬레를 방문할 때 가져다드릴게요."
13010-111 = "도와줘서 고마워."
13010-112 = "어려운 일도 아닌걸요."
13010-113 = "그럼 좋은 하루 되세요."
13010-114 = "선생님! 어째서 샬레의 경비 청구서에 장난감 영수증이 포함되어 있는 건가요?"
13010-115 = "장난감 구입은 공무와는 상관없는 일이라고요!"
13010-116 = "하지만 일을 하는 데 꼭 필요한 물건이었는걸……."
13010-117 = "한 번만 눈감아주면 안 될까?"
13010-118 = "안 돼요! 선생님이시면 선생님답게 학생들에게 모범을 보이셔야죠!"
13010-119 = "이 엉망인 청구서는 제가 대신 작성해 둘 테니 그렇게 아세요!"
13010-120 = "설마…… 청구서를 작성하기 귀찮아서 일부러 엉망으로 쓴 건 아니시겠죠?"
13010-121 = "선—생—님—!!"
13010-122 = "선생님, 오늘 방과 후에 학생 사무실에 들러 주실 수 있으신가요?"
13010-123 = "그게 제 능력으로는 도저히 계산하기 어려운 문제와 맞닥뜨려서……."
13010-124 = "유우카도 풀지 못한 문제라면 내게도 어려울 텐데……."
13010-125 = "아뇨, 그렇지 않아요."
13010-126 = "어른인 선생님의 도움이 꼭 필요해요!"
13010-127 = "내가 해결할 수 있는 문제라면 도와줄게."
13010-128 = "네, 그럼 학생 사무실에서 기다리고 있을게요."
13010-129 = "정말이지…… 트리니티나 게헨나 학원의 학생들은 도대체 비품 관리를 어떻게 하고 있는 건가요?"
13010-130 = "또 왜 그렇게 화가 났어?"
13010-131 = "'또' 라니요. 누가 보면 제가 매일 화만 내는 줄 알겠어요."
13010-132 = "블랙마켓의 밀수품 말이에요."
13010-133 = "이번에 압수한 무기들의 출처를 조사해 보니"
13010-134 = "또 트리니티와 게헨나에서 흘러나간 물건이더군요."
13010-135 = "교표가 찍힌 총기는 물론이고 전차까지 암시장에서 돌아다니는 걸 보면,"
13010-136 = "두 학원이 관리라는 걸 하고 있는지가 의심스러울 정도예요."
13010-137 = "물론 저희 밀레니엄 학원의 관리는 엄격하기 때문에"
13010-138 = "비품이 유출되는 일은 절대 없답니다!"
13010-139 = "정말……?"
13010-140 = "……."
13010-141 = "뭐, 학생들이 멋대로 개조해서 팔아 치우는 사제품만 제외한다면 말이죠……."
13010-142 = "선생님, 오늘 아침에 또 지각하셨더군요."
13010-143 = "아무리 감시하는 사람이 없다고는 하지만, 너무 자주 지각하시는 게 아닌가요?"
13010-144 = "하지만 어제는 일이 많아서 늦게 잠자리에 들었는걸……."
13010-145 = "유우카가 깨우러 와주면 지각하지 않을 텐데……."
13010-146 = "그렇다 하더라도 지각해도 괜찮은 건 아니라고요!"
13010-147 = "어리광 부리지 마세요! 어른이시잖아요?"
13010-148 = "샬레는 학교처럼 교칙이 적용되지 않으니까 너무 느슨해지신 것 같아요."
13010-149 = "벌이에요! 내일부터 지각하시면 제가 시키는 명령을 한 가지 들어주셔야겠어요!"
13010-150 = "그럼 유우카가 늦으면 내가 명령을 내릴 수 있는 거야?"
13010-151 = "네? 제가 지각을 할 리가 없잖아요?"
13010-152 = "여하튼 내일은 절대로 늦으시면 안 돼요. 절대로요!"
13010-153 = "선생님, 샬레의 집무실에 방치된 게임 보드가 있던데,"
13010-154 = "사용하지 않는 물건이라면 제가 써도 괜찮을까요?"
13010-155 = "상관없지만…… 유우카도 게임을 좋아해?"
13010-156 = "물론 좋아하고 말고요."
13010-157 = "보드 게임도 좋아하고, 온라인 게임도 좋아한답니다."
13010-158 = "의외네."
13010-159 = "무언가 오해를 하신 모양인데,"
13010-160 = "저도 다른 학생들만큼 게임을 좋아하는 편이에요."
13010-161 = "어려운 적을 상대로 여러가지 공략법을 연구하는 건 수학 문제를 푸는 것만큼 즐겁거든요."
13010-130100010 = "회계를 하다 보면"
13010-130100020 = "세상이 숫자로 이루어진 것 같다는 생각이 들곤 하죠……"
13010-130100030 = "위험한 세계의 향기가……."
13010-130100040 = "위험, 한가요?"
13010-130100050 = "저는 그렇게 생각하지 않는데요."
13010-130100060 = "딱히, 숫자로 모든 것을 설명할 수 있는 세계가 바람직하다고 말하는 것도 아니고요."
13010-130100070 = "그저 조금,"
13010-130100080 = "사람들이 숫자의 중요성을 알아준다면"
13010-130100090 = "제 일도 좀 줄어들지 않을까, 하는 생각이 들어서요."
13010-130100100 = "또 장부가 안 맞아?"
13010-130100110 = "정확해요."
13010-130100120 = "마침 계산기 배터리가 다 돼서"
13010-130100130 = "충전 중에 푸념해 봤답니다……"

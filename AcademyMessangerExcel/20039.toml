[translation]
20039-200390010 = "거기 있는가, 선생?"
20039-200390020 = "있는데."
20039-200390030 = "음."
20039-200390040 = "지금부터 잘 들어주면……"
20039-200390050 = "아니, 읽어 주면 좋겠다."
20039-200390060 = "지금 현룡문에는"
20039-200390070 = "아니, 현룡문의 문주에게는"
20039-200390080 = "전대미문의 일이 일어나고 있다."
20039-200390090 = "갑자기?!"
20039-200390100 = "촌각을 다투는 일이다."
20039-200390110 = "기밀을 요하는 일이기도 하지."
20039-200390120 = "그대가 학생을 저버리지 않는 교육자라면."
20039-200390130 = "모든 것을 비밀에 부치고……"
20039-200390140 = "지금, 산해경으로 와 주었으면 하는 것이야."
20039-200390150 = "현룡문 업무의 체험은 어떠하였는가, 선생?"
20039-200390160 = "키사키는 대단하구나……. 싶었어."
20039-200390170 = "뭐어. 그래도 산해경에서는 그렇게까지."
20039-200390180 = "도를 과도하게 넘은 일은 발생하지 않으니 말이다?"
20039-200390190 = "그리하도록 만들어야 하는 일이기도 하고."
20039-200390200 = "……묘하게 말에 뼈가 있는 것도 같네……."
20039-200390210 = "음?"
20039-200390220 = "무슨 의미인지 잘 모르겠구나."
20039-200390230 = "다음에는 내가 샬레로 찾아가 보도록 하지."
20039-200390240 = "후후. 그때를 기대하겠다. 선생."
20039-200390250 = "이전에 고했던 대로"
20039-200390260 = "오늘은 샬레에 당번으로서 방문해 볼까 한다만."
20039-200390270 = "언제든지 환영이야."
20039-200390280 = "음."
20039-200390290 = "선생이 그리 흔쾌히 이야기해 주니 좋구나."
20039-200390300 = "그러면 샬레에서 만나도록 하지."
20039-200390310 = "몸은 좀 괜찮은가, 선생?"
20039-200390320 = "그렇기는…… 한데."
20039-200390330 = "오늘 샬레에 찾아왔던 거…… 맞지?"
20039-200390340 = "흠?"
20039-200390350 = "오호라. 그렇군."
20039-200390360 = "……."
20039-200390370 = "후후후후."
20039-200390380 = "나 스스로도 잘 모르겠다고 한다면, 어떻게 할 생각인가?"
20039-200390390 = "키사키가 모르면 안 되지 않아?!"
20039-200390400 = "나비가 나인가, 내가 나비인가……."
20039-200390410 = "참으로 덧없고도 알 수 없는 문제라고 생각하지 않는가, 선생?"
20039-200390420 = "뭐, 그 역시 아무래도 좋은 일이겠지."
20039-200390430 = "결국 선생의 사진은, 내 핸드폰에 남을 테니 말이다?"
20039-200390440 = "지워 줘–!"
20039-200390450 = "샬레의 당번 일도"
20039-200390460 = "조금씩 익숙해지고 있는 참인 듯하다만."
20039-200390470 = "이미 그런 정도가 아닌 수준인 것 같지만……."
20039-200390480 = "그러한가?"
20039-200390490 = "그에 비례해 현룡문에서의 기우도"
20039-200390500 = "나날이 늘어가고 있는 참이니."
20039-200390510 = "그대의 의견에도 분명 일리는 있겠구나."
20039-200390520 = "그런 의미에서, 오늘도 샬레에 방문하도록 하지."
20039-200390530 = "그건 또 무슨 논리야!"
20039-200390540 = "모르는 것인가. 선생."
20039-200390550 = "세상에는 이따금 논리를 필요로 하지 않을 때가 있다."
20039-200390560 = "더더욱 의미를 모르겠어!"
20039-200390570 = "현룡문의 문주로서 중요한 미덕 중 하나는"
20039-200390580 = "약속을 잊지 않는 것이다."
20039-200390590 = "맞아. 약속은 중요하지."
20039-200390600 = "그리고 또 하나 중요한 미덕은."
20039-200390610 = "타인의 약속 역시 잊지 않고"
20039-200390620 = "마지막까지 그 대가를 받아 내는 것이지."
20039-200390630 = "정말이야?!"
20039-200390640 = "농담이다."
20039-200390650 = "하지만, 선생."
20039-200390660 = "나는 분명히, 같이 여기저기를 찾아가 보자는"
20039-200390670 = "선생의 약속을 기억하고 있다."
20039-200390680 = "그러니 선생 역시, 그 약속을 잊지 않기를 바란다."
20039-200390690 = "진짜 궁금하기만 해서 물어보는 건데……."
20039-200390700 = "잊어버리면, 어떻게 되나요?"
20039-200390710 = "……."
20039-200390720 = "뭐어, 별일은 없을 게다."
20039-200390730 = "단지"
20039-200390740 = "현룡문의 방식으로, 그에 상응하는 대가를 치르게 될 뿐."
20039-200390750 = "잊어버릴 리가 있겠습니까!"
20039-200390760 = "음."
20039-200390770 = "거기 있는가, 선생?"
20039-200390780 = "몸은 이제 괜찮아?"
20039-200390790 = "그래. 문제는 없다."
20039-200390800 = "……연단방에서는 조금 호들갑을 당하기는 했지만."
20039-200390810 = "산해경까지 바래다주어서 고맙다는 말을 하고 싶구나."
20039-200390820 = "그 정도야."
20039-200390830 = "음."
20039-200390840 = "그 대신이라고 해야 할지."
20039-200390850 = "일종의 보답…… 같은 것이라고 해야 할지."
20039-200390860 = "으음."
20039-200390870 = "……어느 쪽도, 이 상황에 딱 들어맞는 표현은 아닌 듯싶다만……."
20039-200390880 = "? 무슨 일 있어?"
20039-200390890 = "……."
20039-200390900 = "뭐어."
20039-200390910 = "그러니까."
20039-200390920 = "……."
20039-200390930 = "이런, 것이다."
20039-200390950 = "?!?!"
20039-200390960 = "이건……! 이것은!?"
20039-200390970 = "조금 전에, 찍어 보았을 뿐이다."
20039-200390980 = "평생 간직하겠습니다!"
20039-200390990 = "그러한가."
20039-200391000 = "……."
20039-200391010 = "꼭 그리 하고 싶다면."
20039-200391020 = "적어도, 다른 누군가에게는 보이지 말아 다오."

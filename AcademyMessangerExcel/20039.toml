[translation]
20039-200390010 = "อยู่หรือเปล่า ครู?"
20039-200390020 = "อยู่สิ"
20039-200390030 = "อืม"
20039-200390040 = "ตั้งใจฟังสิ่งที่เราจะบอก..."
20039-200390050 = "ไม่สิ ตั้งใจอ่านให้ดีเล่า"
20039-200390060 = "ตอนนี้มังกรดำ"
20039-200390070 = "ไม่สิ ประมุขมังกรดำ"
20039-200390080 = "กำลังเจอเรื่องที่ไม่เคยเจอมาก่อน"
20039-200390090 = "เกิดอะไรขึ้นเหรอ?!"
20039-200390100 = "เรื่องที่ต้องแข่งกับเวลาที่เหลืออยู่\nน้อยนิดน่ะ"
20039-200390110 = "และเป็นเรื่องการรักษาความลับด้วย"
20039-200390120 = "หากครูเป็นผู้ที่ไม่ทิ้งนักเรียน"
20039-200390130 = "จงเก็บทุกอย่างเป็นความลับ..."
20039-200390140 = "แล้วช่วยมาที่ซานไห่จิงตอนนี้หน่อยสิ"
20039-200390150 = "คิดเช่นไรกับการได้ทำงานที่มังกรดำ\nหรือครู?"
20039-200390160 = "คิดว่า... คิซากินี่ยอดเยี่ยมไปเลยนะ..."
20039-200390170 = "แต่ถึงอย่างไร ในซานไห่จิงก็"
20039-200390180 = "ไม่เกิดเหตุการณ์วุ่นวายเกินขอบเขต\nหรอก"
20039-200390190 = "และเราก็ต้องทำให้เป็นเช่นนั้นด้วย"
20039-200390200 = "เหมือนคำพูดแฝงความหมายแปลกๆ\nแฮะ..."
20039-200390210 = "หืม?"
20039-200390220 = "ไม่รู้สินะว่าเราหมายความว่าอะไร"
20039-200390230 = "ไว้ครั้งหน้าเราจะหาไปที่ชาเล่ต์นะ"
20039-200390240 = "ฮุฮุ แล้วเราจะตั้งตารอวันนั้นนะ ครู"
20039-200390250 = "ตามที่เราบอกไปก่อนหน้านี้"
20039-200390260 = "วันนี้เราจะไปอยู่เวรที่ชาเล่ต์น่ะ"
20039-200390270 = "ครูยินดีต้อนรับเสมอเลย"
20039-200390280 = "อืม"
20039-200390290 = "เห็นครูพูดอย่างดีใจแบบนี้ เราก็ดีใจ"
20039-200390300 = "แล้วเจอกันที่ชาเล่ต์นะ"
20039-200390310 = "สบายดีหรือครู?"
20039-200390320 = "ก็... น่าจะนะ"
20039-200390330 = "วันนี้แวะมาที่ชาเล่ต์... ใช่มั้ย?"
20039-200390340 = "หืม?"
20039-200390350 = "โอ้... เป็นเช่นนั้นสินะ"
20039-200390360 = "..."
20039-200390370 = "ฮุฮุฮุฮุ"
20039-200390380 = "ถ้าบอกว่าเราเองก็ไม่รู้เหมือนกัน\nครูจะทำอย่างไรหรือ?"
20039-200390390 = "คิซากิต้องรู้สิ!"
20039-200390400 = "ผีเสื้อคือตัวเรา หรือตัวเราคือผีเสื้อ..."
20039-200390410 = "นี่ช่างเป็นคำถามที่ไม่อาจรู้คำตอบได้\nว่ามั้ยเล่าครู?"
20039-200390420 = "แต่ยังไงก็เป็นเรื่องที่ดีนะ"
20039-200390430 = "เพราะสุดท้ายเราได้รูปของครูไว้ใน\nโทรศัพท์เราน่ะ"
20039-200390440 = "ลบเลยนะ"
20039-200390450 = "เหมือนว่าเราจะค่อยๆ คุ้นชิน"
20039-200390460 = "กับงานอยู่เวรที่ชาเล่ต์แล้วละ"
20039-200390470 = "ยังไม่น่าจะถึงระดับนั้นนะ..."
20039-200390480 = "เช่นนั้นหรือ?"
20039-200390490 = "ความกังวลของมังกรดำ"
20039-200390500 = "ก็กำลังเพิ่มขึ้นทุกวันเลย"
20039-200390510 = "ความเห็นของครูก็มีเหตุผลสินะ"
20039-200390520 = "เช่นนั้นวันนี้เราจะไปที่ชาเล่ต์อีก"
20039-200390530 = "นี่มันตรรกะอะไรกันน่ะ!"
20039-200390540 = "ไม่รู้หรอกหรือครู"
20039-200390550 = "หลายครั้งโลกเราก็ไม่จำเป็นต้องใช้\nตรรกะหรอกนะ"
20039-200390560 = "ยิ่งไม่เข้าใจกว่าเดิมอีก!"
20039-200390570 = "หนึ่งในคุณธรรมที่สำคัญของประมุข\nแห่งมังกรดำ"
20039-200390580 = "ก็คือการไม่ลืมสัญญาน่ะ"
20039-200390590 = "อืม สัญญาเป็นเรื่องสำคัญอยู่แล้ว"
20039-200390600 = "และอีกหนึ่งคุณธรรมที่สำคัญ"
20039-200390610 = "ก็คือการไม่ลืมสัญญาที่คนอื่นทำไว้"
20039-200390620 = "แล้วตอบแทนให้สาสม"
20039-200390630 = "จริงเหรอ?!"
20039-200390640 = "เราล้อเล่นน่า"
20039-200390650 = "แต่ว่า ครู"
20039-200390660 = "เรายังจำสัญญาของครูที่บอกว่า"
20039-200390670 = "จะไปดูนู่นนี่ด้วยกันได้อยู่นะ"
20039-200390680 = "หวังว่าครูจะไม่ลืมสัญญานั้นเล่า"
20039-200390690 = "ขอถามเผื่อๆ ไว้ก่อนนะ..."
20039-200390700 = "แล้วถ้าลืม จะเป็นยังไงเหรอ?"
20039-200390710 = "..."
20039-200390720 = "ก็ไม่มีอะไรมากหรอก"
20039-200390730 = "ก็แค่"
20039-200390740 = "จะต้องชดใช้ให้สาสม ตามแบบฉบับ\nของมังกรดำน่ะ"
20039-200390750 = "ถ้างั้นครูจะไม่ลืมเด็ดขาดเลย!"
20039-200390760 = "อืม"
20039-200390770 = "อยู่หรือเปล่า ครู?"
20039-200390780 = "ร่างกายเป็นยังไงบ้าง?"
20039-200390790 = "อืม ไม่มีปัญหาหรอก"
20039-200390800 = "แม้ตอนนี้ที่ชมรมวิจัยศาสตร์การปรุงยา\nจะตื่นตระหนกกันนิดหน่อยก็เถอะ..."
20039-200390810 = "ขอบคุณที่มาส่งถึงซานไห่จิงเลยนะ"
20039-200390820 = "แค่นี้สบายอยู่แล้ว"
20039-200390830 = "อืม"
20039-200390840 = "จะเรียกว่าเป็นการชดเชย"
20039-200390850 = "หรือเป็น... การตอบแทนอย่างหนึ่งดีนะ"
20039-200390860 = "อืม"
20039-200390870 = "แต่ไม่ว่าอย่างไหนก็ไม่น่าจะเหมาะกับ\nสถานการณ์..."
20039-200390880 = "มีเรื่องอะไรเหรอ?"
20039-200390890 = "..."
20039-200390900 = "ก็"
20039-200390910 = "คือว่า"
20039-200390920 = "..."
20039-200390930 = "แบบนี้น่ะ"
20039-200390950 = "?!?!"
20039-200390960 = "นี่มัน...! นี่มัน!?"
20039-200390970 = "เราถ่ายไว้เมื่อกี้น่ะ"
20039-200390980 = "ครูจะเก็บไว้ตลอดชีวิตเลย!"
20039-200390990 = "เช่นนั้นหรือ?"
20039-200391000 = "..."
20039-200391010 = "ถ้าอยากทำเช่นนั้นจริงๆ"
20039-200391020 = "อย่างน้อยก็อย่าเอาให้ใครอื่นดูเล่า"

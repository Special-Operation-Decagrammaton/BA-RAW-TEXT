[translation]
20039-200390010 = "老師，汝在嗎？"
20039-200390020 = "我在"
20039-200390030 = "唔呣"
20039-200390040 = "那麼請聽……"
20039-200390050 = "不，應該是請看才對"
20039-200390060 = "現在在玄龍門"
20039-200390070 = "不，是玄龍門的門主身上"
20039-200390080 = "發生了前所未有的事件"
20039-200390090 = "這麼突然！？"
20039-200390100 = "此事分秒必爭"
20039-200390110 = "當然也需要完全保密"
20039-200390120 = "若汝自認是名不會辜負學生期待的教育家"
20039-200390130 = "希望汝能在完全保密的情況下……"
20039-200390140 = "現在，立刻來山海經一趟"
20039-200390150 = "玄龍門的工作體驗如何，老師？"
20039-200390160 = "讓人不禁覺得……妃姬真是了不起"
20039-200390170 = "言重了。不過在山海經"
20039-200390180 = "本就不常發生踰矩的事件"
20039-200390190 = "當然，設法加以避免也必不可少"
20039-200390200 = "怎麼聽起來好像話中有話……"
20039-200390210 = "嗯？"
20039-200390220 = "不太清楚汝這番話的涵義"
20039-200390230 = "下次換妾身去拜訪夏萊吧"
20039-200390240 = "呵呵。妾身相當期待，老師"
20039-200390250 = "之前有跟汝提過"
20039-200390260 = "今日妾身希望以值日生的身分拜訪夏萊一事吧"
20039-200390270 = "隨時歡迎你來"
20039-200390280 = "唔呣"
20039-200390290 = "看見如此爽快的答覆，屬實令人高興"
20039-200390300 = "那麼晚些時候夏萊見"
20039-200390310 = "身體是否好些了呢？老師"
20039-200390320 = "多少……有比較好了"
20039-200390330 = "妃姬今天有來過夏萊……對吧？"
20039-200390340 = "嗯？"
20039-200390350 = "原來如此"
20039-200390360 = "……"
20039-200390370 = "呵呵"
20039-200390380 = "倘若妾身表示自己也不太清楚，汝打算怎麼辦呢？"
20039-200390390 = "妃姬有可能不清楚的嗎！？"
20039-200390400 = "夢者究竟是蝶是己……"
20039-200390410 = "不覺得是個虛幻又難解的問題嗎？老師"
20039-200390420 = "總之，無論怎樣都好"
20039-200390430 = "畢竟老師的照片將會保存在妾身的手機裡"
20039-200390440 = "趕快刪掉！"
20039-200390450 = "夏萊值日生的工作"
20039-200390460 = "似乎已日漸熟悉了"
20039-200390470 = "我倒感覺已經超越「還在熟悉」的程度了……"
20039-200390480 = "是嗎？"
20039-200390490 = "相對來說，對玄龍門方面的憂慮"
20039-200390500 = "也在與日俱增呢"
20039-200390510 = "汝之所見確實言之有理"
20039-200390520 = "因此，妾身今日也要去夏萊"
20039-200390530 = "這是什麼邏輯！？"
20039-200390540 = "汝不清楚嗎？老師"
20039-200390550 = "世間有時是不需要邏輯的"
20039-200390560 = "更聽不懂你在說什麼了！"
20039-200390570 = "玄龍門門主的美德之一"
20039-200390580 = "乃不會違背約定"
20039-200390590 = "嗯，遵守約定是很重要的"
20039-200390600 = "除此之外的另一美德"
20039-200390610 = "乃不遺忘他人許下的約定"
20039-200390620 = "無論動用任何手段，必定會要求履行"
20039-200390630 = "真的嗎！？"
20039-200390640 = "此乃戲言"
20039-200390650 = "不過，老師"
20039-200390660 = "汝確實提過要一同四處遊歷"
20039-200390670 = "妾身記得老師的約定"
20039-200390680 = "因此也希望老師，莫要忘了與妾身的約定"
20039-200390690 = "我這麼問純粹是出於好奇……"
20039-200390700 = "假如真的忘記了會怎麼樣？"
20039-200390710 = "……"
20039-200390720 = "倒也無足掛齒"
20039-200390730 = "只不過"
20039-200390740 = "須以玄龍門的方式，付出相應的代價罷了"
20039-200390750 = "我絕對不會忘記的！"
20039-200390760 = "唔呣"
20039-200390770 = "汝在嗎，老師？"
20039-200390780 = "身體還好嗎？"
20039-200390790 = "無須擔心"
20039-200390800 = "……雖說鍊丹術研究會仍略顯驚慌就是"
20039-200390810 = "汝將妾身送回山海經一事，在此向汝致謝"
20039-200390820 = "不用客氣"
20039-200390830 = "唔呣"
20039-200390840 = "不知稱之為交換是否妥當"
20039-200390850 = "或者……該稱之為報答呢"
20039-200390860 = "唔嗯"
20039-200390870 = "兩者似乎皆不甚貼切啊……"
20039-200390880 = "怎麼了嗎？"
20039-200390890 = "……"
20039-200390900 = "怎麼說呢"
20039-200390910 = "簡而言之"
20039-200390920 = "……"
20039-200390930 = "就是這麼回事"
20039-200390950 = "！？！？"
20039-200390960 = "這……！這是！？"
20039-200390970 = "不過是方才試拍的照片罷了"
20039-200390980 = "我會永遠珍藏的！"
20039-200390990 = "是嗎"
20039-200391000 = "……"
20039-200391010 = "若真要如此倒也無妨"
20039-200391020 = "然還請汝至少莫要讓他人察覺"

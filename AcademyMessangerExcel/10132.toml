10132-101320070 = "I messaged the wrong person...!"
10132-101320080 = "How come you can't make it, though?"
10132-101320090 = "Well..."
10132-101320100 = "I happen to be... "
10132-101320110 = "working a modeling gig on that day..."
10132-101320120 = "Sensei"
10132-101320130 = "Do you like art...?"
10132-101320140 = "Uh... Depends?"
10132-101320150 = "If you don't HATE it..."
10132-101320160 = "could you help me with something art-related...?"
10132-101320170 = "Always! But with what...exactly?"
10132-101320180 = "I..."
10132-101320190 = "have to attend an art lesson...!"
10132-101320200 = "An art lesson?!"
10132-101320210 = "Did you get home okay, Sensei?"
10132-101320220 = "The food was so good today...!"
10132-101320230 = "Once I got home, I realized..."
10132-101320240 = "You're always the one helping me..."
10132-101320250 = "So...for sure...next time...!"
10132-101320260 = "Sensei?"
10132-101320270 = "Have you eaten lunch yet...?"
10132-101320280 = "...Is it not 8 in the morning right now?!"
10132-101320290 = "So you haven't...! What a relief...!"
10132-101320300 = "In that case"
10132-101320310 = "could I borrow a moment "
10132-101320320 = "of your lunch hour...?"
10132-101320330 = "Sensei"
10132-101320340 = "This will really be the last one...!"
10132-101320350 = "Huh...?"
10132-101320360 = "Ah..."
10132-101320370 = "This is really, very, truly the absolute last "
10132-101320380 = "fashion show I'll be in...!"
10132-101320390 = "Would you... "
10132-101320400 = "go with me...?"

[translation]
10132-101320010 = "ขอโทษนะคะ หัวหน้า..."
10132-101320020 = "เรื่องการถ่ายวิดีโอครั้งนี้..."
10132-101320030 = "พอจะเปลี่ยนวันได้มั้ยคะ...?"
10132-101320040 = "ครูได้เป็นหัวหน้าชมรม\nวิจัยศาสตร์นินจาสินะ...!"
10132-101320050 = "เฮือกกก คะ... คุณครู?!"
10132-101320060 = "ขอโทษค่ะ! "
10132-101320070 = "ฉันน่าจะส่งข้อความหาผิดคนค่ะ!"
10132-101320080 = "ติดงานอะไรถึงไปถ่ายวิดีโอ\nไม่ได้เหรอ?"
10132-101320090 = "อ่า คือว่า..."
10132-101320100 = "พอดีวันนั้น... "
10132-101320110 = "ฉันต้องไปทำงานพาร์ทไทม์นางแบบ\nแฟชั่นค่ะ..."
10132-101320120 = "คุณครู"
10132-101320130 = "ไม่ทราบว่า... ชอบศิลปะมั้ยคะ?"
10132-101320140 = "อืม... ไม่รู้สิ...?"
10132-101320150 = "ถ้าไม่ติดอะไรละก็"
10132-101320160 = "มาช่วยฉันสักหน่อยได้มั้ยคะ...?"
10132-101320170 = "ได้อยู่แล้ว! ว่าแต่...\nให้ช่วยอะไรเหรอ?"
10132-101320180 = "คือว่า..."
10132-101320190 = "ฉันต้องไปสถาบันศิลปะน่ะค่ะ!"
10132-101320200 = "สถาบันศิลปะ?!"
10132-101320210 = "กลับไปถึงหรือยังคะ คุณครู?"
10132-101320220 = "วันนี้ฉันได้กินอย่างอิ่มอร่อยเลยค่ะ!"
10132-101320230 = "แต่พอกลับมาคิดดู ฉันว่า..."
10132-101320240 = "ฉันเป็นฝ่ายได้รับนู่นนี่จากคุณครู...\nทุกครั้งเลย..."
10132-101320250 = "เพราะงั้น... ต่อไปฉันขอตอบแทน\nบ้างนะคะ...!"
10132-101320260 = "คุณครู"
10132-101320270 = "ทานมื้อกลางวันหรือยังคะ...!"
10132-101320280 = "ตอนนี้เพิ่ง 8 โมงเช้าเองนะ...?!"
10132-101320290 = "ละ... โล่งอกไปที...!"
10132-101320300 = "ถ้างั้น"
10132-101320310 = "ฉันขอเวลา... "
10132-101320320 = "พักกลางวันของคุณครูได้มั้ยคะ...!"
10132-101320330 = "คุณครู"
10132-101320340 = "นี่เป็นครั้งสุดท้ายแล้วค่ะ...!"
10132-101320350 = "หืม...?"
10132-101320360 = "อ่า คือว่า..."
10132-101320370 = "ฉันจะได้ไปเดินแฟชั่นโชว์ "
10132-101320380 = "เป็นครั้งสุดท้ายแล้วจริงๆ ค่ะ...!"
10132-101320390 = "ไม่ทราบว่า... "
10132-101320400 = "คุณครูช่วยไปด้วยกันได้มั้ยคะ...?"
10132-101320410 = "ได้อยู่แล้ว!"
10132-101320420 = "คุณครู"
10132-101320430 = "เมื่อกี้ฉันขอโทษนะคะ..."
10132-101320440 = "ไม่เป็นไร ครูไม่ว่าหรอก"
10132-101320450 = "ฉันต้องไปฝึกทักษะนินจาให้มากขึ้น\nแล้วค่ะ...!"
10132-101320460 = "ต่อไปไม่ว่าจะได้ใส่ชุดแบบไหน "
10132-101320470 = "จะได้ไม่เกิดเรื่องแบบนี้อีก"
10132-101320480 = "คะ... ครูจะเป็นกำลังใจให้นะ!"
10132-101320490 = "ค่ะ! คุณครู!"

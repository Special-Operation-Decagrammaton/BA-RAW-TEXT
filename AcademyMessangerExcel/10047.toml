[translation]
10047-100470010 = "老師，Let's Vacation"
10047-100470020 = "Vacation……？"
10047-100470030 = "嗯，獲得了。暑假"
10047-100470040 = "平時在陰陽部的活動，努力了"
10047-100470050 = "要我，好好去休息"
10047-100470060 = "原來如此。那真是太好了呢"
10047-100470070 = "有什麼暑假的計畫嗎？"
10047-100470080 = "嗯，那當然"
10047-100470090 = "是什麼樣的計畫，可以聽聽嗎？"
10047-100470100 = "去尋找吧，老師"
10047-100470110 = "咦？尋找是指？要找什麼？"
10047-100470120 = "那麼，集合"
10047-100470130 = "我在海邊等著唷"
10047-100470140 = "那，那個，知世……？"
10047-100470150 = "總之，去海邊就行了嗎……？"
10047-100470160 = "老師。上次在尋找閃亮的時候"
10047-100470170 = "在海邊，發現了很厲害的東西"
10047-100470180 = "好在意……！"
10047-100470190 = "嗯，我也想給老師看呢"
10047-100470200 = "機會難得"
10047-100470210 = "一起去看吧，老師"
10047-100470220 = "那麼，我等著唷～"
10047-100470230 = "老師"
10047-100470240 = "啊，知世。怎麼了嗎？"
10047-100470250 = "有好好刷牙嗎？"
10047-100470260 = "有，有哦……？"
10047-100470270 = "為什麼突然這麼問……？"
10047-100470280 = "嗯，那就好"
10047-100470290 = "老師，那之後"
10047-100470300 = "不管發生什麼事"
10047-100470310 = "都不能忘記一天要刷三次牙哦？"
10047-100470320 = "呃，嗯？"
10047-100470330 = "那，再見囉"
10047-100470340 = "老師"
10047-100470350 = "……知世？"
10047-100470360 = "老師，在海邊玩真開心呢～"
10047-100470370 = "知世覺得開心真是太好了"
10047-100470380 = "嗯，可是……"
10047-100470390 = "只有我自己開心的話有點可惜～"
10047-100470400 = "啊，我好像明白那種心情"
10047-100470410 = "獨樂樂不如眾樂樂嘛"
10047-100470420 = "啊，我有個好主意"
10047-100470430 = "既然大家沒辦法來海邊……"
10047-100470440 = "沒辦法來海邊……？"
10047-100470450 = "那就反過來把大海帶走就可以了♪"
10047-100470460 = "好～既然決定了就趕緊開始～"
10047-100470470 = "……嗯？知世？\n你說要把海帶走？嗯……？"
10047-100470480 = "開～始～囉～"
10047-100470490 = "先，先等一下！知世！我馬上去找你！"

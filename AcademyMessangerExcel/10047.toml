[translation]
10047-100470010 = "คุณครู พักร้อนแหละ"
10047-100470020 = "หืม? พักร้อน?\nหมายถึงเรื่องอะไรเหรอ?"
10047-100470030 = "หืม ฉันได้วันหยุดละ วันหยุดพักร้อน"
10047-100470040 = "ฉันตั้งใจทำงานของชมรมอย่างหนัก "
10047-100470050 = "เลยได้วันหยุดน่ะ"
10047-100470060 = "อ๋อ แบบนี้นี่เอง พอดีเลยนะ"
10047-100470070 = "แล้ววางแผนไว้รึยังล่ะ?"
10047-100470080 = "อื้อ มีแล้ว"
10047-100470090 = "งั้นเหรอ? วางแผนอะไรไว้ล่ะ?"
10047-100470100 = "ไปหากันเถอะ คุณครู"
10047-100470110 = "หืม? ให้ 'ไปหา' เหรอ?\nหาอะไรล่ะ?"
10047-100470120 = "\"สัญญาณ\" ที่จับได้"
10047-100470130 = "ฉันจะรอที่ชายหาดนะ"
10047-100470140 = "หืม? สัญญาณที่จับได้?"
10047-100470150 = "เอาเป็นว่าไปที่ชายหาดก่อนแล้วกัน..."
10047-100470160 = "คุณครู ตอนที่หาประกาย\nระยิบระยับอยู่"
10047-100470170 = "ฉันก็เจอสิ่งที่ยิ่งใหญ่ในทะเลด้วย"
10047-100470180 = "ถ้าชิเซะบอกว่ายิ่งใหญ่ละก็\nคงเป็นของที่พิเศษมากเลยสินะ"
10047-100470190 = "อื้อ ฉันอยากให้คุณครูได้เห็น"
10047-100470200 = "อ๊ะ พอดีเลยนะ"
10047-100470210 = "ไปดูด้วยกันเถอะ คุณครู"
10047-100470220 = "ฉันจะรอนะ~"
10047-100470230 = "คุณครู"
10047-100470240 = "มีอะไรเหรอ ชิเซะ?"
10047-100470250 = "ปกติแปรงฟันสะอาดรึเปล่า?"
10047-100470260 = "จู่ๆ ถามอะไรเนี่ย..."
10047-100470270 = "ทำไมจู่ๆ ถามเรื่องนี้ล่ะ...?"
10047-100470280 = "อืม โล่งไปที--"
10047-100470290 = "คุณครู จากนี้ไป"
10047-100470300 = "ไม่ว่าจะมีเรื่องอะไร\nก็ต้องแปรงฟัน"
10047-100470310 = "วันละสามครั้งให้ได้เลยนะ"
10047-100470320 = "อะ...อื้อ"
10047-100470330 = "ถ้างั้น... บ๊ายบาย"
10047-100470340 = "คุณครู"
10047-100470350 = "นี่ ชิเซะ...?"
10047-100470360 = "คุณครู มาเที่ยวเล่นที่ทะเลแบบนี้\nสนุกจังเลยนะ~"
10047-100470370 = "ชิเซะสนุกก็ดีแล้วละ"
10047-100470380 = "อื้อ แต่ว่า..."
10047-100470390 = "ถ้ามีแค่ฉันคนเดียวที่สนุกแบบนี้\nมันก็น่าเสียดายน่ะ~"
10047-100470400 = "อ๊ะ รู้แล้วละ ความรู้สึกแบบนั้น..."
10047-100470410 = "ถ้าได้เล่นสนุกกับคนอื่นๆ มันจะสนุก\nมากกว่าสินะ"
10047-100470420 = "อ่า... คิดอะไรดีๆ ออกแล้วละ"
10047-100470430 = "ถ้าทุกคนมาทะเลไม่ได้ละก็..."
10047-100470440 = "ถ้ามาไม่ได้ละก็...?"
10047-100470450 = "ฉันก็จะพาทะเลไปหาทุกคนแทนไงล่ะ♪"
10047-100470460 = "ดีละ~ ต้องพาทะเลกลับไป~"
10047-100470470 = "หืม...? ชิเซะ? จะพาทะเลกลับไป\nยังไงน่ะ?"
10047-100470480 = "ถ้างั้นก็ลุยละนะ~"
10047-100470490 = "ดะ...เดี๋ยวก่อนชิเซะ! รอแป๊บหนึ่งนะ\nครูจะรีบไปหา!"

[translation]
10047-100470010 = "선생님. 베케이-션이야."
10047-100470020 = "응? 베케이…? 저기, 치세. 무슨 이야기야?"
10047-100470030 = "응, 나, 휴가를 받았어. 여름휴가-"
10047-100470040 = "평소에 음양부 활동 열심히 했으니까."
10047-100470050 = "쉬고 오래."
10047-100470060 = "아, 그런 이야기였구나. 잘됐네."
10047-100470070 = "그럼 혹시, 뭔가 예정이라도 있는 거야?"
10047-100470080 = "응. 있어."
10047-100470090 = "아, 혹시 어떤 예정…."
10047-100470100 = "찾으러 가자. 선생님."
10047-100470110 = "으, 응? 찾으러 가자니? 뭘?"
10047-100470120 = "그러니 집합 신-호-"
10047-100470130 = "바다에서 기다릴게."
10047-100470140 = "응? 집합 신호?"
10047-100470150 = "일단, 바다로 가면 되려나…?"
10047-100470160 = "선생님, 나 반짝임을 찾다가-"
10047-100470170 = "바닷가에서 엄청난 걸 발견했어."
10047-100470180 = "치세가 엄청나다고 말할 정도라니- 그거 엄청 신경 쓰이는걸."
10047-100470190 = "응, 나, 선생님에게도 보여주고 싶어서."
10047-100470200 = "아, 마침 잘됐다-"
10047-100470210 = "같이 보러 가자. 선생님."
10047-100470220 = "기다리고 있을게~"
10047-100470230 = "선생님."
10047-100470240 = "아, 치세. 어쩐 일이야?"
10047-100470250 = "평소에 이 잘 닦고 있어?"
10047-100470260 = "이, 일단은……?"
10047-100470270 = "갑자기 그건 왜……?"
10047-100470280 = "응, 그럼 다행이다-"
10047-100470290 = "선생님, 앞으로도."
10047-100470300 = "어떤 일이 있더라도 하루 세 번."
10047-100470310 = "이 닦는 거 잊지 말아야 해?"
10047-100470320 = "으, 응?"
10047-100470330 = "그럼, 안녕."
10047-100470340 = "선생님."
10047-100470350 = "치세…? 저기, 치세?"
10047-100470360 = "선생님. 바닷가에서 노는 건 즐겁네~"
10047-100470370 = "치세가 즐겁다니 다행이야."
10047-100470380 = "응. 하지만…."
10047-100470390 = "역시 혼자만 즐거운 건 아까워~"
10047-100470400 = "아, 알 거 같아. 그 기분."
10047-100470410 = "다른 사람과 함께 놀면 더 즐거워지는 법이니까."
10047-100470420 = "아, 좋은 생각이 났다."
10047-100470430 = "다들 바다에 올 수 없다면…."
10047-100470440 = "없다면…?"
10047-100470450 = "반대로 내가 바다를 가져가면 되겠네♪"
10047-100470460 = "좋았어~ 가져가야지~"
10047-100470470 = "…응? 치세? 바다를? 가져가? 으응?"
10047-100470480 = "그럼 시작~"
10047-100470490 = "자, 잠깐! 치세! 바로 갈 테니까! 조금만 기다려 줘!"

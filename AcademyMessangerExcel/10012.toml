[translation]
10012-872 = "早安，指導員"
10012-873 = "今天時間上方便嗎？"
10012-874 = "嗯，怎麼了？"
10012-875 = "不是特別忙，所以沒問題唷"
10012-876 = "嗯，其實"
10012-877 = "上次說的訓練菜單已經準備好了"
10012-878 = "如果可以的話，能請你來健身房確認一下嗎？"
10012-879 = "期待你的到來！"
10012-880 = "指導員，這個週末忙嗎？"
10012-881 = "如果可以的話，要跟我一起去購物中心嗎？"
10012-882 = "當然好呀"
10012-883 = "要買什麼？"
10012-884 = "非常感謝！"
10012-885 = "想買乳清蛋白，所以希望從指導員那裡得到一些建議"
10012-886 = "那麼，我在購物中心等著"
10012-887 = "指導員。為了今天的訓練，我準備了特別的東西"
10012-888 = "今天下午，在健身房見吧"
10012-889 = "辛苦了，指導員"
10012-890 = "身體感覺怎麼樣？"
10012-891 = "嗯，沒什麼大礙"
10012-892 = "肌肉在哀號……"
10012-893 = "不愧是指導員，看來還行呀"
10012-894 = "看來強度有點太高了……"
10012-895 = "下次見面時，會幫你做伸展運動"
10012-896 = "對了，指導員的辦公室"
10012-897 = "應該已經收到我送去的乳清蛋白了"
10012-899 = "一天4次，別忘了喝唷"
10012-900 = "指導員，你好"
10012-901 = "可以的話，這個週末能不能見個面？"
10012-902 = "那個，我的肌肉還在痛……！"
10012-903 = "我有在運動！沒有偷懶！"
10012-904 = "啊，不，那個……"
10012-905 = "是跟運動無關的事……"
10012-906 = "那你儘管說吧！"
10012-907 = "非常感謝！"
10012-908 = "那就到時候見！"
10012-10012010 = "指導員，你有去過夏萊附近的新公園嗎？"
10012-10012020 = "還沒去過"
10012-10012030 = "這樣啊"
10012-10012040 = "上次值日結束後，我在回去的路上稍微逛了一下"
10012-10012050 = "步道維護得很乾淨，看起來很適合晨跑"
10012-10012060 = "可以的話"
10012-10012070 = "明天早上要不要去那個公園輕鬆慢跑一下？"
10012-10012080 = "如果只是輕鬆慢跑的話……"
10012-10012090 = "謝謝你，指導員"
10012-10012100 = "那麼，明早見！"

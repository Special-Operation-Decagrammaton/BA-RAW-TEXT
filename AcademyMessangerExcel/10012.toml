[translation]
10012-872 = "안녕하세요. 트레이너."
10012-873 = "혹시 오늘 시간 괜찮으실까요?"
10012-874 = "응, 무슨 일이야?"
10012-875 = "딱히 바쁘지는 않아."
10012-876 = "네, 다름이 아니라."
10012-877 = "이전에 약속드렸던 트레이닝용 시간표를 준비했습니다."
10012-878 = "가능하다면 오늘 확인받고 싶은데, 헬스장으로 와주실 수 있을까요?"
10012-879 = "기다리고 있겠습니다."
10012-880 = "트레이너, 혹시 이번 주말에 바쁘신가요?"
10012-881 = "괜찮으시면 저와 함께 쇼핑몰에 가지 않으시겠습니까?"
10012-882 = "그래, 좋아."
10012-883 = "무엇을 사려고?"
10012-884 = "감사합니다, 트레이너."
10012-885 = "단백질 보충제를 사려고 하는 데 트레이너의 조언이 필요합니다."
10012-886 = "그럼 쇼핑몰에서 기다리겠습니다."
10012-887 = "트레이너, 오늘은 제가 트레이너를 위해 특별히 준비한 것이 있습니다."
10012-888 = "오늘 오후 헬스장에서 뵙겠습니다."
10012-889 = "트레이너."
10012-890 = "몸은 좀 어떠신가요?"
10012-891 = "응. 괜찮아."
10012-892 = "으으윽, 근육이…."
10012-893 = "역시 트레이너, 건강하시군요."
10012-894 = "운동이 조금 과했나 보군요."
10012-895 = "다음에 만나면 제가 스트레칭을 돕겠습니다."
10012-896 = "참, 아마 지금쯤이면 트레이너의 사무실에"
10012-897 = "제가 보낸 단백질 보충제가 도착했을 겁니다."
10012-899 = "하루에 4번, 잊지 마시고 챙겨 드시길 바랍니다."
10012-900 = "트레이너."
10012-901 = "괜찮다면, 이번 주말에 잠시 뵐 수 있을까요?"
10012-902 = "히익! 아직 근육이…."
10012-903 = "운동이라면 열심히 하고 있습니다!"
10012-904 = "아아…… 아뇨, 트레이너."
10012-905 = "운동 때문은 아닙니다."
10012-906 = "그렇다면 오케이!"
10012-907 = "알겠습니다."
10012-908 = "그럼 그때 뵙겠습니다."
10012-10012010 = "트레이너, 혹시 샬레 근처에 새로 생긴 공원에 가보신 적 있으신가요?"
10012-10012020 = "아직 안 가 봤어."
10012-10012030 = "그러시군요."
10012-10012040 = "지난번 당번 활동이 끝나고 돌아가는 길에 잠깐 둘러봤는데"
10012-10012050 = "조깅용 트랙이 깨끗하게 정비되어 있어서 아침 조깅을 하기에 적합해 보이더군요."
10012-10012060 = "혹시 괜찮으시다면"
10012-10012070 = "내일 아침에 그 공원에서 가볍게 조깅이라도 하지 않으시겠습니까?"
10012-10012080 = "가벼운 조깅이라면 괜찮겠지……"
10012-10012090 = "감사합니다, 트레이너."
10012-10012100 = "그럼, 내일 아침에 뵙겠습니다!"

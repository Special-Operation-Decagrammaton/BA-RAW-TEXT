[translation]
10012-872 = "สวัสดีค่ะ เทรนเนอร์"
10012-873 = "วันนี้พอมีเวลาว่างมั้ยคะ?"
10012-874 = "อื้อ มีอะไรเหรอ?"
10012-875 = "อืม... ก็ไม่ได้ยุ่งอะไรหรอก"
10012-876 = "ค่ะ ก็คือว่า..."
10012-877 = "ฉันเตรียมตารางการเทรนที่เคยบอก\nเทรนเนอร์เอาไว้เสร็จแล้วนะคะ"
10012-878 = "ถ้าเป็นไปได้ วันนี้ก็อยากให้เทรนเนอร์\nลองตรวจดูค่ะ ช่วยมาที่ห้องออกกำลัง\nกายได้มั้ยคะ?"
10012-879 = "แล้วฉันจะรอนะคะ"
10012-880 = "เทรนเนอร์คะ สุดสัปดาห์นี้ยุ่งรึเปล่าคะ?"
10012-881 = "ถ้าไม่ยุ่งล่ะก็... ไปห้างสรรพสินค้ากับ\nฉันหน่อยได้มั้ยคะ?"
10012-882 = "เอาสิ"
10012-883 = "จะไปซื้ออะไรเหรอ?"
10012-884 = "ขอบคุณค่ะ เทรนเนอร์"
10012-885 = "ฉันจะไปซื้อเวย์โปรตีนเลยอยากได้คำ\nแนะนำจากเทรนเนอร์สักหน่อยค่ะ"
10012-886 = "ถ้างั้นฉันจะรอที่ห้างสรรพสินค้านะคะ"
10012-887 = "เทรนเนอร์คะ วันนี้ฉันเตรียมบางอย่างที่\nพิเศษมาให้เทรนเนอร์ด้วยค่ะ"
10012-888 = "ตอนบ่ายเจอกันที่ห้องออกกำลังกายนะคะ"
10012-889 = "เทรนเนอร์คะ"
10012-890 = "ร่างกายของเทรนเนอร์เป็นยังไงบ้างคะ?"
10012-891 = "อื้ม ไม่เป็นอะไร"
10012-892 = "อะ...อึ่ก!  กะ...กล้ามเนื้อมัน..."
10012-893 = "เทรนเนอร์ แข็งแรงจริงๆ ด้วย"
10012-894 = "คงจะออกกำลังกายหนักแน่ๆ เลยสินะคะ"
10012-895 = "ถ้าเจอกันคราวหน้า ฉันจะช่วยคุณครูยืด\nเส้นเองค่ะ"
10012-896 = "อ๊ะ ตอนนี้เวย์โปรตีนที่ฉันส่งไปให้ที่ห้อง\nพักครู"
10012-897 = "น่าจะส่งไปถึงแล้วนะคะ"
10012-899 = "ทานวันละ 4 ครั้ง ห้ามลืมเด็ดขาดเลย\nนะคะ"
10012-900 = "เทรนเนอร์คะ"
10012-901 = "ถ้าเทรนเนอร์ไม่ติดธุระอะไร สุดสัปดาห์นี้เรามาเจอกันหน่อยได้มั้ยคะ?"
10012-902 = "อึ่ก! กะ...กล้ามเนื้อมัน..."
10012-903 = "ครูเองก็ตั้งใจออกกำลังกายอยู่\nเหมือนกันนะ!"
10012-904 = "อา... ไม่ใช่หรอกค่ะ เทรนเนอร์"
10012-905 = "ไม่ได้จะชวนไปออกกำลังกายหรอกค่ะ"
10012-906 = "ถ้างั้นก็โอเคเลย!"
10012-907 = "เข้าใจแล้วค่ะ"
10012-908 = "แล้วเจอกันนะคะ"
10012-10012010 = "เทรนเนอร์เคยไปสวนสาธารณะ\nเปิดใหม่ใกล้ๆ ชาเล่ต์บ้าง\nหรือยังคะ?"
10012-10012020 = "ครูยังไม่เคยไปเลย"
10012-10012030 = "ว่าแล้วเชียว"
10012-10012040 = "ตอนที่ไปเข้าเวรตัวแทนเมื่อครั้งที่แล้ว\nขากลับฉันลองแวะไปที่นั่นมา"
10012-10012050 = "เลนสำหรับวิ่งจ้อกกิ้งดูเหมือนจะ\nซ่อมบำรุงไว้อย่างดี เหมาะสำหรับ\nไปวิ่งจ้อกกิ้งตอนเช้าๆ มากเลยค่ะ"
10012-10012060 = "ถ้าเทรนเนอร์สะดวกละก็..."
10012-10012070 = "พรุ่งนี้เช้าออกไปวิ่งจ้อกกิ้งเบาๆ\nด้วยกันที่นั่นมั้ยคะ?"
10012-10012080 = "ถ้าจ็อกกิงเบาๆ ก็พอได้นะ..."
10012-10012090 = "ขอบคุณค่ะ เทรนเนอร์"
10012-10012100 = "ถ้างั้นพบกันพรุ่งนี้เช้านะคะ!"

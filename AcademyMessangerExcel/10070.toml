[translation]
10070-100700010 = "This number..."
10070-100700020 = "Is this Sensei's number?"
10070-100700030 = "It is..."
10070-100700040 = "Great. I was right."
10070-100700050 = "I'm Konoe Mina."
10070-100700060 = "I'm working at Schale today."
10070-100700070 = "I look forward to seeing you."
10070-100700080 = "This is my first duty day."
10070-100700090 = "I'll be sure to not disappoint you."
10070-100700100 = "I'll be on time, no matter what."
10070-100700110 = "See you at Schale."
10070-100700120 = "Are you ready, Sensei?"
10070-100700130 = "A Sensei is always ready to help a student."
10070-100700140 = "Yeah, but still..."
10070-100700150 = "To think that I would need help to secure Shanhaijing..."
10070-100700160 = "I'm embarrassed as an officer of Genryumon."
10070-100700170 = "One day, I will repay this debt, in the name of Genryumon."
10070-100700180 = "You don't need to feel that way."
10070-100700190 = "To an extent, I'm doing it because I want to."
10070-100700200 = "I see."
10070-100700210 = "In that case, I'll accept your assistance."
10070-100700220 = "Please take good care of yourself."
10070-100700230 = "If something were to happen to you, Sensei..."
10070-100700240 = "...That would be a big problem for me too."
10070-100700250 = "Are you working at Shanhaijing again today?"
10070-100700260 = "Yeah, but I think I'll be done in the morning."
10070-100700270 = "I'm seeing you at Shanhaijing often these days."
10070-100700280 = "Is that a problem?"
10070-100700290 = "No."
10070-100700300 = "Actually, it's not bad. Not bad at all."
10070-100700310 = "In any case, in the afternoon... Well..."
10070-100700320 = "If you have something to say, say it..."
10070-100700330 = "Heh."
10070-100700340 = "It's nothing."
10070-100700350 = "Then I'll see you soon, Sensei."
10070-100700360 = "Sensei."
10070-100700370 = "I heard that you caught a cold. Are you okay?"
10070-100700380 = "I'm cold, and it hurts..."
10070-100700390 = "That's...too bad..."
10070-100700400 = "Heh."
10070-100700410 = "Of course, I feel fine."
10070-100700420 = "Does this prove that old myth...?"
10070-100700430 = "What myth?"
10070-100700440 = "Oh, you know..."
10070-100700450 = "That certain types of people don't catch colds..."
10070-100700460 = "What does that mean?"
10070-100700470 = "Sensei?"
10070-100700480 = "Sensei?"
10070-100700490 = "If you were planning on coming to Genryumon today, I'd like to ask that you reschedule."
10070-100700500 = "I'm going to visit the Plum Blossom Garden today."
10070-100700510 = "The Plum Blossom Garden..."
10070-100700520 = "Maybe I should visit, too..."
10070-100700530 = "Sometimes I get the feeling..."
10070-100700540 = "The job of a Sensei at Schale...seems to allow for a lot of free time?"
10070-100700550 = "Not usually, but once in awhile?"
10070-100700560 = "Maybe it's my imagination, but..."
10070-100700570 = "It seems to be more than once in a while."
10070-100700580 = "In any case, great!"
10070-100700590 = "If you plan on going to the Plum Blossom Garden, let's go together."
10070-100700600 = "I'll see you there."

[translation]
10070-100700010 = "이 번호"
10070-100700020 = "선생님의 번호가 맞는지?"
10070-100700030 = "그렇습니다만."
10070-100700040 = "아, 다행이군. 틀리지 않았어."
10070-100700050 = "코노에 미나다."
10070-100700060 = "오늘은 내가 샬레의 당번인 것으로 알고 있는데."
10070-100700070 = "맞아. 기다리고 있을게."
10070-100700080 = "첫 당번."
10070-100700090 = "실망시키지 않도록 힘써 보지."
10070-100700100 = "늦지 않게 도착하겠어."
10070-100700110 = "샬레에서 만나지."
10070-100700120 = "마음의 준비는 되었나, 선생님?"
10070-100700130 = "선생은 언제나 학생을 도울 준비가 되어 있어."
10070-100700140 = "그렇다고는 해도, "
10070-100700150 = "산해경의 치안 유지에 선생님의 도움까지 빌리게 되다니."
10070-100700160 = "현룡문의 간부로서 면목이 서지 않을 지경이군."
10070-100700170 = "이 은혜는 언젠가, 현룡문의 이름으로 갚도록 하지."
10070-100700180 = "그렇게까지 부담 가질 필요는 없다고 생각하는데?"
10070-100700190 = "어느 정도는 내가 멋대로 하는 일이니까."
10070-100700200 = "그런가."
10070-100700210 = "그러면 오늘, 잘 부탁하지."
10070-100700220 = "그리고 부디, 몸조심하기를 바라."
10070-100700230 = "선생에게 무슨 일이 생기면…… "
10070-100700240 = "그건, 나에게 있어서도 큰 문제이니까."
10070-100700250 = "오늘도 산해경에서의 업무인가?"
10070-100700260 = "그런 거지. 오전 중에 끝날 것 같기는 하지만."
10070-100700270 = "최근 선생님을 산해경에서 보는 날이 많아진 것 같군."
10070-100700280 = "뭔가 문제라도?!"
10070-100700290 = "아니."
10070-100700300 = "오히려 나쁘지 않아. 나쁘지 않은 일이야."
10070-100700310 = "그보다 오후라…… 그렇군."
10070-100700320 = "의미심장한 말을 하고 싶으면 지금 하도록 해……"
10070-100700330 = "훗."
10070-100700340 = "그런 건 아니다."
10070-100700350 = "그러면 오후에 만나도록 하지. 선생님."
10070-100700360 = "선생님."
10070-100700370 = "감기에 걸렸다고 들었는데, 괜찮은가?"
10070-100700380 = "춥고, 아파……"
10070-100700390 = "그건, 유감이군……"
10070-100700400 = "훗."
10070-100700410 = "나는 아무렇지도 않지만 말이다."
10070-100700420 = "이로써, 오랜 속설이 증명된 것인가……"
10070-100700430 = "속설?"
10070-100700440 = "그, 왜."
10070-100700450 = "어떤 부류의 사람들은 감기에 걸리지 않는다는……"
10070-100700460 = "그게 무슨 뜻이지?"
10070-100700470 = "선생님?"
10070-100700480 = "선생님?"
10070-100700490 = "혹시 오늘 현룡문에 올 예정이 있다면, 다음으로 미뤄 주길 바란다."
10070-100700500 = "오늘은 매화원에 방문하기로 되어 있는 날이라서."
10070-100700510 = "매화원이라. "
10070-100700520 = "그러고 보니, 간만에 나도 가 볼까?"
10070-100700530 = "……가끔씩 느끼는 것이다만."
10070-100700540 = "샬레의 선생님이라는 자리는…… 한가한 건가?"
10070-100700550 = "자주 그렇지는 않지만, 이따금은?"
10070-100700560 = "기분 탓이라고 생각하고 싶지만."
10070-100700570 = "그 이따금이 좀 잦다는 생각이 드는군."
10070-100700580 = "아무튼 좋아."
10070-100700590 = "매화원에 갈 생각이 있다면, 함께하도록 하지."
10070-100700600 = "기다리겠다."

[translation]
10070-100700010 = "這個號碼……"
10070-100700020 = "是夏萊的老師對嗎？"
10070-100700030 = "是，是我沒錯……"
10070-100700040 = "啊啊，那就好"
10070-100700050 = "我是近衛美奈"
10070-100700060 = "今天夏萊的值日生是我對吧？"
10070-100700070 = "嗯，我等你哦"
10070-100700080 = "第一次當值日生"
10070-100700090 = "抱著期待等著我吧"
10070-100700100 = "我會準時抵達"
10070-100700110 = "那麼，在夏萊見吧"
10070-100700120 = "老師，做好心理準備了嗎？"
10070-100700130 = "如果是要幫助學生，我隨時都準備萬全哦"
10070-100700140 = "雖然老師爽快地接受了……"
10070-100700150 = "沒想到就連山海經的治安維護都需要借助老師的力量"
10070-100700160 = "身為玄龍門的幹部，實在令人慚愧"
10070-100700170 = "這份恩情，我一定會以玄龍門之名報答的"
10070-100700180 = "不用那麼在意沒關係的哦"
10070-100700190 = "能幫上忙我也很開心"
10070-100700200 = "這樣啊……"
10070-100700210 = "那麼，就萬事拜託了"
10070-100700220 = "不過，還請老師務必將自己的安全放在第一位"
10070-100700230 = "要是老師有什麼三長兩短…… "
10070-100700240 = "對我來說也會是個大問題的"
10070-100700250 = "今天也是來山海經工作的嗎？"
10070-100700260 = "嗯，應該中午左右就會結束了"
10070-100700270 = "最近好像經常在山海經見到老師"
10070-100700280 = "妨，妨礙到你了嗎……？"
10070-100700290 = "不"
10070-100700300 = "沒有那種事。反而該說正合我意"
10070-100700310 = "中午啊……原來如此"
10070-100700320 = "如果有什麼事的話，可以先告訴我……"
10070-100700330 = "呵"
10070-100700340 = "沒必要那麼擔心"
10070-100700350 = "那麼下午見吧"
10070-100700360 = "老師"
10070-100700370 = "聽說你感冒了，還好嗎？"
10070-100700380 = "好冷……而且頭好痛……"
10070-100700390 = "請好好休息……"
10070-100700400 = "呵"
10070-100700410 = "我倒是一點症狀也沒有"
10070-100700420 = "看來那句俗諺是正確的呢……"
10070-100700430 = "什麼樣的俗諺？"
10070-100700440 = "那個……就是"
10070-100700450 = "有些人不管怎樣都不會感冒……"
10070-100700460 = "……那是什麼意思？"
10070-100700470 = "……老師"
10070-100700480 = "老師？"
10070-100700490 = "今天本來打算請你來玄龍門的，不過可以麻煩改天再來嗎？"
10070-100700500 = "這麼突然很抱歉，我必須去梅花園一趟"
10070-100700510 = "這樣啊，要去梅花園……"
10070-100700520 = "我也久違地去一次吧？"
10070-100700530 = "我有時候會這麼想……"
10070-100700540 = "夏萊的工作，是不是意外的很閒？"
10070-100700550 = "偶爾是……嗎？"
10070-100700560 = "雖然可能只是我的錯覺"
10070-100700570 = "感覺你說「偶爾」的次數好像有點多"
10070-100700580 = "算了，這樣也好"
10070-100700590 = "工作方面沒問題的話，我們就一起去吧"
10070-100700600 = "我先到梅花園前面等你"

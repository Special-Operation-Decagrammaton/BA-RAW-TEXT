[translation]
10070-100700010 = "เบอร์นี้..."
10070-100700020 = "ใช่เบอร์ของคุณครูหรือเปล่า?"
10070-100700030 = "ใช่แล้ว"
10070-100700040 = "อ่า ค่อยยังชั่วหน่อย ไม่ผิดเบอร์สินะ"
10070-100700050 = "ฉัน... โคโนเอะ มินะ"
10070-100700060 = "ฉันจำได้ว่าวันนี้ต้องเข้าเวรที่ชาเล่ต์"
10070-100700070 = "ใช่แล้วละ ครูจะรอนะ"
10070-100700080 = "เข้าเวรครั้งแรก"
10070-100700090 = "ฉันจะทำเต็มที่ ไม่ให้ผิดหวัง"
10070-100700100 = "และไม่ว่ายังไงก็จะไม่ไปสาย\nเด็ดขาด"
10070-100700110 = "แล้วพบกันที่ชาเล่ต์"
10070-100700120 = "เตรียมพร้อมหรือยัง คุณครู?"
10070-100700130 = "คนเป็นครูย่อมพร้อมช่วยเหลือ\nนักเรียนเสมอ"
10070-100700140 = "ถึงจะว่าอย่างนั้นก็เถอะ "
10070-100700150 = "พอคิดว่าต้องขอให้คุณครูมาช่วย\nเรื่องการดูแลความเรียบร้อยของ\nซานไห่จิงแบบนี้..."
10070-100700160 = "ในฐานะเจ้าหน้าที่ของมังกรดำ ฉันรู้สึก\nละอายใจมากจริงๆ"
10070-100700170 = "ในนามของมังกรดำ... สักวันหนึ่งฉันจะ\nตอบแทนบุณคุณครั้งนี้เอง"
10070-100700180 = "ไม่ต้องกดดันขนาดนั้นก็ได้นะ"
10070-100700190 = "อีกอย่าง... ครูก็อยากทำแบบนี้เองด้วย\nแหละ"
10070-100700200 = "อย่างนั้นเหรอ"
10070-100700210 = "ถ้าอย่างนั้น วันนี้ก็ขอฝากด้วยนะ"
10070-100700220 = "ระมัดระวังตัวด้วยล่ะ"
10070-100700230 = "เพราะถ้าเกิดอะไรขึ้นกับคุณครู... "
10070-100700240 = "สำหรับฉัน... มันก็เป็นเรื่องใหญ่\nเหมือนกัน"
10070-100700250 = "วันนี้ก็ทำงานของซานไห่จิงอีก\nงั้นเหรอ?"
10070-100700260 = "ใช่แล้ว แต่คิดว่าเช้านี้ก็เสร็จแล้วละ"
10070-100700270 = "ช่วงนี้รู้สึกว่าจะเจอคุณครูที่ซานไห่จิง\nบ่อยขึ้นนะ"
10070-100700280 = "มีปัญหาอะไรหรือเปล่า?!"
10070-100700290 = "เปล่าหรอก"
10070-100700300 = "ไม่ใช่เรื่องแย่หรอก ไม่ใช่เรื่องแย่เลย\nสักนิดเดียว"
10070-100700310 = "ยิ่งเป็น... ช่วงบ่ายด้วย..."
10070-100700320 = "อยากพูดอะไรกินใจ\nก็พูดมาตอนนี้เลยก็ได้นะ..."
10070-100700330 = "หึ"
10070-100700340 = "ไม่ใช่แบบนั้นหรอก"
10070-100700350 = "งั้นเจอกันตอนบ่ายนะ คุณครู"
10070-100700360 = "คุณครู"
10070-100700370 = "ได้ข่าวว่าเป็นหวัดเหรอ ดีขึ้นหรือยัง?"
10070-100700380 = "หนาว แล้วก็ไม่สบายตัวเลย..."
10070-100700390 = "แบบนั้นน่ะ น่าเศร้าจังเลยนะ..."
10070-100700400 = "หึ"
10070-100700410 = "ส่วนฉันยังสบายดี..."
10070-100700420 = "แบบนี้ถือเป็นการพิสูจน์ตำนาน\nเล่าขานแล้วหรือเปล่า..."
10070-100700430 = "ตำนานอะไรเหรอ?"
10070-100700440 = "อ้อ เคยได้ยินมั้ย..."
10070-100700450 = "ตำนานที่บอกว่าคนบางประเภท\nจะไม่ค่อยเป็นหวัดน่ะ..."
10070-100700460 = "หมายความว่ายังไงน่ะ?"
10070-100700470 = "คุณครู?"
10070-100700480 = "คุณครู?"
10070-100700490 = "ถ้าวันนี้จะมาที่มังกรดำ ช่วยเลื่อน\nกำหนดการไปก่อนแล้วกันนะ"
10070-100700500 = "วันนี้ฉันจะไปสวนต้นบ๊วยน่ะ"
10070-100700510 = "สวนต้นบ๊วยเหรอ "
10070-100700520 = "จะว่าไปแล้ว ครูไปด้วยดีมั้ยนะ?"
10070-100700530 = "บางครั้งฉันก็รู้สึกว่า..."
10070-100700540 = "ตำแหน่งคุณครูของชาเล่ต์นี่... ดูเหมือน\nจะมีเวลาว่างดีจังเลยนะ"
10070-100700550 = "ครูไม่ได้ว่างบ่อยหรอก\nแค่บางครั้งน่ะ"
10070-100700560 = "ถึงจะพยายามคิดว่าคงแค่รู้สึกไปเอง"
10070-100700570 = "แต่รู้สึกว่า 'บางครั้ง' ของคุณครูเนี่ย\nมันบ่อยจริงๆ เลยนะ"
10070-100700580 = "แต่ก็เอาเถอะ"
10070-100700590 = "ถ้าคุณครูอยากไปละก็ ไปด้วยกันก็ได้"
10070-100700600 = "ฉันจะรอที่นั่นนะ"

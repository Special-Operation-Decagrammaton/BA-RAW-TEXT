[translation]
10123-101230010 = "คุณครู"
10123-101230020 = "ตอนนี้พอจะมีเวลาว่างมั้ยคะ?"
10123-101230030 = "พอดีว่า... ฉันมีเรื่องด่วนนิดหน่อยน่ะค่ะ"
10123-101230040 = "ก็พอมีหรอกนะ... ว่าแต่\nมีเรื่องอะไรเหรอ?"
10123-101230050 = "เรื่องด่วนเหรอ? จะมาหาครู\nตอนนี้ใช่มั้ย?"
10123-101230060 = "ฉันจะออกไปเดี๋ยวนี้"
10123-101230070 = "อีกเดี๋ยวก็คงถึงค่ะ"
10123-101230080 = "แล้วเจอกันตอนนั้นนะคะ"
10123-101230090 = "ได้ใส่ชุดที่ต่างออกไปจากปกตินี่ก็\nสนุกดีเหมือนกันนะคะ"
10123-101230100 = "ในบางแง่มันก็ไม่เหมือนฉันคนเดิม"
10123-101230110 = "แต่ในบางแง่มันก็ยิ่งเป็นฉันมากขึ้น"
10123-101230120 = "เป็นเรื่องที่ลึกซึ้งเลยนะ"
10123-101230130 = "ไม่ว่าจะแง่ไหนก็ถูกต้องนะ"
10123-101230140 = "ใช่ค่ะ"
10123-101230150 = "ยิ่งคลุมเครือ มันก็ยิ่งเป็นข้ออ้างที่ดี\nสำหรับตัวเองในตอนนั้นได้"
10123-101230160 = "และเราก็เอามาพูดต่อเป็นเรื่องดีๆ\nได้นี่คะ"
10123-101230170 = "เอาละ ถ้างั้น"
10123-101230180 = "ฉันก็อยากรู้นะคะว่า"
10123-101230190 = "คุณครูจะตอบว่ายังไง"
10123-101230200 = "ใกล้จะถึง"
10123-101230210 = "ช่วงเวลาสุดท้ายแล้วนะคะ"
10123-101230220 = "ฉันอยากให้ช่วงเวลานี้..."
10123-101230230 = "ฉันได้อยู่กับคุณครูค่ะ"
10123-101230240 = "*แค่ก แค่ก*"
10123-101230250 = "พอจะช่วยฉัน... หน่อยได้มั้ยคะ?"
10123-101230260 = "ใครเขาไอผ่านทางข้อความ\nกันเนี่ย 555"
10123-101230270 = "ครั้งนี้จะแกล้งให้ครูทำอะไรอีกล่ะ"
10123-101230280 = "อะไรกัน"
10123-101230290 = "ไม่ได้ผลสินะคะ"
10123-101230300 = "แต่ก็เอาเถอะค่ะ"
10123-101230310 = "ยังไงก็จะอยู่ด้วยกันใช่มั้ยคะ?"
10123-101230320 = "มันถูกกำหนดให้เป็นแบบนี้ตั้งแต่แรก\nแล้วค่ะ"
10123-101230330 = "อย่างน้อยวันนี้ก็ 1:1 นะคะ"
10123-101230340 = "แล้วฉันจะรอคอยครั้งต่อไปค่ะ"
10123-101230350 = "นี่เราแข่งขันอะไรกันเหรอ?"
10123-101230360 = "ต้องวัดผลแพ้ชนะด้วยเหรอ?"
10123-101230370 = "มันก็แน่อยู่แล้วไม่ใช่เหรอคะ?"
10123-101230380 = "ก็นี่เป็นความสัมพันธ์ระหว่างฉันกับ\nคุณครูนี่คะ"
10123-101230390 = "เอาเถอะค่ะ สรุปว่า"
10123-101230400 = "ไว้ครั้งหน้าถ้ามีโอกาส ฉันจะมาบอก\nนะคะ"
10123-101230410 = "เป็นความสำเร็จที่น่าทึ่งเลยค่ะ"
10123-101230420 = "ฉันได้ฟังคำพูดที่คาดไม่ถึงเลยละ"
10123-101230430 = "ความสำเร็จที่น่าทึ่ง?"
10123-101230440 = "คำที่คาดไม่ถึง?"
10123-101230450 = "ค่ะ"
10123-101230460 = "มันถือว่าเป็นข่าวดีด้วย"
10123-101230470 = "งั้นครั้งนี้ฉันจะเป็นคนไปหาเองค่ะ"
10123-101230480 = "เป็นการขับรถที่สนุกเลยค่ะ"
10123-101230490 = "ครั้งหน้าถ้าอยากนั่งรถเล่นอีกก็บอก\nฉันนะคะ"
10123-101230500 = "ครูถูกลักพาตัวไปต่างหาก!?"
10123-101230510 = "สรุปว่าครู... อยากนั่งรถเล่นเหรอ?"
10123-101230520 = "รู้คำตอบดีอยู่แล้ว แต่ทำไมถึงยังถาม\nล่ะคะ"
10123-101230530 = "ฮุฮุ"
10123-101230540 = "ขอบคุณนะคะ คุณครู"
10123-101230550 = "ต้องบอกว่าทุกอย่างของฉันเปลี่ยนไป\nได้เพราะคุณครูเลยค่ะ"
10123-101230560 = "เพราะงั้น"
10123-101230570 = "ต่อไปก็ขอ"
10123-101230580 = "ฝากตัวฉันคนนี้"
10123-101230590 = "ด้วยนะคะ"

[translation]
10123-101230010 = "老師"
10123-101230020 = "現在方便打擾一下嗎？"
10123-101230030 = "發生了……一點緊急的事"
10123-101230040 = "可以是可以……怎麼了？"
10123-101230050 = "緊急的事？你現在要過來嗎？"
10123-101230060 = "我立刻出發"
10123-101230070 = "不會花費太多時間"
10123-101230080 = "那麼待會見"
10123-101230090 = "穿上不同於以往的衣服，真讓人開心呢"
10123-101230100 = "某種意義上來說，做這種事情並不像我"
10123-101230110 = "不過換個角度來看，或許這才像我也說不定"
10123-101230120 = "是個很深奧的話題呢"
10123-101230130 = "不過兩種說法都沒錯吧"
10123-101230140 = "是啊"
10123-101230150 = "正因為模稜兩可"
10123-101230160 = "才能成為當下的好藉口"
10123-101230170 = "或者方便的說辭"
10123-101230180 = "那麼，老師會怎麼回答"
10123-101230190 = "我很期待哦"
10123-101230200 = "差不多……"
10123-101230210 = "到最後的時刻了呢"
10123-101230220 = "希望這一刻……"
10123-101230230 = "老師能和我一起度過"
10123-101230240 = "(咳咳，咳咳)"
10123-101230250 = "你願意……成全我嗎？"
10123-101230260 = "居然在聊天室裡打咳嗽聲ww"
10123-101230270 = "這次又是什麼樣的惡作劇？"
10123-101230280 = "哎呀"
10123-101230290 = "果然沒能奏效嗎"
10123-101230300 = "不過沒關係"
10123-101230310 = "總之你願意陪我對吧？"
10123-101230320 = "早知道一開始就這麼說了"
10123-101230330 = "至少今天是五五波呢"
10123-101230340 = "下次也很值得期待"
10123-101230350 = "這是什麼比賽嗎？"
10123-101230360 = "還要分勝負嗎？"
10123-101230370 = "那當然囉？"
10123-101230380 = "畢竟是我跟老師之間的事啊"
10123-101230390 = "總之"
10123-101230400 = "下次有機會再告訴你吧"
10123-101230410 = "真是個驚人的成果"
10123-101230420 = "聽到了意想不到的話"
10123-101230430 = "驚人的成果？"
10123-101230440 = "意想不到的話？"
10123-101230450 = "沒錯"
10123-101230460 = "而且還是個好消息"
10123-101230470 = "這次就換我過去找你吧"
10123-101230480 = "真是場愉快的兜風呢"
10123-101230490 = "如果願意的話，之後再麻煩你陪我吧"
10123-101230500 = "我明明是被綁架的啊！？"
10123-101230510 = "我願不願意真的有影響嗎？"
10123-101230520 = "你明明很清楚，何必這麼問呢？"
10123-101230530 = "呵呵"
10123-101230540 = "謝謝你，老師"
10123-101230550 = "要說我的一切"
10123-101230560 = "都多虧了你才有所改變也不為過"
10123-101230570 = "所以今後"
10123-101230580 = "也請繼續……"
10123-101230590 = "多多關照這樣的我吧"

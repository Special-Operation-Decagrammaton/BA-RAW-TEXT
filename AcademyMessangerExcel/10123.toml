[translation]
10123-101230010 = "선생님"
10123-101230020 = "혹시 지금 시간 괜찮으실까요?"
10123-101230030 = "조금…. 다급한 일이 생겨서요."
10123-101230040 = "괜찮지만…. 무슨 일이야?"
10123-101230050 = "다급한 일? 지금 온다는 거지?"
10123-101230060 = "지금 출발할 테니,"
10123-101230070 = "오래 걸리진 않을 거예요."
10123-101230080 = "그럼 그때 뵙도록 하겠습니다."
10123-101230090 = "늘 입던 옷과 다른 옷을 입는 건 즐겁네요"
10123-101230100 = "어떤 의미로는 자신답지 않은"
10123-101230110 = "하지만 다른 의미로는 더욱 자신다운 일"
10123-101230120 = "심오한 이야기가 됐네."
10123-101230130 = "어느 쪽도 맞는 말이지."
10123-101230140 = "그렇죠."
10123-101230150 = "애매한 만큼, 그 순간의 자신에게 좋은 변명이 될 수 있고"
10123-101230160 = "형편 좋은 말로 갖다 붙일 수 있으니까요."
10123-101230170 = "자 그러면"
10123-101230180 = "선생님께서는, 어떻게 대답하실지"
10123-101230190 = "기대가 됩니다."
10123-101230200 = "슬슬"
10123-101230210 = "마지막 순간이군요"
10123-101230220 = "이 순간은 부디…."
10123-101230230 = "선생님께서 함께 해주셨으면 해요."
10123-101230240 = "*콜록, 콜록*"
10123-101230250 = "도와주실 수…있을 까요?"
10123-101230260 = "누가 기침소리를 채팅으로 쳐ㅋㅋ"
10123-101230270 = "이번엔 또 무슨 장난을 치려고"
10123-101230280 = "이런"
10123-101230290 = "결국 먹히지 않게 됐나요"
10123-101230300 = "뭐, 좋습니다."
10123-101230310 = "아무튼 함께해 주시겠어요?"
10123-101230320 = "처음부터 이럴 걸 그랬군요."
10123-101230330 = "적어도 오늘은 1:1이었네요."
10123-101230340 = "다음도 기대할 만하겠어요."
10123-101230350 = "무슨 대결이라도 되는 거니"
10123-101230360 = "승패를 따지는 거야?"
10123-101230370 = "당연한 거 아닌 가요?"
10123-101230380 = "선생님과 저 사이니까요."
10123-101230390 = "아무튼 그럼,"
10123-101230400 = "다음에 또, 기회가 되면 말씀드리겠습니다."
10123-101230410 = "놀라운 성과네요."
10123-101230420 = "생각지도 못한 말을 들었습니다."
10123-101230430 = "놀라운 성과?"
10123-101230440 = "생각지도 못한 말?"
10123-101230450 = "네"
10123-101230460 = "기쁜 소식이기도 하니"
10123-101230470 = "특별히 이번에는 제가 찾아 뵙도록 하죠."
10123-101230480 = "즐거운 드라이브였어요."
10123-101230490 = "다음 번에도, 내키실 때에는 부탁드리겠습니다."
10123-101230500 = "납치당한 건데요!?"
10123-101230510 = "내킨다…는 게 의미가 있어?"
10123-101230520 = "알만큼 아시는 분께서 왜 이러시는지."
10123-101230530 = "후후"
10123-101230540 = "감사합니다. 선생님."
10123-101230550 = "덕분에 저의 모든 것이 바뀌었다 해도, 과언이 아닐 겁니다."
10123-101230560 = "그러니"
10123-101230570 = "앞으로도"
10123-101230580 = "계속해서"
10123-101230590 = "이런 저를, 잘 부탁드리겠습니다."

[translation]
10130-101300010 = "Just checking."
10130-101300020 = "This number"
10130-101300030 = "is Sensei, right?"
10130-101300040 = "That's correct, Subaru."
10130-101300050 = "That's a relief."
10130-101300060 = "Next up, status report."
10130-101300070 = "I ended up"
10130-101300080 = "taking over patrols in Arius."
10130-101300090 = "Patrols?"
10130-101300100 = "Yes."
10130-101300110 = "Just updating you."
10130-101300120 = "I see."
10130-101300130 = "So that means..."
10130-101300140 = "I should pay a visit to Arius!"
10130-101300150 = "What? You're coming here?"
10130-101300160 = "I'm not following your logic!"
10130-101300170 = "Hello Sensei"
10130-101300180 = "You're finally coming to be a Student Rep!"
10130-101300190 = "I suppose."
10130-101300200 = "I've done my research"
10130-101300210 = "regarding being a Student Rep for Schale."
10130-101300220 = "So I'm well prepared."
10130-101300230 = "Are you nervous?"
10130-101300240 = "No."
10130-101300250 = "Not at all."
10130-101300260 = "Why would I be?"
10130-101300270 = "Who do you take me for?"
10130-101300280 = "Riiiiight!"
10130-101300290 = "Sure, sure!"
10130-101300300 = "Sensei...?"
10130-101300310 = "I suppose you could call it school policy,"
10130-101300320 = "but I got a part-time job."
10130-101300330 = "Subaru?! A part-timer?!"
10130-101300340 = "Don't be so overdramatic."
10130-101300350 = "It's burdensome."
10130-101300360 = "I was just doing my job, and I got a bonus."
10130-101300370 = "I don't think I fully understand the outside world..."
10130-101300380 = "It might be rare to find people who actually work hard..."
10130-101300390 = "...And the world still functions?"
10130-101300400 = "...Surprisingly?"
10130-101300410 = "Please give me some faith in life..."
10130-101300420 = "Hello Sensei."
10130-101300430 = "Are you off for today?"
10130-101300440 = "Only because I worked OT yesterday."
10130-101300450 = "I can finally...take a break..."
10130-101300460 = "So adults can't take a break unless they've finished their work..."
10130-101300470 = "Waaah, I want to be a child too."
10130-101300480 = "Gib me snacks, Subaru..."
10130-101300490 = "Act your age!"
10130-101300500 = "Seriously..."
10130-101300510 = "I got a bit of pocket money"
10130-101300520 = "from my last job."
10130-101300530 = "But I'm not sure what I want to do with it."
10130-101300540 = "Is there anything you want to do or buy?"
10130-101300550 = "What?"
10130-101300560 = "Uh..."
10130-101300570 = "Mm"
10130-101300580 = "Well"
10130-101300590 = "It's not like"
10130-101300600 = "there's nothing..."
10130-101300610 = "That was too much evening breeze."
10130-101300620 = "I'm cold."
10130-101300630 = "Are you going to take responsibility?"
10130-101300640 = "...How should I do that...?"
10130-101300650 = "I'm just kidding."
10130-101300660 = "But instead,"
10130-101300670 = "please go shopping with me next time too."
10130-101300680 = "I'll practice another song for then."
10130-101300690 = "Hello, Sensei"
10130-101300700 = "I'm on patrol, but I wanted to say hello."
10130-101300710 = "You're on patrol today too?"
10130-101300720 = "Yes, it's important work."
10130-101300730 = "And I can check on anyone I run into"
10130-101300740 = "while on patrol."
10130-101300750 = "Then who takes care of you, Subaru?"
10130-101300760 = "Hm?"
10130-101300770 = "I don't think about stuff like that."
10130-101300780 = "I've been wondering..."
10130-101300790 = "Is it possible to play heavy metal with a harmonica?"
10130-101300800 = "Um...as a teacher..."
10130-101300810 = "I'd like to say nothing's impossible..."
10130-101300820 = "You mean it? Nothing's impossible?"
10130-101300830 = "Okay, I'm trusting you."
10130-101300840 = "So I'll make sure I put on a heavy metal harmonica performance for you one day."

[translation]
10130-101300010 = "請容我確認一下"
10130-101300020 = "這個號碼"
10130-101300030 = "是老師沒錯吧？"
10130-101300040 = "沒錯哦，昴同學"
10130-101300050 = "太好了"
10130-101300060 = "接下來是現況報告"
10130-101300070 = "由於各種原因"
10130-101300080 = "我接下了奧利斯的巡邏工作"
10130-101300090 = "巡邏？"
10130-101300100 = "是的"
10130-101300110 = "就當作是這樣吧"
10130-101300120 = "原來如此"
10130-101300130 = "那麼這也算是有緣"
10130-101300140 = "我就去奧利斯看看吧！"
10130-101300150 = "咦？"
10130-101300160 = "這是什麼邏輯？"
10130-101300170 = "你好，老師"
10130-101300180 = "終於輪到昴當值日生了呢！"
10130-101300190 = "就是說啊"
10130-101300200 = "我對夏萊值日生的工作"
10130-101300210 = "做了各種調查"
10130-101300220 = "所以已經做好準備了"
10130-101300230 = "會緊張嗎？"
10130-101300240 = "怎麼會呢"
10130-101300250 = "絕對沒有"
10130-101300260 = "我怎麼可能會緊張呢"
10130-101300270 = "老師把我當成什麼人了"
10130-101300280 = "這樣啊～"
10130-101300290 = "就當作是這樣吧～"
10130-101300300 = "老師……？"
10130-101300310 = "該說是學園的方針嗎"
10130-101300320 = "我開始打工了"
10130-101300330 = "昴在打工！？"
10130-101300340 = "請不要這麼驚訝"
10130-101300350 = "這樣會讓我更有壓力的"
10130-101300360 = "明明只是做了該做的事，卻還給我額外的津貼"
10130-101300370 = "外面的世界真是難以理解……"
10130-101300380 = "可能是因為能把份內工作做好的人很稀少吧……"
10130-101300390 = "……這樣世界還能運轉嗎？"
10130-101300400 = "……意外地還可以？"
10130-101300410 = "請給我一點對生活的信心吧……"
10130-101300420 = "你好，老師"
10130-101300430 = "今天是假日，老師也在休息嗎？"
10130-101300440 = "幸虧昨天有加班……"
10130-101300450 = "今天才可以休息……"
10130-101300460 = "原來大人沒把工作做完就不能休息啊……"
10130-101300470 = "嗚嗚，我也想當個孩子"
10130-101300480 = "昴前輩～我想吃零食"
10130-101300490 = "別說那種令人害羞的話！"
10130-101300500 = "真是的……"
10130-101300510 = "因為之前打工的額外津貼"
10130-101300520 = "現在手頭上稍微有點錢了"
10130-101300530 = "但是不知道該拿來做什麼"
10130-101300540 = "有什麼想做的事或想買的東西嗎？"
10130-101300550 = "咦？"
10130-101300560 = "啊"
10130-101300570 = "唔嗯"
10130-101300580 = "這個嘛"
10130-101300590 = "其實"
10130-101300600 = "倒也不是沒有"
10130-101300610 = "可能是因為吹了太多晚風"
10130-101300620 = "感覺身體有點冷"
10130-101300630 = "請你負起責任"
10130-101300640 = "我該怎麼負責……？"
10130-101300650 = "開玩笑的"
10130-101300660 = "不過相對地"
10130-101300670 = "下次請再陪我去逛街哦"
10130-101300680 = "到時候我會練好其他曲子的"
10130-101300690 = "你好，老師"
10130-101300700 = "在巡邏途中向你問好"
10130-101300710 = "今天也在巡邏嗎？"
10130-101300720 = "沒錯，因為這是重要的事"
10130-101300730 = "而且巡邏時遇到的後輩們"
10130-101300740 = "也得照顧一下才行"
10130-101300750 = "那昴自己呢？"
10130-101300760 = "咦？"
10130-101300770 = "這點我倒是沒想過"
10130-101300780 = "我在思考一件事情"
10130-101300790 = "能不能用口琴吹奏重金屬呢？"
10130-101300800 = "這個嘛……雖然身為老師"
10130-101300810 = "應該要說世上沒有不可能才對……"
10130-101300820 = "所以並不是不可能對吧"
10130-101300830 = "好，那麼這也是老師的責任"
10130-101300840 = "總有一天，我一定會用口琴吹重金屬給老師聽的"

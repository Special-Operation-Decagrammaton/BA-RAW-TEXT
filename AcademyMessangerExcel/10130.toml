[translation]
10130-101300010 = "ฉันติดต่อมาเพื่อตรวจสอบค่ะ"
10130-101300020 = "เบอร์นี้"
10130-101300030 = "ใช่เบอร์ของคุณครูหรือเปล่าคะ?"
10130-101300040 = "ใช่แล้วละ สุบารุ"
10130-101300050 = "โล่งอกไปทีค่ะ"
10130-101300060 = "ขอรายงานสถานการณ์ค่ะ"
10130-101300070 = "พอดีว่าฉันได้รับมอบหมาย"
10130-101300080 = "ให้เดินลาดตระเวนในอาเรียส"
10130-101300090 = "ลาดตระเวน?"
10130-101300100 = "ค่ะ"
10130-101300110 = "รู้ไว้เท่านี้ก็พอค่ะ"
10130-101300120 = "อย่างนี้สินะ"
10130-101300130 = "ในเมื่อเราได้เป็นเพื่อน MOMOTALK กันแล้ว"
10130-101300140 = "ครูคงต้องแวะไปอาเรียสหน่อย\nแล้วละ!"
10130-101300150 = "คะ?"
10130-101300160 = "นั่นมันตรรกะอะไรกันคะ?"
10130-101300170 = "สวัสดีค่ะ คุณครู"
10130-101300180 = "ในที่สุดก็ถึงเวรของสุบารุแล้วสินะ!"
10130-101300190 = "นั่นสิคะ"
10130-101300200 = "ฉันไปหาข้อมูลต่างๆ"
10130-101300210 = "เกี่ยวกับการเข้าเวรที่ชาเล่ต์มาค่ะ"
10130-101300220 = "ฉันก็เลยพร้อมมากค่ะ"
10130-101300230 = "ประหม่ามั้ย?"
10130-101300240 = "ไม่เลยค่ะ"
10130-101300250 = "ไม่เลยสักนิดเดียว"
10130-101300260 = "ฉันไม่มีทางเป็นอย่างนั้นค่ะ"
10130-101300270 = "เห็นฉันเป็นคนยังไงคะ?"
10130-101300280 = "งั้นสินะ~"
10130-101300290 = "งั้นก็ว่าตามนั้น~"
10130-101300300 = "คุณครู...?"
10130-101300310 = "ต้องเรียกว่านี่คือนโยบายโรงเรียน\nหรือเปล่านะ?"
10130-101300320 = "ฉันได้มาทำพาร์ทไทม์น่ะค่ะ"
10130-101300330 = "งานพาร์ทไทม์ของสุบารุ?!"
10130-101300340 = "อย่าตื่นตระหนกมากเกินไปสิคะ"
10130-101300350 = "ฉันหนักใจนะคะ"
10130-101300360 = "ฉันแค่ทำงานตามหน้าที่แท้ๆ\nแต่พวกเขาก็ให้เงินเพิ่มค่ะ"
10130-101300370 = "โลกภายนอก เหมือนฉันจะรู้จัก\nแต่ก็ยิ่งไม่รู้จักนะคะ..."
10130-101300380 = "นั่นก็เพราะ แม้แต่คนที่ทำงานนั้นก็มี\nคุณค่าน่ะ..."
10130-101300390 = "โลกมันเป็นอย่างนี้เหรอคะ...?"
10130-101300400 = "น่าแปลกใช่มั้ยล่ะ...?"
10130-101300410 = "ทำให้ฉันเชื่อในชีวิตด้วยเถอะค่ะ..."
10130-101300420 = "สวัสดีค่ะ คุณครู"
10130-101300430 = "วันนี้วันหยุด คุณครูได้หยุดงานมั้ยคะ?"
10130-101300440 = "โชคดีที่เมื่อวานครูทำงานโต้รุ่ง..."
10130-101300450 = "วันนี้ก็เลยพักได้น่ะ..."
10130-101300460 = "ผู้ใหญ่จะพักไม่ได้ถ้ายังทำงานไม่เสร็จ\nสินะคะ..."
10130-101300470 = "แง อยากเป็นเด็กจัง"
10130-101300480 = "รุ่นพี่สุบารุ ซื้อขนมให้กินหน่อย"
10130-101300490 = "พูดอะไรน่าอายแบบนั้นคะ!"
10130-101300500 = "จริงๆ เลยเชียว..."
10130-101300510 = "ฉันได้เงินค่าจ้างงานพาร์ทไทม์เพิ่มมา\nเมื่อคราวก่อน"
10130-101300520 = "ก็เลยพอมีเงินนิดหน่อยค่ะ"
10130-101300530 = "แต่ฉันไม่รู้จะเอาไปใช้จ่ายอะไรดีค่ะ"
10130-101300540 = "ไม่มีอะไรที่อยากทำหรือของที่\nอยากซื้อเหรอ?"
10130-101300550 = "คะ?"
10130-101300560 = "อ่า"
10130-101300570 = "อืม"
10130-101300580 = "จะบอกว่า"
10130-101300590 = "ไม่มี"
10130-101300600 = "ก็ไม่เชิงค่ะ"
10130-101300610 = "วันนี้ต้องเจอลมแรง"
10130-101300620 = "เลยรู้สึกไม่สบายตัวแปลกๆ นะคะ"
10130-101300630 = "รับผิดชอบเลยค่ะ"
10130-101300640 = "ให้รับผิดชอบยังไงเหรอ...?"
10130-101300650 = "ฉันล้อเล่นค่ะ"
10130-101300660 = "เอาเป็นว่า"
10130-101300670 = "ไว้คราวหน้าไปซื้อของด้วยกันอีกนะคะ"
10130-101300680 = "แล้วตอนนั้นฉันจะฝึกเล่นเพลงอื่นมาค่ะ"
10130-101300690 = "สวัสดีค่ะ คุณครู"
10130-101300700 = "ฉันออกมาลาดตระเวน ก็เลยทักหาค่ะ"
10130-101300710 = "วันนี้ก็ลาดตระเวนเหรอ?"
10130-101300720 = "ใช่ค่ะ ก็นี่เป็นเรื่องสำคัญนี่คะ"
10130-101300730 = "แล้วฉันก็ต้องดูแลรุ่นน้อง"
10130-101300740 = "ที่เจอระหว่างลาดตระเวนด้วยค่ะ"
10130-101300750 = "แล้วตัวสุบารุเองล่ะ?"
10130-101300760 = "คะ?"
10130-101300770 = "ฉันไม่เคยคิดถึงเรื่องนั้นเลยค่ะ"
10130-101300780 = "ฉันไปลองคิดมาค่ะ"
10130-101300790 = "เราเล่นเพลงเฮฟวี่เมทัลด้วย\nฮาร์โมนิกาได้มั้ยคะ?"
10130-101300800 = "อ่า... ในมุมมองของครูแล้ว"
10130-101300810 = "คงต้องบอกว่าไม่มีอะไรในโลก\nที่เป็นไปไม่ได้ แต่ว่า..."
10130-101300820 = "ไม่มีอะไรในโลกที่เป็นไปไม่ได้\nใช่มั้ยคะ?"
10130-101300830 = "ดีเลยค่ะ ในเมื่อนี่ก็เป็นความรับผิดชอบ\nของคุณครูด้วย"
10130-101300840 = "งั้นสักวันฉันจะเล่นเพลงเฮฟวี่เมทัล\nด้วยฮาร์โมนิกาให้ฟังค่ะ"

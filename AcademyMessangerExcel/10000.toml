[translation]
10000-327 = "선생님, 요전번에 함께 해결했던 의뢰의 결과가 나왔어."
10000-328 = "클라이언트가 꽤 만족하더라고."
10000-329 = "후훗. 고생했어."
10000-330 = "갑자기 무슨 말이야?"
10000-331 = "이것도 다 아루 사장님 덕분이지!"
10000-332 = "으응? 뭐야, 기억 못하는 거야?"
10000-333 = "아니, 으음. 그 정도로 정신 없는 일이긴 했지만……."
10000-334 = "하, 하여간……!"
10000-335 = "자연스러운 처세술이라니, 여, 역시 어른……!"
10000-336 = "……이 아니라."
10000-337 = "직원이 우수한 실적을 냈을 때, 거기에 걸맞은 포상을 내리는 것도"
10000-338 = "사장이 해야 할 일이야."
10000-339 = "선생님이 생각하기에 최고의 포상은 뭐야?"
10000-340 = "돌아와서 다시 생각해보니까."
10000-341 = "직원 포상으로 파르페 도전 메뉴를 먹는다고 하면"
10000-342 = "다들 화를 낼 것 같아."
10000-343 = "……효율적이란 이름 앞에 이런 맹점이 있었을 줄이야."
10000-344 = "그러니 다음번에. 그……."
10000-345 = "또 어울려줘. 선생님."
10000-346 = "선생님, 사장이 되는 데 필요한 능력은 리더십만이 아니야."
10000-347 = "물론 내 리더십은 엄청 뛰어나지만"
10000-348 = "그 밖에도 다양한 직무능력이 필요한 법이니까."
10000-349 = "다양한 직무능력?"
10000-350 = "그게 뭔데?"
10000-351 = "후후후, 그게 알고 싶다, 이거지?"
10000-352 = "그럼 오늘 도서관에서 집합이야. 선생님."
10000-353 = "선생님, 다시 봤어."
10000-354 = "하지만 명심해둬."
10000-355 = "다음번에는 이렇게 호락호락 당하지 않을 테니까!"
10000-356 = "또 같이 공부하자♪"
10000-357 = "선생님, 이야기 들었어?"
10000-358 = "전설적인 명작이라던 그 영화가 이번에 재개봉한대."
10000-359 = "시간 괜찮으면, 같이 보러 가지 않을래?"
10000-360 = "오오! 아루 쨩의 데이트 신청이다!"
10000-361 = "무, 무, 무슨 소리를 하는 거야?! 선생님?!"
10000-362 = "쓰, 쓸데없는 말 말고, 영화관 앞에서 집합이야!"
10000-363 = "선생님, 오늘 한가해?"
10000-364 = "응, 한가해."
10000-365 = "아루 쨩이 부른다면 바쁘더라도 가야지."
10000-366 = "크, 크흠! 뭐, 좋, 좋아."
10000-367 = "선생님에게 중요한 용건이 있던 참이니까."
10000-368 = "그럼 오늘 흥신소 사무실로 찾아와줘."
10000-369 = "기다리고 있을게."
10000-370 = "오늘 내 멋진 모습, 잔뜩 봤지?"
10000-371 = "앞으로도 잘 부탁해. 선생님!"
10000-372 = "참고로 그거 정말 업무 전화 맞았으니까! 오해하지 마!"
10000-100000010 = "선생님."
10000-100000020 = "나 개인은 물론, 우리 흥신소는 늘 선생님에게 감사하다고 생각하고 있어."
10000-100000030 = "아루가 그렇게까지 말해주니, 어쩐지 부끄러운걸."
10000-100000040 = "후후훗, 뭐야. 겨우 이 정도로 부끄러워하다니."
10000-100000050 = "어쩐지 선생님답지 않은걸."
10000-100000060 = "이쪽만 부끄러운 건 왠지 분하니까. 아루도 부끄럽게 만들자!"
10000-100000070 = "지, 지금 당사자 앞에서 무슨 소리를 하는 거야?!"
10000-100000080 = "뭐, 농담이지만."
10000-100000090 = "…하아. 진짜 선생님이랑 대화하다 보면 종종 깜짝 놀란다니깐."
10000-100000100 = "하, 하여간! 평소 도와주고 있는 선생님에게 보답이라도 할 겸……"
10000-100000110 = "한턱 내려고 하는데. 어때?"
10000-100000120 = "그런 일이라면 당연히 가야지!"
10000-100000130 = "후후후. 그래…?"
10000-100000140 = "그럼 기다리고 있을게. 선생님."

[translation]
10000-327 = "老師。你之前幫忙的委託，又再次解決了唷"
10000-328 = "客戶好像也相當滿意"
10000-329 = "呵呵，辛苦了"
10000-330 = "在說什麼來著？"
10000-331 = "這都是託亞瑠社長的福啊！"
10000-332 = "耶？難道不記得了嗎？"
10000-333 = "嘛，當時確實很慌忙……"
10000-334 = "總，總之……！"
10000-335 = "多，多麼自然的處世之道，這就是大人……！"
10000-336 = "……不對"
10000-337 = "當職員表現良好時，要給予相對應的獎勵"
10000-338 = "我認為這是社長該做的事"
10000-339 = "那麼，對老師來說，最棒的獎勵是什麼呢？"
10000-340 = "我回家之後想了很久"
10000-341 = "「作為獎勵，大家一起吃挑戰菜單上的百匯冰淇淋」如果我這麼說"
10000-342 = "大家可能會生氣吧"
10000-343 = "……效率的背後，竟然有這樣的盲點"
10000-344 = "所以，那個……"
10000-345 = "老師，下次還會陪我嗎？"
10000-346 = "老師，成為社長所需的能力不僅僅是領導能力"
10000-347 = "當然，我的領導能力非常出色"
10000-348 = "但業務上還需要其他各式各樣的能力"
10000-349 = "各式各樣的能力？"
10000-350 = "比如說？"
10000-351 = "呵呵呵，想知道嗎？想知道對吧？"
10000-352 = "那麼今天就來圖書館吧。我等著唷，老師"
10000-353 = "老師，對你改觀了"
10000-354 = "但是記住了"
10000-355 = "下次不會再這麼容易中計了！"
10000-356 = "……就是這樣。下次再一起學習吧♪"
10000-357 = "老師，你聽說了嗎？"
10000-358 = "傳說中的那部電影名作，這次要重新上映了"
10000-359 = "方便的話，要不要一起去看？"
10000-360 = "好耶！是亞瑠的約會邀請！"
10000-361 = "在，在，在說什麼啊，老師！？"
10000-362 = "別，別說那些無聊的話了，總之在電影院門口碰面唷！"
10000-363 = "老師，今天有空嗎？"
10000-364 = "嗯，有空唷"
10000-365 = "如果是亞瑠的呼喚，不行也得行"
10000-366 = "哼，哼嗯……！？嘛，嘛，那好吧"
10000-367 = "今天有重要的事要和老師說"
10000-368 = "晚點能來便利屋的辦公室嗎？"
10000-369 = "我等著唷"
10000-370 = "能像今天這樣看到我帥氣的樣子，是很珍貴的事哦？"
10000-371 = "今後也請多多關照唷，老師！"
10000-372 = "……順帶一提，那真的是工作電話！真的唷！"
10000-100000010 = "老師"
10000-100000020 = "雖然先前說過了……我們便利屋全體，衷心的感謝老師"
10000-100000030 = "說成這樣真讓人害羞啊"
10000-100000040 = "呵呵呵，真不像老師呢"
10000-100000050 = "這種程度就害羞的話，未來就很難做下去了唷"
10000-100000060 = "那就攻守交換，讓亞瑠也感到害羞吧"
10000-100000070 = "什麼意思！？！？"
10000-100000080 = "抱歉，只是說說而已"
10000-100000090 = "是，是嗎……"
10000-100000100 = "總之進入正題，作為平常受到關照的回禮"
10000-100000110 = "一起吃頓飯，如何呢？"
10000-100000120 = "務必！"
10000-100000130 = "那太好了"
10000-100000140 = "那我等著唷，老師"

[translation]
10000-327 = "คุณครู ผลการทำงานวันก่อน\nของเราออกมาแล้วล่ะ "
10000-328 = "ลูกค้าพอใจมากเลย "
10000-329 = "ฮุฮุ ทำได้ดีมาก"
10000-330 = "อยู่ๆ ก็มาชมอะไรแบบนี้เนี่ย?"
10000-331 = "นั่นเป็นเพราะประธานอารุต่างห่างล่ะ!"
10000-332 = "อะไรกัน? คุณครูจำไม่ได้เหรอ?"
10000-333 = "ก็แต่นะ... ทุกคนวุ่นกับงานนั้นมากเลย..."
10000-334 = "เอาเถอะ!"
10000-335 = "พูดหน้าตาเฉยเลยนะ\nคงเพราะเป็นผู้ใหญ่สินะ"
10000-336 = "... ฉันหมายถึง"
10000-337 = "เวลาที่ลูกน้องทำผลงานออกมาได้ดี"
10000-338 = "คนที่เป็นหัวหน้า\nก็ต้องให้รางวัลตอบแทน"
10000-339 = "คุณครูคิดว่าอะไรคือรางวัลที่ดีที่สุด\nอย่างงั้นเหรอ?"
10000-340 = "ลองมาคิดดูแล้ว"
10000-341 = "ถ้าฉันบอกทุกคนว่าเราจะให้รางวัล\nด้วยการกินพาร์เฟต์ท้าทายละก็..."
10000-342 = "พวกคนอื่นๆ ต้องโมโหเอาแน่ๆ"
10000-343 = "ทำไมคนที่สมบูรณ์แบบอย่างฉัน\nถึงคิดอะไรแบบนี้ไม่ออกนะ"
10000-344 = "งั้นเอาไว้คราวหน้า เอ่อ..."
10000-345 = "ไว้ไปด้วยกันใหม่นะ คุณครู..."
10000-346 = "คุณครู การจะเป็นหัวหน้าที่ดี\nต้องมีมากกว่าแค่ทักษะผู้นำนะ"
10000-347 = "แน่นอนว่าทักษะผู้นำของฉันมีอยู่เต็ม\nเปี่ยม"
10000-348 = "แต่เราก็ต้องการทักษะในการทำงาน\nที่หลากหลายด้วย"
10000-349 = "สกิลในการทำงานที่หลากหลายเหรอ?"
10000-350 = "แล้วมันคืออะไรเหรอ?"
10000-351 = "ฮุฮุฮุ อยากรู้ใช่ไหมล่ะ?"
10000-352 = "งั้นวันนี้มาเจอกันที่ห้องสมุดนะ คุณครู?"
10000-353 = "ฉันไม่คิดว่าจะเป็นแบบนี้เลยนะคุณครู"
10000-354 = "แต่จำเอาไว้เลยนะ"
10000-355 = "ครั้งหน้าฉันจะไม่ยอมง่ายๆ แน่!"
10000-356 = "เอาไว้คราวหน้ามาเรียนรู้ด้วยกันใหม่นะ♪"
10000-357 = "คุณครู ได้ยินเรื่องนั้นหรือยัง?"
10000-358 = "เห็นว่าหนังระดับตำนานเรื่องนั้น\nจะเอามาฉายอีกครั้งด้วยละ"
10000-359 = "ถ้าครูมีเวลา ไปดูหนังกับฉันมั้ย?"
10000-360 = "โอ้ว! อารุจังชวนไปเดตเหรอเนี่ย?!"
10000-361 = "พะ.. พะ.. พูดอะไรของคุณครูน่ะ?!!"
10000-362 = "เลิกพูดอะไรไม่เข้าท่า\nไปเจอกันหน้าโรงหนังเลยแล้วกัน!"
10000-363 = "วันนี้คุณครูว่างไหม?"
10000-364 = "อื้ม ว่างสิ"
10000-365 = "ถ้าอารุจังเรียกละก็\nต่อให้ยุ่งแค่ไหนก็จะไป"
10000-366 = "อะแฮ่ม! เอ่อ.. ดีเลย"
10000-367 = "ฉันมีธุระสำคัญจะคุยกับคุณครูอยู่พอดี"
10000-368 = "งั้นไว้มาหาฉันที่สำนักงาน\nของหน่วยรับจ้างหน่อยนะ"
10000-369 = "ฉันจะไปรอที่นั่น"
10000-370 = "วันนี้ฉันเท่สุดๆ ไปเลยใช่ไหมล่ะ?"
10000-371 = "หวังว่าจะได้ร่วมงานกันนะ คุณครู!"
10000-372 = "อ้อ! นั่นเป็นโทรศัพท์เกี่ยวกับเรื่องงาน\nจริงๆ เพราะงั้นอย่าเข้าใจผิดล่ะ!"
10000-100000010 = "คุณครู "
10000-100000020 = "ทั้งฉันและสมาชิกหน่วยรับจ้างสารพัด\nของเรารู้สึกขอบคุณคุณครูมาตลอด"
10000-100000030 = "อารุพูดขนาดนี้ ครูเขินนะ"
10000-100000040 = "ฮุฮุฮุ อะไรกัน แค่นี้ก็เขินซะแล้วเหรอ"
10000-100000050 = "ดูไม่สมกับเป็นคุณครูเลยนะ"
10000-100000060 = "ไม่ยุติธรรมเลยที่ครูเขินอยู่ฝ่ายเดียว\nเพราะงั้นมาทำให้อารุเขินบ้างแล้วกัน!"
10000-100000070 = "พูดต่อหน้ากันโต้งๆ แบบนี้เลยงั้นเหรอ?!"
10000-100000080 = "ครูแค่ล้อเล่นเอง..."
10000-100000090 = "เฮ้อ เวลาคุยกับคุณครูทีไร\nจะต้องมีเรื่องให้ตกใจทุกทีเลย"
10000-100000100 = "ยะ...ยังไงก็เถอะ! เพื่อเป็นการตอบแทน\nคุณครู ที่คอยช่วยฉันมาตลอด..."
10000-100000110 = "ฉันจะพาไปเลี้ยงข้าวเอง ว่ายังไง?"
10000-100000120 = "อารุเลี้ยงมีเหรอจะปฏิเสธ!"
10000-100000130 = "ฮุฮุฮุ งั้นเหรอ...?"
10000-100000140 = "ถ้างั้นฉันจะรอแล้วกันนะ คุณครู"

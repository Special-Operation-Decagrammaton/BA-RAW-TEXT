[translation]
10000-327 = "Sensei, we got some feedback from that last request. "
10000-328 = "The client was quite satisfied. "
10000-329 = "Heh. Good job."
10000-330 = "What are you talking about?"
10000-331 = "It was only possible because of you, Aru."
10000-332 = "Huh? You mean you don't remember?"
10000-333 = "I mean, I understand it was really chaotic, but..."
10000-334 = "A-Anyway...!"
10000-335 = "You're pretty smooth. I-I guess that comes easy to adults!"
10000-336 = "...Or maybe not."
10000-337 = "It's my job as a boss to reward employees"
10000-338 = "who achieve excellent results."
10000-339 = "What do you think would be the best reward, Sensei?"
10000-340 = "I've been thinking about it since I came back."
10000-341 = "If I were to tell everyone we were eating the parfait challenge menu as an employee reward,"
10000-342 = "I think they would just get mad."
10000-343 = "...I was too busy thinking about efficiency to consider that."
10000-344 = "So, next time...um..."
10000-345 = "I hope you can join us again, Sensei."
10000-346 = "Sensei, bosses need more than just leadership skills."
10000-347 = "Of course, my leadership skills are excellent,"
10000-348 = "but there are many more skills that I require."
10000-349 = "Skills?"
10000-350 = "Like what?"
10000-351 = "Heh, you really wanna know?"
10000-352 = "Then come to the library today, Sensei."
10000-353 = "Sensei, I didn't expect this to happen."
10000-354 = "But remember: "
10000-355 = "Next time, I won't go so easy on you!"
10000-356 = "Let's study together again sometime! ♪"
10000-357 = "Sensei, did you hear?"
10000-358 = "There's a movie showing that people already say is a legendary masterpiece."
10000-359 = "If you have time, why don't we go see it together?"
10000-360 = "Oh! Are you asking me out, Aru?"
10000-361 = "Wh-What are you talking about, Sensei?!"
10000-362 = "S-Stop kidding around. I'll meet you in front of the movie theater!"
10000-363 = "Sensei, are you free today?"
10000-364 = "Yeah, I'm free."
10000-365 = "Even if I was busy, I'd make time for you, Aru."
10000-366 = "A-Ahem! Well, o-okay."
10000-367 = "I have something important to discuss with you, Sensei."
10000-368 = "Come to the Problem Solver office today."
10000-369 = "I'll be waiting."
10000-370 = "Did you see how cool I was today?"
10000-371 = "Thanks for always being there, Sensei!"
10000-372 = "FYI, that really was a business call, so don't take it the wrong way!"
10000-100000010 = "Sensei. "
10000-100000020 = "We at Problem Solver 68 are grateful to you."
10000-100000030 = "I'm a little embarrassed to hear that from you, Aru."
10000-100000040 = "Heehee. Come on, don't be embarrassed."
10000-100000050 = "That's unlike you."
10000-100000060 = "I don't want to be embarrassed alone, so I'll have to make you feel the same way!"
10000-100000070 = "Wh-What are you talking about?!"
10000-100000080 = "Well, I'm just kidding."
10000-100000090 = "*sigh* You really surprise me sometimes when I talk to you."
10000-100000100 = "A-Anyway! I've been wanting to repay you for all the help..."
10000-100000110 = "I want to invite you out. What do you think?"
10000-100000120 = "I accept, of course."
10000-100000130 = "Heeheehee, really?"
10000-100000140 = "Then, I'll be waiting, Sensei."

[translation]
10001-373 = "老師，有沒有感覺最近天氣突然變熱了？"
10001-374 = "作戰結束後，非常的悶熱……"
10001-375 = "是嗎？離夏天還很遠呢……"
10001-376 = "是不是作戰時太拚命了？"
10001-377 = "是嗎，是我誤會了嗎……？"
10001-378 = "啊，對了，老師"
10001-379 = "我剛才在冰淇淋店前面，"
10001-380 = "看到了正在吃薄荷巧克力冰淇淋的三一學生……"
10001-381 = "牙膏味的冰淇淋難道有助於調節體溫……？"
10001-382 = "不懂喜歡薄荷巧克力味的人的心情……"
10001-383 = "才不是牙膏味！向薄荷巧克力道歉！"
10001-384 = "對吧？"
10001-385 = "啊……老師是那一派的人？"
10001-386 = "女高中生的世界果然很深奧……"
10001-387 = "老師，我最近有一個煩惱……"
10001-388 = "煩惱？與研討會的工作有關嗎？"
10001-389 = "不，跟那個沒關係，是很私人的事情"
10001-390 = "想請老師聽我說"
10001-391 = "如果我可以的話，隨時都能聽你說"
10001-392 = "嗯，拜託了"
10001-393 = "……謝謝你，老師"
10001-394 = "老師上次有說要協助我調查女學生喜歡的東西吧？"
10001-395 = "嗯，是有說過……"
10001-396 = "來做下一個調查吧"
10001-397 = "想請你來奇普托斯市中心"
10001-398 = "現在？"
10001-399 = "嗯，現在"
10001-400 = "在密閉空間裡唱歌竟然這麼開心……"
10001-401 = "有一種像是對敵人亂開槍時的興奮感"
10001-402 = "……要不乾脆在卡拉OK裡開槍，會不會更開心？"
10001-403 = "那絕對不行！"
10001-404 = "老師，今天要去買新衣服"
10001-405 = "希望能找到漂亮的衣服"
10001-406 = "想請老師看看衣服穿在我身上合不合適……"
10001-407 = "今天放學後有空嗎？"
10001-408 = "啊，嗯。沒問題唷"
10001-409 = "太好了。那就在奇普托斯市中心的購物中心碰面"
10001-410 = "作戰結束，任務完成。辛苦了，老師"
10001-411 = "剛才擦肩而過時，你的手臂好像流血了，處理好了嗎？"
10001-412 = "沒事，只是有點擦傷而已"
10001-413 = "這種程度的傷在作戰時很常見"
10001-414 = "這可不行。來保健室我幫你消毒"
10001-415 = "明明沒事的說……"
10001-100010010 = "老師，幫我一點忙"
10001-100010020 = "在廢墟附近發現了未知的信號"
10001-100010030 = "我想去比較遠的地方調查，順便執行特異現象搜查部的工作"
10001-100010040 = "雖然感覺天氣會很熱……"
10001-100010050 = "不過這次沒問題，交給我吧"
10001-100010060 = "哦哦，感覺你這次很有自信呢"
10001-100010070 = "這次有什麼對策嗎？"
10001-100010080 = "嗯"
10001-100010090 = "我有為這種時候做準備"
10001-100010100 = "期待一下吧"
10001-100010110 = "真奇怪……"
10001-100010120 = "電風扇明明很涼，老師卻感覺很熱"
10001-100010130 = "是功率不夠嗎？還是說，老師也是易熱體質？"
10001-100010140 = "唔嗯"
10001-100010150 = "也許還是要再貼近一點比較好"
10001-100010160 = "如果能全身貼合，結果可能會不一樣"
10001-100010170 = "你怎麼看？"
10001-100010180 = "我覺得應該是別的問題……"
10001-100010190 = "不過即便如此，這也是個不錯的經驗"
10001-100010200 = "唔嗯"
10001-100010210 = "那是什麼意思？"
10001-100010220 = "唔嗯……"
10001-100010230 = "總之，之後我會考慮其他對策的"
10001-100010240 = "下次見囉，老師"

[translation]
10001-373 = "Sensei, doesn't it feel like it's gotten hotter lately?"
10001-374 = "After working on a mission, it feels even more stifling..."
10001-375 = "Yeah? It's still a while until summer."
10001-376 = "Maybe you've just been working too hard!"
10001-377 = "Yeah? Maybe it is just me..."
10001-378 = "Oh, right. Sensei."
10001-379 = "I saw some girls from Trinity"
10001-380 = "getting mint chocolate ice cream from the parlor earlier..."
10001-381 = "Do you think eating ice cream that tastes like toothpaste helps them cool down?"
10001-382 = "I've never understood why people like mint."
10001-383 = "Like toothpaste? Hey, you owe mint an apology!"
10001-384 = "Right?"
10001-385 = "Huh? Why are you mad about that?"
10001-386 = "The world of high school girls is a complicated one..."
10001-387 = "Sensei, recently I've had a problem..."
10001-388 = "Problem? Is this about the Seminar mission?"
10001-389 = "No, it has nothing to do with the mission. It's...personal."
10001-390 = "I'd like to talk to you, Sensei."
10001-391 = "I'll always listen if you want to talk to me."
10001-392 = "I knew asking you was the right choice..."
10001-393 = "Thank you, Sensei."
10001-394 = "Sensei, didn't you say you'd help me understand what girls my age like?"
10001-395 = "I did say that, but..."
10001-396 = "I'm conducting a new study."
10001-397 = "Please come to downtown Kivotos."
10001-398 = "You mean right now?"
10001-399 = "Yes, right now."
10001-400 = "It's surprisingly fun to sing in an enclosed space..."
10001-401 = "I feel strangely uplifted, like when I'm shooting at the enemy."
10001-402 = "...What if we did both at the same time? Would that be even more fun?"
10001-403 = "You can't do that!"
10001-404 = "Sensei. I'm going to the boutique to buy new clothes today."
10001-405 = "I hope you can find something pretty."
10001-406 = "I'd like you to come with me, and tell me what looks good on me..."
10001-407 = "Do you have time after school today?"
10001-408 = "Yeah. I have time."
10001-409 = "Great! I'll see you at the shopping mall in downtown Kivotos."
10001-410 = "Mission clear. Nice work, Sensei."
10001-411 = "I noticed earlier that your arm was bleeding. Do you need treatment?"
10001-412 = "It's okay. It's just a scratch."
10001-413 = "Scratches like this one are pretty common during missions."
10001-414 = "That's not good. Come to the infirmary, and I'll disinfect the wound."
10001-415 = "I'm okay. Really..."
10001-100010010 = "Sensei, requesting your support."
10001-100010020 = "Our equipment near the ruins detected another anomalous response."
10001-100010030 = "As my duty as a member of the Super Phenomenon Task Force, I'll be traveling quite far to investigate."
10001-100010040 = "The weather is forecasted to be a bit hot, but..."
10001-100010050 = "I don't foresee a problem this time."
10001-100010060 = "Wow, you seem so confident."
10001-100010070 = "Do you have a good plan this time?"
10001-100010080 = "Yes."
10001-100010090 = "I suspected this day would come, so I ensured that I would be thoroughly prepared."
10001-100010100 = "Please look forward to it."
10001-100010110 = "I noticed something odd."
10001-100010120 = "For some reason, you seemed to feel even hotter after you used the fan."
10001-100010130 = "Was it lacking power? Or perhaps, you just naturally have a lot of body heat, like me?"
10001-100010140 = "Hm."
10001-100010150 = "Maybe it needed to be closer to you for you to feel the effects."
10001-100010160 = "The results may have been different if we had full body contact."
10001-100010170 = "What do you think?"
10001-100010180 = "I don't think that would solve the problem..."
10001-100010190 = "But it wasn't a bad experience."
10001-100010200 = "Um..."
10001-100010210 = "I'm not sure what you mean."
10001-100010220 = "Hmm."
10001-100010230 = "Anyways, next time, I'll prepare a back-up plan."
10001-100010240 = "Until then, Sensei."

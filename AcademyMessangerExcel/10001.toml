[translation]
10001-373 = "선생님, 요새 날씨가 부쩍 더워진 것 같지 않아?"
10001-374 = "작전을 마치고 나면 더 후덥지근하게 느껴지기도 하고……"
10001-375 = "그런가? 아직 여름이 오려면 멀었는데……."
10001-376 = "작전을 너무 열심히 수행해서 그런 게 아닐까?"
10001-377 = "그런가…… 내 착각이려나……?"
10001-378 = "아, 참, 선생님."
10001-379 = "아까 아이스크림 가게 앞에서 보니"
10001-380 = "민트초코맛 아이스크림을 사 먹는 트리니티의 여학생들이 보이던데……"
10001-381 = "치약 같은 맛의 아이스크림을 먹는 건 체온 조절에 도움이 되는 걸까……?"
10001-382 = "민트 아이스크림을 먹는 사람의 기분은 잘 모르겠어……."
10001-383 = "치약 같은 맛이라니, 민트에게 사과해!"
10001-384 = "그렇지?"
10001-385 = "어라……? 화내는 부분이 그쪽?"
10001-386 = "여고생의 세계는 심오하네……."
10001-387 = "선생님, 최근 고민이 하나 생겼는데……."
10001-388 = "고민? 세미나의 임무와 관련된 일이야?"
10001-389 = "아니, 임무와 관련된 일은 아니고, 아주 개인적인 것이라."
10001-390 = "선생님이 들어줬으면 좋겠어."
10001-391 = "나라도 괜찮다면 언제든지 들어줄게."
10001-392 = "역시 선생님에게 물어보길 잘했어……."
10001-393 = "고마워, 선생님."
10001-394 = "선생님, 지난번에 여학생들이 좋아하는 것을 조사하는 데 협조해 주겠다고 했지?"
10001-395 = "그렇게 말하긴 했지만……."
10001-396 = "새로운 조사야."
10001-397 = "키보토스 시내 중심가로 바로 나와줘."
10001-398 = "갑자기? 지금 바로?"
10001-399 = "응, 지금 당장."
10001-400 = "밀폐된 공간에서 노래를 부르는 건 의외로 즐겁네……."
10001-401 = "적을 향해 탄환을 난사할 때처럼 묘한 고양감이 느껴져."
10001-402 = "……그럼 노래방에서 총을 쏘면 더 즐겁지 않을까?"
10001-403 = "그건 안 돼!"
10001-404 = "선생님, 오늘은 여성복 매장에 새 옷을 사러 갈 거야."
10001-405 = "예쁜 옷을 찾을 수 있었으면 좋겠네."
10001-406 = "내게 잘 어울리는 옷이 있는지 선생님이 같이 가서 봐주었으면 좋겠는데……"
10001-407 = "오늘 방과 후에 시간 괜찮아?"
10001-408 = "응. 여유로워."
10001-409 = "좋아, 그럼 키보토스 중심가의 쇼핑몰에서 보자."
10001-410 = "작전 완료, 미션 클리어. 선생님, 수고 많았어."
10001-411 = "아까 보니 팔에서 피가 나던데, 치료하지 않아도 되겠어?"
10001-412 = "괜찮아, 살짝 긁힌 수준인걸."
10001-413 = "작전 중에 이 정도의 상처를 입는 건 흔한 일이야."
10001-414 = "안 돼. 상처를 소독해 줄 테니 양호실로 와."
10001-415 = "나는 정말 괜찮다니까……."
10001-100010010 = "선생님, 지원이 필요해."
10001-100010020 = "폐허 근처에서 알 수 없는 반응이 다시 발견됐거든."
10001-100010030 = "초현상특무부의 업무를 겸해 조금 먼 곳으로 조사를 다녀올 거야."
10001-100010040 = "날이 조금 덥겠지만……."
10001-100010050 = "이번에는 괜찮을 거야."
10001-100010060 = "오, 자신 있는 말투."
10001-100010070 = "뭔가 대책이 있는 거야?"
10001-100010080 = "응."
10001-100010090 = "이럴 때도 있겠다 싶어서, 확실하게 준비해 둔 게 있거든."
10001-100010100 = "기대해도 좋아."
10001-100010110 = "이상하다."
10001-100010120 = "어째서인지 선풍기를 쐰 뒤로, 선생님이 더 더워하는 것 같았는데."
10001-100010130 = "출력이 부족했던 걸까? 아니면 선생님도 나처럼 열이 많았다던가."
10001-100010140 = "음"
10001-100010150 = "역시 좀 더 가까이 붙었어야 했나."
10001-100010160 = "전신 밀착이었다면, 결과가 달라졌을지도 모르지."
10001-100010170 = "어떻게 생각해?"
10001-100010180 = "아마 다른 문제라고 생각하지만……."
10001-100010190 = "그래도 그렇게 나쁜 경험은 아니었어."
10001-100010200 = "으음."
10001-100010210 = "그건 무슨 말이야?"
10001-100010220 = "음."
10001-100010230 = "어쨌든 다음부터는 다른 대책도 준비해 두도록 할게."
10001-100010240 = "그럼 또 봐, 선생님."

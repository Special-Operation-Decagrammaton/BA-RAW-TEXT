[translation]
10001-373 = "คุณครู ช่วงนี้อากาศร้อนขึ้นอย่างเห็นได้\nชัดเลยว่ามั้ย?"
10001-374 = "ยิ่งตอนต่อสู้เสร็จ ยิ่งรู้สึกได้เลยว่าร้อน\nขึ้นมาก..."
10001-375 = "ร้อนเหรอ? แต่อีกตั้งนานกว่าจะถึงหน้า\nร้อนนะ..."
10001-376 = "เพราะเธอตั้งใจต่อสู้มากเกินไปหรือเปล่า?"
10001-377 = "อืม... หรือว่าฉันคิดไปเองนะ?"
10001-378 = "จริงสิ คุณครู!"
10001-379 = "เมื่อกี๊ที่ร้านไอศกรีม..."
10001-380 = "ฉันเห็นพวกนักเรียนทรีนิตี้ซื้อไอศกรีม\nมินต์ช็อกโกแลตกินด้วยล่ะ..."
10001-381 = "การได้กินไอศกรีมรสยาสีฟันแบบนั้นอาจ\nจะช่วยปรับอุณหภูมิร่างกายฉันก็ได้นะ..."
10001-382 = "ครูไม่รู้ว่าคนที่กินไอศกรีมรสมินต์\nเค้ารู้สึกกันยังไง..."
10001-383 = "ยาสีฟันเหรอ?\nขอโทษไอศกรีมรสมินต์เดี๋ยวนี้!"
10001-384 = "เนอะ?!"
10001-385 = "เดี๋ยวนะ? นี่คุณครูโกรธเหรอ?"
10001-386 = "โลกของนักเรียนม.ปลายนี่ลึกซึ้งจริงๆ..."
10001-387 = "คุณครู ช่วงนี้ฉันมีเรื่องกังวลด้วยล่ะ..."
10001-388 = "เรื่องกังวลเหรอ? เกี่ยวกับภารกิจของ\nเซมิน่าหรือเปล่า?"
10001-389 = "ไม่ใช่ ไม่เกี่ยวกับภารกิจหรอก เป็นเรื่อง\nส่วนตัวน่ะ"
10001-390 = "แต่ฉันอยากให้คุณครูช่วยฟังหน่อย"
10001-391 = "ถ้าเธออยากเล่า ครูก็รับฟังได้อยู่แล้ว"
10001-392 = "โชคดีจริงๆ ที่มาถามคุณครู..."
10001-393 = "ขอบคุณนะคุณครู"
10001-394 = "คุณครู จำที่เคยบอกว่าจะช่วยฉันสำรวจ\nเกี่ยวกับสิ่งที่นักเรียนหญิงชอบได้มั้ย?"
10001-395 = "ครูเคยบอกว่าจะช่วยก็จริง..."
10001-396 = "นี่คือการสำรวจครั้งใหม่"
10001-397 = "มาเจอกันที่กลางเมืองคิโวทอสนะ"
10001-398 = "ต้องไปตอนนี้เลยเหรอ?"
10001-399 = "ใช่ เดี๋ยวนี้เลย!"
10001-400 = "การร้องเพลงในที่แคบๆ ก็สนุกดี\nเหมือนกันนะเนี่ย"
10001-401 = "ฉันรู้สึกแปลกๆ เหมือนตอนที่สาดกระสุน\nใส่ศัตรูเลยละ"
10001-402 = "ถ้างั้นไปสาดกระสุนที่คาราโอเกะก็ต้อง\nสนุกกว่าแน่!"
10001-403 = "ทำแบบนั้นไม่ได้นะ!"
10001-404 = "คุณครู วันนี้ฉันจะไปซื้อเสื้อผ้าใหม่นะ"
10001-405 = "ขอให้ได้เสื้อผ้าสวยๆ กลับมานะ"
10001-406 = "ว่าแต่... คุณครูไปกับฉันได้มั้ย? ไปช่วยดู\nหน่อยว่ามีเสื้อผ้าที่เหมาะกับฉันรึเปล่า..."
10001-407 = "หลังเลิกเรียนแล้วพอมีเวลามั้ย?"
10001-408 = "อื้ม ตอนนั้นครูว่าง"
10001-409 = "ดีเลย งั้นเจอกันที่ห้างสรรพสินค้ากลาง\nคิโวทอสนะ"
10001-410 = "ภารกิจสำเร็จแล้ว\nขอบคุณมากเลยคุณครู"
10001-411 = "เมื่อกี้แขนเธอเลือดออกด้วย ไม่ต้อง\nทำแผลเหรอ?"
10001-412 = "ไม่เป็นไรหรอก แค่โดนขีดข่วนนิดหน่อย\nเอง"
10001-413 = "ปกติออกไปต่อสู้ก็ได้แผลแบบนี้กลับมา\nบ่อยๆ น่ะ"
10001-414 = "ไม่ได้! มาเจอกันที่ห้องพยาบาล\nครูจะล้างแผลให้"
10001-415 = "ก็บอกว่าไม่เป็นไรไง..."
10001-100010010 = "คุณครู... ฉันต้องการกำลังเสริม"
10001-100010020 = "พอดีตรวจพบปฏิกิริยาตอบสนอง\nลึกลับที่แถวๆ พื้นที่รกร้างน่ะ"
10001-100010030 = "ฉันไปทำภารกิจของชมรมที่อยู่ใน\nพื้นที่ห่างไกลมาน่ะ"
10001-100010040 = "ถึงวันนี้อากาศจะร้อนไปหน่อยก็เถอะ\nนะ..."
10001-100010050 = "แต่คราวนี้คงไม่เป็นไรหรอก"
10001-100010060 = "โอ๊ะ คำพูดดูมั่นใจจังเลยนะ"
10001-100010070 = "มีแผนอะไรอยู่งั้นเหรอ?"
10001-100010080 = "อื้ม"
10001-100010090 = "ฉันคิดแล้วว่าคงจะเกิดเรื่องแบบนี้ใน\nสักวันก็เลยเตรียพร้อมเอาไว้แล้วละ"
10001-100010100 = "คอยดูได้เลย"
10001-100010110 = "แปลกจัง"
10001-100010120 = "ทำไมหลังจากเปิดพัดลมแล้ว คุณครู\nถึงดูเหมือนจะร้อนขึ้นกว่าเดิมเลยล่ะ"
10001-100010130 = "แรงลมมันไม่พอรึไงนะ? หรือเพราะ\nคุณครูก็ขี้ร้อนเหมือนฉันนะ..."
10001-100010140 = "อืม"
10001-100010150 = "ต้องเข้าไปใกล้กว่านี้อีกรึเปล่านะ"
10001-100010160 = "ถ้าบอกกันตั้งแต่แรก ผลลัพธ์ก็อาจจะ\nไม่เป็นแบบนี้ก็ได้..."
10001-100010170 = "คิดว่าไง...?"
10001-100010180 = "เป็นปัญหาที่ต่างออกไปสักหน่อย..."
10001-100010190 = "แต่ก็เป็นประสบการณ์ที่ไม่แย่เท่าไร"
10001-100010200 = "อืม"
10001-100010210 = "หมายความว่ายังไงน่ะ?"
10001-100010220 = "อืม"
10001-100010230 = "เอาเป็นว่าครั้งหน้าฉันจะเตรียมแผน\nรับมือแบบอื่นเอาไว้ด้วยก็แล้วกัน"
10001-100010240 = "งั้นไว้เจอกันใหม่นะ คุณครู"

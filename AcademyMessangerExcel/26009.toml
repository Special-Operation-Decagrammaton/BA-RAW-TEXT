[translation]
26009-260090010 = "저, 선생님……"
26009-260090020 = "선생님은 메이드복, 좋아하시나요?"
26009-260090030 = "응, 좋아해!"
26009-260090040 = "갑자기 메이드복은 왜?"
26009-260090050 = "그렇군요. 역시……"
26009-260090060 = "다름이 아니라"
26009-260090070 = "이번에 새로 준비하는 게임에"
26009-260090080 = "메이드 캐릭터를 추가할까 생각하던 중이었거든요."
26009-260090090 = "다만, 메이드복은 인기도 많지만 프릴처럼 표현하기 어려운 장식도 많아서……"
26009-260090100 = "어떻게 구현하면 좋을지 고민을 하고 있었어요."
26009-260090110 = "C&C에 도움을 요청하는 건 어때?"
26009-260090120 = "C&C의 선배들은 조금"
26009-260090130 = "무서워서"
26009-260090140 = "다른 방법을 찾아 봐야겠어요……"
26009-260090150 = "선생님"
26009-260090160 = "혹시 저도 할 수 있을 만한 아르바이트가 없을까요?"
26009-260090170 = "새로운 게임 개발에 필요한 리소스가 부족해서"
26009-260090180 = "이대로 가면 개발비가 모자랄 것 같아서요……"
26009-260090190 = "어떤 아르바이트가 좋아?"
26009-260090200 = "일을 가릴 처지는 아니지만……"
26009-260090210 = "가능한 사람을 만나지 않는 아르바이트였으면 좋겠어요……"
26009-260090220 = "그렇다면 내가 자주 가는 카페를 소개해 줄게."
26009-260090230 = "손님도 많지 않고, 점원들도 다들 상냥해서 괜찮을 거야."
26009-260090240 = "카페 접객이라니"
26009-260090250 = "조금 걱정되긴 하지만……"
26009-260090260 = "이번은 선생님을 믿고 한 번 가볼게요."
26009-260090270 = "선생님, 죄송해요."
26009-260090280 = "혹시 전화하셨었나요? 아르바이트 중이라 확인하지 못했어요……"
26009-260090290 = "괜찮아. 그럴 것 같았어."
26009-260090300 = "그보다 이 시간에는 갑자기 무슨 일이 신가요?"
26009-260090310 = "내일 오전에 유즈가 일하는 가게 근처를 지나갈 일이 있어서"
26009-260090320 = "혹시 괜찮다면 방문해도 될까?"
26009-260090330 = "네?!"
26009-260090340 = "저희 메이드 카페에 선생님이 오신다고요?"
26009-260090350 = "안 될 이유는 없지만……"
26009-260090360 = "조금"
26009-260090370 = "긴장되네요……"
26009-260090380 = "최근 밤낮으로 게임 개발에 몰두하다 보니"
26009-260090390 = "작업 환경이 조금 지저분해진 것 같아서……"
26009-260090400 = "부원들이 없는 동안 오늘은 느긋하게 청소를 할까해요."
26009-260090410 = "고생이 많네."
26009-260090420 = "시간이 되면 나도 도와주러 갈게."
26009-260090430 = "……네?"
26009-260090440 = "어째서……"
26009-260090450 = "청소는 혼자 하는 게 보통 아닌가요?"
26009-260090460 = "그런가……?"
26009-260090470 = "여럿이 함께하면 더 수월할 것 같아서."
26009-260090480 = "말씀은 감사하지만 괜찮아요."
26009-260090490 = "신경 써 주셔서 감사합니다."

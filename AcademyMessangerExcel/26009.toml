[translation]
26009-260090010 = "那個，老師……"
26009-260090020 = "你喜歡女僕嗎？"
26009-260090030 = "……算是喜歡吧……"
26009-260090040 = "怎麼突然這麼問？"
26009-260090050 = "原來如此……"
26009-260090060 = "其實，那個……"
26009-260090070 = "我想在現在開發中的遊戲裡"
26009-260090080 = "加入一個女僕的角色"
26009-260090090 = "畢竟女僕具有一定的人氣"
26009-260090100 = "只是……我雖然想詳細了解女僕裝的構造，卻不認識可能會有女僕裝的人……想說老師會不會很了解之類的"
26009-260090110 = "請C&C幫忙怎麼樣？"
26009-260090120 = "那個……我，我對向其他人求助"
26009-260090130 = "還是……有點，害怕"
26009-260090140 = "我會找找有沒有其他方法的……"
26009-260090150 = "老師"
26009-260090160 = "有沒有我也能做的打工呢？"
26009-260090170 = "我想確保開發新遊戲的必要資源……"
26009-260090180 = "這樣下去的話，感覺費用似乎有點不夠……"
26009-260090190 = "我知道了。你喜歡什麼樣的打工？"
26009-260090200 = "雖然我沒什麼資格挑三揀四……"
26009-260090210 = "可以的話，希望是能少和人接觸的那種……"
26009-260090220 = "那我介紹你去我常去的咖啡廳"
26009-260090230 = "客人並不多，店員們也都很親切"
26009-260090240 = "在咖啡廳接待，是嗎"
26009-260090250 = "雖然有點不安……"
26009-260090260 = "我會相信老師，去試試看的"
26009-260090270 = "老師，剛才你有打電話給我嗎？"
26009-260090280 = "不好意思，打工的時候沒有注意到……"
26009-260090290 = "沒關係唷。我也覺得應該是那樣"
26009-260090300 = "謝謝老師。請問找我有什麼事呢？"
26009-260090310 = "明天早上我會路過柚子工作的店附近"
26009-260090320 = "不介意的話，我可以去找你嗎？"
26009-260090330 = "什麼！？明天嗎！？"
26009-260090340 = "啊，不，我沒有不能來的意思……"
26009-260090350 = "果然"
26009-260090360 = "有點"
26009-260090370 = "緊張呢……"
26009-260090380 = "最近從早到晚都在開發遊戲"
26009-260090390 = "感覺工作環境好像越來越雜亂了……"
26009-260090400 = "今天其他人都不在，我打算慢慢整理一下"
26009-260090410 = "辛苦你了"
26009-260090420 = "有空的話我會去幫忙哦"
26009-260090430 = "……咦？"
26009-260090440 = "為什麼呢？"
26009-260090450 = "我想打掃一般都是一個人做的……"
26009-260090460 = "是嗎……？"
26009-260090470 = "我覺得人多的話就能早點結束"
26009-260090480 = "很高興你能這麼想，但是沒關係的"
26009-260090490 = "謝謝老師的關心"

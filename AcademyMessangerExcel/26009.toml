[translation]
26009-260090010 = "เอ่อ คุณครูคะ..."
26009-260090020 = "คุณครูชอบชุดเมดมั้ยคะ?"
26009-260090030 = "อื้ม ชอบสิ!"
26009-260090040 = "ทำไมจู่ๆ ก็ถามเรื่องชุดเมดล่ะ?"
26009-260090050 = "อย่างนี้นี่เอง ตามคาดเลย..."
26009-260090060 = "พอดีว่า"
26009-260090070 = "เกมใหม่ที่ฉันกำลังพัฒนาอยู่น่ะค่ะ"
26009-260090080 = "ฉันกำลังคิดว่าควรจะเพิ่มตัวละครเมด\nไปดีมั้ย"
26009-260090090 = "ถึงชุดเมดจะเป็นที่นิยม แต่ของตกแต่ง\nชุดที่ทำยากๆ อย่างพวกจีบหรือครุยก็มี\nเยอะมากเลย..."
26009-260090100 = "ก็เลยกำลังกังวลว่าจะทำชุดออกมา\nแบบไหนดีน่ะค่ะ"
26009-260090110 = "ลองขอความช่วยเหลือจาก C&C มั้ย?"
26009-260090120 = "พวกรุ่นพี่ C&C เขา..."
26009-260090130 = "ค่อนข้างน่ากลัวค่ะ"
26009-260090140 = "ฉันคงต้องหาวิธีอื่นแล้วละค่ะ..."
26009-260090150 = "คุณครู"
26009-260090160 = "พอจะมีงานพาร์ทไทม์ที่ฉันพอทำได้\nบ้างมั้ยคะ?"
26009-260090170 = "พอดีชมรมฉันขาดทรัพยากรที่จำเป็น\nในการพัฒนาเกมใหม่"
26009-260090180 = "ถ้าเป็นแบบนี้ต่อไป ค่าพัฒนาเกมคงไม่\nพอน่ะค่ะ..."
26009-260090190 = "ชอบงานพาร์ทไทม์แบบไหนเหรอ?"
26009-260090200 = "ฉันก็ไม่ได้อยากเลือกงานหรอกนะคะ..."
26009-260090210 = "แต่ถ้าเป็นไปได้ ฉันอยากทำงาน\nพาร์ทไทม์ที่ไม่ต้องเจอผู้คนค่ะ..."
26009-260090220 = "ถ้างั้นครูจะแนะนำคาเฟ่ที่ครูไปบ่อยๆ ให้"
26009-260090230 = "ที่นั่นไม่ค่อยมีลูกค้า แล้วพนักงานก็\nนิสัยดีกันทุกคน ครูว่ายูสึน่าจะไหวนะ"
26009-260090240 = "งานในคาเฟ่เหรอคะ"
26009-260090250 = "น่ากลุ้มใจอยู่หน่อยนะคะ..."
26009-260090260 = "แต่ครั้งนี้ฉันจะเชื่อใจคุณครูแล้วลองทำ\nดูค่ะ"
26009-260090270 = "คุณครูคะ ขอโทษนะคะ"
26009-260090280 = "คุณครูได้โทรมาหาฉันรึเปล่าคะ? ฉันไม่\nได้รับ พอดีกำลังทำงานพาร์ทไทม์\nอยู่น่ะค่ะ..."
26009-260090290 = "ไม่เป็นไร ครูก็คิดว่าต้องติดงานอยู่แน่ๆ"
26009-260090300 = "ว่าแต่ มีเรื่องอะไรในเวลานี้เหรอคะ?"
26009-260090310 = "พอดีพรุ่งนี้เช้าครูต้องไปธุระ แล้วต้อง\nผ่านคาเฟ่ที่ยูสึทำงานอยู่น่ะ"
26009-260090320 = "ถ้าไม่ว่าอะไร ครูแวะเข้าไปหาได้มั้ย?"
26009-260090330 = "คะ?!"
26009-260090340 = "คุณครูจะมาเมดคาเฟ่ที่ฉันอยู่เหรอคะ?"
26009-260090350 = "ที่จริงก็ไม่มีเหตุผลที่คุณครูจะมาไม่ได้\n..."
26009-260090360 = "แต่ก็"
26009-260090370 = "แอบประหม่าอยู่หน่อยๆ น่ะค่ะ..."
26009-260090380 = "ช่วงนี้ฉันง่วนอยู่กับการพัฒนาเกม\nทั้งวันทั้งคืนเลย"
26009-260090390 = "สภาพแวดล้อมในการทำงานก็เลยดู\nสกปรกนิดหน่อยค่ะ..."
26009-260090400 = "ระหว่างที่สมาชิกชมรมคนอื่นไม่อยู่\nฉันว่าจะทำความสะอาดห้องชมรมดูค่ะ"
26009-260090410 = "ทำงานหนักน่าดูเลย"
26009-260090420 = "ถ้าเสร็จงานแล้วครูจะไปช่วยอีกแรงนะ"
26009-260090430 = "...คะ?"
26009-260090440 = "ทำไมล่ะ...?"
26009-260090450 = "ปกติทำความสะอาดต้องทำคนเดียว\nไม่ใช่เหรอคะ?"
26009-260090460 = "งั้นเหรอ...?"
26009-260090470 = "แต่ถ้าช่วยกันหลายคนก็น่าจะเสร็จไวนะ"
26009-260090480 = "ขอบคุณสำหรับน้ำใจนะคะ แต่ไม่เป็นไร\nหรอกค่ะ"
26009-260090490 = "ยังไงก็ขอบคุณที่เอาใจใส่นะคะ"

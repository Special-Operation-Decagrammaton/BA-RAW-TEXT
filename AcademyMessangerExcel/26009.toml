[translation]
26009-260090010 = "Uh, Sensei..."
26009-260090020 = "Do you like maid uniforms?"
26009-260090030 = "Yes, I do!"
26009-260090040 = "Why do you ask?"
26009-260090050 = "I see. I thought so..."
26009-260090060 = "It's no big deal, really..."
26009-260090070 = "I was just thinking of adding a new character to a game I'm making."
26009-260090080 = "And I thought maybe it should be a maid."
26009-260090090 = "But maid uniforms have so many little details, and so many variations... It's tricky."
26009-260090100 = "I'm not quite sure how to implement it..."
26009-260090110 = "How about asking C&C?"
26009-260090120 = "Um, it's just that the C&C members are..."
26009-260090130 = "They're a bit scary."
26009-260090140 = "I would really rather find something else..."
26009-260090150 = "Sensei."
26009-260090160 = "What kind of part-time job do you think I would be good at?"
26009-260090170 = "I'm working on this new game, but I'm running out of resources."
26009-260090180 = "At this rate, the development budget's not going to be enough..."
26009-260090190 = "What types of jobs appeal to you?"
26009-260090200 = "Um... I'm really not sure I'm in a position to be picky..."
26009-260090210 = "But I'd really rather not have to meet too many people."
26009-260090220 = "In that case, I have a perfect cafe in mind."
26009-260090230 = "It's never busy when I visit, and the employees are all kind, so I think you'll feel comfortable there."
26009-260090240 = "You think I should be...a cafe employee?"
26009-260090250 = "Um, that sounds a bit scary..."
26009-260090260 = "But since you think it'll be okay, Sensei, I'll give it a try."
26009-260090270 = "Sorry, Sensei."
26009-260090280 = "Did I miss a call from you? I was busy at work..."
26009-260090290 = "No problem. I figured it was something like that."
26009-260090300 = "Anyway, why are you calling at this hour? Is everything okay?"
26009-260090310 = "Yes, everything's fine. I just realized I'll be near your cafe tomorrow morning."
26009-260090320 = "Is it okay if I stop by for a visit?"
26009-260090330 = "What?!"
26009-260090340 = "You want to visit the maid cafe?"
26009-260090350 = "I mean, um, of course it's okay, I'm just..."
26009-260090360 = "Um, I'm..."
26009-260090370 = "I'm just a bit nervous."
26009-260090380 = "I've been too focused on the game I'm working on lately."
26009-260090390 = "And I'm afraid my workspace has gotten a bit messy..."
26009-260090400 = "I need to spend the day cleaning while the other club members are out."
26009-260090410 = "You're working hard."
26009-260090420 = "I'll drop by to help, if I have time."
26009-260090430 = "...Huh?"
26009-260090440 = "Why?"
26009-260090450 = "I always clean up alone."
26009-260090460 = "Do you?"
26009-260090470 = "I just thought it'd be easier with an extra set of hands."
26009-260090480 = "Oh! Thanks, but I'm all right."
26009-260090490 = "Thank you for the offer, though."

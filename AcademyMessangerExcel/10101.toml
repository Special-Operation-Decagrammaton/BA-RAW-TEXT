[translation]
10101-101010010 = "ครู"
10101-101010020 = "สนุกกับงานเทศกาลอยู่หรือเปล่า?"
10101-101010030 = "อ๊ะ ซาโอริ"
10101-101010040 = "อื้อ ครูกำลังสนุกเลย"
10101-101010050 = "ค่อยยังชั่วหน่อย"
10101-101010060 = "ฉันเพิ่งเริ่มทำงานในร้านอาหารแถวๆ\nชายหาดน่ะ"
10101-101010070 = "ถ้าครูหิวก็แวะมาได้"
10101-101010080 = "ครู ขอบคุณสำหรับเรื่องคราวก่อนนะ"
10101-101010090 = "วันนี้ฉันต้องทำงานอื่น ก็เลยจะไปเดิน\nรอบๆ สถานที่จัดงานน่ะ"
10101-101010100 = "แต่ทำคนเดียวคงไม่ไหว ก็เลยอยากขอ\nให้ช่วยหน่อย..."
10101-101010110 = "ได้สิ ครูยินดีอยู่แล้ว"
10101-101010120 = "ขอบคุณ งั้นฉันจะรออยู่หน้าทางเข้า\nงานเทศกาล"
10101-101010130 = "ครู วันนี้ฉันลองแซมพลิงเสียงที่บันทึก\nมาแล้ว"
10101-101010140 = "น่าจะได้เพลงดีๆ มาอยู่น่ะ"
10101-101010150 = "ดีเลยนะ!"
10101-101010160 = "ไหนดูซิ"
10101-101010170 = "(ส่งไฟล์ไม่สำเร็จ)"
10101-101010180 = "อ่า"
10101-101010190 = "อะไรกัน"
10101-101010200 = "ไฟล์ใหญ่เกินไปหรือเปล่านะ..."
10101-101010210 = "เอาไว้ให้ครูฟังตอนแสดงดนตรีจริงเลย\nแล้วกัน"
10101-101010220 = "อืม ถ้าอย่างนั้นก็ขอบคุณนะ..."
10101-101010230 = "ครู"
10101-101010240 = "เย็นวันนี้จะมีการแสดงดนตรีจากดีเจ"
10101-101010250 = "ถ้าไม่ติดอะไรก็แวะมาดูได้นะ"
10101-101010260 = "อื้อ ครูจะไปให้ได้เลย"
10101-101010270 = "ขอบคุณ แล้วไว้มาที่เวทีหลักของงาน\nหลังพระอาทิตย์ตกนะ"
10101-101010280 = "ฉันจะรออยู่ตรงนั้น"

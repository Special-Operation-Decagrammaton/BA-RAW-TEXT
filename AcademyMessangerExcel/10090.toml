[translation]
10090-100900010 = "선생님! 축제에요!"
10090-100900020 = "어…… 갑자기?"
10090-100900030 = "아, 참. 선생님은 모르시겠네요."
10090-100900040 = "오늘 백귀야행에 올 일이 있다고 하셨죠?"
10090-100900050 = "마침 백귀야행에서 저녁부터 축제가 열릴 예정인데……."
10090-100900060 = "선생님만 괜찮으시다면, 꼭 와주셨으면 해요!"
10090-100900070 = "그건 좋은데, 난 축제에 대해서는 잘 몰라……."
10090-100900080 = "괜찮아요!"
10090-100900090 = "제가 모두 안내해 드릴게요. 저만 믿으세요!"
10090-100900100 = "그러면 저녁에 뵙는 것으로 알고 있어도 되겠죠?"
10090-100900110 = "기다릴게요!"
10090-100900120 = "안녕하세요. 선생님."
10090-100900130 = "혹시, 오늘의 일정을 여쭤보아도 될까요……?"
10090-100900140 = "큰 일정은 없었지만."
10090-100900150 = "왠지, 갑자기 백야당에 가 보고 싶어졌어."
10090-100900160 = "정말이세요?!"
10090-100900170 = "그러면…… 마침 저도 백야당에서 일해야 하니까."
10090-100900180 = "언제 오시는지만 알려 주시면……."
10090-100900190 = "오후쯤에 만날까?"
10090-100900200 = "네?"
10090-100900210 = "네, 네!"
10090-100900220 = "교대를 해서라도, 그 시간에 맞추도록 할게요!"
10090-100900230 = "선생님."
10090-100900240 = "그, 저기. 선생님께서 괜찮으시다면, 이지만……."
10090-100900250 = "백야당에 들르면 돼?"
10090-100900260 = "에헤헤."
10090-100900270 = "맞아요."
10090-100900280 = "기다리고 있겠습니다!"
10090-100900290 = "예전에는 실례가 많았습니다……."
10090-100900300 = "우미카는 이제 좀 괜찮아?"
10090-100900310 = "네. 선생님 덕분에……."
10090-100900320 = "저, 선생님."
10090-100900330 = "그 일과도 약간은, 관련이 있는 일이긴 한데요……."
10090-100900340 = "오늘도, 괜찮으시다면."
10090-100900350 = "백야당에 와 주셨으면, 하는데요……?"
10090-100900360 = "드디어 오늘은 괜찮은 거구나!"
10090-100900370 = "마, 맞아요. 오늘은……!"
10090-100900380 = "이 아니라."
10090-100900390 = "오늘 와 주시지 않으면, 저기, 약간이지만."
10090-100900400 = "제가 조금 곤란하다고 할까, 그래서요……."
10090-100900410 = "응. 백야당에서 만나자."
10090-100900420 = "선생님?"
10090-100900430 = "계신, 가요?"
10090-100900440 = "잘 있어~"
10090-100900450 = "지금 어디니~"
10090-100900460 = "죄송해요!"
10090-100900470 = "저 조금 늦을 것 같아요……"
10090-100900480 = "괜찮으니까 천천히 와~"
10090-100900490 = "금방 가겠습니다!"
10090-100900500 = "고생 많으셨어요. 선생님."
10090-100900510 = "우미카도 오늘 수고 많았어."
10090-100900520 = "그리고 인형 고마워."
10090-100900530 = "……!"
10090-100900540 = "네!"
10090-100900550 = "감사합니다!!!"

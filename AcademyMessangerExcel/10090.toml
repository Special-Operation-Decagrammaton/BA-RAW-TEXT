[translation]
10090-100900010 = "老師！有慶典唷！"
10090-100900020 = "哦……這麼突然？"
10090-100900030 = "啊，對了，老師可能還不知道"
10090-100900040 = "老師說過今天有事要來百鬼夜行對吧？"
10090-100900050 = "正好今天傍晚會舉辦慶典……"
10090-100900060 = "如果方便的話，希望老師可以過來！"
10090-100900070 = "可以是可以，但是我不太了解慶典……"
10090-100900080 = "沒關係！"
10090-100900090 = "我會為你說明一切，請相信我吧！"
10090-100900100 = "那我就當老師傍晚會過來囉？"
10090-100900110 = "我會等著你的！"
10090-100900120 = "你好，老師"
10090-100900130 = "可以請教你今天的行程嗎？"
10090-100900140 = "雖然沒有什麼大事"
10090-100900150 = "但不知為何，我突然想去一趟百夜堂"
10090-100900160 = "真的嗎！？"
10090-100900170 = "那麼……剛好我也要去百夜堂工作"
10090-100900180 = "如果老師願意告訴我什麼時候會過來的話……"
10090-100900190 = "要不要在下午見面？"
10090-100900200 = "咦？"
10090-100900210 = "啊，好！"
10090-100900220 = "就算已經交接，我也會配合那個時間的！"
10090-100900230 = "老師"
10090-100900240 = "那，那個，如果老師方便的話，就是……"
10090-100900250 = "到百夜堂就行了嗎？"
10090-100900260 = "耶嘿嘿"
10090-100900270 = "沒錯"
10090-100900280 = "我會等你的！"
10090-100900290 = "先前真是太失禮了……"
10090-100900300 = "海花已經沒事了嗎？"
10090-100900310 = "是，託老師的福……"
10090-100900320 = "那個，老師"
10090-100900330 = "那件事或多或少也跟這有點關係……"
10090-100900340 = "今天如果可以的話"
10090-100900350 = "希望你能來百夜堂一趟……？"
10090-100900360 = "今天終於可以了啊！"
10090-100900370 = "沒，沒錯，今天……！"
10090-100900380 = "不對"
10090-100900390 = "如果老師今天不來的話，那個，雖然只有一點"
10090-100900400 = "但我可能會有一點為難，所以……"
10090-100900410 = "嗯，在百夜堂見吧"
10090-100900420 = "老師？"
10090-100900430 = "你已經到了嗎？"
10090-100900440 = "再見～"
10090-100900450 = "你現在在哪裡～"
10090-100900460 = "對不起！"
10090-100900470 = "我可能會稍微遲到……"
10090-100900480 = "沒關係，慢慢來～"
10090-100900490 = "我馬上就到！"
10090-100900500 = "辛苦了，老師"
10090-100900510 = "海花今天也辛苦了"
10090-100900520 = "還有，謝謝你的人偶"
10090-100900530 = "……！"
10090-100900540 = "是！"
10090-100900550 = "謝謝老師！！！"

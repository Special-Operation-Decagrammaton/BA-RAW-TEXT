[translation]
10090-100900010 = "คุณครู! มีงานเทศกาลค่ะ!"
10090-100900020 = "หืม... ตอนนี้เลยเหรอ?"
10090-100900030 = "อ้อ จริงสิ คุณครูยังไม่รู้สินะคะ"
10090-100900040 = "คุณครูบอกไว้ว่าวันนี้มีธุระมาที่\nเฮียกคิยาโคใช่มั้ยคะ?"
10090-100900050 = "ตั้งแต่เย็นวันนี้จะมีงานเทศกาลที่\nเฮียกคิยาโคพอดีเลยค่ะ..."
10090-100900060 = "ถ้าคุณครูไม่ติดอะไรก็มาเที่ยวงาน\nให้ได้นะคะ!"
10090-100900070 = "ครูก็อยากไปอยู่หรอกนะ แต่ครูไม่รู้\nเกี่ยวกับงานเทศกาลเท่าไร..."
10090-100900080 = "ไม่เป็นไรเลยค่ะ!"
10090-100900090 = "ฉันจะพาทัวร์และแนะนำให้เองค่ะ\nไว้ใจฉันได้เลยค่ะ!"
10090-100900100 = "งั้นเอาเป็นว่าเราเจอกันตอนเย็นนะคะ"
10090-100900110 = "แล้วฉันจะรอค่ะ"
10090-100900120 = "สวัสดีค่ะ คุณครู"
10090-100900130 = "ฉันขอถามตารางงานวันนี้ของคุณครู\nได้มั้ยคะ...?"
10090-100900140 = "ไม่มีงานอะไรมากหรอก"
10090-100900150 = "แต่จู่ๆ ก็อยากไปร้านเฮียกคิยาโค\nขึ้นมาแฮะ"
10090-100900160 = "จริงเหรอคะ?!"
10090-100900170 = "ฉันต้องทำงานที่ร้านเฮียกคิยาโคพอดี\nถ้างั้น..."
10090-100900180 = "ช่วยบอกหน่อยได้มั้ยคะว่าคุณครู\nจะมาตอนไหน..."
10090-100900190 = "เจอกันช่วงบ่ายมั้ย?"
10090-100900200 = "คะ?"
10090-100900210 = "ค่ะ ค่ะ!"
10090-100900220 = "ต่อให้ต้องแลกเวร แต่ฉันก็จะอยู่ร้าน\nตอนนั้นให้ได้ค่ะ!"
10090-100900230 = "คุณครู"
10090-100900240 = "เอ่อ... คือว่า... ถ้าคุณครูสะดวก..."
10090-100900250 = "ให้ครูไปที่ร้านเฮียกคิยาโคใช่มั้ย?"
10090-100900260 = "แหะๆๆ"
10090-100900270 = "ใช่ค่ะ"
10090-100900280 = "แล้วฉันจะรอนะคะ"
10090-100900290 = "ที่ผ่านมาฉันเสียมารยาทกับคุณครู\nไปเยอะเลยค่ะ..."
10090-100900300 = "ตอนนี้อุมิกะโอเคขึ้นแล้วมั้ย?"
10090-100900310 = "ค่ะ เพราะคุณครูแท้ๆ เลยค่ะ..."
10090-100900320 = "คือว่า... คุณครูคะ"
10090-100900330 = "เรื่องนี้มันเกี่ยวข้องกับเรื่องนั้นนิดหน่อย\nน่ะค่ะ..."
10090-100900340 = "วันนี้ถ้าคุณครูไม่ติดอะไร"
10090-100900350 = "ฉันอยากให้คุณครูมาที่ร้านเฮียกคิยาโค\nหน่อยค่ะ..."
10090-100900360 = "วันนี้ครูไปได้แล้วสินะ!"
10090-100900370 = "ชะ... ใช่ค่ะ! วันนี้...!"
10090-100900380 = "ไม่สิ"
10090-100900390 = "ถ้าวันนี้คุณครูไม่มา ฉันก็คง"
10090-100900400 = "ลำบากใจอยู่นิดหน่อยน่ะค่ะ เพราะงั้น..."
10090-100900410 = "อื้ม แล้วเจอกันที่ร้านเฮียกคิยาโคนะ"
10090-100900420 = "คุณครู?"
10090-100900430 = "ว่างตอบรึเปล่าคะ?"
10090-100900440 = "ยังพอตอบได้~"
10090-100900450 = "ตอนนี้อยู่ไหนเหรอ~"
10090-100900460 = "ขอโทษค่ะ!"
10090-100900470 = "ดูเหมือนฉันน่าจะไปช้าสักหน่อย..."
10090-100900480 = "ไม่เป็นไร ค่อยๆ มาก็ได้~"
10090-100900490 = "ฉันจะรีบไปนะคะ!"
10090-100900500 = "ขอบคุณที่ทำงานหนักนะคะ คุณครู"
10090-100900510 = "วันนี้อุมิกะเองก็ทำได้ดีมากเลยนะ"
10090-100900520 = "แล้วก็... ขอบคุณสำหรับตุ๊กตานะ"
10090-100900530 = "...!"
10090-100900540 = "ค่ะ!"
10090-100900550 = "ขอบคุณมากค่ะ!!!"

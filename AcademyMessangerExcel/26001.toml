[translation]
26001-1558 = "老師，老師"
26001-1559 = "老師有什麼一直都很重視的東西嗎？"
26001-1560 = "一時之間想不太到……"
26001-1561 = "有沒有特別喜歡、收藏的東西呢？"
26001-1562 = "或者是很中意、總是帶在身邊的東西呢？"
26001-1563 = "還是說有從不離身，只要一放手就渾身不安的東西呢？"
26001-1564 = "我好像沒有執著到這種程度的東西……"
26001-1565 = "是嗎……這下麻煩了"
26001-1566 = "什麼麻煩？"
26001-1567 = "不，沒什麼"
26001-1568 = "老師，你有聽過「瑪莉的電話」這個鬼故事嗎？"
26001-1569 = "好像沒聽過"
26001-1570 = "有個少女某天接到了一通電話，是她以前丟掉的，一個名叫瑪莉的人偶打來的"
26001-1571 = "可怕的是，每次電話打過來的時候，瑪莉就會慢慢的靠近……"
26001-1572 = "原來是這樣啊……話說為什麼突然要講鬼故事？"
26001-1573 = "沒什麼特別的意思，心血來潮而已"
26001-1574 = "……如果反追蹤那個電話號碼的話，應該就能知道瑪莉在哪裡了"
26001-1575 = "瑪莉，能不能打電話給我呢"
26001-1576 = "好可怕……"
26001-1577 = "老師，難道說你最近有接到奇怪的電話嗎？"
26001-1578 = "像是可怕的人打來的電話，或是內容很奇怪的電話之類的……"
26001-1579 = "好像沒什麼特別的電話，怎麼了嗎？"
26001-1580 = "其實……"
26001-1581 = "不，我之後直接跟你說"
26001-260010010 = "……啊"
26001-260010020 = "怎麼了？"
26001-260010030 = "耳機還插在電腦上就站起身來，差點就摔倒了"
26001-260010040 = "聽得太入迷的時候常常會這樣呢"
26001-260010050 = "是的。聽覺這種東西，對於反覆的刺激是很容易習慣的"
26001-260010060 = "小玉平常都聽什麼音樂？"
26001-260010070 = "我常聽的音樂嗎……"
26001-260010080 = "那個，是……"
26001-260010090 = "……"
26001-260010100 = "祕密"
26001-260010110 = "為什麼！？"

[translation]
26001-1558 = "선생님, 선생님."
26001-1559 = "선생님은 특별히 좋아하는 물건이 있으십니까?"
26001-1560 = "갑자기 그렇게 물어봐도 잘 모르겠는데……."
26001-1561 = "특별히 좋아해서 수집하는 물건은 없으신가요?"
26001-1562 = "특별히 좋아해서 하루 종일 들고 다니는 물건은 없으신가요?"
26001-1563 = "특별히 좋아해서 몸에서 조금이라도 떨어지면 불안을 느끼는 물건은 없으신가요?"
26001-1564 = "……그런 특별한 취향은 내게 없어."
26001-1565 = "그런가요……. 조금 어렵게 되었군요."
26001-1566 = "뭐가 어렵다는 말이야?"
26001-1567 = "아무것도 아닙니다."
26001-1568 = "선생님, <메리 씨의 전화>라는 괴담을 알고 있으신가요?"
26001-1569 = "잘 모르겠는데."
26001-1570 = "<메리 씨의 전화>는 어느 소녀가 메리라는 이름의 인형을 버리자, 그 인형이 소녀에게 직접 전화를 걸어온다는 내용의 괴담입니다."
26001-1571 = "이 괴담의 무서운 포인트는 전화를 걸 때마다 메리의 위치가 점점 소녀에게 가까워지다가 마지막에는 등 뒤에서 인형이 나타난다는 점이지요."
26001-1572 = "그런데 갑자기 괴담은 왜?"
26001-1573 = "그냥, 갑자기 궁금해져서 그렇습니다."
26001-1574 = "이 전화를 역추적한다면 메리 씨는 어디서 전화를 걸고 있는 것으로 표시될까요?"
26001-1575 = "언젠가 메리 씨가 제 핸드폰에도 전화를 걸어왔으면 좋겠습니다."
26001-1576 = "무, 무서워……!"
26001-1577 = "선생님, 혹시 최근에 이상한 내용의 전화를 받으신 적은 없으십니까?"
26001-1578 = "뭔가 위험해 보이는 사람이 위험한 말을 한다든가……."
26001-1579 = "특별히 기억에 남는 전화는 없는데. 왜?"
26001-1580 = "그게 사실은……."
26001-1581 = "아니, 나중에 말씀드리겠습니다."
26001-260010010 = "……아."
26001-260010020 = "무슨 일이야?"
26001-260010030 = "그게…… 컴퓨터와 연결된 이어폰을 착용하고 있다는 사실을 잊은 채 자리에서 일어나는 바람에 의자 위로 넘어질 뻔했습니다."
26001-260010040 = "음악에 몰두하다 보면 흔히 있는 일이지."
26001-260010050 = "네, 의외로 사람의 청각은 반복되는 자극에 쉽게 무디어지는 법이니까요."
26001-260010060 = "코타마는 평소에는 주로 어떤 음악을 들어?"
26001-260010070 = "제가 듣는 음악, 말입니까?"
26001-260010080 = "어, 그게……."
26001-260010090 = "……."
26001-260010100 = "비밀입니다."
26001-260010110 = "어째서?!"

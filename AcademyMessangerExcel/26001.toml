[translation]
26001-1558 = "Sensei! Sensei!"
26001-1559 = "Is there something that you particularly like?"
26001-1560 = "That's a very broad question..."
26001-1561 = "Like something you collect?"
26001-1562 = "Or something you carry around all day long?"
26001-1563 = "Like if you leave it behind, you feel anxious all day?"
26001-1564 = "Not really..."
26001-1565 = "Really? Then that might make things difficult..."
26001-1566 = "What will be difficult?"
26001-1567 = "Never mind."
26001-1568 = "Have you heard of a ghost story called Mary's Calling, Sensei?"
26001-1569 = "Never heard of it."
26001-1570 = "Mary's Calling is a scary story about a little girl with a doll named Mary. When the girl throws the doll away, the doll starts calling for her."
26001-1571 = "The scary part is that each time Mary calls the little girl, she gets closer and closer to her. At the end, the doll appears right behind the little girl."
26001-1572 = "And why are you telling me this?"
26001-1573 = "I don't know. I was just curious if you'd heard of it."
26001-1574 = "If you could trace back her calls, I wonder if you would see where Mary is calling from?"
26001-1575 = "I wish Mary would call me sometime."
26001-1576 = "How spooky!"
26001-1577 = "Have you received any strange calls lately?"
26001-1578 = "Like, has a suspicious person said anything scary to you?"
26001-1579 = "Not that I can recall. Why?"
26001-1580 = "The truth is..."
26001-1581 = "Never mind. I'll tell you next time."
26001-260010010 = "...So."
26001-260010020 = "What's up?"
26001-260010030 = "Well... I almost fell trying to get out of my chair. But only because the earphones I was wearing were connected to my computer."
26001-260010040 = "That's the danger of listening to music that's too good I suppose."
26001-260010050 = "Yes, human hearing is surprisingly vulnerable to repetitive stimulus."
26001-260010060 = "What sort of music do you listen to anyways?"
26001-260010070 = "The music I listen to?"
26001-260010080 = "Well, that is..."
26001-260010090 = "..."
26001-260010100 = "It's a secret."
26001-260010110 = "Why?!"

[translation]
26001-1558 = "คุณครูคะ คุณครู!"
26001-1559 = "คุณครูมีของที่ชอบเป็นพิเศษรึเปล่าคะ?"
26001-1560 = "จู่ๆ มาถามแบบนี้ก็คิดไม่ออกหรอก..."
26001-1561 = "ไม่มีของที่ชอบมากๆ จนชอบเก็บสะสม\nเลยเหรอคะ?"
26001-1562 = "ของที่ชอบมากๆ จนอยากจะถือไปมา\nตลอดทั้งวันก็ไม่มีเหรอคะ?"
26001-1563 = "ของที่ชอบมากๆ จนถ้าไปวางไว้ห่างตัว\nก็จะรู้สึกไม่สบายใจน่ะค่ะ?"
26001-1564 = "ครู... ไม่มีอะไรที่ชอบเป็นพิเศษ\nแบบนั้นหรอก"
26001-1565 = "อย่างงั้นเหรอคะ... ยุ่งยากแล้วล่ะสิ"
26001-1566 = "อะไรยุ่งยากเหรอ?"
26001-1567 = "ไม่มีอะไรหรอกค่ะ"
26001-1568 = "คุณครูรู้จักเรื่องเล่า \"โทรศัพท์ของแมรี่\"\nรึเปล่าคะ?"
26001-1569 = "อืม ไม่รู้จักแฮะ"
26001-1570 = "โทรศัพท์ของแมรี่ เป็นเรื่องราวสยอง\nขวัญเกี่ยวกับเด็กสาวคนหนึ่งที่ทิ้งตุ๊กตา\nที่ชื่อว่าแมรี่ไป และแมรี่ก็โทรศัพท์กลับ\nไปหาเด็กสาวคนนั้นค่ะ"
26001-1571 = "ความน่ากลัวของเรื่องนี้ก็คือ ทุกครั้งที่\nโทรศัพท์ ตำแหน่งของแมรี่ก็จะขยับเข้า\nไปใกล้บ้านของเด็กสาวทุกครั้ง และ\nสุดท้ายตุ๊กตาแมรี่ก็ไปโผล่ที่ด้านหลัง\nของเด็กสาวค่ะ"
26001-1572 = "ทำไมจู่ๆ ถึงเล่าเรื่องสยองขวัญขึ้นมาล่ะ?"
26001-1573 = "แค่จู่ๆ ก็สงสัยขึ้นมาน่ะค่ะ"
26001-1574 = "ถ้าเกิดว่าเราแกะรอยโทรศัพท์นี้ไป มันจะ\nแสดงพิกัดรึเปล่าว่าแมรี่โทรมาจากที่ไหน?"
26001-1575 = "บางครั้งฉันก็รู้สึกอยากให้แมรี่โทรมาหา\nฉันบ้างเหมือนกันค่ะ"
26001-1576 = "นะ...น่ากลัวสุดๆ...!"
26001-1577 = "คุณครูคะ... คุณครูเคยได้รับโทรศัพท์\nแปลกๆ บ้างรึเปล่าคะ?"
26001-1578 = "อย่างเช่นมีคนน่ากลัวโทรมาพูดจา\nข่มขู่..."
26001-1579 = "ครูจำไม่ได้นะว่าเคยมีคนโทรมา\nทำไมเหรอ?"
26001-1580 = "ที่จริงแล้ว..."
26001-1581 = "ไม่มีอะไรหรอกค่ะ ไว้ฉันจะเล่าให้ฟังนะคะ"
26001-260010010 = "อ่า..."
26001-260010020 = "มีเรื่องอะไรเหรอ?"
26001-260010030 = "คือว่า... ฉันลืมว่าใส่หูฟังที่ต่อสายกับ\nคอมพิวเตอร์อยู่ ตอนลุกขึ้นเลยเกือบล้ม\nลงไปเลยค่ะ"
26001-260010040 = "ฟังเพลงเพลินก็มักจะเป็นแบบนี้แหละ"
26001-260010050 = "ค่ะ น่าแปลกที่ประสาทการได้ยินของ\nคนเราจะทื่อลงเวลาได้ยินอะไรซ้ำๆ นะคะ"
26001-260010060 = "ปกติโคทามะฟังเพลงแบบไหนเหรอ?"
26001-260010070 = "เพลงที่ฉันฟังเหรอคะ?"
26001-260010080 = "เอ่อ คือว่า..."
26001-260010090 = "..."
26001-260010100 = "ความลับค่ะ"
26001-260010110 = "ทำไมเป็นงั้นล่ะ?!"

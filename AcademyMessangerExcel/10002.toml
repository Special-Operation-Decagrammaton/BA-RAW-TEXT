[translation]
10002-416 = "การค้นคว้าเกี่ยวกับการชิมอาหารยังคงดำ\nเนินต่อไป แต่ว่า..."
10002-417 = "ฉันเจอปัญหาเข้าแล้วละค่ะ"
10002-418 = "ต้องมาคิดกันแล้วละค่ะว่าจะผ่านอุปสรรค\nนี้ไปยังไง"
10002-419 = "ครูไม่รู้ว่าอุปสรรคคืออะไร แต่ก็...\nพยายามเข้านะ!"
10002-420 = "อ้ออ"
10002-421 = "แน่นอนว่าฉันต้องการความช่วยเหลือจาก\nคุณครูด้วยค่ะ"
10002-422 = "ฮุฮุฮุ"
10002-423 = "มาคิดดูแล้ว ฉันว่าเอาไวน์มาต้มก็น่าจะ\nได้ผลที่คล้ายกันอยู่นะ"
10002-424 = "ไวน์กับน้ำองุ่น.. ไว้ต้องลองทำดูแล้วค่ะ"
10002-425 = "ต้มดีๆ ด้วยล่ะ..."
10002-426 = "ความปลอดภัยต้องมาก่อนนะ ระวังด้วย"
10002-427 = "ฮุฮุ เป็นห่วงเหรอคะ?"
10002-428 = "ดีใจจัง"
10002-429 = "ฉันมาลองคิดๆ ดูนะ"
10002-430 = "ธรรมเนียมการชงและดื่มชา "
10002-431 = "เป็นเรื่องยิ่งใหญ่ที่สุดของการทานอาหาร\nเลยละค่ะ"
10002-432 = "ฉันคิดแบบนั้นน่ะ"
10002-433 = "หืม? การชงชาเหรอ?"
10002-434 = "เรื่องนี้ครูไม่ถนัดแฮะ"
10002-435 = "ฮุฮุฮุ"
10002-436 = "เอาล่ะ ถึงเวลาออกค้นคว้า"
10002-437 = "ส่วนสถานที่ก็กำหนดเอาไว้แล้ว "
10002-438 = "ไปค้นคว้าการชิมอาหารกับฉันนะคะ"
10002-439 = "ได้เลย แล้วเดี๋ยวเจอกัน"
10002-440 = "การชงชาเหรอ... ต้องยากแน่ๆ เลย"
10002-441 = "แล้วฉันจะรอนะคะ"
10002-442 = "คุณครู"
10002-443 = "นี่มันอะไรกันน่ะ..."
10002-444 = "ฉันลองชิมชาที่ใช้วัตถุดิบเดิมดูอีกครั้ง "
10002-445 = "แต่มันไม่ได้อร่อยเหมือนที่เคยกิน"
10002-446 = "ทำไมเป็นอย่างนี้ล่ะคะ?"
10002-447 = "เพราะสถานที่เปลี่ยนไปเหรอ...?"
10002-448 = "ไม่น่าใช่นะคะ... เพราะห้องนี้ทั้งกว้าง\nและโล่งสบายเหมือนร้านน้ำชา"
10002-449 = "สาเหตุคืออะไรกันนะ..."
10002-450 = "ทั้งวัตถุดิบและอุณหภูมิ แถมวิธีชงก็\nเหมือนกันนี่นา.."
10002-451 = "อืมม"
10002-452 = "ต้องลองเอาไปคิดดูแล้วละค่ะ"
10002-453 = "ครั้งนี้ฉันจะไปร้านอาหารหรูที่ตั้งใจว่าจะ\nไปมาหลายวันแล้ว"
10002-454 = "ถึงจะไปคนเดียวก็เถอะ แต่บางครั้งเวลา\nวิจารณ์อาหาร ฉันว่าอยู่คนเดียวน่าจะดี\nกว่านะคะ"
10002-455 = "ว่าไงนะ? จะไปคนเดียวเหรอ?"
10002-456 = "ไปร้านอาหารคนเดียว... นี่มันสกิลคนโสด"
10002-457 = "ฮุฮุฮุ เสร็จแล้วจะกลับมารายงานนะคะ"
10002-458 = "ช่วงนี้ฉันหยุดพักการชิมอาการคนเดียว\nอยู่น่ะ"
10002-459 = "เพราะรู้สึกอะไรได้หลายอย่างเลย..."
10002-460 = "ครูเป็นกำลังใจให้นะฮารุนะ"
10002-461 = "ให้ครูช่วยอะไรไหม?"
10002-462 = "ฮุฮุฮุ"
10002-463 = "คุณครูเนี่ยอ่อนโยนจังเลย"
10002-464 = "แค่คำพูดก็ช่วยปลอบฉันได้แล้วละค่ะ"
10002-465 = "ขอบคุณนะคะ"
10002-466 = "ขนมไทยากิที่เรากินด้วยกันเป็นของที่\nอร่อยที่สุดที่เคยกินมาเลยค่ะ"
10002-467 = "สาเหตุคืออะไรกันนะ?"
10002-468 = "อืมม ไม่รู้สิ... มันก็ขนมไทยากิทั่วไปนี่"
10002-469 = "เพราะอะไรเหรอ.. ไม่รู้เลย"
10002-470 = "ฮุฮุ"
10002-471 = "ฉันว่าฉันพอจะรู้ค่ะ"
10002-472 = "หืม? จริงเหรอ? "
10002-473 = "แต่ฉันไม่บอกคุณครูหรอกค่ะ"
10002-474 = "ฉันจะเก็บไว้เป็นความลับคนเดียว"
10002-475 = "ฮุฮุ คุณครูคะ ไว้คราวหน้ามากินของ\nอร่อยๆ ด้วยกันอีกนะคะ"

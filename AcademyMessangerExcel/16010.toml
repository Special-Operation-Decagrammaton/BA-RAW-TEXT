[translation]
16010-160100010 = "ปกติคุณครูใช้เวลาว่างในวันหยุด\nทำอะไรเหรอ?"
16010-160100020 = "ครูไม่ได้ทำอะไรเลย..."
16010-160100030 = "ก็ทำงานที่ค้างอยู่"
16010-160100040 = "การพักผ่อนก็เป็นงานสำคัญอย่างหนึ่งนะ"
16010-160100050 = "ดูเหมือนคุณครูเองก็สนุกกับวันหยุด\nเหมือนกัน ดีแล้วละ"
16010-160100060 = "ฝืนเกินไปรึเปล่า...?"
16010-160100070 = "ทำงานโดยไม่หยุดพักผ่อนแบบนี้\nจะแย่กว่าเดิมนะ"
16010-160100080 = "แล้ววันหยุดฮิบิกิทำอะไรเหรอ?"
16010-160100090 = "ฉันเหรอ...?"
16010-160100100 = "สิ่งที่ฉันทำในวันหยุด..."
16010-160100110 = "ก็คงเป็นการสร้างอะไรสักอย่างละมั้ง"
16010-160100120 = "คุณครู ฉันได้ข่าวแล้วละ"
16010-160100130 = "เรื่องที่จู่ๆ ที่ชาเล่ต์ก็ไฟดับ"
16010-160100140 = "ข้อมูลที่นั่งทำมาทั้งวันเลยหายไป\nหมดแล้วเลย"
16010-160100150 = "ไม่มีวิธีกู้ข้อมูลคืนมาเลยเหรอ...?"
16010-160100160 = "พวกเด็กๆ จากเวอริทัสบอกว่ากู้ข้อมูล\nคืนมาได้ยากน่ะ"
16010-160100170 = "ถ้างั้นก็คงไม่มีอะไรที่ฉันทำได้แล้วละ..."
16010-160100180 = "แต่ว่าไม่มีอะไรที่ฉันช่วยคุณครู\nได้เลยเหรอ..."
16010-160100190 = "ตอนนี้อยากได้กำลังใจน่ะ"
16010-160100200 = "กำลังใจ..."
16010-160100210 = "เข้าใจแล้ว"
16010-160100220 = "สู้ๆ นะคุณครู"
16010-160100230 = "หลังจากเรื่องคราวก่อน ฉันก็คิด\nหลายๆ อย่างเลย"
16010-160100240 = "ว่า 'ไม่มีอุปกรณ์เชียร์ให้คนทำงาน\nในสำนักงานรู้สึกฮึกเหิมขึ้นบ้างเลยรึไง' น่ะ"
16010-160100250 = "และหลังจากคิดอยู่นาน ฉันก็ทำ\nอุปกรณ์ตัวอย่างสำเร็จแล้ว"
16010-160100260 = "อุปกรณ์เชียร์ขั้นสูงสุดสำหรับคนทำ\nงานในสำนักงาน"
16010-160100270 = "เข้าเวรคราวหน้า ขอเอาไปทดลอง\nหน่อยก็แล้วกัน"
16010-160100280 = "ทำอุปกรณ์อะไรขึ้นมาเหรอ?"
16010-160100290 = "ฉันคิดว่าอุปกรณ์เชียร์ที่ทำขึ้นมา\nคราวก่อนมันโอเคแล้วแท้ๆ..."
16010-160100300 = "แต่คุณครูดูเหมือนจะไม่ชอบเท่าไร\nช่วยไม่ได้นะ..."
16010-160100310 = "ถ้าเป็นไมสเตอร์ที่ยอดเยี่ยมละก็\nจะต้องคอยรับฟังความคิดเห็นของ\nลูกค้าด้วย "
16010-160100320 = "และหลังจากคิดมาหลายตลบ\nอุปกรณ์เชียร์ชิ้นใหม่ก็เสร็จแล้วละ"
16010-160100330 = "ถ้าคราวหน้าไปชาเล่ต์ เดี๋ยวจะเอา\nไปให้ดูนะ"
16010-160100340 = "ไม่ได้ติดตั้งฟังก์ชันระเบิดตัวเอง\nไว้ใช่มั้ย?"
16010-160100350 = "..."
16010-160100360 = "เดี๋ยวเอาไปให้ดูเองกับตาเลย..."
16010-160100370 = "ไม่ได้ติดตั้งฟังก์ชันระเบิดตัวเอง\nไว้แน่ใช่มั้ย?!"

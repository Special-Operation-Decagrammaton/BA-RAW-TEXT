[translation]
16010-160100010 = "선생님은 주말에 보통 무얼 하면서 시간을 보내?"
16010-160100020 = "아무것도 안 하는데……"
16010-160100030 = "밀린 잔업을 하면서 보내."
16010-160100040 = "휴식도 중요한 일과 중 하나지."
16010-160100050 = "선생님이 제대로 휴일을 즐기고 있는 것 같아서 다행이야."
16010-160100060 = "……너무 무리하는 거 아냐?"
16010-160100070 = "휴식 없이 연달아 일하는 건 오히려 더 비효율적일 수도 있어."
16010-160100080 = "히비키는 주말을 어떻게 보내?"
16010-160100090 = "……나 말이야?"
16010-160100100 = "내가 주말에 하는 일이라면……"
16010-160100110 = "역시 무언가를 만드는 것이려나."
16010-160100120 = "……선생님, 그 소식 들었어."
16010-160100130 = "샬레에 갑작스러운 정전이 일어나는 바람에"
16010-160100140 = "하루종일 처리한 작업물이 날아갔다며"
16010-160100150 = "어떻게 복구할 수 있는 방법은 없는 거야……?"
16010-160100160 = "베리타스의 학생들도 복구는 어렵대……."
16010-160100170 = "그렇다면 내가 할 수 있는 일은 없겠지만……"
16010-160100180 = "그래도 뭔가 도울 수 있는 게 없을까"
16010-160100190 = "지금 필요한 건 응원뿐이야."
16010-160100200 = "응원이라……."
16010-160100210 = "알겠어."
16010-160100220 = "힘내, 선생님."
16010-160100230 = "……지난번의 사건 이후로 많은 고민을 했어."
16010-160100240 = "실내에서 일하는 사람들의 의욕을 높일 수 있는 응원 도구는 없을까— 하고."
16010-160100250 = "……그리고 오랜 고민 끝에 시제품을 만드는 데 성공했어."
16010-160100260 = "사무직 근무자를 위한 궁극의 응원 도구."
16010-160100270 = "……다음 당번 때 시험 삼아 들고 갈게."
16010-160100280 = "……뭘 만든 거야?"
16010-160100290 = "지난번에 만든 응원 도구는 꽤 괜찮았다고 생각했는데……"
16010-160100300 = "하지만 선생님이 싫어하는 것 같으니 어쩔 수 없지."
16010-160100310 = "우수한 마이스터라면 언제나 클라이언트의 의견을 귀담아들어야 하니까."
16010-160100320 = "그래서 고민 끝에 새로운 응원 도구를 완성했어."
16010-160100330 = "……다음번에 샬레에 가게 되면 보여 줄게."
16010-160100340 = "자폭 기능이 포함된 건 아니지?"
16010-160100350 = "……"
16010-160100360 = "……직접 가서 보여 줄게."
16010-160100370 = "자폭 기능이 포함된 건 아니지?!"

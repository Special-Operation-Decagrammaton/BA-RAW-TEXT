[translation]
16010-160100010 = "老師在放假的時候通常都會做什麼呢？"
16010-160100020 = "什麼都不做吧……"
16010-160100030 = "和堆積如山的文書工作戰鬥唷"
16010-160100040 = "好好讓身體休息也是很重要的呢"
16010-160100050 = "看來老師有好好地享受假日，真是太好了"
16010-160100060 = "……是不是太勉強了？"
16010-160100070 = "不休息地持續工作，反而更沒效率"
16010-160100080 = "那響呢？"
16010-160100090 = "……我嗎？"
16010-160100100 = "唔──嗯，我的話……"
16010-160100110 = "大概都是在製作些什麼吧"
16010-160100120 = "……老師，沒事吧？我聽到那個消息了"
16010-160100130 = "聽說因為夏萊突然停電"
16010-160100140 = "花了一整天的工作全都化為烏有了……"
16010-160100150 = "沒辦法復原嗎……？"
16010-160100160 = "雖然拜託了貝里塔斯，但大概很難復原吧……"
16010-160100170 = "沒有我能做的事嗎……"
16010-160100180 = "……有任何我能幫上忙的地方嗎？"
16010-160100190 = "能幫我打氣的話就太感激了"
16010-160100200 = "打氣……"
16010-160100210 = "嗯，我知道了"
16010-160100220 = "加油唷，老師"
16010-160100230 = "……自從發生上次的事情後，我煩惱了許久"
16010-160100240 = "什麼樣的應援道具能提高文書工作的熱情"
16010-160100250 = "……反覆試驗後，終於做出試作品了"
16010-160100260 = "這是為文書工作者設計的究極應援道具"
16010-160100270 = "……下次值班的時候，我帶去試試吧"
16010-160100280 = "……到底做了什麼呢？"
16010-160100290 = "我覺得上次做的應援道具很不錯……"
16010-160100300 = "但老師好像不喜歡，那就沒辦法了"
16010-160100310 = "如果是優秀的巨匠，就必須經常傾聽客戶的意見"
16010-160100320 = "這次準備了新的應援道具唷"
16010-160100330 = "下次去夏萊時會帶著"
16010-160100340 = "這次不會自爆了吧？"
16010-160100350 = "……"
16010-160100360 = "……果然還是現在就拿去給你看吧"
16010-160100370 = "真的不會自爆吧！？"

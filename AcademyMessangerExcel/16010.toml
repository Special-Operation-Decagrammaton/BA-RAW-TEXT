[translation]
16010-160100010 = "Sensei, what do you normally do on weekends?"
16010-160100020 = "Just resting and doing nothing, I guess..."
16010-160100030 = "I mostly end up working over the weekend anyway."
16010-160100040 = "Rest is an important part of life."
16010-160100050 = "I'm glad to hear that you're enjoying your days off."
16010-160100060 = "...You're not overworking yourself, are you?"
16010-160100070 = "Work without rest is unproductive and inefficient."
16010-160100080 = "Hibiki, what do you do to enjoy your weekends?"
16010-160100090 = "...Me?"
16010-160100100 = "My weekends are usually filled with"
16010-160100110 = "tinkering around and making things, I guess."
16010-160100120 = "...Sensei, I heard the news."
16010-160100130 = "A sudden power outage at Schale"
16010-160100140 = "means the entire day's work was lost..."
16010-160100150 = "Is there any way to recover it?"
16010-160100160 = "The Veritas students said they couldn't make any promises about data recovery..."
16010-160100170 = "I feel so powerless..."
16010-160100180 = "Is there anything I can do to help?"
16010-160100190 = "There is. Can I ask you to cheer me on?"
16010-160100200 = "Cheer you on..."
16010-160100210 = "Got it."
16010-160100220 = "Sensei, please cheer up!"
16010-160100230 = "...I've been doing a lot of thinking since that last incident."
16010-160100240 = "And I realized that what working people need...is a machine that can provide on-demand motivation."
16010-160100250 = "I eventually went from thinking to making, and I successfully created a prototype."
16010-160100260 = "It's the ultimate motivational device for office workers...in theory."
16010-160100270 = "I'll test it out next time I'm around."
16010-160100280 = "...Okay, but what exactly is it?"
16010-160100290 = "Well, I thought what I made last time was pretty good..."
16010-160100300 = "But you didn't seem to agree."
16010-160100310 = "And a good meister always keeps the client in mind."
16010-160100320 = "So, I've come up with a completely redesigned device."
16010-160100330 = "Trust me, you'll notice it next time I'm there."
16010-160100340 = "Haha. It doesn't blow up or anything, right?"
16010-160100350 = "..."
16010-160100360 = "...You'll see it in person soon enough."
16010-160100370 = "...It doesn't blow up or anything, right?!"

[translation]
10015-1001500010 = "I am finally going on an adventure, Sensei."
10015-1001500020 = "I hear I have to level up near the town where I am starting out."
10015-1001500030 = "So, wish me luck."
10015-1001500040 = "Huh? An adventure?"
10015-1001500050 = "I guess it's finally time..."
10015-1001500060 = "Today's adventure went smoothly."
10015-1001500070 = "Will you join the party next time too?"
10015-1001500080 = "Of course. I wouldn't miss it for the world."
10015-1001500090 = "A mascot is an important companion!"
10015-1001500100 = "That is correct."
10015-1001500110 = "I love going on adventures with you, Sensei."
10015-1001500120 = "Ba-ba-ba-bam! Bam bam!"
10015-1001500130 = "I leveled up! I am much stronger than before."
10015-1001500140 = "I-Is that so?"
10015-1001500150 = "Congratulations on leveling up!"
10015-1001500160 = "You have to work harder too, Sensei. Your current level allows no room for complacency."
10015-1001500170 = "Y-Yes, I will..."
10015-1001500180 = "Sorry..."
10015-1001500190 = "That is why you should join my party. I am just about to set off on a new adventure!"
10015-1001500200 = "Okay. We'll go together."
10015-1001500210 = "Yes. I will be waiting for you."
10015-1001500220 = "I have caused a lot of trouble for the others."
10015-1001500230 = "Even the student council scolded me..."
10015-1001500240 = "Perhaps I should take a break from adventuring..."
10015-1001500250 = "Good idea..."
10015-1001500260 = "You should take a break."
10015-1001500270 = "Now I have some time to myself."
10015-1001500280 = "I am going to play a new game someone recommended to me."
10015-1001500290 = "I borrowed a handheld console, so I will play it at the cafe."
10015-1001500300 = "Okay. Do your best!"
10015-1001500310 = "Good luck at the cafe!"
10015-1001500320 = "I found a hidden ending with both the Bearded King and the Bald Emperor, but..."
10015-1001500330 = "I got a message saying that illegal software had been detected just before the ending."
10015-1001500340 = "Some people from Seminar came to take the game away."
10015-1001500350 = "They said it was an illegally distributed, uncensored copy..."
10015-1001500360 = "What does that mean?"
10015-1001500370 = "No one will tell me..."
10015-1001500380 = "Maybe it's best not to know..."
10015-1001500390 = "Some knowledge should never be revealed to the world..."
10015-1001500400 = "Is that so?"
10015-1001500410 = "I do not understand, but I can accept that."
10015-1001500420 = "Thank you for letting me know, Sensei."
10015-1001500430 = "Keep your chin up!"
10015-1001500440 = "Yes, I will."
10015-1001500450 = "Sensei, do you know much about cats?"
10015-1001500460 = "I do not know much about them..."
10015-1001500470 = "Cats are very fast."
10015-1001500480 = "And they go, \"meow\"!"
10015-1001500490 = "Is there any way to make friends with cats?"
10015-1001500500 = "Cats?"
10015-1001500510 = "I'm not sure..."
10015-1001500520 = "I am alone at the club today."
10015-1001500530 = "I am bored, so you should come play a game with me."
10015-1001500540 = "Please come visit."
10015-1001500550 = "I'll stop by if I have time."
10015-1001500560 = "All right, I'll check in on you."
10015-1001500570 = "Okay. Thank you."
10015-1001500580 = "I will be waiting for you."
10015-1001500590 = "How do the treasure chests get into the dungeons?"
10015-1001500600 = "And why do they have items inside?"
10015-1001500610 = "Did someone put them there?"
10015-1001500620 = "I do not know who did it, but they must be very nice."
10015-1001500630 = "I want to be someone who fills treasure chests too."
10015-1001500640 = "Well, you have my support, Aris."
10015-1001500650 = "You can do it!"
10015-1001500660 = "Thank you, Sensei."
10015-1001500670 = "Sensei!"
10015-1001500680 = "Are you busy?"
10015-1001500690 = "Not if you're the one asking, Aris!"
10015-1001500700 = "Yay!"
10015-1001500710 = "If that is so"
10015-1001500720 = "I would like to show you something!"
10015-1001500730 = "Really? What is it?"
10015-1001500740 = "You must find out!"
10015-1001500750 = "I will await you in the Game Development Department Room!"

[translation]
10015-1001500010 = "老師，愛麗絲終於要去冒險了"
10015-1001500020 = "聽說首先得在「起始的村莊」附近提升等級"
10015-1001500030 = "愛麗絲要出發了。請祝愛麗絲好運"
10015-1001500040 = "冒險……？"
10015-1001500050 = "終於到了啟程的時候嗎……"
10015-1001500060 = "今天的冒險感覺很好"
10015-1001500070 = "下次也可以一起組隊嗎？"
10015-1001500080 = "嗯，當然。畢竟是隊伍嘛"
10015-1001500090 = "畢竟是重要的吉祥物嘛！"
10015-1001500100 = "沒錯"
10015-1001500110 = "和老師一起冒險，愛麗絲非常開心"
10015-1001500120 = "乓啪喀乓──！"
10015-1001500130 = "升級了。現在的愛麗絲比昨天的愛麗絲還要強"
10015-1001500140 = "每天都在成長……！"
10015-1001500150 = "恭喜升級！"
10015-1001500160 = "老師也要加油，那種等級沒問題嗎？"
10015-1001500170 = "會，會加油的……"
10015-1001500180 = "沒事的，不會有問題……大概吧，我想"
10015-1001500190 = "那麼今天也要去冒險，老師也一起去嗎？"
10015-1001500200 = "嗯，我很樂意"
10015-1001500210 = "那麼，愛麗絲會等著老師"
10015-1001500220 = "因為愛麗絲的行動，添了不少麻煩……"
10015-1001500230 = "還被學生會的人狠狠地教訓了一頓"
10015-1001500240 = "冒險暫時休息……"
10015-1001500250 = "有時也會有這樣的事，別放在心上"
10015-1001500260 = "我覺得為自己充電的時間也很重要唷"
10015-1001500270 = "突然有了一個人的時間"
10015-1001500280 = "所以，今天想嘗試一下別人推薦的新遊戲"
10015-1001500290 = "因為借了攜帶型遊戲機，所以想在咖啡廳裡玩"
10015-1001500300 = "我覺得很好！"
10015-1001500310 = "很好奇是什麼樣的遊戲……！"
10015-1001500320 = "發現了鬍鬚陛下和禿頭皇帝兩者結合的隱藏結局……"
10015-1001500330 = "但因為檢測到使用違法軟體，研討會的人蜂擁而至"
10015-1001500340 = "在結局之前把遊戲機奪走了"
10015-1001500350 = "「因為是非法流通且內容尚未被檢查過的東西」他們是這麼說的"
10015-1001500360 = "……這是什麼意思呢？"
10015-1001500370 = "都沒有人告訴愛麗絲……"
10015-1001500380 = "我覺得還是不要知道比較好……"
10015-1001500390 = "世界上有些事不知道的話會更幸福……"
10015-1001500400 = "是嗎？"
10015-1001500410 = "雖然有點不太能接受，但愛麗絲明白了"
10015-1001500420 = "非常感謝，老師。愛麗絲又變聰明了"
10015-1001500430 = "不客氣"
10015-1001500440 = "那再聯絡唷"
10015-1001500450 = "老師對貓了解深嗎？"
10015-1001500460 = "愛麗絲不太了解"
10015-1001500470 = "貓很敏捷"
10015-1001500480 = "然後會發出喵喵喵的叫聲，愛麗絲只知道這些"
10015-1001500490 = "老師知道和貓友好相處的方法嗎？"
10015-1001500500 = "貓啊……"
10015-1001500510 = "唔嗯……"
10015-1001500520 = "今天，社團教室只有愛麗絲一個人"
10015-1001500530 = "所以想跟老師一起玩遊戲"
10015-1001500540 = "如果可以的話請來玩"
10015-1001500550 = "可能需要一點時間，沒關係嗎？"
10015-1001500560 = "嗯，等一下唷"
10015-1001500570 = "好的，沒關係。謝謝老師"
10015-1001500580 = "愛麗絲等著哦"
10015-1001500590 = "為什麼地下城內有寶箱"
10015-1001500600 = "那個寶箱裡有道具呢？"
10015-1001500610 = "是誰放進去的呢……？"
10015-1001500620 = "雖然不知道是誰，但那個人是非常溫柔的人呢"
10015-1001500630 = "愛麗絲也想成為那樣的人"
10015-1001500640 = "我支持你唷"
10015-1001500650 = "愛麗絲一定能辦到"
10015-1001500660 = "非常感謝你，老師"

[translation]
10015-1001500010 = "선생님. 아리스는 드디어 모험을 떠납니다."
10015-1001500020 = "처음엔 시작 마을 주변에서 레벨업을 해야 한다고 들었습니다."
10015-1001500030 = "그러니까 행운을 빌어주세요."
10015-1001500040 = "응? 모험……?"
10015-1001500050 = "드디어 떠날 때가 되었나……"
10015-1001500060 = "오늘의 모험은 순조로웠습니다."
10015-1001500070 = "다음에도 함께 파티를 해주시겠어요?"
10015-1001500080 = "응. 물론이야. 내가 빠지면 안 되지."
10015-1001500090 = "마스코트니까, 중요한 동료지!"
10015-1001500100 = "그렇습니다."
10015-1001500110 = "아리스는 선생님과의 모험이 무척 즐겁습니다."
10015-1001500120 = "빠빠빠빰~ 빰빰!"
10015-1001500130 = "아리스는 레벨업 했습니다. 지금의 아리스는 어제보다 강합니다."
10015-1001500140 = "그, 그런 거야?"
10015-1001500150 = "축하해! 레벨업!"
10015-1001500160 = "선생님도 노력하셔야 합니다. 지금 레벨에 잠이 옵니까?"
10015-1001500170 = "으, 으응……"
10015-1001500180 = "죄송합니다……"
10015-1001500190 = "그래서 이번에도 다시 모험을 떠날 건데, 파티에 합류하시겠습니까?"
10015-1001500200 = "좋아, 다시 출동인가."
10015-1001500210 = "네. 그럼 기다리고 있겠습니다."
10015-1001500220 = "아리스의 여러 가지 행동 때문에 민폐를 끼쳐버렸습니다."
10015-1001500230 = "학생회 분들께 잔뜩 혼났기 때문에,"
10015-1001500240 = "모험은 한동안 쉬어야 할 것 같습니다……"
10015-1001500250 = "잘 생각했어……"
10015-1001500260 = "조금 쉬도록 해."
10015-1001500270 = "혼자만의 시간이 생겼습니다."
10015-1001500280 = "이번엔 추천받은 새로운 게임을 해보려고 합니다."
10015-1001500290 = "휴대용 게임기를 빌렸는데 카페에서 플레이해보겠습니다."
10015-1001500300 = "응. 파이팅!"
10015-1001500310 = "카페에서…… 힘내!"
10015-1001500320 = "턱수염 폐하와 대머리 황제님 모두와 맺어지는 히든 엔딩을 찾아냈지만……"
10015-1001500330 = "엔딩 직전에서 불법 소프트웨어가 감지되었다면서"
10015-1001500340 = "세미나 분들이 찾아와서 게임을 뺏어갔습니다."
10015-1001500350 = "불법 유통되는 미검열본이라고 하는데……"
10015-1001500360 = "그게 무슨 뜻인가요?"
10015-1001500370 = "다들 알려주지 않습니다……"
10015-1001500380 = "모르는 게 좋다고 생각해……"
10015-1001500390 = "세상엔 알려져선 안 될 금단의 지식도 있는 법……"
10015-1001500400 = "그렇습니까?"
10015-1001500410 = "이해는 못 했지만 어쩐지 납득했습니다."
10015-1001500420 = "알려주셔서 감사합니다. 선생님."
10015-1001500430 = "힘내!"
10015-1001500440 = "네. 그러겠습니다."
10015-1001500450 = "선생님. 고양이에 대해서 잘 아시나요?"
10015-1001500460 = "아리스는 잘 모릅니다……"
10015-1001500470 = "고양이는 재빠릅니다."
10015-1001500480 = "게다가 야옹~ 하고 웁니다."
10015-1001500490 = "고양이와 친해질 수 있는 방법은 없을까요?"
10015-1001500500 = "고양이라……"
10015-1001500510 = "글쎄……"
10015-1001500520 = "오늘은 동아리에 아리스 혼자 있습니다."
10015-1001500530 = "심심하니까 선생님과 함께 게임 하고 싶습니다."
10015-1001500540 = "놀러 와주세요."
10015-1001500550 = "시간이 되면 놀러 갈게."
10015-1001500560 = "알았어. 체크해둘게."
10015-1001500570 = "네. 감사합니다."
10015-1001500580 = "기다리고 있겠습니다."
10015-1001500590 = "어째서 던전에는 보물상자들이 있고,"
10015-1001500600 = "보물상자를 열면 아이템을 얻을 수 있는 걸까요?"
10015-1001500610 = "누군가 넣어두는 걸까요?"
10015-1001500620 = "누구인지는 모르지만, 무척 상냥한 분입니다."
10015-1001500630 = "아리스도 그런 사람이 되고 싶습니다."
10015-1001500640 = "응. 응원할게, 아리스."
10015-1001500650 = "파이팅!"
10015-1001500660 = "감사합니다. 선생님."
10015-1001500670 = "선생님."
10015-1001500680 = "바쁘십니까?"
10015-1001500690 = "아리스가 부르면 바쁘지 않아!"
10015-1001500700 = "와아!"
10015-1001500710 = "그러면 말이에요."
10015-1001500720 = "아리스는 선생님께 보여드리고 싶은 것이 있습니다!"
10015-1001500730 = "나에게 보여주고 싶은 것?"
10015-1001500740 = "네."
10015-1001500750 = "게임개발부실에서 기다리고 있겠습니다!"

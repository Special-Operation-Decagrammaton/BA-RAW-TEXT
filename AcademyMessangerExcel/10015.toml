[translation]
10015-1001500010 = "คุณครูคะ ตอนนี้อาริสึได้ออกผจญภัย\nแล้วนะคะ"
10015-1001500020 = "ได้ยินว่าไปล่ามอนสเตอร์เพื่ออัปเลเวล\nได้แถวใกล้ๆ เมืองเริ่มต้นนะคะ"
10015-1001500030 = "ช่วยอวยพรให้ฉันโชคดีด้วยนะคะ"
10015-1001500040 = "หืม? ผจญภัย....??"
10015-1001500050 = "ถึงเวลาที่จะต้องออกผจญภัยแล้วสินะ..."
10015-1001500060 = "การผจญภัยวันนี้ผ่านไปได้อย่างราบรื่น\nเลยนะคะ"
10015-1001500070 = "คราวหน้ามาลงตี้ด้วยกันได้มั้ยคะ?"
10015-1001500080 = "อื้อ ได้สิ จะขาดครูไปได้ยังไงล่ะ"
10015-1001500090 = "ครูเป็นมาสคอตนะ จะขาดไปได้\nยังไงล่ะ!"
10015-1001500100 = "ก็คงประมาณนั้นค่ะ "
10015-1001500110 = "อาริสึสนุกมากตอนไปผจญภัยกับ\nคุณครูค่ะ"
10015-1001500120 = "ลั้ลลัลลา~ ลั้ลลา!"
10015-1001500130 = "อาริสึเลเวลอัปแล้วนะคะ ตอนนี้อาริสึ\nแข็งแกร่งกว่าเมื่อวานแล้วค่ะ"
10015-1001500140 = "งะ...งั้นเหรอ?"
10015-1001500150 = "ยินดีด้วย! เลเวลอัปแล้ว!"
10015-1001500160 = "คุณครูก็ต้องพยายามนะคะ เลเวลไม่\nขึ้นมานานแล้วนะคะ"
10015-1001500170 = "อ่ะ... อื้อ"
10015-1001500180 = "ขอโทษนะ..."
10015-1001500190 = "อาริสึจะไปผจญภัยอีกครั้งแล้วนะคะ\nคราวนี้คุณครูจะมาตี้ด้วยกันมั้ยคะ?"
10015-1001500200 = "ได้สิ มาเลยๆ"
10015-1001500210 = "ค่ะ แล้วอาริสึจะรอนะคะ"
10015-1001500220 = "อาริสึทำอะไรหลายๆ อย่างไม่ดี\nเลยสร้างภาระให้ทุกคน..."
10015-1001500230 = "แถมยังถูกทางสภานักเรียนบ่นจน\nหูชาแบบนี้... "
10015-1001500240 = "อาริสึคงต้องเลิกผจญภัยสักระยะแล้ว\nละค่ะ"
10015-1001500250 = "คิดได้ดีแล้วละ..."
10015-1001500260 = "เว้นสักระยะก็ดีนะ"
10015-1001500270 = "อาริสึมีเวลาว่างแล้วค่ะ"
10015-1001500280 = "คราวนี้เลยว่าจะลองเล่นเกมใหม่\nที่มีคนแนะนำมาค่ะ"
10015-1001500290 = "อาริสึไปยืมเครื่องเกมพกพามา\nแล้วจะไปนั่งเล่นที่คาเฟ่ดูค่ะ"
10015-1001500300 = "อื้อ สู้ๆ!"
10015-1001500310 = "คาเฟ่เหรอ... สู้ๆ นะ!"
10015-1001500320 = "อาริสึเจอเนื้อเรื่องตอนจบแบบใหม่\nของจักรพรรดิหนวดและจักรพรรดิ\nโป๊งเหน่งที่ถูกซ่อนไว้แล้วค่ะแต่ว่า..."
10015-1001500330 = "ได้ยินมาว่าตรวจพบซอร์ฟแวร์ผิด\nกฎหมาย...."
10015-1001500340 = "คนจากชมรมเซมิน่ามาแล้วก็เอาเกม\nไปก่อนที่อาริสึจะเล่นจบค่ะ"
10015-1001500350 = "เป็นพวกโปรแกรมที่ทำให้ไม่เซ็นเซอร์\nภาพที่ห้ามเผยแพร่แบบผิดกฎหมาย"
10015-1001500360 = "มันหมายความว่ายังไงเหรอคะ?"
10015-1001500370 = "ไม่มีใครยอมบอกอาริสึเลยค่ะ"
10015-1001500380 = "ครูคิดว่าเรื่องนี้ไม่รู้น่าจะดีกว่านะ..."
10015-1001500390 = "บางครั้งในโลกนี้ มันก็มีเรื่อง\nที่ไม่ควรรู้อยู่เหมือนกันนะ..."
10015-1001500400 = "งั้นเหรอคะ? "
10015-1001500410 = "ถึงอาริสึจะไม่ค่อยเข้าใจ แต่ก็รับได้ค่ะ"
10015-1001500420 = "ขอบคุณที่บอกนะคะ คุณครูคะ"
10015-1001500430 = "พยายามเข้านะ!"
10015-1001500440 = "ค่ะ อาริสึจะพยายามค่ะ"
10015-1001500450 = "คุณครูคะ คุณครูรู้เรื่องเกี่ยวกับเจ้า\nเหมียวบ้างรึเปล่าคะ?"
10015-1001500460 = "อาริสึไม่ค่อยรู้เลยค่ะ"
10015-1001500470 = "เจ้าเหมียววิ่งได้เร็วมากๆ "
10015-1001500480 = "แถมยังร้อง เหมียว~ เหมียว~ อีกด้วยค่ะ"
10015-1001500490 = "มีวิธีที่จะทำให้สนิทกับแมวได้มั้ยคะ?"
10015-1001500500 = "แมวงั้นเหรอ..."
10015-1001500510 = "นั่นสินะ..."
10015-1001500520 = "วันนี้อาริสึอยู่ที่ชมรมคนเดียวค่ะ"
10015-1001500530 = "รู้สึกเบื่อมากๆ เลยอยากเล่นกับคุณครูค่ะ "
10015-1001500540 = "มาเล่นด้วยกันสิคะ"
10015-1001500550 = "ถ้ามีเวลาครูจะแวะไปเล่นด้วยนะ"
10015-1001500560 = "เข้าใจแล้วล่ะ ครูจะแวะไปนะ"
10015-1001500570 = "ค่ะ ขอบคุณค่ะ"
10015-1001500580 = "แล้วจะรอนะคะ"
10015-1001500590 = "ทำไมที่ดันเจี้ยนถึงมีกล่องสมบัติได้นะ"
10015-1001500600 = "ถ้าเปิดกล่องสมบัติจะได้ไอเทมรึเปล่า\nคะ?"
10015-1001500610 = "หรือว่ามีใครเอาไปไว้ในนั้นกันนะ?"
10015-1001500620 = "ถึงจะไม่รู้ว่าเป็นใครก็เถอะ แต่ดูเป็น\nคนที่ใจดีจังเลยค่ะ"
10015-1001500630 = "อาริสึเองก็อยากเป็นคนแบบนั้นให้ได้ค่ะ"
10015-1001500640 = "อื้อ ครูเป็นกำลังใจให้นะ อาริสึ"
10015-1001500650 = "สู้ๆ! "
10015-1001500660 = "ขอบคุณค่ะคุณครู"
10015-1001500670 = "คุณครู"
10015-1001500680 = "ยุ่งอยู่รึเปล่าคะ?"
10015-1001500690 = "ถ้าเพื่ออาริสึ ไม่มีคำว่ายุ่งหรอก!"
10015-1001500700 = "ว้าว!"
10015-1001500710 = "คือว่า..."
10015-1001500720 = "อาริสึมีบางอย่างอยากเอาไปให้คุณครู\nดูค่ะ!"
10015-1001500730 = "ของที่อยากให้ครูดู?"
10015-1001500740 = "ใช่ค่ะ"
10015-1001500750 = "อาริสึจะรออยู่ที่ห้องชมรมพัฒนาเกม\nนะคะ!"

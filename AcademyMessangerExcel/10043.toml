[translation]
10043-100430010 = "선생님. 오늘은 평소보다도 더욱 날이 무더워진 듯합니다만."
10043-100430020 = "혹여 건강엔 별고 없으신지요?"
10043-100430030 = "아, 걱정해줘서 고마워. 와카모, 난 괜찮아."
10043-100430040 = "와카모야말로 별일 없지?"
10043-100430050 = "아아…. 평소와 마찬가지로 다정하기 그지없는 말씀."
10043-100430060 = "네에- 물론이랍니다. 이 와카모, 건강 하나만큼은 자신 있기에."
10043-100430070 = "건강한 게 최고지."
10043-100430080 = "네…? 아, 그보다 선생님…."
10043-100430090 = "당신께서 평소 일로 무척이나 바쁜 걸, 이 와카모도 잘 알고 있습니다만."
10043-100430100 = "혹시 오늘도…?"
10043-100430110 = "응, 오늘도 하루 종일 샬레에 있을 예정인데… 무슨 일 있어?"
10043-100430120 = "그러하신가요…. 무자비한 여름의 열기를 피할 수 있는 것은 다행이지만."
10043-100430130 = "그래서야 당신께 오늘은 전혀 여름답지 않은 하루가 되어버릴 터."
10043-100430140 = "네에. 과연 그런 것이로군요."
10043-100430150 = "응? 무슨 소리야?"
10043-100430160 = "잘 알겠습니다."
10043-100430170 = "당신을 위해서라면, 이 와카모. 얼마든지 힘을 낼 터이니."
10043-100430180 = "부디 기대해주시길"
10043-100430190 = "응…? 저기? 와카모…?"
10043-100430200 = "…저기요?"
10043-100430210 = "저어, 선생님."
10043-100430220 = "이번에 샬레의 일로 근처 해변을 찾으셨다는 이야기를 들었습니다만."
10043-100430230 = "응…. 와카모는 언제나 잘 알고 있구나…."
10043-100430240 = "저번에 준비하던 지역 여름 불꽃놀이 축제의 일로 잠깐."
10043-100430250 = "아, 역시……!"
10043-100430260 = "그럼, 저, 그게 괜찮으시다면 저 와카모, 선생님을 만나 뵈어…."
10043-100430270 = "앗. 미안, 와카모! 지금은 정말로 바빠서 미안!"
10043-100430280 = "아앗, 과연, 그러, 신가요…."
10043-100430290 = "그래도 일이 어느 정도 마무리된 나중이라면 괜찮으니까!"
10043-100430300 = "나중이라면 괜찮다…."
10043-100430310 = "네에, 알겠습니다. 그럼 아쉽지만, 부디 다음에."
10043-100430320 = "그럼 와카모, 기다리고 있겠습니다. 우후훗."
10043-100430330 = "선생님. 괜찮으시다면."
10043-100430340 = "이전에 약속했던 대로 함께……."
10043-100430350 = "미안, 와카모. 지금은 바빠서 말이야."
10043-100430360 = "조금만 기다려줄래?"
10043-100430370 = "네엣. 알겠습니다."
10043-100430380 = "이 와카모, 당신을 기다리고 있겠습니다."
10043-100430390 = "오늘 하루, 함께 해주셔서 감사합니다. 선생님."
10043-100430400 = "이 와카모, 오늘 하루, 무척이나 특별한 추억이 되었습니다."
10043-100430410 = "아냐, 나야말로."
10043-100430420 = "다음엔 좀 더 그, 평범하게 만나자."
10043-100430430 = "네에, 당신의 그 말씀, 가슴 깊이 새겨 두도록 하겠습니다."
10043-100430440 = "다음엔…… 그렇지요."
10043-100430450 = "이러한 기다림 대신, 평소와 마찬가지로."
10043-100430460 = "제가 직접 샬레의 정문으로, 찾아뵙도록 하겠습니다."
10043-100430470 = "아, 그런 거라면 평소 보안이 걸려 있으니까."
10043-100430480 = "우후훗, 그런 보안 따위, 이 와카모에겐 아무런 문제도 되지 않기에."
10043-100430490 = "……응? 와카모? 잠깐. 그 말뜻은."
10043-100430500 = "그럼 이만 총총."
10043-100430510 = "저기, 저기요? 와카모? 저기요?!"
10043-100430520 = "선생님. 오늘도 별고 없으신지요?"
10043-100430530 = "무더운 날씨가 염려되어 연락드립니다."
10043-100430540 = "바다에 가고 싶어……."
10043-100430550 = "해변에서 쉬고 싶어……."
10043-100430560 = "아아, 그렇다면……."
10043-100430570 = "이 와카모. 인적이 드문 해변을 알고 있기에."
10043-100430580 = "그곳에서 함께 조용히 피서를 즐기면 어떠실지?"
10043-100430590 = "응! 좋아!"
10043-100430600 = "당장 가자!"
10043-100430610 = "우후훗, 감사합니다."
10043-100430620 = "책임지고 당신을 모시지요."
10043-100430630 = "그럼 약속 장소에서 뵙겠습니다."
10043-100430640 = "선생님. 오늘도 무척 즐거웠답니다."
10043-100430650 = "기회가 된다면 당신과 또 바다에 가고 싶네요."
10043-100430660 = "나도 덕분에 즐거웠어."
10043-100430670 = "아아, 그 대답을 들으니 다시 가슴이 뛰네요."
10043-100430680 = "그럼 언젠가 또 바다에서 보는 것으로."
10043-100430690 = "부디 그때까지 평안하시길."

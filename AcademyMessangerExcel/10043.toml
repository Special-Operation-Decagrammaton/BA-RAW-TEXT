[translation]
10043-100430010 = "คุณครู... วันนี้อากาศร้อนเป็นพิเศษ\nเลยนะคะ"
10043-100430020 = "สุขภาพคุณครูเป็นยังไงบ้างคะ?"
10043-100430030 = "ขอบใจที่เป็นห่วงนะ วาคาโมะ\nครูไม่เป็นไรหรอก"
10043-100430040 = "ครูสบายดี\nวาคาโมะล่ะ สบายดีใช่มั้ย?"
10043-100430050 = "อา... คำพูดที่แสดงถึง\nความห่วงใยอยู่เสมอ..."
10043-100430060 = "ค่ะ ฉันสบายดีค่ะ\nวาคาโมะผู้นี้ แข็งแรงดีค่ะ"
10043-100430070 = "สบายดีก็ดีแล้วละ"
10043-100430080 = "ค่ะ คือว่า..."
10043-100430090 = "วาคาโมะทราบดีค่ะว่าคุณท่าน\nงานยุ่งมาก..."
10043-100430100 = "วันนี้คุณท่านก็ทำงานเหรอคะ...?"
10043-100430110 = "อื้อ วันนี้ครูคงอยู่ที่ชาเล่ต์ทั้งวัน\nมีอะไรรึเปล่า?"
10043-100430120 = "อย่างนั้นเหรอคะ การได้หลบอากาศร้อนๆ\nอยู่ในห้องแอร์แบบนี้เป็นเรื่องดีก็จริง"
10043-100430130 = "แต่กลายเป็นว่าคุณท่านจะไม่ได้ใช้เวลา\nอย่างสนุกสนานในหน้าร้อน"
10043-100430140 = "คงเป็นแบบนั้นสินะคะ"
10043-100430150 = "หืม? หมายถึงอะไรเหรอ?"
10043-100430160 = "ทราบแล้วค่ะ"
10043-100430170 = "ถ้าเพื่อคุณท่านแล้ว วาคาโมะผู้นี้...\nจะคอยเป็นกำลังให้คุณท่านเสมอ"
10043-100430180 = "ได้โปรดรอวาคาโมะก่อนนะคะ"
10043-100430190 = "หืม...? นี่... วาคาโมะ? "
10043-100430200 = "นี่...?"
10043-100430210 = "คุณครูคะ..."
10043-100430220 = "ฉันได้ยินว่าคุณครูมาทำธุระของ\nทางชาเล่ต์ที่แถวริมทะเลค่ะ"
10043-100430230 = "อื้อ วาคาโมะนี่รู้ตลอดเลยนะ"
10043-100430240 = "ครูแวะมาเพราะเรื่องงานเทศกาล\nดอกไม้ไฟฤดูร้อนท้องถิ่นน่ะ"
10043-100430250 = "โอ้ อย่างนั้นเหรอคะ...!"
10043-100430260 = "ถ้าคุณท่านสะดวก วาคาโมะขอไป\nพบคุณท่านได้มั้ยคะ"
10043-100430270 = "อ๊ะ โทษทีนะ วาคาโมะ\nตอนนี้ครูยุ่งมากเลย ขอโทษจริงๆ!"
10043-100430280 = "อ๊ะ ยะ...อย่างนั้นเหรอคะ"
10043-100430290 = "แต่ถ้าเสร็จธุระแล้ว ครูก็ว่างนะ"
10043-100430300 = "วาคาโมะรอได้ค่ะ..."
10043-100430310 = "เข้าใจแล้วค่ะ น่าเสียดาย\nถ้างั้นไว้คราวหน้า..."
10043-100430320 = "ถ้างั้นวาคาโมะ\nจะรอคุณท่านนะคะ ฮุฮุฮุ..."
10043-100430330 = "คุณครู ถ้าสะดวกละก็..."
10043-100430340 = "ที่พวกเราสัญญากันไว้..."
10043-100430350 = "โทษทีนะ วาคาโมะ ตอนนี้ครูยุ่งมากเลย"
10043-100430360 = "รอครูหน่อยได้มั้ย?"
10043-100430370 = "ค่ะ เข้าใจแล้วค่ะ"
10043-100430380 = "วาคาโมะผู้นี้ จะรอคุณท่านค่ะ"
10043-100430390 = "ขอบคุณที่วันนี้อยู่ด้วยกันนะคะ คุณท่าน"
10043-100430400 = "สำหรับวาคาโมะแล้ว... วันนี้เป็น\nความทรงจำที่แสนพิเศษมากค่ะ"
10043-100430410 = "ครูก็เหมือนกันนะ"
10043-100430420 = "คราวหน้าเรามาเจอกัน\nแบบธรรมดาบ้างเถอะ"
10043-100430430 = "ค่ะ วาคาโมะจะสลักคำพูดของคุณท่าน\nเอาไว้ในใจเลยค่ะ"
10043-100430440 = "คราวหน้า... สินะคะ"
10043-100430450 = "แทนที่จะรอให้คุณท่าน\nมาพบเหมือนที่ผ่านมา"
10043-100430460 = "วาคาโมะจะไปพบคุณท่าน\nที่หน้าประตูใหญ่ของชาเล่ต์เองค่ะ"
10043-100430470 = "ถ้าทำแบบนั้นจะติดเรื่อง\nระบบความปลอดภัยนะ"
10043-100430480 = "ฮุฮุฮุ ระบบความปลอดภัยแบบนั้น\nไม่ใช่ปัญหาสำหรับวาคาโมะผู้นี้หรอกค่ะ"
10043-100430490 = "หืม? วาคาโมะ เดี๋ยวก่อนนะ\nที่พูดเมื่อกี้..."
10043-100430500 = "แล้วพบกันนะคะ"
10043-100430510 = "เดี๋ยวสิ เดี๋ยวก่อน\nวาคาโมะ? รอเดี๋ยวก่อนสิ?!"
10043-100430520 = "คุณครู วันนี้ไม่ได้มีเรื่องอะไรเป็นพิเศษ\nใช่มั้ยคะ?"
10043-100430530 = "ฉันส่งข้อความมาถามเพราะเห็นว่า\nวันนี้อากาศร้อนมากค่ะ"
10043-100430540 = "อยากไปทะเลจัง..."
10043-100430550 = "อยากไปพักผ่อนที่ชายหาดจัง..."
10043-100430560 = "อ่า ถ้าอย่างนั้น..."
10043-100430570 = "วาคาโมะผู้นี้รู้จักชายหาดที่ผู้คน\nไม่พลุกพล่าน"
10043-100430580 = "ไปพักผ่อนเงียบๆ ที่นั่นกันดีมั้ยคะ?"
10043-100430590 = "อื้อ! ดีเลย!"
10043-100430600 = "ไปกันเถอะ!"
10043-100430610 = "ฮุฮุฮุ ขอบคุณค่ะ"
10043-100430620 = "ฉันจะดูแลคุณท่านเองค่ะ"
10043-100430630 = "เช่นนั้นพบกันที่สถานที่นัดพบนะคะ"
10043-100430640 = "คุณครู วันนี้ก็สนุกมากเลยค่ะ"
10043-100430650 = "ถ้ามีโอกาส ฉันก็อยากไปทะเลกับ\nคุณท่านอีกค่ะ"
10043-100430660 = "ครูก็สนุกมากเลยเหมือนกันนะ"
10043-100430670 = "อ่า พอได้ยินแบบนั้นก็ทำให้ใจเต้นแรง\nอีกแล้วค่ะ"
10043-100430680 = "หวังว่าสักวันจะได้ไปทะเลด้วยกันอีก"
10043-100430690 = "โปรดรักษาเนื้อรักษาตัวจนถึงตอนนั้น\nด้วยนะคะ"

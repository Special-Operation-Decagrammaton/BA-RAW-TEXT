[translation]
10037-100370010 = "수상하군. 수상해……."
10037-100370020 = "무슨 일이야?"
10037-100370030 = "최근 들어 급양부에 보관 중인 간식이 계속 사라지는 것 같다."
10037-100370040 = "특히 푸딩의 개수가 장부상에 기록된 숫자에 비해 터무니없이 부족해."
10037-100370050 = "개수를 잘못 센 거 아냐?"
10037-100370060 = "누가 몰래 먹은 거 아냐?"
10037-100370070 = "아니, 그럴 리는 없다."
10037-100370080 = "다른 보안위원들과 함께 몇 번이나 다시 세어 보았으니까!"
10037-100370090 = "아니, 그럴 리는 없다."
10037-100370100 = "급양부의 시설은 우리 보안위원들이 철통같이 지키고 있으니까!"
10037-100370110 = "개수를 잘못 센 것도, 누가 먹은 것도 아니라면 이는 분명……"
10037-100370120 = "붉은겨울 학원을 음해하려는 스파이의 사보타주 행위가 분명하다!"
10037-100370130 = "스파이?"
10037-100370140 = "음. 붉은겨울 학원은 워낙 넓은 데다가, 학생기록부의 전산화가 완전히 이루어지지 않아 사무국에서 파악하지 못한 학생들도 제법 있으니까."
10037-100370150 = "그중에 외부 학원에서 보낸 스파이가 섞여 있다 하더라도 이상하지 않은 일이야."
10037-100370160 = "분명 그 스파이는 이런 허점을 노려 붉은겨울 학원에 내분을 일으키려 했던 거겠지. 괘씸한 녀석 같으니라고."
10037-100370170 = "그런고로 오늘부터…… 특별 스파이 색출 작전을 개시한다!"
10037-100370180 = "선생, 또 사건이다. 예의 스파이 문제야."
10037-100370190 = "그 괘씸한 스파이 녀석이 이번에는 체리노 회장의 푸딩을 훔쳐 간 모양이더군."
10037-100370200 = "어째서 스파이의 소행이라고 단정 짓는 거야?"
10037-100370210 = "그야 붉은겨울 학원의 보안은 언제나 완벽하기 때문이지!"
10037-100370220 = "스파이가 기어들어 와 사보타주라도 하지 않는 이상, 문제가 생길 다른 이유는 없어!"
10037-100370230 = "그러니 이번 사건도 스파이의 소행임이 분명해."
10037-100370240 = "……하지만 어째서인지 체리노 회장께서는 내가 푸딩을 훔쳐 갔다고 생각하시는 것 같더군."
10037-100370250 = "물론 짚이는 바가 없는 건 아니지만……."
10037-100370260 = "이번에야말로 멋지게 스파이를 잡아 내 무죄를 증명해 내겠어!"
10037-100370270 = "……나쁜 소식이다, 선생."
10037-100370280 = "지난번에 체리노 회장님의 석상에 총격을 가한 건 때문에 중징계를 받고 말았다……."
10037-100370290 = "구교사로 가게 된 거야?"
10037-100370300 = "가끔 면회는 갈게."
10037-100370310 = "아니, 구교사로 가게 된 게 아니거든?!"
10037-100370320 = "체리노 회장님의 자비로 구교사 행은 간신히 피했지만."
10037-100370330 = "지난번처럼 화장실 청소 1주일 형을 받고 말았다……."
10037-100370340 = "수치스럽고 고된 일이지만, 체리노 회장님의 명령이라면 어쩔 수 없지."
10037-100370350 = "불초 마리나, 전력을 다해 회장님의 명을 수행하겠다!"
10037-100370360 = "수고가 많겠네."
10037-100370370 = "응? 그게 무슨 소리지?"
10037-100370380 = "선생도 나와 함께 화장실 청소를 하는 거다."
10037-100370390 = "어째서?"
10037-100370400 = "그야 회장님의 석상이 깨졌을 때 선생도 함께 있었기 때문이다."
10037-100370410 = "수염의 권위를 지키는 것은 모두의 의무. 그러니 선생도 불경죄에 대해 함께 책임을 나누어야지."
10037-100370420 = "자, 선생. 내일의 화장실 청소는 일찍 시작할 테니, 오전 7시 전까지 사무국 건물 앞에 집합하도록!"
10037-100370430 = "억지야……."
10037-100370440 = "으음…… 선생."
10037-100370450 = "미안하지만 내가 지정하는 장소로 잠깐 와줄 수 없겠나?"
10037-100370460 = "다른 사무국 위원들에게는 말할 수 없는 곤란한 일에 처해서……."
10037-100370470 = "응, 금방 갈게."
10037-100370480 = "무슨 일이 생긴 거야?"
10037-100370490 = "그게, 사무국에서 멀리 떨어진 장소로 불러서 미안하지만……"
10037-100370500 = "보안위원들에게 체포되었다……."
10037-100370510 = "……진짜 무슨 일이 생긴 거야?"

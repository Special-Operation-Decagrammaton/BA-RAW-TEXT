[translation]
10037-100370010 = "有點奇怪"
10037-100370020 = "？？？"
10037-100370030 = "最近，保管在供給部的零食接連不斷地消失"
10037-100370040 = "特別是布丁的個數，和帳簿的紀錄完全對不上"
10037-100370050 = "不是數錯之類的……？"
10037-100370060 = "有誰偷吃之類的？"
10037-100370070 = "不，不可能有那種事！"
10037-100370080 = "畢竟我和其他保安委員一起重數了好幾次！"
10037-100370090 = "不，不可能有那種事！"
10037-100370100 = "供給部的設施，有我們保安委員徹底地監視著！"
10037-100370110 = "並不是數錯，也不是誰吃掉了，既然如此……"
10037-100370120 = "這一定是來自間諜的攻擊，企圖攻擊赤冬聯邦學園！"
10037-100370130 = "……間諜？"
10037-100370140 = "啊啊。赤冬聯邦學園不僅腹地廣闊，學生的記錄簿等也沒什麼電子化。甚至有不少學生未被事務局所掌控"
10037-100370150 = "在其中，就算有從外部學園送進來的「間諜」混入也不奇怪"
10037-100370160 = "肯定想以這種瑣碎事件觀察情況，在不遠的將來於赤冬聯邦學園內捲起糾紛吧……"
10037-100370170 = "這樣的話就沒辦法了……即刻起，間諜搜索作戰開始！"
10037-100370180 = "老師，這是關於上次間諜的續報"
10037-100370190 = "不知在何處的卑劣間諜，這次似乎偷了潔莉諾會長的布丁"
10037-100370200 = "那個，確實是間諜的所為嗎？"
10037-100370210 = "啊啊，沒錯。因為赤冬聯邦學園的保安，無時無刻都是完美的！"
10037-100370220 = "除非間諜潛入，不然不可能發生任何問題！"
10037-100370230 = "所以毫無疑問是間諜所為吧"
10037-100370240 = "不過，產生一個問題……不知為何潔莉諾會長她，似乎認為布丁是我偷的"
10037-100370250 = "當然，也不是沒有頭緒……"
10037-100370260 = "反而是個好機會。這次一定要抓住間諜，證明我的才能和無罪！"
10037-100370270 = "……聽我說，老師"
10037-100370280 = "上次弄壞潔莉諾會長石像的事，受到了懲罰……"
10037-100370290 = "現在該不會，在舊校舍？"
10037-100370300 = "我會不時去看妳的。有想要的東西跟我說"
10037-100370310 = "不是，才不是被流放至舊校舍！！"
10037-100370320 = "多虧了潔莉諾會長的慈悲，避免被流放至舊校舍……"
10037-100370330 = "但和以前一樣，受到了「打掃廁所1週」之刑"
10037-100370340 = "不過，這某種意義上也是潔莉諾會長的命令"
10037-100370350 = "瑪麗娜我，會全力執行會長的命令的！"
10037-100370360 = "是嗎，辛苦了。加油哦"
10037-100370370 = "你在說什麼啊？"
10037-100370380 = "老師也要和我一起打掃哦"
10037-100370390 = "……咦？"
10037-100370400 = "會長的石像打破時，老師也在吧"
10037-100370410 = "保護鬍子的權威是全員的義務。所以老師也是不敬罪，共同承擔責任是理所當然的"
10037-100370420 = "好了老師。明天早上7點，在事務局前集合！"
10037-100370430 = "好早……"
10037-100370440 = "……老師"
10037-100370450 = "抱歉，現在可以稍微給我一點時間嗎？"
10037-100370460 = "發生了，沒辦法和其他事務局委員說的事……"
10037-100370470 = "了解，我馬上過去哦"
10037-100370480 = "發生什麼事？"
10037-100370490 = "啊啊，不好意思我在離事務局也有一段距離的地方……"
10037-100370500 = "被保安委員們，抓住了……"
10037-100370510 = "到底發生什麼……我馬上過去哦"

[translation]
10037-100370010 = "แปลกจัง... ต้องมีอะไรแน่ๆ"
10037-100370020 = "มีอะไรเหรอ?"
10037-100370030 = "หมู่นี้อาหารว่างของชมรม\nโภชนาการหายไปเรื่อยๆ เลย"
10037-100370040 = "โดยเฉพาะพุดดิ้ง จำนวนที่เหลือ\nไม่ตรงกับในบันทึกอย่างน่าสงสัย\nมันหายไปไหนนะ"
10037-100370050 = "ไม่ได้นับผิดหรอกเหรอ?"
10037-100370060 = "มีใครแอบกินหรือเปล่า?"
10037-100370070 = "ไม่มีทาง"
10037-100370080 = "ฉันกับสมาชิกคณะความมั่นคง\nคนอื่นช่วยกันนับตั้งหลายรอบ!"
10037-100370090 = "ไม่มีทาง"
10037-100370100 = "สมาชิกคณะความมั่นคงคอยดูแล\nอาหารของชมรมโภชนาการอยู่ตลอดเวลา!"
10037-100370110 = "ถ้าหากไม่ได้นับผิด\nแล้วก็ไม่มีใครแอบกิน ก็แสดงว่า..."
10037-100370120 = "นี่เป็นฝีมือของสายลับที่จ้อง\nจะทำลายสหภาพเรดวินเทอร์!"
10037-100370130 = "สายลับ?"
10037-100370140 = "ใช่ เพราะนอกจากสหภาพเรดวินเทอร์\nจะกว้างขวางมากแล้ว การระบุตัวนักเรียน\nก็ยังไม่สมบูรณ์นัก จึงยังมีนักเรียนบางคน\nที่สำนักเลขาธิการไม่สามารถระบุตัวได้"
10037-100370150 = "จึงไม่แปลกหรอกค่ะถ้าหนึ่งในนั้น\nจะเป็นสายลับที่โรงเรียนอื่นส่งมา"
10037-100370160 = "ฉันมั่นใจว่าสายลับจะต้องใช้ช่องโหว่นี้\nในการก่อความขัดแย้งภายใน\nสหภาพเรดวินเทอร์ เจ้าคนน่ารังเกียจ!"
10037-100370170 = "ถ้างั้นตั้งแต่วันนี้เป็นต้นไปจะเริ่ม\nปฏิบัติการพิเศษสืบหาสายลับละนะ!"
10037-100370180 = "มีเรื่องอีกแล้วละครู เรื่องสายลับน่ะ"
10037-100370190 = "คราวนี้เหมือนสายลับที่น่ารังเกียจนั่น\nจะขโมยพุดดิ้งของประธานเชริโน่ไป"
10037-100370200 = "ทำไมถึงรีบด่วนสรุปว่าเป็นฝีมือสายลับล่ะ?"
10037-100370210 = "ก็เพราะระบบความปลอดภัย\nของสหภาพเรดวินเทอร์สมบูรณ์\nแบบเสมอไงล่ะ!"
10037-100370220 = "หากไม่มีสายลับคืบคลานเข้ามา\nก่อเรื่องละก็ เราก็ไม่เห็นเหตุผลอื่น\nที่จะเกิดปัญหาแล้วล่ะ!"
10037-100370230 = "เพราะงั้นคราวนี้ฉันจึงมั่นใจ\nว่าเป็นฝีมือของสายลับ"
10037-100370240 = "แต่ท่านประธานเชริโน่ดันคิดว่า\nฉันเป็นคนขโมยพุดดิ้งไปกินนี่สิ..."
10037-100370250 = "ก็จริงอยู่ที่ท่านประธานมีสิทธิ์ที่จะ\nสงสัย..."
10037-100370260 = "ครั้งนี้ฉันจึงต้องจับตัวสายลับมาให้ได้\nเพื่อพิสูจน์ความบริสุทธิ์ของตัวเอง!"
10037-100370270 = "มีข่าวร้ายน่ะครู..."
10037-100370280 = "ฉันถูกลงโทษหนักที่ไปยิงรูปปั้น\nท่านประธานเชริโน่..."
10037-100370290 = "โดนให้ไปอยู่อาคารเรียนเก่าเหรอ?"
10037-100370300 = "แล้วครูจะหาเวลาไปเยี่ยมนะ"
10037-100370310 = "ไม่ใช่แบบนั้นสักหน่อย!!"
10037-100370320 = "ฉันไม่ต้องไปอาคารเรียนเก่า\nเพราะท่านประธานเชริโน่ยังเมตตาฉัน"
10037-100370330 = "แต่ได้รับโทษทำความสะอาดห้องน้ำ\n1 อาทิตย์เหมือนคราวก่อน..."
10037-100370340 = "งานนี้ทั้งน่าอับอายและลำบาก\nแต่ในเมื่อเป็นคำสั่งจากท่านประธาน\nเชริโน่ก็คงช่วยไม่ได้"
10037-100370350 = "มารินะคนนี้จะทำตามคำสั่ง\nของท่านประธานอย่างแข็งขัน!"
10037-100370360 = "ทำคนเดียวคงเหนื่อยน่าดูเลยนะ"
10037-100370370 = "หืม? หมายความว่าอะไร?"
10037-100370380 = "ครูก็ต้องไปทำความสะอาดกับฉันด้วยสิ"
10037-100370390 = "ไหงเป็นงั้นอะ?"
10037-100370400 = "ก็เพราะครูอยู่กับฉันด้วย\nตอนรูปปั้นท่านประธานแตกไง"
10037-100370410 = "การปกป้องหนวดแห่งอำนาจ\nเป็นหน้าที่ของทุกคน เพราะงั้นครู\nจึงมีส่วนต้องรับผิดชอบด้วย\nโทษฐานไม่ปกป้องหนวด!"
10037-100370420 = "เอาละ พรุ่งนี้ฉันจะเริ่มทำความสะอาด\nตั้งแต่เช้า มาเจอกันหน้าอาคาร\nสำนักเลขาธิการก่อน 7 โมงนะ!"
10037-100370430 = "บังคับกันนี่นา..."
10037-100370440 = "เอ่อ... ครู..."
10037-100370450 = "ขอโทษที่รบกวนนะ แต่ครูช่วยมาหา\nฉันหน่อยสิ แล้วฉันจะบอกว่าที่ไหน"
10037-100370460 = "พอดีฉันเจอเรื่องน่าอายที่บอก\nสมาชิกสำนักเลขาธิการไม่ได้..."
10037-100370470 = "อื้ม ครูจะไปเดี๋ยวนี้ละ"
10037-100370480 = "มีเรื่องอะไรเหรอ?"
10037-100370490 = "เรื่องนั้น ขอโทษที่เรียกให้มาหาใน\nพื้นที่ห่างไกลจากสำนักเลขาธิการนะ..."
10037-100370500 = "ฉันโดนสมาชิกคณะความมั่นคงคุมตัวอยู่น่ะ..."
10037-100370510 = "ว่าไงนะ เกิดเรื่องอะไรน่ะ?"

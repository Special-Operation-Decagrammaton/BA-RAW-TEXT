[translation]
16011-160110010 = "선생님. 혹시 지금 시간 괜찮으실까요."
16011-160110020 = "다름이 아니라 이번에 열릴 황륜대제와 관련해서 검토해야 할 사항이 있는데,"
16011-160110030 = "다른 학교도 관련된 일이다 보니, 괜찮으시다면 함께 봐주실 수 있을까 해서 연락드렸습니다."
16011-160110040 = "물론이야. 바로 갈게."
16011-160110050 = "감사합니다, 선생님. "
16011-160110060 = "지금 바로 장소를 알려드리겠습니다."
16011-160110070 = "오늘 일은 정말로 감사드립니다. 선생님."
16011-160110080 = "같이 검토해 주신 것만 해도 감사한데, 방까지 바래다주시다니……."
16011-160110090 = "그러고 보니 선생님께서도 이번에 오신다고 알고 있습니다만."
16011-160110100 = "대회장에서도, 꼭 뵐 수 있었으면 좋겠습니다."
16011-160110110 = "그럼 모쪼록 조심해서 들어가세요."
16011-160110120 = "선생님. 혹시 지금 시간 좀 괜찮으실까요."
16011-160110130 = "이제 내일이면 황륜대제의 시작입니다만, 그 전에……."
16011-160110140 = "아"
16011-160110150 = "이번에는 상담이나 고민 탓에 연락드리는 게 아니라"
16011-160110160 = "오히려 그간 받은 도움들에 대한 보답 차원에서 말씀드렸습니다."
16011-160110170 = "좋지. 한 번 불러줘."
16011-160110180 = "지금 괜찮아. 어디로 가면 돼?"
16011-160110190 = "네."
16011-160110200 = "응해 주셔서 감사합니다. 그러면 장소를 알려드리도록 하겠습니다."
16011-160110210 = "생각지 않게 선생님의 시간을 오래 써버렸군요."
16011-160110220 = "배려에 감사드립니다."
16011-160110230 = "가지고 가신 레몬 벌꿀 절임"
16011-160110240 = "부족하다 싶으시면 언제든 말씀해 주세요. 아직 많이 남았으니까요."
16011-160110250 = "음"
16011-160110260 = "그러지 않을 때도, 불러 주시면 찾아뵙도록 하겠습니다."
16011-160110270 = "여담입니다만"
16011-160110280 = "평소에는 잘 지키던 것도 상황이 바뀌면 곧잘 어려워지곤 하는 느낌이군요……"
16011-160110290 = "그게 무슨 이야기야?"
16011-160110300 = "……혹시 다이어트 이야기?"
16011-160110310 = "아무래도 주변 공기도 그렇고, 보이는 것도 많다 보니……"
16011-160110320 = "으음, 역시 아무것도 아닙니다. 신경 쓰지 말아 주세요."
16011-160110330 = "괜한 말씀 드려서 죄송합니다, 선생님."
16011-160110340 = "죄송합니다, 선생님. 애써 드린 걸 도리어 제가 다 먹어버려서……."
16011-160110350 = "나중에 다시 가져다드리도록 하겠습니다."
16011-160110360 = "괜찮아. 다음에 또 같이 먹으면 되지."
16011-160110370 = "그"
16011-160110380 = "다음에 또……말씀이십니까……?"
16011-160110390 = "칼로리가……"
16011-160110400 = "아닙니다. 네……"
16011-160110410 = "감사합니다……"
16011-160110420 = "선생님."
16011-160110430 = "그러고 보니 최근의 일들을 겪으며 생각해 본 것이 있습니다."
16011-160110440 = "선생님께선 주로 서류 업무나 책상 일을 하시는 걸로 알고 있는데……."
16011-160110450 = "너무 앉아만 있으면 몸에도 좋지 않으니, 가벼운 운동이라도 해보시는 건 어떨까요?"
16011-160110460 = "갑자기 운동 권유?"
16011-160110470 = "대운동회가 좋은 자극이 됐나 보구나."
16011-160110480 = "음"
16011-160110490 = "역시 좀 갑작스러운 느낌이시겠지요."
16011-160110500 = "당장 뭔가를 하자는 의미로 말씀드린 건 아니었습니다."
16011-160110510 = "저는 당분간 언제든 괜찮으니, 생각 있으실 때 편하게 연락주셨으면 합니다."
16011-160110520 = "그럼 기회가 온다면 그때 뵙는 것으로……."
16011-160110530 = "열심히 함께 운동한 것까진 좋았는데"
16011-160110540 = "나오는 김에 선생님과 들렀던 디저트 카페에서 먹은 양이 꽤 되는군요."
16011-160110550 = "생각해 보니 이런 식이면 운동을 한 의미가……."
16011-160110560 = "반대야, 반대. 맛있게 먹기 위해 운동을 하는 거니까!"
16011-160110570 = "행복을 위해 노력이 선행된 것뿐이지. 좋은 일이다!"
16011-160110580 = "……"
16011-160110590 = "그"
16011-160110600 = "그런 걸까요."
16011-160110610 = "그렇지요, 네. 그걸로 된 거겠지요."
16011-160110620 = "감사합니다. 또 뵙겠습니다."

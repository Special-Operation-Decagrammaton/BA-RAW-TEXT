[translation]
16011-160110010 = "คุณครู คือว่าตอนนี้ พอจะมีเวลาว่าง\nรึเปล่าคะ"
16011-160110020 = "มีเอกสารเกี่ยวกับงานฮาโลเฟสติวัล\nอยากให้ช่วยตรวจสอบน่ะค่ะ"
16011-160110030 = "งานนี้เป็นงานที่มีโรงเรียนอื่นร่วมด้วย\nถ้าคุณครูมีเวลาก็อยากขอรบกวนให้\nมาช่วยดูด้วยสักหน่อยน่ะค่ะ"
16011-160110040 = "แน่นอน เดี๋ยวครูไปหานะ"
16011-160110050 = "ขอบคุณค่ะคุณครู "
16011-160110060 = "ฉันจะส่งโลเคชั่นสถานที่ไปให้นะคะ"
16011-160110070 = "เรื่องวันนี้ ขอบคุณมากนะคะ คุณครู"
16011-160110080 = "ขอบคุณที่ช่วยตรวจสอบเอกสาร\nแล้วก็เรื่องที่มาส่งถึงห้องด้วย..."
16011-160110090 = "ฉันรู้ว่าคุณครูคงจะมางานด้วยอยู่แล้ว..."
16011-160110100 = "แต่ถ้าได้เจอกันที่สนามกีฬา ก็คงจะ\nดีนะคะ"
16011-160110110 = "เดินทางกลับดีๆ นะคะคุณครู"
16011-160110120 = "คุณครู ตอนนี้พอจะมีเวลาว่างรึเปล่าคะ?"
16011-160110130 = "พรุ่งนี้งานฮาโลเฟสติวัลก็จะเริ่มแล้ว\nคือว่าก่อนหน้านั้น..."
16011-160110140 = "อ๊ะ..."
16011-160110150 = "คราวนี้ฉันไม่ได้ส่งข้อความมาขอคำ\nปรึกษา หรือว่ามีเรื่องกังวลอะไรหรอก\nนะคะ"
16011-160110160 = "แต่ฉันอยากตอบแทนคุณครูที่คอย\nช่วยเหลือฉันมาโดยตลอดน่ะค่ะ"
16011-160110170 = "ครูว่างนะ เรียกครูไปได้"
16011-160110180 = "ตอนนี้ครูว่างพอดี จะให้ไปที่ไหนเหรอ?"
16011-160110190 = "ค่ะ"
16011-160110200 = "ขอบคุณนะคะคุณครู ถ้างั้นฉันจะส่ง\nโลเคชั่นไปให้นะคะ"
16011-160110210 = "ฉันรบกวนเวลาคุณครูนานกว่าที่คิดไว้\nซะแล้ว..."
16011-160110220 = "ขอบคุณที่สละเวลาให้ฉันนะคะ"
16011-160110230 = "มะนาวดองน้ำผึ้งที่เอากลับไปด้วย"
16011-160110240 = "ถ้าไม่พอละก็บอกได้เลยนะคะ ฉันยัง\nมีอยู่อีกเยอะเลยค่ะ"
16011-160110250 = "อืม..."
16011-160110260 = "แต่ถึงไม่ใช่เรื่องมะนาวดองน้ำผึ้ง\nถ้าคุณครูเรียก ฉันก็จะไปพบค่ะ"
16011-160110270 = "ถึงจะนอกเรื่องสักหน่อย..."
16011-160110280 = "แต่สิ่งที่เราทำได้ดีในช่วงปกติ\nพอสถานการณ์เปลี่ยนไปก็รู้สึกว่า\nมันยากขึ้นมากเลยค่ะ"
16011-160110290 = "หมายถึงอะไรเหรอ?"
16011-160110300 = "หมายถึงเรื่องไดเอตเหรอ?"
16011-160110310 = "ทั้งสิ่งรอบๆ ตัว แถมยังมีอะไรให้เห็น\nเยอะเลยด้วย..."
16011-160110320 = "อืม ไม่มีอะไรหรอกค่ะ คุณครูไม่ต้อง\nใส่ใจหรอกนะคะ"
16011-160110330 = "ขออภัยด้วยค่ะที่พูดอะไรเรื่อยเปื่อย"
16011-160110340 = "ขอโทษค่ะคุณครู ของที่คิดจะให้\nคุณครูแท้ๆ แต่ฉันดันกินไปแล้ว..."
16011-160110350 = "คราวหน้าจะเอาไปให้ใหม่นะคะ"
16011-160110360 = "ไม่เป็นไร คราวหน้ามากินด้วยกันเถอะ"
16011-160110370 = "อึก..."
16011-160110380 = "คราวหน้า... งั้นเหรอคะ...?"
16011-160110390 = "แคลลอรีมัน..."
16011-160110400 = "เปล่าค่ะ... ได้ค่ะ"
16011-160110410 = "ขอบคุณนะคะ"
16011-160110420 = "คุณครูคะ"
16011-160110430 = "พอมานึกดูแล้ว ฉันคิดได้เรื่องหนึ่ง\nหลังจากที่เกิดเรื่องเมื่อไม่นานมานี้ค่ะ"
16011-160110440 = "ฉันทราบดีว่าคุณครูจะทำงานเอกสาร\nหรืองานนั่งโต๊ะเป็นส่วนใหญ่"
16011-160110450 = "แต่ว่าถ้านั่งทำงานนานเกินไป มันจะ\nส่งผลเสียต่อสุขภาพได้ เพราะงั้นลอง\nออกกำลังกายเบาๆ ดูบ้างดีมั้ยคะ"
16011-160110460 = "ทำไมจู่ๆ ก็มาชวนออกกำลังกายล่ะ?"
16011-160110470 = "ได้แรงบันดาลใจมาจากงานกีฬาสินะ"
16011-160110480 = "อืม..."
16011-160110490 = "คิดแล้วเชียวว่ามันคงจะกะทันหันไป\nสินะคะ"
16011-160110500 = "ไม่ได้หมายความว่าจะต้องทำทันที\nเลยหรอกนะคะ"
16011-160110510 = "ฉันยินดีเสมอเลยนะคะ ถ้าคุณครู\nสนใจออกกำลังกายเมื่อไร ก็บอกฉัน\nได้เลยค่ะ"
16011-160110520 = "ถ้าคุณครูเกิดสนใจละก็... เอาไว้\nตอนนั้น..."
16011-160110530 = "ถ้าได้มาออกกำลังกายด้วยกันก็คงจะ\nดีนะคะ"
16011-160110540 = "ตอนที่แวะไปร้านขนมหวานกับคุณครู\nฉันกินของหวานไปเยอะมากเลยค่ะ"
16011-160110550 = "ถ้าเป็นแบบนี้ละก็... เรื่องออกกำลัง\nกายก็คงไม่มีประโยชน์..."
16011-160110560 = "ไม่ใช่ๆ ไม่ใช่สิ เราออกกำลังกาย\nเพื่อกินให้อร่อยต่างหาก!"
16011-160110570 = "เป็นความพยายามเพื่อความสุข!\nถือว่าเป็นเรื่องดีๆ นะ!"
16011-160110580 = "..."
16011-160110590 = "ใช่..."
16011-160110600 = "ใช่รึเปล่าคะ..."
16011-160110610 = "ใช่มั้ยคะ เป็นแบบนั้นใช่มั้ยคะ"
16011-160110620 = "ขอบคุณค่ะ ไว้พบกันใหม่นะคะ"

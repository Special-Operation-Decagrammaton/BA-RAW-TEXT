[translation]
16011-160110010 = "老師，請問現在有時間嗎？"
16011-160110020 = "關於這次舉辦的大運動會，有事要和您討論……"
16011-160110030 = "因為與其他學園也有關，想說如果老師不介意的話，能否請您一起看看，所以才向您聯絡"
16011-160110040 = "當然，我馬上過去"
16011-160110050 = "非常感謝"
16011-160110060 = "我將地點傳送給您哦"
16011-160110070 = "老師，今天真的很感謝您"
16011-160110080 = "不只願意和我一起討論，還送我回房間……"
16011-160110090 = "話說回來，據說這次的大運動會，老師也會參加"
16011-160110100 = "希望能在會場見到老師"
16011-160110110 = "那麼，時間已經不早了，請老師路上小心"
16011-160110120 = "老師，請問現在時間上方便嗎？"
16011-160110130 = "雖然明天大運動會就要開始了，在那之前……"
16011-160110140 = "啊，那個……"
16011-160110150 = "這次不是有事想商量之類的"
16011-160110160 = "而是想答謝老師這段時間的幫忙……"
16011-160110170 = "其實不用這麼在意的，謝謝你"
16011-160110180 = "沒問題唷。我該去哪呢？"
16011-160110190 = "感謝您的回覆"
16011-160110200 = "那麼我等著您"
16011-160110210 = "沒想到會佔用老師這麼多時間，真是不好意思"
16011-160110220 = "謝謝老師的關心"
16011-160110230 = "那個……蜂蜜漬檸檬"
16011-160110240 = "如果不夠的話，請隨時告訴我。我這裡還有很多"
16011-160110250 = "那個……"
16011-160110260 = "就算是其他的事，老師願意聯絡我的話，我會很高興的"
16011-160110270 = "雖然是題外話……"
16011-160110280 = "就算平常能夠好好克制自己，但情況改變的話就會變得十分困難呢……"
16011-160110290 = "怎麼突然這麼說呢？"
16011-160110300 = "……難道是指減肥嗎？"
16011-160110310 = "周圍的氣氛也有點浮躁，還有外表也……"
16011-160110320 = "不，沒什麼……請別在意"
16011-160110330 = "抱歉說了莫名其妙的話"
16011-160110340 = "對不起，老師。明明是要給老師的禮物卻被我吃光了……"
16011-160110350 = "之後再做給您哦"
16011-160110360 = "沒關係。下次再一起吃吧"
16011-160110370 = "呃……那個"
16011-160110380 = "一起吃的話……"
16011-160110390 = "卡路里會……有點……"
16011-160110400 = "不，嗯……"
16011-160110410 = "謝謝……"
16011-160110420 = "老師，您好"
16011-160110430 = "最近，有件事我有點在意"
16011-160110440 = "老師是以文件工作之類的……所謂的文書工作為主對吧？"
16011-160110450 = "聽說久坐對身體不好，老師要不要嘗試點輕鬆的運動呢？"
16011-160110460 = "我確實是缺乏運動呢。不過還真突然呢？"
16011-160110470 = "蓮實因為大運動會而覺醒了……！？"
16011-160110480 = "啊，那個……"
16011-160110490 = "這麼突然真是不好意思……那個，是如果您方便的話……"
16011-160110500 = "不是要老師馬上開始運動的意思"
16011-160110510 = "那個，因為我暫時都有空"
16011-160110520 = "您方便的時候如果能聯絡我，我會很開心的"
16011-160110530 = "雖然到一起運動為止都很好"
16011-160110540 = "但在回去時和老師一起去的咖啡廳裡，吃了不少甜點呢"
16011-160110550 = "這樣的話運動的意義就……"
16011-160110560 = "正好相反唷。就是為了吃好吃的東西才運動的！"
16011-160110570 = "這是為了幸福而努力，所以是好事唷！"
16011-160110580 = "……"
16011-160110590 = "是"
16011-160110600 = "是這樣嗎？"
16011-160110610 = "……這麼說也對，呵呵。就當作是那樣吧"
16011-160110620 = "非常感謝。那麼，之後還請多多關照"

[translation]
20044-200440010 = "트레이너."
20044-200440020 = "계십니까?"
20044-200440030 = "지금 침대에 누워 있어."
20044-200440040 = "그렇군요."
20044-200440050 = "이왕 누우신 김에"
20044-200440060 = "그 상태에서 할 수 있는 트레이닝을"
20044-200440070 = "소개해 드리는 건 어떨까 하는 생각이 들었습니다."
20044-200440080 = "트레이닝 이야기를 하려고 부른 거야?!"
20044-200440090 = "아."
20044-200440100 = "그건 아닙니다."
20044-200440110 = "아르바이트를 시작하게 되어서"
20044-200440120 = "그 사실을 알려드릴까 해서요."
20044-200440130 = "무슨 일로?"
20044-200440140 = "지금 새로, 특가로 출시된 트레이닝 머신이 있어서요."
20044-200440150 = "그걸 당장 구입하기에는 자금이 약간 모자라서 말이죠."
20044-200440160 = "얼마길래?"
20044-200440170 = "45만 엔입니다."
20044-200440180 = "원가는 60만 엔이고요."
20044-200440190 = "비싸!"
20044-200440200 = "그 정도라면, 예산을 신청하면 되지 않아?"
20044-200440210 = "그러면 시간이 너무 걸립니다."
20044-200440220 = "특가 기간도 끝나 버리겠죠."
20044-200440230 = "무엇보다 이 아르바이트는,"
20044-200440240 = "신체 단련을 겸할 수 있어서 일석이조이기까지 합니다."
20044-200440250 = "그런 아르바이트가 있었단 말인가……!"
20044-200440260 = "아무래도 직접 보여드리는 게 좋겠군요."
20044-200440270 = "애슬레틱 스타디움에서 만나면 좋을 것 같습니다."
20044-200440280 = "좋은 결과가 있었습니다. 트레이너."
20044-200440290 = "아뇨. 어쩌면 최고의 결과라고도 할 수 있겠군요."
20044-200440300 = "어떻게 됐길래?"
20044-200440310 = "일전에 말씀드린 그 트레이닝 머신을."
20044-200440320 = "일시불로 구입할 수 있게 되었습니다."
20044-200440330 = "일시불?!"
20044-200440340 = "네. 트레이너."
20044-200440350 = "노동의 대가란 이렇게나 좋은 것이군요."
20044-200440360 = "그렇지만 트레이닝 역시"
20044-200440370 = "몸을 힘들게 한다는 점에서는 비슷할 텐데……."
20044-200440380 = "왜 다들, 그렇게 트레이닝을 기피하는 걸까요?"
20044-200440390 = "그, 글쎄……."
20044-200440400 = "트레이너."
20044-200440410 = "살아가는 데 있어 중요한 것은, 뭐라고 생각하시나요?"
20044-200440420 = "휴식!"
20044-200440430 = "게임!"
20044-200440440 = "확실히 휴식은 중요하지요."
20044-200440450 = "휴식을 고려하지 않은 트레이닝은, 부상 위험뿐만 아니라"
20044-200440460 = "근성장 자체를 저해하기도 하니까요."
20044-200440470 = "게임, 이요……?"
20044-200440480 = "스트레스 관리의 일환이라는 것으로 이해하면 될까요?"
20044-200440490 = "확실히 스트레스가 관리되지 않으면, 신체에 부담이 가게 됩니다."
20044-200440500 = "그렇지만 저는 아무래도"
20044-200440510 = "'건강'만큼 중요한 것이 없다는 생각이 드는군요."
20044-200440520 = "트레이너."
20044-200440530 = "지금 잠깐 괜찮으실지요?"
20044-200440540 = "물론이지. 무슨 일이라도 있어?"
20044-200440550 = "이전 저희가 찾았던 그 스타디움에서"
20044-200440560 = "매니저분이 연락을 주셨습니다."
20044-200440570 = "그런데 여기에서, 트레이너의 조언을 구하고 싶은 부분이 있어서요."
20044-200440580 = "스타디움 매니저로부터의 연락……?"
20044-200440590 = "알았어. 지금 갈게!"
20044-200440600 = "안녕하십니까. 트레이너."
20044-200440610 = "큰 의미 없이 인사를 드려 보고 있는 것입니다만."
20044-200440620 = "괜찮으시다면 저희 트레이닝 센터에서"
20044-200440630 = "함께 몸이라도 풀어 보시는 건 어떨까 해서요."
20044-200440640 = "그것도 좋지만, 지금 큰일 났어, 스미레!"
20044-200440650 = "음?"
20044-200440660 = "트레이너께서 이렇게 다급한 반응을 보이시는 건"
20044-200440670 = "적어도 제 기억에는 없었던 일인 것 같군요."
20044-200440680 = "지금 온 인터넷이 스미레 이야기로 난리라니까!"
20044-200440690 = "저…… 요?"
20044-200440700 = "도대체 무슨 일이길래요?"
20044-200440710 = "일단 만나서 이야기하자!"
20044-200440720 = "제 기억이 맞다면……."
20044-200440730 = "트레이너께서 저를 먼저 만나자고 하는 것은"
20044-200440740 = "매우 드문 일인 듯합니다."
20044-200440750 = "어떤 의미로는 저에게 있어서도, 기념할만한 사건이군요."
20044-200440760 = "조금 기대가 되기도 합니다."
20044-200440770 = "그러면 사양하지 않고, 그렇게 하도록 하겠습니다."

[translation]
20044-200440010 = "เทรนเนอร์"
20044-200440020 = "อยู่มั้ยคะ?"
20044-200440030 = "อยู่สิ กำลังนอนอยู่บนเตียงเลย"
20044-200440040 = "งั้นเหรอคะ"
20044-200440050 = "ไหนๆ ก็กำลังนอนอยู่แล้ว"
20044-200440060 = "งั้นให้ฉันแนะนำการออกกำลังกาย"
20044-200440070 = "ในท่านอนให้มั้ยคะ?"
20044-200440080 = "ทักมาเพราะอยากคุยเรื่อง\nเทรนนิ่งเหรอ?!"
20044-200440090 = "อ่า"
20044-200440100 = "ไม่ใช่อย่างนั้นค่ะ"
20044-200440110 = "ฉันเริ่มทำงานพาร์ทไทม์แล้ว"
20044-200440120 = "ก็เลยอยากมาบอกน่ะค่ะ"
20044-200440130 = "ทำไมต้องงานล่ะ?"
20044-200440140 = "ตอนนี้มีเครื่องออกกำลังกายรุ่นใหม่\nที่วางขายในราคาพิเศษ"
20044-200440150 = "แต่ฉันก็ยังไม่มีเงินพอที่จะซื้อในตอนนี้\nน่ะค่ะ"
20044-200440160 = "ราคาเท่าไรเหรอ?"
20044-200440170 = "450,000 เยนค่ะ"
20044-200440180 = "ปกติ 600,000 เยนเลยค่ะ"
20044-200440190 = "แพงจัง!"
20044-200440200 = "ถ้างั้นก็น่าจะเบิกงบประมาณได้นี่นา?"
20044-200440210 = "แบบนั้นจะใช้เวลานานค่ะ"
20044-200440220 = "กว่าจะได้งบ ตอนนั้นก็คงไม่ลดราคา\nแล้วค่ะ"
20044-200440230 = "งานพาร์ทไทม์ของฉัน"
20044-200440240 = "เหมือนยิงปืนนัดเดียวได้นกสองตัว\nเพราะได้ฝึกร่างกายไปด้วยค่ะ"
20044-200440250 = "มีงานพาร์ทไทม์แบบนั้นด้วยเหรอ...!"
20044-200440260 = "คุณครูมาดูด้วยตัวเองจะดีกว่าค่ะ"
20044-200440270 = "แล้วเจอกันที่สนามแข่งขันกีฬานะคะ"
20044-200440280 = "ได้ผลลัพธ์ดีเลยค่ะ เทรนเนอร์"
20044-200440290 = "ไม่สิ จะบอกว่ามันเป็นผลลัพธ์ที่ดีที่สุด\nก็ได้ค่ะ"
20044-200440300 = "ทำไมเหรอ?"
20044-200440310 = "เครื่องออกกำลังกายที่ฉันเคยเล่าให้ฟัง\nก่อนหน้านี้น่ะ"
20044-200440320 = "ฉันซื้อแบบจ่ายเต็มจำนวนเลยค่ะ"
20044-200440330 = "จ่ายเต็มจำนวนเลยเหรอ?!"
20044-200440340 = "ค่ะ เทรนเนอร์"
20044-200440350 = "การทำงานที่ต้องลงแรงให้ผลลัพธ์ที่ดี\nขนาดนี้สินะคะ"
20044-200440360 = "ส่วนการเทรนนิ่งก็เหมือนกัน"
20044-200440370 = "ในแง่ของการขยับร่างกายแล้ว\nมันก็เหมือนกับการทำงาน..."
20044-200440380 = "แต่ทำไมทุกคนถึงเกี่ยงการเทรนนิ่งขนาดนั้นล่ะคะ?"
20044-200440390 = "นะ... นั่นสินะ..."
20044-200440400 = "เทรนเนอร์"
20044-200440410 = "คิดว่าอะไรคือสิ่งสำคัญในการใช้ชีวิต\nเหรอคะ?"
20044-200440420 = "การพักผ่อน!"
20044-200440430 = "เล่นเกม!"
20044-200440440 = "การพักผ่อนเป็นเรื่องสำคัญจริงๆ ค่ะ"
20044-200440450 = "การออกกำลังกายโดยไม่พักผ่อน\nไม่เพียงแต่เสี่ยงต่อการบาดเจ็บ"
20044-200440460 = "แต่มันจะยับยั้งการเจริญเติบโตของ\nกล้ามเนื้อเองด้วยค่ะ"
20044-200440470 = "เล่นเกม... เหรอคะ..?"
20044-200440480 = "มันเป็นส่วนหนึ่งของการคลาย\nความเครียดใช่มั้ยคะ?"
20044-200440490 = "จริงอยู่ที่ถ้าไม่จัดการความเครียด\nก็อาจส่งผลเสียต่อร่างกายได้"
20044-200440500 = "แต่ว่าสำหรับฉัน"
20044-200440510 = "คิดว่าสิ่งที่สำคัญที่สุดคือ 'สุขภาพ'\nที่แข็งแรงค่ะ"
20044-200440520 = "เทรนเนอร์"
20044-200440530 = "ตอนนี้พอมีเวลามั้ยคะ?"
20044-200440540 = "มีสิ มีเรื่องอะไรหรือเปล่า?"
20044-200440550 = "สนามกีฬาที่เราไปด้วยกันมาน่ะค่ะ"
20044-200440560 = "ผู้จัดการของที่นั่นเพิ่งติดต่อฉันมา"
20044-200440570 = "แต่ว่าฉันอยากขอคำแนะนำเกี่ยวกับ\nเรื่องนี้จากเทรนเนอร์หน่อยค่ะ"
20044-200440580 = "ผู้จัดการสนามกีฬาติดต่อมางั้นเหรอ...?"
20044-200440590 = "เข้าใจแล้ว ครูจะไปเดี๋ยวนี้เลย!"
20044-200440600 = "สวัสดีค่ะ เทรนเนอร์"
20044-200440610 = "ฉันก็อยากมาทักทายโดยที่ไม่มีเรื่อง\nอะไรบ้าง"
20044-200440620 = "แต่ถ้าไม่ติดอะไรละก็ ฉันอยากชวน\nเทรนเนอร์"
20044-200440630 = "มาขยับร่างกายด้วยกันในฟิตเนส\nเซ็นเตอร์น่ะค่ะ"
20044-200440640 = "มันก็ดีอยู่หรอกนะ แต่ตอนนี้มี\nเรื่องใหญ่แล้ว สึมิเระ!"
20044-200440650 = "หืม?"
20044-200440660 = "เท่าที่ฉันจำได้ ฉันไม่เคยเห็นเทรนเนอร์"
20044-200440670 = "ดูรีบร้อนแบบนี้มาก่อนเลยนะคะ"
20044-200440680 = "ตอนนี้มีเรื่องของสึมิเระ\nเต็มอินเทอร์เน็ตเลย!"
20044-200440690 = "เรื่องของฉัน... เหรอคะ?"
20044-200440700 = "เรื่องอะไรคะ?"
20044-200440710 = "มาเจอกันแล้วค่อยคุยดีกว่า!"
20044-200440720 = "ถ้าฉันจำไม่ผิด..."
20044-200440730 = "เทรนเนอร์แทบจะไม่ค่อยชวนฉันให้\nมาเจอ"
20044-200440740 = "แบบนี้เลยนี่คะ?"
20044-200440750 = "ในทางหนึ่ง นี่เป็นเหตุการณ์ที่น่าจดจำ\nเลยนะคะ"
20044-200440760 = "เริ่มจะตื่นเต้นขึ้นมาแล้วสิ"
20044-200440770 = "ถ้างั้นฉันจะไม่ปฏิเสธค่ะ แล้วมาเจอกัน\nนะคะ"

[translation]
20044-200440010 = "Trainer."
20044-200440020 = "Are you there?"
20044-200440030 = "I'm lying down on my bed right now."
20044-200440040 = "I see."
20044-200440050 = "Maybe I should"
20044-200440060 = "teach you some exercises"
20044-200440070 = "you can do while lying down."
20044-200440080 = "Did you text me to talk about exercises?!"
20044-200440090 = "Ah."
20044-200440100 = "No, not at all."
20044-200440110 = "I wanted to tell you"
20044-200440120 = "that I began a part-time job."
20044-200440130 = "What for?"
20044-200440140 = "There is a sale on a recently released machine I want."
20044-200440150 = "But I don't have the funds to purchase it at the moment."
20044-200440160 = "How much is it?"
20044-200440170 = "It's 450,000 yen."
20044-200440180 = "Original price was 600,000 yen."
20044-200440190 = "So expensive!"
20044-200440200 = "Shouldn't you just get it expensed by the school?"
20044-200440210 = "The paperwork would take too long."
20044-200440220 = "The sale is only going on for a limited time."
20044-200440230 = "As an added benefit, my part-time job"
20044-200440240 = "serves as a form of physical training. It's killing two birds with one stone."
20044-200440250 = "What kind of part-time work...?"
20044-200440260 = "It would be easier to show you."
20044-200440270 = "We can meet at the Athletic Stadium."
20044-200440280 = "I have good results to share with you, Trainer."
20044-200440290 = "No. The best results."
20044-200440300 = "What happened?"
20044-200440310 = "It's about the workout machine I wanted."
20044-200440320 = "I was able to pay for it upfront."
20044-200440330 = "Upfront?!"
20044-200440340 = "Yes, Trainer."
20044-200440350 = "It's pleasant to be able to enjoy the fruits of your own labor."
20044-200440360 = "Training is similar."
20044-200440370 = "It tires out your body, but has many benefits."
20044-200440380 = "So why do people go to such lengths to avoid training?"
20044-200440390 = "I-I wonder..."
20044-200440400 = "Trainer."
20044-200440410 = "What do you think is the most important thing in life?"
20044-200440420 = "Rest!"
20044-200440430 = "Gaming!"
20044-200440440 = "Rest really is important."
20044-200440450 = "Training without proper rest can not only increase risk of injury,"
20044-200440460 = "but also deter your muscle growth."
20044-200440470 = "Gaming, you say...?"
20044-200440480 = "Perhaps it's a tactic to manage stress?"
20044-200440490 = "That's true... Stress takes a great toll on your body if left unchecked."
20044-200440500 = "But for me,"
20044-200440510 = "there's nothing more important than health."
20044-200440520 = "Trainer."
20044-200440530 = "Do you have a moment?"
20044-200440540 = "Of course. What's up?"
20044-200440550 = "The manager from the stadium we went to last time"
20044-200440560 = "reached out to me."
20044-200440570 = "And I'd like your advice on something."
20044-200440580 = "The stadium manager...? Okay, I'm coming."
20044-200440590 = "I'm on my way!"
20044-200440600 = "Hello, Trainer."
20044-200440610 = "No issues this time. I just wanted to say hi."
20044-200440620 = "Also, if you were interested, I wanted to invite you to"
20044-200440630 = "do warm ups with me at the training center."
20044-200440640 = "Sure, sure! But first, there's an emergency, Sumire!"
20044-200440650 = "Hm?"
20044-200440660 = "I've never seen you speak with such urgency."
20044-200440670 = "At least not from what I can recall."
20044-200440680 = "The whole internet is talking about you!"
20044-200440690 = "Me...?"
20044-200440700 = "What's going on?"
20044-200440710 = "Let's meet up and talk!"
20044-200440720 = "I also cannot recall"
20044-200440730 = "Trainer being the one"
20044-200440740 = "to initiate a meetup."
20044-200440750 = "In a way, it's a memorable event for me."
20044-200440760 = "I'm even looking forward to it a bit."
20044-200440770 = "In that case, I'll see you soon."

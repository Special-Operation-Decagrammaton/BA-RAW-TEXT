[translation]
20044-200440010 = "指導員"
20044-200440020 = "你在嗎？"
20044-200440030 = "我現在正躺在床上"
20044-200440040 = "我知道了"
20044-200440050 = "既然躺下來了"
20044-200440060 = "那我就來說明一下"
20044-200440070 = "躺著的狀態下可以做什麼訓練吧"
20044-200440080 = "找我就是為了說訓練的事嗎！？"
20044-200440090 = "啊"
20044-200440100 = "不是那樣的"
20044-200440110 = "其實是因為我要開始打工了"
20044-200440120 = "所以想先跟老師說一聲"
20044-200440130 = "怎麼突然要打工呢？"
20044-200440140 = "因為最近有一款新型的訓練機正在特價"
20044-200440150 = "但我現在的資金不足，沒辦法直接買下來"
20044-200440160 = "要多少錢？"
20044-200440170 = "45萬"
20044-200440180 = "原價是60萬元"
20044-200440190 = "好貴！"
20044-200440200 = "這個金額的話，沒辦法申請預算嗎？"
20044-200440210 = "那樣會花太多時間"
20044-200440220 = "等預算撥下來的時候，特價早就結束了"
20044-200440230 = "而且最重要的是"
20044-200440240 = "這份打工還能兼顧鍛鍊身體，簡直是一舉兩得"
20044-200440250 = "有這種打工嗎……！"
20044-200440260 = "看來直接讓老師看看比較快呢"
20044-200440270 = "我們在田徑運動場見吧"
20044-200440280 = "事情有了一個很好的結果，指導員"
20044-200440290 = "不，就算說是最好的結果也不為過"
20044-200440300 = "怎麼說呢？"
20044-200440310 = "之前提過的那款訓練機"
20044-200440320 = "我可以一次付清買下來了"
20044-200440330 = "一次付清！？"
20044-200440340 = "沒錯，指導員"
20044-200440350 = "原來所謂的勞動，能換來這麼好的成果啊"
20044-200440360 = "不過這其實跟訓練也相差無幾"
20044-200440370 = "明明都一樣會讓身體勞累……"
20044-200440380 = "為什麼大家只逃避訓練呢？"
20044-200440390 = "這，這個嘛……"
20044-200440400 = "指導員"
20044-200440410 = "你覺得生活中，什麼是最重要的呢？"
20044-200440420 = "休息！"
20044-200440430 = "遊戲！"
20044-200440440 = "休息的確很重要呢"
20044-200440450 = "如果只顧著訓練而忽略休息的話，除了有受傷的風險之外"
20044-200440460 = "也會阻礙肌肉的成長"
20044-200440470 = "遊戲……？"
20044-200440480 = "是作為紓解壓力的一環是嗎？"
20044-200440490 = "沒有適時放鬆壓力，確實會對身體造成負擔"
20044-200440500 = "不過我還是覺得"
20044-200440510 = "生活中沒有什麼比「健康」更重要了"
20044-200440520 = "指導員"
20044-200440530 = "可以打擾你一下嗎？"
20044-200440540 = "當然可以。有什麼事嗎？"
20044-200440550 = "其實是我們之前去的那個運動場"
20044-200440560 = "那邊的經理主動聯絡了我"
20044-200440570 = "所以我希望能尋求指導員的建議"
20044-200440580 = "運動場的經理聯絡你……？"
20044-200440590 = "知道了。我馬上過去！"
20044-200440600 = "你好啊，指導員"
20044-200440610 = "其實也沒什麼事，只是想跟你打個招呼而已"
20044-200440620 = "如果方便的話，要不要來我們訓練中心"
20044-200440630 = "一起活動一下身體呢？"
20044-200440640 = "有空的話我也很想這麼做，但現在事情非同小可，堇！"
20044-200440650 = "嗯？"
20044-200440660 = "在我印象中，這好像是我第一次看到"
20044-200440670 = "指導員這麼慌張的樣子呢"
20044-200440680 = "現在整個網路上都在瘋狂討論堇的事情！"
20044-200440690 = "討論我……？"
20044-200440700 = "究竟發生什麼事了？"
20044-200440710 = "總之先見面再說吧！"
20044-200440720 = "如果我沒記錯的話……"
20044-200440730 = "指導員主動說要見我"
20044-200440740 = "似乎是極為罕見的情況呢"
20044-200440750 = "在某種層面上，這對我來說也是十分值得紀念的事件"
20044-200440760 = "而且也稍微有點期待"
20044-200440770 = "那麼我就不客氣了，待會見"

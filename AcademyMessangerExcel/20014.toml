[translation]
20014-200140010 = "老師，夏萊有針線盒嗎？"
20014-200140020 = "嗯，放在桌上哦"
20014-200140030 = "儘管用吧，不過為什麼要針線盒呢？"
20014-200140040 = "因為鋼盔帶好像快斷掉了"
20014-200140050 = "現在又是這種狀況，只好自己修了……"
20014-200140060 = "難道修的時候會把鋼盔脫下來嗎？"
20014-200140070 = "嘛，那是當然的"
20014-200140080 = "……為什麼會被認為是「絕對不會脫下來」的那種人呢"
20014-200140090 = "老師，為了保險起見"
20014-200140100 = "我在夏萊前面放了一個籃子，希望你好好放著別動它。我會把它帶回去的"
20014-200140110 = "啊，你說放了很多像草一樣的東西的那個嗎？"
20014-200140120 = "沒錯。不過竟然說是草……老師不知道「楤木」嗎？"
20014-200140130 = "那是剛長出來的楤木芽，是在這附近也能輕鬆入手的珍味之一"
20014-200140140 = "就算只是稍微燙一下就已經很美味了，做成天婦羅也不錯。很下飯的哦"
20014-200140150 = "……不過，現在這種麵粉和油都無法輕鬆取得的狀況，要做天婦羅簡直是癡人說夢"
20014-200140160 = "雖然不太確定……"
20014-200140170 = "不過在西邊的山路上好像長著很多類似的東西"
20014-200140180 = "真的嗎！？"
20014-200140190 = "老師，請立刻帶我去吧！"
20014-200140200 = "老師，夏萊的電視有錄影功能嗎？"
20014-200140210 = "今晚在「克洛盧斯頻道」有個我想看的紀錄片……"
20014-200140220 = "嗯，我會幫你錄的"
20014-200140230 = "啊"
20014-200140240 = "幫大忙了，謝謝你"
20014-200140250 = "最近到處都是有各種功能的機器，說明書也漸漸都電子化，讀起來很不方便……"
20014-200140260 = "好懷念功能單純又好上手的老產品啊……"
20014-200140270 = "呃，你說「老」產品……"
20014-200140280 = "嗯？"
20014-200140290 = "你是想說我像個「老奶奶」一樣嗎？"
20014-200140300 = "呃，我不是這個意思……"
20014-200140310 = "剛剛我從女武神警察學園裡認識的人聽說"
20014-200140320 = "有很多露營用品被丟在公園的後山裡"
20014-200140330 = "以前似乎有個像基地一樣的據點在那裡，或許是放棄據點的時候就被丟棄在那裡了"
20014-200140340 = "就算是老舊的東西，對現在的我們來說也比沒有還好"
20014-200140350 = "我在想這個周末要不要過去看看……"
20014-200140360 = "那個，從聽到的消息來看，量大概不少"
20014-200140370 = "你能一起來的話就幫大忙了"
20014-200140380 = "嗯，了解。我很樂意"
20014-200140390 = "謝謝"
20014-200140400 = "其他隊員好像都在忙，不過一個人來回搬又有點……"
20014-200140410 = "話說回來，那座山的山路好像挺險峻的"
20014-200140420 = "我想還是穿得像樣一點比較好"
20014-200140430 = "老師，不好意思"
20014-200140440 = "能幫我看看休息室有沒有一本書嗎？"
20014-200140450 = "應該在桌上才對，如果有看到的請幫我收起來"
20014-200140460 = "上面寫著「空井」的名字，應該一眼就能認出來"
20014-200140470 = "知道了嗎？我等等到夏萊的時候再跟你拿！"
20014-200140480 = "老師，你今天什麼都沒看到"
20014-200140490 = "要是洩露情報的話，我可是會不惜動用武力的哦！"
20014-200140500 = "這是簽字筆，不太容易擦掉耶"
20014-200140510 = "你活該！"
20014-200140520 = "因為咲希幫忙寫字，感覺好像變成教戰手冊了呢"
20014-200140530 = "你在胡說"
20014-200140540 = "八道什麼"
20014-200140550 = "想嚐嚐迫擊砲的滋味是吧，你給我等著"

[translation]
20014-200140010 = "คุณครู ที่ชาเล่ต์มีกล่องอุปกรณ์เย็บผ้าบ้าง\nหรือเปล่า?"
20014-200140020 = "อื้อ มีอยู่บนโต๊ะครูน่ะ"
20014-200140030 = "ทำไมจู่ๆ ถึงถามหากล่องอุปกรณ์เย็บผ้าล่ะ?"
20014-200140040 = "คือว่าผ้าที่บุอยู่ด้านในหมวกเหล็กที่ใส่อยู่\nมันหลุดหมดแล้วน่ะ"
20014-200140050 = "สถานการณ์ตอนนี้จะขออุปกรณ์เพิ่ม\nก็คงยาก เพราะงั้นซ่อมเองคงจะง่ายกว่าน่ะ"
20014-200140060 = "หมวกเหล็กนั่น ถอดออกมาได้ด้วยแฮะ..."
20014-200140070 = "หืม? ก็เป็นอุปกรณ์นี่นา ต้องถอดออกได้อยู่\nแล้วสิ"
20014-200140080 = "ทำไมทำเหมือนฉันเป็นพวกสัตว์ประหลาด\nที่ตัวติดอยู่กับหมวกเลยล่ะ..."
20014-200140090 = "คุณครู อย่าเพิ่งทิ้งตะกร้าที่วางอยู่ด้านหน้า\nชาเล่ต์นะ"
20014-200140100 = "เดี๋ยวขากลับฉันจะแวะไปเอา"
20014-200140110 = "แต่มันมีหญ้าอะไรอยู่ข้างในเต็มเลยนะ..."
20014-200140120 = "หญ้าที่ไหนกันล่ะ คุณครูไม่รู้จักผักทาระ\nรึไง?"
20014-200140130 = "ยอดผักทาระสดๆ แบบนี้เป็นอาหารชั้นดี\nจากธรรมชาติเลยนะ"
20014-200140140 = "เอาไปลวกในน้ำร้อนกิน มันอร่อย\nมากนะ หรือจะเอาไปทอดกินกับข้าว\nแบบเทมปุระก็ได้"
20014-200140150 = "ถึงตอนนี้พวกเราจะไม่มีน้ำมันกับแป้ง\nมาทำเทมปุระก็เถอะ..."
20014-200140160 = "หญ้าพวกนี้..."
20014-200140170 = "มันขึ้นอยู่แถวๆ ทางเดินเขาแถบชานเมือง\nด้านตะวันตกนี่นา"
20014-200140180 = "ว่าไงนะ? คุณครูบอกว่าที่ไหนนะ?"
20014-200140190 = "รีบบอกมาเร็วๆ เลย!"
20014-200140200 = "คุณครู รู้วิธีอัดวิดีโอของทีวีในห้องพักผ่อน\nรึเปล่า?"
20014-200140210 = "คืนนี้จะมีสารคดีที่น่าสนใจฉายที่ช่อง\nโครโนสน่ะ..."
20014-200140220 = "เดี๋ยวครูอัดไว้ให้"
20014-200140230 = "อื้อ ขอบคุณนะ"
20014-200140240 = "สมัยนี้อุปกรณ์เครื่องใช้ไฟฟ้ามีฟังก์ชัน\nเยอะเกินไปจนบางครั้งก็ใช้งานยากกว่า\nเดิมมากเลย"
20014-200140250 = "แถมคู่มือก็ยังปรับเป็นรูปแบบดิจิทัลอีกด้วย\nเลยอ่านยากขึ้น..."
20014-200140260 = "ฉันคิดถึงพวกเครื่องใช้ไฟฟ้าแบบเก่าที่มี\nแค่ฟังก์ชันพื้นฐานจัง"
20014-200140270 = "สมกับเป็นซากิดีนะ..."
20014-200140280 = "ว่ายังไงนะ...?"
20014-200140290 = "จะบอกว่าฉันเหมือนคุณยายแก่ๆ งั้นเหรอ?!"
20014-200140300 = "ไม่ได้พูดแบบนั้นสักหน่อย..."
20014-200140310 = "คุณครู เมื่อกี้ฉันได้ข่าวมาจากคนรู้จัก\nที่อยู่ที่สถาบันฝึกตำรวจวัลคิรี่น่ะ"
20014-200140320 = "เธอบอกว่าที่เนินเขาที่อยู่ด้านหลังสวน\nสาธารณะมีอุปกรณ์ตั้งแคมป์ที่ไม่ได้ใช้งาน\nถูกทิ้งอยู่ที่นั่นด้วย"
20014-200140330 = "แถวๆ นั้นมีจุดตรวจอยู่และมีอุปกรณ์ต่างๆ\nถูกทิ้งไว้เยอะมาก"
20014-200140340 = "ถึงส่วนใหญ่จะเป็นของเก่า แต่สำหรับพวก\nเราที่ไม่มีอะไรเลยก็นับว่าเป็นประโยชน์มาก"
20014-200140350 = "วันหยุดนี้ฉันจะไปเดินป่าแล้วก็แวะไปดูของ\nสักหน่อย"
20014-200140360 = "แต่ถ้าจะหอบกลับมาคนเดียวก็คงจะ\nไม่ไหว..."
20014-200140370 = "คุณครูไปช่วยฉันหน่อยได้ไหม?"
20014-200140380 = "ได้สิ เดี๋ยวครูไปช่วยเอง"
20014-200140390 = "ขอบคุณที่ช่วยนะ"
20014-200140400 = "สมาชิกคนอื่นก็เหมือนจะยุ่งๆ กัน\nแต่ถ้าไปกลับคนเดียวคงลำบากมากแน่ๆ"
20014-200140410 = "อ๊ะ จริงสิ พอมานึกๆ ดูแล้ว ภูเขานั่นก็ขึ้นชื่อ\nเรื่องทางเดินที่ชันมากนะ"
20014-200140420 = "ถ้าเป็นไปได้ก็ใส่เสื้อหนาๆ ไปด้วยละ"
20014-200140430 = "คุณครู ขอโทษนะ"
20014-200140440 = "ช่วยหาหนังสือเล่มหนึ่งในห้องพักผ่อนให้\nหน่อยได้มั้ย?"
20014-200140450 = "น่าจะอยู่บนโต๊ะนะ ถ้าเจอก็ฝากเก็บไว้ด้วยล่ะ"
20014-200140460 = "ที่หน้าปกมีชื่อ 'โซราอิ' เขียนไว้อยู่ พอเห็นคงรู้ได้ในทันทีเลยละ "
20014-200140470 = "เข้าใจมั้ย? อีกเดี๋ยวฉันจะแวะไปรับที่ชาเล่ต์นะ!"
20014-200140480 = "คุณครู วันนี้ไม่เห็นอะไรเลยนะ เข้าใจมั้ย"
20014-200140490 = "หากมีข้อมูลรั่วไหล ฉันจะใช้กำลังโดย\nไม่ลังเลเลยนะ!"
20014-200140500 = "นี่เป็นปากกามาร์กเกอร์ถาวร มันจะลบไม่ออกหรอกนะ"
20014-200140510 = "งั้นก็เรื่องใหญ่เลยสิ!"
20014-200140520 = "พอซากิเขียนตัวหนังสือให้ มันก็เหมือนเป็นหนังสือเรียนเลยนะ"
20014-200140530 = "ฟหด"
20014-200140540 = "ฟหกดก"
20014-200140550 = "รอก่อนเหอะ ฉันจะไปเอาปืนครกมาเดี๋ยวนี้แหละ"

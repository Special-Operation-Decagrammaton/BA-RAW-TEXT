[translation]
20014-200140010 = "Sensei, is there a sewing box at Schale?"
20014-200140020 = "Yeah, on the office desk."
20014-200140030 = "Why do you need a sewing box?"
20014-200140040 = "Um, the lining of my helmet is really worn out."
20014-200140050 = "I obviously can't expect a replacement, so I'm trying to fix it myself."
20014-200140060 = "I didn't know you could take off your helmet."
20014-200140070 = "Huh? Of course I can. It's just equipment."
20014-200140080 = "Do you think I'm some kind of a weirdo that sleeps in my helmet?"
20014-200140090 = "Sensei, don't touch the basket in front of the Schale office."
20014-200140100 = "I'm gonna pick it up on my way back."
20014-200140110 = "It was full of some kind of grass."
20014-200140120 = "Grass? Don't you know what fatsia sprouts look like?"
20014-200140130 = "Fresh fatsia sprout is a delicacy readily available in the wild."
20014-200140140 = "You can lightly blanch it in water or deep fry it and put it on top of rice and eat it like tempura!"
20014-200140150 = "Of course, it'd be difficult to fry without flour or oil."
20014-200140160 = "That grass..."
20014-200140170 = "I saw a bunch of it on a mountain path in the western suburbs."
20014-200140180 = "What? Where is that, Sensei?"
20014-200140190 = "Take me there, now!"
20014-200140200 = "Sensei, do you know how to schedule recordings on the TV in the break room?"
20014-200140210 = "There's an interesting late-night documentary coming out tonight on the Kronos Channel..."
20014-200140220 = "I'll record it for you."
20014-200140230 = "Oh, um, thanks."
20014-200140240 = "Electronics nowadays have so many functions that it's almost inconvenient."
20014-200140250 = "Not only that, digital manuals are kinda hard to read..."
20014-200140260 = "I miss the regular products with basic functions..."
20014-200140270 = "You're kind of traditional..."
20014-200140280 = "What...?"
20014-200140290 = "Did you just call me old-fashioned?!"
20014-200140300 = "That's not exactly what I said..."
20014-200140310 = "Sensei, I heard something from my acquaintance at Valkyrie Police School."
20014-200140320 = "Some unused camping stuff was left on the hillside behind the park."
20014-200140330 = "When they evacuated a guard post nearby, they left behind their equipment."
20014-200140340 = "They're all kind of old, but we could probably use it."
20014-200140350 = "I'm gonna pick up the stuff when I go hiking this weekend."
20014-200140360 = "But I don't think I'll be able to get it all myself."
20014-200140370 = "...Can you help me?"
20014-200140380 = "Okay, sure. I'll help you."
20014-200140390 = "...Thanks for your help."
20014-200140400 = "Everyone else seemed busy, and I was worried I wouldn't be able to carry everything myself."
20014-200140410 = "Oh, just so you know, the hiking trail is supposed to be pretty hard..."
20014-200140420 = "Be sure to wear comfortable shoes."
20014-200140430 = "Sensei. Sorry to ask this."
20014-200140440 = "But by chance, did I leave a book in the lounge?"
20014-200140450 = "It might be on a table. If you find it, please keep it safe for me."
20014-200140460 = "It has \"Sorai\" written on it, so you'll know right away."
20014-200140470 = "Got it? I'll pick it up when I visit Schale later!"
20014-200140480 = "Sensei. You saw nothing today."
20014-200140490 = "If you spill anything, I'll resort to brute force!"
20014-200140500 = "That was permanent marker, so it didn't wash off easily."
20014-200140510 = "You had it coming!"
20014-200140520 = "Looks like it became a manual because you wrote it, Saki."
20014-200140530 = "asdf"
20014-200140540 = "asdfa"
20014-200140550 = "I'm heading over with a mortar. Wait right there."

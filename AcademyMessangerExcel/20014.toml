[translation]
20014-200140010 = "선생님, 혹시 샬레에 반짇고리 있어?"
20014-200140020 = "응, 사무실 책상에 있어."
20014-200140030 = "반짇고리는 갑자기 왜?"
20014-200140040 = "그게, 쓰고 다니던 철모의 내피가 삭아 끊어지려고 해서."
20014-200140050 = "추가 보급을 기대하기 어려운 상황이니 이 정도는 직접 수선해야지."
20014-200140060 = "그 철모, 벗을 수 있는 거구나……."
20014-200140070 = "응? 당연히 장비인데 벗을 수 있지."
20014-200140080 = "어째서 사람을 철모에 깃든 요괴 취급하는 거야……."
20014-200140090 = "선생님, 샬레 업무관 앞에 있는 바구니 치우지 마."
20014-200140100 = "돌아갈 때 가져갈 테니까."
20014-200140110 = "……뭔가 풀때기 같은 게 잔뜩 들어있던데."
20014-200140120 = "풀때기라니, 선생님은 두릅도 모르는 거야?"
20014-200140130 = "막 돋아난 두릅 순은 야생에서 쉽게 구할 수 있는 별미 중 하나지."
20014-200140140 = "물에 살짝 데쳐서 먹어도 맛있고, 튀기면 밥 위에 얹어 덴푸라처럼 먹을 수도 있다고!"
20014-200140150 = "물론 밀가루도 기름도 구할 수 없는 마당에 튀김은 어렵겠지만."
20014-200140160 = "그 풀이라면……"
20014-200140170 = "서쪽 교외의 산길에 잔뜩 자라고 있던데."
20014-200140180 = "뭐? 거기가 어디야, 선생님?"
20014-200140190 = "당장 안내해!"
20014-200140200 = "선생님, 혹시 휴게실에 있는 TV의 예약 녹화 기능 쓰는 법 알아?"
20014-200140210 = "오늘 밤 크로노스 채널에서 흥미로운 심야 다큐멘터리가 나온다고 해서……."
20014-200140220 = "내가 대신 녹화해둘게."
20014-200140230 = "어, 음. 고마워."
20014-200140240 = "요새 전자 제품은 기능이 너무 많아서 오히려 더 불편할 때가 있단 말이지."
20014-200140250 = "게다가 매뉴얼도 점차 디지털화되어서 읽기도 불편하니……"
20014-200140260 = "기본적인 기능에 충실하던 옛날 제품들이 그리워."
20014-200140270 = "뭔가 사키는 예스럽네……"
20014-200140280 = "뭐……?"
20014-200140290 = "지금 나를 할머니 같다고 한 거야?!"
20014-200140300 = "그런 말은 하지 않았어……."
20014-200140310 = "선생님. 방금 발키리 경찰학교의 지인에게 들었는데."
20014-200140320 = "공원 뒤의 산 중턱에 안 쓰는 야영 물자가 버려져 있대."
20014-200140330 = "그 근처에 초소가 있었을 때, 치장물자로 쌓아 둔 걸 버려두고 왔다나."
20014-200140340 = "대부분 낡은 물건이긴 하지만, 우리 입장에서는 없는 것보다 도움이 될 것 같아서."
20014-200140350 = "이번 주말에 등산을 겸해서 수거해 오려고."
20014-200140360 = "……다만 혼자 옮기기엔 양이 꽤 많은 것 같아서."
20014-200140370 = "선생님이 좀 도와줄 수는 없을까?"
20014-200140380 = "응. 괜찮아. 도와줄게."
20014-200140390 = "선뜻 도와줘서 고마워."
20014-200140400 = "다른 대원들도 바쁜 것 같고, 혼자서 왕복하는 것도 어려워서 곤란하던 참이었거든."
20014-200140410 = "아, 참. 그러고 보니 그 산은 등산로가 험하기로 유명하니까……"
20014-200140420 = "가급적 두꺼운 옷을 입고 오는 게 좋을 거야."
20014-200140430 = "선생님. 미안한데 말이지."
20014-200140440 = "혹시 휴게실에 책 하나 있나 찾아봐 줄 수 있어?"
20014-200140450 = "아마도 테이블 위에 있을 텐데, 있으면 보관해 줘."
20014-200140460 = "'소라이' 라고 이름 적혀있어서 한눈에 알아볼 수 있을 거야."
20014-200140470 = "알았지? 이따가 샬레에 들릴 때 받아 갈게!"
20014-200140480 = "선생님, 오늘은 아무것도 못 본 거야."
20014-200140490 = "정보 누설하면, 무력행사도 불사할 거야!"
20014-200140500 = "이거 유성펜이라서 잘 안 지워지더라."
20014-200140510 = "쌤통이네!"
20014-200140520 = "사키가 글씨를 써주니까 교범이 된 것 같네."
20014-200140530 = "ㄹㄴㅇ"
20014-200140540 = "ㄴㅇㄹ"
20014-200140550 = "박격포 들고 갈 테니까 기다려."

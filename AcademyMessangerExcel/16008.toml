[translation]
16008-160080010 = "정시 보고 알림. 생활안전국 1학년, 후부키야."
16008-160080020 = "오늘도 특별한 문제는 없음. 계속 근무할게."
16008-160080030 = "후부키, 문자 잘못 보냈어."
16008-160080040 = "응, 알고 있으니까 걱정하지 마."
16008-160080050 = "나는 언제나 열심히 일하고 있으니까."
16008-160080060 = "……제대로 이해한 거 맞아?"
16008-160080070 = "그건 나도 잘 모르겠는데……."
16008-160080080 = "한번 경비국에 문의해 보는 게 어때?"
16008-160080090 = "여기서 갑자기 경비국이?"
16008-160080100 = "후부키, 무슨 문제라도 생긴 거야?"
16008-160080110 = "응, 나도 그렇게 생각해."
16008-160080120 = "………?"
16008-160080130 = "으으, 으으으……."
16008-160080140 = "지난번 근무 시간에 농땡이를 부리다 걸린 건 때문에"
16008-160080150 = "벌충으로 주말의 순찰 업무를 떠안아 버렸어……."
16008-160080160 = "휴일에도 일을 해야 한다니…… 불합리해……."
16008-160080170 = "자업자득이야."
16008-160080180 = "게다가 휴일에도 범죄는 벌어질 수 있으니까."
16008-160080190 = "말도 안 돼. 키보토스처럼 평화로운 도시가 어디 또 있다고?"
16008-160080200 = "기껏해야 학생들이 총격전을 벌이거나 가게가 폭파되는 게 고작이잖아."
16008-160080210 = "……고작?"
16008-160080220 = "경찰이 그런 말을 하면 안 되지……."
16008-160080230 = "으으, 귀찮아……."
16008-160080240 = "선생, 괜찮으면 이번 주말에 함께 시내 순찰을 나가지 않을래?"
16008-160080250 = "둘이서 구역을 나누어서 순찰하면 일이 더 빨리 끝날 거야!"
16008-160080260 = "벌충을 선생님에게 떠넘기지 마……."
16008-160080270 = "선생, 사건이야!"
16008-160080280 = "경비국에서 내려온 첩보에 의하면 불법 무기 거래를 일삼는 지명수배자가 오늘 블랙마켓에 나타날지도 모른대!"
16008-160080290 = "범죄자가 언제 지나갈지는 알 수 없으니까, 아무래도 근처에서 잠복근무를 해야 할 것 같아."
16008-160080300 = "지금 바로 출동하자!"
16008-160080310 = "……후부키?"
16008-160080320 = "갑자기 왜 그래? 어디 아파?"
16008-160080330 = "그게 무슨 반응이야, 선생."
16008-160080340 = "경찰이 사건에 의욕적으로 반응하는 게 뭐가 이상해?"
16008-160080350 = "하지만, 후부키 너……"
16008-160080360 = "외근 업무는 질색하는 거 아니었어?"
16008-160080370 = "더 길게 이야기할 시간도 없어!"
16008-160080380 = "선생, 나는 먼저 현장에 출동해서 기다리고 있을게!"
16008-160080390 = "지루하다……."
16008-160080400 = "놀 거리가 다 떨어져서 너무 지루해……."
16008-160080410 = "그럼 일을 해."
16008-160080420 = "차라리 아무것도 안 하고 말지, 일을 하기는 싫다구."
16008-160080430 = "애초에 지금 들어 온 일거리도 없긴 하지만."
16008-160080440 = "생활안전국에서 보통 처리하는 업무는 어떤 게 있는데?"
16008-160080450 = "……보통?"
16008-160080460 = "보통이라고 해도 생활안전국에는 거의 일이 들어오질 않아서."
16008-160080470 = "키리노처럼 일부러 일을 만드는 경우가 아니면 대부분은 앉아서 대기하는 게 보통이야."
16008-160080480 = "그것도 아니면…… 낮잠을 잔다든가?"
16008-160080490 = "그건 업무가 아니잖아."

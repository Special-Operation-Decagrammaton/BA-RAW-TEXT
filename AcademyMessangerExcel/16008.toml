[translation]
16008-160080010 = "這裡是生活安全局1年級的吹雪，進行定期聯絡"
16008-160080020 = "今天也沒有發現異常，將繼續執行任務"
16008-160080030 = "吹雪，你是不是傳錯人了？"
16008-160080040 = "嗯，我知道的，別擔心"
16008-160080050 = "那麼，努力工作吧"
16008-160080060 = "……吹雪？你說別擔心是指……？"
16008-160080070 = "這個我也不太清楚……"
16008-160080080 = "總之先去警備局問問看怎麼樣？"
16008-160080090 = "警備局……？"
16008-160080100 = "吹雪，你沒事吧？"
16008-160080110 = "嗯，我也這麼覺得"
16008-160080120 = "……？"
16008-160080130 = "……"
16008-160080140 = "因為之前在值勤時間摸魚被抓到的關係……"
16008-160080150 = "被處罰要在假日巡邏……"
16008-160080160 = "就連假日都得要工作，多不合理啊……"
16008-160080170 = "這不是你自作自受嗎……"
16008-160080180 = "不過，假日也是有可能發生犯罪的嘛。加油吧"
16008-160080190 = "奇普托斯基本上是個和平的地方啊……"
16008-160080200 = "頂多就是會發生學生們的槍擊戰或是炸毀店鋪之類的而已嘛……"
16008-160080210 = "「而已」……？"
16008-160080220 = "雖然確實有很多原因，不過警察不該說這種話吧……"
16008-160080230 = "麻煩死了……"
16008-160080240 = "不然……老師，這個周末要不要一起巡邏啊？"
16008-160080250 = "兩個人分別做的話，說不定一下就搞定了！？"
16008-160080260 = "是沒關係啦，不過把處罰丟給別人……"
16008-160080270 = "老師，有事件！"
16008-160080280 = "根據警備局的情報，一直以來都因為交易非法武器而被通緝的犯人，今天據說會出現在黑市！"
16008-160080290 = "因為不知道犯人什麼時候會通過，看來先在附近埋伏比較好"
16008-160080300 = "我們立刻出動吧！"
16008-160080310 = "……吹雪？"
16008-160080320 = "是不是哪裡不舒服？"
16008-160080330 = "那是什麼反應"
16008-160080340 = "警察對事件很積極是什麼奇怪的事嗎？"
16008-160080350 = "可是吹雪……"
16008-160080360 = "不是很討厭出外勤嗎？"
16008-160080370 = "現在不是說這些的時候了！"
16008-160080380 = "老師，我先到現場去等你！"
16008-160080390 = "好閒啊……"
16008-160080400 = "手邊的遊戲都玩完了，好無聊……"
16008-160080410 = "那試著好好工作怎麼樣呢？"
16008-160080420 = "絕對不要。不如開始「什麼都不做」吧……"
16008-160080430 = "再說現在也沒有任何工作要做"
16008-160080440 = "生活安全局平常都在做什麼呢？"
16008-160080450 = "平常啊……"
16008-160080460 = "其實生活安全局本來就沒什麼工作"
16008-160080470 = "雖然桐乃會自己找事做，不過基本上都是坐著待命哦"
16008-160080480 = "硬要說的話就是睡午覺吧"
16008-160080490 = "那不算是工作吧"

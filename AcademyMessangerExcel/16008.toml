[translation]
16008-160080010 = "Report by Fubuki, first-year student from the Public Safety Bureau."
16008-160080020 = "No problems today. I'm working real hard."
16008-160080030 = "Did you mean to send this to me?"
16008-160080040 = "Yeah, yeah. Don't worry about it."
16008-160080050 = "Like, I said: working hard."
16008-160080060 = "Did you read what I said?"
16008-160080070 = "I'm not sure what you mean..."
16008-160080080 = "Why don't you contact the Security Bureau?"
16008-160080090 = "What does the Security Bureau have to do with anything?"
16008-160080100 = "Fubuki, is something wrong?"
16008-160080110 = "Yeah, I think so too."
16008-160080120 = "...?"
16008-160080130 = "*sigh*..."
16008-160080140 = "I got caught slacking off during work."
16008-160080150 = "So I have to patrol this weekend as punishment."
16008-160080160 = "I can't believe I have to work weekends! So unfair!"
16008-160080170 = "You reap what you sow."
16008-160080180 = "Crime can occur on the weekends too."
16008-160080190 = "No way. Nowhere is more peaceful than Kivotos."
16008-160080200 = "All we have are occasional firefights between students and some store explosions. That's it."
16008-160080210 = "That's it?"
16008-160080220 = "Authorities shouldn't say things like that."
16008-160080230 = "Ugh. This is so annoying!"
16008-160080240 = "Sensei, why don't we go out on city patrol together this weekend?"
16008-160080250 = "If we split the area, the job will get done faster!"
16008-160080260 = "Don't try to dump your work on me."
16008-160080270 = "Big news, Sensei!"
16008-160080280 = "According to intelligence from the Security Bureau, a wanted fugitive for illegal arms trade could show up at the Black Market today!"
16008-160080290 = "We don't know when the criminal will show up, so we'll have to work undercover nearby."
16008-160080300 = "Let's leave now!"
16008-160080310 = "Fubuki? Is that really you?"
16008-160080320 = "Are you okay? You're not acting like yourself."
16008-160080330 = "What kind of reply is that, Sensei?"
16008-160080340 = "What's so strange about a cop being enthusiastic about a case?"
16008-160080350 = "But, you're Fubuki..."
16008-160080360 = "I thought you hated extra work..."
16008-160080370 = "There's no time to explain!"
16008-160080380 = "Sensei, I'll be waiting for you at the scene!"
16008-160080390 = "I'm bored..."
16008-160080400 = "I ran out of things to entertain me."
16008-160080410 = "Work could entertain you."
16008-160080420 = "I'd rather be bored doing nothing than work."
16008-160080430 = "There's nothing to work on right now anyway."
16008-160080440 = "What kind of work does the Public Safety Bureau usually handle?"
16008-160080450 = "Usually?"
16008-160080460 = "Very little work comes to the Public Safety Bureau."
16008-160080470 = "Unless you deliberately cause trouble like Kirino, most of the time we're on standby."
16008-160080480 = "Besides that...we take naps."
16008-160080490 = "That's not work."

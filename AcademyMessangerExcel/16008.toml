[translation]
16008-160080010 = "ประกาศแจ้ง นี่คือฟุบุกิ นักเรียน\nชั้นปีที่ 1 จากสำนักรักษาความปลอดภัย"
16008-160080020 = "วันนี้ไม่พบปัญหาอะไรเป็นพิเศษ\nจะปฏิบัติงานต่อทันที"
16008-160080030 = "ฟุบุกิ ส่งข้อความผิดรึเปล่า"
16008-160080040 = "อื้อ ฉันรู้แล้ว ไม่ต้องห่วงหรอกน่า"
16008-160080050 = "อย่างที่ฉันเคยบอกไง\nไม่ว่าตอนไหนฉันก็ตั้งใจทำงานมาก"
16008-160080060 = "ได้อ่านข้อความที่ครูส่งไปมั้ยเนี่ย?"
16008-160080070 = "เรื่องนั้นฉันก็ไม่รู้เหมือนกัน..."
16008-160080080 = "ลองติดต่อไปที่สำนักความมั่นคง\nดีกว่ามั้ย?"
16008-160080090 = "ทำไมจู่ๆ พูดถึงสำนักความมั่นคงล่ะ?"
16008-160080100 = "ฟุบุกิ มีเรื่องอะไรรึเปล่า?"
16008-160080110 = "อื้อ ฉันก็คิดแบบนั้นล่ะ"
16008-160080120 = "...?"
16008-160080130 = "เฮ้อ..."
16008-160080140 = "เพราะคราวที่แล้วฉันมัวแต่\nเอ้อระเหยตอนปฏิบัติหน้าที่"
16008-160080150 = "เลยถูกลงโทษให้มา\nลาดตระเวนในวันหยุดน่ะ..."
16008-160080160 = "ต้องทำงานในวันหยุดแบบนี้\nไม่ยุติธรรมเลย..."
16008-160080170 = "กรรมตามสนองไงล่ะ"
16008-160080180 = "ในวันหยุดก็อาจเกิด\nเหตุอาชญากรรมได้นะ"
16008-160080190 = "ไม่มีทางหรอก ไม่มีเมืองไหน\nสงบสุขเท่ากับคิโวทอสอีกแล้ว"
16008-160080200 = "อย่างมากก็แค่พวกเด็กนักเรียน\nถือปืนไปยิงกันในร้านหรือไม่ก็\nระเบิดร้านทิ้งก็แค่นั้นเอง"
16008-160080210 = "\"แค่นั้น\" งั้นเหรอ?"
16008-160080220 = "เจ้าหน้าที่ตำรวจ\nไม่ควรพูดแบบนั้นนะ"
16008-160080230 = "เชอะ น่าหงุดหงิดจริงๆ!"
16008-160080240 = "คุณครู ถ้ามีเวลาว่างวันหยุดแบบนี้\nไปลาดตระเวนกับฉันมั้ย?"
16008-160080250 = "ถ้าแบ่งเขตกันลาดตระเวน\nก็น่าจะทำงานได้เสร็จเร็วขึ้นนะ!"
16008-160080260 = "อย่าพยายามโยนงานให้ครูสิ"
16008-160080270 = "คุณครู เกิดเหตุแล้ว!"
16008-160080280 = "สายข่าวหน่วยข่าวกรองสำนักความมั่นคง\nแจ้งว่าจะมีอาชญากรที่มาตกลงซื้อขาย\nอาวุธผิดกฎหมายที่ตลาดมืดในวันนี้!"
16008-160080290 = "ไม่รู้ว่าพวกอาชญากรจะโผล่มาเมื่อไร\nยังไงก็คงจะต้องไปเฝ้าสังเกตการณ์แล้วล่ะ"
16008-160080300 = "รีบไปกันเถอะ!"
16008-160080310 = "ฟุบุกิ...?"
16008-160080320 = "เป็นอะไรรึเปล่า\nหัวไปกระแทกอะไรมารึเปล่า?"
16008-160080330 = "ทำไมพูดอะไรแบบนั้นเล่า คุณครู"
16008-160080340 = "เจ้าหน้าที่ตำรวจกระตือรือร้น\nจะทำคดีมันแปลกตรงไหนกัน?"
16008-160080350 = "แต่ว่าฟุบุกิ..."
16008-160080360 = "ครูคิดว่าเธอไม่ชอบ\nงานพวกนี้ซะอีก"
16008-160080370 = "ไม่มีเวลาจะมานั่งอธิบายแล้ว!"
16008-160080380 = "คุณครู งั้นฉันจะไปรอ\nอยู่ที่เกิดเหตุก่อนแล้วกัน!"
16008-160080390 = "น่าเบื่อจัง..."
16008-160080400 = "ไม่มีอะไรน่าสนใจ\nเลยเบื่อๆ น่ะ"
16008-160080410 = "ทำงานสิจะได้ไม่เบื่อ"
16008-160080420 = "ฉันยอมอยู่เบื่อๆ แบบนี้\nดีกว่าต้องทำงานนะ"
16008-160080430 = "ถึงมันจะไม่มีอะไร\nให้ทำอยู่แล้วก็เถอะ"
16008-160080440 = "ปกติแล้วที่สำนักรักษาความปลอดภัย\nทำงานอะไรเหรอ?"
16008-160080450 = "ปกติน่ะเหรอ?"
16008-160080460 = "ช่วงปกติ สำนักรักษาความ\nปลอดภัยก็ไม่ค่อยมีงานอะไรหรอก"
16008-160080470 = "ส่วนใหญ่ก็จะเตรียมรอออกปฏิบัติการ\nเว้นแต่ตั้งใจออกไปแบบคิริโนะน่ะ"
16008-160080480 = "นอกจากนั้นแล้ว\nก็คงนอนกลางวันมั้ง?"
16008-160080490 = "นั่นไม่ใช่งานซะหน่อย"

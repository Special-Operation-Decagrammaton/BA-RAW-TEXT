[translation]
10069-100690010 = "辛苦了，老師"
10069-100690020 = "那個，今天可以面談對吧？"
10069-100690030 = "抱歉讓你久等了。今天可以唷"
10069-100690040 = "啊哈哈"
10069-100690050 = "我知道夏萊的工作很忙，這也沒辦法"
10069-100690060 = "而且也是我拜託你的"
10069-100690070 = "那，我下午會過去，請多指教囉"
10069-100690080 = "嗯，我等你哦"
10069-100690090 = "好～待會見"
10069-100690100 = "老師"
10069-100690110 = "我有件事想拜託你……"
10069-100690120 = "現在在忙著工作嗎？"
10069-100690130 = "如果是瑠美的請求，我隨時都樂意幫忙"
10069-100690140 = "……呵呵，這樣啊"
10069-100690150 = "是真的吧？"
10069-100690160 = "那麼……"
10069-100690170 = "玄武商會，不"
10069-100690180 = "準確來說，是我個人的試作品"
10069-100690190 = "不介意的話可以麻煩你試吃嗎？"
10069-100690200 = "瑠美的新料理！"
10069-100690210 = "雖然還在試作階段就是了"
10069-100690220 = "可以請老師有空的時候到玄武商會來嗎？"
10069-100690230 = "我會等你的"
10069-100690240 = "老師，最近過得好嗎？"
10069-100690250 = "每餐都有好好吃飯吧？"
10069-100690260 = "我有乖乖吃飯……"
10069-100690270 = "我現在正好有事要去一趟山海經"
10069-100690280 = "哦，真的嗎？"
10069-100690290 = "有時間的話就來玄武商會吧"
10069-100690300 = "我會特別招待你的"
10069-100690310 = "老師可能不知道……"
10069-100690320 = "玄武商會有所謂的「本週料理」"
10069-100690330 = "本週……？"
10069-100690340 = "沒錯。每週都會選出不同的料理"
10069-100690350 = "並以略為便宜的價格提供給客人"
10069-100690360 = "至於……"
10069-100690370 = "這次的「本週料理」是餃子"
10069-100690380 = "餃子……好像很好吃……"
10069-100690390 = "所以我今天早上 "
10069-100690400 = "恐怕都得在廚房裡蒸餃子了"
10069-100690410 = "我可以去看看嗎？"
10069-100690420 = "哦，你很好奇嗎？"
10069-100690430 = "隨時都歡迎你來哦"
10069-100690440 = "如果老師有空的話……"
10069-100690450 = "我今天早上正好沒有工作"
10069-100690460 = "原來是這樣啊"
10069-100690470 = "我知道了"
10069-100690480 = "那我在玄武商會等你哦"

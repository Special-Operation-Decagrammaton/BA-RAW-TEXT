[translation]
10069-100690010 = "สวัสดีคุณครู"
10069-100690020 = "วันนี้มีเวลาว่างใช่มั้ย?"
10069-100690030 = "ขอโทษด้วยนะ ครูก็อยากหาเวลาว่าง\nให้เร็วกว่านี้แท้ๆ"
10069-100690040 = "ฮ่าฮ่าฮ่า"
10069-100690050 = "ช่วยไม่ได้นี่นา ก็คุณครูเป็นครูของชาเล่ต์\nที่มีงานรัดตัวตลอดนี่นา"
10069-100690060 = "ถ้าอย่างนั้น ฉันจะถือว่าคุณครูว่าง\nแล้วเข้าไปหาก็แล้วกันนะ"
10069-100690070 = "ฉันน่าจะไปถึงหลังเที่ยงนิดหน่อย\nเวลานั้นสะดวกใช่มั้ย?"
10069-100690080 = "ถ้างั้นครูจะรอนะ"
10069-100690090 = "งั้นไว้เจอกันนะ"
10069-100690100 = "คุณครู"
10069-100690110 = "ตอนนี้ว่างหรือเปล่า?"
10069-100690120 = "อย่าบอกนะว่ามีงานรอระบาย\nอยู่เยอะอีกแล้วน่ะ?"
10069-100690130 = "สำหรับนักเรียน ครูมีเวลาให้เสมอ"
10069-100690140 = "พูดจริง... ใช่มั้ย?"
10069-100690150 = "อื้ม..."
10069-100690160 = "เยี่ยมเลย"
10069-100690170 = "รอบนี้ย่านการค้าเทพเต่าดำ..."
10069-100690180 = "คือว่าฉันลองคิดค้นเมนูอาหาร\nใหม่ๆ อยู่น่ะ"
10069-100690190 = "ว่าไง อยากมาลองชิมดูหน่อยมั้ย?"
10069-100690200 = "เมนูใหม่ของรูมิงั้นเหรอ?!"
10069-100690210 = "ก็ประมาณนั้นแหละ"
10069-100690220 = "ถ้าคุณครูว่างละก็ มาที่ย่านการค้าเทพเต่าดำ\nหน่อยได้มั้ย?"
10069-100690230 = "ไม่ว่าเมื่อไรฉันก็จะรอคุณครูนะ"
10069-100690240 = "คุณครูสบายดีมั้ย?"
10069-100690250 = "ไม่ได้ลืมกินอาหารหรืออะไรอีก\nใช่มั้ย?"
10069-100690260 = "ครูไม่ทำแบบนั้นแล้ว..."
10069-100690270 = "ครูมีธุระที่ต้องแวะไปแถวๆ\nซานไห่จิงพอดีน่ะ"
10069-100690280 = "โอ้... อย่างนั้นเหรอ?"
10069-100690290 = "ถ้าพอมีเวลาละก็ แวะมาย่านการค้า\nเทพเต่าดำด้วยสิ"
10069-100690300 = "ฉันจะต้อนรับดูแลคุณครู\nอย่างดีเลย"
10069-100690310 = "คุณครูอาจจะไม่รู้..."
10069-100690320 = "แต่ย่านการค้าเทพเต่าดำมีเมนูประจำ\nสัปดาห์ด้วยนะ"
10069-100690330 = "มันคืออะไรเหรอ?"
10069-100690340 = "ก็ตามชื่อของมันนั่นแหละ มันหมายความว่า\nอาหารชนิดนั้น"
10069-100690350 = "จะขายในราคาถูกลงกว่าเดิมใน\nสัปดาห์นั้นๆ"
10069-100690360 = "และเมนูประจำสัปดาห์ที่เริ่มวางขาย\nวันนี้ก็คือ..."
10069-100690370 = "เกี๊ยวนั่นเอง"
10069-100690380 = "เกี๊ยว... ฟังดูดีเลย..."
10069-100690390 = "เพราะงั้นตลอดช่วงเช้าวันนี้ "
10069-100690400 = "คงต้องนึ่งเกี๊ยวกันยาวๆ เลย"
10069-100690410 = "ครูไปดูได้มั้ย?"
10069-100690420 = "โอ้... คุณครูจะมาสังเกตการณ์\nงั้นหรือ"
10069-100690430 = "ฉันไม่มีเหตุผลที่จะปฏิเสธ\nสักหน่อย"
10069-100690440 = "ถ้าคุณครูสะดวกจะมานะ"
10069-100690450 = "นานๆ ทีจะว่างตอนเช้าด้วย"
10069-100690460 = "งั้นเหรอ?"
10069-100690470 = "งั้นก็ได้เลย"
10069-100690480 = "ฉันจะรอนะ"

[translation]
10094-100940010 = "선생님, 선생님!"
10094-100940020 = "모모이, 모모이!"
10094-100940030 = "있잖아, 들어 봐!"
10094-100940040 = "메이드복이라는 게 생겼어!"
10094-100940050 = "그 말을 들으니까 불안해졌어!"
10094-100940060 = "그리하여, 나는 원대한 계획을 세운 것이었다……."
10094-100940070 = "메이드복을 입었더니, 갑자기!"
10094-100940080 = "메이드 같은 기분이 되어야 할 것 같은 거 있지!"
10094-100940090 = "정말 의식의 흐름대로네."
10094-100940100 = "아무튼! 그러니까!"
10094-100940110 = "메이드 같은 기분이 되려면, 그런 일을 해 봐야 하지 않을까?"
10094-100940120 = "그러니까 내가 샬레의 휴게실을 청소해 줄게!"
10094-100940130 = "그러면 선생님, 거기서 봐!"
10094-100940140 = "모모이? 모모이?!"
10094-100940150 = "선생님, 선생님!"
10094-100940160 = "응! 모모이, 모모이!"
10094-100940170 = "있잖아, 들어 봐!"
10094-100940180 = "메이드의 업무에 대해 조금 알아봤는데……."
10094-100940190 = "식사 준비도 아주 중요한 일이었대!"
10094-100940200 = "어…… 다 먹고 살자고 하는 일이니까……?"
10094-100940210 = "그리하여 나는 또 다시 원대한 계획을 세운 것이었다……."
10094-100940220 = "이번에는 내가 선생님에게"
10094-100940230 = "멋진 요리를 대접해 줄게!"
10094-100940240 = "그러면 선생님, 게임개발부실에서 봐!"
10094-100940250 = "모모이? 모모이?!"
10094-100940260 = "선생님!"
10094-100940270 = "모모이!"
10094-100940280 = "있잖아, 들어 봐!"
10094-100940290 = "메이드의 일과에 대해"
10094-100940300 = "쭉 잊고 있었던 것이 있었어……."
10094-100940310 = "갑자기 불안해졌다."
10094-100940320 = "그런 거 아니라니까!"
10094-100940330 = "이건 선생님도 좋아할 거라고!"
10094-100940340 = "……아마."
10094-100940350 = "그래서 잊고 있었던 게 뭐야?"
10094-100940360 = "그건 말이지……!"
10094-100940370 = "몸과 마음을 휴식하는 거야!"
10094-100940380 = "진짜 뜬금없네……."
10094-100940390 = "그렇지 않아!"
10094-100940400 = "원래 사람은 쉬지 않으면 고장 나는 법이라고?"
10094-100940410 = "그러니까 휴식은, 내일의 고된 일과를 위해서라도."
10094-100940420 = "반드시까지는 아니겠지만 상당히 필요한 일과인 거지!"
10094-100940430 = "앞뒤 사정 빼고, 휴식에는 나도 찬성."
10094-100940440 = "그렇지?"
10094-100940450 = "이번에 밀레니엄에 찾아오면"
10094-100940460 = "최고의 휴식을 만끽하게 해 줄게!"
10094-100940470 = "우에엥……"
10094-100940480 = "아직도 온몸이 아파……"
10094-100940490 = "나도 그래……."
10094-100940500 = "휴식이란 이렇게 어려운 일과였단 말인가!"
10094-100940510 = "평범하게 쉬는 게 좋지 않을까……."
10094-100940520 = "하지만 말이지!"
10094-100940530 = "뭔가 아깝잖아!"
10094-100940540 = "좀 더 슈퍼–하고, 울트라–한데다."
10094-100940550 = "획기적이고 기발하면서 효율적이고 기억에 남는!"
10094-100940560 = "그런 휴식법 없을까, 선생님?"
10094-100940570 = "우리들의 허리가 나으면, 같이 생각해 보자……."
10094-100940580 = "……."
10094-100940590 = "알았어……."
10094-100940600 = "약속한 거다, 선생님?"

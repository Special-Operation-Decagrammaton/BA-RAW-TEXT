10094-100940240 = "所以老師，待會在遊戲開發部的部室見囉！"
10094-100940250 = "桃井？桃井！？"
10094-100940260 = "老師！"
10094-100940270 = "桃井！"
10094-100940280 = "老師，你聽我說！"
10094-100940290 = "關於女僕的工作"
10094-100940300 = "我發現有件事被我忘得一乾二淨了……"
10094-100940310 = "突然覺得有點不安……"
10094-100940320 = "不是那種事啦！"
10094-100940330 = "我相信這次老師一定也會喜歡的！"
10094-100940340 = "……大概吧"

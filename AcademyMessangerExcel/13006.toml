[translation]
13006-1072 = "好～閒～！(つ ◑▽◑)つ"
13006-1073 = "老師，現在在做什麼～？"
13006-1074 = "在工作唷"
13006-1075 = "在呼吸唷"
13006-1076 = "是嗎？哼嗯，這樣啊"
13006-1077 = "那可不能打擾你呀"
13006-1078 = "那麼，加油哦～老師！"
13006-1079 = "啊哈哈哈！！"
13006-1080 = "這樣啊～嗯嗯！呼吸是非常重要的！"
13006-1081 = "我也支持你呼吸唷。老師♪"
13006-1082 = "那麼，加油哦～！"
13006-1083 = "呵呵呵"
13006-1084 = "今天很開心呢～老師！"
13006-1085 = "下次再多玩一會兒吧"
13006-1086 = "老師，今天有空吧？"
13006-1087 = "那個，很忙……？"
13006-1088 = "你為什麼知道！？"
13006-1089 = "咦～？很忙嗎～？"
13006-1090 = "嘛，但沒有關係！"
13006-1091 = "因為老師從一開始就沒有選擇權！"
13006-1092 = "嗯～？為什麼？"
13006-1093 = "……呵呵呵，可不能小看我們便利屋的情報收集能力唷～！"
13006-1094 = "所以今天，希望你來我們便利屋玩！\n(≧∇≦)ﾉ"
13006-1095 = "老師有什麼興趣愛好嗎？"
13006-1096 = "當然"
13006-1097 = "沒有可以稱之為興趣的東西……"
13006-1098 = "這樣啊～有興趣果然很不錯呢～"
13006-1099 = "畢竟沉迷其中的話，時間就會過得很快～"
13006-1100 = "對自己喜歡的領域更加了解的話，會有成就感吧？"
13006-1101 = "很有趣吧～！"
13006-1102 = "哼嗯，這樣啊～？"
13006-1103 = "這樣可能就有點可惜了～"
13006-1104 = "有朝一日想跟老師聊聊興趣愛好～應該會很有趣！(〇╹ヮ╹〇)"
13006-1105 = "老師，我們便利屋收到了一個特別的委託！"
13006-1106 = "又會是非常奇怪的委託吧～？"
13006-1107 = "但同時又會很有趣吧～？"
13006-1108 = "究竟是什麼奇怪的委託能讓無月說成這樣……"
13006-1109 = "究竟是什麼有趣的委託能讓無月說成這樣……"
13006-1110 = "嗯～嘛嘛！先別管細節了！"
13006-1111 = "真希望老師能幫忙啊～？"
13006-1112 = "今天一天過得很開心唷～老師！"
13006-1113 = "下次絕對會成功給你看"
13006-1114 = "做好覺悟吧～！＼( ╹ω╹) /"

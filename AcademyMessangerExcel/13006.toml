[translation]
13006-1072 = "เบื่อจังเลย~! (つ ◑▽◑)つ"
13006-1073 = "คุณครูทำอะไรอยู่เหรอ?"
13006-1074 = "ครูทำงานอยู่"
13006-1075 = "ครูหายใจอยู่น่ะสิ"
13006-1076 = "เหรอ? อืม... ก็น่าจะใช่นะ"
13006-1077 = "งั้นเค้าไม่กวนดีกว่า"
13006-1078 = "ตั้งใจทำงานนะคุณครู!"
13006-1079 = "อะฮ่ะฮ่ะฮ่า!!"
13006-1080 = "อะไรของคุณครูเนี่ย! แต่การหายใจก็\nเป็นงานสำคัญ"
13006-1081 = "เค้าเป็นกำลังใจให้นะ"
13006-1082 = "สู้ๆ ล่ะ!"
13006-1083 = "หุหุหุ"
13006-1084 = "วันนี้สนุกมากเลยล่ะคุณครู"
13006-1085 = "คราวหน้าไปเล่นด้วยกันอีกนะ!"
13006-1086 = "วันนี้คุณครูว่างใช่ม้าา?"
13006-1087 = "ไม่นะ ไม่ว่างเลย"
13006-1088 = "รู้ได้ยังไงน่ะ?!"
13006-1089 = "หืม? ไม่ว่างเหรอ?"
13006-1090 = "แต่ไม่เป็นไรหรอก"
13006-1091 = "เพราะคุณครูไม่มีสิทธิ์เลือกอยู่แล้วยังไงล่ะ"
13006-1092 = "สงสัยว่าเค้ารู้ได้ไงน่ะเหรอ?"
13006-1093 = "หุหุหุ อย่าดูถูกความสามารถของหน่วยรับ\nจ้างสารพัดสิ"
13006-1094 = "มาหาเค้าที่หน่วยรับจ้างสารพัดหน่อย!\n(≧∇≦)ﾉ"
13006-1095 = "คุณครูมีงานอดิเรกไหม?"
13006-1096 = "แน่นอนอยู่แล้ว"
13006-1097 = "อืม ครูไม่มีงานอดิเรกจริงจังหรอก"
13006-1098 = "ว่าแล้วเชียว~ การมีงานอดิเรกเป็นเรื่อง\nที่ดีนะ"
13006-1099 = "ถ้าได้จดจ่อกับอะไร เวลาจะผ่านไปเร็ว\nเลยล่ะ"
13006-1100 = "แถมยังรู้สึกดีเวลาได้เรียนรู้อะไรที่ชอบ\nด้วย"
13006-1101 = "แบบนี้มันสนุกมากเลย!"
13006-1102 = "อืม.. อย่างนั้นเหรอ?"
13006-1103 = "น่าเสียดายนะ~"
13006-1104 = "แต่ต่อไปหากได้คุยกับคุณครูเรื่องงาน\nอดิเรกก็น่าสนุกนะ~ (〇╹ヮ╹〇)"
13006-1105 = "มีภารกิจใหม่เข้ามาในหน่วยรับจ้าง\nสารพัดล่ะ!"
13006-1106 = "เป็นงานใหญ่มากเลยล่ะ"
13006-1107 = "แถมยังน่าสนุกอีกด้วย"
13006-1108 = "งานใหญ่สำหรับมุสึกิงั้นเหรอ...?"
13006-1109 = "งานน่าสนุกสำหรับมุสึกิงั้นเหรอ...?"
13006-1110 = "อื้อออ~! "
13006-1111 = "คุณครูก็มาช่วยหน่อยน้า~"
13006-1112 = "วันนี้สนุกมากเลย คุณครู~!"
13006-1113 = "คราวหน้าเค้าจะทำให้สมบูรณ์แบบ"
13006-1114 = "ตั้งตารอไว้ได้เลย~! ＼( ╹ω╹) /"

[translation]
13006-1072 = "심심~해~! (つ ◑▽◑)つ"
13006-1073 = "선생님, 지금 뭐 하고 있어?"
13006-1074 = "업무 중이야."
13006-1075 = "지금 숨 쉬고 있어."
13006-1076 = "그래? 흐응. 그렇단 말이지."
13006-1077 = "그럼 방해하면 안 되겠네."
13006-1078 = "응, 열심히 일해. 선생님!"
13006-1079 = "아하하하!!"
13006-1080 = "그렇구나~ 응! 숨 쉬는 건 완전 중요하지!"
13006-1081 = "나도 열심히 응원할게. 선생님."
13006-1082 = "그럼 힘내!"
13006-1083 = "쿠후후."
13006-1084 = "오늘 재미있었어~ 선생님!"
13006-1085 = "다음에 또 잔뜩 놀자."
13006-1086 = "선생님, 오늘 한가하지?"
13006-1087 = "아니, 바쁜데?"
13006-1088 = "그, 그걸 어떻게 알았지?!"
13006-1089 = "으응~? 바쁘다고?"
13006-1090 = "뭐, 그래도 상관없어!"
13006-1091 = "처음부터 선생님에게 선택지는 없었으니까!"
13006-1092 = "응? 그걸 어떻게 알고 있냐고?"
13006-1093 = "쿠후후, 우리 흥신소의 정보력을 얕보지 말라구~"
13006-1094 = "그러니까 오늘 우리 흥신소로 놀러 와!\n(≧∇≦)ﾉ"
13006-1095 = "선생님은 혹시 취미가 있어?"
13006-1096 = "물론이지."
13006-1097 = "아니, 딱히 취미라고 할만한 건 없는데."
13006-1098 = "아핫~ 역시~ 취미 생활이 있다는 건 좋은 일이야."
13006-1099 = "몰두하고 있으면 시간도 금방 지나가고."
13006-1100 = "내가 좋아하는 분야에 대해 빠삭하게 알게 되었을 때의 성취감도 있고."
13006-1101 = "응응! 즐겁지~"
13006-1102 = "흐응, 그래애~?"
13006-1103 = "그건 좀 아쉬울지도~"
13006-1104 = "응, 나중에 선생님하고 취미 이야기를 하는 것도 재밌겠다~ (〇'ヮ'〇)"
13006-1105 = "선생님, 우리 흥신소에 특별한 의뢰가 들어왔어!"
13006-1106 = "이게 또 어마어마하거든?"
13006-1107 = "거기다 또 흥미진진하거든?"
13006-1108 = "무츠키가 어마어마하다고 할 정도면 대체……."
13006-1109 = "무츠키가 흥미진진하다고 할 정도면 대체……."
13006-1110 = "으음~! 됐으니까."
13006-1111 = "도와줘, 선생님~!"
13006-1112 = "오늘 하루, 즐거웠어. 선생님~!"
13006-1113 = "다음번엔 완벽하게 성공해 보일 테니까."
13006-1114 = "각오하라구~! ＼( 'ω') /"

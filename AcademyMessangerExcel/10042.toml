[translation]
10042-100420010 = "老師，在嗎？"
10042-100420020 = "現在沒事嗎？訊息有收到嗎？"
10042-100420030 = "敦子？"
10042-100420040 = "嗯，是的。早安"
10042-100420050 = "早安"
10042-100420060 = "雖然差不多快要晚上了，但早安"
10042-100420070 = "我們現在到處轉移陣地"
10042-100420080 = "因為不能在同個地方待太久"
10042-100420090 = "而且大家都很分散"
10042-100420100 = "一個人的話很無聊"
10042-100420110 = "所以，如果老師不來的話"
10042-100420120 = "就很難跟老師見面"
10042-100420130 = "簡單來說，是因為無聊，所以想跟我見面嗎……？"
10042-100420140 = "嗯"
10042-100420150 = "就是那樣"
10042-100420160 = "那麼，晚點見"
10042-100420170 = "老師，晚上好"
10042-100420180 = "我現在要離開這裡了"
10042-100420190 = "那麼，再見。換了地方後會再聯繫你的"
10042-100420200 = "老師，早安"
10042-100420210 = "我發現了一個有趣的地方"
10042-100420220 = "有空的話，要不要過來玩？"
10042-100420230 = "什麼樣的地方？"
10042-100420240 = "可以玩學校遊戲的地方"
10042-100420250 = "感覺一定很有趣"
10042-100420260 = "嗯，我知道了。很期待唷"
10042-100420270 = "老師"
10042-100420280 = "你問我有什麼興趣"
10042-100420290 = "我，喜歡花"
10042-100420300 = "花啊……種花之類的嗎？"
10042-100420310 = "嗯。下次在園藝部試做看看吧"
10042-100420320 = "雖然部員只有我一個"
10042-100420330 = "那麼，晚安"
10042-100420340 = "老師，早安"
10042-100420350 = "我，決定了"
10042-100420360 = "我想要培養和花有關的興趣"
10042-100420370 = "原來如此。插花一類的嗎？"
10042-100420380 = "這不是挺好的嗎"
10042-100420390 = "為我加油吧，老師"
10042-100420400 = "嗯。敦子有喜歡的花嗎？"
10042-100420410 = "……喜歡的花？"
10042-100420420 = "唔嗯……"
10042-100420430 = "我，只要是花都喜歡"
10042-100420440 = "喜歡繡球花"
10042-100420450 = "也喜歡玫瑰"
10042-100420460 = "怎麼了？"
10042-100420470 = "沒什麼，謝謝"
10042-100420480 = "老師，今天辛苦了"
10042-100420490 = "託你的福，重新種植了很多種"
10042-100420500 = "如果能健康地成長就好了呢"
10042-100420510 = "嗯。就是說啊"
10042-100420520 = "還有，謝謝你"
10042-100420530 = "我會對大家保密，好好珍惜的"
10042-100420540 = "你好，老師"
10042-100420550 = "昨晚，下了一場大雨"
10042-100420560 = "花圃沒事吧……"
10042-100420570 = "雖然想去確認，但一個人去有點不安"
10042-100420580 = "可以跟我一起去嗎？"
10042-100420590 = "當然，很樂意"

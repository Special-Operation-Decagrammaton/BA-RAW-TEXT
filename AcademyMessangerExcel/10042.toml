[translation]
10042-100420010 = "คุณครู..."
10042-100420020 = "อยู่รึเปล่า...?"
10042-100420030 = "อาสึโกะ...?"
10042-100420040 = "อื้อ ฉันเอง อรุณสวัสดิ์"
10042-100420050 = "อรุณสวัสดิ์นะ"
10042-100420060 = "ถึงไม่เช้าแล้ว\nแต่ก็อรุณสวัสดิ์นะ"
10042-100420070 = "คุณครูเองก็คงรู้แล้วว่าตอนนี้พวกเรา\nตระเวนไปที่ต่างๆ อยู่"
10042-100420080 = "ก็พวกเราอยู่ที่เดิมนานๆ ไม่ได้นี่นะ"
10042-100420090 = "อีกอย่างตอนนี้ทุกคนก็กระจายตัว\nแยกกันไปหมด"
10042-100420100 = "ฉันอยู่คนเดียวเลยรู้สึกเบื่อๆ น่ะ"
10042-100420110 = "เพราะงั้นถ้าจะเจอคุณครูละก็... "
10042-100420120 = "คงต้องให้คุณครูเป็นฝ่ายมาที่นี่"
10042-100420130 = "สรุปคือชวนครูไปหาเพราะเบื่อ\nที่อยู่คนเดียวสินะ...?"
10042-100420140 = "อื้อ"
10042-100420150 = "ใช่แล้ว"
10042-100420160 = "ถ้างั้นเดี๋ยวเจอกัน"
10042-100420170 = "คุณครู "
10042-100420180 = "พวกเราจะไปจากที่นี่แล้ว "
10042-100420190 = "ไว้เจอกันใหม่นะถ้าเปลี่ยนพิกัดที่อยู่อีก\nจะติดต่อไปใหม่ "
10042-100420200 = "อรุณสวัสดิ์ คุณครู"
10042-100420210 = "ฉันเจอสถานที่ที่น่าสนใจด้วยล่ะ"
10042-100420220 = "ถ้ามีเวลาอยากแวะมาเที่ยวหน่อยมั้ย?"
10042-100420230 = "หืม? ที่แบบไหนกันนะ?"
10042-100420240 = "อืม สถานที่ที่เล่นสนุกได้เหมือนที่โรงเรียน"
10042-100420250 = "ดูน่าสนุกมากเลยนะ"
10042-100420260 = "อื้อ เข้าใจแล้ว"
10042-100420270 = "คุณครู"
10042-100420280 = "คุณครูเคยถามถึงงานอดิเรกฉันใช่มั้ย?"
10042-100420290 = "ฉันชอบดอกไม้น่ะ"
10042-100420300 = "ดอกไม้เหรอ…\nหมายถึงปลูกต้นไม้งั้นเหรอ?"
10042-100420310 = "อื้อ ไว้ตั้งชมรมจัดดอกไม้\nขึ้นมาดีมั้ย?"
10042-100420320 = "ถึงสมาชิกอาจจะมีแค่ฉันคนเดียวก็เถอะ"
10042-100420330 = "ถ้างั้นฝันดีนะ"
10042-100420340 = "อรุณสวัสดิ์ คุณครู"
10042-100420350 = "ฉันตัดสินใจแล้วล่ะ"
10042-100420360 = "ฉันจะลองหางานอดิเรกที่เกี่ยวกับ\nดอกไม้ดู"
10042-100420370 = "อย่างพวกจัดดอกไม้เหรอ?"
10042-100420380 = "จะเริ่มทำกิจกรรมชมรมแล้วเหรอ...?"
10042-100420390 = "อวยพรให้ฉันด้วยนะ คุณครู"
10042-100420400 = "อาสึโกะชอบดอกไม้อะไรเหรอ?"
10042-100420410 = "หืม?"
10042-100420420 = "ดอกไม้ที่ชอบเหรอ?"
10042-100420430 = "อืม ถ้าเป็นดอกไม้ก็ชอบทั้งหมดนั่นแหละ"
10042-100420440 = "ดอกไฮเดรนเยียก็ชอบ"
10042-100420450 = "แล้วก็ชอบดอกกุหลาบด้วย"
10042-100420460 = "ทำไมเหรอ?"
10042-100420470 = "เข้าใจแล้วล่ะ"
10042-100420480 = "คุณครู"
10042-100420490 = "วันนี้ขอบคุณมากนะ"
10042-100420500 = "ถ้าดอกไม้พวกนั้นโตขึ้นมา\nอย่างปลอดภัยก็คงดี"
10042-100420510 = "อืม นั่นสินะ"
10042-100420520 = "แล้วก็ขอบคุณนะ"
10042-100420530 = "ฉันจะเก็บเป็นความลับไว้อย่างดีเลย"
10042-100420540 = "คุณครู"
10042-100420550 = "เมื่อคืนนี้ฝนตกหนักมาก"
10042-100420560 = "แปลงดอกไม้จะเป็นอะไรรึเปล่านะ?"
10042-100420570 = "ฉันอยากออกไปดูแต่ก็ไม่อยากไปคนเดียว..."
10042-100420580 = "คุณครูไปกับฉันหน่อยได้มั้ย?"
10042-100420590 = "อื้อ ได้สิ"

10042-100420160 = "그럼 조금 이따가 봐."
10042-100420170 = "선생님."
10042-100420180 = "여기를 떠나기로 했어."
10042-100420190 = "그럼 다음에 봐. 위치가 바뀌면 또 연락할게."
10042-100420200 = "선생님. 좋은 아침."

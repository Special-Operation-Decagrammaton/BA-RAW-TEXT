[translation]
16016-160160010 = "คุณครู"
16016-160160020 = "ฉันรู้ว่ามันกะทันหัน แต่พอมีเวลามั้ยคะ?"
16016-160160030 = "ฉันมีเรื่องที่อยากได้ความคิดเห็นจาก\nคุณครูค่ะ"
16016-160160040 = "ความคิดเห็น?"
16016-160160050 = "หืม? มีเรื่องอะไรเหรอ?"
16016-160160060 = "ค่ะ"
16016-160160070 = "ไม่ใช่เรื่องไม่ดีหรือเรื่องน่าเป็นห่วง\nหรอกค่ะ..."
16016-160160080 = "แต่ฉันก็อยากฟังความคิดเห็นจาก\nคุณครูด้วย..."
16016-160160090 = "คุณครู"
16016-160160100 = "เอ่อ"
16016-160160110 = "ไม่มีอะไรค่ะ"
16016-160160120 = "เรียกครูไปหาได้ตลอดเลยนะ"
16016-160160130 = "น่ารักมากเลยละ อยากเห็นอีกจัง"
16016-160160140 = "!!!"
16016-160160150 = "เอ่อ"
16016-160160160 = "ค่ะ"
16016-160160170 = "อืม"
16016-160160180 = "เป็นอย่างที่คุณครูพูดจริงด้วยค่ะ"
16016-160160190 = "บางครั้งการเปลี่ยนแปลงแบบนี้\nก็ไม่แย่เท่าไรเลยนะคะ"
16016-160160200 = "หืม?"
16016-160160210 = "พูดถึงเรื่องอะไรเหรอ?"
16016-160160220 = "อ่า"
16016-160160230 = "เรื่องนั้น"
16016-160160240 = "ไม่มีอะไรหรอกค่ะ"
16016-160160250 = "ขอโทษด้วยค่ะ คุณครู ฉันแค่พูด\nคนเดียวน่ะค่ะ"
16016-160160260 = "ไม่ต้องใส่ใจหรอกนะคะ"
16016-160160270 = "วันนี้ต้องขอโทษด้วยนะคะคุณครู"
16016-160160280 = "ฉันเขินมากจนให้คุณครูได้เห็น\nภาพลักษณ์ที่ไม่ดีเลยค่ะ"
16016-160160290 = "ไม่หรอก ครูว่าน่ารักมากนะ"
16016-160160300 = "ไว้ครั้งหน้าก็ไม่ต้องเกร็งนะ"
16016-160160310 = "ฮุฮุ"
16016-160160320 = "พอพูดอย่างนี้ ฉันก็รู้สึกคาดหวังขึ้นมา\nเลยนะคะ"
16016-160160330 = "ค่ะ"
16016-160160340 = "แล้วเจอกันตอนนั้นค่ะ"
16016-160160350 = "คุณครู"
16016-160160360 = "ไม่ทราบว่าหลังจากนี้... พอจะมีเวลา\nบ้างมั้ยคะ?"
16016-160160370 = "มิเนะ? มีเรื่องอะไรเหรอ?"
16016-160160380 = "มีเรื่องกังวลอะไรสินะ"
16016-160160390 = "อืม"
16016-160160400 = "ค่ะ"
16016-160160410 = "ครั้งนี้... ตอบตามตรงคือใช่ค่ะ"
16016-160160420 = "ฉันเลยอยากปรึกษาคุณครูค่ะ"
16016-160160430 = "ช่วยบอกด้วยนะคะว่าคุณครูพอจะมี\nเวลาว่างตอนไหน"
16016-160160440 = "แล้วฉันจะไปหาค่ะ"
16016-160160450 = "คุณครู"
16016-160160460 = "ขอโทษนะคะ"
16016-160160470 = "พอกลับมาคิดดู ฉันก็พูดอะไรผิดไป\nโดยไม่รู้ตัวเยอะเลย..."
16016-160160480 = "ไม่เป็นไรหรอก มิเนะที่เป็นแบบนั้น\nก็น่ารักดีนะ"
16016-160160490 = "ไว้เจอกันบ่อยๆ นะ ไอดอลมิเนะ!"
16016-160160500 = "!"
16016-160160510 = "ฮุฮุ"
16016-160160520 = "ค่ะ"
16016-160160530 = "ฉันก็อยากให้เจอกันบ่อยๆ ค่ะ"
16016-160160540 = "คุณครู"
16016-160160550 = "ยังจำได้หรือเปล่าคะ?"
16016-160160560 = "เรื่องนัดของเราในวันนี้น่ะค่ะ..."
16016-160160570 = "ต้องจำได้อยู่แล้ว"
16016-160160580 = "ครูรอเจออยู่นะ มิเนะ!"
16016-160160590 = "อ่า"
16016-160160600 = "ฮุฮุ"
16016-160160610 = "ขอบคุณค่ะ"
16016-160160620 = "ฉันก็จะตั้งตารอนะคะ"
16016-160160630 = "เป็นช่วงเวลาที่ดีเลยค่ะ"
16016-160160640 = "คุณครูนอนหลับสนิทกว่าที่คิดไว้อีก\nนะคะ"
16016-160160650 = "ทำเอาฉันกังวลเลยค่ะว่าปกติคุณครู\nโหมงานหนักไปหรือเปล่า..."
16016-160160660 = "ขอบใจนะ ครูได้พักเต็มที่เลยละ!"
16016-160160670 = "ทำเอาครูอยากขอให้ช่วยบ่อยๆ เลย"
16016-160160680 = "!"
16016-160160690 = "ได้ค่ะ ถ้าต้องการก็บอกได้ตลอดเลยค่ะ"
16016-160160700 = "เพราะฉันก็"
16016-160160710 = "ชอบมีข้อแก้ตัวแบบนั้นบ่อยๆ ค่ะ"

[translation]
16016-160160010 = "老師"
16016-160160020 = "雖然有些突然，不過您現在是否有空呢？"
16016-160160030 = "我有件事希望能詢問您的意見"
16016-160160040 = "意見？"
16016-160160050 = "嗯？怎麼了嗎？"
16016-160160060 = "是的"
16016-160160070 = "雖然並非需要擔心或負面的事……"
16016-160160080 = "但我還是想聽聽看老師的意見"
16016-160160090 = "老師"
16016-160160100 = "那個"
16016-160160110 = "沒什麼"
16016-160160120 = "隨時歡迎你再來找我哦"
16016-160160130 = "你今天真的很可愛，讓人忍不住想再看一次"
16016-160160140 = "！！！"
16016-160160150 = "那是……"
16016-160160160 = "唔唔"
16016-160160170 = "嗯"
16016-160160180 = "或許就像老師說的一樣"
16016-160160190 = "偶爾換換風格也不錯呢"
16016-160160200 = "嗯？"
16016-160160210 = "什麼意思？"
16016-160160220 = "啊"
16016-160160230 = "那個"
16016-160160240 = "不，沒什麼"
16016-160160250 = "不好意思，老師。剛才只是我的自言自語"
16016-160160260 = "您不需要放在心上"
16016-160160270 = "今天真的很抱歉，老師"
16016-160160280 = "都怪我一時慌了手腳，才讓您見到了那樣的一面"
16016-160160290 = "別這麼說，我覺得你那樣很可愛"
16016-160160300 = "下次可以更放鬆一點哦"
16016-160160310 = "呵呵"
16016-160160320 = "聽您這麼說，不禁讓我有些期待呢"
16016-160160330 = "我明白了"
16016-160160340 = "那麼下次見"
16016-160160350 = "老師"
16016-160160360 = "假如之後有機會的話……能占用您一些時間嗎？"
16016-160160370 = "美禰？怎麼了？"
16016-160160380 = "聽起來好像有煩惱"
16016-160160390 = "唔"
16016-160160400 = "嗯"
16016-160160410 = "這次……確實是這樣沒錯"
16016-160160420 = "所以希望能和老師商量"
16016-160160430 = "麻煩您告訴我方便的時間"
16016-160160440 = "我會過去拜訪的"
16016-160160450 = "老師"
16016-160160460 = "實在非常抱歉"
16016-160160470 = "回來之後我仔細想了想，發現剛才好像說出了很不得了的話……"
16016-160160480 = "沒關係，我覺得很可愛"
16016-160160490 = "之後常常見面吧，偶像美禰！"
16016-160160500 = "！"
16016-160160510 = "呵呵"
16016-160160520 = "是"
16016-160160530 = "我很樂意"
16016-160160540 = "老師"
16016-160160550 = "您還記得嗎？"
16016-160160560 = "我是指今天要見面的事……"
16016-160160570 = "當然記得"
16016-160160580 = "我很期待哦，美禰！"
16016-160160590 = "啊"
16016-160160600 = "呵呵"
16016-160160610 = "非常感謝"
16016-160160620 = "我也會抱持著雀躍的心情，等候您的到來"
16016-160160630 = "我今天玩得很開心"
16016-160160640 = "不過老師剛才睡得比我想像中還要熟"
16016-160160650 = "這讓我有點擔心，您平時是不是累積了太多疲勞……"
16016-160160660 = "多虧有你，疲勞全都消失了！"
16016-160160670 = "害我以後都想偶爾去找你幫忙了呢"
16016-160160680 = "！"
16016-160160690 = "沒問題。只要您有需要，隨時都可以聯絡我"
16016-160160700 = "畢竟對我而言"
16016-160160710 = "這樣的藉口自然也是越多越好"

[translation]
10078-100780010 = "อืม!"
10078-100780020 = "อืมม!!"
10078-100780030 = "อืมมมม~!!"
10078-100780040 = "...คาสุมิ?"
10078-100780050 = "มีเรื่องกังวลอะไรหรือเปล่า?"
10078-100780060 = "อ้อ! คุณครู!"
10078-100780070 = "อยู่ด้วยสินะ! กะไว้แล้วว่าคุณครูจะ\nต้องตอบ"
10078-100780080 = "ฉันมีเรื่องกังวลน่ะ"
10078-100780090 = "เป็นเรื่องใหญ่มากเลยด้วย"
10078-100780100 = "คุณครูพอจะช่วยหน่อยได้มั้ย?"
10078-100780110 = "คุณครู!"
10078-100780120 = "น่าเสียใจจริงๆ เลย"
10078-100780130 = "ทำไมคณะกรรมการวินัยต้องมาลาด\nตระเวนที่นั่นตอนนั้นด้วยนะ"
10078-100780140 = "คนของฉันถูกจับไปครึ่งหนึ่งแน่ะ\nแต่อีกครึ่งหนึ่งก็หนีไปได้"
10078-100780150 = "เฮ้อ~! น่าเสียดาย! อุตส่าห์วางระเบิด\nไว้หมดแล้วด้วย!"
10078-100780160 = "งะ... งั้นเองสินะ สู้ๆ นะ"
10078-100780170 = "วะฮะฮะฮะฮ่า!!"
10078-100780180 = "ไม่ต้องห่วงหรอก!"
10078-100780190 = "เรื่องแบบนี้มันเกิดขึ้นบ่อยๆ อยู่แล้ว"
10078-100780200 = "ที่จริงมันต้องเป็นแบบนี้แหละ ถึงจะ\nคุ้มค่าที่จะลอง!"
10078-100780210 = "ถ้างั้น!"
10078-100780220 = "ไว้เจอกันคราวหน้านะคุณครู!"
10078-100780230 = "คุณครู~?"
10078-100780240 = "ตอนนี้พอจะมีเวลาบ้างมั้ย?"
10078-100780250 = "พอดีฉันมีไอเดียดีๆ น่ะ"
10078-100780260 = "ตอนนี้เลย!"
10078-100780270 = "อย่าบอกนะว่าเป็นแผนระเบิดอีกแล้ว?"
10078-100780280 = "อ๊ะ นี่เป็นเวลาระดมไอเดียเหรอ?"
10078-100780290 = "ต้องอย่างนี้สิคุณครู~ เข้าใจอะไรง่ายดี\nจัง!"
10078-100780300 = "ก็อย่างที่บอกนั่นแหละ!"
10078-100780310 = "แต่ว่า"
10078-100780320 = "ครั้งนี้มันค่อนข้างต่างจากแต่ก่อนน่ะ"
10078-100780330 = "...จริงจังแค่ไหน แค่ไหนเรียกจริงจัง"
10078-100780340 = "ไม่คิดยอมแพ้เลยสินะ"
10078-100780350 = "วะฮะฮะฮะฮ่า!"
10078-100780360 = "ไม่ต้องชื่นชมกันขนาดนั้นก็ได้!"
10078-100780370 = "เอาละๆ เอาเป็นว่า คุณครูมาหาฉันก่อน\nแล้วกัน เดี๋ยวจะส่งพิกัดไปให้!"
10078-100780380 = "อ๊ะ คุณครู!"
10078-100780390 = "แย่แล้วๆ ฉันเรียกคุณครูมาแต่ก็เผลอ\nหลับไปก่อนซะได้"
10078-100780400 = "เสียมารยาทจริงๆ เลย ขอโทษนะ"
10078-100780410 = "ไม่เป็นไร ไม่ต้องคิดมากหรอก"
10078-100780420 = "พิกัดที่เลือกเป็นยังไงบ้าง? ถูกใจรึเปล่า?"
10078-100780430 = "อื้ม~!!"
10078-100780440 = "เป็นที่ที่สมบูรณ์แบบจริงๆ เลยละ"
10078-100780450 = "ไหนๆ ก็พูดถึงแล้ว ต้องเรียกรวมพล\nแล้วละ!!"
10078-100780460 = "งานฉันน่าจะเริ่มยุ่งแล้วละ เอาไว้คุย\nกันใหม่นะ!"
10078-100780470 = "อืม"
10078-100780480 = "คุณครู ถ้าไม่ติดอะไรละก็"
10078-100780490 = "พอจะช่วยหาที่ที่ให้ฉันอ่านหนังสือ\nหน่อยได้มั้ย?"
10078-100780500 = "นั่นก็เพราะว่า"
10078-100780510 = "ฉันไปอ่านในคาเฟ่หรือที่สาธารณะ\nไม่ได้น่ะ"
10078-100780520 = "อ่านหนังสือเหรอ...? "
10078-100780530 = "ไม่ใช่การ 'ระดมไอเดีย' อย่างเคยนะ?"
10078-100780540 = "อื้ม ใช่"
10078-100780550 = "เข้าใจกันทันทีเลยนะ ต้องอย่างนี้สิ\nคุณครู!"
10078-100780560 = "เพราะงั้น"
10078-100780570 = "ถ้านักเรียนจะ 'อ่านหนังสือ' คุณครูก็คง\nจะช่วยเนอะ?"
10078-100780580 = "ก็คุณครูเป็นคุณครูนี่เนอะ!"
10078-100780590 = "เป็นช่วงเวลาที่ดีมากเลยละ ไว้เจอกัน\nใหม่นะคุณครู"
10078-100780600 = "เป็นประสบการณ์ใหม่ของครูเหมือนกัน"
10078-100780610 = "รู้สึกเหมือนใช้เซนส์มองหา\nบ่อออนเซ็นเลยแฮะ"
10078-100780620 = "หืม?"
10078-100780630 = "อ้อ"
10078-100780640 = "เพราะคำพูดและการกระทำก่อนหน้านี้\nน่ะเหรอ?"
10078-100780650 = "ก็นะ"
10078-100780660 = "ถ้าทำตัวเหมือนคนโง่หรือบ้าๆ บอๆ\nมันก็สะดวกดี"
10078-100780670 = "ฉันจะไม่โดนซักไซ้มาก แล้วก็ชวนคุย\nง่ายดีด้วย"
10078-100780680 = "ก็แค่นั้นแหละ"
10078-100780690 = "เพราะงั้น"
10078-100780700 = "ช่วยรักษาความลับนี้ไว้ให้ด้วยนะ"
10078-100780710 = "อืม ยุ่งแล้วละ"
10078-100780720 = "คงจะต้องขอความช่วยเหลือซะแล้ว"
10078-100780730 = "คุณครู! ขอโทษทีนะ ว่าแต่ตอนนี้มี\nเวลาว่างมั้ย?"
10078-100780740 = "ก็ว่างอยู่... ว่าแต่มีเรื่องอะไรเหรอ?"
10078-100780750 = "ขอความช่วยเหลืองั้นเหรอ?"
10078-100780760 = "อื้ม"
10078-100780770 = "ก็ไม่มีอะไรมากหรอก"
10078-100780780 = "ก็แค่รองเท้าแตะฉันขาดน่ะ"
10078-100780790 = "แล้วเท้าก็น่าจะเคล็ดนิดหน่อยด้วย\nก็เลยเดินไม่ได้"
10078-100780800 = "ว่าไงนะ?"
10078-100780810 = "ตอนนี้อยู่ที่ไหน?"
10078-100780820 = "ใจเย็นๆ ไม่ต้องรีบก็ได้"
10078-100780830 = "ไว้ฉันจะส่งที่อยู่ไปให้นะ!"
10078-100780840 = "ที่ที่อยู่ตอนนี้น่ะ..."
10078-100780850 = "คุณครู!"
10078-100780860 = "จะว่าไปแล้ว ฉันยังไม่มีเวลาขอบคุณ\nคุณครูอย่างจริงๆ จังๆ เลย"
10078-100780870 = "ขอบคุณมากๆ เลยนะ ขอบคุณจริงๆ!"
10078-100780880 = "รองเท้าแตะที่ได้มา ฉันจะคิดซะว่ามัน\nเป็นคุณครู แล้วจะใส่อย่างทะนุถนอมเลย!"
10078-100780890 = "ครูก็ขอบคุณอยู่หรอก แต่จะเหยียบ\nกันเนี่ยนะ?"
10078-100780900 = "ครูเป็น... รองเท้าแตะเหรอ?"
10078-100780910 = "วะฮะฮะฮะฮ่า!!"
10078-100780920 = "ทำไมล่ะ"
10078-100780930 = "ให้คิดในทางที่ดีไง ถือว่า 'เราอยู่ด้วย\nกันทุกที่' แบบนี้น่ะ!"
10078-100780940 = "งั้นไว้เจอกันใหม่นะคุณครู!!"

[translation]
10078-100780010 = "嗯！"
10078-100780020 = "嗯嗯！！"
10078-100780030 = "嗯嗯嗯嗯嗯～！！"
10078-100780040 = "……佳澄？"
10078-100780050 = "有什麼煩惱嗎？"
10078-100780060 = "啊！老師！"
10078-100780070 = "問得真好！我一直相信你會這樣回答！"
10078-100780080 = "我有個煩惱"
10078-100780090 = "而且是相當大的煩惱"
10078-100780100 = "老師願意幫助我嗎？"
10078-100780110 = "老師！"
10078-100780120 = "真是太遺憾了"
10078-100780130 = "風紀委員會那時候怎麼會偏偏挑那裡巡邏呢？"
10078-100780140 = "大約有一半的人被逮捕，另一半成功逃走了"
10078-100780150 = "啊～！真可惜！我連炸藥都埋好了說！"
10078-100780160 = "這，這樣啊。加油"
10078-100780170 = "哈～哈哈哈哈！！"
10078-100780180 = "不必在意！"
10078-100780190 = "這種小事只是家常便飯而已"
10078-100780200 = "況且不做到這種程度就沒有嘗試的價值了！"
10078-100780210 = "那麼！"
10078-100780220 = "下次見囉，老師！"
10078-100780230 = "老師～？"
10078-100780240 = "你現在有空嗎？"
10078-100780250 = "我想到了一個非常棒的點子"
10078-100780260 = "就是現在！"
10078-100780270 = "難道又是爆破計畫？"
10078-100780280 = "啊，是要開會嗎？"
10078-100780290 = "真～不愧是老師。這就是所謂的心有靈犀一點通嗎？"
10078-100780300 = "正是如此！"
10078-100780310 = "但是……"
10078-100780320 = "這次跟之前可不一樣哦？"
10078-100780330 = "……真是不屈不撓的意志啊"
10078-100780340 = "看來是不會放棄啊"
10078-100780350 = "哈～哈哈哈哈！"
10078-100780360 = "那樣抬舉我也不會有好處的哦！"
10078-100780370 = "來來來，總之先來找我吧！我把地點傳給你！"
10078-100780380 = "啊，老師！"
10078-100780390 = "哎呀哎呀，明明是我把老師請來，結果卻先睡著了"
10078-100780400 = "真是失敬，抱歉抱歉"
10078-100780410 = "沒關係，不用放在心上"
10078-100780420 = "地點還喜歡嗎？"
10078-100780430 = "嗯～！！"
10078-100780440 = "再看一次還是覺得真的很完美"
10078-100780450 = "既然如此，得馬上把所有人都叫來才行！！"
10078-100780460 = "那我就先去忙了，下次見囉！"
10078-100780470 = "嗯……"
10078-100780480 = "老師，如果不介意的話"
10078-100780490 = "可以幫我找找能唸書的地方嗎？"
10078-100780500 = "因為某些原因"
10078-100780510 = "我沒辦法去公開的咖啡廳或公共場所"
10078-100780520 = "唸書……？"
10078-100780530 = "不是往常的「開會」？"
10078-100780540 = "啊啊，沒錯"
10078-100780550 = "一點就通呢，不愧是老師！"
10078-100780560 = "所以……"
10078-100780570 = "既然是學生說想「唸書」，你應該願意幫忙吧？"
10078-100780580 = "畢竟是老師嘛！"
10078-100780590 = "真是一段愉快的時光。下次見囉，老師"
10078-100780600 = "我也覺得是很新鮮的體驗"
10078-100780610 = "我以為你一直是憑感覺尋找溫泉的"
10078-100780620 = "嗯？"
10078-100780630 = "啊啊"
10078-100780640 = "是因為我之前的言行舉止嗎？"
10078-100780650 = "也對"
10078-100780660 = "畢竟表現得像個笨蛋或瘋子，在各種意義上都比較輕鬆啊"
10078-100780670 = "既不必多說什麼，也方便引導對話"
10078-100780680 = "就只是這樣而已"
10078-100780690 = "所以……"
10078-100780700 = "這個祕密，還請一定要守住哦？"
10078-100780710 = "唔嗯，真傷腦筋"
10078-100780720 = "看來只能請求協助了"
10078-100780730 = "老師！抱歉，你現在有空嗎？"
10078-100780740 = "有是有……發生什麼事了嗎？"
10078-100780750 = "需要幫助嗎？"
10078-100780760 = "是啊"
10078-100780770 = "其實也沒什麼"
10078-100780780 = "只是拖鞋壞了"
10078-100780790 = "而且可能有點扭傷，所以走不太動"
10078-100780800 = "什麼！？"
10078-100780810 = "你現在在哪！？"
10078-100780820 = "先冷靜點，不必著急"
10078-100780830 = "總之我把地點傳給你！"
10078-100780840 = "我想想，這裡是……"
10078-100780850 = "老師！"
10078-100780860 = "話說回來，剛才因為忙得不可開交，都還沒好好道謝呢"
10078-100780870 = "真是感激不盡！！"
10078-100780880 = "我會把這雙拖鞋當成老師好好珍惜的！"
10078-100780890 = "是要一邊感謝我一邊把我踩在腳下嗎？"
10078-100780900 = "把我……當成拖鞋？"
10078-100780910 = "哈～哈哈哈哈！！"
10078-100780920 = "這個……"
10078-100780930 = "我的意思是不管走到哪裡都和老師同在！往好的方向想嘛！"
10078-100780940 = "那下次見囉，老師！！"

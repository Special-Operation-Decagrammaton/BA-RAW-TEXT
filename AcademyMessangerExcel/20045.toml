[translation]
20045-200450010 = "頭兒！"
20045-200450020 = "啊不，老師！"
20045-200450030 = "我是菲娜！"
20045-200450040 = "嗨，菲娜。好久不見了呢"
20045-200450050 = "是的！我是菲娜！"
20045-200450060 = "這次之所以聯絡，是因為菲娜就像不死鳥一樣重獲新生了"
20045-200450070 = "所以希望能讓老師見到值得引以為傲的一面！"
20045-200450080 = "如果有到百鬼夜行來的話，記得來找菲娜哦！"
20045-200450090 = "一定要！"
20045-200450100 = "真可惜……"
20045-200450110 = "本來是個能展現百鬼夜行各個角落獨特魅力的好機會"
20045-200450120 = "結果沒能好好介紹給老師，實在太可惜了！"
20045-200450130 = "狗狗跑去別的地方玩，塗鴉也被擦掉了……"
20045-200450140 = "都怪我太急著表現，結果忽略了最基本的事情……"
20045-200450150 = "菲娜有這份心就已經很棒了哦"
20045-200450160 = "！！"
20045-200450170 = "謝謝老師！！！"
20045-200450180 = "而且也是多虧了老師幫忙，我才能重新冷靜下來"
20045-200450190 = "下次一定會找狀況穩定一點的名勝，帶老師去參觀的"
20045-200450200 = "我會加油！！"
20045-200450210 = "老師！菲娜向老師問好！"
20045-200450220 = "我今天擔任巴士之旅的導覽員！"
20045-200450230 = "剛好還有一個空位，老師要不要一起來呢！"
20045-200450240 = "菲娜要讓老師看到專業的一面！"
20045-200450250 = "菲娜今天原本自信滿滿，一定要讓老師看到出色又Perfect的樣子！"
20045-200450260 = "結果菲娜這次又失誤了！"
20045-200450270 = "真的無顏面對老師！！"
20045-200450280 = "而且菲娜這麼不爭氣，老師竟然還護著我……"
20045-200450290 = "不才菲娜感激涕零！！"
20045-200450300 = "坦率說出自己心情的菲娜很值得敬佩哦"
20045-200450310 = "反而是我從你身上學到了一課"
20045-200450320 = "！！"
20045-200450330 = "快別這麼說！！菲娜實在承擔不起！！"
20045-200450340 = "不過聽到老師說我值得敬佩……還是不由得感到開心！"
20045-200450350 = "菲娜會將老師的鼓勵銘記在心，繼續提升自己的！！"
20045-200450360 = "老師，我是菲娜！"
20045-200450370 = "不才菲娜，今天真的很有信心！"
20045-200450380 = "我會以專家的身分發揮專業！"
20045-200450390 = "希望能讓老師看到菲娜更上一層樓的樣子！"
20045-200450400 = "菲娜會在電影村等老師來！"
20045-200450410 = "嗚嗚……臉還是在發燙……"
20045-200450420 = "我下次一定要更謹言慎行……"
20045-200450430 = "大家都很開心，你不用擔心"
20045-200450440 = "我覺得菲娜有帶動遊客的才能，真的很優秀"
20045-200450450 = "！！"
20045-200450460 = "那真是太好了！"
20045-200450470 = "嘿嘿嘿……我會以今天的失誤為鑑，鞭策自己繼續進步！"
20045-200450480 = "承蒙老師的教導，菲娜終於有所成長！"
20045-200450490 = "現在已經是名得到認可、當之無愧的任俠，不會再出錯了！"
20045-200450500 = "今天是我最後一次導覽，希望老師也能一起參加！"
20045-200450510 = "那我們到時候見！"
20045-200450520 = "頭兒"
20045-200450530 = "啊不對"
20045-200450540 = "老師，我是菲娜"
20045-200450550 = "這樣一來，商店街那邊委託的工作就算是完成了！"
20045-200450560 = "雖然有點不知所措，幸好在老師的關照下順利做到了"
20045-200450570 = "希望下次菲娜可以和老師兩人"
20045-200450580 = "一起遊覽百鬼夜行"
20045-200450590 = "不是以導覽員的身分，而是作為遊客……"
20045-200450600 = "沒，沒什麼！請忘了我剛剛說的話吧！！"
20045-200450610 = "那樣一定也很好玩"
20045-200450620 = "！！！"
20045-200450630 = "老，老師竟然還願意跟菲娜一起共度時光！！"
20045-200450640 = "非，非常謝謝老師！！"
20045-200450650 = "那我就先告辭了！！頭兒！！"

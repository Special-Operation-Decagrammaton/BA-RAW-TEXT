[translation]
20045-200450010 = "Boss!"
20045-200450020 = "I mean, Master!"
20045-200450030 = "It's me, Pina!"
20045-200450040 = "Hi, Pina. It's been a while."
20045-200450050 = "Yes! Pina, reporting!"
20045-200450060 = "I, Pina, have risen from the ashes like a phoenix!"
20045-200450070 = "And I wanted to contact you to express my great pride!"
20045-200450080 = "So come find me when you're at Hyakkiyako!"
20045-200450090 = "It's a promise!"
20045-200450100 = "What a shame..."
20045-200450110 = "This was the perfect opportunity to put the true charms of Hyakkiyako on display."
20045-200450120 = "And I squandered it!"
20045-200450130 = "Puppies are free to move as they please...and graffiti is only temporary..."
20045-200450140 = "My excitement overwhelmed my common sense..."
20045-200450150 = "Regardless, your determined mindset is amazing, Pina."
20045-200450160 = "!!!"
20045-200450170 = "I'm grateful, Sensei!!!"
20045-200450180 = "And I'm also grateful that I was able to return to my senses, thanks to you!"
20045-200450190 = "Next time, I shall guide you to the most stable of landmarks!"
20045-200450200 = "I'll do my complete best!"
20045-200450210 = "Hello, Sensei! Pina here!"
20045-200450220 = "Today, I'm a guide on a bus tour!"
20045-200450230 = "In a stroke of fate, we have an empty seat! Would you like to join?"
20045-200450240 = "You can see what I'm capable of!"
20045-200450250 = "I was...so excited to show you a cool and perfect side of myself today."
20045-200450260 = "But, alas! I blundered today too!"
20045-200450270 = "I have no excuses!!!"
20045-200450280 = "And you had to go out of the way to cover for the incompetent, lacking me..."
20045-200450290 = "I, Pina, am in tears!!!"
20045-200450300 = "Your honesty and vulnerability were really inspiring."
20045-200450310 = "I learned a lot from you today!"
20045-200450320 = "!!!"
20045-200450330 = "Master learned something from me?! How can this be?!"
20045-200450340 = "Hearing you say that...I feel happiness beyond understanding!"
20045-200450350 = "I'll take your encouragement to the depths of my heart and become even better!"
20045-200450360 = "Sensei, Pina here!"
20045-200450370 = "Today's the day where I, Pina the expert,"
20045-200450380 = "can achieve great things!"
20045-200450390 = "I wish to show you the ways I've grown and changed!"
20045-200450400 = "Therefore, I'll await you most eagerly at the movie village!"
20045-200450410 = "Ugh... My face still feels hot..."
20045-200450420 = "I'll be infinitely more careful next time..."
20045-200450430 = "You shouldn't worry. Everyone enjoyed it!"
20045-200450440 = "You have a great talent for leading others."
20045-200450450 = "!!!"
20045-200450460 = "What a relief!"
20045-200450470 = "Heeheehee. I will carry today's lessons into the future!"
20045-200450480 = "Your teachings have helped me grow again!"
20045-200450490 = "I am now a full-fledged gangster who doesn't make mistakes!"
20045-200450500 = "Today's our very last tour, so I hope you'll join!"
20045-200450510 = "I'll see you then!"
20045-200450520 = "Boss."
20045-200450530 = "No. I mean"
20045-200450540 = "Sensei, this is Pina."
20045-200450550 = "I have successfully fulfilled the shopping district's request!"
20045-200450560 = "I would never have overcome this difficulty without your watchful assistance!"
20045-200450570 = "Next time, I desire to"
20045-200450580 = "travel around Hyakkiyako with just the two of us,"
20045-200450590 = "not as guides, but as two tourists exploring the area."
20045-200450600 = "N-Nevermind! Please forget I said that!!!"
20045-200450610 = "That sounds fun too."
20045-200450620 = "!!!"
20045-200450630 = "To say that you'll spend time with me again!!"
20045-200450640 = "Th-Thank you!!"
20045-200450650 = "I'll be on my way then, Boss!!"

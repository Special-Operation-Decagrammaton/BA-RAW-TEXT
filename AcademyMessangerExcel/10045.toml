[translation]
10045-100450010 = "老師，我有個請求"
10045-100450020 = "大家問老師我在哪裡的話，能請老師回答「不知道」嗎？"
10045-100450030 = "我現在在做很重要的事"
10045-100450040 = "老師就裝做什麼都不知道。拜託了唷"
10045-100450050 = "可以是可以……打算在房間睡覺嗎？"
10045-100450060 = "是要睡覺嗎？"
10045-100450070 = "唔嘿～類似啦"
10045-100450080 = "大叔的意思……明白了嗎？"
10045-100450090 = "總之就麻煩你囉，老師"
10045-100450100 = "老師，今天謝啦"
10045-100450110 = "一起睡午覺很開心唷"
10045-100450120 = "我們現在是共犯了"
10045-100450130 = "偷懶的共犯……就是這樣"
10045-100450140 = "……！？"
10045-100450150 = "上當了……從一開始就是為了這個目的！？"
10045-100450160 = "唔嘿嘿"
10045-100450170 = "嗚嗚……"
10045-100450180 = "幫幫我，老師……"
10045-100450190 = "出大事了……"
10045-100450200 = "星野？"
10045-100450210 = "怎麼了？"
10045-100450220 = "我在海水浴場這邊"
10045-100450230 = "想請你幫點忙……"
10045-100450240 = "因為是只有老師才辦得到的事"
10045-100450250 = "不要叫大家，一定要一個人來唷……"
10045-100450260 = "拜託了～"
10045-100450270 = "老師"
10045-100450280 = "壞消息"
10045-100450290 = "結果被發現了嗎？"
10045-100450300 = "我也被叫去了嗎……？"
10045-100450310 = "啊，不是那樣的"
10045-100450320 = "今天海產不是抓得比預期中還要多嗎"
10045-100450330 = "所以被吩咐之後每天都要採收～"
10045-100450340 = "因此"
10045-100450350 = "之後也要拜託你囉，老師"
10045-100450360 = "大海真是好呀"
10045-100450370 = "白色的沙灘，無邊無際的地平線……"
10045-100450380 = "真有詩意"
10045-100450390 = "確實很棒呢"
10045-100450400 = "唔嘿……"
10045-100450410 = "那個"
10045-100450420 = "只是想說說看而已"
10045-100450430 = "沒有特別的含意唷"
10045-100450440 = "這麼說來，老師"
10045-100450450 = "我曾經聽說過"
10045-100450460 = "就像剛才的烏魚一樣"
10045-100450470 = "鯨魚也會躍出水面"
10045-100450480 = "那個"
10045-100450490 = "要等多久才能看到呢？"
10045-100450500 = "應該沒辦法在沙灘上看到"
10045-100450510 = "也許得到遠洋才能看見"
10045-100450520 = "……"
10045-100450530 = "唔嘿……有點困難啊"
10045-100450540 = "真可惜……"
10045-100450550 = "嘛，不過"
10045-100450560 = "有機會的話一起去看吧"
10045-100450570 = "一起唷"

[translation]
10045-100450010 = "อืม..."
10045-100450020 = "เมื่อกี้นี้เห็นว่ามีใครตามหาฉันอยู่ด้วยละ"
10045-100450030 = "ตอนนี้ฉันกำลังทำงานที่สำคัญมากๆ อยู่"
10045-100450040 = "เพราะงั้นถ้าเกิดมีใครถามครู\nก็ช่วยบอกว่าไม่รู้ไปแล้วกันนะ"
10045-100450050 = "ครูตอบแบบนั้นก็ได้ แต่โฮชิโนะ\nจะนอนอยู่ที่ห้องพักใช่ไหม?"
10045-100450060 = "จะนอนอีกแล้วเหรอ?"
10045-100450070 = "แหะๆ~ ก็คงงั้นละ"
10045-100450080 = "ครูเข้าใจที่ฉันบอกไปเมื่อกี้ใช่ไหม?"
10045-100450090 = "ยังไงก็ฝากด้วยนะครู"
10045-100450100 = "ครู"
10045-100450110 = "ครูเองก็แอบมางีบด้วยกัน"
10045-100450120 = "เพราะงั้นตอนนี้เราเป็นผู้สมรู้ร่วมคิด\nกันแล้วนะ"
10045-100450130 = "รู้ใช่ไหมว่ามันหมายความว่ายังไง?"
10045-100450140 = "...?!"
10045-100450150 = "โดนเข้าแล้ว มีเป้าหมายแบบนี้\nตั้งแต่แรกแล้วสินะ!"
10045-100450160 = "แฮ่รๆๆ~"
10045-100450170 = "ฮือ..."
10045-100450180 = "ครู ช่วยด้วย..."
10045-100450190 = "เกิดเรื่องใหญ่แล้ว"
10045-100450200 = "โฮชิโนะ?"
10045-100450210 = "มีอะไรเหรอ?"
10045-100450220 = "ตอนนี้ฉันอยู่ที่ชายหาด"
10045-100450230 = "อยากให้ครูช่วยหน่อย"
10045-100450240 = "ต้องเป็นครูเท่านั้นด้วย..."
10045-100450250 = "ห้ามบอกเรื่องนี้กับเด็กๆ คนอื่น\nแล้วก็มาที่นี่คนเดียวนะ"
10045-100450260 = "ขอร้องละ"
10045-100450270 = "ครู"
10045-100450280 = "แย่จริงๆ"
10045-100450290 = "โดนจับได้เหรอ?"
10045-100450300 = "ก็เลยเรียกครูมาสินะ?"
10045-100450310 = "เปล่า ไม่ใช่แบบนั้นหรอก"
10045-100450320 = "ดูเหมือนจะเก็บมาเยอะเกินไป"
10045-100450330 = "กลายเป็นว่าพวกเด็กๆ\nขอให้ไปจับมาทุกวันซะแล้ว"
10045-100450340 = "เพราะงั้น..."
10045-100450350 = "ต่อไปก็ขอฝากตัวด้วยนะ ครู"
10045-100450360 = "อืม..."
10045-100450370 = "ชายหาดนี่ดีจริงๆ เลยนะ"
10045-100450380 = "ชื่นใจดีจริงๆ"
10045-100450390 = "ชายหาดดีอย่างนี้ละ"
10045-100450400 = "แฮ่..."
10045-100450410 = "ก็นะ"
10045-100450420 = "ฉันแค่อยากลองพูดสักครั้งน่ะ"
10045-100450430 = "ไม่มีเหตุผลอะไรพิเศษหรอก"
10045-100450440 = "ว่าแต่ครู..."
10045-100450450 = "ฉันเคยได้ยินมาน่ะ"
10045-100450460 = "ว่าบางทีพวกวาฬเอง"
10045-100450470 = "ก็จะโผล่ขึ้นมาเหนือน้ำ..."
10045-100450480 = "เหมือนพวกปลากระบอกเลยละ"
10045-100450490 = "ต้องรอนานแค่ไหนกันนะ?"
10045-100450500 = "ดูจากชายหาดคงมองไม่เห็นหรอก..."
10045-100450510 = "น่าจะต้องออกไปกลางทะเลโน่นเลย"
10045-100450520 = "..."
10045-100450530 = "เฮ้อ..."
10045-100450540 = "น่าเสียดายจัง"
10045-100450550 = "แต่ก็นะ..."
10045-100450560 = "ถ้ามีโอกาสก็ไว้ไปดูกันนะ"
10045-100450570 = "ไปด้วยกัน"

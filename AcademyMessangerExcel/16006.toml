[translation]
16006-160060010 = "선생님! 이벤트야!"
16006-160060020 = "이벤트 음식을 먹으러 가야 해!"
16006-160060030 = "갑자기 이벤트 음식……?"
16006-160060040 = "이즈미가 먹으러 가자면 가야지!"
16006-160060050 = "응! 이벤트 음식이 우리를 부르고 있어! 선생님!"
16006-160060060 = "……으, 응?"
16006-160060070 = "바로 승낙해주다니, 역시 선생님이야!"
16006-160060080 = "그래서 뭘 먹으러 가려고?"
16006-160060090 = "이번에 말이야~"
16006-160060100 = "여름을 맞이해서 특별한 이벤트를 시작한 바다의 집이 있대!"
16006-160060110 = "바다의 집이라, 여름의 풍류구나~"
16006-160060120 = "그치 그치?!"
16006-160060130 = "게다가 이게 또!"
16006-160060140 = "그 게임에서 이기기만 하면 각종 상품을, 음식을 준다는 거 있지?!"
16006-160060150 = "그건 확실히 구미가 당기네."
16006-160060160 = "그럼 결정!"
16006-160060170 = "이따가 바다의 집에서 보자, 선생님!"
16006-160060180 = "선생님! 기왕 해변으로 찾아온 만큼."
16006-160060190 = "더 많은 여름 별미가 먹고 싶어!"
16006-160060200 = "확실히, 여름 별미는 각별하지."
16006-160060210 = "하지만, 나 깨달았어. 선생님……."
16006-160060220 = "별미란 기다린다고 찾아와주지 않아!"
16006-160060230 = "과연 미식연구회의 부원!"
16006-160060240 = "먼저 행동한다는 거구나!"
16006-160060250 = "응! 멍-하니 입을 벌리고 있어 봤자 먹을 수 있는 건"
16006-160060260 = "선생님이 먹여주는 감자칩 뿐이니까!"
16006-160060270 = "어?! 그건 확정인 거야?!"
16006-160060280 = "자아! 그럼 여름 별미를 찾으러 가자!"
16006-160060290 = "우리 여름여름맛집콤비가 나설 차례야!"
16006-160060300 = "여름여름……?"
16006-160060310 = "……맛집콤비?"
16006-160060320 = "기다리고 있을게!"
16006-160060330 = "선생님!"
16006-160060340 = "우리 여름여름맛집콤비의 별미 여행은 아직 끝나지 않았어!"
16006-160060350 = "그 이름, 마음에 들었구나……."
16006-160060360 = "그래서 말인데! 오늘은 뭘 먹어볼까!"
16006-160060370 = "서쪽 해변에서 유명한 젤라또 아이스크림도 좋구!"
16006-160060380 = "동쪽 스트리트에서 다들 먹는다는 와플 케잌도 좋지만……."
16006-160060390 = "역시 지금 반드시 먹어봐야만 하는 건."
16006-160060400 = "해변가 중앙 노점상에서 파는 딸기바나나맛 타코야키일까?!"
16006-160060410 = "그러니까, 또 먹자고?"
16006-160060420 = "응응! 이러고 있을 때가 아니야! 선생님!"
16006-160060430 = "이러고 있는 동안에도, 해변가의 맛있는 별미들이 전부 팔려 나갈 거라구!"
16006-160060440 = "자, 그럼 바다의 집 앞에서 보자! 선생님!"
16006-160060450 = "아! 참고로 늦은 사람은, 자기 음식 절반 나눠주기야!"
16006-160060460 = "어, 으, 으응."
16006-160060470 = "여러 가지 사정과 상황을 생략하고"
16006-160060480 = "바다로 나가자, 선생님!"
16006-160060490 = "이젠 생략하는 법도 배운 건가……."
16006-160060500 = "후우, 강해졌군. 이즈미. 더 이상 가르칠 것이 없어."
16006-160060510 = "……?"
16006-160060520 = "잘 모르겠지만, 오늘은 특히 덥대!"
16006-160060530 = "그러니까, 더위를 잊기 위해서……."
16006-160060540 = "한층 더 신나게! 별미 여행을 떠나는 거야!"

[translation]
16006-160060010 = "คุณครูคะ! อีเวนต์ค่ะ!"
16006-160060020 = "ต้องไปกินอาหารที่อีเวนต์ค่ะ!"
16006-160060030 = "อีเวนต์อาหารเหรอ...?"
16006-160060040 = "ถ้าอิซุมิชวนล่ะก็ครูไปอยู่แล้ว!"
16006-160060050 = "อื้อ! อีเวนต์อาหารกำลังร้องเรียกเรา\nอยู่ค่ะ! คุณครูคะ!"
16006-160060060 = "หา...?"
16006-160060070 = "ตอบตกลงทันทีสมกับเป็นคุณครูเลย!"
16006-160060080 = "แล้วจะไปกินอะไรกันล่ะ?"
16006-160060090 = "คราวนี้น่ะ~"
16006-160060100 = "มีร้านริมทะเลที่จัดอีเวนต์พิเศษรับ\nฤดูร้อนด้วยล่ะ!"
16006-160060110 = "ร้านริมทะเลเหรอ... สมกับเป็นฤดูร้อน\nดีจังเลยนะ~"
16006-160060120 = "ใช่มะๆ!"
16006-160060130 = "ชักตื่นเต้นแล้วสิ!"
16006-160060140 = "แค่เล่นเกมชนะก็จะได้รับรางวัลแล้วก็\nอาหารล่ะ?!"
16006-160060150 = "ดึงดูดใจดีจริงๆ "
16006-160060160 = "ตัดสินใจล่ะ!"
16006-160060170 = "เดี๋ยวเจอกันที่ร้านริมทะเลนะคุณครู!"
16006-160060180 = "คุณครูคะ! ไหนๆ ก็มาที่ทะเลแล้ว"
16006-160060190 = "ฉันอยากกินอาหารฤดูร้อนอร่อยๆ อีก!"
16006-160060200 = "อาหารเลิศรสของฤดูร้อนมันย่อมพิเศษ\nอยู่แล้ว"
16006-160060210 = "แต่ว่าฉันรู้แล้วล่ะ คุณครู..."
16006-160060220 = "ไม่ใช่ว่านั่งรอเฉยๆ แล้วอาหารเลิศรส\nจะมาเสิร์ฟถึงที่หรอกนะ!"
16006-160060230 = "สมกับเป็นสมาชิกชมรมชิมอาหาร!"
16006-160060240 = "ต้องบุกไปคว้ามาก่อนสินะ!"
16006-160060250 = "อื้อ! สิ่งที่ฉันสามารถกินได้โดยแค่\nอ้าปากอยู่เฉยๆ"
16006-160060260 = "มีแค่มันฝรั่งทอดที่คุณครูป้อนฉัน\nยังไงล่ะ!"
16006-160060270 = "เอ๋?! พูดจริงอ่ะ?!"
16006-160060280 = "เอาล่ะ! ถ้างั้นไปหาอาหารเลิศรสของ\nฤดูร้อนกันเถอะ!"
16006-160060290 = "คู่หูตะลุยร้านเด็ดต้องออกปฏิบัติการ\nแล้วล่ะ"
16006-160060300 = "ฤดูร้อนๆ...?"
16006-160060310 = "คู่หูตะลุยร้านเด็ด?"
16006-160060320 = "ฉันจะรอนะ!"
16006-160060330 = "คุณครู!"
16006-160060340 = "ทริปคู่หูตะลุยร้านเด็ด\nเพื่อหาของอร่อยในหน้าร้อนของเรา\nยังไม่จบหรอกนะ!"
16006-160060350 = "ชอบชื่อนั้นมากเลยสินะ..."
16006-160060360 = "เพราะงั้น... วันนี้จะกินอะไรดีล่ะ!"
16006-160060370 = "ไอศกรีมเจลาโต้ชื่อดังที่ขายอยู่ที่หาด\nด้านตะวันตกก็ดีนะ!"
16006-160060380 = "แต่เค้กวัฟเฟิลที่ทุกคนบอกว่าต้องลอง\nที่ขายอยู่ที่ถนนฝั่งตะวันออกก็ดี..."
16006-160060390 = "แต่ว่าสิ่งที่ต้องกินให้ได้ในตอนนี้น่ะ"
16006-160060400 = "ต้องเป็นทาโกะยากิกล้วยสตรอว์เบอร์รี่\nที่ขายอยู่ที่ถนนบริเวณชายหาดกลาง\nสินะ?!"
16006-160060410 = "จะไปกินอีกเหรอ?"
16006-160060420 = "อื้มอื้ม!  ไม่ใช่เวลาที่จะมามัวลังเลอยู่\nนะ! คุณครู!"
16006-160060430 = "ระหว่างที่มัวแต่ลังเลแบบนี้ ของอร่อย\nที่ขายริมหาดก็อาจจะขายหมดแล้ว\nก็ได้นะ!"
16006-160060440 = "เอาล่ะ เจอกันที่หน้าร้านริมทะเลนะ\nคุณครู!"
16006-160060450 = "อ๊ะ! ถ้าใครมาช้าต้องยอมแบ่งของกิน\nของตัวเองให้อีกคนครึ่งนึงนะ!"
16006-160060460 = "อ่ะ...เอ่อ... อื้อ"
16006-160060470 = "เราข้ามเรื่องต่างๆ กันไปเลย"
16006-160060480 = "แล้วไปที่ชายหาดกันเถอะ คุณครู!"
16006-160060490 = "เดี๋ยวนี้หัดข้ามขั้นตอนเป็นแล้วเหรอ..."
16006-160060500 = "ฮึ่ม แข็งแกร่งขึ้นแล้วสินะอิซุมิ\nครูไม่มีเคล็ดวิชาอะไรจะสอนให้แล้วละ"
16006-160060510 = "...?"
16006-160060520 = "ไม่ค่อยเข้าใจที่พูดเท่าไหร่หรอกนะ\nแต่ได้ยินว่าวันนี้จะร้อนเป็นพิเศษเลยละ!"
16006-160060530 = "เพราะงั้นเพื่อคลายร้อน..."
16006-160060540 = "เราจะออกไปพิชิตของอร่อย!\nแบบสนุกสุดเหวี่ยงขึ้นกว่าเดิมด้วย!"

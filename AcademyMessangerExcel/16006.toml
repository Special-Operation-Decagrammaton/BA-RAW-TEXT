[translation]
16006-160060010 = "老師！夏天到了！夏天！"
16006-160060020 = "既然是夏天，當然就要吃夏天的料理！"
16006-160060030 = "夏天的料理啊……"
16006-160060040 = "嗯，走吧！一直工作好累啊！"
16006-160060050 = "冰涼的酸甜、濃郁的調味，正呼喚著我們唷！"
16006-160060060 = "……肚子餓了！那要去哪裡呢？"
16006-160060070 = "沒錯沒錯，越是忙碌，吃飯越是重要唷！"
16006-160060080 = "是啊。對了，你有什麼想去的地方嗎？"
16006-160060090 = "嗯，首先果然是……！"
16006-160060100 = "想去海之家！"
16006-160060110 = "不錯耶，感覺就是要這裡"
16006-160060120 = "對吧！"
16006-160060130 = "而且，似乎還不是普通的海之家唷！"
16006-160060140 = "聽說只要贏了某個遊戲，就能免費吃店內美食當作獎品！"
16006-160060150 = "喔！好像有點燃起鬥志了！"
16006-160060160 = "這種地方不去對不起自己！"
16006-160060170 = "那麼，在店的前面碰面吧！晚點見囉，老師！"
16006-160060180 = "嘿，老師。難得的夏天，我……"
16006-160060190 = "想吃更多夏天的美食！"
16006-160060200 = "確實，季節性的東西就想在那個季節吃呢"
16006-160060210 = "但我注意到了，老師"
16006-160060220 = "美食等再久也不會來！"
16006-160060230 = "非常像是美食研究會會說的台詞！"
16006-160060240 = "確實，美食不會自己長腳上門呢……一般來說"
16006-160060250 = "嗯！即使是呆呆地張開嘴巴等著，食物也不會來！"
16006-160060260 = "除非是老師就在我旁邊吃著洋芋片！"
16006-160060270 = "耶，那是在暗地裡做的事嗎……？"
16006-160060280 = "洋芋片下次再吃……好了，去尋找夏天的美食吧！"
16006-160060290 = "我們常夏美食家雙人組該出場了！"
16006-160060300 = "常夏美食家雙人組……？"
16006-160060310 = "……什麼東西？"
16006-160060320 = "我在那裡等老師囉！"
16006-160060330 = "老師！"
16006-160060340 = "我們常夏美食家雙人組的美食之旅，還沒結束唷！"
16006-160060350 = "真的很喜歡這名字呢……"
16006-160060360 = "所以，今天要吃什麼呢？"
16006-160060370 = "西邊海岸有名的義式冰淇淋很不錯……"
16006-160060380 = "東邊大街上有口皆碑的鬆餅也不賴……"
16006-160060390 = "但果然現在最感興趣的……！"
16006-160060400 = "還是中央大街攤販在賣的「草莓香蕉章魚燒」吧！"
16006-160060410 = "泉似乎沒有夏季倦怠的問題呢"
16006-160060420 = "因為，有各種美味的料理在等著我們呢！"
16006-160060430 = "沒時間發呆了，老師！"
16006-160060440 = "那麼，今天也在海之家的前面等老師唷！"
16006-160060450 = "遲到的話，我會連老師的份也吃掉一半！"
16006-160060460 = "那倒是完全沒問題……但別吃壞肚子了唷"
16006-160060470 = "先省略情況和原因"
16006-160060480 = "我們去海邊吧，老師！"
16006-160060490 = "現在連省略都學會了嗎……"
16006-160060500 = "呼，變強了呢。泉。我已經沒有東西可以教你了"
16006-160060510 = "……？"
16006-160060520 = "雖然不知道在說什麼，但聽說今天特別熱！"
16006-160060530 = "所以說，為了忘記炎熱……"
16006-160060540 = "要更HIGH才行！來一趟美食之旅吧！"

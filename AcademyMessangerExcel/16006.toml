[translation]
16006-160060010 = "Sensei! It's an event!"
16006-160060020 = "We need to go try the specialties!"
16006-160060030 = "Specialties...?"
16006-160060040 = "If that's what you want, then we will!"
16006-160060050 = "The specialties are calling our names, Sensei!"
16006-160060060 = "Y-Yeah?"
16006-160060070 = "I knew you'd accept right away, Sensei!"
16006-160060080 = "So what do you have your eye on?"
16006-160060090 = "This time..."
16006-160060100 = "The Beach Shack started a special event for the summer!"
16006-160060110 = "Beach Shack? Sounds like a summer thing."
16006-160060120 = "Right? Right?!"
16006-160060130 = "And get this!"
16006-160060140 = "If you win a game, you get a bunch of prizes and food!"
16006-160060150 = "That's appetizing for sure."
16006-160060160 = "Then it's decided!"
16006-160060170 = "See you at the Beach Shack, Sensei!"
16006-160060180 = "We gotta go back to the beach, Sensei!"
16006-160060190 = "I want more summer cuisine!"
16006-160060200 = "Summer food is pretty good."
16006-160060210 = "But, I realized, Sensei..."
16006-160060220 = "It's not going to come to ME!"
16006-160060230 = "That's the Gourmet Research Society spirit!"
16006-160060240 = "You're hitting your stride!"
16006-160060250 = "Yep! Staying still like an idiot isn't going to fill me."
16006-160060260 = "Well, except for all of your chips you'd share with me."
16006-160060270 = "When did I agree to do that?!"
16006-160060280 = "Then summer food, here we come!"
16006-160060290 = "The Summer Summer Food Tour is a go!"
16006-160060300 = "Summer Summer...?"
16006-160060310 = "Food Tour...?"
16006-160060320 = "I'll be waiting!"
16006-160060330 = "Sensei!"
16006-160060340 = "The Summer Summer Food Tour is just getting started!"
16006-160060350 = "You really like that name, huh?"
16006-160060360 = "So! What should we eat today?"
16006-160060370 = "West Beach's famous gelato would be great!"
16006-160060380 = "East Street's waffle cake would be good too..."
16006-160060390 = "But the one thing we have to try for sure is..."
16006-160060400 = "The strawberry-banana flavored takoyaki sold in that one shop on Central Street!"
16006-160060410 = "So we're going to go eat again?"
16006-160060420 = "Right! There's no time to waste, Sensei!"
16006-160060430 = "If we wait any longer, all the good stuff will sell out!"
16006-160060440 = "See you in front of the Beach Shack, Sensei!"
16006-160060450 = "Whoever's late has to give half of their share to the other!"
16006-160060460 = "S-Sure. Okay."
16006-160060470 = "We can leave behind all our worries"
16006-160060480 = "and go out to sea, Sensei!"
16006-160060490 = "Leave behind our worries..."
16006-160060500 = "You've graduated, Izumi. I have nothing left to teach you."
16006-160060510 = "...?"
16006-160060520 = "I heard it's going to be super hot today!"
16006-160060530 = "So, to beat the heat..."
16006-160060540 = "we should go on a foodie adventure!"

[translation]
20011-200110010 = "老師很了解巫女嗎？"
20011-200110020 = "有沒有很了解不太好說……怎麼了？"
20011-200110030 = "當然。我是人稱的巫女專家"
20011-200110040 = "啊，其實是啊"
20011-200110050 = "那個，是這次偶然有個不錯的打工機會"
20011-200110060 = "好像是……在活動現場打扮成巫女的打工"
20011-200110070 = "巫女專家……？"
20011-200110080 = "……老師，腦袋還好吧？"
20011-200110090 = "或是叫巫女達人也可以"
20011-200110100 = "更加意義不明了！？"
20011-200110110 = "呼……總之，因為這份巫女的打工，時薪還不錯，所以想試試看"
20011-200110120 = "但是仔細想想，我不太了解巫女……"
20011-200110130 = "如果老師知道的話，希望能告訴我"
20011-200110140 = "雖然不知道能幫上多少忙，但交給我吧！"
20011-200110150 = "謝謝。那我稍後將碰面的地點發給你"
20011-200110160 = "那個，老師"
20011-200110170 = "今天謝謝你，陪我商量這麼多"
20011-200110180 = "不會。等打工開始了我再去找你，好久沒喝甜酒了"
20011-200110190 = "……你來是很好啦，但我是不會嚼的！"
20011-200110200 = "老師，再次祝你新年快樂"
20011-200110210 = "新年快樂。今年也請多關照"
20011-200110220 = "話說回來，茜香，打工的準備如何？"
20011-200110230 = "啊，嗯。感覺還不錯唷"
20011-200110240 = "雖然還有些不習慣，也有很多不安的地方……"
20011-200110250 = "但很有趣，總結來說沒有問題吧"
20011-200110260 = "那我現在過去唷！"
20011-200110270 = "咦，現在！？我，我沒有說要你來吧！？"
20011-200110280 = "我去的話，你會很困擾嗎？"
20011-200110290 = "不，不是那個意思……"
20011-200110300 = "不如說希望你來"
20011-200110310 = "啊啊，寫到一半就發出去了！剛才的不算！當作沒看見！"
20011-200110320 = "所以說，不特別來也沒關係！"
20011-200110330 = "老師，現在有時間嗎？"
20011-200110340 = "嗯，很閒唷"
20011-200110350 = "可以空出點時間唷，怎麼了？"
20011-200110360 = "啊，是嗎……？"
20011-200110370 = "其實是今天的打工好像會提早結束"
20011-200110380 = "因為時間很充裕，那個……"
20011-200110390 = "我想給阿拜多斯的大家買點拜年禮"
20011-200110400 = "能陪我一起挑選嗎？"
20011-200110410 = "馬上過去！"
20011-200110420 = "謝謝。我等著唷"
20011-200110430 = "那個……老師"
20011-200110440 = "你今天來的時候，有點上氣不接下氣的樣子……"
20011-200110450 = "那個……"
20011-200110460 = "沒事的，別放在心上"
20011-200110470 = "是，是嗎……"
20011-200110480 = "只是覺得如果你能聯絡我的話，或許就不用抱著一堆貓了"
20011-200110490 = "……嗯，我知道了"
20011-200110500 = "讓你擔心了，對不起"
20011-200110510 = "一直以來謝謝你了，老師♡"
20011-200110520 = "愛心符號……！"
20011-200110530 = "不，不是！剛才那是自動轉換加上去的……！"
20011-200110540 = "不是那樣的，絕對不是！"

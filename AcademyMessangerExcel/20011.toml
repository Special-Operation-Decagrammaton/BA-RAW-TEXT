[translation]
20011-200110010 = "คุณครู รู้เรื่องเกี่ยวกับมิโกะบ้างมั้ย?"
20011-200110020 = "หืม? ทำไมจู่ๆ ถามถึงเรื่องมิโกะล่ะ?"
20011-200110030 = "ต้องรู้อยู่แล้วสิ!\nเรียกครูว่าเจ้าแห่งมิโกะก็ได้นะ!"
20011-200110040 = "เอ่อ ก็ไม่มีอะไรหรอก"
20011-200110050 = "พอดีฉันบังเอิญได้ยิน\nเรื่องงานพาร์ทไทม์ที่รายได้ดีมา"
20011-200110060 = "เป็นงานพาร์ทไทม์ที่ต้อง\nแต่งตัวเป็นมิโกะในงานเทศกาล"
20011-200110070 = "เจ้าแห่งมิโกะ...?"
20011-200110080 = "คุณครู... ฉันไม่เข้าใจ\nที่คุณครูพูดเลยสักนิด"
20011-200110090 = "ถ้าไม่ชอบจะเรียกว่า\nสาวกมิโกะก็ได้นะ"
20011-200110100 = "ยิ่งไม่เข้าใจกว่าเดิมอีก!"
20011-200110110 = "เฮ้อ... แต่ว่ามันเป็นงานพาร์ทไทม์\nที่ค่าจ้างต่อชั่วโมงสูงมาก ถ้าเป็น\nไปได้ฉันก็อยากจะไปทำ"
20011-200110120 = "แต่ฉันไม่รู้เลยว่ามิโกะจะต้อง\nทำอะไรบ้าง"
20011-200110130 = "คือถ้าคุณครูไม่ว่าอะไร ฉันอยาก\nขอให้คุณครูช่วยหน่อย ได้รึเปล่า?"
20011-200110140 = "ได้เสมอ ทุกที่ทุกเวลา!"
20011-200110150 = "จริงเหรอ...? ถ้างั้นไว้เจอกัน\nที่สถานที่นัดพบนะ คุณครู!"
20011-200110160 = "ยังไงก็ตาม คุณครู..."
20011-200110170 = "ขอบคุณที่ให้คำปรึกษาวันนี้นะ"
20011-200110180 = "ถ้าเริ่มงานพาร์ทไทม์เมื่อไหร่\nครูจะไปหานะ อยากดื่มสาเกหวานด้วย"
20011-200110190 = "คะ...คุณครูจะมาก็ได้นะ แต่ฉันซื้อ\nให้ได้แค่สาเกหวานธรรมดานะ!"
20011-200110200 = "สวัสดีปีใหม่ คุณครู"
20011-200110210 = "สวัสดีปีใหม่ เซริกะ"
20011-200110220 = "เตรียมงานพาร์ทไทม์เป็นยังไงบ้าง?\nโอเครึเปล่า?"
20011-200110230 = "ถ้าเรื่องนั้นละก็ไปได้สวยเลยละ"
20011-200110240 = "ถึงจะกังวลเพราะมีเรื่องที่ไม่คุ้น\nอยู่นิดหน่อยก็เถอะ..."
20011-200110250 = "แต่คิดว่าไม่น่ามีปัญหาหรอก"
20011-200110260 = "งั้นเหรอ เข้าใจแล้ว\nครูจะไปหาเดี๋ยวนี้เลย!"
20011-200110270 = "หาาา? ฉะ...ฉันไม่ได้บอก\nให้มาหาสักหน่อยนะ?!"
20011-200110280 = "เซริกะจังลำบากใจ\nที่ครูจะไปหาเหรอ?"
20011-200110290 = "เปล่าหรอก มันก็ไม่ใช่แบบนั้น"
20011-200110300 = "ถ้าคุณครูมาก็คงดีจริงๆ นั่นแหละ"
20011-200110310 = "อ๊ะ จู่ๆ ก็เผลอส่งไปอีกแล้ว!\nนึกว่าไม่เห็นข้อความเมื่อกี้ก็แล้วกันนะ!"
20011-200110320 = "เพราะงั้นไม่ต้องมาก็ได้!"
20011-200110330 = "คุณครู ตอนนี้ว่างรึเปล่า?"
20011-200110340 = "ตอนนี้ว่างมากๆ เลยละ"
20011-200110350 = "ถึงไม่ว่าง แต่ถ้าเพื่อเซริกะ\nครูก็ว่างเสมอ!"
20011-200110360 = "งะ...งั้นเหรอ? คือว่า..."
20011-200110370 = "ดูเหมือนวันนี้งานพาร์ทไทม์จะเสร็จเร็วน่ะ"
20011-200110380 = "เพราะงั้นเลยมีเวลาว่างนิดหน่อย..."
20011-200110390 = "ฉันก็เลยอยากจะไปเลือกของขวัญ\nปีใหม่ให้กับสมาชิกทุกคนน่ะ..."
20011-200110400 = "คุณครูไปด้วยกันหน่อยได้มั้ย?"
20011-200110410 = "ครูจะไปหาเดี๋ยวนี้เลย!"
20011-200110420 = "อื้อ งั้นฉันจะรอนะ"
20011-200110430 = "คือว่าวันนี้... เรื่องเมื่อกลางวันน่ะ..."
20011-200110440 = "ตกใจเลยที่เห็นคุณครูตามหาฉัน\nพร้อมทำสีหน้าแบบนั้นน่ะ"
20011-200110450 = "เรื่องนั้น คือว่า..."
20011-200110460 = "ไม่เป็นไร ไม่ต้องคิดมากนะ"
20011-200110470 = "งะ...งั้นเหรอ?"
20011-200110480 = "ถ้าคราวหน้ามีเรื่องแบบนี้อีก\nติดต่อมาบอกครูหน่อยก็ดีนะ"
20011-200110490 = "อะ...อื้อ เข้าใจแล้ว"
20011-200110500 = "ต่อไปฉันจะพยายามไม่ทำ\nให้คุณครูเป็นห่วงนะ"
20011-200110510 = "ขอบคุณนะ คุณครู♡"
20011-200110520 = "ว้าว มินิฮาร์ตล่ะ!"
20011-200110530 = "ปะ...เปล่านะ ระบบออโต้\nมันพิมพ์เติมไปเองต่างหากเล่า!"
20011-200110540 = "อย่าเข้าใจผิดล่ะ~!"

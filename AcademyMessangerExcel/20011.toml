[translation]
20011-200110010 = "Do you know anything about mikos, Sensei?"
20011-200110020 = "Huh? Why are you asking about mikos all of a sudden?"
20011-200110030 = "Of course! You can call me the miko master!"
20011-200110040 = "Well, it's nothing. Just that..."
20011-200110050 = "I, uh, happened to hear about a part-time job that pays well."
20011-200110060 = "It's a part-time job acting as a miko at an...event."
20011-200110070 = "M-Miko master...?"
20011-200110080 = "Um, uh, Sensei. I have no idea what you mean."
20011-200110090 = "If you don't like that, how about miko meister?!"
20011-200110100 = "Now I REALLY have no idea what you mean!!"
20011-200110110 = "*sigh* ...Anyway, the hourly wage is quite high, so I'd like to do this part-time job if possible."
20011-200110120 = "But I have no clue what to do as a part-time miko."
20011-200110130 = "If it's okay with you, I'd like your help."
20011-200110140 = "Okay, I don't mind helping you at all!"
20011-200110150 = "Really...? Then I'll see you at the meeting spot, Sensei!"
20011-200110160 = "In any case, Sensei..."
20011-200110170 = "Thank you for consulting with me today."
20011-200110180 = "I'll come visit when you start your part-time job. I want to drink gamju as well."
20011-200110190 = "...Y-You can come, but gamju is the only thing I can give you!"
20011-200110200 = "Happy New Year, Sensei."
20011-200110210 = "Happy New Year, Serika."
20011-200110220 = "How are the part-time job preparations going? Good?"
20011-200110230 = "Oh, actually, it's going very well."
20011-200110240 = "I'm a bit worried because there are some things I'm not used to yet, but..."
20011-200110250 = "Yeah, I don't think there will be any problems."
20011-200110260 = "I see. Okay. I'll head over right now!"
20011-200110270 = "W-What? I wasn't t-trying to tell you to come over or anything!"
20011-200110280 = "Serika, if I go see you, will it trouble you?"
20011-200110290 = "H-Huh? I mean, not really."
20011-200110300 = "Rather, if you came..."
20011-200110310 = "Oops! When did I send that?! Forget about what I just sent! Pretend you didn't see it!"
20011-200110320 = "It's okay if you don't come over!"
20011-200110330 = "Um, Sensei? Are you free?"
20011-200110340 = "I am very, very free."
20011-200110350 = "I'm not free, but I can be for you, Serika!"
20011-200110360 = "Y-Yeah? Well, the thing is,"
20011-200110370 = "I think I'll be done with my part-time job early today."
20011-200110380 = "So, I'll have some free time..."
20011-200110390 = "I want to choose New Year gifts for everyone in Abydos."
20011-200110400 = "Can you join me?"
20011-200110410 = "I'll be right there!"
20011-200110420 = "Okay, I'll see you soon."
20011-200110430 = "Today, uh... So, about what happened today..."
20011-200110440 = "You looked for me with this expression on your face."
20011-200110450 = "So, the thing is..."
20011-200110460 = "Don't worry about it."
20011-200110470 = "Oh, y-yeah?"
20011-200110480 = "If something similar happens again, it'd be nice if you could let me know in advance."
20011-200110490 = "Y-Yes, o-okay."
20011-200110500 = "I'll, uh, try my best not to worry you."
20011-200110510 = "Thank you as always, Sensei ♥"
20011-200110520 = "Oh, a heart."
20011-200110530 = "Uh, no! That was added by the auto-complete function!"
20011-200110540 = "D-Don't get the wrong idea!"

[translation]
20011-200110010 = "선생님, 혹시 무녀에 대해 잘 알아?"
20011-200110020 = "응? 갑자기 웬 무녀?"
20011-200110030 = "물론이지! 나를 무녀 마스터라고 불러주지 않을래?"
20011-200110040 = "아, 딴 게 아니라."
20011-200110050 = "그, 이번에 우연히 벌이가 좋은 아르바이트의 이야기가 들어왔는데."
20011-200110060 = "행사장에서 무녀를 대행하는 아르바이트…래."
20011-200110070 = "무, 무녀 마스터……?"
20011-200110080 = "아니, 저기, 선생님. 무슨 의미인지 전혀 모르겠거든?"
20011-200110090 = "아니라면, 무녀 마이스터라도 좋아!"
20011-200110100 = "더욱 의미를 모르겠거든?!"
20011-200110110 = "하아……. 하여간 시급이 꽤 센 아르바이트라, 기왕이면 하고 싶긴 한데."
20011-200110120 = "막상 무녀 아르바이트라니, 뭘 해야 할지 전혀 감이 오질 않는달까."
20011-200110130 = "혹시 괜찮다면 선생님에게 도움을 받고 싶은데. 괜찮을까?"
20011-200110140 = "응. 그런 거라면 얼마든지!"
20011-200110150 = "그래……? 그럼 약속 장소에서 보자. 선생님!"
20011-200110160 = "이러니저러니 해도 선생님……."
20011-200110170 = "오늘 상담에 응해줘서 고마워."
20011-200110180 = "응. 아르바이트 시작하면 만나러 갈게. 감주도 마시고 싶고."
20011-200110190 = "……오, 오는 건 괜찮지만. 줄 수 있는 건 평범한 감주 정도니까!"
20011-200110200 = "새해 복 많이 받아, 선생님."
20011-200110210 = "새해 복 많이 받아. 세리카."
20011-200110220 = "아르바이트 준비는 어때? 괜찮아?"
20011-200110230 = "아, 그거라면 완벽해."
20011-200110240 = "아직 조금 익숙지 않은 부분이 있어서 걱정은 되지만……."
20011-200110250 = "응, 문제는 없을 것 같아."
20011-200110260 = "그렇구나. 알았어. 바로 갈게!"
20011-200110270 = "뭐, 뭐어? 따, 딱히 찾아오라는 소리가 아니었다고?!"
20011-200110280 = "찾아가면, 세리카가 곤란해지는 거야?"
20011-200110290 = "으, 응? 아니, 딱히 그런 건 아니지만."
20011-200110300 = "오히려 선생님이 와주면"
20011-200110310 = "아앗, 도중에 보내버렸다?! 방금 건 없던 걸로! 못 본 걸로 해!"
20011-200110320 = "그러니까 딱히 오지 않아도 괜찮으니까!"
20011-200110330 = "아, 선생님. 혹시 한가해?"
20011-200110340 = "무지무지 한가합니다."
20011-200110350 = "한가하지 않지만, 세리카를 위해서라면 한가하도록 노력할게!"
20011-200110360 = "그, 그래? 아니, 다른 게 아니라."
20011-200110370 = "오늘 아르바이트가 좀 일찍 끝날 것 같아서 말이야."
20011-200110380 = "그래서 여유시간이 좀 생길 것 같아서 말이야……."
20011-200110390 = "아비도스의 모두에게 선물할 새해 선물을 고르고 싶어서 그런데."
20011-200110400 = "어울려주지 않을래?"
20011-200110410 = "바로 갈게!"
20011-200110420 = "응, 기다리고 있을게."
20011-200110430 = "오늘, 그……. 낮에 있었던 일, 말인데. 선생님."
20011-200110440 = "엄청 굉장한 얼굴이 되어서, 날 찾았잖아."
20011-200110450 = "그게, 그러니까……."
20011-200110460 = "괜찮아. 신경 쓰지 마."
20011-200110470 = "아, 그, 그래?"
20011-200110480 = "다음번에 비슷한 일이 있다면, 그때는 미리 연락해 주면 더 좋고."
20011-200110490 = "으, 응. 아, 알았어."
20011-200110500 = "앞으로는 걱정시키지 않도록, 그, 노력할게."
20011-200110510 = "늘 고마워. 선생님♡"
20011-200110520 = "앗, 하트다."
20011-200110530 = "아, 아니, 지금 건 자동완성으로 덧붙여진 거니까!"
20011-200110540 = "오, 오해하지 마~!"

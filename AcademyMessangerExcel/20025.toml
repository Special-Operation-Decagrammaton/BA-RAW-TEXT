[translation]
20025-200250010 = "สวัสดีค่ะ (ใส่ชื่อตัวเอง) เองค่ะ"
20025-200250020 = "ในวารดิถีขึ้นปีใหม่ ปีที่แล้ว (ชื่อผู้รับ)\nมีโชคลาภฉันใด"
20025-200250030 = "ก็ขอให้ปีนี้มั่งมีโชคลาภฉันนั้น"
20025-200250040 = "ขอขอบคุณมา ณ โอกาสนี้\n(ใส่ชื่อตัวเอง) ด้วยความนับถือ"
20025-200250050 = "...?"
20025-200250060 = "อ๋อ อื้ม ขอบใจนะ ฮารุกะ!"
20025-200250070 = "เทมเพลตดีงามมาก ขอบใจนะ!"
20025-200250080 = "ค่ะ"
20025-200250090 = "ค่ะ!!"
20025-200250100 = "คุณครู"
20025-200250110 = "เอ่อ..."
20025-200250120 = "คือว่า..."
20025-200250130 = "ได้ยินว่าคุณครูกำลังหาฉันอยู่..."
20025-200250140 = "อ๋อ ฮารุกะ ใช่แล้ว"
20025-200250150 = "ตอนนี้ฮารุกะว่างรึเปล่า?"
20025-200250160 = "คะ?"
20025-200250170 = "ค่ะ จะไปเดี๋ยวนี้เลยค่ะ"
20025-200250180 = "ไม่ต้องกังวลนะคะ ฉันจะรีบไปหา\nคุณครูเดี๋ยวนี้เลยค่ะ"
20025-200250190 = "ขอบคุณที่เรียกฉันไปพบนะคะ!"
20025-200250200 = "ขอบคุณค่ะ ฉันกลับมาได้อย่าง\nปลอดภัยเพราะคุณครูเลยค่ะ"
20025-200250210 = "อื้ม เก่งมาก"
20025-200250220 = "ฮอตแพ็กที่ครูให้มา ฉันจะใส่ยากันบูด\nแล้วเก็บใส่ตู้เซฟไว้เป็นสมบัติของตระกูลค่ะ\nสัญญาว่าจะรักษามันด้วยชีวิตเลยค่ะ"
20025-200250230 = "อื้ม"
20025-200250240 = "หืม?"
20025-200250250 = "ลมเย็นมากจริงๆ ค่ะ โปรดรักษาความ\nอบอุ่นเพื่อไม่ให้เป็นหวัดด้วยนะคะ"
20025-200250260 = "เอ่อ..."
20025-200250270 = "ไม่ใช่สิ..."
20025-200250280 = "เมื่อกี้มันเหมือนออกคำสั่งเลย..."
20025-200250290 = "เอ่อ... อันที่จริงฉันไม่ได้เป็นคนเขียนค่ะ..."
20025-200250300 = "ไม่สิ ไม่ใช่ว่าฉันไม่ได้เป็นคนเขียน"
20025-200250310 = "อืม..."
20025-200250320 = "ขอโทษค่ะขอโทษค่ะขอโทษค่ะ..."
20025-200250330 = "ไม่เป็นไรหรอก\nครูเข้าใจที่ฮารุกะจะบอกนะ"
20025-200250340 = "ขอบคุณนะ ฮารุกะ"
20025-200250350 = "อ่า..."
20025-200250360 = "ค่ะ"
20025-200250370 = "ขอโทษนะคะ..."
20025-200250380 = "คุณครู"
20025-200250390 = "เอ่อ..."
20025-200250400 = "อย่างที่ฉันบอกไปเมื่อกี้ คุณครูคอย\nดูแลฉันอย่างดีมาโดยตลอด..."
20025-200250410 = "ถ้าอย่างนั้น... ชาติหน้า..."
20025-200250420 = "ก็ขอ..."
20025-200250430 = "ขอฝากเนื้อฝากตัวด้วยนะคะ"
20025-200250440 = "ขอบคุณค่ะ"
20025-200250450 = "ครูก็ขอฝากตัวด้วยนะ"
20025-200250460 = "อากาศหนาว ดูแลตัวเองดีๆ ด้วยนะ"
20025-200250470 = "อ่า..."
20025-200250480 = "ค่ะ!!"

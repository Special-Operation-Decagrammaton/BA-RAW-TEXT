[translation]
23006-2449 = "「～百夜堂×奇普托斯草莓天國～合作活動召開！」"
23006-2450 = "「草莓大福、草莓銅鑼燒、草莓饅頭、草莓八橋！還有草莓餡蜜！」"
23006-2451 = "「請來品嚐匯集了奇普托斯各地草莓的『奇普托斯草莓天國』和傳統甘味喫茶『百夜堂』的合作吧！」"
23006-2452 = "「從今天開始舉辦一週，請務必光臨！」"
23006-2453 = "「來店時出示此訊息，結帳時可享10%折扣！」"
23006-2454 = "「那麼，我在百夜堂等你唷！喵喵！」"
23006-2455 = "那個……？"
23006-2456 = "喵喵……？"
23006-2457 = "嘿嘿，老師！"
23006-2458 = "實際上正如我發送的那樣，百夜堂正在舉辦活動！"
23006-2459 = "因為機會難得，所以我想在這個時候再次好好地招待老師"
23006-2460 = "會來吧？"
23006-2461 = "稍微確認一下日程之後……"
23006-2462 = "會　來　吧？"
23006-2463 = "如果是靜子的請求的話！"
23006-2464 = "嘿嘿！好！"
23006-2465 = "我等你唷！"
23006-2466 = "這次雖然犯了很多錯誤"
23006-2467 = "但下次一定會攻略老師的！"
23006-2468 = "用我冒失的力量！"
23006-2469 = "先說出來的話\n就不「冒失」了吧……？"
23006-2470 = "請做好覺悟吧！"
23006-2471 = "那個，好的……"
23006-2472 = "老師……"
23006-2473 = "我，我……"
23006-2474 = "靜子，再也忍不住了……"
23006-2475 = "那麼早點去比較好唷"
23006-2476 = "結束後不要忘記洗手唷"
23006-2477 = "現在是在對怦然心動的看板娘說些什麼啊！？"
23006-2478 = "更確切地說，你怎麼認為我會在MomoTalk上討論這種事！？"
23006-2479 = "哎喲，真是的……"
23006-2480 = "那個，老師。我是靜子呀～"
23006-2481 = "還要繼續那套流程？"
23006-2482 = "……嗚嗚，算了……"
23006-2483 = "身為節慶營運管理部的部長，有件事想拜託老師！"
23006-2484 = "請陪我準備明天的祭典！"
23006-2485 = "嗯，OK"
23006-2486 = "所以，到底是什麼忍不住？"
23006-2487 = "那個已經無所謂了！"
23006-2488 = "對，該話題到此結束！禁止再提起！！"
23006-2489 = "老師。今天，那個……"
23006-2490 = "怎麼了？"
23006-2491 = "不，不，沒什麼"
23006-2492 = "今天一天也都在忙工作的事吧"
23006-2493 = "我們都加油吧"
23006-2494 = "呵呵呵……"
23006-2495 = "嘿嘿嘿？"
23006-2496 = "呵呵呵……？"
23006-2497 = "我才沒有用「嘿嘿嘿」那種下流的笑法！？"
23006-2498 = "上面不是寫著「呵呵呵」嗎！"
23006-2499 = "確實。那麼，怎麼了嗎？"
23006-2500 = "老師，你有說過吧"
23006-2501 = "累的時候最好休息，睏的時候最好睡覺"
23006-2502 = "今天，我想讓老師對那句言行負起責任"
23006-2503 = "我在百夜堂等著"
23006-2504 = "P.S. 請從後門進來，不要走正門"
23006-2505 = "……？"
23006-23006010 = "老師！老師！"
23006-23006020 = "從今天起，百夜堂的特別季節活動就要開始囉！"
23006-23006030 = "咚隆咚隆……「蘋果祭」！！"
23006-23006040 = "有清新的蘋果茶，還有各種酸甜可口的甜點組成的饗宴哦！"
23006-23006050 = "看來我可不能缺席呢！"
23006-23006060 = "呵呵呵呵呵"
23006-23006070 = "一定要來玩哦！"
23006-23006080 = "我會跟往常一樣，用最頂級的規格款待老師的！"

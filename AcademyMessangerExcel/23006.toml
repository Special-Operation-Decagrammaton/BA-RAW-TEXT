[translation]
23006-2449 = "「~백야당 x 키보토스 딸기천국~ 캠페인 개최!」"
23006-2450 = "「딸기 찹쌀떡! 딸기 팥빵! 딸기 만쥬! 딸기 야츠하시! 거기다 딸기 안미츠까지!」"
23006-2451 = "「키보토스 각지의 딸기가 담긴 백야당의 전통 디저트를 맛보자!」"
23006-2452 = "「오늘부터 앞으로 일주일! 계속되는 스트로베리 페스티벌의 향연에 참가하세요!」"
23006-2453 = "「방문 시, 이 문자를 보여주신다면 10% 할인가 적용!」"
23006-2454 = "「그럼 백야당에서 기다리고 있을게요! 냥냥!」"
23006-2455 = "응……?"
23006-2456 = "냥냥……?"
23006-2457 = "에헤헷, 선생님!"
23006-2458 = "백야당에서 이벤트가 개최되었어요!"
23006-2459 = "그걸 기념해 선생님에게 완벽한 접대 서비스를 보여드리고 싶어요."
23006-2460 = "꼭 찾아와 주실 거죠?"
23006-2461 = "그건 일정을 확인한 다음에……."
23006-2462 = "꼭 찾아와 주실 거죠……?"
23006-2463 = "……뭐, 시즈코의 부탁이라면."
23006-2464 = "에헤헷! 네에!"
23006-2465 = "시즈코, 기다리고 있을게요!"
23006-2466 = "이번엔 먹히지 않았지만."
23006-2467 = "다음번엔 반드시 선생님을 공략해주겠어요!"
23006-2468 = "덜렁이 파워로!"
23006-2469 = "이미 「덜렁이」가 아니지 않아...?"
23006-2470 = "각오하시라구요!"
23006-2471 = "뭐어, 네……."
23006-2472 = "선생님……"
23006-2473 = "저…… 저 시즈코……."
23006-2474 = "더는 참을 수 없어요……."
23006-2475 = "그럼 늦기 전에 어서 다녀와."
23006-2476 = "볼일을 본 다음에 손 씻는 거 잊지 말고."
23006-2477 = "아니, 지금 백야당의 마스코트한테 무슨 소리를 하는 거예요?!"
23006-2478 = "애당초 제가 왜 그런 이야기를 모모톡으로 하겠냐구요?!"
23006-2479 = "핫?! 아니아니……."
23006-2480 = "흠흠, 저어. 선생님~ 시즈코는요……."
23006-2481 = "다시 시작하는 거야?"
23006-2482 = "……으윽, 좋아요."
23006-2483 = "마츠리운영관리부의 부장으로서, 선생님에게 요구합니다!"
23006-2484 = "내일 있을 축제 준비에 어울려주세요!"
23006-2485 = "그건 괜찮지만…… 아까의 이야기는?"
23006-2486 = "그래서 결국 참을 수 없다는 건 뭐였어?"
23006-2487 = "그 화제는 끝!"
23006-2488 = "부끄러우니까! 언급 금지!"
23006-2489 = "선생님, 오늘……."
23006-2490 = "왜 그래?"
23006-2491 = "아, 아뇨. 아무것도 아니에요."
23006-2492 = "오늘 하루도 바쁜 업무가 있으실 테지요."
23006-2493 = "후후, 서로 힘내자구요?"
23006-2494 = "후후, 후후, 후후후후!"
23006-2495 = "쿠헤헤?"
23006-2496 = "후후…….?"
23006-2497 = "쿠헤헤! 하고 아저씨처럼 웃은 적 없어요!"
23006-2498 = "바로 위에 쓰여 있잖아요! 후후후! 라고!"
23006-2499 = "그래서, 무슨 일이야?"
23006-2500 = "선생님께서 말씀하셨죠."
23006-2501 = "정말로 힘들 때라면, 말해달라고."
23006-2502 = "그러니 오늘, 선생님께서 책임져 주셔야 할 일이 있어요."
23006-2503 = "백야당에서 기다릴게요."
23006-2504 = "Ps. 아, 그리고 정문이 아니라,\n뒷문으로 들어와 주세요."
23006-2505 = "……음?"
23006-23006010 = "선생님! 선생님!"
23006-23006020 = "오늘부터 백야당 특별 시즌 이벤트가 시작돼요!"
23006-23006030 = "바로바로, [사과 페어]!!"
23006-23006040 = "산뜻한 사과 향 차와 각종 상큼달달한 디저트의 향연이라구요!"
23006-23006050 = "이거 안 갈 수가 없겠군!"
23006-23006060 = "후후후후후"
23006-23006070 = "한번 놀러 오세요!"
23006-23006080 = "항상 그랬던 것처럼, 최고의 접대를 선사해 드릴 테니!!"

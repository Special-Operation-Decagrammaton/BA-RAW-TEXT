[translation]
23006-2449 = "「พบกับแคมเปญ ~เฮียกคิยาโค x\nคิโวทอส สวรรค์แห่งสตรอว์เบอร์รี~!」"
23006-2450 = "「โมจิสตรอว์เบอร์รี!\nปังถั่วแดงสตรอว์เบอร์รี!\nมันจูสตรอว์เบอร์รี!\nยัทสึฮาชิสตรอว์เบอรี!\nและอันมิตสึสตรอว์เบอร์รีรสเด็ด!」"
23006-2451 = "「ขอเชิญชวนมาชิมของหวานใส่\nสตรอว์เบอร์รีสูตรพิเศษของ\nเฮียกคิยาโคและคิโวทอส!」"
23006-2452 = "「ตั้งแต่วันนี้ไปจนครบหนึ่งสัปดาห์!\nอย่าลืมมาร่วมอีเวนต์สตรอว์เบอร์รี\nเฟสติวัลของเรากันนะคะ!」"
23006-2453 = "「ถ้ามาถึงแล้วโชว์ข้อความนี้\nจะได้รับส่วนลด 10% ทันที!」"
23006-2454 = "「ฉันจะรออยู่ที่ร้านเฮียกคิยาโค\nนะคะ! เหมียว!」"
23006-2455 = "หือ?"
23006-2456 = "เหมียว...?"
23006-2457 = "ฮิฮิ คุณครูคะ!"
23006-2458 = "งานอีเวนต์ที่ร้านเฮียกคิยาโคเริ่มขึ้นแล้วค่ะ!"
23006-2459 = "เพื่อเป็นที่ระลึก ฉันจะบริการคุณครูอย่างดีเลยค่ะ!"
23006-2460 = "คุณครูจะมาใช่มั้ยคะ?"
23006-2461 = "เรื่องนั้นต้องดูตารางงานของครูก่อน...."
23006-2462 = "จะมาใช่มั้ยคะ?"
23006-2463 = "ก็นะ... ถ้าชิซุโกะขอแบบนี้\nครูก็ไปแน่นอนอยู่แล้ว"
23006-2464 = "ฮิฮิ! ค่า! "
23006-2465 = "ชิซุโกะจะรอนะคะ!"
23006-2466 = "ถึงคราวนี้จะไม่ได้ผล..."
23006-2467 = "แต่คราวหน้าฉันจะต้องทำให้ได้\nแน่นอนค่ะ!"
23006-2468 = "ด้วยเสน่ห์แห่งความโก๊ะกังของฉัน!"
23006-2469 = "ความโก๊ะกังนี่เป็นเสน่ห์เหรอ?"
23006-2470 = "เตรียมตัวให้พร้อมเลยนะคะ!"
23006-2471 = "เอ่อ... ได้เลย..."
23006-2472 = "คุณครูคะ... "
23006-2473 = "คือ... คือว่าชิซุโกะ..."
23006-2474 = "ทนไม่ไหวอีกแล้วล่ะค่ะ"
23006-2475 = "ถ้างั้นก็รีบไปเถอะ"
23006-2476 = "พอเสร็จแล้วก็อย่าลืมล้างมือด้วยนะ"
23006-2477 = "เดี๋ยวสิคะ ทำไมพูดอะไรแบบนั้นกับ\nมาสคอตของร้านเฮียกคิยาโคล่ะคะ?!"
23006-2478 = "ทำไมฉันถึงพิมพ์อะไรแบบนั้นลงไป\nใน MOMOTALK งั้นเหรอคะ?!"
23006-2479 = "เอ๋?! ไม่ใช่ๆ..."
23006-2480 = "อืมมม... คุณครูขา~ ชิซุโกะน่ะ..."
23006-2481 = "เอาอีกแล้วงั้นเหรอ?"
23006-2482 = "ฮื่อ... ก็ได้..."
23006-2483 = "ในฐานะหัวหน้าชมรมจัดงานเทศกาล\nฉันจะยื่นคำขอกับคุณครูค่ะ!"
23006-2484 = "กรุณามาช่วยฉันเตรียม\nงานเทศกาลวันพรุ่งนี้ด้วยค่ะ!"
23006-2485 = "เรื่องนั้นไม่มีปัญหาหรอก…\nแต่ที่พูดเมื่อกี้หมายความว่ายังไง?"
23006-2486 = "ว่าแต่ว่า เรื่องที่อดทนไม่ไหวแล้ว\nเมื่อกี้คืออะไรเหรอ?"
23006-2487 = "เลิกพูดถึงเรื่องนั้นเถอะค่ะ!"
23006-2488 = "มันน่าอายนะคะ! เลิกพูดเถอะค่ะ!"
23006-2489 = "คุณครูคะ วันนี้…"
23006-2490 = "มีอะไรเหรอ?"
23006-2491 = "ปะ...เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
23006-2492 = "วันนี้คุณครูก็มีงานยุ่งเหมือนเดิมสินะคะ"
23006-2493 = "ฮุฮุ มาพยายามไปด้วยกันนะคะ!"
23006-2494 = "ฮุฮุ! ฮุฮุๆๆ"
23006-2495 = "วะฮะฮ่า?"
23006-2496 = "ฮุฮุ...?"
23006-2497 = "\"วะฮะฮ่า!\" ฉันไม่เคยหัวเราะเหมือน\nลุงแก่ๆ หรอกนะคะ!"
23006-2498 = "มันก็เขียนอยู่ข้างบนไม่ใช่เหรอคะ!\nฮุฮุฮุ แบบนี้!"
23006-2499 = "แล้วมีเรื่องอะไรล่ะ?"
23006-2500 = "คุณครูบอกเองนี่คะ"
23006-2501 = "ถ้ามีช่วงเวลาที่ยากลำบากก็ให้บอก\nคุณครู"
23006-2502 = "เพราะงั้นวันนี้... มีงานที่คุณครูต้องรับ\nผิดชอบอยู่ค่ะ"
23006-2503 = "ฉันจะรอคุณครูที่ร้านเฮียกคิยาโคนะคะ"
23006-2504 = "ปล. อ๋อ ไม่ใช่ที่ประตูหน้านะคะ\nฉันจะรอที่ประตูทางด้านหลังค่ะ"
23006-2505 = "หืม?"
23006-23006010 = "คุณครู! คุณครู!"
23006-23006020 = "วันนี้อีเวนต์ประจำฤดูกาลสุดพิเศษ\nของร้านเฮียกคิยาโคเริ่มแล้วนะคะ!"
23006-23006030 = "และนั่นก็คืองาน... [แอปเปิล แฟร์]!!"
23006-23006040 = "งานเลี้ยงที่จะได้ดื่มด่ำกับรสชาติของ\nชาแอปเปิลแสนสดชื่นและของหวาน\nนานาชนิดค่ะ!"
23006-23006050 = "แบบนี้คงต้องไปแล้ว!"
23006-23006060 = "ฮุฮุฮุฮุฮุฮุ..."
23006-23006070 = "แวะมาเที่ยวชมได้นะคะ!"
23006-23006080 = "ฉันจะต้อนรับคุณครูให้ดีที่สุด\nเหมือนในทุกๆ ครั้งเลย!!"

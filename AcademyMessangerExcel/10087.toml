[translation]
10087-100870010 = "선생님. 아마우 아코입니다."
10087-100870020 = "그러니까, 이건 전쟁이에요!"
10087-100870030 = "……아코?"
10087-100870040 = "네. 건방지달까, 용서할 수 없달까……."
10087-100870050 = "이렇게까지 싸움을 걸어온다면 선도부의 행정관으로서 피할 수 없겠죠."
10087-100870060 = "아니, 오히려 잘됐네요. 이번 기회에 잘근잘근 밟아버릴 수 있을 테니까!"
10087-100870070 = "……아, 아코?"
10087-100870080 = "바닥에서 저를 올려다보면서 자신들의 위치를 다시금 되새길 기회니까, 그 녀석들에게도 좋은 약이 될 거예요."
10087-100870090 = "……."
10087-100870100 = "아 열받네 진짜!! 생각해 보니까"
10087-100870110 = "성질 뻗쳐서 정말!"
10087-100870120 = "아코…… 대체……."
10087-100870130 = "그러니까 선생님, 이따가 봐요!!"
10087-100870140 = "늦으면 안 돼요! 이건 전쟁이니까!"
10087-100870150 = "……여보세요?"
10087-100870160 = "선생님. 잘 돌아가셨나요?"
10087-100870170 = "오늘은 어울려주셔서 감사했습니다."
10087-100870180 = "좀 진정했어……?"
10087-100870190 = "네?"
10087-100870200 = "뭔가요, 그 말은."
10087-100870210 = "그렇게 말하면 어쩐지 지금까지 진정하지 못했던 것처럼 들리는데요?"
10087-100870220 = "전혀 아니거든요? 완전 평정심 그 자체였거든요?"
10087-100870230 = "그건 그렇고…… 무슨 드레스로 할지 정했어요."
10087-100870240 = "오오. 어떤 걸로 골랐어?"
10087-100870250 = "선생님이 골라주신 걸로 하기로 했어요. 이 드레스를 취급하는 곳이 이곳 한군데밖에 없어서 연락해 봤는데"
10087-100870260 = "저기…… 아코 씨. 그건……."
10087-100870270 = "다행히 아직 주문 제작이 가능하다고 하더라고요."
10087-100870280 = "그래도 다행히 제 마음에 드는 걸 찾을 수 있었던 거 같아요."
10087-100870290 = "아, 맞아. 내일 드레스를 사러 가야 하니까, 시간, 늦으시면 안 돼요?"
10087-100870300 = "저기요……?"
10087-100870310 = "선생님. 약속 잊으신 거 아니죠?"
10087-100870320 = "드레스 보러 가는 날이에요."
10087-100870330 = "그런 약속이 있었던가요……."
10087-100870340 = "정말이지……"
10087-100870350 = "잔말 말고 따라오세요! 어른이잖아요!"
10087-100870360 = "열받네……."
10087-100870370 = "네?"
10087-100870380 = "아, 아닙니다…… 늦지 않게 갈게요……."
10087-100870390 = "네. 선생님. 기다리고 있을게요."
10087-100870400 = "선생님…… 드레스는 잘 받았어요."
10087-100870410 = "죄송해요. 제가 직접 찾아가도 되었는데"
10087-100870420 = "괜한 수고를 끼쳐드렸네요."
10087-100870430 = "이 신세는 다음에"
10087-100870440 = "응?"
10087-100870450 = "이건 뭐죠?"
10087-100870460 = "이 끈……? 리본…… 비슷한 건…… 뭔가요?"
10087-100870470 = "아 그건 말이지"
10087-100870480 = "이건 속옷……? 아, 아니. 그렇게 주장하고 있을 뿐인 끈이잖아요?"
10087-100870490 = "이걸 선생님이……?"
10087-100870500 = "그건 말야. 아코. 내가 사준 건 맞는데"
10087-100870510 = "즉, 이런 야한 속옷을 입으라는 건가요?"
10087-100870520 = "평상시에 건방지니까 이런 걸 입혀서 벌주려는 건가요?"
10087-100870530 = "그런 속셈인 거예요?"
10087-100870540 = "아니 그건……."
10087-100870550 = "그런 걸 제가 순순히 따를 거라고 생각했어요?!"
10087-100870560 = "무슨 말도 안 되는…… 파렴치한 것도 정도가 있지, 이건 반품이에요! 반품!!"
10087-100870570 = "그렇게 알고 계세요! 네? 반품해 버릴 거니까요!"
10087-100870580 = "하아……."
10087-100870590 = "선생님. 파티가 얼마 남지 않았어요."
10087-100870600 = "하지만 저는 만반의 준비를 다 끝내놓은 상태예요."
10087-100870610 = "후후. 이대로 그 전쟁은 무사히 저의 승리로 끝나게 되겠죠."
10087-100870620 = "의욕이 충만하네."
10087-100870630 = "그런가요?"
10087-100870640 = "음, 그치만 이렇게 중요한 전투를 앞두고 좀 더 치밀한 준비가 필요하다고 생각해요."
10087-100870650 = "한 치의 실수도 있어서는 안 되니까요."
10087-100870660 = "그러니까, 연습이에요."
10087-100870670 = "연습?"
10087-100870680 = "선생님. 약속 시간까지 여기로 나와주세요."
10087-100870690 = "저와 특훈이에요!"
10087-100870700 = "저기요……?"
10087-100870710 = "선생님……"
10087-100870720 = "오늘은 수고 많으셨습니다."
10087-100870730 = "아코도 수고했어."
10087-100870740 = "저기 선생님……."
10087-100870750 = "선물해 준 건…… 소중하게 간직할게요."
10087-100870760 = "응……?"
10087-100870770 = "그냥 그렇게만 알아두세요."

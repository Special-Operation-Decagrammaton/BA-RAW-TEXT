[translation]
10087-100870010 = "老師。我是天雨亞子"
10087-100870020 = "這是場戰爭！"
10087-100870030 = "……亞子？"
10087-100870040 = "沒錯，不知該說囂張還是無法原諒……"
10087-100870050 = "如果要挑起事端，身為風紀委員會的行政官當然不能逃避"
10087-100870060 = "不，這樣反而正好，就趁這個機會擊潰他們！"
10087-100870070 = "……亞，亞子？"
10087-100870080 = "這是讓他們從底層望向高高在上的我，重新審視自己位置的機會。對那些傢伙來說也會是一劑良藥吧"
10087-100870090 = "……"
10087-100870100 = "啊，真是氣死人了！！"
10087-100870110 = "有夠讓人生氣！"
10087-100870120 = "亞子……到底……"
10087-100870130 = "所以老師，待會見！！"
10087-100870140 = "不能遲到哦！這可是戰爭！"
10087-100870150 = "……？"
10087-100870160 = "老師，您平安到家了嗎？"
10087-100870170 = "謝謝您今天陪我"
10087-100870180 = "稍微冷靜下來了嗎……？"
10087-100870190 = "咦？"
10087-100870200 = "那是什麼意思？"
10087-100870210 = "好像我之前都不冷靜一樣？"
10087-100870220 = "才沒有，我超冷靜的好嗎？"
10087-100870230 = "先不說這個了……我決定要選哪件禮服了"
10087-100870240 = "哦哦，你選了哪一件？"
10087-100870250 = "我決定挑老師幫我選的那件。因為賣這件禮服的地方只有這裡，所以才聯絡老師"
10087-100870260 = "咦……亞子，所以……"
10087-100870270 = "幸好對方表示現在還能訂做"
10087-100870280 = "能找到喜歡的款式真是太好了"
10087-100870290 = "啊，對了。明天要去領禮服，老師可不能遲到，知道嗎？"
10087-100870300 = "咦……？"
10087-100870310 = "老師，您該不會忘記了吧？"
10087-100870320 = "今天是要去領禮服的日子"
10087-100870330 = "有那種事嗎……"
10087-100870340 = "真是的……"
10087-100870350 = "別拖拖拉拉的了，快過來！您不是大人嗎！"
10087-100870360 = "真氣人……"
10087-100870370 = "啊？"
10087-100870380 = "沒，沒什麼……我會準時到的……"
10087-100870390 = "是，老師。我會等您"
10087-100870400 = "老師……我收到禮服了"
10087-100870410 = "真不好意思，我明明該自己去的"
10087-100870420 = "真是勞煩您了"
10087-100870430 = "下次會好好答謝您的"
10087-100870440 = "嗯？"
10087-100870450 = "這是什麼？"
10087-100870460 = "繩子……？這類似……蝴蝶結的東西……是什麼？"
10087-100870470 = "啊，那個啊"
10087-100870480 = "這是內衣……？不，這只是您再三強調是內衣的繩子而已吧？"
10087-100870490 = "這是老師買的……？"
10087-100870500 = "沒錯，亞子。那是我買給你的"
10087-100870510 = "也就是說，老師要我穿這麼色的內衣嗎？"
10087-100870520 = "因為我平常太囂張，所以想罰我穿這個嗎？"
10087-100870530 = "這就是您的居心嗎？"
10087-100870540 = "不是這樣的……"
10087-100870550 = "以為我會乖乖聽話嗎！？"
10087-100870560 = "真是太誇張了……脫序也要有個限度，我要退貨！退貨！！"
10087-100870570 = "知道了嗎！我要退貨！"
10087-100870580 = "唉……"
10087-100870590 = "老師，派對就快開始了"
10087-100870600 = "我已經做好萬全的準備"
10087-100870610 = "呵呵。這樣那場戰爭就會順利以我的勝利落幕吧"
10087-100870620 = "真是充滿幹勁呢"
10087-100870630 = "是嗎？"
10087-100870640 = "嗯，不過我認為在這麼重要的戰鬥之前，必須做更周密的準備"
10087-100870650 = "畢竟不能有絲毫失誤"
10087-100870660 = "所以我決定要先練習"
10087-100870670 = "練習？"
10087-100870680 = "老師。請在約定時間前到這裡來"
10087-100870690 = "跟我一起特訓吧！"
10087-100870700 = "那個……？"
10087-100870710 = "老師……"
10087-100870720 = "今天您辛苦了"
10087-100870730 = "亞子也辛苦了"
10087-100870740 = "那個，老師……"
10087-100870750 = "您送的禮物……我會好好珍惜的"
10087-100870760 = "嗯……？"
10087-100870770 = "我想說的只有這些"

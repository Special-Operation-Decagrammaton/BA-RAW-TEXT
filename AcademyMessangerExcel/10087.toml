[translation]
10087-100870010 = "Sensei. It's Amau Ako. "
10087-100870020 = "The war has begun!"
10087-100870030 = "Ako, are you okay?"
10087-100870040 = "Yes! I don't care what those gremlins' reasons were."
10087-100870050 = "If it's a fight they want, I, the Senior Administrator of the Prefect Team, shall oblige them!"
10087-100870060 = "Maybe this is a blessing in disguise? An opportunity to stomp them into their place!"
10087-100870070 = "A-Ako?"
10087-100870080 = "It'll be a good lesson for them. They'll gaze upon me from the floor and finally understand the way things should be!"
10087-100870090 = "..."
10087-100870100 = "Uh, this is so frustrating! Just the thought of it"
10087-100870110 = "is maddening!"
10087-100870120 = "Ako, what is going on?"
10087-100870130 = "I'll see you in a bit, Sensei!!"
10087-100870140 = "Don't be late! This is a war after all!"
10087-100870150 = "Hello?"
10087-100870160 = "Sensei. Did you make it back okay?"
10087-100870170 = "Thanks for hanging out with me today."
10087-100870180 = "Have you calmed down from earlier?"
10087-100870190 = "Hm? "
10087-100870200 = "What does that mean? "
10087-100870210 = "When you put it like that, it sounds like I haven't been calm."
10087-100870220 = "That's not the case at all! I've been completely calm this whole time!"
10087-100870230 = "Anyway... I've decided on which dress I'd like."
10087-100870240 = "Oho. Which one did you pick?"
10087-100870250 = "I went with the one you suggested. There's only one place that sells it though, so I contacted them."
10087-100870260 = "Wait... Ako. That's... "
10087-100870270 = "Luckily, they're still taking custom orders."
10087-100870280 = "I'm so glad I found one I really liked. "
10087-100870290 = "Oh, that's right. We HAVE to buy the dress tomorrow. So don't be late!"
10087-100870300 = "Pardon?"
10087-100870310 = "Sensei, you promised. "
10087-100870320 = "It's dress shopping day. "
10087-100870330 = "I don't remember making that promise."
10087-100870340 = "Really... "
10087-100870350 = "Aren't you a grown-up?! Quit complaining and come on."
10087-100870360 = "This is a nightmare..."
10087-100870370 = "Hm?"
10087-100870380 = "N-Nothing. I'll be there."
10087-100870390 = "Very good, Sensei. I'll be waiting."
10087-100870400 = "Sensei, I've received my dress."
10087-100870410 = "I'm sorry. I could have just gone there myself."
10087-100870420 = "I didn't mean to bother you. "
10087-100870430 = "All this debt..."
10087-100870440 = "Hm?"
10087-100870450 = "What's this?"
10087-100870460 = "What is this string? Is this a ribbon?"
10087-100870470 = "Oh that's..."
10087-100870480 = "Is this what I think it is? U-Undies?"
10087-100870490 = "Sensei, did you buy this?"
10087-100870500 = "Y-Yes. Technically, I did...!"
10087-100870510 = "Are you telling me to wear this, Sensei?"
10087-100870520 = "Are you trying to get back at me for being cheeky?"
10087-100870530 = "Sensei, I can't believe this..."
10087-100870540 = "No! Ako, the store clerk..."
10087-100870550 = "I'm just supposed to believe a random sales clerk?!"
10087-100870560 = "What nonsense... There are lines in the sand, Sensei! I'm returning this!"
10087-100870570 = "You hear me?! I said I'm returning it!"
10087-100870580 = "*sigh*"
10087-100870590 = "Anyway, it's almost time for the party."
10087-100870600 = "My preparations are all complete. "
10087-100870610 = "Heehee. This war is sure to end in my favor."
10087-100870620 = "Someone's in a good mood... "
10087-100870630 = "Am I?"
10087-100870640 = "Hmm, maybe I need a little more \"practice\" before such a major battle."
10087-100870650 = "I cannot afford to make any mistakes."
10087-100870660 = "They do say practice makes perfect. "
10087-100870670 = "Practice?"
10087-100870680 = "Try to get here on time, Sensei."
10087-100870690 = "It'll be a special \"practice\" session with me!"
10087-100870700 = "Pardon?"
10087-100870710 = "Sensei... "
10087-100870720 = "Thank you for all your help today."
10087-100870730 = "You did a great job too, Ako."
10087-100870740 = "Oh, and um...Sensei..."
10087-100870750 = "That clerk really was right."
10087-100870760 = "H-Huh?"
10087-100870770 = "Don't worry about it!"

[translation]
10087-100870010 = "คุณครู อามาอุ อาโกะเองค่ะ "
10087-100870020 = "นี่มันสงครามเลยนะคะ!"
10087-100870030 = "อาโกะ...?"
10087-100870040 = "ค่ะ ต้องบอกว่าอวดดี แล้วก็อภัยให้ไม่ได้ด้วย..."
10087-100870050 = "ถ้ามาหาเรื่องทะเลาะกันแบบนี้ เจ้าหน้าที่คณะกรรมการวินัยอย่างฉัน\nก็คงอยู่เฉยไม่ได้ค่ะ"
10087-100870060 = "ไม่สิ ดีเลยเสียอีกค่ะ ฉันจะใช้โอกาสนี้เหยียบพวกนั้นให้จมดินไปเลย!"
10087-100870070 = "อ่า... อาโกะ?"
10087-100870080 = "นี่คงเป็นโอกาสที่พวกนั้นจะได้มองขึ้นมา\nจากพื้นที่ตัวเองอยู่และทบทวนตำแหน่ง\nของตัวเองอีกครั้ง ดังนั้นจึงถือเป็นยาที่\nดีสำหรับพวกเขาค่ะ"
10087-100870090 = "......"
10087-100870100 = "โธ่เอ๊ย น่าโมโหจริงๆ!! พอมาคิดดูแล้ว"
10087-100870110 = "มันก็ยิ่งน่าโมโห!"
10087-100870120 = "อาโกะ... มีเรื่องอะไร..."
10087-100870130 = "คุณครู เดี๋ยวเจอกันนะคะ!! "
10087-100870140 = "ห้ามมาสายนะคะ! นี่มันสงครามเลยนะ!"
10087-100870150 = "ฮัลโหล?"
10087-100870160 = "คุณครู กลับไปถึงหรือยังคะ?"
10087-100870170 = "วันนี้ขอบคุณที่ไปด้วยกันนะคะ"
10087-100870180 = "ใจเย็นลงบ้างมั้ย...?"
10087-100870190 = "คะ? "
10087-100870200 = "ทำไมพูดแบบนั้นล่ะคะ "
10087-100870210 = "ถ้าพูดแบบนั้น จะฟังดูเหมือนวันนี้\nฉันไม่ได้สงบสติอารมณ์เลยนะคะ"
10087-100870220 = "ไม่ใช่อย่างนั้นสักหน่อย\nตอนนี้ฉันสุขุมมากเลยต่างหากค่ะ"
10087-100870230 = "เอาเถอะค่ะ... ตอนนี้ฉันเลือกได้แล้ว\nว่าจะใส่ชุดอะไร"
10087-100870240 = "โอ้ เลือกชุดไหนเหรอ?"
10087-100870250 = "ฉันจะใส่ชุดที่คุณครูเลือกให้ค่ะ\nมีร้านอยู่ร้านเดียวที่ขายชุดนี้\nฉันก็เลยลองติดต่อไป"
10087-100870260 = "เอ่อ... คุณอาโกะ... เรื่องนั้นน่ะ... "
10087-100870270 = "โชคดีที่ทางนั้นบอกว่ายังสั่งตัดได้อยู่ค่ะ"
10087-100870280 = "แต่ยังไงก็โล่งไปทีที่สามารถหาชุดที่\nถูกใจได้นะ"
10087-100870290 = "อ้อ จริงสิ พรุ่งนี้ฉันต้องไปซื้อชุด ห้ามมาสายนะคะ"
10087-100870300 = "เดี๋ยวนะ...?"
10087-100870310 = "คุณครู ไม่ได้ลืมนัดใช่มั้ยคะ? "
10087-100870320 = "วันนี้เราต้องไปดูชุดกันค่ะ "
10087-100870330 = "เรานัดไปดูชุดกันด้วยเหรอ..."
10087-100870340 = "จริงๆ เลย... "
10087-100870350 = "ไม่ต้องถามแล้วค่ะ ออกมาได้แล้ว!\nเป็นผู้ใหญ่ไม่ใช่เหรอคะ!"
10087-100870360 = "หัวร้อนจริงๆ..."
10087-100870370 = "หืม?"
10087-100870380 = "มะ... ไม่มีอะไร แล้วครูจะรีบไปนะ..."
10087-100870390 = "ค่ะ คุณครู ฉันจะรอนะคะ"
10087-100870400 = "คุณครู... ฉันได้ชุดมาแล้วค่ะ"
10087-100870410 = "ขอโทษนะคะ ฉันไปรับชุดคนเดียวก็ได้แท้ๆ"
10087-100870420 = "ฉันทำให้คุณครูลำบากจนได้นะคะ "
10087-100870430 = "ไว้ฉันจะตอบแทนให้..."
10087-100870440 = "หืม?"
10087-100870450 = "มันอะไรกันคะ?"
10087-100870460 = "เชือกนี้มัน...? ดูเหมือนกับ... ริบบิ้นเลย"
10087-100870470 = "อ้อ อันนั้นน่ะเหรอ"
10087-100870480 = "ชุดชั้นในเหรอ...? ไม่สิ ดูยังไงก็เป็นเชือกอยู่ดีไม่ใช่เหรอ?"
10087-100870490 = "อันนี้คุณครู...?"
10087-100870500 = "ชุดนั้นน่ะ อาโกะ ครูซื้อให้ก็จริง..."
10087-100870510 = "แปลว่าจะให้ฉันใส่ชุดชั้นในโป๊ๆ เหรอคะ? "
10087-100870520 = "เพราะปกติฉันเป็นคนอวดดี ก็เลยจะลงโทษด้วยการให้ใส่อะไรแบบนี้เหรอคะ? "
10087-100870530 = "มีเจตนาแบบนั้นเหรอคะ?"
10087-100870540 = "ไม่นะ ไม่ใช่สักหน่อย..."
10087-100870550 = "คิดว่าฉันจะยอมทำตามให้งั้นเหรอคะ?! "
10087-100870560 = "ไม่อยากเชื่อเลย...\nต่อให้จะไม่รู้จักอายก็ต้องมีขีดจำกัดสิ ฉันจะเอาชุดนี้ไปคืนค่ะ! เอาไปคืนเลย!!"
10087-100870570 = "รู้ไว้ด้วยนะคะ!\nฉันจะเอาชุดนี้ไปคืนค่ะ!"
10087-100870580 = "เฮ้อ..."
10087-100870590 = "คุณครู ใกล้จะถึงปาร์ตี้แล้วค่ะ"
10087-100870600 = "แต่ว่าฉันก็เตรียมพร้อมทุกอย่างไว้แล้ว\nละค่ะ"
10087-100870610 = "ฮุฮุ สงครามนั้นก็จะจบลงด้วยชัยชนะ\nของฉันค่ะ"
10087-100870620 = "ความตั้งใจแรงกล้าจังเลยนะ "
10087-100870630 = "งั้นเหรอคะ?"
10087-100870640 = "อืม แต่ฉันก็คิดว่าเราจำเป็นต้องเตรียม\nการให้รอบคอบกว่านี้ก่อนการต่อสู้ที่\nสำคัญนี้ค่ะ"
10087-100870650 = "เพราะมันไม่ควรจะมีข้อผิดพลาดแม้แต่นิดเดียวค่ะ"
10087-100870660 = "งั้นก็ต้องไปฝึกซ้อมค่ะ "
10087-100870670 = "ฝึกซ้อมเหรอ?"
10087-100870680 = "คุณครู ออกมาเจอกันที่นี่ภายในเวลา\nนัดนะคะ"
10087-100870690 = "มาฝึกพิเศษกับฉันค่ะ!"
10087-100870700 = "เดี๋ยวนะ...?"
10087-100870710 = "คุณครู... "
10087-100870720 = "วันนี้ขอบคุณมากเลยค่ะ"
10087-100870730 = "อาโกะเองก็ทำได้ดีมากนะ"
10087-100870740 = "เอ่อ... คุณครูคะ"
10087-100870750 = "ของขวัญที่ให้มา... ฉันจะรักษาไว้เป็นอย่างดีเลยค่ะ"
10087-100870760 = "หืม...?"
10087-100870770 = "รู้ไว้แบบนั้นแล้วกันค่ะ"

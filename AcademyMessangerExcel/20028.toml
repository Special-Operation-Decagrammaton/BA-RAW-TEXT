[translation]
20028-200280010 = "선생님"
20028-200280020 = "혹시 시간 괜찮으실까요?"
20028-200280030 = "무슨 일이 있는 건 아니고……. 다만 약간의 고민이……."
20028-200280040 = "그렇지만 절대 심각한 일은 아니에요!"
20028-200280050 = "굉장히 사소하고 개인적인, 그런 거라서……."
20028-200280060 = "괜찮아. 무슨 일이야?"
20028-200280070 = "아"
20028-200280080 = "감사합니다."
20028-200280090 = "그럼 기다리고 있겠습니다!"
20028-200280100 = "선생님……."
20028-200280110 = "죄송해요……."
20028-200280120 = "고민 상담이라고 해 놓고, 바로 잠들어 버리다니"
20028-200280130 = "스스로 생각해도 너무 한심해서……."
20028-200280140 = "고민이 해결된 거니 좋은 거지."
20028-200280150 = "덕분에 나도 한숨 자서 좋았어."
20028-200280160 = "그, 그런 걸까요……?"
20028-200280170 = "음"
20028-200280180 = "감사합니다. 그럼 그런 걸로……."
20028-200280190 = "선생님"
20028-200280200 = "혹시 들고 오신 다른 짐들이 있으실까요?"
20028-200280210 = "지금 짐들을 캠프로 옮기는 중인데"
20028-200280220 = "선생님 것도 있으시면, 함께 옮겨 드리려고요."
20028-200280230 = "그런 걸 혼자 하게 둘 순 없지."
20028-200280240 = "그럼 나도 좀 도와줄게."
20028-200280250 = "아"
20028-200280260 = "아니에요, 괜찮아요!"
20028-200280270 = "그런 의미로 말씀드린 건 아닌데……."
20028-200280280 = "따, 따로 짐은 더 없으신 걸로 알게요!"
20028-200280290 = "그럼 이만!!"
20028-200280300 = "그러고 보니 선생님"
20028-200280310 = "그"
20028-200280320 = "만약에, 혹시 괜찮으시면"
20028-200280330 = "저"
20028-200280340 = "해보고 싶은 게 하나 있는데요……."
20028-200280350 = "음? 무슨 일이야?"
20028-200280360 = "히나타가 해보고 싶은 거……?"
20028-200280370 = "그"
20028-200280380 = "그게"
20028-200280390 = "여기서 설명 드리기에는 좀 부끄러워서"
20028-200280400 = "죄송해요 말로 해도 괜찮을까요……?"
20028-200280410 = "선생님"
20028-200280420 = "그"
20028-200280430 = "오늘 일은, 정말 죄송합니다……."
20028-200280440 = "괜찮아. 연습이니까."
20028-200280450 = "하다 보면 익숙해질 거야!"
20028-200280460 = "그"
20028-200280470 = "그럴까요?"
20028-200280480 = "그랬으면 좋겠어요."
20028-200280490 = "그럼 염치 불고하고……."
20028-200280500 = "다음에 또 부탁드리겠습니다, 선생님……."

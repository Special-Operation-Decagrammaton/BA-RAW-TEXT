[translation]
20028-200280010 = "คุณครู"
20028-200280020 = "พอมีเวลาสักครู่มั้ยคะ?"
20028-200280030 = "ปะ...เปล่านะคะ...! ก็แค่ฉันมีเรื่องกังวล\nนิดหน่อย..."
20028-200280040 = "แต่ว่ามันไม่ใช่เรื่องร้ายแรงอะไรหรอก\nนะคะ!"
20028-200280050 = "แค่เรื่องส่วนตัว... เล็กๆ น้อยๆ..."
20028-200280060 = "ครูว่างนะ มีอะไรเหรอ?"
20028-200280070 = "อ๊ะ"
20028-200280080 = "ขอบคุณนะคะ"
20028-200280090 = "ถ้างั้นฉันจะรอนะคะ!"
20028-200280100 = "คุณครู..."
20028-200280110 = "ขอโทษนะคะ..."
20028-200280120 = "ฉันจะปรึกษาเรื่องที่กังวล\nแท้ๆ แต่ดันเผลอหลับไปซะได้"
20028-200280130 = "นึกดูแล้วก็ละอายใจจังเลยค่ะ..."
20028-200280140 = "ไม่เป็นไรเลย\nหายกังวลก็ดีแล้วละ"
20028-200280150 = "ครูเองก็ได้พักไปด้วยเลย"
20028-200280160 = "ยะ...อย่างนั้นเหรอคะ...?"
20028-200280170 = "อืม..."
20028-200280180 = "ถ้างั้น... ขอบคุณนะคะ"
20028-200280190 = "คุณครู"
20028-200280200 = "คือว่าคุณครูมีสัมภาระมาด้วยรึเปล่าคะ?"
20028-200280210 = "ตอนนี้ฉันกำลังขนของไปที่พัก..."
20028-200280220 = "ถ้าเกิดว่าคุณครูมีสัมภาระละก็ ฉันจะ\nขนไปให้เองค่ะ"
20028-200280230 = "คนเดียวจะขนไปหมดได้ยังไงกัน"
20028-200280240 = "ถ้างั้นเดี๋ยวครูช่วยเอง"
20028-200280250 = "อ๊ะ"
20028-200280260 = "ไม่เป็นไรค่ะ ฉันขนเองได้ค่ะ!"
20028-200280270 = "ฉันไม่ได้ตั้งใจจะรบกวนคุณครู\nเลยนะคะ..."
20028-200280280 = "อะ...เอาเป็นว่าฉันจะถือว่าคุณครู\nไม่มีกระเป๋าสัมภาระอื่นนะคะ!"
20028-200280290 = "ถ้างั้นขอตัวก่อนค่ะ!!"
20028-200280300 = "พอมาคิดดูแล้ว คุณครูคะ..."
20028-200280310 = "คือ"
20028-200280320 = "คือว่าถ้าคุณครูมีเวลา"
20028-200280330 = "คือ..."
20028-200280340 = "ฉันมีบางอย่างที่อยากลองทำอยู่ค่ะ..."
20028-200280350 = "หืม? เรื่องอะไรเหรอ?"
20028-200280360 = "เรื่องที่ฮินาตะอยากทำ...?"
20028-200280370 = "คือ"
20028-200280380 = "เรื่องนั้น..."
20028-200280390 = "ถ้าให้พิมพ์อธิบาย มันก็ค่อนข้าง\nน่าอายนิดหน่อย"
20028-200280400 = "ขอโทษนะคะ แต่ขอไว้เล่าตอนที่เจอ\nกันได้หรือเปล่าคะ?"
20028-200280410 = "คุณครู"
20028-200280420 = "คือ"
20028-200280430 = "เรื่องวันนี้ ฉันขอโทษจริงๆ ค่ะ..."
20028-200280440 = "ไม่เป็นไร ก็การฝึกนี่เนอะ"
20028-200280450 = "ทำไปเรื่อยๆ เดี๋ยวก็ชินขึ้นเอง!"
20028-200280460 = "ยะ..."
20028-200280470 = "อย่างนั้นเหรอคะ?"
20028-200280480 = "ถ้าเป็นแบบนั้นก็คงดีนะคะ"
20028-200280490 = "ถ้างั้น..."
20028-200280500 = "แล้วฉันจะไปขอรบกวนใหม่นะคะ\nคุณครู"

[translation]
20028-200280010 = "老師"
20028-200280020 = "請問能占用一些時間嗎？"
20028-200280030 = "其實……我有一點小煩惱……"
20028-200280040 = "不過真的不是很嚴重的事！"
20028-200280050 = "因為非常瑣碎也很私人，所以……"
20028-200280060 = "沒問題唷，怎麼了嗎？"
20028-200280070 = "啊"
20028-200280080 = "非常感謝"
20028-200280090 = "那我等著唷！"
20028-200280100 = "老師……"
20028-200280110 = "對不起……"
20028-200280120 = "明明是我說要諮詢煩惱，竟然自己睡著了……"
20028-200280130 = "連我自己都覺得太不像話了……"
20028-200280140 = "煩惱解決了也是件好事哦"
20028-200280150 = "託你的福，我也正好睡了一覺"
20028-200280160 = "是，是這樣嗎……？"
20028-200280170 = "那個"
20028-200280180 = "謝謝您，老師。就當成是這樣吧……"
20028-200280190 = "老師"
20028-200280200 = "請問您還有帶其他行李來嗎？"
20028-200280210 = "我正在把行李搬到營地"
20028-200280220 = "如果還有行李的話，我可以替您一起搬過去"
20028-200280230 = "不能放日向一個人做這種事"
20028-200280240 = "我也來幫忙吧"
20028-200280250 = "啊"
20028-200280260 = "沒關係的！"
20028-200280270 = "我不是那個意思……"
20028-200280280 = "我，我就當老師沒有其他行李囉！"
20028-200280290 = "那麼再見！！"
20028-200280300 = "那個……"
20028-200280310 = "老師"
20028-200280320 = "如果，可以的話……"
20028-200280330 = "就是"
20028-200280340 = "有件事我想嘗試看看……"
20028-200280350 = "怎麼了嗎？"
20028-200280360 = "日向想嘗試的事情是……？"
20028-200280370 = "那"
20028-200280380 = "那個……"
20028-200280390 = "用文字說明有點害羞……"
20028-200280400 = "不好意思，可以單獨見面後再告訴您嗎……？"
20028-200280410 = "老師"
20028-200280420 = "那個"
20028-200280430 = "今天的事，真的非常抱歉……"
20028-200280440 = "沒關係，慢慢練習吧"
20028-200280450 = "下次一定會更熟練的！"
20028-200280460 = "是……"
20028-200280470 = "是嗎？"
20028-200280480 = "但願確實如此"
20028-200280490 = "那就承蒙您的好意……"
20028-200280500 = "下次也拜託您了，老師……"

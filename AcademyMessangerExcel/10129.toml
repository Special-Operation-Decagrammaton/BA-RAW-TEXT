10129-101290240 = "……話說回來"
10129-101290250 = "謝謝您剛才的稱讚"
10129-101290260 = "下次再見"
10129-101290270 = "老師，我是鈴美"
10129-101290280 = "其實我有件事想向您請教"
10129-101290290 = "因為衣服稍微有點裂開了……"
10129-101290300 = "請問老師有常去的修補店嗎？"
10129-101290310 = "夏萊附近有間修補店"
10129-101290320 = "有間我常去的店哦！"
10129-101290330 = "謝謝您"
10129-101290340 = "果然修補店還是要找可靠的地方"
10129-101290350 = "希望下次能再見到您"
10129-101290360 = "老師"
10129-101290370 = "剛才拍的影片"
10129-101290380 = "還在嗎？"
10129-101290390 = "我正打算刪掉，怎麼了嗎？"
10129-101290400 = "還是乾脆不刪了？"
10129-101290410 = "我，我不是那個意思！"
10129-101290420 = "當然要刪掉！！"
10129-101290430 = "只是，那個……"
10129-101290440 = "我想確認衣服有沒有瑕疵……"
10129-101290450 = "如果看影片的話會更容易確認"
10129-101290460 = "畢竟有些角度自己無法看清楚"
10129-101290470 = "就只是這樣而已"
10129-101290480 = "所以，如果能把剛才拍的影片傳給我就太感謝了"
10129-101290490 = "當然，傳完之後請一定要刪掉！"
10129-101290500 = "一定要！"
10129-101290510 = "老師，我是鈴美"
10129-101290520 = "請問老師瞭解所謂的「同人活動」嗎？"
10129-101290530 = "幾乎是博士等級了吧"

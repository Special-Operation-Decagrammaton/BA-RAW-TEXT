[translation]
10129-101290010 = "สวัสดีค่ะ คุณครู สึซึมินะคะ"
10129-101290020 = "สบายดีหรือเปล่าคะ?"
10129-101290030 = "สวัสดี สึซึมิ สบายดีมั้ย?"
10129-101290040 = "ค่ะ ต้องขอบคุณคุณครูเลยค่ะ"
10129-101290050 = "พอดีฉันมีเรื่องอยากถามคุณครู\nก็เลยติดต่อมาค่ะ"
10129-101290060 = "สิ่งอำนวยความสะดวกในชาเล่ต์\nใช้ได้ถึงกี่โมงเหรอคะ?"
10129-101290070 = "ก็ไม่มีเวลากำหนดไว้นะ"
10129-101290080 = "มาใช้ได้ตามต้องการเลย!"
10129-101290090 = "อย่างนี้สินะคะ"
10129-101290100 = "มีข้อควรระวังในการใช้งานบ้างมั้ยคะ?"
10129-101290110 = "แค่ใช้ห้องเสร็จแล้วปิดไฟก็พอแล้วละ"
10129-101290120 = "รับทราบค่ะ"
10129-101290130 = "ขอบคุณนะคะ คุณครู"
10129-101290140 = "คุณครู เอ่อ"
10129-101290150 = "ฉันขอแจ้งอีกครั้งนะคะ..."
10129-101290160 = "ที่เห็นไปเมื่อกี้ไม่ใช่รสนิยมส่วนตัว\nของฉันหรอกนะคะ!"
10129-101290170 = "แต่ครูชอบแบบนั้นนะ!"
10129-101290180 = "นฟ้วา&23วไพืย"
10129-101290190 = "ขอโทษค่ะ"
10129-101290200 = "ฉันเผลอทำโทรศัพท์หล่นค่ะ"
10129-101290210 = "เรื่องนั้นเป็นส่วนหนึ่งของงานกลุ่ม\nรักษาความสงบค่ะ!"
10129-101290220 = "อย่าเข้าใจผิดนะคะ!"
10129-101290230 = "โอเค!"
10129-101290240 = "ส่วนนี่เป็นอีกเรื่องหนึ่ง..."
10129-101290250 = "ขอบคุณที่ชมกันนะคะ"
10129-101290260 = "งั้นไว้เจอกันใหม่ค่ะ"
10129-101290270 = "คุณครู สึซึมินะคะ"
10129-101290280 = "ฉันมีคำถามค่ะ"
10129-101290290 = "พอดีชุดของฉันมันขาดนิดหน่อย..."
10129-101290300 = "คุณครูมีร้านเย็บผ้าที่ไปบ่อยๆ มั้ยคะ?"
10129-101290310 = "มีร้านแถวๆ ชาเล่ต์อยู่นะ"
10129-101290320 = "ร้านนั้นครูไปซ่อมชุดบ่อยเลย!"
10129-101290330 = "ขอบคุณนะคะ"
10129-101290340 = "ฉันอยากหาร้านตัดเย็บผ้าที่น่าเชื่อถือ\nน่ะค่ะ"
10129-101290350 = "หวังว่าจะได้เจอกันอีกนะคะ"
10129-101290360 = "คุณครู"
10129-101290370 = "วิดีโอที่ถ่ายไว้เมื่อกี้"
10129-101290380 = "ยังอยู่หรือเปล่าคะ?"
10129-101290390 = "ครูว่าจะลบอยู่พอดี มีอะไรเหรอ?"
10129-101290400 = "หรือว่าไม่ควรลบ?"
10129-101290410 = "เปล่าค่ะ ไม่ใช่อย่างนั้นค่ะ!"
10129-101290420 = "ยังไงก็ต้องลบสิคะ!!"
10129-101290430 = "แต่ว่า เอ่อ"
10129-101290440 = "ฉันสงสัยว่าชุดมีตำหนิ... หรือเปล่า"
10129-101290450 = "ก็เลยคิดว่าถ้าดูจากวิดีโอที่ถ่ายไว้\nก็น่าจะหาง่ายค่ะ"
10129-101290460 = "ค่ะ ก็มันจะเห็นจุดที่ฉันมองไม่เห็น\nด้วยนี่คะ"
10129-101290470 = "เหตุผลมีแค่นี้จริงๆ ค่ะ"
10129-101290480 = "เพราะงั้นช่วยส่งวิดีโอที่ถ่ายไว้เมื่อกี้\nให้หน่อยนะคะ"
10129-101290490 = "ส่งให้ฉันแล้วต้องลบออกจากเครื่อง\nนะคะ!"
10129-101290500 = "ห้ามเก็บไว้นะ!"
10129-101290510 = "คุณครู สึซึมินะคะ"
10129-101290520 = "คุณครูรู้จัก 'แฟนอีเวนต์' มั้ยคะ?"
10129-101290530 = "รู้จักดีเลยละ"
10129-101290540 = "ครูไม่เคยพลาดสักงานเลย"
10129-101290550 = "คะ?"
10129-101290560 = "รู้จักอยู่แล้วสินะคะ"
10129-101290570 = "พอดีกลุ่มรักษาความสงบได้รับแจ้ง\nมาน่ะค่ะ"
10129-101290580 = "เห็นว่าพวกแยงกี้สาวจะมาขัดขวาง\nอีเวนต์"
10129-101290590 = "ฉันก็เลยอยากขอคำแนะนำจากคุณครู\nเกี่ยวกับเรื่องนี้ค่ะ"
10129-101290600 = "งั้นก็ต้องทำให้ไม่เป็นที่สังเกตเห็นมาก"
10129-101290610 = "แต่งตัวให้เข้ากับงานก็น่าจะดีนะ"
10129-101290620 = "อย่างนี้สินะคะ"
10129-101290630 = "รับทราบค่ะ"
10129-101290640 = "แต่ครูก็อยากไปแฟนอีเวนต์\nเหมือนกันนะ"
10129-101290650 = "คุณครูก็ไปด้วยกันมั้ยคะ?"
10129-101290660 = "น่าจะช่วยได้เยอะเลยละค่ะ"
10129-101290670 = "ขอบคุณนะคะ งั้นไว้เจอกันตอนนั้น\nนะคะ"
10129-101290680 = "เอ่อ นี่ไม่ใช่เรื่องสำคัญอะไร"
10129-101290690 = "แต่ฉันมีภาพลักษณ์ที่น่ากลัวเหรอคะ?"
10129-101290700 = "ตอนฉันจับคนร้ายเมื่อกี้"
10129-101290710 = "คนที่มายืนดูทำหน้าเหมือนกับ..."
10129-101290720 = "ครูว่าเท่ออก"
10129-101290730 = "สงสัยคนอื่นตกใจกันนิดหน่อยน่ะ"
10129-101290740 = "งั้นเหรอคะ..."
10129-101290750 = "แต่เมื่อกี้ฉันคิดหาวิธีอื่นไม่ได้เลยค่ะ"
10129-101290760 = "ใส่สลักไว้อีกรอบน่าจะได้นะ?"
10129-101290770 = "อ่า"
10129-101290780 = "มีวิธีนั้นสินะ"
10129-101290790 = "ฉันจะจดจำไว้ใช้ครั้งต่อไปค่ะ"
10129-101290800 = "คุณครู สึซึมินะคะ"
10129-101290810 = "สุดสัปดาห์นี้ยุ่งหรือเปล่าคะ?"
10129-101290820 = "ก็ไม่มีงานอะไรพิเศษนะ"
10129-101290830 = "งั้นสินะคะ"
10129-101290840 = "ถ้างั้นสุดสัปดาห์นี้"
10129-101290850 = "ไปสวนสนุกกับฉันได้มั้ยคะ?"
10129-101290860 = "โอ้ ดีเลย!"
10129-101290870 = "ขอบคุณค่ะ"
10129-101290880 = "จู่ๆ ฉันก็มาชวน แต่ว่าคุณครูก็ตอบรับ\nอย่างใจดี"
10129-101290890 = "ขอบคุณเสมอเลยนะคะ"
10129-101290900 = "คุณครู สึซึมินะคะ"
10129-101290910 = "ขอบคุณที่คอยให้กำลังใจฉันตลอด\nเลยนะคะ"
10129-101290920 = "โดยเฉพาะอย่างยิ่งช่วงนี้ ฉันได้รับ\nกำลังใจเยอะเลยค่ะ"
10129-101290930 = "..."
10129-101290940 = "ต่อไปฉันก็ขอฝากตัวด้วยนะคะ"
10129-101290950 = "สึซึมิ ครูต่างหากที่ต้องพูดแบบนั้น!"
10129-101290960 = "ต่อไปก็ฝากปกป้องครูด้วยนะ\nเทอร์ไมต์ ไวต์!"
10129-101290970 = "นั่นเป็นการแสดงที่ฉันจำเป็นต้องทำ\nต่างหากค่ะ!"
10129-101290980 = "..."
10129-101290990 = "แต่แน่นอนว่าฉันก็จะปกป้องคุณครู"
10129-101291000 = "ทุกเวลาอยู่แล้วค่ะ"
10129-101291010 = "แล้วเจอกันใหม่นะคะ... คุณครู"

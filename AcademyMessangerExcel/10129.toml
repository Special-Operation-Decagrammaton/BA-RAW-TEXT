[translation]
10129-101290010 = "안녕하세요, 선생님. 스즈미입니다."
10129-101290020 = "잘 지내시지요?"
10129-101290030 = "안녕, 스즈미. 잘 지냈어?"
10129-101290040 = "네. 덕분에 잘 지냈습니다."
10129-101290050 = "다름이 아니라, 여쭤보고 싶은 게 있어서 연락드렸습니다."
10129-101290060 = "샬레의 휴게시설은 몇 시까지 이용 가능한가요?"
10129-101290070 = "딱히 정해진 시간은 없어."
10129-101290080 = "마음껏 써도 돼!"
10129-101290090 = "그렇군요."
10129-101290100 = "이용에 있어 주의할 사항이 있을까요?"
10129-101290110 = "이용이 끝나면 소등하는 것 정도려나."
10129-101290120 = "참고가 되었습니다."
10129-101290130 = "감사합니다. 선생님."
10129-101290140 = "선생님, 그."
10129-101290150 = "다시 말씀드립니다만……."
10129-101290160 = "방금 보셨던 것은 제 개인적인 취향이 아닙니다!"
10129-101290170 = "난 취향인데!"
10129-101290180 = "ㄴㅀㅇ&23ㅂ어ㄹ"
10129-101290190 = "죄송합니다."
10129-101290200 = "휴대전화를 떨어뜨렸습니다."
10129-101290210 = "어디까지나 자경단 임무의 연장입니다!"
10129-101290220 = "오해하지 말아 주세요!"
10129-101290230 = "오케이!"
10129-101290240 = "……다른 이야기지만,"
10129-101290250 = "칭찬해 주셔서, 감사합니다."
10129-101290260 = "다음에 뵙겠습니다."
10129-101290270 = "선생님. 스즈미입니다."
10129-101290280 = "다름이 아니라, 여쭤볼 게 있습니다."
10129-101290290 = "옷이 살짝 뜯어졌습니다만……."
10129-101290300 = "혹시 선생님께서 자주 가시는 수선집이 있을까요?"
10129-101290310 = "샬레 근처에 수선집이 있어."
10129-101290320 = "잘 가는 가게가 있어!"
10129-101290330 = "감사합니다."
10129-101290340 = "이런 수선집은 역시 검증된 곳을 찾고 싶었습니다."
10129-101290350 = "다음에 뵐 수 있으면 좋겠습니다."
10129-101290360 = "선생님."
10129-101290370 = "아까 찍으신 영상"
10129-101290380 = "아직 남아있나요?"
10129-101290390 = "이제 지우려고 했는데, 무슨 일이니?"
10129-101290400 = "지우지 말까?"
10129-101290410 = "아니, 그게 아닙니다!"
10129-101290420 = "당연히 지우셔야 하지만!!"
10129-101290430 = "혹시 그,"
10129-101290440 = "옷에 하자가 있나…… 싶어서."
10129-101290450 = "영상으로 찍힌 걸 보면 더 알아보기 좋을 듯합니다."
10129-101290460 = "네, 제가 볼 수 없는 부분도 잘 보일 테니까요."
10129-101290470 = "그 목적뿐입니다."
10129-101290480 = "그러니, 아까 찍은 영상. 보내주시면 감사하겠습니다."
10129-101290490 = "물론, 보낸 다음엔 지워주셔야 합니다!"
10129-101290500 = "꼭입니다!"
10129-101290510 = "선생님. 스즈미입니다."
10129-101290520 = "혹시 '동인 행사'라는 것을 잘 아시나요?"
10129-101290530 = "거의 박사지 뭐."
10129-101290540 = "거의 석사지 뭐."
10129-101290550 = "네?"
10129-101290560 = "잘 아신다는 거군요."
10129-101290570 = "다름이 아니라 자경단에 제보가 들어왔습니다."
10129-101290580 = "불량배들이 행사를 방해해서 곤란하다고 합니다."
10129-101290590 = "그에 관해서 조언을 구하고자 합니다."
10129-101290600 = "눈에 띄지 않는 게 좋겠네."
10129-101290610 = "현장과 어울리는 옷차림이 좋을 거야."
10129-101290620 = "그렇군요."
10129-101290630 = "참고가 되었습니다."
10129-101290640 = "동인 행사면 나도 관심이 가는걸."
10129-101290650 = "선생님도 오시겠습니까?"
10129-101290660 = "도움이 될 거라고 생각합니다."
10129-101290670 = "감사합니다. 그럼 그때 뵙겠습니다."
10129-101290680 = "그, 중요한 건 아닙니다만."
10129-101290690 = "혹시, 제가 무서운 이미지인가요?"
10129-101290700 = "아까의 제압을 할 때"
10129-101290710 = "구경하시던 분들의 표정이, 뭔가……."
10129-101290720 = "나는 멋있었다고 생각하는데,"
10129-101290730 = "다들 조금 놀라긴 했나 봐."
10129-101290740 = "그런가요……"
10129-101290750 = "그렇지만, 아까는 뾰족한 방법이 없었습니다."
10129-101290760 = "안전핀을 다시 꽂으면 되는 거 아닐까?"
10129-101290770 = "아."
10129-101290780 = "그런 방법이 있었군요."
10129-101290790 = "다음에는 참고하도록 하겠습니다."
10129-101290800 = "선생님. 스즈미입니다."
10129-101290810 = "혹시, 주말에 바쁘신가요?"
10129-101290820 = "별다른 일정은 없단다."
10129-101290830 = "그렇군요"
10129-101290840 = "혹시 그러면 이번 주말에,"
10129-101290850 = "같이 유원지에 가주실 수 있을까요."
10129-101290860 = "오, 좋아!"
10129-101290870 = "감사합니다."
10129-101290880 = "갑작스러운 제안에도 늘 기쁘게 받아주셔서"
10129-101290890 = "항상 감사합니다."
10129-101290900 = "선생님. 스즈미입니다."
10129-101290910 = "항상 제게 힘을 주셔서 감사합니다."
10129-101290920 = "특히, 요새 더 힘이 되었습니다."
10129-101290930 = "……."
10129-101290940 = "앞으로도 잘 부탁드립니다."
10129-101290950 = "스즈미, 나야말로 잘 부탁해!"
10129-101290960 = "앞으로도 지켜줄래? 테르밋 화이트!"
10129-101290970 = "그건 어쩔 수 없이 한 역할극입니다!"
10129-101290980 = "……."
10129-101290990 = "물론, 언제 어느 때라도"
10129-101291000 = "선생님은 제가 지켜드리겠습니다."
10129-101291010 = "……또 뵙겠습니다. 선생님."

10129-101290180 = "(@$*(&@#$"
10129-101290190 = "不好意思"
10129-101290200 = "剛才不小心把手機弄掉了"
10129-101290210 = "這純粹只是自衛隊任務的延伸！"
10129-101290220 = "所以請您不要誤會！"

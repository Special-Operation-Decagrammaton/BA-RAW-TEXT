10060-100600230 = "คุณครู"
10060-100600240 = "โมโหแล้วนะ"
10060-100600250 = "ก็ดูเหมือนจะโมโหจริงๆ นั่นแหละ"
10060-100600260 = "พอดีครูโฟกัสงานมากเกินไปน่ะ..."

[translation]
16020-160200010 = "안녕하세요. 여기, 샬레 선생님 번호인가요?"
16020-160200020 = "그렇습니다만……?"
16020-160200030 = "제가 전부터 선생님을 꼭 한 번 단둘이서 뵙는 게 소원이라서요."
16020-160200040 = "혹시 오늘 저녁에 로스트웨이의 4번 골목으로 나와주실 수 있으실까요?"
16020-160200050 = "저녁 8시 이후라도 괜찮다면……"
16020-160200060 = "잠깐 시간 내는 건 어렵지 않을 것 같은데."
16020-160200070 = "아니, 아니지!"
16020-160200080 = "선생님. 뭘 아무렇지도 않게 수상한 제안을 받아들이고 있는 거야?"
16020-160200090 = "낯선 사람이 갑자기 말을 걸면 일단 한 번은 의심해 보는 게 좋다고."
16020-160200100 = "샬레의 선생님에게 접근해서 정보를 캐내려는 수상한 녀석일지도 모르잖아?"
16020-160200110 = " ……응?"
16020-160200120 = "혹시 귀여운 여자아이의 데이트 제안이라고 착각한 거야?"
16020-160200130 = "유감이지만, 오토기 쨩이었습니다~"
16020-160200140 = "아니, 착각하진 않았는데."
16020-160200150 = "애초에 발신자에 오토기라고 찍혀 있는데."
16020-160200160 = "아"
16020-160200170 = "이거 작전용 임시 번호가 아니었네."
16020-160200180 = "미안. 개인 정비 시간에 심심해서 잠깐 장난 좀 치려 했는데, 너무 준비가 허술했네."
16020-160200190 = "신경 쓰지 마. 학생의 연락이라면 언제든 환영이니까."
16020-160200200 = "하지만 선생님은 모르는 사람과 연락하는 게 꺼려지진 않아?"
16020-160200210 = "대부분 사람들은 모르는 번호로 연락이 오면 일단 받지 않는데."
16020-160200220 = "물론 모르는 번호의 대부분은 광고나 잘못 걸려온 전화지만……"
16020-160200230 = "급한 도움이 필요한 학생일지도 모르잖아?"
16020-160200240 = "확실히 그도 그렇네."
16020-160200250 = "위험이 존재한다고 언제나 회피할 수는 없는 노릇이니까."
16020-160200260 = "하지만 선생님은 좀 더 몸을 사리는 게 좋을 거야."
16020-160200270 = "총알도 이겨내지 못하는 연약한 어른을 노리고 있는 학생이 이 키보토스에 한 둘은 아닐테니까."
16020-160200280 = "……명심할게."
16020-160200290 = "선생님, 브라보 찰리가 왔어."
16020-160200300 = "혹시 신경 쓰이는 물건이 있으면 미리 치워두는 걸 추천할 게"
16020-160200310 = "브라보 찰리……?"
16020-160200320 = "……그게 무슨 뜻이야?"
16020-160200330 = "아"
16020-160200340 = "미안"
16020-160200350 = "소대원들끼리 쓰는 속어를 무심코 썼네."
16020-160200360 = "브라보 찰리는 음성 기호로 B, C 를 의미 하는데"
16020-160200370 = "우리끼리는 보통 Bean Counter 라는 말을 입에 담기 싫어서 대신 쓰곤 하거든."
16020-160200380 = "콩 세는 사람?"
16020-160200390 = "응, 재무 전문가를 놀리는 말이지."
16020-160200400 = "그러니까"
16020-160200410 = "음"
16020-160200420 = "행정위원회의 재무실장이 온 것 같아"
16020-160200430 = "그걸 먼저 말해줬어야지!"
16020-160200440 = "선생님"
16020-160200450 = "늦은 시간에 미안한데"
16020-160200460 = "혹시 자고 있어?"
16020-160200470 = "음"
16020-160200480 = "역시 자고 있으려나. 미안."
16020-160200490 = "아무 일도 아니었으니까, 신경 쓰지 마. 잘 자!"
16020-160200500 = "미안. 잠깐 메시지를 확인 못 했어."
16020-160200510 = "무슨 일이야?"
16020-160200520 = "이런 늦은 시간에 무슨 일이라도 있었던 거야?"
16020-160200530 = "오토기……?"
16020-160200540 = "지금 갈게!"
16020-160200550 = "선생님, 이번 주 주말에 시간 돼?"
16020-160200560 = "응. 괜찮아."
16020-160200570 = "내가 도와줄 일이라도?"
16020-160200580 = "음, 다음 작전에서 쓸 위장복이 없어서."
16020-160200590 = "새 위장복을 구하러 코기 타운에 한 번 가보려고."
16020-160200600 = "혹시 괜찮으면 같이 보러 갈래?"
16020-160200610 = "응, 갈래."
16020-160200620 = "그나저나 쇼핑몰에서도 위장복을 구할 수 있는 거야?"
16020-160200630 = "그야 물론이지."
16020-160200640 = "돈만 있다면 코기 타운에서는 오늘 저녁 반찬부터 해킹용 툴까지, 모두 구할 수 있으니까!"
16020-160200650 = "……그건 다른 가게의 캐치프레이즈아냐?"
16020-160200660 = "공터에 놓여있는 토관이나 다리 밑의 그늘을 보면"
16020-160200670 = "어쩐지 나만의 비밀 기지로 삼고 심다는 생각이 든 적 없어?"
16020-160200680 = "어릴 적에는 그런 생각을 했었지"
16020-160200690 = "지금도 이불을 뒤집어쓰고 나만의 공간에 들어가 있고 싶어"
16020-160200700 = "……그거 살짝 위험한 거 아냐?"
16020-160200710 = "여하튼"
16020-160200720 = "사람 생각하는 건 다 비슷하구나"
16020-160200730 = "나도 어릴 적에는 게임기나 만화책을 숨겨 두기 위해 나만의 비밀 기지를 찾아다녔었는데"
16020-160200740 = "설마 고등학생이 된 이후에도 비밀기지를 찾아다니게 될 줄은 몰랐어"
16020-160200750 = "요새는 왜?"
16020-160200760 = "개인 공간이 충분치 않아?"
16020-160200770 = "아, 그런 건 아니지만……"
16020-160200780 = "SRT의 작전을 진행하다 보면 하루 넘게 밖에서 잠복하거나, 밤을 새워야 하는 경우 자주 있거든."
16020-160200790 = "그럴 때는 이런 <비밀 기지>들이 생각보다 유용하게 쓰이는데"
16020-160200800 = "가끔은 작전 전에 이런 상황을 대비해서 비밀 기지에 탄약이나 개인 용품을 미리 가져다 둘 때도 있어."
16020-160200810 = "뭔가 어린 시절의 로망이 실현된 것 같아 멋진 걸."
16020-160200820 = "요새 눈 여겨 보는 특별한 비밀기지라도 있어?"
16020-160200830 = "음, 선생님의 책상 밑이랄까?"
16020-160200840 = "엑"
16020-160200850 = "왜 그런 반응이야?"
16020-160200860 = "아니"
16020-160200870 = "이상한 생각 하지 마. 책상인 게 중요한 거니까!"
16020-160200880 = "책상에 모포를 두르고 그 아래에 들어가서 비밀기지라고 선언하는 일은, 어릴 때 종종 있잖아?"
16020-160200890 = "아, 그런 의미인가."
16020-160200900 = "그런 용도라면 가끔 대여해 줄 수도 있어."
16020-160200910 = "음, 선생님의 호의는 고맙지만"
16020-160200920 = "그 비밀기지는 노리고 있는 학생이 많아서 이미 진작에 포기했어"
16020-160200930 = "잠깐"
16020-160200940 = "그거 무슨 의미야?!"

[translation]
10036-100360010 = "願各位能度過和平安寧的一天！"
10036-100360020 = "如果來到三一的教堂，有任何事都可以請我幫忙"
10036-100360030 = "謝謝，到時再麻煩你囉"
10036-100360040 = "任何事？"
10036-100360050 = "啊"
10036-100360060 = "那個"
10036-100360070 = "還是要在我能力所及的範圍內……"
10036-100360080 = "如果要出遠門的話，或許會有些困難……"
10036-100360090 = "除此之外，都請儘管說！"
10036-100360100 = "那個，老師……"
10036-100360110 = "老實說，我有個小小的煩惱……"
10036-100360120 = "發生什麼事了？"
10036-100360130 = "怎麼了嗎？"
10036-100360140 = "那個"
10036-100360150 = "其實最近大家老是要我去休息……"
10036-100360160 = "是不是因為我這個人很不可靠呢？"
10036-100360170 = "會不會是你太勉強自己了？"
10036-100360180 = "嗯……"
10036-100360190 = "可是我應該沒有勉強自己才對……"
10036-100360200 = "……"
10036-100360210 = "為什麼會這樣呢？"
10036-100360220 = "真是想不通……"
10036-100360230 = "老師"
10036-100360240 = "多虧有您，我感覺輕鬆多了"
10036-100360250 = "今天光是聽老師那麼說……"
10036-100360260 = "就覺得"
10036-100360270 = "心裡相當欣慰"
10036-100360280 = "真的非常謝謝老師"
10036-100360290 = "老師您好"
10036-100360300 = "今天我預定會前往教堂後面的公園。這也是管理事務的一部分"
10036-100360310 = "啊，不過"
10036-100360320 = "並不是因為有什麼請求才向老師報備的"
10036-100360330 = "只是想告訴您我過的很好而已"
10036-100360340 = "這都多虧了老師"
10036-100360350 = "這沒什麼，之後有空再去找你"
10036-100360360 = "難得有機會，我也去公園玩一下吧？"
10036-100360370 = "當然可以，非常歡迎老師！"
10036-100360380 = "到了之後請再聯絡我，我會馬上去接您！"
10036-100360390 = "那個……老師……"
10036-100360400 = "很抱歉今天慌慌張張的。然後另外還有一件事，就是……"
10036-100360410 = "不會唷，今天辛苦你了。怎麼了嗎？"
10036-100360420 = "有什麼事嗎？"
10036-100360430 = "那個"
10036-100360440 = "這該怎麼說呢"
10036-100360450 = "好像有個關於我的奇怪流言"
10036-100360460 = "別人有委婉地問我，我是不是在沒有人的倉庫"
10036-100360470 = "或教堂後面的草叢裡做些什麼……"
10036-100360480 = "他們所謂的「什麼」，指的究竟是……"
10036-100360490 = "……會是什麼呢？"
10036-100360500 = "……那些流言，大概是我的錯。對不起"
10036-100360510 = "……？"
10036-100360520 = "那個"
10036-100360530 = "……老師？"
10036-100360540 = "老師"
10036-100360550 = "其實我今天有休假"
10036-100360560 = "所以我想"
10036-100360570 = "那個"
10036-100360580 = "？"
10036-100360590 = "嗯"
10036-100360600 = "若您方便的話，能占用您一些時間嗎……？"
10036-100360610 = "當然沒問題"
10036-100360620 = "我很歡迎！"
10036-100360630 = "！"
10036-100360640 = "謝，謝謝老師！那麼我先去佔位子……！"
10036-100360650 = "那個……"
10036-100360660 = "老師，現在方便打擾一下嗎？"
10036-100360670 = "怎麼了嗎，日向？"
10036-100360680 = "嗯，可以唷"
10036-100360690 = "那個"
10036-100360700 = "想再向您請教一下……"
10036-100360710 = "我上次帶去野餐的便當，您覺得如何呢……？"
10036-100360720 = "要是有符合您的喜好就好了……"
10036-100360730 = "當然，非常好吃唷"
10036-100360740 = "要是能再做給我吃，我會很開心的"
10036-100360750 = "真"
10036-100360760 = "真的嗎？"
10036-100360770 = "非常感謝！"
10036-100360780 = "那"
10036-100360790 = "那個"
10036-100360800 = "老師！"
10036-100360810 = "一直打擾您真的非常抱歉……"
10036-100360820 = "我剛剛才注意到……"
10036-100360830 = "我好像把老師的便當盒和帳本搞混，所以不小心帶回來了……"
10036-100360840 = "啊，真的呢"
10036-100360850 = "那可能會有點重……這樣的話，近期再去那個公園見面吧"
10036-100360860 = "啊"
10036-100360870 = "好的！"
10036-100360880 = "非常感謝……"

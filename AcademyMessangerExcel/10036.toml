[translation]
10036-100360010 = "May peace and happiness find you today!"
10036-100360020 = "Let me know whenever you have business at the Trinity Cathedral. I'll help you with anything."
10036-100360030 = "I might take you up on that."
10036-100360040 = "Anything?"
10036-100360050 = "Oh."
10036-100360060 = "Um..."
10036-100360070 = "Actually, I can only help if it's around the cathedral."
10036-100360080 = "That's what I'm in charge of."
10036-100360090 = "I look forward to seeing you!"
10036-100360100 = "So..."
10036-100360110 = "Today has been...tricky."
10036-100360120 = "Tricky?"
10036-100360130 = "Is something wrong?"
10036-100360140 = "The thing is"
10036-100360150 = "everyone keeps telling me to take it easy and lie down."
10036-100360160 = "Is it because I'm not doing a good job?"
10036-100360170 = "Have you been overworking?"
10036-100360180 = "I don't think so..."
10036-100360190 = "Not at all. Really."
10036-100360200 = "..."
10036-100360210 = "Actually, that's probably what they're thinking."
10036-100360220 = "This is hard..."
10036-100360230 = "Sensei, this is Hinata."
10036-100360240 = "I made it to my room."
10036-100360250 = "About today..."
10036-100360260 = "I'm not sure how you'll take this, but you really helped me back there."
10036-100360270 = "So, um..."
10036-100360280 = "Thank you."
10036-100360290 = "Sensei, this is Hinata."
10036-100360300 = "I'll be managing the park behind the cathedral today."
10036-100360310 = "Oh but"
10036-100360320 = "nothing's going on, so don't worry."
10036-100360330 = "I just wanted to tell you I'm doing well."
10036-100360340 = "And it's all thanks to you."
10036-100360350 = "Glad to hear it."
10036-100360360 = "I could stop by to check on you."
10036-100360370 = "...!"
10036-100360380 = "Right. You're welcome to come visit the cathedral anytime!"
10036-100360390 = "Well..."
10036-100360400 = "Um, Sensei?"
10036-100360410 = "Hinata?"
10036-100360420 = "Is something wrong?"
10036-100360430 = "Well."
10036-100360440 = "It's not a big deal, but..."
10036-100360450 = "I think there are strange rumors going around about me."
10036-100360460 = "Like I'm doing weird things in the storage."
10036-100360470 = "In the corner of the cathedral, or in the bushes when no one is looking..."
10036-100360480 = "What could they mean by \"weird things\"? No one will tell me."
10036-100360490 = "Yeah I wonder..."
10036-100360500 = "This is my fault. I'm sorry."
10036-100360510 = "Huh?"
10036-100360520 = "Sensei?"
10036-100360530 = "Sensei?"
10036-100360540 = "Sensei."
10036-100360550 = "I'm off today, which doesn't happen often."
10036-100360560 = "So on that note..."
10036-100360570 = "Um..."
10036-100360580 = "Yes?"
10036-100360590 = "What's going on?"
10036-100360600 = "If it's not too much of an inconvenience, do you have extra time today?"
10036-100360610 = "Yeah, of course."
10036-100360620 = "Yes! For you, always."
10036-100360630 = "...!"
10036-100360640 = "Thank you. I'll go first and secure a spot."
10036-100360650 = "Sensei..."
10036-100360660 = "So..."
10036-100360670 = "Hinata?"
10036-100360680 = "Is something the matter?"
10036-100360690 = "Ah"
10036-100360700 = "Nothing really, just..."
10036-100360710 = "How did you like the boxed lunch last time?"
10036-100360720 = "I hope it was okay..."
10036-100360730 = "It was more than okay. I'd love to have more."
10036-100360740 = "Why? Are you actually going to make me another one?"
10036-100360750 = "Ah"
10036-100360760 = "Is it okay to?"
10036-100360770 = "Thank you!"
10036-100360780 = "Umm..."
10036-100360790 = "So..."
10036-100360800 = "Sen"
10036-100360810 = "Sensei!"
10036-100360820 = "I'm so sorry, Sensei, I"
10036-100360830 = "I mixed up the boxed lunch with the management ledger and brought it by mistake again..."
10036-100360840 = "Alas, I just noticed it myself."
10036-100360850 = "No wonder it was so heavy. Let's meet there again."
10036-100360860 = "Ah"
10036-100360870 = "Okay!"
10036-100360880 = "Thank you, Sensei..."

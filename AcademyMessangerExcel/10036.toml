[translation]
10036-100360010 = "ขอสันติสุขและสวัสดีจงมีแด่คุณครูค่ะ!"
10036-100360020 = "หากมีเรื่องต้องเข้ามาที่วิหารทรีนิตี้\nก็บอกได้เลยนะคะ ฉันจะช่วยคุณครูเองค่ะ"
10036-100360030 = "ได้ยินแบบนี้ก็อุ่นใจ ขอบใจนะ"
10036-100360040 = "ได้ทุกเรื่องเลยเหรอ...?"
10036-100360050 = "เอ่อ..."
10036-100360060 = "คือ..."
10036-100360070 = "ที่จริงฉันคงช่วยได้แค่เรื่องภายใน\nวิหารและรอบๆ เท่านั้นค่ะ"
10036-100360080 = "ก็นี่เป็นส่วนหนึ่งของงาน\nที่ฉันรับผิดชอบนี่คะ"
10036-100360090 = "ฉันจะรอวันที่ได้พบกับคุณครูนะคะ!"
10036-100360100 = "อืม..."
10036-100360110 = "ฉันรู้สึกเป็นทุกข์ยังไงไม่รู้ค่ะ..."
10036-100360120 = "เป็นทุกข์งั้นเหรอ?"
10036-100360130 = "มีเรื่องอะไรรึเปล่า?"
10036-100360140 = "คือว่า..."
10036-100360150 = "คนอื่นเอาแต่บอกว่า\nให้ฉันไปพักอยู่บ่อยๆ เลยค่ะ..."
10036-100360160 = "ฉันดูไม่น่าไว้วางใจ\nให้ทำงานเลยเหรอคะ?"
10036-100360170 = "ฮินาตะหักโหมทำงานมากไปรึเปล่า?"
10036-100360180 = "ก็ไม่นะคะ..."
10036-100360190 = "ไม่เลยค่ะ ไม่เลย\nฉันไม่ได้หักโหมสักนิดเลยค่ะ"
10036-100360200 = "......"
10036-100360210 = "หรือว่าฉันอาจจะหักโหม\nโดยไม่รู้ตัวก็ได้ค่ะ..."
10036-100360220 = "แย่จังเลยค่ะ..."
10036-100360230 = "คุณครูคะ ฮินาตะเองค่ะ"
10036-100360240 = "ฉันกลับมาถึงห้องแล้วค่ะ"
10036-100360250 = "เรื่องที่เกิดขึ้นวันนี้..."
10036-100360260 = "ฉันไม่รู้ว่าคุณครูจะคิดยังไง\nแต่สำหรับฉันแล้ว คุณครูช่วย\nฉันได้อย่างมากเลยค่ะ"
10036-100360270 = "อืม..."
10036-100360280 = "ขอบคุณนะคะ"
10036-100360290 = "คุณครู ฮินาตะเองนะคะ"
10036-100360300 = "วันนี้ฉันออกมาข้างนอก\nเพราะเป็นวันดูแลสวนหลังวิหารค่ะ"
10036-100360310 = "เอ่อ..."
10036-100360320 = "ฉันไม่ได้ติดต่อมาเพราะ\nมีเรื่องอะไรเป็นพิเศษหรอกค่ะ"
10036-100360330 = "แค่อยากจะบอกว่าช่วงนี้\nฉันสบายดี ไม่มีปัญหาอะไรค่ะ"
10036-100360340 = "เพราะมีคุณครูคอยช่วยฉันอยู่ไงล่ะคะ"
10036-100360350 = "ครูดีใจที่ได้ยินแบบนั้นนะ"
10036-100360360 = "ครูขอไปดูให้เห็นกับตาหน่อยดีกว่า"
10036-100360370 = "...!"
10036-100360380 = "ฮิฮิ ได้เลยค่ะ\nฉันยินดีต้อนรับคุณครูเสมอค่ะ!"
10036-100360390 = "เอ่อ..."
10036-100360400 = "คือว่าคุณครูคะ..."
10036-100360410 = "ฮินาตะ?"
10036-100360420 = "เกิดอะไรขึ้นรึเปล่า?"
10036-100360430 = "อืม..."
10036-100360440 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ"
10036-100360450 = "ก็แค่หมู่นี้มีข่าวลือ\nเกี่ยวกับฉันเต็มไปหมด..."
10036-100360460 = "อย่างเช่นฉันไปทำบางอย่าง\nในคลังเก็บของ หรือที่มุมลับๆ\nของวิหารบ้าง..."
10036-100360470 = "หรือไม่ก็ไปทำอะไรลับๆ ล่อๆ\nในพุ่มไม้ใกล้ๆ วิหารบ้างค่ะ..."
10036-100360480 = "ว่าแต่ว่า 'ทำบางอย่าง' ที่ทุกคนคิด\nมันหมายถึงอะไรงั้นเหรอคะ?\nไม่มีใครยอมบอกฉันเลยค่ะ..."
10036-100360490 = "คะ...ครูก็ไม่รู้เหมือนกันนะ"
10036-100360500 = "ครูผิดเอง ขอโทษนะ"
10036-100360510 = "คะ...?"
10036-100360520 = "คุณครู...?"
10036-100360530 = "คุณครูคะ...?"
10036-100360540 = "คุณครูคะ"
10036-100360550 = "วันนี้เป็นวันหยุดของฉันค่ะ\nปกติฉันไม่ค่อยได้หยุดบ่อยหรอกค่ะ"
10036-100360560 = "ฉันก็เลย..."
10036-100360570 = "คือว่า..."
10036-100360580 = "คือว่า...?"
10036-100360590 = "มีเรื่องอะไรเหรอ?"
10036-100360600 = "ถ้าคุณครูไม่ว่าอะไร\nฉันขอรบกวนเวลาหน่อยได้มั้ยคะ...?"
10036-100360610 = "อื้ม ได้สิ"
10036-100360620 = "อื้ม! ได้อยู่แล้ว!"
10036-100360630 = "...!!"
10036-100360640 = "ขอบคุณค่ะ งั้นฉันไปจองที่ก่อนนะคะ"
10036-100360650 = "คุณครู"
10036-100360660 = "คือ..."
10036-100360670 = "ฮินาตะ?"
10036-100360680 = "หืม? มีเรื่องอะไรเหรอ?"
10036-100360690 = "อา..."
10036-100360700 = "ก็คือว่า..."
10036-100360710 = "ข้าวกล่องปิกนิกเมื่อคราวก่อน\nเป็นยังไงบ้างคะ?"
10036-100360720 = "ฉันหวังว่าคุณครูจะชอบ..."
10036-100360730 = "อื้อ ครูชอบนะ อยากกินอีกเลยละ"
10036-100360740 = "หืม? หรือว่าจะทำให้ครูอีกงั้นเหรอ?"
10036-100360750 = "อา..."
10036-100360760 = "ฉันทำให้คุณครูอีกได้เหรอคะ?"
10036-100360770 = "ขอบคุณค่ะ!"
10036-100360780 = "คือว่า"
10036-100360790 = "คือ..."
10036-100360800 = "คุณ..."
10036-100360810 = "คุณครูคะ!!"
10036-100360820 = "ขอโทษนะคะคุณครู คือว่าฉัน..."
10036-100360830 = "ฉันเข้าใจผิด เลยเผลอหยิบสมุดบัญชี\nมาแทนข้าวกล่องซะได้..."
10036-100360840 = "อา... ครูก็เพิ่งสังเกตเห็นเหมือนกัน"
10036-100360850 = "มิน่าถึงดูหนักๆ\nไว้เจอกันใหม่ที่นั่นนะ~"
10036-100360860 = "อา..."
10036-100360870 = "ค่ะ!"
10036-100360880 = "ขอบคุณค่ะ..."

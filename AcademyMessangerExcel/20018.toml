[translation]
20018-200180010 = "오랜만이네, 선생님."
20018-200180020 = "다른 소대원들에게 듣자 하니, 나를 찾았다고 하던데……"
20018-200180030 = "무슨 일이라도 생긴 거야?"
20018-200180040 = "안녕, 모에."
20018-200180050 = "미안한데 조금 도와줬으면 하는데, 괜찮아?"
20018-200180060 = "선생님을 돕는 거라면 어렵지 않지만……"
20018-200180070 = "그나저나 별일이네. 선생님이 내게 도와 달라는 말을 하다니."
20018-200180080 = "아, 특별한 의미는 없어. 뭔가 재미있는 사건의 예감이 들어서 말이지, 후후."
20018-200180090 = "그럼 준비하고 있을게."
20018-200180100 = "선생님. 다른 학생에게 들었는데……"
20018-200180110 = "샬레에 있는 작업용 PC의 데이터가 다 날아갔다는 게 사실이야?"
20018-200180120 = "쿠히히…… 맞아……"
20018-200180130 = "이제 다 틀렸어…… 쿠히히……"
20018-200180140 = "우와, 선생님이 나처럼 웃고 있어."
20018-200180150 = "아무래도 문제가 심상치 않은 모양인데."
20018-200180160 = "와보면 알게 될 거야……"
20018-200180170 = "알겠어. 오후에 시간 날 때 샬레에 들를게."
20018-200180180 = "선생님, 그거 알아?"
20018-200180190 = "스위치나 버튼 위에 설치하는 안전 덮개는 흔히 <몰리 가드>라고 부르거든."
20018-200180200 = "왜 안전 덮개에 그런 이름이 붙었느냐면"
20018-200180210 = "몰리라는 아이가 비상 스위치를 자꾸 누르려 해서 발명된 덮개이기 때문이래."
20018-200180220 = "그렇구나."
20018-200180230 = "흥미로운 사실이네."
20018-200180240 = "그 사실을 생각할 때마다 뭔가 아쉬워."
20018-200180250 = "내가 몰리보다 먼저 태어났더라면"
20018-200180260 = "지금쯤 전 세계의 사람들은 안전 덮개를 <모에 가드>라고 불렀을 텐데……"
20018-200180270 = "명예로운 호칭은 아닌 것 같은데……"
20018-200180280 = "으음. 미안하지만 선생님……"
20018-200180290 = "잠깐 코우사기 공원에 와주지 않을래?"
20018-200180300 = "상관없지만……"
20018-200180310 = "갑자기 무슨 일이야?"
20018-200180320 = "다름이 아니라 전에 추가로 주문한 물자가 공원에 도착했거든."
20018-200180330 = "그런데 마침 다른 소대원들이 작전 중이라 혼자 정리를 해야 하는데……"
20018-200180340 = "무거운 짐이 잔뜩 있어서 옮기기 어려운 건 둘째 치더라도"
20018-200180350 = "터지기 쉬운 위험한 폭탄이 잔뜩 있어서"
20018-200180360 = "지금 바로 갈게"
20018-200180370 = "선생님, 어제저녁에 시라토리 근린 공원에 있지 않았어?"
20018-200180380 = "어젯밤에 그 근처를 걷다가 선생님이 뛰어가는 모습을 본 것 같아서."
20018-200180390 = "응. 모에도 거기 있었구나?"
20018-200180400 = "뭔가 개인적인 시간을 들킨 것 같아서 부끄럽네."
20018-200180410 = "개인적인 시간……?"
20018-200180420 = "나는 일 때문에 방문한 줄 알았는데, 뭔가 다른 문제라도 있었던 거야?"
20018-200180430 = "응. 최근에 저녁 조깅을 하고 있었거든."
20018-200180440 = "사무 업무만 하다 보니 몸이 뻐근한 것 같아서."
20018-200180450 = "아~ 그거 완전 공감해."
20018-200180460 = "하루 종일 앉아서 같은 업무로 키보드를 두들기다 보면 목이랑 어깨가 뻐근해서 눕기도 어려울 때가 많지."
20018-200180470 = "맞아. 바른 자세를 오래 유지하는 것도 피곤하니까……"
20018-200180480 = "모에도 괜찮다면, 같이 저녁 운동하지 않을래?"
20018-200180490 = "후후, 날 어떻게 생각하고 있었던 거야?"
20018-200180500 = "이래 봬도 SRT의 일원으로서 트레이닝은 매일 하고 있거든?"
20018-200180510 = "물론 사키나 미야코에 비하면 산책 수준이지만."
20018-200180520 = "그래도 선생님과 함께하는 조깅은 꽤 파멸적일지도."

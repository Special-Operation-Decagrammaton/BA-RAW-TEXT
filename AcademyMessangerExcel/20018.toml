[translation]
20018-200180010 = "老師，好久不見"
20018-200180020 = "聽說你在找我……"
20018-200180030 = "怎麼了嗎？"
20018-200180040 = "你好，萌"
20018-200180050 = "抱歉，我想請你幫個忙，現在有空嗎？"
20018-200180060 = "幫老師的忙？是沒問題啦……"
20018-200180070 = "但還真是稀奇呢。老師竟然會找我幫忙"
20018-200180080 = "啊，沒有什麼特別的意思。只是有預感會發生有趣的事……咯嘻嘻"
20018-200180090 = "那麼，我準備一下"
20018-200180100 = "老師，我耳聞了小道消息……"
20018-200180110 = "夏萊的工作用電腦的數據全都消失了，是真的嗎？"
20018-200180120 = "咯嘻嘻……沒錯唷……"
20018-200180130 = "沒錯，一切都完了……咯嘻嘻……"
20018-200180140 = "嗚哇……老師笑得跟我一樣"
20018-200180150 = "看起來相當糟糕啊"
20018-200180160 = "嘛，來了就知道了……"
20018-200180170 = "知道了，那我中午過後去夏萊一趟"
20018-200180180 = "老師，你知道嗎？"
20018-200180190 = "不是有安置在開關和按鈕上的安全蓋嗎\n那個，叫做「Molly-Guard」唷"
20018-200180200 = "為什麼會有那樣的名字呢"
20018-200180210 = "因為有一名叫做Molly的孩子，多次想按緊急按鈕，所以才發明出這個蓋子"
20018-200180220 = "原來是這樣"
20018-200180230 = "很有趣的故事呢"
20018-200180240 = "每次想到這故事，都覺得有點可惜"
20018-200180250 = "要是我比Molly早出生的話"
20018-200180260 = "現在，安全蓋的名字就會是「Moe-Guard」了吧……"
20018-200180270 = "我覺得這不是什麼值得引以為傲的名字……"
20018-200180280 = "嗯──，抱歉，老師……"
20018-200180290 = "能來兔寶寶公園一下嗎？"
20018-200180300 = "是可以啦……"
20018-200180310 = "這麼突然，怎麼了？"
20018-200180320 = "前幾天，追加訂購的物資送來公園了"
20018-200180330 = "但是，大家正好都在外頭作戰，所以我必須一個人整理……"
20018-200180340 = "搬不了太多重物……這暫且不說"
20018-200180350 = "還有不少是容易點燃的危險炸彈……"
20018-200180360 = "馬上過去唷"

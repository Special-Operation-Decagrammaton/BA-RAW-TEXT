[translation]
20018-200180010 = "ไม่เจอกันนานเลยนะคุณครู"
20018-200180020 = "ได้ยินสมาชิกคนอื่นๆ บอกว่า\nครูตามหาฉันอยู่..."
20018-200180030 = "มีเรื่องอะไรล่ะ?"
20018-200180040 = "ว่าไง โมเอะ"
20018-200180050 = "โทษทีๆ ครูมีเรื่องให้ช่วย\nสะดวกรึเปล่า?"
20018-200180060 = "ถ้าจะให้ช่วยอะไรละก็ ฉันช่วยได้อยู่แล้ว"
20018-200180070 = "แต่ก็น่าแปลกนะ ที่คุณครูมาขอให้ฉัน\nช่วยแบบนี้เนี่ย"
20018-200180080 = "อา... ไม่มีอะไรๆ ฉันแค่รู้สึกว่า\nน่าจะมีเรื่องสนุกๆ ก็เท่านั้นแหละ ฮิฮิ"
20018-200180090 = "งั้นฉันจะเตรียมตัวให้พร้อมแล้วกัน"
20018-200180100 = "คุณครู ฉันได้ยินมาจากนักเรียน\nคนอื่นๆ แหละ..."
20018-200180110 = "เรื่องที่ข้อมูลในคอมพิวเตอร์ของสำนักงาน\nชาเล่ต์รั่วไหลน่ะ เรื่องจริงเหรอ?"
20018-200180120 = "เรื่องจริง... หึหึหึ"
20018-200180130 = "ชีวิตครูจบแล้วล่ะ หึหึหึ"
20018-200180140 = "ว้าว คุณครูหัวเราะเหมือนฉันเลยแฮะ"
20018-200180150 = "คงเป็นเรื่องร้ายแรงแน่ๆ "
20018-200180160 = "พอมาถึงเดี๋ยวก็รู้เองแหละ"
20018-200180170 = "เข้าใจแล้ว เดี๋ยวตอนบ่าย\nฉันจะแวะไปที่ชาเล่ต์นะ"
20018-200180180 = "รู้รึเปล่าคุณครู?"
20018-200180190 = "ฝาครอบที่ใช้ครอบอยู่บนปุ่มหรือสวิตช์ไฟ\nเขาเรียกว่า <โมลลี่ การ์ด> ล่ะ"
20018-200180200 = "ชื่อนี้มีที่มาที่ไปด้วยนะ"
20018-200180210 = "ได้ยินว่าเขาประดิษฐ์ฝาครอบป้องกัน\nขึ้นมา เพราะยัยเด็กที่ชื่อโมลลี่ชอบไปกด\nสวิตช์ไฟเล่นอยู่บ่อยๆ น่ะ"
20018-200180220 = "แบบนี้นี่เอง"
20018-200180230 = "น่าสนใจดีนะ"
20018-200180240 = "พอคิดเรื่องนี้ทีไร ฉันก็อดรู้สึก\nเสียดายไม่ได้เลยน่ะ"
20018-200180250 = "ถ้าฉันเกิดมาก่อนโมลลี่ละก็..."
20018-200180260 = "คนทั่วโลกก็คงเรียกฝาครอบป้องกัน\nความปลอดภัยว่า <โมเอะ การ์ด> แล้วแท้ๆ..."
20018-200180270 = "ไม่น่าใช่เรื่องที่ควรชื่นชมเลยนะ..."
20018-200180280 = "อืม โทษทีนะคุณครู..."
20018-200180290 = "ช่วยแวะมาที่โคะอุซางิ การ์เด้นหน่อย\nได้มั้ย?"
20018-200180300 = "ได้สิ ครูว่างอยู่พอดี"
20018-200180310 = "มีเรื่องอะไรเหรอ?"
20018-200180320 = "พอดีพวกของใช้ที่สั่งไปมาส่งที่สวน\nสาธารณะแล้วน่ะ"
20018-200180330 = "แต่ว่าตอนนี้สมาชิกคนอื่นออกไปปฏิบัติ\nภารกิจกัน เลยเหลือแค่ฉันจัดของอยู่\nคนเดียว"
20018-200180340 = "มันมีของหนักๆ ที่ยกคนเดียวลำบากด้วยน่ะ"
20018-200180350 = "แถมยังมีพวกระเบิดที่กระแทกนิดเดียว\nก็ระเบิดได้ง่ายๆ อยู่ด้วยน่ะ"
20018-200180360 = "ครูจะวิ่งไปหาเดี๋ยวนี้แหละ"

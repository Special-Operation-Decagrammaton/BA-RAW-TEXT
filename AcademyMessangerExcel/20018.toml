[translation]
20018-200180010 = "先生久しぶり"
20018-200180020 = "私を探してたって聞いたんだけど……"
20018-200180030 = "どうしたの？"
20018-200180040 = "こんにちは、モエ"
20018-200180050 = "ごめん、ちょっと手伝ってほしいことがあるんだけど今大丈夫かな？"
20018-200180060 = "先生の手伝い？別にいいけど……"
20018-200180070 = "にしても珍しいね。先生が手伝ってほしいだなんて"
20018-200180080 = "あ、別に深い意味はないよ。なんか面白い事件の予感するだけ……くひひ"
20018-200180090 = "じゃあ、準備してるね"
20018-200180100 = "先生、ちょっと小耳に挟んだんだけど……"
20018-200180110 = "シャーレの作業用パソコンのデータが全部消えたって本当？"
20018-200180120 = "くひひ……そうだよ……"
20018-200180130 = "そう、これで全部おしまい……くひひ……"
20018-200180140 = "うわ……先生が私みたいに笑ってる"
20018-200180150 = "これはかなりヤバそうだね"
20018-200180160 = " まぁ、来たら分かるよ……"
20018-200180170 = "わかった、それじゃあ昼過ぎくらいにシャーレ行くね"
20018-200180180 = "先生、知ってる？"
20018-200180190 = "スイッチやボタンの上に設置する安全カバーあるじゃん。\nあれ、「モリーガード」って言うんだよ"
20018-200180200 = "なんでそんな名前がついたかっていうと"
20018-200180210 = "モリーという子が、何度も非常ボタンを押そうとしたから発明されたカバーだからなんだって"
20018-200180220 = "そうなんだ"
20018-200180230 = "興味深い内容だね"
20018-200180240 = "その話を聞くたびに、ちょっと残念になるんだよね"
20018-200180250 = "私がモリーより先に生まれていたら"
20018-200180260 = "今頃、安全カバーの名前は「モエガード」になっていたのかなって……"
20018-200180270 = "別に名誉な名前ではないと思うんだけど……"
20018-200180280 = "んー、ごめん、先生……"
20018-200180290 = "ちょっと子ウサギ公園に来てくれない？"
20018-200180300 = "いいけど……"
20018-200180310 = "急にどうしたの？"
20018-200180320 = "この間、追加で注文した物資が公園に届いたの"
20018-200180330 = "でも、みんなちょうど作戦でいないから、一人で整理しなきゃいけなくて……"
20018-200180340 = "重い荷物をたくさん動かすのはちょっと……というのはさておき"
20018-200180350 = "引火しやすい危険な爆弾がいっぱいあるから……"
20018-200180360 = "すぐ行くね"

[translation]
20018-200180370 = "先生、昨日シラトリの公園にいた？"
20018-200180380 = "なんか先生が走ってたような気がして……"
20018-200180390 = "モエもいたんだ"
20018-200180400 = "声かけてくれたらよかったのに"
20018-200180410 = "てっきり、仕事中かと思って声かけなかったんだけど……"
20018-200180420 = "話しかけてよかったんだ？"
20018-200180430 = "大歓迎だよ。最近ジョギングしててね"
20018-200180440 = "座りっぱなしだと身体に悪いからね"
20018-200180450 = "あー、ちょっと分かる"
20018-200180460 = "ずっと座りっぱだと猫背になるし、肩凝るよね"
20018-200180470 = "正しい姿勢が大事って分かってるんだけどね……"
20018-200180480 = "よかったらモエも一緒に運動しない？"
20018-200180490 = "先生、私が特殊隊員だってこと忘れてない？"
20018-200180500 = "これでもSRTの一員なんだけど。トレーニングは毎日やってるよ？"
20018-200180510 = "まあ、サキやミヤコに比べたら全然だけどさ"
20018-200180520 = "でも、先生と一緒にジョギング……ちょっと破滅的かも？"

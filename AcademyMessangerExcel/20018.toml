[translation]
20018-200180010 = "Long time no see, Sensei."
20018-200180020 = "Some squad members told me you've been looking for me..."
20018-200180030 = "What's going on?"
20018-200180040 = "Hi, Moe."
20018-200180050 = "My bad, but can I get some help?"
20018-200180060 = "Of course I can help you, but..."
20018-200180070 = "I'd never expect you to need my help."
20018-200180080 = "Oh, it's not that serious. I just have a feeling something interesting might happen."
20018-200180090 = "I'll be prepared, then."
20018-200180100 = "Sensei, I heard from another student..."
20018-200180110 = "Is it true that the work PC at Schale lost all its data?"
20018-200180120 = "Heeheehee... Right..."
20018-200180130 = "It's all over... Heeheehee..."
20018-200180140 = "Wow, Sensei is laughing like me."
20018-200180150 = "This must be a serious problem."
20018-200180160 = "You'll know when you get here..."
20018-200180170 = "Okay. I'll be at Schale in the afternoon."
20018-200180180 = "You know what, Sensei?"
20018-200180190 = "A safety cover installed over a switch or button is often called a \"Molly-guard.\""
20018-200180200 = "There's a story behind its name."
20018-200180210 = "It was invented because of a kid named Molly kept trying to press an emergency switch."
20018-200180220 = "I see."
20018-200180230 = "That's interesting."
20018-200180240 = "It's kind of a shame when you think about it."
20018-200180250 = "If I had been born earlier than Molly,"
20018-200180260 = "the safety cover would have been called a \"Moe-guard\" by the entire world."
20018-200180270 = "I don't know if that'd be an honorable title..."
20018-200180280 = "Hmm, sorry, Sensei..."
20018-200180290 = "Can you come to Kousagi Park?"
20018-200180300 = "I mean, it's fine, but..."
20018-200180310 = "What are you talking about?"
20018-200180320 = "The additional supplies I ordered before arrived at the park."
20018-200180330 = "Other squad members are in the middle of an operation, so I have to organize them myself..."
20018-200180340 = "There's so much heavy stuff, it's hard to move."
20018-200180350 = "But more importantly, there are a lot of explosives..."
20018-200180360 = "I'll be right there."

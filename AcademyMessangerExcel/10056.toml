[translation]
10056-100560010 = "สวัสดีค่ะคุณครู"
10056-100560020 = "เมอร์รีคริสต์มาสค่ะ!"
10056-100560030 = "เซรินะก็ด้วย เมอร์รีคริสต์มาส!"
10056-100560040 = "ฮุฮุ ขอบคุณนะคะ"
10056-100560050 = "วันนี้มีงานการกุศลในเมืองค่ะ"
10056-100560060 = "ถ้าคุณครูไม่ติดธุระอะไร ก็ลองมาเที่ยว\nงานดูสักครั้งสิคะ"
10056-100560070 = "ถ้าเซรินะชวน ครูก็ต้องไปอยู่แล้ว!"
10056-100560080 = "ว้าว จริงเหรอคะ?"
10056-100560090 = "งั้นฉันจะรอนะคะ!"
10056-100560100 = "สวัสดีค่ะคุณครู!"
10056-100560110 = "ช่วงนี้ดูแลร่างกายเป็นอย่างดีอยู่มั้ยคะ?"
10056-100560120 = "ถ้าทำได้~ ครูก็อยากทำหรอกนะ~"
10056-100560130 = "เอาอีกแล้ว!"
10056-100560140 = "แบบนี้ไม่ได้สิคะ"
10056-100560150 = "ไม่รู้เหรอคะว่าฉันเป็นห่วงคุณครูแค่ไหน!"
10056-100560160 = "......"
10056-100560170 = "เอ่อ..."
10056-100560180 = "ไม่ทราบว่าวันนี้... พอมีเวลาว่างมั้ยคะ?"
10056-100560190 = "ถึงไม่ว่างก็ไปหาได้!"
10056-100560200 = "......?"
10056-100560210 = "คะ? หมายความว่ายังไงคะ...?"
10056-100560220 = "คุณครู...?"
10056-100560230 = "สบายดีมั้ยคะคุณครู?"
10056-100560240 = "วันนี้ฉันไปช่วยกิจกรรมจิตอาสาที่\nโรงพยาบาลค่ะ"
10056-100560250 = "ถึงจะต้องเจอคนไข้ที่ปกติก็เห็นหน้า\nกันอยู่ตลอดก็เถอะ แต่พอได้แต่งตัวเป็น\nซานต้า ฉันก็ตื่นเต้นนิดหน่อยน่ะค่ะ"
10056-100560260 = "ครูไปช่วยกิจกรรมจิตอาสานั้นด้วยได้มั้ย?"
10056-100560270 = "คะ?"
10056-100560280 = "จริงๆ ก็... มาได้ค่ะ"
10056-100560290 = "จู่ๆ ก็มีเรื่องอะไรเหรอคะ?"
10056-100560300 = "คุณครู?"

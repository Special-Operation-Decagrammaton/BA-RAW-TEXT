[translation]
26000-1882 = "ชินัตสึค่ะ จำฉันได้รึเปล่าคะ"
26000-1883 = "ตอนคราวที่แล้วไม่มีเวลา ฉันเลยไม่ได้\nทักทายคุณครู"
26000-1884 = "คราวนี้เลยอยากจะมาทักทายอย่างเป็น\nทางการค่ะ"
26000-1885 = "-ชินัตสึ"
26000-1886 = "เรื่องในวันนี้... ขอบคุณมากเลยค่ะ\nคุณครู"
26000-1887 = "ฉันไม่รู้ว่าจะตอบแทนคุณครูยังไงดี..."
26000-1888 = "สักวันคงได้มีโอกาสตอบแทนคุณครูค่ะ"
26000-1889 = "..."
26000-1890 = "ต่อไปก็ขอรบกวนด้วยนะคะ -ชินัตสึ"
26000-1891 = "สวัสดีค่ะ คุณครู สบายดีใช่มั้ยคะ?"
26000-1892 = "เพื่อเป็นการตอบแทนเรื่องคราวที่แล้ว"
26000-1893 = "ฉันเลยจะขอไปพบคุณครูอีกครั้ง..."
26000-1894 = "ไม่ทราบว่าคุณครูสะดวกมั้ยคะ?"
26000-1895 = "ถ้าชินัตสึทักมาแบบนี้ ครูว่างเสมอเลย"
26000-1896 = "ครูรอให้เธอชวนตลอดเลยนะ! ฮึฮึฮึ"
26000-1897 = "คือ..."
26000-1898 = "กะ...กรุณาอย่าพูดอะไรแบบนี้สิคะ"
26000-1899 = "ขอโทษด้วยค่ะ ฉันไม่ได้หมายความว่า\nฉันเกลียดหรืออะไรนะคะ"
26000-1900 = "..."
26000-1901 = "ฉันจะบอกสถานที่นัดพบให้นะคะ\nแล้วฉันจะไปรอคุณครูที่นั่นค่ะ"
26000-1902 = "-ชินัตสึ"
26000-1903 = "วันนี้ขอบคุณมากค่ะ คุณครู"
26000-1904 = "ฉันไม่รู้ว่าจะตอบแทนคุณครูยังไงดี..."
26000-1905 = "คือ..."
26000-1906 = "..."
26000-1907 = "ไม่มีอะไรหรอกค่ะ"
26000-1908 = "ขอบคุณมากนะคะ ขอให้วันนี้เป็น\nวันที่ดีค่ะ -ชินัตสึ"
26000-1909 = "สวัสดีค่ะ คุณครู"
26000-1910 = "ถ้าคุณครูสะดวก รบกวนบอกเวลาที่\nคุณครูว่างให้ฉันทราบหน่อยได้มั้ยคะ?"
26000-1911 = "ฉันมีเรื่องส่วนตัวอยากปรึกษาคุณครูค่ะ"
26000-1912 = "หลังจบคลาสวันนี้ก็ได้นะ"
26000-1913 = "ตอนนี้เลยก็ได้นะ!"
26000-1914 = "ค่ะ"
26000-1915 = "ขอบคุณที่สละเวลาว่างให้ฉันนะคะ"
26000-1916 = "คราวนี้ฉันจะไปหาคุณครูเองค่ะ -ชินัตสึ"
26000-1917 = "ถ้ามีเรื่องที่คุณครูลำบากล่ะก็บอกฉันได้\nเลยนะคะ"
26000-1918 = "ไม่สิ..."
26000-1919 = "ถ้ามีงานที่จะทำให้คุณครูเหนื่อยขึ้นล่ะก็\nบอกฉันล่วงหน้าได้เลยนะคะ"
26000-1920 = "ฉันจะไปคอยช่วยดูแลคุณครูอยู่ข้างๆ\nไม่ให้เหนื่อยเลยค่ะ"
26000-1921 = "ขอให้วันนี้เป็นวันที่ดีนะคะ -ชินัตสึ"
26000-260000010 = "สวัสดีค่ะคุณครู ชินัตสึเองค่ะ"
26000-260000020 = "ฉันขอรบกวนเวลาคุณครูหน่อยได้มั้ยคะ?"
26000-260000030 = "คือว่าฉันมีเรื่องที่อยากขอร้องคุณครู..."
26000-260000040 = "มีอะไรเหรอ?"
26000-260000050 = "\"เวลา\" กับชินัตสึ...?!"
26000-260000060 = "ไม่ใช่เรื่องใหญ่หรอก"
26000-260000070 = "เปล่าค่ะ"
26000-260000080 = "คือ..."
26000-260000090 = "จู่ๆ ถ้าคุณครูพูดแบบนั้น..."
26000-260000100 = "ฮู่ว..."
26000-260000110 = "เรื่องงานค่ะ คุณครู เรื่องเขียนเอกสาร\nน่ะค่ะ"
26000-260000120 = "จำนวนเอกสารที่ต้องเขียนมันเยอะเกิน\nไปที่จะทำคนเดียว ถ้าคุณครูมีเวลา\nฉันเลยจะขอรบกวนคุณครูค่ะ"
26000-260000130 = "แต่ถ้าคุณครูงานยุ่งก็ไม่เป็นไรนะคะ"
26000-260000140 = "ไม่เลย ครูจะไปหาเดี๋ยวนี้ละ"
26000-260000150 = "ค่ะ"
26000-260000160 = "คะ...?"
26000-260000170 = "ตอนนี้... เหรอคะ?"
26000-260000180 = "เรื่องงานวันนี้ ฉันต้องขอขอบคุณ\nอีกครั้งนะคะ คุณครู"
26000-260000190 = "ถ้าไม่ได้คุณครูมาช่วย คงเกิดเรื่องใหญ่\nแน่ๆ เลยค่ะ"
26000-260000200 = "..."
26000-260000210 = "คือว่า..."
26000-260000220 = "ถ้าคุณครูไม่ว่าอะไร คราวหน้า..."
26000-260000230 = "คราวหน้าฉันจะขอรบกวนคุณครูอีก\nได้มั้ยคะ?"
26000-260000240 = "ได้เสมอเลย"
26000-260000250 = "ขอบคุณค่ะ คุณครู"
26000-260000260 = "คราวหน้า ฉันจะระวังไม่ให้ทำพลาด\nเหมือนครั้งนี้ ฉันเลือกสถานที่ใหม่ไว้แล้ว..."
26000-260000270 = "..."
26000-260000280 = "คือ..."
26000-260000290 = "เปล่าค่ะ"
26000-260000300 = "อืม..."
26000-260000310 = "คือว่าคราวหน้า..."
26000-260000320 = "..."
26000-260000330 = "รบกวนมาเจอกันที่เดิมนะคะ -ชินัตสึ"
26000-260000340 = "ในที่สุดก็ถึงวันหยุดแล้วนะคะ"
26000-260000350 = "คุณครูเป็นยังไงบ้างคะ ได้หยุดรึเปล่า?"
26000-260000360 = "บังเอิญจังเลยนะ วันนี้ครูก็หยุด\nเหมือนกัน"
26000-260000370 = "งั้นครูโดดงานบ้างดีมั้ย!"
26000-260000380 = "ฮุฮุ"
26000-260000390 = "นับเป็นเรื่องน่ายินดีนะคะ"
26000-260000400 = ";;;;"
26000-260000410 = "ถ้าทำแบบนั้น..."
26000-260000420 = "ยังไงก็ตาม ขอโทษที่รบกวนคุณครูนะคะ"
26000-260000430 = "ขอให้วันนี้เป็นวันที่ดีนะคะ -ชินัตสึ"
26000-260000440 = "ขอบคุณมากเลยนะคะ คุณครู"
26000-260000450 = "สุดท้ายฉันก็เอาแต่ให้คุณครูทำงาน\nทั้งๆ ที่นานๆ ทีจะได้มีเวลาพัก"
26000-260000460 = "ไม่หรอก ครูรู้สึกกระชุ่มกระชวยขึ้นเยอะเลย"
26000-260000470 = "ถึงจะเหนื่อยกาย แต่รู้สึกฮีลใจเต็มร้อยเลยนะ"
26000-260000480 = "อย่างนั้นเหรอคะ"
26000-260000490 = "งั้นตอนนี้ถึงเวลาฟื้นฟูกำลังกายแล้วละค่ะ"
26000-260000500 = "ฮุฮุ ไทม์มิงพอเหมาะเลยนะคะ"
26000-260000510 = "เดี๋ยวฉันจะไปพบนะคะ -ชินัตสึ"

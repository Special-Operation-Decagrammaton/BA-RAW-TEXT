[translation]
26000-1882 = "치나츠입니다. 기억하고 계실는지요."
26000-1883 = "지난번에는 경황이 없어 제대로 인사드리지 못했습니다."
26000-1884 = "다시 한번 정식으로 인사드릴 기회가 있었으면 좋겠습니다."
26000-1885 = "-치나츠."
26000-1886 = "오늘 일은 정말로 감사드립니다. 선생님."
26000-1887 = "이 일을 어떻게 보답해야 할지……"
26000-1888 = "언젠가는 보답해드릴 기회가 오겠지요."
26000-1889 = "……"
26000-1890 = "앞으로도 잘 부탁드립니다. -치나츠."
26000-1891 = "안녕하세요, 선생님. 재차 인사드립니다."
26000-1892 = "지난 번 일의 답례도 해드릴 겸"
26000-1893 = "다시 한번 뵙고자 합니다만……"
26000-1894 = "혹시 시간 괜찮으신지요?"
26000-1895 = "치나츠가 부른다면 가야지."
26000-1896 = "이날만을 기다리고 있었다! 핥핥핥"
26000-1897 = "그"
26000-1898 = "그런 식의 말씀은 삼가주세요."
26000-1899 = "죄송합니다. 싫다는 뜻은 아니었습니다만."
26000-1900 = "……"
26000-1901 = "만나 뵐 장소를 말씀드리겠습니다. 거기서 기다리겠습니다."
26000-1902 = "-치나츠"
26000-1903 = "오늘은 정말로 감사했습니다. 선생님."
26000-1904 = "이 일을 어떻게 감사드려야 할지 모르겠습니다."
26000-1905 = "그"
26000-1906 = "……"
26000-1907 = "아무것도 아닙니다."
26000-1908 = "감사합니다. 좋은 하루 되세요. -치나츠."
26000-1909 = "안녕하세요, 선생님."
26000-1910 = "혹시 괜찮으시다면, 선생님께서 여유로운 시간대를 알려주시겠습니까?"
26000-1911 = "개인적으로 상담하고 싶은 일이 있습니다."
26000-1912 = "오늘 일 끝나면 가능해."
26000-1913 = "지금 바로 가능하지!"
26000-1914 = "네."
26000-1915 = "시간 내 주셔서 감사합니다."
26000-1916 = "이번엔 제가 찾아뵙도록 하겠습니다. -치나츠"
26000-1917 = "피곤한 일이 생기시면 언제든 연락주세요, 선생님."
26000-1918 = "아니."
26000-1919 = "피곤할 것 같은 일이 생기시면, 미리 연락주시길 바랍니다."
26000-1920 = "피로를 느끼시지 않으시도록, 제가 옆에서 돕겠습니다."
26000-1921 = "그럼 좋은 하루 되시길 바랍니다. -치나츠"
26000-260000010 = "안녕하세요, 선생님. 치나츠입니다."
26000-260000020 = "혹시 언제 한번 일정 좀 내주실 수 있을까요?"
26000-260000030 = "다른 게 아니라 부탁드리고 싶은 게 있어서……"
26000-260000040 = "무슨 일이야?"
26000-260000050 = "치나츠와의…… '일정'……!?"
26000-260000060 = "별 일은 아니고요."
26000-260000070 = "아니"
26000-260000080 = "그"
26000-260000090 = "갑자기 그렇게 말씀하시면"
26000-260000100 = "……후우……"
26000-260000110 = "일과 관련된 일입니다. 선생님. 서류 작업이요."
26000-260000120 = "혼자 하기에는 좀 양이 많아서, 시간 있으실 때 부탁드리려고 했어요."
26000-260000130 = "바쁘시다면 괜찮습니다."
26000-260000140 = "아냐. 지금 바로 갈게."
26000-260000150 = "네."
26000-260000160 = "……네?"
26000-260000170 = "지금……이요?"
26000-260000180 = "오늘 일은 다시 한번 감사드립니다. 선생님."
26000-260000190 = "선생님 아니었다면 큰일이었을 거예요."
26000-260000200 = "……"
26000-260000210 = "혹시"
26000-260000220 = "혹시 선생님께서만 괜찮으시다면 다음에도……"
26000-260000230 = "다음 번에도 비슷하게 부탁드려도 될까요?"
26000-260000240 = "물론이지."
26000-260000250 = "감사합니다. 선생님."
26000-260000260 = "그때는 이번 같은 실수를 방지하기 위해, 장소도 새로 선정해 둘 테니……"
26000-260000270 = "……"
26000-260000280 = "그"
26000-260000290 = "아니"
26000-260000300 = "음"
26000-260000310 = "역시 다음 번에도"
26000-260000320 = "……"
26000-260000330 = "같은 곳에서 부탁드리겠습니다. -치나츠."
26000-260000340 = "모처럼의 휴일이네요."
26000-260000350 = "선생님께서는 어떠신가요, 시간?"
26000-260000360 = "우연인걸, 나도 오늘은 쉬어."
26000-260000370 = "그럼 나도 땡땡이 좀 쳐볼까!"
26000-260000380 = "후후"
26000-260000390 = "듣기 좋은 이야기네요."
26000-260000400 = ";;;;"
26000-260000410 = "그건 좀……"
26000-260000420 = "아무튼 잠시 실례했습니다."
26000-260000430 = "좋은 하루 되시길 바랍니다. -치나츠"
26000-260000440 = "고생 많으셨습니다, 선생님."
26000-260000450 = "모처럼 내신 시간인데 결국 일만 시켜 드린 셈이 됐네요."
26000-260000460 = "그렇지 않아. 기력 쪽은 오히려 회복됐어."
26000-260000470 = "체력은 썼어도 마음이 회복됐달까."
26000-260000480 = "그렇습니까."
26000-260000490 = "그러면 이제 체력을 회복해야 할 시간이네요."
26000-260000500 = "후후. 마침 잘 됐습니다."
26000-260000510 = "금방 찾아뵙도록 하겠습니다. -치나츠"

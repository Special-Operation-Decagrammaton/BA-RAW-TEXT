[translation]
26000-1882 = "好久不見，我是千夏。還記得我嗎"
26000-1883 = "上次因為匆忙，沒能好好地和您打聲招呼"
26000-1884 = "之後如果有機會能再次打招呼的話，我會很高興的"
26000-1885 = "～千夏～"
26000-1886 = "今天真的非常感謝，老師"
26000-1887 = "這份恩情該如何報答呢……"
26000-1888 = "有朝一日絕對會報答您的"
26000-1889 = "……那，那麼"
26000-1890 = "今後也請多多指教　～千夏～"
26000-1891 = "您好，老師"
26000-1892 = "關於上次報答的事"
26000-1893 = "如果可以的話想再見個面……"
26000-1894 = "請問時間上方便嗎？"
26000-1895 = "如果是千夏的呼喚，24小時都可以！"
26000-1896 = "這一天！一直等待著這一天……！"
26000-1897 = "那，那個……"
26000-1898 = "對不起，稍微嚇了一跳"
26000-1899 = "不是那個，並不是討厭的意思……"
26000-1900 = "……"
26000-1901 = "稍後會告訴您地點。我會在那裡等著"
26000-1902 = "～千夏～"
26000-1903 = "今天真的非常感謝您，老師"
26000-1904 = "這份心情，我不知道該怎麼表達"
26000-1905 = "那個……"
26000-1906 = "……不"
26000-1907 = "對不起，沒什麼"
26000-1908 = "非常感謝，下次見　～千夏～"
26000-1909 = "您好，老師"
26000-1910 = "如果可以的話，能告訴我老師方便的時間嗎？"
26000-1911 = "我有事想私下商量"
26000-1912 = "今天工作結束的時候如何？"
26000-1913 = "現在馬上也沒問題！"
26000-1914 = "知道了，那就再拜託了"
26000-1915 = "非常感謝老師給我時間"
26000-1916 = "我會去拜訪老師哦　～千夏～"
26000-1917 = "感到疲累的時候，請隨時聯絡我"
26000-1918 = "不"
26000-1919 = "如果覺得有事情會讓老師感到疲憊，請通知我一聲"
26000-1920 = "為了不再讓您累積疲勞，我會去幫忙的"
26000-1921 = "那麼，下次見　～千夏～"
26000-260000010 = "老師，早安。我是千夏"
26000-260000020 = "最近，很忙嗎？"
26000-260000030 = "其實，有件事想拜託老師……"
26000-260000040 = "怎麼了？"
26000-260000050 = "這個，難道是……！？"
26000-260000060 = "不是什麼大不了的事"
26000-260000070 = "不"
26000-260000080 = "那個"
26000-260000090 = "我說的不是那種事"
26000-260000100 = "那個……"
26000-260000110 = "是商量工作相關的事。希望能幫我處理文件類的工作"
26000-260000120 = "一個人做的話，量實在有點多……"
26000-260000130 = "當然，如果您很忙的話，不用接受這無理的要求"
26000-260000140 = "沒問題，馬上過去唷"
26000-260000150 = "啊"
26000-260000160 = "那個，不用那麼急也沒關係"
26000-260000170 = "非常感謝 ～千夏～"
26000-260000180 = "今天真的非常感謝老師"
26000-260000190 = "如果老師沒來的話，我想可能結束不了"
26000-260000200 = "那個"
26000-260000210 = "如果"
26000-260000220 = "可以的話……"
26000-260000230 = "之後如果還有其他事，可以再拜託老師嗎？"
26000-260000240 = "嗯，當然"
26000-260000250 = "非常感謝"
26000-260000260 = "到那時候，好好地在別的地方"
26000-260000270 = "啊"
26000-260000280 = "那個"
26000-260000290 = "……"
26000-260000300 = "對不起"
26000-260000310 = "那個"
26000-260000320 = "……"
26000-260000330 = "在同個地方也沒關係"
26000-260000340 = "今天是難得的休假"
26000-260000350 = "請問老師今天有空嗎？"
26000-260000360 = "真巧，我今天也正好休息"
26000-260000370 = "那我也來偷懶一下吧！"
26000-260000380 = "呵呵"
26000-260000390 = "聽起來真不錯呢"
26000-260000400 = "……"
26000-260000410 = "那似乎有點……"
26000-260000420 = "總之，不好意思打擾了"
26000-260000430 = "祝老師有美好的一天　～千夏～"
26000-260000440 = "真是辛苦您了，老師"
26000-260000450 = "難得老師有時間休息，我卻讓老師一直工作"
26000-260000460 = "別這麼說，我反而恢復了元氣"
26000-260000470 = "雖然消耗了體力，但心靈卻回復了"
26000-260000480 = "這樣啊"
26000-260000490 = "那麼現在是時候想辦法恢復體力了"
26000-260000500 = "呵呵，這樣正好"
26000-260000510 = "我馬上就去找您　～千夏～"

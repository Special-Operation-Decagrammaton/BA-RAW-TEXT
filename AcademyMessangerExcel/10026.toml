[translation]
10026-100260010 = "อ่า..."
10026-100260020 = "นี่มันเกิดอะไรขึ้น..."
10026-100260030 = "...?"
10026-100260040 = "มีอะไรเหรอ?"
10026-100260050 = "คือ..."
10026-100260060 = "ฟังก่อนนะ"
10026-100260080 = "..."
10026-100260090 = "????????????"
10026-100260100 = "ชุดนี่..."
10026-100260110 = "ฉันไม่รู้หรอกว่าจะใส่ได้ยังไง"
10026-100260120 = "ถ้าเป็นแบบนี้ละก็ ฉันอาจจะรำคาญจน\nฉีกมันขาด เป็นชิ้นๆ เลยก็ได้"
10026-100260130 = "ลองมาดูให้หน่อยสิ"
10026-100260140 = "มาเดี๋ยวนี้เลยนะ"
10026-100260150 = "คุณครู"
10026-100260160 = "ฉันจะตอบในเรื่องที่ครูบอกเมื่อกี้"
10026-100260170 = "ดีล่ะ"
10026-100260180 = "ต่อไปฉันจะเรียกคุณครูมาบ่อยๆ นะ"
10026-100260190 = "ห้ามเมินเวลาฉันเรียกล่ะ เข้าใจมั้ย?"
10026-100260200 = "ฮะฮ่าฮ่า"
10026-100260210 = "คุณครู"
10026-100260220 = "ฉันรบกวนคุณครูสักเรื่องได้มั้ย"
10026-100260230 = "ได้อยู่แล้ว เรื่องอะไรเหรอ?"
10026-100260240 = "โอ้ เรียกจริงๆ ด้วยแฮะ"
10026-100260250 = "เปล่า ไม่มีอะไรหรอก"
10026-100260260 = "อะไรน่ะ ไหนครูบอกว่าไม่เป็นไรยังไงล่ะ"
10026-100260270 = "จะไปขอร้องคนอื่นที่ไม่ใช่ครูละก็ มันลำบากนิดหน่อยน่ะ"
10026-100260280 = "ครูช่วยซื้อพลาสเตอร์มาให้ฉันหน่อย\nได้มั้ย ถ้าไม่ได้ก็ไม่เป็นไร"
10026-100260290 = "เข้าใจแล้ว จะไปเดี๋ยวนี้แหละ"
10026-100260300 = "พลาสเตอร์? บาดเจ็บตรงไหนงั้นเหรอ?"
10026-100260310 = "..."
10026-100260320 = "ไม่ต้องสนใจหรอก ไม่ได้บาดเจ็บอะไรมาก"
10026-100260330 = "อืม"
10026-100260340 = "ยังไงก็ขอบคุณนะ..."
10026-100260350 = "แล้วเดี๋ยวเจอกัน"
10026-100260360 = "ฮะฮะ..."
10026-100260370 = "สบายกว่าที่คิดไว้อีกแฮะ การขอร้องแบบนี้น่ะ"
10026-100260380 = "บางครั้งขอร้องแบบนี้ก็คงไม่เป็นไร\nใช่มั้ยล่ะ? คุณครู?"
10026-100260390 = "แน่นอนอยู่แล้ว"
10026-100260400 = "ฮะฮ่าฮ่า ดีล่ะ"
10026-100260410 = "ถ้ามีโอกาสก็ไว้เจอกันใหม่นะ"
10026-100260420 = "คุณครู"
10026-100260430 = "ฉันมีเรื่องอยากจะขอร้องอีกเรื่องน่ะ"
10026-100260440 = "ไม่สิ ที่จริงแล้วก็ไม่ใช่เรื่องขอร้องหรอก แต่ขอให้ตรวจสอบมากกว่า"
10026-100260450 = "...? เรื่องที่เธอสงสัยเหรอ?"
10026-100260460 = "มีอะไรเหรอ?"
10026-100260470 = "ไม่ใช่เรื่องใหญ่หรอก"
10026-100260480 = "คือว่าท่าทางคนอื่นดูแปลกๆ น่ะ"
10026-100260490 = "ฉันก็อธิบายไม่ถูกแฮะ"
10026-100260500 = "ตอนนี้คุณครูว่างมั้ย? มาที่นี่หน่อยได้รึเปล่า?"

[translation]
10026-100260010 = "아"
10026-100260020 = "대체 이게 어떻게 된……."
10026-100260030 = "……?"
10026-100260040 = "무슨 일이야?"
10026-100260050 = "그"
10026-100260060 = "좀 봐봐"
10026-100260080 = "……."
10026-100260090 = "????????????"
10026-100260100 = "이거"
10026-100260110 = "어떻게 입는지 모르겠다."
10026-100260120 = "이대로라면 짜증 나서 찢어버릴지도 모르니까"
10026-100260130 = "와서 좀 봐줘 봐."
10026-100260140 = "지금 바로"
10026-100260150 = "선생."
10026-100260160 = "아까 한 말에 대답을 해주지."
10026-100260170 = "좋아."
10026-100260180 = "앞으로도 종종 불러줄 테니까 말이야."
10026-100260190 = "무시하면 안 된다고. 알았지?"
10026-100260200 = "크하하."
10026-100260210 = "선생."
10026-100260220 = "지금 부탁 하나만 해도 될까."
10026-100260230 = "물론이지. 무슨 일이야?"
10026-100260240 = "오, 진짜로 불러주는 건가."
10026-100260250 = "아니. 별일은 아니야."
10026-100260260 = "뭐야. 선생이 괜찮다고 했잖아."
10026-100260270 = "선생 아니면 부탁하기 힘든 거니까 그런 거라고."
10026-100260280 = "그냥 밴드 하나만 사 와 주면 돼. 안 되면 말고."
10026-100260290 = "알았어. 지금 갈게."
10026-100260300 = "밴드? 어디 다쳤어?"
10026-100260310 = "……."
10026-100260320 = "신경 쓸 거 없어. 그런 건 아니니까."
10026-100260330 = "음."
10026-100260340 = "……고마워, 일단은."
10026-100260350 = "조금 이따가 오면 보자고."
10026-100260360 = "하하."
10026-100260370 = "생각보다는 좀 편하구만. 이런 식으로 부탁하는 거."
10026-100260380 = "……가끔 또 이런 식으로 부탁해도 괜찮겠지? 선생?"
10026-100260390 = "물론이지."
10026-100260400 = "크하하. 좋아."
10026-100260410 = "기회가 되면 또 보자고."
10026-100260420 = "선생."
10026-100260430 = "또 부탁하고 싶은 일이 하나 생겼는데."
10026-100260440 = "아니, 정확히는 부탁이 아니라 확인이라고 봐야겠지만."
10026-100260450 = "……? 궁금한 거?"
10026-100260460 = "무슨 일이야?"
10026-100260470 = "별 건 아니고."
10026-100260480 = "그냥 사람들이 좀 이상해서."
10026-100260490 = "말로는 설명이 안 되는군."
10026-100260500 = "지금 시간 괜찮아? 와줄 수 있나?"

[translation]
16002-1249 = "如果有任何問題，無論什麼時候，不管幾次都可以！"
16002-1250 = "不用去費心調查，直接來問亞都梨就可以了！"
16002-1251 = "亞都梨的專業是自然科學吧？"
16002-1252 = "什麼都可以……？"
16002-1253 = "那個，是啊……"
16002-1254 = "我的專業主要是自然科學"
16002-1255 = "但基本上，任何事都可以！"
16002-1256 = "只要是我能說明的，任何事都行！"
16002-1257 = "老師？你跑去哪裡了？"
16002-1258 = "該不會是逃走了吧？"
16002-1259 = "……老師？"
16002-1260 = "如果有任何問題，請隨時告訴我唷！"
16002-1261 = "因為亞都梨總是伴隨在求知慾的身邊！"
16002-1262 = "謝謝你，老師！太感動了！"
16002-1263 = "沒想到這麼快就理解了！"
16002-1264 = "……那個，老師，偶爾就好，如果可以的話"
16002-1265 = "……再萬事拜託了！"
16002-1266 = "老師"
16002-1267 = "現在有時間嗎？"
16002-1268 = "啊，沒什麼大不了的"
16002-1269 = "不，對我來說是很重要的事……！"
16002-1270 = "總，總之呢……"
16002-1271 = "那個"
16002-1272 = "有點……算是疑問嗎"
16002-1273 = "我有件事想問你……！"
16002-1274 = "沒問題，怎麼了？"
16002-1275 = "不是說明而是提問？"
16002-1276 = "非"
16002-1277 = "非常感謝！"
16002-1278 = "二話不說，不愧是老師！"
16002-1279 = "輸出也是需要輸入的"
16002-1280 = "而且"
16002-1281 = "不是別人，是只能問老師的事！"
16002-1282 = "呵呵，那麼在那個地方"
16002-1283 = "等著老師唷！"
16002-1284 = "……那個"
16002-1285 = "再，再次感謝你！"
16002-1286 = "果然問老師是正確的！"
16002-1287 = "我好像能好好地說明了！"
16002-1288 = "那太好了"
16002-1289 = "結果是怎麼回事？"
16002-1290 = "嘿嘿嘿……"
16002-1291 = "是，真的太好了"
16002-1292 = "謝謝你，老師！"
16002-1293 = "那，那個是……"
16002-1294 = "那是……"
16002-1295 = "……"
16002-1296 = "是祕密……"
16002-1297 = "這個，那麼，回頭見"
16002-160020010 = "如果有任何問題，請隨時告訴我唷！"
16002-160020020 = "讓亞都梨陪你解決各種疑惑！"
16002-160020030 = "……"
16002-160020040 = "以防萬一……"
16002-160020050 = "那個，沒有被設定為靜音吧……？"
16002-160020060 = "有時也會發生這種事……"
16002-160020070 = "沒有那種事，而且正好有想問的事"
16002-160020080 = "來得正好，我有疑問，亞都梨老師！"
16002-160020090 = "……"
16002-160020100 = "真"
16002-160020110 = "真的嗎！？"
16002-160020120 = "交給我吧，什麼都能回答！"
16002-160020130 = "那麼，亞都梨！現在馬上過去！>_<"
16002-160020140 = "對不"
16002-160020150 = "對不起，老師……那個，該說問題太出乎預料嗎……"
16002-160020160 = "我實在沒想過會是那種問題……"
16002-160020170 = "之前好像也發生過類似的事……"
16002-160020180 = "唔嗯……"
16002-160020190 = "那個……"
16002-160020200 = "如果"
16002-160020210 = "如果可以的話，等我做好準備之後"
16002-160020220 = "再麻煩老師了……"
16002-160020230 = "到時候"
16002-160020240 = "我一定會好好回答的……"
16002-160020250 = "呼！"
16002-160020260 = "差點就出大事了！"
16002-160020270 = "亞都梨？"
16002-160020280 = "怎麼了？"
16002-160020290 = "啊，其實也沒什麼！"
16002-160020300 = "只是眼鏡出了點問題，所以送去修理了"
16002-160020310 = "本來想說一天不戴眼鏡應該沒問題"
16002-160020320 = "結果我的視力根本不行！啊哈哈！！"

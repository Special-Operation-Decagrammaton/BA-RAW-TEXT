[translation]
16002-1249 = "ถ้าสงสัยในเรื่องอะไรก็ตาม มาถามฉันได้\nตลอดเลยนะคะ!"
16002-1250 = "ไม่ต้องไปที่ไหนไกลค่ะ แค่มาถามโคโทริ\nก็พอแล้วล่ะ!"
16002-1251 = "พวกความรู้ด้านวิทยาศาสตร์งั้นเหรอ?"
16002-1252 = "\"เรื่องอะไรก็ตาม\" งั้นเหรอ?"
16002-1253 = "อืม..."
16002-1254 = "ใช่แล้วค่ะ ถึงวิทยาศาสตร์จะเป็นเรื่องที่\nฉันถนัดก็เถอะ"
16002-1255 = "แต่ที่จริงแล้ว ฉันก็รู้ทุกเรื่องเลยค่ะ!"
16002-1256 = "ถ้าอยากให้ฉัน \"อธิบาย\" ล่ะก็..."
16002-1257 = "คุณครู... จะไปไหนเหรอคะ?"
16002-1258 = "คุณครูคงไม่ได้คิดจะหนีใช่มั้ยคะ?"
16002-1259 = "คุณครูคะ...?"
16002-1260 = "ถ้ามีเรื่องที่สงสัยละก็ ถามฉันได้ตลอด\nเลยนะคะ!"
16002-1261 = "มาร่วมคลี่คลายข้อสงสัยกับโคโทริได้\nตลอดเลยนะคะ!"
16002-1262 = "ขอบคุณนะคะ คุณครู! รู้สึกประทับใจ\nจังเลยค่ะ"
16002-1263 = "โอ้โห ไม่คิดว่าจะมีคนที่เข้าใจฉันแบบนี้\nอยู่ด้วย!"
16002-1264 = "เพราะงั้นต่อจากนี้ไป..."
16002-1265 = "ฉันก็ขอรบกวนคุณครูด้วยนะคะ!"
16002-1266 = "คุณครูคะ"
16002-1267 = "ตอนนี้คุณครูมีเวลาว่างมั้ยคะ?"
16002-1268 = "อ่า... ไม่ใช่เรื่องสำคัญหรอกค่ะ"
16002-1269 = "ไม่สิ มันก็สำคัญอยู่เหมือนกันค่ะ"
16002-1270 = "เอาเป็นว่า...!"
16002-1271 = "คือว่า..."
16002-1272 = "คือ..."
16002-1273 = "ฉันมีเรื่องอยากจะถามคุณครูค่ะ!"
16002-1274 = "ถามได้ตลอดเลยนะ"
16002-1275 = "ไม่ได้จะอธิบาย แต่มีคำถามงั้นเหรอ?"
16002-1276 = "โอ้"
16002-1277 = "ขอบคุณมากค่ะ!"
16002-1278 = "สมกับที่เป็นคุณครูจริงๆ เลยค่ะ"
16002-1279 = "ตัวฉันเองก็ยังมีเรื่องที่สงสัยอยู่เหมือน\nกันนะคะ"
16002-1280 = "แล้วก็..."
16002-1281 = "คนที่ฉันจะถามไม่ใช่คนอื่น แต่เป็นคุณครู\nยังไงล่ะคะ!"
16002-1282 = "หึหึหึ"
16002-1283 = "ถ้างั้น ฉันจะรอคุณครูนะคะ!"
16002-1284 = "..."
16002-1285 = "เมื่อกี้ขอบคุณมากนะคะ!"
16002-1286 = "คิดถูกจริงๆ ที่ขอให้คุณครูมา"
16002-1287 = "ฉันคิดว่าอธิบายให้เขาฟังได้ค่ะ\nไม่ต้องกังวลค่ะ"
16002-1288 = "โชคดีจังเลยน้า~"
16002-1289 = "เรื่องอะไรงั้นเหรอ?"
16002-1290 = "แหะๆ..."
16002-1291 = "นั่นสิคะ โชคดีจริงๆ เลยค่ะ"
16002-1292 = "ขอบคุณมากค่ะ คุณครู!"
16002-1293 = "..."
16002-1294 = "คะ..."
16002-1295 = "ความ-ลับ-นะ-คะ"
16002-1296 = "ความลับค่ะ!"
16002-1297 = "นั่นละค่ะ..."
16002-160020010 = "ถ้าคุณครูมีข้อสงสัยอะไรถามฉันได้นะคะ"
16002-160020020 = "โคโทริพร้อมช่วยไขข้อสงสัยให้ทุกเรื่องค่ะ!"
16002-160020030 = "อืม..."
16002-160020040 = "รู้สึกเหมือนกดส่งข้อความไปหลาย\nครั้งแล้วนะ..."
16002-160020050 = "ขอถามเพื่อความแน่ใจนะคะ... คุณครู\nคงไม่ได้กดสแปมข้อความใช่มั้ยคะ...?"
16002-160020060 = "เพราะมันเกิดขึ้นได้บางครั้งค่ะ"
16002-160020070 = "เปล่านะ ที่จริงครูมีเรื่องจะถามอยู่น่ะ"
16002-160020080 = "ไทม์มิ่งเหมาะสุดๆ เลย\nครูมีเรื่องจะถามอยู่น่ะ!"
16002-160020090 = "..."
16002-160020100 = "ฮึ่ก"
16002-160020110 = "จริงเหรอคะ!!!"
16002-160020120 = "ได้ค่ะ! ได้เสมอค่ะ!\nฉันจะตอบให้ทุกเรื่องเลยค่ะ!"
16002-160020130 = "โคโทริ... จะไปหาเดี๋ยวนี้ค่ะ!! >___<!!"
16002-160020140 = "ขะ..."
16002-160020150 = "ขอโทษค่ะคุณครู...\nฉันไม่เคยคิดถึงคำถามแบบนี้มาก่อน..."
16002-160020160 = "ฉันไม่คิดว่าคุณครูจะถามแบบนี้..."
16002-160020170 = "พอมาคิดดูดีๆ แล้ว เมื่อก่อนก็เคยเกิดเรื่องแบบนี้ขึ้นนี่นา..."
16002-160020180 = "อืม... อืม..."
16002-160020190 = "เอ่อ..."
16002-160020200 = "คราวหน้า..."
16002-160020210 = "ถ้าคราวหน้ามีเวลา และฉันพร้อมแล้ว\nช่วยถามฉันอีกครั้งนะคะ"
16002-160020220 = "ต้องขอรบกวนอีกครั้งด้วยนะคะ..."
16002-160020230 = "ถ้าเป็นตอนนั้น..."
16002-160020240 = "ฉันจะตอบคำถามคุณครูอย่างแน่นอนค่ะ...!"
16002-160020250 = "ฮู่ว!"
16002-160020260 = "เกือบเป็นเรื่องแล้วนะคะ!"
16002-160020270 = "โคโทริ?"
16002-160020280 = "มีอะไรเหรอ?"
16002-160020290 = "อ่า... ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ!"
16002-160020300 = "แว่นตาของฉันร้าวนิดหน่อย\nเลยเอาไปส่งซ่อมค่ะ"
16002-160020310 = "ฉันคิดว่าถ้าไม่ใส่แว่นสักวัน\nคงไม่เป็นไร"
16002-160020320 = "แต่จากค่าสายตาของฉัน ทำให้ฉัน\nมองตาเปล่าไม่ได้เลยค่ะ! ฮ่าฮ่า!"

[translation]
16002-1249 = "궁금한 게 생기면 언제든 무엇이든!"
16002-1250 = "멀리 갈 필요 없습니다, 이 코토리에게 물어보세요!"
16002-1251 = "과학적인 지식 이야기야?"
16002-1252 = "'무엇이든'?"
16002-1253 = "음……"
16002-1254 = "그렇네요. 비록 과학 쪽이 제 전공이긴 하지만"
16002-1255 = "사실 뭐든지 상관없죠!"
16002-1256 = "'설명'이라면!"
16002-1257 = "선생님? 어디 가셨어요?"
16002-1258 = "……설마 도망치신 건 아니시죠?"
16002-1259 = "……선생님?"
16002-1260 = "궁금한 게 있으시면 언제든 말해주세요!"
16002-1261 = "궁금증 해결은 언제나 코토리와 함께!"
16002-1262 = "고맙습니다, 선생님! 감동했습니다!"
16002-1263 = "설마 이해해 주는 사람이 있을 줄은 몰랐는데!"
16002-1264 = "그러니 선생님께는 앞으로도 종종"
16002-1265 = "……종종 부탁드릴게요!"
16002-1266 = "선생님"
16002-1267 = "혹시 지금 시간 되시나요!"
16002-1268 = "아 별 건 아니고요"
16002-1269 = "아니 중요한 일이 맞긴 한데!"
16002-1270 = "아무튼……!"
16002-1271 = "그냥"
16002-1272 = "좀"
16002-1273 = "여쭤보고 싶은 게 있어서요!"
16002-1274 = "얼마든지"
16002-1275 = "설명이 아니라 질문을?"
16002-1276 = "오오오오오"
16002-1277 = "고맙습니다!"
16002-1278 = "역시 선생님이에요!"
16002-1279 = "아무리 저라도 궁금한 건 있으니까요."
16002-1280 = "그리고"
16002-1281 = "다른 사람도 아닌 선생님이니까요!"
16002-1282 = "ㅎㅎㅎ"
16002-1283 = "그럼 기다리고 있을게요!"
16002-1284 = "……"
16002-1285 = "아깐 감사했습니다!"
16002-1286 = "역시 선생님을 부른 게 정답이었어요!"
16002-1287 = "그분께는 제가 잘 설명해 드릴 수 있을 거 같아요! 걱정하지 마세요!"
16002-1288 = "다행이구나."
16002-1289 = "어떤 내용이니?"
16002-1290 = "헤헤……"
16002-1291 = "그러게요. 정말 다행이에요."
16002-1292 = "정말 감사합니다. 선생님!"
16002-1293 = "……"
16002-1294 = "ㅂ"
16002-1295 = "비ㅁㅣㄹ입ㅂ니다"
16002-1296 = "비밀입니다;;;"
16002-1297 = "그럼!"
16002-160020010 = "궁금한 게 있으시면 언제든 말해주세요!"
16002-160020020 = "궁금증 해결은 언제나 코토리와 함께!"
16002-160020030 = "……음."
16002-160020040 = "뭔가 늘 똑같은 메시지를 보내는 느낌이 드는데……."
16002-160020050 = "혹시 해서 여쭤보는 거지만, 스팸 등록이라던가……. 그런 걸 당한 건 아니겠죠, 저?"
16002-160020060 = "간혹 당하는 경우가 있어서……."
16002-160020070 = "아냐. 마침 물어보고 싶은 게 있었어."
16002-160020080 = "타이밍이 좋네요. 질문이 있습니다!"
16002-160020090 = "……"
16002-160020100 = "헉."
16002-160020110 = "……!!!!!!!! 정말인가요!!"
16002-160020120 = "좋아요!! 좋습니다. 뭐든지 대답해 드릴게요!"
16002-160020130 = "코토리! 지금 바로 갑니다!! >_<!!"
16002-160020140 = "죄"
16002-160020150 = "죄송합니다, 선생님……. 너무 생각지도 못 한 질문이라 저도 모르게 그만……."
16002-160020160 = "정말로, 그런 종류의 질문이실 거라곤 상상도 못 했어서……."
16002-160020170 = "그러고 보니 전에도 이런 일이 있었던 것 같은데……."
16002-160020180 = "음. 으음……."
16002-160020190 = "그……."
16002-160020200 = "다음에"
16002-160020210 = "다음에 혹시 괜찮으시면, 언젠가 저도 준비가 됐을 때!"
16002-160020220 = "다시 부탁드리겠습니다……."
16002-160020230 = "그땐 꼭"
16002-160020240 = "잘 대답해 보겠습니다……."
16002-160020250 = "후우!"
16002-160020260 = "하마터면 큰일 날 뻔했네요!"
16002-160020270 = "코토리?"
16002-160020280 = "무슨 일이야?"
16002-160020290 = "아, 별일은 아니었습니다!"
16002-160020300 = "그저 안경이 조금 부러져서, 수리를 맡겼었거든요."
16002-160020310 = "하루 정도는 없어도 괜찮겠지 싶었는데"
16002-160020320 = "제 시력으로는 어림도 없었네요! 하하!!"

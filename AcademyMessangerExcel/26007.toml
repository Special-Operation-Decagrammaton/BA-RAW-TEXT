[translation]
26007-260070010 = "คุณครูคะ!!"
26007-260070020 = "ตอนที่เก็บกวาดห้องเก็บของ ฉันเจอ\nของหลายอย่างเลยค่ะ... ที่นี่สุดยอดมากๆ เลยค่ะ!"
26007-260070030 = "มีแต่ของที่สุดยอดเต็มไปหมดเลยค่ะ แถมอยู่ในสภาพสมบูรณ์อีกด้วย!"
26007-260070040 = "ถ้าเก็บไปขายที่ร้านขายของเก่าละก็..."
26007-260070050 = "ไม่สิ"
26007-260070060 = "ถ้าขายให้ร้านขายของเก่าก็น่าเสียดาย แต่ถ้าเอามาซ่อมดีๆ แล้วค่อยขายละก็..."
26007-260070070 = "หืม? หมายถึงอะไรเหรอ?"
26007-260070080 = "ใจเย็นๆ ก่อนนะ อายาเนะ"
26007-260070090 = "อา..."
26007-260070100 = "ขอโทษด้วยค่ะ ฉันตื่นเต้น อยากเล่าให้\nฟังไปหน่อย..."
26007-260070110 = "ถ้าจะขอให้คุณครูมาดูก็คงจะรบกวนเกิน\nไป ฉันจะถ่ายรูปส่งไปให้ค่ะ"
26007-260070120 = "ไม่เป็นไร เดี๋ยวครูไปหานะ"
26007-260070130 = "แล้วตอนนี้อยู่ไหนล่ะ?"
26007-260070140 = "เอ่อ..."
26007-260070150 = "เรื่องนั้น..."
26007-260070160 = "คือว่า..."
26007-260070170 = "ถึงจะเจอของดีๆ เยอะมาก แต่ของที่\nเอาไปได้จริงๆ ก็มีไม่กี่อย่างเองค่ะ"
26007-260070180 = "เพราะส่วนใหญ่เป็นของชิ้นใหญ่...\nสุดท้ายก็รู้สึกเหมือนกลับมาที่เดิม"
26007-260070190 = "ปกติแล้วการเที่ยวเล่นก็เป็นแบบนี้แหละ"
26007-260070200 = "แต่ว่าระหว่างนั้นก็ได้สนุกด้วย ก็น่าจะ\nโอเคนี่นา?"
26007-260070210 = "...!"
26007-260070220 = "ค่ะ"
26007-260070230 = "เป็นอย่างที่คุณครูพูดเลยค่ะ"
26007-260070240 = "กะะะะะะะะะะะะะะะะะะะะะะะ"
26007-260070250 = "อายาเนะ?"
26007-260070260 = "หืม?"
26007-260070270 = "ดาาาาาาาาาาาาาาาาา"
26007-260070280 = "อะไรน่ะ แป้นค้างเหรอ?"
26007-260070290 = "หรือว่านอนทับแป้นนะ?"
26007-260070300 = "ยออออออออออออออ"
26007-260070310 = "คุณครู"
26007-260070320 = "คือ..."
26007-260070330 = "ก็คือว่า..."
26007-260070340 = "เมื่อเช้า..."
26007-260070350 = "ครูไม่ได้บอกใครเลย"
26007-260070360 = "ก็มันเป็นฐานลับ... นี่นา"
26007-260070370 = "..."
26007-260070380 = "ค่ะ"
26007-260070390 = "ขอบคุณค่ะ..."
26007-260070400 = "คุณครู"
26007-260070410 = "ถ้าคุณครูไม่ว่าอะไร ฉันขอรบกวน\nคุณครูสักเรื่องได้มั้ยคะ...?"
26007-260070420 = "ได้เสมอเลย"
26007-260070430 = "เรื่องอะไรเหรอ?"
26007-260070440 = "คือว่าตอนนี้ฉันกำลังซ่อมเฮลิคอปเตอร์\nอยู่น่ะค่ะ"
26007-260070450 = "แล้วต้องซ่อมชิ้นส่วนมากกว่าที่คิดไว้\nเยอะเลยค่ะ"
26007-260070460 = "ไม่ใช่ของหนักหรอกค่ะ คือฉันลืมสกรูที่\nซื้อมาไว้ในหลุมน่ะค่ะ"
26007-260070470 = "เข้าใจแล้ว ครูจะไปเดี๋ยวนี้"
26007-260070480 = "เดลิเวอรีแมนกำลังจะไปหานะ~"
26007-260070490 = "แหะๆๆ"
26007-260070500 = "ขอบคุณค่ะ ถ้างั้นขอรบกวนด้วยนะคะ!"
26007-260070510 = "ถึงฉันจะพูดไปอย่างมั่นใจก็เถอะค่ะ"
26007-260070520 = "พอมาคิดดูแล้ว การใช้เฮลิคอปเตอร์ก็\nไม่ใช่เรื่องง่ายๆ เลยค่ะ"
26007-260070530 = "สุดท้ายก็อาจจะไม่ต่างจากเมื่อก่อน\nก็ได้..."
26007-260070540 = "แต่สิ่งสำคัญคือเรามีมันอยู่นะ"
26007-260070550 = "ปกติแล้วท่าไม้ตายก็ไม่ได้ใช้บ่อยๆ หรอก"
26007-260070560 = "งะ...งั้นเหรอคะ?"
26007-260070570 = "แหะๆๆ..."
26007-260070580 = "ขอบคุณนะคะ คุณครู"

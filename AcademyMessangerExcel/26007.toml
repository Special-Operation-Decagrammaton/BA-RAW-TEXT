[translation]
26007-260070010 = "선생님!!"
26007-260070020 = "창고를 정리하다가 여러 가지를 발견했는데……. 여긴 정말 엄청난 곳이에요!"
26007-260070030 = "어마어마한 것들이 잔뜩 있어요! 그것도 하나같이 온전한 상태로!"
26007-260070040 = "전부 주워다 고철상에 팔면"
26007-260070050 = "아니"
26007-260070060 = "주워서 파는 건 너무 아까워요, 보수해서 제대로 팔면……."
26007-260070070 = "응? 무슨 이야기야?"
26007-260070080 = "우선 진정해, 아야네."
26007-260070090 = "아"
26007-260070100 = "죄송해요. 들떠서 공유하고 싶은 나머지……."
26007-260070110 = "직접 오시는 건 번거로우실 테니, 제가 찍어서 보내 드릴게요."
26007-260070120 = "아냐. 내가 갈게."
26007-260070130 = "그보다 지금 어디야?"
26007-260070140 = "어"
26007-260070150 = "그건……."
26007-260070160 = "뭔가……."
26007-260070170 = "막상 양껏 찾아냈지만 실제로 가져갈 수 있는 건 많지 않았네요."
26007-260070180 = "대부분 덩치가 커서……. 결국 제자리로 돌아온 느낌"
26007-260070190 = "원래 논다는 건 그런 거야."
26007-260070200 = "그렇지만 과정이 즐거웠으니 오케이잖아?"
26007-260070210 = "……!"
26007-260070220 = "네."
26007-260070230 = "그 말씀대로예요."
26007-260070240 = "ㅓㅓㅓㅓㅓㅓㅓㅓㅓㅁㄴㅁㅓㅓㅓㅓㅓㅓㅓㅓㅓㅓ"
26007-260070250 = "……아야네?"
26007-260070260 = "응?"
26007-260070270 = "ㅓㅓㅓㅓㅓㅓㅓ,,ㅡㅜㅡㅓㅓㅓㅓㅓㅓㅓㅓㅓㅓㅓㅓ"
26007-260070280 = "뭐야, 이거. 오류인가?"
26007-260070290 = "잠결에 잘못 친 건가……?"
26007-260070300 = "ㅗㅗㅗㅗㅣㅣㅣㅣㅣㅣㅣㅣㅣㅣ"
26007-260070310 = "선생님"
26007-260070320 = "그"
26007-260070330 = "다름이 아니라"
26007-260070340 = "아침에"
26007-260070350 = "아무에게도 말 안 했어."
26007-260070360 = "비밀 기지……니까."
26007-260070370 = "……."
26007-260070380 = "네"
26007-260070390 = "감사합니다……."
26007-260070400 = "선생님"
26007-260070410 = "혹시 괜찮으시면, 한 가지 부탁드려도 괜찮을까요……?"
26007-260070420 = "물론이지."
26007-260070430 = "무슨 부탁?"
26007-260070440 = "아, 지금 한창 헬기 보수작업을 준비 중인데"
26007-260070450 = "생각했던 것보다 부품이 훨씬 더 많이 필요할 거 같아서요"
26007-260070460 = "무거운 건 아니고……. 미리 싸둔 나사를 홀에 두고 왔거든요."
26007-260070470 = "알았어. 지금 갈게."
26007-260070480 = "배달맨이 출발합니다~."
26007-260070490 = "아하하하……."
26007-260070500 = "감사합니다. 기다리고 있을게요!"
26007-260070510 = "뭔가 자신 있게 말씀드렸지만"
26007-260070520 = "생각해 보니 헬기를 쓴다는 게 그리 쉬운 문제가 아니네요"
26007-260070530 = "결국 예전과 별 차이는 없을지도……."
26007-260070540 = "그래도 있다는 건 중요하지"
26007-260070550 = "필살기는 원래 자주 쓰는 게 아니니까"
26007-260070560 = "그, 그런가요?"
26007-260070570 = "아하하……."
26007-260070580 = "감사합니다, 선생님."

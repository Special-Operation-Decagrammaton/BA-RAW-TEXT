[translation]
26007-260070010 = "老師！請聽我說！！"
26007-260070020 = "整理倉庫的時候，發現了各式各樣的東西……真是太棒了！"
26007-260070030 = "很多挖出來的東西……都和新的一樣！"
26007-260070040 = "如果能全部拿去回收商店的話該有多好……"
26007-260070050 = "啊啊，但是，就那樣賣掉的話太可惜了"
26007-260070060 = "好好修理一下再賣的話，就能夠……"
26007-260070070 = "在，在說什麼？"
26007-260070080 = "綾音，先冷靜下來"
26007-260070090 = "啊……！"
26007-260070100 = "對不起。太急著分享這份心情了……"
26007-260070110 = "親自來的話很麻煩，我發照片給您看吧"
26007-260070120 = "沒關係，我會過去唷"
26007-260070130 = "你現在在哪裡？"
26007-260070140 = "啊……"
26007-260070150 = "那個……"
26007-260070160 = "今天辛苦了"
26007-260070170 = "雖然找到了很多寶物，但實際能帶回去的東西不多呢"
26007-260070180 = "大部分都太大了……結果又回到原點呢……"
26007-260070190 = "不會，我覺得「玩」就是這樣唷"
26007-260070200 = "但是很開心，不是很好嗎？"
26007-260070210 = "……！"
26007-260070220 = "是"
26007-260070230 = "正如您說的。非常感謝"
26007-260070240 = "ｊｊｊｊｊｊｊｍㄙｍｊｊｊｊｊｊｊｊｊｊ"
26007-260070250 = "……綾音？"
26007-260070260 = "怎麼了？"
26007-260070270 = "ｊｊｊｊｊｊｊ，，ㄧㄨㄧｊｊｊｊｊｊｊｊｊｊ"
26007-260070280 = "這是怎麼了……"
26007-260070290 = "睡迷糊了……？"
26007-260070300 = "んんんんｌｌｌｌｌｌｌｌｌｌ"
26007-260070310 = "老師……"
26007-260070320 = "那個，這個……"
26007-260070330 = "其實呢"
26007-260070340 = "今天早上的事……"
26007-260070350 = "我沒有告訴任何人唷"
26007-260070360 = "因為是祕密基地嘛"
26007-260070370 = "……"
26007-260070380 = "好的"
26007-260070390 = "非常感謝……"
26007-260070400 = "老師，如果可以的話……"
26007-260070410 = "可以拜託你一件事嗎……？"
26007-260070420 = "當然，沒問題唷"
26007-260070430 = "怎麼了？"
26007-260070440 = "現在正好在進行直升機的維修作業"
26007-260070450 = "但需要的零件似乎比預期中還要多很多……"
26007-260070460 = "不是什麼重的東西……我把事先準備好的螺絲放在了大廳……"
26007-260070470 = "我知道了，現在過去唷。用衝的"
26007-260070480 = "外送員，出發了──"
26007-260070490 = "啊哈哈……"
26007-260070500 = "非常感謝。恭候您的光臨！"
26007-260070510 = "雖然說了能隨時呼叫我"
26007-260070520 = "但仔細想想，要飛直升機也不是那麼簡單的……"
26007-260070530 = "結果，可能還是跟之前沒什麼變化……"
26007-260070540 = "但是，有直升機還是很重要的"
26007-260070550 = "畢竟必殺技也不是能經常使用的"
26007-260070560 = "是，是這樣嗎？"
26007-260070570 = "啊哈哈……"
26007-260070580 = "非常謝謝，老師"

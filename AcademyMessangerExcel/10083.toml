10083-100830270 = "That should not have been sent."
10083-100830280 = "Sensei, regarding today's assignment..."
10083-100830290 = "There is an urgent matter I must attend to."
10083-100830300 = "I regret that I must reschedule our meeting."
10083-100830310 = "It's no problem, but..."
10083-100830320 = "Okwy"
10083-100830330 = "Okay"
10083-100830340 = "Thank you for your understanding."
10083-100830350 = "I read a book that was rather stimulating."
10083-100830360 = "I'd like to show it to you, Sensei."
10083-100830370 = "...Kikyou?"
10083-100830380 = "I was expecting a rather more enthused reaction."
10083-100830390 = "It's just that this is the first time you've texted me for something outside of work."

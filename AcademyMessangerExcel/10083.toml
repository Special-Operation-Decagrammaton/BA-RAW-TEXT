10083-100830120 = "your current location should be the Schale Executive Office."
10083-100830130 = "Please confirm."
10083-100830140 = "How do you know where I am...?"
10083-100830150 = "Thank you for the confirmation. "
10083-100830160 = "I will arrive shortly."
10083-100830170 = "Shortly? As in, right now?!"
10083-100830180 = "Hellooo? Kikyou! Are you there?"
10083-100830190 = "I allowed you a pass today, Sensei."
10083-100830200 = "Please rest assured there will not be a second time."
10083-100830210 = "I will contact you again."
10083-100830220 = "I'll be waiting for your MomoTalk."
10083-100830230 = "...Okay."
10083-100830240 = "Sens13r egqardng t0day's asngmnet"

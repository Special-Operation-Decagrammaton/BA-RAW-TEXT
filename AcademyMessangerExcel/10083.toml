[translation]
10083-100830010 = "슬슬 백화요란의 업무가 정상 궤도에 오르고 있어. "
10083-100830020 = "그러니 더 늦기 전에 샬레와 백화요란 간의 업무 협력에 대해 논하고 싶은데."
10083-100830030 = "시간 괜찮을까?"
10083-100830040 = "아, 시간이라면 괜찮아."
10083-100830050 = "그래."
10083-100830060 = "그렇다면 백화요란의 조정실에서 이야기를 나눴으면 해."
10083-100830070 = "기다리고 있을게."
10083-100830080 = "선생님."
10083-100830090 = "지금 위치는?"
10083-100830100 = "응? 키쿄? 갑자기 그런 건 왜……."
10083-100830110 = "내가 알고 있는 일정이 바뀌지 않았다면"
10083-100830120 = "지금쯤 샬레 집무실에 있을 것으로 알고 있는데."
10083-100830130 = "이 정보에 변동은 없을까?"
10083-100830140 = "일단 샬레에 있긴 한데요…."
10083-100830150 = "그래. 확인 고마워. "
10083-100830160 = "그럼 지금 찾아갈게."
10083-100830170 = "어? 지금……? 바로?"
10083-100830180 = "저기. 키쿄 양? 저기요?!"
10083-100830190 = "오늘은 그렇게 선생님의 말에 넘어갔지만."
10083-100830200 = "두 번은 없을 거야."
10083-100830210 = "다음에 또다시 연락하겠어."
10083-100830220 = "응. 기대하고 있을게."
10083-100830230 = "…그래."
10083-100830240 = "선생ㄴㅣㅁ 오ㄴㅡㅇㅓㅂ무 약속 마ㄹ인데"
10083-100830250 = "어라. 키쿄…?"
10083-100830260 = "아니, 방금 건 실수."
10083-100830270 = "잘못 보낸 거야."
10083-100830280 = "선생님. 오늘 업무 약속과 관련해서 말인데."
10083-100830290 = "급한 일정이 생겨서…."
10083-100830300 = "다른 날로 바꿨으면 하는데, 괜찮을까?"
10083-100830310 = "응, 신경 쓰지 마."
10083-100830320 = "그ㄹ ㅐ"
10083-100830330 = "그래"
10083-100830340 = "그럼 나중에 봐."
10083-100830350 = "얼마 전에 읽었던 책이, 제법 재미있었어."
10083-100830360 = "괜찮다면 선생님에게도 추천해줄까 해."
10083-100830370 = "어…?"
10083-100830380 = "뭐야? 왜 그런 미적지근한 반응이야?"
10083-100830390 = "아니, 키쿄가 업무 연락 외의 문자를 보내는 게 처음이라."
10083-100830400 = "살짝 놀랐다고 할까."
10083-100830410 = "그런 건 아무래도 좋잖아."
10083-100830420 = "나라도 이 정도의 이야기는 해."
10083-100830430 = "…역시 평소 하지 않던 일은 하는 게 아니었어."
10083-100830440 = "이것도 전부 당신 때문이니까."
10083-100830450 = "그렇다면 영광인데."
10083-100830460 = "됐고"
10083-100830470 = "괜찮다면 오늘, 백화요란의 조정실을 방문해 줘."
10083-100830480 = "책, 빌려줄 테니까."
10083-100830490 = "응, 바로 갈게."

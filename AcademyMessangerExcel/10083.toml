[translation]
10083-100830010 = "งานของเฮียกกะเรียวรันค่อยๆ กลับมา\nเป็นปกติแล้ว "
10083-100830020 = "ฉันเลยอยากหารือเกี่ยวกับความร่วมมือ\nระหว่างชาเล่ต์กับเฮียกกะเรียวรัน\nก่อนที่จะสายไปกว่านี้"
10083-100830030 = "พอมีเวลามั้ย?"
10083-100830040 = "อื้ม มีให้อยู่แล้ว"
10083-100830050 = "ก็ดี"
10083-100830060 = "ฉันอยากให้มาคุยกันที่ห้องไกล่เกลี่ย\nของเฮียกกะเรียวรัน"
10083-100830070 = "แล้วฉันจะรอนะ"
10083-100830080 = "คุณครู"
10083-100830090 = "ตอนนี้อยู่ไหนน่ะ?"
10083-100830100 = "หืม? คิเคียว? ทำไมจู่ๆ ก็ถามแบบนั้น..."
10083-100830110 = "ถ้าเป็นไปตามตารางงานที่ฉันรู้"
10083-100830120 = "ตอนนี้ก็คงอยู่ที่สำนักงานชาเล่ต์"
10083-100830130 = "ว่าแต่มีการเปลี่ยนตารางงานอะไร\nรึเปล่า?"
10083-100830140 = "ไม่มีนะ ตอนนี้ครูอยู่ที่ชาเล่ต์..."
10083-100830150 = "อืม ขอบคุณที่คอนเฟิร์มนะ "
10083-100830160 = "งั้นฉันจะไปหาตอนนี้เลย"
10083-100830170 = "หืม? ตอนนี้...? เลยเหรอ?"
10083-100830180 = "เอ่อ คิเคียว? เดี๋ยวสิ?!"
10083-100830190 = "ถึงวันนี้ฉันจะเออออให้กับคำพูดของ\nคุณครู"
10083-100830200 = "แต่ครั้งต่อไปไม่มีแล้วนะ"
10083-100830210 = "ไว้ฉันจะติดต่อมาใหม่"
10083-100830220 = "อื้ม แล้วครูจะตั้งตารอนะ"
10083-100830230 = "อืม..."
10083-100830240 = "คุรครุที่เรานัดกัยวันนีั..."
10083-100830250 = "หืม? คิเคียว?"
10083-100830260 = "อ๊ะ ฉันพิมพ์ผิด"
10083-100830270 = "ฉันพิมพ์ผิดๆๆ"
10083-100830280 = "คุณครู ที่นัดกันเรื่องงานวันนี้น่ะ"
10083-100830290 = "พอดีว่าฉันมีเรื่องด่วน..."
10083-100830300 = "ขอเลื่อนนัดเป็นวันอื่นได้มั้ย?"
10083-100830310 = "อื้ม ไม่เป็นไร"
10083-100830320 = "โอเ...ค"
10083-100830330 = "โอเค"
10083-100830340 = "งั้นไว้เจอคราวหน้านะ"
10083-100830350 = "หนังสือที่ฉันอ่านเมื่อไม่นานมานี้น่ะ\nสนุกใช้ได้เลย"
10083-100830360 = "ถ้าไม่ว่าอะไร ฉันอยากแนะนำเล่มนี้ให้\nคุณครูบ้าง"
10083-100830370 = "หืม...?"
10083-100830380 = "อะไรกัน? ทำไมปฏิกิริยาถึงดูคลุมเครือ\nแบบนี้?"
10083-100830390 = "เปล่าๆ ก็นี่เป็นครั้งแรกที่คิเคียวติดต่อ\nมาด้วยเรื่องอื่นที่ไม่ใช่เรื่องงาน"
10083-100830400 = "ครูตกใจนิดหน่อยน่ะ"
10083-100830410 = "ไม่เห็นจะเป็นอะไรเลย"
10083-100830420 = "เห็นฉันอย่างนี้ก็คุยเรื่องอื่นได้นะ"
10083-100830430 = "หรือฉันไม่ควรทำเรื่องที่ไม่ค่อยทำ\nในชีวิตประจำวัน"
10083-100830440 = "แต่ทั้งหมดนี้เป็นเพราะคุณเลยนะ"
10083-100830450 = "งั้นก็ถือว่าเป็นเกียรติเลย"
10083-100830460 = "เอาเถอะ"
10083-100830470 = "ถ้าไม่ติดธุระอะไร วันนี้มาที่ห้อง\nไกล่เกลี่ยเฮียกกะเรียวรันหน่อยนะ"
10083-100830480 = "แล้วฉันจะให้ยืมหนังสือ"
10083-100830490 = "อื้ม ครูจะไปเดี๋ยวนี้เลย"

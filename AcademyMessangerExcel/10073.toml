[translation]
10073-100730010 = "으윽"
10073-100730020 = "하아……. 정말 힘드네요"
10073-100730030 = "이런 복장. 이런 장소."
10073-100730040 = "무슨 일 있어?"
10073-100730050 = "우이……?"
10073-100730060 = "아뇨"
10073-100730070 = "아무 일도 없어요"
10073-100730080 = "문제가 있다면 제 쪽이니까요"
10073-100730090 = "음"
10073-100730100 = "죄송해요. 역시 계속해서 좋을 이야긴 아니네요. 이건 여기까지"
10073-100730110 = "아 물론 선생님 이야기는 아니에요."
10073-100730120 = "혹시나 해서 말씀드립니다"
10073-100730130 = "말씀을 듣고 나니, 조금은 이런저런 생각도 하게 됐어요"
10073-100730140 = "뭐 약속까지는 아니지만"
10073-100730150 = "뭔가 찾거나 보게 되면"
10073-100730160 = "말씀드릴게요."
10073-100730170 = "이왕 여기까지 왔으니까요."
10073-100730180 = "후후……."
10073-100730190 = "조금 마음이 놓이네요"
10073-100730200 = "꽤 괜찮은 장소를 찾았어요……. 훌륭합니다."
10073-100730210 = "마음이 놓여?"
10073-100730220 = "괜찮은 장소?"
10073-100730230 = "네. 이 정도면 훌륭해요. 완벽은 아니지만."
10073-100730240 = "인간은 늘 방법을 찾아냅니다. 저 또한, 마찬가지죠."
10073-100730250 = "음"
10073-100730260 = "뭐 다른 분도 아니고 선생님이라면……. 괜찮을지도……."
10073-100730270 = "한 번 보시겠어요?"
10073-100730280 = "그"
10073-100730290 = "선생님"
10073-100730300 = "정말로 죄송합니다."
10073-100730310 = "생각해 보니, 그 잔……."
10073-100730320 = "그……. 제가 마시던 거라……."
10073-100730330 = "그게……."
10073-100730340 = "……잔?"
10073-100730350 = "응? 무슨 이야기야?"
10073-100730360 = "……."
10073-100730370 = "아닙니다."
10073-100730380 = "역시"
10073-100730390 = "아무 생각 없으셨네요."
10073-100730400 = "선생님"
10073-100730410 = "혹시 시간 좀 괜찮으실까요?"
10073-100730420 = "꽤 늦은 시간이긴 하지만……."
10073-100730430 = "아"
10073-100730440 = "역시 아니에요. 괜찮습니다……."
10073-100730450 = "괜찮은데? 지금 어디?"
10073-100730460 = "우이가 부르면 가야지."
10073-100730470 = "흐"
10073-100730480 = "뭔가 죄송하네요"
10073-100730490 = "눈치 드리려던 게 아닌데……."
10073-100730500 = "아무튼 네"
10073-100730510 = "기다리고 있겠습니다……."
10073-100730520 = "음"
10073-100730530 = "아까는 무슨 배짱으로 그런 소리들을 했나 싶은데"
10073-100730540 = "돌아와서 생각해 보니"
10073-100730550 = "제정신이 아니었던 것 같네요"
10073-100730560 = "잊어 주셨으면 해요"
10073-100730570 = "그럴 수도 있지, 여름밤인데"
10073-100730580 = "그럴 땐 제정신이면 재미없는 법이야"
10073-100730590 = "그렇게 나오시는군요"
10073-100730600 = "역시 선생님한테는"
10073-100730610 = "단맛을 좀 더 줄여도 될 거 같"
10073-100730620 = "아니"
10073-100730630 = "아예 무설탕으로 가야 할지도요."

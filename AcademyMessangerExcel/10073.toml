[translation]
10073-100730010 = "อึก..."
10073-100730020 = "เฮ้อ... ลำบากจริงๆ เลยค่ะ"
10073-100730030 = "ทั้งชุดแบบนี้ แล้วก็สถานที่แบบนี้..."
10073-100730040 = "มีอะไรเหรอ?"
10073-100730050 = "เป็นอะไรรึเปล่า อุย?"
10073-100730060 = "เปล่าหรอกค่ะ"
10073-100730070 = "ไม่มีอะไรค่ะ"
10073-100730080 = "ถ้าจะมีปัญหาอะไรละก็ คงเป็นเพราะฉัน\nเองซะมากกว่าค่ะ"
10073-100730090 = "อืม"
10073-100730100 = "ขอโทษนะคะ ถ้าพูดต่อคงไม่ใช่\nเรื่องดีแน่ เพราะงั้นฉันไม่พูดดีกว่าค่ะ"
10073-100730110 = "อ๊ะ ที่พูดนี่ไม่ได้หมายถึงคุณครูนะคะ"
10073-100730120 = "แค่บอกไว้ก่อน เผื่อเข้าใจผิดน่ะค่ะ"
10073-100730130 = "พอได้คุยกับคุณครูแล้ว ฉันก็คิดอะไร\nหลายๆ อย่างเลยค่ะ"
10073-100730140 = "อาจจะเรียกว่าสัญญาไม่ได้เต็มปาก..."
10073-100730150 = "แต่ถ้าฉันเห็น หรือว่าหาอะไรเจอละก็"
10073-100730160 = "ฉันจะบอกคุณครูก็แล้วกันค่ะ"
10073-100730170 = "ไหนๆ ก็มาถึงนี่แล้วนี่คะ"
10073-100730180 = "ฮิฮิ..."
10073-100730190 = "ฉันรู้สึกดีขึ้นเยอะแล้วละค่ะ"
10073-100730200 = "ตอนนี้เจอสถานที่เหมาะๆ แล้ว...\nเป็นที่ที่ดีมากๆ เลยค่ะ"
10073-100730210 = "ค่อยยังชั่วหน่อย"
10073-100730220 = "สถานที่เหมาะๆ เหรอ?"
10073-100730230 = "ค่ะ ถึงอาจพูดว่าสมบูรณ์แบบไม่ได้\nแต่สำหรับฉันก็ถือว่าดีมากเลย\nแหละค่ะ"
10073-100730240 = "มนุษย์เราเป็นสิ่งมีชีวิตที่ปรับตัวเก่ง\nฉันเองก็คงเป็นแบบนั้นเหมือนกันค่ะ"
10073-100730250 = "อืม"
10073-100730260 = "ถ้าเป็นคุณครูคงไม่เป็นไร..."
10073-100730270 = "คุณครูอยากลองมาดูที่นี่มั้ยคะ?"
10073-100730280 = "คือ..."
10073-100730290 = "คุณครู"
10073-100730300 = "ฉันขอโทษจริงๆ ค่ะ..."
10073-100730310 = "ฉันเพิ่งคิดได้ว่าแก้วกาแฟนั้น..."
10073-100730320 = "มัน... เป็นแก้วที่ฉันดื่มไปแล้ว..."
10073-100730330 = "คือว่ามัน..."
10073-100730340 = "แก้วเหรอ...?"
10073-100730350 = "หืม? หมายถึงอะไรน่ะ?"
10073-100730360 = "..."
10073-100730370 = "ไม่มีอะไรค่ะ"
10073-100730380 = "คิดแล้วเชียว..."
10073-100730390 = "คุณครูไม่ได้คิดอะไรเลยจริงๆ\nด้วยสินะคะ"
10073-100730400 = "คุณครู"
10073-100730410 = "คุณครูพอมีเวลารึเปล่าคะ?"
10073-100730420 = "ฉันรู้ว่ามันดึกมากแล้ว แต่ว่า..."
10073-100730430 = "อ๊ะ"
10073-100730440 = "ไม่มีอะไรแล้วค่ะ ไม่เป็นไรค่ะ..."
10073-100730450 = "ครูว่างนะ ตอนนี้อยู่ไหนล่ะ?"
10073-100730460 = "อุยเรียกทั้งที ครูก็ต้องไปหาสิ"
10073-100730470 = "อืม..."
10073-100730480 = "รู้สึกผิดจังเลยค่ะ"
10073-100730490 = "ฉันไม่ได้อยากรบกวนคุณครูแท้ๆ..."
10073-100730500 = "แต่ก็เอาเป็นว่า... ค่ะ"
10073-100730510 = "ฉันจะรอนะคะ..."
10073-100730520 = "อืม"
10073-100730530 = "เมื่อกี้ฉันไม่รู้ว่าไปเอาความกล้า\nมาจากไหนถึงพูดแบบนั้นออกไป"
10073-100730540 = "พอกลับมาย้อนคิดดูแล้ว..."
10073-100730550 = "ดูเหมือนฉันจะไม่ค่อย\nมีสติครบถ้วนเท่าไรเลยค่ะ"
10073-100730560 = "เพราะงั้นช่วยลืมไปด้วยเถอะนะคะ"
10073-100730570 = "คนเราก็มีมุมแบบนั้นกันบ้างแหละ\nค่ำคืนในทะเลฤดูร้อนทั้งที"
10073-100730580 = "ถ้าตอนนั้นมีสติครบถ้วนดี\nก็คงไม่สนุกน่ะสิ"
10073-100730590 = "คิดแบบนั้นไปซะได้นะคะ"
10073-100730600 = "สมกับที่เป็นคุณครูจริงๆ"
10073-100730610 = "ฉันควรลดปริมาณความหวาน\nลงหน่อยดีกว่า..."
10073-100730620 = "ไม่สิ"
10073-100730630 = "เอาเป็นไม่หวานไปเลยน่าจะดีกว่านะคะ"

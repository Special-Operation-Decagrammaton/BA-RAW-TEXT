[translation]
10112-101120010 = "主人常搭公車嗎？"
10112-101120020 = "普普通通吧？"
10112-101120030 = "我也是我也是"
10112-101120040 = "上學和放學的時候都會搭"
10112-101120050 = "車上的人總是很多"
10112-101120060 = "畢竟……"
10112-101120070 = "那種時段通常都……"
10112-101120080 = "嗯嗯"
10112-101120090 = "果然主人也懂那種感覺"
10112-101120100 = "啊"
10112-101120110 = "下車的時候忘記說了"
10112-101120120 = "老師的襯衫上，好像沾到我的化妝品了"
10112-101120130 = "啊，真的耶"
10112-101120140 = "果然太靠近了嗎……"
10112-101120150 = "抱歉～是我靠太近了"
10112-101120160 = "那就讓明日奈來幫你洗吧"
10112-101120170 = "啊，不過"
10112-101120180 = "那樣的話就得穿女僕裝了呢"
10112-101120190 = "嗯……"
10112-101120200 = "話說老師喜歡制服還是女僕裝呢？"
10112-101120210 = "我不明白你的意思……"
10112-101120220 = "快到午餐時間了"
10112-101120230 = "肚子也有點餓了"
10112-101120240 = "我隨時都很餓……"
10112-101120250 = "啊哈哈"
10112-101120260 = "什麼啦"
10112-101120270 = "明日奈午餐吃什麼呢？"
10112-101120280 = "嗯～這個嘛"
10112-101120290 = "目前還在考慮！"
10112-101120300 = "話說回來"
10112-101120310 = "最近好像總是在各種地方"
10112-101120320 = "遇到老師呢？"
10112-101120330 = "是啊"
10112-101120340 = "無法預測會在哪裡碰見呢"
10112-101120350 = "啊哈哈"
10112-101120360 = "因為是意想不到的相遇"
10112-101120370 = "所以更有趣了～！"
10112-101120380 = "我現在在山丘公園"
10112-101120390 = "發現了一朵很像老師的雲"
10112-101120400 = "啊哈哈"
10112-101120410 = "明日奈在散步嗎？"
10112-101120420 = "嗯嗯"
10112-101120430 = "啊"
10112-101120440 = "明日奈，你還好嗎？"
10112-101120450 = "明日奈？"
10112-101120460 = "老師～！"
10112-101120470 = "謝謝你今天來找明日奈"
10112-101120480 = "也謝謝你幫我找到手機"
10112-101120490 = "嗯，能這樣用MomoTalk聊天真是太好了"
10112-101120500 = "沒錯沒錯"
10112-101120510 = "我之後會注意別再弄丟了"
10112-101120520 = "畢竟是老師和我一起找回來的手機"
10112-101120530 = "一回到家就好想睡哦"
10112-101120540 = "畢竟今天很辛苦嘛"
10112-101120550 = "晚安，明日奈"
10112-101120560 = "嗯！嘿嘿"
10112-101120570 = "老師也晚安～！！"

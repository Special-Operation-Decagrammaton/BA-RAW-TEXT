[translation]
20016-200160010 = "先生、今はシャーレにいるんですか？"
20016-200160020 = "うん、そうだよ。どうしたの？"
20016-200160030 = "そうですか"
20016-200160040 = "……イロハ？"
20016-200160050 = "それでは今日もサボりに"
20016-200160060 = "ではなく、お仕事のことでお伺いしますね"
20016-200160070 = "……イロハさん、隠す気ないですよね？"
20016-200160080 = "先生、今日もお仕事でしょうか？"
20016-200160090 = "膨大な量の作業が……"
20016-200160100 = "まあ、お気持ちは理解できます"
20016-200160110 = "片付けたと思ったらまた出てくるわ、誰かがやるかと思いきや誰も手を付けないわ"
20016-200160120 = "大変ですよね、中間管理職"
20016-200160130 = "ところで"
20016-200160140 = "今日は苦いのが飲みたい気分ですね"
20016-200160150 = "濃い目のアメリカーノでお願いします"
20016-200160160 = "イロハ、上にあるメッセージ見てくれた？"
20016-200160170 = "はい、もちろん"
20016-200160180 = "それではまた後で"
20016-200160190 = "文脈が読めてないのは私なのかな……"
20016-200160200 = "やってられません"
20016-200160210 = "イロハ、どうしたの？"
20016-200160220 = "いえ、大したことではありませんが……"
20016-200160230 = "なぜ人はこんなに忙しく動かねばならないのだろう、と……"
20016-200160240 = "先生、我々はここまでして生きる意味があるのでしょうか？"
20016-200160250 = "話が急にすごい重くなったけど、あると思うよ！？"
20016-200160260 = "めんどくさいですが、やるしかありませんね……"
20016-200160270 = "もう文字を打つのもめんどくさいです"
20016-200160280 = "が、頑張って……"

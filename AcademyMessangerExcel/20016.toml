[translation]
20016-200160010 = "คุณครู อยู่ที่ชาเล่ต์รึเปล่าคะ?"
20016-200160020 = "อ๊ะ อิโรฮะ\nใช่แล้วละ มีอะไรเหรอ"
20016-200160030 = "โอเคค่ะ"
20016-200160040 = "หืม...? อิโรฮะ?"
20016-200160050 = "ถ้างั้นวันนี้ฉันก็จะขอโดด..."
20016-200160060 = "เปล่าค่ะ หมายถึงจะไปพบคุณครูเรื่องงานค่ะ"
20016-200160070 = "โดดงั้นเหรอ...? "
20016-200160080 = "คุณครูคะ วันนี้ตารางงานเป็นยังไงบ้างคะ?"
20016-200160090 = "วันนี้ยุ่งตาเหลือกเลย..."
20016-200160100 = "อา... ฉันเข้าใจความรู้สึกนั้นดีเลยค่ะ"
20016-200160110 = "พอคิดว่าทำงานเสร็จหมดแล้ว แต่พอ\nคลานกลับขึ้นไปบนเตียงกลับนึกขึ้น\nได้ว่ามีงานที่ยังเหลืออยู่อีก..."
20016-200160120 = "งานมันก็เหมือนเวรกรรม ที่หนีเท่าไร\nก็หนีไม่พ้นเลยค่ะ ชีวิตของคนประสาน\nงานคงเป็นแบบนี้กันหมดเลยสินะคะ"
20016-200160130 = "แต่ว่า..."
20016-200160140 = "กาแฟวันนี้รบกวนขอเป็นอเมริกาโน่เข้มๆ\nเลยนะคะ"
20016-200160150 = "ไม่รู้ทำไมวันนี้ถึงอยากกินอะไรขมๆ ขึ้น\nมาค่ะ"
20016-200160160 = "อิโรฮะ ได้อ่านข้อความ\nที่ครูบอกว่ายุ่งมั้ย..."
20016-200160170 = "คะ? ฉันอ่านแล้วค่ะ"
20016-200160180 = "แต่เดี๋ยวฉันจะไปพบคุณครูนะคะ"
20016-200160190 = "พูดไม่ออกเลยแฮะ..."
20016-200160200 = "เฮ้อ... น่ารำคาญจริงๆ"
20016-200160210 = "เกิดอะไรขึ้นเหรอ อิโรฮะ?"
20016-200160220 = "เปล่าค่ะ ไม่มีอะไรหรอกค่ะ ก็แค่..."
20016-200160230 = "จู่ๆ ฉันก็คิดขึ้นมาว่า \"ทำไมคนเราจะต้อง\nทำงานเพื่อให้มีชีวิตรอดกันด้วย?\" น่ะค่ะ"
20016-200160240 = "คุณครู เราทำงานหนักแทบตายแบบนี้\nไปเพื่ออะไรงั้นเหรอคะ?"
20016-200160250 = "จู่ๆ เรื่องคุยก็น่ากลัวขึ้นซะงั้น!\nแต่ว่าครูคิดว่ามันมีความหมายนะ"
20016-200160260 = "ถึงเราจะไม่อยากทำมันอะไรเลย\nแต่ก็คงไม่มีทางเลือกสินะคะ"
20016-200160270 = "เข้าใจแล้วค่ะ... ถึงจะน่ารำคาญสุดๆ ก็เถอะ"
20016-200160280 = "อะ...อื้อ สู้ๆ นะ"

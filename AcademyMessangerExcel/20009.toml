[translation]
20009-200090010 = "โรงเรียนช่วงสิ้นปีนี่วุ่นวายดีจริงๆ "
20009-200090020 = "แม้แต่ตัวเราที่มีพละกำลังเป็นเลิศดี\nกว่าคนทั่วไป ยังรู้สึกได้ถึงความเหนื่อยล้า\nที่สะสมจากการทำงานหนักอยู่เรื่อยๆ"
20009-200090030 = "เพราะงั้นวันหยุดสุดสัปดาห์นี้ เราเลยตัดสินใจจะพักจากภาระงาน และไปสนุกกับวันหยุดพักผ่อนฤดูหนาวของเรา!"
20009-200090040 = "หลังจากได้พักผ่อนอย่างเต็มที่ในรีสอร์ตสุดหรู ร่างกายก็คงจะฟื้นฟูกลับมามีเอเนอจี้เหมือนเดิม"
20009-200090050 = "ถ้าเป็นการพักผ่อน ปกติก็พักผ่อน\nอยู่แล้วไม่ใช่เหรอ?"
20009-200090060 = "หมายความว่ายังไงน่ะสหาย"
20009-200090070 = "การพักระหว่างทำงาน กับการหยุดพักผ่อนมันต่างกันงั้นเหรอ?"
20009-200090080 = "การพักงีบที่สำนักเลขาธิการไม่ได้ช่วยให้\nเราคลายความเหนื่อยล้าได้หมดหรอกนะ!"
20009-200090090 = "ดังนั้นในครั้งนี้ เราเลยเช่าเหมาออนเซ็นสุดหรู\nเพื่อที่จะได้ดื่มด่ำกับวันหยุดพักผ่อนอย่างเต็มที่\nยังไงล่ะ"
20009-200090100 = "ถ้าสหายรู้สึกเหนื่อยล่ะก็ ไปพักผ่อนใน\nวันหยุดฤดูหนาวกับเรามั้ย?"
20009-200090110 = "อืม... อือ..."
20009-200090120 = "ทำไมกัน? แผนการวันหยุดของเราน่าจะ\nสมบูรณ์แบบแล้วแท้ๆ..."
20009-200090130 = "ร่างกายของเรากลับรู้สึกหนักอึ้งเหมือนมี\nตุ้มเหล็กคล้องอยู่..."
20009-200090140 = "เพราะไม่เคยออกกำลังกายไงล่ะ"
20009-200090150 = "ปวดเมื่อยกล้ามเนื้อเหรอ?"
20009-200090160 = "เราแค่อยากสนุกกับวันหยุดพักผ่อน\nก็เท่านั้นเอง..."
20009-200090170 = "นอกจากจะต้องถูกชิงสุดยอดพุดดิ้งที่\nเก็บเอาไว้ไปแล้ว ยังจะต้องมาปวดเมื่อยกล้ามเนื้อแบบนี้อีก..."
20009-200090180 = "วันหยุดฤดูหนาว...\nช่างเป็นสิ่งที่น่ากลัวเสียจริงๆ..."
20009-200090190 = "สหายเคยกินไข่ต้มออนเซ็นรึเปล่า?"
20009-200090200 = "ไม่อยากเชื่อเลยว่าจะต้มไข่ธรรมดาให้\nอร่อยด้วยน้ำพุร้อนได้..."
20009-200090210 = "ถึงเราจะไม่ค่อยรู้เรื่องออนเซ็นเท่าไหร่ แต่ก็เป็นเรื่องที่เหลือเชื่อจริงๆ นะ"
20009-200090220 = "ไข่ต้มออนเซ็นงั้นเหรอ..."
20009-200090230 = "อร่อยแล้วก็นุ่มเหมือนพุดดิ้งเลยนะ"
20009-200090240 = "พะ...พุดดิ้งเหรอ?!"
20009-200090250 = "เมื่อกี้พูดว่าพุดดิ้งเหรอ?"
20009-200090260 = "การทำพุดดิ้งหนึ่งถ้วยต้องใช้ส่วนผสม\nตั้งเยอะเลยนะ"
20009-200090270 = "ทำขนมแสนอร่อยอย่างพุดดิ้งได้โดย\nใช้น้ำพุร้อนกับไข่ไก่งั้นเหรอ..."
20009-200090280 = "สหาย ตอนนี้ไม่ใช่เวลามาเอ้อระเหย\nแบบนี้นะ"
20009-200090290 = "ตอนนี้ถึงเวลาที่ต้องไปทำ\nไข่ต้มออนเซ็นแล้ว!"
20009-200090300 = "สหาย... เคยได้ยินเรื่องนี้รึเปล่า?"
20009-200090310 = "เรื่องที่แม้แต่หงส์ที่แหวกว่ายอยู่ในน้ำ\nด้วยท่าทางที่สง่างามและสูงส่ง ก็ยังต้องพยายามตีเท้าใต้น้ำอย่างหนัก\nเพื่อไม่ให้จมน้ำ"
20009-200090320 = "ดังนั้นถึงแม้จะไม่มีใครเห็น\nเราก็ต้องพยายามอย่างหนักเพื่อที่จะ\nกลายเป็นผู้ที่สง่างามและสูงส่งแบบเจ้าหงส์"
20009-200090330 = "ถ้าเหล่านักเรียนของสหภาพเรดวินเทอร์\nพยายามทำงานอย่างหนักแม้ในช่วงเวลา\nพักผ่อนเหมือนกับเจ้าหงส์ตัวนี้บ้างก็คงจะดี..."
20009-200090340 = "เชริโน่"
20009-200090350 = "หืม? มีอะไรเหรอ สหาย"
20009-200090360 = "เหตุผลที่หงส์ไม่จมน้ำน่ะ"
20009-200090370 = "เพราะว่าขนของมันมีน้ำมันเคลือบ\nเอาไว้ยังไงล่ะ"
20009-200090380 = "..."
20009-200090390 = "..."
20009-200090400 = "เชริโน่?"
20009-200090410 = "เปล่าหรอก ตัวเราน่ะไม่ใช่เชริโน่หรอกนะ สหาย"
20009-200090420 = "หากไม่มีอำนาจของหนวด ตัวเราก็\nคงไม่สามารถเป็นเลขาธิการพรรค\nและประธานสภานักเรียนผู้ยิ่งใหญ่\nเชริโน่ได้หรอก"
20009-200090430 = "เราคงจะเป็นแค่นักเรียนธรรมดาๆ ของสหภาพเรดวินเทอร์เท่านั้น..."
20009-200090440 = "หนวดยังซักไม่เสร็จเหรอ?"
20009-200090450 = "ยังหรอก เราพยายามจะซักให้สะอาดแล้ว แต่โทโมเอะบอกว่าน้ำมันซึมเข้าไปในหนวดเยอะมาก เพราะงั้นให้เราซื้ออันใหม่แทนจะดีกว่าน่ะ"
20009-200090460 = "แต่ถึงเราจะซื้อหนวดอันใหม่ ก็ไม่รู้ว่า\nจะส่งมาถึงเมื่อไหร่..."
20009-200090470 = "หากปราศจากอำนาจ ทุกอย่างก็คงไร้ความหมายและน่าเศร้าน่าดู"
20009-200090480 = "การอาบน้ำอาจจะช่วยทำให้รู้สึกดีขึ้นก็ได้"
20009-200090490 = "เราไม่จำเป็นต้องอาบน้ำหรอก"
20009-200090500 = "จริงๆ เลย ทำไมใครๆ ถึงได้ชอบการเอาน้ำร้อนๆ มาราดตัวกันนะ..."
20009-200090510 = "ถ้าอาบน้ำเสร็จแล้ว เดี๋ยวครูจะซื้อ\nนมรสผลไม้ให้"
20009-200090520 = "ถ้างั้นเราจะไปที่ห้องอาบน้ำก่อนนะ สหาย"
20009-200090530 = "สหาย"
20009-200090540 = "สหาย!"
20009-200090550 = "มีอะไรเหรอ เชริโน่?"
20009-200090560 = "อืม... จะว่ายังไงดีละ"
20009-200090570 = "พวกสหายที่สำนักทะเบียนข้อมูล\nเกิดทำเรื่องผิดพลาดจนเกิดเรื่อง\nน่ารำคาญขึ้น..."
20009-200090580 = "ถ้าตามกฎเดิมแล้วจะต้องกวาดล้าง\nสหายพวกนั้นทั้งหมด"
20009-200090590 = "แต่โทโมเอะคัดค้านและบอกว่าผลที่\nเกิดขึ้นจากความผิดพลาดนั่นช่วย\nการเงินของสหภาพเรดวินเทอร์ไว้"
20009-200090600 = "เราเลยจะหลับตาข้างหนึ่งแล้วปล่อยๆ ไป"
20009-200090610 = "ครูงงไปหมดแล้ว..."
20009-200090620 = "อืมม..."
20009-200090630 = "ก่อนอื่นสหายรีบมาที่ออนเซ็นที่เรา\nอยู่ก่อนก็แล้วกัน"
20009-200090640 = "มาเห็นด้วยตาตัวเองน่าจะดีที่สุดน่ะ"

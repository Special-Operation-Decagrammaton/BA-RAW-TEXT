[translation]
20009-200090010 = "연말의 학원은 정말 정신없이 바쁘군."
20009-200090020 = "초인적인 체력을 가진 이 몸조차도 계속되는 격무로 인해 피로가 쌓이는 게 느껴질 정도야."
20009-200090030 = "그래서 이번 주말에는 업무에서 벗어나 모처럼 겨울 휴가를 즐기기로 했다네!"
20009-200090040 = "호화로운 휴양지에서 푹 쉬고 나면 컨디션을 완전히 회복할 수 있겠지."
20009-200090050 = "휴식이라면 평소에도 충분히 하고 있지 않아?"
20009-200090060 = "그게 무슨 소리인가, 콤라드."
20009-200090070 = "일과 중에 즐기는 휴식과 휴가는 엄연히 다르다고?"
20009-200090080 = "사무국에서 자는 짧은 낮잠으로는 피로를 완전히 씻어낼 수 없는 법!"
20009-200090090 = "그런 의미에서 이번에는 휴가를 제대로 즐길 수 있도록, 호화로운 온천장을 통째로 대절했다네."
20009-200090100 = "콤라드도 피로가 쌓였다면 이 몸과 함께 겨울 휴가를 즐기는 게 어떻겠는가?"
20009-200090110 = "으으…… 으으……."
20009-200090120 = "어째서지? 이 몸의 휴가 계획은 완벽했을 텐데……."
20009-200090130 = "온몸이 추를 매달아 놓은 것처럼 무거워……."
20009-200090140 = "안 하던 운동을 하니까 그렇지."
20009-200090150 = "근육통이 온 거 아냐?"
20009-200090160 = "이 몸은 그저 즐거운 휴가를 보내고 싶었을 뿐인데……"
20009-200090170 = "아껴 둔 최고급 푸딩을 빼앗긴 것으로도 모자라, 없었던 근육통까지 생겨버리다니……"
20009-200090180 = "겨울 휴가, 이 얼마나 무시무시한 녀석이란 말인가……."
20009-200090190 = "혹시 콤라드는 온천 계란을 먹어본 적이 있는가?"
20009-200090200 = "평범한 계란과 온천수만으로 진미를 만든다니……."
20009-200090210 = "이 몸이 온천에 대해서 문외한이라고는 하지만, 쉽게 믿기 어려운 사실이군."
20009-200090220 = "온천 계란이라……"
20009-200090230 = "확실히 푸딩처럼 부드럽고 맛있긴 하지."
20009-200090240 = "ㅍ, 푸딩?!"
20009-200090250 = "지금 푸딩이라고 했는가?"
20009-200090260 = "푸딩 하나를 만들기 위해서는 많은 재료가 필요한데"
20009-200090270 = "온천수와 계란만 가지고 푸딩과 같은 디저트를 만들 수 있다니……."
20009-200090280 = "콤라드, 지금 이러고 있을 때가 아니다."
20009-200090290 = "지금 바로 온천 계란을 만들러 가는 거다!"
20009-200090300 = "콤라드, 혹시 이런 이야기를 알고 있는가?"
20009-200090310 = "고상한 모습으로 유유히 헤엄치는 백조도 수면 아래에서는 가라앉지 않기 위해 열심히 물장구를 치고 있다는 사실을."
20009-200090320 = "이처럼 고고한 존재가 되기 위해서는 보이지 않는 곳에서도 열심히 노력해야 한다네."
20009-200090330 = "붉은겨울의 학생들도 이런 백조의 모습을 본받아 쉬는 시간에도 열심히 일해주었으면 좋으련만……."
20009-200090340 = "체리노."
20009-200090350 = "응? 무언가, 콤라드."
20009-200090360 = "백조가 물에 가라앉지 않는 이유는"
20009-200090370 = "깃털에 묻은 기름 때문이야."
20009-200090380 = "……."
20009-200090390 = "……."
20009-200090400 = "체리노?"
20009-200090410 = "아니. 이 몸은 체리노가 아니라네, 콤라드."
20009-200090420 = "수염의 권위를 갖지 못한 이 몸은 위대한 서기장이자 학생회장인 체리노가 될 수 없어."
20009-200090430 = "그저 평범한 붉은겨울의 학생일 뿐……."
20009-200090440 = "수염은 아직도 세탁 중인 거야?"
20009-200090450 = "아니. 깨끗이 씻어보려 했지만, 토모에의 말로는 수염에 기름때가 깊이 스며들어 새것을 사는 게 좋을 정도라는군."
20009-200090460 = "하지만 새 수염을 사도 언제 도착할지 알 수 없는 노릇이고……."
20009-200090470 = "권위를 얻지 못하니 모든 것이 허무하고 우울하구나."
20009-200090480 = "목욕을 하면 기분이 좋아질지도 몰라."
20009-200090490 = "이 몸에게 목욕은 필요 없느니라."
20009-200090500 = "나 참. 왜 그렇게 다들 뜨거운 물에 몸을 씻는 것을 좋아하는지……."
20009-200090510 = "목욕이 끝나면 후르츠 밀크를 사줄게."
20009-200090520 = "바로 탕으로 가겠네, 콤라드."
20009-200090530 = "콤라드"
20009-200090540 = "콤라드!"
20009-200090550 = "무슨 일이야, 체리노?"
20009-200090560 = "으음. 무어라 이야기해야 좋을까."
20009-200090570 = "전산국 녀석들의 실수로 약간 귀찮은 일이 발생했는데……"
20009-200090580 = "본래 규정대로라면 전원을 숙청해야 마땅하지만"
20009-200090590 = "토모에의 간언도 있고, 결과적으로는 붉은겨울 학원의 재정에 도움이 되었으니"
20009-200090600 = "이번만큼은 근신 처분으로 넘어가 주기로 했다네."
20009-200090610 = "점점 더 영문을 모르겠는데……"
20009-200090620 = "으으음"
20009-200090630 = "일단 이 몸이 머무르고 있는 온천장으로 오게나."
20009-200090640 = "백 번 듣는 것보다 한 번 보는 게 낫다는 말도 있으니."

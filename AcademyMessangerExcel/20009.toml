[translation]
20009-200090010 = "年末的學園，非常的匆忙"
20009-200090020 = "就連體力超群的咱，也因為接二連三繁重的工作而累積了不少疲勞"
20009-200090030 = "因此這個週末，咱決定忘記工作，享受寒假！"
20009-200090040 = "在渡假勝地好好休息的話，之後的工作效率也會更好吧"
20009-200090050 = "好像平時就在休息了吧……？"
20009-200090060 = "天真的同志"
20009-200090070 = "工作中的休息和休假，完全是兩碼子事吧？"
20009-200090080 = "平時的午睡只不過是應急措施，根本性的疲勞可是會不斷累積的"
20009-200090090 = "所以為了好好享受休假，咱這次可是包下了溫泉！"
20009-200090100 = "如果同志也感到疲勞的話，不如就和咱一起享受寒假吧？"
20009-200090110 = "為什麼……"
20009-200090120 = "咱的休假計畫應該很完美才對……"
20009-200090130 = "全身像鉛一樣重……"
20009-200090140 = "明明平時沒在動，突然那樣運動當然會……"
20009-200090150 = "我想可能是肌肉痠痛"
20009-200090160 = "這是怎麼回事……"
20009-200090170 = "開心歸開心，但沒能買到最高級的抹茶布丁，再加上肌肉痠痛……"
20009-200090180 = "寒假，多麼可怕的傢伙……"
20009-200090190 = "同志，你吃過「溫泉蛋」嗎？"
20009-200090200 = "聽說是用普通的雞蛋和溫泉水就能創造出的美味……"
20009-200090210 = "雖說咱對溫泉蛋不太了解，但也不能輕易相信"
20009-200090220 = "溫泉蛋？"
20009-200090230 = "確實像布丁一樣柔軟，很好吃唷"
20009-200090240 = "布丁！？"
20009-200090250 = "剛剛是說布丁嗎！？"
20009-200090260 = "製作布丁的話，需要很多材料"
20009-200090270 = "只用溫泉水和雞蛋就能做出像布丁一樣的甜點……！？"
20009-200090280 = "同志，現在不是待在這的時候"
20009-200090290 = "馬上去做溫泉蛋！"
20009-200090300 = "同志，你聽過這件事嗎？"
20009-200090310 = "優雅游泳的天鵝為了不沉入水中，必須拚命地拍打雙腳……"
20009-200090320 = "也就是說，為了成為孤高而美麗的存在，必須偷偷地努力"
20009-200090330 = "要是學園的學生們也抱持這樣的心態，在休息日也努力工作就好了"
20009-200090340 = "那個，確實從某種意義上來說是好事啦……"
20009-200090350 = "嗯？怎麼了同志，有什麼想說的嗎？"
20009-200090360 = "我前陣子才知道，天鵝之所以不會沉入水中"
20009-200090370 = "是因為羽毛上覆蓋了一層油"
20009-200090380 = "……"
20009-200090390 = "……"
20009-200090400 = "潔莉諾？"
20009-200090410 = "現在別叫咱潔莉諾，同志……"
20009-200090420 = "沒有鬍子的權威的咱，不能被稱呼為偉大的領袖潔莉諾……"
20009-200090430 = "只不過是赤冬聯邦學園的一個普通學生……"
20009-200090440 = "那個鬍子還在洗嗎？"
20009-200090450 = "智惠說油滲得太深，最好還是買新的"
20009-200090460 = "但即使買了新鬍子，也不知道什麼時候會送到……"
20009-200090470 = "沒有了權威，竟然如此空虛憂鬱……"
20009-200090480 = "轉換一下心情，去泡個溫泉怎麼樣？"
20009-200090490 = "現在沒有那種心情……"
20009-200090500 = "真是的，為什麼大家那麼喜歡用熱水洗身體呢……"
20009-200090510 = "洗完澡就買水果牛奶給你"
20009-200090520 = "咱馬上過去，同志"
20009-200090530 = "同志"
20009-200090540 = "同志！？"
20009-200090550 = "潔莉諾？怎麼了嗎？"
20009-200090560 = "哦哦，你在呀。唔呣，該從哪說起好呢……"
20009-200090570 = "因為電算局的失誤，發生了一點麻煩……"
20009-200090580 = "雖然本來應該依照規定肅清所有人的"
20009-200090590 = "但從結果上來說，對赤冬學園的經濟狀況有了幫助"
20009-200090600 = "加上智惠也替他們求情，所以這次就免除了他們的處分"
20009-200090610 = "我好像沒跟上話題……"
20009-200090620 = "唔"
20009-200090630 = "總之，到咱在的溫泉浴場來吧！"
20009-200090640 = "百聞不如一見！"

[translation]
20009-200090010 = "The academy is really hectic at the end of the year."
20009-200090020 = "Even I, someone with superhuman stamina, can feel fatigue building up from the never-ending heavy workload."
20009-200090030 = "That's why I decided to take a break from work this weekend and enjoy my much-awaited winter vacation!"
20009-200090040 = "I should be fully recovered after a good rest at a luxurious vacation spot."
20009-200090050 = "Don't you already get enough rest on a daily basis?"
20009-200090060 = "What are you talking about, Comrade?"
20009-200090070 = "There is a difference between a vacation and a good rest during work."
20009-200090080 = "The short naps I take at the Secretariat do not completely alleviate my fatigue!"
20009-200090090 = "On that note, I rented out an entire luxurious hot springs resort this time, so I can enjoy my vacation to the fullest."
20009-200090100 = "If you are tired as well, how about enjoying your winter vacation with me, Comrade?"
20009-200090110 = "Ugh... Ugh..."
20009-200090120 = "Why is this happening? My vacation plan was perfect..."
20009-200090130 = "My entire body feels heavy, as if I have weights on..."
20009-200090140 = "That's because you did exercise you've never done before."
20009-200090150 = "Maybe it's sore muscles?"
20009-200090160 = "All I wanted was to enjoy a nice vacation..."
20009-200090170 = "Not only did I get my finest pudding taken from me, but I'm also suffering from sore muscles..."
20009-200090180 = "Winter vacation, what a terrifying time it was..."
20009-200090190 = "Have you ever tried a hot spring boiled egg, Comrade?"
20009-200090200 = "I can't believe such a delicacy is made with just plain eggs and hot spring water..."
20009-200090210 = "Even if I'm ignorant about hot springs, it's still hard to believe."
20009-200090220 = "A hot spring boiled egg..."
20009-200090230 = "It's definitely as soft and delicious as a pudding."
20009-200090240 = "P-P-Pudding?!"
20009-200090250 = "Did you just say \"pudding\"?"
20009-200090260 = "It takes a lot of ingredients to make pudding."
20009-200090270 = "And yet, it's possible to make a dessert-like pudding with only hot spring water and an egg?"
20009-200090280 = "Comrade, there's no time to waste."
20009-200090290 = "Let's go make hot spring boiled eggs right now!"
20009-200090300 = "Comrade, did you know?"
20009-200090310 = "A swan, swimming serenely around in its elegance, is actually working very hard below the surface of the water in order to stay afloat."
20009-200090320 = "In order to become like that noble creature, you have to work hard even when nobody is watching."
20009-200090330 = "I wish the students of Red Winter would take after swans and work hard even during breaks..."
20009-200090340 = "Cherino."
20009-200090350 = "Yeah? What is it, Comrade?"
20009-200090360 = "The reason swans are able to float on water"
20009-200090370 = "is because of the oil on their feathers."
20009-200090380 = "..."
20009-200090390 = "..."
20009-200090400 = "Cherino?"
20009-200090410 = "No, Comrade, I am not Cherino."
20009-200090420 = "Without the authority of the mustache, I cannot be Cherino, the Great Leader and student council president."
20009-200090430 = "I'm just an ordinary student of Red Winter..."
20009-200090440 = "Are you still washing your mustache?"
20009-200090450 = "No, I tried to wash it clean, but according to Tomoe, the grease seeped so deeply into the mustache it's better to just buy a new one."
20009-200090460 = "But even if I buy a new mustache, I don't know when it will arrive..."
20009-200090470 = "Without authority, everything is futile and depressing."
20009-200090480 = "Taking a bath might make you feel better."
20009-200090490 = "This body of mine does not need a bath."
20009-200090500 = "Seriously, I don't understand why everyone loves to take a bath in hot water..."
20009-200090510 = "I'll buy you fruit milk after the bath."
20009-200090520 = "I'll be there in a jiffy, Comrade."
20009-200090530 = "Comrade."
20009-200090540 = "Comrade!"
20009-200090550 = "What's wrong, Cherino?"
20009-200090560 = "Hmm. How should I put this..."
20009-200090570 = "There's been, shall I say, a slight complication, due to a misstep, perpetrated by the Computer Science Bureau..."
20009-200090580 = "As stated in the rules, of course, all of their members should be purged."
20009-200090590 = "However, in consideration of certain remarks that Tomoe made, as well as the fact that said complication ultimately became a financial boon to Red Winter Academy..."
20009-200090600 = "It's been decided that an exception will be made, and they'll be put on probation instead."
20009-200090610 = "Now I really have no clue what you're talking about..."
20009-200090620 = "Hm..."
20009-200090630 = "Just come join me at the hot springs resort."
20009-200090640 = "Perhaps it will be easier for you to see for yourself, since explaining isn't working."

[translation]
10115-101150010 = "สวัสดีค่ะ คุณครู"
10115-101150020 = "ฉันโนมาสะ เรย์ค่ะ!"
10115-101150030 = "สวัสดี เรย์"
10115-101150040 = "จะว่าไป ปกติแล้วหลังเลิกเรียน\nเรย์ทำอะไรเหรอ?"
10115-101150050 = "ถามอะไรอย่างนั้นคะ คุณครู"
10115-101150060 = "ฉันก็ต้องไปซ้อมเบสบอลอยู่แล้วค่ะ!"
10115-101150070 = "อ๊ะ จริงด้วย"
10115-101150080 = "คุณครูก็ลองมาดูสักครั้งสิคะ"
10115-101150090 = "สนามซ้อมของชมรมเบสบอล\nมิลเลเนียมเปิดให้เข้าชมตลอดเลยค่ะ"
10115-101150100 = "สวัสดีค่ะ คุณครู"
10115-101150110 = "ขอบคุณที่คอยช่วยในหลายๆ เรื่อง\nเลยนะคะ"
10115-101150120 = "อ่า... อื้ม ถ้ามันเป็นประโยชน์\nก็ค่อยยังชั่วนะ..."
10115-101150130 = "แต่ว่า คุณครูคะ"
10115-101150140 = "นอกจากซ้อมตีลูกแล้ว"
10115-101150150 = "ไม่สิ ต้องบอกว่าเพื่อการซ้อมตีลูกแล้ว"
10115-101150160 = "ฉันรู้สึกว่าต้องซ้อมอย่างอื่นด้วยค่ะ"
10115-101150170 = "ซ้อมอะไรเหรอ?"
10115-101150180 = "เอาเป็นว่า..."
10115-101150190 = "คุณครูมาดูเองมั้ยคะ?"
10115-101150200 = "ก็อย่างที่ฉันเคยบอกไปว่า"
10115-101150210 = "สนามซ้อมของชมรมเบสบอล\nมิลเลเนียมเปิดให้เข้าชมตลอดไงคะ!"
10115-101150220 = "คุณครู! จำนัดวันนี้ได้ใช่มั้ยคะ?"
10115-101150230 = "จำได้ดีเลยละ เราจะไปดูการแข่ง\nเบสบอลด้วยกันใช่มั้ย?"
10115-101150270 = "ครูจำได้ ที่บอกว่าจะโยนปลาไหล\nขึ้นฟ้าใช่มั้ย?"
10115-101150240 = "ใช่ค่ะ! ดีใจจังเลยค่ะที่คุณครูจำได้!"
10115-101150250 = "คุณครูตั้งตารอได้เลยค่ะ!"
10115-101150260 = "การแข่งขันวันนี้จะยอดเยี่ยมมากๆ\nเลยละ!"
10115-101150280 = "คะ...? พูดเรื่องอะไร... แต่ฉันก็อยาก\nเห็นอะไรแบบนั้นเหมือนกันแฮะ..."
10115-101150290 = "ไม่สิ เดี๋ยวก่อนค่ะ! แบบนั้นมันมีที่ไหน\nกัน!"
10115-101150300 = "วันนี้เรานัดไปดูการแข่งขันเบสบอลกัน\nต่างหากค่ะ!"
10115-101150310 = "ถ้างั้น คุณครูคะ"
10115-101150320 = "เจอกันที่สนามกีฬาบราวน์ซ็อกซ์นะคะ!"
10115-101150330 = "ห้ามมาช้านะ!"
10115-101150340 = "คุณครู! วันนี้เป็นวันซ่อมบำรุงอุปกรณ์\nของชมรมเบสบอลค่ะ!"
10115-101150350 = "วันซ่อมบำรุงอุปกรณ์?"
10115-101150360 = "ดูแลอุปกรณ์เล่นเบสบอลเองตลอด\nเลยเหรอ?"
10115-101150370 = "เปล่าค่ะ ฉันไม่ได้ทำเองทั้งหมดหรอก"
10115-101150380 = "ก็แค่ตรวจสภาพของอุปกรณ์ที่เสียหาย"
10115-101150390 = "แล้วส่งไปโรงงานซ่อมอีกทีน่ะค่ะ"
10115-101150400 = "ครูขอไปดูได้มั้ย?"
10115-101150410 = "หืม? เอางั้นเหรอคะ?"
10115-101150420 = "ฉันก็ไม่ติดอะไรหรอก... แต่จะไม่เป็น\nอะไรเหรอคะ?"
10115-101150430 = "มันไม่น่าจะมีอะไรสนุกสักเท่าไรน่ะค่ะ..."
10115-101150440 = "ครูไม่ใส่ใจเรื่องแบบนั้นหรอก"
10115-101150450 = "ถ้างั้นก็..."
10115-101150460 = "ค่ะ งั้นก็มาหาฉันนะคะ"
10115-101150470 = "แหะๆ"
10115-101150480 = "แล้วฉันจะรอค่ะ!"

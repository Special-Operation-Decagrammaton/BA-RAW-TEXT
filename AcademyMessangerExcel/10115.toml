[translation]
10115-101150010 = "你好，老師"
10115-101150020 = "野正莉，向你報到！"
10115-101150030 = "嗨，莉"
10115-101150040 = "話說莉平常放學後都在做什麼呢？"
10115-101150050 = "怎麼問這種問題呢，老師"
10115-101150060 = "當然是練習棒球囉！"
10115-101150070 = "啊，對了"
10115-101150080 = "老師要不要來看看？"
10115-101150090 = "千年棒球部的訓練場，隨時都開放參觀哦"
10115-101150100 = "你好，老師"
10115-101150110 = "之前承蒙老師多方照顧，真的非常感謝"
10115-101150120 = "嗯……有幫到忙就好……"
10115-101150130 = "所以說呢，老師"
10115-101150140 = "除了打擊訓練之外"
10115-101150150 = "不，準確來說是為了訓練打擊能力"
10115-101150160 = "我認為有必要嘗試其他訓練"
10115-101150170 = "例如什麼樣的訓練？"
10115-101150180 = "簡單來說……"
10115-101150190 = "老師要不要直接過來看看？"
10115-101150200 = "我之前也說過"
10115-101150210 = "千年棒球部的訓練場隨時都開放參觀！"
10115-101150220 = "老師！你還記得我們今天的約定吧？"
10115-101150230 = "我記得。要一起去看棒球比賽對吧？"
10115-101150270 = "我記得。要一起騎鰻魚飛上天對吧？"
10115-101150240 = "沒錯！真高興老師還記得！"
10115-101150250 = "今天的比賽很值得期待哦！"
10115-101150260 = "一定會非常精彩的！"
10115-101150280 = "咦……？那是什麼東西……雖然好像有點想看看那個畫面……"
10115-101150290 = "等一下！不是啦！"
10115-101150300 = "我們不是約好今天一起去看棒球比賽嗎！"
10115-101150310 = "那麼老師"
10115-101150320 = "我們棕襪運動場見！"
10115-101150330 = "不可以遲到哦！"
10115-101150340 = "老師！今天是棒球部的器材整備日！"
10115-101150350 = "器材整備日？"
10115-101150360 = "要親手修理棒球器材嗎？"
10115-101150370 = "不不不，不是由我自己修理器材"
10115-101150380 = "只是在送到修繕工廠之前"
10115-101150390 = "檢查一下器材受損的情況而已"
10115-101150400 = "我可以去看看嗎？"
10115-101150410 = "嗯？真的嗎？"
10115-101150420 = "我當然很歡迎，可是……老師沒關係嗎？"
10115-101150430 = "因為不是什麼好玩或開心的事……"
10115-101150440 = "我不介意哦"
10115-101150450 = "那麼……"
10115-101150460 = "嗯，歡迎你來"
10115-101150470 = "嘿嘿"
10115-101150480 = "我等你哦！"

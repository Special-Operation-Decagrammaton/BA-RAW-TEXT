[translation]
10115-101150010 = "안녕하세요. 선생님."
10115-101150020 = "노마사 레이, 인사드립니다!"
10115-101150030 = "안녕. 레이."
10115-101150040 = "그러고 보니 레이는 수업이 끝나면 뭐 해?"
10115-101150050 = "너무 당연한 것을 물으시네요, 선생님."
10115-101150060 = "그거야 당연히, 야구 훈련이죠!"
10115-101150070 = "아, 그렇네요."
10115-101150080 = "선생님께서도 한 번 보러 오시겠어요?"
10115-101150090 = "밀레니엄 야구부의 훈련장은, 언제나 견학이 가능하거든요."
10115-101150100 = "안녕하세요. 선생님."
10115-101150110 = "예전에는 여러모로 도움을 주셔서 감사합니다."
10115-101150120 = "어…… 응. 도움이 되었다면야……."
10115-101150130 = "그래서 말인데요, 선생님."
10115-101150140 = "타격 훈련 말고도"
10115-101150150 = "아뇨, 정확히는 타격 훈련을 위해"
10115-101150160 = "다른 훈련을 해 볼 필요성을 느꼈어요."
10115-101150170 = "어떤 훈련인데?"
10115-101150180 = "그러니까……."
10115-101150190 = "직접 보시겠어요?"
10115-101150200 = "전에도 말씀드렸던 것이지만."
10115-101150210 = "밀레니엄 야구부의 훈련장은, 언제나 견학이 가능하니까요!"
10115-101150220 = "선생님! 오늘 약속 기억하고 계시죠?"
10115-101150230 = "기억하고 있어. 야구 경기를 보러 가기로 했었지?"
10115-101150270 = "기억하고 있어. 뱀장어로 하늘을 날기로 했었지?"
10115-101150240 = "네! 기억해 주셔서 기뻐요!"
10115-101150250 = "기대하셔도 좋을 거예요!"
10115-101150260 = "오늘 경기는 정말 대단할 거거든요!"
10115-101150280 = "네……? 그건 도대체 무슨……. 그 광경은 뭔가 보고 싶을 지도……."
10115-101150290 = "아니, 잠깐! 그게 아니잖아요!"
10115-101150300 = "같이 야구 경기를 보러 가기로 한 날이라고요!"
10115-101150310 = "그러면, 선생님."
10115-101150320 = "브라운 삭스 스타디움에서 만나요!"
10115-101150330 = "늦으시면 안 돼요!"
10115-101150340 = "선생님! 오늘은 야구부의 장비 정비일이에요!"
10115-101150350 = "장비 정비일?"
10115-101150360 = "야구 장비를 일일이 손으로 정비하는 거야?"
10115-101150370 = "아뇨, 아뇨. 제가 장비를 직접 정비하는 건 아니에요."
10115-101150380 = "수선 공장에 보내기 위해서"
10115-101150390 = "손상된 장비들의 상태를 살펴보는 정도니까요."
10115-101150400 = "구경 가도 돼?"
10115-101150410 = "어? 정말요?"
10115-101150420 = "저야 좋지만…… 괜찮으시겠어요?"
10115-101150430 = "그렇게 즐겁지도, 재미있지도 않을 텐데요……."
10115-101150440 = "그런 건 별로 신경 안 써."
10115-101150450 = "그러면……."
10115-101150460 = "네. 와 주세요."
10115-101150470 = "헤헤."
10115-101150480 = "기다릴게요!"

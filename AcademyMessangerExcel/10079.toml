[translation]
10079-100790010 = "這裡也很有趣呢"
10079-100790020 = "雖然乍看之下沒什麼區別，實際上卻有很多不同的地方"
10079-100790030 = "有種來到觀光景點的感覺"
10079-100790040 = "嗯？你在看什麼？"
10079-100790050 = "怎麼說呢？"
10079-100790060 = "各方面都是吧"
10079-100790070 = "對了"
10079-100790080 = "仔細想想，如果老師在的話說不定調查會更順利"
10079-100790090 = "現在有空嗎？"
10079-100790100 = "…………"
10079-100790110 = "咳哼"
10079-100790120 = "總覺得有點抱歉"
10079-100790130 = "白忙一場了嗎……"
10079-100790140 = "啊"
10079-100790150 = "不會，我很感謝老師"
10079-100790160 = "多虧有老師才能去那麼多地方"
10079-100790170 = "光是這樣，我就已經很滿足了"
10079-100790180 = "……我們……"
10079-100790190 = "一起……"
10079-100790200 = "老師"
10079-100790210 = "那個"
10079-100790220 = "抱歉"
10079-100790230 = "你現在有空嗎？我跟別人發生了一點糾紛……"
10079-100790240 = "跟別人發生了糾紛！？"
10079-100790250 = "什麼！？你現在在哪裡！？"
10079-100790260 = "那個……"
10079-100790270 = "唉"
10079-100790280 = "真累人"
10079-100790290 = "沒想到居然連這裡也有那種老愛叫別人「姊姊大人」的人"
10079-100790300 = "連這裡也有？"
10079-100790310 = "還有其他人會那樣稱呼你嗎？"
10079-100790320 = "那個"
10079-100790330 = "嗯"
10079-100790340 = "不過說明起來很花時間，今天就先不提了"
10079-100790350 = "總之，謝謝你最後替我解除了誤會"
10079-100790360 = "下次見囉，老師"
10079-100790370 = "老師"
10079-100790380 = "現在在忙嗎？"
10079-100790390 = "嗯？有什麼事嗎？"
10079-100790400 = "感覺好像很著急"
10079-100790410 = "不"
10079-100790420 = "是沒有到著急的程度啦"
10079-100790430 = "總之先告訴我現在忙不忙吧"
10079-100790440 = "我有點事想問你"
10079-100790450 = "老師，你看這個"
10079-100790460 = "這好像不是普通的佩洛洛"
10079-100790470 = "記得它正確的名稱應該是叫「佩洛洛博士」"
10079-100790480 = "不是都一樣嗎……"
10079-100790490 = "反正就是佩洛洛的一種不是嗎？"
10079-100790500 = "？？？？？"
10079-100790510 = "不對"
10079-100790520 = "不對不對，完全不一樣"
10079-100790530 = "它們之間存在非常重要的差異"
10079-100790540 = "呼"
10079-100790550 = "等我仔細研究過後，再好好解釋一遍給你聽"
10079-100790560 = "總之今天很謝謝你"
10079-100790570 = "下次見囉，老師！！"
10079-100790580 = "啊"
10079-100790590 = "搞什麼啊"
10079-100790600 = "為什麼都到了這裡還是一樣啊！"
10079-100790610 = "嗯？都到了這裡？"
10079-100790620 = "發生什麼事了嗎？"
10079-100790630 = "咳哼"
10079-100790640 = "老師，可以請你馬上過來一下嗎？"
10079-100790650 = "我好像又需要你的幫助了……"
10079-100790660 = "話說回來"
10079-100790670 = "希望你別誤會"
10079-100790680 = "我平時其實不會這麼暴力"
10079-100790690 = "懂我的意思吧？"
10079-100790700 = "我也沒這麼說吧……"
10079-100790710 = "該不會是被我戳到痛處了……？"
10079-100790720 = "才"
10079-100790730 = "才不是"
10079-100790740 = "我說沒有就沒有啦！"

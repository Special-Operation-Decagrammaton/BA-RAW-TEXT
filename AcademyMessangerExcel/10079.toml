10079-100790270 = "으으"
10079-100790280 = "피곤하다"
10079-100790290 = "여기까지 와서도 누님이니 언니니 하며 들러붙는 걸 볼 줄이야"
10079-100790300 = "여기까지 와서도?"
10079-100790310 = "또 아는 사람이 있나 보네"
10079-100790320 = "그"
10079-100790330 = "음"
10079-100790340 = "아니야, 말하면 또 길어질 테니 여기까지."
10079-100790350 = "그래도 마지막엔 잘 말해줘서 고마웠어."
10079-100790360 = "또 봐, 선생님."
10079-100790370 = "선생님"

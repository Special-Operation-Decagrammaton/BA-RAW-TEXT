[translation]
10079-100790010 = "ที่นี่ก็สนุกไม่เบาเลยนะ"
10079-100790020 = "ถึงทุกอย่างจะดูคล้ายกัน แต่ก็มีบางอย่าง\nที่แตกต่างกันอยู่นิดหน่อย"
10079-100790030 = "รู้สึกเหมือนได้มาเที่ยวเลย"
10079-100790040 = "หืม? ดูอะไรอยู่เหรอ?"
10079-100790050 = "คล้ายๆ แต่ก็แตกต่าง?\nหมายถึงอะไรเหรอ?"
10079-100790060 = "ก็หลายๆ อย่าง"
10079-100790070 = "นั่นสินะ"
10079-100790080 = "พอคิดๆ ดูแล้ว ให้คุณครูเห็นเองเลย\nน่าจะเข้าใจง่ายกว่า "
10079-100790090 = "ตอนนี้พอมีเวลารึเปล่า?"
10079-100790100 = "......"
10079-100790110 = "อึก"
10079-100790120 = "รู้สึกผิดแฮะ"
10079-100790130 = "เหนื่อยเปล่าเหรอเนี่ย..."
10079-100790140 = "อ่า"
10079-100790150 = "ไม่หรอก ฉันต้องขอบคุณ\nคุณครูมากกว่า"
10079-100790160 = "ฉันได้ไปดูอะไรมาเยอะเลย"
10079-100790170 = "แค่นั้นฉันก็พอใจแล้วละ"
10079-100790180 = "...แล้ว..."
10079-100790190 = "...ละ..."
10079-100790200 = "คุณครู"
10079-100790210 = "เอ่อ"
10079-100790220 = "ขอโทษนะ"
10079-100790230 = "ตอนนี้ว่างมั้ย? พอดีฉันมีปัญหา\nกับคนอื่นๆ นิดหน่อยน่ะ..."
10079-100790240 = "มีปัญหากับคนอื่น!?"
10079-100790250 = "ว่าไงนะ?? ตอนนี้อยู่ที่ไหนน่ะ!?"
10079-100790260 = "เอ่อ..."
10079-100790270 = "เฮ้อ"
10079-100790280 = "เหนื่อยจัง"
10079-100790290 = "ไม่คิดเลยว่าขนาดอยู่ที่นี่ยังมีคนมาตาม\nแบบนี้อีก แถมยังมาเรียกว่าท่านพี่อีกด้วย"
10079-100790300 = "ที่นี่ก็ด้วยงั้นเหรอ?"
10079-100790310 = "ที่โลกโน้นมีคนเรียกแบบนั้น\nเหมือนกันสินะ"
10079-100790320 = "เอ่อ"
10079-100790330 = "อืม"
10079-100790340 = "ช่างเถอะ ถ้าพูดเดี๋ยวจะยืดยาวไปกว่านี้\nแค่นี้แล้วกัน"
10079-100790350 = "แต่ก็ขอบคุณที่บอกกัน\nในตอนสุดท้ายนะ"
10079-100790360 = "ไว้เจอกันใหม่นะคุณครู"
10079-100790370 = "คุณครู"
10079-100790380 = "ตอนนี้คุณครูยุ่งรึเปล่า?"
10079-100790390 = "หืม? มีเรื่องอะไรเหรอ?"
10079-100790400 = "มีเรื่องด่วนอะไรรึเปล่า?"
10079-100790410 = "เปล่าหรอก"
10079-100790420 = "มันก็ไม่ได้ด่วนอะไรขนาดนั้น..."
10079-100790430 = "ตกลงตอนนี้ยุ่งอยู่รึเปล่า?"
10079-100790440 = "ฉันมีอะไรจะถามหน่อยน่ะ"
10079-100790450 = "คุณครู อันนี้"
10079-100790460 = "ไม่น่าจะเป็นแค่เพโรโร่ธรรมดาๆ เลย"
10079-100790470 = "ชื่อที่ถูกต้องน่าจะเป็น\n'ด็อกเตอร์เพโรโร่' มากกว่านะ"
10079-100790480 = "ครูก็ว่างั้นแหละ"
10079-100790490 = "แต่ยังไงมันก็คือเพโรโร่อยู่ดี\nไม่ใช่เหรอ?"
10079-100790500 = "?????"
10079-100790510 = "ไม่"
10079-100790520 = "ไม่หรอก ไม่ๆ ไม่เด็ดขาด"
10079-100790530 = "มันต่างกันอย่างสิ้นเชิงเลยต่างหาก"
10079-100790540 = "ฮู่ว"
10079-100790550 = "ไว้ฉันจะไปหาข้อมูลมาแล้วมาอธิบายให้\nอีกทีแล้วกัน"
10079-100790560 = "เอาเป็นว่า วันนี้ขอบคุณมากเลย"
10079-100790570 = "ไว้เจอกันใหม่นะคุณครู!!"
10079-100790580 = "อ่า"
10079-100790590 = "นี่มันอะไรเนี่ย"
10079-100790600 = "มาที่นี่ก็ยังเป็นแบบนี้เหรอเนี่ย?"
10079-100790610 = "หืม? มาที่นี่ก็ยังเป็นแบบนี้?"
10079-100790620 = "มีเรื่องอะไรเหรอ?"
10079-100790630 = "อึก"
10079-100790640 = "คุณครู มาหาฉันหน่อยได้มั้ย?"
10079-100790650 = "ดูท่า ฉันคงต้องให้คุณครู\nช่วยอีกแล้ว..."
10079-100790660 = "จะว่าไป"
10079-100790670 = "นี่ฉันแค่บอกไว้เฉยๆ นะ"
10079-100790680 = "ฉันไม่ใช่คนที่ชอบใช้ความรุนแรงหรอก"
10079-100790690 = "เข้าใจใช่มั้ย?"
10079-100790700 = "ครูไม่เคยพูดอะไรแบบนั้นนี่"
10079-100790710 = "มีอะไรที่แทงใจรึไง..."
10079-100790720 = "อ่า"
10079-100790730 = "ไม่หรอก"
10079-100790740 = "ถ้าบอกว่าไม่ใช่ ก็แค่รู้ไว้ว่าไม่ใช่แล้วกัน!"

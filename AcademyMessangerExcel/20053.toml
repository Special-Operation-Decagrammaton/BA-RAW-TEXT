20053-200530550 = "รอหน่อยนะ ท่านอาจารย์"
20053-200530560 = "ข้าน้อยจะรีบกลับมาพร้อมเคล็ดลับดีๆ\nเลยละ!"
20053-200530570 = "แล้วครูจะรอนะ มิจิรุ"

20053-200530660 = "ข้าน้อยไปหาแล้วบอกเองดีกว่า!"
20053-200530670 = "จะไปหาเดี๋ยวนี้ละ!"
20053-200530680 = "รอข้าน้อยก่อนนะ!"
20053-200530690 = "ต่อไปนี้"

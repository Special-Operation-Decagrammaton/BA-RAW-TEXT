[translation]
20053-200530010 = "你好，老師大人"
20053-200530020 = "你好，三千留閣下"
20053-200530030 = "哦"
20053-200530040 = "越來越有忍者風範了呢！"
20053-200530050 = "差不多該加入忍術研究部了吧？"
20053-200530060 = "話說有什麼事嗎，三千留閣下？"
20053-200530070 = "竟然就這樣若無其事地帶過了！"
20053-200530080 = "嗚嗚嗚，忍者也是有心的說……"
20053-200530090 = "總之，我正在研究新的忍術"
20053-200530100 = "結果卻不太順利"
20053-200530110 = "過程中還受了傷……"
20053-200530120 = "受傷！？怎麼回事！？"
20053-200530130 = "嗯？沒有啦，其實也不是什麼大事"
20053-200530140 = "所以說呢……"
20053-200530150 = "我現在馬上過去"
20053-200530160 = "咦？"
20053-200530170 = "老師大人"
20053-200530180 = "運動服，我會好好穿的"
20053-200530190 = "那個"
20053-200530200 = "就是……謝謝你……"
20053-200530210 = "還有剛才……對不……"
20053-200530220 = "不！唔喵啊！果然還是一點都不覺得對不起！！"
20053-200530230 = "（砰啪啪啪！）<-煙霧彈爆炸的聲音"
20053-200530240 = "老師大人"
20053-200530250 = "終於，傳來了"
20053-200530260 = "傷勢完全康復的好消息"
20053-200530270 = "……是在說送去修補的禮服吧？"
20053-200530280 = "哇哈哈！反應真快啊，老師大人！"
20053-200530290 = "那麼現在該去探病了！"
20053-200530300 = "嗯！路上小心，三千留！"
20053-200530310 = "嗯？你在說什麼啊，老師大人"
20053-200530320 = "凡事都要有始有終！"
20053-200530330 = "這就是忍者之道！"
20053-200530340 = "既然是我們一起送去的"
20053-200530350 = "拿回來的時候當然也要一起去！"
20053-200530360 = "是這樣嗎……！？"
20053-200530370 = "一小時之後，在裁縫店門口見吧！"
20053-200530380 = "那個……"
20053-200530390 = "對不起……我逃跑了……"
20053-200530400 = "嗚嗚，被三千留拋棄了……"
20053-200530410 = "唔哇啊啊！"
20053-200530420 = "@*%@)%^！！$*@！(;"
20053-200530430 = "終於"
20053-200530440 = "被我找到了"
20053-200530450 = "能讓我的頻道成長的祕訣……！"
20053-200530460 = "還有獲得那個祕訣的機會……！"
20053-200530470 = "……怎麼回事？"
20053-200530480 = "哼哼哼"
20053-200530490 = "其實我這次"
20053-200530500 = "拿到了某場說明會的入場券！"
20053-200530510 = "而那個說明會……！"
20053-200530520 = "會教大家怎麼讓觀看數和訂閱數暴增的……"
20053-200530530 = "那種祕訣的說明會！"
20053-200530540 = "哦……嗯……這樣啊……"
20053-200530550 = "拭目以待吧，老師大人"
20053-200530560 = "我很快就會帶著超厲害的祕訣回來的！"
20053-200530570 = "那我就等你凱旋歸來了，三千留閣下"
20053-200530580 = "喵哈哈！謝謝老師大人！"
20053-200530590 = "呵呵"
20053-200530600 = "呵呵呵呵"
20053-200530610 = "我終於發現了，老師大人！"
20053-200530620 = "「嗯？發現什麼……？」"
20053-200530630 = "那就是"
20053-200530640 = "嗯"
20053-200530650 = "比起用MomoTalk"
20053-200530660 = "果然還是直接見面談比較好！"
20053-200530670 = "我現在過去找你！"
20053-200530680 = "等我！"
20053-200530690 = "我以後"
20053-200530700 = "不會再隨便接觸其他領域了……"
20053-200530710 = "會一心一意地，堅持忍者之道……！"

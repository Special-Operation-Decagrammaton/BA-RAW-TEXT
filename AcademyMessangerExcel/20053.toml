[translation]
20053-200530010 = "도-모, 선생=공."
20053-200530020 = "도-모, 미치루 공."
20053-200530030 = "오"
20053-200530040 = "점점 닌자가 되어가고 있군!"
20053-200530050 = "슬슬 인법연구부로 오는 게 어때?"
20053-200530060 = "그래서 무슨 일이라고, 미치루 공?"
20053-200530070 = "은근슬쩍 넘겨 버렸어!"
20053-200530080 = "우으으, 닌자에게도 마음이라는 것이 있는데……."
20053-200530090 = "아무튼, 새로운 인법을 연구 중인데"
20053-200530100 = "쉽지 않더라고."
20053-200530110 = "그 과정에서 부상도 발생하고……"
20053-200530120 = "부상?! 무슨 일이야?!"
20053-200530130 = "응? 아니 별건 아니야."
20053-200530140 = "아무튼 그래서 말이지……"
20053-200530150 = "일단 지금 바로 갈게."
20053-200530160 = "엣?"
20053-200530170 = "선생 공"
20053-200530180 = "운동복, 잘 입겠소이다"
20053-200530190 = "그리고"
20053-200530200 = "그…… 고마워……."
20053-200530210 = "그리고 아까는…… 미안했……."
20053-200530220 = "아냐! 우냐악! 역시 안 미안해!!"
20053-200530230 = "(퍼버버벙!) <- 연막탄 터뜨리는 소리"
20053-200530240 = "선생=공"
20053-200530250 = "비로소, 부상이 완치되었다는"
20053-200530260 = "그런 낭보가 날아들었소이다."
20053-200530270 = "……수선 맡겼던 드레스 얘기지?"
20053-200530280 = "와하핫! 눈치가 빠르군, 선생=공!"
20053-200530290 = "그러면 이제 병문안을 가야 하는 법!"
20053-200530300 = "응! 잘 다녀와, 미치루!"
20053-200530310 = "응? 무슨 소리야 선생 공."
20053-200530320 = "시작과 끝은 같아야 하는 법!"
20053-200530330 = "그것이 닌자의 도리!"
20053-200530340 = "함께 가서 맡겼으니"
20053-200530350 = "찾아올 때도 같이 가야지!"
20053-200530360 = "그런 거였어……?!"
20053-200530370 = "한 시간 뒤 수선집 앞에서 보자고!"
20053-200530380 = "그"
20053-200530390 = "도망쳐서…… 죄송합니다……"
20053-200530400 = "흑흑 미치루에게 버려졌어……"
20053-200530410 = "우와아악!"
20053-200530420 = "머;ㅣㄴ얾ㅁㄴ이뱦케ㅐ베;ㅓㅣㅇ럼;"
20053-200530430 = "마침내"
20053-200530440 = "찾아내고야 말았소이다."
20053-200530450 = "나의 채널을 성장시킬 비책을……!"
20053-200530460 = "그리고 그 비책을 얻을 기회를……!"
20053-200530470 = "……대체 무슨 일이야?"
20053-200530480 = "후후"
20053-200530490 = "사실 이번에"
20053-200530500 = "어떤 설명회에 응모해서 당첨됐거든!"
20053-200530510 = "그런데 그 설명회가! 무려!"
20053-200530520 = "조회수와 구독자 수를 폭등시키는……!"
20053-200530530 = "그런 비법에 대한 설명회란 말이지!"
20053-200530540 = "어…… 음……. 그렇구나……"
20053-200530550 = "기다려, 선생 공."
20053-200530560 = "곧 내가 끝내주는 비책을 가지고 돌아올 테니까!"
20053-200530570 = "기다리고 있겠습니다, 미치루=공"
20053-200530580 = "냐하하! 고마워 선생=공!"
20053-200530590 = "후후"
20053-200530600 = "우후후후"
20053-200530610 = "드디어 알아냈다고, 선생=공!"
20053-200530620 = "\"응? 대체 뭘……?\""
20053-200530630 = "그건"
20053-200530640 = "음"
20053-200530650 = "역시 모모톡보다는"
20053-200530660 = "직접 보고 말하는 게 좋겠어!"
20053-200530670 = "곧 찾아가겠소이다!"
20053-200530680 = "기다리고 있으라고!"
20053-200530690 = "앞으로는"
20053-200530700 = "엉뚱하게 다른 분야에 손대지 않겠습니다……."
20053-200530710 = "우직하게, 오직 닌자의 길만 걸을 것이외다……!"

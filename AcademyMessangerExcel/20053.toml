[translation]
20053-200530010 = "โดโมะ ท่านอาจารย์"
20053-200530020 = "โดโมะ ท่านมิจิรุ"
20053-200530030 = "โอ้"
20053-200530040 = "เริ่มเหมือนนินจาเข้าทุกวันแล้วนะ!"
20053-200530050 = "มาเข้าชมรมวิจัยศาสตร์นินจามั้ยล่ะ?"
20053-200530060 = "ว่าแต่มีเรื่องอะไรเหรอ มิจิรุ?"
20053-200530070 = "เปลี่ยนเรื่องคุยแบบเนียนๆ เลยสินะ!"
20053-200530080 = "อึก... เห็นอย่างนี้นินจาก็มีหัวใจนะ..."
20053-200530090 = "แต่ก็เอาเถอะ ตอนนี้ข้าน้อยกำลังฝึก\nศาสตร์นินจาใหม่อยู่"
20053-200530100 = "มันไม่ง่ายเลยละ"
20053-200530110 = "ระหว่างฝึกก็ได้แผลด้วย..."

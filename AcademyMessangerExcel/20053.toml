20053-200530130 = "หืม? ไม่ใช่เรื่องใหญ่อะไรหรอก"
20053-200530140 = "ที่ข้าน้อยจะบอกก็คือ..."
20053-200530150 = "ครูจะไปหาเดี๋ยวนี้เลย"
20053-200530160 = "เอ๋?"
20053-200530170 = "ท่านอาจารย์"
20053-200530180 = "ข้าน้อยจะใส่ชุดกีฬาบ่อยๆ นะ"
20053-200530190 = "แล้วก็"
20053-200530200 = "ขะ... ขอบคุณนะ "
20053-200530210 = "แล้วก็เมื่อกี้... ขอโทษ..."
20053-200530220 = "ไม่สิ! ม่าย! ข้าน้อยไม่ขอโทษ!!"
20053-200530230 = "(ตู้มมม!) <- เสียงระเบิดควัน"
20053-200530240 = "ท่านอาจารย์"
20053-200530250 = "ข้าน้อยมีข่าวดีมาบอก"
20053-200530260 = "ตอนนี้แผลหายสนิทแล้วละ"
20053-200530270 = "หมายถึงชุดที่เอาไปเย็บไว้ใช่มั้ย...?"
20053-200530280 = "วะฮะฮ่า! ไหวพริบดีนี่ ท่านอาจารย์!"
20053-200530290 = "งั้นก็ถึงเวลาไปรับคนไข้!"
20053-200530300 = "อื้อ! เดินทางดีๆ นะ มิจิรุ!"
20053-200530310 = "หืม? พูดอะไรน่ะ ท่านอาจารย์"
20053-200530320 = "จุดเริ่มต้นกับจุดจบต้องเหมือนกันสิ!"
20053-200530330 = "นั่นคือวิถีของนินจานะ!"
20053-200530340 = "เราไปส่งคนไข้ด้วยกัน"
20053-200530350 = "งั้นก็ต้องไปรับกลับด้วยกันสิ!"

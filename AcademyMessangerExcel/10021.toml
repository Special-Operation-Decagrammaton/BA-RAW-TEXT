[translation]
10021-10021010 = "มีเรื่องอยากให้คุณครูตรวจสอบหน่อยน่ะ"
10021-10021020 = "ตอนนี้อยู่ที่ไหนเหรอ?"
10021-10021030 = "ที่ไหนงั้นเหรอ? ทำไมเหรอ?"
10021-10021040 = "มีอะไรรึเปล่า?"
10021-10021050 = "เปล่าหรอก ไม่ได้มีปัญหาอะไรหรอก"
10021-10021060 = "แต่ฉันคิดดูแล้ว ที่นี่เองก็ไม่ปลอดภัย\nเท่าไร"
10021-10021070 = "ฉันคงต้องปกป้องคุณครูแล้วละ\nเพื่อความปลอดภัยของคุณครูเอง"
10021-10021080 = "พูดง่ายๆ คือคุ้มครองไงล่ะ"
10021-10021090 = "หืม? คุ้มครองครูงั้นเหรอ?"
10021-10021100 = "ไม่เห็นต้องทำแบบนั้นเลย..."
10021-10021110 = "..."
10021-10021120 = "แล้วตอนนี้อยู่ที่ไหนล่ะ?"
10021-10021130 = "เรื่องเมื่อกี้... ลืมมันไปเถอะนะ"
10021-10021140 = "นั่นสินะ หรือว่าบางที..."
10021-10021150 = "อาจปลอดภัยกว่าที่คิด...นิดหน่อยก็ได้"
10021-10021160 = "ต้องขอบคุณคุณครู ทำให้ฉันใช้เวลา\nที่นี่ได้แบบสบายๆ ขึ้น"
10021-10021170 = "แล้วฉันจะติดต่อไปใหม่นะคุณครู"
10021-10021180 = "อืม..."
10021-10021190 = "คุณครู พอมีเวลารึเปล่า?"
10021-10021200 = "คือฉัน..."
10021-10021210 = "มีเรื่อง..."
10021-10021220 = "อยากให้ช่วยนิดหน่อยน่ะ"
10021-10021230 = "ครูจะไปเดี๋ยวนี้ละ! เรื่องต่อสู้เรอะ!?"
10021-10021240 = "เป็นอะไรรึเปล่า? ตอนนี้อยู่ที่ไหนน่ะ!?"
10021-10021250 = "อื้อ"
10021-10021260 = "เดี๋ยวฉันส่งข้อความไปบอกสถานที่นะ"
10021-10021270 = "ฉันอยากให้คุณครูรีบมาก็จริง... แต่ว่า\nไม่ต้องรีบมากก็ได้นะ"
10021-10021280 = "จะไปเดี๋ยวนี้แหละ"
10021-10021290 = "อร่อยมากเลยละคุณครู ขอบคุณนะ"
10021-10021300 = "อย่างที่ฉันเคยบอกทุกครั้ง ฉันไม่\nขอบคุณแค่ลมปากหรอก"
10021-10021310 = "สักวันนึงฉันจะตอบแทนคุณครูเอง"
10021-10021320 = "ก็ได้ แล้วครูจะรอนะ"
10021-10021330 = "พูดเหมือนกำลังเตรียมจะล้างแค้นเลย"
10021-10021340 = "อื้อ คอยดูได้เลย"
10021-10021350 = "..."
10021-10021360 = "ไม่ใช่แบบนั้นสักหน่อย"
10021-10021370 = "ถ้างั้นไว้เจอกันใหม่นะ คุณครู"
10021-10021380 = "...คุณครู"
10021-10021390 = "ยังหรอก พอมาคิดดูแล้ว เท่านี้ยังไม่\nพอหรอก"
10021-10021400 = "ลางสังหรณ์ด้านกลยุทธ์ของฉันบอก\nว่าอย่างนั้นน่ะ"
10021-10021410 = "ที่นี่จะต้องมีอะไรอยู่อีกแน่ๆ"
10021-10021420 = "ทำไมจู่ๆ ถึงสังหรณ์ใจแบบนั้นล่ะ?"
10021-10021430 = "มีเรื่องที่อยากทำอยู่สินะ"
10021-10021440 = "อื้อ"
10021-10021450 = "เพราะงั้นเราต้องมาหารือกันเรื่องกลยุทธ์"
10021-10021460 = "เมื่อกี้พูดว่า \"กลยุทธ์\" ใช่มั้ยนะ..."
10021-10021470 = "ต้องไปที่ไหนล่ะ?"
10021-10021480 = "เดี๋ยวฉันไปหาคุณครูเอง"
10021-10021490 = "คุณครู มีเรื่องนึงที่ฉันลืมบอกไป"
10021-10021500 = "เรื่องที่เกิดขึ้นวันนี้ สิ่งที่ฉันพูดไปวันนี้"
10021-10021510 = "ช่วยเก็บเรื่องทุกอย่างไว้เป็นความลับ\nด้วยนะ"
10021-10021520 = "เข้าใจมั้ย?"
10021-10021530 = "ความลับสุดยอดงั้นเหรอ?"
10021-10021540 = "แน่นอน"
10021-10021550 = "ความลับสุดยอด ถ้าเรื่องนี้หลุดออกไป\nก็คงเป็นฝีมือคุณครูแน่ๆ"
10021-10021560 = "..."
10021-10021570 = "เพราะนอกจากคนอื่นแล้ว ยังไม่เคยมี\nใครได้เห็นเลย"
10021-10021580 = "คุณครู"
10021-10021590 = "ตอนนี้มีเวลาว่างรึเปล่า?"
10021-10021600 = "เวลาว่างเหรอ...? มีเรื่องอะไรงั้นเหรอ?"
10021-10021610 = "ต้องการให้ไปช่วยอีกเหรอ?"
10021-10021620 = "เปล่าหรอก"
10021-10021630 = "ไม่ใช่แบบนั้นหรอก"
10021-10021640 = "ถ้าคุณครูติดธุระอยู่ ไม่ต้องมาก็ได้"
10021-10021650 = "ไม่เป็นไรหรอก ครูว่างอยู่พอดีน่ะ"
10021-10021660 = "อาซึสะเรียกทั้งทีก็ต้องไปอยู่แล้ว"
10021-10021670 = "..."
10021-10021680 = "ขอบคุณนะ คุณครู"
10021-10021690 = "ถ้างั้นฉันจะรอนะ"
10021-10021700 = "ฉันคิดว่าส่งข้อความหาคุณครูดึกเกินไป\nซะอีก"
10021-10021710 = "ครูเป็นสิ่งมีชีวิตกลางคืนน่ะ"
10021-10021720 = "ไม่เป็นไรหรอก ไม่ต้องห่วง"
10021-10021730 = "อืม..."
10021-10021740 = "ถ้างั้นฉันจะคิดแบบนั้นแล้วกัน"
10021-10021750 = "ขอบคุณนะ คุณครู"
10021-10021760 = "หลายๆ เรื่องเลย"

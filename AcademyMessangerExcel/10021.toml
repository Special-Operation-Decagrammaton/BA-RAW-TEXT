[translation]
10021-10021010 = "There's something I want to check, Sensei."
10021-10021020 = "What is your location right now?"
10021-10021030 = "My location? Why?"
10021-10021040 = "Is there a problem?"
10021-10021050 = "Nothing of great concern."
10021-10021060 = "After further evaluation, I don't believe this beach is safe either."
10021-10021070 = "It would be best if I guarded you myself."
10021-10021080 = "You are a priority subject, after all."
10021-10021090 = "I need to be protected?"
10021-10021100 = "I don't think you HAVE to do this..."
10021-10021110 = "..."
10021-10021120 = "Where are you right now?"
10021-10021130 = "Forget about what just happened."
10021-10021140 = "At least compared to what I was expecting..."
10021-10021150 = "This place might actually be safe."
10021-10021160 = "We should be able to stay here without worrying too much, then."
10021-10021170 = "I'll talk to you next time, Sensei."
10021-10021180 = "Hmm."
10021-10021190 = "Are you free right now, Sensei?"
10021-10021200 = "I could use some"
10021-10021210 = "support"
10021-10021220 = "right about now."
10021-10021230 = "You need support? Are you in battle?!"
10021-10021240 = "Are you all right? What's your location?!"
10021-10021250 = "Yes."
10021-10021260 = "I'll send you the details."
10021-10021270 = "Earlier the better, but take your time."
10021-10021280 = "I'm on my way."
10021-10021290 = "I enjoyed the meal, Sensei. Thank you."
10021-10021300 = "And as I said, I don't thank people without meaning."
10021-10021310 = "I'll pay you back sometime later."
10021-10021320 = "Sure, I'll look forward to it."
10021-10021330 = "You sound like you're out for revenge when you put it like that."
10021-10021340 = "Yes. Good."
10021-10021350 = "..."
10021-10021360 = "It's not like that."
10021-10021370 = "I'll speak with you later, Sensei."
10021-10021380 = "Sensei."
10021-10021390 = "It's not enough, now that I think of it."
10021-10021400 = "My tactical intuition is telling me"
10021-10021410 = "that there is something else here."
10021-10021420 = "Tactical intuition? Where's this coming from?"
10021-10021430 = "I guess you still aren't satisfied, huh?"
10021-10021440 = "Yes."
10021-10021450 = "I need to discuss strategy with someone."
10021-10021460 = "Didn't you just say 'tactical' earlier?"
10021-10021470 = "Where should I head to?"
10021-10021480 = "I'll head to where you are."
10021-10021490 = "There is something I forgot to tell you, Sensei."
10021-10021500 = "Everything that happened today, whatever I said..."
10021-10021510 = "You must keep it a secret from the others."
10021-10021520 = "Understood?"
10021-10021530 = "Is it something confidential now?"
10021-10021540 = "Naturally."
10021-10021550 = "It's top secret. So if it leaks, I'll know it was you."
10021-10021560 = "..."
10021-10021570 = "That was for only you, Sensei."
10021-10021580 = "Sensei."
10021-10021590 = "Can you spare some time?"
10021-10021600 = "Spare some time? Is there something wrong?"
10021-10021610 = "Do you need more support?"
10021-10021620 = "No."
10021-10021630 = "That's not it."
10021-10021640 = "You don't have to come if you're busy."
10021-10021650 = "It's fine. I'm free."
10021-10021660 = "If you need me, Azusa, then I'm there."
10021-10021670 = "..."
10021-10021680 = "Thank you, Sensei."
10021-10021690 = "I'll be waiting."
10021-10021700 = "Apologies if I've been contacting you too late at night."
10021-10021710 = "It's fine. I'm a night owl, anyway."
10021-10021720 = "Don't worry about it."
10021-10021730 = "Oh."
10021-10021740 = "Then I'll put it out of my mind."
10021-10021750 = "Thank you, Sensei."
10021-10021760 = "For everything."

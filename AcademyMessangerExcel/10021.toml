[translation]
10021-10021010 = "老師，有件事想盡快和你確認一下"
10021-10021020 = "你現在在哪裡？"
10021-10021030 = "怎麼了？"
10021-10021040 = "有什麼事嗎？"
10021-10021050 = "不，並沒有發生什麼狀況"
10021-10021060 = "只是仔細想想，這附近並不是那麼安全"
10021-10021070 = "我必須保護老師"
10021-10021080 = "因為老師是我的護衛對象"
10021-10021090 = "真可靠……"
10021-10021100 = "有那麼危險嗎……？"
10021-10021110 = "……呼"
10021-10021120 = "所以，你現在在哪裡？"
10021-10021130 = "剛才的，請忘了吧……"
10021-10021140 = "……不過"
10021-10021150 = "稍微放鬆一下確實不壞"
10021-10021160 = "託你的福，我好像能稍微享受現況了"
10021-10021170 = "那麼，之後再連絡"
10021-10021180 = "老師"
10021-10021190 = "現在有時間嗎？"
10021-10021200 = "怎麼說才好呢"
10021-10021210 = "其實我現在……"
10021-10021220 = "需要老師的幫助"
10021-10021230 = "難道有緊急狀況！？"
10021-10021240 = "我馬上過去，你現在在哪？"
10021-10021250 = "等等我會傳送位置資訊"
10021-10021260 = "希望你能盡快過來"
10021-10021270 = "啊，但是不要勉強"
10021-10021280 = "我盡快到，等著"
10021-10021290 = "剛才多謝款待。謝謝老師"
10021-10021300 = "就像剛才說過的，光用說的無法表達我的謝意"
10021-10021310 = "這筆帳，總有一天必定奉還"
10021-10021320 = "嗯，我很期待唷"
10021-10021330 = "怎麼聽起來像是要復仇一樣……"
10021-10021340 = "不會辜負你的期待的"
10021-10021350 = "……"
10021-10021360 = "不是那個意思……我明明這麼受老師關照"
10021-10021370 = "那下次見囉，老師"
10021-10021380 = "老師"
10021-10021390 = "……感覺缺少了什麼"
10021-10021400 = "我的戰術直覺是這麼告訴我的"
10021-10021410 = "這個夏天一定還少了什麼"
10021-10021420 = "戰術直覺……？"
10021-10021430 = "有什麼沒做的事嗎？"
10021-10021440 = "關於這點，需要進行戰略性的討論"
10021-10021450 = "沒剩多少時間了"
10021-10021460 = "「戰術」和「戰略」很複雜呢……"
10021-10021470 = "總之，我現在過去老師那邊"
10021-10021480 = "你現在在哪裡？"
10021-10021490 = "老師，忘了說一件事"
10021-10021500 = "今天的事，還有今天我說的話"
10021-10021510 = "全部都是機密事項，不要告訴任何人"
10021-10021520 = "明白了嗎？"
10021-10021530 = "是嗎……？總之了解了"
10021-10021540 = "別忘了"
10021-10021550 = "如果這個祕密洩露出去，犯人肯定是老師"
10021-10021560 = "……"
10021-10021570 = "如果被老師以外的人知道，我會很困擾"
10021-10021580 = "老師"
10021-10021590 = "現在有時間嗎？"
10021-10021600 = "沒問題唷，怎麼了？"
10021-10021610 = "是不是需要幫忙？"
10021-10021620 = "不"
10021-10021630 = "沒什麼大不了的"
10021-10021640 = "如果有事的話，不用勉強過來沒關係"
10021-10021650 = "沒關係，我馬上過去"
10021-10021660 = "難得被梓邀請，我很樂意"
10021-10021670 = "……"
10021-10021680 = "謝謝老師"
10021-10021690 = "那麼，我等你"
10021-10021700 = "很抱歉這麼晚叫你出來，謝謝你來"
10021-10021710 = "我是夜行性動物，沒事的"
10021-10021720 = "別在意，任何時候都歡迎"
10021-10021730 = "……這樣啊"
10021-10021740 = "那麼下次見"
10021-10021750 = "謝謝你，老師"
10021-10021760 = "那個，不只是今天的事……各方面都是……"

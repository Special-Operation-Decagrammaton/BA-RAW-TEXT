[translation]
10021-10021010 = "선생님. 한 가지 확인할 게 있어."
10021-10021020 = "지금 위치가 어디야?"
10021-10021030 = "위치? 그건 왜?"
10021-10021040 = "무슨 일 있어?"
10021-10021050 = "아니. 문제가 생긴 건 아니야."
10021-10021060 = "하지만 생각해보니 이곳도 그리 안전하진 않으니까."
10021-10021070 = "선생님의 신변을 위해서라도 내가 경호를 해줘야 할 거 같아."
10021-10021080 = "즉 보호 대상이란 거지."
10021-10021090 = "응? 내가 보호 대상??"
10021-10021100 = "굳이 그래야 할 것 같진 않은데……"
10021-10021110 = "……"
10021-10021120 = "어디야 지금?"
10021-10021130 = "조금 전 일은…… 없었던 걸로 해."
10021-10021140 = "그렇네. 예상했던 것보다는……"
10021-10021150 = "아주 조금은 안전할지도."
10021-10021160 = "덕분에 조금은 편하게 이곳을 즐길 수 있겠어."
10021-10021170 = "그럼 또 연락할게, 선생님."
10021-10021180 = "……음."
10021-10021190 = "선생님. 혹시 지금 시간이 좀 있을까?"
10021-10021200 = "조금"
10021-10021210 = "지원이"
10021-10021220 = "필요한 상황이라서 말이야"
10021-10021230 = "갑자기 지원! 설마 전투!?"
10021-10021240 = "괜찮아? 지금 어디야!?"
10021-10021250 = "응."
10021-10021260 = "위치는 메시지로 보내줄게."
10021-10021270 = "빨리 와주면 고맙지만, 너무 무리하지는 마."
10021-10021280 = "지금 갈게."
10021-10021290 = "덕분에 잘 먹었어, 선생님. 감사하지."
10021-10021300 = "미리 말했듯 나는 맨입으로 감사를 표하진 않아."
10021-10021310 = "언젠가는 꼭 이 빚을 갚아줄게."
10021-10021320 = "그래. 기대할게."
10021-10021330 = "뭔가 복수라도 하는 것 같은 말투네."
10021-10021340 = "응. 기대해도 좋아."
10021-10021350 = "……"
10021-10021360 = "그런 거 아니야."
10021-10021370 = "그럼 다음에 또 봐. 선생님."
10021-10021380 = "……선생님."
10021-10021390 = "아직이야. 생각해 보니 아직 충분하지 않아."
10021-10021400 = "내 전술적 직감이 말해주고 있어."
10021-10021410 = "분명 여기엔 뭔가가 더 있다고 말이야."
10021-10021420 = "……갑자기 전술적 직감?"
10021-10021430 = "또 뭔가 하고 싶은 것이 생겼구나."
10021-10021440 = "응."
10021-10021450 = "그래서 그것에 대해, 전략적인 논의가 필요해."
10021-10021460 = "방금 전엔 '전술적'이라고 했던 거 같은데……"
10021-10021470 = "어디로 가면 되지?"
10021-10021480 = "내가 선생님께 찾아가겠어."
10021-10021490 = "선생님. 말하지 않고 잊은 게 있어."
10021-10021500 = "오늘 있었던 일, 오늘 내가 했던 말들."
10021-10021510 = "당연한 이야기지만 모두 대외비로 처리해줘."
10021-10021520 = "알았지?"
10021-10021530 = "극비사항인 거야?"
10021-10021540 = "당연하지."
10021-10021550 = "극비사항이야. 새어 나가면 반드시 선생님이 범인이지."
10021-10021560 = "……"
10021-10021570 = "선생님 이외에는, 아무도 본 적 없는 거니까."
10021-10021580 = "선생님."
10021-10021590 = "지금 혹시 가용시간이 있을까?"
10021-10021600 = "가용시간……? 무슨 일 있어?"
10021-10021610 = "또다시 지원이 필요한 상황이야?"
10021-10021620 = "아니."
10021-10021630 = "그런 건 아니야."
10021-10021640 = "용무가 있다면 필수적으로 와 줄 필요는 없어."
10021-10021650 = "괜찮아. 시간 있어."
10021-10021660 = "아즈사가 부르면 그게 필수지."
10021-10021670 = "……"
10021-10021680 = "고마워. 선생님."
10021-10021690 = "그럼 기다리고 있을게."
10021-10021700 = "역시 너무 늦게까지 호출하고 있었던 거 같은데."
10021-10021710 = "선생님은 원래 올빼미족이야."
10021-10021720 = "괜찮아. 신경 쓰지 마."
10021-10021730 = "……응."
10021-10021740 = "그럼 그렇게 생각하도록 할게."
10021-10021750 = "고마워, 선생님."
10021-10021760 = "여러 가지로."

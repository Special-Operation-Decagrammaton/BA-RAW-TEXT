[translation]
10065-100650010 = "您好，老師"
10065-100650020 = "哈，哈囉……請問是哪位？"
10065-100650030 = "之前沒有私下跟您聯絡過呢"
10065-100650040 = "我是百鬼夜行聯合學園的陰陽部副部長，也是在百鬼夜行觀光文化產業宣傳支援部──"
10065-100650050 = "擔任戰略領袖的桑上佳穗"
10065-100650060 = "雖然有些遲了，還是希望能向夏萊的老師問好"
10065-100650070 = "戰略，宣傳……？"
10065-100650080 = "請，請多指教……話說這麼突然有什麼事嗎？"
10065-100650090 = "是關於先前跟您聯絡過的「那件事」"
10065-100650100 = "先前？那件事……？"
10065-100650110 = "我想跟您討論相關事宜，請問今天是否方便呢？"
10065-100650120 = "啊，嗯。今天可以唷"
10065-100650130 = "非常感謝。那麼我馬上就到"
10065-100650140 = "這麼快！？"
10065-100650150 = "老師，前些日子造成您天大的困擾……"
10065-100650160 = "真是非常抱歉"
10065-100650170 = "那不算什麼麻煩，別這麼說"
10065-100650180 = "承蒙您的體貼……"
10065-100650190 = "作為給您添麻煩的賠罪，能請您來百鬼夜行一趟嗎？"
10065-100650200 = "嗯，現在過去可以嗎？"
10065-100650210 = "好的，那麼我會等待您的到來"
10065-100650220 = "我馬上過去哦"
10065-100650230 = "我，桑上佳穗，今天會完美地與老師伴遊"
10065-100650240 = "伴遊……？"
10065-100650250 = "老師，請問您今天是否有空呢？"
10065-100650260 = "有時間哦，怎麼了嗎？"
10065-100650270 = "我想履行之前的約定……"
10065-100650280 = "就是，那個……"
10065-100650290 = "已經做好伴遊的準備了，所以才會聯絡您"
10065-100650300 = "所以，老師。如果您願意的話……"
10065-100650310 = "嗯，我知道了。現在過去可以嗎？"
10065-100650320 = "好的，非常感謝"
10065-100650330 = "那麼，我等待著您的到來"
10065-100650340 = "呵呵呵"
10065-100650350 = "發生什麼好事了嗎？"
10065-100650360 = "老師，請您聽我說"
10065-100650370 = "總算……終於！"
10065-100650380 = "終於……！？"
10065-100650390 = "陰陽部特別訂購的百鬼夜行宣傳周邊送到了！"
10065-100650400 = "恭喜你！"
10065-100650410 = "呵呵，老師要不要也拿一個呢？"
10065-100650420 = "當然，如果您不介意的話……"
10065-100650430 = "謝謝，我立刻過去！"
10065-100650440 = "呵呵，我會等著您的到來"
10065-100650450 = "老師您好。我是佳穗"
10065-100650460 = "聽說您明天會到陰陽部辦公"
10065-100650470 = "嗯，是這樣沒錯哦"
10065-100650480 = "呵呵，很高興又能見到老師"
10065-100650490 = "工作結束之後，要不要到休息室喝杯茶再走？"
10065-100650500 = "在整潔的氣氛中休息，也可以提高工作效率"
10065-100650510 = "當然好，我很樂意"
10065-100650520 = "非常感謝"
10065-100650530 = "那麼，我會等候您的到來"

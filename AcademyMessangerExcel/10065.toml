[translation]
10065-100650010 = "안녕하십니까? 선생님."
10065-100650020 = "아, 안녕…이 아니라. …누구?"
10065-100650030 = "아, 그러고 보면 공적인 자리가 아닌 곳에서의 인사는 이번이 처음이었지요."
10065-100650040 = "제 이름은 쿠와카미 카호. 백귀야행 연합학원 음양부 소속 부부장이자,"
10065-100650050 = "백귀야행 관광문화산업 홍보지원팀의 전략홍보팀장을 맡고 있습니다."
10065-100650060 = "늦었지만 샬레의 선생님께, 인사드립니다."
10065-100650070 = "전략… 홍보… 으응…?"
10065-100650080 = "아, 안녕…. 그런데 갑자기 어쩐 일로…."
10065-100650090 = "다름이 아니라, 지난번에 앞서 전달해 드린 '예의 건'과 관련한 이야기입니다만."
10065-100650100 = "지난번? 예의 건…? "
10065-100650110 = "해당 건의 상담을 위해 찾아뵙고 싶습니다만, 혹시 괜찮으실까요?"
10065-100650120 = "아, 응. 오늘은 괜찮아."
10065-100650130 = "네, 감사합니다. 그럼 지금 바로 샬레로 찾아가겠습니다."
10065-100650140 = "어…? 이렇게나 갑자기…?!"
10065-100650150 = "선생님, 저번엔 본의 아니게 크게 폐를 끼치고야 말았습니다."
10065-100650160 = "다시금 죄송하다는 말씀드립니다."
10065-100650170 = "응? 아니, 그, 폐를 끼쳤다고 생각하지는 않지만 말이야."
10065-100650180 = "그런 말씀만으로도 충분히 감사드립니다만."
10065-100650190 = "오늘은 그때의 사과를 위해, 제게 잠시 시간을 할애해주실 수 있으실까요?"
10065-100650200 = "아, 뭐, 그런 거라면야, 얼마든지."
10065-100650210 = "네, 그럼 오시는 것을 기쁜 마음으로 기다리고 있겠습니다."
10065-100650220 = "응. 바로 갈게."
10065-100650230 = "저, 쿠와카미 카호. 오늘 하루 선생님을 완벽하게 에스코트하겠습니다."
10065-100650240 = "……응? 잠깐, 에스코트라니……? "
10065-100650250 = "선생님, 오늘 시간 괜찮으실까요?"
10065-100650260 = "아, 카호. 시간이라면 문제없는데. 어쩐 일이야?"
10065-100650270 = "일전의 약속을 이루고 싶어서…."
10065-100650280 = "그러니까 그… "
10065-100650290 = "에스코트를 해드리고자 이렇게 다시금 연락하였습니다."
10065-100650300 = "그래서 말이지만, 선생님. 만약 괜찮으시다면…."
10065-100650310 = "응, 괜찮아. 바로 갈게."
10065-100650320 = "네. 감사합니다."
10065-100650330 = "그럼 잠시 후 뵙겠습니다."
10065-100650340 = "후후훗."
10065-100650350 = "카호? 뭔가 좋은 일이라도 있었어…?"
10065-100650360 = "선생님. 놀라지 말고 들어주세요."
10065-100650370 = "드디어… 마침내."
10065-100650380 = "드디어… 마침내?"
10065-100650390 = "저희 음양부에서 이번에 새롭게 특별 발주한 백귀야행 홍보용 굿즈가 도착했답니다!"
10065-100650400 = "과연, 축하해."
10065-100650410 = "흠흠. 괜찮으시다면, 선생님께도 나눠드리고 싶은데. 어떠신가요?"
10065-100650420 = "물론…. 괜찮으시다면…의 이야기입니다만."
10065-100650430 = "앗, 고마워! 그럼 지금 바로 갈게."
10065-100650440 = "후훗. 네. 기다리고 있겠습니다."
10065-100650450 = "선생님, 안녕하십니까. 카호입니다."
10065-100650460 = "내일 업무차 음양부에 들르신다는 소식을 들었습니다."
10065-100650470 = "응, 맞아. 그렇게 됐네."
10065-100650480 = "후훗, 또 뵐 수 있게 되어 즐겁네요."
10065-100650490 = "업무가 끝나면 휴게실에서 차라도 한잔하고 가시는 건 어떠신가요?"
10065-100650500 = "청결하고 정돈된 분위기에서 휴식을 취하면 이후 업무의 능률도 오를 테니까요."
10065-100650510 = "물론, 사양할 이유가 없지."
10065-100650520 = "감사합니다."
10065-100650530 = "그럼 기다리고 있겠습니다."

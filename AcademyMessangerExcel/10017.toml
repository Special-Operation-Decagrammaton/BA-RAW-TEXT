[translation]
10017-100170010 = "歡呼吧，同志！"
10017-100170020 = "為了表揚同志至今為止的努力"
10017-100170030 = "我等赤冬聯邦學園將授予同志新的勳章"
10017-100170040 = "「特別友好章」！"
10017-100170050 = "咦……特別友好章不是已經拿過了嗎？"
10017-100170060 = "說什麼呢，上次授予的勳章是「特別友情章」！"
10017-100170070 = "勳章的種類可不能弄錯"
10017-100170080 = "有那麼多種勳章啊……"
10017-100170090 = "在赤冬，為了表揚對學園發展做出巨大貢獻的人"
10017-100170100 = "共有247種勳章"
10017-100170110 = "數量好驚人。潔莉諾有多少勳章？"
10017-100170120 = "呵呵，真是愚蠢的問題啊。同志"
10017-100170130 = "……247種，全部！"
10017-100170140 = "看吧，同志。下面是咱親自完成的新勳章設計！"
10017-100170160 = "呵呵，光看設計就覺得閃閃發光對吧？"
10017-100170170 = "我覺得很棒！"
10017-100170180 = "……盡力了呢！"
10017-100170190 = "呵呵，再多稱讚幾句也可以唷！"
10017-100170200 = "說不定咱也有當設計師的資質……！"
10017-100170210 = "唔……"
10017-100170220 = "吶，同志有什麼不喜歡的食物嗎？"
10017-100170230 = "這麼突然，怎麼了？"
10017-100170240 = "咱討厭青椒。味道又苦又怪！"
10017-100170250 = "唔……難吃到這地步，甚至可以稱為惡魔的食物"
10017-100170260 = "挑食對身體不好唷？"
10017-100170270 = "不是挑食！生而為人，吃不了青椒是正常的！"
10017-100170280 = "這麼簡單的真理，為什麼大家都不能理解呢……"
10017-100170290 = "呵呵呵，同志"
10017-100170300 = "沒忘記之前說好要買布丁給我吧？"
10017-100170310 = "當然記得"
10017-100170320 = "不愧是同志，不是那種只會嘴巴說說的大人"
10017-100170330 = "好不容易讓同志請客，為了能多吃一點"
10017-100170340 = "咱今天中午甚至沒吃零食呢！呵呵，好期待啊……！"
10017-100170350 = "今天放學後，咱在店門口等著，別遲到！"
10017-100170360 = "我好像沒有說要買很多耶……？"
10017-100170370 = "同志，往外看！"
10017-100170380 = "是雪，雪下得好大呀！"
10017-100170390 = "夏萊是萬里無雲的晴天……"
10017-100170400 = "什麼！那現在就來赤冬聯邦學園吧！"
10017-100170410 = "在這裡不管是雪人還是雪兔，想做多少就做多少！"
10017-100170420 = "工作結束後就去唷"
10017-100170430 = "不行！雪不知道什麼時候就會停了，時間可沒有那麼充裕！"
10017-100170440 = "現在馬上！現在馬上過來！"
10017-100170450 = "同志有什麼會怕的東西嗎？"
10017-100170460 = "唔嗯，妖怪之類的吧……"
10017-100170470 = "怕饅頭"
10017-100170480 = "呵呵。怕妖怪啊，同志也有像孩子一樣的地方呢"
10017-100170490 = "別擔心，同志。就算妖怪真的出現了，咱也會打倒他！"
10017-100170500 = "饅頭是指那個甜饅頭嗎？怕那個是怎麼回事？"
10017-100170510 = "同志有時會說些讓人搞不懂的話呢……"
10017-100170520 = "潔莉諾有怕什麼東西嗎？"
10017-100170530 = "咱，咱怎麼可能有害怕的東西！"
10017-100170540 = "對偉大的領導者來說，恐懼是不必要的情緒！"
10017-100170550 = "咱身為赤冬學聯邦學園的學生會長、兼書記長、兼環境美化部長、兼清掃部長，無所畏懼！"

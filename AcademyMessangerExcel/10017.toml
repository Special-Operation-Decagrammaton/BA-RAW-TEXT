[translation]
10017-100170010 = "기뻐하게나, 콤라드."
10017-100170020 = "콤라드의 노력을 치하하기 위해"
10017-100170030 = "우리 붉은겨울 연방학원에서 콤라드에게"
10017-100170040 = "<특별 학생 우호 훈장>을 수여하기로 했다네!"
10017-100170050 = "특별 학생 우호 훈장은 지난번에도 받지 않았어?"
10017-100170060 = "무슨 소리인가. 지난번에 수여한 훈장은 <특별 학생 우정 훈장> 이었다고."
10017-100170070 = "훈장의 종류를 벌써부터 헷갈리면 어쩌자는 건가."
10017-100170080 = "훈장이 몇 종류나 있는 거야……."
10017-100170090 = "붉은겨울 연방학원에서는 학원의 발전에 크게 기여한 학생들을 표창하기 위해"
10017-100170100 = "총 247가지의 훈장을 보유하고 있지."
10017-100170110 = "체리노는 그중 몇 가지의 훈장을 받았어?"
10017-100170120 = "후후, 어리석은 질문이로군. 콤라드."
10017-100170130 = "……247종 전부다!"
10017-100170140 = "이것 보거라, 콤라드. 이 몸이 그린 새로운 훈장의 디자인이니라!"
10017-100170160 = "후후, 디자인만으로도 광채가 나지 않느냐?"
10017-100170170 = "인상적이네."
10017-100170180 = "이런 디자인의 훈장은 처음 봐……."
10017-100170190 = "그렇지? 좀 더 칭찬해도 괜찮느니라!"
10017-100170200 = "어쩌면 이 몸에게는 훌륭한 디자이너의 자질이 있을지도……!"
10017-100170210 = "우으……."
10017-100170220 = "콤라드에게는 특별히 가리는 음식이 있는가?"
10017-100170230 = "갑자기 가리는 음식은 왜?"
10017-100170240 = "이 몸은 피망이 싫다네. 맵고, 쓰고, 아린 맛이 나지 않는가!"
10017-100170250 = "으으……. 그 끔찍한 맛은 악마의 열매라고 해도 좋을 정도라네!"
10017-100170260 = "편식은 몸에 나빠."
10017-100170270 = "편식이 아니야! 피망을 싫어하는 건 사람이면 당연한 거라고!"
10017-100170280 = "이렇게 간단한 진리를 학생들은 어째서 깨닫지 못하는 건지……."
10017-100170290 = "후후후, 콤라드."
10017-100170300 = "지난번에 시내에서 푸딩을 사주겠다는 약속은 잊지 않았겠지?"
10017-100170310 = "물론 잊지 않고 있어."
10017-100170320 = "역시 콤라드야. 말뿐인 약속을 늘어놓는 어른들과는 다르다니까."
10017-100170330 = "콤라드가 사주는 푸딩을 잔뜩 먹기 위해"
10017-100170340 = "오늘은 점심 간식도 거르고 기대하고 있었느니라."
10017-100170350 = "오늘 방과 후, 가게 앞에서 기다리고 있을 테니 늦으면 안 돼!"
10017-100170360 = "푸딩을 여러 개 사주겠다는 말은 한 적이 없는 것 같은데……."
10017-100170370 = "콤라드, 어서 창밖을 보게나!"
10017-100170380 = "눈이야, 눈이 내리고 있다고!"
10017-100170390 = "샬레는 구름 한 점 없이 화창한데."
10017-100170400 = "그럼 바로 붉은겨울 자치구로 오게나!"
10017-100170410 = "이곳에 오면 눈사람도, 눈토끼도 원하는 만큼 만들 수 있다고!"
10017-100170420 = "일이 끝나고 갈게."
10017-100170430 = "안 돼! 눈이 언제 그치고 녹아버릴지도 모르는데, 여유를 부릴 틈은 없다고!"
10017-100170440 = "지금 당장, 바로 오게나!"
10017-100170450 = "콤라드. 콤라드는 특별히 무서워하는 게 있는가?"
10017-100170460 = "나는 귀신이 무서워."
10017-100170470 = "나는 만쥬가 무서워."
10017-100170480 = "후후, 귀신을 무서워하다니 콤라드도 어린아이 같은 구석이 있군."
10017-100170490 = "걱정 말게나, 콤라드. 설령 귀신이 정말로 나타나더라도 이 몸이 무찔러줄 테니!"
10017-100170500 = "으응? 달콤한 만쥬가 무섭다니, 그게 무슨 소리인가?"
10017-100170510 = "콤라드도 알 수 없는 소리를 자꾸 하는군……."
10017-100170520 = "체리노는 무얼 무서워해?"
10017-100170530 = "그 무슨 망언인가! 이 몸이 무서워하는 것이라니!"
10017-100170540 = "위대한 지도자에게 공포란 불필요한 감정!"
10017-100170550 = "붉은겨울 학원의 서기장이자 학생회장이자, 미화부장이자, 청소부장인 이 몸에게 두려움 따윈 없느니라!"

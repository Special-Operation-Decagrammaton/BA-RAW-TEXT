[translation]
10017-100170010 = "You should be happy, Comrade."
10017-100170020 = "To commend a fellow comrade's efforts,"
10017-100170030 = "Red Winter Federal Academy has decided to award you..."
10017-100170040 = "the Special Student Friendship Medal!"
10017-100170050 = "Wait, didn't I get the Special Student Friendship Medal last time too?"
10017-100170060 = "What are you talking about? Last time it was the Special Student Cordiality Medal."
10017-100170070 = "How could you get the names mixed up?"
10017-100170080 = "How many different awards are there?"
10017-100170090 = "Red Winter Federal Academy has a total of 247 different medals to"
10017-100170100 = "award students who contribute greatly to the advancement of our academy."
10017-100170110 = "How many medals have you gotten, Cherino?"
10017-100170120 = "What a foolish question, Comrade."
10017-100170130 = "...I've been awarded all 247 medals!"
10017-100170140 = "Look here, Comrade. This is the newest medal, designed by yours truly!"
10017-100170160 = "Heehee! Isn't this the most incredible design you've ever seen?"
10017-100170170 = "It's impressive, all right."
10017-100170180 = "I've never seen a design like this before..."
10017-100170190 = "Right? Don't be shy, tell me how great it is!"
10017-100170200 = "I might just be a genius designer!"
10017-100170210 = "Um..."
10017-100170220 = "Are there any foods you don't like, Comrade?"
10017-100170230 = "What? Foods I don't like?"
10017-100170240 = "I hate bell peppers. They're spicy, bitter, and strange!"
10017-100170250 = "Ugh... If you ask me, they may as well be called the fruit of death."
10017-100170260 = "Being picky isn't good for your body."
10017-100170270 = "It's not being picky! Everyone hates bell peppers!"
10017-100170280 = "Why don't the students understand something so obvious?"
10017-100170290 = "Hahaha, Comrade. "
10017-100170300 = "You didn't forget your promise from last time to buy me pudding, right?"
10017-100170310 = "Of course not."
10017-100170320 = "I knew it. Adults always know how to keep their promises."
10017-100170330 = "I skipped lunch and snack time today"
10017-100170340 = "just so I can eat the puddings you're gonna buy me."
10017-100170350 = "I'll be waiting in front of the store after school today. Don't be late!"
10017-100170360 = "I don't remember saying I'd buy you more than one..."
10017-100170370 = "Look out the window, Comrade!"
10017-100170380 = "There's snow! It's snowing!"
10017-100170390 = "It's sunny outside Schale... Not a cloud in sight."
10017-100170400 = "Then come to the Red Winter district right away!"
10017-100170410 = "If you come here, you can make as many snowmen and snow rabbits as you want!"
10017-100170420 = "I'll be there right after work."
10017-100170430 = "No! You never know when the snow will stop! You have to come right now!"
10017-100170440 = "Come right now! Now!"
10017-100170450 = "What are you afraid of, Comrade?"
10017-100170460 = "I'm afraid of ghosts."
10017-100170470 = "I'm afraid of manju."
10017-100170480 = "Haha! You're afraid of ghosts? That's pretty childish, Comrade."
10017-100170490 = "Don't worry, Comrade. I'll bust any ghost before it can get you!"
10017-100170500 = "Huh? How can anyone be afraid of manju? It's delicious and sweet."
10017-100170510 = "You're a strange one, Comrade..."
10017-100170520 = "What are you afraid of, Cherino?"
10017-100170530 = "What are you talking about? I'm not afraid of anything!"
10017-100170540 = "Fear has no place in the heart of a great leader!"
10017-100170550 = "I am the Great Leader, esteemed Student Council president, Beautifier of Lands, and Chief of Sanitation of Red Winter Academy! I don't fear a thing!"

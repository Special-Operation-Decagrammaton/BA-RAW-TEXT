[translation]
20010-200100010 = "Great work today performing your official duties."
20010-200100020 = "As long as it's okay with you, I would like to take care of your tired body."
20010-200100030 = "...What are you up to?"
20010-200100040 = "How rude! I'm just trying to be polite!"
20010-200100050 = "Oh!"
20010-200100060 = "It's nothing, Sensei. Haha..."
20010-200100070 = "...Is there a problem?"
20010-200100080 = "No, I just had a change of heart."
20010-200100090 = "I learned a lot from running the hot springs resort last time."
20010-200100100 = "From how to clean the hot baths to how to organize the inventory of bath products..."
20010-200100110 = "However, I lacked in the area of hospitality, so I think I may have inconvenienced the guests."
20010-200100120 = "So to prevent making mistakes again, I'm going to practice in advance."
20010-200100130 = "In other words...it's hot springs training!"
20010-200100140 = "Ugh... The training I did last time was a complete failure."
20010-200100150 = "I had no clue that kaiseki cuisine was so elaborate and diverse..."
20010-200100160 = "As someone who ate rationed food everyday, it was a whole new unimaginable world."
20010-200100170 = "But thanks to that, I learned something new."
20010-200100180 = "The most important facility in a hot springs resort...is the hot bath!"
20010-200100190 = "That's normally the case."
20010-200100200 = "A hot springs resort is literally an establishment for enjoying hot springs."
20010-200100210 = "If we have great hot baths, guests will naturally flock to us."
20010-200100220 = "So this time I'm going to focus on keeping the hot baths clean!"
20010-200100230 = "...Where?"
20010-200100240 = "After training several times, I finally came to a realization."
20010-200100250 = "Hospitality ultimately lies in the attitude of the staff, rather than the provision of fine cuisine or facilities..."
20010-200100260 = "Wouldn't delicious food be more important?"
20010-200100270 = "Wouldn't great hot baths be more important?"
20010-200100280 = "Ha"
20010-200100290 = "But we can't do that."
20010-200100300 = "We can't prepare expensive dishes or offer great facilities with the funds we have..."
20010-200100310 = "Anyway, I would like to take this opportunity to undertake special training to learn the ways of a dignified hot springs resort owner."
20010-200100320 = "In other words...it's etiquette training!"
20010-200100330 = "Sensei..."
20010-200100340 = "Is something wrong?"
20010-200100350 = "No, not at all. Except..."
20010-200100360 = "Since you carried me around when I injured one of my legs,"
20010-200100370 = "I was thinking maybe something better would have happened if the other foot was injured as well..."
20010-200100380 = "Don't have such terrible thoughts!"
20010-200100390 = "The ankle I sprained before isn't getting better."
20010-200100400 = "It doesn't really bother me during my daily routine, but it's still a bit painful..."
20010-200100410 = "At this rate, it'll get in the way of my hot springs training."
20010-200100420 = "I heard there are hot springs for therapeutic bathing around here..."
20010-200100430 = "If it's okay with you, would you like to go with me this weekend?"
20010-200100440 = "Yes, I'll go. Thank you."
20010-200100450 = "Oh."
20010-200100460 = "H—"
20010-200100470 = "Huhhh?!"
20010-200100480 = "You're entering the hot bath with me, Sensei?"

[translation]
20010-200100010 = "您今天也工作辛苦了"
20010-200100020 = "如果老師不嫌棄的話，務必讓我照顧您疲憊的身體，您覺得怎麼樣？"
20010-200100030 = "……吃了什麼奇怪的東西嗎？"
20010-200100040 = "只是關心一下而已，這麼說不會太過份了嗎！？"
20010-200100050 = "啊"
20010-200100060 = "什，什麼都沒有。請不要介意，哦呵呵……"
20010-200100070 = "沒事吧？發生了什麼事？"
20010-200100080 = "不，該說是一點心境的變化嗎……"
20010-200100090 = "之前經營溫泉浴場的時候，學到了很多東西"
20010-200100100 = "從將浴室打掃乾淨的方法，到整理各種物品的庫存……"
20010-200100110 = "但特別是接待客人這方面做得還不夠好，總覺得自己好像對老師和客人們做了失禮的事"
20010-200100120 = "因此，為了下次不再失敗，我想預先練習一下"
20010-200100130 = "也就是……修行！"
20010-200100140 = "之前的修行完全失敗了"
20010-200100150 = "沒想到會席料理竟然是那麼厲害的東西……"
20010-200100160 = "對於每天幾乎只吃配給品的我來說，是個過於未知的世界……"
20010-200100170 = "但是我不會氣餒，因為還有很多必須做的事"
20010-200100180 = "接下來該著手的，是溫泉浴場最重要的設施……溫泉！"
20010-200100190 = "原來如此"
20010-200100200 = "溫泉浴場顧名思義，是以溫泉為中心"
20010-200100210 = "照理來說只要有出色的溫泉，客人們自然會聚集過來"
20010-200100220 = "所以這次，要努力打掃浴室！"
20010-200100230 = "……掃哪裡？"
20010-200100240 = "經過這些修行，我領悟到了"
20010-200100250 = "接待客人的精髓不是料理和設施……而是員工的態度！"
20010-200100260 = "原來如此。再加上好吃的料理就完美了"
20010-200100270 = "原來如此。再加上出色的溫泉就完美了"
20010-200100280 = "說，說的也是……"
20010-200100290 = "但是，該說後者一時之間很難辦到嗎"
20010-200100300 = "因為光憑我們的資金，很難提供昂貴的料理和豪華的設施……"
20010-200100310 = "總之先從能做到的事開始！這次我想學習，像溫泉女將一樣有氣質的行為舉止"
20010-200100320 = "也就是……學習禮儀！"
20010-200100330 = "老師"
20010-200100340 = "怎麼了？"
20010-200100350 = "不，沒什麼大不了的……"
20010-200100360 = "只是扭了一隻腳就能讓老師背的話"
20010-200100370 = "如果另一隻腳也受傷的話，老師會為我做更好的事嗎……"
20010-200100380 = "總之，拜託先打消你那種意圖……"
20010-200100390 = "從那之後腳一點一點地變好了，但感覺沒有痊癒"
20010-200100400 = "雖然日常生活沒有大礙，但正常走路的話會有點痛……"
20010-200100410 = "學習禮儀還真不容易啊……"
20010-200100420 = "這麼說來，前陣子聽說有個溫泉很適合做溫泉治療"
20010-200100430 = "我送你過去，這個週末有空嗎？"
20010-200100440 = "非，非常感謝"
20010-200100450 = "那麼，週末見"
20010-200100460 = "等"
20010-200100470 = "等ㄧ"
20010-200100480 = "等一下，是和老師一起泡溫泉嗎？"

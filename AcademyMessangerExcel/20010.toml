[translation]
20010-200100010 = "ขอบคุณที่ปฏิบัติงานอย่างหนัก\nในวันนี้นะคะ"
20010-200100020 = "ถ้าคุณครูไม่ว่าอะไร ฉันอยากจะ\nคอยช่วยดูแลให้คุณครูคลายเหนื่อย\nดีไหมคะ?"
20010-200100030 = "เอ่อ... วันนี้มาแนวไหนน่ะ?"
20010-200100040 = "ฉันอุตส่าห์ทักทายอย่างสุภาพแล้ว\nแท้ๆ ทำไมถึงถามอะไรแบบนั้นล่ะคะ\nมันเสียมารยาทนะคะ!"
20010-200100050 = "อ๊ะ?!"
20010-200100060 = "ไม่มีอะไรหรอกค่ะคุณครู โฮะโฮะ..."
20010-200100070 = "มีเรื่องอะไรงั้นเหรอ?"
20010-200100080 = "เปล่าค่ะ ก็แค่เกิดการเปลี่ยนแปลงทาง\nจิตใจนิดหน่อยค่ะ"
20010-200100090 = "ฉันได้เรียนรู้หลายอย่างจากการดูแล\nออนเซ็นครั้งที่แล้วค่ะ"
20010-200100100 = "ตั้งแต่วิธีทำความสะอาดบ่อออนเซ็นให้\nสะอาดหมดจด ไปจนถึงการจัดเรียง\nอุปกรณ์อาบน้ำ..."
20010-200100110 = "แต่ฉันยังบกพร่องเรื่องการต้อนรับลูกค้า\nอยู่มาก เหมือนฉันจะเสียมารยาทกับลูกค้า\nที่มาที่ออนเซ็นในหลายๆ เรื่องเลยค่ะ"
20010-200100120 = "ดังนั้นคราวหน้าฉันจะฝึกฝนเอาไว้ก่อน เพื่อไม่ให้เกิดความผิดพลาดอีกค่ะ"
20010-200100130 = "หรือพูดอีกอย่างก็คือ...\nฉันจะไปฝึกที่ออนเซ็นค่ะ!"
20010-200100140 = "ฮือ... การฝึกฝนครั้งที่แล้วมัน\nล้มเหลวไม่เป็นท่าเลยค่ะ"
20010-200100150 = "ไม่นึกเลยว่าอาหารสไตล์ไคเซกิ\nจะสวยงามน่ากินแบบนั้น..."
20010-200100160 = "ในฐานะที่เป็นคนที่กินอาหารชุดที่จัดมา\nให้ทุกวันแบบฉัน มันเป็นโลกที่ฉันจินตนาการ\nไม่ถึงเลยค่ะ..."
20010-200100170 = "แต่ว่าเพราะคุณครูเลยนะคะ ทำให้ฉันได้เปิดโลกใหม่ๆ ที่ไม่เคยรู้จักค่ะ"
20010-200100180 = "อุปกรณ์ที่สำคัญที่สุดในออนเซ็น\nก็คือ... ออนเซ็นค่ะ!"
20010-200100190 = "มันก็ต้องแบบนั้นน่ะสิ"
20010-200100200 = "อุปกรณ์ที่จะช่วยให้เพลิดเพลินกับ\nน้ำพุร้อนได้สมชื่อ"
20010-200100210 = "ถ้ามีออนเซ็นดีๆ ล่ะก็ ลูกค้าก็จะมาใช้บริการเองไงล่ะคะ"
20010-200100220 = "เพราะงั้นคราวนี้ ฉันจะเน้นที่การดูแล\nรักษาความสะอาดของออนเซ็นค่ะ!"
20010-200100230 = "ที่ไหนนะ...?"
20010-200100240 = "จากการฝึกฝนหลายๆ ครั้ง ในที่สุดฉันก็ได้รู้แล้วค่ะ"
20010-200100250 = "การบริการที่ดีของพนักงานเป็นสิ่ง\nสำคัญมากกว่าการมีอุปกรณ์ดีๆ\nหรือว่าอาหารเลิศรส..."
20010-200100260 = "อาหารอร่อยๆ ไม่สำคัญกว่าเหรอ?"
20010-200100270 = "บ่อน้ำร้อนดีๆ ไม่สำคัญกว่าเหรอ?"
20010-200100280 = "เฮ้อ..."
20010-200100290 = "แต่ช่วยไม่ได้นี่คะ"
20010-200100300 = "แต่จากเงินที่เรามีอยู่ เราเลยเตรียมอุปกรณ์ หรืออาหารราคาแพงๆ ไม่ได้น่ะค่ะ..."
20010-200100310 = "แต่คราวนี้ฉันตั้งใจว่าจะไปฝึกพิเศษ\nเพื่อให้เหมาะสมกับการเป็นนายหญิง\nแห่งออนเซ็นค่ะ"
20010-200100320 = "หรือก็คือ... ฉันจะไปฝึกมารยาทค่ะ"
20010-200100330 = "คุณครู..."
20010-200100340 = "มีอะไรรึเปล่า?"
20010-200100350 = "เปล่าค่ะ ไม่มีอะไรค่ะ แต่ว่า..."
20010-200100360 = "ขาฉันเจ็บและคุณครูก็คงจะช่วยอุ้มฉันไปได้..."
20010-200100370 = "ถ้าเกิดขาอีกหนึ่งข้างเจ็บขึ้นมาล่ะก็\nอาจจะทำให้เกิดเรื่องไม่ดีขึ้นก็ได้..."
20010-200100380 = "อย่าคิดอะไรไม่ดีแบบนั้นสิ!"
20010-200100390 = "ข้อเท้าแพลงเมื่อวันก่อนยังไม่ดี\nขึ้นเลยค่ะ"
20010-200100400 = "ถึงจะไม่ได้เดินลำบากอะไรแล้ว\nแต่ว่าก็ยังมีเจ็บอยู่บ้าง..."
20010-200100410 = "ถ้าเป็นแบบนี้ มันก็จะเป็นอุปสรรค\nต่อการฝึกฝนที่ออนเซ็นค่ะ"
20010-200100420 = "ครูได้ยินว่าแถวๆ นี้\nมีออนเซ็นที่ช่วยบำบัดอยู่..."
20010-200100430 = "ถ้าสะดวกละก็ จะไปที่นั่นกับครู\nตอนสุดสัปดาห์นี้ไหมล่ะ?"
20010-200100440 = "ค่ะ ฉันจะไปค่ะ ขอบคุณนะคะ"
20010-200100450 = "อา..."
20010-200100460 = "คะ..."
20010-200100470 = "คะะะะ?!"
20010-200100480 = "ไปออนเซ็นกับคุณครูเหรอคะ?"

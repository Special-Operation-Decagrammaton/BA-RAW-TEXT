[translation]
20010-200100010 = "오늘도 공무를 수행하시느라 대단히 수고 많으셨습니다."
20010-200100020 = "선생님만 괜찮으시다면 피곤하신 몸을 돌봐 드리고 싶은데, 어떠신지요?"
20010-200100030 = "……이건 무슨 컨셉이야?"
20010-200100040 = "사람이 모처럼 예의를 차려 인사를 했는데 무슨 컨셉이냐니, 실례잖아요!"
20010-200100050 = "앗"
20010-200100060 = "아무것도 아니랍니다, 선생님. 호호……."
20010-200100070 = "……무슨 문제라도 있는 거야?"
20010-200100080 = "아뇨. 그저 심경의 변화가 생겼을 뿐이에요."
20010-200100090 = "지난 온천장 운영을 통해 저는 여러 가지를 배웠답니다."
20010-200100100 = "탕을 깨끗하게 청소하는 법부터, 목욕용품의 재고 정리까지……."
20010-200100110 = "하지만 접객에는 부족함이 많았던 탓에, 온천장을 찾아 주신 손님들께 여러모로 실례를 저지른 것 같아요."
20010-200100120 = "그래서 다음번에는 실수하지 않도록 미리 예행연습을 해두려고요."
20010-200100130 = "다시 말하자면…… 온천 수행입니다!"
20010-200100140 = "으으…… 지난번의 수행은 완전히 실패였어요."
20010-200100150 = "설마 가이세키 요리라는 게 그렇게나 다채로운 것일 줄이야……"
20010-200100160 = "매일 배급 식품만 먹어왔던 저로서는 상상도 하지 못할 세계였어요."
20010-200100170 = "하지만 그 덕분에 새로이 깨닫게 된 사실도 있답니다."
20010-200100180 = "온천장에서 가장 중요한 시설은…… 욕탕이라는 사실을요!"
20010-200100190 = "보통은 그렇지."
20010-200100200 = "온천장은 말 그대로 온천을 즐기기 위한 시설."
20010-200100210 = "훌륭한 욕탕을 갖추고 있다면 손님은 자연히 모여드는 법이니까요."
20010-200100220 = "그래서 이번에는 욕탕을 깨끗이 정비하는 데 집중하려고요!"
20010-200100230 = "……어디서?"
20010-200100240 = "여러 차례의 수행을 통해 드디어 저는 깨달았답니다."
20010-200100250 = "궁극의 접객은 훌륭한 요리나 시설을 제공하는 것보다 종업원의 태도에 있다는 것을……"
20010-200100260 = "맛있는 요리가 더 중요하지 않을까?"
20010-200100270 = "훌륭한 욕탕이 더 중요하지 않을까?"
20010-200100280 = "하"
20010-200100290 = "하지만 할 수 없잖아요?"
20010-200100300 = "저희가 갖고 있는 돈만으로는 비싼 요리나 시설을 준비할 수는 없으니까요……."
20010-200100310 = "여하튼 이번 기회에 온천장의 여주인다운 기품 있는 몸가짐을 갖출 수 있도록, 특별한 훈련을 하고자 합니다."
20010-200100320 = "다시 말하자면…… 예절 수행입니다!"
20010-200100330 = "선생님……."
20010-200100340 = "무슨 문제라도 있어?"
20010-200100350 = "아뇨. 문제는 없어요. 다만……"
20010-200100360 = "한쪽 발을 다치고 선생님께 업힐 수 있었으니"
20010-200100370 = "다른 발도 다쳤으면 더 좋은 일이 생기지 않았을까 싶어서……."
20010-200100380 = "그런 나쁜 생각은 하면 안 돼!"
20010-200100390 = "전에 삐끗한 발목이 좀처럼 낫지를 않네요."
20010-200100400 = "일상을 보내는 데 큰 불편은 없지만 통증이 약간 남아 있어서……."
20010-200100410 = "이대로라면 온천 수행을 하는 데 지장이 생겨버려요."
20010-200100420 = "이 근처에 탕치에 좋은 온천이 있다고 하는데……"
20010-200100430 = "괜찮으면 이번 주말에 같이 가지 않을래?"
20010-200100440 = "네, 갈게요. 감사합니다."
20010-200100450 = "아"
20010-200100460 = "ㄴ"
20010-200100470 = "네ㄴ?!"
20010-200100480 = "선생님이랑 같이 탕에 들어간다고요?"

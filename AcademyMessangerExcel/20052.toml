[translation]
20052-200520010 = "請從下列的選項中"
20052-200520020 = "選擇出版部想在赤冬生存下去"
20052-200520030 = "必須採取的行動。(4分)"
20052-200520040 = "1.推廣閱讀"
20052-200520050 = "2.紙本書電子化"
20052-200520060 = "3.架設通訊線路"
20052-200520070 = "3號跟出版部沒關係吧？"
20052-200520080 = "總之請猜猜看吧"
20052-200520090 = "我不知道……"
20052-200520100 = "這樣啊"
20052-200520110 = "正確答案──就是3號"
20052-200520120 = "咦……？"
20052-200520130 = "如果希望了解詳情"
20052-200520140 = "歡迎蒞臨赤冬出版部"
20052-200520150 = "〈關於赤冬出版部與夏萊私領域接觸的──"
20052-200520160 = "──那場歷史性會面的達達主義綱領〉"
20052-200520170 = "以上是這次稿件的標題，老師覺得怎麼樣呢？"
20052-200520180 = "也太沉重了吧！"
20052-200520190 = "因為覺得還挺重要的"
20052-200520200 = "我本來想專門為此企劃一部特輯的說"
20052-200520210 = "只要普通地來當值日生就好……"
20052-200520220 = "老師"
20052-200520230 = "您來赤冬出差的行程到今天為止對吧？"
20052-200520240 = "沒錯。我正打算搭列車回去"
20052-200520250 = "咦……？"
20052-200520260 = "是我們學園的列車嗎……？"
20052-200520270 = "有什麼問題嗎？"
20052-200520280 = "唔嗯……"
20052-200520290 = "總之"
20052-200520300 = "我先去為老師送行吧"
20052-200520310 = "平安到家了嗎，老師"
20052-200520320 = "託您的福，我看見了很美的風景"
20052-200520330 = "那真是太好了"
20052-200520340 = "仔細想想，問題的根源"
20052-200520350 = "好像還是出在我們學園的列車時刻表上"
20052-200520360 = "等等"
20052-200520370 = "要是赤冬的鐵路一直都這麼糟糕的話"
20052-200520380 = "是不是代表老師下次還會跟我一起來場列車之旅呢？"
20052-200520390 = "怎麼可能"
20052-200520400 = "說的也是……"
20052-200520410 = "在嗎"
20052-200520420 = "老師"
20052-200520430 = "在哦～"
20052-200520440 = "關於"
20052-200520450 = "事業"
20052-200520460 = "不對"
20052-200520470 = "關於出版部的事"
20052-200520480 = "該說是諮詢嗎"
20052-200520490 = "我想請教一下第三方的意見"
20052-200520500 = "去出版部找你就行了嗎？"
20052-200520510 = "咦？"
20052-200520520 = "是的"
20052-200520530 = "謝謝您"
20052-200520540 = "這種直接省略過程的說話方式"
20052-200520550 = "我也得學起來才行呢"
20052-200520560 = "老師"
20052-200520570 = "為什麼這個"
20052-200520580 = "會賣得這麼好啊"
20052-200520590 = "所謂不聽大人言"
20052-200520600 = "吃虧在眼前嘛！"
20052-200520610 = "總覺得有點不甘心……"
20052-200520620 = "不過銷售成果是不容否認的事實"
20052-200520630 = "唔嗯……"
20052-200520640 = "話說下次的《赤熊》特別專訪"
20052-200520650 = "我打算來做個跟老師的對談特輯～"
20052-200520660 = "請容我鄭重拒絕，總編"
20052-200520670 = "雖然早就料到您會這麼說……"
20052-200520680 = "不過我還是會經常去拜訪的"
20052-200520690 = "可能是為了尋找靈感"
20052-200520700 = "也可能沒什麼理由"
20052-200520710 = "隨時都歡迎你來哦"
20052-200520720 = "之後可不能反悔哦～？"

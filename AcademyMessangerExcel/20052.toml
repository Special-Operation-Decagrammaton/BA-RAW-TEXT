[translation]
20052-200520010 = "Pop quiz. Of the following,"
20052-200520020 = "select what the Publishing Department must do"
20052-200520030 = "to survive at Red Winter. (4 pts)"
20052-200520040 = "1. Encourage literacy"
20052-200520050 = "2. Convert written material to digital"
20052-200520060 = "3. Install communication lines"
20052-200520070 = "What does #3 have to do with publishing?"
20052-200520080 = "Answer the question"
20052-200520090 = "I don't know..."
20052-200520100 = "Incorrect. As I suspected"
20052-200520110 = "The correct answer is 3"
20052-200520120 = "Huh...?"
20052-200520130 = "If you seek more detailed answers, seek out"
20052-200520140 = "the Red Winter Publishing Department!"
20052-200520150 = "Prepare for \"A Dadaistic Thesis on Red Winter's Publishing Department"
20052-200520160 = "in a Historical and Clandestine Meeting with Schale\""
20052-200520170 = "How's that for a title?"
20052-200520180 = "It's too much!"
20052-200520190 = "I thought the length contributed to its importance"
20052-200520200 = "I considered printing a featured section for it..."
20052-200520210 = "Let's please keep it normal during your Student Rep visit..."
20052-200520220 = "Sensei"
20052-200520230 = "You said you were leaving Red Winter today, correct?"
20052-200520240 = "Yeah. I'll catch the train back."
20052-200520250 = "Really...?"
20052-200520260 = "OUR school's train...?"
20052-200520270 = "? Is there a problem?"
20052-200520280 = "Mmm..."
20052-200520290 = "Well"
20052-200520300 = "I'll see you off. How about that?"
20052-200520310 = "Did you get back safely, Sensei?"
20052-200520320 = "I had a great time, all thanks to you."
20052-200520330 = "That's nice to hear."
20052-200520340 = "But, as I consider it, I think it's clear that the root of the problem"
20052-200520350 = "is in our academy's shoddy train schedule."
20052-200520360 = "Wait, now."
20052-200520370 = "Does that mean that if the Red Winter's railroad continues to be terrible"
20052-200520380 = "you'll take me on another train trip?"
20052-200520390 = "No way."
20052-200520400 = "A likely story..."
20052-200520410 = "Are you there?"
20052-200520420 = "Sensei? Answer, please."
20052-200520430 = "I'm heeere."
20052-200520440 = "Okay"
20052-200520450 = "I have business"
20052-200520460 = "no"
20052-200520470 = "Publishing Department work"
20052-200520480 = "that requires consultation"
20052-200520490 = "an informed, outside opinion"
20052-200520500 = "You want me to come to the Publishing Department?"
20052-200520510 = "Hm?"
20052-200520520 = "Yes."
20052-200520530 = "That's what I meant. Thank you."
20052-200520540 = "A concise speech style..."
20052-200520550 = "I should practice that too."
20052-200520560 = "Sensei?"
20052-200520570 = "Why"
20052-200520580 = "am I SELLING SO MUCH?"
20052-200520590 = "Good things happen"
20052-200520600 = "when you listen to an experienced adult."
20052-200520610 = "That's infuriating..."
20052-200520620 = "But I can't deny the hard numbers"
20052-200520630 = "Mmm..."
20052-200520640 = "I was wondering if I could interview the great Sensei"
20052-200520650 = "for our next feature in the Red Bear."
20052-200520660 = "I respectfully decline, Chief Editor."
20052-200520670 = "That's what I thought..."
20052-200520680 = "But still, I'll have to visit you now and then"
20052-200520690 = "Whether it's for editorial inspiration"
20052-200520700 = "...or simply for the sake of it."
20052-200520710 = "Drop by anytime."
20052-200520720 = "Famous last words."

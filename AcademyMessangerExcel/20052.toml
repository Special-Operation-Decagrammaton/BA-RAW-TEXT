20052-200520600 = "자다가도 떡이 생기는 법이란다."
20052-200520610 = "뭔가 조금 분하네요……"
20052-200520620 = "하지만 매출 결과를 부정해서는 안 되는 법이니"
20052-200520630 = "으음"
20052-200520640 = "다음에는 <붉은 곰>의 특별 인터뷰로"
20052-200520650 = "선생님과의 대담 특집을 잡을까 하는데요."
20052-200520660 = "정중하게 거절하겠습니다. 편집장님."
20052-200520670 = "그러실 줄 알았지만요……"
20052-200520680 = "그래도 종종 찾아뵙겠습니다."

[translation]
20052-200520010 = "다음 중 붉은겨울에서"
20052-200520020 = "출판부가 살아남기 위해"
20052-200520030 = "해야 하는 일을 고르시오. (4점)"
20052-200520040 = "1. 독서 권장하기"
20052-200520050 = "2. 전자책 스캔하기"
20052-200520060 = "3. 통신선 설치하기"
20052-200520070 = "3번은 관계없지 않아?"
20052-200520080 = "그래도 한번 맞춰 보시죠"
20052-200520090 = "모르겠는데……"
20052-200520100 = "그럴 겁니다"
20052-200520110 = "정답은, 바로 그 3번이거든요"
20052-200520120 = "어……?"
20052-200520130 = "자세한 해설을 원하시는 당신을"
20052-200520140 = "붉은겨울 출판부로 초대합니다"
20052-200520150 = "<붉은겨울의 출판부가 샬레와 사적 영역으로 접촉하는>"
20052-200520160 = "<그 역사적인 만남에 대한 다다이즘적 테제>"
20052-200520170 = "이번 원고 제목인데 어떠신가요"
20052-200520180 = "부담스러워!"
20052-200520190 = "나름대로 중요한 부분이라고 생각해서"
20052-200520200 = "특집 코너까지 준비할 생각이었는데요오"
20052-200520210 = "그냥 편하게 당번으로 와 다오……"
20052-200520220 = "선생님"
20052-200520230 = "붉은겨울 출장이 오늘 끝나신다고 하셨죠?"
20052-200520240 = "맞아. 그리고 기차를 타고 돌아가려고."
20052-200520250 = "네……?"
20052-200520260 = "우리 학원 기차요……?"
20052-200520270 = "? 무슨 문제라도 있어?"
20052-200520280 = "으음"
20052-200520290 = "일단"
20052-200520300 = "제가 마중이라도 나가겠습니다"
20052-200520310 = "잘 들어가셨습니까. 선생님."
20052-200520320 = "덕분에 좋은 구경했네요."
20052-200520330 = "그건 다행이네."
20052-200520340 = "생각해 보니 문제의 원인은"
20052-200520350 = "결국 우리 학원의 열차 시간표 때문이었던 것 같기도 한데"
20052-200520360 = "잠깐만요"
20052-200520370 = "그러면 붉은겨울의 철도가 계속 엉망이면"
20052-200520380 = "선생님이 다음에 또 열차 여행을 시켜 주신다는 뜻이 되지 않을까요?"
20052-200520390 = "되겠니."
20052-200520400 = "그렇겠죠오……"
20052-200520410 = "계신가요"
20052-200520420 = "선생님"
20052-200520430 = "있는데~"
20052-200520440 = "네에"
20052-200520450 = "사업"
20052-200520460 = "아니"
20052-200520470 = "출판부 일로"
20052-200520480 = "상담이라고 해야 할지"
20052-200520490 = "제3자의 의견을 구하고 싶어서 그러는데요"
20052-200520500 = "출판부로 가면 되지?"
20052-200520510 = "네?"
20052-200520520 = "네"
20052-200520530 = "감사합니다"
20052-200520540 = "중간 과정을 생략하는 화법"
20052-200520550 = "저도 배워야겠네요"
20052-200520560 = "선생님"
20052-200520570 = "이거"
20052-200520580 = "왜 장사가 잘되는 거죠"

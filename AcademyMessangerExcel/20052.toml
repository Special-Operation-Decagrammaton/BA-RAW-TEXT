[translation]
20052-200520010 = "จงเลือกสิ่งที่ต้องทำ"
20052-200520020 = "เพื่อให้ชมรมสื่อสิ่งพิมพ์"
20052-200520030 = "อยู่รอดได้ในเรดวินเทอร์ (4 คะแนน)"
20052-200520040 = "1. แนะนำการอ่านหนังสือ"
20052-200520050 = "2. สแกนอีบุ๊ก"
20052-200520060 = "3. ติดตั้งสายสื่อสาร"
20052-200520070 = "ข้อ 3 มันไม่เกี่ยวหรือเปล่า?"
20052-200520080 = "แต่ก็ลองเดาคำตอบดูเถอะค่ะ"
20052-200520090 = "ไม่รู้แฮะ..."
20052-200520100 = "ก็คงอย่างนั้นละค่ะ"
20052-200520110 = "คำตอบคือข้อ 3 ค่ะ"
20052-200520120 = "หืม...?"
20052-200520130 = "ถ้าอยากได้คำอธิบายอย่างละเอียด\nละก็"
20052-200520140 = "เชิญมาที่ชมรมสื่อสิ่งพิมพ์เรดวินเทอร์\nนะคะ"
20052-200520150 = "<ชมรมสื่อสิ่งพิมพ์ของเรดวินเทอร์\nติดต่อชาเล่ต์เป็นการส่วนตัว>"
20052-200520160 = "<การพบกันครั้งประวัติศาสตร์ที่\nทำลายกฎเกณฑ์เดิม>"
20052-200520170 = "นี่คือพาดหัวต้นฉบับครั้งนี้ค่ะ\nเป็นยังไงบ้างคะ?"
20052-200520180 = "แบบนี้ครูหนักใจนะ!"
20052-200520190 = "ฉันคิดว่ามันเป็นประเด็นสำคัญ"
20052-200520200 = "ก็เลยจะเตรียมคอลัมน์พิเศษไว้ด้วยค่ะ"
20052-200520210 = "แค่มาเข้าเวรเฉยๆ ก็พอแล้ว..."
20052-200520220 = "คุณครู"
20052-200520230 = "มาดูงานในเรดวินเทอร์วันนี้วันสุดท้าย\nใช่มั้ยคะ?"
20052-200520240 = "ใช่แล้ว เสร็จแล้วจะนั่งรถไฟกลับเลย"
20052-200520250 = "คะ...?"
20052-200520260 = "รถไฟของโรงเรียนเราน่ะเหรอคะ...?"
20052-200520270 = "มีปัญหาอะไรงั้นเหรอ?"
20052-200520280 = "อืม"
20052-200520290 = "เอาเป็นว่า"
20052-200520300 = "ฉันจะออกไปรับก่อนแล้วกันค่ะ"
20052-200520310 = "กลับไปถึงแล้วหรือยังคะ คุณครู"
20052-200520320 = "ขอบคุณนะคะ วันนี้ฉันสนุกมากเลย"
20052-200520330 = "งั้นก็โล่งอกไปทีนะ"
20052-200520340 = "พอมาคิดถึงต้นเหตุของปัญหา"
20052-200520350 = "ฉันว่าน่าจะเป็นเพราะตารางเดินรถไฟ\nของโรงเรียนเราค่ะ"
20052-200520360 = "เดี๋ยวก่อนนะ"
20052-200520370 = "ถ้าทางรถไฟของเรดวินเทอร์ยังมี\nปัญหาอยู่แบบนี้ละก็"
20052-200520380 = "ต่อไปคุณครูก็จะพาฉันนั่งรถไฟเที่ยว\nอีกหรือเปล่าคะ?"
20052-200520390 = "คงไม่น่านะ"
20052-200520400 = "ก็คงงั้นละค่ะ..."
20052-200520410 = "อยู่มั้ยคะ?"
20052-200520420 = "คุณครู"
20052-200520430 = "อยู่สิ~"
20052-200520440 = "ค่ะ"
20052-200520450 = "ฉันอยากปรึกษา"
20052-200520460 = "เรื่องธุรกิจ"
20052-200520470 = "ไม่สิ"
20052-200520480 = "เรื่องงานของชมรมสื่อสิ่งพิมพ์ค่ะ"
20052-200520490 = "พอดีฉันอยากได้ความเห็นจากบุคคล\nที่ 3 น่ะค่ะ"
20052-200520500 = "ให้ไปที่ชมรมสื่อสิ่งพิมพ์ใช่มั้ย?"
20052-200520510 = "คะ?"
20052-200520520 = "ใช่ค่ะ"
20052-200520530 = "ขอบคุณนะคะ"
20052-200520540 = "วิธีการพูดที่พาเข้าข้อสรุปเลย"
20052-200520550 = "ฉันเองก็ต้องเรียนรู้ไว้บ้างแล้วละค่ะ"
20052-200520560 = "คุณครู"
20052-200520570 = "สินค้ารอบนี้"
20052-200520580 = "ทำไมถึงขายดีแบบนี้ล่ะคะ?"
20052-200520590 = "นี่ละที่บอกว่า"
20052-200520600 = "เชื่อคำพูดของผู้ใหญ่แล้วจะได้ดีเอง"
20052-200520610 = "น่าเจ็บใจอยู่หน่อยนะคะ..."
20052-200520620 = "แต่ยังไงก็ไม่ควรปฏิเสธยอดขาย\nอยู่แล้ว"
20052-200520630 = "อืม..."
20052-200520640 = "คราวหน้าฉันว่าจะเพิ่มคอลัมน์"
20052-200520650 = "สัมภาษณ์พิเศษกับคุณครูใน\n<เรดแบร์> ค่ะ"
20052-200520660 = "ครูขอปฏิเสธดีกว่านะ คุณบรรณาธิการ"
20052-200520670 = "กะไว้แล้วค่ะว่าต้องเป็นแบบนี้..."
20052-200520680 = "แต่ยังไงก็จะแวะไปหาบ่อยๆ นะคะ"
20052-200520690 = "ไปเพื่อขอไอเดียดีๆ"
20052-200520700 = "หรือไม่ก็ไปหาเฉยๆ น่ะค่ะ"
20052-200520710 = "มาได้ตลอดเลย"
20052-200520720 = "พูดออกมาแล้ว ห้ามเสียใจภายหลัง\nนะคะ~?"

[translation]
10040-100400010 = "คะ... คุณครูคะ... "
10040-100400020 = "คือว่า ถะ...ถ้าคุณครูไม่ว่าอะไร..."
10040-100400030 = "ว่าไง สึคุโยะ? มีอะไรเหรอ?"
10040-100400040 = "ฉะ...ฉันมีเรื่องที่อยากปรึกษากับ\nคุณครู..."
10040-100400050 = "คุณครูพอจะมีเวลาหรือเปล่าคะ...?"
10040-100400060 = "อื้อ ได้อยู่แล้ว สำหรับสึคุโยะได้ตลอดเลยนะ!"
10040-100400070 = "คะ...ค่ะ! ขอบคุณค่ะ...! ถ้างั้นเดี๋ยวฉันส่ง\nโลเคชั่นไปให้นะคะ...!"
10040-100400080 = "คะ... คุณครูคะ... ถ้าคุณครูสะดวก..."
10040-100400090 = "วันนี้รบกวนมาช่วยฉันฝึกการเป็นนินจาได้\nหรือเปล่าคะ?"
10040-100400100 = "คะ... คงไม่ได้ใช่มั้ยคะ? ก็คุณครูมีงานยุ่ง\nตลอด... ถ้าอย่างนั้น..."
10040-100400110 = "ไม่เป็นไรหรอก ให้ครูไปที่ไหนล่ะ?"
10040-100400120 = "อ๊ะ ขอบคุณค่ะ ถ้างั้น... ช่วยมาที่สถานที่\nคราวก่อนด้วยนะคะ"
10040-100400130 = "คุณครู! คุณครูคะ!"
10040-100400140 = "คือว่า... ดูเหมือนฉันจะค้นพบบางอย่างที่\nยิ่งใหญ่แล้วค่ะ...!"
10040-100400150 = "ตะ...ตะ...ตอนนี้ฉันขอไปหาคุณครูได้มั้ยคะ?"
10040-100400160 = "อะ...อื้อ! มาได้ไม่มีปัญหา..."
10040-100400170 = "ถ้างั้นเดี๋ยวฉันไปหาที่ชาเล่ต์นะคะ!"
10040-100400180 = "คะ...คุณครูคะ...! "
10040-100400190 = "คือว่าหนังสือที่ดูเมื่อเช้านี้...! ดะ...ดูเหมือน\nจะเป็นแค่หนังสือล้อเลียนคุโนะอิจิเท่านั้น...\nไม่เกี่ยวกับวิชานินจาเลยค่ะ"
10040-100400200 = "อ๋อ... แบบนี้เอง"
10040-100400210 = "เพราะงั้นหน้าปกเลยดูแปลกๆ สินะ"
10040-100400220 = "ถึงคราวนี้จะโดนหลอกก็เถอะค่ะ..."
10040-100400230 = "แต่คราวหน้า...จะต้องหาหนังสือฝึกฝนวิชา\nของคุโนะอิจิมาให้ได้เลยค่ะ"
10040-100400240 = "ถ้าถึงตอนนั้นก็ขอรบกวนอีกครั้งนะคะ!"
10040-100400250 = "อะ...อื้อ สู้ๆ นะ..."
10040-100400260 = "ฮิฮิฮิ ค่ะ!"
10040-100400270 = "คุณครูคะ! เรื่องการฝึกวิชานินจาวันนี้!"
10040-100400280 = "ขะ...ขอรบกวนด้วยนะคะ!"
10040-100400290 = "อื้อ ถ้างั้นไปเจอที่ที่เราเคยนัดกันนะ"
10040-100400300 = "ฮิฮิฮิ!"
10040-100400310 = "ค่ะ!"

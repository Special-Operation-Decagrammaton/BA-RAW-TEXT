[translation]
10040-100400010 = "저어…. 서, 선생님…."
10040-100400020 = "혹시 괘, 괘, 괜찮으시다면…."
10040-100400030 = "응? 츠쿠요. 무슨 일이야?"
10040-100400040 = "사, 상담 드리고 싶은 게 있는데에…."
10040-100400050 = "혹시 시간이 되실까요…?"
10040-100400060 = "응, 물론이지. 츠쿠요가 불러준다면 언제든지!"
10040-100400070 = "네, 네엣-! 감사합니다…! 그러면, 장소는 나중에 보내겠습니다…!"
10040-100400080 = "서, 선생님…. 혹시 괜찮으시다면"
10040-100400090 = "오늘도 닌자가 되기 위한 훈련을 도와주시면 아, 안될까요?"
10040-100400100 = "아…. 아, 안되시겠죠…? 선생님은 느, 늘 바쁘시니까…. 그게 그러니까…."
10040-100400110 = "괜찮아. 어디로 가면 될까?"
10040-100400120 = "아, 감사합니다! 그럼.... 저기, 이전 장소에서 기다릴게요!"
10040-100400130 = "선생님! 선생님!"
10040-100400140 = "저… 어쩌면 엄청난 발견을 했을지도 몰라요…!"
10040-100400150 = "지, 지, 지금 바로 찾아뵈어도 괜찮을까요?!"
10040-100400160 = "아, 응. 상관은 없는데…."
10040-100400170 = "그럼 바로 샬레로 찾아뵐게요!"
10040-100400180 = "서, 서서서, 선생님!"
10040-100400190 = "아무래도 오전에 봤던 책은…! 쿠노이치를 흉내 냈을 뿐인…. 인법과 관련 없는, 단순한 패러디 서적이었던 모양이에요!"
10040-100400200 = "아아, 과연…."
10040-100400210 = "그래서 표지가 수상했구나."
10040-100400220 = "이번엔 속아버렸지만. 네엣!"
10040-100400230 = "다음번엔 제대로…. 쿠노이치의 수련을 적은 책을 가져올 테니!"
10040-100400240 = "그때 다시 부탁드릴게요!"
10040-100400250 = "으응…. 히, 힘내…."
10040-100400260 = "에헤헷, 네!"
10040-100400270 = "선생님! 오늘도 닌자가 되기 위한 수련!"
10040-100400280 = "부, 부디 부, 부탁드릴게요!"
10040-100400290 = "응, 그럼 언제나 보던 그곳에서 보자."
10040-100400300 = "에헤헷!"
10040-100400310 = "네!"

[translation]
10105-101050010 = "뭔가"
10105-101050020 = "생각지도 못한 일이 돼 버렸네요"
10105-101050030 = "제가 아이돌이라니"
10105-101050040 = "지금 연습 중이야?"
10105-101050050 = "잘 돼 가?"
10105-101050060 = "아"
10105-101050070 = "네"
10105-101050080 = "덕분에 순조로운 것 같아요!"
10105-101050090 = "오늘은 정말로 감사했습니다, 선생님."
10105-101050100 = "덕분에 연습도 훨씬 더 잘 된 거 같아요."
10105-101050110 = "나도 계란말이 맛있었어"
10105-101050120 = "오히려 득 본 기분이네"
10105-101050130 = "그만둬 주세요, 그런 말씀"
10105-101050140 = "그래도 솔직히 기쁘네요, 좋아해 주셔서."
10105-101050150 = "감사합니다, 선생님."
10105-101050160 = "하하! 오늘 건 완전 세이프였거든."
10105-101050170 = "이번 건 뭐라 못하지! 완승이다 완승!!"
10105-101050180 = "……???"
10105-101050190 = "네?"
10105-101050200 = "리허설 공연……."
10105-101050210 = "정말 생각지도 못했는데,"
10105-101050220 = "좋아해 주시는 분들이 많으셔서 기쁘네요!"
10105-101050230 = "……? 난 완전히 예상했는데"
10105-101050240 = "생각 못 한 건 마리뿐일 거야"
10105-101050250 = "그런가요?"
10105-101050260 = "그러면 다행이지만……."
10105-101050270 = "또 그것과는 별개로"
10105-101050280 = "조금 뭐랄까"
10105-101050290 = "특이한 반응을 보여 주시는 분들도 계시고요."
10105-101050300 = "상상도 못 했어요"
10105-101050310 = "저렇게나 많은 분들이"
10105-101050320 = "이게 대체 어떻게 된 건지……."
10105-101050330 = "……? 난 완전히 예상했는데"
10105-101050340 = "생각 못 한 건 마리뿐일 거야"
10105-101050350 = "선생님……?"
10105-101050360 = "뭔가 아까 하셨던 대답과 같은 느낌이……."
10105-101050370 = "아무튼 오늘 감사했습니다."
10105-101050380 = "그"
10105-101050390 = "다음번에는"
10105-101050400 = "선생님과도 비슷한 자리를, 가질 수 있었으면 좋겠어요."
10105-101050410 = "뭔가"
10105-101050420 = "생각보다 일정이 바빠졌네요"
10105-101050430 = "그래도 모두 기뻐해 주시니 저도 즐겁답니다."
10105-101050440 = "공연을 더 하는 거야?"
10105-101050450 = "어라, 추가 콘서트?"
10105-101050460 = "아"
10105-101050470 = "으음. 정확한 명칭은 모르겠지만……."
10105-101050480 = "네"
10105-101050490 = "비슷한 느낌인 것 같아요."
10105-101050500 = "오늘 와 주셔서 감사했습니다, 선생님."
10105-101050510 = "깜짝선물이라도 받은 기분이었어요."
10105-101050520 = "남은 공연들도 힘내자."
10105-101050530 = "마지막까지 파이팅!"
10105-101050540 = "……!"
10105-101050550 = "네!!"
10105-101050560 = "선생님"
10105-101050570 = "혹시"
10105-101050580 = "오늘 저녁에"
10105-101050590 = "시간 괜찮으실까요?"
10105-101050600 = "……마리?"
10105-101050610 = "괜찮지만, 무슨 일 있어?"
10105-101050620 = "아"
10105-101050630 = "네"
10105-101050640 = "감사합니다."
10105-101050650 = "그럼 그때 뵙겠습니다."
10105-101050660 = "잘 들어가셨나요, 선생님?"
10105-101050670 = "저는 덕분에 방으로 잘 들어와서 쉬고 있답니다."
10105-101050680 = "언젠가 또"
10105-101050690 = "비슷한 기회가 있었으면 좋겠네요."
10105-101050700 = "마리만 괜찮다면 언제든지"
10105-101050710 = "끝 나버린다거나, 그런 개념이 아니니까."
10105-101050720 = "후후"
10105-101050730 = "네, 명심하겠습니다."
10105-101050740 = "그럼 좋은 밤 되세요, 선생님."
10105-101050750 = "다음에 또, 괜찮으실 때"
10105-101050760 = "그냥 불러드릴 지도, 모르겠어요."

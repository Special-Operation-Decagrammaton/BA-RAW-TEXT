10105-101050110 = "The rolled omelet was delicious."
10105-101050120 = "I feel like I might've benefitted the most."
10105-101050130 = "Don't say that"
10105-101050140 = "But I'm glad that you enjoyed it"
10105-101050150 = "Thank you, Sensei."
10105-101050160 = "Haha! Today was a complete success!"
10105-101050170 = "No words of protest! A complete victory!"
10105-101050180 = "...???"
10105-101050190 = "What?"
10105-101050200 = "The rehearsal performance..."
10105-101050210 = "I didn't expect it at all,"
10105-101050220 = "but so many people liked it! I'm so happy!"
10105-101050230 = "...? I completely expected it"
10105-101050240 = "Mari, you're probably the only person who didn't."
10105-101050250 = "Is that so?"
10105-101050260 = "I'm glad to hear that, then..."
10105-101050270 = "On the other hand, though"
10105-101050280 = "How do I say this?"
10105-101050290 = "Some people have had some...strange reactions."
10105-101050300 = "That was beyond my imagination."

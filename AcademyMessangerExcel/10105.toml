10105-101050330 = "...? I completely expected it"
10105-101050340 = "Mari, you're probably the only person who didn't."
10105-101050350 = "Sensei...?"
10105-101050360 = "I'm getting a strange feeling of déjà vu."
10105-101050370 = "Anyways, thank you for today."
10105-101050380 = "Um..."
10105-101050390 = "Next time,"
10105-101050400 = "I hope we can do something similar again...together."
10105-101050410 = "Our schedule"
10105-101050420 = "ended up being busier than I expected."
10105-101050430 = "But I'm glad that everyone enjoyed it."
10105-101050440 = "Are you doing more concerts?"
10105-101050450 = "Oooh, a bonus concert?"
10105-101050460 = "Ah."
10105-101050470 = "Umm. I don't know the exact term..."
10105-101050480 = "Yes."
10105-101050490 = "Something like that."
10105-101050500 = "Thank you for coming today, Sensei."
10105-101050510 = "It was such a special surprise."
10105-101050520 = "Good luck with rest of the concerts."
10105-101050530 = "Do your best until the end!"
10105-101050540 = "...!"
10105-101050550 = "Yes!!"
10105-101050560 = "Sensei"
10105-101050570 = "By chance"
10105-101050580 = "would you have some time to spare"
10105-101050590 = "in the evening today?"

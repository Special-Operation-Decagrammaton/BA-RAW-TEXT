10105-101050610 = "Yes, but...is everything okay?"
10105-101050620 = "Ah."
10105-101050630 = "I'm okay..."
10105-101050640 = "Thank you."
10105-101050650 = "Then, I'll see you soon."
10105-101050660 = "Did you get home okay, Sensei?"
10105-101050670 = "Thank you for helping me get back safely. I'm resting in my room now."
10105-101050680 = "I hope that one day,"
10105-101050690 = "we'll have another opportunity for something like this."
10105-101050700 = "Whenever you want, Mari."
10105-101050710 = "It's not like you'll lose your talent!"

[translation]
10105-101050010 = "กลายเป็นว่า"
10105-101050020 = "ได้ทำเรื่องที่ไม่คาดคิดเลยนะคะ"
10105-101050030 = "เรื่องที่ฉันได้เป็นไอดอลแบบนี้..."
10105-101050040 = "ตอนนี้ฝึกซ้อมอยู่เหรอ?"
10105-101050050 = "เป็นยังไงบ้าง?"
10105-101050060 = "อ่า"
10105-101050070 = "ค่ะ"
10105-101050080 = "ได้คุณครูช่วยไว้ก็เลยราบรื่นดีน่ะค่ะ!"
10105-101050090 = "วันนี้ขอบคุณมากเลยนะคะคุณครู"
10105-101050100 = "คุณครูช่วยทำให้ฉันฝึกซ้อมได้ดีขึ้น\nมากๆ เลยละค่ะ"
10105-101050110 = "ไข่ม้วนอร่อยดีนะ"
10105-101050120 = "รู้สึกเหมือนเป็นฝ่ายได้รับมากกว่าเลย"
10105-101050130 = "อย่าพูดแบบนั้นเลยค่ะ"
10105-101050140 = "แต่ฉันก็ดีใจนะคะที่คุณครูชอบ"
10105-101050150 = "ขอบคุณนะคะ คุณครู"
10105-101050160 = "ฮ่าฮ่า! วันนี้เจ๋งสุดๆ ไปเลย"
10105-101050170 = "ว่าไม่ได้เลยละ! เรียกว่าเป็นชัยชนะ\nอย่างสมบูรณ์เลย!!"
10105-101050180 = "...???"
10105-101050190 = "คะ?"
10105-101050200 = "ซ้อมใหญ่วันนี้..."
10105-101050210 = "ฉันคิดไม่ถึงเลยค่ะ"
10105-101050220 = "ดีใจจังที่มีคนชอบเยอะขนาดนี้น่ะ!"
10105-101050230 = "แต่ครูกะไว้แล้วว่าจะเป็นแบบนี้นะ...?"
10105-101050240 = "คนที่ไม่คาดหวังเลยน่าจะมีแค่\nมารีคนเดียวนะ"
10105-101050250 = "อย่างนั้นเหรอคะ?"
10105-101050260 = "ถ้าอย่างนั้นก็ค่อยยังชั่ว..."
10105-101050270 = "แต่นอกเหนือจากนั้นแล้ว"
10105-101050280 = "จะว่ายังไงดีล่ะ"
10105-101050290 = "มีบางคนที่ให้การตอบรับที่พิเศษด้วย\nน่ะค่ะ"
10105-101050300 = "ฉันคาดไม่ถึงเลยค่ะ"
10105-101050310 = "ทำไมคนมากมายขนาดนั้น"
10105-101050320 = "มันเกิดขึ้นได้ยังไงกัน..."
10105-101050330 = "แต่ครูกะไว้แล้วว่าจะเป็นแบบนี้นะ...?"
10105-101050340 = "คนที่ไม่คาดหวังเลยน่าจะมีแค่\nมารีคนเดียวนะ"
10105-101050350 = "คุณครู...?"
10105-101050360 = "ทำไมเหมือนพูดเหมือนเดิมเลย..."
10105-101050370 = "ยังไงก็ขอบคุณสำหรับวันนี้นะคะ"
10105-101050380 = "อืม"
10105-101050390 = "ไว้คราวหน้า"
10105-101050400 = "หวังว่าฉันจะได้เป็นฝ่ายตอบแทนบ้าง\nนะคะ"
10105-101050410 = "รู้สึกว่า"
10105-101050420 = "ฉันจะงานยุ่งมากกว่าที่คิดอีกค่ะ"
10105-101050430 = "แต่พอเห็นทุกคนมีความสุข ฉันเองก็\nสนุกไปด้วยค่ะ"
10105-101050440 = "จะมีการแสดงอีกเหรอ?"
10105-101050450 = "เอ๋? เพิ่มรอบคอนเสิร์ตเหรอ?"
10105-101050460 = "อ่า"
10105-101050470 = "อืม ฉันไม่รู้ว่าต้องเรียกว่ายังไง..."
10105-101050480 = "ค่ะ"
10105-101050490 = "น่าจะประมาณนั้นน่ะค่ะ"
10105-101050500 = "ขอบคุณที่มาวันนี้นะคะคุณครู"
10105-101050510 = "รู้สึกเหมือนได้ของขวัญเซอร์ไพรส์เลย\nละค่ะ"
10105-101050520 = "การแสดงรอบที่เหลือก็สู้เค้านะ"
10105-101050530 = "ครูเป็นกำลังใจให้!"
10105-101050540 = "...!"
10105-101050550 = "ค่ะ!!"
10105-101050560 = "คุณครู"
10105-101050570 = "ไม่ทราบว่า"
10105-101050580 = "เย็นนี้"
10105-101050590 = "คุณครูพอมีเวลามั้ยคะ?"
10105-101050600 = "มารี...?"
10105-101050610 = "ก็พอมีนะ มีเรื่องอะไรเหรอ?"
10105-101050620 = "อ่า"
10105-101050630 = "ค่ะ"
10105-101050640 = "ขอบคุณค่ะ"
10105-101050650 = "แล้วเจอกันนะคะ"
10105-101050660 = "กลับถึงที่พักหรือยังคะคุณครู?"
10105-101050670 = "ฉันกำลังพักผ่อนอยู่ในห้องค่ะ\nขอบคุณที่มาส่งนะคะ"
10105-101050680 = "ในวันข้างหน้า"
10105-101050690 = "หวังว่าจะมีโอกาสแบบนี้อีกนะคะ"
10105-101050700 = "มารีเป็นไอดอลได้ตลอดอยู่แล้ว"
10105-101050710 = "มันไม่ได้จบลงแค่นี้หรอก"
10105-101050720 = "ฮุฮุ"
10105-101050730 = "ค่ะ ฉันจะจำไว้ให้ขึ้นใจค่ะ"
10105-101050740 = "ขอให้เป็นค่ำคืนที่สงบนะคะ คุณครู"
10105-101050750 = "ไว้คราวหน้า ถ้าคุณครูไม่ว่าอะไร"
10105-101050760 = "ฉันอาจจะไปร้องเพลงให้ฟังนะคะ"

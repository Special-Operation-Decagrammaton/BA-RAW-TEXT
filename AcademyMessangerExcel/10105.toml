[translation]
10105-101050010 = "總覺得"
10105-101050020 = "事情的發展有點出乎預料"
10105-101050030 = "我竟然會成為偶像"
10105-101050040 = "現在在練習嗎？"
10105-101050050 = "還順利嗎？"
10105-101050060 = "啊"
10105-101050070 = "是的"
10105-101050080 = "多虧有老師，一切都進行得很順利！"
10105-101050090 = "今天真的很謝謝您，老師"
10105-101050100 = "感覺今天的練習比以往還要順利"
10105-101050110 = "玉子燒很好吃哦"
10105-101050120 = "反而是我賺到了呢"
10105-101050130 = "請您不必客氣"
10105-101050140 = "不過其實聽到老師這麼說，我很開心"
10105-101050150 = "非常謝謝您，老師"
10105-101050160 = "哈哈！今天大獲全勝！"
10105-101050170 = "這次總沒事了吧！完全勝利！！"
10105-101050180 = "……？？？"
10105-101050190 = "嗯？"
10105-101050200 = "彩排……"
10105-101050210 = "真是太不可思議了"
10105-101050220 = "想不到居然會有這麼多人喜歡我們，真令人開心！"
10105-101050230 = "……？我一直都覺得會這樣哦"
10105-101050240 = "沒想到的人應該只有瑪麗哦"
10105-101050250 = "是嗎？"
10105-101050260 = "那就好……"
10105-101050270 = "話說回來"
10105-101050280 = "該怎麼說呢"
10105-101050290 = "有幾位觀眾的反應似乎不太一樣"
10105-101050300 = "真沒想到"
10105-101050310 = "居然會有這麼多人"
10105-101050320 = "這究竟是怎麼回事……"
10105-101050330 = "……？我一直都覺得會這樣哦"
10105-101050340 = "沒想到的人應該只有瑪麗哦"
10105-101050350 = "老師……？"
10105-101050360 = "感覺剛才好像看過這句話了……"
10105-101050370 = "總之今天真的很謝謝您"
10105-101050380 = "那個"
10105-101050390 = "希望下次"
10105-101050400 = "還有機會和老師一起享受這樣的舞台"
10105-101050410 = "總覺得"
10105-101050420 = "行程好像比想像中還緊湊"
10105-101050430 = "不過看到大家開心的樣子，我也覺得很高興"
10105-101050440 = "你們還有表演嗎？"
10105-101050450 = "咦，有加場表演嗎？"
10105-101050460 = "啊"
10105-101050470 = "唔嗯，雖然我不知道正式的名稱……"
10105-101050480 = "不過"
10105-101050490 = "大致上是這樣沒錯"
10105-101050500 = "謝謝您今天特地過來，老師"
10105-101050510 = "感覺就像收到了驚喜禮物一樣"
10105-101050520 = "接下來的表演也要加油哦"
10105-101050530 = "繼續努力到最後吧！"
10105-101050540 = "……！"
10105-101050550 = "是！！"
10105-101050560 = "老師"
10105-101050570 = "我想請問"
10105-101050580 = "今天晚上"
10105-101050590 = "能不能占用您一些時間呢？"
10105-101050600 = "……瑪麗？"
10105-101050610 = "沒問題，不過怎麼了嗎？"
10105-101050620 = "啊"
10105-101050630 = "是"
10105-101050640 = "非常感謝"
10105-101050650 = "那麼到時候見"
10105-101050660 = "您回到家了嗎，老師？"
10105-101050670 = "謝謝老師願意送我回來，我已經平安回到宿舍裡休息了"
10105-101050680 = "真希望下次"
10105-101050690 = "還能有這樣的機會"
10105-101050700 = "只要瑪麗願意，機會隨時都有哦"
10105-101050710 = "畢竟這也不代表一切就此結束了"
10105-101050720 = "呵呵"
10105-101050730 = "是，我會銘記於心"
10105-101050740 = "祝您有個好夢，老師"
10105-101050750 = "也許下次您方便的時候"
10105-101050760 = "我還會約您出來哦"

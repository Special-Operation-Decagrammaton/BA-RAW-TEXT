[translation]
10068-100680010 = "Hello Sensei!"
10068-100680020 = "It is I, Uzawa Reisa!"
10068-100680030 = "Hello, Reisa."
10068-100680040 = "Oh. Reisa. What is it?"
10068-100680050 = "Oh!"
10068-100680060 = "Uh. Um."
10068-100680070 = "That was all, actually."
10068-100680080 = "You said I could get in touch with you about anything..."
10068-100680090 = "Umm..."
10068-100680100 = "I'm sorry!!"
10068-100680110 = "Sensei!"
10068-100680120 = "It's me, Reisa!"
10068-100680140 = "Dun dun dun... Ta-da!!"
10068-100680150 = "Haha."
10068-100680160 = "Seems like you had a good time."
10068-100680170 = "Yep!"
10068-100680180 = "Even more than I expected to!"
10068-100680190 = "Because, like..."
10068-100680200 = "Everything went so well! In fact, it was so smooth that I'm a bit embarrassed I was worried in the first place."
10068-100680210 = "Like, was I the only one worried at all?"
10068-100680220 = "Anyway! Whatever."
10068-100680230 = "Thank you!!"
10068-100680240 = "Sensei!"
10068-100680250 = "Can I ask you something? Is that okay?"
10068-100680260 = "Hm? Reisa?"
10068-100680270 = "What did you want to ask?"
10068-100680280 = "So um..."
10068-100680290 = "I thought maybe you'd know a lot about getting over exhaustion!"
10068-100680300 = "...Getting over exhaustion?"
10068-100680310 = "Please!"
10068-100680320 = "Please teach me how you do it!"
10068-100680330 = "Woooow!"
10068-100680340 = "I fell asleep! I fell asleep right here!"
10068-100680350 = "Sorry I was in a hurry and couldn't say goodbye though!"
10068-100680360 = "It's all right."
10068-100680370 = "I'm just glad you got some rest."
10068-100680380 = "Yes!"
10068-100680390 = "Oh!"
10068-100680400 = "Plus I already talked to my friends in the Vigilante Crew! And there were totally no problems."
10068-100680410 = "We figured out a whole schedule for patrolling and days off."
10068-100680420 = "And it's perfect!"
10068-100680430 = "Thank you!"
10068-100680440 = "Sensei!"
10068-100680450 = "Hey! Are you free later? What do you think?"
10068-100680460 = "Of course."
10068-100680470 = "You seem full of energy."
10068-100680480 = "Hahaha!"
10068-100680490 = "That's because! So far, I've only gotten things from you. But!"
10068-100680500 = "That changes now! This time everything's on me!"
10068-100680510 = "It'll be super duper special!"
10068-100680520 = "Every single time..."
10068-100680530 = "Every single late night patrol is an epic battle. A battle with sleepiness. I gotta stay awake!"
10068-100680540 = "Really? So late?"
10068-100680550 = "Do you think something's going to happen?"
10068-100680560 = "Oh..."
10068-100680570 = "No, not really! I mean, the chance is really low. It'll probably be fine!"
10068-100680580 = "But you never ever know for sure!"
10068-100680590 = "Anyway, good luck with whatever you're working on tonight."
10068-100680600 = "Goodnight!"
10068-100680610 = "Aughhh!"
10068-100680620 = "As soon as I came to I realized...I've been a huge pain!"
10068-100680630 = "You're not a pain at all."
10068-100680640 = "I'm just glad you didn't catch a cold."
10068-100680650 = "Haha!"
10068-100680660 = "Yep! Right as rain! Thanks to you, Sensei!"
10068-100680670 = "And also, I noticed... the moon we saw on patrol, and the early morning sun..."
10068-100680680 = "They were so beautiful!"
10068-100680690 = "And I would never have even thought about it if I was on my own!"
10068-100680700 = "Sensei."
10068-100680710 = "Thank you."

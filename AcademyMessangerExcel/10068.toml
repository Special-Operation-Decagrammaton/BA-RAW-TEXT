[translation]
10068-100680010 = "สวัสดีค่ะคุณครู!"
10068-100680020 = "อุซาวะ เรอิสะเองค่ะ!"
10068-100680030 = "ว่าไง เรอิสะ"
10068-100680040 = "โอ๊ะ เรอิสะ มีเรื่องอะไรเหรอ?"
10068-100680050 = "อ๊ะ"
10068-100680060 = "เอ่อ อืม..."
10068-100680070 = "ที่ฉันส่งข้อความมาหาคุณครู..."
10068-100680080 = "ก็เพราะคุณครูบอกฉันว่าให้ติดต่อ\nเข้ามาได้ ไม่ต้องเกรงใจ..."
10068-100680090 = "อืม..."
10068-100680100 = "ขอโทษค่ะ!!!!!!!!!!!"
10068-100680110 = "คุณครู!!"
10068-100680120 = "เรอิสะเองค่ะ!!"
10068-100680140 = "แต่นแต๊น~!! นี่รูปฉันเองค่า!!"
10068-100680150 = "5555"
10068-100680160 = "ได้สนุกเต็มที่เลยสินะ"
10068-100680170 = "ค่ะ!!"
10068-100680180 = "สนุกกว่าที่คิดอีกค่ะ"
10068-100680190 = "จะว่ายังไงดีนะ"
10068-100680200 = "ทุกอย่างเป็นไปได้ด้วยดี จนฉันรู้สึกอายที่เคย\nกังวลเรื่องนั้นมาจนถึงทุกวันนี้เลยค่ะ"
10068-100680210 = "เหมือนมีแต่ฉันคนเดียวที่มัวมา\nกังวลอยู่"
10068-100680220 = "เอาเป็นว่า...!"
10068-100680230 = "ขอบคุณนะคะ!!!!"
10068-100680240 = "คุณครู!"
10068-100680250 = "ถ้าคุณครูไม่ว่าอะไร ฉันขอร้องอะไร\nคุณครูอย่างหนึ่งได้มั้ยคะ?"
10068-100680260 = "หืม? เรอิสะ?"
10068-100680270 = "ขอร้อง? เรื่องอะไรเหรอ?"
10068-100680280 = "คือว่า..."
10068-100680290 = "ฉันว่าคุณครูน่าจะรู้เกี่ยวกับการคลาย\nความเหนื่อยล้ามากพอสมควรน่ะค่ะ!"
10068-100680300 = "คลายความเหนื่อยล้า...?"
10068-100680310 = "ขอร้องละค่ะ!"
10068-100680320 = "ช่วยสอนให้ฉันหน่อยนะคะ!!"
10068-100680330 = "เฮือกกก!!"
10068-100680340 = "เผลอหลับไปจนได้!! ฉันเผลอหลับไป\nตรงนี้เลยค่ะ!!"
10068-100680350 = "ฉันมัวแต่รีบออกไปก็เลยไม่ได้บอกลา\nอย่างเหมาะสมเลย ขอโทษนะคะ!!"
10068-100680360 = "ไม่เป็นไรหรอก"
10068-100680370 = "ได้นอนพักเต็มที่ก็ดีแล้ว"
10068-100680380 = "ค่ะ!!!"
10068-100680390 = "อ้อ"
10068-100680400 = "ฉันไปบอกเพื่อนๆ กับกลุ่มรักษาความ\nสงบบางคนมาเหมือนกันค่ะ! ครั้งนี้ก็\nไม่มีปัญหาอะไรค่ะ!"
10068-100680410 = "เรากำหนดวันที่สำหรับลาดตระเวน\nและเที่ยวเล่นเอาไว้เรียบร้อยแล้วค่ะ!!"
10068-100680420 = "สมบูรณ์แบบสุดๆ ไปเลย!!!"
10068-100680430 = "ขอบคุณนะคะ!!!!"
10068-100680440 = "คุณครู!"
10068-100680450 = "หลังจากนี้พอมีเวลาว่างบ้างมั้ยคะ?!!"
10068-100680460 = "อืม ครูพอมีเวลาอยู่นะ"
10068-100680470 = "ดูมีพลังเหลือล้นจริงๆ เลยนะ"
10068-100680480 = "ฮ่าฮ่าฮ่า!!"
10068-100680490 = "ก็ที่ผ่านมาฉันเป็นฝ่ายได้รับ\nจากคุณครูมาตลอดเลยนี่คะ!"
10068-100680500 = "ครั้งนี้! ปล่อยให้เป็นหน้าที่\nฉันเองค่ะ!!"
10068-100680510 = "ฉันจะทำให้วันนี้ของคุณครูเป็นวันที่\nแสนพิเศษเองค่ะ!"
10068-100680520 = "ฉันรู้สึกมาตลอดเลยค่ะ"
10068-100680530 = "ว่าการลาดตระเวนตอนกลางคืนคือการ\nต่อสู้กับความง่วงค่ะ จะต้องตื่นตัวตลอด\nเวลา..."
10068-100680540 = "หืม? เวลาดึกดื่นแบบนี้เนี่ยนะ?"
10068-100680550 = "มีเรื่องอะไรเกิดขึ้นเหรอ?"
10068-100680560 = "อ้อ"
10068-100680570 = "ไม่หรอกค่ะ โอกาสเกิดขึ้นน้อยมากค่ะ\nคงไม่มีอะไรหรอกค่ะ"
10068-100680580 = "แต่ยังไงก็ต้องเผื่อไว้ก่อนนี่คะ!!"
10068-100680590 = "ถ้าคุณครูมีงานช่วงดึกก็พยายามเข้า\nนะคะ!"
10068-100680600 = "ขอให้เป็นคืนที่สงบค่ะ!!"
10068-100680610 = "เฮือกกก!!"
10068-100680620 = "พอตื่นเต็มที่ ถึงได้รู้ว่าฉันทำเรื่อง\nเสียมารยาทอย่างหนักเลย...!!"
10068-100680630 = "ไม่ได้เสียมารยาทหรอก ไม่เป็นไร"
10068-100680640 = "ดีแล้วละที่ไม่ได้เป็นหวัดเข้าน่ะ"
10068-100680650 = "แหะๆ"
10068-100680660 = "ค่ะ! ต้องขอบคุณคุณครูเลยนะคะ!"
10068-100680670 = "อีกอย่างดวงจันทร์ที่ได้เห็นตอน\nลาดตระเวน ทั้งดวงอาทิตย์ที่เห็น\nตอนกลับมา"
10068-100680680 = "มันสวยมากๆ เลยนะคะ!!"
10068-100680690 = "ถ้าฉันอยู่คนเดียว คงไม่มีทางคิดแบบ\nนั้นได้แน่ค่ะ"
10068-100680700 = "คุณครู"
10068-100680710 = "ขอบคุณนะคะ"

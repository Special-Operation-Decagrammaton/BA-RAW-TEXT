[translation]
23005-2194 = "Hello, Sensei. This is Ayane."
23005-2195 = "Do you happen to be free right now?"
23005-2196 = "Sure. What's going on?"
23005-2197 = "I'm very busy, but I can make time for you."
23005-2198 = "Okay, it's nothing serious, but..."
23005-2199 = "Oh... Thank you."
23005-2200 = "It's nothing serious, but..."
23005-2201 = "...there's something I need to discuss."
23005-2202 = "Can we talk?"
23005-2203 = "I'm sorry to bother you!"
23005-2204 = "Understood."
23005-2205 = "It's no problem."
23005-2206 = "Thank you! I'll see you at Abydos on your day off!"
23005-2207 = "You know about that book, Sensei? "
23005-2208 = "I asked the antique shop in the shopping district, and..."
23005-2209 = "They said it's just an old novel that's not worth much..."
23005-2210 = "Ah..."
23005-2211 = "I see."
23005-2212 = "But...I still got 1,200 yen for it. "
23005-2213 = "I guess it wasn't completely worthless."
23005-2214 = "It wasn't a complete waste of time."
23005-2215 = "I'm glad."
23005-2216 = "Hahaha... Yeah."
23005-2217 = "I hope I can talk to you again soon, Sensei."
23005-2218 = "Sensei, I have good news!"
23005-2219 = "I found something."
23005-2220 = "It's loaded with valuables, I think..."
23005-2221 = "Wow... I feel like a king."
23005-2222 = "What is it?"
23005-2223 = "Um... It's some scrap metal."
23005-2224 = "But I feel like we could sell it..."
23005-2225 = "I'll take a look."
23005-2226 = "Yeah? "
23005-2227 = "Oh, no. You don't have to come all the way here..."
23005-2228 = "Thank you, Sensei."
23005-2229 = "Are you okay...?"
23005-2230 = "Yes, I'm fine. "
23005-2231 = "My uniform got all torn up and my glasses are broken, but..."
23005-2232 = "I can sell this stuff for double the price!"
23005-2233 = "Good work today..."
23005-2234 = "I'm worried because it feels like the school is falling apart."
23005-2235 = "We had two blackouts yesterday."
23005-2236 = "And we had no water the other day."
23005-2237 = "I wonder if something's wrong with the basement facilities?"
23005-2238 = "Why don't you call a technician?"
23005-2239 = "You should call someone to do an inspection."
23005-2240 = "Hahaha... We don't have the budget."
23005-2241 = "I'll just have to carve time out to fix things here and there."
23005-2242 = "Do you need help?"
23005-2243 = "Let's fix them together."
23005-2244 = "Do you mean that?"
23005-2245 = "That would be amazing, Sensei!"
23005-2246 = "You worked so hard today, Sensei."
23005-2247 = "Everything at the school is fixed now."
23005-2248 = "You did a great job today."
23005-2249 = "Great work, Ayane."
23005-2250 = "Oh, um..."
23005-2251 = "So..."
23005-2252 = "Huh?"
23005-2253 = "What's wrong?"
23005-2254 = "Um... Can I call you again next time?"
23005-2255 = "I asked a lot of you today, but..."
23005-2256 = "Of course."
23005-2257 = "Call me anytime."
23005-2258 = "Hahaha... Thank you, Sensei."
23005-2259 = "See you later."

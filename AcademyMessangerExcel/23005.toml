[translation]
23005-2194 = "สวัสดีค่ะ คุณครู อายาเนะค่ะ"
23005-2195 = "คือว่าคุณครูพอมีเวลาว่างรึเปล่าคะ?"
23005-2196 = "ได้สิ มีอะไรเหรอ?"
23005-2197 = "ถึงครูจะยุ่งมาก แต่ถ้าเพื่ออายาเนะ\nครูว่างตลอดเลยนะ"
23005-2198 = "ค่ะ ไม่มีอะไรหรอกค่ะ คือ..."
23005-2199 = "อ่า... แหะๆ ขะ... ขอบคุณค่ะ"
23005-2200 = "ไม่มีอะไรหรอกค่ะ คือว่า..."
23005-2201 = "จะเรียกว่าปรึกษา หรือขอคำแนะนำดีนะ..."
23005-2202 = "คือฉันอยากจะขอคุยกับคุณครูสักครู่น่ะค่ะ"
23005-2203 = "ขอโทษที่รบกวนนะคะ!"
23005-2204 = "ได้อยู่แล้ว "
23005-2205 = "อื้อ ไม่มีปัญหา"
23005-2206 = "ค่ะ! ขอบคุณนะคะ ถ้างั้นวันหยุดนี้เจอ\nกันที่โรงเรียนอะบิดอสนะคะ!"
23005-2207 = "คุณครูคะ คือเรื่องหนังสือเล่มนั้น... "
23005-2208 = "ฉันไปถามที่ร้านขายหนังสือเก่าที่\nย่านการค้าดูแล้ว..."
23005-2209 = "คนขายบอกว่าเป็นหนังสือนิยายดังใน\nสมัยก่อนที่ไม่ค่อยมีราคาเท่าไหร่"
23005-2210 = "อะไรกัน..."
23005-2211 = "อย่างนั้นเองเหรอ"
23005-2212 = "แหะๆ... แต่ว่าฉันก็ได้มาตั้ง 1,200 เยน\nนะคะ "
23005-2213 = "ถึงจะบอกว่าไม่ค่อยมีราคาเท่าไหร่\nแต่ก็ได้เยอะพอสมควรเลยค่ะ"
23005-2214 = "อย่างน้อยก็ไม่เสียเวลาเปล่านะ"
23005-2215 = "โชคดีจัง"
23005-2216 = "แหะๆ... นั่นสินะคะ"
23005-2217 = "ถ้างั้นคุณครูคะ คราวหน้าฉันอาจจะขอ\nมาปรึกษาเรื่องแบบนี้อีกนะคะ"
23005-2218 = "คุณครูคะ มีข่าวดีค่ะ"
23005-2219 = "ฉันเจอของใหม่ๆ อีกแล้วค่ะ"
23005-2220 = "เจอของพวกที่น่าจะเอาไปขายได้อยู่\nเยอะเลย..."
23005-2221 = "ฮุฮุ... รู้สึกเหมือนเจอขุมทรัพย์เลยค่ะ"
23005-2222 = "ของอะไรเหรอ?"
23005-2223 = "อืม... มันดูเหมือนเศษเหล็กก็จริงอยู่..."
23005-2224 = "แต่ฉันคิดว่าน่าจะเอาเหล็กพวกนี้ไปขาย\nได้อยู่นะคะ"
23005-2225 = "เดี๋ยวครูไปดูให้นะ"
23005-2226 = "คะ? "
23005-2227 = "มะ...ไม่เป็นไรค่ะ มัน...มันจะเป็นการ\nรบกวนคุณครูเปล่าๆ..."
23005-2228 = "ขอบคุณมากเลยนะคะ คุณครู"
23005-2229 = "ไม่เป็นไรใช่ไหม?"
23005-2230 = "ค่ะ ไม่เป็นไรค่ะ "
23005-2231 = "ถึงชุดนักเรียนจะขาดหลุดรุ่ยแล้วก็\nขาแว่นหักไปข้างนึงก็เถอะ..."
23005-2232 = "แต่ได้เงินมาเพิ่มตั้งสองเท่าเลยนะคะ!"
23005-2233 = "พยายามได้ดีมากเลยนะ..."
23005-2234 = "ช่วงที่ผ่านมาอุปกรณ์ของโรงเรียนมักจะ\nพังอยู่บ่อยๆ ฉันเลยค่อนข้างกังวลค่ะ"
23005-2235 = "เมื่อวานไฟดับไปตั้งสองชั่วโมง..."
23005-2236 = "เมื่อวันก่อนน้ำประปาก็ไม่ไหลด้วยค่ะ"
23005-2237 = "ดูเหมือนว่าอุปกรณ์ที่อยู่ที่ชั้นใต้ดินน่าจะ\nมีปัญหาค่ะ"
23005-2238 = "เรียกช่างมาดูดีไหม?"
23005-2239 = "เรียกช่างมาซ่อมสิ"
23005-2240 = "แหะๆ... ถ้าเรียกช่างมาซ่อมทุกที่ที่มี\nอุปกรณ์พังล่ะก็ งบประมาณคงไม่พอ\nแน่เลยค่ะ"
23005-2241 = "งานซ่อมเล็กๆ น้อยๆ แบบนี้\nวันหยุดฉันมักจะมาซ่อมเอง..."
23005-2242 = "ให้ครูช่วยไหม?"
23005-2243 = "เรามาช่วยกันซ่อมดีไหม"
23005-2244 = "อ่า... จริงเหรอคะ?"
23005-2245 = "ถ้าคุณครูมาช่วยก็ดีเลยค่ะ"
23005-2246 = "วันนี้เหนื่อยหน่อยนะคะคุณครู"
23005-2247 = "โชคดีที่ซ่อมได้โดยไม่มีปัญหาอะไร\nเกิดขึ้น"
23005-2248 = "อื้อ เธอเองก็เหนื่อยเหมือนกันสินะ"
23005-2249 = "อายาเนะเองก็เก่งมากเลยนะ"
23005-2250 = "อืม... คือว่า..."
23005-2251 = "แบบว่า..."
23005-2252 = "หืม?"
23005-2253 = "ทำไมเหรอ?"
23005-2254 = "ถ้าคราวหน้า.. ฉันจะขอให้คุณครูช่วยอีก..\nได้ไหมคะ? คือแบบว่า..."
23005-2255 = "ถึงวันนี้ฉันจะรบกวนคุณครูไปเยอะเลยแต่ว่า..."
23005-2256 = "ได้อยู่แล้วล่ะ"
23005-2257 = "ได้แน่นอน มาบอกครูได้ตลอดเลยนะ"
23005-2258 = "ฮิๆ... ขอบคุณค่ะคุณครู"
23005-2259 = "ถ้างั้นไว้เจอกันนะคะ"

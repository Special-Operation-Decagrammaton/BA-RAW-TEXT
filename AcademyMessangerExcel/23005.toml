[translation]
23005-2194 = "您好，老師。我是綾音"
23005-2195 = "可以占用一點時間嗎？"
23005-2196 = "沒問題唷，怎麼了？"
23005-2197 = "雖然很忙，但為了綾音的話完全沒問題！"
23005-2198 = "非常感謝，事實上……"
23005-2199 = "那，那個，啊哈哈……非，非常感謝"
23005-2200 = "其實……"
23005-2201 = "該說是商量，還是說想詢問一些事呢……"
23005-2202 = "有一些想說的話"
23005-2203 = "對不起這麼突然！"
23005-2204 = "嗯，我知道了"
23005-2205 = "不會，完全沒問題"
23005-2206 = "非，非常感謝！那下個休息日，我們在學校見面吧！"
23005-2207 = "老師，關於那本書"
23005-2208 = "我委託了商店街的古董店看了一下"
23005-2209 = "說只是一本沒什麼價值的舊大眾小說……"
23005-2210 = "哎呀……"
23005-2211 = "這樣啊……"
23005-2212 = "啊哈哈……但就算是這樣，我也收到了1200元"
23005-2213 = "雖然不是特別有價值，但這點程度還是有的"
23005-2214 = "花的時間值得了呢"
23005-2215 = "太好了呢"
23005-2216 = "是，我也這麼認為"
23005-2217 = "也許之後還會商量什麼奇怪的事，再拜託了。老師"
23005-2218 = "老師，好消息"
23005-2219 = "我在學校發現了些東西"
23005-2220 = "感覺很值錢"
23005-2221 = "呵呵，說不定是筆意外之財呢"
23005-2222 = "是什麼東西？"
23005-2223 = "是跟普通的鐵一樣的東西"
23005-2224 = "但因為數量很可觀，應該有些價值"
23005-2225 = "我可以去看看嗎？"
23005-2226 = "咦？"
23005-2227 = "啊，好的，當然沒問題……"
23005-2228 = "辛苦了，老師"
23005-2229 = "沒事吧……？"
23005-2230 = "是，沒事"
23005-2231 = "雖然眼鏡搖搖欲墜，制服也有點破了……"
23005-2232 = "但賣了2倍的價錢！是我們贏了！"
23005-2233 = "辛苦了……"
23005-2234 = "最近，學校的設施持續故障，有點擔心"
23005-2235 = "昨天停電持續了2個小時……"
23005-2236 = "前天自來水也停了"
23005-2237 = "地下設施出了什麼問題嗎……"
23005-2238 = "叫業者來看看？"
23005-2239 = "叫個懂這些的人來看看不就行了嗎？"
23005-2240 = "如果每個有問題的地方都請業者去看的話，可能會是筆龐大的金額……"
23005-2241 = "只好找時間，在休息日一點一點地修復了……"
23005-2242 = "我也能幫忙嗎？"
23005-2243 = "我們一起修理吧"
23005-2244 = "啊……真的嗎？"
23005-2245 = "那就恭敬不如從命了。非常感謝，老師"
23005-2246 = "今天辛苦了。老師"
23005-2247 = "託您的福，順利完成了修理"
23005-2248 = "嗯，辛苦了"
23005-2249 = "綾音也辛苦了"
23005-2250 = "呃……這個……"
23005-2251 = "那個……"
23005-2252 = "嗯？"
23005-2253 = "怎麼了？"
23005-2254 = "還能再……請您出來嗎？那個……"
23005-2255 = "很抱歉今天給您添麻煩了……老師和我……"
23005-2256 = "當然囉"
23005-2257 = "當然，隨時都歡迎喔"
23005-2258 = "……非常感謝，老師"
23005-2259 = "那麼，再連絡唷"

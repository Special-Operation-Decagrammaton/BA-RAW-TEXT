[translation]
10110-101100010 = "老師"
10110-101100020 = "如果可以的話，近期能來三一一趟嗎？"
10110-101100030 = "在老師方便的時候就行了……拜託你了"
10110-101100040 = "當然沒問題……不過怎麼了嗎？"
10110-101100050 = "聖亞？發生什麼事了嗎？"
10110-101100060 = "……抱歉"
10110-101100070 = "現在還不能說"
10110-101100080 = "另外，這件事還請對其他人保密"
10110-101100090 = "我會等著你的"
10110-101100100 = "我醒來之後，發現你已經先離開了"
10110-101100110 = "來的時候沒能好好打招呼"
10110-101100120 = "就連走的時候都還在睡覺，實在抱歉"
10110-101100130 = "我難得舒服地睡了一覺"
10110-101100140 = "床睡起來非常舒服哦"
10110-101100150 = "嗯"
10110-101100160 = "那麼下次"
10110-101100170 = "再以其他藉口見面吧，老師"
10110-101100180 = "老師，之後有時間嗎？"
10110-101100190 = "我想我需要老師的照顧"
10110-101100200 = "你沒有直接說「生病了」呢"
10110-101100210 = "這就是你的新「藉口」嗎"
10110-101100220 = "大致上是這樣沒錯"
10110-101100230 = "嗯，我不能直接說「生病了」"
10110-101100240 = "除了不該說謊之外"
10110-101100250 = "如果用「生病了」當藉口，可能會讓你過於擔心"
10110-101100260 = "略帶疑惑和些許不安"
10110-101100270 = "這大概就是我希望的溫度"
10110-101100280 = "不過既然被看穿也沒辦法了"
10110-101100290 = "老師"
10110-101100300 = "請在有空的時候來找我吧"
10110-101100310 = "不知道甜點合不合你的胃口"
10110-101100320 = "雖然那是用最好的材料，請最好的師傅製作的"
10110-101100330 = "真的很棒。跟我的完全不一樣！"
10110-101100340 = "我買的甜點完全被比過去了呢"
10110-101100350 = "請別這麼說"
10110-101100360 = "老師的甜點也無疑是最高等級"
10110-101100370 = "嗯"
10110-101100380 = "這就是現在，我的舌頭所給予的評價"
10110-101100390 = "已經晚上了呢"
10110-101100400 = "今天的時間過得還真快"
10110-101100410 = "你的工作很多嗎？"
10110-101100420 = "今天很忙嗎？"
10110-101100430 = "不，不是那樣的"
10110-101100440 = "讀書的時候……"
10110-101100450 = "時間反而比工作時過得更快"
10110-101100460 = "感覺一天就算有48小時也不夠呢"
10110-101100470 = "今天真是感激不盡，老師"
10110-101100480 = "那原本就是我喜歡的書，現在感覺又多了一層樂趣呢"
10110-101100490 = "我也很開心哦"
10110-101100500 = "有需要的話隨時跟我說"
10110-101100510 = "嗯"
10110-101100520 = "我一定會的"
10110-101100530 = "老師"
10110-101100540 = "聽說你近期會來茶會一趟"
10110-101100550 = "沒錯，有些事情需要討論"
10110-101100560 = "雖然是因為公事，不過是這樣沒錯"
10110-101100570 = "原來如此"
10110-101100580 = "我明白了"
10110-101100590 = "夜晚總是會讓人多愁善感呢"
10110-101100600 = "我可能是被氣氛影響，做出了一些逾矩的事"
10110-101100610 = "如果有任何失禮之處，在此向你道歉"
10110-101100620 = "絕對沒有這種事哦。歌非常好聽"
10110-101100630 = "有機會的話真想再多聽幾首"
10110-101100640 = "你又說這種話"
10110-101100650 = "不過"
10110-101100660 = "嗯"
10110-101100670 = "假如是只有老師在的地方，我也想經常那麼做"

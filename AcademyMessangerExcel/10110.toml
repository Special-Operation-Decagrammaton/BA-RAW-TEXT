[translation]
10110-101100010 = "선생님"
10110-101100020 = "혹시 괜찮으시다면, 조만간 트리니티에 방문해 주실 수 있을까요?"
10110-101100030 = "선생님께서 다급하지 않으신 시간대로……. 부탁드릴게요."
10110-101100040 = "당연히 괜찮지만……. 왜 그래?"
10110-101100050 = "세이아? 무슨 일 있어?"
10110-101100060 = "……죄송합니다."
10110-101100070 = "그 부분은 지금은 말씀드릴 수 없어요."
10110-101100080 = "또, 다른 분들께는 비밀로 부탁드립니다."
10110-101100090 = "오실 때를 기다리겠습니다."
10110-101100100 = "깨어나고 보니 먼저 돌아가셨군요."
10110-101100110 = "오실 때도 인사드리지 못했는데"
10110-101100120 = "가실 때도 자는 모습으로 보내다니, 죄송할 따름입니다."
10110-101100130 = "간만에 푹 자서 좋았어."
10110-101100140 = "침대가 굉장히 편했어."
10110-101100150 = "네."
10110-101100160 = "그럼 다음에 또"
10110-101100170 = "다른 변명으로, 뵙겠습니다. 선생님."
10110-101100180 = "선생님, 혹시 나중에 시간 괜찮으실까요?"
10110-101100190 = "아무래도 선생님의 간호가 필요할 것 같아서요."
10110-101100200 = "'아프다'고는 말하지 않는구나."
10110-101100210 = "이게 새로운 '변명'인 거구나."
10110-101100220 = "뭐, 그렇습니다."
10110-101100230 = "네. '아프다'고 직접 말할 순 없으니까요."
10110-101100240 = "거짓말을 할 순 없기도 하고,"
10110-101100250 = "'아프다'고 말을 해버리면, 지나치게 걱정하실 것 같아서요."
10110-101100260 = "조금 의아하고 아주 약간 불안해하는 정도."
10110-101100270 = "그 정도가 딱 제가 바라는 온도감이라고 할 수 있겠네요."
10110-101100280 = "하지만 그마저도 이미 탄로나 버렸군요. 그러니 이제 어쩔 수 없습니다."
10110-101100290 = "선생님."
10110-101100300 = "조만간, 한가하실 때 찾아와 주세요."
10110-101100310 = "드시고 간 디저트는 입맛에 맞으셨을지 모르겠네요."
10110-101100320 = "나름대로 최고의 재료로 최고의 장인들께 부탁드려 만든 것이었습니다만"
10110-101100330 = "정말 최고였어. 내 거랑 달리!"
10110-101100340 = "내가 사 간 것과 너무 비교되네."
10110-101100350 = "그런 말씀 마세요."
10110-101100360 = "사 주신 것들도 틀림없이 최고의 디저트랍니다."
10110-101100370 = "네."
10110-101100380 = "지금 혀가, 그렇게 평가를 내리고 있네요."
10110-101100390 = "벌써 저녁이라니"
10110-101100400 = "오늘 하루는 정말 시간이 빨리 갔군요."
10110-101100410 = "일이 많았어?"
10110-101100420 = "바쁜 날이었어?"
10110-101100430 = "아니요. 그런 건 아니었습니다."
10110-101100440 = "오히려 일할 때보다 더 빠르게 갔으니까요."
10110-101100450 = "책을 볼 때에는……."
10110-101100460 = "정말 하루가 48시간이라도 부족할 것 같네요."
10110-101100470 = "오늘 일은 정말 감사드립니다. 선생님."
10110-101100480 = "원래도 좋아하는 책인데, 즐거움이 배로 늘었군요."
10110-101100490 = "나도 좋았어."
10110-101100500 = "필요하면 언제든 말해줘."
10110-101100510 = "네."
10110-101100520 = "꼭 그렇게 하겠습니다."
10110-101100530 = "선생님"
10110-101100540 = "조만간 티파티에 오실 일이 있다고 들었어요."
10110-101100550 = "맞아. 논의해야 할 게 좀 있어서."
10110-101100560 = "업무적인 거긴 하지만, 맞아."
10110-101100570 = "그렇군요."
10110-101100580 = "잘 알았습니다."
10110-101100590 = "늦은 밤은 사람을 센티멘탈하게 만들지요."
10110-101100600 = "분위기에 취해 조금 과한 행동을 한 것 같은데,"
10110-101100610 = "혹시라도 부끄러운 모습이었다면 사과드리겠습니다."
10110-101100620 = "절대 그렇지 않아. 엄청 좋았어."
10110-101100630 = "기회만 된다면 얼마든지 더 듣고 싶었어."
10110-101100640 = "또 그렇게 말씀하시고"
10110-101100650 = "하지만"
10110-101100660 = "네."
10110-101100670 = "저도 선생님만 계신 곳에서라면, 자주 그러고 싶어요."

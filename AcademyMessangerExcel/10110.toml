[translation]
10110-101100010 = "Hey Sensei"
10110-101100020 = "If you don't mind, could you visit Trinity soon?"
10110-101100030 = "Sometime when you're not busy... Please."
10110-101100040 = "Of course I can...but what's going on?"
10110-101100050 = "Seia? Did something happen?"
10110-101100060 = "...Forgive me."
10110-101100070 = "I can't tell you right now."
10110-101100080 = "Also, please keep this a secret from others too."
10110-101100090 = "I'll be waiting for you then."
10110-101100100 = "When I woke up, I saw you'd left."
10110-101100110 = "I couldn't greet you when you got here,"
10110-101100120 = "and then I was sleeping when you took off. I'm sorry about that."
10110-101100130 = "It was nice getting a decent sleep, though."
10110-101100140 = "The bed's very comfortable."
10110-101100150 = "I see."
10110-101100160 = "So I'll find a different excuse"
10110-101100170 = "to see you next time, Sensei."
10110-101100180 = "Sensei, do you have a moment later?"
10110-101100190 = "I think I'm going to need your medical skills."
10110-101100200 = "Let me guess, you're \"sick\"?"
10110-101100210 = "Is that the excuse we're going with this time?"
10110-101100220 = "Well, yes."
10110-101100230 = "I can't properly say I'm sick, I suppose."
10110-101100240 = "I can't lie, and besides,"
10110-101100250 = "you'd worry too much if I told you that."
10110-101100260 = "I only want you SLIGHTLY worried, and a little dubious."
10110-101100270 = "Right around that level."
10110-101100280 = "But you found me out too early. Well, so it goes."
10110-101100290 = "Sensei."
10110-101100300 = "Please swing by soon when you're free."
10110-101100310 = "Did you enjoy the desserts?"
10110-101100320 = "They were made by the best patissiers, using the best ingredients."
10110-101100330 = "They were the best. Mine, not so much."
10110-101100340 = "The ones I brought were, um..."
10110-101100350 = "Oh, please don't say that."
10110-101100360 = "The ones you bought were also the best, undeniably."
10110-101100370 = "I see."
10110-101100380 = "That's what my tongue's saying right now, anyway."
10110-101100390 = "It's already evening"
10110-101100400 = "Time really flew by today."
10110-101100410 = "Did you have a lot of work?"
10110-101100420 = "Did you have a busy day?"
10110-101100430 = "No, nothing of the kind."
10110-101100440 = "In fact, time flew faster than when I would work."
10110-101100450 = "When I'm reading books..."
10110-101100460 = "the days go by two, three times as fast."
10110-101100470 = "Thank you so much for today, Sensei."
10110-101100480 = "I already liked the book, so it made me twice as happy."
10110-101100490 = "I enjoyed it too."
10110-101100500 = "Let me know whenever if you need me."
10110-101100510 = "I see."
10110-101100520 = "I will."
10110-101100530 = "Hey Sensei"
10110-101100540 = "I heard you'll be visiting the Tea Party soon."
10110-101100550 = "Yeah. There are some things I need to talk about."
10110-101100560 = "It's for work, but yes."
10110-101100570 = "I see."
10110-101100580 = "Understood."
10110-101100590 = "People get sentimental late at night."
10110-101100600 = "I think I got a little carried away and went too far."
10110-101100610 = "I'd like to apologize if I was out of line."
10110-101100620 = "Not at all. It was great."
10110-101100630 = "I would have loved to hear more if I had a chance."
10110-101100640 = "You're at it again."
10110-101100650 = "But"
10110-101100660 = "I see."
10110-101100670 = "I feel the same way. If you're around, I want to be like that more often."

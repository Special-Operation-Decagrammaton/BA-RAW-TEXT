[translation]
10110-101100010 = "คุณครู"
10110-101100020 = "ถ้าคุณครูสะดวกละก็ ช่วยแวะมาที่\nทรีนิตี้หน่อยได้มั้ยคะ?"
10110-101100030 = "เอาเป็นเวลาที่คุณครูไม่ต้องเร่งรีบ\nน่ะค่ะ... รบกวนด้วยนะคะ"
10110-101100040 = "ครูไปได้อยู่แล้ว...\nว่าแต่เป็นอะไรเหรอ?"
10110-101100050 = "เซอา? มีเรื่องอะไรหรือเปล่า?"
10110-101100060 = "ขอโทษด้วยค่ะ..."
10110-101100070 = "ตอนนี้ฉันคงเล่าให้ฟังไม่ได้ค่ะ"
10110-101100080 = "ช่วยเก็บเรื่องนี้เป็นความลับกับคนอื่น\nด้วยนะคะ"
10110-101100090 = "แล้วฉันจะรอค่ะ"
10110-101100100 = "พอตื่นมา คุณครูก็กลับไปซะแล้วนะคะ"
10110-101100110 = "ตอนมาถึง ฉันก็ไม่ได้ทักทายอย่างเป็น\nกิจจะลักษณะด้วย"
10110-101100120 = "ขอโทษที่หลับไปตอนคุณครูกลับนะคะ"
10110-101100130 = "ครูก็ไม่ได้นอนหลับสบายมานานแล้ว"
10110-101100140 = "เตียงนอนสบายมากเลยนะ"
10110-101100150 = "ค่ะ"
10110-101100160 = "ถ้างั้นเอาไว้คราวหน้า"
10110-101100170 = "ฉันจะให้มาเจอด้วยข้ออ้างอื่นนะคะ\nคุณครู"
10110-101100180 = "หลังจากนี้คุณครูพอจะมีเวลาว่างบ้าง\nมั้ยคะ?"
10110-101100190 = "ฉันว่าฉันน่าจะต้องให้คุณครูมาเยี่ยมไข้\nหน่อยแล้วละค่ะ"
10110-101100200 = "ไม่พูดว่าตัวเอง 'ไม่สบาย' สินะ"
10110-101100210 = "เป็น 'ข้ออ้าง' ใหม่สินะเนี่ย"
10110-101100220 = "ค่ะ ก็ประมาณนั้นค่ะ"
10110-101100230 = "ฉันพูดตรงๆ ว่าตัวเอง 'ไม่สบาย' ไม่ได้\nหรอกค่ะ"
10110-101100240 = "จะโกหกก็ไม่ได้ด้วย"
10110-101100250 = "ฉันกลัวว่าถ้าบอกว่า 'ไม่สบาย'\nคุณครูจะกังวลมากเกินไปน่ะค่ะ"
10110-101100260 = "ขอแค่สงสัยและแอบเป็นห่วงนิดหน่อย\nก็พอค่ะ"
10110-101100270 = "แค่นั้นละค่ะที่ฉันต้องการ"
10110-101100280 = "แต่ถึงอย่างนั้น ฉันก็ถูกจับได้แล้วสินะ\nถ้าอย่างนั้นก็ช่วยไม่ได้ค่ะ"
10110-101100290 = "คุณครู"
10110-101100300 = "ไว้ตอนว่างๆ ช่วยมาหาฉันหน่อยนะคะ"
10110-101100310 = "ขนมที่คุณครูได้กินไปจะถูกปาก\nหรือเปล่าก็ไม่รู้นะคะ"
10110-101100320 = "แต่นั่นเป็นขนมจากวัตถุดิบชั้นยอด\nที่ฉันสั่งมาจากเชฟคนดังเลยค่ะ"
10110-101100330 = "อร่อยจนแสงออกปากเลยละ!"
10110-101100340 = "ต่างจากขนมของครูลิบลับเลย"
10110-101100350 = "อย่าพูดแบบนั้นสิคะ"
10110-101100360 = "ขนมที่คุณครูซื้อมาก็ยอดเยี่ยม\nไม่แพ้กันค่ะ"
10110-101100370 = "ค่ะ"
10110-101100380 = "ตอนนี้ลิ้นของฉันกำลังบอกอย่างนั้นค่ะ"
10110-101100390 = "ตกเย็นแล้วอย่างนั้นเหรอ"
10110-101100400 = "วันนี้เวลาผ่านไปเร็วมากๆ เลยนะคะ"
10110-101100410 = "งานเยอะเหรอ?"
10110-101100420 = "วันนี้ยุ่งล่ะสิ?"
10110-101100430 = "ไม่ค่ะ ไม่ใช่อย่างนั้นค่ะ"
10110-101100440 = "ที่จริงเวลาผ่านไปเร็วกว่าตอนทำงาน\nอีกค่ะ"
10110-101100450 = "ตอนอ่านหนังสือน่ะ..."
10110-101100460 = "ต่อให้หนึ่งวันมี 48 ชั่วโมงก็ไม่เพียงพอ\nอยู่ดีค่ะ"
10110-101100470 = "วันนี้ขอบคุณมากนะคะ คุณครู"
10110-101100480 = "มันเป็นหนังสือที่ฉันชอบตั้งแต่แรกแล้ว\nแบบนี้ความสนุกยิ่งทวีคูณเลยค่ะ"
10110-101100490 = "ครูก็สนุกเหมือนกัน"
10110-101100500 = "ถ้าจำเป็นเมื่อไรก็บอกได้ตลอดเลยนะ"
10110-101100510 = "ค่ะ"
10110-101100520 = "แล้วฉันจะทำอย่างนั้นค่ะ"
10110-101100530 = "คุณครู"
10110-101100540 = "ฉันได้ยินมาว่าคุณครูจะมาที่สภาน้ำชา\nในเร็วๆ นี้น่ะค่ะ"
10110-101100550 = "ใช่ มีเรื่องที่ครูต้องเข้าไปประชุม"
10110-101100560 = "มันเป็นเรื่องงานน่ะ"
10110-101100570 = "อย่างนั้นสินะคะ"
10110-101100580 = "เข้าใจแล้วค่ะ"
10110-101100590 = "ดึกดื่นค่ำคืนทำให้คนเราอ่อนไหวนะคะ"
10110-101100600 = "เหมือนว่าบรรยากาศจะพาให้เราทำ\nอะไรเกินกว่าเหตุ"
10110-101100610 = "ถ้าฉันเผลอทำอะไรน่าอายไปก็ต้อง\nขอโทษด้วยนะคะ"
10110-101100620 = "ไม่เลย ทำได้ดีมากเลยต่างหากล่ะ"
10110-101100630 = "ถ้ามีโอกาส ครูก็อยากฟังอีกนะ"
10110-101100640 = "พูดอย่างนี้อีกแล้ว"
10110-101100650 = "แต่ว่า"
10110-101100660 = "ค่ะ"
10110-101100670 = "ถ้าฉันได้อยู่ในที่เดียวกับคุณครู\nฉันก็อยากทำแบบนั้นบ่อยๆ ค่ะ"

[translation]
20050-200500010 = "สวัสดี คุณครู!"
20050-200500020 = "ฉันอุสุบะ ริตสึค่ะ!"
20050-200500030 = "จริงสิ พรุ่งนี้เป็นเวรริตสึใช่มั้ย?"
20050-200500040 = "ใช่ค่ะ!"
20050-200500050 = "เจอกันพรุ่งนี้นะ! คุณครู!"
20050-200500060 = "คุณครูคุณครูคุณครู"
20050-200500070 = "คุณครูชอบสีอะไรเหรอ?"
20050-200500080 = "น่าจะขึ้นอยู่กับว่าเป็นสีของอะไรน่ะ...?"
20050-200500090 = "อ่าฮะ!"
20050-200500100 = "งั้นฉันคงต้องตัดสินใจเองแล้วละ!"
20050-200500110 = "หืม? อะไรเหรอ?"
20050-200500120 = "ริตสึ?"
20050-200500130 = "ตอนนี้ฉันอยู่หน้าชาเล่ต์!"
20050-200500140 = "คุณครูทำอะไรอยู่เหรอ?"
20050-200500150 = "มาไม่ให้ตั้งตัวเลย?!"
20050-200500160 = "ก็คราวก่อนเราตกลงไปซื้อเสื้อผ้า\nด้วยกันไม่ใช่เหรอ!"
20050-200500170 = "ยุ่งอยู่หรือเปล่า คุณครู?"
20050-200500180 = "ก็ต้องยุ่งอยู่แล้ว"
20050-200500190 = "แต่ไปกันเถอะ เดี๋ยวนี้เลย"
20050-200500200 = "หืม?"
20050-200500210 = "เข้าเรื่องเลยนะ คุณครู"
20050-200500220 = "ฉันเจอที่ที่แปลกๆ เยอะเลยละ!"
20050-200500230 = "ที่ที่แปลกๆ...?"
20050-200500240 = "อื้อ! มาที่ไวลด์ฮันต์ได้มั้ย?"
20050-200500250 = "ฉันอยากพาคุณครูไปดูที่นั่นให้ได้เลย!"
20050-200500260 = "น่าเศร้านะ คุณครู"
20050-200500270 = "ที่นั่นไม่น่าจะใช้เป็นเส้นทางลักลอบ\nขนส่งสินค้าได้"
20050-200500280 = "เห็นว่ามันไม่มีเส้นทางเชื่อมมาใน\nโรงเรียนน่ะ"
20050-200500290 = "อ่อ..."
20050-200500300 = "แต่ก็ไม่เป็นไร!"
20050-200500310 = "ยังไงก็ได้เป็นฐานลับที่รู้กันเฉพาะฉัน\nกับคุณครูเท่านั้น!"
20050-200500320 = "ไว้คราวหน้าไปด้วยกันอีกนะ!"

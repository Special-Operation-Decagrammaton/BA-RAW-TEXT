[translation]
10030-100300010 = "您好，老師"
10030-100300020 = "昨天值班結束回家的時候，我發現夏萊的燈還亮著……"
10030-100300030 = "聽說您上週末也加班到很晚……"
10030-100300040 = "最近有好好休息嗎？"
10030-100300050 = "工作實在太多了……"
10030-100300060 = "這可不行唷，休息也是正式任務的一部份"
10030-100300070 = "身為格黑娜風紀委員會的救護負責人，可不能坐視不管"
10030-100300080 = "最近身體有什麼不舒服的地方嗎？"
10030-100300090 = "最近眼睛似乎很疲勞……"
10030-100300100 = "最近肩膀好像很僵硬……"
10030-100300110 = "原來如此……這是典型的慢性疲勞症狀"
10030-100300120 = "這麼說來，格黑娜學園有很多能緩解疲勞的溫泉"
10030-100300130 = "有空的時候，不妨來泡一下格黑娜的溫泉哦？"
10030-100300140 = "這樣啊，聽起來不錯"
10030-100300150 = "有空的時候會順道去看看"
10030-100300160 = "好的，請務必前來"
10030-100300170 = "希望能稍微消除老師的疲勞"
10030-100300180 = "～千夏～"
10030-100300190 = "老師，您辛苦了"
10030-100300200 = "在享受溫泉時有遇到什麼不方便嗎？"
10030-100300210 = "沒問題"
10030-100300220 = "多虧有千夏關照，非常完美"
10030-100300230 = "那太好了"
10030-100300240 = "然後，進入正題……現在方便去老師那邊打擾一下嗎？"
10030-100300250 = "那個，當然不是奇怪的意思……！"
10030-100300260 = "是因為得到了恢復疲勞很有效的茶，如果可以的話，想一起喝茶"
10030-100300270 = "那個……您覺得如何？"
10030-100300280 = "謝謝，我等你唷"
10030-100300290 = "不會，我才要感謝老師"
10030-100300300 = "那麼，我馬上就過去拜訪您"
10030-100300310 = "～千夏～"
10030-100300320 = "您好，老師"
10030-100300330 = "那個，如果可以的話，今天下午能占用您一點時間嗎？"
10030-100300340 = "其實是有事情想請老師幫忙……"
10030-100300350 = "嗯，交給我吧"
10030-100300360 = "如果是千夏的請求就儘管來吧！"
10030-100300370 = "非，非常感謝"
10030-100300380 = "那麼，我在伴手禮店的前面等您"
10030-100300390 = "萬事拜託了"
10030-100300400 = "～千夏～"
10030-100300410 = "老師，您好"
10030-100300420 = "之前挑選禮物的那件事，非常感謝您"
10030-100300430 = "而且還收到了禮物……"
10030-100300440 = "那個，雖然回禮您的回禮聽起來可能很奇怪……"
10030-100300450 = "但我也想要報答恩情，所以預約了某間旅館"
10030-100300460 = "是個不錯的地方，餐點和設施都有不錯的評價，我想您一定會滿意的"
10030-100300470 = "那麼，我等您唷"
10030-100300480 = "～千夏～"

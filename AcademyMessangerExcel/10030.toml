[translation]
10030-100300010 = "สวัสดีค่ะ คุณครู"
10030-100300020 = "เมื่อวานหลังเลิกงาน ฉันเห็นว่า\nไฟห้องทำงานชาเล่ต์เปิดจนดึกเลยค่ะ"
10030-100300030 = "ได้ยินว่าสุดสัปดาห์ที่แล้ว\nคุณครูก็โหมทำงานหนักด้วย..."
10030-100300040 = "คุณครูได้พักผ่อนเพียงพอรึเปล่าคะ?"
10030-100300050 = "ช่วยไม่ได้ ครูมีงานต้องทำเยอะนี่นา"
10030-100300060 = "ไม่ได้นะคะ การพักผ่อนก็เป็น\nส่วนหนึ่งของงานเหมือนกันค่ะ"
10030-100300070 = "ในฐานะผู้รับผิดชอบด้านสุขอนามัย\nของคณะกรรมการวินัยเกเฮนน่า ฉันคง\nยอมให้คุณครูเสียสุขภาพไม่ได้ค่ะ"
10030-100300080 = "ช่วงนี้รู้สึกไม่สบายตัวหรือ\nมีอาการอะไรเป็นพิเศษมั้ยคะ?"
10030-100300090 = "ดูเหมือนตาจะล้าๆ น่ะ"
10030-100300100 = "รู้สึกตึงๆ ที่ไหล่น่ะ"
10030-100300110 = "อาการตาล้าและตึงที่ไหล่ เป็นอาการ\nที่พบได้จากอาการเหนื่อยสะสมค่ะ"
10030-100300120 = "พอนึกดูแล้ว ที่สถาบันเกเฮนน่า\nมีโรงอาบน้ำที่ช่วยให้คลายความ\nเหนื่อยล้าได้อยู่ด้วยค่ะ"
10030-100300130 = "ถ้าคุณครูมีเวลา ลองมาผ่อนคลาย\nที่ออนเซ็นที่โรงเรียนเกเฮนน่าดูมั้ยคะ?"
10030-100300140 = "น่าสนใจดีนะ"
10030-100300150 = "ถ้ามีเวลาครูจะแวะไปแล้วกัน"
10030-100300160 = "ได้ค่ะ"
10030-100300170 = "ถ้างั้นฉันจะรอให้คุณครู\nมาที่โรงเรียนเรานะคะ"
10030-100300180 = "- ชินัตสึ"
10030-100300190 = "สวัสดีค่ะคุณครู ชินัตสึเองค่ะ"
10030-100300200 = "ในระหว่างที่พักผ่อนที่ออนเซ็น\nมีเรื่องอะไรที่ไม่สะดวกบ้างรึเปล่าคะ"
10030-100300210 = "ไม่มีเลย"
10030-100300220 = "ไม่มีหรอก\nชินัตสึดูแลครูดีจะตาย"
10030-100300230 = "ฉันดีใจที่ได้ยินแบบนั้นนะคะ"
10030-100300240 = "คือว่าถ้าคุณครูสะดวก ฉันจะขอไป\nพบคุณครูตอนนี้ได้มั้ยคะ?"
10030-100300250 = "ไม่ได้มีเหตุผลอะไรแปลกๆ หรอกนะคะ!"
10030-100300260 = "คือว่าฉันเพิ่งได้ชาชั้นดีที่ช่วย\nคลายความเหนื่อยล้าได้มาค่ะ"
10030-100300270 = "ถ้าคุณครูสะดวก ฉันก็อยากจะ\nชวนคุณครูดื่มชาด้วยกันค่ะ"
10030-100300280 = "ได้อยู่แล้ว"
10030-100300290 = "ค่ะ"
10030-100300300 = "ถ้าอย่างนั้น เดี๋ยวพบกันนะคะ"
10030-100300310 = "- ชินัตสึ"
10030-100300320 = "สวัสดีค่ะ คุณครู"
10030-100300330 = "คือว่าถ้าคุณครูสะดวก วันนี้หลัง\nทานมื้อเที่ยงแล้ว ฉันขอรบกวน\nเวลาคุณครูหน่อยได้มั้ยคะ?"
10030-100300340 = "ฉันมีเรื่องที่อยากจะขอ\nความช่วยเหลือจากคุณครูค่ะ"
10030-100300350 = "อื้อ ได้อยู่แล้ว"
10030-100300360 = "ถ้าเป็นคำขอของชินัตสึละก็ได้เสมอเลย!"
10030-100300370 = "ขอบคุณค่ะ"
10030-100300380 = "ถ้างั้นฉันจะรอที่ร้านขายของ\nที่ระลึกตรงทางเข้าออนเซ็นนะคะ"
10030-100300390 = "เจอกันหลังมื้อเที่ยงนะคะ"
10030-100300400 = "- ชินัตสึ"
10030-100300410 = "สวัสดีค่ะคุณครู ชินัตสึเองค่ะ"
10030-100300420 = "เมื่อคราวก่อนตอนเลือกของขวัญ\nฉันรบกวนคุณครูเอาไว้เยอะเลยค่ะ"
10030-100300430 = "แถมคุณครูยังให้ของขวัญฉันด้วย"
10030-100300440 = "ฉันคิดว่ามันเป็นสิ่งที่ไม่ถูกต้อง\nถ้าจะได้รับความช่วยเหลืออยู่ฝ่ายเดียวค่ะ"
10030-100300450 = "ฉันจองบัตรกำนัลที่พักเรียวกัง\nสุดหรูที่อยู่ใกล้ๆ นี้เอาไว้แล้วค่ะ"
10030-100300460 = "เป็นเรียวกังที่ขึ้นชื่อเรื่องความสะดวก\nสบายและอาหารชั้นเลิศ ฉันคิดว่าคุณครู\nคงจะต้องพอใจแน่ๆ ค่ะ"
10030-100300470 = "ถ้างั้นฉันจะรอคุณครูอยู่ที่นี่นะคะ"
10030-100300480 = "- ชินัตสึ"

[translation]
10030-100300010 = "Hello, Sensei."
10030-100300020 = "Yesterday, on my way home after duty, I noticed that the Schale office lights were on until late."
10030-100300030 = "I heard that you overworked yourself last weekend as well."
10030-100300040 = "Are you getting enough rest?"
10030-100300050 = "I have too much work, so there's nothing I can do."
10030-100300060 = "That won't do. Resting is also a part of work."
10030-100300070 = "As the head of the Medical Committee of the Gehenna Prefect Team, I cannot stand by and watch as your health deteriorates."
10030-100300080 = "Have you felt any particular discomfort recently?"
10030-100300090 = "My eyes are often tired."
10030-100300100 = "My shoulders are often tense."
10030-100300110 = "You're exhibiting classic symptoms of chronic fatigue."
10030-100300120 = "Come to think of it, Gehenna Academy has many hot springs that can help relieve fatigue."
10030-100300130 = "How about visiting Gehenna Academy and enjoying the hot springs when you have time?"
10030-100300140 = "That's a good idea."
10030-100300150 = "I'll stop by when I have time."
10030-100300160 = "Yes."
10030-100300170 = "Well then, I look forward to the day you visit our academy."
10030-100300180 = "- Chinatsu"
10030-100300190 = "Hello, Sensei. This is Chinatsu."
10030-100300200 = "Is there anything uncomfortable with your stay at the hot springs?"
10030-100300210 = "No, not at all."
10030-100300220 = "All thanks to you, Chinatsu."
10030-100300230 = "I'm glad to hear that."
10030-100300240 = "If it's okay with you, can I stop by your room right now?"
10030-100300250 = "Not for any weird reason of course!"
10030-100300260 = "It's just that I bought some teas that are good for relieving fatigue..."
10030-100300270 = "So I was wondering if you would like to have a cup of tea together."
10030-100300280 = "Sure."
10030-100300290 = "Yes."
10030-100300300 = "Then I will see you soon."
10030-100300310 = "- Chinatsu"
10030-100300320 = "Hello, Sensei."
10030-100300330 = "If it's okay with you, could you make some time for me after lunch today?"
10030-100300340 = "There is something that I need your help with, Sensei."
10030-100300350 = "Yeah, sure."
10030-100300360 = "Anything for you, Chinatsu!"
10030-100300370 = "Thank you."
10030-100300380 = "Then I will be waiting for you at the souvenir shop at the entrance of the hot springs resort."
10030-100300390 = "I will see you after lunch."
10030-100300400 = "- Chinatsu"
10030-100300410 = "Hello, Sensei. This is Chinatsu."
10030-100300420 = "You helped me pick out thank you gifts for my members last time."
10030-100300430 = "And you gave me a lot of gifts as well."
10030-100300440 = "I don't think it's right for me to keep on receiving without reciprocating the kindness you've shown me."

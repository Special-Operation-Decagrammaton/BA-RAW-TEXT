[translation]
10030-100300010 = "안녕하세요, 선생님."
10030-100300020 = "어제 당번 활동을 마치고 돌아가는 길에 보니 밤늦게까지 샬레 사무실의 불이 켜져 있더군요."
10030-100300030 = "지난주 주말에도 샬레의 일 때문에 과로를 하셨다고 들었는데……"
10030-100300040 = "휴식은 제대로 취하고 계시나요?"
10030-100300050 = "일이 너무 많아서 어쩔 수가 없어."
10030-100300060 = "안 됩니다. 휴식도 엄연한 업무의 일부니까요."
10030-100300070 = "게헨나 선도부의 보건 담당으로서 선생님의 건강이 악화되는 건 묵과할 수 없습니다."
10030-100300080 = "최근 특별히 몸에 불편하신 점은 없으신가요?"
10030-100300090 = "눈이 자주 피로한 것 같아."
10030-100300100 = "어깨가 자주 결리는 것 같아."
10030-100300110 = "눈의 피로와 어깨 결림이라. 전형적인 만성 피로의 증상이군요."
10030-100300120 = "그러고보니 게헨나 학원에는 피로 해소에 도움이 되는 탕이 많이 있습니다."
10030-100300130 = "시간이 되실 때 게헨나 학원을 방문하셔서 온천을 즐겨보시는 건 어떠신가요?"
10030-100300140 = "좋은 생각이네."
10030-100300150 = "시간 날 때 한번 들를게."
10030-100300160 = "네."
10030-100300170 = "그럼 언젠가 저희 학원을 방문하실 날을 기다리고 있겠습니다."
10030-100300180 = "- 치나츠"
10030-100300190 = "안녕하세요, 선생님. 치나츠입니다."
10030-100300200 = "온천 휴양 중에 무언가 특별히 불편한 점은 없으신지요."
10030-100300210 = "응, 문제없어."
10030-100300220 = "치나츠가 배려해 준 덕분이야."
10030-100300230 = "그렇다니 다행입니다."
10030-100300240 = "혹시 괜찮으시다면 지금 선생님의 방에 찾아가도 괜찮겠습니까?"
10030-100300250 = "그, 물론 이상한 의미로 말씀드린 게 아니라……!"
10030-100300260 = "다름이 아니라 피로 해소에 좋은 차를 몇 가지 구해서……"
10030-100300270 = "괜찮으시다면 함께 차라도 한 잔 어떠신가 해서요."
10030-100300280 = "좋아."
10030-100300290 = "네."
10030-100300300 = "그럼 곧 찾아뵙도록 하겠습니다."
10030-100300310 = "- 치나츠"
10030-100300320 = "안녕하세요, 선생님."
10030-100300330 = "혹시 괜찮으시다면 오늘 점심 식사 이후에 잠깐 시간을 내주지 않으시겠습니까?"
10030-100300340 = "선생님께 도움을 요청하고 싶은 일이 있습니다."
10030-100300350 = "응, 괜찮아."
10030-100300360 = "치나츠의 부탁이라면 뭐든지!"
10030-100300370 = "감사합니다."
10030-100300380 = "그럼 온천장 입구의 기념품 가게에서 기다리고 있겠습니다."
10030-100300390 = "식사 후에 뵙겠습니다."
10030-100300400 = "- 치나츠"
10030-100300410 = "선생님, 안녕하세요. 치나츠입니다."
10030-100300420 = "지난번에는 부원들에게 선물할 답례품을 고르며 선생님께 신세를 졌습니다."
10030-100300430 = "그 외에도 이것저것 잔뜩 선물을 받기도 했었고……"
10030-100300440 = "베풀어 주신 은혜에 보답하지 않고 넘어가는 것은 올바른 자세가 아니라고 생각되어,"
10030-100300450 = "근처에 있는 고급 료칸의 숙박권을 예약해 두었습니다."
10030-100300460 = "식사나 시설이 훌륭하기로 소문난 료칸이니, 선생님께서도 분명 만족하시리라 생각합니다."
10030-100300470 = "그럼 기다리고 있겠습니다."
10030-100300480 = "- 치나츠"

[translation]
10107-101070010 = "★週刊萬魔殿★☞訂閱就能100%獲得感謝禮物！"
10107-101070020 = "歡迎立即聯絡！"
10107-101070030 = "千秋？"
10107-101070040 = "是千秋……對吧？"
10107-101070050 = "哦？"
10107-101070060 = "感謝你的回覆，老師！！"
10107-101070070 = "你想訂閱《週刊萬魔殿》嗎？"
10107-101070080 = "啊，我不是這個意思"
10107-101070090 = "沒關係沒關係！我不會強迫你的！"
10107-101070100 = "我先送一份過去，老師看過之後再決定吧！"
10107-101070110 = "啊"
10107-101070120 = "剛才忘記說了！"
10107-101070130 = "我也會寄一份《週刊萬魔殿》訂閱紀念禮物過去哦！"
10107-101070140 = "禮物？是什麼東西呢？"
10107-101070150 = "呵呵呵"
10107-101070160 = "這是祕密～！"
10107-101070170 = "你好呀～老師！"
10107-101070180 = "請問你今天在夏萊嗎？"
10107-101070190 = "對……我正在上班……"
10107-101070200 = "怎麼感覺有氣無力的呢？？"
10107-101070210 = "既然如此"
10107-101070220 = "就由我來幫你把午後的無聊一掃而空吧！"
10107-101070230 = "馬上開始配送《週刊萬魔殿》的訂閱感謝禮物！"
10107-101070240 = "我立刻過去，麻煩稍等一下哦！"
10107-101070250 = "嗚嗚"
10107-101070260 = "嘴巴裡的甜味揮之不去……"
10107-101070270 = "你究竟吃了多少……"
10107-101070280 = "我把剛才吃過的所有甜點都再吃了一遍……"
10107-101070290 = "幸好有朋友們一起幫忙！"
10107-101070300 = "而且也拍到了很多照片！"
10107-101070310 = "如果能成功的話，這也算是不幸中的大幸吧"
10107-101070320 = "不過之後好一陣子，我應該都不會想再碰甜食了"
10107-101070330 = "嗚嗚……"
10107-101070340 = "～《週刊萬魔殿》公告～"
10107-101070350 = "本週的《週刊萬魔殿》將會休刊！"
10107-101070360 = "如果發現信箱空空如也請不必驚慌。我們下週見！"
10107-101070370 = "老師"
10107-101070380 = "如果剛才有發現喜歡的社團"
10107-101070390 = "不知道你願不願意，跟我一起以客座成員的身分參加呢！"
10107-101070400 = "感覺不錯呢，我會考慮看看的"
10107-101070410 = "是！"
10107-101070420 = "歡迎隨時跟我說哦～"
10107-101070430 = "下週的《週刊萬魔殿》將會是特刊號！"
10107-101070440 = "是不是很期待呀，老師？"
10107-101070450 = "特刊號？"
10107-101070460 = "沒錯！"
10107-101070470 = "為了滿足訂閱者們平時的好奇心"
10107-101070480 = "我準備了一些報導來為他們解密！"
10107-101070490 = "解密啊……"
10107-101070500 = "我好像也挺好奇的？"
10107-101070510 = "嘻嘻"
10107-101070520 = "這個祕密～現在還不能告訴你～"
10107-101070530 = "今天真的非常感謝！"
10107-101070540 = "多虧有老師的幫忙，特刊的報導應該會非常精彩～"
10107-101070550 = "很高興能幫上忙"
10107-101070560 = "這次的特刊號，我會特別優先送給老師！"
10107-101070570 = "之後我再親自送過來，敬請期待～！"

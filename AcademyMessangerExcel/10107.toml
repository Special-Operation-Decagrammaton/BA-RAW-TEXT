[translation]
10107-101070010 = "สมัครรับ ★ แพนเดโมเนียม โซไซตี้รายสัปดาห์ ★☞ แล้วรับของสมนาคุณไปเลย 100%!"
10107-101070020 = "รีบติดต่อมาตอนนี้ ด่วนเลยค่ะ!"
10107-101070030 = "จิอากิ?"
10107-101070040 = "จิอากิ... ใช่มั้ย?"
10107-101070050 = "อ๊ะ?"
10107-101070060 = "ขอบคุณที่ตอบนะคะ คุณครู!!"
10107-101070070 = "ต้องการสมัครรับ <แพนเดโมเนียม\nโซไซตี้รายสัปดาห์> เหรอคะ?"
10107-101070080 = "อ่า ไม่ใช่อย่างนั้น"
10107-101070090 = "ค่ะ ค่ะ! ฉันไม่บังคับหรอกค่ะ!"
10107-101070100 = "ฉันจะให้ลองดูหนึ่งฉบับก่อน\nดูแล้วค่อยตัดสินใจก็ได้ค่ะ!"
10107-101070110 = "อ๊ะ"
10107-101070120 = "เมื่อกี้ฉันลืมบอกไปเลยค่ะ!"
10107-101070130 = "ไว้ฉันจะเอาของสมนาคุณที่สมัครรับ\nนิตยสารของเราไปให้นะคะ!"
10107-101070140 = "ของสมนาคุณ? คืออะไรเหรอ?"
10107-101070150 = "ฮิฮิฮิ"
10107-101070160 = "เป็นความลับค่ะ~!"
10107-101070170 = "สวัสดีค่ะ คุณครู~!"
10107-101070180 = "วันนี้อยู่ที่ชาเล่ต์มั้ยคะ??"
10107-101070190 = "อยู่... แต่ว่าทำงานอยู่น่ะ..."
10107-101070200 = "พูดเหมือนคนหมดแรงเลยนะคะ??"
10107-101070210 = "ถ้างั้น"
10107-101070220 = "วันนี้ฉันจะเอาของสมนาคุณที่สมัครรับ\n<แพนเดโมเนียม โซไซตี้รายสัปดาห์>\nไปให้ค่ะ"
10107-101070230 = "รับรองว่าจะช่วยขจัดความเบื่อของวันนี้\nได้ในพริบตาเลยละค่ะ!"
10107-101070240 = "ช่วยรอสักครู่นะคะ ฉันจะเอาไปให้\nเดี๋ยวนี้เลยค่ะ!"
10107-101070250 = "ฮือ"
10107-101070260 = "รสหวานยังไม่หายไปจากลิ้นเลยค่ะ..."
10107-101070270 = "กินไปขนาดไหนเนี่ย..."
10107-101070280 = "ฉันกินขนมที่กินเหลือไว้อีกรอบจน\nเรียบเลยค่ะ..."
10107-101070290 = "โชคดีที่มีเพื่อนๆ ช่วยเอาไว้ได้เยอะ\nเลยค่ะ!"
10107-101070300 = "รูปก็ถ่ายได้เยอะด้วยค่ะ!"
10107-101070310 = "ถ้าสำเร็จก็คงเป็นโชคดีในโชคร้าย\nแหละนะ"
10107-101070320 = "แต่ฉันน่าจะไม่อยากกินอะไรหวานๆ\nไปสักพักเลยค่ะ"
10107-101070330 = "ฮือ..."
10107-101070340 = "- ประกาศจาก <แพนเดโมเนียม\nโซไซตี้รายสัปดาห์> -"
10107-101070350 = "สัปดาห์นี้เราจะหยุดตีพิมพ์ชั่วคราวค่ะ!"
10107-101070360 = "ถ้าตู้จดหมายว่างอยู่ก็ไม่ต้องตกใจ\nแล้วไว้รออ่านฉบับสัปดาห์หน้านะคะ!"
10107-101070370 = "คุณครู"
10107-101070380 = "ถ้าเมื่อกี้มีชมรมที่ถูกใจละก็"
10107-101070390 = "ไปเข้าร่วมกับฉันในฐานะสมาชิก\nรับเชิญมั้ยคะ?"
10107-101070400 = "เอาสิ ครูจะลองคิดดูนะ"
10107-101070410 = "ดีเลยค่ะ!"
10107-101070420 = "บอกฉันได้ตลอดเลยนะคะ~"
10107-101070430 = "<แพนเดโมเนียม โซไซตี้รายสัปดาห์>\nสัปดาห์หน้าจะเป็นฉบับพิเศษค่ะ!"
10107-101070440 = "คุณครูตื่นเต้นมั้ยคะ?"
10107-101070450 = "ฉบับพิเศษเหรอ?"
10107-101070460 = "ใช่ค่ะ!"
10107-101070470 = "ฉันเตรียมข่าวที่จะเปิดเผยในสิ่งที่"
10107-101070480 = "ผู้อ่านของเราสงสัยไว้หลายข่าวเลยค่ะ!"
10107-101070490 = "แต่ข่าวเป็นความลับงั้นเหรอ..."
10107-101070500 = "ครูก็อยากรู้นะเนี่ย"
10107-101070510 = "ฮิฮิ"
10107-101070520 = "ความลับค่ะ~ ถ้าบอกก็ไม่ใช่ความลับ\nน่ะสิคะ~"
10107-101070530 = "วันนี้ขอบคุณมากนะคะ!"
10107-101070540 = "ข่าวที่จะลงในฉบับพิเศษน่าจะเสร็จ\nสมบูรณ์ได้อย่างดีเลยค่ะ~"
10107-101070550 = "ครูดีใจที่ได้ช่วยนะ"
10107-101070560 = "ฉันจะให้คุณครูได้อ่านฉบับพิเศษเป็น\nคนแรกเลยค่ะ!"
10107-101070570 = "แล้วฉันจะเอาไปให้ด้วยตัวเอง\nช่วยรอหน่อยนะคะ~"

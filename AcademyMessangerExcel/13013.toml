[translation]
13013-130130010 = "저…… 선생님?"
13013-130130020 = "지금, 시간 괜찮으신가요?"
13013-130130030 = "안녕. 모미지. 물론 괜찮아."
13013-130130040 = "다행이에요……"
13013-130130050 = "실례일지도 모르지만, 선생님께 부탁드리고 싶은 것이 있어서……"
13013-130130060 = "그래. 알았어."
13013-130130070 = "잘 들어가셨나요. 선생님?"
13013-130130080 = "괜히 저 때문에 고생만 하시고……"
13013-130130090 = "고생이라니, 무슨."
13013-130130100 = "회지, 잘 보관해야겠네."
13013-130130110 = "물론이죠!"
13013-130130120 = "선생님께서는"
13013-130130130 = "무언가를 콜렉팅 해 본 적 있으세요?"
13013-130130140 = "피로라면 열심히 콜렉팅하고 있어……"
13013-130130150 = "네? "
13013-130130160 = "그, 그건 큰일이네요."
13013-130130170 = "그런 걸 묻는 걸 보니"
13013-130130180 = "모미지는 뭔가 모으는 게 있나 봐?"
13013-130130190 = "저는……"
13013-130130200 = "에헤헤. 개인적으로 콜렉팅하는 판본이 있어요. "
13013-130130210 = "선생님……"
13013-130130220 = "선생님……!"
13013-130130230 = "드디어…… 열려요."
13013-130130240 = "뭐, 뭐가?"
13013-130130250 = "모미지가 이렇게까지 흥분하다니, 드문 일이네."
13013-130130260 = "아, 아앗. 죄송해요……"
13013-130130270 = "너무 기대된 나머지, 그만……"
13013-130130280 = "진정하고, 차근차근 이야기해 줘."
13013-130130290 = "네……"
13013-130130300 = "그러니까, 붉은겨울 책 축제예요! "
13013-130130310 = "응……?"
13013-130130320 = "선생님. 잘 들어가셨나요?"
13013-130130330 = "너무 피곤하다거나 하지는…… 않으시고요?"
13013-130130340 = "이 정도는 괜찮아."
13013-130130350 = "다행이에요."
13013-130130360 = "그러면 내일도 함께 해 주신다는 거죠?"
13013-130130370 = "내, 내일도?!"
13013-130130380 = "네. 붉은겨울 책 축제는 내일까지니까요!"
13013-130130390 = "내일은 오늘 다 못 돌아본 코너를 완전히 정복할 거예요!"
13013-130130400 = "선생님, 힘낼게……"
13013-130130410 = "와아, 감사합니다!"
13013-130130420 = "저, 내일이 정말 기대돼요."
13013-130130430 = "그러면 오늘은 안녕히 주무세요!"
13013-130130440 = "안녕하세요. 선생님."
13013-130130450 = "안녀엉…… 모미지……"
13013-130130460 = "어라?"
13013-130130470 = "무슨 일이라도 있으세요?"
13013-130130480 = "별 건 아니고……"
13013-130130490 = "그냥, 이틀째 철야를 했더니 정신이 없네……"
13013-130130500 = "세상에, 그거 정말 큰 일이잖아요!"
13013-130130510 = "물론 저도 만화를 읽다가 밤을 새우는 적도 가끔씩 있지만……"
13013-130130520 = "저, 선생님."
13013-130130530 = "괜찮으시다면…… 붉은겨울 도서관에, 한 번 들러 주실 수 있으세요?"
13013-130130540 = "도서관에……?"
13013-130130550 = "선생님"
13013-130130560 = "죄송한데요"
13013-130130570 = "오늘 찾아뵙기로 한 약속, 못 지킬 것 같아요"
13013-130130580 = "갑자기 왜?"
13013-130130590 = "도서관에서 중요한"
13013-130130600 = "아니"
13013-130130610 = "사소한 걸 잃어버려서"
13013-130130620 = "그걸 우선 찾아야 할 것 같아요"
13013-130130630 = "그러면 나도 도와줄게"
13013-130130640 = "네?"
13013-130130650 = "선생님이 직접요?"

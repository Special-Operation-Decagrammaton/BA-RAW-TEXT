[translation]
13013-130130010 = "เอ่อ... คุณครูคะ?"
13013-130130020 = "ตอนนี้... พอมีเวลาสักครู่รึเปล่าคะ?"
13013-130130030 = "ว่าไง โมมิจิ\nตอนนี้ครูว่างพอดีเลย"
13013-130130040 = "งั้นก็โล่งอกไปทีค่ะ..."
13013-130130050 = "อาจเป็นเรื่องที่เสียมารยาทไปสัก\nหน่อย แต่ว่าฉันมีเรื่องที่อยากขอร้อง\nคุณครู..."
13013-130130060 = "งั้นเหรอ ได้อยู่แล้ว"
13013-130130070 = "กลับถึงที่พักอย่างปลอดภัย\nใช่มั้ยคะ คุณครู?"
13013-130130080 = "คุณครูต้องมาลำบากเพราะฉันเลย..."
13013-130130090 = "ลำบากอะไรกัน"
13013-130130100 = "โดจินชิเล่มนั้นน่ะ\nคงจะเก็บไว้อย่างดีเลยสินะ"
13013-130130110 = "แน่นอนค่ะ!"
13013-130130120 = "คุณครู..."
13013-130130130 = "เคยสะสมอะไรบ้างหรือเปล่าคะ?"
13013-130130140 = "ครูสะสมความเหนื่อยล้า\nไว้เพียบเลย..."
13013-130130150 = "คะ? "
13013-130130160 = "บะ...แบบนั้นไม่ใช่เรื่องดีเลยนะคะ!"
13013-130130170 = "โมมิจิถามทำไมเหรอ?"
13013-130130180 = "โมมิจิก็คงสะสมอะไรเหมือนกันสินะ?"
13013-130130190 = "ฉัน..."
13013-130130200 = "ฮิฮิ... ฉันสะสมหนังสือแบบรูปเล่ม\nอยู่น่ะค่ะ "
13013-130130210 = "คุณครู..."
13013-130130220 = "คุณครูคะ...!"
13013-130130230 = "ในที่สุด...ก็เริ่มแล้วค่ะ"
13013-130130240 = "อะ...อะไรเหรอ?"
13013-130130250 = "ไม่ค่อยได้เห็นโมมิจิ\nตื่นเต้นขนาดนี้เลยนะเนี่ย"
13013-130130260 = "อ่า...อ๊ะ ขอโทษด้วยค่ะ"
13013-130130270 = "คือฉันรอมันมานานมากๆ ก็เลย..."
13013-130130280 = "ใจเย็นๆ ค่อยๆ เล่านะ"
13013-130130290 = "ค่ะ..."
13013-130130300 = "คือ... งานเทศกาลหนังสือ\nเรดวินเทอร์ค่ะ! "
13013-130130310 = "หืม...?"
13013-130130320 = "คุณครู... กลับถึงที่พัก\nอย่างปลอดภัยใช่มั้ยคะ?"
13013-130130330 = "ไม่ได้เหนื่อยหรือรู้สึกเมื่อยตัว...\nใช่มั้ยคะ?"
13013-130130340 = "แค่นี้สบายมาก"
13013-130130350 = "โล่งอกไปทีค่ะ..."
13013-130130360 = "ถ้างั้นพรุ่งนี้ก็มาด้วยกันอีกใช่มั้ยคะ?"
13013-130130370 = "พะ...พรุ่งนี้ด้วยเรอะ?!"
13013-130130380 = "ค่ะ งานเทศกาลหนังสือเรดวินเทอร์\nจัดถึงวันพรุ่งนี้ค่ะ!"
13013-130130390 = "พรุ่งนี้เราจะต้องพิชิตบูทหนังสือ\nที่ยังไม่ได้ไปวันนี้ให้ครบค่ะ!"
13013-130130400 = "ครูจะสู้นะ..."
13013-130130410 = "ว้าว... ขอบคุณค่ะ!"
13013-130130420 = "ฉันอยากให้ถึงวันพรุ่งนี้แล้วละค่ะ"
13013-130130430 = "งั้นก็ราตรีสวัสดิ์นะคะ!"
13013-130130440 = "สวัสดีค่ะ คุณครู"
13013-130130450 = "ว่าไง... โมมิจิ..."
13013-130130460 = "เอ๋?"
13013-130130470 = "มีอะไรรึเปล่าคะคุณครู?"
13013-130130480 = "เปล่าหรอก..."
13013-130130490 = "ก็แค่... ครูโต้รุ่งมาสองวันแล้ว\nเลยไม่ค่อยมีสติแล้วน่ะ... "
13013-130130500 = "แย่เลย... แบบนี้เรื่องใหญ่เลยนะคะ!"
13013-130130510 = "ถึงบางทีฉันจะนอนอ่านมังงะโต้รุ่ง\nบ้างก็เถอะ..."
13013-130130520 = "คือ... คุณครูคะ"
13013-130130530 = "ถ้าคุณครูสะดวก... แวะมาที่ห้องสมุด\nเรดวินเทอร์หน่อยได้หรือเปล่าคะ?"
13013-130130540 = "ห้องสมุดเหรอ?"
13013-130130550 = "คุณครู"
13013-130130560 = "ขอโทษนะคะ"
13013-130130570 = "ฉันคงทำตามสัญญาที่บอกว่าจะไปหา\nคุณครูไม่ได้แล้วค่ะ"
13013-130130580 = "อ้าว ทำไมล่ะ?"
13013-130130590 = "สิ่งสำคัญในห้องสมุด"
13013-130130600 = "ไม่สิ"
13013-130130610 = "มีของเล็กๆ น้อยๆ หายไป..."
13013-130130620 = "และฉันน่าจะต้องไปตามหามันก่อนค่ะ"
13013-130130630 = "งั้นเดี๋ยวครูช่วยนะ"
13013-130130640 = "คะ?"
13013-130130650 = "คุณครูจะมาด้วยตัวเองเลยเหรอคะ?"

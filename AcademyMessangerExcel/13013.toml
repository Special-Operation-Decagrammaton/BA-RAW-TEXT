[translation]
13013-130130010 = "那個……老師？"
13013-130130020 = "請問，現在有空嗎？"
13013-130130030 = "嗨，紅葉，當然有空"
13013-130130040 = "太好了……"
13013-130130050 = "不好意思，其實我有事想拜託老師……"
13013-130130060 = "嗯，我馬上過去"
13013-130130070 = "平安回去了嗎，老師？"
13013-130130080 = "不好意思，害你忙到這麼晚……"
13013-130130090 = "別這麼說，我也很開心"
13013-130130100 = "同人誌，記得要好好保存哦"
13013-130130110 = "是！"
13013-130130120 = "老師"
13013-130130130 = "你有收集過什麼東西嗎？"
13013-130130140 = "收集了很多疲勞……"
13013-130130150 = "咦？ "
13013-130130160 = "那，那還真是辛苦呢"
13013-130130170 = "既然會這麼問"
13013-130130180 = "代表紅葉你有在收集東西吧？"
13013-130130190 = "我……"
13013-130130200 = "耶嘿嘿，我在收集某位作家的絕版書 "
13013-130130210 = "老師……"
13013-130130220 = "老師……！"
13013-130130230 = "終於……要舉辦了！"
13013-130130240 = "舉，舉辦什麼？"
13013-130130250 = "紅葉竟然這麼激動，真少見"
13013-130130260 = "哇，哇哇。不好意思……"
13013-130130270 = "因為太期待，不小心就……"
13013-130130280 = "冷靜下來慢慢說吧"
13013-130130290 = "嗯……"
13013-130130300 = "今天，是赤冬書展的日子！ "
13013-130130310 = "嗯……？"
13013-130130320 = "老師，平安到家了嗎？"
13013-130130330 = "今天走了不少路……會不會很累呢？"
13013-130130340 = "這點程度不算什麼！"
13013-130130350 = "太好了"
13013-130130360 = "明天也很令人期待呢！"
13013-130130370 = "明，明天也要！？"
13013-130130380 = "嗯，赤冬書展明天才結束！"
13013-130130390 = "我打算在明天把剩下的攤位完全征服！"
13013-130130400 = "老師我會加油的……"
13013-130130410 = "哇啊，謝謝老師！"
13013-130130420 = "我真的很期待"
13013-130130430 = "那麼，祝你有個好夢！"
13013-130130440 = "你好，老師"
13013-130130450 = "你好呀……紅葉……"
13013-130130460 = "咦？"
13013-130130470 = "發生什麼事了嗎？"
13013-130130480 = "其實也沒什麼……"
13013-130130490 = "只是熬夜了兩天，頭昏昏的……"
13013-130130500 = "什麼，這樣不行！"
13013-130130510 = "雖然我偶爾也會通宵看漫畫……"
13013-130130520 = "那個，老師"
13013-130130530 = "方便的話……可以來一趟赤冬圖書館嗎？"
13013-130130540 = "圖書館……？"
13013-130130550 = "老師"
13013-130130560 = "不好意思"
13013-130130570 = "我今天好像無法依照約定去拜訪你了"
13013-130130580 = "怎麼這麼突然？"
13013-130130590 = "我在圖書館弄丟了一樣重要的"
13013-130130600 = "啊"
13013-130130610 = "弄丟了一樣小東西"
13013-130130620 = "得找到才行"
13013-130130630 = "那我也來幫忙吧"
13013-130130640 = "咦？"
13013-130130650 = "老師要親自幫忙嗎？"

[translation]
16014-160140010 = "คูมคู..."
16014-160140020 = "คุณครู..."
16014-160140030 = "ซาหวัดดีค่ะ!"
16014-160140040 = "อิบูกินะคะ!!"
16014-160140050 = "ว่าไง อิบูกิ สบายดีรึเปล่า?"
16014-160140060 = "อื้อ! อิบูกิซาบายดี!"
16014-160140070 = "แล้วคุณครูล่ะ สบายดีมั้ย?"
16014-160140080 = "อื้อ ครูก็สบายดี"
16014-160140090 = "ดีใจจุง!"
16014-160140100 = "งั้นอิบูกิไปหาคุณครูได้มั้ย?"
16014-160140110 = "แน่นอน มาได้นะ"
16014-160140120 = "ครูยินดีต้อนรับอิบูกิเสมอเลย"
16014-160140130 = "คุณครูๆ"
16014-160140140 = "อิบูกิเองนะคะ"
16014-160140150 = "อิบูกิเองค่ะ!"
16014-160140160 = "ขอไปเล่นที่ชาเล่ต์ได้มั้ย?"
16014-160140170 = "วันนี้ไม่ใช่วันเข้าเวรตัวแทน\nแต่อิบูกิอยากไปเล่นกับคุณครู!"
16014-160140180 = "ได้สิ ครูจะรอนะ"
16014-160140190 = "ไม่ต้องรีบวิ่งล่ะ ค่อยๆ มานะ"
16014-160140200 = "อื้อ! ขอบคุณน้า!\nเดี๋ยวเจอกันน้าคูมคู~!"
16014-160140210 = "คุณครู"
16014-160140220 = "วันนี้อิบูกิสนุกมากเลย!"
16014-160140230 = "ได้เล่นเกม เล่นซ่อนหา เล่นไล่จับ\nแล้วก็..."
16014-160140240 = "วิ่งเล่นมาทั้งวันแล้ว\nไม่เหนื่อยเหรอ อิบูกิ?"
16014-160140250 = "ไม่เลย อิบูกิไม่เหนื่อยเลย\nสักนิดเดียว!"
16014-160140260 = "คุณครูก็เหมือนกันใช่มั้ย?"
16014-160140270 = "นะ...แน่นอน"
16014-160140280 = "ถ้างั้นคราวหน้าอิบูกิจะไปเล่น\nที่ชาเล่ต์พาร์กอีกนะ!"
16014-160140290 = "ไว้มาเล่นกันอีกนะ คุณครู!"
16014-160140300 = "คูมคู~"
16014-160140310 = "คุณครู"
16014-160140320 = "อิบูกิมีเรื่องที่สงสัยน่ะ!"
16014-160140330 = "สงสัยเรื่องอะไรเหรอ อิบูกิ?"
16014-160140340 = "เวลาไปชาเล่ต์ คุณครูก็ทำงานอยู่\nตลอดเลย"
16014-160140350 = "ทำงานมันสนุกขนาดนั้นเลยเหรอ?"
16014-160140360 = "จะ...จะว่าแบบนั้นก็ได้..."
16014-160140370 = "สนุก...สนุกมากๆ... สนุกจังเลย..."
16014-160140380 = "ว่าแต่ว่าทำไมจู่ๆ ถึงสงสัยขึ้นมาล่ะ?"
16014-160140390 = "อ้อ เรื่องนั้นน่ะ"
16014-160140400 = "อิบูกิพิมพ์ช้าอะ"
16014-160140410 = "เดี๋ยวไปเล่าให้ฟังที่ชาเล่ต์นะ!"
16014-160140420 = "คุณครู!!"
16014-160140430 = "ตอนนี้ยุ่งรึเปล่า?"
16014-160140440 = "เปล่า ไม่ยุ่งเลย"
16014-160140450 = "เพิ่งว่างเมื่อกี้เลย"
16014-160140460 = "ดีใจจุง!"
16014-160140470 = "พอไปเที่ยวที่ต่างๆ กับคุณครูแล้ว\nอิบูกิก็ลองกลับมาคิดดูน่ะ"
16014-160140480 = "ว่าอิบูกิอยากจะทำอะไร"
16014-160140490 = "ว่าสิ่งที่อิบูกิชอบที่สุดคืออะไร!"
16014-160140500 = "เพราะงั้น..."
16014-160140510 = "อิบูกิเลยว่าจะชวนคุณครูมาน่ะ!"
16014-160140520 = "ชวน?"
16014-160140530 = "อื้อ!"
16014-160140540 = "คุณครู ช่วยมาหาอิบูกิที่ห้องพักผ่อน\nของแพนเดโมเนียม โซไซตี้หน่อยนะ!"

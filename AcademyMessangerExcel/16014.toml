16014-160140050 = "안녕, 이부키. 잘 지냈니?"
16014-160140060 = "응! 나는 잘 지ㅆ내어!"
16014-160140070 = "선생님은 어때?"
16014-160140080 = "응, 선생님도 잘 지냈어요."
16014-160140090 = "다행이다!"
16014-160140100 = "그럼 선생님한테 가도 돼?"
16014-160140110 = "물론이지."

16014-160140130 = "선생님선생님"
16014-160140140 = "이부키ㅇ빕니다"
16014-160140150 = "이부키입니다!"
16014-160140160 = "샬레에 놀러 가도 돼?"
16014-160140170 = "오늘 당번은 아니지만 선생님이랑 놀고 싶어!"
16014-160140180 = "물론이지. 기다리고 있을게."
16014-160140190 = "뛰지 말고 조심해서 와야 한다?"
16014-160140200 = "응! 고마워! 이따가 만ㄴ나요 선ㅅ생님!"
16014-160140210 = "선생님"
16014-160140220 = "오늘 너무 재밌었어!"
16014-160140230 = "선생님이랑 게임도 하고, 술래잡기도 하고, 숨바꼭질도 하고……."
16014-160140240 = "하루 종일 뛰어놀았는데 힘들지는 않아, 이부키?"
16014-160140250 = "아니, 하나도 안 힘들어!"
16014-160140260 = "선생님도 그렇지?"
16014-160140270 = "무, 물론이지."
16014-160140280 = "그럼 다음번에 또 샬레 파크에 놀러 갈게!"
16014-160140290 = "또 같이 놀자, 선생님!"
16014-160140300 = "선ㅅ앵님"
16014-160140310 = "선생님"
16014-160140320 = "궁금한 게 생겼어!"
16014-160140330 = "뭐가 궁금하니, 이부키?"
16014-160140340 = "샬레에 갈 때마다 선생님은 일을 하고 있잖아?"
16014-160140350 = "일이 그렇게 재미있는 거야?"
16014-160140360 = "그, 그렇게 생각할 수도 있겠네……."
16014-160140370 = "재미……있죠……그럼요……."
16014-160140380 = "근데 갑자기 그건 왜 궁금해진 거야?"
16014-160140390 = "응, 그게"
16014-160140400 = "이부키는 손가락이 느리니까"
16014-160140410 = "직접 가서 말해줄게!"
16014-160140420 = "선생님!!"
16014-160140430 = "지금 바빠?"
16014-160140440 = "아니, 한가해."
16014-160140450 = "방금 안 바빠졌어."
16014-160140460 = "다행이다!"
16014-160140470 = "이부키, 지난번에 선생님이랑 여러 곳을 다닌 다음에 생각해 봤어."
16014-160140480 = "이부키가 무엇을 하고 싶은지"
16014-160140490 = "이부키가 가장 좋아하는 것이 무엇인지!"
16014-160140500 = "그래서"

[translation]
10027-100270010 = "คุณครู ตอนนี้ยุ่งอยู่รึเปล่า?\nฉันมีเรื่องจะรบกวนหน่อย..."
10027-100270020 = "อื้อ มีอะไรเหรอ?"
10027-100270030 = "แน่นอนอยู่แล้ว มีเรื่องอะไรหรือเปล่า?"
10027-100270040 = "ไม่มีอะไรหรอก พอดีมีของที่ต้องใช้\nในการทำงาน เลยว่าจะขอให้ครูช่วย\nเอามาให้หน่อยน่ะ"
10027-100270050 = "ครูไม่ต้องมาถึงที่นี่ก็ได้ แค่เอาไปที่พิกัดที่ฉันบอกก็พอ เดี๋ยวอาสึนะจะไปรออยู่ที่นั่นเอง"
10027-100270060 = "พวกเราพยายามแก้ไขเรื่องนี้เองแล้ว แต่ว่าสถานการณ์มันยุ่งยากขึ้นนิดหน่อย"
10027-100270070 = "ครูยินดีช่วยเสมอเลย"
10027-100270080 = "ไม่ต้องห่วงนะ ครูจะรีบไปเดี๋ยวนี้แหละ"
10027-100270090 = "อ่า..."
10027-100270100 = "ขอบคุณนะคุณครู ถึงเราจะไม่ได้เจอกัน\nก็เถอะ แต่ก็ขอขอบคุณไว้ล่วงหน้าแล้วกัน"
10027-100270110 = "ฉันจะรอนะ"
10027-100270120 = "คุณครู"
10027-100270130 = "งานวันนี้คุณครูช่วยพวกเราได้มากเลย"
10027-100270140 = "สักวันหนึ่งฉันจะตอบแทนบุญคุณนี้ให้ก็แล้วกัน..."
10027-100270150 = "บุญคุณ... ถ้างั้นครูก็จะรอแล้วกันนะ"
10027-100270160 = "ถ้างั้นต่อไปเวลามีเรื่องแบบนี้ก็เรียกครู\nไปช่วยดีมั้ย?"
10027-100270170 = "..."
10027-100270180 = "อืม..."
10027-100270190 = "คุณครู ตอนนี้ยุ่งอยู่รึเปล่า?"
10027-100270200 = "ไม่ใช่เรื่องใหญ่หรอก คือว่าแค่พูดขอบคุณเฉยๆ มันก็ยังไงๆ อยู่"
10027-100270210 = "ฉันเลยอยากจะตอบแทนคุณครูที่\nคอยช่วยฉันมาตลอดน่ะ"
10027-100270220 = "ตอนนี้เรากำลังปลอมตัวเข้าไปสืบสวนอยู่ และมันเป็นงานเกี่ยวกับการบริการน่ะ"
10027-100270230 = "ถ้าคุณครูมีเวลาล่ะก็อยากจะชวนไปด้วยน่ะ... ว่างรึเปล่า?"
10027-100270240 = "ครูว่างอยู่แล้ว ขอบคุณที่ชวนนะ"
10027-100270250 = "เยี่ยมเลย ครูรอเวลานี้มานานแล้ว!"
10027-100270260 = "อืม"
10027-100270270 = "..."
10027-100270280 = "ตกลงนะ"
10027-100270290 = "ถ้างั้นเดี๋ยวเจอกันนะ"
10027-100270300 = "..."
10027-100270310 = "อืม..."
10027-100270320 = "คุณครู... เรื่องที่เกิดขึ้นวันนี้น่ะ..."
10027-100270330 = "..."
10027-100270340 = "อืม"
10027-100270350 = "ไม่มีอะไรหรอก ไว้ค่อยคุยกัน\nคราวหน้าแล้วกันนะ"
10027-100270360 = "คุณครู... คราวหน้าคุณครูจะว่างรึเปล่า?"
10027-100270370 = "ถ้าคุณครูโอเคล่ะก็ ฉันมีเรื่องจริงจัง\nที่อยากคุยด้วยอยู่น่ะ"
10027-100270380 = "หรือว่าพูดถึงเรื่องชุดบันนี่เกิร์ลอยู่เหรอ?"
10027-100270390 = "ถึงเวลาแล้วสินะ"
10027-100270400 = "อืม"
10027-100270410 = "คิดแล้วว่าคงไม่ไหว..."
10027-100270420 = "ขอโทษนะ ลืมเรื่องที่พูดไปแล้วกัน"
10027-100270430 = "ฉันคงจะใจร้อนเกินไป"
10027-100270440 = "เปล่าหรอก พูดขึ้นมาก็ดีเลยนะ"
10027-100270450 = "มาใช้โอกาสนี้คุยกันให้ชัดๆ เลยเถอะ"
10027-100270460 = "พูดจริงเหรอ?"
10027-100270470 = "ไม่สิ"
10027-100270480 = "เข้าใจแล้วคุณครู..."
10027-100270490 = "ถ้างั้นฉันจะเลือกสถานที่ที่ปลอดภัยที่\nเหมาะสำหรับเก็บความลับแล้วกัน"
10027-100270500 = "เดี๋ยวเจอกันนะ"
10027-100270510 = "คุณครู"
10027-100270520 = "อืม"
10027-100270530 = "ฉันคงไม่เบื่อชุดที่ใส่วันนี้ง่ายๆ หรอก"
10027-100270540 = "จะยังไงก็เถอะ เรื่องที่เกิดขึ้นวันนี้\nทำให้ชุดนี้กลายมาเป็นชุดที่พิเศษ\nสำหรับฉันเลยล่ะ"
10027-100270550 = "ที่ทำให้ฉันได้รู้สึกถึงสิ่งสำคัญของตัวเอง..."
10027-100270560 = "ต้องขอบคุณคุณครูมากเลย"
10027-100270570 = "แล้วฉันจะติดต่อไปใหม่นะ"

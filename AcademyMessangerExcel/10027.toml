[translation]
10027-100270010 = "老師，現在有時間嗎？"
10027-100270020 = "沒問題唷"
10027-100270030 = "怎麼了？"
10027-100270040 = "想請你幫個忙，有個任務需要的東西"
10027-100270050 = "之後會告訴你地點，如果能交給明日奈前輩的話就幫大忙了"
10027-100270060 = "現在有點忙，離不開……"
10027-100270070 = "嗯，交給我吧"
10027-100270080 = "馬上就去"
10027-100270090 = "謝謝"
10027-100270100 = "今天可能無法直接當面道謝，下次再見面吧"
10027-100270110 = "那麼，拜託了"
10027-100270120 = "老師"
10027-100270130 = "今天謝謝你"
10027-100270140 = "我會在下次見面時回禮"
10027-100270150 = "回禮……！？"
10027-100270160 = "讓我再次陪伴在你身邊，如何？"
10027-100270170 = "……"
10027-100270180 = "哈啊……"
10027-100270190 = "老師，現在方便嗎？"
10027-100270200 = "關於上次的事"
10027-100270210 = "我想好好地報答你"
10027-100270220 = "因為正在進行潛入調查，如果情勢改變的話，也許就無法回禮了……但是目前還好，大概沒問題"
10027-100270230 = "怎麼樣？"
10027-100270240 = "那我會非常高興"
10027-100270250 = "說是為了這一天而工作也不為過！"
10027-100270260 = "太好了"
10027-100270270 = "……"
10027-100270280 = "嘛，總之"
10027-100270290 = "那麼，晚點見"
10027-100270300 = "老師"
10027-100270310 = "那個……"
10027-100270320 = "關於今天的事……"
10027-100270330 = "……"
10027-100270340 = "不"
10027-100270350 = "果然還是算了，下次再直接當面說"
10027-100270360 = "老師，現在忙嗎？"
10027-100270370 = "有些嚴肅的話想說……"
10027-100270380 = "……該不會是要繼續之前的談話？"
10027-100270390 = "（吞口水……）"
10027-100270400 = "總覺得，很緊張呢……？"
10027-100270410 = "那樣的話，改天再說吧？"
10027-100270420 = "就算不是今天也沒關係"
10027-100270430 = "不是什麼緊急的事情……"
10027-100270440 = "不，今天完全沒問題"
10027-100270450 = "我想確認一下，或者說想澄清一下……"
10027-100270460 = "是嗎？"
10027-100270470 = "那麼，拜託了"
10027-100270480 = "地點……"
10027-100270490 = "為了不讓任何人發現，果然還是那裡吧"
10027-100270500 = "那麼，拜託了。稍後再聯絡"
10027-100270510 = "老師"
10027-100270520 = "那個"
10027-100270530 = "謝謝你今天能來"
10027-100270540 = "多虧了老師，這件衣服變得更特別了"
10027-100270550 = "老師，謝謝"
10027-100270560 = "老師總是教會我各式各樣的事"
10027-100270570 = "那麼，再聯絡"

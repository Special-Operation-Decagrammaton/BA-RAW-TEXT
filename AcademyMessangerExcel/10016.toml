[translation]
10016-100160010 = "선생님, 혹시 시간 있으신가요?"
10016-100160020 = "그게 다른 게 아니라."
10016-100160030 = "상담하고 싶은 게 있는데요……"
10016-100160040 = "상담?"
10016-100160050 = "네, 넷! 저희 동아리실에서 기다리고 있을게요!"
10016-100160060 = "……죄송합니다."
10016-100160070 = "괜히 게임으로 열이 오른 탓에 선생님에게 엄청난 민폐를……"
10016-100160080 = "미도리가 가진 의외의 일면을 발견했어……"
10016-100160090 = "괜찮아. 무척 재미있었으니까."
10016-100160100 = "으, 으으…… 쥐구멍이 있다면 숨고 싶어요……"
10016-100160110 = "다음번엔 대전 게임이 아닌 쪽으로…… 부탁드릴게요……"
10016-100160120 = "선생님, 이번에 밀레니엄 게임 아트워크 전시회가 열린대요."
10016-100160130 = "이번에 저와 전시회에 단둘이……"
10016-100160140 = "가 아니라!"
10016-100160150 = "시, 신작 게임을 개발하기 위해선 공부를 게을리하면 안되니까요!"
10016-100160160 = "암, 공부는 중요하지."
10016-100160170 = "여, 역시 그렇죠?"
10016-100160180 = "그, 그러니까. 그게……"
10016-100160190 = "같이 가시지 않을래요?"
10016-100160200 = "선생님! 속보예요! 속보! 어마어마한 속보요!"
10016-100160210 = "미도리, 진정해. 컴다운."
10016-100160220 = "그 정도로 속보야? 어떡하지? 폭죽을 준비할까?!"
10016-100160230 = "후우후우, 네, 지, 진정했어요!"
10016-100160240 = "그래서, 무슨 일이야?"
10016-100160250 = "그, 그 정도까지 해야 할 일인가 하면, 그, 글쎄요?"
10016-100160260 = "어, 어쨌거나!"
10016-100160270 = "이번에 전설의 명작 고전 게임의 후속작이 나왔대요!"
10016-100160280 = "그 게임의 초회한정판을 반드시 입수하고 싶어요."
10016-100160290 = "선생님, 어울려 주실 거죠?"
10016-100160300 = "오늘 고마웠어요."
10016-100160310 = "다음에 같이 플레이해요. 선생님."
10016-100160320 = "저, 오락실이라는 곳에 대해 들었는데요."
10016-100160330 = "무서운 사람들이 잔뜩 있는 곳이라고……"
10016-100160340 = "오락실은 정말 그런 장소인가요?"
10016-100160350 = "남의 말만 듣고 편견을 가지면 안 돼."
10016-100160360 = "그, 그렇죠. 직접 가보기 전부터 편견부터 가지면……"
10016-100160370 = "그러니 이번에 같이 가볼래?"
10016-100160380 = "오, 오락실을요?!"
10016-100160390 = "오늘 어울려주셔서 감사했습니다."
10016-100160400 = "다만, 오늘 같이 오락실을 찾았던 건"
10016-100160410 = "그게. 저……"
10016-100160420 = "모두에겐 비밀이에요?"
10016-100160430 = "선생님!"
10016-100160440 = "약속 기억하고 계시죠?"
10016-100160450 = "헌터의 시간이다……."
10016-100160460 = "오늘 낮, 선생님이 사냥에 참가한다……."
10016-100160470 = "역시 기억하고 계셨네요."
10016-100160480 = "기뻐요!"
10016-100160490 = "그러면 부실에서 기다릴게요!"

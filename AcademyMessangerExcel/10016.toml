[translation]
10016-100160010 = "老師，你今天有時間嗎？"
10016-100160020 = "事實上，那個"
10016-100160030 = "有想要商量的事情……"
10016-100160040 = "想要商量的事情？"
10016-100160050 = "是的。我今天都會在社團教室，如果可以的話就麻煩老師了！"
10016-100160060 = "……對不起"
10016-100160070 = "不知不覺就一頭熱，給老師添麻煩了……"
10016-100160080 = "發現了綠的另外一面……"
10016-100160090 = "沒關係，我很開心"
10016-100160100 = "唔，唔……有洞的話好想鑽進去……"
10016-100160110 = "下次會是對戰類型之外的遊戲，再拜託老師了……"
10016-100160120 = "老師。聽說這次在千年將舉辦遊戲藝術展覽會"
10016-100160130 = "所以那個，你我兩個人"
10016-100160140 = "不！"
10016-100160150 = "為了開發新遊戲，學習也是必要的……！"
10016-100160160 = "確實，學習很重要呢"
10016-100160170 = "是，是吧？"
10016-100160180 = "那個，所以說，那個……！"
10016-100160190 = "……要一起去嗎？"
10016-100160200 = "老師，速報！快報！不得了的消息唷！"
10016-100160210 = "綠，冷靜點。先冷靜一下"
10016-100160220 = "不得了的消息？怎麼辦，是不是該準備煙火之類的比較好！？"
10016-100160230 = "……好，深呼吸後冷靜下來了！"
10016-100160240 = "發生了什麼事？"
10016-100160250 = "那個，我想應該是不至於需要煙火啦……！"
10016-100160260 = "總，總之！"
10016-100160270 = "聽說傳說中的經典懷舊遊戲這次將推出續作！"
10016-100160280 = "那款遊戲的初回限定版，我無論如何都想買到"
10016-100160290 = "老師，能陪我去嗎？"
10016-100160300 = "今天非常謝謝老師"
10016-100160310 = "下次一起play吧。老師"
10016-100160320 = "我，聽說過一句話"
10016-100160330 = "遊戲中心是個有很多可怕的人的地方……"
10016-100160340 = "真的是這樣嗎？"
10016-100160350 = "唔嗯，我想是取決於地點……？"
10016-100160360 = "確，確實是呢。我還沒有實際去過……"
10016-100160370 = "那麼，下次要一起去看看嗎？"
10016-100160380 = "咦，遊戲中心嗎！？一定要！！"
10016-100160390 = "非常謝謝老師今天來陪我"
10016-100160400 = "但是，今天一起去了遊戲中心的事"
10016-100160410 = "這個，那個……"
10016-100160420 = "Yao Siang Da Jia Bao Mi Yo？"
10016-100160430 = "老師！"
10016-100160440 = "你還記得我們的約定吧？"
10016-100160450 = "狩獵的時間到了……"
10016-100160460 = "今天中午，老師要參加狩獵……"
10016-100160470 = "你果然還記得呢"
10016-100160480 = "好開心！"
10016-100160490 = "那我在部室等你來哦！"

[translation]
10016-100160010 = "คุณครูพอมีเวลาสักครู่มั้ยคะ?"
10016-100160020 = "ก็คือว่า..."
10016-100160030 = "ฉันมีเรื่องอยากจะปรึกษาคุณครูสัก\nหน่อยค่ะ"
10016-100160040 = "ปรึกษาเหรอ?"
10016-100160050 = "คะ...ค่ะ! ฉันจะรออยู่ที่ห้องชมรมนะคะ!"
10016-100160060 = "ขอโทษด้วยนะคะ..."
10016-100160070 = "ความหลงใหลในเกมของฉัน ทำให้\nคุณครูลำบาก..."
10016-100160080 = "ครูเจอด้านที่น่าทึ่งของมิโดริต่างหาก"
10016-100160090 = "ไม่เป็นไรหรอก ครูสนุกมากๆ เลยล่ะ"
10016-100160100 = "อะ... อะ... อายจนอยากจะมุดดินหนี\nเลยจริงๆ ค่ะ"
10016-100160110 = "ถ้าอย่างนั้นคราวหน้า... คุณครูช่วย\nมองด้านอื่นที่ไม่ใช่... เกมด้วยนะคะ"
10016-100160120 = "คุณครูคะ ได้ยินว่าจะมีงานนิทรรศการ\nแสดงอาร์ตเวิร์กเกมของมิลเลเนียมค่ะ"
10016-100160130 = "คุณครูสนใจที่จะไปงานนิทรรศการ\nสองคนกับ..."
10016-100160140 = "มะ...ไม่ใช่นะคะ! "
10016-100160150 = "ถ้าฉันจะศึกษาเรื่องเกมอย่างจริงจัง\nก็จะมาขี้เกียจไม่ได้นี่คะ!"
10016-100160160 = "การเรียนเป็นเรื่องสำคัญนะ"
10016-100160170 = "ใช่มั้ยล่ะคะ"
10016-100160180 = "พะ...เพราะฉะนั้น... คือว่า... "
10016-100160190 = "คุณครูจะไปด้วยกันมั้ยคะ?"
10016-100160200 = "คุณครู! ข่าวด่วนค่ะ! ข่าวด่วนมากกก\nข่าวใหญ่โตมโหฬารสุดๆ เลยค่ะ!"
10016-100160210 = "มิโดริ ใจเย็นก่อน วัยรุ่น~"
10016-100160220 = "เรื่องใหญ่ขนาดนั้นเลยเหรอ\nทำยังไงดีล่ะ? ต้องเตรียมพลุด้วยมั้ย?!"
10016-100160230 = "ฟู่ววว ฟู่ววว ใจเย็นๆ  ใจเย็นแล้วค่ะ!"
10016-100160240 = "แล้วมีเรื่องอะไรล่ะ?"
10016-100160250 = "ถะ...ถ้าต้องทำแบบนั้นล่ะก็..."
10016-100160260 = "ก็ช่วยไม่ได้ค่ะ!"
10016-100160270 = "เกมภาคต่อของเกมชื่อดังในตำนาน\nปล่อยมาแล้วค่ะ!"
10016-100160280 = "ฉันอยากได้เวอร์ชั่นลิมิเต็ดรุ่นแรกมากๆ\nเลยค่ะ"
10016-100160290 = "คุณครูจะไปกับฉันใช่มั้ยคะ?"
10016-100160300 = "วันนี้ขอบคุณมากเลยนะคะ"
10016-100160310 = "ไว้คราวหน้ามาเล่นด้วยกันใหม่นะคะ\nคุณครู"
10016-100160320 = "ฉันได้ยินว่ามีร้านเกมตู้ด้วยนะคะ"
10016-100160330 = "ได้ยินว่าเป็นสถานที่ที่มีคนน่ากลัว\nเยอะมาก..."
10016-100160340 = "ร้านเกมตู้เป็นสถานที่แบบนั้นจริงๆ\nเหรอคะ?"
10016-100160350 = "จะตัดสินใจเชื่ออะไรโดยฟังแค่คำ\nของคนอื่นไม่ได้นะ"
10016-100160360 = "นะ...นั่นน่ะสิ ถ้าตัดสินแบบนั้นตั้งแต่\nก่อนลองไปดูล่ะก็..."
10016-100160370 = "งั้นคราวนี้ไปด้วยกันมั้ย?"
10016-100160380 = "ร้านเกมน่ะเหรอคะ?!"
10016-100160390 = "วันนี้ขอบคุณที่ไปด้วยกันนะคะ"
10016-100160400 = "แต่ว่า... เรื่องที่ไปร้านเกมวันนี้"
10016-100160410 = "เรื่องนั้น คือ...."
10016-100160420 = "เก็บเป็นความลับที่รู้กันแค่เราได้มั้ยคะ?"
10016-100160430 = "คุณครู!"
10016-100160440 = "จำที่สัญญาได้ใช่มั้ยคะ?"
10016-100160450 = "ถึงเวลาของนักล่าแล้ว..."
10016-100160460 = "ครูจะเข้าร่วมการล่าในตอนบ่ายด้วย..."
10016-100160470 = "จำได้จริงๆ ด้วยสินะคะ"
10016-100160480 = "ดีใจจังเลยค่ะ!"
10016-100160490 = "ถ้างั้นฉันจะรออยู่ที่ห้องชมรมนะคะ!"

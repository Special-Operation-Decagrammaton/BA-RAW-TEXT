[translation]
10075-100750010 = "ช่วยด้วย~~"
10075-100750020 = "ช่วยฉันด้วย~~"
10075-100750030 = "รู้สึกเหมือนลางไม่ดีเลย"
10075-100750040 = "อย่าพูดอะไรแบบนั้นสิ!"
10075-100750050 = "คุณครูน่ะ เวลานักเรียนต้องการ\nความช่วยเหลือ "
10075-100750060 = "ก็มักจะเมินกันแบบนี้เหรอ?"
10075-100750070 = "อืม ถ้าพูดถึงขนาดนี้ก็ช่วยไม่ได้นะ"
10075-100750080 = "มีเรื่องอะไรเหรอ เมรุ? "
10075-100750090 = "ฉันคงวาดรูปต่อไปไม่ได้อีกแล้ว!"
10075-100750100 = "ไม่มีพล็อตเรื่องอีกแล้วล่ะสิ..."
10075-100750110 = "ไม่ใช่สักหน่อย! ตอนนี้น่ะคิดพล็อต\nเรื่องได้ลื่นไหลสุดๆ เลยนะ!"
10075-100750120 = "ปัญหา... คงเรียกว่าเป็นปัญหาทาง\nด้านกายภาพละมั้ง"
10075-100750130 = "เธอได้รับบาดเจ็บงั้นเหรอ?!"
10075-100750140 = "เปล่า ฉันไม่ได้บาดเจ็บตรงไหนหรอก"
10075-100750150 = "คือ... ปากกาแท็บเล็ตมันพังแล้วน่ะ..."
10075-100750160 = "หืม...?"
10075-100750170 = "แย่...แล้ว...ละ~"
10075-100750180 = "จบเห่แน่ๆ คราวนี้!"
10075-100750190 = "ก็เหมือนทุกทีนี่นา..."
10075-100750200 = "อย่าตอบเหมือนเป็นเรื่องน่าเบื่อ\nอะไรแบบนั้นสิ!"
10075-100750210 = "ช่วยด้วย!"
10075-100750220 = "ฉัน...จะ...เอาคืน...อย่างแน่นอน..."
10075-100750230 = "ส่งอะไรมาน่ากลัวสุดๆ เลย"
10075-100750240 = "ความแค้นในตอนนั้น "
10075-100750250 = "คิดว่าฉันจะลืมไปแล้วรึไง~"
10075-100750260 = "ชิ... คิดว่าจะลืมไปแล้วซะอีก"
10075-100750270 = "ใครจะลืมกันเล่า!"
10075-100750280 = "ฮิเมกิ เมรุ คนนี้น่ะ…\nมีหนี้แค้นก็ต้องชำระ!"
10075-100750290 = "คอยดูเถอะ ครู"
10075-100750300 = "วันนี้ฉันจะลากครูไปไหนมาไหน\nตามใจชอบให้ดู!"
10075-100750310 = "ฉัน...คืน...ชีพ...แล้ว~!"
10075-100750320 = "ค่อยยังชั่วหน่อย~"
10075-100750330 = "อย่าพูดอะไรดูเย็นชาเหมือนเป็น\nเรื่องของคนอื่นคนไกลสิ..."
10075-100750340 = "เรื่องวันนี้น่ะ ครูก็มีส่วนที่ต้อง\nรับผิดชอบเหมือนกันนะ!"
10075-100750350 = "ครูเกี่ยวอะไรด้วยล่ะ!"
10075-100750360 = "คิดแล้วเชียวว่าจะต้องพูดแบบนี้!"
10075-100750370 = "ครู"
10075-100750380 = "วันนี้ยุ่งรึเปล่า?"
10075-100750390 = "ถามแบบนี้... ต้องมีเรื่องอะไรแน่ๆ"
10075-100750400 = "ดูเหมือนจะคิดว่าฉันเป็นพวก\nชอบเรียกร้องความสนใจสินะ"
10075-100750410 = "ฉันไม่ได้ชอบอะไรแบบนั้นสักหน่อย!"
10075-100750420 = "...แต่ครูก็ไม่ได้เดาผิดซะทีเดียว"
10075-100750430 = "วันนี้ครูมีธุระที่ต้องแวะไปที่\nเรดวินเทอร์อยู่พอดีเลย"
10075-100750440 = "จริงเหรอ?"
10075-100750450 = "ถ้างั้น..."
10075-100750460 = "เอาจริงๆ ก็ไม่ถึงกับจำเป็นหรอก\nแต่ว่า..."
10075-100750470 = "ถ้ามีเวลาแล้วแวะมาที่ชมรมแนวร่วม\nปลดปล่อยความรู้สักหน่อย"
10075-100750480 = "ก็จะขอบคุณมากเลย..."
10075-100750490 = "ห้องชมรมอยู่ตรงไหนล่ะ?"

[translation]
10075-100750010 = "幫～幫～我～ "
10075-100750020 = "需要幫忙！"
10075-100750030 = "有股不好的預感……"
10075-100750040 = "不要說是不好的預感啊！"
10075-100750050 = "需要老師幫助的學生就在這裡……"
10075-100750060 = "你應該……不會置之不理吧？"
10075-100750070 = "既然如此那就沒辦法了"
10075-100750080 = "發生什麼事了嗎，愛瑠？ "
10075-100750090 = "我畫不出畫了！"
10075-100750100 = "是熟悉的靈感枯竭吧，我知道"
10075-100750110 = "才不是！反而應該說靈感不斷湧現才對！"
10075-100750120 = "但這次……該說是比較物質上的問題嗎……"
10075-100750130 = "該不會是受傷了吧！？"
10075-100750140 = "也，也不是那樣啦……"
10075-100750150 = "是那個……平板電腦的筆壞掉了"
10075-100750160 = "……嗯？"
10075-100750170 = "完～蛋～了～"
10075-100750180 = "卡～住～了～"
10075-100750190 = "哎呀，是熟悉的愛瑠呢"
10075-100750200 = "不要一副隔岸觀火的樣子！"
10075-100750210 = "幫～幫～我～"
10075-100750220 = "我～要～報～仇～"
10075-100750230 = "傳來了不詳的訊息……"
10075-100750240 = "當時的怨念"
10075-100750250 = "以為我會忘記嗎～"
10075-100750260 = "呿，還以為可以悄悄一筆帶過"
10075-100750270 = "想都別想！"
10075-100750280 = "我姬木愛瑠，絕對有借有還！"
10075-100750290 = "等著看吧，老師"
10075-100750300 = "今天一定會隨心所欲地拉著老師到處跑！"
10075-100750310 = "復～活～了！"
10075-100750320 = "太好了～"
10075-100750330 = "不要說得好像別人的事一樣……"
10075-100750340 = "今天的事，老師也要負一點責任"
10075-100750350 = "為什麼！"
10075-100750360 = "我說要就是要！"
10075-100750370 = "老師"
10075-100750380 = "你今天也很忙嗎？"
10075-100750390 = "這個味道……是需要關心的味道"
10075-100750400 = "為什麼老是要把我塑造成需要關心的人！ "
10075-100750410 = "我不喜歡這樣！"
10075-100750420 = "……雖然的確是這樣沒錯"
10075-100750430 = "我正好有事要去赤冬一趟"
10075-100750440 = "真的嗎？"
10075-100750450 = "那……"
10075-100750460 = "雖然不是非這麼做不可"
10075-100750470 = "如果能順便來知識解放戰線一趟的話，我會感謝你的……"
10075-100750480 = "大概也許應該可能會吧……"
10075-100750490 = "到底會不會……"

10064-100640100 = "Sensei, what do you usually do on New Year's Eve?"
10064-100640110 = "I eat New Year's Eve noodles."
10064-100640120 = "I watch year-end specials."
10064-100640130 = "I guess that doesn't sound too bad, haha."
10064-100640140 = "I always go to the temple to listen to the New Year's bell-ringing."
10064-100640150 = "I like it, cause you can only hear them once a year."
10064-100640160 = "So it's special. It feels...romantic."

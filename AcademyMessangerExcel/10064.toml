[translation]
10064-100640010 = "จะว่าไปก็ควรซื้อกิโมโนใหม่ได้แล้วนะ"
10064-100640020 = "คงต้องเปลี่ยนตัวใหม่สักที กิโมโนตัว\nเดิมมันเก่ามากแล้ว"
10064-100640030 = "คาโยโกะมีกิโมโนเป็นของตัวเอง\nด้วยเหรอ?"
10064-100640040 = "อื้ม ถึงจะไม่ใช่ของแพงอะไรก็เถอะ"
10064-100640050 = "แต่ก่อนจะเข้าร่วมหน่วยรับจ้างสารพัด\nฉันได้ออกงานทางการบ่อยมาก..."
10064-100640060 = "ก็เลยมีไว้ใส่เป็นชุดออกงานนั่นแหละ"
10064-100640070 = "งานอะไรถึงได้ใส่กิโมโนไปละนั่น..."
10064-100640080 = "ฮุฮุ..."
10064-100640090 = "ไว้มีโอกาสจะเล่าให้ฟังนะ"
10064-100640100 = "แล้วครูล่ะ ช่วงเที่ยงคืนสุดท้ายของปี\nครูชอบทำอะไรเหรอ?"
10064-100640110 = "กินโทชิโคชิโซบะ"
10064-100640120 = "ดูรายการเทปพิเศษปลายปี"
10064-100640130 = "ฮุฮุ แบบนั้นก็เข้าท่าดีแฮะ"
10064-100640140 = "ส่วนฉันชอบไปฟังเสียงระฆังส่งท้ายปี\nที่วัดพุทธน่ะ"
10064-100640150 = "มันมีเสน่ห์ตรงที่ได้ฟังแค่ปีละครั้งนี่แหละ"
10064-100640160 = "ได้กลิ่นความโรแมนติกเลยแฮะ"
10064-100640170 = "เพราะงั้นแล้ว ครู"
10064-100640180 = "ปีนี้ไม่อยากไปฟังเสียงระฆังส่งท้ายปี\nด้วยกันเหรอ?"
10064-100640190 = "ได้ยินว่ามีจุดฟังเสียงระฆังเพราะๆ ที่ทั้ง\nสวยงามและยังไม่เป็นที่รู้จักด้วยนะ"
10064-100640200 = "เยี่ยมเลย ไปด้วยกันเนอะ"
10064-100640210 = "อื้ม เจอกันหน้าสถานีช่วงเย็นวันนั้นนะ"
10064-100640220 = "ขึ้นปีใหม่แล้ว"
10064-100640230 = "ฉันว่าจะซื้อเครื่องรางจากวัดใกล้ๆ มา\nเป็นของขวัญให้หน่วยรับจ้างสารพัด\nสักหน่อย..."
10064-100640240 = "ถ้าไม่ว่าอะไร ฉันซื้อให้ครูด้วยดีมั้ย?"
10064-100640250 = "มีเครื่องรางที่อยากได้เป็นพิเศษมั้ย?"
10064-100640260 = "เครื่องรางที่ทำให้ได้ไอเทมสุดปัง\nจากกาชา!"
10064-100640270 = "เครื่องรางเพิ่มค่าโจมตีคริติคอล!"
10064-100640280 = "อืม..."
10064-100640290 = "ที่วัดเขาขายเครื่องรางแบบนั้นด้วยงั้น\nเหรอ..."
10064-100640300 = "ล้อเล่นน่า"
10064-100640310 = "ครูก็อยากเลือกซื้อเองเหมือนกัน..."
10064-100640320 = "ไว้นัดวันไปซื้อพร้อมกันเลยมั้ย?"
10064-100640330 = "ได้สิ"
10064-100640340 = "งั้นพรุ่งนี้เช้าเจอกันหน้าวัดนะ"
10064-100640350 = "ครู ฉันเห็นครูวิ่งวุ่นอยู่ในเมือง..."
10064-100640360 = "มีเรื่องอะไรหรือเปล่า?"
10064-100640370 = "มีเรื่องวุ่นวายตั้งแต่ปีใหม่หลายเรื่อง\nเลย..."
10064-100640380 = "เข้าปีใหม่ปุ๊บก็มีเรื่องทะเลาะกันปั๊บ..."
10064-100640390 = "ไม่ได้พักเลยตั้งแต่ปีใหม่..."
10064-100640400 = "คุณครูของชาเล่ต์ทำงานหนักมากเลยนะ"
10064-100640410 = "ถ้าไม่ว่าอะไร "
10064-100640420 = "คราวหน้าเดี๋ยวให้ยืมซีดีเพลงบำบัด\nสำหรับการพักผ่อนนะ"
10064-100640430 = "ขอบคุณนะ งั้นต่อไปก็ขอฝากด้วยล่ะ"

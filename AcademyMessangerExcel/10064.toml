10064-100640320 = "Do you want to meet up and go shopping together?"
10064-100640330 = "Sure."
10064-100640340 = "In that case, I'll meet you in front of the temple tomorrow morning."
10064-100640350 = "Sensei, I saw you running around the city earlier. You seemed stressed."

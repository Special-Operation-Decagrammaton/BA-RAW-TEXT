10064-100640200 = "That sounds good. Let's go!"
10064-100640210 = "OK. Meet me in front of the station that evening."
10064-100640220 = "It's a new year..."
10064-100640230 = "I'm gonna go to a temple nearby to get amulets for the other Problem Solver members."
10064-100640240 = "Is it OK if I get you one too, Sensei?"
10064-100640250 = "What kind of amulet do you need?"
10064-100640260 = "One that helps my gacha luck!"
10064-100640270 = "One that helps my Crit DMG!"
10064-100640280 = "Um..."

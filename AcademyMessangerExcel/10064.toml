[translation]
10064-100640010 = "그러고 보니 슬슬 새 기모노를 사야 할 것 같네."
10064-100640020 = "전에 쓰던 기모노가 너무 낡아서 슬슬 바꿔야 할 것 같아."
10064-100640030 = "카요코는 개인 기모노를 갖고 있었어?"
10064-100640040 = "응. 그리 비싼 건 아니지만."
10064-100640050 = "흥신소에 들어오기 전에는 격식 있는 자리에 참가하는 경우가 많아서……"
10064-100640060 = "방문복 정도는 갖고 있었지."
10064-100640070 = "어떤 자리였기에 기모노를……"
10064-100640080 = "후후"
10064-100640090 = "나중에 기회가 되면 말해줄게"
10064-100640100 = "선생, 선생은 한 해의 마지막 날 자정에는 무얼 하는 편이야?"
10064-100640110 = "해넘이 국수를 먹으면서 보내."
10064-100640120 = "연말 특집 방송을 보면서 지내."
10064-100640130 = "후후, 그것도 나쁘지 않네."
10064-100640140 = "나는 보통은 제야의 타종을 들으러 사찰을 찾아가는 편이야."
10064-100640150 = "1년에 한 번만 들을 수 있는 종소리라는 점이 매력적이라"
10064-100640160 = "뭔가 로망이 느껴지네"
10064-100640170 = "그래서 말인데, 선생."
10064-100640180 = "올해 마지막 날에는 같이 제야의 타종을 들으러 가지 않을래?"
10064-100640190 = "좋은 종소리로 유명한 숨겨진 명소가 있다고 해서."
10064-100640200 = "좋아. 같이 가자."
10064-100640210 = "응. 그럼 그 날 저녁에 역 앞에서 보자."
10064-100640220 = "새해도 되었으니"
10064-100640230 = "가까운 사찰에서 흥신소 직원들에게 선물할 부적을 구입할까 하는데……"
10064-100640240 = "괜찮다면 선생도 하나 선물해 줄까?"
10064-100640250 = "혹시 특별히 필요한 부적이라도 있어?"
10064-100640260 = "게임 가챠에서 좋은 아이템을 뽑는 부적!"
10064-100640270 = "치명 데미지 수치를 높여주는 부적!"
10064-100640280 = "으음……"
10064-100640290 = "사찰에서 그런 부적을 팔고 있었던가……"
10064-100640300 = "농담이야."
10064-100640310 = "나도 직접 보고 구입하고 싶은데……"
10064-100640320 = "괜찮으면 만나서 같이 사러 가자."
10064-100640330 = "그래."
10064-100640340 = "그럼 내일 아침 사찰 앞에서 보자."
10064-100640350 = "선생, 시내에서 바쁘게 달려가는 모습을 보았는데……"
10064-100640360 = "무슨 일이라도 있었던 거야?"
10064-100640370 = "새해부터 여러 가지 소동이 있어서……"
10064-100640380 = "해가 바뀌자마자 말썽이 벌어져서……"
10064-100640390 = "새해부터 쉬지도 못하고……"
10064-100640400 = "샬레의 선생님은 고생이 많네."
10064-100640410 = "혹시라도 괜찮다면"
10064-100640420 = "다음번에 내가 휴식에 도움이 되는 음악 CD를 빌려줄게."
10064-100640430 = "고마워. 그럼 다음에 부탁할게."

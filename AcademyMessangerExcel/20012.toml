[translation]
20012-200120010 = "Medical Emergency Club, Gehenna District 122-6: Damage occurred from a firefight between miscreants. Injured and other students visiting the area should come to the Medical Emergency Club. Others are advised to stay away from the area. 02:16 PM"
20012-200120020 = "...?"
20012-200120030 = "Huh? Sena?"
20012-200120040 = "Oh."
20012-200120050 = "I'm sorry. It's a group message. But please don't concern yourself."
20012-200120060 = "Sensei, this is Himuro Sena of the Medical Emergency Club."
20012-200120070 = "I've been briefed on the situation. You're visiting Gehenna for an important matter."
20012-200120080 = "Yes, but I'm not feeling well..."
20012-200120090 = "So I might get there early to get it out of the way."
20012-200120100 = "I understand."
20012-200120110 = "I'll keep that in mind."
20012-200120120 = "Sensei, this is Sena. You're resting, so I'll keep it short."
20012-200120130 = "You've sweat a lot, so stay hydrated. Please take the medicine I put on your desk. The blanket and towel I put on you are wet. Be sure to wash them immediately. I'll come pick them up later. Until next time."
20012-200120140 = "Sensei, this is Himuro Sena of the Medical Emergency Club."
20012-200120150 = "I'd like to visit Schale to pick up the blanket and towel. Please let me know when you're available. Thank you."
20012-200120160 = "I want to do something to repay you."
20012-200120170 = "Why don't we meet somewhere outside?"
20012-200120180 = "...?"
20012-200120190 = "Hmm."
20012-200120200 = "Got it."
20012-200120210 = "Will do."
20012-200120220 = "From the Medical Emergency Club, Gehenna District 32-1: Students playing with a fire extinguisher have caused an accident. The perpetrators and some victims were forcibly transferred to a nearby infirmary. 06:47PM"
20012-200120230 = "From the Medical Emergency Club: Emergency crew on standby, situation unresolved. We request visitors take a detour or reschedule. 06:47PM"
20012-200120240 = "You're working hard."
20012-200120250 = "You're always busy."
20012-200120260 = "Oh."
20012-200120270 = "It is what it is, Sensei. You don't have to worry about it."
20012-200120280 = "Well, then. Until we meet again."

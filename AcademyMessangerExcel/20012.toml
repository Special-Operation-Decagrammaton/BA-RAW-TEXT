[translation]
20012-200120010 = "急救醫學部通知格黑娜全校學生：格黑娜自治區122-6號街，目前與多名不良學生發生全面抗戰。傷者請前往急救醫學部接受治療。預定前往該地區的人員，建議擇日再前往　PM.02:16"
20012-200120020 = "……？"
20012-200120030 = "瀬奈？"
20012-200120040 = "啊"
20012-200120050 = "對不起。只是發給所有人的訊息，請別在意"
20012-200120060 = "老師，我是急救醫學部的氷室瀬奈"
20012-200120070 = "我聽說老師稍後要來拜訪格黑娜"
20012-200120080 = "嗯，不過身體的狀態不太好……"
20012-200120090 = "說不定在原訂行程之前，會先去你那邊打擾一下……"
20012-200120100 = "我知道了"
20012-200120110 = "那我靜待老師的到來"
20012-200120120 = "老師，我是急救醫學部的氷室瀬奈。我簡單留下訊息，先回去了"
20012-200120130 = "你流了很多汗，醒來後請一定要補充足夠的水分，並記得吃下桌上的藥。旁邊也有放了替換用的毛巾。我馬上會去回收各個物品並送洗。失陪了"
20012-200120140 = "老師，我是急救醫學部的氷室瀬奈"
20012-200120150 = "為了回收日前的毛巾等物品，我預定今天前往夏萊。請告訴我老師方便的時間。麻煩老師了"
20012-200120160 = "上次謝謝你囉"
20012-200120170 = "我想順便回個禮，要不要在外面見面？"
20012-200120180 = "啊"
20012-200120190 = "是"
20012-200120200 = "我明白了"
20012-200120210 = "那就照老師說的做吧"
20012-200120220 = "急救醫學部通知格黑娜全校學生：格黑娜自治區32-1號街，目前因學生的惡作劇發生滅火器爆炸意外。事件的主謀和部分受害學生，已送往鄰近的保健室──PM.06:47"
20012-200120230 = "急救醫學部通知格黑娜全校學生：補充，由於現場狀況尚未安定，附近尚有人員正在待命。預定前往該地區的人員，建議擇日再前往──PM.06:47"
20012-200120240 = "辛苦你了"
20012-200120250 = "今天也很忙啊"
20012-200120260 = "啊"
20012-200120270 = "我沒事，不是什麼嚴重的狀況"
20012-200120280 = "再見"

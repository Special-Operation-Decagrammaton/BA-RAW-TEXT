[translation]
20012-200120010 = "<응급의학부 발신> <게헨나 자치구 122-6번가> 불량 학생들 간의 전면전으로 인한 피해 발생. 부상자 및 해당 지역 방문 학생들은 응급의학부로 찾아오십시오. 해당 지역 방문 예정자들은 일정 변경을 부탁드립니다. PM.02:16"
20012-200120020 = "……?"
20012-200120030 = "응? 세나?"
20012-200120040 = "아."
20012-200120050 = "죄송합니다. 전체 메시지이니 참고만 부탁드리고, 신경 쓰지 마시길."
20012-200120060 = "선생님. 응급의학부의 히무로 세나입니다."
20012-200120070 = "상황은 들었습니다. 중요한 일정이라 게헨나에 방문하신다고요."
20012-200120080 = "응. 그런데 몸 상태가 좀 안 좋아서……."
20012-200120090 = "만일을 대비해 미리 들를 수 있다고 말해 두려고."
20012-200120100 = "일단은 알겠습니다."
20012-200120110 = "그럼, 그렇게 알고 있겠습니다."
20012-200120120 = "선생님. 세나입니다. 쉬고 계시는 상황이니 간단히 메시지만 남겨 놓고 돌아가도록 하겠습니다."
20012-200120130 = "땀을 많이 흘리셨으니 충분히 수분을 섭취해 주시고, 책상 위에 상비약을 두었으니 드시기 바랍니다. 덮어드린 담요와 물수건은 땀에 젖었으니 바로 세탁하십시오. 다음에 다시 회수하러 방문토록 하겠습니다. 그럼 이만."
20012-200120140 = "선생님, 응급의학부의 히무로 세나입니다."
20012-200120150 = "일전에 말씀드렸던 담요와 물수건을 회수하고자 샬레에 방문할 예정이니, 가능하신 시간대가 있으시면 말씀해주시기 바랍니다. 감사합니다."
20012-200120160 = "이번에는 나도 답례를 좀 할까 하는데."
20012-200120170 = "여기 말고 밖에서 만나는 건 어때."
20012-200120180 = "?"
20012-200120190 = "음"
20012-200120200 = "알겠습니다."
20012-200120210 = "그럼 그렇게 알고 있겠습니다."
20012-200120220 = "<응급의학부 발신> <게헨나 자치구 32-1번가> 일부 학생들의 소화기 장난으로 인한 사고 발생. 사건 주모자와 피해 학생들 일부가 인근 양호실로 강제 이송되었습니다. PM.06:47"
20012-200120230 = "<응급의학부 발신> 또한, 상황이 완전히 종료된 것이 아니므로 비상 인원이 대기 중입니다. 해당 지역 방문자는 우회로를 통하거나 일정 변경을 요망. PM.06:47"
20012-200120240 = "고생이 많네."
20012-200120250 = "늘 바쁘구나."
20012-200120260 = "아"
20012-200120270 = "괜찮습니다. 선생님. 신경 쓰실 만한 사안은 아닙니다."
20012-200120280 = "그럼 이만."

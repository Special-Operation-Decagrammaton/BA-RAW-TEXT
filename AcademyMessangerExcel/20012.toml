[translation]
20012-200120010 = "<จากหน่วยแพทย์ฉุกเฉิน> <เขตเกเฮน\nน่า 122-6> เกิดความเสียหายจากการต่อสู้\nกรุณาส่งตัวผู้ที่ได้รับบาดเจ็บและคนที่อยู่\nในพื้นที่มายังหน่วยแพทย์ฉุกเฉินทันทีค่ะ\nสำหรับผู้ที่จะเดินทางไปยังพื้นที่นั้น\nขอให้เปลี่ยนกำหนดการค่ะ 02:16 PM"
20012-200120020 = "...?"
20012-200120030 = "หืม เซนะ?"
20012-200120040 = "อ๊ะ"
20012-200120050 = "ขอโทษด้วยค่ะ นี่เป็นแค่ข้อความ\nที่ส่งออกไปให้ทุกคนค่ะ\nไม่ต้องกังวลนะคะ"
20012-200120060 = "คุณครูคะ ฉันฮิมูโระ เซนะ\nหัวหน้าหน่วยแพทย์ฉุกเฉินค่ะ"
20012-200120070 = "ฉันได้ฟังมาคร่าวๆ แล้วค่ะ\nคุณครูมาที่เขตเกเฮนน่าเพราะ\nมีธุระสำคัญสินะคะ"
20012-200120080 = "อื้อ แต่ว่าครูไม่ค่อยสบายเท่าไร..."
20012-200120090 = "ครูแค่บอกเผื่อไว้ก่อน\nจะได้เตรียมตัวได้ทันน่ะ"
20012-200120100 = "ฉันเข้าใจแล้วค่ะ"
20012-200120110 = "ฉันจะเตรียมพร้อมไว้ค่ะ"
20012-200120120 = "คุณครู เซนะเองค่ะ ตอนนี้คุณครูกำลัง\nพักผ่อนอยู่ ฉันขอฝากข้อความไว้แล้ว\nขอตัวกลับก่อนนะคะ"
20012-200120130 = "คุณครูเหงื่อออกเยอะ ต้องดื่มน้ำเยอะๆ\nทานยาที่ฉันเตรียมไว้บนโต๊ะด้วยค่ะ\nผ้าห่มกับผ้าขนหนูคงชุ่มเหงื่อหมดแล้ว\nรบกวนนำไปซักให้ด้วยนะคะ คราวหน้าฉัน\nจะแวะไปรับคืนค่ะ"
20012-200120140 = "คุณครูคะ ฉันฮิมูโระ เซนะ\nหัวหน้าหน่วยแพทย์ฉุกเฉินค่ะ"
20012-200120150 = "ฉันจะไปที่ชาเล่ต์เพื่อไปรับผ้าห่ม\nกับผ้าขนหนูคืนค่ะ ช่วยบอกเวลาที่\nคุณครูสะดวกมานะคะ ขอบคุณค่ะ"
20012-200120160 = "ครูอยากตอบแทนเซนะบ้างเลย"
20012-200120170 = "เราไปเจอกันข้างนอกดีมั้ย?"
20012-200120180 = "?"
20012-200120190 = "อืม..."
20012-200120200 = "เข้าใจแล้วค่ะ"
20012-200120210 = "แบบนั้นก็ได้ค่ะ"
20012-200120220 = "<จากหน่วยแพทย์ฉุกเฉิน> <เขตเกเฮน\nน่า 32-1> เกิดเหตุฉุกเฉินเนื่องจากมีเด็ก\nกลุ่มหนึ่งนำอุปกรณ์ ดับเพลิงมาเล่น\nผู้ก่อเหตุและผู้เสียหายบางส่วนได้ถูกนำ\nตัวส่งไปที่ห้องพยาบาลในบริเวณใกล้เคียง\nแล้วค่ะ 06:47 PM"
20012-200120230 = "<จากหน่วยแพทย์ฉุกเฉิน> นอกจากนี้\nหน่วยฉุกเฉิน บางส่วนได้เตรียมพร้อมรับมือ\nเนื่องจากสถานการณ์ยังไม่คลี่คลายค่ะ\nสำหรับผู้ที่มีแผนจะเดินทางไปยังพื้นที่นั้น\nขอให้เปลี่ยนกำหนดการด้วยค่ะ 06:47 PM"
20012-200120240 = "ทำงานหนักน่าดูเลยนะ"
20012-200120250 = "งานยุ่งตลอดเลยนะ"
20012-200120260 = "อา..."
20012-200120270 = "เรื่องปกติค่ะ คุณครู\nไม่ต้องห่วงเรื่องนั้นหรอกค่ะ"
20012-200120280 = "ไว้พบกันนะคะ"

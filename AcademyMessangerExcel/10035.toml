[translation]
10035-100350010 = "Honestly..."
10035-100350020 = "I can't bring myself to do it."
10035-100350030 = "Dealing with outsiders, I mean."
10035-100350040 = "What's wrong?"
10035-100350050 = "Are you okay, Ui?"
10035-100350060 = "Well."
10035-100350070 = "It's nothing. I simply had some issues with outsiders recently."
10035-100350080 = "That's all I can say. I shouldn't be saying any more."
10035-100350090 = "It doesn't concern you, though. You don't have to worry."
10035-100350100 = "Please take my word for it."
10035-100350110 = "Thank you, Sensei. I had fun today."
10035-100350120 = "Please let me know the next time you're coming."
10035-100350130 = "Okay. I'll make sure to let you know before I come."
10035-100350140 = "Aww, but I liked hearing that side of you, Ui."
10035-100350150 = "..."
10035-100350160 = "Huh."
10035-100350170 = "..."
10035-100350180 = "Right."
10035-100350190 = "Sensei."
10035-100350200 = "Are you available right now?"
10035-100350210 = "Is something wrong?"
10035-100350220 = "Well."
10035-100350230 = "Actually, I could use your help."
10035-100350240 = "I hope it's okay to ask you about this."
10035-100350250 = "I don't mean to alarm you."
10035-100350260 = "But one of my precious children has gone missing."
10035-100350270 = "What?!"
10035-100350280 = "I'll be right there."
10035-100350290 = "Hold on."
10035-100350300 = "Sensei?"
10035-100350310 = "I should explain."
10035-100350320 = "Thank you so much for today, Sensei."
10035-100350330 = "I know it's very late. I appreciate it."
10035-100350340 = "Not only that."
10035-100350350 = "I also appreciate your consideration."
10035-100350360 = "Sensei."
10035-100350370 = "I have a proposal. Would you like to hear it?"
10035-100350380 = "A proposal? Sure."
10035-100350390 = "Go ahead."
10035-100350400 = "Thank you, Sensei."
10035-100350410 = "I'll start my preparations now."
10035-100350420 = "Please stop by and I'll tell you more."
10035-100350430 = "Sensei."
10035-100350440 = "I'm very sorry, but I have a favor to ask of you. If it's okay."
10035-100350450 = "Of course. What's going on?"
10035-100350460 = "Is there something wrong?"
10035-100350470 = "It's not a big deal. In fact, I almost feel guilty asking because it's so minor."
10035-100350480 = "I'll leave the door open for you if you want to come by."
10035-100350490 = "Also."
10035-100350500 = "Could you bring me something to drink and chewing gum to keep me awake?"
10035-100350510 = "Oh."
10035-100350520 = "I fell asleep."
10035-100350530 = "I didn't even get to greet you when you got here. And I can't believe I fell asleep before you left."
10035-100350540 = "Sorry."
10035-100350550 = "Don't worry about it."
10035-100350560 = "You can always ask me for things like this."
10035-100350570 = "Okay."
10035-100350580 = "I'll be able to enjoy work from now on. Thanks to you."
10035-100350590 = "So."
10035-100350600 = "If you're okay with it."
10035-100350610 = "I'd like to see you like this more often."
10035-100350620 = "Good day."

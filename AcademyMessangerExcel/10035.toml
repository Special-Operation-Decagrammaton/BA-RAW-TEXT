[translation]
10035-100350010 = "진짜……."
10035-100350020 = "정말 힘드네요"
10035-100350030 = "바깥 사람들이란……."
10035-100350040 = "무슨 일 있어?"
10035-100350050 = "우이……?"
10035-100350060 = "그"
10035-100350070 = "별건 아니고……. 그냥 어제 또 바깥사람들과 엮일 일이 있었습니다……."
10035-100350080 = "음 역시 계속해서 좋을 이야긴 아니네요. 이건 여기까지"
10035-100350090 = "아 물론 선생님 이야기는 아니에요."
10035-100350100 = "혹시나 해서 말씀드립니다……."
10035-100350110 = "감사합니다, 선생님. 오늘 덕분에 즐거웠어요."
10035-100350120 = "다음에도 언제든 오실 때 꼭 연락주세요."
10035-100350130 = "응. 다음부턴 출발 전에 연락할게."
10035-100350140 = "문전박대도 꽤 재밌었어."
10035-100350150 = "……."
10035-100350160 = "으음"
10035-100350170 = "……."
10035-100350180 = "……네."
10035-100350190 = "선생님"
10035-100350200 = "혹시 자리에 계신가요?"
10035-100350210 = "무슨 일이야?"
10035-100350220 = "그"
10035-100350230 = "다름이 아니라 도움이 필요한 일이 있어서……"
10035-100350240 = "아니, 이런 걸 선생님께 부탁드려도 괜찮을지 모르겠는데"
10035-100350250 = "별건 아니고"
10035-100350260 = "친하게 지내던 아이 하나가 실종된 상태라……."
10035-100350270 = "……뭐라고!?"
10035-100350280 = "지금 바로 갈게"
10035-100350290 = "아니"
10035-100350300 = "선생님 그게"
10035-100350310 = "말을 끝까지"
10035-100350320 = "오늘 일은 정말로 감사했습니다. 선생님."
10035-100350330 = "늦은 시간까지 감사했습니다."
10035-100350340 = "그거 말고도"
10035-100350350 = "여러 가지로, 배려해 주셔서 감사했습니다."
10035-100350360 = "선생님."
10035-100350370 = "제안하고 싶은 일이 생겼습니다만……. 혹시 괜찮으실까요?"
10035-100350380 = "갑자기 '제안'이라고?"
10035-100350390 = "나야 괜찮지만, 무슨 일이야?"
10035-100350400 = "감사합니다. 선생님."
10035-100350410 = "그럼 잘 준비해 둘 테니"
10035-100350420 = "언제든 방문해주시기 바랍니다."
10035-100350430 = "선생님"
10035-100350440 = "대단히 죄송하지만……. 혹시 괜찮으시면, 한 가지 부탁드려도 괜찮을까요……?"
10035-100350450 = "당연하지. 무슨 일인데?"
10035-100350460 = "부탁? 무슨 일 있어?"
10035-100350470 = "그, 사실 별건 아닌데……. 아니, 오히려 별게 아니라서 더 부탁드리기 죄송하지만……."
10035-100350480 = "저……. 오시는 타이밍에 문 열어 놓을 테니……."
10035-100350490 = "그……."
10035-100350500 = "에너지 드링크랑……. 잠 깨는 졸음 껌 좀……. 부탁드립니다……."
10035-100350510 = "어라."
10035-100350520 = "저 잠들었었군요."
10035-100350530 = "오실 때 제대로 반기지도 못한 주제에 가실 때 배웅조차 못하고 자버리다니……."
10035-100350540 = "죄송합니다."
10035-100350550 = "신경 쓰지 마."
10035-100350560 = "앞으로도 이런 건 언제든 환영이야."
10035-100350570 = "네"
10035-100350580 = "덕분에 저도 전보다 더 즐겁게 작업할 수 있을 거 같아요"
10035-100350590 = "만약 그……"
10035-100350600 = "선생님만 괜찮으시다면"
10035-100350610 = "이런 식으로도 더 자주 뵐 수 있었으면 좋겠습니다."
10035-100350620 = "그럼 좋은 하루 되세요."

10035-100350480 = "就是，那個……"
10035-100350490 = "大門我已經打開了"
10035-100350500 = "如果能幫我買點能量飲料，或是能讓人清醒的口香糖之類的東西的話，我會很感謝的……"
10035-100350510 = "對不起"

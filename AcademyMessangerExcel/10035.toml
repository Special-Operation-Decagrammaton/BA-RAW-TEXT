[translation]
10035-100350010 = "เฮ้อ..."
10035-100350020 = "เหนื่อยใจจังเลยค่ะ"
10035-100350030 = "คนนอกทั้งหลายช่าง..."
10035-100350040 = "มีเรื่องอะไรเหรอ?"
10035-100350050 = "อุย...?"
10035-100350060 = "เอ่อ..."
10035-100350070 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ...\nแค่เมื่อวานฉันต้องไปข้องเกี่ยว\nกับคนนอก..."
10035-100350080 = "อืม ฉันว่าเล่าไปก็คง\nไม่มีเรื่องดีๆ หรอกค่ะ\nพอแค่นี้ดีกว่า..."
10035-100350090 = "อ้อ คนนั้นไม่ใช่คุณครูหรอกนะคะ"
10035-100350100 = "ฉันบอกไว้ก่อนน่ะค่ะ\nเผื่อว่าจะเข้าใจผิด..."
10035-100350110 = "ขอบคุณนะคะคุณครู\nวันนี้สนุกมากเลยค่ะ"
10035-100350120 = "ต่อไปถ้าแวะมาอีกก็บอกฉันนะคะ"
10035-100350130 = "อื้ม ต่อไปครูจะติดต่อไปล่วงหน้า"
10035-100350140 = "จริงๆ การถูกห้ามไม่ให้เข้าก็สนุกดี"
10035-100350150 = "......."
10035-100350160 = "อืม..."
10035-100350170 = "......."
10035-100350180 = "ค่ะ..."
10035-100350190 = "คุณครูคะ"
10035-100350200 = "อยู่มั้ยคะ?"
10035-100350210 = "มีอะไรเหรอ?"
10035-100350220 = "คือว่า..."
10035-100350230 = "ที่จริงแล้วฉันอยากได้\nความช่วยเหลือนิดหน่อยค่ะ..."
10035-100350240 = "อืม... แต่ฉันไม่รู้ว่าเรื่องแบบนี้\nจะให้คุณครูช่วยได้ไหม..."
10035-100350250 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ..."
10035-100350260 = "ก็แค่เด็กคนสำคัญของฉันหายตัวไป..."
10035-100350270 = "ว่าไงนะ...!?"
10035-100350280 = "ครูจะไปเดี๋ยวนี้เลย"
10035-100350290 = "เดี๋ยวค่ะ"
10035-100350300 = "คุณครูคะ คือว่า..."
10035-100350310 = "ฟังให้จบก่อนสิคะ"
10035-100350320 = "ขอบคุณสำหรับวันนี้มากนะคะคุณครู"
10035-100350330 = "ขอบคุณที่อยู่ด้วยถึงดึกเลย"
10035-100350340 = "แล้วก็"
10035-100350350 = "ขอบคุณที่เอาใจใส่หลายๆ\nอย่างเลยนะคะ"
10035-100350360 = "คุณครูคะ"
10035-100350370 = "ฉันอยากเสนออะไรบางอย่าง\nให้คุณครู... ได้มั้ยคะ?"
10035-100350380 = "จู่ๆ มี 'ข้อเสนอ' งั้นเหรอ?"
10035-100350390 = "ได้อยู่แล้ว มีเรื่องอะไรเหรอ?"
10035-100350400 = "ขอบคุณนะคะคุณครู"
10035-100350410 = "งั้นฉันจะเตรียมตัวไว้อย่างดี"
10035-100350420 = "แวะมาหาฉันได้ตลอดนะคะ"
10035-100350430 = "คุณครูคะ"
10035-100350440 = "ฉันต้องขอโทษจริงๆ ค่ะ\nแต่ว่าฉันขอรบกวนอะไร\nสักหน่อยได้มั้ยคะ...?"
10035-100350450 = "ได้สิ เรื่องอะไรเหรอ?"
10035-100350460 = "ขอรบกวนเหรอ? มีอะไรล่ะ?"
10035-100350470 = "ที่จริงๆ มันไม่ใช่เรื่องใหญ่อะไรหรอก...\nไม่สิ บางทีไม่ใช่เรื่องใหญ่อะไรแบบนี้\nแต่ก็คิดจะมารบกวน... ขอโทษนะคะ"
10035-100350480 = "คือว่า... ฉันจะเปิดประตูรอไว้..."
10035-100350490 = "เอ่อ..."
10035-100350500 = "ช่วยเอาเครื่องดื่มชูกำลัง...\nกับหมากฝรั่งแก้ง่วง...\nมาให้ฉันหน่อยได้มั้ยคะ...?"
10035-100350510 = "เอ๋?"
10035-100350520 = "ฉันเผลอหลับไปเหรอคะเนี่ย?"
10035-100350530 = "ตอนคุณครูมาก็ไม่ได้ต้อนรับให้ดี\nตอนกลับก็เผลอหลับจนไม่ได้ไปส่งอีก..."
10035-100350540 = "ขอโทษนะคะ"
10035-100350550 = "ไม่เป็นไรหรอก"
10035-100350560 = "เรื่องแบบนี้ขอให้บอกเลย\nครูยินดีเสมอ"
10035-100350570 = "ค่ะ"
10035-100350580 = "คุณครูทำให้ฉันสนุกกับงาน\nได้มากกว่าเคยค่ะ"
10035-100350590 = "ถ้าหากว่า..."
10035-100350600 = "คุณครูไม่ว่าอะไร..."
10035-100350610 = "ฉันอยากเจอคุณครูบ่อยๆ\nแบบนี้อีกค่ะ"
10035-100350620 = "ขอให้วันนี้เป็นวันที่ดีนะคะ"

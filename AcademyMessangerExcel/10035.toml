10035-100350170 = "……"
10035-100350180 = "……好，好的"
10035-100350190 = "老師"
10035-100350200 = "現在有空嗎？"
10035-100350210 = "嗯，怎麼了嗎？"
10035-100350220 = "其實"
10035-100350230 = "可以的話，想請你幫個忙……"
10035-100350240 = "那個，雖然不知道"
10035-100350250 = "能不能拜託老師這種事"
10035-100350260 = "有個和我很要好的孩子，失蹤了"
10035-100350270 = "我立刻趕去古書館"
10035-100350280 = "我馬上過去"
10035-100350290 = "啊"
10035-100350300 = "老師，那個"

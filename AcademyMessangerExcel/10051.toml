[translation]
10051-100510010 = "Oh. Oh, my."
10051-100510020 = "Sensei, have you seen my lab coat?"
10051-100510030 = "You mean the one sprawled over the couch?"
10051-100510040 = "That sounds about right."
10051-100510050 = "I must have forgotten it there."
10051-100510060 = "But I need to start work already. What should I do?"
10051-100510070 = "Everything else I could use is being washed..."
10051-100510080 = "Do you want me to bring it to you?"
10051-100510090 = "No, it's okay."
10051-100510100 = "I'll find something else to wear."
10051-100510110 = "After debuting the special-specced Thundergun on field day,"
10051-100510120 = "we received requests for cheer bots from all over."
10051-100510130 = "Making some typical bots wouldn't be hard, but..."
10051-100510140 = "These are requests made directly to us. I can't just give them something stock standard."
10051-100510150 = "Would something standard be that bad?"
10051-100510160 = "Absolutely."
10051-100510170 = "If they wanted standard, they would have picked something off the shelf. Instead, they came to us."
10051-100510180 = "They expect and deserve something unique."
10051-100510190 = "Who knew you were so persuasive!"
10051-100510200 = "Persuasive enough for you to give me some of your time this afternoon?"
10051-100510210 = "I want to demo a prototype I made..."
10051-100510220 = "And who better than you, Sensei, to judge it?"
10051-100510230 = "Ugh, this is such a headache..."
10051-100510240 = "Worried about something?"
10051-100510250 = "Don't you remember my last attempt?"
10051-100510260 = "I tried modifying the bots so that they could handle at least Mach 1, but..."
10051-100510270 = "I'm not sure I can manage it by the deadline."
10051-100510280 = "Maybe making bots that can handle supersonic movement is slightly too ambitious..."
10051-100510290 = "Why not be honest and ask the clients for an extension?"
10051-100510300 = "Well, that's technically an option..."
10051-100510310 = "But the clients trusted us. I don't want to repay that trust with delays."
10051-100510320 = "This isn't a very meister-like solution, but..."
10051-100510330 = "I'll have to solve this using my body."
10051-100510340 = "....Your body?!"
10051-100510350 = "Sorry about all the trouble today..."
10051-100510360 = "How's your voice?"
10051-100510370 = "Still hoarse..."
10051-100510380 = "I can barely manage to talk to the other members... Anything more than a whisper is very uncomfortable."
10051-100510390 = "But it got me thinking about creating a new communication device..."
10051-100510400 = "Something that will make even quiet voices easily heard."
10051-100510410 = "Perhaps a device that recognizes and records voices, then replays them loudly..."
10051-100510420 = "...So a loudspeaker?"
10051-100510430 = "The club members have seemed really low-energy lately."
10051-100510440 = "Any guesses why, Sensei?"
10051-100510450 = "Maybe their moods dropped with their grades?"
10051-100510460 = "Have they mentioned their test scores at all?"
10051-100510470 = "...You think that's it?"
10051-100510480 = "The grades they've mentioned didn't seem too bad..."
10051-100510490 = "But just because something isn't bad, doesn't mean it's not disappointing."
10051-100510500 = "Can you think of a good way to cheer them up?"
10051-100510510 = "Hmm..."
10051-100510520 = "Times like these are when I need to step up as their club president."

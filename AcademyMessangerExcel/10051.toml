[translation]
10051-100510010 = "아, 이런."
10051-100510020 = "선생님. 혹시 내 작업 가운, 샬레에 있어?"
10051-100510030 = "소파 위에 있는 이 흰색 가운 말이야?"
10051-100510040 = "응, 맞는 것 같네."
10051-100510050 = "지난번에 휴게실에 벗어 둔 걸 잊어버린 모양이야."
10051-100510060 = "지금부터 작업을 시작해야 하는데 어쩌지?"
10051-100510070 = "다른 가운은 모두 세탁 중인데……"
10051-100510080 = "지금 가져다줄까?"
10051-100510090 = "아냐, 괜찮아."
10051-100510100 = "적당한 대체재를 찾아볼게."
10051-100510110 = "지난 대운동회 때 특별 사양의 천둥이를 선보인 이후로"
10051-100510120 = "여러 업체로부터 새로운 응원용 도구를 개발해달라는 요청을 받았어"
10051-100510130 = "평범한 응원 도구를 만드는 것이라면 어렵지 않겠지만……"
10051-100510140 = "모처럼 받은 개발 의뢰인데, 평범한 결과물을 내놓을 수는 없지."
10051-100510150 = "평범해도 괜찮지 않을까……?"
10051-100510160 = "아니, 그럴 수는 없어."
10051-100510170 = "기성품을 구매하지 않고 굳이 우리에게 의뢰를 하는 고객이라면"
10051-100510180 = "분명 평범하지 않은 발명품을 기대하고 있을 테니까."
10051-100510190 = "설득력이…… 있어?!"
10051-100510200 = "그래서 말인데, 오후에 잠깐 시간 괜찮아?"
10051-100510210 = "시험 삼아 만든 응원 도구를 시연해보고 싶은데……"
10051-100510220 = "얼마나 효과가 있는지 선생님이 직접 판단해줬으면 좋겠어."
10051-100510230 = "큰일이네……"
10051-100510240 = "무슨 걱정이라도 있어?"
10051-100510250 = "그게 지난 번에 새로운 응원용 도구의 개발을 요청받았다고 했잖아?"
10051-100510260 = "그래서 음속으로 움직여도 손상되지 않도록, 로봇의 관절을 여러 가지로 개조해보았는데……"
10051-100510270 = "아무래도 마감 기간 내에 완성하는 건 어려울 것 같아."
10051-100510280 = "음속이 문제인게 아닐까……"
10051-100510290 = "솔직하게 말하고 양해를 구하는 게 어때?"
10051-100510300 = "물론 그것도 하나의 방법이지만……"
10051-100510310 = "우리를 믿고 응원을 요청한 클라이언트들을 더 기다리게 만들 수는 없지."
10051-100510320 = "비록 마이스터다운 해결법은 아니지만……"
10051-100510330 = "이번에는 직접 몸으로 해결하는 수밖에."
10051-100510340 = "……몸으로?!"
10051-100510350 = "오늘은 실례를 끼쳐버렸네……"
10051-100510360 = "아직도 목이 쉰 상태야?"
10051-100510370 = "응, 아직도 여전하네."
10051-100510380 = "부원들과 이야기를 하려고 해도 목소리가 나오지 않아서 여간 불편한 게 아니야."
10051-100510390 = "그래서 원활한 의사소통을 도와줄 새로운 기계장치를 구상하고 있어."
10051-100510400 = "작은 목소리로 말해도 목소리가 전달될 수 있도록"
10051-100510410 = "음성을 인식하고 기록하여, 성량을 확대한 뒤에 다시 출력하는 기계 장치를……"
10051-100510420 = "……보통 그걸 확성기라고 부르지 않나?"
10051-100510430 = "최근 부원들이 뭔가 기운이 없어 보이는데."
10051-100510440 = "선생님, 뭔가 짐작 가는 거 있어?"
10051-100510450 = "성적이 잘 안 나온 게 아닐까?"
10051-100510460 = "최근 시험 기간이었으니까."
10051-100510470 = "……그런가?"
10051-100510480 = "전에 들었던 성적은 그리 나쁘지 않았던 것 같은데."
10051-100510490 = "하긴, 본인 입장에서는 만족스럽지 않을 수도 있겠지."
10051-100510500 = "뭔가 기운을 북돋아 줄 방법이 없을까?"
10051-100510510 = "으음……"
10051-100510520 = "아무래도 부장인 내가 나서야 할 차례인 것 같네."

[translation]
10051-100510010 = "不好意思，老師"
10051-100510020 = "請問我的白袍有在夏萊嗎？"
10051-100510030 = "是放在沙發上的這件嗎？"
10051-100510040 = "就是它！能找到真是太好了……"
10051-100510050 = "大概是上次在休息室脫下後就忘了"
10051-100510060 = "我現在本來是想工作的……"
10051-100510070 = "但麻煩的是，替換用的白袍也拿去洗了……"
10051-100510080 = "要送去給你嗎？"
10051-100510090 = "唔嗯……不，沒關係"
10051-100510100 = "我找找看有沒有能頂替的"
10051-100510110 = "上次不是在大運動會上公開了特殊規格的雷醬嗎？"
10051-100510120 = "從那之後，就有多家業者委託我開發應援機器人"
10051-100510130 = "如果只是製作應援機器人倒是不難……"
10051-100510140 = "但既然都特意來委託了，肯定不能壞了工程師部的名聲"
10051-100510150 = "普通的機器人就可以了吧……？"
10051-100510160 = "不，那可不行"
10051-100510170 = "既然是工程師部的一員，就要開發新的發明！"
10051-100510180 = "委託人肯定也是這麼希望的"
10051-100510190 = "是，是這樣嗎……？"
10051-100510200 = "所以我想諮詢一下老師的意見，晚點能來趟千年嗎？"
10051-100510210 = "想馬上實驗一下應援機器人的試作品……"
10051-100510220 = "讓老師看看它的效果如何"
10051-100510230 = "真是被打敗了……老師，現在有空嗎？"
10051-100510240 = "有什麼煩惱嗎？"
10051-100510250 = "之前有說，接到了開發應援機器人的委託吧"
10051-100510260 = "為了提升關節強度，我對它進行了能夠承受音速的改造……"
10051-100510270 = "但好像很難在期限內完成"
10051-100510280 = "音速什麼的沒必要吧……"
10051-100510290 = "說明情況，推遲交貨時間呢？"
10051-100510300 = "或許可以……"
10051-100510310 = "但是，我得回應這些相信並委託我的委託人們的期待"
10051-100510320 = "身為巨匠，這麼做雖然不會受到讚揚……"
10051-100510330 = "但現在只能靠身體解決了……！"
10051-100510340 = "……靠身體！？"
10051-100510350 = "老師，不好意思……"
10051-100510360 = "喉嚨還很沙啞嗎？"
10051-100510370 = "嗯，還是一樣"
10051-100510380 = "和部員們說話也出現了障礙"
10051-100510390 = "所以我正在構思一種新型的交流支援裝置"
10051-100510400 = "即使是小小的聲音也能傳達到……"
10051-100510410 = "紀錄輸入的聲音，擴大音量後再輸出"
10051-100510420 = "……那就是擴音器吧？"
10051-100510430 = "感覺部員們最近沒什麼精神呢"
10051-100510440 = "老師有什麼頭緒嗎？"
10051-100510450 = "你瞧，前陣子不是有考試嗎"
10051-100510460 = "是因為成績不理想吧？"
10051-100510470 = "這樣啊……"
10051-100510480 = "我覺得大家的成績應該都不差"
10051-100510490 = "不，對本人來說還不夠滿意吧"
10051-100510500 = "有什麼能鼓勵他們的方法就好了"
10051-100510510 = "是啊……"
10051-100510520 = "這時候就該部長我出面了"

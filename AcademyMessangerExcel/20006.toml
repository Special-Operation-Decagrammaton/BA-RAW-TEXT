[translation]
20006-200060010 = "Are you free this weekend, Sensei?"
20006-200060020 = "Do I have to be a lab rat again?"
20006-200060030 = "Please, no more experiments..."
20006-200060040 = "It's not like that!"
20006-200060050 = "I just wanted to tell you that eastern restaurant you like is launching a new menu this weekend!"
20006-200060060 = "I'm trying to be nice, and this is how you repay me?"
20006-200060070 = "Sorry. I'm free this weekend."
20006-200060080 = "Let me make it up to you by picking up the tab."
20006-200060090 = "Really? Don't forget about it!"
20006-200060100 = "I'll meet you there later!"
20006-200060110 = "Phew... The life of a genius can get pretty lonely."
20006-200060120 = "Average people could never understand, no matter how much I explain..."
20006-200060130 = "Is something wrong?"
20006-200060140 = "Uh, I mean..."
20006-200060150 = "N-Nothing!"
20006-200060160 = "I can take care of it on my own!"
20006-200060170 = "I'm Shanhaijing's genius! There's nothing I can't do! Hahaha!"
20006-200060180 = "Well, THAT isn't suspicious."
20006-200060190 = "Thanks for treating me last time, Sensei."
20006-200060200 = "I'll get you something tasty from Black Tortoise Promenade in return."
20006-200060210 = "What do you want Sensei?"
20006-200060220 = "I'll go with fried rice."
20006-200060230 = "I want yakisoba!"
20006-200060240 = "Ah, but Black Tortoise is starting a new ramen menu this week."
20006-200060250 = "Sensei, let's eat ramen at Black Tortoise this weekend!"
20006-200060260 = "Why even ask me what I wanted, then?"
20006-200060270 = "Ugh... Uh, ugh..."
20006-200060280 = "Is something wrong?"
20006-200060290 = "The special spicy sauce I made last week is much more popular than I expected."
20006-200060300 = "I'm at the point where I have no time for research because I'm always making sauce."
20006-200060310 = "Do they even know what the Eastern Alchemy Society is?"
20006-200060320 = "We're supposed to make elixirs that grant eternal life and youth, not make special sauces!"
20006-200060330 = "I'm so busy that I might need to ask Nezusuke for help..."
20006-200060340 = "Wait, if I use that method..."
20006-200060350 = "No."
20006-200060360 = "Huh? I didn't even say anything yet."
20006-200060370 = "I don't know what you are about to say, but no."
20006-200060380 = "Tch. It's like you can read minds..."
20006-200060390 = "Ahem!"
20006-200060400 = "Good news."
20006-200060410 = "At long last,"
20006-200060420 = "my genius has been recognized!"
20006-200060430 = "Oh? What's going on?"
20006-200060440 = "Did you get a commission?"
20006-200060450 = "Indeed!"
20006-200060460 = "Even you're going to be there, since it's a special occasion!"
20006-200060470 = "You'll get to see my latest invention firsthand!"
20006-200060480 = "Ugh"
20006-200060490 = "Looking back on it, I should've worn a gas mask."
20006-200060500 = "I underestimated the formulation, treating it like mere perfume."
20006-200060510 = "That someone like me would make such a mistake..."
20006-200060520 = "But everyone had a great time, thanks to that."
20006-200060530 = "I'd say you made the event a great success."
20006-200060540 = "Heh"
20006-200060550 = "Was there ever any doubt?"
20006-200060560 = "Hm"
20006-200060570 = "Still"
20006-200060580 = "Sensei."
20006-200060590 = "Thank you."
20006-200060600 = "Next time, I'll really knock your socks off!"

[translation]
20006-200060010 = "คุณครู สุดสัปดาห์นี้ว่างรึเปล่า?"
20006-200060020 = "จะให้ครูไปเป็นหนูทดลองยาอีกเหรอ?"
20006-200060030 = "อาทิตย์นี้ปล่อยครูไปเถอะ..."
20006-200060040 = "ไม่ใช่แบบนั้นสักหน่อย!"
20006-200060050 = "ฉันจะบอกว่าร้านอาหารจีนที่คุณครู\nอยากไปน่ะ จะเปิดขายเมนูใหม่ตั้งแต่\nสุดสัปดาห์นี้ต่างหากเล่า!"
20006-200060060 = "อุตส่าห์หวังดี ไม่คิดเลยว่าคุณครู\nจะมองท่านซายะในแง่ร้ายแบบนั้น!"
20006-200060070 = "ขอโทษที่สงสัยนะ\nอาทิตย์นี้ครูว่างพอดีเลย"
20006-200060080 = "เดี๋ยวครูเลี้ยงข้าวเป็นการไถ่โทษ\nแล้วกันนะ"
20006-200060090 = "พูดจริงเหรอ? พูดแล้วห้ามกลับคำนะ!"
20006-200060100 = "ถ้างั้นสุดสัปดาห์นี้เจอกันที่หน้าร้านนั้น\nก็แล้วกัน!"
20006-200060110 = "เฮ้อ...\nชีวิตของอัจฉริยะนี่ลำบากลำบนจริงๆ"
20006-200060120 = "ถึงจะพยายามอธิบายยังไง แต่พวกคนอื่น\nก็ไม่ยอมเข้าใจสักที..."
20006-200060130 = "มีเรื่องอะไรเหรอ?"
20006-200060140 = "อ๋อ คือว่า..."
20006-200060150 = "เปล่า ไม่มีอะไรหรอก!"
20006-200060160 = "ปัญหาแค่นี้ท่านซายะจัดการคนเดียว\nได้สบายๆ อยู่แล้ว!"
20006-200060170 = "อัจฉริยะแห่งซานไห่จิง ไม่มีอะไร\nที่ทำไม่ได้หรอกนะ! โฮะ-โฮะ-โฮะ!"
20006-200060180 = "แบบนั้นยิ่งน่าสงสัยนะ..."
20006-200060190 = "คุณครู ขอบคุณที่มาช่วยเรื่อง\nสั่งเมนูพิเศษนะ"
20006-200060200 = "คราวนี้ฉันจะเลี้ยงของอร่อยๆ ที่ย่านการ\nค้าเทพเต่าดำให้เป็นการตอบแทน"
20006-200060210 = "คุณครูอยากกินอะไรล่ะ?"
20006-200060220 = "ข้าวผัดแล้วกัน"
20006-200060230 = "ครูอยากกินยากิโซบะ!"
20006-200060240 = "อ่า... จะว่าไปแล้วสัปดาห์นี้เป็นสัปดาห์\nที่ร้านอาหารที่ย่านการค้าเทพเต่าดำจะ\nเปิดขายเมนูราเม็งสูตรใหม่นี่นา"
20006-200060250 = "คุณครู! วันหยุดอาทิตย์นี้ไปกิน\nราเม็งอร่อยๆ ที่ย่านการค้าด้วยกันนะ!"
20006-200060260 = "แล้วเมื่อกี้จะถามครูทำไม..."
20006-200060270 = "อะ... อือ..."
20006-200060280 = "เกิดอะไรขึ้นงั้นเหรอ"
20006-200060290 = "ซอสเผ็ดสูตรพิเศษที่ฉันคิดค้นขึ้น\nคราวที่แล้วมันขายดีกว่าที่คิดเอาไว้..."
20006-200060300 = "เพราะมัวแต่เอาเวลาไปทำซอสสูตร\nพิเศษเลยทำให้ฉันมีเวลาวิจัยไม่พอแล้ว"
20006-200060310 = "ให้ตายสิ พวกคนอื่นคิดว่าชมรม\nวิจัยศาสตร์การปรุงยาเป็นอะไรกันแน่เนี่ย?"
20006-200060320 = "ชมรมวิจัยศาสตร์การปรุงยาเป็นชมรม\nสำหรับวิจัยยาอายุวัฒนะต่างหาก ไม่ใช่\nชมรมคิดค้นสูตรซอสสักหน่อย!"
20006-200060330 = "ช่วงนี้งานยุ่งมากๆ จนอยากจะให้\nเนสึซึเกะมาช่วยเลยละ..."
20006-200060340 = "เดี๋ยวนะ ถ้าเกิดว่าใช้วิธีนั้นละก็..."
20006-200060350 = "ห้ามเด็ดขาดนะ"
20006-200060360 = "หืม? ยังไม่ได้พูดอะไรสักหน่อย"
20006-200060370 = "ครูไม่รู้หรอกว่าซายะคิดจะทำอะไร\nแต่ไม่ได้เด็ดขาด"
20006-200060380 = "ชิ ทำอย่างกับอ่านใจฉันได้เลยนะ"
20006-200060390 = "อะแฮ่ม!"
20006-200060400 = "มีข่าวดีละ"
20006-200060410 = "ในที่สุด..."
20006-200060420 = "ก็มีคนรับรู้ถึงความอัจฉริยะของ\nท่านซายะผู้นี้แล้ว!"
20006-200060430 = "โอ้ มีอะไรน่ะ?"
20006-200060440 = "มีใครมาขอให้ช่วยอะไรเหรอ?"
20006-200060450 = "ก็แบบนั้นแหละ"
20006-200060460 = "ไหนๆ ก็มีงานเข้ามาแล้ว ครูเองก็มา\nที่นี่ด้วยสิ!"
20006-200060470 = "จงมาดูสิ่งประดิษฐ์ของท่านซายะผู้นี้!"
20006-200060480 = "อึก..."
20006-200060490 = "พอมาคิดดูแล้ว ใส่หน้ากากกันพิษ\nเอาไว้ด้วยดีกว่า"
20006-200060500 = "มันเป็นน้ำหอมก็เลยประมาทไปหน่อย..."
20006-200060510 = "คนอย่างท่านซายะกลับทำพลาด\nแบบนี้ซะได้..."
20006-200060520 = "แต่ก็นะ เพราะแบบนั้นทุกคนเลย\nได้สนุกกันใหญ่เลยนี่นา"
20006-200060530 = "ที่งานประสบความสำเร็จแบบนี้\nก็เพราะซายะเลยนะ"
20006-200060540 = "ฮื่อออ"
20006-200060550 = "มันก็แหงอยู่แล้วสิ! นี่ท่านซายะเชียวนะ!"
20006-200060560 = "อืม"
20006-200060570 = "ว่าแต่ว่า..."
20006-200060580 = "ครู"
20006-200060590 = "ขอบคุณมากเลยนะ"
20006-200060600 = "คราวหน้าก็ไปด้วยกันอีกนะ!"

[translation]
20006-200060010 = "선생, 이번 주 휴일에 시간 괜찮아?"
20006-200060020 = "또 이상한 약을 먹이려는 거야?"
20006-200060030 = "이번 주말은 봐줘……."
20006-200060040 = "그런 거 아니거든!"
20006-200060050 = "전에 선생이 가고 싶다고 했던 중화요리집이 이번 주말부터 신메뉴를 내놓는다고 해서 알려주려 했던 것이다!"
20006-200060060 = "모처럼 신경을 써 주었더니, 나님의 호의를 그런 눈으로 보다니……"
20006-200060070 = "미안. 이번 휴일은 시간 괜찮아."
20006-200060080 = "대신 사과의 의미로 내가 한턱낼게."
20006-200060090 = "정말? 그 말, 잊으면 안 되는 것이다!"
20006-200060100 = "그럼 이번 주말에 전에 말했던 가게 앞에서 보자!"
20006-200060110 = "후우…… 천재의 삶이란 정말 고독한 것이다."
20006-200060120 = "아무리 설명하려 해도 범인들은 이해해 주질 않으니……."
20006-200060130 = "무슨 문제라도 있어?"
20006-200060140 = "어, 그러니까……."
20006-200060150 = "아니, 아무것도 아니다!"
20006-200060160 = "나님 혼자서도 충분히 해결할 수 있는 문제인 것이다!"
20006-200060170 = "산해경 제일의 수재인 나님에게 불가능이란 없으니까! 음-하-하-핫!"
20006-200060180 = "……뭔가 수상한데."
20006-200060190 = "선생. 지난번에는 한정 메뉴 사는 걸 도와줘서 고마웠던 것이다."
20006-200060200 = "답례의 의미로 이번에는 나님이 현무상회에서 맛있는 음식을 살게."
20006-200060210 = "선생은 뭐가 먹고 싶은 것이냐?"
20006-200060220 = "볶음밥이 좋겠어."
20006-200060230 = "야키소바가 먹고 싶어!"
20006-200060240 = "아, 그러고 보니 이번 주는 현무상회의 가게들이 새로 개발한 라멘 메뉴를 내놓는 라멘 주간인데…"
20006-200060250 = "선생! 이번 휴일은 현무상회에서 함께 라멘을 먹는 것이다!"
20006-200060260 = "……내 의견은 왜 물어본 거야?"
20006-200060270 = "으으, 으으으……."
20006-200060280 = "무슨 문제라도 있어?"
20006-200060290 = "지난번에 개발한 특제 매운 소스가 생각 외로 큰 인기를 끄는 바람에……"
20006-200060300 = "특제 소스를 만드느라 연구할 시간이 부족해진 것이다……"
20006-200060310 = "정말이지, 다들 연단방을 무어라고 생각하는 것이냐?"
20006-200060320 = "연단방은 불로불사의 영약을 만드는 곳이지, 소스를 만드는 곳이 아니라고!"
20006-200060330 = "너무 바쁘다 보니 최근에는 네즈스케의 손이라도 빌리고 싶어질 정도니……"
20006-200060340 = "잠깐. 만약 그 방법을 사용하면……."
20006-200060350 = "안 돼."
20006-200060360 = "응? 나님은 아직 아무 말도 하지 않았다만."
20006-200060370 = "무얼 하려는지는 모르겠지만 안 돼."
20006-200060380 = "쳇, 눈치 하난 빠르긴……."
20006-200060390 = "흠흠!"
20006-200060400 = "좋은 일이다."
20006-200060410 = "드디어 나님의 천재성을"
20006-200060420 = "알아봐 주는 사람들이 생긴 것이다!"
20006-200060430 = "오, 무슨 일이야?"
20006-200060440 = "무슨 부탁이라도 받았어?"
20006-200060450 = "그런 것이다."
20006-200060460 = "모처럼의 일이니, 선생도 오는 것이다!"
20006-200060470 = "함께 나님의 발명품을 지켜보도록!"
20006-200060480 = "크윽"
20006-200060490 = "생각해 보니, 방독면을 썼어야 했던 것이다"
20006-200060500 = "향수라고 방심해 버리다니"
20006-200060510 = "나님 정도 되는 사람이 이런 실수를……."
20006-200060520 = "그래도 덕분에 모두가 즐거웠잖아."
20006-200060530 = "행사는 대성공이었는걸. 사야 덕분이야."
20006-200060540 = "흥"
20006-200060550 = "그건 당연한 것이다! 나님이니까!"
20006-200060560 = "음"
20006-200060570 = "그래도"
20006-200060580 = "선생"
20006-200060590 = "정말 고맙다."
20006-200060600 = "다음에 또 함께하는 것이다!"

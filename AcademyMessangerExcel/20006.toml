[translation]
20006-200060010 = "老師，這個週末有時間嗎？"
20006-200060020 = "這次是什麼實驗？"
20006-200060030 = "別再叫我喝奇怪的藥了……"
20006-200060040 = "不是不是，不是那樣！"
20006-200060050 = "我只是想告訴老師，上次老師說的中華料理店聽說有新菜色！"
20006-200060060 = "所有事情都往實驗去想，真讓人心寒！"
20006-200060070 = "抱歉抱歉，那麼就當作小小的賠罪"
20006-200060080 = "我請客，一起去吧"
20006-200060090 = "真的嗎？事到如今不能反悔唷！？"
20006-200060100 = "那就這週末，在店的前面碰面！"
20006-200060110 = "天才是孤獨的……"
20006-200060120 = "無論怎麼說明，也不被理解……"
20006-200060130 = "怎麼了嗎？"
20006-200060140 = "啊，對了，老師"
20006-200060150 = "不，沒有，沒事！"
20006-200060160 = "這是我自己就能解決的問題！"
20006-200060170 = "對我這個山海經首屈一指的天才來說，沒有什麼不可能的！哇哈哈哈！"
20006-200060180 = "……？"
20006-200060190 = "老師，上次蛋糕的事謝謝了"
20006-200060200 = "作為回禮，這次我在玄武商會請你吃好吃的！"
20006-200060210 = "老師有什麼想吃的嗎？"
20006-200060220 = "想吃炒飯！"
20006-200060230 = "想吃炒麵！"
20006-200060240 = "啊，這麼說來，這週是玄武商會的商家，接二連三推出新款拉麵的「拉麵週」！"
20006-200060250 = "老師！正好有我推薦的店，去那裡吧！"
20006-200060260 = "那還需要我的意見……？"
20006-200060270 = "我受不了了……"
20006-200060280 = "怎麼了？"
20006-200060290 = "之前開發的特製超辣醬比想像中還要受歡迎……"
20006-200060300 = "結果占用了我大量的時間，根本沒空進行研究"
20006-200060310 = "受不了……"
20006-200060320 = "鍊丹術研究會的目的是「製作長生不老的靈藥」，不是製作醬料的地方！"
20006-200060330 = "現在連根津助的手都想借來用了……"
20006-200060340 = "我想到一個好主意！"
20006-200060350 = "最好不要"
20006-200060360 = "我什麼都還沒說耶！？"
20006-200060370 = "總有個不好的預感……"
20006-200060380 = "呿，沒辦法……乖乖做醬料吧……"
20006-200060390 = "哼哼哼！"
20006-200060400 = "發生了一件好事"
20006-200060410 = "終於有人慧眼識英雄"
20006-200060420 = "看出我的天縱英才了！"
20006-200060430 = "哦？怎麼說呢？"
20006-200060440 = "收到什麼委託了嗎？"
20006-200060450 = "正是如此！"
20006-200060460 = "難得有這種機會，希望老師也能過來一趟！"
20006-200060470 = "一起見證我的發明吧！"
20006-200060480 = "嗚嗚……"
20006-200060490 = "仔細想想，當時應該戴著防毒面具才對"
20006-200060500 = "以為只是香水就掉以輕心……"
20006-200060510 = "沒想到我竟然也會犯下這種失誤"
20006-200060520 = "不過大家都很開心"
20006-200060530 = "託沙耶的福，活動非常成功哦"
20006-200060540 = "哼哼"
20006-200060550 = "那是當然！畢竟是我的發明啊！"
20006-200060560 = "嗯"
20006-200060570 = "對了"
20006-200060580 = "老師"
20006-200060590 = "今天真的很謝謝你"
20006-200060600 = "期待我的下一個發明吧！"

[translation]
10103-101030010 = "Sensei...?"
10103-101030020 = "Hi, Marina. What's up?"
10103-101030030 = "I'm at this place called Black Tortoise Promenade in Shanhaijing."
10103-101030040 = "I've found myself in a...troublesome situation."
10103-101030050 = "It's rather shameful, but I require your assistance."
10103-101030060 = "I'll be right there!"
10103-101030070 = "Maybe I ate too much, but..."
10103-101030080 = "...my stomach hurts."
10103-101030090 = "...Are you okay?"
10103-101030100 = "I've learned one thing for certain."
10103-101030110 = "A food's appearance does not necessarily correlate with its taste."
10103-101030120 = "You know, they only sell those bug skewers to tourists."
10103-101030130 = "Why would you wait until now to bring that up?!"
10103-101030140 = "Where are you?"
10103-101030150 = "I've arrived."
10103-101030160 = "Sorry, Marina! I'm running a little late! Just five minutes!"
10103-101030170 = "By that much is fine."
10103-101030180 = "I will wait for you at the plaza."
10103-101030190 = "...What a troublesome experience."
10103-101030200 = "But you looked really good!"
10103-101030210 = "Even if it's just empty words, you shouldn't speak like that."
10103-101030220 = "...And your infraction is even worse if they weren't empty words."
10103-101030230 = "I'm already receiving messages from various sources, saying they liked the photo album..."
10103-101030240 = "Just to confirm, you didn't purchase it, did you?"
10103-101030250 = "..."
10103-101030260 = "Wait. What's with that \"dot, dot, dot\"?!"
10103-101030270 = "Sensei?"
10103-101030280 = "Sensei?!?!"
10103-101030290 = "What is the name of the teahouse we intend to visit today?"
10103-101030300 = "I think it was Peach Blossom Spring."
10103-101030310 = "Right."
10103-101030320 = "I'm curious just how delicious Shanhaijing's tea truly is."
10103-101030330 = "Hm. I'm looking forward to it."

[translation]
10103-101030010 = "คุณครู...?"
10103-101030020 = "โอ้ มารินะเหรอเนี่ย มีอะไรเหรอ?"
10103-101030030 = "ตอนนี้ฉันอยู่ที่ย่านการค้าเทพเต่าดำ\nของซานไห่จิงน่ะ"
10103-101030040 = "มีเรื่องน่าตกใจเกิดขึ้นนิดหน่อย"
10103-101030050 = "ถึงมันจะน่าอาย แต่ฉันอยากขอให้ช่วย\nสักหน่อย..."
10103-101030060 = "ครูจะไปหาเดี๋ยวนี้แหละ!"
10103-101030070 = "เป็นเพราะกินเยอะเกินรึเปล่านะ..."
10103-101030080 = "รู้สึกเหมือนจะปวดท้องชอบกล..."
10103-101030090 = "เป็นอะไรรึเปล่า...?"
10103-101030100 = "แต่มีสิ่งหนึ่งที่ฉันได้เรียนรู้มาแล้วละ"
10103-101030110 = "หน้าตาของอาหาร ไม่เหมือนกับรสชาติ\nของมันเสมอไป"
10103-101030120 = "ได้ยินว่าแมลงเสียบไม้นั่นจะขายให้\nเฉพาะนักท่องเที่ยวด้วยน่ะ"
10103-101030130 = "ทำไมถึงเพิ่งมาบอกกันเล่า!"
10103-101030140 = "ถึงไหนแล้วน่ะ?"
10103-101030150 = "ฉันมาถึงแล้วนะ"
10103-101030160 = "โทษที มารินะ! ครูน่าจะไปถึงช้าสัก\n5 นาทีนะ!"
10103-101030170 = "แค่นั้นไม่เป็นไรหรอก"
10103-101030180 = "งั้นฉันจะรออยู่ที่จัตุรัสนะ"
10103-101030190 = "เป็นประสบการณ์สุดช็อกจริงๆ"
10103-101030200 = "แต่ก็เข้ากันได้ดีเลยนะ"
10103-101030210 = "ถึงคุณครูจะพูดแบบขอไปที ฉันหวังว่า\nคุณครูจะไม่พูดแบบนั้นอีกนะ"
10103-101030220 = "ถ้าไม่ได้พูดแบบขอไปทีจะยิ่งแย่\nเข้าไปใหญ่..."
10103-101030230 = "หลายๆ คนโทรมาบอกว่าพวกเขา\nชอบโฟโต้บุ๊คกันมากๆ เลยน่ะ..."
10103-101030240 = "ฉันแค่ถามเฉยๆ นะ คุณครูคงไม่ได้ซื้อ\nมาหรอกใช่มั้ย?"
10103-101030250 = "......"
10103-101030260 = "เดี๋ยวก่อน ส่งแต่จุดมาแบบนั้น\nหมายความว่าไง?"
10103-101030270 = "ครู?"
10103-101030280 = "คุณครู?!?!"
10103-101030290 = "ร้านน้ำชาที่เราจะไปวันนี้ชื่ออะไรนะ?"
10103-101030300 = "น่าจะร้านนิทานดอกท้อนะ"
10103-101030310 = "ใช่แล้วละ"
10103-101030320 = "ชาของซานไห่จิงจะรสชาติยังไงนะ"
10103-101030330 = "อืม ฉันคาดหวังมากเลยนะ"

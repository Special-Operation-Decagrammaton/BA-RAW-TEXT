[translation]
10103-101030010 = "선생……?"
10103-101030020 = "오. 마리나다. 무슨 일이야?"
10103-101030030 = "지금, 산해경의 현무상회라는 곳에 와 있는데."
10103-101030040 = "약간 당혹스러운 일이 생겨서 말이다."
10103-101030050 = "민망하지만, 조금, 도움을 청하고 싶어서……."
10103-101030060 = "금방 갈게!"
10103-101030070 = "과식한 탓인가……."
10103-101030080 = "뭔가, 배가 아픈 것 같군……"
10103-101030090 = "……괜찮아?"
10103-101030100 = "한 가지는 확실하게 배운 것 같다."
10103-101030110 = "음식의 겉모양이, 반드시 맛과 일치하지 않는다는 것을."
10103-101030120 = "그 벌레 꼬치 말인데, 관광객한테만 파는 거래."
10103-101030130 = "왜 그런 말을 지금 해 주는 건가!"
10103-101030140 = "어디까지 왔지?"
10103-101030150 = "나는 지금 도착했다."
10103-101030160 = "미안, 마리나! 5분 정도 늦을 것 같아!"
10103-101030170 = "그 정도야 아무것도 아니지."
10103-101030180 = "광장에서 기다리고 있겠다."
10103-101030190 = "……당혹스러운 경험이었어."
10103-101030200 = "그래도 상당히 잘 어울렸어."
10103-101030210 = "빈말이라도 그런 말은 하지 말아 주었으면 하는데."
10103-101030220 = "……빈말이 아니라면, 더 나쁘고."
10103-101030230 = "벌써부터 여기저기에서, 사진집 잘 봤다는 연락이 들어오고 있으니까……."
10103-101030240 = "혹시나 해서 묻는 건데, 선생은 사지 않았겠지?"
10103-101030250 = "……."
10103-101030260 = "잠깐. 그 말줄임표는 뭐지?"
10103-101030270 = "선생?"
10103-101030280 = "선생?!?!"
10103-101030290 = "오늘 가기로 한 찻집 이름이 뭐였지?"
10103-101030300 = "도원향이었을걸."
10103-101030310 = "그랬었지."
10103-101030320 = "산해경의 차는 어떨까."
10103-101030330 = "음. 제법 기대가 되는군."

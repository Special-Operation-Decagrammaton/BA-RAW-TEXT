[translation]
10103-101030010 = "老師……？"
10103-101030020 = "瑪麗娜，怎麼了嗎？"
10103-101030030 = "我現在在山海經一個叫做「玄武商會」的地方"
10103-101030040 = "遇到了一些困難"
10103-101030050 = "雖然有點難為情，希望能請老師幫個忙……"
10103-101030060 = "我馬上過去！"
10103-101030070 = "不知道是不是吃太多的關係……"
10103-101030080 = "肚子好像有點痛……"
10103-101030090 = "……還好嗎？"
10103-101030100 = "我切身學到了一件事"
10103-101030110 = "那就是食物的外觀，未必與味道相符"
10103-101030120 = "聽說那些炸蟲串，好像是專門賣給觀光客的"
10103-101030130 = "這種事為什麼現在才說！"
10103-101030140 = "老師到哪裡了？"
10103-101030150 = "我已經到囉"
10103-101030160 = "抱歉，瑪麗娜！我可能會遲到5分鐘！"
10103-101030170 = "這點小事不算什麼"
10103-101030180 = "我在廣場等你"
10103-101030190 = "……真是個令人頭痛的經歷"
10103-101030200 = "不過真的很適合你哦"
10103-101030210 = "就算是客套話，也請別這麼說"
10103-101030220 = "……如果不是客套話就更糟了"
10103-101030230 = "已經有一堆人聯絡我，說看過那本寫真集了……"
10103-101030240 = "以防萬一確認一下，老師應該沒有買吧？"
10103-101030250 = "……"
10103-101030260 = "等一下，這個沉默是什麼意思？"
10103-101030270 = "老師"
10103-101030280 = "老師！？！？"
10103-101030290 = "今天約好要去的茶館叫什麼名字？"
10103-101030300 = "應該是桃源鄉吧"
10103-101030310 = "啊啊，確實是這個名字沒錯"
10103-101030320 = "不知道山海經的茶味道怎麼樣"
10103-101030330 = "嗯，真令人期待"

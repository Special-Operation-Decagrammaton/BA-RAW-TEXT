[translation]
20020-200200010 = "후후, 안녕하세요. 선생님."
20020-200200020 = "응…?"
20020-200200030 = "어머, 제 연락에 감격한 나머지, 말문이 막힌 선생님의 반응."
20020-200200040 = "네, 전부 이해한답니다."
20020-200200050 = "저 같은 천재 미소녀에게 갑작스레 메시지를 받는다면 누구라도…."
20020-200200060 = "저기, 누구세요?"
20020-200200070 = "네…? 선생님. 설마라고는 생각하지만, 제 연락처를 등록조차 하지 않으셨다는…?"
20020-200200080 = "아니, 미안, 농담이야. 히마리."
20020-200200090 = "후, 후훗…. 선생님께서도 참, 그런 짓궂은 농담이시라니."
20020-200200100 = "저 같은 천재 미소녀조차 잠시나마 <깜놀> 했답니다?"
20020-200200110 = "깜놀이라니, 히마리도 그런 유행어를 쓰는구나…."
20020-200200120 = "이래봬도 저는 베리타스의 부장도 겸하고 있는 몸이기에, 인터넷 문화라면 다소 교양이 있으니까요."
20020-200200130 = "이럴 때는, 그렇죠. <의기양양한 얼굴>! 이란 걸 짓는 법이라고 했던가요?"
20020-200200140 = "아, 응…."
20020-200200150 = "엣-헴 어쨌거나 용건을 말씀드리자면, 그렇지요."
20020-200200160 = "사전에 샬레를 해킹…이 아니라, 조사를 해본 결과."
20020-200200170 = "오늘 선생님께선 모처럼의 휴일이라고 알고 있는데, 맞을까요?"
20020-200200180 = "자연스럽게 해킹이라고 했어…."
20020-200200190 = "그야 그렇기는 한데…."
20020-200200200 = "후후, 마침 잘되었네요."
20020-200200210 = "제가 지금 있는 장소의 좌표를 보내 드릴 터이니"
20020-200200220 = "그럼 밀레니엄에서 기다리고 있겠습니다. 선생님."
20020-200200230 = "가는 건 이미 결정이구나…. 뭐어, 알았어."
20020-200200240 = "선생님, 오늘은 샬레의 업무로 인해 밀레니엄을 방문하신다면서요?"
20020-200200250 = "아, 응. 그렇게 됐는데."
20020-200200260 = "그럼 볼일이 끝나시면, 오후 3시쯤 해서 잠깐 저를 찾아와 주실 수 있겠나요?"
20020-200200270 = "부탁드리고 싶은 것이 조금 있어서……."
20020-200200280 = "알았어. 일 끝나고 바로 갈게."
20020-200200290 = "후후후, 네, 그럼 조금 이따가 뵙겠습니다."
20020-200200300 = "선생님. 조금 큰일이 나버린 듯해요."
20020-200200310 = "뭐? 무슨 일이야?! 히마리, 괜찮은 거야?!"
20020-200200320 = "이건, 저 혼자선 도저히 방법이 없다고 할지."
20020-200200330 = "어서 은신처로 찾아와 주세요. 기다리고 있겠습니다."
20020-200200340 = "선생님, 저 오늘, 특별한 보물을 손에 넣었답니다."
20020-200200350 = "히마리가 보물이라고 말할 정도라니……."
20020-200200360 = "뭔가 궁금하기도 하고, 걱정되기도 하고……."
20020-200200370 = "어머나, 그렇게 말씀하시다니, 조금 슬퍼라."
20020-200200380 = "이럴 게 아니라, 직접 보여드리고 싶으니, 괜찮으시다면."
20020-200200390 = "응, 오늘 찾아갈게."
20020-200200400 = "후후, 네. 그럼 조금 이따가."

[translation]
20020-200200010 = "Heehee. Hello, Sensei!"
20020-200200020 = "What?"
20020-200200030 = "Aw, you've been rendered speechless by my touching efforts to reach out to you!"
20020-200200040 = "As usual, I understand completely."
20020-200200050 = "Anyone would react like that if they received a message from a beautiful super genius such as myself..."
20020-200200060 = "Sure. By the way, have we met?"
20020-200200070 = "...Seriously? Sensei, did you really not even save my contact information...?"
20020-200200080 = "Haha, I'm just kidding. Sorry, Himari."
20020-200200090 = "Heh, haha... Sensei, you should know better. There are some things that simply aren't laughing matters."
20020-200200100 = "I mean, I may be a beautiful super genius, but even I was shook!"
20020-200200110 = "I didn't realize you used words like that, Himari..."
20020-200200120 = "Well, as the president of Veritas, I'm quite knowledgeable of all aspects of internet culture."
20020-200200130 = "I am absolutely slaying at knowing things."
20020-200200140 = "Yeah, sure..."
20020-200200150 = "Anyway, to get to the point..."
20020-200200160 = "After hacking... I mean, after asking around... "
20020-200200170 = "It's come to my attention that today is your day off, Sensei, correct?"
20020-200200180 = "Hold up, what exactly did you hack?"
20020-200200190 = "It is, but about how you knew that..."
20020-200200200 = "Heehee. Don't worry, it all worked out."
20020-200200210 = "I'm sending you my location right now."
20020-200200220 = "I'll be waiting for you, Sensei."
20020-200200230 = "I suppose you've already decided for me... Well, all right then."
20020-200200240 = "Sensei, I hear that you're visiting Millennium on Schale business today. Is that true?"
20020-200200250 = "So it seems."
20020-200200260 = "In that case, could you come by to see me at three in the afternoon once you're done?"
20020-200200270 = "There's something I need to ask of you..."
20020-200200280 = "Okay. I'll come over as soon as I'm done."
20020-200200290 = "Heeheehee! Okay! Looking forward to it!"
20020-200200300 = "Sensei. There's been an incident."
20020-200200310 = "An incident? What happened?! Himari, are you okay?!"
20020-200200320 = "It's just... It's not something I can handle on my own."
20020-200200330 = "Please, come to my hideout. I'll be waiting."
20020-200200340 = "Sensei, today marks the day that I, Akeboshi Himari, have come into possession of a tremendous treasure."
20020-200200350 = "For you to describe it as a treasure, Himari... It must really be something, huh?"
20020-200200360 = "I am as curious as I am concerned."
20020-200200370 = "Aw, come on, don't say it like that."
20020-200200380 = "Oh, I know! I'd love to show it to you in person, so..."
20020-200200390 = "Say no more. I'll come by you today."
20020-200200400 = "Heehee! Okay! Until then."

[translation]
20020-200200010 = "呵呵。您好，老師"
20020-200200020 = "嗯？"
20020-200200030 = "哎呀。收到我的聯絡，感動到說不出話來了呢"
20020-200200040 = "嗯，這是理所當然的"
20020-200200050 = "畢竟是我這種天才美少女突然傳訊息來嘛"
20020-200200060 = "不好意思，請問是哪位？"
20020-200200070 = "咦？難道老師您沒有把我加入聯絡人……？"
20020-200200080 = "抱歉。我是開玩笑的，陽葵"
20020-200200090 = "「嚇鼠」我了……老師真是的，居然開這種壞心眼的玩笑"
20020-200200100 = "連我這個天才美少女都嚇到了"
20020-200200110 = "陽葵也會用「嚇鼠」這種流行語啊……"
20020-200200120 = "畢竟我也兼任貝里塔斯的部長，多少熟悉一些網路文化"
20020-200200130 = "這種時候就該……用「得意表情」說話對吧"
20020-200200140 = "確，確實……"
20020-200200150 = "比起那個，我有話想說"
20020-200200160 = "根據之前對夏萊的駭入……不對，是調查"
20020-200200170 = "今天應該是休假沒錯吧？"
20020-200200180 = "你把駭入說出來了……"
20020-200200190 = "雖然確實是休假沒錯……"
20020-200200200 = "呵呵，那正好"
20020-200200210 = "稍後會把座標傳給您"
20020-200200220 = "我在千年等您哦，老師"
20020-200200230 = "已經決定我要去了啊……我這就過去"
20020-200200240 = "老師，今天會因為夏萊的工作到千年來對吧"
20020-200200250 = "嗯，是這樣沒錯"
20020-200200260 = "那麼可以麻煩您在辦完事情之後……大約下午3點過來一趟嗎？"
20020-200200270 = "我有件事想請您幫忙……"
20020-200200280 = "我知道了。工作結束後馬上過去"
20020-200200290 = "呵呵，那麼待會見"
20020-200200300 = "老師，事情似乎變得有點嚴重"
20020-200200310 = "怎麼了？還好嗎！？"
20020-200200320 = "該說我一個人實在無能為力嗎……"
20020-200200330 = "能現在立刻到藏身地來嗎？我等您"
20020-200200340 = "老師。我得到了不得了的寶物"
20020-200200350 = "居然連陽葵都說是寶物……"
20020-200200360 = "有點好奇又有點擔心……"
20020-200200370 = "哎呀，真是讓人難過的說法呢"
20020-200200380 = "現在不是說這些的時候。我想盡快讓老師看看"
20020-200200390 = "知道了。我現在就過去哦"
20020-200200400 = "呵呵，待會見"

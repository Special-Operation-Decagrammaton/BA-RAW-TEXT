[translation]
20020-200200010 = "ฮุฮุ สวัสดีค่ะคุณครู"
20020-200200020 = "หืม...?"
20020-200200030 = "ตายจริง คุณครูอึ้งที่ฉันติดต่อมา\nจนพูดไม่ออกเลยงั้นเหรอคะ"
20020-200200040 = "แต่ก็เข้าใจได้นะคะ"
20020-200200050 = "ถ้าได้รับข้อความจากสาวน้อยอัจฉริยะ\nอย่างฉัน ไม่ว่าใครก็คงจะต้องตกใจ..."
20020-200200060 = "คือว่า... ใครน่ะ?"
20020-200200070 = "คะ...? คุณครู ฉันคิดว่าอาจเกิดเรื่อง\nแบบนี้ไว้ก็จริง แต่ว่า... คุณครูไม่ได้\nเมมเบอร์ฉันเอาไว้จริงเหรอคะ?"
20020-200200080 = "เปล่าๆ โทษทีๆ\nครูแค่ล้อเล่นน่ะ ฮิมาริ"
20020-200200090 = "ฮุฮุฮุ... คุณครู ล้อเล่นกันแรง\nจริงๆ เลยนะคะ"
20020-200200100 = "แม้แต่สาวน้อยอัจฉริยะอย่างฉัน\nยังตกใจเกือบ \"ตุย\" เลยนะคะ"
20020-200200110 = "\"ตุย\" งั้นเหรอ ฮิมาริก็ใช้คำ\nอินเทรนด์ด้วยเหรอเนี่ย"
20020-200200120 = "เห็นแบบนี้ ฉันก็เป็นหัวหน้าชมรม\nเวอริทัสนะคะ ถ้าเป็นเรื่องในโลก\nอินเทอร์เน็ต ฉันก็รู้แน่นอนค่ะ"
20020-200200130 = "ในเวลาแบบนี้ คงจะต้องทำสีหน้า\nแบบ <อรุ่มเจ๊าะ> ใช่มั้ยคะ?"
20020-200200140 = "อะ...อื้อ"
20020-200200150 = "อะแฮ่ม ถ้างั้นฉันขอเข้าเรื่องเลย\nแล้วกันนะคะ"
20020-200200160 = "จากที่แฮ็กระบบ... มะ...ไม่ใช่ค่ะ\nจากการตรวจสอบข้อมูลของชาเล่ต์ "
20020-200200170 = "วันนี้เป็นวันหยุดของคุณครู\nใช่รึเปล่าคะ?"
20020-200200180 = "พูดคำว่าแฮ็กได้เป็นธรรมชาติเลยนะ..."
20020-200200190 = "ก็ใช่อยู่หรอกนะ..."
20020-200200200 = "ฮุฮุ พอดีเลยนะคะ"
20020-200200210 = "ฉันจะส่งโลเคชั่นสถานที่ที่ฉันอยู่ไป\nให้นะคะ"
20020-200200220 = "ฉันจะรอนะคะ คุณครู"
20020-200200230 = "บังคับให้ไปสินะ\nอื้อ เข้าใจแล้วละ"
20020-200200240 = "คุณครูคะ ได้ยินว่าวันนี้มาทำธุระ\nของชาเล่ต์ที่มิลเลเนียมเหรอคะ?"
20020-200200250 = "อื้อ ใช่แล้ว"
20020-200200260 = "ถ้างั้นหลังจากเสร็จธุระแล้ว ตอนบ่าย\nสามโมงช่วยแวะมาหาหน่อยได้มั้ยคะ?"
20020-200200270 = "ฉันมีเรื่องที่จะขอร้องคุณครูน่ะค่ะ..."
20020-200200280 = "เข้าใจแล้ว เสร็จงานแล้วจะไปหานะ"
20020-200200290 = "ฮิฮิฮิ ค่ะ ถ้างั้นฉันจะรอนะคะ"
20020-200200300 = "คุณครู เกิดเรื่องใหญ่แล้วค่ะ"
20020-200200310 = "อะไรเหรอ? มีเรื่องอะไรน่ะ?!\nฮิมาริ เป็นอะไรรึเปล่า?"
20020-200200320 = "เรื่องนี้... ฉันคงจัดการคนเดียวไม่ได้"
20020-200200330 = "ช่วยรีบมาที่ที่ซ่อนด้วยค่ะ\nฉันจะรออยู่ที่นั่นค่ะ"
20020-200200340 = "คุณครู วันนี้ฉันได้สมบัติพิเศษมา\nอีกหนึ่งชิ้นแล้วค่ะ"
20020-200200350 = "ขนาดฮิมาริยังเรียกว่าสมบัติ\nเลยเหรอเนี่ย..."
20020-200200360 = "ครูชักสงสัยปนกังวลแล้วสิ..."
20020-200200370 = "ตายจริง พูดอะไรกันคะ\nพูดแบบนี้ฉันเสียใจนะคะ"
20020-200200380 = "ถ้าคุณครูสะดวก ฉันก็อยากให้คุณครู\nได้เห็นสมบัติชิ้นนี้ค่ะ"
20020-200200390 = "อืม เดี๋ยวครูไปหาแล้วกัน"
20020-200200400 = "ฮุฮุ ได้เลยค่ะ ถ้างั้นเดี๋ยวพบกันนะคะ"

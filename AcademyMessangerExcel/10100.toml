[translation]
10100-101000010 = "นี่มันแค่ข้อความทดสอบระบบนะ"
10100-101000020 = "อ่า"
10100-101000030 = "อ่าๆ"
10100-101000040 = "เห็นหรือเปล่า? สัญญาณส่งไปถึง\nหรือเปล่านะ?"
10100-101000050 = "อื้อ สัญญาณโอเคนะ ชิโรโกะ"
10100-101000060 = "อืม"
10100-101000070 = "งั้นเหรอ ค่อยยังชั่วหน่อย"
10100-101000080 = "งั้นไว้ฉันจะติดต่อไปใหม่"
10100-101000090 = "เดี๋ยวก่อน ตอนนี้ชิโรโกะอยู่ที่ไหนน่ะ?"
10100-101000100 = "ฉันเหรอ?"
10100-101000110 = "อยู่ที่เขตปกครองอะบิดอสน่ะ"
10100-101000120 = "งั้นมาเจอกันหน่อยสิ!!"
10100-101000130 = "อื้ม..."
10100-101000140 = "ไม่มีปัญหา"
10100-101000150 = "แล้วฉันจะรอนะ"
10100-101000160 = "อื้อ รอได้เลย!"
10100-101000170 = "ผงซักฟอก นม 500 มล. ไข่แพ็กเล็ก\nทิชชู่ ผ้าเช็ดหน้า"
10100-101000180 = "ครีมอาบน้ำ < ของจำเป็น"
10100-101000190 = "หืม...?"
10100-101000200 = "ชิโรโกะ?"
10100-101000210 = "อ่า"
10100-101000220 = "ฉันส่งผิดน่ะ ขอโทษนะคุณครู"
10100-101000230 = "คุณครู"
10100-101000240 = "ฉันนึกไอเดียดีๆ ได้แล้วละ"
10100-101000250 = "ช่วยมาที่นี่หน่อยสิ"
10100-101000260 = "ไม่ค่อยเข้าใจหรอกนะ\nแต่ครูจะไปเดี๋ยวนี้ละ!"
10100-101000270 = "อ่า อื้ม"
10100-101000280 = "คือว่า..."
10100-101000290 = "มาเจอกันแล้วจะอธิบายให้ฟังนะ"
10100-101000300 = "คุณครู เกิดเรื่องใหญ่แล้วละ..."
10100-101000310 = "ฉันลองเอาชุดปั่นจักรยานที่มีมา\nลองใส่ดู"
10100-101000320 = "แต่ว่าซิปมัน..."
10100-101000330 = "เอ๊ะ...?!"
10100-101000340 = "อ่า"
10100-101000350 = "ขอบอกไว้ก่อนนะเผื่อจะเข้าใจผิด"
10100-101000360 = "ฉันไม่ได้อ้วนขึ้น"
10100-101000370 = "อืม ถ้างั้น..."
10100-101000380 = "......"
10100-101000390 = "ฝันดีนะคุณครู"
10100-101000400 = "คุณครู"
10100-101000410 = "ถ้าพอมีเวลาว่าง"
10100-101000420 = "มาเจอกันหน่อยได้มั้ย?"
10100-101000430 = "มีเรื่องอะไรเหรอ ชิโรโกะ?"
10100-101000440 = "อื้อ"
10100-101000450 = "มีเรื่องกังวลอยากปรึกษาน่ะ..."
10100-101000460 = "เข้าใจแล้ว!"
10100-101000470 = "อื้อ ขอบคุณนะ"
10100-101000480 = "แข่งเสร็จแล้วละ"
10100-101000490 = "แข่งอะไร...?!"
10100-101000500 = "อ่า..."
10100-101000510 = "อื้อ จู่ๆ มัน..."
10100-101000520 = "กลายเป็นการแข่งขันจักรยาน\nประเภทถนนไปซะแล้ว..."
10100-101000530 = "การแข่งขันจักรยานประเภทถนน?!"
10100-101000540 = "แล้วใครชนะล่ะ?!"
10100-101000550 = "ผลการแข่งขัน..."
10100-101000560 = "แข่งกัน 12 ครั้ง ชนะ 4 แพ้ 7 เสมอ 1"
10100-101000570 = "ฉันเป็นฝ่ายแพ้ละ"
10100-101000580 = "นักปั่นอาชีพนี่แข็งแกร่งจริงๆ นะ..."
10100-101000590 = "แต่ไม่เป็นไรหรอก"
10100-101000600 = "เขาใส่ชุดปั่นจักรยานมาด้วยน่ะ"
10100-101000610 = "ถ้าจักรยานของฉันเสร็จเมื่อไรละก็"
10100-101000620 = "จะมีแมทช์แก้มือแน่นอน"
10100-101000630 = "ถ้าถึงตอนนั้นก็มาดูด้วยละ คุณครู"
10100-101000640 = "อ่า ได้เลย ครูไปแน่นอน"
10100-101000650 = "แล้วจะเชียร์ใครเหรอ?"
10100-101000660 = "เป็นความลับ"
10100-101000670 = "บอกไม่ได้หรอก"
10100-101000680 = "อื้อ"
10100-101000690 = "คิดแล้วว่าจะเป็นแบบนั้น"
10100-101000700 = "ขอบคุณนะคุณครู"
10100-101000710 = "แล้วฉันจะติดต่อไปใหม่นะ"

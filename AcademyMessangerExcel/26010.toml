[translation]
26010-260100010 = "Animals in the forest hide themselves by blending into their surroundings."
26010-260100020 = "In the same way, snipers use camouflage to hide themselves."
26010-260100030 = "Out in the wild, leaves and branches are used to hide the body,"
26010-260100040 = "but in a city full of people, normal clothes may be the best camouflage."
26010-260100050 = "That's why most snipers wear plain clothes for urban missions."
26010-260100060 = "I see. That's very interesting."
26010-260100070 = "Miyu, do you have a camouflage outfit you like?"
26010-260100080 = "Th-The thing is..."
26010-260100090 = "In my case,"
26010-260100100 = "most people don't notice me even if I'm not wearing camouflage..."
26010-260100110 = "So the only camouflage I really use is my school uniform..."
26010-260100120 = "But since we're going to a fishing village with no students around"
26010-260100130 = "I want to try out a new camouflage."
26010-260100140 = "Thank you for helping me, Sensei..."
26010-260100150 = "But I ended up getting noticed by all the other fishers..."
26010-260100160 = "My undercover mission was a complete failure..."
26010-260100170 = "But the fish you caught was really big, Miyu."
26010-260100180 = "Yeah, catching such a big fish made me happy, but..."
26010-260100190 = "But I ended up getting noticed by being so unnoticeable..."
26010-260100200 = "What a mystery..."
26010-260100210 = "Coming to the sea"
26010-260100220 = "has given me so many special experiences."
26010-260100230 = "An unexpected meeting..."
26010-260100240 = "Finding something familiar in a strange place..."
26010-260100250 = "Miyu?"
26010-260100260 = "What are you talking about?"
26010-260100270 = "Ah"
26010-260100280 = "I'm sorry, Sensei. I'm just rambling."
26010-260100290 = "It was about the pebbles."
26010-260100300 = "Sensei."
26010-260100310 = "I'm sorry..."
26010-260100320 = "I put the stones we collected back where they belong."
26010-260100330 = "You worked so hard to collect them with me. I'm sorry."
26010-260100340 = "It's okay. Don't worry about it."
26010-260100350 = "But why did you do that?"
26010-260100360 = "I thought about it, and..."
26010-260100370 = "These rocks were fulfilling their roles here without anyone noticing."
26010-260100380 = "If you can't do what you're meant to do, even if someone says you're valuable..."
26010-260100390 = "Well, it would make me sad..."
26010-260100400 = "This isn't much of a replacement, but..."
26010-260100420 = "You took pictures!"
26010-260100430 = "Oh, that's nice."
26010-260100440 = "Yeah..."
26010-260100450 = "This way, I can keep the memory."
26010-260100460 = "I had so much fun today."
26010-260100470 = "Thank you."
26010-260100480 = "When I'm waiting for a shot in the field..."
26010-260100490 = "I have a lot of time to stare at the sky."
26010-260100500 = "Unlike the earth, which never moves,"
26010-260100510 = "the sky is always changing, moment by moment."
26010-260100520 = "I think that's why I never get bored looking at the sky."
26010-260100530 = "But the sky I saw at the sea was..."
26010-260100540 = "It was a bit different."
26010-260100550 = "How was it different?"
26010-260100560 = "Th-The thing is..."
26010-260100570 = "Well..."
26010-260100580 = "I'm sorry..."
26010-260100590 = "It's hard to explain..."
26010-260100600 = "I found a magazine on the ground that said"
26010-260100610 = "you can attract attention just by changing your clothes."
26010-260100620 = "If you wear an outfit that doesn't match the setting, sometimes people will like you more."
26010-260100630 = "So I was thinking that I can wear my new outfit"
26010-260100640 = "and go for a walk through the city."
26010-260100650 = "Trying out new clothes is good and all, but..."
26010-260100660 = "Isn't the only new outfit you bought a swimsuit?"
26010-260100670 = "Talk to you later."
26010-260100680 = "Miyu?"
26010-260100690 = "Miyu?!"

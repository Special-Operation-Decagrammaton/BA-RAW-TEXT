[translation]
26010-260100010 = "숲속의 야생동물들이 보호색으로 몸을 숨기는 것처럼"
26010-260100020 = "저격수들은 위장복으로 존재를 지운답니다."
26010-260100030 = "자연물이 가득한 야외에서는 잎사귀나 나뭇가지로 몸을 숨기지만"
26010-260100040 = "사람이 많은 도시에서는 평범한 옷을 입는 게 더 위장이 될 때도 많아요."
26010-260100050 = "그래서 대부분의 저격수들은 사복처럼 도시에서 입을 수 있는 위장복을 갖고 있어요."
26010-260100060 = "그렇구나. 그거 신기하네."
26010-260100070 = "미유도 즐겨 입는 위장복이 따로 있어?"
26010-260100080 = "그게"
26010-260100090 = "사실 제 경우는"
26010-260100100 = "별다른 위장을 하지 않아도 지나가는 사람 대부분이 관심을 주지 않아서요……"
26010-260100110 = "교복 이외에는 그다지……"
26010-260100120 = "그래도 이번 작전은 학생이 거의 지나다니지 않는 어촌 마을에서 진행되니까"
26010-260100130 = "한 번 새로운 위장을 시험해 보고 싶어요."
26010-260100140 = "도와주셔서 감사합니다, 선생님……"
26010-260100150 = "하지만 결과적으로는 다른 낚시꾼들의 관심을 잔뜩 받아버려서……"
26010-260100160 = "이래서야 위장 잠복은 실패일지도 모르겠어요……"
26010-260100170 = "미유가 낚은 물고기가 정말 커다랬으니까."
26010-260100180 = "그러게요. 그렇게 큰 물고기를 낚은 건 기쁜 일이지만……"
26010-260100190 = "존재감이 없는 덕분에 관심을 받게 되다니……"
26010-260100200 = "정말 세상일이란 모르는 거네요……"
26010-260100210 = "확실히 바다에 오니"
26010-260100220 = "평소와는 다른 특별한 경험을 잔뜩 하게 되는 것 같아요"
26010-260100230 = "예기치 않은 만남도 있고"
26010-260100240 = "익숙한 모습을 의외의 장소에서 만나기도 하고……"
26010-260100250 = "……미유?"
26010-260100260 = "무슨 이야기야?"
26010-260100270 = "아"
26010-260100280 = "죄송해요, 선생님. 두서가 없었네요"
26010-260100290 = "조약돌에 관한 이야기였어요"
26010-260100300 = "선생님"
26010-260100310 = "죄송해요"
26010-260100320 = "아까 같이 모은 돌은 다시 자리에 돌려 두고 왔어요"
26010-260100330 = "열심히 같이 모아 주셨는데 죄송해요"
26010-260100340 = "괜찮아, 신경 쓰지 마"
26010-260100350 = "그런데 어째서 갑자기……?"
26010-260100360 = "조금 더 생각해 보았는데"
26010-260100370 = "이 돌들은 이곳에서 눈에 띄지 않게 자신의 역할을 다하고 있던 거니까요."
26010-260100380 = "누군가가 가치 있게 여겨준다 하더라도 평소에 하던 일을 하지 못하게 된다면"
26010-260100390 = "저는 조금 슬플 것 같아요……"
26010-260100400 = "대신이라고 하긴 그렇지만"
26010-260100420 = "사진으로 찍었구나."
26010-260100430 = "응. 좋은 생각이네."
26010-260100440 = "네"
26010-260100450 = "이렇게라도 오늘의 추억을 간직하려고요"
26010-260100460 = "오늘은 정말 즐거웠어요."
26010-260100470 = "감사합니다."
26010-260100480 = "저격 임무를 수행하다 보면"
26010-260100490 = "하늘을 보고 있을 때가 많아요"
26010-260100500 = "거의 움직이지 않고 고정된 땅과는 달리"
26010-260100510 = "하늘은 시시각각 변화무쌍하게 움직이거든요"
26010-260100520 = "그래서 하늘을 바라보는 건 질리지가 않는 것 같아요"
26010-260100530 = "다만 바닷가에서 본 하늘은……"
26010-260100540 = "……조금 다른 것 같아요"
26010-260100550 = "어떻게 다른데?"
26010-260100560 = "그게"
26010-260100570 = "음"
26010-260100580 = "죄송해요"
26010-260100590 = "뭔가 설명이 잘…… 안 되는 것 같아요"
26010-260100600 = "얼마 전에 버려진 패션 잡지에서 보았는데"
26010-260100610 = "의상 코디를 바꾸는 것만으로도 주변의 시선을 크게 끌 수 있대요."
26010-260100620 = "TPO에 적합하지 않은 의상이 가끔은 사람을 휘어잡는 매력이 될 수 있다고……"
26010-260100630 = "그래서 최근에 산 사복을 입고"
26010-260100640 = "거리를 한 번 돌아보려고요."
26010-260100650 = "새 사복을 시험하는 건 좋긴 하지만……"
26010-260100660 = "최근에 산 사복은 수영복밖에 없지 않았어?"
26010-260100670 = "일단 다녀올게요"
26010-260100680 = "……미유?"
26010-260100690 = "………미유야?"

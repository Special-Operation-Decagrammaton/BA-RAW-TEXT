[translation]
26010-260100010 = "ชุดพรางตัวเป็นอุปกรณ์ที่ช่วยสไนเปอร์\nพรางตัว"
26010-260100020 = "เหมือนกับพวกสัตว์ป่าที่อำพรางตัวให้\nกลมกลืนกับธรรมชาติค่ะ"
26010-260100030 = "ถ้าเป็นในป่าก็จะใช้ใบไม้หรือพุ่มไม้\nพรางตัวได้"
26010-260100040 = "แต่ถ้าเป็นในเมืองที่คนพลุกพล่านการ\nใส่เสื้อผ้าธรรมดาจะช่วยพรางตัวได้ดี\nกว่าค่ะ"
26010-260100050 = "เพราะงั้นสไนเปอร์ส่วนใหญ่ก็จะมีชุด\nที่ใส่ในเมืองเสมือนเป็นชุดพรางตัวอยู่\nด้วยค่ะ"
26010-260100060 = "อย่างนี้นี่เอง น่าสนใจดีนะ"
26010-260100070 = "มิยุมีชุดพรางตัวที่ใส่บ่อยๆ มั้ย?"
26010-260100080 = "เรื่องนั้น..."
26010-260100090 = "สำหรับฉัน..."
26010-260100100 = "ไม่ต้องใส่ชุดพรางตัวอะไร คนอื่นก็แทบ\nไม่สังเกตเห็นฉันอยู่แล้วละค่ะ..."
26010-260100110 = "นอกจากชุดนักเรียนแล้ว ฉันก็ไม่ค่อย\nได้ใส่ชุดอื่นเลย..."
26010-260100120 = "แต่ว่าปฏิบัติการครั้งนี้ พวกเราต้องไป\nที่หมู่บ้านชาวประมงที่ไม่ค่อยมีนักเรียน\nคนอื่นๆ อยู่ด้วย"
26010-260100130 = "ฉันก็เลยอยากลองพรางตัวแบบใหม่ๆ\nดูบ้างค่ะ"
26010-260100140 = "ขอบคุณที่ช่วยนะคะ คุณครู"
26010-260100150 = "แต่ว่าสุดท้าย ก็ไปเตะตานักตกปลา\nคนอื่นๆ จนได้..."
26010-260100160 = "แบบนี้การพรางตัวอาจจะล้มเหลว\nก็ได้นะคะ..."
26010-260100170 = "เพราะมิยุตกปลาตัวเบิ้มๆ ได้ต่างหาก"
26010-260100180 = "นั่นสิคะ ถึงการตกปลาตัวใหญ่ๆ ได้จะ\nเป็นเรื่องดีก็เถอะ..."
26010-260100190 = "แต่ก็ไม่คิดว่าจะได้รับความสนใจเพราะ\nตัวตนจืดจางเลย..."
26010-260100200 = "ไม่คิดมาก่อนเลยค่ะว่าจะมีเรื่องแบบนี้\nได้..."
26010-260100210 = "พอมาที่ทะเลแบบนี้"
26010-260100220 = "ก็ได้ประสบการณ์พิเศษใหม่ๆ ที่ต่าง\nออกไปจากปกติเลยนะคะ"
26010-260100230 = "ได้พบเจอเรื่องที่คาดไม่ถึงด้วย"
26010-260100240 = "ได้พบเจอคนที่คุ้นเคยในสถานที่ใหม่ๆ..."
26010-260100250 = "...มิยุ?"
26010-260100260 = "พูดเรื่องอะไรเหรอ?"
26010-260100270 = "อ๊ะ"
26010-260100280 = "ขอโทษค่ะคุณครู พิมพ์มาโดยไม่มี\nบริบทแบบนี้คงจะสับสนสินะคะ"
26010-260100290 = "ฉันพูดถึงพวกก้อนกรวดน่ะค่ะ"
26010-260100300 = "คุณครู"
26010-260100310 = "ขอโทษค่ะ"
26010-260100320 = "ฉันเอาก้อนหินที่ช่วยกันเก็บมาเมื่อกี้\nไปไว้ที่เดิมแล้วละค่ะ"
26010-260100330 = "ขอโทษด้วยนะคะ คุณครูอุตส่าห์ช่วย\nเก็บด้วยแท้ๆ"
26010-260100340 = "ไม่เป็นไร ไม่ต้องคิดมากหรอกนะ"
26010-260100350 = "ทำไมจู่ๆ ถึงเอาไปคืนล่ะ...?"
26010-260100360 = "ฉันมาคิดๆ ดูแล้ว"
26010-260100370 = "ก้อนหินพวกนั้นก็คงกำลังพยายามทำ\nหน้าที่ของตัวเองอย่างเต็มที่โดยไม่ให้\nใครเห็นน่ะค่ะ"
26010-260100380 = "ถึงจะมีคนมาเห็นคุณค่าของตนเองขึ้น\nมา แต่ถ้านั่นหมายถึงจะไม่ได้ทำหน้าที่\nตามปกติต่อไปได้ละก็"
26010-260100390 = "ฉันคิดว่ามันน่าเศร้านิดหน่อยค่ะ..."
26010-260100400 = "เพราะงั้นฉันก็เลย..."
26010-260100420 = "ถ่ายรูปเก็บไว้แทนสินะ"
26010-260100430 = "อื้อ เป็นความคิดที่ดีเลยนะเนี่ย"
26010-260100440 = "ค่ะ"
26010-260100450 = "อย่างน้อยก็เก็บเป็นความทรงจำดีๆ\nในวันนี้ไว้ได้ค่ะ"
26010-260100460 = "วันนี้ฉันสนุกมากเลยค่ะ"
26010-260100470 = "ขอบคุณนะคะ"
26010-260100480 = "เวลาที่ทำภารกิจลอบยิง"
26010-260100490 = "มีช่วงเวลาที่มองท้องฟ้าเยอะเลยค่ะ"
26010-260100500 = "ท้องฟ้ามักจะมีก้อนเมฆเคลื่อนที่ไปมา\nช้าๆ"
26010-260100510 = "ต่างจากพื้นดินที่ไม่ขยับเขยื้อนค่ะ"
26010-260100520 = "เวลามองท้องฟ้าก็เลยจะไม่รู้สึกเบื่อ\nเลยละค่ะ"
26010-260100530 = "แต่ว่าท้องฟ้าที่มองจากที่ทะเล..."
26010-260100540 = "...ฉันรู้สึกว่ามันต่างกันนิดหน่อยค่ะ"
26010-260100550 = "ต่างกันยังไงเหรอ?"
26010-260100560 = "เรื่องนั้น..."
26010-260100570 = "อืม"
26010-260100580 = "ขอโทษค่ะ"
26010-260100590 = "ฉัน... อธิบายไม่ถูกค่ะ"
26010-260100600 = "ฉันเคยเห็นในนิตยสารแฟชั่นที่เก็บได้\nเมื่อหลายวันก่อน"
26010-260100610 = "เพียงแค่เปลี่ยนสไตล์การแต่งตัวก็อาจ\nดึงดูดสายตาของคนรอบข้างได้ค่ะ"
26010-260100620 = "บางครั้งเสื้อผ้าที่ไม่ได้เหมาะกับ\nกาลเทศะที่ก็อาจช่วยดึงความสนใจ\nของผู้คนได้ค่ะ"
26010-260100630 = "ฉันเลยคิดว่าจะใส่ชุดที่ซื้อมาใหม่"
26010-260100640 = "และลองไปเดินเล่นที่ถนนแถวๆ นี้ดูค่ะ"
26010-260100650 = "การลองใส่ชุดใหม่มันก็ดีอยู่หรอก..."
26010-260100660 = "ชุดที่ซื้อมาใหม่น่ะ มีแค่ชุดว่ายน้ำนี่นา?"
26010-260100670 = "ถ้างั้นเดี๋ยวฉันมานะคะ"
26010-260100680 = "...มิยุ?"
26010-260100690 = "......มิยุ?"

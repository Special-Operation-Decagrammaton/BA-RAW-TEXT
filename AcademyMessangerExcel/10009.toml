[translation]
10009-700 = "선생님!"
10009-701 = "나 어제 책에서 굉장한 걸 읽었어!"
10009-702 = "굉장한 거?"
10009-703 = "응! 운동선수의 자서전이었는데……."
10009-704 = "거기에 평범한 음식을 더욱 맛있게 먹는 법이 쓰여 있던 거 있지!"
10009-705 = "평범한 음식을 더욱 맛있게 먹는 법?"
10009-706 = "운동선수 자서전에 왜 그런 게……?"
10009-707 = "이건 미식연구회의 부원으로서 그냥 넘어갈 수 없어."
10009-708 = "시험해보자. 선생님!"
10009-709 = "선생님! 선생님!"
10009-710 = "오늘부터 게헨나 중앙광장에서 길거리 음식 페스티벌이 열린대!"
10009-711 = "이즈미, 신났나 보네."
10009-712 = "응! 나, 쭉 오늘만을 기다려 왔어!"
10009-713 = "오늘은 특히 푸딩으로 엄청나게 유명한 가게가 참가하거든!"
10009-714 = "이건 꼭 먹어봐야 해!"
10009-715 = "선생님! 게헨나 상점가에 라멘 가게가 새로 생긴 모양이야!"
10009-716 = "같이 가자!"
10009-717 = "사전 조사 및 정찰이야!"
10009-718 = "같은 뜻 아냐……?"
10009-719 = "어, 그런가?"
10009-100090010 = "있잖아, 선생님!"
10009-100090020 = "선생님한테 꼭 보여 주고 싶은 것이 있어."
10009-100090030 = "아니, 맛보게 해 주고 싶은 것이 있어!"
10009-100090040 = "이즈미가 보여 주고 싶은 것?"
10009-100090050 = "응!"
10009-100090060 = "그러니까 오늘 시간 괜찮지?"
10009-100090070 = "이즈미의 부탁이라면야."
10009-100090080 = "기대되네!"
10009-100090090 = "그러면 기다리고 있을게!"

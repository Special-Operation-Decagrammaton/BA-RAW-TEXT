[translation]
10009-700 = "老師！"
10009-701 = "我昨天讀了一本很厲害的書！"
10009-702 = "厲害的書？"
10009-703 = "嗯！雖然是運動員的自傳……"
10009-704 = "但裡面寫著如何讓食物變美味的方法！"
10009-705 = "變美味的方法？"
10009-706 = "為什麼運動員的自傳會有那種東西 ……？"
10009-707 = "身為美食研究會的成員，怎麼能不試一下呢"
10009-708 = "事不宜遲，老師！"
10009-709 = "老師！老師！"
10009-710 = "從今天開始，中央廣場會舉辦擠滿攤位的慶典！"
10009-711 = "這樣啊。泉看起來很開心"
10009-712 = "嗯！我一直等著這一天！"
10009-713 = "特別是今天，有間布丁非常知名的店會參加……！"
10009-714 = "絕對要吃到那個！"
10009-715 = "老師！聽說格黑娜的商店街新開了一家拉麵店！"
10009-716 = "一起去吧！"
10009-717 = "調查與偵查！"
10009-718 = "這兩個不是一樣的意思嗎？"
10009-719 = "啊咧，是嗎？"
10009-100090010 = "吶，老師！"
10009-100090020 = "有個東西想讓老師嚐嚐……"
10009-100090030 = "不對，有個東西想讓老師看看！"
10009-100090040 = "想讓我看的東西？"
10009-100090050 = "嗯！"
10009-100090060 = "所以老師，可以請你過來一趟嗎？"
10009-100090070 = "知道了，我會去的哦"
10009-100090080 = "好耶～！"
10009-100090090 = "那我等你喔！"

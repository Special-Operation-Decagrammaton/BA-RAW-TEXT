[translation]
10018-100180010 = "老師休息的時候都在哪裡度過？"
10018-100180020 = "大多是夏萊吧"
10018-100180030 = "大多是廁所吧"
10018-100180040 = "確實，夏萊有很多適合休息的空間"
10018-100180050 = "那，那可真是……不過，稍微能明白。還不算太糟呢"
10018-100180060 = "我……喜歡沒有人經過，陰涼、黑暗的地方"
10018-100180070 = "不被任何人打擾，只屬於我的治癒空間……"
10018-100180080 = "如果是那樣的地方，我可以永遠待著"
10018-100180090 = "老師，下次希望你找別的置物櫃……"
10018-100180100 = "遊戲開發部的是我專用的置物櫃……"
10018-100180110 = "不能一起用嗎？"
10018-100180120 = "就，就算你這麼說，也進不去兩個人……"
10018-100180130 = "不行就是不行"
10018-100180140 = "老師喜歡什麼種類的遊戲？"
10018-100180150 = "喜歡家機遊戲吧"
10018-100180160 = "喜歡街機遊戲吧"
10018-100180170 = "啊，這樣啊。我的話……大部分的遊戲都喜歡"
10018-100180180 = "但是，必須和其他人一起玩的網路遊戲之類的就有點……"
10018-100180190 = "總覺得有壓力……不怎麼玩"
10018-100180200 = "啊，不過，對戰格鬥遊戲倒是常玩"
10018-100180210 = "這樣啊？"
10018-100180220 = "是，那種類型的遊戲，我玩得還不算太差"
10018-100180230 = "聽說我喜歡的遊戲公司這次會推出新的對戰格鬥遊戲，非常期待"
10018-100180240 = "柚子和格鬥遊戲，真是意料之外的組合"
10018-100180250 = "是，是嗎……？"
10018-100180260 = "開發遊戲非常需要錢吧……"
10018-100180270 = "上次開發的過程中，因為沒有足夠的錢維持伺服器"
10018-100180280 = "以致於中途有資料不翼而飛……"
10018-100180290 = "(ﾟﾛﾟ;) 那可不得了……最終怎麼樣了？"
10018-100180300 = "幸好有備份資料，總算是恢復了……"
10018-100180310 = "但有4天份的工作化為泡影……"
10018-100180320 = "遊戲開發的世界真艱難呢……"
10018-100180330 = "是的……"
10018-100180340 = "為了下次開發作品時不再犯相同的錯誤"
10018-100180350 = "必須事先籌措開發費用"
10018-100180360 = "上次的打工，我搞砸了很多事……"
10018-100180370 = "在客人面前多次身體僵硬，失誤連連……"
10018-100180380 = "雖然店長跟我說沒關係，但是……"
10018-100180390 = "那麼，這次要不要試試別的打工？"
10018-100180400 = "耶？別的打工嗎……？"
10018-100180410 = "行，行不通的！上次在便利商店打工，也只是勉勉強強能應付……"
10018-100180420 = "沒事的。這次的打工不用直接面對人也能做"
10018-100180430 = "咦，有那種打工……"
10018-100180440 = "那樣的話，也許沒問題……"
10018-100180450 = "老師，我拿到這個月打工的薪水了！"
10018-100180460 = "因為金額比想像的多，所以想用剩下的錢買禮物給部員們"
10018-100180470 = "('‿') 那真是太好了，辛苦了！"
10018-100180480 = "然後，那個……如果可以的話，這個週末能來遊樂園嗎？"
10018-100180490 = "遊樂園？"
10018-100180500 = "那個……因為有想送給老師的禮物"
10018-100180510 = "有這份心意就足夠了"
10018-100180520 = "不，那個，我想和老師一起……"
10018-100180530 = "不對！雖然那也是目的之一，那個……"
10018-100180540 = "我無論如何都想送老師禮物！"
10018-100180550 = "所以這個週末，請來遊樂園！拜託了！"
10018-100180570 = "沒想到這麼快就使用任意請求券了"
10018-100180580 = "要拜託的事……決定好了嗎？"
10018-100180590 = "來夏萊的時候，能幫我買麵包和牛奶嗎？"
10018-100180600 = "確實說過什麼都可以，但請別把難得的任意請求券使用在這種事情上……！"
10018-100180610 = "這點小事，只要你說了我就會幫忙買！"
